body:
  text: 文苑英華卷四百五十四宋李昉等編制書七節鎮三授渾瑊京畿金商節度使制陸贄門下集作勑王者之制安不忘危𢎞其道則文武齊政教其人則農戰兼務故雖縣內二字集作當無事不可去兵况密邇冦虞干紀稔慝都邑郊甸騷然靡寧聿求信臣特建戎號濟人夷難允屬勳賢京畿渭北節度使兵部尚書行在左集無左字都虞侯渾瑊忠貞集作信博厚溫恭簡肅持重不撓好謀而成居業克敦其詩書受賜每陳於廊廡能推誠而集作以撫下不伐已以拒一作短人委任中外咸著聲績夷險一貫隱然殿邦朕越在郊坰逼於集作于凶醜授之師律式是戎昭侍集作警衛增嚴斥候無爽檢身齊衆同士伍之勞苦敦陳整旅壯行列之威容靜以伐謀動而制勝臨危勵節豫有賴焉王畿之內沃壤千里綿亘商嶺屏於一作于南門觀風靖人詰禁誅暴俾爾兼領用孚于休可京畿渭北渭南集無此二字金商等州節度觀察處置等使餘並如故授杜亞淮南節度使制門下集作勑淮海奧區一方都㑹兼水漕陸挽之利有澤漁山伐之饒俗具五方集作人地綿千里集作方聿求良牧豈易其才今又革車方興集作殷軍賦屢調體集作尚於寬大則事缺務於辦集則人殘有非剛柔適中文武兼備其何以副我憂屬惠綏南方集作邦正議大夫行尚書刑部侍郎上柱國扶風縣開國男杜亞識精體集作典要學究宗源集作元妙於用而有常通其變而能久為理敦集作隆教化之本立言參禮法之中道無緇磷集作磷緇行有枝葉回翔省闥表彌綸獻納之勤踐歷方州著清淨循良之稱其嚴重可以鎮俗其材術可以匡時休有令聞一作名輝映朝列朕以東南思乂注意求賢爰輟名臣俾寧藩服往率厥職時惟欽哉可揚州大都督府長史兼御史大夫充淮南節度觀察處置等使散官勳封如故授唐朝臣振武節度論惟明鄜坊觀察使制門下集作勑分命使臣統臨方嶽弛張之道蓋亦從宜近甸無虞則但亷風俗邉陲式遏則兼假旌旄名制雖殊委任俱重膺是選命莫非勳賢開府儀同三司檢校兵部尚書兼鄜州刺史御史大夫充鄜坊丹延等州節度觀察處置等使平樂郡王唐朝臣嘗㧾偏師遘於集作于多難仗義率衆臨危不回保全關衝抗絶凶逆守而能固出則有功每急病而讓夷出國語嘗以寡而敵衆竟殱大憝克集茂勳炳然真心堅若金石洎息師歸鎮按俗頒條軍旅慰安流庸悅附元從奉天定難功臣開府儀同三司檢校工部尚書兼左集作右金吾衛大將軍充右街使上柱國兼康郡王論惟明釋位勤王有越難之節扞城禦冦有持危之功奉主忘身棄家從國赴自郊甸載踰巴梁險阻艱難靡不陪扈忠義所在死生以之久司禁戎益茂勳集作勤績器質敦實識度寬敏通明吏職練達武經本之以純良輔之以材術俾居藩翰僉謂汝諧朕以北控單于國之巨鎮彼方戎率沉痼是嬰卧護邉軍已淹寒暑閔其盡瘁難以重煩爰咨信臣更踐厥職朝臣可檢校兵部尚書兼單于大都督御史大夫充鎮武綏銀麟勝等州節度支度營田觀察處置押蕃落等使開府如故惟明可依前檢校工部尚書兼鄜州刺史御史大夫充鄜坊丹延等州都防禦觀察處置等使功臣開府勳封並如故授劉總守司徒兼侍中天平軍節度使制元稹門下百谷所以朝巨海海不疑其二於我也四集作五嶽所以鎮厚地地不畏其軋於已也故山澤之氣上騰天應之則為雲為雨台輔之精下降君得之則稱帝稱皇是以采羣疑者終不能成大功也集無也字下同推至信者必有以來大順也况朕志先定臣誠素通偃七十年之干戈垂千萬代之竹帛非我獨斷安能遽行某官劉總生知禮樂神授機符移孝資忠本仁祖義學弄之始畫地而壁壘之勢成言兵之時聚米而山川之形見集作具象賢秉哲脫俗遺榮慕清净以為宗㑹富貴之來逼自居劇鎮亟集殊功集作亟立殊勳威立兩畨化行八部集作郡日者除凶淮甸易師常山張吾掎角之雄賴爾股肱之力加以深𠂻早達密欵屢聞求奉浮圖之真願棄全燕之重誠嘉素尚難遂適中縱妻子之可捐豈君臣集作父之能捨朕惟鄒魯之地鄆實居多俗尚師儒人推古朴集作朴厚施之美化豈無衆善之恩革其非心寧失大權之㫖是用正名台座重委藩方爾其張我四維敷我五教握龍節以率下露蟬冕以行春宜體臯陶集作䕫之令圖勿狥集作修巢由之獨行可守司徒兼侍中使持節諸軍事守鄆州刺史充天平軍節度鄆曹等州觀察處置等使散官勳封如故主者施行授李願檢校司空宣武軍節度使制前人門下昔者魯侯伯禽徒以周公之故遂荒大東重耳以定傾之勞子孫不絶於晋昔我太師西平王在德宗時能復京邑書于鼎彛每懷宗廟之安實念江山之永而又繼有集作其英哲克全一作生令人惟弟惟兄莫非頗牧尚想德施於十代何憚恩積於一門鳯翔節度使檢校尚書左僕射李願生長紈綺之中而素風自德集作得藴鬱驍雄之器而性與溫恭怡怡於叔季集作季孟之間翼翼於班行之內始為夏帥遂著能名蹄角齒毛之良一無取于集作於夷落而不貪之實集作者保大布於朔陲旋集作洎領徐方㑹征淮右鄰寇隂狡將助鴟張來犯東郊冀延晷刻爾乃提持戈㦸淬礪卒徒一戰而蜂蠆盡殱不時而鶚獍就戮聿來岐下號令益明繕完甲兵為我保障朕以浚郊重鎮集作地尤藉良集作長材俾為司空以表東夏持我邦憲用清爾人夫四海九州非不廣也然而靈武魏博至於集作于大梁斷長補短方數千里皆爾為重又何加焉於戲睢陽在爾之東張巡效忠之城未毁集作誠尚在夷門在爾之境侯嬴報恩之跡尚集作猶存又安知憧憧往來之徒不有以仁義匡於爾者爾集作勉服休命其惟戒之可檢校司空汴州刺史充宣武軍節度使散官勳如故授劉悟檢校司空幽州節度使制前人門下朕聞將星明則英豪用靈旗指則妖集作氛祲銷徑草可以受疾風盤根然後見利器茍非處劇何以用長况幽并少年燕趙竒士居常以紫騮自騁失意則白刃相仇將領斯難是先才傑昭義軍節度副大使知節度事澤潞滋邢洛等州觀察制置使金紫光祿大夫檢校尚書左僕射兼潞州大都督府長史御史大夫上柱國彭城郡王食邑三百户劉悟天與忠誠人推敬讓藴孟賁之勇不以力聞避亷頗之強使之心伏是以居危邦而智免臨大節而功髙嘗見委於先朝屢作藩於右地朕以遼陽巨鎮自我底寧姑欲撫之以仁然後示之以禮而守臣嬰疾幕吏擅權撓政行私虧恩剝下過為捶楚妄作威稜不均饗士之羊但集作徒養乘軒之鶴致兹撓集作擾變職此之由不有將材孰懲兒戲敷求朕志深謂汝諧是用拔竒式兾宣力帖以亞相寵之上公俾光十乘之行以壯三軍之氣可檢校司空兼幽州大都督長史御史大夫充幽州契丹兩畨經略盧龍等使散官勳封如故授劉悟昭義勇節度使制門下昔潢池驟變則龔遂亟行河內去思而冦恂來復所以順人情而急時病也况雞澤衡漳附于上黨控帶河洛扼束燕趙其土瘠其人徑養理訓習尤所重難而幽州盧龍軍節度使檢校司空劉悟前臨是邦其政方睦兵甲完備師徒具嚴刑當罪而人不寃賞當功而財不費軍政威而無集作非虐吏道察而不苛州里行信讓之風鄉曲除武斷之患方將久次以惠斯人而難起幽陵救深焚溺輟於既理與彼惟新乘軒才及於邢郊妖彗忽生於兾分空沉台座未辨渠魁豫懷震驚物聽傾駭校其逺邇當分後先遂駐腹心之雄以供臂指之用復還龍節再息棠陰勉受新恩無移舊貫可依前檢校司空兼潞州大都督府長史兼御史大夫昭義軍節度副大使知節度事澤潞磁邢洺等州觀察使勳封如故授馬總檢校刑部尚書天平軍節度使制前人門下吏久其職人安其業此前代所以稱理古也况奪三軍慈愛之帥換百姓仁惠之長有迎新送舊集作故之弊因朝令夕改之煩自非有為而為曷若因集作且仍其舊前天平軍節度使檢校禮部尚書馬總始以檄奏翩翩俾從軍府儒學之外自此知兵踐歷他官所至皆理處馭南海仁聲甚遙還珠之祥前事復出先皇帝以淮夷未殄命相出征揔雖元僚亦佐參畫大憝既剪台衡復歸遂以丞相度旌旗授之於總總果善理蔡人宜之㑹鄆冦底平復换麾棨丕變汚俗大蘇惸婺不時成功周月報政朕飽其聲績渴見儀形如聞就路之初頗有擁轅之戀由是罷徴黃霸復借冦恂誠阻急賢之心姑務從人之欲仍加憲部以壯戎藩勉服新恩用彰前效可檢校刑部尚書依前天平軍節度使授田布魏博節度使制門下經曰父母之仇不同天雖及匹士集作夫而猶寢苫枕干以期必報是以子胥不殉伍奢之死卒能發既藏之墓鞭不義之尸取貴春秋名垂萬古而况於身備集作發將壇父死人手家仇國耻併在一門當懷嘗膽之心豈俟絶奬之禮金革無避其在兹乎前四鎮北庭行軍兼涇原節度使檢校左集作右散騎常侍御史大夫田布咨爾先臣惟國元老首自河朔來朝帝庭而又東取青齊北討燕趙提挈義旅勤勞王家冒白刃而不疑推赤心而自信屬冀方求帥余所重難輟自大名付兹巨鎮而中台暗拆上將妖侵蟊賊潜置於腹心豺狼勃興於肘腋人神憤痛朝野驚嗟深軫豫懷誓擒元惡以爾布詩書并習忠孝兩全常用魏師克征淮孽素行恩信共著勳庸豈無奮檄之圖集作徒為報冦仇之黨且魏之諸將由爾父而崇髙魏之三軍䝉爾父之仁愛昔既同其美利今豈忘其深寃爾其淬礪勇夫敬恭義士一飯之飽必同於士卒一毫之費必用於戎集作其干矛非算畫不萌於心非軍旅勿言一作宣於口居則席藁寒則抱氷以喪禮處之若哀心感者必有為橫身刎頸感智捐軀下報營魂旁清醜類於戲至誠可託稔惡難逃矧彼凶殘集作凶狂去將安往墨縗在體𤣥纛在前提劍執金無忘哀敬可起復寧逺將軍守右金吾衛大將軍員外同正員檢校工部尚書兼魏州大都督府長史御史大夫充魏博等州節度觀察處置等使勳賜如故主者施行授牛元翼深冀等州節度使制前人門下鷹隼擊則妖鳥除弧矢張則天狼滅湯沐具而蟣蝨相吊針石熾而痤集作癰疽立潰茍得韓盧而示之狡兔則可備爼豆而俟脯醢矣復何憂於越軼集作逸乎夫將者亦蟣虱之湯沐而渠魁之韓盧也我得之矣又何患焉檢校右散騎常侍深州刺史牛元翼挺生河朔之間廽鍾海嶽之秀幼為兒戲營壘已成長學神樞風雲諳曉衆推然諾已任安危集作功名善用竒兵尤精攻集作技擊陳安之矛丈八顔髙之弓六鈞或山立於軍前或肉飛於馬上而又謙能養勇孝以資忠雖膽力過人而心誠許國自常山作沴上將罹灾慟哭轅門誓清妖孽羽書三奏驛騎四馳上請廟謀旁徴鄰援指期斬叛尅日圖功斷自豫衷開懷用爾夫以爾之才力而取彼之凶殘是猶以火焚枯以石壓卵螳臂拒轍雞肋承拳萬萬相殊破之必矣而况於鎮之黎人皆朕之赤子爾之部曲即鎮之卒徒聞爾鼓鼙之音懷爾椒蘭之德吾知此輩誰不革心爾其寒者衣之饑者食之無發室廬無害農稼茍獲戎首置之藁街下以報忠臣之寃上以告先帝之廟則蚩蚩從亂豫又何誅於戲殺人盈城爾其深戒孥戮誓衆朕不忍言再換蟬冠新持武節恩不虛授爾其敬之可檢校右散騎常侍充深冀等州節度觀察等使授牛元翼成德軍節度使制門下王庭湊山東之集無之字一叛卒也非有席集作序勳藉寵之資強大結連之勢一朝驅朕赤子弄吾甲兵是猶以羊將狼莫不以三字集作其下必當潰其心腹而猶越月踰時莫見舂其喉者豈非常山無帥趙子弟無無集作未有所歸耶翕而受之我有長畫深冀節度使檢校右散騎常侍牛元翼燕趙間號為飛將望其旌集作旗幟者莫不風靡一作飛雨散圖其戰伐不可勝書而又忠孝謙亷慈仁和惠愛養士伍均如鳴鳩鎮之三軍爭在麾下自領深冀殷若雷震居四戰之中堅一城之守以少擊衆以智料愚鼓角不驚而梯衝自殞人願為用冦不敢前掃吾氛煙捨此安往前所謂我有長畫莫若用集作命爾以來鎮人是用益以二州超之八座帥乃成德廉其四封爾其來者懷之迷者諭之老者視之幼者撫之狂者遏之逆者絶之惟是六者爾其懋哉可檢校工部尚書充鎮州大都督成德軍節度使鎮深冀趙等州觀察處置等使授楊元卿涇原節度使制門下士以捐妻子冒白刃忠於許國勇於忘家集作勇於為國輕於為身貢先見之明於羣疑之際者大將書竹帛以示後次則建麾棨以臨戎功不見圖則勞者何勸忠不見用集作賞則悖者何誅聿求其人用檄爾類游擊將軍守右金吾衛將軍御史大夫四字集作權勾當右街事楊元卿衣冠貴胄文武長才常求三略之師耻學一夫之敵是以視豺狼之冗履尾甚一作防危蓄鷹鸇之心卑飛待擊請分金以間楚願奉壁以伐虞身以智全家因義喪謀蔡之始實有力焉及典方州尤彰績效自居環尹益茂勳勤西旅未平是資良師授以集作拔於不次式竚竒功爾其闢我土疆謹我封守視我士卒如爾子攘我夷狄如爾仇勉竭乃誠以敷朕志珥貂持簡用示兼榮可朝散大夫檢校左散騎常侍使持節涇州諸軍事兼涇州刺史御史大夫充四鎮北庭行軍兼涇原等州節度觀察處置等使勳賜如故主者施行加授陳楚義武軍節度使一作檢校左僕射制前人門下朕聞四字集作門下昔楚師多寒楚子巡而撫之士皆如挾纊明號令之可以動人也由是天以雷霆蘇蟄氛兵以鼓􅎏作戰力髙官重秩可以興起人之壯心八字集作其為號令也不亦多乎我無愛焉加之集作以戎帥亦所以作萬夫之氣而增一鼓之雄也義武軍節度使檢校工部尚書陳楚茂昭之甥雅集作酷似其舅捴齊武旅集作義武於今六年以兩郡之賦輿備三軍之供費人不勞耗而兵能繕完政有經矣今遼揚冀方紛亂交虐楚實間居於此其勤可知自非國之干城物之利器安能為我保障芟夷冦讎將欲激其懋勳集作壯心夫何吝於好爵加之左揆以盛中權茍有庸功豈無後命勉爾勳效副余憂勤八字集作於戲書云功懋懋賞言其當也傳曰捨爵䇿勳言其速也今則冦未平而進律馘方獻而先恩吾於將臣可謂無所負也茍不自效其如法何可檢校左僕射使持節定州諸軍事兼定州刺史充義武軍節度使散官勳封如故主者施行授烏重𦙍山南西道節度使制前人集無門下惟梁州㑹險形束襟帶皇都南開蜀國西控戎落地宜用武政必兼文茲惟信臣膺是專委橫海軍節度使烏重𦙍才本雄勇器惟溫茂承纍將之業不以驕人歷重兵之權每思下士沉威不耀至信自彰立竒節於遏亂之初成休勳於蕩冦之日焯然來效夙簡朕心自經理海邦訓齊戎旅災荒之後安阜為難政以和均人斯恱勸善績可舉壯猷克宣是用遷鎮近藩更𢎞遠略恢復西土伊正南都式寵忠勳宜服榮奬可檢校司空充山南西道節度使授王佖檢校户部尚書靈鹽節度使制白居易門下靖邉之要選將為先夫有統馭之才然後以制節度一作授以節制之任有撫備之略然後以鎮夷夏之衝期乎懷遏冦虞慎固封域今豫命爾時謂得人開府儀同三司檢校刑部尚書兼右衛上將軍寧塞郡王食實封二百五十户王佖忠厚立誠果斷效用慎始終而行有枝葉踐夷險而道無磷緇早練武經纍從軍職頃逢多壘實佐元戎節著臨危功參定難位由勞致名以忠聞自列六卿且司七萃星霜屢變金石彌堅宜申命以北轅俾遏戎於南牧進地官以崇新命極勳秩以褒舊功中簡朕知集作心外諧僉議况五原重鎮諸夏長城修戎政莫先於威聲牧邉氓莫尚於惠實師雜昆夷之悍訓必在和地為獯虜之鄰撫宜以信勉率是道往分朕憂嵗時之間期於報政委望斯在爾其聽之可檢校户部尚書兼靈州大都督府長史御史大夫充朔方靈鹽定逺城節度副大使知節度事管內支度營田觀察處置押蕃落等使仍賜上柱國散官封實封並如故主者施行四年六月三日授閻巨源邠寧節度使制門下華夷要地實衛集作為藩漢鈇鉞重柄必授忠賢况乎掎角諸軍金湯中夏有坐甲護邉之旅任切於拊循有引弓犯塞之虞寄深於備禦中集作內作心腹外張牙爪茍乏集作非信臣不在兹選奉天定難功臣開府儀同三司檢校尚書右僕射兼羽林軍統軍御史大夫上柱國定襄郡王食邑三千二字集作一千三百户閻巨源忠而能力勇以好謀誠諒著於艱危勳績彰於事任蓄是武略鬱為將才洎出鎮朔陲入司環衛獯戎即叙時乃之功禁旅統和時乃之訓可謂備知虜態明練兵符永惟頗牧之能宜授郇邠之寄長南宫而遷左揆壯西郊而委中權既圖前勞且佇來效於戲十連之帥可以觀政萬夫之長可以樹勳勉𢎞令猷副我休命可檢校尚書左僕射持節邠州諸軍事兼邠州刺史御史大夫充邠寧慶等州節度管內支度營田觀察處置等使功臣散官勳封如故主者施行四年十月一日進授軍使邠寧節度使制門下金方之氣凝為將星玉者法天選命豪傑授之以鈇鉞拜為將軍以威西戎以護中夏而倚望若是安可非其人哉某官某乙出忠入孝仗信抱義行有餘力學劒讀書鬱然將才又集作用兼文武自領軍衛為我牙爪夙夜警巡不懈於位材官知訓環烈增勳服勤五年兹為成績可以移用使之守疆郇邠大藩控扼胡虜若得良將則無外虞知臣者君非爾不可仍加副相以重是行勉樹勳勞式光寵擢授王某魏博節度使制門下師長之選重難其人况河上列城鄴中雄鎮初喪良帥思安衆心若親與仁方膺是命具官王某出忠入孝根乎至性好學樂善出於餘力發自修已施于為政可以守土可以長人今兩河之間三軍乏帥是用命爾領兹大藩澄清魏風疆理疆集作輯相土為我垣翰永孚于休往其欽哉無替厥問集作職可魏博等州節度觀察使授薛平鄭滑節度使制門下武牢以東至于白馬形制之地水陸之㑹宜擇文武兼備者以為守臣右衛將軍薛平自司禁旅為我爪牙訓整警巡能宣其力常使于絶國可謂有勞嘗牧於大都集作郡亦聞有政况忠厚為質通明為用秉吏道之刀尺襲將門之弓裘可以為三軍之帥可以理千乘之賦俾輟才於北落往按節於東方爾其式遏四封輯寧百衆明簡稽以實軍旅信賞罰以勸吏人勉率乃職無忝厥命仍以冬卿副使兼而寵之可檢校工部尚書御史大夫鄭滑頴等州節度使觀察處置等使授田興工部尚書魏博節度使制前人門下馭下安人其道不一或序能以次用或因效集作功以拔才所命雖殊同歸共理具官田興時屬本軍初喪戎帥亂政或起群心不寧而興列在偏裨奮其義勇謀成必中事至能斷智略所及指麾所加一軍獲安百衆恱附連獻章疏恭俟制命有節有禮朕用嘉之夫以將材如彼軍情若此允膺不次之舉可責非常之功是用寵之冬卿擢為大將及以印授就拜軍中行乎敬之勿墮乃力可檢校工部尚書兼御史大夫魏博等州節度觀察等使授李夷簡西川節度使制門下征鎮之重集作大實惟蜀川西距于戎南漸于海有重江復山之險有長轂堅甲之旅水陸交㑹華夷雜居疇能理之我有良帥山南東道節度使李夷簡以正事上以簡臨下伏兹器用纍當任遇執憲之難也爾為臺臣其職甚舉司計之重也爾調邦賦其效可稱爰資長才出領重鎮自捴符鉞于漢之南專奉詔條削去弊政均轂藉不一之賦罷舟車無名之征近恱逺來歸如流水俗用丕變人汔小康三載考功爾為稱首一作為足稱道進其右秩遷于大藩以均惠乎四方以旌勸乎羣吏昔文翁明於教化种皓優於政能巴蜀之間遺美猶在不替前效可以嗣之佇聞有成用光厥命可檢校吏部尚書劒南西川節度等使授袁滋襄陽節度使制門下漢以二千石之良者入為公卿周以六官之賢者出兼侯伯內外之任所命則殊至於理軍國寵忠賢其致一也户部尚書袁滋奉上甚勤臨下甚簡安人附衆尤是所長頃資其能移鎮東郡略其科禁緩其征徭政不滋彰人用休息在部七載績茂課髙璽書徴還益聞遺愛老幼遮道事鄰古人朕方勤恤疲氓褒奬循吏纍月再命其有㫖哉舉鄭滑之政也故旌武公之美寵以司徒憂襄漢之人也故拔一作仗叔子之才委兹征鎮類能而使其在此乎勉效厥聲無替前效可某官充山南東道節度等使文苑英華卷四百五十四
