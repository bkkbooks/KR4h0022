body:
  text: 文苑英華卷四百九十宋李昉等編直言賢良方正直言極諫策二道賢良方正直言極諫策寳厯元年問皇帝曰朕恭守憲祖中興之運穆宗紹寧之業寅畏兢翼亦免荒墜諸侯忠上而奉職卿士循法而恪官四夷内向兆人休息至於屬統垂文程示後代終有致人之意未有理人之術古人云希顔之徒亦顔之流也又曰舜何人也余何人也子竊不讓欲追蹤乎三代俯視乎二漢陶今俗於至道躋兆人於泰和子大夫皆蘊器應薦憤憤悱悱思所以奮者於日久矣當極其慮開予欝滯夫禮樂刑政理之具也禮樂非謂威儀升降鏗鏘拊擊也將務乎阜天時節地利和神人齊風俗也刑政非謂科條章令繁文申約也將務乎愧心格恥設防消微也必有其論何方致之四人混處遷於異一作費物歴代已降皆所共患士本於儒而有詭道之行農尚篤固而多損本之心工繕用物而作雕磨之器商通有無而賫難得之貨思矯其弊必有其術漢髙之基稱蕭曹孝宣之興稱丙魏朕觀其書燦焉盡在我國家之盛其紀年則曰貞觀開元其輔相則曰房杜姚宋朕觀其書則㧞羣絶類者不能相逺然兩朝之盛四子之能不可誣也將與元化合徳謨謀而無際歟為史官詞志不能久於其事詔令作其事業歟口食至多而墾闢者惰供億至衆而財官是空官無闕員而家食者告困徳澤仍臻而鰥弱者未贍必有其㫖何以辨之無泛無畧無游説無隠情以副虚求朕將親覽對舒元褒第三人對臣久訝今之天道運行地力負載生生滋息皆與堯舜禹湯之時不異及言其理亂安危則邈然數千里而逺臣因静索其源蓋由時君之所致也在禹以夏王桀以夏亡在湯以殷王紂以殷亡是古今有異耶直人事而已矣臣嘗病之願抱血誠而冩置於天子之前天路甚髙無由上達所以卒歲於悒如抱沉痼天意似知臣有移時之術而能懇懇不已幸使臣不為霜露所薄而無犬馬之疾得遭遇陛下嗣位之日首以直言極諫徵夫賢良方正之士而虚心以問之此乃五帝三王之所難行而一朝陛下盡能行之所謂天地交泰之時也臣不敢懼避願就湯鑊之誅願盡吐成敗利害之根願解天下元元倒懸之急也亦不枝蔓藻飾以為言上縁聖問下切人情度陛下必能行之者而後言之伏惟陛下察其忠而諒其直實天下幸甚謹昧死上言制策曰古人云希顔之徒亦顔之流又曰舜何人也予何人也予竊不讓欲追蹤乎三代俯視乎二漢陶今俗於至道躋兆人於泰和子大夫皆蘊器應薦憤憤悱悱思所以奮者於日久矣當極其慮開予欝滯者陛下首問及此有以見聖人思理之深也臣聞揚雄有希顔之言顔淵有慕聖之語皆謂生雖異代但行其道即其人也今陛下蘊上聖之姿執大寳以御乎人夫寒暄發於咳唾生死繫於喜怒其力與天地争一作同大其財與泉源不窮臣竊謂以此之力提五岳而塞乎四海也今賜策曰予竊不讓欲追蹤乎三代俯視乎二漢此乃陛下謙光之至也微臣敢不拜舞稱賀條列而言乎臣聞三代之理以義化天下其猶天地之無不覆載日月之無不照臨雖負至聖之姿常若不足在求賢以輔張諫以規憂天下之憂樂天下之樂未嘗枉一物而私其功也三代之後亦求其所理之門何者足以立功而親人此道苟失在未嘗有思天下之苦既不知其苦必輕用其人所謂輕用者非謂日殺不辜蓋以天下之力既困而上之用無節上之用無節則有轉死溝壑之患生於無節足以為生人之刀鋸也又有甚於此者則爵祿徧於輿臺威福生於左右刑罰不足法令不行天下昏亂猶不知覺自以為萬世之安以此求理何異縁木而求魚哉今陛下欲追蹤乎三代則莫若用三代之理何者伏望陛下以其徳理天下則思求賢以廣其覆載以貞明並日月則思納諫以助其昭臨察逆耳之言則知其為端士而進用之聞悦心之語則辨其為邪謟而斥逺之御一膳思天下之饑披一裘思天下之凍覽國史思祖宗創業之艱難覩貢賦思黎甿耕織之勤苦居宫殿思採伐之勤勞視嬪嬙思離曠之怨恨聲色遊宴悟伐性之言馳騁畋獵念垂堂之戒戢六軍無令恃寵抑近習無縱威權無使有求恩之名無使有得幸之號無使内干外政無使中奪外權無垂飾喜之賞無行遷怒之罰無求悦目之華無好蕩心之巧此乃三代明王理天下之術也陛下誠能慕之則宜法而行之行之不已自然逺超於三代矣况俯視二漢乎此則陶今俗於至道躋兆人於泰和又豈勞聖慮哉制策曰夫禮樂刑政理之具也禮樂非謂威儀升降鏗鏘拊擊也將務乎阜天時節地利和神人齊風俗也刑政非謂科條章令繁文申約也將務乎愧心格恥設防銷微也必有其論何方致之者臣聞禮樂刑政理天下之本也三代之理未始不先於禮禮明則君臣父子長幼尊卑識其分而人倫之序正矣人倫之序正則和順孝慈之慶感於上所以阜天時也貴賤之位别於内則奢侈耗蠧之弊息於外此所以節地利也自然上下交泰而天下之心悅天下之心悅因可以達於樂樂達則神人自然和矣神人和則風俗自然齊矣仲尼曰安上理人莫善於禮移風易俗莫善於樂其此之謂乎固非謂夫威儀升降鏗鏘拊擊也伏惟陛下舉三代禮樂而行之而不以形聲之為貴則可以阜天時節地利和神人而齊風俗刑政者國家之大典臣聞貞觀之理刑政甚明夫刑者期於無刑政者期於無政蓋以一人而齊天下能用之者則理不能用之者則亂刑設而不犯畫一之謂也政立而不易必行之理也然後能去奸宄懲暴亂而養育黎人也然其患在於性情好惡逺近雷同雖堯舜不可為理也况今人人自為强禦欲其愧心格恥設防銷微無由得也何以言之今軍伍之人陛下之人也府縣之人亦陛下之人也既皆陛下之人則刑政所宜共守今有惰遊無頼之人不修本業輸貨𣙜酤苟求微利一入北軍張影附勢憑託附籍恣行凶頑執憲與尹京者持陛下刑政以繩其罪主者則云彼越局而挫我也遂夸其威權以固䕶之持刑政者無由而禁徒有城狐社䑕之歎耳此陛下刑政不行於轂下况其逺者乎其外則守土之臣或多自開户牖征徭𣙜稅不本制條刑罪重輕率於胷臆此陛下刑政不行於内地况其逺者乎伏惟陛下明於用刑則可與期於無刑矣豈止於愧心恥格乎率力為政則可與期於無政矣豈止於設防銷微乎伏惟陛下徵貞觀刑政而行之則天下之人有恥且格矣制策曰四人混處遷於異物歴代以降皆所共患士本於儒而有詭道之行農尚篤固而多捐本之心工繕用物而作雕磨之器商通有無而賫難得之貨思矯其弊必有其術者臣聞明君在上制四人之業不使為異物所遷今士之為儒非不強學而有詭道之行者其弊自陛下親巧諛而疎鯁直也農人之業非不篤固而多捐本之心者其弊自陛下嗜珍味而惡菲薄也工人之藝非不專而作雕磨之器者其弊自陛下厭朴素而尚滛巧也商人之利非不多而賫難得之貨者其弊自陛下貴珠玉而賤布帛也使惟陛下斥巧諛則士無詭道之行矣絶珍味則農無棄本之心矣碎滛巧則工無雕磨之器矣賤珠玉則商無難得之貨矣矯弊之術其在此乎夫矯弊在先原其本然後責其末何者制士人之禄使稍優寛農人之税使加薄酬工人之庸使當直來商人之貨使其通如此自然各修其業矣復敢有為異物所遷則陛下之刑政存焉制策曰漢髙之基稱蕭曹孝宣之興稱丙魏朕觀其書燦焉盡在我國家之盛其紀年則曰貞觀開元其輔相則曰房杜姚宋朕觀其書則㧞羣絶類者不能相逺然兩朝之盛四子之能不可誣也將與元化合徳謨謀而無際歟者臣聞元首以輔弼興理自古王者期建非常之業則必有非常之人以佐之漢之髙祖資蕭曹孝宣憑丙魏一則以創業一則以中興其道可得而知也漢祖起於布衣以有天下大敵未滅日月持久蕭曹匡輔謀計居多所以覺其功業盛也孝宣起於人間霍光殁方親政事然霍光雖乘時之功不通經術非王者之佐弊政尤多丙魏乘弊之餘以竭股肱之任卒致中興所以覺其輔佐之勞也我太宗𤣥宗明聖之資海内從化而房杜姚宋當至理之代皆盡啓沃之力咸有匡輔之道主聖臣賢君臣道合是以貞觀開元與漢之功臣有異而兩朝功徳事業光乎史册陛下以㧞羣絶類之不相逺者臣嚮所謂主聖臣賢道合交泰正史氏無徳而稱焉制策曰口食至多而墾闢者惰供億至衆而財官是空官無闕員而家食者告困徳澤仍臻而鰥弱者未贍必有其㫖何以辨之毋泛毋畧毋游說毋隠情以副虚求朕將親覽陛下終問及此有以見聖心憂勤之至也微臣敢有所隠而不盡言乎陛下以口食至多而墾闢者惰供億至衆而財官是空非上失勤儉之化而下棄其本不務乎夫欲墾闢多而財賦足者莫若勸人之務本務本在百姓樂其業而墾土以穀樹桑以絲此者疑作皆取之於厚地厚地之出如泉源焉豈有窮竭耶今舍此不務而欲墾闢之不惰不可得也今陛下宫室池臺之盛則人務採伐而輙趨斧斤之利此耕夫十去其一也後宫羅紈鉛紅一作錦綺者數千人日費數千金此耕夫十去其一也尚食之饌窮海陸之珍以充上方一飯之資亦中人百家之産此耕夫十去其一也廏馬與鷹犬之多皆使厮養之其芻粟粱肉之供一物之命有甚於人此耕夫十去其一也車輿服玩皆錯以兼金鎪以美玉或文犀瑇瑁大貝明珠齒革羽毛窮異極竒採之者或航溟海梯崇山力盡不回繼之以死此耕夫十去其一也有假於浮屠削髪惑衆而建立寺宇刻雕像形度天下之多不下數十萬此耕夫十去其一也姦吏理人苟以應辦為先急徵其租厚剥其賦以媚於左右此耕夫十去其一也上好珍竒則商通無用之貨上好伎巧則工作無用之器器與貨皆出於人力乃委於無用之地此耕夫十去其一也此數者乃困生人之力而竭國用之甚者陛下誠能慕乎茅茨之化繩浮屠惑衆之說抑姦吏賦斂之心閉工商無用之事則百民皆歸本而墾闢矣何慮乎口食至多哉陛下誠能節嬪嬙之侍斥犬馬之繁减海陸之溢省車輿服玩之珍則賦自然足何慮乎供億之衆哉故語有曰百姓足君孰與不足使伊傅復生為陛下計者不能易此也陛下以官無闕員而家食者告困豈非擇才授任之不明歟遷轉課績之不覈歟今自三事及羣有司皆有其官官有其禄考成在於歲滿則轉不知陛下何以選而致之哉臣聞詩曰濟濟多士文王以寧言内外各用其人為理而天下安寧也今多士盈朝而使陛下憂勞若此雖無闕員將何用哉其疑作甚失文王以寧之謂也陛下何不各於其局而考其課績有其效者則升之無其效者則退之如此則尸素充員者鮮何憂乎家食而告困哉陛下以徳澤屢降而鰥弱者未贍豈非方鎮之臣為壅遏其恩者耶竊見今主守一作守土之臣與聚斂之臣巧計萬端割剥生人膏血兩税之外徵率雜科以為非時之進富貴疑陛下恩澤於是有月進時進朝賀之進羡餘之進當進之時表章上言皆云臣自方圓不擾陛下百姓舉此一節則明其欺詐甚矣今長吏節度觀察刺史之家其奢者家僮數百人其儉者不下百人以其禄俸自給尚且不足必重斂於人以繼之則明知其所進非禄俸也既非禄俸而云不擾百姓將何得哉所以兩稅之外常有誅求鹽鐵𣙜酤重疊籠稅託為進奏般次相運水陸轉輸半入私家今天下之人流離棄業日益困矣而陛下無由知之雖仍降徳澤徳澤不流則鰥弱從何而贍陛下聞之得不為少軫聖慮少動聖心臣竊料陛下將不忍聞也陛下倘察臣之言特回聖意一為思之勅有司簿天下舊定之租賦禁奸臣非法之誅求减鹽鐵𣙜酤之繁稅絶天下無端之進奉如此則徳澤自降天下之人自獲蘓息富而庶矣豈慮乎鰥弱之不贍哉然清問所及皆當今之切者微臣上言亦已盡矣陛下察而行之在陛下留心庶政而法其兢兢業業者而已何者陛下春秋鼎盛上荷十二聖之重構自即位以來嘗日旰不視朝大臣憂懼百辟惴慄進諫者詞㫖懇切陛下既嘉其忠亦允其請然宰相卿士未有轉時之對則萬幾之重其闕幾時加之千門之深羽衛之隔則堂上之逺豈止於千里哉雖陛下雄傑聰明極思慮而憂天下何由而得雖曰徵賢良為直諫又何益於理故傳曰其身正不令而行其身不正雖令不從推是而言則天下理亂不由陛下而致其由誰乎臣所謂留心庶政而法其兢兢業業者蓋由此也况今大弊未去其可忽之耶臣所謂大弊者在法吏之舞文權臣之弄柄朋黨連結貨賄公行以中外一作髙權重位出入迭居名器輕於糞土公侯徧於頑駑恣行威福苛傷暴殘諫官不敢論御史不敢糾雖陛下有天下之名而此輩乃害天下之實此弊不去生人未安陛下必欲去其弊者㧞其根本斥諛佞進忠賢早朝而宴退引宰相公卿詢訪天下之利病至於羣有司皆使鯁直列侍而親决萬幾之務此乃聖帝明王理天下之術也伏惟陛下留神獨聽無惑於左右則四海九州幸甚微臣敢愛一身之死而不直乎謹對賢良方正直言極諫策長慶元年䇿問見沈亞之集問皇帝若曰蓋聞舜禹之有天下也起於側微積徳累勤多歴年所夫經盛聖之慮豈有遺登科記作過哉然猶好問察言勤求賢士蓋以承天沈亞之集作祧之任重憂人之志深也况朕長於深宫涉道日淺繼後篇作奉列聖之鴻緒撫萬㝢之烝人集作矜人詔令作黎人夙夜嚴恭不敢有懈實懼燭理未究省躬未明所以詳求讜言以輔後篇集本並作補不逮子大夫是宜發所蘊蓄沃予虚懐極意正登科記作盡詞勿有隠諱集作所隠昔王政之興後篇作昔王者之政必臻於康泰覇道所立猶致於富強我國家提封溢於三代酌憲兼乎後篇作于百王無堯湯之災積祖宗之理而人未蕃庶俗尚彫訛家無蓋藏公門儲蓄集作偫後篇作待卒乘之數貨幣之資綂而校之莫繼前代豈率土生植後篇作殖變於古歟固已揣摩必窮集作究利病明徵末後篇作得失之漸具一作用陳興盛詔令作復之謩且文武兼學登科記作行孝以成功後篇作身士農迭居以豐業故家給足以戀文粹作固本才周可後篇作足以應時近古各循一端不相資用致令從事異心難成考課登科記作難以成課集本後篇並作難於成課去秩集作民佚無守輕為惰游指明共貫之方登科記作由斯合二途之利永言化理期酌厥中施為或差得失斯逺將修睦勸義集作善則在下難知將任數馭情則人心益偽思聞㫖要得合誠明旌别比周之情敷詳忠厚之道知人則哲從古攸慎九徵恐泥五事難精或望可服人而才非周物或言皆詣理而行則一作有後篇作或乖方宜陳取舍之端用明後篇作彰真偽之辨至於朝廷之闕四方之弊詳延而至可得直書退有後言朕所不取子大夫其勉之此策問四百九十三卷重出今已削去對龎嚴對臣言臣少從師學講論載籍為皇為帝為王為覇之所行理亂興衰之所由起迨壯歲而以身處窮賤又得農桑工賈之利病人情風俗之厚薄思願一發於明天子之前欝抑於中無因自致乃月正日陛下有事於南郊廻御丹鳳樓赦天下臣與百姓咸觀列在大陸之南祥風北來時聆徳音乃聞有直言極諫之召私自快喜得進所志一作志可進於今日也今蒙陛下親策於丹墀之下懼所以燭理未究省躬未明乃使臣極意正詞勿有隠諱臣其敢不直不極而有闕陋哉臣生三十年實沐唐化恨無以自效於日月之下乃逢昌運獲進狂言願增天髙以益地厚懇迫急切不知所裁謹昧死上對制策曰昔王政之興必臻於康泰覇道所立猶致於富強國家提封溢於三代酌憲兼乎百王無堯湯之災積祖宗之理而人未蕃庶俗尚彫訛家無蓋藏公闕儲蓄卒乘之數貨幣之資統而校之莫繼前代豈率土生植變於古歟將阜時政令失於今歟固已揣摩必窮利病明徵未失之漸具陳興盛之謨臣聞以道化者皇以徳教者帝以禮樂刑政理者王夫以處天下之尊舉四海之力為皇為帝為王為覇致之一也猶反掌之易而况人之誠偽時之厚薄必由上而下者乎帝王之道髙不降於天厚不取於地逺不致於四夷師友輔弼而已矣師友輔弼豈有他求哉賢哲忠信而已矣是以古之聖帝明王念天地之無全功也不自尊其徳仰日月之有薄蝕也不自是其明必求賢哲置諸左右然後徳尊而益至臣日獻其謨君日行之臣日聞其過君日改之其始也一善出於臣其終也百善歸於君以為皇者師帝者友卒未聞師聖於皇而友明於帝後之王者其或不然臣有所獻或慮乎美歸於下是以言有所不聽臣有所替或慮乎惡彰於已是以過有所不去然則曰諫我之曲彼必正乎曾不知疾之在身必飲醫工之藥而醫工未必免病也飲其藥者或有效焉必待其筋力異於人顔色殊於衆而後飲其藥則疾之根本得不為深乎今陛下邁皇帝之聖輔弼有師友之賢所謂聖賢相逢而上古之理可得而致猶慮乎人人未蕃庶俗尚彫訛則理不優於三王徳不超於五帝其致之哉誠有道焉臣願陛下詳觀典圖舜禹所以待䕫契者何如哉貞觀所以任房杜者何如哉開元所以用姚宋者何如哉其所以致堯舜成湯文武之名貞觀開元之理何如也今陛下自即位以來舜禹之心已刑于四海矣陛下尊敬師傅㧞用忠賢謫棄奸貪發散滯積皆舜禹之心也臣願陛下尊敬之不廢其道㧞用之不廢其言謫棄之今勿復之散發之今勿歛之夏書曰靡不有初鮮克有終陛下能終之又何憂蓋藏不贍於下人儲蓄有闕於公府鑄鋒銷鏑卒乘之數可减於後事薄賦節用貨幣之資可益於前代末失之漸莫甚於賢不任而政不修興盛之謨莫先於復開元而履貞觀則三代之康泰可翹足而致彼五覇富強之術安足為陛下道哉制策曰且文武兼學以成功士農迭居以豐業故家給足以戀本才周可以應時近古各循一端不相資用致令從事異心難成考課去秩無守輕為惰游指明共貫之方訢合二途之利者臣以為文武之道雖不同士農之業雖各異而要歸於修其職業而濟於時也今之所謂文者何哉文采而已所謂武者何哉騎射而已欲求兼學其可得乎經緯古今文之業也用之於武武之徳也禁暴戢兵武之業也用之於文文之輔也不修其本而事其末欲求其備其可得乎今苟各視其才以授其任亦可以濟天下之務矣是以仲尼有四科以廣其道漢髙有三傑以成其功所以不求備於人故能創業於前代垂教於無窮者也士農迭居以豐業今所以輕為惰游者國家自幽薊兵興人無土著士者農者遷徙不常慕政化則來苦苛暴則去禄有厚薄在桑土不均則知去秩者無守不為惰游者何所歸乎陛下端心克已於上任賢使能於下則文武各得其任士農各安其業矣寧慮家有不給才有不周之患乎制策曰永言化理期酌厥中施為或差得失斯逺將修睦勸義則在下難知將任數馳情則人心益偽思聞㫖要得合誠明旌别比周之義敷詳忠厚之道陛下以修睦勸義為念而以難知益偽為慮豈耳目之臣未得盡賢乎何憂嘆之深也自中代已降淳朴既漓賢不肖混淆莫能兩辨臣以為天下之事統而計之善而不可以為惡者十一二焉惡而不可以為善者十一二焉其間六七之多率中人也法令修明則賢人多也懲勸不精則貪冒衆也必在上有所施行而在下有所承流者乎且陛下左右惟賢所進惟賢則四目明四聰達不難知矣陛下左右非賢所進非賢則偽行堅偽言辨心益偽矣今陛下必擇忠賢居之左右以為耳目以為腹心矣任忠賢所進者復何疑乎誠若是則管夷吾鮑叔牙友進之不為比祁奚祁午父進之不為私是在陛下有所任之而已制策曰知人則哲從古攸慎九徵恐泥五事難精或望可服人而才非周物或言皆詣理而行則乖方宜陳取舍之端用明一作彰真偽之辨者陛下清問及此非念切求賢取士之道乎夫求賢取士所以備官也設官所以分理衆務也夫得一尺之木將斲以用之必使匠者有一塊之土將埏而器之必使陶者今陛下選人以仁天下皆歸於仁矣選人以義天下皆歸於義矣夫理天下者必以仁與義矣今朝廷用人不以仁而憫黙低柔進人不以義而因循持疑言有不符於行才有不足於用矣陛下雖欲精五事五事何術而精雖欲法九徵九徵焉得而法若是求衆務之理者是以材與陶以土與匠而求器用之得也不亦難乎今朝廷開取士之門不為不廣其中選擇精詳望為俊彦者通於進士中外之重擢清秩選於是者十八九誠有才有器亦盡萃其中然而所采者浮華之名所習者雕蟲之技是以主教化者不道皇王之術官牧守者不知疾病之源豈其有任事之才而無任事之智乎蓋藝非而職異也臣聞古者有豢龍之官夫龍神妙不測變化無窮而能節其嗜欲察其動息擾而制之無所不得者蓋代襲其官述修其業也楚人之操舟冀人之乘馬豈盡性哉必習而善矣今縱未能大更其事苟明殿最考績之科驅天下之人於修効飭行之地假如任某官著某行立某事舉某善雪某寃必擢而遷之又能著某行立某事舉某善雪某寃又擢而遷之蔑然無聞不待罪而黜之則下無蔽善黨惡之情矣下無蔽善黨惡之情則賢者不進於朝廷復何往也安有言行相乖才望不稱者乎制策曰至於朝廷之闕四方之弊詳延而至可得直書退有後言朕所不取者臣陳帝王之道於前矣陛下又埀問以朝廷之闕四方之弊豈不欲躋人於善道補政之闕遺哉臣又陳取士任賢之道矣陛下誠能任賢於上待人於下朝廷豈有闕而不修四方焉有弊而不去何必備繁細之事以干聰明者矣夫有天下者莫不欲使人富使人夀使人遷善使人無惡統四夷於荒外正百事於朝廷夫欲人之富莫若厚耕殖欲人之夀莫若和陰陽欲人遷善莫若明勸賞欲人無犯莫若慎刑罰服四夷莫若修文徳正百事莫若任忠賢忠賢不任雖日親衆務百事其得而正文徳不修雖日致干戈四夷其得而服刑罰不慎雖日殺千人奸盗其得而止勸賞未明雖日爵千人禮樂其得而修寃濫未盡雪隂陽莫得而和浮屠未盡去耕殖莫得而厚此六者政之大端也伏惟陛下念之抑臣又聞非知之艱行之惟艱陛下懼化之未光懼徳之未洽懼一物之失所懼衆政之有乖訪遺闕於下臣張條目於清問凡前強對者莫不備陳所得則陛下知之不難矣在行之何如耳臣又以天下之事小大萬端陛下深居九重廣有四海安得勞心神於思慮之外極聖明於視聽之表臣願陛下為一事必師於古行一道必法於天明日月之光正星辰之位降雨露之澤振雷霆之威内得夔龍掌萬幾之務外選方召視百事之成利於上者必慮於害人擇疑作懌於志者必求諸非道則天下之望慰微臣之志塞矣謹對文苑英華卷四百九十
