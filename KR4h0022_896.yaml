body:
  text: 文苑英華卷八百九十七宋李昉等編職官五兵部尚書王紹碑一首贈禮部尚書王端碑一首贈吏部尚書武就碑一首兵部尚書王紹神道碑李絳元和九年冬十一月晦銀青光祿大夫兵部尚書判户部事上柱國太原郡公食邑二千户王公殁于位君失所重人懷其舊大事在戎以寧禍亂公實居兵部聚人曰財以遷有無公實領地官天子以兵賦之柄畀于公公以忠勞之力事于上垂玉佩纍金印錫圭錫劒書社開國鬱積公望綢繆主恩出入三朝始終二紀非重而何非舊而何公諱紹字德素其先秦將剪之後剪孫離楚漢之際以秦圍趙死于師子孫家于太原世為令族曽祖威衡州耒陽令祖思獻襄州襄陽令父瑞工部員外郎及公貴纍贈禮部尚書咸以盛時沉於下位積有惇德宜生逹人公尚書第三子也少以厚實為士友所重太師顔魯公守吳興特器之表授武康尉相國蕭徐公察守馮翊並隨府授檄丁繼太夫人憂服除纍授殿中侍御史江西觀察推官遂踐臺閣自倉部員外郎遷户部兵部郎中專判户部事未半嵗超拜户部侍郎寵賜金紫復加朝散大夫即舊官判度支特遷户部尚書所領仍舊順宗諒暗姦豎竊柄拜工部尚書以錢穀自闕俾去異已誠私計也上即位天下文明彛倫攸敘檢校吏部尚書東都留守判都省事兼御史大夫充東都畿汝州都防禦使保釐東郊鎮衛舊都風令既行姦盜出奔遷檢校尚書右僕射徐州刺史兼御史大夫充武寧軍節度度支營田兼徐泗宿濠等州觀察處置等使居鎮六年復徴拜兵部尚書明年春詔兼判户部事在位三嵗享齡七十有二徹席于長安永樂里之私第優詔追贈尚書右僕射長子前門下省典儀玄泰次子劒南東川節度掌書記大理評事攝監察御史玄質幼子前右威衛倉曹參軍玄弼等克稟詩禮備著文行以十年秋八月四日奉窀穸于萬年縣之洪固鄉以夫人贈西河郡夫人李氏相袝焉夫人故河南少尹知府事贈工部侍郎造之長女茂于懿範歸于令人先公而殁距兹十九年矣異時同穴周公之制也夫君子之行己事上也必執心而端其始立事而保其中踐道而要其終當建中末盜起轂下乘輿南狩巴梁厄區廥藏空虛武旅氣下德宗色動公時為御史大夫包佶水陸運鹽鐡判官懷章表披荆棘懸束車馬陵踐山谷達本府之誠懇策書獻當使金綵縑帛爛若波濤積如丘陵上於是敷大號以布天地之施士由是濡厚澤以奮雷霆之用將加寵授以奬忠勞公方以國難疾疑作疚懷求以詔書復命致逺之度當時所稱豈不曰有其始乎貞元中公以材智任職忠勤注意不疑可以進退海內之士可以綰攝天下之柄人心所傾台位如寄公理財以義下不厭其取處權以道上不惡其專內守持盈之誡外𢎞推美之度及門而進與公同升布于顯列由乎隂陟誠無二事績著一心豈不曰有其中乎元和初徐方喪師帥人怙亂樂于禍以幸其利鼓其變以成其私氛沴已凝氣焰方作公授鉞以出投袂而馳倍道而乘其未備輕騎而出其不意先迷得主大衆歸心於是安進達以三百騎叛於河城械繫而行乎軍令唐重靖以一千人奔於桶橋檄召而收其武力散私積以勞賞發義徒以祛弊推以誠信滌其疵瑕頑固革心疆內如春武經戎略存為故事豈不曰有其終乎是三者忠存于國政在於人遺績未盡美化猶新况乎顯持世權隂行相事造膝承顧沃心獻議注百辟之耳目奔九流之車騎入司國賦之重出膺邦閫之寄考終厥命歸全于位非夫貞固幹事明哲保身曷以臻於是乎然則篆琬琰表陵谷庶乎實德宜無愧辭其洪纎之迹顯晦之用應機之速奮才以光赫其位得君以薰灼于時備用于隴西之狀精核於𢎞農之志今所書大者逺者而已文有詳略蓋春秋之義焉銘曰天賦才兮遇有期臣擇君兮審厥時公之達兮世所資道之行兮人罕窺管國權兮家以肥庭邦賦兮物不欺人意傾兮主念隨隂德及兮顯命施龍上空兮盜乘機位陽尊兮姦用竒聖運啓兮大人造王氣蕩兮英風掃用邦鎮兮徐方道洛邑思兮彭城禱順者化兮叛者討肅如霜兮偃如草中外便兮恩寵殊遷司馬兮領司徒趨丹墀兮伏青蒲杜私門兮闢公途期方逺兮帝命俞運何屈兮吾道孤松楸列兮龜筮符琬琰琢兮陵谷虞往矣已焉兮噫􅐵嗚呼故尚書工部員外郎贈禮部尚書王公神道碑權德輿今皇帝始初清明永貞紀號追命故工部員外郎王公為華州刺史改元元和之明年再命為禮部尚書裕蠱之風訓漏泉之慶澤父所以教忠於子臣所以移孝於君人道之極盡於是矣公諱端字某太原人曽祖景肅皇澧州刺史祖威德州司馬父思獻襄陽令公方嚴有志尚沉粹潔清不流於俗舉進士宏詞連中甲科授崇文館校書郎纍遷監察御史殿中侍御史工部員外郎其於奉朝請之外或介隴坻或晉洛邑以疾乞告遇安祿山反書聞南浮集作遊江湖自適其適乾元己亥奄至大病悲集作􅐵夫自開元天寶間萬方砥平仕進者以文講業無他蹊徑集作遂薦紳之倫望二臺如登青天公與河南元德秀天水閻仲璵同嵗中正鵠其後冠惠文趨建禮憲章奏議與名聲俱當時士君子猶以未充量為歎其文峻清不汨於波流者還一齋記惠上人碣銘極妙虛空深入無際嘗與故太師顔魯公暨柳郎中芳陸員外據殷永寧寅為莫逆之交陸嘗言王之莊柳之辨殷之介皆希代鴻寶知言者以為實録有三子集作有子三人長曰綽入道精修為桑門上士次曰紓以文行薦實歷官集作右補闕起居郎右司員外郎庫部郎中次曰紹本名犯皇帝諱而更焉忠厚宏裕為德宗所器厯仕户部侍郎兵部二尚書咨俞關決過於宰府大政密議須其一言持平以有守樹善而不伐天下之人謂之長者睿聖繼明以檢校吏部尚書為東都留守東都畿內防禦使以檢校右僕射為徐州刺史武寧軍節度使元和七年入覲復為兵部尚書俄判户部事四征六職烜赫尊大故公再有追賜集作錫之命夫人亦纍贈隴西郡太夫人龍泉魚軒賁飾乎𡨕𡨕之下名教德器有哀有榮孝理之感人深矣初公之捐館也行次信州瘞于玉山前此夫人殁于洛師窆于潁陽僕射竭其誠信日月有時矣不幸薨落理命其三子嗣事焉繇是僕射之孫曰門下省典儀玄泰試大理評事攝監察御史玄質右威衛倉曹參軍玄弼等窮毒在疚護王父母之輤車間關跋履泣問蓍蔡以八月某甲子袝於萬年縣鳯棲原克纂先志禮無違者而又哀請父黨篆兹祖德永揭神道用無愧辭集作愧蕪用辭銘曰懿懿王君黃中有文清時發身師集作舒翼卿雲執憲平明含香馥集作馝馚慶靈下鍾復大其門追錫儀曹徽卓顯尊鳯棲古原龜策不諼泣祔雙魂禮成孝孫刻銘斯碑君子之墳故中散大夫殿中侍御史潤州司馬贈吏部尚書沛國武公神道碑前人種德考祥賢人積厚之業尊仁安義君子揚名之孝其敬養也諭之於道其貽慶也教之以忠𢎞保乂於元臣集寵靈於追命見之於尚書武公矣公諱就字廣成沛國人周室之興本於忠厚趙王之裔厥有勳賢元魏步兵唐宰相世系表作五兵尚書鴈門朔方雲中馬邑四郡太守洽啓封晉陽田祿益大生國子祭酒受陽公諱神龜受陽四葉至太原王諱華太原生鄼國節公諱士逸節公生河間郡王諱仁範河間生潁川武烈王諱載德代以文武上才為將軍二千石識芒碭之氣密贊皇圖承沙麓之祥公封戚里潁川生考功員外郎修文直集作殿學士諱甄字平一以字行於時未弱冠有重名閎覽博學集作閲覽博古為人之集作文龜玉在天后朝纍徴不起以公族好爵為懼常晦其明與桑門大士修無生法中宗復辟甫踐周行載筆論思特盛淵雲之選賦詩感激必以吕霍為誡雖位有陟降而道無磷緇叢滋後昆纂服遺烈公即考功府君第三子也肅而清簡而廉忠方伉直信集作絶厚強固博洽文誼周通憲法始以方聞之士對詔策佐宫衛李梁公峴之守右扶風也表為兵曹掾宣皇在岐供侍有勞改永樂一作榮令歷河中府户曹轂下求吏轉萬年丞建陵復土推擇充奉拜醴泉令朝廷嘉其才擢為殿中侍御史修起居注集作矩度堅明不回時朝廷集無此二字戎車方駕泉貨力屈皇華載馳董荆衡漢沔之賦以嚴見憚為吏議所侵貶郴縣尉句容丞二地有南嶽三茅靈仙遺迹於是浩然自得以道為徒方解纓紱以暢天理且曰窮與通在吾靈龜耳外物其如豫何本道觀察使挹其風聲薦授祕書郎潤州團練使入為京兆尹集作法曹加中散大夫忽忽不樂求為潤州司馬滿嵗徙家嵩洛愈尚夷曠中朝名卿大夫四方賢侯通人多與公為道義之交賈太傅魏公用清靜理東郡以傾蓋集作蓋公待公亦既戾止俄然化性時貞元六年冬十一月享年七十八三字集作八十理命終制視道門儀法以明月之晦降體魄于邙山北原有靈鶴百數徊翔嘹唳其休徴歟其玄契歟惟公以集無以字文學政事涖官十二次冠神羊駕四牡剛腸正詞臨事風生君子之方有忤有合或忌公之直或愛公之才行藏牽乎時而道不屈得喪宜乎已而神益王嘗與張禮部謂元容州結歌詩唱和著文集五卷自有途中之適異乎澤畔之詞前夫人隴西李氏生長子談而殁談為金壇令士行清修官屈其志繼夫人汝南縣君周氏中書舍人思鈞之孫單父令瑛之女專柔淑愼以正家道有子曰元衡文行𢎞懿靜深周密遵道而行有儀可象代天工以熙帝載賦明命以贊皇極元和三年春正月由户部侍郎拜門下侍郎集無此五字同中書平章事秋八月兼領户部侍郎事冬十月又以門下侍郎檢校吏部尚書成都尹劒南西川節度觀察西川八國瀘南安撫等使自文水縣男徙封至臨淮郡公上以井絡之下新去湯火亦既震耀是圖生殖於是輟台宰之重為慈惠之師黃樞金鉉鏚鉞秬鬯旬嵗間三錫命烜赫嘉會綢繆樞極信嚮禮賜冠于羣倫豈非公之道厄不申而昌大於後抑義方家法固有類乎公捐館四年而夫人殁其明年臨淮公乃舉公之穴集作窆與夫人之喪改葬緱氏潁川王之兆從先封以敘昭穆禮也初臨淮公至監察御史而孤其後再為中執法朝典覃恩贈公杭州刺史其司大政也再贈公吏部尚書夫人始追封文水縣太君益封汝隂郡太夫人顧復罔極之報哀榮歸厚之禮成於德器名教稱之臨淮公考功府君之謫掾于吳也與德輿王考府君有僑札之歡油素斯在音徽未泯德輿獲與相君交代為地官小司徒陪外廷之末議承宰府之寬政有命論撰忘其菲薄刻兹樂石以表鮮原銘曰君子之道剛方潔矩或消或長或默或語於惟尚書執憲天朝密侍殿內肅清羣寮鋒鋩肯綮湖海飄颻以恬養智無落吾事㳷合虛玄脫遺聲利劒題告第寵靈斯備玄衮介圭流光所自煌煌台司天子是毗廕庥岷峨灑濯癘疵視集作顧此忠力無非孝思緱氏峻原集作維原峻厚兮幽宅悠久崔嵬介石兮夭嶠螭首鏤嘉聞兮以示厥後文苑英華卷八百九十七
