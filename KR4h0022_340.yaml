body:
  text: 文苑英華巻三百四十宋李昉等編雜贈江總一首任華二首杜甫四首李白一首張謂一首崔顥一首王季友三首僧鸞一首贈袁洗馬篇見二百六十六巻江總雜言贈杜拾遺任華杜拾遺名甫第二才甚竒任生與君别别來幾多時何曽一日不相思杜拾遺知不知昨日有人誦得數篇黄絹詞吾恠異竒特一作其特異借問果稱是集作果然稱杜二之所為勢攖虎豹氣騰蛟螭滄海一作波無風似鼔蕩華岳平地欲奔馳曹劉俯仰慙大敵沈謝逡廵稱小兒昔在帝城中盛名君一箇諸人見所作無不心膽破郎官叢裏作狂歌丞相閣中常醉卧前年皇帝歸長安承恩闊步青雲端積翠扈遊花匼匝披香寓直月團欒英才特達承天睠公卿誰不相欽羡只縁汲黯好直言遂使安仁却為掾如今避地錦城隅幕下英寮每日相隨集作就提玉壺半醉起舞捋髭鬚乍低乍昂傍若無古人制禮但為防俗士豈得為君設之乎而我不飛不鳴亦何以只待朝廷有知己亦曽讀却無限書拙詩一句兩句在人耳如今㸔之總無益又不能﨑嶇傍朝市且當事耕稼豈得便從爾南陽葛亮為友朋東山謝安作隣里閒常把琴一作抱琴弄悶即携樽起鶯啼二月三月時花發千山萬山裏此中幽廣無人知火急將書慿驛吏為報杜拾遺雜言贈李白前人古來文章有奔逸氣聳髙格清人心神驚人魂魄我聞當今有李白大鵬賦鴻猷文嗤長卿笑子雲班張所作璅細不入耳未知卿雲得在嗤笑限否登廬山觀瀑布海風吹不斷江月照還明余愛此兩句登天台望渤海雲垂大鵬飛山壓巨鼇背斯言亦好在至於他所作多不拘常律振起擺騰既俊且逸或醉中掃紙或乗興一作興來走筆手下忽然一作有片雲飛眼前劃見孤峯出而我有時白日忽欲睡覽之不覺歘然起攘臂任生知有君君還知有任生未中間聞道在長安及余戾止君已江東訪元丹邂逅不得見君面毎常把一作有時酒向東望良乆見説往年在翰林胷中矛㦸何森森新詩傳在宮人口佳句不離明主心身騎天馬多意氣目送飛鴻對豪貴承恩詔入凡幾廻待詔歸來仍半醉權臣妬盛名羣犬多吠聲有勅放君却歸隠淪處髙歌大笑出關去且向東山為外臣諸侯交迓馳朱輪白璧一䨇買交者黄金百鎰相知人平生傲岸其志一無此二字不可測數一無此字十年為客未曽一日低顔色八詠樓中坦腹眠五侯門下無心憶繁花越臺上細柳吳宮側緑水青山知有君白雲明月偏相識養髙兼養閒可見不可攀莊周萬物外范蠡五湖間又聞一作人傳訪道滄海上丁令王喬時一作每還往蓬萊經是曽到來方丈豈唯方一丈伊余每欲乗興逺相尋江湖擁隔勞寸心今朝忽遇東飛翼寄此一章表胷臆儻能報我一片言但訪任華有人識入奏行贈竇侍御時統檢察使杜甫竇侍御驥之子鳯之雛年未三十忠義俱骨鯁絶代無烱如一叚清氷出萬壑置在迎風寒露之玉壺柘一作蔗漿歸厨金盌凍洗滌煩熱足以寧君軀政卞圜杜詩注作整用䟱通合典則戚聨豪貴躭文儒甲兵集作兵革未息人未蘇天子亦念西南隅吐蕃慿陵氣頗麤竇氏檢察應時須一作才能俱運糧䋲橋壯士喜斬木火井窮集作寒猿呼八州刺史思一戰三城守邉却可圖此行入奏計未小宻奉聖主集作㫖恩宜殊繡衣春當卞氏註作飄飄霄漢立綵服日向卞氏註作燦燦庭闈趨一有開濟人所仰飛騰時正須十字省郎京尹必俯拾江花未落四字卞氏注作多暇還成都携酒肯訪浣花老為君著衫捋髭鬚十四字一作肯訪浣花老翁無為君酣酒滿眼酤與奴白飯馬青芻徒步歸行贈李特進借馬自鳯翔往鄜州途經邠州作前人明公壯年值時危經濟實藉英雄姿國之社稷今若是武定禍亂非公誰鳯翔千官且飽飯衣馬不復能輕肥青袍朝士最困者白頭拾遺徒步歸人生交契無老少論心集作交何必先同調妻子山中哭向天須公櫪上追風驃此詩三百五十巻重出今已削去贈嚴二别駕相逄集作從歌前人我行入東川十步一回首成都亂罷氣蕭瑟浣花草堂亦何有梓中卞氏杜詩作州豪貴卞氏作俊大者誰本州從事知名乆把臂開樽飲我酒酒酣擊劒蛟龍吼烏㡌拂塵青螺卞氏注作織又注作騾粟紫衣將炙緋衣走銅盤燒蠟光卞氏注作炎吐日夜如何其初促膝黄昏始扣主人門誰謂俄頃卞氏注作我傾膠在漆萬事盡付形骸外百年未及集作見歡娛畢神傾意豁真佳士乆客多憂今愈疾髙視乾坤又可卞氏注作何愁一軀交態何悠悠垂老遇君未恨晩似君須向古人求贈裴施州前人廊廟之具裴施州宿昔一逄無此流金鍾大鏞在東序氷壺玉衡集作珩懸清秋自從相遇减集作咸多病三嵗為客寛邉愁堯有四岳明至理漢二千石真分憂幾度寄書白監北苦寒贈我青絲集作羔裘霜雪回光避錦繡蛟龍集作龍蛇動篋蟠銀鈎紫衣使者辭復命再拜故人謝佳政將老已失子孫憂後來况接才華盛遥憶書樓碧池映集無此句憶舊遊贈集作寄誰李白憶昔洛陽薰糟邱為余天津橋南造酒樓黄金白璧買歌笑一醉累日集作月輕王侯海内賢豪青雲客就中與君一作一遇又作一見心莫逆廻山轉海不作難傾情倒意無所惜我向淮南攀桂枝君留洛北愁夣思不忍别還相隨相隨迢迢訪仙城三十六曲水廻縈一溪初入千花明萬壑度盡唯松聲銀鞍金絡到平地漢東太守來相迎紫陽之真人邀我吹玉笙飡霞樓上動仙樂嘈然宛似鸞鳯鳴袖長管吹欲輕舉漢東集作中太守醉起一作酣歌舞手持錦袍覆我身我醉横眠枕其股當筵意氣凌九霄星離雨散不終朝分飛楚關山水遥余既還山尋故巢君亦歸家一作思歸渡渭橋君家嚴君勇貔虎一作武作尹并州遏戎虜五月相呼度太行摧輪不道羊腸苦行來京北一作北京嵗月深感君貴義輕黄金瓊盃綺食青玉案使我醉飽無歸心時時出向西城集作城西曲晉祠流水如碧玉浮舟弄水簫皷鳴微波龍鱗莎草緑興來携妓恣經過其若楊花似雪何紅粧欲醉宜斜日一作如花落百尺清潭冩翠蛾翠蛾嬋姢初月輝美人更唱舞羅衣清風吹歌入空去歌曲自繞行雲飛此時歡一作行樂難再遇西遊因獻長楊賦北闕青雲不可期東山白首還歸去渭水橋南集作渭橋南頭一遇君鄼臺之北又離羣問余别恨今多少集作鸎飛求友滿芳樹落花春暮爭集作送客何紛紛言亦不可盡情亦不可極集作情亦不可盡言亦不可極恐非呼兒長跪緘此詞寄君千里遥相憶贈喬林張謂一作劉眘虗去年上策不見收今年寄食仍淹留羡君有酒能便醉羡君無錢能不憂如今五侯不愛文粹作待客羡君不過文粹作問集作愛五侯宅如今七賢方自尊羡君不過七賢兩用七賢諸本皆作七貴門人生集作丈夫㑹應有知己世上悠悠何足論此詩三百五十三巻重出前已削去贈王威古見二百五十巻崔顥代賀令譽贈沈千運見二百五十二巻王季友滑州贈崔士灌前篇作髙士見二百三十巻前人贈一作酬李十六岐見二百四十四巻前人贈李粲秀才字輝册僧鸞隴西輝冊真才子搜竒探險無倫比筆下銛磨巨闕鋒胸中静灧西江水哀絃古樂清人耳月露漙漙激一作激寒哭秋鬼苔地無塵到曉吟杉松老葉風乾起十軸示余三百篇金碧爛光燒蜀牋雄芒逸氣測不得使我躑躅成狂顛大郊逺濶空無邉凝明淡緑收餘煙曠懐相對景何限落日亂岑清倚天又驚大舶帆髙懸行濤擘浪陵飛仙回首瞥見五千仞撲下香爐瀑布泉何事古人誇八斗焉敢今朝定妍醜颯風驅雨暫不停始向場中稱大手駿如健鶻鶚與鵰拏雲獵野翻重霄狐狸竄伏不敢動却下䨇鳴當迅飈愁如湘靈哭湘浦咽咽哀音隔雲霧九嶷深翠轉巍峩仙骨寒消不知處清同野客敲越甌丁當急響涵清一作中愁鸞雛相引呌未定霜結夜䦨仍在樓髙若太空露雲物片白激疑青皆髣髴仙鶴閑從淨碧飛巨鼇頭戴蓬萊出前莗歌詩唯翰林神仙老格何髙深鞭馳造化繞筆轉燦爛不為酸苦吟夣乗明月清沉沉飛到天台天姥岑傾湖湧海數百字字字不朽長摐金此日移一作多君可儔侣堆珠疊璣滿𤣥圃終日並轡遊崑崙十二樓中宴王母文苑英華巻三百四十
