body:
  text: 文苑英華卷二百六十二宋李昉等編寄贈十六張祜七首李洞九首方干二十三首李白一首李羣玉六首陳陶十一首寄朗州徐員外張祐江嶺昔飄蓬人間值俊雄關西今孔子城北舊徐公清夜遊何處良辰此不同傷心幾年事一半在湖中贈薛鼎臣侍御前人一命前途逺雙曹小邑間夜潮人帶集作到郭春霧鳥啼山淺瀨橫沙堰髙巖峻石班不堪曽倚棹猶復夢升攀寄盧載前人故人盧氏子數載曠佳期少見雙魚信多聞八米詩侏儒他甚飽欵段爾應羸勿謂今劉二相逢不熟槌寄靈徹上人此詩已見二百二十三卷投常州從兄中丞前人扁舟何所往言入善人邦舊愛鵬摶海今聞虎渡江土因為政樂儒為說詩降素履氷容靜新詞玉韻樅金魚聊解帶畫鷁稍移樁邀妓思集作促坐邀逃席留賔命倒缸吏材誰是伍經術世無雙廣厦當宏構洪鍾併待撞成龍須讓邴展驥莫先龎應念宗中末秋螢照一忩贈淮南將前人年少好風情垂鞭眦睚行帶金獅子小裘錦麒麟獰揀匠裝銀鐙堆錢買鈿筝李陵雖效死時論亦輕生寄獻蕭相公前人東去江干集作山是勝逰鼎湖興集作相望不堪愁謝安近日違朝㫖傅說當時允帝求暫向聊城飛一箭長為滄海繫扁舟分明此事無人見白首相看未肯休贈龎鍊師李洞家住涪江漢語嬌一聲歌戞玉樓簫睡融春日柔金縷粧發秋霞戰翠翹兩臉酒醺紅杏妬半胸酥嫩白雲饒若能携手隨仙令皎皎銀河渡鵲橋述懷二十韻獻覃疑相公前人帝夢求良弼生身屬聖明青雲縣器業白日貫忠貞一作精靄靄隨春動欣欣共物榮靜宜浮競息坐覺好風生萬國聞應躍千門望盡傾瑞含楊栁色氣變管絃聲百辟尋知度三階正有程魯儒規藴藉周誥美和平碧水遺幽抱朱絲寄逺情風流秦印綬儀表漢公卿忠讜期登用回邪自震驚雲開長劍倚路絶一峰橫九野方無事滄溟本不爭國將身共計心與衆為城早晚中條下紅塵一顧清南潭容伴鶴西笑忽遷鶯折樹恩難報懷仁命甚輕二年猶困辱百口望經營未在英侯選空勞短羽征知音初疑作祈相國從此免長鳴感知上刑部鄭侍郎前人門掩白雲司蜀都髙卧時鄰僧㸃寒燭宿鳥動秋池帝誦嘉蓮表人吟寶劍詩石渠流月斷畫角截江吹間出黃金勒前飛白鷺鷥公心外國說重望兩朝持净蘚斜圭影孤窗響錫枝興幽松雪見心苦硯氷知緣丈蟲聲切過門馬足遲漏殘終卷讀日下大名垂平磧容鵰上仙山許狖窺數聫金口出死免愧邱為感恩書事上鳳翔舉義司徒相公前人積雪峰西遇奬稱半家寒骨起溝塍鎮時賢相回人鏡報德慈親㸃佛燈受鉞已聞諸國靜坐籌重見大河澄功居第一圖煙閣依舊終南滿杜陵上司空員外前人禪心髙靜似疏慵間客經過不厭重藤杖幾携量積雪玉鞭曽把數髙峰夜眠古卷疑作巷當城月秋直清曹入省鍾禹鑿故鄉歸未得河聲聒老兩三松春日寄書事一二知已前人浴馬池西一帶泉開門物景似林川朱衣掩竹人歸縣白首遺泥鶴上天索米夜燒風折竹無車春飬雪藏鞭縉紳處士知章句忍使孤窗枕淚眠廢寺間居寄懷一二罷省歸郎前人貧居廢廟冷吟煙無力爭飛類病蟬槐省老郎䝉主棄月波一作孤客望誰憐稅房兼得調猿石買地仍分浴鶴泉處世堪驚又甚愧一陂山色不言錢贈昭應沈少前人行宫接縣判雲泉袍色雖青骨且仙鄠杜憶過梨栗寺瀟湘曽棹雪霜天華山僧别留茶鼎渭水人來鎖釣船東送西迎終幾考新詩覔得兩三聫贈髙僕射自安西赴闕一作贈功臣前人征蠻破虜漢功臣提一作携劍歸來萬里身間倚凌煙金柱看形容惆悵一作消瘦老於真將謁商州李集作吕郎中道出楚州獻韋集作章中丞方干江流盤復直浮棹出家林商洛路猶逺山陽春已深青雲應可望白髮未相侵才小知難薦終勞許郭心贈江南僧前人忘機室亦空禪與沃州同唯有半庭竹能生竟日風思山海月上出定印香終繼後傳衣者還須立雪中贈葉尊師此詩已見二百二十九卷寄于少監前人修持精一作清苦振家聲衆鳥那知一鶚情躡履三千皆後學摶風九萬即前程名將日月同時朽身是山河應世一作數生從此雲泥更懸濶演公集作漁翁不合見公卿寄李頻前人衆木又搖落望君還不還軒車在何處雨雪滿前山思苦文星動鄉遙釣渚間明年見名姓唯我獨何顔寄普州賈司倉島前人亂山重復疊何處訪先生豈料多才者空垂不第集作世名間曹猶得醉薄俸亦勝耕莫問吟詩石年年芳草平中路寄喻鳬先輩前人求名如未遂白首亦難歸送我樽中集作前酒典君身上衣寒蕪隨楚盡落葉渡淮稀莫笑集作嘆干時晚前心豈便飛暮冬書懷呈友人前人空為梁甫吟誰竟是知音風雪生寒夜鄉園來疑舊心滄江孤棹逈白閣一鍾深君子久忘我此懷甘自沈東溪别業寄吉州段郎中此詩已見三百十八卷前人獻王大夫前人都緣聲價振皇州髙卧中條不自由早赴急徵來鳳闕常陪內宴醉龍樓鏘金五字能援筆釣玉三年信直鈎必恐借留應不得集作終不遂越人相顧已生集作先愁上集作贈處州段郎中前人幸見仙才領郡初郡城孤峭似仙居林集作松蘿色裏登臺閣瀑布聲中閲簿書德重自將天子合情髙元與世人疏寒潭是處深集作清連底賔席何心望食魚茅山贈髙集作洪拾遺前人聖代諫臣停諫舌求還集作歸故里傲雲霞溪頭講樹遺一作纜漁艇篋裏朝衣盡集作輸酒家但愛身間辭祿俸那嫌歲計在桑麻我來幸與諸生異問答時容近絳紗上越州楊嚴中丞前人連枝棣蕚世無雙未秉鴻鈞擁大邦折桂早聞推獨步分憂暫輟過重江晴尋鳳沼雲中樹思繞稽山枕上窗試把十年辛苦志問津求拜碧油幢獻王大夫前人髙情不與俗人知耻學諸生取桂枝荀宋五言行世早巢由三詔出溪遲大夫佳句云珠箔卷繁星金樽㵼月明行於世操心已在精微域落筆皆成典誥詞一鶚難成燕雀伍非熊本是帝王師賢臣雖藴經邦術明主終無諫獵時莫道百僚憂禮絶兼聞七郡怕天移直緣材力頭頭贍專被文星步步隨不信重言通造化須臾便可變榮衰謝王大夫奏表前人非唯言下變榮衰大海可傾山可移如剖夜光歸暗室似驅春氣入寒枝死灰到底翻騰熖朽骨隨頭却長肥便殺微躬復何益生成恩重報無期處州獻盧員外前人才下軺車即歲豐方知盛德與天通清聲漸出寰瀛外喜氣全歸教化中落地遺金終日在經年滯獄當時空直緣後學無功業不慮文翁不至公贈李郢端公前人非惟孤峭與飛動集作世絶吟處斯須能變通物外搜羅添一作歸大雅毫端剪削有餘功山川正氣侵靈府雪月清輝引思風别得人間上升術丹霄路在五言中贈趙常六韻集作贈趙崇侍御前人貴達合逢明聖日風流又及少年時才因出衆人皆嫉勢欲摩霄自不知迢遞集作正直早年聞苦節從容此日見清規却教鸚鵡呼桃葉便遣嬋娟唱竹枝間話篇章倚燭久醉迷歌舞出花遲雲鴻别有回翔便應笑啁噍一作啾燕雀卑山中言事八韻寄李支使前人豈知經史深相悮兩鬢垂絲百事休受業幾多為弟子成名一半作公侯前時射鵠徒拋箭此日求魚未上鈎竹裏斷雲來枕上巖邉片月在牀頭過庭急雨和花落繞舍澄泉帶葉流緬想逺書聆鵲喜窺尋嘉果覺猿偷舊詩改處空留韻新醖嘗來不滿篘阮瑀如能問寒餒風光當日入滄洲山中言事寄贈蘇判官前人寸心似火頻求薦兩鬢如霜始息機隔岸雞鳴春耨去鄰家犬吠夜漁歸倚松長嘯成疏拙拂石欹眠絶是非執爨縱曽炊橡實紉針爭解補荷衣常憑早月來張燭亦假清風為掩扉多是集作謝元瑜憐野賤時回車馬發光輝寄台州孫從事百篇登第初授華亭尉前人聖代科名酬志業山川秀色助神機梅真入仕提雄筆阮瑀從軍著綵衣晝寢不知山雪積春逰應趂集作趣夜潮歸相思莫訝音書絶鳥去猶須纍日飛贈孫百篇前人御題百首思縱橫半日功夫舉世名羽翼便從吟處出珠璣續向筆端生莫嫌黃綬官資少必料青雲道路平才子風流復年少無愁髙卧不公卿贈㑹稽張少府前人髙節何曽似任官藥苗香潔備常餐一分酒户添應集作猶得五字詩名隱即難笑我無媒成集作生鶴髮如君有夢一作意憶漁竿明年莫遣集作便還家去鏡裏雲山且共看代佳人寄翁參樞先輩李白等間經夏復經寒夢裏驚嗟豈暫安南國風光當世少西陵江浪過江難周旋小字挑燈讀重疊遙山隔霧看直是為君餐不得書來莫說更加餐此詩總目及李集皆不載惟英華諸本有之長沙春望寄涔陽故人李羣玉清明前集作别後雨晴時極浦空嚬一望眉湖畔春山煙黯黯雲中逺樹墨集作黑離離依微水戍聞疏鼓掩映河橋集作沙林見酒旗風暖草長愁似醉行吟無處寄相思望月寄人集作懷友前人浮雲卷盡月朣朧直出滄溟上碧空盈手氷集作水光寒不濕流天素彩集作影靜無風酒花蕩漾金樽裏棹影飄颻玉浪中川路正長難可越美人千里思何窮辱綿州于中丞書信前人一緘垂露到雲林中有孫陽念驥心萬木自凋山不動百川空集作皆旱水集作海長深風標想見瑶臺鶴詩韻如聞淥水琴他日縱陪池上酌已應難到暝猿吟渴疾漸加酒户日减寄長沙許侍御前人二集作三年文㑹許追隨和遍南朝雜體詩未以綵毫還郭璞乞留殘錦與􅏀遲竹齊琴酒歡成夢水寺煙霞相集作賞對誰今日秋風滿湘浦只令集作應搔首詠瓊枝寄張祜祜亦未面頻寄聲相聞前人越水吳山任興行五湖雲月挂髙情不逰都邑稱平子只向江東作步兵昔歲芳聲到童稚老年佳句遍公卿如君氣力波瀾地留取隂何沈范名寄友人前人野水青山雪後時獨行村落更相思無因一向溪橋醉處處寒梅映酒旗寄兵部任畹郎中陳陶常思劍浦越清塵豆蔲花紅十二春崑玉已成廊廟器澗松猶是薜蘿身雖同橘柚依南土終愧魁罡近北辰好向昌時薦遺逸莫教千古弔靈均贈江南從事張侍郎疑作御前人平南門館鳳凰毛二十華軒立最髙幾處談天致雲雨早時文海得鯨鰲姻聫紫府蕭窗貴職稱青錢繡服豪江徼無虞才不展可疑杯終日詠離騷贈溫州韓使君前人康樂風流五百年永嘉鈴閣又登賢嚴城鼓動魚驚海華屋樽開月下天內史筆鋒光案牘鄢陵詩句滿山川今來誰似韓家貴越絶麾幢鴈影連閒居寄太學盧璟博士前人無路青冥奪錦袍耻隨黃雀住蓬蒿碧雲夢後山風起珠樹詩成海月髙久滯鼎書求羽翼未忘龍闕致波濤間來長得留侯癖羅列樝梨校六韜贈漳州張怡使君前人舊德徐方天下聞當年熊軾繼清芬井田異政光蠻竹符節深恩隔瘴雲已見嘉祥生北户嘗嫌夷貊蠧南薰幾時徵拜征西越學著縵胡從使君贈容南韋中丞前人普寧都護軍威重九驛梯航壓要津十二銅魚尊畫㦸三千犀甲擁朱輪風雲已靜西山寇閭井全移上國春不獨來蘇發歌詠天涯半是泣珠人投贈福建路羅中丞前人越艷新謡不厭聽樓船髙卧靜南溟未聞建水窺龍劍應喜家山接女星三捷楷模光典策一生封爵笑丹青皇恩幾日西歸去玉樹扶疏正滿庭贈江南李偕副使前人世祿三朝壓鳳池桂陵公子漢庭知雷封始賀棠溪劍花府尋邀玉樹枝幾日坐談誅叛逆列城歸美見歌詩從軍莫厭千場醉即是金鑾寵命時賀客府常中丞天府賢兄新除黔南經略前人蓬瀛簪笏舊聫行紫極差池降寵章列國山河分鴈字一門金玉盡龍驤耿家符節朝中美袁氏芝蘭閫外香烽戍悠悠限巴越佇聽歌詠兩甘棠祝疑贈江西周大夫前人否極生大賢九元降靈氣獨立正始風蔚然中興瑞淵淪照三古磊落涵涇渭真貌月懸秋雄詞雷出地具瞻先皇寵欲踐東華貴咫尺時不來千秋鼎湖淚因分三輔職進領南平位報政黃霸慙觀兵吕䝉醉歲星臨斗牛水國嘉祥至不獨蒼生蘇仍兼六騶轡恭聞廟堂略欲斷胸奴臂剗釋自宸衷平戎在連帥時康簪笏冗世梗忠良議丘壑非無人松香有私志三朝倚天劍十萬浮雲騎可使河曲清羣集作郡公信兒戲滄溟用謙德百谷走童稚禦衆付深人參籌須偉器他年蓬蓽賤願附鴛鸞翅旅次銅山途中先寄溫州韓使君前人亂山滄海曲中有橫陽道束馬過銅梁苕華坐堪老鳩鳴髙崖裂熊鬪深樹倒絶壑無坤維重林失蒼昊躋攀寡儔侣扶接念輿皂俯仰栗嵌空無因掇靈草梯疑作睇窮聞戍鼓魂續賴丘禱敞豁天地歸縈紆村落好悠悠思蔣徑擾擾愧商皓馳想永嘉侯應傷此懷抱文苑英華卷二百六十二
