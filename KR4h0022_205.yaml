body:
  text: 文苑英華卷二百五宋李昉等編樂府十四古意三十三首擬古十四首古意三首梁吳均雜虜冦銅鞮征役去三齊扶山剪踈勒傍海掃沉黎光夜悉如一作揮電一作劒光夜如電馬汗盡成泥何當見天子畫地取關西此詩一百九十六卷重出今已削去注異同為一作二胸奴數欲盡僕在玉門關蓮花穿劔鍔秋月掩刀環春機鳴窈窕夏木思一作鳥鳴綿蠻中人坐相望狂夫終不還三西都盛冠蓋九逵塵霧塞中有惡少年伎能専自得玉鞭蓮花紐金苣流星勒聊為路旁人寫鞚長楸北同前王僧孺青絲一作控被燕馬紫艾飾吳刀朝風吹錦帶晚一作落日映珠袍陸離關右客照耀山西豪雖非學詭遇終是任逄遭人生會有死得處如鴻毛寧能若一作偶雞鶩寂寂隱蓬蒿同前劉孝綽燕趙多佳麗白日照紅粧蕩子十年别羅衣雙帶長春樓怨難守玉階悲自傷復此歸飛燕一作對此飛歸燕銜泥繞曲房差池入綺幕上下傍雕梁故居猶尚爾故人何一作安可忘相思昏望絶宿昔夢容光魂交忽在御轉側定他鄉徒然顧一作願枕席誰與同衣裳空使蘭膏夜炯炯對繁霜此詩二百四十七卷重出今已削去注異同為一作同前逶迤臨雲雨蛾眉戲瓊一作瑶臺對酒自嬌笑君王肯下來擊鼓雷闐闐選妓紛呈才錫宴池上子精魄醉不回指日窮所樂豈知殷運開孤舟一遙放層構成塵埃長安古意一首盧照鄰長安大道連狹斜青牛白馬七香車玉輦縱橫過主第金鞭絡繹向侯家龍銜寶蓋承朝日鳯吐流蘇帶晚霞百丈逰絲爭繞樹一群嬌鳥共啼花啼花戲蝶千門側碧樹銀臺萬種色復道交窗作合歡雙闕連甍垂鳳翼梁家畫閣天中起漢帝金莖雲外直樓前相望不相知陌上相逄詎相識借問吹簫向紫煙曽經學舞度芳年得成比目何辭死願作鴛鴦不羡仙比目鴛鴦真可羡雙去雙來君不見生憎帳額繡孤鸞好取開簾帖雙燕雙燕雙飛繞畫梁羅帷翠被鬱金香片片行雲著蟬鬢纎纎初月上鴉鬟淡黃粉白車中出含嬌含態情非一妖童寶馬鐵連錢倡婦盤龍金屈膝御史府中烏夜啼廷尉門前雀欲棲隱隱朱城臨玉道遙遙翠幰沒金堤挾彈飛鷹杜陵北探丸借客渭橋西俱邀俠客芙蓉劔共宿倡家桃李蹊倡家日暮紫羅裙清歌一轉口氛氲北堂夜夜人如月南陌朝朝騎似雲南陌北堂連北里五劇三條控三市弱栁青槐拂地垂佳氣紅塵暗天起漢代金吾千騎來翡翠屠蘇鸚鵡杯羅襦寶帶為君解燕歌趙舞為君開别有豪華稱將相轉日回天不相讓意氣由來排灌夫専權判不容蕭相専權意氣本豪雄青虬紫燕坐生風自矜歌舞長千載自謂驕奢陵五公節物風光不相待桑田碧海須臾改昔時金階白玉堂即今唯見青松在寂寂寥寥楊子居年年嵗嵗一牀書獨有南山桂華發飛來飛去襲人裾古意二首沈佺期盧家少一作小婦鬱金堂海燕雙棲玳瑁梁九月寒砧催木葉十年征戍憶遼陽白狼河北軍一作音書斷丹鳳城南秋夜長誰謂含情一作愁獨不語一作見更教明月對一作照流黃二八月凉風動髙閣三千一作千金麗人卷綃幕已憐地上歇芳菲不見君恩復搖落世上榮枯如轉蓬朝隨阡陌暮雲中飛燕恃寵昭陽殿班姬飲恨長信宫長信宫昭陽殿春來歌舞妾自知秋至簾櫳君不見古時嬴女厭世紛學吹鳳簫乘綵雲含情轉睞向蕭史千載紅顔持贈君同前邢象玉家中酒新熟園裏木初榮停杯欲取醉悒然思友生忽聞有竒客何姓復何名嗜酒陶彭澤能琴阮步兵何須問寒暑徑共坐山亭舉袂祛啼鳥揚巾掃落英心神無俗纍歌詠有新聲新聲是何曲滄浪之水清同前和李侍郎喬知之妾家巫山隔漢川君度南庭向胡苑高樓迢遞想金天河漢昭回更悽然夜如何其夜未央閒花照月愁洞房自矜夫壻勝王昌三十曾作侍中郎一從流落戍漁陽懷哉萬恨結中腸南山羃羃兔絲花北陵青青女蘿樹由來花葉同一根今日枝條分兩處三星差池光照灼北斗西指秋雲薄莖枯緑謝葉憔悴香消花盡色零落美人長嘆艷容萎含情收取摧折枝調絲獨彈聲未移一作調絃獨坐朱顔移感君行坐星嵗遲閨中宛轉今若斯一作苦思誰能為報征人知同前吳少微洛陽芳草向春開洛陽女兒平旦來流車走馬紛相催推一作折芳瑶草向曲臺曲臺自有千萬行重花纍葉間垂楊北林朝日錦明光南國微風蘇合香可憐窈窕女下作邯鄲倡妙舞輕回拂長袖髙歌浩唱發清商歌終舞罷歡無極樂往悲來長歎息陽春白日不少留紅榮一作花碧樹無顔色碧樹風花先春度珠簾粉澤無人顧如何年少忽遲暮坐見明月與白露白露明月夜已寒香衣錦帶空珊珊今日陽春一妙曲鳳凰樓上與君彈同前蔣洌昨夜巫山中失却陽臺女今日粧閣裏獨伴楚王語同前常建井底玉氷動地明琥珀轆轤青絲索仙人騎鳳披綵霞挽上銀瓶照天閣黃金作身雙飛龍口銜明月噴芙蓉一時渡海望不見曉上青樓十二重同前崔皓十五嫁王昌盈盈出畫堂自矜年正小復倚壻為郎舞愛前溪緑歌憐子夜長閒時鬬百草度日不成粧同前六首崔國輔遺却珊瑚鞭白馬驕不行章臺折楊柳春日路旁情此詩一百九十四卷重出今已削去二玉籠薰羅裳著罷眠洞房不能春風裏吹却蘭麝香三湖南與君别湖北憶君歸湖裏鴛鴦起雙雙他自飛四種棘遮蘼蕪畏人來摘殺比至狂夫還看看幾花發五歸來日尚早却欲向芳洲渡口水流急回船不自由六淨掃黃金階飛霜厚如雪下簾彈箜篌不忍見秋月同前李頎男兒事長征生作一作小幽燕客賭一作覩勝馬蹄下由來輕七尺殺人莫敢前鬢如蝟毛磔黃金隴底白雲飛未得報恩不得歸遼東小婦年十五慣彈琵琶㑹歌舞合為羌笛出塞聲使我三軍淚如雨同前崔曙緑筍總成行紅花亦成子能當此時好獨自幽閨裏夜夜苦更長愁來不如死同前崔萱灼灼葉中花夏萎春又芳明明天上月蟾缺圓復光未如君子情朝違夕已忘玉帳枕猶暖紈扇思何長願因西南風吹上玳瑁床嬌眠錦衾裏宛轉雙鴛鴦同前戴休珽窮秋朔風起滄海愁隂漲敵騎掠河南漢兵屯灞上羽書驚沙漠刁斗喧亭障關塞何蒼茫邊烽遞相望弱齡負雄節俠客多招訪投筆棄書生提戈逐飛將拔劍照霜白怒髮衝冠壯㑹立萬里功視君封侯相同前權德輿家人强進酒酒後能忘情持杯未飲時衆感紛已盈明月照我旁一作房庭柯振秋聲空庭白露下枕席凉風生所思萬里餘水濶山縱橫佳期憑夢想未曉愁雞鳴願得一心人當年歡樂并長筵映玉爼素指一作手彈秦筝􅝇睇呈巧笑惠音激淒清此願良未果永懷空如酲同前三首戲贈陸大夫十二丈孟郊蓮子不可得荷花生水中猶勝道旁栁無事一作時蕩春風二緑萍與荷葉同在一泉一作此一作水中風吹荷葉在緑萍西復東三蓮花不開一作葉未開時苦心終日卷春水一作風徒蕩漾荷花未開展同前張夫人轆轤曉轉素絲綆桐聲夜落蒼苔磚涓涓吹溜若時雨濯濯佳蔬非用天丈夫不解此中意抱甕當時徒自賢同前梁鍠妾家巫峽陽羅帳寢銀床曉日臨忩久春情引夢長落叉仍在鬢微汗欲消黃縱使朦朧覺魂逰逐楚王同前劉商逹曙寢衣冷開門霜露凝風吹昨夜淚一片枕前氷同前賈島碌碌復碌碌百年雙轉轂志士中夜心良馬白日足俱為不等閒誰是知音目眼中兩行淚曾弔三獻玉擬古此詩已見二百三卷劉孝威同前此詩已見二百六卷辛德源同前崔融飲馬臨濁河濁河深不測河水日東注河源回西極思君正如此誰為生羽翼日夕大川隂雲霞千里色所思在何處宛在機中織離夢當有魂愁容定無力夙齡負竒志中夜多歎息拔劔斬長榆彎弧射小棘班張固非擬衛霍行可即寄謝閨中人努力加餐食同終南山擬古胡師耽結廬終南山西北望帝京烟霞亂鳥道劣見長安城宫雉互相映雙闕雲間生鐘鼓沸閶闔笳管咽承明朱門臨槐路紫蓋飛縱橫望望未極已甕牖秋風驚巖岫草木黃飛鴈遺塞聲墜葉積幽徑繁露垂荒庭甕中酒新熟澗谷塞蟲鳴且對一壺酒安用世間名寄言市朝客君王樂太平擬古何思澄故交不可忘猶如蘭桂芳新知雖可悅不異茱萸香妾有鳳雛一作皇曲非無陌上桑薦君君不御抱琴自悲凉同前贈陳子昻此詩見二百四十九卷喬知之同前三首徐彥伯讀書三十載馳騖周六經儒衣干時主忠䇿獻闕庭一朝奉休盼從容厠羣英束身趨建節秉筆坐承明廨署相填咽寮史紛縱橫五日休浣時屠蘇繞玉屏橘花覆北沼桂樹交西榮樹棲兩鴛鴦含春向我鳴皎潔綺羅艷便娟絲管清擾擾天地間出處各有情何必巖石下枯槁閒此生二遙裔烟嶼鴻雙影旦夕同交翰倚沙月和鳴弄江風茝若茂芳序君子從逺戎雲生隂海沒花落春潭空紅淚掩促柱錦衾羅熏籠自傷瓊草緑詎惜鉛粉紅裂帛附雙燕為余向遼東三頽光無淹晷逝水有迅流緑苔紛易歇紅顔不再求歌笑當及春無令壯志秋弱年仕關輔門豁王疑御溝敷愈東城際婉變南陌頭荷花嬌緑水楊葉暖青樓中有緑疑作綺羅人可憐名莫愁畫屏繞金膝珠簾懸玉鈎纎指調寶瑟泠泠哀且柔贈君鴛鴦帶因以鷫鸘裘向曉吟日坐閨夕秉燭逰無作北門客咄咄懷百憂同前李白生者如過客死者如一作為歸人天地一逆旅同悲萬古塵月兔空搗藥扶桑已成薪白骨寂無語一作言青松豈知春前後皆歎息浮雲何足珍同前釋皎然日出天地正煌煌闢晨曦六龍驅羣動古今無盡時夸父亦何愚兢走先自疲飲乾咸池水折盡長桑枝渴死化爝火嗟嗟徒爾為空留鄧林在折盡一作推折令人嗤同前郭茂倩樂府作東飛伯勞歌李暇秦王龍劔燕后琴珊瑚寶匣鏤雙心誰家兒女抱香枕開衾滅燭願侍寢瓊窗半上金鏤幬輕羅隱面不障羞青綺帳中坐相憶紅羅鏡裏見愁色簷花照月鶯對棲空將可憐暗中啼同前孟簡劔客不誇貌主人知取心但營纎毫義肯計千萬金勇發看鷙擊憤來聽虎吟平生貴酬德刃敵無幽深同前顧况龍劔昔藏影送雄留其雌人生阻歡會神物亦别離碧樹感秋落佳人無還期夜琴為君咽浮雲為君滋愛而傷不見使星徒參差集作星漢徒參差文苑英華卷二百五
