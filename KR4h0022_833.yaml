body:
  text: 文苑英華卷八百三十四宋李昉等編雜記蘇氏織錦回文記一首劍門山記一首唐故翰林學士李君碣記一首衛公故物記一首復乳穴記一首叔氏墓記一首杭州新造南亭子記一首蘇氏織錦回文記武后前秦苻堅時秦州刺史扶風竇滔妻蘇氏陳留令武功蘇道質第三女也名蕙字若蘭識知精明儀容秀麗謙默自守不求顯揚行年十六歸於竇氏滔甚敬之然蘇氏性近於急頗傷妬嫉也滔字連波右將軍子真之孫郎之第二子也風神偉秀該通經史允文允武時論髙之苻堅委以心膂之任備歷顯職皆有政聞遷秦州刺史以忤旨謫戍燉煌會堅尅晉襄陽慮有危逼藉滔才略乃拜安南將軍留鎮襄陽焉初滔有寵姬趙陽臺歌舞之妙無出其右滔置之别所蘇氏知之求而獲焉苦加捶辱滔深以為憾陽臺又專伺蘇氏之短讒毁交至滔益忿蘇氏焉蘇氏時年二十一及滔將鎮襄陽邀蘇氏之疑衍同往蘇氏忿之不與偕行滔遂携陽臺之任斷蘇氏音問蘇氏悔恨自傷因織錦回文五采相宣瑩心耀目其錦縱廣八寸題詩二百疑餘首計八百餘言縱橫反覆皆成章句其文點畫無缺才情之妙超古邁今名曰璇璣圖然讀者不能盡通蘇氏笑而謂人曰徘徊宛轉自成文章非我佳人莫之能解遂令蒼頭賫至襄陽焉滔省覽錦字感其妙絶因送陽臺之關中而具車徒盛禮邀迎蘇氏歸於漢南恩好愈重蘇氏著文詞五千餘言屬隋季喪亂文字散落追求不獲而錦字回文盛見傳寫是近代閨怨之宗旨屬文之士咸龜鑑焉朕聼政之暇晉心墳典散帙之次偶見斯圖因述若蘭之材復美連波之悔過遂製此記聊示將來也如意元年五月一日大周天册金輪皇帝御製劍門山記于邵易曰艮為山為徑路為門闕梁一作艮非山之有劍閣也厥象備焉首以峨嵋足以荆巫前褒斜而後靈關橫亘乎數千里之間孕川含陸以作全蜀趨蜀之路必由是山連峯戞天上絶飛鳥極於此也峭壁中斷兩崖相嶔如門斯闢如劍斯植辨徑術之可從於彼也於戲上古聖人之宅於九囿也必因山川之固為設堡障以安之恐其自絶於一方也雖有髙深之阻必啓行路通之是故天下書同文教同體梯航內向而禍亂不作觀乎劍閣見聖人之德為偉夫抉連山開積阻剖盤石擘崇巒呀然洞裂斗絶千仭逺迹竒狀神靈怪異謂之天造之資則有攻鑿之形矣謂之人力之用則無掎拔之勢矣豈五丁為役歟泯泯茫茫不可得而詳也若乃迫隘之所容邅回而後通翕巴漢之萬轍揔岷嶓之重險一夫而禦之則三軍無所施其勇覆簣而防之則逸足不能踰其阻故漢髙因焉以定楚項之難玄宗幸焉以銷陽九之變蜀王無道惠文伐之公孫僣號光武滅之由是而言則劍門之險所以助順不以興亂所以輔中州不以限荒服苟戎夷議侵軼狂愚懷割據逆天反道必覆敗隨之皇帝諒暗之初嵗在已未漁陽公作鎮之一紀也蠻夷之衆寡君長之情偽道途之險易攻守之利病皆暗得於胸中不差於毫髮矣而犬戎承我遏密犯我亭障以其控弦十萬與羣蠻之師出沉黎出大井出僰道出仇池邊兵禦之不勝囂然有北闕劍關而拒我後爰西入蜀都而全其地時西州伯朝覲京師冦出不虞羣情大駭朝廷固已知漁陽公舉無遺策仍發禁衛貔貅之一有二字旅俾受律于公公玄合廟謀分軍守隘且度其能來而不能用可取而不可迫命諸營堅壁勿得戰收軍入閣道示之以無人賊見諸壁不可攻而劍門不設備果疑有伏莫敢前窺公曰彼悉鋭而來謂所行無却今頓軍數日其氣已衰且入我既深多而不整可以擊之矣乃夜出精卒搗一作拔其前營羣凶震擾駭若隄潰棄其矛一作戈甲者十有四五顛于坑谷者不可勝計公命緩逐勿遏其歸既而又破之于龍安不二旬緣邊千里之冦悉燒營遁去危邦載合天府載寧州閭以出溺相存父子以厥初相歡自蕃戎為梗未有若兹嵗之甚帷一作惟中權制勝未有若是役之大天子聞而嘉之焉即下詔書勞之略曰微公戮力王室蜀其左衽矣德音褒倚也如此於戲仁者由劍門以之為福不仁者由劍門以之生禍獨漁陽公之克戎於是也配乾功之可久與坤德而同順革戎心於永代揚天聲於無極昭昭焉難乎其與京矣昔班孟堅勒銘燕然紀竇耿勳業夫燕然無瓌異之迹徒以書其片石不見録載前一作前載人到於今稱之而劍門井絡垂芒坤維藴靈漁陽得其形便輝灼藩翰語乎山則有畫象之奧語乎人則有蓋代之績而頌聲不著於燕然英名不加於竇耿抑當時之所取而吾黨之所病昔豫剖符列郡祗服元侯耳目所得稱傳罕備雖言之不逮其可已乎是用纂述為劍門記唐故翰林學士李君碣記劉全白見李白集君名白廣漢人性倜儻好縱橫術善賦詩才調逸邁往往興會屬詞恐古之善詩者亦不逮尤工古歌少任俠不事産業名聞京師天寶初玄宗辟翰林待詔因為和蕃書并上宣唐鴻猷一篇上重之欲以綸誥之任委之為同列者所謗詔令歸山遂浪迹天下以詩酒自適又志尚道術謂神仙可致不求小官以當世之務自負流離轗軻竟無所成有一子名伯禽偶遊至此遂以疾終因葬於此文集亦無定卷家家有之代宗登極廣拔淹滯李白集作瘁時君亦拜拾遺聞命之後君亦逝矣嗚呼與其才不與其命悲夫全白幼則以詩為君所知及此投弔荒墳將毁追想音容悲不能止邑有賢宰顧公逰秦志好為詩亦常慕效李君氣調因嗟盛才冥寞遂表墓式墳乃題貞石冀傳於往來也貞元六年四月七日記此篇當在墓志門今題作記姑仍其舊衛公故物記韋端符三年冬端符於三原令座中揖其郡官有客曰甚丞李謂端符曰是衛公之胄也其家傳賜書與他服器十餘物者訖宴端符即丞居為客謁丞延入就列一作次端符因跪請曰籍君僕射公之嗣固願見僕射公之烈之多其事辭雖文一作史記或闕略具天下耳舌矣聞君世傳文帝詔與公服物者願得以觀丞慘慘曰諾即其家偃僂躍步奉賜書一函他物一器出發視玉帶一首末為玉十有三方者七挫兩隅者六每綴環焉為附而固者以金丞曰傳云環者列佩用也玉之粹者若含怡然澤者若渙釋然公擒蕭銑時髙祖所賜于闐獻三帶其一也素錦袍一其襟袂促小裁製絶巧密光爛爛如波旁出紫文綾襖一促製小袖如袍其為文林樹於上其下有馳馬射者又雜為狻猊虎貙槖駝者靴袴一往來為鈎屬鎖劍文疑非華人所為也自始傳于今莫能名其物象笏一差狹不類今笏者佩筆一竒木為管韜刻飾以金别為金環以限難其間韜者火鏡二大觽一小觽一笇囊二椰杯一蓋常佩於玉帶環者十三物者亡其五有存者八大帝為兒時與公子某年上下文帝命居宫中侍吾兒戲即賜以皇子服物黃綾袍緋綾袍皆為龍鸞文素錦襖綷五色為花若鳥者素錦半袖小笏皆緻巧功良今工之為不能也文帝賜書二十通多言征討事厚勞苦信必威賞而已其兵事節度皆付公吾不從中理也暨公疾親詔者數四其一曰有晝夜視公病中老嫗令一人來吾欲熟知公起居狀丞曰權文公視此詔常泣曰君臣之際乃如是耶端符既畢觀中若有物擊惻其心者於玉帶見逺方致物而上不專有以賜有功也於文錦衆物見其時之工志功或作攻義如周禮攻木攻金之攻詩車攻之攻不至一作志靡也於賜公子以皇子衣服見視臣如友而猶兒也於詔征討見擇將材付將職也上嘗不曲制其事旁他可動哉於問公疾見上答憫公如家人之視子姓也公之勞烈如是其大固有以感之獨推其運吾不信也丞曰子觀吾故物異他人之觀一似動色隱心者於霜露變時每閲省是物人雅謂子工或作攻文辭幸為記吾得觀以尉吾慕思也故曰記衛公故物一作皆唐文粹復乳穴記柳宗元石鐘乳餌之最良者也楚越之山多産焉于連于韶者獨名於世連之人告盡焉者五載矣以貢則買諸他郡今刺史崔公至逾月穴人來以乳復告邦人恱是祥也雜然謡曰氓之熙熙崔公之來公化所徹土石蒙烈以為不信起視乳穴穴人笑之曰是惡知所謂祥耶嚮吾以刺史之貪戾嗜利徒吾役而不吾貨也吾是以病而紿焉今吾刺史令明而志潔先賴而後力欺誣屏息信順休洽吾是以誠告焉且夫乳穴必在深山窮林氷雪之所儲豺虎之所廬由而入者觸昏霧扞龍蛇束火以知其物縻繩以志其返其勤若是出又不得吾直吾用是安得不以盡告今令而乃誠吾告故也何祥之為士聞之曰謡者之祥也乃其所謂怪者也笑者之非祥也乃其所謂真祥者也君子之祥也以政不以怪誠乎物而信乎道人樂用命熙熙然以效其有文粹作力斯其為政也而獨非祥也歟叔氏墓記集作志李翺元和九年嵗直甲午正月十九日丁卯浙江集無江字東道觀察判官將仕郎試大理評事攝監察御史李翺奉其叔氏之喪于兹叔氏諱術生子曰王老逺在京師翺實主其事銘曰翺生始言叔氏棄歿爰殯于野年周四甲豈無諸親生故或迫亦有息子旅官京國丘墳孰封松檟未列殯宇零毁狐狸所穴中夜逺思酸棲心骨集有是以二字乞假公府言來筮宅追念延陵喪子嬴博葬不歸吳於禮其合惟叔平生遊居是邑夭謝于此靈幽其託女姪之西仲兄之北冥昭何異可用居息孰為故鄉乃樹松柏此篇當在墓志門今題作記姑仍其舊杭州新造南亭子記杜牧佛著經曰生人既死隂府收其精神校平生行事罪福之坐罪者刑獄皆怪險非人世所為凡人平生一失舉止皆落其間其尤怪者獄廣大千百萬億里積火燒之一日凡千萬生死窮億萬世無有間斷名為無間夾殿宏廊悉圖其狀人未熟見者莫不毛立神駭佛經曰我國有阿闍世王殺父王篡其位法當入所謂獄無間者集有昔字能來集作求事佛後生為天人况其他罪事佛固無恙梁武帝明智勇武創為梁國者捨身為僧奴至國滅餓死不聞悟况下輩固惑之為工商者雜良以苦偽內而華外納以大稱斛以小出之欺奪村閭戅民銖積粒聚以至于富刑法錢榖小胥出入人性命顛倒埋沒使簿書條令不可究知得財買大第豪奴如公侯家大吏有權力能開庫取公錢緣意恣為人不敢言是此數者必自知其罪皆捐已奉佛以求救月日積久曰我罪如是富貴如所求是佛能滅吾罪復能以福與吾也有罪罪滅無福福至生人惟罪福耳雖田婦稚子知所趨避今權歸於佛買福賣罪如持左契交手相付至有窮民啼一稚子無以與哺得百錢必召一僧飯之兾佛之助一日獲福若如此雖舉寰海內盡為寺與僧不足怪也屋壁繡文可矣為金枝扶迹擎千萬佛僧為具味飯之可矣飯訖持錢與之不大不壯不髙不多不珍不竒懷怪為憂無有人力可及而不為者晉霸主也一銅鞮宫之衰弱諸侯不肯來盟今天下能如幾晉凡幾千銅鞮人得不困哉文宗皇帝嘗語宰相曰古者三人共食一農人今加兵佛一農人乃為五人所共食其間吾民尤困於佛帝念其本牢根大不能果去之武宗皇帝始即位獨奮怒曰窮吾天下佛也始去其山臺野邑四方所冠其徒幾至十萬人後至會昌五年始命西京晉佛寺四僧惟十人東京二寺天下所謂節度觀察同華汝三十四治所謂晉一寺僧凖西京數其他刺史州不得有寺出四御史縷行天下以督之御史乘驛未出關天下寺至于屋基耕而刓之凡除寺四千六百僧尼笄冠二十六萬五百其奴婢十五萬良人枝附為使令者倍笄冠之數良田數千萬頃奴婢口率與百畝編入農籍其餘賤取民直歸於有司寺材州縣得以恣新其公署傳舍今天子即位詔曰佛尚不殺而仁且來中國久亦可助以為治天下州率與二寺用齒衰男女為其徒各止三十人兩京數倍其四五焉著為定令以徇其習且使後世不得復加也三字蜀本作有加焉趙郡李子烈播立朝名人也自尚書比部郎中出為錢塘錢塘於江南繁大雅亞吳郡子烈少逰其地委曲知其俗蠧人者剔削根節斷其脈絡不數月久人隨化之三箋干丞相云濤壞人居不一銲錮敗侵不休詔與錢二千萬築長堤以為數十年計人益安喜子烈曰吳越古今多文士來吾郡逰登樓倚軒莫不飄然而增思吾郡之江山甲於天下信然也佛熾害中國六百嵗生見聖人一揮而幾夷之今不取其寺材立亭勝地以彰聖人之功使文士歌詩之後必有指吾而罵者乃作南亭在城東南隅宏大煥顯功施手目髮勻肉均牙滑而無遺巧矣江平入天越峯如髻越樹如髮孤飛集作恱白鳥點盡集有止字疑在半夜酒餘倚老松坐怪石殷殷潮聲起於月外東閩兩越宦逰善地也天下名士多往之豫知百數十年後登南亭者念仁聖天子之神功矣美子烈之旨迹睹南亭千萬狀吟不能集作免已四時千萬狀吟不能去作為歌詩次之於後不知幾千百人矣文苑英華卷八百三十四
