body:
  text: 文苑英華卷四百六十七宋李昉等編批答二答賀破賊答宰臣賀破賊狀張説省表具知蠢茲戎狄侵軼邊鄙不交鋒刃自取敗亡既邊將之功亦天道所棄心之有慰與卿同之答薛平集作萃非賀生擒李錡表白居易省表具知朕自嗣耿光每多惕慮念必先於除害志無忘於安人李錡大負國恩自貽天討集作罰師徒未勤集作動於疆埸父子俱肆於市朝信上天之禍淫與率土而同慶省視來表深鑒乃誠所賀知批百寮賀王宰破陽城縣賊表封敖省表具知討彼狡童萃乎茂疑作戍卒星霜既換牛馬未遑每軫勞懷渴聞捷報今者王宰麾下大破賊徒廣治寨既已平除陽城縣復見誅滅自茲乘勝足以震威蕩定有期凱旋可徒疑作待外禦多忠臣之力內謀有賢相之籌豈無成功亦復何慮所賀知批宰臣賀石雄破賊陳表省表具知有名之伐義勇爭登干紀之凶幽明共戮逆順之理何嘗不然况內有賢相之謀外多良將之力舉則必勝動皆成功吉語屢聞闕來獻相繼於道塗斬級申威每盈於原野蓄産兵仗所獲蓋多武力軍聲殊為善陳想其危亟坐見清平卿義極謨猷道光翼贊推功之賀懷愧良多所賀知批宰臣賀正月一日河中陳許行營破回鶻表前人省表具知回鶻恃衆忘恩棄盟犯境朕以勳親是念討伐未行而乃尚肆梟音敢回狼顧恣行驅劫塗疑見奔衝戰士等蓄鋭多時奪身自效蕕鬪之獸何足以枝梧成擒之虜幸獲於逃遁蜂蠆自滅馬牛皆歸此實上帝威靈輔臣謀略豈豫薄德所可致焉循省賀章良多愧慰所賀知批宰臣賀太原破回鶻奪得太和公主表前人省表具知朕聞胸奴為中國之患者久矣爰自漢魏迄于周隋制控之謀罕見其術暨乎國朝以懷柔之道稍致和寧然猶邊兵遠屯貴主下嫁國用且費人心未甘昨者回鶻以失國為詞欵塞相託朕懸知矯詐且永疑作示含容旋肆梟音屢聞狼顧虜騎唐突羽書飛馳方命戎臣各嚴師律可汗不知藏匿尚敢猖狂繇是我載張天威震貔貅之勇暫奮其威稜犬彘之微豈煩於牙齒邊塵掃蕩公主歸還豈獨壯於茲辰實可超於遠古此皆上元降佑九廟垂休臺輔元臣咨謀允叶不然豫之寡昧何以致焉順美之詞省章多愧所賀知答賀表答張九齡賀西幸延期表魏知古附見張九齡集省表具知朕初聞三輔之間今嵗善熟朕緣陵寢誠欲西幸集作行然積纍虛集作虛纍年乍得小稔即又聚食心所集作所慮重難儻夏麥不登未免匱乏百姓不足君集作朕孰與安所以再三痛懷欲去不忍至於宫苑所樂氣候非宜茍得人安終不以此為念卿可宣前旨更俟後期所請遍示朝列及宣付史官亦豈集作屬煩也任卿等自商量太宗答顔真卿賀肅宗即位表常衮附見顔真卿集省表具知凶逆亂常侵侮中夏曩者潼關失守京國不寧朕因涉岐梁至於巴蜀遂命皇帝肇登寶歷爰靜祅氛今官軍益振回紇效欵即議集作擬南行共為剪滅卿忠惟奉國孝則保家懷不二之心秉難奪之操皇帝纍申寵命兼以崇班宜有懋於深恩集作功且用光於重寄集作守答假祐等賀册立太子禮畢表白居易省表具知朕祗膺統序恭守典常爰推至公乃命長子使主國鬯用貞邦家册畢禮成良增感慶卿等各司軍衛同奉表章備見忠誠益深嘉歎所賀知以下五篇並見集本批李夷簡賀御撰君臣事迹屏風表前人省表具知朕思求理化親閲典墳至於去邪納諫之規勤政慎兵之誡取而作鑒畫以為屏與其散在圖書心存而景慕不若列之繪素目覩而躬行庶將為後事之師不獨觀古人之象卿詞彰順美義見忠規省覽再三深叶朕意所賀知批百寮嚴綬等賀御撰屏風表前人省表具知朕烈祖太宗以古為鏡用輔明聖實致集作臻理平垂作孫謀母懼乎失墜取為殷鑒遂飾以丹青至若明君直臣前言往事森然在目如見其人論列是非既庶幾為座隅之誡發揮獻納亦足以開臣下之心况卿等職在儀刑政當補察各勤所任共副茲懷所賀知答文武百官嚴綬等賀御製新譯大乘本生心地觀經序表省表具知朕勤求道本廣挹教源以真如不二之宗助清淨得一之化况斯經典時為大乘名理精微翻譯成就雖契心則離於文字而得意亦假於筌蹄庶使發揮因為序述卿等精通外學懇竭忠誠引經贊揚奉表稱賀再三省覽嘉歎久之答蕭俯孟簡等賀御製新譯大乘本生心觀地經序狀省表具知大仙經典最上法乘來自西方閟于中禁將期利益必在闡揚遂命僧徒譯其句偈兼詔卿等潤以文言昨因披尋深得真諦悟本生不滅之義證心地無相之宗方勤護持聊著序引永言述作猶愧聖明卿等賀陳良深嘉尚答謝表批王播謝官表元稹省表具知朕聞有衆不言弱有地不言貧是以管夷吾用區區之齊而諸候九合今朕四海之大億兆之衆獨不能擒庭湊克融而曰物力先困朕甚惑焉况髙祖太宗之法令具存德宗憲宗集作考之舊老集作章猶在制誥比下選狀集作技日聞較量重輕勤恤人隱而室閭益耗縣官益貧職業壞隳程品差戾議論講貫殊無古風意朕聽之不聰而股肱耳目莫得宣其效也先皇帝以卿有廊廟之畫倚以為相眇朕小子得而用之卿宜勉竭誠懷副茲屬望集作嘉屬答杜兼謝授河南尹表白居易省表具知卿文通史道學逹政源凡歷官常輒聞績效觀能以授俾亞理於三川試可而遷宜專臨其一府盡委封畿之政仍兼運漕之權嵗時之間佇有勞集作勤效勉勤集作恭爾職重副豫懷所謝知以下四篇並見集本答劉總謝檢校工部尚書范陽等兩道節度使表省表具知卿幼承義訓長有令聞能遵忠孝之風不墜弓裘之業朕所以命加異等寵冠常倫特授雙旌超登八座豈唯延賞亦在任能將懋前修勉申後效載省章疏深鑒誠懷所謝知答裴垍謝銀青光祿大夫兵部尚書表前人省表具知卿自居鈞軸日獻謀猷戴君常竭其股肱憂國每形於顔色及嬰疾病益不遑安未踰四旬以至三讓撝謙秉易退之道堅懇陳難奪之詞遂抑朕心俯從卿請而七命印綬五兵尚書官秩甚崇事務稍簡就以優養冀乎和平載省表章深見誠意所謝知答薛蘋謝授浙東觀察使表省表具知卿久踐吏途纍聞能政及居藩鎮尤見忠勤訓道而群黎向方亷察而列郡承式實嘉乃績每簡豫心宜遷雄劇之藩以廣循良之化勉於為理副朕所懷所謝知答李卿謝二品狀苑咸省表具知以卿有渾厚之德貞固之行遠勵衣冠近光宗室况友于之美克贊升平故改以章綬之名用表禮賢之意也所謝知批劉悟謝上表元稹省表具知朕聞上黨亦天下徑兵處昔者李抱真用之一舉破朱滔再舉蹙田悅訓養十萬威聲殷然人到于今號為良將夫以卿之勇義才略猶將逺慕韓彭區區抱真夫豈難繼况以克融庭湊之狂脆小賊比朱滔田悅之結連大盜集作熾大結連是猶以孩嬰而校賁育也蜂蟻相聚其能久乎卿宜密運謀猷明宣號令避狂擊惰取暴撫羸勿爭蛇豕之鋒直取鯨鯢之首再圖麟閣永煥縑緗無為他人所先當使功居第一策勳在近勿復為勞所謝知答元膺集作應非授嶽鄂等觀察使謝上表白居易省表具知夏口重鎮屬在時賢非明肅不能理其軍非簡儉不能阜其俗以卿有仁厚之質謇直之風纍踐班行皆著名節遂輟中憲往臨外藩知已下車當集作深慰人望佇茲報政用副朕懷所謝知答李鄘授淮南節度使謝上表前人省表具知卿抱兼人之才秉徇公之節每登要職輒集作悉著能名若刃發硎投而不滯如玉在佩動必有聲朕以距淮而南人物繁會非亷明何以貞師察俗非簡惠何以通商綏農前勞既彰後效何遠載省來表知已下車勉副虛懷佇觀新政所謝知答元素謝上表省表具知卿用兼文武識合變通輟綱領於中朝授麾幢於重鎮集作外門吏能足以惠物將略足以董戎人望所歸豫心是賴知卿已到本鎮當慰疲人深藉撫綏之方以安凋瘵集作弊之俗日期報政嵗望成功勉勤所圖用副朕意答杜兼謝上河南少尹知府事表前人省表具知三川一作帥非封畿實重其任二職綱紀亦難其人卿素懷器能纍著聲績亞理以明慎選專領以展長才知已下車當親綏撫佇聞報政用副憂勤所謝知批敬昕謝上表封敖省表具知卿蹈履中和修潔大雅推經笥而微言如貫聽文韻而清音不窮亟稱才能歷踐華顯洎尹正洛汭臨戎孟津治不避諱恐作理行推髙號令有律遽遷白馬重擁青幢接畛素洽於䛴謡先聲載揚於道路既聞至止當慰豫懷所謝知批盧鈞謝上表省表具知負才略者不辭於難事付重難者思得於才人朕以上黨雄軍壺關重寄劉悟始以勳力授之旌旄而擁鄆州凶孽之餘汙潞府忠良之俗苛法脅衆偽言欺天洎從諫襲有父兵坐邀朝命嘯聚姦惡稔成悖凶狡豎何知羣逆相濟以卿端厚可以鎮俗誠明可以訓戎舉二鎮之旌旗滌五州之汙染果有變節翻為吾人今元凶盡誅舊風可復已知到鎮用深慰懷善撫傷夷務矜凋瘵俟爾報政副豫所知批鄭涯謝上表省表具知卿道茂搢紳望髙班列夷淡自處一作守端莊有嚴直如朱絃清比嘉玉內庭西掖留重價於雄文憲府南宫藹餘芳於嘉話出入更踐便蕃寵榮所蒞有聲溢於聞聽是用授之鈇鉞鎮以荆蠻壓江漢之上遊揔吳蜀之都會茍非良幹其誰付焉知已下車故多勞止勉𢎞政術必副憂勤所謝知文苑英華卷四百六十七
