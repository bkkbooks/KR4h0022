body:
  text: 文苑英華卷六百六十宋李昉等編投知三上杜司徒啓一首上淮南李相公啓一首上門下武相公啓一首上李相公啓一首上宰相求杭州啓一首上宰相求湖州啓三首為堂兄慥求灃州啓一首上杜司徒啓劉禹錫某啓一自謫居七悲秋氣越聲長苦聽者誰哀湯網雖疏久而猶詿失意多病衰不待年心如寒灰頭有白髮惕厲之日利於退藏是以彌年不敢奏記近本州徐使君至奉手筆一函稱謂不移問訊加劇重復㸃竄一無客言忽疑此身猶在門下收紙長想歆集作欣然感生尋省遭罹萬里不幸方寸之地自不能言求人見諒豈復容易伏䝉逺示且曰浮謗漸消况承慶宥期以振刷方今聖賢合德朝野多歡澤柔異類仁及行葦萬族咸恱獨為窮人四時平分未變寒谷自同類牽復又已三年側聞衆情或以哀歎某材略無取廢錮是宜若非舊恩孰肯留念六翮方鎩思重託於扶搖孤桐半焦冀見收於煨集作灰燼伏紙流涕不知所言謹啓上淮南李相公啓某啓某聞以昧於周身措足危地駭機一發浮謗如川巧言竒中别白無路祝網之日漏恩者三咋舌兢魂分終裔壤豈意天未勦絶仁人登庸施一陽於剝極之際拔衆溺於坎深之下南箕播物不勝昌言危心鎩翮繇是自保隂施之德已然乃聞受恩同人盟以死答私感竊抃積于窮年化權禮絶孤志莫展今幸伍中牽復司存宇下伏慮因是記其姓名謹獻詩二篇敢聞左右古之所以導下情而通比興者必文其言以表之雖氓謡俚音可儷風什伏惟降意詳擇斯大幸也謹因楊子程留後行謹奉啓不宣謹啓上門下武相公啓某啓去年本州吏人自蜀還伏奉示問兼賜衣服繒綵等雲水路遙緘縢貺厚恭承惠下之㫖重以念舊之懷熙如陽和列在緗集作湘北簡苦心多感危涕自零驚神驛思若待頴杖伏以聖上注意理本鋭求國楨念外臺報政之功追宣室前席之事重下丹詔再升黃樞羣情合符和氣來應况八柄所在三人同心叶台座之精膺俊傑集作材之數談笑於規隨之際從容於陶冶之間物皆由儀人識所措某久罹憲網兀若枯株當萬類咸恱之辰抱窮途終慟之苦清朝無絳灌之列至理絶椒蘭之嫌此時不遇可以言命嗟乎一身主祀萬里望枌榆之鄉髙堂有親九年居蠻貊之地從坐之典固有等差同類之中又尋牽復頃在臺日獲奉凖繩指吏途於按讞遵文律於章奏藻鑒之下難逃陋容炎凉載移足見真態自違間左右沉淪遐荒嵗月滋深艱貞彌厲緬思受譴之始他人不知屬山園事繁孱懦力竭本使有內嬖之吏供司有恃寵之臣言􅍱猜嫌動礙關束城社之勢亟矢紛然彌縫其間﨑嶇備盡始慮罪因事闕寧虞謗逐跡生智乏周身又誰咎也伏以趙國公頃承顧遇之重髙邑公夙荷見知之深雖提挈不忘而顯白無自蓋以永貞之際皆在外方雖得傳聞莫詳本末特哀黨錮亟形話言自前嵗振淹命行中止或聞輿論亦愍重傷伏遇相公秉鈞輒已自賀儻重言一發清議攸同使聖朝無錮人大冶無廢物自新之路既廣好生之德逺彰羣蟄應南山之雷窮鱗得西江之水指顧之內生成可期伏惟發膚寸之陰成彌天之澤廽一瞬之念致再造之恩誠無補於多士集作事之時庶有助於陰施之德無任懇悃之至謹啓上李相公啓某啓去年國子主簿楊歸厚致書相慶伏承相公言及廢錮愍色甚深哀仲翔之久謫恕元直之方寸思振淹之道廣錫類之仁逺聆一言如受華衮自不窺墻仞九年于茲髙卑邈殊禮數懸絶雖身居廢地而心恃至公伏以相公久以訏謀參于宥密材既為時而出道以得君而專令發於流水之源化行猶偃草之易習強伉者自納於軌物困杼軸者咸躋於仁夀六轡在手平衡居心運思於陶冶之間宣猷於魚水之際然能軫念廢物逺哀窮途嗟哉小生有足悲者內無手足之助外乏强近之親為學集作何為苦心本求榮飬得罪由己翻乃貽憂捫躬自劾愧入肌骨禍起飛語刑極淪胥心因病怯氣以愁耗近者否運將泰仁人持衡伏惟推曽閔之懷憐烏鳥之志處䕫龍之位傷屈賈之心沛然垂光昭振幽蟄言出口吻澤濡寰區昔者行葦勿傷枯骼猶掩哀老以出幣愍窮而開懷無情異類尚或嬰慮顧惟江干逐客曾是相府故人言念材能誠無所取譬諸飛走庸或知恩嗚呼以不駐之光陰抱無涯之憂悔當可封之至理為永廢之窮人聞弦尚驚危心不定垂耳斯久長鳴孔悲腸廽淚盡言不宣意謹啓上宰相求杭州啓杜牧某啓某於京中唯安仁舊第三英華作二十間支屋而己長兄慥罷三原縣令間居京城弟顗一舉進士及第有文章時名不幸得痼疾坐廢十三年矣今與李氏孀妹寓居淮南並仰某微官以為喉命某前任刺史七年給弟妹衣食百餘兼及長兄亦救不足是某一身作刺史一家骨肉四處安活自去年八月時䝉奬擢授以名曹郎官史氏重職七年棄逐冉復官榮歸還故里重見親戚言於鄙微集作誠已滿素志自去年十二月至京以舊第無屋與長兄異居今秋已來弟妹頻以寒餒來告某一院家纍亦四十口狗為朱馬緼作由𫀆其於妻兒固宜窮餓是作刺史則一家骨肉四處皆泰為京官則一家骨肉四處皆困謀於知友曰杭州大郡今月滿可求欲干告吾相以活家命以為如何皆曰子七年三郡今始歸復相國之子必欲次第敘用子今復求刺史得不生相國疑怪乎某答曰是何言歟某惟恃吾相之知始敢干求今天下以江淮為國命杭州户十萬稅錢五十萬刺史之重可以殺生而百厚祿朝廷多用名曹立郎有名望而老於為政者而為之某官為外郎是官為未至也前三任刺史無異政聞於吾相是為政無所取也今若得遂所求非惟超顯兼活私家某若不恃吾相之知而求之是狂躁妄庸人也墜井者求出執熱者願濯古人以此二者譬喻所切也某今所切是墜於絶壑而衣掛於樹杪覆在鼎中下有熱火而水將沸與古所喻則復過之輒敢具疏血誠上干尊重冀垂恩憐或賜援拯慺慺丹懇不勝惶懼懇悃之至謹啓上宰相求湖州第一啓某啓人有愛某者言於某曰吏部員外郎例不為郡子不可求假使己求慎勿堅懇至于冉三答曰某雖不學按六典令式及諸故事全集作多無此例國史復無賢相名卿懸之以為格言此乃急於趨進之徒自為其說若以例言貞元初故相國公盧公邁由吏部員外郎出為滁州近者澶王傅李凝為鹽鐵使江淮留後豈曰無例人曰盧事太逺李為擢用此不足徴某曰不知今者視之古事在書取為今證逺自三代兩漢近至隋氏國初尚可援引况前十五年名相故事反不足為例乎况盧公邁止以骨肉寒餓求守滁陽非如某以親弟廢痼寒餓仍之是盧公有一某有二與盧公所切復為不同仲尼曰雍也可使南面今刺史古之南面諸侯行天子教化刑罰者江淮鹽鐵留後求利小臣校量重輕與刺史相懸求利小臣乃可吏部員外郎為之十萬户州天下根本之地曰吏部員外郎不可為其刺史即是本末重輕顛倒乖戾莫過於此某弟顗世胄子孫二十一舉進士及第嘗為上裴相公書遒壯溫潤詞理傑逸賈生司馬遷能為之非班固劉向輩亹亹之詞流於後輩人皆藏之朱崖李太尉迫以世舊取為浙江西團練使巡官李太尉貴驕多過凡有毫髮顗必疏而言之後謫袁州於蒼黃集作惶中言於親曹官居實曰如杜巡官愛我之言若門下人盡能出之吾無今日李太尉在袁州顗客居淮南牛公欲辟為吏顗謝曰荀爽為李膺御以此顯名今受命為幕府下執事御李膺矣然李公困謫逺地未願仕宦牛公歎美之聰明雋傑非常人也某自省事巳來未聞有後進名士喪明廢棄窮居海上如顗比者今有一兄仰以為命復不得一郡以飽其衣食盡其醫藥非今日海內無也言於所傳聞亦未有也自古言喜莫若虢國太子以其死而復生言懇莫若中包胥求救於秦七日七夜哭聲不絶某今懇如包胥但未哭耳若蒙恩憫特遂血懇其喜也不下虢太子詞語煩碎頻千尊重足及軒闥神驚汗流不勝憂恐懇憫之至謹啓第二啓某啓某幼孤貧安仁舊第置於開元末有屋三十間而已去元和末酬償息錢為他人有因此移去八年中凡十徙其居奴婢寒餓衰老者死少壯者當面逃去不能呵制止有一竪戀戀憫歎挈百卷書隨而養之奔走困苦無所容庇歸死于延福私廟支柱欹壤而處之長兄以一驢游丐於親舊某與弟顗食野蒿藿寒無夜燭默念集無念字所記者凡三周嵗遭遇知己各及第得官文宗皇帝改號初年某為御史分察東都顗為鎮海幕府吏至二年聞顗病眼暗無所覩故殿中侍御史韋楚老曰同州有眼醫石公集劍南少尹姜汚喪明親見石生針之不一刻而愈其神醫也某迎石生至洛告滿百日與石生俱東下見病弟于揚州禪智寺石曰是狀也腦積毒熱脂融流下蓋塞瞳子名曰內障法以金針旁入白晴穴上斜撥去之如蠟塞管蠟去管明然今未可也後一周嵗脂當老硬如白玉色始可攻之某世攻此疾自祖及父某所愈者不下二百人此不足憂其年秋末某載病弟與石生自揚州南渡入宣州幕至三年冬某除補闕石生自曰明年春眼可針矣視瞳子中脂色玉白果符初言堂兄慥守潯陽泝流不逺刺史之力復可以飽石生所欲令其盡心此即家也京中無一畝田豈可同歸遂如潯陽四年二月某於潯陽北渡赴官與弟顗决執手哭曰我家世德汝復無罪斯疾也豈遂痼乎然有石生慎無自撓其年四月石生施針九月冉施針俱不效五年冬某為膳部員外郎乞假往潯陽取顗西歸顗固曰歸不可議俟兄慥所之而隨之會昌元年四月兄慥自江守蘄某與顗同舟至蘄某其年七月却歸京師明年正集作七月出守黃州在京時詣今虢州庾使君問庾集作使君二字眼狀庾云同州有二眼醫石公集是一也復有周師逹者即石之姑子所得當同周老石少其集作有術深集作甚妙似石不及某常病內障愈于周手豈少老間工拙有異某至黃州以重幣卑詞致周至蘄周見弟眼曰嗟乎眼有赤胍凡內障脂凝有赤胍綴之者針撥不能去赤胍赤胍不除針不可施除赤胍必有良藥某未之知是石生業淺不逹此理妄冉施針周不針而去時西川相國兄始鎮揚州弟兄謀曰揚州大都為天下通衢世稱異人術士多逰其間今去值有勢力可為久安之計冀有所遇其年秋顗遂東下因家揚州與顗一相見别八年矣坐一室中不復有冉生意住三十日而西臨岐與决曰此行也必祈大郡東來謀汝醫藥衣食庶幾如志近聞九疑山南有隱士綦母𢎞者人言異人能愈斯集作異疾忠州酆都縣有仙都觀後漢時仙人隂長生於此白日升天今聞道士龔法義年逾八十精嚴其法人之所謂有前世負纍今世還以痼疾者奏章於上帝能為解之刺史之力一人或可致是以去嵗閏十一月十四日輒獻長啓乞守錢唐蓋以私懇有素非敢率然言念病弟喪明坐廢十五年矣但能識其聲音不復知某髮己半白顔貌衰改是某今生可以見覬而覬不復能集作能復見某矣此天也無可奈何某能見顗而不得去此豈天乎而懸集作懇非在相公若小人微懇終不能上動相公相公恩憫終不下及小人是日月下親兄弟終無相見期况去嵗淮南小旱衣食益困目無所覩復困於衣食即海內言窮苦人無如顗者今敢以情事冉書懇迫上干尊重伏料仁㫖必為憫惻然某早衰多病今春耳聾積四十日四月復落一牙耳聾牙落兼年如七八十人將謝之候也今未五十而有七八十人將謝之候蓋人生受氣堅強脆弱品第各異也堅強者七八十而衰脆弱者四五十而衰其不同也亦與草木中蒲柳松柏同也某今生四十八年矣自今年耒非惟耳聾牙落兼以意氣錯寞在羣衆歡笑之中常如登髙四望但見莽蒼大野荒墟廢壠悵望寂默不能自解此無他也氣衰而志散真老人態也自省人事已來見親舊交逰年未五十尚壯健而死者衆矣况某早衰敢望至六七十而後死乎願未死前一見病弟異人術士求其所未求以甘其心厚其衣食之地某若先死使病弟無所不足然死而有知不恨死早湖州三嵗可遂此心伏惟仁憫念病弟望某東來之心察某欲見病弟之志一加哀憐特遂血懇披剔肝膽重此告訴當盛暑時敢以私事及政事堂啓于丞相治其罪可也伏紙流涕俯俟嚴命不勝憂惶激切之至謹啓第三啓某啓某去嵗閏十一月十四日輒書微懇列在長啓干瀆尊重乞守錢塘以便家事自歎精誠不能上動相公不遂私便伏以病弟孀妹因緣事故寓居淮南京中無業今者不復西歸遂為淮南客矣病孤之家假使旁百強近救援庇借嵗供衣月給食日問其所缺闕尚猶戚戚多感無樂生意况乎為客於大藩喧囂雜沓之中無俸祿乏氣勢食不繼月用不給日閉門於荒僻之地取容於里胥逰徼之輩部曲臧獲可以氣陵鼠侵又不能制止所可仰以為命者在三千里外一郎吏耳復有衣食生生之所須悉多缺闕欲其安活而無嘆吒悲恨不可得也去嵗伏䝉恩念出於私曲語今青州鄭常侍云更與一官必任東去某承受仁㫖不敢不重以錢塘更塵視聽今自勳曹擢為廢置在某更授一官己榮遇矣在相公必仕東去之言鏘然在耳近者纍得來書告以羇旅困乏聞於他人可為酸鼻況於某心豈易排遣今年七月湖州月滿敢輒重書血誠冉干尊重伏希憐憫特賜比擬某伏念骨肉悉皆早衰多病常不敢以夀考自期今更得錢二集作三百萬資弟妹衣食之地假使身死死亦無恨湖州三考可遂此心湖州名郡也私誠難遂也不遇知己豈得如志瀝血披肝伏紙迸淚伏希殊造或賜濟活下情無任懇悃惶懼之至謹啓為堂兄慥求澧州啓某啓庫部家兄昨者特加奬援却忝班行實以聽聞稍難不敢更求榮進今在郢州沮口草市絶俸己是纍年孤外生及姪女堪嫁者三人仰食待衣者不啻百口脫粟蒿藿才及一餐伏䝉仁恩頻賜顧問必許援拯授以涔陽話於闔門無不感涕伏以相公上佐聖主蔚為元勳恩隨風翔德與氣游雖一物之微四海之大鎔造所及罔不得宜伏念庫部家兄承一顧之恩二紀不替伏恐機務繁重不時記憶心迫情切輒敢重干尊嚴戰汗憂惶伏地待罪謹啓文苑英華卷六百六十
