body:
  text: 文苑英華卷一百六十八宋李昉等編應制一錫宴四十六首酺宴六首錫宴宴東堂隋煬帝雨罷春光潤日落暝霞暉海榴舒欲盡山櫻開未飛清音出歌扇浮香飄舞衣翠帳全臨户金屏半隱扉風花意無極芳樹曉禽歸春日玄武門宴羣臣唐太宗韶光開令序淑氣動芳年駐輦華林側髙宴柏梁前紫庭文樹滿丹墀衮紱連九夷簉瑶席五狄列瓊筵娛賓歌湛露廣樂奏鈞天盈樽浮緑醑雅曲韻朱絃粵余君萬國還慙撫八埏庶幾保貞固虛己厲求賢宴中山前人驅馬出遼陽萬里轉旗常對敵六竒舉臨戎八陳張斬鯨澄碧海卷霧掃扶桑昔去蘭縈翠今來桂染芳雲枝浮碎葉氷鏡上朝光回首長安道方歡宴柏梁奉和宴中山應制許敬宗飛雲旋碧海解網宥青丘飬更停八駿觀風駐五牛張樂臨堯野揚麾歷舜州中山獻仙酤趙媛發清謳塞門朱鴈入郊藪紫麟遊一舉氛霓靜千齡德化流奉和天樞成宴夷夏羣僚應制李嶠轍迹銘西山弇勳庸紀北燕何如萬方會頌德九門前的的臨黃道迢迢入紫煙仙盤正下露髙柱欲承天山類叢雲起珠疑大火懸聲流塵作劫業固海成田帝澤傾堯酒宸歌掩舜絃欣逄下生日還覩上皇年千秋節宴唐玄宗蘭殿千秋節稱名萬嵗觴風傳率土慶日表繼天祥玉宇開花蕚宫懸動會昌衣冠白鷺下帟幕翠雲長獻遺成新俗朝儀入舊章月銜花綬鏡露綴綵絲囊處處祠田祖年年宴杖鄊深思一德事小獲萬人康奉和千秋節宴應制張説五德生王者千齡啓聖人赤光來照夜黃雲上覆辰海縣銜恩久朝章獻壽新髙車帝座出夾道衆官陳槊仗洗晴景磬管凝秋旻珠囊含瑞露金鏡抱仙輪何嵗無鄉飲何田不報神薰歌與名節傳代幸羣臣皇帝降誕日集賢殿賜宴前人仲秋金帝起五日土行標瑞表壬寅露光傳甲子宵隂風吹大澤夢日照昌朝不獨華封老千年喜祝堯集賢殿書院成送張説上集賢學士賜宴得珍字唐玄宗廣學開書殿崇儒引席珍集賢昭集作招衮職論道命台臣禮樂沿今古文章革舊新獻酬尊爼列賓主位班陳節變雲初夏時移氣尚春所希光史册千載仰兹辰奉和聖製送赴集賢院賦得輝字張説侍帝金華講千齡道固稀位將賢士設書共學徒歸首命深燕隗通經淺漢韋列筵榮賜食送客貴儒衣賀燕窺簷下遷鶯入殿飛欲知朝野慶文教日光輝同前賦得迎字源乾曜盛業光書府徵人盡國英司綸賢得相羣俊學為名寵命垂天錫崇恩發睿情薰風清禁籞文殿述皇明日霽庭隂出池曛水氣生歡娛此無限詩酒自相迎同前賦得升字裴漼問道圗書盛尊儒禮教興石渠因學廣金殿為賢升日月恩光照風雲寵命膺謀猷言可範舟楫事斯慿宴喜明時洽光輝湛露凝大哉堯作主天下頌歌稱同前賦得兹字蘇頲肅肅金殿裏招賢固在兹鏘鏘石渠內序拜亦同時宴賜歡談道文成貴説詩用儒今作相敦學舊為師下濟天光近中來帝渥滋國朝良史載能事日論思同前賦得西字韋抗廣庭臨璧沼多士侍金閨英宰文儒叶明君日月齊集賢光首拜改賜發新題早夏初移律餘花尚拂蹊壺觴接雲上經術引關西聖德鴻名逺將陪玉檢泥同前賦得回字程行諶聖主崇文化鏘鏘得盛才相因歸夢立殿以集賢開象繫微言闡詩書至道該堯樽承帝澤禹膳自天來禮洽歡逾長風恬暑更回國朝將舜頌同是一康哉同前賦得虛字徐堅崇文德化洽新殿集賢初庸菲參嘉選首濫承明廬殊私光輔弼榮送到簮裾座引中厨饌杯錫上樽餘翠葉濃丹苑晴空卷碧虛忝同文史地願草登封書同前賦得催字李皓偃武堯風接崇文漢帝恢集賢更內殿清選自中台佐命留侯業詞華博物才昊天千品降夏旨百壺催鴛鷺方成列神仙喜暫陪復欣同拜首叨此頌良哉同前賦得登字蕭嵩帝曰簡才能旌賢在股肱文章體一變禮樂道逾𢎞藝閣英華入賔門鴛鷺登恩筵過所望聖澤實超恆夏葉開紅藥餘花發紫藤微臣亦何幸叨此預文明同前賦得私字李元紘碩儒延鳯沼金馬被鴻私饌玉回丹禁箋花降紫墀銜恩傾旨酒鼓舞詠康時暫覯羣書緝逾昭盛業丕接筵欣有命搦管愧無詞自驚一何幸太陽還及葵同前賦得謨字賀知章西學垂玄覽東堂發聖謨天光燭武殿時宰集鴻都枯朽霑皇澤翾飛舞帝梧迹同逰汗漫榮是出集作挍汙塗三歎承湯鼎千歡接舜壺微軀不可答空欲詠依蒲同前賦得今字陸堅聖主崇文教層霄降德音尊賢澤既厚式宴寵逾深復有夔龍相良哉簡帝心得人惟邁昔多士諒推今書殿榮光滿儒門喜氣臨顧惟誠濫吹徒此接衣簮同前賦得賔字劉升圖書應明主䇿府宴嘉賔台曜臨東壁乾光自北辰網羅窮象繫述作究天人聖酒千鍾洽仙厨百品陳成山徒可仰涉海詎知津幸逄文雅盛還覩頌聲新同前賦得風字褚琇講習延東觀趨陪盛北宫惟師恢帝則敷教叶天工宣室恩常異金華禮更崇洞門清永日華綬接徽風萐降堯厨翠榴開舜酒紅文思光萬宇髙議待升中同前賦得筵字王翰東堂起集賢貴得從神仙首命台階老將崇御府員送人鏘玉佩中使拂瓊筵和樂春風解湛恩時雨連長材咸磊落短翮強翩翾徒仰蓬萊峻何階不讓緣同前賦得蓮字趙冬曦淺術方觀海深恩忽見天學開丹殿籍名與石渠賢良輔膺休命微生謬採甄春餘仍哢鳥夏近未舒蓮箋札來宸禁衣冠集詔筵史臣知醉德欲記升平年同前賦得華字韋述修文中禁啓改物令名加台座徴人傑書坊應國華賦詩開廣宴賜酒酌流霞雲散明金闕池開照玉沙掖垣留宿鳥溫樹落餘花謬此天光及銜恩醉日斜左丞相説右丞相璟太子少傅乾曜同日上官命宴都堂賜詩一首唐玄宗赤帝收三傑黃軒舉二臣由來丞相重分掌國之均我有握中璧雙飛席上珍子房推道要仲子訝風神復輟台衡老將為調護人鴛鸞同拜日車騎擁行塵樂聚南宫宴觴連北斗醇俾豫成百揆垂拱問彛倫奉和御製説璟乾曜同日上官命宴都堂賜詩一首應制張説大塊鎔羣品經生偶聖時猥承三事命虛忝百僚師右揆謀華碩前星轉重資連騫求舊禮濫玷樂賢詩賜釜同榮拜摐金宴宰司菊花吹御酒蘭葉捧天詞寶厯休明盛頺年晷漏衰少留青史筆未敢赤松期同前宋璟承相邦之重非賢諒不居老臣庸且憊何德以當諸厚秩先為忝崇班復此除太常陳禮樂中掖降簮裾聖酒江河潤仙文象緯舒冒恩懷寵錫陳力省空虛郭隗慙無駿馮諼愧有魚不知周勃者榮幸定何如同前源乾曜睿作超千古湛恩育萬人遞遷齊荷澤同拜忽為鄰道洽音徽暢芳馳景命新鼓鐘崇享禮鴛鷺集朝倫竊位思官謗凋容謝木春慙多無以敘拙實固難陳進級懷三少承光盡百身自當歸第日何幸列宫臣同前蕭嵩審官思共理多士屬誰當歷選台庭舊來熙帝業昌入朝師百辟論道協三光垂拱咨元老親賢輔少陽登崇榮禮送寵德曜宸章御酒飛觴洽仙闈雅樂張荷恩思有報陳力愧無良願罄忠公節同心奉我皇同前裴光庭樂賢聞往誥褒德偶兹辰端揆升元老師謀擇纍仁紫庭崇讓畢粉署禮容陳既荷恩榮舊俱承寵命新天文懸瑞色聖酒泛華茵雜遝喧簫鼓歡娛洽縉紳掖垣招近侍虛薄厠清塵共保堅貞節常期雨露均同前宇文融申甫生周日宣慈舉舜年何如偶昌運比德邁前賢寵護元良密榮瞻端揆遷職優三事老位在百僚先北極回宸渥南宫飾御筵飛文瑶札降賜酒玉杯傳謬列台衡重俱承雨露偏誓將同竭力相與效塵涓書殿賜宴應制徐安貞校文常近日賜宴忽升天酒正傳杯至饔人捧案前玉階鳴溜水清閣引歸煙共惜藝香暮春風幾萬年奉和賜史供奉曲江宴應制王維侍從有鄒枚瓊筵就水開言陪柏梁宴新自建章來對酒山河滿移舟草樹回天文同麗日駐景惜行杯麗正殿賜宴同勒天前煙年四韻應制王灣金殿忝陪賢瓊羞忽降天鼎羅仙掖裏觴拜鎖闈前院逼青霄路厨和紫禁煙酒空歡抃舞何以答昌年麟德殿宴百僚唐德宗憂勤承聖緒開泰喜時康恭己臨羣后垂衣御八荒務間春向暮朝罷日猶長紫殿初筵列彤庭廣樂張成功歸輔弼致理賴忠良共此歡娛事千秋樂未央奉和麟德殿宴百僚應制盧綸雲闢御筵張山呼聖夀長玉欄豐瑞草金陛立神羊台鼎資庖膳天星奉酒漿蠻夷陪作位犀象舞成行網已祛三靣歌因守四方千秋不可極花發滿宫香同前宋若昭垂衣臨八極肅睦四門雍自是無為化非關輔弼功修文昭隱伏尚武殄妖凶德立韶光被恩霑雨露濃衣冠陪御宴禮樂盛朝宗萬代稱觴舉千年信一同同前鮑文姬鮑徵君女睿澤光寰海功成展武韶戈鋋清外疊疑文物盛中朝聖祚山河固宸章日月昭玉筵鸞殿疑集仙管鳯凰調御桞低新緑宫鶯乍轉嬌願將億兆慶千祀奉神堯奉和四月三日上陽宫賜宴應制孫逖今日逄初夏歡逰續舊旬氣和先作雨恩厚别成春鳯吹臨清洛龍輿下紫宸此中歌在藻還見躍潛鱗春晚宴兩相及禮官麗正殿學士探得風字唐玄宗乾道運無窮恆將人代工隂陽調厯象禮樂報玄穹介胄清荒外衣冠佐域中言談延國輔詞賦引文雄野霽伊川緑郊明鞏樹紅冕旒多暇景詩酒會春風春晚侍宴麗正殿得開字張説聖政惟稽古賔門引上才坊因購書立殿為集賢開旄彥星辰下仙章日月回字如龍負出韻是鳯銜來庭桞餘春駐宫櫻早夏催喜承藝閣宴幸捧柏梁杯端午三殿宴羣臣探得神字唐玄宗五月符天數五音調夏鈞舊來傳五日無事不稱神穴枕通靈氣長絲續命人四時花競巧九子粽爭新方殿臨華節圓宫宴雅臣進對一言重遒文六義陳股肱良足詠風化可還淳端午三殿侍宴應制得魚字張説小暑夏絃應微隂商管初願齎長命縷來續大恩餘三殿褰珠箔羣官上玉除助陽嘗麥彘順節進龜魚甘露垂天酒芝花捧御書含丹同蝘蜓灰骨共蟾蜍今日傷蛇意銜珠遂闕如恩敕賜食於麗正殿書院宴應制前人東壁圗書府西園翰墨林誦詩聞國政講易見天心位竊和羮重恩叨醉酒深緩歌春興曲情竭為知音酺宴奉和上元酺宴應詔楊炯甲乙遇災年周隨送上絃祅星六丈出沴氣七重連赤縣空無主蒼生欲問天龜龍開寶命雲火昭靈慶萬物覩真人千秋逄聖政祖宗玄澤逺文武休光盛大號域中平皇威天下驚參辰昭文物宇宙浹聲明漢后三章令周王五代兵胸奴窮地角本字疑逺正朔驕子起天街由來虧禮樂一衣掃風雨再戰夷屯剝清明日月旦肅索煙雲渙寒暑既平分隂陽復貞觀惟神諧妙物乃聖符幽贊下武發徴祥平階屬會昌金泥封日觀璧水匝明堂業盛勛華德興包天地域孝思義罔極易禮光前式天渙疑三辰輝靈書五雲色敬時窮發斂卜代盈千億五緯聚華軒光重入望國公卿論至道天子拜昌言雷解初開出星空即便元瑶臺涼景薦銀闕秋隂遍百戲騁魚龍千門壯宫殿深仁洽蠻徼愷樂周寰縣宣室召羣臣明庭禮百神仰德還符日霑恩更似春襄城非牧豎楚國有巴人洛城觀酺宴應制陳子昻聖人信恭己天命允昭回蒼極神功被青雲祕籙開垂衣受金册張樂宴瑶臺雲鳯休徴滿魚龍雜戲來崇恩踰五日惠澤暢三才玉帛羣臣醉徽章縟禮該方覩升中禪言觀拜洛回微臣固多幸敢上萬年杯廣逹樓下夜侍酺宴應制蘇頲東嶽封回宴洛京西墉通晚會公卿樓臺絶勝宜春苑燈火還同不夜城正覩人間朝市樂忽聞天上管絃聲酺來萬舞羣臣醉喜載千年聖主明奉和登封禪禮畢洛陽酺宴應制張九齡大君畢能事端扆樂成功運與千齡合歡將萬國同漢酺歌聖酒韶樂舞薰風河洛榮光遍雲煙喜氣通春花頓覺早天澤倍知崇草木皆霑被猶言不在躬奉和十五夜燃燈繼以酺宴之作應制王維上路笙歌滿春城刻漏長逰人多晝日明月讓燈光魚鑰通翔鳯龍輿出建章九衢陳廣樂百福透名香仙集作神妓來金殿都人繞玉堂止應集作定應偷艷舞從此學新粧奉引迎三事司儀立萬方願將天地夀同以獻君王夏月花蕚樓酺宴應制王昌齡土德三元正堯心萬國同汾隂備冬禮長樂應和風賜慶垂天澤流歡舊渚宫樓臺生海上簫鼓出天中霧曉筵初接宵長曲未終雨隨行幕合月照舞羅空玉陛分朝列文章發聖聰愚臣忝書賦歌詠頌絲桐文苑英華卷一百六十八
