body:
  text: 文苑英華卷二百九宋李昉等編樂府十八君馬黃三首紫騮馬十三首驄馬驅五首驄馬八首白馬十首發白馬一首附擬飲馬長城窟九首走馬引二首愛妾換馬一首君馬黃二首張正見幽并重騎射征馬正一作自盤桓風去嘶聲一作長嘶逺氷堅度足寒出關聊一作徒變色上坂屢停鞍即今隨御史非復在樓蘭二五色乘馬黃追風時滅沒血汗染龍花胡鞍抱秋月惟騰渥窪水不飲長城窟詎待燕昭王千金市駿骨同前蔡君知君馬經一作徑西極臣馬出東方䇿舉一作足䇿浮雲影珂連明月光水凍恆傷骨蹄寒為踐霜躊躇嗟伏櫪空想欲從良紫騮馬梁簡文帝賤妾朝下機正遇良人歸青絲懸玉鐙朱汗染香衣一作金衣驟急珂彌響􅘠多塵亂飛雕菰一作胡幸可薦故人心一作心君莫違同前梁元帝長安美少年金絡鐵連錢鐵一作錦宛轉青絲鞚照耀珊瑚鞭依槐復依栁躞蹀復隨前方逐幽并去西北共連翩同前陳暄天馬汗如紅鳴鞍度九嵕飲傷城下凍嘶依北地風葭一作笳寒芳樹歇笛怨栁枝空橫行意未已羞住一作在轂車中同前李燮紫燕忽踟蹰紅塵起路隅圉人移苜蓿騎士逐蘼蕪三邉追黠虜一鼓定強胡安用珂為玉自有汗成珠同前陳後主嫖姚紫塞歸躞蹀紅塵飛玉珂鳴廣路金絡耀晨暉蓋轉時移影香動屢驚衣禁門猶未閉連騎莫一作恣相追同前徐陵玉鐙繡纒鬃金鞍錦覆幪風驚塵未起草淺垺猶空角弓連一作穿兩兔珠彈落雙鴻日斜馳逐罷連翩還上東同前張正見將軍入大宛善馬出從戎影絶乾河上聲流氷窟中似鹿猶依草如龍欲向空須還千萬里試為一追風同前獨孤嗣宗倡樓望早春寶馬度城闉照耀桃花徑躞蹀採桑津金羈麗初景玉勒染輕塵逺聽珂驚急知一作猶是畫眉人同前蘇子卿類聚作祖孫登侯騎指樓蘭長城向一作回路難嘶從風處斷骨住水中寒飛塵暗金勒落淚灑銀鞍抽鞭上關路誰念客衣單同前江總春草正萋萋蕩婦出金閨識是東方騎猶帶北風嘶揚鞭出栁市細蹀下金堤願君憐織絲殘粧尚有啼同前楊炯俠客重周遊金鞭控紫騮蛇弓白羽箭鶴轡赤茸鞦發迹來南海長鳴向北州胸奴今未滅畫地取封侯同前盧照鄰騮馬照金鞍轉戰入臯蘭塞門風稍急長城水正寒雪暗鳴珂重山長噴玉難不辭橫絶漠流血幾時乾同前沈佺期青玉紫騮鞍驕多影屢盤荷君能剪拂躞蹀噴桑乾踠足追奔易長鳴遇賞難摐金一萬里霜露不辭寒驄馬驅梁元帝朔方寒氣重胡關饒苦霧白雪晝凝山黃雲夙一作宿埋樹連翩一作驄行役子終朝征馬驅試上金微山還看玉關路同前二首劉孝威十五宦期門二十屯邉徼犀羈玉鏤鞍寶刀金錯鞘一隨驄馬驅分受青蠅弔且令都護知願被將軍照誓使氊衣鄉掃地無遺噍二翩翩驄馬驅橫行復斜趨先救遼城危後拂燕山霧風傷易水湄日入隴西樹未得報君恩聯翩終不住同前徐陵白馬號一作字龍駒雕鞍名鏤衢諸兄二千石小婦字羅敷倚端輕掃史一作吏召募擊休屠塞外多風雪城中絶詔書空憶長楸下連蹀復連􅘠同前江總長城兵氣寒飲馬詎為難暫解青絲繫行歇鏤衢鞍白登圍轉急黃河凍不乾萬里朝飛電論功易走丸驄馬車􅛴驄馬鏤金鞍柘彈落金丸意欲驂驔走先作野逰盤平明發下蔡日中過上蘭路逺行須疾非是畏人看同前庾抱櫪上浮雲驄本出吳門中發迹來東道長鳴起北風回鞍拂桂白赭汗類塵紅滅沒徒留影無因圗漢宫同前楊炯驄馬鐵連錢長安俠少年帝畿平似水宫路直如絃夜玉裝車軸秋金一作風鑄馬鞭風霜但自保窮逹任皇天同前沈佺期西北五花驄來時道向東四蹄碧玉片雙眼黃金瞳鞍上留明月嘶間動朔風借君馳沛艾一戰取雲中同前二首杜甫鄧公馬癖人共知初得花驄大宛種夙昔傳聞思一見牽來左右神皆竦雄姿逸態何崷崒顧影驕嘶自矜寵隅目青熒夾鏡懸肉騣碨礧連錢動朝來久試華軒下未覺千金滿髙價赤汗微生白雪毛銀鞍却覆香羅帕卿家舊賜公能取天廄真龍此其亞晝洗須騰涇渭深朝一作晨趨可刷幽并夜吾聞良驥老始成此馬數年人更驚豈有四蹄疾於鳥不與八駿俱先鳴時俗造次那得致雲霧晦冥方降精近聞下詔喧都邑肯使一作知有騏驎地上行二安西都護胡青驄聲價欻然來向東此馬臨陳久無敵與人一心成大功功成惠養隨所致飄飄逺自流沙至雄姿未受伏櫪恩猛氣猶思戰場利踠促蹄髙如踣鐵交河幾蹴層氷裂五花散作雲滿身萬里方看汗流血長安壯兒不敢騎走過掣電傾城知青絲絡頭為君老何由却出橫門道右二詩三百四十四卷重出今已削去同前萬楚金絡青驄白玉鞍長鞭紫陌野遊盤朝驅東道塵恆滅暮到河源日未闌汗血每隨邉地苦蹄傷不憚隴隂寒君能一飲長城窟為盡天山行路難同前紀唐夫連錢出塞踏沙蓬豈比當時御史驄逐北自諳深磧路連嘶誰念靜邉功登山每與青雲合弄影應一作因知碧草同今日虜平將換妾不如羅袖舞春風白馬沈約白馬紫金鞍停鑣過上蘭寄言狹斜子詎知隴道難赤坂途三折龍堆路九盤氷生肌裏冷風起骨中寒功名志所急日暮不遑餐長馳一作驅入右地輕舉出樓蘭直去已垂涕寧可望長安匪期定逺封無羡輕車官惟見恩義重豈覺衣裳單本持軀命答幸遇身名完同前王僧孺千里生冀北玉鞘黃金勒散蹄去無已搖頭意相得豪氣發西山雄風擅東國飛鞚出秦隴長驅繞岷僰承謨若有神稟算良不忒瀄汨河水黃參差嶂雲黑安得一作能對兒女垂帷弄毫墨兼弱不稱雄後得方為特至思一作此心亦何已君恩良未塞不許跨天山何由報皇德同前徐悱研蹄飾鏤鞍飛鞚度河干少年本上郡遨遊入露寒劔琢荆山玉彈把隋珠丸聞有邉烽急飛候至長安然諾竊自許捐軀諒不難召一作占兵出細栁轉戰向樓蘭雄名盛李霍壯氣勇彭韓能令石飲羽復使髮衝冠要功非汗馬報效乃鋒端日沒塞雲起風悲胡地寒西征馘小月北去腦烏丸歸報明天子燕然石復刋同前隋煬帝白馬金貝裝橫行遼水旁問是誰家子宿衛羽林郎文犀六屬鎧寶劔七星光山虛弓響徹地迥角聲長宛河推勇氣隴蜀擅威強輪臺受降虜髙闕剪名王射熊入飛觀校獵下長楊英名一作雄欺衛霍智䇿蔑平良島夷時失禮卉服犯邉疆徵兵集薊北輕騎出漁陽進軍隨日暈挑戰逐星芒陳移龍勢一作膝動營開虎一作鴈翼張衝冠一作冦入死地攘臂越金湯塵飛戰鼓急風交征斾揚轉鬬平華地一作麗追奔掃鬼方本持身許國况復武功彰會令千載後流譽滿旗常同前王胄白馬黃金鞭蹀躞栁城前問此何鄉客長安惡少年結髮從戎事馳名振朔邉良弓控繁弱利劔揮龍淵一作泉披林扼雕虎仰手接飛鳶前年破一作絶沙漠昔嵗取祁連折衝摧右校搴旗殪左賢昆一作虎左傳有力如虎者彌還謝力慶忌本推儇海外平一作憑遐險來庭識負褰一作職貢愆三韓勞薄伐六事指幽燕良家選河右猛將徴西山浮雲屯羽騎蔽日引長旃自矜有餘勇應募忽爭先王師已得雋夷首諒失一作失求全鼓行徇玉檢一作王儉乘勝蕩朝鮮志勇期一作所期大功立寧憚微軀捐不羡山河賞惟希竹素傳同前辛得源任俠重芳辰相從競逐春金羈絡赭汗紫陌映一作縷應紅塵寶劔橫一作提三尺雕弓韜六鈞鳴珂蹀細栁飛蓋出宜春遙見浮雲一作光發懸識隴頭人同前杜甫白馬東北來空鞍貫雙箭可憐馬上郎意氣今誰見近時主將戮中夜商於戰喪亂死多門嗚呼涕如霰同前李白龍馬花雪毛金鞍五陵豪秋霜切玉劔落日明珠袍鬬雞事萬乘軒蓋一何髙弓摧南山虎手接泰山猱酒後競風采三杯弄寶刀殺人如剪草劇孟同遊遨發憤去函谷從軍向臨洮叱吒經百戰一作萬戰場胸奴盡奔逃歸來使酒氣未肯拜一作下蕭曹羞入原憲室荒徑隱蓬蒿同前賈至白馬紫連乾嘶鳴丹闕前聞珂自躞蹀不要下金鞭同前翁綬渥窪龍種雪霜同毛骨天生膽氣雄金埓乍調光照地玉關初别逺嘶風花明錦襜垂楊下露濕朱纓細草中一夜羽書催轉戰紫髯騎出佩騂弓發白馬費昶家本樓煩俗投募羽林兒怖羌角抵戲習戰昆明池弓弛不復挽劔衣恆露鈹一辭豹尾內長别屬車埀白馬今雖發黃河未結澌寄言閨中婦逄春心勿移此詩元編在白馬門按樂府白馬乃津名故加發字與白馬不同今移于後擬飲馬長城窟陳後主征馬入他鄉山花此夜光離羣嘶向影因風屢動香月色含城暗秋聲雜塞長何以酬天子馬革報疆場同前王褒北走長安道征旅一作騎每經過戰垣臨八陳門樓一作旌門對兩河屯兵戍隴北飲馬傍城阿雪深無復道氷合不生波塵飛連陳聚沙平騎迹多昏昏隴底日一作月耿耿霧中河羽林猶角抵將軍尚雅歌臨戎常拔劍蒙險屢提戈秋風鳴馬首薄暮欲如何同前張正見秋草朔風驚飲馬出長城羣驚還怯飲地險更疑行傷氷一作水斂一作驚凍足畏冷急寒聲無因度吳坂方復入羌城同前隋煬帝肅肅秋風起悠悠行萬里萬里何所行橫漠築長城豈台小子智先聖之所營樹茲萬代䇿安此億兆生詎敢憚焦思高枕於上京西河執一作北河秉武節千里倦一作捲戎旌山川互出沒原野窮超忽摐金止行陳鳴鼓興士卒千乘萬騎動飲馬長城窟秋昏塞外雲霧暗關山月緣巗驛馬上乘空烽火發借問長城一作安候單于入朝謁濁氣淨天山晨光照高闕釋兵仍振旅要荒事方舉飲至告言旋歸功清廟前同前唐太宗塞外悲風切交河氷已結瀚海百重波隂山千里雪逈戍危烽火一作起層巒引髙節悠悠卷斾旌飲馬出長城寒沙連騎迹朔吹斷邉聲邊塵清玉塞羌笛韻金鉦絶漠干戈戢車徒振原隰都尉反龍堆將軍旋馬邑揚麾氛霧靜紀石功名立荒裔一戎衣雲臺凱歌入同前虞世南馳馬渡河干流深馬渡難前逄錦車使都護在樓蘭輕騎猶銜勒疑兵尚解鞍溫池下絶澗棧道接危巒拓地勳方一作未賞亡城律詎寬有月關猶暗經春隴尚寒雲昏無復影氷合不聞湍懷君不可遇聊持報一餐同前袁朗朔風動秋草清蹕長安道長安道一作城連不窮所以隔華戎規模惟聖作負荷曉成功鳥庭已向內龍荒更鑿空玉關塵卷靜金微路已通揚一作湯征隨北怨舞一作舜詠起南風畫野一作地功初立綏邉事云集朝服踐狼居凱歌旋馬邑山響傳鳳吹霜華藻瓊鈒屬國擁節歸單于欵關入日落寒雲起驚河被原隰零落葉已寒河流清且急四時徭役靜千載干戈戢太平今若斯汗馬意一作竟無施惟當事筆硯歸去草封禪同前陳標日日風吹虜騎塵年年飲馬漢宫人千堆戰骨那知主萬里枯沙不辨春浴谷氣寒愁墜指斷崖氷滑恐傷神金鞍玉勒無顔色淚滿征衣怨暴秦同前釋子蘭遊客長城下飲馬長城窟馬嘶聞水腥為浸征人骨豈不是流泉終不成潺湲洗盡骨上土不洗骨中寃骨若逐水流一作流水四海有還魂空流嗚咽聲聲中疑一作是骨言走馬引張率良馬龍為友玉珂金作羈相去京一作宛與洛半驟復平一作半馳倐忽而千里光景不及移九方惜未見薛公寧所知斂轡且歸去吾畏路旁兒同前傅縡驄馬表連錢出冀復來燕取用偏開地為歌乃號天權竒意欲逺躞蹀勢難前本珍白玉鐙因飾黃金鞭願酬芻秣寵千里得千年愛妾換馬張祜一靣夭桃千里蹄芳一作嬌姿駿骨價應齊試一作乍牽玉勒趨一作辭金埒一作棧初一作催整花鈿出繡閨去日豈無霑袖一作袂泣别時猶解一作歸時還有頓銜嘶嬋姢蹀躞春風暮一作裏揮手搖鞭楊栁堤文苑英華卷二百九
