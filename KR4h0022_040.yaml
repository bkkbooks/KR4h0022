body:
  text: 文苑英華巻四十宋李昉等編水九氷井賦二首浪井賦一首義井賦一首井賦三首枯井賦一首耿恭拜井賦一首井渫不食賦一首氷井賦以寒井隂固氷以時入為韻李胄氷井皚兮星嵗闌氷候井於春泮井含氷而晝寒其質也惟至貞而可鑒其量也惟極深而可觀夫其碧甃熒熒清光烱烱呀爾莫測堅爾而静閉土膏之潜脉奪霜空之麗景疑濟時方候其獻羔利物不資於短綆前王何以貴氷而鄴臺尚開乎舊井下視千人傍窺百尋足使貪夫勵志君子戒心或以慮危則取象於履薄或以思險則取類於臨深豈從逺自窮谷而納於凌隂其道有恒其迹無固當未用也雖處幽而無悶當其用也雖向炎而不懼縱居井之未深亦在氷而守素若乃天地閉海河凝風落木霜含氷或呈六尺以表符瑞或因五行而見咎徴寧比夫在坎窞而不耀遇陽和而自升故知井之爲德莫之可比奚若汲引於焉賔祭是以頒之也遍出之也時雖應用而無倦終待命於有時東風可觧西陸可期不以深而見棄不以輕而見遺側玉盤而有望仰金門而可入質惟務施固不戀於深山道貴能行亦何慙於改邑懿夫吾王之政無不脩化無不及猶慮霜雹之爲災故氷井所以立第二同前韻史宏鑿之氷井厥用可觀井因厚地而深始將乎人力氷以積隂而壯必本乎司寒所以候立春而氣至當嚴寒之律殘順乎時不愆於夏厯守其典必驗於周官若乃冽井者泉藏氷者井至隂相合表虚受之無瑕聚氣而堅叶坤柔之至静况乎𤣥律固沍寒光凝冷積風塵於四郊封雪霜於萬嶺者哉觀其啓隈隩洞幽深矗如雪聚皎若月臨抱堅精之素質體𤣥妙之精心期三凌以示乎遍用言一日方屬乎窮隂且渫其井不愆於度爰納其氷轉増其固妍媸必表將金鏡而分形明皎相鮮與瓊漿而競素影淋漓而未泮質晶耀而凝沍若玉壺之洞開似金波之始露其初也小人是承剪乎荆棘陟彼丘陵當𤣥冥之用事供北陸而藏氷出窮谷而方結下重泉而轉凝託影超象因物爲比或瓊碎而星流或峯聨而岳峙爲王者之恒典俾羣生而是以穿重壤之十仭以表藏周候朝覿而夏頒用不私已稽夫井以不變爲德氷以至堅自持井非氷而不能全其浄氷非井而不能應其時體剛居中且異乎渫而不食力柔其重方同乎順以致辭其功克廣其用斯給慎以祓除節其出入異彼廬陵之瑞空存三色異物志廬陵城中一井二色水半青半黄今作三色之名同夫甲子之祥用彰七月之什當其舊典不廢新令是緝喜災害之無虞頌皇王之御立浪井賦以王者清净則出爲韻王起冽彼寒井契於聖王不因鑿以成質每自浪而呈祥涌呀呷鼓靈長比醴泉之自出異海水之不揚吾君是時清八區肅諸夏寳出於地符呈於野伊井有浪焉乃瑞之大者爾其呀豁百尋之表洶涌重泉之下狀靈濤之潜洩匪烈風之是假淪漣不盈觸搏恒驚窺坎窞之底有江湖之情積而有潤於下混而不傷其清窺則澄澄乍玉甃而同色汲之浩浩激銀瓶而有聲鲋飛鱗而不定羊在缶而皆傾洎夫列宿參差曉月韜映摇珠彩而増㓗湧金波而轉净湯湯下激不施屏翳之功洶洶潜驚詎假陽春之詠然後駭四海之目垂兆人之慶伊厚地之發祥實大君之作聖彼青桐素綆之餙玉檻銀床之盛皆人力之所成固神造之不競宜乎光瑞典苞坎德不藏於氷不蓄於墨惟波獨湧惟渫可食奉我皇之飲俾上善以爲心戒我皇之窺必臨深以取則知井非浪不貴乎成質浪非井不彰乎聖日此井而王化其清比浪而王心不溢稽休明而合應將汲引而無失彼堯人鑿而飲漢將拜而出未足以彰其帝功而較其靈術者也義井賦并序吕令則鑿地生泉之爲井施人不倦之爲義兼濟徃來存乎惠也置當衢路仰無私也皎鏡清虚尚其㓗也三德既備萬物是仰井乃無心義惟我謀當衢鑿井稱物並施酌而不竭奉衢樽之化焉見義不爲恥也遇善莫書過也義既行矣文在兹乎賦曰夫地脉伏泉天文垂井式觀象而遂鑿雖暫勞而功永深不過於數仭用有要乎萬頃風動無波物對生影勁隂殺節挹之而彌温炎旱蒸天探之而逾冷况地接一都之㑹邑居狹俗之境川流雨驟車馬於焉徃來風舉雲摇帝王由茲行幸魏主罷指梅之䇿隰朋息尋蟻之請豈非人有其願地不藏靈色湛湛以天碧嵌隂隂而晝𡨕髙風始秋泛落桐之一葉太陽既没映長天之數星因注水而暫益縱改邑而常寜素綆下懸映垂氷之皛皛銅瓶上汲滴淺溜之泠泠清泉既汲白日可見豈獨兼濟行李抑亦取給茲縣隨所求而皆足豈有殊於貴賤若乃連巖之曲闉闍之前雨苔環合生其上露桃蓊欝植其邊殊季氏之有缶異疏勒之無泉入夜雲開涵長河之短直向晨霧歇映大天之小圓玉甃䕶崩誰識下無禽矣銀床防墜不聞中有人焉乃有王國征人奔星驛騎或注情於故櫪或衘悲於逺寄飲之則長鳴而忘其苦辛酌之則充量而欣其普施雖一勺之葢鮮亦懷恩而感義瓶之罄矣既虚來而實歸爾牛來思亦滿腹而疑受賜故知理邑者賢濟人者井揚聖人之道用而不竭守君子之德澄而彌静鑿飲忘帝王之力汲用嘉仁明之境儻見惻於莫食庶㣲功之得省井賦吕令則體羣物以舉要多井功之大成灑元氣之洪液翕泉源之至精巽下坎上創庖羲之畫象鍤壤畚土喜伯益之初營淡其味澄其清同不變以育德履剛中而益平汪濊津潤兮物得其利沃盪盥潄兮人頼其生是以養而不窮則取之而逾出止而有分即舍之而不盈故啓幽人之三徑首先王之五行若乃寒漿是汲羙人至止玉甃駢固銀床沓起轆轤宛轉以旋目素綆逶迤而度趾羅袖互引扇皓腕而生香金瓶數泉疑曲纎腰而貯水雖騰突於溜源不混淆於泥滓汔至而繘瀉已就猶尚潜聲而駭耳濯之旣㓗潄之則羙何自下而汲上與溪壑而殊㫖故其旁搜詭迹遐評殊見土精攸出惕羵羊之恠竒趹角已沉欝神龍之氣變金色化粥山形溜殿源洞德陽之兵勢匿江陵之縣秦分星聚卭都火煽漢皇歘應於雲飛葛公一窺而電烻斯故潜恠之所蓄洩吾不可得而言遍徒羙其括坤之靈包坎之德徃來井邑用之不忒秉虚澹而能施守卑静以自得終勿幕之有孚保元吉而無惑苟在時而不泥庶當渫而見食第二髙無際若夫羣萌異質品物殊狀俱擾擾以祈生各營營而自養莫不濟時爲要利物爲先法星文而鑿井規卦象而開泉大舜垂功於兹日龎君著績於此年資坎德而成潤播靈液而澄鮮潜流洞徹細影凝冽不以處幽而易清不以居深而變㓗於是雕以玉甃飾以銀床棲永康之瑞鳥藝文類聚引異苑永康王曠井上有洗石子婦覩二黄鳥鬬掩取變成黄金者也呈魯國之羵羊持素綆以就汲引金瓶而未央爾其紅桃春映若新粧之臨寶鏡朱李下垂疑明星之列玉池喜丁公之得利懿嫫母之來窺至若鐵騎雷駭劍士雲列燕山之陣欲舒踈勒之泉已竭旅客愁聚征夫思咽應下拜而將飛表忠臣之髙節此甘泉之神用也至若冬凝温色夏湛寒輝既不偏滋於隆重亦不减潤於卑㣲飲之咸濟汲之無違轄將投而鳯没錢始出而鳬飛此甘泉之普施也若乃冲融表裏類彼君子鑒一作鑿之無窮挹之何已悟帝王之無力學仁者之徃視徘徊銓庭思盡羙矣第三以淸汲遇時羙爲韻張耀原夫井之爲德以不變而居貞既成形於方載亦列象於圓清潤下之功爰脩之於六府習坎之義則配之於五行惟斯井之肇作實伯益之所營爾乃玉甃爰起銀床斯立窺尋丈以惟深覘清泉之始及青梧下映泛桂一作珪葉以摇揚素綆髙懸弄銀瓶之出入光洞徹而緣止影飛飜而爲汲且其盥之取新渫之去故體清通之惟審知應物而無忤居上善而且平挹清規而可遇庶乎鸞鏡熒煌而可比鳯池皎㓗而爲喻别有前臨紫殿俯映丹墀上棟下宇繡栭文楣意者豈非至尊尚恬淡而取諸動善時而已哉懿夫粉署清華飛禽載止對仙郎之章奏近尚書之劍履竊自羞嫫母之陋姿鑒清瀾之眩羙枯井賦粤若天生五材兮一不可棄水包六府兮萬人攸利汙一作窊樽抔飲兮變其淳朴鑿井汲泉兮興其繪事六十四卦兮表其名二十八宿兮列其位伯益創而功立重華浚而德備故有神丘玉檻仙苑銀床浪華浮潤醴泉味芳永康則金精化鳥詳見井賦第二篇一作馬字者非曲阜則土恠成羊感至誠於漢將通瑞氣於吳王若乃懸繘下垂抽瓶上出窮百丈之幽秘極九重之邃宻由中夏而浹外區自帝王而周庻匹接壤鄰甸駢閭比室咸頼此以資生必待斯而養質隨大小而周用任多少而取實環終始兮歴古今積嵗時而綿月日湯七載而無减堯九年而不溢一家曠兮靡寜寸路虚而有卹運其功兮信廣收其利兮焉畢及夫欄傾甃毁土陷泉沉滋液中耗汙泥上侵古桃顦顇兮無色枯桐零落兮罷隂霜霰積兮空園冷荆棘攅兮荒徑深昔時之所趣挹疇日之所窺臨皆指新而競徃罕存舊而來尋豈唯見嗤於射鮒諒亦興歎於無禽如使崩壞重脩堙泉更渫澄汰汙滓鑒觀清冽擬畫處之蓮房除哭者之茅絰近類齊人之井逺一作虚分夏后之穴若澗溪之始注猶泛濫之初决當給養之不窮寜酌甘而先竭辭疑作亂曰有通有塞兮道之恒時用時捨兮業方𢎞䟽而洩兮甘潤騰壅而竭兮汙泥増彼幽涸兮如重啓濟窮渇兮良所能耿恭拜井賦以感通厚地神啓甘井爲韻羅讓昔耿恭躬受斧鉞志清煙塵奮長䇿以討冦由至誠而感神於是堅踈勒之壁依澗水之濵據以爲備期乎來賓既而匈奴奔敗而伺隟澗泉壅絶而不至雖礪乃戈矛而渇我將吏遂乃處孤城而穿井窺重泉而闢地深餘十丈曽無一勺之多職長千夫幾敗三軍之事因不見其成績憤將逹於精意俄而外整衣服中懷果敢推赤心於神祗禱素液於坎窞拜未及起呌天以無辜言未及終觸地而有感閟其質若俟仁人發其䝉俄成澹淡灌濯執熱祛除積慘明矣大漢士卒所以歸心惕爾窮荒君長於焉破膽乃知以精誠及物何物不覃以忠烈靖難何難不戡自我而來且見不虚其請由中而出孰云先竭其甘是日也飲人如醴帝教勃焉而光啓盪㓂之功將畧忽爾而𤣥通如突如焚既冽清而可食一拜一起遂觱沸而無窮疑斯乃道靡不𢎞虗無不有諒歸之於感激豈間之於博厚所以貳師至境决泉脉於喬嶺校疑尉臨邊發水源於眢井疲羸因之盡濟狂孽由之逺屏則知在物無必至誠有孚如聲之響如形之影井渫不食賦有浚其井當時未知功已成於岸甃道尚失於瓶羸潤氣寜發潜源且卑此遇鑒明而足用彼將心惻以何爲蓄利惟多含清信久幸可溉於鼎鑊惜無施於綆缶塗泥既去方應用以虗心汲引攸難希有成於假手况復桐色無㸃桃隂不生思輒輸其涓滴望無廢於澄泓同羙玉於斯將沽有待比嘉肴不食其味焉呈蓋由混衆難分處幽多棄盥潄無及空知冽彼下泉顧盼可期猶謂居之善地淵然日久望是光臨懼以名徵想貪泉尚酌登諸薦品豈行潦獨任屬時非於踈勒惜地異於漢隂願先竭以當仁期分甘苦俟一窺而見愛焉測淺深噫夫穿鑿多勤鑒臨斯及佇將成於勿幕恐致變於改邑因以纎綆可施一勺可挹實有備於烹飪之日惟夫深知而用汲文苑英華巻四十
