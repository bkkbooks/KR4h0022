body:
  text: 文苑英華巻七十宋李昉等編耕籍田農附籍田賦三首千畆望幸賦一首觀農賦一首稼如雲賦一首揠苖賦二首㓕裂禾賦一首籍田賦失名帝王之德無以加於孝乎惟孝之理惟農是先我上皇傳璽之二載聖主飛龍之四年日在陬訾祗事於九宫之位時惟戊巳躬耕於千畆之田祥風發於耒耜瑞雪掩於郊鄽萬姓顒顒若百川之朝海九宫濟濟如衆星之麗天帝乃儼然䕃華蓋被衮服戴冕旒佩瓊玉朱紘炯以照燭藻繂紛其繁縟敬齊之色既肅肅以雍雍禮樂之容亦皇皇而穆穆於是出甲乙之帳命先農之官設庭燎而晰晰陳量幣而戔戔旌旄夾於翠幕簨簴列於青壇然後華鐘撞焚燎舉馨香發乎聖躬烟煴感乎寰宇常伯撰播殖之器宗人掌牲帛之數既金石而間陳亦籩豆而静旅晨光漸朗湛露初晞告九天之事畢將三辰之禮依帝猶懐神農之務穡想伯禹之疆理一之日於是躬耕二之日於是舉趾秉金耦而顒若駕鐵驪而禮矣將致美於粢盛遂盡力於耘耔望農祥之晨正知土膏之脉起所寳惟榖故大飲以勞農所貴惟人故躬耕以悦使俾夫三時不奪六府咸修遂放牛於藪澤還却馬於田疇道方齊於雨粟化實逺於焚裘務穡勸分顧勤於稷禹授時度地彌甚於殷周職乃分於九鳸政不逮於諸侯豈非人和而俗阜亦將力穡而有秋是日命丞相廵行山林道達溝瀆因物土以分宜隨川原而刋木畫為九野教種百糓實萬代之儲址况九年之所蓄猶以為不躬不親庶人不信降翹車以徵求發紅粟以恤賑綈弋不加於嬪御茅茨永慕於堯舜祭惟司嗇蜡必田畯即異畆同穎豈獨瑞於徃年象畊鳥耘是錫羡於今運適有田父起而歌曰畇畇千畆兮理有疆濟濟千耦兮稷既良躬三推兮供神倉分九鳸兮應農祥粢盛普淖兮潔敬斯皇神之聼之兮將登穰穰第二李蒙揉為耒剡為耜取其象也逺矣農為本食為天惟其利也大焉聖人利器致豐躬親莫重於稼穡軌物勵俗敦勸克厚乎率先于以奉神祗昭報之誠達於以祈社稷孝享之德宣則躬耕之義也從古以然皇帝勤惟國本欽若人天所務惟農順動而取諸豫所寳惟榖時行而應乎乾洎正月之吉日將有事乎昊天列千官於近甸屯萬騎於遐阡當是時也其祭不戒而宿設其工職兢以先後大禮備兮和樂陳嗇夫馳兮庶人走帝乃服葱犗乗御耦我疆我理禮正於三推必躬必親義存乎千畆四輔冡宰六卿近臣大夫師長之族都鄙華裔之人聖有作兮萬物咸覩人胥效兮天下歸淳且圖匱者於其豐防險者於其逸有備所以無患克勤是用終吉三推之禮廢則倉廪以之虚肆𤯝之恩廢則簡書以之佚欽哉欽哉能事斯畢夫然則農功可大農扈允臧以農為本兮國有常令以農率下兮人知向方亦既奉宗廟亦既備蒸嘗一人垂訓兮萬國昌固有述於日用于胥頌美兮聲洋洋第三以復收墜典以期農祥為韻石貫太皥御辰勾芒定位天子率躬耕之禮有司謹親載之事以為帝籍斯闕皇猷久墜不修耒耜之功是墮粢盛之義於是擇元日戒農期本千畆而敬矣齊三日以告之然後内外清謐上下肅祗文物之儀備列戈鋋之衞在兹猶窺紫禁共仰丹墀儼南面凝旒之所當東方欲曉之時漏水聲盡爐香上遲俄而閶闔開羽儀展揚青旗以肅事備朱紘而戒典上乃望靈壇御玉輦蒼龍整駕以前導葱犗遵途而右轉六轡齊舉八鸞啟行向緑野公田之所至青郊展禮之方紺轅塞路青輅廵塲叶農經而授事指農正而告祥由是别土冝分疆理入滌塲而肆目撫御耦而舉趾遂乃執紅紖親黛耜四顧而溝塍砥平三推而土膏脉起發生有在播殖兹始諸公諸侯而次進或五或九而皆止見京坻之流衍可期覩稼穡之艱難有以禮樂既備人神告休事雖兆於東作稔以見其秋收豈獨親耕於甸内實亦種德於道周羣臣乃伏輦而進曰臣聞歴代務農百王重榖陛下興古典之已墜紹前修之不復故得人勤稼穡天降景福帝曰予上事天地次奉祖宗惟舊章是率惟古典是恭今將返鑾輅而宴於太寢又欲展禮而勞農千畆望幸賦以將興墜典允屬聖期為韻失名國重農事帝遵時令惟千畆之可親望三推而闡盛田畯方勤於禀法甸師已切於承命陽和初布庶平東作以勸人逕術既端終俟南郊而見聖當其融風式協韶景方遲金根為順動之馭菖葉表親耕之期度以地狹難容足列公車之數顧其土膏潜動可陳農器於兹修壠惟直遐阡甚夷是宜率諸侯大夫以行乎周禮不可使四年正月獨稱於晉時言瞻耒耜志惜墳衍謂畇畇而足得天臨想澤澤而正冝春淺空為散地尚欝新典載芟未及勾萌之出何因一墢為期螻蟻之誠願展翠幕猶閟朱紘未至當人力可借而成功使農祥失正而奚利染塲之履見潘岳籍田賦期剡剡以輕移撫藉之衣想襜襜而如墜且夫事遵禮動法貴聖興顧井田之君是可出而偕作懿初耕之帝宜其徳以相成不然則無以知土宜慰人欲使其穜稑克備粢盛乃足庶見其耘之耦一一具陳必報乃求之倉纍纍交屬况以近甸堪樂元辰以良借百歩之疇冀停雲早修三班之令期在月將如此則樹徳咸滋訓農惟允畢力克符於地事致誠不昧於畦畛儻禮備而必行實以表乎仁之至義之盡觀農賦失名歳起于東丁壯就功則知富民必資於廪實彊國亦在於年豐是時也杏花毓樹蒲葉抽叢繞出鳯城疲道路之攸徃廻瞻鶉野知耕鑿之斯崇美夫原隰底績溝塍刻鏤耒耜交横烟雲輻輳人沮溺而為伴水鄭白以分溜一稃二米禾同北里之禾苖盛草稀豆異南山之豆觀夫田畯至喜室家相歡揮鎡去莠築堰澆蘭野餉曉持於斜逕畚鍤暮荷於層巒隣近山之樹宻悦臨流之地寛葵腰鎌而乍采黍策杖而時㸔且人生在勤勤則不匱欲抑末以敦本在用天而分地思文后稷濟時敷播植之功惟彼陶唐申命掌嵎夷之事八政之中食居一四人之裏農為二倬彼甫田習無不利故土爰稼穡含靈是資嵗稔則家知禮讓食足則國賛雍熙無辭艱難服先疇之畎畆皆當儲峙救黎人之阻饑九年殷憂於堯日萬箱發詠於周詩迹忝門人得承規於孔父心將請學恐貽責於樊遲稼如雲賦以農夫望歳歡以終場為韻張仲素天何言哉嵗云秋矣臨甫田而一望見多稼之具美亘平野而雲鬰覆髙原而黛起九土用康兆人頼止豈非協風中律農祥順軌土牛作候而不愆銅雀載鳴而有以徒觀其千畆既良萬頃式臧興有渰而混色霑霡霂以齊芳雜非烟與非霧乍漠漠以蒼蒼孰克辨乎帝力咸自嘉於我疆御田祖之神時聞擊皷樂農夫之慶且見築場察彼近郊知夫四裔何山苖之能植伊隰桑之尚蔽豐滋漫若用表於播時悦茂油然寧憂於晩嵗矧乃華實云就堅好不渝豈茨梁之足喻若薈蔚之將敷知艱難垂戒於徃哲務藨蓘在勸於鄙夫爰協古公之政式𢎞管氏之虞至夫實穎蓁蓁厥田上上膏隂潤以蕃庶矗朝隮之異狀丘陵共秀且聞束晳之詩黍稷盈疇更欝仲宣之望懿夫白露凝冷清風戒寒是刈是穫式宴且歡諒遺滯之足利思京坻而可觀蓋由我君勤儉所彰純嘏屢錫運璿衡之冥數煥玉燭於昌厯分地而嘉榖用登報天而犧牛在滌下臣覩而作頌敢嘆美於成績重曰望如雲兮我稼既同除其穢兮田具是功既庭又碩兮將表嵗終喜有秋兮可以勞農揠苖賦以無助苖長時至斯茂為韻楊濤苖生有漸兮時不可踰揠而求長兮是謂甚愚謂坐致其滋茂翻立見其萎枯欲速之成雖切受益之理固無計牽挽之功雖則勞止在播植之道不亦踈乎原夫勢惟探掇心則陵遽曾本固之靡思徒末大以生慮附麗無所同伐木而蹷根援引靡辭似㧞茅之連茹苟離根而去本必有損而無助然則抽軋奚補枯槁是招雖盡區區之意彌損芃芃之苖助長且乖於載績速成空望於一朝殊不知潤以膏澤託兹沃壤待天時以煦資地力以養諒物生之有恒何力㧞而能長豈不以立心有惑措手無疑俄見宛其死矣猶云有以助之不發悟於盡瘁空深迷於務滋謂短長皆由於已謂遲速不繫於時勞而無功殄乃自致方握蘭而勢並比捽草而功異增高之望莫從盡揠之助爰至狥躁求之性始望如雲乖馴致之方終貽委地逆其理而如是傷其物而由斯欲益為謀冀有秋之彌疾過求生害嗟不日而已萎是以君子明於休咎每因縁於根本不苟且於華茂推於命俟於時無若宋人之大謬第二以時貴順成非由速致為韻李程瞻彼陂田新苖在地徒施助長之術且異發生之類望斯箱之翼翼爰用心期貪彼黍之芃芃方將力致摇然乃亂興每如抽自貽伊戚職汝之由忽分藂於歩武俄裂土於田疇勞焉無功焉用㧞乎其萃動而愈出縱其生也若浮既不得於和熟宜取傷於躁求相彼老農求之欲速傴僂煩手扶踈自目信相違於淺種不用其良既自露於深根曷云能榖忘枯槁之如彼尚低徊而念兹繞指尚疑於取苧勞身豈並於乘時攬一握之纎莖始如陵草聳千科之細葉終異園葵孰云農事以妨但取髙而為貴無思去草之務有若㧞茅之彚不從其道雖矻矻以徒勞莫悟其由訝離離而增欷原夫秀而不實愛欲其生覆東臯而歴亂交南畝以縱横或長或短稍因人而盡起靡瞻靡顧俄麗地以同傾與其違性而早落豈若從宜而晩成時不爽於榮枯事可期於逆順惟躬是瘁寧同於百卉具腓以若所為且異乎孤蓬自振亦由行道者之仁義可依嘉上聖之知命戒中庸之妄祈賦孟子之言聊將此喻窮宋人之理永鑒其非㓕裂禾賦以為功不至其報則然為韻陶洪昔子罕之秉權有封人之問焉以為事不可以不敬物不可以不䖍於是陳曩日耕大田予之於禾也其情易爾禾之於予也其狀悴然莫不報其素莫不答其先予知其意遽變予志倍切於他時盡力於兹地然後萌而宻葉以翠契本心而罔違充所養而不匱故知生寡者其功未既實稀者其心不至苟矻矻以自強何芃芃之莫致是以人之從政士之飭躬僉黽俛而無極並陵兢陵凌或通用揚雄甘泉賦馳閶闔入陵兢而靡窮未有不課而名立未有不勤而道融所謂君子重其實貴其功以行之慎者比其盛以動之慢者譬其不惟盛也著美而可觀惟不也售能而誰取信乎鹵莽於庶績何異㓕裂於南畆草既在茲衆亦棄之雖有百㕓莫得就而獲一作穫雖有萬頃焉可俯而持哂之者宜夫莞爾歎之者何莫凄其則知惡必由人善隨厥操徃無不宜施無不報雖斯言之細㣲實所諷之𤣥奥足以將懲躁競用戒澆漓朂萬代之攸習勵蒸人之所為若然者功以之成利慿而得實輔政之義理亦勸學之典則在稼尚其如斯人乎曷不鑒之以隱惻文苑英華巻七十
