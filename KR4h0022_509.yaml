body:
  text: 文苑英華卷五百九宋李昉等編師學門十六道申公杜門判二道坐於左孰判二道聚徒教授判二道蜀物至京判二道生徒擢塵判一道陳設印綬判一道為其師掃判二道掘窖試之判一道去師之妻判一道請益不退判一道勤學犯夜判一道申公杜門判申公杜門不出聚逺方衆百餘人里中興訟對王欣儒惟教先學乃德本茍立誠以修業終養中而果行故道存斯貴方類是歸無愆自逺之㑹庶廣克成之業雖門人請益既有孚於鼎新而邑里無儀却興言於獄訟沉吟漢牘反復周典黨而成聚義非止於嚴科問以辨之理何妨於聚學况杜門不出事匪干進敦魯服之𤣥風指楚郊之逺避講習典禮翺翔墳素足以激揚時俗光闡儒門諒旌賁之可知豈訟聲之所及捨而勿問深謂國章同前母嬰達士遵德至人榮道金圖玉簡自勤鄒壁之書緑綬青章不樂漢庭之貴申公括囊墳史養道衡門洞曹曾之書倉擬任永之經苑知尚仁乎跡疑重任吾德以逾髙聞俗里之事乖杜茲門而不出仲舒之帷屢下太丘之衆增多適光闡於邦儒遽辭興一作何必闕於里訟况詩宗傳府馬鄭之徒鴻儒碩生游夏之黨周人紀律不覩於前科鄭國鑄書未彰乎舊法庶惟先託謂合通方坐於左孰判里胥坐於左孰鄰長怒而逐之縣科無禮鄰長訴非失對盧昌人最物靈道由學立詩書禮樂列聖巨儒之教行孝慈忠良父子君臣之義備是以國學宏建東序西序鄉校大起右孰左孰聞詩以言執禮而動遵夫子之善誘仰先師之至德里胥莫從鄉心一人作是類公門鞠恭未彰於嘉躅黌孰促膝便乖於令典茍茲無禮胡異有皮鄰長逐之允謂宜矣縣曹方斷竊未得當同前馬損聖人作孚百姓以理農夫服田乃亦有秋中庸可範則鄉有黨而國有學南畝不勤則里有胥而鄰有長豈獨敦崇耕稼平秩出入亦將禮異班白儀成風化胥關於禮自可微詞長怒逐之夫何釁焉縣司科罪亦未為得無方之士誠宜咎之聚徒教授判甲聚徒教授每春秋享射以素木瓠葉為俎豆對宋少真學以知道行以成德謂修已之不懈則化人而有孚甲博習詩書佩服忠信談經不同於稷下請益其多强學頗類於關西發䝉斯衆既聞講道亦見習儀且享以訓人射則觀德素木瓠葉足表獻酬之教桑弧蒿矢方昭揖遜之容學不習而則無禮不行而斯壞刑而詰致何迷鄒魯之風習以見尤其如城闕之刺祭遵施之於軍旅尚不云非劉昆列之於家庭且未言失古則可據今何以疑所謂習不違經學無廢業告人昧識徒效西鄰之責言在甲合儀請遵東觀之故事同前胡連學以道尊禮為教首事克師古人焉生惑眷言彼甲惟德潤身敦詩說禮奉守先王之訓博聞强識能為君子之儒是以生徒駿奔負笈雲集一作平橫經紛其滿席執禮爛其盈門故能春秋匪懈享祀不忒教胄子之威儀陳鄉人之揖遜登以素器射從薄物稽諸瓠葉有若蘩蘋桑弧不類於桃弧兔首豈齊於狸首同劉昆之故事習俎豆於私室異祭遵之前式陳禮容於軍旅古則無議今亦何傷徒小有言責其行禮欲崇北海之術謹遵東觀之詞蜀物至京判得廬江人使計吏多賫蜀物至京分遺博士巡使問其故云官長勸人非為己也對李暄有禮則安不學將落方斯一作期化俗必在崇儒仰彼廬江抑惟循吏等文翁之從政遺德未忘類邵父之為邦餘芳尚在是故循疑作修其禮物隨此計偕豈燕昭之築臺自尊郡士何楚元之設醴獨致書生將使洙泗之風永聞函丈一作杖禮記席間函丈注容杖足以指畫也丈或為杖舞雩之禮重見摳衣敢升夫子之堂是樂先王之道巡使揚君之化按疑作安俗而行疑爾所為因之問政是可嘉其禀命賞此承式誠勸人之有以非為已而何傷同前經邦致理化人成俗率由廣學可以移風或美政之聿修則善誘而為訓眷言官長頗為循良精敏其才使乎計吏减少府之用度鬻賨渝之貨物無賫刀布行備束修詣春京而訪道遺魯儒而請益就賢體逺既虛往而實來閲禮敦書果日就而月將類朱藍之一作而易染非檟楚以收威自成洙泗之風以變廬江之俗百年講學諒崇化於文翁三月舞雩寧慙詠於宣父巡使致詰胡乃不經計偕有詞足以明道生徒擢塵判曲阜縣申孔禮教授生徒仲春欲祭壝門令生徒顔恭炊飯及有塵落甑中恭私自先食有塵之飯恭友仲勇譛恭於禮失恭云不知將祭州科罪者斷雪對曲阜境帶龜䝉地鄰鳬繹淹中禮樂仲尼之盛德不渝闕里詩書洙泗之英規尚在孔禮家承學府業宗詞林黃金滿籯白圭無瑕泮宫刷羽方宣鳳德之儀沂水騰鱗再啓龍蹲之教壇花啓一作發杏設絳帳而橫經市葉抽一作分槐據緇帷而闡教經來斯講式崇函丈之規龍見而雩大備嚴禋之禮顔恭躬忝胄子跡齒顓門叨承爼豆之間竊聽弦歌之末爰崇奠祭乃肅粢盛方執㸑於吳樵忽飛塵於范甑師乃未飯豈可先嘗神且將歆寧宜預食不恭有罰罪合置於嚴科無大一作失禮之刑理或存於宥過州司忽罰頗涉深文臺局寬刑實尊平曲陳設印綬判甲陳其車馬印綬諸生非之曰稽古之力豈無前事對杜兼遂學能廣業德可潤身率由此道乃終有慶甲溫故知新博聞强識究前言而識往行致廣大而盡精微故三千門徒續于斧棘十五志學傃其發䝉黃憲而初邑里有聲陳實而終海內多譽方今美其教化厚以人倫春誦夏弦逺邁永平之際東膠西序殊超建武之初戴憑所以重席周福因而獲印於是庭列輜駕堂循禮容將以勸凡今之人豈徒矜稽古之力孔宣父之至德斯其務本桓春卿之雅意誰復間言諸生或非竊謂匪當為其師掃判甲為鄉學生為其師掃或詰之失禮訴云有近賔將至對稽先王之國法閲司徒之教典必由鄉校馴致膠庠用繫童䝉方論俊造資鼓篋以懋德表師嚴而道尊甲也嗜學因心琢玉成器憤悱以攻木㫪容而扣鍾然由衷執顔罔敢勦說初布席以函丈終摳衣而負墻問道非飲食之賔鳴謙用掃除之𨽻而禮去聚突義在攝齊賔主有儀應對無失主人觀禮弟子修容訴人無乖所宜或者如何致詰同前顓業就師有大小之間函丈待扣慎先後之傳故得怡然有孚相悅以解甲强學自立博習成性摳衣以往如趨闕里之前請益而來疑在舞雩之上宜務知逺者而願學焉仲尼先乎祖述傳說念以終始豈可異子皮之言淺者何效師卜商之業末也無一作那如或屢聞長者之言將習少儀之禮心善魏勃宜拘袂於席前志異陳蕃或灑掃于庭內不議罪此無施勞心掘窖試之判甲訓弟子五百人業將成乃掘窖試之令甲泣下方遣之或人告為妖甲不伏對家孰黨庠著以訓人之道儒生辨士分其志學之門擊磬同心琢玉殊制登四科而未覿鑿三窖而斯聞是以馮軾下齊未譽酈生之說處囊辭趙還推毛遂之言藉以師資成乎藝業是有伏膺之義攸呈緩頰之期甲道茂人倫才標鬼谷青溪託志自餘千仞之幽絳帳尊居早訓三端之藝摳衣鼓篋游夏斯均合從連衡蘇張式擬合生徒之五百類門人之三千濟濟分儀恂恂善誘服勤請益聞聚照於丹螢日就月將都試詞於黃馬卒以明試從而謝歸言遵掘窖之由庶察懸河之辨交頥泫泣知感激之攸同礪角含姿識牽授疑作援之或異事乃師古跡匪于誅告以為妖此情何謬去師之妻判甲受業於乙乃去乙之妻同門以為失弟子之禮郡欲科罪甲云行古之道也所由不能定對張皓學以居士人斯守業曽射御之必習在師資而有敬甲性匪生知才殊特達將祈代耕之祿式執摳衣之訓既而請益不倦寧止于五經廣業惟勤實苞乎六藝庶將貽厥小學冀亦臻夫大成列孔氏之四科登周官之一命且猶父之禮義固非經從夫而尊敬亦宜廣厥妻雖忘于母訓惟夫且豫於人師縱鄰樹以致嫌匪門生之或譴何乃窺其家室専務去彼遂使老萊之婦坐失齊眉之歡買臣之妻終成反目之恨况人實有偶甲則無良訐以為直嘗聞君于之惡犯而不隱乃昧事師之迹失禮之告誠謂有孚行古之道未知其可請益不退判戊侍先生視日早暮不請退鄉大夫責之詞云方及請益對書稱教胄禮貴來學問一之道式昭在三之儀斯著戊行敦素履名列青襟懼扞格之無誠誡挑達以自制滿籯不顧方欲期於俯拾重席擬登何敢遽云請退然先生在位侍坐以時自合發問有儀使師逸功倍何得請益無節致視日缺伸雖涉進德之端其若伏膺之道鄉大夫之責是謂知言門弟子之禮不應飾詐息焉有故邊生且放懶眠懲之勿深寧越豈宜鞭撻請舉坐觥之罰式陳鼓篋之誡一作誠勤學犯夜判長安令杜虛有百姓王丁犯夜為吏所拘虛問其故答云從師授書不覺日暮虛曰鞭撻寧越以立威名非政化之本使吏送歸家御史彈金吾郎將不覺人犯夜訴云縣令送歸非金吾之罪對蘇頲王丁果行育德師逸功倍參則不敏佇揚名以立身回也如愚自聞一而知十好問斯在請益無疲拾紫期榮滿金非寶朝遊霧市披學序之圖書暝出香街聽嚴城之鍾鼓歸與不逮行者宜息墨綬榮班黃圖貴令懲姦擲伏冀靜於桴鼓慕道崇儒豈威於鞭撻奚殊政本不抵彞條竟付吏人之執旋辱宰君之惠繡衣驄馬石室生風警夜巡晝金吾翊道雖將順其美不在伺察而各恭爾職罔或愆違有觸踈羅允符嚴簡文苑英華卷五百九
