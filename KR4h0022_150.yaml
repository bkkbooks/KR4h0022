body:
  text: 文苑英華卷一百五十宋李昉等編草木八神蓍賦一首靈茅賦一首拔茅賦一首徴苞茅賦一首江淮獻三脊茅賦一首風偃草賦一首草上之風賦一首轉蓬賦一首采藥賦一首書帶草賦一首神蓍賦以天生神物用配靈照為韻康子玉神蓍之用兮誠稟靈於自然唯神也適變之義至唯用也極數之理全鈎深孰云乎筮短藏密彌彰於德圓再三則蒙捨我而懼瀆五十以學由我而樂天揲之而雖隱必索保之而其靜愈専易之重者胡可比焉原夫質稟精純叢分薆薱覆青雲以表竒伏玄龜而克配佐爾筮之貞吉觀我生之進退知微知章而可期何思何慮而或昧於是命彼筮人擇乎上春韞之而必致其用揲之而爰動其神感以洗心遂通端䇿之志執之指掌空嗤握䇿之倫禮事其儀易贊其妙探彼幽賾觀其祕要皆多假爾之能必叶窮神之照將欲觀貞諒無與京乾道變化而語一作悟神明幽贊而生原始要終思盡性於大衍知來數往翼明彖於小成非我無一作要以昭效法之道非我無以稽作易之情於以致百慮於以類萬物象四時四十九數而有常推三才三百六旬而不拂惟蓍之用惟神是聽運不窮而或變通其志而遂寧且提携而成列有感應而協靈滋而後數布之而可辨生而成象審之而必形何一卉之時育配十朋之天縱耻紅蘭之見鋤鄙白茅之藉用則知夫蓍之可貴也庶類安能而共之哉靈茅賦呂巖説有靈茅之繁育稟疑脫堪字輿之粹精間叢薄以孕彩候韶陽之發生與百卉而同氣擅三脊而異名糅纎條以為族枝連茹以彚征蔓延亭臯鋪敷原陸白華霜淨翠莖雲沃雜春澗之長松亂寒潭之羽一作明菊不剪彰帝堯之儉緼𫀆識子騫之服若乃薈蔚匝地低昂順風或結根於江漢之澳或蓄苗於嶺岫之中挺芳心兮䔿䔿吐修葉兮叢叢煙霰之所蕩拂昆蟲之所翳蒙納日月之光照資露雨之霑融東市驗左生之術南征紀周王之功嘉此物之為用蓋今昔之攸同至若錫履于齊俾侯於魯頌容衛之所藉實禮儀之攸覩純束美夫詩人縮酒貢其任土宜有意於遺芳諒無替於終古茅之為物也賤尚見采於先王士之所貴者道豈敢昧於文章慕朝宗之涓滴對詞林而抑揚若邦國之是賴希寄心於棟梁拔茅賦以靈茅類征吉為韻路蕩披大易而探賾偉玄言之杳冥惟乾坤之交泰獲品物之流形惟卦也泰之義廣惟卉也茅之性靈其用也潔身而白當春也應候而青或茂江國或生楚郊三脊之異是稱靈茅刺其無禮詩人引之於純束責其不入諸侯終貢於厥苞不然者草則多矣胡著之於繫爻哉故可比君子喻物類惟人也能同其地人易心則兩苦茅分族則雙悴茍連茹以相依夫何往而不利是則傳其潔守其貞榮落惟運窮通曷情道或屯蒙滋雨露而育質時逢振拔與連類而共征確乎莫移以保貞吉用之錫命既著之夏典將以縮酒又薦於周室異芝蘭之稟性不用其香等葵藿之有心尚思向日嵗聿云暮霜風慘栗願當蕪沒之時不棄輕微之質徴苞茅賦以九合諸侯一匡天下為韻前人猗彼菁茅挺生一作然不雜縮醪醴以致潔與清明而相合荆人是職將有體其精誠王澤不流遂無聞於賦納故小白仗義夾輔衰周言念彤弓玄矢實征九伯五侯惟苞茅之有闕乃伊人之所羞爾貢或愆於先職王祭誠非於異求有命是遵雖云我疆理無思不服孰曰風馬牛於是戒徒無譁命衆以律顧爾心之有二諒我得之惟一楚子承擯以請罪夷吾將事而靡失陳師鞠旅見旌斾之翩翩伏軾致辭想德音之秩秩且曰祭有百籩縮酒為先類生芻而比潔同有藇以告虔職貢斯已爾則不共於命馨香罔薦我將謫見於天豈可一作徒狃爾車徒恃乃封守慢上則君臣異等黷兵則齊楚非偶議乎品列我則齒兄弟之二三揆以疆場我則吞蠻荆之八九是以來求獻捷豈敢定居如憂連茹而亡禍之大者乃將任土作貢禮可忽諸於以止戈寰區折衝盞斚侔潔白於粢醍肅君臣於上下太壇之禮成彼菁菁者一作之茅問罪之師罔倦悠悠於野然彼率職四方用賓于王信耀德於千祀豈矜功以一匡異魯隱觀魚以犯憲笑晉文將狩以亂常曷若返行葦之積德遵方物之舊章美哉無私之舉也將歷代而彌光江淮獻三脊茅賦以國有盛禮靈茅三脊為韻獨孤授茅有衆靈名之為盛雖百代以呈質終三脊以居正每彰封禪之期如受鬼神之命生一作先於古既光七十之君獻於今更表千里之聖出於淮甸來彼江潭使馳於北星流於南捧執而有嚴有翼緘縢而再四再三及夫覩至尊呈大國致於金華之上啓於瑶池之側施陳而百瑞慙容撫玩而千官變色美其出有常地生必舊形非成野鹿之禮寧假澄酒之馨超常倫而薦闕殊衆品而實庭理盡三分似叶通三之化體皆一類欲明得一之靈隱見之時吉蠲中禮獨標珍草之狀悉皆兄弟之體整齊而玉匣遙傳潔靜而瓊華新啓應盛禮而居首表常度而為後道未格也雖有采而必無嶽可封焉縱不求而自有觀王者之得失知禮事之臧否且夫玉帛廣矣何尚於茅豈不以貴稱三脊重載六爻始彚征於吳楚終遍藉於陶匏奉上之時且報云亭之兆升中之後因知天地之交吾皇由是命太史詔宗伯議封山謀勒石備文物與禮器修玉函與金䇿使聖功登於九天靈茅光於三脊使臣稽首稱萬嵗以旋役風偃草賦以上之化人乃如是焉為韻羅立言人之化兮從政之所向草之偃兮隨風之所仰大小覃及道均乎廣敷髙下必加義存乎溥暢將咸被於榮悴匪有阻於遐曠感之化靡自符於順柔動而恱隨豈因乎用壯如雲起於龍召若臣和於君唱豈蕭條衆芳之間翺翔激水之上而已美其抗威有制應物無私播生成於萬族順炎涼於四時彌岡坂以盡仆歷原隰而無遺颼飀其音時自南而自北扶疏其狀隨左之而右之泛蘭叢而影分丹頴轉蕙圃而光搖碧滋有感而施不獨芃芃其麥觸類皆長一作靡寧遺楚楚者茨則知草之偃風威之所藉人之理上政之所化不然則何以喻德君子比訓小人佐天地之化育助雷雨於陶鈞當稿葉辭條我則激凄清於霜夕及晴川解凍我則散煦嫗其陽春豈直落餘花於黃菊翻碎浪於青蘋至哉凝韻松桂傳香蘭茝不行而疾合帝德之無方不勵而威若神功之有宰兹君令所以為此聖人於焉嘉乃觀其匪疾匪徐或吹或噓俾夫曲者必直勾者必舒庭葉晚飛墜丹梧於颯爾池荷夜轉㵼珠露以連如是則草非風不靡人非化不被故取鑒者用於斯觀政者必於是况王者致理與物化遷敬授人時乃何風不順式敷惠澤則何草不玄既殊拔木之日斯鄙偃禾之年賦風行之義可以知其教焉草上之風賦以君子之德風偃乎草為韻蔣防草綿綿兮擢頴含薰風發發兮乍靡而分其取象也散芳馨於知已其為義也合政令於人君豈惟動之而委順抑亦播之而有聞一作以觀其徜徉代起激拂無已轉緑蕙而影亂時光泛青蘋而文橫秋水浸淫翳薈振奮蘭芷颯然而動昔有遇於荆玉泠爾斯來今不乘於列子翻蓊鬱轉葳𬎼在芃芃而可玩觀習習而無遺被以幽深諒有條而有暢布乎原隰誠長之而養之或徐或疾順天作則大以抑其滋蔓細以蕩其幽默分乎萬彚蓋吹萬以齊驅繫於一人誠畫一作晝一於同德不擇乎髙下不棄乎幽蒙敷葉而重重偃翠翻花而灼灼駢紅連一作聨綿九野披靡千叢倚伏俟時小人之心猶草衰榮不問君子之德如風莽眇平臯悠揚茂苑風何草之不動一作被草何風而不偃飄杜蘅而芳氣自遙歷蒿艾而清聲漸逺是知風為號令之類草為衆庶之徒方以俟一作候其披拂固有適一作遇於榮枯立政則斯為大矣騰芳而孰不宜乎故觀其化者知神之造觀其風者知國之道將有宣於八方故寓形於蔓草仲尼以之而取譬宋玉由斯而奮藻雖異代而殊時竊敢攄於懷抱轉蓬賦以本根一斷隨風所之為韻彼茁者蓬其生苯䔿因驚風之動地遂離根而去本委順而往異愚夫之守株任運則行叶高人之嘉遁摧弱質絶陳根始遲遲而徐轉俄忽忽而駿奔體以圓而疾質以弱而存凌寒後凋雖有慙於松柏近秋俱敗亦無愧於蘭蓀時也玉露為霜金風應律歎芳菲而難久覩搖落之不一初宛轉以孤翻漸邐迤而連出度平野而暫見映層臯而還失徘徊未已同風葉之辭枝漂蕩不停甚水萍之委質若乃慘淡雲晚悠揚日短嵗云秋矣莖弱者先衰風以動之根危者易斷徒觀其委地離披縈吹參差既忘懷於近逺寧繫迹於髙卑觸物何情類虛舟而自泛善行無迹於野馬而相隨豈不以生無固蒂轉有長風象車輪未始有極如循環莫知所終遊子感而忘歸歎飄居陌上小人見而懷土憶生在麻中矧夫依物暫停遇風復舉乍飄揚以歷亂或迥回旋而容與青蘋之末不起聊可以躊躇黃埃之中自飛孰知其處所客有因時結念寓物屬詞觀其衰兮懼老將至矣觀其轉也嗟行靡不之撫懷抱起心有之誡驚鬢髮增首如之悲倘陽春之可待亦何恨飄飄於此時采藥賦并序陸龜蒙藥白芷也香草美人得比之君子定情屬思聊為賦云日正融冷春歸飾荒覩一時之流恨撫萬古之遺香問人則不屈不宋説地則非瀟非湘搴其榮煙携而動色擢其體雪挺而騰光諷畔牢愁子雲於焉華皓吟哀時命曼倩由是摧藏情思矜年慵情畏晚胡繩繫晷以難駐曷車載一作􅀢車截集韻􅀢水草似蕨春而不返陋君折楊柳須為送行陋君採芙蓉仍勞贈逺豈如隂晴互出稚豔相迎隈回鳳喜怨盼鴻驚侍笑者青琴作號顧謂疑者碧玉為名偷襞積競縈盈目斜柯而水怯鬢疊葉而雲爭蘭在口以時聞嬌如連瑣蕙牽心而不定飄若懸旌契叩難申融怡自一作暗許石能潛遁以求偶山亦浮來而命侣誓不為巖阿竹冉冉孤生誓不為澗底松亭亭獨處於是欺皓本掩縮𬎼房紅者自破蒂縹者誰披望懷沙之浦詠遺襟之詞煙分而麝墨猶濕綺斷而龍刀合知只言長信長門年年可恨未必傾城傾國箇箇生悲臨階躑躅以虛徐當户薔薇兮綽約一作約弱蜂咋葉而先盡鶯踶枝而易落未若北堂公子樹芳草忘憂南國佳人佩生香辟惡露茁煙冶風條翠謔不知海旁之期逺不信人間之命薄休為上計掾空尋寶叉聊作侍中郎且乘金絡别有廬江小吏屬一則蜀郡長卿或支離而築恨或調笑以衷情不同乎稟簮裙而霧悄秉禮義以霜明鄭交甫則江邉佩解蕚緑華則席上詩成彼怡神而致問皆護節而含貞竦懼趨前一作竦懼自持雖陳辭而往訴遷延却立終結抱而難平淚滴堪穿腸回好繫蟲絲織怨以成段象酒蠲愁而判劑江僕射之孤燈向壁不少凄迷張記室之少婦當罏應還細麗景方駘蕩思已低摧酒疲於子建為使花困於靈均作媒何庶物之相負痛妍華而未回莫與心傷瑶圃從驚鵜鵙弟桂二音如防膽怯空屏宜畫魁堆獸名也剩欲追尋徒嗟緬邈杯形連理而終在扇樣合歡而可學若遇劉公伯雅夢亦沉沉如逢一有西字王母少兒一作黎非晝還數數書帶草賦前人彼碧者草云書帶名先儒既沒後代還生有味非甘莫共三山芝校無香可媚難將九畹蘭爭叨詞林畔種在經苑中榮翠影臨波恐被芙蓉見鄙貞姿傍砌愁為芍藥相輕發葉一作地抽英因天受性紛稚圭池上之宅拂仲蔚門前之徑不省教施異術安得返魂未嘗輒入明庭何當指佞幾臨寒日幸到青春莎蕊未傳於漁父蒲茸竊詠於詩人霜亦曽霑潘令偏知白薤風常遍起宋生惟道青蘋栽培只倚於賢憐搴擷長憂乎稚戲出慙無用舒還有異當琴操發伯牙山水之情值儒編動鑿齒陽秋之思敢曰求友寧忘慕義吳娃楫上空羡苔滋魏主帷中惟通蕙氣或乃蘭榮越徼薰茂周原幽搜莫及興詠徒存此則對仲舉蕭踈之室處子山搖落之園不識深宫豈是曽為帝女非侵逺道誰言能憶王孫徒愛其斂疏煙披曉露弱可攬結勻能布濩蕭蕭而不計榮枯漠漠而何干好惡金燈照灼尚驚秦帝之焚粉蝶留連真謂羽陵之蠧爾乃高推籬菊瑞許階蓂我則惟親志士每聚流螢豈便離蒿萊於隙地希杜若於遙汀倘遇翰林主人之一顧庶長保於青青文苑英華卷一百五十
