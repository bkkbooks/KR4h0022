body:
  text: 文苑英華卷二百九十一宋李昉等編行邁三張九齡十一首張子容二首王維四首孫逖六首賀知章一首孟浩然十二首杜甫十首李白五首張軫一首蔡希寂一首綦毋潜一首初發道中寄還集作逺張九齡日夜鄉山逺秋風復此時舊聞胡馬思今聽楚猿悲念别朝昏苦懷歸嵗月遲壯圖空不息常恐髮如絲以下一十篇並見集本自豫章南還江上作前人歸去江南水磷磷見底清轉逢空闊處聊洗滯留情浦樹遙如待沙鷗近若迎津途别有趣況乃濯吾纓自始興溪夜上赴嶺前人常蓄名山意兹為世網牽征途屢及此初服已非然日落青巖際溪行緑篠邊去舟乘月後歸馬息人前數曲迷幽嶂連圻觸暗泉深林風緒結遙夜客情懸非梗胡為泛無膏亦自煎不知行役者相樂在何年初入湘中有喜前人湘中作以上二詩並見一百六十二卷前人浮沉前篇作浮波集作浮沒前人自湘水南行前人落日催行舫逶遲集作迤洲渚間誰云有物役乘此更休間暝色生前浦清暉發近山中流淡容與唯愛鳥飛還耒陽溪夜行前人乘夕棹歸舟緣源路轉幽月明看嶺樹風靜聽溪流嵐氣船間入霜華衣上浮猿聲雖此夜不是别家愁自彭蠡湖初入江前人江岫殊空闊雲烟處處浮上來群噪鳥中去獨行舟牢落誰相顧逶迤日自愁更將心問影于役復何求初發曲江溪中前人溪流清且深松石復隂臨正爾可嘉處胡為無賞心我猶不忍别物亦有緣侵自非常行邁誰能知此音西江一作河夜行前人遙夜人何在澄潭月裏行悠悠天宇曠切切故鄉情外物寂無擾中流淡自清念歸春服集作林葉換愁坐露華生獨有汀洲鶴宵分乍一鳴南陽道中作前人登郢屬嵗隂及晚懵所適復聞東漢主遺此南都迹佳氣藹厥初霸圖紛在昔兹邦稱貴近與世嘗薰赫遭遇感風雲變衰空草澤不識鄧公樹猶傳隂后石驅馬歷闉闍荆榛翳阡陌事去物無象感來心不懌懷古到窮秋興言傷逺客眇默遵岐路辛勤弊行役雲鴈號相呼林麕走自索顧憶狥書劍未嘗安枕席豈暇墨突黔空持遼豕白迷復期非逺歸歟賞農隙自樂城赴永嘉枉路泛白湖寄松楊李少府張子容西行礙淺石北轉入溪橋樹色煙輕重湖光風動搖百花亂飛雪萬嶺叠青霄猿挂臨潭篠鷗迎出浦橈惟應賞心客兹路不言遙泛永嘉江日暮回舟前人無雲天欲暮轉鷁大江清歸路煙中逺回舟月上行傍潭窺竹暗出嶼見沙明更值微風起乘流絲管聲早入滎陽界王維泛舟入滎澤兹邑乃雄藩河曲閭閻隘川中煙火繁因人見風俗入境聞方言秋野田疇盛朝光市井喧魚商波上客雞犬岸傍村前路白雲外孤帆安可論宿鄭州前人朝與周人辭暮投鄭人宿他鄉絶儔侣孤客親僮僕宛洛望不見秋霖晦平陸田父草際歸村童雨中牧主人東臯上時稼繞茒屋蟲鳴集作思機杼休集作悲雀喧禾黍熟明當渡京水昨夜集作晚猶金谷此去欲何之集作言窮邉徇微祿自大散已往深林密竹磴道盤曲四五十里至黃牛嶺見黃花川前人危徑幾萬轉數里將三休回環見徒侣隱映隔林邱颯颯松上雨潺潺石中流靜言深林裏長嘯高山頭望見南山陽白日集作露靄悠悠青臯麗已净緑樹鬱如浮曾是厭䝉密曠然消人憂曉行巴峽前人際曉投巴峽餘春憶帝京晴江一女浣朝日衆雞鳴水國舟中市山橋樹杪行登高萬井出眺逈二流明人作殊方語鶯為舊國聲賴多集作諳山水趣稍解别離情淮隂夜宿孫逖水國南無畔扁舟北未期鄉情淮上失歸夢郢中疑木落知寒近山長見日遲客行心緒亂不及洛陽時二永夕卧煙塘蕭條天一方秋風淮木落寒夜楚歌長宿莾非中土鱸魚豈我鄉孤舟行已倦南越尚茫茫下京口埭夜行前人孤帆度緑氛寒浦落紅曛江樹朝來出吳歌夜漸聞南溟接潮水北斗近鄉雲行役從兹去歸情入鴈羣山行遇雨前人驟雨晝氛氲空天夜不分暗山唯覺電窮海但生雲涉澗猜行潦緣崖畏宿氛夜來江月霽棹唱此中聞夜到潤州前人夜入丹陽郡天高氣象秋海隅雲漢轉江畔火星流城郭一作府傳金柝閭閻閉緑洲客行凡幾夜新月再如鈎夜宿浙江前人扁舟夜入江潭泊露白風高氣蕭索富春渚上潮未還天姥岑邉月初落煙水茫茫多苦心更聞江上越人吟洛陽城闕何時見西北浮雲朝暝深曉發賀知章江臯聞曙鍾輕栧理還􅞤海潮夜約約川露晨溶溶如見沙上鳥猶霾雲外峯故鄉渺無際明發懷朋從夜渡湘江孟浩然客行集作舟貪利涉夜集作暗裏渡湘川露氣聞香集作芳杜歌聲識暗集作采蓮榜人投崖火漁子宿潭煙行旅遙集作時相問涔集作潯陽何處邉泝江至武昌城前人家本江湖上嵗時歸思催客心徒欲速世路共集作苦邅回殘凍因風解新正度臘開行看武昌栁髣佛映樓集作陽臺旅行欲泊宣州界集作夜泊宣城界孟浩然西塞沿江島南陵問驛樓湖平津渡濶風止客帆收去去懷前浦茫茫泛夕流石逢羅剎礙山泊敬亭幽火熾梅根渚煙迷楊葉洲離家復水宿相伴賴江集作沙鷗行至漢川作集作出行東山望漢川前人異縣非吾土連山盡緑篁平田出郭少盤壠集作坂入雲長萬壑歸於漢千峯劃彼蒼猿聲亂楚峽人語滯巴鄉石上攢椒樹藤間養集作綴蜜房雪餘春未暖嵐解晝初陽征馬疲登頓歸帆愛渺茫坐欣沿溜下信宿見浮集作維桑自洛之越前人遑遑三十載書劔兩無成山水尋吳越風塵厭洛京扁舟泛湖海長揖謝公卿且樂杯中酒集作物誰論世上名晚泊潯陽望廬山前人掛帆一作去聲集作席恐不知側音耳幾千里名山都未逢泊舟潯陽郭始見香爐峯嘗讀逺公傳永懷塵外蹤東林精舍在集作近日暮空集作但聞鍾歸至郢中前人逺逰經海嶠返棹歷山河集作歸山阿日夕見喬木鄉園成集作關在伐柯愁隨江路盡喜入郢門多左右看桑土集作上依然即匪他早發漁浦潭前人晨旭光蒼茫集作東旭早光茫渚禽似集作已驚聒卧聞漁浦口橈聲暗相撥日出氣象分始知江路濶美人常晏然集作起照影弄流沫飲水畏驚猿祭魚常集作時見獺舟行自無悶况值晴景豁建德江宿前人移舟泊幽集作煙渚日暮客愁新野曠天低樹江清月近人問舟子前人向夕問舟子前程復集作無幾多灣頭正好泊淮裏足風波濟江問舟人前人潮落江平未有風扁舟共濟與君同時時引領望天末何處青山是越中逺逰杜甫江濶浮高棟雲長出斷山塵沙連越嶲風雨暗荆蠻鴈矯銜蘆內猿啼失木間弊裘蘇季子歷國未知還晚行口號前人三川不可望集作到歸路晚山稠落鴈浮寒水饑烏集戍樓市朝今日異喪亂幾時休逺愧梁江總還家尚黑頭早發射洪縣南途中江上作前人將老憂貧窶筋力豈能及征途復侵星得使諸病入鄙人寡道氣在困無獨立促裝逐徒侣達曙陵險澀寒日出霧遲青江轉山急僕夫行不進駑馬若維縶汀洲稍踈放風景開快一作悁悒空慰所尚懷終非曩逰集衰顔偶一破勝事難屢挹茫然阮籍途更灑楊朱泣發同谷縣乾元二年自隴右赴劔南前人賢有不黔突聖有不暖席况我饑愚人一作夫焉得集作能尚安宅始來此山中休駕喜地僻奈何迫物纍一嵗時行役忡忡去絶境杳杳更逺適停驂龍潭雲回首白崖石臨岐别數子握手淚再滴交情無舊深窮老多慘戚平生懶拙意偶值棲遁跡去住與願違仰慙林間翮早行前人歌哭俱在曉行邁有期程孤舟似昨日聞見同一聲飛鳥散集作數求食潜魚亦一作向獨驚前王作網罟設法害生成碧藻非不暮集作茂高帆終日征干戈未集作異揖讓崩迫開其情次晚洲前人參錯雲石稠坡陀風濤壯晚洲適知名秀色固異狀棹經垂猿把身在度鳥上擺浪散帙妨危沙折花當羇離暫愈悅羸老返惆悵中原未解兵吾得終踈放過津口前人南嶽自兹近湘流東逝深和風引桂楫春日漲雲岑回首過津口而多楓樹林白魚困密網黃鳥喧佳音物微限通塞惻隱仁者心瓮餘不盡酒膝有無聲琴聖賢兩寂寞渺渺獨開襟早發前人有求常百慮斯文亦吾病以兹朋故多窮老驅馳併早行篙師怠掛席風不正昔人戒垂堂今則奚奔命濤翻黑蛟躍日出黃霧映煩促瘴豈侵頺倚睡還醒僕夫問盥櫛暮顔􅌤青鏡隨意簮葛巾仰慙林花盛側聞夜來冦幸喜囊中净艱危作逺客干請傷直性薇蕨餓首陽粟馬資歷聘賤子欲適從疑悟此二柄次空靈岸前人沄沄逆素浪落落展青眺幸有舟楫遲得盡所歷妙空靈霞石峻楓栝隱奔峭青春猶有一作無私白日亦偏照可使營吾居一作屋終焉託長嘯毒瘴未足憂兵戈滿邉徼嚮者留遺恨耻為逹人誚回帆覬賞延佳處領其要宿花石戍杜甫午辭空靈一作虛岑夕得花石戍岸踈開闢水一作山木雜今古樹地蒸南風盛春熱西日暮四序本平分氣候何回互茫茫天造間理亂豈恆數繫舟盤藤輪杖䇿古樵路罷人不在村野圃泉自注柴扉雖蕪沒農器尚牢固山東殘逆氣吳楚守王度誰能扣君門下令減征賦夜宿集作泊牛渚李白牛渚西江夜青天無片雲登舟望秋月空憶謝將軍余亦能高詠斯人不可聞明朝掛帆席楓葉落紛紛宿白鷺洲寄楊江寧前人朝别朱雀門暮棲白鷺洲波光搖海月星影入城樓望美金陵宰如思瓊樹憂徒令魂作夢翻覺夜成秋緑水解人意為餘西北流因聲玉琴裏蕩漾寄君愁金陵阻風雪書懷寄楊江寧一作新林浦阻風寄友人前人潮水定可信天風難與期清晨西北轉薄暮東風吹以此難挂席洄㳂頗淹遲使索金陵書又叨賢宰知絃歌止過客惠化聞京師海月破團景菰蔣生緑池昨日一作見北湖花初開未滿枝今看集作朝白門栁夾道垂青絲嵗物忽如此我來復幾時紛紛江上雪草草客中悲明發板橋浦空吟謝眺詩流夜郎半道承恩放還兼欣尅復之美書懷示息秀才前人黃口為人羅白龍乃魚服得罪豈怨天以愚陷網目鯨鯢未剪滅豺狼一作虎屢翻覆悲作一作化楚地囚何由秦庭哭遭逢二明主前後兩遷逐去國愁夜郎投身竄荒谷半道雪屯䝉曠如鳥出籠遙欣尅復美光武安可同天子巡劒閣儲皇守扶風揚袂正北辰開襟攬群雄胡兵出月窟雷破關之東左掃因右拂旋收洛陽宫回輿入咸京席卷六合通叱咤開帝業手成天地功大駕還長安兩日忽再中一朝讓寶位劒璽傳無窮愧無秋毫力誰念矍鑠翁弋者何所慕髙飛仰冥鴻棄劒學丹砂臨爐雙玉童寄言息夫子嵗晚涉方蓬客中作前人蘭陵美酒鬱金香玉碗盛來琥珀光但使主人能醉客不知何處是他鄉舟行早發張軫夜帆時未發同侣暗相催山曉月初下江鳴潮欲來稍分揚子岸不辨越王臺自客水鄉裏舟行知幾回陜中作蔡希寂西别秦關近東行陜服長川源餘讓畔歌吹憶遺棠河水流城下山雲起路傍更憐棲泊處池館繞林篁早發上東門綦毋潜十五能行西入秦三十無家作路人時命不將明主合素衣空染洛陽塵文苑英華卷二百九十一
