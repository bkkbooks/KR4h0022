body:
  text: 文苑英華卷四百五十九宋李昉等編詔勑一命將命吕休璟等北伐制蘇頲門下朕聞守在四夷蓋安人以和衆加於百姓豈窮兵而黷武然則日之所出弗俾于化故知天之所討必龔其罰自默啜虔劉肆暴桀鷔反常獨為匪人假命驕子者有歲時矣雖奉書就邸或遵於聲朔而控弦犯塞已毒於疆場朕惟務懷柔每在含忍遂使庶邦憤積稽其六月之師逋冠禍盈窮此百年之運金山道前軍大使特進賀獵一作臘下同毗伽欽化可汗突騎施守忠二庭貴緒萬里威聲忠而善謀勇則能斷自膺殊禮名寵於外藩思立大勳志勤於中國兼遣弟右監門衛將軍守節長驅沙漠直指金微默啜舉其種類來相抗拒近殪於鋒鏑之下已若亂麻逺慮於廟堂之上將同破竹堅昆在右掎角而東並纍獻封章請屠巢穴朕又聞不得已而用者孰若兵機不可得而違者乃符人事永言取亂宜戒徂征右領軍衛將軍兼檢校北庭都護碎葉鎮守使安撫十姓吕休璟心堅鐵石氣橫風雷始則和戎之利先得晉卿終而逐虜之功方邀漢將可為金山道行軍大㧾管北庭副都護郭虔瓘安處哲等懷才抱器蓄鋭俟時慣習軍容備知邉要並可為副大㧾管領瀚海北庭碎葉等漢兵及驍勇健兒五萬騎金山道前軍大使特進賀獵毗伽欽化可汗突騎施守忠領諸蕃部落兵健兒二十五萬騎相知計會逐便赴金山道朔方道行軍大㧾管右武衛大將軍攝右臺大夫同中書門下三品上柱國韓國公張仁亶文武將相莫之與京心腹大臣一作牙爪是所繫賴當分閫之任受升壇之律常願身先士卒而以賊遺君父與副大㧾管右監門衛大將軍魯受信等領蕃漢兵募健兒或用絶羣飛騎城傍等十五萬騎赤水軍大使涼州都督司馬逸客外寬內明正辭直道標慷慨之節曽不顧身藴經營之志期於盡敵與右武衛將軍陳丘右金吾衛翊府中郎將李玄通一作道副使右驍騎衛鹿陵府折衝能昌仁左衛神山按唐地理志神仙府在晉川詔令作神仙非府折衝陳義忠等領當軍及當界蕃漢兵募健兒七萬騎豐安軍大使靈州都督甄粲副使張趙壁常元寂等領蕃漢兵馬六萬騎防禦羣牧大使臨洮軍使甄亶領當軍莫門唐會要作英門非積石等軍馬募及秦蘭渭城等州大家子弟㧾二萬騎建康會要作建庫非軍士井州刺史李守徴玉門軍使肅州刺史湯嘉惠墨離軍士瓜州都督李思明伊吾軍使伊州刺史李脊交等各領當軍兵馬與突騎施守忠吕休璟等計會共為表裏莫不運其長䇿悉心而效六竒接以短兵指掌而論七縱使天陳齊舉雲罝備設賈勇於飲醪之夫一以當萬揚威於汗血之騎左縈右拂咸繫黿斬蛟曵牛佩豕必能力簸窮海聲壓大荒刈谷蠡之庭拔祅一作權渠之壘不遑渭橋之拜已見陰山之哭然則持旌節執金鼓者所以問不賓誅首惡而比夫不誡復迷則凶俾存開網之仁預軫焚舟之歎休璟所領兵馬甲仗一事已上仍依别勑處分主者施行景龍四年五月十五日一作皆唐大詔令命姚崇等北伐制黃門一作門下朕聞上古聖王之政一作致理則教之以戰陳之以兵蓋威不讋而服不順也故始於禁暴終於偃革一作伯斯不得己而用之朕以寡昧誕膺鴻業思欲率於動靜歸之教化豈要荒之外棄為匪人而亭育之中視則如子罔不遵我文軌修其貢賦歲時相望道路抵一作砥屬而默啜素稱桀鷔鳴鏑於狼居頃自懷柔屢一作獻書於象魏朝廷所以許其通好議以和親使臣纍齎繒帛侍子令襲冠帶庶中國無事長城罷守戢干戈而銷劒戟者朕之意焉豈謂我盟不渝爾約斯背伊庭之際遂敢侵軼西北偏偶尚聞嘯聚雖摧其精鋭而困於圍逼此不虞之失也朕甚一作嘗憐之犬羊無親不可恃信而輕敵熊羆有勇咸能宣威而制勝朕由是詢卿士之奏攬英雄之心謀元帥而得佐軍恢逺圖而舉長䇿隨時之義其在豫乎兵部尚書兼紫微令監修國史上柱國梁國公姚崇天降一作假其才日新厥德禮義為本居有四鄰一作科謨猷是先坐知千里以仲山甫之操管夷吾之能智湧泉而不窮精貫日而愈勵信廟堂之柱石鼎鼐之鹽梅必能奮爾六竒光我三傑可持節靈武道行軍大㧾管管內諸軍咸受節度右領軍衛大將軍兼檢校單于大都護鎮守軍使張知運寬厚沉毅外方內直威而勇決自懾單于之臺惠則無循咸仰將軍之樹可中軍副大揔管權檢校原州都督李欽憲家承將相器兼文武求古人之節臨事不回讀前史之言好謀而斷可佐軍副大揔管檢校左威衛將軍靈州都督吕休璟慣知邉要久探戎律誠期報國去病安用家為奮不顧身伯昭不持賊遺可右軍副大揔管左驍衛將軍論弓仁右金吾衛大將軍勿部珣左領軍衛郎將攝本衛將軍張直一作真下同楷單于副都護臧懷亮右領軍衛中郎將王海濵前朔州刺史劉元楷右武衛郎將楊楚客并州定清府果毅元蕭然等頗牧為用關張其敵懷才倜儻嘗邀百勝之功立志經營備習九章之訓弓仁及詢並可前鋒㧾管直楷可左虞侯揔管懷亮可右虞侯㧾管海賔元楷楚客蕭然等並可行軍揔管大僕少卿田崇壁鄜州刺史韓思復等強力從政精心在公知無不為利有攸往入敷事典省閣稱其間練出綜條察吏人或作官吏畏其嚴明崇壁可兼行軍長史思復可兼行軍司馬兵部郎中李休光司勳郎中張敬忠兵部員外郎王上客刑部員外郎楊欽明江州别駕李雍等或特達圭璋所謂登壇之寶或翩翻書記曽聞及霤之詞可以光贊出車𢎞宣入幕並可行軍判官靈武軍兵加滿十萬人舊馬既少宜於內外間廄抽壯馬添滿六萬匹原夏等州要害處亦量加馬其後軍兵六萬人馬二萬匹先來點定宜令衛尉卿李延昌左羽林將軍楊敬述等至冬檢閲且當處團結待後進止其有先鋒破賊斬馘摧堅功效燭然者並委軍將便定功賞不須限以常格惣管以下有損失兵馬不能力戰棄軍逃命者便殺一作斬其有棄軍入賊不能闕死節者妻子依叛緣坐法凡此和衆誓于師兵統燕犀冀馬之雄屯斬蛟挈黿之勇鼓鼙沸野旌旗彗雲豈式遏於河塞方震驚於沙漠於是乎善醪以信之芳餌以賞之戮揚干之僕必行其令持穰苴之兵不枉其法堅壁清野則投石而有餘追奔逐北則掃塵而無類俾權宜於閫外仍布告于天下暫勞永逸在此行焉主者施行開元二年三月十八日一作皆唐大詔令命薛納等與九姓共伐默啜黃門朕聞天所與者奉天命而不違人所棄者順人心而必伐由是古先帝王光宅區縣實仗威武用清荒戎時義逺矣默啜以叛亡餓𨽻凶忍遺孽敢迷聲朔獨匪人臣禍皆所召祅不自作舉其巢穴盡是離心瞻我闕庭相望內面猶竄身於寒苦且寄命於旬時當胡運之已窮在軒兵而可逐九姓部落等忠誠貫日義烈聞風數其擢髮之愆成於屈指之計請除驕子纍遣使臣摧鋒而願先驅蓄鋭而期後命右羽林軍大將軍朔方道大㧾管薛納左衛大將軍安北副大都護兼郯王府長史平郡公張知運右羽林軍將軍兼涼州都督赤水大使楊敬述右騎衛將軍論弓仁左武衛將軍大武軍大使于仁誓右武衛將軍豐安軍大使杜賔客豐州都督西受降城使吕休琳一作璟勝州都督東受降城使邵宏左金吾衛大將軍回紇伏帝匐右一作左衛大將軍渾元忠左衛大將軍似和舒右武衛將軍兼賀蘭州都督契苾承祖等或出將入相有經濟之才或敦詩説禮有韜鈐之算或嫖姚仕漢有遮虜之勳或由余入秦有伐戎之䇿謀彼元帥擇于佐軍可以授旗遂行推轂而進納可中道大揔管賔客宏休琳等為副知運可東道大揔管弓仁仁誓為副敬述可西道大揔管伏帝匐元忠和舒承祖等為副各領馬匹五萬人與九姓計會三軍既整百道齊入吳鈎楚練照曜隂山之峯冀馬燕犀張皇窮漢之地况彼冦惡積我師義動知存亡者觀其兆摧枯朽者鮮其力庶使疆場罷候從此息人邉鄙不虔一作虞因而盡敵布告天下咸遣知聞主者施行開元四年正月二日一作皆唐大詔令賜將士書與昭義軍將士書白居易勑昭義軍節度下將士等當軍將士與諸道不同自經艱難多易將帥而忠順之節未嘗有虧朕每思之無時暫忘盧從史為卿主將作朕藩臣權位尊崇恩寵優厚而乃外示恭順內懷姦邪刻剝軍中暴殄境內朕以君臣之道未忍發明為之含容頗有年月近又茍求起復請伐集作討恆州與賊通謀為國生患自領士馬久屯行營收當軍賞設之資加本道芻粟之右不為公用盡入私家此則主將之恩於卿何有臣子之分負朕實深卿等辨邪正之兩端識逆順之大義抱忠勇者耻居其下守名節者憤發於中失三軍之心已聞大去犯衆人之怒果見不容逺察事宜備知誠欵興言嘉歎至于再三其當軍將士等賞設已有處分上自將校下及士卒各勵爾志再思朕言卿等從集作承前已來常保忠貞之節自今以後永為心腹之軍宜念始終副茲囑望故今宣慰宜並悉之夏熱卿等各得平安好遣書指不多及同前勑昭義軍節度下將士等卿等久在行營乍無主將而士旅輯睦軍壘安寧足彰守正之心尤見盡忠之節以此歎囑勞於寢興孟元陽是朕信臣為國良將威略可以懾凶孽慈和可以牧師人纍著忠勤克諧朕命為其主帥必副羣情况卿等同􅀈姦邪久困貪暴宜以仁賢之帥撫卿忠義之軍靖思元陽無出其右今授元陽檢校尚書右僕射充卿等當道節度使勉同王事以慰朕懷烏重胤特效忠誠深宜奬擢今便授河陽節度使兼御史大夫故令宣慰並宜知悉與昭義節度親事將士等書勑昭義軍節度下親事將士等盧從史受恩至重負國至多衆所不容追令赴闕朕以誤曽任使貴全始終今則止於貶官此亦集作蓋曲從寬典卿等抱忠懷義朕所素知頃以諸營同事從史三軍一體俱是王臣既不相干又能自效朕方優賞以酬功勳何至不安有此疑懼必恐從史已追之後元陽未到之間卿等當營乍無主將或被外人扇誘遂令衆意憂疑勢使之然事非獲已朕雖在此逺見軍情料卿本心必無此意况元陽勤儉恤下寬厚愛人久在河陽甚近澤潞元陽臧否卿等合諳以卿忠義之軍故擇仁賢為帥已有詔旨宣諭元陽若到行營一無所問乃至將士家口亦令優恤安存卿復何憂必得其所况昭義將士艱難已來保守忠貞未嘗虧失天下稱歎卿已集作亦自知又卿父母妻兒家田墳墓一物已上並在潞州倉卒集作頃刻之間豈忍便棄朕之此語卿宜細思各相勉諭同保忠順計元陽已合到彼卿等便取元陽指揮想卿等心必副朕意故令宣慰宜並知悉授恆州節度下將士等書勑成德軍節度下將士等朕以王者之道與物無私若違命執迷則罔有容捨若知非改悔則無不舍容集作宏不窮無告之人不塞自新之路頃屬姦臣從史謀遘異端致使恆陽隔於恩外六郡之地皆廢農桑三軍之人並罹鋒鏑朕每一念至中心憫然今卿等繼獻表章逺輸誠欵省承宗之勤懇難阻其情思武俊之功勞不能無念况事因詿誤而理可哀矜今已降制書各從洗雪承宗仍復舊官爵充恆冀深趙德棣六州觀察使成德軍節度使將士等官爵實封並宜仍舊待之如初卿等各宜協力同心知恩感德共保終始稱朕意焉故令宣慰宜並知悉與韓君雄書鄭畋勑魏博權知兵馬留後韓君雄及將士等何全皥藉祖父之餘基受朝廷之重寄身居節制位極公台所宜慮危圖安忘私濟衆乃驕矜失道滿假為心刻削衣糧恣行殺戮致三軍之怨怒乘馬匹以奔逃忽此敗亡良可驚歎君雄素聞竒節久著威聲權於衆情主彼留事果能撫安戎旅鎮定軍城將士等義激英雄名光壯武雖從權而選帥終請命以聞天况知乂寧尤用嘉矚今遣髙品康道偉等專往宣慰其他績議指揮想宜知悉秋涼卿比平安好否遣書指不多及與張文裕及魏博軍書勑文裕及魏博三軍將士等駱全諷至知全皥紀綱失制軍府離心衆議不容脫身潛遁再三省問驚歎良深且何氏一門將相三代進韜則首推誠義𢎞敬則纍建勳庸全皥紹襲其芳主張軍旅亦能輸心向義赴難興師雖無蕩定之功頗著勤勞之節朝廷念其壯武益以官榮位列上公寵兼台座一時之美無以過焉豈為疑作謂弛慢生災驕荒致患鼓師徒之怨怒貽祖父之包羞三軍將士等義勇無倫忠貞有素負山西之壯氣因河北之威聲必當洞明禍福之源深惜變更之體因以物情積憤軍令乖張不可保安致兹騷動大凡恤人者則父母虐我者則仇讐訓傳所言古今無異何全皥既敗戎律即當舉正朝章韓君雄若合羣情權可主其留事一作務更俟奏報當有指揮將士等切宜禁戢兵戎肅清疆境勿因驚擾妄有殺傷特遣髙品康道偉等專往宣慰言不盡意當識朕懷秋涼三將軍士等各得平安好遣書指不多及文苑英華卷四百五十九
