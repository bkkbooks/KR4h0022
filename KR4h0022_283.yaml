body:
  text: 文苑英華卷二百八十三宋李昉等編送行十八張喬十七首王貞白三首張蠙十首王轂一首盧延讓一首曹松六首羅隱十八首裴説五首唐彥謙一首送鄭侍御赴汴州辟命張喬官從諫署清暫去佐戎旌朝客多相送吟僧欲伴行河氷天際白嶽雪眼前明即見東風起梁園聼早鶯送南陵尉李頻前人重作東南尉生涯尚似僧客程淮館月鄉思海船燈曉霧看春轂晴天見朗陵不應三考足先授詔書徴送鄭谷先輩赴汝州辟前人看花興未休已散曲江逰載筆離秦甸從軍過洛州嵩雲將雨出汝水背城流應念依門客蒿萊滿目一作徑秋送沈先輩尉昭應前人餘才不廢詩佐邑喜間司丹陛終須去青山未可期葉凋溫谷晚雲出古宫遲若草東封疏君王到有時送友人遊湖南前人所投非舊知亦似有前期向路長江上揚帆細雨時春生南嶽早日轉大荒遲盡採瀟湘句重來會近期送前輩讀三傳任長城尉前人登科精魯史作尉及良時髙論窮諸國長才併幾司地傾流水疾山疉過雲遲暇日琴書伴何人對手棋送友人逰蜀前人天下猿多處西南是蜀關馬登青壁瘦人度翠微間帶雨逄殘火因江見斷山行歌風月好莫老錦城間江上送友人南遊前人何處積鄉愁天涯聚亂流岸長群岫晚湖濶片帆秋買酒過漁舍分燈與釣舟瀟湘見來鴈應念獨邉遊送友人歸江南前人辛勤同失意迢遞獨還家落日江邉笛殘春島上花親安誠可喜道在亦何嗟誰伴高吟處晴天望九華送進士許棠前人離鄉積歲年歸路逺依然夜火山頭市春江樹杪船干戈愁鬢改瘴癘喜家全何處營甘旨波濤浸薄田送龎百篇之任青陽縣尉前人都堂公試日詞翰獨超群品秩台庭與篇章聖旨聞鄉連三楚縣樹對九華雲多少青門客臨岐共羡君送碁待詔朴求歸新羅前人海東無敵手歸去道應孤闕下傳新勢船中覆舊圖窮荒回日月積水載寰區故國多年别桑田復在無送友人逰蜀前人劔閣緣空去西過第一作西南過幾州丹霄行客語明月杜鵑愁露帶山花落雲隨野水流相如曽醉地莫戀少年逰送友人北遊前人東歸未遂心北去幾沉吟把酒思鄉逺投文入塞深晉山擎白道汾水截青林想見連天雪安知一作長安是積霖送友人及第歸江南前人豈易及歸榮辛勤致此名登車思往事回首勉諸生路繞山光曙帆通海氣清秋期却間坐林下聽江聲送海東朴充前人天涯離二紀闕下歷三朝漲海雖然濶歸帆不覺遙驚波時失侣舉火夜相招來往尋遺事秦皇有斷橋送友人歸宣州前人失計復離愁君歸我舊遊亂花藏道發春水繞鄉流暝火叢橋市晴山疊郡樓無為謝公戀吟過晚蟬秋送友人南歸王貞白南國菖蒲老知君憶釣船離京近殘暑歸路有新蟬峴首白雲起洞庭秋月懸若教吟興足西笑是何年送馬明府歸山前人辭秩入匡廬重修靖節居免遭黑綬束不與白雲踈送吏各獻酒羣兒自擔書到時看瀑布為我謝清虛送韓從事歸夲道前人獻捷靈州倅歸時寵拜新論邉多稱旨許國誓亡身馬渴黃河凍鴈回青塜春到蕃唯足戰應不肯和親送友人赴涇州幕一作送李中丞冉赴虔州張蠙杏園沉飲散榮別就嘉招日月相期盡山河獨去遙府樓明蜀雪關磧轉胡雕縱有煙塵動應隨上䇿銷送成州牧前人清時為塞郡自古有儒流素望知難愜新恩且用酬犬牙連蜀國兵額貫秦州秪作三年别誰能聽邑留送董卿赴台州前人九陌除書出尋僧問海城家從中路挈吏隔數州迎夜蚌侵燈影春禽雜櫓聲開圖見異迹思上石橋行送徐州薛尚書前人上將出儒中論詩擬立功州從禹後别軍自漢來雄逺驛銷寒日嚴城肅暮空龍顔有遺廟猶得奠英風送薛郎中赴江州前人幾州聞出刺遙美有江民正靣傳天旨懸心禱嶽神尺書先假路紅斾旋燒塵郡顯山川别衙開將吏新散招僧坐暑間載客行春聼事碁忘著探題酒亂巡好編高隱傳多貌上升真近日居清近求人在此人送縉雲尉前人釋褐從仙尉之官興若何去程唯水石公署在雲蘿野阪樓中逈晴峰案上多三年罷趨府應更戰高科送友人歸武陵前人聞近桃源住無村不是花戍旗招海客廟鼓集江鴉别島垂橙實間田長荻花遊春未得意看即是離家和友人送趙能卿東歸前人一第時難得歸期日已過相看玄鬢少共憶白雲多楚濶天垂草吳宫月上波無人不有遇之子獨狂歌送友人歸南中前人有家誰不别經亂獨難尋逺路波濤惡窮荒雨霧深曉驚山象出雷觸海鼇沉為問南遷客何人在瘴林送友人及第歸前人家林滄海東未曉日先紅作貢諸蕃别登科幾國同逺聲魚呷浪層氣蜃迎風鄉俗稀攀桂爭來問月宮送友人歸閩王轂東南歸思切把酒且留連再會知何處相看共黯然猿啼梨嶺路月白建溪船莫戀家鄉住酬身在少年送友人赴闕盧延讓正當天下待雍熙丹詔徴來早為遲倚馬才髙猶愛藝問牛心在肯容私吏開黃閣排班處民擁青門看入時却笑郡人留不得感恩唯擬立生祠九江送方干歸鏡湖曹松一檣懸五雨此日動歸風客路拋湓口家林入鏡中談餘雲出嶠詠苦月欹空更若逰支島何人夜坐同送尤協律京西從事前人辟書來幾日逐意就嘉招猶向風沙淺非於甸服遙時平無探騎秋靜見盤雕若遣關中使煩君問寂寥都門送進士張喬東歸前人舊客東歸逺長安詩少朋去愁分磧鴈行計逐鄉僧華嶽無時雪伊河漫處氷知辭國門路片席認巴陵秋日送方干遊上元前人天髙淮泗白料子趨修程汲水疑山動揚帆覺岸行雲離京口樹鴈入石頭城後夜分遙念一作處諸峯月霧詩選作霧露生送陳樵校書歸泉州前人巨塔列名題詩心亦罕齊除官京下闕乞假海門西别席侵殘漏歸程避戰鼙關遙秦鴈斷家近瘴雲低候馬春風館迎船曉月溪帝京須早入莫被刺桐迷送進士喻坦之遊太原前人北鄙征難盡詩愁滿去程廢巢侵曉色孤詩選作荒冢入鋤聲逗野河流濁離雲磧月明并州戍壘暮詩選作戍壘地角動引風生送李右丞分司東城羅隱分曹得洛川讜議更昭然左省曽批敕中臺肯畏集作避權所悲時漸薄共賀道尤全賣與清平代相兼直幾錢送汝州李中丞十二韻前人群盜方為梗分符奏未寧黃巾攻郡邑白挺掠生靈塵土周畿暗瘡痍汝水腥一凶雖剪滅數縣尚凋零理必咨寬猛謀須藉典刑與能才物論慎選忽天庭官品尊臺秩山河擁福星虎知應去境牛在肯全形舊政窮人瘼新銜展武經關防秋草白城壁晚峯青破膽期來復迷魂想待醒魯山行縣後聊為奠惟馨送沈光侍御赴職閩中前人末至應居右全家出帝鄉禮優逄苑雪官重帶臺霜夜浦吳潮吼春灘建水狂延平有風雨從此是騰驤送內使周大夫自杭州朝貢前人八都上將近平戎便附輶軒奏聖聰三按集作變又作接駕前朝覲禮一函江表戰征功雲歸集作間閬苑何時見水到集作底瑶池觸處通知有殿庭餘力在莫辭消息寄西風淮南送節度盧端公將命之汴州端公嘗為汴州相公從事前人吹臺高倚圃田東此去軺車事分同珠履舊參蕭相國綵衣今佐晉司空醉離淮甸寒星下吟指梁園密雪中到彼的知宣室語幾時徴拜黑頭公送盧端公歸臺盧校書之夏縣前人綿綿堤草拂征輪龍虎俱辭楚水濵只見勝之為御史不知梅福是仙人地推八米源流盛才笑三張事業貧一種西歸一般達柏臺霜冷夏城春送朗州張員外前人聖朝綸閣最延才須牧生民始入來鳯藻已期他日用隼旟應是隔年回旗飄峴首嵐光重酒奠湘江杜魄哀腸斷秦原二三月好花全為使君開重送朗州張員外前人朱輪此去正春風且駐青驄集作門聼斷蓬一榻早年容孺子雙旌今日別文翁誠知與集作汲善心長在爭奈干時迹轉窮酬德酬恩兩無路謾勞惆悵鳯城東淮南送李司空朝覲前人聖君宵旰望時雍丹詔西來雨露濃楚客歌狂集作宣父道髙休歎鳯武侯才大夲猶集作吟龍九州似鼎終須負萬物為銅只待鎔臘後春前更何事便看經度奏東封淮南送工部盧員外赴闕前人始從豸角曳長裾又吐雞香奏玉除隋邸舊僚推謝掾漢庭髙議得相如貴分赤筆升蘭署榮著緋衣從板輿遙想到時秋欲盡禁城涼冷露槐踈淮南送司勳李郎中赴闕前人中朝品秩重文章雙筆依前賜望郎五夜星辰歸帝座半年樽爼奉梁王南都水暖蓮分影北極天寒鴈著行不必戀恩多感激過淮應合見徴黃送陸郎中赴闕前人幕下留連兩月強爐邉侍史舊焚香不關雨露偏垂意自是鴛鸞合著行三署履聲通建禮九霄呈彩應明光少瑜鏤管邱遲錦從此西垣使鳯凰早春送大梁盧從事集作送張坤歸大梁前人蕭蕭羸馬立集作正塵埃又送輶軒向吹臺别酒莫辭今夜酌集作醉故人知是幾時回泉經華嶽猶應凍花到梁園始合開若見集作為謝東門抱關者集作吏為言集作不堪惆悵滿離杯此詩又見二百三十一卷送進士臧濆下第後歸池州前人賦成無處換黃金却向東逰集作春風動越吟天子愛才雖側席諸生多病又霑襟桞攀灞岸狂遮袂水憶池陽緑滿心珍重綵衣歸正好莫將間事繫升沉途中送人東遊有寄前人離驂莫惜暫逡巡君向池陽我入秦嵗月易拋非曩日酒杯難得是同人路經隋苑橋燈夜江轉臺城岸草春此處故交誰見問為言霜鬢壓風塵送宿松傅少府前人江蘺漠漠樹重重東過青淮到宿松縣好也知臨皖水官間應得看灊峯春生緑草集作野吳歌怨雪霽平郊楚酒濃留取餘杯待張翰明年歸棹一從容送沈光及第後東歸兼赴嘉禮前人青青月桂觸人香白紵衫輕稱沈郎好繼馬卿歸故里况聞山簡在襄陽杯傾别岸終集作應須醉草集作花傍征車漸欲芳擬把金錢助集作贈嘉禮不堪栖屑困名場送友人歸夷門前人三年流落大梁城每送君歸即有情别路算來成底事舊遊言著似前生苑荒懶認詞人會門在空憐烈士名至竟男兒分應足集作定不須惆悵谷中鶯送人宰邑裴説官小任還重命官難偶然皇恩輕一邑赤子病三年瘦馬稀餐粟羸童不識錢如君清苦節到處有人傳春暖送人下第前人相送短亭前知君愚復賢事多憑夜夢老為待明年春樹添山脊晴雲學曉煙雄文有公道此别莫澘然湖外送何崇入閣前人因詩相識久忽此告臨途便是有船發也須容市沽精吟五箇字穩泛兩重湖長短逄公道清名振帝都送進士蘇瞻亂後出家前人因亂事空王孤心亦不傷梵僧為骨肉柏寺作家鄉眼閉千行淚頭梳一把霜詩書不得力誰與問蒼蒼秋日送河北從事前人北風沙漠地吾子逺從軍官路雖非逺詩名要且聞蟬悲欲落日雕下擬隂雲此去難相戀前山摻袂分送樊琯司業歸朝唐彥謙近者蘇司業文雄道最光夫君居太學妙譽繼中行汲郡陵𥘉發汾隂篋久亡寂寥方倚席容易忽升堂去日應懸榻來時定裂裳愜心頻拾芥應手屢穿楊辨給如無敵飛騰固自強論心期舌在問事畏頭長駟馬終題柱諸生悉靣牆啖螯譏爾雅賣餅詆公羊三國志注魏嚴幹善春秋公羊鍾繇好左氏謂公羊為賣餅家未見泥函谷俄驚火建章煙塵昏象魏行在隔巴梁紅粟填郿塢青袍過夀陽剪茅行殿濕伐柏舊陵香黌室青襟盡渠門火斾揚雲飛同去國星散各殊方賤子悲窮轍當年亦擅場虀辛尋幼婦醴酒憶先王聖域探姬孔皇風樂禹湯畏誅輕李喜言命小臧倉折樹休盤槊沉鉤且釣璜鴻都問詞客他日莫相忘文苑英華卷二百八十三
