body:
  text: 文苑英華卷二百八十四宋李昉等編送行十九送人覲省七十六首送賈起居奉使入洛取圖書因便拜覲蘇頲舊國才因地當朝使命官遺文徴缺簡還思採芳蘭傳發關門候觴稱邑里歡早持京副入旋佇洛書刋送常侍舒公歸覲有序不録前人朝聞講藝餘晨省拜恩初訓胄尊庠序榮親耀里閭朱丹華轂送斑白綺筵舒江上春流滿還應薦躍魚重送舒公前人散騎金貂服彩衣桃花水上逐春歸懸知邑里遙相望事主榮親代所稀送崔三往密州覲省王維南陌去悠悠東郊不少留同懷扇枕戀獨解集作念倚門愁路繞天山雪家臨海樹秋魯連功未報且莫蹈滄洲送友人南歸己見二百八十八卷前人送李給事歸徐州覲省孫逖列位登青瑣還鄉服綵衣共嚴晨省日便是晝遊歸春水經梁宋晴山入海沂莫愁東路逺四牡正騑騑送許八拾遺歸江寧覲省杜甫詔許辭中禁慈顔一作家榮赴北堂聖朝新孝理祖席倍恩一作輝光內一作贈帛擎偏重宫衣著更香淮隂清夜驛京口渡江航春隔雞人晝秋期燕子涼賜書誇父老夀酒樂城隍一作竹引趨庭曙山添扇枕涼十年過父老幾日蹇城隍看畫曽飢渴追蹤恨一作限渺茫虎頭金粟影神妙獨難忘甫昔時嘗客遊此縣於許生處乞瓦棺寺維摩圖樣志諸篇末送韓十四江東覲省前人兵一作干戈不見老萊衣嘆息人間萬事非我已無家尋弟妹君今何處訪庭闈黃牛峽靜灘聲轉一作急白馬江寒樹影稀此别須當各努力故鄉猶恐未同歸送王孝亷覲省李白彭蠡將天合姑蘇在日邉寧親候海色欲動孝亷船窈窕晴江轉參差逺岫連相思無晝夜東注似長川送鄭務拜伯父綦毋潛名公作逐臣驅馬拂行塵舊國問鄖子勞歌向郢人一川花送客二月栁宜春奉料竹林興寬懷此别晨送集賢學士伊闕史少府敕放歸江東覲省陶翰墨客鍾張侣材髙吳越珍千門來謁帝駟馬去榮親吏邑治清洛鄉山指白蘋歸期應不逺當及未央春送張七判官還京覲省劉長卿春蘭方可採此去葉𥘉齊函谷鶯聲裏秦山馬首西庭闈新柏署門館舊桃蹊春日集作色長安道相隨入禁閨以下三篇並見集本送張栩扶侍之睦州此公舊宰建德前人遙憶新安舊扁舟復却還淺深看水石來往逐雲山入縣餘花在過門故桞間東征隨子去偕隱薜蘿間客舍贈别韋九建赴任河南韋十七造任鄭縣就便覲省前人與子頗疇昔常時仰英髦弟兄盡公器詩賦凌風騷頃者遊上國獨能光選曹秀名冠二陸精鑒逢山濤且赴倚門望莫辭趨府勞桃花照綵服草色連青袍征馬臨素滻離人傾濁醪華山微雨霽祠上殘雲高而我倦栖屑别君良鬱陶春風亦未已旅思空滔滔拙分甘棄置窮居長蓬蒿人生未鯤化物意如鴻毛迢遞兩鄉别殷勤一寶刀清琴有古調更向何人操送楊千牛趂嵗赴汝南郡覲省便成婚岑參問吉轉征鞍安人道姓潘歸期明主賜别酒故人歡珠箔障爐暖狐裘耐臘寒汝南遙倚望早去及春盤以下四篇並見集本送張郎中赴隴右覲省卿公時張卿公亦充節度留後前人中郎鳯一毛世上獨賢豪弱冠已銀印出身唯寶刀還家卿月逈度隴將星髙幕下多相識邉書醉懶操送張直公歸南鄭拜省前人夫子思何速世人皆歎竒萬言不加點七步猶一作獨嫌遲對酒落日後還家飛絮一作雪時北堂應多望一作久待鄉夢促征期送陶鋭棄舉荆南覲省前人明時不愛璧浪迹東南遊何必世人識知君輕五侯採蘭渡漢水問絹過荆州異國有歸興去鄉無客愁天寒楚塞雨月淨襄陽秋坐見吾道逺令人看白頭送杜士瞻楚州覲省李嘉祐見集風流與才思俱似晉時人淮月歸心促江花入興新雲深滄海暮桞暗白田春共道官猶小憐君孝養親送邉輔闕東歸覲省錢起東去有餘意集作景風生賜錦衣集作春風生賜衣鳯凰銜詔下才子採蘭歸斗酒百花裏人情集作情人一笑稀别離須計日想集作相望在彤闈送虞説擢第南歸覲省前人南風起别袂心到衡湘間客路楚天逺集作歸客楚山逺孤舟雲水間愛君採蘭處花島連家山得意且寧省人生難此還送外甥懷素歸覲前人釋子吾家寶神清慧有餘能翻梵王字妙盡伯英書逺鶴無前侣孤雲寄太虛狂來輕世界醉裏得真如飛錫離江集作鄉久寧親喜一作是臘𥘉故池殘雪滿一作在寒桞霽煙踈夀酒還嘗藥晨餐不薦魚遙知禪誦外健筆賦間居此詩二百十九卷重出今已削去注異同為一作送友人歸魯覲省已見二百七十二卷韓翊送李萬饒覲省皇甫冉前程歡拜慶異縣惜招携荀氏風流逺胡家清白齊川廽一作過吳岫失塞濶楚雲低舉目觀魚鳥驚心怯鼓鼙人稀漁浦外灘淺定山西無限青青草王孫去不迷送彭開府往雲中覲使君盧綸一門三代貴非是主恩偏破虜山銘在承家劔藝全奪旗貂帳側射虎雪林前鴈塞逄兄弟雲州發管絃凍河光帶日枯草靜無煙儒者曾親武因貽上將篇送衛司法河中覲省即故吏部王延昌外甥前人出身因強學不以外家榮年少無遺事官間有政聲曉山臨野渡落日照軍營共賞高堂下連行弟與兄送尹樞令狐楚及第後歸覲前人佳人比香草君子即芳蘭寶器金罍重清音玉佩寒貢文齊受寵獻醴兩承歡鞍馬并汾地爭迎陸與潘送太常李主簿歸覲前人粲粲美仍都清間一貴儒定交分玉劔發詠寫氷壺風景隨台位河山入障圖上堂多慶樂肯念谷中愚送渾鍊歸覲却赴闕庭前人雲幕擁簮裾台庭餞伯魚綵衣人競看銀詔帝親書知子當元老為臣淺二疏執圭期已迫捧膳步寧徐而我愚誠者夫君起病諸探題多最勝饌玉每分餘榮比成功後恩同造化𥘉甑塵方欲合籠翮忽將舒榆策錢難比楊花雪不如明朝古隄路心斷玉人車送內弟常仁宗歸信州覲省前人常嗟外族弟兄稀轉覺心孤是送歸醉掩壺觴人有淚愁穿魂夢一作夢驚波浪月無輝烹魚緑岸煙浮草採橘青溪露濕衣聞説江樓長卷幔幾回風起望胡威送李尚書郎君昆季侍從歸覲滑州前人鳯雛聮翼美王孫綵服戎裝擬塞垣金鼎對筵調野膳玉鞭齊騎引行軒氷河一曲旌旗滿墨詔千封雨露繁更説務農將罷戰敢持歌頌慶晨昏送廣陵王主簿自蜀歸絳州寧覲戴叔倫將歸汾水上逺自錦城來已泛西江盡仍隨北鴈回暮雲征馬速曉月故關開漸向庭闈近留君更一杯送穆侍御歸覲東都權德輿知君儒服貴綵繡兩相輝婉婉成名後翩翩擁傳歸江深煙嶼沒山暗雨雲飛共待酬恩罷相將去息機以下三篇並見集本送盧評事婺州覲省前人知向東陽去晨裝見綵衣客愁青眼别家喜玉人歸漠漠水煙晚蕭蕭楓葉飛雙溪泊船處候吏拜胡威送崔端公郎君入京覲省前人已見風姿美仍聞藝業勤清秋上國路白晢少年人帶月輕帆疾迎霜綵服新過庭若有問一為説漳濵送王端公之太原歸覲相公戎昱柱史今何適西行詠陟岡也知人惜别終美鴈成行春雨桃花靜離樽竹葉香到時丞相閣應喜棣華芳送陸秀才歸覲省前人武陵何處在南指楚雲隂花萼連芳近桃源去路深啼鶯徒寂寂征馬已駸駸隄上千年桞條條挂我心送路少府貢使兼覲侍御兄釋皎然國賦推能吏今朝發貢湖佇瞻雙闕鳯思見柏臺烏樹向秦關逺江分楚驛孤榮君有兄弟相繼聘長途送顔處士還長沙覲省前人西候風信起三湘孤客心天寒漢水廣鄉逺楚雲深服綵將侍膳擷芳思滿襟歸人志難阻别恨獨何任送鄭孝亷淮西覲省前人離袂翠華滿晨羞欲早行春風生楚樹晚角發隋城山靄一作野露濕衣彩江鴻增客情征徒不用戒坐月白波清送淳于秀才蘭陵覲省前人歡言欲忘别風信忽相驚桞浦歸人思蘭陵春草生擷芳心未及視枕戀常盈此去非長路還如千里情冬日送顔延之明府撫州覲省前人臨川千里别惆悵上津橋日暮人歸盡山空雪未銷鄉雲心渺渺楚水路遙遙林下方歡會山中獨寂寥天寒驚斷鴈江信望回潮嵗晚流芳歇思君在紫霄送鄂州張别駕歸襄陽覲省司空曙蒼煙峴峰一作亭路臘日漢江春帶雪半山寺行沙隔水人王祥因就宦萊子不遺親正恨殊鄉别千條楚桞新送魏季羔遊長沙覲兄前人蘆荻湘江水蕭蕭萬里秋鶴髙看逈野蟬逺入中流訪友多成滯携家不厭遊惠連仍有作知得從兄酬送友人擢第歸覲李端登龍兼折桂歸去賞高居舊楚楓猶在前隋桞已踈月中逄海客浪裏得鄉書見説江邉住知君不厭魚送魏廣下第歸揚州寧親前人遊宦今空返浮淮一鴈秋白雲隂澤國青草繞揚州調膳過花下張筵列水頭崑山仍有玉嵗晏莫淹留春日送沈贊府歸潯陽覲叔父楊巨源潯陽阮咸宅九派竹林前花嶼高如浪雲峯逺似天江聲在南巷海氣入東田才子今朝去風濤思渺然送高士安下第歸岷南寧覲歐陽詹偕隱有賢親岷南四十春棲雲自匪石觀國暫同塵就飬思兒戲延年愛鳥伸還看謝時去集作輩有類集作又作潁陽人送國子令狐博士赴興元覲省劉禹錫相門才子高陽族學省清資五品官諫院過時榮棣萼謝庭歸去踏芝蘭山中花帶煙嵐晚棧底江含雪水寒伯虎集作仲到家人盡賀栁營蓮府遞相歡聞韓賔擢第歸覲以詩美之兼賀韓十五曹長時韓牧永州前人零陵香草滿郊坰丹穴雛飛入翠屏孝若歸來呈畫讃孟陽別後有山銘蘭陵舊地花才結桂樹新枝色尚清為報儒林丈人道如今縱放鬢星星送秀才鄭君歸寧張籍桂楫綵為衣行當令節歸夕集作夜潮迷浦盡集作逺晝雨見人稀野芰到時􅍄江鷗泊處飛離琴一奏罷山水靄餘輝送李琮歸靈州覲省姚合餞席離人起貪程醉不眠風沙移道路僕馬識山川塞樹花開小關城雪下偏胡塵今巳盡應便促朝天送李餘及第歸蜀賈島知音伸久屈覲省去光輝津渡逢清夜途程盡翠微雲當綿竹疊鳥離錦江飛肯寄書來否原居出甚稀以下四篇並見集本送韋瓊校書前人賔佐兼歸覲此行江漢心别離從闕下道路向山隂孤嶼消寒沫空城滴夜霖若耶溪畔寺秋色共誰尋送董正字常州覲省前人相逐一行鴻何時出磧中江流翻白浪木葉落青楓輕楫浮吳國繁霜下楚空春來歡侍阻正字在東宫送雍陶及第歸成都寧覲前人不唯詩著籍兼又賦知名議論於題稱春秋對問精半應隂隲與全賴有司平歸去峰一作巖巒衆别來松桂生漲江流水品一作凸當道白雲坑勿以攻文捷一作健而將學劔輕裂一作製衣新濯錦開醖舊燒罌同日升高士誰同膝下榮送董正字武歸覲毗陵釋無可暫辭讎校去未發見新鴻路入江波上人歸楚邑東山遙晴出樹野極暮連空何以念兄弟應思潔膳同送威衛李騎曹之靈武寧省前人一嵗一歸寧涼天數騎行河來當塞曲山逺與沙平縱獵旗風卷聽笳帳月生新鴻引寒色回日滿京城送邵錫及第歸湖州春關鳥罷啼歸慶浙煙西郡守招集作邀延重鄉人慕集作仰羡齊橘青逃集作陶暑寺茶長隔湖溪乘暇知髙眺微應辨會稽送蔡京東歸迎侍劉得仁高堂唯兩别此别又成歸薄俸迎親逺雄文解易稀鄆郊秋木見魯寺夜鐘微近臘西來日多逄霰雪飛送高湘及第後東歸覲叔前人此去幾般榮登科鼎足名無慚入南巷髙價聳東京窗塞一作對嵩山碧庭來洛水聲門前桃李樹一徑已隂成送友人下第歸覲前人君此卜行日高堂應夢歸莫將和氏淚滴著老萊衣嶽雨連河細田禽出麥飛到家調膳後吟苦落蟾暉送友人下第歸揚州覲省前人新桞間花垂東西京路岐園林知自到寢食計相思雨斷淮山出帆揚楚樹移晨昏心已一作始泰蟬發是回時送張景宜下第歸揚州覲省朱慶餘歸省值花時行吟落第詩私情憐道在公論覺才遺春雨連淮暗官船過馬遲離心可惆悵為有入城期送唐侍御福建覲兄李羣玉桂枝攀盡賈賢才霄漢春風棣萼開世掌綸言傳大筆官分鴻序厭霜臺閩山翠卉迎飛斾越水清紋散落梅到日池塘春草緑謝公應夢阿連來送盧宏夲浙東歸覲張祜東望故山髙秋歸值小舠懷中陸績橘江上伍員濤好去寧雞口加餐及蟹螯知君思無限集作倦為我讀集作續離騷送段覺之西川過婚禮後歸覲許渾詞賦名髙日集作身不間綵衣成集作如錦度函關鏡中月冷胡威去劔外花飛衛玠還秋浪逺侵黃鶴嶺暮溪集作雲遙斷碧雞山時人若問集作此時人問西遊客心在重霄鬢欲斑送友人下第歸寧喻鳬紫閣雪未盡杏園花亦寒灞西辭舊友楚外憶新安細雨猿啼枿微陽鷺起灘旋應赴秋貢詎得久承歡送李潛歸錦州覲省姚鵠朱樓對翠微紅斾出重扉此地千人望寥天一鶴歸雪封山崦白鳥拂棧梁飛誰比趨庭戀驪珠耀綵衣送友人鄭州歸覲趙嘏為有趨庭戀應忘道路賖風消滎澤凍雨靜圃田沙古陌人來逺遙天鴈勢斜園林新到日春酒酌梨花送權先輩歸覲信安前人衣綵獨歸去一枝蘭更香馬嘶芳草渡門掩百花塘野色亭臺晚灘聲枕簟涼小齋松島上重拂讀書牀洛中逢盧郢石歸覲前人不堪俱失意相送出東周緣切倚門戀倍添為客愁春山和雪靜寒水帶氷流别後期君處靈源紫閣秋送陳嘏登第作尉歸覲前人千峰歸去舊林塘溪縣門前即故鄉曾把桂誇春里巷重憐身稱錦衣裳洲迷翠羽雲遮檻露濕紅蕉月滿廊就養舉朝人共美清資讓却校書郎送裴延瀚下第歸覲滁州前人失意何曾恨解携問安歸去秣陵西郡斜楊栁春風岸山映樓臺明月溪江上詩書懸素業日邉門户倚丹梯一枝攀折回頭是莫向清秋惜馬蹄送春坊董正字浙右歸覲馬戴去覲一作省毗陵日秋殘建業中莎垂石城古山闊海門空灌木寒檣逺一作並層波皓月同何當復讐校春集少陽宫送邵公石先輩歸連州覲省曹松及第兼歸覲宜忘涉驛勞青雲具慶少白日一飛高轉楚聞啼狖臨湘見疊濤連陽沉飲遍何地住旌旄文苑英華卷二百八十四
