body:
  text: 文苑英華卷九百八十九宋李昉等編交舊十二祭元相公文一首祭崔相公文一首祭崔常侍文一首祭處州李使君文一首祭周相公文一首祭蕭侍郎文一首祭宣武王尚書文一首祭太常崔丞文一首祭元相公文白居易維太和五年嵗次辛亥十月乙丑朔十七日辛巳中大夫守河南尹上柱國晉陵縣開國男食邑三百户賜紫金魚袋白居易謹以清酌庶羞之奠敬祭于故相國鄂嶽節度使贈尚書右僕射元公微之之靈惟公家積善慶天鍾粹和生為國楨出為人瑞行業志略政術文華四科全才一時獨步雖歷將相未盡謨猷故風聲但樹於藩方功利不周於夷夏噫此蒼生之不大遇也在公豈有所不足耶詩云淑人君子胡不萬年又云如可贖兮人百其身此古人哀惜賢良之懇辭也若情理憤痛過於斯者則號呌噎集作呼一鬱之不暇又安可勝言哉嗚呼微之貞元季年始定交分行止通塞靡所不同金石膠漆未足為喻死生契濶者近集無此字三十載歌詩唱和者九百餘章播於人聼集作聞今不復叙至於爵祿患難之際寤寐憂思之間誓心同歸交感非一布在文翰今不重云惟近者公拜左丞自越過洛醉别悲吒投我二詩云君應怪我留連久我亦與君離集作辭别難白頭徒侣漸稀少明日恐君無此歡又云集作曰自識君來三度别遮集作這廽白盡老髭鬚戀君不去君須㑹知得後回相見無吟罷涕零執手而去私怪集作揣其故中心惕然及公捐館於鄂悲訊集作訃忽至一慟之後萬恨集作感交懷覆視前篇詞意若此得非魄兆將先知乎集作先知之乎無以繼寄悲情作哀詞三章集作首今載於是以附奠文其一云八月凉風吹白幕寢門廊下哭微之妻孥親友來相弔惟道皇天無所知其二云文章卓犖生無敵風骨精靈沒有神哭送咸陽北原上可能隨例作埃塵其三云今在豈有相逢日未死應無暫忘時從此三篇收淚後終身無復更吟詩嗚呼微之始以詩交終以詩訣弦筆兩絶其在今日嗚呼微之三界之間應不生滅集作孰不生死四海之內誰無友集作交朋然以爾我之身為終天之别既往者已矣未死者如何嗚呼微之六十衰翁灰心血流集作淚引酒再奠撫棺一呼佛經云凡有業結無非因集與公緣㑹豈是偶然多生已來幾離幾合寧無後期公雖不歸我應繼往安有形去而影在皮亡而毛存者乎嗚呼微之言盡於此尚饗祭崔相公文前人維太和六年嵗次壬子十月庚申朔二十四日癸未中大夫守河南尹上柱國晉陽縣開國男食邑三百户賜紫金魚袋白居易謹以清酌庶羞之奠敬祭于故相國吏部尚書贈司徒清河崔公敦詩惟公德望事業識量集作度操履為時而生作國之紀巖廊輔弼集作匡輔藩部政理集作治父母黎元股肱天子斯皆談在人口播於蜀本作在人耳今所叙者眷知而已於戲自古及今實重知音故詩美伐木易稱斷金始愚與公同入翰林因官識靣因事知心獻納合章對揚聨襟以忠相勉以義相針朝案接集作同食夜牀並衾綢繆五年情與時深及公登庸纍分戎閫集作閫鎮愚亦去國出領符印徐宣外集作逺部忠抗遐郡鴈去寄書潮來傳集作得信無由㑹合只望音問未卜後期但敦前分集有余字大和之初連徴歸朝公長京本作分夏司愚二秋曹玉德彌堅集作溫壯集作松心不凋南宫多暇屢接遊遨竹寺雪夜杏園花朝杜曲春晚潘亭月髙前對青山後携濁醪微之夢得慕巢師髙集作臯或徴雅言酣詠陶陶或命俗樂絲管嘈嘈藉草䕃松枕麯餔糟曽未周嵗索然分鑣公又授鉞南撫荆蠻報政入覲復惣天官愚因謝病東歸澗瀍方從四皓旋守三川日集作時䝉訊問時集作日奉周旋豈無要約良有因緣洛城東隅履道西偏修篁回合流水潺湲與公居第閭集作門巷相連與公齒髮甲子同年兩心相期三徑之間優游携手而終老焉嗚呼易失者時難諶集作忱者天既奪我志又殲我賢丘園未歸館舍先捐百身莫贖一夢不還鬱鬱佳城茫茫九原淒凉簫鼓慘淡風煙祖奠遲遲泣涕連連平生親友羅拜柩前賢人已矣天地蒼然嗚呼哀哉敦詩尚饗祭崔常侍文前人維大和九年嵗次乙卯二月景子通鑑目録同此集作丙午朔七日壬申當作午集作子中大夫守太子賔客分司東都上柱國賜紫金魚袋白居易謹以清酌之奠敬祭于故祕書監贈禮部尚書崔公惟公之世祿家行文章政事播於時論此不復云今但叙舊好寫哀集作衷誠而已嗚呼居易兄弟與公伯仲前後科第同登者四五辱為僚友三十餘年集有又字膳部房某集無某字與公同風集作聲塵之遊定膠漆之分兩家不幸十年以來衰集作哀舋所鍾零落殆盡我老君病惟餘二人天不憗遺公又即世不登大位不享永年夙志莫伸幽憤何極居易方屬疾恙不遂執紼遣姪阿龜往展情禮此如不祭痛當集作永痛奈何嗚呼重易平生知我寢門一慟可得而聞乎重易平生嗜酒奠筵一酌可得而歆乎嗚呼哀哉伏惟尚饗祭處州李使君文杜牧維㑹昌五年嵗次乙丑某月日池州刺史杜牧謹遣軍事押衙王􅀈以清酌庶羞之奠敬致祭于亡友李君起居之靈憶昔相遇兩未生鬚京師衆中跡猶甚踈一言道合盡寫有無我於宣城忝跡賔吏君隨幕府東下繼至復與友人故薛子威邂逅適願如相期為集作為期於談劇論集作放論劇談各持是非攻强討深張干集作矛彀機怒或赩赫終成笑嬉於後七年君拜左史來蜀西川我官補闕云愧我先拜章請代蓋私我焉我有家事乞假南來循行里第君出離杯令弟在席恣為詼諧耳熱膽張觥連相我歸墜馬一支幾摧君來我坐側倚旁隈持簡集作時聞酸吟戲口猶開云君我殺以酒相加忌我之才及我南去君刺池陽我守黃岡葭葦之場惟君書信前後相望詞意纖悉勉我自强律我情性補短裁長一函每發沉憂併忘幸㑹交代船一作沿楫若飛江上九月凉風滿衣為别幾時多少歡悲志業益廣不可窺知長人之術首集作莫為吏師縱酒十日舞袖僛垂語公之餘且及其私許以季女配我長兒莫云稚齒可以指期各負少壯輕後㑹時寓居宣城書札日馳一疾不起訃來猶疑嗚呼哀哉惟先僕射儉德冠古凡二十年四領茅土所至所治曰人父母官俸餘半委庫不取京師里第蓬茅數畝慶餘生君曰天酬補何聰明才智兮不使施為何付與之多兮折之何暴天陽地隂髙厚相侔上有河漢鈲普借反天橫流百刻晝夜平分不饒皎不隂晦一月幾朝二男三女俗率如此三男二女無有其地君子小人鼻目並列與小人校曽不集作㑹無百一於百一中與集作以秀奪實人集作凡禀隂陽生於其間陽常不勝賢者宜艱自古皆然欲復何言拊孤一弔拍棺一哭咫尺不遂涕下相續期於沒齒盡力嗣子嗚呼哀哉伏惟尚饗祭周相公文前人維太和五年嵗次辛未七月辛未朔八日戊寅故吏朝議郎持節湖州諸軍事守湖州刺史杜牧謹遣押衙司馬素謹以清酌庶羞之奠敬祭于故相國僕射贈司徒周公之靈伏惟相公之道遍於天下至如牧者受恩最深爰自稚齒即䝉顧許及在官途援挈益至㑹昌之政柄者為誰念集作忿忍隂汗平聲多逐良善牧實忝幸亦在譴中黃岡大澤葭葦之場繼來池陽棲在孤島僻左五嵗遭遇聖明收拾寃沉誅竄集作破罪惡牧於此際更遷桐廬東下京江南走千里屈曲越嶂如入洞穴驚濤觸舟幾至傾沒萬山環合才千餘家夜有哭烏晝有毒霧病無與醫饑不兼食抑暗逼塞行少卧多逐者紛紛歸軫相接惟牧逺棄其道益艱相公憐憫極力掀拔爰及作相首取西歸授之名曹帖以重職虢國太子絳市諜人死而復生未足為喻旌斾西去拜於都門賢士大夫無不攀惜皆曰相公事君盡忠保道輕位大張公室盡閉私門彼由徑者跛倚不進天下賢彥明知所趣集作趍重德壯年衆期再入牧牧集作牧守吳興繼奉手示但思休退不言疾恙訃音集作問忽至慟哭問天嗚呼蒼生未濟而喪吾相吾為蒼生慟豈獨私恩想像音容思惟恩紀期於令嗣可以效死吳洛相逺逾於三集作二千無因拜柩見歸九泉哭送使者致誠奠筵伏惟尚饗代李𤣥為崔京兆祭蕭侍郎文李商隱年月日集有伏字惟靈傳芳華胄禀慶靈源漢朝輔相之流輝梁室帝王之遺懿克生㒞德彰我休期髙表百尋澄波萬頃及春闈獻藝㑹府試才騏驥出塵蛟龍得水頓纓而駑駘盡喪乘氣而鱉蜃皆空憑陵逺天躞蹀長道是將筮仕先集作光乎縉紳侯國從知大朝就選祕寶宜陳於東序朱紱必降於上𤣥錦帳而居青縑以覆建禮推盡瘁之績明光多伏奏之勤亦既遷榮乃司論駮髙居青瑣封還集作折紫泥使明時無失政之譏大邦無不便之詔暫辭朝籍往分郡符借寇莫從徴黃甚急方將啓乎良友進彼令人志豈愛身誓將許集作匡國不謂疏網猶漏斯文集作民未康作礪為鹽正俟理平之運依城憑社深懷剪滅之虞上蔽聰明內求媟近故鴻猷不得而叶贊睿化莫可以輔成藐是流離有窘隂雨嗚呼令唯逐客誰復上書獄以黨入但求俱死銜寃遽往吞恨孤居目斷而不見長安形留而逺託異國屈平忠而獲罪賈誼壽而不長才易炎凉遂分今昔粵自東蜀言旋上京郭泰墓邉空多㑹葬鄧攸身後不見遺孤信隂隲之莫知亦生人之極痛某等頃同班列獲奉周旋分結死生地兼族類依仁既切慕德方深始驚南浦之悲俄軫下泉之仆今則年良月吉筮協龜從顧埋玉之難追歎焚芝之集作而何及牲牢粗潔酒醴非多聊寫丹誠以申永訣為絳郡公祭宣武王尚書文前人伏惟曽構髙基往修峻址俯為明時載生竒士杜林舅族本富文理楊惲外甥集作門素多圖史朱檻有裕括羽成美逸足輕從東之道巨背狹圖南之水匡生明習董氏精専魯壁墜簡汲冡遺編坐忘流麥出記懷鉛淹中莫敵稷下惟先朝有曲臺時推奧學明博士之髙選資衆儒之先覺殷周損益䕫夷禮樂既得根源盡除蹖駮粉闈假途集作道諫署揚輝吾寧訐訕時好依違周舉上章惟求主悟賈生草疏一作諫豈畏人非用之則至捨之則歸旋領藩符俄司國計鋤革煩冗修眀課第鄙晉室之鬻練集作陳疑作練小漢朝之造幣前籌未借斂笏還家再北非罪三黜何嗟淮陽徑兵潁水豪族既佩新印仍推舊轂杜當陽何嘗跨馬雄士集作武爭推祭征虜不廢投壺師人自睦夷門地古梁苑藩雄雙旌大斾二矛重弓無忌御車惟求隱者相如謝病乃慕髙風方將副帝注心從時大願率周朝之奔走惣漢庭之議論人之不幸今也則亡莊子孰分其魍魎秦醫莫究其膏肓鴈沼波瀾空聞怨咽兔園臺榭祇見荒凉某獲顧尤深䝉知甚早公昔分茅愚嘗集作當視草於劉向論思之時贊孟舒長者之號及兹出守實介親鄰音徽繼好寤寐依然常期異日克奉清塵何言永慟屬此佳辰訃哀如昨歸轍攸遵林薄莽蒼川原隱磷想諸葛之旗鼓空還舊壘念伯喈之書集作經籍已付何人候館攸䦕丹幡遽至瞻望衛幕連綿泰畤寄奠申訣纖詞寫意終阻願於親躬徒加哀於殄瘁嗚呼哀哉尚饗為濮陽公祭太常崔丞文前人年月日惟靈太嶽繁祉平安望族潤地勢於長源構堂基於修麓藍田之産宜有良玉徂來之林宜無凡木昔我待子松玉之間兾十城之得價望千尋而可攀大年不登逸足方駛松欲秀而先蠧玉將攻而遽毁聞問之時歎悼何已惟我承乏授命南征一言相許携手同行敻絶萬里飄泊雙旌念兩婢之價倍愧五羖之酬輕地接殊鄰風移中土五嶺三江炎飈瘴雨釣犀之潭跕鳶之渚席上從容幕中宴語先防載薏之謗更示投香之所因使庸虛不罹罪罟越井之首甘綏之女時清則銅集作筒鏑納厨嵗稔則銀簮叩鼓豈我之自唯豫是與相從來覲又往于涇風埃古戍霜雪孤亭偏粲集作喪非之服縵胡之嬰塞逈而晨嚴刁斗沙平而夜篤兜鈴指我以虜隙勉我以武經正慰窮邉我集作忽還京邑北庭減價南轅一作園屑泣章臺辟椽方喜趙嘉之來棘署選丞仍見譙𤣥之入是焉踐歷更徯飛翻况乎鳳沼又棲領原何舋成於燥濕而厲結於寒暄未及西山之藥旋為東嶽之魂憶昨舊許員歸青門出餞樂作而歎起杯行而淚泫俱容與集作悔吝於風波共沉吟於鐘箭揮袂如昨郵書甚頻雖遙道里未濶聲塵孰謂念歸之日翻為有慟之晨嗚呼哀哉髣佛荒阡依稀古陌徐動丹旐永歸𤣥宅願執紼而身逺想移舟而目極逈野秋思群山暮色悵白髮之衰翁哭青雲之舊客聊兹寄奠莫寫西悲已乎崔子為我歆之文苑英華卷九百八十九
