body:
  text: 文苑英華巻四百十八宋李昉等編内官内侍省授呉承倩内侍省常侍制常衮勑漢置十二卿其一尚禁中之事所以司正伯之訓奉詔奏之嚴髙選令才俾之叅掌具官呉承倩行本於孝性周於仁直而能温和而有節文以禮樂逹于典章自晦吉人之辭深得侍臣之體乆在樞近通乎宥密順以聽命未嘗越思咨而後行動不踰矩志全金石之固事絶絲毫之嫌勤職有功静專端一往逢多故亦既居難遐想純誠近從賜服雖酬其効未奬其能省之貳官秩比千石想兹寵授念爾忠勞可内侍省常侍授劉處宏通議大夫内侍省監充客省副使制薛廷珪勑内省華資司賔重任宮朝之選歴代攸難我今得人爰舉茂典具官劉處宏氷霜勵操松桂騰芳弄筆硯以飾躬考詩書而勵行遂為端士自闢亨衢在公馳幹事之名銜命得使臣之體軰流推許逹我聽聞宜示優恩以旌脩整况遐方即序重譯來庭尤思周敏之才用副綏懐之㫖兼榮内省仍進崇階敬佩寵光往供乃職可依制誥授通議大夫行内省侍張建方起復本官制李磎勑張建方古之孝子有為祖母而行服三年者雖有異於禮經而見稱於史筆繄爾至性過絶常流欲追昔賢信為髙行然自東西漢以後南北朝以來大臣奪情固已多矣盖以代更文質事有變通若皆狥私懐則誰當王事况爾職業至重委藉方深宜逹奉上之規用叶得中之理從我曉諭是合章程可依前件授呉承賛朝散大夫内侍省内侍伯判内給事制勑呉承賛早負器能累更職任清貞自立正直不回加以温故知新鈎深致逺雅好六經之㫖旁求百氏之言以此為官何官不理以此為事何事不行是用稱之清曹委以重務俾其稍展扶搖之翰用彰干鏌之鋒無自晦藏副我精選可依前件内謁者監授牛仙童内謁者監制孫逖勑奉議郎行内侍省奚官局令護軍牛仙童脩身淑慎從事忠公夙夜惟勤出入無悔不有賞善何以勸能宜進官榮且增章服可内侍省謁者監仍賜緋魚袋授劉惠通内謁者監制元稹勑宣議郎内侍省宫闈一作閙局令賜緋魚袋劉惠通愿吾愛之俾在左右將我宻命逹于四方去盡行人之詞還致諸臣之復言必忠信事無尤違使朕不出户而知三軍之事者爾有力焉深念其勤將以為報一作將有以報階秩兼進用示恩榮各依前件授劉泰倫起復内謁者監制白居易勑朝議大夫集作郎前行内侍省内謁者監上柱國賜紫金魚袋劉泰倫古有中涓謁者皆侍奉親近之臣也今之寵秩亦由舊焉况泰倫有行義可以飾身有材幹可以掌務監臨内署朝請中闈謹密端和甚宜厥職乆於其事兼之實難宜加進秩之恩仍舉奪情之典勉承奬任勿替初終可起復朝議大夫行内侍省内謁者監授孫孟宣朝請大夫内侍省内謁者監等制李磎勑孫孟宣等並廉正操心温茂成器自領職務皆著能名無纎瑕可指於羣倫有嘉績可書於史氏聲譽既洽階秩宜遷噫爾有髙才我有髙位更宜升進勿自緘藏可依前件授閣門使李全績中大夫行内侍省内謁者監等制勑李全績等夫榮叅禁署光總内朝賛文武俾不失威儀導君臣令無所壅隔永言斯任諒在得人以全績等行潔心貞神清氣爽加以洞逹名法明解典章不以富貴驕人不以才能傲物居然重器逈出常流自領職司並彰殊効是用不移所任加以官榮無忘操持更俟遷擢可依前件局丞令内局令判内僕丞授掖庭局丞賜緋張嗣復内局令判内僕局丞制劉崇望勑具官張嗣復性推端慎才任公方居為勵已之能動有逸羣之度爰當職局備覩通明諒此精脩諧於擢用是命伸其寵奬延以上司俟典幹之繼聞顧優崇之何逺敬思勉勵跂及騰翔可依前件授孫可譲内僕局丞制勑孫可譲才質相髙謙和特立秉端正一作厚恭敬之禮一作體備起居左右之勤入用甚優一作多前途更逺實諧奬進俾列官司勉副寵榮無忘夙夜可依前件授奚官局丞上柱國西門廷暉掖庭局丞制前人勑廷暉出入禁門周旋賔一作宥地恭謹之心無失公忠之節愈明必有才能可當委用勉荷特遷之命宜思與進之途可依前件授儒林郎内府局丞賜緋魚袋楊復隨給事郎行内侍省奚官局令制勑具官楊復隨資於周敏濟以器能居廣衆而和光列禁司而幹務播於公議實曰上流諒檢操之不渝顧津途而莫測允承嘉命勉副寵遷無違恪恭以就光大可依前件授楊魯潜内侍省内府局令制李磎勑楊魯潜萬方兵革之時所難者道路九府困乏之日所切者貢輸而魯潜不顧艱危任當使命俾其琛賮得至賞錫粗行嘉爾勤勞合為遷轉可依前件内官加恩授劉全禮等七人並除内侍省府局丞置同正等制杜牧勑賜緋魚袋上柱國劉全禮等置在傍側皆有才能既歴嵗時合當班秩各宜敬恭職禄不懈忠勤可依前件授内官加階爵制崔嘏勑惟善是求有勞必報命其開國賜以崇階轉遷於禁掖之間優寵於樞機之地我有成命爾其敬之具官某等周旋左右出入宮闈盡誠敬於寸心守真㢘於直道皆能介然自處蔚有休聞念其嵗月之勞被以寵章之美宜思奉國永保宜家可依前件授内官劉益謙加官制薛廷珪勑具官劉益謙惟爾叅我樞近之務副我腹心之求允謂才難克彰試可委任斯重端莊有聞氷清繩直潔已蒞事數馬而對問樹不言稽爾秉持稱吾宥宻是用升之峻級寘被崇班且酬職勞式示殊寵宜保優異勉圖始終敬慎不愆必致逺大可依前件授内官晏希伯加官階制勑内官晏希伯内外之任必惟其人遷擢之恩允屬試可以爾南珪無玷東箭有筠山明見松雪之姿天静聳嵩衡之勢詩書内積儒雅外彰聞其恭勤可委事任階秩並進睠瞩斯深勉服寵光往勵職業可授内官張居翰等加官階制勑具官張居翰等守道立身執忠事任造次不違於善行錙銖必本於彛一作典章藏器未伸弹冠待進吾今知爾爰用加恩升階序而遷品秩振堙沉而示恩澤唯爾居翰勉於致身往服寵光匪懈夙夜可授内官馬從朗加官階制勑設階陛所以示堂奥之嚴正品秩所以明躋陟之漸也率由次第以序忠良苟當其人吾必與進爾從朗止水藏鑒壺氷孕清蹈禮樂以脩身躭詩書而養志夜親墀廡拱辰之列宿分華曉近冕旒捧日之卿雲配潤動必中矩行無越思歴試可觀序遷惟允九重華省三品崇階用酬爾勞往馭其貴惟爾從朗服吾寵光立事檢身所宜匪懈可授學士使郄文晏將軍金紫光禄大夫制前人勑國家設翰墨之林延髦碩之士以潤色鴻筆發揮王猷妙選内官脩辭立誠者以與我言語侍從之臣朝夕遊處膺是柬㧞實惟重難而具官文晏常夢綵毫亦吞文石富有事業志於討論孔光之問樹不言石慶之數馬而對濯濯春柳風標逈出於軰流落落長松節槩不移於霜霰自擢居宻署言奉詞臣所為當材且聞稱職縻之好爵貴則號其將軍峻以崇階勲莫重於光禄敬承寵渥往蒞清華率由此途以至崇逹惟爾文晏得不勉之可授内官劉重遇加階官制闕授内官王可方加階官制勑出膺使命入奉宸嚴惟兹柬求允属心膂爾可方將命而去成功以還别利器於盤錯之間驗㓗矩於脂膏之際試可斯驗愿吾愛之俾其序遷並謂至當徵還内省冠以豊貂惟爾可方勉圖懿効可授内官馬昌裔加官制勑昌裔叅我樞機奉吾指顧能慎宻以植志端莊而飭躬動畏四知潔無貳過委注斯允霜雪不渝職勞可酬序進惟允升其階秩示以優崇爾往蒞之益敬其事罔懈砥礪稱予渥恩可授内官張禹珪加官制勑張禹珪本以端莊飭之儒雅鵰鶚負横秋之勢楩柟擢構厦之材藴是器能在予左右歴試事任亟渉光隂聞其恪勤宜示優奬階級秩序俾之俱遷服我新恩保爾懿効雖覆一簣古人有言爾宜知之勉自朂率可授内官孫昭裔加官制勑昭裔干鏌銛鋒驊騮逸歩文之以禮樂飭之以詩書白玉無瑕朱絃譲直拱我宸極粲如華星慎爾樞機不對温樹歴試兹允其材益彰移之崇班加以峻級且旌優異用激端脩敬怠不同崇髙可致惟爾昭裔知予意焉可授内官劉繼明王思齊驍衞將軍加階制李磎勑朕每思中興深念庶政至於近宻之任尤資忠讜之臣凡所擢居莫非精選具官劉繼明等並介㓗自持而器能相比各於職掌並著聲名論功考績之時既無差異加寵進階之日豈可偏私勉務殊榮更期超擢可依前件授内官韓坤範等加恩制勑榮居近宻任揔重難居疑上之恩渥則殊而人臣之敬忌尤切其有端静無失進退可稱而復以幹能彰於官業名隨位進行與才兼不有異一作日亦遷何示奬勸宣徽小馬坊使某㓗矩操心温潤成器剛而不暴柔而不回宣徽含光使某本於誠明文以禮譲止而不滯行而不流起復宣徽南院副使某明見事情智通微妙光而不耀晦而不幽皆調金玉之聲並秀松筠之色至於績效實為著明嗚呼守職奉公爾既盡其節矣崇階厚禄吾豈刓於印哉可依前件授内官韓龜範加官制勑龜範代濟功勲志懐忠烈部領琛賮貢奉闕庭踰玉壘之艱越銅梁之險績效斯異爵賞宜加况奉職可謂嵗深處衆獨聞位下不有升陟何謂勸能可依前件授内官董全珝等除諸司副使制前人勑董全珝等副貳之重其來尚矣雖古之列國小侯繼好一使猶尊命介以應事機况我大朝命官而中禁分職貴惟宻邇務極繁難若不優以崇班何以責其所任以爾等並懐忠亮盛藴器能名節不變於風霜勤勞仍彰於嵗月况今方馳鴻霑合為升遷示以新恩雅符故事可依前件文苑英華巻四百十八
