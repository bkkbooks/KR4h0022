body:
  text: 文苑英華巻六宋李昉等編天象六初月賦二首明月照高樓賦一首月臨鏡湖賦一首破鏡飛上天賦一首月照寒泉賦一首姮娥奔月賦一首新月誤驚魚賦一首漣漪濯明月賦一首海上生明月賦一首初月賦王泠然觀乎皎皎新月含虚驚闕伺海蛤而齊生候階蓂而俱發既與物而盈偃亦隨時而興歇故其清光未滿斜輪半空依稀破鏡髣髴懸弓離畢墜雨繞暈生風散㣲華於粉壁集輕照於蘭叢爾其於狀也皎皎的的鏡丹霄而灼爍鮮鮮綿綿㸃清漢而連娟逢輕雲而暫蔽雜華星而共妍冩邊城之羇目鑒珠箔之嬌絃思閨女之披幌弄舟人於叩舷若乃斷山風入中天氣清雲徹暮景霞開晩晴望頺陽之西落見㣲月之孤生出烟郊而漫漫映江浦之亭亭凝碧䑓以光浄度青樓以色明雖予情之斯得停搴攬而不盈俄而凉夜未幾低輪半傾墜斜光於森木落餘照於嚴城臨玉墀而不見望亭閣而杳冥余亦何為者感在空庭第二鄭遥初生㣲月若無若有出城中兮纔廣於眉入堂上兮不盈於手若乃金壺稍滴銀漢将流暗鵲驚夜寒蛩送秋天清暈滅露白光浮臨皓壁而添粉映珠簾而半鈎纎光潤海重明表壑的的飛上姢姢未落衘破鏡而飛斜抱彎弓而勢却蓂稀葉少桂短花新無篋笥之團扇有虚空之半輪悵徘徊以将失情欝結而莫伸命後車之文雅恭進牘於詞人明月照高樓賦以明月照樓四字為韻千里著明者唯月百尺崇高者曰樓月照耀而莫大樓宏敞而寡儔光含雪浄勢冩雲浮生滄海而皎皎度飛宇而悠悠皓天地而彌廣沉氛埃而已收於是隐映澄寂特起峻峭月上樓高樓明月耀黄鶴驚而欲翥素娥集而匪召垂輪簾外疑鈎勢之重懸透影窓中若鏡光之開照其望也可以相思其登也可以逺眺及夫高秋廓落寒夜肅清四空迥而晃朗九層屹而峥嶸列歡宴㑹友生去洞房兮即重屋滅華燈而臨前楹玉檻連彩粉壁迷明動鮑昭之詩興銷王粲之憂情則有離居獨處愁思未歇持鳯管而坐樓矜蛾眉而對月徘徊宵際悵怏明發歩蓂葉而盈盈顧桂華而忽忽月臨鏡湖賦以風静湖滿輕波不動為韻陸贄月配陽含虚而明湖止水體柔而平光無不臨故麗天並耀清可以鑒因取鏡表名月包隂以成象水禀月而為精兩氣相合實不入而疑入二羙交映伊本清而又清色皎潔而秋天愈静波演漾而宵風乍輕類泗濵之磬見疑合浦之珠明至明洞幽至清無垢同𤣥澤無逺不遍等達人以虚而受滿不可恃望之足戒以虧盈形或未分鑒之則辨其姸醜輕靄不起纎塵莫過沉璧彩而為鏡碎金輝以成波皓質未判空聞田鶴之唳香風乍度暗傳蓮女之歌萬象皆總湛清光而不動極望靡窮凝虚浩而如空照同心千里之外洞游鱗百丈之中棹影乍浮如上天邊之漢桂華不定多因蘋末之風白晝誠窮殘夜将短臨逺峯而欲落沉餘景而猶滿月之徳也朗而迥水之性也柔而静照有餘輝光無匿影滿而将缺顧兎自殊於太陽導之則流無禽豈同於舊井原夫徳無不應理必相符湖以柔而藏月月因朗而彰湖不私其明明則有裕無逆於物物乃不孤異投珠而按劒等藏氷而耀壺惟水月之叶美與君子而同途破鏡飛上天賦以青天流魄玉戸失顔為韻李程何新月之嬋娟如破鏡之上天㣲茫而桂樹猶短髣髴而菱花不全皓色減去清光獨懸謂是云非開玉匣而長在自無而有指金波而未圓象則陵虚名何責實伊酷似其素影若同分於麗質莫測潜化空驚逈出憐此夕以孤飛念誰家而暗失况夫㣲明海澨逺掛關山感重輪而易缺思鞶帶而莫攀姮娥掩色嫮女分顔意迢遞而難明半生象外豈别離之可贈餘在人間霽景澄寂泬寥凝碧匪廽輝而照膽徒向晦而淪魄洞房未掩過䑓上而不歸斜漢欲低入窓中而猶隔亦何辨夫鎔於火化隲彼隂靈比孤光於珪白喻片影之銅青遥空絢練逺色晶熒爽氣共浮豈彩霞之能掩芳塵不到非素手之所經觀夫漸倚上𤣥廹於下土瞻吳牛之罷喘對孤鸞之欲舞徴碎質以委地有方輝而竟戸哉生之後從一氣以裁成埋照之時豈五金而能補正當殘夜偏稱髙秋含烟不隐泛水如流苟孕明於真宰非禀質於人謀似逃秦殿聊上庾樓疑熠熠以從革類纎纎而若鈎異彼糚奩掩兹遊燭方應候以戯珠不鑒容以銷玉坐惜雲曙行愁漏促暈猶未合無陳方士之灰㸃不可磨空負先生之局月照寒泉賦以秋月清明夜泉澄澈為韻皎兮月出毖彼泉流月燭清夜泉澄素秋其象也合之雙美其氣也同以相求觀夫彼濬者泉彼高者月臨四海而照無私利萬物而功不伐故能流而不竭明而不歇清見底而練色寒凝暉盈輪而桂華秋發則知水者秋之氣月者隂之精月下泉湧泉中月生其始愈出其少徐清度晦明兮共隐共見歴今古兮齊虧齊盈皎皎兮不易其色泠泠兮不改其聲足以洗潁川之耳濯滄浪之纓者歟至若寒露白秋天晴金風始扇銀河未傾巻纎雲而九霄可覩掃薄霧而萬里克明於是泉悠悠以東注月遅遅而西行彼月伊何明之大者彼泉伊何清之至也泉凝釋於春冬月行藏於晝夜既處卑以習坎亦居高而臨下攬不盈也則照之而有餘流無窮焉如逝者之不舍故得莫明匪月莫清匪泉月經天而燭地泉帶地而澄天素波洞出清影孤懸氣涵浪於一色輪照底而雙圓圓如日麗净若霜凝寳鏡出匣玉壺開氷摇清吹而灔灔澹碧空而澄澄度淺沙則清影遅漫漱幽石則光波沸騰又可樂而瓢飲枕以曲肱者也客有續為泉月之歌歌曰月照泉兮泉涵月泉潺湲兮月皎潔波無魚兮清澄月有蟾兮澄澈觀碎璧於漣漪認明珠於圓折信上善之可方而智者之所悦姮娥奔月賦以一升天中永棄塵俗為韻蔣防昔姮娥服仙藥於俄頃指隂靈以馳騁嗟人世之如流覺天衢之何永於是竦身騫翥霽月凝冷振環鏘珮雜珠露之珊珊雲帔花冠渡銀河之耿耿伊立志之有恒果躡景而可慿出乎寥廓愛此清澄企予望之想蟾蜍之下視進吾徃也軼埃壒而上升且夫碧虚望而自致清質瞻而不墜天逈而音塵已沒風落而芳馨㣲至徃而不返誰謂與子偕行仰之彌高孰云不我遐棄窈窕輕舉圓明映空遺九族於脫屣冀孤輪之處躬獨徃孤高若集瑶池之上潜來烟霧如分紈扇之中迷晶皎亂曈融神明合柔徳通想泛金波詎假琴高之鯉将摇桂魄寧因禦寇之風冥冥睟容規規皓質乗飛廉兮竦踴廹望舒兮寥慄初疑糚以臨鏡形影猶分終類氷之在壺輝華相失故得享年代之悠乆與乾坤而齊立明明配日高高在天對陽烏之升降伴孤兎之昭宣滿時而玉貌和光難分皓皓虧處而娥眉共麗不辨娟娟烱若通輝超然絶俗想明眸而下鑒並玉鈎而傍燭閨中結恨感予於三五之時笛裏傳情聽我於關山之曲豈伊異人學道全真湘波之妃洛浦之神曽不足繼其芳塵新月誤驚魚賦以在水為鈎有並垂綸為韻白行簡纎纎之月兮濯影清流渒渒之鱗兮妄意懸鈎乍見之而深入復瀺焉而誤逰尋落餌遲來舟游泳不安頗似縱而方引噞喁自失疑已懸而未收當其照溪篁興舟子駭垂竿而亂動訝半規而特起諒不知夫月來徒有虞於夕死或跳躍無所毎健羡於脱泉周旋不能乍蹉跎於失水且復走菱荇觸洲沚歛鬐鬛以曲全高首目而圜視引耀方丈形儀更眞挂影西南盡迷𤣥兎與波上下難晦紫鱗雖類吳牛之喘月獨喻文鰩之觸綸轉蕩其心似迎其手恐牽復於未濟懼鈎深於善誘同畏景惡跡之士視於無形異貪餌慕羶之徒求之何有夕惕未已宵迷不舒毎流浪而遷逝願息隂以躊蹰豈将畏首與畏尾亦将慎終而慎初靄靄孤光隔千里而共此鰥鰥下視雖擘波其焉如既而魄盡中流光沉西海猶􅌓眙於故處尚怵惕其安在豈鵬化之質不能奮飛方魚服之時毎嗟危殆悲夫似是之疑何莫由斯况文竿晝引緒蠒宵垂苟人謀之不輟何天道之可窺安得逺猜機漾修逈笑明月而弄淪漣與狎鷗而相並漣漪濯明月賦以題為韻侯喜水上風起天邉月圓何怡情於遥夜濯委照於輕漣兎怯盈縮蟾驚泝沿謂𤣥濤之弄珠将投進退訝方流之有玉欲獻遷延泛灔靡凝沖融不歇漸失沙鏡逾迷海月丹霞合而暫止青蘋開而匪輟足使浣紗之女愧顰蛾於後來伐檀之人恨流光於明發咸池何為逺在天涯言浴白日曽非綠漪彼浪以雪著月以光垂縱欲報其虚室亦無能而可施曷霄漢之下人寰不離望舒俯降陽侯悦隨班如賁如克将順乎其美于沼于沚必周旋而中規且濯乃彊名明而有素盖取樂於風景豈同効於塵路所以淺不浮華深不掩嫮殊渙渙於鄭什引悠悠於謝賦懿其澹若含情眇若功成遍菰蒲而歛曜滿洲渚以澄明漏永更遥空見浮沉之状星移漢轉無聞出沒之聲嗟夫月霽乃明水煩則濁苟氛昏之掩蔽與魚鼈而瀺灂水假當其演溢月縱思其滌濯運乖道阻天懸地邈則安得輕飇暫拂水鏡動於秦䑓纎埃不飛玉璧吐於荆璞含輝發彩似忠臣之沃明君如後進之資先覺豈徒比其光麗而已海上生明月賦徐晦巨浸不極太隂無私搴積水之遊氣覩圓魄之殊姿皜皓天歩蒼茫地維泱漾崩騰助金波玉浪之勢晶熒激射當三五二八之期盖進必以道豈出非其時繼傾曦以對越擅浮光而在兹嗟乎空闊之容若彼清明之状如此蜃樓旁起疑庾亮之可從珠蚌潛開異隨侯之所委躔次雖遊風濤詎弭出霞岸而不遅過鼇山而孔邇顧兎摇曳姮娥徙倚将運行以故然諒滌濯之難揣逺絶昏霾逈臨津涯竟無幽而不燭斯冥力而上排希逸之賦可稱界于斜漢仲言之詩有作映彼清淮未若皎皎初吐蒼蒼可階叶朝夕以晦朔寧望斷而意乖奫淪涳洞雪飜烟弄水族将蟾影交馳浪花與桂枝相送凝目是逺賞心斯衆苟佳景之必存孰良辰之不共滔滔節宣冉冉徂遷循彼萬流差廣納而觀海推夫兩曜候乆照而得天客有吟想此夜淹翔有年感浮桴而偶聖庶乗槎而逢仙亦将覽孤景盥洪漣聊學抽毫而進牘豈追羡魚以臨川文苑英華巻六
