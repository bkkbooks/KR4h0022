  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0022_WYG_508-1a, image: WYG1337/WYG1337-0662c.png}
body:
  text: 文苑英華卷五百八宋李昉等編樂門十九道樂官樂司請考判二道夷樂判一道旄人奏散判二道瞽相判一道樂懸畫蜙蝑判四道鍾官所鑄判二道笙師不施舂牘判一道笛判一道琴有殺聲判一道學琴不進判一道學歌玄晏判一道樂師教舞判一道習結風伎判一道樂官樂師請考判丙任樂司博士教弟子難色五周成請進考所司以不能發蒙教不進考不伏對王智明聖人返古之道崇尚雅樂笙鏞鏘洋絲竹宴衍后夔節響子野垂聽文侯睹而存魏仲尼悅而留齊故列其樂司班以胄子九變至妙五年成聲一作八音克諧奏之方澤地祗升登之圓丘天神降師則獲考所由奚疑童蒙之來可以漸進功不聞教胡用抑為格令無文謂宜憑據同前薑立佑和以人神文之金石所以發揮時政導揚國風惟丙職在伶倫克諧聲律笙鏞以間本歌頌而知音鍾鼓是陳謂鏗鏘之在耳師也有教藝則不孤故得逺會生徒方來胃子教成難色功正在於發蒙奬勸多方亦何疑於進考夷樂鞮鞻為任判甲為鞮鞻乃以為南方所習將訓之於人人以為非訴其有謬甲不伏對萬邦作乂同乎文軌百度為貞崇其禮樂祖考來格神人以和必四夷而克諧明庶士之交正國家一其區宇無思不伏嵗覲有差方物斯備越裳重譯爰歸翡翠之􅀈大宛久關一作開攸聞汗血之獻故得鞮鞻是列一作别聲律會同諭彼來王昭其率舞擊石拊石歎入豫於以雅以南通乎聲頌泉魚涵泳聽朱絃而屢升雲鳳鶱回訓金奏而不去考都鄙之所習順操土風混夷夏之聲塵以廣朝命各得其所無相奪倫明九序之惟歌均兩階之無事甲之所訓亦無懵焉人則未從其為過矣且南方北方之樂惟禁惟任之名既人絶而路殊誠有條而不紊辨方正位允執其中明罰敕法亦可不罔旄人奏散判日本請吏賜宴于朝旄人奏散不以靺為惠文冠所持辭云屬鞮鞻氏對張秀明國家有道日本請吏皇恩載洽式宴于朝眷彼旄人掌我夷樂邊夏不雜聲未動一作勤於禁靺風霜有典罪已彰於惠文雖御史彈毫雅存綱紀而旄人有訴請問鞮鞻同前常無欲中國有孚殊方委欵不逺波海來趨天闕仰衣冠而竭誠願臣妾而見訴國客茲備式宴且酣方樂未陳闕歌與舞旄人典斯鍾鼓職彼韎任既乖周舍之宜須置踈遺之罰為惠文所抵信得其由推鞮鞻之愆一作僣未聞其可瞽相判得太常備宿懸於大祭有瞽而無相步所由請罪之對禮以導志樂以和聲為儐詔而率先陳相步而汲引是立扶工之稱式陳視瞭之司相須而成兼濟為道乃鍾牙之比義實陳雷之喻堅等彼塤箎寧聞獨用均兹黼黻必在同施惟太常之官曹司雅樂之制度虔承大祭恭備宿懸杳杳嚴更滴銀壺而始唱鏘鏘逸韻考金奏而斯聞會彼工人咸資瞽者心則通於師曠目非類於離婁子夏新名徒起移冠之號荆軻舊客終聞擊築之娛質明而行已敷容於肅敬晏朝而退爰輟響於宫商祝史正詞良非矯舉相步乖位何懵規儀就以逡巡其誰告導若蒙泉之無適非大車之利往雖六變六同不齊其節而及階及席是闕于言良未展於扶工禮將至於顛越此而不罰其有何誅樂懸畫蜙蝑判得樂懸上畫蜙蝑所司以細碎失禮不伏對樂備鐘鼓功存雕刻必資萬物之飾以助成器之雄况猛簴趪趪負筍嶷嶷懸以千石扣乎萬鈞積而為形畢存旁行之彚微而裨著何隔羽鳴之族所司昧禮未曰博通且考工之記實存其目梓人之職亦著恆規盡伯益之能名咸一夔而可變事既有據刑欲何施同前范貞朏體國經野在乎六職審材辨器謂之百工須任宜以播聲當舉類以為用故裸者羽者爰摽大獸之名連行紆行實曰小蟲之屬施大於筍簴發爾標形篆小於宗彛寂然為象有此成則斯無替之何彼所司用荒厥職以為細碎不亦宜乎同前朱溫一作縕昔者先王制禮作樂也象物昭著厥儀孔殷大夏雲門既修之於千帝金鍾玉磬亦畫之於五采用能文物以紀聲名有差習之以和人悅衆播之以移風易俗當今命夔奏樂使鳳振羽豈蟹蟲之虛責何蜙蝑之矯言應為細碎微軀别有所飾輕清雅樂此非其任所司是舉深得其宜請革前非仍科後罪同前應天為同合雷作氣殊以堵肆設其􅙇業式覩周禮爰命工人備物雕鐫兼節丹漆怒鯨與翼鳴僉賦旁行將跳躍咸修因木生姿似得隂陽之氣異體分象各類清濁之音有何踈失以為細碎稽古未爽不伏何疑鍾官所鑄判庚為鍾官所鑄不充嵗計工部按其罪訴云鉛錫未足對沈逢年國家業藉承平道惟禮樂既克諧之是冀豈鍾鼓之云乎調白雪之琴薰風已被蓄應霜之氣職務司存必俟洪鍾之功更叶陶鈞之力况和戎魏絳須錫歌鍾救衛于奚理存名器豈得時須有失嵗計不充懼金玉之科條託鉛錫之闕乏何不豫呈功課早計有無逺乎鑄銅之山近取罰鍰之坐置棘之典今也何逃握蘭之見斯焉謂得同前鄭若方我皇開元首正禮交樂舉智力者盡其謀能聰明者竭其視聽不勤爾職自貽伊咎相彼鳬氏實乃鯨鍾理宜鎔鑄有方必使功程無闕鍾之為用其大矣哉至若密勿九重奏晷漏於銅史鏗鍧萬樂應宫懸於玉階可以和人神可以節寒暑庚乃不率厥典坐於縱墮鉛錫未足胡不昌言尸曠有歸虛為詭訴且六師分掌四方取則既參詳於甲令亦簡孚於庚罪績用莫展誠自得之寮佐斯替固其宜矣笙師不施舂牘判甲為笙師以教陔樂不施舂牘等三品科之訴不伏對六同分序則備禮文九夏成章式明詩頌所以賔射喪祭軍旅會同必將有陳罔或無度永言舂牘喻此安絃以諧八音實為三品伐檀欒於雲夢影落梢雲採貞徑于仙壇色移寒雪夙開揮斫素列廣修因玉潤之呈姿節金奏以為用惟甲司至有昧欽承無相奪倫未求諸已不以其道輕欲訓人杳眇笙歌詎騫回於鳳影嬋姢篠簜殊髣佛於龍鳴應雅莫修塤箎坐缺至若教之陔夏用以娛賔候終宴而言歸慮沉酣而越禮為之行節肅以威儀釀取歎於傾家飲無罪於終日遵其聲律必在和均忽貽顧於周郎豈忘味於宣父不謀其政遐棄厥司當審詞以定刑庶先迷而後得笛判甲削碧鮮以當簻本四加一所由科其不節訴不伏對玉潤碧鮮靄青冥之秀色龍吟鳳吹發寥亮之飛聲始立制於工人方勸一作歡侑於君子簡易爰在繁會斯深惟甲練精而成厥象躋攀絶巘陟彼九成剸削真姿製為雙笛撫羌人之遺躅裁以當簻感越客而興悲方延作賦霜候無變寧俟斫磨風韻將調逺資律度加君明之後出畢以五音佇叔夏之前規奏其三調落梅香遍目滿風前折桞隂踈橫分塞上固無失於倫序宛有叶於和均不節論辜未知其可琴有殺聲判甲鼓琴多殺聲丙與其鄰懸鏡於樹以盤水察之盡達微隱甲訟丙非理云恐有害人對緑琴髙張觸物易操朱絃促調緣心應聲既峩峩以在山亦蕩蕩而著水甲逢有道每歌詠於南薰丙屬無為亦歡娛於北里彈絲靜聽無聞獨鶴之吟外物生情忽作捕蟬之思平生雅意妙曲先知邂逅商音有鄰便覺鏡懸於樹擬桂魄之澄空水止於盤若氷壺之在鑑隱微必察善惡斯彰才聞蔡氏之絃遽作淮南之術迹或多於猜忌罪無極一作抵於章程事則可慿訟宜一作乃無咎學琴不進判乙學鼓琴於伶曹十日不進將撻之訟云未得其教仰正斷對李希言愔愔琴德先聖所營詠薰風以解愠歌白雪而成操士具不撤國有其官將以蕩滌放心發揚和氣不有君子其能爾乎乙學安絃同宣尼之不進伶將執朴異師襄之下拜已習其數又得其人聞一作問諸禦冦之書是曰文王之操若伶人子弟宣文職官茍慢常以致尤遂飾詞以文過則夏楚之道何所疑焉學歌玄宴判得丙學歌玄宴多肉好之音人告非時對李靈光圓首方足戴天履地稟隂陽生殺之氣有喜怒哀樂之心舞所以節宣禮容歌所以吟詠情性故端木發問豈盡師乙之節薛談學謳未窮秦青之技才有用捨命有通塞滄浪水清不行南楚白石山爛遂感東齊窮者或歌道固難廢惟丙所學應有攸歸微妙之音雖聞是習貞俗之禮一作韻亦復懸殊悼彼玄宴之辰宜暢清都之奏紫芝仙客揭雅曲於重玄丹洞羽人吹真聲於倒景一作碧落聆彼肉好竒殊骨間既非慶雲韶夏之作又匪白雪陽春之調暌彼嘉會乖茲正聲人告非時雅符通典樂師教舞判甲年十三為國子樂師教之舞象甲不受命樂師將撻甲云違禮不伏對夏序殷膠建國重務飬老尊齒先王大猷所以長幼分規道業差序或殊誦習將明告教射御書數分制則於樂章中和祗庸遵規儀於性府既大成以方就圓一作爰小舞而首陳必在凖繩無或差忒興言國子辨慧斯文系彼勳華金張錫慶遵其禮樂遊夏申歡學必幼儀言辭外傅年深舞勺及踐上庠春誦夏絃深其順節尊師重道寧願踰間佩觹之辰成童未及摳衣之日舞象何先雖欲速於有知終見陷於無度儻乎聞一知二亦何守其彞倫必也非禮勿言固可徇之年限制於未亂詳兹雅得紀綱撲作教刑撫事難從捶楚習結風伎判得乙習結風之伎縣長以其惰業責之對舞以盡意用察其形或因序而持芬有傳規而去籥是以六英方變用禮神祗八佾成章以和邦國雖聲歌而會理終鄭雅而殊制陳之典則誡以怠荒乙也妄庸居然訓習非策名於樂府潛託志於結風謂小吏之期仙鳳凰均影學參軍之式宴鸜鵒成衣長袖蹁蹮一作蹣跚未呈妙於風結鳴絃紏舉爰置罪於霜科足訓疲人誠為茂宰宜從改革無或因循文苑英華卷五百八
