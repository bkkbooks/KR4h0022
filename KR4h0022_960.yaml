body:
  text: 文苑英華卷九百六十一宋李昉等編雜一王績自撰墓志一首楊去盈墓志一首楊去溢墓志一首梁錡墓志一首陳明經元敬墓志一首髙氏子墓志一首陳孜墓志一首自撰墓志王績集作績王績者有父母無朋友自為之字曰無功焉或問之箕踞不對蓋以有道於已無功於時也不讀集作聽書自達理不知榮辱不計利害起家以祿位歷數職而一進階集作進一階才高位下免責而已矣集無此字天子不知公卿不識四十五十而無聞焉於是退歸以酒德遊於鄉里往往賣卜時時著集作看書行若無所之坐若無所據鄉人未有達其意也嘗耕東臯世集無世字號東臯子身死之日自為銘焉曰有唐逸人太原王績若頑若愚似矯似激院止三徑堂唯四壁不知節制焉有親戚以生為附贅懸疣以死為決疣潰癰無思無慮何去何從壠集作龍頭刻石馬鬛裁封哀哀孝子集作豫子空對長松楊集作從弟去盈墓志銘楊炯古者黃帝軒轅氏沒帝嚳高辛氏作幼而徇齊長而敦敏則天下之人用其教者百年忠肅恭懿宣慈惠和則天下之人謂之集作稱其才者八子黃烏旗而白魚躍集作燎有周武之興王彤弓一而玈矢千有晉文之啓霸雖隱集作出公遜位哀侯失國而文之昭也武之穆也司徒為五教之官有社稷焉有黎人焉丞相臨萬機之職崤函鼎盛赫奕於朱輪河洛台階昭彰於白玉積善餘慶信而有徵國子進士楊去盈字流謙𢎞農華隂人也曽祖諱初周大將軍隋宗正卿常州刺史順楊公皇朝左光祿大夫華山郡開國公食邑本鄉二千五百戶唐虞之稷契魏晉之裴王晏嬰可以事百君臯繇為之謨九德麾蓋兵馬人知牧伯之尊名山大川藴集作地積公侯之氣王考諱安偽鄭王充遙集作逼是授二十八將封􅤂國公尋謀歸順為充所害皇朝贈大將軍旌忠烈也陶謙雅尚祖逖雄心會天子之蒙塵見諸侯之釋位雖陳平去就潛懷杖劍之謀而石勒凶殘遂及推牆之禍父某潤州句容遂州長江二縣令朝散大夫行鄧州司馬文武兼備清明集作白在躬一作體人無間言位不充量四方取則孔宣父之踐中都百里非才龎士元之登别駕若夫庭生玉樹身帶金鐶有衛玠之風神有張良之容貌蔣琬之譏盛元集作允責在司空陳蕃之對薛勤志清天下觀其昏定晨省立身揚名怪草蔚其休徵神魚會其冥感莊公獨歎聞穎叔之純深有道相推見茅容之盡禮則閨門雍穆以孝聞也輔仁會友合志同方晏平仲之善交鮑叔牙之知我張琪集作堪死日妻子唯托於朱暉劉惔生平風月每思於玄度則朋友之德若蘭芬集作薰也朱穆好學中食忘餐譙周研精欣然獨笑張華四海之內若指諸掌班固百家之言無不窮究鈎深致逺悅丘墳也八音繁會五色章明動天地而感鬼神序人倫而成孝敬陽臺並作楚襄王賜雲夢之田上林同時漢武帝給尚書之筆則瓊敷玉藻未足多集作云也自攝齊東序撰杖西膠唯集作推宰我之能言貴顔回之有德成如麟角道尊於璧水之前翼若鴻毛俯拾於金門之下方將咫尺宣室扈從明庭申賈誼之忠讜盡揚雄之規諫豫章七載擢修幹而聳長條有鳥三年搏積集作高風而運滄海豈期數有迍否天無皂白苗而不秀秀而不實者蓋有是夫古人有言沒而不朽者此之謂也春秋二十有六以上元三年五月二十二日歿集作終于京師勝業里嗚呼哀哉至儀鳯四年十二月二日歸葬於華隂之某原不忘本也山河鬱鬱松柏蒼蒼骨肉閉兮歸后土魂魄遊兮思故鄉三荆搖落五都悲涼痛門户之無主悼人琴之兩忘嗚呼哀哉其其字集作乃為銘曰高集逺跖濁涇集作河清渭天子諸侯司空太尉星辰鼓舞山澤通氣道在者尊德成為貴賈家五虎後漢黨錮傳賈彪兄弟三人並有髙名天下稱賈氏三虎五當作三偉節最怒荀氏八龍慈明無雙劍光沖集作侵斗璧氣浮江據於道德依集作聞於邦家子之承親溫席扇枕子之友悌同輿共寢朝歌不入盜泉不飲垂露崩雲繁絃縟錦明經太學射䇿鴻都揚名集作對揚天子高揖司徒鱗翮將運波濤不虞子之集作奈何喪也良可悲夫瞻望不及佇立以泣唯見黃埃心傷以摧躑躅兮徘徊嗚呼兮哀哉長夜漫漫何時旦魂兮魂兮歸去來楊集作從弟去溢墓志銘前人處士𢎞農楊去溢年二十即華山公之曾孫大將軍之孫朝散大夫鄧州司馬之第四子也維嶽有五有華山之金石焉山阜相屬含集作合溪懷谷所以鎮其南也維瀆有四有河宗之玉璧焉波瀾集作潮波汨起洄洑萬里所以經其北也言其土地則巨靈之高掌逺跖作西漢之城池敘其衣冠則太尉之四代五公為東京之柱國然後積勳纍德枝分葉散大君有命臨夏日之壇場天子動容聽秋風之懿範集作金鼓是以熊羆入兆羔鴈成羣黃憲之名聞於海內陳蕃之志掃於天下羣童忽聚逢苦李而懸集作先知賔客相過問楊梅而即對善父母為孝善兄弟為友居家可移之道也利者義之和貞者事之幹元亨日新之德也若夫節陵遺策汲冢殘書倚相之八索九丘張華之千門萬户莫不山藏海納學無所遺至如白雪回光清風度曲崔亭伯真龍之氣揚子雲吐鳯之才莫不玉振金聲筆有餘力逺心天授高興生知盡江海之良圖得煙霞之祕算貞不絶俗從容於名教之場道由人𢎞坐卧於羲皇之代于時朝廷之上山林之下英儒贍聞集作文之士洪筆麗藻之客希末光而影集聽餘聲而響和者猶藩籬之望天地鱗介之宗龜龍也嗟乎隂陽為道大道無亭毒集作育之心禍福唯人聖人有抑揚之教智焉而斃仁焉而終今也則亡歎顔回之短命死而可作冀隨會之同歸文不在茲乎天之將喪也以某年某月某日終於某所越儀鳯四年十月二日歸葬於華隂之某原林野彌望關山寥廓樵童牧豎孟嘗君之池臺一去千年丁令威之城郭悲纒於魯衛痛深於花萼薑肱沒齒無因共被之歡鍾育生平非復同車之樂嗚呼哀哉乃為銘曰叔虞建國天錫之唐伯僑受氏食采於集作于楊五侯簪黻四代軒裳有德有行如圭如璋乃生男子初集作載寢之牀從公小大辨日炎涼天下之寶邦家之光神鋒太俊旗鼓相當事親以禮左右無方交集作友朋以信芝蘭有芳文犀健筆白鳯雕章鵬鷃齊致江湖兩忘謂天輔德則惟其常殱我吉士于何不傷關山搖落洲渚蒼茫黃塵匝地白露成集作為霜左右刮骨親賔斷腸摧殘玉樹埋沒金鄉交交黃鳥爰集于桑命不可贖人之云亡從甥梁錡墓志銘前人故右衛率府翊衛安定梁錡年三集作二十有八以上元三年秋八月某日終于某所圖其闕天有大梁之星辨其物土地有大梁之國考其衣冠人有大梁之姓綜乾坤而列位兼水木集作土而成文業耕織而樂琴書有梁鴻之雅尚生封侯而死廟食有梁竦之雄圖西山求白鹿之仙東海受黃蛇之寶曾祖某光祿大夫開府儀同三司驃騎將軍清河太守右衛大將軍同州刺史上柱國郡守旁通於日集作月建儀同上法於太階光祿大夫下大夫之職驃騎將軍大將軍之比祖某河南澠池令鄭州司功參軍事冀州蒲州二府集作州字司馬朝散大夫紀王府司馬襄州同州二長史仲由宰邑蕭何主吏桓溫之徵謝奕暫為司馬之官周景之禮陳蕃仍降題輿之命考某國子學生霍王府參軍并州大都督府兵曹揚州大都督府録事參軍仲尼間居曰參不敏天子命我參卿軍事張常山之福應直保金鈎謝太傅之閨門唯生玉樹所以圓光折水真集作直氣衝天孩笑之時見之者知其孝友能言之際聽之者許其集作以聰明審清河管輅之天文對江夏黃童之日蝕揮其徑翮則鳯凰飛鳴集作鳴舞於赤山整其蘭筋則駿馬騰驤於緑集作陸地若夫神龍負卦瑞雀銜書安釐王汲冢之文穆天子羽陵之籍莫不因條報葉望表知裏鄭玄殫見覽萬卷之八千班固洽聞涉五經之四部至如雕弧夜月筋力集作角三才鐵劍秋霜煙雲五色莫不推之以智勇成之以集作於揖讓歷諸侯而説劍直之無前引司馬而操弓觀者如堵可謂多材天縱盛德日新闕於詩書翁歸兼集作自強於文武由是交通遂廣聲名益振朱家大俠滕公有然諾之言劇孟過人袁盎有逢迎之禮及其從微至著資父事君籍集作策丹書之勳業參黑衣之行伍神一作位宫海外瞻鏤榜於明山太室雲端聽集作奏仙簧於洛水翊鸞馳道周廬甲觀方當奉詞出使萬里行封受命忘身三軍拜將豈期年嵗朝露浮生過隙漢逸人之雅操命也如何魯司冦之知言苗而不秀嗚呼哀哉望吾子者空懷倚廬之歎嗟余弟者獨有忘琴之悲從日月於龜謀考圖書於馬鬛集作老圖書於鳥逝越以儀鳯三年春二月某日甲子葬於某所悲夫吾見其進由來孔李之家吾謂之甥實曰何劉之族陽元既殁瞻舊宅而無成康伯不存對玄言而誰與其銘曰山河帶礪金木精靈磊磊集作鬱鬱千丈森森五兵騑驂面掖出入東明人壽無幾皇天不平碑留郭泰挽送田橫終寂寥於相宅空嗟歎於佳城陳明經文粹作我府君有周居士文林郎陳公墓志文陳子昂公諱元敬字某其先陳國人也五世祖太樂梁大同中為新城郡司馬生髙祖方慶方慶好道得墨子五行祕書白虎七變法遂集粹無此字隱於郡武東山生曾祖湯湯為郡主簿湯生祖通通早卒生皇考辨為郡豪傑公河目海口顩集作燕文粹作欽後漢周欽頤注欽或作顩立凡切頥虎頭文粹作顔性英雄而志尚玄默羣書祕術集粹作學無所不覽年弱冠早為州閭所服耆老文粹作長童幼見之若大賓二十一鄉貢明經擢第拜文林郎屬憂艱不仕潛道育德穆其清風邦人馴致如衆鳥之從鳯也時有決訟不取州郡之命而信公之一言四方豪俊望風景附朝廷聞名或以君為西南大豪而不知深慈恭懿敬讓以為德二字文粹作得也州將縣長時或為集作陳議青龍癸未唐厯云微公乃山棲絶穀放息人事餌雲母以怡其神居十八年玄圖文粹作圓大集作天象無所不達嘗宴集有然字坐謂其嗣子子昻曰吾幽觀大運賢聖生有萌芽特發天下乃茂六字集粹作時發乃茂不可以智力圖也氣同萬里而遇合不同造膝而悖古之合者百無一焉呼嗚昔堯與舜禹合天下得之四百餘年湯與伊尹合天下歸之五百年文王與太公合天下順之四百年幽厲版蕩天紀亂也文粹無此字聖賢不相逢文粹有也字老𥅆仲尼淪溺溷世不能自昌固有國者享年不永彌四百餘年戰國如磨集粹作糜至于赤龍赤龍之興四百年天紀復亂劉石擾亂中原賢聖淪亡至於文粹有今字四百年矣天意其將復周乎於戲吾老矣汝其志之太歲已亥享年七十有四七月七日己未隱化於私宫集作館孤子子昂愚暗集粹作昧鞠然在疚不知所從乃祗馴聖人卜宅之義是嵗十月己酉遂開拭舊塋奉寧神於此山石佛文粹作山谷之中岡也銘曰賢者避地邈其如集粹無此字往鳯兮鳯兮誰能象兮嗚呼我君懷寶不識集粹作試孰知其深廣兮悠悠白雲自怡養兮大運不齊聖賢同同字集作岡字兮南山四君不遭漢天子固亦商丘之遺壤兮集有此十五字文粹英華並無髙氏子集作上殤髙氏墓志銘前人維唐垂拱二年太嵗景戌七月二十日殤子髙氏卒焉集無焉字嗚呼哀哉含瓊敷而不玉實者有矣夫吾觀皓元機化出入夭壽之數榮落之原皆一受而不易者已悲夫古人之仁懿中庸不幸短折集作命今復見之於髙子矣髙子渤海蓚人也黃州府君之幼孫宛州府君之叔子天集無此字塵而岐嶷實覃實晬集作華越在襁褓神明滋茂童蒙淵敏光潤玉顔八嵗始教方書受甲子已知孝悌之道詩禮之規宛丘府君鍾愛之他日嘗趨庭與諸兒戲神清涵泳綽然如鴻雛鵠子有青雲之意也府君美之曰能光我家者此兒十五通左氏春秋及尚書淵塞集作騫非之志日新宏大矣不幸享年十七遇暴集無此字疾而夭嗚呼哀哉宛丘府君感慟哀過於禮曰不恨爾壽之不長惜爾器之不彰天何苗育今也則亡嗚呼吾將老矣爾逺何哉其年七月殯於家園日月云徂六載于茲矣天授集作鳯非二年龍集辛卯府君方大崇元域以安先兆諸子之柩皆附焉其年二集作一非月癸卯朔十八日庚申啓殯歸瘞於大塋禮也銘曰來不可遏去不可止唯死與生由生與集作以死於戲殤子噫何往矣傷慈父之肝情獨冥冥而長已死而有知可也若其無知悲爾陳集作堂弟孜墓志銘前人君諱孜字無怠其先陳國人也五代祖太樂梁大同中為本郡大司馬生髙祖方慶屬梁亂始居新城郡武東山生大父湯為郡主簿大父生曾祖通集作逈非早卒通生皇祖辨少習儒學然以英豪剛烈著聞是以名節為州國所服皇祖生考元爽保食集作植先人茂德降生於君君幼孤天姿雄植英秀獨茂集作邁性嚴簡而尚倜儻之奇愛亷貞而不拘介獨之操始通詩禮略觀史傳即懷軌物之標希曠代之業故言不宿諾行不茍從率身克已服道崇德閨門睦睦字集作穆穆如也鄉黨恂集疊恂字如也至乃雄以濟義勇以存仁貞以立事毅以守節獨斷於心每若由已實為時輩所髙而莫敢與爭倫二字集作倫也以是鄉里長幼望風而靡邦國賢豪聞名而悅服方謂拂羽喬木緬升髙雲而遭命大過棟撓而殞嗚呼天咎豫乎時年三十五是嵗龍集癸巳有周天授三年集作二年按唐書天授三年四月改元長壽是歲壬辰長壽二年乃是癸巳秋七月卜地集作兆不吉權殯於真諦寺之北園始以今甲午歲獻春一月乙酉朔二十五日己酉窆於石溪山之北岡陪考域集作墳也君家世墳壠在武東山昭穆崇封松柏成列集作列盛至若集無此字君考遺令獨愛石溪之岡故君從先志祔葬于此嗚呼哀哉始君伯父海內之文人也含紀綱集作純綱之德有髙代之行每見君歎曰吾家世雖儒術傳嗣然豪傑英雄季世不泯集作豪英雄秀世濟不泯常懼後來光烈不象先風每一見爾慰吾家道實謂君有逸羣之骨拔俗之標超山越壑可以駿邁也豈其夭絶喪茲良圖嗚呼其元命歟遭命歟天不佑集作忱歟道固謬歟大圓蒼蒼大方茫茫聖賢同此之於爾三字集作爾之何傷古人有言珠玉瘞之集作瘞是闕於中原况吾家道尚儉名訓未墜封樹之禮吾敢過焉是用錫爾瓦木之器塗芻之靈堯舜之典忠孝之經昭示後代以安爾形銘曰我祖之葳蕤兮邈於陳緬遙裔兮此江濵集作濆五代崇光兮至夫君徽烈英曜兮始氛氲集作芬蒀何意嚴霜兮降青春玉樹吹落兮成黃塵南山無隟兮永幽淪悠悠昭代兮非集作卜爾辰吾慟感傷兮哭集作號蒼旻問之蓍策兮立茲墳乃言千嵗集作載兮冦集作冠非來臻黃頭之子白眼集作服人嗚呼集作嗟爾黃頭兮勿傷神文苑英華卷九百六十一
