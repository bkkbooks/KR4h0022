body:
  text: 文苑英華卷六十宋李昉等編諷諭惟皇誡德賦一首贊道賦一首靈臺賦一首動靜交相養賦一首惟皇誡德賦并序謝偃臣聞理忘亂安忘危逸忘勞得忘失此四者莫不皆然是以夏桀以瑶臺瓊室為麗而不悟鳴條南巢之禍殷辛以象箸玉杯為華而不知牧野白旗之敗一有故字當其盛也謂四海為已力及其衰焉乃匹夫之不制故一無此字當其信也謂天下為一心及其疑焉則顧盼皆為讎敵是知必有其德則誠結戎夷化行荒裔苟失其度則變生骨肉釁起腹心矣是以為人主者不可忘初處殿堂者一無此字則思前主之所以失朝萬國者一無此字則思今已之所以貴巡府庫則思今日之所以得視功臣則思其為己之始見名將則思其用力之初苟弗忘舊則人無易心則何患乎天下之亂此字一作不化故朝行之則為堯舜暮失之則為桀紂豈異人哉其詞曰周墳籍以遐觀總宇宙而一窺結繩往而莫紀書契來而可知惟皇王之迭代信步驟之恆規莫不慮失者常得懷安者必危是以戰戰栗栗日慎一日守約守儉去奢去逸外無荒禽內無荒色唯賢是授惟人斯恤則四皇不足五六帝不足七若夫恃聖驕力狠一作狼戾屈強忠良是棄諂佞斯奬構崇臺以造天穿深池以絶壤厚賦重斂積寶藏鏹無罪加刑有功不賞則夏桀可二殷辛易兩在危所恃居勿妄想一作居安勿忘功臣無逐故人無放放故者亡逐功者喪四海岌岌九土漫漫覆之甚易存之實難是以一人有悅萬國同歡一人失所兆庶俱殘喜則嚴寒為熱怒則盛夏成寒一動而八方一作表亂一言而天下安舉君過者為一作曰忠述主美者為佞苟承顔以順旨必蔽視而掩聽動雖非而謂神言縱失而稱聖故曲者亂直邪者醜一作疑正改或作披法服而不衷一作朝變雅或作邪音而入鄭雖往古之軌躅亦當今之龜鏡崔嵬鸞殿赫奕鳳門包四海而稱主冠天下而獨尊既兄日而姊月亦父乾而母坤視則金翠溢目聼則絲竹盈耳信賞罰之在躬實榮辱之由已謂羲皇而易匹言堯舜之可擬驕志自此而生侈心因兹而起常懼顛而懼覆必思足而思止勿戒一作忘潛龍之初當懷布衣之始在位稱寶居器曰神鼓鐘庭設玉帛階陳得必有兆失必一作亦有因一替一立或周或秦既承前代當思後人唯德可久道無常親一作惟德可以久天道無常親凡一作皆川本贊道賦誡儲二李百藥下臣側聽先聖之格言常覽載籍之遺則伊上天之玄造洎皇王之建國曰人紀與人綱資立言與立德履之則率姓成道違之則罔念作忒望興廢如從鈞配吉凶於繩墨至乃受圗膺籙握鏡君臨因萬物之思化以百姓而為心體太儀之潛運閲往古以來今盡為善於乙夜惜勞形於寸隂故能釋增氷於瀚海變寒谷於蹛林總人靈以胥悅極穹壤而懷音赫矣盛唐大哉靈慶時惟太始運鍾上聖天縱皇儲固本居正機悟宏逺神姿凝映顧三善而畢𢎞祗四德而為行每趨庭而聞禮常問寢而資敬奉聖訓以周旋諟天文之明命邁觀喬而望梓即元龜與明鏡自大道云亡禮教斯起以正君臣以篤父子君臣之禮父子之親眷情義以兼極諒𢎞之而在人豈夏啓與周誦亦丹朱與商均既雕且琢溫故知新惟其忠敬曰孝與仁則可以下光四海上燭三辰昔三王之教子兼四時以齒學將交發於中外故先之以禮樂樂以移風易俗禮以安上化人非有悅於鐘鼓將宣志以和神非有懷於玉帛將克已而庇身生深宫之中處羣后之上未深思於王業不自彌周禮用此字以集在五十四卷南郊賦內於凶妄謂富貴之自然恃崇髙以矜尚必恣疑作啓驕狠動疑作而愆禮儀狎姦諂而縱淫放則前星之耀遽隱少陽之道斯諒雖天下之為家蹈夷險之非一或以才而見升或遇讒而受黜足可以省厥休咎觀其得失請粗為賦陳之覬披文而相質在隆周之積德乃執契而膺期賴昌發之作二啓七百之鴻基逮扶蘇之副秦非有虧於問望以長嫡之隆重監偏師於亭障始禍則金以寒離厥妖則火不炎上既樹置之違道見宗祧之遄喪伊漢氏之長世固明兩之遞作髙惑戚而寵趙以天下而為謔惠結皓而因良致羽翼於寥廓景有慚於鄧子成縱理之淫虐終生患於強吳由發怒於爭博徹居儲兩時猶幼沖知防年之絶義淺亞夫之矜功故能恢𢎞祖業紹三代之遺風遽開博望其明未融哀時命之竒舛遇讒賊於江充雖借兵以誅亂竟背義而終凶宣嗣好儒大猷行闡嗟被尤於德教美發言於忠謇始聞道於韋匡終獲戾於恭顯太孫雜藝雖異定陶馳道不絶抑惟小善猶見重於通人尚傳芳於前典中興上嗣明章濟濟俱逹政術咸通經禮極至情於敬愛敦友于於兄弟是以固東洛之遺基同西周之繼體五官在魏無聞德音或受譏於妲己且自悅於從禽雖才高而學冨竟取纍於荒淫覽貽厥於明皇構崇基於三世得秦帝之浮一作奢侈亞漢武之才藝遂驅役於羣臣亦無救於雕弊哀疑惟寬愛相表多竒重桃符而致感納巨鹿之𢎞規竟能掃江表之氛穢舉要荒而見羈惠處東朝察其遺迹在聖德以如𥘉實御床之可惜悼愍懷之見廢遇烈風之吹沙盡性靈之神藝亦自敗於凶邪安能奉其粢盛保此邦家惟韓子之所賜重經術而為寶咨政理之美惡亦文身之黼藻欣有擇於愚夫慙乞言於遺老致庶績於咸寧先得人而為盛堯舜以前哲垂裕文武以多士興詠量其器能審其檢行必宜度幾而涖職不可違方以從政若其惑於聼受暗於知人則有道者咸屈無用者必伸諂諛競進以求媚玩好不召而自臻直言正諫以忠信而獲罪賣官鬻獄以貨賄而見親於是虧我王度斁我彛倫九鼎遇姦回而逺逝萬姓望撫我而歸仁蓋造化之至育唯人靈之為貴獄訟不理有生死之異塗寃結不伸乖隂陽之和氣士之通塞屬之以深文命之修短懸之於酷吏是故帝堯畫象陳恤隱之言夏禹泣辜盡哀矜之至因取象於大壯乃峻宇而雕牆將瑶臺與瓊室豈畫棟與虹梁或凌雲以遐觀或通天而納涼極醉飽而刑見左傳人力命痿蹙而受身殃是故信一作言惜十家之産漢帝以昭儉而垂裕雖成百里之囿周文以子來而克昌彼嘉會而通禮重旨酒之為德至醉歸而受祉在齊聖而溫克若其酗醟以致昏沉湎而成惑痛殷受與灌夫亦亡家而喪國是故伊尹以酣室而作戒周公以亂邦而貽則咨幽間之令淑實好逑於君子辭玉輦而割愛固班姬之所恥脫簮珥而思愆亦宣薑之為美乃有禍晉之驪姬亡周之褒姒盡妖邪於圖書極凶悖於人理傾城傾國思昭示於後王麗質冶容宜永監於前史復有搜狩之禮馳射之場不節之以正義必自致於禽荒匪外形之疲極亦中心而發狂夫髙深不懼胥靡之徒韝緤為娛小豎之事以宗祏之崇重持先王之名器與鷹犬而並驅陵艱險而逸轡猶靦面於獲多獨懷情以內愧以小人之愚鄙忝不資之恩榮擢無庸於草澤齒陋質於簮纓遇天道行而兩儀泰喜元良盛而萬國貞以監撫之多暇每論講於肅成仰惟神之敏速歎將聖之聰明自禮賢於秋實足歸道於春卿芳年淑景時和氣清華殿邃兮簾帷靜灌木森兮風雲輕花飄香兮動笑鳥嬌囀兮相鳴以物華之繁靡尚絶思於將迎猶蹈道之不倦極耽玩以研精命庸才以載筆謝摛藻於天庭異洞簫之娛侍殊飛蓋之緣情闕雅言以誦德思報恩以輕生敢下拜而稽首願永樹於風聲奉皇齡之遐夀冠振古之鴻名靈臺賦韋承慶嵗已殫夜向闌風威徑霜氣寒月斜臨於棟首河半落於簷端心耿耿而不寐魂煢煢而未安乃振衣危坐隱几太息繹思於今古之津佇懷於天地之域粵若天分地開古往今來物之播焉成萬品人之生也配三才伊生人之為貴咸賦職於靈臺彼靈臺者舍梓一作含粹而起惟神所止想四大之樞機執五成之端揆統精靈之往復括一作恬性命之終始坎慿惠而宣聼離假明而暢視六儀竦而承尊百骸運而為使若衆星之拱璿極猶列國之宗玉扆夫其鼓動陶甄範圍涵育質微用廣如土圭之凖盈縮精靈器要譬灰琯之調涼燠撫二儀之斡運必用此而休復閲庶類之區分亦俟兹而大畜奧室資明於洞户飛軒寄轉於輕軸靈筠挺防露之篁孤穎秀梢雲之木其髙也巍乎峻峙傑爾孤標上干日月逈冠雲霄其深也如海之渟如淵之邃窅萬仞兮沉以清潛九重兮隱而閟其平也周道如砥君子之夷局其險也蜀門若劍小人之跂躅彌性場而極覽漙情囿而環矚鮮開曠而間凝多鬱堙而窘促萌一緒而千變兆片機而萬觸無半刻而恬想乃終年而汨欲大木百圍而窽竅長河九支而屈曲怒則烈火扇於衝颷喜則春露融於朝旭懼驚懷其若墜憂結念其如束或漫漫而川浮或迢迢而山屬繁襟霧合而煙聚單思針懸而縷續其騖時也似飛蛾陵亂而投明燭其趨利也若飢烏聨翩而爭場粟力方躓而獨騁量已傾而未足吹劍首而聒虞韶握碔砆而衒荆玉纖埃不讓於山阜巨海見排於井谷沉浮兮靡定去就兮多途乍排下而進上忽出有而入無轉息而延緣萬古回瞬而周流八區形寥寥於衽席慮渺渺於燕吳乃榮乃華如馳如驅甚飛猱之驕作蹻喬木邁奔兕之逸修衢雖杼軸而無已吾未知其所圖爾其清濁兩資臧否兼司有縵者而密者幾附之而益之勇怯於焉競爽明晦所以相欺或外靜而中躁或情愠而顔怡或趣暌而迹偶或言信而誠疑眉睫兩連一作視而相對山河萬重而在兹莫覩其深沉之實抱徒見其俯僂之虛姿類隂陽之不測匹神鬼之難期不可審之以權量不可卜之以蓍龜爭度長而自我各守勝而為師設皇綱而懸帝制張地絡而舉天維雖衆條之所檢轄在斯輛而不能持徵善惡於遙祀訪賢愚於羣册軒昊用之而司契堯舜守之而光宅湯武任之以為王桓文仗之而作伯𢎞聖道者謂之周孔肆凶德者攝為桀跖體仁成曾史之行育智舉良平之策六國起爭交之端三方構鼎峙之迹政焚書而騁暴巨誦典而崇僻嚭讒胥而獲誅靳譛原而受斥軻發匣而揮匕如睨楹而抗璧蕭朱始諧而末釁餘耳初好而終隟寵包詐而昵躬牢藴邪而附石究回穴於今古鬱繽紛於載籍匪外物之所嬰諒乃心之攸敵若乃無損無益不盈不沖湛虛明其若鏡坦宏量其如空靜凝神而合道動應物而修功得至無於象外乘妙有於寰中既吻合而懸解且兼忘而大同象罔之珠易索槖籥之用無窮入窅冥而超宇宙翔寥廓而矯樊籠斯上聖之神理邈先幾而感通諒凡情之靡得徒仰止於余𠂻至於宅義依仁棲貞履順崇禮讓之扃闥聳溫恭之墻仞赴䚣作鯁壑而全忠處龍鄉而執信情居損而能酌時處遁而無慍一作道在恆而不振逰書圃而托芳挹文河而澡潤循雅度而成則服嘉言而遣吝乃懿士之清規實吾人之所徇持弱操而知勉飭微躬而底慎思不忮而不求絶相靡而相刃慨投筆而長想聊綴音於末韻動靜交相養賦并序白居易居易常見今之立身從事者有失於動有失於靜斯由動靜俱不得其時與理也因述其所以然用自警遵命曰動靜交相養賦云天地有常道萬物有常性道不可以終靜濟之以動性不可以終動濟之以靜養之則兩全而交利不養之則兩傷而交病故聖人取諸震以發身受以一作諸復而知命所以莊生一作子曰智養恬易曰蒙養正者也吾觀天文其中有程日明則月晦日晦則月明明晦交養晝夜乃成吾觀嵗功其中有信陽進則隂退陽退則隂進進退交養寒暑乃順且躁者本於靜也斯則躁為民靜為君以民養君教化之根則動養靜之道斯存且有者生於無也斯則無為母有為子以母養子生成之理則靜養動之義明矣所以動之為用在氣為春在鳥為飛在舟為楫在弩為機不有動也靜將疇依所以靜之為用在蟲為蟄在水為止在門為鍵在輪為柅不有靜也動奚資始則知動兮靜所伏靜兮動所倚吾何以知交養之然哉以此有以見人之生於世出處相濟必有時而行非匏瓜不可以長繫人之善其身枉直相循必有時而屈故尺蠖不可以長伸嗟夫今之人知動之可以成功不知非其時動必一作亦為凶知靜之可以立德不知非其理靜亦為賊大矣哉動靜之際聖人其難之先之則過時後之則不及時交養之間不容毫釐故老氏觀妙顔氏知幾噫非二君子吾誰與歸文苑英華卷六十
