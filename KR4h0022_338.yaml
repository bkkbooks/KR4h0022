  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0022_WYG_338-1a, image: WYG1336/WYG1336-0193c.png}
body:
  text: 文苑英華卷三百三十八宋李昉等編書李潮八分小篆歌一首懷素上人草書歌八首僧警先草書歌一首張伯英草書歌一首陳氏童子草書歌一首蕭鄲草書歌一首李潮八分小篆歌杜甫蒼頡鳥迹既茫昧字體變化如浮雲陳倉石鼓又集作文已訛大小二篆生八分秦有李斯漢蔡雍中間作者寂不聞嶧山之碑野火焚棗木傳刻肥失真苦縣光和尚骨立書集作盡貴瘦硬方通神惜哉李蔡不復得吾甥李潮下筆親尚書韓擇木騎曹蔡有鄰開元以來數八分潮也奄有二子成三人况潮小篆逼秦相快劒長戟森相向八分一字直百一作千金蛟龍蟠拏肉屈強吳郡張顛誇草書草書非古空雄壯豈知集作如吾甥不流宕丞相中郎丈人行巴作江東逄李潮逾作踰月求我歌我今衰老才力薄潮乎潮乎奈汝何懷素上人草書歌王􅮯衡陽雙峽插天峻青壁巉巉萬餘仞此中靈秀衆所知草書獨有懷素竒懷素身長五尺四嚼湯誦呪吁可畏銅瓶錫杖倚間庭斑管秋毫多逸意或粉壁或綵箋蒲葵絹素何相鮮忽作風馳如電掣更點飛花兼散雪寒猿飲水撼枯藤壯士拔山伸徑鐡君不見張芝昔日稱獨賢君不見近日張旭為老顛二公絶藝人所惜懷素傳之得真迹峥嶸蹙出海上山突兀狀成湖畔石一縱又一橫一欹又一傾臨江不羡飛帆勢下筆長為驟雨聲我牧此州喜相識又見草書多惠力懷素懷素不可得開卷臨池轉相憶又戴叔倫楚僧懷素工草書古法盡能新有餘神清骨竦意真率醉來為我揮健筆始從破體變風姿一一花開春景遲忽為壯麗就枯澀龍蛇騰盤獸屹立馳毫驟墨劇奔洶滿座失聲看不及心手相師勢轉竒詭形怪狀翻合宜人人細問此中妙懷素自言初不知又幾年出家通宿命一朝却憶臨池聖轉腕推峰增崛﨑秋毫繭紙常相隨衡陽客舍來相訪連飲百杯神轉王忽聞風裏度飛泉紙落紛紛如跕鳶形容脫略真如助一作脫落任真助心思周遊在何處筆下唯看激電流字成只畏盤龍去怪狀崩騰若轉蓬飛絲歷亂如回風長松老死倚雲壁蹙浪相翻驚海鴻于今年少尚如此歷觀逺代無倫比妙絶當動鬼神泣崔蔡幽魂更心死又魯收吾觀文士多利用筆精墨妙誠堪重身上藝能無不通就中草聖最天縱有時興酣發神機抽毫點墨一作吃墨縱橫揮風聲吼烈隨手起龍蛇迸落空壁飛連拂一作佛數行勢不絶藤懸查蹙生竒節劃然放縱驚雲濤或時頓挫縈毫髮自言轉腕無所拘大笑羲之用陳圖狂來紙盡勢不盡投筆抗聲連呌呼信知鬼神助此道墨池未盡書巳好行路談君口不容滿堂觀者空絶倒所恨時人多笑聲唯知賤寶翻貴名疑觀爾向來三五字顛竒何謝張先生同前竇冀狂僧揮翰狂且逸獨任天機摧格律龍虎慙因點畫生雷霆却避鋒鋩疾魚箋絹素豈不貴只嫌局促兒童戲粉壁長廊數十間興來小豁胸作心襟氣長幼集賢豪至枕糟藉麴猶半醉忽然絶呌三五聲滿壁縱橫千萬字吳興張老爾莫顛葉縣公孫我何謂如熊如羆不足比如虺如蛇不足擬㴠物為動鬼神泣狂風入林花亂起殊形怪狀不易説就中驚燥尤枯絶邉風殺氣同慘烈崩槎卧木爭摧折塞草遙飛大漠霜胡天亂下隂山雪偏有一作看字能事轉新竒郡守王公同賦詩枯藤徑鐡愧三舍驟雨寒猿驚一時此生絶藝人莫測假此常為護持力連城之璧不可量五百年知草聖當同前兼送謁徐廣州蘇渙張顛沒在二十年謂言草聖無人傳零陵沙門繼其後新書大字大如斗興來走筆如旋風醉後耳熱心更凶忽如裴旻舞雙劒七星錯落纒蛟龍又如吳生畫鬼神魑魅魍魎驚本身鈎鎖相連勢不絶倔強毒蛇爭屈鐡西河舞劒氣凌雲孤蓬自振唯有君今日華堂看灑落四座喧呼歎佳作回首邀余賦一章欲令羡價齊鍾張琅誦句三百字何似醉僧顛復狂忽然告我遊南溟言祈亞相求大名亞相書翰凌獻之見君絶藝必深知南中紙價當日貴只恐貪泉成墨池同前任華吾嘗好竒古來草聖無不知豈不知右軍與獻之雖有壯麗之骨恨無狂逸之姿中間張長史獨放蕩而不羈以顛為名傾蕩於當時張老顛一作老顛老顛殊不顛於懷素懷素顛乃是顛人謂爾從江南來我謂爾從天上來負顛狂之墨妙有墨狂之逸才狂僧前日動京華朝騎王公大人馬暮宿王公大人家誰不造素屏誰不塗粉壁粉壁搖晴光素屏凝曉霜待君揮灑兮不可彌忘駿馬迎來坐堂中金盆盛酒竹葉香十杯五杯不解起一作意百杯已後始顛狂一顛一狂多意氣大呌數聲起攘臂揮毫倐忽千萬字有時一字兩字長丈二翕若長鯨撥刺動海島歘若長蛇戍律透深草回環繚繞相拘連千變萬化在眼前飄風驟雨相擊射速祿颯拉動簷隙擲華山巨石以為點掣衡山陳雲以為畫興不盡勢轉雄恐天低而地窄更有何處最可憐一作連裊裊枯藤萬枝一作丈懸萬枝一作丈懸拂秋水映秋天或如絲或如髮風吹欲絶又不絶鋒芒利如歐冶劒徑直渾是并州鐡時復枯燥何褵褷忽覺隂山突兀橫翠微中有枯松錯落一萬丈倒挂絶壁蹙枯枝千魑魅兮萬魍魎欲出不可何閃尸又如瀚海日暮愁隂濃忽然躍出千黑龍夭矯偃蹇入乎蒼穹飛沙走石滿穹塞萬里颼颼西北風狂僧有絶藝非數仞髙墻不足以逞其筆勢或逄花箋與絹素凝神執筆守恆度别多筋骨多情趣霏霏微微點長露三秋月照丹鳯樓二月花開上林樹終恐絆騏驥之足不得展千里之步狂僧狂僧爾雖有絶藝猶當假良媒不因禮部張公將爾來如何二字一作平安得聲名一旦喧九垓同前釋貫休張顛顛後顛非顛直至懷素之顛始是顛師不談經不坐一作説禪筋骨一作力唯於草書妙作朽顛狂恐却是神仙有神助兮神莫及鐡石畫兮墨須入金樽竹葉數斗餘半飲半傾山衲濕醉來把筆猛如虎粉壁素屏不問主亂拏亂抹無規矩羅剎石上坐子胥蒯通八字一作分手立對漢髙祖勢崩騰兮不可止天機暗轉鋒芒裏閃電光邉霹靂飛古柏身中旱龍死骸人心兮目眓􅀈上呼鬱切下香激切頓人足兮神闢易乍如沙場大戰後斷槍橛箭何狼籍又如深山怪石上古病松枝挂鐡錫月兔筆天竈墨斜鑿黃金側一作色銼玉珊瑚枝長大如束天馬嬌獰不可勒東却西南又北倒還起斷復續忽如鄂公捉一作唱住單雄信秦王肩上搶著棗木槊懷素師若不是星辰降瑞必是河嶽孕靈固宜須冷笑逸少爭不得醉罵伯英天台古杉一千尺崖崩岸折何峥嶸或微細仙衣縫綻金線垂或妍媚桃花半紅公子醉我恐山為墨海為水天為筆兮書大地乃能略展狂僧意長恨師不相識一見此書空嘆息伊昔張謂任華葉季良數子贈歌豈虗飾所不足者渾未曽道著其神力石橋被燒却一作燒良玉不土蝕錐畫沙兮印印泥世人世人莫得知老師雄名在世間明月清風一一作有何極辨光大師草書歌前人雪壓千峰橫枕上窮困雖多還激壯看師逸迹兩相宜髙適歌行李白詩海上驚驅山猛燒一作海上風驚驅猛燒吹斷狂煙著沙草江樓曽見落星石幾回試發將軍炮别有寒雕掠絶壁提上元猿更生力又見吳牛磨角來舞槊盤刀初觸擊好文天子揮宸翰御製本多推玉案晨開水殿教題壁題罷紫衣親寵錫僧家愛詩自拘束僧家愛畫亦局促唯師草聖藝偏髙一掬山泉心便足張伯髙草書歌釋皎然伯英死後生伯髙朝看手把山中毫先賢草律我草狂風雲陳發愁鍾王須臾變態皆自我寫形類物無不可閬風遊雲千萬朵驚龍蹴踏飛欲墮更覩鄧林落葉一作花落朝狂風亂擾何飄飄有時凝然筆空握情在寥天獨飛鶴有時取勢氣更髙憶得春江千里濤張生竒一作草絶再難遇王小令書草古今稱草絶草罷臨風展輕素隂慘陽舒如有道鬼狀魑容若可懼黃公酒壚興偏入阮籍不嗔嵇亦顧長安酒榜醉待書此日聘君千里步陳氏童子草書歌前人儒一作書家孺子有竒名天然文一作大章令人驚僧虔老時把筆法孺子如今皆暗合飊飛電灑眼不及但覺毫端鳴颯颯有時作點險且能太行片石看欲崩偶然長掣濃又燥少室孤松欹不倒夏室炎炎少人歡山軒日色在闌干桐花飛盡子規思主人髙歌興不至濁醪不飲嫌昏沉欲玩草書開我襟龍爪狀竒鼠鬚鋭氷箋白晳越人惠王家小令草最狂為豫揮灑一作灑出驚騰勢蕭鄲草書歌顧况蕭子草書人不及洞庭葉落秋風急上林花開春露濕花枝濛濛向水垂疑見君數行之灑落石上之松松下鶴若把君書比仲將不知誰在一作上凌雲閣文苑英華卷三百三十八
