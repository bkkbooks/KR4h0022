body:
  text: 文苑英華巻八百二十五宋李昉等編宴遊三亭中李晉陵茅亭記一首新修漕河石斗門亭記一首蘭溪縣靈隠寺東峰新亭記一首歙州披雲亭記一首許氏吴興溪亭記一首冷泉亭記一首白蘋洲五亭記一首四望亭記一首桂州訾家亭記一首永州萬石亭記一首李晉陵茅亭記梁肅趙郡李兖集作政仲山大厯中由秘書郎為晉陵令思所以退食修故集作政思所以端已崇儉乃作茅亭於正寢之北偏功甚易制甚朴大足以布集作施函丈之席稅履集作屨而躋賔位者適容數人則仲山約身臨人顓固集作因非簡一之道可知矣解龜後繼其任凡六七人毎居於斯必稱作者之美而仲山安貧養性集作志寓于舊邑者十有二年方牧知之又檄而攝焉仲山清徳之嗣孝於家勤于官其攝也念前之非乆政之未成也乃必躬必親必誠必信順集作慎思不懈而衆務咸叙未有及者必訪問咨度擇善而從之則其治足可集無可字徴也君子謂仲山居處恭執事敬出入一紀再臨斯人有以見位不茍進仕不茍行大来必俟時集作必復將於是乎始矣予曩睹亭之起今又觀進徳之美輒直筆志之謂之晉陵茅亭記時貞元元年夏五月記新修漕河石斗門亭記穆員斗門卒事之月安平公罷尹杜公實来明日公㑹杜公觀厥成績即得洗心逺目之所盡一覽四時之美乃授中制剏為此亭有若嵩高二室萬安闕塞實簷前之山清洛麗都類夫河漢實砌下之池春流夏雲露風霜月殊狀異態同歸於勝實座中之器一作品修橋曵虹左右扶翼層樓飛鳳前後擁抱實四楹之飾而顥氣清風徘徊旦暮若有所為去聲凝為清隂不唯待羊公之登眺李膺之臨汎使忘機倦俗之客得人人而私之或曰二公之来也境與耳目共清其心心無事源政得於静有以助清静之理可無述乎刋諸珉一作樂石之隂是為亭記蘭溪縣靈隠寺東峰新亭記馮宿東陽實㑹稽西部之郡蘭溪實東陽西鄙之邑嵗在戊寅天官署洪君少卿以為之宰君之始至則用信待物用勤集事信故人洽一作阜勤故人阜一作公濟未朞月而其政成後三年夏六月余過其邑洪君道余以邑之勝賞於是有東峰亭之逰背城之闉半里而近初届佛刹刹之上方而亭在焉松門盖空石道如帶足倦累息然後造夫極焉向之池隍舘宇之多旗亭闤闠之喧途道往来之衆簿書鞅掌之繁顧步之際一作餘忽焉如失但山風䬟䬟一作飀飀嶺雲峩峩飛軒憑虚洞壑在下南北或作向背殊狀昏明易或作異色指遥青而㸃黛者問之則曰某山某巗某林某墅指逺白而曳練者問之則曰某田一作洲某渚某湫某塘髙深互呈心目相競飄若象外意其幻成余既諧其私爰究其本先是邑㣲登攀逰觀之所洪君曽是挈俸錢二萬經斯營斯因地於山因材於林因工於子来因時於農隙一一作又何易也崇山濬谷佳景勝槩綿世伏匿一朝發明一作朗又何能也君在建中興元之間為江南西道節度曹王所知時方軍興職壓冦境供億倉卒賦平人和王實頼之故御史大夫鄭滑節度盧公羣與君嘗同僚毎號之曰精金百錬良驥千里誠矣然則是邑之理兹亭之勝於君之分不為難能夫播芳塵而鼔餘波者非文莫可遂攬筆為記刋于石而附諸地志焉貞元十七年嵗次辛已十一月已未朔七日乙丑建歙州披雲亭記張友正處髙明所以蕩隂滯臨顯敞所以窮逺睇故有岳峙九層雲峩百里極𤣥功以壯址殫山林於崇構者人力也今則排層空架重峰髙出星漢之上坐馳寰區之表者天造也州之陽漸乎水木之隂攢乎山山有佛寺而㢠廻廊翼旋飛閣雲騫萬家井邑在我宇下實一方之勝槩也柱史魏公將命駕逰焉公徘徊賞味情有餘致毎美其峰聳絶靈氣紛郁乃竦勁䇿躍輕屐縋蔓梯崕逕造夫巔焉高哉曠乎果天下之絶境也乃命剷巉嵒夷翳薈心匠宻構亭形虚無而賔從莫之窺也然後跨峻谷掖修木疊石為趺無尋常之地其崇卑廣袤與斵樸杇塗之節稱焉峩峩絶頂一上集作不一千仞未幾營之屹而冠焉一作兮屬東風敷和春物爛山公乃敞層軒披晴空憑九霄以髙視周八極而遐觀塊如衆山盃分百川籠吴楚之封境領江湖之氣象有足廓虚懐而攄曠抱矣眺覽未既盡一無此字壺觴云舉瞽史陳藝笙簧合奏仁風洋洋下俚同觀一作歡而吴哇裊空楚舞嬌春隨天籟以逺去映花林而半出仰之者有若子喬方平弄玊飛瓊相與樂羣仙於上清自公之暇理于兹撫傷夷懐流離流離旋矣傷夷痊矣而猶阜俗康民之志慊如也今市囂在耳村煙在目可以㢘風俗之趨尚省農桑之豐耗况又暢四肢攄七情神完氣全宣為太和自當渟源普洽上下交澤况有襦袴謡乎公問俗之来四序分矣蓮府將復星軒莫留人之情也步武所及有一物契於素懐者雖細必錄况目經心攝一作構獲千古之遺勝者愛而不書得無寤寐思之乎然歙人被公之仁化也深思異日攀公之轅不及瞻此亭也友正家在此山之下獲逰此亭之上思刋懋績輙課庸詞若莛加鐘而蠡挹海蓬勃之音溟茫之波可得而希也又兹峰之髙棲天宇上簉雲族朝薈蔚而暮一有氣字氤氲亭無處所晴景一照夐焉標空今建名披雲義在此也其潤色寺宇輝華郡郭増東南之巨麗者無終極乎貞元壬午夏四月大火南次之七日記許氏呉興溪亭記權徳輿溪亭者何在呉興東部主人許氏所由作也亭製約而雅溪流安以清是二者相為用而主人盡有之其智可知也夸目奓心者或大其閈閎文其節梲儉士耻之絶世離俗者或梯構巗巘紉結蘿薜世教鄙之曷若此亭與人寰不相逺而勝境自至青蒼在目而潺湲激砌晴煙䕃嵐明晦萬狀鷗飛魚逰不驚不喁時時歸雲来冒茅洞許氏方岸鶡冠支笻竹目送溪鳥口吟招隠則神機自生集作王利欲自薄百骸六藏之内累無自而入焉有田二頃傅于亭下鎡基之功出於僮指每露蟬一聲秋稼成實倚杖眺逺不覺日暮嵗食之羡則以給樽中方其引滿陶然心與境冥集作寂則是非得䘮相與奔北之不暇又何可滑於胸中􅐵夫舉世徇物以失性而不能自適一有其適二字且繆戾於動静之理君之動也代耕筮仕必於山水之鄉故尉義興贊武康皆有嘉聞而無粃政其静也則偃曝於斯亭循分食力不矯不躁庸詎知今日善閉不為異時之大来耶予知之深故因斯亭以廣其詞云冷泉亭記白居易東南山水餘杭郡為最就郡言靈隠寺為尤由寺觀冷泉亭為甲亭在山下水中央寺西南隅高不倍尋廣不累丈而撮竒得要地搜勝槩物無遁形春之日吾愛其草薰薰木欣欣可以導和納粹暢人血氣夏之夜吾愛其泉渟渟風泠泠可以蠲煩析醒起人心情山樹為盖巖石為屏雲從洞生水與堦平坐而翫之石本無之字者可濯足於牀下卧而狎之石本無之字者可垂釣于枕上矧又潺湲潔澈粹冷柔滑若俗士若道人眼耳之塵心舌之垢不待盥滌石本作潄滌見輙石本作而即除去潛利隂益可勝言哉斯所以最餘杭而甲靈隱也杭自郡城抵西封叢山複湖易為形勝先是領郡者有相里尹造作集無此字非虚白亭有韓僕射臯作候仙亭有裴庶子棠石本作常棣作觀風亭有盧給事元輔作見山亭及右司郎中河南元藇最後作此亭於是五亭相望如指之列可謂佳境殫矣能事畢矣後来者雖有敏心巧目無所加焉故吾繼之述而不作時長慶三年八月十三日記白蘋洲五亭記湖州城東南二百步抵霅溪溪連汀洲洲一名白蘋梁呉興守栁惲於此賦詩云汀洲採白蘋因以為名也前不知幾千年後又數百載有名無亭鞠為荒澤至大厯十一年顔魯公真卿為刺史始剪榛導流作八角亭以逰息焉旋屬炎潦荐至沼堙臺圮後又十數載委為隙地至開成三年𢎞農楊君為刺史乃䟽四渠濬二池樹三園構五亭卉木荷竹舟橋廊室洎逰宴息宿之具靡不備焉觀其駕大溪跨長汀者謂之白蘋亭介二園閲百卉者謂之集芳亭面廣池目列岫者謂之山光亭翫晨曦者謂之朝霞亭狎清漣者謂之碧波亭五亭間䦕萬象迭入嚮背俯仰勝無遁形毎至汀風春溪月秋花繁鳥啼之旦蓮䦕水香之夕賔友集歌吹作舟棹徐動觴詠半酣飄然怳然逰者相顧咸曰此不知方外也人間也又不知蓬瀛崑閬復何如哉時予守官在洛陽楊君緘書賫圖請予為記予按圖握筆心存目想覼縷梗槩十不得其二三大凡地有勝境得人而後發人有心匠得物而後開境心相遇固有時耶盖是境也實栁守濫觴之顔公推輪之楊君繢素之三賢始終能事畢矣楊君前牧舒舒人治今牧湖湖人康康之由革弊興利若改茶法變税書之類是也利興故府有羡財政成故居多暇日繇是以餘力濟髙情成勝槩三者旋相為用豈偶然哉昔謝栁為郡樂山水多髙情不聞善政龔黄為郡憂黎庶有善政不聞勝槩兼而有者其吾友楊君乎君名漢公字用乂恐年祀寖乆集作乆逺来者不知故名而字之時開成四年十月十五日記四望亭記李紳濠城之西北隅爽聳四達縱目周視廻環者可數百里而逺盡彼目力四封不閲嘗為廢墉無所竚望郡守彭城劉君字嗣之理郡之二載歩履所及悦而創亭焉豊約廣袤稱其所便棟幹梯陛依墉以成崇不危麗不侈可以列賔筵可以施管磬雲山左右長淮縈帶下繞清濠傍闞城邑四封五通皆可洞然太和七年春二月紳分命東洛路出於濠始登斯亭周目四矚美乎哉春䑓視和氣夏日居高明秋以閲農功冬以觀肅成一作殺盖君子布和求瘼之誠志豈徒縱目於白雪望雲於黄鶴庾樓夕月峴首春風盖一時之勝爽無四者之臨眺斯亭之佳景固難儔儷哉淮栁初變濠泉始清山凝逺嵐霞散餘綺顧余嘗為玉堂詞臣筆硯猶在請書亭表事刻石記言癸丑嵗建卯月七日趙郡李紳書桂州訾家洲亭記栁宗元大凡以觀游名於代者不過視於一方其或傍達左右則為特異至若不騖逺不陵危環山洄江四出如一夸竒競秀咸不相譲徧行天下者惟是得之桂州多靈山發地峭堅集作竪林立四野署之左曰灕水水之中曰訾氏之洲凡嶠南之山川達于海上於是畢出而古今莫能知元和十二年御史中丞裴公来莅兹邦都督二十七州諸軍州事盗遁奸革徳恵敷施朞年政成而富且庶當天子平淮夷定河朔告于諸侯公既施慶于下乃合僚吏登兹以嬉觀望攸長悼前之遺於是厚貨居甿移於集作于閒壤伐惡木刜奥草前指後畫心舒目行忽焉若飄浮上騰以臨雲氣萬山靣内重江束隘聨嵐含輝旋視其宜常所未覩倐然互見以為飛舞奔走與逰者偕来乃經工化材考極相方南為燕亭延宇垂阿步簷更衣周若一舎北有崇軒以臨千里左浮飛閣右列間舘比舟為梁與波升降苞灕山涵集作含龍宫昔之所大蓄在庭集作亭内日出扶桑雲飛蒼梧海霞島霧来助游物其隙則抗月檻於㢠廻谿出風榭於篁中晝極其美又益以夜列星下布顥氣㢠廻合䆳然萬變若與安期羡門接於物外則凡名觀逰於天下者有不屈伏退譲以推高是亭者乎既成以燕歡極而賀咸曰昔之遺勝槩者必於深山窮谷人罕能至而好事者後得以為己功未有直治城挾闤闠車輿步騎朝過夕視迄千百年莫或異顧一旦得之遂出於他邦雖博物辨口莫能舉其上者然則人之心目其果有遼絶特殊而不可至者耶盖非桂山之靈不足以瓌集作環觀非是洲之曠不足以極視非公之鑒不能以獨得噫造物者之設是乆矣而盡之於今余其可以無藉乎永州萬石亭記御史中丞清河男崔公来莅永州間日登城北墉臨于荒野叢翳之隙見恠石特出度其下必有殊勝步自西門以求其墟伐竹披奥欹側以入綿谷跨溪皆大石林立渙若奔雲錯若置碁怒者虎鬭企者烏厲披其穴則鼻口相呀搜其根則蹄股交峙環行石本作顧卒愕文粹作愕目疑若搏噬於是刳闢朽壤剪焚榛薉決澮溝導伏流散為踈林洄為清池寥濶泓渟若造物者始判清濁效竒於兹地非人力也乃立㳺亭以宅厥中直亭之西石若掖分可以眺望其下集本石本作上青壁斗絶沉于淵源莫究其極自下而望則合乎攢巒與山無窮明日州邑耄老雜然而至曰吾儕生是州藝是野眉厖齒兒未嘗知此豈天墜地出設兹神物以彰我公之徳歟既賀而請名公曰是石之數不可知也以其多而命之曰萬石亭耄老又言文粹有之字曰懿夫公之名亭豈専狀物而已哉公嘗六為二千石既贏集作盈其數然而有道之士咸恨崔公之嘉績未洽于人敢頌休聲祝公于明神漢之三公秩號萬石我公之徳宜受兹錫漢有禮文粹作純臣惟萬石君我公之化始于閨門道合于古祐之自天野夫獻辭公夀萬年宗元嘗以牋奏𨽻尚書敢専筆削以附零陵故事時元和十年正月五日記文苑英華巻八百二十五
