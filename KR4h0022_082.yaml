body:
  text: 文苑英華卷八十二宋李昉等編雜伎二裴將軍劔舞賦一首繩伎賦一首樓下觀繩伎賦一首透橦童兒賦一首都盧尋橦賦一首競渡賦一首木人賦一首吞刀吐火賦一首裴將軍劔舞賦并序喬潭後元年秋九月羽林裴公獻戎捷于京師上御花蕚樓大置酒酒酣詔將軍舞劔為天下壯觀遂賦之其詞曰將軍以幽燕徑卒耀武窮髮俘海夷鹵山羯左執律右秉鉞振旅闐闐獻功魏闕上享之則鐘以悍一作捍簴鼓以靈鼉千伎一作妓度武萬人髙歌秦雲動色渭水躍波有肉如山有酒如河君臣樂飲而一醉夷夏薰薰而載和帝謂將軍拔劔起舞以張皇師旅以烜一作桓赫戎虜節八音一有而字行八風奮兩階之干羽公於是乎貝胄朱綅而作一作正色虎裘錦裼而攘臂抗稜威飄鋭氣陸離乎武備婆娑乎文事合桑林之容以盡其意照蓮花之彩以宣其利翕然鷹揚翼爾龍驤鋒隨指顧鍔應回翔取諸身而聳擢一作躍上其手以激昂縱橫耀頴左右文光二字一作交相觀乎此劔之躍也乍雄飛俄虎詬搖鹿盧射牛斗空中悍慓不下將久歘風落而雨來纍一作果愜心而應手爾其陵厲清浮一作淳絢練􅞅絶青天兮何倚白雲兮可决覩二龍之追飛見七星之明滅雜朱干之逸勢應金奏之繁節至乃天輪宛轉貫索回環光冲融乎其外氣混合乎其間若湧雪一作雲濤如飛雲一作雪山萬夫為之雨汗八佾為之慙顔及乎度曲將終發機由一作尤捷或連翩而七縱或瞬息而三接風生兮蒨斾襜襜電走兮彤庭曄曄隂明一作冥變見靈怪離躐將鬼神一有之字無所遁逃豈蠻夷之一有不字足震懾嗟夫蘭子之迭躍其技未雄仲由之自衛其舞未工一作其武未功豈一作曷若將軍為百夫之特寶劔有千金之飾奮紫髯之白刃發帝庭之光色所以象大君之功亦以宣忠臣之力或歌曰洸洸武臣耀雄劔兮清邊塵威戎夷兮率土來賔一作威逺夷兮率來賔焉用輕裙之妓女長袖之才人天子穆然詔伶官斥鄭衛選色者使覘乎軍容教舞者俾觀乎兵勢激楚結風發揚蹈厲一作變激楚之結風為發揚之蹈厲僉謂將軍之劔舞古未之制一作至凡一作皆文粹繩伎賦胡嘉隱律南吕兮仲之秋帝張樂兮秦之樓鼓舞令節鏗鏘神州萬國㑹百工休俾樂司咸戢繩伎獨留此聖人之新意也與衆共之降賞成列服也德之稱容兮已之悅觀八佾則羅襪生塵髧兩髦則麻衣如雪結繩既舉彛倫攸序杳若天險之難升忽爾投足而復阻來有匹去無侣空中玉步望雲髻之峨峨日下風趨見羅衣之楚楚足容捷貌容恭鳥斯企雲相從曄曄兮映朱樓之花萼煥爛兮開甲帳之芙蓉橫竿却步疊卵相重繢人不能窺其影謀士不能指其蹤既如阿閣之舞鳯又如天泉之躍龍徘徊反復交觀奪目擁金騎屯繡轂髙詞論者族談多才藝者心服既得擅場其能未央應鼓或躍投繩或翔婉孌兮弄玉之隨簫史仙妻之别劉綱凌波不足矜其術行雨未可比其方然後知海之深則孤楂可泛河之廣則一葦能杭不奔明月不赴髙唐食君之珍膳衣君之褧裳喜千秋之令節願獻夀兮天長於是衆變格行無力歡百姓之心傾四方之國掌上失妙宫中沮色所寵者寵其回邪所好者好其正直視履不懼柔嘉維則故知我者謂我從繩不知我者謂我慿陵繩有弛張藝有廢興用捨靡定倚伏相仍如臨如履何競何喜猶君之從諫則聖伎之從繩則正惟伎可以為制節繩可以為龜鏡殷監不昧在此而已豈徒昭玩人喪德豈徒悅彼姝者子明后居髙視卑創物成規此乃堯舜之用心使吾人之載喜慶賜必周將順其美來娉婷去輕盈竒伎兮忽還天上而不可見繩繩兮道之逺兮不可名樓下觀繩伎賦張楚金惟千秋之令節啓聖夀兮無疆詔百辟以髙㑹浹宸歡而未央地勝樓闢天清氣凉禮容克備樂府斯張翕赫曶霍熒熒煌煌伊曠古之未有豈名言之得詳乃有殊伎特異呈材纍至動不勤物用非假器觀夫立象蓋取諸意本自宫中之傳名為索上之戲掖庭美女和歡麗人身輕體弱絶代殊倫被羅縠與珠翠鋪瓊筵與錦茵其綵練也橫亘百尺髙懸數丈下曲如鈎中平似掌初綽約而斜進竟盤姍而直上或徐或疾乍俯乍仰近而察之若春林含耀吐陽葩逺而望之若晴空迥回照散流霞其格妙也窈窕相過蹁躚却步寄兩木以更攝有雙童而並騖還廽不恆踴躍無數驚駭疑落安然以住雖保身於萬終疑恃君恩於一顧節應鐘鼓心諧律吕履氷谷兮徒云臨焦原兮虛語是時齊謳輟響趙舞掩色絲桐發而沮勢丸劔西京賦跳丸劔調而挫力方言疑寰海清泰階平兵革不用兮國無征風雨既洽兮年順成上曰可樂人胥以亨大則有燾載之義小則無角和疑之名固端拱而成理豈繫物而為程者哉透橦童兒賦卓絶之伎不為則已為必陵羣駭目駕俗驚耳觀透撞之兒信其然矣雲竿百尺繩直規圓推有力者樹之君前僔僔就日亭亭柱天鬼魅不敢傍其影鵷鸞不敢翔其顛此兒於是跂雙足戢兩臂踴身而直上若有其翅盡竿而平立若餘其地人以為難我以為易人以為恐我以為戲難中有戲戲中有難倒輕軀墜髙竿如更嬴之鴈下空裏似蒲且之鶬落雲間不識者謂之尚竒好絶自取其殘眼為之慘心為之寒怖甚虀粉之勢不敢仰看庸詎知所慿之竿暗相扶所恃之術私有凖掩都盧其若無顧燕戲而足哂屹然中駐餘勇不盡于時也解雀散鳥逃龍走魚跳劔臂拆呪刀口呿一場之內獨雄雄如既而天眷偏及天顔賜喜曰其絶人有如此其服人有如此豈止透竿之兒抑猶疑持竿之士持若不定或掉而或傾透雖自彊何怙而何恃乃迥回天札題其兩絶降天酒賞其雙美斯道也誠則小哉可以感於知已都盧尋橦賦以勢極髙空罔思顛墜為韻金厚載彼修竿兮逈立天中有都盧兮身輕若風始發地以直上漸陵烟而轉崇敏捷無儔恣飛翻於白日孤髙可尚任回環於碧空初其委質員來當場獻藝耀百戲於君所仰千尋於天際干霄逈出將為悅目之娛舉步俄升自有翻雲之勢孤標上聳兆庶同嬉信超騰而自若罔危懼以疑思質徑挺以無倫人皆見也衣簾襜而不定風以動之挺影難儔乘高罔墜臨廣街以堪望騁趫材而自異拂雲端之縹眇似欲升天跨橦末之攲危若有餘地徒觀其逺望蹁蹁輕如列仙形翻碧落足動晴烟杳杳難分宛在朝天之外亭亭逈映全髙衆木之顛其態可喜其功不測既穹崇以獨立每緣循而至極將以騁輕趫恣登陟傍臨既分乎逺近上逹必資乎孤直仰而望也始似出於烟霄逼而察焉又若生乎翅翼事契鴻漸情非教猱既翻身而自下漸託質以彌髙回匝花場見千夫而共喜閒臨紫陌瞰萬井以無逃故得衆目咸窺羣心是仰若丹梯之已踐類遷喬之可上每所以恣攀援助觀賞誠哉平子之言先賢之勿罔競渡賦范慥楚之人兮有舟利於涉者節以楫師而競馳因汨羅拯溺之事為江漢載浮之嬉以娛黎蒸以穆風俗故嵗習而無虧爾其月維仲夏節一作日次端午則大魁分曹决勝河滸飾畫舸以爭麗建綵標而競取聿來肇自於北津所届眇期於南浦選孟賁烏獲以用壯酹川后天吳以濳輔重輕莫異於錙銖先後不差於步武外希得雋之稱內約疇庸之伍降簮𥚑以列筵擁士庶兮如堵於是鷁首齊向飄然羽輕引長絙以觀整羅小艇以持平逺岸天濶乘流鏡清援枹者氣作於一鼓理棹者伎􅀈心所欲也於先鳴聆大呼之始發若縱柂而迅征直衝諒駛於狂兕忽往來疑殊於駭鯨目正晝而懼眩浪無風兮歘生鳴鼙吹竽上聒天衢如伏波整旅合水獸於江湖建旗列卒俯映泉室若五利將軍訪仙師於溟渤攝弄竒以潜駭恆游泳而下逸羣聲合譟羣手齊力慮勍敵之我先莫遑捨於瞬息乘輕若在於風馭處疾互飛於首飭舳艫惟正審流鏑之向齊楫棹翻然亂驚鳬之揮翼投徑竹以交擁各庶幾於獨尅向背適中勝負攸分一喻馬之旋濘一如龍之曵雲始差池以接影忽敻絶而殊羣㑹不移晷倐然戾止去孤標於部黨爭距躍而赴水有麾竿以贊獲或振綵以揚美中程者雖多欲於上人後時者猶未甘於勝已懲既往之敗績佇將來以雪恥由是勵能激憤赴漲而迥回其逐進也速飛電之經目其引退也緩孤鷮之應媒彼狃淺以生怠此方殷而有猜仰興慕於三節爰息徒而復來論始作之功雖掉鞅而偏擅稽未事之效乃發梁兮備該然後弭舟楫宴沙場叶同黨之誠願錫上官之寵光徴固疑敵之財以頒賞合如澠之酒以飛觴勉居後人以成績翻有初於不藏水府淡以澄靜人羣欣而樂康夫吞刀倚巧而幻人之伎角抵稱妙而狡童之戲豈比夫仙舟以濟川之器競渡有救災之義非百夫之衆無以較其捷非九江之廣無以蕆其事惣夷夏之具疑搜為壯觀之能類木人賦以周穆王時有進斯戲為韻林滋何伊人兮異常爰委質以來王想具體之初既因於乃雕乃斫及抱材而至孰知其為棟為梁原夫始自攻堅終資假手雖克已於小巧之下乃成人於大朴之後來同辟地舉趾而根柢則無動必從繩結舌而語言何有心遊刃兮在茲鼻運斤兮罔遺兀若得木君之狀塊然非土偶之資曲直不差既無蠧於今日短長合度寧自伐於當時莫不脫枯槁以員來投膠漆而是進低徊而氣岸方肅佇立而衣裾屢振穠華不改對桃李而自逞芳顔朽質莫侵指蒲栁而詎驚衰鬢既手舞而足蹈必左旋而右抽藏機關以中動假丹粉而外周生本林間茍有參乎之美立當君所何慙柴也之儔是則貫彼五行超諸百戲誤穿節以瞪目從聲幹於奮臂如令居杞梓之上則樹德非難若使赴湯火之前則焚軀孔易進退合宜依然在斯既無喪無得亦不識不知跡異草萊其言也無莠情同木訥其行也有枝可謂暗合生成潛因習熟雖則銼身於斤斧曷若守株於林麓宜乎削爾肩刳爾腹既有亂於真宰寧取笑於周穆吞刀吐火賦以方士有如此之術焉為韻王棨竒幻誰傳伊人得焉吞刀之術斯妙吐火之能又𤣥咽却鋒鋩不患乎洞胸逹腋噓成赩赫俄驚其飛焰浮烟原夫自天竺來時當西京暇日騁不測之神變有非常之妙術初呈握內豈吹毛之鋭難親乍灼指端雖鑠石之威可出於是叱咤神勵唅呀氣質旁駕肩而孰不觀也忽攘臂而人皆異之俄而精綱充腹熾烈交頥罔有剖心之患曾無爛額之疑寂影滅以光沉霜鋒盡處烟霞舒而血噴朱熖生時素刃兮倐去於手紅光兮遽騰其口始蔑爾以虹藏竟㸌然而電走隱于笑語迥回看而䩬鞞皆空出自咽喉旁取而榆檀何有莫不刻意斯效焦心已舒想剛腸之礪乃驚燥吻以焚如胡為引鏡之形銷於咀嚼安得燎原之色發自吹噓亦足以道冠幻人名傾術士食針既可以增愧噀酒亦宜乎讓美且夫神仙兮不常變化兮多方或潄水而霧含或吐飯而蜂翔曾未若彼用解牛我則虛喉而挫鋭彼皆鑽燧我則鼓舌以生光然眩惑如斯云為徒爾雖誇外國之獻本匪王庭之伎吾謂吞詞鋒者可尚吐智燭者為是所以安處先生終去彼而取此文苑英華卷八十二
