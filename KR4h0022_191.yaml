body:
  text: 文苑英華卷一百九十一宋李昉等編朝省二寓直五十八首奉和姚給事中寓直之作宋之問清論滿朝陽髙才拜夕郎還從避馬路來接珥貂行寵就黃扉日威回白簡霜柏臺遷鳥茂一作氏非蘭渚集作署得人芳禁靜鐘初徹更踈漏漸長曉河低武庫流火度文昌寓直光輝重集作寓直恩徽重乘秋藻翰揚暗投空欲報下調不成章奉和庫部李員外秋夜寓直之作前人相庭貽慶逺才子拜郎初起草儀仙閣焚香臥直廬更深河欲斷節徑柳疑偏踈氣耿凌雲筆心搖待漏車叨榮厠儔侣省已恧空虛徒斐陽春和難參麗曲餘冬夜寓直麟閣集作臺前人直事披三省重關祕七門廣庭憐雪净集作靜深屋集作狹室喜爐溫月幌花一作雲虛馥風忩竹暗喧東山白雲意兹夕寄琴樽和蘇員外寓直崔湜前卷作喬知之此詩已見一百九十卷秋夜寓直中書呈黃門舅蘇頲簾櫳上夜鈎清切聽更籌忽共雞枝老還如騎省秋循庭喜三入對渚憶雙遊紫紱名初拜黃縑迹尚留月舒當北幌雲賦直東樓恩渥迷天施童䝉慰我求遲君台鼎即聞義一承流春晚紫微省直贈內前人直省清華接建章向來無事日猶長花間燕子栖鳷鵲竹下鴛雛繞鳳凰內史通宵承紫誥中人落晚集作日愛紅粧别離不慣無窮憶莫誤卿卿學太常和崔黃門寓直夜聽蟬之作張九齡蟬嘶玉樹枝向夕蕙風吹幸入連雲閣集作宵聽應緣飲露知秋深聞集作深秋思欲近聲靜夜相宜不是黃金飾清音徒爾為和許給事直夜簡諸公前人未央鐘漏晚仙宇藹沉沉武衛千廬合嚴扄萬户深左掖知天近南軒集作忩見月臨樹搖金掌露庭接玉樓隂他日聞更直中宵屬所欽聲華大國珤夙夜近臣心逸興乘髙閣雄飛在禁林寧思竊抃者情發為知音酬通事王舍人寓直見示篇中兼起居陸舍人景獻前人軒掖殊清祕才華固在斯興因膏澤灑情與惠風吹所美應人譽何私亦我儀同聲感喬木比翼謝長離價以陸生減賢慙鮑叔知薄遊當獨愧芳訊乃兼施此夜金閨籍伊人瓊樹枝飛鳴復何遠相顧幸媞媞臺中書懷蔣洌持憲當休明飾躬免顛沛直繩備豪右正色清冠蓋寄切才恨薄職雄班匪大坐居三獨中立在百僚外簡牘時休暇依然秋興多披書唯骨鯁循跡少閒和庭樹凌霜柏池傾萎露荷嵗寒應可見感此遂成歌夏中疑初霽南省寓直時兼尚書郎節度判官前人薄宦因時忝凉霄寓直初沉沉仙閣閉的的暗更徐霽色連空上炎氛入夜除星回南斗落月度北忩虛待漏殘燈照含芳襲氣餘寐來冠不解奏罷草仍書幕府慙良策明曹愧散樗命輕徒有報義重更難踈燕厦欣成托鵷行濫所如晨趨當及早復此戒朝車同張少府和庫狄員外夏晚初霽南省寓直時兼充節度判官之作冦坦黃綬歸休日仙郎復奏餘宴居當夏晚寓直㑹晴初露散星文發雲披水鏡虛髙才推獨唱嘉㑹喜連茹月色搖春闥香煙藹瞑廬一作箊千門傳夜警萬象照階除少孺嘉能賦文强閲賜書兼曹謀未展入幕志方攄為奉靈臺帛恭先待漏車貞標不可仰空此樂樵漁和集作同崔員外秋宵寓直王維建禮髙秋夜承明候曉過九門寒漏徹萬井曙鍾多月迥藏珠斗雲開集作消出絳河更慙衰朽質南陌共鳴珂晚出左掖杜甫晝刻傳呼淺春旗簇仗齊退朝花底散歸院柳邊迷樓雪融城濕宫雲去殿低避人焚諌草騎馬欲雞栖春夜宿左省前人花隱掖垣暮啾啾棲鳥過星臨萬户動月傍九霄多不寐集作寢聽金鎖集作鑰因風想玉珂明朝有封事數問夜如何翰林讀書言懷呈集賢院內諸學士李白晨趨紫禁中夕待金門詔觀書散遺帙探古窮至妙片言茍㑹心掩卷而忽集作忽而笑青蠅易相㸃白雪難同調本是踈散人屢貽𥚹促誚雲天屬清朗林壑憶遊眺或時清風來閒倚門集作簷下嘯嚴光桐廬溪謝客臨海嶠功成謝人間集作君從此亦集作一投釣和户部楊員外伯成寓直李憕落日彌綸地公才盡省郎詞驚起草筆坐臥護衣香雙闕天河近千門夕漏長遙知臺上宿不獨有文强奉和許給事夜直簡諸公崔皓西掖黃樞近東曹紫禁連地因才子拜人用省郎遷夜直千門靜河開萬象懸建章宵漏急閶闔曉鐘傳寵列貂蟬位恩深侍從年九重初起草五夜即成編顧已無官次循涯但自憐遠陪蘭渚作空此仰神仙西省即事岑參西掖重雲開邑曙集作開曙輝北山踈雨㸃朝衣千門柳色連青鎖三殿花香入紫微平明端笏陪鴛列薄暮垂鞭信馬歸官拙自悲頭白盡不如巖下掩集作石偃荆扉和都官苖員外夜寓直對雨簡諸知已李嘉祐多雨深一作南宫夜仙郎上一作寓直時漏長丹鳳闕秋冷白雲司螢影侵階亂鴻聲出苑遲蕭條吏人散一作靜小謝有新詩此詩三百四十三卷重出今已削去注異同為一作和苖員外寓直中書包何朝列稱多士君家有二難貞為臺裏柏芳作省中蘭夜直分曹間晨趨接武歡每憐雙闕下鴈序入鴛鸞春宵寓直錢起養拙集作性慣雲臥為郎如鳥棲不知仙閣峻唯覺玉繩低帳喜香煙暖詩慙賜筆題未央春漏促殘夢訝集作謝晨雞和謝舍人雪夜寓直皇甫曽禁省夜沉沉春風雪滿林滄洲歸客夢青瑣近臣心揮翰宣鳴玉承恩在賜金建章寒漏起更助掖垣深集作章臺寒鴈起更助掖垣深晚秋集賢院即事寄徐薛二侍郎常衮穆穆上清居沉沉中祕書金鋪深內殿石甃淨寒渠花樹臺斜倚空煙閣半虛縹囊披錦翠繡軸卷瓊琚墨潤氷紋繭香銷蠧字魚翻黃桐葉老吐白桂花初舊德雙遊處聫芳十載餘北朝榮庾薛西漢盛嚴徐侍講親華扆微吟一作詩步綺踈綴簾金翡翠賜硯玉蟾蜍序秩東南逺離憂歲月餘承明期重入江海意何如奉和常舍人晚秋集賢院即事寄徐薛二侍郎司空曙藹藹鳳凰宫蘭臺玉曙通夜霜凝樹羽朝集作曉日照相風官附三台貴儒開百氏宗司言陳禹命集作拜侍講發堯聰香卷集作起青編內鉛分緑字中綴籖從太史鏘珮揖羣公池接天泉碧林交御果紅寒龜登故葉集作敗葉秋蝶戀踈藂顔謝徴文並鍾裴直一作議事同離羣驚海鶴屬思怨集作想江楓地遠姑蘇外山長越絶東慙當哲匠後下曲本難工和常舍人晚秋集賢院即事十二韻寄贈江南徐薛二侍郎盧綸綸閣九華前森沉綵仗連洞門開旭日清禁肅秋天霜滿朝容備鐘餘曉集作漏唱傳瑶璫陪羽扇端辨入爐烟麟筆刪金篆龍綃薦玉編汲書荀朂定漢史蔡雍専御竹潜通筍宫池暗㵼泉亂藂縈弱蕙墜葉灑枯蓮列署齊遊日重江並謫年登封思議草侍講憶同筵滄海風濤廣黝山瘴雨偏唯應緘上寶贈逺一呈妍奉和太常王卿酬李舍人中書寓直春夜對月見寄前人露如輕雨月如霜不見星河見鴈行虛暈入池波自泛滿輪當苑桂偏香春臺幾望黃龍闕雲露寧分白玉廊是夜巴歌應金石豈殊螢影對清光和王員外冬夜寓直前人髙步長裾錦帳郎居然自是漢賢良潘嶽叙年因鬢髮楊雄托諌在文章九天韶樂飄寒月萬户香塵裛夜霜坐見重門儼朝騎可憐雲路好翺翔酬金部王郎中省中春日前人南宫樹色曉森森雖有春光未有隂鶴侣正宜芳景引玉人那為簿書沉山含瑞氣偏當日鶯逐輕風不在林更有阮郎迷路處萬株紅樹一溪深夜直省中韋應物見集本河漢有秋氣集作意南宫生早凉玉漏殊杳杳雲闕更蒼蒼華燈發新照集作􅀈輕烟浮夕香顧跡知為忝束帶愧周行奉和給事寓直崔峒桂枝家共折雞樹代相傳忝向鸞臺下仍看鴈影連夜閒方步月漏盡欲朝天知去丹墀近明王許薦賢初入集賢院奉贈李獻仁曽於常山聫官前人燕代官初罷江湖路便分九遷從命薄四十幸人聞跡愧趨丹禁身曽繫白雲何由返滄海昨日謁明君奉酬李舍人秋日寓直見寄張南史秋日金華直遙知玉佩清九重門更肅五色詔初成槐落宫中影鴻髙芳逺一作苑外聲翻從魏闕下江海寄幽情同韓侍郎秋朝使院前人重門啓曙闕一葉報秋還露井桐柯濕風庭鶴翅閒忘情簮白筆假夢入深山惆悵祗應此難裁語默間暮春南臺承再除給事中仍是本㕔几榻杖履宛然如舊薛存誠再入青瑣闈忝官誠自非拂塵驚物在開户待僧歸積草漸無徑殘花猶灑衣禁闈偏日近行坐在恩輝初秋月夜中書宿直因呈楊閣老權德輿欹枕直廬暇風蟬迎早秋沉沉玉堂夕皎皎金波流對掌喜新命分曹諧舊遊相思玩華彩因感庾公樓晚秋陪崔閣老張祕監閣老苗考功同遊昊天觀時楊閣老新直未滿以詩見寄斐然酬和有愧蕪音前人方駕遊何許仙源去似歸縈回留勝賞蕭灑出塵機泛菊賢人至燒丹姹女飛步虛清曉籟隱几吸晨輝竹徑琅玕合芝田沆瀣晞銀鈎三洞字瑶笥六銖衣麗句翻紅藥佳期限紫微徒然一相望郢由和應稀和胡將軍寓直王建宫鴉棲盡禁搶攢樓殿深嚴月色寒進狀直穿金㦸槊探更先傍玉鈎欄漏傳五㸃班初合鼓動三聲仗已端遙見正南宣不坐新栽松樹喚人看省中直夜對雪寄李師素侍郎令狐楚密雪紛初降重城杳未開雜花飛爛熳連蝶舞徘徊灑散千株葉銷凝九陌埃素華凝粉署清氣繞霜臺明覺侵忩積寒知度塞來謝家爭擬絮越嶺誤驚梅暗魄微茫照嚴颷次第催一作堆稍封黃竹亞先集紫蘭摧孫室臨書幌梁園泛酒杯靜懷瓊樹倚醉憶玉山頽翠陌饑烏噪蒼雲逺鴈哀此時方夜直想望意悠哉南宫夜直宿見李給事題其日所下制勑知奏直在東省因以詩寄前人畨直同遙夜嚴扄限幾重青編書白雀其日勑鄜州奏白雀宜付史館黃紙降蒼龍北極絲綸句東垣翰墨蹤尚垂𤣥露㸃猶濕紫泥封炫眼凝仙燭馳心裊禁鍾定應形夢寐暫似接音容玉樹春枝動金樽臘釀醲在朝君最舊休浣許過從早秋集賢院即事時為學士劉禹錫金數已三伏火星正西流樹含清露曉閣倚碧天秋灰琯應新律銅壺添夜籌商颷從朔塞爽氣入神州蕙草香書殿槐花㸃御樓集作溝山明真色見水淨濁煙收早歲忝華省再來成白頭幸依羣玉府有路向瀛洲奉和武中丞秋日臺中寄懷簡諸僚故時西畨使迥奉命追和吕溫聖朝思紀律憲府得忠賢指顧風行地儀行月麗天不仁恆自逺為政復何先虛室惟生白閒門集作情却草𤣥迎霜紅葉早過雨緑集作碧苔鮮魚樂翻秋水鳥聲隔暮煙舊遊多絶席感物遂成篇更許窮荒客追歌白雪前待漏入閣書事奉贈元九學士閣老白居易衙排宣政仗門啓紫宸關彩筆停書几几作命花磚趂立班稀星㸃銀礫殘月墮金鐶集作環暗漏猶傳水明河漸下山從東分地色政集作向北仰天顔碧湧爐煙直紅垂斾尾閒綸幃集作闈慙並入翰苑忝先攀笑我青袍故饒君紫集作茜綬殷詩仙歸洞裡酒病帶人間好去鴛鸞侣冲天便不還夏夜直宿前人人少庭宇曠夜凉風露清槐花滿院氣松子落階聲寂默挑燈坐沉吟踏月行年衰自無趣不是厭承明中書直堂集作寓直前人繚繞宫牆圍禁苑集作林半開閶闔曉沉沉天晴更覺南山近月出方知西掖深病對詞頭慙綵筆老看鏡靣愧華簪自嫌野物將何用土木形骸麋鹿心見于給事暇日上直寄南省諸郎官詩因以戲贈前人倚作天仙弄地仙誇張一日抵千年黃麻勑勝長生籙白紵詞嫌內景篇雪貌莫集作雲彩誤一作容貌誤居青瑣地風流合在紫微天東曹漸去西垣近鶴駕無妨更著鞭此詩二百五十八卷重出今已削去注異同為一作西掖早秋直夜書意前人凉風起禁掖新月生宫沼夜半秋暗來萬年枝嫋嫋炎凉遞時節鍾鼓交昏曉偶聖惜年衰報恩愁力少素餐無補益朱紱集作紋虛纒繞冠蓋栖野雲稻粱養山鳥量能集作內私自省所得已非少五品不為賤五十不為夭若無知足心貪求何日了憶夜直金鑾奉詔李紳月當銀漢玉繩低深聽簫韶碧落齊門壓紫垣髙綺樹闕連青瑣近丹梯墨宣外渥催飛詔草定新恩促換題明日一作惟我獨歸花路逺可憐人世隔雲泥奉和朝翰林丁侍郎禁署早春晴望劉得仁御林聞有早鶯聲玉檻春香九陌晴寒著霽雲歸紫閣暖浮佳氣動皇城宫池日到氷初解輦路風吹草欲生鴛侣此時皆賦詠商山雪在思尤清休浣日謁西掖所知因成長句溫庭筠見集本赤墀髙閣自從容玉女忩扉報曙鍾日麗九華青瑣闥雨晴雙闕翠微峯毫端蕙露滋仙草琴上薰風入禁松荀令鳳池春婉娩好將餘潤變魚龍冬夕和范祕書省宿李頻每入得閒吟清曹閣下深因知遙夜坐别有逺山心藝細書中氣松踈雪上隂幾時髙興足還復插朝簪和范祕書省中作喻坦之清省宜寒夜仙才稱獨吟鐘來宫轉漏月過閣移隂鶴壁燈前靜藝臺幄外深想知因此興暫動憶山心南宫寓直鄭谷寓直事非輕官孤憂且榮制承黃紙重詞見紫垣清曉霽庭松色風和禁漏聲曽一作僧携新茗伴更集作吏對僧字掃落花迎鎖印詩心動垂簾睡思生粉廊曽試處直事稍暇則於都堂四廊下尋頃年試所題名記至今多在石柱昔賢名來誤宫窗燕啼疑苑樹鶯殘陽晴集作應更好歸速限嚴城春日集作夕伴同年禮部趙員外省直集作直省前人錦帳名郎重錦窠清宵寓直縱吟哦氷含玉鏡春寒在粉傅仙闈月色多視草即應歸屬望握蘭知道暫經過流鶯百囀和殘漏猶把芳樽藉露荷文昌寓直前人何遜空階夜雨平朝來交直雨新晴落花亂上花磚上不忍和苔踏紫英忝官諫垣明日轉對前人吾君英睿相君賢其奈寰區未晏然明日翠華春殿下不知何語可聞天祕書伴直張喬髙枝聚暝禽疊閣鎖遙岑待月當秋直看書廢夜吟殘薪留火細古井汲瓶深縱欲抄前史一作古貧難遂此心省中偶作前人三轉郎曹自集作出勉旃莎階吟步想前賢不集作未如何遜無佳句若比馮唐是壯年捧制名題黃紙尾約僧心在白雲邊乳毛松雪春來好直夜清閒且學禪文苑英華卷一百九十一
