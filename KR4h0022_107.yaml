body:
  text: 文苑英華卷一百七宋李昉等編器用六攲器賦五首撲滿賦二首小撲滿賦一首白獸樽賦一首金樽含霜賦一首攲器賦應詔許敬宗臣聞人靈貴損天道忌盈朱火終集作中而炎景謝金波滿而哉魄生察遞來於四序揆迭運於三精淺智昧於成象通識詳於未萌務循虛而守約處崇髙而慎傾爰製宥卮朂兹居位藏丹楹之峻宇偶清廟之彞器體虛舟之漾空鑒撲滿之延祟彼遊鱗之盤樂咸見亡於芳餌此貪夫之死權誠覂駕於名利唯達人兮服道執溫恭兮靜志居泰山以思危騁髙衢而不躓在大明之玄覽猶垂旒以蔽聰履克讓之貞吉尚養正以希蒙矧羣材之小器亡戒溢而虧沖悟負乘之必蹶敬循崖而飭躬由是鳴謙君子卑以自牧如彼景山猶藏疾於林麓譬諸巨海亦素王於百谷庶辭滿而常正固懷空而靡覆若乃求中軌範流慶資源峯潤由於韜玉葉茂本於深根草卷施而不死木交讓以俱存梅飛英而斂笑桃絢彩而無言燕迎秋兮遁迹鶯移春兮息喧皆順序而行止得妙物之玄門道雅合於斯器故保精而養魂第二以君子用之誡盈為韻張鼎聞夫日中則昃鼎折則傾月容守缺而忌滿神道福謙而害盈聖人察兩曜之度觀萬物之情知務進者危於不止擬貪取者敗於幾成爰制座右與人作程開其可誡之迹加以必覆之名然而不增不減能正能平考低昂而必應亦有效於權衡爾其顛沛是虞包藏自縱或益之而損故至其滿成覆餗之凶或損之而益故當其無為有器之用且聖人云其脆乃破其安易持則何不避禍於將盈之日圖全於未兆之時力小任重鮮不克敗滿而既溢傾必從之亦猶富不與侈會貴不與驕期若以馬而喻馬則念兹而在兹又曰積德不積財無為故無敗貪祿者致禍增髙者致壞是以古人作則為今人知朴疑前車覆軌誠後車之誡借如乃武乃文巖廊之君一生一死繁華之子故當觀其所由察其所以嗟乎福兮禍所伏禍兮福所倚既禍福之無門信吉凶之由已且喪道則貪邪貪邪至於喪生知足則不辱不辱在於知止苟欲圖安以逺害又宜去彼而取此則知敧器之器大哉吾將以為教始第三韋肇若夫天地忌滿鬼神害盈方輿以之東缺圓蓋以之西傾百川因兹灌注七曜由是貞明故聖人以沖虛作式賢達以撝謙為情於是盤盂設誡几杖必紀金人貽誨於周書撲滿流規於漢史順之者福逆之者恥乃垂訓於小人咸取象於君子豈若方圓有度規矩合儀不虛不滿能安能危考衆器之論最實莫先於侑一作宥荀子侑宥同卮不隨日兮時昃不與月兮暫虧體執謙損性尚沖撝知盈槩而必覆故止足而何期惟上聖之設法處中庸而在兹使廉恕以效貪殘改質金張可望形而謝寵許史可覩容而辭秩疏廣感此而挂冠范蠡朂兹而自逸覽斯器之為美何餘物之能匹原夫出自聖者之心成乎匠人之手匪雕匪刻可大可久鄙巨壑之難盈惡滿卮而虛受寧取類於瓦杯以供堯舜不願同於金爵惟資桀紂故一化於陶鈞歷千載而不朽由是魯君之廟置諸户庭左鄰東序右界西扃惟仲尼之多聖賴弟子而為銘僕又何德輕塵翰墨雖不假於先容實有愧一作貴於觀國第四張元覽夫陽烏中而則謝隂兔望而斯蝕諒天道之常理豈人情之能測何此器之知機體變通之消息其形也匪疑作菲陋任其淳素之姿其質也嶔欹無假丹青之飾平而則正滿而斯側不平不滿無窮無極夫盛衰共貫倚伏多途或始吉而終否或前榮而後枯才聞棲越遽見亡吳不知誡其盈溢空有歎於姑蘇是知髙而不危則治操而有求則競見握髮以存誠慮宵衣而致命老氏貴其善建大易崇其積慶殷湯鏤几以為虞孔甲鐫盤而自鏡爾其冥一作蒙豫不止懷足無厭釁成山嶽禍起微纎愚者已然而不見智者未兆而斯瞻聖人損之而又損君子謙之而更謙大禹惟聖每殷勤於菲食惟堯則哲終眷戀於茅簷然而默默如存隆隆自絶天且不能固西北之壞地且不能補東南之缺天地尚不能久矧人道之不滅勒兹器以為針庶作鑒於來哲第五并序李德裕癸丑歲豫時在中樞丞相路公見遺攲器贈以古人之物永懷君子之心嘗欲報以詞賦屬力少一作小任重朝夕盡瘁固未暇於體物今者公已殁世豫又放逐忽覩兹器悽然懷舊因追為此賦置公靈筵詞曰昔周道砥平既安且寧赫赫公旦配德阿衡謂難守者成難持者盈始作茲器告於一作于神明至仲尼憲文武之道思周公之德入太廟而觀器覩遺法而歎息且曰月滿而虧日中而昃彼天道之常然欲久盛而焉得乃沃水於器察微要終挹彼注兹受之若沖虛則臲卼似君子之困蒙中則端平如君子之中庸既滿傾一作則跌霆流電發器如隄一作坻隤水若河決非神鼎之自盈異衢樽之不竭蓋欲表人道之隆替明百事之有節然兹器也不以中而自藏不以跌而自傷其過也如彼薄蝕其更也浸發輝光得其道者居則念於豐蔀動乃思於謙受顔既復而不逺惠屢黜而何咎知任重之力一作必及悟物盈之難久雖神道之無形常慘然於文粹作而前後昔與君子同秉國鈞公得之為賢相豫失之為放臣覩遺物之猶在懷舊好而悲辛思一無此字欲克己以復禮永報德於仁人一作皆集本似不及古書之善撲滿賦姚元崇夫惟哲人罔有敗德几杖攸誡盤盂見勒容過於鏡則照窮任重於才則道塞多藏必害常謹不忒兹撲滿之陶形假埏埴以為靈其中混沌竅開兮沉以默其外空蒙忽合兮炯而青藏鏹符於神論固疊疑同於道扃謙以自守虛而能受奚初積而終散竟出無而入有乍若乎巨蚌之全滿而則剖不思乎亢龍之悔盈莫能久故君子永鑒是式允執厥中道不可以常泰物不可以屢空雖荄疑寶含真立制之端自我而辭豐忌覆致用之數在公何兹器之微賤蓋與時而變通苟利物而害己亦持盈而省躬豈獨夫魯國宥坐誡敧虛已周階銘玉疑端口窒欲損之有餘補之不足明逺鑒之退止訓勞謙之軌躅稽長倩以投贈庶平津而自朂第二韋肇夫以天覆髙兮地載卑道幽玄兮不可窺日始中而還昃月將盈而復虧滿而不已則溢髙而不已則危誠古聖之深誡作來者之明規示豫以倚伏教豫以謙撝雖蒙昧而不敏請將心而事斯故逺求類物近方諸已鸚鵡何智兮隴坻先鳴靈龜何愚兮長途曳尾智者禍兮受雕籠之斃愚者福兮終廟堂之祉信通塞之暫昧乃榮枯之一指何兹器之雖朴以堪誡而成珍稟質陶甄之匠賦容埏埴之人不雕飾以眩目寧儉素以全身始含虛而任受忽多藏而纍真入之有徑出之無因其滿也渾兮似蚌珠未開於重淵之下其析也杳兮若雞卵初分於太古之辰豈不以驟積而靡散貴得其豐孰知其難裂陶鎔之瑣瑣出金錢之粲粲見之者無不興嗟聞之者盡皆含歎若夫窅窅宦子營營市人若恥貧賤之域同趨富貴之津得利足以潤已至盈足以敗身猗歟前迹安可再循豫遂削營欲之心守謙光之道念土疑物之雖賤宜吾人之所保鑒周鼎之覆餗看魯器之傾倒猥逢長倩之贈永為子孫之好欲窮墨妙之意以養太玄之草也哉一無二字小撲滿賦張鼎天何言哉信陽去而隂來器之形矣必虛往而滿止埏埴為質惟人為軌靡不有初方應物以虛已鮮克有卒因藏鏹而見圯其中也幽幽冥冥其外也青青熒熒疑攝生而養神靈積而不散持莫能久何始吉而終凶竟出無而入有豈獨夫魯廟欹器中則正而滿則覆周陛玉疑人和其容而端其口譬髙流而岸坼等珠盈而蚌剖日中則昃月滿則虧故君子終吉以流誡天地勞謙而自卑别有孫𢎞舉賢不患於貧窶長倩投贈竊勵於風規苟欲全身而避害固可翹勤而鑒斯白獸樽賦以言必有章酌而飲焉為韻李君房酒以養德則盛於樽樽之用獸可得而言若乃王春會朝初正元吉穆穆嚴宸濟濟良弼玄化凝以垂衣讜詞進於造膝則從繩之義斯正投水之言自必是以白獸在司樽彞舉酒攫地空象夫髬髵西京賦猛毅髬髵揚睛欲聞乎哮吼信履尾而不嘻雖編鬚而何有俾夫嘉話允臧睟容有光樽則雲飛而山峙獸乃白質而黑章物盛其容若耽耽而視君能納諫遂諤諤而昌嘉言既藥用舉夫爵所以展其威儀匪空留乎斟酌獸之為樽用捨有時獸之喻人猛毅在兹懼威則君之設謬矣忘諫則臣之節殆而酌之伊何惟器所稟禮殊百拜味珍千品皇恩既錫且同夫湛湛露斯君德不回寧比夫厭厭夜飲彼美觩然太階之前與諫鼓而齊致比撲滿而能全斯期針闕用以旌賢將同衢樽之道幸注焉而酌焉金樽含霜賦孟康朝夫何卜晝之不暇以清夜之方久垂玉漏之未窮賴金樽兮有酒霜入室兮夜何長樽含霜而醴徹霜覆醴而金光適足徑乎玉性亦何傷乎酒香夫如是樽既可賞霜亦可觀味資蘭桂影奪綃紈疊華彩於銀燭散餘光於玉盤况東堂清敞北斗闌干在公載宴廢寢相歡心飲氷兮猶熱酒飛霜兮豈寒斯蓋為上台之式百辟少宰之設九流明命充選俾士全謀五權立而羣才入鏡三人行而一人同舟並錯薪於翹楚異攀桂之淹留每賞崇乎夜隙故樽列而霜浮于時星歲遒盡地有寒沍引揚風烏徘徊玉兔杯上霧起爐前香覆對樽影而霜含况霜姿而粉傅非兕觥其觩粲乎自舉會心潔矩凝然抱素於是執簡為名比玉同貞結而能白沖而不盈光露寢之舊席刻神鐘之逺聲豈獨坐中藏器酒上含情者哉文苑英華卷一百七
