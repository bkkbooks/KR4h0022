body:
  text: 文苑英華卷六十三宋李昉等編儒學三書同文賦一首壞宅得書賦一首鑿壁偷光賦一首螢光照字賦三首賦賦一首詩有六義賦一首擲地金聲賦一首端午日獻尚書為壽賦一首書同文賦以王化大同書文混一為韻王起巍巍乎我皇之宅也寰海無氛書契同文宣于小學成彼大勳六藝殊途考為篆之古史萬邦同德知結繩之聖君于時四方有謐九區如一二疑教翼宣儒風洋溢或簡牒而異制或草隸而殊質莫不採托其文錯綜其術由是日月所燭舟車所通布八體而咸若合六書而大同垂露成規既由近而及逺崩雲殊象亦自西而徂東流離翰墨之場輝映詩書之閫或蟲形而惟錯或鳥跡以相混三墳八索何患乎闕疑二首六身或因而知逺况其名臣染翰行子寓書昌言非同而不達遙思非同而不攄敷奏或乖自無驚於問馬遐邇不壅固有樂於烹魚為學則孚執藝無詐文加㸃而何有書盡言而是藉或筆或削决百事之紛拏如絲如綸宣一人之教化則知同文之義大道惟昌合我人則覃于鬼方匪來規於率土將作範於後王巧者莫能革其故暴者無能易其常則帝羲龍圗寧務其八卦史籀彎疑作蟲篆徒列於三蒼故宜飛聲後代布德無外銘鍾鼎而勒休施竹帛而圗大逸少之能攸著伯英之妙咸賴信乎觀彼人文而樂我平泰壞宅得書賦以壁中得之傳諸後學為韻蔣凝孔氏之居中藏古書當霸魯壞隳之日見亡秦焚滅之餘卜數仭為繚垣時之潜矣定四科於竹簡世以傳諸當其漢偃兵戈魯修宫掖將窮下國之侈遂去前賢之籍并吞一畝方取地以崇居摧折兩楹遂得書於暗壁悲夫其宅也人亡道窮削跡于中瓦隳而阼階缺裂塵飛而環堵空濛鯉也必趨之庭將為輦路仲由未入之室欲創離宫其書也藏書疑廢久坑儒之後蟲侵而鳥跡微虧土蝕而韋編欲朽虞夏不刋之典出彼圬墁殷周將喪之文存於培塿於是升彼堂矣棄諸簡焉信遺址兮必取寧古文兮何傳將卜樓臺剗榛蕪而矻若俄聞金石扣寂寞以鏗然王乃凝思潜聼追蹤闕一宅兮不壞知其書兮可學悔隨疑古而榮今庶立禮而成樂門庭猶在存聖者之規模蟲篆難詳是古人之質朴倚伏相推於焉有之不廣其居則斯文永墮不聞其樂則往跡全隳信乎君子所居亦廢興而有數聖人大道當用舍而隨時今皇家修典墳崇閫閾開儒館以待士設文教以濟國千秋萬歲知此道之無窮四海九州信將來之有得鑿壁偷光賦以將欲貪於麟角之成為韻獨孤鉉儒有聰明卓犖敻然先覺勿懷六蔽之嗤是切三冬之學闕無光穿屋如墉豈獨雀之有角且以蘭膏既絶日月其將欲假明於他人之室方鑿竅於夫子之墻乍引濳輝怯珠投之暗忽分圓影凝疑作疑月出之光觀夫納耀之初流輝乍舒獨見之明何得和光之義則如然後傳之辨鳥遰以分魚諒匪偷人之所以固同暗者而求於逗影未周將閲小明之什分輝竟劣難尋光大之書於是舍之則止用之則行彼君子訝來風之穴矧吾儔觀繼日之成誰謂我偷偷則不滅誰謂爾失失亦不驚徒愛夫覽則無欺燭之有私文從曲照字逐圓窺守其黑非吾徒也用其光若已有之始慙服暗之議不能墻面終契襲明之㫖或異管窺况夫貧則宜甘學也宜耽韜爾光不違於誨盜開吾壁非涉於攘貪志也則勞自知不足豈奪鑒微之見實假照鄰之燭等虛室之白寧喪爾明喜衝孔之光已從吾欲然則能資於昧者可望非親欲求於明者有志無因逹暗之心難固偷光之意何新是可投庸功疑學捨彼求身故能才已徵於夢鳥道非窒於獲麟螢光照字賦以能勵躬必大成為韻楊𢎞貞儒有貧居在隂志學無必思照字之物類得聚螢於心術散㸃熠熠文彩之旁流開卷熒熒古今之洞出曈曨隱映積小而成臨竹簡而增美歷銀鈎而轉明讀周室之書每見日中之字覽龎㳙之傳猶疑火照其營既有求於時習奚勿用而宵行想夫交錯積中英華發外魚鳥飛動鉛黃暗靄無心於處暗彌見精專取足於臨文豈勞光大炫晃無窮心勤飭躬泛凝暉於垂露翻碎影於雕蟲筆精之體無隱藻思之文有融既的皪於六身之上復浸淫於三豕之中則知雅善從宜功能自勵時當炎燠嗟映雪而未期義涉穿窬忌偷光之失計是用聿求昭質承乏華燈每揚之自此知照况燭之因以輝𢎞斯作者所以警清士而體物俾無忘其所能第二同前韻趙蕃丹鳥火熒臨書育明假蠢爾之微照俟終焉而有成由是引素囊開縹帙文的皪而可見影循環而無必孤懸虛牖依依而鳥跡初分回隱薄帷幕幕而龜文乍出嘉其炯若流耀煥乎發蒙瑩分寸而靡隔助舒卷而不窮所以藉微索積輕躬隱映有餘寧虧武子之志熒煌如貫爰明蒼頡之功臨墨池而珠還合浦映草翰而燎㸃寒藂至若暗室方扄清宵未艾炫微質於幽邃閲羣言於宵靄餘光不滅能溫故而知新疏彩乍臨為積小而成大爾其杳杳皆徵厯厯可慿分白黑而為度隨編簡而不恆初訝無烟濳凝化草之狀才瞻吐耀暗分垂露之能及夫皓若雲舒明如珠綴互離離而發色紛漠漠而流睇是以象鈎深類冥契儻觀光之不昧庶微躬之足勵第三同前韻蔣防士有閲簡䇿尚專精恆俾夜而作晝每聚螢以襲明期照燭於無隱俟沉研而有成縹袠時開玉篆共丹輝竝耀銀鈎下映繁星與片月俱生帷幌之際微明舒蔽或熠熠以光吐復離離而珠綴俯而察煥乎呈科斗之文靜而觀炯爾見雕蟲之藝諒依人以明道匪韜光以自衛居暗室者懷我而載寢載興遇明時者假我而自彊自勵用或因物勤斯飭躬不晦乎風雨不翳乎昏蒙臨墨池則珠還合浦映草聖則燎㸃寒藂誰謂向乎晦照篇籍兮無小無大誰謂藏乎密隨晝夜兮無固無必金輝始徹疑清露之騰文鳥跡旋分謂靈烏之就日可以窮永夕可以佐殘燈捨之則其功不足用之則其道彌𢎞顧螢光之在照蓋欲罷而不能賦賦以賦有古詩之風為韻白居易賦者古詩之流也始草創於荀宋漸恢張於賈馬氷生乎水初變本於典墳青出於藍復增華於風雅而後諧四聲祛八病信斯文之美者我國家恐文道寖衰頌聲陵遲乃舉多士命有司酌遺風於三代詳一作明變雅於一時全取其名則號之為賦雜用其體亦不違一作出乎詩四始盡在六藝無遺是謂藝文之警䇿述作之元龜觀夫義類錯綜詞彩分一作舒布文諧宫律言中章句華而不豔美而有度雅音瀏亮必先體物以成章逸思飄颻不獨登髙而能賦其工者究精微窮㫖趣何慙兩京於班固其妙者抽祕思騁妍詞豈謝三都於左思掩黃絹之麗藻吐白鳯之奇姿振金聲於寰海增紙價於京師則長楊羽獵之徒胡可一作為比也景福靈光之作未足多之所謂立意為先能文為主炳如繢素鏗若鐘鼓郁郁哉溢目之黼黻洋洋乎盈耳之韶武信可以凌轢風騷超逸今古者也今吾君網羅六藝澄一作淘汰九流微才無忽片善是求况賦者雅之列頌之儔可以潤色鴻業可以發揮皇猷客有自謂握靈蛇之珠者豈斯文而不收一作豈可棄斯文而不收凡一作皆川本詩有六義賦以風雅比興自家成國為韻李益夫聖人之理原於始而執其中觀天文以審於王事觀人文而知其國風故每嵗孟春採詩於道路而獻之泮宫有以知下之化逹人之窮發於關雎之首及乎王道之終故曰天明自人而視天聼自人而聰所謂政於內繫一人之本動於外形四方之同始於風成於雅失其道或天方薦瘥得其宜或錫之純嘏是人情之大竇未有不由於斯者爾其德以頌宣事以類比陳之於學校將可以反正輟淫播之於絲桐何有於剪商變徵屬辭庶因於勸戒緣情孰多夫綺靡嘉魚作而賢者追疑作進焉騶虞廢而王道缺矣至於詩之為稱言以全興詩之為志賦以明類亦有感於鬼神豈止明乎禮義王澤竭而詩不作周道微而興以刺俾乃審音之人于以知風之自洎夫代見更改也運歷於詩祖一作亡自天未喪斯文也以至于皇家於是抑文尚質崇儉去奢振六藝以補化秉一言之無邪不然何以天地奉若而不興雲漢之嗟用能德聲疑作馨而蘋蘩可薦誠達而來牟降生雖九重歲招其諫諍而九有日聞其頌聲且君匪五諫兮何弼詩匪六義兮何成我皇乃以詩而條之國政本乎人情故得行於蠻貊豈獨用之邦國修之身則夀考不忌垂乎後則子孫千億乃知詩之為教蓋亦王猷之至極擲地金聲賦以辭賦髙亮可振金聲為韻王起文含逸韻金有英聲苟操觚而盡妙同擲地而若驚五色相宣諒卷懷而得其瓌麗三品作貢叶攘腕而發其鏗錚信一言之炫耀為百代之光榮當其孫氏能文天台作賦眇眇神邁悠悠精騖發翠屏之藻思掞赤城之麗句既窮嵩嶽之標復得華池之趣清韻秀出芳名獨步飄飄淩雲之氣捧而必觀鈴鈴振䇿之聲擲之可喻亦既成止居然衆欽乃顧良友大誇詞林以為其文蔚其㫖深傳乎人間已見斐然之麗擲諸地表必聞鏗爾之音郁郁眩目鏘鏘動心豈比夫荆山抱玉披沙捒金則知雜懷寶於衆夥惟金聲兮則可炫黼黻於英髦琴疑文律以相髙苟取譬於擊地必先托於含毫匪誇詡以自侈實麗則而不噍觀瓌瑋之變態想熒煌之獻狀聆之於耳疑委地而鏗鏘度之以心在體物而瀏亮金之為寶也可以受礪文之喻金也存乎屬辭披彼丹心始叩音於寂寞臨乎素手同擲光而陸離其價莫竝其言可推經喻滿籯是則然矣字比懸市無以尚之别有書圃斯追文房是循慕綺靡之一擲思金聲之載振所以興詠於上才而思齊於後進端午獻尚書為夀賦以誠以古書資乎聖夀為韻王棨節乃端午經惟尚書當煬帝窮奢之際見蘇公為壽之初五日嘉辰欲有裨於聖德百篇奧義敢將獻於皇居始夫蕤賔既調星火初正雖云祭屈之日合有祝堯之敬咸求玩好冀盡竭其忠勤競薦珍奇願延長於睿聖惟公以邦紀將紊洪圖漸傾欲諷江東之幸思停遼水之征繇是訪注於安國求篇於伏生既逢採艾之時合祈洪算遂托獻芹之禮庶達微誠蓋以文盡雅言事傳上古前王之善惡皆載厯代之安危可覩自然於禮無爽於君有補豈效辟兵之法專用靈符寧依續命之儀祇陳綵縷既而面對丹墀䖍而進之其為贄也非鴈非羔非玉非帛其為書也非易非傳非禮非詩且曰臣則有志匡主無心順時竊以百王之典可為萬歲之資願陛下察所以是究所以非不知枕惟琥珀之珍裘有雉頭之美誠未知典謨訓誥閲斯而北闕長存虞夏商周鑒此而南山相似所以鼓篋斯至稱觴自殊藉手而則為臣矣服膺而在其君乎願因犬馬之誠取為龜鏡欲取絲綸之筆用作規模且浴蘭獻物兮古豈無捧酒祝君兮今亦有誰能持十三卷之雅誥上千萬年之洪夀文苑英華卷六十三
