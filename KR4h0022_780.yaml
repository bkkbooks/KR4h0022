body:
  text: 文苑英華卷七百八十一宋李昉等編佛像上相樂夫人檀龕讃一首西方變讃一首為韋駙馬繡阿彌陀像讃一首净信變讃一首如意輪畫讃一首阿彌陀石像讃一首觀世音菩薩畫像讃一首觀世音像讃一首三如來畫像讃一首金剛經石幢讃一首藥師如來像讃一首繡觀音讃一首地藏菩薩讃一首藥師如來繡像讃一首壁畫三像讃一首千手千眼觀世音菩薩畫像讃一首大羅天尊畫像讃一首藥師如來畫像讃一首繡西方像讃一首釋迦如來像讃一首相樂夫人檀龕讃并序盧照鄰相樂夫人韋氏者益州都督長史胡公之繼親也夫人寓跡蘭閨栖情香岫琢磨六行與三明而並驅馳騖四禪將十訓而齊駕粵以乾封紀歲流火司辰敬造靈龕奉圖真相青蓮皓月爭華蚊睫之端寶樹天倡競爽鴻毛之際納須彌於纖芥嘗謂徒言置由旬於方丈今過其實重宣此義敢為讃云猗歟實相顯允神工規模鹿苑圖寫龍宮分身諦聽列坐談空羣天颯纚衆寶玲瓏雕窗引月鏤網搖風一窺妙境髙謝塵蒙西方變畫讃任華離一切相修諸善法夫如是乃得菩薩心心所感者為應夫如是乃膺多福道無上者歸極感罔極者報親在心佛在相唯心與相唇齒相依二事同源百行宗孝蔣氏兄弟惟孝也哉前殿中侍御史蔣鍊鍊弟前右拾遺鎮鎮弟前無錫尉鏑鏑弟前千牛鏠鏠弟前協律郎錡等泣血三年哀過乎禮願西方上聖永福先人故尚書左丞贈太常卿汝南侯大祥敬畫妙法蓮華變一鋪惟此經開佛知見授聲聞記如來祕藏菩薩一作提上緣始發乎錬也伯仲之心見乎法如來大事之相終成乎太常無餘之度孝矣哉太常盛德公才師訓天下朝廷遂謙冲之德後生興祿士之嘆邦國殄瘁元元安仰華太常故吏也侍御以華情之拳拳見示經變泣對靈相祗感遺仁侍御女弟潤州長史京兆王宙妻次前信州刺史髙陽齊􅀈妻季前拾遺東海徐閟妻哀禮兼極此道也古所難况衰俗乎敬為讃曰大孝尊親其次用勞其次用力蔣氏之子三者備極誠哉孝德匱竭精素哀空上慈乃繢靈相光儀既備景福隨之並無衡量為韋駙馬奉為先聖繡阿彌陀像讃并序蘇頲大唐唐隆元年六月二十二日右金吾將軍駙馬都尉臣韋鐬等奉為先聖三七日繡阿彌陀像一鋪臣聞北極尊者有在天而捨萬邦西方聖者有在天而應三界上比義則無不通下抒情則無不感小臣鐬受恩之極昔也尚主悲鳳聲之莫留中於事君痛烏號之靡逮徵慕一作賤微則殞越何補回向則精誠所慿爰縷陳於法像仍繡揚於繢事伏願蓮花之池莊嚴盛其樂土榖林之野順豫清其梵宫如是重宣敢稱讃曰大聖天子去遺舄大師世尊迎讓席布金摛繡圖神迹厭代乘雲此光宅净信變讃道之元尊洞照前劫身也净信終成後業後業伊何暢我𤣥風𤣥風伊何俾我韋公頃發皇揆鎮于蜀國竭心為政盈耳頌德哿矣夫人繢茲羣真函遷副相欻一作剡天如賔府署因修庭除改製既丹既皓或轉或翳公則斯念余其載覿慕齊舍堂追魯壞壁金海珠樹清都碧虗魂歸自此像設如初禽鳥不入文翁是務神靈所扶文考是賦粵幽讃者老焉釋焉其信受者式護式傳歸以戀兮未以益現即前兮過為昔玉江流兮錦城闢歲永永兮綿奕奕如意輪畫讃并序顧况金剛記寶頂記花三昧頂一作等輪三昧等經云蘇迷盧南有俱露州州西南靣夷羅國俱尸那城南去八千由旬至于雪山兹山純白厥草肥膩髙六十由旬周二千二百拔提河在左長仙園在右清熱惱海在南跋陀海在北善法堂在上瞽龍洞在下日月回泊在俱物羅奢半空脅是龍居此洞地堅牢恆沙諸佛成道諸所如意輪於此山間佛言毗勒那鉢奢無忘無心是離那奢多性本空是祗彌物都思觀身實相是悉那鉢多彌觀佛亦然是又問何者是陀羅尼相貌佛言空觀心無為心廣大心常住心不變異心無無心無無心是恆沙諸佛諸佛摩頂密語也言在身中恐人輕教諸佛不許內外雙立非賢不轉如意輪本名少足少法也其法滿足謂之少足與夫圓滿滿願廣大大悲等慈慈觀智網寶手千手眼得無畏清净光除業道破諸暗無障礙無等等與夫普明慈明千光一有王字佛十億之號猶為至略净華宿一作秀王智佛時所立名記普門願行此應見聞隨方說法法同而名異固云賢劫中千佛助化此為一佛二尊不並願為侍者寶德佛時名安忍童子請願之後名如意輪大悲菩薩是愚於䕃界畫彼真形法華經云一華獻畫像漸見無量佛讃曰同體如來所說惣持法內外雙見為普門大悲廣運無邊際巳渡塵沙生滅海阿彌陀石像讃并序于邵石龕之作司馬楊公福謙室無他贏蓋損已以􅟹事慿厥底績資于有家聖無不通必與此合况西方之樂大㑹之地鳥獸草木長皆為梵聲我心既降彼應潜速故喜施願往者率多於諸方廷尉平于邵聞而讃曰倬現睟容蒼然髙岑上非道隔下不塵侵自一作俯此中逹發彼狂一作羣心往來既護我福攸深右轉清澗前瞻布金獨園對境雙樹齊隂石泉潺潺山木森森詎知竒物未識珍禽西方之因妙樂傳音維是設像毫光載臨去聖何逺兹焉可尋觀世音菩薩畫像讃并序佛功德所以俾福也如鄭童之福得無俾乎間者門闔卒廢僨童上絶倒不寤久之而蘇收在懷抱氣則奄奄心知旁懼口不能言遂啓手足以告全審視聽以示舊膝下之愛辟咡而詔舉以善攝悉能自强父之寮于目而竒之曰不有此慧安有此令鄭氏其興乎竒童名自此而始然則菩薩者利益故觀音者觀世是用繢事發于童心相好巳具大圓既照天衣若飛楊桞疑拂以是慿福信無有邊讃曰竒童竒童兮厄于門門雖廢兮童其存菩薩觀音兮破諸昏丹青相好兮人中尊福我竒童兮永無垠觀世音像讃并序孟冬十月旬有三日我皇帝降誕之辰也百靈㑹祉萬方集慶於是檢校刑部尚書左羽林大將軍紀國公臣髙升與一二軍吏稽首言曰竊稽首窅冥賾乎至精道本無二聖惟歸一超於物則拯拔群迷現於時則亭育衆品電繞之與夜明也豈其俶歟惟聖表聖唐哉皇哉請以真如之像延景洪福粹容晋霍神變燭耀四天周回八部圍繞信足以上旌至德下攄至誠臣哉鄰哉敢為讃曰道本一兮聖無二靈相炳兮我身是狀至聖兮昭至尊叫帝閽兮羾天門福穰穰兮委如山三如來畫像讃并序梁肅法王之身有三曰報曰應曰法報身從無邊功德生應身依無邊衆生生法身從如如無有生分别說三其極一貫原夫人道之體離一切相視其本也積大德施一作得大慧文粹作惠合大道成大身是其報也出入十界隨所利見如水月鏡集有像字是其應也自因至果故不得不有其報病一切病故不得不行其應一作德應亦名也報亦名也名乎哉其實相之賔乎經云觀身實相觀佛亦然嘗試思之以為衆生蓋反佛者也是三相在佛為三德在凡為三障一者生死生死即空寂空寂即法身也二者煩惱即智慧智慧即報身也三者結業即解脫解脫即應身也三德成於悟三障成於迷迷而不復也遂自絶於佛乘集作身哀哉豫嘗齊心命工裂素作繪聖德之形容可舉目而見見而後知集無知字思思而後知至知至之路蓋由是矣瞻仰之不足遂為之讃庶觀者有以知三如來不在心外不可以有無心取云大哉法體體如虛空不始不終不垢不净不邊不中是謂涅槃是謂法身諸佛性海是無上正真右讃毗盧遮那佛妙哉報體體法而大由清净功德集作得下同色無礙德色無礙成實智慧範圍法界盡未來際右讃盧舍那佛神哉化功其集作萬化無方休有烈光以百億色身播百億國土啓權顯實或默或語示我寂滅雙林之下右讃釋迦牟尼佛三聖一身本無有異恆沙諸佛其道一致衆生唯妄覺文粹作竟妄斯至懸像文粹作象著明用鑒心地右揔讃金剛般若波羅密經石幢讃并序二十五有之內根塵相磨生滅相蕩斡流旋集作幼轉往復無際如來憫之於是開智慧門示諸法如義俾夫即動而寂即寂而照假文字以筌意一色空而觀妙然離一切相得無住心二乘逺而不見十住見而不辨如是信解乎難哉隴西李氏先夫人常州刺史獨孤公之伯姊也聖善之德自天而植不捨母訓受持是經內涵道機外順化物十一年八月即世于晉陵郡舍公茹尚右之痛追無作之福纘無集作纘微言於金石庶幽贊乎妙報嘻傾沙界以施而施有窮等山王之大而大有終唯金剛空印永不壞滅蓋夫人福慧之所以臻也於是乎讃脫三解集作界軛入一相地資惠集作慧力兮追琢道妙為祐與道集作為導實懿德兮石可轉而字有磷福不極兮藥師琉璃光如來畫像讃并序聖之道無形無名形以感著名以功立蓋物有病於妄我則喻其醫物有滯於暗我則照其光其行無方有感必應四字集作惟妙無不應神哉仁哉惟唐代宗孝武皇帝之甥某邑長公主之子曰蘭陵蕭位稟靈天潢承訓家範其性孝其氣醇大厯中丁先人銀青光祿大夫光祿卿贈汝州刺史府君之憂自反集作卒哭至于大祥哀敬之禮動無違者長公主戒之曰欲報之德豈止於斯乎歸誠上仁可以徼福爾其志之位於是泣遵德命爰用作繪八十之初集作物十二之願赫然如見其全身肅然如聞其音聲自外入者或疑亂怖投體膜拜而不知其粉繪也嘻昔人有一至之性或通於神祗以致福慶矧夫孝子之哀思大聖之𤣥運幽讃之力可思量哉安定梁肅悅聞其風乃為讃曰披聖籍兮覽𤣥功赫神光兮被無窮勿藥用兮醫之王感斯應兮萬福彰棄于集作系是梁兮出于唐畜純孝兮思不忘綽大象兮景焜煌洞冥冥兮福穰穰繡觀世音菩薩像讃蓮華經普門品載菩薩盛德大業詳矣蓋變動不測之謂神窮神盡性之謂聖慈悲廣運之謂力三者一貫是謂集作為妙覺功不並化尊無二上故佛為法王我為素臣或擬諸形容稱其名號資不匱之力報罔極之恩誰其為之有齊孝女初尚書吏部郎趙郡李公第六女歸于博陵崔綽大厯初居公憂泣血無聲至於大祥既而思求冥祐徼福上聖針縷之間成就莊嚴其用心也至矣乎公之立行立言天下所推焉存為人範沒無異責前際之勝因不可度巳此功德也蓋以展蓼莪者集無者字蒸蒸之心崔氏之子以肅嘗獲升公堂以讃述見託痛梁木之壞慟懷恩三字集作重懷報恩之烈故像設之所集有然字敢著乎辭讃曰菩薩之德相炳而兹慿身以儀之集無之字女也孝思不可方思冀冥福於斯欲報之德斯焉取斯地藏菩薩讃菩薩以大慈運大願𢎞大道濟大苦俾三界之間利見大人如大地之無不持載故號曰地藏有祕書少監兼侍御史李公之甥太原王氏之第幾女頃遭先夫人棄敬養拊劈以暨于小祥或曰此孝也匪報也以報為功則惟地藏乎乃手針縷之事黼而黻之則而像之煥乎有成毫相畢觀者然後知聖善之內訓淑女之孝思至矣哉是可以錫爾類也祕書向集作與豫道之且命讃曰皇矣上仁乃聖乃神厥功備兮有女伊棘孝思罔極厥誠至兮聖儀彰之景福將之無有既兮藥師琉璃光如來繡像讃并序得妙道者聖之大感罔極者孝之至集作大孝有欲報之志聖有善應之功神其願運其力故悲智行焉發乎心彰乎事故像設作焉誰其為之有齊孝婦孝婦姓某氏前新城令栁誠之室也先是居皇姑豆盧氏夫人憂自卒哭及朞呼天之聲不絶自朞至于大祥追福之功不息乃誦金偈乃瞻粹容爰用五綵以成大像莊嚴相好昭焯煥爛凜乎若披毫光而演善願啓清真而屏集作救濁亂至矣夫乃為讃曰光彼千界赫琉璃兮勿藥之師號大醫兮不形之形妙相具兮窈冥一作章施希夷𤣥功著兮孝婦之烈心不渝兮章施五彩福皇姑兮壁畫三像讃并序貞元元年冬十月㑹稽龍興寺釋法忍與門弟子道俗衣冠之衆以五彩色寫釋迦如來像于所居之宇吉祥天女像在左多聞天王像在右德容威神煥赫熙怡為佛股肱作人集有大字依歸至矣哉聖人無形以萬利見為形形生功功生名是像𤣥德存集作在乎前經二上人以豫嘗探微言之所緣起資為之讃以示昧者云上聖有作體神立德天人遵兮我示妙法清我濁劫示存存兮日歸月依集作日月歸依是凖集作威是儀破羣昏兮巍集疊巍字乎北王休有烈光護下土兮俾爾含識躋彼樂域萬物睹兮金甲雄姿示威宣慈我何怒兮唯聖所起吉祥止止天德至兮粵惟首冠集作出佐佑集作勸佐于佛成大事兮髙明婉集作克柔願與道逰滋景福兮息達本二沙門有德有則知聖知神十字集作沙門有則知此聖言圖此妙相示後昆兮實以善利與元元兮千手千眼觀世音菩薩像讃不形之形無形神人之形也當法王御世有元聖曰觀音以感通之妙用運溥博之宏應協讃無上弼成𤣥功神行無方形亦丕變故集作傳此像設施于羣生此其至矣夫彼聾盲者方駭其手目之多以致恢詭集有之誚二字隨諸毁墮集作隨毁隨墮無升濟期可不為大哀乎故壽王府士曹參軍韋侯修身以仁處順而化夫人京兆杜氏既孀始虞哀且顧禮追惟冥祐為素為繢相近而理逺誠著而感深易稱神而明之詩云聿懷多福盡在是矣讃曰良人下世杳冥冥兮配德追逺心不寧兮裂素表聖為丹青兮昭赫綵集作指繪光集作究儀形兮祐彼君子歸福庭兮大羅天尊畫像讃并序維唐肅宗文明武德大聖大宣集無宣字孝皇帝以大功平大難以大孝纂大業少康復業集作匡復下武繼文丕丕崇崇千古同德亦既厭代去而上仙衣冠留于喬嶽曜魄歸乎太極惟夏四月十有八日實遺弓之辰皇上追聖集作藝祖之烈光申孝孫之永慕載揚至集作大道之賾用𢎞上清之福爰詔國工以是日畫大羅天尊像一軀混成真精揮倬神化包裹六極覆露九皇巍乎道主之德相既明至哉聖人之孝思可見小臣肅拜手集作首受詔為之讃云集作曰至陽之原無窮之門大羅之界象帝之尊文明武德有赫孝宣道光乾元人畏軒轅翼翼睿宗嗣武統天或圖尊容追孝前文肅拜稽首臣敢揚言惟此功德載煥載𤣥既祐聖神介福無邊亦祐我后夀考萬年此篇編入佛像門疑是附見藥師琉璃光如來畫像讃並序於戲至人不可得而見之矣所集作以字可見者像設而巳藥師者大醫之號琉璃者大明之道所以洗蕩八苦振燭六幽巍乎其有功復歸於無物蓋其賾集作蹟也皇帝德女唐安公主委化歸真之辰先是命國工繢佛像爰設妙色載揚耿光以追福祥以迪幽贊祐我貴主達于真乘至哉聖人之慈也小臣某拜手稽首而作偈言藥師妙法王光被于十方惟皇大聖主文命敷下土二聖合𤣥德廣運慈悲集作大慈力莊嚴成集作此儀形延福于女英女英受兹福亦以流萬族繡西方像讃道無方所以法不垢不净七字集作法不垢净聖人有以見羣生大迷也乃方以聚之净以極集作趣之應形主之列聖輔之俾夫感而通通而應應而不窮其慈善之功乎皇朝故中書舍人贈華州刺史吳郡朱君夫人扶風馬氏以淑行為宗姻之表明識通出世之道洎居華州之喪晝哭哀慕慟為律呂集作度既而曰豫聞妙覺之用無幽不燭宜勤集作慿上善以福吾夫乃用五綵章施五色發揮德容及二聖輔煥乎有見聖人之妙相與夫人之至誠希夷之中協用休福於是乎在矣肅嘗以文墨從州之逰爰美成功或感斯慟讃曰兊方有國兮至聖居之乃示净妙集作清净兮拯此羣疑美蓮月兮煥金色色相永思兮不可得夫人洞此幽贊力祐我往哲福無極人既往道斯存掌王綸沒州尊體有美德貽後昆誕躋妙域參聖神誰謂至道默昏昏釋迦牟尼如來像讃讃曰法王崩于竺乾露寢集作浸二千嵗矣有像設糟粕留示後世上士得之超詣實際其次奉之為祐為道為津為梁集作筏應之遲速視感之淺深觀其所感聖人之情可見矣杜陵吏鮑君游信道之士也建中興元際君游丁先大夫集作夫人憂孝純誠至哀感亦至謂至道杳冥在擬議之外聖人形容居瞻仰之內集作間有慈力可以追孝有𢎞願可以祐神我儀圖之或讃休福於是合用綵繡煥焉發輝天光照臨睟容肅穆有二元聖為翼謂左右二菩薩以夫人集有氏字母德昭聞君游孝思不怠雖欲無利功德能仁其肯捨諸戲夫孝子之志聞一毫之福可以及親者則竭力而奉之矧夫教行於夷夏理貫於幽明而無良之徒坐生異論以蕞爾愚管之所不及齪然世籍之所不書乃尤集作死字其先人謂作福無益抑犬豕之類爾何人倫足稱豫既美君游之孝因而志集作書之俾不肖者企及云爾文苑英華卷七百八十一
