body:
  text: 文苑英華卷一百八十宋李昉等編省試一𤣥元皇帝應見賀聖祚無疆三首皇帝移晦日為中和節一首主上元日夣王母獻白玉環一首元日望含元殿御扇開合一首元日和布澤一首中和節詔賜公卿尺三首清明日賜百僚新火三首九月九日勤政樓觀百寮獻夀一首南至日隔霜仗望含元殿爐香三首長至日上公獻夀三首恩賜耆老布帛二首恩賜魏文貞公諸孫舊第以道直臣二首御製段太尉碑二首御題國子監門一首御箭連中䨇兔一首太學創置石經一首觀南郊回仗一首聞擊壤一首膏澤多豐年一首東都父老望幸一首嵩山望幸一首華清宫望幸一首謁見日將至雙闕一首望凌烟閣一首望禁苑祥光一首晨光動翠華一首觀北藩謁廟一首西戎即叙一首焚裘一首觀慶雲圖三首府試觀開元皇帝東封圖一首藩臣戀魏闕一首𤣥元皇帝應見賀聖祚無疆殷寅應厯生周日脩祠表漢年復兹秦嶺上更似霍山前昔贊神功起今符聖祚延已題金簡字仍訪玉堂仙睿祖光元始曽孫體又𤣥言因六夣接慶叶九靈傳北闕心超矣南山夀固然無由同拜慶竊抃賀陶甄同前李岑皇綱歸有道帝系祖𤣥元運表南山祚神通北極尊大同齊日月興廢應乾坤聖后趨庭禮宗臣稽首言千官欣賜覩萬國賀深恩錫宴雲天接飛聲雷地喧祥雲飛紫閣喜氣繞皇軒未預承天命空勤望帝門同前趙鐸聖主今司契神功格上𤣥豈唯求傅野更有叶鈞天審夣西山下焚香北闕前道光尊聖日福應集靈年咫尺真容近巍峩大象懸觴從百寮獻形為萬方傳聲教惟皇矣英威固邈然慚無羙周頌徒上祝堯篇皇帝移晦日為中和節王季友皇心不向晦改節號中和淑氣同風景佳名别詠歌湔裙移舊俗賜尺下新科厯象千年正酺醵四海多花随春令發鳥度嵗陽過天地齊休慶歡聲欲盪波主上元日夣王母獻白玉環丁澤夣中朝上日闕下拜天顔彷彿瞻王母分明獻玉環靈姿趨甲帳悟道契𤣥闗似見霜姿白如㸔月彩彎霓裳歸物外鳯厯曉人寰仙聖非相逺昭昭寤寐間元日望含元殿御扇開合張莒萬國來初嵗千年覩聖君輦迎仙仗出扇匝御香焚俯對朝元近雜詠作見先知曙色分冕旒開處見鐘磬合時聞影動承朝日花攅似慶雲蒲葵那可比徒用隔炎氛元日和布澤潘孟陽至德生成泰咸歡煦育恩流輝沾萬物布澤在三元北闕祥雲逈東方嘉氣繁青陽初應律蒼玉正臨軒恩洽因時令風和比化元自慚同草木無以答乾坤中和節詔賜公卿尺陸復禮春仲令初吉歡娛樂大中皇恩貞百度寳尺賜羣公欲使方隅法還令規矩同捧觀珍質麗拜受聖恩崇如荷丘山重思酬分寸功從兹度天地與國慶無窮同前裴度淑景風光媚景雜詠作節皇明寵賜重具寮頒玉尺成噐幸良工豈止尋常用將傳度量同人何不取則物亦頼其功紫翰宣殊造丹誠勵匪躬奉之無失墜恩澤自天中同前李觀陽和行慶賜尺度為臣工一作及羣工寵荷乗一作承佳節傾心立大中短長思合製逺近貴相同共荷裁成德將酬分寸功作程施有用一作政垂範播無窮願續延洪一作南山夀千春奉聖躬清明日賜百寮新火韓濬朱一作玉騎傳紅燭天厨賜近臣火随黄道見烟遶白榆新榮耀分他日一作室恩光共此宸更調金鼎味一作膳還煖玉堂人灼灼千門曉輝輝萬井春應憐螢聚夜瞻望及東隣同前史延上苑連侯第清明及暮春九天初改火萬井屬良辰頒賜恩逾洽承時慶自雜詠作亦均翠烟和栁嫩紅熖出花新寵命尊三老祥光燭萬人太平當此日空復荷陶甄同前王濯御火傳香殿華光及侍臣星流中使馬燭耀九衢人轉影連金屋分輝麗錦茵熖迎紅蕋發烟染緑條春助律和風早添爐煖氣新誰憐一寒士猶望照東隣九月九日勤政樓下觀百寮獻夀沈亞之御氣黄花節臨軒紫陌頭早陽生彩仗霽色入仙樓獻壽皆鴛鷺瞻天盡冕旒菊罇過九日鳯厯肇千秋樂奏薫風起盃酣瑞影收年年歌舞度此地慶皇休南至日隔霜仗望含元殿爐香崔立之千官賀長至萬國拜含元隔仗鑪光出浮霜烟氣飜飄飄縈内殿漠漠澹前軒聖日開如捧卿雲近欲渾輪囷洒宫闕蕭索散乾坤願惹天風便披香捧至尊同前裴次元冕旒初一作親負扆卉服盡朝天晹谷初移一作移初日金爐漸起一作出御烟芬香流逺近散漫入貂蟬霜仗凝逾白朱欄映轉鮮始㸔浮闕在稍見一作竟逐風遷為沐皇家慶來瞻羽衛前同前王良士抗殿疏龍首髙樓接上𤣥節當南至日星是北辰天霜一作寳㦸羅仙仗金爐引御一作瑞烟霏㣲霜闕近溶曵九門一作州連拂樹祥光滿分晴曙一作曉色鮮一陽今在厯生植願陶甄長至日上公獻夀張叔良鳯闕晴鐘度一作動鷄人曉漏長九重初啟鑰三事盡一作正稱觴日至龍顔近天旋聖厯昌休光連雪净瑞氣雜爐香化被君臣洽恩沾士庶康不因稽舊典誰得記一作紀朝章同前李竦候曉金門闢乗時玉厯長羽儀瞻上宰雲物麗初陽漢禮方傳珮堯年正捧觴日行臨觀闕帝錫洽珪璋盛美超三代洪休䧏百祥自憐朝不坐空此詠無疆同前崔琮應律三㣲一作陽首朝天萬國同斗邊㸔子月臺上候祥風五夜鐘初曉千門日正融玉階文物盛仙仗虎雜詠作武唐諱虎字貔雄率舞皆羣辟稱觴即上公南山為聖夀長對未央宫恩賜耆老布帛李絳渙汗中天發殊私海外存衰顔逢聖代華髪受皇恩燭物明堯日垂衣闢禹門惜時悲落景賜帛慰餘魂厚澤沽翔泳㣲生保子孫盛明今尚齒歡洽九衢罇同前張復元殊私及耆老聖慮軫黎元布帛忻天錫生成在主恩情均皆挾纊禮異賁丘園慶洽時方泰仁瞻月告存寧知酧雨露空識荷乾坤擊壤將何幸徘徊對九門恩賜魏文貞公諸孫舊第以道直臣陳彦博阿衡随逝水池舘主他人天意能酬德雲孫喜庇身生前由直道殁後振芳塵雨露新恩日芝蘭舊里春勲庸留一代光彩映諸隣共賀昇平日從兹得諌臣同前裴大章邢茅雖舊錫邸第是初榮迹徃傷遺事恩深感直聲雲孫方慶襲池舘忽春生古甃開泉井新禽繞畫楹自然垂帶礪况復激忠貞必使千年後長書竹帛名御製段大尉碑葉元良多難全髙節時清軫聖君園塋標石篆雨露降天文義激忠貞沒詞傷蘭蕙焚國人皆堕淚王府已銘勲掲出臨新陌長留對古墳睿情幽感處應使九泉聞同前薛存誠葬儀從儉禮刋石荷堯君露迹垂繁藻天哀滿麗文詔深榮嗣子海變記孤墳寳思皆涵象皇心永念勲雅詞黄絹並渥澤紫泥分青史應同久芳聲萬古聞御題國子監門前人宸翰符𤣥造榮題國子門筆鋒廻日月字勢動乾坤簷下雲光絶梁間鵲影飜張英聖莫擬索靖妙難言為著盤龍迹能彰舞鳯蹲更随垂露象常以沐皇恩御箭連中䨇兔前人宸逰經上苑羽獵向閒田狡兔初迷窟纎驪詎著鞭三驅仍百歩一發遂䨇連影射含霜草魂消向月弦驩聲動寒木喜氣滿晴天那似陳王意空垂樂府篇太學創置石經前人聖唐復古制德義功無替奥㫖恱詩書遺文分篆𨽻銀鈎互交映石壁靡塵翳永與乾坤期不逐日月逝儒林道益廣學者心彌鋭從此理化成恩光遍遐裔觀南郊回仗前人傳警千門寂南郊綵仗廽但驚龍再見誰識日䨇開德澤施雲雨恩光變燼灰閱兵貔武振聼樂鳯凰來候刻移宸輦尊時集觀臺多慚逺臣賤不得禮容陪聞擊壤前人堯年聽野老擊壤復何云自謂歡由已寧知德在君氣平閒易暢聲賀作難分耕鑿方随日恩威比望雲簣桴均下調和木等南薫無落於吾事誰將帝已聞膏澤多豐年前人帝德方多澤莓莓井逕同八方甘雨布四逺報年豐厫庾千箱在幽流萬壑通候時勤稼穡擊壤樂農功畎畆人無惰田廬嵗不空何湏憂伏臘千載賀堯風東都父老望幸前人鑾輿秦地乆羽衛洛陽空彼土雖慿固兹川乃得中龍顔覲白日鶴髪仰清風望幸誠逾邈懐來意不窮昔因封泰岳今佇躡維嵩天地心無異神祗理亦同翠華翔渭北玉檢候闗東衆願其難阻明君早勒功嵩山望幸前人峻極位何崇方知造化功降靈逢聖主望幸表維嵩隐映連青壁嵯峨向碧空象車因叶瑞龍駕願升中萬嵗聲長在千巖氣轉雄東都歌盛事西笑佇皇風華清宫望幸前人驪岫接新豐岧嶤駕碧空鑿山開秘殿隐霧蔽仙宫絳闕猶棲鳯雕梁尚帶虹温泉曽浴日華舘舊迎風肅穆瞻雲輦深沉閉綺櫳東郊望幸處瑞氣靄濛濛謁見日將至䨇闕前人曉色臨雙闕㣲臣禮位陪逺驚龍鳯覩誰識冕旒開藹藹千年盛顒顒萬國來天文標日月時令布雲雷逈出黄金殿全分白玉臺雕蟲竟何取瞻戀不知廻望凌烟閣劉公興畫閣凌虚構遙瞻在九天丹楹崇壯麗素壁繪勲賢靄靄浮元氣亭亭出瑞烟近㸔分百辟逺揖誤羣仙圖列青霄外儀刑紫禁前望中空睿景驤首幾留連望禁苑祥光蔣防佳氣生天苑葱蘢幾效祥樹摇三殿際日映九城傍仙霧寧同色卿雲未可彰眺汾疑鼎氣臨渭想榮光當並舂陵發應開聖厯長㣲臣時一望短羽欲飛翔晨光動翠華闕名早朝開紫殿佳氣逐清晨北闕華旌在東方曙景新影連香露合光媚慶雲頻鳥羽飄初定龍文照轉真直宜冠佩入長愛冕旒親搖動祥雲裏朝朝映侍臣觀北藩謁廟王卓肅肅層城裏巍巍祖廟清聖恩覃布濩異域獻精誠冠盖分行列戎夷變姓名禮終齊百拜心潔盡忠誠瑞氣千重色簫韶九奏聲仗移迎日轉斾動逐風輕休運威儀盛豐年爼豆盈不堪慚頌德空此望簮纓西戎即叙李子昻懸首藁街中天兵破犬戎營收低隴月旗偃度湟風肅殺三邊勁蕭條萬里空元戎咸服罪餘孽盡輸忠聖理符軒化仁恩契禹功降逾洞庭險梟擬郅支窮已散年疑容捷還資妙筭通今朝觀即叙非與獻獒同焚裘闕名今主臨前殿懲奢爇異裘忽㸔陽熖發如覩吉光流麗彩辭宸扆餘香在御樓火随餘燼滅氣逐逺煙浮素朴回風變琱華逐志休大垂恭儉德千古揖皇猷觀慶雲圖闕名五雲從表瑞藻繪宛成圖柯葉何時改丹青此不渝非烟色尚麗似盖狀應殊渥彩㸔猶在輕隂望已無方將偶翠幄那羡起蒼梧欲識從龍處今逢聖合符同前栁宗元設色方成象卿雲示國都九天開秘祉百辟贊嘉謨抱日依龍衮非烟近御爐髙標連汗漫廻望接虚無裂素榮光發舒華瑞色敷恒將配堯德垂慶代河圖同前李行敏縑素傳休祉丹青狀慶雲非烟凝漠漠似盖乍紛紛尚駐從龍意全舒捧日文光因五色起影向九霄分裂素觀嘉瑞披圖賀聖君寧同窺汗漫方此覩氛氲府試觀開元皇帝東封圖馬戴儼若翠華舉登封圖乍開冕旒明主立冠劍侍臣陪迹類飛仙去光同拜日來粉痕疑檢玉黛色訝生苔挂壁雲將起陵風仗若廻年年復東幸魯叟望悠哉藩臣戀魏闕蔣防剖竹随皇命分憂鎮大藩恩波懐魏闕獻納望天閽政奉南風順心依北極尊夣魂通玉陛動息寄朱軒直以蒸黎念思陳政化源如何子牟意今古道斯存文苑英華巻一百八十
