body:
  text: 文苑英華卷五百八十六宋李昉等編藩鎮謝官三為同州顏中丞謝上表一首代鄭南海謝上表一首為安平公兖州謝上表一首為濮陽公陳許謝上表一首刺史謝上表十三首為同州顏中丞謝上表謝楚臣某言伏奉恩制授臣同州刺史本州防禦長春宫等使即以今月八日到任上訖載服明命叨塵寵光逾涯之榮滿覆是懼臣某中謝臣幸逢昌時早獲入仕由乎邑吏參佐戎藩材謝中人官寧期逹聖朝道廣菅蒯不遺遂得牧守連擢大郡徒以清心自約直質在公未申致命之誠久負竊位之責前秋屬姦凶構禍譟動諸方臣所部當州首為劫脅乃藉天聲以告鄰境戮其偽將以阻姦謀蓋知無不為是臣職分陛下特録其微效超授方隅從政未洽於逺人進律俄遷於近輔非次之奬臣何以膺又臣伯父贈太師臣真卿在肅宗朝嘗典兹郡餘蹤遺事較然可徵臣以不腆之姿繼序官業誠比德非省疑陳力異能而代受國恩若未失墜臣不勝感涕榮荷之至當今德澤被於寰宇薰風襲於隱微俗臻大寧吏易為理臣専奉揚大化申報皇慈事有未便于人者續且條奏以酬陛下子育之旨臣無任戴恩隕越之至代鄭南海謝上表吕溫臣某言臣自逺集作違離闕庭晨夜奔涉祗承寵命不敢遑寧謹以某月某日到所部上訖仰集作奉宣聖旨親諭逺人酬恩之效未期戀主之誠已積臣某誠恐集作感誠懼頓首頓首臣本章句諸生器用無取徒以小心畏敬謬為先聖所知趨奉禁闈浸踰星紀屬內外危疑之際是非剖判之初實以艱貞自持中立無倚天高聼近愚欵獲申神幽鑒眀昌運斯屬遂蒙陛下擢於侍從超冠等倫用其憂國之寸心委以代天之重務俯僂三命炎涼五周登車奉馭朽之懷假寐感宵衣之志徒耗神用莫能將眀篋盈謗而方賜駃騠鼎折足而未忘簮履集作屨竟以陳乞遂其優容無綺季夏黃之德而猥當調護無竇融賈復之勞而獲奉朝請以此沒齒猶為負恩豈意曾未踰年忽蒙抽奬廟授鈇鉞廷賜旌旗俾臣懦夫當此大任節制五嶺幅貟萬里伏波之銅柱猶在永謝竒功士燮之鼓吹日聞彌慙武幹將何以宣美皇化振揚國威洗愆責於千齡答生成於再造唯當舉章修法苦節清心撫獷俗以思柔酌貪泉而無懼庶幾萬一仰副憂勤但以白日在天長安不見丹涯限地溟海方深顧蒲柳之前衰奉軒墀而尚逺無任感戀屏營之至謹差某官某奉表陳謝以聞為安平公兖州謝上表李商隱臣某言臣自承眀詔移鎮東藩望闕而血涕以辭戒途而星奔不息即以今月五日到任上訖當時集軍州官吏等宣布皇風闡揚玄造歡聲雷動嘉集作喜氣雲高臣某中謝臣本由儒業獲厠榮朝粵自烏臺至于青瑣纍更近地皆奉休期用盡心以書紳長憂福過取知足而銘座敢傲時來旋屬皇帝陛下垂意闕城推心甸服俾之防遏兼使緝綏橫被天波未移星琯豈期非次忽致殊遷察俗雄藩分榮大憲地濵河濟山奄龜蒙本孔里周封有堯祠舜澤九州之名數甚古三代之禮樂舊傳退省何人合安兹地撫躬而浹集作沾背汗下仰恩而溢靣淚流况所部驍雄素兼節制為於當代便屬文臣畫虎聚螢昔唯久事筆硯佩鞬帶鶡今寧能執干戈幸臣前在葉州日虔奉詔條克宣戎律檢下而羊無久牧馭黠而犬用左牽用令去任之時大有遮留之請盡三屬縣至萬餘人不放即途皆來卧轍竟稽朝發遂致宵奔請於兹時亦因前政冀漸令蘇息長使謐寧然後逺訪雲亭高尋日觀備萬乘登封之所設諸侯朝宿之儀盛禮獲窺微願斯畢過此已往不知所圖無任戴恩隕越之至謹差某官某奉表陳謝以聞為濮陽公陳許謝上表臣某言臣伏奉去月八日制書授臣前件官臣即以某月日到任上訖當時集軍州官吏僧道耆老等諭揚皇集作玄化宣布睿慈連營咸鼓於巽風闔境均霑於兊澤臣某中謝臣材謝漢飛義慙燕使集作客獻書求試學劒邀勳大舸干艘早竊樓船之任勝兵萬數晚兼車騎之名雖任在啓行而時當柔逺珠崖銅柱祗務廉平麻壘艾亭莫能恢復旋屬皇帝陛下荆枝叶慶棣蕚傳輝臣得先中墨車入拜丹陛蘭臺假號棘署參榮奉漢后之園陵獲申送往掌周王之廪庾方切事居不謂遽董戎旃還持武節賜國既高於七命承家又慶於重侯維彼壁田實聨鼎邑古之近甸今也雄藩想像汝南星聚而先賢未逺經過潁上水濁而強族皆除况在昔年常鄰多壘載瞻軍額深見士心貴忠孝之兩全則忠可移孝正文武之二道則武可輔文將謀將領之能必重英蒙之選豈虞拔擢乃出孱微謹當阜俗而必致人和貞師而不為兒戲使流庸自占驍悍知方任棠水薤之規臣當可服黃霸米鹽之政臣亦不遺粗勤報效之資用贖食叨集作叨之責奉違軒鏡幾落堯蓂比園葵以自傾書唯向日羡海槎之不繫秋則經天感激而淚血霑衣兢憂而汗雨浹集作洽背無任感恩戀闕兢惕屏營之至濠州刺史謝上表獨孤及臣及言臣伏奉今年五月一日敕授臣使持節濠州諸軍事濠州刺史臣頃待罪禮官備員郎署職曠無補增懼且愧陛下不以臣愚擢居二千石之列今之刺史古之諸侯州人安否係在一吏臣非其才無以稱旨奉詔之日懼又甚焉以閏六月十二日到任所集作所部上訖唯當奉宣聖猷竭誠帥下瞻戀天造酬效無階無任喜懼之至謹附驛奉表陳謝以聞臣及誠惶誠恐頓首頓首常州刺史謝上表臣及言臣伏奉去年十二月二十三日敕授臣使持節常州諸軍事守常州刺史克常州類表作當道團練守捉使臣伏以江東之州常最集作州為大類表作常為大部陛下不以臣不肖拔臣於羣吏之中以考則年未久以勞則功無可録而除拜之次加於人一等臣及誠惶誠恐頓首頓首臣往嵗常忝諌官歷博士尚書郎之秩雖備嘗獻納纍黷天聰集作聽竟無絲髮禆補盛眀集作眀盛及典濠舒二州出入七年又不能副陛下政平訟息與我共理集作此之嘆至如流人自占旱不為災實由陛下當勤雨集作恤之初下哀痛之詔寬減租稅入三分之二是以和氣傍感災變為福福流臣州人是以乂類表作泰臣寧敢貪天之功以為已力今陛下賜臣詔曰斷獄嵗減流庸日歸以人俗之豐給當淮湖之災旱陟爾眀效宜列中朝臣無其實謬奉殊奬集作恩伏覽聖旨惶悚隕越况遇陛下厲精百揆之始日以堯吁舜咨旁求俊造或經時不除一吏除必公才為先茍非其人位不虛授縉紳之輩僥幸望絶臣當此時類表作如此非獨荷榮寄人之多幸將自臣始致冦速謗實憂自類表集作自臣貽今以三月十七日到州上訖雖欲勉勵疲鈍勤集作增修吏職懼力不逮上纍皇明奉詔夕惕且慙且駭無任感戴喜懼之至謹奉表陳謝以聞為張洪州刺史謝上表臣某言伏奉某月日敕除臣使持節都督洪府集作州諸軍事洪州刺史充洪府等七州都防禦觀察等使臣才不如人位忽過量仰戴天造兢然自矢臣某誠惶誠恐頓首頓首臣往嵗安祿山以盜泉飲臣臣受左袵之辱而不能死陛下以鴻私活臣臣荷乾坤之施而不能答徒竊寵榮類表作秩三典藩郡至如俗阜類表作幸不擾人或小康此實堯風被物比屋日用臣敢貪天功以為已力不謂陛下奬勤是務以臣為勤自春徂秋凡三錫命九州之伯臣忝其一况豫章重鎮荆揚奧區五嶺控其南九江在其北軍師之統集作連率所統安危是繫分憂之寄豈臣足當負荷恩光集作輝懼隕越于下今以某月日到任所集作所部上訖謹當靖恭守位夙夜在公宣皇猷以導風俗仗天威以訓師旅庶以四境無虞百姓輯睦為報力或不足則繼之以死臣之分也敢有二事臣無任感戴喜懼之至謹奉表陳謝以聞為張濠州謝上表臣休集作沭言臣頃陷身凶族待罪黃沙戮社釁鼓職集作是臣之分陛下照臣以日月之光察其微懇拔臣於縲絏之下授以専城今日餘生實聖朝所賜寵章榮命豈賤臣之心碎首粉骨未答天造今以某月日到濠州上任訖類表作到州上訖謹當竭力守官正身率下勉勵苦節緝綏疲人冀立犬馬之誠或伸絲髮之效無任感懼之至謹附表陳謝以聞代容州刺史謝上表時在郎州相逢因以見託劉禹鍚臣某言伏奉某月日制授臣容州刺史兼御史中丞充本路川文粹作管經略招討等使臣發開州日已差某官某奉表陳謝伏以道途遐阻水陸縈紆臣以今月某日到本任上訖謹宣聖旨慰諭逺人臣某中謝臣本書生素無吏術頃因多幸賁自川文粹作及丘園纍沐聖慈驟居清貫識昧通變動乖事宜慚集作愧無善狀以塞公責伏惟睿聖文武皇帝陛下凝旒穆清洞照寰海恕臣本性抃愚賜以恩輝拔一作被於廢棄逺辭偏郡重鎮集作委方隅捧印綬而為榮望闕庭而增戀雖到官之始惠未及人而率下之誠務先克已凡施政教皆稟詔條參以土宜遂其物性可行必守有弊必除使集作便蠻夷生梗之風慕臣子盡忠之道力誠不足心實在兹伏乞聖眀俯賜照集作昭鑒連州刺史謝上表臣某言伏奉去三月七日制授臣使持節連州刺史恭承睿旨跪奉詔書皇恩重於丘山聖澤深於雨露抃舞失次神魂再揚誠歡誠懼頓首頓首臣性本愚拙謬學文詞幸遇休明纍登科第出身入仕並不因人德宗臨御之時臣忝御史陛下龍飛之日臣忝郎官恭守章程勤修職業權臣奏用蓋聞虛名實非曲求可以覆視迹卑易枉無路自眀亦緣臣有微才所以嫉臣者衆競生口語廣肆加誣伏賴陛下至仁特從寬集作寬刑典舉以緣坐貶佐遐藩屢易集作變星霜頻經恩赦犬馬懷戀寢興匪寧惟讀佛經願延聖算集作壽昨蒙詔命追赴上都隨例授官俾居逺郡在臣之分榮幸已多伏荷陛下孝理𢎞深皇眀照燭哀臣老母羸疾憫臣一身零丁特降新恩移臣善郡集作得移善部光榮廣被母子再生凡在人臣皆感聖德凡為人子皆荷聖慈豈惟賤臣獨蒙集作受恩造不覺喜極至于涕零昔殷王俯念於前禽且聞解網漢帝有哀於少女爰命罷刑方之聖朝不足多尚感召和氣慰安羣生非臣隕越所能上報伏以南方癘疾多在夏中自發郴集作柳州便染瘴瘧扶策在道不敢停留即以今月十一日到州上訖謹宣聖旨以示逺人恭述詔條所期安復集作福庶無任感恩戀闕之至此篇元編在五百八十七卷今移此和州刺史謝上表臣某言伏奉制書授臣使持節和州諸軍事守和州刺史臣自理巴賨不聞善政恩私忽降慶抃失容臣某中謝伏惟皇帝陛下丕承寶祚光闡鴻猷有漢武天人之姿稟周成睿哲之德發言合古舉意通神委用得人動植咸恱理平之速從古無倫微臣何幸獲覩昌運臣業在詞學早嵗策名德宗尚文擢為御史出入中外歷事五朝纍承恩光三換符竹在分憂之寄祿秩不輕而素蓄所長效用無日臣聞一物失所前王軫懷今逢聖朝豈患無位臣即以今月二十六日到所任上訖伏以地在江淮俗參吳楚災旱之後綏撫誠難謹當奉宣皇風集作恩慰彼黎庶久於其道冀使知方伏乞聖慈俯賜照集作昭鑒臣無任蘇州刺史謝上表臣某言伏奉制書授臣蘇州刺史始從郎署出領郡長承命若驚省躬增集作知感臣某中謝伏惟皇帝陛下受上玄之眷佑揚列聖之耿光大康黎元慎擇牧守德音每發品物咸蘇臣本書生素無黨援謬以薄技三登文科德宗皇帝擢為御史在臺三載例轉省官永貞之初權臣領務遂奏録用蓋聞虛名惟守職業實無朋附一作裨補竟坐飛語貶在遐藩憲宗皇帝後知事情却授刺史凡歷外任二十餘年伏遇陛下應物重光物無廢滯收拾耆舊塵忝班行既幸逢時常思展效在集賢院四換星霜供進新書二千餘卷集作集供御書二千餘卷儒臣之分甘老於典墳優詔忽臨又委之符竹分憂誠重戀闕滋深石室之書空留筆札金閨之籍已去姓名本末可眀申雪無路豈意聖慈𢎞納不隔卑微靣辭之日特許外殿天顔咫尺臣禮兢惶不敢盡言空懷誠懇謝恩而出生光於九陌之間授訓而行布政於五湖之外臣即以今月六日到任上訖伏以水災之後物力素集作索空臣謹揚川文粹作以集作宣皇風慰彼黎庶臣聞有味之物蠧蟲必生有才之人讒言必至事理如此古今同途了然辨之唯在眀聖伏惟陛下察臣此言則天下之人無不幸甚江海逺地孤危小臣雖雨露之恩幽遐必被而犬馬之戀親近為榮臣無任汝州刺史謝上表臣某言伏奉去年七月十四日詔書授書使持節汝州諸軍事守汝州刺史兼御史中丞充本州集作道防禦使餘如故者臣久居逺服戀闕常深忽降新恩近鄉為貴承旨慶抃省躬慙惶臣某誠歡誠喜頓首頓首伏惟皇帝陛下垂衣清穆之中旁照寰瀛之內車書所及動植咸安臣昨離班行逺守江徼延英辭日親奉德音知臣所部災荒許臣到任條奏恭承睿旨宣示羣黎減其征徭頒以賑賜伏蒙聖澤救此天災疲羸再蘇幼艾同感二年連遭水潦百姓幸免流離交割之時户口增長雖才術不至於事未周而憂勞則深為衆所悉臣本業儒素頻登文科帝命遽回集作時命遭回再領軍郡即以今月二十七日到州上訖謹當奉宣聖化慰撫集作彼蒼生臨汝海集作水之波朝宗尚阻望秦城之日回照何時臣無任感激屏營之至同州刺史謝上表臣某言伏奉去年十月二十二日制書授書使持節同州諸軍事守同州刺史兼御史中丞充本州防禦長春宫等使恩降九重榮忝三輔承旨慶抃省躬慙惶臣某中謝伏惟皇帝陛下丕承列聖光闡鴻猷氛祲掃除乾坤交泰臣幸逢昌運纍沐殊私空荷生成之恩寧酬雨露之澤即以今月二十日到州上訖謹宣睿旨安慰蒸黎伏以本州四年以來連遭旱損閭閻凋瘵逺近共知臣頃任蘇州之年亦遭大水之後面辭之日親奉德音至於撫綏皆承聖教二年之後百姓獲安今本部災荒物力困涸忝為長史敢不竭誠即須滌流續具聞奏臣恪居官次幸接王畿不獲拜舞彤庭陳露丹慊犬馬懷戀寢興匪寧瞻魏闕之容朝天尚阻望長安之路近日為榮臣無任感激屏營之至為道州許使君謝上表令狐楚臣某言伏奉某月日敕旨授臣道州刺史恭承榮命拜伏寵光如出井谷而見日月臣某中謝臣聞周室建侯每先親舊漢朝置守必選循良臣公才蔑聞利用無取自幼及壯終艱且拙然而竭誠以許國必盡二字類表作畢力而在公一辭朝右纍守郡佐不寒自栗無水而沉伏惟陛下頒帝堯分命之典敷孝宣共理之詔方須俊乂以輯惸嫠若臣之倫何敢望此不圖恩從上降命自中出付以金印委之竹符立有光耀坐生羽翼荷天地之德戴山為輕感雨露之仁測海猶淺謹以某月日便道到州上訖誓當佩韋以勵志置水而清心酌逺俗之便宜節下人之好惡使豪奪類表作舊斂手疲羸息肩雖不足稱陛下愼擇眷求之意其於乾乾憂濟庶分萬一臣官守所限不勝疑蹈舞天庭無任衡州刺史謝上表穆宗臣某言去九月十五日於宣州伏奉某月日敕旨貶授臣使持節衡州諸軍事守衡州刺史散官勳賜如故仍馳驛發遣者嚴威成命忽降自天戰灼飛魂如臨于谷臣某中謝臣素以凡品謬登高位雖滿盈是一作之戒每剖一作刻肺腑而怨讟所歸難防頰舌屬奉陵無狀選吏不精多偷見緡一作錢連斃枯木擢臣之髮豈可贖罪粉臣之骨不足勝刑伏惟皇帝陛下德厚於乾坤眀齊於日月斷自深慮遽置寬科降受郡符錫留命服九重殊渥再荷生成萬殞殘骸何由報效以今月十二日到所部上訖伏以君親同致臣子一例一作列情有思於聞逹理合具而奏陳今臣官忝頒條職非奉使謝上之外拜章無因欲隱默而不言懼中傷而未已何者微臣頃蒙朝奬謬列宰司誠不曾壅隔賢才一作才賢怨臣者至寡辭京之後毁臣者則多今却望朝廷更無庇援曲全孤賤唯託聖明特乞眷慈俯鑒哀懇庶使窮鱗懷躍波之望幽蟄有聞雷之期仰天垂涕伏地流汗不勝感恩懼罪戰栗屏營之至臣無任一作皆唐類表為石州刺史謝上表臣某言伏奉某月日恩制一作勑授臣石州刺史持節石州諸軍事謹以某月日到所部上訖祗奉一作拜明命伏深戰越臣某中謝臣本瑣材素無明略雖被堅執鋭曾立絲髮之功而化人成俗未知韋弦之政豈意陛下録其微效忘一作委此無能付臣以六條之法委臣以千里之地况離石古郡洪河巨防官惟其人位不虛授內顧一作揣庸劣將焉克堪誓當宣陛下之風逹其堙鬱布陛下之澤潤其枯稿少助神化微分聖憂然後退歸農畝以一作違避賢路臣不勝悃欵屏營之至一作皆唐類表文苑英華卷五百八十六
