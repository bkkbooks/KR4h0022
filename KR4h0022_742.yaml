body:
  text: 文苑英華卷七百四十三宋李昉等編武辨侵伐論一首伐國論一首守在四夷論一首戰論一首守論一首二陳圖論一首將略論一首倒戈論一首辨侵伐論栁宗元春秋之説曰凡師有鍾鼓曰伐無曰侵周禮大司馬九伐之法曰賊賢害人則伐之負固不服則侵之然則所謂伐之者聲其惡於天下也聲其惡於天下必有以饜集作厭于天下之心夫然後得行焉古之守臣有朘一作私又作傷又作沒人之財危人之生而又害賢人者內必棄於其人外必棄於諸侯從而後加伐焉動必克矣然猶校德而後舉量力而後會備三有餘而集作以用其人一曰義有餘二曰人力有餘三曰貨食有餘是三者大備則又立其禮正其名修其詞集作辭其害物也小則誥誓命集作徴令不過其鄰雖大不出所暴非有逆天地橫四海者不以動天下之師故師不踰時而功成焉斯為人之舉也故公之公之而鍾鼓作焉夫所謂侵之者獨以其負固不服而壅王命也內以保其人外不犯於諸侯其過惡不足暴於天下致文告修文德而又不變然後以師問焉是為制命之舉也集無也字非為人之舉也故私之私之而鍾鼓不作斯聖人之所志也周道既壞兵車之軌交於天下而罕知侵伐之端焉是故以無道而正無道者有之以無道而正有道者有之不增德而以遂威者又有之故世日亂一變而至於戰國而生人耗矣是以有其力無其財君子不以動衆有其力有其財無其義君子不以帥師合此三者而明其公私之説而後可焉嗚呼後之用師者有能觀乎侵伐之端則善矣伐國論李德裕自古得伐國之女以為妃后未嘗不致危亡之患者何也亡國之餘焉能無怨氣其立基創業之祖宗必皆一時之英傑其社稷山川之鬼神常為一國之所奉授集作愛其血食忿其滅亡故能為厲矣必生分美之色蠱惑當世之君使其骨肉相殘以壞於內君臣相疑以敗於外危亡之兆鮮不由此史蘇所謂必有女戎妹喜妲已褒姒是也史蘇所謂集作言之詳矣今不復論是以晉獻得驪戎佚女太子有雉經之酷禍及三世符堅納慕容姊弟秦宫有鳯兮之謡敗於五將符堅於五將山敗滅梁武取東昏所幸幾至危國隋文嬖陳主之妹終於集作必殞身此其集作皆禍敗之著明者矣又夏姬入荆子反疲於奔命吳人始叛楚矣吳嬪至晉世祖怠於為政禍亂遂集作乃相尋矣所以王圭覩廬江美人正言納説如王圭者可謂識微之士明於禍福矣守在四夷論傳曰古者天子守在四夷蓋言能令四夷不侵咸自守境洎周漢迄隋多不知守身但欲令四夷自守殊不知四夷自守其身宜知自守也因著論以明之何者夫守之大旨山文粹作凡以防攻也善防其攻者莫若防其敗善防其敗者莫若防其亡夫四夷不守境不過於略地侵城是有敗無亡也若王者之貴如天如地茍落一星伐一樹不足損天地之光輝一作曜蓋帝王之權能殺人能生人能達人能窮人能貧人能富人故一國之人思親一無親字之必伺君好而贊之雖似親之其實攻之王者守大道淪一作論非道昌一作是則不見敗而有亡也況四夷之攻至難者有四國人之攻至易者亦有四四夷之攻以白刃國人之攻以巧言四夷之攻以鼓􅎏國人之攻以祕隱四夷之攻以兵相害國人之攻以矯相親四夷之攻以兵相侵國人之攻以矯相益故觀白刃則懼而思守也聆巧言則甘一作恱而思受也聽􅤯鼓則警而思備也遇祕隱則懵而思述也逢相害則恚而思讐也見相親則惑而思近也值相侵則忿而思報也得相益則和一作喜而思鄰也攻邉則人人思守也攻身則人人思受也抑人情之常非所鑽鑿而異也且王者之守有六失守之不固則非道攻之守之不貞則色攻之守之不約則聲攻之守之不亷則聚斂攻之守之不儉則奢侈攻之守之不正則邪佞攻之守之不仁則征伐攻之夏捨淑德而嬖妹喜是色攻而亡也殷捨德音而耽愔愔是聲攻而亡也周厲捨亷節而恱榮夷公是聚斂攻而亡也秦始皇捨節儉而起阿房是奢侈攻而亡也漢靈捨正直而近刑人一作而用刑臣是佞幸攻而亡也隋煬捨慈仁而事遼東是征伐攻而亡也自三王百代無四夷之攻而亡者皆以守身不謹為嗜欲所攻二字川文粹作攻而亡故也雖得四夷自守復何益哉或云幽王一有自以二字為犬戎所滅僧孺以為幽王自以守道不固頻舉偽烽嗷嗷天下空於杼柚英華作小東大東杼柚其空加以褒姒以色攻俾諸侯不信而敗非獨由於四夷也至於晉之十六國稽其夲則禍生於惠帝也賈后以色攻賈謐以佞攻致令八王並興生人減半然後戎夷乘間敢為一作有窺覦可謂四夷先起於內不由四夷不守於外也故有德者必先守身而後四夷無德者不先守身但令一作務四夷自守曾不防戎夷一作狄在其中國故攻秦之胡者二世也豈必東夷南蠻西戎北狄哉沈尹戌雖舉守四夷之言而未盡一作不盡守身之道是載華而略實非垂範之旨也敢因文字以附簡書一作編之闕一作皆唐文粹戰論并序杜牧兵非危也榖非殫也而戰必挫北是曰不循其道也故作戰論焉論曰河北視天下猶珠璣也天下視河北猶四支也珠璣茍無豈不活身四支茍去吾不知其為人何以言之夫河北者俗儉風渾淫巧不生朴毅堅強果於戰耕名城堅壘峉音額嶭互結切相貫高山大河盤互交鎖加以土息健馬便於馳敵是以出則勝處則饒不窺天下之産自可封殖亦猶夫農之家不待珠璣然後以為富也天下無河北則不可河北既虜則精甲鋭卒利刃一作刀良弓健馬無有也卒蔟忽切然夷狄驚四邉摩封疆出表裏吾何以禦之是天下一支兵去矣河東盟津滑臺大梁彭城東平盡宿厚兵以塞虜衝是六郡之師嚴石護強不可他使是天下二支兵去矣六郡之師厥數三億低首仰給橫拱不為則緣一作沿淮已北循河之東南盡海西叩洛經數千里赤地盡取才能應費是天下三支財英華作兵去矣咸陽西北戎夷大屯赫呼膻腥一作臊徹於帝居周秦軍師不能排闥於是盡剷吳越荆楚之饒以啖戍兵一作兵戍是天下四支財去矣乃使吾用度不周徴徭不常無以膏齊民無以接四夷禮樂刑政不暇修治品式條章不能備具是天下四支盡解頭腹兀然而已焉有人解四支其自以能久為安乎今者誠能治其五敗則一戰可定四支可生夫天下無事之時殿寄大臣偷處榮逸為家治具戰士離落兵甲鈍弊車騎一作馬刓弱而未嘗為之簡帖整􅎖天下雜然盜發則疾毆疾戰此宿敗之師也何為而不北乎是不搜練之過者其敗一也夫百人荷戈仰食縣官則挾千夫之名大將小禆操其餘羸以虜壯為幸以師老為娛是執兵者常少糜食者常多築壘未乾公囊已虛此不責實料食之過其敗二也夫戰輒小勝則張皇其功奔走獻狀以邀上賞或一日再賜一月纍封凱旋未歌書品已崇爵命極矣田宅一作宫廣矣金繒溢矣子孫官矣焉肯搜竒外死勤於我一作戎矣此賞厚之過其敗三也夫多喪兵士顛翻大都則跳身而來刺邦而去回視刀鋸萊色甚安一嵗未更旋已立於壇墀之上矣此輕罰之過其敗四也夫大將將兵柄不得專恩臣詰責第來撝一作惲之至如鏜然將陳殷然將鼓一則曰必為偃月一則曰必為魚麗三軍萬夫環旋翔佯愰駭之間虜騎乘之遂取吾之鼓旗此不專任責成之過其敗五也元和時天子急太平嚴約以律下常團兵數十萬以誅察天下乾耗四嵗然後能取此蓋五敗不去也長慶初盜據子孫悉來走命是內地無事天子寬禁厚恩與人休息未幾而燕趙甚亂引師起將五敗益甚登壇注意之臣死竄且不暇復焉能加威於反虜哉今者誠欲調持干戈灑掃垢汙以為萬世安而乃踵前非是不可為也古之政有不善士傳言庶人謗發是論者亦且將書於謗大傳於士大夫非偶一有言字而已一作皆唐文粹集本並同守論并序往年兩河盜起屠囚大臣劫戮二千石國家不議誅灑束兵自守反修大厯貞元故事而行姑息之政是使叛臣文粹作逆輩益橫終唱患禍故作守論焉論曰厥今天下何如哉干戈朽鈌鉞鈍含𢎞混貸煦育逆孽殆為故常而執事大人曽不厯算周思以為宿謀方且嵬崖抑揚自以為廣大繁昌莫已若也嗚呼其不知乎其俟蹇頓顛傾集作頺而後為之支計乎且天下幾里列郡幾所而自河已文粹作以北蟠城數百金堅蔓織角奔為冦伺吾人之憔悴文粹作憔悴天時之不利則將與其文粹無其字朋伍羅絡郡國將孩乳文粹作駭亂吾民於掌股之上耳今者及吾之壯不圖擒取而乃偷處恬逸第第相付以為後世子孫背脅疽根此復何也今之議者咸曰夫倔強之徒吾以良將徑兵以為銜䇿高位美爵充飽其腸安而不撓外而不拘亦猶豢擾虎狼而不拂文粹作佛其心則忿氣不萌此大厯貞元所以守邦也亦何必疾戰焚煎吾民然後以為快也愚曰大厯貞元之間適以此為禍也當是之時有城數十千百卒夫則朝廷待之貸以法故於是乎闊視大言自樹一家破制削法角為尊奢天子飬威而不問有司守恬而不呵王侯通爵越録受之覲聘不來几杖扶之逆息虜胤皇子嬪之裝緣采􅎖無不備之是以地益廣兵益強僣擬益甚侈心益昌於是土田名器分劃大盡而賊夫貪心未及畔岸遂有淫名越號或帝或王盟詛自立恬淡不畏走兵四略以飽其志者也是以趙魏燕齊卓起大唱文粹作倡新唐書藩鎮傳作同日而起梁蔡吳蜀躡而和之其餘混傾軒囂欲相效者往往而是運遭孝武宵旰不忘前英後傑夕思朝議故能大者誅鋤小者惠來不然周秦之郊幾為犯獵哉大抵生人油然多欲欲而不得則怒怒則爭亂隨之是以教笞於家刑罰於國征伐於天下此所以裁其欲而塞其爭也大􅔦貞元之間盡反此道提區區之有而塞無涯之爭是以首尾指支幾不能相運掉也今者不知非此文粹作此非而反用以為經愚見為盜者非止於河北而已嗚呼大厯貞元守邦之術永戒之哉二陳圖論王睿炙轂子曰夫兵者凶器戰者危事自古聖王不得已而用之仗德而行則湯征葛乃為帝王若恃力而戰則紂放牧野終罹戮辱春秋傳曰兵之設久矣聖人以興亂人以廢廢興存亡昏明之術皆兵之由也復曰文不犯順武不違敵蓋軒轅五十二戰義在惜民湯武七十二征本惟靖難且文而不武武而不文不可謂雄則文臣在聰明器量鑒人别材故曰文雄可以為相武臣在俊傑深沉果敢決斷故曰武雄可以為將二略兼濟則可以入為相運籌於廟堂之上則可以出為將折衝於萬里之外然而將相之務在見有才力者賞之愚詐者去之如有才力者不賞則忠烈疑而不進愚詐者在傍則讒邪黨扇而為欺如此行之則何功而不立何罰而不行何才之有遺何戰而不勝孔子曰我戰則克祭則受福又曰不教民戰是謂棄之如兩軍交鋒之際列兵無陳由人民居而無城池立而無墻塹冦盜衝擊則何以捍禦譬如蹴鞠較力猶設機便以護手足況有兵而無隊伍有隊伍而無行陳有行陳而無竒正有竒正而無權變起自黃帝命其臣風后演之本文不越一百字詞約旨微非聖賢莫能研究太公起剪孫吳韓項並由斯術唯孔明尤盡其妙生之於心機不形之於文義雖君臣父子不相傳授近者李筌圖載八陳只言或合而為一或離而為八不陳四竒變化之旨不顯天衡地軸衝翼之文將帥覽之難曉今創畫天地二陳圖明八陳八變之源爝火助陽自忘短綆庶幾英傑覩之稍禆焉將略論炙轂子曰昔祝其之會仲尼云夫有文德者必有武備遂斬萊人頭足異處故曰文武之道未墜於地是以古之儒者服逢掖之衣頂章甫之冠佩環玦負櫑劒近代文儒耻言兵事茍或議及則僉謂之凶人今以翠華去酆鎬黃屋軫堯心率土之濵莫寧啓處方可論兵粗議將略矣且自罹亂以來儒道既息武辨是崇然而將帥多以勇力爭強少有精練兵機而懷謀䇿者所謂以強凌弱以衆暴寡迭相吞噬適足以塗炭生靈搆怨結禍夫兵之成敗在將帥之器能各有限劑須定等差淮隂侯與漢高祖論絳灌以下用兵多少信曰陛下可將十萬衆所謂能將將不能將兵夫高祖之雄才大略尚如此況其下哉楚子玉賢大夫也亦不能越三百乘左傳以子玉雖多剛勇終曰無禮故不能將一二萬人是以王翦能將六十萬而李牧不能二十萬此方見將帥才器之大小也凡為將料敵之情偽而後決䇿制勝須知彼師之能否乃操我之所長假如韓信能設伏走我則逐奔不遠難誘也從襲不及難陷也白起能攻城野戰則當深溝高壘以挫其鋭俾蜂蠆無所施其毒螫虎狼不能逞其瓜牙本謀既壞伺其大隙而擊之因變竒正以待敵整衡軸以攻險兵法曰始如處女敵人開户後如脫兔敵不及距此兵之要也司馬宣王曰諸葛孔明志大而不見機多謀而少決好兵而無權雖提卒十萬已墮吾計中破之必矣及鄭褒亦能知母丘儉好謀而不達事情文欽勇而無算至儉兵敗皆如其言又潘濬見樊胄為武昌從事與州人設饌十餘度自起比至日中可得知以兵五千足以擒之果在濬之度內漢王謂魏大將柏直口尚乳臭不能當韓信謂騎將馮敬雖賢不能當灌嬰謂步將項它不能當曹參吾無患矣乃使韓灌曹三將軍果大破之後魏高祖宏曰青齊之兵可以禮遇徐兖之卒理須義撫斯測度將卒之明驗也今之將帥多不自量其才器又不知彼之短長率爾合戰卒然求勝由聚卯以擊山驅羊而鬪虎欲期弭兵靜亂不亦難哉帝王宜開英鑒審將帥之器量文武之才則崇勳大業庶幾可立夫宰制山河剸割疆宇舉大綱則易定滋苛細則難安故子房佐漢畫大謀六七件遂定天下孔明創蜀決沉機三二䇿據成鼎峙英雄之大略將帥之宏規也安危之機存亡之要審諸將略可見徴焉倒戈論楊夔豫讀周書至武王滅紂倒戈歸馬示天下不復用迹其事惑焉以武王之聖有望旦之輔滅獨夫紂旌其功於一時可矣且曰終不復用其未然乎夫上古淳結繩知禁中古朴赭衣懷畏末俗巧嚴法不化故淳散而朴朴散而巧巧之變萬詐生焉則內荏外剛之心詎革於干戚之舞乎周之祚七百誠曰永久然以臣臨君以兵向闕者多矣齊桓南伐楚北伐戎晉文取叔帶於溫定襄王於鄭非二國崇示大順尊奬王室則周之社稷存若綴旒自漢而下有國者罔不以兵力秦以黷武而滅梁以無備而亡我太宗究滅亡之源委房杜以政房杜以天下之大不敢決於胸臆於是敢諫則先王魏論兵則讓英衛深謀宏法來代有凖洎林甫即明皇既安之日隨旨順色以稔君惡乃以羯夷勇暴之卒專我兵柄竟使獸心為國禍本其為黷亂國常褻慢武義不亦甚乎且搜苖獮狩所以講武經閲戎事也故曰預備其不虞有備而無患則武之道豈可一日而忘諸嗚呼班子之善斷不能以鉛刀攻其堅造父之善御不能以朽索制其逸則有國者可以棄兵乎文苑英華卷七百四十三
