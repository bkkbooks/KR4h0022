body:
  text: 文苑英華卷五百五宋李昉等編嵗時雨雪儺門十九道冬至越人駕象入庭判一道亞嵗上樽闕酒判一道臘嘉平神位判一道天雨壞墻判一道復陶以行判一道春不修鑑判二道藏氷不固判三道西陸朝覿判七道驅儺判二道冬至越人駕象入庭判冬至朝越人駕象入庭不載黃門鼓吹法司科罪越人訴云依太康中儀不伏對闕名大荒無限一作垠天下如截柔逺能邇老安少懷惟彼越人沐兹造化一作洪造境遙銅柱聞伏波而暫擊聲暨珠崖非尉他而能制屬星躔北陸日屆南長天子登靈臺觀雲物命群臣以成列執五瑞而知禮牛羊勿踐駕象奚趍來賔丹禁之庭不載黃門之樂今朝髙會笑塗山而未倫法奉虞章鄙蠻風而詎設棘司以多聞闕殆直置先繩越人以古有典刑曽何敢侮且中古以降五運相乘太康之時九儀亦備具物云在時人屬遷須崇改更之文無致因循之禮亞嵗上樽闕酒判亞嵗遇羣吏於庭將賜以樽酒所司闕供對王運充主上大明臨下有赫國章式序天秩孔昭亞嵗崇時見之儀羣吏修會同之禮倬玉階之仗左右薰風頒金彞之酒東西湛露庭實千品問皮馬以分行朝會九賔錯華蟲而雜燕羽觴無算玄澤初流兕觥其觩皇歡以接賜上樽之旨酒帝命空霑承大聖之鴻恩天厨不給眷言此咎罪莫重焉所司罷供實違常典既罹深罰邦有常刑臘嘉平神位判先嘉平之夕索室不設存神之位有司告其師訴云小黃之過仰依禮處分對趙泉虬嵗律仲冬寒生季朔尊狩而臨清祀因蠟而祭嘉平承八政之勞農暢四人之休息既而日沉西障月下南軒夜復清而多間神將肅而是享主不存位祭則無依幽靈無地玄酒何設如在之誠事既驗於闕行虧禮之尤理合從於置罪乃典職之有失事未一作曷可容類龜玉之將毁人何逃責有司推詰理一作妙合其宜訴非可憑庶歸常典天雨壞墻判乙富家天雨壞墻其子曰不築且有盜鄰人之父亦云暮而果大亡失其家知其子而疑鄰人之父告之鄰人引其子不伏對雲蒸晝暝天雨洊降當此激射或頺圜一作環堵乙者何也而貨殖焉既得陶公之術有同宋人之富雖家惟四壁而堂纍千金當戒爾不虞宜納善人之訓何故為誨盜不從幹父之情入門各媚信自負於知言翻或為讐欲見疑於忠告引之為證事則可憑訟之無稽法亦難設謂宜按記庶叶簡書復陶以行判甲託秦復陶以行人告其不軌訴稱嚴霰使然非是妄作對康子季日車南至星斗北回徂嵗既一作將窮重隂觱發寒生大漠雪下平蕪海曲於是先行山隂由其興往惟備乃無患必藉重裘而彰厥有常須遵法服甲榮微簮組候屬嚴凝節愧髙臺寧懷一華作平君之操尊非楚國輕襲靈王之儀罪當抵於嚴霜一作秋詞徒稱於積霰向若楚制是用庸敢避於濡身今乃秦陶謬加因難逭於匪服既負不衷之刺宜投僣上之科春不修鑑判丁掌頒不頒于命士春不修鑑而輒秋刷對厙狄履溫開國承家建官分職品彚斯布卑髙以陳故禮設六官必在所掌士分九命且均其職眷彼凌人頗忝班位惟兹命士賔疑厠周行雖和平在時終無夭昏之理而炎涼失節或生疾疫之事備預之道寧失國經頒賜之儀豈乖常禮且深溪寂寂方委積於大冬虛室寥寥遂收藏於小吏春風已解不聞修飾之功秋露未圓方事刷清之業當其時而不作已表非勤應合給而缺供尤彰失守不應之罰從此自貽慢令之科宜以為始同前亷粲宗周布政漢家舊法藏氷於陸自古有之頒冰於朝方今靡替猗那厥職乃丁是掌西攀咸鎬寄甘泉之北宫東邑鞏洛入邙山之隂洞履霜如堅和翠微而一色積雪偕瀾岌稜層而流寒當忝司存合間主守茍違命士得無常刑若惟陳迹良亦異聞且太嵗換韶盛德在木上從天子下際羣公大給千官備霑纍命青熒片片光研一作妍金鏡之空鉼背峨峨姿凛玉壺之態蓋將以蕩清暑辟炎毒水精簾內飛燕嬌歌而對山虎疑作武魄盤中暑一作星署永吟而陶酒時或稽緩人必增憂况士不頒氷闕也春不修鑑怠也秋仍輒刷非也三者備矣夫何言哉眷言伊丁請用常典藏氷不固判所司藏氷不固訴云採氷户家不依尺樣對崔希逸寒暑遞遷四時有凝隂之節宗廟致敬五禮標陳薦之儀徵萬古而莫遷雖百王而不易洎乎嵗伏玄陸日短星昴天寒地閉風凄雨霖一作霏積水成氷與銀牀而等潔沍隂凝井映玉甃以生光既有峨峨之姿須備沖沖之禮茍違六尺之樣遂闕三冬之備祭供有罷職司其憂向若尺樣頓乖納時不應緘默自緣蓋藏不謹今日方事推詢玉毁櫝中是誰之過掌人自合當罪採户未可論辜同前裴幼卿習坎居卑履霜為漸始衆流而就濕終積溜而成氷於是嵗約星回時遵月令啓凌隂之室享司寒之神山人縣人四字一作南至即分官而有典北陸西陸一無此二字將候日以無差乃採沍寒必於窮谷豈可未終見晛遽此晞暘望朝覿而未開與隆冬一作冬炭而共盡主司先標尺樣輸納當有程期豈三令之莫申何一言之匪效既乖守職詎可逃刑同前裴寬正德厚生九功惟序備物致用十翼斯崇均諸五行廢一不可况氣移西候日躔北陸深山窮谷涸隂沍寒狐絶聽而無疑鴈爰飛而向暖風驚千里草木落而云黃氷結三河波瀾凝而不動眷言主者則有司存理宜採彼豳詩循芳魯䇿獻羔無闕賔祭有冝何得慢令致期以速官謗氣已昭於發泄罪將犯於刑書雖嫁禍於户家固難免於科罪西陸朝覿判西陸朝覿闕肜繹之氷御史劾之云非其時不合禮對鄧承緒獻嵗發春列宿分曜人其不惑序惟莫愆乙也司存式惟天道令乎窮谷以將納氷物其惟新時漸於廟日在北陸其藏也以周星見東方其出也以遍克諧冬夏之氣不悖隂陽之宜彼肜繹而不修何祭祀之為禮御史之舉嗟執簡而不為有司之儀蓋通方而被利刑惟不濫其可加諸同前潘文環將祭司寒必從朝覿自上下下須亦有宜惟彼乙兮是稱主者獻羔而啓自仰天王之豐愆陽不興果叶藏氷之道且祭之明日曰繹肜既區分於禮經亦隨時而用捨有何乖制而致繩愆請寬執憲之刑庶免不辜之罪同前孫益凌人納室獻羔開氷取時寒而腹堅用覿朝而首出在於賔祭則有彞倫况肜繹之禮既施水土之品必設履年或存乎顒若藏氷更闕於陳焉乙忝主司實為失守無恆之迹且類於南人有常之儀宜在於西陸未能引過猶謂非時於禮何觀在刑不忘同前劉肱氣改東風日在西陸魚稱祭獺人用獻羔乙為氷司預聞政事朝之祿位尚合班行祭之肜繹俄聞悔吝誠應鑑室初啓以享司寒何得羽籥載闡仍虧如在既蘋藻而有闕仰哀敬而難逃青龍御辰二月行及驄馬問罪三尺須加自得噬臍那應騰口同前吳蒙氷以風壯縣人初傳寒乘春消王命是出韙夫彼乙能業其官豈炎涼之不愆調乎四氣將潢汙之同薦利于百神滌意爰卜於吉蠲闕容乃稱於肜繹曽是獲麟之史西覿靡逾孰謂冠豸之雄南臺妄紏若五經之訓奉以守彼乃或繁一作擊無成曷為知禮同前張巡薦必及時政無墜禮雨雹可禦凄風不流惟乙凌隂是司將頒食肉之列爰逮伐氷之家當夜有頌朝覿無戒且不違於西陸蓋取異於東鄰既憐申豐將除苦雨之變翻慙髙子不爭靈星之詩御史職在乘驄誠為直指有司義乖祭篚猶曰非時徒欲事於煩言得無同於矯舉罪之則可訴亦難從同前氷以禦災祭而后用東風初至啓隂室以被除西陸既躔命凌人而蕆事朝覿而出必有事於司寒肜繹之儀固可徵於舊典眷言一職實忝司存進而不知類羲和之廢職退而隳禮與申豐之善射疑作對獻羔斯闕須置嚴科神豸觸邪豈其所過驅儺判月晦所司闕堂贈之禮對率以大儺是驅羣厲斯夏官之所掌在東堂而成法飾其金目視方隅而皆知拒乎用逐首綵章而必備有司奉職無競惟人既尸百𨽻之位當順四時之節值此日月初晦星辰已周欽奉國儀必聞堂贈須因周禮成法將始逐茲赤疫罔被清泠上以破除惡夢下以司執遺鬼宣尼之禮更立阼階張衡作賦是清京室此時廢執孰以逃刑撫狀誠合科繩執文或當推問何者所稱晦日乍涉陽春儻作玄律在時不可朱裳有事理茲伏念宜正嚴科必當建日之辰請置先庚之罰同前顔朝隱置物自繫幽其罕除因憑神之道戒天厲之災所以職在夏官事殷玄月煥其金目分若侲童是知作背之儀用符堂贈之禮况夫時方代序推蓂砌而已殘物有札瘥在桃符而何闕載紊舊典合置彞條文苑英華卷五百五
