body:
  text: 文苑英華卷八百六十七宋李昉等編釋十八曹溪六祖大鑒禪師第二碑一首袁州萍鄉縣楊岐山故廣禪師碑一首故衡嶽律大師湘潭廣興寺儼公碑一首魏州開元寺琉璃戒壇碑一首東林寺逺法師影堂碑一首曹溪六祖大鑒禪師第二碑劉禹錫元和十一年某月日詔書追褒曹溪第六祖能公諡曰大鑒實廣州牧馬揔以疏聞繇是可其奏尚道以尊名同歸善善不隔異教一字之褒華衮也懷得其所故也馬公敬其事且謹始以垂後遂咨于文雄令栁州刺史河東栁君為前碑後三年有僧道琳率其徒由集注作字曹溪來且曰願立第二碑學者志也惟集作雖如來滅後中五百嵗而摩騰竺法蘭以經來華人始聞其言猶夫重昏之見􅝉爽後五百嵗而逹摩以法來華人始傳其心猶夫昧旦之覩白日自逹摩六傳至大鑒如貫意珠有先後而無異同世之言真宗者所謂頓門初逹摩與佛衣俱來得道傳付以為真印至大鑒置而不傳豈以是為筌蹄耶芻狗耶將人人之莫己若而不若置之耶吾不得而知也按大鑒生新州三十出家四十七年而歿既歿百有六年而諡始自蘄州集作之東山從弟五師得授記以歸髙宗使中貴人再徵不奉詔弟以言為貢上敬行之銘曰至人之生無有種類同人者形出人者智蠢蠢南裔降生傑異父乾母坤獨肖元氣一言頓悟不踐初地五師相承授以寶器宴坐曹溪世號南宗學徒爰來如水之東飲以妙藥瘥其瘖聾詔不能致許為法雄去佛日逺群言積億著空執有各走其域我立真詮揭起南國無修而修無得而得能使學者還其天識如黑而迷仰見斗極得之自然竟不可傳口傳手付則受于有留衣空堂得者天授袁州平鄉縣楊岐山故廣禪師碑前人天生人而不能使情欲有莭君牧人而不能去威勢以理至有乘天上之隟以補其化釋王者之位以遷其人則素王立中區之教懋建大中慈氏起西方之教習登正覺至哉乾坤定位而聖人之道參行乎其中亦猶水火異氣成味也同德轅輪異象至逺也同功然則儒以中道御群生罕言性命世衰而寢息佛以大慈救諸苦廣起因業故劫濁而益尊自比東來而人知像教佛衣始傳而人知心法𢎞以確集作權實示其攝修味真實者即清淨以觀空存相好者怖威神而遷善厚於求者植因以覬福羅集作罹於苦者證業以銷寃革盜心於冥昧之間泯受緣於死生之際隂助教化揔持人天所謂生成之外别有陶冶刑政不及曲為調柔集作揉其方可言其旨不可得而言也惟四海之大羣倫之富必有以得其門而會其宗者為世導師焉禪師諱乘廣其生容州姓張氏七嵗尚儒以爼豆為戲十三慕道遵懷削之儀至衡陽依天柱想公以啓初地至洛陽依荷澤會公以契真乘洪鐘藴聲和至集作和之斯應陽燧含焰晞之乃明始由見性中得自在常謂機有淺深法無髙下分三宗者衆生存頓漸之見説三乘者如來開方便之門名自外得故生分别道由內證則無異同遂以攝化為心經行不倦愍彼南裔不聞佛經由是結廬此山心與鏡寂應念以起教隨方而立因居涉旬而善根集注作依者知歸逮周月而帶縛者漸集作慚悟以月倍日以年倍時瘖朦洞開荒憬漸革集作華非邑中長者十方善衆咸信發願大其藩垣法堂四阿復集作服引僧舍身心恆寂像馬交馳隨其去來皆得利益踰嶺之北涉湘而南仰兹髙山知道有所在此地緣盡修然化俱神歸佛境悲結人世自趺坐而滅至于茶毗三百有六旬矣爪髮加長容澤差衰真子號呼圍繞薪火得舍利如珠璣者數十百集作百十又注作百千焉於戲肖圓方之形故寂滅以示盡入菩提之位示集作故殊相以現靈集作虛亦猶鳳毛成字麟角生肉必有以異不知其然於是服闕聞法之上首曰甄叔集作升乃率其徒圓寂道𢎞如闕海等相與拭淚具役建塔于禪室之右端從衆也初廣公始生之辰嵗在丁已當玄宗之中元也生三十而受具更臘五十二而終終之夕嵗直戊寅當德宗之後元三月既望之又十日也後九年其門人還源以為崇塔以好集作存是神與建銘以垂休皆慿像寄懷不可以闕一繆謂豫為習於文者故繭足千里以誠相攻大懼其先師德音與時寢逺且曰白月中黑東川無還揚于金石傳信百劫彼隨墮淚之感豈儒者流専之敬酬斯言銘示真俗文曰如來説法遍滿大千得勝義者強名為禪至道不二至言無辨心法東行群迷丕變七葉無詞四魔潛扇佛衣生塵佛法如線吾師覺者真極道樞承受密印端如貫珠一室寥敻集作然髙山之隅為法來者百千人俱裔民嗤嗤户有犀莊攝行方便家藏佛書願力既普度門斯盛合為一乘散為萬行即動求靜故能常足絶緣離覺乃得究竟死即我休集作生非作樂生即作死非我病常藏者身常圓者性本無言説咐囑其誰等空無礙後覺得之像閟靈集作虛塔迹留仁祠十方四輩瞻禮於斯故衡嶽律大師湘潭唐興寺儼公碑前人佛法在九州問隨其方而化中夏之人汨於榮枯集本作榮利破榮莫若妙覺故言禪寂者宗嵩山北方之人鋭以武力集無力字攝武莫若示現故言神通者宗清涼山南方之人剽而輕制輕莫若威儀故言律藏者宗衡山是三名山為莊嚴國必有逹者與山北崇南嶽律門以律公為上首律之後雲峯證公承之證公之後湘潭儼公承之星月麗天珠璣同貫由其門者為正法焉公號智儼曹氏子世為栁之右姓兆形在孕母不嗜葷成童在侣獨不嗜戲其夙植因厚者歟生九年樂為僧父不能奪其志抱經笥入岣嶁山從名師執業凡進品受具聞經傳印皆當時大長老我入名門不住珠乘我得集作行覺路徑入智地屋集作居室方丈名門大千護法大臣多所賔禮嗣曹王臯之鎮湖南請為人師自是登壇蒞事三十有八載由我得度者萬有餘人人持寶衣解纓珞為禮公色受之謂門弟子曰彼以有相求我我以有為應之凡建寶幢修廢寺飾大像極其工應物故也元和十三年九月二十七日中夜具湯沐剃頭頂與門人告别既集無既字即寂而現集作視身與色無有壞相嗚呼豈生能全吾真故死不速朽將有願力耶余不得而知也問年八十二問臘六十二葬於寺東北隅傳律師子中選道凖傳經弟子圓皎真璨與其徒圓靜文外惠榮明素存政等欲其師之道光且逺故咨余乞辭乃作長句以偈銘之曰祝融靈山禹所治非天有道集作非天不道不可止中有毗尼出塵士集作心以律視儼猶孫子登壇人師四十紀南方學徒宗奧旨幼無童心至齯齒識滅形全異凡死長沙潭西逾集作幾五里陶侃集作佩同故居石頭寺門前一帶湘江水于嗟律席集作虎之名兮與湘流而不已魏州開元寺琉璃戒壇碑李輔正覺出乎道而道以支或得其儒或得其佛曰仁佛亦曰仁儒曰義佛亦曰義儒而佛之云戒義者禁人為非者也且事得其宜故將祭將征必設壇為墠以重宗戒者豈亦禁人為非者耶將事亦壇亦場以傃其限原筮者何來自前教祗園之初位序以立其徒一無徒字從之流我中原喻者既蹈而孚迷者不知其所界以其衆視而歸逹者存而不習其從亦無不利我僕射廬江何公在藩之逹者也功名既有四履來安述職之餘岌然無事此寺住僧會恩法門之津梁也於寺殊搆久以莊嚴去大和七年四月十九日因公行寺自有琉璃壇法請公為地公曰然其用安在會恩言釋徒無言而有注相注相之歸戒壇為本金剛以不壞悠久琉璃取至淨為光持戒堅固洗心清明有如是也若夫壇場之原乃與碣石而長存比丘之功非法無以入善非趾無以出俗出俗歸真此其趾也故崇登頓以攝威儀威儀既明定惠斯了居凡匪造履逹方遊在昔三聖有言後生傳法莫不以為四生路廣人天業如炎赫清涼所乘異境先迷後得無患夫悔從悵悵而行聖人惻隱慈者用是興悲義者於焉外護外護之仁非大君大臣不能以有施解極之理要道斯存伊釋命微罔能𢎞綽公曰然定惠之深吾所未極惻隱之際儒釋何殊且或一作哉疑利用生成戒亦道一作導人之理因令除地約戒俾築壇其心命曰莊嚴之度締搆之工一以豫之之度立工懸告公乃捐其真俸以成梓陶之具俾會恩録之一嵗而壇上下俱構賁以琉璃艧之丹漆疊午文房張軒逹户如龍之蟠如鳳之騫霩縮撑廅觀者動然神置其隅珠內其頂重級頒乎大光輝映創于東序擬議東方法生於東我願無已寺德又言前有三門旁有二樓二樓三門可以加飾公曰然其亦琉璃壇之畢會恩請事公遂奏置義壇以資法侣行者不囊一錢居者不輸毫髮樵疏絲榖仰公私廪先治一作法是一日有瘖僧就筵後法一日而瘖僧遂口寺者以為祥感之應其然豈不然耶輔植業於儒異門釋氏其間等級尚較故希有歎揚之聲令此抽毫以公有命具序釋氏來告之門非有凖繩非多要賾亦蓋之而已矣在書有序在物有容事立功成宜論篆刻述者敢廢斯文銘曰崇維祗園在藩之東爰立其壇有隆一作其壇有豐賁以琉璃覆之窮隆上髙下厚中焉有融有融伊何鑒彼威儀實繁兹搆童童耆耆在昔初法築之締之及今一作命大輅斫斯礱斯妙取天巧固擬神保論是禨祥永資夀考無此端本定惠不生無我明公追琢不成郁兹介福肅彼緇英涉級東方永載厥名東林寺逺法師影堂碑并序李演天之髙也日星垂其耀地之厚也山嶽鎮其維人資三才之靈挺五行之秀奧有邁德宏域融神惠境焯迦羅之絶照挹甘露之玄津配名嶽而永崇晞扶桑而不息則慧一作惠逺法師其人也法師鴈門樓煩賈氏釋道安之門人其英姿朗韻清行素莭詳諸舊碑及張氏傳固以杳映前秀銷鑠令開灰心土骸而神機天發金口木舌而法音雷雲無取無捨而律儀氷徹不生不滅而禪性暉如抱德陽和而浩類洗心潛靈淵沼而逺方翹首修不共法而常一作恆軫大悲薰般若智而冨諸梵行故能誘納衆善沙汰群疑萬流仰海而同歸一雨施物而咸潤可謂阿摩勤果實從中生分陀利花性非外染矣自晉氏太元年法師始飛錫南嶺宅勝東林世更七代年垂四百流芳遺潤金鏘玉振當一一作催當時之美虎溪為釋氏龍門挹千載之風匡阜擬縉紳闕里皇唐貞元十有一祀江州刺史馮翊嚴公士良秉明德以分符宣中和以述職上贊緝熙之化下臨擊壤之人以無為政克用其民一作以無為政為政克用巡穡外野指途中林敷衽禪關式瞻遺像喟然嘆曰斯名也寒暑不能易其芳斯德也江海無以臻其極彼瑣行纎莭尚崇植楹廡正位居室噫尊美若兹而隅形在壁俾珍儀掩翳清光不曜豈惇德允元之旨乎乃與寺之上首熙怡律師圖之將遘一作逮勝宇且示實相律師久儲于懷果協其素旌美樹善二謀同心悅徒勸工成之匪日繡甍翼其雲聳晬容儼以景彰觀至道者存妙像于鏡中味微言者得玄珠於意表豈止惠議攝一作懾英姿而雨汗仲堪仰素風而心醉哉故非夫逺公之志德不能譯聖文服秀民非夫嚴公之徹識不能立清祀揚妙軌篆芳金石敬贊二美銘曰粹靈純綸一作論是一作實惟至人含德摛曜升陽發春道光海域幽遁嶽濵六髦棄蔽八士辭巾緣徂物謝迹留事往百億神遊恆沙化廣昭昭遐軌冷冷末響慧日凝暉白雲翹想曠哉明牧逺味芳風思覿遺像求之列墉爰搆一作庭棟宇式是道宗旌休垂洪地久山崇文苑英華卷八百六十七
