body:
  text: 文苑英華卷九百二十一宋李昉等編職官二十九贈丹州刺史先府君碑一首括州刺史贈工部尚書馮昭泰碑一首豫州刺史魏叔瑜碑一首常州刺史平貞眷碑一首贈丹州刺史先府君神道碑張説府君諱隲字成隲范陽方城人也張子曰揮帝軒之胤肇勳弦木賜集作錫姓上矣詩有卿士孝友史有留侯世家八葉至東漢司空皓公子宇北平太守始居范陽四葉至西晉司空華公子韙一作禕散騎常侍乃僑江左昆孫太常復歸洛河故河東有司空寨洛陽有散騎里後司空至府君十二代不失仁義矣王公諱戈周通道館學士考諱格集作恪無祿早世府君煢生遺育四代單緒家世尚儒不及伯魚之訓外祖為理遂讀咎繇之書以明法歷饒長子二尉介休主簿洪洞丞以所願乎下事乎上以所願乎上交乎下反身與人何往不順臺選貞白覆囚山南人謂是行有典刑矣昊天不弔年五十二調露元年十二月乙卯捐背於縣廨夫人長樂縣太君馮氏父威藍田丞敬循法度踐涉圖史顧復幼孤將就成立家道不殞夫人是賴享年七十有二傾背於東都康俗里第光瑶説不天夙遭閔凶又集荼蓼先王制禮不敢從滅以景龍二年七月已卯安厝於萬安山陽祔從周禮也惟先君不祿俸不奉親不機杼不資身僚舊無雞黍之接况非其類乎族姻無魚菽之受况其人吏乎是全其髙而善其獨也過四十始閲六籍觀詩得之厚觀書得之恆觀禮得之别觀樂得之和觀春秋得之正觀易得之元曰君子多乎哉事斯一言而已矣每誦道記三復三寶曰至人之心有以垂世又聞之太夫人云吾有子五十載非其疾無一日之憂太夫人亦云吾事夫子三十年耳無忤聲目無暴色先君子之違世也其憂戀者尊堂在殯歟聖善在堂歟我諸孤無日敢忘及王母終養二祖封崇亦尚克家成遺志集作訓矣若夫安親孝也宜家義也翼子慈也軌迹隱乎含光故當代罕耀馨香發乎潛德故明神終勞先大夫久而益榮歿而不朽蓋此景雲二年天子嘉侍臣之匪躬念前人之藴德二月乙已詔曰故官某育德髙邁藏器下僚代載儒雅家傳清白河東佐邑長不欺之風山南覆囚溢無寃之聽徂謝永久丘墳不飾啓兹令胤貞事先朝宜崇追逺之恩以表揚名之志可贈使持節丹州刺史王澤漏乎泉壤國禮崇乎宗廟漢帝論士恨不見李牧之為人曾子思親泣無逮楚王之厚祿道存運往痛矣餘悲緬尋前哲之所以聞無聲於四海視不見於百代者匪銘頌歟柏麟蔡雍其則不逺嗚呼霜露交積松檟滋深兄弟永懷相顧將老胡伯虎豈敢掩大人之情陳季方何足知家君之德小人銜恤非曰能文莫假辭於他者務傳信於我也銘曰猗嚴考用玄妙體太和竭髙志貞夫一戒其多孝于親正于家刑于訓清厥心晦厥迹畏厥聞集無聞字寶如何其謙儉孝集無孝字慈皇哉褒德永世有詞故括州刺史贈工部尚書馮公神道碑金之為寶百鍊而惟精玉之稱德久幽而不昧聖人美焉君子比焉可鑠也不可奪其剛可毁也不可汚其潔偉哉馮公秉斯操矣公諱昭泰字遇聖長樂人也説學於故史豈不聞舅氏之厥初乎畢公建德乎周畢萬大名乎集作于魏别封之裔遂氏馮城秦則丞相並時漢則將軍重世積仁鍾慶王者鬱興間晉南浮因燕北號家變成國為天下雄勳業競五霸之先子孫齊二王之後公即昭成皇帝之十代孫也髙祖大將軍隨州刺史長山公謙以寇恂之才翊戴周武曽祖兵部尚書左僕射魏國公世基以曺參之力經濟隋文大父尚書右集作左丞檢校御史大夫少府監揚州刺集作長史安昌公命長命以佳吏之名勤勞皇室考仁髙亮無祿子道不究故公幼而襲安昌公焉清明激徹標格峻堅夏翟耿介無矯飾於韋弦寒松青冥不受令於霜雪專經覩奧習法精理起家左奉格集作裕是改讓賢府果毅換文州司馬為酷吏所陷罷官久之調榮州長史屬城慢法按而繩之入計會府讐家橫訟明敕杖其訴者遷公宋州司馬朝廷翕然知有王法復假左臺侍御史江南道廉察使類會髙等加朝散大夫進潞州長史堆崖受湍獨醒見嫉轉湖州長史公束濕不回聚蚊交訕集作訟貶為饒州司馬未行降使詳覆拜鄂州刺史制曰公志氣剛徑操履貞潔歷佐藩條咸有聲稱詰姦繆不避強禦苦節清威若凌霜雪頃因讒毁遂有貶降使者按問皎然明白俾從優奬特加寵命其在江夏異政風行入為太子家令兼知內外鑄錢事國泉是殷盜鎔乃絶河朔淫雨帝思作乂俾公檢校邢州刺史散有賙無人忘歉嵗帝乃璽書勞焉其旨曰卿忠於事君簡以臨下忘私徇公之美歌謡所載擒姦摘伏之竒吏人攸仰雖陳朔之貶黜邪慝王業之斥除貪殘無以加也一郡清靜副朕意焉其後以戚思疑作恩集無此字纍移睦州刺史復為郡小所譖左授泉州司馬未之任又貶榮州司馬公砥節荒服天髙聽卑旋除溫州長史俄復舊階拜括州刺史水國瀐洳告疾言歸景龍三年六月十三日終於蘇州之逆旅春秋六十有五正人歎息舊吏集作蒞傷感公清白傳家信義髙世門有竒士室無長物夫其善於鈎距長於襟帶法嚴令峻人寬吏急當官而行不畏集作避讒慝之口除惡務本不求愷悌之譽出入從官十有六職以謗獲貶者五洗謗特遷者四不曰忠乎將無悔於九死不曰直乎焉往而不三黜故人謝而名益著迹逺而風可懷也皇上志其持法不撓贈大理卿本其坐樹無言諡之曰節窀穸之事一以官供哀榮之禮被於存歿於時天子嚴謁山陵訓人追孝推心庶物㵼澤幽泉公長子少府監紹正次子給事中紹烈並構層堂仰延榮贈乃贈公工部尚書君子曰孝必錫類忠則不墜臧孫達其有後乎鄭公業為不忘矣夫人琅琊君右集作左相邢公及善之女垂拱一年三十六而夭後夫人彭城君鴻臚卿善因之孫女景龍三年五十有五而逝所謂齊薑昭前邦媛輝後碧樹光落悲同孫楚之妻紅蘭漸苞貴在馮勤之母以開元十八年十月壬寅葬我節公於長安縣髙陽原夫人王氏劉氏祔焉禮也長子紹正少府監第四子紹忠未仕第五子紹烈御史中丞孝乎二連之心思崇三絶之美魏主來顧賞幼婦之碑秦師不侵尊死士之壟揚名稱代道逺乎哉銘曰古之志士忠不違集為作難倬哉馮公矯此雲翰嚚嚚集作囂囂羣小彼何足算屢困忠直天下改觀經用百年窮達相半貽慶二子雙承天渙嚴嚴大理人命是懸聖明表贈王道無偏六卿冬官百工攸序韓稜雖沒龍泉可許邱陵鼓舞兮改谷移山集作桑改壑移嵗月崩波兮有去不還唯德音與頌石傳不朽於人間也集無也字豫州刺史魏叔瑜神道碑前人公諱叔瑜字思瑾曰魏氏巨鹿曲陽人也考太師鄭文貞公致君皇極配神清廟故祖德胄系敘於太宗之先碑矣公生育慶緒天然炳胎教之姿少長德門日用成躬率之化性盤於孝友習狃於禮樂俯仰中則從容蹈道加以專精好古旁通多藝聖人之所志聞一而反三君子之所能舉十而知九與同生璘琬知名當代始以門資補左千牛轉洛州司兵司議郎職方郎中太子洗馬出為懷州長史歷慶慈儀豫四州刺史春華韡於兩宫時雨零於四郡觀風之使所在聲聞變雅之老到今遺詠其年春秋五十有一終於豫州葬於集作于舊城大人原王氏祔焉禮也議者以公不避強禦有昭子之政事不為皎厲有康子之隱德虛已尚賢有文侯之樂善重諾分急有信陵之髙義人鮮有一况兼四乎公賦入封君妹歸帝子車馬無戚里之盛衣服有儒者之節儉而得禮富而無驕蓋奉先人集作此字之素履也公善於草𨽻妙絶時人以筆意傳次子華及甥河東薛稷世稱前有虞褚後有薛魏此又貽訓之餘美也嗟夫公學埒向歆操齊固燮若天假三夀朝登六事則鄭之柏武可尋漢之韋平一揆而年近知命位止方州落鵬翼於半霄負天之力莫展頓龍媒於局路追風之勢斯畢九原不作誰將與歸二子獻華追完先德俾余作頌以慰罔極銘曰昂昂豫州育粹含道欽若古訓思文烈考於穆烈考維國之師公承丕構思皇纘之發軫臺閣風流榮問建麾千里澤雱四郡位未充德命不遂才彼蒼孤善謂之何哉子孫必復邱封永久穆如清風振芳集作芬厥後常州刺史平貞眷神道碑前人公諱貞眷字密一字間從燕國薊人也蓋晉之公族有韓國者列於世家韓之餘子食平邑者因為氏姓有漢丞相改造繡衣在魏薊侯宅兹玄社故瓜瓞綿于三輔枝葉盛乎兩燕魏齊之間世濟其美公即北齊司空公鑒之曾孫祕書郎子敬之季孫故偃師令直容之叔子鍾積慶之洪胤包太和之粹靈敦龎沈靜直方簡易仁義根心政理闕性度以禮義文以詩書户部尚書清河崔知悌朝望人倫公之文友深賞延譽逺近宗焉始以司成館進士補盧州慎縣尉刺史盧寶胤舉器藏下寮轉冀州大都督府闕縣尉換晉州洪洞縣主簿北平陽道昕氣尚標舉河東裴知禮鑒裁精技陽推以孝友資身裴亦薦以經邦興化徙雍州新豐縣尉盧少儒引為檢點判官差卒選校小大推允休議登聞擢監御史裏行奉使黔中監選有牂牱謝鳳莭仁奏罷漢官專任首領公上其挾姦樹黨俶擾藩落天子悟焉再使置吏逺夷騷而旋定舊貫改而復完又駉牧在野攘竊是繁耗以嵗月莫之禁禦公軺車上隴羣慝畢露表監官斛斯果之輩奪職者九人沒藏者萬計牧圉知禁思無邪矣開耀間吐蕃侵境師旅不給乃購運酬勳募耕入選利之所聚詐亦居焉公與大理正王守一於河蘭鄯廓四州推獲僦糴王希古盧種王誕其徒二千餘人正處其罪爰德集作得我直授監察御史內艱去職居喪過毁死孝貽憂光宅初肇延兩臺分典百郡服闋授右臺監察御史巡察河南澄清郡邑升賢弊罪能執其中類功最加兩階拜右肅政殿中侍御史郎官法天古難其選固美斯在再拜司勳員外郎永昌中遭凶黨網羅為周興所奏貶溫州固安令州特舉清白改鴻州櫟陽令邑多猾人屢宰敗駕公威簡有素誠結無欺一作敗率是而行人用不擾獄行自靜狼戾反慤詔書嘉譽加朝散大夫又罹密徒貝錦為河內所鞫降括州員外司倉尋而事白進吉州司馬神龍中興官反舊政窮鱗沛而縱壑墜羽翼而順風拜司門郎中兼衛王司馬無何正除衛王司馬拜太子左庶子以莭愍之禍出為涪州刺史未往又轉盧州刺史致仕久之景龍中復起左諭德兼榮文館學士詔曰公縉紳耆彥操履清純令譽播于始終嘉績宣於中外儲闈論諭雅望尤髙宜申朝典俾加徽服可銀青光祿大夫又攝詹事東都留守拜常州刺史居嵗優詔致仕享年八十若干先天元年仲冬薨於河南之正平里第遺令近地便葬斂以終服開元二年冬卜葬於伊闕之西夫人河東縣君柳氏祔焉禮也公出入四朝歷官二十其進也皆釋疑作擇能録勤惟德是與其退也必含垢受屈在涅不淄子文之量從可知凡撰純孝友悌傳各一篇以匡儲后撰先君親友傳十卷以篤故舊撰家譜家志各十卷以明系本撰河南巡察記十卷以辨風俗非通理博物立誠錫類者其孰能見志以著書因事以設誡若斯之盛也有文集十卷行於代初公侍祠清廟有麾士之宜而先考偃師贈蒲州長史自祖考三葉塋無碑記公咨諸通儒而追建銘碣幽趙之士以為美談夫為子則頌德以尊祖飾終以榮親孝之大也為臣則不枉毫髮以顧私不避豺狼以撓法忠之至也潔志則利不涉口欲不萌心清之源也履道則不俯眉以恱勢不屈色以茍容正之方也詩曰仲山甫舉之公有其德傳曰左丘明恥之公有其直總是四善逺齊二賢於是芬苾令問優遊眉夀惠風激于勝流丕績敷于哲后然以忤彼權貴保茲介特不登三階以正四國貞白之似愾焉太息其孤總授充窮泣血靡所置懷俾余作頌布哀豐石恭惟先人之寮友常奉長者之話言公雅珍確實不尚華靡敬順風規直紀行事業廣詞褊萬無髣佛少子授八分之妙獨善當時公平日惠愛故存之刊刻詞曰峩峩淑德克生休命履孝蹈忠含清體正如玉之潔如金之鏡髙明徇疑作洵美學以潤之官方正事靜以鎮之嚴嚴憲府公三峻之赫赫儲宫公三訓之道有行廢時有否泰三入三黜無愠無喜鼓缶而歌懸車致仕全歸葬儉允也君子西山幽幽東川悠悠雲過墳闕風薄松楸人亡道存榮往哀留貽世作則行歸於周文苑英華卷九百二十一
