body:
  text: 文苑英華卷六百七十二宋李昉等編節度下刺史附與于襄州集作陽書一首上集作與張徐州薦薛公逹書一首代張籍與李浙東遜書一首上賈滑州書一首與京西節度使刑部尚書書一首與池州李使君書一首與宣州崔大夫書一首與浙西盧郎中集作大夫書一首幕職上與顧記室書一首上雍州髙長史書一首節度下刺史附與于襄州集作陽書韓愈七月三日將仕郎守國子四門博士韓愈謹再集無再字奉書尚書閣下夫士之能享大名顯當世者莫不有先逹集作進之士負天下之望者為之前焉士之能垂休光照後世者亦莫不有後進之士負天下之望者為之後焉莫為之前雖美而不彰莫為之後雖盛而不傳是二人者未始不相須也然而千百載乃一相遇焉豈上之人無可援下之人無可推歟何其相須之殷而相遇之疏也以故在下之人負其能不肯諂其上上之人負其位不肯顧其下故髙材多戚戚之窮盛位無赫赫之光是二人者之所為皆過也未嘗干之不可謂上無其人未嘗求之不可謂下無其人愈之誦此言久矣而未嘗敢以聞於人側聞閣下抱不世别本一有出人二字之才特立集有而字獨行道方而事實卷舒不隨乎時文武惟其所用豈愈所謂其人哉抑未聞後進之士有遇知於左右獲禮於閣集作門下者豈求之而未得耶將志存乎立功而事專乎報主雖遇其人而未暇禮耶何其宜聞而久不聞也愈雖不才其自處不敢後於恆人閣下將求之也集無也字而未得歟古人有言曰集無曰字請自隗始愈今者惟朝夕芻米僕賃之資是急是集無是字不過費閣下一朝之宴集作享而足也如曰吾志存乎立功而事專乎報主雖遇其人未暇禮焉則非愈之所敢知也世之齷齪者既不足以集作與語之磊落竒偉之人又不能聽焉則信乎命之窮也謹獻舊所為文一十八首如賜觀覽亦足以知其志之所存焉集無焉字愈恐懼再拜上集作與張徐州薦薛公逹書愈聞士有已未逹而逹人者大夫意寧實之哉小子誠其人今言則無故過濡恩惠思以極報之謂也伏惟閣下仁義風天下任帝室宏竒名譽之美刑政之威化道集作導之事使四方無聲色之娛集作則無四方聲色之娛金帛之富車服之制以從之一無此三字則亦稱顯位雍容暇豫而一作於又何求則可以取特逹不羈之士奉之以非常之禮俾耀名天下答天子鴻恩側見河東薛公逹年二十有六抱驚世之偉材發言挺志敻絶集作拔天秀服仁食義融內光外直剛簡質與世不常想其升朝廷議凛瑩氷玉隱慝潜姦滅心鑠謀然今尚幽塞未光􅌢集作彌非縮銛利靜集作靖居河洛惟髙公之清風驅馬千里文以為贄求拜華軒公則見之矣集作以遇采集作未甚厚懼左右者不明喜蔽能善黷視聽不以今之譽言九字集作黷聽不令之言故小子忘懼激憤獻此惟公明之夫垂纎餌溟泉冀吞舟之魚則疏施薄禮天下取特逹之士亦難大夫其裁之代張籍與李浙東遜書日月前某官某謹東嚮再拜寓書浙東觀察使中丞李公閣下籍聞議論者皆云方今居方伯連帥之職坐一方得集作能專制於其境內者惟閣下心事犖犖與俗輩不同籍固以藏之集作於胸中矣近者閣下從事李協律翺到京師籍於李君友也不見六七年聞其至馳往省之問無恙外不暇出一言且先賀其得賢主人李君曰子豈盡知之乎吾將盡言之數日籍益聞所不聞籍私獨喜常以為自今已集作以後不復有如古人者於今忽有之退而自悲不幸兩目不見物無用於天下胸中雖有知識家無錢財寸步不能自致今去李中丞五千里何由致其身於其人之側開口一吐出胸中之竒乎因飲泣不能語既數日復自奮曰無所能人乃宜以盲廢有所能人雖盲當廢集有棄字於俗輩不當廢於行古人之道者浙水東七州户不下數百萬不盲者何限李中丞取人固當問其賢與不賢不當計其盲與不盲也當今盲於心者皆是也若籍自謂獨盲於目爾其心則能别集作固能計是非若賜之坐而問之其口固能言也幸未死實欲一吐出蜀本有心中二字平生所知見閣下能信尚置蜀本作致之於門耶籍又善於集作為古詩使其心不以憂衣食亂集有也字閣下無事時一致之座側使跪進其所有閣下憑几而聽之未必不如聽集作聆吹竹彈絲敲金擊石也夫盲者業專於藝必精故樂工皆盲籍倘可與此輩比並乎使籍誠不以蓄妻子憂飢寒亂心有錢財以濟醫藥其盲未甚庶幾復見天地日月目得不廢則自今至死之年皆閣下之賜也閣下濟之以已絶之年賜之以既盲之視其恩輕重大小籍宜如何報也閣下裁之集無之字度之籍慙靦再拜上賈滑州書愈聞儒服者不敢用他藝蜀本作術干進又惟古執贄之禮竊整頓舊所著文一十五章集作首以為贄而喻所以然之意於此曰豐山上有鐘焉人所不可至霜既降則鏗然鳴蓋氣之感非自鳴也愈年二十有三讀書學文十五年言行不敢戾於古人愚故集作固泯泯不能自計周流四方無所適歸伏惟閣下昭融古之典義含和蜀本作華發英作唐德元集作臣簡棄詭說保任皇極是宜小子刻心竦慕又焉得不感而鳴哉徒以獻策閣下方勤行役且有負薪之疾不得稽首軒階遂拜書家僕集作童待命於鄭之逆旅伏以小子之文可見於十五章之內小子之志可見於此書與之進敢不勉與之退敢不從集作退進退之際實惟閣下裁之與京西節度使刑部尚書書月日客有昌黎韓愈者謹再拜上書閣下布衣之士身居窮約不借勢於王公大人則無以成其志王公大人功業顯著不借譽於布衣之士則無以廣其名是故布衣之士雖甚賤而不諂王公大人雖甚貴而不驕其事勢相須其文粹作而先後相資也今閣下為王爪牙為國藩垣威行如秋仁行如春戎狄棄甲而逺遁朝廷髙枕而不虞是豈負大丈夫平生之志願哉是豈負明天子非常之顧遇哉赫赫乎洸洸乎功業逐日以新名聲隨風而流宜乎歡呼海隅髙談之士奔走天下慕義之人使或願馳一傳或願操一戈納君於唐虞收地於河隍然而未至乎一作於是者亦蓋有其說云集作蓋亦有說云豈非待士之道未甚厚遇士之禮未甚優請粗言其事閣下試詳而聽之夫士之來也必有求於閣下夫以貧賤而求於富貴正其宜也閣下之財不可以遍施於天下在擇其人之賢愚而厚薄等級之可也假如賢者至閣下乃一見之愚者至不得見焉則賢者莫不至而愚者日逺矣假如愚者至閣下以千金與之賢者至亦集作又以千金與之則愚者莫不至而賢者日逺矣欲求得集作待士之道盡於此而已矣欲求士之賢愚在於精鑒博採之而已矣精鑒於已集有也字固已得其十七八矣又博採於人百無一二遺者焉若果能集作行是道愈見天下之竹帛不足蜀本有以字書閣下之功德天下之金石不足蜀本有以字頌閣下之形容矣愈也固布衣之士也生七歲而讀書十三而能文二十五而擢第於春官以文名於四方前古之興亡未嘗不經於心也當世之得失未嘗不留於意也嘗集作常以天下之安危在邉故六月于邁來觀其師及至此都徘徊而不能速去者誠恱閣下之義願少立於階墀之下集作際望見君子之威儀也居十日而不敢進謁者誠以左右無先為容也懼閣下以衆人視之則殺身不足以滅恥徒悔恨於無窮故先陳此書序其所以來之集有之字意閣下其毋以為狂而以禮進退之幸甚集本疊幸甚字韓集無韓字愈再拜與池州李使君書杜牧景業足下僕與足下齒同而道不同足下性俊逹堅明心正而氣和飾以溫慎故處世顯明無罪悔僕之所禀濶略疏易輕微而忽小然其天與其心知邪柔利已偷茍讒諂可以進取知而不能行之非不能行之抑復見惡之不能忍一同坐與之交語故有知之者有怒之者怒不附已者怒不恬言柔舌道其盛美者怒守直道而違已者知之者皆齒少氣鋭讀書以賢才自許但見古人行事真當如此未得官職不親形勢潔潔小集作少輩之徒也怒僕者足以裂僕之腸折僕之脛知僕者不能持一飯與集作資僕僕之不死已幸况為刺史聚骨肉妻子衣食有餘乃大幸也敢望其他然與足下之所受性固不得伍列齊立亦抵足下疆壠畦畔間耳故足下憐僕之厚僕仰足下之多在京城間家事人事終日促束不得日出所懷以自曉自然不敢以輩流間期足下也去歲乞假自江漢間歸京乃知足下出官之由勇於為義向者僕之期足下之心果為不謬私自喜賀足下果不負天所付與僕所期向二者所以為喜且自賀也幸甚幸甚夫子曰吾少也賤故多能鄙事復曰不試故藝聖人尚以少賤不試乃能多能有藝况他人哉僕與足下年未三十為諸侯幕府吏未四十為天子廷臣不為甚賤不為不試矣今者齒各甚壯為刺史各得小郡俱處僻左幸天下無事人安榖熟無兵期軍須逋負諍訴之勤足以為學自强自勉於未聞未見之間僕不足道雖能為學亦無所益如足下之才之時真可惜也向者所謂俊逹堅明心正而氣和飾以溫慎此才之可惜也年四十為刺史得僻左小郡有衣食無為吏之苦此時之可惜也僕以為天資足下有異日名聲績業光于前後正在今日可不勉之僕常念生百代之下未必為不幸何者以其書具而事多也今之言者必曰使聖人微旨不傳乃鄭𤣥輩為注疏集作解之罪僕觀其所解釋明白完具雖聖人復生必挈置數子坐於游夏之位若使𤣥輩解釋不足為師安得聖人復生如周公夫子親授微旨然後為學是則聖人不生終不為學假如聖人復生即亦隨而汨一作滑之矣此則不學之徒好出大言欺亂常人耳自漢以降其有國者成敗廢興事業蹤跡一二億萬青黃白黑據實控集作空有皆可圖畫考其來由裁其長短十得四五足以應當時之務矣不似古人窮天鑿𤣥躡於無踪算於忽微然後能為學也故曰生百代之下未必為不幸也夫子曰三人行必有我師焉此乃隨所見聞能不亡失而思念至也楚王問萍實對曰吾往年聞童謡而知之此乃以童子為師耳既參之於上古復酌之於見聞乃能為聖人也諸葛孔明曰諸公讀書乃欲為博士耳此蓋滯於所見不知適變名為腐儒亦學者之一病僕自元和以來以至今日其所見聞名公才人之所討論典刑制度征伐叛亂考其當時參於前古能不忘失而思念亦可以為一家事業矣但隨見隨忘隨聞隨廢輕目重耳之過此亦學者之一病也如足下天與之性萬萬與僕相逺僕自知頑滯不能苦心為學假使能學之亦不能出而施之懇懇欲成足下之美異日冀受足下之教於一官一局而無過失而已自古未有不學而能垂名於後代者足下勉之大江之南夏候鬱濕易生百疾足下氣俊胸臆間不以悁忿是非貯之邪氣不能侵慎隂一作防是脫大醉繼飲其他無所道牧再拜與宣州崔大夫書某再拜閣下以德行文章有位於明時如望江漢見其去之呇天洸汪澶漫不知其所為終始也復自開幕府已來辟取當時之名士禮接待遇各盡其意後進潔潔以節業自持者無不願受閣下回首一顧舒氣快意自以滿足今藩鎮之貴土地兵甲及生殺與奪在一出口終日矜髙與門下後進之士權得失去就分寸銖黍一作兩間多是其人也獨閣下不自矜髙不設塹壘曲垂情意以盡待士之禮然後知後進潔潔以節業自持者無不願受閣下回首一顧舒氣决意自以滿足此固然也非敢茍佞其詞以取媚也不知閣下俯仰延遇之去就幣帛筐篚之多少飲食獻酬之和樂各用何道間夜永日三五相聚危言峻論知與不知莫不願盡心於閣下夀考福祿祝之無窮牧雖不肖則亦千百間其一人數也鹿鳴宴羣臣詩曰既飲食之復實幣帛筐篚以將其厚意然後忠臣嘉賔得盡其心矣吉日詩曰宣王能慎微接下無不盡心以奉其上焉自古雖尊為天子未有不用此而能得多士盡心也未有不得多士之盡心而得樹功立業流於歌詩也况於諸侯哉夫子曰君子疾沒世而名不稱司馬遷曰自古富貴其名磨滅不可勝紀靜言思之令人感動激發當寐而寤在飢而飽伏希閣下濬之益深築之益髙緘鐍之益固使天下之人異日奉閣下之德不替今日則為宰相長育人材興起教化國朝房杜姚宋不足過也某於流輩無所知識承風望光徒有輸心效節之志今謹録雜詩一卷獻上非敢用此求知蓋欲導其志無以為先也往年應進士舉曾投獻筆語亦䝉亟稱於時今十五年矣於頑懵中為之不已矣集作久於其事一有不字能不稍工不敢再録新述恐煩尊重無任惶懼某再拜與浙西盧郎中集作大夫書牧頓首再拜牧年二十六由校書郎入沈公幕府自應舉得官凡半載既非生知復集作亦未涉人事齒少意鋭舉止動作一無所據至於報效施展朋友與遊吏事取捨之道未知東西南北宜所趨嚮此時郎中一顧一本有而字憐之手擕指畫一一誘教叮寧纎悉兩府六年不嫌不怠使牧無大過而粗知所以為守者實由郎中之力也去歲乞假路由漢上員外七官以牧嘗獲知於郎中惠然不疑推置於肺腑集作肝間牧恃郎中之知亦敢自道其志公私謀議各悉所懷一俯一仰如久而深者久欲資郎中員外之為階級逺干尊重欲望收恤䑛筆伸紙以復踰於三四因曰既階級矣爰集作步欲升堂與排闥而入者事不同日式微詩曰何其處也必有與也言必有仁義與我所以處而不去也進退計忖不宜得罪今敢謹寫所為文一十四首編為一卷繼進於後愛之不倦為之不已不至於工今以為獻無任慙惶然特為進說之端非敢因此求知不勝攀戀惕懼之至牧再拜幕職上此非郡幕與顧記室書徐陵吾伏事天朝本非舊𨽻殿下殊恩逺垂薦拔故常戰戰栗栗甘心痛謹庶其愚老無負明據近者既居臺轄惟務奉公去年正月十五日尚書官大朝元凱既集丞郎肅然忽有陳慶之見陳暄者帽簪釘額絛布裹頭虜袍通踝胡靴至膝直來郎座遍相排抱或坐或立且歌且詠吾即呼舍吏責列不答而走反為憾恚妄相陷辱至六月初遂作盲書便見誣謗聖朝明鑒悉知虛罔惟云吾取徐樞為臺郎南司檢問了不窮推承訓劾為信言致成隳免此事寃枉天下所無吾市徐樞宅為錢四萬任人市估文勝歷然不䝉申理見枉虛巧二者樞是故少府卿鱗之子鱗殞身侯景之役又為西臺所贈兖州左衛官位甚髙未知其子何忝郎署魏晉之前如為又逺宋齊以降其例甚多如徐愛阮佃夫之子可不得郎官耶紀文卿公向璡皆為列棘豈冗雜曹郎乎三者樞入身梁朝解褐嶽陽王小府墨曹承聖時為故敬常晉安王諷席文墨具存陜西官爵乃多浮濫更補臺郎不為勝擢未知何忽推宅貨官四者徐領軍節度自啓樞為郎敕付選序吾既不啓據又不為選職所可相關止是得中侯相聞為呈啓而已以此見罪一何寃濫吾昔在承華是弟所悉行年六十無復儕儔非意餘生忽此誣謗堯有驚於讒說孔將惑於拾塵雖復聖主機明不能委照殿下德髙兩獻風美二南億兆歸心衣冠有託久願通啓披訴聖明伏見軍戎一作戎機多務所以不敢祈冒弟與吾逰眷蒸一作亟回星紀故人如此寧不矜歎耶侍言有便云何且為啓聞一䝉神鑒照其枉直方殖幽泉無恨灰壤伏覲謁帝承明緒言多次服矜遺老曲賜湔濯則殿下前時妄澤匪復偏私遂吳良延薦之恩無王丹所舉之謬吾得方辭武騎永附梁賔雖魏疑作愧家丞庶呈秋實緣弟深眷故此敬憑干謁非宜益懷悚慨徐陵白上雍州髙長史書李嶠八月十五日三原縣尉趙國李嶠謹再拜奉書明長史一作長史明公執事嘗聞諸師曰易稱君子或出或處蓋君子與一作以時消息從道汙隆故其處則閉重𤣥坐虛白龍盤鳳跱一作峙桂郁蘭芬下生川嶽之氣上發星辰之象其出則摛景光吐文質風雲相召日月爭明撫八翼而登太階提七星而酌元氣夫然故終始享吉進退利貞今嶠當休明之期權去就之分滄州密邇未貞嘉遁之名一作爻閶闔洞開不列亨衢之步顧嘗希仕尺寸徇祿升斗僮僕之與鄰趨走之為使婆娑塵垢之下踸踔藩籬之際區區短懷亦云可見矣抑貧賤實難降志顛沛不可違仁是用終夜九回一朝三省懼斯言之或玷將細德之為纍至於有文無害之政得玉喪寶之談服以周旋庶乎聞逹然以守其愚直任此拙難一作艱入門無為言之侣出谷罕求聲之援生平琴曲唯以下調相哀疇昔朋逰詎有中人見識誠不幾乎幽蘭芳蕙實有愧乎枯木朽株自獲忝微班預聞賤事佩紛綸之雅訓承肅穆之清塵有日矣亦曾越嚴序趨下風希口吻之芳音候眉宇之陽氣而堂上百里鬷明無撤器之因門下三年毛遂乏處囊之地雖願披心膽欲進欵誠雲漢逾邈風流遂逺夫客果有能或作客至不孤不孤或作果有彈劒之石士實難盡誰知執矢之工此昔人所以慷慨於神交殷勤於知已者也伏惟君侯日門翔照天池撫翼厨開銘鼎庭列歌鐘吐亹亹之言植堂堂之望河陽春樹開四照於詞林洞庭秋水清九流於心鏡若夫標置度量權衡物理蕭公畫策不深一作探𢎞逺之規孟子持籌未極精微之數粵若啓一作登金閣排玉堂利見九五差蹤二八或奏昌言伏丹地一作墀而心啓或一作乃廽天奬立一作憑紫樞而自逸南宫祕署出入生光西京神輔指麾成俗固已羽儀振鷺黼藻羣龍者焉下走家本燕南君侯昔臨趙北負書懷刺方致維桑之禮賁帛翹車行一作幸枉錯薪之駕愷悌之慈允洽敷腴之好不忘洎解褐中林易農下邑希光東壁猶是貧女舊鄰激水西江非復逹人前惠鄙賤一作陋之質未改提奬之恩巳别昔時薑桂早因得地而生今兹桃李翻以無言受棄豈非時亨其㑹命基一作塞其通者乎今餘秩無幾解巾有日便當斂襟初服收拙後塵何去何從罷龜策之臧否自開自落任天地之榮枯宜其卷舌吞聲滅形削跡不干執事之紀無煩左右之聽徒恨勤誠纍歲而丹慊不通服道彌年而白頭成諺所以低廽一作徊岐路杼軸蓬心搦翰操觚而不能自已者也夫引往納來江海所以深廣損上益下乾坤所以光大是故虛已之求有屈位而伸道泛接之愛或開懷而受物若乃崇峻宫垣扃鑰閫奧使屬睇之目隔愈深而照窮仰止之心限彌髙而望絶仰一作御賓以之失位篲客以之亡一作無門將恐慕義之夫思為黃鵠之舉企景之客不作真龍之逰願君侯垂古人之風申國士之分假其白璧之契接以黃金之言不忽當年要之卒歲則重如熊掌府中饒敢一作取義之賔輕若鴻毛節下有徇生之士矣敢薦狂斐一作妄惟君侯擇焉嶠再拜文苑英華卷六百七十二
