body:
  text: 文苑英華卷九百十四宋李昉等編職官二十二節度一太原節度韋凑碑一首河中節度李國真碑一首魏博節度田布碑一首唐太原節度使韋凑神道碑君子之事上也進思盡忠退思補過所以慎其初也不為義疚不為利遷所以成其忠也有始有卒往哲所難彭城文公韋府君庶斯道矣君諱凑字彦宗京兆杜陵人也翊商命族佐漢傳封龍旂承祀盛業百世曽祖諱瓚隋倉部侍郎司農少卿尚書右丞南皮縣伯開皇中受詔監河漕之運以實關中利國濟人名書隋史祖諱叔詣皇朝薄州刺史員外郎散騎常侍庫部郎中貞觀初奉使招夷越之酋以清嶺外息兵殷土事具實録父諱𤣥福舊唐書上作𤣥世系表名福字𤣥福永徽中為城門郎為外姻所累貶授桂州長史贈潤州刺史清風克紹盛徳難名育道儲祉以貽後嗣君承積善之休烈光膺太和之純粹文學政事懐適時之異材孝友忠貞禀過人之至行永淳元年解褐授婺州司兵叅軍致逺之漸發於初筮延載元年授資州司兵叅軍亷察使房昶覩君剖斷之跡嘆曰鸞鳳棲於枳棘豈惟有司之過亦使車之所急也於是狀其殊績上表聞薦俄拜楊州法曹叅軍繩愆糾慝正色無私志在澄清豈避强禦長史青河清潛悉以郡事委焉大定元年授上方監丞尋加朝散大夫轉相王府屬兼通事舍人時夏官尚書姚公兼王府長史嘗稱曰韋屬識見𢎞逺文彩優詳恨相知之晩也長安三年遷職方員外郎神龍元年轉兵部員外郎歴職方司郎中長安令遷將作少匠仍兼通事舍人景龍二年轉司農少卿三年除貝州刺史其草奏也必因事而作程其敷納也抑有儀而作表周行之譽久而愈芳既副象河之榮遂光分行之寄景雲元年復入為鴻臚少卿仍加銀青光禄大夫二年轉太府少卿兼通事舍人節愍太子之追諡也君謂有死不校太子之道苟弄兵而不誅雖衘命而難宥申生以遇讒自引考行為恭衞據以擅命出奔易名為戾以今方古斯為甚焉於是抗疏論奏明言至理仍於軒墀之下對仗自讀睿宗瞿然悚聽仗下後引君入閣賜坐再三詢乃令與執政議其可否僉以為恩命也行難於返汗惜遂事於已往知讜言之在斯所謂有犯無隱臨大節而不可奪也初神龍之末恩踰賞僭氛祲既清府庫猶竭時議興造寺觀土木競起役人不時上書切諫疏奏未報昌言固爭上悟其忠竟用嘉納乃詔有司量事節減息人省費動盈萬億君前後所論郊廟大議及時政所急凡數十上多見録用或編於甲令或載在策書仁人之言其利溥矣先天中又歴陜汝二州刺史陜服汝墳境壤相接惠先道路二郡以安開元二年遷岐州刺史屬鑾輿順豫大蒐岐下君徭賦均平儲峙簡約牲餼烹餁不徼賞於珍華扉屨資糧不取恱於餘羨闔境無擾人到于今稱之四年遷將作大匠六年充東都留守八年遷右衞大將軍上謂君曰皇家故事諸衞大將軍共尚書交互為之近日漸貴文物乃輕此職卿聲實俱美故暫用卿以光此官勿辭也九年正月遷河南尹累封彭城郡公十人以厲官時洛陽主簿犯贓有犯出為杭唐作作曹州刺史十一年轉汾州刺史其年又遷太原尹仍充太原以北節度大使北都留守河東道度支營田大使併檢校北都軍器監操節鉞之寄慎守禦之方師徒無勤邊鄙不聳雖李牧之馳名塞下魏尚之善守雲中無以過也上懿其績手詔勞勉錫以時服恩貺屢降及遘疾詔遣尚藥奉御宗處馳𫝊診療粤以其年十二月九日薨于太原之官舍春秋六十有五詔書故太原尹韋凑體識沉正宇量淹通立徳可師𢎞風自逺累居中外克著聲績而大耋不永昃離俄謝興言感惻用軫于懐宜洽寵光俾申榮贈可使持節都督幽州諸軍事幽州刺史物一百疋米粟各一百石給靈轝遞還葬日借幔幕手力太常諡曰文禮也議者以君忠肅恭懿寛仁信義惣虞書之九徳并孔門之五美而不翼亮百揆光昭三事蓋以滿盈為忌謙讓辭避不然豈才不適而命不至道不行而時不利也先夫人范陽盧氏刑部尚書從愿之妹也輔徳正家克循法度載誕元嗣無禄早終繼夫人隴西李氏長安令綰之女也能繼徽音以享偕老初尚書盧公以親懿之故式瞻景行將有刋述以紀嘉休既而鎮撫汾澮澄清梁益軒車載轄是則未暇及入護儲闈而辭疾歸老事竟蹉跌斯文不就天寳八載府君之嗣子尚書右丞見素痛霜露之滋深懼英華之易逺於是徵究決諒疑作代謀詢謀宗黨託詞瓊瑶以􅏡事實伯喈之頌叙長源於厥初考甫之銘垂儉徳於來裔其詞曰粤我初諒疑作謀以徳受氏黻冕軒裳世濟厥美辰象吐秀山川叶祉實生文公克纂先祀入孝出悌抱質懐文雅操有素清標不群志惟詩禮業在邱墳如玉之潔如蘭之芬發跡州郡飾躬以進既登省闈體聲益振守以恪恭不忘畏懼有犯無隱詞直而順象河是副功宣亞卿建旟受委遂典專城政存簡要徳著仁明是則之美時惟尹京揔戎軍政彼汾之典卒乘輯睦戎夷恱服永享惟疑作難老受兹戬穀天不愸遺遽終百禄哀榮式備詔葬言旋宅兆斯吉光隂屢遷巖巖終阜泱泱渭川刋石紀徳於惟億年故通議大夫守户部尚書兼御史大夫持節朔方鎮西北庭興平陳鄭等州行營兵馬及河中節度都統處置使兼管内觀察使權知絳州刺史賜紫金魚袋贈揚州大都督府李公神道碑權徳輿周道親親夾輔王室分唐叔以懐姓九宗職官五正故其後文侯受秬鬯之命文公受大輅之錫禄勲推恩敦叙昌大理道之所繇也國家憲章文武選建明徳元功侯籍延耀本枝初祖景皇帝之支曰鄭王亮實生淮安王神通用親賢功徳左右休運淄川郡王孝同淮安之昭也左集作右衞將軍燧淄川之穆也劔州長史贈太僕少卿廣業承祖稱積厚之慶而生尚書尹一有正字三王都揔六師八師四履投艱難服勤勞集作投難服勞有猷有守以至歿代禮賁於追命澤流於代官有由然也尚書諱國貞字南華天資風采為宗室儀矩冽如寒泉嶷若崇山修身筮仕動有休裕開元十三年明皇帝肆覲東后柴于岱宗以公族侍祠調補錦州叅軍事暴雨忽至江流泛集作羨溢公自下位能禦其災既堅舊防仍復故道累遷岐州録事叅軍太師苗公太尉房公繼為二千石皆所引重御史大夫張倚採訪關中表為支使天寳末林胡覆三川犯秦關詔除殿中侍御史為襄陽郡司馬且分集作介戎政公以侍板輿辭革車換房陵太守表課尤異徵拜長安縣令風政肅清改秦州刺史成命中止復為長安令尋遷汴州刺史未及行復輟為京兆少尹天子以公積有誠効可居大官累命為河南京兆成都尹劔南西川節度使其撫周郊猰㺄方熾公與大尉臨淮王議曰河洛為天下衝且無車賦比屋安堵冦將甘心焉不若虚其邑居挈以駿集作駿非邁贏糧善地可俟師期繇是太尉伯河陽公次于陜伐謀銷患君子推其智其在京轂兵火之餘人命將泛方勇切集作沉非物力亦屈而百役煩苦出於傷痍公曰元元愁歎受命惠養儻不能曠然丕變豈副明天子鬱悼之心耶列上蠲除悉䝉可報凡調於人者去其十九清靜集作凈愷悌百姓稱之其集作其二鎮岷峨裔人樂禍殺嘉榮二州刺史以開邊隙公命將疾攻舉無遺類明年昆戎圍我三城分遣鋭師據便城壁戒嚴持重徼其極而擊之賈余無前酣戰盡殪悉獻虜獲軍無私焉隣壤不靖偏師叛換將盜兵符已據城寺出軍壓境指顧而平凡三整武經而巴蜀軌道拊循安置四封畏其威柄用者沮公勲猷徵為殿中監命書既下不俟駕行囊被單車無道里費取倍稱之息五萬甫達京師上嘉而賜之俾拆其劵㓂有叚子章者恣睢就戮方帥以告語聞詔公宴見前席嘉奬且曰利兵積穀皆卿之素也其無駭庈父之謂乎朝野嘉其首公而服其㓗已臨淮王移鎮海岱長轂在郊西邊北朔合淮陽圻父五諸侯之旅主盟中權盡護諸將於是拜户部尚書同州節度都統使又以職顓戎重則風俗不阜加管内觀察使權知絳州刺史公外揔方畧内修班制當强弩之末無半菽之糧不忍加賦飛章木下猶以憲度為巳任推剽者斃之集作不行師諸校譸張􅔵望至是夜暮變起或以跳驅諭公公曰吾之不敏當死節安下官敢貳偷以煩刑吏集作史亂之劇集作劉是也公竟及焉議者尚其㓗矩而哀其不淑時上元三年建卯月春秋四十八是歳改元寳應至夏五月寧神于三原縣之北原詔以揚州大都督府集作府字印綬告第憫其勞也公本諱若幽上元中天子以特立之操為宗工表率錫嘉名以更焉公忠儉誠厚方嚴密靜用儒行憲令修明事功大玉不劌楚金必割凡歴官二十四自解巾至握節勤職十七其以内庭持書中執法亞丞相佩兩印以雄外服者又七命焉刺房陵之後五六年間車不輟鞅賦職任功名聲章明及公以司徒揔輿師令弟若水以内府司贊謁而大夫福履所介日陳夀觴懐黃佩玉左右温凊極魯侯之燕喜邁張仲之孝友宜錫夀寵為人倫龜龍曽未中身遭罹凶害前史稱霍去病亦有天幸然則命之所賦有幸焉有不幸焉斯不可問也夫人扶風郡君竇氏鴻臚丞光之女楊府長史御史大夫覦之妹集作姨也淑明柔順克叶公志家肥族睦抑有助焉公薨若干年而夫人歿有子四人長曰錡材器碩茂㓗亷忠集作真肅遵修訓則復大其門入作卿士為侯伯貞元十五年以御史中丞剖符潤州宣風以𢎞禮俗成賦以殖財用大績茂焉中邦頼焉明年就加御史大夫十八年進禮部尚書撫封題劔如公渥命次曰鎰蘄州刺史次曰豐士鄠縣令㓜曰豐器長安縣尉皆有幹裕而屈於年位今尚書永惟先公丕矩未刻金石以徳輿當叨史職久掌替書知王族大僚之事業見託論譔欲不敢沒其美亦不敢溢其言銘曰堯睦九族漢封同姓烈烈淮安乘時佐命淄川而下三葉儲慶乃生我公紹續先正時惟宗英忠智亷清所至風行所居理平山𤣥朱組既靖蜀京鏚鉞琱戈乃主夏盟交修藩衡纂服𢎞大陟降集作恪左右勤勞翼戴隱微之間乃與禍㑹夷途始半白晝中晦桓楹羽葆久閟鮮原煌煌密章肅肅絲言盛徳復祉藂兹後昆列郡是式介人維藩大江南服考禮修職五曹十聮克嗣先徳董是經費陳之藝極本於教忠懋此宣力伊昔祭器食銘丞彛禮則有變魂遊在兹連岡陂陀宰樹參差悠悠終古永揚斯碑魏博節度使田布碑庾承宣於戲節義立則人倫之風厚忠孝彰則君親之恩大罔極之報非死不盡臣子之志非盡不明決去就於至誠擇利害而無撓其生也挺身為萬夫之特其終也成名於泰山之重凌視千古高居上游斯人伊何魏博節度使田公布子敦禮之謂也初公烈考曰𢎞正輔佐憲宗掃除冦逆為侍中魏博節度使今上嗣位鎮州軍吏以節度使王承宗死上聞詔𢎞正除中書令代焉居一歳兵亂遇禍公時為涇原節度詔追至京聞喪公卿獻議以為討鎮莫若用魏魏强而近又公恩徳積洽於魏以鉞賜其子布布復有能則魏之士欣戴而効死焉詔從之公泣血號天而辭不能者再詔不許乃曰報君恩復父讐在此舉也如不濟則無其生以謝之别兄弟妻子屏門之内辭賔客朋友於西階之下喪輿遂北至魏則徒跣行號以見將士將士耆艾者父兄事之齒類者骨肉親之毀家以結人心辭禄而贍公用明求報之道竭勵士之方冀其恊心以副私志異哉魏之風俗久悖聲教魏之將士素染狼戾懐安自固忽感激之勇節積驕成惰無戰鬭之剛腸初猶哀公之誠悦公之賞雖未心化蹔忘舊風無何奉詔出師抵冀之南宫縣爾賊而振威也時討幽鎮諸軍庶事草剏計司荒畧供饋大虧公乃以本部六州之租入權以自濟氷雪方盛飛輓阻艱衆相與言曰頃常出頼朝廷供給優贍軍府因以完濟令者瘠已肥國尚書無乃太公忠乎旋以滄景喪敗王師不振諸軍顧望莫有鬭志賊使間諜騰肆飛語以不固之志加懐怨之心望風聽聲將欲謀亂咸集作或有見者宜圖其休全身保軍以俟後舉公仰而號曰天子徵兵以討叛亂吾特授旄鉞復其家寃將軍雖死國典斯在豈蓄縮完守為不忠孝之臣乎衆知公不可迫因師行而遂潰中軍不同其謀奉公達于魏城衆又言曰魏土不知朝化久矣刑賞禮樂皆自已出近以保富貴逺以貽子孫苟能從衆之謀則捧戴如舊公知其不可以道化又難以力服時太尉之靈座在魏之官署公陽以入臨人不以虞慟哭伏劔衆驚至而絶矣春秋三十八噫相國李公愬先公師魏衆以貪亂李不能制閉域以自固重幣以貸死及公初至悖氣尚存邀賞撓法一唱萬和况鎮之軍於魏舊有救敗徳兩軍相觀如親戚焉寧有一人之忠義化六萬之肝膽三月之將帥移六十年之舊風强其陸梁計其相觀同騃愚蔽知其不可從其李石有言曰重耳教訓三歳而後敗楚勾踐生聚二十年而後㓕呉以中古之慤信晉越之訓伏尚且遲之况今魏乎聞者信之及公終也賊衆感義而退守王師聞風而憤激達于朝廷天子壯其節而哀其死為之廢朝公卿洎百執事咨嗟悽憫乆而不絶及喪至則弔周懋恤禮備而恩加焉贈尚書右僕射以長慶二年八月二十六日葬于萬年縣白鹿原公之大王父曰廷輝安東都護司馬贈右僕射王父曰玠相州刺史烈考中書令贈太尉而勲高位崇至公而名重節立蓋以茂徳為濬源大忠為厚阯克生賢哲焯燿邦國初自魏之禆將以謹幹至大將自侍御史以討叛勞至大夫掌平蔡功為金吾將軍以長材鎮要衝為河北節度以多畧靜邊陲為涇源節度在禆將則辦寃囚大尉無淫刑矣領征軍則備賊之驚突諸軍因之立功矣為金吾抑同列而不遏諫官聖朝有容直之美矣帥河陽也則省將而多戰卒㓕賊而守詔條於是乎兵實而人安矣鎮涇源則觀其力穡教其騎射於是乎糴賤而人能矣其大材敏識有名臣之體要深謀善計得良將之精華善而不伐高則思降無豪貴之厚集作侈欲慕亷讓之高風惜乎壯年有志不立豈天意用斯人以激其怠隋警其奸兇者哉伏劔之辰手操遺表陳兇逆之根本明將帥之儀矩聖君因得辨邪正可謂始終之善者也其遺孤及門吏知余夙奉周旋感激名義謂揚盛烈於萬斯年銘曰具體皆人能恥者誰輕死重義謂之有思豺狼貪婪力不能支部下將貳誠無所施上虧國恩中寃父私兩志莫遂顧生奚為明者獨斷勇夫不疑忍恥偷安犬彘等夷靦顔冒寵復何人斯誠貫心膂竟違我期一作誠實心堯竟而我欺利刀貫胷血殷喪帷軍士喧駭逆黨忸怩義風激揚征車不衰自居所重賢人得之地察天明稱為神祗雅有節鉞流聞邊陲青史長存聲香葳蕤文苑英華巻九百十四
