body:
  text: 文苑英華卷五十九宋李昉等編行幸二溫湯御毬賦一首回鑾賦一首駕幸太學賦一首駕幸宣輝門觀試舉人賦二首駕幸春明樓試武藝絶倫賦一首漢文帝幸細栁營賦一首沛父老留漢祖賦一首穆天子宴瑶池賦一首溫湯御毬賦閻寬天寶六載孟冬十月霜清東野斗指北闕已畢三農亦休百工皇帝思溫湯而順動幸會昌之離宫越三日下明詔伊蹴鞠之戲者蓋用兵之技也武由是存義不可捨頃徒習於禁中今將示於天下廣場惟新掃除克淨平望若砥下看猶鏡微露滴而必聞纎塵飛而不映欲觀乎天子之入先受乎將軍之令宛駒驥駿體佶心間銀鞍月上華勒星還細尾促結髙鬐難攀儼齊足以驤首待馳騖乎其間羽林孤兒力壯身勇蓋稷門而未揵疑作健攀秦鼎而非重積習為常成規親奉咸技癢而願效望鳴鑾而跂踵雲開紫殿日臨丹墀無譁衆士其局各司聖神之主於是乎帥師君前決死且不敢辭珠毬忽擲月仗爭擊并驅分鑣交臂疊迹或目留而形往或出羣而受敵稟王命以周旋去天威兮咫尺有騁趫材専工接來未拂地而還起乍從空而倒回密隂林而自却堅石壁而迎開百發百中如電如雷更生竒絶能出慮表善學都盧仍騎騕裊輕劇騰狖迅拚一作伴鷙鳥梢虛而訝人手長攢角而疑馬身小分都驟滿别部行收哮噉則破山蕩谷踴躍則跳巒簸丘爭靡違於君子中寧謝於諸侯况賞罰之必信旌君國之大猷其中志氣超神眉目勝畫地祗衛蹕山靈捧靶衆沸渭以紛紜獨雍容而間暇俄詩側辨之俄冠而雲散五色揮策而日回三舍狀威鳳之飛翔等神龍之變化此神人兮有作豈臣子之齊駕是時也天宇闢睿情歡命京尹將屬官美斯場之寵麗成今日之逰盤詳其指揮雅標幹事之首察其任使孰為知人之難遂賞功而褒德何縑縞之戔戔尹乃拜手稽首逡巡不受曰子來之功臣何力之有夫稱物以平施則可大而可久故職司與役徒亦恩加其賜厚且稱兹藝精鍊古來罕見寓今斯成伐謀足擅可以震疊戎狄康寧宇縣漢祖未悟果有白登之圍唐堯闕修載勞丹浦之戰然明者覩於未兆戒者圖於不見城誠狹頗積往來之勤馬雖調恐生銜橛之變慿覽則至樂躬親則非便帝曰俞忠哉真知言之選回鑾賦歐陽詹夫何降一人兮將凝帖乎萬方神其精而傑其質兮赫赫巍巍一作赫赫奕奕以昻昻膺千年之寶厯承八聖之重光道為紀德為綱仁為宅義為防化悠悠而蕩蕩風習習以洋洋沐雨露以蕃昌燭日月以皆康癸亥一作丑非之嵗太皡司一作之政乃作幸于西順上帝之令將行曰相彼元元以哲后為父母視淫君猶芻狗豫其在德則夷狄皆豫之子也伊重關擊柝於豫誰三字一作虞誰為守乎豫其不淑則骨肉實豫讎敵也雖金城湯池於豫何有乎四門大開七寢停警歘凛溧以風清霄寂澄三字一作寂澄疑而月靜于時厥有頑民從愚至逆假鴻恩以出入弄神器於間隙於是天忿地怒人慘神惻積憤一作沴氣以交衝疊寃心以潛逼災變流演妖氛充塞山河列以長晦日月存而無色明則士庶幽則靈一作神祗豚魚有識草木無知企喁喁以嗷嗷望我后之來儀如孺子之憶慈親焉如涸鱗之念長津焉如枯苖之待膏雨焉如籠鳥之仰林莽焉既而文物無荒聲明有素木葉猶飛金風未暮聖澤西浹天顔東顧回旌旗整鑾輅雨師啓途風伯前驅豐隆布令列缺行誅神功莫仇天力誰虞櫛繽紛於冥宰駢駱驛乎虛無洗地軸拂天衢殱有罪福無辜氛霾掃蕩於寰區塵埃滌濯乎皇都元凶不戮而淪痡品物未覩而遙蘇爾其靈物既先乘輿乃從雲車煙馭春心日容鬱霏霏以葳蕤輝熠熠以嚴顒祥風􅠞􅠞以淫淫瑞色靄靄一作雨以溶溶蒙蘢焉虹霓之榮儀鳳髣佛焉煙靄二字一作江霧之送逰龍若夷若夏乃愚乃賢振振駢駢殷殷闐闐巷如流以湯湯野若草以芊芊雲浮巨嶽水集洪川至喜翻悲含淚而前曰自沐玄化冥冥綿綿如載于天如飲于泉卒嵗永年皆謂自然異日殷憂方昭厥由歸歟歸歟人其待一作侍居是日也皇帝乃闢金門升一作出紫宫宣睿旨將天衷熙乎若微雷淑氣暢昆蟲芬乎若韶光麗景發青蔥下蟠厚地上洽玄穹扶桑而西虞泉而東百福交通萬彚大同白日三舍以逡巡瞪丕征以融融南山萬嵗以爭一無此字呼頷聲若動而崇崇至矣哉之德也深乎大乎滂乎沛乎爾其汪濊乎可謂上合天經下叶坤靈旁繞一作統神明中獲人情故能不守有與之守不爭有與之爭此一舉也足見天地之心足辨人神之意諒無黨以無偏唯夫道德之比者也凡一作皆集本駕幸太學賦以人安國泰大播儒風為韻朱休皇帝念儒林之繁會當天地之交泰降萬乘以爰來使八方而咸賴視其鼓篋之地文在其中禮於釋菜之庭化行乎外睿想難喻精搜典謨屬車連延輾御陌而後入翠華容裔向文囿以前驅未見儒字官韻臺觀惟新墻垣盡飾宗伯禮賢以蕆事司成執經一作心而奉職端冕旒而綵仗𥘉立始駐六龍發聲教而翠華未旋以行萬國整衣裳之楚楚習威儀之翼翼入門而冠劒陸離布位而貂蟬逼側若乃展先師之禮示後進之人張國容以貴道闡文教以尊神升夫子之堂所謂以德行行周公之禮豈可不躬親不然者何以自謙於至聖而親饗於陪臣哉是以講學斯陳德音逺播念月將而日就各呈材而切磋唐韻有磋字千箇切與磋義同改作效課恐非龍顔不逺顧探索之惟勤一作顧平日之克勤天步下臨曷斯須之敢惰雲布星攢周回可觀彼儒風之習習資睿思之安安頥指於學海儒林自因澤及目擊乎雄詞麗藻誰謂才難恩下育而冬暖命遐宣而晝寒濟時以勸學為先居上以易俗稱大俾惰遊者咸思於經籍好勇者亦髙其冠帶既而宣化畢盛禮終繳素志播皇風轉龍旗於祥煙之表返鑾輅於瑞氣之中盛矣哉載筆之史不紀乎教化之宫駕幸宣輝門觀試舉人賦并序擇以君聖臣肅精多士為韻失名籍于天田之嵗也洎正月下明詔及仲秋萃賢良凡今才人莫不麏至他他籍籍不可勝言于以躬親示納人之獻可也為之加膳示恤之以飫賜也既自渴賢不足實為觀國之光君舉必書敢賦其事惟天為大則之者我君有嚴有翼乃武乃文據天地之大寶建社稷之元勳道不虛行於從政乎何有試可乃己俾濫吹者區一作羣分於是移千官以就日闢髙闕以連雲濟濟罄山林之士峩峩列鵷鷺之羣且木以從繩則正君以從諌則聖廣開替否之規遂下昌言之命采彛倫翹錯薪能官於是乎疸惡則哲自可以知人得孫𢎞為舉首趨倚相為史臣儼端居於咫尺恭大問以絲綸睿旨臨天威肅咸怵惕之若厲俱進退之維谷將畢力於謨猷乃竭誠於啓沃帝載惟貞垂範作程有典有則惟一惟精重席表其彰善持衡所以貴平便便有司能奉法而宣令髙髙在位更責實以循名觀賢謂何務於慎擇或告之誡訓或旌之束帛日軒豈疲於端想躬親不德於胡獲夫如是王者無外誰為方外之臣野無遺賢誰為在野之客獨有扣角勞歌憂心孔多仰天門以難呌咏碩人之在阿一作薖則知代實須才生此多士惟賢非后不食惟后非賢不理一技稱最徒仰惠堂之榮三道登科敢望太常之美儻連茹之終及乃願一申於知己也第二同前韻張彥震望之如雲聖人為君克敷厥德以嶷鴻勳大庇黎元始躬耕而載籍旁求俊彥終訪道而崇文於穆我皇乃神乃聖開四目以達聰掩八紘而布政羣龍順啓沃之旨多士奉疇咨之命大哉邈乎於斯為盛爾其庶士冢宰百寮近臣大夫師長之旅版築巖穴之人舉爾所知乃寸長無捨裒然而至雖片善必申於是朝無遺逸野絶沉淪顒卬於鳳闕之下鼓舞於鴻漸之辰且聖澤昭宣惟聞一作恭有典有則天威咫尺孰謂不躬不親伊何原本此處闕四字百寮增肅仰清問而矯首拜昌言而俯伏蒸哉髦士緑一作録驥方呈於長衢賁於丘園白駒自來於空谷亦既贊休命亦既陳厥成將獻可而替否必覃思而研精意彼逸足侔乎先鳴錯翹薪以刈楚聊濯疑作擢桂而敷榮懿乎文物明明威儀赫赫搖綵仗於雲路闢禁圍於廣陌雖知人不易實在乎區分而天鑒孔明自彰乎慎擇夫然才為世出才應時多以才從政兮國有恆典以才為輔兮人知匪他于以代天工則百寮矜式于以掌邦憲則庶事協和亦自此立功亦自此致理邁前王之躅垂可大之紀維翼翼之聖朝務濟濟之多士豈止夫堯吁舜咨可疇德而已哉駕幸春明樓試武藝絶倫賦以弧矢之利威天下為韻韋肇有武備者國之嘉謨習武事者人之令圖其在易也徵之擊柝其在禮也取彼懸弧蓋居安慮危而兵不可去䇿名委質而藝不可無我皇富有四海光宅八區然猶軫懷未達愓慮不虞欲以廣盛業於二柄選雄才於百夫時乃駕幸於層樓闢場乎九軌森其羽衛揭以弧矢列簮佩而儼立端冕旒而髙視詔曰惟爾力人惟爾爪士食我場藿今則至矣歌乎采蘩試可乃已於是拜手稽首足之蹈之騁伎於非常之日爭鋒於拔類之時則有六鈞用壯百中無疑和容就列省括于兹射用藏弓不獨主皮之善發殊罕忌而無失鵠之嗤可謂措柸至習捨跋疑作拔詩捨拔則獲必至盡其妙而不棄前修擅其功而若有餘地天顔既矚且賞麗龜之功人意所傾敢爭射隼之利又若蒙輪之俊超乘如飛騁廣場之永埓覽繁弱而忘歸左旋右抽擢兩肩於敏手奮髯增氣示衆目以餘威立表取凖臨危應機盤過身之矛所投皆中執如組之轡所向無違宸心用多其勇捷觀者咸服其精微至有術非五善取匪十全不能定是非於已分而又爭利害於君前莫不心戰股栗落羽驚弦豈搜揚之不至諒工拙之相懸夫試也者為求於衆捷也者為同於天明疑作非僥幸之可竊周旌一作精勸之無偏是以詣闕者數百計而升明者才一二焉其或進而不濫動必合雅靡蹲甲以自媒思觀禮之見假始僶俯於法度忽蒼黃於取捨信其命而有之亦不得而無也宜乎召墨客授行者書絶藝於詞臣傳不朽於天下漢文帝幸細栁營賦以將軍出令漢帝徐行為韻馮韜虜犯榆塞軍屯栁營觀文帝勞師之禮得亞夫為將之名其始也威獨立氣橫行由棘門而及灞上列千騎而陳五兵羽衛爰來威儀既盛馬壯而塵起旗整而風徑全忘以律自矜萬乘之尊是用加囂未發三軍之令及其回鳳蓋駐金輿師徒方俟於倐往介胄俄驚其勃如人心為之激發天步為之躊躇方警蹕之𥘉傳自南自北洎鑾鈴之有節匪疾匪徐偉夫推轂而行受脤而出苟心腹之無二視尊卑之如一足使他將顔厚餘凶股栗戈鋋有耀壓灞水之波瀾士馬無聲悄轅門之風日焜耀今古光昭典墳振天聲於絶漠笑兒戲於諸軍山河保誓竹帛垂勳守官而敢違上命不戰而自息祅氛暴去強秦功成大漢炎火興而劉氏將熾旄頭耀而胡羣尚叛思堂堂之陳用拓封疆得糾糾之夫以平禍亂宜其威加異類才出非常精貫金石貞含氷霜近鎮秦城之上遙臨渭水之將詩在渭之將蓋將側也况是官韻不知者誤改作傍觀爾類之可殱帥安得奪諒我戰之則克敵何以當國家威武有制冦銷蜂蠆之毒臣展瓜牙之衛斯幸也誠則可嘉殊足稱於其帝穆天子宴瑶池賦以衆仙護儀靈感斯集為韻張仲素昔穆王之御天下蕩志思玄凝然眇然將以肆車馬之逺迹訪崑閬之羣仙既而獲八駿以為乘興疑六龍而並騖謂升天可兾寧為海右之巡行地無強漸出人間之路弱水已踰層城是赴洎夫展王母之容貌見列仙之軒輅絳宫玄圃異故鄉之樓臺鳳舞鸞歌勝至樂之韶濩澄光渺瀰極望瑶池湛水容之漫漭蕩日彩以參差逺近洲沚駢羅羽儀蕩蕩五雲冒芝田而不散翩翩三鳥拂珠樹以相隨金液是嘗玉杯是挹桃杏之花競秀蓬瀛之侣遙集逰仙可戀覺天路之日長惟帝念歸懼人間之景急嗟乎道不可測理難具形且復淫神之與驕志啄腐之與吞腥固不可以長逰仙境久會衆靈於是回輕軒反飛鞚却瞻遼廓而無見尚聞簫鼓之餘弄雖周文之歌鎬宴且異尋仙秦穆之享鈞天常稱在夢此則詣之者身從之者衆稽彼異録陳兹所窺後之王者樂以聞斯方士彩童幾涉風波之阻金莖玉露寧延隟駟之馳故我后端拱穆清無為玄感却走馬而萬方以泰不出户而八紘盡覽彼乃輕萬里而崇一朝孰若濟羣生於屯坎沛父老留漢髙祖賦以願止前驅得申深意為韻王啓漢祖還鄉兮鑾駕將還沛中父老兮留戀澘然憶故舊於干戈之後敘綢繆於旌旗之前白髮多傷鳳輦願停於此日翠華一去皇恩再返於何年昔以羣盜并興我皇斯起英明天授其昌運神武日聞於舊里今則秦楚勢傾鼓鼙聲止聖代而陽和煦物元首明哉暮年而蒲栁傷秋老夫耄矣然而黃屋才降丹誠未申豈可風馳天仗雷動車輪一則以情深閭里一則以義重君臣隆凖龍顔昔是故鄉之子奉觴獻夀今為率土之人乃曰陛下創業定傾順天立極臣等犬馬難效星霜屢逼窺泗水則凄若舊風指芒碭則依然故邑眷戀難盡沉瀾易得昔日望雲之瑞豈有明言當時貰酒之家堪驚默識帝乃駐天步遂人心戈矛山立貔虎煙深草澤初興雲路而蛟龍奮翼鄉園重到煙空而鸞鶴歸林時也親友咸臻少年并至縱兆民如子恩更洽於故人雖四海為家情頗深於舊意官韻一本作地非往事如覩流光若驅望幸誠異攀轅則殊交逰既阻於秦時堪悲今昔黎庶正欣于堯日自恨桑榆已而雙淚盡垂一言斯獻請沛為湯沐之邑實臣愜生死之願是使萬嵗千秋杳冥無恨文苑英華卷五十九
