body:
  text: 文苑英華卷六百三十七宋李昉等編賀下賀剋捷狀一首賀誅賊狀一首賀退賊狀一首賀破突厥狀一首賀東北纍捷狀一首賀賊自相誅滅狀一首賀破吐蕃狀一首賀靈武破吐蕃狀一首為昭義李相公賀雲南歸附狀一首賀破渭北黨項狀一首賀斬僕固瑒狀一首賀破髙玉狀二首賀韓僕射充招討使狀一首賀破賊兼優恤將士狀一首賀行營破賊狀二首賀剋捷狀張九齡右高力士宣示臣等張侍賔表臣等前因奏事親承聖旨懸料數日當一作必有捷書及此使至皆如睿略但狂胡背誕圍逼軍州一作州城凶力固已困窮邉城一無所損臣等伏料此賊早是破傷大衆自逺方來四字集作逺來踰月乃去馬羸則多死人苦則計生本是烏雜之徒足為集作徴破亡之漸此皆皇威逺讋氛祲坐銷豈伊邉人所能自保臣等幸忝樞近承奉聖謨邉捷有符不勝慶悅謹奉狀陳賀以聞仍望宣付史館謹奏賀誅賊狀右蓋嘉運奏北庭解圍仍有殺獲蘇祿背德敢此讐天盡驅犬羊來犯軍鎮雖肆凶毒欲逞其心而邉兵無遺鏃之費狂賊有輿尸之禍此皆陛下聖武將士龔行逺必叶謀動無遺䇿能令氛祲坐自廓清臣等每集作忝奉密謀屢承獻捷踴躍稱慶倍百恆情謹奉狀陳賀以聞謹奏賀退賊狀右高力士至宣勑示臣曹待宣奏狀知蘇祿遁逃集作走入山出界者四鎮懸逺比被侵逼將士用命雖有誅鋤凶黨集作徒尚多時集作日有抄掠兵疲矢盡為弊亦深今自奔亡誠是震懼聖威及逺氛沴坐銷又北庭救兵當時回旆不費軍廪事且無憂吐蕃縱實西行蘇祿不得相應其敗可必又無可憂邉事且寧不勝慶慰謹奏狀陳賀以聞謹奏賀破突厥狀右張守圭表奏突厥四萬騎前月二十五日至能訖離一作雞山契丹涅禮等前後斬獲俘馘數逾十萬突厥可汗棄甲逃亡奚王李歸國及平盧軍將等追奔逐北計日殱滅更聞奏者伏以突厥新立輕事用兵彼之威衆在於一舉又兩蕃與其結隙交構未深在於邉隅猶軫天算陛下料其終始指授規模知其舉衆集作鍾盡來本自無䇿勞師襲逺必合成擒使蕃騎先鋒漢軍堅壁坐觀成敗自戰蠻夷今契丹才交突厥已破計其奔北必至喪亡從脫身獲全亦舉衆皆棄醜集作此虜震懾從此氣衰東胡保邉永不攜二寬徭罷柝自此可期皆聖德逺覃皇威遐振事無遺䇿舉不失圖臣等忝迹樞近親承睿略忭躍之至倍百恆情謹奉狀陳賀以聞謹奏賀東北纍捷狀右今日劉思賢至奉宣聖旨垂示臣等破賊所由兼見守圭表奏具承契丹纍捷伏以聖武所加制勝者無失天威不抗犯順者自亡突厥負衆背恩窮凶逺襲兩蕃懷德誓死知集作如歸三軍奉國從命如指遂使一戰便克已聞殺傷無算慟哭而奔則知主將必死且蠻夷相伐我則不勞疆場有虞義亦奚失固知無愆信於漠北有大造於燕垂此實獨斷神謀事皆有預萬全之䇿永靜邉隅薄伐之師匪勞中夏凡在黎庶孰不欣躍臣等忝預樞近倍百恆情無任慶悅之至賀賊自誅滅狀前人右高力士宣示張守圭所上逆賊契丹屈烈及可突于等首級此等惡稔喪敗將及故天誘其衷既降又二而感義之士惡其翻覆背恩之賊已就集作既已誅鋤幽障廓清華夷俱靜計其餘噍永無動搖陛下邉任先擇聖謀獨斷克稟成命樹此戎功且知河朔無轉輸之勞林胡為賦稅之地臣忝在樞近預聞逺績捷書之至喜倍恆情謹奉狀陳賀以聞謹奏開元三十二年十二月此篇元誤編在五百六十六卷表門今已移入于此賀破吐蕃狀張説右臣等伏以涼州遙稟神算大振天威吐蕃小醜應時摧敗元惡渠魁乘勢俘戮隻輪匹馬坐見無遺雖虞舜之格有苖黃軒之征涿鹿未有廓清氛祲如今日之盛者臣等無任慶快之至為昭義李相公賀雲南蠻歸附狀崔行先臣某等伏承雲南羣蠻率其類八國獻欵歸附以某月日至于闕下臣伏惟皇帝陛下端拱九重高視千古聖謨廣運方昭不宰之功至德柔逺是有非常之慶不然者荒陬蠻貊左祍鳥言文軌未通嗜欲有異不知父子之性獨識皇王之恩此皆天誘其𠂻神助其請歸我龍德革彼狼心豈假渡瀘之師俄同兩階之舞夏啓之征有扈高宗之伐鬼方書之載籍適足慙耻臣限以守職藩維典兹戎旅不獲隨列稱賀抃舞丹墀之至賀靈武破吐蕃表令狐楚此表當在五百六十七卷賀捷表門今已移入姑存其目賀破渭北黨項狀于邵右臣得所由報破前件賊者伏以作逆者皇穹所誅阻兵者黔首共棄此賊與懷恩同惡俱為不道昨率其蜂蠆犯我郊畿奉天之衆振其前邠州之軍制其後彼進無所入退知難歸尚肆貪狼更為封豕毆侵縣邑剽掠居人光進仗天之威首殱魁蘖杜冕賈士之勇再掃殘妖既已誅其鯨鯢佇見傾其巢穴凡在戎旅孰不歡欣臣忝惣兵權倍萬恆品賀斬逆賊僕固瑒狀右臣某日於華州下邽縣東乾坑店下營伏承中使某昨日於路將逆賊僕固瑒首級過上都者伏以前件賊夷狄雜種素無令望本因行陳得踐榮班當將帥之權效錐刀之用幸慿廟算頗立戰功陛下嘉其成效寵以非次謂能盡節翻構異端凶惡貫盈人神共棄今引頸受戮傳首而來率土之人不勝大慶子既伏罪父必成擒掃蕩妖氛在於旬日臣忝司戎律倍萬恆情遲回路隅踴躍忘倦無任慶快之至賀生擒高玉狀右臣得澤潞節度兼鳯翔秦隴臨洮觀察處置等使李抱玉今月二十日牒稱先鋒將柏秀等十一月於南梁州大雪嶺北破前件賊黨殺戮四千五百人生擒高玉妻及男女二人并獲牛馬八千頭匹器械三千餘事又得李抱玉今月日狀稱於南梁州城固縣界擒高玉訖伏以此賊因依山險嘯聚甲兵蟻鬪郊畿之間鴟張邑屋之下西與犬戎連接北與逆竪交通更唱迭和窮凶極惡人神所棄覆載不容李抱玉虔奉睿謀罙入其阻始則俘其逆黨終用覆此凶渠巖穴一作谷以之風行雪林由其電掃威靈逺揚兆庶同歡在臣微誠倍萬恆品賀破高玉賊狀右臣得孫志直狀報具件如前伏以此賊嘯聚日久凶逆實深在於邦畿頗罹辛蠻既與犬戎相結又共懷恩合謀若二寇比來必為內應孫志直忝承廟算討伐殘凶既斬級以擒生遂傾巢而落卵蕃渠失援邉𤇺可息一作瞬息可期臣忝惣戎倍萬恆品賀韓僕射充招討使狀令狐楚右中使臣希倩至伏奉詔書吳少誠比令招討都不悛心今以韓全義充蔡州行營招討處置等便臣當軍兵馬令取全義指揮上官説充招討副使令臣使人詣一作於行營所撫慰將士仍令激勵臣伏見逆賊吳少誠殘喘微生闕飛賤品敢違帝命來即靈誅陛下天覆為心雲行其德念日月所照九州攸同哀陷穽之中一夫不獲懸申詔旨曲賜生全而長惡未悛執迷不復凶逾殛鯀聲極吠堯今既慎選武臣盡驅猛士威聲先路實勵於震霆剪滅剋期必同於沃雪欣歡奮激倍百恆情當道應行營將士等悉懷感怒畜力候奮指蹤示處既以得人致命捐軀必應無敵臣即準詔差人轉往慰諭仍切加激勵冀申微效用答深恩不任悃欵之至賀破賊兼優恤將士狀右中使臣希倩至伏奉詔書得全義惣率諸軍已入賊界四月二十七日大破賊徒并擒斬生級如有身死王事者已委全義並給棺櫬送歸本道令臣五年莫停衣糧者吳少誠畎澮下流不朝于海根荄弱植自絶於天陛牢之中鳴吠未已今霜鋒雲集月羽風馳既壓賊軍才聞儳鼓將摩冦壘已見靡旗實廟堂知先勝之形校隊陳爭登之力誅鋤有次蔑殺無難凡在方隅不勝欣抃臣伏以雖忠不烈戰士所羞視死如歸武夫之志伏惟陛下𢎞天覆幬為日照臨載激怒肝爰收膚骨漢世徒頒其槥櫝義闕送終周詩縱裹其糇糧賞延非嗣以今觀古奮一當千臣獲守邉陲叨居將帥無任感激之至賀行營破賊狀右臣得當道行營兵馬使李黯狀報諸軍兵馬四月十七日從臨潁縣三道齊進二十七日過溵水縣張村下營問探知桑林中有賊遂與接戰大破賊軍擒生斬級不知其數者臣伏以天道無親助其效順人生有欲患在不安今逆賊吳少誠深入禍門自沉罝罟執迷不復謂暴無傷去至安而即甚危棄大順而為巨逆避日月之照干雷霆之誅尚假息于寸隂敢偷生於數刻今者將從天落兵若山行濟溵水而不濡隔偃城而欲斷長蛇之首尾如截應接自難狡兔之窟穴已焚死亡無所方當破竹猶繫苞桑剩鋭氣以長驅抗威稜而直指困雖猶鬪亂不能軍既摧衆惡之鋒必喪元凶之膽以愚籌度不日掃清臣忝守戎旃無任忭躍憤激之至賀行營破賊狀右臣得當道行營兵馬使李黯狀報今月十三日於故信州城下破賊三千人斬首七百餘級者臣伏以舉趾或高則無所措退藏多密罔或不亡一作知逆賊吳少誠用已之愚劫人為惡唯日不足謂天可逃自韓全義稟受廟謀惣齊力士橫行於境深入其郛兵才交鋒寇已亂轍以羸師之骸罣罥穢草而腥林疲馬之命委離裝壕而咽塹實由奪其信幟拔彼懸門遂使戰野者不知所歸守陴者無從而出凶徒風散叛卒星分亦足以快帝怒於高天宣皇威於下土况臣任當旄鉞誓掃氛祲慶抃之情實萬恆品所守有限不獲稱賀闕庭無任屏營之至文苑英華卷六百三十七
