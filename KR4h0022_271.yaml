body:
  text: 文苑英華卷二百七十一宋李昉等編送行六崔曙一首沈頌二首熊曜一首邱為一首張謂八首岑參十首張仲甫一首徐嶷一首苑咸一首包何三首李嘉祐二十首張南史五首錢起八首賈至六首鮑防一首送薛據之宋州崔曙無媒嗟失路有道亦乘流客處不堪别異鄉應共愁我生早孤賤淪落居北州風土至今憶山河皆昔遊一從文章事兩京春復秋君去問相識幾人成白頭送金文學還日東沈頌君家東海東君去因秋風漫漫指鄉路悠悠如夢中烟霧積孤島波濤連大空冒險當不懼皇恩措爾躬送人還吳前人人心不忘鄉矧余客已久送君江南去秋醉洛陽酒贈言幽徑蘭别思河堤栁征帆暮風急望望空延首送楊諌議赴河西節度判官兼呈韓王兩侍郎熊曜賢哉征西將幕府多俊人籌議秉刀尺話言在經綸先鞭羡之子走馬辭咸秦庭論許名實數公當即真行行弄文翰婉婉光使臣今者所從誰不聞歌苦辛黃雲蕭關道白日驚沙塵虜寇有時獵漢兵行復一作仍夜巡王師已無戰傳檄奉良臣送閻校書之越丘為南入剡中路草雲應轉微湖邊好花照山口細泉飛此地饒古跡世人多忘歸經年松雪在永日世情稀藝閣應相望芳時不可違送裴侍御還上都張謂楚地勞行役秦城罷鼓鼙舟移洞庭岸路出武陵溪江月隨人影山花逐馬蹄離魂將别夢先爾到關西餞田尚書兖州前人忠義三朝喜威名四海聞更秉歸路詔猶憶破胡勳别路逢霜雨行營對雪雲明朝郭門外長揖大將軍送韋侍御赴上都前人天朝辟書下風憲取才難更謁麒麟殿重簮獬豸冠月明湘水夜霜重桂林寒别後頭堪白時時鏡裏看送杜侍御赴上都前人避馬臺中貴登車嶺外遙還因貢賦禮來謁大明朝地入商山路鄉連洛水橋承恩返南越樽酒重相邀道林寺送莫侍御前人何處堪留客香林隔翠微薜蘿通驛騎松竹挂朝衣霜引臺烏集風驚塔鴈飛飲茶勝飲酒聊以送君歸别睢陽故人前人少小客遊梁依然似故鄉城池經戰陳人物恨存亡夏雨桑條緑秋風麥穗黃有書無寄處相送一霑裳送黃甫齡宰交河前人將軍帳下來從容小邑彈琴不易逢樓上胡笳傳别怨樽中臘酒為誰濃行人醉出雙門道少婦愁看七里烽今日相如輕武騎多應朝暮客臨卭别韋郎中前人星軺計日赴岷峨雲樹連天阻笑歌南入洞庭隨鴈去西過巫峽聽猿多峥嶸洲上飛黃葉灧澦堆邊起白波不醉郢中桑落酒教人無奈别離何奉送李太保兼御史大夫充渭北節度使即太尉光弼之弟岑參詔出未央宫登壇近總戎上公周太保副相漢司空弓抱一作挽關西月旗翻渭北風弟兄皆許國天地荷成功以下十篇並見集本趙少尹南亭送鄭侍御歸東臺前人江集作紅亭酒瓮香白面繡衣郎砌冷蟲喧座簾疏雨到床鍾催離興急絃逐詩選作緩醉歌長關樹應先落隨君滿路集作鬢霜送崔員外入奏因訪故園前人欲謁明光殿應趨建禮門仙郎去得意亞相正承恩竹裡巴山道花間漢水源憑將兩行淚為訪邵平園送韋侍御先歸京前人聞𣣔朝龍闕應須拂豸冠風霜隨鴈去炎暑為君寒客淚題書落鄉愁對酒寬先憑報親友後月到長安送裴侍御趂嵗赴京前人羡他驄馬郎元日謁明光立處聞天語朝回惹御香臺寒柏樹緑江暖栁條黃惜别津亭暮揮戈憶魯陽送陽子前人斗酒渭城邊壚頭耐醉眠梨花千樹雪栁一作楊葉萬條煙惜别添壺醒臨岐贈馬鞭看君頴上去新月到家圓送鄭少府赴滏陽前人子真河朔尉邑里帶清漳春草迎袍色晴光拂綬香青山入官舍黃鳥出宫牆若到銅臺上應憐魏寢荒送王大昌齡赴江寧前人對酒寂不語悵然愁一作悲送君明時未得用白首徒工集作攻文澤國從一官滄波幾千里羣公滿天闕獨去過淮水舊家冨春渚常憶卧江樓自聞君欲行頻夢南徐州窮巷獨閉門寒燈靜深屋北風吹微雪抱被肯同宿君行到京口正是桃花時舟中饒孤興湖上多新詩潛虬且深蟠黃鶴舉未晚惜君青雲器努力加餐飯送楊瑗集作張子尉南海前人不擇南州尉髙堂有老親縣樓重蜃氣邑里雜鮫人海暗三山雨江明五嶺春此方多寶玉慎莫厭清貧送楊録事充潼關判官得江字前人夫子方寸裏秋天集作秋清澄霽江關西望第一郡內政無雙狹室下珠箔連宵傾玉缸平明猶一作使乎仍未醉斜日一作月隱髙集作書窗送李司直使吳張仲甫使臣間氣集作君方擁傳王事逺辭家震澤逢殘雨新豐過間氣集作遇落花水萍千葉散風栁萬條斜何處有離恨春江無限沙有離恨又𤣥集作看離恨送馬向入蜀徐嶷遊子出咸京巴山萬里城白雲連鳥道青壁遞猿聲雨雪經泥坂煙花望錦城工文人共許應紀蜀中行送大理正攝御史判凉州别駕范咸天子念西一作邊疆資君去不遑垂銀棘庭印持斧柏臺綱雪下天山白泉枯塞草黃佇聞河隴外還繼海沂康送韋侍御奉使江嶺諸道催青苗錢包何逺近從王事南行處處經手持霜簡白心在夏苗青回鴈書應報愁猿客屢聽因君使絶域萬物盡來庭送李侍君赴泉州前人傍海皆荒服分符重漢臣雲山百越路市井十洲人執玉來朝逺還珠入貢頻連年不見雪到處即行春送王文宰江隂前人郡北乘流去花間竟日行海魚朝滿市江鳥夜喧城止酒非關病援琴不在聲應緣五斗米數日滯淵明送王諫議充東都留守判官李嘉祐時稱謝康樂别事漢平津衰栁寒關道髙車左掖臣背河看北鴈到洛問東人憶昔遊金谷相看華髮新以下二十篇並見集本送王牧往吉州謁王使君叔前人細草緑汀洲王孫耐薄遊年華初冠帶文體舊弓裘野渡花爭發春塘水亂流使君憐小阮應念倚門愁送韋司直西行見二百二十八卷前人送韋集作袁員外宣慰勸農却赴洪州使院見二百九十七卷前人送張勸集作觀歸袁州前人羡爾湘東去煙花尚可親緑芳深映馬逺岫遞迎人饑狖啼初日殘鶯惜暮春遙憐謝典客一作客興佳句又應新送王正字山寺讀書前人欲究先儒教還過支遁居山階閒聼法竹徑獨看書向日荷新捲迎秋栁半疏風流有佳句又集作不似帶煙鋤送房明府罷長寧令湖州客舍前人君為萬里宰恩及五湖人未滿先求退歸間不厭貧逺峯晴更近殘栁雨還新要自趨丹陛明年幾樹親送嚴二擢第東歸前人隳官就賔薦時輩詎爭先盛業推儒行髙科獨少年迎秋見衰葉餘照逐鳴蟬舊里三峯下開門古縣一作道前送冷朝陽及第東歸江寧前人髙第由佳句諸生似者稀長安帶酒别建業候潮歸稚子歡迎棹鄰人為掃扉含情過舊浦鷗鳥亦依依晚春送吉校書歸楚州曽為道士前人詩人饒楚思淮上及春歸舊浦菱花發集作待間門栁絮飛髙名鄉曲重少事道流稀定向漁家醉殘陽卧釣磯送李中丞楊判官前人射䇿名先著論兵氣自雄能全季布諾不道魯連功流水蒹葭外諸山睥睨中别君秋日晚回首夕陽空送嚴維歸越州前人艱難只用武歸向浙江集作河東松雪千山暮林泉一水通鄉心緣緑草野思看青楓春好集作日偏相憶裁書寄剡中送韋雍少府入鍾山見一百七十一卷前人司勳王郎中宅送韋九郎中往濠州前人憐爾因同舍看書似外家出關逢落葉傍水見寒花送逺添愁思將衰戀集作念嵗華清淮倍相憶回日莫令賖送王端赴朝前人君承明主意日日上丹墀東閣論兵後南宫草奏期人稀傍河處槐暗入關時獨遣吳州客平陵結夢思送杜侍御還廣陵前人慚君從弱嵗一作冠顧我比諸昆同事元戎久俱承國士恩隨鶯過淮水看栁向轅門草色金陵岸思心那可論送上官侍御赴黔中前人莫向黔中路令人到欲迷水聲巫峽裏山色夜郎西樹隔朝雲合猿窺曉日集作月啼南方饒翠羽知爾飲清溪潤州陽别駕宅送蔣侍御收兵歸揚州前人沴氣清金虎兵威壯鐵冠揚旌川色暝一作暗吹角水風寒人對輜軿醉花看集作垂睥睨殘羡歸丞相府集作閣一作問空望舊門䦨前人此詩二百三十五卷重出今已削去詳注在前送元侍御還荆南幕府前人迢遞荆州路山多水又分霜林淡寒日胡鴈蔽南雲八座由持節三湘亦置軍自當行直指應不為功勳送宋集作朱中舍遊江東前人孤城郭外送王孫越水吳洲共爾論野寺山邉斜有徑漁家行裏半開門青楓獨映搖前浦白鷺間飛過逺村若到西陵征戰處不看秋草自傷一作銷魂送司空十四北遊宋州張南史九拒危城下蕭條送爾歸寒風吹畫角暮雪犯征衣道里猶成間親朋重與違白雲愁欲斷看入大梁飛送朱大遊塞前人嵗暮一為别江湖聊自寬且無人事處誰為客行難郢曲憐公子吳州憶伯鸞蒼蒼逺山際松柏獨宜寒送鄭録事赴太原前人歎息不相見紅顔今白頭重為西候别方起北風愁六月胡天冷雙城汾水流盧諶即故吏還復向并州送余贊善使還赴薛尚書幕前人音書不可論河塞雪紛紛鴈足期蘇武狐裘見薛君城池通紫陌鞍馬入黃雲逺棹一作憶漳渠水平流幾處分送李侍御入茅山採藥前人苦縣家風在茅山道録傳聊聼驄馬使却就紫陽仙江海生岐路雲霞入洞天莫令千嵗鶴飛到草堂前送王相公赴集作歸范陽錢起翊聖銜恩重頻年按節行安危皆報國文武不緣名受脤仍調鼎為霖更洗兵幕開丞相閣旗總二師營料敵知無戰安邊自有征代雲橫馬首燕鴈拂笳聲出鎮關河靜歸看日月明欲知瞻戀集作望切遲暮一書生以下七篇並見集本送劉相公江淮集作東萬催轉運事此詩擅場前人國用資戎事臣勞為主憂將徴任土貢更發濟川舟擁傳星還去過池鳳不留唯髙飲氷節稍淺别家愁落葉籬邊雨孤山海上秋遙知謝公興微月在江樓送郎使君集作補闕東歸前人無事共干世多時廢隱淪相看戀簪組不覺老風塵勸酒憐今别傷心倍去春徒言對萱草何處慰離人送彈琴李長史赴洪州前人携集作抱琴為傲吏孤棹復南行幾渡秋江水皆添白雪聲佳期來客夢幽興緩王程佐牧無勞問心和政自平送沈少府還江寧前人逺官碧雲外此行皆興牽湖山入閭井鷗鳥傍神仙斜日背鄉樹春潮迎客船江樓新興一作詠發應與政聲傳送楊著作往集作歸東海前人楊栁出關色東君千里期酒酣暫輕别路逺始相思欲識離心盡斜陽一作光到海時送張管記從軍前人邉事多勞役儒衣逐鼓鼙日寒關樹外峯盡塞雲西河廣蓬難渡天遙鴈漸低班超封定逺之子去思齊送嚴士良侍奉詹事南旋前人疏傅獨知止曽參善愛親江山侍行邁長幼出囂一作風塵握手想千古此心能幾人風光滿長路草色傍征輪日夕望荆楚鶯鳴芳杜春汀煙日集作漁烟月下淺花島集作㠘水中新㸃翰時集作遙相憶含情寄集作向白蘋送王貟外赴長沙賈至携手登臨處巴陵天一隅春生雲夢澤水溢洞庭湖共歎虞翻社同悲阮籍途長沙舊卑濕今古不應殊以下六篇並見集本前人送夏侯參軍赴廣州前人聞道衡陽外由來鴈不飛送君從此去書信定應稀雲海南溟逺煙波北渚微勉哉孫楚吏綵服正光輝長沙别李六侍御前人月明湘水白霜落洞庭乾放逐長沙外相逢路正難雲歸帝鄉逺鴈報朔方寒此别迎襟淚雍門不假彈送陸協律端州前人越井人南去湘川水北流江邉數杯酒海外一孤舟嶺嶠同遷客京華即舊遊春心將别恨萬里共悠悠送李侍御前人我年四十餘已歎前路短羈離洞庭上安得不引滿李侯忘情者與我同疏懶孤帆泣瀟湘望逺心欲斷送耿副使歸長沙前人畫舸欲南歸江亭且留宴日暮湖上雲蕭蕭若流霰昨夜相知者明發不可見惆悵西北風髙帆為誰扇送薛補闕入朝鮑防平原門下十餘人獨受恩多未殺身每歎陸家兄弟少更憐楊氏子孫貧柴門豈斷施行馬魯酒那堪醉近臣賴有軍中一作將軍遺令在猶將談笑靜風塵文苑英華卷二百七十一
