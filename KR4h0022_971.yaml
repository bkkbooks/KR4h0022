body:
  text: 文苑英華卷九百七十二宋李昉等編行狀二兵部尚書代國公郭震行狀一首尚書祠部貟外郎贈陜州刺史裴稹行狀一首常州刺史獨孤及行狀一首兵部尚書代國公贈少保郭公行狀張說公名震字元振本太原陽曲人也大父任相州湯隂令因居于魏公少倜儻廓落有大志儀冠雄傑身長七尺美鬚髯十六入太學與薛稷趙彥昭同業時有家僕至寄錢四百千以為學糧忽有一人縗服叩門云五世未葬棺柩各在一方今欲齊舉大事苦乏資用聞君家信至頗能相濟否不問姓名以車載去一無所留深為趙薛所誚公怡然曰濟彼大事亦何誚焉十八擢進士第其年判入髙等時輩皆以校書正字為榮公獨請外官授梓州通泉尉至縣落拓不拘小節嘗鑄錢掠良人財以濟四方海內同聲合氣有至千萬者則天聞其名驛徴引見語至夜甚竒之問蜀川之跡對而不隱令録舊文乃上古劒歌其詞曰君不見昆吾鐡冶飛炎煙紅光紫氣俱赫然良工煅煉凡幾日文粹作年鑄得寶劒名龍泉龍泉顔色如霜雪良工咨嗟嘆竒絶琉璃玉匣吐蓮花錯鏤金環生明月正逢天下無風塵幸且文粹作得用防君子身精光黯黯青蛇色文章片片緑龜鱗亦直結交逰俠子亦曽親近英雄人那知文粹作何日中路遭棄捐零落漂淪古獄邊雖則文粹作復沉埋無所用猶能夜夜氣衝天則天覽而佳之令寫數十本遍賜學一作榜士李嶠閻朝隱等遂授右武衛胄曹右控鶴內供奉尋遷奉宸監丞屬吐蕃請和親令報命至境上與贊普相見宣國威命責其翻覆長揖不拜瞋目視之贊普曰漢使多矣無如公之誠信逺近疆界立談悉定因遺金數十斤而還公悉以進上奏言揣彼上下之情人倦其𨽻役久矣咸願早和大將論欽陵不爭四鎮獨不欲耳但國家每歲不絶其使而欽陵常不禀命自然彼落唐書作蕃之人怨欽陵日深望國恩日甚設欲廣舉兵徒難矣斯乃公間之微㫖也必可使其上下俱懷猜阻矣則天甚然之無何吐蕃君臣果相疑二遂誅欽陵弟贊婆及其兄子莽布支並來降公聲名籍甚授御史加朝散大夫遷主客郎中吐蕃與突厥連和大入西河破數十城圍逼凉州節度出城戰歿蹂禾稼米斗萬錢則天方御洛城門酺宴凉州使至因輟樂拜公為凉州都督兼隴右諸軍大使調秦中五萬人號二十萬以赴河西公至凉州吐蕃素聞威名相謂曰我贊普猶懼吾輩何可敵乎相率而去公收合餘衆繕倄城壁施法令屯田一年而復公之功也公以凉州西拒吐蕃北有突厥久示其弱未揚天威因徴隴右兵馬一百二十萬號二百萬集于湟州營幕千里舉烽號令時宗楚客為相素與公不協令人告變則天惶懼計無所出狄仁傑魏元忠韋安石李嶠宋璟姚崇趙彥昭韋嗣立張說二十五人抗表請保如公有異圖並請身死籍沒則天由是稍安兵既大集人又知教分兵十道齊進過青海幾至贊普牙帳贊普屈膝請和獻馬三千匹金三萬斤牛羊不可勝數公大張軍威受其蕃禮而還既伏西戎震威朔漠突厥獻馬二千匹所獲凉州人士皆放歸塞上從此方鎮肅清蕃落畏慕令行禁止道不拾遺凡所規模制作率為後法河西隴右十餘處置生祠堂立碑頌德閻立均等為其文尋有詔許入朝公素無第宅寄居友人之舍候鼓入朝忽有人馬前送狀開緘前人巳去狀中唯有物數而無姓名便於樹下獲騾馬二十餘匹帛三千匹公曰豈非大學請葬之士乎因以買宅居止薛稷趙彥昭聞之皆嗟嘆良久景龍年中宗楚客韋處訥等潜結朋黨憎功害能授公驍騎大將軍兼安西大都護四鎮經略使金山道大總管時烏質勒久恃衆倨傲不屈朝廷縱兵逺掠道路不通公以衆寡不敵難以力制因率麾下數十騎徑入部落烏質勒大出兵衛出迎望見公威容端毅風鬛若神不覺屈膝因而下拜公宣國威命抗聲與語自朝至暮雪深尺餘竟不移足質勒頻拜伏語畢歸帳相去二十餘里質勒久立雪中倉卒疾發是夜暴卒其嗣子娑葛集諸將曰漢使殺我君父今須復讐大舉兵衆將追殺公聞質勒死遲明素服來弔道路相逢兵圍數匝娑葛見公忽來未之敢逼但言衛護漢使公至其帳下大哭流涕因撫定其嗣蕃人大喜留數十日助其葬事娑葛獻馬三千匹牛羊十餘萬移居千里西域無事道路肅清諸蕃聞之遣使歸降者十餘國時人語之曰郭元振詭殺烏質勒知娑葛與闕啜有釁奏請移於瓜州制從之會中書令宗楚客受金遂寢其事公具以狀聞楚客恃勢囑請召公將陷之公不從又奏請斬楚客清蕃落時韋庶人竊㺯國權中宗竟不之省也初安西南有毒河源逺在葱嶺西北河岸百步人畜踏之者輒死公威振西域所向無不從者因驗圖經知其源率兵三萬人歷于闐康居大食等十餘國所過之國令供資糧仍署其國王為左右總管率兵前進北至葱嶺牙帳前十二國王兵百萬餘其河源上有大樹髙千餘尺垂隂數頃大軍至日有黃龍繞樹以口吐毒氣而拒官軍三軍悉覩焉公手書操檄文令左拾遺張宣抗聲讀之畢黃龍解樹而下公率諸軍誅之數日方倒聚而焚焉河源且絶數十里內悉為良田在安西十餘年四鎮寧靜韋庶人知政屢徴不至因下僞詔令侍御史吕守素中丞馮家賔相繼巡邊欲將害之未及皆為娑葛等諸蕃劫殺之睿宗即位徴拜太僕卿勑至之日舉家進發安西士庶諸蕃酋長號哭數百里或𠢐面截耳抗表請留因紿之而後即路其至玉門關也去凉州八百里河西諸州百姓蕃部落聞公之至貧者携壺漿富者設供帳聮綿七百里不絶公旌節下玉門關百姓望之宛轉呌呼聲動巖谷自朝至暮傳呼至凉州凉州城中男女在衢路並歌舞出城咸言我父至矣通夜城門不受禁制都督司馬逸客聞之謂公近矣陳兵出迎會候騎至云始入玉門關都督嗟嘆良久具狀聞至京同中書門下三品加銀青光祿大夫遷兵唐書作吏部尚書封館陶縣男依舊知政事尋轉吏部尚書知選舉囑請不行大收草澤睿宗屢下詔褒美後默啜大冦邊拜刑部尚書充朔方道行軍大總管築豐安定逺等城以拒賊路尋加金紫光祿大夫冉遷兵部尚書知政事仍舊元帥會太平公主竇懷貞潜結凶黨謀廢皇帝睿宗猶豫不决諸相皆阿諛順㫖惟公廷爭不受詔及舉兵誅竇懷貞等宫城大亂睿宗步肅章門觀變諸相皆竄外省公獨登奉天門樓躬侍睿宗聞東宫兵至將欲投于樓下公親扶聖躬敦勸乃止及上即位宿中書十四日獨知政事因下詔曰大臣立事夷險不易良相升朝安危所繫兵部尚書同中書門下三品上柱國館陶縣開國伯元振偉才生代宏量匡時經綸文武今之王佐出入將相古之人傑夙侍宸一作帷扆疇咨廟堂思致堯舜以期管樂朕往在儲闈洎登寶位每觀其仗制詞作聞義感激願制詞作别凶邪立誠慷慨密陳𢎞益爾其至矣朕實嘉之頃者梟獍興謀干戈作釁太上皇帝既命朕除討元振又馳奉宸極始則賚豫為弼終則寧朕問安可謂格于皇天貫于白日元惡既剪庶物惟新昌言是圖朕豈忘舊宜開井邑永誓山河可進封代國公賜實封四百户物一千段子五品官尋兼御史大夫天下行軍大元帥是嵗大徴兵衆閲武驪山兵一百萬號三一作二十萬號二百萬並奉公節度是日三令之後上將親鼓公慮有大變因略行禮上大怒引坐纛下紫微令張說犯鱗而諫上乃曰元振有保護大功宜捨軍法流新州未至屬開元元年冊尊號赦曰元振往立大功保護於朕頃因閲武頗失軍容責情放逐將收後效可饒州司馬未至卒於道時年五十八有集二十二卷文章有逸氣為世所重公少負氣縱橫遣意磊落作尉巴蜀不修名檢及登朝受任屢使遐方霜明烈心玉立貞節言行忠正居取儉約學術雜於皇王致君期於堯舜公務之暇手不釋卷雖子弟家人未嘗見其喜怒前後上事切諫得失十數道俱焚其藁草不以語人故朝廷莫知也睿宗嘗曰元振正直齊於宋璟政理逾於姚崇其英謀𢎞亮過之矣舊於宣陽里居二十餘年不至諸院馬廄每朝回對二親言笑歸室􅌂如也不問家事與狄仁傑朱敬則魏元忠李嶠韋安石趙彥昭韋嗣立薛稷張說等為忘年之友事父母孝聞父受授濟州刺史後以為相奏請解職授銀青光祿大夫濟州刺史致仕公歿後二親猶在自我唐受命宰臣有二親者唯公而己尚書祠部貟外郎贈陜州刺史裴公行狀獨孤及曽祖仁基隋光祿大夫行左光祿大夫皇朝贈使持節都督原州諸軍事原州刺史諡曰忠祖行儉皇朝銀青光祿大夫守禮部尚書聞喜縣開國公贈太尉揚州大都督諡曰獻父光庭皇朝光祿大夫侍中兼吏部尚書正平縣開國公集作男是贈太師諡曰忠獻絳州聞喜縣崇唐集作慶鄉太平里裴稹年若干行狀公天姿英拔德宇宏曠顒卭公器磊砢髙節武庫森㦸玉山照人起家以門調補千牛備身歷太子通事舍人太常寺主簿是時萬邦方乂獻公當國天子垂衣穆清以有天下而衮職之闕疇咨之府公入則竭力出則匪躬外詢輿人以補過庭之問隂薦多士用𢎞審官之選既而濟濟俊又爛盈東閣邦之得賢於斯為盛畫一之詩作而嘉魚之頌興公之裕蠱也轉京兆府司録事集無此字參軍輦轂之大綱轄之劇牒訴浩穰文墨填委公投刃餘地而大郤斯批若綱集作網是在綱而衆目不紊談笑之隙簿領肅如論者知逸倫集作驥之足方自此始開元二十一年忠獻公捐館惸然在疚哀越乎禮會執事者醜正作福怙寵匿怨乃因喪乘釁將逞憾于我言之如簧上亦投杼公乃銜恤進牘呌閽抗憤危言自明至誠旁感由是宗祏垂祉髙天聽回恩方照徹尋集作神亦悔禍卒令臧孫有加葬集作等之禮集作葬公業有不亡之嘆公之克家也服闋授起居郎載筆赤墀書法不隱開元二十四年三庶人以罪廢事出宫闈變生飛語時夀王以母寵子愛議者頗有奪宗之嫌道路憫然朝野疑懼公乃從容請問慷慨獻風集作諫上述新城之殷監下陳戾園之元龜謂興亡之由在廢立之地天子感悟改容以謝因命詔以給事中授公公曰陛下絶招諫之路為日故久今臣一言而荷殊寵則言者衆矣何以錫之上善其敏而多其讓乃止不讓尋除尚書祠部貟外郎恪居禮闈休問惟穆𢎞濟之略固為己任于時搢紳髙義方以青雲期公不弔昊天降此短嵗開元二十九年某月日薨于私第春秋若干君子謂公貂蟬之葉瑚璉之器夀不及黃耉名不登眀堂天其未亡狐趙之勳成宣之德也非昌其身必大於後果介繁祉有才子四人長曰倩尚書駕部貟外郎兼殿中侍御史江西道租庸鹽鐡等使次曰警尚書司勳員外郎兼殿中侍御史參中軍元帥雍王軍事次曰倚殿中侍御史試守萬年縣令次曰侑太原府榆次縣尉構厦環材切玉利器價敵三虎族橫集作擬是八王朝廷褒之方倚以戎務元年春建辰月肆大眚因命有司録勳追舊於是詔贈公諫議大夫猶以禮未超倫位不充德秋八月詔曰贈諫議大夫裴某操履貞純器能溫敏素推令集作雅望嘗踐清班志業屈於當時風猷悲於既往顧其𦙍嗣久在周行雖禮及前修以申追逺而恩霑後命宜有贈榮俾高列嶽之班更表重泉之飾可贈使持節陜州諸軍事陜州刺史禮也公天機超邁雅有大略氣直而溫性擾而毅貞乃集作可幹事善足救物外坦蕩豪舉朗然不羈內敦敏純固忠而能力至若輕死重義貴身賤名視錢刀集作帛如糞土戲公卿若草芥其於履危險臨大節則氣冠賁育徑侔風霜未嘗以得喪夷險芥于胸臆詩云昭明有融高朗令終公實有焉謂宜荷天之休俾熾而大龍泉未試隙駟先往天乎斯才而有斯夀今寵優八命澤及九原巳沐集作伸追逺之恩請遵易名之典寶應二年某月某日故吏某官獨孤及謹狀上尚書省考功夫存以行觀其志沒以諡表其德則賔集作名實不虧美集作善惡知勸謹按故尚書祠部員外郎贈使持節陜州諸軍事陜州刺史裴稹鼎鉉公族圭璋令名孝克負荷忠能匡諫宏圖方壯利涉未息丹壑遽遷音徽已昧集作沫命官褒德寵荷令章集作合荷寵章考行飾終敢徴前典謹上朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤公行狀梁肅仲尼述易道於坤曰君子敬以直內義以方外詩三百一言以蔽之曰思無邪公天生懿德外方內直氣茂才全發為時文得大易之中詩人之正邈乎其不可及巳七嵗誦孝經先祕書異其聰敏問曰汝志如何句公曰立身行道揚名之義集作於後是所尚也後博究五經舉其大略而不為章句學確然有可大之業知者益器之十五祕書捐館公茹血集作銜恤在疚踰時而後杖由是鄉黨稱孝三集作二是十餘以文章遊梁宋間通人潁川陳兼長樂賈至渤海髙適見公皆色授心服約子孫之契天寶十三年集作載應詔至京師時𤣥宗以道涖天下故黃老教列於學官公以洞曉𤣥經對䇿髙第解褐拜華隂尉故集有國字相房琯方二憲部請公相見公因論三代之質又問集作此六經之指歸王政之根源憲部大駭曰非常之才也趙郡李華扶風蘇源明並稱公為詞宗由是翰林風動名振天下及函洛冦擾公違難於江南上元初授左金吾兵曹掌都統江淮節度書記非其好也未幾徴拜右集作左拾遺因上疏陳便宜及方鎮有冒于貨賄舉直錯枉大者十餘事不行皆焚其藁時大盜之後百度草創而太常典故尤所壞缺公為博士祗考古道酌沿革之中凡有集作無損益莫不悉悉字集作居其當新平公主之子裴倣尚永清公主公實相禮初以裴僕射遵慶主婚中詔長主後夫姜慶代焉公奏曰婚姻人道之大使異姓主之非禮也且無以示天下臣不敢奉詔上從之又議定諡法公以為諡者蓋跡其事業邪正而褒貶之舉一字可使賢不肖皆勸故其議吕禋盧奕郭知運等諡皆參用典禮約夫子之旨其事核其文髙學者傳示以為式時有上議謂景皇帝未升尊位不宜為太祖詔下百寮公按禮經以為王者禘其祖之所自出而以其祖配之故三代皆以受命始封君配昊天上帝唯漢氏崛起豐沛豐公太公皆無位無功德不可為祖宗故以髙帝為太祖若景帝肇啓王業建封于唐髙宗因之遂以有天下之號天所命也宜百代不遷因具故事條奏從之於是郊廟之禮遂定踰月拜公尚書禮部員外郎遷吏部每嵗以書判試多士而朝列有以文學稱者必參校辨論定其甲乙丙科至是公分其任求為郡守以行其道除濠州刺史公下車以淮士輕剽承兵革之後率多不法長吏不能制遂先董之以威格之以政然後用愷弟寬厚漸清其俗三年而闔境大穰優詔褒美移拜舒州刺史又以行聞璽書就加朝散大夫檢校司封郎中賜金印紫綬其眀年吳楚大旱餓夫聚於萑蒲者十七八唯舒安阜近者悅逺者來犬牙之境草竊不入上聞之詔曰斷獄嵗减流庸日歸以人俗之豐給當淮湖之災旱爾守之力也擢拜常州刺史本州都團練使常州為江左大郡兵食之所資財賦之所出公家之所給嵗以萬計公削其煩苛均其衆寡物有制事有倫刑罰罕用頗類自息公又謂安人之道清而靜之則定為而察之則擾故寬以居之仁以行之一變而百姓不知其理又一變知其理而不知理之所由比及三年吏不忍欺路不舉遺年穀屢熟一作成災害不作甲辰歲冬十月二十日甘露降於庭樹二十七夕乃止嗚呼公庇斯一作方庇人人方仰公彼天不惠降此大厲為郡之四載大厯十二年四月壬寅晦暴疾薨于位行路慟哭罷市者相弔踰月又吁嗟之聲相聞自寮屬相吏下逮鄉老里尹皆率以備齊祭及葬之日緦衰送喪者數千人唯公體黃老之清净苞大雅之明哲尊賢容衆而交不諂瀆本仁祖義而文以禮樂乃至集作至乃溫良能斷應用不滯逹識足以表微厚德足以載物善而不伐光而不耀內不機巧外無緇磷隤然中立豁者虛受其長人也先教愛而後法禁不遷怒以臨下集作拘故威而不猛不私巳以欺人故易而無備其茂學博文不讀非聖之書非法之言不出諸口非設教垂訓集作法之事不行於文字而逹言發辭若山嶽之峻極江海之波瀾故天下謂之文伯有集二十卷行於代若藝文之士遭公發揚集作揮盛名比肩於朝廷則有故中書舍人吳郡朱巨川中書舍人渤海髙參今尚書左丞天水趙璟職方員外郎知制誥博陵崔元翰考功員外郎潁川陳京禮部員外郎北海唐次蘇州刺史髙陽齊抗其章章者也其睦親與善自內姻及朋友所知之家振窮分災恤孤哀喪頒祿歸贈必加於常人一等故啓手足之日室無餘財惟四布集作待賜布然後乃斂議者於是謂公有文子之清子産之仁史魚之直平仲之與人賈生之行義集作文學文翁之政事叔子之遺愛而不躋巖廊不享期頥闕致君論道之美以遺史冊故凡百以為痛在昔孔文子以敏而好學為文公叔發集有廪字恐非以恤衛國凶饑為惠矧公功存於人言垂於代有文有質不忝前烈者與易名之禮請從令集作舊典謹狀尚書考功伏以褒德尚賢設教之崇軌加諡易名飾終之令典謹按故朝散大夫使持節常州諸軍事守常州刺史賜紫金魚袋獨孤某藴黃裳之服協中庸之德正詞復禮施化為邦清風存乎省寺遺愛結於黎庶具美之道何以尚兹窀穸既安音徽日逺請追公叔之諡式播臧孫之列謹上文苑英華卷九百七十二
