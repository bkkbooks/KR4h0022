body:
  text: 文苑英華巻八百五十八宋李昉等編釋九大唐泗州臨淮縣普光王寺碑一首嵩岳寺碑一首大相國寺碑一首海州大雲寺禪院碑一首大唐泗州臨淮縣普光王寺碑李邕嘻代人以塔廟者即有象一作為也儀像者非有相也邕嘗論之未始諒矣其或執之於我安住為十刼之塲什之於空循捨得一如之智皆所以頌其願酌其心必於無作之時敷𢎞正法之故俾或禮或見能超因因之縁若我若人盡登果果之業則曷為不應曷道不行豈空寂之門獨階證入事相之地遂阻圓眀者哉普光王寺者僧伽和尚之所經始焉和尚之姓何何國人得眼入地龍朔初忽乎西來飄然東化獨歩三界遍遊十方烏飛於空月見於水泥鍵鐵鎻降伏貢髙長者錦書散除文字深以慾為苦噐道寔法鈞消一無於太常越諸有於真際豈徒福河灌頂慈雲覆身舉手而安喻四因動足而興復三見或以沉香作炭有枉言者則誘而進之沙末求珠不知其量也一作者則呵而責之香象之行雖極水底神龜之出亦兼陸道因如法如自得定力有作無作冀是福田嘗縱觀臨淮發念置寺以慈悲眼目信義方寸興廣濟心儀普照佛光相纔現瞻仰已多逺近簮裾往來舟楫一歸聖像再謁真闕禮祈禪焚香㧞苦觸塵者庇如來之影牽毛者荷獅子之威信施駢羅建置周布繚垣雲矗正殿霞開層樓敞其三門飛閣通其兩鋪舎利之塔七寶齊山净土之堂三光奪景於製造也未綴於手猗徳名也已聞於天中宗孝和皇帝逺降綸誥一作言特加禮數延入别殿近益重元徳水五瓶霑濡紫極甘露一斗福潤蒼生乃請寺名仍依佛號中宗皇帝以照言犯諱光字從權親覩御書寵題寳額垂露落于天上飛翰傳於國中其末也廣内慶齊其至也連城歡迓扇慿筆貴獨属右軍寺為額髙更因天子每名晨大衆瞻禮嬉遊上昇門臺直視川墅巒阜嶾嶙而屏合淮水逶迤而帯長邑屋助其雄商旅增其大兹為勝也曷以加焉和尚口雖勿稱縁乃有以知變易之道廽軒少留衆生可悲菩薩亦病示滅同盡唯識永在嗚呼以景龍四年三月二日傳灯録作景龍三年三月三日端坐棄代于京薦福寺跡也孝和皇帝申弟子之禮悼大師之情敬漆色身謹將法供仍造福度門人七僧賜絹三百匹勑有司造靈輿給傳逓百官四部哀送國門以五日還至本處當是時也佛像流汗風雨變容鳥悲於林獸號於野矧伊慈子降及路人乎過去僧惠嚴傳灯録作慧儼等主僧道堅弟子木義等並持床有義失劒無追施法立齋知時眀物罔隊舊業克嗣前脩攀一作舉係儀形建崇塔院植婆羅樹表蓮花䑓宛然坐而不言歘爾感而皆應懴則殃滅求則福生一作至雖日月已綿而靈變如在歸依有衆檀施孔多鯨鍾萬斤震覺六種講筵七架開導四生清净之身更䟽浴室湼槃之飯别構食堂可謂能事畢矣喜願并矣冝八部之宅以致諸天廻首自然樹懸宻語印文地現五風轉柔澗一作潤之音千燈熖光明之色構之者罪花彫落信之者燋一作福種萌生雷響發其六牙珠彩澄其二水州牧杜公惟孝其直如箭其㓗如水一有撒屏習明板書作又八字地壓淮上城遷泗中民勦於勞物集一作售其利長史宗公公字一作子嗣全司馬盧公或清節首公文雅形國或禮容虚已堅操動時臨淮宰薛欽行等或主諾條流庭無置對或子人簡德邑有歡康並豎位大一作天車正信超士興二道之教發一師之因相與累賛經身長懸覺道樹不朽之德𢎞未來之功是刻豐碑以光盛羙其詞曰惟普照之大身兮杖菩薩之右臂粤靈瑞之可聞兮固昭成之難值期一㑹之來思雄萬輩之善一作檀施𢎞住持之信受廣事相之該備豁川陸之雲龍雄城邑之頳雉辟天師於九重補人王於十利嘉寺旁之立名寵聖札之題字追已滅之化身了見在之文義貯儀形於空塔存詞謁疑於金地殃無懴而不除福何求而不致副真僧之貞寳接群公之雅噐播永日於山河刻巨石於淮泗嵩岳寺碑凡人以塔廟者敬田也執於有為禪寂者慧門也得於無物今之作者居然异乎至若智常不生妙用不動心滅法滅性空色空喻是化城竟非住處所以平等之觀一洗於有無自在之心大通於權實導師假其方便法兩任其根莖流水盡納於海壖聚沙俱成於佛道大矣廣矣不可得而談也嵩岳寺者後魏孝眀帝之離宫也正光元年牓閑居士廣大佛刹殫極國財濟濟僧徒彌七百衆落落堂宇踰一千間藩戚近臣逝將依止碩德圓戒作為宇師及後周不祥正法無緒宣皇悔祸道什中興眀詔兩京光復二所議以此事為觀古塔為壇八部扶持一時靈變物將未可事故獲全隋開皇五年𨽻僧三一作二百人仁夀一一作二載改題嵩岳寺又度僧一百五十人逮豺狼恣睢龍象凋落天宫墜構刼火潜燒一作刼潜燒然唯寺主眀藏等八人莫敢為尸不暇匡補且王充西拒蟻聚洛師文武東遷鳯翔巖邑風承羽檄先應義旗輓粟供軍悉心事主及傳奕進計以元嵩為師凡曰僧坊盡為除削獨兹寳地尤一作夫見褒崇實一作賞典殊科眀勑洊及不依廢省有録勲庸特賜田碾四所代有都維那惠果等勤宣法要大壯經行追思前人髣髴舊貫十五層塔者後魏之所立也發地四舖而聳陵空八相而圓方丈十二户牖數百加之六代禪祖同示法牙重寳妙莊就成偉麗豈徒帝力固以化開其東七佛殿者亦曩時之鳯陽殿也其西定光佛堂者瑞象之戾止昔有石像故現應身浮于河逹于洛離京轂也萬輩延請天柱不廽惟此寺也一僧香花日輪俄轉其南古塔者隋仁夀二年置舎利於羣岳以撫天下兹為極焉其始也亭亭孤興䂓制一絶今兹也巖巖對出形影䨇羙後有無量夀殿者諸師禮懴誦念之塲也則天太后䕶送鎮國金銅像置焉今知福利所資演成其廣珠幡寳帳當陽之舖有三金絡花鬘備物之儀不一皆光一作相滿利一作秋是月色陵渥丹窮海縣之國工得人天之神妙逍遥樓者魏主之所構也引流揷竹上激登樓菱鏡漾於玉池金虬飛于布水食堂前古鐵鐘者重千斤凾二十石正光年中寺僧之所造也昔兵戎孔殷㓂攘偕作私邑竊而為寳公府論而作仇後有都維那惠登發夕一作力通夣遲眀獨往以一已之力杭分衆之徒轉戰而行踰晷而至雖神靈役鬼風雨移山莫之㨗也西方禪院者魏八極殿之餘趾也時有逺禪師座必居山行不出俗四國是仰百福攸歸眀凖帝庸光啟象設南有輔山者古之靈䑓也中宗孝和皇帝詔於其頂追為大通秀禪師造十三級浮圖及有提靈廟極地之峻因山之雄華夷一作戎聞傳時序瞻仰每至獻春仲月諱日齋辰鴈陣長空雲臨層嶺委欝貞栢掩映天榆迢一作超進寳階騰乘星閤作禮者便登一作發獅子圍遶者更攝蜂王其所内焉所以然矣若不以逹磨菩薩傳法於可可付於璨璨受於信信畀於忍忍遺於秀秀鍾於今和上一作尚寂皆宴坐林間福潤㝢内其枕倚也隂陽所啟居四岳之宗其津梁也宻意所傳稱十方之首莫不佛前受記法中出家湛然觀心了然見性學無學自有證眀因非一作無因本末一作來清净開頓漸者欲依其根設戒律者將攝乎亂然後微妙之義深入一如廣大之功遍滿三界則知和雅所訓皆荷法乘慈悲所加盡為佛子是以無言之教響之若山不舎之檀列之如市則有和上姪寺主堅意者慿信之力統僧之綱崇現前之因鳩最後之施相與上座崇泰都維那曇慶寺等至矣廣矣經之營之身田底平福河流注今昔紛擾雜事夥多是以功累四朝法崇七代感化可以凾靈應縁起所以廣元河一作成故得尊容赫曦光聮日月厦屋𢎞敞勢蹙山川囬向有足度四生鍾重有足安萬國豈伊一邱一壑之異一水一石之竒禪林玲瓏曽深隠見祥河皎潔丹艧澄眀而已哉咸以為表於代者業以成形藏於宻者法亦無相非文曷以陳大略非石曷以示將來乃命道奐禪師千里求蒙一言書事專積疑作精每極臨紙屢空媿迷津之未悟期法主之可通其詞曰西域傳耆闍山世尊成道于其間南部洲嵩岳寺逹磨傳法於兹地天之柱帝之宫赫奕奕兮飛九空禪之門覺之徑宻微微兮通衆聖鎮四國定有力開十方惠有光立豐碑之隠隠表大福之穣穣大相國寺碑夫聖不徒作作必有因化不徒開開必有攝故大事所㑹一法所傳若天若人或賢或達雖萬牙闕地而三獸渡河使不聞者聞未悟者悟豈虚也哉此寺伽藍古廢建國有濮州之像自安業而來及逝將復歸堅守常什人至萬且千飛聲殷雷用壯敵國坐如清㤗安如湏彌有若部人郭賔者生心起謗闕目失眀有若部人陳振者興言誑徒喉腫及舌皆追悔自昔痊平在今或沒身為奴或鑄鍾依佛延和初載奉詔改為大相國寺復置額焉先天中内府降財御書題額一作牓睿宗通夣靈應肇發臨遣碩徳僧真諦載馳載驅乃慰乃止昭宣渥命寵錫神幡吏人候迎法侣圍繞豁㕓里羅郊原者不可勝計夫以金仙聖容之表先主感之代邸嘉名之舊先主標之筆精池水之妙先主躬之故能鍾乾坤激日月景光遐燭德㝢𢎞覆曷云比也我開元神武皇帝受天元禧祚國傳寳睦九族叶萬邦功濟而業成道光而孝理惠康父子義結華戎寰􅌡之濵大輿之上顒顒而戴欣欣而懐逮識路于兹一作慈寓目于兹一作慈者莫不瞻大明欽聖禮仰天性而泣遺澤荷慈氏而歎堅林形力者罔告勞檀施者罔辭費莊嚴不獨于示相功德何止於無為碁布黄金圖擬碧絡雲廓八景雨散四花國土威神塔廟崇麗此其極也雖五香紫府大息芳馨千燈赤城永懐照灼人間天上物外異鄉固可得而言也上座知隠寺主元深都維那上智儼皆妙覺圓常對境亡境彌入後地因如得如合之不離混以相濟咸以為他方所至廣法界惟三虚空所至𢎞度門惟一况乎實相感通之應聖跡飛動之神安可黙頌聲闕題紀者已乃作頌曰佛法住持正教𢎞益真容見寺先帝書額藩邸鴻名建國前跡我皇孝理我人光澤日月明眀家邦赫赫觀妙追逺懐恩惟昔八部莊嚴四天感激以式永代是紀豐石海州大雲寺禪院碑天也地也攝生之謂元造日也月也容光之謂神功然亭育之仁可斡終滅昭眀之力未焯昏霾故熱惱積薪刼燒難鑠驚波巨海沃焦自淵獨有導師空王禪那宴寂一念首安住之域加行證無為之階密教内修莊嚴外度䨇引相應並照兩忌然後生無生净名不去照無照了義能覺爇菩提之炬則枳棘滌除楫般若之航則横流既濟湛四禪於中道超三有以上征精舎攸躋一作脩度門斯盛其此之謂矣奥有寺之艮背山之前臨有礭師禪師房者武德八年邦守蕭公諱顗䕶法之所建也周目環郭澄心際海示一作亦既一味實無衆一作終生夫慿其髙宅其勝曽近俗諦或乘法師且水出於氷凡作於聖雖曰醜地猶是道塲矧乃妙有孤標寳相靈變入我室觀我形者哉施及貞觀嵗有等觀禪師繼前必承後問分之則别位二事合之則同列大空坐於斯竟於斯於戯四益風驅百為火滅棟宇崩落象設傾低先天中有惠藏禪師聞之斯行居而不住妙齡強植勁節老成被甲律儀下帷經藏方丈之室時歴十年簞瓢之飡日常一食信為法本悟寳如宗簡珠圓眀經一作紅蓮清净剃髮結音髻落亡境受除生起了於心一作身縁覺被於物是以興補舊塔建置尊容彌陀當其陽菩薩侍其側四大海水惠眼啟眀五湏彌山毫相崇絶有若稽義摭實沿名討因都極樂之大郊夀無量之景命備如苦者一作昔如昔者稱讃觀厥音聲克濟斯艱廼復于逺則有階地超越自在神通發𢎞願心得大勢用皆所以濡火宅軔劒輪投地者結業坐開入影者苦一作昔非趣以息粤若殫財竭力刻桷雕題積四三一作三四年模造化意寳殿蔚以雲構金山煥其日臨豈徒然哉夫壯麗者將以重威神儀形者將以攝歸止或離性解脫或見作随縁藥草寓其根莖雲雷感其方類即說非說若通不通惟三獸之度河庻一子之來學禪師以為黙則絶教言則牽文苟心事於化人豈迹留於捨法㑹議斵石僉允圖一作剏功邕來守是邦偶聞兹事依僧依佛何日忘之在家出家惟其常矣頃者下檄湖海申眀捕殺鱗羽咸若災疫以寜救蟻雖尚於沙彌涸魚每憂於釋種祈寒則怨童子何知率三省於短懐寄一塵於寳地别駕𢎞農楊公守堅字越石本枝鼎貴胄𦙍岳靈直道守公智印觀法司馬瑯瑘王公元朂字固禮髙闈襲吉皇士令名資位升聞妙意融朗盛矣羙矣左之右之時有一無有字新羅通禪師五方一作力上乘一門深入利行攝俗徳水浮天讃而演成恭而有述其詞曰覆燾之漿始生終滅昭囬之眀内昏外徹隂入不㫁心起難折靈海慾深洪鑪火熱倬彼大師超然正覺亡境息想示法流渥絶生死岸破煩惱殻度門光啟住地元邈傳燈三葉或作乘分座一義象設儀形莊嚴地位有為不染無相能離苟曰法乘莫非種智古者豐石抗之髙山紀事標柱一作社銘勲列班廣兹妙有運彼元關則百伊昔粤吾無間文苑英華巻八百五十八
