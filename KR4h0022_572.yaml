body:
  text: 文苑英華卷五百七十三宋李昉等編宰相讓官二為桓侍郎讓侍中表一首為晉公讓中書令表一首讓兵部尚書平章事表一首讓封燕國公表一首讓中書侍郎表一首讓右丞相表二首讓中書令表一首讓平章事表四首久旱陳讓相表一首為蕭復讓宰相表三首為桓侍郎讓侍中表吳兢臣彥範言伏奉恩制除臣侍中光大之命忽降望表顛越之懼頓積心涯臣某中謝臣聞君子樹功心在利物義夫建䇿口不言賞故田疇以責塞為闕趾達於閭里筮仕本祈於州縣屬天道貞觀功能咸録曾未一紀殆將十遷三入憲司莫禁姦宄再申會府寧禆凖繩掌棘木之刑訟聲詎弭受羽林之寄軍容未肅循省知懼寢興弗遑頃逆竪等潛構禍端竊窺神器外結凶黨陰懷密圖則天大聖皇帝天縱睿明察之於將兆陛下性命疑神武擒之於發機臣職統士卒受命梟斬此宗社之福也陛下之明也臣何力之有焉金紫佩腰已虧於曩節貂蟬冠首胡顏於後命不出旬朔頓越等倫臣知不可物議誰塞臣又聞暴進者罹咎知止者無辱詩有匪服之議易著折足之誡歷考前載益用惶惑且賞罰之柄國之大典罰一罪使天下革心賞一人使天下知勸今皇極肇建明命初基惠化始覃而賞勸失中此臣所以固讓也况此官出納帝命喉舌王言政之治亂實所攸繫豈可以微蚋之力能負丘山一葦之航克濟溟渤伏願覽任官惟賢之旨察量能受職之義寢已施之澤鑒不奪之誠幸甚幸甚為晉公讓中書令表苑咸臣某言臣聞百工允釐方可咸熙庶績九流不雜所以彌奬人倫苟非其才胡顔妄處中謝臣智識凡近藝能瑣薄徒以遭逢運遇預奉休明謬忝宗枝特承甄拔爰從散職拜以中司三入仙臺兩登禁掖久於近密衆莫能過念臣愚者聖慈收臣直者天斷頃者外總戎律曾無決勝之謀內參鈞衡實寡推賢之舉將何以彌綸庶政翊贊雍熙以此慙一作回惶無忘鑒寐况中書理本軍國務重事無巨細稟於睿旨暫愆時雨陛下每降於親祈未有邊塵陛下尚勞於遙詔無幽不燭有感必通在臣何人叨居大任雖願荷恩效力更勉驅馳其如竊位妨賢自多愧恥鴻私茂寵於臣已極纖勞薄效在國何施况貞觀已來相無宗子唯臣忝越擢自宸衷誠宜粉骨碎首闕尸素之嫌久招輿議屏退之分臣之宿心實恐上纍明時下玷良史比因趨奏屢有陳祈天眷未回聖情猶阻伏願陛下察臣之情憫臣之訴賜疑臣止足之分恕臣不逮之力賜停今職退守間司且臣感恩至深報效殊淺儻中外任使衆所辭難臣願先登冀罄誠節豈敢偷安重祿自保優間特望更選羣賢以秉成績庶使朝無闕政天下稱公區區懇誠期於必遂不勝戰汗惶懼之至謹奉表詣朝堂陳乞以聞讓兵部尚書平章事表張説臣説言伏奉九月十九日制書到并州授臣兵部尚書同中書門下三品王人在門驛騎臨集作首路奉恩循分以慙以惕臣説中謝臣早以書生射䇿載筆聖朝晚以軍志典兵秉集作擁旄乘塞祿非授進集作授等寵是宸衷久侍玉階四掌綸誥一心好直三黜其宜今復用之猶夫人也何足以舉明邦政光緝帝猷更䇿疲驂來塵法駕又臣已受命司籍專意簡書所希散冗因間就業忽叨劇職責大憂深人心有限事難兩濟國史無成臣執其罪上思薦賢以自代下願守分以全節竊見開府宋璟清介獨立倚法不回詹事陸象先清明向道臨事能斷其髙明有素歷朝之所仗委其積行無疵衆人之所體信揆停往任未盡宿誠乞回此恩以納來效必能補舊政之缺漏廣前途之軌轍雖探心角力臣頗與二子齊驅然校德考年彼皆有一日之長天下者纍聖之公器宰相者萬方之具瞻臣所以廷讓彰言不陳密啓伏願聖恩聽輿論二字類表集本並作與論而舉俾諧僉矚儻朝任得人實海內幸甚無任力微任重惶懼之至謹奉表陳讓讓封燕國公表前人臣某言伏奉今月七日制書封臣燕國公食封三百户寵靈猥及中心如惔臣某中謝臣聞至道之時重法守義上無無功之賞下無無德之祿故授受禮全而踰越不起伏惟陛下光撫宇內大寧天域百度惟新萬靈翹注建侯疏壤允答元功臣亦何人首膺是命一作首黷嘉命自古有傳道而爵説經而封蓋以訓蒙成聖資師通學臣之侍講有異前聞何者大明朝升螢爝無助時雨夕濡浸灌焉施幸得依附光景遊泳渥澤豈敢虛承啓發之恩謬荷將就之報且如人臣之義二則為罪一心不回愚智之分譬如犬馬有不背之性草木有不凋之理知何德於天壤而欲蒙造化之偏施哉臣之無功正與此類叨恩過量終懼且慙乞回聖慈以容介節無任惶悚之至謹詣朝堂奉表陳讓以聞讓中書侍郎表説以睿宗即位為中書侍郎景雲二年方同平章事疑不當入宰相門前人臣説言伏奉制書除臣中書侍郎寵命俯臨驚魂自失臣説中謝臣聞雲構鬱起非類表作豈枳棘之任天波暴集寧溝澮所容臣識無通方文不經國南宮華省已忝前行西垣內閣集作閣將陪近侍心慙官謗迹愧時流何以承掌王言贊決機務當今二儀再造百度皆新太平之基惟賢是與混成庶政責在中書豈以常才敢膺首類表作榮選乞寢恩命改擇時髦惟慎庶官以諧僉議無任悃欵之至謹詣朝堂奉表陳讓以聞臣所讓人别狀封進讓右丞相表臣説言伏奉制書除臣右丞相兼中書令臣學慙稽古早侍春官階緣舊恩忝竊樞近雖思致君堯舜而才謝伊臯今屬升中大封方求俊乂猥集作俾升端右實愧朝行乞停新恩獲守舊職辭訥情懇希垂察諒無任屏營之至謹奉表陳讓以聞二臣説言伏奉今月十日制書除臣尚書右丞相恩命自天戰局無地臣説中謝臣少長儒門墾鑿墳史才非高格官不因人徒以命偶龍興位階鴻漸五入西掖七踐南宮中間拙延謫放直招玷缺傷矢之禽聞弦虛墜賜環之客聽歌先泣此則魂一作魄為危感氣由懼奪安可重收廢器再辱端揆何以師長禮闈正持憲府當今典章革故風教鼎新野無四隱朝有三傑具瞻之地願擇時髦臣幸沐遺簪墮履之恩好生養老之德朝遊簡牘暮對圖書受賜無涯循榮過分豈更干處士之橫議招胸奴之遙哂艾英華作文非骨自瘡負乘致冦雖則愚情懷戀􅌤冒求寵亦望聖慈限約令集作生非度餘年願停今授長守舊史罄陳肝膽非敢飾讓謹詣朝堂奉表自乞臣説誠惶誠恐頓首頓首死罪死罪謹言讓中書令表臣説言伏奉今月十一日制授臣中書令恩渥自天震越無地臣某中謝伏惟陛下至孝安親大功定國六合翹首庶政惟新雍熙之化望在兹日中書理本臣叨首名將何以翊贊聖君光澤天下自臣攝官禁掖已涉七旬不知賢才以舉是不仁也不辨不肖以退是無勇也何足以備乎宰臣胡顔冒恩復受真拜臣之愚執正在於此不敢繁詞以塵聖聽乞回榮授改擇時髦無任懇欵之至謹詣朝堂奉表陳讓以聞臣所讓人别狀封進讓平章事表前人臣説言臣伏奉宣旨制書以臣同中書門下平章事承命戰汗拜舞失容臣説誠惶誠恐頓首頓首死罪死罪臣本書生器識凡近仕不望於通貴祿只宜於代耕蒙時寵榮越踐臺閣局心守職竊所庶幾長算經邦則無逮及伏以廟堂寄切軍國務殷循涯審分非臣攸處為國者為官擇人為臣者陳力就列若志小謀大力微任重豈敢顧惜賤軀實恐上塵王政是以披露肝膽不暇飾詞乞停此授俯遂誠請無任怖懼慙惶之至謹詣朝堂奉表陳讓集作請以聞臣某云云同前裴度臣某言臣聞知足不辱知止不殆若險危而久處駑劣而又病則顛隮之期斯須可待况臣本性𥚹狹久塵樞近衆所謂否心有可焉衆所謂可心有否焉則皆盡言莫敢畏避所以居多忤物動不適時聖恩雖為曲全人理終難自咎臣某中謝伏惟尊號皇帝陛下紹開洪業再受景命蕩諸夏之妖孽致羣生於仁壽臣之厚幸遇此昌時徒荷聖功莫效分寸乞避賢路少安疲病臣不敢廣引前事崇飾虛辭直以折足為憂冀有保身之望若任在闕可以匡輔朝廷則臣以生前豈敢愛惜性命但以去之無損留則可哀一作畏儻受始終之恩是全進退之道無任悃欵之至同前李吉甫臣某言臣久處繁機切思退免伏奉詔旨未允深衷仰戴天慈如置冰谷臣某中謝臣竊惟至敬豈敢煩文再以懇誠上陳睿覽伏以陛下初臨寶圖獲侍丹扆一心捧日見四海之大一作文明八稔代天覩羣生之茂育恭承睿算實罄愚衷雖微寸功豈敢纖負倘陛下存簪履之舊念葵藿之誠終全深恩退蒙厚禮則是陛下既假之以位又寵之以名至德深仁光昭千古况臣年齒雖長筋力幸全猶得申獲戰之功展死綏之分倘蒙粗使足可酬恩至於左右便繁朝夕機務則心憂智竭力所不任以此至誠期於允遂然以時不再得感王道之方平福不重來念君恩之已極進退惶戀罔知所安謹再奉表陳乞云云二臣某言臣昨八日再表自陳九日於延英奏對公事既畢輒言私情陛下語臣以兢懼之由諭臣以進退之義今奉批答令斷表章無涯恩渥木石知感况陛下俯鑒誠懇知非飾詞鑒以止足之心特申分列之外敢不上尊明令退抑微衷恪居官次更館疑仁恩顧伯玉之未果徒慙聖私秉安石之偷安猶期他日銜恩之分萬殞猶輕不任感戴惶悚之至謹再奉表以聞久旱陳讓相表常衮臣某言臣聞陽唱陰和合之則理任重力寡強之則顛苟稱竊位何所逃責伏惟陛下以大聖之資除去姦惡臣荷承正刑之後擢在台衡不能有所建明坐致災旱燮理之任虧紊固多邦畿之間愆亢特甚陛下發勤閔之慮躬旰昃之勞大憂庶獄並走羣望而踰夏涉秋天則不雨垂落復散人其謂何伏以東漢之制存乎舊史或陰陽失節水旱不時必策免三公勵精百揆蓋以其陽唱而不和力薄而位崇所以答天譴也今上玄赫赫如此舊史昭昭如彼臣尚以愚劣偷安廟堂負乘不慙靦冒難處伏乞解臣所職更擇良才省致旱之由求作霖之輔則萬姓咸賴百穀用成上寬聖憂下塞人望臣敢尸位重祿以負明時無任兢惶惕厲之至為蕭復讓宰相表齊映臣某言臣不幸多疾且昧攝生積年不瘳遂成沉痼內有五臟心病轉深外有四肢足力不逮豈可參掌密命趨侍玉階上負聖私下曠公事縱恃恩無懼而省已何安臣某中謝臣以為寵祿不可苟偷疾病實難自強所以每轉一職常積憂惶自頃受官纍經陳乞及奉天拜命陛下殷憂臣合捐生豈敢言病况當憤切所致實亦患苦自忘今逆臣殲夷庶物欣暢餘生獲泰宿疾頓來豈無諸醫竟未有效忪悸之疾動發無時事輒經心病則加劇或達曙方定或彌日不瘳神形怗然若無所據又風痺之狀趨步蹇澀往來扶策自不能持念此餘生顧成廢棄豈宜叨處榮位貽穢台司聖恩縱欲優容公議實難逃避特乞賜臣骸骨待盡丘園冀勿藥以稍痊實殺身而非報無任懇迫惶懼之至第二表臣復言臣以沉疾在躬不任所職每因召對輒具上聞遂敢重表陳誠所冀俯回天鑒伏奉還詔未蒙矜允慙惶靡據冰谷再一作在懷臣某中謝臣竊以幹事先於志氣立朝本於威儀威儀整則朝無惰容志氣強則事無遺理今臣足疾近安敢高行止年又衰殆豈任機務况自宣恩復命僅歷七旬扶疾趨朝惟經再月竊惟非據何心自安聖慈雖欲優容公議實難逃責且頃冒榮奬屬當艱虞在中無獻納之能奉使乖撫綏之術涓埃莫效僭忝實多上孤恩私內苦疲薾將何以奉中興寧濟之道致太階平一之符夙夜愧怖精爽飄越伏惟皇帝陛下高覆厚載慈惠生成矜臣朽憊賜臣首領豈惟微臣免曠官之罪實亦聖朝廣全育之恩第三表臣復言臣以病曠官合從罷免纍陳丹懇冀蒙允察再奉墨詔猶未優容受恩則深揣分增懼臣某中謝臣聞循已就安聖賢之深誡捐軀報節臣子之大端况臣一門荷恩四葉為相謬以姻戚光于宗親殊私未酬微命寧顧但苦病在方寸慮事則愈昏職近宥密尸位則多曠今四遠氛祲尚未廓清萬幾損益皆關聖慮是明王宵旰之日賢哲馳騖之秋豈臣妄庸所當毗倚犬馬之戀雖欲遲回夔龍之行詎宜塵穢伏乞曲留宸鑒俯察愚衷矜臣量力之請免臣妨賢之責私誠獲遂公議允諧無任悃欵悚迫之至文苑英華卷五百七十三
