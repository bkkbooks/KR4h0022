body:
  text: 文苑英華卷八百四十八宋李昉等編道一老氏碑一首續唐故中嶽體玄先生潘尊師碑一首老氏碑薛道衡自太極權輿上元開闢舉天維而懸日月橫地角而載山河一消一息之精靈上生下生之氣候固以財成庶類亭毒羣品有人民焉有君長焉至若上皇邃古夏巢冬穴靜神息智鶉居鷇飲大禮與天地同節非析疑於俎豆大樂與天地同和豈考擊於鐘鼓逮乎失道後德失德後仁皇王有步驟之殊民俗有淳醨之變於是儒墨爭鶩名法並馳禮經三百不能檢其情性刑典三千未足息其姧宄故知潔其流者澄其源直其末者正其本源源本本其唯大道乎老君感星載誕莫測受氣之由指樹為姓未詳吹律之本含靈在孕七十餘年生而白首自一作因以老子為號其狀也三門雙柱表耳鼻之竒蹈五把十影手足之異爰自伏羲至於周氏綿祀歷代見質變名在文王武王之時居藏史柱史之職南疑朝屢易容貌不改宣尼一覩嘆龍德之難知關尹四望識真人之將隱乃發揮衆妙著書二篇率性歸道以無為用其辭簡而要其旨深而逺飛龍成卦未足比其精微獲麟筆削不能方其顯晦用之治身則神清志靜用之治國則反朴還淳既而錬形物表卷迹方外霓裳鶴駕往來紫府金漿玉酒宴衍清都參日月之光華與天地而終始涉其流者則擯落囂塵得其門者則騰驤雲霧大椿凋茂非蜉蝣之所知溟渤淺深豈馮夷之能測盛矣哉固無德之稱也莊周云老聃死秦佚弔之三號而出是謂遁天之形雖復傲吏之寓言抑亦蟬蛻之微旨皇帝誕靈縱睿接統膺期照舂陵之赤光發芒山之紫氣珠衡月角天表冠於百王明鏡衢樽聖德會於千祀周道云季多難在時九鼎共海水同飛一作氣兩日與洛川俱鬬天齊地軸之所蛇食鯨吞銅陵玊壘之區狼顧鴟跱黃延姦宄鄭阻兵禍大縱毒螫將遍函夏神謀內斷靈武外馳應攙搶而掃除仗旄鉞而斬伐共工既剪重立乾坤蚩尤就戮更調風雨宰制同造化之功生靈荷魂魄之賜萬方欣戴九服謳歌乃允答天人祗膺揖讓升泰壇而禮上帝坐明堂而朝羣后昔軒轅顓頊建國不同大昊少昊邦畿各異舜改堯都夏遷虞邑歷選前辟義存創造惜十家之産愛兆民之力經始帝居不移天府規摹紫極仍據皇圖下宇上棟務存卑儉右平左墄聿遵制度朝夕正殿不别起於鴛鸞升降靈臺豈更營於鳷鵲憂勞庶績矜育蒼生念兹在兹發於寤寐棘林肺石特降皇情祝網泣辜深存寬簡非一作非疑作草古草字草纓見慎子纓知恥畫服興慙天無入牢之星地絶城牛一作牢之氣延閣廣內考集羣典石渠璧水闡揚儒業綴五禮於將壞正六樂於已崩總章溺志之音太師咸功之頌承華養德作二東朝外正萬邦內𢎞三善兩離炳曜重日垂明永固洪基克隆鼎祚重以維城盤石多藝多才良佐寶臣允文允武為王室之藩屏成神化之丹青致世俗於潤塗納蒸民於壽域旄頭垂象窮髮成形獯獫作患其來久矣無上算以制之用下策而難服自我開運耀德戢兵感義懷仁稱藩請朔稽顙款塞匍匐投掌牂牱夜郎之所靡漠桑疑榆之地咸被聲教並入提封閩越勾吳不愆貢職夫餘肅慎無絶夷邸遐邇褆福文軌大同自三代之餘六雄競逐秦居閏位漢雜霸道魏氏則虐深華夏有晉則化成戎狄降斯以後粹駁不分帝迹皇風寂寥千載天命聖德會昌神道變億兆之視聽復三五之規模固以幽明贊協荷疑作符瑞彪炳千年靈蔡著天性以效徵三足神烏感陽精而表質春泉如醴出自京師秋露凝甘遍於竹葦星光若月雲氣飛煙三農應銅爵之鳴五緯叶珠囊之度信可以揚鑾動蹕肆覲東后玉檢金繩登封岱嶽而謙以自牧為而不宰尚寢馬卿之書未允梁松之奏在青蒲之上常若乘奔處黃屋之下無忘夕惕雖蒼璧黃琮事天事地南正火正屬神之禔猶恐祀典未𢎞秩宗廢禮永言仁里尚想玄極壽宫靈座麋鹿徙倚華蓋罽壇風霜凋弊乃詔上開府儀同三司亳州刺史武陵公元胄考其故迹營建祠堂皇上往因歷試揔斯蕃部猶漢光司𨽻之所魏武兖州之地對苦相之兩城繞渦榖之三水芝田栁路北走梁園沃野平皋東連譙國望水置𣙗揆景瞻星擬玄圃以疏基橫玉京而建宇雕楹畫栱磊砢相扶方井圓淵參差交映尊容肅穆仙衛儼而無聲神館虛間滴瀝降而成響清心潔行之事存玄守一之儔四方輻湊千里波屬知如在之敬申醮祀之禮顯仁助於王者冥福資於黎獻允所謂天大道大難幾者矣若夫名言頓絶幽泉之路莫開形器不陳妙物之功難著騰茂實飛英聲圖丹青鏤金石不可以已而在兹乎嵗次敦牂律中姑洗大隋馭天下之六載也乃詔下臣建碑作頌其詞曰悠哉振古邈矣帝先四夷紀地一作四紀維地八柱承天叢生類聚廣谷大川至道靈運神功自然五精應感三微相繼樹以司牧執其象契帝迹慙皇王猷謝帝上德逾逺淳風漸替時乖淡泊俗異沖和尚賢飾智懸法張羅內修樽俎外事干戈魚驚網密鳥亂弓多真人出世星精下斗龍德在躬鶴髮垂首解紛挫鋭去薄歸厚日角月角天長地久小茲五嶽隘此九州逝將髙蹈超然逺逰青牛已駕紫氣光浮玄門洞啓神化潛流賴鄉一作相城舊里渦川遺迹古往今來時移世易靈廟凋毁祠壇虛寂九井生桐雙碑碎石惟皇受命乃神乃聖響發地鐘光垂天鏡宇宙開朗妖氛蕩定曜魄同尊參神取正流沙蟠木鳯穴龜林異類歸款萬方宅心鴻臚納賮王會書琛青雲干吕薰風入琴化致鼎平家興禮讓永言柱下猶慙太上乃建清祠式圖靈狀原隰爽塏亭皋彌望梅梁桂棟曲檻叢楹煙霞舒卷風霧疑作風露凄清仙官就位羽客來庭穰穰簡簡降福明靈至神不測理存繫象大音希聲時振髙響遐邇讚頌幽明資仰敬刋金石永蟠天壤續唐故中嶽體玄先生潘尊師碑集有頌字陳子昻尊師業尚沖密勤毖幽深理心事天所保惟嗇絶聖棄智不耀其光故真感𡨕期珍圖祕學性與天道不可得而聞也若乃崇標曠迹遐情逺意志摩青雲蓬視紫闥髙宗每降輿輦親詣精廬尊師身不下堂接手而巳每歎曰大丈夫業於道不能投身霄嶺滅景雲林而疲疴此山以煩世主吾之過乎集作也遂欲東遊蓬萊孤角入海屬天皇敦篤斯道祈款逾深踟蹰山隅絶䇿未往既而金格有命鑣轡遺區於戲昔姑射有神人堯輕天下崆洞有至道軒轅屈二字集作軒后文粹作軒屈順風玄真髙蹤萬古同德何其盛哉尊師有弟子十人並仙階之秀然鸞姿鳯骨眇曖雲臨二本作松者唯潁川韓法昭河內司馬子微皆稟訓瑶庭密受瓊室専太清之業遺下仙之儔谷汲芝耕服勤於我蓋歷嵗紀也始尊師受籙於茅山升玄王君王君受道於華陽隱居陶公陶公至子微二百嵗矣而玄標仙骨雅似華陽夫階真蹈𡨕練文粹作錬景逰化者其必有類乎法昭等永惟尊師靈迹洞業髙深邁古而棄世往矣其若之何乃斫石幽山申頌金鼎二本作玄德頌曰文粹作其辭曰觀元化兮求古之列仙得瑶圖與金鼎信元符之自然神與道而惟一天與人兮相連苟精守以専密必駕景而陵煙丹邱不死兮羡門子黃門二本作宫度世兮吾體玄玄之世德四字本作玄之至德作體兮洵淑美沖闕養和寶元始初學茅山濟江水乃入華陽洞天裏道逢真人文粹有兮字升玄子授以寶書青苔紙令守嵩山玉女峯雲栖窮林今五紀聖人以萬機為貴而我以天下為纍聖人以大寶為尊而我以天下為煩是以冥居於崴􅕲寄遺迹於軒轅有唐髙宗兮天子之光好道樂仙兮思文粹作彼字雲鄉千旌萬騎兮翠鳯張二本作鳯邀我文粹作遨逰汝海兮箕山陽朝拜白茅夕紫房齋心潔意緬相望所問玉真及玊皇何以得之受天昌黃庭中人在子身窈窈冥𡨕精甚真去汝驕氣與淫神勤能思之道自新文作相親集粹作自親遂解形而遺世乘白雲而上賔弟子不知其所往集作如也乃刻石以思真文苑英華卷八百四十八
