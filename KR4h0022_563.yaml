body:
  text: 文苑英華卷五百六十四宋李昉等編賀祥瑞四為朝臣賀涼州瑞石表一首代皇太子賀石龜負圖表一首為納言姚璹等賀瑞石龜表一首為納言姚璹等賀瑞石表一首百寮賀瑞石表一首賀天尊瑞石及雨表一首為宰相賀武威郡石化為麵表一首為涇州李使君賀慶山表一首為許智仁奏懷州黃河清表一首賀秦州河清表一首中書門下賀滑州黃河清表一首賀河清表一首中書門下賀醴泉表一首賀櫟陽醴泉表一首為朝臣賀涼州瑞石表上官儀貞觀十七年臣元嘉等言臣聞太陽含字天之命也德水呈文地之符也是知光膺寶厯非幽贊無以享鴻名對越兩儀非神物何以昌丕緒故有玄龜負卦繇表軒功朱鳥銜書兆彰姬籙非聖人之撫運孰能與於此乎伏惟皇帝陛下慶韞上元與天皇而合德祥凝太始體耀魄以齊明作周錫胤王叢本於氷翼生商降祉寶祚基於玉筐然後樞電效神皇虹授彩彤雲淡景標映龍顔瑞火流光呈發鳥迹由是凝圗作極握紀中天化洽九垓恩錦疑作綿八表功成戢武散騑服於桃園業定𢎞文覃正朔於昌海輯五玉而彰禮備陳萬舞而表樂成至德至仁垂拱巖廊之上乃聖乃神逺算廟堂之下憲文王而授立招天奬於夢齡象漢帝以登賢選仁明於刻闕國重曜而臨照家萬宇而永貞是以淹歲亢陽離輝升而玄澤降春疇罕闕震方建而年稼登受册之辰隨輕輪而翊佳氣夏絃之月接飛蓋而吐芝英郡國陳孝德之符煙浮一作生霧集縣道奏明靈之貺電擊雷奔豈與夫日至月書可同年而語矣伏見涼州都督李襲譽表奏昌松瑞石合百一十字文曰髙皇海出多子李久唐書五行志作元王八千唐書作十年太平天子李世民王唐書無王字千年太子李治書燕山人唐書有士字樂太國主尚注諤唐書作汪謤奬文仁邁千古大王五王六王七王十王唐書無王字鳯尾唐書作毛才子七佛八菩薩及上果佛田天子武文唐書作文武貞觀昌大聖延四方上下萬治忠孝為善八字唐書作上不治示孝仙戈八為善其文不次者略而不載敕遣禮部郎中栁逞馳驛檢覆並同所奏皆素文玉潔若瓊樹之華滋玄質碧鮮擬翠微之逺色雖復霞熛冠嶽暉鏤誅疑於介丘海鏡浮山昭列名於稽屺方兹秀麗曾何足云臣等歷選皇猶稽河圗於東序詳觀帝籙披册府於西崑媧燧以前不可得而知矣羲農以降乃考載而言焉若乃馬遰堯壇鳯御虞册麟遊吐字頗涉劉邦葉蠧為文才稱病已玄石降徴於典午赤伏錫命於炎精皆髣佛如神徴文見意或傍通以取證或索隱以求端猶且動色當年光華曩志矧茲天册顯發靈瑞頌聖德之欽明通史筆之揚堯典述國祚之悠永倍龜策之卜周年追美先朝衍軒丘之德姓式昭儲后邁釣臺之有光豈非天鑒孔明聖尤大者祥彌著靈心至察德加厚者祚逾長是用越契超繩光前振古績無與二慶溢登千臣等自省微生幸霑鴻造荷重光之煦育觀三才之宅心雀躍無以表其誠鳬趨不足勝其喜臣無任悅豫之至代皇太子賀石龜負圗表崔融臣某言臣聞虞舜五帝也夏禹三王也應厯數則星昴告期度水土則河精授象故知至誠上感無往而不通神道曲成有來而先見伏惟天皇運斗極平太階漏德澤於海河散皇明於日月煙雲郁郁鳥獸蹌蹌百寶用而銀甕滿五榖豐而丹甑出化之逺及隂陽不測之謂神德之廣被天地無名之曰道嵩髙維嶽洛陽下都此焉符理之所古則先靈之地伏見洛州牧相王所奏嵩山下頂封禪壇側掘得石龜負圗篆文一百六十字者臣亟聞其言矣昔者黃轅東省河獻龍書蒼頡南巡洛呈龜字古猶今也其若兹乎夫惟氣挾風霜文含星象玉經山上匪藉傍求銀丹池中居然暗發頌國祚之長久孕育於萬八千年歌卜筮之叶從牢籠於六十四卦况復髙臨秦室近控洛壇佇降王者之封常有君來之望由是神工不召若鐫金鏤之名天意潛彰似刻銀繩之篆豈與玉龜在泰山之上莫覩其祥石龜出吳江之右空傳其迹可同年而語哉臣才謝元良忝當儲二三靈眷命預聞東序之圗萬國心歡願奉南山之夀無任悅豫之至謹遣某官奉表稱慶以聞臣某誠歡誠喜云云為納言姚璹等賀瑞石龜表李嶠臣某言伏見衡州所進瑞石形似龜頂上有文曰大周并有乾坤卦字左邉有王武九千字又有水火金木土字各依其方北邉兼有井字臣等詳觀靈字伏覩竒文事實非常理同神仙疑首列大周文疑作之字表元首之尊左有王武之名明左契之執合乾坤之兩卦分金木之五行五行展轉而不窮兩卦周流而無極井以養物而知渥疑作泥澤之下覃石以補天乃顯貞堅而上列將以九千之寶祚嗣七百之鴻基兆發靈心事符嘉運况復名為玄武叶國姓而呈休出自炎方迎嚮明而發祉神祗之命受托於四靈感應之符實超於千載臣等叨延恩奬屢覩一作覿嘉祥喜抃之情實百常品無任慶躍之至謹奉表陳賀以聞謹言為納言姚璹等賀瑞石表臣某等言伏見瑞石有文曰武帝李彰好生臨國永保吉昌伏惟陛下受命旻穹降靈宗祏復棟重簷之禮嚴配昭升五刑九辟之科平反宥恤故能使三精孚德七廟垂祥頻降靈符屢彰潛祉好生臨國實開琬琰之文永保吉昌顯示貞堅之籙隆萬代之遐算曠千齡而不聞臣等叨沐恩私謬當樞近親覿休寶相趨抃躍無任嘉慶之至謹奉表稱賀以聞仍請出示百寮并録付史館百寮賀瑞石表臣某等言臣聞髙明博臨無逺不應正直潛感雖幽必通伏惟皇太后陛下慶發曽沙業隆大寶以至明當宗社之寄以至聖合乾坤之德荷三葉之休光承五行之厯紀平秩庶政大亨羣物冠帶遐荒之域天福日臨閭閻富夀之氓禮變樂和液露霑洽休徴昭顯用能上披乾象下發坤珍吐川之靈祕開神之韞匱伏見雍州永安縣人唐同泰於洛水中得瑞石一枚上有紫脈成文曰聖母臨人永昌帝業八字臣等抃窺靈迹駭矚珍圗俯仰殊觀相趨動色竊惟聖德奉天遞為先後神道助教相因發明陛下對越昭升欽若扶揖允塞人祗之望實當天地之心所以幽贊嘉兆傍通景貺且人稱同泰縣實永安姓氏將國號玄符土地與石文明應表裏潛會樞機𡨕發明宴坐之逾昌驗皇基之永泰則自然之無朕不測之謂神非夫道格昊蒼德充幽顯豈能發何言之微旨臻不召之靈物考皇圖於金册搜瑞典於瑶編則有蟲蠧成文魚鱗吐匣丹書集於昌户緑錯薦於堯壇或詞隱密微或氣藏讖緯莫究天人之際罕甄神祕之心未有昭聖育靈發祥隤祉明白顯著燭曜暉光若斯之盛者也且夫導洛疏津卜瀍經宇是開帝王之宅實為龜書之泉伯禹以致孝鬼神九疇天錫陛下以虔恭顧託八篆靈開超萬祀而同存歷百百疑而罕逮况乎隂陽景測朝市天臨號令施於四海機衡動於萬國靈心叶贊景業會昌薦希代之鴻寶獲非常之嘉應固可以明禋太寶禮秩介丘副神宗之乃眷答上玄之蕃祉臣等遇偶休明榮參簮笏千年且暮邀逄纍聖之期百辟歌謳喜屬三靈之慶無任鳬藻踴躍之至謹表詣闕陳賀以聞賀天尊瑞石及雨表臣聞大悲握契汲引之數盈千玄聖垂機感現之瑞不一隨緣應俗或作儒童降迹通凡常為長者然則前佛皆同一字可通疑作道非道理兩名至矣哉不可得而稱也伏惟天册金輪聖神皇帝陛下功成塵劫迹御金輪萬姓樂推百靈欣戴如來備記昔避天女之宫菩薩降生遂坐人王之國臣等一昨伏見四疑嶽雲臺觀道士奏稱御像瑞石大妙至極天尊一鋪創造聖容未施五色宿昔之頃畫繢自然不加之分宛同神化七十二相合而成體八十一好散而成章披絳雲之室闢明霞之館千乘億騎浮空而下九仙五老步虛而來羽抱錦帔風搖雲起龍文而鳯章日縣而月綴威儀有睟侍衛無聲坐疑龍漢之遊何必仙山之會自非隂陽不測變化無方慿法匠之威靈假神功之動用其孰能與於此中賀臣等又聞先天後天聖德合於無象欲雨而雨玄契通於不言日者王室屋一作屈聞炎方在候陛下乘朱輅駕赤騮歷太陽之中道居明堂之左個百神受職萬國來朝既配帝而嚴禋亦統天而布政是時也慈雲結慶甘露流香微風蕭然纎塵不起凡百在宥動色相歡咸以為天者萬人之本物有不霑於澤者則仰皇天而望之有不覃於惠者則籲告而請之更祈洪澍輒聞流潦俄而油雲族晚覆雙闕而朝隮膏雨及私浹三川而校疑下郊原吐潤品彚霑蘇麥壟纎莖已擢兩岐之秀黍田香粒方滋合頴之苖凡在群生不勝幸甚然後知御雲臺而占繇幸洛陽而録囚蓋其眇少曽何髣佛臣等幸忝簮笏預睹珍符惟德洞𡨕即叶元皇之化惟靈薦福長延梵帝之尊抃蹈之情倍百恆品無任鳬藻之至為宰相賀武威郡石化為麵表孫逖天寶三載臣等伏見王倕奏武威郡畨禾縣嘉瑞鄉天寶山周回五六里石化為麵在近村閭及諸郡部落自今載正月以來取食甘美益人又按圗經貞觀九年鳯凰集於此故名嘉瑞鄉其天寶山在此鄉界伏以神道設教變化無方聖人為心感通必應陛下仁霑動植澤及生靈故得地不藏寶石變為麵既資人食又濟邉廪成熟自因於道氣艱難不待於農功豈來牟之足方何雨粟之能喻况山符聖號用彰於萬夀鄉表瑞石允迪於前烈殊祥叶應景福攸臻臣等忝侍軒墀倍深慶悅無任抃躍之至謹奉表陳賀以聞為涇州李使君賀慶山表崔融垂拱二年臣某等言某日奉某月詔書新豐縣有慶山出曲赦縣囚徒改新豐為慶山縣賜天下酺三日凡在含生孰不慶幸中賀微臣詳窺海記博訪山經方丈蓬萊之疑作人迹所蓬到層作增城玄圃道家之妄説伏惟皇太后陛下應天順人正位凝命中外咸一隂陽以和嘉木四方而平春露草三旬而候月沖恩浹洽嘉貺駢闐當雍州之福地在漢都之新邑聖渚潛開神峯欻見政平而湧自蕩於雲日德茂而生非乘於風雨遊龍蜿蜿疑呈八卦之圗鳴鳯嗈嗈似發五音之奏仙蠶曵繭美稼抽芒一人有合於天心百姓不知其帝力方驗鎮星垂象山萌輔地之徴太嵗加年水兆載坤之應天人交際影響合符雷雨既作喜氣沖於三象鍾石以陳歡心動於萬物臣幸忝簮帶濫守藩隅不獲馳蒼闕而拜手望紫庭而繼足殊祥踵至寶算無疆厚賚傍霑群生一有之字非幸甚不任悚踊之至謹遣某官奉表以聞為許智仁奏懷州黃河清表臣智仁言臣聞德水清漪詩人以之興頌濁流澄鏡大聖於是登朝伏惟皇帝陛下道叶二儀功超萬古上玄降祉變孟津於渌波厚載呈祥發榮光於翠浼臣以去月得河內縣申云自太平村已下三十餘里河水變清各遂淺深泠然徹底鱗介之族無所藏形一作養藏謹自依極此句疑息同其狀又嵩髙維嶽形入清流少室竒峯恭差具寫謹按易坤靈圗曰聖人受命瑞見於河伏見涼州玄石式昭靈命臣部黃河應時清徹天禎地貺既符易象之文聖祚河清暗合靈圖之義古人歎其難俟臣今乃得親觀身體太平之風目擊會昌之瑞無任悅豫之至唐書五行志涼州立石在十七年懷州河清乃十六年當考賀秦州河清表臣聞崇髙不極之謂天廣博無涯之謂地若乃參天地之玄化代覆育之神功者其在聖人乎故能俯同五情恩浸八紘允膺千載仁霑萬代明靈之貺自我所招幽顯合符斯其效矣伏惟皇帝陛下家六合馭三光推明允之一心置於天下之腹用徇齊之四日招於萬物之情蜻蟲麛卵之所安猶懷夕惕輿頌芻蕘之瞽説尚廽天眷其所愛育者多矣而况於鰥寡孤獨乎其所容納者衆矣而况於公侯卿士乎至若削平宇宙混一華夷乃武也致疑教會昌樂新禮創乃文也穆巖廊以凝睇調風雨於絶恨疑乃聖也運埏埴以裁成動隂陽而不測乃神也體茲四霽侔彼兩儀神物之來蓋惟常理伏見秦州刺史表今月某黃河水復清深淺澄映百有餘里清自龍門之下驗登期以御天波及萬春之卑表無疆以彌夀臣聞道之所格者𢎞則靈之所感者大德之所包者厚疑則地之所應者深是以千祀登期自古歎其難遇一嵗之內祚聖人而再清求諸典墳竟無倫匹在於明世絶後光前宜其上答靈心升中告禪金聲一作舉玉振合百神於介丘玉輅朱輪副萬國之翹首則普天幸甚何其樂歟臣等越自下才欣逢上德致百王之不致聞億載之未聞舞蹈之深實百恆品中書門下賀滑州黃河清表權德輿臣某等言今日內侍朱希顔奉宣進止示臣鄭滑觀察使姚南仲所奏今月一日至六日白馬縣界三十里黃河清者伏以道集作𨗳自積石出於崑崙乃建靈源之封特視上公之禮克符昌運必降殊祥伏惟陛下聖澤感通休徴集作貞疊委惟此濁質化為清瀾國典所書是稱大瑞詩曰俟河之清人夀幾何歎其不可得而見也今則白馬之津三十里所澄徹如練綸漪成文一邦幼艾共觀嘉慶乃寓經界式彰永寧昔秦號水德徒推厭勝漢紀河平茍安決溢神功幽贊獨表清時足以薦諸宗廟書之史䇿臣等忝集作謬登樞近獲奉休明無任欣抃踴躍之至謹奉表陳賀以聞臣某等誠歡誠抃頓首謹言貞元十四年五月十五日賀黃河清表臣某言臣得進奏官狀伏承河陽奏汜水西界從洛口黃河清一百六十里又橫海軍奏界內河清澄徹分明者臣聞聖人在上天下和平風雨時若則海波不蕩黃河清夫土所以載水水所以利物天意鍾土德之道疑開水瑞之華符我上聖祥於下土中賀伏惟睿聖文武皇帝陛下蹈十聖之原軌陳一王之大法垂衣裳以朝萬國舞干羽而來四夷平泰階於天纒偃師節於靈臺故得濁波渾渾千載一清長瀾浩浩百里如鏡氣新天宇光徹地脈仰分萬象之法中涵千聖之德初澄海裔表陛下橫恩波於海上再清洛口助陛下鋪文明於土中二十八日兆陛下告成之日也百六十里期陛下得聖之數也臣謬承分閫之寄叨榮持節之權生當海宴之年幸識河清之日未奉明詔不敢擅離軍府詣闕隨公卿蹈舞明庭下情無任西望踴躍之至中書門下賀醴泉表常衮大厯二年臣等伏以西京櫟陽縣有泉水於平地湧出潔誠飲者痼疾咸痊稽之圗牒是曰醴泉臣聞和氣上感湛恩下浹則有休徴以彰至化近在雨金之地特啓莢泉之瑞無源獨湧平地滂流當神明之積髙表隂陽之不測其氣香潔其味甘醇抱華清而蕩邪資靈化以除穢積年之疾一飲皆愈挈瓶而至重迹相望日以萬計酌而不竭齊莊之誠益厲神逹之效愈彰伏惟陛下𢎞父母之深仁納黎元於夀域感此靈液助其生成疾苦假除夭昏不作勿藥有喜愛人斯甚可以見天地之心可以明帝王之德昔唐堯至聖光武中興沛然發祥千嵗一覩啓我昌運居然合符鴻休無疆天下慶幸臣等謬司近密喜倍常情無任欣慶之至賀櫟陽醴泉表獨孤及臣等言伏見京兆尹李勉奏櫟陽縣有醴泉出飲之者痼疾皆愈臣聞王者澤周庶類則神降百祥天地之心去人不逺陛下厚德載物與坤同符以善利人如水潤下故厚集作后土獻瑞湧泉療疾靈源酌而不竭沉痼飲而皆痊勿藥之喜萬人是賴仰窺天意豈不以是彰陛下之德施乎不然何衆庶顒顒強名聖水彼丹甑集作井朱草白麟赤鴈徒稱太平之瑞未聞功施於人方之聖泉豈喻神異臣等無任喜慶之至文苑英華卷五百六十四
