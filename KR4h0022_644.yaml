body:
  text: 文苑英華卷六百四十五宋李昉等編檄文此卷英華所編失年代先後今正之為彭城王檄征鎮文為太祖檄齊神武高歡文為東魏檄梁文為行軍元帥鄭國公檄陳文為北齊檄陳文為侯莫陳悅檄陳蕭摩訶文隋檄陳尚書江揔文為彭城王檄征鎮文孔熙先令弟休先作揚州刺史徐湛之告四方王公守宰夫休否相乘天道無常一作道無恆泰狂狡肆逆明哲是殛故小白有一匡之勳重耳有翼戴之德自景平肇始皇室多故大行皇帝天誕英姿聰眀睿武一作哲拔自藩國嗣位統天憂勞萬幾秉一作垂心庶務是以邦內安逸英華作邦家安危恐非四海同風而頃一作比年已來姦豎亂政刑法違衷一作刑罰乖淫隂陽乖一作違舛致使釁起蕭墻飛禍卒集一作危禍萃集賊臣趙伯符積怨含毒遂縱凶醜一作姦宄肆兵犯蹕禍流儲二一作宰崇樹非所一作類傾墜皇基罪百浞􅜦過千元莽開闢以來未聞斯比率土叩心華夷泣血咸懷亡身之誠同思糜軀之報湛之畢與行中領軍蕭思話行護軍將軍臧質行左衛將軍孔熙先建威將軍孔休先忠貫白日誠期一行著幽顯義痛其心事傷其目投金奮戈萬殞莫顧即日斬伯符首及其黨與雖豺狼即戮惟新告始一作王道惟新而普天無統一作主羣蒙靡係一作莫繼彭城王體自高祖明明一作聖明在躬德格天地勳溢區宇世路威夷勿用南服龍潜鳳棲于兹六稔蒼生饑德億兆渴化豈惟東征有鴟梟之歌陜西有勿剪之歎一作思而已哉靈祗告徵祥之應䜟記表帝王一作者之符上愜一作答天心下合人望一作下愜民望正位辰極非王而誰今遣行護軍將軍臧質等齎皇帝璽綬星馳奉迎百官備禮絡繹繼進並命羣師鎮戍常若干撓義徒有犯無貸昔年使反湛之奉賜手勑逆誡禍亂預覩期萌令宣示朝賢共拯危溺若無斷謀事失於後機遂使聖躬濫酷大變奄集哀恨崩裂撫心摧梗不知何地可以厝身輒督勵尫頓死而後已一作皆宋書苑畢傳英華録謀逆之檄未詳為周太祖檄齊神武高歡文西魏永熙三年蓋聞隂陽遞用盛衰相襲茍當百六無聞周書作無間三五皇家創歷陶鑄蒼生保安四海仁育萬物運距孝昌屯沴屢起隴冀搔北史作騷動燕河狼顧雖靈命重啓蕩定有期而乘釁之徒因生羽翼賊臣高歡器識庸下出自輿皂罕聞禮義直以一介鷹犬效力戎行靦冒恩私遂竊北史作階榮寵不能竭誠盡節專挾姦回乃勸爾朱榮行茲篡逆及榮以專政伏誅世隆以凶黨外叛英華作世濟凶黨非歡苦相敦勉令取京師又歡吐萬兒復為弒虐英華作傷殺暴虐暫立建眀以令天下假推普􅪮欲竊威權並歸廢斥俱見酷害於是稱兵河北假討爾朱亟通表奏云取讒賊周書作敗既行廢黜遂將篡弒以人望未改恐鼎鑊交及乃求宗室權允人心天方與魏必將有主翊戴聖明誠非歡力而歡阻兵安忍自以為功廣布腹心跨州連郡端揆禁闥莫非親黨皆行貪虐窫窳生靈而舊將名臣正人直士橫生瘡痏動挂網羅故武衛將軍伊琳清貞剛毅北史作貞直武毅禁旅攸屬直閣將軍鮮于康仁忠亮驍傑爪牙斯在歡收而􅓍之曽無聞奏司空髙乾是其黨與每相影響謀危社稷但以姦志未從恐先泄漏乃密白朝廷使殺髙乾方哭對其弟稱天子橫􅓍孫騰任祥歡之心膂並使入居樞近伺國間隙知歡逆謀將發相繼歸逃歡益加撫待亦無陳白然歡入洛之始本有姦謀令親人蔡俊作牧河濟厚相恩贍以為東道主人故關西大都督清水公賀拔嶽勳德隆重興亡攸寄歡好亂樂禍深相忌毒乃與侯莫陳悅隂圖陷害幕府以受律専征便即討戮歡知逆狀已露稍懷旅拒遂遣蔡俊拒代令竇泰佐之又遣侯景等云向白馬輔世珍等徑取石濟髙隆之及婁招等屯據壺關韓軌之徒擁衆蒲坂於是上書天子數論得失訾毁乘輿威武疑作侮朝廷藉此微庸冀茲大寶溪壑可盈禍心不測或言徑赴荆楚開疆於外或言分詣伊洛取彼讒人或言欲來入關與幕府决戰今聖明御運天下清爽百僚師師四隩來暨人盡忠良誰為君側而敢威福自己生是亂階緝搆南箕指鹿為馬包藏凶逆伺我神器是而可忍孰不可容幕府折衝宇􅨚親當受脤鋭師百萬彀騎千羣裹糧坐甲唯敵是俟義之所在糜軀匪吝頻有詔書頒告天下稱歡逆亂徴兵致伐今便分命將帥應機進討或趣其要害或襲其窟穴周書作宅電繞地擊霧合星羅而歡違負天地被毒人鬼乘此掃蕩易同俯拾歡若渡河稍逼宗北史作宫廟則分命諸將直取并州幕府躬自東轅電赴伊洛若固其巢穴未敢發動亦命羣帥百道俱前轅裂賊臣以謝天下其州鎮郡縣率土人黎或州鄉冠冕或功勳此史作勳庸世濟並宜捨逆歸順立效軍門封賞之科已别有格凡百君子可不勉旃周書作歟北史作哉時濟神武稍逼京師魏帝遂入關周太祖乃奉魏帝都長安披草萊立朝廷軍國之政咸取决于太祖此篇英華所載甚略今以周書北史增入為東魏檄梁文杜弼藝文類聚作魏收觀夫辰象麗天山嶽鎮地方以類聚物以羣分建之以邦國樹之以君長日月于是莫二一作二宇宙一作皇帝所以揔一雖五運相推百王革命此道之一作所行孰之能改一作孰云能易而皇家承統光配彼天義洽幽明化周動植崇文德以來逺修禮讓以止訟舞干戚於兩階執玉帛於萬國𤣥功潜運至德旁通百姓日用而不知兆民受賜而無迹唯彼吳越獨阻聲教匪民之咎責有由焉而元首懷止戈之心上宰薄兵車之㑹遂解縶南冠喻以好睦舟車遵泝川陸光華亭徼息奔走之勞屯戍無逼卒之變雖嘉謨長算爰自我始而罷兵息民彼獲其利侯景豎子本無事一作土業乃枉道於人間遂乾沒於世上鳴伏於爾朱之門鎮守於普泰之日曽無為主之識詎有挈瓶之智既而投命義旗歸身幕府殊異雍齒有類丁公時逢寬政得免大戮棄其瑕滓收其力用預在行伍參跡驅馳及秦隴逋誅每事經略以河南是空虛之地漢陽非兵戰之衝薄存掎角聊示旗鼓豈資實效寄以遊聲軍機催勒蓋維景任揔兵統旅則有司存而愚𥚹有積驕憤遂甚屢犯軍紀自生疑二禍心潜搆翻成亂階負恩棄德罔恤天討不義不昵厚而必顛委慈母似脫屣棄寵弟如遺芥龍鍾稚子痛苦成行孌彼諸姬破亡為伍滅伯春之婉轉慕姜兒之爽言不與狼虎同仁而共豺狸等惡及逺託關隴依慿姦異逆主定君臣之分賊臣結兄弟之親解其倒懸仰人鼻息一日無恩終成難養俄而易慮躬擐干戈釁暴惡盈側首無託以金陵逋逃之藪江南統御一作流離之地甘辭卑體進孰圖身讒言浮說抑可知矣叛豎投命豈將擇音而僞朝大小幸灾忘義主荒于上臣蔽于下逐雀去草曽不是圖竊寶叛邑椒蘭比好人而無禮其能國乎亦既失信不亡何待今帝道休眀皇猷允塞四民樂業百靈效祉故丞相材標國貞道潤時雨義冠伊霍勳蓋桓文大君立德世功世祿作民舟楫為國棟梁內外齊心上下同德蛟騰虎嘯風生雲起摩日則車懸轉舍排山則龍門洞開吞雲夢於胸中運天下於掌內雖有賊臣去國亡卒出境何異一毛之落牛體雙鳬之飛海曲一作濵彼既連結姦惡斷絶鄰好追兵保境縱盜侵國蓋物無定方事無常勢或乘利而受害或因得而更失是以吳侵齊境遂致勾踐之師趙納韓地終有長平之役矧乃鞭撻疲民侵軼徐部築壘擁川捨信邀利此而可忍孰不可懷是以援乘麾殞之將投石拔距之士深衛僞主信納亡叛含怒作色如赴私讐意存涉血義不旋踵攻戰之利實若有神徵兵聚衆依山傍水舉螳蜋之斧被結蜣之甲當窮轍以待輪坐積薪而候燎及其鋒刃暫援埃塵且接便已亡㦸棄戈土崩瓦解貞陽以從一作猶子之親為戎首之任非獨一作但力屈道窮亦將無路還蜀兼亦一作復挾子垂翅俱在籠樊將士以昧禍之心為助亂之事皆掬指舟中披甲鼓下同宗異姓纍纍相望曲直既殊强弱不等父出子孤自取其敗違卜愎諌何以辭責雖復貪利茍得背同即異獲一人而失一國見黃雀而忘深井食鈎吻以療饑飲鴆毒以救渴智者所不為仁者所不向誠既往之難迹猶將來之可追景以鄙俚之夫遭風雲之㑹位登三事邑啓萬家揣身量分久當止足而周章向背離披不已夫豈徒然意亦可見彼乃示之以利器誨之以慢藏使其勢得容姦令其時堪乘便既南風不競天亡老賊奸謀將復作矣然則摧堅强者難為功拉枯朽者易為力計其雖非孫吳猛將燕趙精兵猶是久涉行陳曽習軍旅豈同輕剽之師不比扼腕之衆距一作拒此則作氣不足攻彼則為勢有餘恐尾大於身踵粗於股倔強不掉狠戾難馴呼之則反速而釁小不徴一作懲則叛遲而禍大㑹應遙望廷尉不肯為臣自據淮南亦欲稱帝但恐楚國亡猿禍延林木城門失火殃及池魚橫使漢江一作江黃士子荆揚人物死亡矢石之下支一作天折霧露之中彼梁王操行無聞輕險有素工用其短以少為多反覆山淵顛倒冠履射爵論功蕩舟稱力年既老矣耄又及之政荒民流禮崩樂壞改换朝章變易官品雖世異漢朝而事同新室加以用捨乖方立廢失所矯情動衆飾智驚愚毒蟲滿懷安敢試業躁競盈貫茸謬治情內恣鴟靡外逞殘賊人人厭苦家家思亂災異降於上怨讟興於下履霜有漸堅冰且至恃浮一作將隂躁之風俗任輕薄之子孫朋黨路開兵權在外必將禍生骨肉難起腹心强弩衝城長㦸指闕徒探雀鷇無救府藏之虛空伺一作請熊蹯詎延晷刻之命外崩中潰今實其時鷸蚌相危一作扼我乘其弊方使髙旗舒斾長轂啓行迅騎追風精甲耀日四七並列百萬為羣風飄雲動星羅海運以此赴敵何敵不摧以此攻城何城不陷猶為岸上之虎當作水中之龍以轉石之形為破竹之勢將使鍾山渡江青蓋入洛荆棘生建業之宫麋鹿遊姑蘇之館但恐兵一作革車之所轥轢劍騎之所蹈踐杞一作椅梓於焉傾折竹箭以此摧殘若吳之王孫蜀之公子順時以動見機而作靣縳銜璧肉袒牽羊歸欵軍門委命下吏當使焚櫬而出拂席相待必以楚材將為晉用固乃喜得異度實自利獲士衡士龍即援客卿之族將加驃騎之號斯蓋壯士封侯之日丈夫立節之秋冬冰可折時不再來先事預懷有如皎日王侯無種工拙在人凡百君子勉求多福若不改迷坐待淪沒一旦暴骨草莽流血成川猶且不悟噬臍何及故宣往意馳此簡書檄之到彼咸共申省此檄與藝文類聚資治通鑑所載並同惟魏書島夷蕭竹傳文既諄復先後亦異今併録之其僅同者白字是也夫乾坤交泰明聖興作有冥運行之力俱盡變化之途抱識含靈融然並至呈形賦命混而同往所以𤣥功潜運至德旁通百姓日用而不知萬國受賜而無迹豈徒鑿其耳目易其心慮悟以風雲一其文軌使夫日月之照不私雨露之施均洽運諸仁壽之域納於福祿之林自晋政多僻金行淪蕩中原作戰鬪之場生民為鳥獸之餌則我皇魏握𤣥帝之圖納水靈之祉駕雲車而自北䇿龍御以圖南政符上帝援溺下土怪物殛死淫水不作運神器於顧盼定寶命於蜘蹰恢之以武功振之以文德宇內反可封之俗圓首識堯舜之心沙海荒忽之外瀚漠羈縻之表方志所不傳荒經所不綴莫不繩谷鉤山依風託水共仰中國之聖同欣大道之行唯夫三吳百越獨阻聲教匪民之咎責有由焉自僞晋之後劉蕭作慝僣擅一隅號令自己惟我祖宗馭宇愛民重戰未極謀臣之畫不窮節將之兵聊遣行人降以尺一圓臺已築黃屋輒去賜其几杖置之度外蕭衍輕險有素士操蔑聞睥睨君親自少而長好亂樂禍惡直醜正巧用其短以少為多眩惑愚淺大言以驚俗驅扇邪僻召兵以作威曲體脅肩搖唇鼓舌候當朝之顧指邀在位之餘論遂汙辱冠帶偷竊藩維及寶卷昏狂下不堪命曽無北靣有犯之節遽滅人倫在三之禮慿妖假怪鬼語神言稱兵指闕傾朝鴆主陵虐孤寡聾愚士民天不悔禍姦醜得志內恣雕靡外逞殘賊驅羸國之兵逼糊口之衆南出五嶺北防九江屯戍不解役無寧歲死亡矢刃之下夭折露霧之中哭泣者無已傷痍者不絶託身人上忽下如草遂使頑嚚子弟肆行淫虐狡猾羣小縱極貪婪剝割蒼生肌肉略盡刳剔黔首骨髓俱罄猛虎未方其害餓狼詎侔其禍惵惵周餘救死無地至於矯情飾詐事非一緒毒螫滿懷妄敦戒業躁競盈胸謬治清靜至乃大興寺塔廣繕臺堂昭陽倒景垂珠銜璧崢嶸刻削千門萬戶鞭撻疲民盡其筋骨延壤運石悲歌掩途死而可祈甘同仙化智淺謀踈曽不自揆遏桐柏之流翻為己害子亡齊之𦙍忽為戎首書契迄茲罕聞其事至於廢捐冢嫡崇樹愚子朋黨路開彼我側目疾視扼腕十室而九翹足有待良亦多人二紀於茲王家多故始則車馳之警終有驚墜之哀神祗痛憤㝢縣崩震於是故相國齊獻武高王感天壤之慘黷激雲雷以慨然伏高義而率民奮大節以成務爰有匡國定霸之圖非直討賊雪耻之舉於是睿略紛紜靈武冠世蕩滌逋孽尊主康邦皇上秉歷受圗天臨日鏡道隨𤣥運德與神行既而元首懷舞戚之風上宰薄兵車之㑹遂解縶南冠喻以好睦舟車遵遡川陸光華亭徼相望欣然自泰反肉還童不待羊陸雖嘉謀長算爰自我始罷戰息民兩獲其泰王者之信明如四時豈或為人君父二三其德書而不法可不惜哉侯景一介役夫出自凡賤身名淪敝無或可紀直以趨馳便習見愛爾朱小人叨竊遂忝名位及中興之際義旗四指元惡不赦實在羣胡景荷人成拔藉其股肱主人有丹頸之期所天陷族滅之釁雖不能蔽捍左右以命酬恩猶當慘顔後至義形於色而趣利改圖速如覆手投身麾下甘為僕𨽻獻武王側棄其瑕穢録其小誠得厠五命之末預在一隊之後忝跡驅馳庶其來效長鞭利鎩術以制之既關隴逋誅每事經略以河南虛空之地非兵戰之衝薄存掎角聊示旗鼓豈資實效寄以遊聲軍機催勒蓋惟景任揔兵統旅則有司存而愚褊有積憍愎遂甚犯違軍紀仍自猜二禍心潜搆翻為亂階負恩棄德罔恤天討不義不昵厚而必顛委慈母如脫屣棄少弟如遺土羣子陸陸妻姪成行慕姜兒之爽言蔑伯春之宛轉跳梁猖獗夫欲誰欺比之梟獍異類同醜欲擬蛇鼠顧非其倫及逺託關右委命寇逆寶炬定君臣之分黑獺結兄弟之親授以名器之尊救其重圍之死慿人繫援假人鼻息俄而忘恩背惠親尋干戈釁暴惡盈側首無託以金陵逋逃之藪江南流禦之地甘辭卑體進熟圖身詭言浮說抑可知矣叛竪救命豈將擇音僞朝大小幸災忘義主耄於上臣蔽於下逐雀去草曽不是圖竊寶叛邑椒蘭比好人而無禮其能國乎夫安危有大勢成敗有恆兆不假離朱之目不藉子野之聽聊陳刺心之說且吐代謀之言今帝道休眀皇猷允塞四民樂業百靈效祉雖上相云亡而伊陟繼事秉文經武虎視龍驤驅日下之俊雄收一世之英鋭擊刺猶雷電合戰如風雨控弦躍馬固敵是求蠕蠕昔遭離亂輻分瓦裂匹馬孤征告困於我國家深敦鄰附愍其入懷盡憂人之禮極繼絶之義保衛出於故地資給惟其多少存其已亡之業成其莫大之基深仁厚德鏤其骨髓引領思報義如手足吐谷渾深執忠孝膠漆不渝萬里仰德奏欵屬路並申以婚好行禮如歸蠕蠕境斜界黃河望通幽夏飛雪千里層氷洞積北風轉徑實筋角之時沍寒方猛正氊裘之利吐谷渾疾彼凶逆强兵歲舉傾河及鄯塵通隴峽驅龍池之種藉常勝之氣二方候隙企其移踵加以獨孤如願擁衆秦中治兵劫愶黑獺北備西擬內營腹心救首救尾疲於奔命豈暇稱兵東指出師函谷且秋風揚塵國有恆防關河形勝之際山川襟帶之所猛將精兵基跱嶽立又寶炬河隂之北黑獺邙北史作芒魏書作亡山之走衆無一旅僅以身歸就其不顧根本輕懷進趣斯則一勞永逸天贊我也言之旦旦日月經天舉世所知義非徒語持此量之理有可見則侯景遊辭莫非虛誕夫景繩樞席牖之子阡陌鄙俚之夫遭風塵之㑹逢馳騖之日遂位在三吏邑啓千社揣身量分久當止足而乃周章去就離跂不已夫豈徒爾事可折揚度其衆叛親離守死不暇乃聞將棄懸瓠逺赴彭城老賊姦謀復將作矣固揚聲赴助計在圖襲吞淵明之衆招厭虐之民舉長淮以為斷仍鴟張歲月南靣假名死而後已此蓋蚌鷸之禍我承其弊且僞主昏悖不惟善鄰賊忍之心老而彌篤納逋叛之詭譎蔑信義以猖狂天喪其神人重其怨將踐瓜圃之蹤且追兒侯之轍今徵發犬羊侵軼徐部築壘擁川覬覦小利此而可忍孰不可懷兵凶戰危出不得已謬奉朝規肅兹九伐扛鼎拔樹之衆超乘投石之旅練甲爭途波聚霧合虎斑龍文之逸蘭池蒲梢之駔噓天陸野躡影追風振旅南轅長驅討䠞非直三吳鼠面一麾魚駭乘此而往青蓋將歸且衍虐網蚩兵權在外持險躁之風俗兼輕薄之子孫蕭綸凶狡之魁豈無商臣之恨蕭譽失志之憤當召專諸之客外崩中潰今也其時幕府師行以禮兵動以義弔民伐罪理有存焉其有知機審變翻然鵲起立功立事去危就安賞典未忘事必加等若軍威所至敢有拒違尺兒已上咸從梟戮今三禮四義之將豹虎熊羆之士深銜逋僞信納叛亡違卜愎諌實興伐役莫不含怒作色如赴私讐茹肝涉血義不旋踵攻戰之日事若有神莽積麻亂匪旦伊夕以彼曲師危卒望我軍鋒何異蛣蜣被甲蝍蛆舉尾正恐旗鼓一接芝藋俱摧先事喻懷備知翰墨王侯無種禍福由人斯蓋丈夫肉食之秋壯士封侯之㑹冬氷可折時不再來凡百君子勉求多福檄之所到咸共申省知我國行師之意為行軍元帥鄖國公韋孝寬檄陳文周宣帝大象元年僞陳私署公卿將校州鎮郡縣村屯邑落蓋聞五精上列曜魄揔其威靈萬國下分皇王攝其區域至其創業垂統革命受終奄有神州光宅函夏莫不垂極襲聖積德纍仁播厚利於人民建大功於天地然後幽明贊叶兆庶歸往瑞之以龍圖鳳紀崇之以玉璽黃屋故能照臨九縣對越兩儀永保鴻名長為稱首未有蠻陬夷落裔土荒隅崛起阡陌之中妄竊帝王之號斯則僣越之首縣一作懸同於漢闕亡吳之主㑹於晋臣布在方册可以龜鏡者也我太祖文武皇帝自天攸縱膺運挺生屈道藩條或躍伊始屬𤣥運將改祿去王室三川已震九鼎將飛事功在泥祿疑作禍深流彘乃推誠仗義援手濡足迎衛乘輿崇建旐社舉天維於將墜振一作正地軸於已傾血氣食毛咸受其賜是則我有大造於區夏也重以闢土服逺包荆卷蜀功高於九合業重於三分愈執忠貞之操終以人臣之禮至哉大矣無得稱焉既而謳歌允屬金石變響神器大寶用集我有周我閔皇帝乃上膺靈命俯順樂推揖讓而登皇極垂衣而歸撫運世宗纘統克隆洪緒武功文德騰茂飛英我髙祖武皇帝以上聖降下武以至道𢎞丕業其寂也象繫不能究其微其動也雷霆不能比其變僞齊竊據中原綿歷世祀一作紀帶之以巨海長淮鎮之以峻岱崇嶽其地廣其民衆其俗冨其兵强而帝遷明德人思睿后金鉞一麾廓然大定申弔伐之義答億兆之心陟方之駕雖逺鼎湖之神未絶天元皇帝負四聖之休烈協千載之昌期懸金鏡振玉鼓宏天綱廣地絡東窮海外西極河源邛管夜郎之所冒頓呼韓之類莫不屈膝稽顙泛水梯山被華夏之仁風仰中國之聖道唯彼揚越獨為匪民菆芮魚鳥之郡晏安龜蛇之穴故僞魁陳霸先火耕水耨之夫蓽門圭竇之子無行檢於鄉曲充部𨽻於藩侯施彼呼船之伎展其盜裘之用值蕭氏喪亂金陵擾攘爛羊啓邑拔卒為將遂得洗濯江漢奮迅泥滓王僧辨秉文經武挹義懷仁志在鷹揚誠深鶴立掃江表之巨寇復梁室之宗社提挈霸先成其羽翼而背恩忘德毁器折枝密相掩襲忍加屠害節士為之扼腕名臣所以流涕蕭方智世有江外實主梁祀霸先義則臣民任惟輔佐御下暴於戻虎輕上踰於老年疑作牛見左傳包此禍心遽行篡弒遂令羣盜歘起宫闈窘逼梁棟之間顛死一作斃鋒鏑之下既甚南宫絶宋公之脰又過淖齒縮齊閔之䈥自古逆子亂臣窮凶極悖未有如斯者昌實霸嗣舊加篡戮殘虐相襲報復循環陳頊獲自儲宫我之俘𨽻先朝深𢎞寬宥免其釁鼓置之夷邸淹歷歲時芻豢費上林之牧廪恤索長安之米其兄蒨發常山之念屢致誠請國務狐首之感以禮遣送頊禀性凶嚚不義不昵害厥猶子僣其僞位朝廷逺撫長駕含垢匿瑕遍省不虧輶軒繼路東夏克平威震淮海乘勝席卷咸請南轅高祖以得原失信義有不取一作敢懷逺字小理存久大而違盟背惠忽從兹始搖蕩我邉陲侵軼我彭泗我是以有吕梁之役麾下裴忌程文秀之輩李緒蔣元舉之徒束手軍前不可勝計積甲等孤桐之岫溺卒斷浮聲之流頊長惡愈甚守迷不變據如掌之地延翹足之項猶怒臂當轍舉尾支山習黃旗之謬談志青蓋之妖說貫盈數盡今實其時加庚子應年金火入斗天道人事宛若合符混一之期昭然可見寡人不武董兹戎律內禀帷幄出制天淵部勒諸將雷奔電擊大將軍龍門公拓拔王述領巴蜀之兵一十二萬出於白帝水陸俱下大將軍安昌公拓拔則領驍騎五萬濟於南岸循江東轉梁王舉一國之師盡舳艫之盛發自江陵首尾不絶行軍揔管上柱國杞國公亮率步騎一十五萬掃蕩山林自東闕行軍揔管上柱國郕國公士彥領人馬一十萬濟自泗口徑取廣陵幕府精鋭二十萬餘長驅淮水直指江左並同集石首大㑹金陵凡此諸軍皆從􅊈隴驍雄幽并勇俠捩犀拔象之夫斬蛟挈兕之士上谷漁陽之騎追風嘯雲荆門鄧塞之舟浮江沿漢象弭飾堂溪之材鷲羽加淇園之竹旌旗麾電戈劔竟野鼓怒則江湖蕩沸叱咤則山嶽簸跳以此攻城何城不陷以此衆戰誰能抗禦將恐程門霣霜梧桐與樗櫟同淍昆山火燎天球共碔玞俱盡故示以禍福冀相全濟陳頊若識機知變輿櫬轅門當增安樂之封有加歸命之禮僞公卿以下或中華之冠帶流寓江淮或東南之雋椘世載名位豈安危亂之邦事夷裔之主良由身居僞網迹淪冦地雖心存魏闕無由自拔故耳今正丈夫轉禍一作福之秋君子見機之日若能投誠進欵展效立功富貴榮華義同俯拾如有不達機運敢拒王師軍有嚴科刑兹罔赦檄之所到咸共申省為北齊􅊾陳文盧思道告三江之表僞署君臣將帥州郡邑落士民等蓋聞上𤣥垂象列宿拱辰極之忠厚載成形百谷指滄溟之大是以三五以降哲王元后逺覃聲教大燀威靈日月之所照臨俱荷亭育舟車之所通泊咸附象鞮我大齊積德纍功開物成務光宅寰海覆幬蒸民虞夏受終顧有慙德湯武革命未云盡善滄波已東九譯請吏玉門之右萬里無塵諸華冠帶之俗肆勤南畝皮服引弓之渠頓顙北闕內外禔福區宇懾然皇上垂拱巖廊司契而已惟夫太伯之後實號勾吳少康之裔是為於越江界湫湄如掌之陋塗泥所集瘴癘自興自昔皇王列壤班瑞春秋之義爵不過子在晋永嘉運圯數極司馬熾衆無一旅播越江濵劉蕭已還多歷世祀魏氏奄一神州置之度外且西吞巴蜀北據淮淝善人君子可以為國陳霸先下愚小醜品極輿𨽻屬揚部淪胥之日幸梁人殱敗之秋騁其姦回妄自尊大蠻觸之戰爭似鰌魽之跳躍曇頊昏頑賊忍不義不慈剿厥猶子竊其僞位蜂蠆非毒溪壑易滿事甚楚圍之纓理切吳光之劔國小地狹虐用其民坑戮侔於屠伯芟夷過於剃氏加以沉迷麴糵酣􅒬終朝澆灌取盡夜以繼晝貨賄公行政刑不立踈棄良士狎近小人守宰蠶漁子弟荒暴頭㑹箕斂杼軸其空災異相仍稻蟹不熟江左黎獻戴目而視齊之季世實多涼德江淮之間暫為頊有便謂三眷易求百年可致違卜愎諫黷武窮兵吳眀徹程文秀之徒並早經行陳粗有風力彼朝上下繫以存立吕梁之役貫盈惡稔曽未交綏雲卷霧徹組練塞垣艅艎噎水顧眄之頃隻輪不歸及周宣馭歷將一淮海荆舒之民奢侈為怨聊命偏禆拯其荼毒長江已北若火焚毛是則楊越之地為陳孤立卒弊壤蹙邦羸政塞闕乘奔無轡譬兹非險坐薪待燃方此為泰司馬消難切疑荷特私任居連率猜狂使酒竊地外奔曇頊背恩棄德是信是使引盜納姦無愧無畏天奪其魄慿犯不悛緣邉諸城犬羊荐食聖主以軒開萬國屬盡九州一隅不庭宜置天討爰詔六軍分閫受鉞西徵秦隴之鋭北引燕代之英五校雄兒超乘俱起三河猛士援距爭奮虎夫萬隊豹騎千羣並骨勇肉飛風驤霧合憬彼江黃之衆蕩矣彭濮之民巨艦高艫順流東指江都壽春之域扼喉撫背之兵飛龍赤馬絶水南越漢后昆明未足方其訓旅魏王𤣥武不能比其𨽻師以江湖之泥短衣祝髮輕舠利舸便習者多陳上迷天意下慿地險所以舉尾支山怒臂當轅一作轍今荆門鋭卒一作士致命前驅淮南義師賈勇競入揚舲振楫疑兔走鳬飛然則彼之所長我亦兼有我利涉大川匪旦伊夕江郢運遭吳㑹裔旅東西遏絶通致無由僞朝軍旅或陳誠欵密使相尋蕞爾危邦表裏携二兼弱攻昧今也其時扛鼎蒙輪之卒事均驅兕三禮四義之將晚疑作俯視韓白正正之旗百道俱進並雲移雷動大㑹金陵牙旗暗一作旗英山原金鼓沸天地呼吸則江漢回流叱咤則衡疑可拔運岱山而壓春卵引渤海而濯秋螢當不足等其銷滅譬其虀粉猥以不武謬揔戎律上禀廟堂之謀下資素飽之氣使張悌之魂先遊一作逝北斗吕嘉之級逺至新鄉漂櫓溺驂孱然已至亂麻積莾可為寒心僞主若天誘其誠去危轉禍審青蓋之欲歸知蔣山之應渡銜璧輿櫬拜手轅門則上比吳蜀之君不失公侯之寵陳之百辟卿士編户黔庶有能深識逆順因事立功亦當服冕乘軒紆青佩紫疏爵酬庸待以不次王者之師全救為本萬姓毫釐靡所侵軼勉求多福無待噬臍檄之所到咸共申省此檄述吳明徹及司馬消難事以史考之明徹吕梁之敗在周宣政元年先一年周已滅齊後二年消難方奔陳又明年周禪隋開皇元年伐陳文華既題作北齊又文有我大齊之語未詳其誤今兩齊字疑皆為隋當考為侯莫陳恱檄陳蕭摩訶等文案侯莫陳悅西魏永熙三年卒後隋代陳以侯莫陳潁為行軍總管悅當作潁夫文軌未同江湖致阻風雲密邇良用依然肇歲猶寒想如宜也經始戎務念以勞懷寡人肅禀天䇿爰征不庭懸旌秣馬今次楓岸夫時有盛衰運有興滅積德必慶延後嗣長惡則祚不及逺陳氏往因際㑹竊有金陵蒨頊承立遽相屠害叔寶嗣僞彌復忍虐沉􅒬日增內荒愈甚雕牆峻宇加錦繡於土木嚴刑酷法陷人物於塗炭諌士喪身元良鉗口無道之極自古罕聞有一於此何可不滅斯皆公等所悉素匪寓言我皇誕膺靈命光臨大寶再闢乾坤重懸日月歷代逋誅之寇曠古不羈之民感我仁風咸沐至道唯彼吳越猶未革心主上義存字小含以寬大冀能撫育彼民守其封域而窮凶極暴日就月將士庶無聊人神共憤乞師繼軌獻欵相尋愍彼黎元實興我役已有别詔止廢僞主之身此外士民咸從蕩滌西自巫峽東逹滄海巨艦覆波濤樓船出雲霧瓜步六合當心腹之衝渚宫漢口據上逰之勢曲江鎮揚據其要津鐡馬價夫千羣萬隊攘袂扼腕唯所用之彼國兵士多少備見以寡御衆理在非敵救首救尾將何以及况復士無鬪心人懷二志身雖擐甲情在倒戈假使穰苴更生孫武猶在亦不能施其智略况異昔日者乎往者吕梁之師一舉殱滅淮南之地二旬悉平彼之將帥皆奔走之餘何可用也世疑衍公早涉戎旅備經征行安危之勢如近目前得喪之機若觀掌內以國家今日之盛僞主若猶可全為其展效容復可爾江東難立有識同知陳氏必亡賢愚共見天之所廢誰能興之既無所成徒自傾覆夫毒蛇螫手壯士斷腕豈不惜其肌骨所存者大也公若轉禍為福因機立功翻然奮飛共𢎞大業則江東士衆免於鋒刃之苦天下生民欣然太平之世公當位極台鼎福延子孫爰及宗族咸加榮寵豈與夫不識天命拒我王師舉死扶傷履涉膏血同年共日而語哉斯皆肝膈至言成敗大理幸非可惑宜早圖之隋檄陳尚書江揔等文南北雖殊風雲在望載懷虛遲窹寐為勞獻歲猶寒比當清豫匡贊乎國良亦勤寡人忝膺朝寄董律專征跋涉山川今次江際公等文儒自立器用適時冠蓋二世齒德兼重孔老殊教名墨異家金匱朱韜銀編玉策莫不騰於舌杪散在筆端邃古成敗之機近代安危之跡照同懸鏡明若觀火無待指南自應神悟猶恐思之未審差以毫釐聊煩翰墨略申梗槩自穹昊生民樹之司牧羲軒以降書契可紀咸一姓承立四海無兩帝漢道云季三方鼎立時惟板蕩世匪休明塗炭起而蜀亡典午興而吳滅永嘉喪亂紫宸曠主劉石符姚之儔僞夏僣燕之醜妄塵大寶事乖圖籙魏室乘時兆基朔野經始嵩洛未暇江湖有周受命敵非齊氏務在兼并不遑外略蕞爾吳越自相君長竊擬王者之儀妄談天子之氣偷安假息綿歷世祀我大隋之肇開寶祚光有神州皇帝感曜魄之靈應太微之座千年啓聖萬代一時深仁至德寧濟羣品越海窮河東漸西被旄頭之屬歷代之霸作我臣民匍匐服裳唯彼江表獨隔皇風夫物極則反否終斯泰郭璞有云年經三百天下大同兹實𤣥運已定於前聖主膺期而出欲以區區之陳國違上天之冥數其不可存者一也大必包小天地之常規明能通暗日月之常理論道德以唐陶而征有苖語衆寡舉海內而當羣小在長江舟楫之用矜其積習而山川共有我據上游鼓棹之能吳楚不異髙艫巨舫東西萬里扼喉撫背水陸千途彼之兵士不過十萬首尾分布所在危急加以屯戍邉方淹積歲序風雨以為櫛沐蟣虱生於甲胄望我寬仁恩倒戈㦸通在戎行更成敵國守以時月則魚爛土崩接以鋒刃則鳥驚鹿走理在必然不假枚卜此不可存者二也豐侯好酒實喪厥邦梁伯役民潰其宗社彼之僞主覆車是襲日夜沉湎曾無節度繕造宫室莫知窮已竭四民之産荒縱其心斂百姓之哀以為已樂寶衣玉食填積後宫短褐粗饘不充編户一芥之善蔑爾無聞五子之歌宛然悉備雖欲勿喪其可得乎此不可存者三也僞主忌能護短酷法淫刑骨鯁之臣盡見踈斥諌諍之士皆被屠害遐邇結舌衣冠解體人妖鬼怪觸類呈災稚齒耆年咸知殘滅此不可存者四也以此小邦攝於大國邉烽夜動照彼都城戍鼓晨嚴震其宫殿纍基十二方此未危懸縷千鈞比斯非切而莫知憂恐更自驕矜曽無事大之心專行犯上之志侵軼我邉鄙招納我叛亡國家爰自受命每從含飬敦以鄰睦申其聘好冀能守彼宗祊靜其疆域而長惡益甚縱毒彌深吳㑹雄稜之人湘郢耿介之士乞師請命盈庭滿闕帝乃憫然矜彼黎獻授鉞推轂弔民伐罪已有别詔唯廢僞主之身自餘士庶普從肆赦向所陳說咸是格言非曰游談共相欺誤且劉叔疑納譙周之計而獲存孫皓用薛瑩之詞而致福此二子者終有良臣之譽皆無陷君之譏何則所耻者小所存者大若憲章往彥聿遵前軌則為主享封侯之業祖禰延血食之期江東士民實受其賜公等身保榮貴名垂竹帛豈不美歟若膠柱不移守迷莫變率其蟻衆一作聚敢拒王師軍有常刑悔無及矣禍成俄頃宜早圖之使人今還遲有委曲言不盡意豈復多云楊廣白文苑英華卷六百四十五
