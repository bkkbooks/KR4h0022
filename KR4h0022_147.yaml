body:
  text: 文苑英華卷一百四十七宋李昉等編草木五幽蘭賦六首青苔賦二首瓦松賦二首幽蘭賦楊炯惟幽蘭之芳草稟天地之純精抱青紫之竒色挺龍虎之嘉名不起林而獨秀必固本而叢生爾乃丰茸十步綿連九畹莖受露而將低香從風而自逺當此之時叢蘭正滋美庭闈之孝子循南陔而采之楚襄王蘭臺之宫零落無叢漢武帝猗蘭之殿荒涼幾變聞昔日之芳菲恨今人之不見至若桃花水上佩蘭若而續魂竹箭山隂坐蘭亭而開宴江南則蘭澤為洲東海則蘭陵為縣隰有蘭兮蘭有枝贈逺别兮交新知氣如蘭兮長不改心若蘭兮終不移及夫東山月出西軒日晚受燕女於春闈降陳王於秋坂乃有送客金谷林塘坐曛鶴琴未罷龍劍將分蘭釭燭耀蘭麝氛氲舞袖迥雪歌聲遏雲度清夜之未艾酌蘭英以奉君若夫靈均放逐離羣散侣亂鄢郢之南都下瀟湘之北渚步遲遲而適越心鬱鬱而懷楚徒眷戀於君王斂精神於帝女汀洲兮極目芳菲兮襲豫思公子兮不言結芳蘭兮延佇借如君章有德通神感靈懸車舊館請一作親老山庭白露下而警鶴秋風髙而虬縈循一作登階除而下望見秋蘭之青青重曰若有人兮山之阿紉秋蘭兮嵗月多思握之兮猶未得空佩之兮欲如何抽琴命操為幽蘭之歌歌曰幽蘭生矣于彼朝陽含雨露之津潤吸日月之休光美人愁思兮採芙蓉於南浦公子忘憂兮樹萱草於北堂雖處幽林與窮谷不以無人而不芳趙元淑聞而歎曰昔聞蘭葉據龍圖復道蘭林引鳳雛鴻歸燕去紫莖歇露往霜來緑葉枯悲秋風之一敗與蒿草而為芻第二以逺芳襲人終古無絶為韻喬彛蘭之生矣不以無人而不芳被廣澤生回塘和寡調一作曲髙未儷郢中之曲神符夢叶終傳鄭國之香贈虛疑作靈修於南浦襲嘉慶於北堂於是芊眠茂逺靡迆秋坂紉而為佩騷人之意已深間以在襟一作谷楚客之情何逺薄秋風而一作則香盈十步泛皓露則花飛九畹豈一作寧衆草之敢陵幸移根之未晚若乃吳露清一作青山兮天氣新湘水碧兮楓岸春煙轉緑蕙波搖白蘋榮曲漵之初蓮遺天涯之美人離别經時歎孤芳於秀質艷陽可惜悵獨立於良辰復有映金砌羅玉户分竹宫疏蕙圃因風而起不隨彼茁之蓬擇地以生能殊有枤之杜宜其比同心於先哲冠美名於前古蘭之在幽兮其芳滿叢人一作士守業兮其道未通入提携固在於髙賞播酷烈當跋一作柞於下風寧使凋急景於散地迫嚴凝於嵗終况復光隂慘烈氷霰凄切靜而處順不得近於階墀長未當門獨遣冒於霜雪艷歇紅時莖萎紫折懼鶗鴂之先鳴掩氛氲而頓絶於戲蘭與艾兮異味薰與蕕兮殊途一室之人雖當執我之契十年之臭尚可攘公之羭囂然此道何有何無嗟乎蘭無薰兮搴擷之所不及士無文兮聲華之所不立倘一借於韶光庶餘香之可襲第三同前韻陳有章翹翹嘉卉獨成國香在深林以挺秀向無人而見芳幽之可居達一作逺萌芽於隂壑時不可失吐芬香於春陽所以紫翹十步名轉九畹自下并髙結根聳幹布葉逾密重陽一作隂未晚開緗蘂而作合一作乍合擢丹頴而何逺好遵正直生匪臨於斜徑不向嶮巇質寧被於長坂獨茂幽壑厭若疑錯薪幾霑雨露猶苦風塵采掇兮有日芳菲兮度春得臨刈楚之地曷異修詞之人燕妃夢中榮何名而不遂蜀琴曲裏奏何聲而不新况衆英聚集傳香氣而相襲佳色蔥蘢帶煙翠而攢叢一作無窮固己歎夫貞潔期見賞於始終幽處斯久照臨忽通喜會無私之日深繄有力之風幽莫過一作幽於芳蘭誠匪同諸草莽充佩而靈均不棄入握而仙都必取詎比夫山上蘼蕪泥中蘅杜將虛名以共播竟無善而足數焉知夫光善才於左思能成賦於師古而已哉知我者謂我如碩儒不知我者謂我如生芻此幽人之未已亦何代而云無幸逢昭代得遇良哲雖偕薰蕕固有分别勿以卉賤不顧幽芬勿以論一作地寒不軫孤絶倘折英而入用庶有光於優劣者也第四同前韻韓伯庸陽和布氣兮動植齊光惟彼幽蘭兮偏含國香吐秀喬林之下盤根衆草之旁雖無人而見賞且得地而含芳於是嫩葉旁開浮香外襲既生成而有分何掇採之莫及入握稱美未遭時主之恩納佩為華空載騷人之什光隂向晚嵗月將終芬芳十步之內繁華九畹之中亂羣峰兮上下雜百卉兮橫叢况荏苒於光隂將衰敗於秋風文子曰叢蘭欲發秋風敗之正用此事一作風月恐非豈不處地稍幽受氣仍别蕭艾之新苖漸長桃李之舊蹊將絶空牽戲蝶拂花蘂之翩翾未遇來人尋芳春而採折既生幽徑且任榮枯羃輕煙而蔥翠帶淑氣而紛敷冀雨露之漙一作沾及何見知之久無及夫日往月來時占嵗覩遇達人之回盼披荒榛而見取橫琴寫操夫子傳之而至今入夢為徴燕姞聞之於前古生雖失處用乃有因枝條賴一作嫩而既麗光色發而猶新雖見一有亂字辭於下土幸因遇於仁人則知夫生理未衰採掇何晚幽名得而不朽佳氣流而自逺既徴之而見寄願移根於上苑第五同前韻仲子陵蘭惟國香生彼幽荒貞正內積芬華外揚和氣所資不擇地而長一作育精一作清英自得不因人而芳况乃崖一作徑非斷坂折蹊分石裂山有木而轉深徑無人而自絶柔條獨秀芳心一作氣潛結翡翠戲而相鮮蘼蕪生而共恱然後衆草之中迥為一叢卑以自牧和而不同揚翹布葉舒翠錯紅霄承結露曉泛光風傾於陽希所照無隱託其地知其道有終且求之昔人徴以邃古宛成章於楚客爰命操於尼父佩之衆匪蘭不紉曲之多匪蘭奚鼓夫以薰蕕之喻臭味斯殊同之則十年猶有異之則一日而無乃清以為露滋而為畹比德者以之守真贈離者以之傷逺宜其出幽谷之濵為階除之珍羅堂未晚被徑知春依瑶池而自庇與玉樹之為鄰杜若芳芷香辛白蘋俱受生於大塊獨取象於同人是故蘭也之采伊人所急篇章間起比興俱入道之廢可鋤而去道之興可俯而拾為君灑微芳於素襟希見寶於重襲第六同前韻李公進幽有寂兮蘭有香香者取其服媚寂者契其韜光是以緑葉紫莖偶貞士而必佩深林絶壑挺竒質而獨芳觀其異彩特秀結根自逺靡生於門寧滋於畹朝陽照而雜花不得間其榮光風轉兮衆草無以齊其偃杳杳深處芬芬絶倫保貞操以擅美發英華以藻春葉凝露以珠綴花含煙而色新移於支也一作移之也則斷金之利樹之庭一無此字也則如玉之珍豈比夫協夢呈祥表嘉名於鄭國循陔見采流雅詠於詩人而已哉蘭之幽兮可折幽無人兮芳不絶蘭之生兮美自豐生得地兮美無終故雖敗於涼飈諒有嘉於前古方比契於松筠詎齊名於蘅杜且夫麗白雪之綺靡被長坂之芬敷激餘一無此字芳以孤映極幽致而自一無此字殊則在握者何居擇者何無蘭處幽而轉芳芳無逺而不襲賢尚晦而必著著何道而不入一作立伊哲人之素履盍徴蘭以自執苟馨香之發聞越江山而採拾青苔賦并序王勃吾之旅逰數月矣憩乎荒澗覩青苔焉緣崖而上乃喟然而歎曰嗟乎苔之生於林塘也為幽客之賞苔之生於軒庭也為居人之怨斯擇地而處無纍於物也愛憎從而生遂作賦曰若夫桂洲含潤松崖祕液繞江曲之寒沙抱巖幽之古石泛回塘而積翠縈修樹而凝碧契山客之寄情諧野人之妙適及其瑶房有寂瓊室無光菲微君子之砌蔓延君侯之堂引浮青而泛露散輕緑而承霜起金鈿之舊感驚玉筯之新行若夫弱質綿羃纎滋布濩措形不用之境託迹無人之路望夷險而齊歸在髙深而委遇惟愛憎之未染何悲歡之詭赴宜其背陽就隂違喧處靜不根不葉無迹一作華無影耻桃李之暫芳笑蘭桂之非永故順時而不競每乘幽而自整第二揚炯粵若稽古聖皇重暉月光開博望之苑闢思賢之堂華館三襲雕軒四下地則經省而書坊人則後車而先馬相彼草木兮或有足言者吁嗟青苔今可得而聞也借如靈山偃蹇巨壁崔嵬畫千峰而錦照圖萬壑集作壁而霞開王孫逰兮山之隈披薜荔兮踐莓苔悵容與兮徘徊一去千年兮時不復來至若圓潭寫鏡方流聚玉苔何水而不清水何苔而不緑漁夫逰兮漢川曲歌滄浪兮濯吾足桂舟橫兮蘭枻觸浦溆邅回兮心斷續别有崇臺廣厦粉壁椒塗梁木蘭兮椽玳瑁草離合兮樹珊瑚白露下蒼苔蕪暗瑶砌澀瓊鋪有美人兮向隅應門閉兮踟蹰心震蕩兮意不愈顔如玉兮泪如珠請循其夲也見商羊兮鼓舞召風伯兮電赴占顧兔兮離畢星雷闐闐兮雨冥冥浩兮蕩兮見潢汙之滿庭倐兮忽兮視苔蘚之青青爾其為狀也羃䍥綿密浸淫布濩彬駮兮長廊夤緣兮古樹肅兮若逺山之松柏泛兮若平郊之煙霧春淡蕩兮景物華承芳卉兮藉落花嵗峥嶸兮日云暮迫寒霜兮犯危露觸類而長其生也蕃莫不文階兮鏤瓦碧地兮青垣别生兮類西京南越則烏韭兮緑錢金苔兮石髮苔之為物也賤苔之為德也深夫其為讓也每違燥而居濕其為謙也常背陽而即隂重扄祕宇兮不以為顯幽山窮水兮不以為沉有達人卷舒之意君子行藏之心唯天地之大德匪豫情之所任瓦松賦并序崔融崇文館瓦松者産於屋霤之上千株萬莖開花吐葉髙不及尺下才如寸不載於仙經靡題於藥録謂之為木也訪山客而未詳謂之為草也驗農皇而罕記豈不以在人無用在物無成乎俗以其形似松生必依瓦故曰瓦松楊炯謂余曰此中草木咸可為賦其詞曰賔館兮沉沉明月髙兮重海深試一望兮上棟下宇開陽闔隂彼美嘉族依於夏屋煌煌特秀狀金枝兮産霤歷歷空懸若星榆而種天苯䔿丰茸青冥芊眠葩條郁育根柢連拳間青苔而裛露陵碧瓦而含煙春風搖兮鬱起冬雪糅兮蒼然詎充採掇罕任雕鐫桐君莫賞梓匠難甄用匪適於時要必濫聞於俗傳慙魏宫之烏韭恧漢宮之紅蓮觀其衆開榮列虛心獨潔髙寧我慕無木禾之五尋卑以自安類石蒲之九節進不必媚居不求利芳不為人生不因地其質也菲無忝於天樂一作然其隂也薄才足以自庇望之常見其表尋之罔得其祕肅穆承華堂皇不賖繩懸麥穗户刻菱花竹篬筤而衆色樹連理而相加芙蓉發池兮照爛日及木槿花也懸霤兮紛葩彼懷寶以遇賞此不材而見嗟雖有慕於階闥亦無混於泥沙已矣哉不學懸蘿附柏直蓬倚麻固將含美惡以同貫齊是非於一家亂曰少陽之地兮於何不春博望之苑兮莫匪正人纎根弱植兮生君之館荷施霑恩兮為人所玩物不謝生不知其榮唯願聖皇千萬夀但知傾葉向時明第二式觀圖籍幽山窮野聞卉木之名焉考神農之嘗者根莖可驗洪纎不捨惟瓦松兮闕書何昔人兮智寡原其所託髙而又雅抽形先寄於鶴樓聳質更資於鴛瓦旖旎分葩含風接霞既當春而吐葉亦凌秋而點花異山苖之極秀狀澗松兮抽芽髙居壤霤匪雜泥沙向朝陽兮發榮經夕露兮增華常在危簷心必一作抱直詎欲牽風影暫斜小大殊品髙卑異盼離離兮若星榆之昭灼爛爛兮疑石蒲之蔥蒨既乏棟梁之用寧怯鐫雕之變豈比夫桂山上蘭谷一作石中長幽隱兮銷馥為芬菲兮敗叢奚若兹物之獨茂無憂患兮養蒙文苑英華卷一百四十七
