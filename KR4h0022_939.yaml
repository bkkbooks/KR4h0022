body:
  text: 文苑英華卷九百四十宋李昉等編職官二右庶子元府君懷景墓志一首太僕卿王府君墓志一首太子少傅李皓墓志一首太子舍人王無競墓志一首太子少師崔景晊墓志一首右集作左庶子贈幽州都督元府君墓志銘張說維開元十年正月乙未右庶子武陵公河南元公薨於東京留守之內館公諱懷景集作懷字某魏武陵王雄之曽孫右衛大將軍胄之孫贈麟集作鄰州刺史仁惠之季子昔天啓水行君臨寰海雄圖長發本枝碩茂濟美象賢流慶不滅集作餘慶不殞公受兹介祉誕膺淑靈幼有純至之節長立公直之操學綜羣藝詞擅精微夫其結言以信導物以德清儉足以軌俗貞厲足以矯邪故美暢於中名揚於外弱齡集作冠以國子進士高第補相王府典籖藩邸擇賢妙盡時選尋以內憂去職重補相王府參軍及明兩升儲作貞萬國以宫臣除太子通事舍人後歷官至右司員外太子舍人比無此十二字天授中以親纍除名向逾一紀後除直羅溫縣二令雖大位未享通林必大集作乂初自太府主簿纍入副卿河南椽曹克升亞尹握蘭右轄綱紀南宫秉兹憲簡肅彼專席再侍儲華卒踐宫相公執心好直履法斷恩觸雷霆而除惡不避也枉絲髮而干譽不為也升降兩度出入三代克慎其始終厥有成君子以為難允作其難矣及啓手歸全遺言薄葬家無長物士伏其清年過懸輿人傷其夭嗚呼哀哉制贈都督幽州諸軍事幽州刺史􅉠悼之節優於恆數明年二月歸葬于咸陽之舊塋夫人韋氏祔焉禮也夫人即逍遙公敬逺之𤣥孫左常侍希仲之叔娣集作婦淑行無徵華年早世其孤彥冲等克遵遺訓靡所置哀說情睦外姻懷深國士既闕西階之奠逺投東武之詞銘曰卓彼英運慶靈既長貽訓夫子體微知章在藝斯博於欲則少徒文其中莫飭其表惟靜惟默不激不矯時經三代官成兩宫化若風偃德如澤融邦稱其直朝表其忠禮祔周兆墳瞻漢宮哀哀純孝長訴昊穹太僕卿上柱國華容縣男王府君墓志銘張九齡公諱某字某琅琊臨沂人蓋王氏所由逺矣然其自漢至今上下千載海沂為頌始壯厥猷淮水作禎克昌其後繼跡台衮聨華牧伯君子韙其立言史官襄其行事則已不無違德人以嘉聞圖牒粲然宜為冠族乃祖某梁侍中尚書左右僕射安東亭侯髙祖某陳度支尚書曽祖太子中書舍人祖某皇朝吏部郎贈潤州刺史父某官至洪州都督公踐修軌集作範業雅有名器性開敏而達於從事才果斷而長於御下至於學以知古義以隨時虛已存誠離經合道異焉而不傷於物同焉而不害於正咸自得之務其大者儀鳳中初以門子選為孝敬皇帝挽郎解巾相王府參軍換豫王府參軍歷太子通事舍人蒲州司法參軍丁洪州府君憂去職喪踰於戚行過於禮時其在疚哀能感鄰服闕授相州鄴縣令施於政也揮干鏌之鋒截無不斷展騏騮之足行無不至以故言出有孚豈止於百里教行無類俄浹於四封邑人是宜輿頌乃作御史中丞張仁願表公尤異帝用嘉焉遷洛州陸渾縣令加朝散大夫寵其能也再有仲由之善益聞考父之恭薄理我畿有加於鄴識者觀政許其以後圖時輩推賢多驗之於晚節稍遷蒲州司馬洛州長史蒲州長史三為郡佐一以貫之執心有恆厥聲以茂雖杞祗之體素顧和之理識異代同官齊名比義固無愧也俄遷隨州刺史趙簡始大列於諸侯張敞有名擢為刺史賢明獨斷政教𢎞宣始為集作于漢東之美繼以巴中之異郡歷數四課常第一再遷集作領遂綿二州刺史先是俗苦刓集作多梗弊人盡流庸公亦來思撫之如子彼得攸塈歸之如市行有餘力用不盡才驟遷大都督乃拜相州刺史先是景雲嵗我唐雖舊儀制惟新置連帥之官贈監督之秩於是歷選列辟專謀用賢且有後命而公為稱首遂作越州都督同京官正三品連帥統察杭婺衢睦溫括集作撫非台閩八州長史集作吏已上率由部案事雖竟寢議者終榮仍守越州都督加銀青光祿大夫公素有行業集作盛名兼之寵數聞望而草風必偃至止而蓬麻自直與夫任賢坐嘯勞心行部彼有因而致此我無為而已然政之行焉若有神者徵拜雍州司馬頃之又正名為京兆少尹京兆者本公之樂土君已重世買臣還郡無矜於出牧張既本州是榮於衣繡公雖作二我亦為光開元二年始封華容縣男昭有德也其明年有制以公檢校太僕卿訓以六騶正于羣疑僕日加數馬之慎嵗有展軨之勤無何即真可謂貴矣然公思報所受逾勵所行神明未衰志業不究春秋六十有一開元六年秋八月乙亥寢疾薨於洛陽之陶化里第嗚呼哀哉朝廷傷焉賻贈以禮夫人范陽盧氏不享偕老先時在殯其年冬十一月乙酉合葬于偃師之某原却倚首陽前瞻洛汭豈伊瑕丘之樂並取邢山之兆有子曰昊次曰旻泣血苫塊哀纒於逺日勒銘金石義協於當時假以斯文為之實録其詞曰有周之裔居海之沂緒業惟永德音罔違貽厥翼謀俾其翰飛宜哉世祀亦曰家肥其一洎我華容而今濟美四科冉季九能曽集作魯非史學匪為人義如在巳施於有政轡之柔矣其二雉馴宰邑鷹揚佐郡五為刺史在邦必訓再踐太僕厥庸乃奮今也則亡天不可問其三神期永年禮先逺日合如防墓開比滕室鶴弔人悲龜言地吉篆石泉户與山相畢其四太子少傅李公墓志銘孫逖唐之宗盟有若武都公者諱皓凉武昭王亦名皓天寶間方追崇字某太原景王之穆也淮安靖王之𦙍也姓族本系存乎帝籍王之子曰虢州刺史諱某虢州之子曰鄭州生公世載明德實維邦翰昔我高祖之造區夏也則淮安王擐甲胄誅暴强以佐經綸之業洎我皇帝之垂衣裳也則武都公秉衡石傳儲二以𢎞雍熙之化允武允文同心同德本枝百世不亦宜哉公應大賢之期含正氣之秀弱而孤藐克自激揚六射五書包禮樂之羣藝九流三變探古今之至賾生八年而當天授革命之事宗室懼禍至乃不全艱貞保身以免於難久視之後密網少寬公以太夫人在堂無底祿之養願辱身以報德豈養高而循名解褐授荊州枝江縣丞維此之故也蒍賈尚幼薛宣有能深為州牧張漢陽所器重嘗謂所親曰唐宗一日二字一作室千里吾見其人國未可量也神龍興復拜通事舍人其後歷尚書工部司勳員外屯田郎中太僕衛尉太常三少卿汝汴二州刺史兵部黃門二侍郎太原尹太常卿工部尚書東都留守兵部吏部尚書太子少傅自枝江至於少傅凡十有九遷人臣寵秩備更之矣先是國朝舊制不以宗親任權開元以來內舉無避唯善所親擢拜右職公為首也公體正心直色莊言麗明而可畏寬而能服故所蒞之職必姦邪衰止禮義興行國人宜之有由然也曩􅈾列宿逮亞象河當官而行既立名跡及夫典汝墳之國為夏卿之二天下歸最朝廷讓能寵光大來公望首出矣黃門君之樞也公執事舉直以替其否太原邦之扞也公滅私寬賦克壯其猷六官之長是為人樞三命益恭遂掌邦理綜核流品終始七年凡所作法皆成故事其賞能拔異置彼周行者可勝既乎上難其人公是以久而深煩職事纍請歸閒留侯有疾猶傅太子尼父不憗終萎哲人以開元二十八年五月十日薨于位春秋五十有八夀不配德皇慈震悼追贈益州大都督親親尊賢焉禮也其年十二月七日葬於河南縣九嶺山之南原惟公以文學政事之才贍祗庸孝友之德揚親有立身之顯何止能養執喪有過人之戚匪惟率禮公兄曰升弟曰暈兄愛弟敬夫和妻柔閨門之間內外以正均養猶子不殊所生豈引而進之乃因心則至公為居守也暈寢疾私第沉痼彌年公損膳絶葷消形瘁色及病革之際冒禁而歸終以為職守管籥不敢久留次長號撫櫬雨泣還臺至性傷人酸感行路升之喪公也哀亦如之死喪孔懷其在是矣所謂曽閔王生九宗之地邢茅為萬石之門蓋本乎國風而為世範者嗣子造等八人無改於道聿修厥德永為罔極靡所置懷以逖嘗忝使臣之戒且為冡卿屬久承話言猥託銘志文仲事君之教何曰一作日敢忘鮑叔知我之恩曷其能報徒竭心於所事終有恨於斯文其詞曰高陽之族才子克生禮樂為憲親賢是程六官尤重祈父天卿二柄皆執理均政平汲直多病留侯强起尚傳重明俄驚閲水泣盡遺愛感深知已銘德下泉庶通神理太子舍人王公墓志銘公諱無競字仲烈其先琅琊人也因官遂居東萊自宋太尉𢎞至棣州司馬侃十一世世濟其美不隕其名公即棣州府君之次子也克廣前烈於昭令聞翩翻海瀕焜耀京國夫乂用三德正直居首子有四教文行為先公蔚其文高其行據於直歸於正生而知之實稟其性弱冠以應制擢第解褐授趙州欒城縣尉歷麟臺正字轉右衛倉曹洛陽縣尉監察御史殿中侍御史太子舍人神龍初坐以嘗詆權幸貶於嶺外終於廣州春秋五十四工文則學必從之故登麟臺侍龍樓也好直則威必濟之故吏京邑秉天憲也行高則衆必庇之故陷非罪謫殊方也噫良工能為順君子能為道而不能為容士師黜宣尼困屈原逐賈生憤公其近之矣初天册中公與故人魏州牧獨孤莊書忿林胡之猖狂哀冀北之阢陧誡以軍志示之死所客有薦其書者則天見而異之有制召見驟膺寵渥相如之賦感人主未云速也乃者恩澤侯張昌宗位極太官寵震羣后公著書東觀與之聨事曽是貽籍未嘗昵就色莊見憚象恭益深長孺之抗禮將軍曷足議也公嘗執簡中禁司察位班時三事大夫有族談錯立者公進而言曰朝有著定所以道威儀邦之具瞻所以昭軌物不遵不恭不敬不從其可是耶則肅然就列次矣公之舉劾大臣庸可異也嗚呼人各有能且猶不朽公則具舉其誰與京公生於齊長於魏不忘吾黨常操土風嗣子某䖍卜逺日奉成先志以開元十六年某月某日徙殯於館陶歸葬於東萊之舊塋書順也夫人范陽盧氏祔焉從周也窀穸之事可無記乎詞曰萬靈秀百夫特萬卷精多才克詩可興筆餘力人之望邦之直何不仁俾大棘厄炎厲哀明德卜佳城于舊國銘景行永無極太子少師崔公墓志銘李華聖唐祖宗重光丕變萬國𤣥宗肅宗今上三后繼明格于上下其輔弼之臣曰趙公奉先少師之訓有大功於王室少師諱璟眰字某清河東武城人也惟成於姜水氏曰有吕德莫厚乎粒蒸民大庭之烈也勳莫盛乎除暴虎尚父之明也讓莫大乎推社稷季子之高也丁公之元子曰季克讓乞歸老於崔氏宜乎其盛也八代祖元孫宋度支郎中以忠順烈見危致命夫人擕二子亮敬默依夫人之黨挺志羈孤之中安親危窘之際亮即公七代祖也八為尚書一為僕射孫肇官至中書侍郎元子北齊安州惣管府掾諱道淹公之曽祖也生萬年主簿臨洺令諱方騫公之大父也生武功主簿贈吏部尚書諱貞固公之考也郎中省王侍僕射利主公中書之名望安州之道德臨洺之愛人武功之體道荀淑之盛德及子陳實以素風及孫誠哉吾聞其語矣今見其人也公孫抱太夫人終童幼武功府君逝根於至性毁過乎哀鄉黨憐之皆曰純孝既除喪外從禮訓內積憂慕啜菽飲水厲志讀書誦無遺文釋無遁義皆一覽也年十七與親兄䀵同舉明經調補梁州南鄭尉轉蜀州晉原尉前後使臣表公第一遷大理評事親纍貶利州葭葫丞歷梓州鹽亭丞樂天知命貞獨自晦君子哉改晉州司法參軍政尤一道刺史按察使皆以上聞充河東支使畢尚書搆為連帥也假公判官仁者悅不仁者懼遘厲終於官舍春秋四十權厝於山邙𤣥元廟西北原識與不識罔不相弔時人之安放後人之不幸榮陽夫人鄭氏皇朝兵部郎中衛州長史𤣥升之女吏部侍郎平章事愔之妹終京兆崇賢里權殯於長安東南杜陵原夫人鞙佩紛燧禮記內則婦事舅姑佩紛帨金燧以寧顔色澄幕酒以奉蒸嘗輔佐君子黔婁之室也撫導賢𦙍孟軻之母也內訓傾謝婦儀無師嗚呼哀哉大歷四年龜筮從吉嗣子圖尚書右僕射趙國公哀奉先少師夫人之裳帷合祔於河南北邙山某原禮也趙公初為益州刺史屬逆羯內向天下兵起至尊出長安避狄未有岐下之都因奉表上迎保寧聖德遷為中書令翼大明復天下肅宗申養𤣥宗申慈趙公之宣力也事今上鎮揚州為吏部尚書左僕射崔氏之門公盡善哉洪河在北清洛在南二室之下邙原高起是地也是宜君子幽宅寧於斯永保子孫昌於斯其文曰翼翼孝嗣䘖哀不言祗感永斯常試討論齊為霸國鄭甸姬姜協德貽慶後昆在昔貞烈爰有魏嶼播遷建都公將南轅造舟人便開漕利源宜有令𦙍中書玊振安州榮道臨洺體順尚書葆光公以德鎮既輸典刑亦清維晉天不我遺時將疇師夫人之德柔善有則鼓鐘于宫聞于四國從夫訓子天下是式不及劬勞趙公罔極克誕趙公蓼莪孝思奉若先訓其貴如此今日之祿先人之慈保寧幽宅天地無期此是宰相崔圖之父贈太子少師元誤入宰相門今移於此文苑英華卷九百四十
