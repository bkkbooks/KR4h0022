body:
  text: 文苑英華巻三百十五宋李昉等編居處五亭七十三首亂後經呉郵亭庾肩吾郵亭一回望風塵千里昏青袍異春草白馬即呉門獯戎鯁類聚作鞭伊洛雜種亂軒轅輦道通闗塞王城似太原休明鼎尚重秉禮國猶存殷牖爻雖賾堯城吏轉尊泣血悲東走横戈念北奔方憑七廟畧誓雪五陵寃人事今如此天道共誰論登百花亭懷荆楚梁元帝極目纔千里何由望楚津落花灑行路垂楊拂砌塵柳絮飄春雪荷珠漾水銀試酌新清酒遥勸陽臺人以下三篇並見江州石本奉和登百花亭懷荆楚朱超道亭亭登望極春心逺近同莫恨荆臺隠雲行不礙空柳色浮新翠蘭心帶淺紅若因鵬舉便重上龍門中追和登百花亭懷荆楚隂鏗江陵一柱觀潯陽千里潮風煙望似接川路恨成遥落花輕未下飛石本作浮絲斷亦飄藤長還依格石本作格嶺荷生不避橋陽臺可憶處惟有暮將朝臨水亭閭邱均髙舘基曾山微羃生花草傍對野村樹下臨車馬道清明悟心術幽遐備瞻討回含峯隠雲聮綿渚縈􅀈氣似滄洲勝風為青春好相及盛年時無令歎衰老山庭夜宴王勃桂宇幽襟積松臺良夜永森沉野徑寒肅穆巖扉靜竹晦南河色集作汀色荷翻北潭影清興殊未歸林端照初景宿晉安亭盧照隣聞有絃歌地穿鑿本多奇遊人試一覽臨翫果忘疲忩横暮捲葉簷卧古生枝舊石開紅蘚新荷覆緑池孤猿稍斷絶宿鳥復參差汎艷月華曉徘徊星鬢垂今日刪書客悽遑君詎知同王員外雨後登開元寺南樓因詶暉上人獨坐山亭有贈陳子昻鍾梵經行罷香林坐入禪巖庭交雜樹石瀬寫鳴泉水月心方寂雲霞思獨𤣥寜知人代裏疲病苦攀縁王屋山第之側雜構小亭暇日與羣公同賞李嶠桂亭依絶巘蘭榭俯回溪綺棟魚鱗出雕甍鳳羽栖引泉聊漲沼鑿磴且通溪席上山花落簷前野樹低弋林開曙景釣渚發晴霓狎水驚梁鴈臨風聽楚鷄復㸔題柳葉彌喜蒼桐圭從驩州廨宅移住山中集作間水亭贈蘓使君沈佺期遇坎即乗流因到極南州集作西南到火州鬼闗應苦夜瘴浦不宜秋嵗貸胷穿老霄集作朝飛鼻斂頭死生離骨肉榮辱間朋遊棄置一身在平生萬事休鷹鸇遭誤逐豺武怯真投憶昨京華子傷今邉地囚願陪鸚鵡樂希並鷓鴣留日月倫鄉思煙花换客愁幸逢蘓伯玉回借水亭幽山栢歌集作張青葢江樵巻緑油乗閒無火宅因放有虛集作漁舟適越心當是居夷迹可求古來堯禪舜何必罪驩兠旅宿淮陽亭口號張九齡日暮荒亭上悠悠旅思多故鄉臨桂水今夜眇星河暗草霜華發空亭鴈影過興來誰與晤勞者自為歌與王六履震廣州津亭曉望張九齡明發臨前渚寒來靜逺空水紋天上碧日氣海邉紅景物空集作紛為異人情頼此同乗桴自有適非欲破長風林亭作集作詠前人穿築非求麗幽閒欲寄情寓懷因壤石真意在蓬瀛苔益山文古池添竹氣清從兹果蕭散無事亦無營立秋日題安昌雜詠作日宴寺北山亭孫逖樓峴倚長霄登攀及霽朝髙如石門頂勝擬赤城標天路雲虹近人寰氣象遥山清雜詠作圍伯禹廟江落伍胥潮徂暑迎秋薄凉風是日飄果林餘苦李萍水覆甘蕉覽古嗟夷漫陵空愛寂集作泬寥更聞金刹下鍾梵晩蕭蕭望春亭觀禊飲應制見一百七十二巻王維與盧員外象過崔處士興宗林亭前人緑樹垂隂葢四隣青苔日厚自無塵科頭箕踞長林下集作松下白眼㸔他世上人集作㸔君是甚人和宋大使北樓新亭孟浩然返耕意未遂日夕登城隅誰道山林近坐為符竹拘麗譙非改作軒檻是新圖逺水自嶓冡長雲吞具區願隨江燕賀羞逐府寮趨欲識狂歌者集作客丘園一竪儒晩春題詠一作逺上人南亭前人給園支遁隠虛寂養身和春晩羣木秀闗闗一作間黄鳥歌林栖居士竹池養右軍鵝炎月北忩下清風期再過秋登張明府海亭前人海亭秋日望委曲見江山染翰卧題壁傾壺一破顔歌逢彭澤令歸賞故園間余亦將琴史棲遲共取閒梅道士水亭前人傲吏非凢吏名流即道流隠居不可見髙論莫能州酉水接仙源近山藏鬼谷幽再來迷處所花下問漁舟夏夕南亭懷辛夫前人山光忽西發集作落池月漸東上散髮乗夕凉開軒卧閒敞荷風送香氣竹露滴清響欲取鳴琴彈恨無知音賞感此懷古人集作故人中宵勞夣想鄭郎中山亭崔翹篆筆飛章暇園亭染翰遊地奇人境别事逺俗塵收書閣山雲起琴齋澗月留泉清鱗影見樹宻鳥聲幽杜馥重梅雨荷香送麥秋無勞置驛騎文酒暗相求晩至香亭鄭徳元長亭日已暮駐馬暫盤桓山川香不極徒侣黙相㸔雲夕荆臺暗風秋郢路寒客心一如此誰復採芳蘭登牛頭山亭子杜甫路出雙林外亭窺萬井中江城孤照日集作春山谷逺含風兵革身將老闗河信不通猶殘數行淚忍對百花叢暮春陪李尚書李中丞過鄭監湖亭泛舟前人海内文章伯湖邊意緒多玉罇移晩興桂檝帶酣歌春日繁魚鳥江天足芰荷鄭莊賔客地衰白逺來過客亭前人秋忩猶曙色落木更髙風集作木落更髙風日出寒山外江流宿霧中聖朝無棄物老病已成集作衰翁多少殘生事飄零似轉蓬遊謝氏山亭李白淪老卧江海再嘆天地清病寒集作閒久寂寞嵗物徒芬榮借君西池遊聊以散我情掃雲集作雪松下去捫蘿道邉集作石道行謝公池塘上春風集作草颯已生花枝拂人來山鳥向我鳴田家有美酒落日與之傾醉後弄歸月遥欣稚子迎宣城九日聞崔侍御與宇文太守遊敬亭余時登響山不同此賞醉後寄崔侍御二首前人九日茱萸熟挿鬢傷早白登髙望山海滿目悲古昔逺訪投沙人因為逃名集作名山客故交竟誰在獨有崔亭伯重陽不相知載酒任所適手持一把集作枝菊談集作調笑二千石日暮岸幘歸傳呼隘集作溢阡陌彤襜雙白鹿賔從何輝赫夫子在其間遂成雲霄隔良辰與美景兩地方虛擲晩從南峯歸蘿月下水壁却登郡樓望松色寒轉碧望美集作咫尺不可親棄我如遺舄二九卿天上客五馬道傍來列㦸朱門曉褰帷碧幛開登髙望逺海召客得英才紫綬歡情洽黄花逸興催山從集作依圖上見溪即集作向鏡中回遥羨重陽作應過戱馬臺題金陵王處士水亭此亭葢齊朝南苑又是陸僟故宅前人王子耽𤣥言賢豪多在門好鵝尋道士愛竹嘯名園樹色秀荒苑池光蕩華軒北堂見明月更憶陸平原掃拭青玉簟為余署金罇醉後欲歸去花枝宿鳥喧何時復來此更集作再得洗囂煩陪旅父當塗宰遊化城寺昇公清風亭前人化城如集作若化出金榜天宫開疑是海上雲飛空結樓臺昇公湖山秀粲然有辨才濟人不利已立俗無嫌猜了見水中月青蓮出塵埃閒居清風亭左右清風來當署隂廣殿太陽為徘徊茗酌待幽客珍盤薦彫梅飛文何灑落萬象為之推季父擁鳴琴徳聲布雲雷雖遊道林室亦舉陶潛盃清樂動諸天長松自吟哀留勸若可盡刼石乃成灰題韓少府水亭祖詠梅福幽棲處佳期不可集作志還鳥吟當户竹花遶傍池山水氣侵堦冷藤隂覆坐閑寜知武陵趣宛在市朝間晩泊金陵水亭前人江亭當廢國秋景陪蕭騷夕照明殘疊寒潮漲古濠就田㸔鶴大隔水見僧髙無限前朝事醒吟意覺勞陸渾水亭後巻作陸渾山莊即事晝眺伊川一作東山曲巖開霽色明淺沙平有路流水漫無聲浴鳥沿波聚潛鱗一作魚觸釣驚更尋一作憐春岸上一作緑幽意滿山楹一作幽興滿前楹此詩三百十九巻重出今已削去注異同為一作李上侍丹陽東去新亭記逰皇甫冉姑蘇東望海林間幾度裁書信未還常在府中持白簡豈知天半有青山人歸極浦寒流廣鴈下平蕪秋野閒舊日新亭更携手他鄉風景亦相闗酬疑忠公林亭包融江外有真隠寂居嵗已侵結廬近靣術種樹久成隂人跡乍及户車聲遥隔林自言解塵事咫尺能韜沉為道豈廬霍㑹靜由吾心方秋院水落仰望日蕭森持我興來趣采菊行相尋塵念到門盡逺情對君深一談入理窟再索破幽襟安得山中信致書移尚禽後漢逸民傳尚長字子平與北海禽慶字子夏二人相善夕次華隂北亭林琨清晨孤亭裏極目對前岑逺與水天合長霞生夕林蒼然平楚意杳靄半秋隂落日川上盡闗城雲外深方余事巖壑及此欲抽簮待就蓬山道還兹契宿心同蔡孚五亭詠徐皛帝疑奏中京罷雲泉别業歸拂塵鋪野席牽桞挂朝衣翡翠巢書幌鴛鴦立釣磯幽栖可憐處春事滿林扉潞府客亭寄鳳童王昌齡蕭條郡城閉旅館空寒煙秋月對悲客山鍾摇暮天新知偶相許斗酒情依然一宵阻良㑹清風徒滿川宴南亭錢起寒江眇村林亭上納鮮潔楚客共閒飲靜坐金管闋酣竟日入山暝來雲歸穴城樓空杳蕩猿鳴備疑清切物狀如絲綸道心為余决訪君東溪事早晩樵路濶題裴十六少卿東亭李嘉祐平津舊東閣深巷見南山巻箔風煙潤遮牎竹影閒傾茶兼落帽戀客不開闗斜照窺簾一作簷外川禽時往還過裴長官新亭錢起茅屋多新意芳林昨試移野人知石路戱鳥認花枝慢水縈蓬户閒雲挂竹籬到家集作來成一醉歸馬不能騎題蘇公林亭前人平津東閣在别是竹林期萬葉秋聲裏千家落照時門隨深巷靜忩過逺鍾遲客位苔生處依然又賦詩春遊南亭韋應物川明一作晴氣已變嵓寒雪集作谷寒雪尚擁南亭草心緑春塘泉脉動景煦聽琴響雨餘㸔柳重逍遥池舘華益愧專城寵和吳舍人早春歸沐西亭言志前人曉漏戒中禁清香肅朝衣一門雙掌誥伯仲侍言歸亭髙性情曠職宻交遊稀賦詩樂無事解帶偃南扉陽春美時澤旭霽望山暉幽禽響未轉東原緑猶微名雖列朝集作仙爵心已遺集作遣塵機即事同巖隠聖渥良難違題獨孤常州湖上林一作新亭劉長卿出樹倚朱欄吹鐃引上官老農持鍤拜時稼捲簾㸔水對登龍净山當建隼寒夕陽湖草動秋色渚田寛渤海人無事荆州客獨安謝公何足比來往石門難題于越亭集作負遣後登于越亭作前人天南愁望絶亭上桞條新落日獨歸鳥孤舟何處人生涯投嶺集作越徼世業陷邊塵集作胡塵江入千峯暮花連百越春集作杳杳鍾陵暮悠悠鄱水春秦臺隣集作悲白首楚水集作澤怨青蘋草色無集作迷征路鸎聲傍逐臣獨醒飜集作空取笑直道不容身得罪風霜苦全生天地仁青山數行淚滄海一窮鱗流落誰相識空將鷗鳥親集作牢落機心盡惟將鷗鳥親初貶南巴至鄱陽題李嘉祐江亭前人南出巴人徼長江萬里隨不才甘謫去流水亦何之地逺明君棄天髙酷吏欺青山獨往路芳草未歸時流落還相見悲歡話所思猜讒傷薏苡愁暮向江蘺淚盡㸔長劔心閑寄集作倚釣絲水雲初起重暮鳥逺來遲稚子能吳語新文怨楚詞憐君不得意客集作兩鬢老南枝越南中留集作題褚少府湖上林亭前人種田東郭傍春陂萬事一作緒無情把釣絲緑竹放侵行逕裏集作斷青山常對巻簾時紛紛花發集作落門空閉寂寂鸎啼日更遲從此别君千萬里白雲流水憶佳期此詩二百八十七巻重出已削去注異同為一作題沈道士新亭釋皎然何處好攀躋新亭俯舊溪坐中千里近簷下四山低小浦依林曲回塘遶郭西桃花春滿地歸路莫相迷冬日遥和盧使君㓜平綦母居士遊法華寺髙頂同登臨湖亭前人仁芳標絶境亷守躡髙蹤天見纔分刹風傳欲盡鍾城中歸路逺湖上碧山重水照千花界雲開七葉峯寒空艾綬滿晴翠白綸濃逸韻知難繼佳遊恨不逢仍聞撫禪石為我久從容春日陪顔使君真卿皇甫曾西亭重㑹韻海諸生前人為重南臺客朝朝㑹魯儒暄風衆木變清景片雲無峯翠飄簷下溪光照坐隅不將簮艾隔知與道情俱夏日集裴録事北亭避暑前人前林夏雨歇為我生凉風一室煩暑外衆山清景中忘歸親野水適性許雲鴻蕭散都曹吏還將静者同九日陪皇甫使君同泛江宴赤岸亭張雷覉旅逢佳節追遊雜詠作逍遥忽見招同傾菊花酒緩棹木蘭橈平楚堪愁思長江亦雜詠作去寂寥啼猿不離峽灘沸鎮如潮舉目闗山異傷心鄉國遥徒言歡滿座誰覺客魂銷西亭子言懐張謂數般芳草在堂隂幾處閒花暎竹林攀樹𤣥猿呼郡吏傍溪白鳥應家禽青山㸔景知髙下流水聞聲覺淺深官屬不令拘禮數時時緩歩一相尋長安竇明府後亭顧况君為長安令我美長安政五日一朝天南山對明鏡鳥飛青苔院水木相輝暎客至南雲鄉絲桐展歌詠吏人何蕭蕭終嵗無喧競欲識明府賢邑中多百姓秋題劉逸人林泉疑釋靈一凉飈亂黄葉遲客橘隂清蘿逕封行跡雲門閉野情零林秋露響穿竹暮煙輕莫戀幽棲地懐君疑作居或作安却敗名題王班水亭釋䕶國湖上見秋色曠然如爾懐豈惟歡隴畝兼亦外形骸待月歸山寺彈琴坐暝齋布衣閒自貴何用謁天階謫居漢陽白沙口阻水雨因題驛亭鄭常漢陽無近逺見說過汾一作湓城雲雨經春客江山幾日程終隨鷗鳥去秪待海潮生前路逢漁父多愁問姓名友人山亭殷遥故人從薄宦往往歩清溪鑿牖對山月褰裳掃澗霓遊魚逆水上宿烏向風栖一見桃花發能令秦漢迷獨孤常侍北亭張南史背洫敞髙明憑軒見野情朝回五馬跡更勝百花名海樹凝煙逺湖田見鶴清雲光侵素壁水影蕩閒楹俗頼褰帷謁人歡倒屣迎始能闕結構獨有謝宣城尋許山人亭子奚賈桃源若逺近漁子棹輕舟川路行難盡人家到漸幽山禽拂席起溪水入庭流君是何年隠如今成白頭秋夜同暢當宿潭山一作上西亭盧綸圓月出山頭七賢林下遊稍稍林葉墮艶艶月波流鳧鵠共思曉菰蒲相與秋明當此中别一為望汀洲題苖員外竹間亭前人髙甃絶行塵開簾似有春風傾竹上雪山對酒邉人歩煖先逢日書空逺見隣還同内齋暇登賞及諸姻春日灞亭同苖員外寄庾侍郎前人坐見春雲暮無因報所思川平人去逺日暖鴈飛遲對酒山長在㸔花鬢自衰誰堪登灞岸還作異鄉悲題河中亭見三百十六巻薛能撫州西亭見二百三十巻戴叔倫長沙一作亭送梁副端歸京前人奏書歸闕下祖帳出湘東滿座他鄉别何年此㑹同藉芳憐岸草聞笛怨江風旦暮乗流去心期在醉中題秦隠居麗句亭前人北人歸欲盡獨自住蕭山閉户不曾出詩名滿世間題邵端公林亭權徳輿春光何處足柱史有林塘鸎囀風初暖花開日欲長畎池通野集作舊水掃逕閱新芳更置盈罇酒時時醉楚狂洛陽河亭奉酬留守羣公追送李逸離亭餞落暉臘酒減征衣集作春嵗晩煙霞重川寒雲樹㣲戎裝千里至舊路十年歸還似汀洲鴈相逢又背飛新安江亭見二百九十三巻章八元登峴亭呈闕郎中司空曙一身放放向荆蠻平楚茫茫失路闗絶句詩選作峴山回首望秦闗南向荆州幾日還今日登臨惟有淚不知風景在何山文苑英華巻三百十五
