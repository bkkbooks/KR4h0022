body:
  text: 文苑英華巻七百七十九宋李昉等編雜頌靈泉頌一首唐平陽郡龍角山慶唐觀大聖祖𤣥元皇帝宫金籙齋頌一首開元正厯握乾符頌一首復練塘頌一首玉版𤣥記頌一首巴州化城縣新移文宣王廟頌一首畋獲虎頌一首靈泉頌并序駱賔王聞夫𤣥功幽賛靈心以有徳是先集作親至道冥符篤行以通神集作仁為本若乃天經地義色養叶於因心夏清冬温敬愛𢎞於庶集作錫類下及集作逮六幽之奥上通集作洞三光之精不有至誠孰云斯感有廣平宋思禮字過庭永州刺史昉之適孫户部員外郎順之長子伶集作㓜丁偏露集作罰早䘮慈母永懐鞠育之恩長增孺集作思慕之痛弱不好弄長而能賢趨庭聞詩禮之風承宗朂曾閔之行事後母徐氏至孝烝烝集作以至孝聞嘗恐集無此二字北向興悲泣髙堂而已暮集作咎已遂乃集無此二字南集作東逰下位覬㣲禄以逮躬集作親是調露二年来佐百里俯就㣲班之列將申返哺之情茍集作敬立身其若斯於從政乎何有集作逺雖屬時多集作嵗亢旱金石俱集作行銷環近川源殆將湮絶濬井皆為湯谷通波盡化汙池而太夫人在遲暮之年有温勞之疾非濫漿不可以適口非源泉不可以蠲疴膳集作色養既虧憂惶靡計集作訴俄而㕔階之側忽有清泉集有而字自生因䟽導其源遂流注不竭味甘若醴氣凛集作冷如氷此邑南控剡山北集作地連禹穴基址多石岡阜無津爰自興建以来曾㣲穿汲之利非精誠貫於至集作有道純孝集作志浹於無私集作和非孰能洽冥貺以通幽涌集作導泉源而致養者也昔漢臣忠烈窮井飛于一時集作言姜婦孝思潜波移於七里靖集作静惟陳迹夫集作彼亦何人前集作肅縣尉栁冕耿介之士也道合則金蘭若膠漆情隔集作異則軒冕猶埃塵片善可嘉朝聞甘於夕殞集作死一諾猶重黄金賤於白珪以爲執友素交豈禄利輕肥之謂也賞音逹禮非鍾鼓玉帛之云乎所耻者沒而無稱所貴者存乎不朽徒懐美志未遇良才集作材賓王出賛荒隅途經勝壤三秋客懐長恨宋玉之悲一靣交歡蹔雪桓譚之涕觀茲集作斯水之清泚感若人之精誠見賢思齊仰珪璋而有地揮毫頌羙鏤琬琰而無慙廼作頌曰粤若稽古厥初生人集作民人誰匪孝集作其誰不孝我獨踰集作難倫義不在集作存道人不遺親愛敬盡力孝悌通神顧思罔極集作顧我思極因心必集作咸至冥契動天甘泉湧地冷冷無竭烝烝不匱曾是不集作我思永錫爾類爰有猗人景行芳塵事諧則感道洽斯親情集作孝為禮主名是實賔倘斯文之不墜知盛徳之有鄰大唐平陽郡龍角山慶唐觀大聖祖𤣥元皇帝宫金籙齋頌并序崔元明空洞之中溟涬之際靈文尚矣混成朕焉混成者何象帝之先靈文者何龍漢之年五刼交周尊神遽遷九氣列正無始常然治於流火之亭練於洞陽之館二儀得之以定位三景得之以發光赤明開圗碧落普度𤣥元奄有大道遂荒真宗天法之以無倪皇仰之而未及羲軒應運堯舜乗時均至化而思齊酌𤣥風而始庶獨立千古湛兮若存首出百王悠兮不極矣粤若聖祖系襲神宗先天不違後天繼代鍚𦙍慶逺流𣲖祥長國家纂戎欽承前烈三合一徳六葉同道平陽郡𤣥元宫者興王之肇兆也惟初授命載吿休徴權輿靈迹俶落祠宇昭張於國史乃今昇平永配嘉瑞增修清廟大建於閟宫明白於御碑因吾道為天下程由茲地為天下式非夫至道孰能與之哉皇帝御辨無為齊心正一窹寐有感髣髴真容昭孝孫之精誠貽烈祖之𤣥訓開元得聖象天寶獲靈符丕變再集而繁昌至教遂興而畢備祗崇冊禮其髙莫二衮龍克光於像設冕旒追尊於帝臨猗那商頌生民周雅儔之於昔今則過焉於鑠茲山㑹神之寓西對姑射北鄰天柱實通仙之秘府也正殿肅穆廣庭森沉峯巒左右松栝交隂緫虚無以静深也石壇重階瓴甓環甃隠訣參伍洞章䕶持三元表辰八月降誕每至是日展法於斯脩金籙齋啟玉帛印道家之寶王者之儀靡盛於此矣乃開乾門闔坤户氣𢎞廣莫風和不周八卦行乎其中矣仰列宿攝魁罡落日淪隂月時沆瀣六甲佐乎其旁矣仙侣順次羽人步虚朝拜九天醮祠五老想鈎陳則黄雲散覆存太一則白鶴来翔其餘侍香金童傳言玉女縹緲煙景徘徊元空求之希㣲宛如契合惟鎮皇極叶時邕外以廓清萬里戎夷向化内以乂安兆庶年榖滋稔㓕格擇疑作格澤漢書天文志格凙者如炎火之狀又見司馬相如大人賦格胡各反澤大各反興昌光動植生成隂陽氣茂利兵所措則戢干戈靈宫所臨則消疵癘矧感通上果神降其福景命来假天于萬年者乎觀主臣郭處寂䖍恭是勤夙夜匪懈禀師之籙佩之嶽符躬執科儀爰謀法要開元十六載御題觀額因𨽻於茲二十五年上䟽議齋帝俞其請於是内使髙真自王城而至綸音秘㫖從天上而来諸侯肅臨郡邑蕆事革故垣墉鼎新經像彤彩赩赩金光熒熒曾是所營曾是有成利乎永真太守臣裴晀并寮屬等性道孚敬誼形于政奉敡休慶聚合觀徒衆等皆相與遵乃宗極體乎自然熈澹漠於元和抃恬愉於天順㣲臣嘗佐汾邑親覩聖蹤強名道原用述真宰從窅𡨕而辨物因象罔而得之其詞曰元氣之宗粤𤣥元始朱靈丙午赤明斯起太上道君託胎洪氏後天合徳其惟我李爰初啟運符命歸唐海縣攸屬六葉重光天寶是應萬夀無疆大君推䇿考厯元陽空𤣥之中自然妙有無鞅之衆勃勃珠口迎不見前随不見後外物雖變我法彌乆龍角嵯峨肇興靈迹仙宫乃建清都伊宅洞裏天長寰中地隔皇矣大道臨下有赫金籙秘訣玉冊𤣥言陛壇之禮象法之門聖祖貽訓来告孝孫於茲授命永保元元克昌厥後大慶常存刋此樂石以奉至尊開元正厯握乾符頌并序張九齡臣言伏見景寅制書以開元厯握乾符垂示天下幸甚其沙門𤣥侃等所言益部耆舊傳洛下閎改顓頊厯推校最為精宻而曰後八百嵗其厯差一日當有聖人定之到于今厯果有差聖果有定誠非常之嘉應曠代之靈符不可得而間也臣誠歡誠喜臣聞天道先聖而啟期聖人後天而奉時不當乎天心不在乎集本川粹無乎字厯數不登乎聖道不合乎二本無乎字元符𤣥命定而王者應幽數起而明者察故洛下閎極其數而知来耆舊傳尚其占而示後我皇帝無思而感自然𤣥同僧𤣥侃等幸㑹而言豈云素慮非人事也其集作非神道也天固以二本作已儲祥一作祉以俟時積分以差日出入數代多歴年所疇人極力不能課其詳上林雜候亦莫徴其失則明天意以俟川文粹作徯聖期期數未臻乃藏於宻聖證將至其集作如應如響彼幽深之何有此會闕謀所以下恊黄鍾上稽𤣥象以和六氣以合三光復其見心間不容髪斗樞且運而况於人時元氣以調而况於月令於戱天下之動日用不知昆䖝草木生者自遂麟鳳龜龍靈者自瑞蠻夷戎狄逺無不至山川神鬼幽罔不洎此聖人所以定天下之象通天下之志而聖人之道備也昔者河出圗洛出書自時厥後符命非一空文而無應其殆乎人為寔録而有徴焉假集作川乎龍負則洛下閎者此其神乎不然是何見之明也夫聖有時而不作物無聖而不覩仲尼感時於鳳鳥古人歎夀於河清皆傷於不逹而恨於難見我后受成命重光于集作乎文武累聖而無窮殊祥而無數集作極彼衰命之君曾不得而朝聞凢今之人誠何幸而目覩由是觀之當其来運唐虞之屋可封非其有時孔丘之徒不遇時也者千載之㑹也萬物豈知謝生於天乎兆人亦云忘力於帝乎㣲臣荷寵靈揚休命則臣子之志在于盡美而惟天之大終莫能名不勝區區敢獻頌曰於皇惟后受命于天時来于今兆見厥先既定乃日允叶斯年赫赫光明應於上𤣥集作以應上𤣥開元厯閩本作開元正歴不逹閩本作不逢大終閩本作化天潤州丹陽縣復練塘頌并序李華大蜡之祭辭曰土反其宅水歸其壑先王因流下而導之故曰九川滌源因迤滙而瀦之故曰九澤既陂以䟽天地之氣以利元元之用崇伯汨五行而殛羽山臺駘障大澤而封汾川洪範首之春秋載之地有廣狹亊無古今大江具區惟潤州其藪曰練湖幅員四十里菰蒲菱芡之多龜魚鱉蜃之生厭飫江淮膏潤數州其傍大族強家泄流為田專利上腴畆收倍鍾冨劇滛衍自丹陽延陵金壇環地三百里數合五萬室或作家旱則懸耜水則具舟人罹其害九十餘祀凡經上司紛紛與予八十一斷嗚呼曲能掩直強者以得之老㓜怨痛沉聲無吿永泰元年王師大剪西戎西戎既歛矣生人舒息詔公卿選賢良先除二千石以江南經用所資首任能者是嵗十一月二十三日拜常州刺史京兆韋公損為潤州聲如飈馳先詔而至吏人畏伏男女相賀即日上無貪刻下無寃憤公素知截湖開一作閏壤災甚螟蝥臨事風生指期以復羣謗雷動山鎮恬然中明獨裁文之以禮乃白本道觀察御史中丞韋公元甫一作浦非中丞撫手一作掌恢心如公之謀且曰興利除害得其人而後行非常之政敢歸叔父公乃申戒縣吏卒徒闢之人不俟召呼咸来二字一作柞從役畚鍤盖野浚阜一作浚臯成溪一作蹊增理故塘繚而合之廣湖為八十里象月之規儔金之固水復其所如鯨噀射洶洶隠地雷聞泉中先程三日若海之彌望灝灝如吞吐日月沉沉如韞蓄風雨所潤者逺原隰皆春耕者飽憂者泰於是䟽為斗門既殺其溢又支其澤沃瘠均品河渠通流商恱奠價人勇輸賦遐邇受利豈惟此州每嵗萌隂乗陽二氣相薄大雨時行羣潦奔流水得一作勢所入盈而無傷龍見方雩稼䝉其渥時前相國彭城公劉尚書晏統東方諸侯平其貢稅聞而恱之曰三事以聞詔書褒異焉彭城公宣命至江南捧詔授公公率元僚掾吏令丞以下至于耆艾西向拜手忻戴皇明人心上感天降嘉澤如有神祇昭恊厥志公正直而和專靜而斷嫉惡宥過惠人察姦純鈞精堅百錬不耗伐氷之貴降從士禮詩云靖恭爾位好是正直宜其享多一無此字福也吏人入賀公拱而謝之曰尚書劉公觀察韋公奉行王澤也鄙何力之有焉丹陽令杜孟寅秉公之清白延陵令李令從如公之愛人金壇令胡玘禀公之成規及丹陽耆壽周孝瓌百姓湯源等拜首而請曰兊為澤兊恱也水歸於澤而澤恱於人百年侵一作浸塞而公啟之臣哉隣哉克諧帝休永代是式三縣無災若不碣而刻之則命不揚於厥後後之人無以倚負也華嘗學古見訪為頌曰望沄沄兮視冥冥鳥閑魚樂葭菼生膏腴利倍起訟爭斯人怨抑痛無聲韋公正直動神靈百年淤一作游淀為漻清饑者飫兮病者寜詔書光寵恩濡榮劃然眊矒復皎明追琢刻頌颺芳一作芬馨玉版𤣥記頌并序于邵草莾臣稽首獻頌曰臣聞殊祥大報者皇天無私慎終追逺者祖考来格皆上帝之所恊徳豈蒸人之克預也我皇帝陛下建皇極行大道體元以煦覆品物以陶運執斗柄而四序潜廻張地維而八埏至靜方四十載矣而天下大順巍巍乎其全功歟𤣥元皇帝陛下之烈祖也寶慈儉以垂後昆法清浄而示教父一作文厯千百祀而陛下道存妙有化洽無為動之太和寂以𤣥覧非得一而正乎陛下執大象敷𤣥宗聖祖儀刑於郡國景命紛紜於圗史者盖百數矣開靈寶於分陜之郊克復明號形縞衣於隆聖之閣時庸展親探三華於丹墀之上近而得也想五利於滄波之外逺而治也故朴畧之初三五以降曾不敢以功階並也今太白山人李渾等蹔因形動未假神逰初入緇帷之林忽變紫㣲之境古祠之下猶龍肅然霽色雖澈於清霄榮光自分於白晝𤣥宫咫尺仙衛徘徊接霓裳以受辭奉玉顔而專對光啟王室宣昭祖孫方一作寶籙實而未𢎞𬗟逖聴而奚取申命京畿採訪使户部侍郎兼御史中丞王鉷發皇華而載馳望白雲之有處瞻仰如在真風宛同歴五洞之杳𡨕尋一門之䆗窱行前有㑹感而遂通石臺菡萏而特秀玉版熒一作焜煌而自秘式傳無忽祗受不差天香氛氲甘液浹洽陽烏抱戴而上燭卿雲交映而前引率皆科斗之文時人無能之者陛下乃齋心服形絶聖棄知閒居於大庭之館逰夣於華胥之國而後攝外慮嚴天思捧𤣥記而納宸極洞一時而萬物覩其辭炳耀而有屬其義綿延而自乆齊聖夀於日月恢國祚於宇宙上以和天地下以洽神人臣不知其天之為大也如此遂下明詔百官荷億載之殊慶追六聖之遺謚既撰日以嚴配親大祫於閟宫鳴鑾以龢清蹕在聽臣又以開闢之後無以尚之於是文武百辟蠻夷君長泊黄緇老㓜各有等威雲趨玉闕而請曰陛下奉天之昭錫承祖之大命百王無以徵其符千載不復遇斯瑞崇累朝之徳孝之大者掩至尊之美謙莫甚乎既而天聴未廻睿奬猶邈臣下罔知寢處黎人咸造勿䙝而言曰天其或者以天下之物無可以稱陛下之徳故纉戎徽號因聖祖以發明今陛下不得不名之固非一時之所強名也書曰不臧厥臧人罔攸勸願陛下臧而勸之抑讓之至于三方霈然曰俞哉斯亦天之所俾也遂命稽皇典序國儀韶濩作貂蟬進纂鴻猷而尊冊之明大訓而奉行之雷雨作解小大以正四靈在郊藪以待命三光出躔次而延澤豈祗羣臣之私乎率土之私乎臣生沐淳風欽承寶化百揆時叙空聞賡載之歌三階底平乆著登封之頌伏以神功丕應澤潤生靈挹超代之範圍與下人之隂隲方軼於周王逰玉黄帝迎年豈與夫河東夀宫棫陽薦馨而已矣仲尼以舜禹之事丘不得預議者以方今之盛臣實預焉庶效采詩之典曾何萬分之一伏獻頌曰巖巖太白列僊是宅八㑹真歌三清羽客幽隂肅爽處處靈一作雲迹皇唐上祖天大元君揮斥六合時乗五雲貽厥景命昭我聖勲神靈宣功華芝獻夀薦錫𤣥記光資妙有玉字天長石臺地乆億載新兆千齡古書字形科斗臺狀芙蕖神力莫測象帝之初一作則烈烈遺謚清廟崇之明明徽號我后尊之天授玉記惟皇之禎㣲臣薦頌逰聖難名巴州化成縣新移文宣王廟頌并序喬琳或曰天生徳於聖人是為文宣䝉以文宣之為聖人盖其自生非天生耳夫道有精徳有純禮有意樂有神四物幽賛百靈淳感特與天地位而成三故夫子之前未曾生夫子夫子之後不復有夫子宇宙古今倬惟一人謂天能生曷不能數生也故曰非天生耳河圗鳳鳥言其徳梁木泰山言其用謙以况物物由我成且孔聖之道恢張而天下理汙殺而天下亂觀其可以卜理亂也領徒三千博徒三萬桓文不足侔其衆夾谷之戮齊優兩觀之誅少正氣盪河岳精廻日月然而俯僂魯卿循循鄉黨行道救世不有其躬且唐堯五臣不無四㐫周文十亂不無三叔孔徒萬數之内唯宰我怠於晝寢卜商短於假盖未聞庶其之奔佛肸之叛遺墟舊宅刺草不生則教之所入者深化之所𢎞者逺鏡懸象緯掌著興亡籌萬代於一筭爾我國家敷教訓格以王者之禮加徽號焉示明王果有宗也徳位交叙以奉天時然三皇五帝迄于今春秋釋菜廟食千祀特惟夫子耳則冕旒衮服聖人之餘事封建褒崇有國之盛典化成縣令范陽盧沔純深貞特㢘孝絜矩夏大旱偶有事於文宣公焚香至誠雷出自廟指觀倐忽霈然滂沱自下車數月有感輙應無方之神豈情於造物者乎可由而不知也以此頃因祠宇荒僻垣墉頺圯憇聚樵牧䙝瀆威靈公以必葺而未言頻假寢以夣聖隙地兼聖此為新宫曰衣冠禮樂不下庶人宣風布教職先令長出家財以資匠費督門吏以勤役工青襟黄髪更唱迭和椽欒雖舊而華魄惟新自甲至癸不及旬而功巳集郡官畢賀百姓未知足見役不及人也君子曰盧侯以心感神以身律人可謂善政也已矣郡守楊公中和大雅聞善若驚恱而羙之曰盧方辭滿不以家為出鍾離俸錢脩孔聖遺廟善政之餘地也僉曰都允哉梁國喬琳臺之作為新廟頌頌曰殷之系聖周之斯文生我夫子世教之君六藝折衷三才更分視不可見聴不可聞登降既定天人大觀禮樂神鬼幽明恊賛由之則理匪由則亂百王同流萬古彌渙夣奠既兆哲人其萎自家刑國廟貌思之周㣲唐興千祀于茲春秋祭菜爼豆其時維巴之南亦掲其宇盧公宰邑人之父母假一作僻匪我升堂陋彼環堵爰就爽塏長岡之下相恊厥居作為新宇不日不月既葺且崇頌徒知歸發篋来同斯之未信此也求䝉時惟龍見人懼虎魃寜丁我躬虞鞏是託户庭之際雷霆震薄雨公及私是刈是穫廟既更矣嵗既盈矣公之志思人亦勤止變此夷俗叅乎孔里學者行之造次於是畋獲虎頌并序符載虎在毛物有剛猛而為暴者也畋而獲之覩令施而士勇者也且荆為澤國疆亘雲夣伐一作戈麕麚弋鴻鴈盖便習也唯獲虎則異故大而張之六年冬十二月臘日甲辰節度使御史大夫樊公大畋于郢城脩軍禮也先期之辰命耆將宿帥將騎歩兵五千盛陳於所舎之地越翌日朝陽始昇郊牧静夷建大斾之彤彤抗髙旌之蔞蕤無小無大千㦸萬羽閃舒絢煥膠臈磢錯狀濤湧而波汨咸從公而觀之於是樹蘭防列轅門表旗鼓而卒伍縈紆遼蔓星陳鱗次中軍發號沸渭洄一作四起拉榛棘秘梗橦髙坱埤踣一作培徤足剗驍翅脂染鳴鏑血湔飛幟或潰潰以狂顧或奔猭而㓕地竭銳精以圗免雖絶脰而猶視士氣方雄乃縱火攻烈焰炎炎燒雲飈風烻隂深巷薈蘙䝉籠抃呼未終山平澤通其有冐欝攸走煤爐䝉茸袒禓徒摶獨殺者不可勝道維明日復圍于龍山之北岡先是里人之訟乳虎為暴肆毒貪婪白晝族行圈皁無豕牛林麓絶樵蘇老㓜愁恐極於兵冦既卜其穴乃大搜而取之爽氣凌厲士拗餘怒思與鬪死莫有異慮敲扣拍撲芟殺䇿䃗洞篁篠之𡨕宻劃䝉蔓之纍絡勢窮則摶鬪於莾下觀其怒氣之所狡憤迅軀之所騰跱鋸牙之所噉齚鉤𤓰之所拏玃傑作人立呀若箕張聲軒一作轟暴雷目爍燦炬爰有一人烏獲之倫威欝喬傑􅘀狡獷决憑髯奮怒毛豎眥裂鐏長㦸以撑拒乃匐身而掩刄勢傾力絶四偃在地穿喉貫背𤓰有餘摶於是騰氣射虹蜺酣譟破山林耋老慶童㓜抃淋灕贔負獻于公所公以為天稔其毒必將姙孕剖視其腹即獲乎四子矣於是廻鑣返斾校能計獲發府庫行飲勞賞功也大凡古者天子諸侯四時皆畋因畋以理兵先視其禮儀次察其號令後觀其坐作進退之度有不用命者乃斬之以狥於衆焉武徳脩備乃亊蒐狩上以奉宗廟下以禮賔客其有肉不登爼材不中器則謂之不軌不物而君子譏之今大夫法先王之制順時序之氣展敬農隙大講戎亊卒乗具文章明武脩也威儀肅行伍列禮盛也無逸飛無漏走令張也繄是三者備足焜燿况乎啟沉毅誅暴横耽耽五虎斃在指顧是得不謂動合模範成堂堂之觀乎公常握文武之柄荷申甫之寄擁旄荆國星霜四周流愷悌之仁布大中之化政之被民者如陽和熈熈蒸變生物各遂暢逹不知其然故無得而稱焉洎於軍旅之際徳禮也如是勇練也如是播此智畧寓諸形容因知公之師可以振文經可以翊皇威可以截不庭可以懾四夷與上古儔侣赫赫巍巍即豈獨􅏳荒山殪猛獸馳騁觸蹷一作蹙左旋右抽而已哉載末儒也猥以縫掖獲陪鞭弭之後目覩盛烈失去畏懦敢愛文字使其闇然而不彰乎廼作頌曰𤣥隂凝兮殺氣厲揚三軍兮順時殺鋋㦸羅兮山谷隘飛走殫兮林莾壊有虎勃起兮萬夫駭闞呀夭矯兮雷霆喝紆沉慮兮振明戒于一奮兮傾五害旋勝軍兮翻大斾空臯藪兮樂㓜艾勇毅之師無與對可誅不王截海外文苑英華巻七百七十九
