body:
  text: 文苑英華卷二百五十二宋李昉等編寄贈六王昌齡三首沈千運一首楊浚一首楊重元一首王季友二首薛業一首殷寅一首楊諫一首孫叔向一首張偁一首陶翰四首劉長卿十九首李頎五首為張僓贈閻使臣王昌齡哀哀獻玉人楚國同悲辛泣一作淚盡繼以血何由辯其真賴承琢磨惠復使光輝新猶畏䜛口疾棄之如埃塵次汝中寄河南陳賛府前人汝山方聫延伊水纔明滅遙見入楚雲又此空館月紛然馳夢想不謂逺離别京邑多歡娛衡湘蹔沿越明湖春草遍秋桂白花發豈惟長思君日夕在魏闕贈史昭前人東林月來一作未昇廓落星與漢是夕鴻始來齋中起長歎懷哉望南浦眇然夜將半但有秋聲孤愁使心神亂一作但有秋水聲孤愁使心亂握中何為贈瑶草已衰散海鱗未化時各在天一岸贈史脩文沈千運故人阻千里㑹面非前期握手於此地當懽反作悲念誰怨猶昨倐已二十朞疇昔皆少壯别來髮如絲不道舊姓名相見知是誰曩遊盡騫翥與君仍布衣豈曰無其材命理應有時前路漸欲少不覺生涕洟贈李郎中楊浚仙郎早朝退直省卧南軒院竹自成賞階庭寂不喧焚香開後閣起草閉前門禮樂風流羡光華星位尊榮兼朱紱貴交乃布衣存是日登龍客無忘君子㤙正朝上左丞相張燕公楊重元嵗去愁終在春還命不來長吁問丞相東閣幾時開代賀若令譽贈沈千運王季友相逢問姓名亦存别時無子今有孫山上雙峯長不改百年一作家唯有三家村村南東西車馬道一宿通州水浩浩澗中磊磊十里石河上淤泥種桑麥平坂古塚皆我親滿田户一作主人是舊客舉聲酸鼻問同年十人六七歸下一作黃泉分手如何更此地廻頭不語一作下去淚澘然此詩三百四十巻重出今已削去注異同為一作贈山兄韋秘書前人出山秘芸署山水已再春食我山中藥不憶山中人山中誰宻余白髪日見親雀䑕晝夜無知我厨廪貧有情盡捐棄土石為同身依舍北松下一作依依舍北松不厭吾南隣夫子質千尋天澤枝葉新今也不材夀非智免斧斤洪州客舍寄栁博士芳薛業去年燕巢主人屋今年花發路傍枝年年為客不到舍舊國存亡那得知胡塵一起天下亂何處春風無别離銓試後徵山别業寄源侍御殷寅别業在徵山登髙望畿甸嚴令天地肅城闕如何見藹藹王侯門華軒一作軒車日遊衒幸逢休明代山虜尚交戰投䇿去園林率名皆拜選聖君性則喆濟濟多英彦裴楷能精一作清通山濤急推薦諛才甘自屏薄伎忝餘眷雖承國士㤙尚乏中人援疇昔相知者今茲秉天憲朱紱何赫赫繡衣復葱蒨贈知已楊諫江南折芳草江北贈佳期江闊水復急過江常苦遲蘋白蘭葉青恐度先香時美人碧雲外寧見長相思將赴東都上李相國孫叔向四海兵初偃平津閣正開誰知大爐火還有不然灰辭房相公張偁秋風颯颯雨霏霏愁殺栖皇一布衣辭君且作隨陽鴈海内無家何處歸贈房侍御時在新安陶翰志士故不覊與道常周旋進則天下仰已之能晏然褐衣東府召執簡南䑓先雄義毎將疑立犯顔豈圗全謫居東南逺逸意吟芳荃適㑹寥廓趣清波更夤縁扁舟入五湖發繫洞庭前浩蕩臨海曲超遥濟江篇徵竒忽忘返遇興將彌年乃悟范生智集作志足明漁父賢郡臨新安渚佳賞此城邉集作佳賔在城偏日夕對層岫雲霞映晴川閑居變秋色偃卧含貞堅倚伏聊自集作自相化行藏亦推遷君其倦羽翮嵗晏欲集作亦冲天晩出伊闕示河南裴丞前人退無宴息資進無當代䇿冉冉時嵗暮坐為周南客前登闕塞門永眺伊城陌長川黯已空千里寒氣白家本渭水西異日同集作何所適秉志師禽回㣲言祖莊易一辭林壑間共繫風塵役才明忽先進天邑多紛劇豈念嘉遁時依依偶沮溺贈鄭員外前人騘馬拂繡裳按兵遼水陽西分鴈門騎北逐樓蘭王聞道五軍集相邀百戰塲風沙暗天起虜陣森己行儒服揖諸將雄謀吞八荒金門未見謁朱紱生輝光數載侍御史稍遷尚書郎人生志氣立所貴功業昌何以守章句終年事蒼集作鉛黃同時獻賦客尚在東陵旁望太華贈盧司倉前人作吏至西華乃觀三峯壯削成元氣中傑出天河上如有飛動色不知青冥狀巨靈安在哉厥跡猶可望方此歎行旅未由餙仙裝唐韻側亮切行裝也或改作仗陋矣葱蘢記星壇明滅數雲嶂良友垂真契宿心所㣲尚敢投歸山吟霞經一相訪獻寧淮軍節度使相公一作淮西將李中丞集作獻南平王劉長卿建牙吹角㦸門集作不聞喧三十登壇衆所尊家散萬金酬士死身留集作持一劍荅君㤙漁陽老將多廻席魯國諸生半在門白馬翩翩春草細集作緑邵陵西去獵平原觀校獵上淮西相公前人龍驤校獵邵陵東野火初燒楚澤空師事黄公千戰集作載後身騎白馬萬人中笳隨曉集作晩吹經集作迎邊草箭入青集作沒寒雲落塞鴻三十擁旄誰不羡周郎少小有集作立竒功漢陽獻李相公前人退身髙卧楚城幽獨掩閑集作寒門漢水頭春草雨中行逕沒暮山江上捲簾愁幾人猶憶孫宏閤百口同乗范蠡舟早晩却還集作歸丞相印十年空被白雲留落第贈楊侍御兼拜員外仍充安大夫判官赴范陽前人職副旌旄重才兼識量通使車遥肅物邊筞逺和戎擲地金聲著從軍寶劍雄官成稽古道集作力名逹濟時功肅穆烏䑓上雍容粉署中含香初待漏持簡舊生風黠吏偏驚隼貪夫輙避騘且知榮已隔誰謂道仍同念舊追連茹謀生任轉蓬泣憐三獻玉瘡懼再傷弓戀土函闗外瞻塵集作雲㶚水東他時一書札猶冀問途窮奉寄婺州李使君舍人前人建隼罷鳴珂初傳來暮歌漁樵識太古草樹得陽和東道諸生從南依逺客過天清婺女出土厚絳人多永日空相望流年復幾何崖開當夕照葉去逐寒波眼闇經難受身閑劒懶磨似鵩占賈誼上馬識亷頗窮分安藜藿衰容稱薜蘿只應隨越鳥南翥託髙柯自夏口至鸚鵡洲夕望岳陽寄源中丞前人汀洲無浪復無煙楚客相思益集作亦渺然漢口夕陽斜度鳥洞庭秋水逺連天孤城背嶺寒吹角獨戍臨江夜泊船賈誼上書憂漢室長沙遷謫集作謫去古今憐寄李侍御前人舊國人未歸芳集作滄洲草還碧年年湖上春悵望江南客騘馬西入闗白雲獨何適相思煙水外惟有心不隔對酒寄嚴維前人陋巷嘉集作喜陽和衰顔對酒歌懶從華髪亂閑任白雲多郡簡客垂釣家貧學弄梭門前七里灘早晩子陵過至饒州尋陶十七不在寄贈前人謫宦投東道逢君已北轅孤蓬向何處五柳不開門去國空廻首懐賢欲訴寃梅枝横集作㸔嶺嶠竹路過湘源月下髙秋鴈天南獨夜猿離心與流水萬里共朝昏赴南邑書情寄故人前人南過三湘去巴人此路偏謫居秋瘴裏歸去夕陽邉直道天何在愁容鏡亦憐裁書欲誰訴無淚可澘然月下呈章秀才前人自古悲揺落誰人奈此何夜螢偏傍枕寒鳥數移柯向老三年謫無愁集作秋百口多家貧唯好月空愧子猷過朱放自杭州與故相里使君立碑廻因以奉簡前人片石羊公後悽凉江水濵好辭千古事墮淚萬家人鵩集占書乆鸞廻刻篆新不堪相顧恨文字日生塵贈西陵盧少府前人籬落能相近漁樵偶復同苔封三逕絶溪向數家通犬吠寒烟裏鵶飛集作鳴一作聲夕照中儻因藍轝出集作時因杖藜次相訪竹林東自江西歸至舊任官舎贈袁賛府時經劉展平後前人却見同官喜復悲此生何幸有歸期空庭客至逢揺落舊邑人踈經亂離湘路来過廻鴈處江城卧聼搗衣時南方風土勞君問賈誼長沙豈不知聞虞沔州有替將歸上都登漢東城寄贈前人淮南揺落客心悲㳙水悠悠恨别離早鴈初辭舊闗塞秋風先入古城池腰章建隼皇恩賜露冕臨人白髮垂惆悵恨集作夫君先我去漢陽耆老憶旌麾集作旗吳中聞潼闗失利集作守因奉寄淮南蕭判官前人早集作一鴈飛吴天覉人傷暮律松江風嫋嫋波上片㠶疾木落姑蘇臺霜收洞庭橘蕭條長洲外唯見寒山出胡馬嘶秦雲漢兵亂相失闗中因竊據天下共憂慄南楚有瓊枝相思怨瑶瑟一身寄滄洲萬里㸔白日赴敵甘負戈論兵勇投筆臨風但攘背擇木將委質不爾集作如歸剡山雲門飯松栗京口懐洛陽舊居兼寄一作簡廣陵一二集作二三知已前人川濶悲無梁藹然滄波夕天涯一飛鳥日暮南徐客氣混京口雲潮吞海門石孤㠶候風進夜色帶江白一水阻佳期相望空脉脉那堪嵗芳盡更使春夣積故國胡塵飛故山集作異鄉楚雲隔佳人想何在庭草為誰碧惆悵空徃復集作傷情滄浪有遺跡嚴陵七里灘携手同所適贈别子羣投筆赴西安前人風流一才子經史仍滿腹心鏡萬像生集作像全文鋒衆人服頃逰靈臺下頻棄荆山玉蹭蹬空數年徘徊冀㣲禄未來投筆硯長揖辭親族且欲從集作圖變通安能守拘束本持鄉曲譽肯料泥塗辱誰謂命迍邅還令身集作計翻復西戎今未弭一作殄胡騎屯山谷坐恃龍豹韜全輕蜂蠆毒拂衣從此去擁傳一何速元帥許提携他人佇瞻矚出門寡儔侣矧乃無僮僕黠虜時相逢黄沙暮愁宿蕭條逺廻首萬里如在目漢境天西窮胡山海邊緑想聞𦍑笛處淚盡闗山曲地濶鳥飛遲風寒馬毛縮邊愁殊浩蕩離思空㫁續塞上歸限賒集作塞下恨歸賒樽前别期促知君志不小一舉凌鴻鵠且願樂從軍功名在殊俗江中晩釣寄荆南一二相識前人隨楚集作楚郭或作楚國㣲雨收荆門㸔在目漾舟水雲裏日暮春江集作江山緑霽華凈洲渚夜色連杉竹集作溟色連松竹月出波上時人歸渡頭宿一身已無累萬事更何欲漁父自夤縁白鷗不覊束既憐滄浪水復愛滄浪曲垂釣㸔世人那知此生足寄司勲盧員外李頎流澌臘月下河陽草色新年發建章秦地立春傳太史漢宫題柱憶仙郎歸鴻欲度千門雪侍女新添五夜香早晩薦雄文似者故人今已賦長楊東郊寄萬楚前人濩落乆無用隨身甘采薇仍聞薄宦者還事田家衣潁水日夜流故人相見稀春山不可望黄鳥東西飛濯足豈長徃一樽聊可持持一作依了然潭上月適我心中機在昔同門友如今出處非優㳺白虎殿偃息青𤨏闈且有薦君表當㸔携手歸寄書不代靣蘭茞空芳菲望鳴臯山白雲寄洛陽盧主薄前人飲馬伊水中白雲鳴臯上氛氲盖山頂行子時一望照日龍虎姿攅空氷雪状蓊欝殊未巳􅲠􅡳忽相向皎皎横緑林霏霏澹清嶂逺映村更失孤髙鶴来傍勝氣欣有逢仙逰且難訪故人吏京劇毎事多閑放室盡峨嵋峯心揺洞庭浪惜哉清興裏不見予所尚寄萬齊融前人名髙不擇仕委世隨虛舟小邑常歎屈故鄉行可逰青牛半村户香稲盈田疇為政日清静何人同海鷗揺巾北林夕把印東山秋對酒池雲一作風滿向家湖水流岸隂止鳴鵠山色映潜虬靡靡俗中理蕭蕭川上幽昔年至東一作吳郡常憶卧江樓我有一書札因之芳杜洲贈蘇明府前人蘇君年㡬許状貌如玉童采藥傍梁宋共言隨日翁常辭小縣宰一徃東山東不復有家室悠悠人世中子孫皆老死相識悲轉蓬髪白還更黒身輕行若風汎然無所繫心與孤雲同出入唯一枝一作杖安然知始終願聞素女事云采山花叢誘我為弟子逍遥尋葛洪文苑英華巻二百五十二
