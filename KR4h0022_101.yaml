body:
  text: 文苑英華卷一百一宋李昉等編工藝遊刃賦一首大巧若拙賦一首工先利器賦一首運斤賦二首攻堅木賦一首刻桐為魚扣石鼓賦一首棘猴賦一首執柯伐柯賦一首遊刃賦以目無全牛必有餘地為韻張楚善乎庖丁之養刃也鋒不鈍鋭不衄橫爽氣以凜凜頓霜威之肅肅內則道協於心外則手應於目三年之後不見全牛於是手以之發刃以之投其虛其徐刃以吻合所倚所觸血自潛流牛之間兮稱有刃之厚兮云無以無厚之刃入有間之軀與切泥而不别將委土而何殊忘其骨節之難易未嘗肯綮其斯須以天合天騞然響莊子作騞然嚮然然目不視矣手有存焉窽之導兮自大隟之批並結反有際之處因而批之兮自穿始以一剖終以萬全匠石代之以運斤未可爭長孔闕殺之而用劒難乎同年則說屠羊以淺術望鼓刀以戰栗期百發而百中笑無固而無必乃知丁之道也可久丁之伎也難有利推百鍊不愧於太阿聲中八音自合於經首咸池樂章名日居月諸勇其賈餘君欲口傳等文惠之相好我方神遇覺良庖之不如若然者遊合逍遙之事刃合虛白之意倘遊必有方刃何不利冉冉兮雖不可知恢恢兮常有餘地方將解千牛然後躊躇以滿志右賦題出莊子故多用其文大巧若拙賦以隨物成器巧在乎中為韻白居易巧之小者有為可得而窺巧之大者無朕一作迹不可得而知蓋取之於巽受之以隨動而有度不工合規一作舉必合規故曰大巧若拙其義在斯若一作爾乃掄材於山一有木字審器於一有軌字物將務乎心匠之忖度不在乎手澤之剪拂故為棟者任一作資其自天而一作之端為輪者取其因地而一作之屈其工一作公也於物無情其正也於一作依法有程既游藝而功立亦居肆而事成大小存乎目擊材無所棄用捨在於頤指一作取捨資乎指顧物莫能爭然後任道𢎞用隨形制器信無為而為因所利而利不凝滯於物必簡易於事豈朝疲而夕倦庶日省而月試知大巧之有成見庶物之無棄然則比其義取其類豈朝至其類一無此三十二字亦猶善為政者物得其宜能官人者才適其位嘉其尺度有則繩墨無撓工非剞劂自得不矜之能器靡雕鎪誰識無心之巧衆謂之拙以其因物不改我謂之巧以其成功不宰不改故物全不宰故功倍遇以神也郢匠一作人之術攸同合乎道焉老氏之言斯在噫舟車器異杞梓材殊罔枉枘以鑿罔破圓為觚必將考廣狹以分寸定一作審刓方以規模則物不能以長短隱材不能以曲直誣可謂藝之要道之樞一無此八字是謂心之術也豈慮手之傷乎且夫大明若蒙大盈若冲一作大盈若冲大明若蒙是以大巧棄其末工則知巧在乎不違天真非役神二字一作勞形於木人之內巧在乎無枉物性一作情非勞形於棘猴之中一作非役神於刺之中若然者豈徒與般爾之輩騁伎而效一作校功哉一作皆集本似不及古書之善工先利器賦以器苟未精將何為巧為韻魏式工有習藝求名志在不朽乃言曰藝未達不可求以諸已器未精徒勞措以其手安得輕進自貽伊醜於是磨礪為先動用為後試疑作誠旨趣之可尚實果决之不苟所謂作事謀始本立道生繩墨盡索斤斧畢呈慮妍媸之稍違而或愆規矩審鋒鋩以求鋭必取專精勤勤不怠矻矻有營欲盡心於鎪鏤用度木於林衡亦如舟楫良然可思其濟涉耒耜利始得議其耦耕於一作原其發硎可親以精為貴不然何以能久用之不既驗朴斫之有辭懼剞劂之猶未爰究爰度無或不良揣八材之質淬百鍊之鋼然後切磨效奇成至寶之美刳剡中度用巨材之長呈機巧以盡善豈濫窳之是將且斟酌不撓矜名嘗巧雕鐫非他施功幾何既適心而便手因投刃以攢柯向使因循為心則器必殘缺若苟且從事則人亦詆訶安得不分班倕之𤣥妙就玉石之琢磨觀夫欲展而能先礪其器以工立喻則人不二可為庶事之規寧比匹夫之志故曰用藝者警戒不逺立身者得失由斯若幸而濫進則人必爾窺是以君子不容易於所為運斤賦以上下相應其志同為韻席䕫道貴乎朴物疵於妄為謀者必定於前執技者可以事上繄郢人與匠石能器合而神王堊復在鼻將欲表微揮拂以斤何其用壯既分庭以離立亦持刃而相向於是算錙銖慎取捨運之於手將匪疾而匪徐愜之於心寧我欺而爾假志而必中同引滿於彀中妙不可傳猶斫輪於堂下况乎器也利工也良壯前趾耀雄鋩以身運臂兮臂可使以彼契此兮此可忘迫其勢則成風含響激其石乃飛電分光欲臻夫妙在慎其相故受刃者不為股栗執柯者無聞手傷向使受刃者震懾執柯者劻勷則必滅爾鼻而剠而疑作爾面豈唯破我斧而缺我斨用詩語亦猶朋儕見知工用可稱藝成道得合調諧聲豈同夫衆人遇我狂夫阻之璅璅庶匠丁丁在兹得離婁督繩而尚失以公輸削墨而猶疑安能霜刃投虛必去乎蠅翼圓柯在握不失乎毫釐是吾質也實惟何其知音可托無乃後時客有多才博雅好奇尚異糟粕既得頗讀古人之書鑿枘可規願行夫子之志將求輪扁之術以廣運斤之事乃歌曰彼二子兮以藝相崇得一理兮其心則同運斤在手誠可懼堅立不動神之雄豈運斤者妙其術堅立者知其工幸見遇於郢匠無軗疑作輟響於成風第二同前韻獨孤授漆園傲吏志愜神王和而不唱或崆峒之間或濠濮之上誠道樞之同體表人情之異狀爰感激於惠施乃興之於郢匠嗟乎功疑有善價吾道之亞既出鬼而入神亦千變而萬化可以迎夫逺近可以接夫上下用之朋友管鮑可以全交行之君臣桓文可以致霸請言其始也鼻之堊兮匠之良子有度兮我有長形枯木兮自若斤成風兮允臧土微微以霞散刃熒熒以電光信之者雙美疑之者兩傷其為心也以濟其為妙也更相吾固知青萍之術兮空設公輸之巧兮徒嘗實由氣同者合聲同者應揮手餘地因悟解牛之能忘情銛鋒宛識狎鷗之興豈兩賢之相厄乃二人之俱别有不度其時不稽厥疑蒿目猶視蓬心自師代匠石而忍垢騁鋒刃而勿思永昧心得圖為面欺苟臨事以率爾成後悔而悽其且傷於手之是懼亦何暇乎涅而不緇曷若素緝乃事爰定乃志料輕重審同異曾無恐泥之憂頗識斷金之利雕鎪合乎神理磨礱出乎人意苟自得以忘形亦可斫乎有鼻至於道洽情融體異心同求之不得感而遂通利器見投尚蒼黃於麾下良工斯在乃拂拭於塗中君既有執柯之便豈比夫按劒之雄攻堅木賦以學者攻藝必求至精為韻李程工之制器兮雕乎朴人之興藝兮志乎學利用者擁腫無前善扣者舂容乃覺多聞匪闕於疑殆成器克資乎雕斫故研精方啓於憤悱用當各施於輪桷且夫材有柔徑工有趣捨于以鑽木後其堅乎于以揮斤先其易者鈎繩定其規矩斧斤飄其上下剖劂罔輟疾徐既工鏟鱗皴於理外托精粹於文中攢節劃以洞解奧義渙乎遂通則知藝或有孚雖至剛而斯剞疑剖學乃將習奚異端之可攻方同規於大匠期繼業於良工是以木碎其節學殫于藝殊宰我之難雕匪般倕之易制既飾以文亦麗其質講學所貴乎無方摧堅不可以無術每投虛以措刃故功倍而身逸盡乎精微之理誰謂不然得於心術之間孰云無必藝通𤣥兮堅剛則柔學通微兮指歸可求俾不才而成用化扞格以優游工之成功志之所至信念兹而在兹因比物而醜類之木也破其輪囷之學也究其奧祕礱斫斯成良工有程殫材人之學好刳者之精終朝匪勞於矻矻空谷誰聽乎丁丁既成風於郢匠期大扣於希聲刻桐為魚扣石鼓賦以感通難測萬里相符為韻物不可以智識念斯石之何為匪兹梧而不克况乎鼓與魚兮非類吳與蜀兮異域何合應於自然杳勵響而不測刃乃霜落鱗非錦攢擊藴玉之形鏘鏘屢出裁嶧陽之幹唯唯可觀叩寂寞而大音斯發中鏗訇而餘韻不殫是知同聲者其和易殊器者其應難逢逢之韻且千歡歡之音相萬不擊不考奚呈響亮之功大鳴小鳴豈抱沈潜之怨運之靡終應而不窮覩之者謂聲存視聽之表疑之者謂音在鬐鬛之中練響而洪纖皆答化氣而逺近必通初密如於綿古倐坎然於暗空非誠貫可覽將神交所感孤生之質徒效用於汕汕可轉之姿終奮響於坎坎嗟乎石之為鼓也發於異鄉桐之為魚也來彼殊方何終歲之寂寂忽盈耳以洋洋自得於愜心應手豈待乎玉質金相棲鳳之稱既罷在藻之用何長扣之不止音亦無已詎徴冥應之言適諧響答之美相須以成事有類塤篪相應以成聲寧限道里則知審音斯發者不可誣懷聲思擊者不可孤諧千古之善應為二物之合符向不遇張司空也知其蓄靈響而已夫棘猴賦以視之不見能盡巧心為韻楊宏貞昔燕王好奇術客嘗巧剡棘刺之微物成沐猴而不撓毫末之細雕籠疑既施睢盱之狀委曲無遺嘗疑晏隂之靜景辨騰捷之幽姿其始未覯如將受欺虛無之中既焦心於觀者杪末之上宛成形以究之實兮若虛的爾才見霏微而草上霑露羃䍥而條端集霰閃孤光而乍分拂輕靄而將眩觀夫至精惟一至小無朋豈側陋之于用在良工之所能不食而安終有殊於狙怒窮髙是處亦何異於猱升原夫作者經之其勤至矣積冲妙於靈府假鋒鋩於纖指蓋以神遇寧將目視因乎有用之質造彼無間之理何剖劂之一變若還跳之義疑止伊竹間之猿父大小相殊相木杪之獑猢依憑酷似若乃徴物類較能不貫虱心者未喻其精微巢蚊睫者自然之妙有庸知造物之意暫假斯人之手披左生之賦方此由心驗韓子之書誡其滕口事逺前古名聞至今雖幽通之不測終髣佛而難尋然因棘為猴因成其麼質乃觀猴在棘無異於喬林蓋同符於神化而中出於人心斯語可徴妙能曲盡倘雕蟲之不棄希定價於平凖執柯伐柯賦以觀則於手人道寧逺為韻謝觀手運斧而方圓自縱斧有柯而規模可觀成疑作誠取則之非逺曷持心以常難是知選材於山操刃于手將散朴於大巧是侔形於妙有則可審分寸定妍不脫故而圖新瞻前而顧後然後擬議是啓經營靡停方坎坎以無撓聿丁丁而未寧觀所措而舉措因其形而制形且勿謂效之難尚俟乎繩墨勿謂象之逺仍憂乎差忒左手將舉其朴斫右手足見其成式不離指掌之傍自有短長之域龜鏡頗邇儀容在側見機而作成於目擊之間殷鑒不逺便契握中之則何必公輸是集梓匠具陳雖欲逺徴其類不如近取諸身於造次顛沛之時尚思行已在一顧一盼之所何必求人庶得揣稱攸宜咨謀可考冀析薪之入用知缺斨之足保終懷繼踵之誠未爽從繩之道嗟乎柯在手兮至近不能觀者有諸道于身而豈逺不能行者信歟故取則於人者失聞道於人者疏乃可端其末慎其初反視於周旋之內收心於躁動之餘因而利焉是可宗也譬以身者方或同於夫如是正其規從其本揆度而枉柄無阻睥睨而迷途自返儻忠恕之內存信率性之非逺文苑英華卷一百一
