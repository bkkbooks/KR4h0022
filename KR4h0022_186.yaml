body:
  text: 文苑英華巻一百八十六宋李昉等編省試七明堂火珠一首沉珠於淵二首珠還合浦一首罔象得𤣥珠一首濁水求珠三首暗投明珠三首水懐珠一首琢玉成器一首玉巵無當二首沽羙玉一首瑕瑜不相掩二首瑜不掩瑕一首玉水記方流六首玉聲如樂二首戞玉有餘聲一首琢玉二首水精環一首亞父碎玉斗三首羙玉一首西戎獻白玉環一首白珪無玷一首金在鎔一首清如玉壼冰二首玉壺氷四首明堂火珠崔曙正位開重屋凌空出火珠夜來霜月滿曙後一星孤天浄光難滅雲生望欲無還知聖明代國寶在名都沉珠於淵唐諱類詩作泉獨孤良器皎潔澄泉水熒煌照乗珠沉非將寳契還與不貪符風折璿成浪空涵影似濡深㸔星并入静向月同無光價憐時重亡情信道樞不應無脛至自為暗投殊同前獨孤綬至道歸淳朴明珠被棄捐失真來照乗成性却沉泉不是靈蛇吐猶疑合浦旋岸旁隨日落波底共星懸致逺終無脛懐貪遂比肩欲知恭儉徳所寶在唯賢珠還合浦鄧陟至寶含冲粹清虛映浦灣素輝明蕩漾圓彩色玢㻞昔逐諸侯去今隨太守還影摇波裏月光動水中山魚目徒相比驪龍乍可攀願將車飾用長得耀君顔罔象得𤣥珠張籍類詩作黎逢赤水今何處遺珠已渺然離婁徒肆目罔象乃通𤣥皎潔因成性圓明不在泉暗中㸔夜類詩作驅夜色塵外照情田無脛真難掬懷疑寶類詩作實易遷今朝搜擇得應自一作免媚晴川濁水求珠王起行潦沉明月光輝也不浮識珍能洞鑒精寶一作意此來求幾被泥沙雜常隨混濁流潤川終自媚照乗且何由的皪終難掩晶熒願見収蛇行無脛至飲德已聞酬同前吕價至寶誠難得潜光在濁流深沉當處晦皎潔庶來求綴履將還用褰裳必更収蚌胎應自别魚目豈能儔日彩逢高鑒星光詎暗投不因今日取泥滓出無由同前王損之積水非澄澈明珠不易求依稀沉極浦想像在中流瞪目思清淺褰裳恨暗投徒㸔川色媚空愛夜光浮月入疑龍吐星歸似蚌遊終希識珍者採掇冀冥搜暗投明珠羅㤗媚川時未識在掌共傳名報德能欺暗投人自欲明月臨幽室朗星没曉河傾的皪驪龍頷熒煌彩鳯呈守恩辭令浦擅美掩連城魚目應難近誰知按劔情同前苑一作范䛆文又切至寶欣懐日良茲豈可儔神光非易鑒夜色信難投錯落珍寰宇圓明隔淺流精靈辭合浦素彩耀神州抱影希人識承時望帝求誰言按劔者猜忌却生讎同前崔藩至寶一作萬千㸔懐袖明珠出後疑収向人光不定離掌勢難留皎澈虚臨夜孤圓泠瑩秋乍來驚月落疾轉怕星流有淚丼瑕棄無謀自暗投今朝感㤙處將欲報隋侯水懐珠莫宣卿長川含媚色波底孕靈珠素魄生蘋末圓規照水隅淪漣冰彩動蕩漾瑞光鋪逈夜星同貫清秋岸不枯江妃思在掌海客亦忘軀合浦當還日恩威信已敷琢玉成器葉季良片玉寄幽石紛綸當代名荆人獻始遇良匠琢初成氷映寒光動虹開晩一作曉色明雅容㸔更澈餘響扣彌清自與瓊瑶比方隨掌握榮因知君有用高價佇連城玉巵無當蔣防美玉常為器兹焉變漏巵酒漿悲莫挹罇爼念空施符彩功難補盈虚數已虧豈唯孤玩好抑亦類瑕疪清越音雖在操持意漸隳賦形期大匠良璞勿同斯同前元稹共惜連城寶翻為無當巵詎慙君子貴深訝拙工隳泛蟻功全少如虹色不移可憐殊礫石何計辨糟醨江海誠難滿盤筵莫妄施縱乖斟酌意猶得奉光儀沽美玉羅立言誰憐被褐士懐玉正求沽成器終期逹逢時豈見誣寶同珠照乗價重劔論都浮彩朝虹滿懸光夜月孤幾年淪瓦礫今日出泥塗采斵資良匠無令瑕掩瑜瑕瑜不相掩陳中師出石温然玉瑕瑜素在中妍媸因異彩音韻一作響信殊風讓美心方並求疵意本同光華開縝宻清潤仰磨礱秀質非攘善貞姿肯廢忠今來儻成器分别在良工同前武翊黄抱璞應難辨妍媸毎自融貞姿偏特逹微玷遇磨礱涇渭流終異瑕瑜自不同半曽光透石未掩氣如虹縝宻誠為智包藏豈謂忠停疑㸔分美惡今得值良工瑜不掩瑕柴宿朗玉㣲瑕在分明異璞瑜堅貞寧可雜美惡自能殊待價知彌久稱忠定不誣光輝今見黜毫髪外呈符豈假相工指堪為逹士模他山黨前漢伍被傳黨可以徼幸師古曰黨讀作儻磨琢慕愛是洪鑪玉水記方流呉丹玉泉何處比四折水文浮潤下寧踰矩居方在上流映空虗碌碌涵白净悠悠影碎疑衝斗光清耐掩舟珪璋分辨狀沙礫共懐柔願赴朝宗日縈廻入御溝同前鄭俞積水棊文動因知玉産幽如天涵素色侔地引方流潜潤滋雲起英華射浪浮魚龍泉不夜草木岸無秋璧沼寧堪比瑶池詎可儔若非懸可測誰復寄冥搜同前白居易良璞含章久寒泉徹底幽尹孚光泛泛集作灔灔方折浪悠悠凌亂波紋異縈迴水性柔似風摇淺瀬如集作疑月落清流潜頴應旁逹藏真豈上浮玉人如不記淪棄即千秋同前王鑑玉潤在中洲光臨碕岸幽氤氲冥瑞影演瀁度方流乍似輕漣合還疑駭浪収寅縁知有異洞徹信無儔比徳稱殊賞含輝處至柔沉淪如見念況乃屬時休同前杜元頴重泉生羙玉積水異常流如見清堪賞因知寶可幽斗廻虹氣見磬折紫光浮中矩諧明徳同方叶至柔月生偏共映風暖佇將遊異寶雖無脛逢時願俯収同前陳昌言明媚如懐玉竒姿自託幽白虹深不見緑水折空流方珏清沙遍縱横氣色浮類圭才有角冩月讓成鈎久處沉潜貴希當特達収㴞滔在何許掲厲願從游玉聲如樂劉軻玉叩能旋止人言與樂并繁音忽已闋雅韻詘然清珮想停仙歩泉疑咽夜聲曲終無異聽響極有餘情特達知難擬玲瓏豈易名崑山如可得一片佇為榮同前潘存實表質自堅貞因人一扣鳴静將金並響妙與樂同聲杳杳疑風送泠泠似曲成韻含湘瑟切音帯舜絃清不獨藏虹氣猶能暢物情后䕫如為聽從此振琤琤戛玉有餘聲管雄甫戛玉音難盡凝人思轉清依稀流戸牖髣髴在簷楹更逐松風起還將澗水并樂中和舊曲天際轉餘聲縹一作飄緲浮煙逺温柔入耳輕想如君子佩時得上堂鳴琢玉丁居晦卞玉何時獻初疑尚在荆琢來聞制器價衒勝連城虹氣衝天白雲浮入信貞珮為亷節德杯作侈奢名露璞方期辨雕文幸既成他山豈無石寧及此時呈同前浩虗舟已沐識堅貞應憐器未成輝山方可重散璞乍堪驚玷滅隳一作隨心正瑕消奪眼明琢磨虹氣在拂拭水容一作塵生賞翫冰光冷提携月魄輕佇當一作留親捧握瑚璉幸齊名水精環嚴維玉室符長慶環中得水精任圓循不極見素質仍貞信是天然瑞非因璞斵成無瑕勝玉美至潔過氷清未肯齊珉價寧同雜佩聲能銜任黄雀亦欲應時鳴亞父碎玉斗孟簡獻謀既我違積憤從心痗鴻門入巳迫赤帝時潜退寶位方苦競玉斗何情愛猶㸔虹氣凝詎惜冰姿碎而嗟大事返當起千里悔誰為西楚王坐見東城潰同前裴次元類詩作夷直雄謀竟不决寶玉將何愛倐爾霜刃揮颯然春冰碎飛光動旗幟散響驚環珮霜灑繡障前星流錦筵内圖王業已失為擄言空悔獨有青史中英風觀千載類詩作冠千載同前何儒亮嬴女昔觧網楚王有遺躅破闗既定秦碎首聞獻玉貞姿應刃散清響因風續匪狥切泥功將明懐璧辱莫量漢祖德空受項君朂事去見前心千秋渭水緑美玉南巨川抱玉將何適良工正在斯有瑕寧自掩匪石幸君知雕琢嗟成器緇磷志不移飾罇光宴賞入珮奉威儀象德曽留譽如虹竊可竒終希逢善價還得桂林枝西戎獻白玉環張惟儉當時無外守方物四夷通列土金河北朝天玉塞東自將荆璞比不與鄭環同正朔雖傳漢衣冠尚帯戎幸承提佩寵多媿琢磨功絶域知文教爭趨上國風白珪無玷辛宏片玉表堅貞逢時寶自呈色鮮同雪白光潤奪氷清皎皎無瑕玷鏘鏘有珮聲崑山標重價垂棘振香名抱璞心常苦全真道未行琢磨忻大匠還冀動連城金在鎔白行簡巨槖方鎔物洪鑪欲範金紫光㸔漸發赤氣望逾深燄熱晴雲變煙浮書景隂堅剛由我性鼔鑄任君心踴躍徒標異沉潜自可欽何當得成器待叩向知音清如玉壺氷王維玉壺何用好偏許素氷居集作藏氷玉壺裏水氷類方諸未共銷丹日還同照綺踈抱明中不隠含净外疑虗氣似庭霜積光含砌月餘曉凌飛鵲鏡宵映聚螢書若向貪夫集作夫君比貞集作清心定不餘集作如同前盧綸玉壺氷始結循吏政初成既有虛心鑒還如照膽清瑶池慙洞澈金鏡讓澄明氣若朝霜動形隨夜月盈臨人能不蔽待物本無情怯對圓光裏妍媸自此呈玉壺氷潘炎琰玉性惟堅成壺體更圓虛心含景象應物受寒泉温潤資天質清貞禀自然日融光乍散雪照色逾鮮至鑒功寧宰無私照豈偏明將氷鏡對白與粉花連拂拭終為美提携佇見傳勿令毫髮累遺恨鮑公篇同前失名𤣥律隂風勁堅氷在玉壺暗中花更出曉後色全無涸沍誰能伴凄清詎可渝任圓空似璧照物不成珠素質情方契孤明道豈殊幽人若相比還得詠生芻同前王季友玉壺知素結止水復中澄堅白能虚受清寒得自凝分形同曉鏡照物掩宵燈璧映圓光出人驚爽氣凌金罍何足貴瑶席幾㢠升正値求珪瓉提携共飲氷同前錢衆仲冬律初隂結寒氷貯玉壺霜姿雖異禀虹氣亦相符對月光冝並臨池影不孤貞堅方共濟同處豈殊途色瑩連城璧形分照乗珠提携今在此抱素節寧渝明堂火珠凌空類詩作天中霜月滿類詩作雙月合名都類詩作京都珠沈於淵寳契類詩作寶棄影似浮類詩作彩委塗光價憐類詩作髙價縁亡情類詩作忘情自為類詩作迴與文苑英華巻一百八十六
