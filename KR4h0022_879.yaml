body:
  text: 文苑英華卷八百八十宋李昉等編家廟一此下三卷英華所編失作者先後今正之崔太師家廟碑一首郭子儀元題作英乂非家廟碑一首烏氏家廟碑一首故中書令一作丞相贈太子太師崔公廟碑韓雲卿戊申年一作嵗六月尚書右一作左僕射趙國公圓薨天子罷朝三日喪禮贈賻加異常數䛇贈太子太師諡曰某唐書諡昭襄嗣子褒遵荷先訓敦率舊禮五月而葬二十五月而祥既祥一無此二字始立廟于一無于字洛邑曰考廟皇考廟階二尺有七寸一作二大有七從四尋衡八尋三尺一作户五一作立楹外垂四阿巧塓采掾一作綵繪不施一作施以丹艧齊宫㸑室庭垣稱之因述一作連族氏勳躅諸路一作清顯眀銘其德太師崔姓一作氏清一無此字河東武城人也系于齊著于漢荷先少師之教純孝溫重禀受元和緯武經文為國梁柱賊臣祿山憑犯河華𤣥宗順動南巡一作逰蜀漢公為居守有扶翊再造之勳函洛阻絶人罹蠆毒肅宗振旅朔郵戡一作殱靜禍亂公為宰衡有翼贊匡一作戡復之謀山越之難河泗之竟一作淮泗之疑公領楊州宣風淮楚有剪攘威鎮之績於惟茂勳莫與為匹一作茂勳盛業疇為公比禮曰以勞定國則祀之能禦大災則祀之能捍大患則祀之是宜廟食以銘于鼎以九月初朔之日寢廟既成庭除既平備器撰服潔儉中禮一作潔服備器儉而中禮先享七日致齊具物水草陸産醴酪牲牷之備外盡物也色溫行恐一作捥身詘一作屈意愈如懼不及內盡志也禮卒奠撤齊莊之色如存焉歎息之音如聞焉君子曰吾觀崔氏之享有以知褅嘗之義焉古者諸侯立五廟廟有鼎與樂有國之制侯伯有爵而無土廟有鼎祭有樂不克立五廟而立三廟不銘于鼎而銘于碑其銘曰顯顯太師天孕鴻才恢張碩勳光照台階一作輝輝衡台惟昔奸凶蝕恩一作飲息犯順乘一作當時無虞區域一作宇駭震𤣥宗南巡功著巴岷肅宗戡復勳揚册牘彌廓一作銷殄氛祲宣眀日月於惟太師誰將比烈爰自鼎司出鎮淮夷外有亂虜內有疑師欽和畏威逺邇來思於維太師為國藩維功以殱災勞以定國詳考祀典禮存廟食爰立寢廟不忘儉易卑不狹陋廣不踰制􅀈􅀈疑作毣毣漢鮑宣傳竭毣毣之思毣音沐謹願貌孝子愈愈其志齊莊慤誠庶物臻備爼豆斯設神將來暨嵗時迭移霜露荐至德流慶延昌庇後嗣從爰自至此文粹無郭子儀家廟碑顔真卿昔申伯翰周降福於維嶽仲父匡晉演慶於筮淮而猶見美詩人騰芳史册豈比夫神眀積髙之壤百二懸隔之都三峰發地而削成九流浮天而噴激炳靈育粹奕葉生賢括宇宙而禀和總河山而藴秀莫與京者其唯郭宗乎其先蓋出周之虢叔虢或為郭因而氏焉代為太原著姓漢有光祿大夫廣意生孟儒為馮翊太守子孫始自太原家焉後轉徙於華山之下故一族今為華州鄭縣人夫其築臺見師瘞子致養家承金穴之貴政有露晃之髙或哲或謀或肅或乂皆海有珠而鳥有鳳也閥閲之盛其流益光隋有金州司倉諱履球府君懋其德輝不憎下位克己復禮州邦化焉篤生唐凉州司法諱昶府君能世其業以伸其道逺近宗之不隕厥問生美源縣主簿贈兵部尚書通府君清識徹照博綜羣言始登王畿鬱有休稱道悠運促靡及貴仕垂于後昆沒而見尊是生我諱敬之府君幼而好仁長有全德身長八尺二寸行中潔矩聲如洪鐘河目電照虬鬚蝟􅀈進退閒雅望之若神以仲由之政事兼翁歸之文武始自涪州録事參軍轉瓜州司倉雍北府右果毅加遊擊將軍申王府典軍金吾府折衝兼左衛長上原州别駕遷扶州刺史未上除左衛威左郎將兼監牧南使渭吉二州刺史侍中牛仙客韙君清節奏授綏州遷夀州纍加中大夫䇿勳上柱國以天寶三載春正月十日遘疾終於京師常樂坊之私第春秋七十有八乾元三年春二月以公之寶𦙍開府儀同三司司徒兼中書令上集無上字柱國汾陽郡王曰子儀有大勳于王室乃下詔曰故中大夫夀州刺史郭敬之纍君子之行育達人之德才光文武政美中和生此大賢為我良弼頃以孽胡作亂黔首罹殃朕於是鬱興神武之師克掃攙搶之氣而子儀帥彼徑卒赫然先驅取京洛如拾遺剪凶殘猶振稿功存社稷澤潤生人是用寵洽哀榮義申存歿纍追贈太保於戲府君體含𢎞之素履秉冲邈之髙烈言必主於忠信行不違於直方清白為吏者之師死生敦交友之分端一之操不以夷險槩一作變其懷堅眀之姿不以雪霜易其令用情不間於踈逺泛愛莫遺於賤貧拳拳服膺終始靡二故所至則化所去見思人到于今稱之斯不朽矣傳曰盛德必百代祀其有後也宜哉恭惟令公先皇之佐命臣也少而美秀長而瓌儒姿性質直天然孝弟寬然無比騎射絶倫所蒞以清白見稱居常以經濟自命弱冠以邦鄉之賦驟膺將帥之舉四擢髙第有聲前朝三為將軍再守大郡纍典兵要必聞休績天寶末安祿山反於范陽令公以節度使擁朔方衆圍髙秀嚴唐書作巖於雲中破史思眀於嘉山先皇集無皇字帝之幸朔方赴行在于靈武擊同羅於河曲走崔乾祐于蒲坂今上之為元帥也首副旄鉞㑹回紇於扶風摧凶冦於汶水追餘孽於陕服長驅河洛弼成睿圗冉造生靈克清天步乂函夏之未乂安天下之未安一年之間區宇大定丕休哉徒觀其元和降精間氣生德感星辰而作輔應期運以濟時忠於國而孝於家威可畏而儀可象盛德繄物寬身厚下用人由己從善如流沈謀祕於鬼神精義貫於天地推赤誠而許國冒白刃以率先霆擊於雷雨之初鷹揚乎廟堂之上凡二歷鼎司兩升都座四作元帥九年中書歷事二聖厥德維懋易相二十而受遇益深蓋尅復上都者冉戡定東京者一其餘麾城搟邑得雋摧鋒亦非遽數之所周也信可謂王國之虓虎生人之廕庥者歟非太保之邁種不孤則何以鍾美若是况乎友于著睦矕龍虎者十人貽厥有光紆青紫者八九勳庸舉集今古莫儔昔奮號尊榮紅粟才霑於萬石惲家全盛朱輪不出於十人繇我觀之事不侔焉於是乎清廟之典所以仁祖考鴻伐之刻亦以垂子孫爰創制於舊居將永圗而觀德中堂有侐丕搆克崇感霜露而怵愓以增叙昭穆而敬恭斯在庶乎觀盥顒若既無斁於永懷入室僾然必有覿乎其位哀榮既極情禮用申仁人之所及逺哉孝子之事親終矣豈唯溫溫孔父逺稱讒鼎之銘穆穆魯侯獨美龍旗之祀其詞曰郭之皇祖肇之虢土逮乎後昆實守左輔徙華隂兮源長流光施于司倉凉州兵部克熾而昌載德深兮篤生太保允懋厥道神之聽之永錫難老式如金兮於穆令公汾陽啓封文經武緯訓徒徏空簡帝心兮含一不二格于天地愷悌君子邦之攸塈昭德音兮芝馥蘭芳羽儀公堂子子孫孫為龍為光鏘璆琳兮乃立新廟肅雍允邵神保是聽孝思孔昭亶居歆兮乃立髙碑盛德美㩼章移之鼓二切多也或作致非日月有既徽猷永垂映來今兮河陽軍節度使烏公先廟碑韓愈元和五年天子曰文粹作以盧從史始立議用師于恆乃隂與冦連夸謾凶驕出不遜之集本文粹無之字言其執以來其四月中貴人承璀即誘而縛之其下皆甲以出操兵趨譁牙門都將烏公重𦙍當軍門叱曰天子有命從者文粹無者字有賞敢違者誅二本作斬於是士皆斂兵還營卒致從使京師壬辰詔用烏公為銀青光祿大夫河陽軍節度使兼御史大夫封張掖郡開國公居三年河陽稱治詔贈其父工部尚書其以享廟四字二本作且曰以其廟享即以其年營廟于京師崇化里軍佐竊議曰先公既位常伯而先夫人無加命號名差卑於配不宜語聞詔贈先夫人劉氏沛國太夫人八年八月廟成三室同宇祀自左領府君而下作主于第乙己升于廟烏氏著于集作於春秋譜於世本列於姓苑在莒者存在齊者文粹無者字有餘有文粹無有字支鳴皆為大夫秦有獲為大官其後世之江南者家鄱陽縣處於二本無於字北者家張掖或入夷狄為君長唐初察為左武衛大將軍實張掖人其子曰令望為左領軍衛大將軍孫曰蒙為中郎將軍是生贈尚書諱承洽字某新唐書作承玭字重潤烏氏自莒齊秦大夫己二本作以來皆以才力顯及武德以來始以武功為名將軍二本作家開元中尚書管平盧先鋒軍屬二本作屢破奚契丹從戰捺祿走可汗渤海上文粹作走可突于渤海上韓文舉正云許孟客烏承玭碑作可突千又云渤海乃武藝也李邴本作渤海擾海上諸本脫擾海二字至馬都山吏民逃死二本作徙失業尚書領所部兵塞其道塹原纍石綿四百里深髙皆三丈冦不得進民還其居嵗罷運錢三千萬餘貫二本無此字黑水室韋以騎五千來屬麾下邉威益振二本無此字張其後與闕仁智謀說史思眀降思眀復叛尚書與兄承恩謀殺之事發族夷尚書獨走免李光弼嘉之二本作以聞詔拜冠軍將軍守右威衛將軍檢校殿中監封昌化郡王右領軍使積粟厲兵出入耕戰以疾去職貞元十一年二月丁已薨于華隂告平里年若干既集作即葬於其地二子大夫為長子集本無此字季曰重元為某官銘曰烏氏在唐有家於初左領右衛集作左武右領二祖紹居中郎少卑屬于尚書不償其效二本作勞乃相大夫授我戎節制有疆墟數備禮登二本作備禮登壇以有宗廟作廟天都以致其孝左祖右孫二本作右祖左宗爰饗其報云誰無子其有集作孰其無孫克文粹作光對無羞乃維有人念昔文粹作昔命平盧為艱為瘁大夫承之危不弃義四方其平士有怠息來覲來齊以饋黍稷文苑英華卷八百八十
