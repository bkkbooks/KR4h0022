body:
  text: 文苑英華巻五百八十九宋李昉等編公卿雜謝二為河東副元帥馬司徒謝實封表一首為桂府王中丞謝加朝議大夫表一首為太原鄭尚書謝賜旌節等表一首為太原李少尹謝上表一首謝兵馬使朱鄭等官表一首為昭義王大夫謝賜改名表一首謝賜光宅坊宅表一首謝授右拾遺表一首代李僕射謝加營田使表一首謝太常卿并舉自代表一首謝再除太常卿充禮儀使表一首東都留守謝上表一首謝除太常卿表一首代李中丞謝官表一首謝貸錢物表一首蘇州謝恩賜加章服表一首為河東副元帥馬司徒謝實封表徳宗崔元翰貞元元年臣燧言某月日中使某乙至伏奉手詔復以收河中功賜臣實封五百户通前為七百户功微賞重恩積生輕報効何階祗懼惟甚臣某誠惶誠恐稽首頓首臣頃奉詔與諸道同討逆賊上禀謨類表作謀筭克致誅夷越升類表作超授官榮真食户邑且有後命再荷殊私伏以聖徳結於人心皇威加於物表将帥克宣其力㐫逆盡一作咸伏其辜此皆國之福也至若分閫作藩秉旄仗節扞禦患難剪掃寇讎此固臣之職也幸無獲戾何以為功爵秩既崇封賞又重絲髮未効㳙塵莫施雖復捐軀豈能上答無任荷懼之至為桂府王中丞謝加朝議大夫表令狐楚臣某言伏奉某月日恩㫖南郊禮畢進加臣朝議大夫拜受嚴命感惕交集臣某中謝臣泗濵諸生塞上從事被䝉恩澤齒列才俊戴高履厚實有恧焉乃建子月伏惟皇帝陛下殷薦祖宗嚴禋天地而限從外役不侍中禁有望雲就日之戀無給薪除地之勞今者爵賞逺加寵榮俯及拾級以上早忝諸侯之秩歷階而昇又厠大夫之品峨峨象笏粲粲銀章自揆何人敢安非據伏以神光類表作休既擁王澤已流難申牢讓之心空秉益恭之禮無任慶幸屏營之至為太原鄭尚書謝賜旌節等表臣某言今月七日中使尹偕至伏奉敕書手詔慰喻一作問臣及将仕參佐等并賜臣官告旌節寵命併臨榮光疊至欽承捧受感惕難勝臣某中謝臣昔為諸一作書生所冀微祿揣摩鉛鈍際會清平伏惟皇帝陛下至德配天大一作文明並日朝有多士國無幸人若臣庸虚何足比数階緣所職被服殊私居郎吏之中已為饕竊立戎旃之下安所堪任前奉詔書除臣節度託肺腸而三省覺魂魄之九飛懇欵未申恩光薦至一作及使從天下拜迎而萬姓一作衆懽呼王在日中照臨而一方安㤗編綸言於寶軸揮宸翰於綵牋既賜諸侯之旌又降将軍之節委之刑賞許以便宜臣實何人忽䝉斯寵重如山壓薫若火炎無以為容不知自處謹以今日準敕拜受訖臣伏以旌唯進善節以詰姦昔常傳聞今即一作則祗受度才非将雖天地一作下所知禀令於君豈風塵敢犯誓當保安四境和叶三軍灑帝一作王澤於州閭振皇威於邉境一作徼難酬天造庶竭臣心所守有限不獲陳謝無感戴抃躍之至為太原李少尹謝上表臣某言伏奉恩㫖授臣太原少尹兼御史中丞充河東節度使行軍司馬祗承榮命以感以懼臣某中謝臣器質凡下行能無取父母生之陛下知之頃陷官謗會從吏議伏頼陛下聖明乃得全活既而肩隨多士掌領孤児警夜巡晝庶将終老跼天蹐地誓不違逺豈意陛下不量臣之能否㧞自近侍貳於大藩且御史丞執憲之任府少尹理民之官也軍司馬握兵之職也皆須率其屬以賛其長必國之良猶懼不稱况於疲病安所堪任此臣所以行思坐念常恐失墜以某月日到府上訖伏以太原建國興王大都嘵囂五氏合沓萬室動見指視甚難為理唯禀謨猷於廊廟同心力於幕府勤以臨事清而處身至若上分乃眷之憂下塞具瞻之望雖欲自勵終非所能離去殿階已彌旬月攀望不及腸廽目斷無任云云謝兵馬使朱鄭等官表初除御史續除中丞封異姓王劉禹錫臣某言奏事韋温廽特蒙聖恩重賜朱鄭等官告宸象昭囘煥然下燭榮分右職光賁遐藩臣某中謝臣伏以朱鄭朴忠為心沉毅見色當建封禦侮之寄見張愔建封子也提孩之年昨者𨽻職徐州分鎮蘄縣繹英華作驛非騷之際梗亮彌彰歷險而前實繁其旅詳探本末有足褒稱輙具奏聞恐須奨勸伏蒙睿鑒俯亮微誠優詔先行已階直指之日殊私荐至超昇獨坐之崇户領三千爵踰五等恩生非次感異常倫轅門有光武旅增氣遂使感激之士希男爵以捐軀猖狂之徒聆聖澤而悛性風行草偃其勢必然臣忝揔戎倍百欣荷臣無任云云為昭義王大夫謝賜改名表崔行先臣某言中使第五守進至伏奉今月日制命授臣開府儀同三司潞州大都督府司馬知府事充昭義軍節度營田澤潞刑洺等州觀察留後兼賜名處休雨露湛恩光臨非次蚳蝝𦕈質負戴難勝臣某中謝臣出一有身字自行間器識短淺理兵從衆問陣無師一心守愚六藝皆闕自謂才無經濟智乏周防吐誠託人損已待物毎日揣分有時撫膺徒生於此何以報主得免獲戾已足為榮敢求聞達妄進階級豈意陛下顥元合徳日月在躬敻開獨見之明特降發哀之詔㧞自泥滓致于煙霄臣之榮幸孰與為比伏以處休之義恭懿有章簡自帝心納于臣口自一作内訟增感以榮為憂魄散心殞罔知所措况名器所慎春秋格言服之不稱詩人是刺雖欲勿議誰能捨諸曩日劉𤣥佐之領浚郊李元諒之居關輔皆勲崇台揆業濟艱難方開加等之恩姑受錫名之寵臣何為者坐繼前人三省駑鉛未展㳙埃之効百身灰粉何酬天地之恩謝賜光宅坊宅表李揆臣某言中使某至奉宣聖㫖知臣無宅以光宅坊去内最近賜臣宅一區寵渥特臨喜懼交集臣某中謝臣自惟固陋謬忝恩私陛下收其璅材擢以宻職司言北闕已揮翰於紫垣秩禮南宫復彯纓於丹地故得廽翔三省出入九重此皆禀自宸𠂻不因人譽毛髮之内曾未報於生成雨露之恩猥有加於疵賤頃以寓居失火事忽聞天慈親垂恤問環堵之業雖有虧於魯經賜宅之人疑作仁遂承榮於漢詔况王人啓户大厦當衢顧蝼蟻而知慙迎鷰雀而相賀古制宫闕近地公卿不居唯信臣宻戚時聞詔賜所謂北闕甲第者蓋由逺近差之今宅在廟圖地近丹禁朝天不逺於咫尺捧日如奮於雲霄仰惟明主之恩實私微臣之幸䘖恩撫已尤懷戰跼誓當竭忠盡節鏤骨銘肌豈捉足而獲安誓捐驅以為報無任謝授右集作左下同拾遺表徳宗吕温貞元十九年臣某言伏奉制命擢集作授臣右拾遺又中使毛進朝至宅奉宣進㫖集作止賜臣本官官告集作告身者澤濡窮鱗雷起幽蟄塵忝近侍冠軼常倫震驚失圖兢跼罔據臣某中謝臣嘗學舊史承訓先臣皆以奉上自致為榮附下苟進為耻臣所以既孤之後義不因依集作依人賣洛中之集無此字薄田歸闕下之集無此字舊宅退藏其跡私誓于心不邀利于權門不求名于衆口星霜苦節夙夜精誠唯願投軀盛時自結明主愚誠神感人欲天從果䝉陛下自記姓名猥憐孤直振零丁於絶望㧞曖昧於無階獨斷皇明起至集作寘清列俯降中貴内賜官告特違恒例光寵賤臣俾其不出户庭坐生羽翼萬乘知已一鳴驚人公朝得盡節之方私室無謝恩之處顧惟凡陋集作質叨此殊尤纒激血誠銘鏤膚骨採㧞恩重泥塗感深畢性命以為期裂肝膽而何述唯當竭誠陳力効節明忠使丹心有孚白首無玷集作㸃然後敢望披雲捧日一識天顔則闔門之灰粉知歸百生之志願斯畢臣家雖在城多適田野久廢簮笏皆須營備不獲當時隨例拜謝闕庭代李僕射謝加營田使表崔位臣某言伏奉某月日敕以臣兼充當道營田使者捧受絲綸載驚載躍臣某中謝幸忝宗室沐浴恩波性惟直方官絶依倚凡忝任用皆自宸𠂻常思殺身以答鴻造所至之職勵精苦節茍可利人利國誠願悉心况西戎狡謀有備無患東都要害居安慮危俱屯偃革之師豈可不耕而食臣是以諭臨邊将士首建屯田董所屬軍人力開荒壤近為水旱之蓄逺減飛輓之勞臣之用心素切於此又背一作軍營衣賜乆費度支百方圓融三分全給在臣守土固合分憂此皆塵露至微豈於山海云益陛下曲垂天奬正以使名榮光荐加荷懼惟厲但當撫字鰥寡訓練貔貅克宣皇風底靖藩鎮庶申萬一少報生成臣所守有限不獲奔赴闕庭拜舞丹墀無任感恩隕越之至謝太常卿并舉官自代表徳宗高郢臣郢言伏奉今月二十七一作二日敕除臣太常卿曲降殊私猥被凡器非才荷寵聞命自驚臣聞太常者舜臣秩宗之任周室春官之職其所典者禮樂所奉者郊祠故班冠類表作班官九棘選重歷代臣學識凡近遭逢聖明管庫無遺久塵貢士之列疲駑不逮嘗獻避賢之䟽特蒙天鑒俯及容光煦嫗之仁允前請而既幸綢繆之寵沐今授而增忝将何以欽承睿奨備舉官司顧慙匪服之嗤上累能官之謗類表作咏恩深命淺報効無階伏準建中元年正月五日制常參官授訖上表讓一人自代者臣竊見銀青光祿大夫守太子賔客上柱國鄭縣開國公杜黄裳識度深逺志業忠厚達於大體練於故實羣而不黨和而不流與臣同在周行臣頗知其優裕伏請準制舉以自代臣郢無任感戴欣惕之至謝再除太常卿充禮儀使表憲宗臣郢言伏奉今月二十一日恩命除臣太常卿充禮儀使者累歳守藩毎馳心於魏闕一朝聞命得備位於周行上慙叨一作塵忝之深下慰違離之思臣某中謝臣聞秩宗之任典司三禮奉常之選班列九卿前古以來用人為重非有望實不宜謬居臣昔叨此官已積負乘之懼今復再歷倍增濡翼之憂况専職禮儀別蒙委遇明時大禮方奉郊禋末學謏聞何徵損益飲冰斯切俟駕靡一作匪遑螻蟻之微無階報國犬馬之戀但一作且喜歸朝臣不勝感戴欣懼之至東都留守謝上表憲宗權徳輿臣某言伏奉今月三日制命授臣檢校吏部尚書兼御史大夫充東都留守判東都尚書省事以今月二十四日到東都上訖榮渥特加寵光備至俯仰印綬慙懼交懷臣某中謝臣才不出衆祿期代耕因緣文字進越名級自聖明臨御特沐鴻私歷五曹之貳居九卿之長遂叨大任忽涉四年智慮孱愚言辭朴訥徒淹嵗日莫展㳙埃雖竭匪躬之誠竟乖陳力之効自免樞務猶忝春官纔經半嵗復授今任前後所歷皆不因人無非睿奨以至崇大况留集作居守所寄東夏式瞻在君陳畢公之選兼天官憲府之重面辭之日親奉聖謩式遏匪人整訓戎事用制竊發必資兼材豈臣懦薄所宜負荷今兵力至微武備不足此皆天鑒所察臣不敢累黷聦明杜其奸情亦在早計必冀磨礪鉛鈍罄竭肝心忠以事君死而後已違離宸睠感戀闕庭以陛下注意之恩誓微臣捐軀之節無任荷戴屏營之至謹差押衙試殿中監成黨奉表以聞臣某誠惶誠恐頓首頓首謹言元和八年七月二十四日謝除太常卿表憲宗臣某言伏奉十月二十四日詔命除臣太常卿統和神人典司禮樂臣實庸菲謬叨寵榮臣某誠惶誠恐頓首頓首臣以書生凡輩懦薄無堪生遇昌期累膺爵秩四掌誥命五居列曹遂叨禮卿乃佩相印竟無微效上荅皇明自罷宰司再履宗伯旋忝保釐之任屬當憂寄之時淮甸多虞周郊接壤上勞聖慮下輯戎師臣不敢愛身不敢避事頻抗手疏備陳物宜猶集作苟披肺肝莫識忌諱自承詔㫖許募新軍實使懦夫增氣輙思仁者有勇繕脩器甲招集驍雄毎竭一心敢有二事陛下憂臣不逮全度特深出於殊私遽降新命沐浴皇澤從容大僚量力無庸庇身何幸况太常者伯夷叔孫通之職臣豈其人五六年間再居此地感恩知懼循分難任即以今月三日進發瞻望闕庭踴躍欣抃謹奉表陳謝以聞無任感戴喜懼之至臣某誠惶誠恐頓首頓首謹言代李中丞謝官表元稹臣某言伏奉今月二十九日敕集作制授臣御史中丞寵秩逾涯心魂戰越臣某中謝臣生值聖時蔭分天属雖牽絲入仕或因𤨏碎之文而執簡當朝實由睦族而致頃以材駑氣直屢棄遐荒陛下擢自藩方集作逺藩任兼䑓閣夙夜循省報効無階豈謂天眷曲臨過䝉奨擢集作㧞坐令専席位忝中司因期集作固當陳乞於天安敢叨榮於已如或綸言既降丹慊莫從則當破柱求奸碎首請事死而後已義不茍然增日月之未光荅天地之殊造無任懇欵屏營之至謝貸錢物表劉禹錫臣某言中使南宫懷珍至奉宣聖㫖存問兼賜臣墨詔天光下濟睿澤曲流䘖恩未酬居寵彌懼臣某中謝臣受任斯極微功莫施昨以封畧未寧干戈猶動壽春固壘以備盜淮甸興師以扞姦經費所資數盈鉅萬餽餉時久供億力殫慮始圖終不敢緘黙輙陳管見上黷宸聦伏䝉聖慈特遂誠精逺承如綍之㫖特假聚人之財軍須不愆士氣彌振糗粮既備永無半菽之虞𥜗袴足頒逺起挾纊之感是為恱使咸願先登臣忝緫戎倍百欣荷伏以上分國用俯濟軍興候清烟塵謹備償納蘇州謝恩賜加章服表文宗臣某言伏奉去年十一月二十七日詔書加臣賜紫金魚袋餘如故者恩降重霄榮霑陋質既集作虚黷陟明之典恐興彼已之詩寵過若驚喜深生懼臣某中謝臣起自書生業文入仕徳宗朝為御史以孤直在䑓順宗朝為郎官以緣累出省憲宗皇帝後知其寃枉特降敕書追赴京國緣有虚稱恐居清班務進者争先上封者潜毁巧言易信孤憤難申俄復一麾外轉三郡伏遇陛下應期御宇大振滯淹哀臣宿舊猥見收拾職兼書殿官忝儀曹微績集作勞未宣薄命多故又離省署重領郡符延英面辭親承敎誨銜命即路星言載馳到任之初便逢灾疫奉宣聖澤恭守詔條上禀睿謨下求人瘼才術雖短憂勞則深幸免流離漸臻完復皆承聖化所及遂使人心獲安豈由微臣薄劣能致臣素乏親黨家本孤貧年衰無酒色之娛性拙無愽奕之藝自理集作領大郡又逢時灾晝夜苦心寢食忘味曽經讒集作誣毁毎事防虞唯托神明更無媒援豈期片善上逹宸聦廽日月之重光燭江湘之下國絲綸褒異苦節既彰印綬煒煌老容如少望雲天而拜舞豈盡丹誠視環玦以徘徊空嗟白首無任感激屏營之至文苑英華卷五百八十九
