body:
  text: 文苑英華卷三十六宋李昉等編水五雙瀵泉賦一首䝉泉賦一首娥女泉賦一首舒姑泉賦一首廬山雲液泉賦一首望瀑泉賦一首飲貪泉賦一首性猶湍水賦一首割鴻溝賦一首雙瀵泉賦以泉澄水徹皎鏡春冬為韻王潭呀厚地而濫涌者有河東之瀵泉拆隂開竇沃日浮天初汨沒圓衝拂高湍於柔祗之下復逶迤逺注散餘波於馮夷之川為神龍窟宅之上而致美為隂陽蓄泄之所而通𤣥將海日泓浤而昭此豈坤儀挺拔以隳焉來何所以去何所止始開雙瀵發輝於汾魏之郊竟助洪流歸潮於渤澥之水借如夜色初升空光下凝繁星映而珠滿新月入而鈎澄洎乎風駭霧勃煙涌雲蒸則有鬼神倐閃以恍惚蛟螭鼓怒以噴騰異物之與詭怪孰可得而備徵意以為潜虛洞决脉流派別雖一河有隔終隂隲以相連故數眼分開涵碧虛而共潔未見徹字官韻是以百尺澄兮四空皛珠胎明兮沙岸皎洗拂煙埃蕩漾魚鳥亦能凉生朱夏氣暖𤣥冬守謙下以含道順畎澮以利農道則以物為賔水則假利於春人有情於利水水無意以求人人之自僞我豈非真故至人以水為德以心為鏡鏡雖明不利於人故瀵之為澤也廣泉之為鑒也淨若壅而閉則澤不能及物混而濁則鑒不能自正故選士者象淸瀵以含虛懷才者但明心而未映苟能酌憲於兹泉則可以相鹽梅而翼聖汨沒一作汨滑珠胎明兮一作燦珠胎兮䝉泉賦李程䝉彼東山山下有泉運未逢於畎澮色空積於澄鮮虛明可鑒淡濘自然宜習坎以為德胡止艮而莫前士有酌而歎曰惟水之義萬物之利顧導逹之或闕將灌注而奚遂朝宗路阻未歸朝夕之池潤下功微空浸尋常之地且夫壅則止理則通能致逺邇任決西東荷四氣之平均潜生麗藻處重隂而蒙蔽尚隔清風亦有舒女化而稱異耿恭感而成功彼皆因人而有託此獨居然而在䝉懿其滿而不盈卑以自處岷山未測且覩濫觴之時滄浪是期終異濯纓之所性則全柔德無與儔能載清而載濁諒可泳而可游將注江湖終有希於上善未分涇渭誠無惡於下流嗟止水之奚匹念發源兮在斯當其一勺而可挹豈待成川而後知儻理水之有便諒餘波而可期他日敢以勝載之力冀禆舟楫之時娥女泉賦并序李䝉泉在寧陽城南二里古老傳稱娥女美容色善歌舞度曲此地化為泉生於巖石間垂灑如淚故云耳水之裔巖之偏孌彼娥女瀏為氿泉伊昔巧笑淑靈濃華艷色赬唇發而寥亮素袖盤而掩抑故能傾北方掩南國超俗絶世神窮化極於是淒兮雨濕黯兮雲沉銷玉貌與紈質冶瓊姿及蕙心舞成水態歌入流音臉眇眇以波盡眉娟娟而月深觀其岸草翠積崖苔綺映列山光以泛艷懸樹色而涵靜引耀氷玉貞明石鏡能含上善之心不改至柔之性若乃蠲祀典戒良辰蘋藻前奠笙竽下陳莫不淋漓玉集滴瀝珠新聲嗚咽而成韻淚闌干而向人及夫嚴風嵗晚熾景炎節水壯河沉流枯海絶則必濕溜冬泛寒光夏冽異黃泉之下冥殊遊水之東閲噫化將云盡奚假物而獨靈道或既存雖得仁而何懟靡度可持此句疑安知榮悴望神光兮水潜鑒化跡兮山閟搴杜若以誰與弄潺湲而增思舒姑泉賦以記云舒氏女化為泉為韻浩虛舟漂水之上蓋山之前昔有處女化為澄泉瞻風而艷色如在責實而寒流宛然原夫曠別幽室暗悲韶年顧容華之莫守望世人而都捐儼弱質以徐來顔猶灼灼委貞姿而色動聲已涓涓眷戀無心凄凉故地念嬋娟之可惜驚變化而殊異俯視清流託誠幽意陳玩習而斯在庶精魂之能記素鱗赬尾渾非舊日之容急管繁絃徒盡平生之志既而水府潜處幽𡨕既分凝情而淑斂寒色冶態而波生細紋泛浮影於中流遙疑嫋嫋逗鳴湍於別派遠若云云由是鱗甲與遊綺羅長阻迷緑沼之回復忘紅樓之處所源通湘渚寫幽恨於靈妃流逹漢臯導春心於遊女净色含虛清輝皎如烟凝泪以香起苕斕斑而錦舒浦水光搖似動橫波之末岸莎風靡如存鬢髮之餘想夫紈質已銷隂靈未謝濯衣彩於花晝洗鏡光於月夜泠泠不濁殊畫地而俄成潏潏無窮類拜井而潜化且靜而淸者水之宜柔而順者女之為憶朱顔之婉娩柔碧溜之逶迤浮沫粉聚懸流淚垂泛萍藻而翠翹零落動菰蒲而緑帶參差及夫亂草丰茸古墟荒毁雜泥沙之汨沒蔽音容之妖靡至今閭里之人空傳其名氏廬山雲液泉賦并序吳筠筠所居之東嶺其側有泉洪纎如指冬夏若一山少凡石至多雲母其水色白味甘且滑此則雲母滋液所致因名雲液之泉乃結宇其旁引於軒廡之下既飲既潄永玩無斁今兹夏季不雨至於十月江湖耗井澗涸此泉泠泠不减乎昔懿其若是爰以作賦坤元孕氣潜暢成泉冠五行之首為萬物之先爰有清泚出此山側處蒙險以難知猶井泄之不食我搜靈祕載披載登見其地僻至潔源深有恆凝寒不為之損暑雨不為之增乃考室以飲而樂在枕肱井侔𤣥玉之膏滴乃雲華之液疚可蠲生可益引充狎玩惟意所適懸之則素皎壅之則澄碧晝浮光以悠揚夜含響以淅瀝隂陽為災水旱失節不雨炎夏暨乎𤣥月汪汪洪波久已竭耿耿瀑布今已絶挫江湖之浩蕩沉澗谷之微劣斯泉秉彛毫纎無虧雖逺不霑惠而近有所滋彼淜湃於疇昔豈不慙㳙㳙於此時夫醴泉無源而易涸丹溜乍見而難挹曷若止以為鑒酌焉取給何異神仙之瀵帝臺之漿涌異域之表湛無人之鄉茲亦標竒於絶境真可謂靈而長者也望瀑泉賦李華曙無雲兮川無波泛余舟於空碧彼廬山浮重湖之上兮峩極天之峻壁凝黛色之深明噫林嶺之岑寂何神造之杳冥躍騰泉於山脊孤流皎皎于蒼梁翠淙千仭兮懸帛玉繩縋於寥天銀河垂於廣澤㫪風雷兮篩霜雪穿重雲而下射白龍倒飲於平湖若天地之初闢委滔滔兮東迤詎知夫維今之在昔何倚高帆而一望豁余心兮灑滌近古有鴈門上德兮昭洗塵昏柴桑閒士兮捨印推尊靈境殊象詮微究源人已古兮山在泉無心兮道存將默貫於精極欲置之而不言飲貪泉賦以言飲此泉心終不易為韻胡權吳隱之擁節南海停驂石門遇貪泉之廣陌若㫖酒於汙樽由是徵圖籍所載考耆舊之言云注茲而難窮地理或飲者而能移性原公乃斯言已察其事惟審十目所視表執心而不回一勺之多遂舉杯而就飲重言曰所執在我寧由此泉瀉泠泠而反同潔已持惴惴而過甚防川恬淡相資漸滂沱於德澤清亷是守何汨沒於情田將正浮俗而去彼覩濫觴而在此臨川而不覺起豫命酌而甘從率爾盈科即挹聊抒思以盤桓健筆忽飛寫緣情之綺靡既而威臨俗鎮塵靜邊空闔境而皆知嚮化四方而靡不趣風量比滄溟能控清而引濁心如白水可原始而要終當其境接遐荒郡惟幽僻山川而多含瘴霧草木而少蒙膏澤道之云遠人不願適公藏器以俟時方遇君之側席泉云飲而名乃益彰心秉直而誓當不易則知貞清特立瑕穢莫侵人飲酒而蕩志我飲泉而洗心胡不誇於一石而不愧於千金于以明好惡定能否不貪為寶而可憐疑不飲盜泉而非偶懿哉君子之鴻名竹帛永垂於不朽性猶湍水賦以性之為善猶水趨下為韻吳冽人立性兮誠明為本水激湍兮動直惟柔將以遊心於淡故其從善如流天理斯在坎德可求謂置懷而必將流惡同赴勢而咸得處休至人之情唯當浩浩君子之道所以猶猶原夫性本皆善誘成遷化湍有常行决而上下得其道則致和平汨其流遂成姦詐故聖人行當順動義不詭隨欲㴞㴞而處下逾潔將渺渺而致遠不疲順意周流誠隨波而遷染由衷激發庶合道以云為託以洗心從之潔已尊派別脉分之要道守滌瑕蕩穢之至理符老君之立教心乃善泉同太史之奏言德方在水勢雖相近意當一揆法潤下流謙之迹莫非有為為之愛漂沙宕石之功是皆景行行止心源洞適德澤潜敷在審思其决泄豈求潤於霑濡遠近相沿宛見為仁由已始終共濟足見循道而趨不然則喪其貞失其正動必旁午志皆紛競安能使通逹為無滯之姿禀受成善利之性德如毛而轉潤行有葉而逾滋心鏡之前若光明而上下察也情田之內同淡汨而左右流之懿其義戒中人事標前典是明各有原本不可遷移豈徒虛閲波瀾以方清淺若然者信乎孟子之言所謂懲惡而勸善割鴻溝賦以割土開城去存深跡為韻侯圭龍爭虎鬪兮萬象交奔鏃盡兵窮兮白日猶昏潜豹略而久困割鴻溝而兩存臨屹屹之重關平分海嶽指遙遙之一水畫斷乾坤秦之末世也鹿走中原人殃下土天垂不定之氣代作分爭之主皆欲呵叱羣類鞭笞萬宇或功侔擘嶽掃氛祲以將清或力並觸山缺穹昊一作旻而未補爭馳羽檄欲定雲雷共假長山之隔濶請如橫漢以昭回劈六合以中裂割八紘而半開於是對戢雄稜俱停執馭盟高岸以斜指約中流而內據霜戈雪刃擁雲陳以東歸火幟虹旗扶日輪而西去險隘瓜剖深沉帶橫兩曜而寧休暈蝕重宵而未落攙搶晋魏周韓出地表而共宗函谷燕齊楚越徹天涯而盡屬彭城池塹彌堅人煙漸隔瘡痍詎息於餘略兵甲俄循於舊跡孤軍外鎖截南北於千城萬馬重來併華夷於一擲由是霾隂再合霆霹交侵彊者功淺弱者機深空欲限溝洫之迢遰閉關河之阻尋分地理而不分天理割波心而不割人心及夫垓下之劔不還江上之師莫遏始知鳯閣之難處徒想鴻溝之獨割至今京索之原古津空濶文苑英華卷三十六
