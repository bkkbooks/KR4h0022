body:
  text: 文苑英華卷六百九十宋李昉等編舉薦下上宣州高大夫書一首經史上陳高祖置學書一首上周太祖書一首答劉秀才書一首與史館韓郎中書一首論鄉飲酒禮書一首移史館書一首復友生論文書一首請韓文公配饗太學書一首請孟子為學科書一首移成均博士書一首舉薦下上宣州髙大夫書杜牧某頓首冉拜自去嵗前五年執事者上言云科第之選宜與寒士凡為子弟議一作義不可進熟於上耳固於上心上持下執堅如金石為子弟者魚潜鼠遁無入仕路牧竊感之科第之設聖祖神宗所以選賢才也豈計子弟與寒士也古之急於士者取盜取讐取於夷狄豈計其所由來况國家設取士之科而使子弟不得由之若以科第之徒浮華輕薄不可任以為治則國朝自房梁公已降有大功立大節率多科第人也若以子弟生於膏粱不知理道不可與美名不令得美士則自堯已降聖人賢人率多子弟凡此數者進退取捨無所依據牧所以憤悶而不曉也堯天子子也禹公子也文王諸侯孫與子也武王文王子也周公文王之子武王之弟也夫子天子裔孫宋公六代大夫子也春秋時列國有其社稷各數百年其良臣多出公族及卿大夫子孫也魯之季友季文子叔孫穆子叔孫昭子孟獻子皆出於三桓也臧文仲武仲出於公子彄栁下惠出於公子無駭諸侯稱公子公子之子稱公孫公孫之子稱公族以王父字為氏展禽是也宋之良臣多出於戴桓武莊之族也舉其尤者華元子罕向戌是也衛之良臣亦公族及卿大夫之裔也舉其尤者公子荆公叔發公子朝皆公族也子鮮公子也史狗史魚寧武子卿大夫之裔也齊之晏嬰桓子子也曹之子臧公子也吳之季札王子也鄭之良臣皆公孫公族也舉其尤者子封子良子罕子展子皮子産子張子太叔是也楚之良臣子囊子西子期皆王子也子庚王孫也其卿大夫之裔鬪氏生令尹子文後有鬪辛鬪巢鬪懷昭王反國皆有大功蒍氏生蒍賈孫叔敖蒍艾也薳啓疆薳子慿薳掩薳罷屈氏生屈蕩屈到屈建六國時有昭奚恤公族也屈原諸屈後也皆其祖先於武王文王時基楚國為霸者用其子孫其社稷垂九百餘年至於晉國最為强其賢臣尤多有趙氏魏氏韓氏狐氏中行氏范氏荀氏羊舌氏欒氏郤氏祁氏其先皆武公獻公文公勤勞臣也用其子弟召諸侯而盟之者僅三百年在六國齊之孟嘗趙之平原魏之信陵皆王子王孫也齊復有司馬穰苴亦王族也其在漢魏已下至於國朝公族之子弟卿大夫之胄裔書於史氏為偉人者不可勝數不可殫二字集作知論聖賢才能於子弟中復何如也言科第浮華輕薄不可任用則國朝房梁公𤣥齡進士也相太宗凡二十一年為唐宗臣比之伊吕周召者郝公處俊亦進士也為宰相時高宗欲遜位與武后處俊曰天下者高祖太宗之天下非陛下之有但可傳之子孫不可私以與后高宗因止來濟上官儀李𤣥義皆進士也後為宰相濟助長孫太尉禇河南共摧武后者后突厥入塞免胄戰死儀草集粹並作革字廢武后詔集粹並作召非𤣥義助處俊言不可以位與武後婁侍中師德亦進士也吐蕃强盛為監察御史以紅抹額應猛士詔躬衣皮袴率士屯田積穀八百萬石二十四年西征兵不乏食薦狄公為相取中宗於房陵立為太子漢陽王張公柬之亦進士也年八十為相驅致四王手提社稷上還中宗郭代公元振亦進士也鎮凉州僅十五年北却突厥西走吐蕃制地一萬里握兵三十萬武氏惕息不敢移唐社稷魏公知古亦進士也為宰相廢太平公主謀以佐𤣥宗及卒也宋開府哭之曰叔向古之遺直子産古之遺愛兼而有者其魏公乎姚梁公元崇登第下筆成章舉首佐𤣥宗起中興業凡三十年天下幾無一人之獄宋開府璟亦進士也與姚唱和致開元太平者劉幽求登制䇿科與𤣥宗徒步誅韋氏立睿宗者蘇氏父子皆進士也大許公為相於武后朝酷吏中不失其正於中宗朝誅反賊鄭普思於韋后黨中小許公佐𤣥宗朝號為蘇宋張燕公說登制䇿科張易之兄弟贊睿宗請𤣥宗監國竟誅太平公主招置文學士開內學館𤣥宗好尚書古封集本文粹有中字太山祀后土因燕公也張曲江九齡亦進士也排李林甫牛仙客罵張守圭不斬安祿山請集本文粹作謫老南服年未七十張巡亦進士也凡三入判等以兵九千守睢陽城凡周嵗拒賊十三萬兵出天寶雜記使賊不能東進尺寸以全江淮元和中宰相河東司空文粹作司徒公文粹作兼中書令裴公皆進士也裴公仍冉得宏詞制䇿科當貞元時河北背一作皆叛齊蔡亦叛集本文粹有借此二字蜀亦叛吳亦叛其他未叛者皆高下其目熟視朝廷希嚮強弱而施其所為司空公始相憲宗廢權幸之機牙令不得張收斂百職歸於有司命節度使出於集本文粹無於字朝廷不由兵士始自撫州除袁相為滑州滑州凡三月無帥三軍無事憲宗始信之自此不用貞元故事以行軍副使大將軍為節度使也拔取沉滯各還其官開州取唐舍人為職方郎中知制誥饒州取李趙公為考功郎中知制誥在貞元中皆十餘年遷逐其他似謫者亦皆當叙用然後西取蜀東取吳天下仰首始見白日裴公撫安魏博使田氏盡歸六州四字集作盡忠元和中翦蔡劇賊於洛師脅下招來常山質其二子以纍其心取十三城使不得與齊交手為冦因誅師道河南盡平當是時天下幾至於太平凡此十九公皆國家與之存亡安危治亂者不知科第之選復何如也至於智效一官忠立一節德行文學不可悉數董生云春秋之義變古則譏之傅說命髙宗曰監于先王成憲以集作其永無愆故殷道復興鴻鴈美周宣王能復先王之道西漢魏相佐漢宣帝為中興但能奉行漢家故事姚梁公佐𤣥宗亦以務舉貞觀之法則集本文粹作制耳自古及今未有背本棄古而能致治者昨獲覽三郎秀才新文凡十篇數日在手讀之不倦其㫖意所尚皆本仁義而歸忠信加以詞彩遒茂皎無塵土况有誠眀長厚之譽於千人中儻使前五六年得進士第今可以出入諫官御史助眀天子為治矣古人云三月不仕則相弔安有凡五六年來選取進士施設網罟如防盜賊言子弟者噎啞抑鬱思一解布衣與下士齒厥路無由於古未前聞也牧因覽三郎文章不覺發憤略言大慨干觸尊重無任惶懼牧冉拜經史上陳高祖置學書沈不害天嘉初臣聞立人建國莫尚於尊儒成俗化民必崇於教學故東膠西序事隆乎三代環林璧水業成於兩京自淳源既逺澆風以扇物之感人無窮人之逐物一作欲無節是知施設訓範一作是以設訓垂範啓導心靈譬彼染藍類諸琢玉然後人倫以正一作睦卑高有序忠孝之理既眀君臣之道攸固執禮自基魯公所以難侮歌樂已細鄭伯於前知一作是前亡干戚舞而有苗至泮宫成而淮夷服長想洙泗之風載懷淹稷之盛有國有家莫不尚已梁太清季年數鍾否剝戎狄外侵姦回內奰朝振一作聞鼓鼙夕照烽火鴻儒碩學解散甚於坑夷五典九缺湮滅逾於灰燼一作逾乎惟蓋蓋成均自斯墜業瞽宗於是不修褒成之祠不一作弗陳祼享釋菜之禮無稱爼豆頌聲寂寞遂逾一紀後生敦恱不見函丈之儀晚學鑽仰徒深倚席之歎陛下繼歷馭一作升統握籙臨㝢道洽寰中威加無外濁流已清重氛載廓含生熙阜品庶咸亨宜其𢎞振禮樂建立庠序式稽古典行一作紓迹儒官選公卿門子皆入於學助教博士朝夕講肄使擔簦負笈鏘鏘接袵方領矩步濟濟成林如切如磋聞詩聞禮一年可以倍功三冬於是足用故能擢秀雄州揚廷觀國入仕登朝資優學以自輔蒞官從政有經業以治身輜駕列廷青紫拾地古者王世子之貴猶與國子齒降及漢儲兹禮不墜暨乎兩晉斯事彌隆蓋所以見師嚴而道尊者也皇太子天縱生知無待審喻猶宜晦迹俯同傳經請業奠爵前師肅若舊典昔闕里之堂草萊自闢舊宅之內絲竹流音前聖遺烈深以相戒况復江表無虞海外有截豈得不開闢一作聞大猷恢𢎞至道寧可使𤣥教儒風弗興聖世盛德大業遂藴堯年臣末學小生詞無足算一作算輕獻瞽言伏追悚汗一作悚惕一作皆陳書本傳上周太祖書栁虬古者人君立史官非但記事而已蓋所以為鍳誡也動則左史書之言則右史書之彰善疸惡以樹風聲南史抗節表崔杼之罪董狐書法眀趙盾之愆是知執周書作直筆於朝其來久矣而漢魏已還密為記注徒聞後世無益當時非所謂將順其美匡救其惡者也且著述之人密書其事縱能直筆人莫之知北史作知之何止物生橫議亦自異端互起故班固致受金之名陳夀有求米之論著漢魏者非一氏造晉史者至數家後代紛紜莫知凖的伏惟陛下則天稽古勞心庶政開誹謗之路納忠讜之言諸史官記事者請皆當朝顯言其狀然後付之史館北史作閣庶令是非眀著得失無隱聞善者曰修有過者知懼敢以愚管輕冒上聞乞以瞽言訪之衆議答劉秀才書韓愈六月九日韓愈白秀才劉君足下辱聞見愛教勉以所宜務敢不拜賜愚以為凡史氏褒貶大法春秋已備之矣後之作者在據事跡實録蜀本有實録字則善惡自見蜀本有矣字然此尚非淺陋偷惰者所能就况褒貶耶孔子聖人作春秋辱於魯衛陳宋齊楚卒不遇而死齊太史氏兄弟幾盡左丘眀紀春秋時事是以失眀司馬遷作史記刑誅班固瘦死陳夀起又廢卒亦無所至王隱謗退死家習鑿齒無一足崔浩范曄亦族亦蜀本作赤誅魏收天絶宋孝王誅死足下所稱吳兢亦不聞身貴而其後有聞也夫為史者不有人禍則有天刑豈可不畏懼而輕為之哉唐有天下二百年矣聖君賢相相踵其餘文武之士立功名跨越前後者不可勝數豈一人卒蜀本叠卒字能紀而傳之耶僕年志已就衰退不可自敦率蜀本作敢為宰相知其無他才能不足用哀其老窮齟齬無所合不欲令四海內有戚戚者猥言之上茍加一職榮之耳非必督責迫促令就集有其字功役也賤不敢逆盛指行且謀引去且傳云聞見不同善惡隨人所見甚者附黨憎愛不同巧造言語鑿空構立善惡事跡於今何所承受取信而可草草作傳記令傳一無三字萬世集有乎字若無鬼神豈可不自慙懼一作豈不自心慙愧若有鬼神將不禍人僕雖騃亦粗知自愛實不敢率爾為也夫聖唐巨跡及賢士大夫事皆磊磊一作磊落披天决地集作地决必不沉沒今館中非無人必將一作將必有作者勤而缺之耳後生可畏安知不在足下亦宜勉之愈頓首與史館韓郎中書元稹郎中退之足下􅍬前與集本文粹作與前襄州文學掾甄逢遊善逢故刑部郎中集作員外郎濟之子濟天寶中隱於衛之青巖山採訪使苖公等五人皆以狀薦凡十徵不起末以左拾遺就拜之適集有值字祿山朝奏京城集作師懇於上前求為賔介𤣥宗可其奏祿山還至衛縣遣太守鄭遵意詣山中致命輟行信宿以俟之甄生懼其難免俯首從事至天寶十二載祿山反狀潜兆虞不得脫文粹作免乃僞喑集作瘖其口復隱青巖踰年而祿山叛即日遣僞節度使蔡希德緘刃逼召且曰或不可強斬首來狥既而甄生噤閉無言延頸承刃氣和色定若甘心然希德義而捨之祿山亦終不能致慶緒繼逆虜而囚之於東都安國觀代宗復洛甄生卧匡床詣元帥府至則號撲集作摽自治代宗為之動色遂命傳置長安肅宗高其行因授館於三司治所令從賊官囚慙拜之受汙者莫不俯伏仰歎時恨不即死於其地且夫辨所從於居易之時堅直操於利人之際而猶褊淺選耎者之所不為蓋拂人之心難而害已之避深也况乎天下亂矣王澤竭矣死忠者不必顯從亂者不必誅而能集本文粹作日眷眷本朝甘心白刃難矣哉是以治平則為公為卿為鵷為鷺世變則為蛇為豕為獍為梟者十恆一作常八九焉若甄生冕辨不加於其身祿食不進於其口於天寶末蓋青巖一男子耳及亂則延頸承刃分死不回不以不顯而廢忠不以不誅而從亂參合古今之士蓋萬一焉􅍬嘗讀注記缺而未書謹備所聞蓋欲執事者編此義烈以蒸蒸集本文粹作永永於來世耳子逢始生之嵗顔太保崔太傅皆為歌詩以美賢人之有後且述集作序甄生之本末云及逢既長耕先人之集無之字舊田於襄之宜城讀書為文不詣州里嵗饉則力穡節用以給足於親族嵗穰則施餘於集本文粹有其字鄰里鄉黨之不能自持者前後斥家財排患難於朋友者數四由是以義聞襄之守狀為文學始就羈為集作於吏職􅍬聞風既久因與之遊逢每寃其父之名不在於史將欲抱所寃詣彼集無彼字京師告訴於司史氏蓋行有日矣以愚料之甄子文粹作生僕短馬疲集作瘦言簡文粹作約行孤將集作得不為驕閽之所排則權力者疑誕文粹作遲疑以臨之固無自而入矣因曉甄生以無自入之勢且告以執其事者辱與􅍬遊願得所寃之狀告甄生厚相信待由是輟行既而自思滓賤之中猶願貢所聞於執事得非愚且僣焉然而誚笑之下集本文粹作暇幸垂察焉不宣元􅍬冉拜江南論鄉飲酒禮書劉蛻昨日送貢士堂上得觀大禮之器見籩豆集作爼破折樽盂穿漏生徒倦怠不稱其服賔主向背不習其容嗚呼天下所以知尊君敬長小所以事大者抑非其道乎天下之用其道嵗不過於一日尚猶偷惰如此况天下尊君敬長能終日者乎是以朝廷時誅不順鄉里日起紛爭固當然也夫布衣匹夫始則用其道自達故化耕稼為王侯化陶漁為公卿其變化不測若此然而一旦居上位既不預興俯拜揖之事尚不能素嚴有司時閲其威儀乎嗚呼則蛻謂王公大人耆集作耄老衰罷固當然也然而有擎跽稽首於髠褐之前畏敬戒慎有終日不敢嗜酒肴不敢近妾婦者其於誣惑之道尚能去其情自化之術則不能一日勤其容唯王公大人無慙髠褐乎髠褐尚能自大其法王公大人反以其道信之乎即其奉髠褐能速化其耕稼陶漁者則髠褐者可以有土地而制王公大人矣是不知升乎科者不由夷狄言遷乎資者不由髠褐援集作授昭昭然奈何哉抑不知孔子之道如商君乎以其法自弊也伏惟閣下務速有司按諸禮圗修其器服戒將事而隳一墮作者時訓習之毋使每嵗臨事而墮其容幸甚幸甚蛻冉拜移史館書蛻早懷忿懥常有所欲言而卒不得發今雖蠱惑病妄集作忘猶將自復其意况逢足下以中正許身以仁義自任者乎伏以釋氏之疾生民也比虞禹時曷常在洪水下比湯與武王時曷嘗在夏政商王下比孔子孟軻時曷常在禮崩樂壞楊墨邪道下然而聖主賢臣欲利民而務其民害如此其勤也今釋氏夷其體而外其身反天維集作性而亂中正集有者字自晉以來相率詭怪而往之半天下而化其衣冠茍未往者不其集作自欺亦不資其生矣聖人之教棄不相守幾數百年唐初有天下以為刑政禁民乘間作詐僞以欺刑政果所不能公禁之也故􅐛護其事以愚其民為殃罪疾苦隨所作詐僞而及諸身也其集作是欲教化因集作固天下之心以助行政教化之一道耳今天子聰眀以為中正衣冠之所棄則刑政教化亦無所取故絶其法不使汙中土未半年父母得𨽻子夫婦有家室是以復出一天下二字集作家也僕故謂其功業出禹湯武王孔子孟軻之上萬萬不類然而洪水開則有禹貢商周平亂則有誥誓孔子孟軻則至今歌誦之足下以文用於時為百家所託善惡焉其不為則已若為之斯其時也勿疑夫立言者不惟能言亦欲言得其時得其時不汙若奚斯史克者也無其時雖多述前事猶有譏焉僕早傳古學身處草野知其時而無位敢言又竊見足下未有其意故以移云集作私焉復友生論文書陸龜䝉辱示近年作者論文書二篇使僕是非得失於其間僕性雖極頑冥亦知惴息汗下見􅀈訶之甚難招怨文粹作禍患之甚易也况僕少不攻文章止讀古聖人書誦其言思其行道而未得也每㴠咀義味獨坐日昃案上有一杯藜羮如五鼎七牢饋於左右加之以撞金石萬羽籥也未嘗干有司對問希品第未嘗歷王公丐貸飾車馬故無用文處江湖間不過美泉石則記之聳節概則傳之傷集本文粹作觸離㑹則序之值巾壘則銘之簡散誕放集本文粹作淡誕無所諱避又安知文之是歟非歟生過聽集本文粹有德字我太甚茍默默不應非朋友切切偲偲之義也故扶病把筆述一道論文書曰七字集本文粹作一二論之曰我自少讀六經孟軻揚雄之書頗有熟者求文之指趣規矩無出於此及子史則曰子近經經語古而微史近書書語直而淺所言子近經近何經史近書近何書書則記言之始也史近春秋春秋則記事之史也六籍中獨詩易象與魯春秋經聖人之手耳禮樂二記雖載聖人之法近出二戴未能通一純實故時有齟齬不安者蓋漢代諸儒爭撰而獻之求購金耳記言記事參錯前後曰經曰史未可定其體也按經解則悉謂之經區而别之則詩易為經書與春秋其集本文粹無其字實史耳學者不當渾集本文粹作混而言之且經解之篇句名出於戴聖耳王輔嗣因之以易為經杜元凱因之以春秋為經孔子曰學詩乎學禮乎易之為書也原始要終知我以春秋罪我以春秋未嘗稱經稱經非聖人之㫖也蓋出於周公諡法經緯天地曰文故也有經書集作致有緯書聖人既作經亦當作緯譬猶織也經而不緯可成幅乎緯者且非聖人之書則經亦後人強集本文粹無强字名之耳非聖人之㫖眀矣茍以六籍謂之經習而稱之可也指司馬遷班固之書謂之史何不思之甚乎六籍之內有經有史何必下及子長孟堅然後謂之史乎孔子曰吾猶及史之闕文也又曰質勝文則野文勝質則史又曰董狐古之良史也此則筆之曲直體之是非聖人悉論而辨之矣豈須班馬而後言史哉以詩易為經以書春秋為史足矣無待於外也謂經語古而集本文粹有皆字微則易曰履霜堅冰至初筮告冉三瀆瀆則不告苦節不可貞之類果純古而微乎謂史語直而淺則春秋書考仲子之宫初獻六羽及齊師戰于乾時我師敗績辛巳有事于太廟仲遂卒于垂壬午猶繹萬入去籥之類果純直而淺乎經不純淺又可見也言文之不可立諭則曰春秋不當言無使滋蔓又云春秋舉軍旅㑹盟豈非叙事耶引左氏傳語徵左氏叙事悉謂之春秋可乎春秋大典也舉凡例而褒貶文粹有之字非周公之法所及者酌在夫子之心故游夏不能措一詞若區區於叙事則魯國之史官耳孰謂之春秋哉前所謂自集有小字讀六經頗有熟者求文之指趣規矩不出於此妄矣又一篇曰某文也某辭也文既與辭異是文優而辭劣耳易之翼曰繫辭文粹無此四字繫辭曰齊小大者存乎卦辨吉凶者存乎辭故卦有小大辭有險易又曰觀其彖辭則思過半矣易之辭非文耶書載帝庸作歌臯陶乃賡載歌又歌五子之歌皆辭也書之辭非文耶屬辭比事春秋教也春秋之辭非文耶禮有朝聘之辭娶夫人之辭樂有登歌薦辭禮樂之辭非文耶法言曰往者楊子作古者楊墨塞路孟子辭而闢之廓如也孟軻之辭非文耶太𤣥曰𤣥集本文粹無此二字之辭也沉以窮乎下浮以際乎上揚雄之辭非文耶是知文者辭之總辭者文之用天之將喪斯文也天之未喪斯文也不當稱辭吉人之辭寡躁人之辭多不當稱文文辭一也但所適者集本文粹無者字有宜耳何異塗云云文粹作云之哉又曰聲病之辭非文也夫聲成文謂之音五音克諧然後中律度故舜典曰詩言志歌永言聲依永律和聲聲之不和病也去其病則和和則動天德感鬼神反不得謂之文乎猶繪事組繡中有精粗耳大凡辭集本文粹作解人之說不敢避墉垣集本文粹無此字援膚集作背瓜而自矜於堂奧心府也要在引學者當知之集作是事以眀之而已矣師道不行後生多泥泥作從逰於所習有陷而溺者力能援之可也如或文粹作其不同請觀過而後罰請韓文公配饗太學書皮日休於戲聖人之道不過乎求用用於生前則一時可知也用於死後則萬集本文粹作百世可知也故孔子之封賞自漢至隋其爵不過乎公侯至於吾唐乃册王號七十子之爵命自漢至隋或卿大夫至於吾唐乃封公侯曾參之孝道動天地感鬼神自漢至隋不過乎諸子至于吾唐乃旌入十哲噫天地久否忽泰則平日月久昏忽開則眀雷霆久息忽震則驚雲霧久鬱忽廓則清仲尼之道否於周秦而昏於漢魏息於晋宋而鬱於陳隋至乎集本文粹作過于吾唐萬世之憤一朝而釋儻死者可作其至可知也今有人身行聖人集有之字道口吐聖人集有之字言行如顔閔文若游夏死不得配食於夫子之側吾集本文粹作愚又不知尊先聖之道也夫孟子荀卿翼傳孔道以至于文中子之末降及貞觀開元其傳者漓其繼者淺或引刑名以為文或援縱橫以為理或作詞賦以為雅文中之道曠百祀而得室援者唯昌黎文公之文蹴楊墨於不毛之地蹂釋老於無人之境故得孔道爣集本文粹作巍然而自正夫今之文人集無人字千百士之作釋其卷觀其詞無不俾造化補時政繄公之力也公之文曰如集本文粹無如字僕自度若世無孔子僕不當在弟子之列以日休度之集本文粹無此五字設使公生于孔子之世公未必不在四科焉然國家以二十一賢者若左丘眀卜子夏公羊高穀梁赤伏勝高堂生戴聖毛公孔安國劉向鄭生杜子春馬融盧植鄭康成服慎何休王肅王弼杜元凱范寧等是也代用其書垂于國胄並配饗於孔聖廟堂者其為典禮也大矣美矣茍以大用其書不能以釋聖人之辭箋聖人之義哉况有身行其道口傳其文吾唐以來一人而已反集本文粹無反字不得在二十一賢之列者集本文粹無者字則未以乎典禮為備也集本文粹無也字伏請命有司定其配饗之位則自兹以後天下以文化者未必不由夫是也請孟子為學科書聖人之道不過乎經經之降者不過乎史史之降者不過乎子子不異乎道者孟子也捨是而集本文粹無而字子者不斥文粹作戾乎經史又率于子者則聖人之盜也夫孟子之文粲若經傳天惜其道不燼於秦自漢氏得其書常置慱士以專其學故其文繼乎六藝光乎百氏真聖人之微㫖也若然者何其道曄曄於前而集本文粹無而字其書沒沒於後得非道拘乎正文極乎奧有好邪者憚正而不舉嗜淺者鄙奧而無稱耶蓋仲尼愛文王句嗜昌歜以取味後之人將愛仲尼者其嗜在乎孟子矣嗚呼古之士以湯武為逆取者其不讀孟子乎以楊墨為達智其不讀孟子乎由是觀之孟子之集本文粹無之字功利於人亦不輕矣今有司除茂才眀經外其次有熟莊周列子書者亦登於科其誘善也雖深而懸科也未正夫莊列之文荒唐之文也讀之為方外之士習之可以為鴻荒之民有能汲汲以救時補教為志哉伏請命有司去莊列之書以孟子為主有能精通其義者其科選視眀經茍若是也不謝漢之博士矣既遂之如儒道不行聖化無補則可刑其文粹作於言者移成均博士書夫居位而愧道者上則荒其業下則偷其言業而可荒文弊也言而可偷訓薄也故聖人懼是寢移其化上自天子下至子男必立庠以化之設序以教之猶歉然不足士有業高訓深必詘禮以延之越爵以貴之俾庠聲序音玲瓏於珩珮鏗訇於金石此聖人之至治也今國家立成均之業其禮盛於周其品廣於漢其詘禮越爵又甚於前世而未免乎愧道者何哉夫聖人之為文也為經約乎史贊易近乎象詩書止乎刪禮樂止乎定春秋止乎修然六籍儀刑乎千萬世百王更命迭號莫不由是大也其幽幽於鬼神其妙妙於𤣥造後之人茍不得行胡郎反决句釋者猶萬物但被𤣥造之化者耶故萬世但化而已不知𤣥造之源也夫六藝之於人又何異於是故詩得毛公書得伏生易得楊何禮得二戴周官得鄭康成槻音規其微言釽其大義幽者明於日月奧者廓於天地然則今之講習之功與决釋之功不啻半矣其文得不弊乎其訓得不薄乎嗚呼西域氏之教其徒日以講習决釋其法為事吾之視太學又足為西域氏之羞矣足下出文閫生學世業精前古言髙當今洸洸乎洋洋乎為諸生之蓍龜作後來之綿蕝得不思居其位者不愧其道處其習作於職者不惰其業乎否則市大易負乘之譏招詩人伐檀之刺矣奚不日誡其屬月勵其徒年持六籍日决百氏俾諸生於聖典也洞知大曉猶駕車者必知康莊操舟者必知河海既若是矣執其事業集作業者精者進而惰者退公者得而私者廢集作廢之非惟大發於儒風抑亦不茍於祿位足下之道被於太學也其利可知矣果行是說則太華之石峩峩於成均之門者吾知不頌於他人矣足下聽之無忽日休冉拜文苑英華卷六百九十
