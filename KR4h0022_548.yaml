body:
  text: 文苑英華卷五百四十九宋李昉等編雜判門三十七道㕔子判二道流外判二道畨官判二道孔目判二道公廨供給判二道不知名物判四道不奠其祿判一道侵官判二道小吏陵上判三道黜免判一道去官判二道吏脫幘判五道致仕判一道不仕判一道未七十致仕判一道用䕃判一道徴官為䕃判一道假䕃判二道勳品判一道請立長子為嗣判一道㕔子判㕔子執硯翻㵼汙物擒獲欲科之對瞻言署曹克崇㕔事既分官而揆務兾虛室而清神華茵載數綺屏儼立頗有尊卑之禮須知進退之儀彼何人斯輕其主守迹既殊於審慎事終致於愆尤足待數知有慙對馬墨因誤㸃更射成蠅坐彰怠慢之心須示鞭笞之罪且刑貴閲實政蠧深文汙雖有憑物終未驗儻非情故或可矜容請稽源流庶符明慎同前各備爾曹以供其職罄輸氷操同洽風規公府峥嶸具寮瞻矚事光文物掌設防非猶衆派之源流若提綱而集目尚恐禽棲入噪絡青瑣於傍喧蛛網交絲架朱窗而上掩豈意故為翻㵼用漫章程德不繕心罪亦旋踵違周氏之戒器水覆繩愆覽劉氏之朝衣羮傾宥過法開有誤理亦從宜流外判流外解請兵部勞所由不許訴五品以上對百度之間見於甲令九流之內言念胥徒在邦必逹於大體為政不遺於小物嵗之云晏更議初勳勞之可書仍祈後績慕縉雲之職名級願遷瞻巽風之命節文當協所由以司存必舉稽彼三章訴者以理實無言徴諸五品既詳於法難屈爾詞同前十等分賢九流殊致異漢儀之命史若周官之爾胥頗供操牘之役寧有䇿勳之義具聞奸命復欲冒官未輸自貽之辜仍引無稽之訴縱已榮參朱紱其如匪是清流鮑魚不可登庖笄冠豈宜雙履抑而未許實謂有司畨官判畨官請稍食不給訴求逹吏對畨官名書小吏位列羣胥自宜恪守邦程勳一作動從吏道何得叨祈稍食茍狥私儲瞻彼有司出納惟吝閉而不給雅合良規何所未厭仍勞上訴將求逹吏雖且覬覦考以通章恐成抵牾何則國之甲令懸諸日月如或畨程式序嵗考兹深昔年自有常規今日何煩妄請同前六卿分職百揆時叙開之以府寺間之以胥徒所以理天下之人將以成天下之務雖動珂振珮嘗聞獻納之臣而負版持囊亦資趨走之吏畨官之輩實惟卑冗九流未齒一命何階心有規於斗儲意仍希於稍食參尋甲令緬覿彛章事列科條誰敢踰越孔目判得諸司長官初上皆孔目所由不送依問已付散官遂被遺失對建官分職揆務班司是稱㑹府實宏邦教緑墀黃閣棘寺蘭臺廨署星分胥徒雲集瞻言管轄必先卿尹案牘填委簿領殷繁剖析是憑凖繩斯在事資孔目以備闕遺而小吏寬踈下寮弛慢不恭爾事擅付他人因而致失誰任其咎散官闕送自合科繩請更推尋方置刑典同前百揆分曹六官咸事由來區别各有司存旋降絲綸遽覃簮紱令首政長實繁有徒衆務條流須施孔目憑之以提綱紀藉之以恤機衡爰洎有時彰乎無替所由自宜遵奉所闕須有科繩散官非受納之人小吏是施行之輩茍乖其事盍置於辜恭視事端方取誚於周客敬尋失狀欲何黜於堯封據律不見夲條論情有虧通典請歸司敗以正刑書公廨供給判丁以公廨供給親屬郡科之云亦是賔對盧藻祿以馭賢矧兹賔客將不速而是敬豈乾餱而以愆眷彼丁也給兹親屬未聞輟已之仁且有害公之負於焉獲譴何以為詞然獄貴原情事資愜衆必若行髙曽史才茂鄒枚簞食屢空未改顔生之樂樵蘇不㸑能師范子之廉乃謂國賢豈惟家食以之恤乏何必正名同前受祿必資善戒飭躬且務勤王反是不思罪亦難逭彼丁何者忝曰吏人茍狥私親以减公用式彰不令曾是養求重斂聚財可謂同於碩鼠食貨棄命曾不思於伐檀若情在恤貧志懷賙急奉其祿秩則可給於公廨而何雖曰衆賔終為多僻羣司所糾允執厥中不知名物判得乙是甲吏之賤者問所掌名物而不知被科訴云蒞事日近對陳力以位任才居守列王者之職百度惟貞在有司之能庶官奚曠惟乙績乖幹蠱名匪靖恭等韗人之從吏周行是處均倚相之言詩祈招以感何則窮為下士秩等上農莫究端倪孰云主守未聞數馬而對如何尸祿以言匪課月成徒稱日近請抑無稽之訴以從司寇之罰同前執伎事上各有司存學古入官固非失職將守其業用不易方必也正名無敢反側惟乙賤吏實曰函人忘其下旋上旋之權失其犀甲兕甲之屬訴云近涖豈曉壽一作籌年化疑作比農功之越思同美錦而學製懵其名物主者不利於操刀正以刑書所按乃得其資斧同前國有等威秩分貴賤必恭爾職乃罔後艱乙何人斯吏之賤者匪懈於位無聞幹蠱之美不思厥職遽招尸素之刺且龜玉見毁誰之過歟名物不分信為罪者貽曠官之罰自已包羞以近日為詞是亦文過必若德同周勃才異嗇夫當寬呐呐之人無求喋喋之口待窮閲實乃為不弊同前在心匪懈涖事克勤實曰司存惟其慎敬不率厥訓自貽伊戚瞻言乙者參名甲吏當恭爾職知闕鞏之重無廢所掌在組練之堅焉得曠官孰云從事且孔明輔相猶獨親於簿書彼乙微品何不知其名物請置於理以懲不能不奠其祿判得主司納錢不奠其祿致令不可覆校對正其嵗㑹禮有明文録而書之物合定數莫不登於天府計以月成諒比要之可遵將奠祿而為凖慿兹出納乃絶姦欺茍或差遺自貽乾沒龜玉在櫝宜勤夙夜之心刀布如泉何忽隄防之禁覆校斯闕罪纍匪輕忝曰主司殊為曠職但三尺之法期閲實以定刑九兩之官闕連事而同坐必若甲乙俱犯上下相䝉規攘竊以故違自胥徒而共議物又全曠情實難容如其數則非多訊之為誤有納處而可驗恕不逮而須矜請紓辨璧之疑方置鈞金之罰侵官判此題及所對二篇當在五百四十四卷國城門今已移入姑存其目小吏陵上判得丁為小吏好陵上為人上操下如束濕薪議者稱酷吏曰其理有所效對為官擇才以政化物先甲申令著於易象惟丁者何效兹酷吏循墻之敬已殊於考父束濕之操將類於寧成陵長而六逆在兹滅德而九功失序且仁以為寶嘗聞得國犯而聚怨焉可定居既紊彛倫之經莫知哀矜之道國之蠧也刑其念哉同前在下陵上昔賢所耻嚴法峻文平國不設是用敏於從事可以臨人必也允乎平反方堪議罰丁為小吏不慎厥躬未能謹恪以執謙恭之道縱是暴慢且招苛酷之名奉上有類於寧成操下乃同於束濕孽則自作罰實難逃雖欲文過引人無乃執迷於已同前曹詵九命攸分百工惟叙率溫恭以成政資謙讓以恪居丁屈蠖未申摶鵬始舉且安身於小吏期漸陸於大來將能克已為仁翻乃直而無禮誘人孔易寧昧政於蒲蘆雨雪其滂奚取方於束濕不賢內省見惡探湯何寧成之可師逢郅都而陵忽斯為酷吏允叶班書欲因效以辟名實文過而取誚黜免判得諫議大夫廖真坐事黜後既寢病猶用大夫之簀御史舉其非法大理斷無罪對廖真干祿從班既處大夫之職立朝束帶須勤公正之心不著芳聲俄嬰罪纍人非士師同展禽之三黜才異河陽若潘仁之再免既而巢鵀作釁止鵩成災膚腠乖宜初驚二豎之夢手足將啓終切九泉之悲眷彼禮容須依貴賤瞻言令式亦具科條有德乃合旌門無官誠宜易簀不思林放之問有昧曾子之儀憲局彈違實得其所去官判得甲去官居白沙里人云我家池中龍種夲縣科里人妖言訴云美其德讓不伏對度地居人量地制邑九有既乂萬邦是孚甲密勿具寮僶俯從仕陳力就列罷職言歸克昌拾芥之榮方展維桑之敬爰居爰處以遊以娛且故國之生平即襄陽之耆舊人之仰德我不求䝉譽擬潘安聞諸鄉曲榮參龎統頗曰池中發其言而有由連其辜而未可請以里人為美無宜告者稱妖欲措常刑其如反坐同前甲孝以居家學以從政非子房之晚歲翹想赤松類元亮之中年棲神素里琴書飬德道義資身青雲舊遊惜鵷行之中斷白沙鄰好善龍種之來歸異趙一之招嫌同任光之見愛孔子垂教在家必聞程鄭有言寵而能降善莫之大復何加焉至如勝友如龍高才比鳯渥水千里丹山五色語其事類蓋亦繁多考以條章實難科罰吏脫幘判得丁為吏脫幘挂縣門而去斷不應為對田園燕坐一作坐蕪知陶潛之罷職冠冕已挂見疏公之出袓雖吏同推擇而道在雲山脫幘而行不顧棲鸞之局觸網嬰坐何逃逮隼之司必也避譴韜光輒去無宜免幘况乃銷聲自逸既往不咎挂冠𬗟維晉史拒疑作詎抵蕭章矧當堯舜之代冝縱巢由之隱欲加之罪其無詞乎棄髙蹈而可嘉雖小利而何失竊詳州斷未叶通規同前楊眘金天育萬類人含五情行藏殊途語默分緒故有燕安榮利入朝廷而風趨脫落塵紛遁精白以雲卧丁以情忘寵辱跡尚真閒陶潛屈身繫在彭澤安石有志終憶東山厭吏隱之喧卑倚劍不樂出都門之慷慨挂幘長辭得五倫之遺風掩逢萌之往跡清聲可以激貪鄙美事足以光圖書于何不臧反以為罪昔漢皇御宇且髙疏廣之才今唐堯握圗宜遂許由之性同前瑰意琦行有應則通陳力就列不能則止故營營吏道坐州縣而徒勞寂寂閒居退丘園而優逸丁也縣吏職事前修挂幘公門頗遵孤節角巾私第自得遐心州以小道從方恆科守職白雲已逺尚勞矰繳之心尺蠖相趣未識江湖之意責其亷退之節科其髙潔之辜欲使疏廣厚顔陶潛負譴僕雖不敏竊謂非宜同前汜雲將學古入官式著墳誥一作典陳力就列聞諸聖人丁則鯫生頗為髙尚欽陶公之五斗初聞折腰同方朔之一囊且安卑位作勞州縣早結梁生之悲挂幘公門晚慕伯魚之操齊季鷹而命駕不俟秋風想仲翁之辭榮近歸蘿月江湖道逸狎魚鳥而為羣龜墨信榮將松菊而齊致况大君有命廊廟須才旌帛日賁於丘園山林不容於隱遁欲將無悶未可即依同前竇翬喧寰易擾野性難馴鴻鸞不處於俗中珠玉自生於塵外丁至情無欲含章寡詞琴書未入於山林刀筆久勞於郡縣清風忽至白雲意多拂衣不留挂幘長往陶潛之美志斯在疏廣之芳猷未歇幽谷歸來髙山可仰州司牽於常法責以詭時欲處伯魚之刑實恐冶長非罪致仕判渤海縣高邁高秀歷官清途位望崇重及懸車之歲挂冠辭歸於邑邑宰白雄令吏置酒肉於其家吏於道傍停肉為鴟鳶所食還以此報雄不之信命官屬科之對李思齊髙邁髙秀俱承茂族惟兄惟弟各登清官故能望髙陸寶價重韋珠棠棣春風芳菲兩襲桑榆日暮光景同歸挂冠冕於東門方休白首奏絃歌於北里直散黃金邑宰率由舊章禮𢎞於羔鴈縣吏恭承嘉命事失於鴟鳶伏念刑書眷言惇史大夫學吏獄雖成於鼠偷京兆能官罪不加於烏攫不仕判得丙有志行隱而不仕為郡守所辟稱是巫家不當選吏功曹按其詭訴丙不伏對鳴鶴處隂聲聞於外𤣥豹隱霧樂在其中此將適於退藏彼何强之維縶丙業敦道行志薄宦情太守以舉爾所知將申蒲帛之聘夫子以從吾所好不顧弓旌之招懼俗吏之徒勞引巫家以自穢冀其言遜獲免翻以行詐論辜况商洛拂衣漢且求之不得潁川洗耳堯亦存而勿論天子尚不違情功曹如何按罪未七十致仕判得乙為大夫請致仕有司詰其未七十乙稱羸病不任事對時制未及尚可俟朝疾疹集作痁所加固難陳力乙位參食采志在懸車揆以紀年桑榆之光未暮驗其羸病蒲桞之質先零既稱量力而行所謂奉身以退雖髮未種種告老無乃速歟而心既諄諄致政固其宜矣請髙知止無强不能用䕃判范融曾袓在周為六部官在隋居家不仕令兩應出身及為人後者從高叙情取徴官䕃可不對邵旻范融係塵甑之苗襲良弓之裔爰瞻乃袓委跡前周道煥九徴禮光三辟運遷正朔載掌丘園翼子謀孫雖慶流於後嗣論官叙䕃須屢降於前朝必令許從髙議䕃減未盡斷從依請夫復何疑徴官為䕃判乙請以父徴官為䕃所由以其父不在用䕃例對劉銘以功受賞繼統承嗣父不食於周粟子罕取於吾餘乙家尚隱淪素行貧賤固知鶴鳴子和配幽貞以就閒安得孤侵父名茍僥幸而求庇傳業且違於父志請䕃寧沐於君恩昔傲天書不脫薜蘿之服今從地勢難依桃李之隂所由不許誠哉此見假䕃判甲為人後請凖䕃人色所由以同假冒甲訴法有差等對陶翰有國之制不易於常典王者之政未忘於繼絶人則不幸同叔向之有言天道如何比鄧攸之無子甲義當為後情切自孤名不絶於本枝愛未遷於他室克聞鳴鳩之德寧爽螟蛉之義知子之道必全見父之行無改將議繼體那慙象賢主禮方列於宗門入仕曷由於庇䕃茍從法之差等亦在禮之何傷所由無端雖不憂懼訴者有據應異無文同前李康成不享非類將以亢宗無念爾袓詎思述德甲庇身他族忘情夲根頗類移天之規方同擇隂之義將䇿名以筮仕豈假䕃而因人約法是從不繼難失必若敖有餒而之歎庭堅有忽諸之言以為等差誰曰非允如子復其有子寧斯焉而取斯勳品判宋臣前任視流外得勳品請依視品定階對宋臣位末名卑迹參郎署前任後改亦異階資欲定見任之階希取視流之品且視流與正流既别勳品將三品斯殊階雖請於後髙品終在於前任章程可據體例先施犯罪雖許同科定階難為共貫宜從二品庶允三章請立長子為嗣判得甲告老請立長子為嗣長辭云不能請讓其弟或詰之云弟好仁對讓賢雖仁廢長非順徒聞見善則理其如亂嗣不祥甲告老於朝立嗣於後集作為後雖急難自舉必有可觀者焉長幼以倫無所茍而已矣况欲正其爵位豈宜越以鴈行子弟克恭厥兄徒有好仁之請知子莫若於父盍集作蓋從立長之言無忌雖欲傳家季札終當棄室諒可致告罔聽不能文苑英華卷五百四十九
