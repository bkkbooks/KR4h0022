body:
  text: 文苑英華卷二十三宋李昉等編嵗時三七夕賦一首悲清秋賦一首秋宵讀書賦一首仲冬時令賦三首大儺賦一首天道運行成嵗賦二首七夕賦闕名若夫銅儀改候金氣迎辰驚飛灰於素管送流水於清旻聽涼風之唳響視秋露之凝津月蒼蒼而上桂風蕭蕭而吹筠步廣庭而延佇仰層漢而馳神惟暮序之靈匹仰良宵而展會息龍杼於仙機駕羽橋於淺瀨耀九微之華彩澄八極之氛靄儼翠鳳以翔鑣舉丹霓而振斾籠霧縠於雕輦疊雲花於綺蓋舟容裔於水濵駕逶迤於煙外若乃仙娥侍轂玉女承騑嬴簫後唱洛鼓前揮褰九霄之雲幄曳五色之霞衣珮搖星而玉振扇掩月而紈飛陵紫宫而沉景轥黃道而騰暉始徘徊而好密契方阻而情違悵此夕之行盡恨前秋之未歸吝宵光之不駐泫晨露之將晞於是蚪水移箭魚關驚鑰槎客河低針樓月落分一筵於俄頃解雙袂於今昨河漢忽其無梁秋期杳其無度銜别緒而惆悵對離居之寂寞思纒綿於曉雞情顧盼於歸鵲浩長歌於耿介弔孤影其焉託歌曰悲莫悲兮離别長怨莫怨兮私自傷斂橫波而向秋野垂玉筯兮沾羅裳歌響既畢恍然如失獨盈盈兮一水間空望望兮三秋日悲清秋賦李白登九疑一作嶷兮望清川見三湘之潺湲水流寒以歸海雲橫愁一作秋而蔽天余以鳥道計於故鄉兮不知去荆吳之幾千于時西陽半規映島欲沒澄湖練眀遙海上月念佳期之浩蕩眇一作渺懷燕而望越荷花落兮紅一作江色秋風嫋嫋兮夜悠悠臨窮溟以有羡思釣鰲於滄洲無修竿以一舉撫洪波而增憂歸去來兮人間不可以託些一作此吾將採藥於蓬丘秋宵讀書賦王延齡獨夜寥寥兮清我素襟踐藝城兮遊遨書林觀先王之行道見古人之同心羲農之精微兮含隂吐陽周孔之奧祕兮神入鬼出有禮樂經邦之化有德刑御人之術雖興風而致理或因文以喪質借如助築於澗垂釣在川夢來而所象方得繇啓而其貺必甄何風雲之冥感而君臣之道全謨明弼諧開物成務儀在楚而何辱隗得燕而何遇起之來兮而長平不守季之入兮而武關非固將吉凶之由人伊存亡之有數若乃大夫西都之佳賞公子南皮之勝矚將軍之盡閣疑作閣天半衛尉之涼臺水曲馳香車與寶馬眩纎羅及美玉玉饌金觴暮不歸妙舞清歌斷方續何貴幸之斯甚為歡娛以自足上疑作士有竄江濵兮不用首河梁兮永辭長門幽絶恨欲死掖庭一去還無期黃鳥嚶嚶兮野花落白露瀼瀼兮邉草衰此時但能登髙而逺望孰云不腸斷兮淚如絲夫以聰明正直維神之假有才無位奚其為者行莫過於顔曾文莫先於班賈空兢兢於人世竟蹉跎於物下能育其寶則宜無屯不與其命何生此人仗雄劒以激憤一欲問夫蒼旻夜如何其夜已闌間琴牢落坐南端流月朣朣兮素華滿銀釭煜煜兮清光寒於是開中軒矖晴盼天敞朗兮北斗何髙雲依微兮南山可見銀河既已傾玉窗又以疑作已眀哀鴻嗷嗷兮空際逺墜葉紛紛兮林外輕已而羣感互興衆念相積憐稚顔兮何暮對流年以自惜徒見其生也楊柳繁華為我春不知其死也松檟幽泉為我夕何恃俊於禰衡何慟窮於阮籍貞璞蒙垢兮豈不潔幽蘭無人兮終自芳黃綬從來兮非所願白雲逶迤兮滿山自得長歌太平事胡為擾擾風塵間仲冬時令賦以題為韻叔孫玄觀乾知大始變化惟衆白日貞輝以著乎運行素月虧盈以紀乎孟仲隂既往而陽受暑既驟而寒送影長而土圭可測氣肅而玉律潛中若乃搖落既謝戚戚無悰霜雪凝凌以戒節天地閉塞而成冬羲和在茲敬授人時周之正則建子為首冬之夜則問如何其北斗闌干乘招搖而直子玄堂在座則疑羣后以聼詞冬之日可愛聞乎魯史一之日觱發著乎豳詩其神玄冥厥德在水其器閎奄事官有司植玄圭以絓疑櫝乘玄輅以載旗順物以終乃安其性因宜制節用必克正使夫有為而天下御正無事而天下分定先王以之狩田孝子以之溫凊萬人以之休息羣辟以之殷聘一以眀國家之盛再以昭誦事之令夫惟敗度起功逆時興務重其徭役急彼征賦動衆不隨其物宜馭人不以其寬裕災異必降申一作甲已之氣乘一作乖癘疾必行哭泣之哀聚則知邦國興否噫時令之可懼第二同前韻蕭昕嵗杪星窮時臨月仲玄冥氣肅黃鍾律中北陸隂凝西成物衆觀四郊而息老朝萬國而來貢於是我皇乃親帥百辟觀隙三農整六軍以耀武肆大閲於仲冬然後乃即太廟建玄旗事神率禮撫俗觀詩斥聲色以不御守和平而自持山澤從宜候飛霜而校獵川源有秩因涸凍而沉祠謹門閭而守法慎蓋藏以應期斬木陽崖采周官於是月藏冰隂室詠豳詩於此時然後受計郡國大頒錫命祭必先賢室惟行慶駕鐵驪以軌物居玄堂而布政因宜制變必酌於古文授時鄉方乃行乎夏令爾其謀猷克臧備物必具飭王政之禮戒土功之務天地既貞隂陽乃裕苟愆伏之必節豈雪霜之是遇故當北辰正而衆星拱東海深而百川赴既一人而作哲惟四方之所注撫空懷以自憐愧揚雄之作賦第三同前韻張欽敬粵若大君光宅海內文思開帝王之洪緒振皇紀之綱維敷化布和設眀堂以聼政發祥儲祉坐宣室而受釐有典有則念茲在茲負扆恭已凝旒肅祗享會必依乎是月寒暑不易乎斯時若乃睦以神人施乎政令鋪惠澤以流渥鼓薰風而入詠日月惟朗星辰克正調厯數之璿衡叶乾坤之寶命况乎陽氣告始豳歌御冬惟時是恤維政之雍穆玄堂以敷化感黃冠以勞農命魯史之登臺式書雲物審周官之有祀時命秩宗於是恆憲聿修舊章遐布飭蓋藏之是密警門閭而必固一以永寧各知攸措滌器物之疏奄釐氷池之凝沍休力役省征賦養國中之鰥寡罷官守之尸素是使風雨丕疑順曾不爽於豐年霜露以時諒匪僣於歲暮撫三五之遐軌案道德之平裕方見與羲農而比崇豈直等成周之景祚而已顧慙眇質叨承選衆神仙作尉非漢氏之稱梅孝友承家愧詩人之歌仲謬昌言於聖德豈緣情而有中大儺賦以命有司送寒氣肅京室為韻喬琳嵗惟大儺國著成命有以焉爾請言其政夫四氣平分三光交映登臺視祲必書於雲物象魏懸章式陳於時令是以一人垂拱萬方同慶者也且儺之為義其來自久實驅厲以名之於諂神而何有若乃率舊典於有司上士下士左之右之或囂聲以作氣或詭貌以呈姿示以直道揚乎儺詞何四象之能行豈神眀之見斯一作期則有侲童丹首操縵雜弄舞服驚春歌聲下鳯夜耿耿而將盡一作晝鼓喧喧而竟送行看北斗已落於嚴城坐待東風方期於解凍皇帝御寢殿正玄冠侍臣濟濟宫妓珊珊欣大禮之斯展覺輕隂之尚寒肅肅穆穆南面而看則知天不薦瘥同殄妖氣勿休之瑞吾既聞於方册強死之魄彼其宣於驕意面禳有相一作四向之禮堂贈有無方之事雖殊途而異觀可同歸而一致徒觀其執戈揚盾黃金四目其視耽耽其威肅肅將前驅以戒道必啓行而分逐國人稱之曰當今日月既明乾元以亨福穰穰兮共蒼生恩湛湛兮莫與京恩既湛兮儺人出春王正兮粵翌日願吾君兮千萬壽保巍巍兮唐之室天道運行成嵗賦以題為韻張賈稽元氣之成嵗察時運於上玄其始也黃鍾之律中其終也招搖之星旋不見而彰斯強名以稱道無為而化故易知以成乾隂陽推以在位日月貞其所躔運之而五行不息成之而四序罔愆萬物被仁咸遂性以生植聖人取則將設教以昭宣于以體和而配德于以奉時而後天厥惟至化實資玄造天以默運其時后以財成其道形於變化知否極而受通著以始終見物壯而終老故天道之不紊必惟疑命之有分俾隂陽以周環同聖神而廣運原夫為功不宰為道永貞成之以肅殺煦之以發生節乃嵗經在一寒而一暑氣為物母自無名而有名且居髙而濟下諒無迹而能行天地以和於焉運泰德刑既備然後功成豈止配五緯而定數叶三辰而為正是知天有常規道有彜制諧一德以佐主通四時而輔嵗至仁所感思歌造化之功測管以窺寧究天人之際第二同前韻潘孟陽本清陽而左旋浩浩其天播二氣而仁均亭育分四序而德博一作溥陶甄不見為玄乃悠也久也不言而化遂行焉生焉萬物得以資始五材稟以功全美利有常則寒暑之候節著眀莫大則日月之象懸仰居諸之罔息知變化之不愆昏明不差於晝夜次舍互循於軌躔大無不包可定於握規投矩逺無不至可則於持衡執權於是律中夾鍾辰次太皥羽毛振於萬族勾萌逹於百草布交泰於發生降氤氲於玄造俾其動植之庶彚罔不和同於至道若乃丙丁統日祝融撫運扇風氣而何物不溫在朽木而何榮不奮盛既極明時即遷行當蓐收之整轡乃夷則之司聲消炎鬱於九野降肅殺於八紘候可藏冰𨽻人歡瞻於北陸時將納稼農人乃望於西成蓋藏氷之節斯近嚴凝之氣方盈命之暢月是曰玄英夫寒暑順序則隂陽不爭稽諸天道雖謂之通正感於帝德實彰乎太平至矣哉聖人體元於是乎立制大儀斡運於是乎成嵗惟王者之作哲諒公士疑之贊睿在陽和之陶蒸庶不遺於淹滯文苑英華卷二十三
