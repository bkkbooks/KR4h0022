body:
  text: 文苑英華卷三百七十九宋李昉等編紀事廣陵散解一篇魏生兵要述一篇紀異一篇義激一篇紀錦裙一篇言贈一篇雜製作上洪範圖章一篇旱辭一篇答問諫者一篇紀事廣陵散解文粹作琴止息說韓臯又載舊唐書本傳妙哉嵇生之為是曲也其當晉魏之際乎其音商主秋聲六字文粹作其音主商為秋聲秋也者天將搖落肅殺其嵗之晏乎又晉承金運商金聲也文粹有此字所以知魏云文粹作之季而晉將代也慢其商絃而與宫同音是臣奪君之義也此所以知司馬氏文粹有之字將篡也司馬懿受魏明帝顧託後嗣反有篡奪之心自誅曹爽逆節彌露王陵都督揚州謀立荆王彪毌丘儉文欽諸葛誕前後相繼為揚州都督咸有匡復魏室之謀皆為懿父子所殺叔夜以揚州故廣陵之地彼四人者皆魏室文武大臣咸敗散於廣陵故名其曲為廣陵散言魏氏散自廣陵始也止息者晉雖暴興終止息於此也其哀憤躁蹙憯痛迫脅之㫖盡在於是矣永嘉之亂其應乎叔夜撰此將貽後代之知音者且避晋魏之禍所以託之神鬼也魏生兵要述劉禹錫余為書殿學士四年所與居皆鴻生彥士一旦詔下懷吳郡章而東門下生咸惜是行且曰吳中富士必有知書宜為太守所禮者及下車閲客籍森然三千有巨鹿魏生將集作持所著書來謁曰不佞始讀書為文章凡二十年在貢士中孤鳴甚哀卒無善聽者退而收視易慮伏北忩下考前言成兵要十編度諸侯未遑是事將笈而西求一言以生羽翼豫取其書觀之始自黃帝伏蚩尤終于隋氏平江南語春秋戰國事最備磅礴下上數千年間其攟托評議無遺䇿用是以干握兵符貴人宜有虛已而樂聞者子盍行乎吾知元侯上舍不獨善雞鳴彈長鋏三五九九之伎顓之而已記異白居易華州下邽縣東南三十餘里曰延年里里西南有故蘭若而無僧居元和八年秋七月豫從祖兄曰皥自華州來訪豫途出於蘭若前及門見婦女十許人服黃緑衣少長雜坐㑹語於佛屋下聲聞于集作門外兄熱行方渴將就憩且求飲望其從者蕭士清未至因下馬自縶韁於門柱舉首忽不見意其退藏於忩闥之間從之不見又意其退藏於屋壁之後從之又不見周視其四旁則堵墻環然無隙缺覆視其族談之所則塵壤羃然無足跡繇是知其非人悸然大異之不敢留上馬疾驅來告豫豫亦異之因訊其所聞兄曰云云甚多不能殫記大抵多云王𦙍老如此觀其辭意若相與數其過者厥所去豫舍八九里因同往訪之集作焉果有王𦙍老者年老即其里人也方徙居集作於字蘭若東百餘步葺墻屋築場藝樹僅畢明日而入既入不浹辰而王𦙍老死不越月而妻死不踰時而𦙍之二子與婦一孫死餘一子曰明進大恐懼不知所為意新居不祥乃撤屋燃樹夜徙去遂獲全焉嘻推而徵之則衆君子謀於社以亡曹婦人來爇麋竺之室信不虛矣明年秋豫與兄出遊因復至是視𦙍老之居則井湮竈夷閴然惟環墻在里人無敢居者異乎哉若是者命數耶偶然耶將所徙之居非吉土耶抑王氏有隱慝鬼得謀而誅之耶茫乎不識其由且志於佛室之壁以俟辨惑者九月七日太原白樂天云義激崔蠡長安里中多空舍有婦人傭以居者始來主人問其姓則曰生三嵗長於人及長聞父母逢嵗饑不能育棄之塗故姓不自知視其貌常人也視其服又常人也歸主人居傭無有闕亦常傭居之婦人也旦暮多閉關雖居如無人居且久又無有稱宗族故舊來訊問者故未自道終莫有知其實者焉凡為左右前後鄰者皆疑其為他且窺見其飲食動息又與里中無有異唯是織絍緘繲婦人當工者皆不為罕有得與言語者其色莊其氣顓莊顓之聲四馳雖里中男子狂而少壯者無敢侮居一嵗懼人之大我異也遂婦于同里人其夫問所自其云如對主人之詞觀其付夫之意似沒身不敢二者其夫自謂得妻也所付亦如婦人付之之意既生一子謂婦人所付愈固而不萌異慮是後則忽有所如往宵漏半而去未辨色來歸于再于三其夫疑有以動其心者怒願去之以其有子子又乳也尚依違焉婦人前志不衰他夜既歸色甚喜若有得者及詰之乃舉先置人首於囊者撤其囊面如生其夫大恐恚且走婦人即卑下辭氣和貌怡色言且前曰我生於蜀長於蜀父為蜀小吏有罪非死罪也法當笞遇位而酷者陰以非法繩之卒棄市當幼力不任其心未果殺今長矣果殺之力符其心者也願無駭又執其子曰爾漸長人心漸賤爾曰其母殺人其子必無狀既生之使其賤之人為非勇也不如殺而絶遂殺其子而謝其夫曰勉仁與義也無先已而後人也異時子遇難必有以報者辭已乎疑其夫决既出户望其疾如翼而飛云按蜀婦人求復父仇有年矣卒如心又殺其子捐其夫子不得為恩夫不得為纍推之於孝斯孝己推之於義斯義己孝且義己孝二字疑婦人也自國初到於今僅二百年忠義孝烈婦人女子其事能使千萬嵗無以過孝有髙愍女庚義婦楊烈婦今蜀婦人宜與三婦人齒前以隴西李端言始異之作傳傳備博陵崔蠡又作文目其題曰義激將與端言共激諸義而感激者蜀婦人在長安凡三年來于貞元二十年嫁于二十一年去于元和初紀錦裙陸龜䝉侍御史趙郡李君好事之士也因余話上元瓦官寺有陳後主羊車一輪天后武氏羅裙佛幡皆組繡竒妙李君乃出古錦裙一幅示余長四尺下廣上狹下濶六寸上減三寸半皆周尺如直其前則左有鶴二十勢若飛起率曲折一脛口中銜莩花輩右有鸚鵡聳肩舒尾數與鶴相等二禽大小不類而隔以花卉均布無餘地界道四向五色間雜道上纍細鈿㸃綴其中微雲瑣結牙以相帶有若駮霞殘虹流烟墮霧春草夾徑逺山截空壞墻古苔石泓秋水印丹浸漏粉蝶塗染盩縮環珮雲隱涯岸濃淡霏拂靄抑冥密始如不可辨别及諦視之條假斬絶分畫一一有去處非繡非繪縝緻柔美又不可狀也裏用繒綵下製線尚如舊兩旁皆解散蓋坼滅零落僅存此故耳縱非齊梁物亦不下三百年矣昔時之工如此妙耶曵其裾者復何人焉因筆之為辭繼于錦譜之後俾善詩者賦焉集作之言贈林簡言長慶壬寅嵗簡言賃居善和里貧窶濩落交親罕至無何一日門有扣聲合申疾薄部得何紹姓字延乎賔館具酒為誠再至亦如之既熟至之又至之乃至於日至嘗從容談及忠孝之道無位無陳力之所無聞非過也孝之道以色以至難貧如黔原無聞非過歟豫聆其詞得其心知其孝道篤也後曰吾違親久矣趨庭之意無曠日時今越七日歸古有贈言豈無曠乎曰慈烏返哺孰謂禽也吳起不歸孰謂人也雜製作上洪範圖章并序盧碩豫以尚書洪範篇書于縑素施于屋壁有客覩之而言曰此其所謂君人之大法武王所以繼三為明蓋能盡心于是也茍將諸吾君列乎鳯扆之右足以興三代之理豫乃條其事為章以奏之臣聞下言上貢各以其職儒學之流請以儒言夫彛倫九疇不可廢叙之斁之自微而彰持之一得陰陽咸賴行之一失細大被咎夫始之以五行蓋明五行所主之宜也繼之以五事為事在諸身順之則乎道故貌恭作肅言從作乂視明作哲聰聽作謀思睿作聖夫行不敬則貌不恭正不理則言不從明不察則視不皎心喪識則聽不逹性不通則思不睿次之以八政教之勤以足食也教之求資積貨也教之以敬鬼神以成化也設思主人土居人也司徒教衆禮義也司寇考淫盜而原過濫也賔師以往來而防姦賊也又次之以五紀所以占日月星辰歷數之變度君理內則五紀和叶一嵗之功成焉又次之以皇極所以用五福錫庶人亦天子作民父母為天下王也又次之以三德謂人君之德施有三也能以正正人之曲能以剛强立已之事能用和氣以理于物皆隨義而伸道也次之以稽疑謂先占謀于龜䇿與人事叶吉而後歸之於正也又次之以庶徵謂風雨𤾉燠寒也風以動雨以潤𤾉以乾燠以長寒以成君尚敬則雨潤尚理則陽舒至明則燠暢能慮則寒順去察則風調疑習狂妄行過差專逸豫縱剽急肆昏暗則咸反次以五福六極謂君善茂育則人䝉壽富康寧好德終命之福死免凶疾憂貧惡弱之極也九者具于天蟠于地格于人旱辭周墀元和九年旱不周畿斗位直午祝融權威焦金爍石火雲奔馳雄獸遁足棲烏不飛太陰尫薄雨龍慵癡有泉涸源有木拆枝有地文裂有草戕萎炎光鬱洞太陽赫曦田莫可牛稼莫可鎡瞻彼雲漢萬民莫綏秋既罷矣奚療民飢行者燔趾居者焮肥乃命長吏分土之師曝巫于日徙地而市偶泥而龍歌鍾彈吹誕搜祠廟牲􅀢繁祀威巫䖍祈以期是擬期而越應笞巫不媚萬民首仰日瞻其尚渾碧萬里光蒸交湯於戲天胡不降原也煌烈極目一狀民罕求穀殍莫求葬拒飢而憊困燠而瘴持頥訴天急睷而望於戲天胡不降汝南周子宇靡其間土靡其㕓不稼不穡焉就口食祗寺蚤暮暇惟滂滌天既不䝉我憂孔益徙市曝巫揮時紛徙俗宜此尚天其知呼汝南周子稽首謂曰大凡天地陽壯春夏陰結凝􅀈當陽之盛陰南施雨過而不時陰陽失序帝心既憂吏民亦苦命太史兆何失其所昔漢宣帝遭潤旱暵憂惟不寧退避正殿公卿大夫省宰損膳以禳民災以拯大難為今效昔冀憩民患無使蒸庶蒼傍換亂於戲胡不為滂荒𤏡之境不勞旻蒼地惠中國以綏天子邦答問諫者陳黯或問古之士能直諌不君之君者其誰為最曰有諫秦者齊人茅焦也曰夏無龍逄耶殷無比干耶曰不以之無而功德相遼耳夫諫者不獨以言忠而欲其氣雄不獨以名彰而欲其事立四者克備是為難矣昔羸氏吞噬群雄以取天下豪暴奢侈古初無先故非有必為而諫有必距當其遷太后於雍有及泉之誓凡戮諫者二十七人矣天下忠赤之士莫不囚氣鎖詞是時焦能獨奮勇果不顧其威且肉視虎狼氷顧湯鑊諤諤造庭折其四失俾暴主悔非遷善敬從其言繇是骨肉之恩斷而再續君臣之義捨而再交諫爭之路塞而再啓皆由焦之功也噫亡軀狥忠亦諫者之職然决死於二十七人之後不難其心乎進諫於二十七人之後不難其詞乎斯可謂言忠氣雄名彰事立備矣豈若龍逄諫桀比干諫紂徒自柔聲婉詞而又身不免事不立其足為茅先生之徒歟問者喜而退溫陵黃伯光曰焦戰國士耳不難其死以賈名時多能之黯喜其言售至貶削二賢以讃揚其美斯亦過矣覽者詳焉文苑英華卷三百七十九
