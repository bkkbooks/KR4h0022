body:
  text: 文苑英華卷六百六十一宋李昉等編投知四為張周封上楊相公啓一首為李貽孫上李相公啓一首為舍人絳郡公上李相公啓一首為絳郡公上李相公啓一首為絳郡公上史館李相公啓一首為絳郡公上崔相公啓一首為韓同年上河陽李大夫啓一首為賀拔員外上李相公啓一首為同州任侍御上崔相國啓一首為舉人上翰林蕭侍郎啓一首為張周封上楊相公啓李商隱某啓某聞不祥之金大冶所惡自衒之士明時不容斯實格言足為垂訓然或顧逄伯樂但服鹽車聽屬鍾期不調緑綺臯壤搖落老大傷悲同劉勝之寒蟬效子綦之枯木則亦跡歸棄世行闕揚名某價乏琳琅譽輕鄉曲粗霑科第薄涉藝文錐不穎於囊中水竟深於山上淹留蓮幕一作侯國栖託一作祗事戎麾插羽佩鞬從相公於關右束書載筆隨校尉於河源自北徂南己秋復夏心驚於急弦徑矢目斷於髙足要津而又永念敝廬空餘喬木月集作山中桂樹逺愧於幽人日暮柴車莫追於傲吏捋鬚理鬢霜雪呈姿弔影揚音煙霞絶想徒以相公逺敦世故容在恩門存趙氏之孤受梁王之禮竽將濫吹石有參瓊咳唾隨風眄睞成飾追惟疇曩曽是逢迎蜀郡登文翁之堂上國醉曹參之酒吹噓力盡撫愛形顔雖以捧承莫能銜戴況許之髙選光彼官情以曲臺之任用猶輕憲署之發揮方盛仍期官牒不越嵗時今則節邁白藏候臨𤣥律燕雖戀主馬亦嘶風郭伋還州尚不欺於童子文侯校獵寧爽約於虞人茍四時之信是孚亦一諾之恩斯及況自元和以後公侯冡嫡卿士子孫與之同時歷然可數莫不翔踰鳥道泳出龍津或並命南臺或迭居青瑣金朱照耀軒蓋追隨某雖忝伊人亦惟惟集作共推華胄比王謝之子弟誠有重輕在嵇吕之交朋夙嘗連接而獨分光鄰女貸潤監河野鶴天麟絶比倫於朝右髯參短簿困擬議於軍前竊聽重言嘗興深嘆是以願馳蹇步誓奉光塵儻或厮錯薪之斯翹詠歸荑於自牧少窺上路試睨重霄擊水三千暫隨鵬運澄流十二免使魚勞猶能贊叙燮調謳歌鎔範庶無雅拜以纍於君公不使繁聲見憂於仲子心集作仁懷右集作台席夢結邊城寓尺牘而畏逹空函寫丹誠而慙非健筆仰望恩顧下情無任攀戀感激惶懼之至為李貽孫上李相公德裕啓李商隱月日從姪某官某謹齊沐裁誠著於啓事跪授僕者令獻于司徒相國叔父閣下某伏逺牆藩亟踰年籥抱英華作挹徽音於故器雖賞逐時遷竊餘潤於奧雲亦情由類至中阿弭節末路增懷沉吟易失之時悵望難邀之㑹石崇著引徒願思歸殷浩裁書其如慕義伏惟相公丹青元化冠蓋中州羣生指南命代先覺語姬朝之舊族莊武慙顔叙漢代之名門韋平掩耀嵗集作將鄰三紀克佐五君動著嘉猷行留故事陶冶於無形之外優游於不宰之中始者主上以代邸承基琅琊纘業明發不寐懷清廟之景靈日晏忘餐念蒼生之定命爰徴元老久在寶臣五載于兹六符斯炳頃單于故境集作地獯鬻遺疆屢緣喪荒亟致擕二夙沙自縳其主冒頓忍射其親遂去北邉欲事南牧既赫斯而貽怒乃密勿以陳謀管氏將來屢發新柴之井留侯每入便集作更聞借箸之籌全師集作羣師受成中樞獨運前軍露板方事於羽馳清禁夀觴旋聞於月捷仍其貴種慕我華風或辨姓寫誠推諸右校或釋兵伏集作服義列在周廬潞子離狄而春秋書徐夷朝周而大雅詠其餘麕驚烏散風去雨還亘絶漠以銷魂委窮沙而喪膽胡琴公主己出於襜襤毳幕天驕行遺其種落集作湩酪向若非薛公料敵先陳三䇿充國為舉嘗集作盡通肆夷則何以雪髙廟稱臣之羞全肅祖復京之好此廟戰之功一也惟彼參代疑作伐實興皇家天漢美名方之尚陋舂陵王氣比此非多而物衆藏姦地寬長孽敢起在行之衆因興逐師之謀遂使起義堂邉台臣夙駕晉陽宫下逆竪宵奔翻集作月非勢將冀於連雞勇鬭尚同於困獸詎知長算己出竒兵金僕靈鉟靡留於旬朔􅀢輿貫木己集於都街此廟戰之功二也而潞寇不懲兩竪之凶徒恃三軍之力干我王略據其父封袁熙因纍葉之資衛朔搖大君之詔人將自棄鬼得其集作而誅蛙覺井寬蟻言樹大招延輕險曽微集作徴非吳國之錢藏匿罪亡又乏江陵之粟所謀者河朔遺事所恃者巖險偷生今則趙魏俱攻燕秦集作齊併入奉規於惟遵命於指蹤亞夫拒吳驚東南英華作西非而備西英華作南非北韓信擊魏艤臨晉而渡夏陽百道無飛走之虞一縷見傾危之勢計其反接當不踰時是則陳曲逆之六䇿集作竒翻成屑屑葛武侯之八陳更見區區此廟戰之功三也孤集作三寇行靜萬方率同將蕩海騰區夷山拓宇髙待泥金之禮雄専瘞玉之辭烟閣傳形單車就國盡人臣之極分煥今古之髙名况又奉以嘉聲諧兹國檢傳文賜糗逺針醉飽之徒晏子朝一作浣衣橫厲輕肥之俗比周息慮孤介歸仁紹續勳家扶持舊族罔容私謝皆事公言景風至而慶賞先行仲吕叶而賢良必遂豈直杜伯山之令子大邑傳榮陶彭澤之孤孫西曹受暑重以心游書囿思託文林提英華作緹非抱於絶藝之場班揚掃地鞠旅於無前之敵江鮑輿尸集作棺故矯枉集作狂則黃冶德裕有黃冶賦英華作竹非之賦興遊道則知止之篇作詞窮體物律變登髙文星留伏於筆間綵鳳翺翔於夢裏此固談揚絶意報集作倣效何階若某徒預宗盟早塵清鑒而行藏遷貿岐路差池今將抽實吐誠推心叙欵緘集作感猶未寫詞已失煩集作繁某爰自弱齡實抱孤操寒郊映雪暑草搜螢雖有謝於天姿或無慙於力學庾持竒字陳庾持傳好為竒字英華誤作屢持竒字信未皆通敬禮小文頗常留意大和中敢揚微抱竊獻短章方候明誅忽䝉復命荆州一紙河東百金叨延月旦之評長積竹林之戀竟以事將願背蹇與身期離索每多交攀莫遂武陵被病洛表求醫未及上言先䝉受代肩輿而至杜門以居蓬藋荒凉風霜迅厲今己稍痊美疢獲託休辰殷鈞體羸尚能為郡馬卿疾罷猶可言文退無井臼之資進乏交朋之助是以徘徊軒幄託附緘封冀陳蔡之及門庶江黃之列㑹敢渝孤直仰纍清光東浪驚年西颷結欷矢英華作交非心佩賜畢命銜輝道阻且躋書不盡意金楹假䕃望同相賀之禽珠岸回光庶及不枯之草明懸肝膽唯所爐錘干冒尊嚴伏用兢灼謹啓為舍人絳郡公上李相公啓某聞量力省躬典刑之深㫖度材任事聖哲之良規某雖甚愚頗嚮斯義屬者謬圖集作從仕進因藉時來伏值相公顧以外藩夙通襟契憫羊曇之未立早託謝家憐康伯之無歸常依王氏拔於幽滯處以周行遂俾集作得南憲中臺屢承闕乏內庭西掖比辱升遷邁越時流塵汙中㫖恩渥非次性命難移徒當侍從之榮莫有論思之效竟使懼因福過疾以憂成外雖全人中抱美􅠰亦常願青蒲瀝懇紫殿披誠進退未聞過纍仍積及正名綸閣收跡翰林尋願集作欲竊候休旬拜伏集作拜謁蕭屏謝昔年之朝奬杼他日之私誠而機事且繁燮和少暇齊沐纍至肝集作肺腸莫滋旋屬虜帳夷氛壺關伐叛絳臺北控有元戎大集之師鄭國東臨過列鎮在行之衆任當調發事屬供須豈斯擇材皆在非據周旋三郡綿歷兩霜頒宣詔條祗暢集作惕廟畫雖無咎悔亦乏殊尤集作功今幸四海無塵九州嚮化靈臺偃伯衢室歸尊是修明禮律之初舉拔俊賢之始而鄭之為地右臨梁苑左倚成臯比之列藩實為劇郡山東望族幾同屈景之强洛邑頑民嘗雜萍蒲之聚永言出牧豈易其人而又孔道所因使車旁午送迎或闕則怨讟流詞館餼稍求集作乖則職司謗集作貽辱託之全器猶或難居矧在朽材寧宜久處某伏思自隨宦集作官牒遽忝恩榮位至圭符寵當金紫或筋骸無苦心志有餘即豈願踞熊軾以告勞指隼旟而辭疾直以攝生寡妙舊恙無痊儻或形言懼塵清聽每朝昏改候霧露潜威則或至問俗有違在公多廢坐為尸祿行有愧顔而又貪盛明之時有婚嫁之纍未敢髙論止足直乞退休是以輒疏情誠上干陶冶伏惟相公雲龍叶應舟楫呈功比屋可封期於屈指一夫不獲固以動心如䝉曲鑒深誠猥從至願置之他所以遂其愚集作宜則吳楚列城江關别郡集作部雖居鄰佐亦委緝綏獲安病躬豈敢擇地猶希磨淬鉛鈍撫飬疲羸積以嵗月少裨塵露伏惟試賜恩照圍減帶緩髮稀辨傾窅然向風目極心往下情為絳郡公上李相公啓某少悲羈屑不承師友之親集無此字規晚學文章粗致鄉曲之名集無此字譽謬汙官秩遂彯華纓握蘭清曹視草禁掖貪叨過極憂責匪寧早為寒暑之集作所侵頗染集作有肺腸之疾自頃以慶雲結䕃宸極係心當就望以推誠於煎調而寡裕前嵗伏䝉任使奉逺承明值朝廷興問罪之師原野有宿兵之餽絳城甚苦鄭驛匪遙集作完加之以降虜移鄉仍之以貴臣銜命飛挽之外將迎實繁旁奉廟謀上遵詔㫖動繁調發居勞撫安抱疾以臨為日斯久伏幸姦凶克乂濡澤橫流是大朝陟降集作黜陟之初良冶挻鎔之始此郡路通四境名冠六雄軒蓋已來原野交錯集作午萍蒲有聚武吏貽憂雖清時無杼軸之虞而常日有逋懸之賦必在假之賢守屬以强材然後清集作謡詠克興公私不廢豈可使某素兼疴恙本乏良能久於是邦以主東道餽餐將藥甌並進假牒以公案相隨含意不言貪榮是罪相公漢籌始運殷鼎將調度材任官歸於至當存誠愛集作受物決在無頗竊敢自託緘封逺干樽爼俯期恩意集作㫖以保衰微且某運偶昌期年初知命豈不願臨劇郡稍冀榮途但以力有所不任心有所不逮雖欲勉强實憂傾敗彼吳楚偏鄉非舟車要路永言凋瘵亦藉緝綏儻特降優容遙聞擬議則朽質有報恩之所羸軀收曠位之譏宿疹或痊理劇未晚伏惟試賜裁度嚮風披懇服義陳詞仰台耀以瞻輝望洪鈞而佇惠干冒尊聽集作雄伏積兢惕謹啓為絳郡公上史館李相公啓某啓伏以秉大鈞者以物得其所為先執大化者以材適於任為急將以致理在明命官使輕重合宜大小集作小大有裕然後人稱其職職無廢人此相公之所集無此字以明知也某材術素寡聲光莫聞偶叨承平謬登華顯洎分符竹使絶籍金閨一授専城再賜灰琯且解巾臨郡前賢攸重一麾出守昔人所榮雖積戀於本朝實俯光於單緒況又此州管叔舊國帝鴻遺墟接彼㠂嶢浸以京索聚山東之右族邇雒表之宸居內揣非才頗榮斯集作所任而復以通莊所自假道攸繁載惟餞迓之勞實半頒宣之務必屬於壯齒付彼全人用以責功僅能集事某早年被病晚嵗加深衣袴無取於潔清藩溷動淹於景刻狥己則坐隳物務業官則立致簫衰願集作欲俱濟於公私實加憂於寤寐坐集作矧兹仍嵗適有外虞降卒征人旬時併集飛芻挽粟星火為期以此疚心彌深舊恙今寰瀛大定雨露雱流髙步翰飛一呼而至雲羅場藿萬里無遺將調斯人以求良牧得才為美今也其時儻䝉允贊聰明曲聽奏記俯憐衰薾稍賜優容則亦不敢便掛簮纓遂離爐集作陶冶江吳偏郡𥜗袴須人無根節之難少舟車之㑹俾之養理使得便安庶粗致人謠以酬廟算則某所謂材有稱職時無廢人凡在宦途皆仰時化伏惟試賜恩察違離漸久刺謁未由昔在丘門嘗沗四科之列今瞻魯史將期一字之恩下情無任感戀兢惶之至為絳郡公上崔相公啓某啓某本洛下諸生東莞集作山東舊族粗霑科第薄涉藝文謬藉時來因成福遇青縑赤管己忝於華資集作清華黃紙紫泥仍參於宥密相公早容薄伎獲寄光塵别殿朝回禁林夜直每披襟素常賜語集作話言知蔣琬之為公敢矜先見哀馬卿之多病亦辱來言圭律未遐銘鏤斯在相公鹽集作羮梅調味舟集作川楫濟時晉水擒凶韓都蕩梗以不剛不柔貞百度以無偏無黨定九流若某者實有何能可叨出牧絳田己非厥任滎波轉過其材間嵗己來為政非易有南遷之降虜有西山之成師資扉所供餼牽之備未嘗造次敢怠躬親今梟獍掃除馬牛歸放將使坐臻富庶必先用得材能此地名髙六雄實控東道分憂之寄自昔為榮況在踈蕪敢忘涯分但以輶軒坌至賦貢川流非唯撫字之難兼有送迎之遽舊疴加甚朽質難堪假故稍頻曠廢為懼又以宦遊既久故里多違陶令之田園將蕪尚平之婚嫁未畢顧惟羈絆未可歸休竊敢逺疏丹誠上干清重匪獨析恩於時宰實將誓欵於己知儻䝉以然諾為心誠明濟物垂憂不逮賜議所安則吳楚之間郡邑不集作非少非集作不當衝要或異膏腴使之頒條庶可求瘼一昨賊平之後啓事尋成氷霜始嚴筆札未暇又伏慮內庭展顧稱己推遷外郡寓詞頗乖流品沉吟有日鬱悒經時今則情素坐煎驅馳行久若猶緘默是負陶甄伏惟曲賜恩鑒誠懸書殿戀積台階比殷浩之空函情同事異望孫𢎞之東閣魂往形留下情不任感戀兢惶之至為韓同年上河陽李大夫啓某啓某材術空虛行能無取因緣慰薦䝉記姓名劉𢎞一紙之榮方斯未重季布百金之諾比此猶輕昨者李涿侍御此來又䝉降以重言將之厚意望輝光而便同簮屨在負荷而何啻丘山況某婚姻早聮門館外舅以列藩之故家人延自出之恩重疊依投綢繆顧遇東床坦腹早以愧於郗公朱邸曵裾復欲階於謝掾儻復清風時至丹慊獲申實於生前識其死所伏希恩察為賀拔員外上李相公啓某啓某聞被彩飾於無用之姿斯須或可垂休光於不報之地始卒攸難至有馬瘦而尚報輕軒席敝而猶存華幄推仁則極備用無聞雖有切於戀思且自量其涯分嗚呼某者今甚類焉翰柔莫申語苦難聽聊慿箋素用寫肺腸伏惟少霽尊顔猥賜披省某伏思早嵗仰纍深知龍尾貽譏敢通交契牛心前啖實愧時才世故推遷年華荏苒葭灰檀火屢變於寒暄靈濟泥涇遂分於清濁羇離管札僶俯絃歌名汙桞營顔慙花縣竟以千金乏産三徑無歸初服莫從迷津亟問屬者伏幸相公羮梅調味川楫濟時起塌翼於衝風活枯鱗於亂轍登諸蘭署轄彼藝籖臺閣移文語薛夏而無取東南才子並張率以何能未報前叨旋承後顧版圖被召花幕分榮牧駑駘於皂棧之中刻蚣蝑於樂懸之上勢髙足跌道泰身屯未竭私誠己嬰沉痼況某素無靈氣夙昧攝生乏單豹飬內之功闕王吉實下之效湫底莫適節宣失中然猶深願待年少酬厚德三醫畢訪百藥皆投竟非無妄之災莫見有瘳之候濵於九死敻彼十旬取暖則煩加寒必痢髮寧支辨帶不成圍謝述心虛方兹未逮田光精竭比此猶强豈可尚占職員但尸俸入久塵物議且速殘骸況相公職統簿違時登衆寡任崇按比務繫孤終見國語職是賔僚豈宜虛曠固不可不私微物曲降深慈憫將盡於桑榆妨得材於杞梓是以推枕興感攝衾占辭願申斂跡之期以贖曠官之咎祗聽裁㫖用息兢惶必也舊履流恩遺簮結念集作欷恤以孀孤非少婚嫁未終不使衰羸便辭祿仕致乎外地晞以末光未乖念録之仁稍减憂慙之纍亞尹諸府别乘近郊負荷無羞饘糊有繼則猶冀逄十全之藝近一日之生重發門墻再就埏埴是所願也非敢望也詞多力殆感極集作深涕英華作誠繁避席承言未卜曹參之侍封函抒欵畏遺殷浩之誠集作書瞻望清光實動魂守伏惟特賜優察為同州任侍御史上崔相國啓憲啓憲質異楚材寶同燕石重以羇丱即丁憫凶瞻遺構以闕然不堪多難奉成書而未就無處求生藐是流離屢經寒暑逮於集作乎既冠猶恤無家叨承師友之規獲忝簮纓之列此皆相公推孔李之素分念國髙之舊家鎪朴雕頑披聾抉瞶沐膏雨以令植假順風而使飛不然則安得獲驪龍之珠假獬豸之角榮皆過望感豈勝言而猶長望下風徘徊髙義望賀燕以難去撫栖烏而不寧者蓋以相公以伊臯之事業佐大君以揚馬之文章輔昌運一登宣室遂借前籌以有征無戰之方彰明下武以永逸暫勞之勢恢拓中華不舞梯䡴不鳴金鼓復數千里之沃野刷十五聖之包羞彼圍穀而穀人不知入鄭而鄭陴皆哭方兹決勝彼有多慙今百戰聿修五工集作九功咸叙萬國佇登封之禮五山傾望幸之祥鰈至鶼來茅歸楛入馳湯驟夏轢漢陵周若憲者雖不能行舞舜戈坐耕堯壤至於獻千載河清之序裁二王助祭之詩歌詠相庭發揮帝載則其志願亦或庶幾伏希孫閣時開邴茵多恕克𢡟山公之德終全趙氏之孤擁篲瞻門封函即跪苑沙宫樹雖吟左輔之風煙良夜慶宵唯望中台之晷度感恩撫己誓志投誠仰惟輝光終賜埏埴下情無任感激攀倚惶戀之至為舉人上翰林蕭侍郎啓某啓某聞師矌之琴不鼓之則無以召𤣥鶴楊羲之石不用之即無以聘應龍物既有之言亦由是伏惟侍郎學士絪緼降秀翕闢資華天上比方但有文星粗爾人間議擬未將泰華為然爰自妙齡遂肩名輩當時人物何戢唯效於禇公邇日風流杜乂難方於衛玠加以𢎞成與石郭璞傳毫渙水儻來皆逄藻繪荆峯若至只有璆琳合沓縑緗縱橫筆硯三都作序不勞皇甫士安萬乘為僚只有東方曼倩況從近嵗且有外虞傳介子在樓蘭國中竒功未就班仲叔於玉門關外報命猶賖雖太平之業己隆而震耀之威尚作侍郎又綢繆武帳密勿皇圍九地九天之兵寧因舊學七縱七擒之術固己𤣥通用視草之工解按劍之怒手為天馬心繪國圖九重之中暫煩前箸萬里之外輒敢衡車位誠在於論思功己參於鎮撫圖書之府鼎鼐之司伊咎懸遺悵集作為恨之誠夔說貯妨賢之愧載惟後命夫豈踰時抑某又聞之昔管仲經邦賔客有二周公待士吐握皆三邴丞相之車茵寧彈醉客平津侯之賔館不礙布衣並脂粉簡編冠纓圖史後之披卷皆若升堂侍郎美譽滂流髙節彌折擔簦者成市躡屩者如雲此乃前賢後賢不殊軌轍往哲來哲非異門墻縱燕有黃金之臺齊為碣石之館料其棟宇必已荒蕪若某者陋若左思醜同王粲鬚眉不及於崔琰腰腹無預於鄭𤣥若植庭蘭固多慙德如逄巖電不望齊名重以惠劣禰生專非董氏殊顔回之易鑄若宰我之難雕徒欲萬卷咸披且乏五行俱下叨從嵗賦勉致文編户户醬甌唯聞見辱人人虀臼不肯留題再困於魚登一慙於鴈序其長兄兩舉及弟然天付直氣家傳義方雖在顓䝉不茍述作廣絶交之論抑有㫖焉移太常之書非無集作敢為也頃者曽干閽侍獲拜堂皇既容納之有加遂希望之滋甚爾後以毛傷崇集作榮彈鱗損在鈎拔剌不遷嶮喁無暇既乖受教便以經時今孝秀員集作爰非來風霜己積秦人屢出自欲焚舟楚卒數奔誰教拔斾是以更持魚目當夜肆以沽諸復挈豚蹄祝天時之未己義誠多愧志亦可憐儻䝉猶枉鉛華更施丹雘俾其恩地不在他門雖不及采集作衰擬作椽備枝梧於大厦亦庶乎稊米增流衍於神倉與夫九九之能集作推非猶或萬萬相逺誠深詞切聲急嚮煩仰郭泰之龜龍望仲尼之日月濡毫伏紙億萬常心干冒尊威伏用戰灼謹啓文苑英華卷六百六十一
