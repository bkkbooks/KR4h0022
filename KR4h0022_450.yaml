body:
  text: 文苑英華卷四百五十宋李昉等編制書三命相三授王播中書侍郎平章事兼鹽鐡使副制元稹門下昔蕭何用新造之漢而能調發子弟完補報亡使關東糧饋不絶者以其盡得秦之圖籍而周知其衆寡也我國家秉十一聖之區宇提億兆人之生齒而曰不能足食足兵朕甚懵焉得非調隂陽撫夷夏者不欲侵貨泉之任而主會計較虛盈者不得參邦國之重乎豫今集作將兼之允在能者諸道鹽鐡轉運等使大中大夫守刑部尚書騎都尉太源縣開國男賜紫金魚袋王播在德宗時以封詔入仕踐履詔令作更臺閣由御史中丞京兆尹掌縣官鹽鐡為春曹集作官尚書乃長邑髦詔令作􅀢以控蠻蜓盡稱厥職逹于豫聞馹詔令作泊詔徴還便殿與語得所未得聞所未聞詔令作開吾未開昭然發蒙幾至前席重委操剸鋩刃益精國有羡財而人不加賦東師在野物力蕭然不有主張孰能戡濟是用命爾作相仍以舊務因之爾為詔令作其集作則西備戎羌東定燕冀內實九府外豐萬人百度群倫罔不在爾於戲典謨訓誥行之具存邪正是非知之孔易豫唯以不敏不明集有兹字故用爾集疊爾字為股肱耳目又安能以詔令無以字一二戒誨垂之空言爾其自勵于爾心無令觀聽者論爾於鄉校可守中書侍郎同中書門下平章事依前允諸道鹽鐡轉運等使散官勳封賜如故長慶元年十月授張𢎞靖門下侍郎平章事制白居易門下夫佐佑天子燮理隂陽平章法度登進賢哲外撫夷狄內安元元使百官各修其職一物不失其所此宰相之任也朕思得良弼訓致此道咨命豫汝其殆庶乎具官張𢎞靖惟乃祖乃父代居相位咸有成績于旗常爾其忠正恭肅文以禮樂日濟其美振揚家聲一時之人謂之才子亟登清貫益著令聞洎出刺陜部移鎮蒲坂政不苛細甚得人心寮吏將卒皆樂為用清簡之化聞於京師由是鄭風緇衣之好漢廷玄成之美朝望時議翕然與之人謀既同朕志亦定乃用登爾以集作于左輔授爾以大政尚克欽乃嘉命業乃代官竭其股肱服我前訓嗚呼三代為相邦家之光爾其敬集作念哉無替乃前人之徽烈授李絳平章事制門下昔在堯舜聰眀文思尚賴良臣實以相濟况朕薄德不逮先王是用急疾於求賢置之於左右俾承弼納誨以匡不逮言或集作雖逆耳必求諸道事茍利人咸可其奏茲足以宣股肱之力成天下之務歷選多士爰得良輔乃降厥命其聽之哉具官李綘齊莊嚴重內眀外直進退舉措有大臣體自參內職每備顧問忠讜之操終始集作然不渝及二地官專領財賦未逾周月亦有成績歷試多可人望攸歸俾登中樞無易綘者於戲爾以文學入仕以正直奉上才膺大用職亦屢遷十年之間位至丞相何以報國在乎匪躬欽哉懋哉無忝朕命授韋貫之中書侍郎平章事制門下周宣漢宣繼世之主一得申甫一得魏邴咸克致理號為中興朕嗣位以來永鑒前烈惟是賢俊寤寐求思歷選周行乃獲時彥宜以政柄舉而授之具官韋貫之溫重明正國之公器當官必守臨事能斷簡在朕志逮今纍年乃者擢居諫司以觀其直出領符竹以觀其理煩之以劇務以觀其用訪之以大政以觀其體歷試必中而衆望允屬倚之為相僉曰冝哉可守中書侍郎同中書門下平章事夫臣事君則集作以忠后從諫則聖靡不有始鮮克有終理化不成恆由於此今我與爾永終是圖雖休不集作勿休以臻其極嗚呼二宣之業吾有望焉授武元衡門下侍郎平章事制門下朕嗣守丕業行將十年實賴一二輔臣與之共理故外鎮方域則仗以為將有綘侯厚重之資有丙吉寬大之風自登台司克諧集作厭人望頃屬巴蜀軍後人殘權委節旄俾往鎮撫信及夷獠集作貊恩加疲瘵每因利以施物集作惠不易俗而修教政無苟簡人用便安惠茲一方時乃之績報政已久屬望益深宜歸左甫車以參大政夫坦然公道可以敘衆才曠然虗懷可以應群物集作務弼違救失不以尤悔為慮進善絀集作懲惡不以親讎自嫌用此輔君足為名相欽率是道往復乃官可守門下侍郎同中書門下平章事授段文昌中書侍郎平章事制杜元頴門下眷求輔詔令作良弼期在濟時必惟才臣乃克成務况端潔剛毅可以肅具寮敏裕周通可以熙庶績外無飾虛之體詔令作禮中有效實之誠簡于朕心乃命以位朝散大夫守中書舍人翰林學士武騎尉賜紫金魚袋段文昌門襲忠勳器包才傑廣而不雜峻而能溫修詞每掇其菁英詔令作華所尚者風格發言必探於指要所貴者變通識古今理亂之源知遐邇利病之本自掌文翰苑列籍金門出入五年恭勤一致屬朕初承寶命屢進嘉猷諒我憂惕之懷竭其公忠之力詔令作志昨因召見更用詔令作有咨詢造膝之言注意斯得必能奉將明之大任申獻替於虛襟爰升鼎鉉之司冀展舟楫之用於戲萬物之始九有所瞻將致治平可不兢勵爾其夙夜惟慮輔道朕躬使四夷咸賔百度惟乂詔令作理阜俗必蘇其疲瘵審官無鬱其賢能理當詳於機深道當固於久大惟自誠可以化物惟克已可以律人勉哉戒哉無忝我首命之重可守中書侍郎同中書門下平章事元和十五年閏正月授李鄘門下侍郎平章事制蔣防門下凝詔令作弼成庶政必屬於長材經制四方是資於碩望况參酌理本燮和化源茍非傑賢孰允斯任爰立舊德將諧具瞻淮南節度副大使知節度事管內度支營田觀察處置等使銀青光祿大夫檢校尚書左僕射兼揚州大都督府長史御史大夫上柱國江夏縣開國侯食邑一千戶李鄘性惟直方器本𢎞固沖敏足以成務通明可以質疑懷匡主之忠規藴經邦之逺略歷居雄鎮纍服大寮臺閣藩方動留成式資為重望綽有餘材必能翼宣鴻猷導迎嘉祉是用徴拜陟于黃樞竭爾訏謨司我號令法期畫一俗俾康寧寅亮庶工屬在良弼詔令作輔可守門下侍郎同中書門下平章事散官勳賜如故元和十二年十月授蕭俯門下侍郎平章制類制門下天生蒸民樹之司牧非輔弼不能宣其教化非忠賢無以廣其謀猷其履道居真開物成務才能彰於人望績方著於國均是宜表式周行歷踐樞禁朝議大夫守中書侍郎平章事蕭俯器懷沉正風度夷逹識藴通人之量文為君子之儒守道易知臨事難奪內庭推謹密之效司憲𢎞端肅之規所以仗其公忠寄之啓沃嘉乃匡益副豫簡求思序德以任賢冀資忠而致理俾光明渥再踐台階無替前勞往服休命於戲秉一心者時惟良弼宰萬物者是資化源后德惟臣豫既虛心而納誨國家在相爾宜勵節以致誠無愧知人式佇明效可門下侍郎平章事授崔鉉魏扶拜相制沈詢門下潤色王業允俟於良臣丹青帝圖必資於宰匠朕嗣膺大寶思闡鴻猷永惟化源實屬髦傑斯所以三字詔令作所期調六氣以遂物總萬機而富人夢帝賚豫爰立作相正議大夫守御史大夫崔鉉山河秀氣經緯長才金聲含正始之和玉立在風塵之表正議大夫行尚書兵部侍郎判部事魏扶天與全德性惟中庸有致逺之宏謀負佐王之盛業並操身特立抱器挺生髙標旁映於羣倫明識動符於大雅早登善顯􅊀閲休嘉穆然清明鬱有素望居易求已秉仁立誠每懷憂國之心益竭徇公之志或早以精慮升於鼎司深陳造膝之言密勵匪躬之節或嘗以敏用服于大寮智有洞於機權才復深詔令作推於練達爰委綱憲仗名節而立朝亦總地卿嘗會計而經國紀綱式敘征稅益饒陟其休庸付以大柄朕欲宣明號令𢎞濟生靈致寰海之乂安復河隍之土宇爾從容奏議朝夕揣摩副華夏之具瞻展舟航之大用輔教化本乎無隱辨雅正在於至公俾踐中台同參庶務敬服明訓式揚茂勳鉉可中書侍郎同中書門下平章事扶可守本官同中書門下平章事大中三年四月崔龜從拜相制崔璵門下丹青神化寅亮天工將寄陶鈞必歸才望故漢中大業魏邴克贊其謨謀開元盛時姚宋同匡其治理嘗覽前代緬懷斯人寤寐以求夢卜一作以冀終叶適當舉衆不讓知賢戶部尚書判度支崔龜從道峻嵩華志凌煙霄氣包元精識邁前哲巖廊符瑞禮樂英華𢎞通多鑒物之明堅直詔令作正抱佐時之術而學窮源委詞涌濤波吐論素勵於公忠理躬不踰於信厚烈火方熾圭璋更寒飛霜已嚴竹柏猶翠自出入劇職徊翔清途經歷五年恭勤一貫粉署潔賜衣之操掖垣髙白鳳之文澄清宣威節制持重既位延舊德再掌地圖任切良材柄專國用閭閻不困帑藏有餘邦賦程均節之能軍食表供須之效我有好爵本邀茂勳况乎國楨宜在一作任人傑是用命汝同心弼豫升于鼎司執此政柄吉甫德全於文武彥回望著於台衡既諧具瞻實允元輔詔令作當酌古訓以恢令猷帖人部喉舌之雄免計曹經費之務期爾鎮撫式彰顯崇於戲惟木從繩載懷藥石之誡惟風偃草冀流霖雨之功與其順美以昭忠不若盡規而輔德與其嚴刑而就理不若齊禮以安人佇聞嘉言共底交泰無令伊傅獨美典墳可户部尚書同中書門下平章事大中四年六月魏謨拜相制沈詢門下天不能獨運任寒暑而成嵗功君所以稱尊仗股肱而熙帝載高拱巖廊之上卒成天地之宜故風后登庸軒圖以穆文終佐理漢業遂昌何莫由斯夫豈相逺爰感風雲之會果符夢卜之求屬在休期俾升良弼戶部侍郎判戶部事魏謨膺賢運之間氣負王佐之宏材山嶽孤髙圭璋特逹道德忠信資以修身文章政事乃其餘力自騰芳詞苑振迹諫垣文宗知臣深加寵遇檢校甚峻守道不回未至逹官蔚為國器星霜屢變流落幾途秀木摧風燎原見玉汲黯心存乎廟廊望之志在於本朝朕獲奉寶圖勵精理本盡伸人隱思變時雍佇聞宣室之言是有夕扉之拜偉其風望委以憲綱正色立朝不仁自逺二于卿秩掌我地征吏不敢欺身無伐善彌見精強之用頗聞流衍之能朕常咨以謨謀觀其識略動中理會慮必輸忠切劘每賴其沃心慨慷不忘於造膝是宜樹為名表載之休聲俾增耀詔令作輝於三台庶詔令作允僉諧於四嶽於戲鹽梅之調元鼎舟楫之濟巨川詔令作調鹽梅之元鼎濟舟楫之巨川上維四方之安危下繫群生之舒慘居是任者不其重歟夫激濁揚清衆自聳善著誠去偽人斯歸厚爾其開張教化之具導迎隂陽之和使萬物各遂其宜百官得任其體昔爾先祖為唐輔臣人鏡之名阿衡比德爾尚纂承義訓克嗣清風勉思貽厥之謀以闡將明之業勿畏嫌而避事無執謙以自疑永孚于休用觀乃績可守本官同中書門下平章事依前判戶部事大中五年十月戊辰授裴休中書門下平章事依前判鹽鐵制前人門下我國家之稱至理其惟貞觀開元乎雖盛德成於祖宗而致君存乎輔弼委是丕構付豫沖人實咨獻臣共荷洪業俾登玉鉉用振金聲正議大夫守禮部尚書充諸道鹽鐡轉運等使裴休明堂棟梁清廟瑚璉道崇五美學綜九流持去邪與善之心藴尊主濟時之術早升甲乙首冠賢良諫垣馳讜正之名史氏動直言之筆羽儀著定律吕縉紳仙闈道播於彌綸右掖詞推於潤色三臨藩郡皆垂良史之能四二卿曹益見大臣之體洎乎司泉貨之重管山澤之財用適變通法均寬猛大計如富強之業常規多饒羡之功人無告勞刃有餘地是可以載光衮職爰陟台階式贊雍熙宜膺夢卜爾其允釐庶績俾詔令作盛起訏謨涉大川而示吾津涯馭六馬而遺吾銜策俾臻皇極克嗣前修於戲人代天工豫違汝弼悉乃心力作吾股肱無使阿衡專美於殷家山甫獨稱於周室勉𢎞懿德勿忝虛懷可守本官同中書門下平章事依前充諸道鹽鐡轉運等使授王摶中書侍郎同中書門下平章事判戶部制吳融門下朕聞王茂𢎞官在治中已恭佐命謝安石身為相掾常切憂時後果俱秉國鈞克諧人望忠誠懿烈焜耀册書孰謂我朝鍾茲丕運厥有佳士龍興壯圖植徑草於𠂻腸繫苞桑於宗社特立當代何慙古人將表至公爰申異渥具官王摶霜髙一鶚玉拔孤峯孕和煦於情田自華而實道縱橫於義路無一作何往不通藴是淑聲居然上品縶駒埸裏早颯清塵振鷺行中難究逸翰踐揚三署橫絶一時實名教之丹青乃縉紳之領袖昨者朕失遵王度致降天災釁起蕭墻幽加洊棘而賴能謀於上相説彼中權反正乘輿肅清輦轂疇其忠節雖已擢於禁林惜此竒才難久留於誥命豈在凝神軒夢問兆周畋用之不疑命以爰立既調金鉉仍總版圖必務豐財以資經費於戲爾前未逹則能有奮於時此後所行不宜苟安於位獻可替否滅私徇公慎保初心勿孤大任授陸扆平章事制楊巨門下昔在太宗時則有房杜持國鈞在玄宗時則有姚宋司政柄降于列聖代濟名臣宜搜間代之賢冀適濟時之用其有懷詔令作壞材已試亮節孔彰俾膺霖雨之求期正彛倫之敘式舉茂典吾無所私翰林學士承旨銀青光祿大夫守尚書左丞知制誥上柱國嘉興縣開國男食邑三百戶陸扆簡節正音溫光瑞玉咸濩抱降神之韻圭璋挺華國之容包倚相之典墳紹平原之詞藻爰自髙才赴召丹地代言絲綸必本於典謨獻納已觀其事業仍嵗扈和鑾之狩六年專詔誥之勤讜正自持聞望彌峻况爾伯祖贄昔以才行嘗居禁林當德宗避狄之時詔令作秋實乃祖納忠詔令作言之日積其偉節升于鼎司書命諫章流在人口是用選自密勿陟之台衡昭于前光期於休命詔令作期以後效職我人柄二茲地官既表殊恩且明丕訓於戲姦宄詔令作凶尚熾干革未平生靈流離宗稷榛莾爾其舉墜典正頺綱進賢良逺姦慝勿依違而避事無拱默以叨恩詔令作樹庶乎艱難有望康濟往踐乃位敬而戒之可尚書戶部侍郎同中書門下平章事餘如故三年七月授孫渥平章事制詔令作孫渥判戶部制門下在天成象拱帝座者三台在地稱崇鎮方輿者五嶽我有賢輔立于詔令作乎大朝協三台照耀之功契五嶽匡扶之力既凝庶績宜峻徽章正議大夫守中書侍郎同中書門下平章事上柱國賜紫金魚袋某壁立孤峯渭清一𣲖早以閨門之行聞於鄉黨之間詔令作鄊里張融髙文聚為玉海孫綽麗賦擲作金聲頗喧驚座之詞華遂整沖天之羽翼鵬張上國顔淵首冠於諸科弓招小山穆生道優於置醴厥後簮御史筆講博士書從容纍踐於南宫諫諍俄升於左闥蘭香見忌玉冷多猜比騷人湘浦之行繼賈誼長沙之役朕自知直道召歸掖垣每於敷陳必盡肺腑因朱雲折檻之對識張華王佐之才斷自中宸爰立作相彌縫不倦匡益居先操心願革於澆浮進善必先於行實搜抉沉滯拔用隱淪致我時風自爾而厚張説當玄宗之代初啓集賢竇參居德宗之朝别分戶部一則寵九流之墳籍一則萃四海之賦輿式仗英規遂兹兼領髙建楚子之爵貴升鄭衆之階勉殄寇讎以復廟社可銀青光祿大夫依前中書侍郎同中書門下平章事集賢殿大學士兼判戶部事仍封樂安縣開國子食邑五百戶授朱朴平章事制韓儀門下夢傅巖而得真相殷道中興獵渭濵而載獻臣周朝致理是知顯諸仁而藏諸用君子但守其沉機懷其寶而迷其邦大器曷虛其一作於顯位朕自逢多難渴佇英賢暗禱鬼神明祈日月果得哲輔契于勤求詔令作契豫朝散大夫守國子毛詩慱士柱國賜紫金魚袋朱朴學業優深識用精敏久徊翔而不振彌貞吉以自多朕知其才遂召與語理亂立分於言下聞所未聞兵農皆在於彀中得所未得不覺前席為之改容須委化權用昌衰運是乃振於庠序陟於鈞衡自我拔竒寧拘品秩於戲時風甚薄國步方艱兵戈未息於近郊經制日隳於故事宫闕焚蕩邑里凋虛外則未殄元凶內則未凝庶績整我綱紀成我雍熙百度群倫俟爾康濟勉思敬戒以服寵光詔令作章可朝議大夫同中書門下平章事上柱國賜紫金魚袋乾寧三年八月授王摶平章事制門下朕聞軒轅得力牧而為五帝先夏禹任臯陶而為三王祖雖不言而化自契於玄功而端拱仰成實資於哲輔况有嘗持大柄久竭訏謨振寅亮於巖廊立惠迪之軌躅俾乃舊貫再委平衡斷自朕懷用符僉屬扶危匡國致理功臣新授武勝軍節度浙江東道管內觀察處置兼宣撫等使金紫光祿大夫檢校尚書右僕射同中書門下平章事使持節越州諸軍事越州刺史上柱國闕開國公食邑二千戶王摶道潔秋霜文含夏采詔令作春彩動不踰矩立必正方行中孚絶類之貞保大有匪彭之節訥於言而敏於行深恥名浮竭其力而致其身唯將道勝頃嵗朕察其才智可委鈞衡拔自二卿升之四輔果能推誠憂國罄慮匡時啓沃心之嘉猷進苦口之良藥洎汧岐叛換京國戒嚴罔懼觸鱗屢陳逆耳且摶以明君待我故每敢極言我以忠臣任摶亦常加奬納深知盡瘁永用置懷自鑾輅省方難詔令作艱危扈蹕澄心無撓臨事應機為時而生信非虛言昨以初清鏡水新蕩稽山慎擇周才以康疲俗是乃詔令作用輟於台鼎俾踐師壇念卿前後奏陳有犯無隱吾雖不敏深諒至忠靜復卿言皆合朕志讜正之事久而彌芳雖浙左詔令作右之瘡夷誠思惠養顧岐陽之祅逆尤藉機籌且歸班瑞之符却秉代天之筆爾其內凝庶績外殄元凶勉精醫國之謀報我知臣之德天官重位光祿崇階兼以命之用旌寵數服兹休命可不慎歟可光祿大夫守吏部尚書同中書門下平章事功臣勳封並如故乾寧三年正月文苑英華卷四百五十
