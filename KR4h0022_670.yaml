body:
  text: 文苑英華巻六百七十一宋李昉等編省下上張僕射書一首荅韓侍郎書一首上河陽李尚書書一首上鹽鐡裴侍郎書一首與韋員外書一首上禮部裴侍郎書一首復崔尚書書一首節度上刺史附與路鄜州書一首與江州鄭使君書一首寄徐泗張大夫書一首荅盧大夫書一首上張僕射書建封韓愈九月一日愈再拜受牒之明日在使院中有小吏持院中故事節目十餘事來示愈其中不可者有自九月至明年二月之終皆晨入夜歸非疾病事故輙不許出當時以初受命不敢言古人有言曰人各有能有不能若此者非愈之所能也抑而行之必發狂疾上無以承事于公望一作忘其將所以報徳者下無以自立喪失其所以為心夫如是則安得而不言凡執事之擇於愈者非為其能晨入夜歸也必將有以取之茍有以取之雖不晨入而夜歸其所取者猶在也下之事上不一其事上之使下不一其事量力而任之度才而處之其所不能不强使為是故為下者不獲罪於上為上者不得怨於下矣孟子有云今之諸侯無大相過者以其好臣其所蜀本有受字教而不好臣其所蜀本有以字受教今之時與孟子之時又加逺矣皆好其聞命而奔走者不好其直已而行道者聞命而奔走者好利者也直已而行道者好義者也未有好利而能集無能字愛其君者亦未有好義而忘其君者今之王公大人惟執事可以聞此言惟愈於執事也可以言此事集作此言進又作言此言愈䝉幸於執事其所從舊矣若寛假之使不失其性加待之使足以為名寅而入盡辰而退申而入終酉而退率以為常亦不廢事天下之人聞執事之於愈如是也必皆曰執事之好士也如此執事之待士以禮也如此執事之使人不枉其性而能有容也如此執事之欲成人之名也如此執事之厚於故舊也如此又將曰韓愈之識其所依歸也如此韓愈之不謟屈於富貴之人也如此韓愈之賢能使其主待之以禮也如此苟如此則死於執事之門無悔也若使隨行而入逐隊而趨言不敢盡其誠道有所屈於已天下之人聞執事之於愈如此也集無也字皆曰執事之用韓愈哀其窮收之而已耳韓愈之事執事不以道利之而已耳茍如此雖日受千金之賜一歲九遷其官感恩則有之矣將以稱於天下曰知已集本疊知已二字則未也伏惟哀察其所不足矜其愚不錄其罪察其辭而垂仁採納焉愈恐懼再拜荅韓侍郎書李翺還示集有云字於賢者汲汲唯公與不材耳此言取人得無太寛否灼然太寛夫又何疑此事汲汲如嗜欲之未得自以為勝茍令君耳目所及書記所載未見其比何意忽然當一時而更有人也故具於後以當講學且自道無愧兼以為戯耳如愚之於人但患識昏知不足以察人為累耳茍以為賢則不要前人相知相見逢便見機巧有惠集作慧辯故身雖否塞而所進逹者不為少矣其鑒賞稱頌人初未甚信其後卒享盛名為賢士者故陸歙州韋簡州皆是也好善太疾智識未精彼勝於彼則因而進之或取文詞或以言論或以才行或以風標或以政術徃徃亦有不稱於前多矣不可以言其名然亦未嘗以為悔也其中亦有痛與置力後因禮節不足或因盡言而詰之前人既非賢良遂反相毁損者亦有其人矣且龎士元云拔十失五猶得其半真大賢之言也如鄙人無位於朝阨摧於時栖栖惶惶奔走恥辱求食不暇自一千年來賢士屈厄未見有如此比者尚汲汲孜孜引駕集作薦賢俊如朝飢求飱集作食如乆曠思通如見妖麗而不得親然若使之有位於朝或如兄儕得志於時則天下當無屈人矣如或萬一有之若陸歙州韋簡州之比猶奔走在泥土則當引罪在已若狂若顛朝雖飢不及求飱集作飡曠雖乆不敢思通見妖麗閉眼而不觀視遷榮如鞭笞宫割之在躬夫又何集有榮字樂而得安然也不知此心自古已集作以來曾有人如是者否不知代有聖人肩排而生曾有一賢用心近於此者乎若古或有之幸示其人如或無之奈何乃言唯公與不材耳如兄者頗亦好賢必須甚有文詞兼能附已順我之欲則孜孜汲汲無所愛惜引拔之矣如或力不足則分食以食之無不至矣若有一賢人或不能然則將乞丐不暇安肯孜孜汲汲為之先後此秦漢間尚俠行義之一豪雋耳與鄙人似同而其實不同也三五日前京尹從叔云某大官甚知重陸洿當時對云士所貴人知者謂名未聞則導集作道之家之貧則恤之身之賤則進之故也若陸洿之賢彰然矣某官之知既甚矣某官之位日見天子足以進人矣開幕辟士足以招賢矣而皆未及陸洿若如此之知知與不知果同也若實知乃反不與不如不知也矣京尹不能對也大凡身當位得志於時慎閉口不可以言知人若知人而不能進未得志而氣恬體安不引罪在已若顛若狂與夫不知人者何以異也如離婁與瞽夫偕行而同墜溝中或以無目不見坑而墜或以心不在行憂思之病而墜所以墜則殊其所以為墜則同也天下皆離婁也如瞽者鮮矣則其墜者離婁也十八字集作天下如瞽者鮮則其墜者皆離婁也心不在焉故也樂道此者蓋以自勵非欲刺乎富貴之人當為再三讀之以代擊髀而歌焉翺再拜上河陽李尚書書杜牧伏以三城所治兵精地要北鎻太行東塞黎陽在京河南指為重輕自艱難以來儒生成名立功者蓋寡於前代是以壯健不學之徒不知儒術不識大體取其微効終敗大事不可一二悉數伏以尚書有才名徳望知經義儒術加以儉克好立功名今横據要津重兵在手朝廷縉紳之士屈指延頸佇觀徳政况聖主掀擢豪俊考校古今退朝之後急於觀書已築七闗取隴城緝為郡縣命誅雜虜集作今親誅虜收其土田取其良馬為耕戰之具西復凉州東取河朔平一天下不使不貢不覲之徒敢自專擅此實聖主之心事業已彰臣下明明無不知之伏自尚書樹立鍜鍊教訓揀拔法術尺寸取於古人若受指顧必立大功使天下後學之徒知成功立事非大儒知古今成敗者不能為之復使儒生舒展胷臆得以誨導壯健不學之徒指蹤而使之令其心服正在今日某多病早衰志在耕釣得一二郡資其退休以活骨肉亦能作為歌詩以稱道盛徳其餘息心亦已乆矣下情日增瞻仰戀徳之切牧恐懼再拜上鹽鐡裴侍郎書伏以鹽鐡重務根本在於江淮今諸監院頗不得人皆以權勢干求固難悉議停替其於利病豈無中策牧自池州睦州實見其弊蓋以江淮自廢留後以來凡有寃人無處告訴每州皆有土豪百姓情願把鹽每年納利名曰土鹽商如此之流兩稅之外州縣不敢差役自罷江淮留後以來破散將盡以監院多是誅求一年之中追呼無已至有身行不在須得父母妻兒錮身驅將得錢即放不二年内盡恐逃亡今譬於一本作如常州百姓有屈身在蘇州歸家未得便可以蘇州下狀論理披訴至如睦州百姓食臨平監鹽其土鹽商被臨平監追呼求取直是睦州刺史亦與作主不得非裹四千里糧直入城投集作役使即須破散奔走更無他圖其間搜求胥徒針抽縷取千計百校唯恐不多除非吞聲别無赴訴今有明長吏在上旁縣百里尚敢公為不法况諸監院多集作皆是以貨得之恣為奸欺人無語路况土鹽商皆是州縣大户言之根本實可痛心比初停罷留後衆皆以為除煩去冗不知其弊及於疲羸即是所利者至微所害者至大今若䝉侍郎改革前非於南省郎吏中擇一清慎依前使為江淮留後减其胥吏不必一如向前多置人數即自嶺南至於汴宋凡有寃人有可控告奸贓之輩動而有畏數十州土鹽商免至破滅除江淮之大殘為侍郎之隂徳以牧愚見莫過於斯若問於鹽鐡吏即不欲江淮别有留後若有留後其間有集作百事自能申狀諮呈安得貨財表裏計㑹分其權力言之可知伏惟俯鑒微集作愚衷不賜罪責牧再拜與韋員外書劉蛻蛻性甚二字集作雖㝠頑識不及髙嘗以當今由文學求用遲其顯遇在執事未知如何蛻輙自愛而庶㡬不惑也故進不暇視地食不及卒哺起居不忘於文窮泰不忘於文雖分不出集有其字畛實愛且專也執事以為愛乎未也蛻為人子二十二集作六年唯初七年持瓦石為俎豆戲其餘卒不離前之志也執事以為專乎未也伏念方今人人自謂力然沛若有餘今日以執事如重星輪月争下堂而觀之畏已後耳宜乎人之心適在徃越而使去有人正從越來執集有事字車而問於路執事以為可教與否如曰吾幸知其徑途安得勿教則執事正可以其手呼而指畫也果遇他人以其有徃而猶不逆則蛻云所愛而專者有謁執事之餘勇也深如此而已可則道合而服從不可則道異而更學上禮部裴侍郎書臨其事不能茍有待而先自請者閣下以為難乎贊功論美近乎謟飾詞言已近乎私低陋摧伏近乎䑕竊廣博張引近乎不敬鈎深簡尚則畏不能動乎人諧儷相比又畏取笑乎後情志激切謂之躁詞語連綿謂之續集作俗夫臨其事而自言者其難如此也然不有聽者之明言者無病則固當背惶踖株一作踧俟乎知者而自知也用者而自用也安能持一言於已難之時者哉然或不得已而言之者亦將自言而已矣又豈敢因其時而遽言大體哉蛻少時不知小人通生有自可之事樹之為梔茜種之為榖粟賈於市釣於江亦以二字集作棄老也無何羅絡舊簡附㑹時律懷筆啓一作譽於縉紳家十二三年矣謂丱而習之齓而成基壯而歴級乗時無難梗寒苦之疲今者欲三十歲矣所望不過抱闗輸力求粟養親而已何者家在九江之南去長安近四千里膝下無怡怡之助集作趣四海無强大之親日行六十里用半歲為徃來程歲須三月侍親左右又留二月為乞假衣食於道路是一歲之中獨餘一月在長安王侯聽尊媒妁聲深况有疾病寒暑風雨之不可期者雜處一歲之中哉是風雨生白髮田園變荒蕪求抱闗養親亦不可期也及今年冬見乙集作丁酉詔書用閣下以古道正時文一作聞以平律校羣士懷才集作道負藝者踴躍至公蛻也不度入春明門請與八百之列負階待試嗚呼蛻也材不良命甚竒時來而功不成事脩而名不副將三十年矣今而復閣下進之蛻亦得以至公進閣下退之蛻亦得以至公退進退者由閣下也未可知也干黷尊嚴敢忘僇辱情或須露豈曰圖私不然則蛻也豈敢蛻再拜復崔尚書書男子生而射四方所以有四方之志故懷其道不可以退已集作也非其人又不可以動心今蛻也伏念仁人在位野無君子不敢隱忍自置削簡授僕夫堂上猶逺况千里之悠悠哉亦將天未甚棄果遇閣下響不私岸谷與髙下為應不戮其使得復廬下而又重幣厚詞素未嘗遇知集作始者嘗為齊桓公之明活俘而相晏平仲之賢贖𨽻而友夫俘未至而鮑子先言之桓雖智不逮安得勿相𨽻未言而晏子已見其色雖智不逮安得勿友豈如左右無先言之人閣下未見蛻之色而與之歎息乎與之教道乎則斯然後心因閣下而動已為閣下而知不復遺恨幸甚幸甚雖然敢不再拜以謝知已而自道其所得罪蛻早不量已嘗集作常欲與其道以死生樂之自以得其位即集作則欲立殊節於君友不得其位即欲垂長幅於後世然而以為身屈則道不勝語卑則道不明以其諠譁不敢安已矜道也不敢矜於口也伏惟閣下以忘道而圖已孰若道勝而已勞乎從俗而飽其親孰若道在有君子而後顯其親乎閣下不以行已失態天命拙塞乃復書問曰恃才傲物歟論議險直歟儕伍擠毁歟夫承貴仕之後身尊而食足然踞辱卒吏猶有䧟人於急四字集作隱忍况蛻近世無九品之官可以藉聲勢而又當時無綿絡之舊無一簞之食設有乗人之氣而窮賤奪其氣矣何能為也使蛻一旦為病狂妄人而行之俄而自成怪笑不止人之怪笑也然則希權門以媚嬖媵隨衆口以贊曲私瞻視行坐傾身預起則信乎對南面如濠壁之相峙也如此豈曰恃才傲物乎險直之在已不得其人而盡言之則有殺身磔尸一作終身殺戮非之禍得其人而盡言之則有忠義諒正之名使蛻前不得其人而言之則身死集作辱已乆得其人而言之則安得困而至此故豈曾論議險直乎蛻伏以冠衣不完集作髙潔趨拜未識威集無此字儀又伏念春秋時四人受縣而後見魏子則古之人之見也其不在受恩之後乎謹重遣前使以謝殊遇以結後計蛻再拜節度上刺史附與路鄜州書沈亞之月日沈亞之再拜稽首言大夫閣下亞之昨去長安時歴别於所知親友集有門字所知親友謂亞之曰安所適安所為亞之對曰適鄜將假貸於諸侯所知親友賀亞之曰鄜有長賢大夫也喜文學仁義之道故其所為文學仁義之道欣欣焉走其門者日有之亞之納喜於心充充焉捶馬走僕忘其勞失其怠望閣下之境日近日喜及至之也且觀將謁之禮於其門乃見納客之官奔奔而入促促而出言不及宣集作吐道不及陳退居三日不知所為乃復聽閣下採取賔士之道髙下之等則曰某自某方來以某執事書為之輕重書之多者館華集作善宇飽善味書之次者又次之其有無因而至者雖辯智過人猶以為狂即與偶然之輩僥倖之徒退棲陋室與百姓雜處飯惡味且走來閣下門者亦不獨盡窮餓無依而來求粟帛於閣下亦有抱其智懐其才聞閣下好賢而來求臧否於閣下而望其推引之濟耳今一貫而禮一數而惠遺集無此字賢愚顛倒而又以書不書而為之輕重竊恐天下之士其來閣下之門者皆相爭齎書為粮受閣下之惠者不曰閣下之惠而皆曰某官之書禮我也何有媿於閣下不唯不媿而已亦有憤激於中集作衷而終怨怒者誠集作竊恐閣下勞費以取無益亞之之愚獨為閣下惜伏惟集作願閣下稍精接士之道使賢愚明白閣下能如此則知言者四字集作則四方之士聞之皆曰集作謂閣下不恡已之不至而求其方直如此今亞之冐旌㦸之嚴敢言於閣下亦希知言之士聞之知亞之不茍曲於閣下而存其直如此戰兢無任亞之再拜與一作上江州鄭使君書郢岸謫吏敬對所詰引言為書致於九江郡守鄭閣下詰之既深安集作焉得默默已也固折委譴之於章遂用悉陳惟聽之國朝天后之時使四裔逹威徳之令皆儒臣自喬知之陳子昻受命通西北兩塞封玉門闗戎虜遁避還而無酬勞之命斯蓋大時之有體臣之常理也然喬死於讒陳死於枉皆由武三思嫉怒於一時之情致力尅害一則奪其妓妾以加憾一則疑其擯排以為累隂令桑梓之宰拉辱之皆死於不命嗟乎嗟乎自是之後臨戎觀危酌逸勞之狀為使者而儒臣莫與矣前年天子以兩河逐叛之兵連歲不解負輓之輸而不造廪庫皆從便道為戰士衣食之給於兩河之間歲尚賑賙輦轂之下執笏常謂請罷所討者十八九獨諫大夫自以為習知叛臣之情日就窘請得徃道集作導愍痛以歸之既可所奏即請以亞之為副又以為古者單車為使有功則為戎臣輕害之遂於行請兵以自柄詔書仍以便宜從事又詔邯鄲鉅鹿兵各以百騎與俱蓋欲重擊鑿之椹集作柄也及過平原郡城而有常山卒分居之諫大夫因令亞之為書檄之書成亞之題帛引弓射書於常山帥帥得書以期請降滄海之人聞之降者日百有餘輩及滄海冦欵與符印偕至即請以城歸使者是日徃受城亞之復引前驅騎馬先至滄海同㨗與其徒繫頸者服縗不帯伏軍門之左委命於使執事於是諫大夫遣河南將石稅部獻闕下稅夜殺同㨗於平昌亞之分道馳還以報事道中不得乗乃乗羸驅馳至具魏之門守長皆為難日昃不得食因中病於南集無此字廣武之門歴再旬而謫書降即奔上所委今閣下罪諫大夫以為狷急忘體冐危取禍習傳不察其端本附言和唱敢避忌應對哉昔者酈生憑軾下齊城七十韓信刼而烹之在前代且耳况今持兵連營淹歲經時既費且敗萬無以自塞之際而使臣奉命詔銜解覊裂網之恩啓萬死重生之路起曝鰓就鼎之命集作枯彼不思於降復何歸矣今習詩書步規矩而進於是者固未嘗習武事况親於戰鬭之間耶必多武臣之言以為信何者重已之不李祐避能而誠邁越之談也或亦有詰亞之曰李祐避壁攻平原城城危且急尚不聞有效且使臣居間曾不逾月而云城降者何端亞之應之曰獨不見童子之情乎夫童子師與終身之益何惡而不附乳母蠕蠕之常恩而投戀肆喜何者氣微意廹則毅容之難洽而告訴之言在前也是則向使之卒被堅甲持銳鋒以相攻差剛决於敵者不瞬而殞形喪魄矣有如使臣之煦諭明白寧有忘生趨死之倫乎此解析之言誠不當為閣下說說亦不能降聽以委逹集無逹字書之丁寧者蓋欲流之於世以俟通方之士次第於所悟耳梗概之錄不文於詞亞之敬再拜寄徐泗張大夫書符載明公材畧横世氣為人傑旌節森然先鎮東徐靜則近鄒魯之士講詩導禮動則駕貔貅之卒肅清淮海名聞休烈風動四方節士義夫孰不投心甚善甚善真天子文武大臣哉載迂儒不才越尋常間敢以疎鈍切懐風槩如是星霜十周天矣緬彼山川遼夐蕭條世多械束末一作莫由造請復欲牽文字試書功徳事無端緒殆似行佞懐緘浩思殊鬱鬱不快也適值去年秋有冠軍將軍李圓者道來自東狀貌不凡三扣柴荆載意其偉士延坐與語語酣中起議及劒術云嘗以青萍貺公乃發筐篋出閣下寳劒銘相示載鑒裁不明敢懸貨人因覽文以異劔覩劔以竒文繇是憑之為聰明依之為肺腸一作腹恣陳蕪穢妄有紀述摭拾冠軍之行跡鄭重執事之美一作羡茂得為通誠導意之因緣也大凡人之有生處而道徳不滋於身者竊兩曜之光明也仕而功烈不被於世者偷大君之珪組也况乎屬一詞屯一事上不陳教化次不叙志意皆游言也豈曰文為一昨諷公之製聳文豪爽立意徤激首則見定忠固義之分末則存一作見策勲樹績之心識者謂公異日必帥諸侯蕩蕃虜拔烽燧於近塞洗腥臊於絶漠黄河九曲為大國池沼然後拜閶闔和隂陽炎炎赫赫載勲盟府豈獨擁旄按甲長于一方而已哉載不量氣力庶慕區區之分借如智慮短薄無裨絲髮亦欲如班孟堅之比為竇車騎刻燕然之石公謂之何哉載今蹷然飛書逺聞伏以冠軍緣公而徳彰小子援公而思勇即托記錄之目輙以葛溪劔志為名屬事相交闗謹偕寓獻貴賤不侔禮實異儀輕用塵忝臨風震悚閣下或為休庇若將獻酬張布錦繢鋪映麻枲命使令問訊江君奔走之僕山中茅舎偶目詳憶耳不宣載再拜荅盧大夫書貞元元年八月二十五日野人符載再拜頓首上書于觀察使大夫盧公某伏見古人或出以行道或處以向晦皆其徳不昧其迹不辱者以其立身之本固動靜之分明也載顧散細之材無榱桷之用違力妄進祗取顛沛故廬山南住有一畆之宅有友生五人切切偲偲更迭皷琴意者疑立誠絜矩師避地避言之義豈曰嘉隱以干聞逹是月二十一日賢都水弟叔姪至止伏奉書諭猥加詞飾捧緘開讀光曜林壑藴蓄慚懼若無憑依伏惟大夫天子碩臣包甫冠申文武皇皇作藩於唐以河海之廣涵游泳之物曲存惠好俯慰顦顇則士君子相顧而言曰以方伯髙明之尊以野客草茅之賤尚能降損懷抱招納以禮况四方多士得不望塵欽義奔走於下風者耶方今江湖上接鯨鯢之地皇帝以襟帯軫慮授大夫以安之恭聞旄鉞之至也政不煩吏不擾帷幄多賢傑軍旅有叙事黎人熙熙各遂生性爰及巖谷亦云逍遥是知凡在府廕孰不幸甚載誠宜被荷服躡芒屨拜跪於旌㦸之下常以山中氣寒嬰内藏之病髙風摇落寢欲增劇未申悃欵良用震恐候羸形支持堪自興運端神肅氣側聽精微之論伏惟少賜鑒燭以逹愚悃幸甚幸甚不宣載再拜文苑英華巻六百七十一
