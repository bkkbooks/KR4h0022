body:
  text: 文苑英華卷九百七十三宋李昉等編行狀三左僕射韓滉行狀一首太子賓客盧邁行狀一首國子祭酒韓洄行狀一首檢校尚書左僕射同中書門下平章事上柱國晉國公贈太傅韓公行狀顧况曽祖符皇朝潭陽郡太守祖大智皇朝河南府士曹參軍贈吏部郎中父休皇朝銀青光祿大夫太子少保贈司空韓洄滉弟少保贈司徒二唐書作行狀太子少師贈太子太師諡文忠公京兆府萬年縣洪固鄉胄貴里韓滉年六十五公繼代生賢左右王室鄭武之賢韋平之美開元中解褐授右威衛騎曹參軍丁文忠憂服闋授京兆府同官縣主簿又丁內憂孝貫神明外除授太子通事舍人肅宗在靈武授監察御史兼北海郡司馬充北海節度判官道阻未行除通州刺史尋充山南西道採訪使判官時宰醜正除彭王府咨議詔授除殿中侍御史纍遷祠部考工吏部三貟外郎判南曹尋遷吏部郎中給事中兵部選事有盜殺富平令倚為禁兵特詔釋之密疏聞狀遂伏其罪遷尚書左丞知吏部選事有擁馬陳詞造階抗議曾不再煩主吏重閲簿書片言遣之莫不心服拜户部侍郎判官支管諸道青苖稅户屬國計空耗上難其人服勤九年出利百倍左藏之錢至七百萬貫太倉之粟至數百萬斛其邊儲或五六萬或十餘萬有附大臣間於先帝者引劉向羊頭山黍云權量久差公曰山之南北地之肥瘠禾黍不同會內藏有隋朝銅㪷果不差異安邑解二縣鹽池比歲水漲甚於往年有漫生紅鹽之瑞詔諫議大夫檢覆并致祭祠宇號寶應靈慶池宣付史館拜太常卿出為晋州刺史拜蘇州刺史充浙江東西都團練觀察處置使尋加銀青光祿大夫改檢校禮部尚書兼御史大夫潤州刺史鎮海軍節度使依前充浙江東西觀察使令行風動無敢犯者自信安洪光東楊捍狼士僧惟曉等結連數部熒惑愚氓破其巢窟伏戎自殪山越一清管郡十五户百萬里尹亭長書佐小史令丞牧守通數萬人自公區處不朽之作乘輿播越畿甸路斷公日遣一使間道齎帛表詣行在諸道未知行在營將士無不引還唯公所遣兵鎮河南衝要堅守不退兵馬使董晏將三千人鎮徐州部將沈清等頗違軍禁公遣一介齎牒轅門笞晏二十沈清等六十八人悉按軍令徐方既定轉檢校吏部尚書加金紫光祿大夫封昌黎公改封南陽天子幸梁川巴山道命判官何士幹領健步七百負絞疑練十萬匹上獻天子六軍從官扈蹕千里時屬維夏未頒春衣表至行在衆情大悅公又命從事裴樞李倫徴巡內兵甲麾下將士合三萬人請翊衛鑾輿收復京邑上深嘉歎特加檢校尚書右僕射李希烈衆軍東下志吞淮濟公即日遣兵馬使王栖曜李長榮柏良器以徑卒萬人泝流千里倍程救援才及睢陽賊巳陷襄邑攻寧陵栖曜等突圍乘城矢中元惡凶徒懾遁不敢東顧淮南初喪節度使大將王紹帶甲數千夜犯城府或出權計者云江南兵至紹兵遂散殺戮甚多士卒驕矜爭邀厚賞率居人商旅五十萬緡符牒巳行人情恟恟公即日遣都虞候李栖華謂兵馬使張瑗等曰收復上都六軍未賞節使薨殁豈名為功賦斂擅興何人造意諸將引過橫調立停及大駕還都進封郡公時希烈盡鋭攻陳州公命諸將與宣武軍合勢破賊數萬人關中初復公以為國無年儲何禦荒儉陳圍巳解汴路即通抗表請獻軍糧二十萬斛從本道直至渭橋公命判官元友直草創運務部勒趨程時河中阻兵堅城未拔關河蝗旱軍食不足船至垣曲王師大振拜檢校尚書左一作右僕射同中書門下平章事加本道度支營田充江淮轉運等使連歲蝗災仰在轉運公自晨及暮立於江臯發四十七萬斛舳艫所至近逺慰安貞元元年十一月十一日制曰江淮轉運使某官某勵精勤職夙夜在公厥有成績可進封國公初封鄭改封晋前後河南用兵解寧陵睢陽之圍全彭城要害之地朝廷議勳特賜一子六品正員官又其軍鎮營宇舟船鞍馬甲仗旗鼓羽革丹漆牛羊六畜難乎校算應緣兩稅唯有一榜人爭及限吏不到門今江南闕於樵宋二年冬十一月朝覲上深禮重委以大計加度支諸道鹽鐡轉運等使待空巖穴方歸田里主恩彌深初願遂違顧謂其族為當瀝肝膽身塗草莽上答乾坤時屬西北用兵倉庫空竭公和糴五十萬斛無敢奪期米價遂賤防秋士馬儲糗更無闕自公當漕運初年四十七萬二年七十萬末年一百萬尚結贊者使六蕃抗言逆順之理夷虜感動肝膽楚越張權者不敢惕息盜位者退而思過貞元三年二月二十五日薨於昌化里私第春秋六十五皇帝震悼輟朝三日制曰故某官某應運而生弼諧于我道符兩曜德冠八元以武綏邊以文經國方期難老一作續光式作一作茂宗臣孰謂不融盡瘁而沒雖鄭亡子産衛失栁莊􅉃悼之懷豈過於此過時謂三字疑撫牀增慟當扆興嗟厚申往禭之思載榮優贈之禮可贈太傅前後􅉠贈布一千匹米粟五百石錢四百萬喪事官供踐歷四朝歲逾五紀炎不執扇晝不伏枕疾無杖履居必矜莊自同官主簿制一裘褐直為宰相古人無食粟之馬衣帛之妾更爽之居不足多矣以沙門一行得聖人之道特寫形仰影如宗師癖在春秋精於繫象賦春秋七章著通例六卷并章奏詞略十餘萬言豁如恆星敦故舊重然諾好古博雅能書善畫夫議大勳者則不書小善舉大德者則略其細事故不殫論矣公有子弟聞斯行諸不敢墜失况以賔客從事日久泣慕清塵謹狀貞元三年閠五月十八日故金紫光祿大夫檢校尚書左僕射同中書門下平章事晉國公故吏將仕郎前大理寺司直顧况謹上尚書考功伏以柱石元臣勳績光茂孝則先意承志忠則知無不為武能禁暴文以經國翊贊聖明懋建和平沃心造膝簡乎上長䇿橫疑作宏規振乎外奄從流運恩軫睿慈今月日若馳松楸將樹易名之典請舉舊章謹上朝議大夫集作朝議郎守太子賔客上輕車都尉賜紫金魚袋贈太子太傅盧公行狀權德輿曽祖勤嘉皇朝散大夫青州司馬隴城縣開國子祖克明皇瀛州髙陽縣令贈國子祭酒父沼皇陜州芮城縣尉纍贈慈州刺史祕書監河南府洛陽縣遵化鄉恭安里盧邁字子𤣥年六十狀公以仁為經以義為用窮四教之根本探六籍之菁華其門風士行天下歸重以居室之和移諸官署以率性之道𢎞於事業自解巾試吏至於佩相印不為利疚不為物遷令名豐祿與之終始推是道也年未志學纍丁齊斬純孝孺慕外除猶毁博貫儒書不耀其華特為叔舅太傅文貞公之所賞鍳經明筮仕補太子正字藍田尉會府試言拔乎其萃轉河南主簿尋有詔充集賢校理建中初上方靖端百度倄起五諌拜右補闕俄換侍御史興元元年遷刑部貟外郎間一日又以本官兼侍御史介相國蕭公宣慰於江淮奉憂勤之㫖宣豈弟之澤四牡所及熙熙如春既復命轉吏部貟外郎每歲赴調者雜而多端廢置關决在於郎吏情僞之所仗姦利之所因攻堅未導大窽從容折中優而集作而優為之又以京師食貧諸孤衣食為念求出為滁州刺史仁惻之政人到于今懷之朝廷嘉其理行徴入為司門郎中自時厥後比歲超拜歷諌議大夫左曹右轄乃參大政皆用德進人無異詞間一歲遷中書侍郎平章事又一歲感風痺寢疾周月除太子賔客貞元十四年六月某日薨於家追命太子太傅公寬舒𢎞重有姿度風表而憲章品式故事成法經通縝密靡不周貫居諫諍之官言必削槀自非成命頒行而人莫知者又嘗以考課之法溢美相䝉革其巳然當自二府時居左垣固辭上第宰政嘆其能讓因以從之庶官之濫者知懼而百職修矣燮和台階秉直間邪率循中庸左右皇極德輝陶然不見其際詩曰衣錦褧衣裳錦褧裳惡其文之著也公誠有之不然豈移疾家居者旬歲上章乞告者七反然後得請至於飾終追錫有加禮焉此固有以異於常而得之也早歲以逰寓於集作于南譙與崔文貞公講學至榖梁傳因附經義有以規者文貞慙歎為之著重請銘且曰吾以爾為甥亦以爾為友知免於大過矣其推重如此天性篤於慈仁厚於情禮每居功緦之喪其於言而不議議而不及樂率皆容稱其服而有加焉故事宰臣非上公承攝之禮圜丘齊祠之敬則未嘗以騶騎導出國門者公從父弟歿於蜀都輤車之來道秦赴洛出東門十數里以展哀送度越常檢名教多之其居部也叔父下邽令休沐至止朋來憧憧侍食佐酒彌日通夕與羣從之丱者冠者均其指使章紱之外無以異焉再娶無子或以嗣不可絶諭之他求者則曰吾舅文貞嘗集作常言之矣兄弟之子猶子也引而進之可以主後事集無此字故自成童至於捐館其所留於集作于聰明接於心術者中正之外無自入焉歷官俸賜必振六姻之乏即逺裳帷唯資四布之賻季文之亷忠張仲之孝友魏舒之𢎞粹孔光之慎密兼而具之日月有時盍徵諡法用是傳信移諸有司謹狀貞元十四年九月十四日故吏朝議郎守尚書司勳郎中知制誥雲騎尉賜緋魚袋權德輿謹上尚書考功有易名本於周道必視其行勸孰甚焉謹按故朝議大夫守太子賔客贈太子太傅盧公德範顒昻如大主彛器閨門風訓儀表人倫乃持國鈞以鎮雅俗潔矩居易有初有終瞻彼九原既先徴逺之卜節其一惠敢忘至公之議謹上大中大夫守國子祭酒潁川縣開國男賜紫金魚袋贈户部尚書韓公行狀前人曽祖符皇潭陽郡太守祖大智皇河南府士曹參軍贈吏部郎中父休皇太子少保贈司徒諡文忠公京兆府萬年縣芙蓉鄉龍遊里韓洄年六十三狀公字幼深其先潁川之人自同姓於周受封於韓逮獻子而為正卿至景侯而開列國司馬氏代家言之詳矣公大祖播徙居潁川繼有勳力代名忠孝以至文忠公用醇仁清德左右𤣥宗致中和以為國經躬愷悌以為家法公纂承茂緒幼有令聞直方簡重博厚𢎞大該涉羣書尤治春秋詩禮之學必睹其奧而踐乎中未弱冠以門䕃補𢎞文生滿歲參調侍郎逹奚恂唐書作珣矯枉過正以地望降資署章懷太子陵令且將察其詞氣以為銓藻公恬然受署初無愠容當時識者知其致逺天寶末盜陷西集作兩京兄姪七人遭離不淑茹痛違難寓于江南布衣蔬食不聽聲樂者積六七年友弟行義士林以為難翹車辟書旁午而至纍授漢中郡江陵府二功曹大理司直兼漢中郡司馬蘇州司馬且皆有賔介之請所至之邦待公政成甘於粗集作蔽糲聚其祿廪辦其治葬具歸于京師七喪祔窆禮無違者名教之士翕然稱之洪州刺史張鎬以故相之重作鎮江西奏授本州長史莫徭副使懷來夷落嚮方率教乾元中江淮凶饑相扇嘯聚而新安郡負山洞之阻為害特甚朝廷推其能名除睦州别駕知州事俄拜監察御史又轉殿中侍御史賜緋魚袋充江西都團練判官軍州庶政多所訪决歲餘張終于位公主介領留務時吳楚剽輕法禁未一每長史交代人心輒搖公臨以威重撫以慈惠輯寧所集作封部以待守臣李良公峴之充江淮選補使也引于判官多所𢎞益大厯初轉運使留尚書晏盛選從事分命四方而江淮上流為之樞會奏改屯田員外郎兼侍御史知揚子留後纍歲寵集作就加司封郎中肅給而有守清眀而中節有司之移用不匱上國之經費有倫六七年間號為稱職名實益茂徴拜諫議大夫數與左補闕李翰連上封章極言得失未幾以本官知制誥參掌宥密式敷聲明炳然訓辭潤色王度時元載持衡深相器重公愈不自安每因災眚必疏古議集作義且以西漢賜上尊酒之比深警集作警戒之元終不悟竟及於禍公以謗集作旁纍貶邵州司户今上踐位勵精理本徴為淮西淮南等道黜陟使復拜諫議大夫攝衣登車以澄清風俗為已任未及行拜權判户部侍郎專判度支賜金印紫綬先是公兄太傅忠肅公實居其任受邦國之比要制財用之均節物力不絀王府以充出牧也厥職寖集作寢廢公乃革煩政振舊綱既無暴征亦無遺利罷省胥吏冗食者二十餘人明年太府卿張獻恭廣廪庫以受歲杪量入之數又於長安萬年二縣界奏貯米榖數十萬石視年之豐耗而為之發斂人無艱食歲無災荒雖元凱之智略夀昌之功利不是過也上方待集作倚以大任為執事者所抑出為蜀州刺史蜀多火災自古所患俗以為常無所懲禁公到部集作郡逾月令簡事時里胥不勞州兵多暇乃省經用之費給太半之庸俾其埏埴以易蓬蓽翬飛鳥革相望如雲授之逾年乃償其直三歲在郡四封恬然闢田之汙萊三千餘頃復人之庸亡二千餘户教之樹藝俾之生植井絡之下至於今懷之朝廷陟明奏集作表課公實居最有詔徴還既至拜兵部侍郎在職數月遷京兆尹兼御史大夫三輔難理轂下尤甚賊泚之後旱蝗相乘連師十餘萬屯于蒲坂戎裝兵馬仰給京師內安罷氓外贍軍實師克濟而人不困公之力焉轉刑部侍郎刑罰者國之大典所以禁暴而衛善人也而或巧詆比况因緣為奸公講求紀律明為式例悉以條奏頒於四方吏無舞文人得從善矣遷祕書監乃奏置五經正本補羣書之缺蓬閣之中粲然如初復除兵部侍郎纍歲改國子祭酒自兵興已來多趨末流而棄夷闕故學者不振而子襟之詩作焉公曰崇化勵賢本於六籍不殖將落吾其憂乎乃表名儒袁頥韋渠牟列於學官講左氏春秋小戴禮摳衣鼓篋之徒溢于國庠講誦之聲如在洙泗公所至必化其用無方方將荷介祉以錫難老亮天工以纘舊服人望未塞以貞元十年二月九日寢疾終於昌化里之私第皇情軫悼追贈户部尚書哀榮之禮於公備矣公有識度風鑒而博愛容衆與朋友交死生以之眀於吏職能斷大事疏逹而有節粹和而不流約身以周急潔巳而恕物先師四教克蹈其全中臺六職常居其半無忌之鎮靜安國之忠厚延夀之恩信惟公兼而有之允所謂邦之才臣終溫且惠者也龜筮叶吉日月有期易其名者請徴舊典謹狀三月日故大中大夫守國子祭酒潁川縣開國男賜紫金魚袋贈户部尚書韓公故吏某官某謹狀集作上尚書考功夫士之生也躬五常以致用其歿也節一惠以尊名則善否有章賔實不撓謹按故韓公嗣直方於舊德播功行於清朝通而有守忠而能力樹善匪懈好謀而成課績中臺道光太學大雅明哲惟公有之考行飾終古先令典謹撰録所履布諸有司請徴叔發之諡以協周公之法謹上文苑英華卷九百七十三
