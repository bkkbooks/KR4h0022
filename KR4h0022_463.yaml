body:
  text: 文苑英華卷四百六十三宋李昉等編詔敕五改革改尚書洪範無頗字為陂敕孫逖門下典謨既作雖曰不刋文字或訛豈必相襲朕聽政之暇乙夜觀書匪徒閲於微言實欲暢於精理每讀尚書洪範至無偏無陂遵王之義三復兹句常有所疑據其下文並皆協韻唯頗一字實則不倫又周易泰卦中旡平不陂釋文云陂字亦有頗音陂而詔令作之與頗訓詁無别為陂則亦會意為頗則聲不成文應由煨燼之餘編簡墜缺傳授之際差舛相沿原始要終須有刋革朕雖先覺兼訪諸儒僉以為然終非獨斷其尚書洪範無偏無頗字宜改為陂庶使先儒之義去彼膏肓後學之徒正其魚魯仍宣示國學主者施行改正朔制一作改元載𥘉赦制集朕聞上一作元皇纂厯則天地以裁規大聖握圗法隂陽以施化故能牢籠品類陶鑄生靈敷景運於休期闡洪基於光大昔有隋失馭率土分崩赤縣為禾黍之場蒼生遇塗炭之酷我髙祖神堯皇帝龍興汾晉鳯起寰區殄梟獍而安八荒剪鯨鯢而清四海太宗文武聖皇帝膺昊穹之厯數鼓雷電之雄威服逺冠巢燧之前開邊越羲農之際鴻名邁於三五茂績隆於往𥘉髙宗天皇大帝稟雷澤之禎符降天縱之神器湛恩所被匝乾坤覆載之鄉至化所覃盡舟車所通之境撫璇丹極輯瑞蒼嚴天平地成淳風起千年之運樂和禮備寶祚隆三聖之基逖聽王猷熙開帝載朕以虛薄虔奉睿圗業業兢兢不遑寢食幸穹昊貽祐宗社延祥河薦合天之符洛出永昌之籙時和嵗稔逺肅邇安斯皆先德所延屢彰嘉貺自恭臨兆庶一作億兆已積炎涼尚想移風未臻於至道顧循菲德愧切於深𠂻思𢎞顧託之恩再闡混元之始夫以玄穹列象三辰以之一作以所麗天厚載含章五行於焉紀地易曰三五以變錯綜其數通其變遂成天下之文極其數遂定天下之象水火相變其卦為革彖曰天地革而四時成言五德更相生變革萬象一作物故帝者改正施教明受之於天不定之於人者也仲尼曰其或繼周者雖百世可知也蓋以文質相因法度相改故矣是以伏羲髙陽有周皆以建子之月為正神農少昊陶唐有殷皆以建丑之月為正軒轅髙辛夏后漢氏皆以建寅之月為正後雖百代可知者以此雖邅遇之不同步驟殊致未有不表明軌物以章靈命之符者也我國家創業常有意乎正朔矣所未改者蓋有由焉髙祖創草百度因循隋氏太宗緯地經天日不暇給髙宗嗣厯將𢎞丕訓改作之事屢發聖謨言猶在耳永懷無及自五帝纘統三王馭宇或父子相承同體異德或金木迭改應天順人故納麓登庸粵受終于文祖干戈革命必理厯於明時然則開元配永肇自陽來之旦統厯履端基于朔昜之首孶萌發內氣律由中品物一作彚任而昭蘇生類蕩而敷革是知夏之人統不逮殷之地正殷之地正有劣周之天統元命所苞實在兹矣周文稽古制禮於成王之日漢髙握德改元於武皇之代則知文制大備未遑於上業損益之道諒屬於中平朕所以遵飾禮經奉成先志今推三統之次國家得天統當以建子之月為正考之羣藝厥義明矣宜以永昌元年十有一月為載初元年正月十有二月改臘月來年正月改為一月自載初元年正月一日子時已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒皆赦除之其謀反大逆緣及子孫殺祖父母父母部曲容女奴婢殺主不在赦限其與敬業虺沖并諸虺友往還其魁首並已伏誅其支黨事未發者並特從原免不得更相言告內外現任文武九品已上職事官並賜古爵之級天下百嵗已上老人板授下州刺史米粟五石帛十匹一作假九十已上板授上州司馬米粟四石帛七假八十已上板授縣令逋懸調并丁夫雜匠衛士及有畨地等違畨及逃走應陪畨及徴課調者並特宜放免其欠負物官料及盜詐三庫物並不在赦限孤寡􅑏獨篤疾等不能存立者量加賑恤孝子順孫義夫節婦旌表門閭終身勿事天下百姓年二十一身為户頭者各賜古爵之級女子百户賜以牛酒明堂役工人未被恩及者付司即類例定等級奏聞十五日內使了緣供明堂致死人其有未霑勳賜者亦宜凖例酬給今年來不熟處及遭霜潦之處並量放庸課州縣好加檢校勿使飢饉新年軍差科百姓稍有辛苦亦宜量加優恤蠲其徭役所司類例處分供豫州軍百姓艱辛處未得復者宜給復一年洛州輦轂徭役繁多代朔并欣等州行軍及諸州供明堂未及銅處所司各類例節級給復皇親諸陪位未出身者量才處分已出身者賜勳一轉富啇大賈衣服過制喪葬奢侈損費生業州縣相知捉搦兩京兼委金吾檢校天下百姓皆須嫁娶以時勿使外有曠夫內有寡女戰亡人格外贈勳兩轉廽授期親其子孤惸者州縣給糧安飬征鎮人家口州縣存恤勸課殷有之家助其營種勿使外人侵欺仍令所司刋正禮樂刪定律令格式不便於時者內外官五品已上各舉所知九經文字俱學士詳正革其訛舛亡官失爵量加敘録長流人别勑流人移貫人降授官人及役緣逆人用當特詔令無特字及造罪過特處分者雖未至前所並不在赦限西府功臣及晉府子孫屈滯者量加收敘所司奏聞亡命山澤挾藏軍器百日不首復罪如初敢以赦前事相告言者以其罪罪之率土之內賜酺三日赦書日行五百里朕又聞之人必有名者所以吐情自紀尊事天人是故以甲以乙成湯為子孫之制有類有象申繻明德義之由朕今懷柔百神對揚上帝三靈眷祐萬國來庭宜膺正名之典式敷行政之躅宜朕以瞾之少切武后名為名自卦演龍圗文開鳥迹萬人以察百工以乂所以𢎞敷正道宣明禮樂指事會意改易異途轉注象形屈伸殊制周宣博雅史籀興古傳之文尼父溫良丘明述春秋之傳自諸侯力爭姫室浸微離為二周分成七國法律異令田疇異畝言語異聲衣冠異制秦兼天下剗滅古文𨽻率屢興兵車嵗動官獄繁鶩爰創𨽻書自著秦文肇興八體刻符兼於大篆模印逮於殳書兩漢因之九千餘字張敞杜鄴講學於前揚雄甄豐校理於後魏晉以降代乏名儒穿鑿多門形聲轉謬結造新字附會其情今古訛舛稍益繁布規畫無端平之體魚鳥增奔放之容轉相效倣日滋月甚遂使後生學徒罔知所舉先王載籍從此湮沉言念澆漓情深憫悼思反上皇之化佇移季葉之風但習俗多時良難頓改特創制一十二字率先百辟上有依於古體下有改於新文庶保可久之基方表還淳之意昔在包羲開木德之運軒轅應土行之序循環終始布在方册莫不績著帝猷功宣皇道方列三微之統乃膺五行之歷雖則盛比共王強踰嬴政齊桓晉文之業大彭豕韋之美才為霸者豈登帝籙自炎精蕩覆王風哀思漢氏蒙塵中原離析當途逆取但肆兵威典午專權無聞德化故三方鼎畤五胡幅裂或道乖嗣德或業匪孫謀良由取之不以樂推失之在乎虐用者也及齊梁竊據僻在江淮周魏勃興奄宅咸洛雖變夷從夏號令雄行於境內而智小謀大聲教不通於天下隋文御極陳氏猶存開皇之中才聞混一嗣主失道俄至分崩七八年間生人泯絶秦項之酷猶未之半開闢已來蓋未之有我國家祖宗積德文武重光仁風被於四表英猷冠於三代易不云乎天地之道恆久而不易者也仲尼曰善人為邦百年可以勝殘去殺則知聖王久於其道而天下化成矣自魏至隋年將四百稱皇僣帝數十餘家莫不廢王道而立私權先詐力而後仁義勳未踰於列國德不慙一作漸於霸圗雖復時合諸侯一匡區域晉武踐祚荗烈多慙於水官隋帝乘時雄圗不逮於秦氏惟彼二君閠位况區區者豈宜當三統之數者乎朕逖聽皇綱幽求帝典定王霸之真偽洗生人之耳目庶叶三權一作惟之美光宣五帝一作常之次况合宫布政景化惟新太初開厯上元伊始宜以發揮大寶申明厯數恢皇家正土之符繼炎漢真火之序摛之罔極垂之無窮以周漢之後為二王仍封舜禹成湯之裔為三恪所司求其苖裔即加封建其周隋宜同列國封其嗣使主祭焉布告遐邇咸知朕意主者施行載初元年正月一日一作皆唐大詔令改尚書省中書門下省九寺十二衛名及官稱號改正朔改殘文字錢斤兩詳審刪定申理寃屈減大理丞廢刑部獄制一作改元光宅赦制集鸞臺朕聞上皇建極體元氣以育羣生大聖承天法開陽而陶庶類與時舒卷叶三正而推移隨道汙隆應五幹以通變故能牢籠宇宙埏植人靈符景運而財成契休期以光宅昔有隋標季率土淪胥豺狼肆吞噬之災億兆被虔劉之酷髙祖神堯皇帝披圗汾水仗鉞參墟廓氛祲而安四維掃欃槍而清六合太宗文武皇帝負日月而膺運鼓雷霆而震威蕩海夷山功浹八荒之外救焚拯溺仁霑萬域之表樂和禮洽天平地成荗績光於邃初鴻名冠於開闢髙宗天皇大帝雲房誕睿虹渚降靈受緑錯之禎符應朱綈之景命飛車乘毳臣軒頊之不臣沒羽浮金賮禹湯之未賮開邊服逺更闡宇於先基富國寧人重增輝於前烈撫璇當寧調玉氣於明堂考瑞升天朝百神於日觀茫茫衆俗寧知覆燾之恩蠢蠢庶萌孰辨陶甄之力固已千年啓旦三聖重光歷選前書無聞往載豈謂道隆金鏡運迫鼎湖方延翠渚之祥遽托白雲之駕以社稷之大任屬荒眇之微躬欽奉遺言載深悲懼遂以兹菲德開遵嗣聖式綜萬機載宣風化所賴王公卿士各竭乃誠若濟巨川實憑舟楫然自恭臨朝序已積炎涼教靡致於移風道尚慙於變俗良以哀迷在疚荼棘纒身一作心陵廟未安匪遑專慮今者鳯京遙踐龍馭上升既因大禮之終宜更中區之始朕母臨赤縣求瘼之志每盈子育蒼生恤隱之懷鎮切惟欲勵精為政克已化人使宗社固北辰之安區宇致南風之泰以斯酬眷命用此報先恩冀上不負於尊靈下微申於至懇夫五行迭一作逸用列代相承欲崇其德先遵所尚故夏以金運乘驪而尚玄周以木行貴騂而尚赤將隆母德必欲子扶近者地不藏珍山無祕寶皇家土一作上德勝氣彌彰宜崇白賁之象以輔黃中之運自今以後旗熾皆從金色仍飾之以紫畫以雜文其應合改者所司詳依典故供奉帷幔咸用紫色自録府衛所旗並改以皂八品以下舊服青者並改以碧其在京諸司文官職事五品以上清官并六品七品清官並每日入朝之時常服袴褶諸州縣長官在公衙亦凖此自餘官朔望朝參皆依舊其色皆依本品又鎮星之在太微已歷乍載著土精之美應表坤祚之元符宜同成帝以時薦享又東都宜改為神都宫名太初宫但列署分司各因時而立號建官置職咸適事以標名而今曹僚之中稱謂多爽宜改尚書省為文昌臺左僕射為文昌左相右僕射為文昌右相吏部尚書為天官尚書户部尚書為地官尚書禮部尚書為春官尚書兵部尚書為夏官尚書刑部尚書為秋官尚書工部尚書為冬官尚書門下省改為鸞臺中書省改為鳯閣侍中改為納言中書令改為內史太常寺改為司禮寺鴻臚寺改為司賔寺宗正寺改為司屬寺光祿寺改為司膳寺太府寺改為司府寺太僕寺改為司僕寺衛尉寺改為司尉寺大理寺改為司刑寺農寺依舊左右衛亦依舊左右驍衛為左右武衛左右武衛為左右鷹揚衛左右威衛為左右豹韜衛左右領軍衛為左右玉鈴衛左右金吾衛依舊其餘曹司及官寮名未改者所司速制名奏聞又司𨽻之官監郡之職所以巡省風俗制舉愆違今人物殷繁區宇遐曠而所在州縣未能澄肅可置右肅政御史臺一司其職員一凖御史臺專諸州按察其舊御史臺改為左肅政御史臺專知在京百司及監諸軍旅并出使其諸州録事參軍宜依舊仍令在京五品已上清官每日於章善顯福等門各一人待詔朕當親訪正道詳求得失又玄元皇一無皇字帝者皇室之源韞道德而無為冠靈仙而不測業光衆妙仁覃庶品豈使寶胤見御宸居先母竟無尊位可上尊號曰先天太后宜於老君廟所敬立尊像以申誠薦又洛川境內所有帝王之陵及自古清直之臣忠亷之佐並令州縣就其塋域一申祭享又自武德以來元勳佐命或以忠鯁事主或以道德匡君非身在有犯緣子孫絶封者前詔雖已處分或尚有闕遺宜降霈澤重申前命又往日先朝聖武蕩定遐方日月照臨咸為郡縣皆荷生成之惠無復逺近之殊朕矜撫之懷豈隔中外每念其殄嗣愍愴良深繼絶興亡實惟本志宜各求其後胤立以承嗣一作享獻其諸都護漢官及鎮兵等並悉放還其營奉山陵使及鹵簿使等並依别敕處分又兩京之所徭賦實繁亦令所司作優量法使勞逸得所靈駕所涉千里斯遙在路黎氓一作崩莫不哀奉念其勞弊情增感惻其緣供頓及山陵者並免今年課稅又比來諸道軍行敘勳多濫或端居不出以貨買勳真偽相蒙深為巨蠧自今以後所司宜明為條例務令禁斷責成斯在可不勉歟如更有違必越法科處分又比來放出宫女已降詔書然以在內多時咸悉願住但念其各有親屬豈可久致分離宜凖前恩即令放出夫隆平日久户口滋多物務既繁欺隱斯衆其上州萬户已上大縣萬户已上各宜析出别置州縣唯雍涼二州不在此限又濟時之道求賢是務其官人百姓等或器標瑚璉材堪棟幹或在職清慎或抱德幽棲或武藝馳名或文藻流譽宜令京官九品以上及諸州長官各舉一人咸以名薦務取得賢之實無貽濫收之譏又前者有詔具述內外官寮偹陳行事以申勸沮仍恐百官在職尚有虧違今欲重降霈一作深恩更垂寬宥棄瑕録用罔責於前非滌罪論功必期於後善若又不悛已過重挂踈羅當使置以嚴刑倍加其罰思與士庶共此維新可大赦天下改文明元年為光宅元年自九月五日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正見繫囚徒皆赦除之流人未逹前所者放還其犯十惡官人枉法受財監臨主守自盜所監臨劫賊殺人故殺人謀殺人及反逆緣坐并軍將臨戎挫威失律鎮遏失所虧損師徒及常赦所不原免者並不在赦例亡官失爵量加收敘諸年八十已上各賜粟二石綿帛二假九十已上各賜粟三石綿帛三假百嵗已上賜粟五石綿帛五假並依舊例板授孝子順孫義夫節婦旌一作或表門閭鰥寡惸獨篤疾之徒不能自存者並加賑恤亡命山澤挾藏軍器百日不首復罪如初敢以赦前事相告言者以其罪罪之布告天下咸使知聞其詔書內事有未盡仍令所司作條例處分光宅元年九月五日興復神龍開創制一作中宗即位制制集門下聞天地盈虛四時有消息之度皇王興替五運有遷革之期稱號斯殊驪騵亦異受明命者罔不由兹我大唐髙祖神堯皇帝聖期首出天與神器有大功於區夏有大造於生靈太宗文皇聖皇帝道則繼明業推搆極類商湯之起亳若武王之承周彈壓九皇牢籠萬古髙宗天皇大帝上聖御圗大明司契手調元氣心運洪爐齊五緯而平太階應三神而登日觀羅網開闢包冠羲胥大猷備闡能事斯畢仙駕不追逆臣聞疑作開釁敬業挻災於淮甸務挺潛應於沙場天柱將搖地維方繞非撥亂之神功不能定人之危矣則天大聖皇帝亶聰成德濬哲應期用初九之英謀開太一之宏略振玊鈐而殪封豕受金鉞而斬長鯨受河洛之圗書當昊穹之厯數惠育黎獻並登仁壽既而凝懷問道屬想無為以大寶為勞生遂復忝於明辟且有後命俾承先緒光啓大唐之國用崇興復之基交際在辰情深感愴一作慰奉髙祖之宗廟尊太宗之社稷不失舊物實在於兹業既惟新事宜更始可改大周為唐社稷宗廟陵寢郊祀禮樂行運旗幟服色天地等字臺閣官名一事以上並依永淳已前故事其神都依舊為東都北都依舊為并州大都督府永昌來庭兩縣並從省廢其百姓依舊分屬河南洛陽兩縣周朝宗廟陵寢及官宜令所司商量處分朕之逺系出自老君靈佑所資貽慶長久宜依舊上尊號為玄元皇帝省司差使册告天下村落佛堂並令開門灑掃不得因兹聚斂創加修葺庠序之規風教之首京都兩學尚且闕修欲令四方何以取則其京都學館及先聖廟堂所有破壞未營造者逐要修葺速令畢工仍不得浪有勞擾樂府之設國風所繫豈惟易俗抑乃和神至若絲竹繁聲倡優雜伎深乖禮則並宜量事減省國之禮儀已經改撰隨時逐變務在𢎞通宜令禮官重加詳審於行事有不便者即從損益修制一作制敕刪定處分已久宜從易簡務速施行分事設官固須量才稱職比來委任稍亦乖方遂使鞠獄推囚不專法寺撰文修史豈任祕書營造無取於作專勾勘罕從於比部名差别使又著判官在於本司便是曠位並須循名責實不得越守侵官皇家親屬籍沒者則天大聖皇帝雖已溥暢鴻恩其有任五品已上官枉遭陷害者並宜改葬式遵禮典若有後嗣還其蔭資其别敕安置并在貶者亦復其籍屬量還官爵仍遣諸流移人除犯贓賄及畜蠱毒造偽避讐反逆緣坐勘會不免者餘並放還天下軍鎮不要者多轉輸艱辛府庫虛耗事須改弊不可循常宜簡內外官人有材識者分遣充遣巡邊按覆須留鎮遏及應減一事已上並委使人共所管詳度還日具利害奏聞其應支兵先取當土反側近人仍隨地配割分州定數年滿差替各出本州永為格例不得踰越五品已上致仕曽伏事先朝有賜爵一級曽任州府幕府及任洛州牧日官人並勘責奏聞經任東宫官僚見任六品官計階應入五品官者特宜不拘年限餘依常例三衛細引主帥直司行署畨官七絶等通前各減二年勞考滿日各加勳一轉合得官日稍優與處分中書門下官人計階考入五品者優量令史畨官凖羽林例處分直者及外司官典二十二日誅賊之時緣抵承在中書省者各賜勳一轉諸司有品直司宜加一階無品直司賜勳一轉禮官緣即位修執儀注者各賜物二十假正月當蕃三衛監門等於武成衙內明福門外南衙及諸門者賜物十假左右羽林及東宫北門厨供膳及匠凖例各賜物十假正月量追三衛細引監門細引直長飛騎雜伎飛騎各賜物十假東宫北門官及三衛細引監門直長各賜物二十假仍類例功夫多少奏聞其引王册及輿册讀册等官人各賜物五十假授册使人賜物一百假書册人各賜物十假其輿腰與官人賜物二十假飛騎各賜物十五假共輿香蹬三衛及輿寶人各賜物二十假頃者户口逃亡良田差科繁劇非軍國切要者並量事停減若要和市和雇先依時價付錢自非省支敕索不得輒有進送諸貢物皆須任土當處無者不得别求仍於常數每事量減緣百姓間所有不穩便者並委州府具狀奏聞朕當親覽即為釐革天下百姓並免今年租及地稅自今以後租庸凖符配定更不須徴折腳錢其已前未徴得者亦即放免天下宗姓並凖舊式房州百姓宜給復三年其諸司官員并雜色役掌間幕士門僕之徒兼音聲人及丁匠等非灼然要籍並量事減省所司速為條例廄馬數多皆須秼飼食人之粟日費滋深殿中諸間廄馬量支留以外抽送外州馬坊及本監牧其東宫諸王公主等馬應官供者亦令隨事減省奢淫伎巧實為蠧弊皆因節日宗屬婚親諸王公主詔令作王公妃主競相賀遺或造珍麗妄為進奉錦綵異飾雕鏤竒文假撰樓臺偽裝禽獸諸如此類深是害時宜明敕格嚴加禁斷衣服綵章一凖令式夫鄒纓齊服尚且變俗移風朕率先百僚必期化成兆庶東都正月當上畨兵年至五十五即放出前赦及今制處分有不盡者並令所司類例續奏布告遐邇咸使知聞主者施行神龍元年二月五日復尚書省故事制制集敕唐虞之際內有百揆庶政惟和至於宗周六卿分職以倡九牧書曰龍作納言帝命惟允詩云仲山甫王之喉舌皆尚書之任也雖西漢以二府分理東京以三公揔務至於領録天下之綱練核萬事之要邦國善否出納之由莫不處正於會府也令僕以綜詳朝政丞郎以彌綸國典法天地而正四敘配星辰而統五行元元本本於是乎在九卿之職亦中臺之輔助小大之政多所關決自王室多難一紀於兹東征西伐略無寧嵗內外荐費徴求調發皆迫於國計切於軍期率以權便裁之新書從事且救當時之急殊非致理之道今外虞既平罔不率俾天意人事表裏相符將明畫一之法大布惟新之令甄陶化源去末歸本魏晉有度支尚書校計軍國之用國朝但以郎官署領辨集有餘時艱之後方立使額參佐既衆簿書轉還將無𢎞益又失事體其度支使及關內河東山南西道劔南東川西川轉運常平鹽鐡等使宜停禮儀之本職在奉常往年置使因循未改有乖舊制實曠司存委太常卿自舉本職其使宜停漢朝丞相與公卿已下五日一決事帝親斷可否且國之安危不獨注於將相政之理亂固亦在於庶官尚書侍郎左右丞及九卿參領要重朕所親倚固當朝夕相見以之匡益也頃以邉陲未寧日不給暇又寺省之務多有所分簡而無事曠而不接今大舉綱目重頒憲章並宜詳校所掌明徴典故一一條具面陳損益如非時須有奏議亦聽詣閣請對當親覽其意擇善而從朕受昊天之成命承纍聖之鴻業齋心滌慮夙夜憂勞顧以不敏不明薄於德化致使舊章多廢至理未𢎞其心愧恥終食三歎雖詔書屢下以申振恤而朝典未舉猶深欎悼思與百辟卿士勵精於理俾國經王道可舉而行各宜承式以恭爾位大厯五年三月文苑英華卷四百六十三
