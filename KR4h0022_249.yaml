body:
  text: 文苑英華卷二百四十九宋李昉等編寄贈三盧照鄰六首駱賔王三首杜淹一首陳子昂五首喬知之一首李嶠三首李乂二首崔湜一首杜審言三首宋之問一首李適一首徐彥伯二首贈益府羣官盧照鄰一鳥自北燕飛來向西蜀單棲劍門上獨舞岷山足昂藏多古貌哀怨有新曲羣鳳從之遊問之何所欲答言寒鄉子飄飄萬餘里不息惡木枝不飲盜泉水常思稻粱遇願棲梧桐樹智者不我邀愚夫余不顧所以成獨坐耿耿嵗云暮日夕苦風霜思歸赴洛陽羽翮毛衣短關山道路長明月留客思白雲迷故鄉誰能借風便一舉凌蒼蒼山行寄劉李二參軍前人萬里煙塵客三春桃李時事去紛無限愁來不自持狂歌欲道一作歎鳳失路反占龜草礙人行緩花繁鳥度遲彼美參卿事留連求友詩安知倦逰子兩鬢漸如絲贈益府裴録事前人忽忽嵗云暮相望限風煙長歌欲對酒危坐遂停絃停絃變霜露對酒懷朋故朝看桂蟾晚夜聞鴻鴈度何時還桂晚不同攀浮雲映丹壑明月滿青山青山雲路深丹壑月華臨耿耿離憂積空令星鬢一作髮侵首春貽京邑文士前人寂寂罷將迎門無車馬聲橫琴答山水披卷閲公卿忽聞嵗云晏倚杖出簷楹寒辭楊桞陌春滿一作别鳳凰城梅花扶院吐蘭葉繞階生覽鏡改容色藏書留姓名時來不假問生死任交情于時春也慨然有江湖之思寄贈桞九隴盧照鄰提琴一萬里負書三十年晨攀偃蹇樹暮宿清泠泉翔禽鳴我側旅獸過我前無人且無事獨酌還獨眠遙聞彭澤宰髙弄武城絃形骸寄文墨意氣託神仙我有壼中要題為物外篇將以貽好道道逺莫致旃相思勞日夜相望阻風煙坐惜春華晚徒令客思懸水去東南地氣凝西北天關山悲蜀道花鳥憶秦川天子何時問公卿本亦憐自哀還自樂歸藪復歸田海屋銀為柱雲車電作鞭儻遇鸞將鶴誰論貂與蟬萊洲頻度淺桃實幾成圓寄言飛鳬舄嵗晏同聨翩至望喜矚目言懷貽劒外知巳前人聖圖夷九折神化掩三分緘愁赴蜀道題拙奉虞薰隱轔度深谷遙裔上髙雲碧流遞榮疑作縈注青山互糾紛澗松咽風緒巖花濯露文思北常依馭圖南每喪羣無由召宣室何以答吾君在江南贈宋五之問駱賔王井絡雙源濬潯陽集作陽侯九派長輪波集作淪波通地穴委輪下歸塘别島籠朝蜃連洲擁夕陽集作漲韞珠澄集作成積潤讓璧動浮光浮光凝析木一作折木積閏踈圓沚玉輪􅉼地開劍閣一作匝連星起風煙標回秀英靈信多美懷德踐遺芳端操慙謀已謀已繆觀光牽迹強棲遑揆拙迷三省勞生暗集作昧兩忘彈隨一作冠空被笑獻楚自多傷一朝殊語默千里異一作易集作暴炎涼炎涼幾遷貿水一作川陸疲臻湊積水架吳濤連山橫楚岫風月雖殊昔星河猶是舊姑蘇望南浦邯鄲通北走北走平生親南浦别離津瀟湘一超忽洞庭多苦辛秋江無緑芷寒汀有白蘋采采集作之將何遺故人漳水濵漳濵已遼逺江潭未旋返為聽短歌行當憶集作想長洲苑露金薰菊岸風珮搖蘭坂蟬鳴稻葉秋鴈起蘆花晚秋天集作晚秋雲日明亭臯風露清獨負平生氣重集作空牽搖落情占星非聚德夢月詎懸名寂寥傷楚奏悽斷泣秦聲秦聲懷舊里楚奏悲無已郢路少知音藂臺富竒士溫輝凌愛日壯氣驚寒水一顧重風雲三冬足文史文史盛紛綸京洛多風塵猶輕一作由來五車富未重一囊貧李仙非集作悲易託蘇鬼曲集作尚難因不惜勞歌盡誰為聽陽春在軍中贈先還知巳前人蓬轉俱行役瓜時獨未還魂迷金闕路望斷玉門關獻凱多慙霍論封幾謝班風塵催白首嵗月損紅顔落鴈低秋塞驚鳬起暝灣胡霜如劍鍔漢月似刀鐶别有集作後邉亭樹相思幾度攀早秋出塞寄東臺詳正學士前人促駕踰三水長驅望五原天階集作街分斗極地理接樓煩漢月明關隴戎集作胡雲聚塞垣山川殊物候風壤異涼暄集作溫戍古秋塵合沙寒宿霧繁昔余迷學步投迹忝詞源蘭渚浮延閣蓬山欵禁園彯纓陪紱冕載筆偶璵璠汲冡寧詳蠧秦牢詎辨寃一朝從匪集作篚服千里騖輕軒鄉夢隨魂斷邉聲入聽喧南圖終鎩集作斂翮北上遽摧轅弔影慙連茹浮生倦觸藩數竒何以託桃李自無言寄贈齊公杜淹冠蓋逰梁日詩書同志年佩蘭長坂上攀桂小山前結交淡若水履道直如弦此觀終未極於兹獨播遷頳衣登蜀道白首别秦川淚隨溝水逝心逐曉旌懸去去逾千里悠悠隔九天郊野間長薄城闕隱凝煙關門共月對山路與雲連此時寸心裏難用尺書傳入東陽峽與李明府船前後不相及陳子昻東巖初解纜南浦遂離羣出沒同洲島棲泊異汀濆風煙猶可望歌笑浩難聞路轉青山合峯回白日曛奔濤上漫漫積浪集作水下沄沄倐忽猶疑及差池復兩分離離開集作間逺樹藹藹沒遙氛地入巴陵道星連牛斗文孤狖啼寒月哀鴻呌斷雲仙舟不可見搖集作遙思坐氛氲贈嚴倉曹乞推命録前人少學縱橫術逰楚復逰燕棲遑長委命富貴未知天聞道沈冥客青囊有祕編集作篇九宫探萬象三算極重玄願奉唐生訣將知躍馬年非同墨翟問空滯殺集作至龍川度峽口山贈喬補闕知之王二無競前人峽口大漢南橫絶界中國叢石相集作何紛糾赤山復翕赩逺望多衆客逼之無異色摧集作崔崒乍孤斷逶迤屢回直信關胡馬衝亦拒漢邉塞豈依集作伊山河險將順休明德物壯誠有衰勢髙集作雄良易極邐迤忽而盡決漭平不息之子黃金軀如何北集作此荒域雲臺盛多士待君丹墀側贈趙貞固二首前人回中烽火入塞上追兵起此時邉朔寒登隴思君子東顧望漢京南山雲霧裏二赤螭媚其彩集作形婉孌蒼梧泉昔者琅琊子躬耕亦愷集作慨然美人豈遐曠之子乃前賢良辰在何許白日屢頽遷道心固微密神用無留連舒可彌宇宙攬之不盈拳蓬茅集作蒿久蕪沒金石徒精堅良寶委短褐間琴獨嬋娟擬古贈陳子昻喬知之惸惸孤形影悄悄獨逰心以此從王事常與子同衾别離三河間征戰二庭深一作延隂胡天夜雨露胡鴈晨南翔節物感離别一作居同衾違一作還故鄉南歸日將逺北方尚蓬飄孟秋七月時相送出外郊海風吹涼木邉聲暗一作響梢梢勤役千萬里將臨五十年心事為誰道抽琴歌坐筵一彈再三歎賔御涕潺湲送君竟此曲從茲長絶絃此詩二百六卷重出今已削去注異同為一作扈從還洛呈侍從羣官李嶠四海帝王家兩都周漢室觀風昔來幸御氣今旋蹕雷奮疑六合開天行萬乘出玄冥奉時駕白矩參戎律後隊咽節聲前驅嚴罕罼輝光射東井禁令橫西秩帳殿别陽秋旌門臨甲乙將交洛城雨稍逺長安日邙鞏雲外來咸秦霧中失孟冬霜霰下是日農功畢天道向歸餘皇情美隂隲行在名嶽禮遞問髙年疾祝鳥既開羅調人更張瑟登源疑采謳頌俯谷求才術邑罕懸磬貧山無挂瓢逸垂恩浹寰宇展義該文質德澤盛軒逰哀矜深禹恤申歌地廬駭獻夀衢樽溢瑞色抱氤氲寒光變蕭飋宗枝旦奭輔侍從王劉匹並緝蛟龍書同簮鳳凰筆陶甄荷吹萬里歸一作頌歸又作婺婦歎明一歡與道路長顧隨談笑密叨應廊廟選謬齒夔龍弼喜搆大廈成慙非隆棟吉晚景帳然簡二三子前人楚客秋悲動梁臺夕望餘梧桐稍下葉山桂欲開花氣引迎風露光收向晚霞長歌白水曲空對緑池華田假限疾不獲還莊載想田園兼思親友贈杜幽素前人逰宦勞牽網風塵久化衣迹馳東苑路望阻北巖扉及此乘休告聊將狎遁肥十旬俄委疹一作疾三徑且殊歸茂陵窅難即一作仰靈臺暫可依疲痾旅城寺延想屬郊畿夕夢園林是晨瞻邑里非緑疇良已穢清濠曠不追野花何處落山月幾秋暉彼美符商致一作政優逰絶漢機髙情物纍遣逸氣煙霞飛樂道方無悶懷賢獨有違樽虛舊園酒琴靜故人徽夏沼蓮初發秋田麥稍稀何當攜手去嵗暮一作日暮採芳菲此詩三百十七卷重出今已削去注異同為一作寄胡皓時在南中李乂徭役苦流滯風波限泝洄江流通地骨山道繞天台有鳥圖南去無人自北來閉門滄海曲雲霧待君開招諭有懷贈同行人前人逺逰冒艱阻深入勞存諭春去辭園門秋還在一作任邉戌軒車行未返節序催難駐陌上悲轉蓬園中想芳樹蜀山自紛糾岷水恆奔注臨泛多苦懷登攀寡歡趣永夕飛淫雨崇朝蒸毒霧不求綏嶺桃寧美卭鄉蒟白浪行欲靜驄馬何常驅唐韻區遇切刻集者未如此音或改為駐而不知前已押催難駐誤矣願接軺斾塵聮翩東北騖襄陽早秋寄岑侍郎崔湜江城秋氣早旭旦坐南闈落葉驚衰鬢清霜换旅衣時來矜早達事往覺前非體道徒推理防身終昧微故人金華省肅穆秉天機誰念江漢廣蹉跎心事違贈蘇味道杜審言北地寒應苦南庭戍未歸邉聲亂羌笛朔風卷戎衣雨雪關山暗風霜草木稀胡兵戰欲盡漢卒尚重圍雲靜妖星落秋深塞馬肥據鞍雄劍動插筆羽書飛輿駕還京邑朋逰滿帝畿方期乘集作來獻凱歌舞共春輝贈崔融前人十年俱薄宦萬里各他方雲天斷書札風土異炎涼太息幽蘭紫勞歌竒樹黃日疑懷叔度夜似憶真長北使從江左東歸在洛陽相逢慰疇昔相對敘存亡草深窮巷敗集作毁竹盡故園荒雅集作稚節君彌固衰顔余自傷人事盈虛改交逰寵辱妨雀羅爭去翟鶴氅競尋王思極歡娛至明情詎可忘連騎追佳賞城中及路傍琴樽行宴席巖沼卧詞場三川宿雨霽四月晚花芳復此開懸榻寧唯入後堂興酣雊􅀈舞言洽鳳凰翔髙選俄遷職嚴程已飭裝撫躬銜道義攜手戀輝光玉振先推美金銘舊所防勿嗟離别易行役共時康贈蘇綰書記前人知君書記本翩翩為許從戎赴朔邉紅粉樓中應計日燕支山下莫經年入崖口五渡寄李適宋之問抱琴問一作登集作經絶壑筏木泝清川路竒一作極意謂盡勢回趣轉綿人逺草木秀山深雲景鮮余負海嶽情自惜微尚年一作然彌曠十餘載今來宛仍全未窺仙源極獨進野人船時攀乳竇憩屢薄天窗眠夜絃響松月朝楫弄苔淵一作泉固𡨕物一作因𡨕象外理永謝區中緣碧潭可遺老丹砂堪學仙莫使馳光暮空令龜鶴憐一作皆文粹及集本答宋十一崖口五渡見贈李適聞君訪逺山躋險造幽絶眇然青雲境觀竒彌年月登嶺亦泝溪孤舟事沿越崿嶂傳彩翠崖磴互敧缺石林上攢聚一作叢金澗下明滅捫壁窺丹井梯苔瞰乳穴忽枉巖中贈對玩未嘗輟殷勤獨往事委曲練一作錬藥説逮一作邀豫名山期從爾泛海澨嵗晏秉宿心斯言非徒設一作皆文粹和李適答宋之問徐彥伯聞有獨往客拂衣捐世心結欣薄枉渚撰念縈舊林經亘去崖合𡨕綿歸壑深琪樹環碧彩金潭生翠隂沿洄弄沙榜詭仄眺明岑夕聞桂裏猿曉玩松上禽雜珮藴孤袖瓊敷綴雙襟文粹作矜我懷滄洲想懿爾白雲吟秉願理方協存期迹易尋茲言庶不負為報巖中琴贈劉舍人古意前人女牀聞初學記作閟靈鳥文章世所稀巢君碧梧樹舞君青瑣闈或言鳳池樂撫翼更西飛鳳池環禁林仙閣靄沉沉璇題激流日珠綴綿清隂郁穆帝言重熒煌台座深風張丹戺翮月弄紫庭音衆彩結不散孤英跂莫尋浩歌向蘭渚婉孌故儔心文苑英華卷二百四十九
