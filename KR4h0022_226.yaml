body:
  text: 文苑英華卷二百二十六宋李昉等編道門二宫觀六十四首入道士觀庾信金華開八景玉洞上三危雲袍白鶴度風管鳯凰吹野衣縫蕙葉山巾篸去聲笋皮何必淮南館淹留攀桂枝遊始興道隂鏗紫臺髙不極青溪千仭餘壇邊逢藥銚洞裏閲仙書庭舞經乗鶴池遊被擢一作控魚稍昏薤葉歛欲暝槿花踈徒教斧柯爛㑹自不凌虛和庾肩吾入道士館周宏正石橋㸔舊跡一作石橋有舊路虛空一作靈石儼衆仙菊潭溜餘水丹竈起寒一作殘煙桃花經作實海水屢成田送還一作逆愁歸里閈或作舊里追問斧柯年一作皆藝文類聚秋日仙遊觀贈道士王勃石圖分帝宇銀牒洞靈宫廻丹縈岫室復翠上巖櫳霧濃金竈静雲暗玉壇空野花常捧露山葉自吹風林泉明月在詩酒故人集作水非同待余逢石髓集作駕非從爾命飛鴻尋道觀其觀即昌利觀而張天師居也前人芝㕓光分野蓬闕盛規模碧壇清桂閾集作影丹洞肅松樞玉笈三山記金箱五岳圖蒼虬不可得集作見空望白雲衢八仙逕寺南又有昌利觀去寺可數里巖逕窈窕杖而後進前人柰集作大園欣八正松巖訪九仙援蘿規霧術攀桂俯雲煙集作阡岱北鸞驂至遼西鶴騎旋終稀脱塵網連日下芝田和輔先入昊天觀星瞻集作星占楊烱遁甲爰皇里星瞻太一宫天門開奕奕佳氣欝葱葱碧落三乾外黄圖四海中邑居環若水城闕抵新豐玉檻崑崙側金樞地軸東上真朝北斗元始詠南風漢君祠五帝淮王禮八公道書編一作籖竹簡靈藥灌梧桐草茂一作蔓瓊階緑花繁寳樹紅石樓紛似畫地境淼如空桑海中應積桃源路不窮黄軒若有問三月住崆峒集作往崆峒桑海中集作年和劉侍郎入隆唐觀前人福地隂陽合仙都日月開山川凌四嶮城樹隠三臺伏檻排雲出飛軒遶澗廻參差陵倒景瀟洒軼浮埃百果珠為實群峰錦作苔懸蘿暗凝霧瀑布響成雷方士燒丹液真人泛玉杯還如問桃水更似得蓬萊漢帝求仙日相如作賦才自然金石奏何必上天台遊廢觀前人青嶂倚丹田荒凉數百年猶知小山桂尚識大羅天藥敗金爐火苔昏玉女泉嵗時無壁畫朝夕有階煙花栁三春節江山四望懸悠然出塵網從此狎神仙遊紫霞觀駱賔王碧落澄秋景𤣥門啓曙關人疑列禦至客似令威還羽蓋從斯集作徒欣仰雲車未可攀祗應傾玉醴特集作時許寄頽顔遊靈公觀前人靈岑集作峰標勝地集作境神府枕通川玉殿斜連漢金堂迥架煙斷風踈晩竹流水切危集作寒絃别有青門外空無集作懐𤣥圃仙春日登金華觀陳子昻白玉仙臺古丹丘别望遥山川亂雲日樓榭入烟霄鶴舞千年樹虹飛百尺橋還疑赤松子天路坐相招集作邀緱山廟此詩三百二十巻重出今己削去宋之問王子賔仙去飄颻笙鶴飛徒聞滄海變不見白雲歸天路何其逺人間此㑹稀空歌白雲暮霜月漸㣲㣲過太一觀賈生房王維昔余栖遁日之子煙霞鄰共携松葉酒俱篸竹皮巾攀林遍巖洞採藥無冬春謬以道門子徵為驂御臣常恐丹液就先我紫陽賔天促萬塗盡哀傷百慮新跡峻不容俗才多反累真泣對雙泉水還山無主人一柱觀張說舊說江陵觀初疑神化來空山結雲閣綺靡隨風廻柰何任一作祗一柱斯焉容衆材竒巧集作功非長世今餘草露臺同邢判官尋龍湍觀歸湖中孫逖星使下仙集作天京雲湖喜晝晴更從探穴處還作棹歌行絲管荷風入簾帷竹氣清莫愁歸路逺水月夜虛明尋雍尊師隠居李白群峭碧磨天逍遥不記年撥雲尋古道倚樹聴流泉花暖青牛卧松髙白鶴眠語來江色暮獨自下寒煙潯陽紫極宫感秋前人何處聞秋聲翛翛北忩竹廻薄萬古心攬之不盈掬静坐觀衆妙浩然媚幽獨白雲南山來就我簷下宿懶從唐生决羞訪季主卜四十九年非一往不可復野情轉蕭散世道有翻覆陶令歸去來田家酒應熟清明日宴梅道士房孟浩然林卧愁春盡開軒覧物華忽逢青鳥使邀我赤松家丹一作金竈初開火仙桃正落花童顔若可駐何惜醉流霞此詩二百十四巻重出今已削去遊精思觀回王白雲在後前人出谷未停午到家已夕曛集作至家日已曛廻瞻下山路但見牛羊群樵子暗相失草蟲寒不聞衡門猶未掩佇立待集作望夫君宿天台桐栢觀前人海行信風㠶夕宿逗雲島緬尋滄洲趣近愛赤城好捫蘿亦踐苔輟棹恣窮集作探討息隂憇桐栢采秀弄芝草鶴唳清露垂鷄鳴信潮早願言觧纓絡從此去煩惱髙歩凌四明𤣥縱集作蹤得三老紛吾逺遊意學此集作樂彼長生道日夕望三山雲濤空浩浩宿太平觀綦毋潜見集本夕到玉京寢窅𡨕雲漢低䰟交仙室蝶曙聴羽人鷄滴瀝花上露清泠松下溪明當訪真隠揮手入無倪茅山洞口前人華陽仙洞口半嶺拂雲㸔窈窕穿苔壁集作陸差池對石壇方隨地脉轉稍覺水精寒未果變金骨歸來兹路難過方尊師院前人羽客北山尋草堂松逕深養神宗示集作爾法得道不知心洞户逢雙履寥天有一琴一作禽更登𤣥圃上仍種杏成林武陵龍興觀黄道士房問易因題一作贈王昌齡齋心問易太陽宫八卦真形一氣中仙老言餘鶴飛去玉清墻上雨濛濛尋常山南溪道人一作士隠居劉長卿一路經行處莓苔見履痕白雲集作鳥依静渚春草閉閒門過雨㸔松色隨山到水源溪花與禪意相對亦忘言洞陽山已見一百五十九巻過包尊師山院前人賣藥曽相識吹簫此復聞杏花誰是主桂樹獨留君潄玉臨丹井圍碁訪白雲道經今為寫不慮惜鵝群自紫陽觀至華陽洞宿侯尊師草堂簡同逰李延陵石林媚烟景句曲盤江甸南向佳氣濃峯峯遥隠見漸臨華陽口㣲路入葱蒨七曜懸洞宫五雲抱山殿銀函竟誰發金液徒堪薦千載桃花春一作空桃花秦人深不見東溪喜相遇貞白如㑹面青鳥來去閒紅霞朝夕變一從化真骨萬里乗飛電蘿月延歩虛松花醉閒宴幽人即長往茂宰應交戰明發歸琴堂知君懶為縣題玉真觀李秘書韓翃白雲斜日影深松玉宇瑶壇知幾重把酒題詩人散後華陽洞裏有踈鍾同題仙遊觀前人仙臺下見五城樓風物凄凄宿雨収山色遥連秦樹晩碪聲近報漢宫秋踈松影落空壇净細草香開一作閒小洞幽何用别尋方外去人間亦自有丹丘宿洞靈觀皇甫冉孤煙洞靈觀積雪暮山寒松栢凌髙殿莓苔封古壇客來清夜久仙去白雲殘明日開金籙焚香又沐蘭過李尊師院集作過樓觀李尊師盧綸城闕望烟霞常悲仙路賖寧知樵子逕得到葛洪家犬吠松間月人行洞裏花留詩千載鶴送客五雲車訪集作傲世山空在觀碁日未斜不知塵俗士誰解種胡麻尋賈尊師前人玉洞秦時客焚香映緑蘿新傳左慈訣曽與右軍鵝井舊隂苔遍方書古字多成都今日雨應共酒相和虢州逄侯釗同尋南觀因贈别時停居務盧綸相見翻惆悵應憐責廢官過深慙禄在識淺頼刑寛獨失耕桑業同思弟姪歡衰貧羞客過卑束㑹君難放鶴歸雲壁澆花遶石壇輿還江海上跡在是非端林宻風聲結山髙雨勢寒悠然此中别賔僕亦䦨干一作珊題天華觀前人峰嶂徘徊霞影新一潭寒水絶纎鱗朱字靈書千萬巻集作軸蒼髯道士兩三人芝童解說壺中事玉管能留天上春昨見仙丹求不得漢家簮紱集作綬在羸身和李中丞詶萬年房少府過汾州景雲觀因以寄房與李早年同居此前人顯晦澹無跡賢哉常晏如如何驚孤鶴忽乃傳雙魚叙以泉石舊悵然風景餘低徊青油幕夢寐白雲居玉洞桂香滿雪壇松影踈沉思瞩仙侣紆組正軍書積學早成道感恩難遂初梅生諒有感歸止豈無廬題葉道士山房顧况水邊垂栁赤欄橋洞裏仙人碧玉簫近得麻姑書信否潯陽向上不通潮題玉真觀公主山池院司空曙香殿留遺影春朝玉户開羽衣重素機集作几朱網儼塵埃集作輕埃石自蓬山得泉經太液來栁絲遮緑浪花粉落青苔鏡掩鸞空在霞銷風不廻一作來惟餘古桃一作古壇樹傳是上仙栽同蕭鍊師宿太一廟李益㣲月空山曙春初集作祠謁少君落花壇上掃集作拂流水洞中聞酒引芝童奠香餘桂女焚鶴飛將羽節遥向赤城分雲陽觀寄袁稠李端花洞漏沉沉集作花洞晩隂隂仙壇隔杏林潄泉春谷冷𢷬藥夜窻深石上開仙酌集作山酒松間對玉琴戴家溪北住雪後去相尋武康郭外望許緯先生山居崔洞湖上千峰帶落暉白雲開處見柴扉松門一逕仍生草應是仙人一作先生向郭稀題茅山李尊師所居嚴維天師百歲少如童不到山中更不逢洗藥毎臨新瀑水歩虚時遶最髙峯籬根五月留殘雪座石千年䕃古松此去人寰知近逺廻㸔路隔一重重經故賀賔客鏡湖道士觀朱放已得歸鄉里逍遥一外臣那隨逝集作流水去不待鏡湖春雪裏登山屐林間漉酒巾空餘集作留道士觀誰是學仙人宿王尊師居于鵠夜愛雲林好寒天月裏行青牛眠樹影白犬吠猿聲一磬山集作上院静千燈溪路明從來此峯客幾個得長生過凌霄洞天謁張先生祠前人戢戢亂峯裏一峯獨凌天下㸔知一作如尖髙上有十里泉至人愛幽深一住十五一作五十年懸犢一作牘到其上乗牛耕藥田衣食不下求乃是雲中仙山僧獨知處相引衝碧烟斷崖畫昏黒槎臬横雙一作隻椽面壁攀石稜養力方敢前累歇日已没始到茅堂邊見客不問誰禮質無周旋醉卧枕欹樹坐寒展青氊折松掃藜牀秋菓顔色鮮鍊蜜敲石炭洗澡乗瀑泉白犬䑛客衣驚走聞腥羶乃知軒冕徒寜比雲壑眠一作皆王安石詩選早上凌霄第六峰入紫谿禮白鶴祠前人路轉第六峰傳是十里程放石試淺深䃂壁蛇鳥驚欲下先襞衣路低避枯莖廻途歇嵌崛整帶重冠纓及到紫石溪晻晻天已明漸近神仙居桂花濕溟溟隂苔無人蹤是得白鶴翎忽然見朱樓象牌題玉京沉沉五雲影香風散縈縈清齋列上堂忩户懸水晶青童搗金屑臼杵聲丁丁腥羶遥問誰稽首稱姓名若容在溪口願乞殘雲英同張明府遊仙臺朱灣松檜隂隂一逕㣲中峯石室到人稀仙官不住青山在古老相傳白日飛華表問㸔何歲木片雲留著去時衣今朝𢡟疑作茂宰尋真宰暫駐雙鳬且莫歸宿天柱觀僧靈一石室初投宿仙翁喜暫容花源隔水見洞府過山逢泉湧堦前地雲生户外峰中宵自入定不是欲降龍經仙人渚即沈山下古人沈羲白日昇仙處僧皎然日月人間短何時此得仙古山春已盡遺渚事空傳不見騰雲駕徒臨一作聞洗藥泉如今成逝水翻使恨流年仙女臺得仙字前人寂寞一作寂舊桑一作朱田誰家一作何時女得仙應無鷄犬在空有子孫傳古木花猶發荒臺月尚懸一作荒臺路未還片雲低不散一作暮雲一片疑是却一作欲歸年題應聖觀王建見集本精思堂上畫三身廻作仙宫度美人賜藥御書金字貴行香天樂羽衣新空廊雨滴花甎縫小殿蟲縁玉像塵頭白女冠猶說得枯株不似已前春題東華觀前人路盡烟光外院門題上清鶴雛靈解集作虛語瓊葉軟無聲白髪道心熟黄衣仙骨輕還歸對憂樂何處覔長生和楊三舍人晩秋與崔二舍人張秘監苖考功同遊昊天觀時中書寓直不得陪隨因追往年曾與舊僚聯遊此觀記題在壁已有淪亡書事感懷輙以呈寄兼呈東省三給事之作楊君見徵鄙詞因以繼和武元衡瑶圃髙秋㑹金閨奉詔辰朱輪天上客白石洞中人珮響泉聲雜朝衣羽服親九重青瑣秘三秀紫芝新化藥秦方士偷桃漢侍臣玉笙王子駕遼鶴令威身歎逝頺波逺緘詞麗曲春重將悽恨意苔壁問遺塵一作因題元和師仙藥室楊衡山邊蕭寂室石掩浮雲扄遶室㣲有路松烟深㝠㝠入松汲寒水對鶴問仙經石几香未盡水花風欲零何年去華表幾度窮滄溟却顧宦遊子𦕈如霜中螢遊陸先生故巖居前人獨壑臨萬嶂蒼苔絶行跡仰窺猿挂樹一作松俯對鶴巢石上有一巖屋相傳靈人宅深林無陽暉幽水轉鮮碧拾薪遇遺鼎探空得古籍結念候雲興燒香坐終夕宿青牛谷梁鍊師仙居前人隨雲歩入青牛谷青牛道士留我宿可憐夜久月明中惟有壇邊一枝竹經東都安國觀九公子舊院作劉禹錫仙院御溝東今來事不同門開青草日樓閉緑楊風將犬昇天路披霓赴月宫武皇曽駐蹕親問主人翁元和十年自朗州承詔至京戱贈㸔花諸君子前人紫陌紅塵拂面來無人不道㸔花廽𤣥都觀裏桃千樹盡是劉郎别集作去後栽再遊𤣥都觀絶句前人百畆庭中半是苔桃花净盡菜花開種桃道士歸何處前度劉郎今獨來善養臺下作集作山上前人先生見堯心相與公集作去九有斯民既已治我得安山一作林藪道為自然貴名是無窮夀瑶壇在此山識者常廽首玉真觀張籍臺殿曽為貴主家春風吹盡竹窻紗院中仙女脩香火不許閒人入㸔花不食仙姑山房前人寂寂桂花裏草堂唯素琴因仙曽改姓見客不言心月出溪路静鶴鳴雲樹深丹砂如可學便欲住幽林西上經靈寳觀觀即尹真人舊宅孟郊道士無白髮語音靈泉清青松多夀色白石恒夜明放歩霽霞起振衣華風生真文秘中頂寳氣浮四楹一片古關路萬里今人行上仙不可見孤集作驅䇿徒西征文苑英華巻二百二十六
