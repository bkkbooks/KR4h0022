body:
  text: 文苑英華巻七百四十六宋李昉等編政理正名論一首從道論一首辯名政論一首質無誠論一首原仁論一首治論一首創守論一首正名論謝偃有闕文先生禀氣冲和資靈傑秀理在㣲而必察言無賾而不探加以體局凝沉風格峻逺蹤班馬而高出嗣顔冉而委蛇于時日暖朱遲風清紫陌長廊赫奕高閣隂岑先生方該秘紀於千載釋凝滯於萬古於是席長筵列髦俊散縹帙布青編簮纓畢萃綺紈咸集乃有以司鎧丈人戎服而至蓬首垢靣頰削背傴左挈㦸右提鞬汗䝉塵不讓而坐先生逆而目之顧而誚曰夫杖者位之基噐者名之實苟有叨竊咎悔必臻當今天下文明會昌御運舉宇宙以寵疑作籠物馳日月而燭幽忠槩盈朝鵷鷺成列是以鳴玉曜蝉者耻方於周召披堅執銳者羞比於韓彭至於探擇人倫招撫要言有羙斯達在噐無假文武異容正一作止非位辯方朱紫無雜任能授用咸得其所是以山無逋客野絶遺賢方欲闡文儒銷鋒刄陳爼豆散牛馬肆志於禮場逰心乎文囿大啓石渠之署廣開天祿之門搜寰内之琳球擢天下之杞梓旅之於東觀㑹之於北閣考往聖之遺迹正先賢之紕紊欲令㣲言隠而更顯至徳晦而復明然後草封岱之儀備射牛之皮疑今子齒既盡矣形又槁焉上不能貢䇿獻竒析珪分祿下不能收視反聴養真存神以螢燭之末光而方増耀於日月涓滴之㣲潤而欲擬浸於江湖其於餘生固亦勞矣猶不免佩弦荷箙坐甲操鋒見長劔而折腰對危冠而屏氣以兹疲朽預此戎班㸃汚我文門虧辱我宰塾顧瞻傳素能不恧乎大人於是俯而慙仰而謝逡廵避席歛衽而對曰僕聞用捨時也窮達命也物固有欲而不可棄此盖有力者走之豈在吾之所筭也且夫苟非其用則周孔無以措其心當其所能則犬馬猶足効其力今請正名改服從子而遊可乎先生曰噫子其不言幾失子矣苟能易位余何簡焉從道論李翺中材之人局集作拘於書而惑於衆而集無而字傳言違衆不祥書云集作曰三人占則從二人之言翺以為言出於内集作口則可守而為恒則中人之惑者多矣何者君子從乎道也不從乎衆也道之公余將是之豈知天下黨言集作然而非之道之私余將非之豈知天下謷言皆是耶集作然而是之將是之豈圖是之之利乎將非之豈圖非之之害乎故大道可存是非可恒也小人則不然將是之先攫其利已將非之先怖其害已然則逺害者心是而非之視集作昡利者心非而是之故所以集無此二字大道喪是非汨人倫壊邪說勝庸可使衆言必聴衆違必從之耶且夫天下嗤嗤集作蚩蚩知道者幾何人哉使天下皆賢人則從衆可也使天下賢人二小人三其可以從乎况貪人以利從則富者之言勝柔人以生從則威者之言勝中人以名從則捐者之言勝而君子之處衆則諄諄然如愚怡怡然如卑當言而黙者三遊同而噐異則黙待近而責逺則黙事及而時未則黙小人俱不然所以君子慎言而小人餙言君子俟時而小人狥時也然則君子黙於衆小人黙於獨皆事勢牽之豈心願耶學而從之者得以擇之矣嗚呼治世少而亂世多賢者集無者字一伸而邪者集無者字百勝在上者言貴和而不貴正在下者言貴從而不貴得設使一室之中一人唱而千集作十人和一人和集無此三字一人訥則見在是矣集無此四字雖欲言之羣而訧之矣當是則見在是集無此三字和者人之喜黙者人之怨集作怒吾寧從道而罹怒乎寧違道而從衆乎斯以辯之四字集作斯所謂辯難易而較集作權是非也集作矣或曰衆可違而不可從不知乎三字集作必乎曰未也君子怯於名而勇於實吾非衆之首衆非吾之從君子完其力而已則奚以違理不吾之問辭非人必從君子耳其聲而已則奚以違所謂君子者進退周旋羣獨語黙不失其正而不罹其害者盡集作蓋在此而已矣辯名政論牛僧孺史記商鞅見孝公以為鞅說之以帝王道公曰安得待數十百年以伯說之欲而未能以強國之術說之而公甚恱也似云強國非帝王之道又若云帝王之道必成於數十百年余愈恐後之為政者捨強國富人而别求帝王之道則潰潰然無指歸矣請㩁而論之且君道無定名便國利人則君之道也然予非謂鞅之政必可以強國富人也而鞅之傳曰令不十年而人大恱家給而人足怯私鬭而勇公戰予則不知皇帝王伯捨此何為君道也且帝如軒轅虞舜乎斬蚩尤而革書作格有苖是不欲強其國歟王如夏啓周文乎㓕有扈而伐有崇是不欲強其國歟伯如齊桓晉文乎脩寓政而蒐彼廬是不欲強其國歟况秦之患者六國若不先富其人未一作而強其國又可以高枕無為而成君道歟况皇帝王伯同位而異名者也孰謂皇帝之名優乎哉王伯之名劣乎哉君人者當務乎道適時不務乎名餙位也故捨名而就時者日昌捨時而就名者日亡宋襄之亡慕伯之名而失時者徐偃之亡慕仁之名而失時者魯隠之亡慕讓之名而失時者若使秦居六國之衡不先富人強國而别求皇帝王伯之道予謂就帝王之名而失時者又安得君於天下乎嗚呼天地不分於皇人帝人王人伯人政利於人皆君也秦始可以弱其國而有天下皇矣乎子曰足食足兵民信之矣又曰既庶矣繼曰富之若此則天子之政亦先強國富人也庸可謂夫子之道非帝王之道歟又曰如有用我者朞月而已可也若如此又不可謂帝王之道必成於數十百年也或曰子云如有王者必世而後仁百年亦可勝殘去殺矣如此則帝王之道久而成者也予又不知其然矣且堯之有道乎生丹朱焉舜之有道乎生商均焉則堯之道宜成於朱也舜之道宜成乎均也又何堯舜之道末成於身而不成於朱均之世也且危邦之人思治甚於饑人之思食也若以數十百年之道導危邦是猶強柔嘉之食逺其期而給饑人邦危人若此何以安之乎飽之乎予故曰政有富生人強國家皆安得不謂之君道也不知皇帝王伯之名升降也又不知數十百年而成何待也質無誠論周衰至秦漢大道根蠧詐源𣲖别姦稔薙紛不可救止往往見強國質小國子弟天子有疑於諸侯亦邀子質之以為膠固春秋之時晉懐質秦而逃歸自立也六國之時燕丹質秦而怨由生也兩漢之時隗洵質而囂再叛也頽風蕩蕩事難殚記豈不由信不以信信之而以質質之以信信人而人信之以疑疑人而人疑之且彼以信矣而我要其質是疑無信矣我以疑疑之彼固不信則質無有矣故記曰殷人作誓而人叛也周人作㑹而人疑也作誓㑹勸人叛疑也人疑誓㑹而叛之况質其子而人疑之則非誓㑹之比也且君臣之道恩義也禮義結其外父子之道天性也慈孝結其内離其内求其外割其天性拘其恩義是不若兩全其道内外恩親䨇得矣若空知彼不得親其親而固結之是不知彼不親其親而怨矣是又質之無益矣昔有孝如曾參者不思離其親豈可以割之慈如卜商者哭以喪明豈可以奪之忍如樂羊者能食其羹又何以質之夫天下愛義者少愛親者多能從人者少能從欲者多故質而求誠我之利少因質以生怨辭者多矣昔樂毅下齊人有告其叛者燕昭猶能備禮送其妻子何也燕昭信毅毅必不叛也茍或以叛質之無益而生怨也柰何秦漢之時不能以至信信之王道導之導之不能奉順以討之討之不服退加修徳以柔之而務質其子脫禍疑之失所則賈怨而生禍禦之得所猶以離其親親非孝者治也於戱秦漢所以至誠不浹於天下矣原仁論韋籌一作牛僧孺救天下者皆曰仁得天下者皆曰利則可乎曰不可也不得已而有天下則曰仁得已而有者則曰利也善畏其利善决其仁英華作人皆聖也湯文王是也原意曰聖人視生民以天下襁褓一作穉在焚溺無不挈者然則挈而授其家乎將遂挈而有之乎彼家無人而有之不得已而仁英華作有矣有人而有之則得已而利矣夏家一無家字無人也謂無㣲字湯有以仁殷有以人矣一作也文王畏其利前賢明湯英華作仁意故曰一無曰字無伯夷後聖明文王意故曰周之徳可謂至徳也已矣治論朱希濟有國家者未嘗不思治孜孜焉求才汲汲焉用人官無曠位命不虛日多不至於治者何哉蓋不知重其夲也夫重其夲莫若安人安人之夲莫先於農桑上自天子下至庶人未有不湏衣食以資飬其生此情性之欲一也故率公卿以躬耕於千畆非獨致敬於粢盛也率嬪御以親蠶於繭絮非獨致羙於黻冕也皆所以先民之教化也下之人必曰王者后妃尚勤於耕桑奈何人哉若天下之人皆相率以耕織為務則榖帛可指期而取榖帛既賤人各足其所欲所欲之大唯衣食而已不饑不寒則時無怨嗟時無怨嗟則和氣充塞則焉有不豐不稔之歲既庻且富然後仁義相及王道可行方困饑寒而能致於仁義者雖淳朴之世君子之人幾希矣今天下之人非不耕也非不蠶也率九州之人一人耕而百人食一人織而百人衣王者之征賦在焉諸侯之車服劔噐在焉職官之祿廪資焉吏人之求取往焉俾一人耕一人織足上下百人之欲不亦難乎僕嘗客於山東寓於民舍觀其耕也候天時相地宜逺求穜稑胼胝手足朝昏引頸以望膏雨借貸以成其饋餉筋力竭盡於磽确汗流汗背一作頴忽以霡霂日熾其背集作頴無不黧黒又婦人之為蠶也髪鬂如蓬晨昏憧憧高條長梯蹈險履危稚女嬰兒目不暇顧嵗時之成否斯在外矣其五稼登於塲圃也未及簸揚蠶之為繭也擇未盈筐犬吠喧嘵悍吏繞于居烹茗飫食然後乃曰若干官之常也若干嵗之逋也我求之何以應執事之欲若不從我他日之役余無庇爾焉民由是懼其督貢之急惮其恐脇之言無不強足其欲粟之熟也糲食未飽蠶之績也家不及絲縷殆不旬五日皆已罄矣至有父子拱手屋壁相顧而坐向使不為盗不為非不鬻不時之物不犯及時之禁不受役於鄉豪不為汙詐之計以給其家可乎故孟子曰父母妻子對之饑寒而不為非未之有也誠哉是言且古者四人各業以成其國士世其詩書農夲其耒耜工傳其䋲墨商積其貨財今士大夫以先王言行政事自守耻趨時㨗急之辯者固獲用於諸侯矣農人之家恒若疑作苦時弊工之屬也亦受其役而不受其直唯賈之利獨便於時若闗禁之賦薄市井之不擾我取積其疑物以中之時如不我容捨而之他邦非刼取加諸之力不能為患農則不然父母存焉桑梓在焉妻子居焉懐土之戀居亦可知使盡室以徃曰避煩賦他邦之政亦我邦也欲何以徃所以今之世士亦為商農亦為商工亦為商商之利兼四人矣審利要時一中百得易於耕織人人為之故諸侯庻人亦争趨之矣且四人之中其一為農亦以為鮮矣加之浮食之衆曷可勝紀其大者而有四焉自京達於閩嶺豪右兼并之家或累思進達其身或求恃世疑以庇鄉里者多以其子納於黄門俾為之時且北宫之中唯有四星蓋上以備左右灑掃之用國家自開元天寳以來中官之盛不下萬人出詔㫖使於四方或恃寵錫之命宣慰勞之恩千里伺其聲塵候騎從其所欲絶情於親愛抗禮於君父不蠶不農受愚頑之施捨亦有積蓄寳貨爭名競利出入乃權倖之門指揮愈僕𨽻之中庸夫者一也道徳之士反為謗議實可顯加甄别用永其道此為弊之深者二也即有衣紫帶金形貎魁偉酒食以招於交逰僕馬以溢於巷陌樗博擊毬以為之業自六軍遍于四方或擊毬一入于門中天子喜恱拜為上將或都城㑹府纔統䌓多阿黨小人撓于王法其目儒者勢欲吞食竊比仇讐曰我武也文武之事墜於地及問其日月風雲孤虛向背鐔鍔之所干戈之别三和六鈞之制一沉一浮之財九地之所宜五行之制變攻守之難易進退之是非莫我知也已失其為武然用之為將欲寄國家之成敗生人之性命其可乎况復喜怒以刑人視人如草芥嚴暴以及物唯物之利己以至於流亡以至於敗亂此為弊之深者三也復有製儒者之冠服習儒者之威儀語不知書百行無取亦有耳剽心記之學多背毁於冠蓋之士其誑不達我能是也又道不是者以勝謗之敗俗倨傲之儀咸致遊宦於州里其官也用刑唯嚴納賄為能狡譎之行為長其行也惣佞媚之術輕折朋友交結邪僻附近右左炫酒令之奥恃博奕之精諸侯遇之曰竒才也能狎宴眤吾與之私焉車服噐用無所愛焉或引之於賔佐委之以紀綱授之以守人必盡刻削之能致聚散之力亦有薄通文藝尤􅎖狂妄升之於府政可知也薦之於朝時可知也冠章甫處同行望之君子哉乃小人也大凢小人之屬非高名厚祿貴胄之家而無之也負販之列行君子斯君子也軒冕之上行小人斯小人也率是小人在位為法必苛為政必僻肉食之外耗蠧齊人此為弊之深者四也吁皆遊惰無業賦疑作殘於國害於農之大者自餘𤨏𤨏亦易驅除耳然無士不可以為治世無民不可以為國唯明主擇君子之人有輔相之才深治理之道與之為政先簡其事則疑省其吏則人易以安且今吏屬太廣實擾於時古者以十羊九牧不知所從今十羊百牧矣㗖食之不足何從之疑事夫事簡吏者然後可以愛惜農人盡歸其時什一之外除其賦歛驅彼浮食遊手之衆使歸田穯即倉廪必實天下之民食斯足矣冠婚喪祭車馬第宅尊卑之制皆歸諸令式豪民富室不得衣文組金玉幃幕不得用繒綵茵褥不得施錦繡自宫中至於王公之家咸遵儉約無使枉費尺帛則天下之民衣斯足矣夫如是化之於道孰有不以從或曰斯論也乃耳目之常夫儒者之言由人之食若今日之食己明之日以為常欲不之致而不之食可乎况高祖太宗得天下之初從魏文公之言以王道為治不三年而化成立國之基斯為逺矣今復用其道莫若用賢良逺邪佞重農桑禁遊惰廢不急之務可以丕復祖宗之耿光堯舜豈逺乎哉何獨治為創守論楊䕫貞觀中文皇帝聴政之暇問房魏以創業守文之難易房對以創業魏對以守文蓋房以經綸之始備極勤劬所以見創業之難矣魏以升平之後率多懈怠所以見守文之難也然則創業之初雄豪未賔生民嗷嗷唯徳是歸所以開基之主皆乘釁而起覩覆車之轍焉肯更修其軌哉當其雲雷未亨天地猶䝉龍虎交馳烟塵晝昏故得一士則前席以待問聞一言則傾耳而聳聴用人若不及從諫若轉圓勇於得而疎於失冐履鋒鏑渉歴險危其取也既勞其得也亦勤誠為創業之難也及乾坤霧霽山河有主四海之内罔不臣妾言而必從如影之附欲而必至如響之應愛之可以升九霄怒之可以擠九泉順意者駢肩逆耳者畏忌好惡之情不由其臧否賞罰之道匪闗於功過下懾以求命衆怒而莫諫此所以為守文之難也然則自漢而下有天下者孰不始則孜孜以親萬機將徯乎治及時既平俗既康以泰自逸怠於庶務者多矣其終而不惰者則幾希矣且創業之主既得之後猶隳夙志以壊大業而况求既治之後即已安之朝其能納讜言任正人屈己以順從抑心以從下者不亦鮮乎魏文貞公守文之難豈初心盈中心昃也總而論之療饑者易為食其創業乎醫者難為藥其守文乎文苑英華巻七百四十六
