body:
  text: 文苑英華卷五百二十宋李昉等編喪禮門上二十七道不供夷盤判四道毁壞壓死判四道木墜誤壓判一道溺死判三道復以冕服判七道縣君死復判一道哭子哭夫判二道所知哭寢門判二道里尹為主判三道不供夷盤判三品喪事夷盤不供司儀云時所不要對喪也寧戚禮亦從宜思有厚於大臣義不遺於小斂今位崇三品名謝百年國章自書其禮物有司豈怠於供擬若春羔已獻在寧室而須開夏蟲正疑闕夷盤而不可自當曠官之責何待司儀之按時則匪要法欲何加同前劉同升喪事攸列凶禮克明佐器者存乎有司致用者期於無吝綴几初設已陳含玉之儀夷盤不供何施造氷之禮且議事以制觀過知仁必若夏日斯炎魄亡逹於墻屋固當秋露結罪刑宜麗於簡書如或冬凄已氷寒氣方總則史魚之殯雖且在堂咎繇之譽終期緩獄理則可也彼其詰哉同前斐士淹凌人掌氷以待邦事深山窮谷居仲冬而益堅獻羔祭韭事司寒而方出且云一日二日亦惟秋刷夏頒在用捨而有時於出納而惟允嗟此三品俄嬰六極金章罷去玉禭方開具疑作夷厥衣於庭中設夷盤於牀下國之老疾猶或不遺朝之榮貴理宜從給徒以氣則分乎寒暑用則期乎折𠂻司儀所告省括之道雖勤主者定詞挈瓶之智斯得同前顧勝生榮死哀士有恆禮弔喪歸賵國著成規三品云亡九泉方閟窀穸之事未展縣棺之儀唅襚所陳遂闕夷盤之典至若夏德方暑自可歸氷冬陰沍寒何煩設器徒窮獻羔之禮方議鷞鳩之訓毁壞壓死判乙有所毁壞而誤死人科其備慮不謹訴合所由為罪對韓極立物有恆堅樹在始繕而不固壞則難支既動作而必虞將紀律而斯約罰之惟五先明宥一作有過之文死則有三終傷不弔之㫖若過誤而先定乃平刑而是察乙則何者率爾薄言已聞滅鼻止災胡乃反唇推過且守之必葺誠備慮而則安牆或不終將隟壞而誰咎罪有所在焉可逃夫同前崔殷九州既滌是資築護庶役斯起于以僝工俾湍悍不生而安居作又彼已之乙謂為何人率作而毁豈增修而藏事壞乃致害仍推過於所由言則飾文慮實無備然壓溺不弔酌戴禮而何傷而殺人者死在蕭章而難忘論以故傷闕則是减稱其誤殺科其不應爾徒有詞吾從丕蔽同前田季羔乙惟賤工執用為是撤彼墻屋嘗聞作向之詩誤此殺人載犯謨虞之律雖因緣毁壞宜申重典而過失殺傷非無彛憲毁垣之下人盍違而去之壞宅之間乙恐非其罪也且凡所隳圮尤資審慎泉臺構落非梓匠之良規廣厦榱崩必鄭僑之見壓備慮欲繩其不謹懸危可恐乎無情既殊故犯之名請抵從輕之議許其收贖竊謂平反同前梁乘奚有建立洎乎崩壞必慎傷人無致害物何哉主者曽不任能顧彼匠人豈因何巧既無備慮且乏周防遂昧立身果貽誤殺事殊隟壞物異榱崩將壓有契於國僑不弔遂符於戴禮况造作之與毁壞匠人之與主司著臯繇之書合以所由為罪且人誰無死痛其不終宜用明刑以慰幽壤木墜誤壓判將作官修城木墜誤殺行者對五材並用關石是鈞百堵崇墉麗譙斯起頃以春風折棟秋雨摧梁雲構俄見於朝傾邊聲不聞於夜泣既而周官揆日斫之登登郢匠成風行者擾擾杠木之下危於坐堂改途而行何必由户異文王之所避同子産之見壓孽由已作殃實人興取類慿河有均暴虎唐諱據法雖論誤殺在禮為之不弔溺死判甲與乙同舟既而甲懼水而投因溺死其家訟乙故殺縣斷以疑對孫欽望靈長演派資潤下以流謙習坎疏源含內虛而濟物故桂林望斷漢臣嗟其水源杭葦無因衛女歎其河廣由是剡木為楫利涉存焉造舟為梁有自來矣惟甲與乙俱因行邁駕言出遊大川為阻家非溱澨不可褰裳地若滄流爰慿鼓棹既而甫辭岸浦喜二子之同舟方駕波心嗟一夫之墜魄尋漆園之奧㫖未昧藏舟考司寇之微言旋驚逝水至若沃焦不易吕梁難嗣一類士龍之笑幾慚漁父之勇家人告稱故殺縣司斷以疑條乙則有詞未云井伏向若平生宿憾殞命猶或推科如其邂逅相逢自死如何結罪誠可俾一作悍竿而求水府豈得陳牒而訟官曹不悟生也有涯將等死而無弔欲使長江岸上式旌孝女之碑箜篌曲中永作狂夫之曲竊稽狀迹不伏為宜同前語稱有朋自逺易曰朋從爾思同氣相求同舟共濟吕安之懷叔夜或泛黃河之水王子之尋戴逵亦冒山陰之雪何以仰止欽賢是慕想彼甲乙道契筌蹄泛漲海之雲若見一作星蓬萊之樹棹倚砂之日方追河洛之仙既而智乏謀身情乖拯物覆舟之慎想伯夷而載虧驚濤之遊歎伯昏而遂逺三命有極百齡俄謝禍兮難倚寧收轉壑之魂比之匪人忽覩盈庭之訟尋端指狀於甲誠亦可矜據理詳刑在乙寧宜置罪何者禮稱不弔溺者已絶律通人情乙惟一作為無咎庶從平典用叶大倫同前鴻爐賦象人壽幾何生榮死哀物類同致晝夜不捨宣尼興其歎息吉凶共同賈誼發其詞賦眷言甲乙俱涉大川懸流波而得朋理征棹而云邁乙則同舟而濟宛若神仙甲乃懼死而投遽嗟沉溺波心乍沒還疑觀影之人泉路不歸便似懷沙之客然則度河奏曲曽不爾思逝水沉魂而招其咎家人有訟虛陳故殺之端乙既無讐難置惟輕之典薄訴不伏理合哀矜縣斷以疑殊乖部一作剖察以愚管見釋放為宜復以冕服判甲復以冕服御史糾其違失對喪等孔昭復禮攸設公侯以下非無降殺用明沿襲且辨等威求彼平生振衣裳而有度號之某甫冀魂魄而知歸至如衮冕是陳爵辨斯列用捨之際抑亦有殊甲實伊何昧我常度未明死者之貴賤罕識凶儀之重輕自可憲章宣尼每事有問何乃祖述季路率爾而行法則無稽難為叔氏之許舉而不物豈免先王之誅白簡彈違固其宜也同前常建喪定等列在乎中制爵為公侯招以上服禮則有數甲其謂何必若錫重五侯寵加八命寢于中霤固當復彼東榮適在他邦是何升其左轂冕服則順鐡冠奚為如或有愆于儀不象厥德僣而有作同彼季孫孝則莫彰異夫曽子所謂殺禮宜其聚慝徵大夫之轍理既有違論司敗之刑法將何逭同前祖詠吉凶殊流冕服異數茍將失制敢用此規而泉壤幽深生涯溘盡綴足斂手初聞於長遊設階乘屋遽見於三號甲也用心審於盡愛尤差司服還暗禮經招平生之衣不有曽子之問加冕辨之服更異邾婁之言相彼豸冠素為人望今將一糾實謂正途同前薛彥國服以命賢喪則觀禮用存升降不易紀律故朝㑹之序必布常於典命死喪之儀亦辨等於司服指彼甲也復冕其誰必也德亞元良位光衮職隨㑹以有紱受命叔孫以車服表庸自可飭虞人以設階命元士而即次取茲鷩衮載展升屋之禮用彼毳辨或同登轂之號道則庶乎禮無違者如或秩殊稍食家匪伐氷以陪臺之𨽻人遂滅裂於喪紀置之於理誰謂不然憲司所劾既不書於祿位宗伯之義亦孰知其用捨且曰獻狀必也正名同前郭廷誨生也有涯死而必復茍或不率克有常憲故國備典訓禮陳等威疑作藏虞人以具一作設階崇壯元一作狄樂吏也士以即次美觀若禱其五祀則事始東榮或問以三號而復行左轂自適變通之要夫何過差之有惟甲向者以冕而復同鄶人之失德刺起素冠齊魯俗之虧喪僣彰𤣥毳既非五等之列須異九儀之品何乃不類祗自塵兮非大猷是經而峻簡斯糾違失之禮其難捨諸同前梁乘祿秩之序貴有常尊凶喪之儀禮無越等已矣逝者魂兮不來死實生哀殁西山於九夜招之望反將北靣而三號既而骨肉復歸精魄無象宛其死矣則無不至且祭神不能如在神猶未饗復魂不似其服魂將奚依至若在館在家匪無名數公侯卿士實有彛倫小者則揄狄素紗諸侯乃衮衣冕服未詳甲也其位若何儻有土之公卿御史斯為折角若食采之鄉士甲也宜從噬膚同前薛大球儉德之恭侈惡之大書分品命禮著等威茍違嚴律曽是抵禁稽諸甲也彼何人斯天不憗遺遄嬰六極服以招魂見誥九章至如受服統戎建節將命或聞以矢亦曰以綏固傷逝者之魂或載先王之典且甲兮云殁亦孔之哀莫知王爵之班胡僣辨師之冕必若位應受則邑錫建侯功有良夫之崇德參士㑹之賜亦奚妨升轂合禮一作理發榮倘或生罔嘉聞死微可作須易大夫之簀豈復諸侯之冕嗟夫鐵冠所紏請審毳衣是用縣君死復判縣君死於路所由不以綏復於右不給役車遽還對眷彼縣君征途有疾庚子戒日止鵩生憂辰已臨年巢梟起歎東流逝矣北首長辭遽委魄於松門奄歸魂於蒿里不祿公室須申臯某之儀屬纊私家即罷求幽之義禮有明說焉可輒違凖例合得遞車所司如何不給但比璧疑作壁用刑須窮兩造鈞金察獄必聽五辭公私之節未明左右如何定罪請更詳委方可要終哭子哭夫判哭子哭夫事對喪子之親哀情已極喪夫之婦為死難勝非無寡鶴之悲豈息驚猿之痛然喪夫喪子悽感雖同而哭子哭夫禮儀須别穆伯之卒已有前規敬姜告言一何無識縣丞行罰之日於禮已違嫠婦指貽之愆在律難恕顧茲刑憲並合推科哭子哭夫判季氏夫子喪哭不捨晝夜鄉人告違禮對季氏令質幽間秀容綺艷事夫有道金叉見美於梁鴻訓子多方布被推賢於孟母為善必應天乎不仁三從靡依兩喪相次欹枕之淚空灑倚廬之望莫依不捨晨昏深符禮制一作則所知哭寢門判太史令緒所知亡哭於寢門之外告違禮對嵗月驚過人生若浮棲露不居空嗟溘死截飈易往共盡何言令緒歎交臂之無依恨同心而遽失瞻九原而長想白日何年撫三益而傷魂青松上月雖墳未宿草而室無其人同宿睪恐用檀弓伯髙事蓋荀子睪如訓髙如廣韻髙與臯同之奄終類一哀而出涕寢門興慟未見其容外野申悲嘗聞斯㫖致哭雖稱失位寧戚亦著前聞禮貴因情夫何推究所知哭寢門判甲哭友人於寢門之外友弟將為疏闊輒毆之對太虛運化勞息有期聖人制禮哀樂殊節甲以詩稱伐木義切斷金追管鮑之平生欣然相得鄙張陳之棄置莧疑作莞爾無恥一作取臨川興歎逝者如斯怨天地之不仁撫琴書之空在昔之莫逆把黃菊而思來今也則亡乘素車而慟哭哭於門外禮亦宜之責以相輕誰執其咎且孔丘將聖昭著格言有弟何知胡然昧議龍頭不見已喪朋從鳯字未題遽招伊戚非理輒毆宜啓刑書請驗所傷用申明罰里尹為主判乙妹無子寡而死請里尹為主决曹掾科其違禮訴云其夫無族對乙妹三從靡依一志空潔榮落朝蕣魂棲夜臺生則事兄義或遵夫歸妹死而誰主禮用行乎寡妻夫無執紼之姻里有主喪之尹雖親不可間義並連枝而事寧敢逾禮從異教决曹謬舉職我之由訴者有詞今汝則盡尚恐邑多匍匐之子家有不相之鄰未詳其宜莫適問罪同前閻渙死生有命男女大綱于其不天可以往唁惟乙之妹華而無實始窈窕以適人桃夭斯美俄惸獨以處室荼毒何深生無託於偕老死奄赴於同穴言念夫族曽何孑遺嗟兮鄰人復已湮滅乙以骨肉之戚匍匐而來據親則可奔喪執義不合襄事况臨窀穸復引銘旌諒天窮之人請里尹為主决曹雖詰於禮無違同前喪則有等自辨於重輕禮之所行亦崇於節制乙以天乎降戾斯殞其夫則穆伯早亡鄧侯無嗣啜其泣矣何痛如之永懷夫黨無親因求里尹為主禮則然矣人何非哉且决曹所稱亦何加止蓋以喪也寧戚禮則因情姊憂去官見稱於陳重弟服去職著美於譙𤣥斯則事之有由一作猷言也何爽得失相半斯之謂歟文苑英華卷五百二十
