body:
  text: 文苑英華卷四百十二宋李昉等編幕府一副使授王忠嗣同隴右節度副使制孫逖門下隴右破吐蕃跳蕩功專知節度行軍兵馬使遊擊將軍守右威衛翊府左中郎將賜紫金魚袋王忠嗣出自將門習於軍政智謀足用材藝超倫頃在河隴備彰誠節持兵所向料敵無遺挫其侵軼之師收其要害之地念功斯在議賞攸歸宜復舊官置同正員乃同隴右節度副使依前專知兵馬先有勳封並宜如故授馬元慶河西節度副使制勑雲麾將軍右驍衛將軍員外置同正員幽州節度副使上柱國馬元慶名重武臣才優將略有剛勇以制敵能廉幹而成務河湟作鎮戎狄是虞既資攻守之術宜佐軍州之任可充河西節度副使判涼州長史兼赤水軍副使仍都知兵馬使餘如故授李正已青州刺史制常衮勑平盧淄青節度都知兵馬使權知節度副使事開府儀同三司試太常卿兼御史中丞上柱國趙郡開國公李正已藴經逺之方有盡忠之節雅擅韜略尤通政理任兼文武誠貫等夷海岱之間兵車所會嘉績明著濰淄其乂實藉循良符節之寄允兹僉屬必能敬事愛人以康流弊宜膺寵授用副分憂可使持節青州諸軍事兼青州刺史餘並如故授論惟清朔方節度副使制勑銀夏綏麟等四州兵馬使同朔方節度副使開府儀同三司前行銀州刺史兼御史中丞歸德州都督武威郡王論惟清智謀沉果政理甄詳資忠之誠表於奉上幹事之用聞於在公佐戎律以成師布藩條而訓俗翟土開闢圁隂底寧威懷相濟聲實惟允晉之北鄙地即隰州介于河汾當此會要憂分式遏實藉良能宜兼中憲之榮式寵外臺之寄可使持節隰州刺史兼御史中丞歸德州都督充本州團練守促使同朔方節度副使散官封如故授王智興檢校右散騎常侍兼御史大夫充武寧軍節度副使領本道兵馬赴行營制白居易勑沂州刺史御史中丞集作大夫王智興李願李訴之鎮武寧也汝為禆將勵節忘身濟成大功汝實有力奬其成效擢授郡符海沂之間尤著聲績宜加新命以寵舊勞仍提鋭師往副戎律夫將之撫衆如子弟則衆之視將如父兄茍推赤心而無疑必蹈白刃而不悔勉親士卒佇剪寇戎可依前件授薛廷範淮南使制崔嘏勑考功郎中薛廷範等吾命重臣往鎮淮海其所選署賔僚得以參用朝列伊爾廷範為時所聞可升天子之堂早入賢侯之幕周旋不忘於中道出處必踐其正途輟兹考績之能俾倅戎旃之盛爾能以事君之道以奉帥則無往而不適矣惟孜與球皆鄆之舊僚也能以通方佐成茂績至今庸蜀人多懷之至於參佐計司主領院務統兩地之榷管專五銖之鎔造各從其請以展良能勉副已知用光所舉可依前件授盧戡桂州副使制勑前江陵縣令盧戡等藩方之命宷寮雖得以上朝廷亦擇其可者而授之至於升副車首賔席自非賢才孰允佳選戡尚義有聞積學多識去於榮進樂在間放以是為請宜乎得人由山立而下或以吏能發為官業或以詞藻蔚彼雋髦各從所適之宜以廣用一作用廣得人之路銀章赤紱耀彼華筵可依前件授鄭齊之靈武副使制朕以靈武重鎮控制西戎故選於和門付以油節思得幹用以佐參畫如聞齊之自得科名留心政術奉沙漠之使佐榷管之司口不告勞人稱奉職某與思謙臨洎思退皆鑽研文學承襲軒裳暢彼聲光端其操履是可以佐樽爼於台席奉指教於才臣而八逹九衝曉巡夜警亦執金吾之重務也咸允章奏無忝所從可授公興鎮州副使等制前人勑大厦將搆必藉良材雲幕既開是資髦士况易水居常山之北容川當桂嶺之南惟是徐方俱為重寄凡所選用誠皆得人爾等或以文學進身或以簮纓襲慶勉思公舉無忝嘉招至於佐戎幕而靜轅門輯政刑而撫凋瘵亦副車之任也正即命服吾豈吝焉可依前件判官授王師魯等嶺南判官制元稹勑王師魯等古稱南海為難理蓋蠻蜒獠俚之雜俗有珠璣玳瑁之竒貨為吏者不能潔身無以格物是以非吳處默之清德不可以耀逺人非孫子荆之長才不可以參密畫爾等皆當茂選取重元戎更職命官各如來奏可依前件授鄭仁弼檢校祠部員外充橫海判官制前人勑鄭仁弼諸侯辟士古實有之近制二千石已上乘軺車者則開幕選才由古道也仁弼等有勞參畫重胤以聞威等著稱詞華䎖亦致請臺省茂膺兼命式示恩榮無忘切磨用副匡益可依前件授王陟監察御史充西川節度判官制前人勑王陟等列諸侯之賔者遷次淹速得與上臺比倫其或饋餉務繁參畫禮重亦得輟自他職副其所求爾等或以政聞或以藝舉守臣上請信不豫欺各竭乃誠以修厥績可依前件授崔蔇檢校都官員外郎兼侍御史充河東判官制勑崔蔇等自元和已集作以來有大勳烈於天下先皇賚豫以保衡者時惟司空度度亦齊栗祗畏不自滿大慎簡其屬毗于厥政惟蔇及銖咸在兹選是用輟我紀察副其勤求惟爾敬玄舊由蕃服效誠于長議以序遷峩峩鐵冠皛皛銀印授之以往其樂所從可依前件授盧崿監察裏行宣州判官制前人勑盧崿等宣城重地較緡之數嵗不下百餘萬管幹劇職靈鹽近戎分務簡僚不易宜稱爾等研究儒術修明政經勉慎所從以承其長可依前件授張洪相里友略山南東道判官制白居易勑朝議郎行太常博士上柱國張洪前瀛莫等州都團練判官朝議郎兼侍御史內供奉上柱國賜緋魚袋相里友略等元翼以大節大忠焯聞朝野授鉞開府殿我漢南而又求賢乞能以自參二則其賔寀宜有以稱之故吾求俊造之英勳烈之胄逹朝議而練戎事者與焉今以洪之知國體奉家聲以友略之富藝文飽軍旅兩中是選合而命之優秩寵章無所愛惜時無今古代有忠賢茍致吾元翼於羊杜間則有陟明之典在洪可檢校尚書職方員外郎兼侍御史充山南東道節度判官仍賜緋魚袋散官勳如故友略可檢校尚書屯田員外郎兼侍御史充山南東道觀察判官勳如故授溫堯卿等賜緋充滄景江陵判官制前人勑溫堯卿等今之俊乂先辟於征鎮次升於朝廷故幕府之選下臺閣一等異日入而為大夫公卿者十八九焉荆門景城南北大府而堯卿等或已參軍要或方受徵書各命以官分試其事名秩章綬分而寵之夫千里之行始於足下茍自強不息亦何逺而不屆哉可依前件餘如故授王師閔檢校水部員外郎充徐泗濠等州觀察判官制勑前徐泗濠等州觀察支使朝議郎殿中侍御史內供奉上騎都尉賜緋魚袋王師閔朕以師律授智興智興以軍書辟閔才既為知己用官不候滿嵗遷所以使能而責闕理也然則贊廉察安戎旅既命之後吾有望於爾焉勉副所從佇展來效可檢校尚書水部員外郎兼殿中侍御史充徐泗濠等州觀察判官散官勳賜如故授路貫等桂州判官制勑藩隅之重委以侯伯軍府之要掌在賔僚貫等以文行修身以智謀從事佐廉問澄清之務撫華夷錯雜之人俾其乂安實在參贊宜及寵命以光所從可依前件授裴敞昭義軍判官裴侔義成軍判官各轉官制勑裴敞等昭義義成今之重鎮實藉賔介以參謀猷而二帥皆勤於奉公精於辟士度才而授職循序而請官頗合所宜咸可其奏可依前件記室授崔鄘等澤潞支使書記制元稹勑崔鄘鄭翺等近制藩府臣僚自軍司馬以下皆得選任其良執事者所移異職而鄘等事訴以狀聞各以秩遷毗于新邑勉爾誠志俾無尤違鄘可監察裏行充澤潞等州觀察支使翺可協律郎充昭義軍書記授姚元康等官充推官掌書記制白居易勑朝散郎行祕書省校書郎姚元康儒林郎試太常寺協律郎鄭懿等益部浮陽皆大征鎮也文昌金略皆賢將相也而能以禮聘士以職任才多聞得人咸樂為用况爾等籌謀文藻各負所長茍能贊察廉掌奏記孜孜不怠翩翩有聲慰薦褒升其則不逺元康可試右武衛倉曹參軍充劍南西川節度推官散官如故懿可試左金吾衛兵曹參軍充橫海軍節度掌書記餘如故授保大軍節度掌書記檢校右散騎常侍房仁寶檢校禮部尚書充職制錢珝勑具官房仁寶等國朝作相之重在明皇帝時以偉德景躅布於史䇿者有吾太尉焉爾仁寶裔孫始以文進不得其志無所成名今用箋奏符檄之才職居藩服乘傳而至善逹戎機思賢之心欲招後嗣春官假秩儒者斯榮且激爾曹勉佐元帥可依前件授朔方軍節度掌書記檢校刑部員外郎兼侍御史李東序檢校司勳郎中兼中丞充職制前人勑具官李東序凡諸鎮陪臣至自其幕府者或計事言功或舉職請命未嘗不召之便殿假以寬言且使鋪陳皆見臧否爾能用儒術佐吾列藩敷揚可取於詳明條貫必由於忠信嘉善之道增秩所宜乘寵而還永觀爾類可依前件授鳯翔節度掌書記范惟乂左拾遺賜緋充職制勑具官范惟乂等軍興以來四方之政益煩矣而負才抱術之士參于武幄者吾嘗授之好爵用表嘉賔復勉其左右聽從始終同奬爾負才甚直抱術且深自有忠謀共贊戎略故加寵於紱冕之上報勞於師旅之間爾其計事出言必公必信更圖保大無或告勞可依前件支使授裴詒監察御史裏行桂管支使等制杜牧勑前鄆曹濮等州觀察支使朝散郎試大理評事裴詒等守臣有司上請諸士皆曰詒等士族之中有政事科名清廉公謹嘗經職守衆稱有才古人於一飯之恩尚有殺身以報之者况於知己得不勉之可依前件推巡授王摶檢校殿中侍御史充義成軍節度推官制劉崇望勑王摶名以文舉祥以履光敬於交人善為知己鈇鉞開幕台鉉奉藩方虛婉婉之籌乃顧翹翹之乘能不輟我周衮之任樂爾漢相之徒建禮部郎官惠文御史敬思寵數勉罄嘉猷可依前件授栁傑等四人官充鄭滑節度推巡制白居易勑試太子司議郎栁傑等古者公府得自選吏屬今仍古制亦命領征鎮者必先慎柬集作禮聘而後升聞矧鄭滑帥承元輸忠伏順炳焉有大節於國奉其上蒞其下實藉寮宷以左右之而傑等或緣飾詞華或貯畜材行揣摩思試以待已知宜振籌謀用光慰薦傑等可某官充鄭滑節度推官巡官等文苑英華卷四百十二
