body:
  text: 文苑英華卷九百八十六宋李昉等編交舊九祭韋太尉文三首祭張中丞文二首祭王員外文一首祭崔中丞文一首祭何大夫文一首祭顗和尚文一首祭李處士文一首祭樊司空文一首祭吕郎中文一首祭李中明文一首為劉尚書祭韋太尉文符載維年月日某官某祭于某官之靈乾坤瑞氣蓊鬱淳精誕生碩臣為才為英其體顒昻其神清明大包九德全貫五行聞望昭宣勳榮峥嶸靜専動直淵默雷聲甲子之嵗宗社震驚塵飛四野人弄豆兵公一作昔在隴州保捍孤城師徒憔悴凶孽縱橫一發沉機萬夫掃平天維地軸為之不傾天子報功夫何超越全蜀千里虎旗龍節堅完卒乘延納賢傑武事雄稜文華昭晣西戎夭矯南詔敻絶德惠震威投心象闕激揚風教提携義烈二十年間沱江澄徹爰有獷人驃國彌臣化所未洽古之不馴飲我大誠沛然來賔遂使皇澤播其無垠奉聖功成樂府聲新一時事業萬古紛綸實兾昊穹福善與人何豫章之磅礴奄摧落乎青春嗚呼曩者危疑之際邪臣交搆獨秉精誠飛章上奏忠同折檻詞近及霤昏霧忽清太陽乃晝淒凉陳跡惋毒中夀志未展於生前寵徒光於身後嗚呼某以薄劣獲事旌旃猥承國士之顧謬居羣彥之先倣徨授署昧懵機權顧無能於布政懼取譏於大賢蕭條岐路眇默風煙諒祖奠之無路瞻夀堂而澘然為賈常侍祭韋太尉文至道之世君臣聖明必有賢才為之挺生昭昭我公得一居貞窺神靈之壼奧涵天地之淳精胸襟洞逹方略縱橫文房啓而風雅斯在武庫開而禍亂乃平甲子之嵗逆泚變節河海沸騰宗社兀隉孤軍隴上勢窮援絶激臨危之肝肺成曠世之勳烈帝有寵命擁旄蜀川威聲烜赫德禮昭宣家有美政人無兀賢熙熙穆穆二十餘年機謀內發英明獨照頓挫西戎經營南詔通驃國之幽阻導彌臣之䆗窱咸屈膝於君王信萬古之榮耀方期驅兵率乘覲謁帝庭承汪濊之殊澤陳訏謨之大經如何尊重遘兹殞靈地偃喬嶽天沉輔星昨者疾瘳之日咸望再起頻造屏內候公動止憂國慷慨請立太子事苟未行歿而後已今上嗣位人神交喜哀傷大賢不見如此某謬以菲薄監臨此軍參蕭曹之議論覩伊霍之功勳淒凉門館顧慕風雲非百身之可贖寄一慟於斯文為西川幕府祭韋太尉文維年月日祭於某官之靈聖厯應數今古同風五百年間運屬我公長河噴射太華穹崇鬱起生人之表獨棲皓氣之中往者鯨鯢蕩海波濤洶洶京洛風塵人神震恐公遂屹立天授智勇斬刈師徒扶持汧隴逆黨憔悴心摧計擁繇是安危繫之輕重天子報功禮數乃殊既渥龍節亦執金吾國之西南實曰成都夷夏混合山川盤紆苟非哲人莫啓令圖咨我賢逹付之方隅公乃壓坤維以厚德注羣生以和氣應變參乎杳冥布政歸乎簡易剗風俗之姦窳平人心之險陂肅貔虎以雲屯禮英髦而麏至蠲萬痾於藥草新百貸於鄽肆綢繆賔客之歡肅穆鬼神之祀補前人之漏略極當時之能事道尊而獷俗承風聲烜而殊鄰慕義狺狺犬戎背約報仇疆場蠆毒大邦冦讐公動機權控扼咽喉闢其陬落係其魁酋峨和窣雲大渡橫流伏不敢動垂二十秋伊昔南蠻嚮化䖍奉朝㫖將率非良撫綏失禮興兵戰伐深入邉鄙十萬之師蕩為癘鬼公以誠往彼由感起拜新詔於皇都歸舊封於越嶲提携椎髻之類簉列青襟之齒驃國之與彌臣伏聫蹤而疊軌臣製樂以奉聖裁文以叙美考一德之輝光諒有唐而已矣方期五福之夀享九命之尊致雍熙於宇內相玉帛於天門何至業之堙鬱逢逝水之迅奔竭涸滄海摧頽崑崙精靈一去徽烈空存嗚呼哀哉錦城秋暮北郊長路寂寞山川蕭踈草樹雖蘋藻之屢薦終轜車而不駐慟軍府之悲凉增煙霞之思暮某等俱以孱鈍獲事旌旄庇蓮府之光彩無汗馬之勳勞戴恩愧厚顧位慙髙問沉痛之何有與三江之滔滔為劉尚書祭張中丞文二首前人維年月日祭于某官之靈惟靈和粹在躬行方而通瀟灑囂塵之外翺翔禮樂之中與物大聖推之至公落落賢人之慶恢恢長者之風學有餘力備功衆藝環璧文章龍蛇草𨽻江湖之地東西無際獨負髙名聞乎早嵗赫赫太師光鎮此川大啓幕府盡心招延運籌帷幄之內折衝樽俎之前鬱然時論謂蜀得賢某也不才接武隨肩𬗟茂三益周旋十年或朝逰古寺或夜接華筵歡呼盞斚嘯傲風煙神理無狀忽鍾沉疾顧侣無悰懷仁若失隂深府舍寥落煙日雖道義不間於同心而語笑每乖乎促席何士林之凋瘵碎金相與玉質某以懦劣謬司戎律方屬理兵未遑造室眷言襟契何啻膠漆一靣有乖百齡俄戢舊鄉迢遞素帷蕭瑟望精爽以申哀誠不知涕洟之所出二惟靈總四科之要推六藝之先襟懷灑散文翰聨翩寄情琴酒長嘯風煙有名當世三十餘年誠謂羽翼中朝潤色王度翔鸞彩鳳趐翼雲路荏苒江海蹉跎晚暮道乃光華疾成沉痼崇巖絶集作舟壑松摧桂蠧哀兹下泉永寐不寤某頃同舍周旋後塵肺腸見許筆硯相親顧以孱虛每慕仁人實兾鄙志於兹大伸奈何昭時奄落窮塵永懷道義臨風酸辛畫翣栁車白日青春鄉關樹老岷蜀塋新戎事見羈執紼無因具樽罍以寫意聊寄恨於江濵為劉尚書祭王員外文前人維年月日祭於某官之靈惟靈行業端簡襟期髙朗類彼雲霄萬夫是仰根蟠一德冥入羣象和自中來道非外奬風儀峻峙神氣森爽清濟橫流蓮峰直上爛爛文章早嵗擅場鏘金叩玉折桂穿楊昔在太師作鎮坤方大啓幕府聿求賢良君赴招筵價重圭璋賔主之際赫然有光余復繼來厠接周行契侔金石韻擬笙簧並几聨曹擁闥環廊紛紜笑謔爛漫壺觴昨者象緯成災禍丁故使門庭倉卒軍旅沸渭猥䝉遺令俾司留事顧此孱虛實憂殞墜東川無狀橫相猜忌破表焚箋封山掠騎因得討罪誅其不義屢犯鋒鋩幾經憂畏天子明察龍旌旋至何事諛才忽膺重寄告語未接潰瘍已熾晷刻小暌音容永閟如何昊蒼負此沉意危迫是同歡榮乃異嗚呼哀哉嘗寮分切親懿情偏念家道之霜藐若肺腸之焦然位不過郎署夀才及中年彼禍淫與福善吾將仰首而呼天一樽酌奠百慮纒綿惟撫孤之感躅庶幾誠之在一作有焉為杜相公祭崔中丞文前人嗚呼子有四教文行忠信惟公佩服終身不磷惠慈敦厚溫恭淑慎趨善如流惟賢是進公方可與利用無朕騄驥絶塵青萍淬刃纍參戎府九牧大郡教化諏謀作程垂訓不躋髙位丁此巨舋茫茫上天殲我賢雋嗚呼佑自弱齡實奉周旋綢繆出處四十餘年昔佐此府周行接聨佑忝末介公總中權朝整金鑣夕同綺筵揮動盞斚沉吟風煙對博千場春日秋天氣振耳熱勝負爭前今也冥冥音容藐然沉思永痛涕泣纒綿嗚呼世且多故權窆兹地苟安其宅豈靈之意悠悠羸疾浩浩官吏無因執紼逺送幽隧天寒景淑雲愁鴈思傾一巵以寫哀誠痛百年之永異祭何大夫文前人巖巖泰山羣嶽攸宗公有盛德與之比崇髙朗沉深神超氣融禮樂方外粹和積中顒顒昻昻大人之容天髙起鶴泉深見龍早張雄詞叩玉鏗鏘文場一戰陷敵摧鋒結綬王畿部局生風拾遺丹階危言匪躬公嘗從事浙西盛府咨籌畫略輝光賔主皇帝順狩褒梁重阻納貢匍匐逹行在所帝曰首至西方惟汝建社擁旄于鄂之渚自公之來法舉令行鋤姦剪暴振獨蘇惸疆理封域繕完甲兵十五餘年夏水潦清德宇𢎞曠威容光明日翼休時調鼎和羮嗟此梁棟奈何頺傾一作齡位竟不來負我蒼生嗚呼載有蓬户廬山之曲接連人郡沿洄往復早獲請謁許布心腹掩過與能情優禮縟想公振揚清風無鄰律吕翰墨龜龍縉紳遺我細微合我嘉姻永言感慟破骨傷神嗚呼哀哉去嵗春暮旌旗滿路眄睞風煙留連草樹前日東亭天光曉晴金樽玉管芳樹流鶯誰謂纍夕幽明遽隔瞬目交臂遂成古昔心敬無飾詞哀必激寫慟絶於江干疑精靈之可覿為楊廷評祭何大夫文前人伏惟尊靈涵清明之氣秉中庸之德事業存乎教化忠厚形於家國文章根風雅之奧議論探𤣥聖之域虎視犀額山立玉色惟公昔年聲譽赫然拾遺補闕丹陛之前天子思理垂意藩外聿來沔鄂十五餘載浩浩兹邑民繁境大通至信於豚魚被深仁於幼艾秋霜可畏春日可愛卷風波於夏水失險阻於西塞嗚呼地有四海候一作俟公而清天有三階望公而平昊穹謂何殲我賢明小人君子號呼震驚嗚呼賔主之道人倫之義情禮所加殺身有地如朗小子孱愚下位無絶俗之姿寡卓然之異猥辱提引叨居賢次顧侣之榮撫心多愧頃將重命驅車逺使不憚山川敢告憔悴昔我往矣龍節煌煌今我來思丹旐悠揚慟哭江干若摧肺腸儻神理之昭鑒殊辛酸之未央為江西李常侍祭顗和尚文前人大方浩浩天高地厚彼上人者空門稱首塵埃三界揮斥萬有如淨蓮花出泥離垢早嵗蜀中師事全公一言悟解了得真空靈覺內虛妄境外融寶山見月一作寶月山見性海無風某謬以菲薄投心依止周旋瞻仰年踰一紀東洛之濵湘江之涘晨朝後夜談𤣥析理破壞結縳我則用喜甘露洗心簫韶洞耳一昨猥受朝寄聿來此方撫俗未幾懷仁不忘師雖無心應物則深尺素紆屈千里相尋纒綿舊故啓迪塵襟窮弊邑之風物暢平生之登臨嗚呼風火扇災遽成沉疾暌纍旬之晤語謝百靈疑作齡之形質雖真性之湛然愴尊容之已失荒郊野塔秋晨曉日幡蓋飄蕩香花蕭瑟寄慘怛於斯文諒悲懷之不一祭處士李君文前人良友三人來自蜀川身棲廬嶽氣屬雲天至寶多脆靈芝不堅君與王生早落窮泉當時食貧窆禮從權殯宫蕭索二十餘年在風塵中觸故牽纒每懷曩昔深衷惻然頃亦有意祗承付託訪君姻族獲歸京洛賢舅緇褐外弟罷弱實恐嵗時遂移舟壑神本尚簡禮貴適時即其故地而窀穸之衛玠短命伯道無兒千秋拱樹我心傷悲嗚呼吾李處士已而已而祭樊司空文前人天有神氣地有山川交感絪緼實生大賢聰明惠和忠厚塞淵體剛法健動直靜専在昔安卑屈宰堯山聿來射䇿懼疑登紫垣異日從容危冠上前以手晝地慷慨論邉道合時來舜日堯年纒綿三接奮發九遷帝念和戎公駕軺軒詞危氣激張威懾蕃擁旄襄漢建斾荆蠻卒乘完徑勳庸昭宣征南當陽芳若蘭荃我有令問與之周旋嗚呼仁人在上安危所屬世且多難奪公何速溘然多露壞乎梁木望缺三台夀虧五福大誠至信漸人被俗擁杵輟舂鄉號里哭嗚呼載本諸生器識孱愚猥辱拂拭化珉為瑜昔嵗渚宫灌涸濡沽前年南擁顧重禮殊將致賔僚將貢國都感念厚意使人捐軀漢水之陽峴山之隅千乘曄曄旦夕陪趨秋景沉寥春華芳敷瀾漫盞斚淒鏘笙竽拜首節旄將去踟蹰吟嘯叙什丁寧匡廬星霜未周幽顯異途神歸蒼昊魄散黃壚明明知音今也其孤仰天涕下被臆交襦嗚呼舊山之下石田疏惡智昧經營食無藜藿嵗時淹久情禮漏略瞻望夀堂脾酸肺一作胏削驅䇿輿𨽻匍匐宛洛清酒隻雞中疑作申哀獻恪凉風白露帷帳蕭索門㦸朝開井桐夜落生芻一束意不為薄寫慟絶於精靈兾斯文之可託祭吕郎中文集作祭吕衡州溫文栁宗元維元和六年嵗次辛卯九月癸已朔文粹作八月癸亥朔某日友人守永州司馬員外置同正員栁宗元謹遣書吏同曹家人襄兒以集作奉清酌庶羞之奠敬祭于吕八兄化光之靈嗚呼天乎君子何厲天實仇之生人何罪天實讐之聰明正直行為君子天則必速其死道德仁義志存生人天則必夭其身吾固知蒼蒼之無知集作信寞寞文粹作漠漠永本作莫莫之無神今於化光之歿怨文粹作悲逾深而毒愈集作逾甚故復呼天以云云天乎痛哉堯舜之道至大以簡仲尼之文至幽以默千載紛爭或失或得綽二本作倬乎吾兄獨取其真二本作直貫乎化始與道咸極推而下之法度不忒旁而肆之中和允塞道大藝備斯為全德而官止刺一州年不逾肆文粹作五十佐王之志沒而不立豈非修文粹作循正直以召災好仁義以速咎文粹作夭者耶宗元少二本作幼雖好學晚未聞道文粹作未聞其道洎乎獲友君一作吾子乃知識集作適於中庸削去邪雜顯彰二本作陳直正而為道不謬吾兄二本作兄實使然嗚呼積乎中不必施於外裕乎古不必諧於今二事相兼二本作勘從古至少至於化光最為太甚理行第一尚非所長文章過人略而不有夙志所著文粹作蓄巍然可知貪愚皆貴險狠皆老則化光之夭厄反不榮歟所慟者志不得行功不得施蚩蚩之民不被化光之德庸庸之俗不知化光之心此言一出內若焚裂海內甚廣知者集作音幾人自友朋凋喪志業殆絶惟望化光伸其宏略震耀昌大與行於時德使斯人二本作使斯人徒知我所立今復往矣吾道窮二本作息矣雖其大二本作存者志亦死矣臨江大哭萬事已矣窮天之英文粹作學貫古之識一朝去矣二本作此又一本作終復何適嗚呼化光化光今集有後字何為乎止乎行乎昧乎明乎豈蕩而為太空與化無窮乎將結而為光耀以助照臨乎將二本作豈為雨為露以澤下土乎將為雷為霆以泄怨怒乎豈為鳳為麟為景星為慶二本作卿雲以寓其神乎將為金為錫為圭為璧以棲其魄乎豈復為賢人以續其志乎將奮為明神以遂其義乎不然是昭昭者其得已乎其不得已乎抑有知乎其無知乎彼且有知其可使吾知之乎幽明茫然一慟腸絶嗚呼化光庶或文粹作幾聼之尚饗祭李中明文前人維年月日栁某謹以清酌庶羞之奠致祭于亡友中明之靈夫子之道邈以恆兮夫子之志勵以兢兮求中以謙二字集本作慊末若履冰兮敦仁以孝實蒸蒸兮雖一作誰毁無虧禮莫徴兮集作惟毀死虧禮其他莫懲兮秉端守一信厥朋集作明兮月踰嵗長行若登兮外溫其顔內類直繩兮謾言來加不遽陵兮舉世羣非自視𢎞兮庶優游於道大賚是承兮掩寃舒抑與類升兮胡茫茫而集作其不信卒以禍仍兮豈韜忠裒集又注作裏又作履信鬼所憎兮將教言吾欺終不可徴兮吾方兾子于暮翼有興兮今而棄余志若崩兮若將援而止喪厥肱兮怛而集作其殞心交背膺兮水之綿綿山萬層兮又淫以雨雪紆委硱磳兮鴟鵂夜號集作啼羣瞑凝兮魂思栁州本作鬼以行中道凌兢兮魅魑撝呵曷可憑兮聊致吾慎集作憤斯言孰稱兮文苑英華卷九百八十六
