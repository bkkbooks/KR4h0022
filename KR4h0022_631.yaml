body:
  text: 文苑英華卷六百三十二宋李昉等編謝恩五謝出餞宴狀一首謝賜設狀四首謝賜宴狀二首謝賜食狀三首謝賜酒脯等狀一首謝賜人糧馬料狀一首謝賜米麵狀一首謝賜大麥麵狀一首謝賜鹿狀二首謝賜魚狀一首謝賜蟹狀一首謝賜車螯蛤蜊等狀二首謝賜甘子狀一首謝賜甘蔗芋等狀一首謝賜茶果狀一首謝恩命遣高將軍出餞狀李雍右高力士奉宣口勑以臣臨政特令賜宴恭承惠渥伏念庸微天地周仁木石知感不勝惶悚戴荷之極臣死罪死罪臣歷觀自古君臣凡所際會或因緣黨進或收接功成故未謁而知不言而信豈有地孤援寡毁衆謗深察蒙蔽之中致昭曠之外逢陛下特達之遇當陛下明聖之朝事出常均恩重今昔臣誓將瀝血足可竭誠徒欲殺身豈能報德至如勵精勤政舉直徇公副陛下憂人之心行陛下𢎞道之化豈一作安敢失墜以負神明但函關路懸長安日逺不任戀主慺慺之至謝賜設狀白居易右今日守謙奉宣聖旨以臣初入院特賜設者臣生長窮賤才質孱微草野鄙夫風塵走吏豈期聖造擢在禁闈煦以天慈賜之豐食集作賜以御食臣所以陵兢受命俯伏荷恩心魂不寧手足無措况樽開九醖筵集作饌列八珍惠過加籩榮優置醴金罍引滿將皇澤而共深玉饌屬厭與聖德而俱飽終食且歎捫心自驚戰汗慙惶隕越于下謹奉狀陳謝以聞謹奏謝賜設及匹帛狀右今日高品劉全節奉宣進止集作旨以臣等在院覆策畢特加慰問并賜設及匹帛者臣等職在掌文詔令考䇿雖竭鄙昧猶懼闕遺豈意皇鑒下臨聖慈曲至惠加賜食榮及承筐寵厚縑緗仰難勝於玄貺恩深醉飽退有愧於素餐徒積慙惶何酬慶賜無任感戴屏營之至謝賜設狀元稹右今日某乙奉宣恩旨賜臣就院設者臣聞推食之賜用勸勳勞置醴之恩以待賢彥微臣猥承天眷擢在內庭雨露頻施涓埃莫效陛下載分美祿特降珍羞空懷滿腹之慙未有沃心之鯁既充膚革誓竭肺肝竊位素餐實非誠願微臣無任感激恩私之至為中丞滎陽公赴桂州長樂驛謝勑設狀李商隱右今月某日中使某奉宣進止集作旨就長樂驛賜臣及將吏等設饌者將承閫集作藩寄尚忝朝恩絡繹八珍芬芳九醖臣階緣薄伎塵辱修塗楊執戟之讀書雖無非聖董太中之對䇿何補清時忽委亷車乍離閨籍誠欣列土實耿辭天然猶食指告祥朵頥有慶爰於近驛式降貴臣酒自堯樽饌分禹膳集作殷鼎下霑將校旁耀路岐况臣平生本實孤賤懷書奉役久無黔突之謀入國展儀且懵殽蒸之禮飽期滿腹醉更憂心終虞負乘之災無報雲天之施臣與將吏等無任望闕感恩結戀屏營之至九月九日謝恩賜曲江宴會狀白居易右今日伏奉進止集作旨賜臣等於曲江宴會特加宣慰并賜酒脯等者伏以重陽令節大有豐年錫宴於無事之朝追歡於最勝之地况天厨酒脯御府管絃寵賜忽降於寰中慶幸實生於望外仍加慰諭曲被輝華臣等各以凡才同參密職幸遇休明之日多承飫賜之恩樂感形骸歡容動而成舞榮集作澤均草木秋色變以為春徒激丹心豈報玄澤謹奉狀陳謝以聞謹奏三月三日謝恩賜曲江宴樂狀前人右今日伏奉聖恩賜臣等於曲江宴樂并賜茶果者伏以暮春良月元已嘉辰已集作獲侍宴於內庭又賜歡於曲水蹈舞局地歡呼動天况妓樂選於內坊茶果出於中庫榮降天上寵驚人間臣等謬列近司猥承殊渥集作澤捧觴知感終宴懷慙肉食無謀未展涓埃之效素餐有愧難勝醉飽之恩以此兢惶未知所報謹奉狀陳謝以聞謹奏謝賜食狀張九齡右臣等面奉進止令就集賢院與諸學士等觀聖注道德經尋又賜臣等食竊味道膄兼承珍饌聞義飽德虛往實歸臣等何人叨承渥澤不勝惶悚感戴之至謝每日賜食狀常衮臣衮言臣聞恩或曲存義不虛受故耆儒碩德方載珍羞大節殊勳乃加禮食至於列曹分署各置餐錢匪頒王饔食有公膳陛下勵精庶政垂意輔臣特降非常之慈屢蒙每日之賜上林果實至必先時太官飱牢送無曠日臣等自登三事已涉三旬當朝廷釐革之時佐海內安危之重入趨殿省常奉憂人之旨出在廟堂每思克己之功而不能陳一䇿進一賢外無平戎之謀內闕敘官之實四夷未格百姓未安不副憂勤合當罪纍更承飫賜實用慚惶既招折足之嫌將貽騰周易作滕口之誚伏望重回宸眷載允誠詞俯停三錫之恩伏免萬方之責則神明或祐官謗不行在微臣再受多福無任懇迫悚懼之至代杜相公謝就宅賜食狀劉禹錫右高品某乙奉宣聖旨賜臣食者出自太官飫于私第光榮曲被猥承推食之恩駑蹇未施益重素餐之責舉其七筯若負丘山無任戰荷踴躍之至為宰相謝恩賜酒脯餅果等狀白居易右中使某奉宣聖旨賜臣等前件酒脯二字集作物等俯僂受賜竦躍荷恩天酒來以分甘御肴集作羞降而示惠臣等省躬知感因物言情寵過加籩懼多尸素之責榮同置醴慙無麴糵之功徒瀝丹誠豈酬玄造代謝賜人糧馬料狀此是讓狀英華誤編于此于邵右臣先奉恩旨賜前件人糧馬料初已陳讓不蒙允許臣昨日於延英對見又請前件糧數內停一千人糧聖情未察倍增一作益惶懼臣自興兵已來早參戎律及討慶緒即從先皇皆虔奉睿謀遂稱多難豈臣薄劣輒敢貪天而寵遇特深封賞殊厚纒綿渥澤三十餘年食邑纍加俸料甚一作亦廣自此之外更有田園朝夕所須幸無闕乏不謂繼明之始恩出非常曲賜褒崇霑此糧斛雖雲雨之施在恩私而至極彼凋杇之質顧叨餮而多慙是以形神震駭不知所據懼悚顛沛以促餘年敢犯宸嚴重析哀亮儻蒙全度伏乞賜停謹奉狀云云謝米麵羊酒等狀常衮右中使某至奉宣恩命以至節恩賜米麵羊酒豬鹿及雜口味等者聖旨頻降榮賚過優以周官百品之珍載頒其實雖魏臣五釡之貴豈容其多受賜踰涯拜恩失序臣出自孤賤素甘貧苦不過滿腹竊誡終身且祭不掩豆飯惟脫粟昔聖之美其儉可師敢望豐盈重彰尸曠而雨露偏施歲時益榮俾奉先之饗味兼海陸合族之宴及於膏粱又沐深慈下霑中饋以感以慶啔處難任無德無功慙惶罔措不任戴荷兢惶之至謝賜大麥麵狀張九齡右林招隱宣勑賜臣等招隱説云薦新之外自禁中所出皆是降至尊親耕稼穡之所成也伏以周人之禮唯有籍田漢氏之薦但聞時果則未有如陛下嚴祗於宗廟勤儉於生人事必躬親動合天德臣亦何幸近奉徽音又蒙聖恩猥垂珍錫已飽於聞義况霑此時羞綢繆渥澤未知報效死罪死罪仍望宣牒史館以示將來臣等不勝感荷之至謝賜鹿狀常衮右中使祁國俊奉宣恩旨以前件鹿稍覺鮮好特以賜臣者謬竊和羮之任纍承分食之恩無補涓塵叨一作徒霑雨露上載洪造內愧素餐伏以陛下順時令以宣風展春搜之彛典有司奉職上苑從禽將備御庖獻兹鮮獸宜供六膳以副八珍臣實無功何以受賜寵承殊渥味則非時顧調飪而空慙荷生成而何答無任感恩悚抃之至為晉公謝賜鹿肉狀苑咸右內品官史鳯節至奉宣聖旨賜臣鹿肉一盤捧戴殊私喜躍無地伏以十月農隙三泰歲成展豫離宫時巡近甸幸承扈蹕已荷陪遊之榮恩降自天更沐珍鮮之賜慶覃野次澤被私門顧螻蟻之至微仰丘山而何答無任感佩惶悚之極為晉公謝賜魚狀右內品官葉惠仙至奉宣聖旨賜臣魴魚一盤仍便令造羮伏以九天之使頻過衡門八珍之羞屢霑御膳登盤既榮於薦熟正席更喜於先嘗每侍軒墀曽無獻替歸休私室偏沐恩波空荷紅鮮之慈實負素餐之責無任惶悚感戴之極為晉公謝賜蟹狀右中使焦庭望奉宣恩旨賜臣生蟹一盤便令造食臣自叨陪侍從纍沐殊榮朝天賜浴於御湯退食每霑於仙饌賞隨恩積慶逐時新臣之何功偏承厚錫遊泳渥澤但懼踰涯徘徊寵私無階答效無任望外荷戴之極為晉公謝賜車螯蛤蜊等狀右品官葉惠仙至奉宣聖旨賜臣車螯蛤蜊等仍令便造膳適中使賜臣水犢肉一合自濫陪巡幸纍沐殊私每荷一作沐天恩曽不踰日或承海味或降珍鮮况皆聖主傳芳王人調飪薄效無禆於涓滴厚施轉積於丘山昔周美康侯特霑蕃庶之錫漢崇張禹亟覃賜饌之榮才不逮於前賢而遇每深於曩眷雖竭心盡節何答生成不任云云二右內官趙承暉至奉宣聖旨賜臣車螯蛤蜊等一盤仍令便造趙承忠至又賜生蟹一盤高如瓊至又賜白魚兩箇伏以衡門之下頻降王人簞食之中纍承天饌適口之異無時不霑駭目之珍每日幸一作皆遇顧循涯分何以克當徘徊寵私罔知攸答謝恩賜甘子狀于邵右中使某乙至奉宣進止賜臣前件甘子伏以江潭所出見重於南州苞茅入貢一作菁茅合貢逺歸於北闕陛下念其野次錫及微臣顧萍實以虛言非蔗漿之足擬分甘絶少遷傳李陵甘子少英華作劣非竊荷於恩私食椹懷音敢忘於報效無任云云謝賜甘蔗芋等狀常衮右今月某日喬甘至奉宣恩命賜苑中所種甘蔗及芋等其形豐其味甘曲被生成之恩宛同吳蜀之物過蒙頒錫伏用驚喜陛下以萬靈效祉六合同風養之則生孰云其逺化之自我不隔華夷將有絶域之人服中州而稟教故使他邦之産歸上苑而咸植既登天膳實表地成太和之理於斯可見捧承異貺兢局素餐感戴之誠倍百恆品不任受恩悚懼之至謝賜茶果等狀白居易右今日高品杜文清奉宣進止集作旨以臣等在院修撰制問賜茶脯梨果者集作茶果梨脯等曲蒙聖念特降殊私慰諭未終錫賚旋及臣等慙深曠職寵倍驚心述清問以修辭言非盡意仰皇慈而受賜力豈勝恩徒激丹誠庶集作誆酬玄造無任欣戴抃躍之至文苑英華卷六百三十二
