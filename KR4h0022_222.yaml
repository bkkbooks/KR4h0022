body:
  text: 文苑英華卷二百二十二宋李昉等編釋門四七十首吕溫一首張籍六首姚合十首于武陵二首賈島二十首釋無可十一首劉得仁八首朱慶餘三首周賀九首送文暢上人東逰吕溫隨緣聊振錫髙步出東城月上集作水上無恆地雲行不計程到時為彼岸過處即前生今日臨岐别吾徒自有情送皓法師往太原集作送僧逰五臺兼謁李司空張籍逺去見雙節因行上五臺化雲集作樓侵晚集作曉出隱路到集作雪路向春開邊寺看烽過集作連烽去胡兒聽法來定知巡禮後解夏始應廽送閩僧前人幾夏京城住今朝獨逺歸修行四分律護淨七條衣溪寺黃橙熟沙田紫芋肥九龍潭上路同去客應稀送間師歸江南前人遍住江南寺隨緣到上京多生修律業外學得書集作詩名講殿偏追入齋家得請行青楓鄉路逺幾日盡歸程贈律師前人苦行長不出清羸最少年持齋唯一食尋律不集作講律豈曽眠避草每移徑濾蟲還入泉從來天竺法到此幾人傳山中贈日南僧前人獨向雙峯老松門閉兩崖集作涯翻經上蕉葉挂網集作衲落橙集作藤花甃石新開井穿林自種茶時逄海南客蠻語問誰家贈箕山僧前人久住空林下長齋耳目清蒲團借客坐石磹甃人行似鶴難知性因山強號名時聞衣袖裏暗搯念珠聲寄元緒上人姚合石忩紫蘚牆此世此情涼研露題詩潔銷氷煮茗香間雲春影薄孤磬夜聲長何計休為吏從師老草堂郡中書事寄默然上人前人郡中饒野思集作興過客亦淹晉看月江樓曉尋山石徑秋竟歸何處老誰免此生愁長愛東林寺集作子安禪百事休送贈默然前人出家侍母前至孝自通禪伏日江頭别秋風檣下眠鳥聲猿更促石色樹相連此路多如此師行亦有緣寄白石師前人白石師何在師禪白石中無情雲可比不食鳥難同屨下蒼苔雪龕前瀑布風相尋未有計只是禮虛空送僧逰邊前人師向邊頭去邊人業障輕腥羶齋自潔部落講還成傳教多離寺隨緣不計程三千世界內何處是無生寄無可上人前人十二門中寺詩僧寺獨幽多年松色别後夜磬聲秋見世果皆熟集作慮皆盡又作果皆論來生事更修終期集作須執瓶鉢集作屨相逐入牛頭常州贈僧前人一住毗陵寺師應只信緣院貧人施食忩靜鳥窺禪古磬聲難盡秋燈影集作色更鮮仍聞開講日湖上少魚船送真實上人歸杭州天竺寺前人石橋寺裏最清涼聞説茅庵寄上方林外猿聲連曉磬集作院磬又作磬韻月中湖色到禪牀他生念我身何在此世唯師性亦忘几陌相逄千里别青山重疊樹蒼蒼送無可上人遊越前人清晨相送集作訪立門前麻履方袍一少年懶讀經文求作佛願攻詩句覔成仙芳春山影花連寺觸夜潮聲月滿船今日送行偏惜别共師文字有因緣寄靈一律師前人梵書抄律千餘紙靜院焚香獨受持童子病來煙火絶清泉潄口過齋時夜尋僧僧逰山未歸于武陵數歇渡煙水漸非塵俗間泉聲入秋寺月色遍寒山石路幾回雪竹房猶閉關不知雙樹客何處與雲間訪僧不遇前人人間唯此路獨得一作長緑苔衣及户無行迹逰方應未歸平生何限事到此盡知非獨倚松門久隂雲昏翠微寄無可上人賈島僻寺多髙樹涼天憶重逰磬過溝水盡月入草堂秋穴蟻苔䀶靜藏蟬柏葉稠名山思遍往早晚到嵩丘寄龍池寺真空二上人前人受請終南住俱妨去石橋林中秋信絶峯頂夜禪遙寒草煙藏虎髙僧月照雕霜天期到寺寺置即前朝寄毗陵徹公前人身依吳寺老黃葉幾回看早講林霜在孤禪隟月殘井通潮浪逺鐘與角聲寒已有南浮約誰言禮謁難寄默公前人已知歸白閣山逺曉集作晚晴看石室人心靜氷潭月影殘微雲分片滅古木落新乾夜後風飄磬集作後夜誰聞磬西峯絶頂寒內道場僧宏紹前人麟德燃香請長安春幾回夜間同像寂晝定為吾開講罷松根老經浮海水來六年雙足履只步院中苔僻居無可上人相訪前人自從居此地少有事相關積雨荒鄰圃秋池照逺山硯中枯葉落枕上斷雲間野客將禪子依依偏往還贈莊上人前人一作耿湋不語焚香坐心知道已成流年衰此世定力見他生暮雪餘春冷寒燈續晝明尋常五侯至敢望下階迎此詩二百三十五卷重出今已削去注異同為一作喜無可上人逰山回前人一食復何如尋山無定居相逄新夏滿不見半年餘聽話龍潭雪休傳鳥迹集作道書别來還似舊白髮日髙梳送天台僧前人逺夢歸華頂扁舟背嶽陽寒蔬修淨食夜浪動禪牀鴈過孤峯晚猿啼一樹霜身心無别念餘習在文章送無可上人前人圭峯霽色新送此草堂人麈尾同離寺蛬鳴暫别秦獨行潭底影數息樹邊身終有煙霞約天台作近鄰送僧歸天台前人辭秦經越過歸寺海西峯石澗雙流水山門九里松曽聞清禁漏却聽赤城鐘妙字研磨講應齊智者蹤送敡法師前人度嵗不相見嚴冬知出關孤煙寒色樹髙雪夕陽山瀑布寺應到牡丹房甚寒南朝遺迹在此去幾時還送僧前人此生披衲過在世得身間日午逰都市天寒往華山言歸文字外意出有無間仙掌雲邊樹巢禽時出關送神邈法師前人桞絮落濛濛西州道路中相留春忽盡獨去講初終行疾遙山雨眠遲後夜風繞房三兩樹回日葉應紅送慈恩寺霄韻法師謁太原李司空前人何故謁司空雲山知幾重磧遙來鴈盡雪急去僧逄清磬先寒角禪燈徹曉烽舊房間片石傍著最髙松送知興上人前人久住巴興寺如今始拂衣欲臨秋水别不向故山歸錫挂天涯樹房間集作開嶽頂扉下看萬里曉霜海日生微送安南惟鑒法師前人講經春殿裏花繞御牀飛南海幾回度集作過舊山臨老歸觸風香損印霑雨磬生衣雲水路迢繞集作潮遙蠻草落月濕島松微空水既如彼往來消息稀送覺興上人歸中條山兼謁河中李司空前人又憶西巖寺秦原草白時山尋樵徑上人到雪房遲暮壑潭泉凍荒林野火移聞師新譯偈説擬對旄麾贈僧前人從來只一作多是逰山水省泊禪舟月下濤初過石橋年尚少久辭天柱臘應髙青松帶雪懸銅錫白髮如霜落鐵刀常恐畫工一作師援筆寫身長七尺有眉毫寄無得頭陀前人夏臘今應三十餘不離樹下塜間居貌堪良匠抽毫寫行稱髙僧續傳書落澗水聲來逺逺當空月色自如如白衣只在青門裏心每相親迹且疏冬日喜緒法師往岐陽禮塔回釋無可久思今欲來雙履滑青苔掃雪從雲起過房禮塔回句留間夜作禪請暫時開欲作孤雲去此時余不才秋夜寄龍池寺真空二上人前人夜來思道侣木葉向人飄精舍池邊古秋山月下遙磬聲徹幾里雲白已終宵未得同居止翛然自寂寥冬日寄青龍寺源上人髙僧詩作冬夜寄僧前人斂屨入寒竹安禪過漏聲髙杉殘子落深井凍痕生罷磬風枝動懸燈雪屋明何當招我宿乘月上方行寄興善寺崔律師前人沐浴前朝像深秋白髮師從來居此寺應一作未省有東池幽石叢圭片孤松動雪枝頃曽聽道語别起逺山思寄圭峯宗密師前人絶壑禪牀底泉分落石層霧交髙頂草雲影下方燈朝滿傾心客溪連學道僧半旬髙僧詩作持時一食此行髙僧詩作事有誰能送清徹遊太白山前人卷經歸太白躡蘚别蘿龕若履浮雲上須看積翠南倚身松入漢瞑目月離潭此境堪長往塵中事可諳送覺法師往中條舊隱前人夜葉動飄飄寒來話數宵卷經歸物外轉雪下山椒舊坐杉松大難行石水遙元戎宗內學應就白雲招送皓法師太原講兼謁李司空前人近臘辭精舍并州謁上公路長山忽盡塞廣雪無窮講席開晴壘禪衣涉逺風聞經諸弟子應滿北門中冬晚姚諫議宅會送元緒上人歸山前人禪客詩家見凝寒忽過還分題回諫筆留偈出商關盤徑緣髙雪開房在半山自知麋鹿性亦欲離人間林下對雪送僧歸草堂寺前人殘臘雪紛紛林間起送君苦吟行迥野投迹向寒雲絶頂晴多去遙泉凍未聞唯應草堂寺髙枕脫人羣送契公自桂陽赴南海前人南行登嶺首與俗洗煩埃磬罷孤舟發禪移積瘴開午餐湘鳥下朝講海人來莫便將經卷炎方去不回送知金集作全禪師南逰劉得仁師譽振京城談空萬乘聽北行山已雪南去木猶青夜嶽禪銷月秋潭汲動星回期不可定孤鶴在髙𡨕送智元首座歸蜀中舊山前人像教得重興因師説大乘從來悟明主今去證髙僧蜀國煙霞異靈山水月澄鄉閭諸善友喜似一作似喜見南能送僧歸玉泉寺前人玉泉歸故里集作寺便老是心期亂木孤蟬後寒山絶鳥時若尋流水去轉出白雲遲見説千峯路溪深復頂危寄樓子山雲棲上人前人一室鑿崔嵬危梯疊蘚苔永無塵事到時有至人來澗谷冬深靜煙嵐日午開修心知得地京寺未言回冬夜寄白閣僧前人營營不自停集作相息暌濶隔年情林下期難遂人間事旋生鳥棲寒木逈月映積氷清石室焚香坐懸知笑為名和范校書贈造微上人前人得性見微公何曽執著空修心將佛並吐論與儒通曉潄松杉下宵禪雪月中他生有緣會君子亦應同寄無可上人前人省學為詩日宵吟每逹晨十年期是夢一事未成身枉别山中客殊非世上人今來已如此須得桂榮新晚步曲江因謁慈恩寺恭上人劉得仁豈曰趨名者年年待命通坐吟青嶂上興起白雲中岸浸如天水林含似雨風南宗猶有礙西寺問恭公送侃上人北逰集作侃上人入秦朱慶餘獨去何人見林塘共寂寥生緣聞磬早覺路出塵遙江雪沾新草秦園發故條心知禪定處石室對一作映芭蕉送僧還太原謁李司空前人已共鄰房别應無更住心中時過野店後夜宿寒林寺去人煙逺城連塞雪深禪餘得新句堪對上公吟送僧逰廬山前人客行皆有求集作為師去是間逰野望携金䇿禪棲倚石樓山深松翠冷潭靜菊花秋幾處題青壁袈裟濺瀑流送靈應禪師周賀寒天仍逺去離寺雪霏霏古迹曽重到生緣不暫歸坐禪山店逈補衲夜煙微巡禮何時住相逄的是稀送僧歸靈夏前人南逰多老疾一作病見説講經稀塞寺幾僧在邊城空自歸帶河衰草斷映月早沙飛却到禪齋後邊軍識衲衣送僧還南嶽前人辭僧下水棚因夢嶽鐘聲徑集作逺路獨歸寺幾時重到城風髙寒木落雨絶夜堂清自説深居後鄰州亦不行寄林禪師前人絶頂無禪侣長懷落髮師齋居門掩雪講徹樹生枝沙井泉澄疾秋鐘韻盡遲里中還受請又爽赤城期贈如空上人移居大雲寺向中集作去中齋集作齊前人竹溪人請住何日向中峯瓦舍山情少齋心病色濃臘髙移坐次菊淺露行蹤來往一作嘗記湓城下三年兩度逄絶粒僧前人一齋難過日况復更休糧養力時行道聞鐘不上堂唯留煨藥火不寫化銀一作金方舊有山厨在從僧請作房贈幻法師前人北京一别後吳越幾聽砧住久白髮一作髭出講長枯葉深集作黃葉深香連鄰舍像聲徹逺巢禽寂默聞髙道集作寂默應難問何人是集作識此心四明蘭若贈寂禪師前人叢木開風徑過從白晝寒舍深原草合茶疾竹枝乾夕雨生眠興禪心少話端頻來各無事盡日坐相看送忍禪師歸廬嶽前人浪匝湓城嶽壁青白頭僧去掃一作掩禪扃龕燈度雪補殘衲山日上軒看舊經瀑布下氷寒溜澀薜蘿逄雨曙煙腥已知身事非吾道甘卧荒齋竹滿庭文苑英華卷二百二十二
