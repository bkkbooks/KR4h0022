body:
  text: 文苑英華巻二百六十八宋李昉等編送行三蘇頲九首張九齡六首韋述一首張諤一首梁陟一首張子容二首孫逖八首王維十九首孟浩然十二首餞洛州陸長史再守汾州蘇頲河尹政成基疑作朞為汾昔所推不榮三入地還美再臨時擁傳雲初合聞鶯日正遲道傍多出餞别有吏人思餞荆州崔司馬前人茂祉雕龍昔香名展驥初水連南海漲星拱北辰居稍發仙人履將題别駕輿明年徵拜入荆玉不藏諸餞趙尚書攝御史大夫赴朔方軍前人勁虜欲南飛集作窺揚兵䕶朔垂趙堯寧易印鄧禹即分麾野餞廻三傑軍謀用六竒雲邊愁集作看出塞日下愴臨岐拔劍行人舞揮戈戰馬馳明年麟閣上充國拜集作畫於斯送吏部李侍郎東歸得歸字前人陌上有光輝披雲向洛畿賞來榮扈從别至惜分飛泉溜含風急山烟帶日㣲茂曹今去矣人物喜東歸送光禄姚卿還都前人漢室有英台荀家寵俊才九卿朝已入三子暮同來不授綸為草還司鼎用梅兩京王者宅駟馬日應回春晩送瑕􅏀田少府還任因寄洛中鏡上人前人聞道還沂上因聲寄洛賔别時花欲盡歸處酒應春聚散同行客悲歡屬故人少年歸集作追樂地遥贈一霑巾餞澤州盧使君赴任前人聞道降綸書為邦建綵旟政憑循吏性才以貴卿除詞賦良無敵聲華藹有餘榮承四嶽後清絶上天初關路通秦壁城池繞晉墟撰期行子赴分曲集作典列侯居别望喧追餞離言繫慘舒平蕪寒蛬古勇切亂集作思喬木夜蟬疎寥泬秋先起推移月向諸舊交何以贈客至待烹魚景龍觀送裴士曹前人昔日嘗聞公相第一作主宅今時變作列仙家池傍坐客穿叢篠樹下逰人掃落花雲雨長疑向函谷山泉直似到流沙君還洛邑分明記此處同來閱歲華餞郢州李使君前人楚有章華臺遥遥雲夣澤復聞擁符傳及是収集作辭圖籍佳政在黎人能聲寄侯伯離懷朔風起試望秋隂積半路凄已寒羣山靄將夕傷懷集作心聊把袂悵望集作怊悵麒麟客東湖臨泛餞楊集作王司馬張九齡南土秋雖半東湖草未黄聊乗風日好來泛芰荷香蘭棹無勞速菱歌不厭長忽懷京洛去難與共清光以下六篇並見集本送楊府李功曹前人平生屬良友結綬望光輝何知人事拙連集作相與宦情非别鳥集作路穿林盡征㠶際海歸居然已多意况復兩鄉違送宛句趙少府子卿前人解巾行作吏樽酒謝離居脩竹含清景華池澹碧虚地將幽興惬情集作人與舊逰疎林下紛相送多逢長者車送韋城李一作蕭少府前人送客南昌尉離亭西候春野花看欲盡林鳥聽猶新别酒青門路歸軒白馬津相知無逺近萬里尚為隣通化門外送别前人屢别華容改長愁意緒㣲義將恩集作私愛隔情與故人歸薄宦無時賞勞生有事機離魂今夕夣先繞舊林飛送别鄉人南還前人橘柚南中煖桑榆北地隂何言榮落異因見别離心吾亦江鄉子思歸夣寐深聞君去水宿結思𣺌雲林牽綴從浮事遲廻謝所欽東南行舫逺秋浦念猿吟廣陵送别宋員外佐越鄭舍人還京韋述朱紱臨秦望皇華赴洛橋文章南渡越書奏北歸朝樹入江雲盡城銜海月遥秋風將客思川上晩蕭蕭送李著作倅杭州張諤輟史空三署題輿蒞一方祖筵開霽景征陌值韶光水陸風煙隔秦呉道路長佇聞敷雅政邦國詠惟康送孫舍人歸相州梁陟俊才傾世重清論滿朝歸作隼他年計一作繫為鴛此日飛比肩移一作趨日近抗首出郊畿為報清漳水分明照錦衣送孟八歸襄陽張子容附見孟浩然集東越相逢地西亭送别津風潮集作清看觧䌫雲雨見集作海去愁人鄉在桃林岸江集作山連楓樹春長集作因懷故園意歸與孟家鄰送蘇倩逰天台前人靈異尋滄海笙歌討翠㣲江一作水鷗迎近一作共狎雲鶴待將飛琪樹攀一作嘗仙果瓊樓試羽衣遥知神女問獨怪阮郎歸送越州裴叅軍充使入京孫逖日落川徑寒離心苦未安客愁西向盡鄉夣北歸難霜果林中變秋花水上殘明朝渡江後雲物向一作為南看以下八篇並見集本送楊法曹按括州前人東海天台山南方縉雲驛一作國溪澄集作澄清問人隠巖險煩登陟潭壑隨星使軒車繞春色儻尋琪樹人為報長相憶送周判官往台州前人吾宗長作賦登陸訪天台星使行看入雲仙意轉催飲氷攀璀璨驅傳歴莓苔日暮東郊别真情去不廻送魏騎曹充宇文侍御判官分按山南前人雲陽南臺路光華驛騎廵勸農開夣土恤隱惠荆人樓㢠吟黄鶴江長望白蘋觀風布明詔更是漢南春送蘇郎中綰出佐荆州前人神仙久晋滯清切佇飛翻忽佐南方牧何時西掖垣髙車自蘭省便道出荆門不見河梁别空銷郢路䰟冬末送魏起居赴京前人大名將起魏良使更逢遷驛騎朝丹闕關亭望紫烟西京春色近東宫物華偏早赴王正月揮毫記首年送李補闕攝御史充河西節度判官前人昔日叨補衮邉地亦埋輪官序慙先達才名畏後人西戎雖獻欵上策耻和親早赴軍戎集作前軍幕長清外域塵送趙評事攝御史監軍嶺南前人議獄持邦典臨戎假憲威風從閶闔去雪入洞庭飛篁竹迎金皷樓船引繡衣明年降集作拜真月南斗使星歸送梓州李使君王維萬壑樹參天鄉音聽集作山響杜䳌山中一半雨樹杪百重泉漢女輸橦布巴人訟芋田文翁翻敎授不敢倚先賢送李太守赴上洛前人商山包楚鄧積翠藹沉沉驛路飛泉灑關門落照深野花開古戍行客響空林板屋春多雨山城晝欲隂丹泉通虢畧白羽抵荆岑若見西山爽應知黄綺心送友南歸前人萬里春應盡三江鴈欲飛集作亦稀連天漢水廣孤客郢城歸鄖國稻苗秀楚人菰菜一作葉肥懸知倚門望遥識老萊衣送孟六歸襄陽一作送孟浩然前人杜門不欲集作復出久與世情疎以此為長策勸君歸舊廬醉歌田舍酒笑讀古人書好是一生事無勞獻子虚送平澹然判官前人不識陽關路新從定逺侯黄雲斷春色畫角起邉愁瀚海經年到交河出塞流預令外國使知一作只飲月支頭送孫秀才前人帝城春日集作風好况復建平家玉枕雙紋簟金盤五色𤓰山中沽魯酒松下飯胡麻莫怨田家苦歸期逺復賖送丘為往唐州前人宛洛有風塵君行多苦辛四愁連漢水百口寄隨人槐色隂清晝楊花惹暮春朝端肯相送天子繡衣臣送孫二前人郊郭集作外誰將集作相送夫君道術親書生鄒魯客才子洛陽人祖席依寒草行車薄集作起暮塵山川向集作何寂寞長望淚霑巾送􅏀為落第歸江東前人憐君不得意况復柳條春為客黄金盡還家白髪新五湖三畝地集作宅萬里一行集作歸人知禰不能薦羞㸔集作為獻納臣送嚴秀才還蜀前人寧親真集作為令子似舅即賢甥别路經花縣還鄉入錦城山臨青塞斷江向白雲平獻賦何時至明君憶長卿送宇文三赴河西充行軍司馬前人横笛集作吹雜繁笳邉風巻塞沙還聞田司馬更逐李輕車蒲類成秦地莎居集作􅏀屬漢家當令犬戎國朝聘學昆邪送秘書晁監歸集作還日本國前人積水不可極安知滄海東九州何處逺萬里若乗空向國惟看日歸㠶但信風鰲身映天黑魚作蜃眼射波紅鄉樹扶桑外主人孤島中别離方異域音信若為通淇上送趙仙丹集作送祖濟州相逢方一笑相送還成泣祖帳已傷離荒城復秋入天寒逺山净日暮長河急觧䌫集作君已遥望望君空集作猶佇立送别綦毋潜落第前人聖代無隱者英靈盡來歸遂令東山客不得願采薇既至君門逺孰云吾道非江淮渡寒食京洛文粹作兆縫春衣置酒臨長道文粹作長亭送同心與我違行當浮桂棹未幾拂荆扉逺樹帶行客孤城文粹作材當落暉吾謀適不用勿謂集作為知音稀送綦毋潜前人端笏明光殿集作宫歴稔朝雲陛詔看延閣書髙議平津邸適意輕㣲禄遇人集作虚心削煩禮盛得江左風彌工建安體髙張多絶絃截河有清濟嚴冬爽羣木伊洛方清泚渭水氷下流潼關雪中閉集作啟荷蓧幾時還塵纓待君洗送綦毋校集作秘書棄官還江東前人明時久不達棄置與君同天命無怨色人生有素風念君拂衣去四海將安窮秋天萬里静日暮澄江空清夜何悠悠扣舷明月中和光魚鳥際澹爾蒹葭叢無庸客昭世衰鬢白集作日如蓬頑疎暗人事僻陋遠天聰㣲物縱可採其誰為至公余亦從此去歸耕為老農送從叔集作弟蕃逰淮南座上成前人讀書復騎射帶劔逰淮隂淮隂少年軰千里逺相尋高義難為隱明時寧陸沉島夷九州外泉館三山深席㠶聊問罪卉服盡成擒歸來見天子拜爵賜黄金忽思鱸魚鱠復有滄江集作洲心天寒蒹葭渚日落雲夣林江城下楓葉淮上聞秋碪送歸青門外車馬去駸駸惆悵新豐樹空餘天際禽送權三集作二前人髙人不可友清論復何深一見如舊識一言知道心明時當薄宦解薜去中林芳草空隱處白雲餘故岑韓侯久携手河嶽共幽尋悵别千餘里臨堂鳴素琴送魏郡李太守赴任前人與君伯兄集作氏别又欲與君離君行無㡬日當復隔山陂蒼茫秦川盡日落桃林塞獨樹臨關門黄河向天外前經洛陽陌宛洛故人稀故人盡離别淇上轉驂騑企予悲送逺惆悵睢陽路古木官渡平秋城鄴都集作宫故想君行縣日其出從如雲遥思魏公子復憶李將軍峴山亭送朱大集作峴山送張公非逰巴東孟浩然峴山南郭外送别每登臨沙岸江村近松門山寺深一言余有贈三峽爾將尋祖席宜城酒征途雲夣林蹉跎逰子意眷戀故人心去矣勿淹滯巴江集作東猿夜吟送韓使君除洪州都督前人述徳撫荆衡分符襲寵榮往來看擁傳前後頼專城勿剪棠猶在澄波水更清重推江漢理旋改豫章行召父多遺愛羊公有令名衣冠列祖道耆舊擁前程一作旌峴首晨風送江陵夜火迎無才慙孺子千里愧同聲同盧明府餞張郎中除義王府司馬海園作前人上國山河裂集作星河裂賢王邸第開故人分職去潘令寵行來冠盖趨梁范江湘集作山失楚材預愁軒騎動賔客散池臺送王昌齡之嶺南前人洞庭去逺近楓葉早驚秋峴首羊公愛長沙賈誼愁士風集作毛無縞紵鄉味有查頭已抱沉痼疾更貽魑魅憂數年同筆硯兹夕間衾裯意氣今何在相思望斗牛送盧少府使入京前人楚關望秦國相去千里餘州縣勤王事山河轉使車祖筵江上列離恨别前書願及芳年賞嬌鶯二月初送張子容進士赴舉前人夕曛山照滅送客出柴門惆悵野中别殷勤醉後言茂林予偃息喬木爾飛翻無使谷風誚須令友道存送莫氏外生兼諸昆季從韓司馬入西軍前人念汝集作爾習詩禮未嘗違户扃嚴君先早路集作平生早偏露又作嚴君偏早世萬里更飄零坐棄三冬業集作牲養行觀八陣形飾装辭故里謀策赴邊庭壯志吞鴻鵠遥心伴鶺鴒所從文且集作與武無集作不戰自應寧送王七尉松滋得陽臺雲字前人君不見巫山神女作行雲虹蜺集作霏虹沓翠曉氛氲嬋娟逰集作流入襄集作楚王夣覺後集作倐忽還隨零雨分空中曉集作飛去復飛來朝朝暮暮下陽臺愁君此處集作去為仙尉便逐行雲去不廻洛下送奚三還揚州前人水閣無邊際舟行興便集作共使風羡君從此去朝夕見鄉中余亦離家久南歸恨不同音書若有問江上㑹相逢送辛大不及前人送君不相見日暮獨愁余楚詞曰𦕈𦕈兮愁予余予唐韻並有上聲或改作緒同並非江上空徘徊天邊迷處所郡邑經楚鄧山河入嵩汝蒲輪去漸遥石徑徒延佇送謝録事之越前人清旦江天迥凉風西北吹白雲向呉㑹征㠶亦相隨相到耶溪日應探禹穴竒仙書儻先一作相示余在此山陲送杜十四前人荆呉相接水連絶句詩選作為鄉君去春江一作江村正淼茫日暮征㠶泊何處天涯一望斷人腸文苑英華巻二百六十八
