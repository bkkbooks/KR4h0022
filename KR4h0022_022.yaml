body:
  text: 文苑英華卷二十二宋李昉等編嵗時二讀春令賦一首中和節百辟獻農書賦四首春儺賦一首麥秋賦應制一首七夕賦一首讀春令賦韋縝首四時曰春貞百度曰聖復其度必聖之元定其時惟春之孟太史先謁以明在木之文上公奉儀乃讀行春之令故漢王修之以展禮晉后奉之以施敬伊厯載之或虧洎我唐之斯盛若夫太昊統節勾芒御辰厯以元而天地更始氣直震而物候惟一作新皇上乃順時令序彛倫載青旗之容與服蒼玉之璘玢辨色而金貂列位迎春而玉輅回輪爰奉令以進讀遂授時而發春俯僂前止精誠上陳曉色分於丹陛韶華發於紫宸遂煥爵以頒秩乃布德而昭仁則知臣職不愆國典靡闕修陽事而考隂令祀朝日而享夕月陳而未讀千門之寒氣猶飛捧而既宣九有之春輝已發覽讀斯竟慶賜乃行緩政刑於肅殺遂性命於生榮習習和風扇萬物而條暢遲遲麗景照八極之文明陳盛禮於元辰酌宏謀於往舊祀為國本燔柴斯用乎上辛食惟政先祈榖必當於太蔟莫不汨之則斯禍叙之則斯祐所以敕上公之恆典俾疇人之敬授穆穆祕殿明明我皇體乾道以從事閲春令而頒方可謂君奉時而罔失臣出言而有章時厯克正憲度克揚既同文於戎貊亦暨教於要荒諒皇家之𢎞務將永世而觀光中和節百辟獻農書賦以嘉節初吉修是農政為韻侯喜我后令節中和孔嘉凍已全解桃仍欲華慶賞之多燕樂既均於九有播植之始教化爰貞於四遐於是心膂周召股肱稷卨洎彼庶尹當兹新節陽和溥暢言拜賜於生成稼穡艱難乃載陳於睿哲觀其克合天意咸造皇居僉曰國以人為本人以食為儲政令不差則夷華知勸水旱無備則倉廪其虛且自古在昔靡不有初敬授人時而堯典垂記大無禾麥則魯史頻書今陛下䕫䕫栗栗日慎一日惟人是憂惟農是恤是以域中無事海內殷實人獻其誠神降之吉臣等叨遇昌運思禆大猷惟茲南畝可致崇丘䖍考令辰實當四仲之首疑作月敬舉彛典庶為六府孔修豈止合彼九疇冠夫百氏髙懸象魏必日就而月將永播蒸黎自風行而草靡帝曰善哉子之言是於變時雍恭慎是宗應天地中和之氣備朝廷中和之容君告成中和之功久而作樂臣獻守中和之術先告川疑農此所謂超羲越軒臣賢主聖樹光宅之深本為經邦之善政美哉啓沃之義於斯為盛第二同前韻賈餗聖上覩萬國之無事偉三農之可嘉因月令之初爰詢播植俾年豐之慶無隔幽遐於是文武畢陳威儀斯列爰修耒耜之務用廣異同之說將斯疑作期國實京坻人懷禮節捧書而進知地利之可分足食是圖見天心之載悅既而啓文字儼簮裾煥䕫龍之獻納掩河洛之圖書得富國以如此契生人於厥初稽重榖之言徒稱董仲驗深耕之法何愧朱虛所以候驚蟄之辰應夾鐘之律昭八政之所用蓄九年之罔失是藨是蓘將致乎千斯倉爰始爰謀必因乎四之日故當載陽之候以進為邦之術俾農識不耕之凶嵗獲終畝之吉且中也者表天地之交泰和也者象德化之優柔致中和之令節展稼穡之允修將明肥磽異等豐歉殊收人靡在阿之歎野傳擊壤之謳已矣哉富庶之規既如此弼諧之道必於是佐𤣥化之風行動黎元而草靡故得祥生地表慶發天宗百榖允修臣罔慙於后稷兆人乃粒帝有邁於神農伊斯事之明盛掩前代之輝映因獻夀之嘉辰遂啓心於善政何必考李悝之地力覽崔實之月令懿此羣公之書永作九州之慶第三同前韻胡直鈞農為務本春則嵗華和者取至和之靡忒中者象居中之莫邪吾君將以發教源於仲序配節令於孔嘉知稼穡之道則無逸之書何逺覩播植之論審后稷之訓不遐至若四海無事萬方胥悅野思疆理之勤朝有田疇之說鑄兵器為農器更舊節為新節天子方坐承明之廬端穆清之居百執事孜孜而奉職羣有司濟濟以進書曰陛下德被淳古時登太初念耘耔之勤每思親勞佇豐年之應曽不自虛一作攄臣所以極聞見而獻可庶將獲小大之所如伏以羲循平秩時在元吉既錢鎛之夙營固凖直而何失遲西成於遺秉之嵗戒東作於寅賔之日庶居勤之輩咸執其常惰逰之人罔敢不率皇上諧衆議允嘉猷載耒耜而親耕天下皆勸率公卿而終事庶績咸修然後創典章頒逺邇斯載耕之自此佇多稔之于彼稽汜氏之法未足方之考周官之規諒當改是豈不以羣下執躬在上務農故將降𤣥功於后土介景福於天宗况令節適時良圖合盛近可法於三務逺從規於八政豈將獨播美於兹辰冀終古而輝映第四同前韻鄭式方聖人清謐六合車書一家皇心協於天統節令徵為國華思播植以富人故農書是進建中和而照物俾淳風不遐是以四夷即叙九榖用嘉當其天廟祇臨韶光發泄二月初吉式協於農祥三務成功不虧乎嵗節授其時用天之道進其書知人則哲一人垂拱以憂勤百辟獻章而誠竭於是元老進而言曰陛下道洽無外化康有截猶慮九扈未𢎞三時尚缺命陳書而王化可闡俾知方而農政斯列既戒既種粢盛之望有期弗震弗渝地利之宜奚設豈不以寒氣揔入春陽始初陳乎五種之用本乎三農之書王者則千畝是籍庶人則中田有廬故年榖之順不差物力之功克實首嘉節而東作方起符中星而西成乃畢其殖也習無不利其耕也動罔不吉然後邦國知息節之宜象魏識勸農之術于以見君臣克協于以見土榖惟修足食表豐年之慶多稌興大田之猷且夫節者育物於生成農者豐功於遐邇善宣兮時罔不若化洽兮物無非是乃疆乃理歌積庾於京坻有翼有慿致殊方之率俾非我后聖應太昊德包神農則不能盡地力祈天宗故得貞萬姓行八政幸沐化於和平庶採葑而謡詠春儺賦孫頠是月也見斗於辰日交長至有司方成大禮展時事達九門以磔禳協四靈而滌器匪嵗之卒乃春之季令隂氣以下降使陽和而上利順三時而不忒協萬福而必萃命方相氏出儺百神丹首纒裳辮髮文身摐金鼓以騰躍執戈矛以逡巡驅赤疫於四裔保皇家於萬人斯乃卒嵗之儺也豈比夫抑而畢春於是休徵允備有典有則洗滌氛癘祚我邦國其弓乃桃其矢乃棘野仲無以施其計遊光曷足逞其特然而禮法肅設干旌駢羅祠青帝以邀福抑金方以與儺將以窒隂氣發陽和已矣哉斯欲陳儺之儀述儺之飾盛可以仰功可以抑騰金耀一作輝於四目被熊皮於五色乍煒煒以煌煌或昈昈而赩赩既秉戈而揚盾率百𨽻而是職及乎出未央經上林芳菲發越瑕穢漂沉時令既畢嘉貺是尋黃龍白鳳大輅南金聚髙冠之岌岌㑹長劔之森森我皇堯舜比德䕫龍是扶春儺髙門載馳載驅玉以制容金以飾途流聲教以布濩乃洋溢於天衢既而隂陽交和庶物時育氛氲將掃祥光可掬綏我眉夀介余景福客有書劔三朝苦心簡牘荏苒青襟蹉跎白屋儻不棄於芻蕘將刷羽於喬木麥秋賦應制許敬宗臣聞五土異宜四氣分序考宿麥於生類起嚴秋於溽暑扇漸秀於梅風潤岐苗於榖雨于時陽翹總暢隂吕濳生當隆曦之首節韞秋令之初萌雜藝黃於緑野參肅殺於朱明始自天而下降終因地而斯成疇中氣爽壟際風清引神飇於綺殿指明月於紈扇砌積玉兮疑氷庭飛花兮似霰矯微陽於修景溽寒露於芳甸棟刻桂兮含英井雕蓮兮發絢雲標峯而勢詭氣登商而節變若乃葉幄垂秀條帷泛光鶯傳枝而裊娜蜂散蘂而芬芳對銀縚而偶穟並金縷而分芒如集作改炎炎之鑠石若凛凛之懷霜資髙明以納豫順中和以自芳非甘泉而滌景異寒氣而浮凉却氷紈於寶笥屏珍簟於披香命載筆於蓬渚贊天文於柏梁幸千齡兮此遇奉萬夀兮稱觴七夕賦王勃若夫乾靈鶴一作鵲䜟之端地輔龍驂之始慿紫都而授厯按𤣥丘而命紀鳳毛鍾桂閫之祥麟角燦椒庭之祉緣朱集作馳緑軒于九域振黃麾於萬里抗芝館而星羅擢蘭宫而霞起則有皇慈霧洽聖渥天浮庭分玉禁邸瞰金樓翦鳬洲於細栁披鶴籞於長楸啓魚鈐而分帝術授虹璧而控神州擁黃山於石磴泄𤣥灞於銅溝列瑶忩而送燠闢銀榜而迎秋君王乃排青幌搖朱舄戒鵷輿靜鸞掖繞震廊集作霞吐而轉步傃雲阡而縱跡嘯陳客於金牀命淮仙於桂席翔翠罕於雲甸迎簫吹於鳳驛佇靈匹於星期眷神姿於月夕于時玉繩湛色金漢斜光煙淒碧樹露濕銀塘視蓮潭之變彩見集作睨松院之生凉引集作分驚蟬於寶瑟宿蘭燕於瑶筐緑臺兮千仭赩樓兮百常拂花筵集作房而慘惻披彩序而徜徉結遙情於漢陌飛永睇於霞莊想佳人兮如在怨靈歡兮不集作未揚促徑疑悲於四運味遺歌於七襄於是虯簷晚靜魚扄夜飾忘帝子之光華下君王之顔色握犀管展集作撰魚箋顧執事招仲宣仲宣跪而稱曰臣聞九變無津三靈有作布元氣於浩蕩運太虛於寥廓辨河鼓於西壖下集作降天孫於東堮循五緯而清黃道正三衛集作衡而澄紫落海人支石之機江女穿針之閣鄙塵情於春念擬仙契於秋諾於是光清地岊氣斂天標霜凝碧宙水瑩丹霄躍麟軒於霧術褰斾羽一作翠羽集作羽斾於星橋徵赤螭而架渚漾青翰而乘潮停翠梭兮卷霜縠引鴛杼兮割集作削氷綃舉黃花而乘月艷籠黛葉而卷雲嬌撫今情之集作而恨促指來緒而傷遙既而丹軒萬一作黃拱紫芳千一作朱籥仙御逶遲靈徒擾弱風驚雨驟煙回電爍媧皇召巨集作遷冀野之龍莊叟命雕陵之鵲駐麟駕披鸞幕奏雲懸集作和泛霞酌碧虬玉室之饌集作館白兔銀臺之藥荷集作莎葉赬鮫芙蓉青雀上元錦書傳寶字王母瓊箱薦金約綵襻魚頭比目縫香緘燕尾同心縛羅帳五花懸珉砌百枝然下藝幬而昵枕弛蘭服而交筵託新歡而密勿懷往眷而潺湲於是羈鸞切鏡旅鶴驚絃悲侵玉履念起金鈿儼歸裝而容曳整還蓋而遷延洞庭波兮秋水急關山晦兮夕霧連謂河漢之無浪似參商之永年君王乃背彤砌陟𤣥室冲想自閒神情如逸痛靈妃之稀偶喜集作嘉沉思之可畢荆艷齊升燕佳竝集作姬牙出金聲玉貌蕙心蘭質珠櫳綺檻北風臺繡户雕忩南向開響曳紅雲歌面近香隨白雪舞腰來掩清琴而獨進凌絳樹而輕回盧女黃金之碗張家碧玉之杯奉君王集作且奉君於終夕夫何怨於良媒俄而月還西漢霞臨東沼鳬氏鳴秋雞人唱曉玉關控鶴瓊林飛鳥君王乃馭風殿而長懷俯雲臺而自矯矜雅範而霜厲穆沖襟而煙渺迎十客召三英香涵蔗酎吹肅蘭旌娃館踈兮緑草積歡房寂兮紫苔生聳詞鋒於月徑集作殿披翰藪於雲扄方絶元凱而髙視豈與梁楚而駢聲文苑英華卷二十二
