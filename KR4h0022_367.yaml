body:
  text: 文苑英華巻三百六十七宋李昉等編辯論五對禹問一篇桐葉封弟辯一篇太華山僊掌辯一篇辯文一篇三子言性辯一篇贈送説玉贈蘭陵蕭易簡遊三峽一篇説車贈楊誨之一篇澤宫詩一篇辯論對禹問韓愈或問曰堯舜傳諸賢禹傳諸子信乎曰然然則禹之賢不及於堯與舜也歟曰不然堯舜之傳賢也欲天下之得其所也禹之傳子也憂後世争之之亂也堯舜之利民也大禹之慮民也深曰然則堯舜何以不憂後世曰舜如堯堯傳之禹如舜舜傳之得其人而傳之堯舜也無其人而不傳二字集作不得如已慮其患而不傳者禹也舜不能以傳禹堯為不知人禹不能以傳子舜為不知人堯以傳舜為憂後世禹以傳子為慮後世曰禹之慮民也則深矣傳之子而當不淑則柰何曰時益以難理傳之人則争未前定也傳之子則不争前定也前定雖不當賢猶可以守法不前定而不遇賢則争且亂天之生大聖也不數其生大惡也亦不數傳諸人得大聖然後人莫敢争傳諸子得大惡然後人受其亂禹之後四百年然後得桀亦四百年然後得湯與伊尹湯與伊尹不可待而傳也與其傳不得聖人而争且亂孰若傳諸子雖不得賢猶可守法曰孟子之所謂天與賢則與賢天與子則與子者何也曰孟子之心以為聖人不茍私於其子以害天下求其説而不得從而為之辭桐葉封弟辯柳宗元古之傳者有言成王以桐葉與少弟集作少弱弟戯曰以封汝周公入賀王曰戯也周公曰天子不可戯乃封小弱弟於唐吾意不然王之弟當封耶周公宜以時言於王不待其戲而賀以成之也不當封耶周公乃成其不中之戲以地以人與小弱者為之主其得為聖乎且周公以王之言不可苟焉而已必從而成之耶設有不幸王以桐葉戲婦寺亦将舉而從之乎凡王者之徳在行之何若設未得其當雖十易之不為病要於其當不可使易也而况以為戲乎若戲而必行之是周公教王遂過也吾意周公輔成王宜以道從容優樂要歸之大中而已必不逄其失而為之辭又不當束縛之馳驟之使若牛馬然急則敗矣且家人父子尚不能以此自克况號為君臣者耶是直小丈夫缺缺者之事非周公所宜用故不可信或曰封唐叔史佚成之太華山僊掌辯王涯西岳太華華之首峯有五崖比壑破巖而列自下逺望二字文粹作逺而望之偶為掌形舊俗土記之傳者皆曰昔河自積石出而東文粹作西流既越龍門遂文粹有弭字南馳者千數百里折波左旋将走東溟連山塞之壅不得去有巨靈於此力擘而剖其中跖而北者為首陽絶而南者為太華河自此洩茫洋下馳故其掌跡猶存巨靈之跡也予聞而惑之乃往觀曰誕哉此説乎夫所謂神者非人也其動無聲其行無跡若形而無象若氣而無色㧞山剖澤而不見其作鼓風奔水而不見其力視不可察名不能及故推而謂之神苟有聲可聞有形可見非神之所為則皆人力之能及也焉有神之作力而有人跡乎且夫高天厚地聳山流川者神之所為也所言開山導河亦神也神之所以神者有作而無悖一成而不易鳥有始塞之文粹無之字而復逹之始連之文粹無之字而復絶之始不知終是不為神矣且此靈之運為何古乎在大初開闢之始乎為陶唐洪水懷山襄陵之際乎以為開闢之始也宜當胚渾之先天地未位萬象茫昧尚無定歸當止一河之壅抑而一靈與一作為其道借有其事自為而著悠悠乎年代之眇没其誰也克傳以為陶唐洪水之際乎則禹奠百川宜在禹貢乃曰導河積石至于龍門南至于華隂東至于底柱皆禹功之所致以逹于海豈天地大異之若此而典記不以為文哉天設四瀆宜有以通不當始遏其流滯橈文粹有其字和氣及其泊亂而後理也且山谷之作此形何則不有嵲屼文粹作危䧟相薄高深相敵一作欹乃有鋭而出者為虎牙偶而背者為熊耳角而巘者為牛首冠而峭者為雞頭必以形之類形而必加説則雞牛熊虎之象其亦有作乎予嘗覽張平子之賦西京至巨靈高掌厥跡猶存之辭以為該聞精逹常以是惑使不語怪神之㫖何所述明暨覩其形而咨之果謬悠而無㨿也将假文神事以飾其詞歟為思而有闕歟因辯其由而述之以告山下辯文或曰文所以指陳是非有以多為貴也一作者其要在乎彩餙其字而慎其所以為體也又曰文章乃一藝耳是皆不知上流之文而文之所由作也夫天之文位乎上地之文位乎下人之文文粹作天文地文人文無三之字位乎中不可得而增損者自然之文也故伏羲作八卦以象天地窮極終始萬化無有差忒故易與天地凖此聖人之文至也但合其徳而三才之道盡後聖有作不能使爻為五或七而盡其文粹作九洎曲折者是其文之至者文粹無者字也文字既生治亂既形仲尼作春秋以繩萬世而褒貶在一字是亦文之至者文粹作也乎然則易卦之一畫春秋之一字豈所謂崇飾之道而尚多之意耶夫文者考言之具也可以革一作華則不足以禆天地矣故聖人當使将來無得以筆削果可以包舉其義雖一畫一字其可已矣病不能然而曰必以彩餙之能援引之當文粹作富為作文之秘急是何言之末歟夫天豈有意於文彩耶而日月星辰不可踰地豈有意於文彩耶而山川丘陵可加八卦春秋豈有意於文彩耶而極與天地侔其何故得以不可越自然也夫自然者不得不然之謂也不得不然又何體之慎歟文粹作耶夫天地八卦春秋確止於此者也吾得定其所云其不至於此者唯吾何學焉吾安能以天下之心也是則其心卓然絶於俗者其文不求而至也無得于為教苟於聖逹之門無所入則雖劬勞憔悴於黼黻其可文粹作何數哉是故在心曰志宣於口曰言垂於書曰文其實一也若聖與賢則其書文皆教化之至言也徒見其纎靡而無根者多始目文與藝嗚呼三子言性辯杜牧孟子言人性善荀子言人性惡楊子言人性善惡混曰喜曰哀曰懼曰惡曰欲曰愛曰怒夫七者情也情出於性也夫七情中愛者怒者生而自能是二者性之根惡之端也乳兒見乳必拏求不得即啼是愛與怒與兒俱生也夫豈知其五者焉既壮而五者隨而生焉或有或亡或厚或薄至於愛怒曽不須㬰與乳兒相離而至於壮也君子之性愛怒淡然不出於道中人可以上下者有愛拘於禮有怒懼於法也世有禮法其有踰者不敢恣其情世無禮法亦隨而熾焉至於小人雖有禮法而不能制愛則求之求之不得即怒怒則亂故曰愛怒者性之夲惡之端與乳兒俱生相隨而至於壮也凡言情性之川文粹作最善者多引舜禹言不善者多引丹朱商均夫舜禹二君子生人已來如二君子者凡有㡬人不可引以為喻丹朱商均為堯舜子夫生於堯舜之世被其化皆為善人况生於其室親為父子烝不能潤灼不能熱是其惡與舜禹之善等耳天止一日月耳言光明者豈可引以為喻人之品類可與上下者衆可與上下之性愛怒居多愛怒者惡之端也荀言人之性惡比於二子荀得多矣贈送説玉贈蘭陵蕭易簡遊三峽符載玉在寳族㧞乎其萃者也濡天地之粹和納隂陽之純精堅剛温潤配徳君子故為璉為瑚為珪為璋以奉乎神祗人鬼以餙乎車服冕弁非是則禮樂之道有墜於地焉當其沉耀隠璞墮汨沙泥中枯槁闇藹光明不發庸工睨之譬頑塊意方拾之惑而復投此卞氏所以喑嗚珉瓀所以長王去聲也及其逢值英匠識密鑒洞掇於瓦礫而不疑叩之鏗然琢之爛然如蒸栗截肪氣吞虵一作虹文珍貫魚目是時也即趙不得私愛秦不得暴取坐齊宮而後見藉綈繡而後執委連城如脫履割土地如裂帛以償其價猶恐其不直也玉則尚然人豈無之士君子含略藴器困於陋塵垢被身體蓬茨沒四壁智不贍饘褐道不信妻子闒茸視之猶聱一作贅夫也及其乗時運之會遭知已之顧鬱起耕釣作時功勲上以戴大君下以福生人澤流萬世聲塞九㝢是時也一言受卿相再詞啓茅社以厚其禮猶謂之不重於戱有至物必有至大有盛才必有大用歴觀前代不知則已苟或知之則古獄之劍不為朽鐡也鹽車之馬不為病駒也㸑下之桐不為樵薪也磻溪之士不為憊叟也蘭陵蕭易簡韜沉䆳之識抱宏偉之才業巨命隘與時濩落若嚮者之事尚或不冺則道必有所明志必有所行指顧樹勲績呼嘯取金紫是夫人也肯昧兹數而隕穫于此際哉人謂甚病余固知甚泰矣然三峽孱顔驚波觸天行容易愁况聞哀猿苟有鍾粟尺帛之可共則寧使賢者栖栖㳂泝其間去矣自愛余一嘆矣且玉有盛羙可以况徳亦感乎和璞之事故為説玉以餞之說車贈楊誨之柳宗元楊誨之将行柳子起而送之門有車過焉指焉而告之曰若知是之所以任重而行於世乎材良而器攻圓其外而方其中然也材不良則速壞工之為功也不攻則速敗中不方則不能以載外不圓則窒拒而滯方之所謂者箱也圓之所謂者輪也匪箱不居匪輪不塗吾子其務法焉者乎曰然曰是一車之說也非衆車之說也吾将告子乎衆車之說澤而杼山而侔上而輕下而軒且曳祥而曠左革而長轂以戰巢焉而以望安以愛老輜以蔽内垂綏而以畋載十二旒而以郊以廟以陳于庭其類衆也然而其要存乎材良而器攻圓其外而方其中也是故任而安之者箱逹而行之者輪恒中者軸挶而固者蚤長而撓進不罪乎馬退不罪乎人者轅却暑與雨者蓋敬而可休集作伏者軾服而制者馬若牛然後衆車之用俱集作具今楊氏仁義之林也其産材良誨之學古道為古辭沖然而有光其為工也攻果能恢其量若箱周而通之若輪守大中以動乎外而不變乎内若軸攝之以剛健若蚤引焉而宜御乎物若轅高以逺乎汚若蓋下以成乎禮若軾險而安易而利動而法則庻乎車之全也詩之言曰駟牡騑騑六轡如琴孔氏語曰左為六官右為執法此其以逹於大政也凡人之質不良莫能方且一作直恒質良矣用不周莫能以圓遂孔子於鄉黨恂恂如也遇陽虎必曰諾而其在夾谷也視叱齊侯類畜狗不震乎其内後之學孔子者不志於是則吾無望焉耳矣誨之吾戚也長而益良方其中矣吾固欲其任重而行於世懼其集無其字圓其外者未至故說車以贈澤宫詩并序劉禹錫澤宫送士嵗貢也晉昌唐如誨以信義為良弓文學為菆矢䂓爵禄猶衆禽密彀持滿遡風飛繳者數矣有措盃之妙而無雙鶬之獲韔弓收視歸究其術繇是跡愈屈而名愈聞君子益多之彼不由其術一幸而中者雖懸貊在庭君子未嘗多也嵗殚矣告余以西予為賦澤宫一章庻見子之弓弗再張也已秩秩澤宫有的維鵠祁祁庻士于以干禄彼鵠斯㣲若止若翔千里之差起于毫芒我矢既直我弓既良依于高墉於何不臧高墉伊何維器維時視之以心誰謂鵠㣲文苑英華巻三百六十七
