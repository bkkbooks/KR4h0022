body:
  text: 文苑英華巻三百八十二宋李昉等編北省三中書舎人授鄭勉紫微舍人等制蘇頲黄門朝議大夫守給事中鄭勉措一作留心精覈尤明理體朝議大夫尚書庫部郎中戴令言屬詞方雅深逹政端咸藴公忠備聞學行紫闈星拱必佇賢臣青闥雲連實旌竒士闕專文事闕中㪚官各如故主者施行授崔琳紫微舎人制黄門正議大夫行尚書屯田郎中上柱國魏縣開國子崔琳素履一作履操純懿清心諒直文辭為從政之端忠孝是立身之本分符作牧共頼仁明賜筆題工咸推練習掖垣近宻禁省旁求宜遷振鷺之行用集栖鷄之地可行紫微舎人㪚官勲封如故主者施行授王丘紫微舎人制勅通直郎紫微舎人内供奉王丘思㑹風雲文成典謩介獨為操直方闕近其華望自𢎞闕青𤨏事宻黄縑頡頏嵗年籍甚聲聽俾𢎞詞禁之羙宜正掖垣之秩可守紫微舎人㪚官如故授齊澣紫微舎人制勑朝議郎守給事中内供奉齊澣運心孤邁懐器獨立屬詞毎窮其雅實臨事益表其甄明故能早負聲猷備經推擇左曹駮議常接於雙逰右掖詞言佇光於五字可守紫微舎人散官如故授逹奚珣中書舎人制孫逖勅朝議大夫守職方郎中兼試知制誥逹奚珣文學素優忠勤克著自經試用備聞詳宻草奏南宫已擅一時之妙掌綸西掖愈彰五字之能宜就列於即真俾正名於近侍可守中書舎人㪚官如故授賈登中書舎人制門下朝請大夫守給事中騎都尉賈登脩詞自逹守道為師有大雅之文章稟中和之徳行駮正之地已著能名綸綍之司更膺髙選可守中書舎人授梁淑中書舎人制勅朝議郎守尚書兵部郎中梁淑通明致用博雅為文才冠時英望髙人譽五字之選一臺所推宜旌起草之能俾效司綸之職可中書舎人㪚官如故授韋斌中書舎人制門下國子司業韋斌貞規不雜敏識惟精標麗則以工文秉直聲而濟羙乆從㪚秩未展清才豈避􅊚親遂妨公用宜特昇於禁掖俾專事於司言可行中書舎人授李元成中書舎人制勅朝議郎守尚書考功郎中仍試知制誥兼知史官事李元成中和有裕直道自然文章為致用之資慎宻是周身之本乆司綸綍深惬器能宜拜命於即真俾甄才於試可可守中書舎人兼知史官事授杜鴻漸崔倚中書舎人制賈至勅知中書舎人鴻漸等忠肅恭懿羙秀而才蘊清通之理義兼真固之幹能用制軍誥允属夏卿持衡審官時惟小宰慎擇多士僉曰爾諧宜當銓綜之劇仍掌絲綸之任鴻漸可守中書舎人判武部倚守中書舎人判文部侍郎授裴敦復中書舎人制王丘勅朝議郎檢校吏部郎中裴敦復等並行標純一材藴經通或學辯文䑕核綜兼於隠賾或詞握靈蛇光暉映於等夷職居要劇聲振發揮近宻之職搜擇宜精俾對掌於絲綸兼聨華於省闥可依前件授崔翹中書舎人制門下朝議大夫守給事中崔翹學行自中方直形外明而能晦簡不違謙始方蔚於文章終激揚於吏道駮議既乆要宻逓遷宜自珥貂之司俾叅鳴鳯之掖可守中書舎人㪚官如故授李彭年等中書舎人制王從敬門下朝請大夫守給事中李彭年等噐業𢎞深風規頴秀士林楨幹文苑英髦並綜覈前言閑習政事𤨏闈駮正既稱詳宻畫省彌綸允推精練俾遷掌於綸綍咸列侍於軒墀可依前件授裴度中書舎人制白居易勅司勲郎中知制誥裴度以茂學懿文潤色訓誥體要典麗甚得其宜施之四方朕命惟允况中立不倚道直氣平介然風規有光近侍臺郎滿嵗班列當遷綸閣之職所宜直授可中書舎人授崔群中書舎人制勅庫部郎中知制誥翰林學士崔群端厚和敏節以文學温良忠敬得侍臣之風自列内朝兼司誥命事煩而益宻職乆而彌精六年於兹勤亦至矣况小大之事常所訪問盡規極慮𢎞益居多所宜崇以正名式光近職敬乃嘉命其惟有終可授賈餗等中書舎人制勅叅掌宥宻斧藻訓誥侍立於文陛之下揮翰於禁署之中非第一流不在其位朝散大夫守太常少卿知制誥上柱國賈餗器範温雅詞藻𢎞嚴朝散大夫守尚書職方郎中知制誥上柱國清河縣開國男食邑五百户崔咸學探奥㫖文有正聲而皆公論所歸清規擅稱比羙玉而光彩外溢服華組而煥耀揚輝闕荀大章之才闕識王濬冲之質則損乎文佇爾酌中明吾試可無使相如視草專羙於前時也其𢡟承之餗可守中書舎人散官勲如故咸可守中書舎人㪚官勲如故授李渤給事中鄭涵中書舎人等制前人勅舉才命官得人斯重詢事考績稱職為難况駮正違失典司文誥叅我宻命為吾近臣非望實兼優則不在兹選朝議郎守諌議大夫知匭使上騎都尉賜緋魚袋李渤清標雅裁器韻不群贍學積文泉源益濬有濟人經國之術資通時利物之才朝散大夫守尚書司封郎中知制誥上柱國鄭涵藻履堅明雄文炳蔚虚懐宏逹雅思沖深立言嘗見其著誠秉志頗聞其經逺夫澄其源者必清其流端其本者必正其末其便蕃禁掖潤色王猷君不可以私其人臣不可以虚其受簡才既因於朕志當官爰俟於爾能其有嘉聞以光茂選渤可守給事中㪚官勲賜如故涵可守中書舎人㪚官勲如故授李訥中書舎人李言大理少卿制崔嘏勅禮部郎中知制誥李訥等彰施帝載潤色王猷朝出乎九重夕馳於四表必資其金相玉立之器懐其騰蛟吐鳯之才以發揮人文流布天澤而臯繇作士謨明以賛至理定國持刑公平而昌後嗣使匹婦無霣霜之嘆遐甿離束濕之寃隂陽氣和手足可措必在乎理獄之官明慎用刑哀矜守法今訥言等皆以器能犀利文彩光華演綸推倚馬之工剖竹著懸魚之化以兹遷擢誰曰不然勉吾右文恤刑之意也訥可守中書舎人言可大理少卿授裴諗中書舎人制勅居禁宻之地聞善則遷當演綸之工有勞斯陟此所以光吾侍從榮彼縉紳翰林學士司封郎中知制誥裴諗家承茂勲身有羶行早襲弓裘之業克隆堂構之基閒澹自居囂浮不染自擢居内署掌兹制命謹宻無曠馨香有聞問對備見其一心敏㨗共推其七歩况臧孫有後且聞得鳯之音枚乗多才雅蓄雕龍之妙爰因滿嵗授以正名爾宜思𢎞用以致君勵精誠而正已慎爾聞見奉吾周旋無彰温樹之名克保詞林之羙可依前件授秘書少監賜紫盧光啓守中書舎人制錢珝勅西省設官之重實代吾言故脩禁之章漏泄居其首而稽緩次之受選者率用靖黙專敏之士然後若疑作為得具官盧光啓勵精不怠處黙有倫定志而静專其謀好古而敏求其要緫是四善謹於一心則攻學與文嘗試之於禁闥矣能於一作能居又作而能㪚地自安素風不去乃資公論復典訓辭夫入官惟勤執事惟敬茍視禁以無犯則立身而有章行之克終利亦焉徃可依前件授祠部郎中知制誥賜緋王鉅守中書舎人制前人勅遷不欲速則人將競遷而不安其職也掌誥故事多用外郎嵗滿而升乃正郎位嵗又滿始得其秩所以持重官次展張辭業有毛羽者不亦樂於翺翔乎具官王鉅敏於内而秀於外其發也為文章棲於禁垣奮以健筆若夫規格㒺有輕浮試之三年未嘗亂日且聞講學必務本根今掌誥再遷一如故事論諸㳺官於爾甚優兼佩金章俾光飛歩自兹而徃厥路彌髙敬而行之何患不到可依前件授翰林學士鄭延昌守本官兼中書舎人制劉崇望勅以爾彯纓著稱夢筆為文富以羙才披其禁闥典由中之詔成布下之言方謂得人雅當入侍葢聞羊祜議謀是草皆焚周仁重厚其言不洩親近之地慎宻為先爾既不能何爽居外西省亦吾教誥之地戒之可矣可依前件授膳部郎中知制誥錢珝守中書舎人制薛廷珪勅具官錢珝孟子不云虞舜聞一善言見一善行若决江河沛然莫之能禦也朕凝神穆清躭味墳史用爾掌綸誥時推得人觀其書詞夐絶塵滓褒貶盡春秋之要指指歸决訓誥之源流傳聞四方平視三代而秉守甚正韜藏有程介然獨行卓爾清峙閲爾之能事多矣聆爾之嘉猷藹然信乎虞舜之心若江河之不能禦也俾即一作爾真秩斯為舊章夫參賛樞衡典司綸綍職業彌重扶摇漸崇勉副東求無孤寵待可中書舎人知制誥授庾凖楊炎知制誥制常衮勅中大夫行尚書吏部郎中上柱國庾凖檢校尚書兵部郎中充山南集作劒副元帥判官賜緋魚袋楊炎䓁詔令之重潤色攸難其文流則失正其詞質則不麗固宜酌風雅之變叅漢魏之作發揮綸㫖其在兹乎爾各以茂才碩學敏識純行俾其對掌可謂得人仍轉郎位式光朝選凖可行尚書職方郎中知制誥㪚官勲如故炎可守尚書禮部郎中知制誥賜如故授郗昻知制誥制勅朝㪚大夫檢校尚書司勲郎中郗昻冲和簡朴不餙其外有雄俊之才可變風雅有精深之學實䆒儒𤣥加以忠敬兼之亮直率由兹道可謂正人夫化成天下在於文匡朕不逮主於諌敷暢綸㫖箴規朝闕所掌皆重爾其懋哉可守諌議大夫知制誥㪚官如故授韋覬給事中庾敬休兵部郎中知制誥白居易勅職之要莫先於駮正文之選莫難於司言將使朝綱有條朕命惟允在二者得人而已中大夫使持節蘇州諸軍事守蘇州諸軍刺史上騎都尉韋覬精微專直通乎事典可使平奏議而坐右曹朝散大夫守尚書禮部郎中上柱國庾敬休温裕端明飾以詞藻可使書誥命而立西序集作而專右席而輪轅鑿枘各適所宜夫惟刺史守列城郎官應列宿選任倚注一作寄非不榮重然吾左右前後方求正人如覬敬休不宜疎逺亦猶有聲之玉無纇之珠不置佩服之中掌握之上集作不置於佩服掌握之間皆非其所也宜自敬重無忝吾言覬可行給事中散官如故敬休可尚書兵部郎中知制誥㪚官如故授獨孤郁守本官知制誥制勅考功員外郎史舘脩撰獨孤郁為人沉實敏行寡言粲然文藻秀出於衆累升諌列再秉史筆洎掌絲綸率以直聞求之周行不可多得而掖垣近職綸閣重選俯詢時議爾宜居之授錢徽司封郎中知制誥制勅中䑓草奏内庭掌文西掖書命皆難其人也非慎行敏識茂學懿文四者兼之則不在此選祠部郎中翰林學士錢徽藹然儒風粲然詞藻縝宻若玉端直如弦自叅禁司益播其羙貞方敬慎乆而彌彰應對必見於據經奏議多聞於削一作焚槀迨今六載其道如初嘉其忠勤宜有選擢俾轉郎吏仍叅綸閣兹乃榮奨爾其敬承可依前件授獨孤郁轉司勲郎中知制誥制前人勅考功員外郎知制誥獨孤郁學識文行時論所推選自外郎擢居右闥綸言樞命既重且難委以發揮甚聞稱職而端諒忠謹介然自居為臣若斯足可嘉奨官當滿嵗職亦逾年冝從羙選以光近侍可司勲郎中知制誥授裴諗知制誥制崔蝦勅傳曰有功徳於人者其後必大伊爾烈考勤勞王家出有平冦之功入有致君之志式多令嗣以承清基惟爾諗生而有文弱不好弄中藴明敏外涵清和藹然君子之風蔚有賢人之操自擢昇翰苑入侍禁闈動必知機静而適道大玉之韻清越以長小山之姿貞芳自茂是用資其粉澤演我絲綸斧藻方耀於鳯銜揮灑更期於鴻筆式光帝載無鬱王猷可依前件授考功員外郎賜緋魚王鉅駕部員外郎知制誥制錢珝勅某官某夫舉典申命以進退在位之士而指其臧否兼儆百職者本乎聖人之法言也法言之不為浮言而已知言之士過實必羞因使出辭當能近法鉅積中有羙欲昧而彰永惟季父令名常恐所承不以一作似百川學海進則至焉吾欲激而成之是以擢居禁省徃司明誥㒺畔法言至不漏不踰兹為能矣可依前件文苑英華巻三百八十二
