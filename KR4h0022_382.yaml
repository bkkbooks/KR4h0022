body:
  text: 文苑英華卷三百八十二宋李昉等編北省三中書舍人授鄭勉紫微舍人等制蘇頲黃門朝議大夫守給事中鄭勉措一作留心精核尤明理體朝議大夫尚書庫部郎中戴令言屬詞方雅深逹政端咸藴公忠備聞學行紫闈星拱必佇賢臣青闥雲連實旌竒士闕專文事闕中散官各如故主者施行授崔琳紫微舍人制黃門正議大夫行尚書屯田郎中上柱國魏縣開國子崔琳素履一作履操純懿清心諒直文辭為從政之端忠孝是立身之本分符作牧共賴仁明賜筆題工咸推練習掖垣近密禁省旁求宜遷振鷺之行用集栖雞之地可行紫微舍人散官勳封如故主者施行授王丘紫微舍人制敕通直郎紫微舍人內供奉王丘思會風雲文成典謨介獨為操直方闕近其華望自𢎞闕青瑣事密黃縑頡頏嵗年籍甚聲聽俾𢎞詞禁之美宜正掖垣之秩可守紫微舍人散官如故授齊浣紫微舍人制勑朝議郎守給事中內供奉齊浣運心孤邁懷器獨立屬詞每窮其雅實臨事益表其甄明故能早負聲猷備經推擇左曹駮議常接於雙逰右掖詞言佇光於五字可守紫微舍人散官如故授逹奚珣中書舍人制孫逖敕朝議大夫守職方郎中兼試知制誥逹奚珣文學素優忠勤克著自經試用備聞詳密草奏南宫已擅一時之妙掌綸西掖愈彰五字之能宜就列於即真俾正名於近侍可守中書舍人散官如故授賈登中書舍人制門下朝請大夫守給事中騎都尉賈登修詞自逹守道為師有大雅之文章稟中和之德行駮正之地已著能名綸綍之司更膺髙選可守中書舍人授梁淑中書舍人制敕朝議郎守尚書兵部郎中梁淑通明致用博雅為文才冠時英望髙人譽五字之選一臺所推宜旌起草之能俾效司綸之職可中書舍人散官如故授韋斌中書舍人制門下國子司業韋斌貞規不雜敏識惟精標麗則以工文秉直聲而濟美久從散秩未展清才豈避􅊚親遂妨公用宜特升於禁掖俾專事於司言可行中書舍人授李元成中書舍人制敕朝議郎守尚書考功郎中仍試知制誥兼知史官事李元成中和有裕直道自然文章為致用之資慎密是周身之本久司綸綍深愜器能宜拜命於即真俾甄才於試可可守中書舍人兼知史官事授杜鴻漸崔倚中書舍人制賈至敕知中書舍人鴻漸等忠肅恭懿美秀而才蘊清通之理義兼真固之幹能用制軍誥允屬夏卿持衡審官時惟小宰慎擇多士僉曰爾諧宜當銓綜之劇仍掌絲綸之任鴻漸可守中書舍人判武部倚守中書舍人判文部侍郎授裴敦復中書舍人制王丘敕朝議郎檢校吏部郎中裴敦復等並行標純一材藴經通或學辨文鼠核綜兼於隱賾或詞握靈蛇光暉映於等夷職居要劇聲振發揮近密之職搜擇宜精俾對掌於絲綸兼聨華於省闥可依前件授崔翹中書舍人制門下朝議大夫守給事中崔翹學行自中方直形外明而能晦簡不違謙始方蔚於文章終激揚於吏道駮議既久要密遞遷宜自珥貂之司俾參鳴鳯之掖可守中書舍人散官如故授李彭年等中書舍人制王從敬門下朝請大夫守給事中李彭年等器業𢎞深風規頴秀士林楨幹文苑英髦並綜核前言間習政事瑣闈駮正既稱詳密畫省彌綸允推精練俾遷掌於綸綍咸列侍於軒墀可依前件授裴度中書舍人制白居易敕司勳郎中知制誥裴度以茂學懿文潤色訓誥體要典麗甚得其宜施之四方朕命惟允况中立不倚道直氣平介然風規有光近侍臺郎滿嵗班列當遷綸閣之職所宜直授可中書舍人授崔群中書舍人制敕庫部郎中知制誥翰林學士崔群端厚和敏節以文學溫良忠敬得侍臣之風自列內朝兼司誥命事煩而益密職久而彌精六年於兹勤亦至矣况小大之事常所訪問盡規極慮𢎞益居多所宜崇以正名式光近職敬乃嘉命其惟有終可授賈餗等中書舍人制敕參掌宥密斧藻訓誥侍立於文陛之下揮翰於禁署之中非第一流不在其位朝散大夫守太常少卿知制誥上柱國賈餗器範溫雅詞藻𢎞嚴朝散大夫守尚書職方郎中知制誥上柱國清河縣開國男食邑五百户崔咸學探奧旨文有正聲而皆公論所歸清規擅稱比美玉而光彩外溢服華組而煥耀揚輝闕荀大章之才闕識王濬沖之質則損乎文佇爾酌中明吾試可無使相如視草專美於前時也其𢡟承之餗可守中書舍人散官勳如故咸可守中書舍人散官勳如故授李渤給事中鄭涵中書舍人等制前人敕舉才命官得人斯重詢事考績稱職為難况駮正違失典司文誥參我密命為吾近臣非望實兼優則不在兹選朝議郎守諌議大夫知匭使上騎都尉賜緋魚袋李渤清標雅裁器韻不群贍學積文泉源益濬有濟人經國之術資通時利物之才朝散大夫守尚書司封郎中知制誥上柱國鄭涵藻履堅明雄文炳蔚虛懷宏逹雅思沖深立言嘗見其著誠秉志頗聞其經逺夫澄其源者必清其流端其本者必正其末其便蕃禁掖潤色王猷君不可以私其人臣不可以虛其受簡才既因於朕志當官爰俟於爾能其有嘉聞以光茂選渤可守給事中散官勳賜如故涵可守中書舍人散官勳如故授李訥中書舍人李言大理少卿制崔嘏敕禮部郎中知制誥李訥等彰施帝載潤色王猷朝出乎九重夕馳於四表必資其金相玉立之器懷其騰蛟吐鳯之才以發揮人文流布天澤而臯繇作士謨明以贊至理定國持刑公平而昌後嗣使匹婦無霣霜之嘆遐氓離束濕之寃隂陽氣和手足可措必在乎理獄之官明慎用刑哀矜守法今訥言等皆以器能犀利文彩光華演綸推倚馬之工剖竹著懸魚之化以兹遷擢誰曰不然勉吾右文恤刑之意也訥可守中書舍人言可大理少卿授裴諗中書舍人制敕居禁密之地聞善則遷當演綸之工有勞斯陟此所以光吾侍從榮彼縉紳翰林學士司封郎中知制誥裴諗家承茂勳身有羶行早襲弓裘之業克隆堂構之基間淡自居囂浮不染自擢居內署掌兹制命謹密無曠馨香有聞問對備見其一心敏捷共推其七步况臧孫有後且聞得鳯之音枚乘多才雅蓄雕龍之妙爰因滿嵗授以正名爾宜思𢎞用以致君勵精誠而正已慎爾聞見奉吾周旋無彰溫樹之名克保詞林之美可依前件授祕書少監賜紫盧光啓守中書舍人制錢珝敕西省設官之重實代吾言故修禁之章漏泄居其首而稽緩次之受選者率用靖默專敏之士然後若疑作為得具官盧光啓勵精不怠處默有倫定志而靜專其謀好古而敏求其要總是四善謹於一心則攻學與文嘗試之於禁闥矣能於一作能居又作而能散地自安素風不去乃資公論復典訓辭夫入官惟勤執事惟敬茍視禁以無犯則立身而有章行之克終利亦焉往可依前件授祠部郎中知制誥賜緋王巨守中書舍人制前人敕遷不欲速則人將競遷而不安其職也掌誥故事多用外郎嵗滿而升乃正郎位嵗又滿始得其秩所以持重官次展張辭業有毛羽者不亦樂於翺翔乎具官王巨敏於內而秀於外其發也為文章棲於禁垣奮以健筆若夫規格罔有輕浮試之三年未嘗亂日且聞講學必務本根今掌誥再遷一如故事論諸遊官於爾甚優兼佩金章俾光飛步自兹而往厥路彌髙敬而行之何患不到可依前件授翰林學士鄭延昌守本官兼中書舍人制劉崇望敕以爾彯纓著稱夢筆為文富以美才披其禁闥典由中之詔成布下之言方謂得人雅當入侍蓋聞羊祜議謀是草皆焚周仁重厚其言不泄親近之地慎密為先爾既不能何爽居外西省亦吾教誥之地戒之可矣可依前件授膳部郎中知制誥錢珝守中書舍人制薛廷圭敕具官錢珝孟子不云虞舜聞一善言見一善行若決江河沛然莫之能禦也朕凝神穆清耽味墳史用爾掌綸誥時推得人觀其書詞敻絶塵滓褒貶盡春秋之要指指歸決訓誥之源流傳聞四方平視三代而秉守甚正韜藏有程介然獨行卓爾清峙閲爾之能事多矣聆爾之嘉猷藹然信乎虞舜之心若江河之不能禦也俾即一作爾真秩斯為舊章夫參贊樞衡典司綸綍職業彌重扶搖漸崇勉副東求無孤寵待可中書舍人知制誥授庾凖楊炎知制誥制常衮敕中大夫行尚書吏部郎中上柱國庾凖檢校尚書兵部郎中充山南集作劒副元帥判官賜緋魚袋楊炎等詔令之重潤色攸難其文流則失正其詞質則不麗固宜酌風雅之變參漢魏之作發揮綸旨其在兹乎爾各以茂才碩學敏識純行俾其對掌可謂得人仍轉郎位式光朝選凖可行尚書職方郎中知制誥散官勳如故炎可守尚書禮部郎中知制誥賜如故授郗昻知制誥制敕朝散大夫檢校尚書司勳郎中郗昻沖和簡朴不飾其外有雄俊之才可變風雅有精深之學實究儒玄加以忠敬兼之亮直率由兹道可謂正人夫化成天下在於文匡朕不逮主於諌敷暢綸旨針規朝闕所掌皆重爾其懋哉可守諌議大夫知制誥散官如故授韋覬給事中庾敬休兵部郎中知制誥白居易敕職之要莫先於駮正文之選莫難於司言將使朝綱有條朕命惟允在二者得人而已中大夫使持節蘇州諸軍事守蘇州諸軍刺史上騎都尉韋覬精微專直通乎事典可使平奏議而坐右曹朝散大夫守尚書禮部郎中上柱國庾敬休溫裕端明飾以詞藻可使書誥命而立西序集作而專右席而輪轅鑿枘各適所宜夫惟刺史守列城郎官應列宿選任倚注一作寄非不榮重然吾左右前後方求正人如覬敬休不宜疏逺亦猶有聲之玉無纇之珠不置佩服之中掌握之上集作不置於佩服掌握之間皆非其所也宜自敬重無忝吾言覬可行給事中散官如故敬休可尚書兵部郎中知制誥散官如故授獨孤郁守本官知制誥制敕考功員外郎史館修撰獨孤郁為人沉實敏行寡言粲然文藻秀出於衆纍升諌列再秉史筆洎掌絲綸率以直聞求之周行不可多得而掖垣近職綸閣重選俯詢時議爾宜居之授錢徽司封郎中知制誥制敕中臺草奏內庭掌文西掖書命皆難其人也非慎行敏識茂學懿文四者兼之則不在此選祠部郎中翰林學士錢徽藹然儒風粲然詞藻縝密若玉端直如弦自參禁司益播其美貞方敬慎久而彌彰應對必見於據經奏議多聞於削一作焚稿逮今六載其道如初嘉其忠勤宜有選擢俾轉郎吏仍參綸閣兹乃榮奬爾其敬承可依前件授獨孤郁轉司勳郎中知制誥制前人敕考功員外郎知制誥獨孤郁學識文行時論所推選自外郎擢居右闥綸言樞命既重且難委以發揮甚聞稱職而端諒忠謹介然自居為臣若斯足可嘉奬官當滿嵗職亦逾年冝從美選以光近侍可司勳郎中知制誥授裴諗知制誥制崔蝦敕傳曰有功德於人者其後必大伊爾烈考勤勞王家出有平冦之功入有致君之志式多令嗣以承清基惟爾諗生而有文弱不好弄中藴明敏外涵清和藹然君子之風蔚有賢人之操自擢升翰苑入侍禁闈動必知機靜而適道大玉之韻清越以長小山之姿貞芳自茂是用資其粉澤演我絲綸斧藻方耀於鳯銜揮灑更期於鴻筆式光帝載無鬱王猷可依前件授考功員外郎賜緋魚王巨駕部員外郎知制誥制錢珝敕某官某夫舉典申命以進退在位之士而指其臧否兼警百職者本乎聖人之法言也法言之不為浮言而已知言之士過實必羞因使出辭當能近法巨積中有美欲昧而彰永惟季父令名常恐所承不以一作似百川學海進則至焉吾欲激而成之是以擢居禁省往司明誥罔畔法言至不漏不踰兹為能矣可依前件文苑英華卷三百八十二
