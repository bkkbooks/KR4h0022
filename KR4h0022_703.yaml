body:
  text: 文苑英華巻七百四宋李昉等編文集六徐泗濠節度使張公集序一首兵部郎中楊君集序一首比部郎中崔君集序一首宗元先生吳尊師集序一首穆公集序一首西漢文類序一首楊評事集序一首徐泗濠節度使贈司徒張建封文集序權德輿昔有虞以濬哲文明理天下故有諧八音陳九德賡歌康哉之臣周宣王修文武之業以開中興故有歌蒸人賦韓奕清風大雅之什春秋之際諸侯列集有卿字大夫感物造端能賦可以圖事稱詩可以諭志然則元侯宗工作為文章本於王化繋於風俗亦其志氣之所發也司徒諱建封南陽人簡亷䟽逹信厚誠直秉公可大以禮義為干櫓非道不䖏視圭組猶稊稗以褐衣寛博集作褐冠博帶游於京師當時賢公名卿盛服先王之倫皆迎門締交就義若渇賛師律於盟津大鹵二府由察視主柱下方書朝廷以州部要害選難符守歴巴陵陟夀春婪婪反虜集作慮非壤地相接衆寡懸絶物情不交集作支斬其使者以狥傳首於行在所屏翰淮海我為金湯選蠕觀望者皆革心服義而東夏安矣加地進禄察亷三郡文粹作都授鉞貞師莅於徐方就加六職端右之任追命三公論道之秩其始終艱貞光大也如是昔左丘明載單襄公之言曰忠文之實也智文之輿也仁文之愛也義文之制也則司徒嚮時之大忠明智戴仁抱義皆推本乎斯文然後足言足志踐履章灼故其辨古人心源定是非於羣疑之下則韓君别録痛詆時病以發舒憤懣則投元杜諸宰相書其餘賛勲閥文粹作伐表丘隴銘噐叙事放言詣理皆與作者方駕而歌詩特優有仲宣之氣質越石缺之清㧞如雲濤溟漲浩濛無際而天琛夜光往往在焉其入覲也獻朝天行一篇因喜氣以攄肝膈覽其詞者見公之心焉其還鎮也德宗皇帝紓天文以送别湛思異倫輝文粹作耀動中朝至於内廷錫宴君唱臣和皆酌六義之英而為一時之盛夫文之病也或牽拘而不能騁或奔放而不自還公則財成心匠文粹作切近揮斥細故英華感槩卓爾其宏大析理研㡬泊然其精㣲全才逸氣與勲力相宣集作直盡在是矣公之理也徐人冝之故尚書克家纂業用嗣厥服猶鮑氏之居司𨽻鄭人之賦緇衣大君推恩善善春秋之義也永懐先志乃集遺文以德輿甞承司徒之懽表列編次凡二百三十篇承詔作序是用拜君命之辱而不敢讓云兵部郎中楊君集序周家忠厚文章備乎二代先師有郁郁之歎故周任史克仍叔吉甫之倫生焉漢氏剗煩苛𢎞利澤訓辭深厚議論宏大故賈誼揚雄司馬遷相如之才出焉唐興㡬二百歳紹聞集無聞字周漢之逸軌以人集無人字文華國猶雲漢之為章于上江漢之為紀于下九功成焉百度貞焉王澤浹洽故斯文煥發秉筆之士皆欲泝末流而挹清源㧞埃􅝙而棲顥氣至若詞合雅言中倫䟽通而不流博富而有節潔静夷昜得其英華者其𢎞農楊君歟君諱凝字懋功孝弟純懿中和特立早歳違難於江湖間與伯氏嗣仁叔氏恭履修天爵振儒行東吳賢士大夫號為三楊易象之懿文孔門之言詩皆生知之舉進士甲科賢公交辟典集作由校秘書四遷至冠柱後惠文徴拜右集作左史歴司封員外右唐書集本作左司郎中不附離權右陰為所中以其集作介外相師律非君莫可他日計事如京師復命於梁㑹其帥既歿軍司馬代之詔未下兵火氣燄殺人以逞明神佑善獨脫死地中貴人持尺一詔書徴還燕居四年不交人事磅礴三古推明六義措跡愈退而屬詞愈精時恭履捐館一紀君與嗣仁倍手足之愛壬午歳嗣仁以中執法亷湘中七郡風俗君起家為兵部郎中伯仲昌大輝華中外方將乗迅颷摩赤霄極文采之用為太平嘉瑞恊書命於謨訓薦聲詩於郊廟命屈其才末如之何君甞以為尚氣者或不能精宻言理者或不能彪炳鏤蒸彛景鐘與縁情比興者或不能相為用仲宣體弱公幹未遒才難而力不足從古所病故懋功於六經百氏之中如良金巧冶鍛鍊在手而又弛扄防墮約束恬然而據上游坦然而蹈中行其叙事推理况集作伉今据古多而不煩簡而不遺彌綸條鬯無入而不自得所著文一百四十餘篇歌詩倍之皆天球大圭竒采逸響不待數珩璜珮玦之目然後知其妙噫自天寳巳還操文柄而爵位不稱者德輿先大夫之執曰趙郡李公遐叔河南獨孤公至之狎主時盟為詞林龜龍止於尚書郎二千石屬者亡友安定梁肅寛中平夷朗暢傑邁間起博陵崔鵬元翰博厚周宻精醇不雜二君者雖甞司宻命裁賛書而終不越於諌曹計部今懋功亦以中兵下大夫奄忽不淑豈造物者不與其全歟復舛錯歟此吾徒故人所以索然出涕而有百身之痛也嗣仁類其文為二十篇集作編緘詞甚哀猥見授簡以德輿早辱厚善忘其不能其代德家法與踐履始中終之說嗣仁刻石紀墓既詳言矣徒采其述作大㫖直書以綴于篇比部郎中崔君元翰集序易賁之彖曰觀乎人文以化成天下故闕里之四教門人之四科未有遺文者荀况孟軻修道著書本於仁義經術之枝𣲖也迨夫騷人怨思之作游士從衡之論刺譏捭闔文憲陵夷至漢廷賈誼劉向班固揚雄司馬遷相如之倫欝然復興有古風烈然則文之用也横三才之中經紀事物集作萬事章明統類不可已也殷之三說命周之命君陳君牙楚射父之訓詞鄭東里之潤色天子諸侯名集作告命之文也張老之輪奐史克之駉駜吉甫之清風伯喈之無愧賢士大夫頌述之文也至若夫子紀延陵墓叔向寓子産書董仲舒射䇿書天人相與之際阮元瑜書記翩翩之任觸類滋多非文不彰後之人力不足者詞或侈靡理或底伏文之難能也如是博陵崔君元翰東漢濟北相長岑令之後也曽祖某濟州刺史祖某鳯閣舍人考某以經明歴衛州汲縣尉虢州湖城縣主簿親歿遂不復仕探古先㣲言著尚書演範周昜忘象及三國春秋幽觀之書門人諸儒昜其名曰貞文孝父君紹文宗雕龍之慶究貞文法義之學潔亷清方敦直莊明博見強志不取合於俗黙而好深湛之思舒而為彬蔚之文師遵六籍磅礴二漢不為物遷不為波流初閉文粹作間闗隠約於河朔之間年殆知天命甫與計偕至京師洎博學宏詞直言極諌凡三登甲科名動天下初自典校秘書連辟汧公北平王二司徒府管奏記之職歴太常寺恊律郎大理評事錫以命服登朝廷文粹無廷字為太常寺博士禮部員外郎貞元七年春轉職方員外郎知制誥八年終罷為比部郎中十一年夏感疾不起其夀四百甲子其文若干篇閎茂博厚菁華縝宻足以希前古而聳後學記文粹作紀循吏政事則房栢鄉碣孫信州頌叙守臣勲烈則黎陽城碑劉幽求文粹作州神道碑表宗工賢人兆域則李太師梁郎中誌文撰門下集作撰門中德善則貞文孝父誌碣二銘攄志氣以申感槩則與李都統及三文粹作二從事書纂文粹作詮桑門心法則大覺禪師碑推人情以陳聖德則請復尊號表鋪陳理道則有制䇿藻潤王度則有詔誥嚮所叙詩書說命駉頌而下君皆索其粹精故能度越倫類有聲名於代其他詩賦賛論銘誄序詔等合為三十巻如黄鍾玉磬𢎞文粹作琮璧琬琰奏於懸間列在西序其彰彰者雖漢庭諸公不能加也無溢言曼辭以為夸大無謟笑柔色以資孟晋勁集作婞直而不能屈已清剛而不能容物孤文粹作介特寡徒晩逹中廢斯亦命之所賦也德輿蚤文粹作昔歳與君遊於集無於字江湖間又接武侍從登文石之陛常所論著偹探簡編君之孤某既除䘮泣捧遺文見咨序引故如其篇第直書以冠之云爾文粹無爾字中嶽宗元先生吳尊師集序道之於物無不由也無不貫也而况本於𤣥覧發為至善言而藴道猶三辰之麗天百嘉之麗地平夷章大恬淡温粹飄飄然軼八紘而泝三古與造物者為徒其不至者遣言則華渉理則泥雖辨麗可嘉采真之士不與也宗元先生吳君其知言者歟先生諱筠字貞節華隂人生十五年篤志於道與同術者隠於南陽倚帝山閎覽古先遐蹈物表芝耕雲卧聲利不入天寳初𤣥纁鶴版一作書徴至京師用希夷啓沃脗合𤣥聖請度為道士宅於嵩丘乃就馮尊師齊整受正法初梁貞白陶君以此道授昇𤣥王君自王君至先生凡五代矣皆以隂功救物為王者師十三年召入大同殿尋又詔居翰林𤣥宗在宥天下順風所嚮乃獻𤣥綱三篇優詔嘉納志在遐舉累章乞還以禽魚自况藪澤為樂得請未㡬盗泉汙于三川羽衣虚舟泛然東下棲匡廬登㑹稽浮淛河息天柱隠機埋照順吾靈龜有時放言以暢天理且以園公歌詠於紫芝𢎞景怡說於白雲故屬詞之中尤工比興觀其自古王化詩與大雅吟歩虚詞遊仙雜感之作或遐想理古以哀世道或磅礴萬象用冥環樞稽性命之紀逹人事之變大率以嗇神挫銳為本至於竒采逸響琅琅然若戛雲璈而凌倒景崑閬松喬森然在目追集無此字近古遊方外而言六義者先生實主盟焉至若摠論谷神之妙則有𤣥綱篇哀蓬心蒿目之逺於道也則有神仙可學論䟽瀹澡雪使無落吾事則有洗心賦巖棲賦修胷中之誠而體乎大一作天均有心目論契形神頌其他抗章寓書賛美序别非道不言言而可行泊然以㣲妙卓爾而昭曠合為四百五十篇博大真人之言盡在是矣以大厯十三歳歳直鶉首止於宣城道觀焚香返真於虚室之中門弟子有邵冀𤣥者率籲其徒寧神於天柱西麓從其命也大原王顔常恱先生之風採道也熟自先生化去三歳顔為御史中丞類斯遺文為三十編拜章上獻藏在秘府冀𤣥者偏得先生之道如槁木止水刳心遺形自先生化去二十五年一作歳類其文章一作以其文編請傳永乆其有遥廷一作遥逍卓詭之論猶不列於此編一無編字至若挺神奇祛物一作見怪告錬蛻之地合肸蠁之符備刻於金石者之論說一作皆備於刻金石者之説今徒采獲斯文以序崖略且俾後學知道者必知言云一作皆唐文粹穆公集序許孟容班孟堅謂有漢文章與三代同風巨唐化成稽古斯文配炎靈之盛浸息滛靡歸於正聲由是業文之士蓄靈含粹光價時獨者往往間出吾友河南穆員字輿直麟蔚鳯采自天而授誦六經得其研深閱百氏得其英華屬詞匠意必本於道夫龍圖龜書三綂之有述皆文之藴也自雅頌風騷而下則又粉澤而成黼藻雕鐫而為形象比其音而曲度之縁其情而哀樂之悠逺昜直昭明典則本情性而根教化者率漫羡魁壘上科毎下盧毎反繁音艶彩習怪誕而尚沉溺者也穆君泝其波流擇其宗師以為文宣王經春秋序詩書繋易象猶日月不可及矣游夏荀孟李斯賈誼之徒是宜學者十駕百己鑚仰而憲章者也故其文融朗恢徤沉深理辨墉閫四㑹精鋩百鍊結而為峻極散而為游演其工也異今而從古其㫖也懲惡而聳善跡夫孝于其上慈于其下擇中庸而後蹈推久要而後交則向之詞藝由積衷淳耀發而為身瑞者也顔回黄憲仁而夭促揚雄司馬遷才而不試穆君年逾四十用止幕畫并四賢之德噐而禄夀似焉彼洪鑪埏埴真宰不直歟為天地無心芻狗萬化歟大凡碑誌文册銘讚記序六十五首共成十巻於先府君先夫人𤣥堂誌見自身刑家自家刑國父父子子夫夫婦婦之道於祭顔太師張相國文見君仁臣忠捍患成功感憤激烈死輕鴻毛之道向使假其永齡登金馬石渠與獻納論思之臣發揮謨訓潤色王度則聖朝文苑頌甘泉賦羽獵卿雲褒臯群子之列加一士也斯楊嗣仁所以賦已友之哀余所奠疑矣宋之問遺草編次授於伯兄舊御史中丞今常州刺史善知音者惟子期乎發篋開巻如外𤣥圃將垂來代敢失其傳西漢文類序桞宗元左右史混久矣言事駁亂尚書春秋之㫖不立自左丘明傳孔氏太史公述歴古今而為史記文粹作述歴古今史記迄于今交錯相亂莫能離其說獨左氏國語記言不叅於事戰國䇿春秋後語頗本古集作右是史尚書之制然無古聖人蔚然之道大都集作抵促數耗矣而後之本者寵集作襲之文之近古而尤壯麗莫若漢之西京班固書傳之吾甞病其畔散不屬無以考其變欲采比義㑹年長疾作駑墮愈文粹作日甚蜀集作年長疾篤惰愈日甚未能勝也幸吾弟宗直愛古書樂而成之搜討磔裂攟摭融結離而同之與類推移不昜時月而咸得從其條貫森然炳然若開群玉之府指撝聮累圭璋琮璜之狀各有列位不失其叙雖第其價可也以文觀之則賦頌詩歌書奏詔䇿辯論之辭畢具以語觀之則右史紀文粹作記言尚書國語戰國䇿成敗興壊之二字文粹作衰字說大備無不包也噫是可以為學者之端耶始吾少時有路子者自賛為是書吾嘉而叙其意而其書終莫能具卒俟宗直也故刪取其叙繋於左以為西漢文類首紀殷周之前其文簡而野魏晉己降則盪而靡得其中者漢氏漢氏之東則既衰矣當文帝時始得賈生明儒術武帝尤好之集作焉而公孫𢎞董仲舒司馬遷相如之徒作風雅益盛敷施天下自天子至公卿大夫士庶人咸通焉於是宣於詔策逹於奏議諷於詞賦傳於歌謡由髙帝迄于哀平王莾之誅四方之文章盖爛然矣史臣班孟堅修其書㧞其尤者克於簡冊則二百三十年間列辟之逹道名臣之大範賢能之志業黔黎之風羙列焉若乃合其英精離其變通論次其叙位必俟學古者興行之唐興用文理貞元間文章特盛本之三代接于漢氏與之相凖於是有能者取孟堅書類其文次其先後為四十巻楊評事文集後序賛曰文之用辭令褒貶導揚諷諭而已雖其言鄙野足以備於用然而闕其文采固不足以竦動時聽夸示後學立言而朽君子不由也故作者抱其根源而必由是假道焉作於聖故曰經述於才故曰文文有二道辭令褒貶本乎著述者也導揚諷諭本乎比興者也著述者流盖出一作述於書之謨訓昜之象繋春秋之筆削其要在於高壯廣厚詞正而理備謂宜藏於簡册也比興者流盖出於虞夏之詠歌殷周之風雅一作雅頌其要在於麗則清越言暢而意美謂宜流於謡頌也兹二者考其㫖義乖離不合故秉筆之士恒偏勝獨得而罕有兼者焉厥一作故有能而專美命之曰藝成雖古文雅之盛世不能並肩而生唐興以來稱是選而不怍者梓潼陳拾遺其後燕文貞以著述之餘攻比興而莫能極張曲江以比興之隟窮著述而不克備其餘各探一隅相與背馳於道者其去彌逺文之難兼斯亦一無亦字甚矣若楊君者少以篇什著聲於時其炳耀尤異之詞諷誦于一作於下同文人滿盈于江湖逹于京師晩節遍悟文體尤邃叙述學富識逺才涌未己其雄傑老成之風與時増加既獲是不數年而夭其季年所作尤善其為鄂州新城頌諸葛武侯傳論餞送梓潼陳仲甫汝南周源河東裴泰武都符一作何義府泰山羊士諤隴西李諫一作練凡六序廬山禪居記辭李常侍啓逺遊賦七夕賦一作詩皆人文之選已用是陪陳君之後其可謂具體者歟嗚呼公既悟文而疾既即功而廢廢不逾年夭病及之卒不得窮其工竟其才遺文未克流於世休聲未克充於時凡我從事於文者所宜追惜而悼慕也宗元以通家修好㓜獲省謁故得奉公元兄命論次篇簡一作目遂述其制作之所詣以繋于一作其後一作皆唐文粹文苑英華巻七百四
