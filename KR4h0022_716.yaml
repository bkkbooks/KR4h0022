body:
  text: 文苑英華卷七百十七宋李昉等編詩序三奉送前合州徐使君赴上都詩序一首緱山道中五詠詩序一首蝗旱詩序一首聨句詩序一首上已日燕太學聽琴詩序一首送陸員外出刺歙州詩序一首荆潭酬唱詩序一首凌助教蓬屋題詩序一首愚溪詩序一首法華寺西亭夜飲賦詩序一首王氏伯仲唱和詩序一首婁二十四秀才花下對酒唱和詩序一首香山居士寫真詩序一首序洛詩序一首題致仕武賔客嵩山舊隱詩序一首在㑹稽與京邑游好詩序一首題望春詩序一首堂陽亭子詩序一首奉送前合州徐使君赴上都詩序穆員二月中節時芳為人栁先攀折而垂水待臨泛而滿花迎酒客而笑鶯隨詩人而吟有良二千石徐公解印南國將赴鎬京與東風遲日偕至洛中賢士大夫以公著一作香名茂實詩言酒態相從於賞春之場其潤色也與鶯花並東溪南陌詩鋒函合迭為晉楚者日有聞焉惜乎偕賦不疲羣芳未老而不謀者别中道間之嚮之待人攀折臨泛與笑而吟者又似有意乎傷且怨矣矧同游者之心乎僕也貧不知春病不逮㑹諸公以異日徴文之籍不獲辭焉所以敘作者之意共歎春未去而公去故其思也同緱山道中五詠詩序仲春之節洛師還近郊亞尹尚書郎御史元公李公韋公將事如軍賞心百里豫時有所繫不克與偕三君子賦嵩峰漢陵維源竹澗仙壇五篇遺我居者善乎詩之時用也如繪出其芳鏡涵羣象翬呈鮮彩琴韻雅音俯仰吟咏之間若在春元之上晴峰之下境移衆目勝集我心詩之時用也如此否則一時得之人與閒雲並𣪚興與夕陽俱盡春與殘花共謝游者居者等無及焉他日屬和之聲洛陽為之動既編次盈什則不可不紀其所以然蝗旱詩序甲子嵗秋大旱螽蝗生其為異也聽如疾風視如飛雨仰如隂雲俯如流水乃至天降其髙地增其厚明為之昏其災也如農夫剃草繁霜凋木烈火燎原嗚呼甚矣矧夫既枯之稼僅遺之粒其可望也余時從師於東周居鎮之府僚友霍總賦蝗旱詩一章七十有二句其指兵生蝗蝗生和和生瑞猶夫空谷之響立表之影以其類至必然若乃春秋書災紀異之法詩人風化美刺之義備閲章句則知其文余味之深敘者以為引聨句詩序吕溫河東栁茂直與余有潘楊之睦且道義相得也余兄弟志守拙默不交當世晨昏之外靜専一室顧我者唯茂直而已以為切磋蓋常事討論有宴息導集作道志氣徒然起憤議世事集作時事文粹作時世余欲無言其或晴天曠景浩蕩多思永夜髙月耿耿不寐或風露初曉恍若有得或煙雨如晦緬懷所思則文粹作不然何以節宣慘舒暢逹情性其有易於詩乎乃因翰墨之餘琴酒之暇屬物命篇聨珠迭唱文粹作唱玉審韻諧律同聲相應研情比象造境皆㑹亦猶衆壑合注浸集作霈為大川羣山出雲混成一氣朗宣五色微闡六義雖小道必有可觀其在茲矣茂直命余序述存以編簡俾後之觀者知吾黨所立之濫觴上巳日燕太學聽彈琴詩序韓愈與衆樂之之謂樂樂而不失其正蜀夲作節又樂之尤閣本作光也四方無鬬爭金革之聲京師之人既庶且豐天子念致理之艱難樂居安之閒暇肇置三令節詔公卿羣有司至于其日率厥官屬飲酒以樂所以同其休宣其和感其心成其文者也三月初吉實惟其時司業武公少儀於是總太學儒官三十有六人列燕於集作于祭酒之堂樽俎既陳肴羞惟時盞斚敘行蜀本作有序獻酬有容歌風雅之古辭斥夷狄之新聲褒衣危冠愈愈蜀夲作與與如也有一儒生魁然其形抱琴而來歷階而升坐于樽俎之南鼓有虞氏之南風賡之以文王宣父之操優游夷愈廣厚髙明追三代之遺音想舞雩之詠歎及暮而還集作退皆充然若有所得也武公於是作歌詩以美之命屬官咸作之命四門博士昌黎韓愈敘之送陸員外出刺歙州詩序貞元十八年二月十八日祠部員外郎陸君出刺歙州朝廷夙夜之賢都邑游居集作從之良齎咨涕洟咸以為不當去歙大州也刺史尊官也繇郎官而往者前後相望也當今賦出於天下江南居十九宣使之所察歙為富州宰臣之所薦聞天子之所選用其不輕而重也較然矣如是而齎咨涕洟以為不當去者陸公之道行乎朝廷則天下望其賜刺一州則専而不能或閣夲作咸謂集無此字先一州而後天下豈吾君與吾相之心哉於是昌黎韓愈道願留者之心而泄其思作詩曰我衣之華一作美兮我佩之光集有兮字陸君之去兮誰與翺翔集有兮字斂此大惠兮施于一州今其去矣一作兮胡不為留我作此詩歌于逵道無疾其驅天子有詔荆潭裴均楊憑唱和詩序唐藝文志有裴均荆潭唱和集一卷即此也元和九年均師荆南諸夲作垍並非從事有示愈以荆潭酬唱詩者愈既受以卒業一作集非因仰而言曰夫和平之音淡薄而愁思之聲要妙歡愈之辭難工而窮苦之言易好也是故文章之作恆發於羈旅草野至若王公貴人氣得志滿集作氣滿志得非性能而好之則不暇以為今公開鎮蠻荆統郡惟九常侍楊公領湖之南壤地二千里德刑之政並勤爵祿之報兩崇乃能存志乎詩書寓辭乎詠歌往復循環集作還有唱斯和搜竒抉怪雕鏤文字與韋布閭里憔悴専一之士較其毫釐分寸鏗鏘發金石幽眇感鬼神信所謂材全而能巨者也兩府之從事與部屬之吏屬而和之苟在編者咸可觀也宜乎施之樂章紀諸册書從事曰子之言是也告於公書以為荆潭唱和詩序凌助教蓬屋題詩序栁宗元儒有蓬户甕牖而自立者河間凌士變窮討六籍皆有著述而尤邃春秋為儒官守道端莊植志不回在京師十二年家夲吳地集作也欲歸而不可得遂構蓬室以備揖讓之位棟宇簡易僅除風雨蓋大江之南其舊俗也由是不出環堵坐入吳甸包山震澤若在牖外所謂求仁而得斯固然歟與夫南音越吟慕望而不獲者異日道也夫厚人倫懷舊俗固六義之夲羣公是以有發德之什書在屋壁余序而引之愚溪詩序灌水之陽有溪焉東流入於瀟水或曰冉氏嘗居也故姓是溪曰集作為冉溪或曰可以染也名之以其能故謂之染溪余以愚觸罪謫瀟水上愛是溪入二三里得其尤絶者家焉古有愚公谷今豫家是溪而名莫能定土之居者猶齗齗然不可以不更也故更之為愚溪愚溪之上買小邱為愚邱自愚邱東北行六十步得泉焉又買居之為愚泉愚泉凡六穴皆出山下平地蓋上出也合流屈曲而南為愚溝遂負土纍石塞其隘為愚池愚池之東為愚堂其南為愚亭池之中為愚島嘉木異石錯置皆山水之竒者以余故咸以愚辱焉夫水智者樂也今是溪獨見辱於愚何哉蓋其流甚下不可以溉灌又峻急多坻石大舟不可入也幽邃淺狹蛟龍不屑不能興雲雨無以利世而適類於余然則雖辱而愚之可也寧武子邦無道則愚智而為愚者也顔子終日不違如愚睿而為愚者也皆不得為真愚今豫遭有道而違於理悖於事故凡為愚者莫我若也夫然則天下莫能爭是溪余得専而名焉溪雖莫利於世而善鍳萬類清瑩秀徹鏘鳴金石能使愚者喜笑眷慕樂而不能去也余雖不合於俗亦頗以文墨自慰潄滌萬物牢籠百態而無所避之以愚辭歌愚溪則茫然而不違昏然而同歸超鴻濛混希夷寂寥而莫我知也於是作八愚詩紀于溪石上法華寺西亭夜飲賦詩序余既謫永州以法華浮圖之西臨陂池邱陵大江連山其髙可以上其逺可以望遂伐木為亭以臨風雨觀物初而游乎皓氣之始間嵗元克已由柱下史亦謫焉而來無幾何以文從余者多萃焉是夜㑹茲亭者凡八人既醉克巳欲志是㑹以貽於集作于後咸命為詩而授余序昔趙孟至於鄭賦七子以觀鄭志克巳其慕趙者歟卜子夏為詩序使後世知風雅之道余其慕卜者歟誠使斯文也而傳於世庶乎其近於古矣王氏伯仲唱和詩序僕聞之世其家業不隕者雖古猶今集作乏也求之於今而有獲焉王氏子某與余通家代為文儒自先天已集作以來䇿名聞逹柔集作秉毫翰而踐文昌登禁掖者紛綸華耀繼武而起士大夫掉鞅於文囿者咸不得攀而倫之乙亥嵗余自南徐來執文貺余詞有逺致又著論非班昭不能讀集作續父兄之書而乃徼狂疾之功以為名吾知其奉儒素之道専矣問以兄弟嗣來京師㑹于舊里若璩瑒在魏機雲入洛由是正聲迭奏雅引更和播損箎之音韻調律吕之氣候穆然清風發在簡素非集無此字非文章之胄曷能及茲况宗兄握炳然之文以贊關右集作石豸集作薦冠銀章榮映江湖則嚮時之美談必復其始某也謂余傳卜氏之學宜敘于首章操斧於班郢之門斯强顔耳詩凡若干首婁二十四秀才花下對酒唱和詩序前人君子遭世之理則呻呼踴躍以求知於世而遁隱之志息焉於是感激憤悱思奮其志略以效於當世必集作故形於文字申於歌詠是故集無故字有其具而未得行其道者之為也婁君志乎道而遭乎理之世其道宜行而其術未用故為文而歌之有求知之辭以余弟同志而偕未逹故為贈詩以悼時之往也余既困辱不得預暏世之光明而幽乎楚越之問故合文士以申其致將俟夫木鐸以間於金石大凡編辭於斯者太平之不遇人也香山居士寫真詩序白居易元和五年余為左拾遺翰林學士奉詔寫真於集賢殿御書院時年三英華作四非十七㑹昌二年罷太子少傅為白衣居士又寫真於香山寺經藏集作藏經堂時年七十一前後相望殆將三紀觀今照昔慨然自歎者久之形容非一世事幾變自集作因題六字以寫其集作所懷序洛詩序序洛詩樂天自序在洛之詩也豫厯覽古今歌詩自風騷之後蘇李以還李陵蘇武始為五言詩次及鮑謝徒迄于李杜輩其間詞人聞知者纍百詩章流傳者巨集作巨萬觀其所自多因讒寃譴逐征戍行旅凍餒病老存歿别離情發於中文形於外故憤憂怨傷之作通計今古十集作什八九焉世所謂文士多數竒詩人尤命薄於斯見矣又有以知理安之世少離亂之時多亦明矣豫不佞喜文嗜酒集作詩自幼及老著詩數千首以其多也故章句在人口姓字落詩流雖才不逮古人然所作不啻數千首以其多矣作一數竒命薄之士亦有餘矣今夀過耳順幸無病苦官至三品免罹饑寒此一樂也太和二年詔授刑部侍郎明年病免歸洛旋授太子賔客分司東都居二年就領河南尹事又三年病免歸履道里第再授賔客分司自太和三年春至八年夏在洛凡五周嵗作詩四百三十二首除喪朋哭子十數篇外其他皆寄懷於酒或取意於琴閒適有餘酣樂不暇苦詞無一字憂歎無一聲豈牽强所能致耶蓋亦發中而形外耳斯樂也實夲之於省分知足濟之以家給身閒文之以觴詠絃歌飾之以山水風月此而不適何往而適哉茲又以重吾樂也余嘗云理世之音安以樂閒居之詩泰以適苟非理世安得閒居故集洛詩别為序引不獨記東都履道里有閒居泰適之叟亦欲知皇唐太和嵗有理世安樂之音集而序之以俟夫採詩者甲寅嵗七月十日去爾題致仕武賔客嵩山舊隱詩序顧雲賔客諱攸緒則天皇后從姪也天授中封安平郡王遷殿中監出為揚州大督府長史聖厯中棄官隱居嵩山避榮寵也想其始來捫危選勝駕回裁基鈿走伊波控隱士飲牛之渚螺排緱嶠對仙人駕鶴之峰移紫府之全模寫清都之勝槩王桃植砌董杏栽壇帳合蘿髙床平石古飛流界練貫幽響於風湍曙景張屛掛清光於露壑時或春花發盡秋雨晴初虛籟調風斜窗印月吞露華兮潄煙液而樂天和吟酒賦兮唱吟歌焉知帝力及龍圖去吕龜鼎還劉中宗皇帝方欲訪道崑巖鳴鸞茨岫遙飛鶴版親授蒲軒扣蓬藋之荒扉逺徴枚乘掃臯䕫之右席强走嚴陵莫不黃屋翹襟髙霞疊夢由是輕鷗出浦明月離雲才拜宸階旋登甲觀以公嘗棲洞府不喜塵機雖當掛珮垂紳愈若投羅觸罟及飛章上闕雪泣辭天帳祖席於青門轄仙裝於紫陌乃知飛霜匝野水雀疑作氷雀留不死之蠶烈日熒暝珠岸有不枯之草故能振清風於戚里飛逸響於雲逵宜乎與祿産分鑣夷齊結轍比夫吞腥咽腐懷祿偷安者不亦優乎今則八桂森指五芝零落立松崖而盡日不見王孫掃石壁以題詩别招逋客豈無來哲能紹𤣥蹤聊剖短章用旌髙烈時睿文英武明德至仁廣孝皇帝御宇十二嵗也龍集辛卯律中林鐘十二月丙寅題在㑹稽與京邑游好詩序造化之功東南之勝獨㑹稽知名前代詞人才子謝公之倫多所吟賞湖山青秀超絶上國羣峰接連萬水都㑹升髙而望極目所窮蒼然黯然兀然淡然先春喣然似畫似翠似水似氷似霜似鏡削玉似劍者霞布似窈窕者霜清似英絶者如是者千狀萬態綿亘數百里間則夫磐龍於泉巢鳳於山藴玉於石藏珠於澗一作淵固必有矣真駭目喪精之所也其土沃其人文雖逼閩蠻而不知疑作失禮節雖枕江海而不甚瘴疫斯焉郡邑一何勝哉將天地之樂萃於此耶至於物土所産風氣所被鳥獸草木之竒妖冶嬋娟之出前聖靈踪往哲盛事此傳記所詳不假重言也斯但粗述其勝耳僕雖乏才自侍從至此晨夕習業之外游覽所得吟詠煙月攄𣪚情志自足一時之興也亦足快哉然時或倚檻南臨回首西望相交朋逺誰與同之每思往年於京洛間見時俗之士浮淺之流多誇邑外人家有水木田園莊舍甚為竒勝可比江山嘗與俱往謂信然今在此乃知前者之悠悠妄誇耳不足聽且夫方壺員嶠桃源洞天自標真聖之居不與囂塵相接非但計幽隱巳也至於人寰所有游觀必常一作當顯敞知名若㑹稽山水深不可測髙不可及如是乃能孕靈怪藏珍寶生霞雲而盡勝槩耳豈於十畝之地朝夕之間鑿為汙池植為幽藪源流既邇根抵可知深不過藏青蛙密不過棲烏鵲而能出竒為勝哉今之君子多尚竒好事貴逹顯揚幽僻仄陋則言之而實不足徴也不然則是人能與造物爭功矣今序其事貽諸朋好知之者幸棄彼冗瑣而同此游也為通理矣輒以數篇鄙拙寄贈誠玷視聽貴盡其樂以資笑言題望春亭詩序楊䕫夫樓閣亭榭之建其名既殊其制亦異至於瞰江流跨嶺脊延親賔合歌樂晴朝月夕肆坐放懷蓋其致一也然則有以位名之者以氏名之者以且干二字疑作景後同名之者以意名之者取近而言以位名之於洪州滕王閣是也以氏名之於江州庾樓是也以且干名之者於鄂州黃鶴樓是也以意名之今見望春亭焉望之名愚知之矣或曰志其始建之時也其未然乎四時相序春實稱首春德發生德合仁也愛民之務莫先於仁仁以合天天以合仁治道盡矣意望者其在茲乎於是賦五言詩一章八句堂陽亭子詩序劉詠堂陽縣者王趙古封清彰大邑厥貢惟上其民實繁山川超絶於水經物産闐駢於地志覽髙海岸過田光春雪之言㑹出河魴動張翰秋風之思為貨泉之藪澤乃煙月之津梁者焉其東亭也地壓上流名居勝境傍依古堞下瞰平原羅物象於簷楹簇江山於左右一川風景隨青暮以長新四面煙花逐炎凉而各異至若春草碧春波青雲乍合雨初晴風揚桞花汀鷺起棹穿荷葉浦魚驚此景也桃源金谷謬得其名又若秋蓼紅秋水緑菡蓞香鳬鷗浴陌上人歌隴首詞月中魚唱江南曲此時也青草洞庭比之不足故得蘭臺俊彥蓬島神仙或因稅駕之飲競縱臨川之賞乃有扶風員外悉皆留題粉壁著詠雕梁隋珠與趙璧相鮮鳳竹共鸞絲迭奏回鏘詞律妙盡精華乃文苑之儀型實翰林之圭臬詠竊窺宗伯强述荒蕪何異對烏兔而耀螢光見珠璣而衒魚目熟知不可安忍無言輒憑藤角之花少紀蘭臺之事白沙製序徒向慕於古人渌水裁詩竟有虧於先哲遽成一絶以厠羣英者矣天祐初春月日戊寅謹序文苑英華卷七百十七
