body:
  text: 文苑英華卷十三宋李昉等編天象十三風賦一首風不鳴條賦二首瞽者告協風賦一首風過簫賦二首南風之薰賦四首風賦鄭磻隱惟兹風之興寂獨𤣥妙而無形託萬物以成象隨八卦而立名大則宇宙普洽小則纎毫必經翕翕習習清清泠泠排春樹而如動帶秋蓬而似輕所以炎清順夏徑厲隨冬入金縢而彰聖道通蘭臺而表雌雄飄玉蘂於濃草零圭葉於衰桐候吳範於帷內御列子於空中爾乃下振方輿上飛圓蓋懷壯士之適秦悅髙皇之還沛乍靃靡於衆卉時颼飀於藂籟若乃乘陵髙逈出入幽微搖寶叉於雲髻動環珮於羅衣飄遊絲以隂映舞輕雪以零飛銅烏迎而回翼胡馬聽而思歸乍來復往有聲無象驚塵則白日晝昏卷霧則珠星夜朗蕭瑟長松之下嘹唳髙樓之上送夕鼓而傳音掃晨鐘而成響出幽巷而搖拂擊華堂而清敞浸淫遷延散漫聮綿送清聲於琴上落細粉於忩前乍卷通天之霧時飄覆水之煙勃起則大木斯拔暫息則洪波肅然或動或靜時來歘失聆之兮有聞察之兮無質形乃虛無體兼散逸雖含毫而搦管豈神仙之能述風不鳴條賦以扇微和於五日之候為韻柔條之杪兮低垂和風之起兮舒遲極柔而動搖斯易至和而音響則遺習習兮便人順以巽也嫋嫋兮不紊默而識之風自南而薰條可結如線氣引容裔色搖葱蒨穆若無聞蠢然可見中林靜拂寧喧許子之瓢圓葉孤翻似動班姬之扇霽景相煦芳塵共飛條冉冉以順動風徐徐而表微蕩弱質以婀娜視之若有播清飇之溥暢聽之則希觀其谷興隧出匪徐匪疾彼條暢而無聲信木訥而可匹此焉表瑞既偶聖於萬年于以應期恆不違於五日荏苒虛徐條風相於將墜而復舉若卷而還舒契彼無言靜入桃蹊之上示諸有德潜來草偃之餘細影中糅浮光上透亦謂扇其微和豈將摧其獨秀諧清净之理助發生之候風如以諷俾聖教以無私條若以調配樂和而不奏飄以長逝翛然遂多煦大塊而爰發泛柔木而惟和髣佛兮還同轉蕙寂寥兮無撓靜柯道合知微時方太古嫋其長而輕揚合其和而不吐暗起軍營之柳取象於銜枚潜飄清廟之松同和於土鼓彼化鵬摶於九萬此至人御於十五與夫不明之道兮曽何足數第二以天下和平則如此為韻陳章風之起兮不觸而行條之應兮有動無聲察微祥於生植表靜理於承平輕搖而曉露初滴暗裊而春鳩轉鳴入楊園而若舞拂花徑而如迎寂兮寞兮自南自北其去莫止其來可測方縈仙樹萬年之影稍垂爰報聖時五日之期不忒長養資於皇化沉潜契乎𤣥德似有心於松柏之內上下依依類無言於桃李之間往來默默嫩葉隨轉柔荑共舒揚絲光於空際惹絮影於春餘聽莫得聞訝繁柯之蔑爾視之不見驚疊蕚之攢如倐自邇而通遐俄起彼而集此順八方之候若有若無調四序之宜時止則止由是輕才偃草細不揚波異秋吟之摧木同春扇於微和均習習之容寧比夫空穴而至絶蕭蕭之響誰謂其髙臺則多散漫千林翺翔九野修通匪亂於疾徐溥暢必齊其髙下含其元也亦類於人焉靜以化之乃符於王者片塵靡驚於厚地羣籟皆息於晴天對翩翩之鶡鳥任嘒嘒之鳴蟬感之深殊桂鳴於秦樹害乎物鄙禾偃於周田我國家化將時茂德與風傳佇見傾梧之後棲儀鳳於君前瞽者告協風賦以審音靜専修職知候為韻王起瞽惟審聲風實應候候至而厥風肇扇聲和而有瞽斯奏知夫天道則清泠必聞揚於王庭亦威儀可究所以贊欽若明敬授先五日而可傳信三推而不謬于時凛冽方謝溫仁始宣雜葱蘢之佳氣和郁靄之祥煙樂師乃告平野臨大田其視則惟昧其聽則惟專寧體於舞松之間得其煦嫗傾耳於偃草之際宣彼暄妍曰此融風將聞於天既而進退匪徐周旋可則逶迤於紫殿之下俯僂於丹墀之側豈無相於倀倀方鞠躬而翼翼乃進而言曰陛下以美利利四海以仁宥宥萬國調玉燭而設邦教法銅渾而立人極所以八風不姦六律無忒臣以樂吏之賤謬知君子之德先王所寶惟穀所大惟食必俟協風以候力穡順時而教導蓋國之章有聲而薦聞乃臣之職今者起幽谷拂平林蕭條注耳寂寞拂襟有薰兮動地之氣無颯然鳴條之音逹勾萌其和以布庤錢鎛其儀可尋且兢兢凛凛是微臣音之審習習飀飀彰陛下德之修固宜答休徴乘麗景躬千畝率萬井諒神倉之委積則齊宫之清净表聖時之咸若昭國典之思永皇上垂拱無為居髙聽卑察邇言悅矇瞍之告咨故實敦稼穡之宜謀盛禮度宏規豈虢公之言是則是效而周王之代不識不知風過簫賦以無為斯化有感潜應為韻范傳正風為氣兮溥暢簫在物而虛受何相㑹於自然合無情於妙有泠泠斯韻習習占久如聞松蓋之巔寧比土囊之口颯爾而至鏘然輒隨響才度已俄逺聲成文而不虧其虛其實是可披襟而納以條以暢何煩鼓腹之吹彼孔雀下降鳳凰來儀雖見美於格物豈不慚於有為彼簫之韻惟風所借或激越於清曉或凄凉於永夜寂寞之內爰生不考之音希夷之間是合不言而化謂越客乍流其遺響謂秦女遙度其仙駕散彼寥敻復於沉潜被治國之風以安以樂在敬心所感乃直乃廉動有輕重應無洪纎解愠且和可並鼓琴之唱不姦而順亦其從律之占若乃察其所感蓋有符於𤣥漠豈惟契於間淡籟之所之智之所知誠萬殊之舛錯終一貫而逶迤風從虎兮飄忽簫象鳳兮參差何體異之如彼而音同之若斯豈不以宫商所合唱和為稱類霜鐘之暗叩同灰管之潜應時然後起風匪躁求激而乃揚簫為靜勝彼鈞天之音肹蠁洞庭之樂虛無豈比風簫之感召亦由律吕之相須異搜竒於蔡笛鄙濫吹於齊竽徴顔成南郭之言浩然難究擬宋玉王褒之賦庶或同途第二同前韻夏方慶風之過兮一氣之作簫之應也衆音以殊雖髙下以異響終合散而同途體宫商而自得韻清濁以相須動必造適用當其無怡然理順昭與道俱以疑由一人之化為而不有萬物之心以虛為受帝於何力各自遂其生成天且不言乃能恆於悠久觀夫指大塊之噫氣裁衆管而聲隨始飂飂兮清越終杳杳以逶迤逺而聆之初疑白虎方嘯近而察也旋驚丹鳳來儀知化本之有朕見天籟之在斯道固無名物罔不感彼命宫而商應信陽舒而隂慘雲何事而從龍水何情而習坎故逹人作用而虛清其心大道不疵乃滌其𤣥覽之風也扇其輕重之簫也應以洪纎彼若疾而飄我則以號以噭彼若和而靜我則若沉若潜曷異夫暴心感而粗以厲敬心感而直以廉爾其斷續清空蕭寥永夜歷虛無而輕飇自逺拂松竹而幽韻相借微聞闕下伴金奏之發天庭逈徹雲中疑笙簫之隨羽駕莊生託之以齊物子綦由是而觀化化之至矣茲焉可知風乃不私其用簫亦自得其宜𤣥元立言事無事我后垂拱為無為君子曰風簫也罔疑不爭其善勝契不言而自應是將觀彼以化成豈獨因之而比興南風之薰賦以悅人阜財生物咸遂為韻張正元昔者南風和醇明德惟新創五法而配夏感萬物以如春不然者䕫何以得為典樂舜何以尊為聖人者哉其風乃周流遐裔蕩滌庶物廓宇宙以澄清屏腐餘之伊鬱故表太平之至理卑寰宇之無咈也且順而隨時曰巽氣之相感曰咸合之寧間於幽林曠野散之何啻乎萬壑千巖當其南正司辰朱明應節我風在德何以驗乎枯桑我風在仁何必候於空穴物既斯悅薰不在乎器人奚以欽物莫能同葉不在乎蘭人何以結此數句疑有顛倒知執德不回嘉祥有開始斯人之解愠倐儀鳳以爰來有孚顒若至德休哉足以成天下之務畜天下之財今國家以義為利知風之自實皇猷之穆穆因皇道之易易竹帛之功斯在絲桐之音不墜夫如是未有靈瑞之不臻生成之不遂者也寧與夫蓬振塵驚颼飀淒清或敗物者有墜或中人而喪精未若我皇內協正德外和厚生在乎野而草自偃入乎林而條不鳴是則良哉元首克洽九有仰南風兮何翕爾而純和幸得詠時康與俗阜第二同前韻吳仲舒歌南風之薰兮肇自前烈美凱風以時兮流乎俊哲淡淡蕩蕩生乎無間馥馥微微播於有截故功成作樂而上下昭著治定制禮而君臣有别吾亦乘日月之至明致中和之令節言而履之萬國稱慶動而法之千寮胥悅此所謂規模帝舜慰洽吾人操五絃之琴而八風從律徴三代之樂而六氣平均使天下霈然而有感窮海外颯爾而知春至於傳之永久垂之不朽可以動萌芽可以榮林藪薰風之有德也使國富以人安薰風之有惠也使時和而俗阜若乃燠佳氣兮允塞掃祥煙兮乍開早綻青門之栁先驚上苑之梅晦入陽春之曲潜吹玉管之灰此亦韶年之麗景况有順時而豐財或披襟而乍對或臨水而輕拂承長養則芳氣襲於一人闡煦嫗則膏露霑於萬物斯以發號施令前規後監三農以之協洽兆人以之無疑咸如此則典禮備麟鳳至吾道不樂兮發身有時薰風自南兮萬物咸遂物本無情因時而生百姓日用而不覺五音嵗兆於未萌儻髙飇之借便順下風而長鳴第三同前韻李夷亮時之和兮道之至彼南風兮舒以肆發於地鼓萬物以生成登於天叶三光而能粹豈不以律有度而感應樂無聲而大備郁郁也從四氣之攸分熙熙然見羣芳之已遂若乃涉維夏背芳晨蒸人已乂率土惟淳雲物必書識煙霞之改舊君臣有禮知動植之懷仁符𤣥化越洪鈞式觀風於我后終解愠於吾人伊昔虞帝君臨憂勞是切將納隍為已任垂大訓於前烈援琴寫操知庶政之惟和負扆居尊俾含生之是悅然後澤及幽巖九區克咸無側聲韻或疑此下脫句氣揚湮鬱四海無咈且攸叙於彜倫故無遺於一物國家敬授惟明稽古作程式宣其和以厚其生是以東作之勤不遺於帝力南風之詠屢起於皇情亹亹多士茫茫萬有猶偃草而咸若沐薰風之自久惟德斯碩惟財孔阜第四同前韻李叔至矣哉如天之君聲明化淳穆南端而作樂播薰風以養人順聖時而和則氣無留慝解吾氓之愠故物無不親所以應乎品類遍乎天地感一德而當陽處八方之正位使夫微者必扇幽者必遂不以動而有光和而能至風之始也日月貞明星辰齊平然後蕩蕩而起熙熙而生觸類而煦然長育無朕而潜來備盈行而有孚倚五絃而調四氣廣而不費匝九垓而周八紘非比夫抵華葉陵髙城轉藂蕙而渥彩合萬籟而成聲者也風之逹也本於元首播於羣有使五福富昌萬物殷阜宜其叶無為之大化匪獨革有苗之小醜亦有廣莫北動閶闔東來不如自其南而掩器一其薰而阜財則知端拱垂黻化人無拂則必合其君資其物豈惟三國不監二叔不咸徒偃其禾而表其讒故我君烈烈行道有截歌祖德而庶事用康諧舜樂而鳴琴不徹被南風之溥暢慰逺黎之胥悅士有欲摶風於九霄希假勢於一挈文苑英華卷十三
