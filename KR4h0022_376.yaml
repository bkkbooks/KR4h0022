body:
  text: 文苑英華卷三百七十六宋李昉等編雜製作中和樂九章補大戴禮祭法文一篇補周禮九夏系文一篇九夏歌九篇山書十八篇中和樂九章盧照鄰歌登封第一炎圖喪寶黃厯開璿祖武類帝宗文配天玉鑾垂日翠華陵煙東雲干呂南風入絃山稱萬嵗河慶千年金繩永結璧麗長懸歌明堂第二穆穆聖皇雍雍明堂左平右墄上圓下方調均風雨制度陰陽四窗八逹五室九房南通夏火西瞰秋霜天子臨御萬玉鏘鏘歌東軍第三遐哉廟略赫以台臣橫戈碣石倚劍浮津風兵拂籜日域清塵鳬夷復祀龍伯來賔休兵宇縣獻馘天闉斾海凱人耀一作玩輝震震歌南郊第四虔郊上帝肅事圓丘龍駕四牡鸞旗九斿鍾歌晚引紫煬髙浮日麗蒼壁雲飛外求皇之慶矣萬壽千秋歌中宮第五祥遊沙麓慶洽瑶衣黃雲晝聚白氣宵飛居中履正稟和體微儀刑赤縣演教椒闈陶鈞萬國丹青四妃河洲在詠風化攸歸歌儲宮第六波澄少海景麗前星髙禖誕聖甲觀升靈承規翠所問寢瑶庭宗儒側席問道橫經山賔皎皎國胄青青黃裳元吉邦家以寧歌諸王第七星陳帝子嶽列天孫義光帶礪象著乾坤我有明德利建倓疑存苴以茅社錫以犧樽藩屏王室翼亮堯門八才兩獻夫何足論歌公卿第八蹇蹇三事師師百寮羣龍在職振鷺盈朝豐金輝首珮玉鳴腰青蒲翼翼丹地翹翹歌雲佐漢捧日匡堯天工人代邈邈昭昭總歌第九明明天子兮聖德揚穆穆皇后兮陰化康登若木兮座明堂池濛汜兮家扶桑武化偃兮文化昌禮樂昭兮股肱良君臣已定兮永無疆顔子更生兮徒皇皇若有人兮天一方忠為衣兮信為裳餐白玉兮飲瓊芳心思荃兮路阻長補大戴禮祭法文皮日休祭法曰法施於人則祀之咎繇作帝謨為士師其道參乎舜禹不曰法施於人乎何祀典之闕哉祭法曰能禦大災則祀之堯舜之世山林蕃鳥獸暴益作虞也山林踈鳥獸鮮人民安不曰能禦大災乎何祀典之闕哉祭法曰以勞定國則祀之昔者周公輔武以寧殷亂佐成而定集作立周業制禮樂立明堂不曰以勞定國乎何祀典之闕哉如以咎繇伯益之功小於舜禹不在祀典則契為司徒而民成咎繇也冥勤其官而水死伯益也如以聖人制禮自有七廟不合列在禮典則文王以文治武王以武功周公也如皆以功烈列於民者則吾之先師仲尼邁德於百王垂化於萬代孰不若契為司徒冥勤其官也哉日休懼聖人之文將亂而墜敢參補而附之其文曰咎繇能平其法以位終益能立其功以讓禹政周公以文化仲尼以德成非此族也不在祀典補周禮九夏系文周禮鍾師掌金奏九集作凡樂事以鍾鼓奏九夏按鄭康成注云夏者大也樂之大者歌有九也九夏者皆篇名也頌之類也此歌之大者載在樂章樂崩亦從而亡是以頌不能具也嗚呼吾觀之魯頌其古也亦以久矣九夏亡者吾能頌乎夫大樂既去至音不嗣頌於古不足以補亡頌於今不足以入用庸可頌乎頌之亡者俾千古之下鄭衛之內窈窈冥冥不獨有大卷音權黃帝樂名也之一音集作章者乎九夏歌九篇王夏之歌者王出入之所奏也爣爣皎日歘麗于天厥明御舒如王出焉爣爣皎日歘入于地厥晦惟貞如王入焉出有龍旗入有珩珮勿驅勿馳惟慎惟戒出有嘉謀入有內則繄彼臣庶欽王之式王夏四章章四句肆夏之歌者尸出入之所奏也愔愔清廟儀儀衮服我尸出矣仰集作迎神之穀杳杳陰竹坎坎路鼓我式入矣得神之祜肆夏二章章四句昭夏之歌者牲出入之所奏也有鬱其鬯有儼其彛九變未作全集作金乘來之既酳既酢爰􅉧音胤小鼓爰舞象物既降全集作金乘之去昭夏二章章四句納夏之歌者四方賔客來之所奏也麟之儀儀不縶不維樂德而至如賔之娛鳯之愈愈不篝不笯樂德而至如賔之娛自筐及筥我有牢米集作醑自筐及篚我有貨幣我牢不愆我貨不匱碩碩其才有樂而止納夏四章章四句章夏之歌者臣有功之所奏也王有虎臣錫之鈇鉞征彼不憓一撲而滅王有虎臣賜集作錫之圭瓉征彼不享一虔集作烘而泮王有掌訝偵音偵爾疆里王有掌客䭡於限反飽之貌爾饔餼何以樂之金石九奏何以賜集作錫之龍旗九旒去聲章夏四章章四句齊夏之歌者夫人祭之所奏也墟墟集作墟墟皆可疑衡笄翬翬褕狄自內而外為君之則齊夏一章章四句族夏之歌者族人酌之所奏也洪源誰孕疏為江河大塊孰埏播為山嶽厥流浩漾厥勢嵯峨今君之酌慰我實多族夏二章章四句祴讀為陔夏之歌者賔醉集作歸出之所奏也禮酒既酌嘉賔既厚牘為之奏禮酒既竭嘉賔既恱應為之節禮酒既罄嘉賔既醒雅為之行牘應雅三樂器也賔醉而出奏祴夏以此三器築地為之行事也祴夏三章章三句驁夏之歌者公出入之所奏也桓桓其圭衮衮其衣出作二伯天子是毗桓桓其圭衮衮其服入作三孤國人是福驁夏二章章四句山書一十八篇并序劉蛻豫於山上著書一十八篇大不復物意茫洋乎無窮自號為山書天地之氣復則結者而為山也融者而為川也結於集作為非其所者安靜而不動融於其時者疏決以集作而忘其及二字集作反故山之性為近正川之性為革為二字集作融是以處其結者有集作為君子處其融者為利人天地之先未嘗有形故字其刑為人民為禽蟲萬物然後受其字據其形之動曰生形之靜曰死嗚呼我苟不生乎天地先而未嘗用其形竅以出納斯非混沌之似乎故吾以混沌不嘗在天地先而在我之不為萬物集無萬字鑿者而已矣壞人者天地也使其數出故觀數以象動則有爭殺亂患夫數始乎手足故離吾之指為吾視其指而心亦離則數數人乎心四字集作入矣故知指生六而為有餘生四而為不足不足與其集作有餘也為體不備嗚呼心既分身之有餘與不足也則爭殺亂患何嘗不足盡二字集作目其數出聖人重其生以榆出先濟其用故甘羶之臭出於榆末而後網罟不足於也集作野以牢養集作豢於宫中故天下忘身以自給嗚呼上古食而棄其餘集作榆熱而棄其皮亦足矣是知聖人欲化而更亂其生聽鳯鳴而吹管果象也故有象竹之聲者必有象葭之器其集作然則造其為集作鳴而耻葭學者鳯也故不世而來造其象而耻人學者聖人也故末世而不出嗚呼江河鑿而山木泣以為川既出而必伐舟也舟既入水而蛟魚相對集作市以其居泉而逺於殺者也今則造泉之具成是大道存而異其質大道亡而運集作連其禍利以觀集作勸天下利盡而天下畔道以歸天下道薄而天下去嗚呼為利物所間集作惡為道亦不偽故始愛其應者終亦將以應人然則利盡所畔者必滅其後道薄而所去者貴不殺其孤而已城郭溝池以固民也有竊城郭溝池以盜民集作氓字者則殺人甚於不固夫有竊固之具必有功集作攻固之利苟有利之物寇必生其下是以太古安民以巢故於野則無爭巢固民則相殺車服妾媵所以奉貴也然而奉天下來事貴者賤夫有車服必有雜珮有妾媵必有娛樂聖人既為之貴賤是欲鞭農父子以奉不暇雖有杵臼吾安得粟而舂之嗚呼教民以杵臼不若均民以貴賤古之弓矢所以防惡也懷惡者在內所以能避集作持弓矢也故射惡未及死而奪械可以殺人於天下天下從而禁畜私械者嗚呼古之弓矢所以防惡也今則不然反防人之持弓矢也萬物無常聲而主聲者定其悲歡則聽在心而耳職廢也謂雷為可畏則以畏聲聽之不知有時雷可長養也謂瑟為可狎則以狎聲聽之不知有時瑟可流哀集作衷也則有幽思之深砧聲之悲也去家日逺雨聲之愁也嗚呼悲愁果在心也雷與瑟無常聲也為學豈有嵗故勞於農夫以其有遇世也故佚於使人然而雖佚不妄集作忘學以其勞而未嘗運是故死而不得止集作正其心古有志者猶悲日月之易于人也故謂集作為飛烏走兔在其中付大藏之鑰未必有信之友也夫取人之鑰必薦信以入其中集作心受人之託必有情以寄其內故大信者不使人付集作信有道者不使人求棺衣之厚葬以王禮百姓不貪其死以其愛名不甚於愛身任時之重必多怨借君之權必易死是於名則君子愛身不甚於百姓焉聖人有意哉故勸善以爵使利爵者樂修夫惡殺人與殺盜鈞為仁人之心則亦召盜以爵嗚呼使聖人無意則勸善不以爵矣故君子為善不獨樂欲為一作與聖人而出是不見仁人之術使爵以召盜乎食秦人之炙則懷其妻子聞秦婦之嫁則垂涕悲其身當是時亦疑天下之妻矣吾過富貴之門則懷其爵矣及聞秦人以爵死者則垂涕悲其身當是時不顧天下之貴矣有惡雀鹿集作爵祿之甚者揮集作持帚以驅雀結罟以禁鹿夫帚罟既可以駭物則帚罟必可以取物嗚呼執其具以逐雀鹿安知不有學其具以取之故善惡去者不必惡其名善逐者不示人以其具猿鳴不過薜蘿以其有蔓蔓者必組物夫能過其組必自硋集作駭其心嗚呼髻之組吾髮也帶之組吾腰一作身也線集作線祔之之組吾衣集作身也亦是集作是不足矣今蔓在天下安得復硋集作駭其心哉文苑英華卷三百七十六
