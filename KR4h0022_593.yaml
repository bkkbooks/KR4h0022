body:
  text: 文苑英華卷五百九十四宋李昉等編謝茶藥果子綵帛附代武中丞謝新茶表三首謝賜新火及新茶表一首為田神玉謝茶表一首謝衣藥表二首謝賜廣利方表一首謝賜藥方表一首謝賜衣甲及藥物等表一首為宰相謝賜果實等表一首代武中丞謝賜柑橘表二首為武中丞謝賜櫻桃表一首謝進橙子賜茶一首為御史大夫婁師德謝賜雜綵表一首為定王謝賜錦衣表一首謝敕書及綵綾表二首為封大夫謝敕賜衣及綾綵表一首謝內宴賜錦綵器物等表一首謝賜銀器及匹帛等表一首謝恩賜錦綵綾銀器等表一首代武中丞謝新茶表劉禹錫臣某言中使某奉宣聖旨賜臣新茶一斤猥沐深恩再霑殊錫承旨慶忭省躬慙惶臣某中謝伏以貢自外方名集作物殊衆品效參藥石芳越椒蘭出自仙厨俯頒私室義同推食空荷於曲成責在素餐實慙於虛受臣無任二臣某言中使竇國晏奉宣聖旨賜臣新苶一斤猥降王人光臨私室恭承慶賜跪啓緘封臣某中謝伏以方隅入貢採擷至珍自逺貢來以新為貴捧而觀妙飲以滌煩顧蘭露而慙芳豈柘漿而齊味既榮凡口倍切丹心臣無任同前桞宗元臣某言中使竇某至奉宣聖旨賜臣新茶一斤者天眷忽臨時珍俯一作驟及捧戴忭驚以兢集作喜以惶臣某中謝臣以無能一本作惟孱庸臣謬司邦憲大明首出一作臨照非得親仰於雲霄渥澤遂一作流行忽一作遽先霑於草木况茲靈味一作品成自遐一作逺方照臨而甲拆惟新煦嫗而芬芳可襲調六氣而成美扶萬夀以效珍豈臣集作可非賤微膺此殊錫􅔷恩敢同於嘗酒滌慮方切於飲氷十四字一作感恩思效百倍恆情撫事循涯隕越無地臣不任感戴欣忭之至此篇本卷重出今已削去注異同為一作謝賜新火及新茶表武元衡臣某言中使至奉宣聖旨賜臣新茶二斤者慈澤曲臨恩波下浹光燭閭里榮加賤微驚歡失圖荷戴無力臣某中謝臣庸瑣無堪謬參風憲曠官尸祿已涉嵗年竊位妨賢心知不可陛下宏上天之私覆回白日之餘光錫貢頒榮布芳新於令節鑽燧改火燭幽昧於蓬門既荷惟新之恩更沐時珍之賜將何以仰申禆補俯效涓埃惟當焚灼丹誠激勵愚魯况先朝之恩未報陛下之澤又深省分循涯伏增隕越無任感戴屛營之至為田神玉謝茶表韓翃臣某言中使至伏奉手詔兼賜臣茶一千五百串令臣分給將士以下聖慈曲被戴荷無階臣某中謝臣智謝理戎功慙蕩寇前恩未報厚賜仍加念以炎蒸恤其暴露榮分紫笋寵降朱宫味足蠲邪助其正直香堪愈病沃以勤勞飲德相歡撫心是荷前朝饗士往典犒軍皆是循常非聞特逹顧惟荷幸忽被殊私吳主禮賢方聞置茗晉臣愛客才有分茶豈如澤被三軍仁加十乘以欣以忭感戴無階臣無任謝衣藥表張説臣某言伏奉某月日恩敕賜臣衣及藥渥流璿極綵溢旌門拜奉忭集作戴舞感戴欣越集作載欣載越臣受律虧方扞城無寄偏師不振逋寇仍滋進慙計日之功退積踰時之咎誠合歸罪司冦以壓深責豈圖天寵猥臨宸慈寬假當從褫服英華作敗非轉承且吉之衣冝肆典刑翻加有喜之藥毁車夷馬復振鑾和窮灰枯荑集作莖非重殷集作敷榮焰局影邊塞馳心闕城微命易殁集作投生成難謝無任感戴之至謝賜藥表臣某言去年某月日於右銀臺門蒙天恩引對特承慰問攝理無方以致熱疾緣在假內不敢奏聞聖慈憂軫詔使臨門伏枕在床雖體氣未適趣風拜命覺腠理遂平恩榮豈止於丘山朽質永延於龜鶴無任感戴之至謹奉表陳謝以聞謝賜廣利方表劉禹鍚臣某言中使至伏奉某月日敕書手詔賜臣元集要廣利方五卷者將吏森列黎元寂聽絲言溥及感荷德音緗帙頒開皆覩聖作臣某中謝伏惟皇帝陛下玄風御宇教以五常赤子愛人念其六疾遂長驅和扁髙視農軒刪彼繁蕪托其簡驗莫匪十全之妙不勞三代之醫况慮軫服乘療覃牛馬圓首方足畢荷亭育之恩含齒帶觡盡歸仁夀之域臣奉明詔併工繕録俾封疆之內日月俱懸雖聾瞽而必知在幽偏而亦逹臣所守有限不獲奔走闕下蹈舞彤庭無任踴躍屛營之至謝賜藥方表符載臣某言中使朱萬春至伏知聖旨念臣風疾賜臣手詔并賜御札藥方四道天使忽臨宸翰猶濕跪捧驚越不知所從臣某中謝前月九日臣飲食失冝誤為熱風所中初甚沉頓肢體不安今漸調護稍用衰退伏以微臣之疾貽陛下之憂降駟騎於雲霄出神方於禁掖循端究末味密思精補神農之闕遺蔑桐君之漏略乾坤恩重螻蟻感深將欲調和已知平愈此所謂半枯之樹遇隂陽而扶踈既涸之魚值洪波而奮迅仰天忭躍局地兢惶惟兩曜以鑒誠何百年之可報不勝感戴懇迫之至謝賜衣甲及藥物等表令狐楚臣某言中使某至伏奉敕書手詔兼賜臣衣甲器械刀斧銀器及藥物等并賜臣下軍將者賜因寄重報覺身輕蹈舞若驚載欣載躍臣某中謝臣力慙致一作毅果迹忝理戎六月之師才申國討九天之詔先布皇慈將以忠勤恤其暴露側身拜命覩物知恩念臣或抱羸疴是加藥物矜臣必摧凶醜載錫戎裝弓倍六鈞刀逾百錬衣分玄甲戰則保全器有白金食唯豪貴寵連諸將榮冠一時漢主賜人空聞寶劒宋朝頒藥但理金瘡豈如兼備五兵盡蠲萬病榮茲陋質感戴奚殫無任感恩捐軀之至為宰相謝賜果實等表孫逖臣等今日頻承賜賚纍降珍鮮飽德空深荷恩無力伏以甘果之實今則非時寧唯自逺而來固亦以少為貴當供御膳以備天厨何幸小人之腹忽辱非常之賜未施塵露空忝稻粱悚戴慙惶罔知攸措謹奉表陳謝以聞代武中丞謝賜新橘表劉禹錫臣某言中使某至奉宣聖旨賜臣新橘若干顆特降恩光猥頒慶賜珍踰百果榮比兼金臣某中謝臣伏以丹實初成包貢爰至芬馨味重方列於御筵雨露恩深忽霑於賤品感同推食事等絶甘豈惟適口為珍實冀捐軀上答臣無任感戴之至代武中丞謝賜新柑表臣某言中使某至奉宣聖旨賜臣新柑若干顆猥集作持降殊私再頒名果自逺稱貴以新為榮臣某中謝伏以果實既成南方有貴瓊茅合貢中禁為珍集無此四字方外貢來人間未覩黃苞輝影雕爼增華芬芳初佐於天庖慶賜忽霑於集作遂霑於凡口甘踰萍實剖食既同於楚謡寒比柘漿析酲何慙於漢史恩光斯重尸素彌彰誓當捐軀以申上答四句集作感恩思效倍百恆情臣無任感戴之至為武中丞謝賜櫻桃表栁宗元臣某言中使某至奉宣聖旨賜臣櫻桃若干顆者天眷特深時珍洊降寵驚里巷恩溢圓方臣某誠喜誠懼頓首頓首伏以含桃之羞時令攸貴况今採因御苑分自天厨使發九霄集繁星而積耀味調六氣承湛露而不晞盈眥而外被恩光適口而中含渥澤顧慙素食彌切自公豈徒君子所先遂厭小人之腹無任感恩喜荷集作懼之至謝進橙子賜茶表常衮臣某言中使某至奉宣恩旨以臣所進太清宫聖祖殿前橙子賜茶百串榮賚非次承命兢惶伏以陛下尊玄元於上宫本枝既盛降馨香於嘉木果實自珍常令護領之司及時採掇以進臣謬當率職正在戒期豈望皇澤之曲臨寵及下臣之私獻貪天是懼踳地戴惶無任為御史大夫婁師德謝賜雜綵表李嶠臣某言顯福門宣敕出綵八十假賜臣充軍裝臣才質駑下智能短乏謀非上略識豈中權謬奉殊私猥參大任雖鑿門之志必掃妖凶而受鉞之功未宣戎幕遽延寵命先承優賞懷恩揆拙既懼且慙唯當誓骨銘心永緘天地之施觸鋒突刃常為士卒之先庶邀犬馬之勳遂滅鯨鯢之黨七擒三捷誠所庶幾九死一生豈敢還顧無任悚戴歡欣之至謹奉表陳謝以聞為定王謝賜錦表臣攸暨言伏奉恩旨以臣昨扈遊上苑執轡還宫特賜臣瑞錦一匹臣某中謝承輝日月漸潤雲霄叨符聖慈纍延宸照遂得入陪金殿出捧玉輿瑶水參八駿之遊璿臺翊三龍之舉榮兼侍從寵冠宗枝捧日無以儷其歡登天未足儔其樂昔蟻封啓繇不迥回參乘之恩駟馬從良寧承附輿之澤在臣叨忝實邁古今徒欣不世之榮豈望非常之賜况臣地兼臣子職奉君親暫尋咫尺之途才捧神仙之馭有何殊效合降隆私陛下恩愛曲成綢繆纍洽俯回珍異猥及庸微跪開緘題伏視文彩爛若朝霞之初起曄如春花之競發成都濯具本自非儔朝鮮製衣制如難擬方且裁而學政希勉勵於天工服以晝遊庶光榮於戚里效微施廣徒益慙惶恩重命輕罔知酬答無任悚佩之至謹詣閣奉表陳謝以聞謝敕書及綵綾表李雍臣雍言內使左立真至伏奉去年五月二十日御禮慰問并賜綵綾章服跪捧天書勢在龍虎仰瞻禮物色映虹霓慙戴汗流戰懼心栗臣某中謝臣聞食曰人天實生生之厚道稱物毋得存存之多伏惟陛下載以坤輿覆以乾宇排衆口之謗開獨見之明生臣存臣至於數四寵及問及彌於再三豈魯陽宵人景日迥回照荆樹散木慶雲結隂臣是以坐有所思行冀所得求西山之藥願補聖躬論東户之人以分帝念識愚不足以廣聽事躓不足以動忠夫何望焉非所隱也豈謂塵壤見納推言不遺奬以及誠許以佳士澤深巨海德重崇丘曷云家奉賜書光華九族物延世唐諱舊褒寵百齡淥水之龜且能回首黃華之鳥將以誓心惟報主之末由恐殺身之無益不任戴荷欣躍之極謹因內使左立真附表云云二臣某言伏奉去年月日御札特賜臣章服綵綾等八體神變回龍鳯之殊姿五色暈開動雲霞之仙氣臣誠歡誠喜頓首頓首臣聞礎之潤也是足興雲戈之鋒也或能照水雖言微物有以上通常未察焉今可明矣伏惟陛下一武一文廓彌綸之道乃神乃聖疏造化之元盛業極天鴻休終古子育庶物臣伏百蠻溟渤不波沙朔無障太平之律大聖之功不得已而用之猶且增髙彌短廣大衆流録賢傾宇內之心捨過求天下之俊所以喁喁者將百身以效節區區者願一報以瀝肝况臣拔自九原出於萬死再收骸骨更造衣冠舌在不足以歌堯命存未能以報國豈謂上仁德廣澤利無益之臣博愛理深慈育不才之子天門下詔橫筆陳於長山御府賜衣列錦川於淄水臣道子道何顔受之今恩昔恩曷云報者戴天知重望日懷慙無任悚惕震惶感戴忭躍之極謹昧死遞表陳謝以聞為封大夫謝敕賜衣及綾綵表張渭臣某言中使某至奉宣敕旨賜臣衣若干事目覩絲綸手披篋笥新衣二稱虹霓間出綵綾五色鸞鶴互飛臣受鉞西門建旟北府地僻萬里天違九重豈意仁出於聖心賜出於御府白日亭午忽蒙慶雲之惠清秋屆節偏承玉露之恩負丘山而忘疲瞻闕庭而莫見臣無任謝內宴賜錦綵器物等表常衮臣某言伏奉恩旨賜臣內宴仍賜錦綵綾絹四百匹瓶盤五事衣二副并柑橘等殊常之寵上戴若驚伏惟寶應元聖文武皇帝陛下恭儉以行禮慈惠以布政式厚君臣之義爰崇饗宴之道至如醴以命宥幣以將意非有方叔之勳魯侯之親則不可以禮奉和之樂溥將之也臣以至愚承弼無益尸官夙夜自惟兢惶失次尚蒙慈恕猶辱樞銜荐沐鴻私歡承嘉惠接雲霄之上境陪勳戚於內朝宸威俯臨以戰以悚中食循省實慙孤賤微生遭逢一至於此睿眷流渥慈賞過豐廣乾坤而行慶俾下臣之受福束帛加璧申錫在於王庭珍器黃柑浹洽至於歸第拜恩初喜審分增憂臣實非才事無任效待罪已久冒榮則多况戎患未寧寅車尚駕聖懷所軫日旰忘勞躬行儉素以濟軍國臣之俸祿猶合助邊臣之服用敢安私室今又俯霑慶賞將此勞臣雖宏覆曲全務於均施而丹誠上感實愧無功不勝荷懼屏營之至謝賜銀器及匹帛等表此篇是辭賜表非謝表于邵臣某言今月日中使奉宣進上賜臣銀器壺瓶合各一銀碗一并蓋錦帳一錦九匹白熟綾十匹色羅五十匹雜綵一百三十匹者恩私荐及跪捧增慙雖雨露殊深而心魂若厲何則臣之受遇有異朝班任重元戎榮登上相自當盡瘁與國同憂豈比常人妄加厚賜况戎夷初退帑藏猶虛每欲傾家以供國用區區之願神明所知乞回此物復歸內府下以備六軍之寵賜上以奉一人之宴私臣之鄙懷於斯萬足其器物等臣已勒押衙試少監郭某詣右銀臺門别狀奉進謝賜錦綵綾銀器等表高郢臣某言伏奉恩詔以告祔禮畢賜臣錦綵一百五十匹銀碗一無庸受恩不知所措臣某中謝伏以禘祫元祀從祔大經酌禮求中聖情合於天地奉先致孝精意刑於四海臣職叨禮闈一作祔獲奉皇猷欣盛典於無窮顧微生而何補謬霑慶賜竊自慙惶無任文苑英華卷五百九十四
