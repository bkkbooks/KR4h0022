body:
  text: 文苑英華卷九百二十九宋李昉等編職官三十七縣令一益州溫江縣令任晃碑一首原州百泉縣令李楚材碑一首益州溫江縣令任君神道碑楊炯漢丞相之尊官大位乘車集作輪滿於十人齊景公之利用厚生有馬盈於千駟羽旄冠劍摐金鳴玉疊其前苑囿池臺清歌妙舞喧其後崇高在於寵祿大欲存於食貨義然後取橫玉帶以當仁道不虛行坐鹽梅而自得若乃時之不與數之不通貴賤任於天窮通由於命左太沖之詠史下寮實英俊之揚嵇叔夜之著書賤職為老莊之地雖復勢力以高下相懸尊卑以商周不敵孔宣父中都之小宰幽厲多謝於陪臣陳仲弓太邱之一官公卿有慙於縣長是以德成者上道在斯尊陶潛則安枕北窗言偃則鳴弦東武抑揚足以儀四海顧昐足以破三軍代有人焉於斯為盛集作斯為盛矣公集作君諱晃樂安博昌人也其後因官遂家蒲州之永樂天子令德軒皇為誕姓之源諸侯計功薛國在宗盟之後西京執法則有御史大夫東漢循良則有會稽都尉任光鄉里之忠厚任隗朝臣之鯁直益州按華陽志任文公智士仕益州英華作淮陽非從事術數知名臨海真人清貞克己况乎東西海岱強齊九合之都表裏山河全晉三分之國車馬雷駭衣冠鼎盛盟書百代可謂功臣遷徙丘陵實惟豪族曽祖顯祖熙考憬並䇿名天爵獨步人師懷素履之幽貞保黃裳之元吉張家碑碣荆州有七代孝廉荀氏鄉亭頴川有八人才子君外資剛健內育文明合千載聖賢之間鍾五行金木之秀王恭濯濯春栁懷風和嶠森森寒松列集作例景有曽孫之孝有史魚之直有子夏之文有冉求之藝先王德行固名言而在兹大聖溫良亦顛沛而於是當朝一見許其王佐之才行路相逢知集作加其美人之贈解褐為家令寺主簿天王太子之位赫赫前星天地長男之宫嚴嚴集作岩岩左闕出身事主元良永固於萬邦束髮登朝七鬯不驚於百里秩滿授將作監主簿千門萬戶張華窮壯麗之圖東主西賓班固致集作盡謳謡之實一作致職集作實掌宫觀是名將作大司馬桓溫之府績用在於元琳大將軍竇憲之曹文章寄於亭伯纍遷右衛長史南京左掖上將陪藩北落師門天軍列衛東觀漢記梁統有清白之名中興晉書薛兼有恪勤之譽詔遷朝散大夫行益州溫江縣令華陽西極漢水東流背面通秦越之鄉左右夾巴涼之地風煙可接懸車束馬之山雲物潛通織女牽牛之象神仙所宅則有二十四居途路所經則有五千餘里金城石郭還聞上代之風國富人安時聽中和之樂於是乎龍泉獨斷龜旐旁求品命千名封疆萬户暫過云亭乘軒之望可知且詣中軍理劇之才有屬旌孝悌勤農桑省徭役存鰥寡所以一縣稱平所以百城尤最蕭育是杜陵男子不入後曹黃浮非鄉里所知不寬同嵗洛陽行馬門士無心齊國池魚權家絶望鄭文公邵陵之縣但稱男子之名師尚父灌檀之鄉唯有神人之哭實謂樞機八座上下三階豈惟縛柱鞭絲操刀製錦巫馬期之任力弊起集作因乘星鍾離意之悅人災生解土享年五十有九以鳯儀二年六月二十五日卒於官第夫人姚氏徵士神人之女也夀邱仙葉媯水靈苗定姚信之機衡審姚光之術藝明星𦦨𦦨不臨太邱之前暮雨沉沉不散巫山之曲婦人謂嫁曰歸集無此二字女子有行織絍組紃棗修榛栗南斗千齡之匣忽愴沉江北方三代之儀終悲共穴先以咸亨三年七月二日終西京翊善里之私第越儀鳳三年冬十一月一日集有作字歸祔於永樂縣歷山之平原卜虞芮之間田帶關河之設險居人致祭同漢書作鄉有朱邑之祠怪力成墳葉縣有王喬之墓君燕趙奇士神仙中人容貌魁梧衣冠甚偉揚子雲之窮巷好事來逰段干木之間居通侯展敬自陳力就列居家可移妾本絶於織蒲馬無聞於食粟原子思之厚秩遍給鄉人孔文舉之中樽延留坐客加以遍集作備觀國史尤精釋教夢幻泡電知一切之皆空園林貨財見三陽集作揚之己淨遭時集作時命屯坎浮生蹇剝佳人不再荀奉倩之傷神赤子無期潘安仁之慘慟天乎到此命也如何及其瞑目少城歸懷舊壤平原古樹唯餘孺子之墳春露秋霜非復臯繇之祀於是鄉鄰作主朋友加麻撰德銘之於素表集作常披文刻之於翠石魯哀公作仲尼之誄天不憗遺蔡伯喈為有道之碑人無愧色其銘曰軒帝之族漢朝之臣西州智士東海真人豪傑天縱衣冠日新實生其德必有其鄰道在為貴知機則神氣衝南斗價直西秦大蒙集作象非之信太平之仁辨窮非馬學究成麟孝友為政觀光利賓重朋比德少海為春宫室之象南斗集作端北辰甲兵之衛閶闔鈎陳山控金馬江回玉輪天文井絡地紀梁岷庭前置水甑內生塵園蠶有繭集作續野雉來馴時命屯蹇生涯苦辛實敘虛集作靈贈玉樹長淪厚集作輔德無輔清集作親仁不親百年夭枉集作性一旦歸真雷鳴之下長河之濱旌旃委鬱徒御逡巡悲風四起血下霑巾死而可贖人百其身原州百泉縣令李君神道碑前人金城裂地之災玉弩驚天之禍蹴崑崙以西倒踏泰山而東覆三微厯數盡薰歇以聲一作星非沉萬國衣裳咸土崩而瓦散是故殷憂啓聖聖人騰海嶽之符草昧興王王者受風雷之趾集作祉則有思窮圖讖潛觀赤伏之萌識洞機祥暗察黃星之兆天懸兩日詢去就於河宗地震三州考興亡於柱史危邦不入亂邦不居剪荆棘而叩天門臨壇場而對休命及其玄黃再造日月重輪功成而不居名遂而身退南華吾師也親居賤職東方達人也安乎卑位然後武城絃唱優遊禮樂之中彭澤琴樽散誕羲皇之表雖杜當陽之文武蘭菊猶集作恆存而薛孟嘗之池臺風煙遂歇悲夫死生命也貴賤時也用之則行舍之則藏出處者君子之恆務左右之攸宜吾聞其語矣今見其人也君諱楚材衛州衛縣人也昔繞樞神電軒轅氏之馭百靈貫月祥星顓頊氏之臨四海金科作範商邱有帝系之雲玉扎披圖幽谷有真人之氣由是公侯策命歷千載而彌昌鐘鼎歡娛經百王而不替豈直將軍列位孫吳暗合之兵協律當官天地冥符之樂若斯而已矣曽祖裕後魏東宫舍人太子洗馬使持節徐州諸軍事徐州刺史燉煌郡開國公贈兖豫二州刺史真城西望高闕東臨非無置驛之歡實有前軍之寵琅琊負海八門都督之榮王彰頴河百代封侯之貴大父昌北齊彭城王府中兵參軍事隋濟隂郡丞襲封燉煌公文場筆海照爛等於星辰班囿談叢鏗鏘叶於風雅九千里之丹鳳始踐王門七十日之黃龍初階郡職考孝友隋晉州嶽陽縣令顔回稱太平王佐一作佐王月角殊姿仲由稱禮義霸臣星一作奇衡詭狀唐都晉野有恆山太嶽之風墨綬銅章有錯節盤根之化若夫于公之宅駟馬爭驅辛氏之門五龍齊駕英靈不已還當命代之期將有後徵集作物相有徵克保承家之業東郊競日探祕迹於機衡西蜀談玄測靈心於造化雄才壯思首九奏而和八音殫一作廣見洽聞披五車而接集作誦三篋加以興居禮樂出入孝忠簡於一人備於萬物弓旌疊湊始命賢良幣帛交馳載徵巖穴從微至著濫觴萌括地之波積小成高覆簣漸排雲之搆隋大業十二年補謁靈集作者臺散從員外郎非其好也屬千三否運百六災年諸侯窺王鼎之尊天子厭金陵之氣蚩尤則命風召雨桀黠於中州共工則折柱傾維崩騰於海縣能扶天下之危者必據天下之安能除天下之憂者必享天下之樂我高祖神堯皇帝所以從人望宅靈心鎮集作振天關回地軸鼓聲雷駭親張霹靂之威旗羽星懸手握招搖之柄君沖情索隱妙算知來候東井而考前聞裂西河而尊故事扶三略之奇謀藴六韜之祕訣集作上略中略奏山石之奇謀文韜武韜奉川璜之祕訣義寧二年授車騎將軍纍加開府武德五年遷右衛二十四府右車騎將軍仍於卭集作𢎞州鎮守皇階甫闢猶勞尉候之虛集作靈天步初夷尚有風塵之警示之以文德陳之以武功所以夜集作外戶不扄所以重門罷柝六年轉中山府左列南州集作巴舊俗淫其白獸之祠西棘餘氓背我黃龍之約王師直進陵劍棧以長驅廟略遐宣指銅邱而決勝七年詔君討襲楓天棗地金門玉帳之營方卦圓蓍剡木弦弓之射以此衆戰誰能敵之以此攻城何城不克雷出而星曜龍騰而鳳飛一鼓而擒四姓三戰而平百濮大夫耆老非唯二十七人拓土開疆豈直五千餘里返行飲至捨爵策勳焉禮也其年加上大將軍賞口十六人并良馬一匹而俄以爭功得罪遊俠從君集作居特降王綸遐遷滕府通塞有命潘安仁之緒言富貴在天卜子夏之餘論無諧集作階封禪空歎息於周南絶望夏集作靈臺竟棲遲於漢北太宗文武聖皇帝承聖皇之大寶奉天帝之休期雷雨八瀛光華四極旌賢赦過惟新之命屢覃念功簡勞惟舊之恩纍洽貞觀元年授長樂監仍命集作令於北門供奉宜春禁苑太液神池浸石菌而揚波擢金莖而挹露南經丹徼恆陪萬乘之逰北統集作㳘黃山再奉三驅之禮當是時也穆穆焉煌煌焉濟濟焉鏘鏘焉一隂一陽而有序自南自北而無外猶復中宵不寐殷勤多士之林昃景忘疲渙汗非常之辟十四年應詔四科舉射策登甲第明於國家之大體達於人事之始終可謂宰相之璞集作朝宰之璞可謂皇居之寶漢朝集作洛陽才子承宣室之談魯國儒士行踐中都之邑尋授靈州鳴沙縣令纍遷原州百泉縣令科通紫徼却負黃州涼秋九月寒沙四面平雲匝隴處處而秋集作愁隂圓魄低開蒼蒼而夜色君乘輜演教佩紱臨人德被三城風移五縣抽琴命操還臨單父之堂擊石飛鳴集作聲即對李泉之學明以御下將水鏡而通輝清以立身共氷壺而合照神行有感方登玉鉉之階靈化無方獨歎瓊棺之墓春秋七十有一以顯慶元年十二月八日終於官舍君年十一丁闕艱朋友相哀家人不識昔稱曽閔今日荀何近古以來未之有也隋郡東曹掾江溢見而歎曰此真可謂保家緯化嗟尚者久之大業末年皇綱漸紊不掃一室自懷包括之心獨守太玄且忘名利之境于時魏特進房僕射杜相州等並以江海相期煙霞相許付同心之雅會訖刎頸之良逰或閉户讀書纍月不出或登山涉水經日忘歸斯賢達之素交蓋千年之集作而一遇洎塵埋五嶽海沒三山辭殷而奉周背楚而歸漢深謀逺慮即良平無以加也行軍用兵則韓彭不能尚也數奇命蹇一作舛遂無望於高門日往月來竟消聲於下邑情均寵辱則萬象同歸迹混彭殤則百齡俱盡浮生若寄大漸彌留遺誨子孫庶幾薄葬等梁鴻之宅兆邈矣他鄉符祭仲之高居依然新鄭唯仁與達君其有焉存榮歿哀此之謂也即以某年月日葬於某原夫人廣平宋氏齊尚書左丞士順之曽孫隋建安郡司法長文之季女霜凄月瑩菊艷苕華淑問秀於閨房柔風洽於詩禮琴前鏡裏孤鸞别鶴之哀竹死城崩杞婦孀娥之泣集作湘妃之怨長子金河府校尉上柱國輔仁等十輪方駕萬石駢衡窺上帝之兵鈴入先王之册府指蒼天而永訴血不霑襟對白日以長號悲來填臆於是緦麻執友素蓋賓朋傳祖德於高陽考豐碑於太學庶使城隍一變猶知鄧文之名陵谷三遷尚識鍾繇之字其銘集作詞曰玉斗之英瑶光之精巡河并洛握紀提衡柱史論道將軍用兵陸離簮紱奕葉公卿嶽牧騰譽弦歌有聲階蘭疊影巖桂增榮山澤通氣風雲表靈凝脂點漆月角珠庭白玉無玷黃金滿籝忠為令德孝實天經朋友千里煙霞百闕琴樽野尚松竹山情數屬郡海時逢􅂒星黃龍電震白騎雷驚赫矣高祖元亨利貞聖人有作天下文明自北提劍因兹間行攀鱗北海附翼南溟水火之陳孤虛之營左提右挈東討西征巨猾斯斬元凶載清功符衛霍思若良平自滿知集作人損居中忌盈蕭條異縣坎壈浮生降以中旨賓於上京陳書詣闕對問揚庭山連雁塞野接龍坰期月而已三年有成波瀾不息箭刻無停梁木其壞高臺已傾關雲斷絶隴鴈飛鳴頓雙鳬於葉縣局四馬於滕城文苑英華卷九百二十九
