body:
  text: 文苑英華巻八百二十宋李昉等編釋氏四經下蘇州南禪院千佛堂轉輪經藏石記一首廬州明教寺轉闗經藏記一首塔浮圖附故中岳越禪師塔記一首牛頭山第一祖融大師新塔記一首西川鸚鵡舎利塔記一首滑州明福寺新修浮圖記一首石柱石階附上元縣開善寺修誌公和尚堂石柱記一首新興寺佛殿石階記一首經下蘓州南禪院千佛堂轉輪經藏石記白居易千佛堂轉輪經藏者先是郡集有太字守居易發心蜀沙門清閑挾集作矢謨吴僧常敬𢎞正神益等僝功檀集作商主鄧子成梁華一有曹公政王集周順七字等施財院僧法𢎞一作供惠滿契元惠雅等蕆事太和二年秋作開成元年春成堂之費計緍萬藏與經之費計緍三千六百堂之中上蓋下藏藏蓋之間轉九層佛千龕綵繪金碧以為飾環藏蓋懸鏡六十有二藏八面面二門丹漆銅鍇以為固環藏敦集作敷座六十有四藏之内轉以輪止以柅經函二百五十有六經巻闕千五十有八南閆浮提内大小乗經凡八萬四千巻按唐開元經録名數與此藏同於閆浮大數二十之一也耶藏成經具之明年蘇之緇集有白字徒聚謀曰今之集無之字功徳如是誰其尸之宜請有福智僧越之妙喜寺長老遂禪師為之主宜初發心人前本郡守白少傅為之記僉曰然遂集作師既来教行如流僧至如歸供施達襯隨日而集堂有羡食路無饑僧遊者學者得以安給惠利饒益不可思量既而遂隨縁西去又請本郡乾元寺禪僧徳暉大師嗣之暉既至集無此二十五字師又日與苾芻徒集作衆升堂焚香合十指禮于佛然後啓藏發函鳴犍椎唱伽陁受持諷誦十二部經經聲洋洋充滿虚空上下逺近有情識者法音所及無不䝉福法力所攝鮮不歸心佻然吴集作巽風一變至道所得功徳不自覺知繇是而言是堂是藏是經之用信有以表旌覺路也脂轄法輪也示火宅長者集有子字之便門也開毛道凡夫之大竇也亶其然乎亶其然乎集不疊此四字又明年院之僧徒三詣洛都請予為記夫記者不唯紀年月述作為亦在乎辨興廢示勸誡也我釋迦如来有言一切佛及一切經集作法皆從何集作經出然則法依於經經依於藏藏依於堂若堂壊則藏廢藏廢則經墜經墜則法隐法隠則無上之道幾乎息矣鳴呼凡我國土宰官支提上首暨摩摩帝軰得不䖍奉而䕶念之乎得不保持而増修之乎經有缺必補藏有隙必葺堂有壊必支若然者真佛弟子得福無量反是者非佛弟子得罪如律開成四年二月二日記廬州明教寺轉關經藏記譚銖大唐咸通庚寅嵗廬之佛寺曰明教有禪那僧文珦創轉關經藏成命銖記其事銖常奉釋氏因録其義以喻之曰經曰佛滅度後像法存焉夫像似也俾迷者覩其像得其意乃曰經心也藏藏也如心之含藏萬法者也故曰一心生萬法萬法由一心其動静弛張在我而寜窮其義畧舉其大斯藏也本於一心圓通無礙動用自在静則萬法空寂動則三界彌綸虚偽惟心所造作其在斯乎周迴八角角覺也佛以眼為八邪耳為八患鼻為八苦舌為八難迴八邪為八覺迴八患為八解脫迴八苦為八安樂迴八難為八王子指四八為三十二相由此八關返邪歸正成佛之境矣止則寂然無用引則轉而不窮動雖有聲静乃無跡以此現相俾人歸依知佛之心體道之要使迷徒瞻禮自識根源移於身心可見㣲宻迷者若悟知三乗妙㫖未脫輪迴一法正宗不離真性性而非性真何所真乃知三界本空十方如一相而無相知何所知始當一作嘗語言道斷心行路滅其藏貯修多羅教千軸募金數長者禪那弟子蘄州長史殿中侍御史上柱國王師貞將一作特力營構果獲成就噫已丑嵗屬徐方兵亂援軍屯集雖存根本幾失䕶持今則色相端嚴典教漸備所表法輪常轉心不動摇畧諭因縁以示道俗云耳讚曰修多羅教函于藏輪周迴八角正道斯陳動用一心為萬法因忘因無法得本歸真鐫于金石用導迷人塔浮圖附故中岳越禪師塔記李華智之深者反照仁之大者無思反照而萬物一作類同明無思而一切咸寂真如住乎無住妙有生乎不生惟禪師至其極也禪師法號常超發定光於大照大師垂惠用於聖善和尚證無得於敬受闍黎司徒郭公舉為東京大徳御史中丞鄭公表敷教於闕乃沿漢至黄鶴磯州長候途四軰瞻繞請主大雲寺闕醉願霑醒藥於是以梵網地還其本源楞伽法門照闕真性荆越之俗五都僑人有度者矣寳應闕年暮春闕之一日證滅于禪居縗杖百千江哀山悴凡入諸佛闕位二十九夏存父母遺體五十九年門人寳藏熈怡等闕棒香㲲建塔東岡遵像法也禪師滄州人姚姓靈和應闕海闕弱嵗齒于儒者既而捨孔氏之經為釋門之𦙍聞西河攝䕶第一乃往從師次諸嵩潁服勤上法理妙詞簡神凝道深蓋六度之龜麟人天之海岳也嗟夫雨寳之珠伏於泥下燎原之火隠在木中開示有期繼生宗範摩訶逹摩以智月開瞽法雷破聾七葉至大照大師門人承囑累者曰聖善和尚環注源流含靈福備乃灌其頂龍象如林及安史逆天兩京淪翳諸長老奉持心印散在羣方大怖之中人獲依怙則不言之闕為之益廣矣大矣覺之正之黙茲闕照不為深乎弟子司封員外郎趙郡李華泣舉雙林敬表仁㫖時廣徳二年正月六日牛頭山第一祖融大師新塔記劉禹錫初摩訶迦葉受佛心印得其人而傳之至師子比丘凡二十五葉而逹摩得焉東来中華華人奉之為第一祖又三傳至雙峯信公雙峯廣其道而岐之一為東山宗能秀寂其後也一為牛頭宗嚴持威鶴林徑山其後也分慈氏之一支為如来之别子咸有祖稱粲然貫珠大師號法融姓韋氏延陵人少為儒博極羣書既而嘆曰此仁誼言耳吾志求出世間法遂入句曲依僧炅改逢掖而緇之徙居是山宴坐石室以慧力感通故旱麓泉涌以神功示現故皓雪蓮生巨蛇摧伏羣鹿聴法貞觀中雙峯過江望牛頭頓錫曰此山有道氣宜有得之者乃東果與大師相遇性合神契集作授至于無言同躋智地宻付真印掲立江左名聞九圍學徒百千如水歸海由其門而為天人師者皆脉分焉顯慶二年報身示滅道在後覺神依故山戒香不絶龕座未飾夫豈不思乎蓋神期真數必有所待太和三年潤州牧浙江西道觀察使檢校禮部尚書趙郡李公在鎮三閏百為大備尚禮信古儒𤣥交修始下令禁桑門販儒佛以眩人者而於真實相深達焉嘗謂大師像設宜從本教言自我啓因自我成乃召主吏籍我月入得緡錢二十萬俾秣陵令如符經營之三月甲子新塔成事嚴而工人盡藝誠逹而山神求䕶願力既從衆心知歸撞鐘告白一作畢龍象大㑹諸天聲香之藴如見如聞即生相敬明幽同感尚書欲傳信于後逺命愚志集作智非之夫上士解空而離相中士著空而嫉有不因相何以示覺不由有何以悟無彼逹真諦而得中道者當知為而不有賢乎以不修為無為也西川鸚鵡舎利塔記韋臯元精以五氣授萬類雖鱗介羽毛必有感清英淳一作純粹者矣或炳燿離火或禀竒蒼精皆應乎人文以奉若時政則有革彼禽類習乎能言了空相於不念留真骨於巳斃殆非元聖示現感於人心同夫異縁用一真化前嵗有獻鸚鵡鳥者曰此鳥聲容可觀音中華夏有河東裴氏者志樂金仙之道聞西方有珍禽羣嬉和鳴演暢法音以此鳥名載梵經智殊常類意佛身所化常狎而敬之始告以六齋之禁比及辰後非時之食終夕不視固可以矯激流俗端嚴梵倫或教以持佛名號者一有曰字當由有念以至無念則仰首奮翼若承若一作善聽其後或俾之念佛則黙然而不答或謂之不念即唱言阿彌陀佛一無佛字歴試如一曽無爽異余謂其以有念為縁生以無念為真際縁生不答一有以字為縁起也真際雖言言本空也每虚室或一作戒曙發和雅音穆如笙竽静皷天風下上其音一本有其音成文四字念念相續聞之者莫不洗然而嘉善矣於戲生有辰乎縁有一作其盡乎以今年七月悴而不懌已日而甚馴養者知其一無此字將盡乃鳴磬告曰將西歸乎為爾擊磬爾其存念每一擊磬一稱彌陀佛洎十擊磬而十念成歛羽一作翼委足不震不仆奄然而絶按釋典十念成往生西方又云得佛惠者歿有舎利知其説者固不隔於殊類哉遂命火以闍維之法焚之餘燼之末果有舎利十餘粒炯爾燿目瑩然在掌識者驚視聞者駭聽咸曰苟可以誘迷利世安往而非菩薩之化歟時有髙僧慧觀常詣三學山廵禮聖迹聞說此鳥一作身非涕淚悲泣請以舎利於靈山用陶甓建塔旌其異也余謂此禽存而由道没有明一作而有徴古之所以通聖賢一作至聖階至化者女媧蛇軀以嗣帝中衍鳥身而建侯紀乎䇿書其誰曰語恠而况此鳥有𢎞於道流聖證昭昭胡可黙已是用不愧直書于辭貞元十九年八月十四日檢校司徒兼中書令成都尹南康郡王韋臯記一作皆唐文粹滑州明福寺新修浮圖記白敏中唐乙巳嵗帝命司空隴西公作藩于滑公既至問甲士以安問文吏以理問黎人之疾苦翊月之後既安且理而無疾苦明年夏五月暇日公與監軍軍倅賔介遊于佛寺寺號明福因詢明福之義有僧定俊曰冥報記云隋開皇年中滑人杜明福妻齊氏嘗讀法華經沒後為崔氏男子名彦武至仁夀四年崔年三十為滑守一日了然通前生事顧謂從者曰吾昔為此郡人婦今知家處因乗馬抵闕入修巷指門而呼杜一本疊杜字非氏明福老矣疾出拜迎崔入門先昇堂指東壁圬墁之隆處謂明福曰吾昔所持經巻金釵藏於此七巻末紙火爇字滅今每念至此常不終巻因壊垣果得經并釵其末爇處咸如説復指庭前樹曰吾常斷髪寘諸穴中取之又得明福殆不勝情云皆亡室之所遺記也比計物故之日及生之年畧無差焉噫靈驗應兆既如彼存没契㑹又如此感嘆乆之遂請施宅為寺崔即日為之上言請置寺因號明福由是起殿中虚屋周廊四迴前三其門庭二其臺架危樓以聲鐘植修莖以飛旛界宇峻嚴宛如鷲山于茲三百有餘年矣公異其事惜無銘記遂勒石以載既而出家財修浮圖賈彼餘力因其隙時人樂就役物無枉耗越七月浮圖成峻層孤危髙無有倫壓地貫天泉縮日低鐵輪周廽風鐸四鳴軍城用為壯觀公命敏中援筆以記敏中蹶然而起曰釋氏之教其来乆矣漢魏以䧏復煽而熾其教以禪定慈忍報應齋戒為事亦以是誘掖人心輔助王化何者先王恭黙無為之道乃禪定乎忠恕惻憫之訓乃慈忍乎懲惡勸善之法乃報應乎防慾閑邪之禮乃齋戒乎分其教而則殊歸於禮疑而何異子不語恠力亂神惡其人之惑也今崔氏之應足彰福善之理焉可同恠神乎故得直而書之無愧詞於戲公不至寺誰表其異寺不值公誰為之記時也皇帝之代寳厯二祀白露之秋八月癸未因其異而致其施施乎弛而増其圯後之人兮知我公修浮圖之義石柱石階附上元縣開善寺修誌公和尚堂石柱記李顧行蓋六度為萬行之本施檀其一焉然以不住相而為者其用大不希福而捨者其道𢎞故我亷察使御史大夫贊皇公是以有法財之施焉亦猶真諦無像因像以教立至人無功由功而用顯誌公和尚者實觀音大士之分形者歟然跡見於近代梁書具載其事夫妙覺本寂法身圖一作圓應羣品而必呈觀衆生而常度故利見則洪鍾待扣感畢乃慈航息運初誌公之未遷滅也梁武帝命工人審像而刻之相好無遺儼然若對建窣堵波於金陵之開善寺聖功冥化歴代瞻敬人欽其神者二百餘祀公乃具綵舟設旛蓋而迎至則置於㕔事西偏方丈之净室每旦散名花爇靈香時復膳百味皷八音以展誠敬以申供養公曰觀其寂然不動契定惠於真宗杜口無言若息心於了義夫色相如影則遺像與全身不殊文字性空則言語與寂黙一作㓕奚異吾知之矣吾得之矣亦既觀相爰歸本寺幢幡贊唄如始至焉公乃減清俸解上服命修珠帳飾花座因陀之罔疑如懸上帝之寳咸在其餘則置膏腴之田以供香火之用所以崇像設顯靈蹤𢎞有為之教俾䝉昏之類永有所依歸僧徒等欲昭示於後以圖不朽請刻石以紀事小子承命而述焉長慶四年三月十一日記新興寺佛殿石階記釋清越十三年秋嗣天子用舊制安天下釋像明年二月茲寺鉅殿石砌果而成功維持冠祠刹闕貌踞極敞午户比其在階陛一作陞得無堅强耶始台傑河東公定而崇之巖然峻峙既像素壁繪座嚴侍列中瞻闕千一煥若乃丹其甍乃赭其楹林池谷壑煜爚煇變遂以修甓務周其功不六七年號一作罅張蔓植圯缺太半盱者傷目咸不為然始十年秋徒聚文議以為祗敬有本不類他構言其石也於器堅永能百千萬嵗天地日月而終始者餘無如之因擇其善俾化于俗鳩贐悉偳一作偏易而牢之寺有耆徳惟恭行苦心真函欲俾壯唯竢勝樂聞其善犁晨遽征詢導之俗雖祈寒暑燠衣壊履一作屐穿不暇修歇晝思夕慮唯殿之陛如是凡五年而完之其為利則深矣為功則永矣信夫根斯而施也覧羣施而無儔焉故始未之知人多不與殆知之則梟生師内萬一作方室皆空艱於化縁肯棨一作綮難就不有勁志孰能修一作終之具疑不固其根不理其源豈高棟大廡徒得輙而䖏之耶抑初召工選石他嶠内懐糾纒不䛖一作洩於抱及就礱琢曲折勢狀自新于心目皆竒之陛級鏤飾若本天匠則隂沴浸徴陽火蒸鑠信無變泐以隳其初余謂庶幾乎既而甓翼廊楯前廡材石交結硎鐵好上符稱氣増名藍繇是賔車日来僉共嗟敬舉極樂者又何云乎噫大道汨而像設見彼硜硜然不知所歸及不以茲耶一作郡非其或嘻嘻族居不能以毫益豈慈聖之徒耶必為而忘之神不茲泥則遊外者亦何以誚余謂後五百嵗嗣佛子作佛事知恭者人無間然大中十四年二月二十一日敬亭僧清越記文苑英華巻八百二十
