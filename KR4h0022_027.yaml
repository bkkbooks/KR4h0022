body:
  text: 文苑英華卷二十七宋李昉等編地類三小山賦一首奉和御製小山賦一首掖庭山賦一首西嶽望幸賦一首小山賦唐太宗見初學記何四序之交運轉三陽之暮時風辭暄而入暑樹替錦而成帷想蓬瀛兮靡覿望崑閬兮難期抗微山於綺砌橫促嶺於丹墀啓一圍而建址崇數尺以成岯既無秀峙之勢本乏雲霞之資承墜宇之殘露挂低空之斷絲爾乃參差絶巘葳紆短徑風暫下而將飄煙才髙而不暝寸中孤嶂連還斷尺裏重巒欹復正岫帶栁而合雙眉石澄流兮分兩鏡爾其移芳植秀擢幹抽一作芟莖松新翠薄桂小丹輕細影雜兮俱亂弱勢交兮共縈才有力以勝蝶本無心而引鶯半葉舒而巖暗一花散而峯明何纎微之同景亦卑細以相成於是換浮歡於沉思賞輕仁當作隂於勝地俯蟻垤而有餘仰終南而多愧非為固於九折庶無虧於一簣聊夕玩而朝臨足攄懷而蕩志奉和御製小山賦充容徐氏惟聖皇之馭宇鑒敗德於前規裁廣知以從狹抑髙心而就卑懼逸情之有泰欣靜慮於無為于時季春移序初光入暑露溽池臺煙霏林籞睿情悒以無歡懷仁智而延佇思寓賞以登臨非騁麗於茅宇殊華嶽之削成異羅浮之移所爾其表玩宸衷故作離宫含仁自下帶嶮非崇分上林之卉木點重巒之翠紅葉新抽而不樹花散植而無藂雜當忩之帶栁交約砌之圭桐纎塵集兮朝嶺峻宵露晞兮夕澗空影促圓峯三寸日聲低疊嶂一尋風風輕兮拂蘭蕙日斜兮蔭階砌蝶留粉於巖端蜂尋香於嶺際草臨波而側影石瑩流而倒勢雖蓬瀛之藴竒故未留於神睇彼崑閬之稱美詎有述於天製豈若數簣之形託於掖一作彤庭俯依丹檻仰昧疑作映朱楹恥巖崖之鄙薄荷眺矚之恩榮期保終於一國奉天眷於千齡掖庭山賦應詔許敬宗覽先哲之英華逰舊典之場圃善逾逺而斯應德既昭而必溥見漢屏於睢陽驗周藩於有魯表商丘而作鎮規楚室而興宇亦何代其無人諒吾王之邁古於是命世作弼含章挺英允文允武惟誠惟明聼甘棠之暇隟想叢桂之幽情瞰浮雲而志逺瑩寒井而神清乃命僕夫整駕山隅勝一作騰鳴笳於通谷擁飛蓋於髙衢逍遙仁智之境放曠道德之區造中天而式宴陵倒景而為娛星懸珠網日對金鋪雲承綺棟霓縈繡櫨既而近矚玲瓏逺眺溟濛隔翠微而半顯厯丹穴而才通等玉京之仙化侔銀闕之神功于時百卉敷榮六合清朗霞淡水而川媚風飄林而澗響聳絶壁之千尋挂懸流之萬丈蔽日月而孤峙吐雲霓而秀上循折坂而邅回躡危嶠而來往鑿離暉於石鏡法瑞露於雲掌爾其花藥芬披蹊徑參差舒英冒渚擢幹臨崖乍莽蒼而橫植忽葑茸而倒垂扇晨飇而裊裊含宿霧而猗猗蔭町疃之毛羣哢間關之羽族或相賀於甍棟或競馳於原陸駒食藿而馴場鶯含桃而出谷德澤加於飛走榮光周於草木日云暮時稍闌暢神襟而體物紀盛迹以濡翰發詞林之華藻㵼筆海之波瀾命小臣而並作賦大雅而承歡辭曰芳園兮鬱鬱髙岫兮峩峩君王兮逰豫軒蓋兮經過花同林兮異彩鳥各囀兮相和野獸鳴兮應鍾石山英開兮間綺羅侍荆臺之入夢舞洛汭之陵波懸清暉於日月同眉夀於山河西嶽望幸賦閻隨侯壯哉太華兮為金方之鎮削成四面壁立千仭勢厄河關兮橫地以傑出氣雄宇宙兮極天而增峻疏鑿則禹封崇則舜厯選列辟咸五載而一巡於昭有唐曷不登以肆覲我聖君之開元一十八載威靈限乎無外至德與日月齊明寶位與乾坤比大鴻澤洋溢湛恩滂沛萬國同於文軌百蠻襲於冠帶河海清夷風雲昭泰鬼神奔走而奉職玉帛梯航而入會蕩蕩乎巍巍乎誠聖人之神用也美不可得而稱載至若祖武宗文之業觀風問俗之勤舉由禮兮動為仁禔百福兮延羣神無文之典咸秩中和之政惟醇邦國之鴻徽克播帝王之盛事畢陳若乃詩書禮義之府禮樂典章之則設金馬石渠之署修成均崇文之職坐公卿以論道養更老而崇德詢善而當寧委裘禮賢而日旰忘食振木鐸而施令正銅儀而御極歌舞盡盛德之容聲眀彰具物之飾此聖人之文教也先王剡木為矢弦木為弧所以修戎器戒不虞於是簡車徒誓將帥百官象物而動軍政不戒而備重之以三令五申示之以戎昭果毅正卒伍駢部位鵝鸛魚麗兮鴈行鱗次鳴笳疊鼓兮隱天動地自朝及野兮千乘萬騎谷轉山移兮天旋雲被赫赫震震耀武中原兮將除害以興利因農隙而講武事羌夷覩之以奪魄蠻狄聞之以挫氣雖商湯有景亳之命方此以知慙周成有岐陽之搜比茲而多愧然後班師旅行慶賜穆穆煌煌焉舍爵策勳而飲至此聖人之武功也太原啓聖誕受駿命傳萬代兮本枝盛上黨興王休有烈光應大橫兮天業昌漢髙不忘於豐沛光武本起於南陽故踰孟門越太行鏟危磴夷髙岡馬無泛駕兮鑾珮鏘鏘車靡摧輪兮和鈴鉠鉠紛曶霍以電邁震隱轔以軍裝坌入乎舊宫之皇皇思宗祖之艱難詠潛龍於沂康出德教兮修國章問老病兮勸農桑豈徒率子弟以佐酒歌大風而還鄉此聖人之巡狩一作省也古者為髙必因丘陵為下必因川澤去舂陵之天邸望臺駘之星陌黃軒訪道乃逍遙於廣成丹陵出逰還悵望於姑射踐唐人之舊壤遵漢家之餘迹祠后土於汾隂盛禮容於瑶席既而泰折啓方壇闢有潔在盛有牲在滌奏咸池兮羅金石欽瘞繒兮埋玉璧幽髣佛兮地祗格電輝輝兮神光赫時展豫兮羣瑞臻紛景福兮隨吾君黃龍降兮應景運寶鼎見兮寫龍文整樓船兮濟橫汾縱歡樂兮歌白雲此聖人之報地也禮行於郊百神受職焉禮行於社百貨可極焉既即隂以報地遂就陽而禮天因吉土厯廣㕓跨周服掩秦田萬乘星陳出直城之郊外八方雲會就京兆之天邉騎雜沓車駢闐赫赫奕奕而燭川以屆乎圓丘之前於是牲用特酒尚玄樂以雲門是重禮以蒼玉為先推髙祖以作配五精率而來旋逹上下合腥羶設柴燎致高煙上帝降監兮享明德子子孫孫兮萬億年此聖人之禮天也王者受命必升中以因名山告成功而紀厥美四時以春方首事五嶽以岱宗為始無懷以降七十有餘管仲所詳十二而已我皇承先王正統繼列聖遐軌幽眀協同靈物蕃祉故天不愛其寶地不愛其珍卿雲爛漫而動色醴泉湧溢而流津莫赤匪狐九尾而自擾莫黑匪烏三趾而來馴况復西鶼比翼東鰈呈鱗秬黍生於鄗址苞茅出於江濵一莖九穗之禾備粢盛而競發雙骼一作輅共抵一作抵之獸供犧牲而自臻可不謂然乎我皇雖以地平天清時和嵗貞欲行封禪之事猶執謙撝之情則有冠冕列辟搢紳諸生互陳嘉頌爭獻懇誠候屬車之塵者率土皆是請闕廷之下者靡日不盈於是備法駕順卜征襲時服肅天行河洛之人尚觀於後乘鄒魯之地已識其前旌水湛千年之色山呼萬嵗之聲常龍之峯帝鄉之白雲遙接金雞之岫長安之曉日再明所以登封降禪所以騰鴻飛英既刻石以頌美亦泥金而告成信四三皇而六五帝曽何周漢之足名然後審度量正權衡咨嶽牧問黎氓人荷復除之惠家索牛酒之榮此聖人之東封也宗廟所以本仁祭祀所以尊祖馨香寧止於黍稷備物必該於水土故醴盞在堂粢醍在户歌采茨肆夏之節奏文始五行之舞有來斯雍助我明主祝嘏辭説豈云虛取宜其時和人豐而神降之佑也故所以靈芝秀祥飇興月毳下膏露凝奉先帝而追孝遂加敬於園陵此聖人之致孝也倬彼靈嶽傑出秦畿豁為巨防壯我皇威雖國家盛德之無垠固先王設險而可依雄天府以岌岌符聖夀而巍巍萬物生華稟少隂之精粹五星分緯融太白之光輝俯壓黃壤上干翠微矧靈異之所蓄乃神仙之所歸實五鎮之為首諒羣山之所稀且夫西嶽之為鎮也大焉西方之為義也多矣其色也白白為五色之質其音也商商為五音之紀其味也辛辛為五味之和其行也金金為五行之始帝則少皥居神位則蓐收在祀嵗時有揫斂之功瓌寶多金石之美然所以能協我大君之眀命永作固而配天髙峙也徒觀其交錯糾紛之勢盤礴峻秀之形嵒一作磊崿巘嶬停停熒熒紛刻峭其若削洞㟏岈以杳冥樹色凝黛天光結青暗谷􅝧嵺而藏胚渾之氣幽嵒晱暘兮化神仙之靈中融寒暑下聞雷霆南澗載陽而北澗停雪西峯見日而東峯見星偉哉靈造上峩穹昊憑之者永安涉之者難老疊嶂重巒互稠沓千巖萬壑相縈抱其虛谷也數行發地緣茂松其峻壁也百仞懸崖不生草夫崑閬峙於方外蓬瀛傑於海島皆玄聖之所逰非化人之可保豈若茲嶽俯臨京鎬上有明星玉女峯下有長安洛陽道作鎮并崇於雍豫靈祠化傳於灑掃雖則祀典逺更於百王都未若祚我唐之夀考矣然則神其聰眀正直而一既德則斯輔知信不可失往嵗垂天文運宸筆勒琬琰崇望秩云待豫安民治國然後徐思其事懿夫俗阜時康今也正惟其日故可揚鴻徽而騰茂實奚不指河潼而嚴警蹕也又欲大康兆人兮嶽翼化淳四海兮嶽布沖和無疵厲兮嶽奬定禮樂諧神人兮嶽聼今萬邦胥悅四海肅清禮交樂舉人和政二世犯諱平豈猶茲嶽之所致實惟我后之眀眀又曰斯嶽降神生此多士則庶績咸若百工允釐河東地近領袖既得乎裴公圯上神人帷幄復歸於張氏况業固盤石城維宗子以為肺腑之親更任股肱之理惟邦是翰諒在乎此生甫及申豈惟於彼况乎聖德幽運通天玄一作至精山靈附化而開石蹊路非人而自成舊日隘途將帝道而俱泰從來絶險與太階而共平非我后至聖之所感豈能使造化之力冉呈至乃紫闕東臨黃河北注嘉氣通於郊野休光被於草木桃林之野佇天馬而來逰蓮花之峯翼華蓋而髙度昔禹禪吳會穆幸崑丘既江山勞止徒轍迹空留豈如是嶽不逺皇州何云嵗時展狩信亦朝夕可逰今左馮郡縣萬方黎獻僉曰吾王不逰吾何以休吾王不豫吾何以助咸傾想於班瑞之辰屬望幸於肆朝之處國家頻成大禮天下大和豐穰嵗積符瑞日多聖人雖欲行謙光遜讓之禮其如天意人欲何其如鬼神符命何誠可備西封之盛儀採東巡之舊制順三秋之仲月升二華而展祭巨靈贔屭願髙掌以扶輪仙廟虛佇欲睟容而警衛尋可封十狀之美盡遙陟七梯之勢命茲毛女執左纛而先驅策彼茅龍隨六馬而髙逝坐金機於雲表題玉册於巖際象榻與瑶壇共華石鼓將天聲俱厲如是則鴻猷振於萬古盛烈光於千帝然後臨大河而沉璧更秩於百靈眷東洛以回鑾永延於億嵗已而歸格藝祖道洽華胥更崇太室之事復率東岱之初遂就恆山而展禮望衡嶠而移車聖主功成永穆羲皇之化小臣多幸敢獻登封之書文苑英華卷二十七
