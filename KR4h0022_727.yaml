body:
  text: 文苑英華卷七百二十八宋李昉等編餞送十一送崔端公赴江陵度支院序一首送韋起居老舅假滿歸嵩陽舊居序一首送崔二十三丈諭德承恩致仕東歸舊山序一首送徐咨議假滿東歸序一首送杜少尹閣老赴東都序一首送許祕書赴江西使府序一首月夜泛舟重送許祕書聮句序一首送張校書歸湖南序一首送陸校書赴祕省序一首送薛十九丈授將作主簿分司東都序一首送許協律判官赴西川序一首送嶺南韋評事赴使序一首送李十弟侍御赴嶺南序一首送李十二弟侍御赴成都序一首送李十兄判官赴黔中序一首送商州崔判官序一首送右龍武鄭録事東遊序一首送台州崔録事丈赴官序一首招隱寺上方送馬典設歸上都序一首送睦州李司功赴任序一首送當途馬少府赴任序一首送義興袁少府赴官序一首送崔端公赴江陵度支院序權德輿今年春上始命二小司徒主量入經費之節辨繇賦𣙜管之法皆內有郎吏外有從事多冠惠文冠分道將命督課郡國其或才軼羣倫望重縉紳者總二府之職而兼領之故執事有今茲南荆之命用能選也初執事以名聲文采為士林所仰方退然深居於華陽仙府講道肄業恬曠自居諸公之辟日至山下且以道勝於內則出處不殊儒衣昻然徐就知已及參捴世物更若劇職動成故事去如始至論文變則能窮損益之旨商功利則能通輕重之權故數年之間三踐憲司赤紱在服襜如褒博諸生榮之嵗十二月自鍾陵抵江陵驅車即路不憚氷雪况騷楚遺韻楓江逺目在此路也情如之何五言詩送别之始故自戴臨川蕭王二柱史已降皆徴文貺逺字用五而詞多楚者以地理所歷且行古之道也送韋起居老舅假滿歸嵩陽舊居序前人九年正月左史韋公移疾既踰時左曹以聞得請當免遂以角巾野服如東周舊山集有前此二字恐非中朝廷搢集作薦紳先生之徒車轂擊於通馗觴酒交於竹林執其衣袪惜乎分隂弦晦屢移其歡不厭或發於歌詠以將厚意外孫權德輿序而言曰大凡士之生世有二道焉其出也宣其功緒播其利澤納忠服勞以服天下其處也味道之腴與古為徒休影息迹以間身世不如是者細則牽於利欲大則囿於得喪識真者羞之公之先扶陽始以丞相致仕為西漢盛典逍遙以安車不屈為北朝外臣至是左史又能伸其志以𢎞其世嘉遁德風盛乎一門况吾君用大和理萬物動者靜者各遂其方則陳力以致用潔身以𢎞教其利一也故左史得以聰明為駢枝以名聲為纒繳無耗氣無焚和退然葆真獨與道往鷗鳥不動家人忘貧是行也朵頥者知懼矣出車家林揮手青門擁途而祖者唯恐不及合歡也忘印紱之輕重陳詩也無章句之約束放言無擇造適則笑行觴無算既醉而罷虧成彼是曽不得集無此字棲於念慮之中而惠風間雲飄拂左右動用視聽無非大方推集作排是類而廣之則泛清伊陟嵩丘又可知也小生無以為贈謹序其所以然附于編集作篇奉送崔二十三丈諭德承恩致仕東歸舊山序前人大易之言君子也有出處語默之異或有猷有為以宣事功或不營集作勞不忮以順天理則陳力廟廊之上潔身集有於字巖石之下皆其所也至於振風聲以助時化無乃處者裕乎丈人燕居積四十年而天爵人爵合發至亰師周月而解巾致政之詔再下豈徒然哉初躬耕於延州三茅山之趾安仁食力聲利不入心虛集作靈曠而體胖道義富而家肥閨門淑行流於鄉黨泊然與白雲鷗鳥同其無事去年春鶴書下江南江南守臣多方以起之至止之日褐衣召見未受命而被以章紱既受命而侍於宫朝循性蹈道不遷於物抗章乞身詞直而明凡五上而後得請之詔下寵秩優禮周行聳視上以為天下之本至重必資賢人以奉三善故命職命官皆在於是及不得已而賜告也猶以審諭道德處之不然者豈無他豐祿耶蓋尊元良以貞萬國聖人之心也􅐵夫士能自審出處之冝而不惑者鮮矣或圖集作囿於利欲四顧滿志或沒於黨類不能自還嚮非強志峻節皎然清厲大圭不瑑獨鶴無侣難乎哉追思曩嵗一踐巖徑蓋二集作三十年矣徐話舊故有悲有歡唯𡨕𡨕翰飛不可及已輕裝喜氣心與道勝軟輪徐驅故山有輝想夫草堂環合喬松千餘本交柯翳景吟泫風露幅巾長謡偃放其間一氣不耗四支交暢清時外臣其樂如何非仁聖不能全不奪之操非堅強集作明不能果獨往之志惇史古風復行於今群公惜别飛蓋擁道如漢廷祖二疏故事而類之以歌詩德輿泝其心源也熟故斯言不怍送徐咨議假滿東歸序前人徐生用經術歷太學太常二博士咨議于王門徊翔于天朝褎衣赤紱官品第五移疾請告歸息于讓王之舊鄉其進也量力其退也修性斯可嘉矣國朝禮文酌損三代最為詳正生所洽通而又采獲古今亡於禮之禮者考論稽合頗有條貫故顧居守夷仲徐左曹元封今歸侯公和皆深知之生喟然曰州閭逹者凋落大半吾過懸車數嵗已為夀班在下大夫不云賤况天爵貴於纓冕田廬樂於都邑思雲卧水宿食稻與漁則華榱列鼎不如是之適賈勇於退不能留行可以言賀胡為愴别鄙夫嘗遊息三吳間殆二十年每耳聞水國如話鄉黨則徐生亦吾之僑舊也可忘情耶商皓逺矣以不才者處之退朝隱几幸類休沐江海之思油然而生適因送歸愛此行色時嵗荏苒去異粻無幾何多疾早衰筋骸日耗乞身自便雖未敢言涉江而南聊寄夢想秋九月太子賔客權德輿序送杜少尹閣老赴東都序叔通之於文學政事若雄鋩百練窽卻中節比年二字集作頃由東曹郎給事黃門俄以中執法守上洛得幹支郡視方任焉乃集作及今亞尹洛師實顓府政冬十月至自繞霤來朝京師三接面命出車就道凡所以慈惠東人者得悉數焉以叔通之華資茂實而須長師於後命者蓋使洛邑耆老周知功化然後尺一詔條焜耀恩禮夫如是則吳公之理平第一不復專美於前書矣又豈以翺翔集作旬翔疾徐為叔通道耶岐燕元老理具惜别文昌六職夏官卿趙公而下舉白出祖交歡道舊鄙人病不能醉亦笑言擊節於其間衆君子皆賦愧序引之辱送許校書赴江西使府序前人紳冕之士角逐於名聲者必以射䇿東堂校文石渠為稱首於公範言之皆其細者豫與公範尋世好以約交道獲申十年之敬出處多故及茲再會久飽諸公之議今日得之心包大猷口析精理可以稽合同異懸照是非夫然者焯當世之譽交大府之辟疾若機響不亦宜乎國家尚用兵車之會且思磐石之固俾賢王秉旄節主江西諸侯辟書四下大搜雋望公範拂拭縫掖從容長裾赴知己之命伸丈夫之志固當酌六經精義以贊軍政俾介胄之下禮讓興行且以中庸明誠之根本覃思於文藻致用於政事發硎投刃固在於逺者大者庸詎知今茲一舉非圖南之羊角耶臨岐話别送以勉固志業而已若愀然涕下以聚散為念此可略也衆君子置之月夜泛舟重送許校書聮句序前人公範持江西辟書駕言即路其出處之迹與婉婉之畫鄙人不腆已為之序引且吳抵鍾陵二千里而遙凡我諸生愴離宴之不足集有序字故再徴斯會秋月若晝方舟泝沿笑言不譁引滿造適公範乃握管作三字麗句僕與二三子聮而繼之申之以四五六七以廣其事如其風煙月露與行者居者之思各見于詞送張校書歸湖南序前人豫初與知柔交相見集有之禮而退四字雖未知其歸而意其賢逮今七年方再會於鍾陵交歡歡甚言理理詣其容溫然而不飾邊幅其中曠然而不施扃鐍渴善好義困而彌彰集作固締交集作文親仁久而益敬其於官名虧成之際則得之自是不得自是故年過四十方一命典校諸生以為屈甚集作善而張恬然儒冠峩峩不耻敝緼吟詠古道以文自娛獻嵗南征者以寓環堵於長沙故也亦將參質文於屈宋詳嵗時於荆楚楓樹千里片帆烏飛晨征夜泊無非詩興彼湘君帝子之遺迹江蘺杜蘅之春色皆落君彀中矣而修軷者得無詞焉集作乎送陸校書赴祕省序前人陸氏為江南冠族子容一門將集作特以文藻行實振起風緒叔父羣從嵗為儀曹首科子容亦登甲乙讐校祕書集作書府繇是君子謂春官天官之舉不失人子容之名不過實嵗七月將泝江流如集作入京師途出練湖實集作賔訪豫言别豫業以貧病不能自振方具藁笠鎡基耕鑿吳門子容以名聲文采官遊上國吳秦之逺道出處之殊致在此别也情如之何子容諸父深源方源我族之出有早嵗遊處之舊故得君之道因是而深别離愀愴亦用加等於序引也所不敢辭送薛十九丈授將作主簿分司東都序前人丈人罷碭山尉之嵗德輿未一作年既齓寓居南徐拜手之初就傅未足以遜志歌詩未足以類事嬉于親集作硯席不知苞羞會離之際亦命之賦爾來向三十年矣因緣進越濫次于朝而丈人以河隂丞滿嵗參調亦既感泣悲歡相乘微辨風采乍疑夢想而又徴楊惲史氏之學發羊曇西州之歎家風代德有所未知遺文逸簡甫獲傳授以丈人素履厚行含章立誠黃流集作琮白珩璨然內照可以書惇史激薄俗者有焉方安舒以潔已耻孟晉孟勉也晉進也出漢書以枉道俯首受署不競於時方今王在在鎬東人望幸百執事之府署盡備擇才以理繕工之屬分領厥司所趨者靜其祿不薄集作不薄其祿且以嵩峯之下素業在焉與夫角逐於亰劇者異日論也離觴舉白征蓋就途因以弱嵗菲詞發篋見示且曰今日之别其可默耶直書下情拜命之辱送許協律判官赴西川序前人十年冬豫與今左曹相君兵部郎崔君同受詔禁中雜閲對䇿以第其等將命於廷有請程百職之功緒者且以郎吏課曹為言時相君為吏部郎崔為右補闕因相顧曰直言方譏切吾黨其可捨諸豫撫手賀之以為得雋及後詔下徴他日之詞則許生也典校滿嵗西遊岷峨丞相彭城公雅聞其才辟以從事十三年冬以府檄計事至于亰師獻嵗回車釃酒祖道以子之直而和敏而文䇿名於天府叶志於元臣摶迅颷翔層雲將賀不暇給而别何為愴衆君子中飲集作歡皆賦使鄙夫類之送嶺南韋評事赴使序大夫杜公用德禮威信訓齊南海居二年以部從事檄召京兆韋君君溫文裕蠱鋭於術學在綺襦青襟之嵗粲若氷玉年方冠仕至廷尉評擁大府之傳赴賢主人之命其徒榮之且楩柟巨幹不産培塿則知天鍾美茂亦多在世德其要在聿修之不怠而已彼吏理與將命事之細者况新發於硎鋩刃韜集作溢匣不折不缺之誡豈足為執事道耶豫嘗被公辟書辱在下介顧以多病不敢逺遊南方祈集作蘄執事者芳訊見及則詳言美化佇為中和樂職之頌以抒下情送李十弟侍御赴嶺南序前人士君子之發令名沽善價鮮不由四征從事進者翔集翰飛蓋視其府之輕重耳則侍御之今日猶鄙夫之昔時也因想昔與今徐方連帥王僕射德素盛府主公楊尚書逹夫同登龍門於鍾陵爾來二十年矣二賢以大僚碩望當明天子注意分閫之重鄙夫顧無所用亦五叨中臺俯仰印綬以過量自愧追懷舊恩敢忘其所自耶况侍御溫良敏肅用文術自贊初為州里所舉俄屬聖朝以舊勳推恩纍更祿仕集作位再至京劇今茲簮法冠駕軺軒感於已知不計勤逺又焉知圖南水激莊子作擊之變化不在此耶既賀侍御所從又恱逹夫之舉賔主之間仁義集作所字在焉欵門告别思以言為貺至若洪範之攸好德盤銘之日日新皆侍御所執也又集作今何言焉敬謝逹夫慎夏自愛無金玉爾音而已送李十二弟侍御赴成都序前人相國臨淮公觀風俗於井絡之下辟禮所及皆雋人賢士隴西李侯虛中敏厚而文嘗再中正鵠於大集無大字春官天官氏同門生已翰飛三臺出入承明獨用恬退結黃綬於伊洛或靜以勝熱或贏而不囂豫意其必遇真工大冶以發鋩刃今果峩惠文趨黃閣集作閣視其所舉問其所從可以交賀矣行當見相君政成一方執介圭歸上亰集作台則掖垣侍從之選不在從事之賢者吾不信也中外零落始衰多疾祖道握手漼然涕洟至若銅梁玉壘之勝踐使軒賔榻之盛集皆備於歌詩者之説不能悉數云送李十兄判官赴黔中序前人今名卿賢大夫繇參佐而升者十七八蓋刷羽幕廷而翰飛天朝異日之濟否視所從之輕重故豫內兄以黔巫之地為夷途安流者受署於中執法王君故也以王君之馨香望實宜處清近久矣惟天愛人授茲一方則兄之赴知已誠可賀也兄端明文敏焯見吏理奉本府之書奏陳逺人之便宜已集作以事復命驅車就路敢用觴酒宴軷繫之以言曰武陵辰溪四封十五郡大凡五十餘城以仁佐賢寧彼縣道婉婉語集作話言化為風謠然後徴理行之第一獻賔寮之功用夫如是得不謂所從之重乎京師離羣咏嘆仁政寓辭鈴閣之下無金玉其音送商州崔判官序前人商於之地與郊圻接畛藩部條職顓逹於京師且有賦輿得署賔介今二千石以宗室貞幹自中臺郎出守首辟博陵崔君君溫恪亷清且以文敏緣飾三命官至汜水主簿吏理有聞以中外之勳華文雅所憑者厚遊必有方集作常翔而後集然則君之委質商之報政二者其相為用乎園綺風聲夢想如在古祠喬木為寄遐心送右龍武鄭録事東遊序前人豫弱嵗時從師於黨孰鄭生已用經術上第誦古先格言圓冠紳帶綽綽溫雅里閈僑居年輩為長逮今踰二紀三徙官至親軍紀綱掾青袍化緇班鬢如艾徐道舊故悲歡相因以鄭生之理文修行而職業未稱得不為大來之將然歟抑食浮於人者或臘毒歟豫不知也今則請急於環列遵途於江介懷舊遊也吳中多賢士君子居易求志為豫多謝之送台州崔録事二十一丈赴官序前人夏四月臨海紀綱掾崔雅璋受命選部出東門是嵗重表甥權德輿始至京師寓居同里顧其室空無以自貺逺輒竊仁者之義申之以言云古之君子修誠以慎獨居易以養正行實中茂而纓轂外華其或不至則安之若命蓋直已而不必用蹈道而不必行居今行古者實鮮而雅璋是已言必踐學必思四命官率由會府進不苟而交不黷簡亷肅給推心為理滿嵗罷去則與令弟躬耕於茅山之下睦姻食力修家法考農政嘻嘻申申有義有仁起於棖闑被於鄉黨之動也之靜也得古之遺風暗然而未彰不易其方寧蹇連以終否無竒邪以害正華髮承辨知者嘆之且夫列郡之督郵視天臺之司轄地征之衆寡賦政之細大為樞為柅何莫由斯豫獨知臨海之人受賜不暇矣又况琪樹風清石橋月明羽人仙子髣佛如覿遺集作遣有涉無與境而勝象外之歡可勝既乎今大君子主制河東諸侯府多雋賢且有雅璋者庸詎知今日適越不為異時之大來耶二三君子送逺加等釃酒以祖道歌詩以發志賢雅璋而思仙山故也各見于詞招隱寺上方送馬典設歸上都序前人扶風馬諌茂直直方中和之性發於恬曠放言遣詞示集作亦有餘力知名舊矣故相得甚歡觀覽其卷則警會心府三復不倦若霜鴻清唳松雪孤映或諸生所不能至者而茂直至之且多特集作持操尤病茍進故調於南宫仕於東朝戰勝無悶官間更適適相遇於南徐俄愴離居官局所係言旋上國豫乃與一二踈放之客詣精廬上方主人又以啜茗籍芳代夫飛觴舉白玄言至論代夫握手流涕時物且舉靈臺曠然晴江有楓千里在目茂直深於詩者衆君子以詩貺之送睦州李司功赴任序郡功曹實亞都吏而冠六聮選部銓署勤於他職李侯宗室子器幹明茂蒞官處煩率無留事清修緣飾傾心於士友此其可尚也豫接李侯中外之姻十二年矣曩嵗既展禮屬豫有禮官之命來趨闕下今兹得調甫獲再會又屬豫承乏代斫於儀曹不得授館以觴酒相歡才數四耳征蓋將去離憂惄然竊聞太夫人賢明有䦱英華作非門訓誡豫之內妹主中饋勸以義出則事良二千石分曹賦事入則順承慈歡琴瑟靜好名教之樂豈待多祿耶富春江漁集作魚浦潭紀行之詩與郡中坐嘯主諾之謡吾知之矣族屬羈滯於江南者衆寓書難遍悉為多謝送當途馬少府赴官序豫始與馬生相遇於南徐州皆以刋集作列非校冗員涵泳文誼生以既不得調乃反初服與計偕豫放浪集有於字江湖間因為東諸侯辟召旋忝朝命與漢廷臣並行於西垣南官中時生窮閻集作蘭旅食射䇿未中積嵗於靈臺之下儒衣甚敝詩思不詘亦與其徒三數生嬉春感秋觴酌吟嘯視豪遊曠貴者傲如也先皇帝不以僕不肖使操刈楚之柄輒以得士自賀豈惟竊不遺不偷之目而已耶今兹一作之出青門結黃綬筮仕賦祿於東南之奧區且曰外兄州尊理行充茂所以利攸往而不薄於中都官誠有由也然則郡齋言詩幕廷主畫雖欲勇退其可逃乎清和之月草木條暢京邑氣正在陽則舒方宜會合坐嘆離索追計舊故向三十年湖塘里巷疑在前日各有班鬢愴茲離襟又何可言也為豫敬謝中丞君乃者南康永嘉廬江晉陵已為二千石表率今當明天子守臣之寄為仁由已固又與前四郡不侔賦政之暇知君自熟豈敢為曹丘耶但交賀而已送義興袁少府赴官序過江山水陽羡居最性質夷淡者得之愈深袁生願恭文敏渴善好學今兹試吏其本可書先正南陽王實扶中興之運光啓土宇慶流後昆國有令典延世命官解巾筮仕偶得佳境况青春之年綵衣黃綬出則為政入則承歡以世德遺直而慎修之不怠異時必復此其推輪歟追思童丱集作年遊寓兹地煙潭雲洞杳窱靜深邑中諸生多業文者亦清輝勝槩之所發也生其勉之名集作有衛許胄曹首類歌詩鏘然在聽猥徴不腆俾敘夫羣篇文苑英華卷七百二十八
