body:
  text: 文苑英華卷二百十三宋李昉等編音樂二歌舞附歌二十二首舞七首歌妓四十三首歌歌李嶠漢帝臨汾水周仙去洛濵郢中吟白雪梁上繞飛塵響發行雲駐聲隨一作嬌子夜新願君聽扣角當自識賢臣口號踏歌詞張説花萼樓前雨露新長安城裏太平人龍銜火樹千重集作燈焰雞踏集作上蓮花萬夀集作萬嵗春聽楊氏歌杜甫佳人絶代歌獨立發皓齒滿堂慘不樂響下清虛一作浮雲裏江城帶素月况乃清夜起老夫悲暮年壯士淚如水玉盆久寂寞金管迷宮徵勿云聽者疲愚智心盡死古來傑出士豈待一知已吾聞西秦音集作聲傾側天下耳夜上西城聽梁州二首李益行人夜上西城宿聽唱梁州雙管逐此時秋月滿關山何處關山無此曲二鴻鴈新從北地來聞聲一半却飛回金河戍客集作卒腸應斷更在秋風百尺臺聽赤白桃李花前人赤白桃李花先皇在時曲欲向西宮唱西宮宮樹緑聽樂悵然自述韓滉萬事傷心對管絃一身含淚向春煙黃金用盡教歌舞留與他人樂少年與歌者何戡劉禹錫二十餘年别帝京重聞天樂不勝情舊人唯有何戡在更與殷勤唱渭城聽舊宮中樂人穆氏唱歌前人曽隨織女渡天河記得雲間第一歌休唱貞元供奉曲如今一作當時朝士已無多與歌者米嘉榮前人唱得梁州意外聲舊人唯數米嘉榮近來時世輕先輩好染髭鬚事後生與歌童田順郎前人天上能歌御史娘花前月底奉君王九重深處無人見分付新聲與順郎夜聞歌者鄂州白居易夜泊鸚鵡洲秋江月一作江月秋澄徹鄰船有歌者發調堪愁絶歌罷繼以泣泣聲通復咽尋聲見其人有婦顔如雪獨倚帆檣立娉婷十七八夜淚似真珠雙雙墮明月借問誰家婦歌泣何悽切一問一沾巾集作襟低眉竟集作終不説臨卧聽法曲霓裳前人金磬玉笙調己久空集作牙牀角枕睡常遲蒙籠間夢初成後宛轉柔聲入破時樂可理心應不謬酒能陶性定集作信無疑起嘗殘酌聽餘曲斜背銀釭半下帷聽歌前人管妙絃清歌入雲老人合眼醉醺醺誠知不及當年聽猶覺聞時勝不聞王將軍宅夜聽歌于武陵朱檻滿一作鋪明月美人歌落梅忽驚塵起處疑有鳳飛來一曲聽初徹幾年愁暫開東南正雲雨不得見陽臺聞歌李商隱斂笑凝眸意欲歌髙雲不動碧嵯峩銅臺罷望歸何處玉輦忘還事幾多青塜路邊南鴈盡細腰宮裏北人過此聲腸斷非今日香灺燈光奈爾何醉間聞甘州薛逢老聽笙歌亦解愁醉中因遣合甘州行追赤嶺千山外坐想黃河一曲流日暮豈堪征婦怨路旁能結旅人愁左綿刺史心先死淚滿朱絃催白頭贈歌者薛能一字新聲一顆珠囀喉疑是擊珊瑚聽時坐部音中有唱後瓔花葉裏無漢浦蔑聞虛解珮臨卭焉用枉當壚誰人得向清樓宿便是仙郎不是虛席上贈歌者鄭谷花木集作月樓臺近九衢清歌一曲倒金壺座中亦有一作半是江南客莫向清風集作清風又作樽前唱鷓鴣歌二首司空圗處處亭臺只壞墻軍營人學內人粧太平故事因君唱馬上曾聽隔教坊二經亂年年厭别離歌聲無似太平時詞臣更有中興頌磨取蓮峰便作碑同前王貞白誰唱關西曲寂寞一作寥寥夜景深一聲長在耳萬恨重經心調古清風起曲終涼月沉却應筵上客未必是知音舞舞梁簡文帝戚里多妖麗重娉蔑一作夢燕餘逐節工新舞嬌態似陵虛納花承褶􅀈垂翠逐璫舒扇開衫影亂巾度履行踈徒勞交甫憶自有専城居同前可憐二八物初學記作二八初類聚作稱二八逐節似飛鴻懸勝河陽妓暗與淮南同入行看復進轉靣望鬟空腕動昭華玉衫隨如意風上客何須起啼烏曲未終同前應令劉遵倡女多嬌色入選盡華年舉腕嫌衫重回腰覺態妍情繞陽春吹影逐相思絃履度開裙􅙭一作褶鬟轉匝花鈿所愁餘曲罷為欲在君前同前王訓新粧本絶世妙舞亦如仙傾腰逐韻管斂色聽張絃袖輕風易入叉重步難前笑態千金動衣香十里傳持此雙類聚作將比飛燕定當誰可憐同前楊皎紅顔自燕趙妙妓邁陽阿就行齊逐唱赴節暗相和折腰送餘曲斂袖待新歌嚬容生翠羽慢類聚作曼睇出橫波雖稱趙飛燕比此詎成多同前徐陵十五屬平陽因來入建章主家能教舞城中巧畫粧低鬟向綺席舉袖拂花黃燭送空邊影衫傳鉿公合集作鈴裏香當筵好留客故作舞衣長集作裳同前庾信洞房花燭明燕餘雙舞輕頓履隨疏節低鬟逐上聲伴類聚作步轉行初進衫飄曲未成鸞回鏡欲滿鶴顧市應傾已曾天上學詎見類聚作是地中生歌妓夕出通波閣下觀妓梁孝元帝娥月漸成光燕姬戲小堂胡舞間齊閣類聚作湖舞開春閣鈴盤出步廊起龍調節鼓却鳳點笙簧樹交臨舞席荷生夾妓航竹密無分影花疏有異香提初學記作投杯時笑語歡兹樂未央和林下詠妓應令梁孝元帝日斜下北閣髙宴出南榮歌清隨澗響舞影向池生輕花亂粉色風篠雜絃聲獨念陽臺下願待洛川笙同前梁昭明太子炎光向夕斂徙宴臨前池泉將影相得花與面相宜箎聲如鳥哢舞袖寫風枝歡樂不知醉千秋長若斯武陵殿下看妓劉孝綽燕姬奏妙舞鄭女發清歌回羞出慢臉送態表顰娥寧殊遇行雨詎減見凌波想君愁日落集作落日應羡魯陽戈冬夜對妓蕭放見初學記佳麗盡時年合瞑不能眠銀龍銜燭畏金鳳起爐煙吹箎先弄曲調筝更撮絃歌還團扇後舞出妓行前絶代終難及誰復數神仙夜出妓沈君攸簾間月色度燭定妓成行回身釧玉動頓履佩珠鳴低衫拂鬟影舉扇起歌聲匣中曲猶奏掌上體應輕和趙王看妓二首庾信緑珠歌扇薄飛燕舞衫長琴曲隨流水簫聲逐鳳凰細縷纒鐘格類聚作細苣纒鍾扳圓花釘鼓床懸知曲不誤無事畏周郎二長思浣沙疑作紗石定憶搗衣砧臨卭若有便一作使為説解琴心奉和趙王美人春日庾信直將劉碧玉來過隂麗華秪言滿屋裏併作一園花新藤亂上格春水漫吹沙步搖叉梁動紅綸帔角斜今年逐春處先向石崇家侯司空宅詠妓隂鏗佳人遍綺席妙曲動鵾絃樓似陽臺上池如洛浦邊鶯啼歌扇後花落舞衫前翠栁將斜日偏是類聚作俱照晚粧鮮同前劉刪石家金谷妓粧罷出蘭閨看花只欲笑聞瑟不勝啼山邊歌落日池上舞前溪將人當桃李何處不成蹊酬蕭侍中春園聽妓李元操微雨散芳菲中園照落暉紅樹搖歌扇緑珠佩初學記作飄舞衣繁絃調對酒雜引動思歸愁人當此夕羞見落花飛和衡陽殿下髙樓看妓江總綺樓侵碧漢初日照紅粧絃心艷卓女曲調動周郎並歌時轉黛息舞暫分香挂纓銀燭下莫笑玉叉長夜聞鄰妓盧思道倡樓對三道吹臺臨九重笙隨山上鶴笛奏水中龍怨歌聲不斷妙舞態難逢初學記作雙誰能暫留客解佩一相從衡陽王齋閣奏妓虞茂金溝低御道玉管正吟風拾翠天津上回鸞鳥道中鏡前看月近歌處覺塵空今宵織女見言是望仙宮和許給事善心戲場轉韻薛道衡京洛重新年復屬月輪圎雲間璧獨轉空裏鏡孤懸萬方皆集會百戲盡來前臨衢車不絶夾道閣相連驚鴻出洛水翔鶴下伊川艷質回風雪笙歌韻管絃佳麗儼成行相携入戲場衣類何平叔人同張子房髙髙城裏髻峩峩樓上粧羅裙飛孔雀綺帶垂鴛鴦月映班姬扇風飄韓夀香竟夕漁父初學記作魚負燈徹夜龍銜燭歡初學記作戲笑無窮已歌吹還相續羌笛隴頭吟胡舞龜兹曲假靣飾金銀盛服搖珠玉宵深戲未闌競為人所歡卧馳飛玉勒立騎前銀鞍縱橫既躍劍揮霍復跳丸抑揚百獸舞盤跚五禽戲狻猊弄斑足巨象垂長鼻青羊跪復跳白馬回旋駛忽見羅浮起俄看鬱島至峯嶺既崔嵬林叢亦青翠麏麚下騰倚猴猿或蹲跂金徒列舊刻玉律動新灰甲荑垂陌栁殘花散苑梅繁星漸寥落斜月尚徘徊王孫猶勞戲公子未歸來共酌瓊蘇酒同傾鸚鵡杯普天逢盛日兆庶喜康哉詠妓陳子良金谷多歡宴佳麗正一作盡芳菲流霞席上滿回雪掌中飛明月臨歌扇行雲接舞衣何必桃將李别有待春暉和平涼公觀趙郡王妓𢎞執恭小堂羅薦陳妙妓命燕秦蛾初學記作翠眉凝假黛紅臉自含春合舞俱回雪分歌共落塵齊竽不可厠空願上龍津詠妓王績妖姬飾淨粧窈窕出蘭房日照當軒影風吹滿路香早時歌扇薄今日舞衫長不應令曲誤持此試周郎益州城西張超亭觀妓前人落日明歌席行雲逐舞人江前飛暮雨梁上下輕塵冶服看疑畫粧臺望似春髙車勿遽返長袖欲相親辛司法宅觀妓前人南國佳人至北堂羅薦開長裙隨鳳管促柱送鸞杯雲光身後落雪態掌中回到愁金谷晚不怪玉山頺天津橋上美人駱賔王美女出東鄰容豫上集作與在天津整集作動衣香滿路移步襪生塵水下看粧影眉頭畫月新寄言曹子建箇是洛川神戲贈趙使君美人杜審言紅粉青娥映楚雲桃花馬上石榴裙羅敷獨向東方去謾學他家作使君觀妓詠和舞張諤一作鶚半額畫雙蛾盈盈燭下歌玉杯寒意少金屋冶情多香艷王分帖裙嬌勑賜羅平陽莫相妬喚出不如他五日觀妓萬楚西施謾道浣春沙疑作紗碧玉今時鬭麗華眉黛奪將萱草色紅裙妬殺石榴花新歌一曲令人艷醉舞雙眸斂鬢斜誰道五絲能續命却知今日死君家在水軍宴韋司馬樓船觀妓李白搖曵帆在空清流順歸風詩因鼓吹發酒為斂歌雄對舞青樓妓雙鬟白玉童行雲且莫去留醉楚王宮邯鄲南亭觀妓前人歌妓集作鼓燕趙叟集作兒魏妹集作姝弄鳴絲粉艷爍月彩集作粉色日彩舞衫拂花枝把酒顧美人請歌邯鄲詞淨集作清筝何繚繞度曲緑雲垂平原君安在科斗生古池座客三千人于今知有誰我輩不作樂但為後代悲擕妓登梁王栖霞山蓋集作孟氏桃園中前人碧草已滿地栁與梅爭春謝公自有東山妓金屏笑坐如花人今日非昨日明日還復來白髮對緑酒強歌心自集作已摧君不見梁王池上月昔照梁王樽酒中梁王已去明月在黃鸝愁醉啼春風分明感激眼前事莫惜醉臥桃園東出妓金陵子呈盧六前人安石東山三十春傲然携妓出風塵樓中見我金陵子何似陽臺雲雨人同前南園新豐酒東山小妓歌對君君不樂花月奈愁何詠歌容娘常非月舉手整花鈿翻身舞錦筵馬圍行處匝人簇看場圎歌索齊聲和情教細語傳不知心大小容得許多憐王家小婦崔皓十五嫁王昌盈盈入畫堂自矜年最小復倚壻為郎舞愛前溪緑歌憐子夜長間來鬭百草度日不成粧岐王席觀妓前人二月春來半王家日漸長栁垂金屋暖花發玉樓香拂匣先臨鏡調笙更炙黃長將欲舞態只擬奉君王陪辛大夫西亭宴觀妓劉長卿歌舞憐集作連遲日旌麾集作旗映早春鶯窺隴西將花對洛陽人醉罷知何事恩深忘此身任他行雨去歸路裛輕塵揚州雨中張十七宅觀妓張謂夜色帶春煙燈花拂更然殘粧添石黛絶一作艷舞落金鈿掩笑頻欹扇迎歌乍動絃不知巫峽雨何事海西邊開府席上賦得詠美人名解愁盧綸不敢苦相留明知不自由顰眉乍欲語斂笑又低頭舞態兼􅞫醉歌聲似帶羞今朝總見地只守解人愁和王秀才傷歌妓見詩三百五卷溫庭筠周員外出雙舞柘枝妓張祐畫鼓拖環錦臂攘小娥雙換舞衣裳金絲蹙霧紅衫薄銀蔓垂花紫帶長鸞影乍回頭並集作對舉鳯聲初歇翅齊張一時折腕招殘拍斜斂輕身拜玉郎文苑英華卷二百十三
