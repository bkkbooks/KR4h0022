body:
  text: 文苑英華巻四百二十九宋李昉等編赦書十禋祀赦書六㑹昌五年正月三日南郊赦文編制門下王者事帝必嚴禋祀之容臣下歸功爰極推崇之義既膺顯號式展盛儀因時布和順嵗更始前聖垂範逮予是遵矧以𦕈身幸逢昌運雖履氷惟懼而涉道未週繄我輔臣洎兹列岳内盡交修之志外分共理之憂乃者虜衆乖離部族欵附收帝子於氊裘之所致名王為冠帶之臣堅昆來朝不逺萬里夷貊嚮化克同九州重以上黨狂童竊襲叛跡問罪之師既集元兇之首遂梟廓清亂風洗滌汙俗剪逆豎而故都底定竄摩尼而壞法永除由是退惡進賢化行令舉刑姦贓之吏破黷貨之家此皆宗社降靈助成時政豈朕凉徳獨擅厥功而中外誠臣文武多士累陳懇䟽再舉鴻名辭不獲從被此虚美是用䖍告清廟明禋上𤣥煙燎所升靈貺如答既畢郊禮重申國經宜因行慶之辰誕布惟新之令同我景福永孚于休可大赦天下自會昌五年正月三日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不原者咸赦除之唯犯十惡反逆已上及故殺人官典犯入已贓持仗行刼縱不殺人並不免限左降官量移近處已經量移者更與量移如已在近處未復資者有司别條聞奏如復資者五品已上中書門下速與處分六品已下依常調選丁憂去任服闋日亦與量移如有親故在上都任於所司陳狀便與處分不必更待本州府申請從九月二十九日降郊禮勑後流貶人不在此例兼比來與劉稹楊弁同謀惡逆配流及伏法身死有父兄子弟及諸親族等配流者並不在放還及量移之限别勑因責授降資正員官未經轉者量與進改亡官失爵放歸不齒者量加收叙縱元勑云終身不齒者亦量與收叙流人未到所在及已到者並放還唯降死從流者與移近地如收叙者量才録用并僧尼道士移𨽻者亦放還其情狀難容者不在量移及放還之限得罪人已亡殁家口未許歸者一切放歸如自情願住者亦任諸色得罪人中如先有勑云縱逢恩赦不在免限者并别勑安置者亦委中書門下量事狀重輕節級處分左降官及流人先有官者如已亡歿各還本官流貶及諸色等罪人所有在任身亡任其親故收以歸葬仍仰州縣量給棺櫬優當發遣近年將相及任使文臣如因事貶降身已淪沒情理屈者並量與追贈諸色人中有痕累禁錮及逃匿者一切並與洗滌應昭義逆黨親族除已處置外其他素不同謀者並一切不問常叅官及諸色刺史先因停替及以病觧克終制未授官者委中書門下量力進擬勿令稽遲國家與吐蕃舅甥之好彼此無虞自今後邉上不得受納投降人並擒捉生口功盖本朝賞延後嗣是加恩禮用勸臣心故尚父汾陽王贈太師晟贈太尉秀實贈司徒顏杲卿贈太師顏真卿許逺張巡南霽雲子孫中未經甄奨者每家與一人出身耕桑豐約上應征租泉貨重輕宜均物力丁徭若絶其影占組織又去其纎竒則農桑無荒女工斯勸京畿百姓應兩稅及青苗地頭納見錢等充給府縣官吏及諸色支用今天下諸州所納兩稅皆㨿分數納見錢除納省估疋叚給用之日錢貨並行其京畿應納諸色錢等許納諸州及本土上色絹每疋與折八百文充官吏料錢及諸色給用京畿今年夏稅麥數内每㪷放五勝京兆府諸縣應欠開成五年終已前青苗榷酒秋夏品送府倉正稅地租百官職田資百姓種粮户部和糴變一作麥色粟驛蓄科稈草􅂒􅂒並放免畿内條稅百姓准元和二年八月二十五日勑會昌元年正月九日赦節文計户内丁數多少充諸司盡稱弟子致令鄉縣所由無人差役各委諸軍諸使司凖前後勑文收補仍具姓名奏聞勑下京兆府重磨勘如有人户違越妄托屬諸軍諸使不凖勑文影占收補者並凖前後勑文處分諸使諸軍諸司人在鄉村及坊市店舍經紀凖前後赦文收與百姓一例差科不得委有影占應屬官庄宅使司人户在店内及店門外經紀求利承前不復隨百姓例差科者從今後並與諸軍諸使一例凖百姓例供應差科畿内諸縣百姓租佃百官職田地訪聞其中有承虚名配佃多時縣司但據額徵收租子或無本地及被形勢庒園將塉薄田地廻換令人户虚頭納子嵗月既久無因申明各委縣令子細磨勘别立薄書具明叚四至申報仍委當司審勘會分析奏聞畿内諸縣鄉村及城内坊市人户不是正額食糧官徤及非工巧之徒假以他名諸司諸使影占納課其數至多各本司釐革凡是納課人户並停觧送歸本縣收入色役京畿内近日足陌用錢唯益富室疋帛苦賤反害疲人宜却令依前行墊陌錢每墊八十文其公私交關五貫已上令一半折用疋帛武功既暢經術是修宜闡儒風以𢎞教化應公卿百僚子弟及京畿内土人寄客修明經進士業者並𨽻名太學每一季一度㨿名籍分畨於國子監試帖三度帖經全通者即是經藝已熟向後更不用帖試如三度全不通及三度託事故不就試者便落下名籍至貢舉時不在送省之限其外寄居及土著人修進士明經業者並𨽻名所在官學仍委長吏於見任官及本土着學行人中選一人充試官亦委每季一試餘並凖前處分如無經藝雖有文章不在送省之限所冀人皆嚮道學務通經職局官常各宜歸正詳刑决獄豈可容姦在京諸司典吏考滿合赴選者官成後皆作計勾留不肯赴任今日已後官成後便勒赴任本司不至各令本司釐正不得奏請勾留如一年選不成者且勒依舊執行文案至二年選不成者勒停守選諸州府有遺攝官及職掌人推案刑獄比及刑部詳斷其間或節目不盡或與奪用情將有勘尋便稱停罷向後諸州府推事並須差見任官仍在兩考内者其刑部大理法直並以明法出身人充㨿律已去任者公罪流已下勿論公罪之條情有輕重茍涉欺詐豈得勿論向後公罪有情狀難恕者並不在勿論之限上柱國前代烈勲謂之八柱品居第一宜峻寵章向後非特恩不在累叙之限近日諸道奏官其數至廣非惟有侵選部實亦頗啓倖門向後淮南兩浙宣鄂洪潭荆㐮等道並不得更有奏請其三川邉鎮河南北地逺官無選人肯去闕員稍多處即任量要切奏請仍每道一嵗不得過七員應諸道軍將昨縁酧奨戰功多授正秩今日已後非因戰功不得請正官其已有正官者或因停替亦須待三五年後方得奏請比來山劍湖嶺間刺史多居周行散位日久而選縣佐率是諸曹胥徒年滿則授生人舒慘屬在此流朝廷典章罕能具舉自今已後每除湖嶺山劔南間刺史取其流品稍髙兼曽歴三四任已上州官者如有政績委本道觀察使具以名聞其逺處縣邑多是中下縣其縣丞簿尉等例是入流令史茍求自利豈知官業其中下縣丞中縣簿等自今已後有衣冠士流經業出身經五選如願授者每年便許吏部投牒依當選人例下文書磨勘注擬如到任清白幹能刺史申本道觀察使每年至終使司都為一狀申中書門下得替已後許使上縣薄尉選數赴選與第二任好官三衙官中名本於宿衛當畨就役其事甚徵疑每年兵部選時號為文簡合選之數全淺於明經齋郎注擬之時爭先於諸親宗子其於踰濫莫甚於斯入仕之門此徒最弊自今已後但令武簡其文簡並停宗子每因恩澤皆賜出身自幼授官多不求學未詳典法頗有愆違委宗正寺收補明經每年許叅三十人出身同兩願例與補各搜圖籍精驗源流明為保舉不得容有踰濫仍一季一度試帖經餘並進士明經條例處分京師佛刹相望其數已多既臨康莊足壯都邑近縁踈理僧尼訪聞大寺房院半已空閒其坊内小寺或産業素貧或殿宇摧毁僧數既少不足住持併合同居事從簡當委功德使條䟽各具去着名額奏聞其所折寺僧尼如行迹非違不守佛之禁戒者亦宜揀選勒令還俗仍依前勑處分兼具數聞奏其餘僧尼即令移入側近大寺有房院居住又京城諸市亦不盡有産業就中即有富寺今既踈理僧尼兼停修造所入厚利恐皆枉破委功德使檢責富寺邸店多處除計料供常住外賸者便勤貨賣不得廣占求利侵奪疲人所去不均之患冀合裒多之義又諸州府所申還俗僧尼已有定額若無私度者當减耗諸道每至年終各具見在僧尼數申省其續有死亡及犯事還俗并分析申報本司磨勘奏聞如聞兩浙宣鄂潭洪福三川等道縁地稍僻姑務寛容僧尼之中尚多踰濫委長吏更加揀其有年少無戒行者雖先在疑内亦須沙汰古者受禄之家食禄而已不與人争業然後利可均布人可家足如聞朝列衣冠或代承華胄或在清途私置質庫樓店與人争利今日已後並禁斷仍委御史䑓察訪聞奏如聞兩川稅租盡納見錢盖縁人多伎巧物皆纎麗凡所織作不任軍資所以人轉困窮俗増侈靡然以風土所習頓革稍難委刺史與縣令商量勸課有機杼之家依果閬州且織重絹仍與作三等估上估一貫一百下估九百待此法行後每年兩稅一半與折納重絹即異人稍蘇息軍用不虧或因官遊遂輕土著户籍既减征徭難均江淮客户及逃移規避户稅等人比來雖係兩稅並無差役或本州百姓子弟纔霑一官及官滿後移住隣州兼於諸軍諸使假職便稱衣冠户廣置資産輸稅全輕便免諸色差役其本鄉家業漸自典賣以破户籍所以正稅百姓日减州縣色役漸少從今已後江淮百姓非前進士及登科有名聞者縱因官罷職居别州寄住亦不稱為衣冠其差科色役並同當處百姓流例處分除盗懲姦在去其枝葉校功責課必削其根本如聞江淮諸道私鹽賊盗多結群黨兼持兵仗刼盗及販賣私鹽因縁便為大刼江賊有仗者雖未殺人不在該恩之限又逃還復業户雖先有格令近來多因刺史縣令務虚名者招携逃户侵奪已成産業轉令居者不安姦人得計茍求非時考課虚申招復逃亡及至定稅徵科依前逃散稅錢縁已申省使即須攤配疲人從今已後應諸州縣逃户經二百日不歸復者其桑産居業便招收承佃户輸納其逃户縱歸復者不在論理之限其有稱未逃之時典貼錢數未當本價者便於所典買人户下㨿户加稅亦不在刼收索及徵錢之限義重維城慶流多葉叙睦之道寵渥惟宜中外群寮文武多士或郊禋奉職或局署業官各洽恩波以類申典亞獻撫玉統等各賜物一百疋夾侍正衣進珪捧珪各賜物五十疋亞獻終獻正衣各賜物四十疋大長公主公主嗣王郡主縣主各有賜物内外文武見任及致仕官三品已上賜爵一級四品已下加一階合入三品五品欠考未合叙者待考足日聼叙孔氏行教折中於百王虞賔展敬不廢於千古敢怠咨禀爰用褒明文宣王之後及二王三恪與一子出身各賜物五十疋其祠廟委所司量加修餙堯稱睦族漢貴推恩在明廣敬之義式長奉親之孝太皇太后二等已上親王三等已上親委中書門下各擇有才行者量與改官如無堪奬用者即不必與改皇五等已下親及三品已上賜爵一級五品已上加一階六品已下及前資常選散官簡選日優與處分應陪位皇五等已上親及太皇太后皇太后三等已上親三品已上賜爵一級四品已下加一階親四等五等并諸色陪位官五品已上加一階六品已上及白身並賜勲兩轉其前資及有出身各减一選前聖立言教人以孝慶覃存沒禮洽閨門俾奉髙堂之榮用霑漏泉之澤常叅官及諸州府長官父母見存未有官封者並量與三品致仕官及階并邑號如已有官封者並量與進改如官已至五品已上者即與五品階父母已歿未經追贈者量與贈官及邑號公台輔弼柱石列藩俾𢎞追餙之恩仍昭賞延之典加於存歿用洽寵章中書門下及節度使帶平章事者宜與一子正員八品官祖父母先亡歿各與追贈已經贈者更與改贈破廻鶻及攻討昭義立功節度使不帶平章事者及劉沔李思忠各與一子正員九品官節度使東都留守度支鹽鐵觀察處置諸防禦經畧昭討使及神䇿金吾六軍將大將軍威逺鎮國等使皇城留守各與一子出身父母先亡歿未經追贈者各與追贈禮儀使京兆尹各與一子出身寅奉典冊肅恭明禋或勤賛相之義或專扈從之禮時當慶澤豈恡恩華應郊廟升壇升殿行事官普恩之外中書門下尚書省御史䑓三品已上特加一階四品已上各賜一階如合入三品者量减三考入五品者量减二考仍待足考日聼叙其合選人與减一選内行事官三品已上更賜爵一級四品已上更加一階内侍省及内坊官四品已上各賜勲五轉應從駕至郊廟者普恩之外三品已上賜爵一級四品已上各加一階白身賜勲兩轉攝侍中讀寶官攝中書令讀冊官各賜一子出身選冊文官賜一子正員官奉冊奉寶綬官書玉冊官書寶官各加二階進寶綬進冊進中嚴外辨禮儀賛導押冊押寶綬舉舁寶冊官各加一階合選人减一選其餘應職掌行事官及冩制書官太常修撰儀注禮官并内行事官三品已上賜爵一級四品已下加一階仍並賜勲一轉鐫造玉冊并填金字造裝玉冊官各賜物五十叚禁營軍師信宿警衛宜頒慶賚以奬勲勞神䇿六軍威逺營左右金吾及皇城將士應縁大禮儀仗宿衛御樓立仗等普恩之外三品已上賜爵一級四品已下加一階仍凖賜物舊例有差其神䇿將士應在京畿諸縣者亦各有賜應縁大禮職掌行事官并修撰儀注及留守副留守守倉庫卿等普恩之外三品已上賜爵一級四品已下各加一階梯航奔走慕化在庭藩岳奏陳不虧奉職勤勞禁署已積嵗時鴻臚禮賔院應在城内蕃客等各有賜物諸道知上都進奏院官在城者各賜勲三轉應縁大禮四方進表䟽文賀正官各賜勲三轉翰林待詔供奉并諸色直見任及前資并員外試官三品已上賜爵一級四品已下各加一階無官者賜勲兩轉祠薦展儀掌賛供事恪勤無怠甄奨宜申郊廟行事齋郎减兩年勞至室長掌座禮生賛者便放出身崇𤣥舘行事學生及齋郎禮生畨考已滿所司縁大禮却遣入行事各减一選國子監學生陪位者賜勲一轉中書門下專知儀制官各特加一階應縁祗供作官直司長上諸州行綱考典兩縣耆壽諸色畨役當上在城并量留十二月畨者各賜勲兩轉飛龍閑廐宫苑典引掌扇内園㧾監栽接少府將作内中尚武德軍器内外弓箭庫等諸司諸使下白身及無品直司定額長上雜匠巧兒黄衣長上監門直長雜仗三衛七色引駕細行執扇手角手弩手彍騎武士天文觀生漏生典皷典鍾工人樂人主衣主膳主酪典食胡食手宰手掌閑幕士御士醫士獸醫門僕藥僮御書手楷書手典書外行署等各賜勲一轉耆老加惠著在前經節義所褒用明古道天下百姓年九十已上委所在長吏以留州物量加存恤孝子順孫義夫節婦旌表門閭終身勿事先已旌表者亦量加優恤公卿視秩靈瑞降祥生植所資導利庶物五嶽四瀆宜委本州府長吏備禮獻祭助宣和氣福我黎人將達精誠在嚴祀事名山大川及自古聖帝明王忠臣烈士各令所在以禮致祭亡命山澤挾藏軍器百日不首復罪如初赦書有所不該者所司具條例聞奏敢以赦前事相言告者以其罪罪之赦書日行五百里布告天下咸使聞知主者施行文苑英華巻四百二十九
