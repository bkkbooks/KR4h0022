body:
  text: 文苑英華卷七百九十九宋李昉等編廳壁記三寺監太常少卿廳壁記一首鴻臚少卿壁記一首著作郎壁記一首祕書郎壁記一首四門助教壁記一首府署街附京兆少尹西廳壁記一首右街副使廳壁記一首寺監太常少卿廳壁記獨孤及太常掌玉帛鍾鼓等威文物以報本乎天地神祗人鬼集作鬼作地祗凡吉凶賓軍嘉之禮唐虞謂之秩宗周謂之宗伯秦謂之奉常漢謂之太常其掌一也後魏太和十五年始建少卿官少小也用别二卿大小之序亦猶宗伯有小宗伯列國有上卿下卿郡有守丞亦謂亞一等以少參長而佐其成務焉故事自御史中丞給事中中書舍人遷秩為亞卿者必於是司故官因職雄地以人貴餘八卿不敢與太常齒廣德中上尤審官注意禮樂其選也以才能不以資以恩澤不以勞謂李公卿材也是用超拜公將以忠孝敬慎肅恭神人且懋其官府政令俾無不恪方議酌前賢之遺塵而損益之乃瞻居壁所集作史記漫滅於是夏五月己丑皆姓而名之使如珠之貫旴衡指顧儼若對靣曰賢者吾得而師之不賢者吾韋集作韋是而絃之賢逺乎哉既進牘然後命博士河南獨孤及為之志鴻臚少卿壁記遜逖鴻臚漢官掌蠻夷歸義者致其饔餼辨其等威在周為大行人在秦為典客在漢為鴻臚其屬有譯官及郡邸丞長洎後魏太和中九寺各置少卿兩員掌副卿事亦由傳稱亞卿書載三少制位或差於伯仲受任同歸於師長成務贊理擇賢而居即其義也帝唐亮采立政稽古命官柔服逺人綏厥有衆肅慎來賀渠搜即敘示之以干羽通之以冠帶允諧是職豈易其人非夫野王之政理玄成之經術德儒之明識元方之令望則曷由臻茲蘭陵蕭公朝之俊德觸邪秉憲人之雅重草議為郎入掌王言出膺方牧帝咨惟允公實來斯且有黃華之命適表兼人之美乃求舊官守敷陳代遷明授任之有章示名器之無假自嗣聖已後記於壁焉著作郎壁記李華化成天下莫尚乎文文之大司是為國史職在褒貶懲勸區别昏明故駉牧頌於魯侯祈招諷於椘子史官之任有述作焉蓋王者之元符生人之極教也昔沮誦一作諷倉頡為黃帝史臣文字以異疑其來尚矣若南正北正建于顓頊羲氏和氏命于唐堯更虞夏商代序天地周官宗伯之屬有太史正嵗年以序事小史奠系代辨昭穆內史受納訪以詔王聽理外史逹書名于四方前志所載有左史記事或針王之闕或司過於朝所典不同其納君於善一也傳曰天子有日官則史逸史伯疑作史使史偏是也諸侯有日御則禆竈子韋是也倚相在椘南史在齊董孤在晉邦司之直也其事舉則三靈不慝其政息則百度惟危故先王貴之至于漢廷參用周禮太史公既殁其子遷緘金匱石室之文焉降及東京永平中特詔班固著作東觀繼其事者楊彪蔡雍由是太史但掌天文律歷而已小雅寢周聖人生魯道尊而文武將墜德至而天地不通感於獲麟嘆於與蠟爰制國典丘明傳之因歷象以正時元假鬼神而討有罪善人勸焉淫人懼焉百代之英所由用也向若前代闕能文之史曠記事之官雖舜禹之烈無聞焉有國有家何以直道而行也魏太和年肇以著作名官為中書屬晉元康年改𨽻祕書朝服單衣介幘始親職必選名臣傳歷宋齊梁陳官品第六元魏高齊周隋秩從五品魏則王沉以侍中兼之衛凱以尚書帶之至于有晉若史材之美陳夀自佐郎遷元舅之尊庾亮以中書領宋則徐爰何承天齊則沈約裴子野梁則陸雲公姚察陳則顧野王張正見後魏則崔光高允北齊則邢子才魏收周則蘇亮栁虯隋則虞綽玉邵皆一朝名選也貞觀初詔梁文昭公鄭文貞公統英儒盛才修五代史天子親垂筆削與春秋合符巍巍乎史氏之光耀也因是開館於內别立史官多以著作郎領帶其職而舊司所掌唯碑志祭祀一作宗祀之文在焉然以其能綜群言且居百乘出典下國轉為郎官經緯斯文昭宣有政或上遷祕書少監或擢拜中書舍人固不易其任也天命元聖降而為唐唐之建官罔非俊又若虞永興德函大雅魏侍中才高王佐鄭吏部絶韻鏘鳴崔司業雄詞飛動皆歷焉今上兼帝王之極功惣文武之能事思所以比崇軒皥紹美唐虞潤色乎大猷發明乎皇道問誰獻針則賔客崔氏問誰執簡則恆傳疑吳公胡諭德逰刃詩騷韋庶子貫珠今古濟濟多士時惟秉文盛矣哉同風乎雅頌也名嶽已遷别封天柱舊章不改尚列周官登陟蓬萊之峯循環藏室之奧從容簡貴信君子保明𢎞道之司歟今大著作清河崔公名傑天寶三載自祕書郎拜閲天祿之圖書踐人文之苑囿澡身於三德研慮於六經執謙而光好善能擇惠風吟於秀水朗月鏡於安流代為元臣家曰茂緒壯宫室者必鄧林之條幹乎以儒雅之姿從班蔡之後揮綽令譽逹于清朝則百祿隨之曷其有極矣先是命官之記不列于齊以華職忝未班與聞前志拜命之辱敢敘官之守云時天寶七載二月辛亥記祕書郎壁記權德輿按六典祕書郎四人從六品常分掌四部書以甲乙丙丁為之目昔武帝聚天下文籍於廣文粹作庫非內謂之中祕書魏晉之際祕書與中書或分或合故云職近日月宜居三臺之上丞郎之位文粹作在與南宫相亞歷代辨論與時輕重國初思漢廷延閣之制薄江左貴遊之選始以岑江陵虞永興禇河南迭為之厥後彬彬多文學之士然則先王之法志官師之訓典九流百代如貫珠然學與仕皆優而旋相為用者其在茲乎今年春滎陽鄭君具瞻自涇陽尉丞詔授任鄭君質重而有敏行坦夷而含明識且令中書相君之令弟也方以結綬滿嵗調於選部言吏資者積三遷而後至今超居之有以見申恩文粹作擇賢審官與怡怡綽綽之道為盡美矣在晉鄭默中外三閣始刪煩集作繁文而朱紫不雜開元初君之王考頴川府君叔祖刑部府君皆繇禮官博士繼登其任諸父諸兄或解巾以司讐校或功次而奉朝請文粹作或決科而登館殿含章筮仕多在於斯猶桓公武公之代為卿士蓋善於其職而宜之之文不疊釋之字義也謂鄙人嘗學舊史能知書府官業之所繇是俾編次郎位彰施屋壁時貞元庚辰嵗秋九月記四門助教壁記栁宗元周人置虞庠于四郊以養國老教胄子祭統曰天子置集本文粹作設四學蓋其制也易傳太初篇曰天子旦入東學晝入南學夕入西學暮入北學蔡雍引之以定明堂之位焉大戴禮保傅篇曰帝入東學以貴人集作仁入南學以貴德入西學以貴信工本作義入北學以貴工本作尊爵賈生述之以明太子之教焉故曰為大教之官而四學具焉參明堂之政原大教之極建置之道𢎞也後魏太和中立學于四門設工本作置助教二十人隋代工本作氏始𨽻於國子而降置五人皇朝始合于太學又省至三人員位彌簡其官尤難非儒之通者不列也四門學之制掌國之上士中士下士凡三等侯伯子男凡四等其子孫之為胄子者及庶人之子為俊士者使執其業而居其次就師儒之官以二本作而考正焉助教之職佐博士以掌鼓篋檟椘之政令分其人而教育之其有通經力學者必於嵗之杪升於禮部聽簡試焉課生徒之進退必酌于中道非博雅莊敬之流固不得臨於是故有去而升於朝者賀祕書由是為博士歸散騎由是為左拾遺舊制與集作以拾遺為八品清官故必以名實者居於其位貞元中王化既成經籍少間有司命大學之官頗以為易專名譽好文章者咸恥為學官至是河東栁立始以前進士求署茲職天水武儒衡閩中歐陽詹又繼之是嵗集有為字四門助教凡三人皆文士京師以為異余與立同祖與武公同升禮部與歐陽生同志於文四門助教署未嘗紀前人名氏余故為之説集作記而由夫三子者始文粹有乎爾二字府署街附京兆少尹西廳壁記權德輿漢制三輔丞秩六百石至東漢秩千石魏晉為京兆郡則曰治中至隋則曰司馬又曰贊始集作治國家沿前代之故冉更其名至開元初命為少尹其員二其品四綱紀衆務而分二之上助官師表則之重而佐其慈惠下董掾史屬城之理而推其功善大積而不撓集苑作中行而有倫和協輯睦宣明教令非文行政事之全者不得居之貞元十六年春二月詔𢎞農楊於陵字逹夫自吏部郎中蒞其職先是逹夫之佐元侯也四入御史府登天臺也五為劇曹郎懿文菁華履行直溫折中憲令克勤細大是冝典司名命列侍左右而猶以吏理揚歷於浩穰之府抑天之愛人俾覆露于轂下耶或姑閲其能而將大授之耶初西少尹視事之堂大歷中其長黎氏以勝勢之近取為亭沼故移創於是自後厥官罕備居之者不推本所代而斯宇寖廢及逹夫之拜未浹日其僚繼之於是逹夫徴缺員以循舊常𢎞必葺以辨攸處用宿其業而修其方凡所顓督武備廄置刑書紏禁工徒啓塞三右曹之事大凡天子縣內之理無不贊也無不抗也稱職者或退其品而選於近侍或進其材而擢為大吏佐六官分十聮皆其遷次然也集無也字以舊記堙落慮失其傳今斷自大極元年而下列其名氏嵗月俾風來集作風采相屬且為故志云右街副使廳壁記歐陽詹使有副副之為言繼也其不繼之輔也所以繼其或缺而又輔其違焉其亦㧾使之務歟皇朝集無此字街使之副其職大矣天子外有六合故內闢六街以逹之彼為庭除此為堂室欲靜諸外必先諸內乃置使以清之我唐新典也蓋以警正天衢紏逖王慝領環遊式道集作曷之卒專扞陬徼巡集作循之令夫京師豪傑英賢集作俠之都會蠻夷戎狄之來萃排輪重足憑衆多撓我防則尸伊動必由我察則目伊瑕必見繇是九城之中乘避貴負敬長金玉可拾遺則猶土幼弱可欺遇則如傷出門若有賔讓路若有神雲興鳥合而無暴自東自西以咸遂憧憧焉斯焉而能一作寧在其中悖悖焉斯焉而謹在其中六合澄晏六街源之則街使之功副使攸同也貞元八年上以元舅兵部尚書大金吾濮陽公兼右街使俾訪忠良以自佐濮陽公先以節行選次以材能擇加之以更歷因之以故舊得建州别駕前尚衣奉御高陽許公以聞上素知公名即日召見敷對器實有符曩聲當錫紫綬金章於殿庭而允其請濮陽公本官用視茲佐得人街之政悉以相付公靜而敏清而真堅鑰禁樞深鋤事根不戒而部伍增肅不按而逵陌倍理日出作日入息三條四出風恬月靜職斯有述公此無怍遷蘄州别駕副使如故旌其一作有勞且籍能也夫迹以行生言由事立觀公釐斯署之績得國家建斯署之義遂書其義昭其績為公廳之壁記云其或接公之武踐茲位者任是既重德亦無輕列公之左雖百氏可也貞元十一年五月記文苑英華卷七百九十九
