body:
  text: 文苑英華巻七百十宋李昉等編遊宴三韋司馬别業集序一首益州長史叔置酒宴别序一首嵗除陪王司馬登薛公逍遥䑓序一首宰相及百官定昆明池旬宴序一首湖中宴王使君序一首趙六宅浴後宴序一首仲春羣公遊田司直城東别業序一首劉侍御月夜讌㑹序一首陪李採訪泛舟蓬池宴李文部序一首河中鸛鵲樓集序一首春夜宴從弟桃李園序一首夏日諸從弟登汝州龍興閣序一首冬夜裴郎中薛侍郎置酒宴集一首華山黄神谷讌臨汝裴毘陵十四明府序一首鄭縣劉少府宅月夜登䑓宴集序一首建丑月十五日虎丘山夜宴集序一首九日陪亷使盧端公宴東樓序一首晩秋陪盧侍郎遊石橋序一首陪諸公宴京兆王參軍宅序一首春宴蕭侍御林亭序一首遊李校書花藥園序一首韋司馬别業集序張九齡杜城南曲斯迎郊之美者也背原面川前峙太乙清渠修竹左並宜春山靄下連俗集作豁氛中絶此皆鄭公之有也余固已聞之開元嵗夏四月猥忝散職居多放情跂彼一行無忘於夙尚時因集作其七召果獲於前期廼與起居舍人蔡公萬年主簿韓公惠而得朋欣然命駕韋公方拭席見待羞以藥物之滋倚琴相歡雜以嘯歌之韻清言移景閑歩周林翻飛自情俯仰為得斯亦吾儕之樂事幸可而同也扶陽餘慶磻溪古跡樹留梓漆器用天成庭漸芝蘭馨香世襲斯乃韋氏之懿業是所謂異焉而韋公尚其同之樂忘其身集作累之貴均林棲於服冕齊鼎食於焚枯彼未可量吾見其大跡繼前軌將為龍以為光道包逺圖豈一丘而一壑二三君子相與志之云益州長史叔置酒宴别序前人天子建五長守四方内以承衞京師外以攘却戎狄則有持其節制未十年而歴踐撫其封疆既一行而安集作寜輯盡在我叔父備聞於集作于朝廷昔者吉甫是欽仲著孝友之德楚子所畏趯在諸侯之選世有實績今以美濟俾我張氏鬱彼士林以媚於一人以正于四國豈非德能光大謀必變通思古人之獲心施君子之不器所以前拜小司馬兼擁旄於五命集作京今為集作再命左常侍特集作仍總戎於三蜀軌模素逺綽有先路之風聲車服載馳光偹上軍之禮命莫不文茵暢轂淑旂綏章嘽嘽皇皇塗將出乎華陽威已疊乎夜郎是時也四序鱗次屬當春夏之交千里草長有懐原隰之往乃闢軒宇速集作邀賔寮自髦士而及同姓啟集作由金華而下建禮或交以道合豈徒肆好之風或情以族親所集作於謂宗盟之義龜組交映肴䔩駢羅而聲欲成文發中堂之絲集作絃管志在激集作擊節感四坐之衣冠必名義以集作而為言雖聚散而何有酒酣相顧驪歌乃作白日西下求壯士之翻車青山南登愛忠臣之叱馭凡我明懿賦詩餞行嵗除陪王司馬登薛公逍遥䑓序前人故郡城有荒䑓焉雖層宇落構而遺制巋然邑老相傳斯則薛公道衡之所憇也薛公不容隋季出守海隅豈作䑓榭以崇奢蓋因丘陵而視逺必有以清滌孤憤舒嘯佳辰寄文翰以相宣仰風流而未冺今司馬公英逹好古清譽滿時迹有忤於貴臣道未行於明主以長沙下國同賈誼之謫居六安逺郡無桓譚之不樂嘗以為仁不異逺必敷政以愛人窮當益堅已恒集作垣懐而樂地屬府庭閒暇江浦清明南山集作土陽和覺寒氣之向盡東郊物候集作候暖愛春色之先来於是乎命輕舸以亂集作乗流趣髙䑓而降宅集作望越荒堞披古馗集作道躋隠嶙而三休俯芊綿而四極其逺則煙逺墟井指甌駱集作貊以南馳雲合山川距荆吳而北走其近則深谿見底鱗介之所出沒喬林夾岸羽毛之所翺翔悠哉薛公無不寄也意神期之可接陟彼峻隅想風景之不殊剪為茂草司馬公又以為峴山故事感羊祜以興言湘水遺風懐屈原而可作况登髙能賦得無述焉某實小人受教君子雖羲之樂㑹稽之士自與許詢而仲舉愛集作禮豫章之人復招徐孺是日也羣賢集作英在焉猥惟陋才忝陪下列祗命為序請各言詩集作言志宰相及百官定昆明池旬宴序孫逖古者天子居青陽服蒼玉於是乎和令布德行慶施惠其義逺矣粤若稽古皇帝御天下之十有九載溥暢神化𢎞宣聖德氐羌来享四方無事元凱升朝百揆時序年屢豐而多慶物由庚而自樂乃賜羣臣十日宴所以畢春氣樂太平也越三月已已㑹于定昆明池於是秉鈞宗公執事庶尹𤣥衮赤舄黼衣繡裳奉璋峩峩珮玉鏘鏘仰丹闕而拜命俯清川而樂飲大庖孔碩尹京為致餼之司㫖酒思柔柱史為佐樽之政既錫之以髙㑹又恱之以備樂修妓羅舞名倡間歌含姑洗於鐘皷動陽春於羽籥陟則設帟降則具舟榜文鷁以泝洄與飛鷗而狎玩魴鱮甫甫鳬鷖翼翼薰風敷散於草木喜氣宛延於郊甸亦既醉止于胥樂兮夫恩之所覃者深則感之所及者逺引之於大足以助天地之同和伸之於㣲足以致魚鼈之咸若大君垂裕豈虚也哉詩以展事抑惟舊典我上相裴公中書令蕭公保乂皇極緝熈文教以為正國風羙王化者莫近於詩㣲言浸逺大義將缺乃命革剗浮靡導揚雅頌斵雕為樸取實棄華親題首章以倡在位皇矣上帝式歌文王之德穆如清風方聞吉甫之頌請問其目列之於左湖中宴王使君序前人書曰㓂賊姦宄又曰奪攘矯䖍延于平人干國之紀常州刺史王公奉若天命肅清江服德之至也不言而黙信令之行也不言而知懼政未朞月路不拾遺斯亦隨武子鄭太叔常從事於兹矣嵗三月使車行郡輕舟入湖自公及私寓物成趣水照金章春明朱紱倚禹穴於前棹㢠越城於後屏南國春暮鶯花亂飛東山晝晴林嶺皆出載酒公讌尋幽水嬉班秩以節在宴樂而有禮簮笏斯皇覺雲湖之増價夫皇華乗傳朝寄之重丘壑林藪幽趣之適在此行也兼而有之請賡載歌用旌厥美趙六宅浴後宴序昔孔門逹者言志於夫子曰浴乎沂風乎舞雩咏而歸豈非遊必有方道在則樂貴㓗清以象德輔精爽而成趣吾友趙子亦事斯語矣歴選暇日咨謀同心備預芳華有事沃盥炎火電煙洞房燠若探湯以申誡闕水知其善清以流其惡則形之汾澮苦而利於病則神之藥石雖雅琴養德惠風析酲曽何喻哉未足多也振衣而退繼酒為樂需食有節誦言無譁所貴酣暢以和湫底夫始於澡身終於養神樂只君子曷嘗違仁左衞騎曹張晉明伸紙染毫俾余題序仲春羣公遊田司直城東别業序陶翰余聞宥天下不聞理天下故夏䑓門疑而生自疑作白秋官澹而守中不然我羣公法家之流惟刑是恤亦何暇閣挂巾車鏘鏘乎在此堂矣司直鴈門田侯行脩器博心逺地偏於是啟郊園之扉主簿天水姜侯詞才俊秀雅志堅直於是傳翰林之檄嗟乎城池不越井邑不移林篁忽深山鬱斗起出廻塘而入蒼翠更指深亭因曲岸而捫穹嵌忽升絶頂雲天極思河山滿目菡萏春色蒼茫逺空煙間之宫闕九重砌下之亭臯千里臨眺之壯也罇酒既醉舞袖登筵歡洽在斯獻酬無筭措九州於樂府移三典於頌章皆我順堯之心除秦之政所以偶春服之宴也咸請賦詩劉侍御月夜讌㑹序元結兵興已来十一年矣獲與同人歡醉逹旦詠歌取適無一二焉乙已年集作嵗彭城劉源在衡陽逢故人或有在者日昔英華作指非相㑹弟寛逺遊始與諸公待月而笑語竟集作競與諸公愛月而歡醉詠歌夜乆賦詩言懐於戯文章道䘮蓋亦乆矣時之作者煩雜過多歌兒舞女直相喜愛系之風雅誰道是耶諸公常集作嘗欲變時俗之淫靡為後生之規範今夕豈不能道逹情性或集無此字成一時之美乎陪李採訪泛舟蓬池宴李文部序蕭頴士聖后欽明天工愍恤人瘼罷前監郡仍昔樓集作按部其為寄也大焉若乃地疑作池梁墟城浚都舳艫萬里闤闠千室通邑之尤也東至于河西至于海亘長淮而彌甸服方域之雄也牧守之任循良之選豈易人哉今兹春嵗聿旱人咨荒歉朝廷慮東方之耗斁也慎簡大賢而臨涖之明詔乃下俾鉅鹿守李公往焉亦既褰帷零雨其祈矜人廕庥貴余疑作籴日衰被青徐而周兖豫有政刑矣已而襄國士女結去思之怨大君愍然又命公族之良前文部侍郎東陽繼焉擅文儒之俊所以司綸翰兼銓尺矣韞戎畧之權所以參簡稽貳麾節矣登朝而備履清貫出守而再踐名邦其鎮撫斯境式慰饑渇宜矣秋九月鉅鹿舟輿次于是都明使君客焉懿夫尊卑有序敦晉鄭之好前後斯謡美召杜之德温温二公善可知焉越三日宴集于南亭具水嬉也出層城横通川廻環里閭曠望郊㕓抑抑威儀徒馭如馳人導馬隨以至于蓬池矯翠帟登畫鷁揖讓有禮獻酬無斁威哉赫乎方伯所以饗邦君也爾乃洲島廻互林亭蓊鬱天海清平豁若萬頃澄湛乎其間紅蕖照灼緑菱摇漾淺草細萍往往藂生邀魚舟望白鳥江湖勝勢去去非逺既而渉則在岸泛則在流珍羞間海陸之錯妙舞應荆吳之奏參差逶迤笑語忘疲亦千古一時也晩林未疎堤草更緑輕雨泛灑㣲風清潤泝洄淪漣終日夕焉二公喜一作嘉昇平生至樂歡然有命賦詩客有欣遇二府簉賔筵之末從事斯文爰操簡請同賦四韻嗣於國風之後焉河中鸛鵲疑作雀樓集序李翰後周大冡宰宇文䕶軍鎮河外之地築為層樓遐標碧空影倒洪流二百餘載獨立乎中州以其佳氣在下代為勝槩四方雋秀有登者悠然逺心如思龍門若望崑崙河南尹趙公受帝新命宣風三晉右賢好事遊人若歸小子承連帥之眷列在下客八月天髙獲登兹樓乃復俯視舜城傍窺秦塞紫氣度關而西入黄河觸華而東匯龍㨿虎視下臨八洲前輩暢諸題詩上層名播前後山川景象備於一言上客有前美原尉宇文邈前櫟陽郡鄭鯤文行光逹名重當時吳興姚係長樂馮曽清河崔邠鴻筆佳什聲聞逺方將刷羽㸔疑天追飛太清相與言詩以繼暢生之作命余紀事書於前軒春夜宴諸從弟桃李園序李白夫天地者萬物之逆旅也光隂者百代之過客也而浮生若夣為歡幾何古人秉燭夜遊良有以也况陽春召我以煙景大塊假我以文章㑹桃李之芳園序天倫之樂事羣季俊秀皆為惠連吾人詠歌獨慙康樂幽賞未已髙談轉清開瓊筵以坐花飛羽觴而醉月不有佳作集作詠何申雅懐如詩不成罰依金谷酒集有斗字數夏日諸從弟登汝州龍興閣序前人夫槿榮芳園蟬嘯珍木蓋紀乎南火之月也可以處䑓榭居髙明吾之友于順此意也遂卜精勝得乎龍興留寳馬於門外歩金梯於閣上漸出軒户遐瞻雲天晴山翠逺而四合暮江碧流而一色屈指郷路還疑夣中開襟危欄宛若空外嗚呼屈宋長逝無堪與言起予者誰得我二季當揮爾鳯藻飛乎鸞觴一作搜乎霞觴與白雲老兄俱莫負古人也冬夜裴郎中薛侍御英華作郎非置酒讌集序前人二公以大司馬之命領浙河東西十有三州之政相與周爰諮度平均邦賦者三月矣當割而游刄無間臨機而舍㧞則獲由是在簿領之際無江海而閒冬十月辛未徴㑹于此堂讌朋友故舊也賢豪畢萃升降有序縫衣淺帶十有五人聲同故窮逹不問意得而鄙懐集作恡皆遣肴芳酒濃夜寂琴暢慷慨言志絡繹舉白盱衡抵掌啞啞大笑三爵耳熱萬念如洗不復計名身之親疎憂患之去来也况他累乎既醉余以箸擊酒集作唾壺叩商而歌其詞曰簿領日盈機知君傲煩囂飲和自忘渇况以初筵招道契跡自親誰謂列宿遥何用結同心緑琴復長瓢日月若走馬炎凉催斗杓一年觧大集作頥笑幾日如今宵奉君千金夀莫使嵗寒凋是日也集無也字禮成於意歡生於同滯憤積慘篲掃湯沃方今滄溟集作溟海始波世未康矣集作世屯未康二公克壯其猷集作猶以立事為已任行當自致青雲之上不復與適莾蒼者羣矣吾儕浮沉其間風水俱逝集作與風水俱他日或潜淵集作泉或唳天一離一合雲動雨散然後知今日罇酒未易再得將子無金玉其音姑偕賦以卒貺華山黄神谷讌臨汝裴毘陵十四明府序按圖經仙人黄盧子得道昇仙之所前人黄盧子㓕景上漢千嵗矣留碧峯白雲以貽後世故清機勝事未始有極余使集作吏于華之明年道侣裴冀亦再命為臨汝令夏六月假道敝邑稅鞅此地集作山思欲追髙歩詣真境於是相與携手及二三友生童子將命者六七人挈長瓢荷大壺以濁醪素琴㑹于黄神之谷興也按谷之西頂實三峯東面石壁藂倚東為洞壑乳竇潜泄成盤渦兩崖合關若與天接三二子將極其深也二字集作登探也至則繋馬山足披蓁石門入自洞口至於梯路蹋連嶂而輿疊崿度嶇嶔而躡凌兢夤縁絶磴及横嶺而止澡身乎飛泉濯纓乎清漣想夫君俟我於蓮花峯之下五字集作花峯下碧集作碧空而嬋娟愛而不見搔首空山然後靡靈草以為席傾流霞而相歡集作勸楚歌徐動沂詠亦發清商激於琴韻白雲起於筆鋒是日也髙興盡而世緒遣幽情形而神機生頺然覺形體集作骸六藏悉為外物天地萬有無非秋毫既醉且止集作亦既醉止則亦足言以志仙跡且旌吾友嘉㑹之在山也鄭縣劉少府兄宅月夜登䑓宴集序前人夏六月小暑至矣吾兄方幕夜天掃月榭有酒如乳醑我乎城南集作隅城臨近髙山俯瞰集作矙平隰秦郊漢院相錯如繡且有顥氣足以娛人故數君子稱觴焉其誰同之有若功曹隴西李華參軍滎陽鄭洵卿瑯琊王休集作沐河東裴貺鄭尉京兆韋造皆卿材也聲同而形體相忘道契而集作故機事不入是以有髙㑹逺望危言浩歌或心惬清機寓興於物或語及陳迹盱衡而笑於是初筵而惠好脩中飲而意氣接既醉而是非遣夫彭澤採菊隠侯臨風謂之盛矣况髙城古䑓深夜朗月芳罇良友佳境勝事今夕何夕八者俱并盍亦偕賦於此乎觀三二子之志建丑月十五日虎丘山夜宴序前人方今内有夔龍臯伊以佐百揆外有方叔召虎以守四方江海之人髙枕無事則琴壺以宴友朋嘯歌以展霞月吾黨之職也我是以有今兹虎丘之㑹巖巖虎丘奠吾西門崒然如香樓金道自下方而踴躍鎻丹霞白雲於蓮宫之内㑹之日和氣滿谷陽春逼人巖煙掃除肅若有待余與夫不亂行於鷗鳥者銜流霞之盃而群嬉乎其中笑向碧潭與松石道舊兕觥既發賔主醉止狂歌送酒坐者皆和互趣所奏集作吳趨數奏雲去日沒梵天月出集作日萬里如練松隂依依狀若留客于斯時也撫雲山為我輩視竹帛如草芥頺然樂極衆慮皆遣於是奮髯屢舞而歡今夕何夕同者八人醉罷偕賦以為此山故事九日陪亷使盧端公宴東樓序于邵國家以桂林重鎮吳越襟帶有郡縣可以綱紀有蠻夷可以覊縻朔南聲教蓋以此始皇上纉承大位之明年啟謨羣后載命連率是以范陽盧公自京而来條察二十八州諸軍事千里之地遂無外虞三軍之士皆務前敞疑然後賞必勞罰必害官不易法府無留事封畧既静公堂自閒况重陽美景得不為樂大合賔佐髙張郡樓紅塵發地青山坰牧連天漲海来接蒼梧慿髙而翠靄轉微送逺而白鴈㸔沒泛椒菊而筭爵顧絲桐而間奏賔醉月上主待露晞想彭澤之獨遊悵馬䑓之陳迹今日之㑹何其盛歟余負累謫居卒起庭府黜叅佐之禮陪上罇之娛韓灰已燃鄒谷自煖奉命為序冠于羣篇辭之所難敢謝不敏請分賦五韻書諸即事云晩秋陪盧侍郎遊石橋序前人以公責左遷于兹迨一周星矣首疾心痗繼日經懐實由南冠尚簮憂所未忘是以幽求人境之外將蕩滌煩慮得諸石橋乆之豈無他人不如我志願言卒獲者亦乆之殿中侍御史范陽盧子至監理下國未浃辰而居簡乗暇行鑣載勒致為客數公方駕儐從如林煌煌焉奔走乎墟落延屬乎禫官疑矣三登彌髙累息以進而後偕集于橋下徒觀夫挂長虹以飛来陵半霄而勢去下空如豁纎蘿不生上頂為帷佳木藂秀不可得而總載也以為本於融結庸可自然資於造化力役不及明矣東極大水北走長安羅郭雉堞如示諸掌大田多稼冝乎有秋羣山積翠以回合好鳥追飛而下上有是勝賞以是開懐盍賦新詩以紀一時之事也侍御以嘗忝鵷沼潤色鴻業以文司録俾序良遊敢復畢辭多慙老敗陪諸公宴京兆王參軍宅序前人王參軍國族之貴介子也况抗衡神都抵掌翰苑渇日行道推心與人故士君子願遊芝蘭不避風雨僕校文者得無勸乎冬至十月飛雪千里携我入室接君初筵嘉餚惟錯清酤有藇取適可以齊鵬圖及酣可以去狐白始為合獻之禮終為縱飲之樂有足多也飛鴟戾天宿鳥擇木鐘鼓告暝軒裳欲歸主人諸僕一嵗三㨗斯文可覩愚以更請賔將不然蓋言之不可以亡也多媿皆讓春宴蕭侍御林亭序前人監察御史蕭公以初獻戎捷塞庭無事從板輿之暇日邀幕賔而揖我必選以勝况臨清江始乗安流終踐樊圃嘉客以入華亭豁開桴浮往来上下皆見竹樹引外郊雲物鳬鷖為夫人家禽豈日駐花間天鋪潭底自為勝槩而蕭公於是咨宻戚荷賔榮惜此交歡愛此遲景飛觴舉白亦云醉止顧我以客時無間焉拜升堂之嘉慶抱夀慶之餘瀝殿中侍御史鄭公文宗也退而喜曰今日之㑹允為良辰不有斯文無以終樂遂歴賦諸韻凡二十餘篇命為序引讓之不可遊李校書花藥園序前人春吹萬以為物皆有役我智者惟役之不殆終而有用故君子盡心於藥焉恐精華之不迨已也崇文舘校書郎李公寢門之外大亭南敞大亭之左勝地東豁環岸種藥不知斯池幾十歩但覩其縹眇霞錯䓤蘢煙布宻葉層暎虚根不摇珠㸃夕露金燃曉光而後花發五色色帶深淺藂生一香香有近逺色若錦繡酷如芝蘭動皆襲人静則奪目此李公及時之適也至若上苗可食下體兼採子入菰飯華雜蒲葅既甘平而性寒又辛温而執熱癖除而不為去傳風愈而安知及書此李公谷中之本也吾徒沐公馨香愛我藥石皆可右坐願為佳遊風生白蘋日映丹浦披摇靃靡則花飛鏡中虚涵峥嶸而山在海底入門而未辨金谷問地而不言河陽况春醖己清家園可摘飲盡落景勸無後時憶戴而乗輿自来知鍾而聽絃立應此李公推心之分也禮曰發慮憲語云從吾所好慮以觀進好無思邪而公智周未兆根據有益上符性命之理下從耳目之玩舉一物而庶美集得不謂之難哉韓康隠名徒盡職者羊叔相遺吾無間然聊對諸人之意用觀賦物之作予乃僚也敢無述乎文苑英華巻七百十
