body:
  text: 文苑英華卷七宋李昉等編天象七秋月賦一首華月照方池賦一首瑶臺月賦一首月映清淮流賦一首月明星稀賦一首明月照積雪賦一首月中桂樹賦二首玉鈎賦二首秋月賦以至明周照為韻歐陽詹粵惟日行於翼風發於庚白露下降鴻鴈來征野颯颯而木落天寥寥而氣清獨孤亭之不寐見涼月兮東生上迢迢之霄漢掩冽冽之恆星出江山之磅礴豁閶闔之峥嶸皎皎搖搖晶晶盈盈映階墀以歷歷對窗戶以亭亭雖他時之並照何斯夕之為明異夫白鶴翩翻不分其色寒泉灑落空聞其聲乃遙夜以虛燭實純風之至精於是照曜必周通冥洞幽其色也潤林巒之卉物其影也瑩江湖之亂流益池亭之寂寂增氣候之颼颼起離家之逺恨生去國之繁憂何處而不見何人而不愁豈謂征客懷歸徘徊於黃榆之塞佳人怨别蕭條於紅粉之樓已矣哉信知宇宙之中光明為至非凄涼之獨感亦清貞之可類臨照者足以倣有德之君潔白焉宜將匹無瑕之士傷哉不肖倣徨嶺徼時雨露兮未沾自形影兮相吊願窮經兮取老恐用人兮尚少幸君子兮如月冀餘光兮一照華月照方池賦以凝素光淨寒氷為韻李濋天開圓月水淨方塘月則桂華初滿水則蘋風不揚徘徊委照瀲灔交光素魄將臨合浦之珠乍吐清漣同映玉壺之氷始藏契禪心之寂寂發郢思之蒼蒼何兹景之逾麗信終夜之難忘况乃萬里無埃三秋罷霧始朣朧之啓夕已奫淪之納素前臨不測姮娥下入於河宫永望長空明鏡上騰於天步碎蟾影於龍鱗之浪混瓊華於雪毛之路天泉合而益空毫芒鑒而必具故夫秋以為節氣以宵凝紅蕖落而渚淨白露降而波澄泳之遊之始方舟而取玩今夕何夕若乘槎而上升豈獨發清管滅華燈思凄切於阮戶光漾蕩於玉繩而已哉觀乎麗天者月習坎者水水以柔而居月月以輝而垂美一鏡合而內外澄鮮雙影分而上下相似驚夜聲於鳬鵠鋪皓彩於蘋芷規沉泉底豈魚目之能倫勢出波中乍洛妃之可擬異乎纎纎樓上的的雲端未若麟不鬬於天宇魚不驚於釣竿舟蕩漾而煙空轉麗風淅瀝而桂影生寒佇以取鑒適夫情性寂以喻道斯道也逾深色以喻空其空也逾淨故體上善之為德中含光而不競既彰玄教之樞用播詩人之咏瑶臺月賦以仙家帝室皎潔清光為韻王淮素月宵凝寒空逈徹照瓊樹以增麗煥瑶臺而共潔逺而望也浮皎皛之精光近而察焉帶巍峩之積雪美其清熒互映絢練相鮮洞玉砌以周設對金波而正圓增構參差逈出林巒之表光輝照燭還同昆閬之前覩重璧以發地瞻百常之造天乍動乍搖難審詳於衆目若明若滅疑陟降於羣仙顧兔凄涼崇臺􅌄窱惵爾意駭倐然魂悄駢階級以雲矗粲瓊瑛之霄皎徒引耀之可觀豈懷材之足表若見仙闕如逰玉京月映臺而九天共霽臺照月而萬里俱明含氷霰而逾潔軼氛埃而更清斯可以滌鄙夫之幽抱暢達士之髙情皎皎寒光悠悠清質凝精以降委照而出玩浮光而神竦炫微輝而皆溢視乎外美清瑩乎瑶華鑒乎中致齋莊於虛室由斯可保亦既有光始激射以內照忽飛騰而外揚璧彩遙分奪氷壺以的的桂華中映同日觀之煌煌於是天地朗然纎埃不翳九成由其直上八表可以旁睨將以象清都朝玉帝豈徒恣遐想窮逺睇徘徊於臺榭之間悵望於蟾蜍之際而已哉吟玩既久規圓已斜歎將傾於桂魄思復搴於瓊華庶竭精於册府寧逺慕於仙家月映清淮流賦以題為韻楊諫地有四瀆其一也惟淮天有兩曜其一也惟月月至明而不阻遐邇淮至清而可鑒毫髮故澄徹而相暉况埃壒而初歇泛灔多象朣朧交映類藏氷之在玉壺如臨水之懸明鏡引清潤而介若自潔和素光而終然不競千里伴孤舟而浮百丈動纎鱗之泳此所謂物至淨而增其淨也如其孕靈納影委照淪精徐而匪濁攬之不盈蟾蜍下沉對蠙珠而增美璿源圓折混金波而更清皓鶴奪彩玉砂迷明如分舟子之望終起漁歌之聲此所謂物無情而感有情者也古人有引類為贈因物傷懷風雲欲别琴酒相乖念居者已賦乎露濕寒草悲行者則想乎月映清淮蓋旨哉月以隂而合德水為坎而處柔或麗天而成象或紀地而引流契仁者之理靜含道門之清幽有二美矣允孚于休將以求古之情多聞是務一則以紀其善一則以垂為裕以灰厭暈不學淮王之方進牘抽毫空作謝莊之賦月明星稀賦以大明流光羣曜自戢為韻韋琮伊圓光之未呈觀列象之繁星忽升輪以委照齊掩縟而韜精天宇無雲意姮娥之可覩金波出海覺婺女之迷明爾其兔影高輝榆光潛靄沖融者寥落或存隱映者蒼茫自昧仰著明而下分融朗驚有爛而全迷光大美矣夫星沉四裔月麗中央以合璧之華彩掃連珠之衆光有北微分於辰極維南屢失於昊蒼奕奕三台既暫容於出沒熒熒五緯亦具體而微茫時則俯燭地隅斜臨海嶠寫碧落以增麗拂金風而引耀使占蜀國當曖昧而何知賢聚潁川豈低昻而自照的的悠悠蟾孤桂秋離離兮弄影如晦皎皎兮澄明不流萬家盈手之時望牛女而才見千里同心之際美烏鵲而追逰且樂彼無私失乎躔次焜煌河鼓羃䍥天駟初朣朧出地似懷德以增輝忽粲爛經天知畏威而有自既而夜久凝徹時無埃氛銀華炫晃以將落珠彩蕭踈而掩羣且共歎於隂靈因悲鵲化如欲觀其分野豈辨天文儼若咸賔稀然且集知至明之難競故不耀而相襲則水朝宗未足以為喻火就燥孰云其可及吐皓魄以流空掩繁光而載戢明月照積雪賦以孤光上燭寒彩下凝為韻月麗天而配陽雪抱隂而體剛輪合太虛類呈祥於往漢尺盈平地亦表瑞於我唐清虛洞照皓質練張配金精而可久稟水德而為常月吐危峯自掩瑶階之迹雪凝平野誰分玉兔之光高卑交映動靜有方一則向晦而引曜一則候明而昭彰同聖人之潔白類君子之行藏俯而察之謂履玉山之玉逺而望也謂覩燭龍之燭影能相扶德且不孤朣朧相映若有若無虧盈足為物鑒朴素可與道俱夜久彌明鵲繞林而就侣室虛生白人味道以自如當其雲卷天高氛銷鏡朗曠碧霄明媚之色失白鷴飛舞之狀臨北堂而可鑒曵穿履以遐望姢姢若晝高臨舊井之中淅淅驚風疑落孤松之上光臨皓璧氣引凝寒混金波而曜潘室交素彩而鄙齊紈入秦臺且不慙於清鏡彈楚曲寧有愧於幽蘭懿夫夜已深兮月猶在雪未消兮夜將改照曜氷壺之質掩映瓊林之彩月之德也明而升雪之體也白以凝圓虛色徹柔祗氣澄故得二美相貫兩氣含𢎞謝莊玩而成詠袁安寐而莫興原夫象在於上形成於下德無不施物無不假比同塵之叶美異投珠而見捨倘委照以無私願不遺於微者月中桂樹賦以中秋夕望光彩扶踈為韻趙蕃圓月如霜有仙桂兮宛在中央映澄徹之素彩逗葳蕤之冷光杳杳低枝拂孤輪而挺秀依依密樹侵滿魄而含芳觀其皓爾方凝翛然不改隨升沉而自若貫盈缺而長在敻羃羃而臨空杳萋萋而發彩同蟾蜍之片影似濯瑶池異珊瑚之幽藂徒生滄海埃壒初歇關山正秋空泬寥而逾淨色冉弱而彌幽謂扇花薄如圭玷浮望玉露之初垂遙疑滴瀝聽金風之乍起逺若颼飀皎皎孤懸亭亭相向才分杳靄之質微辨輪囷之狀諒攀援而莫及寧欲淹留歎音塵之未期空勞曠望嘉其竦本無地分輝有餘轉低影於穹碧擢幽姿於皓初訝姮娥之繪成文逾靃靡並秦鏡之照出勢自蕭踈斯所以亘雲路委天衢弱質中植纎條外扶亂彩時搖起飛飛之驚鵲澄波靡隔掩歷歷之高榆是故邈彼輕霄呈兹永夕紛敷逺瑩偃蹇旁射夾餘霞而暫丹經斜漢而彌白臨紫極而天香不散指北斗而仙花可摘况其逺象朣朧桂子𡨕空惜迢遰而遐想况嬋姢而內融素色不雕自挺雪霜之外清隂廽泛頻移霄漢之中何必詠招隱卧幽藂庶高枝兮可折願逍遙於蟾宫第二同前韻楊真宏月滿於東桂芳其中因澄輝之皎潔見幽茂之玲瓏炫凝冷於清夜寫濃纎於碧空逺莫致之詎攀折以盈手光可鑒也覺清明之在躬夫擢本隂靈流形永夕稟玉燭之和氣潤金波之滋液枝徘徊而若垂葉靃靡以如積同作繢於團扇想孚尹於尺璧悠悠歷歷宜乎凛秋滿虛輪而挺秀瑩白暈以含幽天邉無風孕香氣而不散草上有露泛花光而若浮異夫高謝地靈妙融真宰籠玄兔以不動映素娥而如在太陽讓美收若木之餘暉列宿懷慙掩白榆而沉彩既寒暑無變亦古今不殊是知託其所終乃異顛而不扶二氣初分誰見哉生之質三光不息斯無朽蠧之虞與燃薪之殊患同瑞草之共舒事相傳於托實勢終類於慿虛樓上含華映網軒而列耀園中委照益嘉木之蕭踈千里共瞻九霄之上春冬無清淨之景朒朓闕婆娑之狀及素秋之節信謂逢時當明德之年何憂掩望耻片玉以齊價笑三珠之可尚彼藂生因地森挺陵霜驗植物之斯美杳神功之可量垂蔭何方乃傳天之下界結根何處宛在月之中央又安能較其小大齊其短長冀一枝兮可得故驤首以觀光玉鈎賦以常協政經故無朓朒為韻張仲素月以隂德玉聞夜光伊在天而成象杳如鈎而可望每映樓而皎皎類照廡之煌煌隱見以時兮不愆其候虧全有節兮此惟其常當其霽景方晚清飇既涼瑩迢遰之初魄出西南之一方韜皎皎之輝尚潛玄兔呈纎纎之狀詎假白狼矧乃就盈之姿曲成是愜從三讓而載吐表四序之克協侔雕瓊之異象契舒蓂之數葉臨洞房之內猶隔瑣窗隱遙城之隅乍明粉堞觀夫媚霜煙挂遼敻悟如圭之有始知合璧之將聖既麗天而作則亦順辰而為政彎環而素彩未流蕭散而丹霞始淨所以增思婦之獨愁發詩人之興咏豈止生彼海澨煥乎天經况於玉以比德復如鈎而效靈落魚浦之間偏宜泛影垂朱簾之側宛似分形思其逈出隴隂漸登雲路每因躔而進晷乃就新而去故沉澄寥之碧空麗柔明之微素曷蛾眉之足儔豈玉璜之能喻然而合其道也則圓景不渝順其化也而盈缺或殊當未光之時所明若昧自哉生之外其有如無且色依微於林表晦見西方之謂朓光掩映於暘谷朔出東隅以為朒今異此而守度諒君明而臣肅故其賦玉鈎之輝輝誠可增金波之穆穆第二同前韻紇干俞日云莫矣月出之光始如鈎而可辨亦方蛾而乍揚太隂表精知就盈之所漸司厯紀候見哉生之有常原乎內職既修隂事允叶故得啓臨照於品類彰運行於紀牒上迷山桂之藂稍應階蓂之莢沉碧水以輝動挂珠簾而影接孤懸亳野狼銜虛貴於殷年逈燭汾隂鼎見方慙於漢葉高凝雪映朗若氷淨懷逺戍於虛弓望征人於破鏡將以洞纎芒而並深鑑符隂德而昭聖政豈比夫空驚思婦之心載發詩人之咏彼鏘珮鳴環之侣瑶階玉砌之庭徘徊瞻乎爽朗晼晚俟其清熒披霧才升綃幕誤傳於盈手流天未滿璅窗徒訝其分形奚必效重輪之慶表三珥之靈然後可以光帝典而耀祥經者哉是知淪精蟾兔亦此之故比質瑾瑜其美何無所以澄清景於天杪蕩浮埃於物表倐周流於皓璧漸泛濫於靈沼千門始麗以涓涓午夜俄分而皎皎禮有讓遂成其魄政以齊勿謂之朓昔也示沖於朏謫見乎朒諒無徴於次舍斯有斁乎遲速今聖后垂統纎阿為僕本其位于西方正其居於北陸明大易致逺之義合升歌向中之目夫然則罔差於常度所以集帝臺之祉福文苑英華卷七
