body:
  text: 文苑英華卷一百十七宋李昉等編寶三明珠賦一首海客探驪珠賦一首珠還合浦賦三首商丘開泳得明珠賦一首西域獻徑寸珠賦一首鍛破驪龍珠賦一首投人夜光賦一首蟻穿九曲珠賦一首明珠賦王奉圭歷衆珍以探美惟明珠之獨妍自然虛靜不假雕鐫光熠熠以照物勢規規而抱圓西山之下隨珠星而隱見東海之上逐明月而虧全故能色奪琉璃光射金玉鮫人泣吳江之際遊女弄漢臯之曲在蜀郡而浮青居石家而自緑無脛而走有感必通去映魏車之裏來還合浦之中垂輕簾而璀璨綴珠網之玲瓏然明鑒不渝一作然則鑒微不渝竒如疑何一作可賞觀之則符彩溢目捧之則分明盈掌使野客取於驪龍仙帝歸之象罔豈直水懷川媚夜光晨朗而已哉偉夫宛轉周流通冥洞幽物有求於我我於物無求是則文魚謝恩將我酬於漢室靈蛇報德將我答於隨侯則知珠之為用久矣為用疑深矣一丸則鶴贈於噲參見搜神記九曲乃蟻穿於夫子所貴臧於寶匣不可避於金市有被褐之士懷而不厭敢向君以暗投請不驚於按劍者也海客探驪珠賦以上下其手擘波及龍為韻張隨靈海洶洶爰有泉兮其深九重中有明珠上蟠驪龍難犯之物兮不可觸希代之珍兮不可逢矧夫淵淪之莫䆒曷揭厲之能從爰有海客賁然來適利實誘衷舉無遺策乃顧而言曰見機而作不索何獲我心苟専而至寶可取我力苟定而洪波可擘既覽川媚之容遂探夜光之魄伊彼勇者吁可駭也俯身於碧沙泉底揮手於驤龍頷下所謂明淺深斷取捨而已觀其發跡潛往澄神默想俄徑寸以盈握倐光輝而在掌初解磧礫訝潭下星懸稍出漣漪謂川旁月上鄙鮫人之慷慨殊赤水之象罔然則冒險不疑懷貪不思幸竊其寶幸遭其時向使龍目不寐一作昧龍心是欺則必奪爾魄啖爾肌救蒼黃之不暇何採掇而得之想夫人不亦危矣驗乎事良亦凄其則知計非爾久利非爾有必以其道亮自至而無脛是忽其生奚獨虞於傷手亦由貪夫狥財自貽伊咎君子逺害唯儉是守故車乘見驕於宋客驪珠垂誡於莊叟於戲我躬不保雖寶謂何彼險不陷雖珍則那子産常譏於狎水仲尼昔歎於憑河因政則來格感恩則匪他漢武帝受報於昆明之岸孟嘗反輝於合浦之波豈與彼而同科哉驪龍之泉物不敢入緯蕭之子一以何急其父乃鍛其珠勗其習能往也可及不能往也不可及珠還合浦賦以不貪為寶神物自還為韻尹樞驪龍之珠無脛而至駭浪浮彩長川再媚回夜光之錯落反明月之瑰異非經漢女之懷寧泣鮫人之淚狀徴既往莫䆒奚自偶良吏兮斯來遇貪夫兮則閟想夫旋返之儀圓明可期輝如電轉粲若星馳光浦溆竄蛟螭映沙礫晃漣漪在暗而投誠則悲路人未鑒沉泉而隱亦常表帝者無為欣出處兮據德幸浮沉兮中窺是以特表殊姿潛懷有道中含逸彩上繫𤣥造醜當時之叨餮應為政之美好真列郡之尤祥實重泉之至寶於是煥清瀨輝淺灣奔璀璨走斕班豈能與石前却隨流往還泛連波之下盈一水之間而已哉茲川兮始明老蚌兮勿剖瓴甋兮罷笑瓊瑰兮莫偶抱圓質而胥既揚衆彩而未久方載沈而載浮且曷浣而曷不玉非寶泉戒貪實為國之司南誠感神德繄物在為政之不咈愚是以頌其寶而悅其人美斯政而感斯珍想沿洄於舊渚念涵泳於通津則知美政不逺嘉猷入神故中潛皎皛下沉奫淪轉則無纇磨而不磷誠丹泉之莫擬諒赤水之非珍苟或疑此為虛誕願徴之於水濵第二同前韻陸復禮珠行藏兮與道為鄰政善惡兮感物生神私以務貪必去土而匿耀光之崇儉則還浦而歸淳我政無纍匪求而至宛若中流昭一作照然明媚對三光而分色契一德而潛致盈虛無勝一作朕不隨月魄以哉生往返有孚殊異奔星之出使徒見其表跡罔知其奚自覩映水之新規謂沈泉之初棄為人利也且一貫以稱珍與衆共之雖十斛而不匱然知此珠之感唯政是隨當政至而則至偶俗離而則離人而無道兮不去何以人而有德兮不復何為止舊浦而可採同暗投而在斯質若纍纍疑照疑作㸃綴於霄漢色仍皎皎終炫耀乎漣漪且夫彼邦政悖我則為不居之物彼邦政閒我則能應道而還豈専巨蚌是剖實惟無脛而走將不貪以共存非甚愛之能守浦之不吝任變化以往還珠之員來此二字賦中屢用案書秦誓若弗云來正義曰員即云也集韻云通作員不可妄改辨政理之奸不誠可以孚明可以久處泥沙而有光知進退而不苟利用溥博何必取之于龍頷報德宏多奚猶得之於蛇口其來也所以輔正其去也所以戒貪警循良之夕惕俾傲狠以知慙勿以珠為藴蓄勿以珠為珍好且還浦而難期且離邦而難寶將守之而勿失在間邪以存道第三同前韻令狐楚物之多兮珠為珍通其貨而濟乎人才披沙以皛耀儀疑作俄錯彩以璘玢避無厭之心去在他境歸克儉之政還乎舊津繇是觀德孰云無神相彼南州昔無廉吏富期潤屋貪以敗類孤漢主析圭之恩奪蒼梧易米之利濫源既啓真質斯閟從豫舊而不􅵺一作遐諒天視兮有自孟君來止惠政潜施欲不欲之欲為無為之為不召其珠珠無脛而至不移其俗俗如影之隨爾其狀也上掩星彩遙迷月規粲粲離離與波逶迤乍入潭心時依浦口驚泉客之初泣疑馮夷之始剖依於仁里天亦何言富彼貪夫神之所不沙下兮泥間韜光而自閒映石華之皎皎雜魚目之鰥鰥豈比黃帝之使象罔𤣥珠乃得藺生之詭秦主荆玉斯還繇是發潤洲蘋增輝岸草水容益媚澤氣彌好川實效珍地寧愛寶隱見諒符乎龍躍虧全非繫乎蚌老豈惟彰太守之深仁可以表天子之至道觀夫杲耀外徹英華內含飾君之履兮豈不可照君之車兮豈不堪猶未遭於采拾尚見滯於江潭雖舊史之録與前賢之談終思入掬以騰價永得書紳而厲貪於惟明時不貴異物徒飭表者招纍而握珍者難屈是珍也居下流而委棄歷終嵗而堙鬱望髙鑒兮暗投幸餘波之洗拂商丘開泳得明珠賦王季友専心所感僞物皆成若商丘之始泳得明珠於至精以荷畚之窘揖乘軒之榮曽狎侮之不暇孰招延而有情惟此翁者古之愚也存已性之任真謂人言之無假守其抱朴之意不知玩人之事信河水之深曲是寶珠之所置洪流沃日吁萬丈之層潭絶岸排雲抱千艘之險地無鳥獸之敢近豈泥沙之可得何長舌之見欺遂投身於不測膺騰於泉客之繳疑足跡於馮夷之域奫淪未逺覺圓質之當捫滉漾無涯見孤光之上逼於是握照乘之珍出重泉之濵星輝耀掌雪彩環身當太陽之益照射衆象而驚新虛白無瑕粲瓊華而納景清規半濕炯氷狀而流津足使居常者駭異輕薄者居厚瞪睢盱之拙目鉗胡盧之笑口不待驪龍之睡無勞巨蚌之剖超萬頃而一合由素無而忽有彼非他能道在至信苟至疑作志氣之克専實神靈之與進脫用心之疑惑必在物而多吝故事無可否精求乃獲泉非合浦尚謂出其明珠地比荆山固可營其拱璧彼移山於海飲羽於石皆非自然之致力繄敢而後適西域獻徑寸珠賦以澤浸四荒非寶逺物為韻吕頴西域遐方獻純精之天産申重寶之帝鄉豈不以至誠感而靈必自順惟德動而坤珍莫藏不然何有慕於中土而走無脛於外荒彼珠之靈積隂之魄禀金氣而堅固韞河潤之耀澤布指而小大無差洞物而纎毫不隔迥夜常滿初月每讓其圓明爽曙欲凝髙星自掩其孤白信殊方所祕亦希代難致奪夏璜以為美齊楚璧而積異將配天光以輔三助皇明而照四積石峯峻燉煌路逺馳輝於晦磧之中流皛於白日之晚將為表龍旗而綴鸞輅必將汙疑池臺而耀宫苑殊不知以一作可萬邦為慮一作獻者此獻則違以三德為寶者此寶則非價越千金我當俯念其十産一作虛光含徑寸吾將靜照於九圍乃遂況泉而反朴俾其媚川而自輝且立德者惟儉之本作貢者亦土之任剖蚌而獻既不編於夏書為器之成尚有干於時禁苟奪山川之精魄是虧雨露之恩浸所以前代有訓不珍異物誇齊威者再論而皆慚求蘇則者一言而自屈豈若我全明德體大道照耀也不假隨侯之珍貞靜也自同象罔之寶由是化中國而及外夷如風之偃草鍛破驪龍珠賦李迪彼津之叟兮愛子何多碎驪龍珠兮心赤疑匪他為教誡之大者猗嗟乎其義則那夫此珠者寶之至也産乎北海之重泉在乎驪龍之頷下海茫茫兮不測龍呀呀兮若鬭當求利以輕生因沒波而直透潛行伏踴既驚且覯賣萬死以觸鱗幸一冒而匪寇父兮畜我子則告之曽是憑怒無然小慈斥其珠而不納乃命石以興詞且龍之得水變化無已奮迅而江海沸騰一噴而雲雷四起攖拏山石碎摽捎林木靡不遇睡之時必為韲粉矣於焉抗手勃然瞋目當鍛孰云於徑寸贖罪寧論於十斛因而鍛之星芒迸燭雖有虧於照乘亦無譏于毁櫝豈不知貴踰雙璧價重連城鬻之可以求富獻之可以取榮將以謀孫翼子慎檢而行平窒苟偷之路安和性命之情不然者象罔得之而何重天吳得之而何輕如此則南華之道尊真經之教貴以證輕重之戒以拂夸矜之纍俾龍全難得之珠人獲不貪之利揚風激俗淳源化被酌斯事之為言繄可以用之而無既投人夜光賦梁德裕士有作吏君之具臣玉無能以藉手貨不足於藩身曠嵗月緇風塵為大夫兮既屈因君子兮求伸載剖厥蚌將投於人恐魚目以相衒乃龍頷以取真得徑寸之寶是千金之珍表裏照爛晶光洞徹體有象而至圓色無瑕而自潔滿若墜露明如積雪髙秋之夜月孤上長河之曉星未滅懿此特達湛夫龍光掩趙壁十城之價合吳鈎千户之鄉不假琢磨自無白圭之玷匪同銷鑠乃越黃金之剛願輝君之掌握而燭君之殿堂必將光輔上台儀形大道慙魏車之承照哂夏璜之有考考瑕纇也出淮南子遇物則遷從人攸好飾春申之履曰非難得之貨還太守之邦蓋是不貪之寶傳可歷代賞無溢尤復喜鑒於明哲敢自陳於暗投勿以無媒按劍而相拒勿以無脛委地而不攸疑同作貢於楚國而便契於隨侯俾懷寶之君子盡銷聲而莫遊蟻穿九曲珠賦以延一縷以尋之為韻楊濤蟻為質兮微渺珠有竅而虛圓苟一縷之是繫雖九曲而可穿當通幽以洞微絲莫能貫俾有條而不紊蟻可知先始蠢蠕以中出稍連綿而外延豈不以內彼鴻輝曵兹纎縷才容小往之徑乍見規行之迂於武切曲回貌見集韻入惟追典疑窮瑩質以誠難途匪履端觀巧厯而可數宛轉而進縈紆是尋似登折坂之峻如出重泉之深始九折以漸逹終一貫而克任去似洞中方遊剖蚌之質動殊牀下奚聞鬭牛之音是知聖者之使宛如窮理誠在小而罔遺俾入微而有以蟻周遊而在內進必束身絲抽縷以貫中出如繞指隔青縈而可見如遙一作徑繞而未已苟非委實而行之安得茹柔而展矣詰屈若茲周流出之當曲轉之中才可容髮既旁通之後亦既牽絲苟柔弱之是引則繚繞而奚辭雖云曲徑而入終殊在垤之時斯則貫纍纍而匪四逹規規而如一求蹊而投彼夜光出室而曽非時術兹蟲也小而近智故可以穿無纇之質文苑英華卷一百十七
