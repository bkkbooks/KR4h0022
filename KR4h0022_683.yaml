body:
  text: 文苑英華卷六百八十四宋李昉等編邊防下與契苾將軍書一首與程將軍書一首諫雅州討先羌書一首為建安王與安東諸州軍事書一首為江東節度使破餘姚草賊龔厲捷書一首代李侍郎與宣武韓司空書一首上周相公書一首祥瑞為建安王答王尚書一首賀張徐州得白兔書一首醫藥與洛陽名流朝士乞藥直書一首寄裴舍人遺衣藥直書一首與寧王憲等書一首邉防下與契苾將軍書王勃昊天不忱哲人終否畢公逝矣傷如之何敬想情則懿親義惟良執非夫人之為慟其誰為慟乎僕與此公早投交公夷險之際終始如一常思並建忠孝之迹共申家國之讐而負一作有壯志不就古人所悲何圖一旦長訣嗚呼哀哉管仲不存叔牙空在子皮巳喪子産何依興言追昔良增痛悼適得韋四郎書其承大郎雅意知欲以此公碑志託夫一作之下走夫撫今懷昔理寄斯文旌德叙功事屬知已是以子期幽思感叔夜之形言伯喈雄藻一本作伯雄藻才非待林宗而無愧下走雖不敏幸託深期此而不為誰當為者但恐位卑先達才非拔萃虛承厚眷不副髙聞聞一作意耳謹遣舍弟勛往靣取進止臨書啜泣慘惶不次與程將軍書駱賔王昨見武郎將備陳將軍之言恩出非常談過其實恭承集作問嘉㑹深用慙惶君侯懷管樂之才當衛霍之任豐功厚利盛德在人送往事居元勳蓋俗智足以崇集作興王業道足以濟蒼生尚且屈公侯之尊每集無每字申一作伸管庫之士若僕者天地中一無用芻狗耳粵自旌賁之辰即逢聖眀之歷材不應務不能成佐命之功智不適集作通時不能包周身之防加以天資木強不能屈節權門道集作地隔蓬心不能賈名時議常願為仁由巳喪我於吾見機可以絶機無用之為有用隨時任其舒卷與物同其波流者矣其於木也班垂無所錯集作措其鈎繩其於駕也良樂無所施其銜䇿不悟聖朝發眀敡之詔集作制君侯緝雍熙之道曲垂提奬廣賜亦作措游談謬集作猥以樗櫟之姿沗預賢良之薦當今鴻都富學麟閣多英非游夏不可以升堂非䕫牙不可以擊節儻使片言失德事暴區中匹夫竊議語流天下進乖得賢之舉退貽薄德之譏恐不肖之軀為高眀之纍耳必能一眄增價九術先登燕昭為市駿之資郭隗居禮賢之始則當效駑駘之用飾固陋之心陶鑄堯舜之典謨憲章文武之要道集作道德上以究三才之能事下以通萬物之幽情將使詞翰為行已外篇文章是立身正集作政路耳又何足道哉言而不慙者恃惠子之知我也所恨禁門清切造就無緣官事集作守牽纒程集作風期有限某尚期辭滿儻泛孤舟萬里湮波舉目有江山之恨一作限百齡心事勞生無晷漏集作刻之歡嗟乎流水不窮浮雲自逺霑襟此别把𬒮何時特以平生之私忘其貴賤之禮幸勿為過謹不多談右二篇與將軍書非論邊事也諫雅州討生羌書陳子昻將仕郎守麟臺正字臣陳子昻昧死上言竊舊唐書作臣聞道路云云國家欲開蜀山自雅州道入討生羌因以襲擊吐蕃執事者不審圖其利害遂廢梁鳳巴蜒兵以狥之臣愚以為西蜀之禍自此結矣臣聞亂生必由怨起唐書作於怨雅州邉羌自有國唐書集本並作國初巳來未嘗一日為盜今且且唐書集本並作一旦無罪受戮其怨必甚怨甚懼誅必蜂駭西山西山盜起則蜀之邉邑不得不連兵備守兵久不解則蜀之禍構矣昔後漢末西京喪敗蓋由此諸羌此一事也且臣聞吐蕃桀黠之虜君長相信而多奸謀自敢抗天誅爾來向二十餘載大戰則大勝小戰則小勝未嘗敗一隊亡一矢唐書作夫一本作卒國家往以薛仁貴郭待封為暴虎之將屠十萬衆於大非之川一甲不歸唐本作返又以李敬𤣥劉審禮為廊廟之宰唐書作器辱十八萬衆於青海之澤身為囚虜唐書作身囚虜庭是時精甲勇士勢如雷雲然竟不能擒一戎馘一醜至今而關隴為空今乃欲以李處一為將驅憔悴之兵將襲吐蕃臣竊憂之而為此虜所笑此二事也且夫事有求利而得害者則蜀昔時不通中國秦惠王欲帝天下而并諸侯以為不兼賨不取蜀勢未可舉乃用張儀計飾美女譎金牛因間以啖蜀侯蜀侯果貪其利使五丁力士鑿山通谷棧褒斜置道於秦自是險阻不關山谷不閉張儀躡踵乘便縱兵大破之蜀侯誅賨邑滅至今蜀為中州是貪利而亡此三事也臣聞吐蕃羯虜愛蜀之珍富欲盜之久有日矣然其勢不能舉者徒以山川阻絶障隘不通此其所以頓餓狼之啄而不竊食也今國家乃亂邉羌開隘道使其收奔亡之種為嚮導以攻邉是以借冦兵而為賊除道舉全蜀以遺之此四事也臣竊覩唐書集本並作觀蜀之西南一都㑹國家之寶庫天下珍貨聚出其中又人富粟多順江而下可以兼濟中國今執事者乃圖僥幸之利悉以委身西羌得西羌地不足以稼穡財不足以富國徒殺無辜之衆以傷陛下之仁糜費隨之無益聖德又恐僥幸之利未可圖哉此五事也夫蜀之所寶恃險者也人之所安無役者也今國家乃開其險役其人險開則便冦人役則傷財臣恐未見羌戎巳有奸盜在其中矣往來益州長史李崇真將圖此奸利傳檄稱吐蕃欲冦松州遂使國家盛軍以待之轉餉以備之未二三年巴蜀二十餘州搔唐書作騷然大弊竟不見吐蕃之靣而崇真贓錢巳計巨萬矣蜀人殘破幾不堪命此之近事猶在人口陛下所親知愚臣唐書作臣愚意者不有奸臣欲圖此利復以生羌為計者哉此六事也且蜀人尫劣不習兵戰一虜持矛百人不敢當又山川阻曠去中夏精兵處逺今國家若擊西羌掩吐蕃遂能破滅其國奴虜其人使其君長係首北闕計亦可矣若不到如此臣方見蜀之邉陲不守而為羌夷所橫暴昔辛有見被髮而祭伊川者以為不出百年此其為戎乎臣恐不及百年而蜀為戎此七事也且國家近者廢安北拔單于棄龜兹放踈勒天下翕然謂之盛德所以者何蓋以陛下務在仁不在廣務在養不在殺將以此息邉鄙休甲兵行乎三皇五帝之事者也今乃狥貪夫之議謀動兵戈將誅無罪之戎而遺全蜀之患將何以令天下乎此愚臣所不甚悟者也况當今山東饑關隴弊歷嵗枯旱人有流亡誠是聖人寧靜思和天人之時不可動甲兵興大役以自生亂臣又流聞西軍失守北軍不利邉人忙集作惟非動情有不安今唐書有又字復驅此兵投之不測臣聞自古國亡家敗唐書作亡國破家未有集作嘗不由黷兵今小人議夷狄之利非帝王之至德也唐書有又字况弊中夏哉臣聞古之善為天下者計大而不計小務德而不務刑圖其安則思其危謀其利則慮其害然後長享福祿伏願陛下熟計之為建安王與安東諸州軍事書前人月日清邉道行軍大總管建安郡王攸宜致書安東諸州刺史并諸將部校官屬等初春猶寒公等久統兵馬勤國捍邉不至勞弊也其如常以此賊中頻有人出來異口同辭皆云逆賊李盡滅巳死營州饑餓人不聊生諸蕃首領百姓等唯望官軍即擬歸順前後繼至非止一人某先使人向營州昨回具得父老密狀云賊勢窮蹙去正月上旬有妖星落孫萬斬營中其聲如雷賊黨離心各巳猜二夭殃如此人事又然平殄凶渠正在今日大軍即巳二月上旬六道並入指期尅剪同立大勳請公等訓勵兵馬共為掎角開國封侯其機在此幸各勉力以圗厥功尋當更使人續往先此不具為江東節度使破餘姚草賊龔勵捷書巳見五百六十七卷代李侍郎與宣武韓司空書吕溫某以菲才謬當重任事關國計動限軍期撫事知難夙夜憂積蓋以運路擁滯私鹽撓法力非有司所及唯託方鎮至公伏惟司空文武全才勳德茂著朝廷毗倚中外具瞻勤王則知無不為憂國則言皆可復今春過日獲拜旄集作旌麾眷私之餘巳列集作及此事䝉許同志立法叶力狥公對敡之初便具聞奏所以遣裴郎中往申朝㫖議立規矩悉令咨託大賢非敢專行鄙見昨得巡按狀報伏承司空德量旁通忠誠感發急公家之病同職司之憂鹽法隄防巳行文牒斗門同塞許有商量率先諸侯首贊王度義形九牧忠動三軍意開而逺近承風言發而神眀知感况某奉職之分承眷之深受賜懷仁豈同常等銘戴所至無喻下情上周相公墀書杜牧某冉拜伏以大儒在位而未有不知兵者未有不能制兵而能止暴亂者未有暴亂不止而能活生人定國家者自生人以來可以屈指而數也今兵之下者莫若刺伐之法詩大雅維清維清是頌非雅奏象舞之篇曰維清緝熙文王之典迄用有成維周之禎象者象武王伐紂刺伐之法此乃文王受命受殷王専征之命也七年五伐晋戰陳刺伐之法遺之武王武王用以伐紂而有天下致之清平為周家之禎祥周公居攝祀文武於清廟作此詩以歌舞文武之德其次兵之尤者莫若鈎援衝壁今之一卒之長不肯親自為之詩大雅周公皇矣美周公之詩曰以爾鈎援與爾臨衝以伐崇墉臨衝間間崇墉言言此實文王伐崇墉傳于其城以臨車衝鈎援其城文王親自為之夫文王何人也周公詩之夫子刪而取之列於大雅以美文王之功德手弦而口歌之不知後代之人何如此三聖人安有謀人之國有暴亂橫起戎狄乘其邉坐於廟堂之上曰我儒者也不能知兵不知儒者竟可知兵也竟不可知兵乎長慶兵起自始至終廟堂之上指蹤非其人不可一二悉數高宗朝薛仁貴攻吐蕃大敗於大非川仁貴曰今年嵗在庚午不當有事集作于西方此乃鍾鄧伐蜀身誅不返昨者誅討党羌徴關東兵用於西方是不知天道也邉地無積粟師無見糧不先屯田隨日隨餉是不知地利也兩漢伐虜騎兵取於山東乃集作所謂冀之北土馬之所生馬良而多人習騎戰非山東兵不能伐虜昨者以步戰騎百不當一是謂不知人事也天時地利人事此三者皆不先計量短長得失故困竭天下不能滅朴􅈪之虜此乃不學之過也不教人戰是謂棄之則謀人之國不能料敵不曰棄國可乎牧所注孫武十三篇雖不能上窮天時下極人事然上至周秦下至長慶寶歷之兵形勢虛實隨句解折離為三編輒敢獻上以備閲覽少希鍳悉苦心即為至幸伏增惶惕之至某頓首冉拜祥瑞為建安王答王尚書書陳子昻使至辱書知初出黃龍即擒白鼠凶賊滅兆事乃先知集作徴凡百士衆莫不喜躍鼠者坎精穿竊為盜夜逰晝伏乃是其常今白日投營集作軀素質委命賊降之象理必無疑近冉有賊中信來親離衆潰期在旦夕尚書宜訓勵士卒秣馬嚴威因此凶亂之機乘其敗亡之勢事同破竹無待前茅坐聽凱歌預用欣慰賀張徐州得白書韓愈伏聞今月五日營田巡官陳從政獻瑞兔毛質皎集作全又作皎白天馴其心其始實得之符離安阜屯田蜀本作屯屯之役夫朝行遇之迫之弗逸人立而拱竊惟休咎之兆天所以啓覺于下依類託喻事之纎悉不可圖驗非睿智慱通孰克究眀愈雖不敏請試辨之兔隂類也又窟居狡而伏逆象也今白其色絶其羣也馴其心化我德也人立而拱非禽獸之事革而從人且服罪也得之符離實戎蜀本作我國名又附麗音離也不在農夫之家田而在軍田武德行也不戰而來之之道也有安阜集作附之喜喜集作嘉名焉伏聞閣下股肱帝室藩垣天下四方其有逆亂之臣未血斧鑕之屬畏威崩析蜀本作折歸我乎哉其事兆矣是宜具跡表文以承答天意小子不惠猥以文句微識䝉合集作念睹兹盛美焉敢避不讓之責而默默耶一作賀也愈冉拜醫藥與洛陽名流朝士乞藥直書盧照鄰幽憂子學道于東龍門山精舍布衣藜羮堅卧於一巖之曲客有過而哀之者青囊中出金花子丹方相遺之服之病愈視其方丹沙二斤穀楮子則山中可有丹沙則渺然難致昔在關西太白山下一隱士多𤣥眀膏中有丹沙八兩豫時居貧不得好上沙但取馬牙顔色微光净者充用自爾丁府君憂每一號哭涕泗中皆藥氣流出三四年羸卧苦嗽幾至於不免復偶於他方中見一說云丹砂之不精者服之令人多嗽訪知一處有此物甚佳兩必一作别須錢二千文則三十二兩當取六十四千也空山卧疾家業先貧老母年尊兄弟祿薄若待家辦則委骨於巉嵒之峯矣意者欲以開嵗五月穀子熟時試合此藥非天下名流貴族王公卿士於仁惻之心達枯骨朽株者孰能濟之哉今力疾賦詩一篇遍呈當代博雅君子雖文不動俗事或傷心儻遇晏嬰脫左驂而見贖如逢孔子分秉粟以相憂則越石原憲不辛苦於當年矣唯當坐禪念室以答深仁若諸君子家有好妙沙能以見及最為第一無者各乞一二兩藥直是庶幾也仲尼曰有能一日用其力於仁者乎未有力不足者又曰君子無終食之間違仁在坐則參於前在輿則倚於衡古人心可見矣又曰仁逺乎哉我欲仁斯仁至矣言能茍行之仁道不逺也朝英貴士博濟而好仁者何必相識故知與不知咸送詩告請無案劒同掩體骸云爾寄裴舍人遺衣藥直書山信一作僕至自都太子舍人裴瑾之太子舍人韋方賢左史范履冰水部員外郎獨孤思莊少府丞舍人內供奉閻知微符璽郎喬侃並有書問余疾兼致束帛之禮以供東山衣藥之費嗟乎代與道交喪其來尚矣殷揚州與外甥韓康伯别慨然而詠富貴他人合貧賤親戚離因泣下交頥不能自巳余以其為人也名過真一作其實然窮達之際則西狩獲麟所不能逸欵作免斯亦古君子之大悲也自鄶而下曷足譏焉余家咸亨中良賤百口自丁家難私門弟妹凋喪七八年間貨用都盡余不幸遇斯疾母兄哀憐破産以供醫藥屬多穀不登家道屢困兄弟薄逰近縣創巨未平雖每分多見憂然亦莫能取給海內相識亦時致湯藥恩亦多矣晚更驚信佛法於山下間營建所費尤廣本欲息貪寡欲緣此更使貪心萌生每得一物輒歡喜更恨不足嗚呼道惡在而奔競之若兹雖觀苦空無常而此業巳就不可中廢祈一作所獲福慶思與士君子共之與寧王憲等書𤣥宗皇帝開元中昔魏文帝詩云西山一何峻舊唐書作髙高高舊書作高處殊無極上有兩仙童不飲亦不食賜我一丸藥光耀有五色服藥四五日身體舊唐書作輕生羽翼朕每思新唐書作言服藥而求羽翼何如骨肉兄弟天性之羽翼乎陳思有超代之才堪佐經國舊唐書作綸之務絶其朝謁卒令憂死魏祚未終遭司馬宣王之奪豈神丸之效也虞舜之聖捨象傲之愆以親九族九族既睦平章百姓此為帝王之軌則于今數千載天下歸善焉朕未嘗不廢寢忘食興舊唐書作欽新唐書作慕歎者也頃因餘暇妙選仙經得此神方古老云服之必驗新唐書作餌之必夀今分此藥願與兄弟等新唐書作共之同享舊唐書作保長齡永無限極新唐書作偕至長齡永永無限文苑英華卷六百八十四
