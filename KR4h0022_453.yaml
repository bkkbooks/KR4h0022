body:
  text: 文苑英華卷四百五十三宋李昉等編制書六節鎮二授李燧總目作璲平盧軍節度使制玉堂遺範門下跨千里之山河察五城之風俗海物惟錯民庶實繁作我藩侯斯為重寄膺是任選其惟信臣通議大夫檢校工部尚書兼少府監充內中尚使上柱國襲岐國公食邑三千户實封二百七十户賜紫金魚袋李燧鍾鼎垂休勳庸襲慶擅文武之全致藴公忠之大經用富機權學贍韜略智足成務詞能飾身屢更惟月之曹亟踐執金之貴嶠南著招撫之績涇上重訓齊之名英烈之門爾實為冠一作繼於戲乃祖乃父克成元勳惟子惟孫合異常寵是用擢爾于優散之地復爾于節制之雄擁吾朱旗往鎮青社爾其敷我雨露修吾政刑竭舟欵以事君推赤誠以御衆虛已接士傾心禮賢勿恃貴以自驕罔厚斂以虐下使精鋭之號益振於三軍愁歎之音不興於百姓優寵之典吾何愛焉俾遷秩於秋卿仍兼榮於弄印勉𢡟休績克終令圖可檢校刑部尚書兼青州刺史御史大夫充平盧軍節度使登萊棣州觀察處置等使散官勳封如故主者施行授鄭愚嶺南節度使制門下朕推轂求才登壇命將每於邉逺尤屬賢能况雍南地界蠻鄉甫新戎號外虞連歲創痍焚劫之餘上將開藩兵甲繕完之始中權所寄慎固尤難一作慎束固難用回攘接之仁往整律竭之旅某官鄭愚價髙東序氣茂南薰挺超卓之竒名藴精剛之利器詞源獨潛其波瀾經笥莫窮其韜略貯疑自郤堂搴秀儉府增華霜署諫垣聮翩羽翰郎曹史館洋溢聲光益部播戎率之功商嶺著條刺之迹博洽強志居無流心逺略精能動有餘地日者熟其業用委以察亷果能宣布惠和講求利病才報下車之政已蘇闔境之人發為歌謡流滿道路朕以郎寧地分零桂共控夷蠻將以重城鎮於兩江壯服領於西道俾崇旄節用固疆陲而屬統馭有乖拊循生變戎章既失城守已離宜得通敏之材以敷勞來之旨是用輟於鄰部授以軍麾載觀易地之能俾服揚旌之貴既懋師節仍長憲臺勉承顧遇之榮佇觀緝柔之績可守雍州刺史兼御史大夫充領南四道節度觀察處置等使散官勳封如故主者施行授孔溫裕忠武軍節度使制門下朕欲考名實以臨八表明賞罰以正萬幾為官擇人不可廢闕謁郊廟禮之重也設壇場旨之深也稱此劇選屬于僉諧朝散大夫守尚書户部侍郎上柱國賜紫金魚袋孔溫裕才為國華德擅邦傑心徑而行密神清而氣和飛文凌邁於劉曹潔已庶幾於顔閔髙標跂望逈立正途鳯彩葳蕤棲止碧梧之月鶴情瀟灑徊翔紫蓋之煙自步武中朝馳聲內署井泉侍從宣室對敡相如之工爾實無愧河洛神明之政關防惠養之風授以版圖陟于蘭省奉二卿之班列司九典之征徭時論益髙官業彌舉宜申茂典式叶至公朕以長葛故城頴州重地兵甲甚鋭賦輿至殷爰委材能俾膺統馭泊于訓齊師旅潤澤蒸黎導一作追爾前功何煩教令知臣之道不亦至乎玉節彤弓已極儒生之貴儀曹憲印用彰賢帥之威勿替令圖往祗休命可檢校禮部尚書兼許州刺史御史大夫充忠武軍節度陳許蔡州觀察處置等使散官勳賜如故主者施行授鄭涯山南東道節度使制門下王者之於元老碩臣優敬為大茍有繫一作煩於庶務則思尊以寵章中外迭居眷惟僉屬文武二柄揭而授之况弄印之威望已行淚碑之風流未逺將疇茂績以繼昔賢金紫光祿大夫御史大夫上柱國滎陽郡開國公食邑三千户鄭涯鵷鸑瑞時璵璠希代鑒徹止水氣融冬曦聲塵獨邁於軒裳符彩逈髙於輪列多士程凖大朝羽儀禮容全備於身文和易雅彰於心術自承明曉對建禮晨趨參密命於北門演綸言於西掖相如雄麗咸推視草之工孔先莊重空聞言樹之誡屢解交疑於都座兼尹正於二原會府功著於彌綸神州政傳於表則洎登車按部仗節總戎移風有佩犢之謡潔已有挂魚之操輕裘緩帶而師律以貞投壺雅歌而氓俗自泰屬者干旄入覲宣室對敡掌地征而天府既饒執邦憲而朝綱載肅朕以漢臯巨屏峴首名都將鎮上遊必資全德是命輟於副相委以專征仍兼揆路之榮以示啓行之貴敬踐乃位時惟懋哉可檢校尚書右僕射守襄州刺史御史大夫充山南東道節度使管內觀察處置等使散官勳封如故主者施行授髙承恭振武麟勝等軍節度制使玉堂遺範門下宇縣乂安戎夷即敘雖亭障無虞於侵軼而卒乘難廢於訓齊况乎保固邉方控臨雜虜將付戎律是擇良才銀青光祿大夫檢校刑部尚書兼右執金吾衛大將軍御史大夫充右街使上柱國渤海郡開國公食邑三千户髙承恭爾先父勤勞王家式遏邉陲戡定庸蜀事存竹帛功銘鼎彛惟爾承恭克荷堂構學通竒正業擅機謀寬𢎞得大將之風質厚有端人之操早升朝序纍踐寵榮擁緹騎以徼巡勤彰夙夜建油幢以鎮撫績著公忠嗣乃家聲為余爪士朕以單于舊地境接外蕃備紫塞之風煙屏黑山之冦盜是用錫以旄節俾作翰垣於戲張奐守節一作正却酋長之金鐻一作孟非陳泰惟公緘豪右之寶貨遂得羌戎稽顙種落歸心行之非難勉企前哲罔遺訓誡負我知人仍兼八座之崇式重三軍之任保兹終始𢡟乃嘉猷可檢校刑部尚書兼安北都護御史大夫充振武麟勝等軍州節度觀察處置等使散官勳封如故主者施行授髙璩劒南東川節度使制門下南荆舊俗政美劉公西陜芳隂勳傳邵伯我用時傑思齊昔人况梓橦奧區賢彥徊翔之地也稽玉堂之顯效授黃鉞之殊榮輟諸禁林允叶令典翰林學士承旨朝議大夫守尚書金部侍郎知制誥上柱國賜紫金魚袋髙璩潘陸重價曽顔上流機神粹和道業堅白呈瑞質而鳯離丹穴聳孤標而鶚翥一作劒倚青天合圭璧之寒輝咸資逸韻聚雲霞之秀色併在髙文光映古今羽儀中外頃者名場頡頑早振詞科桐閣從容長專奏記乃升華貫爰近赤墀青瑣闥中封章不屈紫微天上詔令無雙王褒真待從之才徐邈擅文儒之譽親提史筆首列諌垣俄參起部之榮遂陟夏官之貴鬱有公望稱於朕心雖密贊大猷誠資敏識而將圖善政亦藉長材眷彼左綿實為雄鎮旁控巴峽髙抗一作問蜀門前以幢蓋劇權委任巖廊舊德歲久而功懋軍嚴而吏安改命廷臣俾嗣仁化按節而去自春徂秋既以疾聞則宣代用爾之俞往得於僉言勉竭公忠用酬倚注豫欲成爾美志故授以儀曹八座之尊豫欲壯爾威聲故帖以憲闥亞相之秩紅旌啓路紫綬登壇當年得之别是殊寵勉務勳業副豫意焉可檢校禮部尚書兼梓州刺史御史大夫充劒南東川節度副使知節度事管內觀察處置等使散官勳如故授畢諴昭義節度使制門下築壇申命推轂就途受幢節之榮分藩閫之寄膺兹重任允屬良臣邠寧鹽慶武等州節度管內營田觀察處置兼充慶州南路救接鹽州及當道沿途鎮寨糧料等使朝散大夫檢校工部尚書使持節寧州諸軍事兼寧州刺史御史大夫上柱國平隂郡開國男食邑三百户賜紫金魚袋畢諴宇量凝曠業履端修抱不器之才懷盡忠之節聲馳文囿學茂儒林掇芳桂於月中擅嘉名于日下自升朝籍畢踐清班屢鎮邠郊頗彰績效得營平屯田之術有伏波備冦之謀曠土多栖畝之糧窮塞無晏開之壘是宜進律以勸將來尹於神州能安疲瘵卑張敞擒姦之稱鄙廣漢摘伏之竒衢路絶赭衣之人閭井稀桴鼓之響用錫武節明余無私乃眷壺關方擇良帥顧惟郇邑思繼成功副我旁求俾爾俞往陟以五兵之秩升于八座之榮服兹寵光佇聞報政可檢校兵部尚書兼潞州大都督府長史御史大夫充昭義節度副大使知節度事充潞滋邢洺等州觀察處置等使散官勳賜如故授徐商崔璵節度使制門下建牙訓戎登車問俗分山河之委寄授旄鉞之寵榮非夫試可之才難膺俞往之命河中晉絳慈隰等州節度觀察處置等使正議大夫檢校户部尚書兼河中尹御史大夫上柱國東苑縣開府子食邑五百户賜紫金魚袋徐商植性忠厚接物通和愛日可觀澄波莫測前宣州都團練觀察處置等使正議大夫檢校禮部尚書兼宣州刺史御史大夫上柱國博陵縣開國子食邑五百户賜紫金魚袋崔璵守道堅固行已端方良玉齊貞霜松比操並以才業優茂纍踐清華或視草於內庭或司言於右掖專一時之美價擅五字之雄詞既彰東里之能周歷南宫之秩洎築壇作鎮按部化人竭爾忠勤副余倚屬進律當升于重地酬勞宜處于近關乃眷漢濵扼東荆郢顧兹蒲阪俯邇郊畿錫以旄幢俾之長理於戲惟惠可以安百姓惟威可以整三軍推誠而人必歸心尚亷而吏將自化謹是四者以綏一方服我新恩勉𢎞善政商可檢校户部尚書兼襄州刺史御史大夫充山南東道節度管內觀察處置等使璵可檢校禮部尚書兼河中尹御史大夫充河中晉絳慈隰等州節度觀察處置等使散官勳封如故主者施行授蔣伸畢諴節度使制門下入則持大政以調化源出則建髙牙以主兵柄安危所屬選任尤難况地壓夷門鎮雄全晉藉機籌以分閫資紀律以臨戎爰得上才乃申並命河中節度使金紫光祿大夫檢校兵部尚書平章事河中尹上護軍樂安縣開國公食邑二千户蔣伸道惟天縱氣實間生靈芝茂三秀之姿威鳯富九苞之彩銀青光祿大夫守兵部尚書上柱國河東縣開國男食邑三百户畢諴峻同嶽立注若川渟祥雲煥五色之章甘雨灑四時之澤而皆備更華貫周歷清途文飛藻麗之詞位藴名卿之望或互參禁署咸稱染翰之功或繼秉國鈞俱播和羮之美以伸輟於台鼎委以旌旄虞城興禮讓之風蒲阪肅關河之禁馳聲甚逺奏課居髙嘉乃懿圖俾遷巨屏以諴萬機所繫微恙忽嬰願辭傳説之舟却曳鄭崇之履今則復佩相印載陟齋壇用光推轂之勞式示彛章之重是咨爾德作于藩垣總梁國三郡之雄控侯衛中條之險於戲代天理物允屬英竒撫俗貞師豈勞戒勵服我嘉命往孚于休伸可檢校兵部尚書平章事充宣武軍節度汴宋毫等州觀察處置等使諴可檢校工部尚書平章事兼河中尹充河中節度觀察處置等使散官勳封如故主者施行授蔡京嶺南西道節度使制門下天賦全才所以登將壇而衛王室國有令典所以舉能吏而懲慢官其有術業優長理行彰顯則宜錫殊常之命行不次之恩乃崇德報功之旨也朝散大夫權知太僕卿充荆襄巴南宣慰安撫使上柱國賜紫金魚袋蔡京學富縑緗文含組繡識略甚逺智能出羣本於孤貞濟以勤恪驊騮躞蹀向天路以無疑雕鶚騰凌入秋雲而不返早以豐藝陟于髙科周旋官途振舉官業簮白筆而獲聞峻節擁朱輪而克播清風班資既崇聞望彌重去歲藩臣失守蠻冦犯邉永令遐長莫窮根本用爾竒事申豫至懷目前而情偽皆分言下而安危可決運深謀而禦敵寧逺裔以成勳適及回車召于便殿敷陳之際備得機宜浣吾憂勤賴爾忠藎遂以月卿之秩俾酬星使之勞爰籍變通更資宣撫載圖嘉績用洽優恩朕濵海而南雍為重地城臨甌駱俗本剽輕居常則委經略之權有事則付節制之任是用改其舊號建以新軍一時之榮千古無對爾其頒惠養以馭衆示寬嚴以訓兵濟活鄉閭保安溪洞貂冠近侍之首鳥府亞相之尊當此寵位宜何如哉於戲特舉徽章直謂殊渥茍或失職吾何望焉勉於奉公勿以為喜可檢校左散騎常侍兼雍州刺史御史大夫充嶺南西道節度使觀察處置等使散官勳封如故授王安實天雄軍節度使制門下虜無南牧漢髙魏尚之功地霸西戎秦用孟明之力平襄舊壤成紀雄軍控壓外夷保障中夏請兵出塞非幢節無以取威謀帥因時非材傑不足授任安邉制勝移孝為忠俾膺紅斾之榮且用墨縗之典正議大夫前守右金吾將軍上柱國大原縣開國男食邑三百户賜紫金魚袋王安實韜鈐宿將勳閥名門家傳淮水之靈神授圯橋之略堅剛不拔捷勇欲飛訓武旅以衛宸嚴握兵符而參禁近匪躬奉上宣力任公剖竹淄川克茂藩條之政執金緹騎彌昭夙夜之勤朕以七萃屯師三秦繕塞屬山西之氣俗扼隴首之咽喉地要而城孤野豐而兵徑張其羽翼可以捍此疆陲壯彼金革無辭戒於􅎏鼓息疑專城之舊制築命將之新壇揆務與能選材伸用苴麻順變聞命登塗載仗出車之令佇揚鎮逺之聲總輯師徒撫寧藩部無邀功以生事勿慢政以啓戎俾老少安懷郊坰靜一假南臺之憲印分北落之朝班勉樹嘉庸以固吾圉可起復忠武將軍守金吾衛將軍兼秦州刺史御史大夫充天雄軍節度秦城河渭等州營田觀察處置押藩落等使散官勳封賜如故主者施行授溫璋王式節度使制門下豳土名藩懿門奧壤理公劉之故國接煬帝之通津控地數千帶甲逾萬非威能肅物勇可貞師則何以備天子之牙爪建上將之旗鼓斷自朕志果叶僉諧武寧軍節度徐泗宿濠等州觀察處置等使朝議大夫檢校左散騎常侍兼徐州刺史御史大夫賜紫金魚袋溫璋稟慶德門騰輝儒苑節峻大玉氣敷早春立言鏘韶濩之音行已植松筠之操嘗以懿問列于通班佳聲克著於埋輪善價益彰於題柱纍换符竹頗洽謳謡前歲察俗苑溪分麾沛邑禍息􅍉蒲之盜風行鈇鉞之權前浙江東道都團練觀察處置等使銀青光祿大夫檢校左散騎常侍兼越州刺史御史大夫上柱國襲魏郡開國公食邑二千户王式文動星芒學通奧旨早以殊藝射䇿明廷孫𢎞之條奏甚精朝錯之鋪陳無闕既升髙第亟踐清途臨事不回當官有守邇者擢自交趾授以浙東果能清越水之波瀾掃稽山之祲氣暫舉十連之化全蘇一境之人而並樂鏡貞明黃陂淡濘風雨不渝於逵節機謀自契於生知爰命疇庸是加一作惟膺𢡟賞乃眷巨屏宜委𢎞材三禮百工俱榮於題劒鑿門推轂共貴於登壇疊是恩光我無愛惜爾宜壯轅門之號令恤閭井之疲羸務農訓兵俾先南牧之備興利除害永絶東顧之虞更樹竒功以酬劇寵璋可檢校禮部尚書兼邠州刺史御史大夫充邠寧節度營田觀察處置等使式可檢校工部尚書徐州刺史御史大夫充寧武軍節度徐泗宿濠等州觀察處置等使主者施行授韋有翼劒南東川節度使制玉堂遺範門下授律中權分憂外閫制彼短長之命握豫生殺之機境壓竇渝封含要害克膺委屬必在忠賢朝散大夫守尚書兵部侍郎兼御史大夫充諸道鹽鐵轉運等使上柱國賜紫金魚袋韋有翼藴德無隅藏鋒向晦行滋蘭畹志茂松心當官澄止水之明臨事出龍泉之利早升台閣備歷清華陳藥石於諌曹司黃素於右掖長纓得俊美價自騰左輔施河潤之功右陜繼召南之愛佐于三典麗刑多哀敬之心二彼五兵整武得弛張之道委兹權管制以重輕才識變通法均寬猛今以劒外之封疆敻邈東蜀之輿賦殷繁慎簡難能俾承重寄是舉報功之典庶協易祿之文於戲荆州思叔子之仁蜀郡愛文翁之化壤界相錯風謡尚存罔使潼川獨無賢守題劒重登壇之貴持綱增攬轡之威往圖嘉庸對我休命可檢校工部尚書使持節梓州諸軍事兼梓州刺史御史大夫充劒南東川節度副大使知節度事營田觀察處置等使散官勳如故主者施行文苑英華卷四百五十三
