body:
  text: 文苑英華卷六百八十二宋李昉等編邊防上武皇帝作相時與嶺南酋豪書一首武皇帝作相時與北齊廣陵城主書一首與周冡宰宇文護論邊境事書一首與章司空昭達書一首貞陽侯與王太尉僧辨書一首重與僧辨書一首與高湝書一首武皇帝作相時與嶺南酋豪書徐陵夫否終斯泰屯極則亨若日月之回環猶隂陽之報復近者數鍾九厄王室中微聖主欽明還承寶運即是高祖武皇帝之孫世祖孝皇帝之子重光纍聖𦙍國承家天下生民孰不歸德賊勃不涯疏戚希纂帝圖信是奸凶階兹禍亂自王宫再淪於醜逆虜馬四飲於江沱社稷阽危鑾輿幽辱勃身居列嶽自御強兵髙視趦趄坐觀成敗既而天維重綴國步還康翻畫凶圖更謀神鼎且其兵馬之任資於長昆方牧之權由於承聖操兄戈而斬姪藉國寵而弒君不忠不義莫斯為甚比春初便遣大都督歐陽頠托通鑑作蹉城主傳泰等凶徒數十遂到臨川吾奉承朝算指畫戎略樊滕耿賈戮力爭驅天地靈祗水陸開道獲傳泰不勞於一箭擒歐陽無待於尺兵僞黨皆俘連城盡拔所收軍資不可稱算去月十六日德州刺史陳法武等願憤回戈仍梟凶竪一夫挺劒傳首上京萬里澄清人神慶躍彼豪門著姓典牧方州拘隔天朝亟離寒暑公私憤歎豈可為懷今王道平夷理增歡忭朱明戒節比復何如軍士平安境內清謐吾以庸薄叨秉國鈞恆務牽纒諸有勞敝自天數云否朝禍荐臻東夏崩騰西京蕩覆身惟許國任在勤王宣力皇家靡有寧歲一還京師保持鴻業四驅夷狄奪得江左始則杜龕元惡張彪不恭據有泰稽連蹤巨震隨機討掩觸向平夷叛臣任約徐嗣徽等屢引齊虜前年末既踐京師江畔邊城皆為戎戍賴貔貅騁力衛霍同心殱厥胡夷不日清殄去年將夏傾國大來鐡騎八千許匹甲士二十餘萬胡塵飛於北闕虜鼓震於南宫躬率偏禆聊與挑戰虜便土崩瓦解投險赴坑大小皆擒鯨鯢盡戮三江之上塞水無流千里之間伏尸相枕生獲大都督蕭軌裴英起東方老李希光王敬寶等虜中驍將唯此數人屢破關西之兵頻取淮右之地一朝俘斬無復孑遺逺邇敬欣華夷怖懾一作懼如聞彼虜稍是危亡尋命熊羆欲就征討方可以雷行趙魏電掃幽并混一車書勢在朝暮而侯瑱跋扈江川公私阻絶即平北賊仍事南征肉袒面縛歸首闕庭即為申聞優其禮秩台儀不貶位遇兼常今所擒歐陽頠傳泰等莫不𢎞宥政爾授其兵馬處以榮祿坦然逰狎無介懷抱年號武平國即清晏君之聞此寧不欣躍但昔緣王事逰踐貴鄉日想山川依然舊識吾既忝荷朝私位逾台衮身持帝王之柄手握天下之圖故鄉如此誠為衣繡故人不見還同霄錦天涯藐藐地角悠悠言靣無由一作因但以情企今者王猷帝載化被無垠浮海窮山罔不咸格投竽負鼎馳步蒼龍崖穴丘園爭趨金馬君之才具信美登朝如戀本鄉不能逰宦門中子弟望遣來儀當為申聞各處榮祿深加將保念嗣音郵今遣某甲等使彼指此不多陳諱白武皇帝作相時與北齊廣陵城主書前人籍甚英風常懷眷屬封疆有限寤寐增勞辱此月九日告深慰情佇方秋尚熱體中何如戎帳艱辛無乃為弊吾以庸薄謬膺台鉉既荷先帝拔擢之恩兼䝉今主責成之寄政一作正以皇齊大德世紹和風方藉威靈庶平讐耻提携小國願預藩臣還詔哀矜許垂容納奉勑須質便遣入朝部下諸將哀吾誠節一兒一弟無所遺吝立志立義無負上天但故丞相諸子及湛海珍等並依勑㫖馳遣渡江主上又遣吏部尚書王通鴻臚卿謝岐等至和州與司馬行臺共為盟誓而蕭軌等决信叛亡茍相陵易鬱從東道馳至北郊既逼宫闈無容靜默兩兩相對俱有損傷彼聞人馬因此奔散且置兵之地溝澗且多退兵之時投赴相積近遣張都來此具是行人所見但廣陵建業才隔一江戰場去岸不盈五里軍人退散理反鄉家緣岸村人復有舟楫且蘆簰荻筏竟浦浮江千百為羣前後相繼吾又勒兵案甲不聼討捕若無恐懼並應安逹假使在此不可更生至彼而殂差非吾過如其枉理必是興軍見伐於有道之人加兵於無罪之國若彼王師如此又是違盟后土皇天山川社稷察其怨語寧容相祐辱告承上黨殿下及匹婁領軍應來江右師出無名此是和義小之事大差無違禮彼之陵我自是乖言𤣥天所伐匹馬無違翻見怨尤一何非理若彼鬼神有知寧可斯背鬼神無知何用盟㰱去歲抑逹摩等石頭天井連月亢陽三子才降連冬大雪黃袍盡沒白帳皆浮既因之以泥塗兼加之以疾疫蕭裴既退雲霧便除從爾以來稍成災旱定知衣冠之國禮樂相承天道不言不容都滅長江渺渺巨浪湯湯如鬪艦舟師詎有深利近梁山之戰即是前車蕪湖之役可為明鏡昔晋侯不能乘鄭馬趙將不能用楚兵一非水土難為騁力揚州卑濕厥土塗泥如遇秋霖杳同江漢假令蚩尤重出白起還生控代馬而陵波躡胡靴而湔水終難逞效詎有成功六州勇士雖有百萬十姓豪傑徒勞千億不能為患斷可知矣昔我平世天下乂安人不識於干戈時無聞於桴鼓故得凶人侯景濟我橫江天步中危實由忘戰自亂離已久人解用兵女子無愧於韓彭童兒不殊於衛霍吳鈎甚利蜀甲殊輕槊動風霜弩穿金石髙樓大艦槩日一作月陵雲叱咤而起風雷吹噓如倒山嶽侯車騎三字一作停車駐馬非國家重將分陜上流近隔以邉塵時虧表疏王途既泰貢賦相望尋令子弟侍奉京邑蕭太保龍驤於賁海王儀同虎視於洞庭若望高峰便當投袂何則凡諸將帥各護家鄉非直吾人獨憂宗社日者頻辱司馬行臺及諸公有告裴行臺當今方邵此諸賢莫非英傑其餘軍士悉是驍雄庸蜀氐羌之兵烏丸百虜之騎以此衆戰誰能禦之何為比吾陪薄相懸何惡十字疑諸君身名俱滅來告以細栁之軍踰於灞上吾恐今之趙括不及廉頗也近張舍人至始奉嚴勑朝廷遣劉叔經仍往啓聞願逹丹誠用停王赫伏計天慈理當懸照此身日月所鍳天地所明豈敢虛言欺望宸極足下既未知始末容有疑怪大軍多士希惠矜一作務𢎞量非此失時騰表疏幸停師旅巳存盟信庶其小國永申藩禮天心無爽邇遐一同一作同知投筆悚慨不復多白陳諱頓首與周冡宰宇文護論邊境事書前人國有三慶民有四安所謂通和是由鄰睦况周陳欵好一紀于兹懷抱相期百世方逺灌瓜之美久勑邉吏拾橡之尤想應無忽梁氏以漸水東為安湘小郡宜立巴州多歷年所此於荆部本包分界近得刺史符元舉啓稱蕭山歸忽遣杜元茂神僧訓等將率人馬踰淄潰疑衍一字涉澌便置城隍謀為侵軼適荷鄰德合州見還不容今眷一作眷顧仍縱蕭氏元舉纍移論及翻相河漢更往研問便騁鋒鏑彼軍人恃勇遂致俘擒聞此紛紜甚以驚歎其商奄餘孽才力甚微為暴邉城良慿大國但情均忌器不可加兵便勑軍司以禮相放且前嵗所大疆城本以南平等五郡輸薦貴朝至如安湘既屬巴郡幸承鄰惠無候涉言放一作故下漸東唯如灃北政是標其大桶屬荆州之界耳彼此方申分好義絶規圖所貴唯和所重唯信夫以南平等郡地壙民豐雲夢之田楚王為寶吳當徑蜀晋拒强秦資彼山川並為州鎮朕若棄其仁義務廣封域寧容延嵗並貢周朝今者和親巳固山嶽而方謀尺寸之土用益蒹葭之地哉幸非竊疾相見鍳容江陵小冦既爾䖍劉前至之言或相誣罔一二因使人宇文平口具其懷耿耿故此相白陳諱頓首與章司空昭達書前人君一作名白日聖朝受命天下廓清所餘殘凶唯有歐紇南通交愛比據衡疑兄弟叔姪盤阻川洞百越之賮不供王府萬里之民不由國家明公受脤嚴冬持兵杪嵗開冰踐露􅌊一作炬火宵行便届含淮乃其神速未騁三略非勞六竒薄交旗鼓仍平醜類自太清之末永定以來所闢疆界不過郡邑今兹赴捷一作接二十餘州若較此功庸方兹英力漢之馬援不能為擬吳之步隲故是相懸况孫處宗之叛徒正槌蕩主耳公私慶快豈可而言且僕一子屯窮妖徒所制五嶺遐敻存亡不測𤣥懷飲淚破膽復全䝉荷英恩保其身命餘年仰戴何力能勝今遣主師某馳往稱慶徐君一作名呈梁貞陽侯與王太尉僧辨書前人此篇移入六百七十七卷贈答門庶幾一事相次今存其目重與王僧辨書已見六百七十七卷與髙湝書宇文憲山川有間每深勞佇仲春戒節履納周書本傳作納履惟宜承始屇兩河仍圖三魏本傳作位二者交戰想無虧德昔魏歷云季海內橫流我太祖撫運乘時大庇黔首皇上嗣膺下武式隆景業興稽山之㑹總盟津之師雷駭唐郊則野無橫陳雲騰晋水則地靡嚴城襲僞之酋既奔竄於草澤竊號之長亦委命於旌門德義振於無垠威風被於有截彼朝宿將舊臣良家戚里俱升榮寵皆糜好爵是使臨漳之下效死爭驅營丘之前奮身畢命此豈唯人事抑亦天時宜訪之道路無俟傍說吾以不武任總元戎受命安邉路指幽冀列邑名藩莫不屈膝宣風導化皆荷來蘇足下高氏令王英風夙著古今成敗備諸懷抱豈不知一木不維大厦三諫可以逃身哉且殷微去商侯服周代項伯背楚賜姓漢朝去此弗圖茍狥亡轍家破身殞為天下笑又足下諜者為侯騎所拘軍中情實具諸執事知以弱卒弊本傳作瑣甲欲抗堂堂之陳縈帶汚城冀保區區之命戰非上計無待于疑守乃下䇿或未相許已勒諸軍分道並進相望非逺慿軾有期兵交命使古今通典不俟終日所望知機也文苑英華卷六百八十二
