body:
  text: 文苑英華卷六百九十一宋李昉等編遷譴上遷譴上中下凡三卷英華所編先年代先後今正之其間又有非遷譴者未詳使東魏值侯景亂與北齊尚書令求還書一首上牛𢎞書一首為人與蜀父老書二首與在朝諸賢書一首在桂州與修史學士吳兢書一首與韋五虛已書一首使東魏值侯景亂與北齊尚書令陳書作僕射楊遵彥求還書徐陵叩頭叩頭夫一言所感凝暉照於魯陽一志𡨕通飛泉涌於疏勒况復元首康哉股肱良哉鄰國相聞風教相期者也天道窮剝鍾亂本朝情計馳惶公孫一作私鯁懼而骸骨之請徒淹嵗寒顛沛之祈空盈卷軸是所不圖也非所仰望也執事不聞之乎昔分鼇命鳸之世觀河拜洛之年則有日烏流災風禽騁暴天傾西柱一作北地缺東門一作南盛旱拆三州長波含五嶽我大梁膺金圖而有亢纂玉鏡而猶屯何則聖人不能為時斯固窮通之恆理也至若荆州刺史湘東王幾一作機神之本元寄名言一作無寄名言陶鑄之餘猶為堯舜雖復六代之舞陳於總章九州之音一作歌登於司樂虞夔拊石晉曠調鐘未足頌此英華一作聲無以宣其盛德者也若使郊禋楚翼寧非祀夏之君龕定京師一作戡定艱難即一作便是匡周之霸豈徒豳王徙雍期月為都堯帝遷河周年成邑方今越裳藐藐馴雉北飛肅慎茫茫風牛南偃吾君之子含識知歸而答旨云何所不投身斯一作其所未喻一也又聞一無此字晉熙等郡皆入貴朝去我尋陽經塗何幾至於鐺鐺曉漏英華作鍾鍾曉鑒恐非的的宵烽隔溆浦而相聞臨髙臺而可望泉流寶蓋一作碗遙憶湓城峰號香爐依然廬嶽日者鄱陽嗣王範治兵匯𣲖屯戍瀹波朝夕箋書春秋方物吾無從以躡屐一作屩彼有路而齊鑣豈其然乎斯不然矣不謂二字一作又近字邵陵王綸通和此國郢中上客雲聚魏都鄴下公卿風馳江浦豈盧龍之徑於彼新開銅駝之街於我長閉何彼途甚易非勞於五丁我路為難如登於九折地不私載何其爽歟而答旨云還路無從斯所未喻二也又一無此字晉熙廬江義陽安陸皆云款附非復危邦計彼中途便當靜晏自斯以北桴鼓不鳴鄰憓所通一無此句自此以南王靈未缺一作封疆未一如其境外脫殞輕軀幸非邉吏之羞何在匹夫之命又此賔逰通無貨殖忝非韓起聘鄭私買玊環吳札過徐躬要寶劍由來宴錫凡厥囊裝行役淹留皆已虛罄散有限之微財供無期之久客斯可知矣且據圖刎首愚者不為運斧全身庸流所鑒何則生輕一髮自重千鈞不以賈盜明矣骨肉不任充鼎俎皮毛不足入貨財盜有道焉吾無憂也又公家遣使脫有資須本朝非隆平之時逰客豈皇華之勢輕裝獨宿非榮一作勞聚囊一作之儀微騎間行寧望輶軒之禮歸人將從私具驢騾緣道亭郵唯希蔬粟若曰留之無煩於執事遣之有費於官司或以顛沛為言或云資裝可懼固非通論皆是外篇斯所未喻三也又若以吾徒應還侯景侯景凶逆殱我國家天下含靈人懷憤厲既不獲投身社稷衛難乘輿四家􅣭蚩尤千臠割一作刀剸王莽安所謂俯眉頓膝歸奉冦讐佩弭腰鞬為其皂𨽻又一無又字曰者通和方敦曩睦凶人狙詐遂駭狼心頗擬宋萬之誅彌懼荀罃之請所以奔蹄徑角專恣憑陵凡我行人偏鍾一作膺讐憾正當葅筋醢骨抽舌􅀈肝於彼凶情猶當未雪海內之所知也君侯之所具焉又聞本朝王公一作三公居一作都人士女風行雨散東播西沉城闕一作京邑丘墟葌蓬蕭瑟偃師還望咸為草萊霸陵回首皆一作俱霑霜露此又君之所知也彼以何義爭免冦讐我有何勳一作親爭歸委質昔巨平貴將懸重於陸公叔向若流深知於鬷蔑吾雖不敏常慕前修不圖明庶為一作有懷翻其以此量物昔魏氏將亡群凶挺爭諸賢戮力想得其朋為葛榮之黨也一作邪為邢果之徒耶如曰不然斯所未喻四也又一無此字假使吾徒還為凶黨侯景生於趙代家自幽恆在則台司行為連率山川形勢軍國彛章不勞請著為籌便當屈指能算景英華作重非以逋逃小醜羊豕同群身寓江臯家留河朔鄉井鄉邑一作舂舂井井如鬼如神其不然乎抑又君之所知也且夫宫闈祕事皆若雲霄英俊訏謨寧非幃幄或佯驚以定策或焚藁而奏書朝廷之士猶難參預羇旅之人何階耳目至於禮樂沿革刑政寬猛謳歌已逺萬舞成風不知手之舞之足之蹈之也安在搖其牙齒為間諜者哉若謂復命西朝終奔東虜雖齊梁有隔尉侯奚殊豈以河曲之難浮而曰江關之有一作可濟河橋馬度曾一作寧非宋典之姦關路雞鳴皆是田文之客何其通蔽乃爾相妨斯所未喻五也又兵交使在雖著前經儻同徇僕之尤追肆韓一作寒山之怒則凡諸元帥並釋縲囚爰及偏禆同加恩禮一作同無剪馘乃至鍾儀見赦朋笑遵途襄老蒙歸虞歌引路吾等張􅎶拭玊修好尋盟涉泗之與浮河郊勞至于贈賄公恩既備賔敬無違今者何愆翻蒙貶責若以此為言斯所未喻六也若曰妖氛永英華作未非久喪亂悠然哀悼一作我奔波存其形魄固已銘兹厚德載此洪恩譬渤澥而俱深方嵩華而猶重但山梁飲啄非有意於籠樊江海飛浮本無情於鐘鼓况吾等營魄已謝餘息空留悲默為生何能支久是則雖蒙養護更夭天年若以此為言斯所未喻七也若云逆豎殱夷當聽反命髙軒繼路飛蓋相隨未解其言何能善謔夫亨屯治亂豈有意於前期謝常侍今年五十有一吾今年四十有四介已知命儐一作賔又杖鄉計彼後生肩隨而已豈銀臺之要彼未從師金竈之方吾知其訣正恐南陽菊水竟不延齡東海桑田無由佇一作可望若以此為言斯所未喻八也足下清襟勝託書囿文林凡曰一作白洪荒終于幽厲如吾今日寧有其人爰至春秋微宜商略夫宗姬殄墜霸道昏凶或執政之多門或陪臣之涼德故臧孫有禮翻囚與國之賔周伯無愆空怒天王之使遷箕卿於兩館縶樂一作驥子於三年斯匪貪亂之風邪寧比當今之髙列一作例也至於雙崤且帝四海爭雄或搆趙而侵燕或連韓而謀魏自永盟於楚殿躬奪璧於秦庭輸寶鼎以託齊王憑安車而誘梁客其膏脣敗舌分路揚鑣無罪無辜如兄如弟逮乎中陽受命天下同規巡省諸華無聞幽辱及三方之霸也孫甘言以嫵媚英華作於娥眉非曹屈詐以羈縻旌軫嵗到於勾吳冠蓋年馳於庸蜀則客嘲殊險賔戲已深共盡逰談誰云猜忤若使搜求故實脫有前蹤恐是叔世之姦謀而為邦之勝略也抑又聞之雲師火帝澆淳乃異其風龍躍麟驚王霸雖殊其道莫不崇君親以詔一作銘物敦敬養以治民預有邦家一作司曾無隆替吾奉違溫凊仍屬亂罹一作離冦虜猖狂公私播越蕭軒靡御王舫誰持瞻望鄉關何心天地自非生憑廪竹身一作源出空桑行路含情猶其相愍嘗以擇官而仕非曰孝家擇事而趨非云忠國况乎欽承有道驂駕前王郎吏明經鴟鳶知禮巡方省化咸問髙年東序西郊皆尊耆耋吾以圭璋玉帛通聘來朝屬世道之屯期鍾生民之否運兼年纍載無申元直之祈銜泣吞聲長對公閭之怒情禮之訴翻一作將同逆鱗忠孝之言皆應對一作齚舌是所不圖也非所仰望也且天倫之愛何得忘懷妻子之情誰能無纍夫以清河公主之貴餘姚書佐之家草限髙卑皆被驅掠自東南醜虜抄敗飢民臺署郎官俱餒牆壁况吾生離死别多歷暄寒孀室嬰兒何可言念如得身還鄉壤一作土躬自推求猶冀提攜俱免凶虐夫四聰不達華陽君所謂亂臣百姓無寃孫叔敖稱為良相足下髙才重譽參贊經綸非虎一作豹非貔聞詩聞禮而中朝大義一作議曾未經論清禁嘉謨一作謀安能相及諤諤非周舍容容類胡廣何其無爭臣哉嵗月如流人一作半生何幾晨看旅鴈心赴江淮昏望牽牛情馳揚越朝千悲而下一作掩泣夕一作暮萬緒以回腸不自知其為生不自知其為死也足下素挺詞峯一作鋒兼長理窟匡丞相解頥之説樂令君清耳之談向所未疑誰能曉諭若鄙言為謬來旨必通分請灰釘甘從斧鑊何但規規默默齰舌低頭而已哉若一理存焉猶希矜眷何故一作必期令我等必死齊都足趙魏之黃塵加幽并之片骨遂使東平拱樹長懷向漢之悲西洛孤墳恆表思鄉之夢干祈已一作以屢哽慟良一作增深徐陵叩頭再拜上牛𢎞書王孝籍竊以毒螫噆一作膚則申旦不寐飢寒切體亦卒嵗無聊何則英華作期非痛苦難安二字一作難以安貧窮易感二字一作易為感况懷抱之內水火鑠脂膏腠理之間風霜侵骨髓安可齰舌緘脣吞聲飲氣惡呻吟之響忍酸辛之酷哉惟明公尚書一作明尚書公動哀矜之色開寬裕之懷咳唾足以濟活枯鱗吹噓可以一作用騰飛窮羽芬以椒蘭之氣暖以布帛之詞許小人之請開一作聞大君子一無子字之聽雖復山川不逺神明一作鬼神在兹信而有徴言無不履猶恐拯溺遲於援手救縊緩於扶足待越人之舟楫求魯匠之雲梯則必懸於喬樹之枝沒於深泉之底矣夫以一介貧人七年直省課稅一作役不免慶賞不沾賣貢禹之田供釋之英華作氏之費有弱子之纍乏強兄之親一作産加以老母在堂光隂遲暮寒暑違侍一作闕關山迢遙一作超逺齧臂為期前途邈矣一作逾邈倚閭之望朝夕已勤謝相如之病無官可以免發梅福之狂非仙所能避愁疾甚乎厲鬼人生異夫金石營魂且散恐筮豫無徴齎恨入冥則虛緣恩顧此乃王稽所以致言應侯為之不樂也潛鬢髮之內居眉睫之間子野未曾聞離朱所不見沈淪東觀留滯南史終無薦引永同埋殯三世不移雖由寂寞十年不調實乏知已夫不世出者信一無信字聖明之君也不萬一者誠賢良之臣也以夫不世出而逢不萬一此小人所以為明尚書幸也坐人物之源運銓衡之柄反披狐白不好緇衣此小人為明尚書不取也昔荆玊未剖刖卞和之足百里未用碎禽息之首居得言之地有用能之資增日月之明無手一作首足之戚憚而不一作弗為孰知其解夫官或不稱其能士或未伸其屈一夫竊議語流天下勞不見圖安能無望儻病未及死往還勉念一作狂還克念眄一作汗窮愁之間一作簡矚一作屬離憂之詞託志於前修通心於來哲使千載之下哀其不遇追咎執事有玷清塵則不肖之軀死生為纍小人之罪方且未成一作刋願少加矜一作憐愍留心無忽一作皆隋書本傳為人與蜀城父老書王勃蓋聞天地作極不能遷否泰之期川嶽薦靈不能改窮通之數豈非聖賢同業存乎我者所謂才榮辱異流牽乎彼者所謂命是以龍驤鳯峙一作翥伊周成翊贊之功含糗羮藜顔冉困棲遲之病或先號而後笑或始吉而終凶事不可量功未必定則知洪濤未接長鯨多陸死之憂曾風未翔大鵬有雲傾之勢池鰌井鮒亦將鼓鱗而輕之田鳩野鸚亦將騫翮而侮之及其衝溟渤接扶搖吹波則江漢倒流騰氣則虹霓掩摩赤岸負蒼天然後知其力焉吁韓信之無津也昌亭之一餓夫耳馬卿之失路也臨邛之一食客耳武不足以服衆文不足以動時長劍屈於無知洪筆淪於不用洎乎雄圖躡運至尊納背水之謀麗藻升朝天子賞凌雲之作威加海嶽聲振廊廟彼淮隂之俠少成都之遺老也又焉能知逺近哉是以鑒物於肇不於成賞士於窮不於達是知卞和之得玊也精存於岸谷之間張華之得劍也氣發於星辰之際夫豈琢磨成器然後知其寶剸斷為能然後知其用哉仰惟鄉耆等並玊山髙族金堤勝侣列子弟於千城耀衣冠於百代或以風雲去國公孫躍馬之年鐘鼎從王諸葛攀龍之日門庭相接雕甍將綺棟連陳機杼相和鳯攝將虬梭交響金漿玊饌食客三千緑幘青裳家僮數百沖襟渺識人多江漢之靈麗藻華文代有雲泉之氣北齋開敞南館虛間詩酒同歸琴書合契忘機得意恥嵇阮之交疏虛席延賔恨原常之客少實煙霞之藪澤風月之津梁者乎劉仲文之逺識不以乾沒詣梁城閔仲叔之髙風不以口腹纍安邑雖其已沒生氣猶存况乎屬宇宙之明當天下之泰不能俯拾青紫髙視縉紳攀北極而謁帝王入南宫而取卿相脅肩側足求哀鍾釡之間低首俯眉取齊斗升之末嗟乎誠下官所以仰天漢而鬱拂臨江山而慷慨者也但時可以未遇道可以未行志願可以未成功業可以未就古之才足以輔王業躡迹屠釣之間功可以濟巨川藏身版築之下百里奚之負販陳湯之丏貸而况於庸者哉此僕所以駿奔於顧盼之餘自致於恩光之末也且夫精神所感尚動神明意氣相交豈慙車馬倘能投心季子遙存素紵之恩援手應侯先立綈袍之贈豈人之情也能無報乎方今白藏紹序朱律謝期天髙而林野疏候肅而江山靜輕蟬送夏驚晚吹於風園旅鴈乘秋動宵吟於露渚絲纊成於南畝粳黍被於東阡時計有儲願履多福下官薄遊綿載飄寓淹時歡躓相仍憂虞自積陟梁鴻之峻嶽何暇長謠臨阮籍之長途唯知慟哭庶憑賙給以濟飄危輕訴短懷佇流嘉耗二蜀都廣鎮岷嶇奧壤山分玉宇水向金陵景貺有期英靈間出榮問休暢幸甚幸甚夫神有可逼渌波驚亡疑作七柱之音道有可符玄霜扣九鐘之節豈道窮精祕妙聽察於無聲理實杳冥玄應通於不測波流柱響波無入柱之因霜落鐘鳴霜非扣鐘之具矣况乎言忘意得臭味相求目擊道存神明已接鄭僑之逢吳札無謂殊方阮籍之對嵇康自然同氣僕雖不敏嘗從事於斯矣嘗謂薰蕕不共器梟鸞不比翼是以類乎方者按風雲於千里乖乎類者起山川於一面抑嘗聞之士之生也其迹可擯而道不可藏其身可辱而志不可奪其有拂衣投臂遁形滄海之隅裂裳裹足獨立髙山之頂量腹而食度身而衣以鐘鼎為芻豢以衣冠為縲絏方欲䇿鸞鳯而撫需疑作雲英鞭虹霓而採煙液其次排玊闕指金門成賈誼之謨樹終軍之策因機入務懷素將相之門沐露沾霜擁篲公侯之室然則拾青紫於旦暮取功名於俄頃演文物而動寰中騰聲名而振天下若下官者可謂慙二途矣而斂手長揖強顔髙視低心於蹇躓之辰忍耻於恓惶之日者哉渭濵留釣鷹揚之業未萌緇源滯牧鴻漸之資蓋寡及其攀窮運接靈期乘雲雷而清八極和隂陽而調萬品則知冥機所運吉凶倐忽之間玄命所移飛伏於斯須之際以日月自至聊復闕爾耳方今炎颷謝節爽候關辰風髙而宇宙清霜下而亭郊肅歸雲止鴈流曙響於東津落照開鴻寫晴規於北岸螢踈夕砌蟬促朝林感序緣情故豐寄賞僕一違秦隴再革炎涼戒征軸而無因指歸途而有倦故鄉超曠曾山重復吳宫尚逺頻驚去燕之心楚峽猶賖已下聞猿之淚徒以風猷未隔道義相存幸承知己之心稍緩他鄉之思一作意昔者虞公再見懸光白璧之前季布一言猶定黃金之諾况乎交已成於杵臼道已茂於金蘭希照窮途逺流嘉貺若使恩裁口腹空留安邑之賔惠闕始終取恨昌亭之客與在朝諸賢書盧照鄰昔張子房處太傅之尊自疏於南山隱公孫𢎞居丞相之位亦伏地於東方生伯喈已亡孔文舉將老兵而造膝方回尚在王羲之就倉奴而共談良史書之髙賢不以為纍自古朝野曷嘗以人廢言况下官抱疹東山不干時事偕人唱和何損於朋黨延州子期聞音竊抃猶冀身膏丹壑脫寶劍於山河骨掩黃塵罷瑶琴於天下則指疑作捐金抵於山谷者非太平之美事乎幽憂子白在貴州與修史學士吳兢書宋之問拙自謀衛降黜炎荒杳尋魑魅之途逺在一作蒞雕題之國颶風搖木飢鼬宵鳴毒瘴橫天悲鳶晝落心憑神理實冀生還關號鬼門常憂死别事未瞑目豈在微身先君業粹中和才見文武志道遊藝名動京師出谷入朝事多𢎞益雖崇班去已而隂德被人清議所尊何減驃騎恐耆舊咸謝竹帛儻遺使盛烈湮沉下情感痛自昔逸群之器曠俗之才譽雖冠於人倫祿不齊於卿士南史之筆漏美不書東岱之魂與名俱滅故史遷述許由云不遇青雲之士焉足道哉惟君侯禮樂山髙文華海濶古一千嵗聞聖賢之書今五百年知作者之運山甫拾遺於中路時謂得賢蔡雍揮翰於詞林誰其不許往送家狀蒙啓至公之恩希果實言深蓄自私之感下官久辭榮擢夙慎禍胎內無負於明祗外冀申於知己豈謂一人相毀衆口爭喧遂以虛聲乃加真罪賴皇明昭宥腰領賜全空荷再生無階上答恃子以松竹之操期子以金石之堅幸無雷同懸納謗議見危不易是所望焉逺識古人之懷敢申窮鳥之請如季布之諾乃重於黃金延陵之許竟懸於寶劍生負食花之惠死效結草之誠刺血為書萬不抒一往年恩貸許惠為看起居注實録江融别録使不錯漏國史及髙明所撰唐史春秋等六處並乞逸遺事迹不翳聲塵代業有光實在吾子逺佇來札以當招魂秋冬凝寒一作嚴惟動一作所履休勝青簡時至一作汗願想窮愁白雲遙一作爰來希訪生死珍重珍重與韋五虛已書陳子昻命之不來也聖人猶無可奈何况於賢者哉僕常集作嘗竊不自量謂以為得失在人欲竭集作揭聞見抗衡當代之士不知事有大謬異於此望者乃令人慙愧悔赧不自知大笑顛蹶怪其所以者耳虛已足下何可言耶夫道之將行也命也道之將廢也命也子昻其如命何雄筆雄筆棄爾歸吳東山無汨我思無亂我心從此遁矣屬病不得面談書以述言子昻白文苑英華卷六百九十一
