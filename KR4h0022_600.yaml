body:
  text: 文苑英華卷六百一宋李昉等編陳情一陳情表二卷英華所編失年代先後今正之陳情表一首為人陳情表一首陳情表一首為水潦災異陳情表一首為任虛白陳情表一首陳情表一首陳情表三首初至益州上訖陳情表一首辭上滑州刺史陳情表一首為崔僕射陳情表一首代高尚書陳情表一首為趙侍郎陳情表一首陳情表陳文帝時沈烟臣嬰生不幸弱冠而孤母英華作諸非子零丁兄弟相長謹身為養仕不擇官承襲朝命偶在亂世一作宦成梁朝命存亂世冒危履險自死輕生妻息誅夷昆季屠一作冥滅但餘老母一作餘臣母子得逢興運臣母妾劉今年八十有一臣叔母妾丘七十有五私一作臣門弟姪故自無人妾丘兒孫又久亡滅兩家侍養餘臣一人前帝知臣之孤㷀眷臣以州里不欲使頓居草萊又復矜臣溫凊所以一年之內再三休沐臣之屢披丹欵頻冒宸鑒非欲苟避一作違朝廷逺離畿輦一者以年將六十而湯火居心每跪讀家書前懼後喜溫枕扇席無復成童二者職居彛憲邦之司直若自虧身禮何問國章前德綢繆始許哀放內侍近臣多悉此者正以選賢與能廣求明哲趑趄荏苒未始取才而上𤣥降戾奄至今日德音在耳墳土遽乾悠悠皇天哀此困一作罔極兼臣私心煎切彌迫近時悽悽之祈轉忘塵觸伏惟陛下睿德聰明嗣興下武刑于四海𢎞此孝治寸管求天仰歸帳一作帷扆有感必應實望明時一作聖明特乞霈然申其私禮則王者之德覃及無方矧彼翔沈孰非㴠養云云為人陳情表陳子昻臣某言臣門衰祚薄少遭險舋行年三歲嚴父早亡慈母鞠育哀惸相養臣又尫羸少多疾病集作疹零丁孤苦僅得成人老母愍一作憫臣孤薄恐不能負荷教誨師氏訓以義方家貧無資績紡集作紡績以給束修衣褐並出母指臣既無姊妹寡有兄弟衡門獨立惟形與影母子相視惸惸靡依罹此艱虞歷二十載臣稍以成立忝跡朝班薄祿微資始期色養私情獲遂集作既獲母子同集作相歡殃罰不圖老母見背攀號何及泣血漣洏于時日月非便集作宜權殯京兆歲序速遷於今若干年臣本貫河東墳隧無改先人丘壠桑梓猶存而老集作亡母客居未歸舊土宿草滋蔓集作成列拱樹荒凉興言感傷增以崩咽今卜居宅兆將入舊塋明年吉辰最是良便過於此際未有尅期臣謬齒王人職在驅役今歲奉使已至居延單行虜廷絶漠千里臣雖萬死無答鴻恩恐先朝露有負老母集作眷知伏惟陛下仁隱自天孝思在物哀臣孤苦降鑒幽微集作冥使臣來年得營葬具且斬草舊域合骨先墳保送羇靈獲申子道烏鳥之志已集作獲遂私情遷舉事終集作遷定事卑馳影奔赴雖其集作即殞殁甘心無恨集作憾云云陳情表高宗員半千臣某言臣貧窮孤露家資不滿千錢乳杖藜糗朝夕才充一飯有田三十畝有粟五十石聞陛下封神嶽舉英才唐書作豪英一作英才貨賣以充糧食奔走而歸帝里京官九品無瓜葛之親立身三十有餘志懷松柏之操不能糴賤販貴取利於錐刀㪷酒隻雞求舉將何以辦投匭進欵奉勑送天官捧以當心似懸龍鏡家乏以守若戴鼇山於今立身未蒙一任臣恨不能益國死將以選地不賜臣一職剖判疑滯移風易俗以報陛下深恩若使臣平章軍國燮理隂陽臣不如稷契若使臣十年成賦一代稱美臣不如左太冲若使臣荷戈出戰除凶去逆臣不如李廣若使臣七步成文一定無改臣不愧子建若使臣飛書走檄援筆立成臣不愧枚臯陛下何惜玉階前方寸地不使臣披露肝膽抑揚辭翰請陛下召天下才子三五千人與臣同試詩策判箋表論勒字數定一人在前疑作臣先者陛下斬臣頭粉臣骨懸於都市以謝天下才子望陛下收臣才與臣官如用臣芻蕘之言一辭一句敢陳於玉階之前如棄臣微見即燒詩書焚筆硯獨坐幽巖看陛下召得何人舉得何士無任鬱結之至為水潦災異陳情表武后李嶠臣嶠言臣聞明主程才先求於稱職忠臣效用必務於量已然後庶官無廢百度以康若使假鳯登朝真龍不馭將緣鶴之鼎方憂於折足和鸞之駕必誠於傾輈豈徒鍾鼓生祆蠻夷起笑而已臣瓶筲賤器駑蹇輕姿同鼯鼠之五伎不成異飛鴻之六翮兼備遭逢幸㑹纍叨階級陛下降非常之澤垂不次之恩升之冡司握九流之銓管委以樞近參萬幾之損益𫝊說作舟之命徒奉針規仲山補衮之談曽微答效致令衡鏡失序紀綱不張官僚日增府庫歲减謬職之謗或譏於畫虎續貂敗官之尤有議於喧盧吠鵲韓盧宋犬名鵲或作鵠非下生朝野之蠧上悖隂陽之和水潦為災慮深於昏墊黎氓尖稔憂在於溝壑軫皇情於南面墜國庾於西成虧燮理之則失平分之度推其咎戾實在微臣昔者堯逢阻饑而四嶽咨訪漢遇災異而三公策免舉遺才而求俊乂退不肖而清庶官厥有由來著于古昔臣緝熙莫效尸曠無成以擁腫之凡材抱支離之痼疾久懷致冦之祿猶帶妨官之綬靦目而視不遑自安是用啓處慚惶寢興誡惕思解鵜鶘之服願辭鵷鷺之行庶得保愚公之廬避賢者之路以寧衆口之囂謗以答三靈之譴咎則物情朝序誰不謂宜昔干木辭第恆思衛生營平寢瘵不忘憂國當今兵戎未靜費務方多人庶空虛官僚苟且不可不深為防慮妙思政術臣銜恩佩德念咎慙榮雖智效無聞自甘於罷黜而庸短所見猶樂於輸畫不勝區區之意謹昧死陳利害事一封幸當明主不諱之朝敢效愚臣無隱之節倘蒙赦其狂直收其固陋乃冀有益纎芥效添山海無任悚懼懇誠之至謹詣朝堂奉表陳情以聞為任虛白陳情表吳少微臣某言臣亡父某昔在聖朝纍蒙進任亟登麟閣纘校祕文衛迹鳯池翊謀神化內陳青瑣之拜出有朱輪之寵何其休哉而恩榮未報舋禍潜起闔門而就拘連頸而待戮陛下發雲軺一作雲霓或作雲霓之彩回霜電之威捨過好生全棄嶺表一蒙渙汗欣借命之恩萬里奔波無乞骸之望竄身邊裔皓首荒隅以臨年之危坐炎方之瘴雖欲勿死其可得乎逺謝闕庭奄先泉路旅襯期朽今猶未還興言血下號懼交集臣某中謝陛下通天之歲復降恩勑追魏某崔某及臣亡父等赴都元忠或入處台相出臨藩牧門庭曜軒組之榮妻子厭梁錦之美其李乙雖死亦蒙贈官子某又登微一作顯職惟臣一門之內存亡俱不霑恩臣之不天亦胡顔上訴然比生則孤臣豈敢同死則存李獨優皇天平分豈其偏施伏惟皇帝陛下惠育羣生無幽不燭臣之孤苦皇天所鑒父終嶺外喪在關中宇宙雖廣無一㕓之地弟妹幼稚絶斗舂之儲兩柩雙魂未遑安厝臣所以鯁情割懇忍而未死者竊為此耳倘雲雨之賜復潤無私則南有歸來之魂北無高堂之位臣之幸也不任崩迫之至謹奉表以聞輕觸宸嚴伏知待罪陳情表𤣥宗張文成開元初萬死糞土臣文成言臣忝朝班幸蒙驅策不了一使罪應至死自可鉗口吞聲伏待刑書灰身粉骨甘從斧鉞豈可昆蟲惜命雀鼠貪生區區微心有所未盡臣平生好學頗愛文章雖不逮於詞人濫流傳於視草近來撰集詩賦表記等若干卷編集擬進繕寫未周負譴明時方從極典恐士衡止息華亭之淚不聞嵇康顧影廣陵之音永絶缺簡零落抱痛幽泉昔司馬遷請就腐刑以終史記漢武帝愍其至懇矜而許之伏願陛下遂臣萬請之心寬臣百日之命集録繕寫奉進闕庭微願獲申就死無恨然則歸罪廷尉肆諸市朝腰領橫分有同仙化一作苑肝腦塗地百代如生骸骨埋塵千載不朽無任迫切之至陳情表已見五百七十九卷張說第二表已見五百七十九卷前人同前蘇頲臣某言臣伏奉今月十三日制鑾駕閏九月十日幸長安陛下東封禮還西賔係望顒顒品物不獨耆老屬黃壤年豐翠華時邁制書爰降懇願咸逹相聚欣躍不知所裁跡喧路衢聲溢歌頌若臣者奉辭軒屋縈疾鎬京常恐先犬馬填溝壑朝聞既獲瞑目猶生臣某誠歡誠喜頓首頓首死罪死罪臣彌曠旬深官曹事缺乞解見職罄陳前表又伏奉今月五日勑以晋司務間不妨醫療所請辭官不須者臣志不動天身何容地周章慙悸惶駭戰栗退則恩被羽翼德均造化臣之不敢止也進則匍匐罕遂支羸薾然臣之不能任也臣所進退失守涕洟嗚咽宜其重請骸骨豈可虛榮省署竊以鴻私俾療成貸特矜日夜翹清蹕之途炎凉近素秋之節臣希眇視跛履手之足之覬憑渥以還魂輒延慈而待罪不勝悚踴悕懼之切謹附起居使朝議郎右補闕內供奉臣李鄰奉表以聞臣無任初至益州上訖陳情表臣某言奉辭闕庭馳詣州府以某月日上訖臣某中謝臣禀識愚妄受恩忝越十有四年中書省三命承明廬臣竊比方倍逾於是特編皇揆不以人進久於近密衆莫過臣厚施如丘山微功罕絲髮遂叨宰弼莫允瞻望心慮何補血誠徒勤陛下深慈矜愚至德念舊以臣頗習儒訓更超宗伯臣益用慙負匪遑底寧豈悟西南重鎮巴蜀粵壤爰雜縣道且聨軍戎付臣兼之才實不逮審疑作竊自能省亟經聞徹誠謂憑威可盡力諭指期致命臣敢辭事誰云效忠及當官而行臨事益懼者竟乏邉鄙之算倘貽朝廷之辱其於靜人蠲役懲吏抑强惟國之政庶臣能勉流波出浦而嗚咽𤣥燕辭巢而顧慕况若臣者最蒙聖渥雲山萬里霄漢獨逺載惕拜章失圖無任辭上滑州刺史陳情表李雍臣某言臣素無藝能積負訕謗衆口之多自可銷金怨讐之心每堪殞首伏惟陛下至明大聖察之纎微淳德上仁洗之瑕穢山川納者不擇薰蕕天地覆之是霑雨露且久荷惠渥大底官榮今臣蒙國用纍及軀命事出涯分之外恩加父母之深已逝之魂復歸朽質既存之地更忝高班雖欲殺身未能報德彌慚持祿有以保名秋燕將辭必徘徊於大厦老馬離秣終顧步於華軒况臣今兹六十有七光隂荏苒行止欹危就木之時未知幾日懸車之歲僅有三年不任違逺涕戀之至為崔僕射陳情表代宗于邵臣某言臣聞行師命將必先保大服戎共武方議膚公所以協和軍搜戡定時難伏惟寶應元聖文武皇帝陛下誕膺天命以撫方夏洪惟眷圖用征不譓上敬天授下咨人力則殊方異俗罔不率俾蠢兹西戎猶肆逆命勞我薄伐示人有征夷不亂華自宜殄滅盈不可久神亦禍淫天之道也臣近得上都所由報狀伏承受相府元帥之寄領漁陽突騎之衆分邵土鎮守之師內無所疑外無所怨上讓下兢禮合義均不為身謀同奬王室此皆陛下明為元首德洽藎臣夷吾必知其小大孔明遂均於魚水不然豈同德度力偶俱無猜以此討戎何戎不滅以此論道何道不平臣蒙國寵靈榮加九族功慙白馬位逹緑車每承聖敬日躋輒願殺身是效今日之㑹實契丹誠無任感時悃欵之至謹遣某官奉表陳情以聞代高尚書陳情表臣某言臣本凡才智略無取因緣際㑹驟歷班榮分閫尹京實為塵忝頃者鳯翔之日蕃漢憑陵臣嘗激勵羌渾竟𠞰戎虜方將席卷永息邉虞旋奉德音遽令入奏微誠莫展殃舋已鍾痛骨摧心載崩載咽荼毒未幾起復舊官纍表陳乞不蒙允許及犬戎搆禍憑陵京城陛下授臣檢校刑部尚書都知元帥中軍兵馬使雖承恩命未有軍行麾下之人才盈數騎空懷赴難莫克使綏仰天椎心伏增憤激不踰信宿便屬蒼黃未知鸞駕東巡且欲荆襄陪扈纍遭剽掠始逹藍田更逢子儀留臣計事招集亡散共收上都比至入城又奏臣住奔波險阻契濶山川進慙將帥之臣退羞羈絏之僕顧惟狼狽寢寐兢惶臣某誠惶誠恐稽首頓首死罪死罪今又亡母在殯欲祔舊塋先逺戒期正當此月干戈之際寇盜為虞小有不安永負生疑作亡母願終子道以奉亡靈倘封樹有成雖隕越無恨伏望許臣畢事之日得令奔走陜郊碎首行間甘心罪責無任兢惕屏營之至為趙侍郎陳情表臣某言臣以固陋纍蒙奬擢猥厠朝列與羣賢並始自給事驟遷侍郎贊二冬官典司邦教屬師旅之後庶政從權㑹府舊章多所曠廢惟禮部兵部度支職務尚存頗同往昔餘曹空間案牘全稀一飯而歸竟日無事此臣所以寢興長想俯仰增慙何則受恩至深報德無所未裨毫髮虛費稻梁伏以人君命官期於述職人臣量力不叨非據寧有食君上之祿為保妻子之謀臣內顧塵忝尤增愧懼頃陛下躬决庶務萬方不言而理逺近承式幸當天下無事未敢上塵其愚今承嗣背德阻兵全魏靈曜失道謀亂大梁犬戎為患獯虜伺隙雖禍盈惡稔終兾梟夷而調兵轉粟在彼疲弊乃羣下憂國之日微臣赴難之秋况諸道牧守闕人頗衆是敢不揆薄劣特祈任使如或領一郡或統數城綏懷將卒招復逃散近當狂冦俯制奔衝必使人業耕桑盜無充斥昔子建之表愁求自試充國之對無踰老臣豈徒冒寵干榮實欲酬恩立節臣年甫知命筋力猶强策勵駑蹇庶成萬一無任懇悃迫切之至文苑英華卷六百一
