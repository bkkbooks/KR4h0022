body:
  text: 文苑英華卷五百六十宋李昉等編賀赦三為李中丞賀赦表一首為潤州太守賀赦表一首為吉州太守賀赦表一首蘇州賀赦表一首代鄜州太守賀赦表一首為李諫議賀赦表一首連州賀赦表一首代鄭尚書賀册太后禮畢赦表一首為汝南公華州賀赦表一首為京兆公陜州賀南郊赦表一首為汝南公以妖星見賀赦表一首為李中丞賀赦表玄宗幸蜀時蕭穎士臣某言中書省馬崇至自蜀郡伏奉八月一日制書大赦天下罪無輕重咸蒙洗滌覆宗之辜亦賜原宥惠澤浹於存沒恩榮被於一作乎出處聲動夷夏氣感風雲含齒戴髮孰非幸甚鑠哉沛乎虞后肆赦羲文作解之盛典也臣某中賀臣聞乾靈肇運亭育萬方其德至普而或水旱流行氛沴表見然後蕩之以祥風煦之以和氣而品物熙焉聖人立極平章庶政其道至明亦或四凶在朝三苖逆命然後置諸嚴刑被以文德而官方正焉伏惟開元天寶聖文神武證道孝德皇帝陛下纘戎纍聖惟新舊服天成地平萬邦作乂德禮備舉符應爰臻下加有隩一作下知有文四紀一作粵四紀于兹矣由是嚮明端拱齋居玄默布大信於羣后絶嫌疑於纎芥狐鼠憑依俶擾天紀陛下垂泣辜之旨降勤恤之令將士勵節黎庶歸仁咸思赴蹈指期蕩定開泰之辰計不忘逺臣又聞之昔上皇御辨祗車巡於谷口盛漢膺運賔旅奮乎關中蓋風謡尚武可以大殱醜類會昌建福可以永保邦家前古休期復見茲日臣嘗叨近侍謬佐藩牧千里景從不及扈逰之觀百城風靡空懼分憂之責魂馳井絡戀結巴渝無任感激悅豫之至為潤州太守賀赦表代宗栁宗元臣某言臣聞元氣氤氲生成道逹聖王教化恩煦流行自昔仁夀之時皆同寬大之典伏見五月二十九日恩制昭洗庶獄廓清萬宇億兆欣戴神人叶心臣某中賀伏惟寶應元聖文武皇帝陛下體元立極至德提運俗阜和平之理天垂景福之祥故得年穀大豐五兵不用倉廪既實禮義興行此已道合一作洽羲軒功格天地陛下聖德之至勞謙恤隱猶慮淳風未溥罹咎或多務寬刑以廣覆載當一隂始生盛陽用事言念冒犯慘酷幽閉囹圄降玄猷渙汗之恩贊朱明長養之氣而使省躬者自新有路懷生者得遂其情枯朽重沐陽和雲煙助為喜色元元感戴皆見聖明一作慈遇此昌時生靈何幸臣忝述職字人不任抃舞欣躍之至為吉州太守賀赦表德宗臣某言伏奉今月日詔書大赦天下禹湯罪已霑澤既同羿浞負恩姦謀自蹶中賀伏惟陛下以大聖匡難𢎞慈御物而賊臣棄義乘亂一作釁敗常爰幸近郊方勤逺略改元更始統厯惟新猶復惕厲懷柔誠明引咎務好生之德恩覃萬類遵泣辜之典罪止元凶振廢滯而片善無遺安反側而羣邪革慮損去徽號帝堯之克讓也貶徹服御大禹之師儉也罷榷管之利征賦就恆正封略之侵干戈繼息辟賢致理疏爵報功減冗官而祿秩有倫優死事而存歿知感喜氣充於六合仁風被於八荒孰非昭蘇罔不率俾自然假息之孽輿襯就誅改轍之徒束身請命八龍旋軫萬國來庭不勞王者之師重集康哉之化臣天守藩維不獲稱慶闕庭抃躍之至倍萬恆品云云蘇州賀赦表栁宗元臣某言伏奉二月十三日敕下垂拱臨軒親受典册大赦天下與人更始中賀伏惟元和聖文神武法天應道皇帝陛下用人情為田播殖萬類細徹微妙靈通幽神洗蕩危疑開釋罪罟酬勞而盡傾府帑貶用而大減租入逋負除而餒者自活力役省而耕者倍功繼絶存亡忠賢飲德於黃壤棄瑕肆眚奪魄再麗於遺骸極天地之歡心盡帝皇之上事疲史臣之筆編簡難書涸詩人之思謳謡絶路臣總集黎老伏讀德音不寤微生坐階仁夀不勝慶抃之至宗元未嘗為蘇州此篇當考代鄜州太守賀赦表臣某言伏奉月日制書大赦天下鴻恩至德曠古無鄰喜氣休聲韶光共茂化流海外澤及荒陬震雷作解於九霄渙汗霑敷於萬國生靈交感動植增榮中賀伏惟陛下天覆地載昭升聖謨執契垂衣財成庶品搜百王之墜禮舉三代之嘉猷明逹四門駿奔九有揭天綱以齊衆理運斗極以示群方精微於玄造之源拯救於蒼生之弊釋縲械於囹圄徴遺逸於丘園矜水旱所沴之方慎牧宰重難之選蠲苛已責崇德報功有典必禋無文咸秩普天率土飛翔所加俱臻仁夀之鄉一作場共載乾坤之德臣忝承戎寄職列藩隅雨露之恩草木同慶為李諫議賀赦表臣某言伏奉今月二十四日制書大赦天下恩覃九有化被萬方至仁與陽和並舒大霈一作霈澤隨雨露偕潤凡在品彚莫不昭蘇臣某中賀臣聞天地功成是先煦育皇王立極必治好生所以書著眚災傳稱肆赦將其更始咸與惟新廓氛霧於八紘澡塵霾於四裔幽隱有感動植懷恩朝野交歡率土胥慶恩覃有截惠及無垠固天縱之知四門已闢闡日躋之敬百度惟貞澡雪舊䀶蕩除宿負宥赭衣之罪得辨平人洗白玉之瑕復為重寶唯才是急仄席搜揚阜俗為期常賦蠲滌悉中賦以贍經費罷别進以息疲黎錫死事之官封幽明知感禮髙年之粟帛老幼乂安班爵以勞勤敘親以修睦貔貅之士纍洽恩私縉紳之徒同榮慶賞返縲囚於異域出閉幽於深宫感人心而理定體乾道而化光澤及華夷仁霑草木含生之類孰不欣歡歌一德之心邇遐齊貫傳萬國之慶上下同聲祥光若浮瑞氣可覽億兆所未見古今所罕聞臣某備列班榮親覩盛禮踴躍兢抃倍萬恆情無任慶悅之至連州賀赦表憲宗劉禹錫臣某言伏奉今月一日制書大赦天下者聖德廣運浹一作洽于華夷天光下臨照被英華作彼非幽蟄臣某誠歡誠躍頓首頓首伏惟睿聖文武皇帝陛下神扶寶祚天贊鴻猷意有所之事無不尅當淮甸類表作古凱旋之後是域中慶幸之時順陽和以發生施霈澤於寰海網開三面危疑者許以自新照逹四聰瑕纍者期於録用求碩畫於庶位慮遺材於放一作微臣旌忠烈之家賞勳庸之胤英華作後非仁及枯骨無隔於寇戎榮加顯親普類表作並霑於存歿恤刑已責實廪蠲類表作輕徭頒錫彰有客之詩崇儒叶宗豫之望嶽瀆咸秩耆艾飲和大僚承任子之恩武旅類表作士荷賜金之寵斯皆禹湯文武之遺美髙祖太宗之耿光集于聖朝然後大備德音所至和氣隨之歡謡上徹於九天福祚永延於億載能使逺夷屈膝豈唯小醜革心率土人臣不勝大慶臣久辭闕下恪守海隅犬馬之誠倍百恆品無任抃躍屏營之至代鄭尚書賀册太后禮畢赦表令狐楚臣某言伏奉五月二十八日制書十字一作伏審皇太后禮畢伏以皇太后光膺茂典誕受鴻猷一作恩恩榮一作恩加慶賜覃被率土中賀臣聞天子以德教而兆人慶賴明王以孝理而百姓一作神和平伏以皇太后秉德隂凝體仁坤厚𢎞是一作于內則順于先朝道配軒皇之尊功參文母之盛伏惟皇帝陛下孝承丕緒仁嗣寶圗則天之明事地以察昭彰慈訓光啓尊名發德音於上玄流惠一作霈澤於下土陷踈網者許其減等養髙堂者錫以加封粟帛遍霑於耆年門閭必表於仁里是一作悉使懷生庶類行道羣心非獨親親一無親字其所親無不長人之所一無所字長湛恩布護盛禮豐融信可通一作乎字神明而光一作于字四海天下臣子不勝慶幸臣限於鎮守逺在方隅不獲躬詣闕庭抃舞稱慶無任聳踴慶幸之至此篇從唐類表而以英華本為一作為汝南公華州賀赦表李商隱臣某言伏奉正月九日制書南郊禮畢改元為某大赦天下者奉郊禋以定天位新厯象以授人時乾健離明震動兑悅跂行喙息罔不慶幸臣某中賀臣聞禋昊天而旅上帝者聖人集作王之重事覃殊休而發大號者哲后之洪猷故必致四圭以逹誠制六器而申敬將崇嚴配必在元旬先之以蒼璧騂牲重之以雲門大吕然後王猶有闕於薦敬爽彼告虔周官三代之文絶而不續漢氏萬靈之位失而莫尋豈若皇帝陛下以大道遂羣生以至公臨寶祚上苞玄象下惣皇祗黜幽陟明興廢繼絶靈芝甘露鄙之而不告史官赤鴈白麟陋之而不編瑞牒然後因孟春集作月擇集作卜上辛率于國南式是嵗首且天以陛下為子故必饗明誠人以陛下為天故必流睿澤踰千越萬邁五登三何則取集作致直言之科則聽輿論者不足算設宥過之令則除鄉議者未可儔延賞推恩用以勸禦災捍患之士減租退責將以矜水耕火耨之人養庶老頒淖糜暖帛之資走群望潔刳牲瘞幣之禮古不覩者復覩古不聞者復聞萬蟄蘇而六幽盡開五刃藏而九土咸闢臣當時集軍州官吏等丁寧告示訖况臣嘗備論思獲叨侍從當時仙禁慙視草以無能此日泰壇望給薪而靡及徘徊甸服局蹐關城雖有慶於文明竟無階於奔走司馬談闕陪盛禮沒齒難忘蕭望之願立本朝馳魂莫極無任抃舞結戀之至為京兆公陜州賀南郊赦表臣某言臣伏奉正月九日制書郊禋禮畢改元為某大赦天下者既事虞郊復新堯厯天潢㵼潤日觀揚輝普天率土罔不慶幸臣某中賀臣聞君人之孝莫大於尊祖王者之敬孰踰於事天固必用因髙之儀申嚴配之禮百神集作攸字敘萬靈昭集有蘇字乃可覃殊恩渙大號禮成而德備惠敷而慶𢎞然而秦尚武功先祈禳之事故柴燎蕭薌未必饗漢稱文物重神仙之道故雲門大蔟未必和既不講於禮官終致譏於儒者伏惟皇帝陛下與春生育並日照臨究三代之質文酌百王之損益定午位卜上辛齊潔之誠先掃除而遐逹孝思之志叶氣臭以升聞然後推作解之恩降惟新之令設科以招諫諍宥過以務哀矜已責既恤於三農録勳無遺於十代頒粟帛而養耆老走牲幣而遍山川舉皇王之廢官盡古今之能事臣當時集軍州官吏丁寧告示訖况臣嘗奉恩光叨居華顯當太史撰日之際猶立漢庭及宗伯相儀之時已辭魏闕怊悵郡印徘徊使車徒深傾藿之誠實積懸瓠疑作匏之歎邵公邑內敢思棠樹以追蹤尹喜宅中唯望靈符之復出臣不勝慶幸踴躍之至為汝南公以妖星見賀德音表臣某言臣伏奉某月日德音以妖星謫見思答天戒者臣當時集軍州官吏丁寧宣示訖仁深覆載恩極照臨究祖宗之令圗極皇王之盛事圓首方足罔不欣慶臣某中賀臣聞覆載莫大於天地而升集作騰降之氣或不接照臨莫大於日月而薄蝕之度或有差豈唯休咎之徴自是隂陽之事旋觀彗孛載考策書雖欲為災曷嘗勝德伏惟皇帝陛下荆枝載茂棣萼重輝既居正以體元亦觀文而察變仰窺星彩稍越天常於是深軫皇情重回宸眷省躬之懼洞感於幽明及物之恩畢霑於華夏戒田逰則成集作殷湯祝網之意釋寃滯乃大禹泣辜之慈罷去修營惜漢氏十家之産勸課耕耘一作耘耔復周邦九嵗之儲德已厚矣仁已極矣然猶避寢自責撤膳貽憂以此延休何休不至以茲備患何患能為足以髙步三王平窺百古鞭撻守成之主粃粳中代之君抑臣又聞之昔貞觀之理也太宗文皇帝吞蝗而災沴息太嶽之封也玄宗明皇帝露坐而風雨銷炯戒猶存神靈未逺陛下永懷貽厥有切欽承為其所不為至其所不至佇見地泉流醴天酒凝甘人知朱草之祥家識白麟之瑞又豈芒角足懼晷度可憂者哉臣素乏器能謬當任使東雍西嶽雖首化於百城日逺天髙但心存於雙闕聽金石而慙殊舞獸無羽翼而恨異冥鴻唯當虔奉詔條頒宣德澤成陛下無偏之道畢微臣盡瘁之勤所冀不置簡書免拘司敗如其禮樂非臣所能無任感恩戀闕懇悃屏營之至文苑英華卷五百六十
