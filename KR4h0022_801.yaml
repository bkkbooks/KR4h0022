body:
  text: 文苑英華卷八百二宋李昉等編廳壁記六州郡下楚州刺史廳記一首宣州重建小廳記一首監軍使給納使附淮南監軍使院廳壁記一首東渭橋給納使新廳記一首使院邠州節度使院壁記一首鎮海軍使院記一首幕職上湖南都團練副使廳記一首夀州團練副使廳壁記一首州郡下楚州刺史廳記吕讓稽聖人棟宇之用博矣太上垂典法利衆庶其次革壞弊鎮形勝其次辨尊卑示升降最下炫彩色飾土木革其視榮其體而已若參而合之則賢智公侯之居也古捨其參而務其末則貨殖匹夫之居也能是制者不亦鮮乎揚州屬都楚實甚大提兵五千籍户數萬其事雄富同於方伯然則刺史大廳卑而且險疑作儉紊諸侯之等威每冬至嵗首文武畢集內不足以陳爼豆外不足以容卒衛及夏秋之交淮海蒸濕之氣中人為病多至煩熱憤悶居常無以逃其虐有事宴於斯皆翕翕一作翕肩流汗往往仆於地不卒其會而散自刺史至將校百吏盡知其不可思欲改造而久逺以來為日者巫人稱隂陽鬼神之事以沮之且曰嵗深有物來憑更之則不利小以罪貶大以凶終雜然其説如出一口前守或有構材定日視之惕息卒不敢毁而止大和七年天子以大理少卿滎陽鄭公活無辜當刑者四十餘人殊其績命守于楚既至纍月威肅仁覆罔不得理戎行農室遽告無事公將易前非誠信於衆衆果以咎徴止公公笑而論曰吉凶由已災不自起况隂陽變化人事之符勿忌勿拘以道為模苟不失正無二其圗敢斷不疑鬼神隨之與衆共利曷慮於一作為危秉直在公余為蓍龜乃築崇基乃創宏規恱使樂成不亟不遲法度既備丹素亦施清氣和風旦暮颸颸氛厲不干笑語自怡大會其中寒暑皆宜駢羅鼓鐘間發塤箎劔士伎兒飲食熙熙以寬以容逮於飬厮觀邇及逺何物不綏不祥之詞沉寂無為守正之報必及其期則鄭公持大權臨大節不撓其惑者用此心也昔賢行事亦有據經合道不奪隂陽鬼神之説然未有一作能決然違俗與衆禍福之曰年甚不可破如化其著者豈非明識逹量以義忘私不苟一時遺利後代耶使有土二千石去蠧除弊悉若是舉天下何憂於不理哉且詩詠斯干易規大壯皆美居處有制度可以化人成俗也八年夏豫罷郡西歸道出於此而是廳新成忝春秋之徒也見不朽之作而無述焉心竊耻之請書本末以告來者其他善政能事有風俗言故不採列於記上太和八年八月一日記宣州重建小廳記沈顔界江南宣州實為奧區凡厥貢之盛厥土之饒則古所良也暨巨盜起芒碭環弊於四方是邦載罹窘厄雖城隍僅免而外無孑遺矣及兵部裴公慶餘去任竇常侍聿自池牧來臨蒞事未幾遽為秦彥所據一作取姦連鄰憝一旦擁兵渡江引黨趙鍠以代已任是嵗南徐劉皓作亂揚州繼喪師律二境流離人不堪命𢎞農王方化自淝水爰奮義旗詢於同盟則田公司空首決宏謀及維楊克定秦彥就誅宣人有言曰何獨後豫徯其來蘇𢎞農王允憫是誠我公復勵兵進討鍠悉鋭逆戰亟為崩之及追蹙保壘兵食內空而外不絶商市無改肆鍠知人和在彼乃冒圍宵奔我公追擒之自此江表略定大順元年建子月孫儒大據維揚又來冦我舉不以義自老厥師復為我公擒之其衆盡潰𢎞農王去寧揚土我公嗣總藩條天子嘉公之勳就轉左僕射命觀察於是明年建寧國節度又明年加司空宣城荐屬戎事便廳久缺司署者進言曰盍葺諸公曰民室未完民逃未復於是用文德以來之既來而安之不期嵗車者闐闐舟者聮聮比屋滯貨盈市溢鄽司署者復進言曰民室完矣民逃復矣公曰倉廪未實田野未闢於是薄其賦而省其徭給其乏而賑其飢不期嵗荷耰秉犁橇蟠於泥如雲之稼穰穰在畦司署者復進言曰倉廪實矣田野闢矣公乃許然後度材相址不愆匠事橫梁虹亘山節峰峙嶫嶫崇崇觀者改視公喜退顧人曰凡事之治不治無賢愚貴賤顯然知異觀此當其未治人咸慊之及其治也人咸榮之則吾於為政也豈不榮乎治哉我今欲刋成績宜付所能則沈氏子以文售豫其何可辭焉乾寧二年乙卯秋九月八日記監軍使給納使附淮南監軍使院廳壁記杜牧淮南軍西蔽蔡壁壽春有團練使北蔽齊壁山陽有團練使節度使為軍三萬五千人居中統制二處一千里三十八城護天下餉道為諸道府軍事最重然倚海塹江淮深津橫岡備守堅險自艱難以來未嘗受兵故命節度使皆以道德儒學來罷宰相去登宰相命監軍使皆以賢良勤勞內外有功來自禁軍中尉樞密使去為禁軍中尉樞密使自貞元元年及集無此三字元和已未大抵多如此今上即位六年命內侍宋公出監淮南諸開府將軍皆以內侍賢良有材不宜使居外上以為內侍自元和以來誅齊誅蔡再伐趙前年誅滄旁擊趙魏且徴師且撫師且誥且諭勤勞危險終日馬上往監青州新附卧未嘗安復監清州邉魏窮狹多事今監淮南是且使之集作休之休息亦不久之故內侍至焉監軍四年如始至日簡約寬泰明白清淨集作潔恕惜軍吏禮愛賔客舉止動作無非典故暇日唯召儒生講書道士治藥而已內侍舊部將校多禁兵子弟京師少俠出入閭里間俯首唯唯受吏約束故上至相國竒章公下至於百姓無不道説內侍稱為賢人此不虗也宜其侍衛六朝聲光富貴某謬為相國竒章公幕府掌書記奉內侍命為廳壁記某再謝不才不足記序內侍曰掌書記為監軍使廳壁記宜也某慙惶而書時大和八年十月二十二集作一日記東渭橋給納使新廳記沈亞之渭水東附河輪流逶迤於帝垣之後倚垣而跨為梁者三名分中東西天廩居最東內江淮之粟而羣曹百衛於是仰給唯輕重之凖為難即主官不職其咎何如哉長慶中得儒臣杜生以行御史主之能謹法整吏絶輕出重入之尤明量信敘無先貴後賤之弊故官曹士衛之所仰給者如取之家食焉居再嵗加為外郎因指其署曰夫渭津傍控甸邑諸陵道左輔出入河東藩而公賔逰士過必臨我我儒世家也宜飾宇候賢以誠其敬今公齋陋冗無足為禮於是盡去之募市其傑棟巨楹文梁徑桷既已具構顧其中可敘百榻而儒良至者必與講談其道隨其能否而梯給之得久晉其下者雖孱車弊衣則名日彰矣今觀渭津之創開署宇為嚴虗廣敞意者得無欲天下之士見其胸中之大曠乎使院邠州節度使院壁記李直方自西漢始置幕府得顓辟士其聘舉之盛與公府置一作署吏王國命官為比於是有班固傅毅崔駰蔡雍陳琳阮瑀之徒出焉大抵多巡禦封略經參戎事居無恆處秩靡常品故命之曰賔國朝篤方嶽之任慎求其佐頒以職貢為之定制或辟自諸侯或降於朝廷皆命於天子其所司也調政教之和䇿軍算之祕出入聘覲應對賔客其立署也行有戎次處有公堂與方伯周旋彌縫潤色而已王畿之腋劃為巨防外殿朝那作捍西疆中拱皇都以臨諸夏漆沮之仁既逺華夷之俗相猾非瓌材英傑莫典封守非莊明純固莫參氓佐六年春皇帝勞韓侯牧圉之勤俾伊西夏申命御史中丞王君等九人為之使介既而師貞於律農勤其功惠和威武澤浸火烈孟秋述職曜兵河塞亭障蕭條千里晏清然後用虎旗蛇矛定功於蒲入覲皇都增秩受賜旋師舊服勳用一作明德舉非元臣一作和雄略能賢嘉績蔑用濟此先是尚父郭公開府是邦搜用勿二駿乂一作又咸集不卜數年持樞衡治邦憲司誥命者咸布職於清朝今韓侯亦能詳延端士輔相威德是府將來宜為駿賢一作骨之郊藪榮逹之閫閾衛多君子邠其有之夫敬其事則命始春秋之誼也是邦當徴號朔方而以名師建為三郡肇基於我師事舉德宜始韓侯此記舊題於堂之北牖慮他日文字湮滅作者之文莫傳遂刻石以紀之李公自正字歷金吾掾廷評長安主簿遷監察殿中侍御史左司員外郎今為韶州刺史某早與公遊知公異時之大來也庶斯文之不泯貞元二十年十月日記鎮海軍使院記羅隱惟天子建國必維九牧九牧既序區分局署兩漢三公府有掾屬魏普而降則置行臺若魏以秦王儀鎮中都一作山是髙齊以辛術監治東徐州事皆行臺之任也其官屬則令僕以至於尚書丞郎唐制由行臺而置採訪使殆今節制之始也鎮海軍舊治京口大丞相以錢塘之衆椹一作堪漢宏西殱逆朗天子不欲易其土故自符竹四命然後移軍於錢塘生以物宜租賦以便斥去舊址廣以新規廊開閈閎拔起階級俾幢節之氣色貔武之出入得以周旋焉庚申年始闢大廳之西南隅以為賔從晏息之所左界飛樓右劘嚴城地聳勢峻約而有敞肥楹巨棟間架相稱雕煥之下朱紫苒苒非若越之今而潤之舊也疆場之事則議之於斯聘好之禮則接之於斯生民之疾痛則啓之於斯軍旅之賞罰則參之於斯非徒以酒食駢羅而語言嘲謔者也其府屬以下或八都舊將或從公於征或稟之於朝廷或拔之於鄉里故天子用清宫傳道一作遵之選以位之輟教民論道之任以副之其餘省秩卿曹職領相次自我朝藩服官屬之盛無加也噫大丞相之勳德既藏之天府而攀鱗附翼者非鐫刻樂石其可久乎是年冬十月始命觀察判官羅隱為記幕職上湖南都團練副使廳壁記吕溫湖中七郡羅壓上遊右振牂蠻左馳甌越控交廣之户牖扼吳屬之咽喉翼張四隅襟束萬里蜀本有半字天下之安危繫焉聖唐理雖偃革集作草制不去備消息變化必惟其時由是部集作剖分荆衡復古南鎮輕蜀本作控其兵徒而重其統帥易其將校而難其參佐所以顯仁藏用明道晦權成師於禮樂之中講武於文章之內雍容易簡四十餘年名迹風流一作靖冠於當代始則裴諫議虬以逸材竒略傲視而靜一作靖荒冦次則趙相公璟唐書作􅀈以髙標雅望鬱起而為國禎其餘馮郎中嶷之碩重房容州孺復之英逹鄭評事冽張著作季文之美秀洎張和州惟儉盧侍御澥佐我先大夫宣慈明允實有成績是皆焯於朝論清在人謡者矣元和三年冬天子命御史中丞隴西李公以永嘉之清政京兆之懿則廷賜大斾俾綏衡湘威如秋霜無私凋惠如冬陽無私煦用人如止水無私鑒始下車表前副使殿中侍御史扶風竇君常字中行以本官復職於是監察御史河南穆君寂河內司馬君舒范陽盧君璠太常寺協律郎河東薛蜀本作范君存慶前咸陽縣尉吳郡顧君師閔前太子正字隴西李君礎前太常寺奉禮郎京兆杜君周士前延陵縣尉同郡杜君賞一作寶羣材響附各以類至文雅之器集作器用嵗餘大備錯金碧於晴壑綷孔翠於春林遐邇翕然稱為盛府中行感會知已竭其誠能黃鍾音韻調於嶰谷之竹太阿鋒鋩拭以華山之土其吟鸞鳯斷犀兕不足怪也竇氏伯季一作仲同時七人一居方伯二列華省四在諸侯之館名教之樂縉紳慕焉以溫近守支郡且知故實得請連帥俾書公堂愧於不文安敢堅讓元和五年七月五日東平吕溫述集作記夀州團練副使廳壁記沈亞之戰國南北書更言故世諸豪爭據於壽春或兵至百萬有不能得者豈地勢為要津乎自建中已來淮夷窟叛於蔡天子之詔或討或赦由是壽春備為東塞矣為之守者皆佩將軍印幕府符書之設擬於方鎮而有副使之官焉元和中韋公武以殿中侍御史為之九年秋蔡丘集作州叛壽春守令狐通引兵屯霍丘副使得孱卒百餘人留郡中冬蔡兵大入馬塘寇鄧家城殺其將卒五千餘人虜民男女焚壞邑室而去郡中驚駭民人多流其家而東副使因言曰集無曰字壽春其地塹水四絡南有淠西遮淮潁東有淝下以北注激而回焉集作為西流環郛而濬入於淮此天與儉於是也假如愚民能棄其業西流即為蓬徙塵走耳安與國是為利耶乃出家奴與民户一丁俱為水工決安豐以南陂池會其流於城傍野中浸注如澤焉集無此字以故居民流心稍稍復定時馬塘鄧家城既陷霍丘方畏冦乘其虗復飛語為謡以感其俗曰狐死首丘井閭多傳言之耆老曰果守不能保是矣守聞之益恐遂棄其城亡歸是日霍丘焚行來未及郡會日暮使吏馳告副使以歸狀令得夜開壁吏至壁卒捍關吏不得入呼罵其卒副使立城上曰某得命於詔城晝受即晝復之今守獨入而卒露無為也如驅與俱來寧不知盜居其間得夜則禍成矣或幸而集無而字止於郵平明闢關介士陳兵夾道驅其號以入卒無敢越伍而趨居有頃守謫去詔以李將軍代將軍西出疆兵臨萬勝城復以副使掌留事明年陟其能得加侍御史是嵗亞之東觀戰至壽春得副使之迹題之於署下以記行事之時云
