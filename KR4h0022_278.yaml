body:
  text: 文苑英華卷二百七十八宋李昉等編送行十三白居易十二首殷堯藩一首姚合十二首章孝標一首施肩吾一首袁不約一首劉商六首朱慶餘十首賈島二十四首洛下送牛相公出鎮淮南白居易北闕至東京風光十六程坐移丞相閣春入廣陵城紅斾擁雙節白鬢無一莖萬人開路看百吏立班迎閫外君彌重樽前我亦榮何須身自得將相是門生送武士曹歸蜀士曹即武中丞兄白居易花落鳥嚶嚶南歸稱野情月宜秦嶺過集作宿春好蜀川集作江行江集作鄉路通雲棧郊扉近錦城烏臺陟岡老人集作送羡别時榮江西集作西河雨後送客前人雲黑雨修修江昏水暗流有風催解纜無月伴登樓酒罷無多興帆開不少留唯看一點火遙認是行舟送友人上峽赴東川辟命前人見説瞿唐峽斜橫集作銜灧澦根難於尋鳥道險過上龍門羊角風頭急桃花水色渾山回若鰲轉舟入似鯨吞巖合愁天斷波跳恐地翻憐君經此去為感主人恩送令狐相公赴太原前人六纛雙旌萬鐵衣并汾舊路滿光輝青衫書記何年去紅斾將軍昨日歸詩作馬蹄隨筆走獵酣鷹翅伴觥飛北都莫作多時計再為蒼生入紫薇送令狐尚書赴東都留守前人翠華黃屋未東巡碧落青嵩付大臣地稱髙情多水竹山宜間望少風塵龍門即擬為遊客金谷先憑作主人歌酒家家花處處莫空管領上陽春送徐州髙僕射赴鎮前人伏集作大紅斾引碧油集作幢旌新拜將軍指點行戰將易求何足貴書生難得始堪榮離筵歌舞花叢散候騎刀鎗雪隊迎應笑蹉跎白頭尹風塵唯管洛陽城送蘄春李十九使君赴郡前人可憐官職好文詞五十專城未是遲曉日鏡前無白髮春風門外有紅旗郡中何處堪携酒席上誰人解和詩唯共交親開口笑知君不及洛陽時送河南尹馮學士赴任前人石渠金谷中間路軒騎翩翩十日程清洛飲氷添苦節碧嵩看雪助髙情謾誇河北操旄鉞莫羡江南擁斾旌時新除二鎮節度何似府寮京令外别教三十六峯迎送唐州崔使君侍親赴任前人連持使節歷專城獨賀崔侯最慶榮烏府一拋霜簡去朱輪四從板輿行郎中從殿中連典四郡皆侍親赴任發時正許沙鷗送到日方乘集作兼竹馬迎唯慮郡齋賔友少一集作數杯春酒共誰傾送陜州王司馬赴任前人陜州司馬去何如養病集作靜資貧兩有餘公事間忙同少尹俸錢多少敵尚書只携美酒為行伴獨集作唯作新詩趂下車自得集作有鐵牛無詠者料君投刃必應虛送客前人病上藍輿相送來衰容秋思兩悠哉涼風嫋嫋吹槐子却請行人勸一杯送客遊吳殷堯藩吳國水中央波濤白渺茫衣逢梅雨漬船入稻花香海戍通鹽竈山村帶蜜房欲知蘇小小君試到錢塘送别賈島姚合懶作歸鄉客集作佳山人官家自賃身書多筆集作簽漸重卧少枕長新野客狂無過詩仙瘦始真秋風千里去誰與我相親送任畹及第歸蜀前人子規啼欲死君聼因無愁闕下聲名出鄉中意氣遊東川橫劒閣南斗近刀州神聖題橋集作前字千人看不休送饒州張使君前人鄱陽勝事聞難比千里連連是稻畦山寺去時通水路郡門開處是詩題化行應免農人困庭靜惟多野鶴栖飲罷春明門外别蕭條驛路夕陽低送徐員外赴河中從事前人赤府從軍美儒衣結束輕涼飈下山寺曉浪滿關城間坐生集作饒詩景髙眠散酒醒集作長道情將軍呈集作不戰術計日立功名送巢縣裴明府前人見説為官處煙霞思不窮夜猿啼户外瀑水落厨中名藥人難識仙山路盡集作易通還施清集作還應施淨化誰復與君同送王淡前人常看集作省為官處門前數樹松尋山屐費齒書石筆無鋒果熟猿偷亂花繁鳥語重今來為客去借集作惜取最髙峯送王集作盧祕書遊魏川集作州前人太行山下路荆棘昨來平一自開元後至今通集作今逢客行地形吞北虜人事接東京掃灑塵埃集作氛埃靜遊從氣味生薊門春不豔淇水暖還清看野風情逺緣花酒病成官間身自在詩逸語縱橫車馬回應晚煙光滿去程送陳彤之集作稠赴江寧從事前人荆州勝事衆家集作皆聞幕下今朝又得君才子何須守集作藉科第男兒終久要功勳江村竹樹多於草山路塵埃半是雲新什定知饒景思不應一向賦從軍送源中丞使新羅前人赤墀賜對使殊方官重霜臺紫綬光玉節在船清海怪金函開詔撫集作拜夷王雲晴漸覺山川異風便寧知道路長誰得似君將雨露海東萬里灑扶桑送張宗原前人東門送客道春色如死灰一客失意行十客顔色回文粹作低住者既無家去者又非歸窮愁一成疾百藥不可治子賢我且愚命分不合齊誰開蹇躓門日日同遊栖子行何所切集作之所切食與衣誰能買仁義令子無寒飢野田不生草四向生路岐士人甚商賈終日須東西鴻鴈春北去秋風復南飛勉君向前路無失相見期送任畹評事赴沂海前人擲筆不作尉戎衣從嫖姚嚴冬入都門僕馬氣益豪沂州右鎮雄士勇旌旗髙洛東無憂虞半夜開虎牢丈夫貴功勛不貴爵祿饒仰眠作書生衣食何由銷任生非常才臨事膽不搖必當展長畫逆波斬鯨鰲九陌塵土黑話别立逺郊孟堅勒燕然豈獨在漢朝送李餘及第歸蜀前人蜀山髙岧嶤蜀客無平才日飲錦江水文章盈其懷十年作貢賔九年多邅回春來登髙科升天得梯階手持冬集書還家獻庭闈人生此為榮得如君者稀李白蜀道難羞為無成歸子今稱意行所歷安覺危與子久相從今朝忽别離風飄海中船會合難自期長安米價髙伊我常渴飢臨岐歌送子無聲但陳詞義交外不親利交內相違勉子慎其道急若食與衣苦爇疑作熱道路亦疑作赤行人念前馳一杯不可輕逺别方自兹送饒州張蒙使君赴任章孝標饒陽因富得州名不獨農桑别有營日暖持集作提筐依茗樹天隂把火入銀坑江寒魚動槍旗影山晚集作曉雲和鼓角聲太守能詩兼愛靜西樓見月幾篇成送人集作客南遊施肩吾見説南行集作遊偏不易中途莫忘寄書頻凌空瘴氣窮飛鳥解語山魈惱病人閩縣緑娥能引客泉州烏藥好集作可防身異花竒竹分明看待汝歸來畫取真送人至嶺南袁不約廣嶺春風暖花多不識名瘴煙迷月色巴路傍溪聲畏藥將銀試防蛟避水行知君憐酒興莫殺醉猩猩送廬州賈使君拜命劉商考績朝稱貴時清武用文二天移外府三命佐元􅈴佩玉兼髙位摐金閲上軍威容冠是鐵圖畫閣名藝人詠甘棠茂童謡竹馬羣懸旌風肅肅卧轍淚紛紛特達恩難報升沈路易分侯嬴不得從心逐信陵君送林衮侍御東陽秩滿赴上都前人幾年烏府內何處逐鳬歸關吏迷驄馬銅鍾纍繡衣野人山草緑客路栁花飛况復長安逺音書從此稀送楊間侍御拜命赴上都前人賀客移星使絲綸出紫薇手中霜作簡身上繡為衣􅍡馬朝天疾臺烏向日飛親逢皆避路不是送人稀送李元規昆季赴舉前人見誦甘泉賦心期折桂歸鳳雛皆五色鴻漸又雙飛别思看衰栁秋風動客衣明朝問禮處暫覺鴈行稀送人之江東前人含香仍佩玉宜入鏡中行盡室隨乘興扁舟不計程渡江霖雨霽對月夜潮生莫慮當炎暑稽山水木清滑州送人先歸前人河水氷消鴈北飛寒衣未足又春衣自憐漂蕩經年客送别千回獨未歸送壁州劉使君朱慶餘王府登朝後巴香典郡新江分入峽路山見採鞭人舊業孤城夢生祠幾處身知君素清儉料得却來貧送盛隨軍前人莫辭東路逺此别豈間行職處中軍要官兼上佐榮野亭嵐色暗秋水藕花明拜省期將近孤舟促去程送韋校書赴靈州幕前人共知行處樂猶惜此時分職巳為書記官曽校典墳寒城初落葉髙樹晚集作逺生雲邊事何須問深謀祗在君送崔秀才遊江陵前人樽前荆楚客雲外思縈回秦野春已盡商山花正開鷗驚帆乍起虹見雨初來自有歸期在蟬聲處處催送淮隂丁明府前人之官未入境巳有愛民心遣吏回中路停船集作車對逺林鳥聲淮浪靜雨色集作氣稻苗深暇日公門掩惟應伴客吟送韋繇校書赴浙東幕前人丞相辟書新秋關獨去人官離藝閣早名占甲科頻水驛迎船火山城候吏塵湖邉寄家去到日倍榮親送饒州張使君前人白頭為郡清秋别山水南行豈覺賒楚老巳集作只應思入境吳門從此去移家館依髙嶺分樟葉路出重江見葦花務退惟當吟咏苦留心曽不在天集作生涯送郡州林使君前人軒車此去也逢時地屬湘南頗入詩一月計程那是逺中年出守未為遲水邉花氣薰章服嶺上嵐光濕畫旗想得化行風土變州人應為立生祠送劉思復南河從軍前人七千里别寧無恨且貴從軍樂事多不駐節旄先候發偶逢山寺亦難過蠻人猶放畲田火海獸羣逰落日波逺作受恩身不易莫拋書劒近笙歌送浙東周巡集作川官前人久聞從事滄江外誰謂無官已白頭來備戎裝嘶數騎去持丹詔入孤舟蟬鳴驛樹集作逺驛殘陽逺集作樹鷺起潮田夕集作片雨秋到日重陪丞相宴鏡湖新月在城樓送殷侍御赴同州賈島馮翊滿西郡沙岡擁地形中條全離嶽清渭半和涇夜久眠明月秋新集作深至洞庭由來交臂者集作辟士事事集作别偃林扄送皇甫侍御前人曉鐘催早朝獨自赴嘉招舟泊襄江濶田收楚澤遙鴈驚起衰草猿渴下寒條來使黔南日時應問寂寥送陳判官赴天德前人將軍邀入幕束帶便離家身暖蕉衣窄天寒磧日斜火燒岡斷草風捲雪和沙絲竹豐州有春來祗欠花送唐瓌歸敷水莊前人毛女峯當户日髙頭未梳地侵山影掃葉帶露痕書松徑僧尋藥沙泉鶴見魚一川人境别集作風景好恨不有吾廬送裴校書前人拜官從祕省署職在藩維多故長踈索髙秋逺别離天寒泗上醉夜靜嶽陽碁使府臨南海帆飛到不遲送杜秀才東遊前人東遊誰見待盡室寄長安别夜葉頻落登途集作去程山巳寒大河風色渡曠野燒煙殘匣有青銅鏡時將照鬢看送人南歸前人分手向天涯迢迢泛海波雖然南地逺見説北人多山暖花常發秋深鴈不過炎方饒勝事此去莫蹉跎送人南遊前人此别天涯逺孤舟泛海中夜行常認火帆去每因風蠻國人多富炎方語不同鴈飛難度嶺書信若為通送鄒明甫遊靈武前人曽宰西畿縣三年馬不肥債多憑劒與官滿載書歸邉雪藏行徑林風透卧衣靈州聽曉角客館未開扉送朱可久歸越中前人石頭城下泊北固暝鍾初汀鷺潮衝起船忩月過虛吳山侵越衆隋栁入塘踈日欲躬調膳辟來何府書送崔定前人未知遊子意何不避炎蒸幾日到漢水新蟬鳴杜陵秋江待得月夜話集作語恨無僧巴峽迎過否連天十二層送姚杭州前人白雲峰下城日夕白雲生人釣魚江老集作人老江波釣田侵海樹耕吳山鍾入越蓮葉吹搖旌詩異石門思濤來閣上集作向越迎送黃和新歸安南前人池亭沈飲遍非獨曲江花地逺路穿海春歸冬到家火山難下雪瘴土不生茶知決秋集作移來計相逢期尚賒送田卓入華山前人山深是暮蟬驚覺石床眠瀑布五千仞草堂瀑布邊檀松涓滴露嶽月泬寥天鶴過君須看上頭應有仙送人適越前人髙城滿夕陽何事欲沾裳遷客蓬蒿暮遊人道路長晴湖勝鏡碧寒栁似金黃若有相思夢殷勤載八行送饒州張使君前人終南雲雨連城闕去路西江白浪頭滁上郡齋離昨日鄱陽農事勸今秋道心生向前朝寺文思來因靜夜樓借問泊帆干謁者誰人曽聽峽猿愁送陜府王建司馬前人司馬雖然聽曉鐘尚猶髙枕恣踈慵請詩僧過三門水賣藥人歸五老峰移舫緑萍深處息登樓涼夜此時逢杜陵惆悵臨相餞未寢月前多履集作屐蹤送羅少府歸牛渚前人作尉長安三月罷集作二月忽思牛渚夢天台楚山逺色獨歸去灞水空流相送回霜覆鶴身松子落月分螢影石房開白雲多處應頻到寒澗泠泠濺集作潄古苔送沈秀才下第東歸前人曲言惡者誰悅耳如彈絲直言好者誰刺耳如長錐沈生才俊秀心腸無邪欺君子忌茍合擇交如求師毁出嫉夫口騰入禮部闈下第子不恥遺才人耻之東歸家堂逺棹轡時參差浙雲近吳見汴栁接楚垂明年春光别回首不復疑送周判官元範赴越前人原下相逢便别離蟬鳴關路使回時過淮漸有懸帆興到越應將墜葉期城上秋山生菊早驛西寒渡落潮遲巳曽幾遍隨旌斾去謁荒郊集作涼大禹祠送陳商前人古道長荆棘新岐路交橫君於荒榛中尋得古轍行足踏聖人路貌端禪士形我曽接夜談似聼講一經聨翻曽數舉昨登髙第名釡底絶煙火曉行皇帝京上客逺府遊主人須月明青雲别青山何日復同升送張校書季霞前人從京去容州馬在船上多容州幾千里直傍青天涯掌記試校書未稱髙詞華義枉不可屈出家如入家城市七月初熱與夏未差餞君到野地秋涼滿山波南境異北候風起無塵沙秦吟宿楚澤海酒落桂花暫醉即還醒彼土生桂茶送汲鵬前人淮南卧理後復逢君姓汲文采非尋常志願期卓立深江東泛舟夕陽眺原隰夏夜言詩會往往追不及送集文上人遊方前人來從道路井去求溪邊會分首芳草時逺意青天外此遊詣幾嶽嵩華衡恆泰文苑英華卷二百七十八
