body:
  text: 文苑英華巻六百四十一宋李昉等編進貢中降誕日進物狀十五首進農書狀一首進碑文狀二首進詩狀一首進新舊文十巻狀一首進畫馬屏風狀一首進東封圗狀一首進西北邊圗經狀一首進哀册文狀二首降誕日進光明砂等狀呂頌右臣伏以大電遶樞千年感聖神光照室六合歸尊恭惟降誕之辰是啓乾坤之祚普天稱慶率土同歡仰舜日而徘徊望堯雲而忭躍前件光明砂等金丹上品著在仙經願因一作延不朽之姿永固長生之壽二右臣伏以上𤣥降聖之時皇帝出震之日天垂景曜遶北斗以呈祥人竭歡心願南山而為壽前件光明砂丹石等管内所出服餌所尚生依山谷誠有驗於仙方貢自蠻夷幸得充於御府臣藩守有限不獲稱慶闕庭降誕日進物狀裴次元右臣伏以摇光之祥貫月於佳夕遶樞之感降聖於良辰歡浹寰瀛慶延寳祚百靈効祉固増壽於南山萬國一心皆貢珍於北闕臣謬膺廉問分鎮甌閩當朝宷之稱觴身居遐逺望長安而瞻日戀積心魂前件女口及銀器衣箱等稽禹貢之文敢遵任土比野芥疑作芹之獻空願竭心冀因此而展誠豈以菲而廢禮輕凟旒扆隕越伏深降誕日進馬及織成紅綿地衣狀于邵右臣伏以今月十九日陛下降誕之辰萬國駿奔二儀交泰玉帛方陳於闕下慶抃實匝於寰中臣謬荷殊恩思登壽域伏以馬則雄姿未織此句疑誠謝於權竒織成乃異於宷箱宜或存於煥爛懿慈致逺之用宜秉含章之資慿物遵疑誠感恩祝聖所獻雖慙於萬國均情實邁於等夷臣不勝懇悃之至為京兆李尹降誕日進衣狀劉禹錫衣一副四事云云右伏以徳水方清真龍下降天長地久瞻北極而常尊獻壽稱觴配南山之集作而永固臣地叨集作居宗屬職忝尹京慶賀之誠倍萬常品前件衣服謹詣銀臺門奉進輕瀆旒扆伏用兢惕集作皇降誕日進銀器物及零陵香等狀令狐楚右伏以千年元命之符四月正陽之氣出震吉日繼乾良辰黄河再清冠中古之表徳恒星不見掩西方之誕聖前件器物或堅白無玷或馨香有聞敢同率土之心以續如天之壽干冒宸扆伏増戰越降誕日進鞍馬等狀右臣伏以繞樞之電曽委瑞於軒皇照室之光昔呈祥於漢后伏惟皇帝陛下貴従天下明在日中當四月之正陽闕千年之聖運人神叶慶朝野同歡臣任重戎旃路遥天闕懽呼萬嵗如聞山嶽之聲傾竭一心庶均葵藿之志前件馬等誠非珍異頗似柔馴干冒宸嚴伏増戰越二右伏以月惟首夏氣叶正陽一人慶誕之辰萬國樂康之日臣某屬連枝葉守在邊陲覩河水之既清知冬松之盛一作益茂前件馬并鞍轡等安其馴教考以精誠敢縁九族之恩願續萬年之夀干冒宸扆無任戰越三右臣伏以大電繞樞之辰普天咸慶神光照室之夜匝地同歡臣限守邊陲未朝雲闕尚想河清之色如聞里社之聲前件馬鞍等久似柔馴皆經考教任土作貢慙述職於㣲臣如日之升願並明於聖主干冒陳獻伏増戰越四右臣伏以里社既鳴斗樞爰電誕生元聖允叶純陽實萬國同歡之時而千齡兆慶之日臣某限従邊役違奉天慈飲河每挹於清瀾向闕遥瞻於紫氣前件鞍馬等駿非金骨麗乏錦韉慙無照地之光願獻呼嵩一作山之夀干冒陳獻伏増戰越降誕日為楊大夫奏修功徳并進馬狀前人右臣伏以居至道之尊其唯元命助無疆之祚亦在勝因是以千年為慶誕之期百福有莊嚴之義伏惟皇帝陛下以文武道為天人師降生於純陽之月纘承于大寳之位効祉而四天奔走流懽而萬國謳歌臣某職在鍳司土無珍異恨無以拜上𤣥之慶酬厚載之仁敢伏普通轉修經戒仰申誠懇以就有為之功上為聖神庶資無量之夀其馬久令教習頗似柔馴願承内廐之恩以備屬車之駕干冒塵瀆不任戰汗之至降誕日進器物狀王仲周右伏以執氣牧人運歸聖徳天臨日照慶集嘉辰瞻太極之肇分仰濛汜之初浴歡忻感戴踴躍屏營臣限守方隅不獲稱賀上件銀器等随伏奉進二右伏以紫氣充庭黄河變色用符昌運式表誕彌雖聖夀齊天不假封人之祝而獻芹為禮空馳野老之誠上件銀器綿錦綾綺等謹遣某官随狀奉進三右伏以厥日誕祥惟天降聖歡連率土慶集兹辰前件器物雖竭愚誠欲申上獻顧惟簡薄難備下陳伏以陛下勤恤為心慈儉成徳是用恭行聖㫖為禮不寳逺物為珍臣限以跼守遐藩不獲申慶天闕竊同纎草長傾向日之誠願比封人逺獻如山之夀無任戀慕歡躍之至四右伏以四月孟夏千年聖期社鳴表祥河清叶慶臣於是日限守列藩不獲望南山以獻觴聞擊石以率舞屏營戀慕不知所裁上件品物等謹遣某官随狀奉獻進農書狀農書三巻栁宗元右伏奉某月日制集作勅宜以二月一日為中和節所司進農書永為恒式者臣伏以平秩東作虞書立制俶載南畝周雅垂文此皆奉天時以授人盡地利而豐食自陛下惟新令節益勵農功既立典於可傳每陳書而作則耕鑿之力敷帝力於嘉謨稼穡之艱動天心於睿覧集作鑒勤勞率下超邁古先凡在率土不勝幸甚前件農書謹函封進謹奏進田𢎞正碑文狀元稹田𢎞正魏慱徳政碑文右前件碑文伏䝉御札朱書遣臣撰述恩生望外事出宸𠂻銘鏤骨肌難酬雨露中謝臣伏以陛下所以令臣與𢎞正立碑盖欲遣魏博及鎮州將吏等並知𢎞正首懐忠義以致功勲臣若苟務文章廣徴經典非惟將吏不㑹亦恐𢎞正未詳雖臨四逹之衢難掩萬人之口臣所以効馬遷史體叙事直書約李斯碑文勒銘稱制使𢎞正見銘而戒逸將吏觀叙而愛忠不隐實功不為溢美文雖朴野事頗彰明伏乞天慈特留宸鍳其碑文謹随狀封進謹具奏聞伏聼勅㫖進幽州紀聖功碑文狀李徳裕奉宣令臣撰述者伏以北狄悍勇於四夷前代聖王莫能制伏昨者回鶻雖乗危蹙勢已内侵豺狼之師尚餘十萬陛下神武雄斷智出無方震天威以霆聲碎獯戎而瓦觧武功盛烈髙視百王豈比周穆犬戎之征荒服不至漢武馬邑之詐群帥無功將垂耿光宜命鴻筆臣學慚集作藝荒淺久病衰羸集作殘紀軒后之功徒知竭思叙唐堯之徳終愧難名採其功狀稍似摭實今已撰訖謹連進上輕瀆宸嚴集作扆不任惶越謹錄奏聞進詩狀元稹臣某雜詩十巻右臣面奉聖㫖令臣寫錄一雜詩進来者伏惟皇帝陛下學深江海文動星辰乙夜觀書秋風賦詠微臣入院之始學士等盛傳陛下親批賀雨一章體備鸞凰思深集作含珠玉臣雖不得目覩宸翰臣實竊得心念聖言既仰燭龍之光難逞聚螢之照欲為陳獻益自慚惶况臣九嵗學詩少經貧賤十年謫宦備極恓惶凡所為文多因感激故自古風詩至今樂府稍存寄興頗近謳謡雖無作者之風粗中遒人之採自律詩一百韻至於兩韻七言或因朋友戲投或因悲歡集作或以悲傷自遣既無六義皆出一時詞㫖繁蕪倍増慚恐今謹随狀陳進集作進呈無任戰汗屏營之至進新舊文十巻狀李徳裕四月二十三日奉宣令臣進来者伏以揚雄云童子雕蟲篆刻壯夫不為臣往在弱齡即好詞賦性情集作情性所作衰老不忘屬吏職嵗深文業多廢意之所感時乃成章豈謂擊壤庸音謬入帝堯之聼巴渝末曲猥䝉漢祖之知跼蹐慙惶神魂飛越謹錄新舊文十巻進上輕瀆宸嚴無任兢惕代李尚書進畫馬屏風狀李翺集無右臣近得前件馬様以其圗寫諸家稍殊試為短屏備以文彩觀其體閑色浮氣逸神駿練影吳浦指山川而不摇花攢上林若雨露之新洗或屈膝千里或長鳴九霄昔以負圗為寳今願捍蔽成功形影不殊効用何别謹裁成十二扇随狀奉進若以時従啓閉猶足靖於埃塵儻將用以驅馳庶可效其䈥力輙敢輕冒戰懼伏深為裴相公進東封圗狀劉禹錫見集本集賢殿御書院開元東封圗一面右臣謹按開元十三年𤣥宗皇帝以天下太平登封東岳聲名文物振耀古今伏惟陛下丕承耿光再闡鴻業祖宗盛事紹復有期臣所以寫成此圗輙敢上獻至於繪畫躬自指撝徴史氏之文纂禮容之要山川氣象悉擬真形羽衞威儀咸稽故實所冀睿情一覧遐想𤣥蹤臣叨榮過深抱疾已久望陛下告成之日心必前知嗟老臣將謝之年身恐不見疲羸之際感激倍深前件圗差某官乙謹詣光順門奉進謹奏進西北邊圗經狀元稹京西京北圗經四巻右臣今月二日進京西北圗一面山川險易細大無遺猶慮幅尺髙低閱覧有煩於睿鑒屋壁施設俯仰頗勞於聖躬尋於古今圗籍之中纂撰京西京北圗經共成四巻所冀袵席之上欹枕而郡邑可觀遊幸之時倚馬而山川盡在又太和公主下嫁伏恐聖慮念其道逺臣今具錄天徳城已北至廽鶻衙帳已来食宿井泉附於圗經之内并别寫一本與圗經序謹同封進其圗四巻随狀進呈進憲宗哀册文狀令狐楚右奉勅令臣撰者臣今撰了謹連如後竊以揚先帝無疆之徳薦陛下罔極之恩宜擇能者永垂不朽聖意以臣備位相府䇿名文塲忘其庸虗賜以撰述頃自哀迷重疊心緒摧落雖磨鉛雕朽已竭其精誠捧日窺天難窮其髙逺干冒封進無任悲躍屏營之至進貞懿皇后哀册文狀常衮右奉進㫖令臣撰詞訖謹随狀封進伏以纂述坤儀𢎞宣聖悼禮有追册文以叙哀前代以来舊章不易屬詞之重髙選文臣晉之恭后則王彪之顔延年咸製其詞哀華著稱至貞觀中文徳皇后遷座特詔虞世南撰述編於文館永播徽音此二臣者皆以鴻藻奮於一時用能紀皇壼之風煥青史之簡臣才學甚淺典䇿非工承詔兢悚匪惶夙夜伏自循省叨竊至深陛下徃命貴妃追封殊號册諡之令皆臣奉行徳範柔明多所遺闕退思鄙薄于今愧赧况又獲承慈㫖重紀芳猷雖竭庸虗慚無麗藻屬文明天下多士盈朝顧其式瞻何以昭示冒嚴上獻益用兢惶無任戰懼之至文苑英華巻六百四十一
