body:
  text: 文苑英華巻六百四十八宋李昉等編露布二河西破蕃賊露布一首兵部奏劔南節度破西山賊露布一首兵部奏桂州破西原賊露布一首西平王李晟収西京露布一首河西破蕃賊露布闕名朝議大夫守左散騎侍郎河西節度經略使營田九姓長行轉運等副使判武威郡事赤水軍使攝御史中丞賜紫金魚袋上柱國臣某破蕃賊露布事尚書兵部臣聞背施怒隣惡貫以滿者天誅之行慶布澤徳政以順者人從之况乎夷背其隣有貫盈之罪王將服叛舉徳政之役彼曲我直何可敵哉蠢茲吐蕃僻在西裔山川禽獸以處之造物者以限之於外區也我國家貞觀之際戎有㣲服來朝太宗因而異之㗖以金帛終其身不敢近漢邉矣中宗之享國許修舊好姑務息人乃割愛主以降之至今朝廷無西顧之患洎我開元天寳聖文神武皇帝陛下嗣宅丕業文化遐被非不以徳和之矣然彼戎以承數代之患晏安七十年之間而得掠諸夷之種落猶纎草之滋蔓因怙其衆轉以作讐悉國興師犯我河隴天罰有罪大敗其衆既而戎有疑旋悔願得比為舅甥我皇帝以天地為心山澤含垢重使信以綏撫盖不忍以蠻夷而疲其中國人也噫卵而翼之犬長吠主反伐勃律之屬國匿我四疑亂之亡人誘我石堡之城踐我蕃禾之麥多行背徳是惡貫矣我皇帝怒之宻發中詔使乗不虞以襲之臣以統五原之帥擁中軍之師奉聖畧慿天威以今月初戒太初之巖引髙牙而出十二月㑹于大斗之南擇精騎五千皆蓬頭突鬢劔服之士乃遣都知兵馬使左羽林軍大將軍安波主帥之先鋒使右羽林大將軍李守義副之十將中馬軍副使折衝李廣琛等部之臣自以馬歩三千餘大斗建康三水張掖等五大賊路為應接别委行軍司馬大理司直攝殿中侍御史盧㓜臨領歩兵五百過合黎川為聲援又使大將軍渾大寧將軍契苾嘉賓各領歩兵於三水賊境為掎角波主等將辭臣戒之曰爾豈不聞乎天子之怒伏尸者百萬將軍之權得專誅戮爾須自大斗南山来入取建康西路而歸當吾所戰鋒可斷飛烏若不尅于敵逗留却一作既非行汝則有大刑雖尅于敵故道而還汝亦有大刑縁隴以西賊必知懼縱為多備亦可皷行此本出於聖謀縱舉覺必亦無慮諸將乃敢于勇决進不顧身十二日至新城南吐蕃已燒盡野草列火如晝諸將曰賊果知備矣因躡其烽燧髙揭旌旗氣雄雷霆聲疾風雨十五日至清海北界遇吐蕃兩軍遊奕二千餘騎波主乃使先鋒使大將軍李守義領鐡騎一千穿賊之中取背而陣又使先鋒副使郎將安貞領騎二百摩賊之壘斬馘而旋又使中馬軍副使李廣琛領勃律馬騎一千攻其旁又使節度總管李朱師等領兵八百騎亢其下使右馬軍副使張仁賢以遊兵一作卒一千敵其南北東西左右横集而兵氣初鋭馬逸不止弓矢三注而連發長劔四按而無前初頽廢與一作而茍在終蹂踐而皆盡誰為其後徒言魂魄歸天不報國恩飜聞肝腦塗地則向之為冦今已殱焉自朝至于日中凡斬二一作三千餘級十六日進至魚海軍千里煙塵百道旗皷波主已先遣前軍副使折衝傳光越設伏于便道及交矢石又使節度總管唐朝英等㓂疑而偽奔戎争追之遇伏皆死一作斃因得戮巨鯨於魚海墜封豕于鹿泉平積骸成京觀斬魚海軍大使劔具一人生禽魚海軍副使金字告身論悉諾匝生擒棄軍大使節度悉諾榖生擒遊奕副使諾匝生擒副使金字告身拱齎生擒魚海軍副使銀字告身統牙胡其餘偏禆難以盡一作備載斬首三千級生俘千餘人牛馬羊駝八萬餘頭數獲未畢虜救潜来在山滿山在谷滿谷顧盼之際合圍數重諸將皆曰兵法所謂致之死地今則是也亦焉能䧟於虜廷辱眀主之深料乎於是謀夫一心士戰倍力擇强弩長㦸為外拒寘輜重生級于其内雖喜獲多急何能保其俘囚有因動而將變且驅而斬之其虜畜有力極而難致則擁而焚之候暴夜之時望歸路而突之其初也衘枚屏氣鬼神無聲既出則奮臂大呼天地摇動暗疑作諸將馳逐而𤣥黄且戰且行一千餘里馬無齕草之所人無抔一作旅飲之地共食氷雪傳飡糗糧猶能夜盗虜之勞使自攻殺朝㧞虜之幟争為致師凡七八日間約三百餘陣至合河之北斬得二丈之綏而莽布之更益其鋭兵追截我歸路安波主懼其危逼請救其後軍臣遂遣副使劉之一作友儒等領後軍二千騎迎之㑹中使駱元表至臣行軍使善子雄監之同往救兵既至旌旗相望其氣益振又戰數合虜既不利夜遂遁逃臣聞軍得歸便牒安波主虜之去也必謂我不能復追之必出其不意可使安思順反戈却入必盡擒之遂束疑作東精騎二千與之又使副使娑羅度抱一二丈城副使李可朱副之臣别差大斗軍副使烏懐愿討擊副使哥舒翰等領精騎一千應之分前麾随間道蔽山乗夜晨壓賊營或馬淖其妖夢之時或刄遊于假寐之際死生同泯不知其云前有朱衣旃裘保而相拒首已飛于異處身猶僵而兀立不可勝紀其有漏網得逸擐甲復来耻於生降窮以死决不免戈矛以撞㧙而擁坑谷以頹填而就拉拘十不存一所以擒金銀告身副使三人斬首千餘俘囚二百餘人獲牛馬羊駝共三千餘頭疋器械新物一萬餘事謂我再尅而虜再敗矣皆㑹漢境一如往哲之朝善一作苦非戰以来人所不覩臣試迹前事行之惟艱且李陵之兵盡矢窮緤為之虜秦人之勞師襲逺再敗其師未有如今之深入能勝歸者此乃陛下神斷之謀也聖威之被也不然豈季冬之月天地嚴凝齎孤軍十月疑作日之糧入絶域重阻之地横跳千里連皷數軍討而復擒歸而復襲一日三㨗震天聲而凱旋臣獨輯甲兵日討軍實終當㧞邏些城青地斬賛普之首以懸北闕則臣之願畢矣不勝慶快之至謹遣某官奉露布以聞兵部奏劔南節度破西山賊露布𤣥宗楊譚臣聞天分四序寒暑莫同地裂八陣華夷各異言語不達詎可以政令齊包茅不供乃可以干戈服黄軒有涿鹿之戰以定火災顓頊有共工之陣以平水害逖聴前古無能去兵將用撫柔遐荒混一書軌豈徒勞師玩冦黷武殘人而已哉伏惟開元天地之大寳聖文神武應道皇帝陛下清静端極無為體道祖文徳而耀昌期種虜觧甲恢武功而運上䇿皆慕化之賓惟彼西戎可逃天孽豈謂慈仁廣覆猶見背陽之禽聲教傍羅尚有吠堯之犬伏以南蠻亂徳恃險偷生吐蕃舉國興兵資其叛逆頃者西山戰士及八國子弟因其窘逼遂欲慿陵敢懐猶鬭之心来犯必誅之令以正月五日率故洪臘城裹囊邛三節度兵馬八萬餘人分為六道攻圍萬安柔逺眀威平戎及保寧都䕶衛等五城驅牛馬有甚於谷量運干戈實踰于山積萬安城使金吾衛將軍張知海柔逺城使右金吾衛大將軍于仙障平戎城使武衛劉元果眀威副使折衝管希光攝保寧都䕶折衝馬仙童等乆戍邉隅備閑攻守或自固堅壁不發懸門或蓄其精銳誘以羸弱賊等不虞設詐競欲登陴再皷當彼竭之餘一舉得我盈之勢矢石齊發噍類無遺前後殺傷不可勝紀八國招討副使左羽林軍大將軍董當左羽林軍將軍董旁郎董畢郎右羽林董利董哥弄左驍衛將軍董利峰一作蓬左武衛將軍董奉仇左威衛翊府中郎將先鋒党利才統八國子弟八千餘衆并都䕶武士府健兒一千餘衆間道設伏潜入深林旗皷相望晝夜苦戰自其月十五日都䕶武士殺賊衆退散至十七日遂攻合所圍眀威柔逺兩城兵馬併力死戰攻萬安新城十八日都知西山子弟兵馬副使左金吾衛大將軍攝臨翼郡太守董郤麴左羽林軍大將軍兼静郡太守董元智右羽林大將軍兼蓬山郡太守董懐恩右驍衛將軍兼歸誠郡太守董思賢江源郡太守董懿一作慤右驍衛大將軍董仁羆折衝董弄封等領八郡驍勇并蕃漢武士等七千人自蓬娑路取牙山出其不意銜枚夜襲賊等震驚遂相殘戮棄其輜重稍欲抽軍蒼黄之際前後一作剪除畧盡漂杵之血方此非少積觀之屍今茲目覩同州節度副使都知兵馬使左羽林大將軍兼通化郡太守譚元管受遣左金吾衛將軍裴振攝維川郡長史折衝張粲雲山守捉使折衝姚髙偘攝天保郡折衝楊夏日攝司馬董元勒一作勤等率健彍三千人自滴慱領入競施掎角之勢各陳擒縱之謀自正月五日至二月五日前後轉戰五十餘陣生擒吐蕃哥末國王渠時兵馬副使翟歩離并士衆等二千餘人斬獲故節度副使且禄翁都知使乞吕徐男律熈等械牛馬羊等二十餘萬右威衛郎將康裕昌保寧都䕶府長史鍾景等恭承將命挺劔重圍宣傳聖恩曉諭將士遂得賈勇萬夫激節以小克衆實仗天威取亂推亡誠因廟算今長鯨就戮封豕載屠桃塞放牛徒聞往牒華陽歸馬希遇聖朝無任慶快之至謹遣威衛郎將楊如海奉露布以聞軍資器械别簿録上兵部奏桂州破西原賊露布肅宗楊譚臣聞聲教無外修文徳以来逺人職貢有虧耀武威而討亡命然則五材並用金革為遏亂之資八卦相宣弧矢乃濟時之具事非獲已道豈為侔將治衆以安人必除殘而禁暴歴覽今古誰能去兵未有舍禮樂而致昇平奮干戈而𢎞大業者也伏惟乾元大聖光天文武孝感皇帝陛下眀齊日月徳配天地化周異類澤洎無垠寰宇已墜而更興社稷將顛而復振崇勲累績曠古莫儔蠢茲魑魅之鄉敢恃犬羊之衆據其險要恣其冦攘西原覊縻舊染聲教被其不閭二字一作險皆可疑誘引同惡者多僣稱王侯偽署官爵旌旗蔽野皷角沸天恣殺戮以威人將玉帛而濟衆方圓數千里控帶十八州丁壯並執其干戈子女盡充其僕𨽻自謂強盛轉加兇頑廹之則鳥散獸驚緩之則蟻結蜂聚老㓜奔走耕稼失時萬井無烟兆人失業不賓王化于兹四稔臣前年銜命到州深入招慰示之仁信許其自新猶尚慿陵毎行攻刼管内州縣日漸流離村落焚燒廬井空竭伏奉去年三月十日勅遣中使魏一作衛朝璨宣慰凡諸首領皆賜勅書再三曉諭許其官爵但以炎方人物躁競者多承平已来乆絶朝命自䝉提奨感激殊私戮力同心傾家竭産訓勉子弟䇿勵甲兵介胄自出於私門糧儲不損于官廩向非陛下化周動植徳及遐荒豈有不勞王師坐清氛祲去年二月二日睦州武陽珠唐書作朱蘭金溪黄橙等一百餘洞大賊帥偽號中越王廖殿此下偽號唐書與英華顛錯不同偽號桂南王莫淳偽號拓南王相公唐書作文偽號越南王莫尋唐書作潯偽號象郡王梁泰唐書作奉偽號鎮南王羅成唐書作誠偽號戎成王莫禱偽號南海王羅品等潜相結搆約二十萬衆跨壤連州志如梟獍風號雨嘯心等豺狼仍欲先破嶺南後圖嶺北逺近百姓皆不聊生臣遂激勸將士宣傳聖㫖誘以厚賞使其盡節皆决命苦戰非無損傷不顧危亡志懐忠勇大首領梧州長史鎮南副都䕶攝栁州刺史西原遊奕使張維南勸率首領統茲軍政萬夫齊進一舉無遺都知兵馬使朝散大夫象州刺史成匝領當管及栁州刺史衡州等戰手共一萬人巻其旌旗踰挺争先膺有渠魁當陣斬獲經畧副使朝議郎行賀州長史穆成搆防禦副使朝議郎梧州長史任早梧州刺史本州防禦使李抗先鋒總管梧州長史秦匡朝四界遊奕使廣州畨禺府折衝譚崇慰及總管子將等五百餘人并西原環古等州首領方子彈甘令暉羅承韋張九觧宋原等五百餘人各領子弟并部外義征及總管内戰手共成二十萬衆或擐甲伏兵縱其救援或致果决勝扼其喉咽左右夾攻飛走無路諸將及首領等義在竭誠以死無生以晝繼夜或攻或圍當其彼竭之餘遂得我盈之勢封豕既戮長蛇又屠餘黨喧騰自相蹂踐勢如觧籜事等摧枯指揮而夷獠䘮氣一作魂叱咤而山川阻色賊等既因失律不知所向或連袂墜谷自成積觀之尸或帶刄投江有同漂杵之血横行嵗乆驕縱日深勢如雷霆莫敢拒敵臣乃陳師誓衆思各忘軀自春徂冬凡經二百餘日前後苦戰各三十餘陣破賊二十萬衆斬首五十餘級以頭首䘮亡餘黨奔亂窮滅之後然始求降臣伏以人無盡劉道忌太甚因陛下好生之徳合陛下至仁之心於是宣傳聖恩示其生路大賊帥武承裴敬簡唐書作武裴承韋敬簡等二人餘衆竄伏無地周章失圖觧一作衿甲轅門面縛請罪臣便脱其桎梏仍加宴賞兼賚疋帛散于營農各分疆界使其斥堠遞相轄控永絶憂虞今臣管内亦且寧帖實賴天威逺偹疑作被廟算遐臨靖彼兇殘康兹億兆無任慶躍之至謹遣所部官桂州臨桂縣丞朱璟謹奉露布以聞其立功將士首領别簿奏上西平王李晟収西京露布一作破朱泚露布德宗于公異神䇿軍京畿渭北商華鄜坊丹延等州兵馬副元帥李晟於苑墻内神䴥倉東南連白苑二唐書作華破逆賊朱泚兵馬収復上都露布事尚書兵部臣聞春司生榮秋司一作主殺伐若終始煦嫗一作殺伐則不能成嵗功仁則順成暴則殘滅一作滅絶若一貫邪正則不能建大中是以一作故春秋序行則通天和而母元氣一作通天和而充氣母徳刑具舉則協王道而經彛倫亂由是除兵不可去堯舜禹湯之徳統元立極之君或制五兵或張九伐盖欲攘剔兇戾一作攘削姦冦乂安一作保乂生靈補雍熈之未洽佐聲教之不暨有以然者抑實為焉一作何伏惟皇帝陛下溥博法于乾坤貞眀侔于日月陶埏六籍表正萬邦揚髙祖太宗之耿光奉肅宗代宗之丕烈自纂承一作大前緒髙居穆清率土承有截之風懐生無不遂之性一作物頃者邉鄙或聳干戈爰設有征無戰許蔡傒首領之誅陸梁背誕涇原生肘腋之變逆賊朱泚所以委身凶徳假翮姦徒熒惑我生人僣賊我神器聚為起穢之物腥彼宫闈散作旬始之妖孛于躔次先皇帝懐柔河朔敷佑下人録其率化之類一作績加以登朝一作優以登賢之禮恩澤汪濊集凡庶之門名器燻灼加闒茸之軰一作質謂一作冀革桀跖一作驁將馴大和殊不知惡木生槎枿之荑瘈一作猰狗吠豢牢之主頃屬鑾輿順動郊畿一作圻駐蹕而泚乃嘯兇命醜阻兵安忍長㦸一作戈指闕流矢射天穿髙墉以鼠牙毒王師以蠆尾罪浮一作踰羿浞惡貫梟獍是以萬方糾一作憤怒九服囂騰思齒劔者投袂而興争倳一作淬刄者不期而㑹屬賊臣聞一作伺釁隂貸凶謀中一作既緩雷霆之誅遂延頃一作晷刻之命臣是用祗承睿算恭行天罰一作討攝衣登壇眀君親一作臣之大義禡牙宜一作饗社假神祇之幽贊以今月二十五日更一無更字總領師徒直趨都邑略㶚滻而一作以揚斾瞰囿游一作苑囿而下營土濠一作垡扶滑切雲舒木柵一作棚林植養威蓄鋭直殄元兇一作兇渠卧皷偃旗猶輕小利賊初陵犯畧以一作巳畧芟夷謂其氣竭而来歸尚敢尸居而作固敵若可縱師多奚為遂一無遂字至二十七日㑹諸將於中權占勝風于大斾未皷而人心粗勵先庚而軍令凝嚴各懐報主之誠一作報國之心盡一作争淬復讐之刃臣知其可用遂此疾一作長驅五月二十八日寅時華州鎮國軍節度使駱元光神䇿行營商州節度使兼御史大夫尚可孤本軍副使都知兵馬使御史大夫吳説一作詵都虞候兼御史大夫邢君牙京西行營都知兵馬使檢校工一作刑部尚書孟渉右廂兵馬使御史大夫康英俊隴州節度右廂兵馬使郭審全又權文成神䇿行營商州節度都虞候彭元一作光俊等受一作承命于牙旗之下分麾于轅門之外將士等超乗賈勇免胄啓行夾川陸而左旋右抽抵丘陵而侵一作浸滛布濩聲塞宇宙氣雄鉦皷陳兵于光泰門外悉一作盡銳於神䴥倉東繚垣坌一作槯以成塵滋水涸而為地左廣未歸一作離於舊壘前偏巳交于賊鋒若降于天若一作如出於地賊帥姚令言張芝一作雲二唐書作張廷之等志懐剽一作僄狡心一作言尚慿陵作忠盡謀力則不及怙亂賊義氣則一作如有餘勢如一作同颷馳衆若蜂一作螽集横列堅陣勢一作旁連髙岡猶張蹭蹬之鱗更舉螳蜋之臂衙前兵馬使兼御史大夫王必知牙官兼刀斧將兼御史中丞史萬頃等自相誓約又令軍行一作又合軍聲指麾而貔一作貙兕作威感激而風雲動色遂先登進擊深入合攻七擒連發而星馳兩翼旁行一作張而雲合霜刄吐一作交光而揮霍一作霍曜鼉皷騰聲而隱轔賊方土崩我乃霆擊乗其蹈一作路藉遂至于上蘭取彼鯨鯢直通乎一作於中禁段誠諌賊之心膂既就生擒涇原將一作沈厚運賊之羽毛終制死命故其係頸求活投戈乞降崩騰于蓁莽一作莽蒼之間震懾于旌麾之下臣以其今一作雖染汙俗昔實平人推赤心以如初敷皇一作王化而咸一作如一姚令言等力扞王師退而復合惡烏將墜尚顧危巢妖狐就擒猶守舊穴自夘及申一作自夘以及酉來拒而復攻讙譟之聲山傾而河泄皷􅎏之氣霆鬭而電奔一作雷馳屏翳發向敵之風回禄扇燎原之熖馬逸不止人怒未舒既自北而徂南竟輿屍一作尸而折首又使决勝軍節度使工部尚書唐良臣右廂兵馬使御史大夫趙光鏟一作銑唐書作銑義武軍兵馬使楊萬榮左歩軍使御史大夫孟日華馬軍將田子竒霍去憞一作傲郝覲等一無等字華州節度使左廂先軍兵馬使馬英華右先鋒兵馬使董泚華州至董泚二十三字一作華州在廂兵馬使馬英古先鋒兵馬使董玼神策行營商州節度兵馬使賈慎金右廂左都虞候張望都等領馬歩為副勢均破浪攻若一作甚決河雖其盗一作恃武庫之五兵慿宫垣之萬雉及茲翦滅才一作纔同欲乗陵曽無一作乏鐏刄之鋒巳失藩籬之固遂生擒偽署侍中董泰中書侍郎平章事蔣鎮左一作右僕射同平章事張光晃一無晃字兵馬使李倩敬釭等逆賊朱泚與同惡姚令言張芝等輕騎走出臣巳遣兵馬使田子竒等追躡計即梟一作誅夷臣竊以此賊包藏逆謀參㑹㐫徳祲沴一作氛其氣豺虎其心背先皇亭育之恩傷陛下𤣥黙之化漢之莽卓未足等夷晉有敦𤣥自當超軼子暴其父隂侵於陽自古未有如泚之大者也或者上天之意申儆于巨唐中興之期先一作光啓于陛下然則二字一作不然何王師奮伐一作發勢無駐於建瓴醜類搶攘功有輕于折箠猶慙一作逃宻網尚反隻輪誠當盡敵之時更發追亡之騎且稽分體未即燃臍快億兆之歡心復一作蕩宗社之深耻即當梟戮用申刑典今巳肅清宫禁祇一作修謁寢園鍾簴不移廟貎如故盡為二字一作盖宸極之所垂祐一作象列聖之所雄都神扶業業之傾天降穰穰之福不然豈免於毁圯之患崩剥之虞者哉此皆上天降鑒睿慮潜一作旁施制兵要於事先規雄武一作圖於彀内再造可封之俗因櫜不戰之功左武右文銷鋒鑄鏑澹乎華胥之代一作夢𡨕一作熈然葛天之風臣謬寄台司幸當統帥乏吉甫之文武缺郤縠之詩書此皆諸衆叶心羣帥宣力非臣庸瑣敢自矜大臣不勝慶快之極謹差監軍使王敬親牙觀御史大夫符郡王邵張少引謹奉露布以聞文苑英華巻六百四十八
