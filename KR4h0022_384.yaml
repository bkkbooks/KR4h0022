body:
  text: 文苑英華卷三百八十四宋李昉等編翰苑翰林學士授學士杜元頴加侍郎制元稹敕朝散大夫守中書舍人充翰林學士護軍賜紫金魚袋杜元頴昔我憲宗章武皇帝熏灼威明兵定八極大索俊乂以徴謨集作謀猷其在禁林尤集賢彥越正月夕庚子將棄倦勤付朕眇末乃詔元頴佐豫冲人以道揚丕訓爾亦祗奉顧命咨援集作授舊章輔釐哀憂俾克依據是夜而六官承式厥明而百吏授遺草定法儀兹實賴汝官不稱事豫懷歉然而又詞源奧深機用周敏申集作授之以疊委之詔而益辨漢書與辦同扣之以疑似之問而益明慎獨以修身推誠以事朕職勞可舉德懋宜升不俟踰時寧拘滿嵗綸誥清秩版圗劇曺例無兼榮特示甄寵豫以國士遇集作待汝汝以忠臣報豫效而集作乃肺肝司朕耳目可守尚書户部侍郎知制誥依前充翰林學士散官勳賜如故授學士沈傳師加舍人制敕書云臣作朕股肱耳目言天下不可一人理也今國家崇建執事以任股肱妙選侍臣實司耳目股肱良則心膂正耳目審則視聽明茍非端人何以近我而朝議郎守尚書兵部郎中知制誥充翰林學士上護軍賜紫金魚袋沈傳師潔靜精微風流儒雅名因道勝信在言前謙而愈光卑以自牧專對無不逹羣居若不知而又煥有文章發為詞誥使吾禁省中無漏露之患而朕語言與三代同風勤亦至矣事我滿嵗命汝即真勉竭乃誠以輔台德可守中書舍人依前翰林學士散官勳賜如故授元稹中書舍人翰林學士制白居易敕仲尼曰志有之言以足志文以足言言之無文行而不逺故吾精求雄文逹識之士掌密命立內廷甚難其人爾中吾選朝散大夫守尚書祠部郎中知制誥上柱國賜緋魚袋元稹去年夏拔自祠曺員外試知制誥而能芟一作削繁詞剗艷集作弊句使吾文章言語與三代同風引之而成綸綍垂之而為典訓凡秉筆者莫敢與汝爭能是用命汝集作爾為中書舍人以司詔令一作司誥嘗因暇日前席與語語及時政甚開朕心是用命汝集作爾為翰林學士以備訪問仍以章綬寵一作貴榮其身一日之中三加新命爾宜率一作守素履思永圗敬終如初足以報我可守中書舍人充翰林學士仍賜紫金魚袋散官如故授蕭俯起居舍人充職制敕左補闕翰林學士蕭俯頃居諌列職同其憂夙夜孜孜拾遺左右朕嘉乃志選在內庭自參密近益見忠讜終始不替尤足多之記事之官一時清選俾膺是命以𢎞勸奬可守起居舍人依前件授學士王源中户部侍郎制李虞中敕竭誠於補察必罄訏謨鋪文於誥命以先鴻業非明識屢經於體逺麗藻已著於知微則何以副我虛求充於任使翰林學士中散大夫中書舍人上柱國賜紫金魚袋王源中天籟無器大球不磨範圍可以程縉紳刀尺可以制度量自拔於郎署置諸中禁嘗因進見敷奏以言揖黃憲而𥚹凶疑不生覩汲黯而風神自整今時方無事政在和平外付股肱內依心腹必冀協恭以奉上營道而同方俾下無間言上無偏聽萬物攸繫朕時賴之勉勤夙夜之規以副簡求之望可尚書户部侍郎知制誥依前充翰林學士散官勳賜如故授學士李讓夷職方員外郎充職制前人敕夫言語侍從之臣非賢不命久而加奬則彜典也翰林學士朝議郎行左補闕賜緋魚袋李讓夷器以琢成材為衆出藴積邁時之志發明扶道之心學務研精文推軼拔早飛聲於戎幕遂躐位於諌垣忠言屢聞密命斯委果揚溫雅之清宜獲持謙一作訏謨之效亦既久次宜所轉遷受遐寵於握蘭用酬勞於視草勉𢎞前懿以服寵榮可行尚書職方員外郎依前充翰林學士散官賜如故授學士王源中等中書舍人制前人敕朝庭之制外有綸闈之職以奉大猷中有翰苑之司以專察疑作密命帝王懿範備舉而行森然在前其道一貫朝散大夫守尚書户部郎中充翰林學士上柱國賜紫金魚袋王源中能斷大事美秀而文服君子之儒乘賢人之業朝議郎行尚書禮部員外郎充翰林學士上柱國賜紫金魚袋宋申錫和順積中英華發外懷致君之志布經國之文二者皆國器也先皇帝能用之顧豫冲人敢不加敬申命執事崇其寵章藉右掖之芳名參內庭之重任思為盡飾朝典宜之源中可權知中書舍人依前翰林學士散官勳賜如故申錫可守尚書户部侍郎知制誥充翰林學士散官勳賜如故授學士路隋等中書舍人制勑夫秩髙綸闈職贊書命禁署之內用才尤難蓋以討論而功垂無窮潤色而言流有截非嘉績早一作日著雄文夙翔則何以茂於轉遷副此僉屬朝議郎守諌議大夫充翰林學士上輕車都尉賜紫金魚袋路隋澄澄天倪落落風韻氣含古道行為人師朝議郎行尚書庫部員外郎充翰林學士上柱國賜紫金魚袋韋表微符彩外朗誠明中虛言皆本人疑動必循矩而皆揚歷榮序輝華一作耀朝倫以髙行清議發於身以精理敏識稱於職而澄羣疑之聽昭宣素風况選自先朝擢居內職或依經而諌諍為志或視草而周密居心言念前勞是嘉成績洎豫嗣位思親賢人覩形容而鄙吝自袪察言行而公忠益見奧詞逹學偉望清規式叶豫求宜從朝奬中書理本內禁化源並承訓誥之榮往勵將明之道我方舉爾善爾宜懋厥官隋可守中書舍人依前翰林學士散官勳賜如故表微可守本官知制誥依前翰林學士散官勳賜如故授蕭置充翰林學士制崔瑶勑揮翰金門諒屬詞華之妙論思玉署尤資周慎之才選署惟精搴授斯重朝議郎行尚書兵部闕蕭置內藴沉識外揚清和羣居不流雅尚歸厚文摛錦繡學富縑緗早命中於射宫遂從知於壼奧靜無違心動有餘裕用雖繫於通塞道自保於嵗寒藹然休聲布在公議是宜擢居密地掌我命書勵夙夜之講求備朝夕之視聽副兹寵榮佇有𢎞益可守本官充翰林學士授曹確充翰林學士制沈詞勑職奉命書選歸於鴻藻名參侍從任切於端人由具美而方升一作階非一善而能進我今慎擇得自僉言起居郎曹確秀發人倫行修儒閫保此全器彰乎令名負賈生之才識窺夫子之墻仭禮樂盡在襟情甚夷貞而能和用則善晦遐志陵厲早超脫於池中茂業宏深動聲華於日下爰自侯府列於王庭踐霜臺而職舉方書立文階而事光載筆持以風表居然羽儀稽其行能雅副銓擢是用寵爾良史為豫近臣俾從瑣闥之榮更侍玉堂之奧皇猷思暢用宣祕密之文清秩不移尚受無私之㫖秉心勿替於直道視草勉髙乎訓詞無忘懿圖佇答休命可守本官充翰林學士授庾道蔚守起居舍人李文儒守禮部員外郎並充翰林學士制杜牧勑天下為公選賢與能也况乎拔出流輩超侍帷幄豈惟獨以文學止於代言亦乃密參機要得執所見若非賢彥豈膺選擢將仕郎守起居舍人庾道蔚善行必備重價無對嘗自侯府升為諌臣每直言而盡誠不違忠而偶意朝議郎行尚書禮部員外郎上柱國賜緋魚袋李文儒才行冠時名聲譁衆揚歷臺閣宣昭職業無入而不得其道守正而莫混其源並為儒者之英咸藴賢人之操久逰安在相見何晚一作何相見晚禮曰君子稱人之美則必爵之我既言矣亦能縶維宜盡忠讜以酬寵遇並可守本官充翰林學士餘各如故授裴諗司封郎中依前充職制崔嘏敕臺郎望美詞苑地髙粲列宿之輝華參起草之宥密自非風儀玊立器宇川停摛掞天之雄文藴擲地之清韻則不足以膺我妙選為時美談翰林學士考功員外郎裴諗襲慶於門騰芳載席端莊抱吉士之操謹默得賢一作𤣥人之風灼若春華皎如瑞素自擢居文囿參侍瑶墀進對益見其周詳詞㫖不離於雅厚是宜仍金鸞之舊職榮粉署之新恩保乃休光更流芬馥可依前件授蕭鄴翰林學士制敕監察御史蕭鄴吾內有宰輔重德作為股肱外有侯伯虎臣一作衆才用寄藩翰至於參我密命立於內庭即必取其器識𢎞深文翰遒麗動能持正靜必居中指溫樹而不言付虛襟而無隱此所以選翰林學士之意也前此數者鄴皆有之是用拔於羣倫置在親近勉爾端行副吾精求可依前件授宇文臨翰林學士制二首崔嘏敕吾方以文化天下期於太和故左右侍從之臣詞林宥密之地必求其性識𢎞茂文藻遒麗以備顧問以參周旋聞爾清直無徒雅厚自處富有天爵蔚為詞人是用輟自儀曺置於翰苑惟端靜可以承渥澤惟敬慎可以期逺圗資爾令猷副我殊選可守本官充翰林學士二敕禮部郎中宇文臨吾外有輔臣以敦一作匡大化中有股肱一作腹心以揔一作専樞機而發揮絲綸參侍顧問司我耳目廣豫腹心惟是柬求擢居近密以爾詞賦清才圭璋雅韻抱孤貞以適性踈端介以操持處衆流之中不為自異居慎獨之際克念無私由是選自文昌升於翰苑爾宜一心以奉職勤百慮以省躬勿怠疏逺副吾恩顧可守本官充翰林學士授沈詢充翰林學士制勑右拾遺集賢殿直學士沈詢參宥密之命處侍從之地居可以備選用於他年動可以承顧問於此日不獨取文翰遒麗之才亦必求孤貞雅厚之士惟乃祖在建中初以懿文奧學司我元良一作長直乃父當元和中以清規茂行典我文誥能流積善之風鍾爾挺生之秀是用思彼前德擢於後來置在禁闈光我詞苑爾宜勤其身以勞夙夜𢎞其用以新志業無俾枚臯嚴助之流獨承榮於漢帝况職當視草官列諌垣宜思及霤之忠更潤演綸之美可守本官充翰林學士授司勳總目作對郎中兼侍御史知雜事賜緋魚韓偓本官充翰林學士制錢珝敕執事近臣上無不可敬時一作持文墨而分禁職者又加等焉蓋咨訪之勤密期𢎞益訓詞之暇必進語言思引君當道之心乃多士以寧之本則授禁職之選被加等之私安可徒任筆端然後為得具官韓偓動人之行率性自強慎獨不渝考祥甚逺資以講學見於文章惟是求已之多播於羣譽矣朕初嗣丕業擢升諌曺繼陳言辭罔不一作懼摩切雖公賞曽光於赤紙而直誠尚記於皂囊愈聞勵修宜列左右故命爾之誥以詩人孟子之說為端者兹不有賴於侍從乎可依前件授右司郎中張元晏翰林學士制前人敕文也者性之表也積中為性發外為文冠乎妙用之先繫彼化成之大而文之雅奧本具典謨所以教誥萬方昭明百度代我而作求之必公具官張元晏嘗聞薦紳論者多以爾儒行踐修出言之章能顧於是聚問之學一作聚學之樂斯不為人乃知發外之文實自積中之性吾越在關輔不遑燕居大盜未屠蒸人且墜謂引過則責躬必至謂伐叛則用武方勞爾其據體㑹機剪煩揔要而復念害成於垂誡安假寵以自圗勿使詞臣不當朝選可依前件授中書舍人崔凝右補闕沈文總目作仁偉並守本官充翰林學士制劉崇望敕具官崔凝等凡帝王有應制侍從之人蓋思其朝夕匡益也下詔先視質疑如流兹所以潤色出言交修發號夫漢代設玉堂內署開金馬外門得人甚多斯道大振顧是眇末敢忘師虞職思其流以備左右我聞家遺清風人懷恭德能濟其美者伊凝有之三代絲綸一門冠蓋不墜其業者伊文偉有之而皆以墨妙詞芬䇿名試第謙無矜物敏以適時周旋鳴玉之儀頡頏攀雲之路訪於執事亦進厥良真我雍容之列所宜者也敬承密命允叶同時可依前件授翰林學士承㫖户部侍郎崔汪尚書右丞學士中書舍人崔㳙李磎並户部侍郎知制誥充學士制薛廷圭敕朕以萬乘之尊託於人上居九五之奧以御區中財成天地之宜外委于良輔夙夜宥密之命內咨于近臣佇沃乃心底豫于理具官崔汪山嶽鎮地望之而秀絶無涯金石在懸扣之而宫商有序門第軒冕甲於當時具官崔㳙公台華胄名教偉人禀象緯之英姿得乾坤之秀氣器業事望鎮於周行具官李磎學際天人道隆姬孔參言語侍從之列擅淵雲賈馬之才履正居中格于公論而皆體訓誥以事我拱霄極而致身吾得名臣汝遘昌運君臣胥遇千載一時或秩滿佇遷或職勞可舉往膺並命允屬當仁綱轄二卿清重無對玉堂溫樹近密孰階遂爾扶搖副我欽屬可依前件授起居郎李昌逺監察陸扆並守本官充翰林學士制敕近侍宸嚴參豫密命韜經濟彌綸之望為言語侍從之臣乃眷周行朕將注意詢于卿士僉曰汝諧爰膺並命之求允屬當仁之選起居郎李昌逺魁梧博厚寬裕溫良藴是粹和發為符采監察陸扆圭璋縝密咸頀琤㧿藹然休聲礪乃佳器士林擢秀聞爾則百尺無枝筆陳交鋒聞爾則一戰而霸皆伸於知己副我旁求濬柱下之清源無忘啓沃紹雲間之華譽勿鼓喧囂慎繼前修罔言溫樹吾有美實期爾為鹽梅吾有巨川佇爾為舟楫勉思稱職無忝飛升可守本官充翰林學士文苑英華卷三百八十四
