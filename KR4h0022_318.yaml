body:
  text: 文苑英華卷三百十八宋李昉等編居處八别業五十七首村墅十一首别業南溪别業蔣冽結宇依青嶂開軒對緑疇樹交花兩色溪合水重流竹徑風來掃蘭樽夜不收逍遙自得意鼓腹醉中遊題袁氏别業賀知章主人不相識偶坐為林泉莫謾愁沽酒囊中自有錢酬虞部蘇員外過藍田别業不見留之作王維貧居依谷口喬木帶荒村石路枉回駕山家誰候門漁舟膠凍浦獵火燒集作犬繞寒原惟有白雲外踈鍾聞夜猿終南山别業見二百五十卷輞川别業前人不到東山向一年歸來才及種春田雨巾草色緑堪染水上桃花紅欲然優婁比丘見法華經序品中經論學傴僂丈人鄉里賢披衣倒屣且相見相歡語笑衡門前晦日遊大理韋卿城南别業四聲次用各六韻前人與世淡無事自然江海人側聞塵外遊解辨集作驂軛柅夷切朱輪極集作平野照暄景上天垂春雲張組竟比阜泛舟過東鄰故鄉信髙㑹牢醴及家臣集作佳辰幸同擊壤樂心荷堯為君二郊居杜陵下永日同携手仁集作人里靄川陽平原見峯首園廬鳴春鳥林薄媚新柳上卿始登席故老前為夀臨當送集作遊南陂約略執杯酒歸轍繼集作歟繼微官惆悵心自咎三冬日餘雪在墟上春流駛風日暢懷抱山川多秀集作好天氣凋胡先晨炊庖鱠亦後至髙情浪海嶽浮生寄天地君子外簮纓埃塵良不啻所樂衡門中陶然忘其貴四髙館臨澄波曠然蕩心目淡淡動雲天玲瓏映墟曲鵲巢結空林雉雛響幽谷應接無門暇徘徊似集作以躑躅紆組上春堤側辨倚喬木弦望忽已晦後期洲應緑冬至後過吳張二子檀溪别業孟浩然卜築因自然檀溪不更一作更不穿園廬二友接水竹數家連直取南山對非關選地偏草堂時偃曝欄棹集作栧日周旋外事情都遣中流性所便閒垂太公釣興發子猷船豫亦幽棲者經過竊慕焉梅花初集作殘臘月柳色半春天鳥泊隨陽鴈魚藏縮項鯿停杯問山簡可以習池邊汝墳别業祖詠失路農為業移家到汝墳獨愁常廢集作當廢卷多病久離羣鳥雀垂忩柳虹霓出澗雲山中無外事樵唱有誰一作時聞蘇氏别業前人别業居幽處到來生隱心南山當户牖灃水在園林竹覆經冬雪庭昏未夕隂寥寥人境外閒坐聽春禽出青門往南山下别業薛據舊居在南山夙駕自城闕榛莾相蔽虧去爾漸超忽散漫餘雪晴蒼茫季冬月寒風吹長林白日原上沒懷抱曠莫申相知阻胡越弱年多栖隱煉藥在嵓窟及此離垢氣興來亦因物末路期赤松斯言决不伐潯陽陶氏别業劉虛陶家集仙隱種柳長江邊朝夕潯陽縣白衣來幾年霽雲明孤嶺秋水澄寒天物象自清曠野情何綿聨蕭蕭丘中賞明宰非徒然願守黍稷稅歸耕東山田過任集作江氏别業李白遊山誰所集作可遊子明與浮丘疊嶺礙河漢連峯橫斗牛任生集作汪生靣北阜池館涵清集作凊且幽我來感意氣槌庖集作炮列珍羞掃石歸明月集作待歸月又作待月歸開池漲寒流酒酣益爽氣為樂不知秋越州賊退後送朱放之山隂别業一作送朱人歸山隂劉長卿越中初罷戰江上送歸橈南渡無來客西陵自落潮空城垂細一作故柳舊業一作井廢春苖閭里稀相見集作相逢少一作誰相問鶯花共寂寥此詩二百三十一卷重出前已削去注異同為一作調歸東川别業李頎寸祿可言一作善取託身將見遺慙無匹夫志悔與名山辭紱冕謝知已林園多後時葛巾方濯足蔬食且垂帷十室對河岸漁樵秪在茲青郊香杜若泉石映茅茨晝景徹雲榭夕隂澄石逵溪花獨開晚田鶴靜飛遲且復樂生事前賢為我師清歌聊鼓楫永日望佳期題綦毋校書别業前人常稱掛冠吏昨日歸滄洲行客暮帆逺主人庭樹秋豈伊問天命但欲為山遊萬物我何有白雲空自幽蕭條江海上日夕見丹丘生事本魚鳥賞心隨去留惜一作昔我曠微月欲濟捨輕舟倐忽今一作令人老相思河水流同家兄題渭南王公别業蔡希寂好閒知在家退跡一作迹何必深不出人境外蕭條江海心軒車自來往空石對清隂川涘將釣玉鄉亭期散金素暉射流潄翠色綿森林曾為詩書癖寧惟耕稼任吾只許微尚枉道勃疑相尋朝慶老萊服夕閒安道琴文章遙頌美寤寐曾所欽既鬱蒼生望明時豈陸沉淇上别業髙適依依西山下别業桑林邉庭鴨喜多雨鄰雞知暮天野人種秋果集作萊古老看一作開原田且向世情逺吾今聊自然巴南舟中陸渾别業岑參瀘水南一作州舟逺巴山北客稀嶺雲撩亂起溪鷺等閒飛鏡裏愁衰鬢舟中換旅衣夢魂知逺處無夜不先歸送胡象下集作落第歸王屋别業前人看君尚少年下第莫悽然可郎疑疲獻賦山村歸種田野花迎短褐河柳拂長鞭置酒聊相送青門一醉眠送鄭甚歸東京泥水别業得閒字前人客舍見青一作春草忽聞思舊山看君灞陵去匹馬成臯還對酒風與雪向家何復間因悲宦遊子終嵗無時閒送劉長上歸城南别業韓翃數刻是歸程花間落照明春衣香不散駿馬汗猶輕南渡春流淺西風片雨晴朝還㑹相就飯爾五侯鯖贈張五諲歸濠州别業常知罷官意果與世人疏復此凉風起仍聞濠上居故山期採菊秋水憶觀魚一去蓬蒿徑羡君閒有餘送元詵還丹陽别業郎士元已知成傲吏復見解朝衣應向丹陽郭秋山獨掩扉草堂連古寺江日動晴暉一别滄洲逺蘭橈幾嵗歸送王公還剡中别業皇甫冉不見關山去何時到剡中已聞成樹木更道長兒童籬落雲常聚村塘水自通朝朝隱去渡非晚對清風潘司馬别業周瑀門對青山近汀牽緑草長寒深抱晚橘風緊落垂楊湖畔聞漁唱天邉數鴈行蕭然有髙士清思滿書堂秋晚山中别業盧綸樹老野泉清幽人好獨行去閒知路靜歸晚喜山明蘭艾通荒井牛羊出古城茂陵秋最晚誰念一書生早春遊樊川墅前人白水搆通一作遍溝塍青山對杜陵晴明人望鶴曠野鹿隨僧古柳連巢折荒堤帶草崩隂橋全覆雪深溜半垂氷鬬鼠搖松影遊龜落石層韶光偏不待衰敗巧相仍桂樹曾爭折龍門幾共登琴師阮校尉詩和柳吳興紙茟求書扇張屏看畫蠅卜鄰空遂約問卦獨無徵投足經危石收材過直繩守農窮自固行藥病何能掩帙蓬蒿晚臨川景氣澄颯然成一叟誰更慕騫騰深溜集作暴溜過直繩過詩選作遇春日題杜叟山下别業前人百鳥羣飛山半晴渚亭相接有泉聲園中曉露青藂合橋上春風緑野明雲影斷來峯影出林花落盡草花生今朝醉舞同君樂始信幽人不愛榮春遊司直城西鸕鷀溪别業釋清江别墅軍城下閒喧未可齊春深花蝶夢曉隔柳煙鞞韶景浮寒水疏楊映緑堤沿洄看竹色來往聽鶯啼久慢持生術多親種藥畦家貧知素行心苦見清溪越客初投分南枝得寄棲禪機空寂寞雅趣賴招携本寺重江外遊方二室西徘徊戀知己日夕草萋萋題黃公陶韓别業釋處一聞說花園堪避秦幽尋數月不逢人煙霞洞裏無雞犬風雨林間有鬼神黃公石上三芝秀陶令門前五柳春醉卧白雲閒作夢不知何物是吾身張舍人南溪别業釋法震新田繞屋半春耕藜杖間門引客行山翠自成微雨色溪花不隱亂泉聲漁家遣到堪留興公府懸知欲厭名入夜更衣明月滿雙童喚出解吹笙北原别業釋僧泚野外車騎絶古村桑柘隂流鶯出谷靜春草閉門深學稼農為業忘情道作心因知上皇日鑿井在雲林冬日尋徐氏别業釋皎然近依城北住幽徑少人知積雪行深巷寒山繞故籬竹花春自發橙實晚仍垂還共嵓前鶴今朝下習池送皇甫侍御曾還丹陽别業前人雲陽别夜憶春耕花發陵湖問去程積水悠揚何處夢亂山稠疊此時情將離有月教絃斷贈逺無蘭覺意輕朝右要君持漢典明年北野可須營題周一作陳諫别業第寺與周生所居俱臨苕水前人隱身苕上欲何如不著青袍愛緑羅柳巷任疏容馬入水籬從破許船過昻藏獨鶴閒心逺寂歷秋花野意多若訪禪齊遙可見竹忩書幌共煙波雨後輞川李端驟雨歸山盡頽陽入輞川看虹登晚墅踏石過春泉紫葛藏仙井黃花出野田有知無去路回步就人煙送石協歸吳興别墅一作業朱慶餘識來無定居此去復何如一與耕者近日將朝客疏資身空藥石教子但琴書曾讀黃庭本斯言豈復虛遊崔監丞城南别業劉得仁門與青山近青山復幾重雪融皇子岸春潤翠微峯地有經冬草林無未老松竹寒溪隔寺晴日直聞鍾夏日樊川别業即事無事稱無才柴門亦罕開脫巾吟永日著屐步荒臺風卷微塵上霆將暴雨來終南雲漸合咫尺失崔嵬韓評事别業周賀門枕平湖秋景好水煙松色逺相依罷官餘俸租田種送客回船載石歸離岸遊魚逢浪返望巢髙鳥一作寒鳥逆風飛嵩陽舊隱多時别閉目閒吟憶翠微李侍御上虞别業方干滿目髙集作亭臺佳作繁蟬吟燕語不為喧晝潮勢急吞諸島暑雨聲回露半村直為援毫方掩卷常因按曲便開樽若將明月為儔侣應把清風遺子孫繡羽驚弓籬果上紅鱗見餌出蒲根尋君未要先敲竹且棹漁舟入大門初歸鏡水集作中别業寄上陳端公前人去嵗離家今嵗歸孤帆夢向鳥前飛必知蘆笋侵沙井兼被藤花占石磯雲塢一作島採茶常失路雪龕中酒不開扉故交若問逍遙事𤣥冕何曾勝葦衣許員外新陽别業前人蘭沙橘島映髙一作亭臺不是經心即手栽滿閣白雲隨雨去一池明集作寒月逐潮來小松出屋和巢長新徑通村避笋開柳絮風前欹枕卧荷花香裏棹舟集作釣魚回園中問一作認葉封林草簷下攀枝落野梅莫恣髙情求逸思須防急詔用長材苦一作若因螢火終殘卷頁把魚竿集作便把漁歌送幾杯多謝郢中賢太守當集作常時談笑許追集作趍陪東溪别業寄吉州段郎中前人前山含逺翠一作翠晚羅列在窗中盡日一作晝夜無人到一樽誰與同凉隨蓮葉雨暑避柳條風豈分長孤寂明時有至公此詩二百六十二卷重出前已削去注異同為一作題李剪處士杜城别業見二百三十一卷溫庭筠晚夏歸别業張祐古岸扁舟晚荒園一徑微烏啼新果熟花落故人稀宿潤侵苔甃斜陽照竹扉相逢盡鄉老無復話時機題杜侍御别業趙嘏紫陌煙多不可尋南溪酒熟一披襟山當晝枕石床穩泉落夜忩煙樹深白首逢人羞問計青雲何路覔知音惟君懷抱閒一作長於水他日門墻許醉吟題鹽鐵李尚書滻州别業薛能鹿原隂雨滻州湄坐覺林泉逼夢思閒景院開花落後濕香風好雨來時鄰驚麥野閒雛雉别創茅亭住老師備足好中還有闕許昌軍裏李陵詩秋晚自洞庭湖别業寄穆秀才皮日休破村寥落過重陽獨自攖寧葺草房風扯紅蕉仍換葉雨霖黃菊不成香野猿偷栗重窺户落鴈疑人更繞塘他日若修耆舊傳為豫添取此書堂題鄭侍御藍田别業張喬秋山清若水吟客靜於僧小徑通商嶺髙忩見杜陵雲霞朝入鏡猿鳥夜窺燈許作峯前侣終來寄上層郊墅二首鄭谷韋曲樊川雨半晴竹莊花院遍題名畫成煙景垂楊色滴破春愁壓酒聲滿野紅塵誰得路連天紫閣獨關情渼陂水色澄於鏡何必滄浪始濯纓二蓼水菊籬邊新晴有亂蟬秋光集作先秋終寂寞晚醉自流集作留連野濕林集作中露村閒社後天題詩滿紅葉何必浣花箋訪姨兄王斌渭上集作口别墅前人桑柘河集作柘桑江上村牢集作寥落舊田園少小嘗來此悲凉不可言訪鄰多指塜問路半移原久歉家童散初晴野薺繁客帆懸極浦漁綱晒危軒苦澀詩盈篋荒唐酒滿樽髙枝霜果在幽沼集作渚暝鴻集作禽喧逺靄籠樵響微煙起燒痕哀榮孤族分感激外兄恩三宿忘歸去圭峯恰對門訪題表兄王藻渭上别墅集作業前人桑樹搖落渭川西蓼水瀰瀰接稻泥幽檻靜來漁唱逺暝天寒極鴈行低濯醪最稱看山醉吟句偏宜選行題中表人稀罹一作離亂後花時莫惜重相携春日還郊王勃推情兼默默一作語携杖赴嵓泉草緑榮新帶榆青綴古錢魚牀侵岸水鳥路入山煙還題平子賦花樹滿春田仲春郊外前人東園垂柳徑西堰落花津物色連三月風光絶集作繞四鄰鳥飛村覺曙魚戲水知春初晴山院裏何處染囂塵春郊興後前人空園歌獨酌春日賦閒居澤蘭侵小徑河柳覆長渠雨去花光濕風歸葉影踈山人不惜醉惟畏緑樽虛西郊杜甫時出碧雞坊西郊向草堂市橋官柳細江路野梅香傍架齊書帙看題減集作檢藥囊無人覺一作競來往疏懶意何長南鄰前人錦里先生烏角巾園收芋粟不全貧慣看賔客集作戶門亦作朋友兒童喜得食階除鳥雀馴秋水才深四五尺野航恰受兩三人白沙翠竹江村暮集作路相送集作對柴門月色新村夜前人風色蕭蕭暮江頭人不行村舂雨外急鄰火夜深明胡羯何多難樵漁寄此生中原有兄弟萬里正含情江村前人清江一曲抱村流長夏江村事事幽自去自來堂上燕相親相近水中鷗老妻畫紙為碁局稚子敲針作釣鈎但有故人供緑水集作多病所須惟藥物微軀此外更何求荒村三首前人崢嶸赤雲西日腳下平地柴門鳥雀噪客子集作歸客千里至妻孥怪我在驚定還拭淚世亂遭漂蕩生歸一作還偶然遂鄰人滿墻頭感歎亦歔欷夜闌更秉燭相對如夢寐二晚嵗迫偷生還家少歡趣嬌兒不離膝畏我復却去憶惜多集作好追凉故繞池邊樹蕭蕭北風徑撫事煎百慮賴知黍秫集作黍禾收已覺糟牀注如今足斟酌且用慰遲暮三羣雞忽一作正亂呌客至雞正生一作鬬爭驅雞上樹木始聞叩柴荆父老四五人問我久逺行手中各有携傾榼濁復清莫一作苦辭酒味薄黍地無人耕兵革既未息兒郎一作童盡東征請為父老歌艱難愧深一作餘情歌罷仰天歎四坐淚縱橫文苑英華卷三百十八
