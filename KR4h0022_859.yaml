body:
  text: 文苑英華卷八百六十宋李昉等編釋十一杭州開元寺新塔碑一首杭州餘杭縣龍泉寺故大律師碑一首衢州龍興寺故律師體公碑一首荆州南泉大雲寺故蘭若和尚碑一首杭州開元寺新塔碑一首李華漢永平中佛教初至洛陽始置寺度騰蘭二一作三德古者官之庭府稱寺蓋賔而尊之比於曹署此其源也杭州開元寺梁天監四年豫州刺史譙郡戴朔捨宅為寺寺號方興名僧惠圜營建之後處士戴元范賔恭增飾之至開元二十六年改為開元寺庭基坦方雙塔樹起日月逝矣材朽將傾廣德三年三月西塔壞凶荒之後人願莫展太常卿兼杭州刺史張公伯儀忠簡帝心威靜吳越駐車跪禮徘徊感嘆乃捨清白之俸為君為親修而復之兵部員外郎兼侍御史范公倫人之圭璋國之俊彥四字一作望者法師什曇獻上座什雲卿寺主什崇逺都維那什惠逹什法祥長樂寺什曇景等戒香扶其永誓道力護其成功于是劒南荆揚之巨材諸郡倕輸之懿匠竭耗神眀三年畢事乙栗結仡穿貫皓氣晃爚景象烘若鎔金距畢疑作卑躋髙凡為七級級有佛事環廽昫轉幢網通映如梵什宫踐乎上府俯視萬井有若棊布仰瞻天宇雲在身下傍眺江山列在掌端過乎址謂傾峯動􅀢岌業其側既鏤以丹素飾以青紫九字一作既雕既鏤以素以青浴緑漬紫掀腸閃目百變百移如有靈物𡻭一作纍跪稜層雷嵬攢欒摽江壓湖孤島突天不可名也霞照丹户如開日宫風搖和鈴若下天樂聲徹有頂輪蔭空界影入清江形鎮大地所濟者廣巍巍度門先大德什懷亮住持之固如山不動先一作老法師什道貞華嚴祕宗香象至底先法師什藏暉三藏扄鑰五方啓之過去人緣在世慈願不有偈頌其如佛恩華嘗官是邦感深霜露忝大常一面與兵部為寮敬申其美以佐法門之宏觀其文曰闕亭亭揭堅廽出江甸秋天泬寥百里獨見如海浮來如地踊現以壯州邑以調群心餌藥解病依舟濟深卿曹郎署共布黃金杭州餘杭縣龍泉寺故大律師碑前人大朴既雕淳源不復生人溺于迷妄自拔無由我梵惟哀之力現靈東方雷起羣蟄間生龍象調御人天巍巍乎大眀燭幽而品物知向矣噫稠林枝幹榮枯不息火宅煙熖起滅相尋於衆生速壞之身有諸佛常存之性垢衣纒寶而不見濁水求珠而未得法無髙下根有淺深由是啓禪那證入之門立毗尼攝護之藏土因水而成器火得薪而待燃惟此二宗更相為用律行嚴用一無此字奉則淨無瑕缺戒定一無此字光深照則測見本源次修定門而自調伏云何為大定地雖傾而不動云何為修我心雖寂而無住然後登般若之岸上楞伽之峯以此身為法身了無得為真得或有默修元契於文義受教頓悟於宗師不由門階徑造堂室微塵學者時得一人復有大悲空隘而不窮𢎞誓海涸而不盡俯從像法以導世間則我大律師其人也師諱道一字法崙餘杭嚴氏生族姓之家是為因地作如來之子寧有本緣故祖考不書尊上乘也禮峻山嶽神間江海機對敏洽應受融眀自襁褓至於成童顔色無違視聽皆正年甫八嵗辭親就師鴻鵠入冥自然方外蓮花出水不染泥一作世間十七預剃度𨽻龍泉寺受具于光州岸律師行相珠圓滌流鏡徹始就山隂聽岸講涅槃經師既歸而為衆敷闡同時聽者奉以為師恭惟此經佛最後説教旨深圓故草元著義法華經大事因緣授聲聞記口誦心奉誓盡當來金剛經滅度無邉悉離諸相誦起信論滌除邪妄開導心宗常所受持皆為義什於華嚴入普賢性海於維摩得不二法門凡歷見聞莫非心證從文悟理也白日頓眀于世界飛鳥自在于空中從理乘如也嘗謂天台觀門往誓深教吾所歸也夫垢因戒淨惠定以生未有愛尚存而坐登三昧每嘆曰持心繫于剎那求道本於清淨使學徒解怠由軌範不眀教之興衰在我而已矣乃護一席闕心必隨嘗講大乘方攝齊登座侍者布席微爽律文即命撤席浣衣以俟眀日其檢身激下皆此類也自是江南律學砥礪彌精矣至若齊場星列談座雲繞四衆仰山王之髙萬里赴龍宫之會逺夷逾海而來聽長老順風而請益至仁生滅至辨成簡判折疑問若陽和解氷𢎞敷妙理如止水觀月化童蒙為上智伏我慢為調柔引諸佛戒定之池浴衆生輕重之垢垢自流去池常湛然又以儒墨者般若之笙簧詞賦者伽陀之鼓吹故博通外學時復著文在我法中無非佛事故李大理升期崔河南希逸嘗撫本州麾幢往復故成御史廣業令廬華州元裕兵部韓員外賞屈身郡邑䑳舸洄沿及鄉人故汴州何司户寒同與叩絶韻於清風味元機于永夕廬山師友今古一時誠願密𢎞崇修本寺導容纓綱髙殿棟宇工人殫其百櫨信士竭其千金佛宫嚴麗一方勝絶寫大藏經手自刋校學者賴焉席常住因通給無閡凡聖均焉於天竺寺造慈氏變相慿髙為臺與衆均福光靈肸蠁如在會中永以報生育劬勞之恩光先師訓誘之德不離宴坐應者如歸天寶十三年春忽灑飾道場端理經論惟銅瓶錫枤留置左右具見五天大德十八羅漢幡蓋迎引請與俱西二月八日恬然化滅報齡七十六僧臘五十七生以其日滅亦如之昔同如來捨位之辰今是菩薩往生之日古先大士無此眀徴先時院庭有百合兩本對發白花光如月輪照於昏夜嗚呼慈雲既歸花亦雕萎物感如是人哀可知至某月日遷厝于寺之西偏江嶺淮湖緇麻縞素茶毗之會聲動山川寂寥原野人亡地古悲夫一為人師六十年矣逺名利故不逰京國樂間安故不出户庭有請方去故深慈密行莫得而究焉門人之冠者一行禪師惠罕法師律梁寺乾應律師蘇州東林寺懷哲律師湖州開元寺惠燈少眀之記長者寶藏修身執持導師化城無處瞻仰眷屬之賢有若族人神都等如來影中怖畏都盡力生今地哀號不窮以華恱曽史之風尚竺乾之道追書本行見託斯文銘曰苕溪教源因戒生定百千人俱見性清淨裂除意網磨拂心鏡雖會一乘終修萬行説法登壇天龍諦聽須彌峯頂白月孤映彼迷方者從我得正報盡生盡歸自法身最朝涕泣江上門人炬滅隂夜舟沉海津雪山靈草無復青春欲報之德蒼蒼罔極既斷言語又非空色假言喻空觀我為則衢州龍興寺故律師體公碑器為外物挹泉者器有以濟飢渴也身為妄聚奉道者身有以成大覺也泉不離器道不離身器存則飢渴洗除身修則大覺無礙故律為知見根本開入扄户持其要得其宗者有若長老體公蓋毗尼之堂室尸羅之燈炬三昧之舟筏也信安有名山名川山秀川清家為將宗母曰徐性地靈開祐降神而生徐氏既孕夢婆羅門告曰姊當生男詔興大法長老既齓好聚沙起窣堵波焚草為香採花為供年十有五瓊章鶴姿兄為淨安寺上首乃往從學日誦萬言兄歎曰吾祖父昆弟六人出家受習之速無其比也年二十一通大乘小乘千紙如意年中配度淨安寺遊問會稽遇光律師受其戒誦戒至三日屬衆僧布席登座宣説無有遺文住洛京五年與本州策律師東陽超至法師同講問為法門儀表萬嵗元年歸信安稟受者千人由是江南律範端嚴第一衲衣袒肩跣足行乞手蒔松竹繕造僧房苦行貫天地大慈包世界於辨才得自在於文義得解脫于人法得無我於觀照得甚深刺史徐嶠之率參佐縣吏耆艾以降請居龍興寺迎供者多不知同日紛然辨鬭聞於長老曰吾修無諍三昧不唯自利𢎞願利人咄因吾身生彼嗔恨乃别立一室闕才方丈晏然安居不踐門閾刺史李暢跪請移居大方至於涕淚俯如其請因入法華三昧口不息誦身不親席大事因緣我得心證請左溪大師講止觀鑄鍾七十斤鄰州長吏稽首延請結艦浮川幢蓋彌望瞻禮萬計行無住悲建講堂門樓厨庫房宇畫諸佛剎鑿放生池聞者敬觀者信聽者悟日月無私之照江湖不言之潤如來權實之門其至矣哉收材江湖方構佛殿羣盜據州寺半為墟址如鳥巢形若枯木凶猾棄刃稽首歸仁寶應二年六月九日自升繩床跌坐而滅享齡九十二僧臘七十一緇素號慟楚越悽悲至廣德元年十二月三日焚于州西某原起塔安神諸佛之遺教也唯長老貌清神逺仁深行獨卓為道器注為法源謙非外儀質乃內一作哀非至若調伏住持之固禮誦跪繞之勤耄期不衰寒暑如一學窮必究理精必詣猶自以為功微道淺未足為師真金純金萬寶之最也趺滅之夕則異香滿室閉塔之日則羣鶴翔鳴信安王禕趙太常頥真鄭庶子倬李中丞丹前相國李梁公峴皆為此州躬往圍繞趙太常敬因長老立文殊萬聖之象李梁公增感先人泣下雙林之間長老在世靈徴繁多日輪降照於梁端大龍修敬于池上寒蒲一作笋㨩擢于氷下彩芝瑩於禪室慶雲覆會仰歎千人此其盛者弟子僧會藏爰自童蒙服勤左右四十年矣惠命阿難結集如來之言顔氏之子鑽仰素王之道杭州靈隱寺大德惠逺婺州開元寺大德清辨本州六度寺大德惠炬一作矩大乘寺主浩然本寺上座惠逹寺主法會都維那神爽等輪王之位我敬奉之妙光之法我敬行之爰請伽陀式播元烈銘曰付囑戒藏遵行威儀光還性靜翼具禽飛止法根本深仁得之蓮花不濡性本清淨彼上人者無時非定定不離儀儀不離性色身雖滅此滅皆寂寂然不動斯為正真鎔金起塔哀斷門人荆州南泉大雲寺故蘭若和尚碑前人肇有含氣則鷹鸇逐鳥虎狼噬人人最靈于其間嗜欲萌而六根動利害交而五兵作文一作雲疑演乾坤至於性命老陳道德循於天下不究因緣之本不知大千之廣而內盜方扇心塵益悖長圍合于三界猛熖流于四生乘時雷震惟佛能救一作救世於是超六度之岸轉三乘之輪馭指南於迷路建髙燈于黑夜翻海滅熖擎山潰圍蒼生既孤再獲慈母人天之奉大矣逺矣微塵法門吾道一貫承此印者歸乎上仁和尚諱惠真南陽冠族張氏也父大禮銀青光祿大夫坊州刺史靈降右闕慶延仁宗太夫人陳氏誦法華經屢有祥應既誕和尚體益康寧而衾褥彌潔每啼聞誦經則止而聽之六嵗發言輒諧經義七嵗誦書日記萬言默誦一作尋法華經安樂行品因捨儒學専精大乘年十三剃度𨽻西京開業寺事髙僧滿意意公門人皆釋侣圭璋和尚年幼道尊以為之冠十六受十戒持護峻整名重京師進具經旨遍覽毗尼意謂未圓尋文果闕乃往天竺求梵本至海上遇淨三藏自摩詰陀還淨公謂曰西方學者亦殊宗貫假欲詮正如異執柯一作就何因悉授所賫律集與之俱返才二年間罔不懸解績成手部名曰毗尼孤濟藴始以五月十六日結夏安居僧聞盡愕喧然雷動門人來問答曰迦利底迦星此其候門人未逹既而無畏三藏以五月十五日至京師衆僧怪而問故三藏曰五視一作是迦利底迦星合時來正當日結夏耳迦利底迦星即火星也由是緇林聳歎與聖人一無人字合符梵僧長老尚多初至長安和尚修謁膜拜方半多公喜曰爾非真耶留之座隅密付心要當陽𢎞景禪師國都教宗帝室尊奉欲以上法靈境歸之和尚衣疑請京輔大德一十四人同住南泉以和尚為首昔智者大師受法於衡嶽祖師至和尚六葉福種一作鍾荆土龍象相承步至南泉歷詮幽勝因起蘭若居焉地與心寂同吾定力室與空眀同吾惠照躬行勤儉以率門人人所不堪我將禪悅至於捨寢息齊寒暑食止一味茶不非時嘗遇嵗荒野人茹草和尚如之門人勸諭對曰順正行事亦如來教也中宗聞之將以禮召時𢎞景禪師在座啓于上曰此人遙敬則可願陛下不知強也撰菩提心記示心初因開佛知見升堂入室者則必親授此外物一無物字祕之立教之宗以律斷身嫌戒降心過應捨而常在無行而不息離心色一作色心則淨淨皆亦離則無生內外中間無非實際要因四攝成就五身始以上觀悟入終於蓮花正受平等法門究竟於此師子國目加三藏來謁嘆曰印度聞仁者名以為古人不知在世一作界本國奉持心記久矣其尊稱微言冥究佛心而神扄一作局遐域一行禪師服勤規訓聰眀辨逹首出當既奉詔徴泣辭和尚而自咎曰弟子於和尚法中痛無少分後與無畏譯毗盧經義有不安日以求正決於一言聞者洗心每謂以法授人不宜容易從人受法鮮克有終故善來衆生悉蒙慈覆至於悟戒承法千無一焉或問南北教門豈無差别對曰家家門外有長安道又問曰修行功用逺近當殊答曰滴水下巖則知朝海又問曰無信根如何勸發曰兒喉既閉乳母號慟一作奚為大悲無緣亦為歔欷嚴而一作端嚴簡重慈而有威望門能進者寡矣弟尚書右丞紹真行備乎身德及乎人元老太保陸公象先名臣韓京兆朝宗宋兵部鼎韋刑部虛舟僉契慈緣而承善誘如其仁哉天寶十年二月既望北首右脅卧入禪定中夜而滅享齡七十九經夏六十報年之限涅槃之時同於如來昔未曽有遺命門人曰聖教無服慎勿行之弟子正知法璨等哀聞大千感動他界先時雙泉竭大霧昏白光照室半若橫血法門無蔭之徴也刑部韋侍郎時臨荆州躬護喪事以三月一日厝于西巖山林變衰鳥獸號咽有意于道者莫不椎心灑涕和尚質孤晴山神瑩澄海妙聲宣布而剛強悽感慈眼運照而濁惱清涼使祥光洞明枯木蕃榮得舍利於神人教天龍於冥晦其元慈幽護則病者愈死者生髙僧遙請而帝夢叶學徒聽法而天樂下昭聞殊方不可殫載初聞一行終天子賜諡曰大惠禪師及和尚滅度追諡同之二方如來皆同一號此其證也正知者闍梨持和尚心印璨法闍梨轉和尚義輪以華聞風永懷俾強名道其辭曰荆南正法大士相傳灌頂尊記乃吾師焉一作吾師受焉備修衆善不染羣緣法華三昧惠照無邉菩薩普門我願亦然煩惱牙折菩提鏡懸戒比秋月法若春泉不動南楚仁周大千本來常淨自性無遷漸則生頓光依魄圓隨順生死芭蕉豈堅蕭蕭塔樹永對爐煙文苑英華卷八百六十
