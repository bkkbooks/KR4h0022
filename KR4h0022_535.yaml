body:
  text: 文苑英華巻五百三十六宋李昉等編繼嗣封襲門二十三道太室擇嗣判八道捨嫡孫立庶子判四道正室為門子判一道襲代封逃判二道遺腹襲侯判三道承襲稱狂判三道襲爵佯狂判一道除䘮襲爵判一道太室擇嗣判甲於太室而擇嗣先㓜者或非之稱神所命對立嫡以長不唯其賢或有時而捨兄則因次而謀弟惟甲克紹先烈啓廸後生一作昆有髙陽之才聚太丘之徳聿求門子聽是廟謀螽斯其䋲雖有衆多之義鴈行以列然乖長㓜之序義則非據人斯見尤必欲搆之以神何如節之以禮况楚君遺法殷家舊制人實不等代亦頗殊縱為疑議益彰違越罪之愆失在甲宜以凖科懲之後先其男請從改正同前賈廷瑶主噐承宗雖存乎冡嫡象賢擇徳必在乎權宜甲何人哉將定諸嗣年則有序未肆挈龜之卜室乎慿靈遂稽當璧之懿由是求周之故伯邑見捨即趙之美無恤是膺既崇定命之制克允尊神之道古則然矣夫何非哉同前賈承製執古以道格人其經捨而或逾動則奚軌况承家繼體之重義存乎冡嗣絶嫡立庶之命禮資乎象賢是用弓裘必榮鍾鼎以赫斯列侯之恒典豈下愚而足度彼已之甲惟秩何也徳未昭寵過符行禁有子誰立固晋侯之不經擇㓜為先類楚王之有嬖俱一作但曰神命仍虧拜璧欲議刑章誰謂無玷况太室之禮僣已陵於殷廟薄言之狀位匪列於周官欲按科條得悉名噐此而伏念終謂疑刑同前康濯納約自牖是脩禘祫於穆清廟肅供神人既不專而為名當幹蠱而承孝惟於甲也克構是思擇乎太室期以當阼壓紐斯兆想平王之舊儀佩玉忘哀痛石駘之絶繼神保是格信龜筮之叶和人謀僉同乃匕鬯而不䘮就諸臣位尚檀弓之所一作而見嗤辱以臨䘮盖子游之習禮先乎㓜者豈曰遲廻誣善之人何詞以免韋賢後嗣謀之允臧季歴嘉猷誰執為咎或委一作妄咸股誠為朶頥自羝羊而觸藩侔鼫䑕而非據小懲是誡宜在執牛忿疾於頑無行射隼同前虞咸天子建國諸侯立家率由舊章克備恒典列昭穆以有序承繼嗣而逌著粤惟彼甲若昔大猷無忝乃先懋昭有訓同乎班氏思欲叙其家聲類夫韋孟將以傳其祖徳雖珪璋克荷而嫡庶蒙戎載懐捧翟之倫猶疑幹蠱之詞協比長㓜隂隲廟祧庶降祉以象賢慿靈貺以立徳同其楚國先棄疾之當璧方彼衞人乃祁子而順兆神所命也則甞聞之龜有知焉實在兹矣或非無藝甲擇有孚欲寘于理誰謂其可同前韋巡將正人倫必惟嗣續故有側室嫡子乃别尊卑等威以年以徳則聞常典神之聽之抑非通法惟甲啓爾宗廟守其茅苴類簡主之承祧嗣則未卜同獻公之有子其誰立焉爰仿共王之事更徵駘仲之道佩玊而兆既云取吉當璧而拜遂不敢違且繼體本以承家知子莫如其父借令愚知無辨何得長㓜乃一作仍乖假之神明其義則淺捨我恒禮取誚何多文過飾詞徒為妄作同前嚴廻將建嗣子必先克家豈唯興宗亦稱繼代今茲甲者昭穆蔑如爰擇𦙍而承祧俾傳榮而開國而乃業歸于㓜禮且殊於長年命自于神理徒稱於太室必也義均襄子覩常山而得符迹偶平王拜楚廟而當璧事則有據或者何非且今之所為有異於是無聞徳舉將由愛立則震來致福慮䘮主鬯之尤事乃得能一作宜奚堪幹蠱之任甲且違禮罪實難逃理不足稱刑之無捨同前徐晶欽若古訓奉遵遺典禮崇繼體政重承邦茍冡嫡之或遺諒昭穆之無取眷言於甲誠乎擇嗣殊無忌之不才讓徳於韓宣異延陵之守節歸義於諸樊既而龜其知乎類石祁之合兆神所命也同楚平之當璧且徳均則卜罕見前非年均擇賢曽無昔譴先乎㓜者誠合通䂓人或非之孰云其可捨嫡孫立庶子判侯擇嗣捨嫡孫而立庶子人非之曰行古之道對錫土分茅承宗主祭立嗣以嫡非才則賢若拜璧而求則佩玊寕告一作吉惟彼侯國次當擇嗣類田氏之得文縁成愛客同無恤之在趙不墜克家既捨子以貽孫何棄今而行古雖檀弓制服而知仲子之非而棠棣與權亦凛宣尼之訓請從宗計無信或非同前楊栖梧王者之制著乎禮經五等已陳千古不替爾侯所擇以為後者盖重仁賢詎論嫡庶故捨孫而立子將繼代以承家壓紐可尊佩玉非嗣近思靖郭傳諸孟嘗逺學周文廢其伯邑侯則可矣人妄非之同前石倚胙土報功分茅錫瑞爰加九命是寵三接將崇繼代之美以展象賢之慶顧彼擇嗣捨乎嫡孫寔亂大倫攸乖先典將著其代匪尚其徳亦猶行古未息仲子之詞茍非從權縁懼宣尼之對若也克紹前烈無貽後羞龜告其猷神歆其類居䘮而情忘佩玉臨代而智則藏符雖則嫡庶有殊足使賢愚自别侯之所擇人或敢非在禮則乖於賢固可同前杜信列爵疇庸承家繼體析薪負荷堂構纂脩彼侯運偶千齡秩惟五等謀孫不朽傳錫土之榮嗣子云亡失克家之慶殊孟縶之在衞異㣲子之居殷檀弓免焉有符周典仲子行古實紊彛倫人或見非識明大體廢嫡立庶宜正刑書吾蔑從之無載爾偽正室為門子判甲多諸媵之子乃以正室為門子令限出入或人告有違不伏對五常之教以經王道三族之别則辨人倫正昭穆以承祧分嫡庶而繼代必誡差忒克明敦叙是以㣲子從禮捨其孫遁禮記作腯獻公汎愛立以奚齊璧埋太室之庭楚則違命寳蔵恒山之上趙乃知才順之克昌易則生亂茍至於道訟不可成甲齊其家宅心知訓鍾皷思樂早聘問名媵姪從觀一作歡仍邀卜姓自殊南陌豈秋胡之遲廽寵若東山即謝安之携賞於是慶徵蘭夢義感桑弧探社金而屡祥列階玉以分照同石駘之六子庶孽斯聞均衛家之一兒冢嫡其取爰崇立長有以代親詎黜商臣非取厚於江芉寕謀伋子亦何怨於惠公趨庭既學詩人正室遂為門子逹其禮典穆以閨門掌政令而攸歸限出入而奚失信居家之理寕父子之嘻或人所陳深為未可襲代封逃判丁長當襲代封逃主司以有兄不録其弟對夏分五等周開九命國庸人爵貽厥孫謀青土白茅將傳欒卻之室裘裳鍾鼎必襲金張之家丁既慶積山河用光家國不聞必復之業旋有逋逃之讓榮命不顧同顔闔之鑿坯遁迹方來共丁鴻之蹈海一去鄉縣幾變星霜冀疇庸之有主在是弟而可録不謂政也無二法不容私終使長襲代封沮𤣥成之宏義㓜而時棄允張純之格言同前張疇先王有作班氏叙其家風逺代無違韋孟陳其祖徳是知本枝可重宗葉難輕丁冑望素髙勲庸夙著金柯玉葉冠盖之望攸崇青社白茅諸侯之業斯大上林春至花蕚均芳下澤秋歸鴻鴈齊列既而風枝不静星琯屡移何邵承家泫然流涕桓𤣥襲爵悲不自勝茍懐揖讓之風遂有逋逃之迹昔延陵去國令範猶存太伯辭周遺芳未泯必若情深讓弟義等脱身請封韋氏之次男無虧太伯之髙節遺腹襲侯判乙將襲祖侯以遺腹無識訴云生而有文小同為字對周彦之乙在夢蘭生逢集蓼岐嶷繼體戀弓冶之餘徽詩禮無聞想山河之舊業望九原而不作松石増哀思五等之崇班茅封闕嗣同夫嵇紹未有識於巨源類彼叔敖亦無言於楚相當今封比干墓式商容閭豈可使諸葛之苖隨時歇滅樂毅之後没代湮淪况乎血屬詳明宜存必復之始手文昭著湏傳幹父之能討以前聞義何殊於仲子酌其故事跡頗類於周文則知奠藻獻誠禮不乖於大柄析薪克荷事可優於小同同前張純如周道不虧嗣從嫡長魯風一變新用休祥爰稽仲子之文實定伯禽之裔抑為大典猶天之志蔑云議以合權繼月之書可仰惟乙誕兹蘭夢慶及茅封天孤逮事之歡神錫小同之字等康成之後𦙍克紹家聲類桓子之先宗儻為公輔且立嗣不拘遺腹無長則合承家非俗説之輕談固典章之彛範乙當承襲理在不疑同前田義寵靈慶所章錫𦙍乃承家之本恩華荐及䟽封則開國之儀是知禮􅍯十倫系宗祊而叙昭穆榮標五等列畿甸而制子男載徳象賢山河必復謀孫翼子弓冶方傳乙以夙漸禍胎䘮嚴顔於未誕冥包釁始傾厚䕃於生前若趙氏之遺孫一作孤如鄭門之棄孕母兮鞠我等令伯之成人生也有文同仲子之先兆既而聿脩祖徳將克于家未展茅封爰疑再弄之日遽從芻議復引冠字之年敬省彞章未可隔其遺誕恭惟典制理宜允其嗣徽承襲稱狂判甲承襲稱病狂所司按以為妄對求仁得仁孔丘歎其無怨逹節守節延陵慕其髙風甲代襲衣裘家承茅土志無苟得爰作𦍕狂且𤣥成讓兄初疑人望丁鴻避弟終感友言良史以為羙談志士稱其重義雖言詐善尚賢為惡與其寧失猶曰從寛况觀過知仁求之不逺深明止足取則非遥而當斷以嚴科詳其大體參也不敏何足知之同前蔣厲躬賞功行封父殁子繼義存昭穆理在宗祊夏殷以前罕詳斯制周漢之後咸用此途甲忝藉勲庸得參纓冕誠宜率徳改行嗣先人之業翼子謀孫崇保家之道焉可忘析薪之荷稱𦍕狂之謀内虧孝子之心外爽忠臣之節同衣裘而鮮食類接輿而欲歌必事等𤣥成何替名家之譽情符孟縶不聞良史之嫌即按所司之科恐失惟輕之典待盡情偽方申斷割同前邵卿建邦設都天秩有禮襲裘紹冶人教攸先甲以榮冠鼎宗躬忝門矛對謝庭之䕃蔚玉樹摇春窺陳氏之英靈珠星聚夜纂弓舊服誠宜象賢故違正徒而冐狂疾伯夷去禄雖則有諸酈生不狂誰信其一作真妄若棲心讓羙宜從温睦之䂓如譎行沽名湏遵復禮之義自然日蕃錫馬晉彖明受寵之文庭有懸鶉詩人寢伐檀之刺至公之道其在茲乎襲爵𦍕狂判甲有兄弟非賢所司命甲襲父爵以狂疾不應命御史劾知非狂請罪其謬對論以天倫分乎季孟鍾其大運異彼賢愚苟愛敬以存誠固傳襲而無忝是以隠公推魯爰髙克讓之聲太伯辭吳卒被至一作深仁之道眷言于甲克合承家同周子之有兄寧分菽麥懐謝庭之列照顧馥芝蘭黄金滿籝已奉一經之訓白芧錫壤言逃五等之封竊意元昆顧伯夷而見捨思深内敏豈酈食之非狂接輿行歌此時方奏州吁安忍是日非聞務以黜聦用辭深疾縱罕著於誠信終自牧於謙撝馮恢不言未將諧於哀懇韋𤣥晦迹俄見劾於方書鴒野急難無違六順豸冠嚴勵何罪䨇珠庶將必復台階無乃妄繩憲府除䘮襲爵判得乙請襲爵所司以乙除䘮十年而後申請引格不許乙云有故不伏對白居易爵命未墜嗣襲有期在紀律而或愆當職司而宜舉乙舊徳將繼新命未加所宜纂乃集作彼前脩相承以一子何乃廢其後嗣自棄於十年嵗月既已滋深公侯固難必復然以法通議事理貴察情如致身於宴安則宜奪爵若居家而有故尚可䇿名湏待畢辭方期集作斯析理文苑英華卷五百三十六
