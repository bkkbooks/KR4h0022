body:
  text: 文苑英華巻一百三十二宋李昉等編鳥獸二渥洼馬賦一首却千里馬賦一首漢文帝却千里馬賦一首獲大宛馬賦一首汗血馬賦一首朔方獻千里馬賦一首燕王市駿骨賦一首市駿骨賦一首千金市駿骨賦一首飲馬投錢賦一首渥洼馬賦喬彛域中之寳生乎天涯天子之馬産乎渥洼澤出騰黄獨降精於太乙神開滇壑固不渉於流沙目散電兮彪駮喙含丹而虎牙躡紅雲而噴玉霑赤汗以攢花望兮以乆来無晩耶應圖合謀光我帝業星通兩瞳月貼雙頰四蹄曳練飜瀚海之霜華一噴生風下胡山之木葉然後絡以金覊拂于鱗鬐睛射紫焰梢垂緑絲凝驕欲嘶嚼凄鏘之玉勒疊影不顧紛偃蹇之朱旗皇矣武帝漢網斯缺慿百萬之精勁倚四夷之磔裂屠蒲梢而亘大漠指二師而求汗血謂滅没之未來竟覊縻而不絶有生必感有感必通通也不極環之無窮彼泓汚之斗水乃幽賛於神功然後豗沙巻浪扵馮夷之宫疊足側身於奫淪之中星精降兮河嶽動天駟入兮駑駘空嗟我皇之英特而牽其惑欲能敗度侈多凉德夏后九代山海經夏啓舞九代馬越天地之紀穆皇八駿荒帝王之則而况金通月支價及踈勒悉復馳去終無所得此余吾之降生觧倒懸於中國祈招愔愔式昭徳音感激萬古凄凉至今願以采求馬之人為求賢之使待馬之意為待賢之心却千里馬賦以上之所班諸侯不貢為韻獨孤申叔惟漢徳之雍熈俾遐荒兮肅祗布澤所治致逺人之樂只任土必貢奉良馬以來思殊乎皎皎陋乃騤騤冀八鑾以御矣齊四牡以維之由是朝發於窮邉夕獻于君所倐追風以掣電邈千里兮一舉仰騄驥之居周鄙驌驦之在楚故將進薦於象魏庶得超遥於苑圉帝曰斯馬爾其還與平聲旅􅋙之訓今則皎如歸獸之義寜當忽諸矧乃乖乎法駕而不合於乘輿且帝之御也厥儀惟舊帝之動也其道惟守驅千乗以啓前羅萬騎以居後分青旌兮在左揚素斾兮在右儼五路以居中矯六龍以齊首龢鑾是響将節乃疾徐次舍有期豈宜乎奔走蓋順之而則可信違之而則不雖千里兮足珍於一人兮何有矧乃塲苖既食馬政攸班間以赤兎兼之白􅀈叶圖之駒伏皂稱徳之驥在閑足以驅馳於九域之内足以巡狩於六合之間宜乎旋爾故鄉歸扵舊壤超乎半漢適彼莽蒼千蕩反庶逐北風之思却從東道之上俾得交頸裔土翹足荒陬克全真性有歸羣休同越地之放象似桃林之罷牛豈彼驊騮卒見覊於造父寧同屈産終服御扵晉侯是知漢文之徳彌尊歸馬之猷克中示後之立國者盡規矩之以却遠方之貢漢文帝却千里馬賦以清道乘輿前警後蹕為韻闕名皇天眷命兮炎漢斯興運鍾三葉兮文徳可稱六龍一作飛整儀賤纎英而不服五馭飭駕却良一作駔駿而不乗猶猶由通用是遐邇授首蠻夷屈膝梯山航海者望之如雲納賮貢珍者府無虚日别有吉良博物志曰馬名吉良乗之者夀千嵗之種渥洼之出嫓飛黄於軒宫奄驊騮於周室歴無草以入貢渉流沙而效質就御服以馴養願馳驅而警蹕其體也廣膺毛服其目也擁後决前眸㸃漆而鏡朗權應規而璧懸禀月精於地法星象於天鬛上朱明溝中血走朝辭窮髪之鄉暮憇雕題之藪驌驦慙專美於前騕褭愧垂名扵後及夫噴玉勒而沫素鳴金珂而響清指九重以獻夀勒百禮以效誠帝於是宣皇風馳聖道前賢斯鑒古訓斯考差轍迹於穆王想旅獒於召保乃宣言曰朕法天以清净法地以𤣥虚有典有則不疾不徐捎星之旗逮於前步彗雲之斾設於後車吉行三十而當息良馬千里而焉如爾以馬為寳我以德為輿與其授受以交喪曷若乾乾而捨諸獻馬者乃黙爾慚顔低徊弔影步遷延以眷眷神寂寞而耿耿於是德日洽祚惟永俾來葉之嗣君仰斯道以自警獲大宛馬賦以開逺戎得天馬為韻胡直鈞昔孝武寤善馬駕英才窮二師於海外獲汗血之龍媒於是宛卒大北神駒盡來駔駿竒狀超攄逸材走追風扵馬邑嘶逐日於雲堆因行師之勲著辨前王之業開當夫海西出征制敵要逺始遲疑而不進承再命之爰晩奉皇風之用宣冀邊草之齊偃既量功就已料生返越窮海之沙塵及大宛之城苑既髙勲以茂閥且不愧於分閫芻糧盡取騄驥亦空材為地産之最精降天山之中背不毛之殊俗從入律之東風沛艾骨異低昻氣雄溢鏡光於金勒流雪彩扵花驄悉可耀威華夏奪魄獯戎若乃發跡窮荒來儀中國史驚千載之異朝慶一人之徳君子之徳式孚天王之道允塞騰驤永埒曾何比於權竒滅没長衢獨有賴於筋力然則馬惟行地君實統天黷兵者耗財之本愛財者有國之先徒知天駟之可獲莫痛征夫之寡全時泰俗饒固理道之所急珍禽竒獸在人君而可捐穆王之荒何取文帝之事足傳竟洽大東之詠何為天馬之篇况驥之生也有矣屈之產也在焉復何必勤求於逺卒當耗斁之事邊向使武帝退術士寳賢者罷征戰於戎夷浹風俗於純嘏自將致丹質之鳳鳥豈徒來汗血之龍馬故前代論邊之徒以勞師逺伐屈衆筞之下汗血馬賦以絶足方騁流汗如珠為韻王損之異彼天馬生于逺方每流汗以津潤如成血以熒煌所以名重騄驥價髙驌驦骨騰肉飛既揮紅而沛艾麟超龍翥亦流汗以倘徉當其武皇燿兵二師服猛破大宛之殊俗獲斯馬於絶境由是辭虜塞以員一作俱來望漢庭於遐騁初疑霡霂染瀚海之霜華終訝淋漓變榆關之霞一作雪影及乎獻闕之始就駕之初飾金羈而勢如躡影排玉勒而態若凌虚伯樂乍觀訝霑襟而沃若王良載馭驚濺袖以班如觀其步驟如流驅馳若滅恣餘力而聳躍控中衢而夐絶長鳴向日躞蹀而色若渥丹驤首臨風奮迅而光如振血疾徐中節羈束如濡流膺臆以飛赭灑纓鬛以疑珠雄姿泛彼逸態濡于映白駒之羣皆疑失素齊紫燕之匹不可奪朱卓彼竒姿實為殊觀初溢腹二字一作益丹而霑灑終盡足而渙汗此朱翼而表異難並駿良彼赤鬛以稱竒飜同款段超騰莫及迅疾難儔遽赫如以浹洽乍煥若以飛浮儻遂越都甚追風而更疾如同過隙似奔電以潜流且其戢聫翩異踡跼材逾良駿名先逸足倘不棄於血誠將八鑾而齊躅朔方獻千里馬賦以題為韻王起駜彼名馬產兹𤣥朔得遐方之勁氣是稟嚴凝應一作昭上聖之禎符其來綿邈固可以飾和鸞之噦噦就鈎膺之濯濯始其同羣豐草挺質寒鄉名超兹白瑞掩飛黄伊六轡之爰設非九重之孰當爾其走險鹿駭望雲龍驤縶之維之登歌不慙於西極若滅若沒獻狀聿來於北方于以効伏皁之勤于以釋長鳴之怨流離而走血來格濩落而執靮斯獻計鴻鵠之舉彼未居多渉燕宋之遥我方適願柔心有待逸足未宣權竒於綘闕之下沛艾於紫庭之前禀月未匹追風莫先所以闡幽都之美所以増華廐之妍既佶且閑軼其羣兮相萬視逺如邇遵其路兮且千一人既瞻八駿初比彼千駟花發六騶雲起其止也可齊乎足其行也無踰於里信愕視於華原而騰輝於良史伊兹駿之間出在前王而殊寡或鑾輅而見損或皷車而不捨我皇昭景福錫純嘏稱徳以喻夫俊乂服勞以勸夫忠者豈惟同兩漢之帝獲千里之馬燕王市駿骨賦以求骨知好騏驥雲集為韻闕名昔燕王思良馬以扶輈搜揚未獲寤寐而求以為激貪可以動物明誠可以感幽乃市乎死駿之貴疑作骨比飛黄與驊騮則有權竒之類倜儻之儔既淪精於一代埋朽骨於千秋甘委土以從棄忽兼金而見留爾其愜意如生沉吟未歇朔風至若聞其激揚纎塵飛想見其滅没用已息於躡影状猶存乎挾月匪充貨賄殊巨象之焚身不薦宗祧異立龜之祀骨嗟夫君之愛彼彼竟奚為雖云力則無展儻亦魂而有知恩實殊常誠所謂汗血而匪恨生如可再思所願肉骨以効竒既而視同龜玉之珍藏諸韞櫝之奥衆既美其惟一孰不從其所好於是不逺而致一作至賁然來思競選竒而徃矣争簡異而歸之迭進騕褭争呈秀騏包在坰於魯頌掩食塲於周詩豈非結之以志感之以類寸誠式孚片骨罔棄不降階而屈身果鱗集而麇至詎比夫虞公愎諌竟貪屈産之良漢武勞師逺取大宛之驥乃知市骨以求駿馬則其至成羣築臺而尊郭隗則其從如雲骨何施焉姑明好駿之意隗未足也且表樂賢之君至矣哉可垂規於典墳國家皇極立洪勲集安輪之聘尚無斁側席之求如不及儻駿骨之已收欲騰驤而見縶市駿骨賦以買死招生騰方必至為韻方一作黄韋執誼代有良驥勤求可致上心好也固有開而必先朽骨沽諸蓋有不期一作求而自至於是搜延一作馬廐發屠肆出千金而易之獲一骼而無棄不賈其用雖増飾而無成将慮其先使雄名而不墜昔之服纓玉飾軌鞗追長風而噴沬先急景而揚鑣豈知衂駿足於千里摧壯心於一朝權含月而共落蹄帶雪而俱銷當其死而不顧豈其生而可招是以服其無斁守而無失外揚嘉善之名内作旁求之術伊希代之異産固入用而無必處南中之穴莫測從來遊北土之泉始將安出聿求既彰類聚其方人獻騄驥天降此祥滅虞之役不興取諸外廐伐燕之師不舉貢自遐荒此韻不見黄字官韻觀此集時有無官韻者不知唐制如何蓋将翕必張期於至止俾善始而令終寜賤目而貴耳假其力既重之於生思其勞曷輕之於死物以徳易道由人𢎞當不遇其知乃負車而伏櫪苟應乎其感必虬躍而龍騰故八駿咸臻萬邦為楷物非其産将命逾逺而來骨在於斯何惜發幣而買亦猶賢士所趣知機彚征田忌收老以成仁卒强齊國燕昭市骨而種徳乃獲樂生覩求賢之未暢悟得駿之非輕倘長鳴之見識庶吾道之將行千金市駿骨賦以題為韻張仲素良金可聚駿骨難遇傳名豈限乎死生賈一作買價寜親乎金具伊前王之善誘頼下臣之素一作逺數滿籯初訝乎一空絶足終欣其荐赴故郭隗發求馬之術使燕昭興築臺之務賢為國寳昔見載之於經馬以龍名後亦表之於賦當其勤求未至思慮益專安得戀軒而就勒空聞馳荆而刷燕多亦奚為每厭倦於凡類愛而不見寧惜費於且千盖為傾心於延望之日市骨實由生之年其志著其謀宣非獨自馬而獲馬此實因賢而訪賢何異禄豐而遊士可集餌美而潜魚必懸夫其取與之分戒其鄙吝是非罔一作國惑孰敢妄進苟能賤貨以沽名果乃愜心而得駿斯骨也當填溝壑誰分天驥之上才縱視丹青豈辨靈疑作雲赭白馬賦祖雲螭兮螭之洪𦙍幸特達而見重使聲價之復振至若唐公驌驦穆王騄驥代勞馳路追奔結軌陳力効能死而後已豈若稱徳之際交義之始金侔龜形骨異象齒求焉事殊於漢日懸之數合於秦市智能測逺利用鈎深叶田方之念諧季札之心敦信外彰表然諾於匪石沉機内密重枯朽於捐金想夫嘶風頫影垂髾廣韻有此字植髪雖仆質於敝帷曽受精於皎月䝉君子一顧之渥恩知異窮塵之委骨飲馬投錢賦以好善馳名叶乎前志為韻王損之昔人有暗室無欺行行路岐渉清流之蕩漾指白水以驅馳乗匹馬而來念兹枯渇傾一囊以用投彼漣漪且水本無情人能誓志俯濯纓之上善控奔蹄之小駟廉隅是切斗升之水無多重價將酬子母之錢盡棄湯湯淺瀬歴歴五銖飲之而忘其量也投之而無乃甚乎同濟河而沉璧異濁水以求珠隠金沙之中迷於赤仄落蘋蘩之上混彼青蚨嗟乎利己則多潔身誠鮮在一飲而何損投半兩而稱善鳬鷖下處對鵝眼而難分鱣鮪游時雜鯨文而不辨駸駸練影潏潏波聲滿腹而自資行道墜泉而孰謂沽名郭况之家人儻來訝移金穴漢代之貲郎或見猶認水衡浦溆縈盈汀州不當從水已注在前重疊呉酌貪而難並王不言而雅叶致香醪而一醉且乏杖頭入春溜以俱沉不漂榆莢登一作澄明水底散亂馬前乍似揀金之磧何殊種玉之田逐好利之徒無辭俯拾同貫珠之子幾誤旁穿是知雅志無儔常情不到將均勺水之直自勝飲氷之操則墜銀瓶於井底思婦徒傷投竹杖於陂中仙翁可報賢哉項氏之心從吾所好文苑英華巻一百三十二
