body:
  text: 文苑英華卷八百九十三宋李昉等編職官一北省一齊黃門侍郎盧思道碑一首唐紫微侍郎贈黃門監李乂碑一首右散騎常侍徐堅碑一首齊黃門侍郎盧思道碑張說有齊黃門侍郎范陽盧公諱思道字子行涿州人也其先姜姓世胙東海别為盧氏家于北燕自漢世中郎將植至侍中陽烏徴君之子禀天靈傑承家令軌清明虛又磊落標竒志不詭隨行不苟合遊必英俊門無塵雜至於求已勵學奧道覩探思若泉涌文若春華精微入虛無變化含集作合飛動斯固非學徒竭才仰鑽之所逮也事齊歷散騎侍郎以翰林直中書中廢復進至給事黃門侍郎待詔文林館武平末天子總兵禦冦太子監國于晉陽公留綜宫朝兼典樞密及皇輿敗績於外而百寮蕩析於內公節義獨存侍從趣鄴告至行賞授儀同三司入周除御正上士定省歸郡郡人祖英伯作難公脅在其旅幽都既平玉石將燎賴元帥宇文公舉以舊有令聞引謁因命草露板立就駭其麗異其敏釋於齊斧之下楫于郡士之上除掌教上士隋髙祖為丞相也遷武陽太守以母老乞解職優詔許之後復徴為散騎侍郎奏內史郎事隋開皇六年春秋五十有二終於長安反葬故里凡更臣三代易官十七再降一免二去職八平除擢遷者四而已公處屯安貞賦詩頽飲視得失蔑如也臨難無懾在黜無愠危不去主仕不違親休明有賔禮之盛顛覆無淪胥之禍其大雅者歟夫禮義損益公能言之故與熊安生詳定齊禮三墳五典公能讀之故與薛道衡侍學諸后公國華人望光照鄰邦故所居之朝應對賔客修辭抗議允執其中故青瑣黃縑二代咸掌大名之下豈誣也哉昔仲尼之後世載文學魯有游夏楚有屈宋漢興有賈馬王揚後漢有班張崔蔡魏有曹王徐陳應劉晉有潘陸張左孫郭宋齊有顔謝江鮑梁陳有任王何劉沈謝徐庾而北齊有溫邢盧薛皆歷代集作應世翰林之秀者也吟咏情性紀述事業潤色王道發揮聖門天下之人謂之文伯於戲國有校家有孰祿位以勸風雅猶存然千數百年群心相尚竟稱者若斯之鮮矣才難不其然乎然則飛黃虛騁百轡遺路鷦一作鵾鵬天運萬翼無階文士擅名當時垂聲後代亦云乎才力之絶衆故爾開皇以來百三十餘載天贊唐德生此多士公之𤣥孫曰藏用濟美文館重祿黃門永惟衣冠子孫邑里多改先人封樹嵗久將平乃假詞菲才刋石表襚庶乎涉齊地者不薪柳惠之隴過邢山者無惑子産之墓至矣乎盧氏之子其用心也逺矣銘曰彧彧黃門實天生德才蓋一世榮聞四國文王既沒文在人𢎞公為宗匠當朝與能龍躍春霽鳯鳴朝升或頌或變或雅或承理以神合聲以妙徴髙視睢渙與君代興人之云亡十有一紀斯文未喪施于孫子新作豐碑德音不已唐紫微侍郎贈黃門監李乂神道碑蘇頲世稱李公德為範言為師行為則事為程於戲彼之四者吾以一貫及值緝熙之運懷廣大之業天下謂之登相國踐台司竟而此位不躋亦公之譽一作助也若季孫何訪不對者宣尼季子可法以書者文仲夫如是故聞其風志其道粵未量已公諱乂字尚真趙房子人也伯人侯曇裔孫侍書徑十一世孫自咎繇虞臣老𣆀周史純嘏之烈清華其冠曽祖彥博振威將軍光州固始令祖惠明弋陽西曹椽熊州司倉書佐父大智閬州新政令公貴達追贈濟州刺史以昭孝焉北臨代有恆嶽東注彭有泫水漢地理志趙泫氏縣有泫水豈恆之寶泫之精矣何竒士之不乏而我公誕生歟公幼而閔凶弱不好弄十一從學極奧研幾十二屬詞含商咀徴中書令薛元超謂人曰此子必負海內盛名十九郡舉茂才䇿第考功郎劉思立一見又如之調補潞州壺關婺州武義尉羈雲逸而在泥蟠也秩滿詣選吏部侍郎蘇味道偉藏器而嗟韞櫝也特受藍田尉又䇿髙第纍遷乾封萬年尉雍州長一作刺史薛季昶視事咨謀推誠悅服主畫諾而班詔書也擢為監察御史厯殿中侍御平而不頗踈而一作則不漏與御火令黃門監漁陽公承㫖鞠僞發姦除惡刑以矯末禮以教中有若决婺潰癰焚符破璽景龍中葉靜能諂諛媚妬權勢傾人自謂金鼎可期羽衣而立功劾奏其僻中宗原而宥之不肖者懼不仁者逺無何加朝散大夫遷尚書司勳左司二員外右司郎中中書舍人立義起草司言揮翰蓋間練而芳蔚也遂兼長一本作長兼按歐陽修書南齊海陵王墓銘題長兼中書侍郎謝晀撰南北史多有此名蓋當時兼官之稱昭文館學士雲龍待問天馬成歌羣士躍鱗繄公稱㫖太子上即位檢校吏部郎中正關鍵端也持刀尺審也建是無撓翕然有聲二嵗遷黃門侍郎加銀青光祿大夫進爵中山郡開國公食邑二千户四嵗轉紫微侍郎掌制數月兼刑部尚書明年正除檢校尚書校郡國考績凡二嵗古之邁迹垂憲選賢與能多矣抑揚者或齟齬為心塞默者或籧篨為貌介無不執執則嫌於偏柔無不通通無惡於善士君子患也公列近臣居常伯則不然秉彛德徹乘一作垂理錯綜平枉梧按倫省忠而公信而順謀始而作慮先而動明可照肝膽精可析毫芒議必當而刑不放也故邦釋令典公敷大猷粗舉凡矣聖人迪謨訓書簡册惟文乎公掌司綍握鉛槧典可常而史不隱也聖人鞠師旅繕甲兵惟武乎公賦其車搜以器居有禮而用有神也聖人訊法約疇事省惟清乎公削煩苛節更算著諸令而便於宜也聖人核臧否甄黜陟惟明乎公差九牧區五等措諸枉而舉於直也夫文武以序清明以成斯事體大與時偕行行之我公則無遺矣嗚呼我公何不夀矣明靈罔恤暗忽而殂享年六十開元丙辰嵗仲春癸酉薨於京師宣陽里第旒冕震悼衣冠痛惜秦里奚鄭子産烏足擬哉制贈公黃門監絹布三百匹米粟三百石以賻之太常考行曰貞宜矣公每誡其子師於薄葬有子寧等五人並喪過乎戚奉遵先㫖不敢隳廢韋賢業儒竟遷魯國杜預知禮自表邢山故寧等以其夏丙中卜葬長安細柳原東北望帝京二十有五里償其志也柩既引户部尚書東平畢構少府監吳郡陸餘慶散騎常侍扶風馬懷素黃門侍郎清河崔泰之洎紫微侍郎武功蘇頲祖於延年門外舉觴言曰不還故鄉達也别於此路窮也孰云中山寧厥后土非此公之為慟吾誰慟乎服馬悲鳴而不前行人涕泣而相向僉以頲者公稱知我我謂之甥固嘗揮斤見期必使刋石為事頲則不佞曷於是重相泣謂曰我輩見中山弗𡨕𡨕墮行弗察察從政弗執利邀寵弗夸毗耀榮無躁求無苟得結友朋義也誨子弟仁也薦賢畏其知聞善若已出急於病讓於夷輕於財重於施乃中山之度矣所著文集成六十卷五言之妙一變乎時流便清婉經綸密緻猶樂簫韶工黼黻也至於心凝風味神嬉景華奕碁不孤絃酌相伴樂然有地貴豈在人奈何則亡不可復見因更為長慟俾愚叙之黃門監漁陽公盧公居世有間散之任與公有范張之密强學偉詞蓋撰其實也遂作頌云龍德周史龜文漢相鼎鼐遞襲簮纓相望常山之英泫水之精代稱不乏人惟特生其一鯉趨成訓敦詩閲史鴻漸于磐陟遐自邇暫勞州郡俄拾青紫王佐之才一日千里其二髙遊省門近侍軒墀守位以正行已無私無私伊何惟忠是效以正伊何臨事不撓其三八座爰踐三階未陟如何不臧景命云極中夜嬰癘崇朝孔亟縱壑摧鱗靡霄墜翼其四如水之清如玉之貞如衡之平如鏡之明應享年以介夀何短晷之先傾晉喪名臣兮羊公見哀於武帝鄭有遺愛兮尼父掩泣於僑卿其五歸無途兮往不返嵗將晏兮逝水逺一作彌逺南山南河往不返可奈何日運星回天長地久旌芳宣懿無非舊友其六故光祿大夫右散騎常侍集賢院學士贈太子少保東海徐文公神道碑張九齡夫物之所宗也莫善乎德行道之以明也莫先乎文學人倫以具體為一作者難世業以濟美為貴有能兼之者其一有在字東海公乎公諱堅字元固其先東海郯人永嘉之後仕業南國因家吳興焉隋氏平一作縣陳徙族一作楚族入雍今為馮翊人也原其伯繄平水土實佐文命偃王行仁義大啓徐方因國保姓克昌厥後逮乎漢魏間出仁賢十二代祖晋江州刺史順德簡侯寧至五代祖梁直閣將軍慈源侯整整生陳始安太守綜綜生隋延州臨真令方貴方貴生唐果州刺史孝德孝德生唐西臺舍人贈禮部尚書齊𥅆出入六朝載祀數百文武冠冕存歿光靈訓子克家謀孫必復賢風儒行世有其人公即尚書府君之元子也生而濬一作峻發默識經藝粵自童齓則善文言時先府君為沛王侍讀公之岐嶷聲振平臺王聞而延佇與之談議授簡能賦博奕惟賢門客府寮深所厭服奄遭不造十四而孤祖母金城郡君姜太夫人念其聰異誨以志學公遂刻勉詣心精微磅礴九流激昻三變景倩幼露實賴愍孫令伯大成抑由祖母上元中遭姜太夫人喪哀幾滅性制則從禮有感斯絶無聲常淚服闋州辟秀才其年登科解巾補汾州參軍事部送邉糈至于定襄軍使王本立素重公才署為管記書奏謀算悉以咨之坐耀鋒芒未嘗肯綮尋而換雲陽尉萬年主簿親纍出為楊府功曹振鱗將摶載躍京轂垂一作乘翼逺逝有聲東南俄遷太子文學時祕閣群籍大抵訛謬有勑召學士詳定公實在焉為之刋緝卷盈二萬時輩絶倒伏其博逺尋與李嶠等撰三教珠英書成奏御拜司封員外尋加朝散大夫即拜郎中稍遷給事中以公代及文史詞不失舊雖居鎖闥尚比纒一作墨牽遂除中書舍人君子曰舜之官人也二年勑公修則天聖后實録及文集等絶筆中宗嘉之璽書敦慰賜爵慈源縣子賚物五百假旌良史也遷刑部侍郎一作郎中加秩銀青光祿大夫轉禮部侍郎兼判户部一有侍郎二字公久踐朝廷纍登省閣舊章必練即事無疑雅不煩文深得大體雲臺髙議以此歸之進封縣伯食邑五百户兼昭文館學士受詔與天竺僧菩隄流至一作志譯寶積經及柳冲等同修姓氏系録三教寶真萬族有倫亟見成矣太平公主內秉國權駙馬武攸暨外收人望命公至第拒而不行惡夫佞也景雲初今上夷亂主鬯東朝宫相四員時難其選二以宰臣兼領一則天子故人任良兩宫一作物官實在公矣遂除右庶子兼崇文館學士修史如故進爵東海郡公食邑二千户遷右散騎常侍以本官兼黃門侍郎尋而即真祿賜同三品爵崇五等道茂兩宫利君謀身舉代皆譽又以刪定格令承恩進爵二等公請回授叔父齊莊帝用懷之遂封莊為長城縣子天下義士莫不激昻一作節焉侍中岑羲公之姻婭與其聮事深自危懼求典間司以逺祗悔遂改太子詹事逮羲禍敗地絶嫌疑先是不交定王及此不昵岑氏見炎莫附思患預防信逹人也復以親纍出為絳州歷永蘄棣衢四郡山川公位一作立楚夏異齊一作同公政不易宜教以因俗德化歸厚人共由之開元中㑹同京師遷祕書監無何轉國子祭酒皇帝乩古籍字古崇訓開堂集儒以公才學元長命登首席遂令集賢殿修撰又除右常侍以公為學士副丞相燕公知院事綢繆顧問日月獻納渥恩尤及少有其比上將柴于岱宗詔公草其儀注定禋一作禮祀之位廣配類之儀博文約禮或設或革言出而人伏事立而天從時義逺矣及禮畢承恩特加光祿大夫時置十銓公在分掌程不愆素且無遺才公既贊相謨猶從容諷議大鍾必諫一作鍊溫樹不言啓沃盡規一作知實致君於堯舜死生有命空比德於老彭享年若干以開元十七年龍集已已五月丁酉薨于長安攽政里之私第聖人震悼君子稱嗟翼日有詔褒贈太子少保贈物若干假粟若干石特遣一作降中使內侍伊鳯祥弔祭而别賜布帛若干端匹俾鴻臚少卿元一作源復監護葬事官給鼓吹儀仗太常考行曰文君子曰仁而愛人敏而好學家有榮業紹其弓冶國有大事修其典章諡之曰文不亦宜乎以其一作某年終甲子與夫人故南陽郡夫人合葬于萬年縣之少陵原之先塋禮也公寬裕有禮溫良能斷智出于象一作事外樞得其環中德之積也厚名之立也大故起自黃綬纍踐赤墀五省一作府推髙連州得最事將時並位一作名與才偕莫之夭閼也至於升堂入室探微覩奧動有禮樂之運言有雅頌之聲是惟無作作則萬物一作其和而八音備矣蓋嘗注史記修晉書續文選大隱傳及有文集三十卷皆咨於故實博於遺訓古今通變河漢共一作其髙或藏名山或升天府亹亹然各得其所嗚呼文仲沒而其言立子産終而遺愛存公則備焉宜受戬穀保乂厥後代代守之有子曰峻嶠㟴等才以雅著孝以特聞學茂交曽之科㫖詞雄祖考之風格備曆清貫皆立能名三賢德聲方賈氏無愧纍葉儒訓與班門孰多咸瞿瞿如皇皇如昊天不追終身積痛永舊撰實勒諸墳道僕從述者之後敬而伸之乃為銘曰舜命益虞疇功帝俞偃王文教代集一作及通儒光華鼎閲一作伐出入秦吳門多長者君其最乎其一曽是好學果行洵美日就一作龍鱗成風積鵬起黃綬覆簣朱門方軌宫籍正人朝稱良史其二三入承明五遷外郡道有出處心齊喜愠帝思啓沃國尚師訓屢獻針規偏承顧問其三居常有異慱而無惑綿蕝孫通詮衡叔則為龜為鏡立言立德故不憖遺左右王國其四悼興旒冕哀結衣簮官供羽仗士惜人琴已矣終古平生德音松枝挂劒碑字生金其五文苑英華卷八百九十三
