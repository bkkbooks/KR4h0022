body:
  text: 文苑英華卷二百五十五宋李昉等編寄贈九李端五首武元衡五首馬異一首韋應物六首盧綸十一首嚴維六首戴叔倫十二首奉系四首孟雲卿一首冬夜寄韓弇李端獨坐知霜下開門見木衰壯應隨日去老豈與人期廢井蟲鳴早隂階菊一作草發遲興來空憶戴不似剡溪時晚遊東田寄司空曙前人暮來思逺客獨坐在東田片雨無妨景殘紅不映天别愁逢夏果歸興入秋蟬莫作隳官意陶公未必賢早春雪夜寄盧綸兼呈祕書元丞前人聞君隨謝朓春夜宿山前集作前川看竹雲垂嶺一作地尋僧月滿田一作雪滿船熊寒方入樹魚樂稍離船一作泉獨夜一作猶是羇愁客誰集作唯知惜暮一作故年贈池陽三字詩選作過谷口元贊善所居前人入谷逢詩選作訪君來秋泉已難涉林間人獨坐月下山相接重露濕蒼苔明燈照紅葉故交一不見素髮何稠疊贈司空曙前人漢主金門正召才馬卿多病自遲回舊山暫别老將至芳草欲闌歸去來雲在髙天風會起年如流水日相一作長催知君素有栖禪意應是一作嵗晏蓬門遲爾開寄上中書李相公武元衡昏旦倦興寢端憂坐向微亷頗不覺老蘧瑗始知非授鉞虛三顧持衡曠萬機曽一作會應舟楫便煙雨一作水五湖歸途次近蜀驛蒙恩賜寶劒及飛龍廄馬使還因寄李鄭二中書前人草草事行役遲遲入詩選作出故關碧幢遙隱詩選作隔霧紅斾漸依山感激慙集作酬恩淚風霜去國顔捧刀金錫集作賜字歸馬玉連環威鳳翔雙闕征夫護八蠻詩選作龍鳳辭三署干戈護八蠻應憐宣室召溫樹不同攀此詩二百九十七卷重出今已削去晨興贈友寄呈竇使君前人江陵歲方晏晨起盼庭柯白露傷紅葉清風斷緑蘿徇時真氣索念逺幽懷多宿昔東山意縱橫南浦波有美嬋娟子百慮攢雙娥緘情鬱不舒幽竹自駢羅為豫集作子歌寒苦旨酒朱集作有酒未顔􅋳兩鬢倐云變一作妍鬢倐然變功名將奈何夏日陪朝一作諸寮同逰昊天觀因覽舊題詩寄呈楊華州中丞前人三伏草木變九城車馬煩碧霄回騎吹丹洞入桃源臺殿雲浮棟緌纓鶴在軒莫將真破妄聊用靜持喧石甃古苔冷氷筠涼簟翻黃公壚下歎旌斾國東門旬假西集作南亭寄呈熊郎中副使前人旬休屛戎事涼雨北窗眠一夜江城夢萬里繞山川草木散幽氣池塘鳴早蟬妍芳落春後旅思生秋前紅槿粲庭艷緑浦繁渚煙行歌獨酌謡坐發朱絲絃哀玉不可扣華觴徒湛然聞君東林卧郡閣曠周旋酬對龍象侣灌注清泠泉如何無礙智猶集作獨苦病纒牽暮春酒中贈李干秀才馬異歡喜見交親生開一甕春不須愁犯卯且乞醉過申折草為籌箸鋪花作錦茵嬌鶯解言語留客也殷勤寄洪州幕府盧二十二侍郎自南昌令拜頃同官洛陽韋應物忽報南昌令乘驄入郡城同時趨府客此日望塵迎文苑臺中妙氷壺幕下清洛陽相去逺猶使故林榮示全真元常元常趙氏生前人余解郡符去爾為外事牽寧知風雪夜復此對床眠始話南池飲更詠西樓篇無將一會易嵗月坐推遷簡盧陟前人可憐白雪曲未遇知音人栖遑集作恓惶戎旅下蹉跎淮海濵澗樹含朝雨山鳥哢餘春我有一瓢酒可以慰風塵寄暢當聞以子弟被召從軍前人寇盜集作賊起東山英俊方未間聞君新應幕藉藉動京關出身文翰場髙步不可攀青袍未及解白羽插腰間昔為瓊樹枝今有風霜顔秋郊細栁道走馬一夕一作日還丈夫當為國破敵如摧山何必事州府坐使鬢毛斑秋夜寄邱二十二員外前人懷君屬秋夜散步詠涼天山空松子落幽人應未眠寄楊協律前人吏散門閣掩鳥鳴山郡中逺念長江别俯覺坐隅空舟泊南池雨簟捲北樓風併罷芳樽宴為愴昨時同夜中得循州趙司馬侍郎書因寄回使盧綸瘴海寄雙魚中宵逹我居兩行燈下淚一紙嶺南書地説炎蒸極人稱老病餘殷勤報賈傅莫共酒杯踈郊居對雨寄趙涓給事包佶郎中前人暑雨青山裏隨風到野居亂漚浮曲砌懸溜響集作滴前除塵鏡愁多掩蓬頭懶更梳夜窗凄枕席隂壁潤圖書蕭颯移新竹龍鍾拾野蔬石泉空自咽藥圃不堪鋤濁水淙深轍荒蘭擁敗渠繁枝留宿鳥碎浪隱逰集作行魚桑履時登望荷衣自卷舒應憐在泥滓無路託髙車春日山中寄李舍人前人延步愛清晨空山日照春蜜房寧有主石室自無鄰泉急魚依藻花繁鳥近人誰憐失路侣唯與老相親客舍苦雨即事寄錢起郎士元員外前人積雨暮凄凄羇人狀鳥栖響空宫樹接覆水野雲低穴蟻多隨草巢蜂半墜泥繞池牆蘚合擁溜瓦松齊舊浦集作圃平如海新溝曲似溪壞欄留衆蝶欹棟上集作止群雞莠盛終無實槎枯遂集作返有荑緑萍藏廢集作淺井黃葉隱危隄閭里觀將絶朝昏望亦迷不知霄漢裏何路可相携一作是攀躋寄贈庫部王郎中時充折糴使前人諤諤漢名臣從天令若春科一作敘辭皆詔旨稱使即星辰草木承風偃雲雷施澤均威懲治粟尉恩洽讓田人泉貨方將散京坻自此陳五營俱益竈千里不停輪未逺金門籍旋清玉塞塵碩儒推慶重良友頌功頻鶴髮逢新鏡龍門躍舊鱗荷君偏有問深感浩難申秋夜寄馮著作前人河漢淨無雲鴻聲此夜聞素心雖比石蒼鬢欲如君露槿月中落風雲池上分何言千載友同迹不同群早春歸盩厔舊宇集作居却寄耿拾遺緯李校書端前人野日初晴麥隴分竹園村巷鹿成群百家廢井生春集作新草一樹繁花傍集作對古墳引水忽驚氷滿澗向田空見石和雲可憐芳嵗青山下唯有松枝寄與君集作好寄君雪謗後書事上皇甫大夫前人盛德總群英高標仰國楨獨安巡狩日曽掩趙張名業就難辭寵朝回更授兵曉川分牧馬夜雪覆連營長策威殊重嘉謀翊聖明畫圗規陳勢夢筆紀山行綬拂池中影珂搖竹外聲賜歡徴伎樂陪酒間公卿却意經前事翻疑得此生分深存殁感恩在子孫榮覽鏡愁將老捫心喜復驚豈言沉族重但覺殺身輕有淚沾墳典無家集弟兄東西遭世難流浪識交情閲古宗文舉推才慕正平應憐守貧賤又欲事躬耕寄司空曙前人壯志隨年盡謀身覺集作竟又作獨未安風塵交契濶集作結絶老大别離難臘近晴多曉春遲夜却寒誰堪一作憐少兄弟三十復集作又無官一作五十未為官此詩二百八十七卷重出今已削去注異同為一作洛陽早春憶吉中孚校書司空曙主簿前人值逈逢髙駐馬頻雪晴間看洛陽春鶯聲報逺同芳信栁色邀歡似故人酒貌昔時花共艷鬢毛今與草爭新年來百事皆無緒唯與湯師話集作結淨因聞長安故人喪逝遷謫因增歎寄上河中鄭倉曹暢參軍昆季前人鬢似衰蓬心似灰驚悲相集老相催故友九泉留語别逐臣千里寄書來塵容帶病何堪問淚眼逢秋不喜開幸接野居宜縱一作徒步冀君清論一申哀一作清夜一聲哀書情獻劉相公嚴維年來白髮欲星星誤却生涯似一作是一經魏闕望中何日見商歌奏罷復誰聽孤根獨棄慙山木弱植無成狀水萍今日更須詢哲匠不應休去老巖扃贈送朱放前人昔年居漢水日醉習家池道勝迹長在名髙身不知久一作欲依天目住新自始寧移生事曽無長唯將白接㒿剡中贈張卿侍郎何卿一作樂卿下樂集作樂下溪間集作雲間前人辟疆年正少公子貴初還早列何卿位新參柱史班千夫馳驛道駟馬入家山深巷烏衣盛髙門畫戟間逶迤天下樂照耀剡溪間自賤逰章句空為衰草顔贈萬經少長干少集作小前人萬公長慢世昨日一作夜又隳官縱酒真彭澤論詩得建安家山伯禹穴别墅少長干輒有時人至窗前白眼看書情上李蘇州大夫前人東土苖人尚有殘皇皇亞相出朝端手持國憲郡僚畏口喻天慈百姓安禮數自憐今日絶風塵空記往年歡誤著青袍將十載忍令漁浦却垂竿餘姚祗役奉簡鮑參軍前人童年獻賦在皇州方寸思量君與侯萬事無成新白首兩春虛擲對滄流歌詩盛賦文聲動簫管新亭晦日逰知己欲依何水部鄉人邱整一作今正賤東邱郊園即事寄蕭侍郎集作呈蕭常州復戴叔倫衰鬢辭餘秩秋風入故園結茅成暖室汲井及集作修井及清源鄰里桑麻接兒童笑語喧終朝非役集作貴無役聊寄逺集作聊向逺人言李大夫見贈因之有呈前人何言訪衰疾旌斾重淹留謝禮誠難答裁詩豈易酬江清寒照動山逈野雲秋一醉龍沙上終歡勝舊逰漸至集作次涪州先寄王員外使君縱前人文教通集作留夷俗均輸問火田江分巴字水樹入夜郎煙毒瘴含秋氣集作景隂崖蔽集作閉曙天路難空記日身老不由年將命寧知集作辭逺歸心詎可傳星郎復何意集作事出守五溪邊長安早春贈萬評事前人春風歸集作過戚里曉日上花枝清管新鶯集作聲發重門細柳垂經過千騎客調笑五陵兒何事靈臺客集作宿狂歌自一作獨不知暮春沐髮晦日書懷寄韋公曹渢李録事從訓王少府純前人朝沐敝南闈集作扉盤跚待日晞持集作揚梳髮更落覽鏡意多違吾友見嘗少春風去不歸登臨至一醉集作登髙取一醉猶可及芳菲新秋夜寄江右友人前人遙夜獨不寐寂寥蓬户中河明五陵上月滿九門東舊知一作萬里親友散故園江海空懷歸正南望此夕起秋風贈韋評事儧前人與道共浮沉人間嵗月深是非園吏夢憂喜塞翁心細草集作竹誰開徑芳條自結隂由來居物外無事可抽簮早春書情寄河南崔少府此詩見二百五十六卷前人早發陕州途中贈嚴祕書此詩見二百五十六卷前人潭州使院書情寄江夏賀蘭副端前人雲雨一蕭散悠悠關塞一作復河俱從泛舟役近隔洞庭波春水去不盡秋風今又過無因得相見却恨寄書多贈司空拾遺前人侍臣何事辭雲陛江上彈冠見雪花望闕未成丹鳳詔開門空對野人家陳琳草奏才還在王粲登樓興不賒髙館更容塵外客仍令歸去待瓊華喜嚴侍御蜀還贈嚴祕書此詩見二百五十六卷前人上薛僕射固讓辭命秦系由來那敢議輕肥散髮行歌自採薇逋客未能忘野興辟書今遣脫荷衣家中匹婦空相笑池上群鷗盡欲飛更乞大賢容小隱益看愚谷有光輝山中贈張評事時授右衛佐前人終年常避喧自注五千言流水間過院春風與閉門山容邀上客桂實落華軒何事教豫起微官不足論山中寄錢起員外兼苖員外發前人空山嵗計是胡麻窮海無梁泛一槎稚子唯能覔梨栗逸妻相共老煙霞朗吟麗句驚巢鶴間樹疑作對春風看落花借問省中何氷部今人幾箇屬詩家鮑員外見尋因書情呈贈曽與系同舉場前人少小為儒不自強如今羞懶見侯王覽鏡自知身漸老買山將作計偏長荒涼鳥獸同三徑撩亂琴書共一床猶有郎官來問疾時人莫道我徉狂途中寄友人孟雲卿昔時聞逺路謂是等間行及到求人地始知為客情事將公道背塵繞馬蹄生倘使長如此便堪休去程文苑英華卷二百五十五
