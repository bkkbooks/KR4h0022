body:
  text: 文苑英華卷五百九十二宋李昉等編謝文章謝撰懿德太子哀策文降勑褒揚表一首謝撰攀龍臺碑蒙賜物表一首為納言姚璹等謝勑賜飛白書表一首為文武百僚謝示鏡圖表一首謝賜碑額表一首謝修史表一首為李僕射賀聖製政刑箴表一首為戴中丞謝賜中和節詩序表一首代李令公謝手詔為製東渭橋碑文表一首代陳司徒謝勑賜麟德殿宴百僚詩序表一首謝賜中和節御製詩序表一首為李大夫謝御製詩表一首謝撰懿德太子哀䇿文降勑褒揚表李嶠臣某言昨奉勑令臣撰懿德太子哀䇿文臣術異懐蛟藝非吞鳥四科凾丈多謝於文學七子登筵有慙於詞賦恭聞聖㫖輙奏庸音豈足以褒叙重離激揚三善宣睿慈之惻愴述天顧之綢繆曲降絲綸猥垂剪拂諭之以雲間日下方之以陸海潘江餙嫫母之容加其粉澤營碔砆之質發其光彩雖宋玉大言見褒於楚國公孫下䇿蒙賞於漢朝無以比此揄揚方斯㤙渥欽戴紫紱伏銘𤣥造仰髙天而發悸顧短札而成羞無任慙荷戰懼之誠謹詣閣奉表陳謝以聞謝撰攀龍臺碑蒙賜物表臣嶠言伏奉㤙勑編撰攀龍臺碑文賜臣物四百叚研精不優篆刻無術下帷闕蛟龍之學搦管慙鳯凰之思猥辱隆命俾圖光範戴天知跼仰大象而増迷遊聖為言撫營魂而自失寜足以發揮一徳揚搉萬分述虞后之孝思談姬文之睿業而天情不匱帝造無涯式推愛敬之心用廣褒崇之惠披文相質本殊黄絹之詞頒賞計勞遂承紫泥之渥荷寵惟懼瞻恩戴靦祗奉之日悚汗交馳無任慙戴屛營之至謹附洛州奏事使具官臣某奉表陳謝以聞為納言姚璹等謝勑賜飛白書表臣璹等言今月十一日侍晏蒙恩作飛白書題臣等名字垂賜跪承寳貺仰戴瓊文如披七曜之圖似發五神之檢九霄靈澤與垂露而同霑千載嘉祥共廻鸞而並集冠六文而首出掩八體而孤鶱眇乎若遊霧之拂春林靄乎似輕雲之上秋漢頡皇之始模蟲篆未足多竒劉后之嘗學史書孰云能擬固已工踰懸帳妙盡刻符鍾繇竭力而難比伯英絶筯而不逮則知乃神乃聖包衆智而同歸多藝多才緫羣方而兼善諒天機之獨運豈凡識之能窺臣等才埒瓶筲任叨衡右噐滿之誡每切於愚心棟隆之吉實慙於明代而天慈曲奬聖造不遺厚禄尊官既殫恩而極寵良辰美景又申歡而接宴慶方行而已及澤未溥而先加殊恩與骨肉等深縟禮共衣冠相絶今復親陪睿賞特流宸翰嬴氏之魂遊天上未比超昇闞生之名在月中詎方遐邈昔者韓稜深博肇蒙於署劒田鳯名流僅聞於題柱未有芝英草聖近縟於綵牋合璧連珠俯光於掌握在臣叨忝獨冠古今方且示彼記言傳諸貽訓表一人之殊寵留百代之榮觀手舞足蹈徒申踴躍之心摩頂至踵豈答生成之施無任欣戴之至謹詣闕奉表陳謝以聞為文武百僚謝示鏡圖表邵說開元十八年張說已卒此表乃代宗時英華作張說非臣等某言某日開府魚朝恩以所造周易鏡圖於中書門下奉宣聖旨傳示臣等仰觀易象逺見天心捧對循環載欣載躍臣某中謝臣聞太極既立是生兩儀六書以畫卦四營而成易備君臣父子之道盡隂陽變化之源理亂吉㓙必以類應自古哲后曽未研精爰及近臣莫聞訓習而朝恩深窮損益繢以成圖陛下重有激揚示之於外臣幽觀妙用周覽𤣥言警誡人君恢張治道陛下欲成其政必在動而行之儻能建中於民實亦天下幸甚臣無任謝賜碑額表張說臣說言伏奉今日恩旨賜先臣碑額悲荷交心拜捧以泣臣某中謝臣亡父先臣隲安貞下位不待昌辰先帝贈之以專城陛下目之以積善光賁重渥感慶三泉舉宗悲喜外姻歡賀昔孔篆呉札之墳秦存里子集作展季之壟辭集作事輕列國義小陪臣豈若天王禮士鳯書旌墓榮軼曩賢道映來籍在臣在子移孝為忠心効草木何酬雨露無任幽明感戴之至謹奉表陳謝以聞謝脩史表臣某言伏奉今月十六日勑令臣在家脩史捧恩戴命且喜且慙臣服道儒門䇿名昌運掌綸四后載筆三朝階縁宿遇登集作殘躡端揆職為劇於心盡史無用集作閑疑而功廢自貽官謗待罪私門反集作歸魯之感特集作徒深藏周之望已絶豈意特流天㫖重緝簡書雖才慙左丘集作馬而時盛周漢况復編堯舜之年事皆目覩叙羲黄之德言匪傳聞善志集作惡將訓於百王實録可貽於千古國家之鴻業辦矣朽臣之至願畢矣不勝天恩難任之至謹奉表附内侍尹鳯祥陳謝以聞為李僕射賀聖製政刑箴表崔位臣某言伏見聖製政刑箴天文昭囬八表皆燭睿藻稽古六經不刋臣某中謝伏惟皇帝陛下致理和平躋人夀域猶懐兢業重設箴規酌裁成立政之中求司牧措刑之本信成康之能事蓋堯禹之用心可以萬邦作孚千載垂範金石不朽日月俱懸爰自䋲契已還歴選列辟憲章代有詞義罕攻湯製局促於盤銘虞歌淡泊於琴曲横汾乃縱賞之事黄竹匪勸誡之文其餘流薄國風漂淪樂府典謨雅誥寂蔑無聞曷若光啟格言昭融至道勤萬機於一日二日立盛德於先天後天長垂四目之眀詎假百官之獻臣職惟方鎮宗忝葭莩成誦已在於丹心述宣願播於青史臣限以所守不獲奔走闕下拜舞天階無任捧讀跪戴抃躍之至為戴中丞謝賜中和節詩序表馬緫臣某言中使至奉宣聖㫖賜臣勑書手詔幷御製中和節詩序及尺等天貺荐臨睿文亮發仰觀俯愧祗懼若驚自受殊恩守茲逺鎮才拙日淺政未及人陛下頻降寵私驟施惠渥雖大君奬餙其道則然微臣駑猥豈冝及此臣聞先聖有作不相沿襲茍合天理順乎人心則可以垂憲百王布諸彛典側覽明詔以二月一日為中和節事因祈糓便賜歡娯兼賜臣御製書序一本尺一枝者伏以仲月良辰首建嘉節朝野慶洽君臣樂康助萌牙之發生擬天地之含育誠所以跨越周漢邁絶古今况聖人麗藻髙懸日月皇儲妙翰益覩文明誕告萬方孰不歡抃又書同律度禮均衡石以尺頒賜固協其時敢不佩此謨猷謹於軌範限守邊鎮遂闕稱觴徒觀宴鎬之詩不厠𢋫歌之末無任兢荷歡躍之至代李令公謝手詔為製東渭橋碑文表于公異臣某言某月日某至伏奉詔命以臣收復聖㫖褒揚特為製東渭橋碑文皇太子書手詔賜臣及將士者驚拜捧荷魂神飛越臣聞霍光戴漢輔昭立宣鄧禹佐王寜人除暴或道扶衰運或功格皇天纔聞麟閣之圖適及雲臺之紀未有事微賞厚用淺報崇廻辰象之天文降明離之筆札跪捧尋繹慙惶失圖事出古今感深臣子雖百身隕越曽未賈於片言九族隳離實難酬於一顧臣某中謝伏惟皇帝陛下邁軒皇之武德續唐帝之文思六義不足以財成五聲徒表於宣暢躬親庶政而睿藻日新化洽萬方而宸章間作頃属兇徒扇結都邑震驚陛下克讓斯在推功勿居廻天漢之文章賜光輝於臣下英聲茂實演奥窮微昭宣造化之情黼黻羲文之制顧乃上㧞彦範次述子儀此皆功賛中興道化來裔纂循前緒陛下寔紹於耿光瞻慕勲庸微臣固無其影響此皆二字疑陛下特標文字曲降恩私激揚雅頌之風儆厲人臣之節自家刑國垂範作程恩誠借於微臣道將周于天下足使懐忠服義争死節以駿奔反側危疑望皇風而懲革史籍之所未有自此而書人臣之所未聞自臣而始雖年踰知命筋力尚全國家西有未賔之戎東有乘邊之㓂毎煩宸慮尚集王師顧此生涯未知死所庶捐微𤨏之質少益覆載之仁限以戎鎮不獲奔赴闕庭輕陳懇悃無任荷載惶灼之極代陳司徒謝勑賜麟德殿宴百僚詩序表王維臣某言支使某官奏事廻伏奉某月日手詔賜臣以皇太子所冩聖製麟德殿宴百僚詩序日月揚光風雲動色捧受之次震駭失常臣某中謝臣伏以經天緯地者聖人之文多才多藝者元良之美逖聽前脩旋觀徃冊考論盛事罕見全能故漢后詠歌有乖雅頌之㫖周儲聦哲不聞翰墨之妙伏惟陛下道洽帝堯文趨繋表體隂陽之變化與雲漢而昭囘皇太子德邁生知學資聖訓掩鍾張之筆札並虬鸞以飛動臣特承湛恩荷此殊錫集榮光於外府啓重寳於私庭班氏賜書既甚懸隔馬卿視草曽未比擬又臣所獻奉和詩事等睿疑作𢋫歌情同率舞濫吹之音謬塵於天聽踰涯之賞忽䧏於絲言豈臣微力所冝負戴非臣捐軀所能効益無任榮荷感愓之至謝賜中和節御製詩序表臣某言中使至伏奉手詔并賜臣皇太子所冩御製中和節詩序聖澤曲臨天文下降日月爛其光彩風雲蔚其氣色捧讀驚駭魂守失常臣某中謝臣伏以天地有常萬物必由其化隂陽不測聖人能為之節然後垂文章以皷天下之動張宴樂以道天下之和三五以還盛美斯在伏惟陛下以道御物以文化成立言盡經緯之本秉筆節陽和之中雖天㫖𤣥深理絶於彌度而睿詞煥洽義歸於德邵文輝三象諧同六律邁殷湯之晨露掩虞舜之薰風皇太子以聦哲之姿篆𨽻之妙鸞鳯之勢鍾王莫儔臣備守外藩獲承殊奬荷此非常之賜實惟希代之寳窺觀則河漢無極負戴則山岳為輕沉族捐軀何階上答不勝欣感之誠謹獻應制詩一首章句疎蕪義理鄙淺君唱臣和歡逢宴鎬之時濫吹徒歌輙効鈞天之末塵瀆旒扆伏深戰懼無任祗愓之至為李大夫謝御製詩表常衮臣某言伏奉恩㫖賜臣詩一篇并酒脯文廻睿思忽懸日月之光膳自御厨更覩雲天之樂感恩抃躍受賜兢惶施已重於丘山功未申於毫髮賞則過望臣何以堪無任感戴恱豫之至謹表陳謝以聞臣某誠歡誠喜頓首頓首謹言文苑英華巻五百九十二
