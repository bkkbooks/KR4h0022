body:
  text: 文苑英華巻三百三十九宋李昉等編圖畵畵山水七首畵馬五首畵牛一首畵竹一首畵桃花一首丹青引一首山水粉圖陳子昂山集作仙非圖之白雲兮若巫山之髙丘粉羣翠之鴻溶又似蓬瀛海水之周流信夫人之妙道愛雲山以水幽集作幽求新畵山水障歌奉先尉劉單宅作杜甫堂上一作中不合生楓樹恠底江山起煙霧聞君掃却赤縣圖乗興遣畵滄洲趣畵師亦無數好手不可遇對此融心神知君重毫素豈但祈岳與鄭䖍筆跡逺過楊契丹得非𤣥圃坼集作裂無乃瀟湘翻悄然坐我天姥下耳邉巳似聞清猿反思前夜風雨急乃是蒲城鬼神入元氣淋漓障猶濕真宰上訴天應泣野亭春還雜花逺漁翁暝踏孤舟立滄浪之水深且闊欹峯側島集作岸秋毫末不見湘妃鼓瑟時至今斑竹臨江活劉侯天機精愛畵入骨髓自有兩兒郎揮灑亦莫比大兒聰明到能添老樹巔崖裏小兒心孔開貎音邈得山僧及童子若耶溪雲門寺吾獨何為在泥滓青鞋布襪從此始戲題王宰畵山水圖歌前人十日畵一水五日畵一石能事不受相促逼一作廹王宰始肯留真跡壯哉崑崙方壺一作丈圖挂君髙堂之素壁巴陵洞庭日本東赤岸水與銀河通中有雲氣隨飛龍舟人漁子入浦溆山水盡亞集作帶洪濤風尤工逺勢古莫比咫尺應須論集作行萬里焉得并州快剪刀剪取吳松半江水當塗趙炎少府粉圖山水歌李白峨嵋西出髙極天羅浮直與南溟連名工逸思輝彩筆馳集作驅山走海置眼前滿堂空翠如何一作可掃赤城日氣蒼梧煙洞庭瀟湘意渺綿三江七澤情洄沿驚濤洶湧向何處孤舟一去迷歸年征帆不動亦不旋飄如隨風落天邉心摇目斷興難盡又作窮幾時可到三山巔西風峥嶸噴流泉横石蹙水波潺湲東岸合㳫開集作蔽輕霧深林雜樹空芉眠集作綿此中㝠昧失晝夜隠几寂聴無鳴蟬長松之下列羽客對坐不語南昌仙南昌仙人趙夫子妙年歴落青雲士訟庭無事羅衆賔杳然如在丹霄裏集作青裏五色粉圖安足珍真山可以全吾身若待功成拂衣去武陵桃花笑殺人同族弟金城尉叔卿燭照山水壁畵歌前人髙堂粉壁圖蓬瀛燭前一見滄洲情集作清洪波洶湧一作青山峥嶸皎若丹丘隔海望赤城光中乍言集作喜嵐氣滅謂逄山隂晴後雪廻溪碧流寂無喧又如秦人月下窺花源了然不覺清心魂秪將疊嶂鳴秋猿與君對此心一作歡未歇放歌閒一作行吟達明發却顧海客揚雲帆便欲因之向溟渤范山人畵山水歌顧况山峥嶸水泓澄漫漫汗汗一筆耕一草一木棲一作凄神明忽如空中有物物中有聲復如逺道望鄉客夣繞山川身不行嵇山道芬上人畵山水歌前人鏡中一作湖真僧白道芬不服朱審李將軍渌疑作漫汗平鋪洞庭水筆頭㸃出蒼梧雲且㸔八月十五夜月下㸔山盡如畵一作畫分韋諷録事宅觀曹將軍畵馬圖歌集作引杜甫國初巳來畵鞍馬神妙獨數江都王將軍得名三十載人間不作入見真乗黄曽貎先帝照夜白龍池十日飛霹靂内府殷紅瑪瑙盤作盌媫妤傳詔才人索盌作盤賜將軍拜舞歸輕紈細綺相追隨集作飛貴戚權門得筆跡始覺屏障生光輝昔日太宗拳毛騧近時郭家師子花今之新集作畫圖有二馬復令識者乆嘆嗟此皆騎戰一敵萬縞素漠漠開風沙其餘七匹亦殊絶迥若寒空雜霞集作動煙雪霜蹄蹴踏長楸間馬官厮養森成列可憐九馬争神駿作俊顧視清髙氣深穏借問苦心愛者誰後有韋諷前支遁憶昔廵幸新豐宫翠華拂天來向東騰驤一作躍磊落三萬匹皆與此圖筋骨同自從獻寳朝河宗無復射蛟江水中君不見金栗堆邉集作前松栢裏龍媒去盡鳥呼風天育驃圖集作騎歌杜甫吾聞天子之馬走千里今之畵圖無乃是是何意態雄且傑駿尾蕭梢朔風起毛為緑驃集作縹兩耳黄眼有紫熖䨇瞳方矯然集作矯矯龍性含集作合變化卓立天骨森開張伊昔太僕張景順考牧攻集作監牧神駒閱清峻遂令大奴字天育别養驥子憐神駿當年四十萬匹馬張公歎其材盡下故獨寫真傳世人見之座右乆更新年多物化空形影嗚呼健步無由騁如今豈無騕褭與驊騮時無王良伯樂死即休梁司馬畵馬歌顧况畵精神畵筋骨一團施風瞥滅沒仰秣如上賀蘭山低頭欲飲長城窟此馬昂然獨出羣阿爺是龍飛入雲黄沙枯磧無寸草一日行過千里道展處把筆欲描時司馬一騧賽傾倒八駿圖白居易穆王八駿天馬駒後人愛之寫為圖背如龍兮頸如鳥作象骨聳竦筋髙脂肉少集作壯日行萬里速如飛集作疾如飛穆王獨乗何所之四荒八極踏欲遍三十二蹄無歇時屬車軸折趂不及黄屋草生棄若遺瑶池西追作赴王母宴七廟經年不親薦壁臺南與盛姬遊明堂不復朝諸侯白雪雲黄竹歌聲動一人荒樂萬人愁周從后稷至文武積徳累功世勤苦豈知纔及五作四代孫心輕王業如灰土由來尤物不在大能蕩君心即為害文帝却之不肯乗千里馬去漢道興穆王得之不為戒千里馬集作八駿駒來周室壊至今此物尚集作猶稱珍不知房星之精下為怪八駿圖君莫愛蘇君㕔觀韓幹馬障歌顧雲杜甫歌詩吟不足可憐曹霸丹青曲直言弟子韓幹馬一作畵畵馬無骨但有肉今日披圖見筆跡一作蹤始知甫也真凡目秦王學士居武功六印名家聲價雄乃孫屈跡寧百里好竒學古有祖風竹㕔斜日奕碁散延我直入書齋中屹然六幅古屏上歘見胡人牽入天廐之神龍麟鬐鳯臆真相似秋竹慘慘披兩耳輕勻杏蘂糝皮毛細撚銀絲挿鬃尾思量動步應千里誰見初離渥洼水眼前只欠燕雪飛蹄下如聞朔風起朱崖謫掾從亡殁更有何人鑒竒物當時若遇燕昭王肯把千金買枯骨杜秀才畵立走水牛歌顧况崑崙兒騎白象時時鏁著師子項奚奴跨馬不撘鞍立走水牛驚漢官江村小兒好誇騁脚踏牛頭上牛領淺草平田攃過時大蟲著一作㸔鈍幾落井杜生知我戀滄洲畵作一障張床頭八十老婆拍手笑妬他織女嫁牽牛畵竹歌并序白居易協律郎蕭悅善畵竹舉時無倫蕭亦甚自秘重有終嵗求其一竿一枝而不得者予忝與好事忽冩一十五竿惠然見投予厚其意髙其藝無以答貺作歌以答集作報之凡一百八十六言歌曰二字集作云字舉時文粹作舉世植物之中竹難寫古今雖畵無似者蕭郎手下集作下手一作下筆獨逼真丹青已集作以來唯一人人畵竹身肥擁腫蕭畵莖瘦節節竦人畵竹梢死羸垂蕭畵枝活葉葉動不根而生從意生不笋而成由筆成野塘水邉碕岸側森森兩叢十五莖嬋姢不失筠粉態蕭颯畵得風煙情舉頭忽㸔不似畵低耳静聴疑有聲西叢七莖勁而健省向天竺寺前一作邉石上見東叢八莖踈且寒憶曽湘妃廟裏雨中㸔幽姿逺思少人别與君相顧空長嘆蕭郎蕭郎老可惜手戰眼昏頭雪色自言便是絶筆時從今此竹尤難得觀脩處士畵桃花圖歌裴諧一從天寳王維死于今始遇脩夫子能向鮫綃四幅中丹青暗與春争工勾芒若見應羞殺暈緑匀紅漸分别堪憐彩筆似東風一朶一枝隨手發燕支乍濕如含露引得嬌鸎癡不去多少遊蜂盡日飛㸔遍花心求入處工夫妙麗實絶竒似對韶光好時節偏宜留著待深冬鋪向樓前殛霜雪丹青引贈曹將軍霸杜甫將軍魏武之子孫於今為庶為清門英雄割據皆集作雖已矣文精彩風流猶尚存集作今尚存學書初學衞夫人但恨無過王右軍丹青不知老將至富貴於我如浮雲開元之年常引見承恩數上南薰殿凌煙功臣少顔色將軍下筆開生面良相頭上進賢冠猛將腰間大羽箭褒公鄂公毛髮動英姿颯颯猶集作颯爽來酣戰先帝天馬玉花驄畵工如山貎不同是日牽來赤墀下迥立閶闔生長風詔謂將軍拂絹素意匠慘淡經營中斯須九重真龍出一洗萬古凡馬空玉花却在御榻上榻上庭前屹相向至尊含笑催賜金圉人大僕皆惆悵弟子韓幹早入室亦能畵馬窮殊狀集作相幹唯畵肉不畵骨忍使驊騮氣凋䘮將軍畵善蓋有神必逄佳士亦冩真即今漂泊干戈際屢貎尋常行路人途窮返遭俗眼白世上未有如公貧一作他富至今吾徒貧但㸔古來盛名下終日坎壈纒其身文苑英華巻三百三十九
