body:
  text: 文苑英華卷九百五十一宋李昉等編職官十三滄州刺史鄭孝本墓志一首華州刺史李懷讓墓志一首眀州刺史李長墓志一首處州刺史李公墓志一首饒州刺史趙郡李府君端墓志一首賀州刺史武府君充墓志一首滄州刺史鄭公墓志銘孫逖有唐之德讓君子曰原武男鄭公諱孝本字某滎陽開封人也父曰荊州松滋令乾瓉松滋之父曰大志祕書祕書之父曰華州刺史襄城公諱某世有令德時稱華胄藩衍六姻阜昌百祿非夫緇衣之慶羔裘之仁平惠之勳厲宣之親則孰能光宗保族若斯之盛也公秉彛中和服義先訓孝惟不匱友則因心敦詩以言習禮以立用此道也行於國施於政善氣潛暢清風髙翔何嚮不可所居則化矣始以眀經髙第解褐潤州參軍厥初奮庸克勤小物吏曹以文敏於從事也故與之縣授泗州虹縣令魯人稱之璽闕降焉衛人賴之碑頌立焉先大夫張文瓘人之望也典掌台衡督課郡國以公謀疑作課為第一且曰雖居下邑聲一無此字聞上纍疑繇天下長吏樂以為式若占疑於龜筮如觀法於象魏矣特敕授蒲州虞鄉縣令理如故迹帝是用臧乃詔公為隴右道廉察使堪其事也又為本道使杜求仁特表薦以賢舉也制授朝散大夫雍州鄠縣令已而永淳大飢關輔尤甚能布其德而恤災人不離散下無捐瘠乃耕乃畝嗣嵗以登時皇儲監國多公善政特賜考詞褒異睿文光被列郡榮之改懷州司馬歷夏州長史以母老乞罷官優詔換瀛州長史東表不寧也命公為平州刺史兼充使知營府度支營田刺郡實邊能成二事中土之作也命公為洛陽令又轉洛州司馬理煩佐劇為則四方尋以丁內難去職欒欒骨立人倫傷慟既練有制起復又除洛陽司馬公泣血固讓不獲已強拜禮從恩奪而瘠由哀甚忝君之命有以知奉上之心執親之喪有以見過人之戚臣子之道仁逺乎哉尋除具州刺史轉安西都護以疾不堪詣部改授滄州刺史公自重拜洛師再臨河朔曽是遘閔常多移病隱几而敬讓興行閉閣而姦邪銷釋德敷于下具丘多請禱之人功格于上滄海有卧理之詔老氏云鎮之以無名之朴其在是矣聖厯元年九月以致仕終於東郡之敦行里春秋六十有七凡束帶在位三十餘祀理京師訓郊甸惠華夏清朔漠九變復貫百度惟貞其養人也寬而栗其行已也儉而一撫孤無隔於外姻博施不崇於內實蓋德行之具美而政事之首出壺遂深中未登漢皇之相國僑遺愛遽感鄭人之泣公娶於王氏夫人曰琅邪君公正二字疑員外令思之孫司刑大夫允夀之女稟訓齊大作嬪韓樂淑慎威儀循守典禮雖貴膺展狄而躬事組紃有雞鳴之賢有螽斯之盛自嬰晝哭遂契眀因忘心味禪悟理根善總斯純懿貽厥髙門宜錫難老何孤淨德以開元十八年五月終於東都懷仁里享年八十有四明年正月某日合葬於某所從先塋也嗣子尚舍奉御暉之兵部郎中倩之洛陽令侃之皆保世之主也克荷三徙之訓俱登五命之服養極其樂喪盡乎哀閔騫之人無間言石建之門傳孝道復見兹矣詩曰釐爾女士從以孫子原武有焉銘之下泉表是真宅銘曰闕華州刺史李公墓志銘常衮天垂將星著在三象國有武柄寧于四方授鉞其難止戈斯重定封豕長蛇之孽致攀龍附鳯之功朱戟在門黃金橫帶命掌師旅化成公侯時有汧國公其人也公諱懷讓字某蓋漢將軍陵之後自五將失道家留隴山千年于兹因引貴族戎帳之下華風在焉奕葉相乘久雄朔北本枝必復終茂隴西公則成紀人也曽祖廣壯武將軍右武衛將軍祖忠雲麾將軍左金吾大將軍贈銀青光祿大夫太僕卿父俱定逺將軍右驍衛將軍贈銀青光祿大夫秦府都督積其勳望休有令名上將虎符延于三代列卿犀節一作象榮及九原後嗣其昌吾門益大公生於陜右少以勇聞重懸弧四方之事有長劔三軍之志去病籌略不學兵書賈達兒童即陳部伍人許封侯之相時歸拜將之望安危成已任取富貴於掌上一日千里豈徒然哉以良家子選羽林郎騎射絶倫材官人侍射熊舊館戲馬前臺百步應弦兩驂如舞便繁左右趨奉階闥姹疑作秺侯嘉漢市屬皇室艱難王師巡狩侍執羈靮扈陪鸞輿節時見危捧六龍於岐下口陳天命從五馬於回中披荆榛而執殳冒風雨而持蓋中原行在實掌禁戎領護鈎陳典司環列出入警蹕肅清扞掫羽衛甚嚴軍容益振夜合搶壘曉開旌門擁佳氣於月營橫大風於天仗始自靈武至于扶風險阻屯蒙未嘗離上削平休泰終契興王從收京師首列勳舊於是出鎮左輔建牙近關扼天下之樞走山東之盜三秦巨防萬里長城闢屯田於斥鹵強士馬於撫弊仁以理軍不聞半菽知能料敵豈在前茅兼牧人御衆之才得憂國奉公之禮竹符兼剖鈴閣長間百城歌之政有經矣公始自一命驟更秩舉其大者不可備書歷臨彰府折衝射生供奉後以佐命功特授鎮國大將軍左羽林軍大將軍知左神武軍事加特進兼鴻臚卿左神武軍大將軍封汧國公又加開府儀同三司克潼關鎮國軍使同華等州節度使華州刺史使又兼御史丞試殿中丞尋拜御史大夫檢校工部尚書並一作并兼舊務雲從龍風從虎以雄毅之略遇聖眀之主事與時並名與功偕位極文武權分中外勳書甲令象列雲臺大丈夫特達有如此者不知者夀謂之何哉廣德元年九月三日薨于華州軍府春秋若干天子聞之輟朝興嘆特優命數寵贈司空詔發輤車即日迎柩列辟卿士咸會喪焉贈賻襚含有加故事京兆尹監護內謁者致以詞即以其年十月四日陪葬建陵旌勳臣也將軍鹵簿司空法駕鉦車介士前後鼓吹觀者稱榮懦夫增氣百官臨弔畢集孔光之門五校送喪直至鄧宏之墓君臣之義厚莫重焉有子四人前光祿少卿林光等孝因天性哀過禮經克紹臧孫之後咸稱文氏之子史臣奉詔謹而志之銘曰有唐上將佐命通侯降神太白稟氣清秋弓落飛雁劔衝斗牛少年戴鶡上陌鳴騶繡衣朱襮越戟吳鈎入隨夜警出從春搜運屬艱難謀參締構善行無迹大勇不鬭三輔功名五原恩舊家榮鼎食廟列金奏翠羽在庭紫騮填廄寵私之盛誰出其右命所不與人之云亡萬乘震悼三軍悲涼謁者歸賵羣公會喪特陪玄闕永祔黃腸禮優同等恩茂舊章碑題蟲篆用紀龍驤眀州刺史李公墓志銘梁肅大厯七年冬十月甲子前眀州刺史李公寢疾終于晉陵之無錫私館嗚呼公諱長字某隴西狄道人其先自涼武昭王玄盛七葉至皇朝工部侍郎岐州刺史義琛生吏部郎中綰綰生蔡州長史贈宋州刺史某某生公公生而聰眀治左氏春秋舉孝廉初任貝州參軍三遷至國子主簿御史中丞盧奕司察甸服辟為從事天寶十五年集作載大盜覆東周奕死節公遁脫而南會永王璘都督江左諸軍雅知公材將署于幕以畫公告不能無何璘果敗君子以公為知幾時肅宗在岐集有政字非朝廷擢良吏以慰郡縣不限官次多即授印綬丞相韋見素表公可用牧民詔攝安州刺史考績既成真拜均州治中遷鄧州康允之叛南土大擾公會諸將以王命討不臣尺兵不喪凶黨大壞宛節之間民到于今受其賜上方勤恤下民重二千石之任不暇登公於朝由是歷隨曹婺三州三州輯寧徴傳韓王王德既宣出為梓州又换眀州時越初靜瘡痍未復公務穡勸分人安懷之及其去也如失乳育嗚呼公凡歷官一十有四其剖符分憂者八享年七十其為人也剛毅寬眀惠和而清所至之邦先以禮後以刑使人遷善逺罪而不知其止君子曰古之良吏也初公無胤子命兄子某為後八年十月某奉公之喪及葬於河南萬安山之陽夫人博陵崔氏秦州掾孝之女既笄而歸于我以宣慈恭順享年五十先公而殁公為眀州之二年以夫人之喪反葬萬安至是祔焉禮也夫惟天地之道可久若陵谷則無不遷也遂銘曰於惟公先實曰庭堅作舜五臣為唐八元周道不行伯陽西遷晉失其政涼興勃焉武昭之孫宋州之子如圭如璧如松如梓集作杞爰在下位令聞亹亹帝曰休哉命牧南鄙在鄧有亂惟我行師寇戎既夷剖符于隨曹無罷人婺有去思或傳或藩受命咸宜爰自東南薄言旋歸謂天聰眀胡不愸遺節彼萬安松柏丸丸猗歟齊薑同穴其間橫峙惟嵩旁流洛川銘勒金石永昭億年處州刺史李公墓志銘前人公姓李氏諱某隴西城紀人也字曰公受其先在晉霸西涼在魏侯姑臧長發有光乃盛集無此字熾而昌五代集作世生秦王府户曹贈太子舍人某以恭德垂裕實公之大父水部郎中眉州刺史某以宏材廣化實公之烈考禮部尚書襄陽席豫以大名諡文實公之外祖公生而聰邁十六以黃老學一舉登第十八典校𢎞文二十餘以金吾掾假法冠為孟侯皥湖南從事給事中賀若察宣慰南方請公為寮佐其後宰東陽宣城二縣辟宣歙浙東二府府主崔侯昭咨以小大之政由監察轉殿中侍御史建中初朝廷釐飭百度髙選尚書諸曹即拜公金部員外郎選吏部張鎬集作非節制大梁請公為介授檢校吏部郎中兼侍御史使輟遂退耕瀍洛之間起家除陜州刺史換處州刺史纍升至朝散集作議大夫爵隴西縣男既授代家于鄱陽享年四十有八以某年月日遘疾捐館夫人武城縣君清河崔氏生一女未齓公母弟曰丹有季方之賢茹哀問卜以某年月日奉輤車歸葬于洛陽某鄉原禮也嗚呼當漢道之盛賈誼董生桓談馮衍皆以髙才巨名或位淪下國或廢落田里夫豈不遭眀時不識眀主哉蓋運有通躓事有離合不可以一經集無此字理言也惟公有孝友仁謙集作謀之德文學政事之美卓立不羈之才竟委遲半塗僻典荒服且乏鄧攸之嗣而終管輅之年時歟命歟可為慟哭者已始公之孤喪過乎哀丁內艱也東陽之人飲集作斂公惠憫公荼毒行泣賵集作助祭既除而止奉歸宗之姑惟敬與愛原闕饒州刺史趙郡李府君墓志銘顧况粵考春秋敘事之實趙郡東祖源流甚長衛州刺史嘉祚曽孫榮州刺史璿孫贈尚書即銛子諱端字公表官由臺省興元少尹少府監出泉饒二州刺史參佐不書略也貞元八年秋七月終于郡署年六十一眀年八月庚申窆於鳯山之東原嗚呼神眀無質君子能通其意以為教本仲尼闡教微言七十子揚大義去聖雖逺其七十子之季孟乎至於饒禮將驅俗經以道俗饒之人始有講睦之聲上員不弔纎疑作殱我渠哲昔桐鄉嗇夫猶葬桐鄉桐鄉之人皆祠之今饒之葬如此嗚呼列章載云精神天之久骸骨地之久此言骸骨滅其精神不滅者何從心上變起而生展促常讀衆聖之書上於釋典如川及海之無翻流蘧蘆疑作爐久處奮迅泥滓宜諸精爽黜陟幽眀亦由是也夫人贊皇郡清河崔氏從其子拭盡力哀敬記石陵谷永質天壤銘曰蘭桂有叢以薰其風邯鄲舊氏厥祖惟東吁嗟府君其命不融精神本天不在乎地舊國飛魂新塋掩隧逝不可止哀何不既賀州刺史武府君墓志銘符載武氏之得姓逺矣府君之世家貴矣左右僕射司徒太尉尚書令楚僖王士讓之玄孫九江王𢎞度之曽孫納言司徒同中書門下平章事定王攸暨之孫尚書膳部員外郎徐州刺史勝之子外祖母為玄宗皇帝之姑皇妣為肅宗之姨豫章之根大天津之流廣穠華靈潤鍾于府君焉府君諱充字虛受墻岸魁峙操履堅峻藴之文武辨有口才一作藴文武盛材辨有口喜立名迹以排難拯時為事業始以髙廕補兩館生解褐授洪州南昌尉操利刃也次授潤州江寧尉馳驥足也自廣州司士掾轉陳州録事參軍甲子嵗蔡賊希烈叛猛用凶器逆師至于襄城遣禆將鄭貴以精卒一萬來逼我城焉刺史薛寶任公如臂指憑公如金湯顧盼成丘陵呼嘯為矛戟寇用懾息不得攻取井邑完固我之力焉俄而大梁陷兹地孤險實慮吞奪遂馳謁劉宣武不免介胄而説之换兵鬭騎動如響答保安究竟我功一作公綽焉劉司徒嘉其威毅咨其䇿畫延致幕府以為賔榮是時希烈赫然東平勢雄或相寵亂以膏濟火公復驅皇華之車投之以心膂論之以逆順張之以禍福示之以機宜祕謀飛辨得走丸反掌之勢由是淄青致寧陵之師解陳州之圍合匡君之力摧凶邪之氣破堅陳擒宿將平姦隙結歡好誅逆將在兹一舉得不謂三寸之舌賢於百萬之師乎司徒表其勳績亟聞乎闕下纍遷尚書虞部員外郎報功也無幾何丞相府除退歸鄭郊五六年間居易食貧雖四方禮辟日至其户不苟其所從也適值有土一作士者懟其不答或用隂訕遂有臨賀之拜焉至郡教民以慈愛易俗以禮讓達其志意通其嗜欲曽未期嵗大用治理嗚呼南方氣炎春秋稍髙冀遷元土養護餘齡居任凡六霜竟困於足痺年六十九以貞元十八年夏五月丙戍卒於官舍遺孤扶護以十九年秋七月戊子葬於滎澤之廣武原禮也嗚呼才與命二者難并今古其猶病諸上帝實司之為之奈何以公之行業誠信宏才敏識宜躋上位利及庶物而才止尚書郎二千石牢落逺地竟至於殂纓紱之士愁憤慨息可勝道哉夫人隴西李氏朝散大夫祕書丞和光之女母儀隂教輝華士族先公數嵗而殁至是而合祔焉嗣子曰異曰典溫厚謹良奉承家風茹荼毁瘠動中于禮從子沇二其窀穸之事以余為舅之友也見托為銘曰悠哉悠哉位不勝才一郡𥚹小六年徘徊逸翮徒張髙風不來炎徼隕落縉紳悲哀舊檟新墳滎澤之隈冥冥鸞鳯同棲夜臺文苑英華卷九百五十一
