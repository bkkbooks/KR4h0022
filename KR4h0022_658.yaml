body:
  text: 文苑英華巻六百五十九宋李昉等編投知二上齊州張司馬啟一首上㢘察使啟一首上瑕丘韋明府啟一首上梁明府啟一首上郭賛府啟一首與湖南李中丞啟一首上大理崔大卿啟一首上齊州張司馬啟駱賔王某啟昔者薛邑聞歌揖馮諼於彈鋏夷門停集作命駕顧侯嬴於抱闗何則志合風雲戴笠均乎乗馬情諧道術忘筌貴乎得魚是以挹集作揖蘭言於斷金効集作交蓬心於匪石庶清音動集作黙聽賞流水於牙絃妙思通神叶成風於郢匠伏惟司馬公䟽源白水浸地軸以輪波纂慶黄軒感星精而誕命綴珠華於七曜聨玉葉於五雲至夫神石呈一作摛祥靈鈎集作鈞非表貺千年馭鶴振仙駕集作氣於帝鄉七葉珥貂襲榮光於戚里固以紛綸國牒昭晰家聲洎乎鹿走周原相集作輔秦圖以興覇蛇分沛澤翼漢運以基皇常山王之玉潤金聲博望侯之蘭薰桂馥羽儀百代掩梁竇以霞褰鍾鼎一時罩袁楊而岳立固集作故得重規逺鏡湛月路以流清茂趾集作祉遐鋪架雲門而擢秀公飛英鳳穴藻五色以凝華顯曜驪泉集作穎耀龍泉含九重而流集作毓潤風情踈朗霜明月净集作湛之姿氣骨端嚴雪白氷清之槩若乃性符神授道擅生知挫三端於情峯朝九流於學海愽聞強記辨晉國之黄熊將聖多能識吳門之白馬言泉漱潤驚瀑布以飛瀾文江澹清含濯錦而翻浪欝槐市而集作以增茂穆蘭室以流芳於是祥集作翔鱣應符觀光上國飛龍成卦利見大人摶羊角以垂天展驥足而騰景翼化二集作二藩邸挹敬祖之清亷光賛外臺陳君囬之亮直推公平而折獄磔䑕謝其嚴明擁端慤而行仁化地慙其智勇加以清規日舉湛虚照於氷壺𤣥鑒露凝朗機心於水鏡謙光自牧恭已愛人片善必甄揖虞翻於東箭一言可紀許顧榮於南金但某疾抱支離材均擁腫進不能握蘭分竹綰銀黄於雲臺退不能絶粒茹芝煉金丹於地肺而出沒風塵之内漂淪名利之間知集作逰無毛薛之交仕乏金張之援塊然獨居集作處者一紀于集作於茲矣然而日夜相代想集作恐溝壑之非遥貧集作窮病交侵思薜蘿之可託尚欲乗幽控寂集作常願處幽樓寂追夏黄於商山樂道栖真從魯連於滄海豈圖語黙易爽心跡難并集作逃陟集作從橋之恨愈集作逾深攀桂之情徒結是用絶心集作深乾沒躭閱丘墳謁子將於南荆訪康成於北海西逰梁益効集作仰司馬王楊之風東入臨淄慕淳于管晏之智瞻言前古徒欲思齊俯惟當今空勞懷刺不意雲浮礎潤霜落鍾鳴揖郭泰於虚舟有道斯世賞鬷明於撤爼盛徳猶存雖雅調清歌誠寡和於郢路而庸音濫吹竊混奏於齊竽輕課撮囊揄揚盛徳庶幾金波離畢零陵之石自飛瑶光建寅蕭丘之火暫爇學慙麟角徳輕集作類鴻毛愧汗如漿憂心若厲謹啟上亷察使啟賔王啟每讀書見古人負米之情捧檄之操未嘗不廢書輟巻流涕傷心何則情蓄於中事符則感形潜於内迹應斯通而悦帝力以栖魂情欣養素仰皇華而息集作暢慮敢用披丹伏惟某公源控玉輪激神濤而㴠地基䟽金闕架飛㞯以韜雲洎乎鹿駭周躔集作鹿走周原覇燕圖於即墨蛇分沛澤封漢爵於華城福禄攸鍾公侯必復炳靈丹穴習集作襲吉黄裳若乃峯秀學山列三墳而仰止瀾清筆海委九流以朝宗登小魯之山辨練光於曵集作亂馬臨大吳之國識寶氣於連牛垂秋實於翰林絢春花於文苑清規湛秀照月旦於雕談素論凝𤣥開夜光於妙辯既而業成麟角引茅茹而彈冠道映鵷池絢桃林集作花而曵綬揆留皇鑒忠簡帝心奉職春宫標離光於青殿代工天府明神集作名耀於紫宸故得龍綍垂光戢兩星而開照鶴盖浮影翼五雲以連陰賔王大塊流形小人餘慶幸河神入昴映白榆而集作以流祥江使負圖上集作泛青蓮而薦兆薰風廣扇聖日多集作揚暉進不能髙議靈集作雲臺談社禝之上務退不能銷形地肺揖箕潁之餘芳而出沒風塵漂集作湮淪名利十年無禄集作棣萬里惟桑既而日逺長安處蓬門而西笑雲飄吳㑹追松江集作遥松浦以南浮冀塵跡於丘中絶漢機於俗網獲承歡於膝下馭潘輿於家園不悟地絡遐張維白駒於空谷天羅廽布弋黄鶴於髙雲顧已以駑鈍合集作並從媒衒力農賤事未免東臯之勞反哺私情遽切南陔之詠少希顧復敢集作輙布懇誠雖噬指集作臍思歸空軫倚閭之望而齧臂求仕非圖髙盖之榮明公資孝履忠恕已及物惟幾成務論道經邦庶得顧兎離箕集作星動清風於舜海從龍潤礎霈甘雨於堯雲則白羽書生自銘恩於食稻黄衣童子將賽徳於飡花拜首廽惶傾心䖍霡謹啟上瑕丘韋明府啟賔王啟側聞觸籠戢翮負垂天而跼形伏櫪覊蹄望絶塵而跪足故以逰蓮絏網集作遇絏悟宋玉疑於嬰羅在藻迷波顧䝉莊於煦轍是以臨淄遣婦寄束緼於齊隣邯鄲下客効處囊於趙相伏惟明府公締跡集作址瓊峯靈丘集作岳蔽丹霄之景圖基珠浦集作溜神𣲖集作流沃清漢之波玉札飛文綜宏詞於楚傅集作博金籝緝藝味𤣥集作雅道於扶陽孕蘭畹而生姿灃㶚踵髙門之慶産銅谿而冩鍔荆藍資象緯集作徳之禎早集作㓜辨羝羊演飛龍之秘䇿夙談孔雀對家禽之麗詞赤野浮炫價之光珠胎榮色丹穴陪来儀之迅鳳姿含影靈襟轉璧詢逸照於蘭池神府驚頻韻清音於桂浦談叢散馥韜餘芳集作韞餘氣於九蘭筆海飛濤駭洪波於八水於是綰銅麟甸製錦鳬郊化浹下車恩孚攬轡徳聲洽詠仁風飄十地之雄道化徧謡惠露洒三天之渥狎中牟之馴雉豈懼驍媒驚重泉之瑞鸞非闗照舞雖則塵飛范甑垂銀有結綬之華而乃調理宻絃烹雞屈函牛之量加以招携白屋勸誘青衿延張必於䳱輪引王終於倒屣遂使漱流逸客望驥足以雲蒸栖泌遺材集作才欵龍門而霧會賔王緯蕭末品拾艾幽人寓跡雩壇挹危直之秘說托根磬渚戢戰勝之良談集作圖幸以奉訓趨庭采集作束情田於理窟從師負笈芸性織於書圃集作林至於九流百氏頗綜緝於三字集作忽其異端萬巻五車亦研精集作乎其奥㫖將欲優㳺三樂負杖以終年栖遲一丘鳴絃而卒嵗以糠𬞞集作糟糠不贍甘㫖之養屢空簞笥無餘集作資朝夕之歡寜展是以祈南陽之捧檄擬毛義之清塵思魯國之執鞭蹈孔丘之餘志屬以商集作蛬秋應節素集作鴈序戒時飊金將露玉俱清柳黛與荷緗漸歇寔含毫振藻之日集作際摛經析理之期不揆雕朽之材竊冀遷喬之路輙祈泛愛輕用自媒倘荆璞無致於見疑集作無見致疑夜光不逢於集無於字按劍則沉骸九死終望衘珠殞首三泉猶希結草載塵清覽一作鑒矚影外驚集作載塵清矚跼影外慙冒黷威嚴循心内駭謹啟上梁明府啟賔王啟竊聞薛邑聞琴揖馮諼於彈鋏夷門佇駕顧侯羸於抱闗何則志合風雲載笠均乎乘馬情諧道術忘筌貴乎得魚是用挹蘭言於斷金効蓬心於匪石庶清音動聽賞流水於牙絃妙思通神叶薰風於郢匠以上與上張司馬啟同伏惟某公儀天峙構層基控射牛之峯浸地開源驚濤疏釣鼇之浦至夫封侯廟食掩金張以騫翥三主七公罩袁楊而岳立故得重規逺鏡湛月露以流清茂趾霞鋪駕雲門而擢秀若乃愽聞強記辨晉國之黄熊將聖多能識吳門之白馬言泉漱廻驚瀑布以飛瀾文江澹虚㴠濯錦而翻浪自袁揚至翻浪七十七字與上張司馬啟同於是功超食跖位典烹鮮水鏡澄瀾照孤鸞之舞影鳴琴動操叶馴翬之雅音既而盛徳有隣佐皇華而省俗居羣不器扈輶軒而觀風某疾抱支離材均擁腫自弱齡植操本謝聲名中年誓心不祈聞逹始則執鞭為仕帝里希干禄之榮次則捧檄入官私庭無代耕之樂然而忠不聞於十世學無專於一經退異善交進殊巧宦摶羊角而遐翥浩矣無津附驥尾以上馳邈焉難託實欲垂竿投餌晦名跡於渭濵抱甕灌園絶機心於漢渚幸屬乾坤貞觀烏兎光華嵩山動萬嵗之聲徳水應千年之色雖無為光宅欣預比屋之封而有道賤貧耻作歸田之賦從有弱齡至之賦一百五十三字與前巻上太常伯啟同明公顧盼成餙咳唾為恩漏微潤於江波流末光於隣燭幽禽栖木侣丹山於帝梧鳴石浮川應黄鍾於仙管敢布心也詎能望焉謹啟集載此篇題目同而詞有詳畧異同今録于後某啟昔者聞歌薛邑賞彈鋏於馮諼佇駕夷門揖抱闗於侯子豈惟成風之斵妙思通神流水之絃清音入聽况夬志合者蓬心可采情諧者蘭味寜忘伏惟某公儀天峙構層基控射牛之峯浸地開源驚濤䟽釣鼇之浦至夫封侯廟食掩金許以霞褰三主七公單袁楊而岳立於是功超振鷺位典烹鮮水鏡澄瀾照翔鸞之舞影鳴琴動操叶馴雉之雅音既而盛徳有隣佐皇華而撫俗君子不器扈輶軒以觀風某蒲石播遷聲嚮蓬轉不叶十室無專一經攀驥逸而無由仰鵬飛而自失公顧盼成餙咳唾為恩庶㣲潤於江波兾末光於隣燭使幽禽遷木侣丹山於帝梧鳴石在川應黄鍾於仙管敢布心也詎能望焉謹啟上郭賛府啟賔王啟側聞樞精嘯谷韻清籟於驚蘋震徳昇乾靉𤣥枝而布族雖涸鱗濡沫終觖望於鯨潭集作波而泆羽槍榆頗思遷於鶯樹伏惟賛府公瓊階集作基疊秀積珠構於三龍玉幹驚華曄瑶林於八桂仙飛有道榮河泛髙尚之舟徳驗通神靈䇿洞幽𡨕之境産耶谿而濯質鍾鐔廓豐匣之姿孕鍾嶺而飛華虹玉絢荆巖之氣松秋表勁翊頳霞而挿極菊晩馳芳㴠清露而凝集作泫沼鑒懸龍鏡朗逸照於咸陽韻入鳬鍾驚洪音於長樂心源泛藻控鰲壑以朝宗情岳披蓮掩龜岑而作鎮惠牛曜辨驚荀鶴於談叢楊鳳摛文詠鄒龍於筆海故得佐銅章於磬渚側扇文鰩之風貳黑綬於桐郊潜誘祥鸞之化絃揮單父弼清韻於嵇琴乳集作化狎中牟翊馴翬於潘雉加以延賔致驛接士式閭集作廬採援芻㣲邁欽賢於司𨽻提奬幽滯軼取俊於淳于賔王甕牖輕生席門賤品幸得集作以叅名比屋恱集作稅非康衢以自悟預迹畊夫集作耦耕欣日出而知作且集作又以家傳素業弋書林而騁志少奉庭訓集作闈馳文圃以游䰟集作踐文囬以魚䰟至於摽巻青箱頗側探其奥㫖竹書石記亦幽求於異集作其邃源雖未能響集作呌徹帝門集作閽聲馳宰府而頗亦見推里閈譽浹鄉閭方今銀箭躔秋金壺應節吮墨翅足希造杖集作期籩迹於一枝味道彈冠望横經而集作於重席不量庸昧竊冀揚庭伏乞恩波暫垂廻眄倘使陳留逸調下採柯亭之篠會稽陰徳流集作傍眷餘谿之蔡則廻眸之報不獨著於前龜清亮之音詎專聞集作誰專稱於往笛雖滄溟逺量敢集作永不媿於牛涔而嵩岱洪恩終懵酬於蟻穴集作蛭輕瀆集作喧視聽戰讋誠深集作憂讋惟深猥黷階庭兢惶交集謹啟與湖南李中丞啟柳宗元宗元啟某嘗讀列子書有言於鄭子陽者曰列禦冦盖有道之士也居君之地而窮若不好士使之然乎子陽於是以君命輸粟於列子列子不受固常髙其志又讀孟子書言諸侯之於士曰使之窮於吾地則賙之賙之亦可受也又怪孟子以希聖之才命代而出不卓然自異以潔白其徳取食於諸侯不以為非斷而言之則列子獨往集作任之士唯已一毛之為愛故遁以自免孟子兼濟蜀本作愛之士唯利萬物之為謀故當而不辭今某處則無列子之道出則無孟子之謀窮則去讓而自求至則捧受而無慚斯固為貪陵茍冒人矣董生曰明明求財利唯恐困乏者庶人之事也是皆詬耻之大者而無所避之何也以為士則黜辱為農則斥逺無伎不可以為工無貲集作貨不可以為商抱大罪處窮徼以當惡嵗而無廪食又不自列於閤下則非所以待集作示君子之意也伏惟覽子陽孟子之說以垂徳惠無使惶惶然控于他邦重為董生所笑則縲囚之幸大矣謹啟上大理崔太卿應制舉不敏啟宗元啟伏聞古之知已者不待来求而後施徳舉能而已其受徳者不待成身而後拜賜感知而已故不扣而響不介而合則其舉必至而其感亦甚斯道遁去遼濶千祀何為乎今之世哉若某者智不能經大務斷大事非有恢傑之才學不能探奥義窮章句為腐爛之儒雖或寘力於文學勤勤懇懇於集作于嵗時然而未能極聖人之規矩恢作者之聞見勞費翰墨徒爾拖縫掖曵大帶逰於朋齒且有愧色豈有能乎哉閣下何見待之厚也始者自謂抱無用之文載不肖之容雖振身泥塗仰晞雲霄何由而能哉遂用收視内顧頫首絶望甘以沒沒也今者果不自意他日𤨏𤨏之著述幸得流於袵席接在視聽閤下乃謂可以蹈逺大之途及制作之門决然而不疑介然而獨聽是何收採之特逹而顧念之勤備乎且閤下知其為人何如哉其貌之羙陋質之細大心之賢不肖閤下固未知也而一遇文字志在濟㧞斯盖古之知已者已故曰古之知已者不待来求而後施徳者也然則亟来而求者誠不料也某向以應博學宏詞之舉會閤下辱臨考第司其升降當此之時意謂運合事并適丁厥時其私心日以自負也無何閤下以鯤鱗之勢不容尺澤悠爾而自放廓然而髙邁其不我知者遂排退集作逐而委之委之誠當也使古之知已猶在豈若是求多乎哉夫仕進之路昔者竊聞于師矣太上有專逺之能乗時得君不由乎表著之列而取將相行其政焉其次有文行之羙積能累榮不由乎舉甲乙歴科第登乎表著之列顯其名焉又其次則曰吾未嘗舉甲乙也未嘗歴科第也彼朝廷之位吾何修而可以登之乎必求舉是科也然後得而登之其下不能知其利又不能務其往則曰舉天下而好之吾何為獨不然由是觀之有愛錐刀者以舉是科為恱者也有争尋常者以登乎朝廷為恱者也有慕權貴之位者以將相為恱者也有樂行其政者以理天下為恱者也然則舉甲乙歴科第固為末而已矣得之不加榮䘮之不加憂茍成其名於逺大者何補焉然而至於感知之道則細大一矣成敗亦一矣故亦集無此字曰其受徳者不待成身而後拜賜然則幸成其身者固末節也盖不知求之下者不足以收特逹之士而不知成身之末者不足以承賢逹之遇審矣伏以閤下徳足以儀世才足以輔聖文足以當宗師之位學足以冠儒術之首誠為賢逹之表也顧視下位豈容易而收哉而某樸野昧劣進不知退不可以言乎徳不能植志於義而必以文字求逹不可以言乎才秉翰執簡敗北而歸不可以言乎文登塲應對剌謬經㫖不可以言乎學固非特逹之器也附省陋質豈容易而承之哉叨冒大遇穢累髙鑒喜懼交爭不克寜居竊感荀罃如實出已之徳敢希豫讓國士遇我之報伏候門屏敢俟招納謹奉啟以代投刺之禮伏惟以知已之道終撫薦焉不宣謹啟文苑英華巻六百五十九
