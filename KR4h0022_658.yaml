body:
  text: 文苑英華卷六百五十九宋李昉等編投知二上齊州張司馬啓一首上廉察使啓一首上瑕丘韋明府啓一首上梁明府啓一首上郭贊府啓一首與湖南李中丞啓一首上大理崔大卿啓一首上齊州張司馬啓駱賔王某啓昔者薛邑聞歌揖馮諼於彈鋏夷門停集作命駕顧侯嬴於抱關何則志合風雲戴笠均乎乘馬情諧道術忘筌貴乎得魚是以挹集作揖蘭言於斷金效集作交蓬心於匪石庶清音動集作默聽賞流水於牙絃妙思通神叶成風於郢匠伏惟司馬公疏源白水浸地軸以輪波纂慶黃軒感星精而誕命綴珠華於七曜聨玉葉於五雲至夫神石呈一作摛祥靈鈎集作鈞非表貺千年馭鶴振仙駕集作氣於帝鄉七葉珥貂襲榮光於戚里固以紛綸國牒昭晰家聲洎乎鹿走周原相集作輔秦圖以興霸蛇分沛澤翼漢運以基皇常山王之玉潤金聲博望侯之蘭薰桂馥羽儀百代掩梁竇以霞褰鍾鼎一時罩袁楊而嶽立固集作故得重規逺鏡湛月路以流清茂趾集作祉遐鋪架雲門而擢秀公飛英鳳穴藻五色以凝華顯曜驪泉集作穎耀龍泉含九重而流集作育潤風情踈朗霜明月净集作湛之姿氣骨端嚴雪白氷清之槩若乃性符神授道擅生知挫三端於情峯朝九流於學海博聞強記辨晉國之黃熊將聖多能識吳門之白馬言泉漱潤驚瀑布以飛瀾文江淡清含濯錦而翻浪鬱槐市而集作以增茂穆蘭室以流芳於是祥集作翔鱣應符觀光上國飛龍成卦利見大人摶羊角以垂天展驥足而騰景翼化二集作二藩邸挹敬祖之清亷光贊外臺陳君回之亮直推公平而折獄磔鼠謝其嚴明擁端慤而行仁化地慙其智勇加以清規日舉湛虛照於氷壺𤣥鑒露凝朗機心於水鏡謙光自牧恭已愛人片善必甄揖虞翻於東箭一言可紀許顧榮於南金但某疾抱支離材均擁腫進不能握蘭分竹綰銀黃於雲臺退不能絶粒茹芝煉金丹於地肺而出沒風塵之內漂淪名利之間知集作逰無毛薛之交仕乏金張之援塊然獨居集作處者一紀于集作於茲矣然而日夜相代想集作恐溝壑之非遙貧集作窮病交侵思薜蘿之可託尚欲乘幽控寂集作常願處幽樓寂追夏黃於商山樂道栖真從魯連於滄海豈圖語默易爽心跡難并集作逃陟集作從橋之恨愈集作逾深攀桂之情徒結是用絶心集作深乾沒耽閲丘墳謁子將於南荆訪康成於北海西逰梁益效集作仰司馬王楊之風東入臨淄慕淳于管晏之智瞻言前古徒欲思齊俯惟當今空勞懷刺不意雲浮礎潤霜落鍾鳴揖郭泰於虛舟有道斯世賞鬷明於撤爼盛德猶存雖雅調清歌誠寡和於郢路而庸音濫吹竊混奏於齊竽輕課撮囊揄揚盛德庶幾金波離畢零陵之石自飛瑶光建寅蕭丘之火暫爇學慙麟角德輕集作類鴻毛愧汗如漿憂心若厲謹啓上亷察使啓賔王啓每讀書見古人負米之情捧檄之操未嘗不廢書輟卷流涕傷心何則情蓄於中事符則感形潜於內迹應斯通而悅帝力以栖魂情欣養素仰皇華而息集作暢慮敢用披丹伏惟某公源控玉輪激神濤而㴠地基疏金闕架飛㞯以韜雲洎乎鹿駭周躔集作鹿走周原霸燕圖於即墨蛇分沛澤封漢爵於華城福祿攸鍾公侯必復炳靈丹穴習集作襲吉黃裳若乃峯秀學山列三墳而仰止瀾清筆海委九流以朝宗登小魯之山辨練光於曵集作亂馬臨大吳之國識寶氣於連牛垂秋實於翰林絢春花於文苑清規湛秀照月旦於雕談素論凝𤣥開夜光於妙辨既而業成麟角引茅茹而彈冠道映鵷池絢桃林集作花而曵綬揆留皇鑒忠簡帝心奉職春宫標離光於青殿代工天府明神集作名耀於紫宸故得龍綍垂光戢兩星而開照鶴蓋浮影翼五雲以連陰賔王大塊流形小人餘慶幸河神入昴映白榆而集作以流祥江使負圖上集作泛青蓮而薦兆薰風廣扇聖日多集作揚暉進不能髙議靈集作雲臺談社禝之上務退不能銷形地肺揖箕潁之餘芳而出沒風塵漂集作湮淪名利十年無祿集作棣萬里惟桑既而日逺長安處蓬門而西笑雲飄吳㑹追松江集作遙松浦以南浮冀塵跡於丘中絶漢機於俗網獲承歡於膝下馭潘輿於家園不悟地絡遐張維白駒於空谷天羅廽布弋黃鶴於髙雲顧已以駑鈍合集作並從媒衒力農賤事未免東臯之勞反哺私情遽切南陔之詠少希顧復敢集作輒布懇誠雖噬指集作臍思歸空軫倚閭之望而齧臂求仕非圖髙蓋之榮明公資孝履忠恕已及物惟幾成務論道經邦庶得顧兔離箕集作星動清風於舜海從龍潤礎霈甘雨於堯雲則白羽書生自銘恩於食稻黃衣童子將賽德於餐花拜首廽惶傾心䖍霡謹啓上瑕丘韋明府啓賔王啓側聞觸籠戢翮負垂天而局形伏櫪羈蹄望絶塵而跪足故以逰蓮絏網集作遇絏悟宋玉疑於嬰羅在藻迷波顧䝉莊於煦轍是以臨淄遣婦寄束緼於齊鄰邯鄲下客效處囊於趙相伏惟明府公締跡集作址瓊峯靈丘集作嶽蔽丹霄之景圖基珠浦集作溜神𣲖集作流沃清漢之波玉札飛文綜宏詞於楚傅集作博金籝緝藝味𤣥集作雅道於扶陽孕蘭畹而生姿灃灞踵髙門之慶産銅溪而寫鍔荆藍資象緯集作德之禎早集作幼辨羝羊演飛龍之祕䇿夙談孔雀對家禽之麗詞赤野浮炫價之光珠胎榮色丹穴陪來儀之迅鳳姿含影靈襟轉璧詢逸照於蘭池神府驚頻韻清音於桂浦談叢散馥韜餘芳集作韞餘氣於九蘭筆海飛濤駭洪波於八水於是綰銅麟甸製錦鳬郊化浹下車恩孚攬轡德聲洽詠仁風飄十地之雄道化遍謡惠露灑三天之渥狎中牟之馴雉豈懼驍媒驚重泉之瑞鸞非關照舞雖則塵飛范甑垂銀有結綬之華而乃調理密絃烹雞屈函牛之量加以招携白屋勸誘青襟延張必於䳱輪引王終於倒屣遂使漱流逸客望驥足以雲蒸栖泌遺材集作才欵龍門而霧會賔王緯蕭末品拾艾幽人寓跡雩壇挹危直之祕說托根磬渚戢戰勝之良談集作圖幸以奉訓趨庭采集作束情田於理窟從師負笈藝性織於書圃集作林至於九流百氏頗綜緝於三字集作忽其異端萬卷五車亦研精集作乎其奧㫖將欲優遊三樂負杖以終年栖遲一丘鳴絃而卒嵗以糠𬞞集作糟糠不贍甘㫖之養屢空簞笥無餘集作資朝夕之歡寧展是以祈南陽之捧檄擬毛義之清塵思魯國之執鞭蹈孔丘之餘志屬以商集作蛬秋應節素集作鴈序戒時飊金將露玉俱清柳黛與荷緗漸歇實含毫振藻之日集作際摛經析理之期不揆雕朽之材竊冀遷喬之路輒祈泛愛輕用自媒倘荆璞無致於見疑集作無見致疑夜光不逢於集無於字按劍則沉骸九死終望銜珠殞首三泉猶希結草載塵清覽一作鑒矚影外驚集作載塵清矚局影外慙冒黷威嚴循心內駭謹啓上梁明府啓賔王啓竊聞薛邑聞琴揖馮諼於彈鋏夷門佇駕顧侯羸於抱關何則志合風雲載笠均乎乘馬情諧道術忘筌貴乎得魚是用挹蘭言於斷金效蓬心於匪石庶清音動聽賞流水於牙絃妙思通神叶薰風於郢匠以上與上張司馬啓同伏惟某公儀天峙構層基控射牛之峯浸地開源驚濤疏釣鼇之浦至夫封侯廟食掩金張以騫翥三主七公罩袁楊而嶽立故得重規逺鏡湛月露以流清茂趾霞鋪駕雲門而擢秀若乃博聞強記辨晉國之黃熊將聖多能識吳門之白馬言泉漱回驚瀑布以飛瀾文江淡虛㴠濯錦而翻浪自袁揚至翻浪七十七字與上張司馬啓同於是功超食跖位典烹鮮水鏡澄瀾照孤鸞之舞影鳴琴動操叶馴翬之雅音既而盛德有鄰佐皇華而省俗居羣不器扈輶軒而觀風某疾抱支離材均擁腫自弱齡植操本謝聲名中年誓心不祈聞逹始則執鞭為仕帝里希干祿之榮次則捧檄入官私庭無代耕之樂然而忠不聞於十世學無專於一經退異善交進殊巧宦摶羊角而遐翥浩矣無津附驥尾以上馳邈焉難託實欲垂竿投餌晦名跡於渭濵抱甕灌園絶機心於漢渚幸屬乾坤貞觀烏兔光華嵩山動萬嵗之聲德水應千年之色雖無為光宅欣預比屋之封而有道賤貧耻作歸田之賦從有弱齡至之賦一百五十三字與前卷上太常伯啓同明公顧盼成飾咳唾為恩漏微潤於江波流末光於鄰燭幽禽栖木侣丹山於帝梧鳴石浮川應黃鍾於仙管敢布心也詎能望焉謹啓集載此篇題目同而詞有詳略異同今録于後某啓昔者聞歌薛邑賞彈鋏於馮諼佇駕夷門揖抱關於侯子豈惟成風之斫妙思通神流水之絃清音入聽况夬志合者蓬心可采情諧者蘭味寧忘伏惟某公儀天峙構層基控射牛之峯浸地開源驚濤疏釣鼇之浦至夫封侯廟食掩金許以霞褰三主七公單袁楊而嶽立於是功超振鷺位典烹鮮水鏡澄瀾照翔鸞之舞影鳴琴動操叶馴雉之雅音既而盛德有鄰佐皇華而撫俗君子不器扈輶軒以觀風某蒲石播遷聲嚮蓬轉不叶十室無專一經攀驥逸而無由仰鵬飛而自失公顧盼成飾咳唾為恩庶微潤於江波兾末光於鄰燭使幽禽遷木侣丹山於帝梧鳴石在川應黃鍾於仙管敢布心也詎能望焉謹啓上郭贊府啓賔王啓側聞樞精嘯谷韻清籟於驚蘋震德升乾靉𤣥枝而布族雖涸鱗濡沫終觖望於鯨潭集作波而泆羽槍榆頗思遷於鶯樹伏惟贊府公瓊階集作基疊秀積珠構於三龍玉幹驚華曄瑶林於八桂仙飛有道榮河泛髙尚之舟德驗通神靈䇿洞幽𡨕之境産耶溪而濯質鍾鐔廓豐匣之姿孕鍾嶺而飛華虹玉絢荆巖之氣松秋表徑翊頳霞而插極菊晚馳芳㴠清露而凝集作泫沼鑒懸龍鏡朗逸照於咸陽韻入鳬鍾驚洪音於長樂心源泛藻控鰲壑以朝宗情嶽披蓮掩龜岑而作鎮惠牛曜辨驚荀鶴於談叢楊鳳摛文詠鄒龍於筆海故得佐銅章於磬渚側扇文鰩之風二黑綬於桐郊潜誘祥鸞之化絃揮單父弼清韻於嵇琴乳集作化狎中牟翊馴翬於潘雉加以延賔致驛接士式閭集作廬採援芻微邁欽賢於司𨽻提奬幽滯軼取俊於淳于賔王甕牖輕生席門賤品幸得集作以參名比屋恱集作稅非康衢以自悟預迹耕夫集作耦耕欣日出而知作且集作又以家傳素業弋書林而騁志少奉庭訓集作闈馳文圃以游魂集作踐文回以魚魂至於摽卷青箱頗側探其奧㫖竹書石記亦幽求於異集作其邃源雖未能響集作呌徹帝門集作閽聲馳宰府而頗亦見推里閈譽浹鄉閭方今銀箭躔秋金壺應節吮墨翅足希造杖集作期籩迹於一枝味道彈冠望橫經而集作於重席不量庸昧竊冀揚庭伏乞恩波暫垂回眄倘使陳留逸調下採柯亭之篠會稽陰德流集作傍眷餘溪之蔡則回眸之報不獨著於前龜清亮之音詎專聞集作誰專稱於往笛雖滄溟逺量敢集作永不愧於牛涔而嵩岱洪恩終懵酬於蟻穴集作蛭輕瀆集作喧視聽戰讋誠深集作憂讋惟深猥黷階庭兢惶交集謹啓與湖南李中丞啓柳宗元宗元啓某嘗讀列子書有言於鄭子陽者曰列禦冦蓋有道之士也居君之地而窮若不好士使之然乎子陽於是以君命輸粟於列子列子不受固常髙其志又讀孟子書言諸侯之於士曰使之窮於吾地則賙之賙之亦可受也又怪孟子以希聖之才命代而出不卓然自異以潔白其德取食於諸侯不以為非斷而言之則列子獨往集作任之士唯已一毛之為愛故遁以自免孟子兼濟蜀本作愛之士唯利萬物之為謀故當而不辭今某處則無列子之道出則無孟子之謀窮則去讓而自求至則捧受而無慚斯固為貪陵茍冒人矣董生曰明明求財利唯恐困乏者庶人之事也是皆詬耻之大者而無所避之何也以為士則黜辱為農則斥逺無伎不可以為工無資集作貨不可以為商抱大罪處窮徼以當惡嵗而無廪食又不自列於閣下則非所以待集作示君子之意也伏惟覽子陽孟子之說以垂德惠無使惶惶然控于他邦重為董生所笑則縲囚之幸大矣謹啓上大理崔太卿應制舉不敏啓宗元啓伏聞古之知已者不待來求而後施德舉能而已其受德者不待成身而後拜賜感知而已故不扣而響不介而合則其舉必至而其感亦甚斯道遁去遼濶千祀何為乎今之世哉若某者智不能經大務斷大事非有恢傑之才學不能探奧義窮章句為腐爛之儒雖或置力於文學勤勤懇懇於集作于嵗時然而未能極聖人之規矩恢作者之聞見勞費翰墨徒爾拖縫掖曵大帶逰於朋齒且有愧色豈有能乎哉閣下何見待之厚也始者自謂抱無用之文載不肖之容雖振身泥塗仰晞雲霄何由而能哉遂用收視內顧俯首絶望甘以沒沒也今者果不自意他日瑣瑣之著述幸得流於袵席接在視聽閣下乃謂可以蹈逺大之途及制作之門决然而不疑介然而獨聽是何收採之特逹而顧念之勤備乎且閣下知其為人何如哉其貌之美陋質之細大心之賢不肖閣下固未知也而一遇文字志在濟拔斯蓋古之知已者已故曰古之知已者不待來求而後施德者也然則亟來而求者誠不料也某向以應博學宏詞之舉會閣下辱臨考第司其升降當此之時意謂運合事并適丁厥時其私心日以自負也無何閣下以鯤鱗之勢不容尺澤悠爾而自放廓然而髙邁其不我知者遂排退集作逐而委之委之誠當也使古之知已猶在豈若是求多乎哉夫仕進之路昔者竊聞于師矣太上有專逺之能乘時得君不由乎表著之列而取將相行其政焉其次有文行之美積能纍榮不由乎舉甲乙歷科第登乎表著之列顯其名焉又其次則曰吾未嘗舉甲乙也未嘗歷科第也彼朝廷之位吾何修而可以登之乎必求舉是科也然後得而登之其下不能知其利又不能務其往則曰舉天下而好之吾何為獨不然由是觀之有愛錐刀者以舉是科為恱者也有爭尋常者以登乎朝廷為恱者也有慕權貴之位者以將相為恱者也有樂行其政者以理天下為恱者也然則舉甲乙歷科第固為末而已矣得之不加榮喪之不加憂茍成其名於逺大者何補焉然而至於感知之道則細大一矣成敗亦一矣故亦集無此字曰其受德者不待成身而後拜賜然則幸成其身者固末節也蓋不知求之下者不足以收特逹之士而不知成身之末者不足以承賢逹之遇審矣伏以閣下德足以儀世才足以輔聖文足以當宗師之位學足以冠儒術之首誠為賢逹之表也顧視下位豈容易而收哉而某朴野昧劣進不知退不可以言乎德不能植志於義而必以文字求逹不可以言乎才秉翰執簡敗北而歸不可以言乎文登場應對剌謬經㫖不可以言乎學固非特逹之器也附省陋質豈容易而承之哉叨冒大遇穢纍髙鑒喜懼交爭不克寧居竊感荀罃如實出已之德敢希豫讓國士遇我之報伏候門屏敢俟招納謹奉啓以代投刺之禮伏惟以知已之道終撫薦焉不宣謹啓文苑英華卷六百五十九
