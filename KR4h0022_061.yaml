body:
  text: 文苑英華卷六十一宋李昉等編儒學一辟雍賦一首太學觀春宫齒胄賦一首太學壁經賦一首太學創置石經賦一首御注孝經臺賦一首五經閣賦一首觀太學射堂賦一首八卦賦一首六藝賦一首金鏡賦一首唐太宗所撰金鏡述辟雍賦以王者風教之本為韻王履貞辟雍之裁一作才教化之方辟者象旋圓而不極雍者以流轉而有常行於歷代創自前王崇此乃理廢之斯亡革斁剗澆何莫由之而克著化人成俗靡不因兹而允臧公宫之南靈臺之下赫巍峩以層構規制度於衆寡區别逺采於虞庠經始不差於周雅闡揚學校旁求儒者溫良恭敬之士資於父以事師俊造茂異之倫必自朝而逮野尊卑有秩禮教是崇取乎年均式序不以地髙為雄隨其局貴賤之義自别尚乎齒少長之儀有融然可以闡皇化彰國風允叶叩鐘之教克成琢玉之功寧止夫聞天者比於鳴鶴居陸者喻夫漸鴻而已爾其學習以時詩書興教惟司成是典惟古則是效詔夏弦春誦俾民不僣飬三老五更俾民知孝惟胄也太子齒矣惟學也元后視之合語於此釋菜有時以崇其道以尊其師俾百工允理庶績咸熙抑前古之是賴伊兹禮之是持德貞行芳逹其名以取譬泉流波注立其義而在兹由是金革可偃淳朴斯返所謂深其流者濬其源茂其末者固其本至矣哉辟雍之㫖也大辟雍之教也逺可同乎不騫不崩豈俾夫損之又損太學觀春宫齒胄賦以德成教尊在乎齒學為韻失名我聖人之有國酌古訓建皇極太學備崇儒之禮春宫熟齒胄之則宗伯二事司成奉職叶三王之教可知順四時之儀不忒域中於是乎宣化天下於是乎觀德既而儲駕戾止虞庠肅清傾章甫之列駐和鸞之聲讓其齒也長幼之節著明其親也父子之道成逹其尊也君臣之義行疑三善兮皆得實萬邦兮以貞故曰先知後為上行下效𢎞當代之楷式奉前王之德教于以識尊卑之倫于以觀莊敬之貌大矣政本至哉化源膺秬鬯之丕列訪典謨之格言揖讓於詩書之府雍容於禮義之門敬其學而德至親其師而道尊青青子襟其容不改亹亹諸疑作儲嗣其福斯在則孰能不恭而志佚孰能不學而思殆所謂遵萬民刑四海也祁一作鄒魯儒士文在兹乎依稀兮翔集闕里髣佛兮詠歌舞雩七十子兮三千徒實將執經以問豈獨摳衣而趨哉則知大學之義國風之始在明德在貴齒福疑作禮師臣延胄子尊賢所以抗法講藝所以惇史有觀者曰玉琢成器人可不學亦因此習禮樂夫如是實國家之大柄而德行之有覺太學壁經賦以六經典法刋正文字為韻失名國家誕敷文命建學崇政置六經于屋壁作羣儒之龜鏡剪遺文以辨謬俾雅誥以詳正是以儒業益敷皇風載盛斆學既闡廓宇斯分飾素壁而照月構丹梁而結雲於是集青襟之侣延鴻鶴之羣貞八索起三墳採典謨之淪翳次編簡之繽紛稽古至今從百家之正義歸真背僞俾四海之同文於是博考羣臣宣明舊典既科斗之互缺亦魚魯之相舛依鳥迹而難從訪蛇形而莫辨定兹金簡規程邈之𨽻書遵彼古文參史籀之大篆然後命鍾張之藝詔文學之官界四壁以繩直揮五色之毫端粲爾其彩昭然可觀雖一勞之克定乃千載之不刋錯綜既備班列有次欲昭明於六書先褒貶於一字俾去顛訛之惑用全述作之意苟不絶於韋編將永齊於石記至於止戈為武反正為乏將為後生之式必憲先王之法爰及垂露懸針鶴頭蚊足酌前修之模楷為後來之軌躅瞻彼垣墻代兹簡牘篇章煥炳文雅照燭正以先王之修則曲禮三千習以孔門之徒則冠者五六所謂一人作則京國儀刑光我廊廟異彼丹青示人範於古訓正國常於典經既文明乎天下宜逺域而來庭太學創置石經賦失名我國家學校崇崇創石經于其中用啔千年之聖將遺萬古之風𤣥化式敷厥德既彰於有截聲詩再闡斯文庶表於無窮既而招學苑之徒命他山之役陳滿笥之文雅結峻天之逺碧且曰道自人𢎞教由時易若不考深㫖勒貞石布落落於廣庭陳巖巖於千尺則何以表吾道之不騫見伊唐之有赫者哉由是雕鎪之功備矣文質之義昭然鑿寒光而嶄嶄迭映駢古色而字字相宣儼彼貞規韞玉之姿益壯窮諸墨妙崩雲之勢彌堅事既叶於造微理乃符於托實削成豈勞於執簡壁立更逾於散帙旁分鳥跡且非精衛之銜來逺映天光有若媧皇之𥙷出可謂洙泗之風不墜而教化之道益敦鑽仰苟同於深奧咫尺可見於微言五色參差夫子之文章盡在丹楹俯瞰聖人之閫閾斯存豈非吾君秉兹一德修文臨極堅貞為庶士之規考禮作百王之式既而辨舛錯而定魯魚然後二三子是效是則御注孝經臺賦以百行之本明王所尊為韻張昔孝惟行先教實理本故𤣥宗探宣尼之㫖為聖理之閫爰索隱以鈎深或詞約而意逺然後勒睿㫖於他山之石樹崇臺為儒林之苑天文煥發知孝道之克宣微㫖髙懸示仁風之已返上崇君德下達人情王猷玉潤帝典金清誼雖刑于子道理實暢乎家聲施之於人風俗可移於孝理懸之於教日月方比於貞明不然何以倬爾孤標介然守正金字纍纍以條貫銀鈎歷歷而交映故嚮之者修睦就之者起敬斯乃示生民之大端仰高山之景行至哉聖化本本元元酌其㫖而薄俗可厚毗於政而理道可敦故政以肅教為尊非無詩書始務陳其行本非無貴賤心願宗其化源且高而不危者尚乎臺磨而不磷者莫如石揭貞質於庠序殊祕府之竹帛諒乃侔天地而始終豈特垂載祀於千百靜而繹思文固在兹一人有作比屋允釐覽君君臣臣之間則心乎愛矣於尊尊卑卑之道則學而知之矧乎雕琢成章區分式序方隅而不失其正篇次而各得其所三千子之鼓篋邈矣具瞻十八章之針規揭之備舉乃知孝理馨香有時而彰不壞不朽化被無疆所以播鴻休於玉葉表嗣子於明王故曰孝者天之經也宜乎配地久而天長五經閣賦以禮傳詩書易成教為韻許堯佐王者為邦實先學校不有載籍何以垂教必由乎文字使知乎忠孝東序西序取乎遊焉息焉八索九丘俾其是則是效粵我后矣聖哲者歟命儒官兮至公以居所崇唯學所寶惟書搜羣言而斯在立重閣而藏諸觀其結搆孤髙軒扉對啓飾不及侈儉而中禮刮楹之上標銀榜之煌煌峻宇之前閲子襟之濟濟於是六籍咸萃百代無遺恭儉之教比事之辭虞夏商周之五典國風雅頌之四詩既精微之與廣博莫不森羅而在兹文移科斗之質字别魚魯之疑軸星攢而花散帶霓舒而草滋櫺檻風來動藝香之苾苾綺踈日映見鉛槧之纍纍覽彼縑緗請披記傳或崇其臺以邀非望之福或邃其榭以逞荒怠之宴未若事惟師古政以化成朴斫之勤毋弛怠於儒學黼藻之飾不加賁於檐楹由是事美德風人歌懿績校則同於天祿藏乃異於魯壁左平右墄雖有陋於明堂上棟下宇乃不踰於大易别有名繫庠序身衣縫掖覩兹閣之岧嶤諒吾道之𢎞益觀太學射堂賦以事變儀存猶以識禮為韻周存觀射堂之攸設知射侯之有以非取善於主皮蓋繹心而正已故王用制之而諸侯是務擇以習焉而射宫觀美莫不比乎禮樂和其容止將申明於德行必審固夫弓矢皇家之闡化也稽古議酌前修兹宇既啓兹道惟休職備乎司射事集乎司裘采蘋采蘩乃施有度以熊以豹實命不猶是用外直諸體內正乎志循聲而發彼有的得祭而益乎爾地苟斯義罔取或承之羞既於德可觀則無不利豈徒稱善者五舉正者四誠有國之恆規而擇賢之盛事曩者天下無虞西戎生變動搖我區域辛螫我方面救弊者權必反常以合道靖難者武故訓人以知戰於是大閲禮行大射義息司馬無祭侯之事梓人罷棲鵠之職蓋弛張之道因時而沿革之宜可識方今寰海謐如以無事射堂巋然而獨存綵侯不張而逺國來屬貢士不習而盛德必敦故夫五帝殊儀三王異禮咸登太和與至理莫不雍雍而濟濟是知崇樂非鐘鼓之器立德為正鵠之體也鄙生乎堯日選乎璧池逹弓矢之妙㫖偉棟宇之宏規儻斯道而可復庶當見擇之刑儀八卦賦敬括太古之氣是生兩儀浩然無測淵乎勿為雖混沌之已判尚冥蒙而未知既不辨其兩偶孰能察其三竒爰有皇聖其惟伏羲索四營之妙理究三才之大規乃畫八卦以窮萬象神可以測來知可以藏往辨庶品於竒功握羣形於指掌使六位之恆存乃百王之是仰故乾以至健坤以利貞含千變之象類萬物之情起潜龍以設位立牝馬而開名為大易之門户極天下之至精離以象日巽以為風既明照於天下復扇動於虛空凡有象而皆見無幽而不通誠自然之妙理亦變化之神功爾其震位生木坎方生水擢修木於千尋汨長波於萬里和衆籟而成響寫羣峯而倒峙則有兊取於金艮乃為止既兼山而立卦亦麗澤而成軌表三索於永終瞻萬物於資始莫究其探賾之妙虛測其幽微之理物欲象而斯來窮則變而無已信可以决疑辨誤訓人軌物必定志以先占乃端蓍而後揲以通其變使人不倦賢哲好之以洗心愚夫覩之以革面則知卦之為道其亦至微妙不可測理不可違既設爻以盡數亦觀象而知幾天地由其開闢隂陽由其發揮總百慮而一致混殊途而同歸六藝賦以移風易俗安上理人為韻封希顔散琴書以吟想多六藝之為儀禮緣情而損益樂與道而推移數方窮於大衍射不貴於主皮書斷决以象夬御周行而取隨則廢一而不可猶五材之並施且夫禮者含七曜均兩儀順之則安違之則危故君當廣敬臣亦盡規不害物以利已每謙尊而守卑况復冕旒十二駱馬千羈會同侯伯享獻神祗者焉人無定樂有曲扣羽增智聞商寡欲必除怗懘之音使優柔以自足然後美教化成風俗魯不納於齊人戎辭遺於秦穆太史之職推步萬端或分或至一暑一寒趣乾坤之取捨知運命之艱難亦有𢎞羊心計小道可觀便人利國下給上安若乃墨妙之場書淫之客轉注别態圓方自適萬仭崩雲千巖落石垂露霑於緗綺飛花散於竹帛觀夫始用契以代繩未有紙而作策何朴略之難同為智巧之所易也大射之禮先王是崇侯以示其所服正無言而審同飲少算於多算或在澤而在宫天子用騶虞之節諸侯歌貍首之風將以合雅投頌褒德進功敢不愼其所舉取制於中恐前功之相棄故少息而未窮良馬四之分鑣用狀疑作壯平心正體自下奉上周諏則瑤水遐通虞巡則蒼梧可望不逺千里惟君所向寧止過逺前驅逐禽左廣願終功於造父不見遺於師曠繄彼庶藝孰與之倫圍棋好殺夾食無親祈年設漢左道亡秦今我守則以禮動輒隨人為百工之恆式同六律之相循於戲聞先逹之格言才難得而具美伊小人其何執於夫子有餘力以學文恐代匠而傷理屬天地之交泰沗侯藩之貢士儻片善而必收敢長鳴於知已金鏡賦以聖人握之以臨天下為韻韋模當大哉唐之為盛授寶厯兮握金鏡御乾符兮秉坤政順四時以立法侔上帝而作聖其德惟新其照惟均金也者取剛克以成質鏡也者取清明之在身染之無汚磨而不磷守清净以自立形大小而各陳是故傅咸擬之於良史莊氏比之於至人懿夫不鼓不鑄匪雕匪斫堅貞為義同匪石以居心溥博其功異明珠之在握見而後信動必先覺細察毫芒逺包海嶽處明難疲居昏不濁含清輝於寂默體𤣥化以希夷有以取象無得可持雖每分於動息終不渾於妍媸斯實百王之道也可以三光而揭之原夫司契之君端拱而理北辰定位南面恭已微其道之有孚必心鏡之為始何彊名於此意帝試言其所以豈非體合冲漠功優照臨苟遇物而必覽信緣情之所任皎皎圓明既昏曉而常潔沉沉精彩豈塵垢之能侵作此鏡焉生於化權無形象以留賞有光華而克全清明象水廣大配天討之不窮隨五行而往復韜之無際假六氣以周旋則知守寶者持之罔捨于以宣化源統天下如是三皇之與五帝較我德之殊寡文苑英華卷六十一
