body:
  text: 文苑英華卷八百五十七宋李昉等編釋八潤州江寧縣瓦棺寺維摩詰畫像一首西京千福寺多寶佛塔感應碑一首潤州江寧縣瓦棺寺維摩詰畫像碑元黃之夫魁北藏樞秉三竒於紫掖昆西運軸森萬族於黃輿方領圓冠棹九流而宗學海霓裳羽服乘六甲而下仙巖雖辰像微茫不能味甘陳之識陬維窅邈不能闕草元之功仁義與禮樂可遵未出死生之境昏默與清虛可尚才居天地之先且造化以六合為功聖人以二門分教豈夫百千萬劫量其逺近三千七品語其功業者哉况性相之微不可以名言得虛有之妙不可以智力知三千之净圡無邉八萬之法門虛受能住不思義一作議解脫者也維摩詰者華言净名居士也沒于妙喜之國生于毗耶之城大仙那提之子常修梵行世號白衣居士焉故惣妙圓眀現身方大一作方丈無起無住不去不來空色空而取真空滅生滅而求寂滅或歸之于無物或得之於默然邪正於是路殊語言由其道斷居士之真宗也若乃家室不離而教傳緇服天子廽向而身為白衣讓金粟之尊未即知來之位晦玉毫之相空留長者之名亦猶百谷之王以下莫能大六虛之相居髙而自卑居士之洪謙也若乃移外方諸佛一室規乎四大對樂世之衆生一劫成乎闕日毛孔之內鼓大海之波濤芥子之中鬱須彌之巘崿擲世界於恆沙之外不覺不知攝髙堂於大㑹之前同瞻同仰嵐風動地口吸莫以為難猛火燃天腹一作腸貯但聞其一居士之神通也若乃群邪作梗諸惡延一作挻災衆生茹焚溺之悲寒識迫傷夷之患由是騁自在之力縱無礙之威破煩惱而繫慳貪斬毒蛇而擒醉象朦幢暫建面縳四魔智劒才揮心降六賊故使波旬振讋不能變帝什之容外道摧殘不能竊真如之業居士之威力也若乃非相成光乎是相故見於威儀無言假道於有言方形於問答𢎞乞食之理須菩提但覺茫然聞宴坐之談舍利佛不能加報摩訶迦葉息言於二乘大目犍連吞聲於四衆亦由眀鏡內鍳照之而不疲洪中外發扣之而必應是以五百弟子同稱我不堪任二千闕人盡得無生發忍居士之靈辨也若乃智惣大雄心行菩薩雖人我無相以拯救為懷憂本無憂憂凡俗之憂病本無病病衆生之病冨室貧里等資其福田酒肆媱房一作舍廣談其善誘則知去重昏之小翳朗惠日而無私中根之大莖霑法雨而同潤居士之慈悲也若乃前際闕無昧於因緣成時化時不為於本願光嚴悟矣行念其道場新學豁然坐知其宿命晨持乳鉢未息粗言中設飲盂普均香氣有疾菩薩憂惱於是併除犯律比邱疑悔由其傾蓋居士之利益也若乃恭承父訓事方便以崇嚴瞻望母儀奉智度而資受結齊肩疑作眉於法喜坐詠冝家期止足於塵勞行同入室因風起對共賞慈悲他日趨庭獨推誠實知識慕善道品所有居先伴侣求真度法由其見託居士之宗黨也若乃上棟下宇空寂為輪奐之資净服名衣慙愧入裁縫之用開八正之路則衆馬交馳坐四禪之床則身心不動智惠之果秋垂無漏之林净妙之花春發惣持之苑禪悅為味詎假珍羞解脫充漿寧思玉液奏法音之樂則絲竹藏聲燒異品之香則旃檀罷郁居士之逰處也於是隨意所轉覺路遐通應緣而攝梁津尅濟恢勇猛之志則火闕蓮廣闕虛之因則水中現月法本希有若覩優曇之花道之將行大備貝多之葉舉閻浮之國土禮敬忘疲想毗耶之人天聲塵不朽居士之遺跡也得其道者則三乘弟子羞稱多聞行其法者則七種學人莫不愛樂是致四天讃仰而無假十地攀接而無階王者資而九有清群生聞而六念作雖驪龍改地共尊金粟之儀水土遷行長奉寶臺之供我國家神眀造物聖政調時滌瑕穢而玉鏡清剗澆訛而撝大朴牢籠七十七代鬱映萬八千年率土之濵罔有弗一作不韙普天之下共惟帝臣京坻積而銅爵鳴鍾鼓和而玉羊現將益四生之福爰開十善之因積舍廣祗陀之園列郡揚净名之教萬姓資其分别八方暢其休眀天地平成於是乎汲引在江寧縣瓦棺寺變相者晉虎頭將軍顧愷之所畫也爾其上纒珠斗下控金陵六代為天子之都二分入王孫之國禮讓流行之地英靈誕秀之鄉鷲巖分虎踞之山鴈塔枕盤龍之水惣幽間與形勝則瓦闕之寺焉昔有晉莊嚴净域時梵似以規模雖廣雕飾未周永念粹華每疚懷於須逹共成圎滿而假力於檀那凡厥施財莫匪鳴剎顧君乃連扣資數百笇逾千萬大衆眙愕不知其然君習氣精微洗心間雅雖纓辨混俗而繢素通神乃白緇徒令其粉壁於是登月殿掩雲扉考東漢之圗採西域之變妙思運則冥㑹能事畢則功成神光謝而晝夜名聖容開而道俗覩振動世界謂彌勒菩薩下兜率之天照耀虛空若多寶如來踊耆闍之地由是士女駢比擁路爭趨車馬軒轟傾都盛集玉貝交獻須㬰而寶藏忽盈青鳬亂飛俄爾而銅山崛起納繒帛者繼踵施衣服者闕肩當鳴剎而雖則可驚不崇朝而過其本數非夫數疑衍精義入神者孰能與此乎雖江山寂寥居處緬邈年移代改留侯歎過隙之駒闕人非丁令化遼城之鶴由是觀其道場妙矣謂應供而來儀床枕儼然疑有懷於問疾目若將視眉如忽嚬口無言而似言鬢不動而疑動豈丹青之所歎詠相好之有靈哉預禮者肅如在之心瞻仰者發歸依之念信受演說之㫖大布於人天住持負荷之規實存於牧宰刺史楊令琛懷軌物之量韞不伐之才五服當列士之榮千里負專城之寄移風易俗頻推董相之帷揖道歸真再擁文侯之篲長史薛宏仁賢雅望迃德於仲舉之輿司馬成景一作量賀以卿相髙才屈跡於士元之驥俱遊六藝貯籝金而常滿共逄三朋攬衣闕而永悟縣令陸彥恭夙神俊邁境宇恬虛雖馴雉已彰實割雞焉用風亭月牖還開見寶之詞石冷泉清頗恣分襟之賞修菩薩之行則仰之彌髙現宰官之身則威而不猛相門出相兹焉在兹佇聞摶擊鵬衢栖遲鳯沼豈徒播兹風化奏彼絃歌而已哉丞鄭孝義逸氣飛騰英懷倜儻擢命世之標幹揮舍人之符彩我之自出鳯樓鳴五色之雛家之積善牛渚降九𣲖之族宏才博學再閲康成之門愛客好賢重覩當時之驛朋友推其令譽人吏仰其髙風歷州縣而暫勞獻鹽梅而詎逺主薄于植才藝早著水鏡長懸將騁驥於髙門先漸鳴疑作鴻於下位尉史惟清以雍容儒雅門專秉直之風以磊落才雄巖引乘箕之宿則知龍駒千里非黃綬之所羈鵠子九臯惟青天之是矚家裘不墜望台鉉而相輝堂構克隆見公侯而必復寺主雲影及徒衆并諸寺大德等並法身挺秀覺意圓眀屈拔提之尊號懷盛眀之忍辱四十二之賢聖接踵比肩一十八之虛心持目想勇猛精進將意耳而齊驅慱逹多聞與阿難而並䳱言論辨了有類鵬蓍體性利根更嘉鴦掘故能經行不倦拯濟忘疲模楷四流笙簧二諦邑人左補闕馮宗右拾遺孫處元等並資忠履孝抱義懷仁凝大江之精靈鬱髙山之景行莫不衡門育德華省馳聲或長揖九徴或光膺八命所以東南蓄寶江左有人焉既而道俗披誠賔僚訖欵濫見推於相箕逺不讓於當仁弟子謬忝詞場擢桂林之秀言瞻法宇早從祗樹之遊覩泡影之皆虛悟聲色之非實雖心為形役而志與道俱思惟必在於佛乘夢想無忘於梵行觀居士之跡不可思議閲居士之言得未曽有恨不親承聖㫖捧袂於不二之門躬奉尊顔跪履一作屣於大千之界託菩薩之下位共拂天花接比丘之未得一作行是同窺聖果昔譛舞鸞之化每有願於揄揚今從問鵬之遊豈得默而無述爾時欲重宣此義是以敢作銘云其詞曰元氣浩浩大匠存存鎚􅀈精粹折托乾坤四生有劫六趣無門愛流夕漲塵飛晝昏其一巍哉世雄應期來現妙矣居士隨緣利見大庇生靈遂荒臺殿劫塵遐邈恆沙法遍其二空床寂寂虛實間間文殊奄至波旬遽還拔毛沃海剖芥藏山地分珠柱天潤玉顔其三智惠無邉威靈具足廣延寶坐髙蹈金粟振動人天津梁道俗火宅垂䕃幽徒炳燭其四於赫有晋像教斯傳繢事闕矣靈儀在焉神光夕照瑞相朝圓赩如電掣皎若星懸其五我皇垂拱誕膺寶位控引四流陶鈞萬類法闡妙有靈通夢寐政事以和物無不利其六天隂南斗地擁東吳江山作固臺壘稱都俗冨英傑人多給孤莊嚴結構炳煥規模其七瞻彼邦邑媚兹寮宷化偃一同聲馳四海氷玉常瑩松筠不改乃眷道場肅焉如在其八薄遊净域永念毗耶香如致飯衣似持花嚬容示疾啓齒降邪室懷方丈㑹想無遮其九杳杳三界茫茫九有瞻仰睟容思惟受手式刋真石僉圖不朽盛列鴻名天長地久其十西京千福寺多寶佛塔感應碑岑勛粵若妙法蓮華諸佛之祕藏也多寶佛塔證經之踊現也發眀資乎十力𢎞建在於四衣有禪師法號楚金姓程廣平人也祖父並信著什門慶歸法𦙍母髙氏久而無妊夜夢諸佛覺而有娠是生龍象之徴無取熊羆之兆誕彌厥月炳然殊相岐嶷絶於葷茹齠齔不為童遊道樹萌芽聳豫章之楨幹禪池畎澮㴠巨海之波濤年甫七嵗居然厭俗自誓出家禮藏探經法華在手宿㑹潜悟如識金環惣持不匱若住瓶水九嵗一作載落髮住西京龍興寺從僧籙也受具之年升座講法頓收珍藏異窮子之疾走直詣寶山無化城而可息爾後因靜夜持誦至多寶塔品身心泊然如入禪定忽見寶塔宛在目前什迦分身遍滿空界行勤聖現業净感深悲生悟中淚下如雨遂布衣一食不出户庭期滿六年誓建兹塔既而許王瓘及居士趙崇信女普意來稽首感捨珍財禪師以為輯莊嚴之因資爽塏之地利見千福默議于心時千福有懷忍禪師忽于中夜見一水發源龍興流注千福清澄泛灔中有方舟又見寶塔自空而下久之乃滅即今建塔處也寺內净人名法相先於至地復見燈光逺望則眀近尋即滅竊以水流開於法性舟泛表於慈航塔現兆於有城疑燈眀示於無盡非至德精感其孰能與於此及禪師建言雜然歡愜負畚荷鍤于槖于囊登登慿慿是板是築灑以香水隱以金槌一作鎚我能竭誠功乃用壯禪師每夜於築階所懇志誦經勵精行闕喜歡之音聖凡相半至天寶元載創構材木肇安相輪禪師理㑹佛心感通帝夢七月十三日勑內侍趙思侃求諸寶坊驗以所夢入寺見塔禮問聖夢有孚法名惟肖其月賜錢五十萬絹千匹助建修也則知精一之行雖先天而不違純如之心當後佛之授記昔漢眀永平之日天化初流我皇天寶之年寶塔斯建同符千古照有烈光于時道俗景附檀施山積庀徒度財功百其倍矣至二載勑中使楊順景宣㫖命禪師於花闕樓下迎多寶塔頗一作頗是遂惣一作揚僧事備法儀宸眷俯臨額書下降又賜絹百匹聖札飛雲動毫龍之氣象天書之桂一作天女桂塔駐日月之光輝至四載塔事將就表請慶齊歸功帝力時僧道四部㑹逾萬人有五色之雲團轉一作輔塔頂衆盡瞻仰莫不胥悅大哉觀佛之光利用賔於法王禪師謂同學曰鵬運滄溟非雲羅之可頓心遊寂滅豈愛網之能嘉精進法門菩薩以自強不息本期同行復遂宿心鑿井見泥去水不逺鑽木未熱得火何階凡我七僧聿懷一志晝夜塔下誦持法華香煙不斷經聲遞續因以為常沒身不替自三載每春秋二時集同行大德四十九人誓行法華三昧尋奉恩㫖許為恆式前後道場所感舍利凡三千七百一作十粒至六載欲葬舍利豫嚴道場又降一百八粒畫普賢變於筆鋒上聮得一十九粒莫不圓體自動浮光瑩然禪師無我觀身了空求法先刺血寫法華經一部菩闕一卷乃取舍利三千粒盛以石函兼造自身石影跪而載之同置塔下表至敬也使夫舟遷夜壑無變度門劫算墨塵永垂貞範又奉主上及蒼生寫妙法華經一千部金字三十六部用鎮寶塔又寫一千部散施受持靈應既多具如本寺其載勑內侍吳懷寶賜金銅香爐髙一丈五尺奉表陳謝手詔批云師𢎞濟之願感逹人天莊嚴之心義成因果則法一有施財二字施信所冝先也主上握至道之靈符受如來之法印非禪師大慧超悟無以感於宸𠂻非主上至聖文眀無以鍳于誠願倬彼寶塔為彰梵宫經始之功真僧是葺克成之業聖主斯崇耳其為狀也則嶽聳蓮披雲垂蓋偃下歘崛以踊地上亭盈而媚空中䁆䁆其靜深旁赫赫以𢎞敞礝磩承陛琅玕綷檻玉琪闕居楹銀黃拂户重簷疊於畫栱反宇環其壁璫坤靈贔􅀢以負砌天祗儼雅而翔户或渙疑肩架鷙鳥肘擐修蛇冠􅐻巨龍蝟疑抱猛獸勃如戰色有奭其容窮繪事之筆精選朝英之偈贊若乃開扄鐍窺祕奧二尊分座疑對鷲山千佛發題若觀龍藏金碧晃矅環珮葳蕤其於列三乘分八部聖徒翕習佛事森羅方寸千名盈尺萬象大身現小廣座能崇俾須彌之容歘入芥子寶蓋之狀頓覆三千昔衡嶽思大禪師以法華三昧傳悟天台智者爾乃寂寥罕契真要浩法不可以久廢生我禪師克嗣其業繼眀二祖相望百年夫其法華之教也開元關於一念照圓鏡於十方指隂界為妙門驅塵勞為法侣聚沙能成佛道合掌已入聖流三乘教門惣而歸一人萬法闕我為最雄譬滿月麗天螢光列宿山玉映海蛾蛭羣峯嗟乎三界之沉寐久矣佛以法萃疑我華為木鐸惟我禪師超然深悟其貌也嶽瀆之秀氷雪之姿果脣貝齒蓮目月面望之厲即之溫覩相未言而降佛之心已祕躅傳正觀之精茂或名髙帝選或行密衆師共𢎞開示之宗盡契圓常之理門人苾芻如嵓靈悟空法濟等以定慧為文質以戒忍為剛柔含朴玉之光輝等檀旃之圍繞夫發行者因因圓則福海廣超因者相相遺則惠林深求無為於有為通解脫於文字舉事疑作銜理含毫強名偈曰佛有妙法比象蓮花圓頓深入真靜無瑕惠通法界福利恆沙真其寶所俱乘大車其一於戲上士發行正勤緬想寶塔思𢎞勝因圓階已就層覆初陳乃昭帝夢福應天人其二輪奐斯崇為章靜域真僧草創聖主增飭中座耽耽飛簷翼翼臻靈感歸於帝力其三念彼後學心滯迷封衢昏一作昏衢未曉中道難逄常驚夜枕還懼真龍不有禪伯誰眀大宗其四大海吞流崇山納壤教門稱頓慈力能廣功起聚沙德成合掌開佛如見法為無上其五情塵雖雜性海無漏定飬胎染生死迷鷇斷當起縳空色同謬薝蔔現前餘香何嗅其六彤彤法宇繁我四依事該理暢玉粹金輝惠鏡無垢慈燈照微空王可托本願同歸其七文苑英華卷八百五十七
