body:
  text: 文苑英華卷七百五十九宋李昉等編雜論中詞科論一首難進論一首六逆論一首守道論一首天爵論一首王言論一首豪俠論一首君子論一首詞科論并序沈既濟開元以後四海晏清無賢不肖恥不以文章達其應詔而舉者多則二千人少猶不減千人所收才有疑作百一禮部員外郎沈既濟論曰初國家治自顯慶已來髙宗聖躬多不康而武太后任事參決大政與天子並太后頗涉文史好雕蟲之藝永隆中始以文章選士及永淳之後太后君天下二十餘年當時公卿百辟無不以文章因循遐久浸以成風以至開元天寶之中上承髙祖太宗之遺烈下繼四聖理平之化賢人在朝良將在邊家給户足人無苦窳四夷來同海內晏然雖有宏猷上略無所措竒謀雄武無所奮百餘年間生育長養不知金鼓之聲烽燧之光已至於老故太平君子唯門調户選徴文射策以取祿位此行已立身之美者也父教其子兄教其弟無所易業大者登臺閣小者任郡縣資身奉家各得其足五尺童子恥不言文墨焉是以進士為士林華選四方觀聽希其風采每嵗得第之人不浹辰而周聞天下故忠賢雋彥韜才育行者咸出於是而桀姦無良者或有焉故是非相陵毁稱相騰或扇結鈎黨私為盟歃以取科第而聲名動天下或鈎托隱慝嘲為篇詠以列於道路迭相談訾無所不至焉難進論李翰賔有囊錦握蘭韜劒懷玉介然獨立默而無言主人怪而問之曰僕觀今之士君子所求速進體必盡飾而足下望問若有疑造庭若有懼隱文彩匿芬芳掩光暉潛穎利此何謂也豈有以哉客曰夫順時而動嘉會不可以智求藏器於身知己不可以力致有道足輔天地而不用於人行足應神明而不信於俗僕所以候寬和之色伺清晏之間願因左右思待擯介或沒齒不遇豈直斯須之頃與主人曰僕方運思量深遊精絶逺巨蚌潛於溟海剖而探其珠靈龜巢於嘉林灼而訪其兆而况同聲相應同氣相求者乎蟋蟀候秋而吟蜉蝣乘隂而出豈借援於左右求容於儐介哉而足下牽流議於俗忽常道之要豈安彼詭隨昧而不察兹理將有所感激憤而為此言乎客曰主人可謂知其一未知其二夫察言觀行下之所以上達言有邪正百慮糾紛行有是非萬變舛錯憂虞不可以一徑驗悔吝不可以一理徴士固有上不援下無黨禮義以為干櫓忠信以為甲胄見利不虧其分見害不更其守杖必然之畫恥干節而進則有從俗浮沉與物厚薄潔其衣服矜其車徒俯仰權貴之門逶迤冨利之室人玩其飾孰察其心然則矩步規行不如由徑之速達一辭三讓不如茍合之易親據邀乘邪是有先鳴之勢難進易退但積後時之悲此主人所冝察者一也士固有履敦懿佩禮文漸漬德教之泉栖息道素之域然而委身草莾沉迹蓬茨位末名卑譽不聞於左右含光蓄鋭價不動於當時雖折節求容毁方取合行衰於寡黨才蔽於世人復有養髙釣名之徒勳餘戚裔之位歷玄闕排朱門燕翼鳳翔乞言鄒枚之口虎皮羊質假論崔馬之談而悠悠者莫不望景星奔籍響風靡夫向聲背實人之常情索隱探微代所希及田父獲玉驚輝廡之暉靈蛇獻珠貽按劒之怒然則遵古人懿業類芻狗之已陳道先王法言比屠龍而莫用此主人所冝察者二也固有聚精會神盡智畢議謀於未兆慮於未形探玄妙之源養浩然之氣冥立羣情之表獨與大道為鄰復有騁變效竒侈談詭論文雕琢之辨縱煒燁之詞不思作則垂訓期於動聽駭目夫繁聲奪雅令色惑真綆短不可以汲深禇小不可以懷大曲彌髙而和寡技逾下而賞多此主人之所宜察者三也士有作矜莊之色厲耿介之辭披苦懷揚憤思悉精鋭貢忠誠矯枉推直深言切詳𢎞其體防剪一作翦其淫侈復有事無可否順之如流言無是非應之如響博訪逺引不綜成敗之幾虛美飾非但以苟容為度夫吉人之辭寡躁人之辭多頌德記功易以藻飾間邪介疾或犯忌諱逆耳之談容之者少利口之説恱之者多然則辨佞進而登庸忠蹇退而獲戾此主人之所宜察者四也士固有懷經濟之略藴弼諧之才而擬非其倫履失其位皆屑屑聚論者騰喧咋之辭連袂並驅者效趨走之技龍冀補鼠非所騁其逸足牛鼎烹雞豈傷殊於常器然則含章秀發祕思混而不分默識玄通幽旨隱而莫啓此主人之所宜察者五也士固有當理以言由一作申方以進而關梁非所鑿枘異冝或以小人所長乘於君子所短或以己所未遑一作達不信人所能然則道源蔽而不通心境曠而不接辨雖博萬物不能釋其疑辭智雖絡天地不能效其長䇿故語曰誰能為之孰令聽之此主人之所宜察者六也且夫春樹桃李秋收其實春樹闕茨夏蒙其刺生實未成同為后土所生俱沐陽和之施不殖不藝終嵗闕甘旨之豐不芟不耘毫末成尋拱之患亮明才士之智匡時尊主之臣可不熟計其吉凶深究其得失乎而或安於近禁玩於浮名忘至理而恱侈言貴辨偽而惡切直外恃位以陵物內自負而輕士譬猶廢東作而待嵗馳北轅而適越是以𢎞奬之意未嘗異取舍之要未嘗周疑作同徒有好賢之名終無用賢之實亦良可悲矣安在其進乎主人曰若然者行不必達言不必揚賢人沉抑以為常良士無登進之理將何以革此弊而求其通乎賔曰何為其然也闕揚振風以扇物清濁必效其響懸明鏡以鑒形美惡無隱其象茍能坦其量清其心先公而後私捨名而責實得意而忘象逺佞而納忠則君子可知不仁者逺於是循夷途以招絶迹總修林以刈翹楚則何才不舉何藝不揚是知行藏有宜取捨有分為仁由已芝蘭雖幽而自芳子茍好之珠玉無脛而自至審此要也夫何問焉主人矍然謝賔而退齋居三日罷鐘鼓逺宴私執謙下之心去驕伐之色夢想正士飢渴直言然後備禮延賔升堂而訪焉言行計從於是家安而國治一作理矣六逆論栁宗元春秋左氏言衛州吁之事因載六逆之説曰賤妨貴少陵長逺間親新間舊小加大淫破義六者亂之本也豫謂少凌長小加大淫破義是三者固集有誠字為亂矣然其所謂賤妨貴逺間親新間舊者集有雖字為理之本可也何必曰亂夫所謂賤妨貴者蓋斥言擇嗣之道子以母貴者也若貴而愚賤而聖且賢以是而妨之其為理本大也集作矣而可捨之以從斯言乎此其不可固也夫所謂逺間親新間舊者蓋言任用者之道也使親而舊者愚逺而新者聖且賢以是而間之其為理本亦大矣又可捨之以從斯言乎此其不可固也必從斯言而亂天下謂之師古訓可乎此又不可者也嗚呼是三者擇君置臣之事天下理亂之大本也為書者執斯言著一定之論以遺後代上智之人固不惑於集作于是矣自中人而降守是以為大據而以致敗一作賊亂者固不乏焉晉厲死而悼公入乃理宋襄嗣而子魚退乃亂貴不足尚也秦用張祿而黜穰侯乃安魏相成璜而踈吳起乃危親不足與也符氏進王猛而殺樊世乃興胡亥任趙髙而族李斯乃亡蜀本作滅舊不足恃也顧所信何如耳然則斯言殆可以廢矣噫古之言理者罕能盡其説建一言立一詞則􅑶危瓦而不安謂之是可也謂之非亦可也混然而以集作已教於後世莫知其所集有以字去就明者慨然將定其是非則拘儒瞽生相與羣而咻之以為狂為怪而欲世之為集作多有知者可乎夫中人可以及化者天下為不少矣然而罕有知聖人之道則固為書者之罪也守道論或問曰守道不如守官何如對曰是非聖人之言傳之者誤也官也者道之器也離之非也未有守官而失道守道而失官之事者也是固非聖人之言乃傳之者誤也夫皮冠者虞人之物也物者道之凖也守其物由其凖而後其道存焉茍舍之是失道也凡聖人之所以為經紀為名物無非道者命之曰官官是以行吾道云耳是故立之君臣官府衣裳輿馬章綬之數會朝表著周旋行列之等是道之所存也則又示之典命書制符璽奏復之文參伍殷輔陪臺之役是道之所由也則又勸之以爵祿慶賞之美懲之以黜逺鞭撲桔拳斬殺之慘是道之所行也故自天子至于庶民咸守其經分而無有失道者和之至也失其物去其凖道從而喪矣易其小者而大者亦從而喪矣古者居其位思死其官可易而失之哉禮記曰道合則服從不可則去孟子曰有官守者不得其職則去然則失其道而居其官者古之人不與也是故在上不為抗在下不為損矢人者不為不仁函人者不為仁率是集作其職司其局交相致以全其功集作工也易位而處各安其分而道達於天下矣且夫官所以行道也而曰守道不如守官蓋亦喪其本矣未有守官而失道守道而失官之事者也是非聖人之言傳之者誤也果矣天爵論栁子曰仁義忠信先儒名以為天爵未之盡也夫天之貴斯人也則付剛健純粹於其躬倬為至靈大者聖神其次賢能所謂貴也剛健之氣鍾於人也為志得之者運行而可大悠久而不息拳拳於得善孜孜於嗜學則志者其一端耳純粹之氣注於人也為明德之者爽達而先覺鑑照而無隱肫肫於獨見淵淵於默識則明者又其一端耳明離為天之用恆久為天之道舉斯二者人倫之要盡焉是故善言天爵者不必在道德忠信明與志而已矣道德之於人猶隂陽之於天也仁義忠信猶春夏秋冬也舉明離之用運恆久之道所以成四時而行隂陽也宣無隱之明著不息之志所以備四美而冨道德也故人有好學不倦而迷其道撓其志者明之不至耳有照物無遺而蕩其性脫其守者志之不至耳明以鑒之志以取之役用其道德之本舒布其五常之質充之而彌六合播之而奮百代聖賢之事也然則聖賢之異愚也職此而已使仲尼之志之明可得其集作而奪則庸夫矣投集作授之於庸夫則仲尼矣若乃明之逺邇志之恆久庸非天爵之有級哉故聖人曰敏以求之明之謂也為之不厭志之謂也道德與五常存乎人者也克明而有恆受於天者也嗚呼後之學者盡力於所及焉或曰子之所謂天付者若開府庫焉量而與之耶曰否其各合乎氣者也莊周言天曰自然吾取之王言論李德裕夫帝王與羣臣言不在援引古今以飾雄辨唯在簡而當理雄辨不足以服姦雄之心唯能塞諍臣之口昔田蚡蜀本有為字請考工地益宅武帝曰遂取武庫衛集有武字非將軍言郭解家貧又曰布衣權至使將軍知此其家不貧殷仲文言音樂好之自解宋祖曰吾只恐解此謂簡而當理足使姦臣奪心邪人破膽矣余歷事六朝弼諧二主文宗辭皆文雅而未嘗騁辨武宗言必簡要而不為文飾皆得君人之量能盡臣下之辭豈唯王言如是人臣亦當然也其有辨若波濤辭多枝葉文經意而飾詐矯聖言以蔽聰此乃姦人之雄遊説之事集作士焉得為之獻替哉為文粹有人字臣者當戒於斯慎於斯必不獲罪於天矣豪俠論袁盎汲黯皆豪俠者也若非氣蓋當世義動明主豈有是名哉袁盎曰緩急人所有故善劇孟匿季心英華作布非汲黯好遊俠任氣節故乃善灌夫所以知其然也余以集無此字斯言豈􅑫妄發揚子所謂孟軻之勇類於是矣夫俠者蓋非常人也雖然以諾許人必以節義為本義非俠不立俠非義不成難兼之矣所謂不知義者感匹夫之交據集作校是君父之命謂貫髙危漢祖者是也所與集作利者邪所害者正為梁王殺袁盎者是也此乃盜賊耳焉得謂之俠哉唯鉏麑不賊宣孟承基不忍志寧紇于承基為承其乾賊于志寧見其執喪盡哀不忍害之斯為直俠矣淮南王憚汲黯以其守節死義所以易公孫𢎞如發蒙耳黯實氣義之兼者士之任氣而不知義皆可謂之盜矣然士無氣義者為臣必不能死難求道必不能出仕近代房孺復問徑山大師欲習道可得至乎徑山對曰學道者唯猛將可也身分首裂無所吝集作顧惜由是而知士之無氣義者雖為桑門亦不足觀矣君集作臣子論士之有氣志而思冨貴者必能建功業有氣志而輕爵祿者必能立名節二者雖其志不同然時危世亂皆人君之所急也何者非好功業不能以戡亂非重名節不能以死難此其梗槩也好功業者當理平之世或能思亂唯重名節者理亂皆可以大任平淡和雅世所謂君子者居平必不能急病理煩遭難亦不能捐軀濟危可以羽儀朝庭潤色名教如宗廟瑚璉園林鴻鵠雖不為人常用而自然可貴也此謂王濛劉真長之儔然世亦有不拘小節集作疵而能全大節者如陳平背楚歸漢漢王疑其多心令護諸將又疑其受金可謂不能以名節自固矣及功成封侯辭曰非魏無知臣安得進漢髙祖曰若子可謂不背本矣其後竟誅諸吕以安漢集作劉氏漢比集無此字近世宰相上官儀詩多浮艷時人稱為上官體實為正人之所病及髙宗之初竟以謀廢武后心存王室至於宗族受禍郭代公倜儻不羈之士也少不以名節自檢當蕭岑內難保護睿宗雖履危機竟全臣節則名節之間不可以一槩論也陳平能不背魏無知所以必不負漢王矣今士之背本者人君豈可保之哉文苑英華卷七百五十九
