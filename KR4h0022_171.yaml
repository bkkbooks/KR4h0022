body:
  text: 文苑英華卷一百七十一宋李昉等編應制四巡幸二扈從附早登太行山六首瓊嶽頓三首經河上公廟四首南出雀鼠谷十二首行次成臯四首早發三鄉山行初出洛城一首謁玄元廟一首經鄒魯廟三首行至溫湯七首扈從回鑾頓一首登會昌山二首扈從酬和十二首早登太行山中言志唐玄宗附見張説集清蹕渡河陽凝笳上太行火龍鳴集作明鳥道鐵騎繞羊腸非集作白霧埋隂壑丹霞助曉光澗泉含宿凍山木集作草帶餘霜野老茅為屋樵人薜作裳宣風問耆艾敦俗勸耕桑涼德慙先哲徽猷慕昔皇不因今展義何必冒垂堂奉和聖製早登太行山中言志應制張説六龍鳴玉鸞集作鑾九折步雲端河絡集作眷南浮近山經北上難羽儀映松雪戈甲帶春寒百谷晨笳動千巗曉仗攢皇心感韶節敷藻念人安既立省方館復建禮神壇扈蹕參天老承榮忝夏官長勤百年意思見一勝殘同前張嘉貞明發扈山顛飛龍髙在天山南平對鞏山北逺通燕瞻彼岡巒峻馮兹士馬妍九旗行若砥萬谷輾如川羅網開三面閭閻問百年澤將春雪比文共曉星連徯后逢今聖登台謝曩賢唯餘事君節不讓古人先同前張九齡孟月攝提貞乘時我后征晨嚴九折度暮戒六軍行日御馳中道風師卷太清戈鋌林表出組練雪間明動植希皇豫髙深奉睿情陪逰七聖列望幸百神迎氣色煙猶喜恩光草尚榮之罘稱萬嵗今此復同聲同前蘇頲北山東入海馳道上連天順動三光注登臨萬象懸俯觀河內邑平指洛陽川按蹕夷關險張旗亘井泉曉嚴中警折春事下搜畋德重周王問歌輕漢集作魏后傳宸逰鋪令典睿思起芳年願以封書奏廽鑾禪肅然同前苗晉卿金吾戒道清羽騎動天聲砥路方南絶重巗始北征關樓前望逺河邑下觀平喜氣廽輿合祥風轉斾輕祝堯三老至會禹百神迎月令農先急春搜禮後行仍親后土祭更理晉陽兵不似勞車轍空留八駿名奉和次瓊嶽頓應制張九齡見集本山祇亦望幸雲雨見靈心嶽館逢朝霽關門解宿隂咸京天上近清渭日邊臨我武因冬狩何言是即禽同前李林甫東幸從人望西巡順物回雲收二華出天轉五星來十月農初罷三驅禮復開更看瓊嶽上嘉氣接神臺同前韋濟陸海披晴雪千旗獵早陽嶽臨秦路險河繞漢垣長行漏通鳷鵲離宮接建章都門信宿近歌舞扈周王經河上公廟唐玄宗附見張説集昔聞有耆叟河上獨遺榮迹與囂塵隔心將道德并詎以天地纍寧為寵辱驚矯然遡集作翔寥廓如何屈堅貞玄玄妙門啓肅肅祠宇清冥漠無先後那能紀集作記姓名奉和經河上公廟應制張説見集本河上無名老知非漢代人先探道德要留待聖明辰玄妙為天下清虗用谷神化將和氣一風與太初鄰靈廟觀遺象仙歌入至真皇心齊萬物何處不同塵同前張九齡昔日集作者河邉叟誰知隱與仙姓名終不識章句此空傳迹為坐忘晦言由強著宣精靈竟何所祠宇獨依然道在紆宸眷風行動睿篇從兹化天下清淨復何先同前蘇頲河流無日夜河上有神仙輦路常經此壇場即宛然下疑成洞穴髙若在空煙善物遺方外和光繞集作枕道邉事因周史得言向集作與漢皇傳喜屬膺期聖邦家業又玄扈從南出雀鼠谷張説見集本豫動三靈贊時巡四海威硤關凌曙出平路半春歸霍鎮迎雲罕汾河送羽旗山南柳半密谷北草全稀遲日宜華蓋和風入夾衣上林千里近應見百花飛答張説南出雀鼠谷唐玄宗雷出應集作􅈾乾象風行訓集作順國人川途猶在晉車馬漸歸秦背硤集作陜關山險橫汾鼓吹震集作頻草依陽谷變化待北巗春聞有鵷鸞客清詞雅調新求音思欲報心迹竟難陳自此篇至趙冬曦共十一首並附見張説集奉和聖製答張説南出雀鼠谷宋璟秦地雄西夏并州近北胡禹行山啓路王在邑為都忽見集作視寒暄隔深思險易殊四時宗伯敘六義宰臣鋪徴作宮嘗應星環日每紆盛哉逢合道良以致亨衢同前蘇頲雨施巡方罷雲從訓俗廽密途汾水衛清蹕晉郊陪寒看集作著山邉靜集作盡春當日下來御祠玄鳥應仙仗緑楊開作頌音傳雅觀文色動台更知西向樂宸藻叶鹽梅同前王丘襟帶三秦接旗常萬乘過陽源淑氣早隂谷沍寒多花縟前茅仗霜嚴後殿戈代集作戌雲開晉嶺江鴈入汾河北土分堯俗南風動舜歌一聞天樂唱恭逐萬人和同前袁暉魏國山河險周王警蹕廽九旗雲際出萬騎谷中來石岸行將盡煙郊望忽開賞矜垂栁拂春畏落花催興逸橫汾體恩褒作頌才小臣瞻日月延首詠康哉同前崔翹硤路繞河汾晴光拂曙氛笳吟中嶺樹仗入半峯雲頓覺山原盡平看邑里分早行芳草逺集作未晚憩好風薰嘉頌推英宰春逰扈聖君共欣乘睿渥日月照天文同前張九齡設險諸侯地承平聖主巡東君朝二月南斾擁三辰寒出重關盡年隨行漏新瑞雲叢捧日芳樹曲迎春舞詠先馳道恩華及近集作從臣汾川花鳥意併捧屬車塵同前王光庭省俗恩將遍巡方路稍廽寒隨汾谷盡春逐晉郊來雲騎傳行漏煙旄引從臺惠風初應律和氣正調梅雅頌通宸詠集作禁天文接曙陪集作台灞陵桃李色應待日華開同前席豫鳴鸞初幸代旋蓋欲橫汾山盡千旗出郊平五校分前林巳暄景後壑尚寒氛風送簫韶曲花迎集作鋪黼黻文鹽梅推上宰禮樂統中軍獻賦紆天札飄颻飛白雲同前梁升卿何意重關道千年遇聖皇幽林承睿集作惠澤間谷見清光日御先途逺山靈獻夀長寒雲入晉薄春樹隔汾香國佐同時雨天文屬嵗陽從來漢家盛未若此巡方同前趙冬曦軒轅膺集作應順動力牧正趨陪道合殷為礪時行楚有材省方西禮設振旅北京集作方廽地理分中壤天文照上台寒依汾谷去春入晉郊來竊比康衢者長歌仰大哉行次成臯途經先聖擒建德之所緬思集作懷功業感而賦詩唐玄宗附見張説集有隋政昏虐羣雄巳交爭先聖按劍起叱吒風雲生飲馬河洛竭作氣嵩華驚克敵睿圖就擒俘帝道亨顧慙嗣寶厯恭承天下平幸過翦鯨地感慕神且英奉和行次成臯應制張説見集本夏氏階隋亂自言河朔雄王師進榖水兵氣臨山東前掃成臯陳却下洛陽宮義合帝圖起威加天宇同軒臺百年外虞典一巡中戰龍思王業倚馬賦神功同前張九齡天命誠有集王業初惟艱剪商自文祖夷項在兹山地識斬蛇處河臨飲馬間威加昔運往澤流今聖還尊祖頌光集作先烈賡歌安用攀紹成即我后封岱出天關同前蘇頲漢東不執象河朔方鬬龍夏滅漸寧亂唐興終奮庸皇威正赫赫兵氣何胸胸用武三川震歸淳六代醲成臯覩王業天下致人雍集作雍即此巡于岱曽孫受命封奉和早發三鄉山行應制張九齡羽衛森森西向秦山川歷歷在清晨晴雲稍卷寒嵓樹宿雨微消御路塵微集作能聖德由來合天道靈符即此應時巡遺賢一一皆羈致猶欲髙深訪隱淪奉和聖製初出洛城前人東土淹龍駕西人望翠華山川祇徇集作詢物宫觀豈為家十月廽星斗千宮捧日車洛陽無怨思巡幸更非賖奉和謁玄元皇帝廟齋應制前人興運昔有感建祠北山巔雲雷初締構日月今悠然紫氣尚蔥集作蓊鬱玄元如在前逮兹事追逺輪奐復增鮮洞府香林處齋壇清漢邉吾君乃尊祖夙駕此留連樂動人神會鐘成律度圓笙歌下鸞鶴芝草聚靈仙曽是福黎庶豈唯味虗玄賡歌徒有作微薄謝昭宣經鄒魯祭孔子而歎之唐玄宗附見張説集夫子何為者栖栖一代中地猶鄒氏邑宅即魯王宮嘆鳯嗟身否傷麟怨道窮今看兩楹奠當與夢時同奉和聖製經鄒魯祭孔子而嘆應制張説見集本孔聖家鄒魯儒風藹典墳龍驂過舊宅鳯德咏餘芬入室神如在升堂樂似聞懸知一王法今日待明君奉和經孔子舊宅應制張九齡見集本孔門太山下不見登封時徒有先王法今為明主思恩加萬乘幸禮致一牢祠舊宅千年外光華空在兹惟此溫泉是稱愈疾豈豫獨受其福思與兆人共之也乘暇巡逰乃言其志唐玄宗附見張説集桂殿與山連蘭湯湧自然隂崖含秀色溫谷吐潺湲績為蠲邪著功因飬正宣願言將億兆同此共昌延奉和溫泉言志應制張説溫谷媚新豐驪山橫半空湯池薰水殿翠木暖煙宮起疾逾仙藥集作迎仙操無私合聖功始知堯舜德心與萬人同扈從溫泉宮獻上集作詩前人溫泉啓蟄地氤集作氛氲渭浦歸鴻日數羣騎仗聮聮環北極鳴笳步步引南薰林間綵殿籠佳氣山上朱旗繞瑞雲不知逺望華胥國何如親奉帝堯君宿直溫泉宮羽林獻上集作詩前人冬狩美秦正新豐樂漢行星沉玄武閣月對羽林營寒木羅霜仗空山響夜更恩承靈液暖節效古松貞文武皆王事輸心不為名雜言奉和聖製溫泉歌張九齡有神物待聖人去後溫還冷來時樹亦春今兹十月自東歸羽斾逶迤上翠微溫谷蔥蔥佳氣色離宮奕奕斗光輝臨渭川近天邑浴日湯集作溫泉復在兹羣仙洞府那相及吾君利物心玄澤浸蒼黔漸漬神湯無疾苦薰歌一曲感人深幸鳯泉湯唐玄宗附見張説集西狩觀周俗南山歷漢宮薦鮮知路近省斂覺年豐隂谷含神㸑湯泉養聖功益齡仙井合愈疾醴源通不重鳴岐鳯誰矜陳寶雄願將無限澤霑沐衆心同奉和幸鳯泉湯應制張説周狩聞集作因岐禮秦都辨鳯集作雍名獻禽天子孝存老聖皇一作泉情溫潤宜冬幸逰畋樂嵗成湯雲出水殿暖氣入山營坎意無私劫乾心稱物平帝歌流樂府溪谷也增榮扈從廽鑾頓應制蕭華粵自秦京日議乎封禪難豈知陶唐主道濟蒼生安惟彼烈祖事增修實榮觀聲名朝萬國玉帛禮三壇纂聖德重光建元功載刋仍聞舊馳道不記昔廽鑾羽衛搖晴日弓戈生早寒猶思檢玉處却望白雲端奉和登會昌山應制孫逖巗磴列雲旗吾君訪道時乾行萬物覩日馭集作駐六龍遲望逺回天顧登髙動睿詞願同山作夀長保運昌期同前趙起睿想入希夷真遊到具茨玉鸞登陳逺雲輅出花遲泉壑凝神處陽和布澤時六龍多順動四海正雍熙扈從和周記室從駕曉發合璧宮李嶠濯龍春苑曙翠鳯曉旗舒野色開煙後山光淡月餘風長笳響咽川迥騎行疏珠履陪仙駕金聲動萬車扈從還洛呈侍從羣臣前人四海帝王家兩都姬漢室觀風昔來幸御氣今旋蹕雷奮六合開天行萬乘出玄真疑作冥奉時駕白帝參戎律後隊鳴笳簫前驅嚴罕罼輝光射東井號令橫西秩帳殿别陽春旌門臨甲乙將交洛城雨稍逺長安日洛鞏雲外來咸秦霧中失孟冬霜霰下是月農功畢天道向歸餘皇情美隂隲行存名嶽禮遞問髙年疾祝鳥既開羅調人更張瑟登原採謳誦俯谷求才術邑罕懸罄貧山無挂瓢逸施恩浹寰宇展義詠文質德澤盛軒逰哀矜深禹恤申歌地廬駭獻夀衢樽溢瑞氣抱氤氲祥颸變蕭飋宗枝旦奭輔侍從王劉匹並輯蛟龍書同簪鳳凰筆陶甄荷吹萬頌勸歸明一歡與道路長顧隨談笑密叨承廊廟舉謬齒夔龍弼意屬大厦成慙非棟隆吉扈從溫泉同紫微黃門羣公泛渭川得齊字蘇頲紅旗映緑荑春仗一作統漢豐西侍蹕扶清道揚舲降紫泥近臨鈞石地遙指釣璜溪岸轉帆飛疾川平棹舉齊傅舟來是用軒馭往應迷興闋菱歌動沙洲亂夕鷖奉和扈從溫泉宮承恩賜浴蔡希周天行雲從指驪宮浴日餘波錫詔同綵殿氛氲擁香溜紗窗宛轉閉春風來將蘭氣衝皇澤去别星文捧碧空自憐遇坎便能止願托仙槎路未通和僕射晉公扈從溫湯王維天子幸新豐旌旗渭水東寒一作逺山天仗裏溫谷幔城中奠玉羣仙坐薰集作焚香太乙宮出逰逢牧馬罷獵有非熊上宰無為化明時太古同靈芝三秀紫陳粟萬箱紅玉醴尊集作王禮遵儒教天兵小戰功謀猷歸哲匠詞賦屬文宗司諌方無闕陳詩且未工長吟吉甫頌朝夕仰清風此詩二百四十二卷重出今巳削去注異同為一作奉和季員外從駕幸湯一作溫泉宫錢起未央月曉度疏鐘步集作鳯輦時從出九重雨集作雪霽山門迎瑞日雲開水殿候飛龍輕寒不入宮中樹佳氣嘗薰仗外峯遙羡枚臯扈仙集作先扈蹕偏承霄漢渥恩濃扈從鳯泉和崔黃門喜恩旨解嚴罷圍之作蘇頲輦路岐山曲儲胥渭水湄教成提將鼓禮備植虞旗不取從畋樂集作敬先流去殺慈舜韶同舞日湯祝盡飛時物應陽和施人知雨露私如何穆天子七萃幾勞師扈從鄠杜間奉呈刑部尚書舅黃門馬常侍前人見本集翠輦紅旗出帝京長楊鄠杜昔知名雲山一一看皆異竹樹叢叢畫不成羽騎相過持袂拂香車欲度卷簾行漢家曽草巡遊賦何似今來扈聖明和姚令公從幸溫湯喜雪張九齡見本集萬乘飛黃馬千金狐白裘正逢銀霰積如向玉京逰瑞色鋪馳道花文拂綵旒願聞吉甫頌不共郢歌儔扈從溫泉奉和姚令公喜雪蘇頲清道豐人望乘時漢主逰恩暉隨霰下慶澤與雲浮泉暖驚銀集作雲磧花寒愛玉樓鼎臣今有問河伯且應留侍從遊宿溫湯宮作李白羽林十二將羅列應星文霜仗懸秋月霓旌卷夜雲嚴更千户肅清樂九天聞日出瞻佳氣叢叢繞聖君扈從御宿池祖詠君王既巡狩輦道入秦京逺樹低槍壘孤峰入幔城寒疏清禁漏夜警羽林兵誰念迷方客常懷魏闕情文苑英華卷一百七十一
