body:
  text: 文苑英華卷五百六十五宋李昉等編賀祥瑞五賀杭州等龍見表一首賀隰州等龍見表一首賀常州龍見表一首賀富平縣龍見表一首皇太子賀白龍見表一首賀麟跡表一首賀東川麟見表一首爲魏州成使君賀白狼表一首中書門下賀文丹國獻白象表一首賀白䑕表一首中書門下賀河陽獲白兎表一首賀白鹿表一首賀白野鷄表一首中書門下賀邢州獲白雀白山鵲表一首中書門下賀興慶池白鸕鷀表一首爲百官賀白鳥表一首賀杭州等龍見并慶雲朱草表許敬宗臣某言臣聞休氣降祥與聖人而合契明靈之貺候昌辰而咸通自五帝寂寥九皇悠緬神龍逃夏后之世一去莫追景靈歇伊帝之朝千齡不嗣逮乎茲日翔驟來儀天道去人何其交際伏惟皇帝陛下化龍疑作隆乾棟施厚大鑪馭三光以照臨摠萬㝢而光宅雖復荒陬之逺億兆之多一物不安則宵衣載惕四夷有罪則納隍興歎日者東師作梗類農皇之夙沙交河阻兵等軒后之獯獫元戎所輶疑大漢申湧醴之竒齊斧裁加昌海效静波之慶既而西師獻㨗東岱希封日告禎機嵗登靈稼表裏禔福彰外平而内成幽顕合符叶天意於人事伏見杭州刺史潘求仁表稱於錢唐縣界見青龍一又江州刺史左難當稱尋陽縣界見青龍二又得汝州及沂州狀稱所部各有慶雲見又延州刺史席辨稱臨貞縣界有朱草生臣等以管窺天之意若曰青者方色宜順動以東廵龍者帝閑可騑驂於大輅非煙五色雜雲旗於翠華朱草三英代靈芽於芳籍豈非以茲幽㫖警寤皇情促升中以奉髙與臣等自慶一生預逢千載雖復仲尼將聖恨出圗之未期夷吾大賢嗟比翼之難致羣臣庸昧竊譬古人幸遇休明勝之多矣披祥溢目觀祕驚心庇大厦以相歡荷施生而罔謝無任鳬藻之至賀隰州等龍見表臣某等言臣聞狥齊御極𤣥滬疑作扈表其麝鳯文思則天黄河貺其龍馬是知利充於物乾坤應而合符行出於身明靈感而幽賛伏惟皇帝陛下道登䆳古功濟懐生發軫升陑墾災出漢書除害坐玉帳振金鼔運天機掩區縣然後散服林塞偃伯靈䑓羈左袵以長纓同文軌於遐裔禮高年以執酒酳闕通孝敬於神明猶且昧旦丕顯凝旒庶政臨草纓而罪已削金諜以勝殘化洽風移禮脩樂備是以百靈効職四海夷波物不疵癘人無啙窳烟雲動色星辰叶契儀雙觡之駿奔奠飛甘之清醴黄金掞彩紫玉摛英粤自離陸之前其事無得而聞羲軒之降書契可畧而詳焉未有茂實鴻名若斯光大休徴美端疑作瑞如此感通伏見隰州刺史表裏疑異度表稱某月日青龍見隰州城北大四五圍長八九丈謹按瑞應圖云青龍水之精乘雨而下不處深泉王者有仁則出竊惟升雲騰霧孔氏論而不知凌江貟舟疑作負舟大禹對而猶懼豈如丹文緑錯驟簡皇情或躍且飛亟遊明世蒸哉懿已絶名闕考厯觀圗將何取譬臣等撫躬私抃鼓腹相歡忽以㣲生同沾一作沾天大賚逢物覩之昌運覧天祚之禎符開闢以来未聞斯遇千齡一㑹猶謂比肩何幸之深親承旦暮鷰雀相慶實百常情不勝悦豫之至賀常州龍見表臣某言臣聞聖人作而萬物覩神靈滋而百寳用是以飛龍御天五雲勝彩潜龍涵池四海夷波軒帝由其受圗太昊以之爲紀莫不㳺泳宫沼騑服輿鑾玉牘丹文與㑹昌而契合金䋲緑錯候休明而降祥伏惟皇帝陛下道極上𤣥功成下武重光煥籙體睿凝圗至徳充於兩儀大孝刑于四海一作表網地張天之謂武制禮裁樂之謂文惟㡬惟深運神樞而不測無爲無事致璇厯於平分故能網絡九重琢磨三代普天之下用至道而不知懐生之倫荷大造而無謝於是湛恩洋溢休氣氤氲上格天下漏泉不私其照日月爲之揚彩不愛其道鱗介所以騰文神物有徴於斯不忒伏見常州别駕終文英表稱所部晋陵縣尉信都叔卿等七人以六月十三日於縣城南雲雨之際見有青龍長數十丈大八九圍久之乃没謹按熊氏瑞應圗曰有仁聖君子在位不肖斥退則見惟皇作極感而遂通惟徳動天逺無不應是使四靈嘉瑞叶千祀之登期五色榮光高萬古之靈貺方且以兹嘉祉造類雲亭頌其徽猷歸功清廟豈與夫魚生露鼎蔡上荷心竹葦凝珠晨昏合璧校其優劣何可同年而語哉臣等運偶明時預聞靈慶不任鳬藻之至賀富平縣龍見表臣某等言臣等歴選前辟皇王之道詳焉遐觀曩載致治之方備矣竊聞垂衣垂拱之世追獯鬻而匪寜乗舟乗橇之期即析支而僅叙堯民有竄徒謂可封湯禱無徴非合一作能具羙道光史册幽賛禎符合擅鴻名俱爲稱首况以括地成象中天作鏡代𤣥功而造物叶神化以開祥取譬前脩豈同年而語矣伏惟皇帝陛下受初或躍嘯命風雲廓彼重昏裁成環晷張維立極不盈少選之間邁五登三度越千齡之表施生靈於動植日用者不知混覆燾於華戎航深者忘逺巍巍乎赫赫乎書契以来未之聞也猶且留神昧旦克念終朝去嵗以膏澤遲時撤八珍而罪已今春以濯枝未降輟萬騎於甘泉狥物爲心憂勤至矣於是天先致感畆積餘粮聖敬日躋虛心効祉近得富平縣令獨孤仁宗奏云十二月一日白龍見乂得沂州刺史李道遷狀云去年二月内景雲出又臣聞之天飛水㳺洞隂陽而不測雲行雨施混神妙而無端龍之謂靈義彰於此至乃千年韓疑慶四和充瑞名叶尭歌色符軒紀卿雲所貺復在於斯陛下挺睿哲之資納明靈之祐是以冲天宛宛貫六位以呈祥秘景紛紛亂五章而發彩故能逺安邇肅理定功成動而弗違告禪展禮闕報功使夫同和之樂與鈞天而並奏無體之禮對上𤣥而比隆超出萬古之前獨立九皇之上道格區宇何其盛歟臣等属㑹昌之辰曲成惠日倏聞嘉瑞再佇升中慶頼之深實兼恒抃不任鳬藻之至皇太子賀白龍見表崔融臣等言伏見某官等奏稱某月日玉山宫西南王谷上有白龍見臣聞天地和平聖人所以乗九五帝王符命神物所以寤黎蒸粤若皇家既髙居而逺望於惟史閣亦舒圗而負璽疑服星辰之冕衮彩奪華蟲建日月之旂常文騰翠鳯出東方而㩀木天下知春臨北荒而御火容光是燭風雨順隂陽和五榖登百寳用豈孫氏所謂出入應命上下以時無道則處有聖則見矣木火中星長風季月詳乎戴禮則帝嚳成龍之時校以河圗是黄軒夣龍之晦裁金别宇挺玉名區宫摸抗殿之基山接陵陽之路翩翩素翼矯矯白鱗果彩霜封風姿雪操一作澡徴鄴城之故事若下神祠探吳郡之遺塵疑過象冗臣聞感通之效人事可尋嘉瑞之來天心容察地稱王谷先題王者之名壤號玉山寳兆南山之固天皇以帝出乎震自天鍾有徳之期天后以致飬乎坤承天得西南之位披圗按諜影響合符漢朝之出在上封特其小者晋國之来從京兆曾何足云唯我后能得之固前王所不逮方使見龍于甸一人繫年月之書豈宜囿龍於池百姓爲朝夕之觀而已臣業謝温文觀聞絶瑞雖四靈爲畜未足以舞之蹈之而萬國歡心敢忘於羙矣盛矣不勝鳬藻之至賀麟跡表李嶠臣某言今月十六日聖上擬檢行安置大像處其夜舊著大像曜儀院内從南行向北緫有八十一麟跡見外無入處内有出蹤靈貺潜開禎符顯發唯此仁獸獨冠毛羣識變知機通靈感化悟金輪之欲轉即見殊祥知玉輦之方逰先呈異跡九九爲數明厯算之無疆濯濯咸歌見休明之有應五蹄顯五方之㑹一角彰一統之符式廣鴻基方𢎞象教昔有鳯巢軒閣纓冕相趨龍止堯壇神祗動色豈若祥開紫掖瑞感𤣥樞發揮萬刼之符幽賛三天之果美超五籍珍越四靈曠千古而不聞超九皇而獨逺臣濫承驅策親覿嘉祥欣慶之情實倍恒品無任抃躍之至謹奉表陳賀以聞伏請頒示天下録付史舘賀東川麟見表張仲素元和七年臣某言伏見劔南東川觀察使潘孟陽奏龍州寳華山中有麟見獨角馬蹄遍身光耀并嘉禾二十二莖至八十九穗麟見與鹿每来同食各畫圗函盛封進者臣聞六合同歸則麒麟至天下和一則嘉禾生伏惟陛下昭事上帝凝情衢室宵與滌慮申旦忘倦大敷至化以永時雍故得希世之祥應我皇運異質卓犖竒彩光明顧步幽巖發聞郡國神物自生於聖日靈編徒載其嘉名况大田之中衆穗斯茂沐以膏澤扇其祥風而後呈彼珍羣承茲共觝必生長畆之秀以明王者之瑞因縁所驗鄭重合符有以識上聖之心兆至和之本徳超千古慶洽無疆日月所均無思不服臣等幸覩休異喜萬恒情無任抃躍之至爲魏州成使君賀白狼表崔融臣某言某月日得所部魏縣申稱得令孟神符諜稱某日得佐吏長夀鄉單守中狀稱隆州長夀兩鄉界有白狼見臣等嘗恐是虛未敢即申因處分諸鄉若有見者輙令繫取某日長夀鄉致仕前㳺擊將軍上柱國朱佛兒於長夀鄉界内逢白狼馴狎無懼人意遂以䋲絡頭繫得隨送者臣謹按瑞應圗云白狼者金狼精也殷湯時䘖鉤入于庭王者仁智明哲即至動準法度即見周宣王時見而犬戎服伏惟皇帝陛下𤣥期兆朕靈命氤氲物類有感而必通符祥不召而緫集金精累爍鼓鑄於隂陽玉毳霜翹騰倚於郊甸應時乃出野心狎而無驚有道則㳺貪性馴而不搏亦何必兕豹可履蚖地可弄者哉徴故事於璇鈐考異聞於玉册出自神符之縣顯符命之通神來於長夀之鄉明久長之益夀重以陛下獨尊三界髙視四天身運明哲動循法度既合周王之時仍彰犬戎之服上𤣥潜驚佛兒来送天尊若曰陛下飬衆生其如二乎善守其忠亦可知矣謹尋令式唯合申䑓臣以尊號初加神聰顯應守文不奏恐爽靈心無任懼悚之至謹冒死遣官奉表稱賀以聞其白狼既非常獸臣未敢即放之山野見令佛児飬飼伏聼進止中書門下賀文丹國獻白象表常衮臣某言今月日内侍董秀至宣進止文丹國王來朝并獻白象十一頭者臣聞春秋二百四十年不紀祥瑞而載異國之朝其在周書亦羙西戎之獻盖重其徳化及逺天下大同也伏惟陛下以至敬事天地以至孝奉宗祀武功以定大難文徳以懐逺人故舊典未載之邦前王不賔之長聲教所隔言語莫通悠悠南溟幾千萬里瞻望中國知有聖人踰海而来歴年方至紳疑冐重阻奔波載馳黄帔餙冠白鐺玩耳伏柔羣象牽置闕前低徊馴擾稽顙屈膝隨萬國而来庭與百獸而率舞如知禮樂之節益盛羽儀之容有以彰仁化𤣥通淳源洽暢至和大順以兆昌期事軼於軒轅跡超於漢代矣臣等謬塵樞近獲覩鴻休伏請宣付史官光照簡䇿無任慶抃之至賀白䑕表臣某言今日内常侍吳承倩宣恩命示臣咸陽縣所進白䑕臣聞王者將致無疆之休必有非常之應臣竊謂䑕者隂類四夷之象白者金精西方之色以西方隂類受制於近郊得非諸戎有納欵之誠中國啟受降之兆也伏惟陛下俯憂黎獻控馭蠻夷能以禮綏孰云力競而晝伏夜動時擾於封疆乗障安邉尚勞於師旅今天且悔禍戎將感恩方委貢於蠻邸遂呈祥於甸邑干戈既息已有明徴鳥雀之来多慙逺瑞臣等忝居近侍獲覩禎符歡抃之誠倍萬恒品中書門下賀河陽獲白兎表權德輿臣某等言今日中使楊明義奉宣進止示臣河陽三城節度使李元淳所奏今月六日於河陽縣城南社壇獲白兎者謹按孫氏瑞應圗曰王者加恩耆老則白兎見又前史所稱多自純孝之本集作感伏惟皇帝陛下誠合天地孝通神明𤣥符嘉祉逺近相屬雖集作惟此瑞獸是稱月精來應昌期皓然雪彩當孟津之壘俯勾龍之壇邦畿士吏駭視歡賀且自前嵗已來中外所列凡在羽毛之族多呈皎潔之祥今八陵園寢脩復斯畢萬國臣寮手足相慶盛儀既展靈貺斯臻幽賛素姿若合符契臣等謬居台鼎倍萬恒情無任慶抃之至伏請宣付史館謹奉表陳賀以聞貞元十四年八月二十二日賀白鹿表令狐楚臣某言臣得進奏院狀報中書門下奏賀於醴泉縣建陵栢城獲白鹿一聖敬日躋禎祥荐至臣某謹按孝經援神契曰王者徳至禽獸則白鹿見伏惟陛下盛徳配天深仁育物和氣交感出爲休徴懿此異獸挺茲竒表在嶠山之側宛是隨仙来魏闕之前如將率舞天下稱述兆人歡慶昔者周因征伐而獲漢自祭祀而臻比今無爲冝有慙徳臣某幸逢昭代獲覩𤣥功欣抃之誠倍百恒品所守有限不獲隨例稱慶闕庭無任屛營踴躍之至中書門下賀白野鷄表臣某言内常侍吳承倩至宣示臣淮南節度使陳少逰所進白野鷄者臣聞聖法天以布氣天表聖以呈祥皆啟廸皇猷發揮至理事均影響必在感通伏惟寳應元聖文武皇帝陛下徳合大和化髙前古休徴異瑞以月繫年方啟疑衍率舞以来儀豈疑重譯疑而作貢臣謹按瑞應圗云王者仁聖旁流四海則見又云祭祀不相踰宴㑹衣服有節則見耿介之性自能馴狎綷雜之姿飜然純素丹立楹檻雪映雕籠時和自叶於禎祥天意實彰於變化豈越裳之獻獨羙於前王而岱宗之精用呈於今貺必然之應幽賛如斯載表太平之符克明柔逺之徳臣謬參樞近獲覩鴻休慶躍之情倍萬恒品中書門下賀邢州獲白雀白山鵲表權德輿臣某等言今日伏奉宣示昭義軍節度使李元淳所進於邢州獲白雀白山鵲各一者謹按孫氏瑞應圗曰王者奉已儉約尊事耆老則白雀見又晋中興書曰天下安寜則見伏惟陛下純儉成化乾坤合符敬彼黄髪感茲霜毳俗既登於夀域事多驗於祥經用應昌時固無虚月昔神雀效祉乾鵲知来或用以紀年或聞諸往載豈比山禽叶質靈貺特殊皎潔異姿追飛交映休嘉所集遐邇同歡臣等忝列台司倍百欣賀無任喜慶之至謹奉表陳賀以聞中書門下賀興慶池白鸕鷀表前人臣某言伏承陛下以去月九日幸興慶池龍堂爲人祈雨忽有一白鸕鷀見於池上衆鸕鷀羅列前後如引御舟明日之夕甘集作㴻雨遂降者伏惟陛下子惠元元躬勤庶政念切時澤䖍於祈禱以陛下如傷之誠上感𤣥貺在烈祖發祥之地下降靈禽潔白異姿翻飛成列若應天意以承宸衷族集作蔟隂雲於一夕灑霈澤於千里疾均影響慶浹公私昔周致白翟徒稱遐邇集作逺漢歌赤鴈亦薦郊廟豈比今日感於至誠瑞諜所無蒸人何幸伏望宣付史册昭示將来臣等備位鼎司倍百懽賀無任欣慶抃躍之至謹奉表陳賀以聞貞元十三年四月十二日爲百官賀白鳥表令狐楚臣某等言臣昨二十三日中書宣武軍節度使臣劉彦佐進白鳥并以鳥及所獻圗示百官臣某伏以殊祥絶瑞有應斯歸絪緼感通難識其朕惟聖徳動於皇天天意勤於聖后則必昭彰肹蠁靈物荐臻流行葦之仁樹太平之業毛羽遂性禽鳥呈祥臣等中賀臣謹按孫氏圗云王者宗廟敬則白鳥至又漢成帝時白鳥集於文武廟黒鳥皆從頗類此圗去年冬十一月履端之始陛下擁萬國驅百靈祀圎丘封天老前一日已孝享於宗廟盡敬致羙竭力精誠悲感之音動於列辟孝敬之極通於神明白鳥之来允答醇至書之史册萬代有詞觀其素彩皓潔丹觜朱距氷霧疑作霜奪色龜龍騰輝參五雲周禮雖有五雲又疑别用事之嘉祥掩百王之能事臣等叨逢昌運累沐殊私親覩太陽之精克叶大君之祉歡躍抃舞手足無從不勝犬馬欣慶之至文苑英華卷五百六十五
