body:
  text: 文苑英華巻六百七十三宋李昉等編幕職下上絳州上官司馬書一首與京西幕府書一首州縣部與雍州崔錄事司馬錄事書一首與夏縣崔少府書一首刑法部上獄中上陳後主書一首獄中上隋髙祖書一首上廵察覆囚使歴城張明府書一首幕職下上絳州上官司馬書王勃月日龍門百姓某謹再拜奉書于司馬上官公足下蓋聞靈化出於窈㝠帝圖寄於寥廓聖人生而萬物覩太階平而四國㑹故曰有非常之后者必有非常之臣有非常之臣者必有非常之績至今雷奔雨嘯風前疑作旋電轉拾青紫於俯仰取公卿於朝夕雲臺廹漢南宫列元宰之圖霜㦸羅門北闕據名臣之第嘗見之矣至若時非我與雄略頓於窮途道不吾行髙材屈於卑勢孔宣父之英逹位未列於陪臣管公明之傑秀名近終於郡屬有時無主賈生獻流涕之書有志無時孟軻養浩然之氣則亦有焉豈非妙造無端盛衰止乎其域神期有待動靜牽乎所遇向使太公失於周伯則旗亭之屠父韓信屈於蕭何則轅門之餓𨽻又焉得鷹揚豹變吐納風雲者哉故曰知與不知用與不用觀夫得失之際亦窮逹之有數乎其有邀時譽忘㢘恥狥茍得設向背於朝廷立縱横於勢利舉三寸之舌屈辱豪門奉咫尺之書逡廵下席皆自謂材足以動俗智足以濟時鐘鼎輝其顧盼冠蓋生其籍甚豈知夫四海君子攘袂而恥之乎五尺微童所以固窮而不為也此蓋莊周有言所以得意而忘象得象而忘言語曰談何容易易稱書不盡言知談之不易而欲言之盡以是思之良可知矣下官者康衢之賤耳嘗聞闕里之言頗挂平輿之目豈不知塵形俗狀游水鏡而多慙抱皷援鼙偶雷門而自失而欲刻鵠飾鳬唐突扃餘疑者邪徒以登山泛海庶測髙深執炬傳螢希增日月三奔九合下官聞管仲之風千載一時君侯受鮑卿之託是以敢陳其徑庭一作挺不然則秋風明月西江留獨徃之因桂嶠松巖南山有不羣之地矧區區者而重髙明之閫閾君侯極天分構振瓊樹而韜霞帯地疏源握珠胎而冠月鱗軒羽殿瑶臺降卿相之榮鵲印蟬簪金社發公侯之始青臯獨唳望鴻漸而翻霞丹穴髙鳴對鵷池而矯霧嚴助以賢良待詔未厭承明汲黯以方正拾遺終榮卧理藩維克振既㕘來暮之歌邦國不空自有康沂之相加以雄材廣度散琬琰於胷懷逸氣遒文運風霜於掌握廹青霄而構舎煙霞之涯涘莫尋振滄渤以流謙江漢之波瀾未測耀靈桂於趙席垂棘知歸辨羣籟於莊軒懸匏自記一作託賔階夕敝清河銷驥贄之虞虚榻晨披心疑禮得龍驅之地方當翊贊宸極羽儀台屛豈徒偃仰州縣勞事藩庭而巳哉借如僕者言不滿於鄉黨聲不出於堂閾東海取樂於簞瓢南山畢志於文史飡花佩葉入蘭室而談𤣥挹露攀霞坐松扃而嘯逸揚子雲之澹泊心竊慕之嵇叔夜之逍遥真其好也未嘗露才揚已飾小智以驚愚假勢憑時託中人而樹迹遍逰天下寒一作容心於將相之門獨守太𤣥側身於名利之境嘗謂奉琴巵於北牖詠詩禮於南陔坐商洛而折一作浙雲英臨江湖而採煙液生願畢矣而屬鸞扃停逸頻虚不次之階鶴板徴賢累發非常之詔天下有道吾豈匏𤓰承逹人一顧之榮辱公車再辟之禮平津侯之博物終屈奉常賈大夫之才名猶逢絳灌况庸者而可免於此乎君侯要津先據圖海盛於當時下官覆簣方勤為山始於今日雖陵深谷變終非入室之賓而晝詠宵吟敢預升堂之列夫以幽明不測尺標見天下之心巨細相傾寸管合羲舒之度豈非道存斯貴理在必亨覇畧近發於輿歌皇圖不隔於芻議故有榮枯絶等奉推轂而欣然年勢不侔受分庭而罔愧風規可接惟君侯體之今古未殊則下官願矣常恨霜松列澗萬尋無罩月之期露草滋山寸莖有梢雲之望斯則聲實困於兼濟才位難於俱立况乎地勢不足以誇俗容貌不足以動人遑遑藪澤安足以奉髙明之咳唾也所冀蠅階賤質附雲足而追飈蚋序輕姿託霜毛而絶海委名勵已蛟鐔伸獨斷之能偶跡當仁驪珠鮮闇投之懼天衢可望指鵬程而三休巨壑難逰伏龍門而一息死罪云云與京西幕府書劉蛻見文粹集本漢武帝聞子虚賦初恨不與相如同時既而復喜其人之在世也若然者居蓬蒿而名聞於天子富貴固不足疑其來爵土固不足畏其大今按其本傳云官則止於使者居家初則甚貧嗚呼有才如相如有好才如武帝然而不逹者蛻知之矣于時武帝以四境為心中國耗弱爵土酬於謀臣金帛竭於戰士雖念一篇之子虚固不能减十夫之口食宜矣蛻也生值當時天下無事以文争勝得居第一獨蛻居家甚困白身三十過於相如者蓋無人先聞子虚於天子今又不然使有聞之於今藩翰大臣則其人自不廢棄老死者也嗚呼時異矣事古矣相如之時雖遇天子不能致富貴于今之時遇藩翰大臣則足以叙材用伏惟執事以文學顯用士之得失無不經於心謂小子之言何如哉州縣部與雍州崔錄事司馬錄事書李嶠月日三原縣尉趙國李嶠謹再拜致書於崔錄事司馬錄公一作事執事嶠聞彩異彰施不足以遇離婁之目聲殊操暢未可以接延陵之耳况乎𤣥黄莫主宫徴舛節將何以移於好事藉賞知音者乎伏惟公等思侔天假道合神契清襟與秋水俱映縟藻共春葩競發風雲感其聲律墻仭深其閫奥羽陵緗簡遥開博綜之門洞庭金石近入鏗鏘之韻固以重規坐右連華史筆深思匠之真筌畢文心之能事嶠學術蕪淺才藝寡薄弓冶遺業獨事斯文而衣冠後進多慙接武頃以三餘暇景四時風月斗酒娛樂嚶鳴感召春還江北時興楚客之謡木落淮南乍動潘生之思有同狂簡無近雅什不意頻降徳音猥垂訪逮恭承嘉惠揣摩虚寡鑒淄水而慙容遵夀陵而恧步但以螢燭光耀尚增輝於暘谷畎澮微流且朝宗於水府敢緣斯義上呈如别大夫攄思空擬於登髙小子裁章顧羞於調下某再拜與夏縣崔少府書安成足下伏聞髙義之日乆矣緬惟徽範䖍想徳音山川濶契風月勞心何嘗不煎九廻苦百慮向清風而披襟仰髙門而企躅然執事者庸詎知哉蓋理或宜符雖違必契物有彚感雖逺必臻龍虎鬱風雲魚龍一作鳥歸林壑同聲相應孔父精微之書同翼共飛馬生通博之史僕竊不遜仰希古人以為天下襟期一作帯非四海兄弟欵平生於千載感氣義一作意氣於一言道或乖膠漆不能同其異志茍合楚越無以異其同萬里比鄰寧須羣聚而㑹百年叶契何必偃伏而逰昔者鍾君西入邀蔣生為臭味延陵北逰欵國僑為舊識斯並未言而信不介而親芬若椒蘭婉同琴瑟何哉誠相期之有素也若下官者落拓無繫支離少合向嘗効一藝於友朋闗一作開一竒於卿相形淪散冗名棄草澤通人未曾接賞談士不以挂言行為誚累動成嗤鄙然敢獻區區之心者徒以螢燭之光不逮日月而禀照之理同涓滴之水無覬江河而體潤之原一也故輙布之於左右以為魏蜀兩俊可復生於今吳鄭兩賢不獨美於古此褊心所度足下豈有意耶且僕智不効於一官謀不周於千慮徳慙季路訴甚伯寮畏此簡書就兹文墨首路之日馳情下風不為燕雀聨翩鴻鵠已逺形留神徃室邇人遐孤此宿心延竚何極然喜遇賢季得抒幽襟直置心許居然目擊竊以通家自任更將覩奥為歡聊下拂塵之榻便登勒銘之座芝蘭在室乆乆逾芳花蕚連枝韡韡交映徒觀其室居閑曠庭草蕪沒髙窓納景宻樹栖煙筵有丘中之琴案多濠上之帙懐情落落無事草𤣥虚館隂隂自然純白此傲吏之遺賞髙人之逺致也加復披玩華藻終朝忘倦珠明玉潤雲蔚霞舒符彩相燭稀聲間起彫逾繪素采奪華蟲之飾韻動旋宫響入飛龍之奏三月忘味疇足為多一朝投筆於是乎在想望光景若覩清顔下官才不逮人學非通敏徒以聞長者之餘論忝好事之末流有時感激斐然牽課但短綆之才嗟於不及挈瓶之智患在屢空頃者闗塞覊遊風塵旅泊抒情歌事畧有短篇未足追踵詞人亦以言其所志竊不自外思簡知音所冀南郢之聲時參委巷東里之潤或被庸章則駑駘獲薦於九方腹背可儔於六翮矣仍恐豚肩禱薄未足享盈車之報犗餌非香不能致吞舟之獲耳僕事巳清白尋就西轅仰承背夏渉秋方期戾止契濶不一作未㑹我勞如何勉敬風猷時敦景行李某諮一作白此篇六百八十七巻重出今削去注異同為一作刑法部上獄中上陳後主書傅縡夫人君陳書作君人者恭事上帝子愛下民南史作黔黎省嗜慾逺謟佞未明求衣日旰忘食是以澤被區宇慶流子孫陛下頃來酒色過度不䖍郊廟之神專媚淫昏之鬼小人在側宦豎弄權見陳書作惡忠直若仇讐視黎民南史作百姓陳書作生民如草芥宫女陳書作後宫曵綺繡廐馬食菽粟百姓離散南史作兆庶流離轉陳書作僵尸蔽野貨賄公行帑藏損耗神怒民南史作人怨衆叛親離恐東南王氣自斯而盡矣後主怒賜死獄中上隋髙祖書于仲文見隋書本傳臣聞春生夏長天地平分之功子孝臣誠人倫不易之道曩者尉廻逆亂所在影從臣任重闗河地居衝要嘗膽枕戈誓以必死廻時購臣位大將軍邑萬户臣不顧妻子不愛身命冐白刃潰重圍三男一女相繼淪沒披露肝膽馳赴闕廷䝉陛下授臣以髙官委臣以兵革于時河南兇冦狼顧鴟張臣以羸兵八千掃除氛祲摧劉寛於梁郡破檀讓於蓼堤平曹州復東郡安城武定永昌觧亳州圍殄徐州賊席毗尉廽將也英華作貔虎非十萬之衆一戰土崩河南蟻聚之徒應時戡定當羣兇問鼎之際黎元乏主之辰臣第二叔翼先在幽州摠馭燕趙南鄰羣冦北捍旄頭内外安撫得免罪戾第五叔智建旟黑水與王謙為鄰式遏蠻陬鎮綏蜀道臣兄覬作牧淮南坐制勍敵乗機勦定傳首京師王諒謙竊據二江叛渙三蜀臣第三叔義受賑朝廷恭行天討自外父叔兄弟皆當重寄或銜命危難之間或侍衛鈎陳之側合門誠欵冀有可明伏願垂泣辜之恩降雲雨之施追草昧之始錄涓滴之功則寒灰更燃枯骨還肉不勝區區之至謹冐死以聞上廵察覆囚使歴城張明府書李嶠月日涇州安定縣尉趙國李嶠謹再拜上書明公足下側聞幽明三光止水洞窮神之察雷電六爻連山繹噬膚之象是以金祗獻序肅帝典於秋霜瑞節宣風播皇華於春澤鷞鳩司讞黄渉疑作沙俟清問之仁神獬推姦素簡飛惠文之筆賔舜門而佇穆指軒郊而靜害分聽之寄其在兹乎伏惟某公孤官授社昻臣疏宗登雅譽於羣鳬照袗黻於瑞鵲青衣西指標玉壘之英詞紫蓋南浮變金陵之間氣若乃地華承懿天才嗣武連十珥於中陽壘雙都於上國遺編默覽粹識表於神聰化池昭業精藝鄰於聖道仙查泊宿懸河通博望之津天口飛鉗鬼谷譚縱横之術文用足矣學而優矣然後銅章底務絃佩維襟泱泱大風汎㳺歌而成韻巖巖崇岫應宓琴而度曲誠招異感春狎仁童徳禪靈遊夜呼神女屬二星齊騖八駿駢驅議馬良規兹承不寃之裔誅狼俊槩是寄埋輪之風廼者繡衣貳日錦傅詢風下璿樞而禀渙劑玉闗而致職宰鮮東夏舊辯淄澠道䑕西源近分涇渭鎬池十朱疑端衡制其輕重清河二天直繩糾其枉紊故使晨雞輟唱於酸吻夜鵲緘謡於苦哀寘棘剗束薪之苛食苗愜甘荼之戮矣嶠西垂之賤吏耳技非専業未始存於劒書迹惟太簡居然弊於刀筆頃以亨衢覩物窮途迷方自谷罕求聲之資挺險無擇隂之暇是用沿流委逝遇抵而止乗日愒景沍隂斯一作期庇而涸鱗不懸於枯肆更想江湖哀羽未摧於墜繳緬窺雲漢退求鄙尚旋顧微軀雖質異鳳毛飾慙豹鞟然嗣徽良冶挹道聖衢至於組織身文筌蹄意象照神交於千載得奥旨於三復貞筠範操秉楛羽以銘丹秀蕤敷簡搴菁華而抒素砥礪希割鉛之効巾緹庶沾玉之資豈期事以命迍跡隨冗擯沉泣與涇泥共滓悲歌將隴泉俱咽彩叨靈鑒觖三獻而孤憤影昧天機懐九方而累悒顧以為探幽詣極𤣥宰之貞分閱秘甄微知音之妙賞且夫清英傃雲出於煨燼之末光華孕日生自泥沙之下是知賤有可尊明眸不忽陋而或寳清耳無遺明公銜綍帝廷彯纓天闕片言之賞飛闞言疑於日署尺一之奏抗陳徳於星階伏冀晰鑒蘭苗綴思茅茹俾夫集螢收曜攀若華而繄疑作翳景射鮒堙流泝扶津而飲液野籟叶編鐘之韻甘黎味和鼎之滋則樹李其緘反抛疑知執昔鯷濵據地抗嘉言於直指龍門蹈閫邀逺好於司𨽻兩賔不嫌於黷進二主無忤於歡接並雕芳憲序灼美清流然則古之望今亦猶今之視昔矣投翰魄沮授簡心馳不宣某頓首文苑英華巻六百七十三
