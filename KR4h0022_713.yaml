body:
  text: 文苑英華卷七百十四宋李昉等編詩集三追昔遊集序一首李賀集序一首唐詩類選序一首唐詩類選後序一首周朴詩集序一首唐風集序一首禪月集序一首顔上人集序一首又玄集序一首追昔遊集序李紳追昔遊蓋歎逝感時發於悽恨而作也或長句或五言或雜言或歌或樂府齊梁不一其詞乃由牽思所屬耳起梁漢歸諌署升翰苑承恩遇歌帝京風物遭讒邪播厯荆楚涉湘沅踰嶺嶠荒陬止髙安移九江泛五湖過鍾陵泝荆江守滁陽轉夀春改賔客留洛陽廉會稽過梅里遭讒者再賔客為分務歸東周擢川守鎮大梁詞有所懷興生於怨故或隱顯不常其言冀知者於異時而已開成戊午嵗秋八月李賀集序杜牧太和五年十月中半夜時舍外有疾呼傳緘書者牧曰必有異亟取火來及發之果集賢學士沈公子明書一通曰我亡友李賀元和中義愛甚厚日夕相與起居飲食杜集作會賀且死嘗授我平生所著歌詩離杜集作雜為四編凡二百二十三首數年來東西南北良為已失去今夕醉解不復得寐即閲理篋帙忽得賀杜集文粹有詩字前所授我者思理往事凡與賀話言嬉遊一處所一物侯一日一夕一觴一飯顯顯焉杜集作然無有忘棄者不覺出涕賀復無家室子弟得以給飬恤問常恨想其人詠杜集作味其言止矣子厚於我與我為賀集序盡道其所由來亦少解我意牧其夕不果以書道其不可明日就公謝且曰世謂賀才絶出於前讓居數日牧深惟公曰公於詩為深妙竒博且復盡知賀之得失短長今實敘賀不讓必不能當公意如何復就謝極道所不敢敘賀公曰子固若是是當慢我牧因不敢復辭勉為賀敘然其甚慚唐杜集文粹無此字皇諸孫賀字長吉元和中韓吏部亦頗道其歌詩雲煙綿聫不足為其態也水之迢迢不足為其情也春之盎盎不足為其和也秋之明潔不足為其清諸夲作格也風檣陳馬不足為其勇也瓦棺篆鼎不足為其古也時花美女不足為其色也荒國陊殿梗莽丘壠不足為其恨怨悲愁也鯨呿鼇擲牛鬼蛇神不足為其虛荒誕幻也蓋騷之苗裔理雖不及詞或過之騷有感怨刺懟言及君臣理亂時有以激發人意乃賀所為無得有是賀復能探尋前事所以深歎恨今古杜集作古今未嘗經道者如金銅仙人辭漢歌補梁庾肩吾宫體謡求取情狀離絶逺去筆墨畦徑間亦殊不能知之賀生二十七年死矣世皆曰使賀且未死少加以理僕奴文粹集夲作奴僕命騷可也賀死後凡十有五年京兆杜牧為其序唐詩類選序顧陶在昔樂官采詩而陳於國者以察風俗之邪正以審王化之興廢得芻蕘而上逹萌治亂而先覺詩之義也大矣逺矣肇自宗周降及漢魏莫不政治以諷諭繫國家之盛衰作之者有犯而無諱聞之者傷懼而鑒誡寧同嘲戲風月取歡流俗而已哉晉宋詩人不失雅頌正直言無避頗遵漢魏之風逮齊梁陳隋德祚淺薄無能激切於事皆以浮艷相誇風雅大變不隨流者無幾所謂亡國之音哀以思王澤竭而詩不作吳公子聽五音知國之興廢非虛謬也國朝以來人多反古德澤廣被詩之作者繼出則有杜李挺生於時羣才莫得而問疑其亞則昌齡伯玉雲卿千運應物益適建况鵠當光義郊愈藉合十數子李白杜甫王昌齡陳伯玉孟雲卿沈千運韋應物李益髙適常建顧况于鵠暢當儲光羲孟郊韓愈張藉姚合挺然頽波間得蘇李劉謝之風骨多為清德之所諷覽乃能抑退浮偽流艷之辭宜矣爰有律體祖尚清巧以切語對為工以絶聲病為能則有沈宋燕公九齡嚴劉錢孟司空曙李端二皇甫之流實繫其數沈佺期宋之問張説張九齡嚴維劉長卿錢起孟浩然司空曙李端皇甫曽皇甫冉皆妙於新韻播名當時亦可謂守章句之範不失其正者矣然物無全工而欲篇詠盈千盡為絶唱其可得乎雖前賢纂録不少殊途同歸英靈間氣正聲南薰之類朗照之下罕有孑遺而取捨之時能無少誤未有遊諸門而英菁畢萃然卷而玷纇全無詩家之流語多及此豈識者寡擇者多實以體詞不一憎愛有殊苟非通而鑒之焉可盡其善者由是諸集悉閲且無情勢相託以雅直尤異成章而已或聲流樂府或句在人口雖靡所紀録而闕疑作關切時病者此乃究其姓家無所失之或風韻標特譏興深逺雖已在他集而汨沒於未至者亦復掇而取焉或詞多鄭衛或音涉巴歈苟不虧六義之要安能間之也既厯稔盈篋搜竒略罄終恨見之不遍無慮選之不公始自有唐迄於近歿凡一千二百三十二首分為二十卷命曰唐詩類選篇題屬興類之為伍而條貫不以名位崇卑年代逺近為意騷雅綺麗區别有觀寧辭披揀之勞貴及文明之代時大中丙子之嵗也唐詩類選後序余為類選三十年神思耗竭不覺老之將至今大綱已定勒成一家庶及生存免負平昔若元相國稹白尚書居易擅名一時天下稱為元白學者翕翕號元和詩其家集浩大不可雕摘今共無所取蓋微志存焉所不足於此者以刪定之初如相國令狐楚李涼公逄吉李淮海紳劉賔客禹錫楊茂卿盧同沈亞之劉猛李涉李璆陸暢章孝標陳罕等十數公詩猶在世及稍淪謝即文集未行縱有一篇一詠得於人者亦未稱所録僻逺孤儒有志難就粗隨所見不可殫論終愧力不及心庶非耳目之過也近則杜舍人牧許鄂州渾洎張祜趙嘏顧非熊數公並有詩句播在人口身沒才二三年亦正集未得絶筆之文若有所别為卷軸附于二十卷之外冀無見恨若須待見全本則撰集必無成功若但泛取傳聞則篇章不得其美已上並無採托蓋前序所謂終恨見之不遍者矣唯歙州敬方才力周備興比之間獨與前輩相近亡歿雖近家集已成三百首中間録律韻八篇而已雖前後敻接或畏多言而典刑具存非敢遐棄又前所謂無慮選之不公者矣嗟乎行年七十有四一名已成一官已棄不懼勢逼不為利遷知我以類選起序者天也取捨之法二十通在故題之于後云耳周朴詩集序林嵩顔子聖聲與日月而不盡黔婁貧譽等江河而共存嗚呼先貧俱足亦顔黔之流而能於詩惜哉不雍容於金馬門踧踖宣尼户乾符七年閩城殞賊悲夫先生名朴字見素生於釣臺而長於甌閩與李建州頻方處士干為詩友一篇一詠鱠炙人口鸑鷟屈軼祥瑞皇家迂避而貧聾瞽不重髙傲縱逸林觀宇宙視富貴如浮雲蔑圭璋如草芥惟山僧釣叟相與往還蓬門蘆户不庇風雨稔不抗歉不變晏如也詩人張為嘗貽先生詩曰到處只閉户逢君便展眉閩之廉問楊公發李公誨中朝重德羽翼詞人竒君之詩召而不往或曰逹寮憐才而子避之何也先生曰二公憐才吾固不往苟或見之以吾之貧恐以攝假之牒見黦耳亦接輿於陵未能加也松蟠鶴翅泥曵龜尾一丘一壑寬于天地先生為詩思遲盈月方得一聫一句得必驚人未暇全篇已布人口有僧樓浩髙人也與先生善捃拾先生遺文得詩一百首中和二年冬十月擕來訪余且驚且喜余欲先生之文與方干齊集畢遂為之序小子以詞賦博挂投疑作技文非所業但直舉其美文靦作者唐風集序顧雲大順初皇帝命小宗伯河東裴公掌邦貢次二年遙者來隱者出異人俊士始大集都下於羣進士中得九華山杜荀鶴集序有人字杜荀鶴拔居上第諸生謝恩日列坐既定公揖生謂曰聖上嫌文教未多杜集作之未張思得如髙宗朝拾遺陳公四字杜集作射洪拾遺陳公子昂作詩出繼杜集作沒二雅馳驟建安削苦澀僻碎略淫靡淺切破艷冶之堅陳擒雕巧之酋帥皆摧撞杜集作幢折角崩潰解𣪚掃蕩詞場廓清文祲然後有戴容州劉隨州王江寧率其徒楊鞭按轡相與呵樂來朝於正道矣以生詩有陳體可以潤國風廣王澤故擢生以塞詔意生勉為中興詩宗生謝而退次年寧親江表以僕故山皆隱者出平生所著五七言三百篇見簡詠其雅麗清苦杜集作省激越之句能使貪吏廉邪臣正父慈子孝兄良弟順杜集作悌人倫紀綱杜集作之紀綱備矣其壯語大言則決起逸發可以左攬工部袂右拍翰林肩吞賈喻八九於胸中曽不蠆芥或情發乎中則極思冥搜遊泳杜集作神遊希夷形兀枯木五聲勞於呼吸萬象悉杜集作貪於抉剔信詩家之雄傑者也美哉裴公之知人為不誣矣於戲旌别淑慝史臣之職也僕幸得杜集無此字為之敘録杜集有乃分為上中下三卷目曰唐風集十二字視其人齒尚壯才力未盡謳吟之興方酣俟其繼作得如周頌魯頌者廣之為唐風集老而益精留次序十三字杜集作别為之次序景福元年壬子夏述禪月集序吳融夫詩之作者善善則詠頌之惡惡則風刺之苟不能本此二者韻雖甚切猶土木偶不生於氣血何所尚哉自風雅之道息為五言七言詩者皆率拘以句度屬對焉既有所拘則演情敘事不盡矣且歌與詩其道一也然詩之所拘悉無之足得放意取非常語語非常意意又盡則為善矣國朝能為歌詩者不少獨李太白為稱首蓋氣骨髙舉不失頌詠風刺之道厥後白樂天為諷諌五十篇亦一時之竒逸極言昔張為作詩圖五層以白氏為廣德大教化主不錯矣至於李長吉以降皆以刻削峭拔飛動文彩為第一流有下筆不在洞房蛾眉神仙詭怪之間則擲之不顧邇來相斆學者靡漫浸淫困不知變嗚呼亦風俗使然君子萌一心發一言亦當有益於事矧極思屬詞得不動關於教化沙門貫休本江南人幼得苦空理落髮於東陽金華山機神頴秀止於荆門龍興寺余謫官南行因造其室每談論未嘗不了於理性自是而往日入忘歸邈然浩然使我不知放逐之感此外商榷二雅酬唱循環越三日不相往來恨疏矣如此者凡期有半上人之作多以理勝復能創新意其語往往得景物於混茫之際然其旨歸必合於道太白樂天既歿可嗣其美者非上人而誰丙辰嵗余蒙恩詔歸與上人别袖出歌詩草一本曰西嶽集後改曰禪月集以為盡矣竊慮將來作者或未深知故題於卷之首時已未嵗嘉平月之三日顔上人集序顧蕘顔公姓薛氏字茂聖少工為五言詩天賦其才逈超名輩蕘同年文人故許州節度使尚書薛公字大拙以文人不言其名擅詩一夲作時名於天下無所與讓唯於顔公許待優異每吟其警句嘗曰吾不喜顔為僧喜有詩僧為吾支派以增薛氏之榮耳性端靜寡合而價譽自彰名公巨人爭識其面余景福間為尚書郎故相國陸希聲為給事中一日謂余曰顔公自荆門惠然訪我興盡而去無以贈其行請於知交賦送别余亦勉為應命而莫之披覩也後數載余罷自合江沿峽流而下至荆之日方遂疑闕二字疑閲其篇章暏其儀相然後知師之盛名不虛得一作傳也向之送别者自故太傅相國韋政公而下凡四十三首余亦别為一卷陸相國為序余繼忝清華荐兼史任宜以師之名字書於文苑傳中編緝未遑漏略是懼今且掇師之序于詩集之前其五言七字詩凡四百篇以為儒釋之光余與師周旋殆將十稔始仰師為詩家之傑今與師為方外之期契分知心言之無愧若師本教之行自為其徒所宗則非愚儒之所敢知也光化三年孟夏序同前李詞夫仁明至儉之君返淳覆邪懲嗜欲玩好俾竒侈捐隱異貢燬烈而不能致純玉而不用者蓋宗廟之彞器在貞逹和潤之全德也故和氏三刖而不死崑岡縱焚而不夷俾受瑞者于今稱其美焉然則稱其美固亦久矣而知其美之名者將在于何焉夫唯詩秦人焚之既燼益恬抑可對於是而又大矣則今之人稱詩之美者亦久矣旨也將在於何焉洎乎得其綱組一作紐序而明之則二南微隱之旨行於世為百家宗旨者在乎序也詷讀左丘明傳素王微旨則知懲勸之道教化之本周孔之標度盡在於詩矣顧詩之言惡可容易而語乎釋門髙德顔公尚為詩不入聲相得失哀樂怨歎直以清寂景搆成數百篇其音清以和其氣剛以逹妙出無象虛涵不為冷然若懸未扣而響信其功之妙也不可得而稱矣信其旨之深也不可舉而言矣於戲河漢蕩蕩而東人見其浮重載矣不知其所以浮者何也雅頌郁郁而南人見其化夷俗矣不知其所以化者何也吾師復不拔於彼植於此其所以者何也詷嘗搜文獵儒乘邱索穴睹師之作異而序之不足舉師之美為後人宗旨也又玄集序韋莊謝玄暉文集盈編止誦澄江之句曹子建詩名冠古唯吟清夜之篇是知美稼千箱兩岐奚少繁絃九變大濩殊稀入華林而珠樹非多閲衆籟而紫簫唯一所以擷芳林下拾翠岩邊沙之汰之始辨辟寒之寶載雕載琢方成瑚璉之珍故知頷下採珠難求十斛管中窺豹但取一斑自國朝大手名人以至今之作者或百篇之內時紀一章或全集之中微徴數首但掇其清詞麗句録在西齋莫窮其巨派洪瀾任歸東海總其記得者才子一百五十人誦得者名詩三百首長樂暇日陋巷窮時聊撼膝以書紳非攢心而就簡蓋詩中鼓吹名下笙簧擊鳬氏之鐘霜清日觀淬雷公之劍影動星津雲間分合璧之光海上運摩天之翅奪造化而雷雲湧起役鬼神而風雨奔馳但思其食馬留肝徒云染指豈慮其烹魚去乙或至傷鱗自慙乎鼴腸易盈非嗜其熊蹯獨美然則律者既採繁者是除何知黑白之鵝強識淄澠之水左太沖十年三賦未必無瑕劉穆之一日百函焉能盡麗是知班張屈宋亦有蕪辭沈謝應劉猶多纍句雖遺妍可惜而備載斯難亦由執斧伐山止求嘉木挈瓶赴海但汲井泉等同於風月煙花各是其樝梨橘柚昔姚合所撰極玄集一卷傳於當代已盡精微今更採其玄者勒成又玄集三卷記方流而目眩閲麗水而神疲魚兔雖存筌蹄是棄所以金盤飲露唯採沆瀣之精花界食珍但享醍醐之味非獨資於短見亦且貽於後昆採實去華俟諸來者光化三年七月二日前左補闕韋莊述文苑英華卷七百十四
