body:
  text: 文苑英華卷五十八宋李昉等編行幸一三月三日華林園馬射賦一首臨層臺賦一首駕幸溫泉宫賦一首駕幸華清宫賦一首駕幸九成宫賦一首駕幸天安宫賦一首駕幸芙蓉園賦一首三月三日華林園馬射賦并序庾信臣聞堯以仲春之月刻玉而逰河舜以甲子之朝披圖而巡洛夏后瑶臺之上或御二龍周王玄圃之前猶驂八駿我大周之創業也南正司天北正司地平九黎之亂定三危之罪雲紀御官鳥司從職皇王有秉歷之符玄圭有成功之瑞豈直天地合德日月光華而已哉皇帝以上聖之姿膺下武之運通乾象之靈啓神明之德夷典秩宗見之三禮夔為樂正聞之九成克已備於禮容威風揔於戎政加以卑躬菲食皂帳綈衣百姓為心四海為念西郊不雨即動皇情東作未登彌回天眷兵革無會非有待於丹烏宫觀不移故無勞於白燕銀甕金船山車澤馬豈止竹葦一作革兩草共垂甘露青赤三氣同為景星雕題鑿齒識海水而來王烏弋黃皮驗東風而受吏于時玄鳥司厯蒼龍御行羔獻氷開桐葉疑作華萍生一作合皇帝幸於華林之園玉衡正而泰階平閶闔開而勾陳轉千乘雷動萬騎雲屯落花與芝蓋同飛楊栁共春旗一色乃命羣臣陳大射之禮雖行祓禊之飲即用春搜之儀止立行宫裁舒帳殿階無玉壁一作甃既異河間之碑户不金鋪殊非許昌之賦洞庭既張承雲乃奏騶虞九節貍首七章正飾五彩之雲壺寧百福之酒唐弓九合冬幹春膠夏箭三成青莖赤羽於是選朱汗之馬校黃金之埒紅陽飛鵲紫燕晨風唐成公之驌驦海西侯之千里莫不飲羽銜竿吟猿落雁鐘鼓震地埃塵漲天酒以罍行肴由鼎進彩則錦市俱移錢則銅山合徙太史聽鼓而論功司馬張旃而賞獲上則雲布雨施下則山藏海納實天下之至樂景福之歡欣者也既而若木將低金波欲上天顧惟穆賔歌惟醉雖復暫離北闕聊宴西城即同酆水之朝更是岐山之會小臣不舉奉詔為文以管窺天以蠡酌海盛德形容豈陳梗槩嵗次昭陽月在大梁其日上已其時少陽春史司職青祗效祥徵萬騎於平樂開千門於建章屬車灑酒復道焚香皇帝翊四圍於帝一作西間翊四校於仙園回六龍於天苑對宣曲之平林望甘泉之長坂華蓋平飛風烏細轉路直城遙林長騎逺帷宫宿設帳殿開筵傍臨細栁斜界宜年開鶴列之陳靡魚鬚之旃行漏抱刻前旌載鳶河湄一作涯剃草渭口澆泉堋雲五色的暈重圓陽管既調春絃實撫揔章協律成均樹羽翔鳳為林靈芝為圃草銜長帶桐垂細乳鳥囀歌來花濃雪聚玉律調鐘金錞節鼓於是咀銜拉鐡逐日追風并試長楸之埓俱下蘭池之宫鳴鞭則汗赭入勒則塵紅既觀賢於大射乃頒政於司弓變三驅而畫鹿登百尺而懸熊繁弱振地鐵驪踏空禮正六耦詩歌九節七札俱穿五豝同穴弓如明月對堋馬似浮雲向埓鴈失羣而行斷猿求林而路絶控玉勒而搖星跨金鞍而動月乃有六郡良家二字一作雄才五陵豪一作髙選新回馬邑之兵始罷龍城之戰將軍戎服來參武宴尚帶一作帶尚流星猶乘一作乘猶奔電始聼鼓而唱籌即移竿而標箭馬噴沾衣塵驚灑面石偃水而澆園花乘風而繞殿熊耳刻杯飛雲畫罍水衡之錢山積織室之錦霞開司筵賞至酒正杯來至樂則賢乎秋水歡笑則勝上春臺既而日下澤宫筵闌相圃悵徙蹕之留歡眷回鑾之餘舞一作武欲使石梁銜箭銅山飲羽橫弧於楚水之蛟飛鏃於吳亭之虎况復恭已無為南風在斯非有心於蜓翼豈留情於戟枝唯觀揖讓之禮蓋取威雄之儀臨層臺賦唐太宗惟萬幾之暇景屏千慮於巖廊玄英移其暮節白日黯其斜光鬱金階兮起霧碧玉宇兮流霜延復道於阿閣啓重門於建章爾乃崇基回一作回搆危簷間出暑終冬臺寒濃夏室望雕軒之拱漢觀鏤檻之擎日柱引桂而圓虛芬舒蓮而倒實霞觀近兮紅逼煙樓遙兮翠密念作者兮為勞愧居之而有逸於是慨然自思情懷不怡雖移新之建址實從故而裁基鑒前王之御世亦因機而化之换卑宫於穴處改巢樹於茅茨何燥濕之殊致乃澆淳之换時有前前之纍改無後後之相師只若阿房𥘉制窮八荒之巧藝甘泉始成極三秦之壯麗工靡日而不勞役無時而暫憩加以長城亘地絶脈遐荒疊鄣峙漢層簷映廊反是中華之弊翻資北狄之強烽才煙而已備河欲凍而先防玉帛殫於帑藏黎庶殞於風霜噴胡塵於渭水騰朔馬於漁陽罄有限之賦斂給無厭之豺狼既陵轢於千古乃虔思於百王屬虛躬之纂武登皇圗而御宇𢎞三䇿於廟堂變千機於狂虜頓王綱於沙漠製雲羅於海浦移種落殄凶渠卷毳帳掃穹廬門無關於地軸户不納於天樞肆黎元於耕鑿一文軌於車書循今蹤兮覽前迹俯層城兮臨太液鑑髙深之外固蕩心神而內益有土木之二勞非干戈之兩役雖復重基數仞異細栁之𥘉營疊岸盈丈開上林而玩兵彼露臺之一儉乃延德於蒼生此崇基之漸泰方起謗於黎氓利懷小而忘大害棄重而思輕是猶蜀侯之貪金喪其國於岷峨智伯之縱辨迷自灌於洪波鑒損益而為寡殊禍福而成多故庸愚之尚志豈賢逹之殊智至若膏雨雲飛八紘廣被信觸類而流澤非有求於報施故為施二字一作故知施而不自務疑作矜者亦成功之大義愛疑作受而不知感者乃悖德之深纍澄遣心意坐怡情抱一德是珍萬物非寶不避辱於真惡豈求榮於偽好既同德而同心共流芳於王一作至道駕幸溫泉宫賦以天下安樂明主宴逰為韻林琨寒郊已暮兮景氣澄鮮遙林罷色兮古岫蒼然我皇將出豫滌思觀風獵賢於是旭月霽野慶雲靄天指鳳城之香陌得驪阜之甘泉乃垂疑作乘雕玉之輿駕飛黃之馬羅霜仗於灞亭之上駐清蹕於泰山之下賦汾水於秋風詠在鎬於周雅若其嚴氣盛隂雲寒氷生巨壑雪滿層巒河海方閉溫泉正湍豈獨鑒天心於曲渚藻聖慮於清瀾洞上善之為信秉至柔之自安伊昔竹殿始秋梧宫未落空望幸之杳眇怨嬉逰之寂寞藝從馥於玉階月虛容於金閣接逺樹於新豐韻曉鐘於長樂皇歡是并品物咸亨逶迤清泚皎潔澄明奏鈞天而寒谷變律陳羽衛而隂飇换晴故能蠲憂除患利用永貞于時澤洽羣臣恩遍區宇野豐一作農擊壤則有頌於康哉帝之何力空𢋫歌于聖主因返斾回鑾逍遙近甸度祥光之蕭索鬱佳氣之蔥蒨鈎陳不改下輦成宴誡軹道而興嗟想磻溪而流盼然後省娛逰之樂念淳朴之儔開靈液之廣潤與萬姓而同休施兔罝於中谷賁束帛於巖幽獨有執戟三道栖遲一丘空想臣朔之列常陪漢武之逰駕幸華清宫賦以溫泉毖湧蕩邪難老為韻韓休惟我皇御宇兮法象乾坤天步順動兮行幸斯存雨師灑路兮九門洞啓千旗火生兮萬乘雷奔紫雲霏微隨六龍而欲散還聚白日照耀候一人兮當寒却溫蓋上豫逰以叶運豈伊沐浴而足論若乃北騎殿後鈎陳啓前辭紫殿而魚不在藻出青門而龍乃見田霜戟森森以星布玉輅迢迢而天旋聲明動野文物藻川月落鳳城已涉於玄灞日生暘谷俄屆於甘泉於是登三休兮憩神轡朝百辟兮禮容備玉堂慿艮面鶉野以髙明石溜象蒙繞龍宫之清毖處無為兮既端拱時或濯兮湯泉湧聖躬清兮聖德廣四目明兮四聰朗與元氣之氛氲如晴空之滌蕩觀夫巍峩宫闕隱映煙霞上一作盤薄鳥道經回日車路一作橫臨八水一作永砌比萬家樓觀排空時既知於降聖忠良在位諒勿疑於去邪儒有鵬無翼風有摶每俟命以居易尚愧身於才難觀國光以舉踵歷華清而展歡不𢋫歌以忭舞夫何足以自安乃為歌曰素秋歸兮玄冬早王是時兮出西鎬幸華清兮順天道瓊樓架虛兮靈仙保長生殿前兮樹難老甘液流兮聖躬可澡俾吾皇兮億千夀考駕幸九成宫賦以順時出豫觀風展義為韻李子卿皇帝握靈符之三一作千載也天地穆清星日輝潤野訪遺逸朝登傑雋化則垂拱而成令則不言而信時巡之儀展秋獮之禮順思訪俗而觀人若乘乾而出震右輔伊邇離宫在兹前瞻鳴鳳之岫傍指神雞之祠渭水煙波接苑中之洲渚岐山雲物落禁裏之軒墀誡疑作俄而回鑾輅載羽旗為宴鎬之樂動橫汾之詞况不勞於百姓而有務於三時者哉由是叶清秋練吉日乘石洗皇輿出七騶按隊千乘扈蹕戈矛林森士馬櫛比始地嶪而天旋終電馳而飆疾翻然而八駿騫騰霍濩而六龍奔逸雷公轉轂風伯按馭朱旗列而秋野生春金甲照而暮川增曙陋漢帝之逰衍哂秦皇之逸豫祥煙不散近飛搶壘之間瑞草常開併拂車宫之處廣陌鳴鑾異彼逰盤訪百年之疾苦知五稼之艱難成王之搜由是問古公之政有以觀翠華來兮野老喜屬車至兮國人歡詎比夫隴塞回中妄開行幸之路泰郊畤上虛立禮神之壇穆然深宫駐蹕其中樓枕嶺而倒影殿當川而抱一作施虹閟邃而寒暑隔岧嶤而雲霧通前視八水傍臨九嵕所以明四目逹四聰凝睿想播玄風比逰心於汗漫侔得道於崆洞亦既下輦於是一作焉端冕補闕政修墜典大風之歌作湛露之恩展於是振旅建旄回鑾返轡百蠻懼威武萬姓知教義若臣者巖穴久服丘園來賁未有燭於皇明竊以覩於人瑞敢獻揚雄之賦庶獲有司之議駕幸天安宫賦吕令問卓哉有唐之開元也拉五帝而軼三皇灑雲雨之雱澤炯日月之重光惠及豚魚則鳥獸咸若化被草木則行葦不傷爾其尚節儉反貞淳照之如日育之如春猶以為震出而亨則隨方而東狩豫順以動則因時而西巡非以肆志放欲蓋乃觀風勞人於是乎天子乃命羣寮考吉日升玉輦馳清蹕霍濩沸渭鏗訇洋溢龍輿馳一作駭地杳空山而自鳴紅旗照天轉洛橋而半出若乃宸襟逺覽睿賞遐宣則野泛佳氣樹生彩煙過澠池而懷古入傅巖而想賢覽唐墟之遺迹嘉舜風之慨然白雲𥘉飛澡秋思於汾水黃河一變濯聖慮於秦川是以問年德一作髙年恤惸獨望秩山浸肆覲羣牧屬車所止罔不清肅乃有邑老田父進而歌曰嵗既稔而時清我后來兮應天行東都士庶扶輪送西土諸侯掃地迎君之德兮德無有路旁勞賚皆牛酒乘輿一至長安城千秋萬嵗南山夀駕幸芙蓉園賦失名紫禁彤庭兮二月春戲蝶流鶯兮百處新借問此來逰幸所是日芳菲最惹人乘桂苑之春晚值芳林之雨霽徵聲都尉之門召舞平陽之第的皪綵仗逶迤羅袂兩兩相看步搖簪一一共鬪承雲髻鳴鑾漸出轉佩相從仙宫萬户層城九重綵扇似月從騎如龍奏清笳於楊栁下天蓋於芙蓉灞川宛轉秦郊綺錯北極儀鳳之樓南鄰隱豹之崿入紅園而移步輦俯緑池而卷行幕鳴管則嬌鳥不飛拂簟則輕花自落留連帳殿彌望帷宫水搖搖而岸花紫煙微微而野樹紅鳴文鷁於波靣奏嬌鶯于掌中千鍾獻堯之酒五絃歌舜之風日落前溪雲垂後殿陌上氣合花間露泫徐飛睿藻再融神盼羣公既奏柏梁文萬乘方廽瑶池宴文苑英華卷五十八
