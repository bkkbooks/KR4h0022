body:
  text: 文苑英華卷五十八宋李昉等編行幸一三月三日華林園馬射賦一首臨層臺賦一首駕幸溫泉宫賦一首駕幸華清宫賦一首駕幸九成宫賦一首駕幸天安宫賦一首駕幸芙蓉園賦一首三月三日華林園馬射賦并序庾信臣聞堯以仲春之月刻玉而逰河舜以甲子之朝披圖而廵洛夏后瑶臺之上或御二龍周王𤣥圃之前猶驂八駿我大周之創業也南正司天北正司地平九黎之亂定三危之罪雲紀御官鳥司從職皇王有秉歴之符𤣥珪有成功之瑞豈直天地合徳日月光華而已哉皇帝以上聖之姿膺下武之運通乾象之靈啓神明之徳夷典秩宗見之三禮䕫為樂正聞之九成克已備於禮容威風揔於戎政加以卑躬菲食皁帳綈衣百姓為心四海為念西郊不雨即動皇情東作未登彌廻天眷兵革無㑹非有待於丹烏宫觀不移故無勞於白鷰銀瓮金舡山車澤馬豈止竹葦一作革兩草共垂甘露青赤三氣同為景星雕題鑿齒識海水而来王烏弋黄皮騐東風而受吏于時𤣥鳥司厯蒼龍御行羔獻氷開桐葉疑作華萍生一作合皇帝幸於華林之園玉衡正而泰階平閶闔開而勾陳轉千乘雷動萬騎雲屯落花與芝蓋同飛楊栁共春旗一色乃命羣臣陳大射之禮雖行祓禊之飲即用春蒐之儀止立行宫裁舒帳殿階無玉壁一作甃既異河間之碑户不金鋪殊非許昌之賦洞庭既張承雲乃奏騶虞九節貍首七章正飾五彩之雲壺寕百福之酒唐弓九合冬幹春膠夏箭三成青莖赤羽於是選朱汗之馬校黄金之埒紅陽飛鵲紫鷰晨風唐成公之驌驦海西侯之千里莫不飲羽銜竿吟猿落雁鐘鼓震地埃塵漲天酒以罍行餚由鼎進彩則錦市俱移錢則銅山合徙太史聽鼓而論功司馬張旃而賞獲上則雲布雨施下則山藏海納實天下之至樂景福之歡欣者也既而若木將低金波欲上天顧惟穆賔歌惟醉雖復暫離北闕聊宴西城即同酆水之朝更是岐山之㑹小臣不舉奉詔為文以管窺天以蠡酌海盛徳形容豈陳梗槩嵗次昭陽月在大梁其日上已其時少陽春史司職青祗效祥徵萬騎於平樂開千門於建章属車灑酒複道焚香皇帝翊四圍於帝一作西閑翊四校於僊園迴六龍於天苑對宣曲之平林望甘泉之長坂華蓋平飛風烏細轉路直城遥林長騎逺帷宫宿設帳殿開筵傍臨細栁斜界宜年開鶴列之陣靡魚鬚之旃行漏抱刻前旌載鳶河湄一作涯薙草渭口澆泉堋雲五色的暈重圓陽管既調春絃實撫揔章恊律成均樹羽翔鳳為林靈芝為圃草銜長帶桐垂細乳鳥囀歌来花濃雪聚玉律調鐘金錞節鼓於是咀銜拉鐡逐日追風并試長楸之埓俱下蘭池之宫鳴鞭則汗赭入勒則塵紅既觀賢於大射乃頒政於司弓變三驅而畫鹿登百尺而懸熊繁弱振地鐵驪蹋空禮正六耦詩歌九節七札俱穿五豝同穴弓如明月對堋馬似浮雲向埓鴈失羣而行斷猿求林而路絶控玉勒而摇星跨金鞍而動月乃有六郡良家二字一作䧺才五陵豪一作髙選新迴馬邑之兵始罷龍城之戰將軍戎服来叅武讌尚帶一作帶尚流星猶乗一作乗猶奔電始聼鼔而唱籌即移竿而標箭馬噴沾衣塵驚灑面石偃水而澆園花乗風而繞殿熊耳刻杯飛雲畫罍水衡之錢山積織室之錦霞開司筵賞至酒正杯来至樂則賢乎秋水歡笑則勝上春臺既而日下澤宫筵䦨相圃悵徙蹕之留歡眷廻鑾之餘舞一作武欲使石梁銜箭銅山飲羽横弧於楚水之蛟飛鏃於吴亭之虎况復恭已無為南風在斯非有心於蜓翼豈留情於㦸枝唯觀揖譲之禮蓋取威䧺之儀臨層臺賦唐太宗惟萬幾之暇景屏千慮於巖廊𤣥英移其暮節白日黯其斜光欝金堦兮起霧碧玉宇兮流霜延複道於阿閤啓重門於建章爾乃崇基廻一作回搆危簷間出暑終冬臺寒濃夏室望彫軒之拱漢觀鏤檻之擎日柱引桂而圓虚芬舒蓮而倒實霞觀近兮紅逼烟樓遥兮翠宻念作者兮為勞愧居之而有逸於是慨然自思情懐不怡雖移新之建址實從故而裁基鍳前王之御世亦因機而化之换卑宫於穴處改巢樹於茅茨何燥濕之殊致乃澆淳之换時有前前之累改無後後之相師只若阿房𥘉制窮八荒之巧藝甘泉始成極三秦之壮麗工靡日而不勞役無時而暫憇加以長城亘地絶脉遐荒疊鄣峙漢層簷映廊反是中華之弊翻資北狄之强烽纔烟而已備河欲凍而先防玉帛殫於帑藏黎庶殞於風霜噴胡塵於渭水騰朔馬於漁陽罄有限之賦歛給無厭之豺狼既陵轢於千古乃䖍思於百王屬虚躬之纂武登皇圗而御宇𢎞三䇿於廟堂變千機於狂虜頓王綱於沙漠製雲羅於海浦移種落殄凶渠卷毳帳掃穹廬門無關於地軸户不納於天樞肆黎元於耕鑿一文軌於車書循今蹤兮覧前跡俯層城兮臨太液鑑髙深之外固蕩心神而内益有土木之二勞非干戈之兩役雖復重基數仞異細栁之𥘉營疊岸盈丈開上林而翫兵彼露臺之一儉乃延徳於蒼生此崇基之漸泰方起謗於黎甿利懐小而忘大害弃重而思輕是猶蜀侯之貪金䘮其國於岷峨智伯之縱辯迷自灌於洪波鍳損益而為寡殊禍福而成多故庸愚之尚志豈賢逹之殊智至若膏雨雲飛八紘廣被信觸類而流澤非有求於報施故為施二字一作故知施而不自務疑作矜者亦成功之大義愛疑作受而不知感者乃悖徳之深累澄遣心意坐怡情抱一徳是珍萬物非寳不避辱於真惡豈求榮於偽好既同徳而同心共流芳於王一作至道駕幸温泉宫賦以天下安樂明主宴逰為韻林琨寒郊已暮兮景氣澄鮮遥林罷色兮古岫蒼然我皇將出豫滌思觀風獵賢於是旭月霽野慶雲靄天指鳳城之香陌得驪阜之甘泉乃垂疑作乘琱玉之輿駕飛黄之馬羅霜仗於㶚亭之上駐清蹕於泰山之下賦汾水於秋風詠在鎬於周雅若其嚴氣盛隂雲寒氷生巨壑雪滿層巒河海方閉温泉正湍豈獨鍳天心於曲渚藻聖慮於清瀾洞上善之為信秉至柔之自安伊昔竹殿始秋梧宫未落空望幸之杳眇怨嬉逰之寂寞芸從馥於玉階月虚容於金閤接逺樹於新豐韻曉鐘於長樂皇歡是并品物咸亨逶迤清泚皎潔澄明奏鈞天而寒谷變律陳羽衞而隂飇换晴故能蠲憂除患利用永貞于時澤洽羣臣恩遍區宇野豐一作農擊壌則有頌於康哉帝之何力空𢋫歌于聖主因返斾迴鑾逍遥近甸度祥光之蕭索鬱佳氣之葱蒨鈎陳不改下輦成宴誡軹道而興嗟想磻溪而流盼然後省娱逰之樂念淳朴之儔開靈液之廣潤與萬姓而同休施兎罝於中谷賁束帛於巖幽獨有執㦸三道栖遲一丘空想臣朔之列常陪漢武之逰駕幸華清宫賦以温泉毖湧盪邪難老為韵韓休惟我皇御宇兮法象乾坤天歩順動兮行幸斯存雨師灑路兮九門洞啓千旗火生兮萬乗雷奔紫雲霏㣲随六龍而欲散還聚白日照耀候一人兮當寒却温蓋上豫逰以叶運豈伊沐浴而足論若乃北騎殿後鈎陳啟前辭紫殿而魚不在藻出青門而龍乃見田霜㦸森森以星布玉輅迢迢而天旋聲明動野文物藻川月落鳳城已渉於𤣥㶚日生暘谷俄届於甘泉於是登三休兮憇神轡朝百辟兮禮容備玉堂慿艮面鶉野以髙明石溜象䝉遶龍宫之清毖處無為兮既端拱時或濯兮湯泉湧聖躬清兮聖徳廣四目明兮四聦朗與元氣之氛氲如晴空之滌盪觀夫巍峩宫闕隠映烟霞上一作盤薄鳥道經廻日車路一作横臨八水一作永砌比萬家樓觀排空時既知於降聖忠良在位諒勿疑於去邪儒有鵬無翼風有摶毎俟命以居易尚媿身於才難觀國光以舉踵歴華清而展歡不𢋫歌以忭舞夫何足以自安乃為歌曰素秋歸兮𤣥冬早王是時兮出西鎬幸華清兮順天道瓊樓架虚兮靈仙保長生殿前兮樹難老甘液流兮聖躬可澡俾吾皇兮億千夀考駕幸九成宫賦以順時出豫觀風展義為韵李子卿皇帝握靈符之三一作千載也天地穆清星日輝潤野訪遺逸朝登傑雋化則垂拱而成令則不言而信時廵之儀展秋獮之禮順思訪俗而觀人若乗乾而出震右輔伊邇離宫在兹前瞻鳴鳳之岫傍指神雞之祠渭水煙波接苑中之洲渚岐山雲物落禁裏之軒墀誡疑作俄而迴鑾輅載羽旗為宴鎬之樂動横汾之詞况不勞於百姓而有務於三時者哉由是叶清秋練吉日乗石洗皇輿出七騶按隊千乗扈蹕戈矛林森士馬櫛比始地嶪而天旋終電馳而飆疾翻然而八駿騫騰霍濩而六龍奔逸雷公轉轂風伯按馭朱旗列而秋野生春金甲照而暮川增曙陋漢帝之逰衍哂秦皇之逸豫祥煙不散近飛搶壘之間瑞草常開併拂車宫之處廣陌鳴鑾異彼逰盤訪百年之疾苦知五稼之艱難成王之蒐由是問古公之政有以觀翠華来兮野老喜屬車至兮國人歡詎比夫隴塞回中妄開行幸之路泰郊畤上虚立禮神之壇穆然深宫駐蹕其中樓枕嶺而倒影殿當川而抱一作施虹閟䆳而寒暑隔岧嶤而雲霧通前視八水傍臨九嵕所以明四目逹四聦凝睿想播𤣥風比逰心於汗漫侔得道於崆峒亦既下輦於是一作焉端冕補闕政修墜典大風之歌作湛露之恩展於是振旅建旄廻鑾返轡百蠻懼威武萬姓知教義若臣者巖穴久服丘園来賁未有燭於皇明竊以覩於人瑞敢獻揚䧺之賦庶獲有司之議駕幸天安宫賦吕令問卓哉有唐之開元也拉五帝而軼三皇洒雲雨之霶澤炯日月之重光恵及豚魚則鳥獸咸若化被草木則行葦不傷爾其尚節儉反貞淳照之如日育之如春猶以為震出而亨則随方而東狩豫順以動則因時而西廵非以肆志放欲盖乃觀風勞人於是乎天子乃命羣寮考吉日升玉輦馳清蹕霍濩沸渭鏗訇洋溢龍輿馳一作駭地杳空山而自鳴紅旗照天轉洛橋而半出若乃宸襟逺覧睿賞遐宣則野泛佳氣樹生彩烟過澠池而懐古入傅巖而想賢覧唐墟之遺跡嘉舜風之慨然白雲𥘉飛澡秋思於汾水黄河一變濯聖慮於秦川是以問年徳一作髙年恤惸獨望秩山浸肆覲羣牧屬車所止罔不清肅乃有邑老田父進而歌曰嵗既稔而時清我后来兮應天行東都士庶扶輪送西土諸侯掃地迎君之徳兮徳無有路旁勞賚皆牛酒乗輿一至長安城千秋萬嵗南山夀駕幸芙蓉園賦失名紫禁彤庭兮二月春戯蝶流鶯兮百處新借問此来逰幸所是日芳菲最惹人乗桂苑之春晩值芳林之雨霽徵聲都尉之門召舞平陽之第的皪綵仗逶迤羅袂兩兩相看歩摇簪一一共鬪承雲髻鳴鑾漸出轉佩相從仙宫萬户層城九重綵扇似月從騎如龍奏清笳於楊栁下天蓋於芙蓉㶚川宛轉秦郊綺錯北極儀鳳之樓南隣隠豹之崿入紅園而移歩輦俯緑池而卷行幕鳴管則嬌鳥不飛拂簟則輕花自落留連帳殿彌望帷宫水摇摇而岸花紫煙㣲㣲而野樹紅鳴文鷁於波靣奏嬌鶯于掌中千鍾獻堯之酒五絃歌舜之風日落前溪雲垂後殿陌上氣合花間露泫徐飛睿藻再融神盼羣公既奏栢梁文萬乗方廽瑶池醼文苑英華卷五十八
