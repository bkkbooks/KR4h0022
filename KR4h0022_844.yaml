body:
  text: 文苑英華卷八百四十五宋孝昉等編儒一益州夫子廟碑一首遂州長江縣先聖廟堂碑一首益州夫子廟碑王勃述夫帝車南指遁七曜于中階華蓋西臨藏五雲于太甲雖復星辰蕩越三元之軌躅可尋雷雨沸騰六氣之經綸有序然則撫銅渾而觀變化則萬象之動不足多也握瑶鏡而臨事業則萬機之凑不足大也故知功有所服龜龍不能謝鱗介之尊器有所歸江漢不能竊朝宗之柄是以朱陽登而九有照紫泉清而萬物覩粵若皇靈草昧風驪受河洛之圖帝象權輿雲鳳錫乾坤之瑞髙辛堯舜氏沒大夏殷周氏作逹其變遂成天下之文極其數遂定天下之象衣冠度律隨鼎器而重光玉帛謳歌反宗禋而大備洎乎三川失御九服蒙塵爼豆喪而王澤竭鐘鼓衰而頌聲寢召陵髙㑹諸侯輕漢水之威踐土同盟天子窘河陽之召三微制度乘戰道而橫流千載英華與王風而掃地大業不可以終喪彛倫不可以遂絶由是山河兆朕素王開受命之符天地氤氲𤣥聖舉乘時之䇿興九圍之廢典振六合之頺綱有道存焉斯文備矣夫子姓孔氏諱丘字仲尼魯國鄒人也帝天乙之靈苖宋微子之洪緒自𤣥禽翦夏浮寶玉于南巢白馬朝周載旌旗于北靣五仙神器琮璜髙列帝之榮三命雄圖鍾鼎冠承家之禮商丘誕睿下屬于防山泗水載靈遙馳于汶上禮樂由其委輸人儀所以來蘇排禍亂而搆乾元掃荒屯而樹真宰聖人之大業也若乃承百王之丕運揔千聖之殊姿人靈昭有作之期嶽瀆降非常之表珠衡玉斗徴象緯于天經贙據龍蹲集風雲于地紀亦猶三階瞰月恆星知太紫之宫八柱衝霄羣嶺辨中黃之宅聖人之至象也若乃順時而動用晦而眀紆聖哲于常師混波流于不問太陽亭午收爝火于丹衡一作欋滄浪浮天控涓涔于翠渚西周捧𬒮仙公留紫氣之書東海摳衣郯子叙青雲之秩接輿非聖詢去就于狂歌童子何知屈炎凉于詭問聖人之降跡也若乃參神揆訓録道和倪辱太白于中都絆乘黃于下邑湛無為之跡而衆務同并馳不言之化而羣方取則雖復電旌一作旌旄羽斾齊人張夾谷之威八佾三雍桓氏逼公宫之制洎乎歷階而進宣武備而斬俳優推義而行肅刑書而誅正卯用能使四方知罪爭歸舊好之田三家變色願執陪臣之禮聖人之成務也若乃乘機動用歷聘棲遑神經幽顯志大宇宙東西南北推心于暴亂之朝恭儉溫良授手于危亡之國道之將行也命道之將廢也命歸齊去魯發浩歎于衰周厄宋圍陳奏悲歌于下蔡聖人之救時也若乃筐篚六藝笙簧五典折旋洙泗之間探賾唐虞之際三千弟子攀睿化而升堂七十門人奉洪規而入室從周定禮憲章知損益之源反魯裁詩雅頌得絃歌之音備物而存道下學而上逹援神叙教降赤製于南宫運斗陳經動𤣥符于北洛聖人之立教也若乃觀象設教法三百八十四爻四十有九窮神知化應萬二千五百周易作萬有一千五百二十五十有五成變化而行鬼神觀隂陽而倚天地以鼓天下之動以定天下之疑索衆妙于重𤣥纂羣微于太素聖人之讃易也若乃靈襟不測睿視無涯石砮昭集隼之庭土缶驗羵羊之井稽山南望識皓骨于封禺蠡澤東浮考丹萍于夢渚麟圖鑒逺金編題佐漢之符鳳德鈎深玉䇿筮亡秦之兆聖人之觀化也時義逺矣能事畢矣然後拂衣方外脫屣人間奠楹興夕夢之災負杖起晨歌之跡撓虹梁于大厦物莫能宗一作文摧日觀于魯丘吾將安仰明均兩曜不能遷代謝之期序合四時不能革盈虛之數適來夫子時也適去夫子順也為而不有用九五而長驅成而勿居撫雲霓而髙視聖人之應化也自四教逺而微言絶十哲喪而大義乖九師爭大易之門五傳裂春秋之輻六體分于楚晉四始𣲖于齊韓淹中之妙鍵不追稷下之髙風代起百家騰躍攀戶牖而同歸萬匹驅馳仰陶鈞而共貫猶使絲簧金石長懸闕里之堂荆棘蓬蒿不入昌平之墓聖人之遺風也遵揚十聖光被六虛乘素履而保安貞垂黃裳而獲元吉故能貴而無位履端于太極之初髙而無名布政于皇王之首千秋所不能易百代所不能移萬乘資以興衰四海由其輕重雖復質文交映瞻禴祀而長存金火遞遷奉琴書而罔絶一作綱紀蓋易曰觀乎人文以化成天下又云聖人以神道設教而萬物服焉豈古之聰明睿智神武而不殺者夫國家襲宇宙之淳精據明靈之寶位髙祖武皇帝以黃旗問罪仗金䇿以勞華夷太宗文武皇帝以朱翟承天穆玉衡而正區宇皇上宣祖宗之纍洽奉文武之重光稽厯數而坐明堂陳禮容而謁太廟八神齊饗停旒太史之宫六辨同和駐蹕華胥之野文物隱地聲名動天樂繁九俗禮盛三古冠帶混並之所書軌八絃疑作紘閭閻兼匝之鄉煙火四極竭河追日夸父力盡于楹間越海陵山豎亥塗窮于廡下薰腴廣被景貺潜周乾象著而常文清坤靈滋而衆寶用溢金膏于紫洞雨露均華栖玉燭于𤣥都風雷順軌丹蓂翠菌藻繪軒庭鳳彩龍姿激揚池御殊徵肸蠁不召而自至茂祉昭彰無幽而不洽雖復帝臣南靣降衢室而無為岱畎東臨陟名山而有事靈命不可以辭也大典不可以推也由是六戎宵警橫紫殿而摐金五校晨驅蹴𤣥雲而噴玉星羅海運嶽鎮川渟登碧墠而㑹神祇御𤣥壇而禮天地金箱玉冊益睿算于無疆玳檢銀繩署靈機于不竭功既成矣道既貞矣歷先王之舊國懷列聖之遺塵翔赤驥而下雲亭吟翠虬而望鄒魯泗濵休駕杳疑汾水之陽尼岫凝鑾暫似銅疑作峒山之典乃下詔曰可追贈太師託鹽梅于異代鼎路生光寄舟楫于同時泉塗改照咸亨元年又下詔曰宣尼有縱自天體膺上哲合兩儀之簡易為億載之師表顧唯寢廟義在欽崇如聞諸州縣孔子廟堂及學館有破壞并向來未造生徒無肄業之所先師闕奠祭之儀久致飄零深非敬本冝令諸州縣官司速加營葺九隴一作成都縣學廟堂者大唐龍朔三年鄉人之所建也爾其州分化鳥境狥蹲鴟羸疑錦室于中區託銅梁于古地玉輪斜界神龍蟠沮澤之雲石鏡遙臨寶牒祕一作馬蹀禺山之影天帝㑹昌之國上照乾維英靈秀山之鄉傍清地絡庠序由其紏合纓辨所以㑹同文翁之景化不渝智士之風猷自逺于是雙川舊老攀帝奬而翹心三蜀名儒想成均而變色探周規于舊宅詢漢制于新一作成都開基于四㑹之躔授矩于三農之隙土階無級就擊壤于新歡茅茨不剪易橧巢于故事莊壇文杏即架椽欒夾一作樊谷幽蘭爰疏戶牖儀形莞爾似聞沂水之歌列侍誾如若奉農山之對緇帷曉闢橫組帶于西河絳帳宵懸聚青襟于北海雖秋禮冬詩之化巳洽于齊人而宣風觀俗之規實歸于上宰銀青光祿大夫譙國公諱崇義大武皇帝之支孫河間大王之長子髙秋九月振玉贙于唐丘寶算千齡躍璇虯于大渚我國家靈命東朝抗裘冕之尊宗子維城南靣襲軒裳之重析𤣥元之一有𦙍字緒擁朱虛之一有祿字位拜玉節于秦京輝金璋于蜀郡𤣥機應物潜銷水怪之災丹筆申寃俯絶山精之訟魏文侯之擁篲道在而謙尊董相國之垂帷風行而俗易司馬宇文公諱純河南洛陽人也皇根帝緒列五鼎于三朝青鎖丹梯一作墀跨千尋一作種于十紀仲舉澄清之轡未極夷塗士元卿相之材先登一作猶先上佐氷壺精鑒遙清玉壘之郊霜鏡懸明下映金城之城縣令柳公諱明字太易河東人也梁嶽之英長河之靈沭雲漢之粹精一作精粹荷天衢之元亨旌旗赫奕于中古圭組陸離于下葉鳳巖抽律擢層秀于龍門驪穴騰姿吐榮光于貝闕自朱絲就列光膺令宰之榮墨綬馳芬髙踐郎官之右仙鳬旦舉影入銅章乳翟朝飛聲含玉軫臨卭客位自髙文雅之庭彭澤賔門猶主壺觴之境曠懷足以御物長策足以服人重泉之惠訓大行單父之謳謡遂逺猶為夏絃春誦俗化之樞機西序東膠政刑之根本上祗朝憲下奉藩維爰搜復廟之儀載闡重欄疑作櫩之制三門四表燠疑作煥矣惟新十一作上哲宗師肅焉如在將使圓冠方領再行鄒魯之風鋭氣英聲一變賔疑作賨渝之俗于是侍郎幽思摛鳳藻于瓌林丞相髙材排鳳姿于璧沼遺榮處士開簾詮孝悌之機頌德賢臣持節聽中和之樂其為政也可久其為志也可大方當變化台極儀刑萬宇豈徒偃仰聽事風教一同而巳哉勃幼乏逸才少有竒志虛舟獨泛乘學海之波瀾直轡髙驅踐詞場之閫閾觀質文之否泰衆矣考聖賢之去就多矣自生人以來未有如夫子者也嗟呼今古代絶江湖路逺恨不得親承妙㫖攝齊于遊夏之間躬奉德音攘袂于天人之際撫身名而永悼瞻棟宇而長懷嗚呼哀哉敢為銘曰五帝既沒三王不歸天地震動隂陽亂飛山崩海竭月缺星圍禮樂無主宗禋遂微其一大哉神聖與時回博疑作薄應運而生繼天而作龍躍浩蕩鵬飛寥廓奄有人宗遂荒天爵其二尼山降彩泗濵騰氣志匡六合神經萬類夾谷登庸中都歷試睿情貫一𤣥猷絶四其三栖遑教跡寂寞河圖違齊出宋歷楚辭吳風衰俗毁禮去朝無麟書巳卷鳳德終孤其四杳杳靈命茫茫天秩吾道難衍斯文易失式宣六藝財成四術虛往實歸外堂內室􅀈邈矣能仁悠哉化主力制羣辟權傾終古陸離彩粲蟬聮茅土陟海輕河登山小魯其六皇家載造神風四極檢玉題祥龜金署德聿懷聖跡同亨天則乃春疑作眷台庭爰升衮職其七玉津同𣲖金堤茂版智士髙風文翁澤逺氓淳壤沃聲和俗願載啓仁祠遂光儒苑其八沉沉壼奧肅肅扃除靈儀若在侍列一作列侍如初槐新市密杏古壇踈楹疑置奠壁似藏書其九泛泛寰中悠悠天下徇名則衆知音蓋寡碝石參瓊迷風亂雅仲尼既沒夫何為者其十遂州長江縣先聖孔子廟堂碑楊炯法象莫大于天地變通莫大乎四時懸象著明莫大乎日月備物致用莫大乎聖人夫子諱丘字仲尼魯國鄒人也龜龍負䜟帝鴻驅八翼之軒魚鳥呈文天乙降三分之璧五十二戰權輿驟帝之都一作基二十七征草昧馳王之業平域中之禍亂掃天下之䖍劉以盛德大業之尊當開階立燧之重及其山崩海竭日薄星回厯數不還謳謡遂逺元子賔周而建國二王之車服可尋上卿翼宋而承家三命之衣冠再襲是故隂陽混合泄符瑞于平鄉宇宙氤氲灑休徴于闕里龍峻而龜背月角而雷聲有軒帝之殊姿有殷王之異表山開遁甲尼丘落于紫垣星掌巫咸鈎鈐墜于蒼陸净光童子來遊震一作姬旦之郊乾象明靈一作虛俯下庖犧之國十五而志學三十而有成申下問于伯陽屈帝師于郯子天為木鐸九州知發號之期吾豈匏瓜一國有來蘇之望常疑作嘗登委吏稍踐中都天下可臨諸侯取則以之禮而國定司空之官以成禮以之義而國平司冦之官以成義掌山林于夏典物得其生聽訟獄于秋官人忘其死大夫亂法仍行兩觀之誅陪臣執權即問三雍之罪强公室而集無此字弱私家叙君臣而集無此字明長幼用能使犧牲秬鬯不登闤闠之庭羽㦸旌旄不列壇場之位當是時也三光薄蝕九土分崩夷狄有君中華無主集作禮周京赫赫成康之至教蔑聞魯國巖巖賢聖之餘風可墜河圖未出吾道不行周流八方經營四海治集作政亂運也窮通命也荷天下之至聖仍逄盜跖之軍仗天下之至和猶有匡人之逼德生于我樂天命而何憂文不在兹臨大難而無懼使仁者必信安有伯夷使智者必行安有王子豈三千擊水牛蹄不能鼓橫海之鱗九萬摶風雞羽不能扇垂天之翼然後上不臣天子下不事諸侯乘殷之輅服周之冕或屈伸於季孟之間或動靜于魚龍之際下學而上逹將聖而多能博而無名信而好古察殷周之禮樂損益可知觀杞宋之文章賢才不足數年學易伏羲龍馬之圖三月聞韶媯帝鳳凰之典信在集作存乎德術集作行非數貫於神明集作四時意見乎時制作侔于造化巳所不欲則一言可以終身人之莫違則一言可以亡國惡鄭衛之亂雅樂惡利口之覆邦家榮辱定于樞機褒貶存乎簡牘精誠密召北門集作辰開紫掖之星福應全來中極敷𤣥雲集作涌之𤣥象之氣乃若知幽明之故見天地之心有感而遂通不行而克至年當甲子潜知起漢之萌運集作音叶宫啇預察亡秦之兆星移大火追責天司月入陽街集作純陽無勞集作行無兩備季桓子羵羊之井推木石之禎祥陳惠公集隼之庭驗蠻夷之貢賦然後歷三辰而玉步照四極而金聲坐于緇帷之林浮于亶州之海門生七十仰天路以無階弟子三千望宫墻而不入哲人之能事畢矣先王之至德行矣配乎二象不能遷必至之期參乎兩曜不能稽有集作有非常之動南逰楚國遂聞衰鳳之歌西狩魯郊獨下傷麟之泣夫子周靈王二十一年冬十月庚子生至魯哀公十有六年夏四月已丑卒凡享年七十二于今一千餘嵗泰山頺而梁木壞微言絶而大義乖傳饗祀于百家奉琴書于十代秦始皇見登床之識集作識始亂衣裳魯恭王看壞壁之書猶聞絲竹漢圖起于六千日賜金之禮載優魏德行于五千年刻石之風未泯述文集作序字武者皆憲章于聖人修學校集有書字者僉折衷于夫子自革集作韋鞲玉歷毳幕瑶圖皇天無皂白之徴戎狄起豺狼之釁摧六律絶笙竽塞師集作瞽曠之耳天下之人廢其聽矣散五彩滅文章膠離朱之目天下之人黜其明矣我髙祖神堯皇帝因三靈之寶厯藉萬國之歡心風起北方月行中道削平宇宙集作雷雨戢干戈于羊馬之年彈壓華夷照文物于龍蛇之代太宗文武聖皇帝升瑶壇于曲洛受玉版于平河經天緯地蕩海夷嶽坐𤣥宫而密轉紫微光帝宅之尊戴黃屋以一作而深居赤縣列一作襲神州之貴今上天無私覆道不虛行馭六氣而平太階乘八風而制羣動星連月合層臺而有觀羽之勞海一作日晏河移直茟有書祥之倦封太山而禪梁甫千載同歸敞衢室而築明堂百靈咸秩雲行雨施品物流形天尊地卑乾坤定矣若乃虞夏啇周之禮考正朔而三遷東南西北之人混風聲而一變環林拂日映髙栁而對扶桑圓海澄天走鯤池而㴠象浦粵以乾封元一作三非年有詔追贈夫子為太師咸亨元年又詔州縣官司營葺學廟慿風雲于異代照日月于殊途死者有知歿而無朽如綸如綍大君于號令之嚴匪朴匪雕上宰極司存之敬長江令楊公𢎞農華隂人也即華山公之孫大將軍之子朱宫帶地明河一葦之西黃闕中天神嶽千花之北山川壯麗于區宇人物繁多于海內齊九龍而闊步一門鍾豹變之榮襲五公而長驅四代赫蟬聫之祉出忠入孝誕秀興賢冠蓋城邑池臺鐘鼓英靈輻凑鏘鏘萬玉之門嘉瑞駢羅濟濟千金之子是故北方多士太一壯其集作一壯表乎魁梧南國仙人中書偉其端雅椅桐可仰丹漆兼集作重施照明月于胸懷吐清風于襟袖臧武仲之智卞莊子之勇集作法可以為大臣矣韓尚書之臨八座發跡下邳卓太尉之踐三階來從密縣自操刃入仕聞魯邑之絃聲解劒分司察豐城之寶氣汝隂徐令大號無雙河內王君時稱未有飛雪千里不能改松柏之心名都十城不能動夷齊之行先是殊方暴客常集作恆嚴巨野之兵絶磴奸豪每縱潢池之暴集作虐數州常以為集作久弊歷政所不能移行人為之聚衆集作扸疑耕父由其釋耒公英謀獨斷鋭氣無前奮一劔而戮元凶馳單車而躡遺噍道旁牛馬並屬羅衡縣內神明皆稱傳琰若乃山林猛獸動星象而垂文江漢貙氓集作毗鼓風飈而作愾城門六閉未防虞吏之災都市三言終有三君之暴公雄心裂眥壯髮衝冠按東海之金刀飛北斗之石箭岡巒不擾有符劉孟之城坑穽無虞更似童君之邑自非愛人猶子視物如傷豈能躬斬凶渠親除災害與夫赤繩不用道被于瑕丘桴鼓希聞化移于京洛可同年語哉然後示之以禮儀陳之以庠序興役鳩工集無此句慿三時之閒暇薄賦輕徭視集作瓜見四野之川原依城負峽青泥險磴斜連白馬之關赤岸長波逺注黃牛之夾懸四刀而開益部照參伐于天光賦三錯而闢梁州集作長江絶岷集作㞶嶓于地德背山臨水掩全蜀之膏腴望月占星採公宫之法度丹墻數仞吐納雲霞椽柱三間蔽虧風雨琉璃曉闢東宫雀目之忩玳瑁朝懸西漢蛇鱗之桷圖光芒于北斗聖質猶生赫符彩于連珠宏姿可想至于月衡月凖山額山庭侃侃星文堂堂日角莫不向之如在疑逰北上之山望之儼然似矚東流之水博士助教某等西州聞望南國英靈駭飛兔于文場躍雕龍于茟海楊雄博識神逰象繫之端李洽幽通思入璣衡之表每至韶光令月朱鳥乘春爽氣髙天𤣥龜送厯瓊籩玉豆中堂奉先聖之儀石磬金鐘南靣習諸侯之禮華陽曽子鼓篋來逰蜀國顔子摳衣請學絃歌在側集作聽還升武騎之臺禮樂居前重覩文翁之室祁祁茂德濟濟時英聖人千載之風儒者一都之㑹丞主簿尉某等青田戒露望華蓋而長鳴緑地生風下仙閣一作閭而直轡大夫貞節還居內史之丞文學明誠集作經猶集作盡歷南昌之尉鄉望姓名等王孫獵騎騁原隰之盤逰公子文鋒叙江山之體勢符偉明以都官謝職逄有道而相推趙元叔以郡吏從班見司徒而不拜僉以鄉閭少事風月多懷命童子于雲臺就門人于相圃冬禮春詩之化再造雙川淹中稷下之風一匡二集作三蜀若夫平南壯烈沉流水于裁碑逐北勳庸集作元勳登燕山而刻頌庾太尉新亭之墓尚有黃金鄭康成通德之門猶存白瓦况乎功苞大象績被蒼生豈使銘典闕如音塵不嗣是則集作用雕墻峻宇列冠蓋于宜城塞陌填街考春秋于太學小子狂簡不知所以裁之夫子之文章今可得言也詞曰西崑玉闕南海金堂惟愡惟恍一隂一陽三辰赫赫九土茫茫太極天帝神州地皇驪連上古混沌中央降及軒頊終于夏商四時玉斗五緯珠囊聖德千載淳風八荒天開赤籙日照青光識叶金匱兵符玉璜化隆文武澤盛集作仞成康天子穆穆諸侯皇皇春秋代謝宗社危亡帝典無集作垂象人倫不綱山河命德天地興祥禮樂三變文明一匡原承少典祚啓成湯吹律丹鳳御符一作鈎白狼三仁去國再命循墻不有積善其何以昌降靈鄒邑誕哲平鄉月角摛彩星鈐吐芒文行忠信恭儉溫良或默或語能柔能剛學而不厭師亦何常通禮明德尊賢毁方古之君子昔者明王道叶公旦神交帝唐攝官從事服冕端章示之以德臨之以莊澤如春雨威若秋霜男女斯别尊卑克彰時逄版蕩運屬悽遑入齊損味居陳絶糧登山極目臨水倘佯無道斯隱捨之則藏季孫大賚敬叔揄揚問官郯子受樂師襄神明叶贊雅頌鏗鏘紫麟遙集丹烏逺翔生靈水火家國舟航功符日用德叶天長倐嗟崩嶽奄歎摧梁昧昧神道悠悠彼蒼書開懷宅䜟識集作發登床與代輕重因時弛張氊裘黼黻沙漠壇場璣衡慘􅀈載籍膏肓汾河水白晉野星黃軒電臨斗殷雷集作雲入房九圍臣妾八極城隍東序西序上庠下庠粵惟銅墨實號金箱集作相靈山地輔德水天潢芝蘭秀出羔鴈成行玉匣孤劒瑶臺驌驦懲奸搖集作挫是右濟猛移蝗風傳積石道被滄浪絲言涣汗經葺相望夏井蓮植秋窗桂芳繡楹文琰綺綴明璫四注飛閣三休步廊禮行釋菜敬盡明薌圖非有若地異空桑伏羲書契女媧笙簧匏土金石圭琮璧璋髙門程鄭碩學王楊威儀秩秩宫徴瑲瑲山棲烏集作弔鳥氷宿鴛鴦蜀門荷㦸江津濫觴落星髙堰明月回塘丹碑不朽清廟無疆文苑英華卷八百四十五
