body:
  text: 文苑英華卷五百九十宋李昉等編公卿雜謝表三代羣官謝恩表一首為李尚書謝恩表一首為將軍程處弼謝放流表一首謝觀唐昌公主花燭表一首謝追赴大禮表一首謝入朝表一首謝書上考表一首為李大夫謝恩表一首為張監謝天長節答賜表一首為崔鄴公謝敕追赴京表一首謝恩寫真表一首為崔僕射謝恩賜表一首謝恩表二首為百官謝放朝表一首為京兆尹捉賊不獲謝恩表一首為京兆韋尹謝許折糴表一首謝差中使送上表一首謝奬諭表一首謝追赴闕庭表一首代李侍郎謝用內庫錢充軍資表一首代羣官謝恩表李嶠臣某言監軍副使回伏奉敕書手詔宣慰臣及將士黎庶等并賜幕府大將已下改官告身二百八十七通神澤鴻私發揚宇縣榮光喜氣充溢轅門臣某中謝伏惟皇帝陛下配天立極撫運承一作乘時酌萬姓而為心法四時之行信汗馬之勞必録鳴雞之用不遺實均雨露之澤曲播乾坤之造頃以戎臣殞喪軍國憂惶將校叶心佐寮奉職皆能奬忠守義俟命於天致使州縣底寧風塵不驚此乃臣子常分國家舊規守而勿失幸免獲戾豈意聖謨廣運睿渥旁流特令甄敘寵授官命朂以忠貞之效優其爵秩之榮光啓朝端昭宜海內凡是含識孰不知恩其來希皓等二百餘人無不感極成悲銘心隕涕不勝荷戴之至為季尚書謝恩表王行先臣某言臣植性愚陋稟質庸踈過蒙恩私特垂奬飾擢自泥滓之下升之雲霄之上參預機密接奉軒墀寵光百僚榮被九族殞身未能以答施灰骨不足以明恩屬日月齊明乾坤交泰弓旌出谷俊乂盈朝非親非賢無藝無識猥將齊竽入吹謬以鄭璞為珍昔綜銓衡有慙簡要署置過當涇渭莫分致令外削氓黎內傾府藏煩擾之弊既傷於國體謗訕之咎允集於臣躬是用仰慙公朝下積私懼顧循支離犬馬之疾恐玷棫朴鵷鸞之羣不敢仍勞準繩實願自甘屏黜言布心腹輒以陳祈而愚慮不周愆違自速有命遄降營魂載飛豈徒絶望丘園故有甘心鼎鑊忽蒙聖恩懸察慈旨曲矜爰集簮纓諭以絲紱許臣以無愆衡鏡怪臣以輒謝鹽梅察臣誠款之言一作心知其憂國覽臣狂愚之奏謂合事宜譴讓之中恩多而責少含容之內善詳而過略本將因愆而獲戾翻乃以誚而蒙榮惟大造曲成既蒙再生之惠小人多幸方輸九死之答無任欣喜踊躍之至謹詣明福門奉表陳謝以聞臣嶠誠歡誠喜頓首頓首死罪死罪為將軍程處弼謝放流表見六百十八卷陳子昻謝觀唐昌公主花燭表玄宗張説臣説言內侍尹鳯祥宣敕賜臣觀唐昌公主花燭伏以天人下嫁王宰送行茍非榮集作殊寵何階瞻望臣免歸餘叟忽承朝請之恩廢駕羸集作疲驂復覩肅雍之禮鴻私所被枯瘁生光無任歡荷之至謹奉表陳謝以聞謝追赴大禮表玄宗王晙開元十一年臣晙言直省王容至伏奉恩敕朔方無事且赴大禮者臣肅承寵命喜躍交并臣某中謝臣實不才纍承恩奬入參喉舌叨居國相之榮出揔旌麾謬忝元戎之寄常願俯陳螢爝寧有益於曦舒思竭涓塵何以裨於海嶽每憂折鼎負乘碎首糜軀何階答施伏以禋宗大享禮備郊天特垂綸綍之私聽同玉帛之會馳心輦蹕不遑俟駕局影塞垣迫於遵守以慶以懼戰汗兼深今長河始氷大漠初雪邉亭有賊今正其時事不可期兵難預度儻驚塵忽起禍出不虞臣進不之京退不及事微軀塞責無益於軍誠願陪扈屬車仰望雲漢顧惟軍旅之重正當預備之辰不敢釋此嚴防馳赴恩命惟當利兵訓卒息烽候於三邊耀武懷荒宣皇威於萬里無任悚荷屏營之至謝入朝表玄宗李雍臣雍言伏奉七月十五日恩勑許臣會計京師者止水一杯忽聞朝海枯查八月更得一作暏浮天臣某中謝臣以幽遐必察者日月之照明憔悴皆霑者雨露之恩廣伏惟陛下天德陰隲神功獨斷咸造吹萬容至於工養報通三大及於小豈臣微物得預洪爐在昔全生已承曲記斯今上計再荷特恩戴之心仰天有望出籠之鳥飛空可期方將蹈舞闕庭慙戴咫尺葉公宿願一覩真龍岐下遺氓欣逢聖主無任喜躍慙荷之至謝書上考表玄宗臣某言伏奉今月日聖恩鑒以薄能光賜上考御詞激物睿奬動時戴天不類表作奚勝局地無所臣某中謝臣聞荷再造者遍於有情勸庶工者盡於有位莫不宣其力竭乃誠欣赴前儔耻居後殿者蓋以萬數則區區揚化眇眇納忠自化彭蠡之魚更是海濵之鴈伏惟陛下太和布氣巨壑流津宇宙開明既照類表作纎草山河鮮潤每納昆蟲豈臣凋枯復霑雨露天漢之上遙記嚴平宣室之中興言賈誼摧羽插翼忽飛翥於雲霄暴鰓揵鰭重遊泳於溟渤豈有循吏得預詞林鼷鼠軒墀鶢鶋鐘鼓徒驚奬飾益用慙惶况乎政術空虛褒述纍積文髙日月辰象法之不逮德厚嵩華羣嶽朝之莫階雖郭隗濫觴明主有所蓄意然邵信敦本微臣不敢負人慶抃則深憂懼亦切無所報國空以誓心不任感荷欣惕之至為李大夫謝恩表肅宗常衮臣某言伏奉聖恩捨臣罪纍復臣班榮承命驚慙戴恩惶抃臣某誠歡誠懼頓首頓首伏惟乾元光天文武大聖至德孝感皇帝陛下俯寬國法大庇宗枝兄抵憲章已從輕典臣合緣坐又貸殊私雷霆解威日月迥回照枯木之上殘花忽開死灰之中餘燼再爇曲成含育特荷仁慈一門感恩萬死何效謹奉表陳謝以聞臣某誠歡誠喜頓首頓首謹言為張監謝天長節答賜表玄宗于邵臣某言伏奉恩命賜臣若干物寵錫自天兢魂無地臣某誠歡誠喜頓首頓首伏惟開元天地大寶聖文神武應道皇帝陛下寶運應期金秋表節慶邁賡歌之曲歡同率土之濵循之由衷無以展禮輒獻衣鏡式陳懇欵不謂聖慈回顧允納涓涔宸光曲臨行及惠賜載驚載懼罔知攸處臣本愚直早荷延賞陛下念舊勳庸擢臣専典御府盡忠不足報德勞力豈曰幹時空勤日慎之心以副夙興之戒無任感戴屏營之至謹奉表陳謝以聞臣某誠歡誠喜頓首頓首謹言為崔鄴公謝敕追赴京表臣某言伏奉十二月日敕追赴京仍待史翽到即發恩私曲被喜賀無從臣某中謝臣聞至誠感神雖微必應皇天鑒物無幽不通伏惟陛下道貫乾坤明懸日月千年一聖四海在寧臣實何人時逢昌運近緣荆襄微擾尚軫聖憂不以臣之非才特加節制持綱憲府曵履文昌一日九遷頻頻忝竊常恐委身江外朝滄海而無因豈意復命闕庭隨白雲而有望遙思捧日預想朝天臣子之情倍萬恆品不勝謝恩寫真表臣某言今月日中使至伏奉聖慈特賜寫臣容貌絹圖一本跪捧殊賜一作錫兢抃交馳臣某中謝臣聞兩漢功勳國朝將相咸傳風彩遂列丹青非為當代之榮亦欲後來之識臣功無半古貌未出羣叨承明主之恩久冠台司之首重蒙渥澤特降畫工神既盡傳照無遺寫從衰朽之質别荷寵光分遭遇之形長含喜氣誠慙鎮俗頗近恭人祗嚴如見於大賔拂飾信歸於天造驅馳聖運撫躬未負於微誠唐突前賢顧影不無於愧色足以流傳不朽舒卷無窮君父回恩便是百身之報子孫為寶知承一顧之榮無任兢荷屏營之至為崔僕射謝恩賜表代宗臣某言某官某至伏奉敕書仍賜手詔并諸錫賚一作錫等宸聰睿眷一以及臣舉族同歡致身無據臣誠歡誠喜頓首頓首臣聞自古明哲之君以化天下也莫不乘時制變因弊立法既資國體亦在便人常準大端不失其道伏惟寶應元聖文武皇帝陛下隱旒思理宵衣布政臨萬物而含𢎞不測明四察而英斷非常去邪勿疑則滌除汙俗渴賢致理則振拔時淹納強諌而如流佇沃心而不足微臣何幸屬會昌期今四罪咸伏八蠻慕義祿有所及刑無所寃再鼓登聞申明理匭發令而雍熙日洽推心而反側自安何負阻而不來何假威而不敗太宗聖化復見於今文命賡歌詎慙希古日宣九德千載難逢然則靡不有初前史攸誡知始知卒唯聖能之今陛下發自宸𠂻殷勤詔命克念作聖期於必然無任拜舞歡欣之至謹遣某官奉表陳賀以聞謝恩表代宗韋元甫臣某言中使楊華林至伏奉敕書慰臣及將士者祗奉寵靈進退兢惕臣某中謝臣本書生素非公器恭守憲令所期自勉揔司戎律實非所長頃者宣州用兵皆以詔書從事但悉所管兵馬稟副元帥文符幸隨衆軍克有成功皆王縉指蹤之力袁傪致命之功羣帥成之在臣何有今又曲承霑澤特賜天書任重材微恩深效淺拜舞之下戰汗無從不任歡喜踴躍之至同前臣某言中使鎮軍大將軍行左威衛大將楊宗敬至奉敕宣慰臣等清問俯臨兢懼交集臣某中謝臣識非務大才不逮人依日月之末光叨藩條之重寄臣之薄劣實負寵榮頃年以來寇賊漸息時將休泰人自康寧臣但布皇風恭行憲令待罪而已致理無聞曠官之責未書偏照之榮已及再三循省何以克堪蹈舞徘徊唯增戰越不任欣躍之至為百官謝放朝表臣某等言中書門下奉宣進旨緣天寒常參官放朝者伏惟皇帝陛下憂勤致理惻隱無遺節應祁寒仁深潤下宵衣之際天意逮於周行挾纊之恩羣臣照於堯日無任欣荷感銘之至為京兆尹捉賊不獲謝恩表臣某言臣亡兄某頃於興平縣界遇賊劫死臣辱司京尹職在肅清不能屏息姦回乃令害及骨肉既負曠官之責仍積私門之恨此賊漏網臣亦何顏况以私讐上貽聖德寬臣弛慢之罪哀臣死喪之威類降德音容臣追捕又恐事端皆知巢穴緣是行營官健未敢懸有追擒計會往來遂淹旬日以今月某日於某縣界捉獲所射臣兄賊某軍行官某并同伴若干人此乃天意除害轅門奉法不然則萑蒲之盜安得盡誅冥漠之魂猶將永恨擒姦擲伏仰荷聖威雪憤申寃俯獲私願生死蒙施無階上答無任為京兆韋尹謝許折糴表劉禹錫見集本臣某言伏奉詔旨臣所請畿內折糴宜令度支計會定數奏來者天慈廣被人瘼是求臣某中謝臣自理京邑不先威刑惟務便安所期富庶每因賜對常奉德音府縣之間巨細令奏伏以聖明在上風雨應時順成之年穀糴常賤若無輕重之法必利兼并之家輒敢上聞請行折糴天光下燭幽隱無遺宣付所司允臣所奏事關理本惠及生靈臣忝尹京倍百欣荷謝差中使送上表臣某言中使吐突仕曉至奉宣聖旨慰諭并送臣至本任者深山逺郡忽降王人跪受恩榮仰瞻宸極伏以發自巴硤至于南荒陟水陸湍險之途當炎夏鬱蒸之候山川縈轉晨夜奔馳幸無他疾得至本管九重結戀遙傾捧日之心萬里獲安皆荷自天之祐無任謝奬諭表憲宗馮審臣某言今月日本道監軍使內侍省宫闈令劉某至伏奉某月日敕書并賜臣手詔奉宣口敕特加奬諭將士官吏百姓僧道等並蒙宣慰存問者王人旋鎮宸藻自天敷德澤於藩維被恩波於動植爰及介胄逮於縉紳祗一作榮寵若驚交抃無措臣某中謝伏惟睿聖文武皇帝陛下恭承寶圖奄宅區宇一物失所必軫於憂勤一善可稱無忘於奬朂義深共理務在擇人升平之運實遇今日臣以儒流賤品生遇聖明雖力罄駑駘而效無絲髮皇明鑒徹撫勞再三黎氓既荷於生成尸素稍寬於罪責揣循涯分木石增慙又降殊私曲沾睿渥慰諭之意稠疊於頒宣藻飾之榮昭彰於綸綍無微不録無逺不該地里雖介於炎荒天威如在於咫尺所期俗阜以洽雍熙謝追赴闕庭表憲宗臣某言某月日度支急遞到伏奉某月日敕追臣赴闕庭者鴻恩曲被宸翰忽臨來自天𠂻出於望表抃躍無地光輝在身臣某中謝伏惟睿聖文武皇帝陛下以至仁格物玄德統乾臣孤立愚直素空器藝朝無瓜葛之援外絶朋黨之私以苦抱忠自托明代神理照鑒天聰自仁遂忝再領近州一居方鎮前嵗延英面辭之日親受聖慈百身何答三復在心銘肌鏤骨恐不負荷洎祗恩赴任陳力在公海隅黔黎日樂皇化至於軍州經諸道往來但守官司不虞謗讟以丹心奉上仰恃宸威函經二年首陟三載幸無罪戻皆荷生成陛下聖慈優柔皇鑒明朗不遺一物信若四時果降中詔特令赴闕恩崇感極義切戀深顧親族而生輝望雲霄而有喜以今月五日發離本鎮尅期兼道計日趨程魂馳軒階心注晷刻朝天既近承雨露而增榮向闕匪遙望恩光而稱慶代李侍郎謝用內庫錢充軍資表代宗吕溫臣某言今月十三日面奉進旨其南郊賞設錢恐度支支計闕少以庫內錢充者臣聞王者以四海為家君道唯百姓與足象天平施而無别如地生財而不私薄奉已而厚奉公重從人而輕從欲知則孔易行之惟艱曠代莫聞今日斯遇伏惟皇帝陛下誕膺駿命富有萬邦而能寶玄光慈儉之宗奉列聖憂勤之緒臣謬司禹貢竊見堯心非戎祀之用無急宣非軌物之經無别獻土木之功遂聞於廢息恩幸之賜殆絶于霑濡固已行路謳吟縉紳抃歎者久矣伏以郊禋有日慶澤自天楚師思挾纊之恩漢將望解衣之惠國存舊典事有恆規臣在集作在臣職司敢不供集陛下憐江淮甫罹旱暵一作歉念庸蜀新罹大兵雖經費有餘而聖慮猶軫昨因伏奏親奉德音悉擬出集作發內府金錢御服繒綵約躬節用濟一作紓國贍軍允叶師和克虔一作虔恭祀事必知感神人之德未酌獻而幽通動天地之誠先燎煙而上逹百祥所降萬福攸宜信可以光洽寰區敻掩圖篆家知自遂户識至公風人寢杼軸之詩黔首臻富庶之域微臣何幸獲覩升平至德難名載深感躍無任喜抃激切之至謹奉表陳謝以聞文苑英華卷五百九十
