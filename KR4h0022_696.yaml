body:
  text: 文苑英華卷六百九十七宋李昉等編刑法為侯君集疏一首論李𢎞泰疏一首為魏元忠疏一首論刑法多濫疏一首為索元禮首按制獄疏一首論巡察風俗疏一首為楊濬疏一首論削奪王珙授贈官爵疏一首貨殖上諫迴易納利充官人俸疏一首論不稅關市疏一首諫不置勸農判官疏一首刑法為侯君集疏前篇作諫侯君集等下獄表岑文本貞觀十年臣伏以君集等或位居輔佐或職分牙爪並䝉拔擢授将帥之任不能正身奉法以報陛下之恩舉措肆情罪負盈積實宜䋲之典刑舊唐書作刑典以肅朝綱但髙昌昬迷人神共棄在朝議者以其地在遐荒或欲置之度外惟陛下運獨見之明授决勝之畧君集等奉行聖筭遂得指期平殄若論事實並是陛下之功君集等只有道路之勞未足以稱其勲力而陛下天德前篇作為而弗宰乃推功於將帥露布初至便降大恩從征之人皆沾滌蕩及其凱旋特䝉曲宴又封属國加之重賞内外文武咸欣陛下賞不踰時而未經旬日前篇作不盈數日並付大理雖乃君集等自掛網羅而在朝之人未知所犯恐海内又疑陛下惟録其過似遺其功臣以下才謬叅近職既有所見不敢黙黙臣聞古之人君出師命将克敵則受唐書前篇作履重賞不克則受嚴刑是以當其有功也雖貪殘淫縱必䝉青紫之寵當其有罪也雖勤躬潔已不免斧鉞之誅故書曰記人之功忘人之過宜為君者也昔漢貳師将軍李廣利捐五萬之師糜億萬之費經四方之勞惟獲駿馬三十疋雖斬宛王之首而貪不愛卒罪惡甚多武帝以為萬里征伐不録其過遂封廣利海西侯食邑八千户又校尉陳湯矯詔興師雖斬郅支單于而湯素貪盜所收康居財物事多不法為司𨽻所繋湯乃上疏曰臣與吏士共誅郅支幸得擒滅今司𨽻乃收繋案騐是為郅支報讎也元帝赦其罪封湯關内侯賜黄金百斤又晉龍驤将軍王濬有平吳之功而王渾等論濬違詔不受節度軍令得孫皓寳物并燒皓宫及船濬上表曰今年平吳實為大慶於臣之身更為咎累武帝赦而不推拜輔國大将軍封襄陽侯賜帛唐書作絹萬疋近隋新義郡公韓擒虎唐諱下同平陳之日縱士卒暴亂叔寳宫内文帝亦不問罪雖不加爵拜擒虎上柱國賜物八千叚由斯觀之将帥之臣㢘慎者少貪求者衆是以黄石公軍勢曰使智使勇使貪使愚故智者樂立其功勇者好行其志貪者邀趨其利愚者不避其死是知前聖莫不收人之長棄人之短良為此也臣又聞之唐書有夫字天地之道以覆載為先帝王之德以含𢎞為美夫以區區漢武及歴代諸帝猶能宥廣利等况陛下天縱神武振宏圖以定六合豈獨正兹刑綱不行古人之事哉伏惟聖懷當自己有斟酌臣今所以陳聞非敢私君集等是以螢爝末光增輝日月陛下若降雨露之澤收雷電之威録其㣲勞忘其大過使君集等重昇朝列復預驅馳雖非清貞之臣猶是貪愚之将斯則陛下聖德雖屈法而德彌顯君集等愆過雖䝉宥而過更彰足使立功之士因兹皆勸負罪之将由斯而改節矣此篇六百一十七卷重出前已削去論李𢎞泰疏髙宗于志寜時𢎞泰坐法大尉長孫無忌詔令不待時而斬决乃上此疏伏惟陛下情篤功臣恩隆右戚以無忌横遭誣告事並是虚欲戮告人以明賞罰一以絶誣謗之路二以慰勲戚之心又以所犯若是真無忌便有破家之罪今告為妄𢎞泰即宜戮不待時且真犯之人事當罪逆誣謗一作謀之類罪惟及身以罪校量明非惡逆若欲依律合待秋分今時屬陽和萬物生育而特行刑罪一作罰此謂有傷春氣竊謂未安左傳聲子曰賞以春夏刑以秋冬順天時也又禮記月令曰孟春之月無殺昆一作孩蟲省囹圄去桎梏無肆掠止獄訟又漢書董仲舒曰王者欲有所為宜求其端於天一有道字天之道一作道之大者在隂陽陽為德隂為刑刑主殺而德主生陽常居大夏而以生育長養為事隂常居大冬而積於空虚不用之處以此見天之任德不任刑也伏惟陛下纂聖昇祚繼明御極追連一作華胥之絶軌蹈軒頊之良規欲使舉動順於天時刑罰依於律令隂陽為之式序景宿於是無一作靡差風雨不愆雩禜輟祀方今太簇統律青陽應期當生長之辰振一作施肅殺之令伏願暫迴聖慮察古之一作人言儻䝉垂納則生靈幸甚一作舊唐書夲傳為魏元忠疏武后蘇安恒臣伏聞明王有含天下之量有濟天下之心必能達天下之善除天下之惡若為君主而不行此四者則當神怨一作寃鬼怨隂錯陽亂欲使國家榮泰其可得乎陛下革命之初勤於庶政親㹅萬機博采謀猷旁求俊彦一作乂故四海之内以陛下為納諫之主陛下暮年以來怠於政教讒邪結黨水火成災百姓不親五品不遜故四海之内以陛下為受佞之主矣邪正莫辯獄訟含寃豈陛下昔是而今非盖居安忘危之失也臣竊見御史大夫檢校太子左庶子同鳯閣鸞臺平章事魏元忠亷直有聞位居宰輔履忠正之基者用元忠為龜鏡踐邪佞之路者嫉元忠若仇讎麟臺監張易之兄弟在身無德於國無功不逾數年遂極隆貴自當飲冰懷懼酌水思清夙夜兢兢以報恩造不謂溪壑其志豺狼其心欲指鹿而為馬先害忠而損善将斯亂代之法乃汚一作汚哉明君之朝自元忠下獄臣見長安城内街談巷議皆以陛下委任姦佞一作宄斥逐賢良以元忠必無不順之言以易之必有交亂之意相逢偶語人心不安雖有忠臣烈士空撫髀於私室而鉗口不敢言者皆懼易之等威權恐無辜而受戮亦徒虚死耳今虜賊强盛賦一作徴斂煩重以臣觀之萬姓不勝其弊况又聞陛下縱逸姦慝禁錮良善儻刑罰一作賞刑失中則遐邇生變臣恐四夷因之則窺覘得失以為邉郡之患百姓怨憤一作因之即結聚義兵以除君側之惡復恐逐鹿之黨叩關而至亂階之徒從中相應争鋒於朱雀門内問鼎於大明殿前陛下将何事以謝之復何方以禦之臣今為陛下計安百姓之心者莫若收雷電之威解元忠之網復其爵位君臣如初則天下幸甚陛下好生惡殺縱不能斬佞臣頭以塞人望臣請奪其寵榮剪其羽翼無使權柄在手驕横日滋專國俗於穰侯迴天過於左悺則社稷危矣惟陛下圖之臣本㣲賤不識元忠易之豈此可親而彼可疎耶但恐讒邪長而忠臣絶伏願陛下特垂天鑒察臣此心即㣲臣朝志得行夕死無恨一作皆舊唐書本傳論刑罰多濫疏武后韋嗣立臣竊嘗聞之在堯舜之日畫其衣冠當文景之時幾致刑措歷兹千載以為美談臣伏惟陛下濬哲欽明窮神知化自軒昊以降莫之與京獨有往之論法或未盡善皆由主司姦兇惑亂於視聽尋而陛下聖察具詳之矣然竟未能明其本源察其前事令天下萬姓識陛下本心尚使四海多銜寃之人九泉有抱痛之鬼臣誠愚昧不識大綱請為陛下始末而言其事楊豫之後刑獄漸興用法之伍務於窮竟連坐相牽數年不絶遂使巨姦大猾伺隙乘間内包豺狼之心外示鷹鸇之跡隂圖潛結共相影㑹構似是之言成不赦之罪皆深為巧詆文粹作誣恣行楚毒人不勝痛便乞自誣公卿士庶連頸受戮道路藉藉雖知非辜而鍜鍊已成辯占皆合縱臯陶為理于公定刑則謂汙宫英華作棺毀柩猶未塞責雖陛下仁慈哀念恤獄緩死及覽辭狀便已周宻皆謂勘鞫得情是其實犯雖欲寛捨其如法何於是小乃身誅大則族滅相縁共坐者不可勝言此豈宿搆讎嫌将申報復皆圖苟成功効自求官賞當時稱傳謂為羅織其中陷刑得罪者雖有敏識通才一作材被告言者便遭枉抑心徒痛其寃酷口莫能以自明或受誅夷或遭殛竄並甘心引分赴之如歸故知弄法侮文傷人實甚賴陛下特迴聖察昭然詳究周興邱勣之類𢎞義俊臣之徒皆相次伏誅事暴遐邇而朝野慶泰若再觀陽和且如仁傑元忠俱羅枉陷被勘鞫之際亦皆已自誣向非陛下至明垂心一作以省察則葅醢之戮已及其身欲望輸忠聖代安可復得陛下擢而升之各為良輔國之棟幹稱此二人何乃前非而後是哉誠由枉陷與甄明耳臣但恐往之得罪者多並皆此流則向時之寃者其數甚衆昔殺一孝婦尚或降災而濫者盖多寜無寃文粹作怨下同氣寃氣上達則水旱所興欲望嵗登不可得也陛下儻一作儻陛下𢎞天地之大德施雷雨之深仁歸罪於陷一作削刻之徒降恩於枉濫之伍自垂拱已來大辟罪已下常赦所不原者罪無輕重一皆原洗被以昭蘇伏法之輩追還官爵縁累之徒普霑恩造如此則天下皆知比所陷罪元非陛下之意咸是虐吏之辜幽明歡忻則感通和氣和氣下降則風雨以時風雨以時則國豐嵗稔一作五穀豐稔嵗既稔矣人亦安矣太平之美亦何逺哉伏願陛下深察一作皆舊唐書本傳為索元禮首案制獄疏武后周矩載初元年頃者小人告訐習以為常内外諸司人懷茍免姑息臺𨽻承接强梁非故欲其然規避誣搆耳又推劾之吏皆以深刻為功鑿空争能相矜以虐泥耳籠頭枷研揳㹅摺脅籖爪懸髪薰鼻一作耳卧隣矢一作穢溺曾不聊生號為制獄一作獄持将或累日節食連宵緩間晝夜摇鏁一作撼使不得眠號曰宿囚此等既非木石且抜目前苟求賖死臣竊聽輿議皆稱天下太平何苦要反豈被告者盡是英雄以求帝王耶只是不堪一作勝楚毒自誣耳何以覈之陛下試取所告狀酌其虚實者付令推之㣲諷一作訊動以探其情所推者必上下其手希聖㫖也願陛下察之今朝士一作滿朝側息不安皆以為陛下朝與之宻夕與之讎不可保也聞有追攝與妻子即為死訣故為國者以仁為宗以刑為助周用仁而昌秦用刑而亡此之謂也願陛下緩刑用仁天下幸甚一作皆舊唐書索元禮傳論巡察風俗疏一作請毎十州分置御史廵按疏李嶠陛下創置右臺分廵天下察吏人善惡觀風俗得失斯政途之綱紀禮法之凖繩無以加也然猶有未折衷者臣請試論之夫禁網尚疎法令宜簡則法易行而不煩雜疎則所羅廣而無苛碎竊見垂拱二年諸道廵察使所奏科目凡有四十四件至於别凖格勑令察訪者乂有三十餘條而廵察使率是三月已後出都十一月終奏事時限迫促簿書填委晝夜奔逐以赴限期而毎道所察文武官多至二千餘人少者一千已下皆須品量才得褒貶得失欲令曲盡行能則皆不暇此非敢惰於職而慢於官也實才有限而力不及耳臣望量其功程與其節制使器周於用力濟於時然後進退可以責成得失可以精覈矣又曰今之所察但凖漢之六條推而廣之則無不包文粹作苞矣無為多張科目空費簿書且朝廷萬務唐書文粹作機非無事也機事之動恒在四方是則唐書文粹作故冠盖相望郵驛繼踵今廵使既出其外州之事悉當委之則傳驛大減矣然則御史之職故不可得閑自非分州統理無由濟其繁務請大小相兼率十州置御史一人以周年為限使其親至屬縣或入閭里督察姦訛觀採風俗然後可以求其實効課其成功若此法果行必大裨政化且御史出持霜簡入奏天闕其於勵已自修奉職存憲比於他吏可相百也若其按劾姦邪發摘欺隱比於他吏可相十也陛下試用臣言妙擇賢能委之心膂假温言以制之陳賞罰以勸之則莫不盡心而效死矣何政事之不理何禁令之不行何妖孽之敢興哉為楊濬疏已見六百十几卷題作夷州刺史楊濬決杖表裴耀卿開元三十四年凡死罪之人舊唐書作色前篇作則長師前篇作長官乃五刑乃前篇作者只施於只前篇作品誠則以誠乖前篇作非不行刑前篇作不耐杖却天一作踐於刑者前篇作於死者請削奪王珙授贈官爵疏羅衮臣㐲以罪在亂逆慈后罔赦事關懲勸聖人恒執其或生漏刑辟沒有追敗萬代可知百王不易之道也竊見故保義軍節度使贈太師王珙於國不忠於家不孝身為首帥行桀紂之虐名掛人倫縱豺狼之性頃乘京國患難藉父叔勲勞寵極将相兇踰冦賊生召伯甘棠之樹殘毒郡人對傅說築版之巖侵侮王室朝臣幕客受戮辱者非少軍吏百姓遭殺害者甚衆朝廷比屬多事毎須含垢而上天不容遂振疎網雖假手麾下幸就屠滅然靡伏就法終為僥倖向使珙能於晩節粗立一善以功補過誰曰不然考其終始無改暴横以珙之骨千鞭不足快憤嫉之人陛下以在宥垂風崇恕御物存其棺塚為恩已厚尚汙典冊於理實難今復請追珙所受贈官爵悉皆削奪以正憲律令天下忠臣孝子知陛下昭章淑慝轉相慕効将來儻復有如珙類者亦冀覩没後之誅而革其生前之慮明時裁化莫尚於斯先為珙所害故給事中王柷以下一十人尋䝉聖造已各贈官其官府寃死士庶伏乞下陜州以勑弔祭存問其家使並日之明無所不足如春之澤深漸泉壤甫刑曰皇帝哀矜庶戮之弗辜言唐堯之德也伏惟陛下與堯同心干瀆宸嚴無任戰越之至貨殖上諫迴易納利充官俸疏已見六百七卷仍題作請廢在官諸司捉錢令史表禇遂良臣譬前篇作臣作榱椽前篇作榱桷漲海前篇作成海取其納流前篇作取平細流為理作為治在乎前篇作在於其元前篇作其原即依補擬前篇擬字三十貫前篇四十貫有國有家前篇作有國家者常笑漢代賣官前作世頗類於彼前作此輸利前作輸錢理治致前作致治悉意前作一意其居前作居其而可為将来前無為字人間前作民間輒敢前作輕敢議詳前篇作詳録非請不稅關市疏崔融長安三年伏見有司稅關市事條不限工商但是行人盡稅者臣謹按周禮九賦其七曰關市之賦竊惟市縱繁巧關通末遊欲令此徒止抑所以咸增賦稅臣謹商度今古料量家國竊将為不可稅謹件事跡如左伏惟聖㫖擇焉古往之時素舊唐書文粹作淳樸未散公田籍而不稅關防譏而不征中代已來澆風驟進桑麻疲弊稼穡辛勤於是各徇通財争趨作巧求徑捷之舊唐書有欲字速忘嵗計之唐書有無字餘遂使田莱日荒倉廩不積蠶織休廢弊緼闕如饑寒猥臻亂離斯瘼唐書作起先王懲其若此所以變古隨時依本者恒科占末者增稅夫關市之稅者謂市及國門闕門者也惟斂出入之商賈不稅來往之行人今若不論商人通取諸色事不師古法乃任情悠悠末代於何瞻仰濟濟盛朝自取嗤笑雖欲憲章前古二本作姬典乃是違背周官臣知其不可者一也臣謹按易繋稱庖羲氏没神農氏作日中為市致天下之人聚天下之貨交易而退各得其所班志亦云財者帝王聚人守位養成群生奉順天德理國安人之本也士唐書仕下同農工商賈四人有業學以居位曰士闢土殖穀曰農作巧成器曰工通財鬻貨曰商聖王量能授事四人陳力就職然則四人各業乆矣今後安得動而搖之蕭何有云人情一定不可復動班固又云曹叅相齊齊國安集大稱賢相叅去屬其後相曰以齊獄市為寄慎勿擾也後相曰理無大於此者乎叅曰不然夫獄市者所以并容也今欲擾之姦人安所容乎吾是以先之夫獄市兼受善惡若窮極姦人無所容竄唐書疊姦人無所容竄六字乆且為亂秦人極刑而天下叛孝武峻法而刑獄繁此其効也老子曰我無為而人自化我好静而人自正叅欲以道化其本不欲擾其末臣知其不可者二也四海之廣九州之雜關必據險路市必憑要津若乃富商大賈豪宗惡少輕死重義結黨成群喑嗚則彎弓睚眦則挺劍少有失意且猶如此一朝變法定是相驚乘兹困窮或致騷動便恐南走越北走胡非惟流逆齊人亦自擾亂殊俗又如邉徼之地冦賊為隣興胡之旅嵗月相繼儻因科賦致有猜疑一從散亡何以制禁求利雖切為害方深而有司上言不識文體徒欲益府二本作帑下同藏助軍國殊不知軍國益擾府藏逾空臣知其不可者三也孟軻又云古之為關也将以禦暴今之為關也将以為暴今行者皆稅本末同流且如天下諸津舟航所聚旁通蜀漢前指閩越七澤十藪三江五湖控引河洛兼包淮海𢎞舸巨艦千軸萬艘交貿往返憧憧唐書作昧旦永月今若江津河口置舖納稅納稅則檢覆檢覆則遲留此津纔過彼舖復一作覆止非惟國家稅錢更遭主司僦賂船有大小載有多少量物而稅觸途淹乆統論一日之中未過十分之一因此擁滯必致吁嗟一朝失利則萬商廢業萬商廢業則人不聊生其間或有輕薄二本作訬任俠之徒斬龍刺蛟之黨鄱陽暴虐之客富平悍壮之夫居則藏鏹出便竦劍加之以重稅因之以威脅一旦獸窮則搏鳥窮則攫執事者復何以安之哉臣知其不可者四也五帝之初不可詳矣三王之後厥有著云秦漢相承典章大備至如關市之稅史籍有文秦政以雄圖武力捨之而不用也漢武以霸畧英才去之而勿取也何則關為禦暴之所市為聚人之地稅市則人散稅關則暴興暴興則起異圖人散則懷不軌夫人心莫不背善而樂禍易動而難安一市不安則天下之市必搖矣唐書一作新一關不安則天下之關必動矣况澆風乆扇變法為難徒欲禁末遊規小利豈知夫𤣥黙亂大倫魏晉𦕈小齊隋齷齪亦所謂唐書無此字不行斯道者也臣知其不可者五也今之所以稅關市者何也豈不以國用不足邉冦為虞一行斯術冀有殷贍然也㣲臣敢借前箸以籌之伏惟陛下當聖朝御𤣥籙沉璧於洛刻石於嵩鑄九唐書作寳鼎以窮姦坐明堂而布政神化廣洽至德潛通東夷暫驚應時平殄南蠻纔動計日歸降西域五十餘國廣輪一萬餘里城堡清夷亭候静謐比為患者唯苦二蕃今吐蕃請命邉事不起即目雖尚屯兵乆後終成弛析獨有黙啜假息孤唐書作辜恩惡貫禍盈覆亡不暇征役日已省矣繁費日已稀矣然猶下明制遵大樸愛人力惜人財王侯舊封妃主新禮所有支科文粹作繼咸令削滅此陛下以躬率先堯舜之用心也且關中河北水旱數年諸處逃亡今始安輯倘加重稅或慮相驚况承嵗積薄賦日乆俗荷深恩人知自樂卒有變法必多生怨生怨則驚擾驚擾則不安中既不安外何能禦文王曰帝王富其人霸主富其地理國若不足亂國若有餘古人有言帝王藏於天下諸侯藏於百姓農夫藏於庾商賈藏於篋惟陛下詳之必若師興有費國儲多窘即請倍筭客商加斂平人如此則國保强富人免憂懼天下幸甚臣知其不可六也陛下畱神繋表屬想政源冒滋炎熾早朝晏坐一日二日萬二本作機務不遺先天後天靈唐書作虚心宻應時政得失小子何知率陳瞽辭伏紙惶怖唐書作懼一作懾諫不置勸農判官疏皇甫憬開元中臣聞智者千慮或有一失也而一無此二字愚夫千計亦有一得也一無也字且夫無益之事繁則不急之務重務重則役數一作數役下同役數則人疲人疲則無聊生矣是以太上務德以静為本其次化之以安為上但責其疆界嚴之隄防山水之餘即為見地何必聚人阡陌親遣檢一作括量故奪農時遂唐書作致令受弊又應出使之輩未識大體之一作所由殊不知陛下愛人之一無此字至深務以勾剥為計州縣懼罪據牒即徴逃士之家隣保代出隣保不濟又便更逃一作輸急之則都不謀生緩之則慮法交及臣恐逃逸從此更深至如澄流在源止沸在火不可不慎今之具寮向逾萬數蠶食府庫侵害黎民國絶數載之儲家無經月之蓄雖有厚稅亦不可供户口逃亡莫不由此縱使伊臯申術管晏陳謀豈息兹弊若以此為一無此字給将何以堪雖東海南山盡為粟帛亦恐不足豈量一作括田稅客能周給也一作皆舊唐書宇文融傳文苑英華卷六百九十七
