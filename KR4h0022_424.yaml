body:
  text: 文苑英華卷四百二十四宋李昉等編赦書五禋祀赦書一赦書沈約門下朕昧旦一作爽夙興念兹治道而明不燭逺𢎞之未易仰尋先烈思致隆一作升平日頃多故戎役一作車代有軍政國容事緒非一刑禮參用未臻和簡向隅之情永言增歎今郊禋載洽幽明允從思隆一作崇嘉祉被之兆庶可大赦天下主者施行一作皆初學記南郊恩詔門下卜日禋饗政道莫先厚下布澤哲王是務朕仰祗靈眷俯臨億兆嵗象回環恭事亡及牲玉必荐感敬備申升煙燎於穹昊致精誠於太一思霑颽可亥切南風也潤惠兹窮生應天監三年內犯奪勞及左降可悉原降繼市職不充人身及家口質繫悉散還私家督備前嵗三五犯譴因及隨曹景宗授司州委叛應謫役者並量所蠲降尚書所檢巧陳淫辭普更開恩百日各聽自首不問往罪京師三縣尤窮之民詳加賑恤主者速條格施行南郊恩詔門下朕肅膺乾貺君臨率土雖日晏劬勞而仁恕未洽星琯驟回履端告始禋饗云備誠敬廉一作兼申宣和布澤情深待旦凡內外文武可各賜勞一年叛亡未擒若百日內自首還役不問往罪女子質繫悉且散遣文書輕重坐罪並皆從原主者詳為條格疾速施行南郊赦書張九齡門下朕獲主三靈于今一紀聼政中昃每不敢康觀書乙夜將求諸道頻年已來每思至理詔令作為理思至或逺人不率或嗣嵗不登淳朴未還惕厲斯在為人上而慙德奉天明以畏威故祝史宣辭必期於陳信郊丘備禮將俟於升平今正宗廟降靈克開厥後乾坤交泰保合太和麟鳳龜龍𤣥符黃瑞之祉蠻夷戎狄梯山航海之琛莫不日月以聞道路相屬顧惟不德承兹休運欽若昭報疇咨故實所以今年獻春恭祠詔令作祀后土季秋吉日追崇九廟採必先於魯集作曽經稽肆類於虞典爰因長至欽謁上𤣥告受命之元符昭嚴配之成績大典云備至誠克展諸侯駿奔來於穆之相百神受職率咸秩之文六變已陳三獻斯畢蓋春秋之大事莫先乎祀王者之盛禮莫重於郊柴燎克終感慶罔極豈豫一人之福亦爾萬邦之賴宜因咸和之際俾承厚下之澤可大赦天下自開元十一年十一月十六日昧爽已前罪無輕重已發覺未發覺已結正未結正繫囚見徒大辟罪已下咸赦除之其十惡死罪造僞頭首劫賊殺財主在不赦例就中仍慮有寃濫者所司具狀送中書門下盡理詳覆奏聞朕將親覽其有亡命山澤挾藏軍器百日不首復罪如初敢以赦前事相告言者以其罪罪之升壇行事官及供奉官三品已上賜爵一級四品已下加一階諸獻官并凖此升壇例內外文武官及致仕并前資陪位者賜勳一轉緣大禮有職掌并押當者更加一階齊郎並放出身皇親諸親陪位未出身者並放選已出身者賜勳一轉親王公主各與一子官三品衛監門黃衣長上飛騎萬騎并仗內雜色人在齊宫宿衛及諸色人有資勞人緣大禮有職掌并流外行署預見大禮者亦賜勳一轉其充香爐執扇及禮生祝史贊者賜勳外簡日選優與處分兵士宿衛齊宫并諸色無資勞緣大禮職掌及京兆府百姓緣南郊祗應者各免其家一年雜科差南北衛將軍率中郎將宿衛齊宫者並同升壇例其諸軍節度大使及三都留守雖不陪位委寄既重特宜同升壇官例百嵗老人賜綿帛五假粟五石縣令至其家存問給付孝子順孫義夫節婦旌表門閭終身勿事已旌表者量加優恤諸州百姓或因逢水旱流寓未安者宜令所司與朝集使即作賑乏一作恤安輯法奏聞其單貧衛士畨鎮久次令州府長官簡擇灼然者放免畨役征行人家州縣檢校勿使侵欺磧西鎮人途路懸邈一作逺特宜賜勳一轉鰥寡惸獨亦令州縣倍加矜恤使得存濟元置義倉救人不足承前貸百姓糧及種子未納者並放免不得却徵自古聖帝明王忠臣烈士名山大川並令所𬋩致祭其已得贊官人并輕詔令作轉纍未得處分非老弱疾病猶堪處事者量加收叙使免失職其左貶官非逆人五服內親及犯贓賄名教者所司實勘奏聞量移近處其官人有清白政術堪任刺史縣令及抱器懷才不求聞達者州長官具以名薦宗室中有孝悌才術為衆所知仍在卑任者委宗正具以名奏君臣一體休戚共焉朕欽承天命恭傳大寶蓋慿纍祖餘業得一之符亦由群公舊勳不二之力永言繄賴其敢忘之自武德已來實封功臣知政宰輔有身無大故而亡官失爵子孫淪屈者所由勘實具以狀聞存者可籌其官榮逝者當録其𦙍嗣使幽明同慶知有今辰亞獻邠王守禮終獻寧王憲各賜物一千匹捧爼申王撝夾侍岐王範薛王業各賜物㭍百匹侍中源乾曜中書令張說兵部尚書同中書門下三品王晙各賜物伍百匹正衣駙馬都尉王守一王繇溫曦宗正少卿崔澄各賜物三百匹二王後賜物一百五十匹壇場使京兆尹孟溫禮賜物二百匹修造羽儀使賜物一百匹修撰儀注官五品已上賜物一百匹六品已下賜物七十假自餘陪位預宴官一品賜物一百匹二品三品八十匹四品五品六十匹六品七品四十匹八品九品三十匹鴻臚諸蕃使與見大禮及在本蕃王侯大酋長並同宴會例給賜郡主縣主各賜物八十匹緣大禮數處有職掌者任於一頭從高叙天下州府賜酺三日京城五日前任所在百姓村坊宴樂不得科率聚斂其有處分未該者令所司及本使比類奏聞赦書日行五百里主者施行東封赦書門下朕聞天監惟后后克奉天既合德以受命亦推恩而復始厥初作者七十二君道洽德集作跡著時至符出皆用事于介丘升中於上帝人神之望蓋有以塞之皇王之序固可得而言也朕接統千嵗承光五葉惟宗祖之德在人惟天地之靈作主往有內難幽贊而集大勳間無外虞守成而纘舊服未嘗不乾乾終日思與公卿大夫上下叶心聿求至理以𢎞我列聖其庶幾乎馨香今九有大寧群氓樂業時必敬授而不奪物亦順成而無夭懋建皇極幸致太和洎乃幽遐率由詔令作皆感被戎狄不至集作軌唯文告而來庭麟鳳已臻將覺悟而在藪以故凡百執事亟言大封顧惟不德初欲勿議伏以先聖儲祉與天同功荷傳符詔令作慶以在今敢侑神而無報大節斯在朕何讓焉遂奉遵高祖太宗之業憲章乾封之典時邁東土柴告太嶽詔令作岱嶽集作岱宗精意上達肸蠁來應信宿行事雲物呈祥登降之禮斯畢嚴配之誠詔令作義獲展百神群望莫不懷柔四方諸侯莫不來慶斯事天道之介福邦家之耿光也無窮之休祉豈獨在豫非常之惠澤宜其逮下可大赦天下自開元十三年十一月十三日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒咸赦除之唯十惡死罪不在此限詔令作例流人未逹前所者放還其有挾藏軍器亡命山澤百日不首復罪如初敢以赦前事相告言者以其罪罪之內外文武官三品已上賜爵一等詔令作級四品已下加一階邠王守禮寧王憲岐王範薛王業各與一子三品官公主嗣王郡主縣主各與一子官其應文武行從官加階之外並賜勳兩轉三衛引詔令作司駕細引黃衣長上飛騎彍騎先有武散官者加兩階未給武散官者各賜勳兩轉衛士馬主戎車主幕士掌間供膳太常及仗內音聲人行署及蕃官七色并别勑雜色定名行從人亦賜勳兩轉緣大禮登山守行侍從行事輿腳等官三品已上特賜一階仍與一子生上品已下特賜一階仍賜勳兩轉量與進改其四軍别抽出山宿衛及諸司上山執當官三品已上賜爵一等仍與一子出身四品已下加一階賜勳兩轉亦量進改其白身人及行署蕃官放蕃選其山下升壇行事官三品已上加爵一等賜勳一轉四品已下加一階賜勳一轉選日稍優諸獻官及宿衛齊宫將軍率中郎并郎將并兩京留守諸軍節度使並同升壇例諸有職掌押當非升壇例諸有職人加一階選日優量其加階應入三品五品人非特賜者並依十一年三月二十八日勑節限齊郎禮生見任官前資官已上人並依資量材與處分未出身者放出身皇親别勑承勑詔令無此字恩陪位者亦凖此諸州嶽牧四府長史朝覲陪位者泛階之外各賜勳一轉諸方使人及諸州父老宗姓并從家子孫至嶽不得陪位者並賜勳一轉賜物五假諸州及兖州道僧至嶽見大禮者並賜物五假孔子後褒聖侯量才與處分天下致仕官各依本品賜一季祿并束帛其陪位者仍賜勳一轉諸蕃侯王酋長來㑹禮者各加一官至都節級並與賜物其入朝留在邉軍人亦凖此其蕃中知一作秪候衙官刺史縣令並賜物及袍帶突厥可汗小殺等諸國王守護塞垣嵗月朝貢並宜賜物副使將往侍老年百嵗已上者版授下州刺史婦人版授郡君年九十已上者版授上州司馬婦人版授縣君年七十已上者版授縣令并婦人版級量賜粟帛其預見大禮侍老各别加侍下一人孝子順孫義夫節婦旌表門閭終身勿事行人之家及鰥寡惸獨并疾病不能自存者委州縣長官倍加存恤諸軍行有文武散官已上者加一階白身者賜散勳一轉缺負官物逋懸租調並宜放免其行過州縣供頓劬勞并貼頓百姓有雜差科并車馬夫役者並免一年租賦詔令作稅兖州免二年租賦詔令作稅當頓官人始末不絶者與中上考仍賜勳一轉朕永惟王業繄賴舊勳元首股肱其猶一體自武德已來功臣宰輔或名存王府遺嗣沉淪或身無大故銜屈泉壤宜令所司訪擇申理唐元六年六月二十六日按唐書唐隆元年六月十日𤣥宗定內亂睿宗二元景雲今赦文避𤣥宗諱隆故作改唐元是也復增六年六月字則非立功官人往屬艱難能盡忠義今成大禮何日忘之宜各與一子出身無子者任回與周親之人有司試䇿三道等第收奬朕躬陟天門宿齊日觀時屬嚴冬雪後初夜風寒朕因露立祈恩誓欲代人當咎俯仰之際頓息霜颷奠獻之晨變同韶景誠荷上天垂祐亦賴靈山吐祥詩云無德不報宜封太山神為天齊王禮秩加三公一等宜令所𬋩崇飾祠廟環山十里宜集無此字禁其樵採給近山二十户復以奉神祠率土之內賜酺五集作七日任於村坊內宴樂不得聚詔令作率斂煩勞其節文有未霑及者所詔令作有司比類奏聞其封祠集作祀有數處行事者從一處叙赦書日行五百里主者施行后土赦書門下昔者巡狩所至柴瘞所在蓋取誠享以遵告類朕恭承祖宗之烈獲主神祗之祀夙夜祗畏不敢荒寧故勒兵朔陲先展義於汾詔令作扮社回斾睢上遂有事於郊壇王者父事天母事地漢氏祈穀未始正名周禮降神乃為徼福而已朕以天命之重子道為先惟兹精誠在乎敦孝庶䝉福於四海期永康於兆人是以率由舊章敬恭明祀嚴配之誠既展奠獻之禮又終且春秋之義大事在祀齊祭之福庶品維祺豈獨在豫而有斯慶可大赦天下自開元二十年十一月二十一日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不免者咸赦除之官人犯贓及有罪詔令作事被推者本罪雖原不得更令却上仍别與處分自先天詔令作奉先非已來有雜犯流移人等并配𨽻人等各量移近處左降官未經量移及經量移未復本資者奏聼進旨詔令作止天下遭損免州應損户成詔令作减一分已上者及供頓州無出今年地稅如已徵納賜折來年地稅逋租懸調貸糧種子缺負官物在百姓腹內者並宜放免其不損處一作免州自開元十七年已前所有貸糧種子負缺官物在百姓腹內者亦宜凖此諸州緣供頓所差貼助夫亦放其家今年地稅孝子順孫義夫節婦旌表門閭終身勿事諸州侍老百嵗已上賜粟七石九十已上賜粟五石八十已上賜粟三石所由速付勿淹旬日太原潞府侍老等先已加恩不在此例亞獻皇太子鴻賜物二千匹終獻慶王澤賜物一千匹邠王守禮寧王憲薛王業各賜物一千匹忠王浚已下各賜物三百匹夾侍正衣進圭捧圭汝陽郡王淳等各賜物三百匹皇太子夾侍正衣各賜物一百五十匹裴光庭蕭嵩弼亮朕躬𢎞益斯逺不有優異何殊等夷詔令作倫加階賜爵之外各與一子官無子者任與周親仍各賜物三百匹二王後各賜物二百匹長公主各賜物三百匹嗣王郡主縣主各賜物二百匹行從文武官三品已上賜物八十匹四品五品賜物六十匹六品七品賜物四十匹八品九品賜物二十假升壇官三品已上特賜一階四品已下各加一階應入三品五品官階相當不限考數聼得入知頓使及判官修禮儀官撰玉冊文官知頓御史加一階修壇場州刺史及書冊詔令作修壇官各賜物一百匹其已有升壇職掌從一頭處分緣大禮有職掌官賜勳三轉行從官首末不絶及陪位官各賜勳兩轉內外文武官三品已上賜爵一等四品已下各加一階致仕官三品已上賜物七十匹四品五品各五十匹行從蕃客鴻臚安置陪位見大禮者宜賜物五十匹節級分付南北衙應宿衛齊宫官及左右廂知兵馬虞候㹅管已下詔令作及判官詔令作司别奏兼孔目官等更加勳一轉前資官選日稍優與處分自守身三字一作白身人有資勞者簡選之日優與處分無資蔭者賜勳兩轉南北衙行從三衛飛騎萬騎引駕細引一作伏及監門直長主帥黃衣長上各賜勳兩轉仍各賜物五假兩營弩一作弓手六畨併行宜各賜勳兩轉物五假仍量折畨役諸衛彍騎及兵角弓手官馬主掌間幕士駕士供膳主習馭工人樂詔令作築人雜户官户白身有職掌人合行從人等各賜勳一轉物三假其齊郎既是見任官凖壇上壇下有職掌官例處分執彈三衛及禮生贊者各减二年勞無勞可减者簡選日稍優與處分流外行署從者各賜勳一轉有職掌者各賜勳兩轉供頓州刺史同陪位官例始末專知頓官各與一中上詔令作上中考蒲州刺史寶鼎縣官同升壇官處分管壇一鄉百姓給復二年蒲州侍老等凖太原潞州例降一等處分武德初功臣每有大慶必存追逺業參運始義合賞延其子孫沉翳無在朝者宜令勘實即與一子官唐元初立功臣一作官等艱難之際誠效亦深言念其初豈忘終始其三品已上各賜一品官五品已上各賜紫金魚袋有亡殁者優贈一官仍與一子官一子先一作已得官者選日優與處分兩京留守京兆河南尹四大都督府長史諸軍節度副大使凖行從官例處分諸方通表疏使人預見大禮凖陪位官處分諸道戰詔令作陳亡人家仰州縣存恤不周濟者量事賑給諸軍詔令作道健兒别勑行人各賜勳一轉仍令所司速勘會團奏官寫告身送付諸道行人或有身死被詔令作波逃猶徵課役纍及親鄰即宜審勘為其除削皇親中有文武才用堪任使者委宗正具薦詔令作具以合上當與奬擢五嶽四瀆名山大川自古聖帝明王忠臣烈士輔相各令致祭務盡誠潔赦書有所不該者所司比類聞奏亡命山澤挾藏軍器百日不首復罪如初敢以赦前事相告言者以其罪罪之率土之內賜酺三日赦書日行五百里布告天下詔令作遐邇咸使聞知主者施行文苑英華卷四百二十四
