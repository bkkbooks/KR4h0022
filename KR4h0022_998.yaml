body:
  text: 文苑英華巻九百九十九宋李昉等編哀弔上大同哀辭一首悲周子桑文一首哀吾丘子文一首楊氏子承之哀辭一首哭張俊餘文一首歐陽詹哀辭一首獨孤申叔哀辭一首弔塞上翁文一首弔紀信文一首弔陳司馬書一首弔國殤文二首哀二良文一首大同哀辭并序梁簡文帝大同字仁洽予之第十九子也生於仲秋殞於冬末悲夫潜慟結于心愁眉慘于外夕坐於是申旦當食以之不甘客有謂予曰死生常也夭夀命也陳蕃所憇之家乆傳紀錄藝文類聚作乆記𤣥錄之歲華歆所聞之語已定北陵之期上聖所以忘情賢者所以逹節將何戚焉予對之曰觀其明眸豐下玉色和聲豈不登髫歲而擬觸藩及紈袴而知類聚作仰折李靈心摧於毫末慧識挫於趾歩庶方悟於来途遂窮魂於短日豈不傷哉乃為辭曰含精鬱抑歎嗟何極云誰之悲悲予弱息實天道之偏頗觀賦命之殊舛彼神祭之靈長獲萬春之悠緬有舜華之照灼寄一朝之浮命類聚作淺始夣熊而兆吉遂設弧而表慶驗天蘭之所受知地井之可映愛萱草之有微欣赤芾之在詠信歎慰之未幾悼夭零之云及乃變樂而為悲遂改笑而成泣昔珠褓之交舒又金香之相襲籍綺茵於弱飢疑作肌隱孩笑於羅帷今獨親於𤣥壌亦何痛其如之憶餘態而心楚想媚質而廻膓藥尚殘而染地衣猶襞而在牀巻金屏之四葉開銀函之九羊忽徘徊而想象曽何時而不傷於是風景暮鍾氣嚴晩候葉蔌蔌而走堦水涓涓而鳴漏月半鏡而開河雲羅柱疑而下岫燈發熖而吐花火含光而成就金鹿之恨涕沾衣金瓠之哀還掩扉猶兹紫山明玉碎譬彼西都芳草腓終無逐浪鳬舡反何時復聞龍種歸悲周子桑文集作悲汝南子桑文皇甫湜汝南周子桑理書集作治書通春秋非仁義不動止年二十三貞元十九年如京師將舉五經秋及陜見無舉詔冬還二字集作東還冬及宋而病閏月丁亥將集作而死時天大寒雨雪火不星前纊不銖身寒之聲與將死之聲黎然其書在乎側五字集作其具書存乎側其所行存乎側友人安定皇甫湜集作常字至見之而哀之為文悲之曰蜀本無曰字渾沌無端誰開闢之善惡未形誰分白之善其福耶集作之惡其禍耶集作之謂善之福夷死何飢集作駢謂惡之禍跖死何肥何闔閭之死金玉其墓何黔婁之死手足不覆孰主張其事而顛倒其數天視一作且高地視一作且遼鬼神之形幽敢問何數集作故巫咸招曰來吾語汝天有至集作正理地有坦途精者常不足麄者常有餘有餘常豐不足常枯子乃惑之一何愚人事著矣請指物以明覈之問子集作復問聖者何千嵗一集有作字而愚者其麻鳯凰不下而鷄滿家何草不芝盡野而莎何蟲不龍盡水而鰕何集作非精者理少而麄者理多耶蘭萎何先葹死何難玉何為而脆石何為集作故而頑衣冠何蹇戎狄何繁集作蕃何麟而死集作恠何鶴而軒彼人事皆然推於物亦然是為自然巫咸畢歌歌已而去之曰父耶母耶天乎人乎集作天兮人兮已焉哉謂之柰何集作何哉哀吾丘子文李觀古之道窮者接輿則歌吾丘子則哭哭者年志俱謝怨不容於歌歌者聲跡可晦不欲取仁字集作趨當世之譏集作機也然吾丘子古之窮人也哀莫至焉仲尼方適於營丘遇於途衣無裙冠無縷不言於人人亦不自言吐梗茹酸號于莽蒼集作草莽之間涕交於頥隨而成淵集作泉聲薄於巍巍一斷一連集作聮鳥為之相鳴雲為之不能集無能字為飛負者息游者感仲尼亦停集作倚蓋為之二字集作而心惻顧門人之辨者往訊而唁之吾丘子揮集作撒涕而言之曰太古之先有不宰者聚五行之秀氣以為人鏤五行集作常之大端以為心人者所謂集作所以靈於萬物者也其集作故生必有依心者所謂集作以履於百行者也其集作故立必有從生必有依者親立必有從者君君親之間必有交游非其親孝無所宣非其君忠無所稱非有交游不能集作無所成其身三者人皆遂之則魯曽參衛史魚齊管仲夷吾皆其遂者也子獨負之夫身二字集作天年復衰是故哭而哀然哀集作哭之中有三殺焉始者至於四方希有一朝之榮以為父母昆弟之懽逰罷乃還集作旋而父母之墳已乾今思而哭之與不養之子同中事二字集作仕諸侯之朝君無德而兵侵今思而哭之與亡國之臣同復忠孝之間不聞天下集作天下不聞之集作其臣子予耻而集後有字交今思而哭之與言無所信同夫忠本孝而生信載義而行三者既虧於生非生行何集作可行也汨然自沉與波而東流不窮至今凄集作於悲風言於黔婁栁下惠必為之感激言於伯陽齧缺必謂之不通集作亦未必為通觀所以作哀吾丘子之文務朂人之中庸楊氏子承之哀辭并序栁宗元楊氏子承之既冠有成人之道其明年四月不幸而夭其外姻觧人永本有栁字宗元為之慟且出涕噫是子也氣淳以愿志專以強集作勤確焉集作然而直方吾未知其止也作辭賦書論其言甚韙予方愛之謂可以為噐者故不知慟且出涕况其親戚者乎凡天之生物也不類精麄紛龎永本作龎亂賢愚混同或逺而合或親而踈集作殊然則雖人之親戚亦將有不克知其美者若楊氏子者其親戚皆賢咸得知之者也使之集無之字知之徒以増其愁悲怨號之聲無益集作為也用是為之辭以致其哀焉葆醇熈兮承貞則懿文章兮好循集作脩直誠耿介兮又綽寛學之勤兮行彌專質珪璋兮文虎豹超凌厲兮馳聖道力未具兮志求通道之逺兮足先窮有母噭噭兮有弟哀號世父孔悲兮湘水滔滔去昭曠兮沉幽漠魂冥冥兮竟誰託死者靜兮生者愁子之淑兮徒増憂志甚良兮命甚蹙子之生兮又何欲悲吾耳永本作子身兮動吾神誰使子兮淑且仁嗚呼已兮集作乎不可追終怨苦兮徒何為哭張俊餘辭并序前人俊餘常山張氏孝其家忠其友為經術甚邃而文少予七年頗弟畜之與之居終日冲然忘其有人與之言鏗爾而厲辨而歸乎中凡人有道而不顯於世則曰非其世也道而得乎世然而集作猶不顯則曰命命之微不可知知而索乎外者曰性與貌俊餘之性可謂良矣其貌可謂温集作肅矣博實宏裕宜為大官耉老求其所以夭賤無可得焉既得進士明年疽發髀卒俊餘之死人咸痛之曰天之祐善人而殺是子何也激者曰天之殺恒在善人而祐不肖莊周之説以為人之君子天之小人張君豈天所謂小人者耶是二者又非論之適也吾謂善與惡夭與夀貴與賤異道而出者也無取喜怒於其中道之出者多其合焉者固少是以君子之難貴且夀也俊餘母老而䘮良子東西行者助之哭焉况其知者耶然俊餘不與謟冒者同貴不與悖亂者同夀歸㓗乎身聞道而死雖勿哭焉可也嗚呼向使其聞道而且貴且夀則其顯庸也逺矣又烏能勿痛乎遂哭之以辭云嗟嗟張君善不必夀惟道之聞一日為老人皆反是百稔猶㓜子之優游是亦黄耉嗟嗟張君寵不必貴尊嚴為仁早服高位淫䛕集作謏肆慾銀艾淪棄子之崇高無媿三事吾見皤皤而童赫赫而辱進𥜗袴於几杖負泥塗於冕服已雖有餘人視不足子之跡不混乎其間者幸也宜賀而弔宜歌而哭吾其過乎與其寵而加貴善而加夀道施於人慶及其母從容邦家樂我朋友豈不光裕顯大歟而不克也則弔而哭者其無過乎嗚呼歐陽詹集本文粹作生哀詞并序韓愈歐陽詹世居閩越自詹已上皆為閩越官至州佐縣令者累累有焉閩越地肥衍有山泉禽魚之樂雖有長材秀民通文書吏事與上國齒者未嘗肯出仕今上初故宰相常衮為福建諸州觀察使治其地衮以文辭進縣鄉下集本文粹作小民有能誦書作文詞者衮故宰相有名於時又作大官臨涖其民集作衮字親與之為客主人原本無人宇之禮觀逰宴享必召與集作預之時未幾皆仕集作化翕然詹于時獨秀出衮加愛敬諸生皆推服閩越之人舉進士繇詹始建中貞元間予就食江南未接人事往往聞詹名閭巷間詹之稱於江南也乆集有矣字貞元三年予集有年十九三字始至京師舉進士則聞詹名尤甚八年春遂與詹文詞同考試登第始相識自後詹歸閩中予或在京師他處不見詹乆者唯詹歸閩中時為然其他時與詹離率不歴嵗移時則必合合必兩忘其所趨乆然後去故予與詹相知為深詹事父母盡孝道仁於妻子於朋友義以誠氣醇以方容貌嶷嶷然其燕私善謔以和其文章切深喜往復善自道讀其書知其於慈孝最隆也十五年冬予以徐州從事朝正於集粹作于京師詹為國子監四門助教將率其徒伏闕下舉予為博士㑹監集注作詹有獄不果上觀其心有益於予將忘其身之賤而為之也嗚呼詹今其死矣詹閩越人也父母老疾捨朝夕之養以来京師其心將以有得於是而歸焉集粹無此字為父母榮也雖其父母之心亦皆然詹在側雖無離憂其志不樂也詹在京師雖有離憂其志樂也若詹者所謂以志文粹作忠養志者歟詹雖未得位其名聲流於人人其德行信於朋友文粹作友朋雖詹與其父母皆可無憾也詹之事業文章李翺既為之誌集粹作傳又作說予文粹無予字故作哀辭以舒予哀以傳於集粹作于後以遺其父母以集粹作而觧其悲哀文粹作衰悲以卒詹集粹作其志云求仕與友兮逺離集粹作違其鄉父母之命兮子奉以行友則既獲兮祿實不豐以志為養兮何有牛羊事實既脩兮名譽又光父母欣欣兮常若在旁命雖云短兮其存者長終要必死兮願不永傷友朋視疾兮藥物甚良飯食孔集作既時兮所欲無妨受命不齊文粹作高兮人道之常在側與逺兮非有不同山川阻深兮魂魄流行祀祭則集註作之及兮勿謂不通哭泣無救集作益兮抑哀自強推生知死兮以慰孝誠嗚呼哀哉集粹有兮字是亦難忘獨孤申叔哀辭前人衆萬之生誰非天耶明昭昏䝉誰使然耶行何為而怨集作怒耶居何故而憐耶胡喜厚其所薄而恒不足於賢耶將下民之所好惡與彼蒼懸兮抑蒼茫無端而暫寓於其間耶死者無知吾為子慟而已矣如有知也子其自知之矣濯濯其英曄曄其光如聞其聲如見其容集作如處其旁嗚呼逺矣何日而忘弔塞上翁文前人居延蜀本作近海南四餘百里有南騂戍集作有古城焉土人云是塞上翁城今為戍其基扄趾跡盖數千年也丙戌之嵗兮我征匈奴恭聞此叟兮託國此都弟尚於集作尚于子叟日月遐邁予集作及今来思實獲心契欣聞於叟何徳其愚旴本作何徳之愚僻居幽漢浩與世殊忘情逸馬胡寜而知福謝於隣人何逹而不淑丁男既存君子知復人以為極也伊懐兹土既板且築扄禁天崇墉隍雲矗今則蕪集作荒穢世亦不毓其何故集作故何哉賢叟之德登叟之堂天道何其集無其字逺而兹理茫茫人代日集作世自故兮丘郭日荒䰟魄何家不歸其鄉蜀本作䰟魄何為不歸故鄉旴本作䰟魄何家獨不歸其故鄉叟乎叟乎我心之傷弔紀信文盧藏用維年月日某官名㳟弔漢忠臣將軍紀信公曰皇綱絶兮帝維頺王風悲兮覇道衰天運促兮周以覇秦德棄兮漢葉疑作業開何項王屭屓作驅除於雲雷豈淵海之飛盪資㧞山之偉才於是左契歸楚羣雄奉職皇矣漢祖獨負其直矧滎陽之圍城兮既孤而逼偉將軍之天誘兮矯奪其識彼見危而授命兮亦各有時考振古以為觀兮罔恢帝基感將軍之發憤兮壯大義之在兹仰前脩以砥節兮顧車廻而馬遲嗚呼身既焚兮業既昌楚歌絶兮漢道光君不旌兮史不揚功不錄兮殁不傷奄孤墳以載塟集作弊抑千祀而為荒皇周敷訓兮澤及枯胔伊予寡徳兮沗宰兹地奉宣嘉猷兮懼尸厥位將軍兮允忠且義託神交於萬古兮實獲心志乃斵石於他山兮式幽墳以昭賁詞曰攝提貞歲兮奉揚仁風䟦渉草莽兮詞弔紀公善彼勇兮殺身為忠九原不作兮予將焉同金石刻名兮千萬歲魂魄光烈兮為鬼雄弔陳司馬書張説正月癸亥孤子范陽張君集作説頓首頓首陳君之靈頃伏苫廬集作盖逺辱慰疏執對號慟次於展洩来使未還傳君遇禍盡哀寢外傷心痛骨明府兄毓德南邦飛聲中夏急人之急憂人之憂勇於履危果於從政入使天闕有專對之美按俗交州見澄清之節故投衣衡管割錦閩鄉越嶂舊風人俗集作䄄輕剽捩之以淳俗革之以華章矯枉過中斯害也已齒由剛折膏為明銷嗚呼陳君婞直而殞皇天輔德問之何故疇昔炎海契濶周旋義則朋友恩結兄弟方期歲暮韡韡集作曄相榮𤣥髮未華何圖零落山濤猶在嵇紹不孤逝者有知當昭是意今返防關力軌集作報是前書幽明雖異交友無改悲言下筆涕泗從之并往千歲俾陳奠酹􅒣欷萬里哀哉柰何説頓首再拜弔國殤文前人北伐兮東方邈遼陽兮孤竹偏師兮覆衆在崇山兮峡谷露芃芃兮蔓草風蓁蓁兮拱木見馬血兮夜然聞殤魂兮雨哭惟王按金鼓而氣憤撫珠鈐而淚滋横萬里兮抽恨弔羣山而冩悲懟㐫將兮我辱悼勇夫之被集本文粹作秋纍彼殷集粹作前監兮未逺何後来兮集作者不追對死地兮出陣臨儒集粹作傷門兮用師軍奪帥兮虹蝕壘車脱輻兮火焚旗有欒黶兮愎矣無范宣兮媿之命窮追集作邇文粹作迮兮短兵錯膚迎集粹作釾刃兮血染鍔旋殘潰兮棄組練山猶號兮谷餘戰殪原野兮奈何違君親兮不見於戯何天命之奄忽俾仁義之理文粹作治兵為異域之俘骨鬷六校之飛將間文粹作鎮五營之勁卒吾見出兮不歸竟集作噫名存兮身没同前陳子昻丁酉歲三月庚辰前將軍尚書王孝傑敗王師於榆關峡口吾哀之作此文三字集作故有此作天来悔禍兮熾此山戎虐老昏㓜兮人罹其窮帝用震怒兮言剪其㐫出金虎兮曜天鋒掃宇宙之甲馳燕蘇之衝何士馬之沸渭若雲海之洶洶荆河集作吳少年韓魏勁卒戈矛如林白羽若月但集作旦欲蹈烏丸之壘刈赤山之旗聫青丘之繳集作檄非封黄龍之屍冦兵猖獗姦險是慿蛇伏泥滓蟻鬭丘陵哀哉集作我將之仡勇兮無筭畧以是膺陷天井之死地属雲騎以相勝短兵既接長㦸亦合星流飈馳樹離山谷智無所施其巧勇無集作不能制其怯頓金鼓之雄威淪輿尸之敗葉集作業嗚呼哀哉矢石既盡白日頺生集作主將已死士卒哀徒手奮乎誰救哉含憤抗怒志未廻殺氣凝兮蒼雲暮虎豹慄兮殤魂懼殤魂懼兮可奈何恨非其死兮棄山阿流血集作血流骨漬集作積殪荒楚思歸道逺不得語降不戮兮背集作此不誅殁不賞兮功不圖豈士力集作力士之未殉誠師律之見孤重曰壯士雖死精魂用凶醜爾讎不可縱我聞強死能厲災古有結草抗杜回茍前失之未逺儻冥讎之在哉嗚呼魂兮念歸来哀二良文白居易承相隴西公出鎮於文粹作于汴州軍司馬御史大夫陸長源實左右之三集本文粹作二年而軍用寧司空南陽公作藩於集作于徐州軍副使祠部員外郎鄭通誠實先後之十集作三年而民用康暨十五年春隴西薨浃辰而師亂大夫以直道及禍十六年夏南陽薨翌日而難作員外以危行受集粹作遇害惜乎大夫人之望也員外國之良也咸克㓗於集粹作于下同身儉於家勤於邦又申之以言行文學智謀政事故其歴要官參劇務如刀劒發硎割而無滯如鍾鼓集粹作磬在懸動而有聲識者以為異時登天子股肱耳目之任必能經德秉哲紹復隴西南陽之事業以藩輔王家嗚呼善人冝將鍾奕葉之慶而不免及身之禍天乎報施之朕何其昧歟昔詩人有黄鳥之章以哀三良不得其死今斯文亦以哀二良命其篇云伊大化之無形兮浩浩而茫茫中有禍牙集作身兮若機之張梁之亂兮陸受其毒徐之難兮鄭罹其殃惟善人兮邦之紀綱邦之瘁兮而浙本有正字人先亡謂天之惡下民兮胡為文粹有乎字生此忠良謂天之愛下民兮胡為文粹有乎字生此豺狼我欲階冥冥問蒼蒼蒼蒼之不可問兮俾我心之䀌傷悲夫而今而後吾知夫天難忱而命靡常文粹有耶字文苑英華巻九百九十九
