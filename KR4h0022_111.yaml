body:
  text: 文苑英華巻一百十一宋李昉等編服章一受命寳賦一首鎮圭賦二首信圭賦一首珪璋特達賦一首服蒼玉賦一首山𤣥玉賦一首珮賦二首受命寳賦并序梁肅受命寳在昔曰傳國璽自秦始皇有焉葢取夫一世二世傳於無窮故有傳國之號歴兩漢至於陳隋隋煬一有帝字之遇禍也字文化及盜之而一有西字竇建徳滅化及取焉易稱物不可以終否武徳中太宗一戎衣而天下大定是器也與璽同歸國家用之以受命所承更名大寳唐車服志天寳十載改傳國寳為承天大寳而多歴年所自前代觀之受天明命則不求而得僣賊刼遷則得之而失葢神物之所在非徒然也抑又聞之鼎之輕重與璽之去留莫不視徳之上下位之安否一作危若恃寳命在已而慆心堙耳漸乎一作至危殆以負扆之尊被竊鈇之言當此時也此片玉耳復何為哉竊讀史氏感興亡之器忿徼覬之類於是作受命寳賦若形制之小大厚薄則未始詳也故不備焉其詞曰物之貴兮惟玉之英翕二氣以成形極一作涵百寳之純精卞氏得之三獻而後明當秦趙之抗衡挺髙價於連城伊玩好之所資㣲神器之鴻名及夫秦始稱皇削平六王為龍為光追琢其章其文曰受命于天既夀永昌其始也謂世有哲王傳國寳之無疆何逆天以暴物不及期以降殃惟隂陽一作隲之運行終受授二字一作有受而不常隨素車與白馬歸赤精於路旁逮夫漢業中㣲后族専命禄去公室世移威柄實沙麓之遺瘵成巨君之簒害雖擲地以慷慨終莫救夫顛沛俄漸臺之頺覆二字一作頽移歴更始與赤眉咸庸懦而不居卒亂長而禍滋洎四七之龍驤為火主以得之遂祀漢以配天延二百之炎輝苟非其人寳命不歸悼桓靈之不嗣置天下于阽危既而赤伏道䘮黄星兆發雲雷遘屯朝社播越去乗輿而漂蕩入眢井以蕪沒披一作拂草萊以拯之實功存乎武烈何典午之傾潰劉石盜以自尊既江表之卜年遂歸明以去昏五世推移或亡或存失得由道一作失由道䘮隋一作值之并吞始負險以争雄俄銜璧而來奔惟大業之離垣一作阻由君昏而黷武豺狼呀以當路郊廟棄一作毁而失主望夷之釁既發斯器淪於榛莽昊天有命眷我髙祖鶱飛汾晉震疊闗輔一作震疊開輔雲行雨施雷動飈舉聖人既作萬物斯覩于斯時也充徳扇結東周卼臲帝謂文皇陳師往伐如火烈烈如風發發牛口先撥虎牢則逹致四海於昇平混車書以同轍惟神器之有在終告歸乎一作于魏闕考乎先王之統世也以文經天以武緯地觀象備物従宜制器播而用之為天下利故曰大徳曰生大寳曰位位之升降唯道所至先王審其所以故為大於細為難於易然後本不摇而末不墜安危之體鑒此而已若夫符命之所加厯數之所歸莫不天人合一作唘發區宇樂推休祥煥然靈命顯思是以有守有失動而悦隨苟貪叨與僣亂莫不速禍而召危此玉也公路執持衆叛而親離趙高引佩殿壊而身糜一作縻惟前軌之昭昭孰可幸捷以取之若答曰吾皇有命如天有日傳寳在我昏庸自佚則陸渾無問鼎之事歴代無奉璽之術苟思慮於廢興故不既得而患失於戯天發禍機聖人定之天生神物聖人用之唐哉皇哉大人造之子孫百代永言保之凡一作皆集本鎮圭賦以王者端拱四維鎮寧為韻依次用元稹天子鎮圭十有二寸其長義在撫有十二州之域而為億兆之王圭比徳焉所以表特達之美鎮大名也有以示彈壓之强以之徴守則有土之臣至以之䘏患則受災之地康當宁無為於南面朝日有事於東方乃㑹百辟而執之班五瑞於來者作山龍之端表我則清光皎然雜蒲糓以成形爾乃鞠躬如也想夫彤闕一作闈乍曉碧砌生寒當玉座而髙居狀中峯之冠瑶岫透鑪煙而逈出意秋月之壓雲端是以聖后矜持庶寮瞻重安八荒於術内故捧必當心握萬務於掌中故大不盈拱映冕旒則璿樞星綴開黼黻一作扆而瓊枝花擁豈獨使威儀可觀亦以明社稷有奉美哉聖人之制器也靡不有類鋭上以象天方下而法地備采章以盡飾琢一作瑑崇髙而定位夫衆色不可以雜施依方面之正者惟五羣山不可以咸寫選域中之大者有四盡舉凡而得一故相傳而莫貳義存敬慎道在底綏詳觀組約足辨操持俾經制之不亂若繰藉之相維况國家備物繼周垂衣體舜自天有命非因桐葉而封唐提象握機故配土行而執鎮豈唯傳歴代之瑞寳抑亦彰受命之符信也重曰圭鋭也睿作思而百志靈鎮安也安於道而萬物寧亦嘗三復斯名矣所以表道徳之維馨若此則君為道之宰一作本器乃道之形苟能㩀於道而依於徳亦可執無名之璞而逍遥乎大庭第二同前韻蔣防天鎮四野君尊萬方取威重以馭物在秉持而有章協和人神葢先之於六瑞表正旒扆誠用之乎百王斯為貴也誠一作寳之大者琢磨有耀温潤無瑕天臨静謐以我鎮壓乎寰中帝徳休明以我熠耀乎諸夏皓爾凝潔温如可觀藴五徳之符采寫四鎮之峯巒其色正其容端乃直乃方象名山而守固不瑕不穢春秋繁露曰玉有瑕穢配王室以常安豈不真姿有奉嘉名天寵逺以視其凝命近以彰其端拱大而不琢禮經匪尚其文華執之不廻聖人無離其輕重想夫始自良工成兹國器端乎掌握撫寧天地邦有六瑞而圭列其初國有三山而象包其四穆穆之儀是佐温温之徳斯備所謂天子是毗邦國是維雲虹發色氷雪成姿玉几臨朝承徳音而有裕金門曉闢布寛一作仁政而無私是知岱華恒衡之髙自此而増峻琳瑯琬琰之美自此而發竒形抱素以呈竒聲含清而取振當照臨之際曽不掩瑕在韜韞之時寧忘作鎮所以朝九有接萬靈竒姿粲粲衆彩熒熒大禹成功垂芳於帝典吾君致理酌憲於國經故曰觀一圭之質見四鎮之形觀一夫之政見萬國之寧儒臣賦鎮圭之事敢大揚于王庭信圭賦以分形立象于以保身為韻張仲素瑟彼信圭諸侯是執當大君之辨等與五玉而咸集皎以式孚堅如特立錫山川以為瑞在享獻而増襲而特一作將比徳以省躬豈獨退揚而進揖懿夫潔白其質縝密其文得儀形之是表叙羔鴈以成羣玷絶可磨不愧南容之復性惟特達每勞宣代之分則而效之惟其嘉矣觀正直可以行化取毁方於焉克己至若左右佩珩淒鏘宫徴寜同乎信以守之豈嗟乎不我屑以韋弦可譬琮璧自殊孚尹旁達陽采外敷因追琢以為用諒小大之合符韞以保焉匪沽諸善價肖其人也宜賦以生芻此乃邦之令典孰可已乎捧當心而捐疑於掌足以見古人之象禀温潤而洞晶熒于以彰文物之形色配彼蒼示不言之信神如此鑒同明徳之馨所以掌節是司藉之乎繅與蒲糓而齊列冀邦家之永保比楚玉之無瑕哂夏璜之有考或以圭為瑞或以象為珍傳命自同於符璽達情可接於君臣稽彼前典光輝日新念君子之作誡宜近取乎諸身珪璋特達賦楊諫稽上古之貴徳考先賢之立言偉珪璋之挺異同君子之不諼是以先王之制斯器也不資於瑌珉而采之於璵璠欲使執之者比徳佩之者克念自然威儀式序而有要有倫班秩以明而不濫不僣徒觀夫貂蟬巍峩以耀彩組綬暉映以生文使夫閲信義堅貞以守職感瑕瑜不掩以事君故能靖恭厥位克舉其勲豈不由珪璋與賢哲相成其業曠千古而流芬則聖哲之創物也誠有足而稱云原夫氏一作代人莫識荆山之裏藏精淪滓為寳未用多歴年祀笑瓦礫之相和喜蘭蓀之狎士嗟乎道不常屈終收卞子礱錯而真質自然拂拭而夜光特起悲楚君之瞽昧屬一作曷碔砆之能似既而玉人攻治珪璋自尊短長有制規矩攸存其聲清越其潤温温處掌握而升玉砌隨佩服而列金門暉映増美烱然自持涵瑞日之洞徹凜寒風之凄其然後知至寳之成器允夫天下之不疑亦由賢人君子遭遇惟時有强學懐書清規皎如以不貪為寳思琢磨自居感珪璋之特達期哲人之吹嘘服蒼玉賦以天子之服従此方色為韻獨孤申叔天配五色惟春也蒼然地孕萬物惟玉也堅焉玉可乆持故君子比徳於玉蒼實正色盖聖人形象於天嵗既陽止色其著矣東方木徳之令蒼本靈威之紀順其色繄象服是宜飭其容信以蒼為美晶熒兮其瑩如碧追琢兮其平如砥實同法服不敢違於先王有異象環獨見用於孔子若乃太史告立春之期天子迎東郊之時映乎𤣥冕節以采茨瑟若生芻之色肅乎出藍之姿縈垂組而温潤澤矣繋衝牙而左右流之質且異珪終乃磨之無玷色雖匪白誰謂湼而不緇故能間五玉先四服混𤣥冕曜黄屋㣲白虹之皎潔對蒼龍以照燭豈非哲匠之所逢他山之所攻採此温如之質擇其善者而従得佩之服之於此琢之磨之於彼齊蒼璧之獲薦異白玉之見毁色膺時用寜侔純漆之𤣥彩非染成詎比奪朱之紫矧乎四氣莫先乎春陽五位莫首乎東方九有具瞻其尊也帝皇萬物咸頼其大也穹蒼我廼應春氣之徳順陽和之則為帝者之行節候疑穹蒼之正色叢四美而具宣冠羣玉之攸克所以標嘉名於時令冝乎哉垂楷模之無極山𤣥玉賦以竒質異文作佩公侯為韻沈逵佩玉之設所以導容止節威儀惟山𤣥之在御配組織之標竒山以表名蓋取山崇之徳𤣥而載色且昭𤣥黙之宜合殊姿於雅稱俾服翫以無虧懿其韞櫝稱珍連城表質爰制衝牙之用以戒趨馳之失匪取乎截肪自資乎純漆響既清越理惟縝密色温合乎緇衣韻鏘鳴乎玉律動之在聴隨矩步而聲繁佩之在躬寜風趨而影疾羣僚奉贄庶官陪位貴賤畢陳髙卑咸萃我則發清響標竒器飭彼雅容遵乎深意配元侯而禮盛奉上公而儀備豈比瑌珉彰庶士之殊水蒼表大夫之異况乃黝衡比色緇組侔文體𤣥瑞疑作端而位辨表黼衮而功分或倚或垂昭君臣之異載揚載揖殊進退之聞宜發明乎盛徳永光錫乎洪勲其質貞清其光錯落官推王府之典制自玉人之作是用比徳賢臣表功王爵始自韜石未彰含暉尚晦隐𤣥山以參差冠𤣥雲而霮䨴哲匠莫顧俊賢未佩徒棄置於層巒豈琢磨於明代及乎偶拭拂遇磨礱服之容美執之禮崇自可寳同乎金錫豈惟價重於王公則知其律聿修在禮斯柔非夫賜象服錫鳴璆何以膺山𤣥之瑞於諸侯者哉珮賦胡運玉有環珮所以節威儀珪璋所以光朝覲朝覲貴乎特達威儀在乎淑慎則珮之為用以徳聞珮之為服以禮進既取堅以縝密亦體柔以温潤其彩烱明涵黼黻之華其聲清越諧金石之韻豈止法先王之服戒乎大夫抑以觀古人之象原之帝舜由是表尊卑之飾彰朝覲之美佩山𤣥而抱水蒼摇摇兮耿光左宫羽而右角徴鏘鏘兮垂委非徒抑其進退亦以制其容止則裂石破玉靡顔膩理清清泠泠作羽儀於君子思我王度服之衷已珩韍相煥品命不渝貫以桃花之綬錯以明月之珠時也朝北極歴天衢明玉殿耀金鋪徽音生於矩步繁響起於風趨濟翼為君臣之榮觀逶迤乃賢哲之令圖亦何必栽一作搴修蘭於長坂折瓊枝於逺區然後為美乎别有楚臺神媛越國一作溪名姝嬌羅艶縠秀色鮮膚振鳴玉以亮響踐瑶階以踟蹰聲珊珊兮若有無睇綿綿兮意愉愉翩躚躚兮望坐隅欲從君子禮之拘乃歌曰佩玉蘂兮徳音發中規短兮聲不歇馳畋獵兮思敬慎夀考不忘兮長嵗月端法服兮臨魏闕羣后覲兮萬方謁第二麻不期夫聖人彰徳以建物表意以興名禮容孔備制度昭明衣冠振序簮紱齊榮亦茲佩之為用隨劒履而揚聲觀其所興爰自古昔玉華既重於周后蠙珠亦珍於漢辟葢將以威儀節度知無不易豈徒矜珠玉之芳聲喧步頓之前跡懿其符彩照燭流曜暉光宫徴合韻左右鏗鏘此亦邦國之儀範為衣裳之典章於是垂為臣倚為主式標上下動合規矩亦非獨洛妃解贈於陳思漢女見投於交甫爾其幽人所重君子攸資則蘭蘂馳馨於楚客象環騰譽於宣尼斯偶物昇榮助荷衣之葱翠因時適用陪藻服之葳㽔既而天子㑹朝臣御華闕冠葢雲發公侯進退而為容卿士俛仰而超謁茲珮也幸朝儀不棄流響未歇既連帶於虹蜺庶傳名於日月文苑英華巻一百十一
