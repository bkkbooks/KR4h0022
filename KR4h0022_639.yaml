body:
  text: 文苑英華卷六百四十宋李昉等編進貢上朝覲遇節進物狀一首賀正進物狀五首端午進物狀十二首賀冬進物狀六首進打獵口味狀一首朝覲遇節進奉狀鄭絪右臣伏以古者諸侯入覲必奉贄幣或以車馬或以圭璋用展誠敬著於典禮臣繆領藩鎮獲覲闕庭幸遇昌辰又當嘉節用增聖夀以表微誠前件馬及器物謹差嶺南節度押衙某隨狀奉進至微至薄無任慙惶伏願如日之升如天之福垂莫大之慶保無疆之休於萬億年永康四海臣不勝懇欵之至元日進馬并鞍轡狀二首為人作令狐楚右臣伏以元日開歲東風發春人神大和天地交泰伏惟皇帝陛下鴻猷更始寶祚惟新協三朝之㑹同受萬國之歸慶臣某職當分閫屬忝維城未聳翼於丹霄空馳心於皇極前件馬并鞍轡驅馳有度雕鏤初成願將行地之功以奉如山之夀干煩宸嚴伏增戰汗二右臣伏以五始混成歲為元吉四時分理春實發生伏以陛下嗣帝鴻名受天成命百神降福願等於山河萬國歸仁思陳其玉帛臣限從戎役闕奉朝行又及新年皆成靈貺每瞻初日如奉聖明前件鞍馬等稍似馴良竝非淫巧冀充庭實用達邉情干冒陳獻伏增戰越賀正進物狀裴次元右臣伏以青陽發春肇寶歷於茲始𤣥穹降祚仰聖夀而惟新正殿嚮明班行承慶顧臣等守土列在東隅空懷捧日之心望雲何及獨闕稱觴之禮鳴佩無因瞻九重而在天空倍情而增戀前件物及衫假宣臺卓座等禮不憚輕物斯一作期展敬即當有慶用申致貢之誠情苟為珍願比負暄之獻臣某不勝感恩抃躍屏營之至代李令公進歲節口味一十事狀于公異右伏以獻歲首春元辰備饗內饔具品則有常珍野食擊鮮恐資一作須兼味臣昨以軍中無事略獵出城既臨戎虜之邉且試偏禆之藝縱橫必中豈謝麗龜俯仰無遺寧憂即鹿或堪上獻輒露衷誠前件物等謹狀奉進庶禆仙篋用愧野芹無任惶懼一作悚之至為滎陽公進賀正銀狀李商隱伏以運當聖日節在王春近則入金門而排玉堂歡於上夀逺則梯重山而浮漲海務以獻琛臣受國恩深守藩地阻明珠大貝南異於百蠻翠羽犀皮北殊於三楚前件銀出非大冶貨在中金敢以元正式陳方賄望闕憶銀臺之峻尚隔集作阻仙僚瞻天仰銀集作河漢之流莫階霄露馳心獻祝因物達誠干冒宸嚴不任兢越端午進馬狀于公異右伏以律應蕤賔節臨端午徴彼風俗盛陳續夀之義爰念人臣敢闕致誠之禮况朝廷敘位海內來王咸因贄幣之資用表肅恭之節臣叨承恩顧獲守邉郵朝不及於良辰禮竊慿於外物輒以前件馬并鞍等進奉殊慙駿驥微露𠂻誠願承端午之祥長居得一之位不勝區區之極同前裴次元右臣伏以律應蕤賔日惟端午訖於四海皆馳必獻之珍節彼南山咸祝無疆之夀臣職叨藩服守在遐方貢菲禮以展誠單微既懼傾葵心而向日捧戴何因情空愧於遼東戀益深於闕下臣某不勝感恩戰灼屏營之極同前四首王仲周右伏以楚俗遺風素傳角黍野人之志每願獻芹上件衣服裁製實昧於上國針縷多慙於天造懇誠所至庶備祝堯謹遣某官隨狀進奉二右伏以垂衣聖代角黍良辰述職之誠願有所獻器用非寶寧備下陳之儀􅀈帛至微庶同長命之縷前件銀器花紗等謹遣某官隨狀奉進三右臣伏以千年昌運屬在聖朝五日佳辰方臨仲月臣謬司垣翰不獲稱慶闕庭對東海竊慕於朝宗望南山輒闕於上夀前件銀器花紗等謹遣某官隨狀奉進四右伏以聖夀千年不假封人之祝嘉辰五日用申臣子之誠前件器物紗絹等不敢法外徴科皆積軍中餘羡逺塵旒扆伏用兢惶謹差某官隨狀奉進端午進鞍馬等狀三首令狐楚右臣伏以五者天之成數夏者天之仁時伏以陛下用仁時而長養羣生舉成數而陶甄品物是以百蠻委瑞萬國歸誠同瞻日月之光共奉乾坤之夀臣方從邉役未在周行謬宣力於清朝竊馳心於令節前件馬等柔馴既久雕飾初成敢因五日之良以續千年之慶干冒陳獻伏用兢惶二右伏以月旅蕤賔節惟端午天人效祉朝野交歡伏惟陛下宸極尊嚴大明光耀擁純陽之元吉保眉夀之康寧風俗既和人倫以厚前件鞍馬器物等雕鐫始就服習初成輒因五日之良以續千秋之慶干冒宸扆伏增戰越三右伏以月惟仲夏時屬純陽當五日之良辰慶千年之聖夀華夷修貢走玉帛於寰中朝野飛歡均金石於天上臣方從戎役夙奉皇慈願竭微誠慙無逺物前件鞍馬等久令馴致稱以柔良干冒宸嚴伏增戰越又進銀器物并行鞋等狀右伏以月惟正陽日次南午千官拜稱觴之慶萬國陳執圭之禮將以嗣續聖夀延洪昌期一作昌延洪期蓋朝廷之舊儀乃臣子之常事前件銀器等或便於用正當其時慙經萬里之遙願獻九天之上塵黷宸鍳無任戰懼為滎陽公赴桂州在道進賀端午銀狀李商隱右臣伏以集作聞握丕圖而御物必相見於離推小正以辨時則盛德在夏故著為令節稽以舊章通修任土之宜仰續後天之夀臣方乘傳置未至藩維前件銀已及中塗實從前政拜章獻祝雖令尹以告新納賮展儀欲長府之仍舊謹以前觀察使楊漢公封印進上千春屬慶億載儲休繫以藩條闕覲丹墀之下徴諸貨志且愧白金為中干冒宸嚴無任兢越為安平公赴兖海在道進賀端午馬狀前人右伏以浴蘭令節採艾嘉辰百辟合祝於堯年萬方宜修於禹貢臣方夙駕之部馳傳出關欲獻琛而未識土儀願祝夀而已悲日逺前件馬伏櫪斯久著鞭亦多粗覺柔馴未嘗奔逸雖非龍孫驥子邈一舉以絶塵願陪月駟雲螭慶千斯集作嘶於扈蹕干冒宸扆無任兢愓之至賀冬進物狀裴次元右伏以履長之慶咸歡比日之休率土之濵皆祝如山之夀况臣早參近侍出鎮遐藩望闕既遙瞻天積戀手舞足蹈既不及於九流任土展誠空用馳於一獻輕瀆旒扆戰越惟深前件女口及紫袍假銀疊子等謹遣某官隨狀奉進賀冬至進馬鞍弓劒香囊等狀二首令狐楚右臣伏以建子實三微之宗黃鍾為六律之本冬氣方至璧星正中伏惟皇帝陛下統馭天正發生陽數夀等南山之固萬姓具瞻恩均東海之波百川皆赴臣某限從外役叨奉殊私秉戎律以輸誠望宸居而積戀前件鞍馬等非追風照地之駿麗無切玉穿札之堅强用愧含香名慙承露輒備祝堯之禮願申朝禹之心干冒宸嚴無任戰越二右伏以四海無外三冬正中伏以陛下大明燭幽鴻化御極居𤣥堂而布政登觀臺以視朔受萬國之慶擁百神之休臣守在邉陲職司戎旅朝天之路由限於山川向日之心增勤於草木前件物等皆生其地竝考於工願奉如山之夀敢修任土之貢干冒陳獻伏增戰越又進鞍馬器械等狀右伏以迎日良辰書雲令節始生一陽之數首出三統之正華裔交歡天人同慶臣某名班將帥守在封疆阻羅拜於彤墀空注誠於紫闕一作闥前件鞍馬器械等雖無犀利稍似馴艮恭陳逺路之心願備廣庭之實干冒宸扆伏增戰越謹遣某官隨狀奉進又進銀器唾盂等狀右件銀物等非有可觀甚無所直以其方圓不礙斟挹酒漿潔白自持宜承咳唾敢因長日願獻上天干冒宸嚴無任戰越為滎陽公進賀冬銀等二字集作銀乳白身狀李商隱右伏以黃鍾應候白琯舒和近訪晉儀禮同元日遐觀魯史事重朔朝伏惟皇帝陛下與天同休如日之盛將融漢道兼舉周正臣方駕亷車闕稱夀酒心懸土炭空循集作思太史之書身逺江湖徒積子牟之戀苟無納贐曷慶履長前件銀等禀和於天地之爐擢粹於神仙之府豈為方賄且自地征對三品之金庶陪白璧撰集作厠一丸之藥請映𤣥霜私白身等雖長在遐鄉而生知望闕比從訓示堪備指呼冀因物以達誠竊先時而效祝七百年之卜願過成周八千歲為春敢徴䝉叟干冒陳進兢越無任進打獵口味狀于邵右伏以平野未春寒山餘雪陛下俯令畋獵遙借寵靈豐狐難脫於重寰狡兔莫遺於三窟觀同將帥藝角偏禆况節號嘉平時兼蠟祭承威禀命恩已貸於戎臣登爼充庖味宜先於君上雖八珍豐衍六禽填盛輒傾誠於金鼎庶慕義於野芹前件品味謹隨狀進文苑英華卷六百四十
