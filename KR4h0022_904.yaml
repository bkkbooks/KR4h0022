body:
  text: 文苑英華卷九百五宋李昉等編職官十三諸將軍二周柱國大將軍拓拔儉碑一首周柱國大將軍紇干𢎞碑一首周柱國大將軍都督同州刺史爾綿末碑一首周柱國大將軍拓拔儉神道碑庾信蓋聞放勛立而羲和升重華登而元凱用思皇多士既成西伯之功俊德克眀乃定南巢之伐是知惟賢非后弗食惟后非賢弗乂若夫君臣一德啓心沃心見之昌寧文公矣公諱儉字慶眀周書北史並作儉本名慶名恆州髙陸人也北嶽天孫之星燕河帝子之國故多竒節甚茂華風髙闕圖南二王齊軫長城拔本十族分源髙祖太尉北平王光輔五君允釐百揆恆衛既從淮沂其乂祖豹龍驤將軍恆州刺史常山刺舉非無取代之符龍驤㧾戎或似平吳之號父􅀈北史作年止弱冠榮終解印公以五常藴智六氣資德乘天則䇿馬秉靈降神則牽狼應象直心於物水火恬然無負於天雷霆不懼富貴自取豈資唐華疑作舉之言聲名有聞無勞李膺之識年十八解褐員外散騎侍郎尋授輕車將軍羽林監太祖文皇帝駕馭天綱苞羅英傑選公才德光佐中書諸葛亮之西歸玉壘成三分之業管夷吾之入仕葵邱有一匡之功天水黠羌漁陽郡盜乃遷秦州刺史長史防城大都督封信都縣開國伯三年滑州蟻聚保闕命靡旗亂轍乘􅖅渡河丞相大行臺授假節撫軍行滑州刺史大統元年授持節東夏州刺史加散騎常侍郅支抱馬如聞耿秉之戰單于願識似畏王商之威五年遷使持節鎮東將軍都督東北三夏州諸軍事西夏州刺史增邑千户改伯為公既而江漢遼逺車書寂寞蜀主的顱未出檀溪之水秦王飛雉猶向南陽之城六年以公為使持節都督三荆二襄南雍平信江隨郅浙一十二州諸軍事荆州刺史東南道行臺僕射楚城鄰境實有讓田吳人對營無妨贈藥部內屬城為人所訟公遂集文武肉袒自罰兄弟不讓延壽責躬吏民有過翁歸引咎天子異之璽書勞問贈賄加幣王人接踵大丞相書云此之美事耳目之所未經歎尚無極故遺疑作遣專使公善於撫馭長於接引山藪無棄苞苴不行示人赤心與人顔色盜不敢發民不忍欺至是將校耆老於州城之南起清政之樓北史作清德樓勒賢臣之頌杜鎮南之作牧當世樹碑竇車騎之臨戎生年刻石方之今日彼獨何人于時户口日增荒萊畢墾華實紛敷黔黎茂豫但恐衮職有關待公而補鼎飪未和須公而正是以漢民隂望荆南杞梓並皆上書詣闕連名乞留河內之借冦恂更慙謁帝交州之請士燮還著上表九年授車騎大將軍儀同三司十二年除大行臺尚書仍為大丞相司馬以公識度嚴眀志節清儉遂改公名儉字慶眀非關書月詎待看碑幸得千畝不同二山無廢十三年加開府餘官如故十四年除尚書右僕射加侍中進驃騎大將軍居上星執法在文昌之位以公才望兼而有之十五年更除東南道行臺僕射都督十五州諸軍事行荆州事十六年大丞相總十六軍尅清河洛公又中分麾下參謀幃幄髙選霸僚公為長史其年加都督南道三十六州諸軍事餘官如故南陽文學更遇王基章華衮衣還迎郭賀昔日伐蜀之謀張儀與秦昭討合平吳之利羊祐與晉武意同大祖始定成都即有江陵之志公密獻其䇿懸符深旨糧運久積梯衝立備一戰而舉鄢郢再戰而燒夷陵遂得席卷三荆此又公之勳也詔賞奴婢三百口太祖與公書云由公立計果何所謀公頃疑作頃公自鎮江陵以安蜀地後魏二年改武川昌寧郡開國公歷陽居民非唯景丹之封曲逆户口豈但陳平之國其年授大將軍太和之中曹真於府內受册元封之末衛青於軍中即拜公之此比綽有餘榮詔曰吳人未復須助謀謨今使梁王兵馬受公節度三年加都督東南道五十三州諸軍事增邑萬户維周革命光宅欽眀作二大官允諧邦治元年授小冡宰保定二年治蒲州刺史檢校六坊諸軍事四年治襄州仍授柱國大將軍餘官如故秩登四嶽階平六府豈不功重昭陽名髙蔡賜控馭五十州風行數千里拔園葵而去織婦無三惑而絶四知一室之中未免虗白日膳之資三杯而已詔乃賜繒綵一千段粟麥二千斛天和元年陜州刺史都督八州二十坊諸軍事解荆州總管餘悉如故路出王宫城臨河曲戍清陜右髙視棠隂部領宴煩晦眀為疾天和四年謝病故京薨于私第春秋七十有八鑾蹕降臨軒懸輟樂九旒龍旗之錫三河騎士之送詔贈太保涼夏靈銀長原河鄯井瓜十州諸軍事涼州刺史諡曰文公狀貌邱墟風神磊落玉山秀立喬松直上煙霞之涯際莫尋江海之波瀾不測少遭茶苦在山服終攀柏樹枯侵松獸死盡忠事國竭力從政其門如市其心若水竒䇿密謀具僚仰止忠貞亮直眀主敬焉至如風后隂陽之占力牧星辰之度魏公子之兵書李將軍之射法莫不成誦在心取為時用居常服玩或以布被松牀盤案之間不過桑杯石鼎遺令山陵一無所用公私贈襚並不得受止依太祖陵側無忘事君墩等兄弟並至性善居喪號墓墳埏奉遵遺訓是以衛青之冢仍陪漢武之陵管仲之墳即接齊桓之墓天和六年天子以四海未寧三方鼎峙有懷將帥之志言念封疆之臣既畫雲臺乃題麟閣更贈公為鄫國公邑五千户追崇列碎事極神魂再改銘旌恩隆封墓公在民留愛身後見思吉日良辰郊祠野祭儀同趙迢等六百九十七人表求立廟陳請象魏有詔許焉柱棟杏梁緑墀青瑣按歌會舞鳯蓋霓裳南浦送而行雲東風飈而零雨是知漢陽郡前非徒武侯之廟臨淄城下豈獨欒公之杜嗚呼哀哉乃為銘曰道鍾屯剝世屬雲雷地軸左轉天關北開客車周室繫馬秦臺乃齊七政爰答三才烈祖燮諧九龔二字疑梁棟取才逢獵求賢入夢匡贊官雲謀猷絶疑作紀鳯律定公族圭分職貢乃惟嗣德實秉英靈身圖斗宿靣繞樞星青襟敬業童子離經信陵虛右干水分庭忠孝純深樞機周密孔光不言曹參勿失溫席扇枕承顔恱膝凍浦魚驚寒林笋出肅肅風政沉沉器局直似貞筠溫如瑞玉清不置水眀非舉燭馬願如羊金須似粟上將克升元戎既序夏陽三捷夷陵一舉慿軾下齊凌江入楚鼎反歷室鍾歸大吕六卿咸事天官是司二南作伯棠隂實治清風有頌緑竹聞詩贈行之册超然帝師昔侍蘭苑今陪杏林死生契濶無違一心風雲積慘山障連隂陵田野寂松徑寒深夏嬰之隴橋玄之墓馬見千年車回三步左無長樂前非武庫直望髙碑增悲行路周柱國大將軍紇于𢎞神道碑前人公諱𢎞字廣略原州長城縣人也本姓田氏虞賔在位基於揖讓之風鳯凰于飛紹于親賢之國論其繼世之功則狄城有廟序其移家之治則長陵有碑况復髙廟上書小車而對漢王聊城祭鳥長嶽疑而驅燕將公以胎教之月嵗德在寅載誕之辰星精出昴是以月中生樹童子知言水上浮瓜青襟不戲而受書黃石意在王者之圖揮劔白猿心存霸國之用魏永安中任子都督翻原州城受隴西王節度于時洛邑亂離當塗危逼禮樂征伐不出於天子舉賢誅暴實在於強臣太祖文皇帝始創霸功初勤王室秣馬搜乘誓衆太原公伏劔轅門粗謀當世隨何逺至實釋漢帝之憂許攸一作孜非夜來即定曹王之業永熙中奉迎魏武帝入關封鶉隂縣開國子邑五百户太祖以自著鐵甲賜公云天下若定還將此甲示寡人白水良劔罷朝而贈陳寵青驪善馬軍回而賜李忠並經輿服足為連類大統三年轉帥都督進爵為公十四年授使持節都督原州諸軍事原州刺史仙人重返更入桂陽之城龍種復歸還尋白沙之路公此衣錦鄉里榮之侍從太祖戰河橋復𢎞農解華山圍平沙苑陳必有元勳常蒙别賞太祖在同州文武並集號令云人人如紇干𢎞盡心天下豈不早定即授車騎大將軍儀同三司前魏元年轉驃騎大將軍開府祈連猶逺即受冠軍之官沙漠未開先置長平之府梁信州刺史蕭詔寧州刺史譙淹等猶處永安稱兵漁陽二字疑公受命中軍流下瀨遂得朝發白帝暮宿江陵猿嘯不驚雞鳴即西平反羌本有漁陽之勇鳯州叛氐又習仇池之氣公推鋒直上白刃交前萬死一決凶徒多潰身被一百餘箭傷肉破骨者九瘡焉被十槊露布申上朝廷壯焉紏紏葛屨魏有去舊之歌零露瀼瀼周受惟新之命乃進爵封鴈門郡公食邑通前二千七百户保定元年授使持節都督岷州諸軍事岷州刺史隴頭流水延望秦關川上峨眉猶通蜀道公不發私書不燃官燭獸則相負渡江蟲則相銜出境四年拜大將軍餘官如故衛青受詔未入玉門之關竇憲當官猶在燕山之下公之此授差無慙德渾王叛換梗我西疆巖羌首竄藩籬携二公受服於社偏師逺襲揚旍龍涸繫馬井松二十五王靡旗亂轍七十六柵鶉奔雉竄既蒙用命之賞乃奉旋師之樂天和二年被使南征帶甲百萬軸艫千里江源水起海若乘流船官之城登巢懸㸑吳兵習流長驅戰艦風灰箭火倐忽凌城公以白羽麾軍朱絲度水七十餘日始得解衣朝廷以晉尅夏陽先通滅虢之政秦開武遂始問吞韓之謀是以馳傳追公以為仁壽城主齊將段孝先斛律眀月出軍定隴以為宜陽之援公背洛水而靣熊山陳中軍而踈行首乘機一戰宜陽銜璧增封五百户進柱國大將軍司勳之册也建德元年拜大司空二年遷少保姬朝三列少保為前疑炎正五官冬官為北頻煩寵命是謂能賢三年授使持節都督襄郢昌豐唐蔡六州諸軍事襄州刺史江漢之間不驚雞犬樊襄之下更多冠蓋既而三湘遼逺時遭鵬入五溪卑濕或見鳶飛舊疾增加薨于州鎮天子畫凌煙之閣言念舊臣出平樂之宫實思賢傅有詔贈某官禮也即以四年四月二十五日歸葬於原州髙平之鎮山屬國玄甲輕車介士一依霍驃騎之禮衛將軍之葬嗚呼盛哉公入仕四十五年身經一百六戰通中陷刀疾甚曹參刮骨傅藥事多關侯而風神果勇儀表沉雄事親無隱無犯學不專經略觀書籍兵無師古自得縱橫青烏甲乙之占白馬星辰之變九宫推步三門伏起天弧射法太乙營圖並皆成誦在心若指諸掌虜青犢之兵甚有祕計燒烏巢之米本無遺䇿西零賊退屈指可知南郡兵回插標而待常願執金鼓而問吳王橫雕戈而返齊地有志不就忠貞死焉世子恭等孝惟純深居喪過禮對其苫寢則梓樹寒生聞其悲泣則巢禽夜下嗚呼哀哉乃為銘曰天齊水合日觀山連兵強東楚地逺開燕五卿咸正三王並賢靈龍更起燧象還燃自天之德乃祖乃父維嶽降神生申及甫北門梁棟西州雲雨勇讋燕城名題漢柱公始青襟風神世載猛獸不驚家禽能對劔學千門書觀六代有竭忠真無違敬愛乃數軍實乃握兵謀澆沙成疊聚石成圖風雲順逆營陳孤虛靈雨鉦鳴爟火飛狐淮隂受册車騎登壇公為上將有此同官下江燒楚上地吞韓推功玉案定䇿珠盤天有三階公承其命國有六卿公從其政台曜偕輝槐庭重映匡贊七德謨猷八柄腹滿精神心開眀鏡伏波受賑樓船推轂東道未從南征不復飲丹有井澆泉無菊功存柳林身在樠木移苪及葬提柩山行芻靈隴水哀挽長城山如北邙樹似東平松門石起碑字金生眇眇山河煢煢胤子泣血徒步奔波千里孝水先枯悲雲即起世數存殁哀榮終始周柱國大將軍大都督同州刺史爾綿姓氏書爾為綿氏永神道碑公諱永字永賔東燕遼東郡石城縣零泉里人也本姓段昔者昌意陵居初分若水之姓共叔出奔始有京城之族西河居士蕃魏而却秦北嶽將軍威遼而奉晉其後居於北代則先封遼水備乎史籍可略而言祖援鎮西將軍馮翊太守父儒平東將軍持節恆燕朔三州諸軍事恆州刺史公年裁弱冠即值亂離驅馳關塞之間早有縱橫之志軍陳方圖無勞聚米山川形勢不待披圖魏正光五年入仕解褐殿中將軍孝昌三年加龍驤將軍水安二年授平東將軍都督中埏建義勳謀是先蒙賞倉泉縣開國男食邑一百户其年淮淝侵軼南鄙徴公兵受賑偏師一月三揵昔張遼奄至有闕縣開國伯食邑五百户進爵為侯永熙元年授使持節車騎大將軍左光祿魏武帝特召入任關內大都督馬武小心侍蕭王於卧內典韋忠壯陪魏后於宫中于時賊帥元伯破掠城市西自潼函東綿鞏洛京畿大都督請馬七千公曰此賊無他䇿尋自鳥散止請五百騎應手生擒朝廷賞其謀䇿百姓喜其除害既而喪亂𢎞多生民版蕩乘輿西幸宗社北遷公妙識玄象深知厯數乃與昆弟謀為自全斬西中城主本傳作西郎將送首關內蒙賞平昌本傳作昌平縣開國子食邑三百户大統元年授使持節都督北徐州刺史平竇軍本傳作竇泰復𢎞農戰沙苑河橋公並預元疑城身當鋒首謨猷應變備在司勳增邑八百户通前合二千户進爵為沃陽縣開國公授南汾州諸軍事南汾州刺史十四年增邑三百户轉大都督其年授車騎大將軍儀同三司加散騎常侍十六年授驃騎大將軍開府加侍中尋授恆州諸軍事恆州刺史又遷雲州刺史昔軒邱分族異姓者十四人酆邑建侯宗盟者四十國太祖文帝席卷關河三分天下潁川從我並有鄉里之親新豐故人非無布衣之舊更立九十九姓還存十六國舊胄還姓爾綿增邑一千進爵為廣州城郡開國公尋授文州諸軍事文州刺史國家以玉門西拒久勞亭鄣陽關北牧多事風塵武城二年有詔進公都督瓜州諸軍事瓜州刺史是以名馳梓嶺聲振榆關無雷畏威負霜懷惠保定二年還朝授工部大夫尋遷軍司馬夏官司武待白露而治兵冬官考工紀玄雲而授職四年增邑三百户通前合三千九百户其年授使持節大將軍都督治左八軍總管軍事落食朝登上將暮會小卒事涉交接觀釁而返天和二本傳作四年以本官領小司冦三度疑有星名天獄八卦有坎象刑書公繁不秋茶嚴無夏日民知約法未肯以獄吏為尊吏識刑名無敢以死灰相懼又任左廂第三軍總管仍被勑將兵馬北道教習韓信入關即申軍令陳農受詔仍校兵書豈若六郡良家五營騎士懸知正正之旗遙識亭亭之氣蒙犯霜露旗鼓驅馳俄而遺疾疹至大漸五年六月十六日薨於賀葛城春秋六十有八將軍死綏三十行哭都護喪還緣邊追祭九月二十三日靈柩至於京師皇帝臨喪百寮赴弔詔遣使持節車騎大將軍儀同三司賀拔軌監護喪事又遣使持節車騎大將軍儀同三司紇豆陵亮册贈使持節柱國大將軍同華宜敷册五州諸軍事同州刺史諡曰基公其年十一月五日葬於京城南髙陽原髙司里夫人赫連氏兖州刺史悅之女年十四適爾綿氏册拜魯城縣君遷濟隂郡君又遷廣城國夫人肅恭令淑儀範賢才四德有耀三星增輝三公夫人見於斯矣建德元年十二月亡春秋五十有八二年正月歸於髙司之塋劉荆州之墓合葬於襄水之陽衛將軍之陵同穴於廬山之下嗚呼哀哉世子岌使持節儀同大將軍領兵部大夫純孝事親忠貞事國禮義自立聲名有焉銘曰軒臺受氏若水降居西城仲胤北陸置餘山川雄烈風俗扶踈昔我關塞沿襲干戈時遭拔木世值橫波北封代郡東據遼河地未平一天猶薦瘥我父疑作公重光繼文踵武總牧三蕃兼治六輔雅俗觀風都亭待雨不逢問吏無暗桴鼓公以載世挺此令聞孝有三德忠惟一君馬陵釋患聊城解紛兵防滿月戰避迎雲長松都尉細柳將軍既牧淮海且蕃恆代髙壁負關長亭穿塞釁鼓司盟吏不能欺兵無敢背玉關遺矩汾海留愛大將軍受册公升其壇六卿咸事公二其官夷陵燒楚上黨分韓營軍參合校戰臯蘭年深厲起福禍災生上台裂嶽次將星傾赤地悲淚白虎哀鳴懸弓靈幕繫馬塞坰煙凝不動泉凍無聲天子愴然追於贈諡禮官賜册陪陵受地印綬曰䇿衣衾曰襚玄窆就列黃腸在位自此何世從斯幾春樹為櫪疑作擽見莊子社陵成谷神詎知雲閣名在功臣文苑英華卷九百五
