body:
  text: 文苑英華巻一百二十七宋李昉等編鳥獸七鶺鴒賦一首鴻漸賦二首鴻賦一首秋鴻賦一首晴臯鶴唳賦一首沙洲獨鳥賦一首傷馴鳥賦一首鵲巢背太嵗賦一首鵲始巢賦一首紅觜烏賦二首鶺鴒賦并序喬琳鶺鴒雝渠也詩取其鳴行搖尾相應以興兄弟急難之義而已然無巢無鶵不知栖息孳孕之所人之見者更無大小之殊隼不能搏彈不能射網罟不能取朝之與夕常在人間竟不知此鳥之所自來也何鶺鴒之小鳥與羽族而特殊鷸􅀈郭璞江賦鼔翅鷸􅀈飛鳴肖翹畢逋金睛玉𤓰紺尾青顱電瞥機駭火馳風趨來何從而去何適似出有而入無噫形氣有生之類非卵則胎不巢則穴罕知爾棲泊之所乳伏之節吾自見爾翩翾一狀小大無别莫測雛孕之源以出陶鈞之轍亦稱王母之使豈在神仙之列咮啄鋒鋩毛衣霜雪惟若驚之近道思數顧以周防苟彈射之莫中匪網罟而奚張齊姜所以遣重耳范蠡所以迯越王慮宴安之有毒斯儆戒以為良務相時而逹變豈膠柱而守常偶來池舘非意稻粱吾將注目而悠然以逝四字一作倐以閒逰色斯舉矣而物莫之傷既忘情於進取遂逰仭以翺翔乗興於人間之世全身於自逺之塲苟日新於運用能獨善於行藏鴻漸賦以鴻漸路適之為韻陸贄深不測者道大無疆者空空非羽而何適道匪人兮孰通通於道者是謂君子適於空者莫如漸鴻故聖人託象以明義務勤以飭躬將自邇而圖逺必因卑而致崇始其素卵新化青春戲疑融一之日乳哺衡陽之曲二之日翺翔彭蠡之中且愛疑作爰居以樂水亦從正而養蒙毳毛其成洞庭之芳草初綠弱羽云就武陵之繁華已紅而見其進未知其終美夫淑姿偉麗飛鳴有檢動靡求棲逰皆逺險思奮志於寥廓且藻容於菱芡昇不越次先冐履木之危進而得中爰及于磐之漸漸如何其往有攸措方去渚而戾止俄躋陵而遐顧風水遥輔於羽毛煙雲未通於道路嗈嗈相召驚月次一作光而亂趨一作起肅肅連行拂天池而徑度信梁鷰之莫儔豈谷鸎之足慕亦猶九層起於累土千里始於投跡琢玉者日就其功為學者月將其益皆自㣲以成著固何求而不適异夫出陸摶空驤首矯翮順寒暑以攸徃亘山川而罔隔以言乎鳥也尚不忘進以言乎人也如何無思思者所以志道進者所以脩辭誠既徃而莫返冀將來而可追蒙亦有望於斯漸敢不肅然而勉之第二崔陟易之為書也八卦分體萬象潜通漸之為義也進以得位動而有融故聖人假物筌理爰託喻於茲鴻鴻之為物也迹狎洲渚去軼雲空始于干而漸陸竟自卑而陟崇飛則有序和而不同有類夫君子進徳脩業積微成功陟遐以自邇謀始而利終者哉原夫交頸頡頑乘波澹淡逍遙自得罻羅莫掩匪干時以强進每卑棲而自檢雖欲致雲霄之高故必階磐陸之漸洎乎理翰海表驤首煙路既應日而春來亦隨陽而類序行藏不昧於節逰止不愆於素匪親鳬鷖之羣豈思稻粱之顧誠羽儀之可重奚鷰雀之能慕豈比夫鸚鵡衒其羽翮徒矜才以取譽然無罪而見獲郷國迢遙箱籠窘廹慕侣心斷冲天望隔不階漸以苟進非一作怛忤物而致危可同年而語哉鴻賦翩翩者鴻刷羽疏風賔燕薊之北旅江湖之中何斯禽之寡識亦陰陽之載通若乃編名漢川棲身禁籞易象嘉其漸陸詩人美乎遵渚晉文以賔客見規齊桓以君臣相許既隨軒於良使疑作吏後漢虞國為日南太守行惠澤有雙鴻隨軒亦銜丹於仙女其徳性也肅肅習習繽繽紛紛泛濫緑水翺翔白雲飛則有貫集則為羣跡不以沙泥自混貎不以𤣥黄自分敏清真之不雜同朴畧之無文於是寒月改躔朱星移度苔濃春水草滋甘露園木含榮溪氷解沍乃連太隂於北漠遣少陽於南路唼藻而至豈鷹鸇之見猜銜蘆以飛何罻羅之足懼至於長距蒙賞利觜見升豹以尾而自貴鶉疑以尾而自矜巢睫之蟲終幽微而莫覩乘一作垂天之羽竟寥廓而難徴孰與夫鴻也窮逺適縱遐觀凌天衢拂青漢横逸翮奮羽儀空違沮澤竟屬汙池有四海之心而人莫識有八方之氣而人莫知年嵗蹉跎兮行不返毛羽翕習兮飛未逺願借勢兮自強庶高翔兮不晩秋鴻賦趙勵若夫隨陽之鳥翩翩者鴻髙飛晴日長鳴朔風乘秋陰於迥塞結陣影於遙空觀其羽翮聨翩出入寥廓念江湖而逰逺犯霜露而無託昔年春去愛洲渚之芳菲今日秋來值關山之搖落借如良人逺戍賤妾孤居帷屏曠望意息空踈路杳𣺌而無恨心嬋娟而有餘憶紫塞之年盡怨青樓之夜虚莫不聞之者憤惋聽之者漣如羅廻文之織錦思繫足之邉書若乃明月宵懸黄雲晝洩牢落天池蒼茫溟碣行宛轉而初上影參差而不絶愁輕代北之雲訝負遼西之雪既而南逰澤國北别沙塲千里萬里懐稻懐粱强能鳴以取愛恐不才而見傷所願免虞人之矰繳得狎君之池塘者也晴臯鶴唳賦以警露清野高飛唳天為韻迥野逺色寒空繁聲眺莫媚於雨霽聆何長於鶴鳴孤飛而天下疑作宇澄曠獨立而霜臯砥平對明景一作對明月之逾秀遡晨風而自清炯爾體空冷然響遰疑磬發而珮搖若霜標而雪麗林鷴之皓色難比雲鴈之清音罕繼雖居下而在幽亦髙聞而逺唳或引或罷以逰以遨顧塵寰而不雜仰天路而飛高懿夫秉心清迥禀質貞素偶影思侣矜容舉歩忘機遂性豈思寵於乘軒逺害全軀每勞心於警露聽閒兮易感聲怨兮難度非陸氏之無聞想王生之可慕原其翔集𤣥圃騰鶱翠㣲睨蓬壺而易感冐江海而懸飛情慕必止心徂匪違或羣翔而反顧或孤賞而忘歸厭仙府而舉華亭思鳴臯而適綠野爰捧日以遐騖遂凌煙而獨下一作於獨夜晴臯曙兮邈矣靜皓鶴鳴兮杳何永俄度曲於澗瀬乍迷影於雲景聞幽而音響清越觀麗而羽儀閒整何霽野之無人獨仙禽之虚警未見天字韻沙洲獨鳥賦髙郢鴪彼飛鳥在河之洲一飲一啄載沉載浮賞心利渉之地浴德清波之流守道而行風水無情於六翮度才自處雲霄有望於雙眸聮翩失伴顧歩無儔因潔身而獨立聊拂羽以孤逰蓋貞以不羣鷙而有别將擇木以未暇乃漸磐而自悦窺形弄影欣得地以徘徊哀響竒音冀聞天而清切亦猶鴻志非鷰鶴羣豈雞雖孕形於羽族諒禀性於天倪慎其獨焉知無心於黨與需于沙者必不至於沉泥豈比夫鸞對鏡而方舞鳯非梧而不棲候鴈有銜蘆之懼黄鳥興止棘之悲疑何出處之情逺而攝生之智迷况乎食粟貪榮乘軒取媚珍禽見育敗德於明主鷙鳥云亡行刑於下吏非靈應之攸止乃進趨之所致豈若動非干物息能擇地盗泉不飲得亷士之風止水常逰侔至人之智道有可鑒才無不僃屬鳥瑞之昌期將遷鸎之厚意顧得振羽毛展精鷙君不信其飛鳴試假借於名位觀其處啓閉辨分至然後知沙洲之獨鳥非凢禽之類傷馴鳥賦權徳輿紛羽族之多端兮同翺飛而類殊有鸎谷之㣲禽亦播質於洪鑪因稺子之嬉逰得中園之墜鶵恣飲啄以馴擾來目前與坐隅爾乃棲以籠檻鎩其羽翼冀留軒一作留軒所以為娯俾遐翥之無力作踉蹌而將舉顧䙰褷而復息雖主人之見容終使䘮天和於自得或親賔至此徽軫徐觸每聞絃而鼔翼亦追一作區節而翹足貎一作吭宛轉以成態聲間關而助曲乍寂寞以閒暇若凝情於相矚理輕毳以自潔類山立之珮玉每翔集以安卑同君子之自牧思謝尚之起舞邁風流之逸躅苟魯昭之不君固乾侯之出辱方渡濟以申敬伊凉徳之自覆徴故老之相傳驗曩記之或存在端五一作午之司晨剪其舌而能言巧喉轉一作囀以逹情順人心而不諼方渇日以呈材願朱明之駿奔忽愀慘以顦顇響哀音於簾箔竟啁啾而不去若徊翔之有託悦心訝而未辨歘狸徃之攫摶俄斃踣而不勝紛血灑以毛落彼葛盧與冶長通鳥獸之音聲闕君子之周防無古人之至精既不能縱爾於遼廓又不能遂爾之生成使異類之得志曽未極其飛鳴則本夫養之之惠適所以害其生生又憶夫清江之使者東海之波臣苟其時之不來則刳腸而涸鱗鷃鍾鼓而反悲馬皁棧而多死雖為遇之已甚固又夭其天理嘗聞乎賢聖之理物也愚智殊方薰蕕異藏善用無棄兮互見其長各有攸處兮兩不相傷官天地而府萬物繇此道而為常吾既悟斯理之不早因失之而後防収視聴以冥觀兮遂羣性之茫茫凡一作皆川本文萃鵲巢背太嵗賦陳仲師營巢有因惟鵲無倫始自小寒之日不當太嵗之神辨向背以經營必先避地顧縱横而委積足以藩身且其矯翼徘徊向隅棲息時懐擇木之智日就積薪之力若在離宫之内不可巢南如當子午之中無因逐北所以率先表異選勝知歸應時節而遷易辨方隅之是非念彼明神自易地而攸處顧茲弱羽信何枝而可依時也苟遂居安寧辭力役銜腐草而構思向髙柯以容跡動觀所忌殊古人之橧巢理契不齊知疑作如方士之工厯擇地已有知風豈無方一枝而自託雖小數之能拘且相質以和鳴喜同於雀乃卜居而類聚趨甚於鳬况復藉用茅茨殊荷庇蓋任風雨而自適豈隂陽而去泰念土冝之是顧足見知方信天理以自然焉能向晦爾乃節屆𤣥律時方沍寒顧地角而知禁豈天時之可干無起土功異銜泥而戾止知於嵗杪聊寓跡以求安既而飲啄無虚推移不滯得厭勝之良術誠棲遲之上計潜軫明條之慮必附枳枸之勢摧枯拉朽已邈疑作完葺於崇朝命侣引雛聊優㳺於卒嵗顧末俗之無違信㣲禽之可繼鵲始巢賦陳仲師霜天慘慘兮楓樹之杪構彼層巢兮翩然宿鳥眄喬柯以上下慙弱羽之卑小周匝經營翻飛繚繞履危而金彈不發送喜而珠簾乍開逐初心之眷戀無利觜之嫌猜架木末居岩隈容足之前望一枝以棲息翻身之際歴衆木而飛來拂曙聲多排空意逺惜光隂於朝暮迷飲啄之往返於是攫腐草銜飛蓬重疊尺箠迴環翠空凌寒而且近朝日構思而偏愁夜風俯仰求容冀資拾芥之力縱横居止顧就積薪之功必使輕舉得便羣飛㑹同嬉遊遂憐疑作隣於清籞窘束長謝其雕籠所謂摭實以來憑虚相借不然則六翮摧毁三冬徂謝飛鸎將出乎深谷黄雀亦誇其大厦故所以踰逺林戾前除仰窺肅爽逺慕扶疎當繞樹之時暫隨烏㑹在來巢之日當畏鳩居非㣲禽之敢競幸嘉木之有餘嗟乎搖尾馴擾斂容萃止依於主人來若處子匪能言以呈慧不善舞以招美倘抵玉無虞搏風資始故巢林以何報唯化印而後已紅嘴烏賦以新飛羽未調為韻李子卿殊方之烏兮丹觜黒身異性特立兮既孝且仁勁毳非日黔而得黒快吻豈研硃而益新一作勁翮毳毛非日黔而得銛喙決吻乃研朱益新不頡頏以干物常翩翻而狎人非越鳥之思歸羨海鷗之忘機謂富屋之堪止謂芳枝而可依其來也狀銜花未下其去也疑帶火初飛何必將雛聲已傳於緑綺如能返哺遊更狎於綵衣嗷嗷其音泄泄其羽常飲啄於軒砌每棲翔於牖户凌美翼之鵷雛掩能言之鸚鵡朝食芳餌全忘攫肉之心夜宿雕籠何有啼城之苦顧弱質而誰貴誠主人之厚意非九子之是思仰三足而多愧嗚躍既安一作安在摶扶尚未鸎何得疑作徳而遷喬鶴何功而在位稻粱已飽兮羽翼將調霜臺可宿兮雲漢非遙倘不使余尾之譙譙余音之嘵嘵為君一舉凌丹霄第二崔元明伊空桐之靈鳥兮丹觜黒質拂羽青霄兮流形白日與鴛鷺而為伍豈凡鳥之能匹故其聲則合雅動必依仁受恵而狎感恩而馴既裔裔而翔漢嘗啞啞而向人不驚不怖亦義而親爾其升丹楹入華堂對上客之羅薦拂佳人之褧裳驚空簾之秋色怨夕月之清光悲信美而非吾土傷幽栖而思故鄉一作思故國而多傷於是湘一作楚妃援琴相如為歎何不開金籠而使飛永鶱翥於雲漢重曰日宫難可躋月樹復驚栖未聽將雛曲空聞怨夜啼文苑英華巻一百三十七
