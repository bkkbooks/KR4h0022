body:
  text: 文苑英華巻七百八十宋李昉等編帝徳聖應圖讃一首聖賢自古聖帝名賢二十七首曾參讃一首𤣥通大居士讃一首四皓讃一首隠者讃七首先賢讃六首二孝讃一首無為先生讃一首二踈讃一首祕閤賀監讃一首狄梁公立廬陵王傳讃一首續羊叔子傳讃一首伊尹五就桀讃一首梁丘據讃一首漢三髙士讃一首新城三老董公讃一首易商君列傳讃一首帝徳聖應圗讃并序臣聞啟聖者天也宜有以覺悟受命者聖也必有以明徴故神不言而可知時將至而先兆當陛下龍潜於上黨也或託類於雲物或効靈於卜筮天之意者丁寜垂象唯恐後時而又以潞水之泓深山鹿之挺集作捷走馳騁集作騎是獲厲流不濡非力所能以明或躍乾之上體時而九四神道幽賛聖期宻邇自後而占何著明其若此盖天福海内地降聖迹以瑞非常之后以决如神之䇿至于冄三明必信耳有郡掾崔弼時其從行見龍騎飛先馳謂河流可渉亦既數歩遽已滅頂非集作不沉也安足以驗飛無凡也於何以昭聖事来自乆命常惟新臣不勝至願謹為聖應圗遂獻讃曰龍之或躍泉有何深神亦成象化為背禽凌厲是獲明命則忱如彼從掾焉能不沉聖賢自古聖帝名賢讃二十七首庾信黄帝見廣成子治身紫府問政青丘龍湖鼎沒丹竈珠流興一作流雲即雨落木先秋至道湏極長生可求堯登壇受圗登壇洛汭沉玉河湄丹圖馭馬緑甲乗龜榮光上幕休氣連帷雖存克讓於見文思舜舞干戚平風變律擊石来儀先齊七政更服三危朱干獨舞玉戚空麾南風一曲拱已無為禹渡江三江初鑿九谷新成風飛鷁涌水起龍驚樂天知命無待憂生危舟遂静亂檝還平湯解祝網連珠兩起合玉雙沉榖為祥樹桑成樂林三方落網一靣驅禽徳矣聖政仁乎用心文王見吕尚言歸養老垂釣西川岸止磻石溪唯小船風雲未感意氣怡然有此相望于茲幾年武丁迎傅說虞田路斷辭潤泉飛躬勞版築有弊韋衣賢臣入夣天賜無違千巖之下遂得同歸成王刻桐葉封虞虞叔百里居河之汾帝刻桐葉天書掌文禮以成徳樂以歌薰天子無戯唐其有君漢髙祖置酒沛宫逰子思舊来歸沛宫還迎故老更召歌童雖欣入沛方念移豐酒酣自舞先歌大風漢武帝聚書獻書路廣藏書柱開秦儒出谷漢聞吹灰芝泥印上玊匣封来坐觀風俗不出蘭臺袁盎諫文帝千乗峻轍六轡危行跡廻松坂山叙栁城龍淵地狹華盖風驚賢臣攬轡可謂忠貞朱雲折檻上書直諌有怙明君先求斬馬遂請魚文身摧欄檻義烈風雲應從御史翻頼將軍周公戒伯禽伯禽居魯鳴玉来朝周公政治為國風謡北山有梓南山有橋禮容雖備俯仰無驕五月披裘負薪披裘當夏俗則為心雖逢季子不拾遺金禽巢欲逺魚沉唯深清聲一作蹤滅跡何必山林王祥扣氷魚躍王祥之母鮮鱗是求水連釣浦凍塞寒流精誠有感無假沉鈎二老同膳雙魚共浮孫叔敖逢蛇叔敖朝出容悴還家母氏顧訪知埋恠蛇爾有隂徳陽報將加終爲楚相卒享榮華髙鳳好書不知流麥髙鳳好學專心不廻流連經笥對翫書臺石門雲渡銅梁雨来麥流雖逺書卷猶開張良遇黄石公張良取履跪授無辭兵書一巻長者三期昔稱韓相今為漢師榖城餘石還歸舊祠師尚父授丹書尚父一遇周王是親赤雀既下丹書巳陳自論秉鉞長别垂綸獨有磻石留名渭濵榮啟期三樂榮期三樂唯人與年夫子相遇即以為賢性靈造化風雲自然雅琴雖古獨有鳴絃夫子見程生程生夫子一遇相知薄言傾盖桑隂遂移清揚共美賢聖同覉陳詩難别贈絹傷離鉏麑見趙盾趙盾將朝端衣整笏鉏麑受命衝冠怒髪惆悵賢臣顧瞻城闕利劍不抽青槐先絶蔡澤就唐生相蔡澤覉旅唐生决疑無勞神策不問靈龜富貴自取年夀湏期雖云異相㑹待逢時李陵蘇武别李陵北去蘇武南旋歸驂欲動别馬將前河橋兩岸臨路悽然故人此别知應幾年樊噲見項王樊噲將軍漢王車右不憚鋒刄何辭巵酒覇上屯軍鴻門固守持謝范增唯留玉斗秦穆王飲盗駿馬駿馬遇盗秦王不嗔先傾羙酒翻畏傷人隣兵向國窮冦侵秦于時大盗還作功臣延陵季子遇徐君徐君有禮季子惟賢經過一遇如舊依然人非别後心許生前長松雖合寶劒猶懸曾參字子輿讃蘇頲百行之極三才以教聖人叙經曾氏知孝全謂手足動稱容貌亊君事親是則是効𤣥通大居士法雲公贈司徒號國公萬廻大師讚法本無着而乃強名名言則斷法止不生應化得真示空歸有言似或中法皆虚受以心觀心無凈無垢四皓讃李華時濁世文粹作代危賢人去之商洛深山鸞鶴文粹作鳳潜飛漢以霸興皇王道衰玉帛雖至先生不歸吾非固然可動而起龎眉皓髪来䕶太子至尊動容奪嫡心已四賢暫屈天下定矣返駕南山白雲千里隠者讃七首嚴君平先生𡨕𡨕隠于卜肆宗師老氏精究易義爰衣爰食止足非利垂簾燕居黙養真氣誨人不倦人恱其風皦昧柔剛在我域中心與世逺事與人同不臣大君不友上公在貴反賤齊明若䝉遼哉逺哉㣲妙𤣥通弋者何為仰慕飛鴻嚴子陵五彩雖美玉不汙質光武盛明子陵不屈羊裘漁釣以此終日網羅遍野乃致雲鴻降尊申舊延卧禁中舒體展肢加于帝躬星官告占天下聞風富春長往漱濯清江申屠子龍齊宣燕昭折節下賢羣儒畢至冠帶森然天子尊崇盛於堯年爰及暴嬴書焚人坑東漢祖宗悉尚儒生生徒横議公府畏名肆其吻端以正鈞衡物極變興子龍遐征身全道髙惟智惟明陳留老父去危圖安危則不隕竭而後汲力亦随盡麒麟遐歩終日不踠逃刑諸生自脫何晩深乎智叟孤逰冥逺管㓜安我蠶我衣我耕我食推心而動神佐正直溟波不沉一作是渉伏此之力島夷卉服移我淳徳衡門栖遲台佐譲職時非吾世語不如黙留侯孺子心壯隂讐國寃結客飛鎚天下雷喧神付幽符帝納宻言去則項亡就則劉興唯天有鍳類日之昇𤣥機靜運四海波澄絶粒謝時方追赤松強為國起鎮定東宫安危在我萬古清風皇甫義真桓靈政昏舋因宦者黄巾四起血流天下京師動摇鬼哭匝野義真受鉞誓衆而前即日掃除京觀如山渠帥已死破棺折元謡頌風興家邦獲安世故紛紛罕有令人既成其勲又保其身東漢純臣嗚呼義真先賢讃六首管敬仲小白圖覇尊周服楚聿求仁智扶我此舉叔牙知人㧞管于魯一作廡一言而合爰制師旅布命諸侯威行九土周王南靣列國来朝朝服濟河心無動摇束髪左袵遷乎一朝邢歸衞存楚貢苞茅懸車北討山戎遁逃三歸備職不足累徳七子仕楚後人霑臆随武子周衰晉覇世有哲卿范武在秦晉國如傾將中軍師一作帥世主夏盟典禮攸興刑政以清神歆正詞國頼直清諸侯朝貢楚不敢争告老歸政身全徳明溥傳嵩岱首冠春秋楚子歎息趙文綢繆馨聞百代風暢春流東里子産荆王晉侯虐我小邦南則荆侵北則晉攻捄首捄尾一作㧞其首尾跼不能起當炎獲濯國氏之子孤明内斷頌興謗止入陳事周權禮並理諸侯新睦覇主恱喜遺愛不忘我行溱水鴟夷子皮龍蟠幽谷潜伏非時蟬蛻髙枝飲露而飛進如風行退若雲歸冥冥其義幾赫其歸小粤覇興強吳蕩夷功成不居先生傳之樂生明明昭王文武樂君君臣相趨龍變雲蒸既佐弱燕削耻南伐風驅雲皷齊國瓦裂弔厥罷人旌其故節宗彛樂器歸獻燕闕化弱為强摧堅俾折鎮以仁義期之感恱梁趙屏風秦楚弭節天厭諸姬燕不可扶昭王不席樂生道孤讒行將換齊復為都季命隣君君告謀燕痛詞而泣義貫于天勁飈遐舉攝轡將奔趙王慙羞故國獲存赫赫髙皇戎輅北轅徘徊趙墟封其子孫遺風可師名教之源謝文靖在昔符秦將霸晉邦百萬雷行飲馬竭江江淮岌業力屈則降謝公從容子弟董師以少擊多一皷殱夷二孝讃并序靈武二孝曰侯知道程俱羅目不覩朝廷之容耳不聞韶夏之聲足不登齊魯之境所見戎馬旃裘參於夷狄而能生養以孝歿奉以哀穿壙起墳出於身力鄉人助之者哭而反之廬於塜次號泣無節侯氏七年矣程氏三年矣根於天性陶我孝理其至乎哉埃垢積首草生髪間每大漢晨空連山夜寂人煙四絶虎豹與隣擁墳椎膺聲氣咽塞下入九泉上徹九天背爛心朽皮枯節攣草木先秋而凋落景氣不時而凝煙一作閉殊鳥異獸助之悲號萬物有極此哀無窮大哉二子能以孝終始乎語曰孝如曾參不忍離於一作其親生不忍離一作生既不忍殁忍離之哉二子之孝過於曾氏矣昔吳起忍與母盟陳湯忍匿父䘮起謀復楚覇而戮死湯功釋漢耻而囚廢神道昭昭若何無報九州之衆誰非人子踐霜露者聞風永懐士有感一諾一顧猶或與之死生嘉一草一木猶或為之歌詠而况百行之宗終天之慼乎華奉使朔陲欲親徃弔焉屬河凌絶渡願言不果憑軾隔川寄聲二孝因一作同為讃一章敢旌善人以附惇史其文曰厥初生人有君有親孝於親者為子忠於君者為臣兆自天命降及一作成人倫背死不義忘生不仁愚唐書作過及智就為之禮文禮文不能節其哀繄道徳之元純至哉侯氏創鉅病殷手足胼胝成此髙墳𬞞菓為奠茅蒲為茵其奉也敬其生也貧大漠黄沙空山白雲栢庭既夕松路未晨冦戎接境豺虎一作狼成羣夜黑飈動如臨鬼神哭無常聲逈徹蒼旻風雨漂摇支體鱗皴色慘莪蒿聲酸棘薪苴斬三年爾獨終身邑子唐書作嗟嗟程生其哀也均顧後絶配瞻前無隣冬十一月浮一作河氷塞津吾將唁一作弔之其路無因寄誠斯文揮涕河濵無為先生讃權徳輿至人無感與化升降全而不形保而不蕩汎然順物付集作時之自當苟乖於是無非溺䘮保合浩淳先生其人徳機不發鳥獸同羣稽首𤣥關請滌䝉昏笑而謂予道不逺身支離而全以靜為君滑之則散泊集作汨之則存天性者名木伐蘭薰與時巻舒中若浮雲蒘集作挐臭絲棼無撓而真勤而用斯至妙之門百昌皆化吾亦歸根動作天壤集作紀靜為地文鳥行無章變化沄沄強名無為以鏡心源二踈讃静專動直惟乾之徳酌用不窮君子中庸矯矯二踈知㣲知終功成不居父子清風天子賜金羣公出助都門之羙焯映千古優㳺衡門棲息化源日飲醇酎心閑道尊人或言利利令智昏清行素風可貽子孫萬物營營吉凶相生環中之樞泊然遺行中林寂寥幽蘭自榮雖有矰繳不覊冥冥知止不殆古先炯戒賢哉大夫終始無悔祕閣五絶圖賀監草書讃季真造適揮翰睨壁酒仙逸態草聖絶跡興涵雲海詞韻金石傳於祕丘永永無斁狄梁公立廬陵王傳讃并序吕温梁公以武氏簒盗國命如綴翊安宗社非我而誰是用䝉大耻履大險聳節振美以持世心閑髙祖天下於方寸之地盗力雖盛莫之敢闚唐復為唐繄公是頼後代昧者頗歸功於五臣殊不知五臣之功公所授也客有以李北海所傳示予者述廬陵王廢立之際見公如生貽諸將来可以不惑敢攄憤而讃之詞曰於休梁公社稷之臣濡跡應變與唐屈伸妖虹横天鳴牝專晨獨立大道指南生人闔闢有期命先我時乃建國本代天張機取日虞淵集作泉洗光咸池潜授五龍夾之以飛臨終指麾皇業再基運起身後功成不知穆若清風嶷然宏規凡為臣者可不度思續羊叔子傳讃天厭鼎峙蜀滅魏改錫晉羊公以同四海儒衣登壇嶽鎮荆蠻十萬之衆從公而閑逍遥峴陽傲視勍敵用仁為間出入無跡吳國雖守吳心巳降吞於胷中不見大江勤物忘巳樂天知命留功遺人國愈身病江漢舊域徳膏潜蒸化行兵中兵息化興䇿雖平吳道不相晉永嘉南遷豈曰冺冺伊尹五就桀讃并序栁宗元伊尹五就桀或疑曰湯之仁聞且見矣桀之不仁聞且見矣夫胡去就之亟也栁子曰惡是吾所以見伊尹之大者也彼伊尹者聖人也聖人出於天下不夏商其心心乎生民而巳曰孰能由吾言由吾言者為堯舜而吾生人堯舜人矣退而思曰湯誠仁其功遲桀誠不仁朝吾從而暮及於天下可也於是就桀桀果不可得反而從湯既而又思曰尚可十一乎使斯人早被其澤也又往就桀桀不可而又從湯以至於百一千一萬一卒不可乃相湯伐桀俾湯為堯舜而人為堯舜之人是吾所以見伊尹之大者也仁至於湯矣四去之不仁至於桀矣五就之大人之欲速其功如此不然湯桀之辨一恒人盡之矣又奚以憧憧聖人之足觀乎吾觀聖人之急生人莫若伊尹伊尹之大莫若於五就桀作伊尹五就桀讃聖有伊尹思徳於民往歸湯之仁曰仁則仁矣非乆不親退思其速之道宜夏是因就焉不可復反亳殷猶不忍其遲亟往以觀庶狂作聖一日勝殘至千萬冀一卒無其端五往不疲其心乃安遂升自陑黜桀尊湯遺民以完大人無形與道為偶道之為大為人父母大矣伊尹惟聖之首永本京本作惟聖人之首既得其仁猶病其乆恒人所疑我之所大嗚呼逺哉志以為誨梁丘據讃齊景有嬖曰梁丘子同君不争古號媚士君悲亦悲君喜亦喜曷賢不讃卒讃於此媚余所仇激讃有以梁丘氏集無此字之媚順心狎耳終不撓厥政不嫉反巳晏子躬相梁丘不毁恣其為政政貴集作實允理時睹晏子食寡肉集有缺字味憂其不飽告君使賜中心樂焉國用不墜後之嬖君罕或師是導君以諛聞正則忌讒賢恊惡民蠧國圯嗚呼豈惟賢不逮古嬖亦莫類梁丘可思又况晏氏激讃梁丘心焉孔悴漢三髙士讃前漢一人後漢二人陸龜䝉王霸仲儒後漢作儒仲清節是履集作理有息躬耕黄頭歴齒故人令狐奉書遣蜀本作遺子從以車徒入耀閭里既集作即往覇卧一日集作日仄不起其妻訊之以息愧耻君遺集作遁世榮抗志不仕子親耒耜固其宜矣我實信道曷足慙彼覇乃忻然恬澹如水夫髙婦賢可謂具美摯先生恂伯陵之孫學通五經居于渭濵弟子累百馬融服勤以子妻之師而益親融為大儒恂乃知人和帝之世公卿以聞季直才器宜當輔臣公車就徵禮備𤣥纁守道不至終為逸民外黄申屠少負名節義女執仇令欲論殺蟠以同縣諫請平江集本作諌議蜀本作陳情上讞廷尉宥之旌彼孝烈慱通羣書復善譚說漢徳日衰政實務末蜀本作漢衰政荒時實慕末隠於碭山遂與世絶獻帝即位徵為三公邀苦不應𡨕𡨕一蜀本作之鴻時人賢之重者蔡邕明哲終始嗟乎子龍新城三老董公讃并序皮日休在漢之取天下也三傑而已矣蕭何苦民力以給兵輸韓信殺民命以騁戰功留侯設詭䇿以離秦項當其時未聞以仁義說于君者而董公乃諭之以䘮義帝至使天下宗漢者為其䘮義帝也夫漢祖以曹參雖有攻城野戰之功不如蕭何也信矣哉至于苦民力殺民命設詭䇿反不若董公之功也哉如髙祖為天子以公為師友行其道於時其利可知矣公之道已行於漢而不覩封賞之禮又當時史氏無一字以褒之因為讃以旌之項氏狂攘賊我懐王天命未的孰存與亡皤皤董公一言漢昌一人殺君天下皆傷一人哭君天下皆䘮項由是弱漢由是強扶義而征可知軒黄唱仁而戰可知武湯用天子集作用于天道折彼雄鋩繄公之道與漢而光易商君列傳讃并序商君者用於孝公制其法而秦給御其謀而魏敗封邑未居轘刑以及嗚呼商君之匡秦雖不必盡是然亦至矣太史公貶之過實非以欺公子卬刑公孫䖍拒杜摯之說者乎然有一是亦足以救斯非也余悲商君忠而受刑因重述其行事以讃云集作曰商君之于孝公也一二見孝公不悟其說非皇王之道行之難不及其身者乎斯孝公之罪也在商君有心於是道不亦多乎當商君一二說孝公行之商君必為阿衡矣嗚呼卒以竒合特用自䝉於僇悲夫温陵黄伯光曰鞅挾術于孝公說以皇王欺孝公也皮子以不用為孝公罪且冀其為阿衡是為鞅所欺也夫鞅以其術欺時君及後世卒不能免其身也宜哉文苑英華巻七百八十
