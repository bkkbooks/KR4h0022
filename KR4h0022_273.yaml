body:
  text: 文苑英華卷二百七十三宋李昉等編送行八嚴維五首盧綸二十三首戴叔倫十三首張萬頃一首魏兼恕一首周瑀一首權德輿十一首戎昱五首送薛尚書入朝嚴維卑情不敢論拜首一作手立轅門列郡諸侯長登朝八座尊凝笳臨水發行斾向風翻幾許遺黎泣同懷父母恩送李祕書往儋州前人魑魅曽為伍蓬萊近拜郎臣心瞻北闕家事在南荒沙草山城小毛洲海驛長元成知必大寧是泛滄浪送人入金華前人明月雙溪水清一作春風八詠樓昔詩選作少年為客處今日送君遊送崔峒使往睦州寄薛司户前人如今相府用一作重英髦獨往南州肯告勞水木近開漁浦出雪雲初卷定山髙木奴花發一作映桐廬縣青雀舟隨白鷺濤使者應須訪廉吏府中惟有范功曹送房元直赴北京前人猶道樓蘭十萬師書生匹馬去何之臨岐未斷還家日望月空吟出塞詩常欲激昂論上䇿不應憔悴老明時遙知到日逢寒食彩筆長裾會晋祠送鮑中丞赴太原盧綸分路引鳴騶喧喧似隴頭暫移西掖望全解北門憂專幕臨都護親一作分曹制督郵積氷營不下盛雪獵方休白草連胡帳黃雲擁戍樓今朝送旌斾一減魯儒羞送䕫州班使君前人曉日照樓船三軍拜峽前白雲隨浪散青壁與城連萬嶺岷峨雪千家橘柚川還如赴河內天子許經年送信州姚使君前人朱幡徐轉擁羣官猿鳥無聲郡宇寬楚國上腴收賦重漢家良牧得人難銅鉛滿穴山能富鴻鴈連羣地亦寒幾日政聲聞集作關外户九江行旅得相歡送郎士元使君赴郢州前人賜衣兼授節行日郢中聞花發登山廟天晴集作清閲水軍漁商三楚接郡邑九江分髙興應難遂元戎有大勳送陜府王法司前人東門雪復一作覆塵出送陜城人粉郭朝喧市朱橋夜掩津上寮應重學小吏已甘貧謝朓曽為掾希君一比鄰送萬巨六言前人把酒留君聼琴難堪嵗暮離心霜葉無風自落秋雲不雨空隂人愁荒落集作村路逺集作細馬怯寒溪水深望斷集作盡青山獨立更知何處相尋送李校書赴京川幕前人泥坂望青城浮雲與棧平字形知國號眉勢識山名編簡塵封國戈鋋雪照營男兒須聘用莫信筆堪耕送王録事赴任蘇州前人古堤迎驛路萬室一帆前潮作澆田雨雲成煮海煙吏間惟重法俗泰不憂邉西掖今宵詠還應寄阿連送菊潭王明府前人組綬掩衰顔輝光里閈集作第間晚凉一作凉宵經灞水清晝入商山行境逢花發彈琴見鶴還惟應理農後鄉老賀君間送宛邱任少府前人帶綬别鄉親東為千里人俗訛唯競祭地古不留春野戍雲藏火軍城樹擁塵少年何所重才子又清貧送顔推官遊銀夏謁韓大夫前人叢杯呌寒笛滿眼一作銀滿塞山青才子樽前畫將軍石上銘獵聲雲外響戰血雨中腥苦樂從來事因君一涕零送朝邑縣張少府少府善琴前人千室暮山西浮煙與樹齊剖辭花落紙擁史雪成泥野火蘆千頃河田水萬畦不知琴月夜誰得聽烏啼送宋校書赴宣州幕前人南想宣城郡江清野戍間艨艟髙映浦睥睨曲隨山名寄圖書內威生將吏間行春板橋幕應伴庾公還送元昱尉義興前人欲成雲海别一夜夢天涯白浪緣江雨青山繞縣花風標當劇部冠帶稱儒家去矣謝親愛知余髮已華送永陽崔明府前人鶴唳蒹葭曉一作岸中流見楚城浪清風乍息山白月猶明廢路開荒木歸人種古營懸聞正訛俗邴曼最知名送李端闕路出又𤣥集作路入相問又𤣥集作相見前人故關衰草遍離别自一作正堪悲路出寒雲外人歸暮雪時少孤為客早多難識君遲掩泣空相問風塵何所一作處期送寧國夏侯丞前人楚國青蕪上秋雲似白波五湖長路少九𣲖斷山多謝守通詩宴陶公許醉過憮然餞離阻年鬢兩蹉跎送袁稱前人諫獵名空久多因病與貧買書行幾市帶雪别何人客路山連水軍州日映塵凄凉一分手懼怕老相親送何召下第後歸蜀前人褒斜行客過棧道響危空路濕雲初上山暄日正中水程通海貨地利雜吳風一别金門逺何人復薦雄送崔琦赴宣州幕前人五馬臨流待幕賔羡君談笑出風塵身間就養寧辭逺世難移家不厭貧天際曉山三峽路津頭臘市九江人何處遙知最惆悵滿湖青草鴈聲春送楊皡東歸前人登樓掩泣話歸期楚樹荆雲發逺思日裏揚帆聞戍鼓舟中酹酒見山祠西江風浪何時盡北客音書欲寄誰若說湓城魯司馬知君望國有新詩送史兵曹判官赴樓煩前人渥窪龍種散雲時千里繁華作合離中有重臣承霈澤外無輕虜犯旌旗山川自與郊坰合帳幕時因水草移敢謝親賢得瓊玉仲宣能賦亦能詩送吉中孚校書歸楚州舊山中孚自仙官入仕前人青袍藝閣郎談笑揖侯王舊籙藏雲穴新詩滿帝鄉名髙間不得到處人爭識誰知氷雪顔已雜風塵色此去復如何東臯岐路多藉茅臨紫陌回首憶一作望滄波年來倦蕭索但說淮南樂並楫湖上遊連檣月中泊沿流入閶門千燈夜市喧喜逢鄰舍伴遙語問鄉園下淮風自急樹杪分郊邑送客隨岸行離人出帆立漁村繞水田淡浦隔晴烟欲就林中醉先期石上眠林昏天未曙但向雲邉去暗入無路山心知有花處登髙日轉明下望見春城洞裏草空長塜邊人自耕寥寥行異境過盡千峯影雲色凝古壇泉聲落寒井仙成不可期多别自堪悲為問桃源客何人見亂時京口送皇甫司馬副端曽舒州辭滿歸去東都戴叔倫潮水忽復過雲帆儼欲詩選作若飛故園雙闕下左宦十年歸晚景照華髮凉風吹繡詩選作别衣淹留更一醉老去莫相違送李審之桂州謁中丞叔前人知音不可遇才過向天涯逺水下山急孤舟上路賒亂雲收暮雨雜樹落踈集作秋花到日應文會風流勝阮家送王翁信及第後歸江東舊隱前人南行無俗侣秋鴈與寒集作間雲野趣自多本集作心自方干集作自心愜名香日總聞本集作名香人共聞方干集作鄉名人共聞吳山中路斷浙水半江分此地登臨慣含情一送君送李明府之任前人身為百里長家寵五諸侯含笑聼猿狖搖鞭望斗牛梅花堪比雪芳草不知秋别後南風起相思夢嶺頭送郭大祝中孚歸江東鄉人去欲盡北鴈又南飛京洛風塵久江湖集作淮音信稀舊山知獨往一醉莫相違未得辭羇旅無勞問是非送車參軍江陵一作送韋參軍前人槐花落盡栁隂清蕭索凉天楚客情海上舊山無的信東門一作汴東歸路不堪行身隨幻境勞一作無多事跡學禪心厭有名公子道存知不棄𣣔依劉表住南荆清明日送友集作鄧苪還鄉前人鐘鼓喧離日集作室車徒促夜裝曉厨新變集作出火輕栁暗翻集作飛霜傳方干集作轉鏡看華髮持方干集作傳杯話故鄉每嫌兒女淚今日自沾裳送謝夷甫宰餘姚縣前人君去方為宰干一作兵戈尚未銷邑中殘老少亂後少官僚廨宇經兵一作𤇺火公田沒海潮到時應一作因變俗新政一作譽滿餘姚送栁道時余北還前人征役各異路詩選作行役各逺路煙波同旅愁輕橈上桂水大艑下揚州何處成後會今朝分舊遊離心比楊栁蕭颯不勝秋送萬户曹之任揚州便歸舊隱前人擬歸雲壑去聊寄宦名中俸祿資生事文章實集作詩篇記國風聽潮回集作翻楚浪看月照隋宫倘有登樓望集作夜還應伴庾公送李長史縱之任常州前人不與名利隔且為江漢遊吳山本佳麗謝客舊淹留狹道集作路通陵口貧家住蔣州思歸復怨别寥落詎關秋南賔送蔡侍御遊蜀前人巴江秋欲盡逺别更凄然月照髙唐一作堂峽人隨賈客船積雲藏集作橫嶮路流水促集作送行年不料相逢日空悲樽酒前送崔拾遺峒江淮集作東訪圖書前人九門思集作九重辭諫議萬里採風謡關外逢秋月天涯過晚潮鴈來集作飛雲杳杳水落浦蕭蕭空怨他鄉别回舟暮寂寥送裴少府張萬頃夕膳望東周晨裝不少留酒中同樂事關外起離憂座濕秦山雨庭寒渭水秋何當鷹隼擊來拂故林遊送張兵曹赴營田魏兼恕河曲今無戰王師每務農選才當重委足食乃深功草色孤城外雲隂絶漢中疑作漠蕭關休一作雖歎别歸望在乘驄送潘三入京周瑀故人嗟此别相送出烟坰栁色分官路荷香入水亭離歌未盡曲酌酒共忘形把手河橋上孤山日暮青送裴秀才貢一作赴舉權德輿儒衣風貌清去抵漢公卿賔貢年猶少篇章藝已成臨流惜暮景話别憶鄉情離酌不辭醉西江春草生送謝孝廉移家越州前人家承晋太傅身慕魯諸生又見一帆去共愁千里程沙平煙集作古樹􅒯潮滿曉江晴從此幽深去無妨隱姓名送郭秀才貢舉前人西笑意如何方集作知隨貢士集作舉科吟詩向月露驅馬出烟蘿晚色寒集作平蕪逺秋聲候鴈多自憐歸未得相送一勞歌送張周二秀才謁宣州薛侍郎前人儒衣兩少年春棹穀溪船湖月供詩興烟嵐費酒錢上帆投極浦欹枕傲晴天不用愁羇旅宣城太守賢送李城門罷官歸嵩陽城門院在遺補院東前人與君相識處吏隱在牆東啓閉千門靜逢迎兩掖通罷官多暇日肄業有儒風歸去塵寰外春山蘭桂藂送上虞丞前人越部集作郡佳山水清江接上虞計程帆一葦試吏佐雙鳬雲壑歸集作窺仙籍風謡驗地圖因尋黃絹字為我弔曹旴送孔江州前人九𣲖潯陽郡分明似畫圖秋光連瀑布晴翠辨香爐才子厭蘭省邦君榮竹符江城多暇日能寄八行無送商州杜中丞赴任前人安康地里接商於帝命專城總賦輿夕拜忽辭青瑣闥晨裝獨捧紫泥書深山古驛分騶騎芳草間雲逐隼旟綺皓清風千古在因君一為謝巖居送韋行軍員外赴河陽前人五年武辨侍明光輟佐中權拜外郎記事還同楚倚相傳經逺自漢扶陽離堂處處羅簪組東望河橋壯􅎏鼓三城曉角啓轅門一縣繁花照蓮府上略儒風並者稀翻翻集作翩翩騶騎有光輝只今有職多虛位應待他時杖節歸送崔諭德致仕東歸前人天子坐法宫詔書下江東懿此嘉遁士蒲車起邱中褐衣入承明朴略多古風直道侍太子昌言沃宸聰巖居四十年心與鷗鳥同一朝受恩澤自說如池龍乞骸歸故土纍疏明深衷大君不奪志命錫忽以崇旭旦出東集作國門輕裝若秋蓬家依白雲嶠手植丹桂藂竹齊引寒泉霞月相玲瓏曠然解赤黻集作綬去逐冥冥鴻送信安劉少府自常州參軍選授前人相看一離念盡此杯中醁夷代輕逺遊上才隨薄祿參卿滯孫楚隱市同梅福吏散時泛絃賔來間覆局襟情無俗慮談笑成逸躅此路灘聲急羡君多水宿送新州鄭使君戎昱誰人不譴謫君去獨堪傷長子家無第慈親老在堂驚魂隨驛吏冒暑向炎方未到猿啼處參差已斷腸送嚴十五之長安前人送客身為客思家愴到家暫收雙眼淚遙想五陵花路逺征車逈山回劒閣斜長安君到日春色未應賒送張秀才之長沙前人君向長沙去長沙僕舊諳雖云桂嶺北終是洞庭南山靄生朝雨江烟乍夕嵐松醪能醉客慎勿滯湘潭成都送嚴十五之江東前人江東萬里外别後幾悽悽峽路花應發津亭栁正齊酒傾遲日暮川濶逺天低心繫征帆上隨君到剡溪送李參軍前人好住好住王司户珍重珍重李參軍一東一西如别鶴一南一北似浮雲月照踈林千片影風吹寒水萬里紋别易會難今古事非是余今獨與君文苑英華卷二百七十三
