body:
  text: 文苑英華巻三百六十一宋李昉等編雜説二雜説四篇本政一篇愛直一篇論書一篇受命于天説一篇寄言一篇釋辯釋疑一篇公獄説一篇善惡鑒一篇雜説韓愈善醫者不視人之瘠肥察其脉之病否而已矣善計天下者不視天下之安危察其綱紀理亂一作紀綱之善否而已矣天下者人也安危者肥瘠也紀綱者脉也脉不病雖瘠不害脉病而肥者死矣通於此説者其知所以為天下乎夏殷周之衰也諸侯作而戰伐日行矣傳數十王而天下不傾者紀綱存焉耳秦之王於集無此字天下也無分勢於諸侯聚兵而焚之傳二世而天下傾者紀綱亡焉耳是故四支雖無故不足恃也脉而已矣四海雖無事不足矜也紀綱而已矣憂其所可恃懼其所可矜善醫善計者謂之天扶集作扶持與之易曰視履考祥善醫者善計者為之二龍之噓氣成雲雲固弗集作不靈於龍也然龍乗是氣而茫洋窮乎𤣥文粹作文間薄日月伏光景感震電神變化水下土汨陵谷雲亦靈恠矣哉雲龍之所能使為靈一作雲也若龍之靈則非雲之所能使為靈也然龍弗得雲無以神其靈矣失其所憑依信不可歟異哉其所憑依乃其所自為也易曰雲從龍既曰龍雲從之矣三談生之為文粹作云崔山君傳稱鶴言者豈不恠哉然吾觀於人其能盡其性而不類於禽獸異物者希矣將憤世嫉邪長徃而不來者之所為乎昔之聖人者其首有若牛者其形有若蛇者其喙有若鳥者其貌有若蒙倛者彼皆貌似而心不同焉可謂之非人耶有平脅曼膚顔如渥丹美而很者其貌則人文粹作貌則人矣其心則禽獸又惡可謂之人耶集作也然則觀貌之是非不若論其心與其行事之可否為不失也恠神之事孔子之徒不言余将特取其憤世嫉邪而作之故題之云爾四世有伯樂然後有千里馬千里馬常有而伯樂不常有故雖有名馬祗辱於奴𨽻人集無人字之手駢死於槽櫪之間不以千里稱也馬之千里者一食或盡粟一石今食馬者不知其能千里而食也是馬集有也字雖有千里之能食不飽力不足材美不外見且欲與常馬等不可得安求其能千里也䇿之不以其道食之不能盡其材鳴之不能通其意執䇿而臨之曰天下無良馬嗚呼其真無馬耶其真不識一作知馬耶本政前人周之政文既其弊也後世不知其承大敷古先遂一時之術以明示民民始惑教百氏之説以興其言曰天下可為也彼之政仁矣反於誼此之政敬矣戾於忠我其周從乎曰周不及殷其殷從乎曰夏曰虞曰陶唐曰三皇氏曰邃古之初暴孽情飾淫志枝辭琢正紛紊糾射以僻民和以導民亂嗚呼道之去世其終不復矣乎長民者發一號施一令民莫不悱然矣謂不可守遽變而從之譬将適千里及門而復後雖矻矻决不可暨原其始固有啟之者也聞於師曰古之君天下者化之不示其所以化之之道及其弊也易之不示其所以易之之道政以是得民以是淳其有作者知教化之所由廢抑詭恠而暢皇極伏文貌而尚忠質茫乎天運窅爾神化道之行也其庶已集作矣乎愛直贈李君房别前人左右前後皆正人也欲其身之不正烏可得耶吾觀李生在南陽公之側有所不知知之未嘗不為之思有所不疑疑之未嘗不為之言勇不動于氣義不陳乎集作于色南陽公之舉錯施為不失其宜天下之所窺觀稱道洋洋者抑亦左右前後有其人乎凡在此趨公之庭議公之事者吾既從而游矣言而公信之者謀而公從之者四方之人則既聞而知之矣李生南陽公之甥也人不知者将曰李生之託婚於富貴之家将以充其所求而止耳故吾樂為天下道其為人焉今之從事于彼也吾能為南陽公愛之又未知人之舉李生于彼者何辭彼之所以待李生者何道舉不失辭待不失道雖失之此足愛惜而得之彼為驩欣於李生道猶若也舉之不以吾所稱待之不以吾所期李生之言不可出諸其口矣吾重為天下惜集作愛之論書劉禹錫或問書曰書足以記姓名而已工與拙何損益於數哉答曰此誠有之盖舉下之説耳非蹈中之説亦猶言居室曰避燥濕而已言衣裳曰適寒燠而已言飲食曰充腹而已言車馬曰代勞而已言禄位曰代耕而已今犬考居室必以閌門豐屋為美笥衣裳必以文章遒文粹作鮮澤為申評飲食必以精良海陸為貴第車馬必以華輈絶足為高遷禄位必以重侯累封為意是數者皆不行舉下之説奚獨于書也行之耶禮曰士依于徳游于藝徳者何曰敏曰至曰孝之為一無此字謂藝者何禮樂射御書數之為一無此字謂是則藝居三徳之後而士必游之也書居數之上而六藝之一也語曰飽食終日無所用心難乎集作矣哉不有博奕者乎為之猶賢乎已是則博奕不得列于藝差愈于飽食無所用心耳吾觀今之人適有靣詆之曰子書居下品矣其人必逌爾而笑或謷然不屑有詆之曰子握槊奕碁居下品矣其人必𧹞然而媿或艴然而色是故特集作時敢以六藝斥人不敢以六博斥人嗟乎衆尚之移人也問者曰然則彼魏晉宋齊間亦嘗尚斯藝矣至有君臣爭名父于不譲何哉答曰吾始欲求中道耳于寜以尚之之弊規我歟且夫信者羙徳也秦繆尚之而賢臣莫贖黄老者至道也竇后集有好字尚之而儒臣見刑道徳且不可尚矧由道徳以下者哉所謂中道而言書者何䖏之文學之下六博之上材鈞而善者得以加譽遇鈞而善者得以議能所加在乎譽非實也不黷于賞所議在乎過非罪也不紊于刑夫如是庶乎六書之學不堙墜而已乎受命于天說黄頗孔子曰唯天子受命于天士受命于君故君命順則臣有順命君命逆則臣有逆命嗚呼君人者得不鍳戒於是言乎王者将順天行道而臣下自脩徳矣苟逆於天命而臣下隨所化矣然忽湯文居其下則将因是逆以原于徳摇民心于宇内為其上者無危乎故為君不昜而作臣者知難不易則徳明知難則畏命是故夏殷周秦漢魏晉宋齊梁陳隋末之為理内逆于心外亂于身豈不以受天命者耶故夫十二朝之亡也十二朝之作矣雖小民女童必知其過矣何者為君以為賢為臣以為然常不觀于前無慮于後大渙一時之榮而已矣歴以度之咸失于此嗚呼君人者得弗鍳戒于是言乎寄言韋端符孺子道成人之言父母必憐誇焉非直父母也鄉人亦異而指之矣是何也非所以期孺子也待以孺子而言成人也則父母加之一作憐如鄉人指異即有魁然成人而事孺子是何人哉其所以待之視之用何心也移是而言小人不能為君子固也䧟乎罪誅非暴逆狠戾一作陵戾而窘於咽喉之空尺寸之膚受之不仁仁人一有一字不憫憐之也今有一鄉之吏遇孺子把滿巴切弄土塗折挽草木則呵而批之曰何爾也成人者有妄毁淫取顧不敢動睫而過之是誠不了一鄉矣吾欲世之大人無獨見鄉吏之不了一鄉而不自見所不理無喝怒于孺子之為而恬視魁然成人挽折大草淫取大物者本其所以待之之心從而校之天下幾蘇息下篇今有人負病於此則其親戚者憂之聞善醫則不逺燕越而求之欲其病之速瘳若嘘毛掇葉之易是直智無所施耳然則憂者雖甚不能為也善為者又非所憂也不憂非薄人也非其地耳彼誠善醫也安得人人而憂之必居其地而耻不能則将悉其技而為之與憂者之心不異故病甚憂戚之得善為之醫則幾乎平理矣不得善醫者百十旦夜坐環之而藥謀無所曉其云死䘮幾何故曰憂不能為技不習也為者不必憂非其地也必得善為之者處憂之之地然後知病之間也不日矣昔之為天下國家而病者豈無善之者耶不得處憂之之地耳漆室女誠憂矣不能為魯也鴟夷子嘗工為越矣陶朱公則視猶渉者之視車使嘗得善為天下國家者處憂之之地何敗亡之有釋疑權徳輿記曰君子居易以俟命語曰君子坦蕩蕩此盖視履考祥而不憂不懼也易曰思患而豫防之語曰季文子三思而後行此又戒慎若厲之義也言豈一端而已哉亦各以集作有所當在明者審之而已或不能深惟集作推本末而疑吾自若則舟有溺騎有墜寝有魘飲有醉食有饐行有蹷其甚則皆可致斃無非危機其可以盡廢此而如土偶木寓耶不然則憂可既乎憂可既乎公獄説楊䕫缙紳先生牧于東郡䋲䋲譽也属吏有公于獄者某適次于座承間諮其所以為公之道先生曰吾毎窺辭牒意其曲直指而付之彼能立具牘無不了吾意亦可謂盡其公矣某居席之末不敢以非是為决因退而辯其公且傳曰君所謂否臣獻其可君所謂可臣獻其否是欲彌縫其不至也及君可亦可君否亦否故平仲罪丘㨿踵君之意叔向譏樂王鲋從君者也所以智詢于愚以其或有得也尺先其寸或有長也皆庸其涓滴将助其廣大也况末世纎狡内外荏剛烏有不盡其辭而能必究其情乎使居上者得其情属踵而詰之可謂合於理未足言公也忽居上者異于見逺于理亦隨而鞫之取叶于意所謂明於不法烏可為公哉且不師古之言非不可為也為之不能逺不由禮之事非不可行也行之不能久故君子盡心法古動必本禮将逺而不泥久而不亂也若乃告諸獄任意以為明其属狥已以為公是使懐倖者有窺進之路挾邪者有自容之門矣矧藂棘之内辛楚備至何湏而不克而况承執政指其所欲哉嗚呼欲人之隨意者吾見亂其曲直矣樂人之附已者吾見汨其善惡矣而猶伐其治譽其公無乃瞽者衒别諸五色乎善惡鍳前人衆曰善未必善觀其善之為也衆曰惡未必惡觀其惡之由也行詐以自衒取媚于小人其足為善乎任直以獨立取惡于非類其足為惡乎故擇善採于譽則多黨者進去惡信于言則道直者退王莽折已以下士而諸父失其權彼言善者可慿乎京房守正以極諌而嬖倖指為逆彼愬惡者可聽乎故能鍳其善者必觀于衆之所惡能鍳其惡者必取於衆之所善所以衆謂之悖也非孟子之賢無以旌章子之孝衆謂之智也非國僑之明無以誅史何之詐嗚呼道之大非遇于賢明何常不汨哉文苑英華巻三百六十一
