body:
  text: 文苑英華巻一百二十六宋李昉等編紀行𤣥覧賦一首東征賦一首𤣥覧賦梁孝元帝歲次旃蒙月建司空變凌隂之吕扇廣莫之風蕭子褰帷九水作牧三宫乃盱衡而言曰惟天為大惟堯則之惟地蓋厚惟王國之粤我皇之握鏡實乃神而乃聖陳六聨於八則𢎞九職於三令運璇樞而御宇執玉衡而齊政大矣廣矣無德而稱俯齱齵於軒羲諒斗筲於子姒包河圖與洛書括龍官乎鳳紀超大德於百王髙鴻名於萬祀惟天縱於副后踰啓誦而惟首既倫儒於肅成復斷獄於長壽豈止丕莊屈膝將令班鄭捧帚譬衢樽而待酌若懸鐘之湏扣前踰繫象之外聲髙洙泗之右伊俯已之顓愚謬聨蕚於天衢筮東門而畫野創南國而分墟詔伯宗以為儐誥内史而策書用分兹於茅社從侯服而俾予類金獸以封建非桐珪以錫虞爾其湘水之東即我龜蒙魏甘露而分邑呉太平而定中鎮麟山之崔嵬傍龍跡其一作而穹窿金城髙而相属石燕起而依風豈連鑣於分陜羡追蹤於二公彼琅臺之作守有彭泗之嘉名殊竝海之分地異魚石之所城經沈子之髙墉蓋水運之堤封謝禮樂之干櫓閱武騎之輣衝軾錦車而前騖驅魚軒而繼蹤無復鸞歌鳳舞唯對緑桞青松留呉宫之宿鷰響平陵之夜鐘樂府詩逺聽平陵鐘飛余轡而西征戍太真之舊營鳴節鼔之金鐲屯戎車於石城戮滔天之封豕斬横海之長鯨每輟書而歎息景樹德之風聲從王役於鏡中浮文鷁而載鴻經謝亭而帳飲想彦伯之髙或作仁風度五城而騁望見三冀之無窮故以飛雲蒼隼白鱧青桐金吾舍利鳴鶴紫宫眺方嶽乎雲間望赤坂之朱殷想真長之送别懷思曠之還山此檜檝而方逺彼松舟而未閒倦旅泊於新丘同渭水之不流或千人而竝唱乍萬人而相鈎毁橋由於瑗度鑿空資於仲謀睇三茅之靈秘懷九轉之仙記紫臺石室之文青首銀函之字獨有披霧之心彌軫凌雲之志捫殷碑之愴望挹延州之髙譲井觱沸而䖤蟺勢﨑嶇而低昻見傳巴之度曲開疑作聞安歌之浩唱想觀樂乎朝陽憶紆衣乎夕張廻途疑作余舲之美風聳余棹乎雲陽彼桑梓之必敬况松疑作枌榆之舊鄉將逰目於五湖乃浩覧或作夕結覧非於姑蘇臨閶門之跨水聳重闕而開都睇太伯之卜祀爰避國於勾呉去西滸之樂政尊東夷之楷模時渡谷水之陽尚想嘉禾之方壯慶亭於呉后雄檇李於越王觀泉亭之涌波崖巍巍而峩峩張素蓋而縈洲嶼馳白馬而越江沲鼔洪濤於萬里曽未動於纎羅及戾止乎東歐疑作甌登玉笥與銅牛山東武而遥集鴈南海而飛浮巖亭亭其似蓋氣苕苕其若樓登舜橋而延首瞰禹井而淹留御史之牀猶在督䕶之門不脩雖濫同於借寇愧人瘼之何求皇覧揆余之忠誠詔入謁於承明既攝州於淮海且作尹乎中京慕張生之摘伏挹邉延之勵精珥金貂而待問鳴玉佩而趨庭兼三河及三輔總九緯乎九經揚王庭之俊選聞褎然於前則時濫假於中台掌邦教之觀國乍南宫而薦士且右鄉而表德判辟雍之樂語辯金馬之儒墨驅安車以騁望壯天居之麗極詳夫皇王爰處本無定所堯都平陽舜在冀方𤣥王居亳成周卜洛故知黄旗紫蓋域中為天地之所合風雨之所㑹䕃美氣之葱葱浮卿雲之靄靄聳梁山而成闕縈長淮而似帶昔者甘泉暉章平樂未央凌霄飛雨麒麟鳳凰九華仁壽百福明光玉階紫闈雕柱錦墻木蘭為棟文杏為梁温臺冬燠秋窓夏凉甲乙之帳庚辛之枋未有祗園之右齊之仁壽用擬舟航長為稱首日殿月宫金池珠叢七重迢逓千柱玲瓏虹橋左或作右跨鴈苑南通紫紺之堂臨水青蓮之臺帶風及夫皦光未旭更籌曙促猶然陽燧之火尚執驪龍之燭或帶桃花之綬乍響𤣥山之玉爰八命而建旟誠非親而勿居應鳴一作膺鞞於龍角覆緹幕於熊車開轅門於淮渚泛艅皇之容與吟紫騮之長歌奏𤣥雲之疊鼔開右座而納文設左廣而投武或作光而招武既風起而雲飛復摧班而拉虎泛樓船而鬱紆憶覇楚之雄圖悲騅馬之不逝忘鹿逐之長驅豈烏江之天險資赤帝之神符於是途經灌壘或作罍水分當利彼吳王之連和延魏后之交質趙將軍之建節辛侍中之奉使亮鼎足其何言限脩江而為二泊九井而問津蓋六服之都㑹方函谷之設險譬魯陽之襟帶觀棄繻之裂帛見髙車之輔軑顧濡湏之故巘每當食而忘飯鬬二虎於江干爭兩龍於脩坂既凱㨗而來旋遂鳴鐃而獨返彼銅山之可傷何驕容之無方已築長洲之苑復實海陵之倉遂稱兵而内侮冝朝起而夕亡原西陵以肇基始衝梯於士治載為前茅之首實表勤王之師同薏苡之興謗成貝錦之深疑良弓藏而髙鳥盡入不謙而出不辭逰雷中而徜徉遇日吉而辰良祀公瑾以桂酒薦魯肅以椒漿賔疑討曹之英策蓋謀桓之秘方衣披披而屢舞神欣欣而樂康弔劉安於下雉聊載懷於惇史或䇿杖而龍飛或叱石而羊起將雞鳴於天上逐疑埋䰟於蒿里匪仙道之云偽蓋為仁其由已經釣臺而髙邁過鄂渚而西浮變青門之三襲為黄塵之一丘城逶迆而中斷階坡陁而半留分沙羡而啓鎮即開蕃與藩同於夏州星尚連於翼軫舍兼分於斗牛麗滄浪之水清良信美乎濯纓嗟疑其釣而非釣復何慮而何營羗有願而不䕶疑作獲拂蘭橈而上征冬已謝而春辭聊方舟而水嬉看白沙而似雪望却月而成眉臨石渚其如鏡玩弱桞其猶絲停赤壁而延佇聊愴望而方思呉水鄉之舟檝魏陸産之臯貔本呉長而魏短况地利與天時結憤風而炎上燎原火於驚颸灰霧霏而擊馬箭參差而麗龜成班車之逸氣碎當途於鹿麋分洞庭於呉上限東益於巴丘如淄澠之相别似涇渭之分流雖滔滔而直㵼終耿耿而横浮想蘭香之薦枕懷娥皇之夜逰若夫子瑜設險之記閻遨逰或作浪湧之地既下車而踐境早詢求於方志曉泊鬻拳之津夕瞻荒谷之寺居桞下而布德坐棠隂而髙視班六條於宰邑賢十部於從事每題輿於仲舉豈虛名乎叔治藉務隙於登臨乃紛吾之本志時復設羽蓋揚旌斾乗雕玉從貝帶浮雲起登髙唐泛枉渚望涔陽荆棘生於龍門之下狐穴于馬牧之旁臨章華而流一作留盼見舊楚之凄凉試極目乎千里何春心之可傷其舊一無此字渚宫也夾江帶阡布濩井田通達一作連交道高門接連人要一作腰水心之劔家有給一作家給火耕之田既追隨而得性寔燕處而超然若平臺之中觀閣相通雄梁渡水壯翼臨空金堤之路銅鞮之宫閣冩凌霄樓布麗譙横走馬而為觀擬牽牛而作橋爾乃樹之榛栗椅桐梓漆三色一作巴黄甘千户朱橘桃䕃井而成蹊萍浮江而泛實蟬鳴枝而候稻范飛冠蜂也而吐蜜復有水底石髮山筋地骨書帶新抽屏風互發反魂長生靈夀女貞金鹽玉䜴堯韭舜榮交譲之目代謝之名忘憂長樂桃杷疑鼔箏竹則篔簹緑箓交戰䇿皮淚沾虞后龍還葛陂便姢防露七諫便娟之竹葳蕤而防露檀欒夾池聊右書而左琴且繼踵於華隂彼門人之問疑道各家求而有心先鈆擿於魚魯乃紛定於陶隂識三家之云謬知五門之可尋時仰禀於皇猷討巴濮於裨鯈乃稜威於華墨出車檻之云修觀月窟之入附覩日勒之來遊既虎牙而成號又龍額而為侯仰皇德之洪深疑朱離詩注西夷之樂曰朱離於佅文選東都賦僸佅兠離李善注佅東夷之樂也任見白題之蹋鼔看烏孫之學琴獻桂條之良賮奉桃枝之怪琛嗤聚米於馬援哂畵地於臧旻彼蠢爾之為鯁伊慿陵而未靜異黄巾於黒山非緑林於青嶺余喟然以指蹤實濟寛而持猛負歩光之文劔驚漢陽之夕景麾靈琚之左轉光玳簮而右篸白雲一作霜生而陣合紅塵起而軍暗於是驅驌驦命蹶張廻翠蓋之金𤓰臨絳宫之玉堂擬都䕶之戊巳模荆尸之甲裳作齊軍之減竈斆燕師之卧墻觀田畯於虞澤命車右而前驅猶從戎於細桞若驅馬於長榆矜猿鳴之抱木傷走之依株每惻然而作色方載馳而轉軾閱放麑而興憫對亂鱗而動惻矧髙宴於城隅駐五馬而踟蹰乃此上疑作燐有青琴碧玉絳樹緑珠西河王豹東野綿駒蘭釭夕然合璧斜天照流風之廻雪映出水之初蓮非吾心之所悦曽未始而流連濫叨榮於分陜踰一紀之星躔子既生而冠字嗟留滯以迥邅罷臨邉之瑞節觀楚黎之卧轍向秋野之蒼茫對寒江之幽咽散歸雲之鬱蓊吐長風之飉􅂒聞羗笛之哀怨聽胡笳之悽切慘疑作摻余袂兮淚成行攀余轅兮不忍别奉信珪而入朝驅駟馬一作駿馬而乗軺既緫司於戎旅亦兼餙於豊貂登贙踞而目極忽平原之已超帶方逵之九軌接馳道之三條彼重門之擊柝馮霞起以建標雜丹樓以藻井間青山於綺寮耆疑落星之嵸巃覩㸌火之迢遥鬱如蓬萊之臨滄海憬如崑崙之出絳霄函夏之所覿江漢之所朝若夫天不愛道地不愛寳賔連瑞木見白虎通紫逹文選曲水詩序作紫脫華平朱草見東觀記麒麟五色飛兔雙翼集我君圃之旁逰我帝梧之側于斯時也天子郊禘于圜丘髙玉簡於東漢邁金版於西周奏蒼璧而服大裘樂有雲翹之舞牲非蠒栗之牛設黄琮而禮地望方澤乎神州節㑹咸池之琯冕無繁露之旒觀三農乎九榖薦黍稷之穜稑命甸師而清塵詔封人而出宿敬青壇而致虞動翠耜而祈榖時季春之上已臨祓禊乎沼沚杏花發於露寒棘實浮於濛汜爰長乆之御節採日精於山趾天策夜而動星鈎陳朝而按軌予是時也陪玉軑餙金覊驅騄駬曜翠羆乗倜儻控權竒寳劔昭晰綵􅀈陸離乍俯馬足時仰月支見靈烏之占巽觀司南之候離習執鞭而珥筆雖日夕而忘疲奥疑重明堂地景一有邑字已丙巳乃明堂之方梁未諱丙或唐人冩丙作景耳乎正陽乃八窗而四逹開上員而下方置隂鍳之明或作以朝水設珪瓉而盈觴誶天官乎冡宰服端委而辯方䖍植物之蕰藻鄙將饗之牛羊藉鴻私而置傳復推轂而懷方泝蛟川於滙澤㳂鵠塞於潯陽何蠡川之浩浩而匡岫之蒼蒼其匡岫也盤紆崷崪嶾嶙鬱律峻極于天干霄秀出岑嶔﨑嶬烏兔蔽虧㟏岈豁聞疑作開背原面野噴飛流於天末鼔雷霆於巖下聳髙舘於雲中聨藂祠於星社雕甍綺閣吁可畏其欲落雲霧杳冥縈萬嶺而俱青照曜山莊岧嶤石梁鴈門餘帳隆安故床鏡臨江而分影鑪銜花而共香若乃羽族徘徊察風應雷鴛鴦感夢乾鵲知來露華挾䳄而肅侣銜環帶壟而合或作舎猜孔接影而䬙颺鶄交頸而毰毸爾其彭蠡際天用長百川沸渭渝溢㶑淡連延大則浩汗滉漾細則澆灌潺湲遇祈或作神颷之弗爽彼所或作祈報之無愆且摶摇以九萬乍髙颷而三千其中則有瀺灂嘉魚鷰羽龍鬚戴星含石蒲疑身雉軀乍浮圓鏡時泛明珠報蕩子之長信送仙人之短書耻觀魚而為樂觧舒鴈於髙繳必冀孔愉之龜當如噲叅之鶴愾衝冠而發憤嗟吾人之施薄觀進退於我生每篤靖而居貞羞為金谷之富不矯石閭之清每鞠躬而遵節藉王道之既平貴靜者人所便予得之於自然非三百之不足惜五十於豊年笑汙斜之行潦喜甘雨於石田飛新梅於倡粉拂輕絮於房綿月芝抽而曉落燈花開而夜燃菊從風而金散荷帶水而珠圓已寤歌於折桞復行吟而採蓮課七分與六日推兩地與參天夕章程而勾股亦剡注而叅連幼墳籍以自娯迄方今而不渝雲氣芝英之簡懸針倒薤之書緘乎蒸栗之帙餙乎酸棗之珠擬河獻之留真希淳儒一作于之席珍笑彭聃之下士聊重義而自欣一作臨秋水之至樂登春臺而自欣鑿户牖而長望混木鴈而兼陳嗟今來而古徃方一作聊絶筆於獲麟凢一作皆藝文類聚節文東征賦高適嵗在甲申秋窮季月髙子逰梁復乆方適楚以超忽望君門之悠哉㣲先容以効拙始一作姑不隱而不仕宜漂淪而播越出東苑而遂行㳂濁河而兹始感隋皇之敗德劃平原而為此西馳洛汭東竝淮涘地豁山開川流波委六宫景從千官邐迤龍舟錦㠶照耀乎數千一有百字里大駕將去羣盗日起尸位者巻舌而偷生直諌者觧頤而後死寄腹心於梟獍任手足於蛇虺終一作既受殺於匹夫尚興疑於愛子豈不為窮力役於征戰務淫逸於奢侈六軍悲牧野之師萬姓哭遼陽之鬼嗟顛覆於瞬一作曩目指年代於流水唯見長亭之煙火悲一無此字曠野之荆杞至鄼縣之舊邑懷蕭相之髙風既屈節於主吏每歸誠於沛公始俱起於天下乃從定於闗中推金帛於他人挹圖籍於我躬按山川之險阻敕一作救天地於一作之屯蒙嘉盈俸以増邑方挹一作指蹤而建功納邵平以防患舉曹參而告終經絰城而永望想譙郡而銷憂慨魏武之雄圖終大濟以横流用兵戈以威四海挾天子而令諸侯乃擅命以誅伏徒矯跡以安劉吾始未知夫逆順胡寧比一作德字於殷周下符離之西偏臨彭城之髙岸連山鬱而一作其漭蕩分大澤三字一作大埤平乎𣺌漫憶一無此字昔天未厭禍項氏叛换觧齊歸楚自蕭擊漢天地無色風塵潰亂憫君王之坎軻混士卒以奔散苟炎運之克昌豈人生之塗炭次靈璧之逆旅面垓下之遺墟嗟魯公之慷慨聞楚聲之一作而悒於歌㧞山之一作以涕洟竊覇圖而莫居捐一作擯亞父之何甚悲虞姬之有餘出重圍而狼狽至隂陵以躊躇顧天亡以自負雖身死兮焉如登夏丘而寓一作縱目對蒲隧而愁予聞一作問取慮之斯在徴長直而舍諸宿徐縣之廻津惟偃王之舊域方以小而事大豈無位而有德彼皆昏暴以䘮邦一作民伊何仁義而亡國髙延陵而一作之挂劔慕班彪之述職湎一作緬沛水之悠悠俯婁林之行一作紆直即日河滸依然泗上山川土田耳目清曠眺睢一作淮源之呀豁倚倚一作偉楚關之雄壯挂輕席於中流順長風以破浪過盱眙之邑屋傷義帝之波蕩雖一作歎三户之亡秦知萬人以離項越龜山而訪泊入漁浦而待潮鴻鴈飛兮木葉下楚歌悲兮雨瀟瀟霜封野樹氷凍寒苖岸草無色蘆花自飄幸息肩於人事願投跡於漁樵思魏闕而天逺向秦川而路遥候鳴雞以進㠶趨亂流以爭迅縱孤舟於浩大撫垂堂以誡慎遵徃主二字一作在渚於淮隂徴昔賢於韓信哀王孫以一作之寄食嘉漂母之無愠鄙亭長之不仁乃晨炊而嗇恡忽從龍以獲騁遂擒豹以自奮破全趙有竒謀三字一作而用竒稱假齊以益振幸辭通以感惠俄結豨而謀釁當處一作在約而心亨曷持盈而不順陵赤岸之迢逓棹白波之紆餘歴山陽之村野投㐮賁之邑居人多耆一作嗜艾俗喜觀漁連葭葦於郊甸雜汀洲於里閭感百川之朝宗彌結念於歸歟日杲杲以麗天雲飄飄以巻舒魯放情而一作於蹈海丘永歎於乘桴遇坎則止吾今不知其所如哉凢一作皆川本文粹乃集本文苑英華巻一百二十六
