body:
  text: 文苑英華巻三十一宋李昉等編地類七古石賦一首石賦一首落星石賦一首昆明池石鯨賦一首禎石賦一首仙石靈臺賦一首石鏡賦二首望夫化為石賦一首溜穿石賦二首古石賦鄭惟忠博望侯周遊天下厯覽山川尋長河於異域得美石而獻焉漢武帝未之竒也東方朔見而喟然曰此石英輝潤宻秀色明爛舊枕昆吾之谿曾臨歸美之岸玊雉飛而激矢金雞鳴而縱彈至如天台始裂地乳初分丹靑孕彩隱起成文盈尺則内含明月膚寸則外吐浮雲别有兩楹分竦雙闕相向依依識啓母之形亭亭表望夫之狀鼔迎桴而若動㠶映舟而似颺此並流膏曲澗滴髓危峰據谷成虎臨池作龍鋪英九節連葉千重若乃泗水之上岐山之側撫之則磬動竒音被之則錦開新色匠石見而驚駭師涓聞而歎息於是琢磨成狀雕瑩生輝似龜則負圖盤峙如鵲則緘印鶱飛在地者佳人𢷬練登天者織女支機及其火烈崑墟星流宋國被隕形碎遭焚影黑碑沉郢路之東柱折陽關之北昔之開壇竹聳抱劒松抽礎應山雲之潤橋通海水之流柳谷岸崩之馬鬱林泥落之牛莫不歳月凋訛丘陵蕪没顛墜坑穽枕倚巖窟據洞口而嵳峩出泉心而硉矹徒見新排理坼舊蹙文迴圓分者雹散方裂者氷開旣藏瑕而被蘚又抱穴以侵苔豈如寫鏡能明磨鋒可利擊拊充帝庭之樂關和覩王府之器總五色而補天含九光而鎮地者矣詞未畢帝乃顧而言曰楚王見璞棄之山阿不有卞氏其如玉何抽琴命操爲古石之歌歌曰江東藏瑞簡濟北藴兵書若非平固湖中鴈定是昆明池裏魚歌響旣終神儀有懌左右驚視符彩傍射使玉人而攻之果得連城之璧石賦李邕代有遠遊子植杖大野周目層巖覩巨石而歎曰兹盤礴也可用武而轉乎兹峭峙也可騰趠而登乎觀其陵雲挿峰隠霄横嶂峻削標表汗漫儀狀劃鎮地以周博崛戴天而雄壯黙𤣥雲之暮起赩丹霞之朝上若使矗布長城嶷聮高壁遏西戎而分塞截東胡而度磧張九州之地險蹙四夷之天隔固可以眇絶驕子遐阻勍敵歸華夏之甲士却邊荒之羽檄别有列在王庭地當文砌疑貞琬之粉澤艶重錦之光麗承聽政之梁柱納進賢之階陛匪徒夾植桃李因芳茝蕙䧏神女之徜徉拂仙衣之容曳若乃苔蘚剥落雨露淋漓水碧藻曜繪畫紛披不邀代之所貴不欲人之見知罔懷金而則異曷剖玉而方竒至若危堞孤援懸門禦衝出陣摧鶴乗城起龍砲與矢而飛雨磁當途而列墉金鼔爲之沮氣戈矛爲之輟鋒借如奕秋沉思蜀相興圖秉節制以全勝縱劫殺以論都鄙宋緘之謬識嘉禹鑿之神模落五星而多懵坐千人而不孤惟磨礱之所取任圓方之自殊支空留於織室編尚想於兵符鳥何恨而填海山何言而望夫徒以貞者不黷堅者可久臥如羊於山野蹲似虎於林藪知作鼓之希聲信爲人之無偶梁架海以東住一作注鎮臨江而南守庶投水而克成將補天而何有豈獨砥礪利器盤踞眞王鏃來肅愼門通越裳屹特立以興主駕能言以發祥邇聞疑作開蓮兮表華遠倚劒兮疏梁保兹城而永固結彼交而不忘何止藏書入室勒篆離經翕湘川之飛燕伏昆池之駭鯨膏久服而顔駐碑一觀而涕零豈如扣角匡坐且悲歌於白水尋山小住止危途於翠屏而已哉落星石賦崔沔元氣初變有形旣闢稟清明之表者騰爲星辰受重濁之資一作姿者降爲土石肇經綸於邃古蓋常久而不易詭哉靈物爰始混成叅夫𤣥象麗於太淸彼在天也何譴奄淪落於邊城其在地也何幸復推遷於上京爾其蘭臺廣廡芸閣脩除飛軒廓落邃宇崇虚芳草旖旎珍木扶疎邇九重之宮闕藏萬古之圖書地禁務簡政和禮舒貞而不黷其淸有餘意棲閒之得所形一作雖變化其焉如徒觀其隱淪晶昭疑畜縮光芒體硉矹以難動氣埋冥而不揚擬於規矩旣不合於圓方徵其彩飾又無復於𤣥黄匪處匪出不識於行藏匪榮匪悴不逹於炎凉夫其靜也何必徐生百祥夫其重也何必能鎭百殃庻永終而知弊蓋抱璞而襲常彼無用也亦至人之所謂允臧昆明池石鯨賦李子卿漢武帝將恢厥功闕一作闢厥土使近必伏遠必取乃象滇河以爲池法昆明而敎武於是水物備石鯨吐茸鱗鏤甲欲動於漣漪掉尾建鬐必隨於風雨殘文沙白古色苔蒼若噴沫而生浪狀銜珠而有光質惟其堅豈有時而泐感則斯應蓋動惟其常方將協靈德薦禎祥豈泥沉而沙臥與地久而天長者哉至若漢苑風霽秦渚流春輕搖澹泞稍動淵淪載沉載浮百尺且窺於頒首若明若滅兩崖猶認於文鱗對牛女而光動映樓船而色新誇大豈慙於海客遇屯空笑於波臣及乎雷隱南山雲生北斗鼔怒波擊崩騰水走勢則淘淘疑作洶洶有類陽侯之振聲乃虩虩宛是蒲牢之吼若此則非不知靈之所憑神之所有者也且石之爲質也磨而不磷魚之爲物也動而必順豈比夫爲犀蜀郡浦際空沉作燕湘川雨中方振色映乎崖渚性合乎風雷非任子之釣得儻琴高之御來幸見處於河漢亦何辭於刼灰客有感而言曰今失流無虞鏗鐘何託請爲不轉之志以就觀濠之樂儻南溟之可圖吾固知夫後時之可以潜躍也禎石賦以素質𤣥字篆隷相叅爲韻薛存誠上帝乃眷下顧豐我皇祚産禎石以報德約逺人以遐赴外輝煥以發章内淸明而含素方圓氷潔篆隷星布五千符聖厯之長一九合太陽之數瑩然非追琢所及忽爾若神靈來附考乎文也知諸受命之期徵乎石焉示此維城之固且夫文旌乎實石堅乎質垂本根以繁茂作元后之貞吉驗符而天命有歸貽慶而孫謀莫失方洛書以自來狀河圖之負出懿夫皪彩發鮮隱起成姸質非工斵字乃神鐫移篆文於玉璽之上取隷則於銅棺之前紛鳥迹以届漢若飛騰而在泉帝拜昌言慶實延於卜代名傳聖運功何異於補天苟不思而來曁恭承眷於上𤣥信乎瑞以勤致彰乎天賜其爲后也貴乎無得而稱其爲石也下乃不求而致豈比夫渭濱之璜兮空言佐命峴首之碑兮永沉文字孰若我垂吉祚於當時演昌期於後嗣且乎文可嘉而不可巻石可固而不可轉題八角而爾乃增輝刻九言而吾斯盡善宜子孫之蟄蟄得先銜於篆隷太宗勞謙垂制䖍告上帝伊連被而莫紀自高祖而流裔其石也爲遐玉之祥惟孤也實先君之系誠降慶之所致敢欺紿於輿隷於是公卿列辟劒佩鏘鏘聮趨詣石再拜稱觴斯萬人之有慶表二聖之重光不然何炫發於石玊侔其相瑩疑煌無點璀璨有章帝曰祖考之德惟覃股肱之能以參故天錫之罔替諒不榖而何堪仙石靈臺賦惟神化之所感何禎祥而必臻位將天而同德天與日而共新百靈扶於三善萬象資乎一人美以疑英聲逺被嘉貺必陳於是祕其迹則如畫如隱圖其文則匪鐫匪刻屈若絲縈舒同髮直彩非因染辭無假飾雖真籙之可觀固神功之靡測若乃烟消字發苔落文生映月波起含日金明彰八千之綿祚著三代之珍名或鸞迴而鳳轉乍雲㸃而霜横法兼篆籀體備形聲信天筆之攸假實神翰之所成至如桂影宵臨星光夜燭分若珠解連同瓊續映斯疑作朝霞以散錦流夕露以垂玊紀三皇之故亊包五代之遺躅足使濁河龍泳淸洛龜沉旣超前而冠後亦挾古而光今所以管絃流韻鐘石凝音豈獨妙符至理固亦道叶乾心總羣瑞以考徵實表盛乎貞紀騰茂實於千載激淸流乎萬祀𤣥象煥以呈祥靈山鬱以効祉明皇期一作基之永固與天地乎終始嗟㣲臣之菲薄屬欽明於暮齒望天闕以長謠情顧戀其何已也石鏡賦以淸光内朗稟之媚然爲韻李程惟石之貞惟鏡之淸鏡因石以爲異石假鏡而爲名其在石焉肇自一拳之質其爲鏡也非因百鍊之精不資磨瑩而氷淨詎假雕鐫而砥平徒美夫孕淸瑩含彩綴粲玊質以皎皛蓄霜華而明媚匪因人力其成也何時倬彼神功其來也奚自凝輝烱烱散彩洋洋旣不勞乎鎔範亦無失於圓方輝映空巖恒舞山雞之影色澄淸夜寧慙玊兎之光伊鑒物之必審信自然之所稟彼虚受而不遺同至道之無私旣不限於遐邇豈有差於毫釐深山之中誰辨藏氷之處幽谷之際寧分抵璧之時况剛直其體淸貞自持恒發輝山之色常含韞玉之姿懷寧一之心不可轉也處闃寂之地誰其尸之當六合之精爽澄素輝之潔朗可以坐致於雲霄可以立分於魍魎知遠之邇視山岳之在目以小觀大覽江湖如指掌且鏡之爲物也浄石之爲義也堅旣守質以固矣亦騰光而皓然朗鑒之前皆願呈其肝膽委照之下終願辨乎媸妍故能無幽不燭無物不載彼三光與萬類莫不形乎其内也哉望夫化爲石賦以望逺思深質隨神變爲韻白行簡至堅者石最靈者人何精誠之所感忽變化而如神離思無窮已極傷春之目貞心彌固俄成可轉之身原夫念遠增懷憑高流眄心搖搖而有待目眇眇而不見絲蘿無託難立節以自持金石比堅故推誠而遂變徒觀夫其形未泐其怨則深介然而凝類夫啓母之狀確乎不㧞堅於王霸之心口也不言腹兮則實形落落以孤立勢亭亭而逈出化輕裙於五色獨認羅衣變纎手於一拳已迷紈質矧乎石以表其貞變以彰其異結千里之怨望含萬里之幽思緑雲朝觸拂峩峩之髻鬟㣲雨暮霑洒漣漣之珠淚雜霜華於臉粉脫苔㸃於眉翠昔居人代雖云賦命在天今化山椒可謂成形於地於是感其事察其宜採蘼蕪之芳生不相見化芙蓉之質死不相隨冀同穴於冥漠成終天之别離則知行高者其感深跡異者其致遠委碧峰之窈窕辤紅樓之婉娩下山有路初期携手同歸窺戸無人終歎往而不返嗟乎貞志可嘉高節惟亮同胚渾之凝結異追琢而成狀孤烟不散若襲香於爐峯之前圓月斜臨似對鏡於廬山之上形委化而已久目凝睇而猶望悲夫思婦與行人莫不覩之而惆悵溜穿石賦以能以甚柔而攻至堅爲韻趙蕃山溜泠然漱幽石而濺濺恒羃䍥以迸集忽嵌空而下穿介若自持謂稟靈而利物呀而中斷見積小以摧堅且其輕重異源剛柔殊類嘉洞出而無朕知累功而有自貫白雲之幽抱滴滴方來破蒼苔之古痕泠泠斯至﨑峗莫狀激射無窮逗跳沫以居内洩涓流而在中日就月將必漸然而爭一作自赴因㣲方著殊異疑作易者之先攻原乎厥性旣柔其平如砥因滴瀝以成象若洞澈而虚已注而匪竭歎追琢之莫加協乃有時顧堅貞而何以下漱而玉中開似冰謂雕以爲樽窪而無當疑鑿而成磴豁爾非憑然則引深邃洞觚稜諒在物而靡及非自㣲而不能由是異類相推於斯何甚蒙兮莫奪堅然是禀淸光亂灑初熠熠以穿菱素彩頻垂每熒熒而透錦偉夫烱若方絜於焉注兹或零落以將盡竟連環而不遺依依未通遵神泉之靡息一一將徹聽鳴玉之逺而故可以託質悠悠于山之幽載吐潜液靜如冥搜滴盤礴之間通兹餘潤挺剛克之際分乎至柔諒成功之不遠庻積習之可求第二同前韻楊宏貞溜可穿石柔能䧟堅因依而上下相遇悠久而貞剛失全始則泠泠觸泓澄而或躍旣而決決窅洞逹而旁穿一道中透孤光下懸何載馳之不息終漸靡之使然觀夫習坎能通柔虚洊至虹挂空而飲井星曳練而投地徵老耼之說柔弱勝於剛强驗夫子之文積善由乎馴致當其涓涓無已皓皓未通若嶃巖之見拒能激射以相攻旣潄盪以探奥遂深沉而鑿空下漱花浮似出桃源之外乗流魚躍如辤丙穴之中言念其美因詳所以石雖堅而有崖溜雖柔而不止進寸退尺常一以貫之日往月來則就其深矣克諧潤下之道實契靈長之理想夫經始之時人莫知之笑我者謂量力而徒爾見機者料成功之遠而旣知難而不退長引彼而注兹是能卒獲其求何傷守柔細滴瀝以成響大逶迤而若抽在彼一拳同玉巵之無當經乎五色狀銀漢之分流其空可翫其義可禀庻求福之不回思進身而去甚彼以水投石于嗟莫承摧鋒飲羽誰謂難能曷若挫銳而功著積㣲而道𢎞妙哉斯賦之㫖惟執柔而有恒文苑英華巻三十一
