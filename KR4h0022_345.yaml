body:
  text: 文苑英華卷三百四十五宋李昉等編禽鳯一首鶯三首鶴二首杜鵑二首鶻二首百舌一首鳶一首秦吉了一首白鷴一首水鳥一首朱鳯行杜甫君不見瀟湘之山衡山髙山㒹卞圜注杜詩作巖朱鳯聲集作鳴嗷嗷側身長顧求其曹翅垂口噤心甚勞一作勞勞下愍百鳥在網羅黃雀最小猶難逃願分竹實及螻蟻盡使鴟梟相怒號侍遊冝春苑奉詔賦龍池栁色初青聽新鶯百囀歌李白東風已緑瀛州草紫殿紅樓覺春好池南栁色半青青縈烟裊娜拂綺城垂絲百尺挂雕楹上有好鳥相和鳴間關早得春風情春風卷入碧雲去千門萬戶皆春聲是時君王在鎬京五雲垂暉耀紫清仗出金宫隨日轉天回玉輦繞花行始向蓬萊看舞鶴還過茝若聽新鶯新鶯飛繞上林苑願入簫韶雜鳯笙聽鶯歌僧靈徹新鶯傍簷曉更悲孤音清冷囀素枝口邉血出語未盡豈是怨恨人不知不食枯桑椹不銜苦李花偶然弄樞機婉轉陵煙霞衆雛飛鳴何局促自覘逰鱗啄枯木𤣥猿何事朝夜啼白鷺長在汀洲宿黑鵰黃鶴豈不高金籠玉鈎傷羽毛三江七澤去不得風煙日暮生波濤飛去來莫上高城頭莫下空園裏城頭鴟鳥拾羶腥空園燕雀爭泥滓願當結舌含白雲五月六月一聲不可聞聽鶯歌集作曲韋應物東方欲曙花冥冥啼鶯相喚亦可聽乍去乍來時近逺才聞南陌又東城忽似上林翻下苑綿綿蠻蠻如有情欲囀不囀意自嬌羌兒弄笛曲未調前聲後聲不相及秦女學筝指猶澀須臾風暖朝日暾流音變作百鳥喧誰家懶婦驚殘夢何處愁人憶故園伯勞飛過聲局促戴勝下時桑田緑不及流鶯日日啼花間能使萬家春意間有時斷續聽不了飛去花枝猶裊裊還栖碧樹鎖千門春漏方殘一聲曉仙鶴篇武三思白鶴乘空何處飛青田紫蓋本相依緱山七月雖長去遼水千年㑹憶歸緱山杳杳翔寥廓遼水纍纍歎城郭經隨羽客步丹丘曽逐仙人遊碧落迢迢碧落斷氛埃霞堂雲閣疑幾重開欲尋東海黃金竈仍向西山白玉臺九臯獨唳方清切五里驚群俄斷絶月下分行似度雲風前揚影疑回雪風前月下路漫漫水宿雲翔去幾般宛轉能傾吳門市徘徊巧拂漢皇壇琴中作曲從來易鼓裏傳聲有甚難夜夜恆飛銀漢曲朝朝常飲玉池瀾别有聞簫出紫煙還如化履上青天霜毛忽控三神下玉羽俄看二客旋燕雀終迷橫海志蜉蝣豈識在隂年莫言一舉須千里為與三山送九仙鶴媒歌陸龜蒙偶繫江集作漁船汀樹枝因看射鳥令人悲盤空野鶴忽然下背翳見媒心不疑媒間净立如無事清唳時時入遙吹徘徊未忍遇南塘且應同聲與集作就同類疏翎宛若相逢喜只怕才來又驚起窺鱗啄藻乍低昻注定當胸流一矢媒歡舞躍勢離披似諂功能腰弩兒雲飛水宿各自物妬侣害羣猶爾為何况集作異人間有名利外頭笑語中猜忌君不見荒陂野鶴陷良媒同類同聲真可畏杜鵑行杜甫君不見昔日蜀天子化作杜鵑如集作似老烏寄巢生子不自啄群烏至今與哺雛雖同君臣有舊禮骨肉滿眼如集作身羇孤業工竄伏深樹裏四月五月偏號呼其聲哀痛口流血所訴何事常區區爾豈摧殘始發憤羞帶羽翮傷形愚蒼天變化誰料得萬事反覆何所無萬事反覆何所無豈憶當殿羣臣趨同前司空曙又見杜甫集古時杜宇稱望帝魂作杜鵑何微細跳枝竄葉樹木中搶翔集作佯瞥捩雌隨雄毛衣慘黑自憔悴衆鳥安肯相尊崇漏集作隳形不收栖華屋短翮唯願巢深叢穿皮啄朽觜欲秃苦飢始得食一蟲誰言養雛不自哺此語亦足為愚䝉聲音咽平聲噦若集作咽咽如有謂號啼略與嬰兒同口乾垂血轉迫促欲似集作似俗上訴於蒼穹蜀人聞之皆起立至今相效傳微風集作斆學傳遺風乃知變化不可窮豈思昔日居深宫嬪妃左右如花紅呀鶻行杜甫病鶻卑飛俗眼醜每夜江邉宿衰栁清秋落月集作日已側身過鴈歸鴉錯回首緊腦雄姿迷所向踈翮稀毛不可狀强神迷復皂鵰前俊材早在蒼鷹上風濤颯颯寒山隂熊羆欲縶集作蟄龍池深念爾此時有一擲失聲濺血非其心義鶻行前人隂崖二蒼集作有蒼又作有鷹飬子黑柏巔白蛇登其巢吞噬資朝餐集作恣朝餐雄飛逺求食䳄者鳴辛酸力强不可制黃口寧集作無半存其父從西歸集作來翻身入長煙斯須領健鶻寃憤集作痛憤又作憤悶寄所宣斗上捩孤影無聲集作噭哮來九天修鱗脫逺枝巨顙拆老拳高空得蹭蹬短草辭蜿蜒折尾能一掉飽腸皆已集作已皆穿生雖滅集作减衆雛死亦垂千年物情有報復快意貴目前茲實鷙鳥最急難心炯集作皎然功成失所往用捨何其賢近經潏水湄此事樵人集作夫傳飄蕭覺素髮凛若集作欲衝儒冠人生許與一作計有分亦在集作只在又作亦存顧盼間聊為義鶻行永集作用激壯士肝百舌吟劉禹錫曉星寥落春雲低初聞百舌間關啼花枝滿空迷處所搖動繁英墜紅雨笙􅀢百囀音韻多黃鸝吞聲燕無語東方朝日遲遲升迎風弄影如自矜數聲不盡又飛去何許一作處相逄緑楊路綿蠻宛轉似娛人一心百舌何紛紜􅋳顏俠少停歌聽墮珥妖姬和睡聞可憐光景何時盡誰能低回文粹作徊避鷹隼廷尉張羅自不關潘郎挾彈無情損天生羽族爾何微舌端萬變乘春輝南方朱鳥一朝見索漠集作寞無言蒿下飛飛鳶操前人鳶飛杳杳青雲裏鳶鳴蕭蕭風四起旗尾飄揚勢漸髙箭頭砉劃聲相似長空悠悠霽日懸六翮不動凝飛集作飛凝烟遊鶤翔鴈出其下慶雲清景相回旋忽聞飢烏一噪聚瞥下雲中爭腐鼠騰音礪吻相喧呼仰天大嚇疑鵷雛畏人避犬投髙處俯啄無聲猶屢顧青鳥自愛玉山禾仙禽徒貴華亭露朴樕危巢向暮時毰毸文粹作陪鰓飽腹蹲枯枝遊童挾彈一麾肘臆碎羽分人不悲天生衆禽各有類威鳯文章在仁義鷹隼儀形螻蟻心雖能戾天何足貴秦吉了白居易秦吉了出南中彩毛青黑花頸紅耳聰心惠舌端巧鳥語人言無不通昨日長爪鳶今朝大觜烏鳶捎乳燕一巢集作窠覆烏啄母雞雙眼枯雞號墮地燕已集作驚去然後拾卯攫一作獲其雛豈無鵰與鶚嗉中肉飽不肯摶亦有鸞鶴群間立高揚如不聞秦吉了人云爾是能言鳥豈一作爾不見雞燕之寃苦吾聞鳯凰百鳥主爾竟不為鳯凰之前致一詞集作言安用嗏嗏集作噪噪又作喋喋間言語放白鷴篇宋之問故人贈我緑綺琴兼致白鷴鳥琴是嶧山桐鳥出吳溪中我心松石清霞裏弄此幽絃不能已我心河海白雲垂憐此珍禽空自知著書晚下麒麟閣幼稚嬌癡侯門樂乃言物性不可違白鷴愁慕刷毛衣玉徽閉匣留為念六翮開籠任爾飛水鳥歌陸龜䝉水鳥山禽雖異名天工各與雙翅翎雛巢吞啄即一例游處髙卑殊不停别有觜鈎爪㦸徑立直視者擊摶挽裂圖羶腥如此等色恣豪橫竦身往往陵青冥為人羅絆取材力韋韝綵綬懸金鈴三驅不以鳥捕鳥天下先得聞諸經超然可繼義勇後恰似有意集作志行天刑鷗間鶴散兩自遂意思不受人丁寧今朝棹倚塞江汀舂鉏翡翠參鵁鶄孤翹側睨瞥滅沒未是即肯馴軒楹婦女衣襟便侫舌始得金籠日提挈精神卓槊一作犖背人飛合集作冷抱簾葭宿煙月我與時情大乖剌秪是江禽有眉髮殷勤謝爾莫相猜歸來長短同羣活文苑英華卷三百四十五
