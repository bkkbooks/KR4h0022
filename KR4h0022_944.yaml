body:
  text: 文苑英華卷九百四十五宋李昉等編職官七李翰林白墓志一首皇甫少保鏞墓志一首張祕監仲方墓志一首白居易自撰墓志一首贈左拾遺翰林供奉李白墓志范傳正附見李白集騏驥筋力成意在萬里外厥塊一蹶斃於空谷唯餘駿骨價重千金大鵬羽翼張勢欲摩穹昊天風不來海波不起塌翼集作趐别島空留大名人亦有之即集作即故左拾遺翰林學士李公之謂矣公名白字太白其先隴西成紀人絶嗣之家難求譜諜公之孫女搜於箱篋中得公之亡子伯禽手疏十數行紙壞字缺不能詳備約而計之涼武昭王九代孫也隋末多難一房被竄于碎葉流離散落隱易名姓故自國朝已來漏集作編於屬籍神龍初潛還廣漢因僑為郡人父客以通集作逋其邑遂以客為名髙卧雲林不求祿仕公之生也先府君指天枝以復姓先夫人夢長庚而告祥名之與字咸取所集作所取象受五行之剛氣叔夜文集作心髙挺三蜀之雄才相如思集作文逸瓌竒宏廓拔俗無類少以俠自任而門多長者車常欲一鳴驚人一飛沖天彼漸陸遷喬皆不能也由是慷慨自負不拘常調器度𢎞大聲聞于天天寶初召見於金鑾殿玄宗明皇帝降輦步迎如見園綺論當世務草和集作答畨書辨如懸河筆不停綴玄宗嘉之以寶裝集作牀方丈賜食於前御手和羔德音相褒將二字集作褒美褐衣恩遇前無比儔遂直翰士專掌密命將處司言之任多陪侍從之逰他日泛白蓮池公不在宴皇歡既洽召公作序時公已被酒於翰苑中仍命髙大集作大字將軍扶以登舟優寵如是布衣之遇前所未聞公自量踈逺之懷難久於密侍候間上疏請還舊山玄宗甚愛其才或慮乘醉出入省中不能不言溫室樹恐掇後患惜而遂之公以為千鈞之弩一發不中則當摧撞折牙而永息機用安能效碌碌者蘇而復上哉脫屣軒冕釋羈韁鎖因肆情性大放於宇宙間飲酒非嗜其酣樂取其昏以自當作詩非事於文律取其吟以自適好神仙非慕其輕舉將以不可求之事求之具意欲耗壯心遣餘年也在長安時祕書監賀知章號公為謫仙人吟公烏栖曲云此詩可以哭鬼神矣時人又以公及賀監汝陽王崔宗之裴周南等八人為酒中八仙朝列賦謫仙歌百餘首俄屬戎馬生郊逺身海上往來於斗牛之分優遊沒身偶乘扁舟一日千里或遇勝境終年不移則集作時長江逺山一泉一石無往而不自得也晚嵗度牛渚磯至姑熟悅謝家青山有終焉之志盤桓利居竟卒於此其生也聖朝之髙士其死集作往也當塗之旅人代宗之初搜羅俊逸拜公左拾遺制下於彤庭禮降於玄壤生不及祿殁而稱官嗚呼命歟傳正共集無共字生唐代甲子相懸常於先大夫文集集作字中見與公有潯陽夜宴詩則知與公有通家之舊早於人間得公之集無之字遺篇逸句吟詠在口無何叨蒙恩奬亷問宣池按圖得公之墳墓在當塗屬集作屬字邑因令禁樵採備灑掃訪公之子孫集作故將申慰薦凡三四年乃獲孫女二人一則集作為陳雲之室一乃劉勸之妻皆編户毗集無毗字氓也因召至郡庭相見與語衣服村落形容朴野而進退間雅應對詳諦且祖德如在儒風宛然問其所以則曰父伯禽以貞元八年不祿而卒有兄一人出逰一十二年不知所在父存無官父殁為民有兄不相保為天下之窮人無桑以自蠶非不知機杼無田以自力非不知稼穡况婦人不任布裙糲食何所仰給儷於農夫救死而已久不敢聞于集作於縣官懼辱祖考鄉閭逼迫忍耻來告言訖淚下余亦對之泫然因云先祖志在青山遺言宅兆頃屬多故殯於龍山東麓地近而非本意墳髙三尺日已集作益摧圯力所不及知如之何聞其所言集作聞之憫然將遂其請因當塗令諸葛縱會計在州得諭其事縱亦好事者學為歌詩樂聞其請集作語便道還縣躬相地形卜新宅于青山之陽以元和十二年正月二十三日遷神於集作于此遂公之志也西去舊墳六十集作此字里南抵驛路三百步北倚謝公山即青山也天寶十二載勑改名焉因告二女將改適於士族皆曰夫妻之道命也亦分也在孤窮既失身於下俚仗威力乃求援於他門生縱偷安死何靣目見大父於地下欲求集作敗其類所不忍聞余亦嘉之不奪其志復井稅免徭役而已今士大夫之葬必志于集作於墓有勳庸道德之家兼豎集作樹碑于道余才術貧虛不能兩致今作新墓名輒刋二石一置于泉扄一表於道路集作通路亦峴首漢川之義也庶芳聲之不泯集有焉字文集二十卷或得之於時之文士或得之於公之宗族編緝斷簡以行于集作於代云其銘曰嵩嶽降神是生輔臣蓬萊譴真斯為逸人晉有七賢唐稱八仙應彼星象惟公一焉晦以麴蘖暢于集作於文篇萬象奔走乎筆端萬慮泯滅乎樽前卧必酒甕行惟酒船吟風詠月席地幕天但貴其適所以適集作但貴乎適其所適不知夫所以然而然至今尚疑醉在千日寧審乎夀終百年謝家山兮公之墓異代詩流同此路舊墳卑痺風雨侵新宅爽塏松柏林故鄉萬里且無嗣二女從民永於此猗歟琢石為二碑一臨幽壤集作一藏幽隧一臨岐岸深谷髙變化時一存一毁名不虧銀青光祿大夫太子少保安定皇甫公墓志白居易公姓皇甫諱鏞字和卿始封祖微子也周克殷封于宋九世至戴公戴公之子曰皇父因字命族為皇父氏至于集無于字秦徙茂陵改父為甫及漢遷安定朝那其後為朝那人五代祖珍義資建二州刺史曽祖文房髙陵令祖鄰幾贈汝州刺史考愈纍贈尚書左僕射太子太保妣洛陽賈氏贈姑臧郡太夫人公由進士出身補夏陽主簿試左武衛兵曹充宣歙觀察推官轉大理評事詔徴授監察御史改祕書郎殿中侍御史內供奉始賜朱紱銀印充鳯翔節度判官營田副使旋乂徴還直拜殿中改比部員外郎河南令都官郎中河南少尹厯太子左右庶子並分司東都俄又徴拜國子祭酒未幾謝疾改太子賔客轉祕書監分司又就拜檢校左散騎常侍兼太子賔客轉祕書監分司始加命服正三品又遷太子少保分司封安定縣開國男食邑三百户始立家廟享三世公先娶博陵崔氏後娶范陽盧氏二夫人皆有淑德先公而殁有二子曰璥曰珧一女適太原王諲以開成元年七月十日寢疾薨於東都宣教里第享年七十七皇帝廢朝一日是嵗十月三日用大葬之禮歸全于集作於河隂縣廣武原從太保府君先塋以盧夫人合祔焉公自將仕郎纍階至銀青光祿大夫自武騎尉纍勳至上柱國自布衣而佩服金紫自旅食而廟享祖考封爵被乎身褒贈及乎先官品蔭乎後大其門肥其家儒者之榮無闕焉皆求已稽古之力自致耳公為人器宇甚𢎞衣冠甚偉寡言正色人望而敬之至於宴逰觴詠之間則其貌溫然如春其心油然如雲也初元和中公始因郎官分司東洛由是得伊嵩趣愜吏隱心故前後厯官八九凡二十有五年優遊洛中無哂集作灑笑意忘懷集作來窮逹與道始終淡然不動其心以至于考終命聞者景集無景字慕之謂為逹人當憲宗朝公之仲弟居相位操利權也從而附離者有之公獨超然雖貴介之勢不能及及仲失寵得罪也而緣坐者有之公獨皎然雖骨肉之親不能纍識者心伏號為偉人公好學善屬文尤工五言七言詩有集十八卷又著性針集作言十四集作四十篇居易辱與公逰逮二紀矣自左右庶子厯賔客訖于少保傅皆同官東朝分務東周在寮友間聞知最熟故得以實録志之而銘曰賢哉少保令問令儀金璧其操鸞鳯其姿德如斯夀如斯位如斯嗚呼人爵天爵實兼有之廣武之原大河之湄龜告筮從吉土良時封于茲銘集作樹于茲嗚呼少保之墓百代可知銀青光祿大夫祕書監曲江縣開國伯贈禮部尚書范陽張公墓志前人公諱仲方字靖之其先范陽人也集無也字晉司空茂先之後永嘉南遷始徙居于韶之曲江縣後嗣因家焉唐朝贈太常卿諱𢎞愈公之曽祖也嶺南節度使廣州刺史殿中監諱九臯公之王父也贈尚書右僕射諱杭集作抗公之皇考也贈頴州郡太夫人陳氏公之皇妣也都昌令仲端以下四人公之兄也監察御史仲孚以下二人公之弟也博陵郡夫人崔氏公之夫人也右清道率府胃曹景宣進士茂玄明經智周公之子也監察御史裏行揚澥校書郎陸賔虞公之壻也公即僕射府君第五子貞元中進士舉及第博學選登科初補集賢殿校書郎丁內憂喪除復補正字選授咸陽縣尉鄜坊節度使辟為判官奏授監察御史裏行俄而徴拜厯殿中轉侍御史倉部員外郎金州刺史度支郎中駮宰相諡議出為遂州司馬移復州司士集作馬俄拜集作遷刺史遷集作改曹州刺史河南少尹鄭州刺史入為諫議大夫福建觀察使兼御史中丞徴還為太子賔客再為左散騎常侍京兆尹華州刺史兼御史大夫祕書監勳賜集作至上柱國階兼銀青光祿大夫封至曲江縣開國伯食邑七百户開成二年四月某日薨于上郡集作都新里昌第詔贈禮部尚書以某年八月某日歸葬于河南府某縣某鄉某原祔僕射府君之封域焉公幼好學長善屬文俯取科第如拾地芥著文集三十卷藏於家繤制詔一百卷行於代尤工五言章句詩家流稱之嘗撰先僕射府君神道碑及丞相文獻始興公廟碑由文得理秉筆者許之文獻始興公九齡即公之伯祖開元中以儒學詩賦獨步一時及輔弼明皇帝號為賢相餘慶濟美冝在於公公濟其業襲其文而不嗣其位惜哉矧公為人溫良沖淡恬然有君子德立朝直清貞諒肅然有正人風在官寬重易簡綽然有長吏體為子弟孝敬為伯父慈和與朋友信寵辱不驚其心喜溫不形於色入仕三集作四十載厯官二十五享年七十二才如是祿如是夀如是冝哉居易與公少同官老同遊交心集作結交慕德久而彌篤故景宣等以論撰先德見託為文式序且銘勒于墓石銘曰有集作在唐張氏世為儒宗文獻既沒鬱生我公我公渢渢學奧詞雄緣情體物有文獻風慶襲于家道積厥躬駿足逸翮天驥冥鴻始自筮仕訖集作迄于逹官六刺藩部再珥貂蟬大諫選重尹京才難賔于望苑寵在蓬山凡所踐厯皆有可觀終然允臧已矣歸全嗚呼洛郊北阡邙阜西原佳城一閉陵谷推遷所不泯者令名藹然自撰墓志前人先生姓白名居易字樂天其先太原人也秦將武安君起之後髙祖諱志善尚衣奉御曽祖諱溫檢校都官郎中王父諱鍠侍御史河南府鞏縣令先大夫諱季庾集作庚朝奉大夫襄州别駕大理少卿纍贈刑部尚書右僕射先太夫人陳氏贈頴川郡太夫人妻楊氏𢎞農郡君兄幼文皇浮梁縣主簿弟行簡皇尚書膳部郎中一女適監察御史談𢎞謨三姪長曰味道盧州巢縣丞次曰景回淄州司兵參軍次曰晦之舉進士樂天無子以姪孫阿新為之後樂天幼好學長工文纍登進士拔萃制䇿三科始自校書郎終以少傅致仕前後厯官二十任食祿四十年外以儒行修其身中以釋教治其心旁以山水風月歌詩琴酒樂其志前後著文集七十卷合三千七百三十首傳於家又著事類集要三十部合一千一百三十門時人目為白氏六帖行於世凡平生所慕所感所長所得所經所遇集作逼所通一事一物已上布在文集中間卷盡可知也故不備書大厯六年正月二十日生於鄭州新鄭縣東郭宅以會昌六年月日終於東都履道里私第春秋七十有五以某年月日葬于華州下邽縣臨津里北原祔侍御史僕射二先塋也啓手足之夕語其妻與姪曰吾之幸也夀過一作登七十官至二品有名於世無益於人褒優之禮冝自貶損我殁當斂以衣一襲送以車一乘無用鹵簿葬無以血食祭無請太常諡無建神道碑但於墓前立一石刻吾醉吟先生傳一本可矣語訖命筆自銘其墓云銘曰樂天樂天生天地中七十有五年其生也浮雲然其死也委蛻然來何因去何緣吾性不動吾形屢遷已焉已焉吾安往而不可又何足厭戀乎其間文苑英華卷九百四十五
