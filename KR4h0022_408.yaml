body:
  text: 文苑英華卷四百八宋李昉等編諸使一觀察使授路嗣恭洪州觀察使制常衮勑朕以守將之重兼文武之寄休否得失實繫於兹至于海隅爰及鰥寡每以康濟為念終夜永懷所以方靣久缺難於授任今大張藩政高選公卿銀青光祿大夫檢校户部尚書知省事上柱國陳留縣開國公路嗣恭以仁義成準以清公致用練法修制可以宣明紀綱好謀全節可以協定危難素精吏事連辟宰府一有寧字歷位忠恪始終秉彛城彼朔方靖我疆土早二六官之秩再分五曹之座議刑必中敷教亦寬休望華資積于久次大江之外封略曠逺用達憂勤之旨屬於親重之臣授以藩符建兹戎斾仍委廉課俾揚風聲夫潔其流者清其源正其末者端其本奉爾所守敬無廢命可使持節都督洪州刺史充江南西道都團練觀察處置等使檢校户部尚書及散官勳封如故授崔灌舊唐書作瓘湖南觀察使制勑刺史案部外廉數州遵俗宣風所繫尤重今海內甫定方澄化源綱理羣縣大明黜陟安人之寄歷選惟難必二千石職連一作連職者處之朗然明觀以訓天下銀青光祿大夫前澧州刺史兼侍御史上柱國義豐縣開國男崔灌嘗守江潭有清靜簡易之化勤儉約已精誠感物小大之政必窮本於人情參以事典出言而信出令而從獄訟衰止流庸還定息貪官之豪奪懲大姓之雄強歲無札瘥俗致康乂及澧陽移鎮一其教理故郡黎庶靡然隨之望風欣然如得父母可謂明恕慈惠吏人之師也况本之以經術濟之以忠敬更於臺閣練達朝章而識略沉達可以專方靣之任自湘之東制以連率委之監郡兼亦訓戎彼都之人夙所愛慕參領中憲以綏一方可使持節都督潭州諸軍事潭州刺史兼御史中丞充湖南都團練守捉及觀察處置等使仍兼充諸道營田副使知本道營田事散官勳封如故授李栖筠浙西觀察使制勑王制千里之外設方伯選諸侯賢者而命之俾其遵俗宣風大明黜陟今以刺史條察列郡西漢成式厥惟舊哉銀青光祿大夫常州刺史充本州團練守捉使上柱國贊皇縣開國子李栖筠資朴厚之性秉禮義之宗其學博而精其文簡而當明以辨政居官可紀秩更三署名重一時抗黃扉之論駮舉冬卿之典制自守毗陵尤精藩職初剪橫江之盜猶多擊柝之虞言撫傷殘克施惠訓清靜少欲以臨其人禮讓之風行於東國考其績用實最方州震澤之北三吳之會有鹽井銅山有豪門大賈利之所聚姦之所生資於大才濟我難理加以中憲雄兹按部慎乃教令薄其征徭無倚法作威無割下附上勉副朝寄以綏一方可使持節蘇州諸軍事蘇州刺史御史中丞充浙西西道觀察使處置都團練守捉及本道營田等使散官勳封如故加江西魏少逰刑部尚書制勑古者外薄四海咸逮五長所以考察風俗懋宣理化茍或副憂人之旨有稱職之名彰善陟明存乎著令金紫光祿大夫使持節都督洪州諸軍事行洪州刺史兼御史大夫充江南西道都團練守捉觀察處置等使上柱國巨鹿郡開國公魏少逰端慤精敏沉和貞簡秉心以直臨事不回五踐天臺必辨疑而取正三尹京邑不吐剛而茹柔守其至公休有令問自十連分寄九江作牧式是方隅不渝操履停車決訟閉閣生風明示升黜蠲除疾苦清靜而百城自一作向化講藝而三軍知禮定其賦稅之差勤於轉輸之役事必條理人皆便安亦既政成不資於周月遷其秩序豈待於滿歲宜分會府之坐載美方州之績可檢校刑部尚書洪州刺史御史大夫餘如故加朱希彩幽州管內觀察使制勑古以五長八使考察風俗章善疸惡時而揚之則監部廉部其理也今之元戎有聲績優異者錫命兼領亦進律之制焉而又實其封邑蓋申之以明勸開府儀同三司試太常卿兼幽州大都督府長史御史大夫持節充幽州節度兼營田等副大使知節度事經略軍使兼盧龍節度并管內支度營田及押奚契丹兩蕃等使上柱國朱希彩貞方以合義純厚以納忠智謀濬發才識精辨作我垣翰保于幽燕講求刑禮以參軍政敦洽敬讓以合人心正其綱條郡務大舉東罷渡遼之警比清戴斗之氣疆吏緩帶戎車稅鞅典從事簡方靣以寧厥賦惟錯實於天府選勞則大銘在旗常勤職首公有光相寄委以連率加其真食懋乃勳節服兹寵章可兼充管內觀察處置使仍賜實封一百户餘並如故授辛京杲湖南觀察使制勑觀察列郡之風督諸軍之事兼兹二柄守分一方其在素名俾之專任開府儀同三司試太常卿兼御史中丞同朔方節度副使上柱國晉昌郡王辛京杲居敬可久盡忠必誠精辨郡務通於典試謙恭下士齊其勞苦先帝簡拔五原從征嘗參領護早著勳節藩麾佐朕夷險一心關洛事平莫非謀勝纍書忠於甲令終不言於賞勞尋掌南北之軍復二河汾之鎮內外勤績厥惟茂哉憂國奉公每形于色牧人馭衆素有其才長沙故郡湘中千里往建南轅之斾仍領司空之秩訓戎遵俗寵以居之可使持節都督潭州諸軍事行潭州刺史兼御史大夫充湖南都團練守捉及觀察處置使仍賜散官勳封如故授衛中行陜州觀察使制元稹集無勑邵伯聽事於棠隂之下而人勿翦其樹我知之非忠信仁愛以得之耶今自關東由洛而右數百里之地盡置為軺車臣所理蓋有以表率方夏張皇京律聿求其良用副憂寄朝請大夫守華州刺史兼御史中丞衛中行始以詞賦深美軒然有名甲乙符升遂拾青紫逮其書命文鋒益銛能搴菁華以集麗則出補近郡號為廉能勤而不煩簡而不茍郊迓館穀賔至如歸長劭農人咸用胥恱移領巨鎮疇將爾先况封壤因連習俗參合用之政又關陜之氓吾固有虞於爾矣至於觀聽他邑儀刑下僚旁臨傅説之巖特假趙堯之印遺風未泯官業具存茍能行之無患不至可守陜州大都督府長史兼御史大夫充陜虢等州都防禦觀察處置等使授嚴謨桂管觀察使制白居易勑漢置部刺史掌奉詔條糾吏理蓋今觀察使職耳桂林秦郡也東控海嶺右扼蠻荒自隋迄今不改戎府地逺則權重俗殊則理難馴而化之非才不可朝議大夫前守祕書監驍騎尉賜紫金魚袋嚴謨嘗守商洛刺黔巫州部縣道謐然安理是能用寬猛相濟之政撫夷夏雜居之人故也迹其往效式在集作是南邦况爾操行端和文學精茂賔寺書府善于其官勉副前言佇申後命可使持節都督桂州諸軍事守桂州刺史兼御史中丞桂州本管都防禦觀察使處置使散官勳賜如故授丁公著可檢校左散騎常侍守越州刺史充浙東觀察使制勑古者通守之土集作選守守土刺史按部從宜務簡今則合之故任日崇而選日重非廉平簡直兼愷悌之德者曾不足中吾選焉尚書工部侍郎集賢殿學士丁公著常集作嘗以學行以集無以字禮法誨豫一人報德圖勞連加寵擢起曹書殿兼而委之二職增修三命益敬朕以浙河之左抵于海隅全越奧區延袤千里宜得良帥俾之澄清往分吾憂無出爾右假左貂而帖中憲操郡印而握兵符勉哉是行佇聞報政可依前件授盧士玫瀛州觀察使制勑夫疆理天下懷集作制四方乘時省置何常之有故方隅未寧務先經略則專委方伯以揔統之及兵革甫定思𢎞風化則並命連帥以分理之朕常以幽薊一方環封千里延袤廣莫專制實難屬元戎改轅新帥進律因而制置以叶便宜蓋王者施張變通之要也京兆尹盧士玫為人端和蒞政寬簡自尹京輦人甚便安今司徒總籍甚爾名叶從人望河間列郡乞委士玫因而可之必易為理况新造之府經始之政勞徠安輯是爾所能俾升珥貂集作俾珥左貂兼執中憲寵任不細勉哉是行可使持節瀛莫等州管內觀察處置等使檢校左散騎常侍兼御史申丞餘如故授范傳正宣歙觀察使制勑古之諸侯三載考績選其賢者命為長率所以觀集作勸功行而興理化也蘇州刺史范傳正文學政事二美具焉選自郎署出分符竹江南列郡連領者三所至之部悉心為理明諭朝旨恭守詔條謹身省事以臨其下政簡而肅意誠而明吏不能欺人是以息而去思之歎來暮之謡復有關於人聽雖古循吏蔑以加之朕以陵陽奧壤土廣人庶其地險要集作有險所寄非輕迹其前效可當此選况黟歙之遺愛尚在吳興之新政方播升車便道足慰人心固當望風自安計日而理倚注於是爾往欽哉可集作倚注於爾往宜欽哉可授裴堪江西觀察使制勑江西七郡列邑數十土沃人庶今之奧區財賦孔殷國用所繫兹為重寄宜付長才同州刺史裴堪素蓄器幹久經任遇日者資其忠諒入為諫議大夫藉其良能出為左馮翊曽未周歲政立績成區區一郡未盡其用鍾陵要鎮可以委之夫簡其條章平其賦役徇公率正以臨其人而人不安未之有也袛服厥命往修乃官仍兼中憲以示優寵可江西觀察使兼御史中丞授薛伾鄜坊觀察使制勑鄜畤延安抵于中部羌夷種落散在其間戎夏雜居易擾難理宜選寬明之使通知邉事者委以節制集作符節而糾綏之右金吾將軍薛伾服勤戎職練達吏道出入中外綿歷歲年能一乃心以宣其力自加寵遇再執金吾徼巡有嚴夙夜匪懈在公若是何用不臧况為人沉靜外和內肅守封案俗是其所能集本作內肅外和按俗守封是其所善宜輟務於誰何俾宣風於廉察庶乎勞徠諸部綱紀列城奉詔條以安人參戎索以訓旅欽承厥命往服乃官仍踐冬卿式光重寄可檢校工部尚書充鄜坊等州觀察使授李納浙東觀察使兼御史大夫制杜牧勑仲尼以舉賢才則理大禹以能官人則安况西界浙河東淹左海機杼耕稼提封七州其間繭稅魚鹽衣食半天下不有可仗豈宜委之正議大夫使持節華州諸軍事守華州刺史兼御史中丞充潼關防禦鎮國軍等使上柱國隴西縣開國男食邑三百户賜紫金魚袋李納溫良恭儉齊莊中正實以君子之德華以才士集作人之詞踐集作揚歷清顯昭彰令聞輟自掌言式是近輔子貢為清廟之器仲弓有南面之才智莫能欺剛亦不吐表率教化皆有法度今者兵為農器革作軒車言於共理在擇循吏是故用已效之績託分寄之任擁蒨斾而服玄玉化千里而有三軍儒者之榮莫過於此孔子曰仁者愛人智者知人愛人則疲羸可蘇知人則才幹不棄土宇既廣殺生在我達此二者可以報政榮加副相用壓大邦爾其勉之無忝所舉可使持節都督越州諸軍事守越州刺史兼御史大夫充浙江東道都團練觀察處置等使散官勳封賜如故授紇干泉江西觀察使制崔嘏勑鍾陵奧區楚澤全壤控帶七郡襟連五湖人推征賦之饒俗擅魚鹽之利靜則易理動則難安思得良能以臻富庶選求之下是舉僉諧中書舍人紇干泉氣惟雅茂才實變通黃鍾􅉼待扣之音青萍蓄善割之用早以俊造播其馨香霜臺竦介立之標蘭省蔚和光之操洎司綸綍益茂聲猷粉澤惟工克贊鳯池之美溫華自潤皆推鴻筆之資藴商也之文可以華國布求也之政可以觀風是用輟於演綸付之廉問必能宣我大化蘇其逺人佇聞來暮之謡必有借晉之思爾其簡以臨衆清而自持惠養益厚於疲羸操斷無遺於桀驁一方之任不愧於前賢五字之精永光於禁掖仍加中憲式峻外臺可授鄭亞桂府觀察使制勑地連五嶺川束三江直千里之奧區雜夷風之阜壤靜則可理動而難安思得長才以綏裔俗求於僉論多曰汝諧給事中鄭亞識洞古今情惟端願富三冬之精學控六變之雄文早升甲乙之科雅有詞華之譽周旋粉署堂堂表題柱之榮糾正霜臺肅肅有埋輪之志人推長者時許多能洎入贊黃樞超居青瑣彌縫闕漏衮職以之無遺參酌憲章國典由其益振朕方𢎞理道志切惠人精求亷問之才用廣移風之化爾宜將我誠意布其惠和撫俗必務於潔亷奉已宜思於簡儉無以地逺而忽其簿書無以官尊而怠於統馭將期富庶必在嚴明承我寵榮勉思報效文苑英華卷四百八
