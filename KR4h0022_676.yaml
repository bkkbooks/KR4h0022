body:
  text: 文苑英華巻六百七十七宋李昉等編贈答上梁貞陽侯與王太尉僧辨書一首為王僧辨答貞陽侯書一首梁貞陽侯答王太尉書一首與王僧辨書一首梁貞陽侯重與王太尉書一首王僧辨答貞陽侯書一首梁貞陽侯與陳司空書一首代陳司空答書一首梁貞陽侯重與裴之横書一首裴之横答書一首與徐陵薦方圓書一首答周處士書一首答諸求官人書一首梁貞陽侯與王太尉僧辨書徐陵淵明頓首頓首昔自天狼炳曜非無戰陣之風參虎揚芒便有干戈之務至於夏鍾夷羿周厄犬戎漢委珠囊秦亡寳篋彰於史籍可得而聞未有國家殱危遂若當今者也我大梁膺龍圖而受命御鳳邸以承天軒頊比於諸王湯武方於兒戱三光有乂四海無波靈貺咸臻表衷褆福非日非月蒼生仰其照臨如雲如雨天下䝉其恩䕃而屯亨有數剝極為災梟獍豺狼肆逞兇逆後主誕資上聖光啓中興大剪仇讎方平宗社雖復瀟湘舉斧庸蜀彎弓凡厥兇徒誰不殱撲豈圖天未悔禍䘮亂荐臻𦍑虜無厭乗此多難䖍劉我南國蕩覆我西京奉問驚號肝膽崩潰雖復金行板蕩火政淪亡綠林青犢之羣黑山白馬之卒八王故事曾未混淆九州春秋誰云禍亂昔隆周從播皆憑晉鄭之功强漢阽危終假虚牟之力今者武皇之子無復一人藐是孤孫還同三叛等子頽而為暴同劉芳而入關乞命諸戎勢何支乆孤宗室之長爰自布衣皇運之初彌承天徳何則據鞍輟哭雖紹覇圖獨居掩涕終討家怨孤二三昆季方可一作爾戴天被此恩慈如何酬答所以徐彭之役不希輕軀哀荷之誠乆聞朝聽况復邦家不造至此横流宗社無依何所逃責因以提戈負劒卧泣行號言念荆巫志雪讎恥大齊觀書有洛輯瑞榮河功格蒼旻徳滿天地慈孝之道通於百靈仁信之風覃於萬國是以日月所照舟車所通候海水以來賔瞻蒼雲以奉貢昔自軒農炎昊曾無宣國之規虞夏商周非有伐戎之畧豈知華夷仰徳逺近同心榖價無堯湯之憂糧儲同水火之賤精兵利器勢勇雷霆天馬龍媒量比山谷斯固開闢已來未之有也至於親鄰之道夙契逾深無改曩懐尊感彌篤以為興亡繼絶事昞前經推擇庸虚命守宗禩疑方欲仰憑神武清我寇讎㫖喻難違諸懐更恧明公誕膺時運光贊本朝勒瑞姜璜書名何鼎故以通期管樂宜契風雲戮不世之渠兇殱滔天之巨寇重以三湘放命七國連從征旅東西必翦妖逆雖復棧道木閣田單之奉舊齊綰璽將兵周勃之扶隆漢中宗佐命俱畫丹青光武功臣皆懸星象非貔非虎之封同心同徳之勞校彼功庸曾何髣髴但與在與亡期於體國䘮君有君寧容無主夙承所立猶則孱䝉天歩方難寧可𢎞濟自淹留大國志荷恩私朝夕宫闈預奉顔色黄河白日亟亶誠言分災䘏患事非虚旨但善相小國終資大賢定我邦家繄公是賴淮流不竭豈獨琅琊望能喻此衷懐思之無忽近陸君士有啓陳其禍亂朝㫖即命河東王岳等勒率熊羆便相抵赴道阻且長雖無之及所聞西浮夏首便當險隘之衝南捍巴陵方拒窺窬之冦上黨王皇齊寵弟是號宗英親御戎軒逺于將送裴侍中英起淮南貴族兼事戎行躍冀馬者千羣披燕犀者萬隊來自河陽曾不旬日持節徐武潼三州諸軍事散騎常侍明逺將軍東徐州刺史始興縣開國侯湛海珍等並前朝舊將夙著勲庸推轂海邉屬是䘮亂雖復拔身有道志雪朝怨咸預戎行共指鄉國江淮舊𨽻悉已招擕方禀英謨共翦讎難去月將晦便届夀春已具舟師將臨江浦使人入境行陳所懐揆日覘光遲枉還牘當使宗祊有主余同小白之勲家國無虞公保阿衡之貴何其美也豈不休哉言念此私但以號咽蕭淵明頓首此篇英華元編在六百八十二巻邉防門今移于此庶幾贈荅相應為王太尉僧辨荅貞陽侯書孤子僧辨頓首頓首席威卿反命具有奉答馬嵩仁至又奉去月二十八日誨增用傾悚秦為不道西都失守率土臣妾莫不驚惶䘮君有君實惟典禮繼世嗣厯明於通誥所以百辟羣司四方岳牧共立大計僉議所歸故紹晉安殿下用傳寳祚樹立之宜無由逺謀鄰國足下宗枝蕃戚徳譽早隆既身限北庭事隔匡贊今者借助齊主揚斾南轅但嗣守洪基即既其主若阿衡帝載誠所推揖𢎞佐中興誰曰不可所望齊朝永存信誓謹當命北舟人奉迎麾駕無容進枉齊兵逺於江表仰冀弼諧時政用極奮庸但江東之地數千餘里民附國險水陸衿帯若舊京從命楊徐承旨又恐西南之地二十餘州不即威懐容為齊國之患而糧裹之宜更遲動靜祗展之日冀在一二謹因馬嵩仁并遣真威將軍通直郎散騎常侍馬瑱口宣諮述孤子王僧辨頓首頓首按陳書徐陵傳齊送貞陽侯蕭淵明為梁嗣遣陵隨還僧辨不納淵明徃復致書皆陵詞今僧辨答書恐非陵作後同梁貞陽侯答王太尉書姜常侍暠至復枉去月三十日告具公所懐良以慨息孤雖庸薄不及通賢猶曰生民寧無心識自皇家禍亂亟積寒暄九州萬國之人蟠木流沙之地莫不行號卧泣想望休平何况於孤預在宗室家荷報雪之恩身䝉鞠養之愛者先皇之慈也烝嘗不絶於私廟子弟得嗣於南藩者後主之惠也朱方之地建業之都誰家丘陵誰家宫廟豈有為人臣子荷此恩靈親執干戈自殉家國公之忠孝信感人神公之盟誓事同懸象雖復宗盟不造骨肉為讎安可相期盡如蕭詧耶古者天子六軍是為萬乗今日凶荒致闕斯禮偏禆將校尚握精兵州郡官曹各有交吏未有居稱扆座行曰乗輿遂無五尺之童髙謝千人之長於公明允意復云何國家彫荒既乏屯衛皇齊與睦幸惠優矜何乃自起趦趄茍違鄰徳克勘禍亂欲立功名咸自軍師豈在芻𨽻湛海珍等前朝舊將差匪齊人分給羸兵即是梁甲非云背信豈曰渝盟朝野羣雄何所擕貳且公天資命世再造皇家梁代之桓文蕭宗之伊管誰其逺近不禀英謨一作謀如有姦囘正速齊斧尚何憂於共工何畏於有苗哉所覽來書既為疑難上黨王恭承朝旨不敢相同方篤鄰和不容全異如須减損更遲行人張廷尉種等所具此無多及蕭淵明頓首與王僧辨書太清六年六月五日孤子徐君君疑是古人自稱如王績書中亦作王君又一本作名當考頓首昔者雲師火帝非無戰陣一作伐之風堯誓湯征咸用干戈之道至於摇山蕩海驅電乗雷殱厥兇渠無虧皇極若夏鍾夷羿周厄犬戎漢委珠囊秦亡寳鏡然則皆聞之矣未有膺龍圖以建國御鳳邸以承家二后欽明三靈交泰而天崩地坼妖冦横行者也自古銅頭鐡額興暴皇年檮杌窮竒流災中國王彌石勒吞噬闗河綠林青犢之羣黑山白馬之衆校彼兵荒無聞前史八王故事曾未混淆九州春秋非去禍亂我皇受命中興光宅天下泰寧𤨏𤨏安敢執鞭建武栖栖何其扶轂抑又聞之陶唐既作天歸鳥啄之臣豐畢將興特挺鷹揚之佐明公量包金鉉神表玉璜儷衮欽才平階佇徳固以留連管樂惆悵風雲濡足維時投竿斯在去歲兇徒不騁言次巴丘鼓聲聞一柱之臺烽火照三休之殿公則懸麾羽扇猶對投壺戎羯咸奔鯨鯢俱翦樓船萬軸還繫昆明胡馬千羣皆輸長樂於是乎夏首西浮雲行電邁彭波東滙谷靜山空扼鵲尾而據王畿登牛頭而掃天闕漸臺偽帥仍傳首於帝京郿塢元兇咸刳腸於軍市青羌赤狄同卑豺狼胡服夷言咸為京觀公園陵盡拜忠貫長沙神主咸安勲踰髙宻重以秦宫既獲魯殿猶存闢綠草於應門開青槐於武庫長安五陵之族鄠杜六遷之民襁負而歸都㕓斯滿鬻脂藏脯遊騎繫鍾故市新城飛甍華屋東莞舊宅人識桑榆南頓荒田家分禾黍豈止鄉名榖熟邑號禾興而已哉若夫卦起龍文書因鳥跡劬勞王室大拯生民自開闢以來未之有也雖十六才子明允篤誠八百諸侯専心同徳中宗佐命俱畫丹青光武功臣皆懸星象棧道木閣田單之奉覇齊綰璽將兵周勃之扶强漢壤蟲之比黄鵠轍鮒之仰河宗未足云也孤子階一作實緣多幸叨簉皇華鄉國屯危公私燋廹邳肜肜彤異音漢書作彤之切長亂心胷徐庶之祈終無開允既而屏居空館多歴歲時疊犯幽祗躬當勦滅何圖釁咎災極蒼旻號慕煩寃肝腸一作腹屠殞酷痛奈何無狀奈何惟桑與梓翻若天涯杖柏栽松悠然長絶明明日月號叫無聞茫茫宇宙容身何所窮劇奈何自忝膺嘉聘仍屬亂離上下年尊偏嬰此酷昔人迎門請盗恒懐廢寢之憂當輓輿親猶有危途之懼况乎逆冦崩騰京師播越興居動止長隔山河朝夕饘􅓞誰經心眼程糜不繼原粟何資瞻望風雲朝夕嗚咽固乃遊魂已謝非復全生餘息空留非為全死同氷魚之不絶似蟄蟲之猶蘇良可哀也良可哀也自東都紹漢南亳興殷修好徵兵彌留星琯韓宣范武方駕連鑣蘇秦張儀朱輪華轂而孤子三危是擯四罪同科聽别馬而長號杖歸旍而永慟王稽反命既無託乗之恩椒舉相逢誰為班荆之位昔人違齊處魯時降徵求亡晉奔秦猶䝉招請問管寧於遼左追王朗於浙東並物譽時賢卿門公族懸須應務深挾情祈斯豈庸賤之儔耶非餘生之敢望也但預在輶軒誠為過誤珪璋特逹通聘河陽貂珥雍容尋盟漳水差有黄門啟封非無青紙詔書郡將州司郊迎負弩鄉亭里候飾館陳兵豈是復介而奔齊寧當竊妻而逃晉已焉哉羌一作差難得而言也漢之谷吉捐軀者幾人楚之申胥埋魂者何極孤子何所歎焉但頓伏苫廬徒延光晷夫以啁噍燕雀躑躅鳴號含識懐靈未有其痛且夫曾一作魯耕雨雪猶尚悲歌蘇使幽囚無馳疑哽噎公履忠𢎞孝冠冕縉紳化感煙雲量標海岳行糜仲月王政無塞疑分榖髙年仁風斯逺固以衣纓仰訓黎庶投懐今日憔惶彌布洪澤雖復孤骸不返方為漠一作漢北之塵營魄知歸終結江南之草孤子徐君頓首梁貞陽侯重與王太尉書淵明頓首頓首席威卿等還枉此月十四日告披覽未周一作終良深慨息昔長平建一作失策猶聞蝕昴之徵一作竒踈勒效一作徵忠時一作實致飛泉之感豈在余凉徳書不盡言遂使吾賢猶迷所執一作猶迷前報斯故銜哀掩淚仍復披陳者也孤以庸薄寧有覇圖侯服于周常懼盈滿豈望身居黄屋手御青綸揖讓而對一作叶三靈端委而朝百辟詢諸圉牧莫不皆知援誓神明固自無爽但大齊仁信之道闗於至誠睦鄰之懐由於孝徳遂䝉殊奬歸一作還嗣本朝拜首陳辭敦誘彌廣一作厲既而仇讐未殄方一作乃憑大國之威宗祏一作社阽危尤一作終仰親仁之徳僶俛恩寄號靦惟一作載深而勑諭分明信誓殊重乃云邦家有乂社稷無虞凡廣陵歴陽皆許見還白水黄河屢奉然諾至於夏藩一作番衝要控遏上流且命强兵為我此一作臨據若一作如其自有精甲能捍醜徒並用還梁皆如前旨以孤頻一作昔經忝竊屢守淮肥門生故吏遍於江右凡諸部曲並使招擕投赴戎行前後雲集霜戈雪㦸無非武庫之兵龍甲犀渠皆是雲一作靈臺之仗文物以紀之聲名以發之斯實不世之隆恩寧一作豈曰循常之恒禮明公固天所授𢎞濟本朝曲阜同功營丘等一作並烈若夫伊尹庖厨賤宰霍光階闥小臣諸葛亮無應變之才管夷吾非王者之相論其世業較彼勤一作勲勞書契已來罕有明徳且程嬰之義自古為難荀息之忠良以喜慰一作甚可嘉慰但先一作前朝秉玉鏡之符御金輪之寳菩薩之化行於十方仁夀之功一作風沾於萬國兇人侯景遂殄邦家何况於今亦有吳㑹江東如掌差匪虚言淮陽一作南在面方此非局不稼不穡多歴歲時大東小東全無機杼闗中醜虜寧非冐頓之鋒齊國强兵便一作乃是軒轅之陣西一作東南當扼喉之勢東一作西北承撫背之機首尾交一作齊侵華夷俱騁一作逞而冲人數歲復一作天子方賒徳未感於黎蒸一作人神威不加于將帥斯等一作曹怏怏非少主一有之字臣安有碌碌因人成事公之才具雖復明允一作光明勢何如於天監時何若一作如於大同棄與國之隆恩當滔天之猛冦匡救之徳翻未有從忠許之謀誰其一作云相曉卧薪待火方此弗危繫草從風儔之非切一作匹若能思其上策審此英圖一作謀見引軨獵之車還向長安之邸一則二則惟在大賢外相内相終當相屈正當擕諸舊𨽻率一作從我賔逰朝服簪一作簪夕纓直拜園寢梁人望國俱登赤馬之舟一作山齊師臨江仍轉蒼鷹之斾分袖南浦揚鞭北風民不疲勞軍無怨讟如其執事尚秉前言將恐戎麾便濟江表何則西浮夏首一作口已據咽喉東進彭一作匯滄波次指一作披其心腹廣陵京口烽煙相望魯柝聞邾方之一作兹尚逺胡桑對薊比一作匹此為遥水陸争一作俱前龍虎交至則揚都蕩一作薄定功自齊師江左臣民非闗梁國一作祚豈不追一作退慙後主崇寄之恩還負齊朝親鄰之意東門黄犬固以長悲南陽一作河南白衣何可復得立兹幼弱非曰大勲一作天助滅我宗祊一作祧何所逃舋一作責今復遣前吉州刺史馬嵩仁至彼十字一作使指更具徃懐想不逺而復無貽祗一作禍悔也若英謨有在方興祀一作嗣夏之功明監如違便等過殷之歎存亡社稷一在於公一作斯臨紙崩號不復多及蕭淵明頓首頓首此篇六百八十二巻重出今削去注異同為一作王太尉僧辨荅貞陽侯書僧辨頓首頓首白席威卿至奉今月五日誨披函伸紙號恥交哀天未悔禍地維重絶九縣沸騰四海悲憤嗣主欽明濬哲齊聖廣淵體自宸極受命文祖主梁祀者非此而誰且年倍漢昭弗明上官之詐徳踰姬誦彌昭周旦之誠今海内衣冠中朝卿士或南陽舊𨽻官成天監之初代邸故臣榮光承聖之始莫不人竭其力争求効命輸心嗣主以報先帝之恩今荆陜淪覆正是江北數縣即東南藩翰萬里而遥主甲治兵艫舳相接長波天限方漢城池修徳綏民中興可待孤子本以庸懦加復窮喘且平生素蓄志不在位世䝉朝寵身實許國武皇擢之千里先主申其三顧因此踰濫遂居端右屬天歩艱難寄深憂積方欲詢于髦傑採之輿皁同康時務共贊皇猷一彼車書刷兹讐恥然後守其侯服歸老赤松至如今日使須白事披奉來誨承彼送還今琁枝令戚播越秦虜明公儻能入朝同奬王室伊吕之任僉曰仰歸寧不副兹仄席濟扶匡救若斯言不渝更聽後㫖便遣鷁舟𢎞舸奉迎麾斾但閱來朝意在主盟今江東所奉彼屬披圖未䝉朝意一作音鄭拒子忽左史是之漢背劉襄班書稱允况屬疎於踖彌不敢聞命謀期通識賜亮此誠孤子王僧辨頓首頓首梁貞陽侯與陳司空書淵明頓首頓首軒轅既作遇蚩尤之兵顓頊為君阻共工之亂雖復摇山蕩谷驅電乗雷殱厥兇渠曾靡遺孽未有時當至治世在欽明元惡滔天遂䧟邦家者也我大梁開金繩之寳牒紐玉鏡之珍符功烈與造化相侔徳施與風雲俱逺戴日戴斗何向不賔太平之基無思無届逆賊侯景殱亂本朝釁重聰彌凶逾羿浞後主天經地緯義冠人靈驅馭熊羆遂翦勍盗少康祀夏何可對揚太戊興殷彌無等級不圖天未悔禍䘮亂荐臻羌賊憑陵侵蕩荆漢乗輿凌辱既䧟兇徒黎獻崩騰莫不淪沒故以哀窮兆庶痛極蒼旻者也夫諸侯釋位寧非亂禍之朝宗子維城本濟殷憂之日武皇遺胄皆䧟虜庭乞命偷生何能支乆孤宗室之長爰自布衣辛癸之朝容身靡託追惟先業大庇生民既雪伯升之怨仍紹桓王之霸孤二三昆季情禮獲申等預蕃枝偏承皇徳近歲彭都之役得備戎昭一作行鞍甲之勞庶詶天寵况復邦家不造至此横流凶狡猶存何所逃責固以提戈負劒卧泣行號言念荆巫志雪讎恥大齊徳並天地明符日月隆禮詔俗張樂被民義感華夷仁侔造化玉羊銀甕嘉瑞必彰澤馬山車禎符摠集若夫中原猛士本自無窮沙塞精兵斯何有一作有何量是以家國之富文景所未儔兵馬之强秦漢所未敵但親鄰之道既篤夙私明發之懐彌敦先好以為興亡繼絶聖典通規爰命無庸嗣守社稷一作宗社既方憑大國庶討仇讎恩喻難違諸懷慙哽公體兹懋徳毗奉中興歸自畨禺志在討亂至於雲行電邁谷静山空扼鵲尾而定王畿登牛頭而掃天闕漸臺偽帥將傳首於帝京郿塢元兇皆横屍於軍市髙庸茂烈振古希儔承此欣然深所嘉歎今者殷憂未已禍難相尋宗社無依奥主宜立夙承所眷尚在冲年王室猶難何以康濟董侯幼弱終覆漢朝馬業童䝉仍傾晉室所謂前事之不忘後事之龜兆也孤過荷恩靈預奉帷幄黄河白日亟降誠言分災䘏患事非虚㫖但當小國之禮無失敬恭闔境人民俱勞寤寐方窮人爵之重以報非常之功惠覽今書希能留意也上黨王文髙劉徳武冠曹彰爰降宗英逺于將送裴侍中英起贊奉師徳俱事戎間月壘連營雲旗蔽野同集江淮翼我歸斾湛海殄等並前朝舊將夙著勲庸江左氛妖投身齊國今者皆䝉恩奬並在戎行歸附明公共翦讎難去月將晦便届夀春已具舟艫將臨巢浦若公為内主方同國子之勲余以定家得免臧孫之歎豈不功名富貴共保無疆前望鄉闗唯增號哭蕭淵明頓首頓首代陳司空荅書某頓首頓首使人孔文端至奉此月四日誨兼翰累牘俯加循覽以悲以慰先皇聖徳在躬體道康哲允恭克讓就日望雲𤣥雀銜書皇天眷命光宅區宇司牧黎元澤與風行恩隨雨散朔南暨教要荒貢篚而運鍾百六時屬陵一作屯夷賊臣侯景内奰中國掘剪公室鞭撻寓縣三光掩曜四海分崩嗣后大孝發衷一作哀志清國釁載齊車以誓衆墨衰裳而鞠旅遥授兵略沿流電邁不崇朝而戮封豕纔信宿而翦奔鯨雖天未絶梁伊帝之力方欲克復梁雍吞滅崤函即都渚宫將議進取而穹昊不惠頻降愍凶秦氏虎狼肆其虐暴主上幽辱鑾輿播遷悲結萬姓痛深九服社稷須主天下難曠晉安殿下地惟宻戚親實愛子弱表狥齊幼而岐嶷羣公卿士岳牧藩鎮莫不頓首屈膝請嗣宗祧王太尉秉徳居宗實為元輔僕以不敏預叅末將今朝野寧晏方鎮協和戮力華夷同奬王室庶竭股肱蕩刷讐釁殿下夙標令譽早播明徳親則章興漢朱虚侯章東牟侯興居一作典非地惟蔣邢昔因多故託身大國今䝉發勑已次夀春載披來旨實深傾注但帝子承制非為乏主冡宰匡翊寧俟長君雖則末學頗聞前載成王踐阼曾未壯年昭帝君臨實惟童孺若以家國多故思濟艱難仰惟尊戚莫不屬望分陜之寄側聽髙㫖如使不繼親地便議崇極上相居中自當奉報昔仲子舎孫檀弓有作趙求外主穆嬴以啼前事不忘可為故實蕃維末鎮敢用多陳逺降誨函唯深哽佩陳某頓首頓首梁貞陽侯重與裴之横書張佛奴昨還得去月二十九日書覽以增慨昔桓公始反管仲親射其車重耳初還吕郤終焚其室頃家國多患頻遘閔凶前事不忘便為龜兆所以皇齊大徳禮秩兼常威武紛紜洪恩汪濊况復旌旗照日鼔吹從風文物俱華羽衛相鬱書契已來斯未有也卿天監之始門官有成承聖之初身名俱泰正應勤王効命詶二后之恩憂國如家報三靈之寵何有方規異志茍樹童䝉阻地險於長川忘天討之應及孤昔忝蕃維非無逰士平原之館乃乏如錐田文之家差有彈鋏雖復李廣麾下莫不封侯衛青故人多懐彼此豈可文辭簡畧禮等平交披封伸紙益多歎異相䑕無儀表詩人之作茅鴟刺傲彰魯史之文宿昔相期不應如此衆軍即便頓江闗相見在近不復多及蕭淵明頓首再拜裴之横荅書之横白足下定國等至枉雅誨具髙氏致送之旨即彼行人逺到京城大慰應有成命但江山夐阻未奉朝廷報辭第下國之麟趾先朝所寄籍彼鄰好義深主祀自宜單車入境端委還朝而朱斾啟行戎旌望國江東士子未逹髙懐僕早預簪裾夙叨眷與弦矢既暌江淮成阻青黎裁封雖斷西鳥之辭白雪在天豈無北風之歎但變故紛紛忠貞宜顯寒松負雪誠愧節者之徒勁草疾風寧忘烈士之槩齊師若反斾淮路退舎淝水彼之敬送止縉紳之徒此之奉迎則軒蓋而已伏聽朝旨遲申展敬之横白與徐陵薦方圓書周𢎞讓吾荷朝恩得安丘壑身名兩泰夫復奚言但願沐浴堯風遨遊舜日安服飽食以送餘齒然性靈未能灰弭其間復須友生言晤後來英俊並出方為時生林谷之中鮮逢退逸唯趙郡方圎栖遲天目年過强仕不慕時榮文史足用學藝優敏中歲暫逰宛洛䝉弟識異其人方儲之𦙍衣冠未絶雅奉閑逸得性丘林與吾朋逰積有年歲今復同在巖壑畢志風雲琴按清商詩題空谷比幽貞道缺考槃絶詠賁五履二兩爻無間方今公旦作輔億兆攸賴激貪懲競儻自圓起弟以搜揚佐世水鏡求賢脫能登此仄陋論一作綸言是屬翹弓逺賁則山谷咸勸足令㢘風復振懦夫能立豈不𢎞哉圓若䝉此旌招未必不鑿坯而逹於廊廟之用脫不能賁然來思而於退讓之道於斯為貴恐弟未究東川人士聊復起予今言吾家上宰之貴無以微禆萬一此舉脫復入聽少得不負夙心周𢎞讓白答周處士書徐陵辱去年三月二十七日告仰披華翰甚慰翹結承歸來天目得肆閑居差一作羌有弄玉之俱仙非無孟光之同隠優㳺俯仰極素女之經文升降盈虚盡軒皇之圖藝雖復考槃在阿不為獨宿詎勞金液唯飲玉泉比夫煑石紛紜終年不爛燒丹辛苦至老方成及其得道冥真何勞逸之相懸也又承有方生亦在天目理當仰禀明師摠斯秘要豈如張陵弟子自墜髙巖孫泰門人競投滄海何其樂乎聖朝虚心版築尚想丘園若彼能赴嘉招便當謹申髙命但其人徃歲亦望至京師觀此風神確乎難拔故以忘懐爵祿詎持犧牲之談髙視公卿獨騁蜡蛵一作蜉蝣之訓所恐有道三辟公車十徵若斯者終當不屈此既然矣請復詳言昔楚國兩龔同時紆組漢隂二老相擕抱甕兄之幽貞若其鑿坯負石方同形影結綬彈冠無容越楚况乎糞土夔龍羶臊名器已行所不欲非應及人忽承來音良以多感何則潁陽巢父不曾令薦許由商洛園公未聞求徵綺季斯所未喻髙懐而躊躇於矛楯也唯遲山阿近信更惠芳音如或誠言謹便一作使聞奏第夙勞比劇不復多呈徐君一作名白答諸求官人書自古有一無此字吏部尚書者品藻人倫簡其才能尋其門胄逐其少多一作大小量其官爵但古來數千年非無明時也非無明主也自有才用雖美階級不通門户雖髙官資殊屈若斯人者其例甚多請問諸君此是何義夫一千錢一斛米之多少猶闗相祿况復皇朝官爵理係𤣥天内典謂之為業外書稱之為命五行有驛馬之言六甲有官鬼之說必令驛馬時發官鬼剋身所望偕榮便當果遂如其不爾决是難諧豈可改尚書作官鬼驅老僕為驛馬耶若見問尚書何不分判用與不用許與不許僕答云君非屈滯豈可相期决言應果若今驛馬差爽便是乖信此闗君命僕何以相答耶若朝散之流行止之屬門户相似人才不殊選家斟酌無能為爾若陟大位清官悉由元命夫人君賔用並是前緣故宋文帝云人一有世字豈無運命每有好官缺輙憶羊𤣥保梁武帝云世間人言有目色我特不目色范悌自此而論豈非前業且世諺云圖官在亂世覔富在荒年梁孝元帝承侯景之凶荒王太尉接荆州之禍敗爾時䘮亂無復典章故使官方窮此紛雜自紹泰太平及永定中一作永定之時聖朝草創爾時州州自帝郡郡稱王天下干戈一作干戈未息尚無條序兼以府庫空虚賞賜懸乏白銀之寳難得黄紙一作禮之板易營假以官榮一作權以官階代於錢絹義在一作存撫綏無計多少又有非舊非勲非地非才託節將而求官因時人以買位賣官既賤皆為清顯故一作致令員外常侍路上比肩諮議參軍市中無數四軍五校車載斗量豈是朝章應其如此今衣冠禮樂日富年華主上體成王之風太傅𢎞周公之徳西戎北狄畏我王威時既清矣時既平矣何可猶作亂世意而覔非分之官耶一作何可猶作舊意非理望也凡人所以稱屈滯者身已不無寸能官又不及父祖既是明時可以於邑所見諸君多踰本分猶言太屈未喻髙懐若問梁朝朱領軍等一作异並一作亦為卿相此不踰其本分耶此天子所用一作此是天子所拔非闗選序舊章秦有車府令趙髙直為一作直至丞相漢有髙廟令田千秋亦為丞相此復可為例耶僕七十之歲朝思夕計並願與諸賢為真善知識曾無嫌隙差可周旋非欲令君作此怨訴但既忝衡流應須粉墨庶其允當無負朝寄耳去年疾患亦一作爾餘氣息不能相荅通作此書所望諸賢深明鄙意徐君白一作皆陳書本傳文苑英華巻六百七十七
