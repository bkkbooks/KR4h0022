body:
  text: 文苑英華卷九百二十三宋李昉等編職官三十一刺史五安州刺史杜鵬舉碑一首泗州刺史李孟犨碑一首晉州刺史髙武光碑一首安州刺史杜公神道碑楊炎受正性者德之元纂重侯者業之盛君子體仁以合德積厚以感通著于神明光于祚胤者其惟杜公乎公諱鵬舉字某其先京兆人也七代祖諱模後魏為濮陽守衛人宜之子孫世居東郡故今為濮陽人夏有豢龍之官周封唐杜之國世載侯伯勳藏晉魯周公錫命玄旗火龍拯三代之衰參五霸之業斯保姓之始也漢有建平侯䇿定中興晉有當陽侯克并南夏其食酆鄗盛西郊之黻冕其分荆濮祚東國之山河斯不朽之宗也濮陽生陳留太守諱亮陳留生髙祖北齊膠州刺史竟陵公諱嘉竟陵生曽祖隋鴈門太守諱保鴈門生大父唐蘇州司馬諱義寬蘇州生皇建平侯荆益二州大都督府長史諱慎行洎貞孝公秉哲以輔先朝今黃門戴天以成大業自魏七代以方嶽登聞在唐兩朝以台衡致理斯邁種之仁也公貞孝之兄黃門之考天修其爵地富一作學賦其才神抱虛廓智藏蓍蔡口目河海儀型嵩華學可以掌邦教詞可以宣國風少與范陽盧藏用隱於白鹿山以太夫人有疾與清河崔沔同闕醫於蘭陵蕭亮聲色之微以誠達疵癘之祥以氣變屬先府君作鎮荆楚有詔門子親侍禁闈起家修武縣尉嵗滿以書判超等授濟源尉以正議登朝拜右拾遺升玉堂以謁聖君陳格言以利天下黃門侍郎張廷圭國之髦碩洛州長史皇甫知常人之標凖美公志行嘗與請交公精義入神洞究奧賾初睿宗踐祚冥感祥符覩玄期於化元啓成命於幽教人所以佇非常之運天所以歸億兆之心玄宗時在東宫表公所言請編史册時應令賦詩御札批云畢公之任諒一作亮藉伊人思入風雅靈通神鬼後以親纍出為岐州司倉轉同州司士開元初上以中都稍食省河漕之徭大農器用賦晉山之鐵牧馬于歸獸之野考室于迎春之宫關中始置疏決鹽鐵長春宫三使詔以公為判官明年天子東行河隄阹格獸之場開濯龍之沼停鑾上苑留宴天泉酒酣樂過公獻賦以諷於是有采章之錫遷著作佐郎太子左贊善大夫都水使者邠王府司馬豐王府長史中散大夫安州刺史公為政在上位畏于上貞一以守之齋莊以蒞之其始也居右正詞王侯嚮慕其終也疏通簡易禮化興行方將坐周召之堂陳歌訓之典法象魏登天庭而明德夀於中年壯圖悲於下國命矣以某年月日終於官舍明年二月葬於夀安之南原遵遺命也夫人河南郡君尉遲鄂國之孫邛州刺史瓌之女也抱含一之德友于君子受降神之祥克生元輔天寶四載終于山陽别業其終祔焉從周禮也長子靈瓊陳州太康主簿紹家祚而命奪其祿次子奉遙有異學而天喪其文荀陳同德顔閔齊化季子山南劒南道副元帥特進黃門侍郎同中書門下平章事衛國公鴻漸身負蒼旻氣和鼎飪以符合斯運以道佐唐虞文繫訓謨化齊混象大勳格于皇極厚寵揚于祖考某府君先贈大常再榮師保夫人舊封宜陽增號某郡三錫桓公之命是尊孟母之賢惟公主忠孝根仁義事親有極致之道執喪有寧戚之哀威廢鞭笞愠忘誚讓其立身也冥觀天理合含幽鑒強志通於衆藝敏行求於古人考聲教觀厯象動合靈柢之贊居順隂陽之和其達誠也憂喜極中權利交喪歷官十二逺悔吝之形春秋七十抱純精之氣其保終也君子謂探命厯誠也專藥膳孝也補衮職仲山之志也頌王風吉甫之才也濟美欒武之德也有後臧孫之慶也宜乎正訓百代垂鴻千古存被先公之冕服沒為天子之元老勒鐘鼎建廟堂金石以頌聲邱陵以表隧乃假詞末學觀德將來銘曰於赫太師德音孔遐道之氣象物之精華文學鄒魯羽儀邦家選于帝庭帝庭有儀聞于宫府宫府允釐明晦光耀際含天機識真紫極建旟青蒲熊負金印蛇蟠朱組時哉功名海變今古精魂歸復宜陽之下我有家嗣為王寶臣德一作寵延沒世功被生人崖谷磅礴邱陵故新蒼蒼頌石萬世遺塵泗州刺史李君神道碑李軫夫崇孝悌者必竭力以事親厚忠貞者亦盡心以奉上故聖人廣而教之以勸遐裔至若馬遷續太史之紀安國傳夫子之書潘氏家風謝公别傳內足以貽厥後昆外足以錫祉爾類小子不敏仰希前哲竊述類本用表流光君諱孟犨字公悅其先乃太上玄元之系五代祖景皇帝始封于唐髙祖諱亮至德初追册鄭王諡曰孝曽祖諱神通武德初以佐命元勳封淮安郡王開府儀同三司尚書左僕射諡曰靖烈祖諱孝義武德初封永安郡王貞觀中改封膠西郡公銀青光祿大夫司農卿上柱國襲膠西郡公至德初追贈平陽太守皆斧藻至德琢磨令範仁經義緯敦教易俗理化勳庸備詳史牒君純懿靈粹得之自天先府君貶南州也以正直忤物為邪醜正一有辛字已告終于官舍君未弱冠號天踴地漿勺不入禮過成人寮吏賵贈一無所受扶護艱險泣血萬里提攜幼稚盡室獲全以某月日遷塋配廟禮物無闕由是以純孝聞服闋調補梁州參軍轉右衛録事參軍相王府戶曹以清幹稱恩詔特加朝散大夫出宰郃陽猗氏三原德風洽聞香聲逺茂君之臨猗氏也萊田數十里上蔽荆榛下闢舄鹵逋逃夜一作暝聚豺狼曉嘷公曰穀不足者地有遺利食不足者人有遺功長其荆棘孰若樹其禾稼聚其豺狼孰若利其貧窶乃尋斧於拱木疏鑿於涑州化草莽為陂塘變磽確為墳壤人民胥恱工亦子來雖史起決漳鄭國開白亦何加也人荷其德邑茂其功建頌立碑迄今斯在後中使撫循廉按嘉公丕績薦為鄧州司馬兼陸門堰稻田使君乃溪白水之口壅樊陽之陂築甬雲屯疊石山積樹建立則截流施扃制蓄泄之門為水府之權分血脈之經緯為農夫之司命條流百道浸潤七邑疆畦綺錯稼穡龍鱗田疇之歌何獨子産中使舉以郎署擢授禮部員外屬東封扈蹕轉虞部員外郎出牧泗州清明簡肅治行第一而地接吳楚氣候卑濕因之痁癘辭以疾歸開元十九年十一月十九日終于大梁旅館享年五十有五權厝太行山至德初纍贈宋鄭二州刺史季子翼自衡卾轉運使兼漢南租庸從事爰適上國分途啓扈奔就吉辰以大厯元年十一月十四日遷窆於京兆萬年縣之畢原先夫人崔氏稱祔焉禮也今夫人清河人也父諱惟明纍遷海沂等州司馬兄鏡邈隱居太行纍辟不起弟國輔秀才擢第制舉登科歷補闕起居禮部員外郎夫人沖和備體柔順居中出起仰茂先之針閨門遵大家之誡自府君捐世庶務親臨存孤撫稚有妨禪寂是以通大乘頓悟門挹沆瀣餌花香而又現舉止之異者有二凡於宴坐口吐舍利香骨頂生如佛螺髻驚聞中外得未曽有翼等以額珠外見意寶內明釋氏前言今為見世遂感涕捧戴歸於故園起塔瞻奉莫之測也及天寶末隨子權赴陜郡司馬屬狂賊犯闕中原鼎沸權負板輿自𢎞農藍田值潼關失守朝野震驚扶長攜幼潛避山谷重壑固隂深林酷冷因之違裕至於彌留以其年九月二十九日薨於終南山一作所居享年七十有三有子六人長曰權故金州刺史次曰衡故洺州清漳尉次曰樞故檢校虞部員外兼侍御史次曰軫歙州别駕次曰房故渭南令季曰翼陜府長史兼侍御史丞陜府都防禦觀察陜虢等使惟軫與翼永號孤苦松楸斯拱銘碣未彰感奉遺範懼深失墜敬尊典故不慙以文其詞曰於赫大祖蟬聨我王夢蘭異感剪葉殊祥擇賢建德立社封疆肇分枝族貽厥其昌淮安忠黨英靈倜儻率衆關西濟師江上膠西酷似文武不墜運屬休明化流撫字烈考謫官遭罹艱時酷吏深文天下共悲君之岐嶷生知敏識磨礱節行韜晦仁德鍾罰蠻貊膺填氣塞天之輔護日茂嘉聲參卿發迹語掾馳名宰邑佐都事明理貞為郎起草後範規程出守泗濱明德惟馨繼疏躡陸修身知止福亮未極壑舟旋徙猗那夫人性合天真心逰志道迹棄喧塵嘉偶君子敬待如賓衣冠之族禮樂之門詞林翰苑金友玉昆垂芳後葉流慶無垠令聞不朽貞石斯存御史中丞晉州刺史髙公神道碑盧虔大厯七年冬十有二月辛酉御史中丞前晉州刺史髙公薨嗚呼天柱折地維缺豈止梁木其壞太山其頽乎中書令汾陽王聞之衣及于寢門之外至哀不哭仰天久之曰天喪余俾余曷所依律茍在飲公之化食公之德莫不叩心絶氣行號巷哭其月乙亥天王使中使來歸我公之賵贈潞州大都督詔曰狐裘濯冠勤固無歇閉閣留牘盡瘁有終謂公有古人之風故貺公以古人之節傳曰知臣莫若於君豈虛也哉公諱武光字淑貞其先渤海人也曽祖正初隋左金吾衛中郎將祖翰皇中散大夫常州長史皇考莊皇左驍衛將軍代濟忠貞保乂王室纍膺熊羆不二之心佐盛德之後必有達者惟公生焉公則將軍之嗣子也在厥初生自貽哲命弱而幹父長乃克家恥雕蟲而不為喜從龍而或躍故能事親克諧於純孝弼主必著其大忠忠孝並全社禝之衛也以申警之勤首職洛交郡安昌府别將昭忠信也由是公忠壯自篤勤勞日宣為國爪牙在帝左右美爾攸績於嘉乃勳纍遷至忠武將軍守左清道率洎天寶末會幽燕階禍公密奏辨疑襲履霜之漸叩血流地上濺御衣雖涉闕之諫不從而竭忠之誠克見帝嘉乃節拜右羽林將軍知軍事及亂作公待罪闕下曰臣始知之不能麋碎身首啓沃聖聰俾賊猖狂藥而不暝眩誰之咎也敢忘其死帝遽錫公雜綵二百假瓶盤副焉曰子言無隱朕甚嘉焉言而不從朕之過也惟今之謀言姑將以為親其年公陷賊境為賊所得賊議焚太廟與清渠之役中使孫知古遇賊若為釁鼓之事公節由義感忠以力成危言勃如賊爾咸若是嵗國廟不焚中使復命公之力也其有金鏃淫夷南冠繫俘咸賴迓續以永其命者可勝言哉其時賊議公本我唐之藎公也不可以握兵之要恐通內外之言賊遂黜公出典故絳絳人聞公之至也公來其蘇公之牧絳也我躬則閲雖外困賊命而內綏我人億兆協心和樂且孺卒使苞茅之貢日臻乎行在及王師大來公志克遂墜城歸命乃享無疆之休易曰女子貞不字十年乃字其是之謂乎入朝肅宗詔復位羽林是嵗年穀不登長安餓死相屬公揚言于上請出禁衛之米以攽餓者上多之乃俾公司出納之令翌日餓𨽻復蘇人賴家給時謂之公致君邁於堯舜不然何博施之道廣耶越月除奉先是邑也有不腆之賦戶人逋其邑三千公戾止未幾户人復歸如初屬虜難未已時奴刺拔我鳳州皇上類能俾公康乂公於是乎始有剖符之寄公之始至克黜戍難靖安西入疑作人踰月政成封內大理俾其祻疑之蓋及身于仁夀之域矣其年秋有詔遷梁州刺史充山南道觀察初商人吏那延西人之子也懋遷負來遇疾而卒遂殫所得之資備送終之禮明日死徒數百人咸造公庭曰今有以見死者之幸我如此不如此無其如字人之恤飲水之潔不書可知也君子曰髙公荷天之百祿永終無斁由是汾陽王美公之政無度寶應初以今上之命命公救濯于絳加銀青光祿大夫絳人喜公其來如見父母戎首師乾光皇甫太沖率徒數千居郡之南山食人牛馬奪人妻妾渴日為惡不彌虔劉洎公之下車句時克浸仁風率復淳化封域之內密如也雖晉用隨會羣盜出奔舜舉咎繇不仁者逺曷集作何以為比俄而汾晉阻兵關東漸弊脅權相滅鮮克胥匡以公獨固大節仗大順初誘之以髙位不從又逼以白刃不從身幾見危節終不奪可謂風雨如晦雞鳴不已上徐聞其忠狀也加特進守左金吾衛大將軍又轉開府儀同三司試大常卿封渤海縣開國公食邑一千五百户加一疑衍朝散大夫間嵗遇汾陽王論晉倒懸之急若涉水之不濟由是上將公為舟楫克濟其難公自是以利往為晉康侯加御史中丞夫晉陶唐之舊也介二大都之間達四康衢之要賊臣之所讐斂工師之所蹂踐室盡閴爾田其荒兮其有彼積之苗美哉之奐則為武臣所有其秋興履畝之役行比屋之積撫弱惸獨不畏強禦晉人沐公之惠如慶雲也一年逋逃復二年田疇闢三年之外中和之詠甘棠之頌洋洋乎盈耳哉三年秋汾陽王復以公勤績克聞于上上俾公以尹河府浹辰之內揚然有聲留人思公遺愛銘頌貞石經始有典不日成之覩而思仁墮淚于下汾陽王聞之復聞于上上詔公再造其晉加安樂郡開國公公之至也大耄鼓腹而歌羣黎投杖而拜武人揔戈以馳􅊳樂正交鼓而和羅公既喜迓如雲人亦沐公如雨風生草偃政簡人和陶然日遂其性矣以明年冬汾陽王以秦隴不關藉公以籌其䇿公罷侯于晉克揚西土之烈無何遘癘虐疾遂歸休于宣平私第病日臻既彌留銀青光祿大夫兼絳州别駕趙公廉公之愛壻也素知其為人名節清峻氣宇沖邈臨終之日托以後事而誓言于公曰嗚呼余不天余之性也克艱難昔往蹇之際不克抗臣節以死王事繄老母之故賴皇鑒之明以汾陽王靈不汝疵瑕獲保首領以免今死喪荐至逃逭無所汾陽王生成之恩不得而答太夫人罔極之德何階而報天乎天乎誰察余之心乎言終飲恨而歿享年六十有五夫人隴西李氏柔克宜家坤儀訓內享年不永先公而逝大厯八年正月五日詔贈郡夫人夫人以其月乙酉合祔于萬年縣鳳樓北原禮也公六典大郡三掌禁兵清儉以立身貞而獲歿誰謂髙氏無君子斯焉取斯太夫人隴西李氏回已斷之傷就終焉之禮夫人天水趙氏誓同穴之志為未亡之人嗣子長曰升次曰昱咸在童齔集蓼茹荼哭不絶聲盡而繼之以血也虔沗吏末曽工為文受命于愛壻趙公俾光昭公之令德逖聽遺愛搦札而書不覺涕之沱若跪而銘曰天贊皇明而公克生欽若王事有終于成乾乾惕厲謇謇忠貞三主禁兵六牧專城於穆性情疑洋洋頌聲九有作程惟皇之禎胡不終吉今天降疾禍升福黜幽啓明室佳城鬱鬱備物秩秩送終于畢不思其出隴月宵弔郊雲曙密吁嗟髙公千秋此室文苑英華卷九百二十三
