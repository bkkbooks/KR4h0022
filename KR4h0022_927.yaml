body:
  text: 文苑英華卷九百二十八宋李昉等編職官三十六州官趙州録事參軍陸孝斌碑一首玄州司户吕處真碑一首瀛州司户李府君碑一首趙州録事參軍贈齊州司馬陸公神道碑張説公諱孝斌字順姓陸河南洛陽人也其先帝媯啓姓陳胡立族敬仲之孫有齊國宣王之弟封陸卿蓋命氏之所由興也秦并諸國陸氏分適燕吳在燕者魏文成帝時東平成王俟生平原簡王麗重世濟美為國之華公即簡公七世孫也曽孫彥升北齊以文藝高選仕祕書郎以至德表所居號終孝里祖玄亮隋鷹揚郎將父淳感盤桓利貞弓招莫進同志誄行諡為惠康自成簡至惠康集無此六字孝弟仁義世不殞矣公誕靈沖和稟識髙朗簡而中禮易而達節篤學勵行著實飛聲文史者宗其淵府德行者仰其墻仞舉國子明經選絳州參軍始州司法一作德安府法曹其在官也示人親其親長其長不苛察而小無廢不皎異而大有成知識日明嘗憺如也喪親過哀因中風廢卧疾纍年不赴楚邸肇封大羅雲逸雖沉疴未彌而僉望允集作光歸授楚王府兵曹參軍實有躬降師賓之禮目繫儀型之訓府罷換趙州録事參軍以病去職聖厯元年胸奴入趙公危邦不處盡室以行望河南而將濟至黎陽而疾甚年六十有二十月丁未終於姚村之逆旅歸殯於滏陽之郭北光天二年皇帝踐祚以故吏贈齊州司馬惜哉用公之道行公之志上可以存三光下可以平九土存則位不充其德沒則榮不逮其身命矣夫夫人范陽郡太君盧氏故岐山丞元瑾之女恭儉之德備貞信之教興妻道母儀自家刑國享年七十有六開元六年十一月丁未終於洛陽之宣教里八年五月丙子合葬於漳北之神岡禮也初咸亨中王師征遼公參是軍事友人太原王守義遇疫於海東路艱寇阻兵危勢急公獨顛沛致喪歸其井邑其在安州朝廷以公精達法理乃命覆囚劍南梁岐寃繫動盈千百丹筆所詳十全八九其捨生徇義返己施仁皆此類也禮莫重乎飾終於是見其不朽矣善莫大乎餘慶於是知其有後矣四子伯玉仲容叔獻季良泣血銜恤視天若墜俾豫作頌式昭遺懿銘曰曠哉陸公覩奧臻妙文雅外炳清明內照從政本仁資忠移孝不言而理正身作教才何富之命何負之居喪柴毁遭疾棲遲垂彼雲翼落此盛時殁後榮進終延贈寵德之休明位匪為重嗟嗟千載賢士之壠玄州司户參軍贈慶王友東平吕府君碑張九齡夫官雖序賢志道者不常有位才雖屈命福善者未必無後子夏文學之達以為富貴在天于公決獄之平則云子孫由我蓋不享當代生數猶奇流慶後人玄體乃用亨之會也則蓋有無集作原焉公諱處真字虔永集作求東平人曽祖北齊幽州長史府君諱贇祖隋貫州中正府君諱伽考滄州清池令府君諱師昔伯夷在唐實典三禮四嶽佐禹用平九州虞夏以功而逮集作見封申吕因邑而命氏惟時厥後奕代丕承公正性之有自來直道之不充詘嘉勇退之為集作惟德避近名之未善集作然越在弱齡棲遲事外用光本於藏耀履行期於滅迹不逺於仁行之斯至不茍於義方之自正集作止佐一郡而即安居九夷而匪陋如不然者公何掾於東裔哉起家授玄州司户參軍晏如也言旋初服遂從所好外物之槩不雜於風塵逺子之言惟聞於詩禮所謂溫良淑慎無競伊人者歟天册二年夏四月遇疾終於家春秋五十有二開元四年冬十一月葬於邑城西南四里原夫人北地傅氏祔焉夫果於立誠靜以俟命力不足者則不疚運不至者則不憂物情之難及我而易是以名利衆之所欲也則淡泊之德義人之所鮮也亦克蹈藉之如此而神不勞福不流未之有也有四子長曰玄知今左威衛司戈次曰玄悟中散大夫使持節鄜州諸軍事守集無此六字鄜州刺史次曰玄智左威衛執戟次曰玄爽左衛長上惟玄悟至大官此其教忠有舊服義無斁好爵是興集作與餘慶所貽入為王門之長出居邦伯之列屬恩推子貴名彰身後事有光於冥漠德乃發於馨香三命為大夫百代稱先子孝理所賜邦族為榮開元十七年有制贈公慶王友夫人贈河間郡君纍仁一作人之符至是斯驗惟神之鑒謂之不欺公之女孫曰東平郡夫人冠軍大將軍右監門衛大將軍渤海高公之夫人鄜州刺史之女也氷玉相暉椒蘭同馥由福履於君子與吉集作嘉會於善人齊薑于歸魚軒曄以昭路鄜畤之往熊軾殷其若雷有車服而始大履霜露而追逺於戲食于舊德無念集作忝爾之奉先樹之休聲有以見其歸美銘曰赫赫我祖惟師尚父泱泱大風悠悠終古施于胤裔憲是文武我美其濟我則斯取雖匪高位亦惟碩德我王之友彼夫之特既貞且亮宜語而默投足皆安終身不忒峩峩積善以福後人肸蠁家慶煒煌宗姻瞻彼松檟光集作錫之絲綸今也追飾實為先臣先臣伊何宜其有後志之所尚義無所茍身雖既沒名豈虛受立德于兹亦云不朽故瀛州司户參軍李府君碑前人君諱某字某趙郡房子人祖山夀齊尚書右丞兵部郎中父仁贍朝散大夫果州長史世德所載見於先碑公懿烈無忝雅有風度集作度量體和而韻緡之以絲性婉而文受之以采故好學不倦而墳典必精慮善以動而規矩皆中悉心存乎道義餘力見乎文章人以善談日聞休譽弱冠舉進士調補同州參軍換瀛州司户參軍以素所履以施有政居獲乎上往得其中無不嚴祗長史之所嘉歎無不崇讓同官一作年之所厭服宜爾戬榖光昭令圖如顔子之不幸豈卜商之云命某年卒於官舍春秋若干公家世尚儉子孫是式初先大夫之喪也清白以遺而果無私積高燥一作慓是榮而庶有慶餘豈所謂不戀本達也無懷土以重遷不傷生仁也無困財以遺集作乏非夫然趙之北際何必故鄉許之東偏亦云樂國故喪之歸也遂窆於斯及嗣子察受教養方能纂德業服事華髮潔身清朝天子方差擇其良惠恤于下由是解印少府剖符大集作本州衣繡而歸雖榮之在晝重茵以立而悲不逮親結諸心形諸色孝子之志國人所稱於是乎歸美以揚先撰德以示後蓋蒸夷之義也得無述焉銘曰倬李侯世載德行時範言士則三英粲集作發非百夫特肥而家華而國美無度命不融足云集作方駛途斯窮子餘慶享次嵩我丕馴藹遺風文苑英華卷九百二十八
