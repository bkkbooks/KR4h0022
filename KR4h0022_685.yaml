body:
  text: 文苑英華卷六百八十六宋李昉等編勸諭下為蜀道安撫夀光公王季卿與王仁夀書一首為崔僕射與朱泚書一首諭江陵耆老書一首與陳徴君書一首宗親上代梁貞陽侯與荀昂兄弟書一首在北齊與宗室書一首答周主論和親事書一首論妓妾改嫁書一首上吏部裴侍郎書一首與親情書一首與執政書一首勸諭下為蜀道安撫夀光公王季卿與王仁夀書陳子良大唐相國録事參軍正議大夫夀光縣開國公王季卿頓首頓首致書隋李將軍王仁夀足下夫幾者動之微吉凶之先見也君子見幾而作不俟終日故能轉禍為福改敗成功斯乃非常之人能立非常之事信乎此説實有由焉比以隋政失馭主上昏狂或東討勾麗填尸滿海或西征且末曝骨成山法令滋章賦役殷重金玉窮於玩服民力盡於池臺飢饉於是荐臻盜賊為之蜂起四海鼎沸天下嗷然生民塗炭萬無一在此固將軍之所知也豈待繁述哉固知長惡不悛禍盈必滅否終則泰理數皎然當今相王啓聖應天順民龍飛受圖神武作宰撥亂反正大拯黎元四海於是來蘇九服所以欵附如圭如璋之士踵武雲屯如熊如羆之臣排肩霧合伊吕之儔也韓彭之徒歟莫不咸騁藝能同申智勇共為表裏造我國家元首明哉股肱良哉濟濟巍巍無能名也將軍外氏宋國公昔在隋朝功深佐命聲侔衛霍道亞蕭曹本以無辜枉被誅戮悲戚行路痛結於天而况渭陽之情切於恆品相王志存追逺愍彼寃魂乃贈光祿大夫揚州總管宋國公可謂封比干之墓式商容之閭一作廬以古謂今足為連類其子懷廊今任光祿大夫相府禮曹參軍次子渠師相府賔曹參軍為王爪牙早樹勳績已雪寃耻彌暢昊天將軍甥也聞之豈不欣感但季卿之與將軍沗是宗友義同昆弟結髮投分彈冠比肩俱侍龍樓預陪鶴籥屬時君道喪天下崩淪衆叛親離莫有固志欲效嵇紹之忠殞身無益空軫袁安之歎流涕何言時事已闌智愚同見今承將軍擁兵雲夢建斾荆門水淹既多疫癘愈甚人無半菽師老則離何不以順天時早圗富貴爰率所部歸我霸朝享榮祿於子孫書功名于竹帛趨履南宫之上徐輪北闕之下鳴鍾列鼎珮玉摐金豈不懋歟豈不盛歟時者難值而易失機者在速而不遲成敗須臾實由反掌但季卿仰與疇昔交情不踈輒託雲禽逺披尺素一作心瞻心瞻目擊一作目擊之事請不遲疑願保垂堂自求多福季夏炎盛體力何如願恆勝納逺總戎旅不乃勞神季卿疾弊承乏使蜀尋望入朝冀即來儀咨覯在近無任傾仰謹奉尺書投筆澘然此不多具為崔僕射與朱泚書于邵某月日某官某乙謹奏記相公門下羌戎之患蓋三代矣秦漢以還怨詐更作詳諸舊史抑有前聞今則乘我間釁于兹二紀亂華謀夏腥聞于天貪婪無厭暴殄斯極侵軼我湯沐震驚我兆人十月之初中官驛至密奉宸翰逺使臨邊拜受遂行赴敵宜速西山之役尋已加兵將赴急宣不遑啓處所以晝分忘食夕惕懷冰關山阻隔信使頓絶北望雲闕南馳夢魂近者日有京信方表朝廷清晏雖冦猶外姦而人欵脫無字內驚然則回中未靜鄜役仍勤相公維嶽降靈求巖作輔不學古法知機其神是以聖聰寄揚我武既奉鑿門之禮具稟至天之誠折首摧鋒計日我捷詩云赫赫南仲獫狁于襄不其盛歟伏以令公勳庸冠世焯見于天受三一作一非朝將相之托有萬人父母之愛方謝安之體大知鄧禹之道𢎞相公特稟廟謨龔行天討分邠寧拔距之衆兼漁陽賈勇之軍偶俱無猜上讓下競用奬王室作為人綱一舉而大義全暫勞而殊功倍以此衆戰何戰不尅以此滅戎何戎不盡其疑作某逺承惠顧委分知歸感遇因時若此之甚延首北嚮一心如丹謹遣某官某乙奉記陳不宣某乙頓首再拜諭江陵耆老書劉蛻太原王生嘗移耆老書以江陵故楚也子胥親逐其君臣夷其墳墓且楚人之所宜怨也而江陵反為之廟世饗其讐謂耆老而忘其君父也吾以為不然楚人之性剽集作慓悍世文粹作大能復其仇讐其後自懷王入武關楚人怨秦不忘干戈况其人之性能忘胥之能破其國家而事之乎且今疑作令江陵之人牽牛羊而祝文粹作祀其廟者將祈年穀而獲凶荒禱疾病而得死亡者乎如厚其餼而虛文粹作虐非其報則江陵知胥之不可祠集作祀下同而不祀矣若果祈年穀而得豐穰禱疾病而獲康強有其餼而尋其報則破人之國而居其土辱人之君而受其饗遇一食而自忘楚人之殺其父兄則胥自為無勇也何獨江陵之人而忘習讐乎吾以為其廟申包胥之廟也包胥有復楚之功年代寢逺楚人以子胥嘗封諸申故不謂包胥耳不然則子胥何為饗人之食而江陵何為事讐人之神乎耆老得書速易其版曰申胥之廟無使人神皆愧耳與陳集作移元徴君書皮日休徴君足下行竒操異集作岐捨眀天子賢宰相退隱於陵陽踞見青山傲視白雲得喪不可搖其心榮辱不能動其志桎拲冠冕泥滓祿位甚善甚善茍與足下同道者必汲汲自退名惟恐聞行惟恐顯老死為山谷人矣或名欲遺千世集作載利欲及當今者聞足下之道可以不進其説耶日休聞古之聖賢無不欲有意於民也茍或退者是時弊不可正主惛不可曉進則禍退則安斯或隱矣有是者世不可知其名俗不能得其集有教字尚懼來世聖人責乎無意於民故也此之謂道隱其次者行不端於巳名不聞於人欲乎仕則懼禍欲乎退則思進必為怪行以動俗詼言以矯物上則邀天子冉三之命下則取諸侯殷勤之禮甚有百世之風次有當時之譽此之謂名隱其或集作次者行有過僻志有深傲飾身不由乎禮樂行巳不在乎是非入其室者唯清風升其牗者惟明月木石然麋鹿然期道家之用以全彼生此之謂性隱然而道隱者賢人也名隱者小人也性隱者野人也有夫堯舜救世禹湯拯亂之心者視道隱之人由夫樵蘇之民耳况名與性哉今天下雖無事河湟有黠虜之患嶺徼有逋蠻之虞主上焦心灼思晏詬夜謀宰相戰栗於巖廊百執奔走於朝右然尚未復貞觀開元之大治有致君於唐虞躋民於仁夀者其人則鮮其求則勤玄纁之聘屢降於山林少微之星但明於霄漢此真足下之所高視也嗚呼斯時也山林之間宜倒衣以接禮重趼以應命赴眀天子千年之運成大丈夫萬世之業勳名於鍾鼎德著於竹帛集作油素可不盛哉夫主上知足下之道久矣加以郡守薦之宰相譽之雖鍚命屢頒而高風轉固接物日簡入山益深且足下將為道隱乎則道隱者世不可知其名俗不能得其尚足下之名尚矣丹青於世矣豈為集作謂道隱哉將為名隱乎則名隱者為怪行以動俗詼言以矯物足下之道伸之而伊夔屈之而夷齊豈為集作謂名隱哉將為性隱乎則性隱者飾身不由乎禮樂行已不在乎是非足下頃薦名於有司徒集無此字客位於侯伯豈為性隱乎然三隱者足下皆出其表復何為而高卧哉如終卧陵陽而不起是廢乎古人之道者也仲尼曰素隱行怪後世有述焉吾弗為之也君子遵道而行半塗而廢吾弗能已矣君子依乎中庸遁世不見知而不悔夫前二者聖人之所不為足下之學楊墨乎申韓乎何其悖於道也於遁世不見知而不悔則惟集無此字舜不為高蹈也舜不為真隱也足下其亦有意乎如納僕之言翻然而起醒然而用朝廷必處足下於大諫次用足下於宰輔其在大諫也以直氣吹日月之翳以正道立天下之根先黜陟於朝廷次按察於侯國其在宰相也外以道寧四夷內以法提百揆俾天地反妖為瑞使隂陽易愆為穰然後以玄莬樂浪為持節之州崑崙崦嵫作駐蹕之地又不知房杜姚宋何人也果是道也集作果行是道罄南山之竹不足以書足下之功窮百谷之波不足以注足下之善以足下之風可以叶集作知僕之志以僕之道可以發足下之文故不逺千里授書於御者用以吐僕臆中之竒貯也僕之取捨自有方寸異時無望於足下發函之後但起無疑不宣日休再拜宗親上代梁貞陽侯與荀昻兄弟書徐陵張佛奴至未枉還告但以勞悒夫興亡繼絶往帝之通規分災恤患聖王之恆典自敦龎既散詐偽萌生時託親鄰信有澆慝大齊道冠三皇風髙九代仁信之本關於至誠言與之恩由於孝德孤謬蒙殊奬還嗣本朝勑諭分眀言誓殊重若使邦家克定境內無虞凡廣陵歷陽皆許見還白水黃河屢奉然諾彛章禮數莫不優華斯乃不世之殊恩寧是悠一作循常之恆事王太尉勳踰吕望德冠伊衡凡厥英謀算靡遺䇿豈容當滔天之巨冦違大國之隆恩計彼賢明必當不爾卿維兄及弟莫非雄才江外風塵不染凶冦賈氏三虎豈獨貴於前修荀家八龍信服在於今日近者州司不道或致流言朝聽矜眀已如前及想謀元宰善保良圗闕南道主人以相付也見所答東海徐湛書粗具來意昔桓慿莒衆文用秦政疑作攻是假鄰國之威以備非常之變若使江東宰匠具領齊恩時命封疆逺相迎接故當擕諸舊𨽻率我賔遊朝服簮纓直拜園寢梁人望國自合水而浮舟齊師言歸指滄江而回斾如其彼相未悟良機將恐戎麾遂踐京邑若其求成取敗豈謂和風龍馬雲旗差不相涉一二復令張佛奴口具相見在近此不多及蕭淵眀疏在北齊與宗室書陵白臨淮負海是謂徐州顓頊高陽世有眀德自興王啓霸無勞委劍之鋒開國承家實饗彤弓之賜其後金柯玉葉霞振雲從耆舊通人茂才多士一作耆舊先賢通人多士或以天下之貴負石自沉王命之尊拂衣高蹈或熊衣雉製青組朱旗儒盛江東文髙河北或復分齊處魯移魏居燕瓜瓞雖遙芳枝無逺昔有王如王莽無關控鵠之宗劉曜劉淵彌非偃龍之族又有朱家别録邾子之苗何氏殊源韓侯之胤三烏五鹿時事無恆東郭西門遷訛非一吾宗雖廣未有駢枝咸自駒王同分才子正以金衡委御玉斗宵亡胡賊慿陵中原傾覆我則供犧牷於東國載一作奉主祏於南都二百餘年家于楊越此則盧諶不去裴寧仍晉高官燕秦遲回鄉壤山河有隔敘覯無緣望冀馬而增勞瞻賔鴻而永嘆昔竇公纍世光武稱其外家許都遙逺靈王思其舊宅其言雖大可以喻小况在宗親寧無停眷比一有同字月應雩龍星移殷鳥天眀和煦體中何如願百年之老興居多福萬石之君寒暑清豫其外族忠孝比屋連甍信義勇於干戈詩書甘於酒醴或有漁獵三史紛綸五經都講開􅓺詩生負帙邦君佇德寧無挂榻之恩一作思州將欽風應有題車之命南陽坐嘯寄以共治東海行歌資其主疑作匡弼梁竦不好徒為大言鄧禹平生唯望如此若栖遲偃仰因事丘中桃果三名栗園千樹執竿而釣徴聘不來負耒而耕公侯靡屈何其高也蓋復休哉如脫推延或遲並問吾階緣人乏叨簉皇華王事無淹公禮將畢既而揚都蕩覆方離獫狁之災越界風塵復蹈一作無復輶軒之禮屏居空館多歷嵗時舋犯靈祗招延禍罰號慕無窮肝膽屠殞煩寃胸臆不自堪居無心奈何無狀奈何自徘徊河朔亟積寒暄風患彌留半體枯廢折臂為公雖非羊祜跛足而使無慙郤克固以形如稿木心若死灰匍匐苦廬才有魂氣夫迷山之客遲遙響於巖崖窮海之賔望孤煙於洲嶼况乃宗均魯衛地匪燕吳車騎相望舟艫朝夕三條不逺五逹非難信乃濶然遂不蒙問昔桃花之峽長避秦嬴芝草之山遙然滄海猶復漁船可入何况平途不兼旬月勞懷既積輒命行人弦望之間遲枉歸翰儻二三兄弟能敦昭穆之詩求我漳濵幸問劉禎之疾陽春改節並念將宜扶力為書多不詮次陵白答周主論和親書使人使持節車騎大將軍儀同三司大都督治司城使主杜子暉忠軍山遂伯使副鮑宏等至省告具懷夫聖一作樹君眀辟司御兆民則天象地佇育黔首故張旜以往拭玉而來同在蒼生恢宏文武雖毁戈鑄戟未擬上皇散馬休牛載懷偃伯非期與睦忽爽和風奚用殱師信由天討追尋曩好歎想兼懷言覿今書甫承家難知以冡卿執政擅同淵藪令尹當朝妄專征伐無君之謫俾墜其師無將之誅已從司冦刑名既肅國步還康希篤親鄰敬開𠂻欵若二境交歡俱饗多福八荒期乂良副所懷今遣具位某甲等使不復多述陳某頓首論妓妾改嫁書李諤臣聞慎終追逺一作追逺慎終民一作人德歸厚三年無改方稱為孝如聞朝一作大臣之內有父祖之歿日月未逺一作久子孫無賴便分一作引其妓妾嫁賣取財有一於此實損風化妾雖微賤親承衣履服斬三年古今通式豈容遽裭縗絰強傳鉛華泣辭靈几之前送付他人之室凡在見者猶致傷心况乎人子能堪斯忍復有朝廷重臣位望通顯平生交舊情若弟兄聞其亡歿杳同行路朝聞其死夕規其妾方便求聘以得為限無亷耻之心棄朋友之義且居家治理一作理務可移於官既不正私何能贊務五品以上妻妾不得改醮一作皆北史本傳上吏部裴侍郎書四月一日武功縣主簿駱賔王謹文粹有冉字拜書吏部侍郎裴公執事易曰書不盡言言不盡意然則文粹作義在理存乎象非書無以達其微詞隱乎情非言無以筌其旨僕誠鄙人也頗覽前事每讀古文粹無此字書見髙堂九仞曽輿有集作參負北向之悲積粟萬鍾季路起文粹作有南遊之歎未嘗不廢書輟卷流涕霑衣何者情蓄自集作於𠂻事符則感形潛於內迹應斯通是用布腹心披文粹作瀝肝膽集作是布腹心罄瀝肝膽庶大雅含𢎞之量矜小人悃欵之誠惟君侯察焉賔王一藝罕稱十年不調進寡金張之援退無毛薛之遊亦何嘗獻䇿干時髙談王霸衒材揚已歷抵文粹作詆公卿不汲汲於䇿集作榮名不戚戚於卑位蓋養親之故也豈謀身之道哉不圗君侯忽垂過聼禮以弓招之恩任以書記之事擬人則多慙阮瑀入幕則高謝郗超昔聞二字文粹作夫集無聞字聶政荆軻刺客之流也田光豫讓烈士之分也咸以勢利相傾意氣相許尚且捐軀燕趙甘死齊韓今君侯無求集作知於下官見接以國士正當陪麾後殿奉節前驅賈餘勇以求榮效輕生而答文粹作報施所以逡巡於成命躊躇於從事者徒以夙遭不造幼丁閔凶老母在堂久集本文粹並作常嬰羸恙藜糗集作藿無甘旨之膳松檟闕遷措之資撫躬存集作在亡何心天地故寢食夢想噬指之戀徒深嵗時蒸嘗崩心之痛罔極若僕者固名教中一罪人耳何靣目以奉三軍之事乎况屬天倫之喪奄踰七月違膝下之飬忽已文粹作至三年而凶服之制行集作將終哀痛集作疼之情未泄興言永慕舉目增酸文粹作傷夫怨於心文粹作𠂻者哀聲可以應木石感於情者至性可以通神明故徐元直亂文粹作指心以求辭李令伯陳情以窮訴上以棄興王之佐命下以全奉親之篤誠而蜀主不以為非晉君待之愈文粹作逾厚此二者豈貪貧賤惡榮華厭萬乘之處集作交甘匹夫之辱也蓋有不得已者哉至集作人文粹作儻有乾沒為心脂韋成性捨慈親之色養許眀公集作至以驅馳內忘顧復之私外存傳會之眷薄骨肉厚榮寵茍背恩為文粹集本並作以自效則君侯何以處之而且義士期乎貞夫忠臣出乎孝子既不能推心以奉母亦焉能既集本文粹並無此字死節以事人假物議之無嫌實吾斯之未信也况文粹無此字流沙一去絶塞千里子愴集作迷入塞之魂母切倚門之望既文粹作就令歡以卒嵗仰南薰之不資而使文粹作更憂能傷人迫西山而何幾君侯情深錫類道協天經眀恕待人慈心應物儻矜犬馬之微願效烏烏集作假燕雀之私情寬其負恩遂其終養則窮魂有望老母知歸賔王死罪冉拜與情親書風壤一殊山河萬里或平生未展或暌索纍年存沒寂寥吉凶阻絶無由會聚集作聚泄每積凄涼近緣之官左一作佐任海曲便還故里兾敘宗盟徒有所懷未畢斯願不意逺勞折簡辱逮漂淪雖未敘言暫如披靣晚夏炎鬱並想履宜賔王疾患忽無况耳集無此六字初至鄉閭言尋親故集作舊友耆年者化為異物少壯者咸為老翁山川不改舊時丘隴多為陳迹感今懷古撫存悼亡不覺涕之無從也詢問子姪彼亦凋零永言傷情增以悲慟雖死生之分同盡此途而存亡之情豈能無恨終朝展接以申濶懷取此月二十日棲桐成禮事過之後始可得行祗敘尚賖傾系何極各願珍朂還集作逺無所詮與執政書張説集無説拙於慎身往年遷流嶺外亡親愁懼痼疾增加比蒙生還曾未數嵗家口在洛身徒入京及丁凶苦不獲侍側比於他人情實不等在禮君親同貫事君無負事親有負不能殺身以自咎責乞過祥禫報國非遲三度表請不蒙矜遂當是文墨不盡一作宣苦心投公執事乞為一言聞達不敢守禮抗請直是私情乞一作先思若以此情可矜猶兾聖人萬一哀憫若將遣越甘心待罪謹狀文苑英華卷六百八十六
