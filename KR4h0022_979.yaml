body:
  text: 文苑英華巻九百八十宋李昉等編交舊三祭劉評事兄文一首祭劉左丞文一首祭友人張五兄文一首祭亡友揚州功曹蕭公文一首祭董大使文一首祭李中丞文一首祭嚴尚書文一首祭李相公文一首祭李侍郎文一首祭員郎中文一首祭衢州李司士文一首祭裴尚書文一首祭劉評事兄文李華維乾元二年嵗次己亥六月乙未朔三日丁酉趙郡李華祭于劉三兄之靈惟兄髙韻曠度㧞於時倫德契中和道符深仁泉明其照情性其文踈近無二心冥則親雅敦名教素逺權利夷險一節通塞一致有時不適與道偕醉跡一作事随沉浮量混同異白雲何逺清風自至人或知兄王佐之器豈人無福而兄夭年浙東幕庭䘮此一賢識與不識辛酸泫然秦失五羖舂不相杵清標髙志行乃動主繄我夫子列在中士軄無所統談笑而已居室言善感於千里綿江越湖掩涕相視追懐晨夜一作曩辰道則同謀定交梁國周旋两都更相黙喜吾道不孤契濶艱難誰榮誰枯良願再諧握手東吳覊旅情倍天倫豈殊去嵗季冬將膺使檄累辱來召陵江掛席持酒歡酣憂懐頓釋携手終日晤言竟夕無食不均無衣不易題序申餞情深義激贈言綢繆寵我行役渉泗而還遽焉遘厲猶復垂念尺書相繼將慶有瘳俄哀永逝萎我盛徳天故擬作胡不惠嗚呼痛哉華江濵憔悴風濕所侵疾不果問䘮不果臨無由執紼從茲破琴異鄉之慟於此何心不言少别便爲古今嗚呼痛哉光烈幕府親兄重兄恩深撫孤義感平生臨吊盡哀行路涕零躬䕶䘮事推以信誠古風復存今見哀榮嗚呼痛哉孀妻晝哭弱子縗絰蕭蕭旅塋空對江月想像逰處心呼鬱結羽毛相依忍此凋缺寢門之悲悽㫁吳越蘇門朗嘯於此長絶泣戒將命徃申微醊此如不祭祗益酸咽兄性與道合栖心福庭故於是奠不列葷腥願垂惠照以濟幽靈值佛開法長爲弟兄素心惟此敢告冥冥尚饗祭劉左丞文前人維年月日左補闕趙郡李華謹奉清酌微奠祭于故國子祭酒劉十六兄之靈痛矣夫時方刑措誼傅長沙運丁中興衍廢于家命與道乖末如之何先師微言行已堙塞續儒濟徳俾世為則專門繼起人用不惑季孟叔仲並華于國文傾遷固理破楊墨濁斯渾清曲莫容直孤玉沉韻髙鴻墜翼疇昔之年逆虜悖天帝命西平董戎于闗上宰姦回蔽眀怙權阻以監撫海内飜然督哥舒將盍不速轅一作哥舒督將盍速東轅兄在西陲飛章上言喻引古今易亡為存時憚姦邪不聞帝閽文武房公慷慨獨論迎吠狺狺竟寢斯文華沗諫官亦嘗披肝千里同氣寤寐永歎請受一作授監収一作帥請一作用鎮豐安乞固上黨乞備太原心竭犬馬亊屈羣頑哥舒表華掌記轅門明明仁兄紹介三軍舉族在此懼為福疑原竟廹方寸孤天負恩聖朝孝理未忍行戮爰詔三司伏念哀鞫綱脱一作釋烏鳥恩開桎梏實賴仁人再春枯木房公介然明華於朝兄志提挈出泥登霄言于宰司大啓學徒陳沈洎華可備師儒堂堂昌言光我囚拘楮中不行何日忘諸功曹垂侍恩比天倫手足是比榮枯一人友愛惟深憐眷益親難阨流離存亡永分兾逰門閫以慰酸辛誰謂凋落今惟二人嗚呼哀哉弟參邦憲兄鎮海夷誰云存殁共彼有期謂天無親胡與善違孺子攀號逺奉裳帷季氏呼天割我四支平生故人横涕交頥寄窆空原時迨一作追興師官尊地偏禮不成儀回望舊邦素車遲遲潯陽地古舉目悽悲執紼流慟誰堪此時余生易感况已衰羸泣薦潢汙䰟兮臨之尚饗祭亡友張五兄文前人維永泰二年嵗次丙午正月某朔日趙郡李華謹遣從姪詹事府丞廉以茶乳蔬果之奠敬祭于亡友張兄博士之靈嗚呼痛哉先生之終人倫不幸况乎小子最飽道風何悲如之先生以道為貴以徳為富以樂天知命為夀則非其道而貴者賤也非其徳而富者貧也不樂天不知命而夀者夭也然先王道貴徳富加以樂天知命之夀固無恨矣所痛者仁而無後天道何以為善與神理何以為正直滔滔江水此慟何窮嗚呼哀哉華殘年衰病足不履地撫􅈾而哭欲徃無由千里申奠不任酸咽仁兄先生俯監悲懐尚饗祭亡友揚州功曹蕭公文前人維乾元三年二月十日孤子趙郡一無此二字李華以清酌之奠祭于故亡友揚州功曹蘭陵蕭公之靈嗚呼茂挺平生相知情體如一歳月之别俄成古今天乎䘮予此痛何極華釁罸深重艱棘所鍾殊方永慕觸目號裂孤窮易感况哭故人以足下才惟挺生名盖天下道孤命屈淪阨終身避亂全㓗忠也冒危遷祔孝也有王佐之才先師之訓而殁于道路何負於天乎痛哉華疇昔之嵗幸忝周旋足下不棄愚劣一言契合古稱管鮑今則蕭李有過必規無文不講知名當世實賴若人循環徃復何日㤀此華等一作而况泣血千里羈旅相依聞其一作此一哀心骨皆斷夫痛之至者言不能宣是欲寄辭祗益填塞茂挺茂挺君其降靈尚饗一作皆唐文粹祭董大使文崔祐甫維寳應元年嵗次壬寅月日祭于隴西董府君之靈曰秋日凄凄百卉具腓城寺無主人焉適歸矧蓄廕庥之望飜遇死䘮之威弔随慶集事與心違良知與主昨是今非嗚呼哀哉追惟曩嵗永豐之逰清川倚棹廣路停輈道路契濶燕言綢繆倐焉陳迹曽不少留幾成海變何啻星周勁翮翺翔上陵蒼蒼俯憐燕雀畏逼藩牆議以銜羽將貽稻粱望國酸疑作駿奔初念楮中之惠及門問故俄増掛劔之傷嗚呼哀哉干旐棨㦸撤而不見繐䝉户而風悲葦逺庭而靈疑作露泣邦人輟舂殱良何速属吏霑襟于河從禄永無像於形儀庻有憑於軌躅羞匏葉而為薦比隻雞而可續嗚呼哀哉尚饗為吏部李侍郎祭蘇州李中丞文獨孤及年月日某官某乙謹以清酌少牢之奠敬祭于故蘇州刺史兼御史中丞贈吏部侍郎李公之靈嗚呼天以純粹鍾美於公孝友慈惠公㢘貞直事君以忠臨節有勇可以師表郷黨儀刑縉紳宜荷百禄乃朋三夀執司物化曽莫輔徳諸父不死公獨返真官不過八命年未逾六十豈五藥乖養九藏失節以及此乎將脩短之域窮逹之數止於是乎前期幽報如所修乎俯觀前生集作生前亦有恨乎昔公出入臺閣勤勞王事驅馳集作馳驅使車周旋天下克已奉軄一何正也姑蘇之役姦倖構難公秉義勇誅其渠魁海冦圍逼勾吳震駭公帥羸師克剪太敵竒謀生於死地貞節見於孤城夫豈惡生誓無奪志臨危致命一何壯也濯纓來朝祗若王命三府髙議方以黄散咨公天乎無知不從人欲旅櫬委於空舘妻孥恨於逺道其來也駟馬朱幡其徃也孤轊丹旐天子興悼台臣雨集作雪泣情鍾我輩其集作哀可旣乎綰等義惟寮友季卿等属沗宗族歎愛如昨書札猶新伸眉未乆集作幾交臂或集作忽失形骸留此䰟魄何之鳴琴潺湲恍若在耳前路冥寞良逰無期靈之來兮歆此薄酌集作酹尚饗為元相公祭嚴尚書文前人年月朔日某官某乙謹以清酌少牢之奠敬祭于黄門侍郎兼吏部尚書御史大夫嚴公之靈嗚呼天惟難集作匪諶才不必夀冉牛集作耕斯疾顔回知集作短命吉㐫無朕集作腓非凡聖共惑惟公茂質見於芳年茵蠢九葩磊落集作砢千丈嘗戮力當代以智開物若發硎之刄决雲切玉長安浩穰憲綱踈漏天子命公尹京執法能秉直道以張皇綱以智至皇綱三十七字集夲如此英華止作以智開庻物以道張皇網盗奔訟清周月報政巴蜀亟擾上為旰食自公集作公之攸徂亦既集作既亦遄已昆夷授首卭僰歛化及位集作加冡卿為天喉舌謂當任極台鉉壽如岡陵青雲何攀白日忽暮嗟來桑扈溘與化往孰云夫君而有斯阨芳叢集作叢蘭春敗大壑夜失非君興哀吾誰為慟昔公先中書以道銷讒勝不踐衮軄公復筭屈短嵗卒無相印蒼生孤望前後同悲曩子論交於予投分形接意敵聲應事感俱渉世故累荷寵榮余忝台司公亦亞相大駕東狩卒集作䕶陪属車各負羈紲又同集作同扞牧圉誠節見於多難交態彰於困䝉願言悉心共奬王室鎮蜀之後集作候南北頗限猶易前期未嗟少别别未艾也死生間之夙昔歡愛今返為悲真宰何人夀夭誰司善而無報天豈余欺憶昨攸徃火旗電輜今也來思白馬龍轜鯉書遂絶雞黍無期惜無寳劔掛君松枝㫖酒一壺幽明此辭尚享為楊左丞祭李相公文前人年月日尚書左丞楊綰吏部侍郎王廷昌刑部侍郎魏少逰工部侍郎徐浩謹以清酌少牢之奠敬祭于故相國李公之靈嗚呼宗祏儲祉降神生公禀天純懿為國柱石負荷代業儀刑本枝九居邊集作專城六處八座五領憲府两登台司惟公㢘忠信是務惟寛厚清净是守危言獻可未嘗脂韋取容直躬而行不為權幸改操三已無愠一麾乃出其茂勲崇名遺芳餘事輝映䇿牘標凖縉紳所涖之邦于今頌美若鄭人之思子産周人之歌召伯謂公福如山阜夀登期頥為天子元老以弼成庶政溘與化徃嗚呼曷歸何萬人之具瞻與天命之相違窺遺塵於䑓閣想見公之容徽嗟道申而夀短集作屈痛跡是而人非綰等恭承嘉惠昔嘗登門接後堂之歡娛參東閣之討論謔浪在耳書札具存柰何少别忽間九泉集作原尚享為吏部楊侍郎祭李侍郎集作常侍文前人年月某官某乙謹以清酌少牢之奠敬祭于故右散騎常侍贈禮部尚書李公之靈嗚呼冲和集作粹之氣生徳於公忠孝貞諒聦明宏逹卓犖特立英明虚受自司翰持衡觀風執法周旋三閣出入十載能直其道而正其身致命臨節仁而有勇造次顛沛義形於色莊敬發乎談笑孝謹聞于集作乎閨門若天祚明徳神與正直公宜錫慶鍾夀俾大而昌于何官不至三事年不及六十積徳無報為仁者惑焉今行及先逺將安宅兆嗟来桑扈徃無返期追思平生夙昔歡好懇欵交臂之分勤拳集作殷勤同心之言今則冥漠無非夣想非夫人之為慟而誰為慟不知神之所在彼乎此乎㫖酒一樽以為别乎集作庶以為别尚饗為明州獨孤俊臣集作使君祭員郎中文前人某月日某官某乙謹以觴豆之奠敬祭于故某部郎中兼某州刺史員公之靈吳越愆嵗元元艱食帝咨四岳分命于公以公克勤于邦克儉于家忠而能立剛亦不吐出入䑓閣將十五載動合律度言為程式及兹剖符銜疾受命而慨然有表正東夏澄清江湖之心海隅蒼生方仰集作望公以大庇朝廷縉紳期公以上台而悠悠蒼天屈公以下夀時既得集作須而命不與致未窮而生有涯嗚呼哀哉昔公繡衣持斧余忝接武於朝公負譴投荒余亦左袵異域山川有間交情無極各随波流在天一方險阻艱難亦既備嘗邂逅相遇荆蠻之郷惠而好我何日能㤀浙右巨鎮甬東孤城風烟接壌集作相接弔伐同盟未及前驅莫申微誠遽聞沉痼集作荷忽間死生九原誰歸萬事長徃夙昔歡愛無非夣想舟逰壑走吾將安仰隻雞之薦靈兮來集作歆饗祭衢州李司士文前人年月朔日前華隂縣尉獨孤及謹以清酌庻羞之奠敬祭于衢州司士參軍李君之靈惟君砥節勵行抱粹含純剛亦不吐直而能温筮仕誠立安卑道存宜錫難老亦髙其門如集作柰何盛徳廹此短晨追惟夙昔修好於君託以良援申之婚姻勸我以義敦我以仁各狥薄宦俱期致身頃復離别幾為胡秦契濶乖阻艱難苦辛君恨靡盬陳力甌閩余集于集作茶蓼零丁海濵弔恤何深舊好惟勤集作殷贈言如昨尺素猶新倐忽長徃吾誰與親常日音徽平生懿文今則已矣長為古人憐君不知哭君不聞瀝酒墳草洒淚隴雲庶因薄奠髣髴精神尚饗為華隂李太守祭裴尚書文前人年月日華隂郡守李某謹以清酌少牢集作庻羞之奠敬祭于故禮部尚書河東裴公之靈嗚呼元精純粹生徳于公峻極降祉真明在躬濯纓登朝事君以忠出入三閣周旋两宫褰帷井陘推轂盧龍喉舌是寄令集作淑聞斯崇鯤背垂天鴻毛順風亦既左官時更困䝉夷險能一集作齊髙明有融三已無愠再命滋恭肇受方伯俄昇秩宗將陳謨謀以佐時雍如何不弔降此鞠㐫珠履聲絶蒼生望窮機返太素勲留區中集作景鍾杳杳龍轜瞻言徂東敬飾薄奠邀神昊穹靈顧來享髣髴聲集作音容嗚呼哀哉尚饗文苑英華巻九百八十
