body:
  text: 文苑英華卷一百三宋李昉等編器用二天子劒賦一首金劒出匣賦一首斬蛟奪寶劒賦一首刜鐘無聲賦一首金躍求為鏌鎁賦一首歐冶子鑄劒賦一首昆吾切玉劒賦一首漁父辭劒賦一首斬蛇劒賦一首天子劒賦以天生神物聖君用之為韻李君元物之利者稱乎劒人之尊者稱乎天固一人之所執諒四海之攸先必當曜武德靜氛烟舉之無上揮之莫前獨立而光連日月橫行而氣壓山川請詳其功夫莫之盛偉夫至寶克符元聖東溟之大不足淬其鋒北斗之髙乍若回其柄信𤣥功之不宰曷凶德之能競足令六合靜三光正佩服而寰中小康指揮而天下大定夫然則鄙歐冶掩平津賤鏌鎁棄淳鈞彼勇不過於匹士我威方御於兆人偶聖斯呈天地感通之謂道逢昏是去隂陽不測之謂神豈比髙祖提之而起沛始皇按之而王秦為斯劒之等倫哉原其始也吹氣母鍊元精為爐而九土開闢鼓橐而八風克生應以六律制以五行帶之以恆山渤海鋒之以燕溪石城故能所向無敵莫之與京既而徴三度亦以正三統劃宇宙以𤣥通宰乾坤而利用彼蓮花發色玉貝騰文揮大野之中疾如雷電倚長天之外上决浮雲爭能擊刺較勢繽紛所謂一夫之勇非為四海之君如是則犀不足剸鐘不足刜繄以聖功配兹神物我皇應昌期恢盛時不耀兵鋒設道德以為固不先武力抗仁義以為師人神協贊遐邇平夷真所謂天子之劒也敢繼莊生而賦之金劒出匣賦韋肇劒者主生殺之氣匣者同隱見之心鳴於其中或幽閉以為恨出乎其外信利用以則深豈徒飾以調疑作雕玉比之兼金銼雄鋩而不舉緘異氣而嘗沉者哉故劒利於人匣因於劒蓋所以為重俾神物而不䙝亦所以表能將瑞光而亦驗其始也若耶之溪涸赤堇之山開良金既選歐冶爰來合純精而鑄鍊召太一與風雷厥功既勤曠歲月而方就厥狀斯見法隂陽之所裁於是工技之儔金鏤為匣制其象也錯玳瑁與瓊瑰韜而藏諸祕龍鱗與龜甲故楚王之未識我含其章風胡之將鑒我耀其光發匣而覩爛然非常環啓蚌以吐月刃披雲而降霜若金隄始開橫秋水之漫漫如青天欲倚散陽彩之煌煌夫惟義也動而必言疑作吉夫惟神也行而無迹號龍泉而其善可珍指斗牛而其光可射用悔疑作晦之際思顧盼而無遺出幽之時思佩服之無斁伊昔三劒氣凌九霄臨敵髙揮而血流千里復讐虛擊而疾不崇朝苟䝉蔽而未發雖晏隂之莫昭且劒之在匣蓄鋭而誰玩劒之出匣器利而能斷亦將試銛鍔於鯨鯢决浮雲於天漢或提擕之未及尚埋淪而可歎願進用於張華如見知於雷煥斬蛟奪寶劒賦以追殘水族濟彼驚濤為韻獨孤授昔佽飛兮言越川湄佩寶劒兮安流自持進孤棹以將半乃雙蛟而見追曵紐搖環欲奪晶熒之氣呼風吸浪先呈夭矯之姿初其徑楫將移輕帆未濟嗟履險以多變歎韜鋒而自衛俄而積水怒隂雲蔽彼拏空攖霧之狀當一明一晦之際其來也壘白刃旗短袂不足以當其勢朱鬐赤鬛夾巨艦以風馳火尾金鱗奪雄鋩而電逝乃言曰彼亦何逃徒為汝勞衝黭黮二字一作晦淡以天暝蹙嵯峨而浪髙徒觀夫鼎爾騰沸雷然怒號雖欲榖其口牙其刀抗爾以千艘踣若質流若膏爾能傷豫之一毛既激氣於烟景忽碎爾於靈濤是知計於生而不計於死利於劒而不利於水互出沒以神鬪洶崩騰而陳起舟傍奪魄求形於似海之喉岸側甘心挂骨於如霜之齒及其沸渭碎疑作砰訇風號雷驚驤首如𤣥雲阻色騰眸而白日韜精須㬰勇氣勵神機生拂首摧爪奮喉裂纓方澒洞於重嶮已支離於浚瀛於是海蕩山覆川停浪肅莫不駭其類奔其族𤣥黃之血隨重沫於淵淪磔裂之形蝕餘威而蹙縮卒使劒返人安鱗窮血殘極浦烟霽澄江景䦨逶迤然鷁首光轉錯落爾龍泉影寒氷彩猶鮮激金鐺之昭曜星文尚濕歸寶匣以䦨干嗟乎冥心者其勝如此恃力者其形若彼徒欲徵怪異壯奇詭至今人語其風見英姿之卓爾刜鐘無聲賦以利刃無滯合神為用為韻劒挺銛鋒鐘列重器何百鍊之堅鋼向千鈞而效試刜於有質若無質以通𤣥中乎有聲若無聲而斷棄則知淬磨歲久雄稜霜利不然焉能逗撓獸之刑以中開使發鯨之聲而靜閟想提握以輕奮宜鏗錚而應刃忽投剛以泯入狀體柔而理順遂使風胡延視喜見其雄鋒子野聳聽莫聞其為疑作遺韻爾乃理將神契跡與道俱透兹堅重泯若虛無於是觀其用而駭矣取其類而比夫當破堅之時方切玉而則異逮絶響之後狀決雲而匪殊是以知其獲揮刜之效微齟齬之虞勿以簨簴可憑猶懷抵礙勿以金石之固尚藴含胡宜其暗彰發揮靜應凌厲氷結於直透之始泉默於旁通之際莫知所觸故寂兮寥兮不輕其鋒信無凝無滯於戲亦由由猶通用道之肥者往無不通藝之至者物無不合苟藴藏於求用必開張而盡納載原斯器夫莫與鄰當耿介以發鋭若感通而應神所以願於重而宣利干於大以求伸果然刜音而不錚為異銛鍔而無厚可珍則剸𤣥犀奚可以擬議輕白羽曷足以等倫故君子謂青萍干將之刃也可以比德於吾人金躍求為鏌鎁賦以大冶無私祥金乃躍為韻白行簡金有利用躍而呈祥騰沸渭之炎彩耀赫奕之雄光始則沉潜將委形於煆鑄終能踊躍求效用於鋒鋩於是挺奇姿奪良冶歎凡目之莫辨懼名工之或捨既翕赩之在鎔尚淵淪之未寫迸紫光而傍射期遊刃以剸犀烘赤氣而上衝願成形於斬馬徒觀其扇巨橐鑠利金聲激射勢浮沉鳬氏傾耳以駭意歐冶拭目以窺臨既而赫矣不常爛然有待紅霞聚蓄於穹谷滄波跳出於溟海風雷於是借威日月為之揚彩自殊美玉豈韞櫝以沽諸願比雕戈庶因兹而礪乃若夫流晶表異變態無私象君子有剛柔之性同聖人不凝滯於時蓮鍔尚融若踊決雲之刃雪鋒未鑄如呈切玉之姿矧夫騰躍在中發揚於外君若形銷製器我則保其堅貞君若應用衛身我則期於逺大懿其鑠為金而不離效其祥而自殊幸托跡於鎔範希效質於規模彼號巨闕出昆吾龍藻龜文既以稱其昔有指晉麾鄭孰可使其今無嗟乎光彩陸離揮疑作輝華彰灼疑狂電之乍發狀長星之不落異十日之俱流殊衆口之相鑠精靈有感不憚豐城之沉神光無方願繼延平之躍哂備物之鈎㦸恥分形於錢鎛客有仰詳疑金以立誠庶堅貞之有託歐冶子鑄劒賦以雷公發鼓蛟龍捧爐為韻先王之御天下也與物為公知文不足以獨理故資武以為雄弧矢之利以征不服劒㦸之用以威逺戎俾梯山而入貢故率土而向風懿夫歐冶實曰良工鑄龍泉之劒鍊耶溪之銅於是制良模啓鴻爐炎炭赫以震爇大冶屹而山孤其始作也烟氣成陳橐聲若雷三光動色六氣飛灰蛟龍捧爐雷公擊節龍勢初成玉匣新發利可吹毛光能瑩雪此劒之德百夫稱傑此劒之用千里流血豈比乎解牛之刃自謂良庖倒載之干虎皮以包蒙莊說之以喻道周處憑之以斬蛟荆軻一拔以擊秦柱漢祖三尺以定天下士庶得以安身王侯得以闢土是知劒也藉以防虞豈比樂云不在鐘鼓既而切玉期用剸犀是逢嘗聞靜亂舊說為龍佩服是宜則聖哲攸重棄捐不可故牛斗是衝馮諼再彈而見於下客季札一返空挂於長松逮夫邊塵欲飛邦人斯恐猛士揮戈謀臣賈勇是殲是滅再持再捧四夷懾之以寧居一人得之以垂拱是劒也古今之重是劒也荷君之寵昆吾切玉劒賦以利刃無儔堅剛必截為韻金厚載劒者金之利器玉者寶之至堅韜百鍊之形迥倚天而入用斷十德之質信如泥而莫全蓋以淬礪呈彩磨礱發鮮開匣寶之炯爾切連城而爛然原其周穆西征戎王獻至刃決雲以增價鍔開蓮以逾利明星耀色固已直於千金白玉雖堅才可當於一試於是搜韞櫝示精剛謀剸割輝鋒鋩舉連環而動月掌盈尺以凝霜投刃皆虛無騞然之異響應機立斷俄凜若以分光映日惟明搖容轉潔乍毁方以旁達忽離堅而中絶仰鋒亂起初每謂如花飛應手全開終有疑於氷裂固可以鄙牛斗之氣衝陋蛟螭之精截應用無敵清貞莫儔銷白虹以影碎耀青蛇而色秋黯黯文開獨疑作猶庭中而電轉熒熒屑落類掌下以星流素彩交光清文耀質既衛身之可保豈化龍而無必色離溫潤光開縝密形錯落以膚寒彩璘玢而皆溢是知器有異而神符物至精而用殊向若煆非良冶質匪昆吾則安能充逺戎之獻斷抵鵲之徒倘遇英雄必提擕而可以時逢琬琰固剪截之如無嘉乎資礪乃之功剖溫其之潤剸犀莫比其銛鍔斬馬難齊於利刃夫如是知煆鍊之至精切璠璵而可信漁父辭劒賦以濟人之急取利誠非為韻宋言彼子胥兮亡命江湄賴漁父兮停橈在兹既橫流而濟矣因解劒以酬之厚意殷勤何惜千金之器髙情特達竟陳三讓之辭稽其去國無途迷津獨立前臨積水之阻後有追兵之急躊躇而鶴髮相哀顧盼而漁舟可入憂心盡展憑刳木以何虞渡口雖遙挂輕帆而已及繇是拂拭青萍披陳素誠念險難以知我顧提擕而賜卿拔三尺之熒熒波間電落橫七星之凜凜掌上風生叟乃莞爾興言搘頤話志本期浩渺以排難詎可倉惶而徇利酬仁報惠誠多公子之心害義傷廉異日一作且異老夫之意况乎此楚令方急嚴刑具陳盡索奔亡之黨先誅隱匿之人若以爵祿為念華榮是親則械爾躬而赴國持爾劒以防身整棹西歸自受執圭之賞論功北面寧亡切玉之珍蓋由惻隱為心艱危是濟方圖散髮之樂豈假吹毛之鋭情髙而俗慮難量語罷而鳴榔忽逝連環吐月空臨玉匣之間一葉乘風漸入寒烟之際豈不以識達精微言窮是非棄霜刃以長往弄雲濤而不歸寂寞巖烟沉東流之渺渺凄涼浦樹含落日以依依異乎義立一朝名超萬古决雲之異狀徒逞皎日之深誠不取則知美范蠡而述魯連信斯人之可伍斬蛇劒賦以仗劒斬蛇金鋩水鍔為韻徐寅磨霜礪雲疑作雪兮熒煌錯落伊逐鹿之英聖有斬蛇之鋒鍔蓋以麾正乾坤劃兮疑作分善惡楚國之姦雄徒爾烹若窮鱗常山之首尾胡為斷如朽索斯劒也上應君臨舒陽慘隂有其道則威若身兮靈若心無其道則鉛其刃兮木其鐔唯上德之在火協紅爐之躍金莫不龍活三尺霆飛半尋是何靈貺之異天啓之始而乃振戎衣授秋水匣辭乎豐沛之邑腰入乎崤函之里日月方暝雲雷未起有大蟒以橫路礙潜龍之舉趾於是上較天意下量地紀視銛鋒而何斯違斯擊怪物而宛其死矣然後挫七雄削多壘豈唯仗之剪路蛇而戮封豕蓋將提之令諸侯而禪天子得非秦毒之奢變作長蛇漢德之儉化為神劒奢以儉陷蛇以劒斬道在晦而須顯事有增而必減果聞哭白帝之亡符赤帝之昌雖行大義亦假雄鋩莫不龜文龍藻玉鏤金裝世亂將用時清則藏十二年兮如我淬七十陳兮摧而剛空山吞象之鱗豈鈋五禾切削也蓮鍔大澤銜珠之血不汙星光然後歷興亡繼得喪漢之滅兮魏之受魏之衰兮晉之仗晉火起兮髙飛豈混煙煤之狀文苑英華卷一百三
