body:
  text: 文苑英華卷三百六十九宋李昉等編諌刺雜說畫諌一首見三百六十二卷代河湟父老奏一首見三百六十二卷禦暴說一首木猫說一首文道元龜一首禦暴說陳黯或問為物之暴者出於狼虎也何暴攫摶於山藪之間耳權幸之暴必禍害於天下也狼虎焉得而類諸夫虎狼之暴炳其形猶可知也權幸之暴萌其心不可知也自口一作形者不過於噬人之腥咋人之膏血自心者則必亡人之家赤人之族為害其不甚乎然則權幸之暴不能抑亦有國者不能設備以禦之俾民罹其害曰虎狼吾知其能禦者弓矢也權幸如之何能禦也曰刑法曰彼秦漢其弛刑法耶何趙高王莾之肆暴而不能禦哉曰彼秦之高漢之莾得肆其暴者皆由刑法之不明也苟明暴何自矣噫田鄙者由能執弓矢以弭其暴耳有國者反不能施刑法而禦一作移其暴豈存國者重其民不若田鄙者重其生哉木猫說昔有兔類而小食五穀於田及穀熟農者穫而歸之兔類而小者亦隨而至遂潜於農氏之室善為盜每竊食能伺人出入時主人惡之遂題曰鼠乃選才可捕者而舉言其人曰莽蒼之野有獸其名曰狸有牙爪之用食生物善作怒才稱捕鼠遂俾往須其乳時探其子以歸畜既長果善捕而遇之必怒而搏之為主人捕鼠既殺而食之而群鼠皆不敢出冗雖已食而捕人獲賴無鼠盜之患即是功於人何不敬其狸之名遂號之曰猫猫者末也莽蒼之野為本農之氏為末見馴於人是陋夲而榮末故曰猫猫乃生育於農氏之室及其子已不甚怒鼠蓋得其母所殺鼠食而食之以為不殺而能食不見捕鼠之時故不知怒又其子則疑與鼠同食於主人意無害鼠之心心與鼠類反與鼠同為盜農遂歎曰猫本用汝怒為我制鼠之盜今不怒鼠已是誠失汝之職又反與鼠同室遂亡乃祖爪牙之為用而有鼠之為盜失吾望甚矣乃載以復諸野又探狸之新乳歸而養既長遂捕鼠如曩之者文道元龜并序天寶初適于平陽平陽太守稷山公則衡之從考舅雅好古道門尚詞客當今文人相與多矣嘗歎曰取士之道才其難乎或精文而薄於行或敦行而薄一作淺於文斯乃有失其道一至於此顧衡曰吾嘗謂一作語爾知言爾其言之衡私門以文場而進五世鄙雖不詞忝藉餘訓一作休敢著元龜以叙其事元龜曰文道之興也其當中古乎其無所始乎且天道五行以别緯地道五色以别方人道五常以别德易曰觀夫一作乎天文以察時變觀乎人文以化成天下非五緯孰可以知天非五方孰可以辨地非五常孰可以化人文之為道斯亦逺矣天人之際其可得於是乎夫卦始乎三畫文章之閫大抵不出乎三等斯乃從人而有焉工與不工各區分而有之君子之文為上等其德全志士之文為中等其義全詞士之文為下等其思全其一無此字思也可以綱紀一作紀物義也可以動衆德也可以經化化人之作其唯君子乎君子之作先乎行行為之質後乎言言為之文行不出乎言言不出乎行此乃一無此二字質文相半斯乃化成之道焉志士之作介然以立誠憤然有所述言必有所諷志必有所之詞寡而意懇氣高而調苦斯乃感激之道焉詞士之作學古以杼情屬詞以及物及物勝則詞麗杼情逸則氣高高者求靖一作清麗者求婉耻乎質貴乎清而忘其志或作至斯乃頽靡之道焉古人之貴有文者將以飾行表德見情著一作署事杼軸乎天地一作人之際道逹乎性命之元正復乎君臣之位昭感乎鬼神之奧苟失其道無所措矣君子也文成而業著志士也文成而德喪然今人一無此字之作其多詞士乎代由尚乎文者以斯文而欲範一作軌物範衆輕一作安邦叙正一作政其難致乎化成悲夫敢著元龜庶觀文章之道得喪之際悔吝之所由者也二字作焉一作皆文粹文苑英華卷三百六十九
