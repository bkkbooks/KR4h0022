body:
  text: 文苑英華巻七百八宋李昉等編遊宴一春日孫學士宅宴序一首梓潼南江泛舟序一首秋日宴季處士宅序一首秋日遊蓮池序一首夏日宴宋五官宅觀畫障序一首夏日登韓城門樓寓望序一首夏日登龍門樓寓望序一首越州秋日宴山亭序一首仲氏宅宴序一首上已浮江宴序一首秋日宴洛陽序一首遊山廟序一首守嵗序一首三月上已祓禊序一首晩秋遊武檐山寺序一首夏日宴張二林亭序一首綿州北亭羣公宴序一首宇文德陽宅秋夜山亭宴序一首遊冀州韓家園序一首與員四等宴序一首春日孫學士宅宴序王勃若夫懐放曠寥廓之心非江山不能宣其氣負欝快不平之思非琴酒不能洩其情則林泉為進退之塲樽酒是言談之地白衣送酒青陽在節鳬鴈亂而江湖春梅栁開而庭院晩楚屈平之瞻望放子何之王仲宣之登臨䰟兮往矣侠客時有且傾鸚鵡之盃文人代輕聊舉麒麟之筆人采一字四韻成篇梓潼南江泛舟序前人咸亨二年六月癸已梓潼縣令韋君以清湛幽凝鎮流靖俗境内無事艤舟於江潭縱觀於丘壑渺然有山林陂澤之思遂長懐悠想周覽極睇思其人則吕望藉茅於磻溪之隂屈平制芰於涔陽之浦覺瀛洲方丈森然在目於是間以投壺讐以妙論亦有嘉餚㫖酒鳴絃朗笛以補尋幽之致焉預於斯者若干人爾秋日宴季處士宅序前人若夫爭名於朝廷者則冠蓋相趨遁迹於丘園者則林泉見託雖語嘿非一物我不同而逍遥皆得性之場動息匪自然之地故有季處士者逺辭濠上来遊鏡中披白雲以開筵俯青溪而命酌昔時西北則我地之琳琅今日東南乃他郷之竹箭又此夜乗槎之客猶對仙家坐菊之賔尚臨清賞既而依稀舊識歡吳鄭之班荆落莫新交申孔程之傾蓋向時朱夏俄渉素秋金風生而景物清白露下而光隂晩庭前栁葉纔聽鳴蟬野外蘆花行㸔江上數人之内幾度琴樽百年之中少時風月蘭亭有昔時之㑹竹林無今日之歡大一作丈夫不縱志於生平何屈節於名利人之情矣豈曰不然人賦一言各申其志使夫千載之下四海之中後之視今知我咏懐抱於兹日秋日遊蓮池序前人人間齷齪抱風雲者幾人庶俗紛紜得英竒者何有煙霞召我相望道術之門文酒起予放浪沉潛之地少留逸客塞鴈飛鳴北斗横而天地秋西金用而風露降幽居少事野性多閒登石岸而鋪筵坐沙塲而列席琳瑯觸目朗月清風之俊人珠玉在傍鸞鳳虬龍之君子汀洲地逺波濤濺日月之輝人野路殊原隰擁神仙之氣平郊樹直曲浦蓮肥隠士泥清仙人水緑越林亭而極望生死都捐出宇宙以長懐心靈若䘮悲夫秋者愁也酌濁酒以蕩幽襟志之所之用清文而銷積恨我之懐矣能無情乎夏日宴宋五官宅觀畫障序前人宋五官芝庭襲譽盛文史於三冬桂幄凝驩照綺羅於九夏樽浮緑蟻每披仙霧之文障列青牛更冩行雲之態爾其龍編繡質貿錦分花隠映樓䑓比窓簾之在旦參差花葉若桃李之恒春楚媛調絃韓娥對酒虹橋度幔鵲鏡臨粧佩引琅玕詎動懐風之韻鞍廻玳瑁唯奔逐日之姿魚鳥冷而相親泉石紛而在翫宋家斯近雖别謝於登垣秦氏未遥自堪留於駐馬驚鴻擅美丹青貴近質之竒吐鳳標華宫徴得縁情之趣遞揚筆妙式暢辭端夏日登韓城門樓寓望序前人下官狂走不調東西南北之人也流離嵗月覉旅山川輟仙駕於殊郷遇良朋於異縣面勝地陟危樓放曠懐抱驅馳耳目韓原奥壤昔時開戰鬪之塲秦塞雄都今日列山河之郡池䑓左右覺風雲之助人林麓周廻觀巖泉之入興則有驚花亂下戯鳥平飛荷葉滋而曉霧繁竹院静而炎氣息賞歡文酒思挽雲霄人賦一言庶旌六韻云爾夏日登龍門樓寓望序前人夫益者三友助道術可存同心三人助金蘭可浴况乎詩書舊好被樂廣之髙天郷黨新知掃顔回之陋巷尋勝地叙清蕪脫野客之荷衣入幽人之桂坐榴花浮酌對文章而無憂葛蔓調絃撫鍾期而有遇既而南方夏晩北牖晴開中園之弱栁含煙曠野之隂雲蔽日低虹飲水向溪谷而全斜戯鳥凌空狎林亭而半度興含情逸共敦行役之期搦管含毫獨對晉人之序越州秋日宴山亭序前人昔王子敬瑯琊之名士常懐習氏之園阮嗣宗陳留之俊人直至山陽之坐豈非琴樽逺契必兆朕於佳辰風月髙情每留連於勝地是以東山可望林泉生謝客之文南國多才江山助屈平之氣况乎揚子雲之故地巖壑依然宓子賤之芳猷絃歌在屬紅蘭翠菊俯映砂亭黛柏蒼松深環玉砌參差夕樹煙侵橘柚之園的歴秋荷月照芙蓉之水既而星廻漢轉露下風髙銀燭掩花瑶觴抒興一時仙馭方深擯俗之懐五際飛文請動縁情之作人分一字四韻成篇仲氏宅宴序前人僕不幸在流俗而嗜煙霞恨林泉不比德而嵇阮不同時處良辰而欝怏仰髙風而杼柚者多矣豈夫司馬卿之車騎上客盈門仲長統之園林羣英在席坐卧南郭蕭條東野江波浩曠晴山紛積嘉鴛鸞之接翼曜江漢之多才顧斜景而危心瞻火雲而變色思傳勝餞敢振文鋒蓋同席者髙人薛曜等耳盍各賦詩放懐叙志俾山川獲申於知已煙霞受制於吾徒也上已浮江宴序前人吾之生也有極時之過也多緒若夫遭主后之聖明屬天地之貞觀得畎畆之相保以農桑為業而託形宇宙者幸矣况乃偃泊山水遨遊風月樽酒於其外文墨於其間則造化之於我得矣太平之縱我多矣無疑以上已芳節雲開勝地大江浩曠群小紛紏出重城而振䇿下長浦而方舟林壑清其顧盼風雲蕩其懐抱于時序躔青律運啟朱明輕荑秀而郊戌青落花盡而亭臯晩丹鸎紫蝶候芳晷而騰姿早鷰歸鴻俟迅風而弄影巖暄蕙密野淑蘭滋弱荷抽紫疎萍泛緑於是儼松舲於石㠗停桂檝於璇潭指林岸而長懐出河洲而極睇妍粧袨服香驚北渚之風翠幙𤣥帷彩綴南津之霧若乃尋曲渚歴廻溪榜謳齊引漁歌互起飛沙濺石湍流百勢翠嶮丹崖岡巒萬色亦有銀鈎犯浪掛頳翼於文竿瓊轄疑乗波耀錦鱗於畫網鍾期在聽𤣥雲白雪之琴阮籍同歸紫柱蒼梧之酧既而遊􅌉興逺景促時淹野日照晴山煙送晩方披襟朗詠饑斜光於碧岫之前散髪髙吟對明月於青溪之下客懐既暢遊思遄征視泉石而如歸佇雲霞而有自昔周川故事初傳曲路之悲江甸名流始命山隂之筆盍遵清轍共抒幽襟俾後之視今亦猶今之視昔一言均賦六韻齊疏誰知後来者難輙以先成為次秋日宴洛陽序前人夫以東京勝地南吕髙秋三塗鎮而九𣲖分白露下而清風肅或出或處人多朝野之歡以嬉以遊時極登臨之所征衣流寓切下走之蓬襟解榻邀期屬上賔之桂席於是齊道實欵琴樽倜儻論心留連促膝但有潘楊之宻戚一作契得無管鮑之深知簮組盛而車馬喧庭宇虚而管絃亮近臨銅陌斜控銀墟菊照新花泛輕香於逺次荷凋晩葉翻翠影於長波聽矚方窮獻酬逾洽年忘小大傲天地於平生志混榮枯得林泉之意氣願長繩以繋日幾近光隂思短札以凌雲或陳歌咏人採古韻成者先呈遊山廟序前人吾之有生二十載矣雅厭城闕酷嗜江海常學仙經博渉道記知軒冕可以理隔鸞鳳可以術待而事親多衣食之虞登朝有聲利之迫清識滯於煩城仙骨摧於俗境嗚呼阮籍意疎嵇康體放有自来矣常恐運促風火身非金石遂令林壑交䘮煙霞板蕩此僕所以懐泉塗而惴恐臨山河而歎息者也粤以勝友良暇相與遊於𤣥武西山廟蓋蜀郡三靈峯也山東有道君廟古者相傳以名焉爾其丹壑藂倚𤣥崖糾合俯臨萬仞平視重巒乗杳冥之絶境屬芬華之暮節玉房跨霄而懸居瓊䑓出雲而髙峙亦有野獸羣狎山鶯互囀崇松埓巨柏爭隂積瀨與幽湍合響𦕈𦕈焉逸逸焉王孫何以不歸羽人何以長往其𤣥都紫微之事耶方歛手鐘鼎息肩巖石絶視聽於寰中置形骸於度外不其然乎時預乎斯者濟隂鹿𢎞𦙍安陽邵令逺耳盍詩以言志不以韻數裁焉守嵗序前人嵗月易盡光隂難駐春秋冬夏錯四序之凉炎甲乙丙丁紀三朝之厯數十二月之隂氣玉律窮年一萬嵗之休禎金觴獻夀賁周禮作鼖鼓雷動煙火星流侲子黄童統鈎陳而驅赤疫諸王等集陳玉帛而謁一作朝諸侯京兆天中竦樓䑓而徹漢長安路上亂車馬而飛塵王丞相之登臨行將在目戴侍中之重席忽爾明朝槐火㓕而寒氣消蘆灰飛而春風起魚鱗布葉爛五色而翻光鳳腦吐花燦百枝而引照悲夫年嵗將晩志事寥落公孫𢎞之甲第天子未知王仲宣之文章公卿不識對他郷之風景憶故里之琴歌柏葉為銘影疑泛新年之酒椒花入頌先開獻歳之詞作者七人同為六韻三月上已祓禊序前人觀夫天下四方以宇宙為城池人生百年用林泉為窟宅雖朝野殊致出處異途莫不擁冠蓋於煙霞披薜蘿於山水况乎山隂舊地王逸少之池亭水曲新交許𤣥度之風月琴䑓寥落猶停隠遁之賔釀渚荒凉尚遏逢迎之客仙舟溶裔一作曳若海上之槎来羽蓋參差似遼東之鶴舉或昻騏驥或泛飛鳬俱安名利之塲各得逍遥之地而上屬無為之道下棲𤣥邈之風永淳二年暮春三月遲遲風景出沒媚於郊原片片仙雲逺近生於林薄雜花爭發非止桃蹊羣鳥亂飛有踰鸚谷王孫春草處處爭鮮仲阮芳園家家並翠於是携㫖酒列芳筵先祓禊於長洲却申交於促席良談吐玉長江與斜漢爭流清歌遶梁白雲將紅塵並落他郷易感増悽恨於兹辰覉客何情更歡娛於此日加以今之視昔已非昔日之歡後之視今亦是今時之㑹人之情也能不應乎且題姓字以表襟懐使夫㑹稽竹箭則推我於東南崑阜琳琅亦歸予於西北晩秋遊武擔山寺序前人若夫虎丘仙鎮吳王殉歿之墟驪嶠崇基秦帝升遐之宅雖珠衣玉匣下賁窮泉而廣岫長林終成勝境亦有霍將軍之大隧廻冩祁連樗里子之孤墳竟開長樂豈如武擔靈嶽開明故地蜀夫人之葬迹任文公之死所岡巒隠隠化為闍崛之峰松柏蒼蒼即入祗園之樹引星垣於㳫障下布金沙棲日觀於長崖傍臨石鏡瑶䑓玉甃尚控霞宫寳刹香壇猶芬仙闕琱瓏接映䑓凝夢諸疑之雲璧題相暉殿冩長門之月美人虹影下綴虬幡少女風吟遥喧鳳鐸羣公以玉律豐暇傃林壑而延情錦署多閒想巖泉而結興於是披桂幌歴松扉梵筵霞屬禪扄煙敞雞林俊賞蕭蕭鷲嶺之居鹿苑仙談亹亹龍宫之偈于時金方啟序玉律驚秋朔風四面寒雲千里層軒廻霞齊萬物於三休綺席乗雲窮九垓於一息碧雞靈宇山川極望石兕長江汀洲在目龍鑣翠轄駢闐上路之遊列榭崇闉磊落名都之氣渺渺焉洋洋焉信三蜀之竒觀也昔者升髙能賦勝事仍存登嶽長謡清標未逺敢攀盛烈下揆幽襟庶旌西土之遊逺嗣東平之唱云爾夏日宴張二林亭序前人張二官松駕乗閒桂筵追賞引簮裾之勝侣狎丘壑之神交辭縱於解頥道深於喻指香杯濁醴是河朔之平生雄筆清詞得髙陽之意氣林亭曠望季倫調伎之園泉石周游子晉登仙之浦舟浮葉影簟積花文黄雀度而飊驚丹烏傾而日晩出處之情一致筌蹄之義兩忘沉轄留驤眺乗羊於衛玉彈毫可作明擲地於孫金共題横吹之篇用記兹辰之樂人採一字四韻成篇綿州北亭羣公宴序前人下官一作客人間獨傲海内少徒志不屈於王侯身不絶於塵俗孤吟五嶽長嘯三山昔往東吳已有梁鴻之志今来西蜀非無張載之懐况乎踐名場携勝友風月無幾琴酒俄乖半面十年一别千里何少府故人攀桂撫金石而論心韓法曹新餞班荆臨江湖而執手離亭北望煙霞生故國之悲别舘南開風雨積他郷之思于時蒼雲寡色白日無光沙塵起而桂浦昏鳬鴈下而蘆洲晩傍隣蒼野霜風橘柚之園斜枕碧潭直斷芙蓉之水既而登臨惜别驂駕少留季札何人親逢贈縞子荆不慜思掛傾城惆悵北梁揖琴䑓而漸間徘徊東道思錦署以行遥嗟乎人事乖矣江山逺矣請命離前之筆為題别後之資五際飛文想羣公之不讓一言可贈知下筆之有神宇文德陽宅秋夜山亭宴序前人若夫龍津宴喜地切登仙鳳閣𤣥虚門稱好事亦有以登山臨水長想巨源秋風明月每思𤣥度未有能星馳一介留美跡於芳亭雲委八行抒勞思於彩筆遂令啟瑶緘者攀勝集而長懐披瓊翰者仰髙筵而不暇王子猷之獨興不覺浮舟嵇叔夜之相知欣然命駕琴樽重賞始詣臨卭口腹良遊未辭安邑乃知兩郷投分林泉可攘袂而遊千里同心煙霞可傳檄而定友人河南宇文嶠清虚君子中山郎餘令風流名士或三秋意契闢林院而開襟或一靣新交叙風雲而倒屣彭澤陶潜之菊影泛仙樽河陽潘岳之花光縣妙理疑巖巖思壁家藏虹岫之珍淼淼言河客探驪泉之寳禺同金碧蹔照詞塲巴漢英靈潜光翰院亹亹焉蕭蕭焉信天下之竒託也于時白藏開序青女御律金風髙而林野動秋露下而江山静琴亭酒榭磊落乗煙竹徑松扉參差向月魚鱗積磴還昇蘭桂之峯鴛翼分橋即映芙蓉之水亦有紅蘋緑荇亘渚連翹玉帶瑶華分楹間植池簾夕敞香牽十歩之風岫幌宵褰氣襲三危之露縱冲襟於俗表留逸契於人間東山之賞在焉南澗之情不逺夫以中牟馴雉猶嬰觸網之悲單父歌魚罕繼鳴琴之趣俾夫一同詩酒不撓於牽絲千載巖溪無慙於景燭云爾遊冀州韓家園序前人銅溝水北石鼓山東星辰當畢昴之墟風俗是唐虞之國雖接燕分晉稱天子之舊都而向術當衢有髙人之甲第祥風塞户瑞氣冲庭芳酒滿而緑水春朗月閒而素琴薦家童掃地蕭條仲舉之園長者盈門廓落東平之室梧桐生霧楊栁摇風眺望而林泉有餘奔走而煙霞足用神龍起伏俱調鼎鑊之滋鳴鳳雌雄並入笙竽之奏髙情壯思有抑揚天地之心雄筆竒才有鼓怒風雲之氣南庭興晩東徑隂生石髓拆而隠士歸玉山崩而野人醉僉為文在我卜翰苑當仁王羲之之蘭亭五百餘年直至今人之賞石季倫之梓澤二十四友始得吾徒之遊陶陶然落落然則大唐調露之元年獻嵗正月也與員四等宴序前人自嵇阮寂寥伊班超忽髙筵不嗣中宵誰賞古今惜芳辰者停鶴軫於風衢懐幽契者佇鸞觴於月徑已矣哉林壑遂䘮煙霞少對良㑹不恒神交復幾請沃非常之思但宣絶代之遊託同志於百齡求知已於千載道之存矣無乃然乎人賦一言俱裁四韻文苑英華巻七百八
