body:
  text: 文苑英華卷一百四十四宋李昉等編草木二荔枝賦一首伐櫻桃樹賦一首府庭雙石榴賦一首尚書省梧桐賦一首紫宸殿前櫻桃樹賦一首豫章賦一首建木賦一首蟠桃賦一首海上孤槎賦一首桂林一枝賦一首散木賦一首荔枝賦并序張九齡南陽郡出荔枝焉每至季夏其實乃熟狀甚瓌詭味特甘滋百果之中無一可比余往在西掖嘗盛稱之諸公莫之知而固未之信惟舍人彭城劉侯弱年遷纍經屆一作于南海一聞斯談倍復嘉歎以為甘旨一作美之極也又一有謂字龍眼凡果而與荔枝齊名魏文帝方引蒲桃及龍眼相比是時二方不通傳聞之大謬也每相顧間議欲為賦述而世務卒卒此志莫就及理郡暇日追敘往心夫物以不知而輕味以無比而疑逺既一無此字不可驗終然永屈况士有未效之用而身在無譽之間苟無深知與彼亦何一有此字異也用導揚其實遂作此賦云果之美者厥有荔枝雖受氣於震方實稟精於火離乃作酸於此裔爰負陽以從宜蒙休和之所播涉寒暑而匪虧下合圍以擢本旁蔭畝而抱規紫文紺理黛葉緗枝蓊茸一作蓊鬱霮䨴環合一有而字棼纚如蓋之張如帷之垂雲煙沃若孔翠於斯靈根所盤不髙不卑陋下澤之沮洳惡層崖之嶮巇彼前志之或妄何側生之見疵爾其勾芒在辰凱風入律肇允一作氣含滋芬敷謐溢緑穗靡靡青英苾苾不豐其華但旨一作甘其實如有意乎敦本故從一作微文而妙質蒂藥房以一作而攢萃披龍鱗以駢比膚玊英而含津色江萍以吐日朱苞剖明璫出炯然數寸猶不可匹未玊齒而殆銷雖瓊漿而可軼彼衆味之有五此甘滋之不一伊醇淑之無準一作算非精言之能悉聞者歡而竦企見者訝而驚仡心恚可以蠲忿口爽可以忘疾且欲神於醴露何比數於甘橘援蒲桃以見擬亦古人之深失若乃華軒洞開嘉賓四會時當燠煜客或煩憤而斯果在焉莫不心侈而體泰信雕盤之仙液實玳筵之綺繢有終食於纍百逾一作愈益氣而理內故無厭於所甘雖不貪而必愛沉李美而莫取浮瓜甘而自退豈一座之所榮冠四時而一作之為最夫其貴可以薦宗廟珍可以羞王公亭十里而莫致門九重兮曷通山五嶠兮白雲江千里兮青楓何斯美之獨逺嗟爾命之不工一作逢每被誚於凡口罕獲知於貴躬柿何稱乎梁侯梨何幸乎張公亦因地一作人之所遇孰能辨乎其中哉伐櫻桃樹賦并序蕭頴士天寶八載以前校理罷免降資參一作釐廣陵太府軍事任在限外無官舍是處寓居於紫極宫之道學館因領其教職焉廟庭之右有大櫻桃樹厥高纍數尋一作厥髙纍尋條暢薈蔚攢柯比葉擁蔽風景腹皆一作背微禽是焉棲託頡頏上下喧呼甚適登其喬枝則俯逼軒屏中外斯隔豫實惡之懼冦盜窺窬因是為資遂命伐焉聊託興兹賦以警夫在位者爾賦曰古人有言芳蘭當門不得不鋤眷兹櫻之攸止亦在物而宜除觀其體異修直材非棟幹外隂森一作森沉以茂密中紛錯而交亂先羣卉以效諂望嚴霜而凋换綴繁英兮霰集駢朱實兮一作以星燦故當小鳥之所啄食妖姬之所攀玩也赫赫閟宇玄之又玄長廊霞截髙殿雲褰實吾君聿修祖德論道設教之筵宜乎蒔以芬馥樹以貞堅莫匪夫松篠桂檜茝若一作告蘭荃猗具美而一作其在兹爾何德一作斯而居焉擢無用之瑣質蒙本枝而自庇汨羣林而非據専廟庭之右地雖先寢而式一作或薦豈和羮之正味每俯臨乎蕭牆姦回得而窺覬一作伺諒何惡之能為終物情之所畏於是命尋斧伐盤根密葉剝攢柯焚朝光無隂夕鳥不喧肅肅明明暗蕩乎階軒嗟乎草無滋蔓瓶不假器苟恃勢而將逼雖見親而益忌譬諸人事也則翼吞并於僣沃魯出逐於強季綝崚擅而吳削倫冏専而晉墜其大者虎遷趙嗣鸞齊明帝名竊齊位由履霜而莫戒聿堅氷而洊至嗚呼乃終古覆車之軌轍豈尋常散木之足議府庭雙石榴賦以平生少年日為韻吕令問公府洞豁羣木羅生歷衆芳而選妙得雙榴之美名擢質森聳垂隂淒清掃危階之數級蔭間庭之四平夾砌駢羅則東西表賔主之位與時消息則寒暑任榮枯之情故其異影同庇分芳對出夏景焯而開花秋氣結而成實剖之則珠彩輝掌捧之則金光照日其生也雖雜居幽徑之蘭其用也亦間居雕盤之栗若乃當公務之總偶訟庭之要爰趨爰揖或長或少皆指而稱曰彼石榴之所生何託根之至妙俯環廊之回合拂危簷之窈窱類甘棠之勿翦人縱去而猶思若李樹之無言蹊自成而不召是以固其根幹美其華苕乍開軒而翠彩重合褰帷而紅榮四照也或曰物惡近以招纍事貴逺而克全空遁幽以獨美抱甘香而自捐豈比夫善生者託仁以逺害能夀者輔道以延年是以象疑作蒙君子之惠渥故終保夫自然尚書省梧桐賦以託根得地藏器待時為韻崔鎮惟皇立極建都河洛會府疏庭珍木咸若偉梧桐之嘉遇竟因人以勝託傾鳳翼於朝陽偶鵷行於祕閣貴有常尊靜為躁君花繁翼子幹直謀孫履素至潔體柔常存揭日月以曜頴含雨露以流根豈與夫龍門半死嶧陽孤植齊萬籟而混吹合千巖以共色徑質氷摧而野人莫識髙標風折為樵人所得求知音於㸑燃論分理於繩墨且間之以生死又焉議夫通塞故至人以全身逺害君子以自強不息失其理山林不足以攝生順其道朝市何妨乎育德梧桐生矣自逺而至輕去無何之鄉不居有過之地謂繁華兮國人服媚吾獨後春而翠謂搖落兮物情共棄吾亦先秋以悴不改節以邀利不立名而自異必居常以待終將百慮而一致大年椿幹梢雲豫章箘簬貞徑桂椒信芳百果甲坼於金谷千林花發於河陽實繁者皆折材用者先亡我異於是于何不臧布清隂於仙署棲白雲於帝鄉旁連杞梓俯接琳琅蔚金蟬之氣色耀錦帳之輝光我封我樹無臭無香後天年於社櫟用當代於甘棠得喪齊致語默兩忘吾不知夫支離之德何獨攘而自出蘧瑗之智何獨卷而自藏復有剪刻為圭琢磨成器龍章鳳軫金符玉瑞平君子之心戒王者之戲晉侯得之諸侯麇至子野得之玄鶴來暨雖信美於疇日未若兹辰之佩仁履義我求懿德於是乎在疏相比逺相待以其彚征成而不宰譬諸草木生植有時除惡務本樹善務滋引之斯至權疑之斯離角弓兮有什枤杜兮陳詩敢告在位如何不思念兹在兹庶疑作恕事順施苟求夏隂與秋實無拔楊以樹茨紫宸殿前櫻桃樹賦以日月所照榮華先發為韻張莒殿紫宸兮足麗木朱櫻兮可嘉扶疏柔弱暈艷芬葩晚移隂於丹楹朝延影於翠華美其固本宸居獻名清廟藹緑含彩攢紅吐耀晴暘斜映將藻井以相輝初月旁臨與璧璫而共照於是玄律方變青陽始萌日近易暖天臨早榮通條液潤附節茸生秦文信之著令漢稷嗣之從行莫不勤其時獻旌此嘉名將畫栱以斜界與金華而對明玊輦行低雲旗雜處迎華柱而搖露向朱明而清暑榮得其時摘得其所於芳也可尚取類也無匹淨拂璇題逺當溫室舊株昔移於漢囿密幹今逢於堯日及夫春宿微雨秋含翠煙冬條雪染夏實珠駢垂一枝於萬葉託沃土以延年玩芳誠百花之首充薦乃衆果之先代帷房之錦帳奪首飾於金鈿濟濟多士鏘鏘拜闕拂露華以晨趨染香花一作花香而夕謁始凌寒而驚换才及暖而前發自承疑存於攀賞固無憂於翦伐伴穠李以表年笑階蓂之記月豫章賦敬括東南一方淮海維揚爰有喬木是名豫章根坎窞篲天綱鬱四氣煥三光矗縮雲聳離披翼張一擢而其秀頴發七年而其材莫當懿夫倚荆衡連楚越回合湘沅之浦芬敷吳會之闕點一作黯彭蠡而煙垂汨滄浪而吹發清輝艷艷朝灑陽臺之雲翠影亭亭夕皓吳山之月爾其孤幹直指交莖亂傾紺葉煙緑朱華日明掩蓂靈之光價奪若木之芳榮卉不暇植蔓不及縈總此衆美疇之與京其下則啼飛猱逐暴武突兀鹿麌爪牙鈎弩盤逰其下蓋難勝數其上則陸鴻漸谷鶯遷孔翠曵曵鸞鵠翩翩翼翳日聲聞天巢集其顛動盈百千嗟乎不菌不輪有典有則闕其材也直空懷寶以自棄諒斤斧之未識日者龍宫是構鵲觀云修罄山林之木應榱桷之求何獨不見千金而留為媒紹也闕為出處也幽為爾不任大為賢而致尤今叢木之所忽吾亦為之心憂借如將趙括於上軍秩長卿於下令良驥為鹽車所伏谷松為山苗所映以曼倩而等侏儒尚俳優而輕雅正雖物情之共爾故君子之攸病向若廓君之林池充君之苑囿膏澤既沐鴻休亦覆門柳不可齊華庭梧不能獨秀已矣夫用之則哲抑之則沈隨取捨之攸措何棟梁之所任梓匠之瞻望靡及江潭之嵗月空深誰當徙植天池畔終冀成君桃李隂建木賦廣都有建木焉大五千圍生不知始髙八千尺仰不見巔過雷電一作雨遺雲煙倚白日磨疑青天靡蟠桃於度朔之上毫若木於滄海之邊斯未足竒者天收寸雲日在午位明白宇宙光嵌燭祕枝枝攢太虛外青葉葉積元氣間翠無一點之影落之於地故自當玊京之要得天下之中左右仙翁前後玊童潤璚露飀祥風五雲翼之而斐亹八景含之而玲瓏帝或自天而降天寧假羽翼帝或自地而還地不乘虛空以我有飛陸之力以我有太階之功必我之由忽乎遂通如此見其真宰之意生巨材而不易上帝之心寄巨材而亦深不然奚至是哉俗人生代重疊詭譎其或不聞聞之或不信境之絶信之或不往往之或不到智之劣自非天付洞微神與明哲樹杳杳而何在身紛紛而已滅士有以廣都為帝王之宅以建木為台階之臣自謂未達仰慕斯人髣佛雲霄徘徊風塵若巨材之一見希謁帝之有因蟠桃賦以髙捧大明以觀環照為韻獨孤授東海神木是曰蟠桃可得聞其廣而未量其髙蓋蒼龍之所臨據白日之所先照結根於凌北之峯稟氣乎衡星之耀其生植也與乾坤始其蟠縈也至三千里上鳴天雞下宅鬱壘徒駭於説莫原其以配若木以相望冠扶桑而特起爾乃煥初陽之杲杲壓巨海之漫漫太皥司方以流眄羲和䇿御而上干傾髙柯而飛鳥罕及隨巨葉而青雲共蟠何帝休之名志豈姑繇而變觀窮海陸以標竒抗蓬瀛而爭聳疑蒸林之相合乃一木之所擁照溟海則攀其若浮升日輪則逺視如捧霜雪莫能以凋换風濤庸得其震傾拂垂雲之修翼蔭吹潦之長鯨非有嵗之可紀每先晨之效明拂青桂於隂魄掩白榆於太清信植物之神秀壯元化之曲成木無與儔其誰騁兩鬬之術子不可獲安有被三竊之名是知瑰異之説或處明而若晦區域之心多玩小以疑大天無所不育地無所不載莫出混茫之中咸居耳目之外偉蟠桃之遐絶宜列仙之逰會安得探神物而駐韶顔涉滄海而登朔山驂素虬之夭嬌駕綵鳯之回環庶因此以捧日願修條而一攀海上孤槎賦滄州一望兮其傷實苦靈查萬里兮越在海浦何遭遇於聖日獨埋沒於重土島嶼雲深風塵嵗古可為萬乘之器郢匠未斫願作浮海之桴魯人無取不取其材又無良媒驚沙若霧激電奔雷根柢折枝條摧勢窮兀兮半隱青樹色蒼茫兮渾生緑苔波濤灌注同汨羅之洲渚川澤卑濕類長沙之浦隈釣客登頓漁翁往來自然形變為枯木心成於死灰誰憐盤根之春當擢幹之日對上苑臨溫室植紫柏以獨秀蔭朱城而未出春風驟入花飛微一作霏霺而雪下晴煙四斂葉布濩而雲密誠以負大厦之材濟巨川之質何斧斤之為患使形骸而自失悲夫昔之繁華也如彼今之搖落也如此故知道不常泰亦不常否物有萬生亦有萬死事既同於糾纒庸詎識其終始彰周公之聖則大木斯拔表宣帝之興則枯柳還起君無曰枯查委之泥沙試斫為仙枕薦於公寢必能夢華胥之神國安蒼生之庶品君無曰散木棄之溝瀆試剖為犧樽登諸廟門必能縮苞茅之醴酒降重天之渥恩濟美前烈垂芳後昆願君無棄於海上乘以登天朝至尊桂林一枝賦以題中四字為韻崔琪倬彼衆木者其桂林一枝淮南擢秀月上標竒光雨露之新沐拂香風以徐吹故能使皓氣凌空孤隂耀質心既丹而不二花又白而純一凝霜隕而色鮮嚴景凋而葉密若然者固將與大椿而爭長豈徒挺小山而間出至如孫𢎞已落郤詵未第沮塵色與灰心然粒玉而燼桂孰謂連卷銜半死之質特達承再生之惠淹留君之庭芳郁君之砌惜矣哉向使便辭仙客永棄幽林委根不用之境滅影空山之隂又焉能擅昆玉之髙價吐嵗寒之宿心彼徒見零落燋梧再斫恩深於既往殊不知摧殘朽桂一枝重遇於當今散木賦孫柲窅窅冥冥至道之精視之無見聽之無聲伊散木其何識乃沖用而保生夫其措迹隱深寓形偏寂青崿一作蕚右聳紅溪左闢潄滴瀝之飛泉枕嵌巖之古石將含休以處順不祈祿而自適故其幹也閜砢二字出上林賦盤魄蟲穿鳥剝其節大兮不可以為桷擁腫輪囷抱蠧生津其軸解兮不可以為輪空心兮若喪拳枝兮不申理不中於規矩才豈任乎斧斤似支離之有疾固哀駘之入真日者秦構鳯凰漢營鳷鵲崇臨海之殿豐冠山之閣窮宇內之瓌寶盡域中之蘅薄雖片善之必收故散木之不作用能以損之益居貞而晦不恃而成不有而大白雲至止雜蘿薜以成帷清風來兮協笙竽而吹籟異鵲宵集祥鴛曉會隱士挂瓢仙人倚蓋不逆於物夫何於害及夫郊暄淑氣景媚風煙夭桃變兮穠李發乍揚芳以競妍既乎寒露朝變凝霜夜結樝梨剝兮橘柚摧淡無情兮何折動息無撓榮枯任節道將契於櫻寧德以庶於朗徹與夫五柞三槐仁賔君子東吳豫章西蜀蕭杞文杏聳於千尋木蘭香於十里皆虬蟠鱗接重葩疊葉杳藹芊眠拂日摩天根柢深固表裏巖泉並恃材而喪質咸為名而夭年是知明不若昧語不如默為善者離其道立行者隂於德社櫟入夢而幾亡野桑因言而自刻豈若聖智雙遣形神兩忘委不才以居寂任無用以為祥鬱鬱於純冥之界落落於無何之鄉與天地而長久吸日月之明光蒙子休聞而歎曰吾且逍遙其旁文苑英華卷一百四十四
