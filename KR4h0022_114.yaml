body:
  text: 文苑英華卷一百十四宋李昉等編圖畫徴君洪崖子圖賦一首圖畫功臣賦一首凌煙閣圖功臣賦一首繪事後素賦二首青出於藍賦一首白受采賦一首五色比象賦一首黃賦一首誤筆成蠅賦一首徴君洪崖一作崖子圖賦以雲際長松以表貞節為韻歐陽詹矯矯徴君居幽行聞朗詠堯年之日棲遲姑射之雲英英時傑好竒藝絶窺窮圖畫之能寫得隱淪之哲豈不以懷材習技我韞跨俗之工履道全真彼有至一作過人之節者也觀夫杖藜載酒面石依松盡是山中之意全移物外之蹤入室終窺知裂繒而畫出升堂始睇疑在野而相逢實默如言如行實止蘿纎纎以垂帽草青青而藉履洋乎令聞昭晰得其所由儼矣一作夫儀形髣佛知其所以原夫賢達作範丹青立程將模前而示後必體物以一作而歸成服唯身表容實心旌對氷雪之顔覩蘭蕙之纓暗識伯夷之潔遙憐虞仲之貞知身已謝看畫如生矜且復莊若此辰一作晨之有識貪之與欲同在日之無情形如一作似植以亭亭衣如風而曵曵臨諸瑶席之上想彼雲林之際萬物方秀千峯初霽神飄飄以自逺身悠悠而不繫我之心矣惟賢允臧披圖畫於是日得夫君於一作乎此堂乃知君之於德也大畫之於工也長畫非君無以展其妙君非畫無以一作莫得揚其光物有相假不其昭彰揆人事之美惡論功庸之夥少伊畫也可以稱智者之先惟君也可以作真人之表者也凡一作皆集本圖畫功臣賦以立定爾功惟克永代為韻錢起先帝之革隋也應歸運而大義舉獲仁人而鴻業集及乎計代一作伐録功日不暇給寶玉不足以勸賞故茅土是封鍾鼎不足以昭宣故圖贊是緝傳厥象於繪事壯崇臺於天邑貔武之臣忽披雲而鶚視股肱之佐乃捧日而山立何惟肖而斯在皆凜然而可挹初庶賢遇聖神器未定天有彗兮厯象昏雲從龍兮川谷應帝曰隋失厥御國將頺弛人心如惔王室如燬膺圖受籙明徴在豫保大定功克成伊爾由是十亂輔主三傑制一作總戎敢揚休命克贊聖功掃乾坤之墋黷陸機功成贊上墋下黷墋楚錦切濟品物之屯蒙闢天關而七曜再朗廽地軸而萬宇來同暨王道平夷乃念茲而在茲既艱難是毗亦四方一作康濟或作幾康是維享其勳力嘉彼令德懿我武之雄成類爾謀之剛克冝其藏勳庸於盟府圖冠劔於紫極則是繪也其麗不億倬哉羣彥丹青彪炳列盛服之暉華儼髙居之祕靜斜月在壁疑假寐以將朝頺陽半軒同處隂而休影胡像設之既固將山河而惟永則知我唐大賚光掩前載功髙賜履追吕望於周年鳥盡藏弓異韓信於漢代盛矣哉容貌方崇光靈不昧凌煙閣圖功臣賦崔損粵若聖唐之馭極也寰宇克清鴻業再創纘功臣之烈紀重閣之上圖照日而增明閣凌煙而益壯勳庸是表威儀可望昭昭兮藻繪之容灼灼兮丹青之狀遠而視疑列仙之臺逼而察識公侯之相縹眇兮映空色而遙徹咫尺兮近天顔而內向稽其義知聖君之膺時覩其象知忠臣以應期叶雲龍之潛會合魚水之相資覽炎漢之前規寧或比矣徴疑大魏之往制何可尚之懿夫容彩彰施氣肅端儼風存正直色形恭儉若進忠以欲諫如率禮而有撿處其髙也方取貴於功髙居其險也固非同於履險則知君册勳兮旌於賢臣在圗兮參於前名位雍雍就丹楹而成列衣冠楚楚煥藻井而相鮮美繪逈超於雲閣崇勳豈比夫燕然是以皇心斯逺聖慮惟遐謀猷是念貞忠是嘉不然者豈徒飾藻繪之功悅輝煥之像對重欒之宏麗玩峻宇之𢎞敞而已也所以作其炯誡㴬乎勸賞有以讃丕績之奕休有以念前勳而存想徒觀乎苕亭二字見張衡西京賦苕或作迢天半巃嵸雲中容止有作光芒有融廓宇宙而翼聖配丹青而紀功藹城闕之佳氣被君王之德風仰之惟髙嫓星辰正拱於紫極望之不及謂申甫將降於惟嵩豈不遇聖明之主建公忠之節石有時而泐水有時而竭兹閣也不騫不崩表功臣之盛烈繪事後素賦以五色成文彰之在素為韻張仲素畫繪之事彰施於文表其能故散采而設雜其暈故後素而分運茲潔白之光綜彼深淺之色始其布濩終若組織成山龍華蟲之美實曰當仁後黑黃蒼赤之采二字一作而來固無慙德間精微而不亂蔚明麗之相得昭昭以著郁郁斯皇發衆狀而逾出映繁文而益彰奪朱紫兮不能爭其要汙白黑兮無以損其光于以界道斯能辨方一作于以成章昔實瞻之在前昭其本始今為本者居上爛以主張素為繪兮事惟從古禮於繪也義實斯取其素也同至淳之得一其繪也合比象而為五理衆者寡豫惟汝明無使輝華自混庶使毫髮難并處皎昧之間造形則辨居有無之際遇物皆呈雖欲勿用曷其有成乃知作繪者惟文是務言詩者在理為喻故得盡飾之道不愆於素探周禮冬官之職諧衛風碩人之詞爰遂事而乃眷幸全功而勿疑質不勝文孰謂何先何後白能受采有以顛之倒之胡未至而取誚豈卒獲而能期不有分布孰為文彩恆起豫於後進潤色斯存苟棄我於已前一作然人文焉在美矣夫繪事之義所以刑萬邦而昭四海第二以瑟彼玉瓚黃流在中為韻穆彼作繪聞諸色工增乎華諒以文為質分乎像示一作亦非素不終惟繪也成文不亂惟素也允執厥中蓋以昭聖人微論諭君子飾躬豈分黑黃與蒼赤列山龍與華蟲已哉古人自古人以下二十九字一本止有以青丹之章以盼倩之玉十字以盼倩之姿彰敦朴之俗知女得其禮不専於舜華士有其容或同於冠玉雖言詞為藻繪威儀為朱緑自可果行不回持禮自朂亦猶布衣者以質相從為業疑者以絢相屬借如葉公之繪飛虬也蟠蜿驣驤非素則其勢不揚漢氏之圖明妃也嬋媚窈窕非素則其容不彰是以間其文彩布厥玄黃譬瀑布之界道如溝塍之畫疆然後五色成文班簡而不雜遐方圗物賦鼎而可詳且無文無質其比如櫛何貴専一之琴瑟不雜不亂其間如繖自同流中之圭一作玉瓚既點綴而無遺一作違亦聫綿而不斷原夫染人獻色工人始謀巧心方逞濡翰方流似刃地之無礙疑繭緒之方抽入衆色之中自分文質發羣像之表如别薰蕕且殊受采之性寧有奪朱之憂則知素之體也真繪之色也侈守厥貞白雜乎麗靡理衆惟寡既以一而處多守朴不雕遂出此而入彼將黼黻而奪麗匪一有組字織之所擬别有彬彬向就屑屑行諸志惟厲乃仁則依於期霄漢之振拔假詞賦為蘧廬讀孔聖之言雖云由已承卜商之問終愧起豫青出於藍賦以純粹積中英華發外為韻李程藍藴嘉色青出其中諒究本而不異由入用而靡同渥彩必因乎外發至精不得以內融暨乎時日既臻染人云至備震方之正色遵周官之故事行採之際詎盈詩人之襜俯拾之時亦異炎洲之翠非取榮以玩悅將有求於精粹比夫珠研而益丹劒淬而逾利惟英華是揆惟混濁是棄曷捨彼而取此信本同而末異當時所營盡彼精英被以純深之色總乎遷染之名隂隲四時輿服因我而更御彰施五采玄黃待我而後成初類含章而潛伏今若開輝而發明豈不以蒼然之迹始分煥爾之英久積研精逾麗昭章可覿謂玄之又玄符益之又益則明珠之剖巨蚌美玉之出藴石彼皆異狀而竟殊此則一變而不易且夫色無以加孰曰取實而去一作棄華光不可昧必惟自中而形外故臻乎極而不失其色發乎深而其用惟新積而成形等氷寒於水演而大義同絲出於綸俾夫外則文為藻繢內則體合一作含精純故煙生於火配乎物情根於性本於仁子貢賢於仲尼莫知功倍季孫富於魯國孰謂德均君子思端本而肇末恥後先以超越故取斯而喻斯謂不悱而不發白受采賦以苟非忠信道不虗啓為韻獨孤授白者物之正色采自人之發揮有善政之功何不合執必疑遷之性詎能非所以投質而丹青必應改作而玄黃莫違玉色可移酒變美人之貌素容可比塵緇遊子之衣始以潔白為佳無文是寶流行於一掬之緑遷移於五章之好假乎異物奚謂莫知其他變而從宜匪曰不恆其道是知白之美者采必加諸始謂不愆其素終成求媚之虛潔其身敢望於潤色汚為染勿訝其文如露變盤中之文氤氲而乍結雲改封中之色燦爛而潛舒然知素以為貴文而後進棄彼涅而不緇從我動而無競一作動無不順知其白不足以含章美其文必滋乎彩潤豈舊染於姦色因物有遷自委質以成文非我無信於是推其嗜好窮其妍不虛白為文藻之宗繪事為朴素之後坦然明白佩此以飭身婉而成章是期乎假手若以考自然之性明發彩之功専其容知變以為義形於色不雜而為忠英英之雲抱日之文何染鑿鑿之石補天之力何工如以素質莫問竒文是啓耀之以不慙之文居之以勿執之體可黃可黑將興墨子之悲或素或青未易殷王之禮不然者何以麻衣雖白兮采服斯有如雪之潔兮如濡已受黔生白鵠之羽赤點青蠅之首發顔色兮不辱其身離堅白兮莫失其守懿夫明斯理者然後知吾道之不苟五色比象賦以車服有制示不徒設為韻陶拱聖人以王命之施官秩之設貴有品類賤有等列望之可辨非旌表而焉知出而身疑自殊宜車服之有别於是招繪素之黨召彩筆之徒程亂目之衆色寫外物於百夫以侯伯子男之服為飾以山龍華蟲之象為殊莫不煌煌熒熒燁燁煜煜青為山兮曉疑嶷而爭峻赤為火兮赩熾而含燠粉米以純白而璀璨宗彛以太玄而馥郁二字一作黝倏翬一作綷而為羽則振迅而對飛暈而為龍則跨騰而相逐蓋上古之禮制亦當今之法服必謂美妙無盡精微有餘侔桂月之規縱麗天而莫勝擬海藻之質雖摛文而不如實逞巧之無比信取象而靡虛豈徒用别於涖職蓋亦或施於乘車懿其創自於心成之在手或大之者不遺其美惡小之者不失其妍醜此實權等於真宰功齊於妙有所以作國家之程式辨王臣之印綬歷萬代之恆規經百王而共守不然者法實紛糾制有允休何必假其彩色之炳煥於君子之衣裘合九章之物者則寫非五等之服者則不故往代垂模明君立制一則爵命之易辨一則制一作物容之昭麗宜乎嘉其義重其事佐盛禮而罔易垂後代以永示信哉表德之為良亦美作者之深意黃賦以平上去入為韻張階堪輿之內羣象茫茫均四時之辨物列五色以居方名可大者其惟中黃吹律成音考定宫商之韻麗天為則遙分日月之光石在榖城之下氣流華闕之傍雲瑞命官而共治星見知芒之莫當恆發揮於曄曄寧見混於蒼蒼黃之為用時義大矣揣稱之功請言其始土德載物首更一作與王之五行河水流謙恆曲成於千里鶴拂羽於太液龍弄鱗於成紀悲哉秋之為氣嵗將暮止菊花可折凝曉露而含光木葉既零拂涼風而亂起夫惟色有其變用無不遍染素絲之正色映飛塵而不見合氛昏而慙隱向晴暾而復見漢霧塞而呈災秦蛇夢而命奠乃有虢國窮士非聖不述務本於三學道於一雖觀色而託賦猶守中而靡失希執念而見升願啓心而就日誤筆成蠅賦以象從誤致補之如真為韻謝觀曹氏之蠅因誤而致既失手以傷善乃象形而取類胡能有定將飾非於寡尤變而從宜善奪真而不異原夫裂素凝璧纎毫露鋒展霜花以雲薄墜松煙而漆濃於不可為之處見不可去之蹤處小瑕之間義寧有怒居大白之上汚實難從由是潤色成功從權善補逐手見營營之狀隨筆長薨薨之羽乍若蟋蟀之居壁復類蠨蛸之在户然而迥立素絲不失毫釐侔止樊一作蕃之貌類附驥一作鶯配扇之姿當似是似非之前吾與點也於一顧一盼之際默而識之將起枚生之説那虞翟子之悲然而就之不爽酷得其象雖違心以著可悅目而賞隱映纎絺之內囊螢處中附麗紃組之間牖蟲將上嗟乎巧以飾詐假能亂真始自不材之點俄成有用之身捷捷幡幡誘讒人之思發跂跂脈脈透輕綃而色新已而吳主是臨竒工斯布左右歷覽徘徊周顧覩詩人止棘之體絶王思立筆之怒迷邂逅之所致載揮拂而方喻將特模於手成了莫知其筆誤懿夫汚不足誚瑕豈難除知過善改巧思橫舒卒能珍賞玩之不失成竒文而有餘彼田夫之禾麥出博物志景山之鯉魚方之不如文苑英華卷一百十四
