body:
  text: 文苑英華卷三百七十一宋李昉等編紀述二金剛經報應述一篇甘露述一篇表醫者郭常一篇陸歙州述一篇牧守竟陵因遊西塔著三感說一篇國學官書一篇書何易于一篇金剛經報應述并序獨孤及洪州牧刑部尚書兼御史大夫魏公身挂𤣥冕心冥真如昔常奉般若法以𢎞正見雖顛沛造次心與經俱十有若干年矣皇帝中元年冬十月車駕有避狄之師百僚蒼黃南馳商於公為盜所攘而亡其經其往也匪家之念唯經是悼行與其獲七寶也寧見經生與其亡四句也寧捨身明年王正月大駕返正公為京兆尹痛𢎞誓之未從也則唯書籍是圖求經於𤣥法寺之藏藏人以送公發函披卷乃商於所亡之本也問守藏云集無云字亦曰不知其所自而能得公瞻禮悲喜捧持而泣然後知精專感逹故隨心而至昭報肹蠁其疾若答顧謂孟子太常博士友順志之或曰得與喪偶然爾何必謂誠感乎及對曰誠於此者形於彼故出其言善千里之外應之此以仁義忠信感於物者也况第一義諦超貫仁義自在慧力不啻忠信則因發而果從心誠而經還是法味幽贊非思議所及豈佛以般若之雨啓公善牙使因相以次集無次字獲願進啓集作登乎無願之法集作法之法歟不然何心境𤣥合若律呂相召嵗在乙酉公以異見告及跪而述之曰上士勤道精應集作誠若馳願形於心報亦隨之至感無礙經斯來歸護公身田俾公斷疑公之善根疇可度思甘露述歐陽詹甘露述昭孝德也貞元壬申嵗福州福唐縣尉清源莆陽集作田邑人濟南林公瓉太夫人終公每一痛至水漿不入口或三日或五日內外羸憊殆至殞滅癸酉嵗將與先府君修合葬之禮公之於親事存既竭其力送終思盡其勤曰含襚品章則有王度不敢越也塋域固護實在我功當懇而行之於是躬開坎室自埏磚甓與兄弟手攻肩負以鑿以築雖率情性而無愆法度不違曲集作典禮而有異常儀載考載理而未之窆春三月五日忽異氣自天氛氲下蒙非雲非煙羃羃綿綿綵耀光鮮馨香馥然起朝及暝徘徊不散先是繞壠已栽松柏洎曙枝葉間遍懸露滴其滴齊大如梧子公竒之與兄弟及鄉人時相慰者而嘗之其味甘異於人間所甘之味日漸髙不銷不晞轉堅轉明瑩然如珠集作珠相鏗然玉聲如是者三日覩者爭取或食或玩噫天冥冥其間蓄靈地陳陳其間蓄神靈無形神無身無形無言無身無聲苟有可褒以物而旌苟無可褒物不虛行其德常其物常其德稀其物稀豫聞甘露之說莫覿甘露之實其為稀也不亦甚乎今天為公而降公之德豈常德與况殊香啓途異彩相宣凝結集作豐珠圓光明月翻况堅者哉八字集作向日翻堅者哉則其至誠所招又多矣豫執吊禮幸獲而見珍聳不足遂為之述表醫者郭常沈亞之郭常者饒人業醫居饒中以直德信饒江其南導自閩集有其南二字頗通商外夷波斯安息之貨國人有轉估于饒者病且亟歷請他醫莫能治請常為診曰病可去也估曰誠能生我我酬錢五十萬常因舍之先以針火雜治導其血關然後輔以竒藥誡曰第槖慮塊居月餘估稱愈欲歸常所許財常不聽估曰先生以為寡歟常曰不也吾直吾之藥計吾之功不能損千錢而一作令所受非任反禍耳卒不內人以常為詐而責常常曰夫販賈之人細度而狹見終日譽集一作希售𣙜買計量於毫銖之間所入不能補其望今暴奪之息財五十萬則必追吝鬱惋寧能離其心且藥加於人病新去而六腑方憊復有悒然之氣自內而伐即不可救奈何彼方有疾時知我能治而告我我幸免之因利其財又使其死是獨不畏為集無為字不仁而神可欺者吾何敢歟沈亞之曰仲尼蓋言我未見好仁者惡不仁者而後學之徒未聞明好惡豈其言之憤不足畏邪今世或有邦有土之臣專心聚斂殘割饑民之食以恣所欲忍其死而不愧受刑辱而無恥是亦不仁甚矣終無有惡者若集無若字郭常之賤而行之又焉得不稱於當時哉陸歙州述李翺吳郡陸傪公佐生于世五十有七年明於集作于仁義之道可以化人倫厚風俗者餘三十年連事觀察使觀察使不能知退居于田者六七年由侍御史入為祠部員外郎二年出刺歙州卒于道貞元十八年四月二十八日也凡人之所不能窮者必準集作推之於天天之注膏雨也人之心以為生旱苖然也雨與苖運相違或雨于海或雨于山旱苖不得仰其澤唯人也亦然天之生俊賢也人之心以為拯憔悴之人然也賢者與憔悴之人時不合或死于野或得其位而道不能行憔悴之人不得被其惠膏雨之降也適然唯賢者之生時也亦然運相合旱苖仰其澤憔悴之人賴其力傅說甘盤尹吉甫管夷吾之類也時弗合膏雨降雖終日賢哲生雖比肩旱苖之不救百姓之弗賴顔子子思孟軻董仲舒之類也故賢哲之生自有時百姓之賴其力天也不賴其力亦天也嗚呼公佐之官雖列集作升于朝雖刺于州其出外集作入始二年道之不行與居于田時弗差也公佐之賢雖曰一作日聞已其德行未必昭昭然聞于天子公佐是以不得其職出刺一州又短命道病死天下之未蒙其德固宜然則天之生君也授之以救人之道不授之以救人之位如膏雨之或雨于海或降于山旱苖之不沭其澤者均也故君子不得其位以行其道者命也其亦有不足於心者耶得是道者窮居于野非所屈冠冕而相天下非所伸其何有不足於心者耶牧守竟陵因遊西塔著三感說周願古人之文有旌物而為者歌功而為者詭時而為者感舊而為者旌物諡也歌功形也詭時詐也感舊情也若乃折裂金石騷牢鬼神莫尚乎感也豫所作者其感舊耶客曰何謂也願與百越節度使扶風馬公曩時俱為南海連率隴西李公復從事公詔移滑臺扶風公洎豫又為幕下賔從容兩地七改星火今扶風公勳庸滿世文翰飛走續鎮南海作民父母而願才貌單薄亦為刺史繇是二客雙鯉殷勤於楚越隴西短齡閲川而物故豫感一也隴西先人諱齊物被大德嘗為竟陵郡守公生於守之日故名復嗚呼願以散拙忝公先人之州往為子僚今刺父郡悲夫隴西也歌鍾燼滅於池館九原極零乎薤露其感二也願頻嵗與太子文學陸羽同佐公之幕兄呼之羽自傳竟陵人當時羽說竟陵風土之美無出吾國豫今牧羽國憶羽之言不誣矣扶風公又願於羽者也代謂羽之出處無宗祊之籍始自赤子洎乎冠嵗為竟陵苾芻之所生活老奉其教如聲聞辟支以尊乎竺乾聖人也羽字鴻漸百氏之典學鋪在手掌天下賢士大夫半與之遊加以方口諤諤坐能諧謔世無奈何文行如軻所不至者貴位而已矣噫我州之左有覆釡之地圓似頂狀中立塔廟篁大加臂碧籠遺形蓋鴻漸之本師像也悲歟似頂之地楚篁繞塔塔中之僧羽事之僧塔前之竹羽種之竹視天僧影泥破竹枝筠老而羽亦終豫作楚牧因來頂中道場白日無羽香火遐歎零落衣搖楚風其感三也是為三感說七言詩以詩以語陳事扶風公覽三感之說豈得不酸涕濕目以著詞致於塔下冠願鄙章之首耶國學官事書周墀國學官郭彪之太原人幼即攻儒家書後得大通周公孔子旨奧又能明百家流落之言樂苦躬自養不愛苟受祿宰相聞以東國學風醨久學者不得官其中皆以豪人使授業者迷徑一作經顓業者墮心元和七年詔彪之為國學助教彪之承詔而來拜祭酒司業已即詣學乃家于學焉役馬一匹左右勞一二人大笈一給用生具以實其間彪之身修而貌古性不合俗尚首冠獸皮服用麻衣褒製襴袖濶帶髙羈履大屣至如禮公卿大夫亦是好飲流水茹野蔬與松柏之英不苟味膳又樂飲酒人有見者必置酒於前始飲即周告四座曰酒以和神熙性節之則經縱之則撓固不可為俗主酌挹授之禮命飲者自厭欲彪之盈引三爵而罷每凌爽詣論堂坐髙昧召七學諸生居不施廣裀長席俾鄰臂而座澄震聲音分析典訓至於一詞間咸以俗理引諭了入於諸生心胸中使䝉者縱歷千萬日亦不失其來由是得諸生每嵗纍及薦擢于有司彪之祿給矜孤餘即謀買居于山泉間蔽掩其光明嗟乎時畏奪祿分鄰者衆矣不然何不聞斯人于天子左右必翼揚君德倣治古道使今之時奮為虞夏殷周之風賢者昌不肖者藏公侯康而百姓康噫公侯卿大夫默於明者又無由得通九重聞徹天子聰明彪之內樂遺聞於上以得安性墀元和十年德彪之道於國學仰其風嘉國學得其官又憤遺斯人于盡諫位因書其事作國學官書書何易于孫樵何易于嘗為益昌令縣距刺史治所四十里城嘉陵江南刺史崔朴嘗乘春自上游多從賔客歌酒泛舟東下直出益昌旁至則索民挽舟易于即自腰笏引舟上下刺史驚文粹有呌字問狀易于曰方春百姓不耕即蠶隙不可奪易于為屬令當其無事可以充役刺史與賔客跳出舟偕騎還去益昌民多即山樹茶利私自入㑹鹽鐵官奏重𣙜管詔下所在不得為百姓匿易于視詔曰益昌不征茶百姓尚不可活矧厚其賦以毒民乎命吏剗去吏爭曰天子詔所在不得為百姓匿今剗去罪愈重吏止死明府公寧集無寧字免竄海裔集無裔字耶易于曰吾寧愛集作愛一身以毒一邑民乎亦不使罪蔓爾曹即自縱火焚之觀察文粹作風使聞其狀以易于挺身為民卒不加劾邑民死喪子弱業破不能具葬者易于輒出俸錢使吏為辦百姓入常賦有垂白僂杖者易于必召坐與食問政得失庭有競民易于皆文粹作輒親自與語為指白枉直罪小者勸大者杖悉立遣之不以付吏治益昌三年獄無繫民民不知役改綿州羅江令故文粹作其治視益昌是時故文粹無故字相國裴公刺史文粹作出鎮綿州獨能嘉易于治嘗從觀其政導從不過三人其察集作全易于廉約如此㑹昌五年樵道出益昌民有能言何易于治狀者且曰天子設上下考以勉吏而易于考止中上何哉樵曰易于督賦如何曰止請貸集作常期不欲堅集作緊繩百姓使賤出粟帛督役如何曰度支費不足遂出俸錢冀優貧民饋給往來權勢如何曰傳符外一無所與擒盜如何曰無盜樵曰豫居長安中文粹有十年字嵗聞給事中校考則曰某人為某縣得上下考某人由上下考得某官問其政則曰某人能督賦先期而畢某人能督役省度支費某人當道能得往來逹官為好言某人能擒若干盜縣令得上下考者如此邑民不對笑去樵以為當世在上位者皆知求財為功集作切至如緩急補吏則曰吾患無以共治膺命舉賢則曰吾患無以塞詔及其有知之者何人哉繼而言之使何易于不有得於生必有得於死者有史官在文苑英華卷三百七十一
