body:
  text: 文苑英華卷五百七十六宋李昉等編節度刺史讓官為楊許州讓右羽林將軍表一首為皇甫懷州讓官表一首為鄭資州讓官表一首為第二舅讓江州刺史表一首為臨川王嗣宗讓陜州刺史表一首為竇孝諶讓潤州刺史表一首讓容州表二首代獨孤將軍讓魏州刺史表一首為崔使君讓潤州表一首代裴相公讓河南等道副元帥表一首謝讓加銀青福建觀察使表一首代杜相公讓劔南元帥表一首代杜相公讓河南等道副元帥表二首代裴相公讓將相封爵表二首為楊許州讓右羽林將軍表宋之問臣某言伏奉今月二日制書除臣忠武將軍守右羽林將軍五色無主如驚葉縣之龍千秋來歸似對遼門之鶴中謝臣聞為官擇人集作才先辟之成務陳力就列古人之用心臣家本關西衣冠河曲素業將墜莫嗣英靈朱輪載輝謬承恩渥未盈一紀連刺九州西凉本六郡之樞南荆乃九州之會蒲藩關左之重鎮魏郡山東之奧區宣城襟帶於吳郊許昌密邇於周室每恥政逾期月乏來暮之歌候易星霜無去思之詠隼旟回復日忝恩榮熊軾往還多慙道路出居嶽牧負尸祿之譏入計河都待曠官之責不意天私俯宥睿奬曲成擢之類表無之字以心膂之官賜之類表無之字在爪牙之地非常之澤捧戴失圖天衛凝嚴北軍清切風霜劔騎頓𤣥武之仙闈龍馬集作鳥旌旗環紫微之帝座掌斯嚴祕必屬親賢臣也何顔敢膺殊寵當今鵷鴻接翼文武周身咸皆實已過名位未充量臣內求諸已外愧妨賢若使愚臣苟安於私懷聖授不允於清議陶鈞雖廣無路自容懼實由衷讓非飾跡伏乞垂收渙汗更授類表作侔瓌材軍司得人臣謂報國無任傾類表作欣幸愧負之極謹詣朝堂上表陳讓以聞千秋集作千嵗衣冠河曲集作族非河北關左集作關右充量集作充德為皇甫懷州讓官表臣某言伏奉今月一日制書除臣使持節懷州諸軍事守懷州刺史成命俯臨兢魂自失妨賢不退無德而升恩屢錫而知慙祿彌高而轉懼中謝臣聞國經選士有一善而不集作無遺天爵與能從九徵而可試臣薄遊憲府纍踐禮闈衣繡無執簡之才起草愧含香之列移官望苑日月其除驂駕梁園涓埃莫效剖符南峴既恧民謡集作既乏氓謡作鎮西河未寬人隱二一作三邦為政撫熊軾而無功集作無補八使回軒同鶴鳴而有薦遂乃謬霑束帛猥賜褒揚頓掩前瑕更延今寵山陽大郡河內名區桑竹蔭淇水之西井田雜邙山之北將何以潤通京邑化接神州雖勉三載之勤何補集作何階一年之借封畿之要歷選稱難臣也胡顔敢膺斯寄伏乞再求遺玉更網潛珠庶使賢才申共理之心集作能聖主得分憂之地無任叨竊之至謹詣朝堂奉表陳讓以聞臣所讓人别狀封進為鄭資州讓官表陳子昻臣某言伏奉某月日敕集作制以臣為資州刺史恭承璽命祗拜寵章匪服知慙循榮如失中謝臣學慚名術才乏器能而寶厯逢時金章坐忝題輿佐嶽無展驥之能集作庸剖竹專城闕懸魚之化坐嘯徒積主諾空慙伏惟陛下革命開基造天立極方且𢎞宣帝典大啓皇猷而四嶽觀風不虛其任六條班集作頒政允屬其人集作才臣疲朽已侵循良久昧將何式遏集作光刺舉允叶得人伏願慎選英髦集作博選英才克諧僉議使人光共理政洽惟良大周之命惟新愚臣之責攸息其所讓人具列集作如前狀為第二舅讓江州刺史表李嶠臣某言伏奉恩制以臣為江州刺史寵命載臨憂惕若厲臣某誠惶誠恐頓首頓首死罪死罪臣行疏道缺學淺藝空百里弦歌鮮蒲密之化六條贊二乏海沂之績幸屬乾坤改旦堯舜為君下邑多淳朴之氓太平無峻切之政遂得逾安高秩未抵直繩尚且叨價藩廷竊譽人口挂二星之光彩達九臯於霄漢畫餅虛名孰云可録素餐厚責猶懼未弭不謂聖恩旁暢天造曲成錫大官之印綬剖專城之符竹飲冰懷炭內慙外悚况夏首西浮水陸交湊荆門東會舳艫相接是謂九江之府實殷三楚之郊旋顧庸虛本慙幹理將何以階浮獸之政術奉錫龜之職貢負乘之纍豈但於身災敗駕之憂慮虧於國重臣雖貪冒苟在進趨至於上負帝難下速官謗猶知恐懼不敢寢默伏願回光三舍收霈九天徵漢濵之翹楚罷燕宫之緹襲則共理之寄無蹇於外臺得賢之什復聞於中扆無任悚慙之至謹詣朝堂奉表以聞為臨川王嗣宗讓陜州刺史表臣某言臣謬延殊奬改牧大藩由中之祈已薦於宸扆恤下之鑒未回於霄極祗奉還命啓處失圖臣某誠惶誠恐頓首頓首死罪死罪臣地則葭莩質惟樗散實慙淮南好古之意有謝東平為善之樂徒以攀光日月藉慶雲霄遂得升降玉除珮服金璽四科取士本異賢良五等建侯自緣恩澤常懼貽纍宗室取笑衣冠上缺麟趾之風下招鵜翼之刺不謂聖慈愈厚天造彌隆收其十舍之才委以六條之任雖臻榮益觀竊忭於如絲而謬職妨賢顧慚於匪一作篚服况神臯名嶽天府上腴是殷帝畿實始王化東則二南作頌有周召之餘風西則三輔式歌望趙張之遺迹顧循庸昧本慙政理將何以肅應殊典崇藩屏之位繼踵前良致京師之福不能者止竊銘於夙心非據必危敢忘於大誡伏願暫紆聖鑒俯收愚欵永懷至公之道特寢曲私之澤則符竹有寄長無尸素之譏槱薪得才不失朝廷之序無任慙懼之至謹重詣朝堂奉表陳請以聞為竇孝諶讓潤州刺史表臣某言伏奉恩制以臣為潤州刺史祗奉寵榮俯仰慙惕臣某誠惶誠恐頓首頓首死罪死罪臣尺澤輕生斗筲淺一作賤品行非三德藝乏四科屬雲雨曲成山川廣納遂得差肩冕笏簉羽鴛鷺自兼一作秉司天地副象河海空陪九卿之末詎達三禮之源柏梁賦詩徒述鐘磬槐市講藝更慙几杖當曰一作用妨賢獲罪豈以稱職為功而皇矣高臨霈然降澤乃為棘寺還剖竹符入奉千乘之尊出當六條之寄叨恩竊幸自初洎末夫以下邑樹風是惟政本外臺驅傳實總人極薛宣以理劇有才滿歲加授龔遂以撥繁無效數月召還力選前獻實資共理安可使赤紱虛忝素餐高詠伏願敦名器之實絶過謬之私更簡良才言刈其楚則山谷耆老方懷樹李之觀江湖吏人不起伐檀之刺無任悚懼之至謹詣朝堂奉表以聞臣所讓人具如别狀臣某誠惶誠恐頓首頓首死罪死罪謹言讓容州表元結集無臣結言臣伏奉今月二十二日敕授臣使持節都督容州諸軍事守容州刺史中丞充本管經略守捉使四月十六日敕到二十一日發付本道行營臣實愚弱謬當寄任奉詔之日不獲疑憂懼臣結中謝臣聞孝於家者忠於國以事君者無所隱臣有至切不敢不言臣實一身奉養老母醫藥飲食非臣不喜臣暫違離則憂悸成疾臣又多疾近日加劇前在道州黽勉六歲實無政理多是假名頻請停官使司不許今臣所屬之州陷賊歲久頽城古木遠在炎荒管內諸州多未賔伏行營野次向十餘年在臣一身為國展效死當不避敢憚艱危但以老母念臣疾疹日久時方大暑南逾火山舉家漂泊寄在湖上單車將命赴於賊庭臣將就路老母悲泣聞者悽愴臣心可知臣欲扶持版輿南之合浦則老母氣力難於遠行臣欲奮不顧家則母子之情禽畜猶有臣欲久辭老母則又汚辱名教臣欲便不之官又恐稽違詔命在臣肝腸如煎如灼昔徐庶心亂先主不逼令伯陳情晉武允許君臣國家萬代為規伏惟陛下以孝理萬姓慈育生類在臣情志實堪矜愍臣每讀前史見吳起逰宦噬臂不歸溫嶠奉使絶裾而去常恨不逢斯人使之殊死臣所以冒犯聖旨乞停今授待罪私門長得奉養供給井稅臣之懇願塵黷天威不勝惶恐謹遣某官奉表陳讓以聞再讓容州表草土臣結言伏奉四月十三日敕以臣前在容州殊有理政使司乞留以遂人望起復臣守金吾衛將軍員外置同正員兼御史中丞使持節都督容州諸軍事兼容州刺史充本管經略守捉使賜紫金魚袋忽奉恩詔心魂驚悸哀慕悲感不任憂懼臣某中謝臣聞苟傷禮法妄蒙寄任古人所畏臣敢不懼國家近年切惡薄俗文官憂免許終喪制臣素非戰士曾忝臺省墨縗戎旅實傷禮法且容府陷沒十二三年管內諸州多在賊境臣前行營日月甚淺宣布聖澤遠人未知有何政能得在人口使司過聽誤有請留遂令朝廷隳紊法禁至使愚弱穢汚禮教臣實不敢踐古人可畏之跡辱聖朝委任之命敢以死請乞追恩詔前者陛下授臣容州臣正任道州刺史臣身病母老不敢辭謝實為道州地安數年祿養容州破陷不宜辭避臣以為安食其祿蹈危不免此乃人臣之節其時臣便奉表陳乞以母老地遠請解職任陛下察臣懇至追臣入朝臣以為不貽憂歎榮及膝下人子之分不圖恩敕未到臣丁酷罰哀號寃怨無所逮及今陛下又奪臣情禮授容州臣遂行則亡母旅櫬歸葬無日几筵漂寄奠祀無主捧讀詔書不勝悲懼臣舊患風疾近轉增劇荒忽迷忘不自知覺餘生殘喘朝夕殞滅豈堪金革能伏叛人特乞聖慈允臣所請收臣新授官誥令臣終喪制免生死羞愧是臣懇願臣今寄住永州請刺史王庭璬為臣進表陳乞以聞代獨孤將軍讓魏州刺史表獨孤及集無臣莊言伏奉今月十九日制書以臣為中大夫持節魏州諸軍事守魏州刺史寵命光臨心靈震奪中謝臣才質汚濫學藝空疏往緣乏人謬參多士膏雨降而鮮鱗躍和風流而短翮飛遂以庸微纍升清貴天臺望重始預郎官帝贊務殷仍霑縣宰翊州司而罕效撫邊鎮而何功睿澤旁滋皇明遠照曲顧先臣之舊不忘支屬之姻遷臣以大樹之榮總臣以儀本之任既而力微招責祿厚延疴深慮即填溝壑不得重趨階陛伏屬天地仁慈聽臣入都醫療承恩之日頓減焦勞在路已來小將瘳健若何以仰祗嘉惠俯䇿疲駑當河北之奧藩忝山東之厚寄魏郡太守豈岑熙之可攀冀州刺史寧籍章之敢列伏乞回光斂露寢汗停綸矜臣竊位之誠遂臣量能之請庶知人之鑒影響不差循吏之聲朞年而至無任忝冒屏營之至謹詣朝堂奉表陳讓以聞其所讓人别狀封進為崔史君讓潤州表臣某言伏奉今月日制書以臣為使持節潤州諸軍事潤州刺史散官如故前命甫流後恩遄集進退惟谷憂喜聚門臣某中謝臣材質孤陋藝能鄙薄徒以頗承舊業遂得歷踐清資國庠司級一作衱既非所據六衛陪軒又無足採久欲避賢公府移疾家園不悟冲眷曲臨殊私屬委瓠溝東望始拜寵於韓臺竹里南浮遽遷榮於楚澤何以仰承皇寄俯緝氓謡伏乞日月回光雲雨流霈深惟鑒察改任良能則朝有至公臣知免戾無任屏營之至代裴相公讓河南等道副元帥表常衮臣某言伏奉今月恩制以臣兼東都留守河南淮西山南東道副元帥伏以東征之寄相宅之選皆周召之臣保釐統一也故二南風化見美詩人况洛邑經陸渾之戎有舊染之俗賴陛下發皇明以燭之布陽和以煦之流散稍歸傷痍甫起然猶師居一作君師之任宜得經濟之才自河而南至於吳楚節制戎律半於天下非宏略傑出功冠一時不可以專五侯九伯之征總衣裳兵車之會臣以衰朽薄劣待罪台司塵辱尸忝無裨朝政每趨宸陛益愧周行豈謂殊常之恩屢出非望注意之責并在微軀憂懼慙惶寸刻難措臣聞唯名與器不可假人審已量力未宜虛授若貪榮冒寵黽俯苟容神明昭昭必速其害伏望歷求類表作選百辟委之兼才以分三老之任用增九鼎之重則至公大行羣下知勸無任懇迫之至謝讓加銀青福建觀察使表臣某言伏奉五月二十五日類表無五字恩制授臣銀青光祿大夫使持節都督福建諸軍事福建刺史充福建等州都圑練觀察處置等使以今月二十一日類表作二十三至所部上訖臣負恩至深中類表作睿慈曲宥待罪猶近殊渥荐臨一作加蕩滌瑕纍超遷方任寵榮非次荷懼失圖臣誠恐誠喜頓首頓首臣本性下愚起自孤賤代耕之望心在於斯經遠之道一作謀實非所及先朝驅䇿以奉綸言曲承眷私纍漸階庭遂參重務有斁彛倫未申報效永負天地孽由自作罪在難容伏以宸斷察微聖慈憫下抑羣議以屈法捨萬死以矜愚猶委藩條不坐親屬如臣之比前例所無戴感兢惶類表作感戴兢慙隕越無措一作惶折誓將沒齒效職南荒刻責自新庶補前咎常恐惡聲已被有汙於史冊朽骨縱歸實穢於泉壤豈謂天波一洗塵渣忽除靣目何施灰粉亦足聖朝使過始自庸臣特賜崇階超授連率減論之貸曾未周星録用之榮頓極今日素多孱劣又乏幹能將何以式遏外虞澄清列郡一作部幸遇德音頻降霈澤普覃惠恤困窮均省財賦盡除疾苦莫不昭蘇海隅蒼生自樂淳化臣奉宣清問遠布皇猷老少懷安抃躍相慶臣才非所任不敢冒榮必招無德之殃恐致負乘之寇伏請削除三品退守一州冀循恆資免至踰分庶回宸鑒俯恤一作遂血誠所忝榮班請授能者無任戰荷懇迫之至謹差特進試鴻臚卿臣郝誠溢奉表謝恩陳乞以聞代杜相公讓劔南元帥表臣鴻漸惶恐言臣本自諸生素乏經邦之具無才無行至愚至拙其所望者在得祿代耕而已往屬先帝中興時方草昧攀附日月遭逢盛時獲奉馳驅遂蒙委遇毫髮未報哀惶靡及陛下龍飛踐祚俊乂滿朝猶顧微臣使參大政備位宰輔出入六年上不能調和陰陽下不能親輔百姓朝典隳廢聖慮憂勞其心愧恥中夜三嘆况外統羣帥遙制戎閫在臣懦劣非所堪任曩者受命而行屬西南未安中外所主一作注雖有危難臣不合辭崔寧頃至朝廷親授經略及達一作還方鎮事頗條理叔明獻恭竝是良將自蒙一作承擢用甚允聲實可以倚辦竝堪獨任且將在閫外事得專之遠道取决恐失要會坐而臨制誠亦非宜今又靖謐臣何所效豈苟貪榮利以固寵榮類表作恩蓋鎮撫四夷宰相之任也陛下不以臣薄陋待罪鼎司至于疆事不修戎車未息實得參議任其安危無以一作所禆補皆臣之罪也何必一方之務獨有責成特乞下鑒愚懇俯停戎號則王一作天朝無兼授之寵臣下有知止之分昧死上言冀回宸眷無任惶迫屏營之至謹奉表陳露以聞代杜相公讓河南等道副元帥表前人臣某言伏奉今月日恩制以臣兼河南江淮山南東道副元帥祗奉詔書俯伏流汗驚悚惶灼若無所容臣某誠惶誠恐頓首頓首臣聞將帥者四方之守中夏垣翰也上以衛社稷外以撫戎夷前篇作四夷國容不入於軍閫類表作門戎事得專其將命漢讓韓信以安危存亡之地齊擢攘苴以文武威附之名所授既難所責亦重非才而處鮮不敗事臣固陋無識蒙國厚恩遭時備位塵辱華衮見貽胸奴之哂不副蒼生之望效拙無補六年曠官陰陽愆和政理乖度金革未戢水旱相乘常待罪於䇿免敢希恩於望外臣所以徘徊渥澤尚忝中樞豈持祿保身苟自容也以其瀝誠未鑒不敢固辭頃者即戎巴蜀總制羣師屬兩川未安遂任憂責而邊患稍息方隅甫寧此蓋慿神武之威用廟勝之䇿不然者將顛沛是懼豈望於天幸哉陛下覆之如天容之如地矜其疾病察以愚懇特蒙優詔獲上兵符喜忭未寧遽承新命東南至海俾護諸軍外綏四國專制萬里以天子二老之任會諸侯九合之師事之濟否所繫尤大在臣懦劣非所克堪誠願飾愚磨鈍展效毫髮以報所授之恩以勤所忝之職而器非所適力又不任加之衰老事多廢忘豈可訓師詰禁以張威武前篇作衆職伏冀求方叔南仲之賢授統一專征之寄天下大柄豈私於臣實恐傷陛下之知人干處士之橫議誓將死請輒露血誠輕黷威嚴庶回宸斷無任懇欵屏營之至第二表臣某言伏以智小識淺懇辭新命德音𬗟邈聖旨如初憂悸慙一作驚惶寸陰難處情有所迫再黷宸嚴冀天光之下濟期夕殞之無恨臣某誠惶誠恐頓首頓首臣聞以賢授任猶誡盈滿無德而祿固宜思前篇作勇退如或不量其分苟患失之貪榮冒寵以曠職事禍之所伏亦可畏也臣孤陋疵賤自視缺然遭遇類表作逢盛時謬此榮達得以貂蟬衮服趨侍雲陛擁旄杖節統護戎師崇班厚遇前篇作祿頓極於此退自惟省夙夜慙惶類表作懼內曠論道經邦之位外乏濟河登山之功但終恩眷萬不酬一四方歸責喧喧盈耳陛下矜其不逮近罷即戎未踰旬時又辱謀帥私懷爽絶以驚以怖昔光武見事於千里之外諸將授類表作受成算而已陛下聰明神武超然過之戡濟多難犬類表作一戎大定今天下方鎮東南類表山東最寧九字一作天下方鎮西最寧謐但委之將守授以經略自可致理又何足虞豈必以不才之臣竊一作授非據之位加之衰憊難於力强陛下知人則哲憫臣竊位之愚固當降殊私之貸開至公之選倘以懦敗事謗缺上聞雖欲宥之其何及前篇作得也昧死陳乞庶鑒愚誠祈於必從不敢有隱伏冀收春雨之既降回朝陽而見燭俾不能者止實望於曲成之仁也無任懇迫屏營之至右二篇又載五百七十四卷前已削去代裴相公讓將相封爵表臣某惶恐言臣聞無德而祿殃咎必至又鬼神害盈而福謙蓋經旨一作籍之明言聖哲之垂誡也臣儒門孤賤行拙性愚自甘散棄豈望榮達時來驟進任遇頗一作崇重備位將相無補聖朝道惡其滿天與之疾素有氣癖兼之風眩又多煩躁事劇則昏伏以軍國重務猥承參决强䇿駑朽以親事任精爽潛耗病源益深近日有加曠旬彌一作綿滯食不知味所進殊少形神憔悴惘惘不樂聖慈憐憫一作恤恤一作曲念微生御膳一作藥名醫屢蒙降錫霈然有喜載感於渥恩終亦無瘳復增其沉涸豈不以祿秩過量憂負在心强其不逮之分促其有終之限以茲速戾固亦明徵且臣子之急必告君父在臣今日實堪憐憫以陛下之知臣豈獨厚其爵位也以陛下之念臣豈不存一作全其骸骨也臣以冒寵則憐於危殆辭榮則安於攝衛伏冀特回宸眷俯察愚誠削除官爵使養衰疾庶垂白之年受賜於陛下生成之德有過於天地無任懇迫屏營之至第二表臣某言伏以衰疾沉綿久曠樞務憂惶迫切不敢自安一作專所以昧死上將相列侯印綬披瀝丹愚再有陳乞顧景待命還旨如初窮情未達轉益危困臣誠惶誠恐頓首頓首臣內顧微躬自量拙分無片善可取無一事可稱皆緣際會參務軍國尸榮竊位公責所歸且智小謀大鮮不敗事福過災生常然之理一自嬰瘵一作疾旬朔未瘳大减服食晦明異候竊料氣力衰憊恐先犬馬乞遂閒退庶安形神且臣素疵賤敢期貴達常慮薄質不堪重任今祿位俱極過逾涯分致此沉痼得非害盈思自損抑冀通神理又不親政事歷受寵榮廢公曠時益用慙懼所以塵黷旒扆至于再三情迫於茲敢有所隱愚朴之性陛下素知加以危頓豈容矯飾伏望罷其新一作所授貸以微一作殘生昔漢魏近臣有以期一作暮年久疾者則賜告就第或再起復位若大限未盡羸疴漸平聖慈不棄驅䇿非晚重得珥貂丹禁絛紫玉墀則微效獲申所乞無幾如或殆至深慮何必暫榮儻生遂其志沒無所恨矣實冀皇天聽卑於在上太陽回舍於志誠一作生成俯納誠祈退令攝衛衰朽餘齒殊私曲全受賜則多生涯之幸臣無任懇迫之至文苑英華卷五百七十六
