body:
  text: 文苑英華卷八百三十宋李昉等編紀事上伯樂川記一首鄭駙馬孝行記一首上元二年豫章冠葢盛集記一首京兆府司録加秩記一首宣州開元以來良吏記一首土洑鎮保寧記一首伯樂川記孫逖太原元帥黄門侍郎李公國之宗盟朝之俊一作唆徳以元凱之忠肅兼桓文之節制戊辰嵗秋七月公以疆埸之事㑹幽州長史李公于伯樂川王命也公一作以駕四牡鏘八鸞斾旌悠悠車轞嘽嘽乙未出于北京戊戌次于横野已亥至于㑹封人戒備軍吏宿設立㑹表于髙阜僻轅門於大荒漁陽精銳太原材力駟介八百徒兵三千戈如林羽若月少長有禮賓主不悖蚩尤衂其五兵若敖慙其六卒洸洸乎信可以懾穹廬而震髙闕也於是地主致餼以昭饗宴之禮君子有儀以訓上下之則歌蔓草之相遇笑投壺之失辭大庖既盈釃酒有藇胥樂周於卒乗屬厭及於輿臺慈恵之徳於是乎在夫幽州太原襟帶之地自河以北幽州制之自河以東太原制之在兩軍之交當二境之上厥有棄地皆為曠林守之則表裏之勢全舎之則候一作俟望之路隔公料以古今度其川原獻方畧而入覲於王議工徒而東為此㑹爰究爰度匪逰匪追蓐食無再舎之勤干諏左傳作干掫干胡旦切釋文諏通用為一夕之衛不愆一作志於素返斾而旋君子謂此㑹也能用典矣初公之始至太原也酌於人賦於事以為節用者國之善政於是乎減戌卒以寛其征修備者武之善經於是乎致秋集以襃其旅足食者人之所庇於是乎賞屯兵以丈其力近利者奸之所生於是乎禁和糴以懲其弊然後序山澤之險廣亭燧之虞候騎出於長城爟火通於大漠畫田定賦講射訓騶蓄信義為國寳修徳刑為戰器行之一年軍乃有節邊鄙不聳龔黄之教也雖魏絳有和戎之利郤縠有敦詩之徳申伯之式是南邦韓侯之奄受北國曷云比議未足量力公之與幽州李公也義均伯仲芳若蘭茝一作蕙蕑周諸侯以異姓為後晉大夫以同官為寮入亞六卿共行司馬之法出膺九命俱受元戎之律詩曰維其有之是以似之其二公之謂矣不書所㑹将何述焉揚厥美於一無此字萬斯年俾夫來世知二公相見在此川也鄭駙馬孝行記獨孤及特進駙馬都尉榮陽鄭潛曜其字睿宗外孫𤣥宗之甥代國長公主之才子也膚敏而文生知純孝開元中長公主寢疾公年二十八觿燧集本從内則元本作燧詩云容兮遂兮侍左右帶不解面不靧者累月嘗藥請禱憂懇備至而疾無瘳乃刺血濡翰書為榮集作策祝請命於上下神祗願以身代親之身乞靈祈死泣盡繼血既而誠逹於神感而遂契徹夜俟命焚其章畢集作草獨神道許三字在存於二字集作乎煨燼之中翌日長公主疾間公固命左右勿敢言其請天之章公之客尹靈琛之詞也向微靈琛言之則人莫知之者矣君子謂天道逺人道邇其死生㝠運吉凶隂隲未嘗與天同功也而孝子竭誠上𤣥為感神符靈貺來若響答乃知行或精至則幽㝠不能逃其應而况人乎鄭氏之子其事親也可謂孝矣惟武王周公與天合徳三壇之祝宜有丕應若公者地集作也在綺襦紈袴之中非有植璧秉珪之禮而精誠上逹神亦降福非徳性純至其孰能致感如此其速者歟公開元二十八年尚𤣥宗第十二女臨晉長公主主柔眀而賢輔佐以禮公力行好學處貴不驕䟦履夷險無替忠信歴太僕光禄卿嗣滎陽郡公佩金印列長㦸垂三十餘載克荷大業而崇其家聲善而必慶為不誣矣懼他日史氏闕疑也故著之於篇上元二年豫章冠盖盛集記鳯凰鵷雛翔於碧霄非梧竹不下而食賢人君子有四方之志非樂國不適其土豫章郡左九江而右洞庭按苗氏豫章類集作民之遺墟非觀風按部叅事蒞職者二字集作貳職則長者車轍莫由至也嵗次辛丑集有孟字春正月東諸侯之師有事於淮西是役也以蜂蠆竊發華夷類聚作夏震驚執事者匪遑啓居亦既播越我都督防禦觀察處置使兼御史中丞常公元甫克振逺畧殷為長城且修好於隣侯從交相見執集作敦同盟戮力之義圗靖難勤王之舉故三吳舟車八使冠盖名公髦士羣后庶尹輳輻類聚作輻輳鱗集其來如歸於是戸部尚書兼御史大夫李公峘至自廣陵越州刺史兼御史中丞杜公鴻漸至自㑹稽潤州刺史試鴻臚少卿韋公儇至自京口蘇州刺史韋公之晉至自吳廬州刺史唐書類集長史前尚書右丞徐公浩至自合肥由是越人吳人荆人徐人以其孥行駱驛荐至大江之涯於是乎𢎞舸巨鷁舳接艫隘輶車鸞鑣䡺挂轂擊每講射合禮賔主好㑹峨星弁執象笏鴈行而揖者五十有九人凡處八座者一歴中書者三尚書司轄者貳建隼旟者九冠獬豸者十乙其載筆掖垣曵裾廷寺分曹環衛典校蓬閣者印綬纍然若差肩駕於宇下集作印纍纍綬若若架肩於宇下駕肩類集作肩駕翼如也夫衛甸侯也以多君子而誇列國梁孝王漢寵弟也有鄒枚嚴馬之盛而焜燿後世孰與以類集無以字一郡之狹五湖之阻而濟濟俊乂馳軒冕而就客位者殆九州多士之半則鵷鳯羣翔而萃至集作止不若也彼昔人所稱集作平方斯其陋乎嵗二月楚氛掃除江介底定然後皆整歸斾分鑣言旋縶維莫從音徽將逺不頌不述後嗣何觀公於是謹而目集作月之且列其爵里名氏於舘俾來世知衆君子之車塵在此境也京兆府司録加秩記于邵司録之職雅有前志著乎屋壁舊矣自乾元元年四月皇帝郊於上𤣥用柴禮以報功也施恵行慶大庇於生人厥有條目其一在天下糺曹而加秩以為此官郡府之樞轄政之小大自我褒貶若網之在綱猶衣之有領襘人存政舉所益則多盖聖人之新意為國之大體由此作者時論宜之副相李公兼領京兆祗奉明詔深難其選自中及外心必叅之趙郡李侯春自監察御史出行虞鄉令到官九十日表之而還則向來之言無所闕矣希希字一作上布此令下乃宏舉咸有一徳庻乎賡歌凡厥能事此非所載猶恐逓遷之後混而為别不務首題孰一作貺為夫子愚以李侯同聲之故見副舉善之方謹而志之敢以專逹如後之觀者将辨乎始事覧此中記非公誰歟宣州開元以來良吏記陳簡甫君子所貴乎徳積於中而化行於外大可以篆鐘鼎次可以備謳歌所謂古人遺愛歿而不朽者也宣州秦故郡之地阻以重山縁以大江封方數百里而銅陵鐵冶繁阜乎其中故其俗佻而侈其人勁而悍屬鞬掲鈠者習以為恒易於冦􅔯昔號難治武徳中天下既定唯兹後附自是朝廷艱厥官非勲賢崇茂者文明中正者清貞孤㧞者法令峻整者無以刻符為邑焉先天之前人物緬淪矣自開元距今恵化浹物清循一作修邁倫故事傳於府中淑問存諸故老得之數公焉有若裴曜卿者兹公輔之器受分憂之任以為立政在於樹本樹本在於設教設教在於率身乃潔其源舉其端削煩苛布寛恵簡易一作易簡得而庻務修愷悌行而羣心化赭衣堊面者知禁鄉校黨序者胥勸自是宣人始服教矣開元癸酉嵗國家以天下久平四海繁富慮吏之不率人之不康乃詔分十道署㢘察以督之此州統江南之西包譚衡十有六州而班公景倩始受命焉公清㢘以飭躬苦節以從政以為法者國之柄天下之評寛則阿阿則公室之權削矣急則刻刻則下民之怨生矣江右荒服政紊俗訛濟之以猛弛張在我乃布甲令舉直繩恤人之疾苦除吏之貪暴踰年坐賄削免者百有餘輩澄清之政於是乎得矣有若竹公承構特髙孤貞行懿直方秉法以馭下去邪以為治鰥惸於是乎康豪奸於是乎息矣代班之政不易其舊閱嵗而屬城放黜者㡬乎前焉初上以遐方罔廸邦禁思文法之臣而二公繼蒞於兹政斯清人斯寧俾吾楚之俗不愆於度者二公是賴豈比夫延年有掃墓之稱郅都垂蒼鷹之號彼皆刻深而我不濫可同年而語哉有若裴公敦復者繼班竹之餘承法理之極變而通之使人不倦推而廣之使人知化振綱而羣目張舉大而細故削破觚為圎齊變至魯澆俗由是觀於義矣有若涇大夫李偁者行温而恭政清而簡不矯激以干譽不嚴厲以臨下反躬而令行存誠而化逹天寳初自太平長遷於涇涇與太平壤距而俗二㳺疑作洊為二邑僅盈十稔盖久於其道而恵和之徳漸於人之氣血矣故溢於去思夥於歌謡後卒此州長史以同鄉之愛歸竁於涇而家因寓焉廣徳初羣盗蜂軼連陷州縣人士罹難者比肩而李公之閭獨完由羣盗聚而保之且曰無忘其徳也於戲召公之化勿翦其棠柳季之仁不薪其墓傅亮修漢諸陵教曰展季之壟樵蘇有刑豈若凶㓂懐恵束手侵掠又難於古之人矣招討使給事中表公異而上聞詔贈宣州刺史旌善也有若司功掾張邈者清而亷謹而信非自公無以舉非禄稍無以入私謁杜於居官餽贈絶於故吏肅肅然有寒松真玉之操焉由是累辟使車令奉丹墀青㝠之階其在兹也昔在漢世黄覇課最於潁川魯恭化流於中牟皆異時齊芳髙暎簡牒曷若一州之政年未三紀而循良者六人歟大厯初兼御史中丞陳公揔方鎮臨此州緬想前哲徴諸輿誦以為旌賢者所以崇徳作頌者所以垂勸以數君之美霈乎在人而不播絃歌傳於竹素逶迤靡迤一作頽靡與尋常者共貫則何以激清風教發揮盛業歟以小子學乎春秋一有氏字世於文翰爰命操簡用紀餘烈其里氏族望期世家存焉故不書大厯乙酉嵗三月二十五日記土洑鎮保寧記符載夏口至西南四百里其山曰西塞其鎮曰土洑山鎮相距可百許丈崖岸中斷呀然摩霄大江浩浩横注其下其餘控荆衡走揚越氣雄勢傑岡連水滙者盖數千里此天用設險於吳楚也茍邉将不䖍化為豺狼以一鼓之鐵一丘之木撑鬬鍵鏁絶流束隘則江介之勝吞八九於鎮中矣在昔僭吳偏宋或攻或守年代紛綸莫不悉數永泰中代宗以董秦為淮西節度是鎮𨽻焉秦素兇戅昧懵王度乗先朝寛大之典幸是地咽喉之固雖無䟦扈之志而多割剥之暴至於士民工啇連檣如雲必将沿於斯泝於斯主守者乃髙其門閱厲其威容恣奸吏巧誣聽部伍强丐誤差毫釐誘入罪地輸其緡錢魚鹽丹漆羽毛小則半取之大則竭索之愁痛之聲雷動宇内小人君子咸謂為蠻夷之域無何季希烈自禆将驅除董秦奪其兵柄其土洑之民方組織禍階軍食不足督索之酷倍百前政甲子嵗希烈大逆不道皇帝震怒命宗臣曹王臯肅将天威詰誅暴亂節制江西之事春二月王乞靈宗廟一戰而克故是鎮復歸於我逺近皆輟涕為笑姁愉相賀枯骸瘠體脫去擔負然否則傾矣而未甚泰元年夏四月國家裂諸侯之地俾大夫盧公藩壤沔卾以江蘄等六大郡屬之車始至而沴氣肅清令始設而軸轄滿盈和始扇而魚龞不驚浹辰之下舊染汚俗咸與保寧矣昨野人出自山林來謁上郡帆次於檻側卒不識禁将不呵問無逗留於時無裒歛於貨向至暮夜則漁者唱樵者和蕩蕩然罷鳴柝吠犬之驚嗚一作於戲昔登太行摧輸之險今踐通衢如砥之泰非所託遇仁賢所守用徳義則孰能致此歟是知王者之御四海得賢而治失人而亂諸侯之守封畧以徳則固恃險則亡其猶影響耶况大夫寛仁恵和文武光明存易簡為約束萬夫知禁倚誠信為政令千里自化變我澆俗寖為貞淳若察近以逺則他日手持陶鈞心運動植嗤嗤横目知愛疑作受其大賴矣小子感前後之殊事樂人庶之服恱故為保寜記以獻敢無愧詞貞元丙寅嵗夏五月三日山客符載記文苑英華巻八百三十
