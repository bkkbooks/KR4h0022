body:
  text: 文苑英華卷五十七宋李昉等編禋祀四明水賦六首大羮賦一首象樽賦一首黃目樽賦二首明水賦以泠然感化潔我蒸嘗為韵崔損大饗之禮明水攸先其水也所以本太古之淳朴其明也所以享至敬之昭宣從朗月之潜化應隂燧而通𤣥暗度晴空泛銀河而色靜曉臨清廟浮玉露而光鮮既潤下以功慱亦就濕而義全𡨕朕兆於至理契幽微於自然加五齊而致獻首三酒而告䖍觀其象在乎天德包乎坎類影響之相召協隂陽之應感其禮斯節其色斯潔不假縮於包茅復何施於麴蘖將汙樽而並用與越席而齊列或異乎勿幕有孚豈比夫不食而泄一作食而貴泄皛皛熒熒清清泠泠明德為馨神人是聽從無味而有味自無形而有形深源莫測實資造化濯桂影於遙天洗蟾光於永夜懿夫昭潔著贊溉賞常蒸宜玉斚之見貯匪金盤之見承若乃鼎爼備設嘉羞衆夥苾苾芬芬名之莫可尚其本也知享獻而靡他貴其新也諒斟酌而在我於維巨唐穆穆皇皇崇初祀異一作與蒸嘗𤣥酒乃薦至誠允臧天降其福地出則祥醴泉洋洋明水是將徹慶雲之色映瑞日之光羣臣作頌歌孝治唐諱之無疆第二以𤣥化無宰至精感通為韻夏稜祭祀上潔精誠克宣伊明水之為用諒至誠以為先積隂以成符嘉應於𡨕數以鑑而取咸疑作感無私於上𤣥將假以表敬式彰乎告䖍皎皎泛月瀼瀼降天既禀氣在隂亦成形於夜有無雖繫於恍惚融結寧隨於冬夏明者誠也我則暗然而彰水惟信焉吾非倐爾而化徒觀其清霄霧斂朗月輪孤鍳清熒而類鏡水滴瀝而疑珠混金波而共潔迷玉露而全無感而遂通配陽燧之為火融而不涸異寒氷之在壺彼既無情此何有待始同方而合體寧望逺而功倍故能佐因心於霜露均潤下於江海有形有實徒加以强名無臭無聲孰知其真宰是以昭其儉潔其意含水月之淳粹修粢盛於豐備作𤣥酒而禮崇登清廟之誠貴疑嗤潢汙之野薦陋甘醴之莫致未見至字官韻祀事孔明其儀既精無朕而有不為而成二氣相臨本自蟾蜍之魄三危莫比殊非沆瀣之英至道自𤣥而兆醴泉因地而生原夫月麗於天水習乎坎物有時而出故方諸而夜呈事有朕而因故隂靈而不疑作下感大滿若冲其來不窮風塵莫染其真質天地不隔其幽通况國家崇儀礿祀薦敬旻穹方欲行古道稽淳風客有賦明水之事敢聞之於閟宫第三前韻歐陽詹智之不測有明水焉方諸在手圓月居天象質遐分則迢遙而回逺精華潜合遂滴瀝以留連一作流連可謂妙自斯妙𤣥之又𤣥兹一作此道也自何而來彼至一作靈也從何而借越杳杳之蒼昊滋遙遙一作阻冥冥之永夜望蟾魄而光彩殊流端蛤形而清泠忽下等陽燧之通感實柔祗之閟化豈非二字一作豈不以月包隂德蛤乃隂餘一作我唯陽德伊乃隂徒英精一作精靈合契氣類相符共禀坤而配坎諒交律一作津以有濡是一作此理焉自取一作精之乎必有斯水也遂生之於本無精潔可嘉清明斯在湛玉壺以無垢入犧尊而有待處罍實爵今則由於鬯人置下升堂以不聞一作已不關乎真宰觀其一作稽夫所自原夫所致臨庭目擊雖從隂鍳而來向月心祈允一作又似上天而至來莫我繫一作挈至莫我精棄一作葉本不仁故存名而曰水從儀一作宜酌號遂表性以一作而稱明信可薦宗祏祈一作祁上清是故一作故得祭先展敬類帝昭誠一作師先享嵗告帝功成首三酒而上獻一作冠三酒而首進掩五齊以先行招百神之景福致萬姓之惟真一作元禎無益下一作於人鄙玉漿於夜漏自求其溢哂珠露於金莖逰原習坎固有旁感一作固有冥感處陸騰一作浮空不無𤣥通龍吟雲而致雨虎嘯谷以一作而來風動無千里之熯一作效潤才百里之功豈一作詎若以握中之瑣細映一作向天上之朣朦精液下融神人以崇而福祿攸同者乎第四前韻韓愈古一有者字聖人之制祭祀一有也字必一無此字主忠敬崇吉蠲不責一作貴其豐乃或薦之以水不可以瀆斯用致之於天其事信美其義惟𤣥月實水精故水一作求其本也明為君德因取以名焉於是命烜氏候清夜或將祭一作祀圓丘於𤣥冬或將祭方澤於朱夏持鍳而精氣旁射照月而隂靈潜下視之不見謂合道於希夷挹之則盛方同功於造化應於有生於無形象未分徒逞離婁之目光華暗至如還合浦之珠既齊高一作芳於醴酒一作酒醴詎比賤於潢汙明德惟馨神一作𤣥功不宰于以表誠潔于以誡荒怠苟失其道殺牛之祭何為如得其情一作宜明水之薦斯在不引而自致不行而善至雖辭麴蘖之名實處樽罍之器降於圓魄殊匪金莖之露出自方諸已一作乍似鮫人之淚將以贊于隂德配夫二字一作非獨配于陽燧夜寂天清煙消氣明桂華吐耀兔影流精一作玉兔騰精聊設教一作鍳以取水伊不注而能盈霏然有一作垂象的爾而呈始茫茫以一作漠漠而霜積漸微微而浪生豈不以德叶于坎有一作同類則感形昭一作藏在空氣應則通鶴鳴在隂之論一作理不謬虎嘯于谷之道一作義可崇庶令知聖真一作足以驗聖賢之無黨驗天地之至公竊比大羮之貴味幸希薦於廟中凡一作皆集本第五同前韵陳羽彼美明水含精自天孤影流輝乃凝空作潤萬靈來享故為酒稱𤣥所以貴新滌慮殷薦告䖍水本涵清表至深之心著明以比德惟馨香之義全想夫含氣遙空成形永夜出隂鍳則凝清自美對明燭則搖光相借至誠所感同就濕而流大饗是資若待神而化斯可謂至精無朕明誠有孚泛清月而乍融乍結洗輕煙而若有若無潤而鮮見湛露之濡金鏡皛兮潔類清氷之在玉壺至若髙天委秋皎月分彩氤氲既合精粹斯在方昭德以降神異趨下而歸海是知嚴而敬者其德大潔而祀者其福倍繄景命之不渝豈成功之不宰原夫明水之𥘉化也天子齊心司烜蕆事望靈月露隂燧皎皛浮光清冷在器自無而有知靈化之不測應感而來知神物之斯至其或崇國祀設方明備禮樂潔粢盛用陶匏之器薦繭栗之牲秩神祗而配坐望天地之含精匪明水而神不降無明水則祀不誠是以明處作離水居為坎諒明水之潜化本隂陽之所感其名也合五行之德其用也冠三酒之功泊爾味淡凝然色融至馨無臭至潔含光則是水也與靈物幽通第六同前韵失名明水之設其義斯𤣥水以潔著明由色宣神靈是享祀典攸傳籩豆靜嘉取其濯溉麴蘖不用存乎吉蠲審靈變之無方實太隂之相借月當盤而冥召水承月而潜化冲融其色連桂影于晴空泛灔其光映銀河於永夜理包幽奧質本虛無在洞徹而彌朗介清明而不汙冠澄酒之奠禮其式序方行潦之酌亦實有殊懿夫净透霄光逺浮星彩取之不竭從而不改彰至敬而用協神心兆無形而道符真宰信體微而義慱知事簡而功倍當其配饗宗祧告成天地壇壝一作墠廣設粢盛大備爰命司烜聿持隂燧月晃朗而遙臨水潗㵫而潜至既清既潔表勤昭事之心克誠克明載展奉先之意原夫物以類聚應因感生水惟坎德月實隂精所謂聲同即應氣合乃并行之斯行且比夫流而不滯止之斯止亦似二字一作何異乎滿而不盈徒觀夫皓魄淒清湛然澄淡出於朕兆一作無朕形乎有感國家蒸嘗是奉享獻惟崇明水載挹至誠遂通始分素魄之下俄傳清廟之中應召而生寧假挈瓶之智順時而委豈煩汲井之功固將降肸蠁於純嘏表䖍恭於聖衷者哉太羮賦以宗本誠敬遺味由禮為韵施肩吾至誠尚潔在禮惟恭饗異四時大饗以先王為裕羮重五味太羮以無味為宗薦既殊於禘礿禮乃變乎秋冬則知此祭不數此羮不混法明水以成功惡鹹鹺而是撙一作損義由反古類槀秸之無文道尚全真喻恬淡而為本故宜輕八簋黜三牲其味唯德其色唯清若謂我在物則物不在於鹽萊若謂我在水則水不在於汙行小周人之尚臭哂殷家之貴聲雖無形而可挾務展禮而由誠觀乎一鼎無包百王是慶法君長以為尊事鬼神而聼命既陳既酌彌重乎精誠不絮不調莫先乎聖敬聿修前典不可度思因七獻以成禮納一作約三嵗而為期饗宴既終於勿勿禮容方盛乎遲遲且在有名而可重孰云無味而見遺是以不饗甘苦不由饔餼湆雖假於一烹用不因乎多味澄渟在潔惡薑桂以為滋肸饗降靈歆明德以為氣是以禮因羮而克舉羮因禮而允修乍同西伯之禴寧比東鄰之牛一以表専一而不二一以表通微而闡幽豈徒不和而為貴亦以明反本之所由懿夫其名類餗其正在禮下以敘人倫上以親祖禰苟傾覆之無虞諒威儀之由體者也象樽賦以觀器禮肅為韻失名稽太古之至薦也以汙樽抔飲除地而為壇迄後聖之禮禋也其籩豆犧象咸飾其碧丹是以五禮秩經於宗伯六樽詔典於春官實有嚴而有翼豈無取於異端故殷王有肜日之祭魯聖有禘月之觀且皇周之享也肇繪象於兹器既普淖於式潔乃登堂而奠次耀如金石以率舞派若洪瀛而贔屭騰圭瓉以沃暢達群神於𤣥祕敬宗宜社以交其幽明返本歸仁以尊其天地可以等上下之列可以參隂陽之位豈齊夫斗筲之外役寧假乎挈瓶之凡智憤季氏之將旅耻王孫之寧媚况今交節以一作異義具物昭洗介兹夀考以洽百禮柔嘉滌濯以修其䖍恭登降揮觶以流其愷悌夫禮以器成器以禮肅擬氷壺之潔徹鍳膳鼎之覆餗望堯衢而感惠賴嘉時而有淑既無列野之郊碩致誠於工祝黃目樽賦以禮尚治情酌中形外為韻李程彛器之美黃目是尚黃者取黃理而中孚目者象清明而外暢徵戴禮而有謂懿周人之是創將表敬於宗祧必薦馨於鬱鬯爰設嘉名是用飾情彼因外而有制猶自中而立誠酌於心終有假於圭瓉象乎目難取比於兕觥必因樽彜爰佐齊醍以明大享之品物以助諸侯之孝悌故以目而為名因酒而成禮爾其克修祀典遐本淳風將抔飲而體異等犧樽而義同殷薦有恆守籩豆之列備用何所在宗廟之中追述作之深㫖諒昭明而有融用當其無物不為薄齊納金而飲酎等用茅以明酌挹而未竭故不慚於金罍執而不揮寧有愧於玉爵立制有經創意圗形潔以新樽冀精誠之可達歆於明德知黍稷之非馨其象也則小取喻也斯大雖斟酌在中必儀形於外嘉其不泛不濫可繼可傳罔施丹雘徒假雕鐫詎同乎巵信乎美而無當豈比乎斗則有象而在天徒虛無以為說非潔芳以告䖍甚矣哉前王之創物俾後代之相沿第二以清廟之器所以禮神為韻裴度聖人之制祭也因物逹情比象配類盡內心之享禮定黃目之彛器居樽之上察神之至黃其色保純固於中央目以名洞清明於幽邃將以贊禘祫報天地成形而百代猶傳遍祭而萬靈具醉懿夫周禮盡在殷薦孔明鬱鬯馨而外逹湛醪華而內清濩落為用昭彰表誠自可配於龍杓焉取儔於兕觥當其霜露盛時金石奏廟告䖍之始在物居要動明酌而曼醁騰光澄舊汚而圎規納照且禮經所紀象設有以首瑚璉之序助宗廟之美體含𢎞足擎跽從祝之獻而如鼎之峙精氣皎於外飾黃潤艷於通理嚴敬而挹且見夫爵盈明德之歆詎聞乎罍耻若乃籩豆並置陶匏共陳亦可以備觀光之祭法攄素懷於蠟賔酌其中諒明明之取義華其睆將屬屬以交神至如夜燎之時宿設之所含霜若麗夫金質導氣更宜夫桂醑自合禮於宗彛匪齊名於杜舉是知純嘏將降明禋在兹逹臭隂於勿勿駐靈駕之偲偲尚禮然也明王用之方今樂和同禮無體粢盛式務鬱器光啓客有習於聲詩願奉樽而觀禮文苑英華卷五十七
