body:
  text: 文苑英華卷四百八十五宋李昉等編雅麗文詞雅麗策四道張楚第五名文詞雅麗策對臣聞昔在上皇之撫運也政寬事明法簡心一仰察天道中順人情至於不言混然而化故上玄所以眷命罔違於德下人安定厥居俾獲其利暑往寒來以信之雲行雨施以從之於是乎疫疾不生禎祥洊至巍巍蕩蕩蓋無德而稱焉自大道既隱淳原且散或救弊以忠敬亦隨時而損益成康已往頌聲不作俗薄禮廢政荒人亡故其詩曰交交桑扈率場啄粟習習谷風以隂以雨此則刺上不能行政者也仲尼生周末傷道不行乃刪詩書定禮樂立君臣上下之節明奢儉揖讓之序尚不敢救當代變於陪臣而稱曰邦君樹塞門管氏亦樹塞門邦君為兩君之好有反坫管氏亦有反坫管氏而知禮孰不知禮者矣自兹厥後頺波浸流有聖哲之君聰明之后豈能振彼凋弊張其紀綱不有我唐興建鴻業乂寧黔首則掃地將盡求野多遺陛下統皇綱纂休運德澤汪濊仁風洋溢不寶逺物則逺人格所寶惟賢則邇人安勸農桑恤刑獄不奪三時之務且惜十家之産左右伊吕郡縣龔黃是以驅俗於雍熙納入於軌物者也豈不徴賢人論政要所以逹四聰也臨前殿察羣言所以收九術也梓匠舒幕所以禮賢也凌人散氷所以救渴也臣竊以自古求賢之盛未若今日者矣賜臣制策曰皇極之道未敷謨明之軌尚關思𢎞厥理其義安從者臣實見可久可大之規非有未敷尚闕之事此陛下讓之至也愚臣安敢奏之若乃考前古之庶徴究禮樂之同異辨皇王之制度詳宗廟之禮儀此則陛下懸鏡九流常覽百氏索隱探異鈎深致逺已在聖斷豈有韙而疑者歟今下問愚臣逺議其事陛下豈不欲廣於明試察臣微才臣幸對揚敢不悉情以對制策曰視聽貌言恆若時若會極歸極作哲作乂一以貫之何方而可者臣聞王者立極必本於天天事著於上人事應於下昔者禹平水土天告成功錫之以洪範九疇彞倫攸敘又皇天降其有極皇大極中也言王者能行大中之道則陰陽和風雨時百穀用成俊乂用章也如是則視曰明聽曰聰貌曰恭言曰從則無恆若之生自去咎徵之應矣今天瑞降地靈集所有動作光孚化先則一以貫之道斯不逺矣制策曰禮以飾情情疏則禮略樂以通感感至則神和理內為同修外為異同異之用有昧其功人俗未融佇明斯要者臣聞夫禮由陰作樂以陽來樂與天地同和禮與天地同節誠能感神動物安上移風或以理內為同或以修外為異率由和敬靡不從之者乎施之人俗靡不盡善者乎制策曰四時武德制自何君五行文始本之誰代昭德武德莫辨所尊昭容禮容未詳所出者臣聞嬴政失御漢皇乘極文景致刑措之美武宣當雄富之盛故有四時武德之樂五行文始之舞昭德盛德因之而尊昭容禮容自兹而備臣才識愚劣學業虛淺猥當聖問茫然有失謹對同前苗晉卿對陛下頃與三事大夫議於朝以計天下有竒才異行含光而不揚其輝詔諸侯咸舉之臣實至愚不通大識循才審行不副髙求臣聞論語曰天何言哉四時行焉百物生焉孝經曰王者則天之明因地之利以理天下是以其教不肅而成其政不嚴而理所謂天地設位聖人成能而保大定功勳業蓋時也逮金石斯𬗟步驟不同時有澆淳教隨繁略桑扈谷風之刺三歸八佾之嫌人用僭忒一至於此孔子曰上失其道人散久矣傳曰國家之弊恆必由之陛下嗣守丕緒茂昭大德能使百官承式萬邦作乂所謂孕虞育夏甄殷陶周革弊移風自前代未有也陛下乃賜臣策曰皇極之道未敷謨明之軌尚闕者豈不以採芻蕘之義誠考試之端不宰其功俯垂下問實陛下謙德也微臣何足以知之制策曰至如視聽貌言恆若時若會極歸極作哲作乂一以貫之何方而可者臣聞劉歆以為伏羲氏繼天而王受河圖則而畫之八卦是也禹理洪水天賜洛書法而陳之洪範是也故河圖洛書相為經緯八卦九疇相為表裏聖人行道各保其真若人有乖方數必徵於錯逆政惟協雅理必應於調和考之咎徵粲然著矣陛下隨陽澤以著恩慎嚴霜以肅威鷹隼未擊罻羅不施草木未零山林不伐足可使垂景星而降甘露騰休氣而漏醴泉臣以為一以貫之其道久矣制策曰禮以飾情情疏則禮略樂以通感感至則神和理內為同修外為異同異之用有昧其功人俗未融佇明斯要者臣聞六經之道同歸禮樂之用為急孔子曰安上理人莫善於禮移風易俗莫善於樂董仲舒對策曰王者欲有所為宜求其端於天天道大者在於陰陽陽之為德陰之為刑王者承天意以從事故務德教而省刑罰陛下修先王之好生存大易之緩死頃者省囹圄去桎梏此則修省刑罰之謂也臣聞樂以理內為同禮以修外為異同則和親異則畏敬和親則無怨畏敬則不爭二者並行合為一體揖讓而理天下者禮樂之謂也適時之要斯並存焉制策曰四時武德制自何君五行文始本之誰代昭德武德莫辨所尊昭容禮容未詳所出悉情以對用釋余疑者臣以為斯並漢主之樂載于班氏之書必使究其明徵考其敏博既勞更僕何易盡言雖敢略而陳之尚未臻其極也臣聞易曰先王以作樂崇德殷薦上帝以配祖考古者制宗廟太祝迎神於廟門其義也四時武德者漢文所作以示天下之安和也而武奏於髙廟焉五行舞者本之周武也秦始皇二十五年更為五行也漢髙祖六年更名曰文始以示不相襲也昭德盛德宣之所以尊宗廟昭容禮容者出武德文始五行之舞也謹對同前孟萬石第六名對臣嘗黽勉讀書夙夜匪懈觀前代之事稽王者之風欲樹文明必招俊乂所以平章百姓昭暢萬人負黼扆而海宇清垂衣裳而天下理今陛下朝盈多士野無遺賢猶復發德音下明制張雲羅以掩俊設天網以頓竒片善不遺有能皆進故得飛飛丹鳳棲翼于帝梧皎皎白駒連食于場藿縱夷齊巢許咸屆於兹臣既庸妄豈敢當此且聲非入異譽不出凡文律未明才用無取謬參推擇濫赴搜揚安敢避直飾詞向華乖實但丹誠有厲至敬無文敢竭鄙聞用當明試然將涓滴以足海用纎埃以增嶽一作華雖寡攸助誰能默哉臣聞建國興邦必以黎元為本康時訓代必以政術為先軌謨雖異理化皆一昔者太上之君崇道以致化立德以養物人必欲夀敦禮教而不傷人必欲富薄賦斂而不困人必欲逸則省力而不勞人不欲危即扶持而使固不強人之所惡不禁人之所欲故能無為而理不言而化及至中古行仁履義克已厲身拯溺於人博施於物即能陰陽不錯風雨以時疾疫必除妖孽莫起洎乎末代政令不作刑法聿修奢侈是崇禮樂非雅時無美善之説俗有姦邪之釁豈不由君失其道臣非其人澆薄浸興淳朴離散者也今陛下出號施令罔有不臧齊物正人各得其所然猶綜核古今稽謀政教視先王之得失崇今日之髙明以此天聰尚云不德巍巍至化謙尊而光非臣愚昧所能涯際制策曰皇極之道未敷謨明之軌尚闕思𢎞厥理其義安從者臣以為皇極將立莫先擇俊得人則政和非人則政失人賢化逺豈不謬哉至如因能任官量賢受祿即百僚濟濟萬姓安安去無用之言除無用之器即情實斯得謬説不繁使人以時謹身節用即倉廩儲積黎庶完豐進有德而退無良即庶位允釐庶官不曠尊有功之子棄無功之人即營事者不惜其身制作者能竭其力罰必當罪即姦回自除賞必中賢則人臣自勸夫是則海內行大中之道天下有幸甚之言何憂夫皇極之道未敷者也若乃列張輔佐建立官司詢忠直之言開進諫之路用能獻可替否補過弼違外藏主之非內正君之失今陛下乃順時而動非道不行事無不嘉人欲何説故獻納之職諫諍之詞但可略言莫知所議大哉至德實冠古今且朝無佞臣縱朱雲重生安能折檻人不妄從雖辛毗不死曷聞牽裾天子聖明是故羣臣無事亦何憂文軌之闕哉制策曰視聽貌言恆若時若會極歸極作哲作乂一以貫之何方而可者臣聞王者法乾理物觀象裁規敬順天時恭行月令恆若時若罔有咎徵矣尊九疇之儀修八政之規事不失儀動不違制出處語默皆歸於仁依乎中庸逺棄偏黨埀至道於萬國寄良政於百官直道而行不可則止會極歸極作哲作乂不日而致矣視聽貌言無從而失也制策曰禮以飾情情疏則禮略樂以通感感至則神和理內為同修外為異同異之用有昧其功人俗未融佇明斯要者臣聞化難將美人各有心不違制節必有放縱故先王作典禮以防之興雅樂以感之用能移風易俗安上理人矣今陛下行宗廟之禮故能配天地之神履直言之議故能立上下之敬聽宫商之變故能分善惡之俗捐鄭衛之音奏簫韶之樂正疏略之弊敦揖讓之儀州郡大行朝廷式序同異斯達內外罔差既合盡美之端何問不才之子若罄愚而説則陛下無有昧之咨若駐筆而述則陛下鍾佇明之訪實迷海遊何足知之臣聞大樂與天地同和大禮與天地同節既列同異之因將分內外之殊皇王是尊古今一作賢所重俱為時用其功一焉制策曰四時武德制自何君五行文始本之誰代者臣聞四時武德制之以周王五行文始本之於漢帝制策曰昭德武德莫辨所尊昭容禮容未詳所出者臣聞昭德武德實有攸尊之道昭容禮容出於劉氏之代昔者魯哀公問儒行宣尼有更僕之勞孔父訪鳥官郯子生傾蓋之倦然且富學滄海猶黽勉於一隅况乎道謝桂林豈對揚於庶事徒周遊於文苑終展轉於迷津謹對同前錢珝對臣聞登衡霍者嗟培塿之微泛漲海者鄙潢汙之陋臣草茅孤賤才無足取屬絲綸明揚州閭選辟謬得接武羣彥比肩時英而文物昭回宸顔咫尺退思愚劣甚不稱聖朝求賢之意也揆拙競顔心愧失守將何以充塞大問對揚天休聞之於師請言其略制策曰皇極之道未敷謨明之軌尚闕思𢎞厥理其義安從伏惟皇帝陛下開元立極地平天成祖述堯舜憲章文武夔龍咸事陰陽以和聖德動天無逺不屆麟鳳在郊藪河洛出圖書弓旌纍降徵搜是急日昃視朝文武並進既盡美矣無德而稱猶且罪已為心在豫興嘆此陛下之至讓也小臣何足以當哉然忭舞德音忝列明試敢不瀝肝膽獻所聞乎臣恭惟政理之間傳諸長者之口以先朝之事一二明之昔貞觀永徽之間恭默而天下理家給而人足時和而歲豐外户不扃牛羊被野太倉之粟陳陳相因中府之錢貫朽莫校然而戎車屢駕不無事矣於是度遼之師鬼方之討賀蘭之戰髙昌之伐而軍人無損帑藏如初國家富有海內百餘年士庶之多如曩時之兼倍征戍之役當今日之無何豈往得而今失將政繁而俗變其故何哉良有由也議者以為賦斂厚徭役繁風俗奢利息倍今若息其宫室愛人節用省無事之官罷不急之務三年政成臣竊遲之愚心曉然謂在此矣制策曰視聽貌言恆若時若會極歸極作哲作乂一以貫之何方而可者伏惟陛下躬神武之姿廣聰明之德思𢎞至道勵精為政及支及支者不受章疏見後漢一本作及晨非通奏甲夜觀書勵神聰於九疇留睿情於百氏臣聞智小不可謀大綆短難於汲深窺聖謀之莫測謂宸𠂻之不凡致逺恐泥不其難乎夫視者明也審邪正與曲直聽者聰也察善惡與是非貌者容止可觀儼恪之所謂言者詞令斯在榮辱之所由乂時暘若肅時雨若察休咎之闕會歸于皇建惟睿哲之作聖繫彼道樞故曰無反無側王道正直無黨無偏王道平平一以貫之此其義也制策曰禮以飾情情疏則禮略樂以通感感至則神和理內為同修外為異同異之用有昧其功人俗未融佇明斯要者夫大禮與天地同節大樂與天地同和豈惟明尊卑辨等列動天地感鬼神而已哉豈不繁於鐘鼓諒無徵於玉帛樂自外作必假器以明儀禮由中起故備物以飾容蓋有國之典章生人之冕服均五材之並用廢一不可類三者之何先尤宜去食故孔子曰安上理人莫善於禮移風易俗莫善於樂去同即異離之則多傷相須而成兼之則雙美一彼一此何後何先制策曰四時武德制自何君五行文始本之誰代昭德盛德莫辨所尊昭容禮容未詳所出悉情以對用釋豫疑臣聞暴秦失政皇漢創業爰作樂以尊先聿釋享以追孝四時武德用之於髙祖所以恢武功也文始五行陳之於文廟所以昭文德也蓋舞以盡意歌以崇德制自炎漢之君本乎孝武之代昭德盛德郊廟之樂也昭容禮容質文之辨也臣學不師古才非敏贍慙瑣瑣之陋無足言哉仰蒼蒼之髙茫然自失謹對文苑英華卷四百八十五
