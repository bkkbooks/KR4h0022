body:
  text: 文苑英華巻二百三十五宋李昉等編寺院三塔附劉長卿十首李頎二首崔曙一首張謂二首岑參五首包佶一首李嘉祐四首皇甫曾三首皇甫冉三首張繼一首韓翃四首褚朝陽一首郎士元二首顧况四首耿緯三首司空曙六首冷朝陽二首李益二首李端四首暢當一首過隠空和尚故居劉長卿自從飛錫去人到沃州稀林下期何在山中春獨歸蹋花尋舊徑映竹掩空扉寥落東峰上猶堪靜者依以下九篇並見集本秋夜雨中諸公過靈光寺所居前人晤語青蓮合重關閉夕隂向人寒燭静帶雨夜鍾深流水從他事孤雲任此心不能捐斗粟終日愧瑶琴秋夜北山精舍觀體如師梵前人焚香奏仙唄向夕遍空山清切兼秋逺威儀對月閒静分巖響答散逐海潮還幸得風吹去隨人到世間自道林寺西入石路至麓山寺過法崇禪師故居前人山僧候谷口石路掃集作拂莓苔深入泉源去遥從樹杪廻塗隨青靄散鍾過白雲來野雪空齋掩嵐集作山風古殿開桂寒知自發松老問誰栽惆悵湘江上何人更渡盃登思禪寺題上方前人西峰上方處臺榭隠朦朧集作上方幽且暮臺殿隠朦朧逺磬秋山裏青集作清猿古木中衆溪連竹路諸嶺共松風儻許棲林下甘成白首翁宿北山於禪寺集作蘭若二字前人上方鳴夕磬林下一僧還宻行傳人少禪心對虎閒青松臨古路白月滿寒山舊識窻前桂經霜更待攀集梁耿開元寺所居院前人到君幽卧處為我掃莓苔花雨晴天集作無時落松風終日來路經深竹過門向逺山開豈得長髙枕中朝正用才將赴嶺外留題蕭寺逺公院寺即梁朝蕭内史創前人竹房遥閉上方幽苔蘚集作徑蒼蒼訪昔㳺内史舊山空日暮南朝古木向人秋天香月色同集作空僧室葉落猿啼訪集作送又作傍客舟此去播遷明主意白雲何事苦集作欲相留陪元侍御集作郎逰支硎山寺前人支公去己久寂寞龍華㑹古木閒空山蒼然暮相對林巒非一狀水石有餘態宻竹藏晦明群峰争向背峰峰帶落日步步入青靄香氣空翠中猿聲暮雲外留連南臺客想像西方内因逐溪水還觀心兩無礙登揚州栖集作西靈寺塔前人化塔凌虛空雄規壓川澤亭亭楚雲外千里看不隔遥對黄金臺浮輝亂相射盤梯一作根接元氣半壁棲夜宅集作魄稍登諸級盡若騁排霜集作霄翮向是滄波人巳為青雲客雨飛千拱霽日在萬家夕鳥處髙却低天涯逺如廹江流入空翠海嶠現微碧向暮期下來誰堪復行役無名上人東林禪居李頎草堂毎多暇時謁山僧門所對但群木終朝無一言我心愛流水此地臨清源含吐山上日蔽虧松一作雲外村孤峰隔身世百衲老寒暄禪户積朝雪花龕來暮猿顧余守耕稼十載隠田園蘿篠慰春波巖潭恣討論洩雲豈知限至道莫探元且願啓開籥於焉微尚存宿香山寺石樓前人夜宿翠㣲半髙樓聞暗泉漁舟帶逺火山磬發孤煙殿壯一作衣拂雲松外門清河漢邊峰巒低枕席世界接人天靄靄花出霧輝輝星映川東林曙鸎滿惆悵欲言旋宿大和尚塔贈如上人兼呈常孫二山人崔曙支公己寂滅影塔山上古更有真僧來道場救諸苦一乘㣲妙法寓宿清净土身心能自觀色相了無取森森松映月漠漠雲近户嶺外飛雪明夜來前山雨燃燈見棲鴿作禮聞信皷曉霽南軒開秋華净天宇願言出世塵謝爾申及甫同諸公逰雲公禪寺張謂共許尋鷄足誰能惜馬蹄長空净雲雨斜月半虹蜺簷下千峯轉窻前萬木低看山尋徑逺聽鳥入林迷地與喧卑隔人將物我齊不知樵客意何事武陵溪長沙失火後戲題蓮花寺前人金園寳刹半長沙燒刼旁延一萬家樓殿總隨煙焰盡火中何處有蓮花同崔三十侍御灌口夜宿報恩寺岑參聞君尋野寺夜一作便宿支公房溪月冷深殿江雲擁廻廊燃燈松林静煑茗柴門香勝事不可接相思幽興長雪後與群公過報集作慈恩寺前人乘興忽相招僧房暮與朝雪融䨇樹濕紗閉一燈燒竹林山低塔藤間院接集作隔橋歸家好欲懶俗慮向來銷上嘉州青衣山中峯題惠净上人幽居寄兵部楊郎中前人青衣誰開鑿獨在水中央浮舟一躋攀側逕縁穹蒼絶頂詣髙僧豁然登上方諸嶺一何小三江奔茫茫蘭若向西開峨嵋正相當猿鳥樂幽磬松蘿泛天香江雲入袈裟山月吐繩床早知清净理人乃機心㤀尚少名宦拘聿來夷獠鄉吾友不可見鬱為尚書郎早嵗愛丹經留心向青囊眇眇雲智逺幽幽海懐長勝賞難與俱引領遥相望為政愧無術分憂幸時康君子滿天朝老夫憶滄浪况值廬山逺抽簮歸法王登嘉州凌雲寺作前人寺出飛鳥外青峯戴朱樓摶壁躋半空喜得登上頭始知宇宙濶下看三江流天晴見峨嵋如向波上浮迥曠煙景豁隂森㯶柟稠願割區中縁永從塵外逰廻風旋虎穴飛雨當龍湫僧房雲濛濛夏月寒颼颼廻合俯近郭寥落見逺舟勝槩無端倪天宫可淹留一官詎足道欲去令人愁終南雲際精舍尋法澄上人前人昨夜雲際宿適從西風廻不見林中僧微雨潭上來諸峯皆晴翠秦嶺獨不開石皷有時鳴秦王安在哉水深斷山口吼沬相喧豗噴壁四時雨傍村終日雷北瞻長安道日夕生塵埃若訪張仲蔚衡門映蒿萊䨇山逢信公所居包佶遥禮前朝塔㣲聞後夜鍾人間第四祖雲裏一䨇峯積雪封苔逕多年亞石松傳心不傳法誰可繼髙蹤奉陪韋潤州㳺鶴林寺李嘉祐按文苑英華共有二詩並題作奉陪韋潤州㳺鶴林寺今觀李嘉祐集其一篇乃是潤州楊别駕宅送蔣侍御收兵歸揚州詩兼巳收入第二百七十一巻送行門中英華誤抄于此姑存其目奉陪韋潤州㳺鶴林寺前人野寺江城近䨇旌五馬過禪心超忍辱梵語問多羅松竹閒僧老雲煙晩日多集作和寒塘歸路轉清磬隔微波同皇甫侍御題薦福寺一公房前人虛室獨焚香林空静磬長閒窺數竿竹老在一繩床啜茗翻真偈燃燈繼夕陽人歸逺相送步履出廻廊題道䖍上人竹房前人詩思禪心共竹閒任他流水向人間手持如意髙窻裏斜日江邊集作沿江千萬山奉和陪韋中丞使君㳺鶴林寺皇甫曽古寺傳燈久層城閉閣閒香花同法侣旌斾入深山寒磬虛空裏孤雲起滅間謝公憶髙卧徒望集作仰欲東集作㤀還贈吳門邕上人院前人春山臨集作唯一室獨坐草萋萋身寂心成道花開鳥自啼細泉松逕裏返景竹林西晩與門人别依依出虎溪此詩二百十九巻重出今己削去題普門上人房前人支公身巳老長在沃州多慧力堪傳教禪功久伏魔雲山隨坐夏江草伴頭陁借問廻一作明心者賢愚去㡬何題昭上人房皇甫冉沃州傳教後百衲老空林慮盡朝昏磬禪隨坐卧心鶴飛湖草逈門閉野雲深願一作地與天台接中峯早晩尋招隠寺送閻判官還江州前人離别那逄秋氣悲東林更作上方期共知客路浮雲外暫愛僧房墜葉時長江九𣲖人歸少寒嶺千重雁度遲借問潯陽在何處毎看潮落一相思詶裴補闕吳寺見尋前人東林初結構巳有晩鍾聲窻户背流水房廊半架城逺山重疊見芳草淺深生毎與君携手多煩長老迎安公房問法張繼流年一日復一日世事何時是了時試向東林問禪伯遣將心地學瑠璃同中書劉舍人題青龍上房韓翃西掖歸來後東林静者期逺峯春雪裏寒竹暮天時笑問集作從疑金人偈閒聽寳月詩更憐茶興在一作藥興好出下方遲題薦福寺衡岳煉師房前人春城乞食還髙論此中閒僧臘階前樹禪心江上山踈簾看雪捲深户映花關晩送門人出鍾聲杳靄間又𤣥集作瞑靄間題僧房前人披衣聞客至闗鎖此時開鳴磬夕陽盡捲簾秋氣集作色來名香連竹逕清梵出花臺身在心無住他方到㡬廻題青龍寺澹然師房前人䨇林彼上人詩興轉相親竹裏經聲晩門前山色春巻簾苔㸃净下筯藥苖新記取無生理歸來問此身題少室山寺褚朝陽飛閣青霞裏先秋獨早凉天花映牕近月桂拂簷香華岳三峯少黄河一帶長空間指歸路煙際有垂楊酬王季友秋夜宿露臺寺見寄郎士元石林精舍虎溪中夜扣禪扉憶逺公月在上方諸品静心持半法一作偈萬縁空蒼苔古道行應徧落木寒泉聽不窮更憶䨇峯最髙頂此心期與故人同柏林寺南望前人溪上遥聞精舍鍾泊舟微徑渡深松青山霽夜雲猶在盡出西南四五峯鄱陽大雲寺一公房顧况盡日陪㳺處斜暉竹院清定中觀有漏言下證無生色界聊傳法空門不用情欲知相去近鍾皷兩聞聲題歙山棲霞寺前人明徴君舊宅陳後主題詩跡在人亡處山空月滿時寳缾無破響道樹有低枝巳是傷離客仍逄靳尚祠經廢寺前人不知何世界有處似南朝石路無人掃松門被火燒斷幡猶挂刹故板尚搘橋數巻殘經在多年字欲銷獨㳺青龍寺前人春風入香刹暇日獨㳺衍曠然蓮花臺作禮月光靣乗兹第八識出彼超二見擺落區中縁無邊廣𢎞願長廊朝雨畢古木時禽囀積翠暖遥原雜集作離英紛似霰鳯城騰月窟龍首横天堰蟻步避危階蠅飛響深殿大通智勝佛㡬刼道場現題莊上人房巳見二百二十二巻耿湋廢慶寳寺前人黄葉前朝寺無僧寒一作閒殿開池晴龜出暴松暝鶴飛廻古井碑横草隂廊畫雜苔禪宫亦銷歇塵世轉堪哀雨中宿義興寺前人遥夜宿東林蟲聲階草深髙風初落葉多雨未歸心家國身猶負星霜鬢己侵滄洲縱不去何處有知音早春逰報集作慈恩寺南池司空曙山集作出寺臨池水春愁望逺生踏橋逢鶴起尋竹值泉横新桞絲猶短柔集作輕蘋葉未成還如虎溪上日暮伴僧行送曹三原猗逰山寺前人山踏青蕪盡凉秋古寺深何時得蓮葉此夜更聞琴窮水雲同穴過僧虎共林慇懃如念我遺爾挂冠心宿青龍寺故曇上人院前人年深宫院在舊客自相逢閉户臨寒竹無人有夜鍾降龍今巳去巢鶴竟何從坐見繁星曉凄凉識舊峯秋喜盧綸同宿寺己見二百十七巻前人題靈雲寺前人春山古寺遶滄波石磴盤空鳥道過百丈金身開翠殿萬龕燈焰隔煙蘿雲生客到侵衣濕花落僧禪覆地多不與方袍同結社下歸塵世竟如何題暕上人院前人閉門不出自焚香擁褐看山嵗月長雨後緑苔生石井秋來黄葉徧繩床身閒何處無真性年老曽來集作言隠故鄉更說本師同學在㡬時携手向集作見衡陽同張深秀才逰華巖寺冷朝陽同逰雲外寺渡水入禪闗立掃窻前石坐看池上山有僧飛錫到留客話松間不是縁名利好來長伴閒宿栢巖寺前人幽寺在巖中行唯一逕通客吟孤嶠月蟬噪數枝風秋色生苔砌泉聲入梵宫吾師修道處不與世間同入南山至金師蘭若李益木落水歸壑寂然無始心南行有真子被褐息山隂石路瑶草散松門寒景深吾師亦何受自起定中吟與王楚同登青龍寺上方前人連岡出古寺流睇移芳讌鳥没漢諸陵草平秦故殿摇光淺深樹拂木參差鷰春心斷易迷逺目傷難徧壯日各輕年暮年方自見同皇甫侍御題惟一上人房李端焚香居一室盡日見空林得道歸集作輕年暮安禪愛夜深東西皆是夢存殁豈闗心唯羡諸童子通集作持經在竹隂同裴員外宿薦福寺僧舍前人潘安秋興動凉夜宿僧房倚杖雲離月垂簾竹有霜暗集作廻風生逺逕墜集作墮葉颯長廊一與交親㑹空貽别後傷宿深上人院集作房聽逺泉前人泉聲宜逺聽入夜對支公斷絶來方盡潺湲咽又通何年出石下㡬里在山中君集作若問窮源處禪門集作心與此同題雲際寺凖公房前人髙僧居處似天台錫杖銅缾對緑苔竹巷雨晴新鳥囀山房日午老人來園中鹿過椒枝動潭底龍㳺水沬開獨夜燃香禮遺像空林月没始應廻宿報恩寺精舎暢當鍾梵送沉景星多露漸光風中蘭靡靡月下樹蒼蒼夜殿若山横深松如澗凉羸然虎溪子遲我一虛床杳杳空寂舍濛濛蓮桂香擁褐依西壁紗燈靄中央文苑英華巻二百三十五
