body:
  text: 文苑英華卷四百五十一宋李昉等編制書四都元帥普王荆襄江西等道兵馬都元帥制陸贄門下君人立極所務於勝殘秉律成師實先於謀帥申明號令揔制紀綱𢎞九合之功决百勝之略非重慎集作慎簡不可以濟事非僉屬不可以臨人集大勳者必振其宏綱體至公者無避於內舉爰擇蕃翰俾掌元戎開府儀同三司舒王謨性禀忠厚訓知禮樂居常樂善動不違仁察其內直集作恕外溫必能安人和衆體方識敏諒可成功庶乎知子之明授以師貞之律可揚州大都督持節充荆襄江西沔鄂等道節度及諸軍行營兵馬都元帥餘如故仍賜名誼改封普王嗚呼小子誼其敬聽朕命我國家之有天下百七十載于兹矣祖宗垂統二字集作垂化紹統功德繼茂威加殊俗惠洽普天海隅蒼生代受亭育躋之於夀域集作富夀煦之以仁和集作和平源廣流長慶深祚逺厯數有嗣纘于朕躬兢兢業業懼不克負荷䖍恭寅畏歲五周星循列聖之耿光稽上古之謨集作明訓一物失所是用疚心萬方有罪每懷咎已懸法更考于詔令作皆考于天則集作意舉事必酌於人謀期合人中罔狥私欲而涉道猶淺燭理未明文闕於化成武乏於定亂刑賞失中選授集作授任乖方厚澤未均大信未著致使凶慝熾禍干紀亂常悖違君親蔑棄天地盜據我郡邑毒痡我士庶驅脅丁壯暴骸於原野攘奪羸老轉死於溝壑忠良隕命義烈銜寃迫以凶威莫由詔令作能自奮憤深骨髓怨結蒼旻朕所以中宵屢興終食三嘆哀蒼生之無告念集作憫赤子之非辜為人父母寧忘愧悼賴三事大夫竭誠於內羣帥爪牙宣力於外交修不逮集作怠日兾康寧江漢上游建瓴制冦亘千里之地連十萬之師保大定功宜有統一允副兹選往哉汝諧無以貴驕人無以善自伐無從已之欲無咈衆之謨集作謀從集作納諌如流改過勿吝卑躬降志以奉賔傅絶井分少以撫軍師布誠信以歸人心明賞罰以盡士力詰禁誅暴懋昭乃勳敬事恤人無替成命膺兹重任可不勉歟建中四年九月二十六日副元帥郭子儀兵馬副元帥制賈至見唐大詔令制昔伊尹與湯合傅說與髙宗合尚父與周合故哲后良臣莫不至合非賢不乂有開必先久大之業也公上略宏才惇信明誼受我旄鉞輯寧區夏典器銘勳髙視前古實邦家之傑豈獨為豫社稷之衛可獨弼豫節制咨謀安危斯屬懼朕之不稱也往欽哉司空子儀可兵馬副元帥主者施行至德二年四月李抱玉河西等道副元帥制常衮勑周以元老監方伯漢以丞相撫四夷則軍國之務中外一體自華陽而西至於隴坂涉河之右兼控五原揔三將之帥專萬里之寄詰禁經武宜有統制憂邉謀思深仗輔臣開府儀同三司行兵部尚書同中書門下平章事潞州大都督府長史知鳯翔府事充懷鄭澤潞觀察處置等使仍充南道通和吐蕃秦隴臨洮已來觀察處置等使上柱國凉國公李抱玉文以經邦德以鎮俗孝友忠信人之模表禮樂刑政朝之訓式以道匡朕允升大猷參聽斷之可否載清淨以寧一兼委戎旅屏于方夏知謀變化潜合神明將校悅從親如父子事出韜鈐之外功成戰伐之前勤勞王家以衛社稷有致君庇人之績冠旗常彛鼎之銘顧以國之慿倚久任憂患兵車之半悉以咨之當不憚煩以時鎮定也可兼充山南西道觀察處置度支營田等使判梁州事隴右懷鄭澤潞等使如故充山南西道河西隴右等道副元帥授馬燧渾瑊副元帥招討河中制陸贄門下天地殊位君臣異制苟不率道兹謂集作為亂常退而增修於是有舞干之義諭以遷善於是有文告之辭若猶未悛乃用致討興戎動衆豈得已哉李懷光擢自軍候委之節度亟有勤詔令作勞績纍加寵榮㧾衆駿奔自遠赴難解圍蕩集作逐冦朕甚德之位極上台寄崇統帥親之若同體信之無間言朕於斯人亦已厚矣而器小任重固貽顛覆有功自棄無罪集作過自疑崇信讒邪却逐將帥養冦資亂集作姦蓄姦幸灾集作幸灾樂禍朕素所推誠猶集作尚謂非實優容任遇常懷集作坦然如初凶德既盈醜跡彌露謀危社稷通結渠魁公相往來無復畏忌集作避窮集作肆極凶悖所不忍言朕播遷詔令作越巴梁逺違陵寢大懼失墜為列聖羞賴先澤在人兆庶知感朔方將士集作校忠節不渝懷光既沮集作阻姦謀詭稱效順纍陳欵疏請詣闕庭朕深惟舊勳務欲全貸授以師保集作傅之重疇其井賦之食璽書勞問誓以始終懷光遂殺辱使臣完聚守備將以悖慢之罪加於忠義之軍因兹脅從兾與同惡謂衆可罔謂天可欺覆載所不容人神所共棄討除大憝招緝非辜爰咨輔臣以董戎寄銀青光祿大夫檢校司徒詔令作空平章事兼太原尹北都詔令作京留守充河東集作中非保寧軍節度觀察處置度支營田等使北平郡王馬燧操業端亮器宇閎達集作氣宇宏達秉難奪之節負不羈之才恆持至誠集作公深識大體感慨一作激而三軍有勇彌綸而庶績允諧威聲所臨郡邑皆復集作服殿於集作于北土隱若長城元從奉天定難功臣開府儀同三司行詔令作守侍中兼靈州大都督充靈鹽豐夏等州節度管內支度營田觀察處置押蕃落等使仍充朔方邠寧振武等道奉天永平等軍行營節度兵馬副元帥上柱國樓煩郡王渾瑊淳粹積𠂻詔令作中仁厚成性布詔令作藴寬大以容衆著誠信以撫人事必沉詳臨危益辦節惟貞固在險逾彰𢎞濟艱難茂詔勳閥出納朕命光膺具瞻並文武全才安危注意副我憂矚時惟二臣比德叶謀往濟集作清多難燧可兼充奉誠軍及晋絳慈隰等州節度并𬋩內諸軍行營兵馬副元帥餘並如故瑊可兼河中絳州節度觀察處置等使仍充河中同絳陜虢等州節度及管內諸軍行營兵馬副元帥功臣開府本官勳封並如故嗚呼朕之不敏不明失於君道連禍未息勞師靡居中心自咎鬱若焚灼又以朔土之衆代集作大著忠勞橫遭汙脅深所閔惜爾其敬敷朕命明諭朕懷務於招綏非黷威武惟輸誠歸順罔有不赦惟執迷非命集作拒順罰止元凶寧失不經無濫非罪列爵懸賞用俟勳賢布告逺邇咸令知委集作悉授李晟鳯翔隴右節度使兼涇原副元帥制前人門下周之元老以分陜為重漢之丞相以憂邉見稱故方嶽克寧疆場不聳安人保大致理之端今所以重煩上台作鎮西土奉天定難功臣司徒兼中書令充神䇿節度使兼京畿渭北詔令作南鄜坊丹延等州節度觀察處置等使仍充京畿詔令有渭南二字渭北商州華州集作商華等州兵馬副元帥上柱國合川郡王李晟勵精剛之操體博厚之德適時通變一作動適時變而大節不奪虛受廣納而獨斷自明奉法以律身推功以及集作先下衆無犯命人用樂推集作從懷德畏威令行禁止誓群帥詔作帥於危疑之際駐孤軍於版蕩之中氣凌風雲誠動天地一鼓而凶徒折集作攝北再駕而京邑廓清師皆如歸人不知戰載安社稷集作宗社功格皇天而明識秉彛清風激俗雅尚恬曠撝謙有光朕以汧隴近郊扶鳯右地川阜連亘抵於集作于回中限界諸夷集作戍藩屏王室所屬誠重付之詔令作允付元臣兼二將之甲兵崇十連之統帥宣威耀德罷警息人俾豫仰成時乃丕烈可兼鳯翔尹充鳯翔隴右節度支度營田觀察處置等使仍充鳯翔隴右涇原節度兼管內諸軍及四鎮北庭行營兵馬副元帥改封西平郡王功臣本官兼官勳並如故興元二年八月四日都統授王縉侍中兼河南都統制常衮門下天地之德資隂陽以成功帝王之道任將相而興化聿求左輔命掌元戎必藉文武之才用經軍國之務金紫光祿大夫行黃門侍郎同中書門下平章事兼𢎞文館崇𤣥館大學士知館事仍充大清大微宫使太原縣開國伯王縉有髙妙之行有𢎞達詔令作通之識學該古訓文正國風夢帝賚豫濟川用汝百揆時叙四維充張纍陳造膝之言彌契沃心之道濵海之右自河而南王旅攸同戎軍殷㑹監于方伯之國利用建侯之司大將息人豫有禦侮鎮漢沔淮淝之地統齊梁魯鄭之軍揔制髙牙紀綱羣帥𢎞七伐四征之䇿成一匡九合之功式遏外虞底綏多難將授銅符之律爰咨瑣闥之謀往哉汝諧無替朕命可侍中持節都統河南淮南淮西山南諸道節度行營事仍進封郡公食邑二千户餘並如故主者施行廣德二年八月授劉洽檢校司空充諸道兵馬都統制陸贄門下論道經邦允歸碩望建牙統衆必藉雄才中外具瞻安危注意今以集作之二柄委之集作付以元臣開府儀同三司檢校尚書左僕射同中書門下平章事使持節宋州諸軍事兼宋州刺史充宣武軍節度支度營田宋亳頴等州觀察處置等使仍權知汴滑宋亳等州集作道都統兵馬事上柱國懷德郡王劉洽秉志端亮飭躬簡儉博厚足以容衆和易足以長人純孝榮親盡忠事主分我閫寄殿豫大藩集作邦扼集作桓制淮夷保詔令作堡障楚甸戎捷繼至軍聲載揚殪群凶於宛丘驅大憝於梁野控引漕挽委輸京師豫嘉乃懋集作異勳亮集作懋乃貞節用錫丕命俾揚王集作𢎞休燮贊三台紀綱羣帥式是大任爾惟欽哉可檢校司空同中書門下平章事依前充宣武軍節度支度營田宋亳頴等州觀察處置等使仍充宋亳頴等州管內諸軍兵馬都督散官勳封如故授范希朝京西都統制白居易門下閶闔風至太白星髙謀帥護邉國之大計具官范希朝中貞勤儉以為質惠和智勇以為用一代名將三朝信臣朕以西邉列鎮三四若有揔統則易成功思得良帥有威名者并護諸將歲一巡邉乘秋順令揚其威武則南牧之馬引弓之人知我有備不戰而去誰可任者無如希朝以爾有朔方之勞有振武之效功在疆場名聞羌戎惟實與聲皆副是選今拜爾為大將尊爾為司徒節制進退一令咨稟倚望如右可不慎歟可充京西都統招討使加裴度幽鎮兩道招討使制元稹門下夫以區區秦伯而猶念晋國曰其君是惡其人何罪况朕均養億兆為之君親燕人冀人皆為乳哺而育之者安忍以豺狼驅脅之故絶其飛走盡致網羅止行犯命之誅是用開其一面河東節度觀察處置等使金紫光祿大夫守司空兼門下侍郎同中書門下平章事大原尹北都留守上柱國晋國公食邑三千户裴度昔者區域之中蜂蟻巢聚蔡有逆孽齊有狡童厥初圖征疑議滿野不懼不惑挺然披攘茍無司南允罔能濟佑我憲考為唐神宗實賴集作惟股肱運用心力肆朕小子䝉受景靈冀服於前燕平於後而撫馭失理盤牙復生求思弭寧中夕有得國老尚在夫何患焉是用亟宣懇惻之誠就加招撫之命於戲頃者師道元濟乘纍代襲授之資藉山東結連之勢以丞相布畫於千里之外使諸將持重於四封之中而猶劉悟裂蛇豕之軀李佑潰鯨鯢之腹蓋逆順之情異而忠孝之道明也况彼幽鎮無名暴征詔令作征暴以丞相近觀其宜以諸侯齊奮其力斧鑽之刑坐迫椒蘭之氣外薰誰不自愛其生焉能與亂同死度宜開懷緩帶以待其歸可依前守司空兼門下侍郎同中書門下平章事河東節度使充幽鎮兩道招撫使餘如故加裴度鎮州四面招討使制門下傳云死者不可復生刑者不可復續是以先王斬一枝集作支指殺一犬彘莫不伏念隱悼至于旬時决而行之集作者蓋不得已也豫於鎮人亦既集作然伏念俟其悛革詎止旬時乃命相臣招懷撫諭矜其詿誤示以生門期於盡脫網羅豈可驅之陷穽而豺狼當道荆棘牽衣雖欲歸於有仁詔令作歸於有生集作歸之於仁厥路無由而至况王師壓境義勇爭先朕每抑其鋒鋩未忍覆其巢穴是猶愛稂莠而傷稼穡養癰疽以潰肌膚獨懷兒女之仁慮失祖宗之典今上台居鎮算畫無遺操晋陽之利兵驅屈産之良馬舉河東義武之衆合滄景澤潞之師當元翼受命之初乘田布雪寃之頃舉毛拾芥其易可知兼用威恩尚存招致宜令河東節度使裴度充鎮州四面招討使於戲以一城之卒敵天下之師狥猖蹶詔令作狂之徒抗君父之命吾哀爾輩死實無名茍能自新亦兾容汝主者施行鳯翔李業河東李拭並加招討使制崔琮門下邉境未寧固資於選帥輪轅適用必在乎與能無煩易地之勞各副長城之委鳯翔節度使檢校刑部尚書李業生自將門久知虜態悅詩禮而不倦索韜鈐而甚精河東節度使檢校禮部尚書李拭早膺儒術克擅文場幼挺瑚璉之姿尤通冉季之政並纍更重任必播能名或居劇塞而練卒討羌或領北門而尅已訓士皆勤勞備著功效居多朕以右輔之新拓土疆是資綏輯大鹵之連控戎落尤藉隄防或更户封之崇或仍舊貫之美各膺新命無替前勞異姓王制冊太原節度使守大師兼中書令晋王制錢珝維年月日皇帝若曰我國家作法於仁達情以禮振典謨而誕告載名器以公行何嘗不動懷多難豐報丕烈矧乃圖先廟社允集王功誠動日星必承天祐王功建而臣節盡天祐至而君命宜昔經武為師賜履荷宗周之寵今在邦稱傑剖符受全楚之封英偉相侔古今同典當勳而舉非我有私具官某博厚自持堅剛不惑抱公能察守貴必恭騫然飛將之風增彼懦夫之氣而先臣竒備間代雄才圮上視書太公來受雲中饗士李牧復生出鞏洛以行師轉淮沂而殄冦倬哉茂績興在後昆爾乃開國象賢勤王繼志諒因心而無改敬遺體以有為英蕩既臨文筃是籍率乎羣后自絶他時控彼諸戎下連右臂日者驅除大盜爰復神州焜耀元功載書盟府以啓紹開之慶是資戡定之勞而復念先朝荐罹否運朱玫則罪極邉伯李煴則親非子頽肆其樹置之謀黷我纘承之統是以奮飛長檄條列本枝遏濟惡之亂流披崇姦之僣黨夷凶有力賀福無違近則王行喻驕以叛恩顛將敗族爾乃先知塗地每耻同天顧刑憲之可加抗封章而不避潜思㰱血憤欲寢皮而逆豎犯闕興兵朕方奔車出次始懷愧懼未暇剪除行瑜轉禍終迷于誅罔畏螫手而不能自斷噬臍而誰復與論爾聞難成憂直躬决䇿衝冠激怒折箠興言龔行已勵於五申急召寧煩於二節武剛夙駕屈産跳驅存誠而有禮則安舉事而不疑何卜乃聲鍾鼓乃合諸侯留屯雖在於郊坼宿飽匪勞於漕挽爾臨渭曲深溝而親拒冦讎我復鎬京髙枕而無虞侵軼然後進攻外壘盡復強軍支剪喉舂如麻滿野或反𬒮以來獻俾噍類之不遺元惡出奔勢窮就戮廓清而罷約束尚嚴受降兼讓於使臣擇帥請行於國命一如紀律以報㑹盟天贊孔昭主憂盡釋始未見若之靣今盡見若之心神聽斯言衆圖是賞畫雲臺而莫顯篆樂石而非多師氏建官位惟極致春秋列國晋實大名典重而近古不行勳盛而豫𠂻何愛廣廷備物且授詞臣法坐臨軒式光禮命今遣中書舍人薛廷圭冊爾為大師兼中書令仍進封晋王於戲獨立王功忠乃善藏之府永膺天祐敬惟能保之軀則必慶于而家樂于而土戒之勿息與國無窮李茂貞封岐王加尚書令制吳融門下夫天有星辰為之綱所以保乎乾健地有山嶽為之鎮所以定乎坤柔故王者話夾輔之臣資股肱之任安危所係動靜是慿其在周也則姫公盡心於經營其在漢也則絳侯竭力於匡贊惟天所相何代無才厥生英賢為我柱石拯兹艱運樹彼洪勳欲示褒旌爰加徽數具官某三光結粹一氣融精合鸞鳯之正音動諧律吕有麒麟之逸足一作步逮出塵埃抱鐵石於寸心棲雪霜於徑節倜戃恢廓深沉溫雅允為王國之楨實稟生人之秀自岐陽振跡隴右成功虬騰周翰之間鶚立漢壇之上弓鳴霹靂劒躍蜿蜒指揮而川陸可回叱咤而風雲立變一居右輔纍復皇都殊庸已煥於旗常嘉頌早傳於金石闕昨妖興肘腋釁起宫闈而能憤激𠂻腸密施籌畫致禁軍之貔武戮當路之豺狼安宗社於綴旒復乘輿如反掌人祗共慶華夏同歡既而仗瑞節以來朝秉桓圭而展敬靜與之語簡而有常動叶生知克符中道披肝露膽皆本於至誠言發涕零必期於盡瘁感通天地激動人臣得不嘉乃竒功申兹異渥表爾優崇南省統率六宗一作卿尊大西郊封超五等在常時而難舉非盛烈而莫當傑立羣倫光流萬代勉膺朝奬敬答天休可守尚書令兼侍中仍封岐王餘官勳並如故授韓建昌黎郡王制韓儀門下記曰諸侯有功德於人者加地進律書云德懋懋官功懋懋賞其有功宣於宗社德被於生靈立扶危定顛之勳展安祖建儲之力忠誠貫天地貞節伏鬼神須行不次之恩用報非常之績俾諧僉議爰舉寵章具官某維嶽降神自天生德巨材山立雅量海深行健不以武而以文明處順不以邪而以忠正其動也直其靜也專孫武理兵令惟畫一文翁訓俗教必在三臨大事則侃侃丈夫在平居則謙謙君子生知無對默識絶倫自鎮關防已周星律化驍雄之士盡閲詩書流愷悌之風大行鄉里去秋迎鑾郊次駐䠋州城語時事之艱危言淚具下奉行朝之供億勤竭無渝而又請謁元龜載營復廟才當旬浹更事嚴禋椒壁虹梁備聞壯麗禮容備物靡不精周既而首貢封章議建儲二復六十年之墜典振三百載之洪規邦本以貞丕基永固實自良畫成此懿圖去不令之人以清朝列懲左道之輩用肅羣倫謀無不臧動有成憲肇我中興之業因其活國之誠永念殊庸實無與二是乃錫功臣之號封異姓之尊用答元勳勉膺異渥噫嘻當屯窒之時雖危無咎者鮮乘泰亨之際在上不驕者難全卿始終罔怠操執贊輔以德永孚于休授王鎔常山郡王羅𢎞信長沙郡王劉仁恭彭城郡王制門下五嶽承天共振橫宵之力四溟紀地咸施潤下之功所以國之獻臣時之哲輔亦如華嵩衡霍登九命而冠三公海瀆江河輯六瑞而踰五等居牧伯之位秉桓信之圭茍非茂績昭宣殊勳荐洽豈可膺兹並命用叶僉諧我有三臣實全七德爰舉疇庸之典式符進善之經具官王鎔夙紹弓箕丕承堂構襲重侯之積慶允武允文奉先王之成規克勤克儉剛簡而無傲虐栗直而務溫寬言必有章動不踰矩具官羅𢎞信將星瑞彩卿月祥光常竭力於公門每推心於王室保大有九三之盛任重而不危守中孚六四之貞致逺而不泥既為良帥復號吏師具官劉仁恭氣薄雲天義形霜雪祕𤣥符於腹笥機術無儔運黃略於意筌弛張有度以恬養智用壯處謙三軍敬之若神明百姓仰之如膏雨居然侯度屹若國禎而皆道邁殷賢名齊漢傑洞達㧾戎之要剪起扶輪精通育物之源龔黃拜手犬牙而理人心以寧屏蔽一隅繚長城於翰海藩垣中夏布橫一作二落於天田疇咨協恭奮揚熙載或尊疑作奠兹冀土成阜安於大名或宅彼幽都共綏懷於有北駢闐勳緒照灼簡書敷進律之殊恩奬殿邦之美化真相正三台之位掌武居一品之尊增實封以錫圭田升虛邑而光實節酬功報德惟恐不多勉竭乃誠各膺休命授成汭上谷郡王制門下朕聞賞有功則勞者勸考其績則政事彰能否既分黜陟斯在有其勳已銘於簡冊化復被於謳謡表率公侯澄清土宇靜夢澤於千里盡闢汙萊曜軫宿於九霄光生芒角行爵繼一作出祿顯忠遂良式副僉諧爰登寵寄具官成汭氣合冬日志烈秋霜藴雄特之標中能抑畏抱介潔之操外富通明自節制衡巫統臨荆楚承匪人之貪虐屬生聚之流離比衛丈之革車兼無三百同魏相之版户略不盈千㑹疑作曽未踰時俄成樂國井閻富庶人物殷繁璣組之賦聿修苞茅之貢常入砮舟靡闕􅙪簵咸臻睦鄰而四境風行蕩冦而三峽浪息况蔓聮湖嶺輻輳梯航既水陸之靡難致賦輸之罔滯績兹功緒實謂忠勞茍無舉善之文是廢疇庸之典今則移紫微之尊秩疏異姓之殊封位冠三台爵踰五等用奬分憂之績乃申進律之恩勉力在公傾心報國服我休命無忘恪恭趙凝進封南康王制楊矩門下叩黃鍾者大則大應建殊績者多則多酬匪我之私惟人所召亦若樹桃李者而獲井實勤藨蓘者必蓄羡糧安有豐功而無貴仕况我襄峴奧壤荆吳要津資上將之撫寧興庶人之歌詠宜旌善政以馭殊榮豈惟疇庸式俾垂勸具官趙凝訓承馬服術茂龍韜藴倜儻之宏才負縱橫之逺略性推忠厚連營懷敢死之心德尚寬和比屋佩來蘇之化加以戴君義切許國誠殷集列嶽之梯航贊大朝之經濟憂時奉法曽不捨於朝昏問俗撫封固尋彰於逺邇使鳯闕罷祈夏水澄源歡康以布於百城政令克齊於五屬是用特申異數用顯休勳封崇既盛於一時寵貴仍遷於右座爾其彌勤後效益暢前修為垣翰之凖繩遂鄉閭之帖泰永刋鍾釡以奉簡書厥惟丕承勿忝休命文苑英華卷四百五十一
