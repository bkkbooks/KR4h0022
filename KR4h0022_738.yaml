body:
  text: 文苑英華卷七百三十九宋李昉等編天真𤣥先生針天論一首天論上中下三首道神仙可學論一首神仙傳論一首黃冶論一首方士論一首餋生論一首太古無為論一首天真𤣥先生針天論盧綽有真𤣥先生者深粹虛寂冲凝簡素故其動也則局四海而隘九垓其靜也則棲一枝而敻環堵履其守朴與物無競雖質居巖穴之間神王煙塵之表以首月元日乃䕃雲蓋濯飛流涉西岑面東陸操白簡染朱翰俯而屏息仰而起曰天蕩蕩乎蒼蒼乎固無得而稱也余有疑焉請杜其惑夫虧盈益謙天之道也祻淫福善天之察也春榮秋落天之時也晝明夜晦天之運也擊電鼓雷天之怒也蒸雲施雨天之澤也因斯以言則庶類萬物非天無以成受形育氣非天無以立大哉博哉乾之化也故書云唯天為大唯堯則之詩云謂天蓋髙不敢不局易云先天而天弗違後天而奉天時是禎祥之來不誣也至於報施何乃爽歟惡均而異罰善同而殊效唐虞順讓祚不及子湯武逆成福垂纍世應物無親者其若是哉諂諛叨餮非貴則富廉潔貞素不賤必貧譎詐反道者曜蟬鳴佩直言順常者倳刃伏鑕悲夫何蓬蓽草萊之人遇時而為卿相膏腴縉紳之士失勢而作輿臺豈窮達之有數乎何否泰之無定也至於積德致敗變險成功立信受尤行仁一有格字招咎者豈勝數哉或一餐莫給或萬錢頓廢或綺紈斯弊或短褐不完或黃髮不終或襁褓先弊其於平施不亦謬乎夫德合天地道濟生民而有削伐之纍貞貫古今廉稱百代而有餒絶之憂其於與善不亦過乎然負異才藴竒調洞識幽顯智周動植而不免繩樞甕牖糲食布衣何所纍若此之斥也夫鶚隼以摯擊為恆理不可食之以粒豺虎以搏噬為常性不可啖之以草非其故爾禀性信分然則既授之以距角而責之以觸蹶既任之以爪牙而罰之以獲殺者不亦近於諂乎茍正其味則一改兩全矣化惡不知變形教善若易嗜也鴆毒害吻而裂腹虺蝮觸手而解腕然則欲其勿害者曷若勿生乎如力不能易則不可稱聖能而不改則不得謂仁匪聖匪仁將何以為萬物將一無將字生也扛鼎投石者不得云不舉鴻毛竭河飲澤者不得云不盡拗水是知大既任小何以辭乎必為治其若是將恐亂之未息於是少選之間肅然若有自天而降者襜霞衣控風轡飛鳯駕拖霓旌如影如響若虛若滅乃謂余曰帝有命焉子其清耳曰一氣既分萬象云備隨感斯化生而無記故大者自大不可移之於小短者自短不可易之以長多者不覺有餘少者不知不足減之斯傷各守其貞任之自是豈較工拙於其間哉是以百足一跖其行一也六眸一目其視一也火鼠夏逰而不知其熱水草冬茂而莫辨厥寒各安所安不可易位必非其位則西施與嫫母同姿茍當所甘則資實將腐鼠齊味各禀其性余何須焉若美則留之醜則去之其於簡也不亦勞乎若善則與之惡則奪之其於慮也不亦繁乎故任之則理息放之則無纍余以無告故能成萬物余以無心故能安羣有是知善惡共域吉凶同貫唯爾所召誰其制之今子誚余以不治何乃爽也故不治而謂之至治夫生不余謝死則余尤榮不余善辱則余讐多不余獲少則余求不與余共樂而責余同憂乎乃愍而訓之曰若物皆然則為惡招禍修善致福徒虛言耳又復余曰何言之容易也論者多云命有定數運有常期非補養所能延非備習所能益此皆非通識不可與言道也是以不昵不義因此而行無賴無取一作所自斯而作以之為家則家敗以之為國而國亡故桀紂志之於前而莾卓踵之於後所以覆宗絶嗣事至而不寤者良此之由也悲夫請以近小喻之逺大夫廣厦崇基人之居也褎衣博帶士之服也故拱差柱跌則廢而正之所以無壞傾之慮領決襟汚則綴而浣之所以無穿垢之憂故能恆保其貞固常守其完潔也若傾而不視穢而不澤則坐見頺陷立視緇衊矣故修福禳災為惡敗德若聲之召響影之隨形各有主司自然冥㑹惡積者報速善小者應遲猶夫秋生則夏殞春敷則冬落根深則難拔器滿則易盈故不可以逺近證有無不可以賖促定虛實疑耳信目中庸尚所不免以短度長下愚固其致蔽是知朝菌不可言椿鶴蜉蝣不足語春秋况以七尺之形百年之命欲辨生於沙界語死於塵劫其可得乎然言者皆以應朝一無此事報與自然異此蓋思之未精至也夫所告者莫非由已所感者皆是自知萬物各有本性故因而用之耳猶藝苖蒔果初雖耕灌在功至於結實成味則非人力所為也又靈芝駐年神丹養性竟能禦風撫羽凌煙蹈霞此乃功用自然者也萬象運為莫非此類終日施用不悟其理動成鋒楯不亦昧乎至於自然之性余亦不知其所以莫知所以然而然也於是言終形滅莫知所之余乃惕然恍然忘視聽若遺形體者久之乃神魂憂盡纍息蕩然與萬物因心不知榮辱之有異也天論上劉禹錫世之言天者二道焉拘於昭昭者則曰天與人實影響禍必以罪降福必以善徠窮厄而呼必可聞隱痛而祈必可答如有物的然以宰者故隂隲之說勝焉泥於𡨕𡨕者則曰天與人實刺異迅集作霆震于畜木未嘗在罪春滋乎堇荼未嘗擇善跖蹻焉而遂孔顔焉而危集作厄是茫乎無有宰者自然之說勝焉余之友河東解人栁子厚作天說以折韓退之之言文信美矣蓋有激之云而非所以盡天人之際故余作天論以極其辨云大凡入形器者皆有能有不能天有形之大者也人動物之尤者也天之能人固不能也人之能天亦有所不能也故余曰天與人交相勝耳其說曰天之道在生植其用在強弱人之道在法制其英華作之用在是非陽而阜生隂而肅殺水火傷物木堅金利壯而武健老而耗眊氣雄相君力雄相長天之能也陽而藝樹隂而揫斂防害用濡禁焚文粹作殊禁用光斬材􅑆堅液礦硎芒義制強禦集作訐禮分長幼右賢尚功建極間邪人之能也人能勝乎天者法也法大行則是為公是非為公非文字文粹作是非為公天下之人蹈道必賞違之集作善必罰當其賞雖三族之貴萬鍾之祿處之咸曰宜何也為善而然也當其罰雖族屬之夷刀鋸之加處之咸曰宜何也為惡而然也故其人曰天何預乃人事耶惟告䖍報本肆類授時之禮曰天而已矣福兮可以善取禍兮可以惡招奚預乎天耶法小弛則是非駮賞不必盡善罰不必盡惡或賢而尊顯時以不肖參焉或過而僇辱時以不辜參焉故其人曰彼宜然而信然理也彼不當然而固然豈理耶天也福或可以詐取而禍或以茍免人道駮故天命之說亦駮焉法大弛則是非易位賞恆在佞而罰恆在直義不足以制其強刑不足以勝其非人之能勝天之具盡喪矣夫實已喪而名徒存彼昧者方挈挈然提無實之名欲抗乎言天者斯數窮矣故曰天之所能者生萬物也人之所能者治萬物也法大行則其人曰天何預人耶我蹈道而已法大弛則其人曰道竟何為耶任人文粹作天而已法小弛則天人之論駁焉今人以已之窮通而欲質天之有無惑矣余曰天恆執其所能以臨乎下非有預乎治亂云爾人恆執其所能以仰乎天非有預乎寒暑云爾生乎治者人道眀咸知其所自故德與怨不歸乎天生乎亂者人道昧不可知故由人者舉歸乎天非天預乎人爾天論中或曰子之言天與人交相勝其理微庸使户曉盍取諸譬焉劉子曰若知旅乎夫旅者羣適乎莾蒼求休乎茂木飲乎水泉必強有力者先焉否則雖聖且賢莫能競也斯非天勝乎羣次乎邑郛求䕃於集作于華榱飽于餼牽集作牢必聖且賢者先焉否則強有力莫能競也斯非人勝乎茍道乎虞芮雖莾蒼猶郛邑然茍由乎匡宋雖郛邑猶莾蒼然是一日之途天與人相交勝矣吾固曰是非存焉雖在野人理勝也是非亡焉雖在邦天理勝也然則天非務勝乎人者也何哉人不宰則歸乎天也人誠務勝乎天者也何哉天無私故人可務乎勝也吾於文粹作于一日之途文粹有耳字而眀乎天人取諸近也已或文粹作問者曰若是文粹作是之則天之不相去乎人也信矣古之人曷引天為答曰若知操舟乎夫行乎濰淄伊洛者疾徐存乎人次舍存乎人風之怒號不能鼓為濤也流之泝洄不能峭為魁也適有迅而安亦人也適有覆而膠亦人也舟中之人未嘗有言天者何哉理眀故也彼行乎江河淮海者疾徐不可得而知也次舍不可得而必也鳴條之風可以沃日車蓋之雲可以見怪恬然濟亦天也黯然沉亦天也阽危而僅存亦天也舟中之人未嘗有言人集作天者何哉理昧故也問者曰吾見其駢焉而濟者風水等耳而有沉有不沉非天曷司歟答曰水與舟二物也夫物之合并必有數存乎其間焉數存然後勢形乎其間焉一以沉一以濟適當其數適乘其勢耳使彼勢之附乎物而生猶影響也本乎徐者其勢緩故人得以曉也本乎疾者其勢遽故難得以曉也彼江海之覆文粹作江海之覆也猶伊淄之覆也勢有疾徐故有不曉耳問者曰子之言數存而勢生非天也天果狹於文粹作于勢耶答曰天形恆圓而色恆青周廽可以度得晝夜可以表候非數之存乎恆髙而不卑恆動而不已非勢之乘乎今夫蒼蒼者一受其形于髙大而不能自還於文粹作于卑小一乘其氣于動用而不能自體於文粹作于俄頃又惡能逃乎數而越乎勢耶吾固曰萬物之所以為無窮者交相勝而已矣還相用而已矣天與人萬物之尤文粹作元者耳問者曰天果以有形而不能逃乎數彼無形者子安所寓其數耶答曰若所謂無形者非空乎空者形之希微者也為體也不妨乎物而為用也恆資乎有必依於文粹作于物而後形焉今為室廬而髙厚之形藏乎內也為器用而規矩之形起乎內也音之作也有大小而響不能踰表之立也有曲直而影不能踰非空之數歟夫目之視非能有光也必因乎日月火炎文粹作焰而後光存焉所謂晦而幽者目有所不燭耳彼狸狌文粹作猩犬鼠之目庸謂晦而幽耶吾固集作故吾曰以目而視得形之粗者也以智而視得形之微者也烏文粹作焉有天地之由有無形者耶古所謂無形蓋無常形也集作耳必因物而後見耳文粹作焉烏能逃乎數耶天論下或曰古之言天之厯象有宣夜渾天周髀之書言天之髙逺卓詭有鄒子今之言有自乎答曰吾非斯人之徒也大凡入乎數者由小而推大必合由人而推天亦合以理揆之萬物一貫也今夫人之有頭集作顔目耳鼻齒毛頥口百骸之粹美者也然而其本在乎腎腸心腑天之有三光懸㝢萬象之神眀者也然而其本在乎山川五行濁為清母重為輕始兩位既儀還相為庸噓為雨露噫為雷風乘氣而生羣分彚從植類曰生按尚書傳海隅蒼天謂草木也動類曰蟲倮蟲之長為知最大能執人理與天交勝用天之利立人之紀紀綱或壞復歸其始堯舜之書首曰稽古不曰稽天幽厲之詩集作時首曰上帝不言人事在舜之庭元凱舉焉曰舜用之不曰天授在商中宗襲亂而興心知說賢乃曰帝賚堯民之餘難以神誣商俗已訛引天而驅由是而言天預人乎道神仙可學論吳筠洪範嚮用五福其一曰夀且延命至於期頥皇天猶以為景福之最况神仙度世永無窮乎然則長生大法一作慶無等倫以儔擬當代一作世人物忽而不向一作尚者何哉嘗試論一作言之中智已下逮乎民氓八字一作愚智已下泯泯與飛走蛸翹一作蟯同其自生自死昧識所求不及聞道則相與大笑之中智已上為名教所撿一作拘區區於三綱五常不暇聞道而若存若亡一有若字能挺然竦身不使恆情之所汨沒專以修練一作錬為切務者千萬或一人而已又行之者密得之者隱故舉俗一作世罕聞其行一作方悲夫昔桑矯問㳙子曰自古有死復云有仙何如二字一作如之何㳙子曰兩有耳夫言兩有則理豈一無豈字無不存理無不存則神仙可學也一作矣嵇公言神仙以特授異氣禀之自然非積學之所能致也未必盡其端矣有不修學而自致者特稟受異氣也有必待學而後成者功業充也有學而不得者初勤而中惰誠不終也此三者各有其方一作𤣥肯不可以一貫推之人生天地中殊於衆類眀矣感則應激則通所以耿恭援刀平陸泉湧李廣發矢伏石飲羽一作入石沒羽精誠在於斯須土石應猶影響一作猶若響應况丹懇久著真君不為潜運乎潜運則不死之階立矣孰為真君則太上也為神眀宗極獨化於窈一作𡨕之先髙居紫微隂隲兆庶詩稱上帝臨汝書曰天鑒孔眀福善禍淫不差毫末而迷誤之子焉測其元一作源日用不知背本向末故逺於仙道者有七焉近於仙道亦七焉當世之士不一作能能窺妙門洞幽賾雷同以泯滅為真實生成為假幻但所取者性所遺者形甘之死地乃謂常理殊不知乾坤為易之緼乾坤毁則無以見易形氣為性之府形氣敗一作毁則性無所存性無所存則於我何有此逺於仙道一也其次謂仙必有限竟歸淪墮之弊一作墮之源彼自昏於智察則信其誣罔詎知塊然之有起自寥然之無積虛中一作而生神神用而孕氣氣凝而漸著纍著而成形形立而神居乃謂一作為人耳故任其流遁則死返其宗源則仙所以招真以鍊形形清則合於氣含道以鍊氣氣清則合於神體與道𡨕謂之得道道故一作固無極而仙豈有窮乎舉世大迷終於一作當不悟逺於仙道二也其次強以存亡為一體繆以道一作前識為悟真云形體以敗散為期營魄以更生為用乃厭見有之質謀將來之身安知入造化之洪爐任隂陽之鼓鑄逰魂遷革别守形器一作魂逰夢遷隔别守器神歸異族識昧先形猶鳥化為魚魚化為鳥各從所遇兩不相通形變一作化尚莫能知之况死而再造誠可哀者九子一作豈有死而再造誠可哀也而人不哀逺於仙道三也其次以軒冕為得意功名為不朽恱色耽聲豐衣厚味自封殖為長䇿貽後昆為逺圖焉知盛必衰髙必危得必喪成必虧守此用為深固置清虛於度外咠恬靜智一作肯以恬淡交養中和率性通真為意乎此逺於仙道四也其次強盛之時為情愛所役班白之後有希生之志一作心雖修一作習學始萌而傷殘未補靡蠲積習之性空務皮膚之好一作存竊慕道之名乖契真之實不一作未除死籍未載𤣥籙嵗月荏苒大期奄一作忽至及將殂謝而怨咎神明逺於仙道五也其次聞大丹可以羽化服食一作餌可以延年一作齡遂汲汲於爐火孜孜於草木財屢空於八石藥難效於三關不知金液待訣於靈人英芝一作芝英必滋於道氣莫究其本務之於一作修其末竟無所就謂古人欺我五字一作言人我欺逺於仙道六也其次身栖道流心溺塵境動違科禁淨無修持一作習外邀清譽之名一作外招清淨之譽內蓄姦回之計一作謀而至人一作人之可罔神不可欺逺於仙道七也其次性好一作文若性耽𤣥虛情忘一作寡嗜欲不求榮顯每樂清閒體氣至仁含𢎞至靜栖真物表超迹嵓巒想道結襟無為為事三十二字一作不知榮顯之可貴但守恬淡以自髙不見淫僻之可欲非用邪以自直體含至靜超迹塵滓棲真物表道侣從襟以無為為事近於仙道一也其次意一作希髙殷古刻志上一作意尚行知榮華為浮寄忽之而不顧知聲色能一作為伐性捐之而不取剪隂賊樹隂德懲忿損欲齊毁譽處林嶺修清真近於仙道二也其次身居祿位之榮心慕道德之府以忠貞而奉上以仁義而臨下𢎞施博愛內隂清徹外混囂塵惡殺好生四十字一作身居祿位之場心逰道德之鄉奉上以忠臨下以義於已薄於人厚仁慈恭和𢎞施博愛外混囂濁內守清真潜形隱迹好生惡死近於仙道三也其次瀟灑蓽門樂貧甘賤抱經濟之器泛然若虛洞古今之學曠然若無爵之不從祿之不受確乎以方外為上一作尚恬乎一作然以攝生為務此近於仙道四也其次禀類眀一作明類之姿懷秀拔之節奮三代一作忘機之旅當鋭巧之師所攻無敵一戰而勝然後靜以安身和以保神精以致真近於仙道五也其次追悔已一作既往洗心自新雖失之於壯齒冀收之于一作於晚節以功補過過落而功全以正易邪邪亡而正在轗軻不能移其操喧譁不能淪一作亂其慮唯精唯微積以成著其近於仙道六也其次至孝至貞一作至忠至孝至義一作真至廉按真誥之言一作說不待修學而自得比干剖心而不死惠風溺水以一作而獲生伯夷叔齊曽參孝己人見其沒道使之存如此之流咸入仙客謂之隱景潜化死而不亡此例自然近於仙道七也取此七近放彼七逺謂之拔陷區出溺途碎禍車登福輿始可與涉神仙流矣一作涉神仙之流耳於是識元命之所在知正氣之所由虛凝淡一作淡漠怡一作恬其性吐納屈伸和其體一作神髙靈保定之良藥匡輔之表裏兼濟形神俱超雖未得升騰吾知必揮翼丹一作紫霄之上矣夫道無形無為有情有性故曰人能思道道亦一作必思人道不負人人無負一作負於道淵哉言乎世情謂道體𤣥虛則貴無而賤有人資器質則取有而遺無庸詎知有自無而生無自一作因有而明有𤣥元三字一作有無混同然後為至一作象故空寂𤣥寥大道無象之象也兩一作二儀三辰大道有象之象也若但以虛極為妙不應吐元氣流隂陽生天地運日月也故有以無為用無以有為資是以覆載長存仙聖不滅故謂生者天地之大德也所以見宇宙之廣萬物之殷為吾存一作形也若煙散灰滅何異於天傾地淪彼自昭昭非我所有故曰死者天人荼毒之尤也孰能褒一作保大德黜荼毒拂衣絶塵獨與道鄰道豈逺乎哉行斯至矣夫至虛韞寂一作妙待感而靈猶金石含響待擊而鳴故豁方寸以遵一作契虛虛則靜憑至靜以精一作積感感則通通則宇泰定天光一有內字發形情相資未始有極且人之禀形模範天地五臟六腑百關四肢皆神明所居各有所主守存之則有廢之則無有則生無則死故去其死取一作保其生若乃諷太帝之金書研洞真之玉章集帝一於絳宫一作闕列三元於紫房吸二曜之華景登七元之靈綱道備功全則不必琅玕大還而髙舉矣此皆自凡而為仙自仙而入一作為真真與道合謂之神人神人能存能亡能晦能光出化機之表入大漠之鄉無心而朗鑒無翼而翺翔嬉明霞之館宴一作逰羽景之堂歡齊浩劫而福無疆夀同太虛而不可量十六字一作歡齊浩劫而無疆夀比太虛而無量此道布在金簡安可輕宣其奧密乎受學之士宜啓玉簽以探其祕焉及儒墨所崇忠孝慈仁一作忠真孝慈慶及王侯福薦祖考祚流子孫其三者一作以至此者孰與為大於戲古初一作舉也不可得而詳之羲軒已來廣成赤松令威安期之徒何代不有逺則載於竹帛近則接於見聞古今得之者皎皎如彼神仙可學炳炳如此凡百君子胡不勉哉一作焉一作皆本文神仙傳論梁肅豫嘗覽葛洪所記以為神仙之道昭昭焉足徴已試論之曰夫人之生與萬物同彼由妄而生由生而死生死相沿未始有極聖人知其本虛也其體無也示以大道俾性情其無妄而反諸本焉本則不生不生則不死然後能周遊太虛出入萬變朝為羲農暮為堯舜或存而亡或亡而存天地莫能覆而載也隂陽莫能陶而蒸也寂然不見其朕曭乎不識其門是之謂至神至神也者視天地四海若毛集作毫末而已萬古之前億載之後若一息而已列禦冦謂不生者能生不化者能化蓋謂彼也不性其情者則不然其用有際其動有待存亡相制倚伏相繫其道有數窮則壞故列禦冦謂生者不能不死不死者不能不化蓋謂此也彼仙人之徒方竊竊然化金以為丹錬氣以存身凱千百年居於六合之內是類龜鶴大椿愈集作逾長且久不集作何足尚也噫後之人迭為所惑不思老氏損之之義顔子不遠之復乃馳其智用以符籙藥術為務而妄於靈臺之中有所念慮其末也謂齒髮不變疾病不作以之為功而交戰於夭壽之域號為道流不亦大哀乎按神仙傳凡一百九十人豫所尚者唯柱史廣成二人而已餘皆生死之徒也因而論之以自警云黃冶論李德裕或問黃冶變化余曰未之學也焉知無有然天地萬物皆可以至理索之夫光明砂者天地自然之寶在石室之間生雪牀之上如初生芙蓉紅苞未拆細者環拱大者處中有辰居之象有君臣之位光明外徹採之者尋石脉而求此造化之所鑄也儻至人道奧者用天地之精合隂陽之粹濟之集作以神術或能成之若以藥石鎔鑄術則踈矣昔人問楊子鑄金而得鑄人以孔聖鑄顔子三字一作鎔冶顔子至於殆庶幾未若造化之鑄丹砂矣方士固不足恃劉向葛洪皆下學上逹極天地之際謂之可就必有精理劉向鑄作不成得非天意密此神機不欲世人皆知之矣方士論秦皇漢武非好道者也始皇擒滅六國兼羲唐之帝號漢武翦伐胸奴恢商集作殷周之疆宇皆開闢所未有也雖不能守集作尊周孔之道以為教化用湯武之師以行弔伐而英才逺略自湯武以降鮮能及矣豈不悟方士之詐哉蓋以享國既久歡樂以極馳驟集作騁弋獵之力疲矣天馬駭雞之求息矣魚龍角抵集作抵之戲倦矣絲竹鞞鼓之音厭矣以神仙為竒以方士為玩亦庶幾黃金可成赤集作青霄可上固不在於嗇神錬形矣何以知之荀卿稱千人萬人之情一人之情是也百王之道後王是也余聞武宗之言是以知耳嘗於便殿言及方士皆譎詭集作詐丕誕不可信也上曰吾知之矣宫中無事以此遣悶耳余嘗覽曹植論言左慈封一作對非君達之類家王及植兄弟以優笑畜之耳斯言信矣大抵方士皆習靜者為之隱身嵓穴不求聞達如山鹿野麋是其志也豈樂翹車之召哉敢自衒其術面欺明主者亦已鮮矣時既不用逐之可也殺之非也若以其詐而可誅則公孫卿欒大無非行詐殺其干勢利以自衒者足以大戒蘭艾同焚斯為甚矣貞觀末以集無以字髙宗不誅天竺方士那維延婆娑寐逐之歸國斯可為後王法矣養生論牛僧孺僧孺嘗讀嵇康養生論曰導養得理以盡性命下可數百年至於調節嗜欲全息正氣誠盡養生之能者僧孺以養身之於養生難與易相逺也所以康能著其論而陷大辟蓋能其易不能其難者也且天地禀生之道衆而貴之者寡然而貴乎生以有用於道也生而無用焉貴其生矣而又况康不能養乎哉且康居於是世能忘名利之名而不能使人忘其名能忘其情欲之情而不能自忘其情能防已喜怒於內而不能防人之喜怒於外雖其名利情欲喜怒之心不改乎內而能致其康寧焉碩大焉猶善豢者之犬彘肥腯適足使屠膾之刃促乎已矣出而處語而默是養其生者也處而語出而默生其喪矣沮焉溺焉道無邪行無詭言中規行中矩而得其時是養生於出處者也孔焉孟焉可而仕否而退是養生於出處語默之間者也若中散者栖乎下不可謂出揚其名不可謂默非出處則在用中於禮義人倫之道也禮者道之器也而肆情傲物蔑棄冠服是禮之大喪也禮喪而道喪則鍾㑹欲無怒晉王欲不刑之不可得也然康之為人區區不列於中人豈欲引而謂一作論之哉以拆文一作天垂論則人之中者引而惑必衆故不得不明也先人有求生以害人有殺身以成仁又有患難以相死此得則死此則得道得死而為夀不以非道得生而為夀也仁如比干而剖死直如屈原而溺死廉如介推而焚死忠如蕭望之而藥死而道存洋洋乎不已豫謂所存之生至遂大是能養生者若碌碌愚生不以五常之道為人豫焉知其夀歟焉知其昆蟲歟木石歟靈蛇千年豫不知其夀也石有時而泐豫不知其久也葵能衛其足豫不知其全也若康之養生有類是也適為下矣又况不能類之者哉嗚呼能養生於道者生死長短可也太古無為論劉蛻不得時者之言太古也無為而人化其禁畏也以使待令而從之也夫既為之君又為之師以受令而教其供也畏生而自禁畏令而君從則是不待君令而為太古時人也君既令之不立與人且猶不辦孰能得人心而化其無為哉夫天下之服一人也必其有所相須果身服歟自化也已果心服歟而心無為也已誰為太古之人也而勤何居焉夫庖犧氏之用契書也始代結繩則太古之政安用契一作結無為之心太古之家安用契無為之信果使有其一作異心則是賤教而尚其不教者也夫人之祭也必待詔相教而後能敬若豺獺也則不教而祭君子茍受其不教而能則豺獺亦敬也何貴人為故曰不得時者之言文苑英華卷七百三十九
