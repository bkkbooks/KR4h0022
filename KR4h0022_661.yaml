body:
  text: 文苑英華卷六百六十二宋李昉等編投知五上白相公啓一首上崔相公啓一首上翰林韋學士啓一首上令狐相公啓一首上崔相公啓一首上首座相公啓一首上宰相啓二首為人上裴相公啓一首上鹽鐡侍郎啓一首上封尚書啓一首投憲丞啓一首上裴舍人啓一首上蕭舍人啓一首上學士舍人啓一首上杜舍人啓一首上吏部韓郎中啓一首上白相公啓薛逢某啓某聞杞梓居林掄材必藉其良匠驊騮伏皂發跡用章於圉人將假激揚必先紹介如某者關中士族海內窮人幼遭憫凶壯知傳導南窮海裔北濟河源勤苦一經恓惶三紀家門板蕩亡惠子之五車風樹哀纒痛虞丘之三失加於元昆厄一作抱瘵孀妹無家同氣六人半歸全壤嗟乎郭氏之昆多疹顔生之室屢空縱白首粗霑一名或終身不知五味衰凶荐及沉痛可知往往晝卧及昏夜坐逹曉長安甲第羅列九衢朱門大開欲往誰訴因大中四年冬䝉相公念以苦心拔授館職期於旦暮必使奮飛旋遇羌冦犯邉相公北討風雲一失流落十年尉萬年而郎祕書宰四畿而糾東絡凡所蒞守皆立涓塵但以時尚佻浮不熟根本以親庶務者為俗吏以能矯枉者為令人聲名看門簿髙低流品出人家子弟竪置童騃擠排老成遂使清貫華資蔑聞於擬議塗趨坌走久困於風塵自相公每疑作再秉鈞衡重開罏冶私門相慶如春發榮山妻斂袂而前曰爾以詞賦掇髙科以詩篇逹天聽以政事取章綬以孤直沉下僚今相國司徒公鼓鑄元和疇庸品物風俗日益厚泰階日益平是懷才抱器之人雲飛雨化之秋也何尚悒悒於蓬茅者乎於是整某之冠急某之帶驅策僕御促某出門仍授某洛下所著百篇再拜祝而送之曰飛龍在天雲雨闐闐賢相秉鈞倫方序員時哉時哉君其勉焉某離鞍拜賜超乘而出茫茫一作茫洋然而又不知其所自平生坎壈難自梯媒進退囁嚅終莫上逹亦猶魘者夢逐聲愈哀而言愈不宣足愈勤而身愈不進孤影無援危燈在旁幽憂旅魂逼迫中夜獨能振臂呼而寤之者唯相公乎伏惟明誠燭兩耀大信鈞四時綱維設而天地開隂陽順而風雨若一物失所如推諸隍某所以滌慮嚮風齊心卜日細將肝膽具以一作再具投陳伏惟念以迷邦釋之網罟幸甚每自握朝鏡潜窺壯猷恭守門風不敢墜地或乘秋摶擊或載筆芟夷或獻替而定否臧或從容而備顧問儔諸流輩亦不後人誠知自衒自媒士之醜行但以日暮途逺倒行逆施若俟陟級循涯必慮填溝委壑而又搜尋志尚爰及成人役思慮者三十年著詩賦者千餘首雖不足誇張流輩亦可以傳示子孫豈料尚與廕弟小兒䠥􅍷中途而爭先後抑又聞哀音入耳逹者動容伏惟示以長途指之中道俾入懷之鳥重明戞漢之心曵尾之龜再有巢蓮之望不獨􅋦環報寶矯印酬愈必能當場效尅敵之功灼骨獻非熊之兆伏以國政初畢機務尚繁敢罄腹心先致門闥僣越之罪無所逃刑伏惟俯賜省覽百生幸甚百生幸甚不宣謹啓上崔相公啓某啓某聞擁腫之材動乖於繩墨琤瑽之韻自合於宫商雖觀聽以由人實否臧而在己所以困驥見稱於伯樂焦一作㸑桐取譽於伯喈咸發跡一時垂芳千祀某自開成建號則執藝求知跡忝及門名叨中選或緣情序美移時而奬導再三或體物逹誠一席而稱揚數四遂使聲華振耀喧動輩流桂折髙枝名登上第但以依仁嵗久軒墀之桃李成隂趨屏年深門巷之椅桐暗老徒䝉䕃覆莫自根牙良辰幾何𤣥鬢倐改伏惟相公推名意切録舊情深朝宣一言夕濟千里俾平生志業不負於辛勤向者恩知果成其逺大生死幸甚生死幸甚頗將偃頓屢瀆階墀日暮途遙誠堪憫念上翰林韋學士啓學士文山拔俗嵩華讓其孤標學海無邉乾坤以之涯涘優遊仙署偃息禁闈筆灑王猷硯涵天澤成霖而雨露非逺吐氣而虹霓坐舒流品羣倫衣冠仰其衡鏡扶持大厦社稷思其棟梁不有伊人孰為邦彥某頃因章句獲逹門墻雖大匠剪拂之間多慙擁腫而貧女鉛黃之飾豈讓娉婷故得桂枝先攀楊葉髙中始謂陵躍出泥渣指顧生風雲嗟乎九仞將成而一簣莫前三年欲飛而長風不借顧影增嘆誰將晤言當疑作嘗聞通義相公爐冶新開陶甄是切儻閣下猶傷墜履一作屨終許掃門信執鞭之亦為奚指蹤而不可方某選限猶逺官秩未期伏希度以短長擇其任用上可以考校書府下可以羽檄戎藩庶竭駑駘稍裨萬一聊將肝膽輒自梯媒躁進之辜不敢逃責上令狐相公啓溫庭筠某聞丘明作傳必受宣尼王隱著書先依庾亮或情優國士或義重門人咸托光隂方成志業抑又聞棄茵微物尚軫晉君壞刷小姿每干齊相豈繫效珍之飾蓋牽求舊之情某邴第持囊嬰車執轡旁徴義故最歷星霜三千子之聲塵預聞詩禮十七年之鉛槧尚委泥沙敢言蠻國參軍才得荆州從事自頃潘床無鏡校府紹疑弓戴經稱女子十年留於外族稽氏則男兒八嵗保在故人藐是流離自然飄蕩呌非獨鶴欲近商陵嘯類斷猿況鄰巴峽光隂詎幾天道如何豈知蕞陋之姿獨隔休明之運今者野氏辭任宣武求才儻令孫盛緹油無慙素尚蔡雍編録獲偶貞期微回謦咳之榮便在陶鈞之列不任靦冒倣徨之至上崔相公啓某聞石苞羈賤早遇何曽魏武尊髙猥知徐晃其後咸成間氣訖立鴻勳簡册一作素增輝亦俾鐏彛動彩則道惟熙載皆資甄藻之時德邁賡歌必用搜羅之道是以皇綱克序茂範咸凝某荆氏凡材雕陵散質謬傳清白實守幽貞矍圃彎弓何能中鵠丘門用賦尋耻雕蟲常患荒蕪殊非挺拔依劉薦禰素乏梯航慕吕攀嵇全無等級分甘終老莫有良期既而竊仰洪鈞來窺皎鏡墳壚下土敢望頒形甕盎頑姿寧希鑒貌豈謂不遺孤拙曲假生成拔於泥滓之中致在煙霄之上遂使龍門奮發不作窮鱗鶯谷翩翻一作翺終陪逸翰此則在三恩重吹萬功深空乘變律一作捷之機未得捐軀之兆豈可猶希鼓鑄更露情誠伏念良馬嘶風非甘伏皂饑鷹刷羽終耻棲籠誠知豢養之恩頗有飛翔之志而又専門有暇曽習政經閉户無營因窺吏事既辨張湯之鼠深知子産之魚書劍倣徨年光倐忽徒思效用無以為資儻䝉再扇薰風仍宣厚澤庶使晏嬰精鑒獲脫於在途鬷蔑微班得升於收器才聞謦咳便是扶搖上首座相公啓某聞舉不違宗得於王濟近因其族聞自謝𤣥雖通人與善之規亦前哲睦親之道某謬恭華緒得庇餘䕃固己鯉庭䝉翼長之恩阮巷辱心期之許遂得遷肌改骨擁本揚英則窮鳥入懷靡求他所羈禽繞樹更託何枝昨者膏壤五秋川塗萬里逺違慈訓就此窮棲將卜良期行當杪嵗通津加歎旅舍傷懷相公河潤餘津雲行廣施調羮之味未及宗親育物之餘希沾幼弱儻或假一言之甄發隨百蟄之昭蘇庶令葛藟之隂拘疑作均其煦育椒聊之實遂彼扶踈成鍾儀操樂之規寬顧悌拜書之戀下情無任上宰相啓二首某聞日麗於天洪纎必及月離於畢枯槁皆蘇斯則推拔疑作彼無私彰於大信茍關於宰匠咸仰以生成其或潤接西郊流金未己光承北陸豐蔀猶深則亦分作窮人甘為棄物嵗華超越京洛風塵忽爾號咷固非阮籍泫然沾灑不為楊朱略忘􅌤冒之辜惟以哀矜為主伏念三餘蕳墮六尺伶俜臨濟輝華昔懸陳榻洛陽羈旅今造膺門己驚於自棄流根敢望於裒多益寡但以謝家故墅事屬臨川陸氏先疇名遷好畤同氣雖均於昭泰連枝或纍於榮枯是以更就洪鈞來呈瑣質雖戴逵之弟志尚無聞而何凖之兄恩輝己遍豈宜茍希河潤更望餘波投驥尾以容身執豚蹄而望嵗然則迹同永疑作水子質異山郎梓柱雲楣獨居蝸舍綺襦紈袴己卧牛衣若乃清旦問安長筵稱夀貂璫必集少長俱來膏沐之餘則飛蓬作鬢銀簧之末則青草為袍莫不顧影包羞填膺茹歎儻或王庭辨貴許厠九疑京縣坐曹令懸五色校於同列未越彛章則衛館孤遺常聞出涕山陽舊曲不獨傷心誓將居必在勤行惟鞭後潜知寄託所望於江州必效忠貞得酬於吏部無任惶懼之至二某聞仁祖乘流先知彥伯張慿植棹整值劉惔豈惟俄頃遭逄抑亦初終汲引當其羈遊臨汝旅泊丹徒遐思謦咳之音杳絶烟雲之路茍無直道將委窮途何異於懸水揚音九弄有潺湲之曲嚴霜戒節兩攣含清越之儀某融襟蟻術簉跡龍門三千子之聲塵曽參講席十七年之鉛槧夙預𤣥圖而性禀半癡機無兩可牧堯羝而寡術舉舜鳳以無緣使何凖之兄皆為杞梓戴逵之弟獨守蓬茅至於詞苑辛勤儒林積習自期燕笥不愧秦臺伏以相公周輅輪轅虞琴節奏早振經邦之業果敷華國之姿伊尹安危本同於兆庶淵源晉殷浩字淵源唐人避諱以深字代淵此猶存舊字行止必繫於興衰既而放跡戎軒遺榮畫室劉尹秣陵之桞尚有清風邵公陜服之棠空留美䕃竊聞謡詠即付樞衡是以負笈趨塵羸糧載路願奏書於台席思撰履於侯門儻張禹尊髙猶為戴榮說禮鄭𤣥嚴毅便令服慎聞詩敢嘆朝饑誠甘夕死加以旅途勞止末路蕭條不無悽惻之懷豈止羈離為主仰瞻旌棨如望蓬瀛不任懇迫之至為人上裴相公啓某聞瘦馬依風悲皆感土秋鷹厲吻饑則投人能知豢養之恩頗識歸飛之兆是以臺卿瀝墾先告孫賔越石棲身惟親晏子觀賢逹始終之趣察古今行止之規必有良知願諧依託某伶俜弱植憔悴孤根詞林無渙水之文官路乏甘陵之黨每持踈拙久謝紛華既而曵履侯門經時不遇牽裾憲府越月而升九衢獨愧於迷津五省才霑於掌庾相公初締鄭棟甫潤殷林寧知蕞陋之姿首在陶甄之列扳於郎吏委在絃歌元日縱囚殊無異政清晨探賊未報殊恩豈期遽露情誠猶煩鼓鑄近者私門集舋同氣貽災孀幼流離關河𬗟邈淚變萇𢎞之血髮同園客之絲萬里魂銷孤燈弔影蓋人生之大痛行路之同悲泉壤長辭何緣取決人琴併絶不得申哀端居則有愧簮纓乞告而曽無事例又以孔懷酷逺先塋非遙永言龜告之期遂在蟈鳴之月儻解其所任契彼私心絶𬗟冒於官曹獲優游於教義孤誠所願九死如歸其或念以艱虞難於罷免亦有虛間散秩不滿於幽微終鮮之悲無慙於顯晦伏增哀迫懇欵之至上鹽鐡侍郎啓某聞珠履三千猶憐墜屨金叉十二不替遺簮茍興求舊之懷不顧窮奢之飾亦有河南撰刺徴彼通家號略移書期於倒屣志亦求於義合理難俟於言全某菅蒯凡姿邾滕陋族釋耕耘於下邑觀禮樂於中都然素勵顓䝉常耽比興未逢仁祖誰知風月之情因夢惠連或得池塘之句莫不𡨕搜刻骨默想勞神未嫌彭澤之車不嘆萊蕪之甑其或嚴霜墜葉孤月離雲片席飄然方思獨往空亭悄爾不廢間吟强將麋鹿之情欲學鴛鴦之性遂使幽蘭九畹傷謡詠之情多丹桂一枝竟攀援之路斷豈真牛衣有淚蝸舍無煙此生而分作窮人他日而惟稱餓𨽻頃者萍蓬旅寄江海羈逰逹姓字於李膺獻篇章於沈約特䝉俯開嚴重不陋幽遐至於逺泛仙舟髙張妓席識桓溫之酒味見羊祜之襟情既而哲匠司文至公當柄猶困龍門之浪不逄嬰友一作谷之春今日俯及陶鎔將裁品物輒申丹慊更竊清音儻一顧之榮將回於咳唾則陸沉之質庶望於騫翔永言進退之塗使決榮楛之分如翩翻賀燕巢幕何依觳觫齊牛釁鐘將逺茍難窺於數仞則永墜於重泉空持擁篲之情不識呌閽之路不任懇迫之至上封尚書啓某跡在泥途居無紹介常思激勵以發湮沉素禀顓愚夙耽比興因得誅茒絶頂剃草荒田默想勞神𡨕搜刻骨遂使崇朝覽鏡壯齒成衰暇日歌冠𤣥髫一作髻變白望將蕪菲來貢文明伏遇尚書秉甄藻之權盡搜羅之道誰言凡拙獲預恩知華省崇嚴廣庭稱奬自此鄉閭改觀瓦礫生姿雖楚國求才難陪足跡而丘門託質不負心期一旦推轂貞師渠門錫社顧惟孤拙頻有依投今者正在窮途將臨獻嵗曽無勺水以化窮鱗俯念歸荑猶憐棄席假劉公之一紙逹彼春卿成季布之千金沾於下士微回咳唾即變升沉羈旅多虞窮愁少暇不獲親承師席躬拜行臺輕冒尊顔伏增惶懼投憲丞啓某聞古者窮士求知孤臣薦拔或三嵗未嘗交語或一言便許忘年竒偶之間彼何相逺則運租船上便獲甄才避雨林中俄聞託契此又無由自致不介而親者也某洛水諸生甘林下黨曽遊太學不識承宫偶到離庭始逢仲皓懸蘆照字編葦為資遂竊科名才沾祿賜常恐澗中孤石終無得地之期風末微姿未卜棲身之所侍郎議一作義合機彖望逼台衡每叙羣才常推直道昨者攝齊丘里撰刺膺門伏䝉清誨垂私溫言假煦內惟孤賤急被輝華覺短羽之陵颷似窮鱗之得水今者方祗下邑又隔嚴扄誰謂避秦翻同去魯佇見漢朝朱慱由憲長以登庸願同晉室徐寧因縣僚而遷次下情無任上裴舍人啓某自東道無依南風不競如擠井谷若泛滄溟莫知投足之方不識棲身之所孫嵩百口繫以存亡王尊一身困於賢佞伏念濟絶氣者命為神藥起僵尸者號曰良醫自頃常奉緒言每行中慮猥將瑣質貯在𢎞襟今則阮路興悲商歌結恨牛衣夜哭馬柱晨吟一笈徘徊九門深阻敢持幽欵上訴隆私伏以舍人十六兄法上聖之規行古人之道俯敦中外不陋幽沉迹在層霄足有排虛之計身居大艑寧無拯溺之方伏在庭除希聞謦咳下情無任上蕭舍人啓某啓某聞孫登之奬嵇康鬷蔑之逢叔向蓋亦仙凡自隔豈惟流品相懸雖三秀靈一作鮮華終難苟得而一言輝發因此相期曷嘗不仰企前修追懷逸躅豈期陋質偶竊貞規某器等瓶筲居惟嶺嶠徒然折簡非孔門之詞率爾中科沗劉繇之第殷硎協律頃因同籍遂及論交竊示衷一作裏言奉揚嚴㫖張司空汲引先及陸機楊丞相銓衡竟遺劉炫實亦義同得祿榮甚登門伏以舍人川瀆降靈星辰效祉所冀陶鈞之日不忘簮屨之餘報不先期竊比齊門座客情非自外欲為顧氏家丞徒自捐軀安能報德下情伏增依託上學士舍人啓二首某聞七桂疑希聲契𡨕符於渌水兩變孤響接𤣥映於清霜感逹真知誠恭神妙其有不待奔傾之狀寧聞擊考之功亦有芝砌流芳蘭扄襲馥已困雕陵之彈猶驚衛國之弦而暗逹明心潜申讜議重言七十俄變於榮枯曲禮三千非由於造詣始知時難自意道不常艱某荀鐸搖車雍琴入㸑委悴信疑人之末摧殘膳宰之前不遇知音信為棄物伏以學士舍人陽葩搴秀夏采含章靜觀行止之規己作陶鈞之業遂使枯魚被澤病驥追風永辭平坂之勞免作窮途之慟恩如可報雖九死而奚施軀若堪捐豈三思而後審下情無任二某步類夀陵文慙渙水登髙能賦本乏材華獨立聞詩空遵詣道在蜀郡而惟希狗監泝河流而未及龍門常嘆美玉在山但揚異彩更恐崇蘭被徑每隔殊溱一作榛徒自沉埋誰能攀襭一旦雕於敏手佩以幽襟免使琳慙寧貽蕙歎潜虞末路未有良期今乃受薦神州爭雄墨客空持硯席莫職津塗既而臨汝運租先逄謝尚丹陽傳教取一作散覔張慿輝華居何凖之前名第在冉耕之列俄生藻繡便出泥沙誰言獻輅車軨先期畢命猶懼吹竽樂府未稱知音儻更念毛輶終思翼長贖彼在途之厄仍遺生芻脫於鳴坂之勞兼貽半菽平生企望終始依投不任感恩干冒之至上杜舍人啓某聞物乘其勢則嘒紀畫塗王褒傳忽若慧汜畫塗英華訛慧汜作嘒紀才戾於時則荷戈入棘必由賢逹之門乃是坦夷之徑是以陸機行止惟繫張華孔闓文章先投謝朓遂得名髙洛下價重江南惟彼歸荑同於拾芥其弱齡有志中嵗多虞模孝綽之辭方成箋奏竊仲任之論始解言談猶恨日用殊多天機素少揆牛涔於巨浸持蟻垤於維嵩曽是自强雅非知量李郢秀奉揚仁㫖竊味昌言豈知沈約扇中猶題拙句孫賔車上欲引凡姿進不自期榮非始望今者永塗怊悵羈宦蕭條陋容須託於媒楊沉痼宜蠲於醫緩亦嘗懷鉛信史鼓篋遺文頗知甄藻之規粗逹顯微之趣儻使閣一作閣中撰述試傳名臣樓上妍蚩暫陪諸𨽻微回木鐸便是雲梯散露誠情輒干牆仞上吏部韓郎中啓某識異旁通才無上伎幸傳丕訓免墜清芬衡軛相逢方悲下路弦􅓡未審可異前朝郭翻無建業先疇嵇紹有滎陽舊宅故人為纍僅得猪肝薄伎所存殆成雞肋分隂屢轉尺涕難收仲宣之為客不休諸葛之娶妻怕早居惟數畝不足棲遲智效一官靡能沾沃荒涼散社流寓窮途髙堂之饔社難充下澤之津蹊可見竊以棄茵懷舊尚動深仁投釣言情猶牽末契敢將幽懇來問平衡升平相公簡翰為榮巾箱永祕頗垂敦奬未至陵夷儻䝉一話姓名試令區處分鐡官之瑣吏厠鹽醬之常僚則亦不犯脂膏免藏縑素豈惟窮猿得木涸鮒投全然後幽獨有歸永託山濤之分赤蟻疑作赤㬢無耻免干程曉之門進退倣徨不知所喻文苑英華卷六百六十二
