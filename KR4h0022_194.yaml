body:
  text: 文苑英華卷一百九十四宋李昉等編樂府三公子行九首少年行四十二首輕薄篇五首公子行劉希夷天津橋下陽春水天津橋上繁華子馬聲廻合青雲外人影摇空緑楊裏一作摇楊緑波裏碧波蕩漾玉為沙一作緑波清廻玉為砂青雲離披錦作霞可憐楊柳傷心樹可憐桃李斷腸花此日遨遊㸔美女此時歌舞入倡家倡家美女鬱金香飛去飛來公子傍灼灼一作的的珠簾白日映娥娥玉貌一作顔紅粉粧花際徘徊雙蛺蝶池邊顧歩兩鴛鴦傾國傾城漢武帝為雲為雨楚襄王古來容光人所羡况復今日遥相見願作輕羅着細腰願為明鏡分嬌靣與君相向轉相親與君相栖共壹身願言一作願作真松千歲古誰論芳槿一朝新百年同謝西山日千秋萬古北邙塵一有此二句同前常建日日乗釣舟嫋嫋持釣竿渉淇傍荷花驄馬閑金鞍俠客白雲中腰間懸轆轤出門事嫖姚為君西擊胡胡兵漢騎相馳逐野戰孤軍西海曲百尺旌竿沉黒雲邊笳落日不堪聞同前司空曙纒臂繡綸巾貂裘窄稱身射禽風助箭驟馬雪飛塵金垺爭開道香車為駐輪翩翩不知處應是霍家親同前于鵠少年初拜大長一作大常秋半醉垂鞭見列侯馬上抱雞三市鬬袖中携劔五陵遊玉簫金管迎歸院錦繡一作袖紅粧擁上樓更向苑東新買宅月陂一作碧波春水入門流同前李商隱一盞新羅酒凌霜一作晨恐易銷歸應衝皷半去不待笙調歌好難愁和香多不一作濃豈惜飄春塲鋪艾帳下馬雉媒嬌同前雍陶公子風流嫌一作輕錦繡新裁白紵作春衣金鞭留當誰家酒拂柳穿花信馬歸同前韓琮紫袖長衫色銀蟬一作蟾半臂花帶装集作長盤水玉鞍繡坐雲霞别殿承恩澤飛龍賜渥洼控羅青裊轡鏤象碧重葩意氣催歌舞䦨珊走鈿車袖障一作彰雲縹緲釵轉鳳欹斜珠巻迎歸箔紅籠晃醉紗唯無難夜日不得似仙家同前二首聶夷中漢代多豪族恩深益驕逸走馬踏殺人街吏不敢詰紅樓宴青春數里望雲蔚金釭熖一作艶勝書不畏落暉疾美人盡如月南威莫能一作不敢匹芙蓉自天來不向水中出飛瓊奏一作綺席戞雲和碧簫吹鳳質唯恨魯陽死無人駐白日二花樹出墻頭花裏誰家樓一行書不讀身封萬户侯美人樓上歌不見古凉州少年行呉均董生能巧笑子都信美目百事一作萬市一言千金買相逐不㸔參差莱誰能一作論窈窕淑願言奉一作捧繡被來就越人宿同前沈烱長安妙少年騘馬鐡連錢陳王装馬腦晉后鑄金鞭歩摇如飛鷰寶劔一作鍔劔似舒蓮去來新市北遨遊大道邊倐忽作老翁顔鬢似衰蓬自言生漢代少小見豪雄五侯俱拜日一作拜爵又作日拜七貴各論功建章連北闕一作通北闕複道應一作度南宫大后居長樂天子出廻中玉輦迎飛鷰金山賞鄧通一朝復一日忽見市朝空扶桑無復海崑山倒向東少年何暇問頽齡遇一作值福終子孫𡨕滅盡鄉里一作閭不復同淚盡眼方暗脾傷耳自聾杖䇿尋遺老歌笑一作嘯詠悲翁追隨各有遇非敢訪童䝉同前李百藥少年飛翠葢上路勒金鑣始酌文君酒新吹㺯玉簫少年不一作子歡樂何以一無此二字盡芳朝千金笑裏靣一搦撐一作抱中腰掛纓誰一作冠豈憚宿落珥一作拜迎不勝嬌寄語一無此二字少年子無辭歸路遥同前張昌榮少年不識事落魄遊韓魏珠軒流氷車玉勒浮雲騎縱横意不一然諾心無二白璧贈穰苴黄金奉毛遂妙舞飄龍管清歌吟鳳吹三春小苑遊千日中山醉直言身可沉誰論名與利依倚孟嘗君自知能市義同前鄭愔潁川豪横客咸陽輕薄兒田竇方貴幸趙李新相知軒蓋終朝集笙竽此夜吹黄金盈篋笥白日忽西馳同前四首王維新豐美酒斗十千咸陽遊俠多少年相逢意氣為君飲繫馬髙樓垂柳邊二出身仕漢羽林郎初隨驃騎戰漁陽孰知不向邊廷苦一作死縱死猶聞俠骨香三一身能擘一作臂兩彫與琱同弧虜騎千重一作羣祗似無偏坐金鞍調白羽紛紛射殺五單于四漢家君臣歡宴終髙議雲臺論戰功天子臨軒賜侯印将軍珮出明光宫同前三首杜甫馬上誰家白靣郎臨軒一作街下馬坐人床不通姓字麄豪甚指㸃銀瓶索酒嘗二莫笑田家老瓦盆自從盛酒長兒孫傾銀注玉集作瓦驚人眼共醉終同臥竹根杜集作臨街下馬此云臨軒下馬杜集作傾銀注瓦此云傾銀注玉皆當以此書為正葢謬為俗子改易此所以重古本也三巢鷰養兒渾去盡江花結子也無多黄衫年少來宜數不見堂前東逝波同前三首李白君不見淮南少年遊俠客白日毬獵夜擁擲呼盧百萬終不惜報讐千里如咫尺少年遊俠好經過渾身装束皆綺羅蘭蕙相隨喧妓女風光去處滿笙歌驕矜自言不可有俠士堂中養來乆好鞍好馬乞與人十千五千旋沽酒赤心用盡為知己黄金不惜栽桃李桃李栽來幾度春一廻花落一廻新府縣盡為門下客王侯皆是平交人男兒百年且樂命何湏狥一作讀書受貧病男兒百年且榮身何湏狥節甘風塵衣冠半是戰征士一作征戰窮儒浪作林泉民遮莫枝根長百丈不如當代多還徃遮莫親姻連帝城不如當身自簪纓㸔取富貴眼前者何用悠悠身後名二青雲少年子挾彈章臺左鞍馬四邊開突如流星過金丸落飛鳥一作肉夜入一作深瓊樓卧夷齊是何人獨守西山餓三五陵年少金市東銀鞍白馬度春風落花踏盡遊何處笑入胡姬酒肆中同前一作渭城少年行崔顥洛陽二月梨花飛秦地行人春憶歸揚鞭走馬城南陌朝逢驛使秦川客驛使前日發章臺傳道長安春早來棠梨宫中鷰初至葡桃館裏花正開念此使人歸更早三月便達長安道長安道上春可憐摇風蕩日曲江邊萬户樓臺臨渭水五陵花柳滿秦川秦川寒食盛繁華遊子春來不見一作喜家鬬雞下社春初合走馬章臺日半斜章臺帝城稱貴里青樓日晩歌鐘起貴里豪家白馬嬌一作驕五陵年少不相饒雙雙挾彈來金市兩兩鳴鞭上渭橋渭城橋頭酒新熟金鞍白馬誰家宿可憐錦瑟筝琵琶玉壺清酒就君家小婦春來不觧羞嬌歌一曲楊柳花同前此詩見二百五卷崔國輔同前二首王昌齡西陵俠少年送客過長亭青槐夾兩路白馬如流星聞道羽書急單于冦井陘氣輕浮道一作蹈難一作氣髙輕赴難誰願一作顧燕山銘二走馬還相尋西樓下夕隂結交期一劔留意贈千金髙閣歌聲逺重門一作關柳色深夜䦨湏盡醉莫負百年心同前一作邯鄲少年行高適邯鄲城南一作西遊俠子自言一作矜生長邯鄲裏千塲縱愽家仍富幾度一作處報讐身不死宅中歌舞日紛紛門外車馬常集作矗又作長如雲三字一作如雲屯未知肝膽向誰是令人却憶平原君不見即今集作今人交態薄黄金用盡還踈索以兹感嘆一作激辭舊遊更於時事無所求且與少年飲美酒徃來射獵西山頭同前呉象之承恩借獵小平津使氣常遊中貴人一擲千金渾是膽家無四壁不知貧同前四首李嶷十八羽林郎戎衣侍漢一作事漢王臂鷹金殿側挾彈玉轝一作輿旁馳道春風起陪遊出建章二侍獵長楊下承恩更射飛塵生馬影滅箭落鴈行稀薄暮隨天一作歸隨仗聫翩入鏁闈三玉劍膝邊横金盃馬上傾朝遊茂陵道夜一作暮宿鳳凰城豪吏多猜忌無勞問姓名同前韓翃千㸃斕斒噴玉騘青絲結尾繡纒騣集作鬃鳴鞭曉出章臺路禁葉春衣楊柳風同前一作長安少年行釋皎然翠樓春酒蝦蟆陵長安少年皆共矜紛紛半醉緑槐道躞蹀花騘驕不勝同前二首李益君不見上宫警夜營八屯鼕鼕街皷朝朱軒玉堦霜仗擁未合少年排入銅龍門暗聞絃管九天上宫漏沉沉清吹繁平一作纔明走馬絶馳道呼鷹挾彈通繚垣玉龍金鎻養黄口探雛取卵伴王孫分曹六博快一擲迎歡先意笑聲喧巧為柔媚學優孟儒衣嬉戲冠沐猿晩來香街經柳市行過倡舎宿桃根相逢酒後一作盃酒一言失廻朱㸃白聞至尊金張許史伺顔色王侯将相莫敢論豈知人事無定勢朝歡暮戚如掌飜椒房寵移子愛奪一夕秋風生戾園徒用黄金将買賦寕知白玉暗成痕持盃收水水已覆徙薪避火火更燔欲求四老張丞相南山如天不可上二生長邊城傍出身事弓馬少年有膽氣獨獵隂山下偶與匈奴逢曽擒射鵰者名懸壮士籍請君少相假同前張籍少年從獵去集作獵出又作出獵長楊禁中新拜羽林郎獨對輦前射雙虎君王手賜黄金璫白日鬭雞傍新市一作日日鬭雞都市裏贏得寶刀重刻字百里報讐夜出城平明還抵一作在倡樓妓遥聞虜到平陵下不待勑集作詔書行上馬斬得戎一作名王獻桂宫封侯起宅一作第一日中不為北一作六郡良家子百戰乃得一作始取邊城功同前五首一作長安少年行李廓金紫少年郎繞街鞍馬光身從左中尉官屬右春坊剗戴楊州㡌重熏異國香垂鞭踏青草來去杏園芳二追逐輕薄伴閒遊不著緋長櫳出獵馬數換打毬衣曉日尋花去春風帶酒歸青樓無晝夜歌舞歇時稀三新年髙殿上始見有光輝玉鴈排方帶金鵝立仗衣酒深和椀賜馬疾打珂飛朝下人爭㸔香街意氣歸四㦸門連日閉苦飲惜殘春開鎻通新客教姬屈醉人請歌牽白馬自舞踏紅茵時輩皆相許平生不負身五遨遊携豔妓装束是男兒杯酒逢花住笙歌簇馬吹鶯聲催曲急春色訝歸遲不似聞街皷華筵待月移同前杜牧官為騣馬監職帥羽林兒兩綬藏不見落花何處期獵敲白玉鐙怒袖紫金鎚田竇長留醉蘇辛曲讓一作䕶岐豪持出塞節笑别逺山眉㨗報雲臺賀公卿拜夀巵同前雍陶不倚軍功有俠名可憐毬獵少年情戴鈴徤鶻隨聲下撼珮驕騘弄影行覔匠重装燕客劔對人新按越姬筝豈知儒者心偏苦吟向秋風白髪生同前二首僧貫休錦衣鮮華一作潔手擎鶻閒行氣貌多輕忽稼穡艱難總不知三皇五帝是何物二自拳五色毬送入他人宅却促蒼頭奴玉鞭打一百同前二首王貞白遊讌不知厭杜陵狂少年花時輕暖酒春服薄装綿戲馬上林苑鬬雞寒食天魯儒甘被笑對策鬢皤然二弱冠投邊急驅兵夜渡河追奔鐡馬走殺虜寶刀靴威靜黒山路氣含一作吞清海波常聞為突騎天子賜長戈輕薄篇何遜城東美少年重身輕萬億拓彈隨珠丸白馬黄金飾長安九逵上青槐隂一作䕃道植轂擊晨已喧肩排𡨕不息走狗通四一作息望牽牛亘一作向南直相期百戲傍去來三市側象牀沓繡被玉盤傳綺食倡女掩扇歌小婦開簾織相㸔獨隱笑見人還歛色黄鶴悲故鄉山川詠新識鳥飛過客盡雀聚行龍匿酌酒方厭厭此時歡無極同前張正見洛陽美少年朝日正開霞細踏聫鑣一作連錢馬傍趨苜蓿花揚鞭却還望春色滿東家井桃映水落門柳雜風斜綿蠻弄青綺蛺蝶遶承華欲徃飛亷館遥駐季倫車石榴傳馬腦蘭肴奠象牙聊持自一作自持娯樂未是鬭豪奢莫嫌龍馭曉一作晩扶桑復浴鴉同前李益豪不必馳千騎雄不在垂雙鞭一作鞬天生雋氣自相逐出與鵰鶚同飛翻朝行九衢不得意下鞭走馬城西原忽聞燕鴈一聲去廻鞍挾彈平陵園歸來青樓曲未半美人玉色當金樽淮隂少年不相下酒酣半笑倚市門安知我有不平色白日欲顧一集作願紅塵昏死生容易如反掌得意失意由一言少年但飲莫相問此中報讐兼一作亦報恩同前二首釋貫休繡林錦野春態相壓誰家少年馬蹄蹋蹋鬬雞走狗夜不歸一擲賭却如花妾唯言不顛不狂其名不彰悲夫二木落蕭蕭蛩鳴唧唧不覺朱蔫臉紅霜刼鬢漆世途多事泣向秋日方今一作吟少壮不努力老大徒傷悲如何文苑英華巻一百九十四
