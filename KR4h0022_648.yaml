body:
  text: 文苑英華卷六百四十九宋李昉等編彈文彈賈執傅湛文一首彈張瑾將軍等文一首彈李子和將軍文一首為奚御史彈尚書某人入朝不敬文一首代御史王師旦彈莒國公唐儉文一首彈劍南東川節度使嚴礪文一首彈賈執傅湛文梁大同中劉孝儀長兼御史中丞劉孝儀稽首言南康嗣王府行參軍知譜事賈執與前中書舍人傅湛在王座飲酒時上不安人從臺還聖體巳和湛乃揚眉瞋目謂執曰卿念天子我不見闕出悖慢言語連及于上共執忿諍湛昔經殺牛誤父自殺近效殘貪賄賂狼籍特逢解網宥其餘命自被棄廢尤懷怨憤謗訕不遜謹按前兼通事舍人臣傅湛才簿一作薄駑蹇特荷抽擢自預左右頻蹈極刑押對鞫書纍逢闕過未聞報效反懷恚憤聖體不安臣下憂懼而湛敢生怨望輕肆慢辭醜爭及父心無愛敬戲語連上罪同悖逆未央馬瘦不覩廄令之忠甘泉道蕪遽見扶風之罪宜其狥乎東市尸彼轂門南康嗣王府參軍臣賈執始聞湛語初無逐雀之心末因私忿遂顯懷鴆之逆雖跡似折奸意由肆憾惡慢於人自彰穢醜見辱父子巳㑹季倫之辭爭及其父復入梁蚡之難一作歎是使王嬙悲于連纍黑要喜於得用大子舍人始興蕃王臣蕭毅幸因祉祚爵預藩屏而散金失所設醴乖人雍容之賔未遊於雕苑號怒之容日醉於雷池致使博徒跅弛慢醉盈路􅌤顔受辱曽無發糾並恕伯厚之心俱鳴路粹之責臣等參議請以見事依法免毅所居官解執知譜事請議貶黜付之卿論不得厮預官流刺尚施行輒不禁止彈張瑾將軍等文杜正倫臣聞陳力就列不能者止鐘鳴漏盡夜行宜息故張良多病辭少傅而專道養韋賢告老謝丞相而乞骸骨豈惟體非筋力不可疲殆從政抑亦情重謙退欲以亷讓𢎞道自時積亂離久習澆弊仁義之化忽之其若遺名利所存苟得而無耻今四海乂安羣生樂業陛下思治之情勞於寤寐臣謂欲防其末先正其本若亷耻之教不行則升平之化無自謹按瑾等理治之教義多罕稱出身事主行能兼闕年方壯也尚不如人耄又及之無能為矣張瑾拔跡行陳素無才略自歸聖朝總兵一作屢總過任子玉之戰頻有喪師須賈之髮未足論罪朝廷假以餘年不置于法陛下再造天地更施雲雨瑾等並以髮齒流恩遂使名器踰量特進之號擬迹竇周公冠軍之名連衡霍去病既年在遲暮智之老成宜思靜退自安止足而外託闕庭之戀內希筐篚之恩牽力衰朽强顔預朝一作強預朝㑹陛下仁愛之心形容于萬物以其不堪侍立特于廊下賜坐叨榮自若聞寵不驚貪競之志更深靦目一作冒之顔愈厚臣聞設法訓人在𢎞其教引年敬老終取于賢寧有庸庸之流諄諄若是而可均彼上庠忝兹厚秩且名曰人臣事乖朝列養非貴德坐異論道縱慶雲之㑹不别荆棘闕恩傷教其如禮何臣以庸才謬當朝寄風俗未清實任其咎瑾等爵秩既隆虧損尤大釋此不問安事狐貍激貪止競宜從隗始儻天地含容未至一作忍屏黜請斥放之罷歸里第且七十致仕古今通規近代以來貪競不息臣隨即舉劾恐陷罪者多內外諸司有如此比散下知之使遵節制四維以張彛倫式叙彈李子和將軍文杜正倫臣某言臣聞同隂以息分路尚有悽然向隅成悲滿堂猶且不樂况天倫長逝伉儷不終共被同車之歡遂隔今古撫存悼亡之痛有傷心目而可譬孔懷于行路忽齊體於泉壤對凶筵而奏艷妓悅新寵而忘舊哀此實名教所不容人倫之尤蠧者也謹按子和一介庸流百行兼闕階緣際㑹叨濫恩榮乃分建茅參掌禁衛厠跡周行有年嵗矣縱前賢之行未識思齊而先王之禮宜其企及寧有弟喪妻殞才逾十旬子哭父歌遂同一日身被子髙之縗室對安人之簟鄰舂不相而家妓畢陳節物共時而悲欣相對傷風損教莫此為甚何可視息人間參預朝列雖自鄶巳下無足致譏而告朔餼羊實愛其禮陛下勤求治理崇奬教義欲使習弊之人變于其道但子和器識庸下所傷尤大若凖常科則免而無耻請特加貶以敦禮教謹奏為奚御史彈尚書某人入朝不敬文陳子良臣聞孝愛資于事父忠敬盡于事君淑慎爾儀不愆于位聿修厥德無忝所生苟虧格言必貽眀罰竊見某甲出自庸微素無才術幸以運逢義始早預周行佐命之勞巳酬爵土攀附之寵復典樞機擢自芻蕘功歸聖德昔晉榮八座蔡謨始漸斯官漢貴五曹鄭均才沾此秩况某方圓無取叨據非宜而覆餗之譏于焉巳及欹器之戒如何遂盈不能翼翼在公兢兢從政及復入朝散誕無鞠躬之容陪軒慢懈乏䖍恭之禮有一于此身名何置臣雖凡品職當糾察既覩相鼠之儀敢忘逐雀之志若斯風不黜方紊大猷宜正刑書以彰朝典請以某見事付大理治罪謹言代御史王師旦彈莒國公唐儉文許敬宗臣聞古人涖職不膳池魚前良罷官尚留家犢拔園葵而自潔垂往哲之通規飲吳水而齊清標曩代之遺則若乃營求不巳貪猥無厭狥私利而黷官方挾朝權而侮天憲有一于此必置眀科風聞唐儉往任尚書之日付託前鹽州刺史張巨令舊唐書作臣合遣録事參軍張正表元大節等專令檢校牧放私羊所判文書自云檢示約束剪毛之貨易州僚判署潜立公文市司勘估一同官案并有放羊人康莫賀咄所署文牒共稱牧長依問巡察使楊謨狀與新聲秩一作新聲扶同謹按前闕部尚書光祿大夫莒國公唐儉門資斗食器劣瓶筲在勢為優唯聞酒德座一作席賓常滿無匪博徒以逐兔之微庸屬鳳翔之興運功未參于執帛賞巳茂於桓圭效無補于經綸位乃隆于常伯由是越自泥滓超驤雲漢甲第髙門與絳灌而並列朱輪翠蓋共吳鄧以齊驅寵出勳前化家開國任君才表揮翼在梁瀝膽隳肝未答謬官之刺驛魂飛魄豈謝匪服之榮反復乘此恩波肆其溪壑之性慿茲惠渥縱其姦慝之心敢以私産託於州將芻豢交易並立案于曹司牧圉家童咸假署于名級情包僣擬家有擅除以此論愆深驚視聼稽諸往冊國有常科其鹽州刺史張巨令昔在部符寵膺繁露趍其勢位擅役官寮資給貪夫成其敗類順行私令汨亂天綱請皆付法以清攸斁無任嫉惡之至謹奉白簡以聞彈劍南東川節度觀察處置等使嚴礪文元稹故劍南東川節度觀察處置等使嚴礪在任日擅籍沒管內將士官吏百姓及前資寄住等莊宅奴婢等并集作今於兩稅外加徴集作配錢米及草等謹件如後嚴礪擅籍沒管內將士官吏百姓及前資寄住塗山甫等八十八户莊宅共一百二十二所奴婢共二十七人竝在諸州頓內分析右臣伏凖前後制敕令出使御史所在訪察不法具狀奏聞臣昨三月一日敕令往劍南東川詳覆瀘川鍳官任敬仲贓犯於彼訪聞嚴礪在任之日擅籍沒前件庒宅奴婢等至今月十七日詳覆事畢追得所沒庒宅奴婢文案及執行案典耿琚馬元亮等檢勘得實據嚴礪元和二年正月十八日舉牒云集作稱管內諸州應經逆賊劉闢重圍內并賊兵到處所有應接及投事西川軍將州縣官所由典正前資寄住等所犯雖該集作經霈澤庒田須有所歸其有庒田奴婢桑柘錢物斛㪷邸店碾磑等悉皆搜檢勘得塗山甫等八十八户案內並不經驗問虛實亦不具事賊職名便收家産沒官其時都不聞奏所有集作取資財奴婢悉皆貨賣破用及配充作坊驅使其庒宅桑田元和二年三年租課嚴礪並巳徴收支用訖臣伏凖元和元年十月五日制西川諸州諸鎮刺史大將及參佐官吏將健百姓等應被脅從補署職官集作掌一切不問又凖元和二年正月三日赦文自今日巳前大集作反逆緣坐並與洗滌况前件人等悉是東川將吏百姓及寄住衣冠與賊黨素無管屬賊軍奄至暫被脅從狂冦既平再䝉恩蕩嚴礪違詔命苟利資財擅破八十餘家曽無一字聞奏豈惟剝下實謂欺天其庒宅等至今見被使司收管臣訪聞本主並在側近控告無路漸至流亡伏乞聖慈勒本道長吏及諸州刺史招葺集作緝疲人一切却還産業庶使孤窮有託編户再安其本判官及所管刺史仍乞加貶責以懲集作絶奸欺嚴礪又于管內諸州元和二年兩稅錢外加配百姓草共四十一萬四千八百六十七束每束重一十一斤右臣伏凖前後制敕令及每嵗㫖條兩稅留州使錢外加率一錢一物州縣長吏並同枉法計贓仍令出使御史訪察聞奏又凖元和二年赦文大辟罪巳下咸䝉恩蕩准官典犯贓不在此例臣又集作訪聞嚴礪加配前件草凖前月日追得文案及執行案典姚孚檢勘得實據嚴礪元和二年七月二十一日舉牒稱管內郵驛要草於諸州秋稅錢上每貫加配一束至三年秋稅又凖前加配計當上件草臣伏凖每年㫖條館驛並集作自有正科不合于兩稅錢外擅有加徴况嚴礪元和三年舉牒巳云凖二年舊例徴收必恐自此相承永使集作為疲人重困伏乞勒本道長吏嚴加禁斷本判官及刺史等仍集作伏乞凖前科責以息誅求嚴礪又於梓遂兩州元和二年兩稅外加徴錢共七千貫文米共五千石右臣伏凖前月日追得文案及執行案典趙眀志勘驗集作檢勘得實據嚴礪元和二年六月舉牒稱綿劍兩州供元和元年北軍頓遞費用倍多量於梓遂兩州秋稅外加配上件錢米添填綿劍兩州頓遞費用者臣又牒勘綿州得勘報稱元和二年軍資錢米悉凖舊額收盡送使訖並不曽交領得梓遂兩集作等州錢米添填頓遞亦無可集作充折當州錢米處者臣又牒勘劍州得報稱元和元年所供頓遞侵用百姓腹內二集作兩年夏稅錢四千二十三貫三文使司令於其年軍資錢內尅下訖其米即用元和元年米充並不侵用二年軍資錢米數使司亦不曽交集作支梓州遂州米充填者臣伏念綿劍兩州供頓自合凖制集作敕優矜梓遂百姓何辜擅令倍出租賦況所徴錢米數內凖尅下劍州軍資錢米四千二十三貫三文其餘錢及米並是嚴礪加徴别有支用其本判官及梓州遂州刺史悉合科處以例將來擅收沒塗山甫等莊宅奴婢及於兩稅外加配錢米草等本判官及諸州刺史名銜并所收色目謹具如後擅收奴婢莊宅等元舉牒判官度支副使檢校尚書刑部員外郎兼侍御史賜緋魚袋崔延都計諸州擅沒莊共六十三所宅四十八所奴一十人婢一十七人於管內諸州元和二年秋稅錢外隨貫加配草元舉牒判官觀察判官殿中侍御史內供奉盧詡都計諸州共加配草四十一萬四千八百六十七束加徴梓遂兩州元和二年秋稅外錢及米元舉牒判官攝節度判官監察御史裏行裴浰計兩州徴錢共七千貫文米共五千石梓州刺史檢校尚書左僕射兼御史大夫嚴礪元和四年三月八日身亡擅收塗山甫等莊二十九所宅四十一所奴九人婢一十七人加徵錢三千貫文米二千石草七萬五千九百五十二束元和二年三萬一千七百九十二束元和三年四萬四千一百六十束遂州刺史栁䝉英華作濛擅收沒李簡等莊八所宅四所奴一人加徴錢四千貫文米三千石草四萬九千五百三十五束元和二年二萬四千五百三束元和三年二萬五千四百八十二束綿州刺史陶鍠擅收沒文懷進等庒二十所宅三十所加徴草八萬八千六百八十八束元和二年三萬八千九十三束元和三年五萬五百九十五束劍州刺史崔實成元和二年十一月五日改授印州刺史擅收沒鄧琮等庒六所加徴草二萬一千八百七十七束元和二年九千三十九束元和三年一萬二千七百七十八束普州刺史李怤元和二年加徴草六千束三年加徴草九千四百五十束合州刺史張平元和二年加配草三千四百六十二束三年加徴草五千六百五束渝州刺史邵膺元和二年加徴草二千六百一十四束三年加徴草三千七百二十束榮州刺史陳雷元和二年加徴草九千四百三束三年加徴草五千四百二十七束瀘州刺史兼御史劉文翼元和二年加徴草三千八百五十三束三年加徴草三千八百五十束資州元和二年加徴草一萬五千七百九十八束三年加徴草一萬六千二百二十五束簡州元和二年加徴草二萬四千一百四束三年二萬三千一百一十八束陵州元和二年加徴草二萬四千六百六束三年二萬三千八百六十一束龍州元和二年加徴草八百九十一束三年二萬三千八百六十一束右以上本判官及刺史等名銜并所徴收名目謹具如前其資簡等四州刺史或緣割屬西川或緣停替遷授伏乞委本道長史各據徴收年月具勘名銜聞奏以前件狀如前伏以聖慈軫念切在蒼生臨御五年三布赦令殷勤曉諭優在集作惠困窮似涉擾人頻加禁斷况嚴礪本是梓州百姓素無藝集作才行可稱久在兵間過䝉集作於奬拔陛下録其末集作微效移鎮東川仗節還鄉寵光無比固合撫綏士集作黎庶上副天心蠲减征徭內榮鄉里而乃橫徴暴賦不奉典常擅破人家自豐私室訪聞管內産業阡陌相連僮僕資財動以萬計雖則一作即沒身謝晷而猶遺患在人謂宜諡以配名削其褒贈用懲不法以警將來其本判官及諸州刺史等或苟務容軀競謀侵削或分憂列郡莫顧詔條但授節將指揮不懼朝廷典憲共為䝉蔽皆合痛繩臣職在觸邪不勝其憤謹録奏聞伏聼集作候敕㫖文苑英華卷六百四十九
