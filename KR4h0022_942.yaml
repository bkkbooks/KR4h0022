body:
  text: 文苑英華卷九百四十三宋李昉等編職官五李刑部澥墓誌一首裴少尹濟墓誌一首裴監察墓誌一首穆祕監𤣥堂誌一首刑部郎中李府君墓誌穆員有唐趙郡李府君春秋四十三厯官十有二政以尚書郎柱下史分王命于江淮上元元年秋八月十三日遘疾終揚州官舎之次夫人范陽盧氏先府君三年而少六嵗至徳二年九月乙亥捐於呉興郡長史之舘屬以國難家窶靡遑還葬乃各於次而卜宅焉然其引也盖殯貞元三年嗣子騰世先人之文行仕殿中侍御史惟周公合祔之事得請于龜冬十有一月奉府君夫人之䘮至自呉楚粤明月五日遷窆于某原禮也府君諱澥字堅永京源宗𣲖冠盖功伐史氏志其大家牒詳其細曽祖行敷皇朝曹州離狐縣主簿祖懐一左千牛并州晉陽縣尉父雍問虢州湖城縣令代有令聞而無違徳府君生而博厚長而敏逹超特簡厲中和直清著書屬詞居處執事非中道不蹈非聖言不聞天寳中擢進士調太子校書當時海内無事縉紳之徒以能賦為賢及門為貴其望登朝也如天之不可階而升而言語侍從主文典憲之列充其選者必第一流府君以通書舎人轉左補闕監察御史𤣥宗季年逆帥兆亂亂成於寵上莫得聞府君奉使朔陲復而露奏其後以直道不可得而親踈為誅其不附已者所中配流盧溪郡至徳嵗起家宰江隂厯佐晉陵呉興丹陽三郡或叅將府張公鎬軍事其佐郡也亷使輙移真守以避府君大率以古良二千石之理為之其佐戎也王師頼焉明年克復二京博求多士徴拜金部員外郎稍遷刑部郎中言逹於上而惠及於下者非一上元中帝念宗室大臣㧾東南節制時危任重咨忠賢以貳之詔加府君御史賜銀印朱紱輟為其介府君方勤王侯伯之事啓其所奉道之將行也末如命何夫人皇朝刑部郎中瀛汝二州刺史𢎞懌之孫吏部員外郎汝州刺史僎之子年若干歸于我孝友禮樂得之性命越自齠齓聞於家人率是道也移於夫族而夫族之長㓜内外受其厚者報亦如之惟府君才中公卿而位止下大夫爵冝難老而年夭強仕夫人慿善之積作賢之合天與之偶命與之違命也雙劔相從萬里同穴始者鳯凰之兆豈吉㓙類乎員辱命長僚託誌卒葬而巳銘曰仁夀才貴天之所大如何李公不卿不艾婉婉内子福孤具美徳豐椒蘭年夭桃李似續惟賢永懐奉先成週還葬於萬斯年河南少尹裴公墓誌銘前人唐貞元八年冬十月二十有八日前河南少尹裴公諱濟字莊時春秋五十卒于京師靖安里之旅舎明年夏四月朔葬于絳州聞喜縣之故原從先公居禮也髙祖懐節皇朝洛州刺史生太府少卿昭昭生蔡州刺史剛剛生扶風郡雍縣令㨿公則雍縣府君之長子也生而頴秀長而博辯質如瓊枝文如春林尤長記誦之學酷重許與之契耳目一厯輙在心口意氣相合坐遺形骸天寳末學優藝全方登俊造之貢俄屬國難家疚嶇﨑險難以䘮徃事居之孝稱於所至服闕襄陽節度使来琪表襄州叅軍事屬有勢勝而理負與人争官者州府畏之公時攝功曹掾守文與直不為之撓琪嘉其所執升之賔介有疑焉一作為輙以咨之他日琪自相位獲譴已而伏誅凡百門吏逃難觧散公與陳郡殷亮始冐危於保衞終毁家於葬䘮君子難之故司徒李公勉聆公之節辟以為屬自江西入尹京兆洎節制廣滑汴三府以公明可折獄利可撥繁權可贍給清可澄察而武可臨戎官厯金吾掾萬年尉三御史二尚書郎以至于御史中丞職更推官洎支度觀察二判官以至於行軍司馬公之奉李公也若體從心李公之任公也若素受彩李公制用公為利噐李公翺翔公為羽翼厥後李公罷鎮遷河南少尹故孜孜勵精貳前後之政與我同志者必以呉公李膺之名歸之其有所執頼于周人者非一貞元五年受代来朝上京燕息衡門詠歌卒嵗以俟道長末如命何初公之在滑也方屬兩河之驚不敢以非疾之憂貽於髙堂堅請退閒亦既終飬其在汴也有二千石結根貴幸怙寵傲慢収小惠於下隳大計於上公數其不供之咎請以去之言而未行拂衣自免未㡬彼果顛覆李公於是厚禮還公且有中軍中憲之授盖進退終始不違於道多此類也母弟澄檢校膳部郎中潤大理司直涇前頴州刺史少失先府君之教入學入仕為郎為邦皆公之訓誘也夫人隴西縣君李氏故太子賔客翼之子有淑媛之美成公之家事公姑之孝聞焉奉叔公之友聞焉其輔佐之力由中及外者出處聞焉今也髽首泣血自雍及綘一號千里行者悲之子曰鋌弱而有立毁遇成人謂員平生交親見託為誌其文曰猗歟裴公昭朗直清哭来發跡和李騰聲處則全飬出能保貞蒸蒸穆穆為子為孫夭閼遐志摧頽壯齡哀哉哲婦為代之程監察御史裴府君墓誌銘前人嗚呼有唐君子河東府君之墓公諱某字某先伯益之苖裔分秦封晉史牒詳之元魏河北太守萬虎兄弟三人時稱三虎並仕於魏魏都河洛在天地之中故裴氏始有中眷之號公則萬虎八代孫也曽祖某冀州都督府長史祖某温州樂城縣令父某蔡州司田叅軍初命左領軍衞倉曹叅軍倅商州刺史李佐戎事遷同官縣丞李侯移鎮桂林統師南服表公為監察御史介澄察之政至今二府思李公之美繄公是頼使罷閒于洛陽不幸遇疾以貞元六年秋八月庚申終于立徳里之第享年四十有五明年辛卯葬于首陽山之陽龜筮與人三者習吉有子四人男曰綽曰約長一作次方齓㓜能言女子孟少綽季少約母弟佐洪州南昌縣尉充本道㢘使從事訃之未及河南夫人穆氏祕書監新安公之季女惟是一日二日洎踰月之事實弱妻主之吾聞之生也全其道没也全其素是之謂君子公性充天醇氣與道冥行本忠恕文以禮樂可不謂全其道乎遘癘彌年待變彌月疾能銷公之體而不能㓕公之和命能夭公之生而不能汨公之正可不謂全其素乎表之以君子言之者無愧銘曰夀不與仁相㑹貴不與才相期福不與善相報命不與事相随何四者之乖剌而不并集於斯已矣乎非夫人之為慟而誰為祕書監致仕穆𤣥堂誌前人唐貞元十年十一月二十一日公棄飬于東都歸義里私第適寢明年四月嗣子賛洎質員賞奉遷靈座祔曽王父母于偃師首陽山之北原賛等惟刻石識墓非周孔之訓宋齊以来有之所以藏馨香俟陵谷不可闕也太夫人河東郡太夫人命曰禮經三月之事所以必誠必信勿之有悔焉者盖孝子自盡之謂然則自盡之大莫大於紀述平素貽簡幽明假詞他人不足以猒自盡之義公諱寧字某十一代祖崇元魏冝都王其後孝文自代遷洛陽遂為洛陽人奕葉王公與魏終五代祖伽皇朝殷州安陽令贈刺史太常卿髙祖𢎞逺水部員外郎曽祖固禮祕書郎祖思恭稷州録事叅軍贈光禄少卿考元休相州安陽令贈同州刺史自冝都至殷州以淳粹之氣相遺自殷州至同州以清白之風相授傳洪範九疇究天人之際皇王得之不出户庭而天下治學者得之為王者師公則同州君之元子鍾天元和發地禎祥性得於孝友忠烈生齊於聦明正直淵深峻極漙博閎厚用先王之禮樂節而文之是以外冨直道中積至行始厲髙節終全盛徳宣尼稱道之將行命也將廢命也命也者似繋一人之謂小子則曰公之道將行時也將廢時也使我公之得志也天下至公立大道行風教厚人倫正天之未俾當時臻乎此也豈繋公之命乎盖天能使公道可奮乎百代而不洽乎當年才可周乎萬物而不極於莅所天之不全歟時之不合歟天寳中一命景城郡鹽山尉在官五年凡七宰旁邑三紀郡政二介使臣禄山作亂以郡有煑海之冨屬城之乗一作衆使其黨曰劉道𤣥以假守之公乃紏合同志首唱大義梟道𤣥以絶禄山而郡佐畏懦多與公駮史思明統衆来冦郡俾公保東光縣拒之思明駭公之才使騎將持書通好公立斬其使以狥于邑且封其書于郡郡佐逾恐且虞思明之見讐也趣公罷攝公嘗佐黜陟使分廵列郡與平原守顔公真卿隂圖禄山當亂所以禦之之畫至是宻遣家僮以手䟽詣顔公書無他辭曰夫子為衞君乎六字而已顔公執書感泣即日以軍師之禮致公公之許顔公也以長子屬于母弟曰唯所徃苟不絶先人之祀吾無累也既而從顔公登埤誓衆以必死與之俱生援絶孤城公志愈厲顔公麾下有非公所制者伺公請沐中夜迫顔公跳比及於河公方自㧞他日顔公詣行在所自訟有立者公之力無成者巳之咎肅宗嗟嘆以璽書徴公且謂顔公曰由廷尉評以諫議大夫待之既至㑹顔公以言事忤㫖其議遂寢上元乾元之間累官史府尚書省分王命于河南征鎮之軍僅十餘帥慿勲怙寵乗國艱危自以不叛為文靡顧文法公以至誠格之大順激之清明律之由公徴令者相率如響元帥李光弼將貳於上屢奸於公公守正不遷積與之隟日宣不令之言欲公畏之公自泗抵徐馳驛輙至理折其口義勝其心泄其温於包藏奪其謀於將發代宗聞焉為一二宰臣話之至於歎息于時周鄭路塞東南貢賦之有入漕漢江轉商山招擇文武全才以守夏口我于是有専城連率之寄金印紫綬之寵詔書下日百城肅然清風先翔甘雨随灑荆越呉蜀之冨朞月傾之俄封長江與淮西對境厥帥董秦多俾腹心為其津戍拉商旅斷中流畏公明威拱手如梏舟檝上下如行其家萬里来臻若赴于市部有酷吏姻連勲臣敢為貪狼靡所畏忌公糺發贓罪暴之于朝且以鞭扑懲其悔慢我於是有再黜之咎勲臣故也居五稔有詔徴入牽復臺省大厯七年淮南旱和州以師旅後瘡痍深慎選良牧用膺明命視人如子理事如醫居一閠人忘其傷又一閠人忘其化無何受代代者冒以天寳季年版籍之額洎即日所授數上聞是時兵興二十年矣異曰版籍百無一存代宗震驚以為亡失在我故有泉州之貶初公屬以徴發之弊抗於刺舉之司既而代至則不知代者之指斐然歟將有為歟賛守闕訟寃三嵗聞徹降而御史即州訊問則公初年季年户増數倍使者還報㑹今上龍興拜太子右諭徳詔曰令子申父之寃憲臣授舊唐書本傳作奉君之命楚劔不衝於牛斗秦臺自洗於埃塵其明如此宫坊飬徳優遊卒嵗每台輔易位冝以舉直措枉或曰公卿缺員僉議所屬則中外之望必集于公而前後宰政率以不附離之見憚故乆滯於次公嘗自卜進退以深識為元龜且時不我容我不時狥則非吾之進也在於退乎黙黙然有浩歸之志凡謝病垂滿十旬而時議迫隘公望充塞不得巳而起者三泚之亂公方杜門請急出無車馬假乗于故人太子少師韋公倫棄家逃汙出城信宿方審乎所在而奔焉轉祕書少監右庻子録奉天興元之勤也大駕還宫百官復位公曰可以行吾志矣移疾罷免東歸吾土陵疑後五年就加秘書監致仕遂公之志也考槃于瀍洛之上卜勝于北山之陽良辰暇日盡四時之賞以仁自冨以道自貴以孝慈為稼穡以友愛為塤箎十年春喟然手䟽述麟徳中髙宗天皇大帝詔問張公藝九代同居故事撰為家令賜諸子諸婦人各一通賛等暨諸婦拜泣受賜公曰吾之理命也是年秋違裕冬棄背夀七十九公伯姊元夫人與公同禀至性有髙世之徳公率太夫人所以敬飬之道逹於神明公之教育成人者髙祖曽祖兄弟洎孤甥姪與賛等所以威以勸之慈以撫之壹之乎天性之至外姻僮僕不知所以别焉性嗜讀書無學不綜經窮入室之奥史精厯代之博非聖人之教道則知而不言每語及三代損益以逮於國朝典故莫匪成誦聞者退徴於卷則文字甲子靡差毫釐或為卿大夫話其世代盖郯子范子自言其祖不之逮也仕四朝更三紀厯官二十五政徳義政事無非殊効且未嘗有如分之報而三黜一免由之善與人交始不以諂瀆合終不以生死異嘗從王事厯佐權臣入於朋家之門雖周鄭交惡田竇奪移彼不我疑我不彼貳嘗宴居誨羣子曰吾聞君子之事親也飬志為大吾之志也直道而已爾事君事人或枉其道日以三牲五鼎充吾庖非飬也苟繼吾志或承患難則義重於生冝從其重焉賛等祗荷嚴訓仕於天朝賛以御史中丞質以右補闕皆以守職不避強禦並罹譴逐員以侍御史佐東都留守不敢陷所事殺無辜賞以監察御史呌帝閽觧兄難迭逢困尼公申誡曰先王之道洎爾友朋之議及吾異日之訓爾無虧焉愛子者教之以義方不聞以詔爾其勉之賛等永惟古人有欲飬不待之痛公髙尚不仕侍飬十年而賛等官薄命竒不自拯於不才不孝之分内乏擊鮮之獻外貽非疾之憂是以上天明神罰以不得自死之苦夫不死之道有不敢不能賛等伏念為公之嗣且太夫人在堂是則不敢負不肖不逮於義劣不能死荒不及文哀舉大端永閟幽宅文苑英華卷九百四十三
