body:
  text: 文苑英華卷四百五宋李昉等編王府王師授王繢蔡約王師制沈約門下冠軍將軍司徒左長史始平縣五等男繢華宗冠胄器質詳和都官尚書約清源素範體業倫正訓兹藩國僉議攸在繢可隨郡王師加散騎常侍男如故約可零陵王師加給事中主者速施行授栁沖兼溫王師制蘇頲勑左散騎常侍兼修國史上柱國平陽郡開國公栁沖族茂汾鼎價珍垂璧雅負通才備聞遺訓探六經之奧如叩鴻鍾窮百氏之源若披明鏡挾輿切問侍從增榮擁篲崇儒師資佇德可兼溫王師王傅授楊廉陜王傅制前人門下利建子弟旁求師傅委之訓導必學疑方直銀青光祿大夫前岐州刺史上柱國歸義縣開國子楊廉外示靜默言將發而寡辭內敷條理德不孤而應物故能逰藝聚學修官辨政臺閣盡清華之選吏人懷撫貸之餘儀刑是稱參議斯在當肄業於鄒衍俾賦詩於韋孟可陜王傅勳封如故主者施行授殷彥方王傅等制孫逖門下中散大夫守忠王府長史兼侍讀上柱國殷彥方等朝廷雅望人物周才或聚學沖深或屬詞清逺頃膺授擇皆侍藩維教導之功既聞於日就溫文之德遂涉於春儲國有典章義存褒賞宜進秩於髙位俾升榮於近傅可依前件授張崇俊韓王傅制常衮勑朝散大夫前守彭王府咨議參軍充內飛龍廄驅使賜紫金魚袋張崇俊敏行資身良才適用列官朱邸早陪文學之車從事玉臺久佐飛黃之皂強力匪懈清心不渝忠效見稱器能可録王門傳道允藉純臣仍進榮階俾超彛序可銀青光祿大夫韓王傅餘如故授薛昌朝絳王傅制元稹勑薛昌朝等國有政職之要其一曰其員所以稽績用而升秩序也爾等典掌衆務勤歷一作勞歲時無畏一作瘝厥官能舉其政擇才以佐諸邸選士以列東朝亦吾藴崇本枝之意也爾無易之可依前件授太子賔客王牘等諸王傅制薛廷圭勑具官王牘等朕聞王者之子在襁褓中置二公以教訓之由古道也我思成人已來遘此多難師訓之義蔑一作翦焉闕聞南靣稱尊愧於寡昧由是言念諸子用疚厥心因擇正人為之傅導今丞相言爾牘等並老於文學雅有德行明君臣父子之道知禮樂詩書之源可使高步承華入參望苑琢磨羽翼朕有冀焉或授正卿或加峻級宜旌優異往傅童蒙邪蒿鮑魚勿俾登俎胄筵講肆為惜分隂使其知東平為善之規喜王褒洞簫之賦承萬代之業固磐石之基斯賴於老成人也可依前件授郭保嗣德王傅依前通事舍人等制前人勑具官郭保嗣等資相法儀宣明號令序鴛鸞之行綴整珩珮之威容蕆事申嚴罔不賴爾豫聞舊制常俾兼官用奬勤勞以示優假今保嗣等其勤至矣厥官罷焉宜舉彛章許之序進矧大勳之後舊將之家尚鑒寐以求思豈淹回之不恤兼八座以傅豫愛子亞九卿而立我明庭勉揚休聲茂對殊寵可王府咨議授郭元融寧王府咨議制孫逖勑典軍郭元融名列戎昭官升王邸頗經歲序克著勤勞宜更文武之職俾在咨謀之任可朝議郎守寧王府咨議參軍授李夷吾滎王府咨議制勑朝議郎守青州司馬李夷吾門擅文儒才推幹理從事惟謙在官必達二于郡職已聞康海之謠官彼王門宜膺背淮之選可守滎王府咨議參軍散官如故授衛元圭蜀王府咨議制常衮勑攝郡牧都使判官朝議大夫行杞王友上柱國衛元圭頃以勤勞爰從奬授紀官之號有犯聞名俾更他職式叶彛典可守蜀王府咨議參軍餘如故授王自勵原王府咨議制元稹勑王自勵左右禁旅非材力過人而忠厚謹信者不在壁壘庫樓之地惟爾自勵備吾選中平蔡之師亦有功伐追思舍爵之賞擢授曵裾之寮特示新恩且仍舊職可檢校太子賔客兼原王府咨議參軍依前殿中侍御史如故授郭皎冀王府咨議制前人勑郭皎材任爪牙姻連肺腑領轅門之右廣假桂苑之元寮夙著威名嘗頒勇爵元戎啓狀慶澤覃恩冝輟豹韜之雄以資鴈沼之畫可行冀王府咨議參軍餘如故重授李晟通事舍人王府咨議制白居易勑李晟昔管仲云升降揖讓進退間習臣不如隰朋今之通事舍人近此選也而晟常中此選善於其職故相導通奏之節宣揚拜起之儀引之集作而贊之不聞失禮既終喪紀宜服官常可使束帶曵裾為吾謁者可通事舍人王友授蕭仲預郢王友制勑朝議郎行申王府文學攝贊善大夫兼殿中侍御史借緋魚袋上柱國蕭仲預風裁端莊器識純懿戎王築館禮盛和親漢使出關事優銜命更列曵裾之寵宜酬杖節之勤可守郢王友散官勳如故授賀蘭忠肅郯王友制黃門正議大夫前檢校郯王友賀蘭忠肅緒業勳華藝能通敏頃陪賔友已光侍楚之名更復班資載允從梁之望可行郯王友散官如故主者施行授王積薪慶王友制孫逖門下朝散大夫前行右領軍衛長史王積薪博藝多能精心敏識久從班秩頗著勤勞俾遷環衛之司宜在從車之列可慶王友餘如故授盧光啓等遂王友制薛廷圭勑君子之風尚摧秀木陽翟之俗必誚秦人古嘗病之今孰免者爾光啓洎贊皆以麗藻雅文獨行當代孤標清峙見譽名臣丹青翰墨之林舟楫文章之海道之將至論者許焉屬爾良知罹其貝錦惑豫觀聽罷去鈞衡爾良知等咸被指名置其連坐無辜去國吞恨投荒而聞流落五年窮達一致書空永歎問鵩何之人實有言用懷愧恧雷雨作解日月無私今也其時吾將補過徵還朝列將復亨衢階序徽章因仍舊貫光啓洎贊知豫意焉可依前件王府長史授崔子源岐王府長史制蘇頲黃門朝散大夫守尚書駕部郎中崔子源地緒清茂風襟亮拔有如繩之直懷匪石之心學不為人文能飾吏憲曹白簡秋隼曽飛禮闥靑縑晨鳬就列眷于藩邸親則舅甥俾踐端寮宜膺寵命可檢校岐王府長史散官如故仍追赴京主者施行授王守廉申王府長史制前人黃門朝議大夫守忠州刺史上騎都尉王守廉飾躬清苦居心孝悌往操簡憲已著厥聲洎頒條寄克修其政俾玳筵之茂寵參碣館之元寮可申王府長史散官勳如故主者施行授魏明彭王府長史制前人勑銀靑光祿大夫使持節建州諸軍事行建州刺史巨鹿縣開國伯魏明才業可稱器能適用恪勤彰於事任綏緝著於公方考績有成班資可進宜從使局之請俾踐藩寮之職可行彭王府長史散官勳封如故授薛昌族等王府長史制元稹勑建邦之王府置長史司馬以紀掾屬之秩序而稽其職業也前寧州刺史薛昌族前泌州刺史烏重儒等皆勳伐之子孫並良能之牧守朕河山在念肯忘奬勞藩邸求才實思高選昔阮孚以嘯詠自樂龎秀有忠烈可嘉更任王宫咸稱國器今之榮授其在兹乎佇移汝理郡之方以助豫維城之固昌族可行絳王府長史重儒可守冀王府司馬散官勳如故王府司馬授田幹之溫王府司馬制蘇頲門下正議大夫行尚書主爵郎中上柱國田幹之聿修厥德孝稱於百行無玷斯言慎比於三復文儒每固其業清白用傳其範拜郎仙署已題京兆之名為相寵藩式贊河間之美可行溫王府司馬散官勳如故主者施行授李友信蜀王府司馬制常衮勑正議大夫試祕書監前吉州刺史上柱國蕭縣開國男賜紫金魚袋李友信往以剖符閩徼頗守官常移鎮廬陵稍遷秩序而晦明生疾寒暑經時久淹海隅尋易藩寄使臣所鞠情實用彰宜降常資之授俾由頥養之適可試蜀王府司馬散官勳封賜如故授王承迪等刺史王府司馬制元稹勑莒王府司馬王承迪恭王府咨議參軍賜緋魚袋王承慶等乃祖乃父有勞邦家而承迪等亦效忠於我伯仲叔季罔漏恩榮或典方州或升清貫惟恐未稱豈礙彛章兼秩憲臺勉當優異承迪可守普州刺史承慶可莒王府司馬兼侍御史賜如故授康從固翼王府司馬制杜牧勑新授銀青光祿大夫檢校國子祭酒兼濮州長史殿中侍御史上柱國康從固其父秀榮巉集作實為名將李廣多爭死之士竇嬰無入家之金一收七關易如拾芥念爾跨馬事敵執戈集作戎同仇壯比文鴦勇同李敢子之能仕父教之忠古人之言信不虗設今者願留闕下以奉朝請念其垂誨可見丹集作至誠曵裾憲寮用示恩寵宜思終始上報君親可檢校國子祭酒兼翼王府司馬殿中侍御史散官勳如故文苑英華卷四百五
