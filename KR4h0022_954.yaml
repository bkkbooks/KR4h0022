body:
  text: 文苑英華卷九百五十五宋李昉等編職官十七此下六卷英華所編失作者先後今正之王司馬墓志一首張長史承休墓志一首吕司户䖍墓志一首趙長史墓志一首孫司馬嘉之墓志一首李司馬墓志一首申州司馬王府君墓志陳子昻君諱某字某先太原人也昔周文王有聖人之德甲子受圗至我靈王誕膺丕顯太子晉得鳯凰之瑞恭揖羣后上為帝賔綿綿生人作我王氏逮秦有賁剪并吞諸侯晉有渾祥功格帝室至魏集作魏至慧龍為貴種矣十二代祖卓晉常山公主子也始公主湯沐邑在汾隂永嘉淪夷不及南渡因樹松集作杉檟而結廬焉卒葬于長夀原至今鄉有太原之號也曽祖亮周開府儀同驃騎將軍隋信州刺史樽俎之帥集作師也祖儉隋離石郡守唐石州刺史贈代集作嶽州總管廣武烈侯社稷之器也父諶唐虞部郎中荆州大都督府司馬商壁鄜許冀五州刺史加銀青光祿大夫濬州都督金水敏侯上柱國廊廟之才也敏侯有功於國始賜土田白茅苴之在鄠之曲因食采今為雄州人君即敏侯之元子炳靈珍粹輝采幽簧願而能集作以恭寬而以栗青襟聞道已光大矣天子立太學所以養賢公子齒上庠所以觀國君之休烈泉集作淵塞志業雲翔年若干為國子生某年集作中射䇿甲科解褐補吳王府參軍事時吳王帝之愛子國選英僚君三德允彰六行既穆與某郡劉孝孫首先集作光此舉誦詩三百和淑其仁而醴酒不恭楚筵亦廢坐除滑州録事參軍又轉隴州録事參軍時樂成公劉仁軌以宰相之貴持節此州曖然惟中主諾責下軍機集作提綱未幾羣轄載孚劉公坐嘯以為能也舉遷汾州平遙縣令其地有臺台左傳作駘之怪蟋蟀之人君黃鼎介中鳴琴不下鍾鼓既考風俗允和帝曰良哉而格我政加朝散大夫遷岐州扶風縣令若尹翁歸以文武之幹緝熙此邦黃圖雖寧赤丸未乂君以先集無先字庚斷甲設距投鈎赭裙始繩堊面咸革丁我敏侯艱遂茹哀苫廬銜恤終紀是嵗申國不理元寮佇才制加朝散大夫授申州司馬屬太夫人有羸老之疾棄集作去官不之白華增勤綵衣是慕至於朝哺集作盥夕膳候色承歡䕫䕫齊栗蒸蒸不匱有若楚太子集作老萊為之嬰兒也嗚呼昊天不弔降此鞠凶太夫人以眉夀薨時君年已七十二矣禮以飲酒而君絶漿虞以降哀而君泣血㷀㷀在疚欒欒棘心集作欒棘其心新穀未升匪莪已殞以某年青龍癸巳薨于某里第之正寢孝之終也嗚呼哀哉昔聖人五十而慕先子謂之至德今君七十二而盡其哀非敦篤允元深仁淑德者疇能離此哉夫人𢎞農楊氏隋內史侍郎丹川公演之女孫也幼有淑德而美令儀采蘩昭華穠荷比秀至於內嚴閫訓外匡君子麟趾以穆雞鳴有章誠可道映公宫事宣彤管晚年以儒困集作因未究冥業唯深遂揭無生之筌將遺有漏之屣顓潔道行受蓮華經理極翻三心滅不二形妄緣盡歸真化冥嵗在丁酉處順而往始我府君以懸車之嵗從負米之勤夫人亦能肅恭晨昏嚴祗左右夫至行莫大於孝崇義莫顯乎忠君克勤于家盡力於國形集作刑于妻子至於朝廷夫矜而不與物或有違廣而無適義所以比君好謙達禮研機成務摹其法器無不馴從其政事無不理夫用我者而豈徒哉嗟乎矜而能廣集作廉利而不凂百行允備三事不偕臧文仲其竊位歟桞下惠其直道歟有子四人長曰某官至武連縣令先公而卒次子某等肅奉嚴訓景行髙山達于家邦光乎集作于禮樂永號罔極泣血昊天始府君臨終遺令薄葬墨龜未食青烏不封權殯于某所需吉兆也龍集己亥律躔應鍾金雞鳴玉狗吠黃腸密啓丹旐徐飛始遷神於某原之陽禮也青龍在左朱鳯居前雙衾共封二室同穴珠玉不瘞丘隴誰傳刻此金石以旌後賢恆州長史張府君墓志銘張說君諱承休字某吳郡吳人也留侯興漢播美西京長沙涉集作徙吳蔽蔓東土曽祖冲在陳為文帝師入隋為漢王學士祖後𦙍授經太宗尊之以為集無此字祭酒既封新野又贈以宗伯考少師位不充量止於朱陽宰班固稱世名忠孝魏武謂積善之家昌門一絲暉我諸族君受天戬穀傳家業藝希言敦行去華崇實非法不由非禮不動精於理物敏於政事初以南郊齊郎補兖州兵曹丁太夫人憂廬墓三年加人一等再任始州司倉應八科舉改鄭州録事參軍又舉賢良方正遷揚府集作州司録參軍移蘇州常熟令歷政皆有能名加朝散大夫入為司農丞實掌錢穀姦僦息望使覆囚嶺南是司獄訟聽折惟允乃授濟源令風行畿甸河潤洛師加朝議大夫上柱國拜絳集作隆州司馬轉恆州長史簡而有孚權而集作有中道嬰風患集作恙去職就醫還京春秋六十有二終于頒政里夫人成紀郡君天水秦氏廬陵郡公行師之孫嗣公游福之女敬事君子誡訓諸孤當代之孟母者集無此字也年六十二終於許州開元元集作九年十月某日合葬於武功之禮讓原禮也夫道大難合仕屯而不進德髙者集作有後身沒而福流君同生八人半服銀艾祚𦙍五子率為圭璋比迹於燉煌六龍南鄭千室德門濟美信有徴乎懼陵谷或遷乃勒銘沈石銘曰思文留侯時惟皇祖長沙南守分幹東土家有道書門傳學府嵬峩重世通經二主誕靈上哲克廣斯文造次仁義優游典墳孝乎事親忠乎事君猗那叔父亦足有云𤣥州司户吕君墓志銘君諱䖍字某其先東平人也堯之太嶽始封吕侯周之太師實表齊國河西則霸王繼氏集作代關東則丞相聮華近徙河間是稱右族大父贇隋幽州都督府長史考師滄州清池令並振羽儀馳聲郡集作都邑公孝弟天至禮樂混成千里聞騏驥之才五都重琅玕之價壯士行去樹勳於塞垣君子居之何陋於蕃郡以上柱國為𤣥州司户參軍積善襲於家風餘慶流於身後享年若干而卒夫人清河縣太君傅氏四德爰為六行聿修始則賔於冀妻終乃訓成孟母春秋若干而終開元十四年某月合葬於州城西南里之平原禮也我有令子職司馬於小山我有淑孫偶乘龍於大樹榮哀之事于兹畢矣銘曰堂堂吕公休有令德穆穆傅母順成內則兩譽齊振雙儀不慝集作忒景行山東風流河北有生必謝誰能獨存神寧故里合葬中集作平原劒暗泉室松寒墓門勒銘沈礎萬古何言許州長史趙公墓志銘張九齡公諱某字某天水隴西人其先受賜于周所食者趙下逮襄子大為諸侯至集作貽于謀孫克用保國有功有伐無代無之曽祖某隋尚書左右僕射淮安集作寧郡公祖某金紫光祿大夫殿中監贈工部尚書武强公父某符璽集作寶郎皆發聞馨香世祚蕃衍不髙位者則人望焉公惇師舊業允迪恭集作淵懿包君子大雅之量有古人獲心之實修詞以達其道則質文相半履行以顧其言則剛柔並克弱冠以門子調補湖州參軍轉相州司兵參軍學以入官思不出位格言清論始誦今行屬太上皇養德在藩擇賢為吏公首其舉王曰爾諧於是引為相王府户曹參軍轉法曹參軍及龍德既亨鶴鳴有應往而利見縻以好爵乃授朝散大夫雍州録事參軍綱領諸曹罔有不率秩滿除洛州伊闕令事舉其中斂從其薄惠小鎮大狥公滅私政之在人今而遺愛俄遷徐州司馬未幾轉陜州司馬許州長史千里將聘六轡斯柔得之自心動而中節故其四參州事再入府寮一宰畿邑三為郡佐莫不所居而績宣其用所去而頌因其跡豈伊茍然厥繇尚矣開元八年春二月疾革乙丑終于官舍春秋若干某年冬十有一月庚午歸葬夫人崔氏祔焉公自然淡泊不屑勢利守道貞固與命推遷故厯年多所移官數四不過參佐而已豈亦直道之云乎然而卑以自牧約而能濟推厚居薄內安其仁急病讓夷外多其義不曰君子其能爾乎有子曰令言次曰令則泣血加人抑情就禮哀訴窀穸之事恭惟先君之德驗之所履附之斯文以傳無窮以慰罔極銘曰猗嗟令德寬仁闕道景行行之風流肆好名取公器為身善寶集作善為身寶志所以立政所以宣入官惟允蒞事其然是儀是式不忘不愆今也終古後之克祚子孫禋祀春秋霜露茫茫九原斯焉永慕宋州司馬先府君墓志銘孫逖府君諱嘉之字某魏郡武水人也故屬安樂蓋齊大夫書之後至晉長秋卿道恭有子曰顗避地河朔後世居焉顗五世孫魏光祿大夫惠蔚為本朝大儒自時厥後不隕其業公即光祿𤣥孫也曽祖孝敏隋大業中并州晉陽縣令所居之聚聊設衡關至疑為晉陽里祖仲將皇朝鄆州夀張縣丞父希莊皇朝韓王府典籖自晉陽至府君四世而傳一子故五服之內無近屬焉府君四嵗而孤無所怙恃外祖劉士傑因官居于潞之涉縣府君自幼及長外族焉依克自激昻允迪前烈弱冠以文章著稱因此遊太原涉西河以觀陶唐之風河汾之間有盛名矣垂拱載初之際始詣洛陽獻書闕下極論時政言多抵忤所如不合遂投跡太學託名常調天冊中以進士擢第與崔日用蘇晉俱為考功郎中李迥秀特所摽賞久視初預拔萃與邵炅齊浣同升甲科解褐蜀州新津縣主簿又補河南府緱氏縣尉改王屋縣主簿府君少好攝生之術自王屋授訣於司馬先生便欲罷官學道而官微祿薄曰疑門無儲宗黨孤眇無所仰給繇是願效六百石長吏焉歷洺州曲周宋州襄邑二縣令秩滿之後遂絶跡人世屏居園林怡神太和以適初願居數嵗秩疑長子某拜中書舍人實掌絲綸皇上以府君有義方之訓特授朝散大夫宋州司馬仍聽致仕手詔褒美親族榮之享年八十三以開元二十七年四月二十四日棄背於東都集賢里之私第府君性聰眀而志髙邈學該百氏而不為章句文窮三變而尤工氣質早有大名晚從卑位於是知命之不偶道之不行隨時委運淡然無營而疇昔輩列平生雅故當軸處中者多矣蓋未嘗跬足而近之恬於勢利乃如此也然所涖之職必悉心為政不以小而易之人到于今遺愛矣爾其閨門之教子孫之謀猷之必逺誨則無倦萬石不假於誚讓太邱惟聞於遵疑誘保乂於後無慙古人夫人廣平宋氏蒲州安邑縣令斌之孫滑州司士參軍郁之女淑德賢行深慈至柔有子四人皆著名於詞學有女六人俱涉跡於圖史非獨府君之善訓亦有夫人之內則焉享年六十以開元十年十一月二十三日先棄背於河陽别業逖遹遘逮等遭天不愸遺降此鞠凶創巨以深荼蓼又集永惟宅兆未立精靈未安猶力尫瘵尚存餘喘即以府君違世之年八月十二日遷厝于邙山陶村之西原合祔焉禮也北據岡阜南瞻城闕一以託州原之勝勢一以近庭闈之故居諸孤等亦願朝奠几筵暮掃松柏往來密邇以置哀懷伏惟尊靈安此真宅小子痛極豈復能文泣血書事言多失緒其詞曰惟先府君不隕厥問克惟厥訓惟先夫人慈範是經柔德是程昊天罔極曷其報德敢述舊聞言豈為飾揚州司馬李公墓志銘李華公諱某字某趙郡髙邑人也在昔咎繇謨眀𤣥元道德武安之功秦人息甲廣武之略淮隂東西疑作面魏則中書為臣齊則常侍參佐命丞動鄰邦眀哲于周隋水部才冠時倫訓迪于忠孝國朝則蒲州之仁政趙州之懿德趙州生晉陽尉諱某道崇位卑鍾慶身後官婚人物為山東上族五百餘年矣公少孤以經明行修登第直崇文館授雍邱尉屬國家升中秦山縣當馳道徴責萬計臨事無違居至卑而不拆當大務而不撓外兄許公蘇尚書頲特親重之秩滿考六經覽羣書手抄二百卷觀其大一作仁義歷交城尉無何丁內艱柴毁終禮授榆次尉裴尚書胄先為太原尹廉察河東引公在幕賢者知勸不仁者懼既而從調朝廷詔有司精求令長公以崇璧之咨鍾彛之重屈為蕭令邑臨古汴之衝每嵗為害公因租之集兩稅一石置於水濵治之為防水不敗稼蕭人賴之徐方歌之則政之利人餘可知也選授太原府法曹參軍事大都阜殷嚚訟填積公鏡其詐實皆叶身中太原王之北門枕扼夷夏屬邊部首亂悉衆來攻公撫弦登陴左右軍師完城池潰凶醜有力焉詔加朝散大夫遷太子洗馬拜右諭德進階正議大夫東宫圖書亡逸有司命公留北部搜訪焉淮南節度故相崔尚書圓表公為揚州右司馬將任以州政方祖道遘厲而終享年六十六廣德二年六月十三日也長子規前刑部員外郎兼侍御史次子覲故沂州沂水縣丞次子覿故太原府榆次縣尉次子峴前汾州平遙縣丞幼子觀前左監門衛率府兵曹參軍事泣血茹悲哀號萬里求仁者之助於江湖奉迎裳帷於太原歸安洛汭禮罔不備某年月日窆於某原禮也規有公遺風國之才臣嘗為晉州吏職中外宣力王室聞於天下公其不亡矣公有文有武簡而能肅不伐其勞推其美於人神眀質髙嶷如山孤味道於老莊還性於禪惠每涉危必免阽患無傷冥然禮順疑若靈助蓋德之所至者也嗚呼位不尊夀不遐時耶命耶華於公諸從雁行為公所知感規之孝祗述盛烈以慰諸孤之心其銘曰貴為侯伯來日赫赫百夫之特所稱者德神錫純嘏道無違者淮南鎮揚為右司馬嘗涖蕭人蕭人以淳嘗掾太原功宣北藩艾綬銀章丈夫之尊春秋匪懈榮於寢門宜其永世天胡降戾仁而有子哀號萬里維嵩之隅維汾之涘我卜我筮夀宫修止與天無期寧極於斯子孫百代拜手於斯文苑英華卷九百五十五
