body:
  text: 文苑英華卷一百五十一宋李昉等編天部一日十六首月二十一首中秋月十九首玩月四首對月四首日詠朝日梁簡文帝團團出天外煜煜上層峯光隨浪高下影逐樹輕濃日李鏡逺始臨東嶽觀俄升若木枝萍實詎儔彩合扇且慙規北林耿初耀圓忩鑒早曦照庭餘雪盡映簷滴溜垂徘徊匝花樹煜爚滿春池栁隂才歷歷類聚作靡靡簾一作簷影復離離曽泉淮南子日至曽泉是謂早食豈停舍桑榆忽在斯回戈安得中長繩不可羈冲情愛景落清宴惜光馳溫暉徒巳荷深心竊自知詠日應令劉孝綽弭節馳暘谷照檻出扶桑園葵一何幸傾葉奉離光日華徐陵朝暉爛曲池夕照滿西陂復有當晝景江上鑠光儀時從高浪歇乍逐細波移一在雕梁上詎比扶桑枝詠日應趙王教康孟金烏升曉氣玉檻漾晨曦先泛扶桑海返照若華見淮南子池洛浦全開鏡衡山半隱規相歡承愛景共惜寸隂移賦秋日懸清光賜房𤣥齡唐太宗秋露凝高掌朝光上翠微參差麗雙闕照耀滿重闈仙馭隨輪轉靈烏帶影飛臨波無定彩入隙有圓一作光暉還當葵藿志傾葉自相依賦得白日半西山前人紅輪不暫駐鳥飛豈復停岑霞漸漸落溪隂寸寸生藿葉隨光轉葵心逐照傾晚煙含樹色棲鳥雜流聲詠日午奉和虞世南高天净秋色長漢轉曦車玉樹隂初正桐圭影未斜翠蓋飛圓影明鏡發輕花再中良表瑞共仰璧暉賒同前褚亮曦車日停午浮箭未移暉日光無落照樹影正中圍草萎看稍靡葉燥望凝初學記作疑稀晝寢慙經笥暫解入朝衣日董思恭滄海十枝暉山海經扶桑九日居下枝一日居上枝或作滄波十丈暉非𤣥圃重輪慶舜華發晨檻菱彩翻朝鏡忽遇驚風飄自有浮雲映更也人皆仰無待揮戈正日李嶠旦出扶桑路遙升若木枝雲間五色滿霞際九光披東陸蒼龍駕南郊赤羽馳傾心比葵藿朝夕奉堯曦秋日王昌齡文粹作耿緯反照入閭文粹作窮巷憂一作愁來與誰語古道無詩選作少人行秋風動禾黍同前耿緯唐書作湋後同照耀天山外飛鴉幾共過微紅拂秋漢片白透長波影促寒汀薄光殘古木多金霞與雲氣散漫復相和登天壇夜見海日李益朝遊碧峰三十六夜上天壇月邊宿仙人携我搴玉英壇上夜半東方明仙鐘撞撞迎集作近海日海中離離三山出霞梯赤城遙可分霓旌綘節倚彤雲八鸞五鳯紛在御王母欲上朝元君羣仙指此集作我為我說幾見塵飛滄海竭竦身别我期再逢空山處處遺清風九州下視杳未旦一半浮生皆夢中始知武皇求不死去逐瀛洲羡門子負冬日白居易杲杲東集作冬日出照我屋南隅負暄閉目坐和風集作氣生肌膚初似飲醇醪又如蟄者蘇外融百骸暢中適一念無曠然忘所在心與虛空俱夕陽鄭谷夕陽秋更好㶑㶑集作斂斂蕙蘭中極浦明殘雨長天急逺鴻僧窗留半榻漁舸透踈蓬莫恨清光盡寒蟾即照空月詠月文選作秋月沈約月華臨靜夜夜靜滅氛埃方暉竟入户文選作户入圓影隙中來高樓切思婦西園遊上才網軒映珠綴應門照緑苔洞房殊未曉清光信悠哉詠月篇類聚作望秋月前人望秋月秋月光如練照耀三爵臺徘徊九華殿九華玳瑁梁華榱與璧璫以茲雕麗色持照明月光凝華入黼帳清暉懸洞房先過飛燕户却映班姬床桂宫裊裊落桂枝露寒凄凄凝白露上林曉葉颯颯鳴鴈門早鴻離離度湛秀質兮似規委清光兮如素照愁軒之蓬髮映金階之輕步居人臨此笑以歌别客對之傷旦暮輕襄類聚作囊圃映寒叢凝清夜帶秋風隨庭雪以偕素與池荷而共紅臨玉墀之皎皎含霜靄之濛濛轥天衢而徙度轢長漢而飛空隱嵓崖之半出類聚作而半隔隔類聚作出幃幌而才通散朱庭之奕奕入青瑣而玲瓏寒階悲寡鵠沙洲怨别鴻昭姬泣胡殿明君思漢宫余亦何為者淹留此山東月董思恭北堂未安寢西園聊騁望玉户照羅幃珠軒明綺幛别客長安道思婦高樓上所願君莫遺初學記作違清風時可訪月集作玩初月沈佺期見駱賔王集忌滿光恆集作先缺乘昏影暫集作漸流既集作自能明似鏡何用曲如鈎秋月駱賔王雲披玉繩净桂滿鏡光圓集作月滿鏡輪圓裛露朱花集作珠暉冷凌霜紈扇集作桂影寒漏彩含踈薄浮波漾急瀾西園徒自賞南飛終未安月李嶠桂生一作滿三五夕蓂開一作分二八時分輝度鵲鏡一作清輝飛鵲鑑流彩入蛾眉一作新影學蛾眉皎潔凌一作臨踈牖朦一作朎朧鑒薄帷願陪北堂宴長賦西園詩一作願言從愛客清夜幸同嬉一作皆單題詩同前二首杜甫天上秋期近人間月影清入河蟾不沒搗藥兔長生只益丹心苦能添白髮明干戈知滿地休照國西營二四更山吐月殘夜水明樓塵匣元開鏡風簾自上鈎兔應疑白髮蟾亦戀貂裘斟酌姮娥寡天寒耐九秋新月前人光細弦豈集作欲上影斜輪未安微升古堞集作塞外巳隱暮雲端河漢不改色關山空自寒庭前有白露暗滿菊花欄集作團初月李白玉蟾離海上白露濕花時雲畔風生爪沙頭水浸眉樂哉絃管客愁殺戰征兒因絶疑西園賞臨風一詠詩水月僧皎然夜夜池上觀禪身坐月邊虛無色可取皎潔意難傳若向空心了長如影正圓月一字至七字張南史月暫盈還缺上虛空生溟渤散彩無際移輪不歇桂殿入西秦菱歌映南越正看雲霧秋卷莫待關山曉沒天涯地角不可尋清光永夜何超忽秋月白居易萬里清光不可思一作私添愁足一作盆恨繞天涯誰人隴外久征戍何處庭一作亭前新别離失寵故姬歸院夜沒畨老將上樓時照他幾許人腸斷玉兔金蟾一作銀蟾逺不知此詩本卷中秋月門重出今巳削去注異同為一作同前李商隱池上與橋邊一作樓上與池邊難忘復可憐簾開最明夜簟卷巳凉天流處水花急吐時雲葉鮮姮娥無粉黛只是逞集作鬬嬋娟同前方干凉宵煙靄外三五玉蟾秋列野星辰正當空鬼魅愁泉澄寒魄瑩露滴冷光浮未折青青桂吟看不忍休月前人桂輪秋半出東方巢鵲驚飛夜未央海上風雲搖皓影空中露氣濕流光斜臨户牖通宵燭回照階墀到曉霜庾亮恃才高更逸方聞墨翰巳成章初月李羣玉艷艷集作灔灔流光淺娟娟泛霧集作露輕雲間龍爪落簾上玉鈎明桂影枝猶小仙人影未成欲為千里别倚幌獨含情月羅隱湖上風高動白蘋暫延清景此逡巡隔年為别因集作成何事半夜相逢集作看似故人蟾向靜中矜爪距兔偎集作隈明處弄精神姮娥老大應惆悵獨倚集作倚泣蒼蒼桂一輪月曹松寥寥天地外夜魄爽何輕頻見此輪滿即應華髮生不圓爭得破才正又須傾人事還如此一作相似因知倚伏情秋霽豐得寺與𤣥真師詠月唐彥謙露冷風輕霽魄圓高樓更在碧山巔四溟水合疑無地八月槎通好上天黯黯星辰環紫極喧喧朝市蔽蒼煙夜深獨與巖僧語羣動消聲舉世眠月雜詠作中秋夜玩月前人一上雜詠作夜高樓萬景竒碧天無際水無涯空雜詠作只留皎月當層漢並送浮雲出四維霧盡雜詠作靜不容𤣥豹隱氷生祇雜詠作唯恐夏蟲疑坐來離思憂生晚雜詠作將曉爭得姮娥子細知中秋月賀崔中丞中秋月張南史秋夜月偏明西樓獨有情千家看露濕萬里覺天清映水金波動銜山桂樹生不知飛鵲意何用此時驚中秋夜與諸公錦樓望月得中字武元衡玉輪初滿空迥出錦城東相向秦樓鏡分飛碣石鴻桂香隨窈窕珠綴隔玲瓏不及前秋見圓光集作輝明雜詠作鳯沼中酬劉集作裴端公中秋夜對月見懷權德輿凉夜清秋半空庭皓月圓動搖隨積水皎潔滿晴天多病佳期阻深情麗曲傳偏懷賞心處同望庾樓前中秋夜臨鏡湖望月陳羽鏡裏秋宵望湖雜詠作潮平月彩深圓光一作明珠入浦浮照鵲驚林淡動光還翠嬋娟影不沉逺時生岸曲空處落波心迥徹輪初滿孤明魄未侵桂枝如可折何惜夜登臨八月十五夜玩月劉禹錫天將今夜月一遍洗寰瀛暑退九霄净秋澄萬景清星辰讓光彩風露發晶英能變人間世翛然是玉京和中書崔舍人八月十五日夜玩月二十韻前人暮景中秋爽隂靈既望圓騰精浮碧海分照接虞泉或作淵疑諱迥見孤輪出高從倚蓋旋二儀含皎潔集作徹萬象共澄鮮整御當西陸舒光麗上𤣥從星變風雨順日助陶甄逺近同時望晶瑩此夜偏運行調玉燭潔白應金天曲沼疑瑶鏡通衢若象筵逢人盡氷雪遇景即神仙引素吞銀漢凝清洗緑煙臯禽驚露下鄰杵思風前水是還珠浦山成種玉田劔沉三尺影燈罷九枝燃象外形無跡寰中影有雜詠作自遷稍當雲闕正未映斗城懸靜對揮宸翰閒臨襞彩箋境同牛渚上宿在鳯池邊興掩尋安道詞勝命仲宣從今紙貴後不復詠陳篇八月十五日夜湓亭望月白居易昔年八月十五夜曲江池畔杏園邊今年八月十五夜湓浦沙頭水館前西北望鄉何處是東南見月幾回圓臨風一嘆無人㑹今夜清光似往年答夢得八月十五夜玩月見寄前人南國碧雲客東京白首翁松江初上月伊水正無風逺思兩鄉斷清光千里同不知娃館上何以疑作似石樓中其夜在龍門石樓望月八月十五夜禁中獨直對月寄集作憶元九前人銀臺金闕夕沉沉獨宿相思在翰林三五夜中新月色二千里外故人心渚宫東靣煙波冷浴殿西頭鐘漏深猶恐清光不同見江陵卑濕足秋隂中秋月釋無可見雜詠蟾宜天地靜三五對階蓂照耀超諸夜光芒掩衆星影寒池更徹露冷樹梢青枉值中秋半長乖宿洞庭同前劉得仁塵裏兼塵外皆期此夜明一年唯一夕雜詠作度長恐有雲生露洗微埃盡光濡是物清朗吟看正好惆悵又西傾同前李頻隂盛此宵中多為雨與風坐無風雨至看與雜詠共看雪霜同抱濕離遙海傾寒向逺雜詠作迥空年年不可值還似道難通同前李洞見雜詠四十五秋宵月分千里毫冷沉中嶽短光溢大河高不寐清人眼移棲濕鶴毛露華臺上别愁望一年勞同前馬戴見雜詠隂魄出海上望之增苦吟冷搜驪頷重寒徹蚌胎深浩氣籠諸夏清光射萬岑悠然天地內皎潔一般心中秋越臺看月李羣玉海雨洗塵埃月從空碧來水光籠草樹練影掛樓臺皓耀迷鯨目晶瑩失蚌胎宵分憑欄望應合見蓬萊中秋月張祐碧落桂含姿清秋是素期一年逢好夜萬里見明時絶域行應久高城下更遲人間繫情事何處不相思同前釋棲白見高僧詩尋常三五夜一作夕豈一作不是不嬋娟及到中秋半一作及至中秋滿還勝别夜圓清光凝雜詠作光凝一作光凝唯有露皓色爽雜詠作皓色更一作爽徹更無煙自古長如此雜詠作人皆玩一作人皆望年來復雜詠作更一作又一年同前司空圖閒吟清景外萬事覺悠悠此際雜詠作夜若無月一年空雜詠作虛過秋同前裴說見雜詠一歲幾盈虧當盈重此期幸無偏照處剛有不明時色净雲歸早光寒鶴睡遲相看吟未足皎皎下踈籬玩月同從弟銷南齊玩月憶山隂崔少府王昌齡高卧南齊時開帳月初吐清輝極木隙演漾在窗户苒苒幾盈虛澄澄變今古美人清江畔是夜越吟苦千里其何知微風吹芳杜裴迪書齊玩月錢起夜來詩酒興集作意月上集作滿謝公樓影閉重門靜寒生獨樹秋鵲驚隨葉散螢逺入煙流今夕遙天末清輝集作光幾處愁西掖玩月令狐舍人說昨夜西掖玩月戲贈李商隱昨夜玉輪明傳聞近太清凉波衝碧瓦曉暈落金莖露索秦宫井風絃漢殿筝幾時綿竹頌擬薦子虛名泛江玩月十二韻并序元稹余以元和五年自監察御史貶授江陵士曹掾六月十四日張季友李景儉二侍御王文仲司録王衆仲判官兩昆季為余載酒炙選聲音自府城之南橋乘月泛舟窮一夕豫因賦詩以記之楚塞分形勢羊公壓大邦因依多士子參畫盡敦龎嶽璧閒相對荀龍自有雙共將船載酒同泛月臨江逺樹懸金鏡深潭倒玉幢委波添净練洞照滅凝釭闐咽沙頭市玲瓏竹岸窗巴童唱巫峽海客話神瀧巳困連飛盞猶催未到缸飲荒情爛熳風掉樂琤樅勝事他年憶愁心此夜降知君皆逸韻須為應筳撞對月與盧明府别後南湖對月僧皎然五集作南湖生夜月千里滿寒流曠望煙霞盡凄清天地秋相思路渺渺獨望水悠悠何處空江裏嬋娟伴客舟廣陵秋夜對月即事陳羽霜落寒空上月樓月中飲疑作歌唱滿揚州相看醉舞倡樓月不覺隋家陵樹秋對月二首張喬盈缺青冥外東風萬古吹何人種丹桂不長出輪枝二圓魄上寒空皆言四海同安知千里外不有雨兼風文苑英華卷一百五十一
