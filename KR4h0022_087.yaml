body:
  text: 文巻英華巻八十七宋李昉等編符瑞四竹宫望拜神光賦二首漢皇竹宫望拜神光賦一首漢武帝齋宫産靈芝賦一首西掖瑞栁賦二首國子丞㕔連理樹賦一首連理樹賦一首瑞橘賦一首再生檜賦一首竹宫望拜神光賦以親饗䖍潔靈報光燭為韻張餘慶洪惟漢后有事郊禋感流光之委照爰拜賜於上神初自竹宫覩殊祥之溢目俄低玉佩方致敬而俯身有以見感而必應孰謂其尊而不親徒想夫寰宇肅清齋庭夜敞辛日惟吉明神是饗徳馨而祀事精慤福降而禎祥歸徃彼靈輝之自天若有答於吉蠲下雲路而瞥爾照祠壇而烱然㝠感而來狀如虹之炳耀齋莊則致配明火以昭宣武皇自以為備物展禮儲精告䖍茍降鑒之不昧宜受賜於上𤣥仰而望之初奪目以爛爛俯而見也且鞠躬以拳拳若然者豈不以蒼璧儼陳圜丘宿設帝心精一祀物豐潔天瑞聖而為光委靈壇而不滅不然則何以煌煌熒熒發自杳㝠于以表異于焉効靈臨爟火張晏注史記權火音爟周禮有司爟許氏説文舉火曰爟此書第五十六巻有雍畤舉爟火賦不可泥司馬氏史記索隐改作權火後同以助耀照爼豆而分形者乎跡彼光臨實惟㝠報宜望拜以俯僂表至精而懇到是知君徳允臧天道孔彰崇嚴祀而神降之吉潔齋心而物効其祥初電烻以散色忽星流以耀芒降自彼天豈慙於紫氣不資于水且異於榮光國家徳邁炎靈時稱玉燭擁神光而先敬脩祀禮而將續有客觀光歎美不足何待時而就列庻餘光之可矚第二同前韻張公乂祀之嚴者饗帝徳之盛者降神不勵精孰謂福之自已非表異曷知天實無親武皇卜郊以元吉祈靈於上辛宻命始傳光則絪緼未感齋宫爰拜神其肸蠁有音盖以穆爾精勤凝然存想屬屬乎蒼璧既奠煌煌乎太壇攸仰委佩盡餙庻無譁以端莊秉圭展儀闕彼電破乎祥烟逮闇之時􅀈疑燭而明爛矣遥望之處拜起而容肅然豈不以配合崇髙昭陳宿設圜丘之上將候其耿光竹宫之中以備其齋潔既恍惚而有見竟超遥而未絶或左或右通幽洞㝠炤灼兮疑分暉於畵燭焜煌兮乍聨影於低星所以彰有徳赫炳靈實見詞祈疑周流福庭望神之休惟一人有慶主日之際必上帝是聽故天降徳疑祥人窺其魚疑作奥至徳而感豈𤣥邈之不臻至誠而祈豈昭彰之不報首兹祀事實在陽方望拜雖同乎手拜神光且異乎蕭光人皆見之孰不仰而祇慄夜則艾矣諒惟逺之馨香殷雉雊而稱異魯郊牛而用傷皆祈報之𤨏細非昊穹之降康豈比夫神祠太一之靈樂飲一作進歌童之曲雖望之而如在懼敬之而不足漢后之䖍恭也如此故景光而下燭漢皇竹宫望拜神光賦以上辛之日有事於圓丘為韻令狐楚大事在祀吉日惟辛偉漢皇之光宅禮太一之威神就陽位叙彛倫青旌既載蒼璧斯陳帝徳惟馨䖍精誠而上感天通疑作道一作心不昧發神光而下臻斯所以昭乎望拜之地肅爾侍祠之人懿兹珍神實曰靈貺奪月之魂韜雲之狀集于祠側照此壇上神實臨下以無私君亦當仁而不讓是時也神光未動逺靄初收天宇清兮羣動和肅帝座正而萬靈懐柔倐爾電烻熠若星流謂珠蚌之初剖燭龍而暫游武皇於是委玉佩俛翠旒自竹宫望圓丘拜上帝之賜擁明神之休遐徴所聞以此為異歌童不㕦見詩頌以奏曲從臣勿䙝而在位奉其道永肩一心答其祥敢有二事光之降也帶爟火已注在前兮侵燎煙臨仙仗以増煥映靈丘而乍圓帝之望也爇香蕭兮奠𤣥酒布清闕意而不倦儼威儀而方久善行無轍跡摶之乃無盛徳有行容視之而有神既格思人皆見之助逮暗之祭彰燭幽之時詎比夫望于觀臺而為備坐彼宣室而受釐故能飛扇英聲騰乎茂實笑魯郊鼷䑕之告僣鄙秦祀野雞而獲吉來或從東似合序於春令至常以夜若避明於朝日今國家成功巍乎明徳依於鋪鴻猷而前王所羨崇嚴祀而左史宜書備禮告天帝既踰於孝武觀光獻賦愚竊慕夫相如漢武帝齋宫産靈芝賦史近武皇帝慕軒后之風儲思幽通叶珍符於瑞牒産靈芝於齋宫太一清精元君降衷色奪兼金發靈姿以温潤質逾美玉浮真氣以葱蘢原夫帝在華帳儼于仙仗睿思邈以冲寂神心窅其相向髣髴受釐肅其㝠貺非煦育之所致乃精神之潜暢挺兹三秀表信乎三元之符擢此九莖示期爾九坻之上異屈軼之致用類朱英之為狀足表天感與地生或揚臣和而君唱是知至精潜運神物昭彰靈液潜通願生乎枯木貞石神心幽賛故出此閟殿神房冠庻草以為貴故有時而發祥信禀質以津澤非本媚乎馨香豈比夫楚水之空嘉萍實仙宫之獨貴𤣥霜懿夫道心虚澹我則無味以𤣥感化象貴形我乃無根而効靈是用㧞竒瑶砌標異彤庭紫盖與祥雲允合朱莖將火徳相㝠秀射猗蘭之室光連雲母之屏煥國典而永昭歌頌徹𤣥風而丕耀徳馨彼丹甑呈豐器車表徳潜美巖野挺芳幽側曷比夫耀甲乙之帳赫矣朱榮結天地之精渾然剛克異朝菌之為體同夜光之非飾含聖澤以成春體正陽而禀色是知人心告䖍珍物効焉將㑹昌於羣帝必功格于上𤣥且神之符則受此靈草神之㑹則降彼真仙茍獲符而為約與降質而相懸大寳在乎皇極真居本乎丹田茍溺異以趨怪顧汨聽而表年彼乘嶠而求静此執迷而徴聖徒有托於齋祈信無裨於性命覩芝宫兮緬爾一作汚朽倐隙駟以奔競庻歸𤣥化之門小彼炎皇之慶西掖瑞栁賦以應時呈祥聖徳昭感為韻郭炯乾坤至誠草木無情神靈乗化而致理枯朽効祥而發生當聖澤未沾故兀然枯瘁及天光廻照遂藹爾敷榮因萬物以咸遂與百祥而畢呈故得垂隂瑣闥之中固本鳯池之側始孤標而頴㧞乍苒弱而條直長充西掖之佳翫迥奪東門之秀色芬敷自異永垂不朽之名變化無一作殊常用表好生之徳懿其荑生漸蔚幹聳惟條拂瑞景而増麗裊祥風而獨揺可以彰聖主之𤣥感可以見昊天之孔昭舒巻以時陋梧桐之半死榮枯順理鄙松柏之後凋且春布發生之慶秋行肅殺之令於天地而不失其常在金木而各得其性衆皆畢出盡逹我則向日而衰衆皆黄落萎腓我則感時而盛不然何以知至徳之動天運神功而瑞聖者矣翠色牂牂異酒泉嘉柰之祥輕隂澹澹同鄱郡枯梓之感烟銷雨霽霏素雪於宸居日宴疑作晏春深雜繁花於睿覽青翠葳蕤垂軒拂墀在日月偏臨之處當鴛鴦一作鸞集苑之時至矣哉天降靈貺聖為明證既得地而不雜衆流常託根而獨標美稱是知天聼自人而應者也第二同前韻陳詡栁變西掖瑞彰聖時感廵遊之未至失榮落于先期雨露所均常比中國一作園之欝欎宫闈暫閉若無春日之遲遲所以望車塵之行幸慰都人之怨思物或有慿神固難測生植不易地而殊榮孤影忽同秋而異色豈上天之降鑒俾下民之是則于以激忠臣之心于以彰大君之徳初斯栁之失常人未知其為祥秦原之煙景明媚漢苑之草樹芬芳獨孤彫而槁瘁似永隔於風光無絮花之似雪意膏露之凝霜及夫天㢠廻舊歩木得其性千官捧日以輸忠萬騎從龍而翊聖彼衆芳之已歇我得秋而始盛豈固異於常材實願貞乎景命偉夫瑞發匪遥成天意之孔昭徳惟可覽結人心之幽感不然栁且無情曷枯而生其枯也當煙塵之晦其生也表氛沴之清與時不偶叶聖斯呈政或可持疾風始知夫草勁節無所立嵗寒徒稱乎栢貞宜其俯鳯池而灑潤接鷄樹以連榮儒有因物比興屬詞揣稱聞瑞栁於春宫遂揄揚於天應國子丞㕔連理樹賦王履貞靈臺崇崇兮洞轇轕以綿延中有珍木兮欝森森以芊芊始殊形以分聳終共理而連拳始信聽三字一作信聽徳以被物初應聖而効焉且學為教原丞為紏局生於學者表王化之大同植於㕔者知官政而無曲亦所以據於徳而逺於俗也樂我皇道彰我聖年謂為交柯乃尋本而無末謂為别幹能己離而復連依君仁義之圃對君翰墨之筵俾為我師者如斯木之一徳為我曹者如斯木之相全故瑞不虚然從化而止化不在逺行之由已有善必應詎云草木之無知惟徳是親奚問隂陽之至理可以載美青史可以表慶皇家人各有心我則合而為一物曲有利我則不避其斜夫如是則造化之理易尋天地之情可測順之則生瑞逆之則成慝故曰禍淫湎福正直諒物情之効祥由人君之布徳故得托根講肄之宇垂隂夫子之牆雜庭槐以為列偶仙杏而成行逢聖而生匪由乎日月以翼取端為寳孰尚夫金玉其相所謂光乎泰階允臻靈貺不然者則徒聞其説孰究其狀至矣哉觀一樹之攸同知四夷之内向連理樹賦陳諷惟薫風之生物有穠李之表禎合連枝於異幹符一姓於嘉名交影齊宻均和其榮諒全徳之通感豈元和之曲成族堅附離訝生植之異氣殊質合體識天地之幽情考彼祥經珍兹善價昭一人之有慶表四夷之嚮化體符通理黄中之象攸存義用成蹊不言之道斯備盖夫靈根得地聳質齊芳分條表異合幹呈祥膚含玉潤文蔚龍章雲交翼比影附枝強庇本根於仙族挺孤秀於仁鄉始則分形謂隂陽之偶數終而貫一表遐邇之通方是知𤣥本靈種暗符神用諒翦伐之為重合拱連條允孚歌謡固耳目之所昭並甘棠而價掩比叢桂之香遥則知瑞以感生祥由仁致覩政疑分而脉㑹契人事與天意將徳茂而精通故駢踈而合異于以昭化警俗示人不二豈比夫草生堯砌空有紀於萼官芝産漢宫徒用彰於祀事洎夫𤣥律發春東風薦臻齊敷連厯之影共沐陽和之津想雙枝於棠棣感合體於君臣四海為家豈必移根於上苑五事敬用固亦發瑞於仁人彼晉得華林漢生廣殿諒崇功而間出豈謙一作凉徳而來見願棲託之見容恐光隂之不薦瑞橘賦并序李徳裕清霜始降聖一無此字上命中使賜宰臣等朱橘各三枚葢靈囿之所植也臣伏以度一作渡淮為枳由地氣而不遷吹谷生黍信陽和之所感昔漢武致石榴於異國靈根遐布此西域柔服之應也魏文作武植朱橘於雀園一作銅雀華實不就乃吳人未格之兆也考於前史昭晰可知豈非天地和同羣一作靈物効祉去蠻夷之陋獲近太陽感王化之盛更承膏露草木尚爾况乎人心漢宣帝宫館山澤意有所感必使一作詔近臣賦之臣幼學為文忝列樞近敢稽首獻賦曰美南州之嘉樹受烈氣於炎徳固一志於殊方遂不遷於上國貞葉凝碧蔚一作藹湘岸之夕隂華實變黄動江潭之秋色雜丹楓於溪畔映緑篠於巖側翡翠以之列巢鵷雛由是一作焉棲息雖同霑於雨露竊自得於彫飾終獲譽於皇明豈因人之一作而羽翼感大鈞之獨運斡造化之𤣥力思六合以一作之同風採孤根而移植播元氣以一作之茂育諒隂靈之不測逮乎霜飛文一作天囿風落秦川金莖炫晃於朝日玉樹菁葱於霽天峩方壺之翠島引一作列靈沼之清漣上蔚檉松下秀蓀荃赩朱草與屈軼煜紫芝與賔連靈卉畢植而嘉橘在焉翠葉獨潤金衣更鮮天漢之華星焜燿閬風之珠樹粲然香若團於野露色疑炫於江煙既而太官獻新竒果列筵非一作飛厥包之自逺何菲陋之莫傳樹隐方塘比丹萍之初實盤映皎月與赤瑛而共妍東鄙孤臣謬塵三事既乏和羮之用猶霑可口之味并食不剖一作割竊愧晏嬰之知捧之以拜重感桓榮之賜庻不改於雪霜一作霜雪永酬恩於天地凡一作皆集本集文苑時古書尚多又校讐皆名士近刋文集頗經淺學改竄或當或否安可例以為正栁宗元白居易李徳裕等文偶爾流傳如此賦内文囿者文王之囿也集本作天囿大率類此再生檜賦温岐檜有再生之瑞天符聖運之興挺松身而鱗皴逈出布栢葉而杳藹相承隋道既窮則沒身於亂土唐朝將建故發徳於休徴原夫日將興而幽暗皆明君應期而纎㣲必表生於枯朽證受命於敗徳之時長則繁華示寳祚於延慶之兆想夫㧞陳根而已茂聳脩幹以方妍凌朝而還宜宿露向晩而尤稱新煙以狀而方生荑之枯楊若此以理而喻易葉之僵栁昭然効殊祥以示後願衆瑞而居先嘉其擢本傍榮抽條逈秀歴朱夏而彌盛冒霜雪而不朽應昌業於龍潜之際豈曰無心彰聖徳於虎視之前孰云虚受徒觀夫載光紫府効祉皇家竦亭亭之柯葉擢鬱鬱之輝華可以播之於萬古可以流之於四遐是知厯數歸唐禎祥啓聖何厚地之朽木報上天之明命殘陽未落宫庭之林藪忽生明月初懸玉砌之桂華復盛矧夫貞節獨異髙標自持散芳氣而㣲風乍動入重隂而宿鳥猶疑盖天所賛也亦神以化之客有生遇明時身䝉至徳窮勝負於朕兆慕休祥於邦國敢獻賦以揚榮遂布之於翰墨文苑英華巻八十七
