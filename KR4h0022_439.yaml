body:
  text: 文苑英華卷四百三十九宋李昉等編德音六誅罪德音破黨羌一作平黨項德音編制門下冒法干紀豈限於華夷伐罪弔人固資於典訓朕端拱御宇六年于兹兢兢業業不敢荒怠一作怠荒常恐一物失所羣心靡寧旰食宵衣思砥于道屬者以黨羌恣為侵叛尤苦農商朕為人父母豈無憫惻雖傷財害物非朕躬之願而禁暴定功實武經之要是以爰興師旅龔行天討而凶渠稔惡稽曠嵗時師宿既勤物力將屈賴宗社儲祉中外叶心大搜妖巢蕩定關隴誠殫財而凋力亦暫費而永寧今則軍功已成制置將就息戈解甲固在及時縱捨一作捨罪緩刑所宜布澤南山黨項為惡多年化諭不悛頗為邉患近興兵士經嵗討除拒官軍者悉就誅擒懼法令者皆從逃竄大開湯網已施去殺之仁逺並堯年寧限可封之屋今聞殘寇無所依歸皆是王人豈忘惻憫其南山黨項已出山者或聞逼於飢乏猶行劫奪平夏不容無處居住今委李福且先遣蕃官安存招誘令就夏銀界內指一空間田地居住所有從前挂涉惡迹者今一切不問唯再犯疆界劫一作却入山林或不從指揮即召募平夏黨項精鋭者討逐議不容稔如能革心向化願同平夏即須投一作輸誠獻欵迹效分明撫馭之間便同赤子如有屈事即任於本鎮投狀論理仍各令本鎮遣了事軍將安存平夏黨項素聞為善自旬月以來發使撫安尤見忠順一如指揮便不猖狂各守生業自兹必永戴恩信長被華風或聞從前帥臣多懷貪尅部落好馬悉被誅求無故殺傷致令怨恨從今已後必當精選清亷將帥撫馭羌戎明下詔條漸令知悉靈鹽夏州邠寧鄜坊四道官吏自用兵已來責辦公事亦甚辛勤軍將皆已得官文吏具名聞奏有官者與依資轉遷無官差攝者當與正官仍具差攝年月申奏直須公當不得轉授囑託如是將帥親情亦須具言四道百姓徴斂不時差役至多疲瘵亦甚或聞屋宇被賊焚燒至于桑麻亦遭砍伐生業既失須加安存宜各給復三年其有無屋可居無牛可種者委長吏量事接借一一奏聞仍須早設法招擕令各歸復勿令豪富便占産業為生自用兵已來諸道應徴發之處所有將健或沒于鋒刃或身被重瘡一作瘡痍雖經褒贈及曾優恤委本道更加存撫或自因廢疾不任在公者終身不停衣糧如情願回與子孫兄弟甥姪者便與補替應討伐黨項諸道在行營將士已頒賞賜俟一作候邊上制置有敘績節級放還仍委本道敘録具名聞奏當與甄奬自用兵已來京師與鄜坊邠寧兩道接界及當路諸縣差役繁併物力凋殘若無優矜必難存立其今年夏稅錢及青苖錢每貫量放三百文其斛斗糧量放一半仍委京兆尹差官子細磨勘其或雖在鄉村不曾經供應者不在準例放限仍一一條件等第聞奏如是分路處就中更校便併者量加優恤必使均平其所放錢及斛斗委户部以實錢支填仍令京兆府及下諸縣散榜鄉村要路曉示百姓務令知悉用兵以來城鎮曾遭陷沒官健百姓因被殺傷親戚既無遺骸在野委所在長吏差人為收拾如法埋瘞仍量事致祭應有增收城鎮添置堡候一作戎委所在將帥擇其要害絶彼窺覦切務堅完令可固守邉上不許以兵器於部落博易從前纍有制敕約勒非不丁寧近年因循却不遵守自今已後委所在關津鎮鋪切加捉搦不得輒有透漏其有犯者推勘得實所在便處極法其所經過州縣關津鎮鋪節級痛加懲責義無容貸其間或情涉隱欺凖所犯人處分黨項本是邉氓只合州縣撫馭致令一朝侵叛由于處理乖方既往不可加刑從今必行法令一作必欲行法自此之後邉上逐界皆已有制置把捉如或更有羌寇侵盜即是將帥依前貪求當先加罪於本界邉將然剪逐冦賊通商之法自古明規但使處處流行自然不煩饋運委邉鎮宜切招引商旅盡使如歸除禁斷兵器外任以他物於部落往來博易應緣徴兵處士馬皆效勤勞亦已各有賞賜其本道將帥當續議量加酬奬京畿及鄜坊靈鹽邠寧夏州并涇州鳳翔振武天德等道自用兵已來人頗勞苦今頒德澤須加曲恩應見禁囚徒據罪減一等唯官典枉法犯贓及賊中有持杖劫人故殺人等不在此限如有積年逋賦必加徴督不得者委長吏條流聞奏準格律大功已上親及女壻外甥不許連任自用兵已來諸道節將及長吏權宜差親表主持公事兵罷之後理當不然其三族內親並不得令主兵權及充要職如是元在本軍先充職掌者亦須具名聞奏自用兵已來科配百姓事取濟辦多出權宜今既罷兵諸道節度防禦刺史及鎮使等不得更依前妄有科配仍令具本管侵害百姓須釐革者作條件聞奏自黨項擾亂以來所在多被攻劫白刃之下必有孝子順孫義夫節婦事迹有可稱者委所在長吏察訪優恤其家仍具名聞奏將加旌異於戲蠻夷猾夏固有用於常刑撫馭乖方遂致興於薄伐傷夷暴露朕實愧焉是用覃恩以慰勞瘁布告中外咸使聞知主者施行大中五年四月二十九日一作皆唐大詔令洗雪南山平夏詔令作平夏黨項德音敕平夏南山雖云有異源流風俗本實不殊我國家纍聖已來許居內地久奉聲教亦立功勞朝廷撫綏常布恩信近者邉陲之帥制御乖方遂有凶悍之徒不率父兄之教或侵暴州鎮或攻掠道途告諭罔悛猖狂頗甚朕君臨區宇深念黎元凡曰含生皆同赤子但欲為人除害固非黷武佳兵每覩殺傷深多憫惻是以去年洗詔令作特雪平夏驅除南山及聞窮困無歸復有懷來之意遂令白敏中李安業分統諸軍先示招擕仍加訓練但知非則赦免不得已則誅鋤王者之師義實在此近得敏中狀申南山盡願歸降瀝懇輸誠惟思展效請般運糧料乞要保一封疆閲其奏章深愜朕意比者或有剽劫必推南山南山或有冦攘亦指平夏既相非斥互説短長終難辨明祗益仇怨今則並從洗雪咸許自新但能各務安全遞相勸勉保其生業絶彼侵踰從前所有愆違自此一切不問惟鹽州深居沙塞土乏農桑軍士運詔令作依糧須通商旅沿路堡柵事須修營今委李安業依朝廷制置差兵建築防守尤恐部落心懷疑慮委令李安業駐軍塞門朕之屈法從人斯為極矣若執迷不反干犯國章後悔難追深宜自省大中五年七月六日洗滌長慶亂臣支黨德音門下皇王之令凶逆詔令作慝必置於嚴誅天地之心含育亦存乎在宥除惡務絶其根本原情必諒於親疏慮興詿誤之嫌用安反側時舉寬𢎞之典盡滌瑕痕追惟長慶之初亂臣賊子之輩人神共憤覆燾不容頃以論刑是從流竄而東宫親昵之黨亦參帷幄之謀顧偷冒以取恩陷君父於不義必資懲創以蕩姦源議法當然非朕敢赦而曾不知過交構流言興謗道途扇惑人聼蓋以從前搜捕未盡巢穴猶存再令根尋果獲支黨無非近戚咸伏其辜在臣節而既虧於國章而難逭并已從别敕處分除竄逐遐荒及配諸陵守當外應諸惡黨從祖兄弟子壻妻族內外親戚門生故吏及此來别居并從踈逺等降德音後一切不問諸司諸使更不用尋勘務從寬恕俾絶憂疑惟先推鞫得姓名合流者雖已逃竄如獲日準前敕處分頃者屢降明詔以順人心重此究窮蓋非獲已今則更無餘孽永絶猜嫌攄憤之志既申懲惡之刑亦至乘春布澤大與惟新明示中外咸知豫意主者施行大中八年正月十一日誅逆人蘇佐明德音敕蓋君天下者莫尚乎崇淡泊子惠困窮遵道以端本推誠而逮一作達下故聖祖之誡以慈儉為寶大易明訓垂簡易之文未有上約而下不豐欲寡而求不給朕以眇薄遭逄內難刷君父之仇耻攄億兆之哀寃有一作而股肱之大臣羣卿庶士引義抗請至于再三以圖宗社之安以答華夷之望俯從衆欲夙夜震兢思所以克已復禮修政安人宵興匪寧旰食勞慮夫儉過則酌之以禮文勝則矯之以質庶乎俗登太古道洽生靈儀刑邦家以化天下其在內宫女四字一作內庭宫人非職掌者宜放三千人其中願嫁及歸近親者並從所便不須尋問其長春宫總監及修造等並依今月十三日敕處分其長春宫見在錢及斗斛絲綿席草等約二十九萬七千五百三十餘貫石兩領束等依前户部收管鄠縣漢坡鳳翔駱谷地等并宜却還府縣其教坊樂人翰林待詔醫一作役術官并總監諸色職掌中冗員者共一千二百七十人並宜停廢其總監中一百二十四人先屬諸軍並宜各歸本司餘七百三人勒納牒身放歸本貫先供教坊衣糧一百分廂家及諸司新加衣糧三千分並宜停給應緣田獵鷹鷂獸犬等並宜解放除五坊加配諸鷹鷂等及長慶已來每年常進外宣索者自今已後一切停進其須備搜狩要量留者宜準憲宗朝故事其今年新宣附食度支衣糧小兒一百人並宜停罷應副别詔宣索纂組雕鏤不在常貢者一切並停度支鹽鐵户部及州府百姓應供宫禁年支一物已上並準貞元中額為定度支檢勘具元和以來加配合停色數二十日內分析聞奏并散下州府供司各令知悉先造供禁中床榻以金筐瑟瑟雜寶鈿真珠碼瑙裝飾宜停造東頭御馬坊毬場宜却還左龍武軍其殿及亭子令所司毁拆收掠餘舍並賜龍武軍收管應行從處張設不得用花蠟結綵華飾今年已來諸道所進音聲女兒一作人各賜匹一作束帛放歸應城外墳墓先開斸道路以備行幸處宜令兩軍及府縣曉示百姓任其修塞其大逆魁首蘇佐明王加憲石定寬閻惟直及因凶賊姦計遂與同謀人劉克明田務澄許文端等汙瀦無赦梟獍與倫各已處斬並籍沒祅一作妖妄人僧惟真正簡道士趙歸真楊沖虛方士李元戢等並咸假託以醫方疑衆挾姦十一字或作假如卜筮或托以醫方疑衆扶邪矯誣干禁並從流竄以清京師其情非姦謀一作惡迹涉詿誤者自今已後一切不問凶徒既殄寰宇佇康載舉令猷用𢎞庶慎一作績於戲昔漢文惜十家之産而天下乂我太宗文皇帝勤四海之理而帝業昌暨于列聖罔不承式而嵗代滋久訛弊以生仍委艱故未遑改作朕祗荷神器重臻大寧將至躬以立訓奚取新而革故咨爾百辟卿士外服侯衛其諭朕志永堅乃心無逞欲而敗度自底身于不類率是敬典用孚于休布告中外咸使知悉開成二年六月八日一作皆舊唐書文宗紀誅張韶德音編制詔令作韋處厚敕朕祗荷大搆屬當沖眇九廟之嚴因豫以輕重四海之大由我而慘舒每懷推誠不敢自用大布利澤嘉聞讜言庶無愆尤以享重負尚慮一作豈虞信不及物德不動天少一作以懷宴安遽此致寇逆賊張韶蘇玄明等驅率工徒劫擕白刃白晝竊發暴犯宫闈震驚朕躬近幸禁壘即勒五營騎士七萃熊羆少命偏師才分左廣皆憑忠奮發賈勇爭前自申及酉撲滅皆盡斯實上玄降監宗社垂休愍豫沖人俾無顛覆其兩軍立功將士已節給優賞諸將校是一作其日部領軍士者委有司即條流甄奬具名聞奏其逆賊親屬除同居知情之外一切不得輒更追擾尚慮一作恐因緣仇隙告訐平人自今日已後縱為祅一作有小妖黨所一作有小詿誤者一切許其自新更不須勘問於戲秦皇車碎於博浪漢高心動於柏人或不悟而終亡或自新而流祚齊晉多難以啓國衛邢無難而喪邦蓋緣一作謂憂勤則福興安肆則禍稔天其意者警於豫乎而今而後知玄貺可以德歸神器難乎力恃咨爾股肱輔臣庶僚百辟洎方郡侯伯有位之士無或棄吾一作豫謂不可教其有違道傷理徇欲懷安面刺廷攻無有隱諱成王之紹文統武帝之開高業皆􅊩祚日永一作日久享國嵗深夫豈他哉蓋大臣維之而不跌也使朕無羞於二主者繄爾多士乎布告天下咸使聞知長慶四年四月三日一作皆唐大詔令唐書通鑑並作四月丙申誅張韶蓋十七日也英華作三日未詳文苑英華卷四百三十九
