body:
  text: 文苑英華巻九十宋李昉等編人事一影賦一首罔兩賦五首響賦一首聲賦一首大音希聲賦一首影賦謝偃何物類之實繁各異形而辨色惟兹影之靈化獨𤣥妍而莫測若乃體無定質應變随方因物成象不拘厥常苟圭表之有度信天地之可量同寒暑之延促故夏短而冬長在清明而必朗若晦濁而斯亡同至人之隱顯類君子之行藏若夫長短侔形曲直應質細故則一毫必具大物則萬象無失竝片魚而為比偶孤鳥而成匹帯秋林而蹔踈含春樹而還密將度雲而俱逺與奔駟而同疾至如景霽氛收波清風止平湖數百澄江千里有象必圗無物不擬羣木懸植叢山倒峙岸底天廻浪中霞起咸巨細其若一各委曲而相似窺之者莫測其淺深尋之者罔知其終始苟煙霞之可乗何神丹之足錬流金液以命酌指玉京而髙瞑一作宴含虚無以成體故日中而不見同希夷以寂寞何罔兩之能眩若夫來徃絶跡出入無間走不可避速不可捐非可以智察難可以理詮向夜月而處後背朝日而居前何變化之無定同瞻之而忽焉安仁覧以生悲士龍觀而興笑孫惠顧以致悚田巴臨而獨照想古人之遺烈一作形哀吾生之不劭守愚直以固窮無明畧以求効嵗月忽其代序斑鬢倐而改貌誠既徃而莫追徒鑒流以自吊若夫色動秋水光澄練一作錬金翠羽朝映珠星夜臨近㸔若淺逺瞩如深信不入而疑入實非沈而似沈既寄形於流艶又匿跡於凝隂類聖人之無巳以萬物而為心福應善而斯臻禍縁愆而必至念全徳以守一思改過而無二寧受屈以懐道不求伸以邀利庻履危以自朂終餘年而不墜苟刑網之所加雖在親而無肆誠言行之可録縱居嫌而勿棄必取捨而無私故捫心而不愧獨水鏡之鍳物窮妍媸而莫祕誠斯道之可寳請貽戒乎在位罔兩賦以道徳希夷仁美為韻李澥夫物有形而必累影随形以相保窮希㣲而歸真信罔兩之合道豈其取捨焉得醜好諒不由其運行實禀之於𤣥造原夫不皦不昧無失無得寧在陽而必遷曷處隂而自黙罔言成象合莊叟之深衷一作哀責影辨疑異田一作欒巴之見惑豈徒飾詞比事所以尊道貴徳增於物或有知其長短察於人孰可分其白黒摶之則㣲聽之則希將去彼而取此由虚徃而實歸明引喻混是非用之於身豈疾走可息行之於國則至道之肥方來莫逆故徃無思吾有影而何患吾有色而可遺同焉皆得沒而不衰尋邉鄙契之於罔象鑄扄鐍合之於希夷夫焉一作然則豈止持莊子何其無特操與釋文特或作持李善五臣注幽通賦並引莊子作持操自保納虚為隣復歸無物更何有云匪勞逸之足眩曷行藏之是親任皇人之化迹通天地之不仁况我國家道周寥廓徳及純粹撝偽歸真絶聖棄智漢隂抱甕而匿影赤水遺珠而有愧罔兩難明慌惚無累徒以知人藏化見徳思義儻㣲隂之所及幸餘光兮不我祕第二同前韻石鎮粤若窮理盡性在宗載考觀窮𤣥元訏謨天造憫鷦鷯之為得處一枝而屬厭詞罔兩而格言詳萬籟於至道道之為體也無思無慮惟静惟黙黄帝得之而升于雲天維斗得之而運于辰極下空同之路理必諧於襄野登隐坌之丘巳注二十九巻羣玉山賦義無虧於建徳爾其問影責實稽謀惟㣲審行止之常分固怨菑而用希隂與夜兮吾所隱火與日兮吾所依若有待而持操誠不恊於天機且夫歩日者足憐蚿者䕫雖鳬鵠莊子注鵠又作鶴並胡各切而異禀將斷續而則悲苟安時以處順惟我心之則夷如莫邪之或躍必歐冶之見遺客有感之而歎曰大塊勞我聖人不仁天地無私於覆載隂陽脗合於陶鈞動之則矯𡨕之則親汎然無跡瞠然絶塵時既來而不再物亦煦而知春夫如是則何患無位不作守道安貧而巳哉於是罔兩卑陬改容逡廵徐避養澹泊懐簡易鄙白龍之遇制嗤文豹之有累寓百骸於神理休四海之光被在埏埴於洪鑪得修身之明義第三同前韻蔣至揖傲吏以逍遥啓真經於探討則知辨彫萬物富有三寳假影外之㣲隂喻域中之大道惟彼罔兩同夫紏纆邈矣難名混兮不測離婁目眩而方見桑𢎞心計而寧識其出也與影俱遊其入也與隂相息乃謂影曰子於我兮何力我於子兮何徳將詰之於心請對之於臆殊途兮同歸孰是兮孰非進豈得苟退殊所希繫我有待俾爾相依在波瀾而比目升雲漢而聮飛胡乃折責其持操而欲論乎等威者哉且夫出入随日行藏任時儀刑長短取象毫釐雖曩華而今槁豈變態而殊姿語黙無滯類達人之舒巻視聼無及符至道之希夷原夫以隂託影以影輔人行則無跡居必同塵不樂葆太寧悲賤貧茹藜被褐非所恥腰金鳴玉非所珍誰泣楊朱之路誰迷宣父之津誠滑疑於至理不夭閼於天真未見仁字官韻則知於物有慿處身如寄和光逺害是其道先人後已是其義鑒之者雖臨水而罕窺畏之者將奔走而奚避欲明有象之無象有媿知音之意第四同前韻包佶罔兩謂形豈伊天造試一商㩁此焉探討謂之小入乎無間謂之大逹於蒼昊雖則名參於異物抑亦理齊於至道今將議其㫖窮其色為一作無湼而不緇為繫而不食或託之於鱗介或生之於羽翼謂子有囬日之役謂子有戴山之力向若執盈似虚大白若黑黽黽有難名之稱乗乗有可尚之徳苟不然者人將奚則彼逐者影動毎相依既不可逼又不可違凌青㝠而對舉投汗漫而雙飛鑒秋葉而逾静臨夕陽而蹔㣲彼何事而相託此何心而所希罔兩曰我形子影我應子追我慿子之狀子假我之威寧論立兮與坐夫何操而不持似都捐於視聽宛𡨕合於希夷未識形為影之主影亦形之賔詎可貴之於動息又何怒之於因循使惡跡者止其足厭影者䕃其身子之意兮焉適唯此求而得仁更憶班固麗藻漆園清眞述幽通於前烈繼逍遥於後塵沈吟染翰顧慕書紳於是稽乎古陳乎義常未得其一端固多慙於明試第五同前韻孫鎣南華真人立𤣥古恣探討折罔兩之喻明希夷之道將欲侔三光之懸為百代之寳其始也若乃天清氣明長雲如掃呈纎㣲之虚質揚太陽之杲杲莫不以影為典以形為則動靜委任濃纎合徳欣禦㓂之輕盈耻夀陵之匍匐遇夫明也有似夫亨通遇夫隂也何異於否塞罔兩責於影曰子實傷躁吾之甚㣲謂為無也雖㣲而必有謂為有也雖可名曰希吾將捨子而去子復何所歸影乃假詞而諭曰夫鴻鈞造物其道大夷至精者不思而𤣥得懵昏者役慮而不知則吾之與爾皆形之隂也焉得以自頥亦何以舎天地之大徳承日月之無私幸文明之宣照故纎毫而不遺罔兩於是欣然而應曰此乃邇其身居其神靜躁匪肅吉凶由人雖讒搆不能以相間安繩墨之竟爾相因繄疑作懿夫行高道潔煦然慈仁規行矩歩和光同塵志存禮義上奉君親是以吾以與爾俱得其真無終食之見捨罔疑作同不孤之有隣豈比夫共體嚚頑本枝險詖隨誇競以馳騁靡道徳之浸漬務呫囁之委曲疲趦趄之巧偽騰浮薄而為名竟顛蹶以俱累豈與盛明之光燭希薦能而比義響賦以庭下雲晩響輕為韻張彦振伊二儀之陶蒸一作甄覽萬物之生長為隨方而可見獨不測乎兹響同大道之無質每慿虚而起象既不覩其洪纎亦罕知其尺丈爾乃依聲以發有待而生觸萬竅而皆異㑹五音而共成隨人心之哀樂因感召而重輕至於驚激萬變髙卑千轉臨牝谷而悲多因歸風而去逺感華鐘於霜曙思孤鴈於秋晩觸物類以成態託空虚以運形爾其細也草蟲鳴於潛穴至其大也震雷作於天庭離朱拭目而不見師曠清耳而可聽爾其響發乎噐必聲有假故噐有盈虚而響為髙下隨之則或一作不可究及之如或可寫信造化之自然亦焉知其為者乃有厭處雞羣窮栖海濵垂六翮而未舉鳴九臯而不聞願託響於星驥希可徹於髙雲聲賦張德昇夫禮樂相成人之有生物歸乎理感在乎聲聲之所起其應多矣既聞鄭以戒荒亦稱韶於盡美至若詩陳鐘皷禮奏笙篁疑作簧音懐律吕韻合宫商或婵姢而如絶或窈窕而復揚將曲盡而逾妙遇風吹而更長潛鱗競躍儀鳯来翔嘉此聲之可貴樂吾君之奉常則有思婦傷離芳年屢換織素寒早調砧夜半垤鳴鸛而初合砌吟蛩而正亂何此聲之可悲使空閨之浩歎况復金徽逺奏一作金㣲逺戌玉律窮秋隂風烈烈邊樹脩脩聽胡笳之互動看隴水之分流何此聲之可怨使征客之含愁亦有遁世無悶閒居栖託坐嘯竹林忘形菌一作苔閣隣宿鳥之喧藪愛飛泉而噴壑何此聲之獨殊使幽人之為樂夫意存則言發言發則聲來順之則喜逆之則哀是以文君聽琴而恱矣子期聞笛而悲哉何悲歎之易感使衆人之難裁客有吟者澘然下淚吾將不言安知所謂退失路而流落進無媒而自致思巫峽之猿啼聞洞庭之葉墜易曰同聲相應同氣相求儻知音之見許期厚徳而相酬大音希聲賦以希則能大物理之常為韻楊發聲本無形感物而㑹生彼寂寞歸乎静泰含藏於金石之中緘黙於肺腸之外喻春雷之不震時至則興比洪鐘之未撞扣之斯大静勝允合於人心𤣥同逺符於天籟大道冲漠至音希㣲叩於寂而音逺求於躁而道違三年之鳥不鳴驚人可異五絃之琴載絶知音盖希人生而静物本無機脩於誠而上下交應臻其極而禽獸咸歸遐想古風𬗟窮太始以彼聲音之道嫓夫動静之理方歌擊壌堯人式貴於心和未夣鈞天趙簡尚勞於傾耳鼔能興雨鐘亦候霜沖用可齊於道性善應方契於天常興公之賦欲成已含金韻夫子之宫未壊猶閟樂章無象無名不知不識守此虚淡終乎妙極豈逐物而感通諒與少疑而消息損之而益潜運將契於天功聽之不聞𤣥化極符於常則幽𤣥之旨足以明徴海内於焉而自正天下無得以爭能由是廣可喻於人細可齊於物聲希者其響必大聲煩者其理斯屈常呼萬嵗維嶽有時而降神將異三人㸃爾無心於鼔瑟理歸若訥事契寡詞既不言以足教必於聲而可遺存而不論馳神於六合之外語不如黙鉗口於三緘之時是各從其類也吾將一以貫之文苑英華巻九十
