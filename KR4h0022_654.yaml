body:
  text: 文苑英華巻六百五十五宋李昉等編謝賜賚謝趙王賚絲布等啟一首謝趙王賚絲布啟二首謝趙王賚白羅袍袴啟一首謝滕王賚巾啟一首謝明皇帝賜絲布等啟一首謝趙王賚犀帶啟一首謝趙王賚米啟一首謝趙王賚乾魚啟一首謝滕王賚馬啟一首謝滕王賚豬啟一首謝滕王賚馬并繖啟一首謝所知賚集賢墨啟一首謝衣段啟一首謝賜錢啟一首雜謝謝李相公示手札啟一首謝李中丞安存崔簡家屬啟一首謝門下武相公啟一首謝中書張相公啟一首謝僕射李相公啟一首謝裴相公啟一首謝竇相公啟一首謝宰相啟一首謝草詞啟一首謝江陵借宅啟一首謝江陵津致赴闕啟一首謝賜賚謝趙王賚絲布等啟庾信某啟鄭叡至䝉賜絲布綾等十段王褒至又䝉許賜錢等望外之恩實符大賚非常之錫乃溢生涯曵練且觀無勞白馬之望流泉欲委佇見青鳬之飛楊池掘荷李園移樹既欣谷利彌思青木一作林陳留下粟有媿深恩櫟陽雨金翻慚曲施靈臺乆客從此數炊黍谷長寒於今更暖從雲夣之田不踰此樂得豐城之劒未均斯喜謹啟謝趙王賚絲布啟庾信某啟奉教垂賚雜色絲布三十段去冬凝閉今春嚴勁霰似瓊田凌如鹽浦張超之壁未足鄣風袁安之門無人開雪覆鳥毛而不暖燃獸炭而逾寒逺降聖慈曲垂矜賑論其蠶月殆罄桑車津實一作費秉杼幾空織室遂令新市數錢忽疑販綵平陵月夜驚聞𢷬衣妾遇新縑自然心伏妻聞裂帛方當含笑莊周車轍實有涸魚信陵鞭前元非窮鳥仰䝉經濟伏荷深慈謹啟二某啟某息荀娘昨䝉恩引曲賜絲布等五段南冠獲宥既預禮延稚子勝衣還䝉拜謁關尹津梁之織鄴地雙絲扶風彩文之機仙園獨蠒青衿宜襲書生無廢學之詩春服既成童子得雩沂之舞况復栖烏挟子同知桂樹之恩澤雉將雛共喜行春之令根株一潤枝葉俱榮謹啟謝趙王賚白一作皂羅袍袴啟某啟垂賚白羅袍袴一具程據上表空論雉頭王恭入雪虚稱鶴氅未有懸機巧綜一作緤變躡竒文鳳不去而恒飛花雖寒而不落披千金之暫暖棄百結之長寒永無黄葛之嗟方見青綾之重對天山之積雪尚得開襟冒廣樂一作厦之長風猶當揮汗白龜報主終自無期黄雀謝恩竟知何日一作皆藝文類聚謝滕王賚巾啟某啟奉教垂賜鹿子巾一枚解角新胎戴藤初孕落星交映連珠踈㸃盤龍之刀既剪長命之縷仍縫翠羽懸推芙蓉髙讓逰斯隠士足笑穀皮入彼春林方誇笋籜某蓬鬢鬆颯衰容耆朽三秋不沐實荷今恩十年一冠彌欣此賚謹啟謝明皇帝賜絲布等啟臣某啟奉勑垂賜雜色絲布綿絹等三十叚銀錢二百文某比年以来殊有闕乏白社之内拂草看氷靈臺之中吹塵視甑懟妻狠妾既嗟且憎瘠子羸孫虚恭實怨王人忽降大賚先臨天帝賜年無踰此樂仙童贈藥未均斯喜張袖而舞𤣥鶴欲来撫節而歌行雲幾斷所謂舟檝無岸海若為之反風薺麥將枯山靈為之出雨况復全抽素蠒雪坂疑傾併落青鳬銀山或動是知青牛道士更延將盡之命白鹿真人能生已枯之骨雖復㧞山超海負徳未勝垂露懸針書恩不盡蓬莱謝恩之雀白玉四環漢水報徳之虵明珠一寸某之觀此寧無愧心直以物受其生於天不謝謹啟謝趙王賚犀帶等啟某啟奉教垂賚犀裝帶錢十貫魏君寶帶特賜劉楨趙王國租偏資裴楷貫藏文馬如燒安息之銀帶插通犀似獵雲南之獸北郭騷之長貧是所甘惬南宫敬之載寳殊非念望花開四照唯見其榮鼇戴三山深知其重昔沈羲將盡逢司命而還生三國志注童子謂杜畿司命使我召子畿固請童子謂求代者沈羲未詳士燮行埋集作終值仙人而更活今日慈矜斯之謂矣馬前驅而導路或似識恩鷄未曉而開闗容能報主謹啟謝趙王賚米啟前人見藝文類聚某啟奉教垂賚米十石丹烏銜穟既集西周黄雀隨車還飛東市漬而為種不無霜雪之精取以論兵即有山川之勢某陋巷簞瓢櫛風沐雨剥榆皮於秋塞掘蟄鷰於寒山仰費國租遂開塵甑非丹竈而流珠異荆臺而炊一作碎玉東方朔之捧米既息長饑西門豹之墾田方慙此賚謝趙王賚乾魚啟某啟䝉賚乾魚十畨醴水朝浮光疑朱鼈文鰩夜觸翼似青鸞況復洞庭鮮鮒温湖美鯽波瀾成雨鱗甲防寒某本吳人常想江湖之味及其饑也唯資藜藿之餘慈賚渥恩膏腴流竈不勞獅子之亭即勝雷池之長翻驚河伯獨不受人足笑任公終年垂釣謹啟謝滕王賚馬啟前人見藝文類聚某啟奉教垂賚烏騮馬一匹栁谷末開翻逢紫鷰陵源猶逺忽見桃花流電争光浮雲連影張敞畫眉之暇直走章臺王濟飲酒之歡長驅金埒謹啟謝滕王賚猪啟某啟奉教垂賚肥豕一腔白腹見珍度遼東之水赤欄為重對襄陽之城忽降全恩謹充炮烙孫𢎞牧於淄水唯以求錢卜式養於上林豈知其味謹啟謝趙王賚馬并繖啟某啟奉教垂賚紫騮馬并銀釘乗具紫紬繖一張上天降雨特垂深澤若木流光偏䝉私照廻兹翠蓋事重劉基之恩降此青驪榮深李忠之賜北部丹帷便須髙捲西河竹馬即已郊迎在命之輕鴻毛浮於弱水知恩之重龜一作鼇背負於靈山况復驚鴻别水但見徘徊黄鶴去關唯知反顧棲戀之心事同於此謝所知賚集賢墨啟温庭筠某啟即日門幹至奉披榮示垂賚集賢墨一挺竹山竒製上蔡輕煙色掩緇帷香含漆簡雅復三臺故物貴重相傳五兩新膠乾輕入用猶怨於潜曠逺建業尫羸韋曜名方即求鷄木傅𤣥佳致别染龜名恩加於蘭署郎官禮備於松櫺介婦汲妻衡弟所未窺觀廣記漢儀何嘗著列况又𤣥洲上苑青瑣西垣讎字猶新疑籖尚整帳中女史每襲清香架上仙人常持縹帙得於華近辱在庸虚豈知夜鶴頻驚殊慙志業秋蛇屢綰不稱精研唯憂海物虚投蠟槃空設晉陵雖壞正握銅兵王詔徒深唯磨玉硯捧受榮佩不任下情謝衣段啟張𤣥晏某啟某伏奉手誨伏䝉相公十九兄特以某初叨宸奬賜及衣服段等捧戴尊念感激伏深况鶴紋價重龜甲様新纎華不讓於齊紈輕楚能均於魯縞掩新蒲之秀色奪寒兎之秋毫莫稱頑姿難勝縟㫖倍切肝一作肺腸之感永為禓襲之榮謹啟謝賜錢啟胡曽曽啟曾業謝懸頭道非刺股未能入洛安可下遼空懐逐鹿之心莫遇斬蛇之世囚拘翰墨困厄塵泥虚費宣毫枉銷蜀縹不救鋤蘭之禍詎禳伐樹之災自歎龍鍾誰知牛鐸又以山東藩鎮江表節亷悉用䜿儒皆除迂吏胷襟齷齪情志荒唐入則粉黛遶身出則歌鍾盈耳但自誅求白璧安能分减黄金雖設朱門何殊亡國徒開玉帳無異荒墟遂使寗戚無扣角之歌鄒陽乏曵𥚑之地伏惟相公英風獨振偉量孤標推葛亮之秤心負姜維之斗膽内安宗廟外却蠻夷魚水賢良塤箎骨肉桃李滿於衢路金帛遍於風塵六合之中一人而已是以昨者不度庸陋輒有干祈方虞按劍之勃然敢望夣刀之莞爾俄頒清俸遽恤白衣朝乏半千夕盈五萬豈期庸蹇忽忝遭逢不是孟嘗詎聽馮諼之鋏若非趙勝那知毛遂之錐遇既重於西河知亦深於北海感恩泣處未成泉客之珠撫已哭時空抱荆山之玉限以程逺陳謝末由感激生成不任死所雜謝謝李相公示手札啟吉甫栁宗元某啟六月二十九日衡州刺史吕温道過永州辱示相公手札省録狂瞽收撫覊縲沐以含𢎞英華作洪避諱之仁忘其進越之罪感深益懼喜極增悲五情交戰不知所措宗元質性庸塞行能無取著書每成於廢疾進徳且乏其馨香常願操篲醫門掬溜蘭室良辰不與夙志多違昨者踴躍殘魂奮揚蓄念激以死灰之氣陳其敝箒之詞致之煙霄分絶流盼今則垂露在手清風入懐華衮濫褒於赭衣龍門俯收於塪井藻鏡洞開而秋毫在照文律傍暢而寒谷生輝化幽欝之志若覿清明换兢危之心如承撫薦非常之幸豈獨此生伏以淮海劇九天之遥瀟湘恭百越之俗傾心積念長懸星漢之上流形委骨永㵸魑魅之羣何以報恩唯當結草無任喜懼感戀之至謹啟謝李中丞安存集作撫崔簡家集作戚屬啟前人某啟伏見四月六日勅刺史崔簡以前任贓罪决一百長流驩州伏奉去月二十三日牒崔簡家口牒州安存并借官宅什器差人與驅使者伏惟中丞以清直去敗政以惻隠撫窮人罪跡暴著則按之以至公家屬流離則施之以大恵各由其道咸適於中威懐並行仁義齊立繩愆糾繆列郡肅澄清之風匡困資無闔境知噢咻之徳凡在廵屬慶懼交深伏見崔簡兒女十人皆栁氏之出簡之所犯首末知之蓋以風毒所攻集作加漸成狂易不知畏法坐自抵刑名為贓賄卒無儲蓄得罪之日百口嗸然呌號羸頓不知所赴儻非至仁厚徳深加憫恤則流散轉死期在須㬰某幸被縲囚乆沐恩造至於骨肉又荷哀矜循念始終感懼無地謹勒祗承人沈澹奉啟陳謝下情輕瀆謝門下武相公啟劉禹錫某啟某一坐飛語廢錮十年昨䝉徴還重罹不幸詔命始下周章失圗吞聲咋舌顯白無路豈謂烏鳥㣲志惻于深仁恤然動拯溺之懐煦然存道舊之㫖言念觳觫慰安蒼黄推以恕心期於造膝重言一發睿聽克從廻陽曜於肅殺之辰沃天波於蹭蹬之際俾移善地獲奉安輿率土知孝治之源羣生識人倫之厚感召和氣發揚皇風豈唯匹夫獨受其賜某即以今月十一日到州上訖守在要荒拘於印綬巾韝詣謝有志莫從誠知集作如㣲生不足酬徳捐軀之外無地寄言効節肅屏䖍然心禱無任懇悃屏營之至謹勒軍事衙官守左威衛慈州吉昌府别將員外置同正員常懇謝中書張相公啟某啟某智乏周身動必招侮一坐飛語如衝駭機昨者詔書始下驚懼失次呌閽無路擠壑是虞草木賤軀誠不足惜烏鳥㣲志實有可哀伏䝉聖慈遽寢前命移蒞善部載形綸言凡在人臣皆感至徳凡為人子同荷至仁豈唯鯫生獨受其賜伏以相公心符上徳道冠如仁一夫不獲慼見於色宻啟一作㫖未下歎形于言竟廻三舎之光能㧞九泉之厄袁公之平楚獄不忍錮人晏子之哀越石仍伸知己所以慶垂𦙍祚言成春秋神理孔昭報應斯必身侔蟬翼何以受恩死輕鴻毛固得其所卑守有限拜謝末由無任感激兢惶之至謝僕射李相公啟某啟州吏還伏䝉擺落常態手筆具書言及貞元中登朝人逮今無十輩又集作及發中書相公一函具道閤下亟言曩逰顔間集作顧問頗有哀色夫溝中之木與犧象同體追琢不至則坐成枯薪朱而藍之猶足為器茍液樠見莊子集作滿非曲戾不足枉斧斤願為庭燎以照嘉客謹啟謝裴相公啟某啟某遭罹不幸嵗將二紀雖累更符竹而未出網羅親知見憐或有論薦如䧟還濘動而愈沉甘心終否無路自奮豈意天未勦絶仁人持衡紆神慮於多方起堙淪於乆廢居剥極之際一陽復生出坎深之中平路資始通籍即位分曹樂都喬木展舊國之思行雲有故山之戀姻族相賀壺觴盈門官無責詞始自今日禽魚之志誓以死生草木之年惜其晼晩章程有守拜謝無由瞻望巖廊䖍然心禱謹啟謝竇相公啟某啟某一辭朝列二十三年雖轉郡符未離謫籍卑濕生疾衰遲鮮歡望故國而未歸如痿人之念起昨䝉罷免甘守丘園相公不棄舊逰特哀乆廢每奉華翰賜之衷言果䝉新恩重忝清貫薦延有漸拯㧞多方六律變幽谷之寒一丸銷彌年之疹鎩翮將舉危心獲安布武夷途自此而始分曹有繋拜謝無因瞻望徳藩坐馳精爽無任感激之至謹啟謝宰相啟張𤣥晏某啟某文愧靈虵質慙威鳳謬因鎔鑄遂竊顯榮粉署握蘭詎有堂堂之稱禁林視草全乖籍籍之名驟忝轉遷盡由擡舉伏䝉相公俯廻念録過賜褒稱尊誨下臨恩言俯被假金駿為駑駘之飾賤骨難勝引朱絃於燋朽之餘深恩有自謝草詞啟某啟昨日獲忝轉遷出於提奬伏知舎人次當視草曲賜褒稱裁成五色之紛綸啟導九霄之渥澤過勞江筆潤色一作特潤堯言指頑石為瑶瑾之流謂駑馬有驊騮之足揣循驚感倍切肺肝謝江陵借宅啟羅衮某啟伏以衮荒扉夙掩蓽路今飄雖曵𥚑果在於朱門而握髪何妨於白屋伏䝉令公奨以来能擇地去俟朝天恐馬援之災氛寧逃漏濕念揚雄之風雨須託帡幪特借華居俾安滯跡況復牀分上下器備圎方障錦飄紅則土皆被繡幕雲浮翠則木鮮呈材愛忽異於吾廬誤將同於君室遂得彌寛徯后更盡依劉宛如夫子之牆不在𨽻人之館揣循涯分抃戴恩光家雖䘮而狗已如歸闗欲度而雞不難學館開碣石略為鄒衍之身臺認章華永荷楚王之徳下情無任感遇激切之至伏惟俯賜鑒察謹啟謝江陵津致赴闕啟衮啟伏䝉令公念以赴闕奔馳臨途窘罄特頒厚賜用備促一作俶裝捧命循涯無任荷戴惶灼之至伏以衮拙艱成性窮約處身寧殊枕祉之郎謬列伏蒲之地昨以西京無象南國迷方蒼黄於河華之間流落於漢地之外荆州劉表幸獲依棲南郡馬融叨陪訓說爰從殺節以及熈春恩知將日月兼深恵䘏與邱陵比峻今則周傾再定禹㑹重脩既憑桓后之功且懼防風之戮輙將行計上軫沖襟伏惟令公韜世量𢎞濟人心侈組駢緡繦委彼貨泉七百里以趨程兹辰頓贍二十萬之為贈今代所稀得不泣類鮫人慙同劒客歸赤墀而有頼顧𤣥幙以難忘突劒觸鋒始稱効酬之分抽毫命牘終餘感慨之誠竟乏雄詞徒揚懦氣銘誓激切不任下情伏惟俯賜鑒察文苑英華巻六百五十五
