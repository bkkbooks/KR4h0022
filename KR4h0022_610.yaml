body:
  text: 文苑英華卷六百十一宋李昉等編進文章二進千秋金鏡録表一首進王維集表一首進寳應長寧樂表一首進元和聖徳詩表一首進撰平蔡州碑文表一首進平淮夷雅篇表一首代國子陸博士進集注春秋表一首代百寮進農書表一首為羽林李景畧將軍進射鴈歌表一首進撰江西韋大夫遺愛碑文表一首史館王相公進和詩表一首舉薦薦鮑㡬表一首薦顧協表一首為宇文戸部薦隠淪表一首自舉表一首責躬薦弟表一首為王戸部薦李諒表一首舉前池州刺史張嚴自代表一首進文章進千秋金鏡録表𤣥宗張九齡開元二十四年臣九齡言臣伏見千秋節日王公以下悉以金寳鏡進獻誠貴尚之尤也臣愚以為集作謂明鏡所以鑒形者也有妍􅑦則覩集作見之於外徃事所以鑒心者也有善惡則省之於内故黄帝鏡銘云以鏡自照見形容以人自照見吉㓙又古人云前事之不逺後事之元龜元龜亦猶鏡也伏惟開元神武皇帝陛下聖徳之至動與天合本已全於道體固不假於事鑒然天覆集作覆載廣大無所不包聖道冲虚有来皆應臣敢縁此義謹於生辰節上事鑒十章分為五卷名曰千秋金鏡録雖聞見褊淺所識集作擇不深至於區區効愚其庶乎萬一不勝悃欵之至謹言進王維集表代宗王縉附見王維集臣縉言中使王丞華奉宣進旨集作止應是王維文賦並仰録寫進上者十三字集作令臣進亡已故尚書右丞維文章恩命忽臨以驚以喜退因編録又竊感傷臣兄文詞立身行之餘力常持集作當官堅正秉操孤貞集作直縦居要劇不忘清浄集作静實見時輩許以髙流至於晚年彌加進道端坐虚室念兹無生乗興為文未曽廢筆集作未嘗廢業或散朋友之上或㽞篋笥之中臣近搜求尚慮零落詩筆共成十卷今且随表進上集作奉進曲承天鑒下訪遺文魂而有知荷寵光於幽穸沒而不朽成大名於聖朝臣不勝感戴悲歡之至謹奉表以聞臣縉誠惶誠懼集作恐頓首頓首謹言進寳應長寧樂表代宗張謂臣某言臣聞治定制禮功成作樂古先哲王不易之典伏惟寳應元聖文武皇帝陛下纉堯立極繼武承天神授五兵聖包七徳頃嵗自王邸登将壇衹奉廟謀龔行天罰卷舒龍豹指麾而復洽隂陽誅翦鯨鯢顧盼而並収河朔九鼎還重三光益明趙魏小康周秦大定伏見所部寄住客前梨園供奉官梁州克義府果毅劉日進新造寳應等凡十八曲其調合雅其聲用宫以歌盡言以舞盡意夫雅者三代之樂貴之則鄭衛不行宫者五音之名用之則角徴咸叙興亡理亂實繫於兹昔王令言聽安公子失宫聲知隋氏禍敗非久今臣見寳應樂用宫調知皇家運祚無疆故製造其詞發揮成曲庶登樂府上逹天朝謹附前梨園供奉官某進表以聞進元和聖徳詩表憲宗集以此表為元和聖徳詩序韓愈臣愈頓首再拜言曰臣伏見皇帝陛下即位以来誅流姦臣朝廷清明無有欺弊集作敝外斬楊恵琳劉闢以収夏蜀東定青徐積年之叛海内怖駭不敢違越郊天告廟神靈歡喜風雨明晦無不従順太平之期適當今日臣蒙被恩澤日與羣臣序立紫宸殿下親望穆穆之光况其職業又在以經籍教導國子誠宜率先作謌詩以稱述集作道盛徳不可以詞語淺薄不足以自効為觧輙依古作四言元和聖徳詩一篇凡千有二十四字指事實録具載明天子文武神聖以警動百姓耳目傳示無極謹冒昧塵獻無任惶悚之至集無此十一字進撰平蔡州集作淮西碑文表憲宗前人臣某言伏奉正月十四日勑牒已集作以収復淮西羣臣請刻石紀功明示天下為将来法式陛下推勞臣下允其志願使臣撰平淮西碑文者聞命震駭心識顛倒是非其所任為愧為恐經旬渉月不敢措手中謝竊惟自古聖神之君既立殊功異徳卓越之跡必有竒能博辯之士為時而生持簡操筆従而寫之各有品章條貫然後帝王之美巍巍煌煌一作穆穆充滿天地其載於書則堯舜二典夏之禹貢殷之盤庚周之五誥於詩則𤣥鳥長發歸美殷宗清廟臣工小大二雅周王是歌辭事相稱善并美具號以為經列之學宫置師弟子讀而講之從始至今莫敢指斥嚮使撰次不得其人文字曖昩雖有美實其誰觀之辭跡俱亡善惡惟一然則兹事至大不可輕以屬人伏以唐至陛下再登太平剗刮群姦灑掃疆土天之所覆莫不賔順然而淮西之功尤為俊偉碑石所刻動流億年必得作者然後可盡能事今詞學之英所在成蜀本作森浙本作麻列儒宗文師磊落相望外之則宰相公卿郎官博士内之則翰林禁宻㳺談侍従之臣不可一一遽數召而使之無有不可至於臣者自知最為淺陋顧貪恩侍集作待趨以就事叢雜乖戾律吕失次乾坤之容日月之光知其不可繪畫强顔為之以塞詔㫖罪當誅死其碑文今已撰成随表謹録封進無任慙惶怖懼集作慙羞戰怖之至進平淮夷雅篇表憲宗栁宗元臣宗元言臣負罪竄伏違尚書箋奏十有四年聖恩寛宥命守遐壤懐印曵紱有社有人臣宗元誠感誠荷頓首頓首伏惟睿聖文武皇帝陛下天造神斷克清大憝金皷一動萬方畢臣太平之功中興之徳推校千古無所與讓臣伏自忖度有方剛之力不得備戎行致死命況今已無事思報國恩獨惟文章伏見周宣王時稱中興其道彰大於後罕及然徴於詩大小雅其選徒出狩則車攻吉日命官分土則崧髙韓奕蒸人南征北伐則六月采芑平淮夷則江漢常武鏗鍧炳耀盪人耳目故宣王之形容與其輔佐由今望之若神人然此無他以雅故也臣伏見陛下自即位已集作以来平夏州夷劔南取江東定河北今又發自天衷克翦淮右而大雅不作臣誠不佞然不勝憤踊集作懣伏以朝多文臣不敢盡專數事謹撰平淮夷雅二篇雖不及尹吉甫邵穆公等庶施諸後代有以佐唐之光明謹昩死再拜以獻無任兢懼之至臣某誠惶誠懼死罪死罪謹言代國子陸博士進集注春秋表憲宗吕温臣某言臣聞惟睿作聖觀乎人文逹則化成窮則垂訓先師所以祖述堯舜志在春秋懸衡百王撥亂三季正大當集作冠之本清至公之源通羣方以誠貞天下於一動無不順道徳之要集作𤣥機斷無不齊帝王之利器而梁木既壊生知盖寡三傳得失索隠未周羣儒異同致逺皆泥沒微言於滋蔓亡要旨於多岐奥室不開漫逾千祀天其或者将有俟焉伏惟陛下徳合乾坤明並日月氣和物茂逺至邇安欲以人情為田講學而耨鎮定皇極耀集作輝光時雍道之将行實在今日臣不揣蒙陋斐然有志思窺聖奥仰奉文明以故潤州丹陽縣主簿臣啖助為嚴師以故洋州刺史臣趙匡為益友考左氏之疎宻辨公穀之善否務去異端用明本意助或未盡敢讓當仁匡有可行亦刈其楚輙集注春秋經文勒成十卷上下千載研覃三紀𤣥首雖白濁河已清微臣何幸與道偕集作相遇竊以徳之匪隣骨肉無應道茍訢合英華作道之茍合非古今相知然則堯舜之心非宣尼不見宣尼之志非陛下不行庶因儀鳯之辰永洗獲麟之恨臣官沗國學思非出位以集作道為家寳罪實欺天謹昩死寫前件書詣東上閣門奉進伏候聖旨輕黷宸嚴魂爽飛越無任代百寮進農書表憲宗前人臣某等言臣等伏准故事每年二月一日以農務方興令百寮具則天大聖皇后所刪定兆人本業記奉進者中謝臣聞不愛牲玉祈榖于圓丘可以致誠未足以勸農集作為躬秉耒耜籍田於集作于千畝可以示勸未足以教人必也殷天地之和順隂陽之理利其器用精厥法式行集作變之而不倦動之而不勞四海靡而風行百姓迷其日用𢎞我政本實惟農書伏惟睿聖文武皇帝陛下徳茂生成道光慈儉捐金而寳榖菲食而粒民考堯典以授時稽禹貢而任土潔粢盛而大事在祀銷劍㦸而盡力為農豐年屢薦於郊歌嘉瑞繼書集作光於國史而不自滿假惟懐永圖每至獻嵗載陽仲春初吉俯察土膏之候仰觀晨正之祥經始嵗功導揚生徳徴有司之舊典奉先后之遺丈深居穆清親覽奥妙匪崇朝而盡更田畆不出戸而遍洽人情見捽草坏土之艱知寒耕熱耨之苦宸心感念甽畆昭蘇一歎而時雨先飛三復而春雷自起臣等業慙學稼祿過代耕親承務本之風日奉在勤之訓三時不害觀玉燭於氤氲九扈孔脩賀生靈於富庶謹繕寫前件書凡二十篇共成三卷謹詣東上閣門奉表陳獻以聞為羽林李景略将軍進射鴈歌表令狐楚臣某言伏惟皇帝陛下某月日臨御某殿射飛鴈一隻應弦而落歡動宫闈武暢環衛中謝臣家世為将揚聲朔野弧矢之事少嘗習焉每張侯為鵠注鏃而釋期於必中十不一二今則禽飛於青冥之際箭發于倐忽之間一聲劈雲雙翼墜地此皆神授審固靈扶端直以成陛下神武之威也臣才質無取蒙恩深厚脫劍免胄之餘輙思撰射鴈歌一章随此上獻誠不敢繼抗墜列風雅姑以抒下情宣上徳附於大武之末而登歌焉無任歡忭怔營之至進撰江西韋大夫遺愛碑文表宣宗杜牧臣某言奉某月日勅牒令撰故江西觀察使韋丹遺愛碑文臣官卑人微素無文學恩生望外事出非常承命震驚以榮為懼伏以洪為州府逾於千載集作年言念疲羸常患英華作為非水火風俗如此改革無因韋丹愛朝廷分憂為百姓去弊不踐舊跡特建宏謀凡三年苦心去千嵗大患兼之灌溉種蒔豐其衣食渤海潁川之理邵父杜母之恩校之於丹未足為比伏惟皇帝陛下陟降順帝施設如神納諫若轉丸去惡如反掌是以兵刑措寢年榖豐登而猶念切疲人及於循吏緬韋丹所集作已効之績慰江西去思之心特與彰揚創為碑紀是宜使内署學士西掖詞臣振發雄文流傳後代至於臣者最為鄙蕪集作陋明命忽臨牢讓無路俯仰慙懼神魂驚飛臣不敢深引古文廣徴樸學但首叙元和中興得人之盛次述韋丹在任為理之切事必直書詞無華飾所冀通衢一建百姓皆觀事事一作勣彰明人人曉㑹但率誠樸不近文章受曲被之恩私如生羽翼報非次之㧞擢宜裂肝腸無任感激懇悃血誠之至其碑文本謹随状封進以聞史館王相公進和詩表錢珝臣某言臣聞在心為志發言為詩志通而若啓源流詩作而自合律吕伏惟陛下道惟恭黙禀在文思永圖欲漸於無為睿覽且明於多暇因臨丹壑遂躡金䋲喜物象之澄清假詠歌而放曠聲傳天籟韻合霜鐘篇殊黄竹之名辭掩白雲之美臣等逄時竊位敢並韋平應詔屬詞文非顔謝徒偶昭融之運獲聞雅正之音傾聽不知愧延陵之季子試吹必濫比南郭之先生但思叅列輔臣安得首違聖㫖輙同擊壤仰和貫珠誠懐鄭衛之慙但感宫啇之說星辰自轉難叅旭日之光鼙皷空鳴莫續春雷之響其奉和御製五言七言詩二首謹録進上塵凟聖鑒臣無任循省惶越之至舉薦薦鮑㡬梁書作機下同表梁元帝臣某言臣聞思皇多士仄陋所以明敭疇咨熈載髦俊所以並作斯固殷殿初基拾龍淵之寳虞祠始構獻鳯管之玉旌蒲出魯賁帛歸齊頌聲既興盛業斯在伏惟陛下則天緯地乗正馭才沙汰八風澄明六合叶龜登夢之客日賁於丘園韋轂投釣之臣相望於魏闕故已物無遺寳矣振鷺有充庭之謳白駒罕空谷之詠洋洋濟濟無得而稱者焉臣誠一作識愧知才職非選舉竊以進賢上賞蔽賢顯戮敢縁斯義用舉所知伏見臣府中録事叅軍東海鮑幾年五十有七字景𤣥門庭雍睦立身貞退博渉文史頗閑刀筆忠公抗直出宰㢘平雅志𢎞深安貧専静觧巾入仕三十餘年自遊臣府一紀于兹前宰東邑實有二魯之風近處南臺欲尊兩鮑之則伏揆天嚴已當簡在脱蒙顯居良局登以清貫将齊毛玠古人之服實同吴隠酌水之㢘昔丁隈牧州陳顧翟之好禮徐靖為郡薦袁奐之篤學桓範驅傳先舉管寧朱則剖符亦稱董直臣才非徃哲識愧前脩輕塵聽覽伏待斧鉞謹奉表薦顧協表梁相東王即元帝也臣聞貢玉之士歸之潤山論珠之人出於枯岸是以芻蕘之言擇於廊廟者也臣府兼記室叅軍吳郡顧協行稱閭里學兼文義服膺道素雅量邃逺安貧專静奉公抗直傍闕知已志不自營年方六十家一作室無妻子臣欲言於官人申其屈滯協必苦執貞退立志難奪可謂東南之遺寳矣伏惟陛下未明求衣思賢如渇爰發明詔各舉所知識非許郭雖無知人之鑒若守固無言懼貽蔽賢之咎昔孔愉表韓伯一作纉疑當作績按晉書隠逸韓績傳孔愉薦之詔以安車束帛徴之韓伯傳無此字之才庾亮薦翟湯之徳臣雖未齒二臣協實無慙兩士一作皆梁書顧協傳為宇文戸部薦隠淪表樊衡臣某言臣将使之辰特奉天㫖念及遺逸委臣明敭兼恤屢空令臣賙給臣謹依制命宣布遐邇承風籍一作藉響隠淪皆出考其精尤所得如右伏惟陛下恢徴士之典飾蒲車之儀一作義昭示海内令知聖朝有寵賢之盛臣之報國志願畢矣孰知多士盈朝四門已集微臣所奏不動聖衷誠願陛下㽞意才難願求邦本山髙惟積不厭髙深芻蕘有禆伏希裁擇臣無任懇廹之至自舉表𤣥宗蘇源明草莾臣某言臣實陋微素乏才業将遂長徃守此無用天鑒孔明澤覃幽僻伏奉今年正月五日制詣闕自舉不次之私無限於物豈伊庸菲所當膺荷伏惟開元神武皇帝陛下道宻旒扆徳孚天地忝在草木幸均雷雨朝夕㣲命虗受臣生偃卧窮藪詎知帝力展義介丘肆覲群后得列庶人之間不在役夫之上王者能事邦家烈光耳未前聞目所畢覩載懐涵育無荅造化孰謂聖恩曲貸巖壑顧慚庸近何階對敭臣聞明主之臨下也務求才以自輔量能以自進臣才非令問譽寂郷黨志尚庸寡理絶聞知縣令臣栁國状臣於編户之中刺史臣栁絳諭臣以明制之意且臣山東一布衣耳在昇平之時徴求之口非自察者難審其可茍欲避嚴令發困蒙心靈震越寝寐驚悸無任承恩喜躍之至責躬薦弟表肅宗王維臣維稽首言臣年老力衰心昏眼暗自料涯分其夀集作能幾何久竊天官每兢集作慙尸素頃又沒於逆賊不能殺身負國偷生以至今日陛下矜其懦集作愚弱託病彼囚不賜疵瑕纍遷省閣集作門非昭洗罪累每負惡名在於微臣百生萬死集作足非昔在賊池泣血自思一日得見聖朝即願出家脩道及奉聖主伏戀仁恩貪冒官榮荏苒嵗月不知止足尚忝簮裾昔集作始願屢違私心自咎臣又聞用不才之士才臣不来賞無功之人功臣不勸有國大體為政本源非敢論議他人竊見二字集作竊以兄弟自此臣弟蜀州刺史縉太原五年撫養百姓盡心為國竭力守城臣即䧟在賊中茍且死命臣忠不如弟一也縉前後効集作歴任所在著聲臣忝職甚多曽無裨益臣政不如弟二也臣頃負累状在三司縉上表祈哀請代臣罪臣之於縉一無優恤集作憂憐臣義不如弟三也縉之判䇿屢登甲科衆推才名素在臣上臣小言淺學不足謂文臣才不如弟四也縉言不忤物行不尚人植性謙和執心平坦集作直臣無度量實是空疎臣徳不如弟五也臣之五短弟之五長加以有功又能為政顧臣謬官華省而弟逺守方州外愧其集作妨賢内慙比義痛心疾首以日為年臣又逼近懸車朝暮入地閴然孤獨逈無子孫弟之與臣更相為命兩人又俱白首一别恐隔黄泉倘得同居相視而沒冺㓕之際魂魄有依伏乞盡削臣官放歸田里賜弟散職令在朝行集作廷臣當苦行齋心弟自竭誠盡節並願肝膽塗地隕越為期葵藿之心庶知向日犬馬之意何足動天不勝私情懇廹之至為王戸部薦李諒表徳宗栁宗元臣某言臣聞知賢必進忠臣之多集作大方擇善而舉明主之要道况臣特受恩遇超絶古今報國之誠寤寐所集作深切是敢竭愚臣之微分助陛下之至明恢張羽儀𢎞輔理化臣誠惶誠恐頓首頓首竊見新授某官李諒清明直方柔恵端信强以有理敏一作幹而甚文求之後来畧無其比臣自任度支副使以諒為廵官未及薦聞至一作去某月日荆南奏官勅下今見赴本道諒實國器合在朝行臣之所知尤惜其去伏望天恩授以諫官使備獻納冀他日公卿之任斯焉取斯則聖朝無乏士之名微臣緩蔽賢之罰無任誠懇屏營之至舉前池州刺史張嚴一作巖下同自代表徳宗李冉臣某言伏惟建中元年正月五日制條諸州刺史授訖於四方館上表讓一人自代者前池州刺史張嚴苦節立身直躬激俗潔㢘恵愛特異常流自軍興已来職役繁重江淮百姓多有流亡張嚴在任三年闢田加戸頃因公坐法至免官在理可容原情堪録臣當州自定兩稅以来距今四嵗戸口减省差科日増臣無政能坐待顛躓使嚴代處必有成功伏望天恩遂臣誠請無任悃欵之至文苑英華卷六百十一
