body:
  text: 文苑英華卷四百三十宋李昉等編赦書十一禋祀赦書七大中元年正月十七日赦文編制門下執大象者導陰陽之和帝率土者茂生植之化粵自軒昊暨于唐虞側身皇階虛已大位詔令作寶懸金鑑詔令作握金鏡之朗耀致玉燭之融明惠中國以綏四方欽上玄而育兆庶所謂至德勞深企懷朕荷先聖之眷求詔令作命奉祖宗之成憲獲撫萬國統和三靈兢嚴丕構惕勵神器實賴昊穹嘉饗一作嚮神祗降休蠻夷戎狄之聿來鳥獸草木之咸若實真宰潛運玄功啓光麥禾豐登兵革偃息物不疵癘人無夭亡一作昏發揚氤氲敷佑寡昧夙夜祗戴訏謀經紀尚懼德教之未宣黎元之未泰貪詔令作暴虐之害政朋邪之敗風永念困窮思臻富庶每興赤子之嘆不知黃屋之尊爰因首正克舉彛典告受命之纂緒展嚴配之盛儀柴燎升聞馨香殷薦羣祀昭答百神來享精誠既逺感慶良深是用肆眚恤刑改元建號利時者不廢便人者必行俾覃在宥之恩以順發生之氣與之更始咸使維新可大赦天下改會昌七年為大中元年自大中元年正月十七日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不原者咸赦除之唯犯十惡五逆已上及故殺人並不在免限官典犯入已贓兼情涉巨蠧及持仗行劫縱不殺人並不在免限左降官量移近處已經量移者更與量移如已至刺史者凖刺史月限例處分諸色官未復資者有司條疏聞奏如復資者五品已上中書門下速與處分六品已上依常調選丁憂去任服闋日亦與量移如有親故在上都任所司陳狀便與處分不必更待本州府申請從九月二十二日降郊禮敕後流貶及引決妄稱寃人等并重推覆囚徒並不在此例别用敕責授降資正員官及曾因痕纍停免未經引用者並與進改流人及降死從流者與移近地如有收敘者量才録用并僧尼道士移𨽻者亦與放還其情狀難容者更不在量移及放還之限流貶人如已亡殁家口欲還及須歸葬者聽隨所便如緣葬事幼弱飢窮不能自濟者委所在長吏量給棺櫬優恤發遣左降官流人先有官者如已亡殁各還本官亡官失爵痕纍禁錮者並從洗滌諸色流貶人元敕內云雖逢恩赦不在量移限者自去年五月五日赦文後已經量移者五千里外更與量移千里三千里外者更與量移五百里情狀難容者不在此限常恭官及諸色刺史先停替及以病解免并終制未授官者委中書門下量才進擬勿令稽滯國家與吐蕃舅甥之好彼此無虞自今後邊上不得授納投降人并擒捉生口誓著山河勳銘鼎鼐恩延後裔義在勸人故尚父汾陽王贈太師晟太尉秀實司徒顔杲卿贈太師顔真卿許逺張巡南霽雲子孫中未經甄奬者每家與一人正員官元和以來河朔節制以土地朝者各與其家一子正員官回鶻殘寇尚慮窺邊諸道防秋固是常例如有别有徴發久未放還念其辛勤須議存恤應緣回鶻别徴集防戍人等宜令中書門下節級量事賜物仍即具數聞奏歉沴頗甚已議賑恤冀免流亡自今已後所在時雨稍愆有傷農畝即仰長吏當時聞奏如涉隱蔽必節級處分古者郎官出為邑宰公卿外領郡符所以重親人之官急為政之才舊唐書作本自澆風興煽此道稍消頡頏清途便至顯貴理人之術未嘗經心欲使救百姓之艱危通天下之利病不可得也朕為政之始思厚時唐書作儒風軒墀近臣蓋備顧問如不周疾苦何以膺朕訪唐書作眷求自今已後諫議大夫給事中中書舍人未曾任刺史縣令及縱曾任有敗纍者並不在進擬限守宰親人職當撫字三載考績著任極言貞元元和頻有詔縣令五考方得改移近者因循都不遵守雖諸州縣令或得三考兩府畿內亦罕及二年以此字人望其成化唐書作若為成政轉書案牘寧免姦欺道路有迎送之勞鄉里無蘇息之望自今已後刺史縣令除授後一例須滿三十六個月方得替换其責授遷擢即不在此限其受替後量其在任課效作三等聞奏其在第一等委中書門下及吏曹優與處分第二等依資改轉第三等量加降黜其受替後委刺史録事參軍比驗等第申觀察使與觀察判官勘驗詣實申奏後因事考核有不如所奏觀察判官刺史録事參軍據人節級懲罰觀察使奏聽進止其刺史委觀察使判官具考課聞奏雖去任已久但因事發露合懲合奬並凖元敕處分其合拔擢貶黜者則不拘此限長吏舉薦縣令録事參軍雖有近敕如涉請托是啓幸門其諸州府縣令録事參軍吏部所注之官雖與替亦須具所替人罪犯及不勝任事狀聞奏所舉之人須前任曾有殊考不然課績尤異分明有據者方得論請此外中書門下不得與進擬河東振武易定京西北等道官吏科錢過聞寡薄省司注擬罔不固辭承乏之由其新收闕官料錢户部不收用管便令本府少尹與司録參軍勾當并舊給課料數額添給見錢在官無少尹即仰觀察判官與録事參軍同勾當使司輒不敢妄有借貸支用如違本州官量加貶責長吏别議處分仍委所在鹽鐵度支院判官參訪中書門下如違院官凖本州官例處分諸色入仕近者轉多內外官員無不填塞蓋因州府論請多用虛銜軍師奏功或未托實自今已後無正官及無出身者並不在奏州府縣官限縱有出身亦須去避稍近方得奏請諸軍將非有殊功者不在奏無州縣官限素非吏部注擬之處即不在此限仍委中書門下凖此處分京畿之內荆南數州或頻嵗辛勤或遭罹歉沴須免租賦以慰疲人京兆府今年夏青苖錢及元和十五年已後至會昌三年終已前應有諸縣欠日掌間並宜放免荆南管內應遭旱損農户赦書下後新年夏隨地稅錢宜並放免塞上置兵本防戎虜苦寒之地尤要撫綏如聞軍中小有所須舊例不無科率或有逋欠必載簿書給衣散糧之時尅折略盡永言此弊積有嵗年爰因慶澤須使蠲改自今已後邊上兵士除本分差役外輒不得妄有科配春冬給衣及每月糧米並須當時分付如依前尅折本判官本將並重加貶責長吏别議處分仍從前應有此色欠負不問多少更不得科校徴索所在鹽鐵度支院切加訪察申中書門下如違院官與判官同議貶責𣙜酤之利諸道權宜如聞所設科條過有嚴酷一分抵罪連坐數家或沒人資財或身處極法里閭之內遂至無聊豈有疲人堪此陷穽宜令中書門下商量停罷續作條疏聞奏州府拆寺瓦木堆積多時風雨所侵朽蠧將盡所在出賣雖有敕文百姓畏懼嚴刑莫敢投狀巡檢防護豈免勞人自今已後百姓要買者任二年續徴納價錢州縣輒不得暴有校科私茶鹽雖要止絶法或連坐則害平人自今已後但科犯茶鹽要人罪其買茶糴鹽及經過食宿之處並不要勘問差役不時妨農為甚古者用人之力嵗不過三日蓋為此也如聞所在修築動踰數月事非甚切所妨即多自今已後所在州縣如要修理者任和雇諸色人役使仍須據時價給錢闕方今就使農户輒不得追擾過忙時五月六月九月事非切時屋宇城壘不在修築限如違官吏並節級貶責仍令御史臺及所在度支鹽鐵院檢舉申中書門下如涉隱蔽本御史及本院官並凖前處君以人為國人以食為天有國有家捨此無急如聞州府之內皆有間空田長蒿萊無人墾闢與其虛棄曷若濟人宜令所在長吏設法召募貧人課勵耕種所收苖子以備水旱及當處軍糧其初建置或鎮小力微不辨營備任量常平義倉粟充糧食種子及耕農仍具各任本道自詳軍便條疏處分訖申奏每年所收營田苖子除給耕種人牛量事填補所借常平義倉收物所兾野無荒田災有儲備觀察使刺史起營田二年已後據見榖為殿最泉重貨輕當今最甚氓庶捐瘠莫不由斯輸納租征須從利便應天下百姓所出土貨幸是官中每年收市之物即所在州府具色日先下文帖指揮令據官中收市價輸納不得一一徴納見錢切不得令所由妄納耗剩如違本判官録事參軍重加貶責鹽鐵度支院官不加檢舉亦凖此處分諸道藩方牙門將校不獨資以武略亦在拔其幹能近門下商量停罷續作條疏聞奏近年隨使人多冗食要職傾奪占位勳舊無依慮不均平例有停解如聞或有自逺招收或因其投募人材武藝要籍轅門或因類能擢處右職軍中已著勞績選衆又合甄升一例勒停實乖至當其應隨使軍將及驍勇官健等有超軼輩流者並許待使到後選驗處分設法施禁固在長人訪姦去邪尤繫胥吏若紀綱不漏上下相同雖損益懸殊功利百倍度支户部鹽鐵三司吏人皆主錢榖去留之際切在類能若一槩即以年勞衆職從何條舉必資奬誘明示勸懲其中如有才用知識昭然獨見自期展效建立事功或剔抉疵瑕或糾正案牘發明已往之咎條理將來之規宜委本司便與奏論特有遷授仍與勾當依前本司驅使如守職多年無事可稱但循默自容者一例凖舊年限勒赴選不得妄許一作訴事故留在本司其案牘中或有過犯並不用追理貴許自新以示𢎞貸磐石維城本枝祚慶親賢之義寵渥宜申文武庶官中外執事皆肅恭職任祗奉郊禋俾合推恩同沾霈澤亞獻福王綰終獻撫王統等各賜物百匹夾侍正衣進圭捧圭各賜物五十匹亞獻正衣各賜物四十匹內外文武見任及致仕官三品已上賜爵一級四品已下加一階合入三品及五品欠考未敘者考足日聽敘魯聖儒風虞賔前典必須展敬允叶國章文宣王之後及二王三恪各與一子官其祠廟委所司量加修飾孝惟資愛禮著事親屬當布澤之辰用覃睦族之慶太皇太后二等已上親皇三等已上親委中書門下合擇有才行者量與改官無官者與出身皇五等已上親三品已上賜爵一級五品已上加一階六品以下及前資常選散官簡選日優與處分未有出身陪位者凖會昌五年正月三日赦文處分應陪位皇五等已上親及太皇太后皇太后三等已上親三品已上賜爵一級四品已下加一階諸親四等五等并諸色人陪位官五品已上加一階六品已上及白身並賜勳兩轉其前資及有出身各減一選孝弟之道王教攸先哀慶之禮人倫所重常參官及諸州府長官父母見存未有官封者並量與五品致仕官及階并邑號如有官者量與進改如官已至五品已上即與五品階父母亡殁未經追贈者量與追贈官及邑號義深心膂寄重藩垣俾命追崇延恩存殁用酬勳效豈吝寵私中書門下及節度使帶平章事宜與一子正員八品官祖父母先亡殁各與追贈已經追贈者更與改贈節度使各與一子正員九品官東都守度支鹽鐵觀察使置都團練都防禦經略招討使及神策金吾六軍將軍大將軍上將軍統軍威逺營鎮國軍等使皇城留守各與一子出身父母先亡殁未經追贈者各與追贈禮儀使京兆尹各與一子正員九品官昭宣典册寅奉郊禋宜普恩光以答公幹應郊廟升壇升殿行事官普恩之外中書門下尚書省御史臺三品已上特加一階四品已下各賜一階如合入三品者量減三考入五品者減兩考仍待考足日聽敘其合選人與減一選內行事官三品已上賜爵一級四品已下加一階內侍省及內坊官四品已上各賜勳五轉五品已下各賜勳三轉應從駕上郊廟者普恩之外三品已上各賜爵一級四品已下各加一階白身賜勳兩轉禁營兵仗列衛爪牙言念勤勞宜頒慶賚神策六軍威逺營左右金吾及皇城將士應緣大禮移仗宿衛御樓立仗等普恩之外三品已上賜爵一級四品已下各加一階仍凖舊例賜物有差其神策將士應在京畿內諸縣者亦各有賜物應緣大禮職掌行事官并修撰儀注及留守副留守守倉庫卿等普恩之外三品已上賜爵一級四品已下各加一階琛賮來朝梯航入貢藩方陳奏職業無虧或禁署策名或官司效用俾同霑渥各示加恩鴻臚禮賔院應在城內蕃客等各有賜物諸道知上都進奏院官在城者各賜勳三轉應緣大禮四方進表疏及賀正官各賜勳三轉翰林待詔供奉并諸色直見任及前資并員外試官三品已上賜爵一級四品已下各加一階無官者賜勳兩轉掌贊禮儀祗奉郊廟理宜優奬用洽恩華郊廟行事齋郎減二年勞室長掌座禮生贊者減一年勞無勞可減者便放出身崇文館行事學生及齋郎禮生畨考已滿所司緣大禮却遣入行事各減一選國子監學生陪位者賜勳一轉中書門下專知儀制官吏各特加一階應緣祗奉供作官直司長上諸州行綱考典兩縣耆夀諸色畨役當上在城并量留十二月畨者各賜勳兩轉飛龍間廄宫苑典引掌扇內園掌總監栽接少府將作內作中尚武德軍內外弓箭庫等諸司使下白身及無品直司定額長上雜匠巧兒黃衣上監門直長雜仗三衛七色引駕細引執扇角手弩手彍騎武士天文觀生漏生典鼓典鐘工人樂人主衣主膳主酪典食胡食手宰手間募士御士醫士獸醫門僕藥僮御書手楷書手流外行署等各賜勳兩轉立敬之本在敦於耆老勸俗之道莫先於節義天下百姓九十已上各賜絹三匹八十已上各賜絹兩匹仍委長吏賫帛就家宣賜孝子順孫義夫節婦旌表門閭終身勿事先已旌表者量加優恤嶽瀆孕靈公侯列位助宣景化利及含生宜委本州主長吏備禮致祭皇王應期賢哲濟代式遵令德用達明誠名山大川及自古聖帝明王忠臣烈士各令所在以禮致祭自會昌元年後赦文及諸色條疏有不便於人者委有司及外州府長吏條疏聞奏亡命山澤挾藏軍器百日不首復罪如初赦書有不該者所司具條疏聞奏敢以赦前事相告言者以其罪罪之赦書日行五百里布告天下咸使聞知主者施行文苑英華卷四百三十
