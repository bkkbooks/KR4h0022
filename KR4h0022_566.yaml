body:
  text: 文苑英華卷五百六十七宋李昉等編賀捷二為百寮賀僕固懷恩死并諸道破賊表一首為崔大夫賀破吐蕃表一首賀郭子儀破吐蕃表一首賀擒周智光表一首賀劒南破西蕃表一首賀破山南賊表一首為崔中丞賀討田承嗣表一首賀張獻恭破賊表一首賀收涇州表一首賀破賊表一首賀破吐蕃表一首賀劍南奏破吐蕃表一首中書門下賀雲南軍破吐蕃劍山保定城表一首中書門下賀元誼李文通出洛州城表一首中書門下賀汴州擒李乃表一首中書門下賀靈武破吐蕃表一首中書門下賀蔡州破賊表一首賀蔡州破賊表一首賀靈武破吐蕃表一首為百寮賀僕固懷恩死并諸道破賊表代宗闕名永泰元年臣某等言臣伏聞逆賊僕固懷恩以去月九日死於靈州鳴沙縣又見成德軍節度使李寶臣露布斬逆賊蔚州刺史曹楚王并破党項部落收諸蕃漢官兵一作捷及百姓等三萬餘衆又邠寧節度使白孝德破僕固琡下兵馬及吐蕃斬首三千級生擒一百九十五人獲馬八百匹兼鳯翔節度使李抱玉亦破吐蕃羌渾等三千餘衆收其軍資器械不可勝數者臣聞積德者天之所啓反道者鬼得而誅逆賊懷恩者氊裘雜種出身微賤陛下以其久經驅䇿嘗立功勳任以樞機一作中樞升之上將而豺狼其性梟獍其一作為心連結西蕃因依北虜大為人患二年於兹謂旅拒可以偷生猖狂可以集事曽不知逆天暴物其惡貫盈故王師未加而元凶自斃又曹楚王去順效逆與之連衡更唱迭和同為不道李寶臣恭行天罰遂戮鯨鯢其餘吐蕃之兵羌渾之旅或驅役邠土或陵逼鳯翔白孝德陷之於前李抱玉破之於後既已剪其兩翼方且覆其全軍信宿一作聞非之間數道皆捷彼進無所入退無所從殄掃妖羣指期非逺臣歷考近事因知天意自祿山開釁思明亂常迄于懷恩三凶繼跡始雖俶擾旋見敗亡社稷危而復安天地否而重泰足明皇穹保佑厯數延長卜年之慶永代無極臣等幸逄昌運忝列朝行慶躍之誠倍萬恆品無任歡抃之至為崔大夫賀破吐蕃表代宗浩虛舟永泰元年臣某言伏見關內河東副元帥朔方節度使司徒兼中書令汾陽郡王郭子儀八月日奏狀今月日先軍李懷光於監州界大破吐蕃及吐谷渾賊一萬餘衆獲馬六千七百五十匹牛羊器械未知定數者臣聞戎狄無厭厚將自斃凶殘不革舉必生擒惟此犬羊屢侵壃埸陛下頃雖遣將猶命緩追冀承含育之恩以變貪婪之性今乃先時入塞乘間犯邉鬼得而誅人皆自戰偏師暫出舉衆大奔係彼牛馬獲其生級數逾萬計威懾四夷陛下神化無方聖功潜被資於祕略成此殊勳臣承恩入朝次行分陜雖捷書傳慶已竊抃於道一作途中而賀表陳誠願先馳於闕下無任之至賀郭子儀破吐蕃表代宗于邵永泰元年臣某言今日吳承倩至奉宣進止示臣關內河東副元帥司徒兼中書令汾陽王郭子儀奏捷狀李懷光於監州界積石川大破吐蕃一萬餘衆生擒斬首共六千餘級獲牛馬及器械不可勝數者伏以聖略逺加制勝前定神功不測告捷如期吐蕃忘國厚恩歲犯邉境陛下料其進退知其無策親以規模授於諸將以鹽夏之路地曠人稀嘗語臣曰此賊秋中必來擾鹽夏今覩成擒之處果於所料之中俘馘既多羊馬甚衆此皆宸心懸照不差毫髮天威逺被克壯師徒遂令智勇雲起妖氛電掃合符聖斷有此豐功子儀狀云又計日追蹤必當再捷者臣以蕃醜久逋聖誅從此氣衰必當瓦解坐視無外之慶載美即叙之勳罷柝可期戢戈有望親承睿算忽驗於今奉覩戎捷不勝慶快之至賀擒周智光表代宗獨孤受永泰二年臣等言臣聞征而無戰者王者之師也將而必誅者春秋之義也臣伏見周智光傲很頑虐昏迷猖狡集作狂敢專生殺之威以慢王度崇飾姦慝之志自干天誅陛下謂罪在己躬視人如子永言式遏之義不得已而用師而將才受鉞兵未血刃已梟元惡之首載安舊汚之俗昔漢征黥布望塵集作陳而憂殷伐鬼方積年乃克豈若陛下朝命將帥夕殱渠魁制勝神速從古未有臣等不勝慶快之至賀劔南破西蕃表代宗常衮大厯十年臣某言今日伏見劔南西川節度使崔寧所奏露布十一月七日於劔南大破吐蕃斬首八千五百級生擒九百四十二人獲馬牛器械一千萬計者陛下以西戎負恩連歲設備近興武旅逺鑠王師故隴上或虞卭南每捷事同符契謀動鬼神凡在臣庶不勝慶快伏以西蜀一隅犬戎乘隙聖謀潜運藩帥龔行以我同力出其不意故得邉兵無遺鏃之費狂冦有一作致輿尸之凶名王首將既充俘馘要塞堅城亦入封守神武之德莫測掃除之勢足徴天聲一臨風動萬國則方隅不擾候我綏懷夷夏大同期於指掌臣等覩兹大捷愧乏嘉謀慶躍之誠實倍恆品賀破山南賊表代宗臣某言中使某至示臣山南西道露布破吐蕃高安堡五百人又生擒堡使等七人又破急援兵馬二千餘人者大獲帥長驅其畜牧焚其資儲夷其堡隊獲覩慶捷喜倍一作萬恆情臣伏以秋成以來羣帥宣力陛下皆先授方略合如符契以蕃醜東冦猶窺疆埸受命獻恭掩征巢穴允膺密㫖精擇竒鋒行於險中出其料外遂使恃固之壘遽復于隍將領之渠盡襟其甲猶不悔禍更招援軍以犬羊恃衆之羣當貔虎輕齎之旅雖終日猶鬬殱耗相仍而乘夕盡逃覆亡不暇聖謀方舉西候遂寧神算既行北郊以靖逺周萬里之外甫料四夷之情中詔是闕所征皆捷茍承成命皆可指期故卭道拜章於前漢池拜章於後復留睿略更布新書軍中皆必勝之師天下無不賔之虜臣幸參樞近更乏嘉猷拜舞失容以慙以賀為崔中丞賀討田承嗣表代宗常衮大厯十一年臣某言中使某至奉宣某月日敕承嗣本輔逆臣罪當三夷陛下垂包荒之德開自新之路假以台衮冀其悛革豈謂豺狼之心飽而增凶動搖鄰境慢易君命天下臣子雖扼腕攘臂願食其肉畏懼陛下不敢自發今陛下殷然震雷霆之怒下誅購之令戴髮橫目莫不憤激臣受國恩守在逺藩不得驅策駑蹇列於將臣巨猾之首竟為他斷撫劔慙恥心魂馳越臣又知鯨鯢既盡蜂蠆自滅陛下垂衣裳以臨萬邦無為之政行同一作繼大舜無任慶快感憤之至賀張獻恭破賊表代宗臣某言今月中使某至伏蒙聖恩宣示南山西道節度使檢校工部尚書張獻恭所奏露布破岷州吐蕃十萬餘衆生擒百餘人并獲牛馬及燒焚賊倉庫甲仗並盡者伏以吐蕃背恩負約屢擾邉陲惡稔禍盈自招喪敗聖謀潜運尅捷相仍自秋已來制勝非一頃則收功朔北今又獻凱山南皆陛下指受規模尅期進取遂令銜命之將感義之徒伏順爭先奉詞掩襲未鼓而收城壘既戰而殱冦戎策備火攻威同電掃回軍乘勝又破柘川殺獲追擒不可勝數嘯聚之黨今已戮除噍類之餘自當殄滅廓清右地計日可期斯實皇威逺覃睿略先定動罔遺策舉必有功臣謬踐台陛親承睿算無任踴躍之至賀收涇州表德宗臣某言中使王開諌李重芝等至伏奉敕㫖送吐火羅王子并曹義臣家口共四十四人配漳泉等州安置伏聞大破凶醜收復涇州梟斬帥劉元等傳送闕下餘黨悉降西陲底定凡在臣庶不勝慶快臣聞聖人有作神契必先用彰睿謀小有邉患以威天下大告武成因兹斬效疑罔不率俾伏惟聖神文武皇帝陛下德合天地明罰以法雷霆道符炎黃有征以懲姦宄蠢兹狂狡敢拒封圻梟獍之心不知恩愛豺狼之性輒肆傷殘聖慈以𤣥造曲成神武不殺時寬嚴㫖頻許自新益用恣雎竟無悛革然夏后之征扈氏召六卿以恭行周文之伐密人示萬邦以整旅咸在侯甸之內亦效訓誓之勤於是我伐用張親授經略而執迷不復雖困猶鬪暫假游氛尚稽靈誅皇赫斯怒天威震耀簡車馬以大閲命將帥以長驅飛舞梯衝瞰臨壁壘凶徒悚栗義士激昻梟懸渠魁檻送支黨上以告清廟下以布遐方人神豁憤朝野大慶百二之塞外虞解嚴十萬之師餘勇可息則日月所照敢不來庭戎夏大同期於指掌臣謬承重寄喜萬恆情無任慶躍之至謹奉表陳賀以聞賀破賊表德宗于邵臣某言臣聞春生秋殺天之令也撫順討逆國之教也故王者上法震耀下修典刑雖當垂拱之朝亦整干戈之用伏見今月十日神策行營節度使尚可孤破藍田賊保生擒賊僞署御史大夫仇敬忠斬獲共二千餘人者初從摩壘旋即合圍因乘破竹之威不漏枯池之網中賀伏惟皇帝陛下聲教以文暢禍亂以武戮奄有華夏光臨統厯日者蕞爾朱泚怙亂涇原腥穢宫闕僣賊神器隂連叛將竊緩輿尸實由逆賊仇忠敬等姦凶相資狡惡為事因山據嶮欲抗雷霆之誅積粟稅一作挽芻兾延晷刻之命殊不知天威不逺睿算何逃未終瘈狗之狂已觸駭􅚪之勢餘凶奪魄義衆增威掃氛祲於順風復京師於不日臣謬兼統帥濫一作久總禁戎矢石不親虛當坐制之地凶渠尚在終決前驅之心無任慶快之至賀破吐蕃表德宗齊映臣某言伏聞南蠻以六月某日大破吐蕃弄視等城擒戮俘獲不可勝計者臣聞德之所綏在逺咸服義之所棄雖暴必亡蠢兹犬戎敢肆凶戾久稽天討時動邉塵人神共讐夷夏同憤遂使南蠻奮旅仗義爭先覆其保障之恃奪彼肥饒之地斬馘萬級俘計千羣掦天聲於區外正王略於殊俗自非陛下道超帝圗化協神用武先七德守在四夷安得使百蠻稽服潜被聲教始左衽以請吏俄倒戈而效誠捨其唇齒之資為我爪牙之用雖書稱即叙詩美來威方之聖功彼有慙德臣謬膺朝寄待位東土不獲隨例稱慶闕庭抃躍之誠倍萬恆品不勝慶快之至賀劔南奏破吐蕃表德宗令狐楚臣某言當道進奏院狀報六月某日劔南節度使韋臯狀奏破吐蕃五千餘衆生擒大酋官七人陳上殺一百五十餘人收獲牛馬四百餘頭匹器械一千五百餘事者吉語逺及歡聲相接中賀臣聞順實臣道伏頭者至柔而全禮為天經無禮者雖衆必敗陛下君臨萬國天覆兆人恩覃于幽微澤及乎荒逺蠢兹蕃醜假息西陲惟天地含𢎞之心未能剪滅以豺狼貪戾之性輒欲一作肆陸梁爰整其師不攻而取此皆降睿略於天上頒明謀於閫外制士之死命得人之歡心所以殪戎如羊破虜如蝨驅彼牛馬獲其侯王威加于殊域武暢于羣動自然赤山之壤可蹈清海之波可涉必當封土刻石以垂天聲戎臣司武獲覩其慶不勝歡抃之至中書門下賀雲南軍破吐蕃劍山保定城表德宗權德輿臣某言伏見劔南西川節度使某官某所奏兵馬使宋晃前月十八日與雲南軍合勢攻破吐蕃劍山保定城當日斬城使者伏以聲教所被遐邇大同蠢兹西戎尚有遺類或犯亭鄣且稽靈誅陛下睿算無窮天威逺震以夷裔感恩之衆佐藩隅制勝之臣取以多方纍獻戎捷事皆前定必禀聖謀集作謨斬將搴旗出於料外堅城便地盡落彀中通荒服㑹朝之途絶餘孽窺覦之隙奉威懷之命以律而臧兼夷夏之師在和而克此皆陛下神武潜運妖氛永清由是成擒自當盡敵臣等謬當樞近愧乏廟謀幸覩成功不勝大慶無任欣抃之至謹奉表陳賀以聞貞元元年十二月三日中書門下賀元誼李文通出洛州城表德宗前人臣某言臣等今日靣奉進止元誼李文通等蒙恩宥過以今月七日將領將士出洛州城者伏惟皇帝陛下聖神之化懷保元元仁洽好生感深格物誼等列於守將本以忠勞師旅之間失於慮始蒼黃之際自謂匪人士吏危疑謀猷回遹陛下以震耀所及殺傷則多曲成以誘其衷持久以通其變愀然軫念不忍致誅待以初心許之遷善指其開壁率衆來朝實賴亭毒之恩再全臣子之節宥兹一眚昭示萬方睿慈所𢎞動植知幸臣等虛薄備位台司愧無調鼎之能獲覩止戈之慶無任欣抃踴躍之至謹奉表陳賀以聞貞元十二年正月十三日中書門下賀汴州擒李乃表德宗臣某言中使某乙奉宣進止汴州以今月三日擒送李乃軍州並已寧帖者伏以聖德含𢎞在宥天下而匪人醜類自抵刑章李乃本以庸微謬從軍校潜懷狂戾輒擾師徒乘其疾病坐邀職秩怙亂以逞志專戮以作威人思納忠義不同惡俄就械繫一方晏然雖梟獍之心暫求假息而鷹鸇之逐曾不崇朝衆情交欣以待朝㫖陛下命將相之重撫按是邦明書罪人且示輕典成命方下浚郊以清聖謨炳然若合符契足使義士勵節貪夫革心禀化畏威無有逺近集作邇臣等繆居台鉉每奉德音愧乏嘉猷以承睿略無任歡欣慶幸之至謹奉表陳賀以聞貞元十二年七月九日中書門下賀靈武破吐蕃表臣某等言臣等今日面奉德音靈武大破吐蕃擒生斬將者伏以睿謀武經隂隲上略兵符所授攻戰多方蠢兹犬羊尚勞爟燧羣師禀命中權戒嚴掎角相因初設險於三覆竒正合發俄獻功於七擒數酋渠之首級積戎械於亭候勝氣餘勇鼓行無前即叙可期有征斯在臣等繆居樞掖莫效㳙埃每承以律之貞空荷止戈之運無任慶快踴躍之至謹奉表陳賀以聞貞元十四年十二月二十九日中書門下賀蔡州破賊表德宗臣某等言伏奉宣示蔡州行營招討使韓全義所奏云四月二十七日於逆賊吳少誠界破賊騾子及馬步軍三千餘人賊弟吳少陽棄衆奔遁者伏惟陛下聖神廣運丕冒萬方而顛越匪彛自蹈鋒刃德音纍降曉告不悛禁暴安人酌於軍志命師授律發於宸心整旅有嚴拊循决勝據便地以三覆分鋭師而九攻村官突騎奮勵精勇啓行所及莫敢枝梧奔北之徒自相蹈藉威謀克壯殺獲斯多更俟便宜續圗攻取蒙輪超乘靡不賈餘長轂鈎援期於盡殪此皆睿算前定純臣協心佇清淮濆以慶天下臣等謬居樞近喜倍集作萬恆情無任欣抃踴躍之至謹奉表陳賀以聞貞元十六年五月四日賀蔡州破賊表德宗張仲素臣某言伏聞蔡州營田招討一作招討行營韓全義今月某日大破賊軍斬首擒生其數至廣臣某中賀臣聞天覆至大負慝者必降雷電之討君恩至重失節者須示斧鉞之誅賊臣吳少誠輒因將帥之權遂肆豺狼之性聖恩含忍久示招携敢固執迷未即歸罪今全義親承睿㫖度禀聖謨暫師臨境羣凶授首梟斬元惡計日可期廓清淮濆在兹一舉臣謬忝地官之職情同率土之歡欣快之誠倍百常品無任踴躍之至賀靈武破吐蕃表德宗令狐楚臣某言臣得朔方節度使李欒牒稱十一月二十日大破吐蕃者千里喧傳三軍快抃臣某誠歡誠喜頓首頓首臣聞天生四夷用别荒服國有二柄誰能去兵伏惟陛下臣妾兆人庭衢六合溟波靜息車軌混同萬里清平三分底定而吐蕃羶臊醜類狂狡隂計乘陵凍草妄竊邉疆相鼠無牙安能穿屋羝羊羸角徒欲觸藩是以神聖啓其將心忠勇成於士力兵既落於天上虜乃一作果陷於彀中箝口之馬僨車而縶者千蹄一作嗷辮髮之人為俘輿尸者萬指降旗載路棄甲滿野遙知水赤坐想風腥此皆宗祖儲靈朝廷決策破碎戎膽振騰天威凡百人臣不勝踊躍臣某未申絲髮謬總旗旌欣歡憤激倍萬恆品所守有限不獲稱慶此表合在本卷令狐楚賀劔南吐蕃之後元誤入六百三十七卷賀狀內今移附卷末文苑英華卷五百六十七
