body:
  text: 文苑英華卷一百七十宋李昉等編應制三巡幸一逰方山二首至老子廟一首臨渭源二首渡淮五首還京二首巡逰二首幸晉陽一首初發東都一首幸江都二首臨洛水四首塗經濮濟二首春日望海三首重幸武功一首過溫湯五首經破薛舉戰地二首入潼關二首秋風函谷應詔一首驪山髙頂寓目九首幸新豐溫泉宫二首途經華嶽四首早渡蒲津關四首侍逰方山應制沈約清漢夜昭晳扶桑曉陸離發吹重陽下建羽朝夕池摐金浮水若聳蹕詔山祗一霑九霄露藜藿終自知從駕逰山袁奭從天響仙蹕春望動神衷澗水含初溜山花發早叢玉輿明淑景珠旗轉瑞風平原與上路佳氣逺蔥蔥至老子廟應詔庾信虛無推馭辨寥廓本乘霓三門臨苦縣九井對靈溪成丹須竹節量藥用刀圭石似臨卭芋芝如封禪泥毻毛新鵠小盤根古樹低野戍孤煙起春山百鳥啼路有三千别途經七聖迷唯當别關吏直向流沙西臨渭源隋煬帝西征乃屆此山路亦悠悠地幹紀靈異同穴吐洪流濫觴何足擬浮槎難可儔驚波鳴澗石澄岸㵼巖樓滔滔下狄縣渺渺肆神州長林嘯白獸雲徑想青牛風掃花葉散日舉煙霧收直為求人隱非窮轍迹逰奉和臨渭源應詔薛道衡玄功復禹迹至德去湯羅玉關亭障逺金方水石多八川兹一態萬里導長波驚流注陸海激浪還天河鸞旗歷巖谷龍穴暫經過西老陪逰宴南風起詠歌庶品蒙仁澤生靈沐太和微臣惜暮景願駐魯陽戈早渡淮隋煬帝平淮既渺渺曉露復霏霏淮甸未分色泱漭共晨暉晴霧轉孤嶼錦帆出長圻潮魚時躍浪沙禽鳴欲飛會待髙秋晚愁因近水歸奉和出潁至淮應制諸葛頴涉潁倦紆回浮淮欣逈直遙村含水氣逺浦澄天色靈濤稍欲近仙巖行可識玄覽屬睿辭風雲有餘力同前蔡允恭久倦川塗曲忽此望淮圻波長泛渺渺眺回情依依稍覺金烏轉漸見錦帆稀欲知仁化洽謳歌滿路歸同前𢎞執恭睿情欣逸賞臨泛入淮淝棹聲喧岸度帆影出雲飛清流含日彩奔浪蕩霞輝還如漳水曲鳴笳啓路歸同前虞世南良晨喜利涉解纜入淮潯寒流泛鷁首霜吹響哀吟潛鱗波裏躍水鳥浪前沉𨝍溝非復逺悵望悅宸襟還京師隋煬帝東都禮儀舉西京冠蓋歸是月春之季花桞相依依雲蹕清馳道雕輦御晨暉寥亮饒笳奏葳蕤旌斾飛後乘趨文雅前驅厲武威從駕還京李德林至仁文教逺惟聖武功宣太師觀六儀諸侯問百年玄覽時乘隙訓旅次山川鎮象屯休氣華蓋翼飛煙鼓奏千人響旗動七星連峻嶺戈回日髙原馬煦天姑射神逰罷蕭關獵騎旋更待東山上看君巡狩篇從駕巡逰前人大夏堯遺俗汾河漢豫逰今隨龍駕往還屬鴈飛秋天行肅輦路日馭翼華輈朝乘六氣辨夕動七星旒谷靜禽多思風髙松易秋逺林才有色遙水漫無流京華佳麗所目極與雲浮但覩凌霄觀詎見望仙樓璅門皆秀發鴛池盡覺優侍君草封禪東山觀射牛從駕天池應詔薛道衡上聖家寰宇威略振邉陲八維窮眺覽千里轉旌旗駕黿臨碧海控驥踐瑶池曲浦騰煙霧深浪駭鯨螭從駕幸晉陽前人省方遵往册逰豫叶前經金吾朝戒道校尉晚巡營重巒下飛騎絶浦渡連旌澗水寒逾咽松風逺更清方觀翠華反簮筆上雲亭初發東都應詔庾自直二龍乘玉軸萬騎翊林塘縱觀此何事巡駕幸維楊伊雒山川轉江湖道路長昭日秋源淨分花曲水香稻梁叨嵗月羽翮仰恩光後塵歸舊里還如仙鶴翔奉和幸江都應詔虞茂巡幸光帝典征吉乃先天澤國翔宸駕水府泛樓船七萃長榮薄三翼亘通川夙興大昕始求衣昧旦前澄瀾浮曉色遙林卷宿煙晨霞稍含景落日漸虧弦回塘響歌吹極浦望旌旃方陪覲東后登封禪肅然同前虞世南南國行周化稽山祕夏圗百王豈殊軌千載叶前謨肆覲遵時豫順動恱來蘇安流浮玉軸戒道翼金吾龍旗焕辰象鳯吹溢川塗封唐昔敷錫分陜被荆吳沐道成知讓遵儀允美都冬律初飛管陽鴈正銜蘆嚴飈肅林薄愛景落江湖鴻秋浹幽逺厚澤潤凋枯虞琴起歌詠漢築動巴歈多幸沾行葦無庸類散樗臨洛水唐太宗春搜馳駿骨總轡俯長河霞處流雲錦風前漾卷羅水花翻照樹堤蘭倒插波豈必汾隂曲秋雲發棹歌奉和受圗溫洛蘇味道緑綺膺河檢青壇俯洛濵天旋俄制蹕孝享屬嚴禋陟配光三祖懷柔泊百神霧開中道日雲斂屬車塵預奉咸英奏長歌億萬春同前牛鳯及八神承玉輦六羽警瑶溪戒道伊川北通旌澗水西御圖開洛匱刻石與天齊瑞日波中上仙禽霧裏低微臣矯弱翮抃舞接鸞鷖奉和拜洛李嶠七萃鑾輿動千年瑞檢開文如龜負出圖似鳯銜來殷薦三神享明祠萬國陪周旗黃鳥集漢幄紫雲回日暮鈎陳轉清歌上帝臺奉和展禮岱宗塗經濮濟蕭楚材拂漢星旗轉分宵日羽明將追會阜迹更勒岱宗銘林戈明濟岸獸鼓震河庭葉箭凌寒矯烏弓望曉驚已降汾水作仍深迎渭情同前薛堯構龍圗冠胥陸鳯駕指云亭非煙泛濟浦緑宇啓河汀畫常晨應月文戟曙分星四海巡揖禮三驅道契經行欣奉萬嵗竊抃偶千齡春日望海唐太宗披襟眺滄海慿軾玩春芳積流橫地紀疏𣲖引天潢仙氣凝三嶺和風扇八荒拂潮雲布色穿浪日舒光照岸花分彩迷雲鴈斷行懷卑運深廣持滿守靈長有形非易測無源詎可量洪濤經變野翠島屢成桑之罘思漢帝碣石想秦皇霓裳非本意端拱且圖王奉和同前楊師道春山臨渤海征旅輟晨裝回瞰盧龍塞斜瞻肅慎鄉洪波回地軸孤嶼映雲光落日驚濤上浮天駭浪長仙臺隱螭駕水府泛黿梁碣石朝煙滅之罘歸鴈翔北巡非漢后東幸異秦皇搴旌羽林客跋距少年場龍擊驅遼水鵬飛出帶方將舉青邱繳安訪白霓裳同前許敬宗韓夷愆奉賮慿險亂天常乃神𢎞廟略橫海剪吞航電野清玄莵騰笳振白狼連雲飛巨艦編石架浮梁周逰臨大壑降望極遐荒桃門通山抃蓬渚降霓裳驚濤含蜃闕駭浪掩晨光青邱絢春組丹谷耀華桑長驅七萃卒成功百戰場俄且旋戎路飲至肅巖廓重幸武功唐太宗代馬依朔吹驚禽愁昔藂况兹承睿德懷舊感深𠂻積善欣餘慶暢武恱神功垂衣天下治端拱車書同白水巡前迹丹陵幸舊宫列筵歡故老髙宴聚新豐駐蹕撫田畯回輿訪牧童瑞氣縈丹闕祥煙散碧空孤嶼含霜白遙山帶日紅於焉歡擊築聊以詠南風過溫湯前人溫渚亭仙蹕豐郊駐曉旌路曲回輪影巖虛傳漏聲暖溜驚湍駛寒空碧霧輕林黃踈葉下野白曙霜明眺聽良無己煙霞斷續生奉和同前越王真鳯輦騰宸駕驪籞次乾逰坎德踈溫液山隈𣲖暖流寒氛空外擁蒸氣沼中浮林凋帷影散雲斂蓋隂收霜郊暢玄覽參差落景遒同前前人握圖開萬宇屬聖啓千年驪阜疏緹綺驚鴻映綵旃玉霜明鳯野金陳藻龍川祥煙聚危岫熊水溢飛泉停輿興睿覽還舉大風篇同前楊思玄豐城觀漢迹溫谷幸秦餘地接幽王壘塗分鄭國渠風威肅文衛月彩鏡雕輿逺岫凝氛重寒松對影踈回瞻漢章闕佳氣滿宸居同前鄭義真洛川方駐蹕豐野暫停鑾湯泉恆獨涌溫谷豈知寒漏鼓依巖畔相風出樹端嶺煙遙聚草山月逈臨鞍日用誠多幸天文遂仰觀經破薛舉戰地唐太宗昔年懷壯氣提戈初仗節心隨朗日髙志與秋霜潔移鋒驚電起轉戰長河決營碎落星沉陳卷橫雲裂一揮氛沴靜再舉鯨鯢滅於兹俯舊原屬目駐華軒沈沙無故迹減竈有殘痕浪霞穿水淨峯霧拖蓮昏世途亟流易人事殊今昔長想眺前蹤撫躬聊自適奉和行經破薛舉戰地應詔許敬宗混元分大象長䇿挫修鯨於斯建宸極由此創鴻名一戎乾宇泰千祀德流清垂衣凝庶績端拱鑄羣生復整瑶池駕還臨官渡營周逰尋曩迹曠望動天晴帷宫靣丹浦帳殿矚宛城虜場栖九穟前歌被六英戰地甘泉涌陳處景雲生普天沾凱澤相携欣頌平入潼關唐太宗崤函稱地險襟帶扗兩京霜峯直臨道氷河曲繞城古木參差影寒猿斷續聲冠蓋往來合風塵朝夕驚髙談先馬渡偽曉預雞鳴棄繻懷逺志封泥負壯情尚有真人氣安知名不名奉和同前許敬宗曦馭循黃道星陳引翠旗濟潼紆萬乘臨河耀六師前旌彌陸海後騎發通伊勢踰回地軸威盛轉天機是節嵗窮絶關樹蕩涼颸仙霧含靈掌瑞鼎照川湄沖襟賞臨睨衢詠入京畿秋風函谷應詔徐賢妃秋風起函谷朔氣動河山偃松千嶺上雜雨二陵間低雲愁廣隰落日慘重關此時飄紫氣應驗真人還登驪山髙頂寓目唐太宗四郊秦漢國八水帝皇都閭閻雄里閈城闕壯規模貫渭稱天邑含岐實奧區金門披玉館因此識皇圖奉和登驪山髙頂寓目應制李嶠步輦陟山巔髙山入紫煙忠臣還捧日聖后欲捫天回識平陵樹低看華嶽蓮帝鄉應不逺空見白雲懸同前劉憲驪阜鎮皇圖鑾逰眺八區原隰旌門裏風雲入座隅直城如斗柄宫樹似星榆從臣詞賦末濫得上天衢同前趙彥昭皇精遍九垓御輦駐昭回路若隨天轉人疑近日來河看大禹鑿山見巨靈開願扈封鑾駕常持薦夀杯同前蘇頲仙蹕御層氲髙髙積翠分嵓聲中谷應天語半空聞豐樹連黃葉函關入紫雲聖圖恢宇縣歌賦小橫汾同前崔湜名山何壯哉玄覽一徘徊御路穿林轉旌門倚石開煙雲春後發河塞掌中來不學蓬壺逺經年猶未回同前前人翠巘萬尋懸居髙蔽御筵行戈疑駐日步輦若升天城闕霧中近關河雲外連謬陪登弇駕欣奉濟汾篇同前武平一鑾輿上碧天翠帟拖晴煙絶蕚紆仙徑層巖蔽御筵雲披丹鳯闕日下黑龍川更覩南薰奏流聲入管絃同前張説寒山入半空眺臨盡關中是日巡逰處晴光逺近同川明分渭水樹暗辨新豐巖壑清隂暮天歌起大風幸新豐溫泉宫應制徐彥伯姬典歌時邁虞編記省方何如黑帝月玄覽白雲鄉翠仗縈船庫明斾應萯陽風搖花眊彩雪艷寶戈芒御柏開油次離宫夾樹行桂枝籠騕裊松葉覆堂皇仙女含珠液溫池孕璧房湧疑神瀵洔澄若帝臺漿獨沸流常熱潛蒸氣轉香青坻壞疑作環玉甃紅淀鑠金光藻耀凝芳潔葳蕤獻淑祥五龍歸寶算九鳸叶時康同預華封老中衢祝聖皇同前武平一秦王登碣石周后襲崑崙何必稱遐逺方稱萬宇尊我皇順時豫星駕動軒轅雄戟交馳道清笳度國門回輿長樂觀校獵上林園行漏移三象連營捴八屯旌搖鶯鵡谷騎轉鳯凰原絶壁蒼苔古靈泉碧溜溫參差開水殿窈窕敞巖軒豐邑模猶在驪宫迹尚存煙松銜翠幄雪徑繞花垣侍從推玄草文章負武賁深仁浹夷夏大造溢乾坤謬忝王枚列多慙雨露恩途經華嶽唐玄宗飭駕去京邑鳴鑾指洛川循途經太華回蹕暫周旋翠崿留斜影懸巖凝夕煙四方皆石壁五位配金天髣佛看髙掌依稀聽子先終當銘嵗月從此記靈仙奉和途經華嶽應制張説西嶽鎮皇京中峯入太清玉鑾重嶺應緹騎薄雲迎霽日懸髙掌寒空映削成軒逰會神處漢幸望仙情舊廟青林古新碑緑字生羣臣願封岱回駕勒鴻名同前張九齡萬乘華山下千巖雲漢中靈宫雖奧密睿覽忽玄同日月臨髙掌神仙仰大風攢峯勢岌岌翊輦氣熊熊揆物知幽贊銘勳表聖衷會應陪玉檢來此告成功同前蘇頲朝望蓮花嶽神心就日來晴觀五千仭仙掌拓山開受命金符叶過祥玉瑞陪霧披乘鹿見雲起馭龍回偃樹枝封雪殘碑石冒苔聖皇惟道契文字勒巖隈早渡蒲津關唐玄宗鐘鼓嚴更曙山河野望通鳴鑾下蒲阪飛斾入秦中地險關逾壯天平鎮尚雄春來津樹合月落戍樓空馬色分朝景雞聲逐曉風所希常道泰非復候繻同奉和早渡蒲津關應制張説蒲坂橫臨晉華芝曉望秦關城雄地險橋路扼天津樓映行宫日隄含宫樹春黃雲隨寶鼎紫氣逐真人東詠唐虞迹西觀周漢塵山河非國寶明主愛忠臣同前徐安貞仙掌臨秦甸虹橋闢晉關兩鄉分地險一曲渡河灣路得津門要時稱古戍間城花春正發岸桞曙堪攀後乘猶臨水前旌欲换山長安回望日宸御六龍還同前張九齡魏武中流處軒皇問道回長堤春樹發髙掌曙雲開龍負王舟渡人占仙氣來河津會日月天仗役風雷東顧重關盡西馳萬國陪還聞股肱郡元首詠康哉文苑英華卷一百七十
