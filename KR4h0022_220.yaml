body:
  text: 文苑英華卷二百二十宋李昉等編釋門二六十五首郎士元三首顧況三首耿湋三首司空曙七首冷朝陽二首李益一首李端三首盧綸六首韋應物四首嚴維四首崔峒二首釋清江三首釋法照二首釋護國一首釋靈一五首釋皎然十五首釋靈徹一首送大德講時河東徐明府招郎士元逺近作一作主人天王城指日邊宰君迎說法童子伴隨緣到處花為雨行時杖出泉今宵松月下開閣想安禪赴無錫别靈一上人前人髙僧本性疑作姓竹開士舊名林一入春山裏千峯不可尋新年芳草遍終日白雲深欲狥微官去懸知訝此心送粲上人兼寄梁鎮員外前人季月還鄉獨未能林行溪宿厭層氷尺素欲傳三署客雪山愁送五天僧連空朔氣橫秦苑滿目寒雲隔灞陵借問從來香積寺何時携手更同登寄江南鶴林寺石冰上人顧況山川重復出集作山山重復重心地暗相逢忽憶秋江月如聞古寺鐘湖平南北岸雲抱兩三峰定力超香象真言攝毒龍風中何處鶴石上幾年松為報烟霞道人間共不容酬揚州白塔寺永上人前人塔上是何緣香燈續細煙松枝當麈尾栁絮替蠶綿浮草經行遍空花義趣圓我來雖為法暫借一牀眠歸陽蕭寺有丁行者能修無生忍擔水施僧況歸命稽首作詩前人化佛示持帚仲尼稱執鞭列生御風歸飼豕如人焉曹溪第六祖踏碓逾三年伊人自何方長綬趨遙泉開士行何苦雙瓶胝兩肩蕭寺百餘僧東㕑正揚煙露足沙石裂外形巾褐穿若其有此身豈得安穩眠獨出違順境不為寒暑還大聖于其一作空中領我心之䖍萬法常空滅無生因忍全一國一釋迦一燈分百千永願遺世知一作智現身彌勒前潛容遍虛空靈響不可傳智慧舍利佛神通自乾連阿若憍陳如迦葉迦􅎶一作檀延左右二菩薩文殊并普賢身披六銖衣億劫為太仙寶塔寶樓閣重簷交梵天譬如一明珠共贊光白圓天魔波甸等降伏金剛堅野義羅剎鬼亦赦塵垢纒乃致金翅鳥吞龍護洪淵一十一衆中身意皆快然八河注大海中有楞伽船佛法付國王平等無頗偏天子事端拱大臣行其權玉堂無蠅飛五月氷凛筵盡力答明主猶自招罪愆九族無白身百花動一作洞嬋娟神聖惡如此物華不能妍祿山一微胡驅馬來自燕宛彼宮闕麗如何犬羊羶苦哉千萬人流血成丹川此輩一作賊之死後鑊湯所熬煎業風吹其魂猛火燒其烟獨有丁行者無憂樹枝邊市頭盲老人長者乞一錢韜照多密用為君吟此篇贈隱上人耿湋世間無近逺定理集作定裏遍曾過東海經長在南朝寺最多暮林集作暮年聊化俗初地却一作即摧魔今日忘塵慮看心義若何贈明公前人來自西竺國持經奉紫微年深梵語變行苦俗流歸月上安禪久苔生出院稀梁間有馴集作川鴿不去亦無機詣順公問道前人此身知是妄逺逺詣支公何法住持後能逃生死中秋苔經古徑蘀葉滿疏叢方便如開誘南宗與北宗寄天台秀禪師司空曙天台瀑布寺傳有白頭師幻跡是羸病空門無住持霜晴看鶴去海夜與龍期永願親瓶屨澄集作呈心得問疑寄凖上人前人昨聞歸舊寺暫别欲經年樵客應同步鄰僧定伴禪後峯秋有雪逺澗夜鳴泉偶與支公論人間自共傳送況上人還荆州因寄衛侍御象前人惠持逰蜀久䇿杖欲一作忽西還共别此宵月獨歸何處山對鷗沙草畔洗足野雲間知有元暉㑹齊心受八關深上人見訪憶李端前人鴈稀秋色盡落日對寒山避事多稱疾留僧獨閉關心歸塵俗外道勝有無間仍憶東林友相期久不還閒園即事寄暕公前人欲就東林寄一身尚憐兒女未成人柴門客去殘陽在藥圃蟲喧秋雨頻近水方同梅市隱曝衣多笑阮家貧深山蘭若何時到羡與閒雲作四鄰贈嶽陽隱禪師前人擁褐安居南陌頭白雲髙寺見衡州石窗湖水搖寒月楓樹猿聲報夜秋講席舊逢沙鳥至梵經初向竺僧求垂垂身老將傳法因下人間逐此遊送臯法師前人江草知寒栁半衰行吟怨别獨遲遲何人講席投如意唯有東林遠法師别郎上人冷朝陽過雲尋釋子話别更依依靜室開來久遊人到自稀觸風香氣盡隔水磬聲微獨傍孤松立塵中多是非送逺上人歸京前人夏臘嵗方深思歸徹曙吟未離銷雪院已有過雲心寒磬清函谷孤鐘宿華隂别京舊遊寺月色似雙一作霜林振上人院喜見賈弇兼酬别集作送賈校書東歸寄真上人李益北風南鴈集作吹鴈數聲悲又集作况指前林是别離集作時秋草不堪頻送遠白雲何處更相期山隨匹馬行看暮路入寒城獨去遲為向集作問東州故人道江淹已擬惠休詩憶皎然上人李端未得從師去人間萬事勞雲門不可見山木已經集作應髙向日開柴户驚秋問敝袍無集作何由宿峰頂窗裏望波濤贈衡嶽隱禪師前人舊住衡州寺隨緣偶北來夜寒集作禪山雪下朝汲竹門開半偈空皆集作傳初盡羣生意未回唯當與樵者杖錫入天台送少微上人入蜀前人削髮本求道何方不是歸松風開法徑集作席江月濯禪衣飛閣猿集作蟬鳴早漫天客過稀戴顒常執筆不覺此身非送常操上人歸江外覲省盧綸依佛不違親髙堂與寺鄰問安雙樹曉求膳一僧貧持呪過龍廟翻經化海人還同惠休去儒者亦沾巾送少微上人入蜀前人瓶鉢繞禪衣連宵宿翠微樹開巴水遠山曉蜀星稀遍識中朝貴多諳外學非何當一傳付道侶願知歸送郢上人歸江南前人落日映危檣歸僧向嶽陽注瓶寒浪靜讀律夜船香苦霧凝山影隂霞發海光羣生一何負臨病别醫王送契元法師赴內道場前人昏昏醉老夫灌頂遇醍醐嬪御呈心鏡君王賜髻珠降魔須戰否問疾敢行無深契何相祕儒宗本不殊夜投終南豐德寺謁海上人前人半夜中集作山峯有磬聲偶逢樵者問山名上方月曉聞僧語下路林疏見客行野鶴巢邊松最老毒龍潛處水偏清願得遠公知姓字焚香洗鉢過浮生寄西巖䛒上人前人過雨閒樓看晚虹白雲相逐水相通寒蟬怨暮野無日古樹傷秋天有風數穗逺煙凝隴上一枝繁果憶山中何年暫别東林友惆悵人間事不同寄皎然上人韋應物吳興老釋子野雪蓋青廬詩名徒自振道心常集作長晏如想兹棲禪夜見月東峯初鳴鐘驚巖壑焚香滿空虛夙一作叨慕端成舊未識豈為疏願以碧雲思方君怨别餘茂苑文華地流水古僧居何當一遊詠倚閣今集作吟躊躇超集作起渡律同居東齊院前人釋子喜相偶幽林多避喧安居同僧夏清夜諷道言對閣景恆晏步庭隂始繁逍遙無一事松風入南軒簡恆璨前人室虛多凉氣天髙屬秋時空庭夜風雨草木曉離披簡牒集作書日云曠文墨誰復持聊因心近集作遇澄靜一與道人期上方僧見集本前人見月出東山上方髙處禪空林無宿火燭夜汲寒泉不下藍溪寺今來三十年送桃巖成上人歸本寺嚴維長老歸緣起桃花憶舊巖清晨雲抱石深夜月籠杉道具門人捧齊糧谷鳥銜餘生願依止文字欲三緘酬普選二上人期相㑹見寄前人本意宿東林因聽子賤琴遙知大小朗已斷去來心夜靜溪聲近庭寒月色深寧知塵外意定後更成吟相里使君宅聽惠澄上人吹小管前人秦僧吹竹閉秋城早在梨園稱主情今夕襄陽山太守座中流淚聽商聲贈别至宏上人前人最稱宏偃少早嵗草茆居年老從僧律生知解佛書衲衣求壞帛野飯拾春蔬章句無求斷詩中學有餘送真上人歸山蘭若崔峒得道雲林下年深暫一歸出山逢世亂乞食覺人稀半偈初傳法千峰又掩扉愛離應不染塵俗自依依潤州送師弟自江夏往台州前人逺客乘流去孤帆向夜開春風江上使前日漢陽來别路猶千里離心重一杯剡溪木未落羡爾過天台送堅上人歸杭州天竺寺釋清江十年勞負笈經論化中朝流水知鄉逺和風惜别遙雲山零夜雨花岸上春潮歸臥南天竺禪心更寂寥送贊律師歸嵩山前人禪客歸山意山深定易安清貧修道苦老友别家難雪路尋溪轉花宮映嶽看到時松塔暮松月向人寒送婆羅門僧前人雪嶺金河獨向東吳山楚澤意無窮如今白首鄉心盡萬里歸程在夢中送清江上人釋法照越人僧體古清慮洗塵勞一國詩名逺多生律行髙見山援葛藟避世著方袍早晚雲門去偎疑應逐爾曹送無著禪師歸新羅國前人萬里歸鄉路隨緣不算程尋山百衲敝過海一杯輕夜宿依雲色晨齊就水聲何年持貝葉却到漢家城訪雲母山僧釋護國森然古崖碧一作巖下淨行一髙一作畨僧松下濾寒水佛前挑夜燈蓮花國土異貝葉梵書能相對空王所一作境無心戀一作問愛憎送洌寺主之京迎禪和尚釋靈一禪門居此地瞻望在虛空水國月未上蒼生如夢中上人知機士瓶一作引錫慰樊籠彼土諸梵衆嗟君揚道風送王法師之西川前人旅遊無近逺要自别魂銷官栁鄉愁亂春山客路遙伴行芳草逺集作草緑緣興集作隨興野花飄計日功成後還將輔聖朝送範律師往果州前人終南千古後獨爾繼卿名離障非今日修因是幾生亂峰寒影暮深澗野流清逺客歸心苦難為此别情送明素上人歸楚覲省前人能將疏懶背時人不厭孤萍任此身江上昔年同出處天涯今日共風塵平一作小湖舊隱一作徑應殘雪芳草歸心未隔春前路倍憐多勝事到家知慶綵衣新贈靈徹禪師前人禪師來往翠微間萬里千峰到集作見剡山何時共到天台裏身與浮雲處處閒送贇上人還京釋皎然久遊春草盡還寄北船歸沙鳥窺中食江雲滿淨衣秦原山色近楚寺磬聲微見說翻經館多聞似爾稀送重鈞上人遊天台前人漸看華頂出幽意尚集作幽賞意隨生十里行松色千重過水聲海容雲正盡山態雪初晴事事將心證知君道可成送清㑹上人遊京前人佳遊限衰疾一笑向西風思見青門外曽臨素滻東峰明雲際寺寺名日出露寒宮宮名行道禪長在看塵不染空送關小師還金陵前人如何有歸思愛别欲難忘白鷺沙洲晚青龍水寺寒蕉花鋪淨地桂子落空壇持此心為鏡應堪月夜看送栖上人之建州覲使君舅前人亂峰江上色羡爾及秋行釋氏推真子郗家許貴甥㲲花新雨靜帆葉好風輕海人以木葉為帆千里依元舅回橈有逺情送沙彌大智遊五臺前人童年隨法侶家世本儒流章句三生學清凉萬里逰雲歸龍沼暗木落鴈門秋長老憶相待傳豫向祖州送契上人前人西陵古江口逺見東陽州渌水不同泛春山應獨逰尋僧白巖寺望月謝家樓宿昔心期在人寰非久留送道琚上人還金陵前人一與鍾山别山中得信稀經年求法後及夏問安歸野實充甘膳池花當綵衣慈親莫返拜外禮欲無違早秋桐廬思歸示道該上人前人桐江秋信早憶在故山時靜夜風鳴磬無人竹掃墀猿來觸淨水鳥下啄寒梨何暇一作可即關吾事歸心自有期聽素法師講法華經前人法子出西秦名齊七道人才敷藥草義便見雪山春護講龍來逺聞經鶴下頻應機如一雨誰不滌心塵山居示靈徹上人前人晴明路出山初暖行踏春蕪看茗歸乍削栁枝聊代札時窺雲影學裁衣身閒始覺隳名是心了方知苦行非物外寂中誰似我松聲草色共忘機湯評事衡水亭㑹覺禪師前人山侶相逢少清晨㑹水亭雪晴松葉翠煙暖藥苖青靜對滄洲鶴閒看古字經應憐叩一作疏關子了義共心𡨕題湖上蘭若示清㑹上人前人峰心惠忍寺嵊頂謝公山何似南湖近芳洲一畝間意中雲木秀事外水堂閒永日無人到時看獨鶴還支公詩前人支公養馬復養鶴率性無機多脫略天生支公與凡異凡情不到支公地得道由來天上仙為僧却下人間寺道家諸子論自然此公惟許逍遙篇山隂詩友喧四座佳句縱橫不廢禪白雲上人精舍尋杼山禪師兼示崔子尚何山道上人前人望逺涉寒水懷人在幽境為髙皎皎姿及愛蒼蒼嶺果見栖禪子潺湲灌真頂積疑一念破澄息萬緣靜世事花上塵慧心空中影清閒誘我性遂使煩慮屏許共林客逰欲從山主請木栖無名樹水汲一作乃忘機井持此一日髙未肯謝箕潁夕霽山態好空月生俄頃識妙聆細泉悟深滌清茗此心誰復得笑向西林永冬送鑒供奉歸蜀寧親釋靈徹林間出定戀庭闈聖主恩深暫許歸雙樹欲辭金錫冷四花猶向玉階飛梁山拂漢分清境蜀雪和煙惹翠微此去不須求綵服紫衣全勝老萊衣文苑英華卷二百二十
