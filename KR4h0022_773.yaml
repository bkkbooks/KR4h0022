body:
  text: 文苑英華卷七百七十四宋李昉等編帝德下無疆頌八首慶鴻名頌一首靈武受命宫頌一首大唐河西平胡聖德頌一首鳳翔出師頌一首降誕頌一首皇帝親庶政頌一首中和節頌一首無疆頌八首李華臣華言伏以漢明帝時徼外蠻夷槃木白狼獻時歌頌德屬事史官况臣自曾祖至臣備國家職員臣又逮事玄宗肅宗今以餘年獲事陛下官歷御史補闕尚書郎命薄多病不獲奔赴闕庭恐先朝露同於泥塵若無歌詩頌德曾蠻夷不若也敢述列聖為無疆頌式昭皇家大慶無窮謹昧死稽首以聞髙祖元頌一昊昊旻天監於下句興有德句維隨之杪時黷陰凝陽潛未登人思照矣雷行龍興蕩濯氛慝文明乎萬國垂仁蒸人載親天監保我子孫巍巍皇皇後之皇丕承之太宗烈頌二髙祖受天命誕興太宗承天之命帝煬昏逾黎民一作人毒痛甚爇于爐甚溺于塗以號以呼呼天無辜髙祖謂太宗爾必有天下爾其訏謨太宗稽首主令二字一作恭受天命臣請滌除張我師撫征四國剪剃羣慝鼓一方三方振一作震驚默照其靈隨顧而平我負我乳我安我成以奉君父以臨天下任忠孝文武建禮章樂舞我雖明德諌則納汝維時一作時維帝降祐之自古明后莫如我德我勛唐無疆天子之無疆本太宗成一作休命髙宗康頌三肇為址為堂實勤實勩一作實勤實勛付俾厥裔丕成后帝帝思不忘神棐靜康不曜而光不求而昌自中方外逹夷荒一作羌瞻我大邦助祭于廟執貢朝于王油油時雲雨厥百榖漻漻景風扇彼嘉榖飴口飽腹以猒以足俾夀而福都阜成天人中宗興頌四屏內一無內字蠆之毒興一作疊而為蝮無一作謀虐天人一無人字之族天祐聖祚五臣柱三字一作八柱將覆帝告五臣保翼朕躬赫赫彤彤日升雲中五臣受命鉞爾頑凶故曰再造我天命一作下生人舞鼓既孤一作成矣又奉父母睿宗德頌五后戚之禍再興其危一作有競競廟祧震怒陰命聖子翼登聖父奮其神旅宵伏金斧金斧一斷一無此四字殄殱逆亂大聖照臨元元宅心歸祚於一作豫有功有德於乎盛德玄宗文頌六丕鑠玄宗之明克孝克仁允武允文宣祖宗之光垂於一作于子孫盛禮畢舉大樂畢陳百蠻來賔元元阜殷戎或不賔悉一作遣師徂征罔不頓顙􅀈於一作于雷霆在漢方昌用刑慘酷中都繫考六萬餘人使者按録誅千萬人然後興王一作其後賢王光武赫赫誅沛賔客以千以百孝明稱賢楚獄連年坐死逮捕以萬以千猶曰漢祚宜長越我宗祖不忍用刑至於玄宗哀彼鈇鑕降為鞭抶誕古萬一作羣國大為屋室醫彼百疾追懷登遐正一作止害禽畜旁為陂池養鱗水族一作養鱗介族既濡既渥昆蟲草木享國五十年宇縣晏然逆臣犯天天念蒸人若曰寧我負耻不忍人戰死乃告元子理兵朔鄙西幸蜀都命元子受圖天下既定父堯子舜歸於一作于國都無不欣愈無不涕濡付一作傳一聖自頥升靈太微嗚呼上聖之道之純不可度思肅宗孝頌七穆穆孝慈有如肅宗之誠逹於一作于神祗爰訓六師震發北陲陵陵雷馳西戎南蠻北狄東夷咸舉其旗佐皇之威帝心天和一作如天無筮無卜一作無筮無欲自一作副然丘嶽破裂氷一作岸谷逆𨽻傾覆朝社大復屆於一作于海之外服以盥以濯以舞以躍帝在東宫孝如文王蒸蒸其思一作心天地知其孝既收鎬洛祀於一作于陵廟奉迎上聖天日普一作並照有凶有孽將噬將齧我旗方設則已顛蹶如燂于一作於雪尊嚴而仁仁覆而嚴大臣小臣莫不潔亷躬勤百度百度如其素今上昭頌八折本文粹作照頌大邦之興維天相之曷興曷則一作相有德繼王昔殷王盤庚武丁昭一作紹登殷明矧我帝唐一作君丕承天命疊引其慶生我皇聖幼沖聖敬實左右肅宗開國即一作御戎羣師稟教舉則成功自西自東如霆如風蕩滌頑一作元凶罔不率從既登天一作大位於變時雍人咸曰上如太宗延億兆斯年延億兆斯祚一無此五字天博地崇一作地慱天崇罔不爾容玄宗元孫象一作為玄宗列文肅宗元子承肅宗孝理慶鴻名頌并序獨孤及唐興百三十八載皇名在宥天下鑄五兵為農器栖萬姓於夀域道證德洽神人以和春正月冢臣上將卿士庶尹洎三老五更公侯伯子男相與揭厲皇猷請增明號上揮無作撝謙而未許也僉曰陛下孝逹神明道超帝先以德則符廣運以時則復太朴以功則保定丕業格于上下而尊稱猶淺鴻名未光億兆之心何戴神祇之望何塞天子向南集作南嚮而讓者九不得已而俞之乃命有司具昭告之禮二月乙酉備法駕朝太清宫飭集作敕宫神以灑掃詔曰集作月將使警蹕雲動天旋至於靈壇報功乎三清祈福乎上玄景戍享太廟用明水越席玉豆雕纂之禮焫蕭以合薌灌鬯以報魂集作報魄神休擁而萬靈接精意陳而六幽感丁亥朝羣臣於蓬萊前殿於是四方人大和會命太尉班五瑞合六樂遂展禮奉䇿虔受大號曰開元天寶二字集本作天地大寶聖文神武證道孝德皇帝是日也解商野之三網受塗山之萬玉大赦天下與人更始協時月同度量贊傑俊書雲物恤髙年禮大祗接天瑞受地釐撫柔萬邦存省其安危遂迎日推策布慶行賜扇薰風調元氣接集作拐千載之大統操三皇之遺珠垂其衣裳與天地合符樂遍禮崇乘輿乃入然後屏椒房而徹黃屋徜徉乎大庭氏之館泊兮凝神沉兮存真想洪崖廣成之倫被衣集作霓裳而下鳳闕蹁躚左右上千萬夀凡遭逢昌運沐浴聖渥而不能頌蒸人賦江漢吉甫仍叔之罪也臣敢有二事乃作頌曰穆穆閟宫敷時繹思天有成命孝孫受之鋪衍下土報功神祗我瑞如山我福孔夷聖敬攸感上玄豈私誕受鴻名載揚緝熙風動雲行雨飛露垂昆蟲昭蘇草木阜滋恭已南面端拱無為集作無為之師柏皇尊盧萬代一時昭假遲遲上帝是祗永錫多祐萬夀無期靈武受命宫頌并序臣聞享天降福一作命維德也戡難奉時維聖也必有非常之運是興撥亂之君一作功以蒼生為憂不以濡足為患以寧濟為業不以修身為道此陶唐所以捨而不畏舜禹所以受而不疑靈武舊宫皇帝躍龍之所日者姦臣竊命四海波蕩一作蕩波我聖皇帝探命厯川文粹作厯命之數啓龍圖作受命或作禪之書付于我皇帝皇帝方一無此字逰崆洞以求至道於是羣公卿士負玉旒金璽望氣于芒碭之野三進于一作於閭閻之中曰臣聞昔在一作在昔蚩尤連禍大盜中國神農之一作氏兵莫能勝之一無之字天降玄女敕軒轅氏大定其災厥後堯有九州之害而命禹禹以四海之功而授舜陛下主鬯大位十有九年精爽者皆美馨香一作德馨乾坤也必聞幽贊玄德上逹景福有歸六聖覩命厯之期兆人有樂推一作臨難之請陛下畏災運而不處棄黎元而不顧以至仁為薄以大寶為輕臣等若不克所請與億兆之衆將被髮撫膺號於天而訴於帝矣皇帝一有為字唯然改容曰豈人心歟丁卯廣平王俶太尉光弼司徒子儀尚書左僕射冕兵部尚書輔國與北軍將士西土耆老萬五千人排闥以訴帝曰今豺狼穴于一作居宫闕陛下兆庶為餌宗社一作廟為墟若臣等懇誠一作誠懇未通是髙祖不歆於太廟且陛下涉渭則洪流涸回鑾則卿一作慶雲見布澤而川地廣勤道而嘉禾生靈祗倣佛玄貺幽感臣聞符命待聖而作天運否終而會葳蕤肸蠁會也睿武英明聖也臣等敢昧死上聞帝乃灑齋宫啓金匱嗚咽拜受詔有司大赦天下改元曰至德元年尊聖父為聖皇天帝一作文武皇帝是日煙雲變作士庶踴躍黃龍見于一作於東野紫氣滿于一作於天門翼一作翌日也數百里衣裳會兼旬也數千里朝貢會踰月也天下兵車會浹時也四方戎夷一作狄會以一旅兼一作成百萬之師率胡夷平社稷之難禮郊祀戴聖皇與人合誠心以氣消天厲一作厲動罔不吉歆無不報是以白鹿擾于一作於王庭靈芝産于一作於延英化動而功成淵唐諱默而頌聲言禪代者陋蒼梧易姓之名語嗣守者著一作羞陶唐積善之辱述戡定者歎四紀而復夏美中興者嗤三六而滅新於戲神祗之所歸往品物之所法象鼓飛龍於尺水仗大義而東嚮矢謨發號實在此一作茲都願篆石宫庭以垂萬古俾過山澤美風雲一作知雲雨之奧窮造化識天地之緼一作爐臣炎稽首敢獻頌曰赫赫河圖啓天之户一作祜雲從億萬皇在九五惟昔陶唐克傳舜禹護也武也夫何足數彼祓者彀一作被祓者惟暴惟貪天實有一即即命人將不堪皇曰內禪于再于三盡武之善去湯之慙兵革一作車百兩洶洶雷震橫會九州為行為陳恃力者踣從凶一作命者盡孝以奉天神而撫運至德唐堯崇功大禹皤皤北叟垂白而覩沛邑空歌周原已古徘徊頌聲永介茲土一作皆唐文粹大唐河西平胡聖德頌并序維唐至德二年春正月武威郡胡洎九蕃夷落內伺師旅之間外合狼豕之凶據金城害州伯蛇變交戟之下炎焚大澤之中二月乙丑皇帝以五命之服詔太僕崔稱總中權專上將誓軍前之士却城下之盟又命內常侍劉日新振鼓鐸之音護羌髣一作戎之長林竦蝟合會于東郊粵庚午髙牙大斾鐵馬長鎩噴以清笳陳以雲蛇位一作此字列于四衝蓬頭執戟鼓以靈鼉逹于逵路趫悍儣猤虎裘㣪臂北陵于土門之隊鈎車雲梯強弩堅楯齊傳一作傳是于西烽之亭於是引熊虎之師仗龍蛇之劒矛戟四起煙塵火色金鼓一振天地徘徊血亂玄黃聲囂瓦屋是風雲皆入陳彼草木盡為兵日月垂照於窮鄉皇靈赫臨於天外名王貴馬大玉文具素女錦衣百金之産萬井之資皆委于入貢之府布于有地之宫是時也干人勇一作踊萬人賀美太階之符見頌偃伯之儀興特進金城太守李萬頃洎五邑長吏軍正大夫等言曰蓋聞王命先天以奉時賢神一作臣是合統以偕運靡垂乎帝録不能撥亂罔應乎間氣不得遭逢故大人之作必先排難以推凶取暴為治唐諱國以任賢仗能為建功磅礴乎六合之下葳蕤乎玄古之上斯軒轅得之以勝蚩尤大夏得之以勝有扈西伯得之去殷伐崇我太宗得之奄有遼東上皇得之克平巨猾陛下得之再清宇宙掃蕩氛孽一作孽允若大唐之新命復髙祖之天下臣等恭惟六聖騰光百有五十祀周賁海宇澤鋪一作鋪敷菌蠢丹穴之賮孤竹之君金罽枯一作括羽委命下吏陛下建大號纘鴻業歸勛祖禰昭事聖皇是必天錫忠良佐成命器之臣所應皇運之統伏崇羽之凶太康西人永永耒裔願篆石志美以為頌云詔虎唐諱臣兮潱天弧載火􅀢兮耀昆吾霽塵壘兮被戎都鳳翔出師一有紀聖功三字頌并序舜有兩階之舞周有孟津之會皇帝有岐陽之搜德莫勤乎安國勛莫配乎立極利萬物莫近乎去暴蓋天啓一作受天元符與人請命宜契相合億兆有歸以昌則感鬼神一作神鬼之心以征則去雲雷之難維唐七葉姦臣大盜於二京皇帝龍鳴於河北觀兵二字一本作親誓於雍上建都發號以朝萬國心嚮天地志通幽明淳精四逹大造玄成於是巢山駕海之羣狼纛鳥章之君不期而趨於闕下四十有三萬元帥廣平王俶太尉光弼司徒子儀等稽首言曰臣聞天啓聖以俟時聖感時而赴難非神功不能當大運非玄德不能合人心故軒轅之道也伏蚩尤宗周之仁也稱襁負陛下之德也大瑞於人和人和而動天天與和合氣百姓因之以獨化四夷因之以子來王師得一作德之以貞勝意者河洛徯怨後東征之期人靈駿奔望西狩之禮天子方齊寶輅講金匱之書翌日霓旌武賁大車之輪黃鉞靈鼉彤弓太阿荆韓楚魏之廣七閩五貉一作僚之長金鼓百萬車從九合大陳於東郊皇帝建白麾以誓於軍中曰維髙祖歆于上天四宗重光照臨下土百有五十祀至於聖皇總武之干戈備文之法象蕞爾逆虜敢迷天紀盜我符璽黷我威靈使四海之內兵革縱橫肝腦塗裂旻蒼降鑒錫命於豫俾纘夏已墜之功寬堯未刑之族於戲余匪玉帛山河是愛惟蒼生之靈一作災害是憂匪天命威力是憑惟人心忠義是保咨爾張目成天羅植髮成千櫓布和成將帥厲氣成風雷若作進退爾惟鐸一作旗鼓若斷首尾爾惟常蛇若戮鯨鯢爾惟干將若拯沉溺爾惟巨艦夏有一旅之衆武有十人之謀一作謨志定金石信非盟誓爾其念哉是時天威動六合兵氣連太白乾坤為之坱北河嶽為之震蕩彼狐鳴鑿齒之徒不崇朝而聲返于謳歌一作返於謳歌形歸于一作於蹈舞者幾過半矣故鄠社之師以形勝灞上之凶以威逐桃林之陳以竒破河洛之孽以氣摧帝乃開天牢回豹尾陵皓氣掃攙搶應龍秉鉞玄女侍坐乃考夏氏配天之義備漢皇建武之典雲髦玉輅山動地踊降自西雍幸于京師萬姓前導百靈為威布德澤望陵寢悲黍稷之將秀覽城闕之為墟以雷雨洗川澤以皇風消怨怒以大賞議勤勞以成功告宗廟以祥刑一作明去聾昧以惠政哀困窮清蹕而奉聖皇稱觴以朝前殿於是東國耆老長安士庶排御路入天庭動千門呼萬嵗煙雲下繞林藪山回神靈頌於堂精魄感於廟侯王慶於國父子合一作洽於家鍾石返於縣罍爼陳於席華戎踴躍喜氣磅礴日退一作非三舍天聲一作齊萬里神謀不得窺其奧天道不能後其時斯一會之略也然後動變化為爐假仁義為塗陶氣象鑿耳目與神合司契以道浸澆漓全犀象之形斷珠玉之脛然後以景星燭夜甘露清氣升閬風對天老捨鴻名以還太素乘大厯而統仁一作人紀俾天一無天字不思而降不祭而歆以元和感生淳古於是宰臣聚而言曰主上以神武清難至德遂人崇勛絶瑞光照萬古開闢日月于今六年百姓豈忘力於帝乎人臣盍謝生於天乎請相與鑿石于誓師之場告成于會一作於得衆之地斯王道之盛典臣炎稽首敢獻頌曰天命帝兮蕩祅一作矢昏交風雨兮會秦門推聖德兮漫海外五單于兮勇士會俗鳥獸兮家雲島越浮山兮乏青草徴羽騎兮列天營啓金門兮賜長纓日為車兮雷為鼓醢鯨鯢兮掃煙雨開明堂兮饗文祖帝為皇兮后為母登臺雲一作雲臺兮册玉府篆穹石兮駕終古一作皆唐文粹降誕頌并序于邵皇唐八葉之中興提天綱披寶圖臨八紘俯萬物垂鴻儲休粵十有七年玄冬陽月旬外三日天子居北堂左個受厥初之慶自豫弼臣百官丞令咸歸休浣則歌康衢樂夀域者其百姓之歡心有司諌掌綸之臣當右掖分宵之直望閶闔沐薰風齋心以虔稽首獻頌其詞曰甲觀畫堂繞樞神光十月良月降生我皇焜殊祥兮纘我疑繼文時惟聖勳格苖戡黎為天下君望如雲兮蒼蒼海隅逹我天衢七戎蠢狄西殱北徂外無虞兮白翟遐通嘉禾薦豐兩樹連理五雲飛空歸大同兮金闕峨峨清晨伊何萬國筐篚千門詠歌歆太和兮舜膳以甘堯樽以酣誕彌之朔旬而有三湛恩覃兮南山于前北辰于天臣某獻夀維億萬年象帝先兮皇帝親庶政頌并序吕溫臣聞光宅大寶茂育羣生神而明之必在上聖然則所同者道所異者時或以垂拱仰成或以勵精自致及乎俗躋仁夀理洽時雍弛張之政不殊勞逸之功則倍我皇帝體至化含元精苞乾剛履坤順誕膺駿命恢繤鴻休宣八聖之重光集百靈之奧祉如天之燾如地之容鼓義為雷霆奮仁為風雨斡璇衡而轉七曜懸金鏡而納九圍廓氛沴而川澄沓禎祥而山委昔軒轅氏斬蚩尤滅火帝功至大矣若非仗風后之助受玄女之符未能尅也陶唐氏誅四罪定水災德至厚矣若非大舜之登庸伯禹之盡力未能成也湯以伊尹為相始定殷功武以太公為師乃康周道髙宗紹復資傅説啓沃之言宣王中興賴山甫將明之致集本川粹作政今陛下太康四海雄軼二紀百姓不知其日用羣臣無望於清光二本作風而乃業邁乎前王功髙乎古烈聖作物覩孰知其源竊以管窺天倪蠡挹溟量庶乎大略可得而言焉陛下自代天統物之初則以屈已濟人為意虔臨庶政窮總萬樞四册賢良六親郊祀勤恤於理本盡瘁於生靈詳曠代之所未詳慮列辟之所未慮夏巢異一作景天疑作景昃而方食寒星在而求衣寸陰不捨於論思子夜猶觀乎啓事除一物之患而品類以二作作獲安伸匹夫之寃而庶獄自直一作息棄瑕而録用含垢而宥過小善可紀必拔於宸衷片言有孚不忘於睿聽至如天時之豐約地利之夷險邦賦之盈虛師律之貞暴閭閻之疾苦稼穡之艱難人風之情偽吏理之得失莫不密歸神算潛納皇明雖陰陽不能以氣欺雖神鬼不能以形遁何細而不及何大而不苞何祕而不彰何難而不就猶復登臺念在險之慘聞樂思向隅之情御裘感短褐之寒臨膳憂簞食之餒日慎一日既泰而不自泰既安而不自安兢兢乎業業乎此其所以廣運而有成全功之克舉者也然而感覆燾之恩者欲天之彌髙荷容載之德者欲地之彌厚仰照臨之明者欲日月之彌光微臣被淳風飲玄澤親挹行事親二本作至覩升平憂勞誠難願陛下勉之而已美善誠盡二本作至願陛下保之而已若夫雖休勿休玄默優柔君上之體也遹觀厥成蹈舞頌聲臣下之職也為而不有德莫至焉知而不稱罪莫大焉臣某敢昧死再拜稽首獻皇帝親庶政頌一首其詞曰士師邁德玄元儲慶幽而復曜髙祖受命貞觀致理開元殷盛艱而復康皇帝親政受命維何邈萬斯年親政維何夕惕乾乾天道福謙我則奉天人生在勤我則率先憂堯之心勞禹之形求人之瘼思國之經年亦豐止御膳不馨夜如何其皇寢未寧修文偃武太和氤氲海不揚波天無纎氛鳥章之長椎髻之君會朝明庭其從如雲巍巍崇崇於穆昭融宜播大樂以宣皇風鏗鏘盛德蹈厲二本作舞神功下臣作頌永示無窮中和節頌并序白居易乾清而四時行坤寧而萬物生聖人則之無為而無不為神唐御宇之九葉皇帝握符之十載夷夏咸寧君臣交欣有詔始以二月上已日為中和節自上下下雷解風動翌日而頒乎四嶽浹辰而逹乎八荒於戲中和之時義逺矣哉惟唐之興我神堯子兆人而基皇德太宗家六合而開帝功玄宗執象而薰仁夀之風代宗垂拱而阜富庶之俗舄奕乎赫赫煌煌八聖重光以至我皇我皇運玄樞陶淳精治二唐諱定而化成嗣昊極於穆清納黔首於清平集作升平于時數惟上元嵗惟仲春皇帝穆然居青陽太廟命有司考時令以為安雍芽養幼小緩刑獄布慶賜蓋百王常行之道未足以啓建天地之化發揮宗祖之德乃命初吉肇為中和中者揆三陽之中和者酌二氣之和其為稱也大矣非至德集作聖疇能建之於是謀始要終循義討源于以九八節而七六氣排重陽而拉上元煦元氣于原集作厚壤則幽蟄蘇而勾萌逹憶和風于窮荒則桀鷔化而儣俗淳垂萬祀以攄無窮被四表以示大同于時兩儀三辰貞明絪緼千品萬彚熙熙欣欣繇是文武百辟僉拜首而揚言曰大哉睿德合於玄造又曰若在唐堯敬授人時垂於典謨降及周文在鎬飲酒列于雅頌斯蓋欽若四序凱樂一方而已未若肇建令節混同天下澤鋪動植慶浹華夷若斯之盛歟蓋聖人之作事必導逹交太幽贊亭育與元化合其運與真宰同其功丕體哉其至矣賤臣居易忝濡文明之化就賔貢之列輒敢美盛德頌成功獻中和頌一章附于唐雅之末頌曰權與胚渾玄化集作黃既分煦嫗絪緼肇生蒸民天命聖神是為大人大人淳淳為天下君巍巍我唐穆穆我皇纂承九葉臨照八方四維再張兩耀重光齷齪唐虞趢趗一作超越羲皇乘時有作煥乎文章乃建貞元以正乾坤乃紀吉辰以殷仲春吉辰伊何號為中和和為大和中維大中以暢中氣以播和風萌芽昆蟲昭蘇有融如幹玄化如運神功集有於戲二字德浹道豐萬邦來同微臣作頌垂裕無窮文苑英華卷七百七十四
