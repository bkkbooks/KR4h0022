body:
  text: 文苑英華巻七百十八宋李昉等編餞送一秋日登洪府滕王閣餞别序一首秋日楚州郝司户宅遇餞霍使君序一首秋日餞别序一首冬日羈游汾陽送韋少府入洛序一首越州永興李明府宅送蕭三還齊州序一首感興奉送王少府序一首江寕吳少府宅餞宴序一首送李十五序一首送白七序一首送劼赴太學序一首送宇文明序一首秋日餞尹大官序一首秋夜送閻五還潤州序一首秋日餞陸道士陳文林序一首登薊城西北樓送崔著作入都序一首送崔融等從梁王東征序一首秋日登洪府滕王閣餞别序王勃豫章一作南昌故郡洪都新府星分翼軫地接衡廬襟三江而帶五湖控蠻荆而引甌越物華天寳龍光射牛斗之墟人傑地靈徐孺下陳蕃之榻雄州霧列俊采一作彩星馳臺隍枕夷夏之交賔主盡東南之美都督閻公之雅望棨㦸遥臨宇文新州之懿範襜帷暫駐十旬休假作暇勝友如雲千里逢迎髙朋滿座騰蛟起鳳孟學士之詞宗紫電青霜王將軍之武庫家君作宰路出名區童子何知躬逢勝餞時唯九月序屬三秋潦水盡而寒潭清煙光凝而暮山紫儼驂騑於上路訪風景於崇阿臨帝子之長洲得天一作仙人之舊館層巒聳翠上出重霄飛閣翔一作流丹下臨無地鶴汀鳬渚窮島嶼之縈迴桂殿蘭宫即一作列岡巒之體勢披繡闥俯雕甍山原一作源曠其盈視川澤紆一作吁其駭矚閭閻撲地鐘鳴鼎食之家舸艦彌津青雀黄龍之軸雲一作虹消雨霽彩徹區明一作雲衢落霞與孤鶩齊飛秋水共長天一色漁舟唱晩響窮彭蠡之濵雁陣驚寒聲斷衡陽之浦遥襟一作吟甫作俯暢逸興遄飛爽籟發而清風生纎歌凝而白雲遏睢園菉竹氣凌彭澤之樽鄴水朱華光照臨川之筆四美具二難并窮睇盼於中天極娛游於暇日天髙地逈覺宇宙之無窮興盡悲來識盈虚之有數望長安於日下目一作指吳㑹於雲間地勢極而南溟深天柱髙而北辰逺闗山難越誰悲失路之人溝一作萍水相逢盡是他鄉之客懐帝閽而不見奉宣室以何年嗟乎大運不窮一作時運不齊命途多舛馮唐易老李廣難封屈賈誼於長沙非無聖主竄梁鴻於海曲豈乏明時所賴君子見機一作安貧逹人知命老當益壮寕移一作知白首之心窮且益堅不墜青雲之志酌貪泉而覺爽處涸轍而相一作猶懽北海雖賖扶摇可接東隅巳逝桑榆非晩孟嘗髙潔空餘一作懐報國之情阮籍猖狂豈効窮途之哭勃三尺微命一介書生無路請纓等終軍之弱冠有懐投筆愛一作慕宗慤之長風舍簪笏於百齡奉晨昏於萬里非謝家之寳樹接孟氏之芳隣他日趨庭叨陪鯉對今茲一作晨捧袂喜托龍門楊意不逢撫凌雲而自惜鍾朝相一作既遇奏流水以何慚嗚呼勝地不常盛筵難再蘭亭巳矣梓澤邱墟臨水一作别贈言幸承恩於偉餞登髙作賦是所望於羣公敢竭鄙懐恭疏短引一言均賦四韻俱成請灑潘江各傾陸海云爾一無此十字秋日楚州郝司户宅遇餞霍一作崔使君序前人上元二載髙和八月人多汴北地實淮南海氣近而蒼山隂天光秋而白雲晩川塗所亘郢路極於崤潼風壤所交荆門洎於吳越憑勝地列雄州城池當要害之衝寮宷盡鵷鸞之選昌亭旅食悲下走之窮愁山曲淹留屬羣公之宴喜披鶴霧陟龍門故人握手新知滿目飲崔公之盛徳果遇攀輪慕郝氏之髙風還逢解榻接衣簪於座右駐旌棨於城隅臨風雲而解帶眄江山以揮涕巖楹左峙俯映𤣥潭野逕斜開傍連翠渚青蘋布葉亂荷芰而動秋風朱草垂榮雜芝蘭而涵晩液艤仙舟於石岸薦綺席於沙塲賔友盛而芳樽滿林塘青而上筵肅琴歌迭起俎豆駢羅煙霞充耳目之翫魚鳥盡江湖之賞情槃樂極日暮途遥思染翰以凌雲願麾戈以留景嗟乎素交為重覺老㓜之同歸朱紱儻來豈榮枯之足道且欣風物共悦濠梁齊天地於一指混飛沉於一貫嗟乎此懽難再殷勤北海之筵相見何時惆悵南溟之路請揚文筆共記良游人賦一言俱成四韻云爾秋日餞别序前人黯然别之鎖魂悲哉秋之為氣人之情也傷如之何極野蒼茫白露凉風之八月窮途蕭索青山白雲之萬里奏鳴琴則離鵾别鶴驚岐路之悲心來勝地則時雨凉風助他鄉之旅思琴書人物冀部闗西去馬歸軒雲間日下楊學士天璞自然地靈無對二十八宿禀太微之一星六十四爻受乾坤之兩卦論其器宇滄海添江漢之波序其文章𤣥圃積煙霞之氣幾神之外猶是卿雲陶鑄之餘尚同嵇阮接光儀於促席直覩明月生天響詞辯於中庭但覺清風滿室悠哉天地含靈有喜愠之容丘也東西悵望積别離之恨煙霞直視蛇龍去而泉石空文酒求朋賢俊𣪚而琴歌斷門生餞别如北海之郡前高士將歸似東都之門外研精麝墨運思龍章希存宿昔之資去啟相思之詠冬日羈游汾陽送韋少府入洛序前人游汾勝壤樓船髙漢帝之詞卜洛名都城邑辨周公之跡仰天文而窺日月雖共光華憑地理而考山川即殊南北韋少府玉山四照珠胎一色縱横振鋒頴之才吐納積江湖之量子雲筆札擁鸞鳳於行間孫楚文詞列宫商於調下牽絲一命披林野而隨班考績三年指蘭臺而赴選移征駕背長亭地隔風煙人離嵗月闕既同斟桂之歡一作飲岐路風塵即斷驚蓬之思下官詩書拓落羽翮摧頽朝廷無立錐之處邱園有括囊之所山中事業暫到漁樵天下棲遲少留城闕忽逢萍水對雲雨以無聊倍切窮途撫形骸而何託于時氷霜裂地星象迴天朔風動而闗塞寒明月下而樓臺曙各題一字傳之兩鄉云爾越州永興李明府宅送蕭三還齊州序前人嗟乎不游天下者安知四海之交不渉河梁者豈識别離之恨松枝一作杖薜衣琴樽為得意之親臨逺登髙煙霞是賞心之事有梁孝王之下客僕是河南之南孟嘗君之上賔子在北山之北幸屬一人作寰中之主倐疑作翛然四皓為方外之臣俱游萬物之間相遇三江之表許𤣥度之清風朗月時慰相思王逸少之脩竹茂林屢陪歡宴加以恵而好我攜手同行或登吳㑹而聽越吟或下宛委而觀禹穴良談落落金石絲竹之音輝雅智飄飄松栢風雲之氣状當此時也嘗謂連璧無異鄉之别斷金有好親之契生平於張范之年齊物於恵莊之嵗三光迴薄未殫投分之情四序循環詎盡忘言之道豈期我留子往樂去悲來横咽水而東西緒愁雲於南北况乎泣窮途於白首白首非臨别之秋一作愁嗟岐路於他鄉他鄉豈送歸之地蓐收戒序少昊司辰清風起而城闕寒白露下而江山逺徘徊去鶴將别蓋而同飛斷續來鴻共離舟而俱泛古人道别動便經年今我言離㑹當何日山巨源之風猷令望善佐朝廷嵇叔夜之潦倒麤疎甘從草澤行當山中攀桂往往思仁野外紉蘭時時佩徳人非桃李豈得無言子免疑簫韶當湏振響勉酌傷離之酒具陳感别之詞各賦一言俱題六韻感興奉送王少府序前人八十有遇共太公晩官未遲七嵗神童與顔回早死何益僕一代丈夫四海男子衫襟緩帶擬貯鳴琴衣袖闊裁用安書巻貧窮無有種富貴不選人高樹易來風幽松難見日羽翼未備獨居草澤之間翅翮若齊即在雲霄之上鳥衆多而無辨鳳馬羣雜而不分龍荆山㸔刖足之夫湘水聞離騷之客人貧才富罔窺卿相之門貌弱骨剛豈入王侯之宅王少府北辭伊闕南登湎山過我貧居飲我清酒一談經史亞比孔先生再讀詞章何如曹子建山岳藏其跡川澤隠其形一旦覩風雲千年想光景孔夫子何湏頻删其詩書焉知來者不如今鄭康成何湏浪注其經史豈覺今之不如古王少府乃可畏後生學問人也各為四韻共寫别懐江寕吳少府宅餞宴序前人蔣山南望長江北流伍胥用而三吳盛孫權困而九州裂遺墟舊壤百萬里之皇城虎踞龍盤三百年之帝國闕連石塞地實金陵霸氣盡而江山空皇風清而市朝改昔時地險嘗為建業之雄都今日太平即是江寧之小邑吳生俊宷輔佐烹鮮我輩良游方馳去鷁梁伯鸞之逺逝自有長謡閔仲叔之遐征欲逢厚禮臨别浦枕離亭陣雲四面洪濤千里簾帷後闢竹樹映而秋煙生棟宇前臨波潮驚而翔一作祥風動嗣宗高嘯緑軫方調文舉清談芳樽自滿想衣冠於舊國便值三秋憶風景於新亭俄傷萬古情窮興洽樂極悲來愴零雨於中軒動流波於下席嗟乎九江為别帝里隔於雲端五嶺方踰交州在於天際方嚴去舳且對窮途玉露下而蒼山空他鄉悲而故人别請開文囿共瀉詞源人賦一言俱題四韻送李十五序前人夫人生百齡促膝是忘言之契丈夫四海交頥非贈别之資然乃想山川之遽違送歸將逺惜嵗年之不待行樂無時於是輟離騷以少留敞幽亭之多暇山芳襲吹疑居蘭室之中水樹一作榭含香宛似楓江之上御溝新溜近入離絃賔館餘花遥催别酒既而榮波東注灞㟁南登浮蟻傾而髙宴終飛鳥一作踆鳥落而離宫𣪚雖相思為贈終結想於筆滋而素賞無暌蓋申情於麗藻人為四韻各賦一篇送白七序前人天地所以間南北山川所以别風雲陽舒隂慘覺造化之為勞日運星迥恨良辰之不定白七官天台傑氣地乳一作蘂竒精當益友之龍頭處通侯之鷰頷靈珠耀掌是琴酒之文人長劍横腰即風雲之烈士屬天象掩峻帝道徴竒吐闕之珠玉作朝廷之鸞鳳寰中握手得希代之英靈天下傾心盡當年之意氣整秋駕駐春装背横溪之七曲對長亭之十里中情易感下調多愁送君當東陸之前逢我在北風之别嗟乎良友不追神交巳逺同人者少方見阮籍之眼青知我者稀不學馮唐之首白唯當遜游絶壑旅悲空山幽桂一叢賞古人之明月長松百尺對君子之清風既而花鳥争飛烟霞競集青山髙而望逺白雲深而路遥貴余以道誰能著後五千言贈子以言空有離前四十韻送劼赴太學序前人今之游太學者多矣咸一切欲速百端進取故夫膚受末學者因利乗便經明行脩者華存實爽至於振骨鯁之風標報賢聖之言懐逺大之舉蓋有之矣未之見也可以深慕哉且吾家以儒輔仁述作存者八代矣未有不久於其道而求苟出者也故能立經陳訓删書定禮揚魁梧之風樹清白之業使吾徒子孫有所取也大雅不云無念爾祖易不云幹父之蠱書不云闕詩不云不如友生四者備矣加之執徳𢎞信道篤心則口誦廢食忘寝渙然有所成望然有所伏然後可以託教義編人倫彰風聲議出處若意不感慨行不卓絶輕進苟動見利忘義雖上一階履半級何足恃哉終見棄於髙人但自溺於下流矣吾被服家業霑濡庭訓切磋琢磨戰兢惕勵者二十餘載矣幸以薄伎獲蠲戎役嘗恥道未成而受禄恨不得如古君子四十强仕也而房族多孤飦粥不繼逼父兄之命覩饑寒之切解巾捧檄扶老㩦㓜今既至於斯矣不蠶而衣不耕而食吾何徳以當哉至於竭小人之心申猶子之道飲食衣服晨昏左右庻幾乎令汝無反顧憂也行矣自曖游必有方離别咫尺未足耿耿嗟乎不有居者誰展色飬之心不有行者孰就揚名之業籩豆有踐菽水盡心盍各賦詩敘離道意云爾餞宇文明序前人昔者王烈登山林泉動色嵇康入座左右生光豈非仙表足以感神真姿可以錯物况我巨山之凛孤出昇華之麗清峙羣公之好善下官之惡俗接霓裳於勝席陪鶴轡於中軒俱抜闕之標各仗専門之氣煙霞用足江海情多言泉共秋水同流詞鋒與夏雲争長雖易庭載酒方趨好事之游而肆樂含毫請命昇遷之筆同抽藻思共寫離恨秋日餞尹大官往京序駱賔王尹大官三冬業一作懸暢指蘭臺而拾青薛六郎四海情深飛桂樽而舉白于時兎華東上龍火西流劍影沉沉碎楚蓮於秋水金牌照岸秀陶菊於寒隄既切送歸之情彌軫窮途之感重以清江帶地間吳㑹於星津白雲在天望長安於日路人之情也能不悲哉集作乎雖道術相忘叶神交於靈府而風煙懸隔貴申心於翰林請振詞鋒同一作用開筆海人為四韻用慰九秋云爾秋夜送閻五還潤州序閻五官言返維桑脩途指金陵之地李六郎交深投漆開筵浮玉斚集作白玉之樽于時璧彩澄虚漏輕光於雲葉珪隂𣪚迥摇碎影於風梧雖桂醑蘭缸暫淹留於一夕而青山黄鶴將惆悵於九秋請勒四言俱伸五際秋日餞陸道士陳文林序陸道士將游西輔康集作通荘指浮氣之闗陳文林言返東吳脩途走落星之蒲於是維舟鏡集作錦水藉蘭葉集作若以開筵絏騎金隄泛榴花而集作於祖道于時赤熛紀節青女司辰霜雁銜蘆舉賔行而候氣寒蟬噪栁帶凉序以愴集作含情加以山接太行聳羊腸而飛蓋河通少海疏馬頰以開津集作瀾登髙切送歸之情臨水感逝川之歎既而嗟别路之難駐惜離樽之易傾雖䝉邑集作漆筌蹄已忘言於道術而陟一作渉陽風雨貴抒情於詠歌各賦一言俱成集作同為四韻庻幾别後用暢離憂云爾登薊城西北樓送崔著作入都序陳子昂僕嘗倦游傷别久矣况登樓逺國銜酒故人憤胡孽之侵邊從王師之出塞元戎按甲方割鮮卑之壘天子賜書且有相君之召而崔侯佩劍即謁承明羣公負戈方絶大漠燕山北望遼海東浮雲臺與碣館天殊亭障共衣冠地隔撫劍何道長謡増歎以身許國我則當仁論道匡君子思報主仲冬寒苦幽朔初平蒼茫天兵之氣㝠㓕戍雲之色白羽一指可掃丸都赤墀九重行欣讌樂集作佇觀獻凱心期我願斯遂集作誠必願斯我遂君集有之字心共有策勳飲至方同廊廟之歡偃霸後漢作伯集作武囊弓借爾文儒之首薊丘故事可以贈言同賦登薊樓送崔子云爾送著作佐郎崔融等從梁王東征序前人古者凉風至白露下天子命將帥訓甲兵將以外威荒戎内輯中夏時義逺矣自我大君受命百蠻蟻伏匈奴舍蒲桃之宫越裳重翡翠之貢虎符不發象胥攸同實欲髙議雲集作靈臺偃白天下而林胡遺孽蓬亂邊甿驅蚊蚋之師怠雷霆之伐乃竊海裔弄燕陲皇帝哀北鄙之人罹其辛螫以東征之義降彼偏禆猶恐威令未孚亭塞仍梗乃謀元帥命佐軍得朱邸之天人乃黄閣之元老廟堂授鉞鑿門申命建梁國之旌旗吟邉庭之簫鼔東向而拜北首集作道長驅霓旌集作蜺旄羽騎之殷戈翻落日突鬢䝉輪之勇劍决浮雲方且獵火九都窮踏冐頓存肅慎弔姑餘徬徨赤山巡御日域以昭我王師襲天討也嵗七月軍出國門天晶無雲朔風清海時比部郎中唐奉一考功員外郎李迴秀著作佐郎崔融並叅帷幕之賔掌書記之任燕南悵别洛北思歡頓旌節而少留傾朝廷而出餞永昌丞房思𤣥衣冠之秀乃帳蕙圃席蘭塘環曲榭羅羽觴寫中京之望縱候亭之賞爾乃投壺習射博奕觀兵叩一作鏜金鐃戞瑶琴集作林歌易水以慷慨奏闗山以徘徊頽陽半林微隂生一作出座思長風以破浪恐白日之蹉跎酒中樂酣㧞劍起舞則已氣横遼碣志掃獯戎抗手何言賦詩以贈文苑英華巻七百十八
