  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0022_WYG_529-1a, image: WYG1337/WYG1337-0816c.png}
body:
  text: 文苑英華卷五百三十宋李昉等編商賈門十八道貨有滯於人用判一道買賣不和判一道均市判一道犯憲罰判一道斷錦繡判一道市賈為胡貨判一道鬻繒不利度木為業判一道陶人判一道旊人判一道行人供濫物判一道和市給價判一道於市驚衆判一道水石類銀判一道熟羌市易判一道真臘國人市馬判一道避市籍判一道率家屬籍名田判一道稅商判一道貨有滯於人用判貨有滯於人用者甲不時而買請賒之所由不與云不過旬日勒從其主云已從其有司對貨有廢居政惟通變以收以斂實著於周經或與或求蓋存乎易象苟罔率厥典則其誰曰然伊甲者何不時而買屬蘋蘩有薦霜露盈懷家迫屢空曷求仁者之粟國崇救乏爰假所由之貨理宜給茲稽市遵彼貿遷期不過旬將貧窶之是恤勒夫從主豈出納而為吝異乎市吏孰曰均官且濟俗利人操贏善貸誠為體國之要亦取隨時之宜如存理而無傷何飾詞而不與遂使開倉長孺徒歸美於漢庭餼粟子皮獨垂芳於鄭志請辨而以授無質以為疑仍旌泉府之規用徴國服之息儻從愚見庶為式臧買賣不和判乙買賣不和鄣固以取財科杖罪郡以盜論乙並不伏對必藉美言爰資善價化其小大是等精粗乙之蚩蚩參市為業取諸噬嗑乃競錐刀既不我虞遂成爾詐惑亂為意髙下在心覽文惠之書漏略豈宜免罪披蕭何之律鄣固安得無辜縣吏守文加杖刑而為當郡僚無智寧以盜而深疑請據明文斯為適理均市判乙以赤金稽市為業對闕犯憲罰判闕對分地而經立儀三市陳政以禁會商百族雖負販而有尊故質劑以結信莫不同其度量别以精粗荒禮無征圭璋不鬻君平閲隱取給成都之錢漢武沉魂即覩茂陵之碗甲託茲闤闠徇彼盈虛耀邉鄙以為心雜良楛而成務稱無二賈未偶迹於神仙坐陷三章遂沉名於罪網至若憲罰徇罰中刑小刑既分夥於旗亭固非繆於圜土主司董訓未盡甄明舉而罰之雖則罪人斯得哀而喜也有爽惟刑恤哉且播肆之條誠其過矣示衆人之譴無乃重乎在甲薄言均臘肉之遇毒主司苛政實刺骨而成寃復即命渝改之為貴義不可辱事當小懲宜麗本愆用申典正斷錦繡判河南府凖勑斷錦繡違式之物遂并斷布帛精粗之異者市胥訴云妨商旅御史劾府擾人對詢于國章經綸有序思我王度軌物無愆苟不率常職司是舉翼翼京邑作式四方固當棄華敦素亦以提綱正物欲使錐刀之末濟人不競精粗之制周經是法蓋以事屬公家使之無爽杜其不軌理亦何乖然市胥以妨商薄言御史以擾人致劾隨時之義抑即有之經邦大體宜從府見市賈為胡貨判甲為市賈為胡貨物有犯禁者大理以闌出邉關論罪至死刑部覆云賈人不知法以誤論罪免死從贖對貨以貿遷日中為市化能柔逺天下通商爰詰犯禁之人以明有截之制矧惟一作惟茲市賈實主販夫競彼錐刀當展誡而平肆取諸噬嗑方易有而均無既泉布之攸歸何器用之或異梯山欵塞胡虜初喜其來王懷寶越鄉周官方驗其不物事既告於邉吏罪方書於賈人且觀爾實來則銀錢是入既按其闌出何璽節無憑舉貨既麗於司關附刑當置於圜土一成定法理官可貸其全生三宥是思憲部宜允於從贖鬻繒不利度木為業判丙鬻繒不利度木為業鄰告惰農對利百變法工十易器地平天成罔爾降格為農服賈厥道何常丙市井其心負販為業以貧求富則農不及工朝盈夕虛乃末勝於本提緗入肆見無利於氷紈操斧登山更求材於霜刃去彼取此亦以有之在於四人於時一作時則度木顧惟遷貨何必守株鄰人有言告者非是陶人判市稱陶旊者髺音刮墾薜卜革切曓音剝對惟彼陶者為藝之卑讀邃古之書豈工埏埴異河濵之迹顧學陶匏智不逮於挈瓶心未忘於抱甕莫遇林宗之賞詎為顔闔之逃髺墾若茲姦巧逾露合懲虛器以肅旗亭旊人判甲為旊人鬻髺墾薜曓之器於市人告違禁科之不伏對百族萬商會日中之市範金合土利天下之人是以陶器必良誡其渝濫用器乖度非所貿遷甲畎畝編氓陶旊作業郊泉歸壤已復志於千秋涇水非臨自餘泥一作淤於數斗不作無益未見存誠罔守爾典旋彰矯迹濫居闤闠之地豈成埏埴之功鬻斯薜曓眩乃邉鄙臨財作偽嗟日拙以成勞於義且忘喻雲浮而何取遂使漆園傲吏無任扣歌潁隂逸人難從抱汲同射鮒於井谷敝甕斯聞疑飲馬於重丘毁瓶攸在守不假器雖將智者之謀灌若漏巵終匪居人之用不軌不物既為亂正之流刑期無刑難從緩刑之義行人供濫物判官市納帙行人將濫物供所由揀退云被頡頏不伏却領對四人異業百工居次事有資於軍國理無隔於纎微納帙所成多慙美質緝叢殘於鴛綺同衆製於狐裘行因針縷之工坐得煙霞之迹雖逺殊於法物遂有入於官須但物異新成幸非科作論市唯應見物論濫寧可别求物既不任供官退亦何成頡頏不伏却領仍事薄言豈可加刑終希理遣和市給價判和市緒帶凖法合即給價直少府監以稍入供之對聖人有作鬱為令典車服禮器貴賤有班文物彩章髙下無濫我君開運朝儀式序敦朴素之風無虛麗之飾錦文不鬻於肆冠珮必加於賢而鞶厲沓光事華往來鑾蕤靄飾理煥前古瞻彼緒帶有標令則官所云市法乃酬傭盍亦采均輸之餘濟鹽鐡之潤焉可減兹稍廪以虛國財靜言所司或匪通論於市驚衆判乙於市驚衆擾亂對日中為市天下攸集貿絲抱布虛往實來士馬星繁寶貨山積君平卜肆推步自資相如酒筵朝夕牟利乙識非賢逹情昧憲章闤闠少遊未見閲書之美旗亭之下自貽恐衆之愆一等事源不可開恕三尺律令請置嚴科水石類銀判嶺南村洞間百姓水石大小類銀因忿爭打戾按察使科由縣令罪訴云因市易不伏對閩甌地隔粵嶠天嶮五鄰為里辨方言之異華三品稱金徴土物之惟錯禮不變俗市貴從宜貿遷海壖集朝夕於泉寶交易嶺徼得關石於他山義在隨時更法於易弊各得其所和均於類銀既來謀於我人有殊抱布俄必事於彼衆暫似遺錢打戾為嫌窒惕興訟軺軒按罪瞻繡服之增華邑宰移風聼琴堂而未靜置之於理孰謂非宜熟羌市易判當州熟羌十月來導江縣市易按察使科彭州刺史罪訴云並蠶岸外不伏對當州導江山川雖間貿絲抱布來往是常矧今赤羽開元黃旗啓聖布堯心於萬國復禹迹於九州書等同文車無異軌雖夷夏殊俗而交易何妨趙璧尚入秦庭楚材猶歸晉用使人志清天下望重星軒標一作膺鐡柱之嚴班握金龍之使節未聞從善翻見求瑕鳥隼為旟有虧於正直鷹鸇逐雀稍涉於煩苛事不可詢期乎勿用真臘國人市馬判真臘國人來云於峯州市馬御史科安南都護罪訴云為相知捉搦陸路不伏對惟德動天無逺不屆北極燭龍之國屈膝稱臣南窮火鼠之鄉傾心向一作慕化眷茲真臘早挹淳風自昔雷同由來霧集豈假鑄銅之力無勞刻石之銘所以來往邉州市馬峯部論其由緒未乖從有之方驗以逗留豈爽求無之道御史職惟激濁志在揚清疑彼姦非欲嬰羅網都護為相知捉搦先有稟承濫投一靣之科寧杜三緘之口向若邉烽變擾論情不可免辜今既市馬往來據理難書厥罪御史科結有謝於彈珠都護有詞無慙於辨璧宜依薄訴用叶通途避市籍判大理稱人多避市籍逺役自陷於圜土所以每年旨條别有處分不得如律若依旨則此刑將措若依法則無以代更請省定對禆販所興聞乎往代入四人之伍𨽻九市之籍邪贏所尚錐刀必爭曽不昏於作勞從乘時以射利故漢之定法禁其未淫秦之設規謫以邉戌發號施令豈徒然哉且民唐諱者曰氓懵夫立理避要荒之征役棄父母之版圖雖欲利於飄蓬終見陷於圜土國家罪惟寧失德存好生濟寬猛於隨時審科條於庶慎大哉至化刑措其宜但能峻以隄防明其教令則有符古之道無遺一作其代之更政在養民唐諱何須如律率家屬籍名田判甲於鄉里率家屬籍名田乙告甲是賈人犯令沒入田甲訴云無市籍不伏對道設彛倫用和萬物法垂禮典以制四人故版築隄防各順流而取濟導逹群品咸徇義以取功甲本是市徒早馳聲於鮑魚之肆更率家屬復求潤於龍鱗之田廣事兼并以取浮雲之利專行欺詐曽無多露之嫌商賈蓋藏已聞辜於漢律籍書携二詎免咎於湯羅乙告沒田自得埋梧之術甲云不伏猶迷食椹之思此而不科刑章徒設請援明法用靜姦流稅商判乙為吏請稅商以勸農或云稅重時物倍貴則商不失利人受其弊對食哉人時農乃國本受利班爵必資敦勸茍昧茲道其惟謬官乙隨牒下車彈冠蒞職蠢茲商賈嗟彼耕桑茍征稅之匪差則黎氓之獲乂况鬻良雜楛豈販夫之可矜霑體塗足實農人之是愍故可經其壟畝重以郛㕓將趨本而棄末杜惟利而是視所以時入芻藁嵗課田租人必樂康俗寧凋瘵類信臣之仕漢姑正溝塍殊晏嬰之相齊爰知屨踊必若誅求無度杼軸其空乃利晉以闕秦是瘠魯而肥把或云之訟今則未詳停入托實式將丕蔽文苑英華卷五百三十
