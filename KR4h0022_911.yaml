body:
  text: 文苑英華卷九百十二宋李昉等編職官二十都督二瀘州都督王湛碑一首潭州都督楊志本碑一首瀘州都督王湛集作諶神道碑楊炯惟漢高祖應天順人祭蚩尤於沛庭斬大蛇於豐澤則豐沛之豪傑乘於集作慶雲矣惟漢光武龍飛鳳翔舉新市之八千破王尋之百萬則南陽之佐命動於一作于天矣我高祖神堯皇帝以唐侯而建國從晉陽以集作而起兵協和萬邦光宅天下則太原之衣冠有大勳矣公諱湛字懷元太原晉陽人也十一代祖卓晉給事中母常山公主河東有湯沐邑因家焉葬於長夀原故鄉有太原之號皇業伊始公以中涓從事集無事字賜田鄠杜間今為雍州人也昔武王定於下人太子賔於上帝基一作因酆鎬而開國籍神仙以一作而命氏霸則司徒所讓位天子所不臣昶則孝弟於閨門務學於師友豈直橫江斬將南登建業集作鄴之臺土食金溝北徙邙山之宅自茲厥後數百年間國移三統周人共推其代祿家徙五陵漢朝不易其冠冕祖宗邁後魏中書侍郎彭城王府司馬周春官大夫都督晉陽侯祖亮本州主簿司木上士隋贈信州刺史大名革於東魏天命集於西周宗伯所以辨其儀林衡所以平其守父綽秦孝王府掾仁壽宫監離石郡通守晉陽侯皇朝石州刺史逆賊劉武周攻陷郡城因而遇害贈代州總管諡曰烈侯禮也天造草昧王業艱難周師才至於太原蕃兵遂入於離石負户而汲不能定西戎之禍拆骸而㸑不能解南楚之圍仁者殺身以成名事集作君子有死而無二公承聖賢之末代一作代出屬喪亂之𢎞多天子乘輿方清秣陵之氣諸侯斧鉞莫救驪山之烽國有命而何言邦無道而斯隱大業之季本州察孝亷非其好也高祖乃操斗極拜圖書再駕臨於孟津五星合於東井公解衣而濟策杖而行酈食其之長者逢漢祖而長揖袁曜卿之茂才見曹公而不拜從平霍邑授紫金光祿大夫入長安加左光祿大夫歷丞相相國二府典籖參軍事高祖受禪擢為通事舍人通直散騎侍郎封金水縣侯食邑七百户稍遷虞部郎中丁烈侯艱去職尋起為隴西别駕七字集作尋起為西韓泗州治中轉隆隴二州别駕商鄜二州刺史上柱國荆州大都督府司馬冀州刺史定其封邑誓以河山一作山河蕭相立功於萬代留侯決策於千里願持一郡洛陽之任耿純兼攝八州江東之拜陶侃龍朔三年遷使持節都督瀘榮溱珍四州諸軍事瀘州刺史江陽縣地一作郡縣瀘水提封參伐下而為益州岐山上而為井絡尺兵再戢黃昌兩日之歌槃木斯來景伯三年之化功成露冕歲及懸車歎踈廣之知足慕祁奚之請老乾封二年上書乞骸骨詔公祿賜同京官仍朝朔望天子歷吉日協露辰郊上玄祀清廟詔公行太尉事國之大事攝在有司蒼璧黃琮六玉以昭天地路鼓隂竹九變而祠祖考名遂身退居常待終山川則羣望並走星象則中台夜拆春秋九十有三以咸亨三年集作永涥二年七月十七日薨於京師永崇里諡曰敏集有侯字喪事官給賜物三百段粟三百石葬日車服往還有司監護公幼鍾偏罰毀瘠過人八歲讀書至無母何恃廢書慟哭歐血數升逮事繼親孝聞州黨恩深母子比王元之事親夢感天婁集作夫妻等行集作衡卿之至孝年才一紀有若成人吏部薛公見而稱歎穎川之司馬德操早知劉廙譙國之夏侯泰初深歎集作明樂毅兵次霍邑力戰有功高祖嘉之賜良馬一匹進圍京城為伏弩所中高祖臨視賜物三百段流血及屨未絶鼓音左輪朱殷豈敢言病武德之始奉使嶺南馮盎等稽首稱臣獻琛奉集作執贄舍人薛卓遇害北庭詔公責問單于謝罪賜黃金五十斤雜綵二百段南踰漲海北度隂山太中大夫去尉他之黃屋高車使者作胸奴之鐵劵離石之難也枕干而寢見星而行號泣不絶聲者千里水漿不入口者數日同武陵之任襲入構諸羌異河內之張武空持遺劔吳逺由其得銘王裒以之攀柏冀州境內舊多淫祀褰帷按部申明法禁詔書遷秩百姓攀車立廟生祠樹碑頌德亦猶欒巴典郡山鬼潛移張禹牧州江濤不起公出身六十載遺愛二十集作十二州遂罷方嶽之官仍居上台之位始於撥亂伊尹之輔成湯終於太平軒轅之得風后然後拂衣高蹈躬覽載籍著遺誡十八章盛行於代法文王周易之變象尼父孝經之篇窮性命之理盡天人之際莊周著論生也若浮史佚立言沒而不朽越文明元年二月十七日陪葬於獻陵禮也長子朝散大夫行扶風令遐觀等生芻一束泣血三年不踰聖人之禮能行大夫之孝京兆載開其新阡昆吾用昭其舊德百年宫室宛在章臺之東五校軍營依然茂陵之下其銘曰昔在湯武阿衡尚父下及高光蕭何鄧禹皇天眷命赫矣高祖惟嶽降神克生元輔攻城野戰張飛關侯竒策密謀荀彧集作攸賈詡始陪營衛仍參幕府旌節龍沙軒旗象浦出臨方嶽入調風雨其生也榮池臺鐘鼓其死也哀陳兵復土孝乎惟子無父何怙刋石勒銘永傳終古潭州都督楊志本碑嚴識玄惟天子主萬邦家六合內有八揆四嶽外有州牧侯長所以奉若天道綏厥兆人潤飾宏業光發徽頌昔漢宣帝憫歎息之聲晉武皇緝垂拱之化以為統世御俗政平訟理與我共此者其惟良二千石乎於戲楊公德邁其職振文翁黃霸之風粹迪郭賀賈琮之道精底慎財賦而行其禮典肅恭明神而敬事耆耋旌别淑慝卑疑克畏慕可謂其庶乎博施於人而能濟衆者公諱志本字文範𢎞農華隂人也其先出自周姬有伯僑者享封于晉食邑於楊命氏立宗權輿自此矣夫泓源濬泉則派流括地盤基窮闕則峯岑入天是以德富者其胄露繁英多者其族雲蔓故朱輪渥彩通侯震於十人白環深慶太尉傳於四葉天才雄逸自得曹植相推地望增華恥與王珣為比曽祖晉陳內使舍人臨海王府長史開蓬蔣遂交愛等九州刺史武康節公隋贈上開府儀同三司青冀等五州刺史有集行於代有詩入文會集精詞偉賦詭艷瑰音偶鄒陽之曳門代徐邈之居省割圭符於比境異俗知歸聞鼓吹於中霄纍朝加贈大父林甫陳貞威將軍廣州都督隋上開府儀同三司渠芳等五州刺史上郡北平等五郡太守皇朝營州總管絳州刺史上柱國冝春郡公邑五千户自吳飛楚聲軼湛盧從趙入秦價先和氏江南舊國委崇章於大樹關右新君延茂秩於開府既而隋綱就弛唐讖行徴公坐聽蛇分暗一作皓期龍躍同荀彧之去紹來議深根等馬援之辭囂歸陳聚米高祖神堯皇帝深多決勝實念疇庸册命且隆法一作降三光而析壤循良是屬寄千里之專城烈考琮皇朝秦王府庫直太宗文宗文武聖皇帝贈感舊賦一道詩三篇歷茂梓二州長史沔綏二州刺史上柱國叶贊經綸預參康濟耿純自結早申獻帛之誠吳質舊遊時蒙枉騎之眷幡旗長戟門卷紛紛芝蘭玉樹階庭韡韡公吸太和之英液稟高明之淑氣松骨始萌早抱凌霜之操瑶精在璞更爍成虹之彩岐嶷自深惟友一作燮友惟孝蒸蒸然純至日茂豈待乎浸潤之功而後滋也年甫六稔即丁內艱號不輟聲泣下成血絶漿絶粒毀劇成人大連少連曷云克邁自是名韻激射藝實汪洋希風者刮聽而彌仰挹道者洗矚而欣契杜安登學貴戚咸遺其書王粲在門中郎遽倒其履格不期峻而且一作在高標削成量不期深自有天琛水怪施之於夏屋則可以灑桶編櫨棑之於大川則可以衝濤截波矣年三十以右親衛調補石州司法參軍鵬圖未騁鴻漸初升惟敬五行以成三德習于公之待封憲陳氏之特寬樓煩之南咸知審克離石之境自以無寃轉桂州都督府法曹參軍清棘犴察梧囚明慎用法而不留獄都督周道務以公氷襟同潔石性渾堅庇惡木而深恥飲貪泉而不易奏充嶺南市閹口珠玉使侁侁五嶠皇皇百越路窮南服境淑西屠握水衝之錢權御府之産歷剖蚌泣鮫之巨漲窺結緑珊瑚之怪冗自異時魁傑之士以事而臨其地罕有聲背於黷節全其貞將軍北旋猶見猜於薏苡大夫南使亦受遺於金裝而公散國財市蠻寶混之不濁涅而不緇易生人之所難凛然有伯夷之風矣以外憂去職百里而趨三年無改長輿哀一作良苦國主念以增憂次翁服竟郡守逼而方釋服闋授始州司法參軍公九章惟精故三政居理小大必察洽于人心紫蒙軍大使駙馬周道務奏充營田判官考災畬相墳衍申李悝盡力之教行商鞅急耕之賞候采落花動深曳棘故軍賴滋殖人無阻飢轉揚州高郵縣令加朝散大夫遷雍州吳原令道德齊禮風移俗易野翟依馴災蝗折去鑠庫兵以為器彈鳴琴以坐堂淮海之邦衆斯恱矣奏雍州司士邑人斯附矣遷邱州司馬兼庫平軍靈關道度支運糧使一作侯非七羌九兵一作邱時聞暴梗徵師鍊卒式張威防密往通蜀窮關抵駹歷嚴道之邛崍緣漢嘉之折坂滑壤沮塗一作坦寧且疑泉覆淫澍不開莫殊天漏公審搖中算廣蓄邊儲率擔夫竦餽卒膺隒墮一有腸字腹陘危魚頡鳥頏轠轤不絶軍戎以濟豈慙流馬之功才幹方申猶兼展驥之任轉始州長史限以劔閣阻以石門張載勒銘之所范睢通棧之地邑户遷逃鄽里踈寂版籍徒紀征賦缺如公綏之斯懷集之斯至墳無輟享之鬼家有戀本之夫邦國不空既賴王祥之績吾無憂矣實惟蔣濟之能制公檢校棣州刺史俄而東撫叛蕃北寇猖狂鶚鈔虎飛海戚雲拂殘破城邑殺略吏人激傷血於燕冀鋪割觜於恆碣兩河之土崩矣百姓之心搖矣則天皇后有命分麾置懷撲燎班告羣后時惟念哉公拜書雨泣杖節雷驅申畫郊圻慎固封守威以震敵惠以保氓故得境內無柝聲野外無塵影猶祭􅊮之有勇虜不敢窺若李廣之能飛冦恆警避賊平授使持節鄿州刺史蘄州蕪回楚風輕亟機連黃石之山江帶青林之浦公敷國典灑朝恩斟化源撰猷懿鎮動以德闔郡知方息競以義衆事攸教貪殘盡去自使乳虎浮江災疫不生即有牽牛入界尋除都督潭衡等七州諸軍事潭州刺史建麾涉境先求異行停輿決訟應變如神興廢唯降其一書得失每詢於三老且青陽舊城白鷺通浦控引江嶺括集山溪交賀所競冠蓋斯雜示之以無欲盜子恱化以歸農激之以至淳浮客感携而請賦故年景未及於周次風化穆著於衡湘矣公以老浸生危官疲神耗深惟退身之誠頻奏乞骸之表制曰潭州都督楊志本歷官歲久懸車禮及宜遂請老之誠以就歸間之美可聽致仕於是高謝方鎮卷懷條察俶圖輕舸特一作將去江潭言念安車展遊田里而災禽集舍息馬歸山長沙捐夀昊天不弔維長安四年秋八月十七日薨于州館享年七十有七號黎沸境慟庶蔞庭莫不若喪慈親願行衰絰雖倉慈既殁激深慕於圖形郭伋云亡注隤思於配杜亦蔑兹尚矣惟公姿範端凝精符朗秀器含經濟而緯以斯文才抱圓通而幹以洵直𢎞虛受以廣納資用晦以沖謙遊其域則童幼警其卑野賤忘其窶泳其波則驕伐以酌損剛戾以克柔瑰節霜明偉尚煙竦橫德輝以爍邦族鏘嘉聞而滿區縣學成淵海隔風雨而恆觀辨若奔濤鑄鍵機而不發常慕汲黯寧為管仲維迹在公匪懷私已率誠任道深祈利物位愈高而魂益厲績既凝而心更勤食不二味居不重席俸祿必散於孤親車馬共敝於同友實漢元以來未有不若斯人也夫人昌寧郡君河東長孫氏周尚書左僕射鄶國公侯之孫也體備柔間道鍾清懿言而可式動必由禮纎纍不挂於心浮偽豈回其首肅侍巾櫛勉執綋綖邈邈承姑獲茝蘭而必獻拳拳訓子見俎豆而斯寧義渥旁周仁光下逮允釐中事載穆其序端儀麗軌抑不可選歟悲夫朝露未晞雲無處所同辟司徒之室初得賜封在季武子之階終聞許合以大定元年卒於蘄州官舍春秋六十九粵神龍元年八月二十五日合祔於咸陽舊塋禮也田疏畢陌樹鬱平陵立石前傾依然哭鳥之象野墳旁野别為埋鹿之標有子前永州司功景前左勳衛鉉一作鎮等鳳毛齊整一作熠麟角早成孝思既深觀行無缺勤兼叔度遙迎蜀漢之喪潔比濬沖不受源州之贈封樹畢矣晨昏已矣永言報之誠罔極矣將憲乎銘鼎景鍾之迹兹所以昭德紀功之義乃虔集洪懿俾勒于翠石敢旌不朽焉其詞曰龜文爍電龍交先風三軍可指千里易窮疇克光配洪惟我公侯宗磊落襄系豐融世有象賢門傳清白牧守連起采章重赫義叶奉圖寵深同席德邁不匱慶流斯積昭哉嗣服穆穆厥聲恪慎克孝資忠以貞回涯江淮朗節霜橫儒林直秀吏道旁精爰視決曹志清叢棘人有哀淚形無愠色肅傳皇皇飲氷翼翼屢酌貪水寧罹譖薏典農燕塞轉食邛郵稔應銅雀邛來木牛自此康海旋移蔣州人安偉化虜懾雄謀昔離蘄服去思猶詠今鎮湘潭來歌轉盛府吏歸殖江神斷娉辭懇今行恩愈謝病如何迅息不享期頤鷹隨牽旐虎送還輀短矣清室孤魂久婺既詢鄒母雙棺合兹􅐯昧真宅穹崇邱冡客土新封行椒舊拱惟哲嗣兮精孝泣吳天兮思量仰構代兮昆吾琢貞石兮岑竦文苑英華卷九百十二
