body:
  text: 文苑英華卷七十八宋李昉等編樂八吹竹學鳳鳴賦一首笛聲似龍吟賦一首宣尼宅聞金石絲竹之聲賦二首聽歌賦一首歌賦一首歌響遏行雲賦一首善歌如貫珠賦四首吹竹學鳳鳴賦梁洽鳳惟應聖竹乃無情何截彼嶰谷之節而吹象朝陽之聲音韻既生訝嗈嗈而成響宫商間起若鏘鏘以和鳴昔黃帝揆日伶倫制律將分天地之氣以正隂陽之術選碧鮮西域而非妙得厚均二字出前漢律厯志崑山而無匹既翦既伐玉潤之姿是分以噓以吹金咮之聲斯出冠疑作貫四時之貫時之容未改作瑞之思孔將呼吸兮斷而復續疾徐兮抑而更揚散漫於叢篠之間疑郊藪已集飄流於芳林之際謂庭梧來翔此音既舉彼德可序聞軫宫而引商若命儔而嘯侣遂使審音之士睨孤管而生疑考詳疑作祥之人向髙岡而延佇既而合黃鍾制大吕作候不乖於晷刻分時先報於寒暑逸韻蕭寥德音孔昭聆五聲而既備知六氣而能調儻吹於紫閣之前何異巢阿閣之日如發聲於青山之上可繼鳴岐山之朝且鳳聲雖虛竹響有禀伊異質之可用惟聖人而能審五聲並發疑九雛之互鳴衆響難侔覺七音之異品今國家倣不言而四時以遂法無違而萬物如春竹兮任截鳳兮來馴至仁以調乎元氣大信用洽乎生人由是律候以正其惟大聖亦何必取鳳聲之竹然後測隂陽之令笛聲似龍吟賦以聲之相類有如此者為韻笛為樂兮人所吹噓龍為神兮天泉是居何音聲之酷似而性質之本踈想其形謂同婉若聆其響稍異翕如始其伐幹厚地因材制器四孔有加五音具備無煩乎鈞簧促柱有用於娛心滌志乍從容而寥亮究律吕以精粹伊滿堂之咸驚疑在田之忽至凄清韻起方將樂以忘憂想像雲生實曰物從其類庶可以分於繁㑹諒難測於同異徒察其含嚼奔放激濁揚清如泉水之或躍疑御日以飛聲象乎鼉有蓬蓬詩作逢逢之鼓疑乎鳳有嘒嘒之聲雖學如不及莫之與京曷若髙下自乎氣洪衰應乎手曲引如變於雲霄霧雨若集其前後劉纍聽之而欲豢葉公聞之而反走非影響以因依實混合於妙有東南之美厥狀蒼筤不因乎度土合木寧謝於玉質金相調逸簫管之奏音含宫招之祥若降於天如聞於野穆公簡子徒得其逰魂白雪陽春奚稱其和寡考終樂以自然信斯笛之美者當簻易持龍吟似之季長每悲於洛客鄰人能感於子期入耳之初喜攀鱗之有所回眸之際覩截竹而在兹是知夫揮絃戛擊以洋洋轉喉紆餘之靡靡夫神物之相應者無能及此宣尼宅聞金石絲竹之聲賦以聖德千祀發於五音為韻王起魯恭王益宫於孔氏壞宅於闕里聞金石絲竹之聲有六律五音之美清泠始奏異洞庭之載張寂寞而來非鈞天之可視或管或磬以禋以祀徒在廟而見聽豈升堂而足擬當其攝齊而進拾級而前逺近猶惑鏗鏘始傳式感王心聘國無勞乎七十克諧聖域摳衣若化乎三千信不擊而不考實𤣥之而又𤣥惟金也振舂容而無闕惟竹也象吹噓而未歇愔愔擊石如荷蕢之初聞杳杳揮絲疑孺悲之來謁所以表正聲之感所以同古樂之發遐想乎反魯之年追思乎在齊之月回環棟宇繚繞庭除惟恍惟惚皎如繹如心方啓乃樂可依於固將極天而蟠地豈徒舞獸而躍魚疾徐有則清濁不忒非審以知政非作以崇德藏書之壁時繹繹而難分夢奠之楹乍洋洋而未測響雜乎鴻鵠一作殺韻調乎宫羽絲管不形簨簴無覩固可掩歌鐘於二四配莖英於三五及夫鏗爾樂闋油然思深覩奧且驚夫盈耳廣居由是而革心豈不以感上聖之㫖聞至德之音哉皇家始崇儒禮莫先褒聖尊素王之號廣舊宅之敬儻逸韻之再聞播乎樂府之盛第二同前韻許康佐喤喤樂聲瞻言闕里視之不見聽之盈耳宫墻如在可配於鏗鏘德音不忘曷間於年祀猗歟原至樂之作異凡音之起靜而疑深絶而復尋繹如迭奏嘒若同音豈幽通於𤣥造異中出於人心聆其節奏相夫擊拊發和鳴於閫域應流韻於墀廡既嗟乎可得而聞又思乎其所不覩疑一唱之嘆且至於三比衆音之和不容於五莫不動心而駭耳感今而懷古鏘若在懸哀如在絃筍簴無形異和戎之二四聲詩合雅同鼓篋於三千事寧同於想像理實閟於言筌爾其融泄克諧肅雍清越通眀洞幽變化翕忽激數仞以徐來觸兩楹而靜發憑合莫以方奏流𤣥間而未闕故能動心導和嚮皆順正德有符於解愠教實悟一作倍於施令式彰乎不測之神以見乎多能之聖俾恭王之是驚聞斯行諸稽太師之所謂始作翕如且遺音於棟宇寧假手於𤣥虛於是辨清濁節疾徐知笙簧之迭和訝鐘鼓之相於其變無方其來不極靜好交至激揚未息簡子夢中之遇其志則流靈公濮上之音其聲多慝曷若舒嘽緩遵肆直俾夫音聲之道感通咸聽此而為德聽歌賦應魏王教作謝偃君王以政隙務閒披玩餘日闢華軒以遐想臨風庭而自逸於是屏青編收縹帙息柔翰韜雅琴疑作瑟情廓志逺慮靜神謐于時日下梧宫隂清竹殿鮮雲始發光風初扇餘霞未斂殘虹猶見玉斚既陳蘭肴乃薦登龍閣一作閣而騁目臨曲池而游眄於是徵趙女命齊倡動瓊珮出蘭房橫寶叉而耀首靚鉛華而飾粧低翠蛾而斂色睇橫波而流光聲欲申一作伸而含態氣未理而騰芳乍連延二字一作綿連以爛漫時頓挫而抑揚始折宫以合徵一作始析宫而合徵終分角而和商掩餘韻於雕扇散輕塵於畫梁若夫振幽蘭飛激楚俯仰艷逸顧盼容與其繁㑹也類春禽振響而流變其微引也若秋蟬輕吟而曳緒似將絶而更連疑欲止而復舉短不可續長不可去延促合度舒縱有所聽之者慮蕩而憂忘聞之者意恱而情抒歌未終君王乃喟然嘆曰夫樂者所以通神明節情欲和天地調風俗觀往代一作哲之遺風覽前賢之軌躅莫不治亂斯在興亡攸屬是故聖人以為深誡君子以之自勗於是放鄭衛引鄒枚臨廣苑陟崇臺肆東平之樂包天下之才盛矣美矣優哉游哉凡一作皆初學記歌賦并序閻伯璵虞書詩言志律和聲察乎歌以形言聲以導律時其聞見聊因紙以賦曰一作云驗謳歌於樂府戒伶人以迭唱隨轉意合難為形狀始趨曲以熙熙終沿風以揚揚繚繞容與逶迤超暢函五聲之參差極六律之清壯原夫蹈性以純密寬乎率心於悠曠或曲或止如墜如抗盡或可續應而不匱來無悠往去有遺意荆王感而增悲楚妃歎而掩淚察乎靡靡似浮絲以為緒聽乎纍纍若貫珠之為墜括繁言以入節同大道而無器浮而不蕩聚而不盈比擊鼓以作氣尋鳴笛以遣聲亘簫笳之易響亂楚漢之疑兵斷絶齊愛支離帶情或引商刻角或潰渭通涇思彈劍於逆旅念採菱於江汀發河激之慷慨奏滄浪之濁清賦扣角以悽切歎食薇之廉貞於是載賡載揚穨思覆句引韻下散沿源上遡若寒雲凝於沙漠秋風起於燕路情慷慨而為霜氣絪緼而掩露率意縱誕耽聲指顧眷五噫之匪陋遵九章之淪悟委頓飇厲抑揚綿妙啓子均洛北之曲泉客理淮南之調或間以彈絃或雜以長嘯陟降配德登之於郊祀一唱三嘆用之於宗廟至哉但疑其形容淵乎莫見其光耀蹈跡載德流言居要九辨勤於水土二南分乎周召寶鼎見於汾隂天馬來於荒徼徒觀其浩浩嫋嫋渢渢泱泱堯帝繼於虞帝禹跡盡于殷王省周詩於魯䇿欽漢風於沛鄉嗟人命之何幸逢天道之昭彰諒股肱之匪懈載元首之輝光制頌創雅漂齊流商瞽統樂教士符人康展來蘇於日域諧擊壤於皇唐附威儀之濟濟和金石之鏘鏘白雲互進緑水激揚聊以永日歌而無荒歌響遏行雲賦與元氣相合與太虛相雜此雲之所吐納巉岩竒峰蜿蟺真龍此雲之為形容其有含商咀徵節其行止以乖刺於天理然而天無情道無營四時感而運行萬物感而發生茍吾人之感激遂凝思於至精彼天地猶見應况白雲之英英繇是溉與疑作盥心術合和天倪權機不發正性不攜息直氣以足踵激清聲於匏墀四暢一作氣既交五聲大戛以咽喉為管聲以唇吻為椌楬忽頓挫而髙歌遂盤珊於坱圠上如抗下如墜極髙天蟠厚地魚奮鬐鳥騰翅混莽渺而清泠入虛無而密緻彼雲澶漫萬族連延一空出虛無以布濩淹寂寥而鴻濛既如蓋而如馬亦自西而自東歌者於是噬嗑其頥吮吐塤篪氣調萬象口運四時奏羽商而寒光冽冽動角徴而春光熙熙聲欲斷而復續若貫珠之纍纍一成而芳氣初振風篁木韻彼雲尚徘徊希微出入無依若往未定將行不飛再成而逸思奔壯正聲寥亮彼雲漸應曲往來從風下上三成而充塞人寰洋溢無間在水遍水在山滿山彼雲忽應聲赴節雷奔霧集前者山立後者山岌力大不可以動搖噫氣不可以噓吸風北不北風東不東輪囷杳影泱漭長空矗如河漢屹若華嵩天輪轉而不動地籟寂而不窮沈悠悠之寒水浮習習之微風浮沈異勢髙下萬里願一致於青雲亦何階而望此及其調苦聲切歌長意深天乎有耳雲也無心果凝影而不散為歌者之知音是知志同則千里而應不同則造膝而悖谷為律而成暄日因戈而不沒茍精誠之激勵信感應於倏忽則有花裝袨服楚艷陳娥妖姿膩理慢臉橫波珊珊珮玉粲粲垂羅務淫哇之巧笑詫激楚之嬌歌曲未離於咫尺雲已邈於山河假使勢雖回天力雖拔山影則可望雲不可攀思欲騁庸音之靡曼遏仙雲之往還一何難哉向使善亦遏雲否亦遏雲妍蚩一貫邪正不分則善歌者望風而結舌肯闒茸於哀哇之羣哉善歌如貫珠賦以聲氣圓直有如貫珠為韻劉隲妙為曲者暢於情樂為心者和於聲微至儀之難象因貫珠而强名豈不以符雅正契虛盈聆纂纂之音無遺曲折體纍纍之狀取象圓眀方其咀宫商激志氣雖直已而成善亦道和而為貴當發德詠功之際侔照乘之聨輝在一唱三歎之時若呈祥而聚緯其聲既全其質兹一作彌𤣥發皓齒而潛融熠熠隨雅調而暗轉連連間赤水兮虛瑩異滄海兮孤圓動白雪之聲初疑剖蚌度𤣥雲之曲終類投泉是知善臻其極喜可以飾不煩不體乃端乃直赴於節意的皪以交光盛於文想熒煌而化一作比色懿夫歌以心而虛受珠以𤣥而可久表於直而不表於邪貫於心而不貫於手其奏也乃生於自然其闋也復歸於無有掩抑虛徐溫如皎如誠激揚而導志諒璀璨而澄虛所以表和平所以類輝煥陽春為象罔之得緑水乃驪龍之玩知音者誠審其無象無形不知音者徒謂其有條有貫且道以物而相符事有類而形殊擇其善者騰光於瞬息去不善者匿曜於斯須吾將結流徵習綿駒精於曲喻於珠庶賞善而不昧比至寶以無渝第二同前韻趙蕃歌有能者珠有至精既審音於條暢因取象於圓眀由是同其妙得於聲上下皆宜固纍纍之吻一作相合長短中度方一一而混成徵彼深㫖眀乎所謂本潛究於精微終契言於髣佛故永言者以有勇而可保效珍者取無類疑未詳而為貴將察之於衆音信端如於一氣始乃辨直疑作真僞審虛圓顧周流而復舉若的皪以成妍度曲未終或交通而無朕成文不亂喜繁㑹於自然窅窅彌章規規可則侔碧玉而增美寫朱繩而逾直方自理以心故必臻其極清音乍絶寧象罔而斯求雅韻載揚信希夷而自得則知歌之至計於不朽珠之狀符於妙有所以因彼洪纎形於善否昧之不見識遺聲之疾徐象在其中分隂魄於先後是故事之精者有以方諸導延促而麗矣引舒緩而直如聽其真疑自一觚之始舉其可一作正方知三代之餘然則淡以成規端然如貫時發響於杳默每韜光於璀璨求乎寂寞豈殊無脛而臻散彼冥䝉匪同溢目之玩美其聨綿中矩終始相符暢於心信精粗而自異端其本惟小大以無逾足以徵詞於師乙擅美於綿駒儻傾心而一聽殊有類於編珠第三同前韻失名歌者達其志曲者導其情方假象以微妙將類珠而取眀于以遂條暢于以考清貞揚穆穆之音端而陳德審纍纍之節貫以成聲且夫發深誠表和氣惟中規之可法諒徑寸而同貴儼然在上初宛轉以凝旒肅若飄空想熒煌而動緯惟乙所傳宜商有焉溫良則無類於曲含暢則有取於圓雅調相依而瀝瀝清音迭奏而綿綿乍起黃鐘疑蚌開而色爛將吟緑水如浦沉而影連美乎回若循環踈非掩抑聲既發而眀朗珠既貫而絃直九功是闡同在握以騰光三歎屢聞非暗投而改色其曲彌清其音彌久馳熠熠以交映度連連而相受出乎口吻𤣥珠莫覩於可聞入彼虛無象罔雖求而何有故能直已中奮和心外舒咄長言而皎矣務妙轉以繩如聆湛露之終光懸瑞景體橫汾之末目駐神居斯可以正煩濁别流玩陽春續響於孤絶白雪連耀於璀璨雖聞唱以殊聲終合音於共貫是知大雅含象清眀式符曲折而必遵於道周圓而可法於珠俾將繼聲者識乎有曲審音者知我無渝第四同前韻元稹珠以編次歌以一作有繼聲美綿綿而不絶狀纍纍於已二字一作以相成偏佳朗暢屢比圓眀度雕梁而暗繞誤綴網而一作之頻驚響象而然非謂守一作結之以繩約氣至則爾故可貫之以精誠原夫以節為珠以聲為緯漸杳杳而無極以多多而益貴悠揚緑水訝合浦之同歸繚繞青霄環五星以川文粹作之一氣望眀月而宛轉感潛蛟之歔欷若非象照乘之珍安能忘在齊之味其始也長言邐迤度曲纒綿吟斷章而離離若間引妙轉而一一皆圓小大雖倫離朱視之而不見唱和相續師乙美之而謂連當其拂樹彌長凌風乍直意出彈者與髙音而臻極及夫屬思潜一作漸繁因聲屢有想無脛者隨節促而奔走以動激二字一作洞徹為精英比瑕玭於能否次第其韻且殷勤於士衡之文上下其音謂低昂於游女之手窈窕逺矣徘徊繹如髣佛成象玲瓏構虛頻寄詞於章句之末願連光於謦咳一作咳唾之餘清而且圓直而不散方同纍丸之重壘一作疊豈比深泉之撩亂懼無知者初憫默於暗投善則反之乃因循於舊貫美清泠而發越憶輝光之璀璨始終無異細大靡殊中規矩而圓折成條貫以縈紆似是而非賦湛露則方驚綴網一作冕有聲無實歌芳樹而空想垂珠美惡難掩前後莫文粹作不踰亦比掄材之至者豈獨善歌之謂乎文苑英華卷七十八
