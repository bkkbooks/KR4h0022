body:
  text: 文苑英華卷四百十三宋李昉等編幕府二幕府共制授韋審規西川節度副使御史中丞李虞仲崔戎姚向溫會等並西川判官皆賜緋各檢校省官兼御史制白居易勑西川一有南字曰益部地有險府有兵礙戎屏華號為難理故吾命文昌為帥長俾鎮撫焉次命審規為上介俾左右焉又命虞仲戎向會等為庶僚俾咨度焉進言者謂文昌賢而審規輩以才佐賢蜀必理矣夫輟三署吏贊丞相府假憲官職加臺郎暨一命再命之服以遣之其於張大光榮四方征鎮之賔寮不侔矣爾等茍佐吾丞相以善政聞使吾無一方之憂吾寧久遺汝於諸侯乎爾其勉之可依前件授李彤檢校工部郎中充鄭滑節度副使王源中檢校刑部員外郎充觀察判官各兼侍御史賜緋紫制勑萬年縣令李彤侍御史王源中等舜以五長綏四國若今之節制也周以十聮率諸侯若今之廉察也國家合為一柄付有功諸侯故其陪臣選任益重或輟朝籍授簡書者往往而有况承元有大忠於國受重任于外使其承上涖下敬始善終實在庶寮協力以濟今之以彤宰京邑有理劇之用如水在器撓之不濁以源中立憲府有糾正之能如刀發硎割之無滯一可以倅戎事一可以佐軺車二職交修在此一舉臺郎憲吏金印銀章加乎爾身無忝我命可依前件授楊景復檢校膳部員外郎鄆州觀察判官李綬監察御史天平軍判官盧載協律郎天平軍巡官獨孤涇監察御史壽州團練副使馬植試校書郎涇原掌書記程昔範試正字涇原判官等制勑具官楊景復等士君子不患無位患已不立茍有所立人必知之惟爾等六人藴才業文咸士之秀者果為賢侯交辟俾朕得聞其姓名是用各進其秩分授以職若修飾不已籌謀有聞則鴻漸之資當從此始而景復稟訓祗命頗著令稱故因滿嵗特假臺郎古者公臣之良入補王闕朝奬非逺爾其勉之可依前件授李石楊榖集作穀下同張殷衡等官並充涇原判官制勑李石等用武之地曰涇與原合為一鎮控扼夷虜朕授布鉞責其成功布即集作乃祗惕受命思有以自輔者因上言石穀殷衡等學業才識堪置幄中分務列官咸可其請而布憂邊甚切選士必精爾宜各竭所能為知已用可依前件授京兆府司録參軍孫簡可檢校禮部員外郎荆南節度判官浙東判官試大理評事韓似同二字集作似下同可殿中侍御史巡官試正字朝朴一作韓杼可試協律郎推官制前人勑具官孫簡等凡使府之制量職之輕重以命官揆時之逺近以進秩俾等衰有常序遷次有常程則勞逸均而名分定矣簡自登憲司佐相幕既糾天府皆有可稱而似同等亦以文學發身謀畫效用荆揚浙左實藉賔寮况今之公卿大夫皆由此途出慎職祗事爾無自輕可依前件授李承慶鳯翔節度副使馮軒義成軍推官制杜牧勑朝議郎前守太常丞上柱國李承慶等以文學升名於有司以才能入仕於官次諸侯辟之以佐於賔席天子用之以升於朝廷次第等級大小髙下亦與古之鄉舉里選考功試言無以異也爾等皆吾卿大夫之令子弟也清風素範克肖家聲屬詞彤章能取科第既為知已皆為才人賢觀與遊逹視所舉今爾賔主兩皆得之義則進否則退無為美疹疑作疢以求茍容可依前件授白從道東渭橋巡官陶祥福建支使劉蛻壽州巡官等制勑度支東渭橋給納使巡官將仕郎試大理評事兼監察御史白從道等朕以國計出入委於表臣尚書郎當戰伐之餘財穀殫蹶斷長補短以無為有今者上言三吏皆曰周才校其智能足應事役洎守臣貽孫等亦曰祥蛻文學溫慎可在賔階才者得失之端士者功名之本勉於自勵無負知己可依前件授盧藉河東副使李推賢殿中丞髙湜湖南推官薛廷傑桂管支使制勑河東節度副使朝散大夫檢校大理少卿攝御史中丞上柱國盧藉等夫諸侯之任重矣其行道也得以阜俗變俗其行法也得以刑人賞人若張政化得以助業一作宜得所助某等上言咸舉可用藉等或負才氣倜儻不群或以文章䇿名俊秀或有幹局可佐囹圄皆徇所請豫安能知並州追胡王業兹始艱難已來何戰不會長沙始安頗聞旱耗各宜良士以佐賢侯夫直道枉道無他故也取容盡節而已勿慮後患宜竭報知洎殿省佐僚縣道為郡豈曰虛授亦當爾才正霜臺之髙名班藝閣之初命各服寵祿勉於自強可依前件授鄭竭江西判官李仁範東川推官裴慶集作處下同餘山南東道推官處士陳威西川安撫巡官等制勑浙江西道都團練判官將仕郎監察御史裏行鄭竭李仁範暨慶餘等咸以文行䇿名清時諸侯知之命為幕吏少微四星處士毗輔之宿也天之布列在軒轅前此乃天意親近賢良先於妃后威者吾能言之耕延陵之臯荷石門之蓧沉如魚頏集作贊冥若鴻翔非吾賢相爾肯起勉酬知己以壯在野並可依前件授石賀義武軍書記崔涓東川推官等制前人勑朝議郎行祕書省著作佐郎石賀等朕寄諸侯之事重矣大者教化風俗小者惠養黎庶環千里之疆綰三軍之衆講求倚用不五六人守臣公度仲郢所請賀等各以文學決科愷悌干祿觀其褒舉皆是一作有才名能報所知能用可用在爾賔主豫不與焉暨鑲與鈞亦稱智敏神州作掾五庫掌財足展幹能無惰官守可依前件授竇回鳯翔節度副使崔澄觀察判官韓渥節度掌書記等制錢珝勑具官崔澄等漢詔子弟理郡國必擇諸儒有材行者以左右之故韓安國王尊之徒皆能守法相導炯然可觀而顯位髙名終亦自得今朕以汧岐奧壤而輔京師推擇統臨重在藩邸用乃命丞相選賔介於朝而回以術業克官丞相先緒澄以禮義端已實稟天成渥致用於文甚多強力舉是三美濟于一方茍務同心必聞善政吾欲保任親戚表率諸侯往贊理聲日當傾聽爾等亮直勤敬如在諫省郎署時則安國王尊之賢與古相望遷秩命服誠未足多可依前件授保大軍節度判官鄭晦朝散大夫檢校工部尚書觀察支使劉源長檢校刑部郎中節度推官張道樞檢校祠部郎中觀察推官韓伎檢校工部員外郎招討推官髙頎檢校水部員外郎並充職等制勑具官鄭晦等吾鄜畤帥臣盛有忠力於王室其所以輔成勳烈者蓋爼豆之設召置得人言善必行計竒必用而爾等克荷代祿載揚家聲或端敏有為學術自飾尊奬之志斯不忘於善言竒計之聞信有輔成之道爾故八座諸郎銀章朱紱加於幕府遂被薦聞更推共濟之誠兹亦未多之寵可依前件授同州防禦判官崔洎充節度判官長春宮巡官郭璘充掌書記防禦推官王丞雍充節推等制勑具官崔洎等朕以左輔雄近復加節制之權而帥臣舉彼賔寮分其授任且聞洎等各抱美材見善必遷存誠甚直每竭用長之智以匡保大之謀郎署金章吾又何愛噫論兵有略為政有經參佐不渝寵光自至可依前件授前河中府少尹張處休加檢校郎中靜海軍節度副使沈琮檢校員外郎充職裴綽澠池縣令蔣枌臨留縣令等制勑具官張處休等夫以忠謀直道佐諸侯之善以乂一方而致其誠節卒歸王室者則陪臣得其職矣於慎獄勸農便百姓之欲而利一邑則令長得其官矣爾等博逹吏道善事知己而處休以文學自進枌於勳緒有承閲拔嘉杼遂可其奏皆用訓汝爾其圖之可依前件授攝淮南觀察支使田光嗣檢校郎中充職李潛嶺南西道觀察支使長蘆縣令房殷兼侍御史等制勑具官田光嗣等從事之任卒以䇿一作籌謀文翰往參諸政能則政舉否則政墮故有慘舒繫乎能否安得以一談一笑媚於所從維揚控淮海之會雍南雜夷僚之居各引良材往佐其理而光嗣潛殷之善必有以稱其授聘者咸來被寵無忝爾知可依前件授張道蔚朔方節度供軍判官隴州防禦推官李融𢎞文館校書郎充職等制劉崇望勑張道蔚等糧餉其軍防虞所理况自邊徼必資強能是命擢以校文寵兹佐略宜思績效無忝從戎可依前件高鋭奏從事陳璩等三人授官制前人勑髙鋭等既以勤心定賔主之分宜頒嘉命為官屬之榮同參執法之司勉副知人之地期將盡力共贊成功可依前件加外藩佐僚郎等將制勑具官某等或遊徼罷居堙鬱彈冠之望或指揮效用周旋免胄之行幹以奉公恭而事上允當選舊亦既賞勞禁旅親營實在將軍之令雄藩武帳宜增列校之威各命寵遷勉成茂績驟升郎佐無忝官榮可依前件幕職趙儒等加官制薛廷圭勑具官趙儒等或以言罷兼官或以來陳厥貢俱懷吏幹思振宦途即俞所陳各徇其請珥貂佐郡咸謂殊恩宜思舊章往佩殊寵可依前件授溫潞湖州防禦判官李壇湖州防禦推一作判官霍銖絳州翼城尉等制勑具官溫潞等以潞常佐元戎有聞東魯會計參畫聲猷藹然以壇宗室菁英詞場秀造撫青雲而抗足丁艱運以隱鱗迹滯江湖價髙甲乙方從梗泛言奉弓招贊我勳賢開其淹恤而銖亦以將命頗謂有勞俞其奏章各俾序進星郎侍史洎尉于縣屬者服我恩命各宜勉之可依前件授澧朗團練副使徐罕檢校郎中賜紫奚承弼鄆曹判官制勑具官徐罕等通材應聘利刃從軍贊畫允臧吐茹得所伸於知己逹我聽聞今朗陵汶陽方纒兵革式佇和寧之報尤資樽爼之謀星郎柱史洎紫金之命則俞其奏薦各懋寵光勉酬所知共偃兵革無屑於蚤暮也可依前件授攝澤潞副使詹承􅘙檢校尚書充職嶺南東道供軍判官李谷檢校郎中嶺南東道節度判官鄭商郎中賜緋制李磎勑詹承􅘙等上黨南越俱名鎮也倅戎餽運皆重職也以承􅘙等並以才業逹於帥臣正位加官各從所請可依前件授楊詔嶺南東道節度供軍判官張薦節度判官楊郜支使制勑楊詔等幕吏之選委之將帥尚矣况元勳大臣而付以嶺表之重者哉詔等或以本官任職或加繡衣白筆之號皆從其請噫以南越之雄富類東閣疑之招延爾豈直陟金階一作一躡珠履而已勉贊䇿畫無惑杯觴報恩酬知於是乎在可依前件文苑英華卷四百十三
