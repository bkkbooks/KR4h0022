body:
  text: 文苑英華卷四百七十七宋李昉等編文苑詞標文苑䇿三道𤣥經洞曉𤣥經䇿一道詞標文苑䇿科永昌元年第一道問朕聞立極開基之主經文緯武之君莫不象法集作法象殊流汚隆異制至於安人導俗咸即運以垂芳緝化宣風各因時而播美是以道孚繩木爰膺九翼之年圖祕龜龍用啓六爻之代窮桑御厯押集作狎威鳳以分集作踐司軒后集作丘列位因景雲而命職徴汾陽之跡則十政方凝俯河濵之化則四門攸闢祥披玉斗理九土以興功祚徙金精調五聲而作教周崇六禮仁義之道為先漢設三章王霸之圖斯雜皆所以牢籠八際櫽括三靈齊四大以居尊叶五神而稱正且隨時之義既不相沿師古之言又聞前誥朕欽承先聖顧集作對越上𤣥當寧興懷真切推溝之慮凝旒結想方深馭朽之情思所以式展宏猷勉康庶績而撫兹薄德昧此永圖爾等積學多聞含章獨秀未顯疇庸之德宜申待扣之音適時之務何先經國之圖何取集作最帝皇之道奚是王霸之理奚非佇聽良謨朕將親覽對張說對臣聞舜命昌言漢徴極諫嘗覽千古賢哉二君今陛下發德音下明制集作詔選空巖穴訪匝輿臺大哉邈乎過之逺矣臣以草莽集作芳之賤謬當集作忝車乘之招誠不足以庶幾王庭充塞天問集作充塞天闕非伏讀聖㫖乃知天情之所在集作存焉臣聞昔者鳥跡代繩龜集作龍文演卦水土遷王時更萬祀金木互興人非一姓集作性非暨乎三皇五帝氏往夏商集作殷周漢氏作或導人以禮樂或驅俗以政刑或革集作救弊以忠敬或沿風以文武非師古之誥有殊蓋隨時之義且異集作異也伏惟聖母神皇陛下誕受鴻基光膺駿命若曰集作粵若立極格天之業論道布政之典任賢克暴之功出洛飛雲之瑞此並藏緯玉冊勒休金版鬱映於前古揚光於後葉者矣至於集作若創業垂統之則宏猷永圖之義集作美重光三聖載集作再清六合可不謂然乎猶或惕慮推溝勞謙馭朽謝文明於薄德想疇庸於清集作下問此陛下之至讓也愚臣何足以知之䇿曰適時之務何先經國之圖何取集作最臣聞古者因人以立法乘時以設教以義制事以禮制心夫人者理得則氣和業安則心固崇讓則不競知耻則逺刑若強人之所不能雖令不集作莫勸禁人之所必犯雖罰且違故曰政不欲煩煩則數數則政無定集作煩則數改數改無定人懷茍免之心網不欲密密則巧巧則文多傷集作密則深文深文多傷下有非辜之懼竊見今之俗吏或匪正人以刻為明以苛為察以剝下為利以附上為誠綜核之詞集作司考課專於刀筆撫字之宰職務具於集作為簿書陛下日昃雖勤守宰風化多闕臣以為將行美政必先擇人失政謂之虐人失人謂之傷政舍人為政雖勤何為伏願陛下進經術之士退掊克集作刻之吏崇簡易之化流愷悌之風畫一成歌此適時之務也慎賢而用此經國之圖也茍能英才不棄大化方隆而猶曰朝謝垂衣野非擊壤則文武之道尚何言哉堯舜之君徒虛語耳䇿曰帝皇之道奚是王霸之理奚非者布在方冊臣聞之矣聖集作皇人御厯上淳而下信帝者應集作膺期君明而臣哲周用王道教化一而人從漢雜霸道集作攻刑政嚴而俗僞故親譽優於畏侮文景劣於成康謹對第二道問朕禮崇三典方𢎞慎罰之規書著五刑不以深文為義朕母集作君非臨赤縣子育黔黎夏日貽憂懼青牛之結氣秋荼軫念慮丹筆之成寃然以人尚掛於湯羅情倍深於禹泣頃者荆郊起祲淮甸興集作服挺祅朕惟罪彼元凶餘黨並從寬宥今敬真徐敬業弟之輩猶藴狼心不荷再生之恩重構三藩之逆還嬰巨釁便犯嚴科豈止殺之方乖於折衷將小慈之澤爽彼大猷子大夫等學富三冬才髙十室刑政之要實所明間傾此虛襟佇聞良說對對臣聞刑以助教德以間邪先王慎於好生大易誡於緩死今陛下母集作父非臨黔首子育蒼生孚佑下人克配上帝然有東南小侵荆蠻逺郊雖聖德泣辜尚用防風之戮天心罪已仍勞淮甸之師集作征其有詿誤閭閻脅從井邑陛下愍孤孀於海淮恤困窮於江漢捨從寬宥此陛下之恩也而蕞爾餘孽蠢兹頑凶思弄兵於漢地之下將構釁集作難於戎狄之域罪盈稔貫禍得萌芽此又陛下之明也今陛下乃賜臣䇿曰豈止殺之方乖於折衷將小慈之澤爽彼大猷臣實見折衷大猷之規不知小乖微爽之義也䇿曰刑政之要實所明間臣聞政同集作猶水火刑譬陰陽頃者三監亂常有司既糾之以猛于今四罪咸服陛下宜濟之以寬明肆赦之渥恩安萬人之反側布深仁於羅鳥收至察於泉魚豈不大哉天下幸甚且夫人者氓也暗而不可罔庶者衆也愚而不可欺是以集作故刑在必澄不在必慘政在必信不在必苛故明王之理天下也刑一則人畏而不干政簡則俗齊而不僞於是禍亂不作災害不生君安於上臣一作人悅於下百姓日用集作而字不知其然四海之內風行六字集作四海風動惟帝之則道暢鍾石聲流舞詠其行已也非他所理者以此刑政之要庶幾一隅謹對第三道問朕聞仰觀乾象房心為布政之宮俯察坤元河洛建前篇作惟受圖之所是以上稽珠緯得風雨之和下表圭躔集作門里均逺近之節定都考室斯焉是崇顧以庸虛謬集作恭膺大寶乾乾夕惕每軫納隍之懷栗栗集作凛凛宵興恆勞馭朽之念而昊穹眷命靈貺屢彰雲構既隆天城斯畢是用內省多愧上答愈集作逾勤將欲殷薦有常嚴配不墜光啓惟新之躅申明祀典之方順四時以布和風考五物以作集作而行正氣盛禮之要猶慮未𢎞爾等並積學基身含章表質或逺從賔薦集作貢聲滿於州閭或遐應搜楊譽光於朝選採皇王之奧㫖援一作拔周漢之前蹤藴集作儲彼胸襟咸應備曉未知何代之政參酌集作詳適中何禮之規施用為切前篇作當務從必簡之道式前篇作庶崇可久之基陳彼集作試陳嘉謀爾其揚榷思擢太常之第副朕求賢之懷集作意此篇問目又載四百七十二卷前已削去對對伏惟陛下則天法地畏命重人據河洛之規模總風雨之交㑹軒后魚圖之水建邦設都周公龜墨之地考堂作室靈祗降福嘉祥薦祉制同神造力以子來時集作將以殷薦上帝至德也嚴配先王至孝也加以八風攸序四時克諧無得而稱能事畢矣猶復執勞謙之不已懼盛禮之未𢎞訪末學之臣詢稽古之政斯事體大臣何足言然而敢不欽承以竭涓滴耳䇿曰何代之政參詳適中何禮之規施用為切臣謹錯綜三五明徴典墳集作謨竊以緯武經文布方䇿而非逺英風顯號流頌聲而可襲未有反義背德而致升平之政棄古集作禮違經以克永終之祿莫不發號施令集作德惠法乾坤而集作之動靜執契懸衡順金木之刑德集作政是故青陽𤣥室遵季孟而觀風白輅朱旗乘集作因離兊而布政養老用上庠之禮教胄取大學之義環水著辟雍之名嚮陽表明堂之位蓋所以享羣瑞朝諸侯班正集作朝朔調景緯成簡易之業集作基崇久大之基集作業也皇王奧㫖庶此詳探周漢前蹤固難守集作專用臣才智駑劣草莽鯫生至如軍國務廣政刑理急但至敬無文信言不美陛下欲聽其說必觀於事將逆集作違其謀先求諸道危言抵禁破膽寒心伏惟聖主稽集作稍留天聽謹對洞曉𤣥經䇿天寶闕年問大象無體𤣥功陰隲雖禀生之類萬殊而含道之原一致是以至人垂訓將以利物演為真宗貽厥後學包括六藝周流八表或因事以立言或寓言以集作而詮意至如交樂於天交食於地不相與為事不期集作相與為謀善無所私惡無所棄施之於教何以集作所勸勉經曰不爭善勝不言善應正直如繩平易如水常務斯道何集作曷往不臻又曰善建不拔善抱不脫子孫以祭祀不輟斯言信矣昔放勛欽明光宅天下人歌擊壤政叶雍熙可謂善乎建抱善集作免乎拔脫宜其帝緒集作絲蕃逺貽厥孫謀綿綿瓜瓞邁德垂裕何丹朱之不嗣而祭祀輟乎又天無二日民無二王若以天下觀天下豈有二君乎夫君為元首臣為股肱君無賢臣誰與共理粵若舜舉八元致垂拱之化漢用三傑成霸王之業夏殷之末任佞去集作棄賢宗社淪亡為無匡輔經稱不尚賢者其㫖何也集作哉聖人立教專氣致柔故刑不欲勞往不欲竭深根固蒂可以常存則有朝穆肆任集作固穆肆枉非勞逸過度促齡損性却集作都以為然又有惟靜惟清守貞守朴二經之說何取則焉又聞善攝生者動與吉㑹虎不措爪兵難容刃單豹嵓居水飲身代俱損壽永色孺不免噬搏何衛生之不異而利害之頓殊子既洞曉𤣥經探微索隱矛盾若此何以㑹明側席虛心佇聞啓沃對獨孤及對臣聞道之為物無名無形蓋聖人酌而用之推而𢎞之取其精以修身用其粗以頓集作拔物從本降跡散朴為器於是有可道之道忘言之言其大略雖以冲寂為宗虛極為體然妙用無朕故不可致詰今陛下詰其體探其宗豈不欲因言演教其集作於教遺有夫長風吹而衆竅號則大無不動細無不應况陛下用為大道作大道為非以鼓羣有臣則吹萬之一音也敢不唱於衆竅之末臣謹按天有施地有利用天之施以處其和謂之交樂分地之利以養其正謂之交食夫相與生於有為有為生於有事有事則謀名存矣善惡生於公私公私生於用用則棄名立矣然聖人有為不為焉有事無事焉有謀不謀焉有善無善焉有惡無惡焉泯善惡於一致合同異於萬殊則妙門可存教父斯立一作在臣又按道德經云天罔恢恢踈而不失常有司殺者殺之此不爭善勝之應也文宣王稱天何言哉四時行焉百物生焉此不言善應之驗也周書云無偏無黨王道蕩蕩此正直如繩之效也經又云居善地心善泉英華作淵非與善仁集作人言善信英華於字非此平易如水之證也陛下垣集作𢎞其言挹其道以為天下式三集作四十有二載矣且復推功外名不有不恃考言詢事若冲若缺詔臣等曰常務斯道曷往不臻臣鯫生也焉知其辨雖然有一於此願陛下守而勿失與神為一使神不逺於人人不逺於天天人合并集作契如影響交應則甚夷之道焉往而不臻夫有國者必善建皇極善抱至道道之不存傾其宗遷其社之謂拔桀放集作奔南巢受死牧野是也極之不建失其器亡一作喪其國之謂脫太康去洛汭幽王敗驪山厲王流彘是也至如堯知天歷在躬故以至公官天下天下戴之而不辭知丹朱不肖又以至公禪天下天下去之而不怨可謂邁德矣其後裔更霸迭王重之以御龍唐社之代祿可謂垂裕矣陛下興廢繼絶立五帝祠即集作節春秋備其祭典亦可謂祭祀不輟矣方之拔脫臣謂不同經曰不尚賢使民不爭大哉聖人之知微知彰乎天尚賢者國家之所當先然古先聖人曰二字集作王雖求賢審官其用未始不無為也而聖人能無為於求賢不能使無為無迹存則有為者尚之以為利於是有飾智以驚愚修身以明汙其漸起於一時之名其弊存乎千載之後不尚賢者非謂廢股肱之任絶臣輔之力也蓋欲因時致功功成則遺集作遣而遺之因義立事事遂則有而無之無之則跡滅跡滅則爭息爭息則於為無為於事無事雖八元以翼唐弼虞三傑之戡秦滅項其無為無事一也若夫齊天地𡨕萬物莫大於全真專氣致柔全真之本也惟清惟靜全真之中也各然其所然各可其所可全真之末也設教者三合其道一以貫之雖逍遙與道養殊途然性靜與力命同轍茍因其命集作合而較其分則子産不得不勞於刑政朝穆不得不逸於肆任若矯其肆任之性以狥刑政之端是續鳬截鶴虧其全矣故聖人以大猷御六氣之辨以大方合二經之旨明應變無方立言不一學者宜忘言以䆒其體統不可執言以滯其集作於筌蹄經不云乎返老子作及者道之動惟動而常靜靜可以取則權足以合義義無反經凡養生者以本為精以物為粗閉其外慎其內迹不踐凶危之境故兵不能容其刃心不居馮暴之地故虎安得措其爪茍守其精而遺其粗故得於內而喪集作於其外外內無以持其分則衛生之經悖矣謂之不異臣竊異之至如希微大體徼妙𤣥鍵陛下得黃帝之遺珠久矣雖廣成無所陳其至精傅說無所用其舟楫啓沃之問豈臣及之有黷睿謀懼隕越于下謹對文苑英華卷四百七十七
