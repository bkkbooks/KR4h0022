body:
  text: 文苑英華卷四百七十八宋李昉等編將相道侔伊呂䇿三道智合孫吳可以運籌决勝䇿二道道侔伊呂䇿三道第一道張九齡對嗣魯王道堅所舉道侔伊呂科徴仕郎行祕書省校書郎張九齡伏覽睿問大哉國體九品流弊嘗所懵焉幸因對揚庶言其可古者諸侯貢士司徒論士必講禮觀能鄉舉里選故十五十八之嵗大學小學之節誦習以時教化以禮則孝悌之行可知於鄉里政事之業可升於國朝先王務教此其大者及周既衰斯文將喪秦氏滅學唯力是視仁義大壞俊造亦亡漢高以馬上非理復修三代之事魏武以軍中是務權立九品之儀後代因循莫能改作紛紛橫調滔滔皆是天下公器可謂傷心伏惟殿集作陛疑下以集作行字神啓睿圖天佐集作佑明德物不終否則集作故受之以泰弊不遂極乃鼎之以新滌瑕蕩穢今其時也伏願圖之夫正其本者萬事理勞於求者逸於用豈有大明御㝢慮此假權之人循良擇人安得謝恩之義是則外臺㑹府真若漏於網集作貯中濟理適時復何殊於掌上者也且有備無患忘戰必危是以振旅茇舍之儀羽林佽飛之衛漢家徴選咸出五陵周制供王不踰千里此以均其逺近㑹其中正王者之制豈虛乎哉必開井賦於要服俾裒益於畿甸雖經始之規何施不可而圖逺之業猶願勿遵且將振九品之頽綱維百姓之絶紐使官有位次賢集作資有等才茍不侔時所勿取使夫能者代上帝之理議者息高門之談吏精其心人享其利流逋不日而來復耕桑何憂乎不稔動之斯應綏之斯來若唯作法於末途非救弊之本意盛德大業孰與歸乎九齡怖栗塵埃棲棲非得言之地慷慨禾秀拳拳因獻䇿之時何敢望焉盡心而已謹對第二道對王道務德不來不強臣霸道尚功不伏不偃甲由集無由字此勞逸異數得失可明故曰務廣德者昌務廣地者亡是則漢武事胡豈比重華之干羽秦皇戍越豈比集作奚擬公劉之橐兵集作橐囊雖古人有言集作遺言引之者有同於秦漢而王者大化行之者必本於唐虞不亦然乎此其開基之大者也國家因已有之地廣無私之仁犬戎即叙肅慎入貢若力不能救豈惟桓公之耻征在其蘇是必成湯之怨然而春秋所貴惟義所在內諸夏而外夷狄此明中國恐弊不興異域之功下人茍安何惜救兵之舉則知弔伐之義隨時之道也頗至集作今頗凋弊抑非其時至如守塞則侯應之言為得斥地則䝉恬之弊可知前事昭昭足為明戒者也必欲繫單于之頸裂胸奴之肩奚霫背恩受制於北虜小人發憤請議於東征謹對第三道對伏惟殿下德盛問安教存齒學則孝悌之感元良之㫖詠子襟之詩義形乎辭真吾君之子也天下幸甚伏以化慿於勢聲若順風之逺或因於時德甚置郵之速則何草不偃何心不應而曰未能動俗殿下之至謙也尚何術之務而舍此乎今又降意微言徴諸墜典至如炎帝斫木蓋取諸意文王演卦乃言其象雖成象之時不同而得意之言一也周公制禮夏正得天縱損益可知而因循不改去聖既逺禮經殘缺遺文茍存羣儒紛揉故喪服異制諸家殊執集作軌故王肅之㫖約情以斷鄭𤣥之言引經取决呂氏因封侯之餘俗採禮官之舊儀故戴聖採十二紀之首為十二月令存周禮之典其故匪他仲尼以尊魯而取美於頌穆公以尊周而見序於書左氏以豔富稱誣穀梁以文清為婉范寧序事其義則詳樂書因秦而遂亡空有河間之制夾氏在傳而不見唯餘班固之說謹對知合孫吳可以運籌决勝䇿問朕聞武以保大定功刑以禁邪止殺軒轅三皇之聖莫能去兵陶唐五帝之聰時猶振旅故知體國經野宜有吊伐居安慮危可無預備朕纂承丕業䖍守大寶因祖宗之既康恐文武之將墜兢兢戒慎翼翼憂勤而德教誕敷烽燧尚警三邉每勞於征伐百姓不歌於耕鑿言念于役深軫於懷所以日旰忘餐中宵輟寐思謀臣以制敵折衝於樽爼索名將以守邉降伏其戎寇行何法也得致斯人哉子等藏器待時呈才應命盡陳古今之事備詳攻守之䇿至時賢著述往彥勳庸兵法有五十三家宜分其四種漢臣有二十八將自比夫幾人景略可逮於孔明張遼得齊於關侯斛律光賀若弼近代之用誰優我李績與李靖先朝之光誰最又卭南一方之地磧西萬里之域將棄之以促境寧守之以勞人鎮梁州至於流沙軍隴坂至於積石險阻要害豫疑汝明秦中嵗役於防水若為釐革代北年疲於禦塞奚所變通薊門屯田何術以休其弊桞城梗澀何籌以繫其虜凡此邉廷今為重鎮何經何見何履何歷若兵不獲已用何竒謀貞我師旅使有征無戰必文可來之施何異政柔彼夷狄使懷惠畏威咸述爾能直言其事當有升壇之拜佇伸推轂之寵對楊若虛對臣沐清化忝紆黃綬屬陛下聽鼓􅎏之音載懷將率恤邉鄙之聳思輯軍容臣竊歎三隅未寧為日久矣不以庸菲謬膺推薦恭承大問俯踳玉陛咫尺天休以抒情素臣聞古先哲王鮮不征伐禁暴止亂咸以為人思患預防實為善政伏惟陛下允恭克讓虞守四表俊乂咸理以孚于人猶恤彼勤勞求兹政道實天下幸甚臣聞事適於務則理有成法宜於時則功可建是以廣采輿誦詢於芻言不以人廢言不以欲違衆故計濟事立利倍功大完軍保勝道泰人安雖三邉未清而百姓不弊臣聞或多難以啓其疆土或無難以喪其守宇天其啓此邉難以警陛下勤於政理以致和平因定荒亂之宜以為子孫之業也不然者豈聖明之時屢有斯寇今若以明視逺以聰聽德欽崇天意允釐庶績制以官刑警于有位愛敬立於親長始終協於家邦崇禮以致賢修德以來逺言合于道雖賤必行議乖於政雖貴必罰謀得其要必申瓜衍之賞刑當其理不貽戮僕之愆則在廷之官足以致化臣聞燕昭立館以報強讐越踐自勤竟雪深耻景略用而秦道霸孔明起而蜀業成豈明明之朝不如區區之國其珠玉無足愛之必至賢良思用求之必來惟陛下知與不知用與不用茍得其任何憂制敵降戎而已哉必資聽之不濫擇之無失審甄其操履明試以言謀之以八徴求之以五聽穰苴進於晏子韓信用自蕭何是以君人勞於求才逸於任使舍人求勝臣以為難臣聞自古用兵成敗相半賢者得其大愚者得其小莫不同用於法焉至於戰勝攻取無出三事類文校義分為四種記之金䇿具於玉韜漢臣以之撥亂輔時上應列宿振威耀武咸得其才以臣之愚何以堪此然守終持滿竊仰鄧禹之能勍敵神謀頗懷馮異之略至隱若敵國思其奉上之故亦採於一善未致其全若景略比於孔明功當術淺張遼比於關侯壯劣情優斛律光著破虜之功賀若弼有平陳之績論其攻戰則可齊肩語其才雄此或先駕彼亡隋之任士內用寵戚外階朋黨忠言死於逆耳國命出於讒言政以賄易功以財成鴈門之圍兵士以微而不賞浪河之敗許公以親而不誅天下分崩人受塗炭是以李績與李靖為國家用因隋亡之臣致有周之業靖則克勝其任胸奴於是破亡績則能逹其謀高麗以之終滅謀功比事績可同年以功取人靖以居上臣聞惇德允元柔逺能邇王者無外守在四夷張綱棄兵竟和南國充國不戰亦定西夷若李牧以居邉魏尚而為牧逺和邇鎮固障持邉逺和則不勞邇鎮則居逸是謂釋逺謀近逸而有終然後明其伍候守其交禮謹其走集誡以不虞足以輯和士庶羈縻夷狄何必棄南卭之戎捨磧西之地隳先朝之業致將來之誚焉蹙國挫威臣所不取臣又聞華夏者國之心腹邉陲者國之支體若心腹充盈則支體無害古既守之不損今禦之而何失古以之足今以之虛非古今有殊理實授非其任然東自榆林西至蒲海限之以亭塞隔之以山河啓玉關金微之險有臨洮墨雞之厄飛狐白石爰在并汾木峽土門出於幽薊李靖距頡利於峽口終絶南侵李傑敗王師於榆關遂貽東難險阻不異成敗乃殊以是言之非才莫可今若漸收塞上之士申朝錯之謀安輯雲中之人曉嚴尤之術保以邑落守以城池求賢良以為守習農桑以為教敵至則收其積聚使野無所遺賊去則伺其虛危使兵不失利則秦川嵗减於冬戍代北不懼於秋犯臣見薊門屯田防軍寇之乘攻守餘暇務耕耘之積省兩河之粟資三軍之費但使役之無擾何憂兵以致弊軍既未息此安可停臣聞取亂侮亡書之明義固險而守國之恆政若桞城之寇不虐於邉人鴻臚之賔未絶於來使則養士卒以待其衰也必若虐暴邉隅須申致寇之略如其毒痛於下方興問罪之師任之以智能申之以謀䇿明賞必罰教人以信山林水澤之陳識以權宜父子兄弟之軍赴湯蹈火然後揚兵耀武示之以威則師旅以貞夷狄柔服惠懷無戰其在於兹若但行以秋霜之嚴而無時雨之澤不計而動離怨在心驅以合敵貪以取敗既輕有生之命求幸白刃之中使天威挫衄者臣竊恨焉易曰差之毫釐繆以千里此之謂也臣以不才展效州郡每懷報國屢上微言神龍二年進狀論沙場喪敗開元四載投匭言降户得失鑾駕西幸又於河中府上表并進柔逺論一首而才微理拙不蒙顧問制問曰何經何歷敢不盡言臣識淺才微罔知攸據至若升壇之拜推轂之寵豈可一䇿所能及愚臣暗昧不足以當之俯伏惶恐若履氷谷謹對同前張仲宣對臣聞玉弩垂芒耀明威於紫緯金方戒序凝殺氣於丹霄然則負扆登樞規七衡而立辟垂旒御辨法四選以詳刑是故黃運披圖靜妖氛於涿鹿丹陵啓業耀佳兵於洞庭伏惟陛下陟上帝之耿命順下人之樂推總不測之謂神包混成而為道然後運天地日月以臨之泄雷雨水火以育之宣道德仁義以綏之張禮樂刑政以肅之然則宿離無忒天清也海外無波地平也左學上庠文明也保大定功武威也由是東西沉潜朔南浹洽草木咸若昆蟲無夭猶且日慎一日雖休勿休俯狥謙光循易象之明義降詢得失追漢䇿之高蹤所以廣訪芻蕘旁求道路臣戎旃賤伍樗散陋容䇿蹇以忘疲勵弱而知倦猥兹庸菲充賦闕庭奉詔慙惶啓處無地所冀齊庭設炬九九之術先收燕館初開先尊郭隗而已敢緣斯議庶竭丹誠制䇿曰思謀臣以制敵折衝於樽爼索名將以持邉降伏於戎寇行何法也得致斯人哉臣聞晉謀元帥漢召材官必資悅禮之英咸選良家之子誠請秋風授律吉日拜將收不疑之十計問子明之五䇿賞必以功罰必以信則良將斯至矣大功可舉矣制䇿曰兵法有五十三家宜分其四種臣聞習手足便器械積虞關具攻守伎巧之兵也權德刑隨斗繫因五勝解鬼神陰陽之兵也雷動風舉後發先至離合向背而應變無常刑㑹之兵也守正而用竒詳形而計戰兼伎巧包陰陽一作謀權宜之兵也然後憤之以仁義信之以賞罰以我直而權其曲以我智而薄其愚以我和而制其離以我治而乘其亂故雖孫吳再生亦不知為敵人計矣制䇿曰漢臣有二十八將自比夫幾人臣聞漢有二十八將者上應二十八宿也或以文雅光國鄧禹有决勝之竒或以武能威人吳漢有綏邉之略功論樹下馮異之績彌彰氷結河中王霸之誠尤著臣以卑賤夙無器業竊循運合聖恩不次得參賢俊之末安敢自強而比哉清問猥及臣當萬死制䇿曰景略可逮於孔明張遼得齊於關侯斛律光賀若弼近代之用誰優臣聞景略之功也孔明之績也張遼之謀也關侯之烈也斛律光之勇也賀若弼之略也廣論之則耀靈不駐略談之又書不盡言景略之佐秦堅才騁如熊之捷孔明之匡一作輔蜀主克著卧龍之名張遼運籌之方可以歸之於先軌關侯搴旗之效可以論之於後塵賀若弼之破陳軍功先諸將斛律光之扶齊國名劣衆人以次而言斷可知矣制䇿曰我李績與李靖之功誰最者臣聞李績者智也仁也勇也嚴也躬教可以圖始心教可以保衆自伐三韓克清九族所以東夷之人不敢西向也至於李靖者安可同年而語哉大征北狄詎見絶其餘氛授鉞南蠻寧見殄其遺寇所以蠻胡猾夏邉鄙亟聳者良由此也制䇿曰卭南一方之地磧西萬里之域將棄之以促境寧守之以勞人鎮凉州至於流沙軍隴坂至于積石險阻要害豫疑汝明秦中嵗役於防水若為釐革代比年疲於禦塞奚所變通薊門屯田何術以休其弊柳城梗澀何籌以繫其虜凡此邉庭今為重鎮何經何見何履何歷臣聞膜拜一作晼邦東暆樂浪縣名憬裔既崇於弔伐昧谷遐方實資於鎮撫薇亦柔止猶聞遣戍之詩瓜時在期尚起踐要之役今欲明守邉之術開斥地之制緬惟經算俯訪芻蕘諛聞鄙術何足以觀之夫先王馭道也必專其邉守疆以戎索恃吾有以備懷其所以來招携以禮懷逺以德今丸山在境猶發渡遼之師葱河卷祲仍開拜井之屯勞人逺役其何以哉若乃務廣其土以疲其人宿兵於無用之地勞師於不禦之俗聖王之道未足前聞制䇿曰若兵不獲已用何竒謀貞我師旅使有征無戰必文可來之施何異政柔彼夷狄使懷惠畏威臣聞季梁在隨楚朝罷議仲尼居衛晉國折謀語曰死諸葛走生仲逹陛下誠然德音發於帷幄清風翔於無外大啓爵命以示四方拔將選才各盡其用急善同於饑渴用人疾於應響杜邪佞之門廢鄭衛之樂混清六合實由乎此雖西有不羈之冦北有不賔之虜征之則勞師待之則無益故班固曰有其田不可耕而食得其人不可臣而藩來則懲而禦之去則備而守之蓋懷惠畏威也但以日暮途逺汲深綆短文不逮意書何盡言謹對文苑英華卷四百七十八
