body:
  text: 文苑英華卷二百四十五宋李昉等編酬和六令狐楚三首李逢吉三首韓愈三首孟郊一首劉禹錫八首元稹三首吕溫二首張籍七首白居易十六首姚合八首賈島六首釋無可七首將赴洛下旅次漢南獻上相公二十兄言懷八韻令狐楚台室名曾繼旌門迹暫過歡情老去少苦事别離多便為開樽俎應憐出網羅百憂今已失一醉孰知他帝德千年日君恩萬里波許隨黃綺輩間唱紫芝歌龍衮期重補梅羮佇再和嵩邱未攜手君子意如何奉和酬相公賔客漢南留贈八韻前人自作分憂别今方便道過悲酸如我少語笑為君多淚亦因杯酒歡非待一作侍綺羅路岐傷不已松柏性無他悵望商山老殷勤漢水波重言塵外約相公往年垂贈六約難繼郢中歌玉管離聲發銀缸曙色和碧霄看又逺其奈獨愁何奉和僕射相公酬忠武李相公見寄之作前人麗藻飛來自相庭五文相錯八音清初瞻綺色連霞色又聽金聲繼玉聲才出山西文與武歡從塞北弟兼兄白頭老尹三川上雙和陽春喜復驚奉送李相公重鎮襄陽李逢吉海內􅓨埴遍漢隂旌斾還望留丹闕下恩在紫霄間氷雪背秦嶺風煙經武關樹皆人尚愛轅即吏曾攀自惜兩心合相看雙鬢斑終期謝戎務同隱鑿龍山再赴襄陽辱宣武相公貽詩今用奉酬前人解韍辭丹禁揚旌去赤墀自驚非素望何力及清時又據三公席多慙四老祠峴山風已逺棠樹事難追江漢饒春色荆蠻足夢思唯憐吐鳳句相示鑿龍期奉酬致仕楊祭酒見寄前人初還相印罷戎旃獲守皇居在紫煙妄比鄼侯功蔑爾每懷疏傅思悠然應將半俸霑閭里料入中條訪洞天十載别離那可道倍令驚喜見來篇奉和裴相公假山十一韻已見一百六十一卷韓愈奉和庫部盧四兄曹長元日朝回前人天仗霄嚴樹羽旄春雲送日曉雞號金爐香動螭頭暗玉佩聲來雉尾高戎服上趨承北極儒冠列侍映東曹太平時節身難遇郎署何須歎二毛和高平朱參軍思歸作前人髯參軍髯參軍身為北州吏心寄東山雲坐見萋萋芳草緑遙思往日清一作晴江曲刺船頻向剡中回捧被曾過越人宿花裏鶯啼白石髙春樓把酒送車螯狂歌好愛陶彭澤佳句惟稱謝法曹平生樂事多如此忍為浮名隔千里一鴈南飛斷客心思歸何待秋風起答友人相贈孟郊白日照清水淺深無隱姿君子業高文懷抱多正思砥行碧山石結交青松枝碧山無轉易青松無集作難傾移落落出俗韻琅琅大雅詞自非隨氏掌明月安能持十載集作千里不可到一發集作返無近期如何非意中良覿忽在兹道話集作語必踈索集作淡儒風易凌遲願從正直集作聖貞節勿謂霜雪集作霰欺奉和淮南李相公早秋即事寄成都武相公劉禹錫八柱共承天東西别隱然逺夷爭慕化真相故臨邊並進夔龍位仍齊龜鶴年相公詩有齊年並進之句同心舟已濟造膝璧常聮對領專征寄遙持造物權斗牛添氣色井絡靜氛煙獻可通三略分甘出萬錢漢南趨節制淮北賜山川玉帳觀渝舞虹旌獵楚田步嫌雙綬重夢入九城偏秋與離情動詩從樂府傳聆音還竊抃不覺撫么絃奉和吏部尚書太常李卿二相公䇿免後即事述懷贈答十韻前人文雅關西族衣冠趙北都有聲真漢相無類勝隨珠當軸龍為友臨池鳳不孤九天開內殿百辟看晨趨誡滿澄敧器成功别大爐餘芳在公論積慶是神扶步武離台席翺翔集帝梧銓材秉秦鏡典樂去齊竽瀟灑風塵外逢迎詩酒徒唯應待華皓更食萬錢厨酬淮南廖參謀秋夕見過之作公昔為揚州從事參謀從釋子反初前人揚州從事夜相尋無限新詩月下吟初服已經玄髮長高情猶向碧雲深語餘時舉一杯酒坐久方聞數處砧不逐繁華訪間散知君擺落俗人心尉遲郎中見示自南遷牽復却至洛城東舊居之作因以和之前人曾遭飛語十年謫新受恩光萬里還朝服不妨逰洛浦郊園依舊看嵩山竹含天籟清商樂水繞庭臺碧玉還留作功成退身地如今只是暫時間集作間和蘇十郎謝病間居時嚴常侍蕭給事同過訪歎初有二毛之作前人清羸隱几望雲空左掖鴛鴦到室中一卷素書消永日數莖斑鬢對秋風菱花照後容雖改蓍草占來夢已通莫怪人人驚早白緣君合是黑頭翁朗州竇員外見示與澧州元郎中郡齋贈答長句二篇因而繼和前人鴛鷺差池出建章綵旗朱户鬱相望新恩共理犬牙地昨日同含雞舌香白芷江邊分驛路山桃溪外接甘棠應憐一罷金閨籍枉渚逢春十度傷遙和白賔客分司初到洛中戲呈馮尹前人西辭望苑去東占洛陽才度嶺無愁集作歸思看山不懊來冥鴻何所慕遼鶴乍飛回洗竹通新徑攜琴上舊臺塵埃長者轍風月故人杯聞道龍門峻還因上客開杏園花下贈夢得白居易和白樂天杏園花劉禹錫同前以上三篇並見三百二十一卷元稹及第後答潼關主人吕溫本欲雲雨化却隨波浪翻一霑太常第十過潼關門志力且虛棄功名誰復論主人故相問慙笑不能言吐蕃列館和周十一郎中楊七録事望白山作吕溫純精結奇狀皎皎天一涯玉嶂擁清氣蓮峯開白花半巖晦雲雪高頂澄煙霞朝昏集作暮對賔館隱映如仙家夙聞藴孤尚欲窮限幽遐暫因行役暇偶得志所嘉明時無外户勝境即中華况今舅甥國誰道隔流沙酬白太傅元稹太空秋色涼獨鳥下微陽三徑池塘靜六街車馬忙漸能高酒户始是入詩狂官冷且無事追陪慎莫忘酬竇校書二十韻次用本韻前人鷗鷺元相得杯觴每共傳芳逰春爛熳晴望月團圓調笑風流劇論文屬對全詠集作賞花珠並綴看雪璧常連竹籜荒唯好松栽小更憐潛投孟公轄狂乞莫愁錢塵土拋書卷搶籌弄酒權令誇齊箭到力鬬抹弓絃但喜深集作添樽滿誰憂乏桂燃漸輕身外役渾證飲中禪及我辭雲陛逢君仕圃田音徽千里斷魂夢兩情偏足聽猿啼雨深藏馬腹鞭官醪半清濁夷饌雜腥羶顧影無依倚甘心守靜專那知暮江上俱會落英前欵曲生平在悲涼歲序遷鶴方同北渚鴻又過南天麗句慙虛擲沉機懶強牽粗酬珍重意工拙定相懸和令狐相公集作尚書平泉東一作西莊近屬李僕射因寄十韻張籍平地有清泉伊南古寺邉漲池間繞屋流墅集作出野遍澆田舊隱離多日新鄰得幾年探幽皆一絶選勝又雙全門靜山光别園深竹影連斜分採藥徑直過釣魚船雞犬還集作應相識煙霞亦競鮮集作雲霞頓覺鮮追尋應不逺吟賞集作賞愛定難偏此處堪長往逰人早共傳各當恩寄重歸卧恐無緣酬李僕射春日見示集作晚春見寄前人戟户洞初晨鶯聲雨後頻虛庭清氣在衆藥濕光新魚動芳池面苔侵老竹身教鋪嘗酒處自問探花人獨此長多病間居集作幽居欲過春今朝聽高韻忽覺離埃塵和裴僕射寄韓侍郎四字集作移官言志前人久在集作身在勤勞地常思放曠時功高集作成歸聖主位重委羣司看疊臺邊石行集作間吟篋裏詩蒼生正曕仰集作望難與故山期酬白舍人早春曲江見招前人曲江氷欲盡風物已集作日已恬和柳色看猶淺泉聲覺漸多紫蒲生濕岸青鴨弄集作戲新波仙掖高情客相招共一過酬韓庶子前人西街逰僻處正與懶相宜尋寺獨行逺借書常送遲家貧無異集作易事身病足集作是間時寂寞誰相問祗應君獨集作自知答白杭州郡樓登望畫圖見寄前人畫得江城登望處寄來今日到長安乍驚物象集作色從詩出更想工人下手難將展書堂偏覺好每來朝士集作客盡求看見君向此間吟意肯恨一作限當初一作時作外官酬王祕書間居見寄集作酬祕書王丞見寄前人相看頭白來城闕却憶漳溪舊往還今體詩中長集作偏出格常朝集作參官裏每同班街西借宅多臨水馬上逢人亦説山書閣客集作藝閣水曹雖最冷與君長喜得身間奉和汴州令狐相公二十二韻同用淹字白居易客有東征者夷門一落帆二年方得到五日未為淹相府領鎮隔年居易方到陪奉逰宴凡經五日在浚旌重葺逰梁館更添心因好善樂貌為禮賢謙俗阜知敦勸民安見察廉仁風扇平聲道路隂雨膏去聲閭閻文律操將柄兵機釣得鈐碧幢油業業集作葉葉紅斾火襜襜景象春加麗威容曉助嚴槍森赤豹尾纛吒黑龍髯門靜塵初斂城昏日半銜選幽開後院占勝坐前簷平展絲頭毯高褰錦額簾雷捶柘枝鼓雪擺胡音鶻騰衫髮滑歌叉墜粧光舞汗霑回燈花蔟蔟過酒玉纎纎饌盛盤心殢醅濃盞底粘陸珍熊掌爛海味蟹螯鹹福履千夫祝儀形四座集作海瞻羊公長在峴傅説莫歸巖蓋祝者之詞意也眷愛人人遍風情事事兼猶嫌客不醉同賦夜厭厭答韋八前人麗句勞相贈佳音悵集作期恨有違早知留酒待悔不趂花歸春盡緑醅老雨多紅蕚稀今朝如一醉猶得及芳菲醉中戲酬鄭使君時使君先歸留妓樂重飲前人密坐移紅毯酡顏照緑杯雙娥留且住五馬任先回醉耳歌催醒愁眉笑引開平生少年興臨老暫重來分司初到洛中偶題六韻兼戲河南二字集作呈馮尹前人相府念多病春宫容不才官銜隨集作依口得俸料集作祿逐身來白首園林在紅塵車馬回招呼新客侣掃掠舊池臺小舫宜攜樂新河荷蓋杯不知金谷主早晚賀筵開立春日酬錢員外曲江同行見贈前人下直遇春日垂鞭出禁闈兩人攜手語十里看山歸柳色早紅淺水紋新緑微風光向晚好車馬近南稀機盡笑相顧不驚鷗鷺飛答夢得秋庭獨坐見贈前人林梢隱映夕陽殘庭際蕭踈夜氣寒霜草欲枯蟲思急風枝未定鳥棲難容衰見鏡同惆悵身健逢杯且喜歡應是天教相暖熱一時垂老與間官酬夢得秋夕不寐見寄四韻次用本韻前人碧簟絳紗帳夜涼風景清病聞和藥氣渴聽碾茶聲露竹偷燈影煙松護月明何言千里隔秋思一時生和鄭元及第後秋歸洛下間居同髙侍郎下隔年及第前人勤苦成名後優遊得意間玉憐同匠琢桂恨隔年攀山靜豹難隱谷幽鶯暫還微吟詩引步淺酌酒開顏門逈暮臨水窗深秋對山雲衢日相待莫悟許身間酬夢得以豫五月長齋延僧徒絶賔友見戲十韻前人賔客懶逢迎翛然池館清簷間空燕語林靜未蟬鳴葷血初集作還休食杯觴亦罷傾三春多放逸五月暫修行香印朝煙細紗燈夕熖明交逰諸長老師事古先生竺乾古先生也禪後心彌寂齋來體更輕不唯忘肉味兼擬滅風情蒙以聲聞待難將戲論爭虗空若有佛靈運恐先成宣武令狐相公以詩寄贈傳播吳中聊奉短章用申酬謝前人新詩傳詠忽紛紛楚老吳娃耳遍聞盡解呼為好才子不知官是一作在大集作上將軍詞人命薄多無位戰將功高少有文謝朓篇章韓信鉞一生雙得不如君奉和晉公侍中蒙除留守行及洛師感悅發中率然成詠之作前人鸞鳳翺翔在寥廓貂蟬瀟灑出埃塵致成堯舜升平代收得夔龍強健身拋擲功名還史册分張歡樂與交親商山老皓雖休去終是留侯門下人和楊郎中賀楊僕射致仕後楊侍郎門生合宴席上作前人業重關西繼大名恩深闕下遂高情祥鱣降伴趨庭鯉賀燕飛和出谷鶯范蠡舟中無子弟踈家席上欠門生可憐玉樹連桃李從古無如此會榮和談校書秋夜感懷呈朝中親友前人遙夜涼風楚客悲清砧繁漏月高時秋霜似鬢年空長春草如袍位尚卑詞賦擅名來已久煙霄得路去何遲漢庭卿相皆知已不薦揚雄欲薦誰歲暮枉衢州張使君書並詩因以長句報之兩州彼此意何如官職蹉跎歲欲除浮石潭邊停集作呈非五馬望濤樓上得雙魚萬言舊手才難敵五字新題一作成非思有餘貧薄詩家無好物反投桃李報瓊琚張曽應萬言登科見殷堯藩侍御憶江南詩三十首詩中多敘蘇杭勝事豫嘗典二郡因繼和之前人江南名郡數蘇杭題寫一作寫在殷家三十章君是旅人猶苦憶我為刺史更難忘境牽吟詠真詩國興入笙歌好醉鄉為念舊逰終一去扁舟直擬到滄浪奉和相公座主西庭秋日即事姚合西亭秋望好寧復要一作寧要更垂簾夫子墻還峻鄼侯宅過謙微風紅葉下新雨緑苔黏窗外松初長欄中藥復添集作旋添海圖裝玉軸書目記牙籖竹色晴連地山光逺入簷酒醲杯稍重詩冷語多尖屬和才雖淺題高免客嫌和田太僕一作和太僕田卿酬殷侍御見贈前人往還知分熟酬贈思同新嗜飲殷偏逸間吟卿亦貧古苔寒更翠修竹靜無鄰促席燈浮酒聽鴻霜滿身淺才唯是我高論更何人攜手宜相訪窮居集作行少路塵酬李廓精舍南臺望月見寄前人看月雲集作空門裏詩家景有餘露寒僧帽出林靜鳥巢虛集作踈逺色當秋半清光勝夜初獨無臺上思寂寞守吾廬奉酬太僕田卿書齋即事見寄前人幽齋琴思靜晚下紫宸朝舊隱同溪逺周行隔品遙深槐蟬唧唧微雨竹集作踈竹雨蕭蕭不是相公懶煩君舉酒瓢奉和前司封蘇郎中喜嚴常侍蕭給事見訪驚斑鬢之作前人繞鬢滄浪有幾莖珥貂相問夕郎驚祗應為酒微微變不是因年漸漸生東觀書成號良史中臺官罷揖高名即提彩筆裁天詔誰得吟詩自在行酬禮部李員外見寄前人本求山郡是間居豈向郎官更有書溪石誰思玉匠愛煙鴻願與弋人踈自來江上眠方穩舊在城中病悉除唯見君詩難便捨寒宵吟到曉更初酬盧侍御見寄集作酬盧汀諫議前人粟如流水帛如山衣食還君集作夜念倉邊語笑間篇什縱橫文案少親賔集作朋撩亂吏人間杯觴引滿從衣濕墻壁狂書集作書多任手頑遙賀來年三月盡集作二三月緑衣先輩過春關答韓湘前人踈散無世用為文乏天格把筆日不休忽忽有所得所得良自慰不求他人識子獨訪我來致詩過相飾君子無浮言此詩應亦直但慮憂我深鑒亦隨之惑子在名場中屢戰還屢北我無數子明端坐空歎息昨聞過春關名繫吏部籍三十登高科前途浩難測詩人多峭冷如水在胸臆豈隨尋常人一作常人輩五藏為酒食朝來作酬章危坐吟到夕難為問其辭益愧滿紙黑酬厲元賈島我來從北鄙子省陟西陵白髮初相識秋山擬共登鄰居帝城雨會宿御溝氷未報君集作見貽作耿然中夜興酬鄠縣李少府見寄前人稍憐公事退復遇夕陽時北朔霜凝竹南山水入籬吟懷滄海侣空問白雲師恨不相從去心惟野鶴知酬姚校書前人因貧行逺道得見舊交逰美酒一集作易傾盡好詩難卒酬公堂朝共到私第夜相留不覺入關晚别來林木秋酬胡遇前人麗句傳人口科名立可圖移居見山繞買樹帶巢烏逰逺風濤急吟情集作清雪月孤却思初識面仍未有多鬚酬張籍王建前人踈林荒宅古坡前久住還因太守憐漸老更思深處隱多間數得上方眠鼠拋貧屋收田日鴈度寒江擬一作撒雪天身事龍鍾應是分水曹藝閣枉來篇酬姚合前人黍穗豆苗侵古道晴原午後早秋時故人相憶曾來説楊柳無風蟬滿枝酬姚員外見過林下釋無可掃苔迎五馬蔬藥過中鍾鶴共林僧見雲隨野客逢入樓山隔水滴斾露垂松日暮題詩去空知雅調濃酬厲侍御秋中思歸樹石所居見寄前人三峰居接近數里躡雲行深去通仙境思歸厭宦名月從高掌出泉向亂松鳴坐石眠霞侣秋來短褐成奉和段著作山居呈同志三首次本韻前人香花懷道侣巾舄立雙童解印鴛鴻內抽毫水石中履溫行燒地衣赤動霞風又似朝天去諸僧不可同二官辭中祕府踈放野麋齊偃仰青霄近登臨白日低折腰窺乳竇定足涉氷溪染翰揮嵐翠僧名幾處題三暫收丹陛迹獨往亂山居入雪知人逺眠雲覺俗虛足垂巖頂石纓濯洞中渠只是僧酬答新歸絶壑書奉和裴舍人春日杜城書事前人早晚辭綸綍觀農下杜西草新池似鏡麥暖土如泥鵷鷺依川息驊騮向野嘶春來詩更苦松韻亦含悽晚秋酬姚侍御見寄前人新命起高眠江湖思浩然木衰猶有菊燕去即無蟬分察千官內孤懷逺嶽邉蕭條人外寺暌阻復經年文苑英華卷二百四十五
