body:
  text: 文苑英華卷六百六十六宋李昉等編雜啓下上蕭舍人啓一首為前雍府假大夫上宰相啓一首上崔大夫啓一首未召試先與奉常啓一首未召試先與孫相公啓一首上承㫖崔侍郎啓一首先與承郎啓一首答魏博羅太尉啓一首至襄州寄江陵啓一首謝刑部蕭郎中啓一首謝屯田金郎中啓一首辭宣武鄭尚書啓一首謝湖南于常侍啓一首謝江都鄭長官啓一首謝徐學士啓一首代新及第人謝鹽鐵使啓一首上蕭舍人啓溫庭筠某啓某聞周公當國東伐淮夷陸抗持權北臨江漢或陳師鞠旅或築室反耕然後王府圖功台庭陟恪猶垂壯烈尚播雄圖屬者邉塞失和羌豪俶擾烟塵驟起𤇺燧相連犬牙秦雍之疆蠆尾河汾之地雖登壇授鉞屢選中權而禁暴安人殊無上䇿相公手捐相印腰佩兵符威不搴旗信惟盈缶莫不周勤體物嘔喻垂仁足食足兵俄成於富庶惟風及雨立致於生成今者再振萬機重宣五教方從易簡及表優崇凡列陶鎔咸增抃賀從此樽彛著德鍾鼎流芳四海遐瞻共卜歸還之兆一陽初建便當霖雨之期某忝預恩知實踰倫等為前雍府段大夫上宰相啓某聞欒氏垂恩延於十世屈生罹譴不過三年雖行一切之科宜聽九刑之訴某謬因門廕獲沗朝私雖位以恩遷而官由政舉纍經重事皆立微勞頃年初沗雍南頗常釐弊事皆條奏不敢曠官氷蘗自居膏腴不染南蠻俶擾邉徼先聞始事詳觀飛章備述黃伯選根基深固溪洞酋豪凖詔懷來署之軍職李䝉妄因非罪忽使誅鋤某離任之初濫稱遺愛伍營校隊千里農商呌譟盈途牽留截鐙爰從初任以至罷還不戮一夫聞於衆聽其後既經焚蕩又遣統臨糠籺不充菅蓬自覆曽無祿賜惟抱憂危至無尺絹貫緍以為歸費及䝉罪狀煥在絲綸以為徒沗官常曽無制置且經營甫爾物力未周拜疏將行替人俄至仰恩波而不浹駐官局以何由懦怯請兵才非將帥今者九州徴發萬里喧騰慿賊請鋒已至城下則以三千土著衆寡如何兩任經年曽無掩襲雖有烟塵之候不踰朝貢之州無勞北軍已自抽退伏念至德建中之際長蛇犬豕之間願報國恩盡靡一作縻家族松楸未拱帶礪猶存顧慙無用之軀旋漏不私之貸僑居乞食蓬轉萍飄生作窮人死為羞一作醜鬼伏惟相公業開伊吕朗鏡臨人運值堯湯平衡宰物伏乞録其勳舊假以生成免令家廟豐碑尚垂蟲篆私庭陋巷長設雀羅戀闕傷魂臨途結欷無任懇迫上崔大夫啓伏承已踐埋輪光膺弄印夙承知遇欣賀伏深大夫二十三兄鏡社光輝珠庭宅慶居方可裕秉直無徒誠宜便捨蛙符來調鼎鼐而乃芝田挺秀不許於三農蕙畝流芳寧同於百卉伏想稽山靈爽鏡水澄明仰止尊髙居然勝絶隱貧居而坐聞絲管謂仙家而行有旌旗竊料已飾亷車行離郡界髙風在律爽氣盈軒未窮臯壤之秋已領江山之秀瞻望恩顧攀結倍深未召試先與奉常啓張𤣥宴某啓某人惟冗末地匪清華異前修稽古之勤乏往彥求已之志偶塵科級旋履宦途甘䝉碌碌之嗤實愧堂堂之稱惟思勇退秪欲自强孰謂僕射念及孤沉奬兹顓僻遇孔梨之津潤别借齒牙因姜被之包容俯明肝膈昨日晚靣承尊㫖曲奉溫言直欲拔自沉泥置之霄漢恩既生於望外喜載溢於情衷况憫恤垂仁念惜兼至假毛羽而使之騫翥回鞭䇿而俾學騰驤盡自生成益隆丘嶽但慮藝無所取材不足稱仰纍埏鎔或孤擡舉誓節永依於門館酬曠冀盡於死生茍違斯言是欺皎日未召試先與孫相公啓某啓某昨日早趨崇屏靣奉𢎞慈承許與之恩言荷提拔之隆㫖循涯自失沒齒知歸某孤拙無媒迂踈寡合且乏幹時之具仍慙恱世之機一沗班行八移年厯未絶遭逄之望分無騫翥之期伏以某官光輔丕圗啓迪昌運當此艱危之際克展經綸之才孰謂庸虛亟塵褒採況丹霄侍從清籞遨逰畀資枚馬之流以闡堯湯之化顧兹孱薄詎稱論思倍懷感激之心冀竭效酬之節但以鉛刀鈍質不可厠於龍泉瓦缶凡姿固難齊於神鼎雖感恩而載切實顧已以難勝上承㫖崔侍郎啓某啓某才非敏逹器異閎深乏百函飛翰之能虧九紙課詩之業植操虛陵於霜雪干時未脫於塵埃自沗班行尋踰涯分豈謂承㫖侍郎念兹單拙憫及埋沈密回吹借之隆私顯示挈維之重德今日早靣承尊㫖曲奉恩言必欲拔自泥沙置之霄漢擇千里驊騮之足未棄駑駘合九成韶濩之音不遺惉懘感深泣下喜過悲來但虞不稱雕鎪實慮有孤提拔循涯揣分感德慙恩之至先與承郎啓某啓某伏思借其毛羽則鎩翮者能飛鼓以笙簧則無心者知感輒陳引喻仰謝吹噓某濮上庸音墦間賤品植操但期於霜雪趨時未脫於塵埃徒激攀棲難希褒勵近者伏見宫相楊侍郎右司趙員外奉揚尊㫖竊話昌言伏審侍郎學士俯録鯫微奬稱孱薄指其迂拙謂以貞修假鉛紅於蕞陋之姿回剖劂於離竒之木感深泣下喜過悲來答魏博羅太尉啓羅衮衮啓都衙侯司徒到京伏奉寵誨卑情無任欣躍兢戴之至伏以太尉二十二叔國步縈心藩條繫慮籌算方殷於大者緘封宜略於小哉況衮再從宗盟至為卑末庶僚品秩仍是瑣微乃䝉掛在風襟形於賜問奬飾用光其曖昧慰安將勵其辛勤蓬島音書異術靡勞於方士蕺山翰墨真蹤遽覩於羲之捧且不勝喜難自定亦復載窺隆㫖深省賤軀豈叔父私恩偏存睦族王侯公道廣及懷才蓋以大尉二十二叔學擅鴻儒詞摛麗藻臨戎按節全忘掌武之尊握牘含毫但記為文之客得不終身永佩拭目頻觀祕之若三皇內文寶之如歷代傳璽言慙善對謝宗哲以何因義貴能酬銘已知而莫極榮荷惶灼不任下情至襄州寄江陵啓衮啓伏念昨將蓬蒂久寓棠隂德隆於雲夢之山惠浸於瞿塘之水已於荆聶備講恩讐豈向舂陵徒陳主客伏以令公雄才不世茂績無倫威揚戎閫之先仁洽士林之表頃以竿麾暴國漂流幸許其棲簷今則羽衛還宫資遣又令其赴闕斯可謂事關舒􅍾恩極始終其往也異彈鋏以求車其去也免吹篪而乞食遂使仲宣遭亂休假日以登樓明逺還都得侵星而赴路力非可報感豈勝言倐爾辭違漸成遐阻出荆門而回首詎見麾幢渡漢水以盟心惟懷金石以今月十九日發襄州邐迤北去攀涕結戀不任下情謹附狀啓陳伏惟俯賜鑒察謝刑部蕭郎中啓羅隱某啓某伏以內揣荒蕪早乖投獻近者某官曲傳尊㫖伏䝉郎中賜及卷紙令寫近詩捧對憂榮莫知所處某利非楚鐡鈍甚燕錐濩落危棖低摧壯節藏豹之功夫不至屠龍之事業愈踈爰自南國辭耕東堂奉貢劍迷船畔膠在柱間靡旗而何啻再奔繞樹而豈惟三匝所以騷人避熱不忘吹虀𤣥客求聞長憂蓋醬姑息於輿臺之類殷勤於閽侍之徒而猶往往拒闕時時毁櫝豈謂郎中俯敦吾道欲堰頺波不憚客嘲先從隗始寓剡藤而下授指巴句以旁徴榮異當年事殊近俗而況風流漸泯翰墨難言别路萬般中堂千里雖欲壞虞卿之履一作屨詎肯動心哭羊陟之門何嘗留意復安有對紛華而輟玩叩寂寞以搜遺因使斯文亦歸清鑒揣厚㫖而時猶可待荷殊私而力欲不任寧惟𤣥晏吟詩空增紙價兼冀武卿窺後免逐灰寒謹啓謝屯田金郎中啓某啓某揣摩不至蹇剝無圗爰自畫虎貽譏掇蜩逞傴坎軻於風塵之際流離於灰琯之間雖瀝膽隳肝竟將誰訴而煎皮熬髮終不自醫已甘與物沉浮隨波上下今月某日見某官伏知郎中玉壺委鑑金口開談驅雲於道士梁間校籍於真官筆下欲使餘杭美酒必醉蔡經崑嶠仙桃先霑曼倩承吉兆而心神駭越對嘉音而涕泗縱橫某散拙非才牽纒失計通衢十二惟弊黑貂故里三千但勞黃耳欲索身而莫可將問路而愈迷若非郎中暖律旁吹和風外扇擢之於枯荄之側致之於芳英之中則蝶舞鶯啼空緘永恨春來秋去便過此生謹啓辭宣武鄭尚書啓某啓某聞鄭思農之東去絳紗感深吾道謝記室之西辭朱邸戀切所知雖定名之分則殊而懷德之心不異其有栖羸樂厩飬病醫門海燕辭巢即摧萍影林烏繞樹忽軫蓬心又安得下棄席於詩人感崩波於行客某也風塵下物天地中材光逸門寒無因自進揚雄口吃徒欲解嘲屬者尚書置驛恩寬敦風志大孔文舉之干元禮既沗登門徐孺子之謁陳蕃俄䝉下榻淹延館宇荏苒春秋稻粱有異於他人觴豆時陪於上客那言此際遽愴離聲背重德於丘山揖紅塵於道路𬗟懷今日杳不勝情加以貢部傷心名場落羽獸因鬭困羊以多亡前瞻既倦於吹虀內顧徒悲於求劍昔也來慙賦雪謬稱梁苑之遊今則去類乞師已抱秦庭之哭倚征輪而悵望指斷鞭以夷猶尚書儻或仙客壺中旁均日月山公啓裏别借篇題無令一葉先秋遂對滿堂垂泣捨此丹須九轉桃指千年天也如何時乎不再謹啓謝湖南于常侍啓某啓某今月十九日已至界首回望旌棨涕泗不任某莊櫟粗踈庾膏昏鈍不能量力嘗欲干名隨貢部以恓惶將鄰十上看時人之顔色豈止一朝進則刺滅許都退則歌終漢壘地雖至公人莫用容慿執㸑以無由假鄰光而不得常侍獨於此際降以深仁奏仇覽之官資近陳遵之尺牘福由無妄榮亦何酬近者以江表嵗饑吳中力困㫖甘既闕晨夕繫懷常侍不顧人言將逾事例給使府留州之物代衡陽計嵗之資俾以東歸救其恓一作栖旅蔡澤北遊之日瓶甑不存陸生南返之年槖裝皆滿聊將自衒粗可諱窮但以感切違梁情深去魯辭畫㦸而心猶似醉上孤舟而淚始如流蓋以非故舊之由緣無强近之慰薦祗因奬善便與致身如某之孤賤者則多似某之遭逄者則少以兹自誓安可暫忘今則尚有回期猶寬旅思石尤風定橋口浪衰展一作屏片席以髙飛指重湖而直過地名北渚長牽楚客之心水到東吳敢忘湘波一作江之色謹啓謝江都鄭長官啓長官鏤筆才清探驪價重因循世態放蕩宦游劇談以雞肋況時偶對以馬曹當職而自黃塵北犯翠輦南巡張掾投一作抽簮雖離齊邸陶公染翰本慟晉朝於半郊半郭之中有一詠一觴之趣為謀甚逸所得何多芳草逺山才供掇拾晴陽媚景别受指撝登臨則光祿寒山悲歎則雍丘明月慿何徑隧逹此津涯某海曲迷聲夀陵忘步蛇虛盡足鵠不中心將風霜委地之姿值兵革滔天之日正平刺滅屢窘輿臺叔夜燈殘頻逄鬼魅梁苑之舊遊永已鄴都之作者寂然豈謂長官獨好斯文仍流散地牙絃久絶秦缶增慚那言吾道陵持疑作遲猶見騷人風骨牽牛不暇希驥莫從輒敢效彼蠅頭騰於魚網保持所切已髙黃絹之名傳寫可知旋長烏絲之價謹啓謝徐學士啓顧雲某啓某聞隋珠暗投路人興忿荆玉三獻明主懷疑非至珍之有纇有瑕亦明鑒之難逄難遇況某樵歌俗韻牛鐸凡聲雖委巷末途時聞中律而曲卑調下難感知音洎儒術中微時文稍變原玉之風流漸逺淵雲之事業攸歸亦常悵望危津潺湲阮路斂毫興感掩卷長嗟今也河薦緑圗山張疑翠檢開張網罟漁獵英髦周渭商一作殷巖皆辭釣築抱關負鼎盡掛簮𥚑必有人賢出扶聖教歷詢時論實屬髙才伏惟學士瑶圃呈祥尼丘降瑞名題仙署足躡瀛洲束晢臺前間披碧簡秦王府裏時閲瑶籖徐觀動息之蹤已積鈞鎔之望某所以携持陋唱塵玷朱門駭愕未遑軒車忽至俯留榮誨下奬微才拜啓琅函跪吟華藻笙簧滿耳雕煥盈眸某嘗遍閲縑緗亦聞先逹時接後來逺則沈隱侯之奬何伯言才聞發論近則韓文公之知李長吉始議及門未有曲示恩私顯留翰墨才微往彥遇倍昔時仰戴恩榮已增銘篆謹當卷之璧軸飾以錦箋置在書囊永為家寶代新及第人謝鹽鐡使啓某學慙辨豹業愧藏螢且乏智囊況無經笥雖氷盤凍筯素所牽懷而長笛短簫亦嘗關慮豈謂攻堅少益雕朽難能劉子駿之醬甌屢䝉相誚陸士衡之酒甕每沐見嘲內揣龍鍾深甘棄置去年因收敗卒決戰文場奮藻儒林爭衡筆陳方憂殿騎忽擢丙科姓名遽接於英髦骨肉初違於凍餒懷仁空極欲報無由徒銘效死之心未得殺身之地近見某官說竊知侍郎以沉淪軫念汲引開懷欲廣薦衡遂先始隗訖使變商為角化􅍾成舒備雅奏於文絃偃和光於暖谷遐沾厚惠咸出深仁今也周渭告祥殷巖叶夢前籌待運鏤鼎思調明主繫心蒼生企踵某幸將微眇預託鈞衡願居擁篲之先獲厠掃門之末庶因灰粉少措毫芒下情無任文苑英華卷六百六十六
