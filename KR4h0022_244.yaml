body:
  text: 文苑英華卷二百四十四宋李昉等編酬和五楊詢一首張彪一首王季友一首庾光先一首韋應物六首張南史一首戴叔倫四首崔洞三首王烈一首嚴維三首朱放二首權德輿四首釋清江一首釋靈一三首釋皎然七首楊巨源九首答李昌期楊詢三山載羣物峩峩鹹浪中霞衣剪不得此路安可從我生亦何事出門如飛蓬白日又黃昏所悲瑤草空蟲聲故鄉夢枕上禾黍風吾道如未喪天運何處通北遊還一作逺酬孟文一作雲卿見寄張彪忽忽忘一作望前事志願能相乖衣馬日一作久羸弊誰辨才不才一作誰信幸與才善道居貧賤潔服蒙塵埃行行無定止一作心坎壈難歸來慈母憂疾疹家室念低摧一作室家念栖徊幸一作與君夙姻親深見中外懷俟豫惜時節悵望臨亭一作高臺酬李十六王季友鍊丹文武火未成賣藥販山不販名出谷迷行洛陽道乘流醉卧滑臺城城下故人久離怨一歡適我一作怨兩家願朝飲杖懸沽酒錢暮餐囊有松花飯二河車馬日憧憧李膺門館爭登龍千賔揖對若流水五經發難如扣鐘下筆新詩行滿壁立談古人坐在席問我草堂有卧雲哂我厨中一作知我山居無擔石自耕自割一作種食為天如鹿如麋飲野泉亦知世上公卿貴且飬邱中草木年此詩三百四十卷重出今削去注異同為一作奉和劉採訪縉雲南嶺作庾光先百越城池枕海圻永嘉山水復相依懸蘿弱篠垂清淺宿雨朝暾和翠微鳥訝山經傳不盡花隨月合數仍稀幸陪謝客題詩句誰與王孫此地歸酬閻員外陟一作涉韋應物寒夜阻良覿叢竹想幽居虎符子已誤金丹子何如宴集觀農暇笙歌聽訟餘雖蒙一言教自愧道情踈答故人見諭前人素寡名利心自非周圓器徒以歲月資屢蒙藩條寄時風重書札物情敦貨遺機杼十縑單慵踈百函愧常負交親責且為一官纍况本濩落人歸無置錐地省己巳知非枉書見深致雖欲效區區何由枉其志酬張協律赴前人昔日集作人鬻舂一作春地今人復一賢屬余藩守日方君引病年麗思阻文宴芳蹤闕賔筵經時豈不懷欲往事屢牽公府適煩倦開緘瑩新篇非將握中寶何以比其妍感兹棲寓詞想復疴瘵纒空宇風霜交幽居情思綿當以貧非病孰云白未玄邑中有其人憔悴即我愆由來牧守重英俊得薦延菲集作匪人等鴻毛斯道何由宣遭時無早晚藴器候集作俟良緣觀文心未衰勿藥疾當痊晨期簡牘罷馳慰子忡然答令狐侍郎前人一凶乃一吉一是復一非孰能逃斯理亮在識其微三黜故無愠高賢尚集作當庶幾但以親交戀音容邈難希况昔集作惜别離久俱欣藩守歸朝宴方陪厠山川又乖違吳門冒海霧峽路凌連磯同念集作會在京國相望涕沾衣明時重英才當復列彤闈白玉雖塵垢拂拭還光輝答劉信州侍郎前人瓊樹凌霜雪蔥蒨如芳春英賢雖出守本自玉階人宿昔陪郎署出入仰清塵孰云俱列郡比德豈為鄰風雨飄海氣清涼恱心神重門深夏晝賦詩延衆賔方以歲月舊每蒙君子親繼作郡齋什逺貽集作贈荆山珍高間庶務理遊眺景物新朋友亦逺集宴酌在佳辰始唱已慙拙將酬益難伸濡毫竟僶俯一用寫悁勤答楊奉禮前人多病守山郡自得接嘉賔不見三四日曠居集作若十餘春集作句臨觴獨無味對榻已生塵一詠舟中作灑雪忽驚新煙波見棲旅景物俱昭陳秋塘惟落葉野寺不逢人白事廷吏簡間居文墨親高天池閣淨集作靜寒菊霜露頻應當整孤棹歸來展殷勤酬張二倉曹揚子間居見寄兼呈韓郎中左補闕皇甫冉張南史孤雲獨鶴自悠悠别後經年尚泊舟漁父致詞相借問仙郎能賦許依投折芳逺計三春草乘興間看萬里流莫怪杜門頻乞假不堪投病拜龍樓和尉遲侍郎夏杪聞蟬戴叔倫楚人方苦熱柱史獨聞蟬晴日暮江上驚風一葉前蕩搖清管雜幽咽野風傳旅舍聞君聽無由更晝眠奉酬盧端公飲後贈諸公見示之作已見二百十五卷前人和河南羅主簿集作送校書兄歸江南前人兄弟泣殊方天涯指故鄉斷雲無定處歸鴈不成行草莾人煙少風波水驛長上虞親渤澥東楚隔瀟湘古戍隂傳火寒蕪曉帶霜海門潮灧灧沙岸荻蒼蒼京輦辭芝疑作藝閣衡方憶草堂知君始寧隱還緝舊荷裳酬别劉九郎評事專經用泉字前人舉袂集作袖掩離絃枉集作聼君愁思篇忽驚池上鷺集作鶩下集作正咽隴頭泉對牖墻隂滿臨扉日影圓賴聞黃太守章句此中傳酬李補闕雨中寄贈崔洞十年隨馬宿幾處受人恩白髮還鄉井微官有子孫竹窗寒雨滴苔砌夜蟲喧獨愧東垣友新詩慰旅魂初除拾遺酬邱二十二見寄一作初拜命酬邱丹見贈前人江海久垂綸朝衣忽挂身丹墀方一作初謁帝白髮免羞人才愧文章士名當諫諍臣空餘薦賢分不敢負交親此詩二百五十六卷重出今削去注異同為一作劉展下判官相招以詩答之國有非常寵家承異姓勳背恩慙皎日不義若浮雲但使忠貞在甘從玉石焚竄身無有地夢寐見明君酬崔洞王烈徇世甘長往逢時忝一官欲朝青瑣去羞向白雲看榮寵無心易艱危抗節難思君寫懷抱非敢和幽蘭酬耿拾遺題贈嚴維掩扉常自靜驛吏忽傳呼水巷驚馴鳥藜床起病軀顧身悲欲老戒子力為儒明日公西去煙霞復作徒酬王侍郎西陵渡見寄前人前年萬里别昨日一封書郢曲西陵渡秦官使者車柳塘薰晝日花水溢春渠若不嫌雞黍先令掃弊廬酬劉員外見寄前人蘇耽佐郡時近出白雲司藥補清羸疾窗吟絶妙詞柳塘春水漫花塢夕陽遲欲識懷君意朝朝訪楫師答陸灃朱放松葉堪為酒春來釀幾多不辭山路逺踏雪也相過新安所居答相訪人所居蕭使君為制前人謝公見我多愁疾集作病為我開門對碧山君若欲來看猿鳥不須爭把桂枝攀奉酬張鑑閣老雪後過中書見贈輒加兩韻通簡南省僚舊權德輿寓直久叨榮新恩倍若驚風清五夜永節換一陽生潘鬢年空長齊竽藝本輕常時望連茹今日劇懸旌枉步歡方接含毫思又縈煩君白雲集作雪句歲宴若為情和李大夫西山祈雨因感張曲江故事集作書十韻亞相冠貂貚分憂統十聮火星當永日雲漢倬炎天齋禱期靈貺精神契昔賢中宵出騶馭清旭旅牲牷觸石看初起隨車應忽先雷音生絶巘雨足晦平阡瀟灑四溟合空濛萬頃連歌謡喧澤國稼穡遍原田故事三台盛新文六義全作霖應自此天下待豐年酬張祕監閣老喜太常中書二閣老與德輿同日遷官相代之作時祕監亦同日拜命前人珠樹共飛棲分封受紫泥正名推五字貴仕仰三圭繼組心知忝德璵代太常為禮部腰章事頗齊蓬山有佳句喜氣在新題酬主客仲員外見賀正除前人五年承乏奉如綸材一作才薄那堪侍從臣禁署猶聞清漏曉命書慙對紫泥新周班每喜簮裾接郢曲偏宜諷詠頻憶昔曲臺常議禮見君論著最相親上都酬章十八兄釋清江每歎經年别人生有幾年關河長問道風雨獨隨緣寓蝶成莊夢懷人識禰賢徽猷不及此空愧白華篇酬陳明府舟中見贈釋靈一長溪通夜靜素舸與人間月影沉秋水風聲落暮山稻花千頃外蓮葉兩河間陶令多真意相思一解顏酬皇甫冉西陵渡見寄前人西湖潮信滿島嶼入中流越客依風水相思南渡頭寒光生極浦暮雪映滄洲何事揚帆去空驚海上鷗此篇又見一百三十六卷酬皇甫冉將赴無錫贈詩於雲門已見二百三十六卷前人酬崔侍御見贈釋皎然買得東山後逢君小隱時五湖遊不厭柏署迹如遺儒服何妨道禪心不廢詩一從居士説集作與君如此説長破小乘疑和李侍御蕚歲初夜集處士書閣書閣即侍御所創前人遲賢新買閣此意疑郊居古徑行春早新窗見月初放歌還倚瑟講道亦觀書為我留禪位來逢此會踈酬薛員外誼見戲前人方知正始作麗掩碧雲詩文彩盈懷袖風規發詠思遺弓逢大敵摩壘怯偏師頻有移書讓多慙繼組遲淺才迂且拙虛譽喜還疑猶倚披沙鑒長歌向子期和李舍人使君紓題雲明府道室前人許令如今道姓雲曾經西嶽事桐君流霞手把應酬事一作憐夀黃鶴心期擬作羣金籙時教弟子檢砂床不遣集作許世人聞桂陽亦是神仙守久集作少别無嗟兩地分奉酬李員外使君嘉祐蘇臺屛居春首有懷前人昔歲為邦初未識今朝休沐集作宦始相親移家水巷貪依靜種柳風窗欲占春詩思先邀烏府客山情還訪白樓人登臨許作集作接煙霞伴高在方袍間幅巾答李季蘭前人天女來相識將花欲染衣禪心竟不起還捧舊花歸酬祁判官湖上見贈前人歲歲湖南隱已成如何星使忽知名沙鷗慣逐無心客今日逢君不解驚和吕舍人喜張員外自北畨回至境上先寄二十韻楊巨源割愛天文動敦和國步安仙姿歸舊好戎意結新歡並命瞻鵷鷺同心揖蕙蘭玉簫臨祖帳金榜引征鞍廣陌雙旌去平沙萬里看海雲侵鬢起邊月向眉殘突兀隂山逈蒼茫朔野寬毳廬同甲帳韋橐比雕盤義著親胡俗儀全識漢官地鄰氷鼠淨天映燭龍寒節異蘇卿執絃殊蔡女彈磧分黃渺渺塞極黑漫漫歡味羶腥列徴聲佅僸攢歸期先雁候登路劇鵬摶上客離心逺西宫草詔殫麗詞傳錦綺珍價掩琅玕百兩開戎壘千蹄入御欄瑞光麟閣上喜氣鳳城端尚德曾辭劍柔凶本舞干茫茫斗星北威服古來難酬令狐員外直夜書懷見寄前人花枝暖欲舒粉署夜方初世職推傳盛春刑是減餘藝香能護字鉛槧善呈書此地從頭白經年望雉車和盧諫議朝回書情即事寄兩省閣老兼呈二起居諫院諸院長寵位資寂疑用回頭憐二踈超遙比鶴性皎潔同僧居華組淡無纍單床歡有餘題詩天風灑屬思紅霞舒藹藹延閣東晨光映林初爐香深內殿山色明前除對客默焚藁何人知諫書全仁氣逾徑大辨言甚徐逸步寄青璅間吟親綺疏清輝被鸞渚瑞藹含龍渠謝監管野墅陶公愛吾廬悠然逺者懷聖代飄長裾端弼緝元化至音生太虛一戎殄攙搶重譯充儲胥借地種寒竹看雲憶春蔬靈機棲杳𡨕談笑登軒車晚迹識麒麟秋英見芙蕖危言直且莊曠抱鬱以攄志業耿氷雪光容粲璠璵時賢儼仙掖氣謝心何如奉和裴相公前人竹寺題名一半空衰榮三十六人中在生本要求知已垂老應憐疑作鄰值相公敢望燮和回舊律任應時節到春風若為問得蒼蒼意造化無言自是功和大夫邊春呈長安親故前人嚴城吹笛思寒梅二月氷河一半開紫陌詩情依舊在黑山弓力畏春來逰人曲岸看花發走馬平沙獵雪回旌斾朝天不知晚將星高處近三台張郎中段員外初直翰林報寄長句前人秋空如練瑞雲明天上人間莫問程丹鳯詞頭供二妙金鸞殿角直三清方瞻北極臨星月猶向南班滯姓名啓沃朝朝深禁裏香爐煙外是公卿奉酬端公春雪見寄前人造化多情狀物親剪花鋪玉萬重新間飄上路呈豐歲狂舞中庭學醉春興逸何妨尋剡客唱高還肯寄巴人遙知獨立芝蘭閣滿眼清光壓俗塵答振武李逢吉判官前人近來時輩都無異把酒皆言肺病同唯有單于李評事不將華髮負春風奉酬竇郎中早入省苦寒見寄前人玄冥怒含風羣物戒嚴節空山頑石破幽澗層氷裂題詩金華彥接武丹霄烈曠懷玉京雲孤唱粉垣雪窮隂總凝沍正氣直肅殺天狼看墜地霜兔敢拒穴悠然蓬蒿士亦得奉朝謁羸驂苦遲遲單僕怨切切端闈仙階邃廣陌凍橋滑旭日鴛鷺行瑞煙芙蓉闕司寒申鄭重成歲在凛冽謝監逢酒時袁生閉門月漸思霜霰減欲報陽和發誰家挾纊心何地當爐熱慘舒能一改恭聽逺者説文苑英華卷二百四十四
