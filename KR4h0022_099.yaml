body:
  text: 文苑英華卷九十九宋李昉等編志三大隱賦一首幽居賦一首大隱賦并序皇甫松欒子進不能強仕以圖榮退不能力耕以自給上不能放身雲壑下不能投跡塵埃似智似愚人莫之識也如狂如懦物不可知焉酒泛中山適逄千日萍漂上國逮逾十年遨逰不出於醉鄉居處自同於愚俗閔仲叔之殊見徒避猪肝屈大夫之𥚹懷浪投魚腹是以坐成滌器行將賃舂擁萬卷而笑百城舉簞瓢而歌一室必期口無二價居賣藥之流身抗三旌入屠羊之肆於是詩輕招隱賦陋歸田和光同塵嘗聞語矣遁世無悶豈虛言哉榮啓期之鼓琴身終三樂嚴君平之賣卜日止百錢是可以融神保和含道詠德亦何必拂衣丹嶠散髮清流吸玉露之英擷金芝之秀鍊神化骨以為榮乎甚不然也何况華𥚑飛蓋鏗玉拖金赫赫煌煌光寵相耀有是夫哉昔尚長設論富不如貧曹劌立言食肉者鄙請事斯語以奉周旋以書于紳以銘于座河上公之章句紛其曠歟漢隂叟之畦町不亦勞也言而不足聊為賦云蕪音適愧乎雕蟲浪跡遽同乎豹隱陋均傖父誠堪覆瓿以增嗤價重兼金未足披沙而見擇有招隱謂欒子曰爾其賢乎何懵懵之如是也欒子喑然招隱者曰夫天地隂陽専其神日月星辰専其耀山嶽峯巒専其髙江海川瀆専其深所以滄茫曭朗巍巍瀰瀰者也殆非口適二字是所能彩發於其間矣自此以降各専其能衆自煩也龍専其靈虎専其猛火専其烈水専其柔霹靂專其怒魑魅專其怪至堯專於治民治民等字唐私文上闕筆舜專於治孝夏禹專於治一作理水成湯專於救旱周公專於接賢仲尼專於化物老聃專於道德莊子專於逍遙逮於史魚伯宗專於直也季札郭伋專於信也侯嬴荆軻專於義也子胥朝錯專於忠也黿鼉魚豚螭鱉龜蜃專於水也麏麖麋鹿狐狸熊羆專於山也飛鼠專於暗矣飛蛾專於明矣至于蜘蛛蟋蟀螳螂蜉蝣皆有所專而未能暫悉其所專也觀爾之志退非專閒進非專仕愚不專愚智不專智操心若老成謀身若兒戲顛倒上下罔識所謂亦有專之者乎欒子曰有之吾專於不專也招隱於是知其大人也斂袵易容退而復拜拜而且跪言曰昔仲尼所謂走獸可羅淵魚可緡飛鳥可罾至於龍駕風電乘雲雷吾不知之今先生之謂矣請從而書之於是欒子乃推琴濡毫以訖其辭邈乎悠哉曠宇宙而氛埃古茫茫而日去今紛紛而月來開闢天地之上聖分裂山河之雄材蛇身虎鼻螭質龍胎乘剛柔於水火含變化於風雷莫不隨草莾而共腐與珠玉而同灰悲夫自兹已降又何營營而不回所以八荒放志六合遊神皓然矯首兀若無身顧不懼於來者又何希於古人老聃煩於論德釋氏詭以推因苟吾心卓然而不惑又寧見欺於此君何况駕鶴真人吹笙王子玉樹玲瓏金臺邐迤青鸞翠鳯之飛鳴丹豹赤麟之逰止劉安雞犬吕恭奴婢子英拜而魚飛初平叱而羊起或煮藥而針龍或飛符而縶一作繫鬼負柴草而廣施賭菜瓜而博戲紛乎哉故吾不悉心而信矣又有青龍上漢白鹿陵虛變砂神米質酒靈書吁稚川與子政何相欺之甚歟赤城𤣥圃任公子之所居荒垣朽竹丁令威之故墟安用翩翩為白鶴何必悠悠騎碧驢已焉哉吾將居常待終而已矣又何神仙之學乎於是掩蓬扃閉茅屋几案詩書形骸土木雖促疑捉襟而露肘終擊壤而鼓腹有酒劉伶無妻犢牧花菲菲而晚紅草凄凄而暮緑春水兩𣲖晴山數曲吟四首以愁濃舉一觴而歡足波激越而瀛溶竹含烟而朴􅉡倚仗則手放青鳩脫冠則髮辭斑鹿養牛不乘生雞懶祝苟求仁而得仁又何榮而何欲世事紛紛生涯促促亦何為乎嗅金亦何為乎泣玉悠哉已矣胡不順時而從俗耶亦有居陋巷而易志顧好爵而回腸耻白屋之蕭瑟期青雲之頡頏寵崇朱紫譽藹馨香交親翕而相㑹門巷曄而生光危冠岌岌環珮鏘鏘朝朱門而受爵暮赤族以罹殃信刑漢朝胥流吳水一室薰而香焚三穴空而犬死能守節以保身然後謂之君子萬古勳庸逐風砂歌鐘玉帛散朝霞華亭晋陸悲朱頂上蔡李斯憶素牙稽康臨刑而顧影竇嬰就戮而興嗟髙鹿馬以喪國曄蛇豕而忘家諒覆車之在眼吾將易轍而止邪於是振遐思蕩清慮擺簮裾遁名譽聊踈放以安貧冀靜僻而為趣乃步重水常趨遙林奇峯峞􅐑古木森沉泉出山而漸淺雲入洞而愈深遇清風而藉席對緑篠以開襟垂蘿窱裊以樛結連巒菌蠢而相尋望去鶴於沙尾見歸龍於水心青苔潤而饒露碧梧欹而足隂松脂滴酒樹癭臺琴山席平鋪而葉墜書卷橫開而露侵回首遙壑松蘿漠漠曲徑抱雲根斜陽繞山腳瀑迸疑懸峯危欲落歷斷岫而峥嶸入疏林而綺錯委葉交扶盤根相閣野鼠鬪於林稍山雞鳴於叢薄蔓韌時縈壁危或拓出入煙蘿徊翔寥廓靈葩露葉芳綿綿山青雲白心悠然徐生赴哭三千里萊子留書十四篇陸通避楚而負甑張翰辭吳而解船豈求聞而矯俗諒襟懷之異焉豫亦何人思為逸民朝常擁耒暮或垂綸山泉鳴而入夜洞花寒而變春閒逰諳野疏食慣貧盤中之周生紫蓼嶺上之陶公白雲野岸波澄蓬門露曉徘徊緑水之際蕭灑青林之表杞根成狗蘿葉垂蔦山鹿奔而草低野鶴飛而桂裊溪外負薪田中荷蓧鶉披子夏之衣蛙鳴稚圭之沼壠畝連延桑麻繞繚入崦而朽竹芟疏出溪而茅茨稀少依林壑以終焉經沼沚而留連花披籬而綿絡瀑鳴山而布懸潭中則嗔一作頳魚躍日洞裏則沉鹿呌煙遇山客以停杖逄沙禽而駐船槎崩水沒樹空籬穿雉雊霧旦鼉鳴雨天灌於陵之藥圃耕彭澤之黍田偷閒散於一日役筋骸於百年開山决水澆蘭蒔芷移風桂於嶺頭種烟篁於澗裏浪滿沉舟苔生濕地山廪空而鼠喧野浪髙而鷗喜或曲岸而流觴或平崖而隱几烟霞繚繞松桂邐迤踉鶴二字一作踊踉西來驚鸞一作巒南起始嵺嶱之不極終渢漴而未已慨然懷古中心如醉憶耽酒之步兵想能詩之都尉先生則五斗成文君王則七言見志陸機之價難偕鄭衆之心莫遂古人往矣吾將已而諒紛紛於來者欲停觴而遲誰永懷掩抑遐思歔欷鑒往行之得失悟前賢之是非至如龍章鳯姿之異鵾化鵬立之姿重踵駢脅龜背虎眉莫不截野格禽深江斬螭捽搏犀兕磔烈疑作裂熊羆藉魚爛之勢興龍變之機日虧星隕海動山移澶漫轥亂推斥支離然後纘百王之鴻烈應五運之昌期於是玉帛郡國鐘鼓神祗罍斚醪醴籩爼鼎胹周旋登陟以嚴以私威儀文物繽紛陸離禮樂戎狄冠帶蠻夷轟然一瞬雷疑作電威風馳明逺歎蕪城之作子山叙離别之詞雖寂寞而逺矣良咨嗟而愍之若夫舒巧矜談沽多肆欲蒯通一說而亡三墨翟九拒而餘六智不如葵義輕於粟資汛說而有餘在通議之不足置此獨幽沉昔人難復尋􅧼􅞤繞南浦薜荔滿西林嶺遮亭而青獸不起松橫水而蒼龍欲沉鷗泛空而㸃雪月零渡一作波而蕩金獨徘徊以無侣悄持觴而未舉歎巨卿之不來嗟子皮之乖阻胡不長逝孑而隱憂决比德於單音善卷逝追蹤於許由道匪五往思無三求與傴僂而同去共支頥而云休孰得孰失何恩何讐豈若介子推之怨晋費子陽之泣周烟飇勃起涕泗橫流徒血盡於雙目竟灰錯於一丘所以順世浮沉與時消息冥神觀化何往不極齧缺之問惡乎知哀駘之心莫之識今昔茫茫興衰運長超然委命于何不臧亦何悲於麟獲亦何嗟於豹藏薜葉離披之島槐根擁腫之場白鷗兩岸青莎一床遇四老而極逸逄七賢而甚荒露濕書笈塵生藥囊楊子袍穿仇生室方結痛飲之山簡就蔬飧之袁唐我有遐說超然自悅鄙文馬與華軒况金臺之玉闕藥不可還童方難為馭風莫希魚背客不作鹿門翁門何山而不對水何徑而不通雲歸則千峯卧緑桃飄則一川踏紅南灣漁者東郊老農形骸坐類襟帶自同或刺舟而共去或駕犢而相從採藥於巖下行歌於里中兒童目以癡叔鄉人指作愚公怪蔣詡之徑狹笑孫登之室空昔者梁伯鸞之牧猪馬仲圭之罝兔毛公隱身於博徒嚴生攻書於卜鋪咸蓄奇聲共沉髙步雜閭里而寄清汨塵泥而自汙我亦悠悠何逺疑去留方寸自足徒勞外求入烟霄而何樂處城市而何憂於是抵鄽郭出林丘九衢駢羅而自適三市紛譁而自逰榱楹接栱挽輅連輈金碧簇而霞爛羅紈開而浪浮曉入屠肆春逰酒樓卧白犬於甕下懸青蚨於杖頭並嘯父以補履同庖丁之解牛遇茅狗之迎酒嫗逢木羊之隨葛由旗亭日將夕百戲忘休息漢女踏紅綃海人拋赤仄飛塵宵合囂聲晝塞泥燭巧成皮錢妙飾滌器則或損殊材當壚則時逢麗色與商丘而同懷共文賔而晦跡斥鷃逍遙藩籬可巢不憚負局何羞賣膠或有貨藥藏名傭書養志或屠狗於橫街或奔牛於列肆道合情同心諧跡似穢體濁形捐聰斥智雖殊之於萬途咸趨之於一揆天道云云亡知喪真孰能國士吾為市人德與時而偕益道隨行而日新一牛衣以溫體五羊皮以易身羅衣駭目麗質驚鄰詎謂正色寧吾所珍不望豹變非圖蠖伸誓洗耳穢那桃指文惡心長而髮短驗齒亡而舌存損又損以立操材不材而用神伊大道𬗟邈而不極聊糟粕於斯文乃援琴而歌曰茫茫大塊兮奫淪逶迤生我至德兮其心孔殷茫茫兮孰知其施道之虛維吾之廬闤之隘維吾之賔矣道之謐維吾之室闤之囂維吾之黨矣杳乎徐乎遼乎冥乎維吾之娛矣剛龍之蟠長雲兮夭矯蜿蜒修麟之喜橫海兮紛潾漩沿游神於六合之外兮希夷自然又歌曰曽瀾起兮風自飄雲溶溶兮連泬寥微風息兮波以平雲霏霏兮開窅冥重巖邈兮修已逺洄潭渺兮深復淺羽余觴兮空余罍玉顔􅋳兮山已頺羲皇何以不復回捐形棄世兮如我何哉金踴躍兮求莫耶為不祥兮將奈何招隱者歌曰大道由由一作悠悠而熙熙吾莫知施誰宗欒子吾其嗣之至化蕩蕩而一一吾莫知專誰師欒子吾其與焉歌闋杉竹蕭然而迭響鳥獸徘徊而更鳴怡然鼓琴抗然起舞於是標問答纂歌詩不知其名强為賦之幽居賦并序陸龜䝉陸子居全吳東踞長洲故苑一里闔關不通人事且欲吟詠性情曰燕居則仲尼有之矣曰卜居則屈原有之矣曰閒居則潘嶽有之矣曰郊居則沈約有之矣既抱幽憂之疾復為低下之居乃作幽居賦其序云余小學窮𤣥早持堅白其生也懸疣附贅一作懸贅附疣其材也載一作戴癭御瘤居無養拙之資出有倦逰之嘆初張蓬矢嘗逞志於四方未佩桃殳敢違仁於一日雖家風未泯而世德全衰門等韋平材兼魏邴激清芬而鎮俗追雅望於圖形荀朂乃天下表儀裴秀為朝端領袖朱輪十乘紫詔一作誥千篇炳若沉星二字一作星辰粲一作煥乎竹帛俯觀圖牒謬辱孫謀五鼎蕭條賜書零落漆工秫酒二字一作酒保幾欲沉淪故栗空桑屢瞻摧折劉毅劉超俱無擔石之儲許邁許詢共一作但有山林之志思鑿坯以一作而遁聊倚樹而吟師道氣於龜腸扣兵鈐於魚腹窮年學厯一作緯不遇白猿隔日伏痁未擒一作逄黃鷁止則葭墻艾席行則葛履一作屨柴車仲宣方玩於棊枰叔夜遂一作還眠於煆竈既而一作知草知晦朔木讓榮枯因推墨别為三復一作始悟儒分至八何晏之言道德不及王生鄭𤣥之注春秋裁同服氏初陳梗槩漸入精微探桓範之智囊掘張憑之理窟遺其耳目然後謂之聰明差若毫釐烏足言夫一作乎大小加以病唯鬪蟻力止戡蟬列子作戡秋蟬之翼簾帷非翡翠之榮鐘鼓豈爰居所樂遂求衡泌聊以栖遲建一畝之宫忝稱儒者置十金之産雅叶中人晏子以囂塵可容曹公以泥水自蔽羅含宋玉嘗戾止於荆蠻蕭相武侯亦濳安於僻巷楊德祖家唯弱栁殷仲文庭只枯槐馮衍薑辛繁欽苔一作蕙碧復有稻名半夏藥號恆春長榆是一作亦降星精修竹乃生雲母潘尼館裏嘗聞奈素瓜甘庾信園中亦話棗酸梨酢且故切切觀流詠雅一作惟尚清風古今攸同聖賢何逺武仲逰於沛澤伊尹耕於有莘余欲無言回不願仕神交六位方為賣卜之人歌動五噫竟一作始作賃舂之客况有布袍一作縚綸帽尚足朝昏羽扇貂裘猶堪寒暑得以書抽一作䄂虎僕射用牛螉自理茶租閒一作間披釣褐經稱小品還下二百籖賦為名都略㸃八十處下問得犁塗之儀徐一作余聽聞訴怒之詩既已逢原遂成摛翰非因授簡切擬題一作遺鞭不能粉澤大猷且用𤣥黃稗說貽於好事希逢一作從得意而傳責以壯夫甘受子雲之笑賦云太一作泰伯勾吳通侯舊里地接虎丘門連鶴市比顔巷兮非陋方賜牆兮峻一作猶峙樂令有名教之樂必以人一作仁行莊生乃道家者流咸從逹起彼既得矣豫何謝焉欲神逰於浩氣法大一作天隱於遺編魯仲孫衣止七升之布欒武子食無一卒之田賤不容憂貧唯可賀冥心而姑務藏疾卷舌而誰能繫一作擊墮爭先敢脫乎牛車自給方營於馬磨噫秦時亡命竟一作競作帝師吁漢末遺臣皆稱王佐吾焉用此僕病未能藝合歡求解恚之方餌陟釐明攻冷之徴悲少歌於趙一喜長嘯於孫登萬古騷人逺追乎橘浦百金㪭疑作攎力胡切斂也事近書一作出於松陵亦慕偷桃還憐嗜芰何慙一作悲尺蠖之屈未損丈夫之志投簮隱几聊思夷甫談𤣥搦札濡毫耻效文通奏記夫靜者躁之君名者實之賔進不參乎一作於多士退冝追乎逸人忺厚二字一作煩原士之五畝託髙風於一作之四鄰才祛燥濕稍逺囂塵以日繫時且復窮乎魯史穿池種樹正欲類於齊民室乏崇墻一作垣墉非縮版因坎窞以為洫藉䝉籠而表限孟戒無是非之心阮通能青白之眼龜床鹿幘訝招隱兮何遲橡飯菁羮笑謀生之太簡是知名安可釣筆不堪耕有白鳳之才乃先為贅客有雕龍之辨然後為狂生雄自投而幾死禰動妄而將行外嬖方施孟子虛陳乎仁義中讒既勝韓非徒恃其縱橫况復支離一鬱旭陋蹇吃材甚散而寡文體素羸而多疾隂鏗藥銚披曉幌以皆來徐邈酒鐺擁寒爐而必出然忘物我混窮通將大宗師理叶與握真輔一作宰情同優遊塞馬俯落冥鴻竊慕王晞眷戀於良辰美景深符謝惠留連於明月清風得不分崎岸而飾荒臺輟金錢而顧佳樹蓴絲兮欲縈千里草帶兮初圍十步頽垣抱碧無非海髮山衣暗坐飄紅盡是松脂桂蠧加以籬邊種菊堂後生萱覆井之新桐乍引臨忩之舊竹猶存花妨過帽栁礙移門夢去而雲遮絶洞樵歸而水繞孤村遇景逍遙就魚鳥之情樂開襟散誕見羲皇之道尊早濯言泉屢逰經苑憂中一作度廢而將落懼無文而不逺豹管間窺羊岐忘返搜束晳之云缺補陳農之已遁梁太祖府充名畫咸得奇蹤王子敬家聚羣書率多異本何嘗髣佛莫究分毛徒羡夫玉杯朱絃之號美象格犀簮之態高寧為一作容朴野不稱蓬蒿恨殘編之未購奚雅具以為勞况乎栖平蕪古木之地壯被褐擁鐮之事冝其梓合巾箱藤交餅笥炊秕稗以為食剖瓠匏而作器荷蓧而行據梧而睡妖能勝德休占賈誼承塵醉可全真但舞王戎如意其間豁爾此外蕭然姜肱則惟卧一被江革則還留半氊望夫子之門墻乃過數仞顧先生之履襪不翅雙穿敢驚時而獨行聊收視而返聽豈可浪廢𤣥關虛搖談柄夜將半而誰容月每旦而誰評去聲清言不屈孫劉難一作詎減於中軍善講無窮支許那輕於小令式抽易緒或扣老端演精微於簡易消淡泊於艱難澄如井水界若長竿興去聲牛心者赴敵持麈尾者升壇交衡而矛㦸初利頓挫而風霜正寒興公雅對一作韻仲祖旁觀始信何才當指地於丞相方知習健抗彌天之道安彼濩落而無容且蕭條而高寄兼耳目以咸外曷丘園之足賁幸春物之向榮别一作列天姿而見遺隂者負而陽者勝孰謂多機瘠者後而腴者先奚為一作云一氣真宰難問洪鈞肯留人間未適象外一作表何求縱使掬一作陶烟霞而傲睨騎日月以嬉逰乘剛直上攝景冥搜橫絶乎四海飛揚兮十洲讀仙氏之琅書安能解愠傾洛公之金醴幾得消憂不假大招寧馳别國悲舊鄉之何在望平原之無極歎鍾鼎以一作之沉光向漁樵而騁力庚桑有道猶居㟪壘之山接輿佯狂亦取杶櫨之食徐夸下舍陶愛吾廬上法於陵之畦圃旁分建業之村墟時牽殗碟自把渠疏友乏惠施莫解連環之義翳無文摯誰知方寸之虛存其道而或通失其居而後阻一作旅才將命兮分坎壈性與時兮共齟齬間逰廣澤何學弋於蒲且終蹈滄溟更移家於芋嶼夫動以勞吾身靜以伏吾神苟能推於用捨自足究乎天人思任誕於窮檐何辭井臼不求容於假一作側徑何患荆榛沉冥者朴素之源毁譽者浮華之轍蓍名聚雪仍招死草之譏琴號落霞尚被枯桐之說佐一作值聖則幽贊成功逢賢則雅㫖攸發同於德者大亦冝然殷宗命相於巖下周武迎師於渭邊有東山北郭之風才能養素有左公一作車右侯之計未足圖全羌浩歎而長吟畏蘭凋而蕙歇清樽方灔於遙一作瑶水寶瑟坐凝於華月歸田少接尤疑尺一作斥鷃追飛羽獵相逢可謂蕪菁唐突文苑英華卷九十九
