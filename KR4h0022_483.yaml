body:
  text: 文苑英華卷四百八十三宋李昉等編方正賢良方正策七道開元二年賢良方正科登科記作哲人竒士隠淪屠釣科制策問朕聞理國莫尚乎後篇作於任賢命官必資乎後篇作於選衆堯舜以聲不登科記及前篇並作而以度考覈良難殷周取徳兼取言登科記及前篇並作而取名徵求匪易朕所以載懐經術之彦夕遺其寢虛佇藝能之士朝忘其饑子大夫光我弓旌應登科記及名賢策問並作膺斯揚擇為政作法豈無前範安人濟時亦有令躅宜叙立身之志各言從官之才後篇作心至如七輔八元施何綱紀十臣四老正何得失並一作各陳事迹兼詳登科記作述後篇作言名氏夫登科記及後篇並無夫字朝㑹古禮祭享舊章九儀式辨其賜六贄各明所後篇作其執雍畤起自登科作於何年後篇作代亳社立於何代後篇作年天士地士此後篇作復何所封諸布諸嚴彼何所主後篇作立又穆邦家而濟生死三聖之教何長利動植而益黎元後篇作庶五材之用登科記作術何要工商兩後篇作二業在俗何先文武二後篇作兩柄適時何急凡此數科不獲雙美必去者方於去食可存者同夫存信十四字登科記及後篇並作必存者均乎存信所去者同乎去食朕將親覽爾等後篇作則明言此問又載七百七十三卷後已削去對孫逖對伏惟陛下文明有赫元聖廣運勸激極乎宇宙察微窮乎物象至如選衆任能之術禮經享物之要三聖五材之短長文武工商之用捨斯並獨斷聖慮懸衡睿謀百辟端委而顒若庶績不言而潛運矣猶以為立政圖大試言務重弗躬弗親庶人不信降清問於穹昊儼神威於咫尺斯亦堯咨舜吁同徳比義臣愚敢不拜手稽首對敭天子之休命制策曰子大夫光我弓旌應斯揚擇為政作法豈無前範安人濟時亦有令躅宜叙立身之志各言從官之才者臣聞邦有道貧且賤焉恥也今神化陰騭要道光被設序塾以教於鄉立膠庠以訓於國制為禄秩以勸其從則含生禀靈者孰不刻意於仁義飭躬於聞達所謂堯舜之代比屋可封也臣以一介能行無取思勉進以追羣顧觀光而知愧嘗亦自强不息有聞而行馳顔閔之極摯伏周孔之軌躅學古庶乎叶道慎行期乎潤身非有志於干禄茍求仁於寡過立身之志允或在兹從官之才則愚豈敢何則仲尼有言曰如有所譽其有所試必也臨事難乎預謀昔孔明之自比管樂時人未許仲由因之以師旅夫子哂之祗奉睿問懼深殞越其敢靦冒輕議天工陛下若不棄菅蒯無遺蘊藻考片言而察所以効一官而視所由安敢廋哉取則不逺知人則哲陛下允迪於聖君揚已自媒微臣敢辭於醜行制策曰七輔八元施何綱紀十臣四老正何得失並陳事迹兼詳名氏者書曰惟后非賢不乂惟賢非后不食故君明臣忠予違汝弼時聞間出代有其人昔者黄帝之首出庶物也時則有若七輔股肱舟楫虞舜之賔于四門也時則有若八元忠肅恭懿周文之心徳相濟始用十臣漢儲之羽翼已成初聞四老陳其事迹斯亦庶乎詳其名氏固可量也七輔則風牧共貫八元乃伯仲同歸語十臣之倫則太顛閎夭稽四老之類則綺季園公昔郯子之叙古官勞於傾蓋魯公之問儒行疲於更僕况實繁有衆急景不留聊舉凡以見意豈遽數而周物制策曰夫朝㑹古禮祭享舊章九儀式辨其賜六贄各明所執雍畤起自何年亳社立於何代天士地士此何所封諸布諸嚴彼何所主者傳曰朝有定制㑹有表儀書曰享多儀儀不及物曰不享斯蓋曲為之防事為之制經禮三百儀禮三千載在祀典藏之史籍九儀謂一命受職再命受服三命受位四命受器五命賜則六命賜官七命賜國八命作牧九命作伯六贄謂孤執皮幣卿執羔大夫執鴈士執雉庶人執鶩工商執雞雍畤起於秦年亳社立於周代天士地士者漢武之寵方士將軍始受其封諸布諸嚴者班史之記小祠先儒不詳所出制策曰穆邦家而濟生死三聖之教何長利動植而益黎元五材之用何要工商兩業在俗何先文武二柄適時何急者夫人生而静天之性也感物而動情之欲也天禀其性而不能節聖人能為之節而不能絶故務恬樸貴清凈同術於湯之益謙合志於堯之克讓此道教所長也若乃不殺伐證因果包太空以為言化羣有而歸寂此釋教所長也皆能懲窒嗜慾静鎮紛揉王侯得之以貞天下至於辨貴賤立君臣示之以好惡應之以誅賞使禮樂刑政燦然可觀則為善不同其味相反掠風捕影蕩而無適故知孔氏之立教乃為邦之所急也傳曰天生五材廢一不可斷之於陰陽效之於氣物示休咎以垂誡因興衰以運行若可廢則乾坤之道其或息矣然土爰稼穡居中履正應我皇之休運弼大化以阜成利動植而益黎元先金火而踰水木必不得已斯其一隅又國有六職實載工商時之二柄莫先文武同唯阿之相去何是非之足徵然舜命共工之職周有考工之記車服器械斯焉取斯豈與夫乘時射利滯財居逐者若兹之𤨏𤨏焉文徳者政之所專也武威者文之所助也然則士農之末作巧賢於鬻貨昇平之歲經國先於定功臣學昧稽古思迷政途謀適不用空愧繞朝之策道之將行猶委仲尼之命謹對同前李𤣥成臣聞大聖有國將興至理總庶官以匡化覽羣議以登賢所以奉若天紀作為人極觀堯舜之興則四嶽僉舉九載陟明考覈之端立矣鑒殷周之策則三駕訪徳六廉察事徵求之道行矣非睿哲明慮深體化源亦安能董正理官推仗賢傑者也今陛下纉興聖業昭布天光舉良弼以謀至道綜羣才以康庶績故乃嶽生維翰星降士師嘉猷日聞正言彌啓肅然在位燦然盈朝矣且猶郡邑公選巖穴敷求遺寢載懷比歲臨問佇經術以佑職想藝能以建官則古之坐明堂議衢室安可以儔清問之深也固將卓立化首廓開政先豈唯紹明恒訓踐修常軌而已臣素微經藝之術謬沗弓旌之召誠不足以登進王庭恭承明策至若為政作法之要安人濟時之體臣雖愚鄙竊有志焉臣聞政務利人法期濟物布法由道行政在官官必其才則人沐於化法必於正則物頼其安故庇人以和所以興其義率人以禮所以致其淳賦之必均所以綏其業役之必度所以務其時䘏其轉死所以保其命薄其收入所以全其生此安人之畫一作方濟時之要總其大趣存其至心而臣節無隠者爾故王者安人則審政興政則任官任官必良則為政皆善善政溥合則黎人用康徳之本也是以深居而情鑒萬里髙拱而明照八極其在任人之術歟夫至公克守於鳴謙臣節必存乎無隠况王心虚鏡容光必察詢其立身之志考其從官之才臣之愚衷具以上達若蒙飭躬召入程器收用使得履文石以獻議瞻法座以陳誡序安人之大訓言濟時之良政抗恒節以忠主申逺圖以戴君臣之宿心永願畢矣立身之志實在於斯從官之才安敢自必蓋無善不應有開必先七輔立於先疑朝充四目以鑒逺八元翼於舜日播五典以𢎞風或理歴茂時天道以叙或辨方寧亂地紀用章或内平外成樹稼而蒸又乃粒或忠肅恭懿敷教而理訓克從言其紀綱較然明著十臣佐命周道蔚興四老為賔漢儲底定文武以濟靈臺光偃伯之期羽翼既成寵子罷奪宗之計匡正得失格言斯在風后力牧膺七輔之名伯奮仲戡居八元之列周公吕尚為十臣之宗園公綺里參四老之目八元盡髙辛之裔十臣有文王之子事跡斯辨名氏可徵矣夫朝㑹者所以正君臣之位登享者所以盡誠敬之極故物稱其禮舉之表儀功被於人施之祀典蓋辨其位序而不多其玉帛先其敬意而不繁其樽爼明王道之制也自道逺聖逝侈及嬴劉薦幣興利視金逞罰祭非其鬼妖望其祥瞻古語事斯謬甚矣周官大宗伯之職以九儀之命正邦國之位一命受職再命受服三命受位四命受器五命賜則六命賜官七命賜國八命作牧九命作伯蓋以懋功訓徳審官乂人也又以禽作六贄以等諸臣孤執皮幣卿執羔大夫執鴈士執雉庶人執鶩工商執鷄蓋象事以明等威以示禮也秦修雍祠而古有雍畤焉周祭亳社宜社有屬亭焉孝武祈仙封於欒大將以通天地之道也故天士地士懸以五利之名焉漢氏廣禱主於小祠將以期純嘏之集也故諸布諸嚴設於羣望之祭焉夫谷神不死道宗於𤣥黙至覺而生釋歸於清净書於聖典固在儒流然練神虛心釋道以空慧為法可以濟於生死矣興政致理周孔以禮義為訓可以穆於邦家矣教之攸設儒則為長天生五材利溥羣物火炎水潤動植以滋刳木範金黎甿攸濟禀於元象土徳厚載而居多施於物宜五行廢一而不可工以繕器商以通財財則聚人器則周用疾其浮侈商以政而當遏資於器械工在俗而為先聖人覩天地以成文象震曜以興武文次九序武標七徳利用開物禁暴夷凶二柄所資百代無易兩叅王政互為國經若寰海晏如則武備都偃干戈日揚則文教式衰自有偏廢之辰皆無必去之道理曠者不可以言極道深者不可以意明乾象照臨聖模廣運臣材非秀茂學非敏博對越天㫖誠無足觀謹對同前沈諒對臣聞時雨作解靡物不滋春雷發聲羣蟄漸覺間者明詔咨九牧闢四門光燭巖藪恩覃側陋葵藿仰惠以納景山川有開而出雲使草茅微臣幽賤朽質辱旌賁陳芻蕘瞻璚臺之穆然預煙闕而伏對此臣之鴻造也敢不瀝誠哉臣聞堯之光宅也以親九族以命百官舜之登庸也以察萬人以齊七政大禹拜臯陶伯益惟其昌言武王問黄帝顓頊存乎至道此四君者文思濬哲恭儉髙明仁以創制慎乎體國思借力以任重簡逺闕以安人故選賢以居位闕事而後爵則考績以庸取人必才賦納獻可聲度言狀庶存兹矣休惟陛下豐功厚利資始萬物以統天執契含元富有八方而纂聖家道以正庶績咸凝師師滿雲火之庭濟濟盛龍光之列尚紓神睠更睟天儀思仁夀之登城緬前王以作鏡雖軒轅之徇齊藏用重華之好問察言未足以扶轂大明驂乘元聖臣聞之遊大海一有之水二字者難為水窺聖一有人之二字門者難為言陛下侔造化而作法尊道徳以垂範敬宗廟以示厚愛臣子以興仁懷蠻夷以廣徳抑禎祥以崇理禮經大備四海共職而朝宗樂物至和百獸來庭而率舞至於為政安人之躅則微臣何足以知之其餘備父母之體以立身欽聖人之化以從官之問則願竭其愚臣惟忠孝可以從官奉陛下之法以自理守陛下之職以自安以之居處則莊以之戰陣則勇是陛下軼堯舜之上愚臣忝比屋之封臣雖不才則亦有志矣昔者風后力牧仲容庭堅相與謀謨於有熊之朝弼違於納麓之運講信而修睦肆直而惠和垂衣裳作舟檝分州土叙星辰其紀綱也如此其後閎散周召園黄綺季鎬京得之為心膂漢儲得之為羽翼終能牧野清明惠皇不廢其救失也如彼夫國有五服朝聘申其貢禮有五經享祠肅其首職方品其逺邇宗伯辨其瑞玉乃開封壝一作墠是設方明錫之以鞶輅衮裳執之以圭璧羔鴈秦之立雍畤也將以禘其自出周之居亳社也亦以戒於不臧臣又聞先王之制禮法也以勞定國汰哉漢武曾是黷神採少君以端信樂道之貞列帳甲乙樹紅頭望嶧山祈石室天士地士不殆於昏淫諸布諸嚴何憚於風雨乎聖策以三教立言歴代彌勤成軌制以化時較醇醨而景俗此聖君合懸解之㫖而小臣慚黙識之明然臣亦嘗聞之矣夫禮者始諸飲食盛於冠婚分而為陰陽轉而為太一失之者死得之者生二氏包虚無而含寂滅長性靈而已宜去於斯傳曰仁義禮智以信為主貌言視聽以心為正則士德優矣若乃神農之肇皇業揉木為耒弦木為弧黄帝之開帝功致天下之人聚天下之貨器以成務稼惟人天利以通財阜國周用茍能全人天可違乎故臣願抑商而進工也大哉武之為功赫矣師之所處象震耀而舉垂雲雷以揚宣威而山河蕩容訓誓而煙塵動色可以定禍亂可以翦暴強頃者牝鷄之晨陛下潛龍或躍提白蛇之劒揭翠鳳之旂入于北軍兵皆袒左氛祲殄滅日月光華此神武之壯觀也謹對賢良方正策原失問尹暢對臣聞非才難遭時難况躬忝觀光之舉不俟媒揚之地儼身天闕用感良辰伏惟陛下建初立元創業埀統夷凶靖難聖敬日躋格上下而無憂内治光四表而誼徳昭振故能荷天之休福應尤盛殷薦嚴配昇中告成十數年間而功業大備豈非徇齊之徳神化所致哉雖少康復夏宣王興周比之當今萬分不及而猶賜臣策曰常恐上塵五聖之耿光下辱萬方之瞻戴日昃觀政夜分思理者可謂無念增徳勿休熈載履衆美而不足躬聖明而流謙而臣愚葑菲誤自充賦雖言及之將何以承奉清問對敭天休乎然臣聞立徳之謂道體道之謂仁固無宏逸安敢訛濫是以古之善為士者必將微妙𤣥通豈獨重於偏才迂誕而已如此則黄帝之功濟生人素王之道遵先聖離朱喫詬奚得議其淺深夷齊尹惠抑可語其同異何者食薇絶粟終慙淑媛之言醜夏歸殷卒致成湯之業寓言莊叟良未足徵側訊蒙矜誠將異爾無貪至理寧副虚懷若乃喜怒哀樂之四端貌言視聽思之五事雖擴充之在我諒休咎之關天殷臣格言已貫之於皇極鄒子戲論亦頗存於昭應詎兹辨志方用沃心伏惟陛下事天明事地察無文咸秩羣望畢舉故祈穀汾睢薦寳鼎於宗廟燔柴岱嶺靄飛煙於雲日神歆效其如答靈貺昭而必聞雖飄風乍起曾不終朝大雨時行旁霑數郡亦未聞偃拔包襄之甚也陛下憂勤夕惕若厲信禹湯之罪已實堯舜之用心蓋天災流行國家代有屠龍牲馬亦何以為書稱安人則惠易翼損上益下謂宜開倉廩以賙給選牧宰以寵綏散利薄征息役施舍禳修之道何莫由斯傳曰徳勝不祥義厭不惠謂此物也雖歸諸天道亦以人事故周官六職水旱則宗伯是司漢宰三公災𤯝則丞相是主不然何以昭燮贊之術開勸戒之端哉大體若兹詳徵何有臣聞夫大理之後有易亂之人者安寧無故驕心起也大亂之後有易理之人者創艾避災思樂生也當今海服清晏太平無虞衆宜曲折萬事纎妙文理至詳不可復加矣陛下享已成之功居崇髙之位入有後庭聲色之務出有苑囿遊觀之樂志得無滿乎欲得無極乎古語曰行百里者半於九十言末路之難也此言雖微可以喻大是以聖人乾乾日惕莫敢或遑雖休勿休盡善盡美伏願陛下慎終如始以成徳政使鴻圖盛烈作唐龍光不騫不虧永永無極此適時務之所當先也臣又聞善為政者在能其事能其事而不知所以少其吏者則竭而不足臣竊惟今國家所使分威權御黎庶幹府庫理刑獄者皆天下長吏也而其俸禄各有差等以勸其徒百官以理萬人以察天下幸甚然而都内冗散叨假名器者不可勝數或倡優雜伎之伍弁射夷貊之流紆紫懷金出入周衞漿酒藿肉乘堅策肥者奉一人猶聞不給今官此輩何所取資狐䑕既託於城社粟帛載殫於倉庫非所謂侍御僕從罔非正人爵勿及惡徳惟其賢者矣此救弊之所急也臣草莽諸生地卑識淺陛下誘而進之訪以時政將承汝弼安敢面從輕陳末議伏深殞越謹對文苑英華巻四百八十三
