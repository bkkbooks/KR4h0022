body:
  text: 文苑英華卷三百七十二宋李昉等編紀述三謁夫子廟文一首救沈志一首傷我馬詞一首辨論譴貓一首雞觸人述一首觀八駿圖説一首祝牛宮辭一首朱氏夢龍解一首象耕鳥耘辨一首告白蛇文一首蓄狸説一首紀述謁夫子廟文李觀世載儒訓者隴西李氏子觀曰集無曰字正詞為潔執潔為奠恪以上薦集無薦字相撥之十有三祀孟秋之月朔修冕帶問廟而入再拜兩柱之下乃退伏而稱曰於皇夫子之道之德與天地周旋與日月合明乃聖乃神炳乎典謨惟王者得之以事神使民庶人得之以不失其死生諸侯得之以事天子卿大夫二字作士得之以保祿位集作世祿怨災不及其身四時得之而序行天下得之而大同然則天地神人集此人神之事昭乎夫子之道之德也至矣何小子之所集無所字竊歎焉斯歎也其惟來學乎其惟乞靈乎曰某不敢然也且集無且字夫禮樂浹於明夫子之善道也斯可謂集無謂字以學矣鬼神瞰於幽夫子之明靈也斯可謂集無謂字以敬矣孰敢集作可捨道而來學瀆敬而乞靈者集無者字乎於是再拜而起徊翔集作旋而觀章施足徵像設無喧集作喧我廟爼豆我王衣冠夫子得之亦無愧言七十之徒亦公亦侯外如君臣內實討論蒸蒸小子思得其門夫子聖人天錫元精其未生也若超然神遊與兩氣俱集作相存其既生也遇三季之會飄颻湮淪絃歌之音撫而不和仁義之圖卷而靡陳及相魯而有喜色去宋文粹作而字曰桓魋其如豫何聖人之窮乃有集無有字如是也集無也字耶噫俾夫子生於堯之代堯必後舜而先夫子生於舜之代舜必先夫子而後禹聖人得時化可知也如舜禹生於夫子之年則不過守於畎畝之中安有夫子之教垂於無窮若今日之澶漫者乎惟集作若夫子生實陪臣歿乃王爵有聖德也惟紂生實殷辟死曰獨夫有逆德也惟爵諡在德惟德有聖有逆惟聖逆在人不在於尊嗚呼集作於戲夫子聖人之極歟鳯鳥不至無其時也秦人燒集作焚書文之衰也帝唐爵王德之興一作通也惟夫子之德洎唐之德永而能安古而更集作能新降康下民敻有烈光訖無間然小子忡忡栗栗拜奠而出匪作匪述救沈志劉禹錫貞元季年夏大水熊武五溪鬪泆于沉突舊防毁民家躋髙望之溟滓范集作葩華山腹為坻林端如莎湍道駛悍不風而怒崱嶷前邁浸淫旁掩柔者靡之固者脫之規者旋環之矩者顛倒之輕而泛者硠礚之重而髙大者前却之生者力音殪者施集作弛形蔽流而東若水柿然有僧愀焉擔於路曰浮圖之慈悲救生最大能援彼於溺我當為魁里中兒願從三四輩皆狎川勇遊者相與乘堅舟挾善器維以修筰禍于崇丘水當洄洑人易置力凝矑執用俟可而拯大凡室處之類冗居之彚在牧之羣在豢之馴上羅黔首下逮毛物拔乎洪瀾致諸生地者數十百焉適有摯獸如鴟夷而前攫持流枿者用不陷隅目傍睨其姿弭然甚如六擾之附人者其徒將取焉僧趣音促訶之曰弟無濟是為目之可里所而不能有所持矣舟中之人曰吾聞浮圖之教貴空空生普普生慈不求報施之謂空不擇善惡之謂普不逆窮困之謂慈嚮也生必救而今也窮見廢無乃計善惡而忘普與慈乎僧曰甚矣問之迷且妄也吾之教惡乎無善惡哉六塵者在身之不善也佛以賊視之末伽聲聞者在彼之未寤也佛以邪目之佛惡乎無善惡耶集作也非吾嚮也所援而出死地者衆矣形乾氣還各復本狀蹄者躑躅然羽者翹蕭然而言者諓諓然隨其所之吾不尸其施也不得集作德吾則已焉集作烏能害為彼形之乾髬髵之姿也彼氣之遷暴悖之用也是必反噬而齒甘最靈是必肉吾屬矣庸能躑躅諓諓之比歟夫虎之不可使知恩猶人之不可使為虎也非吾自遺患焉爾且將貽患于衆多吾罪大矣子劉子曰余聞善人在患不救不祥惡人在位不去亦不祥僧之言逺矣故志之傷我馬詞馬乾類蓋健而善馳君子之所宜求為獸也故主集作法求於力或逸而喜駭主集作法求於和或乾而易仆由德而稱者鮮矣曩豫知善馬之難遭也不求於肆而于其鄉一旦果得陰山之阿蠖略其形蕭蕭集作蕭然其鳴長顧逺視順而能力顧其集作低字軀非騫然而偉也雖士得以乘之始豫被皂衣于朝朝之人多四三集作三四其狀以迭取集作馭豫無兼馬水轍之淋漓淖途之汪洋結為確犖融為坳堂前有僨輈後有濡裳我䇿垂空我鑣方揚振鬛軒昻矯如飛翔翹翹其一作且雄也非力而何烈火之具舉鉤膺之疊舞一蹊千趾駢比齟齬痑者斯擠悍者斯怒我鞍如山我轡如組弭毛容與宛若孤處靡靡其一作且柔也非慧而何日文粹作前日豫之獲譴于闕下背商顔趣昭丘日中而踰舍修集作循門之南非騎所宜夷則沮洳髙則嶔巇虎咆空林􅈮鬪荒馗風雨孤征簡書之威俾豫弗顛我馬焉依屑屑其勞也非德而何豫至武陵居沅水傍或踰月未嘗跨馬以故莫得伸其所長局踳顧望兮頓其鎖韁飲齕日削兮精刓集作耗氣傷寒櫪騷騷兮瘁毛蒼涼路聞躞蹀兮巴馬騰驤朔雲深兮邊草逺意欲往兮聲不揚隤然似不得其所而死故其嗟也嫌非二字作兼常初玄宗羈大宛而盡有其名馬命典牧以時起居洎西幸蜀往往民間得其種而蕃焉文粹作馬非故良色者率非中土類也稽是毛物豈祖於宛歟漢之歌曰龍為友武陵有水曰龍泉遂歸骨于是川且吊之曰生于磧礰善馳走萬里南來困丘阜青菰寒菽非集作何適口病聞北風猶舉首金臺已平骨空朽投之龍淵從爾友辨論譴貓牛僧儒貓為獸捕鼠啖飢貓性也鼠好害物貓食之是貓於人為爪牙於獸職為刺姦也所以伊祁氏季春疑日迎貓然則人假借蓄貓之義盡矣僧儒常學大小戴禮知迎貓之利攝饔者悉辭以苦鼠之竊請迎蓄之僧儒因允其言是貓也非不壯大􅠝狨而為之􅗜踰鼠族者性懶不捕善伺饔人戶隟搜蓋覆器挈蓋隱器如智有十指百目者而猶家人割􅡏食三時加哺不敢輟嗚呼鼠伏隱處也貓人蓄食之也鼠竇一作冗厚垣深窖也貓安薦茵堂室也鼠出恍獲畏怕也貓遊安緩舒間也既伏隱處也則出可伺之也既竇厚垣深窖也何地可空之也既出恍獲畏怕也掘搖之可怛之也惟貓甚不易也僧儒常讀晉漢二史見更始元年赤眉擾秦中淆函岐雍大苦之以更始宜制之而人又苦之是意亂君之猶貓竊者也晉太康末趙厥亂岷蜀漢銅梁大苦之以羅沖征之而人又苦之是意亂臣亦貓竊者也向使更始非仗漢則秦人皆得擒之矣羅沖非仗晉則蜀人皆能捕之矣貓非仗於人則庖人皆得戮之矣然三者皆知仗之苟竊也曾不知人甚苦之矣以至于逐之以至于戮之故有為國者有為兵者有防盜者有仗而皆亂者則踰於盜也踰於亂也思饔人迎貓不可不慎也雞觸人述鄠杜之郊人有雞大不􅂒儕類剛勇百鶚之特疾視促步內斷外果雖狺狺猛犬桓桓壯士伺釁潛搏胥為驚蹶則前後背血流朱殷者數四以降少族説咸以彼恃長觜利距也失恃則力不能擊宜仁柔矣乃因跧側樹枝目不能視瞻以長纓羈繫彼莫得旅拒即求砥礪錯斂其長觜使秃枿不能害物鎚鈐敲其利距使撾擊不能痛物然後縱其逸也雞不省猶張拳勢瞪瞋眸咬咬爭鳴剛獝突如鄰童咸操荆鑠弄調笑喜曰昔吾畏其搏我啄我每至此則心悸狂亂視若左右紛錯百千雞之衆矣今彼啄擊不能為害則雖兹雞在前後若不見豈雞之異矣君子之是歎至剛自折者若此不度力取笑者又如此且其職也宜司晨而鳴風雨不移縱有専場妬敵之志亦爭鳴於族類非宜於拂人矣爾依於人人即爾主輕肆其勇而悖於主所以雖有長觜利距不能久恃已失所恃乃以踵擊者取鄰童之笑所宜然矣僧儒常一有自字思度謂欲移人之事當有類其雞者嗚呼宜誡夫剛哉觀八駿圖説栁宗元古之書有記周穆王馳八駿升崑崙之墟者後之好事者為之圖宋齊已集作以來傳之觀其狀甚怪咸若騫若翔若龍鳯麒麟若螳螂然其書尤不經世多有然不足採世聞其駿也因以異形求之則其言聖人者亦類是矣故傳伏羲曰牛首女媧曰其形類蛇孔子如倛頭若是者甚衆孟子曰何以異於人哉堯舜與人同耳今夫馬者駕而乘之或一里而汗或十里而汗或數十里百里而不汗者視之毛物尾鬛四足而蹄齕草飲水一也推是而至於駿亦類也今夫人有不足為負販者有不足為吏者有不足為士大夫者有足為者視之圓首橫目食榖而飽肉絺而清裘而燠一也推是而至於聖亦類也然則伏羲氏女媧氏孔子氏亦人而已矣驊騮白蟻山子之類若果有之是亦馬而已矣又惡得為牛為蛇為倛頭為龍鳯麒麟螳螂然也哉然而世人集作之慕駿者不求之馬集有而字必是圖之似故終不能有得於駿也慕聖人者不求之於人而必若牛若蛇若倛頭之間集作問故終不能有得於聖人也誠使天下有是圖者舉而焚之則駿馬與聖人出矣祝牛宮辭并序陸龜蒙冬十月耕牛違一作為寒築宮納而皂之建之前日老農請乞靈于土官以從鄉教一作校非余勉之而為之辭曰集作云四牸三牯中一去乳天霜降寒集作嚴納集作入此室處老農拘拘度地不畝東西幾何七舉其武南北幾何丈二加五偶楹集作盈非當間載尺入土太嵗在亥餘不足數上締蓬茅下逺官府耕耨以時飲食得所或寢或訛免風免雨宜爾子孫實我倉庾告白蛇文田廬西北隅有古丘焉髙可四望余將升之以眺逺舒鬱農民遮言曰不可是丘有蛇巨如井缶而白忤之能為祟不利人多集作甚矣宜無往余取酒沃其丘告之曰物之生而白者犬雞馬牛羊而已其餘則老而後白狼狐兔鹿鳥雀燕雉龜蛇之類是也人老而毛髮皓白耗眊昏倒不能記子孫名字形朽神潰以至于死物老而鱗毫羽甲亦盡白白而後有靈非一聖賢位一作在乎上德光被于下則不為之出出必人奉之以獻不敢隱匿惟蛇不在瑞典雖然神而且靈尚矣故漢之興神姥謂之白帝子得非天命者志怪必曰白然多穴一作空老墳坎集作大木要野氓盤殽甌集作塸酒之享作小兒女子寒暑蓇眩淫巫倚之彈弦集作絲瞑目歌舞其妖怛集作其駭其惑考鼓用幣僣冒其上嵗時奔走畏在人後疾病不治飢寒不辭悉爾輩之為也古者鑄鼎象物使民知神姦若之姦吾知之矣况旅吾之地由我進退蟄以時出集作出以無越昆蟲之職無雜鬼神之事吾宮居若野處各有分齊故不相害然駢集作斬翳通顛集作巔為暇日憑藉之所則不當用集作與人爭也如不用吾言吾當籲天霆斷裂首尾然吾誠不移無易爾為象耕鳥耘辨世謂舜之在下也田于歷山象為之耕鳥為之耘聖德感召也如是余曰斯異術也何聖德歟孔子敘書於舜曰濬哲文明聖德止於是而足矣何感召之云云乎然象耕鳥耘之説吾得於農家請試辨之吾觀耕者行端文粹有而字徐起墢欲深獸之形魁者無出於象行必端履必深法其端深故曰象耕耘者去莠舉手務疾而畏晚鳥之啄食務疾而畏奪法其疾畏故曰鳥耘試禹之績大成而後薦之於天其為端且深非得於象耕乎去四凶恐害於政其為疾且畏非得於鳥耘乎不然則雷澤之漁河濵之陶一無感召何也豈聖有時而不德耶孟子曰堯舜與人同耳而好事者張以就其怪非聖人之意也吾病其書之集無之字異端驅之使合於道人其從我乎雖不從吾亦不能變其説朱氏夢龍解一作辨劉蛻吳郡朱氏言昔之夜夢龍入井客之好誕者作佳占以祥朱氏豫曰豫未嘗識周公孔子者也然而使豫得夢一丈夫苟冠衣之古者因謂之周公孔子人必知其自欺也未嘗識越不知越之城郭宮室途巷苟或夢之未可自知其何城也然則朱氏之所夢入井者朱氏安知其龍乎豈非常見畫工者屈其脊拏其爪施甲鬛雲氣於身則似乎其所入井者耶是朱氏之夢畫者也殆非夢龍矣自夏后以來人不見龍然而言龍者信其畫而已漢魏之數見者見其畫者也薄姬之娠者亦畫者也時門之鬭者亦畫者也史皆謂之龍且明史之妄况朱氏之學妄哉夫龍不輕出又不可褻乎婦人有德不鬬故知皆非龍也嗚呼龍以變化為德也故孔子曰唯龍也不可知是則德也而如蚓如蠖如蛇如魚未可知不為龍也或者謂如所畫亦可謂之龍也則朱氏所夢曾何龍乎蓄狸説楊夔敬亭叟叟家毒於鼠暴穿甬穴墉室無全宇咋囓篚筐帑無完物及賂於捕野者俾求狸之子必鋭於家畜數日而獲諸汴逾得駿飾茵以棲給鱗以茹之一作字字撫育之厚如子一作字諸子其攫生搏飛舉無不捷鼠懾而殄影暴腥露羶縱橫莫犯矣然其野心常思逸于外罔以子育為懷一旦怠其紲逾垣越宇倐不知其所逝叟惋且惜涉旬不弭𢎞農子聞之曰野性匪馴育而靡恩非獨狸然人亦有旃梁武於侯景寵非不深矣劉琨於日磾情非不至矣既負其誠復返厥噬嗚呼非所蓄而蓄孰有不叛哉文苑英華卷三百七十二
