body:
  text: 文苑英華卷九百十三宋李昉等編職官二十一都督三夏州都督太原王方翼碑一首贈太尉益州大都王仁皎碑一首廣州都督甄亶碑一首贈廣州大都督馮象衡碑一首贈安州都督王仁忠碑一首夏州都督太原王公神道碑張説良玉禮神用之西序之器拾之南山之璞冏然不有其珍也君子安命進之扞城之雄退之去國之老隤然不失其正也語夫杖運以行道屬辭以比徳亦何代無其人哉公諱方翼字仲翔太原祁人王周之後也王子以敗狄受姓徵召以遁世為名司徒之濟艱難義形漢室太尉之圖舉甲心盡魏朝聞蔣濟所言則知尚書志力兄弟繼美覽周書所載則見穎州忠烈子姓集作姪皆封臣節奮揚於百代家聲藉甚於四海大王父司徒定公秉隋氏之崇也王父駙馬開府文公裕先朝之懿也考特進慎公仁表皇室之甥也公門揔四岳之靈帝子分五潢之氣是生時傑鬱為人紀公雄姿沉毅凛難犯之色虚懐信厚坦招納之量識畧精斷達應變之權神守密靜堅不奪之節孝友内兆於免懐忠敬外灼於既冠加以思叅造化誠合鬼神文其詩書武其韜畧推此才也以從政焉永無遺矣集作無匱夙遭家難衰過柴瘁京師號曰孝童王母同安長公主引貴遊之誡示作集作其苦之端俞俞字集作今太夫人徙居郿墅儲無斗粟庇無尺椽公躬率傭保肆勤給養墾山出田燎松鬻墨一年而良疇千畆二年而厦屋百間日舉夀觴厭珍膳矣處約能乆不亦仁乎在困能亨不亦智乎永徽初始宰安定誅豪暴以育人察奸宄以申寃異政三舉清風一變除潮海都督集作護府司馬以母疾辭職為姜恪乘便逐徒朔州尚徳府果毅歳餘王本立上書理公國之惇孝不宜擯抑有詔徵還而親不待心與哀絶氣屬禮存詔御醫孟黙朝夕診視免喪逾年僅堪履立樂成公東討新羅薦為將師詔公持節雞林道總管軍停不行授沙州刺史未至改拜肅州以為慢防啓冦非重閑也乃大築雉堞嚴備櫓械人知有恃戎亦來威儀鳳歳河西盡蝗獨不入州境隣郡輳稔提絜如雲公傾私泉以資乏引激水以立磑舉火百圶日哺集作餔千人遂有芝草叢生豐年屢降人之詠徳刋石存焉裴吏部名立波斯實取遮匐偉公威厲飛書薦請詔公為波斯軍副使兼安西都護上柱國以安西都護懐寳為庭州刺史大城碎葉街郭迴互夷夏縱觀莫究端倪三十六蕃承風謁賀洎于二字集作自洎汗海東肅如也無何詔公為庭州刺史以波斯使領金山都護前使杜懐寳更統安西鎮守碎葉朝廷始以鎮不寧蕃故授公代寳又以闕集作求不失鎮復命寳代公夫然有以見諸蕃之心摇矣於是車薄啜首唱冦兵羣蕃響應蝟毛而竪公在磧西獻捷無虚歳蹙車薄於弓月陷咽麫唐書同一作䴮非於熱海剿叛徒三千於麾下走烏鶻十萬於城集作域外皆以少覆衆以誠動天葛水暴長祭撤而三軍涉渡葉河無舟兵叩而七月氷合由是士卒益勇戎狄益懼璽書下問皇靈逺爍遷夏州都督徵詣奉天宫熱海之役流矢貫臂陳血染袖事等殷輪帝顧而知之視瘡歔欷曰為國致身乃吾親也妖賊白鐵余據城平以反奉詔與程務挺討擒之善公有發石懐城之計反風焚柵之感封太原郡公元珍冦邊受命討擊公以無甲乃發思造六片木排袴關劔解合畫為虎文北至關先集作開光與虜合戰若驅猛獸䝉臯比莫之敵也敵馬奔駭獲其二啜桑乾舍利兩部來降初公善書與魏叔琬相輩工射與趙持滿齊名帝每矚之賜比鳴輦賞深懸帳嘗獨行夜入有怪人長丈直來趣逼射而仆焉乃朽木也太宗壯之授右千牛及持滿伏法暴骸公哀而收葬為金吾奏劾高宗義之釋而不罪履道坦坦多如此類適將任帝夔龍為國方虎天下膏潤羣生雲雨惜哉不辰悄焉遘侮嗣聖之際天后臨朝有凶人誣奏公廢后從兄常懐怏怏司刑御史舞文矯制不名等法遷於崖州路至衡山寢疾捐館春秋六十三垂拱三年閏正月二十九日葬於咸陽原君子曰斯才也斯望也難乎免於斯之代矣周公聖而謗屈平賢而放賈誼才而謫李廣勞而喪彼天命之紏紛此人情之惆悵神龍中興以陷酷吏例復官爵孝為人極忠為令徳神之聽之始枉終直信矣有子故光禄少卿璵今秘書監玽皆篤行純孝慎終思逺説少也䝉㑹友升堂今老矣豈能旌墓遷司漢籍感激論都尉之書邕叙彪情追美樹楊公之碣銘曰上徳惟公氣秀才傑孝𢎞世美忠廣前烈日月必集作心照江河思決難地必通暗機先徹卓犖文藝崢嶸武節勤集作歎是由宰邑借恂臨郡海女避途山虵可問師律三揔軍聲六振鋭氣入營長雲出陣嚴肅將威烜集作恒赫天外玉弩方擎集作檠雲旗卷斾天道茫茫自古多傷功存西域身棄南荒易簀中路懸棺反藏寳刀生衣玉映無光後有才子先贒不亡贈太尉益州大都督王公神道碑前人維天命帝子萬邦維坤配乾母萬物以親九族后父之屬尊以叙百官開封之班最執謙徳而光重地者則祁國公其人也公諱仁皎字鳴鶴太原祁人王子賔天啓靈仙之族司徒衞漢大忠義之門盛徳之後仁賢繼出曽祖景孝隋屯田侍郎祖詮歙縣男贈汾州刺史考文洎贈右僕射纘戎烈考集作前列啓迪後人公之生也膺汾霍之禎體敦龎之度禮樂狃於世集作代襲忠孝萌於自然克寛克恭不激不傲鍳窮未兆而養之以䝉智周無際而處之以黙故實集作質勝於文行過於譽其隱徳也三年不鳴其㑹等也一日千里初以翊衞調同闕換晉州司馬應將帥舉授甘泉府果毅遷左衞中郎將上昇春宫后正妃壼擢將作大匠事時集作符非工練八材孔修轉太僕正卿騶訓車攻六飛如舞先天内禪引伸外戚懐柔畏滿厭劇思閑公既深辭以職事上亦優之以散秩迺加特進禮異羣公迺拜開府儀同三司䇿上柱國封祁國公邑户三千實賦三百公於是寓情宴喜簡跡朝行入告嘉猷密而人莫窺也隂薦多士晦而人莫知也不自異於當路毎同塵於流衆常語所親曰明明天子擇賢共理瑣瑣姻婭則無膴仕不識不知樂我而巳善矣夫人臣位極遇莫大焉王曰外舅厚莫重焉而能明道若昧進道若退事不事而懸解為不為而理㑹一以無目牛之全一以無亢龍之悔所謂言合古行中權歟後之人慎終始而保福禄者固將㳂通波而蹈高軌享年六十有九開元七年四月戊申薨於京師皇上悼焉設次大臨輟朝累日榮之以華衮寵之以飾終追贈太尉益州大都督賜東園祕器唅隧贈賜率加常禮乃命尚書彭城侯劉翼柔攝大鴻臚俾之監護京兆少尹崔琬介焉中命詹事南安侯龎承宗持節吊祭左庶子自知慎倅焉公卿命士更弔迭喻溢巷填街為之縞素粤以十月初吉葬我昭宣公郡官執綍祖奠國門如前㑹夫天作聖合必起大邦故軒妃美於西陵周婦表於東海公繁衍之慶祚𦙍二十或哲或謀或肅或艾永錫之類也如是元女祥發望雲業叅鍊石内被螽斯之徳外偃關雎之化門風之至也如彼長子惟力戴君畢心禦侮奉雲雷之㑹懸日月之功庭訓之致也如此高陽有才子八族我盈其二武王有理臣十人家出其兩稽諸舊史罕或前聞若乃積三盛事而重之以絶徳篆于金石垂于億祀集作萬宜哉其文字光華撰録㫖要則皇帝所為也臣奉詔作之銘曰於穆祁公誕靈信厚有倬其慶天子外舅高以卑牧盈將冲守忠焉孝乎没而不朽人之忠孝其徳不回天界純嘏大福來時貴踰九列榮並三台祚之𤣥社帝曰欽哉祁公之徳柔嘉維則令儀令色小心翼翼如何昊天喪此邦式休聞其永豐石是刻我思肥泉孝心罔極廣州都督甄公碑君諱亶字道一中山無極人也昔胡公紹舜奄有大邦楚子縣陳逃威樂土當烈王之世集作王也有陳通奔周王以為忠將美其族言舜居陶甄之職命為甄氏錫姓因生如聖之讀形聲轉注以真為音處則稱劉一作留非明歸晉者以異變而為郭蓋承虢者有馮通之裔邯仕漢為太保大司馬承陽侯邯十六代而生鸞仕齊為常集作太山太守司隸校尉無極縣伯撰笑道論行於代鸞生隋汾州刺史族族生隋沁州刺史紹紹生隋新市令恊恊生單于大都護府録事叅軍贈宋州刺史封惟祖惟曽在商在夏世濟其美永觀厥成君即宋州府君之第四子也博綜經史脫畧流俗情之所遺對咫尺於千里氣之所重輕百金於一諾曰興曰比階應劉之閫奥或草或真藏鍾張之筋骨譽滿鄉曲聲聞厥庭天后臨朝再加辟命皆辭以親老不赴逮疾革易簀骨立廬墓復有制徵焉刺史獨孤莊率府寮敦諭起於墳左乃授左金吾中侯生盡其養豈違親許人没盡其哀方委身狥國或用或捨有以見大君之仁時止時行有以觀大孝之節君臣之際其逺矣哉尋除左千牛長史檢校武候集作始軍長史攝右臺侍御史兼靈武道行軍長史攝右屯衞郎將副臨洮軍使轉右驍衞左集作右郎將為臨洮大使拜蘭州刺史兼榆林臨洮等軍大使除夏州都督兼鹽州防禦使徵授幽州都督衣之以紫攝御史中丞為河北軍州節度大使君政成周月惠則在人患是綏風表以去職未幾復除夏州都督屬山戎矯䖍俶擾王畧兵落天上思回行以出竒虜墜集作墮計中守便宜而未進時以為逗留貶撫州刺史朝廷明此舉也未到官遷廣州都督兼嶺南按察五府經畧討擊故春秋五十有七開元五年七月二十六日集作八終於官舍以某年月日歸葬於恒陽之王公南山原不忘本也君三承辟命再攝憲曹八典戎族五司藩翰事之去就所歸必執其中職之高卑為政各當其適集作選觀夫果於亊喻於義下學而上達强兵以知類畏克厥愛道無常師有商也之才有求也之藝習禮必本飾之以菁華積行必崇茂之以枝葉以此探賾則投刄皆虚矣以此効官則操刀必割矣是故羣士之所鞅掌而君之所綽約常情之所戚戚而君之所蕩蕩由是言之搶榆之與海運鳴琴之與星入從可知也惜其志懐慷慨雅多大畧授桴作氣有七縱之能孤劔無前當萬人之敵竟不得横絶漠騁雄算刮狼星集作望之祲鏡乎太清卷瀚海之波静而可掃駸駸之足受羈騏驥之途堂堂之貌必畵麒麟之閣彼哉有遺恨矣其孤某等望之不至求兮不得永懐揚名廣慰罔極銘曰有鰥在下陶復河濵元女作合相攸于陳楚為不道祚以永淪周寵忠節氏以初因丕惟承陽致君論道施及無極建家戴考集作逮家載考彼汾彼沁伊時之寳宰兮牧兮亦孔之好積慶濳演俊乂挺生標格磊落氣志清明八司戎事厥謀有成五刺方伯厥政有聲山有杞梓工思其度國有孫呉君思其畧棄徳珠浦遺氛沙漠惜哉不當今也可作恒岳臨北滹沱注東仁不忘本孝亦令終夀堂盤薄牧子充窮勒美松墜穆如清風贈廣州大都督馮府君神道碑夫積徳垂裕之謂仁逺追揚名之謂孝仁則慶鍾厥後孝則榮及其親嘗三復於斯言今於馮府君見之矣府君諱衡集作君衝一作象衡其先長樂人也釋趙歸秦本家上黨分燕徙越又據高良自逺祖榮懐化侯業集疊業字以至于大父贈荆州都督益先考高州使君智戣咸以勲績建旟本郡甲兵雄於一方政化杳於千里君藴含𢎞光大之徳守冲黙安貞之志秉難進易退之操詣一作臻希聲若訥之道為而不有故物譽難得以稱靜以居常故世榮無因而及以聖厯之歳終于本州集作城子㓜家艱喪禮蓋闕夫人麥氏備女集作母師之六行履先姑之四徳處順思柔以成婦道及衞亡共伯而魯重敬姜誓以泛舟之詩遵其䦱門之禮季子今冠軍大將軍右監門衞大將軍上柱國渤海郡開國公力士始髫齔來儀上京既違徙宅之歡爰從倍年之訓感三州之深義易百代之因生捨馮亭之本枝從高徯之令族千秋仕漢遂去田宗隨㑹在秦别為劉氏遇風雲之感㑹承日月之光耀一作輝光茅土答其勲庸貂璫寵其忠信太夫人踰越嶺嶠就養高堂孝子展白華之勤慈母欣綵衣之貴精誠所感振古難儔噫歟資孝為忠隱心後動引桑霍之深誠慕金張之周密敬以衞主愛以安親而善不彰惠不逺集作百不遂者未之有也由斯言之則哀樂存乎心不以至音改禍福惟所召不以偏覆及詩云魯侯燕喜令妻夀母明神勞善人而夀其母也夫人以開元十七年享年八十有七五月十二日夀終于京城集作兆之來庭里舍天子悼先賢一作賢母之晦徳嘉侍臣之克孝思賵禭之未崇創窀穸之將及於是詔贈先府君潘州刺史備禮飾終招魂合葬是歳也大享宗廟遍謁園陵錫類之恩施于鄉士重贈府君使持節都督廣韶循康等一十六州諸軍事廣州大都督夫人受邑舊邦啓號南海從言加贈改封越國夫人哀榮被乎集作于始終寵光洽乎集作于中外為子之道何以加焉於是與兄右集作左衞中侯元璡左領軍衞郎將元珪等惟舊業之難名感新恩之荐及思建碑表以永芬芳夫毓至徳以庇後嗣仁之厚者也揚令名以崇祖考孝之大者也仁為五常之先孝實百行之首貫經教而莫比標人倫而獨出宜其鏤美金石式旌墳隧無忘清徽昭示來葉何必㑹稽江上獨有紀孝之碑安陵廟前空傳尚徳之頌其詞曰明珠紫貝產於南國代所珍兮允矣君子不耀其徳克全真兮慶流我後高驤上集作迴翥中貴臣兮朱幡象服寵及泉路榮其親兮孝道不隕勒銘表墓留芳塵兮贈安州都督王仁忠神道碑李邕觀厥君子大司莫盛於禮樂時事大竇莫及於寵榮非夫周於財厚於行外無鬼怨内無人非將何以享而福之兼而有之寅亮邦家武衞帝室者也府君諱仁孝題目作仁字字揖太原祁人也其先系於有周氏於子晉文武不墜子孫其昌掌兵覇秦為相寧漢累葉交映兩朝相輝梁之狐鳴司徒匡復於將亂周之龍躍開府扶翼於已興曽祖景孝府君隋屯田侍郎祖詮府君皇朝明威將軍歙縣開國男汾州刺史考文濟府君侍郎御史吏部員外朝散大夫東臺舍人並典學懿文夷道全徳高舉時秀丕承國工府君至和有純上徳膺茂軌度恬簡品鑒朗㧞篤誠博達英邁竒偉詩書異等容貎出徒飄然清風藹然顥氣安步名教詠謌典墳虚心以遊不思而得至於緝熙逺畧繩準嘉言寳匣干將玉臺明鏡未云比也解褐濮州司法叅軍要囚有倫亂獄不作泣下丹筆情深赭衣俄轉湖州司兵叅軍郵亭利權豪富僦市脂膏不踐玉帛何階須開元皇帝之濳春闈也以府君后之季父時之正人呉札識音周瑜能聽遷太常主簿尋以地近姻戚望出衣冠仍加朝散大夫試本寺丞屬國家有事上𤣥張皇大禮洽革舊典節制新儀超上柱國而即真焉及皇上御極元妃昇后遷太子僕六馬肅若其僚仰止朱祓皇皇鳴珮載遷鴻臚少卿四極梯航萬酋匍匐且和匈奴未繫單于轉太常少卿九樂備陳三禮大舉觀諸侯之㑹知天子之尊除左千牛衞將軍晝巡蓋常夜拜是功上謂府君曰昔太上皇嘗居此職時相委任是屬親賢府君兢懼滿盈誠懇辭避鴻私屢抑嘉願莫從霧露不宣腠理成疹詔使旁午御醫崩奔嗚呼杲日或虧良歳多謝命莫能續天將謂何春秋六十有一以開元十年三月癸酉朔捐館宇於京兆興寧里之私第皇帝震悼椒宫感惻制贈安州都督賜物二百段米粟二百石喪葬官供加𤣥纁束帛勑萬年縣令韋令監護即以某年八月壬寅朔安厝左翊太原舊塋禮也長子右衞長史嶷次子尚衣奉御嵩司農主簿崑京兆府叅軍崇岧屴㠋崟等並昭奬光訓憲矩令猷文翰發於國華禮則隱於人紀追惟廣孝永言孔亟推心陵谷泣血松楸是用合謀有成作為不朽直書盛徳曲訪小才錫類每深注情彌極文章莫及覽對何言其詞曰千年流慶百代象賢山邱藏澤海水成田文武震耀冠蓋蟬聮業楊史竹名雄鼎鈜其一施及時英駿發后族體大志𢎞氣和徳俶秀舉清流高標雅俗地位雙昇才名兩復其二太常禮樂儲宫調護屬國風偃司戎山固先帝昔官聖恩今喻匪親曷保惟貞是附其三三旌未涉六疾爰臻擁福何崇轉禍無神喪葬公備哀榮禮陳寵加黄壤贈及朱輪其四松栢舊塋𤣥纁今飾詔使頻繁椒宫慘惻河山動容風雲變色兹焉永懐古之遺直其五光有𦙍子克荷良弓臣孝家節文章代工推心匍匐泣血無窮托碑板以題述庶哀敬而永終其六文苑英華巻九百十三
