body:
  text: 文苑英華卷四百五十八宋李昉等編制書十一節鎮七授葛從周兖州節度使制韓儀門下建牧立監施亭育之深仁顯忠遂良表激揚之茂典其有聲馳軍伍績著郡符威令夙振於戎行美化雱流於封部允契求材之念宜當分閫之榮遂舉寵章俾膺重寄具官某學洞𤣥符智苞黃石抱刻銘燕然之志藴刋碑勃弄之心氣薄雲天義凌霜雪以和為貴用壯處謙御下而寬猛有經料敵而錙銖罔失朕以鄒魯重鎮兵革連年慎擇可人用蘇疲俗得於僉論叶我敷求昔魏延以勇略逸羣自偏禆而登上將吕䝉以材智拔萃捨行陳而㧾戎麾况乎早踐方州屢登崇秩績效已彰於靡盬奬酬宜示於優恩仍加水土之尊式寵旌旄之寄爾其靜訓驍勇之士惠先惸獨之人布我憂勤康其凋瘵膺茲超擢無忘恪恭授李思讓延州節度使制門下夫息亂以靜濟道者權當底定干戈之時乃更易節旄之任寧辭改作式貴叶宜不移將相之榮别奉藩宣之寄用光勳傑爰舉寵章具官某氣薄雲天志堅金石藴翦起之雄勇負冦賈之智謀誠明可以伏鬼神義烈可以貫風雨纍代以勳勞報國狥節忘生一門以忠孝承家推心濟物功銘鍾鼎誓著山河每逢多難之秋必奮安危之用昨以邠岐動衆畿甸匪寧授以統臨錫之鈇鉞舉旄效命投袂連行備聞靡盬之誠克抱盡敵之意朕念兵革繁興十有八載蒸黎版蕩一作蕩板邑里洞虛為人父母之心深一作但慙凉德拯國艱危之運唯有責躬爰議罷兵用安率土又念昨者邠人不令潜持兩端有誤軍機遂成退守復臨彼土自不懷安雖欲撫寧諒難輯睦是乃换雙旌之雄重割兩郡之膏腴成一家千里之封列三鎮十連之責勉思勤竭膺我寵靈授李成慶夏州節度使制門下夫有大功德於天下者必慶垂私門賞延於公室者必傳家令子賞延者國俾嗣者侯著之格言是為彛則祗膺丕訓䖍奉成規徴比事經式登功緒必盈僉論方舉寵章某官繼美勳門生知戎略識度早聞其善將風稜尋號於老成朔漠之氣嚴天資毅勇崆峒之人武神授端莊以忠孝為身經守謙直為家法諸父每舉宿將知歸徐晃沉詳幼而特立既克紹於門風爰委用於舊土未行真命且假劇權士心咸感於惠和封部果臻於寧肅既符試可須議與能方當殄冦之時將用正名之典我之異渥實為訏謨以爾成慶代有殊烈祿山滔天之日文已載於司勳朱泚盜國之時績復書於盟府洎黃巢犯闕先臣進兵兄弟宗族携率征討首謀大計果成元功麟閣丹青鴻鍾紀勒垂之不朽永以無窮今則近輔元渠久未誅剪朕之鬱慎格于皇天爾其思曽髙戡禍之勳纘父叔定傾之烈盡驅鋭旅速殄祅巢克副家聲以康國步服我休命所宜若何勉樹功名勿孤注倚授涇州節度使張璉加檢校司徒同平章事制崔逺門下書云用命賞于祖不用命戮于社然自三代以還未有不戮暴亂不賞功庸而安國家定社稷者也近者徴其鋭旅討彼元凶不越月而捷書繼聞未逾旬而鎮城連下易如拉朽勢若建瓴諒非昭代之才孰濟勤王之績我有懋賞爾其聽之某官切玉雄鋒摩霄健翼智符靈蔡節貫寒松繼乃父之休勳鎮于巨屏誓忘家之壯志控彼邉陲積粟訓兵安人阜俗不忝登壇之寄彌光出將之門近者宋文通顯背國恩堅違君命將清叛亂爰仗忠良首奉詔書龔行討伐選射㦸盤矛之將率控弦帶甲之徒既已先啓行復深入其阻立志無慙於馬革輕生不讓於鴻毛矧聞才出封疆繼降城鎮一作鎮戍既臨賊境克保隴城振貔武之威聲斷螳螂之怒臂而又不勞經費自備糗糧惟踴躍以用兵不因循而玩冦今則方憑妙略共殄長鯨雖伐罪吊民以覩訓齊之令而誅妖剪怪合資掃蕩之謀是用俾壯軍威仍加相印以勵始終之效勿辜倚注之恩敬之戒之服我丕訓授蘇文建邠州節度使制門下梁漢古封河池名郡有關山之險阻當巴蜀之要衝茍非勳賢不可輕授我今有命允謂當人某官截海雄姿追風逸步得左馬右人之術洞玉鈐金匱之書加以幼慕功名早懷壯槩攬轡藴澄清之志臨風多慷慨之詞頃在禁宫屢竭忠節四奉指揮之任久彰羽衛之榮洎委節旄俾之鎮撫當巨逆梟夷之後是邠郊凋瘵之秋而爾復茂政能益堅撫字未周星律己播謳謡方深倚注之懷用安黎庶旋屬干戈之患每軫焦勞既互有奏陳慮多嫌隙冀寧生聚爰職改更復以未戮奸凶方思勳舊殄冦既資於上略㧾戎宜錫其名邦俾居十乘之榮以長萬夫之氣爾其便提驍果亟赴征行破其城社之祅刷我宗祧之耻然後仗茲龍節蒞彼雄藩髙居將相之尊永保山河之誓人臣之節丈夫之榮何以加焉爾其自勉授安友權安南節度使制鄭璘門下朕以伯侯之崇列於藩翰旌鉞之寄屬在忠勞况其俾奉詔條佇乃聲效宜洽念功之典用資撫俗之才具官安友權學奧六韜術探三志得子玉理兵之要有少卿養士之心自屬艱難彌勵成節侍衛之勞既著星霜之志靡渝載陟周行益恭環列校其勳績宜舉寵靈乃眷海隅地聮越俗每思封部尤在撫安往分瑞節之榮更益公台之重爾當奉茲七德睦彼四鄰夙夜以勵武功周旋以修軍政成于樂土副我朝恩勉服訓詞欽承厥命授錢鏐潤州節度使制門下登壇命帥俾宣力於四方暢轂戎車付機權於十乘鎮于列土委茲誠臣所以功著者寄崇勞大者賞厚由是將疑作時􅈾兼領迭擁戎旌爰稽至公遂行殊渥某官凌霜徑節溢匣竒鋒功成不居卑以自牧分山西之秀氣將疑作特禀威稜讀圮上之偏書洞知韜略名齊飛將績茂冠軍自撫藩條綽聞政理法去滋彰之弊人稱勞徠之安蔚然風聲逺陳謡詠昨者董昌輒生狂逆顯負恩榮既署官僚復更正朔自稔貫盈之罪敢慿城社之安謂天網之可逃宜有土之共棄悖慢之狀逺邇咸知鏐於此時獨奮忠節掃欃槍之巨祲清沴氣以無遺爰整干戈竟開城壘捷書上獻殊庸卓然且思勸善之文遂舉疇庸之命是用益其疆土盛彼旌旄增鏡水之名封兼金陵之奧壤合此重寄殷為大藩風煙載嚴控制甚廣允暢萬夫之望彌張列郡之雄我所報功斯謂格寵爾當勿私彼教每務謐寧偃戢兵戎拊循凋弊動體安人之本自成樂土之風奬任益崇鎮臨攸重勉承明訓往惟欽哉授李鐬雍州節度使制門下漢之上將或委登壇古之萬夫用期觀政所以典拂素難於方面僉諧遂舉於寵章有我勳勞豈吝恩擢某官秉節持重抱器謙明既熟戎韜兼通軍志拂青萍之出匣百錬無前整紫燕之追風千金莫對感激而雷霆助順訓齊而貔武增雄爰自先朝荐逢多難功烈昭著金石無渝且聞宿衛之忠亦著載馳之效每稽功秩盡瘁十年爰用陟明嘉于一志乃眷雍部實為舊藩接服嶺之要衝連駱越之奧壤付兹重寄繄爾雄才爾當清以臨人和而馭衆善施條教動慰蒸黎蘇我彼封佇成樂土仍峻保安之秩式崇鎮撫之名往惟欽哉勿怠丕訓授李繼密山南西道節度使門下朕以恭己視朝詳理興化對山河之美必念功臣聽鼙鼓之聲每思良帥况其華陽奧壤黑水上遊提封逺振於山川列郡豈惟於千里爰授勳略往膺撫綏斷自朕懷允符僉屬某官深沉曠度果敢知名秉義向公服於吏事披堅執鋭振彼軍功奉國勵心以身率下暑不張蓋惠若投醪刺隴坻而師必樂隨鎮洋川而人皆自便卓然威稱洽乃風聲今以梁漢之間撫理是切允思安乂諒屬智能既習俗以不遷眷寵章而宜舉况爾伯父鎮于是邦舊愛尚流承家益美想彼下車之後必聞蒞政之方爾其蘇泰蒸黎務勸耕織謐寧封境謹奉詔條致我巨藩成其樂土不改三公之貴用光十乘之權厥惟欽哉勉承嘉命可權知河陽節度使觀察留後特進檢校司徒兼御史大夫上柱國隨郡開國子食五百户授李思敬馬殷湖南節度使制盧說門下十國為連萬夫是長兼文武之寄居方嶽之重握我兵符疇咨人傑而又束神京襟帶扼衡越咽喉疏五畤之封疆跨三湘之土壤節制之重柬求惟難允叶僉諧爰膺並命具官李思敬族著山西神交圯上鼎鍾刻伐帶礪誓封探義府之淵唐諱一作振疑作根源暢和門之方略雙鞬小㦸承家而猿臂推竒叔豹季貍濟美而牛頭入夢具官馬殷夙彰竒節素挺英才究六韜三略之微得十圍五攻之要誅暴救亂戰必勝而攻必取安人和衆近者說而逺者來既有勇而知方善勝殘而去殺並懷仁抱義履信資忠載張四維俱崇七德或二戎車之政令寬緩不苛或列雄鎮之偏裨動用安重使惸婺服其惠桀㸃畏其威為我寶臣咸彰嘉績有以難兄告老瀝懇以聞俾諧內舉之誠爰頒試守之命有以元戎殞喪軍俗上陳言其以得士心可使為帥姑徇人欲爰假武符或曽未半朞或始逾星紀皆聞報盡允叶陟明而善守化條克固吾圉綏懷有庶協比其鄰底貢率循于舊章賦事罔愆於彛制不有即真之命曷明勸賞之文是用授以旌旄錫之鈇鉞或升其馭貴啓以邑封洎夫端揆之崇並壯方隅之寄各竭誠節以奉明恩撫字蒸黎尊奬王室無窮九貢靜布六條咸思不溢之言以謹有終之戒服我謨訓往惟欽哉授孫德昭安南都護充清江軍節度使制吳融門下夫悍大患者必見危致命立竒功者乃知幾其神茍非憤激于衷義形於色則安能彰明大節果斷一時正垂象以回天决浮雲而出日惟人所至何代無才既得忠賢卓然超異宜加寵數用激人倫具官孫德昭河右英才山西徑氣通白猿之劍術得𤣥女之兵符振跡和門登名勇爵非義不服惟忠是圖克揚羽衛之事功罔墜先人之職業朕憶昨釁生不測禍起非常儲皇因逆黨脅從大寶為渠魁搖動萬乘幽辱兆民震驚爾能首唱義師力扶王室率貔武於重城之內戮鯨鯢於兩觀之間出豫榛棘之前復我當陽之位今則皇綱反正天性如初議臣誠則冠彼羣倫語將略則髙於一代是用授之旄鉞帖以鈞衡既兼保傅之崇仍益井田之廣階升一品職重六都誠謂殊榮未酬忠力勉圖終始用保休光授王行審鄜州節度使制門下古之命將也推轂以示其優恩設壇以彰其異禮蓋付以生殺之柄受其制臨之權用為翰藩以固疆土北馳栁塞南控金河欲靜烟塵必資心膂既俞公議爰命誠臣某官隴右良家山西茂族禀風雷之徑氣挺鵰鶚之雄姿自名冠伍符身登勇爵孔明八陳列于胸中吕望六韜懸於掌內况早專留務甚洽政聲帝澤皇風嘗聞其導逹殊方異域悉致其懷來耕農不廢於三時凋瘵盡蘇於一境夫賞功所以華國貴不逾時旌善所以勸人務將致理是用委之玉節寵以牙璋仍加五等之封更厚一成之賜於戲爰自多難常思勳臣期於倚注之間能濟艱難之運然則未富土地者我富之以土地未貴節旄者我貴之以節旄茍懷報上之心宜顯為臣之道勉膺重寄善立竒功山河在前終始無替授孫儲秦州節度使制門下武惟靖亂文以守成蓋自昔之通規亦當今之令典况地連隴蜀城控邊陲久息戰爭近經惠養思繼前政用安一方爰屬僉諧得兹人傑某人學富縑緗文輝組繡有經濟安時之術負恢張出世之才加以立性端方操心徑直臨事罔思於擇利當官每切於推公以是淑齊居為理具將重其選孰與之先昨以邠土奧區逾時闕帥俾專旗鼓用息烽煙而屬十乘未臨三軍獻狀既聞陳請須議改移今復以成紀巨藩仇池善地將圖靜鎮乃易麾幢不離寇土之崇增以列侯之貴仍加食采更重登壇於呼制獷悍者須用其至公撫疲羸者無先於不擾非仗忠正兼資潔廉則何以副吾乃眷之憂慰彼倒懸之急勉圖終始無忽重難敬之戒之服我休命授劉崇望東川節度使制門下武惟靖亂文以守成二者相須百王不易眷彼左蜀實為奧區分襟帶於銅梁束咽喉於劍閣久纒兵革今靜烟塵當疲瘵息肩之初是循良為理之日不推舊德何撫新邦式副僉諧爰申寵數具官劉崇望文含大雅道茂中庸藹玉燭以舒和挺金相而禀秀閨門密行每垂範於縉紳朋友推誠自可期於風雨藴是休稱居為令人洎踐歷諸華敷揚典誥迫於公議委以國鈞而能上宣三光下遂萬物臨事而曽無辭遜操心而惟務和平尋於東土多虞徐方擇帥乃兼金鉉付以牙璋爰自罷歸纍更寒暑既經多難彌振居聲今以庸蜀休兵梓潼無事俾銜專命往慰蒸黎而中外羣情朝廷所屬皆言重寄可委當仁是用寵以麾幢授之方面進升揆路仍假台司且彰倚注之深更示統臨之重於呼汝當為吾輔相吾固熟爾訏謨舉必推公動能克已今欲推公則莫若無黨克已則在乎不貪勉副前言更彰後效無忘警戒以保厥圖授孫儲邠州節度使制裴廷裕門下惟彼邠郇連近咸鎬雜華夏羌渾之俗有公劉后稷之風地控三州境延千里撫兹疲俗允屬名臣某官磊落喬松晶明片玉以雍睦作理家之本用詩書為干祿之基信厚難窺端莊不倚動皆顧行玉逺每耻於妄言志切導人季路罕聞於宿諾明鏡利劍髙謝塵埃止水秋山居為圭表自拔於侯府選在明庭心惟業官舉不避事廣明中盜侵關輔兵滿京師恭惟先皇帝逺幸右蜀爾則佐彼上相首誅助桀之人贊我元勳大挫吠堯之黨爾後一麾出牧雙節升壇安人得賢太守之風訓兵盡真將軍之令龔黃並駕管樂齊肩叠是功庸宜臻顯貴眷乃巨屏素號名藩爰自前朝必求名帥郭子儀以山河之誓勘定多難白敏中用廊廟之尊經營薄伐近則荐其疑作興喪亂方苦流亡將欲戢彼干戈保其生聚朕意一作是念人惟爾所宜靜以撫封儉而植已吊彼凋殘之後𢎞其惠愛之仁副我殷憂佇爾蘇息大司空貴秩左光祿崇階亦遣進封皆勸為理茍孤委任其如法何授韓建華州節度使制楊矩門下越自去秋狩于太華萬乘所至兆人是歸而大無不周細無不具其間舉重典振條一作頺綱封畿肅清宫闕斷度罔有廢事其何故哉吾有誠臣社稷之福今馮翊近藩襟帶河渭撫馭不謹煙塵不驚將俟廓清爰考前績官占蔽志吾何疑焉具官某星緯炳靈山河間氣理先正本謀必應機知義安居士皆盡力厚生利用人得保家閭閻則咸仰吏師軍旅則共推良將范宣子尤先興讓成安君止用作謀以標式大朝凖繩列鎮一受命則表章十上以得請為期一推心則忠孝兩全以奉公為本揔是全德實吾偉人今者沙澤之陽疆理相接厲階斯搆改作是宜俾兼統制之權允竚撫綏之惠爾當視同如華濟猛以寬則吾坦然人俟安一敬服丕命以孚于休文苑英華卷四百五十八
