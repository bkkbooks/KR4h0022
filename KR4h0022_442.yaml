body:
  text: 文苑英華卷四百四十二宋李昉等編册文一皇帝册文肅宗皇帝即位册文賈至維天寶十五載歲次景申七月癸丑朔十二日一作壬子朔十三日甲子皇帝文粹作太上皇若曰咨爾元子某惟天為大惟人君則之順乃德故舜禹揖讓而履皇極咈乃道故丹朱商均不能保鴻業是以啓有惠迪而夏嗣焉隋有亂紀而唐受焉五聖之御極文粹作宇皆以勤儉兢業日慎一日故能享祚長久垂慶無窮洎于六業恭位四紀厭於勤倦𬗟慕汾陽當保靜怡文粹作頤神思我烈祖玄元之道是用命爾元子某當位嗣統於戲爾有忠孝之誠極於君父爾有友愛之義信于兄弟爾有仁恕之行通於神明爾有戡難之才彰于兆庶豫懋乃懿績文粹作德嘉乃神武天之厯數在爾躬汝惟推誠禍亂將冀爾而文粹無而字下同能詔令作永清爾惟從諫社稷將冀爾而復寧佞言惟疵直言惟師任賢勿二去邪勿疑雅非后孰去文粹作民非后孰理后非賢罔與守邦欽哉慎乃有位無忝我祖宗之丕烈矣德宗皇帝即位册文王言會最維大厯十四年嵗次已未五月辛丑朔二十三日癸亥皇帝若曰於戲昊天有命皇王受之立嫡以賢春秋之義傳歸詔令作之於子漢氏成規宗廟社稷實賴其慶咨爾皇太子適稟天地之仁合日月之耀道光三善孝著十倫頃者國步多艱委以戎律理軍靖難保太定功克復帝圖廓清妖孽既表建侯之業俾承守器之重仁孝之德夙夜惟寅朕天命有終弗興弗寤非至公無以主天下非至法詔令作德無以臨四海是用命汝陟于元后嗣守皇業上繼宗祧下安群望其令詔令作命門下侍郎同中書門下平章事常衮奉册即皇帝位於戲宜遵太宗之法度肅宗之儉約任賢勿二去邪勿疑與衆守邦祗敬豫訓順宗皇帝即位册文維貞元二十一年嵗次乙酉正月辛未朔二十三日癸巳皇帝若曰於戲天下之大實惟重器祖宗之業允屬元良咨爾皇太子誦睿哲溫恭寬仁慈惠文武之道稟自生知孝友之誠發於天性自膺上嗣育德春闈恪慎於一作于厥躬秪勤于大訓必能誕敷至化安勸庶邦朕寢疾彌畹弗興弗寤是用命爾繼統俾紹前烈冝陟元后永綏兆人其令詔令作宜命中書侍郎同中書門下平章事高郢奉册即皇帝位爾惟奉若天道以康四海懋建皇極以熙庶功詔令作工無忝我高祖太宗之休命詔令作烈穆宗皇帝即位册文維元和十五年􅏤子閏正月甲辰朔三日景午皇帝若曰於戲上天降鑒保佑于我國家十聖丕承光宅四海鴻休大業以逮豫一人嚴恭祗畏懼弗克負荷賴宗社垂慶生靈乂安朕寢疾彌留弗興弗寤神器所付屬之元良以詔令作咨爾皇太子恆孝友聰明溫文睿哲自主匕鬯日新厥德必能纘豫勤志綏靜萬邦是用命爾陟于元后宜命中書侍郎平章事令狐楚奉册即皇帝位懋建皇極無忝我祖宗之休烈敬宗皇帝即位册文維長慶四年嵗次甲辰正月辛亥朔二十六日景子皇帝若曰惟天輔唐德我祖宗克答天意邁德勤道紹休大業洎豫一人嗣守四海祗事天地愛育萬類罔或失墜詔令作怠惰于今詔令作兹五年今寢疾彌留弗興弗寤詔令作不興不寤獲以重器付之元良咨爾皇太子湛列祖垂慶自天生德孝友慈惠溫良恭敬必能輯寧邦家輝光緒業是用命爾陟于元后宜令中書侍郎平章事牛僧孺奉册即皇帝位爾有廣大之量可以奉天地爾有孝敬之志可以事神祗和惠可以撫萬邦仁愛可以親九族任賢尚德遠佞去邪爾惟欽承無忝我祖宗之休烈文宗皇帝即位册文維寶厯二年嵗次景午十二月甲午朔十二日乙已太皇太后若曰大行皇帝睿哲英能對天明命方夏底績夷蠻貢庭罔有不端大康有截宜荷九廟之重永享億年之祿豈虞姦妖竊發矯專神器蠱惑中外扇誘羣朋駭動神人舋深梟獍咨爾江王某聰姿詔令作哲孕粹清明育和智算機關玄謀電發躬率義勇大清凶徒且膺當璧之符爰攄枕戈之憤既殱巨害當享豐福是用命爾陟于元后宜令司空平章事裴度奉册即皇帝位永惟髙祖太宗之剪定隋亂玄宗之浸漬利澤憲宗之堅除詔令作拔蠧孽艱難險阻最乃負荷小心以事上帝儉德以刑家邦懋于令聞持久如始敬之休哉尊號玉册文上應天神龍皇帝册文李嶠維神龍三年嵗次丁未九月景申朔五日庚子具官某及文武群官等謹昧死再拜稽首奉册言爰自厥初肇興司牧皇矣撫極蒸哉察道莫不因時適變改物殊徽推五運而陟崇髙步三微而膺厯數天地人皇之立稱始别洪荒唐虞夏帝之君尊漸詳文質姬水以推輪發號烈山以斫耒增名然後仁被德宣功昭業逺歷訪前古兹為舊式我大唐受乾坤之眷命當宇縣之謳歌奄有黎蒸遂荒宸象應天皇帝陛下垂統御極截海披圖承四業之休光握三靈之寶契虞舜蒸蒸之德永錫羣方周文翼翼之心其凝庶績驅齊民於仁夀致雅俗於醇濃六府咸修五兵一作戎不用航海梯山之客奉贄輸琛耕田鑿井之夫繫壤鼓腹中外靜謐表裏雍熙而孽子滔天亂臣干紀謀同觸瑟禍劇弄兵不虞之災忽生于肘腋無象之鑒獨憤于神祗于時凶豎逼樓聖君慿檻威靈下濟覺封豕之周惶醜逆上瞻見神龍之傅一作轉翼寶仗似億千之衛天威一作儀成丈六之容衆瑞俱一作共臨羣祅大駭盡迷方而失據咸喪一作奪氣而亡精顧盼而斬馘輿尸指揮而冰銷霧廓雖復草為兵甲秦師驚蔣帝之神樹作幡幢釋主麾一作屈魔王之衆蛇軀之變蝸后蛟影之隨漢髙未足以匹此奇徴方斯偉應自非冥符幽贊睿感潛通何以承波若之護持享髙明之福助昔者仗牛之主是曰犧皇名鳥之君仍題鳳紀法身用馬鳴成道上士以龍德為仙敢托元符爰咨故實謹上尊號曰應天神龍皇帝鴻猷載肇昌厯惟新庶以仰順乾心俯從人欲天長地久更隆四大之尊名玉振金聲恆為百王之稱首盛矣美矣皇哉唐哉臣某等誠歡誠喜頓首頓首死罪死罪再拜以聞一作皆唐大詔令開元神武皇帝册文蘇頲維先天二年嵗次癸丑十一月辛酉朔二十八日戊子攝太尉臣某等文武官六千五百一十四人言臣聞厥初生人首出庶物物不自理惟后所以康乂后不自專一作尊惟人所以歸往古先哲后安人育物表功崇號不可避一作辭也皇矣上帝臨于巨唐降氤氲垂耿光重熙而纍盛至太皇而授聖臣等敢稽首而言曰曩者景龍之末長蛇縱禍陛下慮宗祏之墜提劔而夷之則因親以尊主間者朝有賊臣天罰大憝陛下拯邦家之難援旗而勦之則措枉以舉直戮不及嗣惡惟其魁一作身思與王公卿士下逮元元揚闓澤而育一作布和氣臣又聞軒夢華胥堯期姑射未有一其道而順大皇之心文王之事武王緝熙未有一其時而居聖神之位褰裳釋重至公也端冕一作扆嚮明至孝也使九族敦一作惇敘百工允釐東西南北砥礪聲教彼靈有四招翠黃而可乘我寶有三捐珠玉而不御然猶發揮禮樂馳鶩典墳論思獻納進善從諫日慎一日上稽乎天意下考於人謀卓哉協元符而爍靈命者也夫開者泰也罔不通武者威也罔不服臣等不勝大願昧死上尊號曰開元神武皇帝謹上玉册玉璽臣等誠惶誠恐死罪死罪謹上一作皆唐大詔令會昌二年上尊號玉册文李德裕維會昌二年嵗次壬戌四月乙丑朔十四日戊寅攝太尉光祿大夫守司空兼門下侍郎同中書門下平章事臣德裕銀青光祿大夫守尚書左僕射兼門下侍郎同中書門下平章事臣夷行金紫光祿大夫尚書右僕射兼中書侍郎同中書門下平章事臣珙銀青光祿大夫守中書侍郎同中書門下平章事臣紳及文武百官金紫光祿大夫檢校司徒兼太子太保臣僧孺等六千五百七十四人言臣聞羲皇首太古之號成湯顯甚文粹作神非武之稱我髙祖皇王是憲尊名若古貽厥丕訓為孝孫之集無之字法豈不善始善述一作終哉矧乃巨唐受命繼體承業理運將至大君以興昊穹所以開至聖也向者明兩未定帝華不協舍胤傳聖深惟至公先后所以昭天命也亦猶堯發於唐侯文興於代邸神明之祚不其難哉詔令作乎伏惟皇帝陛下清明漙鬯光耿四海玄德真一作詔莫鄰天休大賚一作集日角見表氣志如神爰初定命正心理物如辰居其集無其字極而天下無邪矣由是昭德塞違尊賢逺侫禹不自滿成不敢康罔般詔令作逰于田不邇于色自閨壼以施王教由家道而刑國風去比周核名實攬權綱折聖律詔令作紀文粹作德修舊典協成詔令作誠質扢嘉壇欵太詔令作泰一進正臣以端治表禮故老以求讜言逺無蔽獄近無留令一作命祈玄祖而膏雨降祀靈嶽而嘉穀登省刑罰而蓬勃清一作消發倉廪而螽螟息去嵗龍旗承祀大輅親郊捧玉瓉而一獻光靈來格振金石而六變魄寶昭臨一作靈然猶古訓是學緝熙于道天文炳煥雲漢其章溫恭敬遜承太任之教和樂愷悌洽戚籓之心德風偃于羣黎威霆動乎絶域又以敬飬不逮於長樂昭配未升於禰宫每懷嗣徽蒸蒸而慕所以奉若慈訓對越兩儀因心立志永錫其教寬底剭之罪興惻隱之仁回霜收電一作回電收霜為之反汗及單于慕義景附朔邊耀德戢兵謙臨是受至於備文物展國容莫不先甲而布甘澤丁辰而廓隂翳和景晏溫卿靄絪緼斯所謂神祗之心應矣天人之際交矣於是服冕之士戴鶡之倫暨藩衛一作侯邦伯黃髮鮐背不謀而進曰陛下玄默天晬輝光日新大矣孝熙四極爰臻誠宜玉版溫潤鏤鴻明之德神寶焜耀荐億萬詔令作萬斯之年丕天大典不可辭也陛下猶謙退固拒至於三四群臣不已乃曰俞哉夫遍覆包含之謂仁極深研幾之謂聖憲度著明之謂文蠻夷震懼之謂武感而遂通之謂神無思不服之謂孝臣等不勝大願謹奉玉册玉寶上尊號曰仁聖文武至神大孝皇帝伏惟陛下乾健不息謙尊而光樂戒其耽禽戒其荒壽乃侔於殷宗德詔令作俗乃厚於成康貽燕後昆受福無疆臣德裕等誠歡誠躍一作懼頓首頓首謹言會昌五年上尊號玉册文維會昌五年嵗次乙丑正月已酉朔光祿大夫守太尉兼門下侍郎同中書門下平章事臣德裕光祿大夫守尚書左僕射兼門下侍郎同中書門下平章事臣悰朝議大夫檢校尚書右僕射兼中書侍郎同中書門下平章事臣讓夷朝議大夫守中書侍郎兼户部尚書同中書門下平章事臣鉉及文武百官太中大夫守太常卿臣孫簡等六千二百二人言臣聞昔在周宣玁狁內侵四牡薄伐以定王國焉則詩人大其功暨于漢宣北夷乖亂呼韓慕義郅支逺遁則簡䇿著其美惟此二代稱為中興間者開成之末星孛如雲螟飛蔽天先帝戚之黎人懼焉乃授至聖遺大投艱迄兹成功厥有冥數伏惟仁聖文武至神大孝皇帝表應龍翼位合集作粹含乾剛神全而正氣凝宇定而天光發智燭千里動必察微集作綴心鏡萬機物來斯應於是五材用四維張建中和之極舉集作紹前聖之綱重樞機修法制刑御家之理無出梱之言銷讒邪逺巧佞斥背公之黨退好徑之人內嚴體貌增堂陛之峻外絶締交抑一作去輔車之勢古所謂受命於天惟順獨正也又曰一心定而萬物服惟陛下得之曩者北夷矜功耗蠧中國種類盤牙根柢封殖異術肺腑縞衣如荼挾邪作蠱浸淫宇內倒懸不解百有餘年既而龍祠堙滅携國欵塞質帝女蹙漢集作海疆有狼顧平城之心鯨吞咸洛之志爰命驍集作梟將搴旗刈旃兵鏖穹廬火烈荆榛揚罽幕碎轒輼六騾遁逃貴女一作主生還剗滅妖迹勦除醜類故名王結髮冠帶入臣堅昆稽首鞮譯來獻而又姦臣放命一紀陸梁據太行之固下窺洛邑通故絳之道旁睨近關樹其遺孽以竊兵柄議者僉曰精甲十萬積穀十年泉魚不察湯網宜懸陛下雄斷霆聲羣疑冰釋揚清風以一作而掃雲鼓迅雷以破山任馮異則拔天井而震上黨仗吳漢則發突騎而傾一作窺邯鄲壺關失險山東奪魄屬有戌邊叛將竊發參墟人心搖蕩異議放肆陛下臨朝而言曰二寇獲罪于天豫所不舍未三旬而定晉陽才期年而滅潞子不以金購狶將多降不勞師克粵首馳報非至德感物孰能臻於此乎由集作於是台宰百辟藩屏將帥上言曰成伐東夷而肅慎來賀景剪七國而王室乃安莫不始於武功終致刑措將以禋上帝荐祖宗宜受鴻名以答玄貺陛下猶謙遜而五讓之集作請事勤勤罔已乃屈已以俞之雲漢為章所以昭法度也神明其德所以成教化也峞峞乎有功帝堯之則也勤于大道玄祖之訓也臣等不勝大願謹奉玉册玉寶上尊號曰仁聖文武章天成功神德明道大孝皇帝伏惟陛下不有其名以保其成不德其功以戒其盈享殷宗之福致周道之平熙我王度永集作玉振金聲臣德裕等誠歡誠懼一作躍頓首頓首謹言文苑英華卷四百四十二
