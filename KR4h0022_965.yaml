body:
  text: 文苑英華巻九百六十六宋李昉等編婦人四獨孤公夫人韋氏墓誌一首權祕監夫人李氏墓誌一首李監察夫人蕭氏墓誌一首崔縣丞夫人原氏墓誌一首李參軍夫人獨孤氏墓誌一首裴明府夫人閻氏墓誌一首李縣丞夫人梁氏墓誌一首嗣曹王太妃鄭氏墓誌一首殤子韋八墓誌一首前左驍衛兵曹參軍河南獨孤公故夫人京兆韋氏墓誌獨孤及夫人諱某字某楚王交傳孟裔孫唐許州司馬皎曽孫渭南縣主簿憼唐世系表同本集作懿之孫兖州金鄉縣尉商伯季女祕書省著作郎偉睦州刺史儹之妹以世系表添正其先自彭城郡徙京兆從丞相賢後九世至本州大中正穆始有東西眷之號二十五世至徵士夐居魏周二代出不降志處不遁集作隨俗時人號為逍遙公夫人之七世祖也逍遙公生民部尚書建安公世恭表作瓘字世恭建安生上大將軍宋州刺史仁表作仁乃仁基之子仁基乃世恭之弟將軍生給事中旅即為許州之禰也夫以四言之遺直一經之餘烈闕徵之高風焯於今古宜其秉哲垂懿百代不殞地之華望之崇與春秋之唐杜范氏漢晉之袁楊王謝侔其熾大矣哉三集作二非十八葉之明徳茂祉降衷于夫人故孝慈貞儉温惠淑慎文敏好禮三者皆天機生知不待師訓而至廣徳二年夏六月歸于我衣服飲食躬自菲薄夙夜戒敬致孝于荇菜接娣姒以謙馭㓜賤以敬敦善勸義恕不知而矜不能喜怒未嘗形集作見於容止也其徳禮所化宗族以睦兒童知讓生一子四歲而夭大厯四年夏六月癸丑再孕不育乙卯殁于舒城春秋若干人至集作仁厚而不福德備而不壽是天不惠于我家也向使錫厥永年正家承筐宜爾子孫百福是享非夫人曷歸啟手足之日長㓜號咷内外親姻四字集作外姻内姻親疎皆行哭失聲也宜哉是歲九月甲申以輤裧裳帷遷于洛陽十一月丁巳集作酉非安宅兆於集作于舅姑先塋之西南隅恐時逝事遷景行不貽於後故刋石以志卒葬且謹而日之著作郎贈秘書少監權公夫人李氏墓誌梁肅成紀李氏自涼武昭王以後後裔熾大在元魏有若司空文穆公沖沖生司徒髙陽公休績諸父兄各登三司崇勲盛烈載在前史夫人司空之後也曽祖允義皇朝慶州刺史大父仲進宣州司士參軍考備冀州司倉夫懸集作𤣥圃崑山是生璵璠徳懿盛族集作徳門懿族宜有賢淑二椽葆儒行不躋貴仕故儲慶發和鍾于夫人夫人㓜而孝恭長而柔明歸于他室克協休德所奉之主則著作郎天水權公其人公大節大名達於家邦人倫仰為師表夫人明識茂行光于閨門姻族資其訓式有子德輿七歲而孤夫人茹未亡之哀躬徙宅之教故德輿也十五文章知名二十典祕書貞元二年以廷評尉攝監察御史為江西從事夫人從子南征寓于鍾陵其樂以道其養以禄一慈一孝宜壽宜福天實不弔享年若干以四年秋七月某辰寢疾而終德輿窮慕崩迫忍哀問卜號奉輤裧至于丹徒以來歳某月日權合附于先君假葬之域嗚呼有行可尊有禮可法始輔君子終垂母儀而不登上壽不介丕集作繁祉斯命也已篆石紀徳謂為墓誌近古之禮也胡可闕諸其銘曰武昭之胄立徳立功且侯且公文穆之後昭明有融繼别為宗抑抑夫人餘慶是藂温良在躬歸我秘書體仁協衷集作衆非盛徳攸同乃訓孟子擇乎中庸休有先一作光風豈命有極豈天不傭降此鞠凶假窆何所惟栢集作松惟松于江之東棘人充充式號且恫哀思無窮監察御史李君夫人蘭陵蕭氏墓誌銘前人夫人諱某字某南蘭陵人梁世宗明皇帝生南海王珣自南海三葉至有唐太子太師某太師生中書侍郎某以文武之勤左右帝室世祚徐國疊耀集作輝台階蓋夫人之大伯父也父中書之弟駙馬都尉太僕卿諱衡踐脩舊徳尚某邑公主實生夫人𤣥宗其外大父也宣集無宣字非皇其舅也天漢𣲖流地靈騰茂藴為和氣鍾我淑德既笄歸于公族李氏曰錪錪官至監察御史以茂行聞於時上奉繼親旁羅羣族夫人内貞明而外柔順至於色養義充於輔佐仁見於周睦至乃冠婚賓祭之式組紃黼黻之事莫不能儀刑邦教律集作法度姻戚洎御史捐館夫人罷執笄疑作䒪之事訓道三女以禮自居二十年間母儀愈集作益光内則愈彰知我者方紀美行貽諸彤史天不與善享年四十八而終時建中元年九集作四月三日也初夫人無子晝哭之後歸于其宗仲弟御史中丞復孝愛之德聞於天下出守三州皆從而居焉是歲中丞由潭州遷左馮翊㑹夫人㓜女從夫有江華之貶亦將欲沿三湘展母子之歡途次于晉陵遘疾而没俄兵興不克反葬馮翊次子某以來歲某月日奉其姑之喪權窆于某鄉原嗚呼仁宜有壽善宜有後以夫人之賢且先代之胤與王室之出而亦集作其事並戾豈命也歟予集作肅忝遊馮翊之門也乆見命為誌其銘曰昔在帝祖承天命紀維皇歸妹光耀載起太師之孫魯元之子誕受休氣實為女士共伯既没敬姜道存訓成内則耀集作輝動髙門積徳所因其禮宜蕃碩人無子天道寧論將涉三湘奄歸九原生惟集作涯共盡有恨何言鄭州原武縣丞崔君夫人源氏墓誌銘前人夫人諱某字某河南洛陽人也昔涼武王烏孤景王傉檀繼為傑霸據河右景王生魏太尉隴西宣王賀賀生司徒惠王恭或以文武集作或文或武藩翰王室以拓拔同源因錫姓焉夫人其後也曾祖翁皇朝尚書比部郎中祖脩業涇州刺史父老集作光時濟隂太守夫人濟隂第幾女既笄歸于原武丞博陵崔君某以德敏貞儉宣慈惠和集作温愸輔佐君子而成家風原武之伯父沖嘗為刑部郎中每謂夫人淑哲之美可師表姻族洎原武疾病顧視諸子尚藐慮歸祔不獲以屬夫人夫人黙而省焉晝哭之後躬履草莽成反葬之禮禮無違者聞見集作者難之既免喪始游息道門受心法於大照禪師請益之際朗然懸解大照没又事𢎞正禪師入定集作文性離天機獨得喜怒哀樂無自入焉宴坐之外以敬姜之風操班氏之詩禮貽訓親族閨門之内盛烈流美禪林髙妙受用不極二十字集作貽訓諸姑故親族目之曰閨門盛烈道流美之曰禪林髙趣妙用不極委和歸真享年若干大厯甲辰歲十一月十三日寢疾捐館嗣子某乙等泣血襄事以來歲某月日權窆于某原仲子左集作佐車純孝而文懼聖善之徳不著後嗣遂假我為誌銘曰烈烈雄閥降茲淑哲惟夫人兮郁郁母儀中外肅祗耀閨門兮以道自光我性則常奄歸貞兮孝乎維嗣其哀也至刻斯文兮衢州司士參軍李君夫人河南獨孤氏墓誌前人夫人姓獨孤氏六世祖永業北齊司徒臨川郡王自臨川五葉至贈秘書監府君諱某門風世德家諜詳矣夫人秘書之第某女生而純孝容範淑茂成于德門歸于公族李氏曰濤故楚州刺史仲康之子今御史大夫涵之從兄也少有敏才故秘書府君以夫人歸之恪勤婦禮以正家節門内之治繄柔明是賴乾元初李君參掾信安遂終于位夫人罷助祭之事專以禮詩之學訓成諸孤議者以魯敬姜辛憲英為比晩歲以禪自適謂般若之經空惠之筌恃集作持而為師去諸結縛猶違土也享年五十三大厯十一年某月日寢疾終于常州遂權窆于建安集作元精舎之側明年某月日卜筮襲干吉始遷兆合祔于洛陽某之先塋嗣子前越州士曹參軍居介南陵尉居佐譙縣尉居敬孝亷居易等痛聖善之德不可追也俾肅為誌其銘曰温温夫人貞順而慈始為婦儀終為母師仰成法寳穎脱塵機身世兩遺乗化而歸合祔伊何周原舊域哀哀令嗣孝思罔極作銘片石以誌窀穸杭州臨安縣令裴君夫人常山閻氏墓誌前人夫人姓閻氏皇朝考功郎懿道之孫銀青光禄大夫尚書刑部侍郎伯璵之女河東薛氏之出前廷尉評領臨安令裴深之室也春秋若干以大厯乙夘歲五月寢疾卒于晉陵之私第來年月日窆于某原不獲吉卜集作兆未祔于皇姑禮從宜也先期臨安以夫人之德善俾予銘其墓故得而譔云夫人貞順惠和恭明孝慈自天授也樂善睦親儉而好禮承家訓也循集作修采蘋之度以助祭祀得婦道也四教行九族和秉内則也夫人有是淳懿故自致禮至于捐館小大無間言中外無異望郁郁詵詵一家興仁俟絶之際請辭其太夫人又辭其娣姒已而顧所生之四女曰母子之愛今也永絶夫中饋不可以無主吾已請而集作爾父娶繼室矣其來也汝謹事之無貽我神羞辭氣不惑言畢遂殁夫號母慟諸女孺慕聞其哀者行路集作人出涕存殁之事其感人深矣哀哉乃為銘曰穠矣蕣華茂藴質兮配此良士如琴瑟兮嚴霜隕零曷其疾兮吁嗟碩人歸此室兮德州安得縣丞李君夫人梁氏墓誌前人夫人安定梁氏族髙祖華陽襄公諱彦先集作光生周隋際歴上大將軍開府儀同三司使持節青冀華相等九州刺史貞惠文敏為兩朝名臣生曽祖永安成公文讚在隋為司隷刺史司隷生皇朝龍興令冀州長史晏晏生朝散大夫堯山令澄夫人堯山之第二女惠和集作生知孝慈㓜有令儀長而温良成而柔明年若干嫁趙郡李兼金生四子而兼金卒夫人内持正性外示德禮且以文行忠信貽訓諸子家道以和每言曰敬姜大家吾師也既晩歲修釋氏法以禪誦為事視身世榮枯與夢幻同因命第四子為沙門勵以清淨行既而壽量極享年七十二歲在乙夘十月乙未終于常州建安佛寺集作精舎後五日窆于某原孝子詠等銜痛泣血哀過乎禮懼先夫人德善不聞將誌幽穸以肅外族之屬也俾為斯文銘曰伊夫人煥母德道可尊禮不忒訓令子就儒釋没集作滅而藏焉永無隙人欲我知視此石嗣曹王故太妃鄭氏墓誌銘穆員大唐貞元景寅歲秋七月己酉荆南節度觀察使户部尚書御史大夫江陵尹嗣曹王皋奉先太妃滎陽鄭氏之喪歸于先王贈尚書左僕射諱職之居實洛陽邙山之原先是皇帝使中謁者詔東京有司備鹵簿鼓吹洎祖載儀衛之物且監視之事之前日嗣王有虞乎山壤一作墳泉隧不常陵穴迺以百世之後貽厥來者之義屬于小生太妃諱仲字正和恒州司兵文恪之孫郴州司户休璿之子鄭之於百族也如羣嶽之聳衆山焉溢于世間事不待紀太妃以禮之節為質以樂之和為性以詩之鵲巢采蘩小星殷雷易之坤蠱家人為德小大由之且以其餘施之於外夫是以賢子是以貴以利于家邦年十有四歸於公族又十四歲而先嗣王即世王屋天壇之下有别墅焉太妃挈令之嗣王與女子子洎夫族之叔妹未冠笄者與本族凋喪之遺無告者合而家之居無生資勤儉自力仁以恤智以圖使夫饑待我粒寒待我纊一作縷婚姻宦學蒸嘗之禮待我以時嗣王年甫及笄其所以導成慈訓者則以父嚴師教之道兼而濟之于時天下晏然而事有將亂之兆太妃念嗣王之壯必及經綸不患不貞患不更踐一作賤不患不聞先王之訓患不知下人之生卒以仲尼鄙事為教及其長也見其為龔黄見其為方召享其孝敬勲榮禄位三者日躋之報焉嗚呼月朢而虧天之道也以建中三年冬十月九日遘疾薨于潭州官舎之寢壽七十有二嗣王奉喪歸葬達于南荆國難方興天下否塞朝廷倚宗周維城之固加於郡帥一等乃用魯公伯禽有為之變俾復其位且使即其次而窆焉嗣王銜恤奉詔以戰克以攻拔統江西援江陵其事墓也如生平之養其哀號也執干戈者悲之今茲龜筮叶謀優詔惟允議者或曰東南之鎮荆州為大降冦僅滅多虞未忘遺羊杜之重狥曾閔之節越三千里執喪釋位謂安危何員以為嗣王之於朝廷也曩竭之以忠朝廷之於嗣王也今遂之以孝君臣家國之際於是乎古無以踰況其奉先之志不可以奪臨下之政必可以保且用崇厥孝理始于本枝使為子者悦事君者勸以感人心以順天下不然何卒葬弔贈天王之錫命視于同盟有加等焉初湖南部將有王國良者嘗危疑負固歴年不下嗣王為帥恭太妃之教以子召之國良捧檄如歸撫之以信其後入衛中禁錫名維新乃曰爾來之生今日之寵罔極之德也哀請赴葬上嘉而許之其執禮致慕視於闕由是以係之于篇銘曰抑抑母儀稟訓德門來賔王族慶集宗臣如彼崇山應時出雲霈然作雨澤潤生人裕我之蠱啟茲寵勛匡載疑作戴中興為唐晉文宜爾百禄享茲萬春運奪其養一作運短奈養天胡匪仁清洛之陽脩邙之阜我歸我居我徒我友維邙與洛將安宅之相乆殤子韋八墓誌此篇係男子已移入九百六十二巻今存其目獨孤及文苑英華巻九百六十六
