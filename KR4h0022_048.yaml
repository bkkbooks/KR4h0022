body:
  text: 文苑英華卷四十八宋李昉等編宫室二含元殿賦一首明光殿粉壁賦一首含元殿賦并序李華宫殿之賦論者以靈光為宗然諸侯之遺事蓋務恢張飛動而已自兹已降代有詞傑播於聲頌而一作則無聞焉夫先王建都營室必相地形詢卜筮考以農隙工以子來虞人獻山林之幹太史貞一作占日月之吉雖班張左思角立於一作前代未能備也而曩之文士賦長笛洞簫懷握之細則廣言山川之阻采伐之勤至於都邑宫室宏模廓度則略而不云其體病矣至若隂陽慘舒之變宜於壯麗棟宇繩墨之間鄰於政教豈前修不逮將俟聖德而啓臣心輒極思慮作含元殿賦陋百王之制度出羣子之胸臆非敢厚自夸耀以希名譽欲使後之觀者知聖代有頌德之臣焉其詞曰維皇髙祖一作宗穆端命於一作于元穹萬有千載一作歲鍾景祚於鴻一作于洪裔建北宫之尊嚴上取法於天帝乃圖正殿之逌居規崇山而定制信神明幽贊而人謀襲契不然何前王曠此之雄麗也先是大司空帥其屬執度而相之曰美哉川原一作后騖乎其大哉坦坤靈兮配乾剛坤順乾而為龍舒廣衍兮走羣山紛却面而朝宗陵正陽之奕奕鬱佳氣之蔥蔥蓋昊天之作而皇祗授元聖獲以造新宫也乃審於一作于龜筮龜筮叶從太卜以告神人咸同皇曰欽哉是將宜於一作為朕躬一作宫目一作因以鴻稱含元建名易乾坤之説曰含宏光大又曰元亨利貞括萬象以為尊特巍巍乎上京則命徵般石一作碩之匠下荆揚之材操斧執斤者萬人涉磧礫而登崔嵬擇一幹於千木規大壯於喬枚聲坎坎於青雲若神踣而顛摧勢動連崖拉風碎一作埣雷倒徑梢於窮谷斬巨柢於昭回時也山祗效靈波神作氣為桴為筏羽疊鱗萃朝沈江漢夕出河渭雲奔山橫并構二字一作交積於作宫之地於是農事既收靈臺勿亟子來而就役者周邦畿而薄四海咸忘勞而獻力乃張為廣度考正極星邦伯是經國工研精剗盤岡以為址太階積而三重因博厚而順髙明築陵天之四墉四墉既列太階如截下上相嶔愕視沈沈其始也星鎚電交於萬堵霜鋸氷解於千尋擁材為山攢杵如林乃占日月之吉以成帝室雄一作虹梁徑於中楹一作極榱桷􅋾以礱密析一作折姑繇以為楹隳喬山以為礩飛重簷以切霞炯素壁以留日神標峻樀一作橘非鬼疊曾一作層楣髙卑迭拒尋尺相持木從繩而後正棟操宇而不危陛瑩氷級瓦敷鱗差蕩晶景而升降歘睒眥以交輝聳大厦之竒傑勢將頓而復飛爰詔有司練日推時徵考室於周詩一作頌會公卿以落一作發之丕赫哉如俯如跂若會一作合若離森疏錦反修邃以窅徼恍嶪騀二字一作岌嶪而巖巍謂衝颷激海兮漩􅔿淪以無底奔雷觸山兮掉獻崿而傾佹石鮫拖一作拖首於堂廡狀出雲而撑鬐嵩髙之制靈丘上盤鄰斗極之光耀邇天漢之波瀾密一作察鑿枘之吞吐吸山藂而水攢建升龍之大斾邈不至于一作於階端崢嶸孱顔下視南山照燭無間七耀回環𣢺虛咸反笑也欱呼合反也赫以突兀攇閌宏以蕭榝捧帝座於三辰衝天街於九達進而仰之騫龍首而張鳳翼退而瞻之岌樹顛而崒雲末嶷兮峩峩巨鼇載仙山而出滄波劃呼麥反兮煌煌燭龍拆穹穴而臨北方排層城而廓帝居豁閶闔而面穹蒼左翔鸞而右棲鳳翹兩闕而為翼環阿閣以周墀象龍行之曲直夾雙壺之鴻洞平聲啓重閨之呀赩趨堂塗而未半望宸居而纍息惟上聖之欽明爰聽政而崇德去雕幾與金玉出漢京之文飾熾丹雘於崚嶒抗重霄而競色若乃紫微晨􅀈彤墀夜明雲薄萬栱風交四榮冬止其陽則釋裘而燠夏休其奧一作隂則捐絺以清旗獵風而振響葉墜露而成聲懸櫖一作櫨駢湊疏一作竦柱奔迾一作列復檻曾綴髙窗景爇黭日翳而罘一作罙連曤天開而中絶形持神而欲離足僂步而將跌眝昭訓之崇崇瞵光範之揭揭其南則丹鳳啓途遐矚荆吳十扇開閉隂陽睢旴容鼎九扄儀禮鼎九設扄又考工記大扄七個一作七扄非方駕五車示王者之無外不樹屏於清都望仙闢於巽維建福敞於坤隅偃朱旗而櫜元甲屯仡仡之驍夫其後則深闈祕殿曼宇疏楹瑞木交隂玄墀砥平鮮風歷廡凌霰飄英蔭藹武闈一作闉增華穆清玉燭內融則嘉盛豐備太陽臨照而天下文明古有六寢御兹一人今也三朝繇古是因布大命於宣政淡元心於紫宸羲和弭節於通乾望舒停景於觀象密勿旒扆臣人是仰左黃閣而右紫微命伊臯以為長其下則鶡冠魚服良家大族厲禁非宜金吾領之其前則置兩石以恤刑張三侯以興武告善之旌登聞之鼓節晷漏於鍾律架危樓之筍簴以辨內外之差以正東西之序天光流於紫庭倒景入於朱戶騰祥雲之郁靄映旭日之蔥蘢清渠導於元氣玉樹生於景風夷坦數里徘徊無窮羅千乘與萬騎曾不得半乎其中厥初經營天下既乂文物未周孤其壯麗蓋重於施勞非不懷也乃眷睿孫睿孫開元萬物晏清而大和掩書契之所論既克廣於崇構聲明備而益尊蓋聖皇之孝也輝焯變化兮動搖乾坤其東於是宏文教而開館對日華之清閾蓋左學之遺制協前王之講德其西於是延載筆之良史俯月華之峻扉集賢人於别殿朝命婦於中闈王風闡而成化隂教備而不虧加以詠周詩而展親睦魯衛而敦敘因合族而來宴置更衣之豐宇至於殿內諸曹則左右有局通軒並廡物有恆司供無廢舉又有銀璫珥貂寺人巷伯奉宣出納之令一作命更踐宫中之役熊羆之旅董以龍武矛戟森森材官羽林聲破丘山氣讋飛沈爪抉千鈞跟騰百尋克壯皇威協比其心其外則校人掌馬天駟在間以備順遊放教疑作牧其間望我鑾和陟彼髙山猶慮憲章或遺國容未備乃立掌匭之司館通事之吏職在達下情于上天警王言於有位堧通太極澄指龍池重門內注復道潛移幽峻肅以相屬光彤融以熺熺懸象著明帝座維三皇居設位俯察仰參翼室正中遊宫次南乃一作北起含元一作光其容耽耽惣而言之如山之壽則曰蓬萊如日之升則曰大明自兹而北燕遊所經達於苑囿不可殫名周廬更呵匝以環衛南端百仞上極霄際却視㽎希今反崟經途廣深繚以層城黕為重隂至若時雨膏田九農恞音夷欣悅也暢雲歸山穴倏以昭曠白日麗於宫隅混晶光而益壯於是風師斂威纎壒不升頴絶搖芒葉無翻稜自中徂外鏡洗川澄弦直閭閈井畫溝塍靡迤秦山陂陀漢陵知稼穡之艱難見皇王之廢興及乎玄冥戒寒海神飛雪瑶城粉野琪樹森列玉宇璇階雲門露闕天華爽霽朗日朝徹赤旌降庭朱柱艷月仰白帝而金精開披河宫而銀燭發其或蠻夷不至帝用興戎降元帥於天上發神謀於禁中皇靈震耀殄一作殱厥渠凶矯矯武臣此焉獻功操俘一作俘人又作效俘虜以陳器械恢莫大之威容爾乃時殷仲冬日正南至上公奉斝羣后在位一人壽昌萬國承賜式燕以樂欣欣具醉乃撞宫懸砯碣天地及乎獻嵗元辰東風發春懸法象魏與人惟新儼文物於王庭兼九伐而宿陳威儀之嚴嶽嶽振振若太一披絪緼而俯百神既而咸造勿褻會朝清明璿柄指寅寢闈發扄皇帝御衮龍之法服佩蒼璧之純精執鎮圭導朱紘降輦登階微聞玉聲於是典禮之官贊王就位南面穆然至若甸侯采衛要荒閩貊輸其方賮罔不來格統以千官六卿二伯司儀敘進象胥儐一作重譯肅肅委皮乾乾奠璧設以庭燎天烘地赫雷鼓殷殷朱干玉戚神簴如生熊羆愕敵危昻歇向歊爓噴射金根玉輅太常少帛一作伯火列一作烈門旗霜交陛戟乃進元元以觀禮珿初六反億兆之增增金吾南首麾之以肱遰攀援而聳仰齊屨企而冠騰太史來告卿雲勃興灑豐澤於生人答上元之休徵申命司冦緩刑冢卿降德秩山川而問耆老周雨露而均邦國華戎竭歡喜氣闐塞揭金雞於太清炫晨光一作陽於正色慶欣之聲不踰辰而靁四域當斯時也驅周驟漢於廓二字出木玄虛海賦煥爛王臨于朝天地貞觀靈宫巖巖上下交贊蓋所以法乾道而遵帝度豈惟安體而明威者哉夫瑶臺之美不可以刑萬國土階之陋不可以儀天下一作地奢不遜而儉固允執中於大位洪範曰皇建其有極富哉上聖之宏議也詩歌楚室頌美泮宫諸侯之事也雲夢甘泉宴談一作恢景福辟王之志也論諸侯曷若以戴天子嘉辟王曷若以尊聖人烈烈盛唐祖武宗文五帝赧德六王慙勛而政本乎慈用過乎儉夫蒼生所奉者惟君所愛者惟親寧有君親宅體於卑室而臣子得安其身乎故有熊明庭帝姚總期從人欲也天垂定星易有大壯君人一有者字法焉聖朝猶斥其華而憑一作憑其質今為是殿也四字一作是殿也者惟鐵石丹素無加飾焉身居元眇心與萬姓同畎畝之勞以是臨衆何衆不賔以是享神何神不若其天二字一作兹其德歟雖欲宫崑崙而館不周城八極而隍四海猶未足儲鴻醇而俯丕耀豈咸鎬一京之所在䇿一作崇四瀆之前嵗一作戎敕懷鉛之小臣俾讎書於禁中正百代之遺文由是循環天造耳目日新敢頌成功告於神明一作宗無愧斯干之什式昭聖德之容頌曰帝作含元含元言言崒若日觀呀為天門太階三層逺法一作達字崑崙鎮兹秦野揭以周原烈文祖宗永錫孝孫孝孫有慶于以施令奄甸萬姓受天休命歌之頌之管磬宜之穆穆皇君壽考無期既成斯文客有勸之上者對曰前王之宏祥詭瑞乃聖朝之細事今休徵已厭于聰明頌聲亦飫於天意夫私歌竊抃乃臣子之常一作本志又焉足以薦聞哉客曰不然今至尊明發不寐一作寢永一作有懷先皇周文之孝也允恭克讓光溢海內一作外堯帝之謙也自即位已來上下之休嘉神人之詠歌歌於睿躬則固辭頌於宗廟則無斁今吾子之文一作明字昭乎纍聖之耿光美于大君之孝德可進而退宜言而默使雅頌之音卷而不舒猶坦蕩其胸臆無乃過歟為人之下者有可達乎一作於君親雖濵于死亦冒行之况宗廟或啓其心乎一作哉臣華嘗聞遷善之規願附升歌之末明光殿粉壁賦以上春早朝伏奏青蒲為韻樊鑄粉潔白兮壁宏壯白者取潤色於明光壯者取雄居於君上成圬人之手澤起漢皇之心匠凝雪彩耀氷狀扆旒居際謂分照於此日之君冠劍朝時欲和光於為鹽之相兹殿攸起不無所因寧在於白亦以象真守靜含虛上以鄰貞明於千年之主保純不汚下以範恬淡於萬國之臣煥北極而開瓊室激南風而生玉塵月桂低簷失蟾輝於午夜御栁垂砌惹絮色於三春則知粉壁之道齊乎玄造達上下而明明通晝夜之杲杲日昃之後慰天勤而暝遲夙興之時副聖恩而曙早信可大而可久實永堅而永好懿夫榮雖待畫一作盡飾不至驕挺嶪岌以莫變洞間疑華而自昭可使楚客具瞻羞持練而稱獻荆人仰止恥懷寶而來朝豈止光動玉戶氣射金屋秋露懷慙冬霜自伏蛾眉夜侍意瑶臺之已升玉顔曉臨若瑞雲之相逐而已哉觀夫匼匝皎皛回環廣袤濃潤交翕浮華相透處髙莫蔽通四目之敷求含明必竟疑受百官之草奏雖奢儉不失精研克構終未可小桂椒為粳粃汰茅茨為厄陋然為用因有貴飾形居安撫極抱素常寧色不喪真久已生於虛白白能受采冀一及於丹青噫漢皇立則未足為模我聖作範實謂殊途象為壁兮則搜材於豫章之器代其粉也則聚賢於堅白之徒以張皇二儀為明光之殿以照耀四海為粉壁之隅故錯薪從楚安輪以蒲是得趨於金馬希便維於白駒文苑英華卷四十八
