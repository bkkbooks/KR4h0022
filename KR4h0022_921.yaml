body:
  text: 文苑英華卷九百二十二宋李昉等編職官三十刺史四贈涇州刺史牛意碑一首贈隴州刺史王行果碑一首贈邠州刺史韋鈞碑夀州刺史郭敬之碑一首贈涇州刺史牛公神道碑張九齡夫志道莫先於無欲福善莫大於有後始而晦跡終不近名非道德之合歟生我勞臣立而集作于逺績非善慶所致歟所謂伊人其在牛公者矣公諱意字某其先子姓實始殷後有牛父者則宋之大夫𦙍裔蕃衍人物更盛邯為護羌校尉崇為隴西主簿遂家隴上是稱冠族其後因官安定爰處鶉觚今為郡人亦既重代矣公之族祖有奇章公者隋室宗臣風流篤厚典章損益百代可知天下稱之地靈斯在大父通秉志髙尚守道不攜當時交辟辭疾不起父㑹弱齡早代有才無祿公夙遘閔凶終鮮兄弟性具純至孝思罔極幼以孑立志不違邪與道為徒求仁自我不屑軒冕考槃邱園雖云屢空晏如也六郡自古五方雜錯負力怙利上氣好武人庶相放風俗不純及公冲和其返真朴外以義行格物內以默識頤神不飾智以驚愚不棄同而即異有恆其德無斁于集作於人鄰落為之變風狼戾以之率化公既浮雲不義介石惟一或勸之仕但笑而不言飛鴻冥冥胡可量也開元六年隨子西征以就色養春秋髙矣道茂年衰魂氣其歸賢德共盡越五月寢疾終於伏羌之官舍時年七十有六冬十一月歸葬于北原夫人同郡王氏不享偕老先是即代母儀婦德宋子齊姜自歸于我宜而集爾作家室不有配德曷生此子有子仙客為國之良用商君耕戰之圖修充國屯田之具出言可復所計而然邊捍長城主恩前席且以子貴之義有加父存之禮𤣥澤下逮素風激揚隂德所流大福斯至十八年有詔贈涇州長史二十二年冬且有後命贈使持節涇州諸軍事涇州刺史夫人追封太原郡夫人於戲存有纍仁沒有餘烈福自昭於互體道非冀於異時及其影嚮同符寵光如答雖松楸已拱而章綬集作緩載華死有可作無異㑹稽之節生茍為恥安用鴈門之肉貴與不貴可不然乎嗣子銀青光祿大夫太僕卿判凉州持節河西節度兼隴西郡牧都使支度營田使隴右採訪處置使攝御史大夫隴西縣開國子仙客叩心追逺昊集作號天莫逮以為先美蓋闕後嗣有愧且澤漏幽壤得不銘思名典本州豈徒錫羡而己銘曰隴上多豪山西好武使君貞獨幼不斯取惟道為徒與代為矩善有餘慶風亦變古不學而知不行而至跡有相混名有自異出入百年終始一意福流于後神明其事行止於身用存互體厥子嘉績中朝縟禮邙回壠隧門重旌棨逸人之墓今同郡邸長安縣尉贈隴州刺史王府君神道碑李雍雍聞才不必用度疑作慶有必鍾盡滯或牽於時首正終㑹於古故志氣也不謀於食而謀於道生祿也不在其身即在其子始終備致後起追褒謀翼孔彰前循邁種互體相發他日同時哀榮大來幽明通感長河一曲所以端其濬源髙山四成所以極其層阜粵未可測已府君諱行果字某大原晉陽人也其先柢于嚳稷幹于季文枝于翦離條于吉駿代關絶疑史朝弗曠官自古及今令名不去六代祖睿後魏尚書令封中山王贈太宰諡曰宣五代祖襲吏部尚書嗣中山王諡曰惠髙祖欣散騎常侍北肆州刺史諡曰穆曽祖子景徐州别駕北豫州司馬祖元季府君屬隋政分崩賢人伏匿誓言避地執心葆光迫以族弟本州逺慮物義辟大中正開府儀同三司考有方府君皇朝岷州刺史皆寵義從禮尊仁依信增業以行道兼濟以守官府君間氣茂靈上德純粹風度簡曠神清秀按衣冠禮樂超等出徒博達聰明舉衆敵國無成足乎多藝不器非其一名讀聖人之書閲上將之略每及忠公大節孝友至情太息戶庭垂涕枕席憮然有開物致君之意立德顯親之心皇士目之通才許之好人一作仁從田蘇之遊求已慕藺生之義至於手畫耳聽口誦目數覆碑背局答難詩賦公每屑焉人所服者弱冠以方聞授潤州司兵參軍事自頃上官養求同家侵欲或專咨儉嗇或懷其安荒一覯禮容載敷先訓不俟憲矩若對神明信所謂正剌邪德形物至於此也未幾宅岷州府君憂七日絶漿三年廬墓泣變青柏祥臻素鳥野老明徵邦牧表異府君泣面而視瀝肝而言曰所不死者恐貽慈母痛悼豈願居卑外買聲名叩頭止之外除宋州司戶參軍日者甫疑無水虎唐諱土為凶年奸吏舞文詭隨畢賦詩誅求公聚作為賙恤者習為常焉府君位其農郊什其居室正之以法糾之以詞勿言寬征足革舊染議者以為平宰社肉武習宫人一葉知秋百為有典矣總章嵗駒麗負海欺天國家泛舟討罰御急宣之明命濟懸軍之見糧董其轉輸舉于幹職是役也繄公遷長安尉無何丁太夫人艱禮異於經毁甚於昔且二尊孝等偏罰事殊往顧慈親今極真性臨穴號呌仰天殞絶嗚呼孝歟春秋三十有七夫經德而夭代人所悲執喪而滅錫類所痛有一於此則可以束名教感人倫况兼而極乎夫人中山甄氏父雍州豐崇府左别將黃陂縣開國男食邑三百戶行府君之息女嬪有令言母有彛則從夫德貴訓子業崇力遷於山祔同於穴粵以景龍三年嵗次已酉十一月庚寅朔十三日壬寅合葬于洛陽清風鄉之原禮也長子晙慷慨英達激揚忠孝誦習文史昭宣幹一作韜略元宰經國上將視師申通明之偉才竭寅亮之誠節其志如石其心如丹五間三連少籍多得空始一作細疑無所逞其計合散無所用其鋒李牧十年武侯七縱盡兵聲一作勢於河外揚主威於海濱三士列其多備九原備其光寵開元十一年九月八日制曰存樹其名沒而不朽緬惟褒飾𢎞是典章兵部尚書同中書門下三品上柱國行果粹靈誕和敏德成器髙節夙著盛名有歸雅志未伸促齡永謝象賢之美不展於亨衢而積善之徴克崇於後嗣嵗紀方邈徽猷自逺宜申寵贈使持節隴州諸軍事隴州刺史勳如故次子曔故邠州永夀宰神和體正經明行修有角無齒惟天之道與才不夀匪身之辜兄也孔懷緬然增感願述光德克贊豐碑髙燥有以壯孝心樵蘇有以敬賢墓其詞曰德不孤慶有績迹時晦賢必復名實才尊匪祿博技藝窮簡竹耳暫聞心以蓄手未止目猶逐碑可背奕能覆坐嘯委行道朂孝深至滅太蹙奬教義揚雅俗位嘗卑齡雖促推仁信致戬榖鍾令子發華族振武旅廣文囿經廟堂掃邊服昭皇考贈丹轂臣義著子道足哀且榮幽既燭考罔己性相屬碑乃建神所福贈邠州刺史韋公神道碑韓休夫賢者所以稱至業也居賢而德故有尊位者所以叙才用也有才而位不必貴緬覿志則代有其人焉公諱鈞字季和京兆杜陵人也昔大彭授征伐之任揔齊羣后立為商伯扶陽擅儒雅之道儀刑列辟起為漢相由是邁種厥德光昭盛門軒裳奕葉以濟美靈庭肸蠁而相屬故夫重暉洪業啓彼𤣥緒淳德介祉歸諸後昆者焉曽祖澄皇朝國子祭酒儒門肇業國庠貽訓祖慶植皇朝舒密二州刺史政成師長化洽黎元父璠皇朝駕部員外郎譽重國楨道髙人望光膺三署之拜克彰九德之美公淳輝秉靈鴻芬錫祉含英秀發揚光炯曜其少也則圭璜自然克有成器其長也則禮樂攸在光其大名式是古訓洽于前烈懷利器而待割含虛明而獨照學無不綜窺先王之書府言必有則得夫子之文章挹其道則虛往而實歸論其德則敬容而貴允所謂樂只君子邦家之暉者也解褐以常調授綿州魏城丞矯層翰凌絶壑立兹政聲𢎞彼邦教以尤異擢授雍州長安尉未幾遷雍州司士參軍超于輦劇佐此神京既位以才遷亦髙由政舉無何轉洛州陸渾令京臯底績河縣為榮銅墨載美絃歌用譽以親纍出為晏州嵯峨縣丞尋改授雅州司功參軍遷雍州三原縣令又改授邠州三水令又改岐州扶風令窮通在命喜愠在我當運而寵辱不驚養空而逝止恆適用能因事立訓自公滅私雖得喪繫乎其時亦風軌存乎所蒞者矣嗚呼物不可終否道不可以遂喪夷然順之艱以禎之俾夫人亨則自天而祐之矣景龍二年聖人發明制褒有功授太子司議郎內供奉尋正除乃遷尚輦奉御恭承嘉惠肅奉彛則膺美選於禮門拜殊榮於御府又以親纍授果州司馬尋改授漢州司馬公道直而正德貞而修雖行必恆存而運無常泰善不違已固無負於神明纍則因人亟又從於貶降且人有厚於德而薄於命行其道而屈其身者歟栖遲下列竟以卒嵗以開元十一年十二月十九日遘疾終於漢州之官舍春秋六十有四惟公含𢎞光大洵秀冲雅淡然而靜漻乎以清神崖自髙海量孰測韞隨和以增美將􅉅蘭而共芬而天爵斯茂朝宗莫及盛名空一作斯在昌運不留可為長歎息者也以開元十二年七月二十五日遷窆於萬年縣洪固鄉陪先塋禮也公之第四女蘭畹生秀金閨植德以良家之選參帝子之榮克彰慶善之餘允協徽章之命開元二年正月四日乃下制贈公邠州刺史贈先夫人薛氏晉國夫人制曰代榮簪組才稱楨幹方居參佐淹謝中年朝選良家既聞餘慶義崇恩禮爰在飾終且分符節之榮無沗笳簫之夢可贈使持節邠州刺史并贈夫人為晉國夫人非夫𢎞風勵俗明察在人豈能褒崇光兹訓翼者也君子曰管氏之世祀不亦宜乎其斯之謂歟有子尚舍直長悗然等晉之明用幹蠱而克永惟孝思訓我淳則爰播美於穹壤用圖芳於篆刻乃為銘曰緬彼大彭兮佐於有商自我楚傳兮慶流扶陽逮兹後昆兮奕世以昌誕此明德兮與時而光良玉不斫兮幽蘭自芳為邦之彥兮為人之綱明德之修兮而命之不臧既道崇而位薄亦身沒而名揚嗚呼積其善也聞季女之寵章崇其構也稱鄭公之不亡勒貞石旌髙堂德音昭昭以孔彰俾夫墮淚之美者豈獨峴山之陽夀州刺史郭公神道碑苖晉卿公諱敬之字敬之昔王季之列乎周虢叔之𦙍或謂郭建國命氏百代可知則有燕昭築臺尊賢師隗漢祖分邑行賞封亭曽祖廣意光祿大夫生益儒為馮翊之表也雞犬之聲相聞公先祖後徙宅於華山之下今為華州鄭縣人也烈祖履球金州司倉大父昶凉州司法并丕緒齊美不殞其名端操履正有恆其德故鄉黨交友以為法度嘗語人曰吾居閒而不悶其寂望榮而不貴其厚有道則仕豈牽乎祿則居之所以從好利貞亦其自然所以不至大官大邑也各尚其志夫復何言皇考通美厚主簿器大孤特識兼精照明究羣書英聲誇邁於逺近矣初履畿甸縉紳歸髙將升臺閣雲霄自逺惜乎才仰餘地命嗟促齡公受天正性承家髙範一作轍致用成於私室可試進於公門望刑而高深莫窺聽言而是非不惑所蒞造適不可得其詳也凡歷州椽至别駕者三轉府寮遷郎將者五兼國練監牧使各一除吉渭綏夀刺史共四州纍勳上柱國進階中大夫其牧守之理皆政聞一方化行千里變俗思義一作施恩酌物一作斟酌從宜而節費尚儉用簡鎮靜清可率下寬能安衆舉事皆當察情必盡所謂愷悌君子民之父母何異乎仁風甘雨被於萬物也故天子璽書慰勉以彰分憂休蹟之聞焉未盡百祿可延三夀享年七十八以天寶三年正月十日遘疾終于京師常樂里之私第聞者永懷咨嗟垂涕夫人平原郡君河內向氏配哲生才夫賢子令德髙佐美慈加訓深嗚呼哀哉慶可延而靈不祐先窮泉而别華堂天寶十三載四月二十日合祔於京兆少陵原禮也頃羯虜犯順王師討逆公之子子儀任揔元戎誓清大盜常山擒敵之後靈武翊聖之初成我六軍前驅效死於是掃秦里之寇復開奉天繫陜郊之俘更收洛邑加以蒲坂之下淇水之上摧暴廓地二城無虞况師不遷延功皆戰伐豈敢言病必先啓行此由許國捐軀輸忠奮勇或謂公曰書勳疇賞莫與為二公曰我國家將去否復必反正仗聖威而誰敢不雄奉睿謀而舉無遺䇿非為已力所謂天功帝曰朕嘉爾竭誠稟命平凶除惡遂自御史大夫拜兵部尚書同中書門下平章事俄而改司空換僕射又除司徒兼中書令列爵代國實賦千户蓋武定聲偉若兹巍巍者也他日又追贈公亡祖兵部尚書亡考太保亡妣魏國夫人弟姪子孫亦皆進祿位紆金紫此又殊常之恩也太保公禮畢封樹悲深嵗月今慶延身後仰雨露而無涯德發生前比金石而不朽永言淑德實在昭宣無窮之聞光乎刊刻銘曰北州望崇左輔源同代無達疑德慶延我公仁能濟衆信必由衷邑疑裏支持凛凜清風知周才美君子不器掾州佐藩戎秩軍使砥開直道筆遣流事騏驥長途可遣百轡四郡循良政一人康道之軌度終然允臧於惟聖善輔以義方何怙何恃痛極悲長少陵原上盡為幽宅何代邱隴誰家松柏司徒所天太保追䇿哀榮超冠千秋聖澤行由已全名自人傳勒茲銘記表于墓田繼代者來知先德行路者過想遺賢紀實昭懿俾奮億年文苑英華卷九百二十二
