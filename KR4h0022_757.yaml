body:
  text: 文苑英華卷七百五十八宋李昉等編雜論上與邢邵議生滅論一首勞生論一首愚夫哲婦論一首解詰論一首君子無屈論擬公孫龍子論一首寱論一首丐論一首漫論一首化虎論一首與邢邵議生滅論杜弼邵以為人無還行一作人死還生恐是為蛇畫足弼答蓋謂人死歸無非有能生力然物之未復十八字一作弼曰物之未生本亦無也無而為有不以為疑因前生後何獨致怪邵云聖人設教本由勸奬故懼以將一作有來望各遂其性答一作弼曰聖人合德天地齊信四時言則為經行則為法以虛示物以詭勸民北史作人將卜魚腹之書有異鑿楹之誥安北史作得使北辰降光龍宫韜一作韞牘執如所論福果可以鎔鑄性靈𢎞奬風教為益之大莫極於斯此則真教何為非實邵云死之言澌精神盡也弼曰此所言澌如射箭盡手中盡也小雅曰無草不死月令又云靡草死動植雖殊亦此之類無情之卉當春一作尚德還生含靈之物何妨再造若亡草死猶有種在則復人死亦有識識種不見謂以無為者神之在形亦非目矚離朱之明所一作不能覩雖蔣濟觀眸賢愚可察鍾生聽曲山水呈狀乃神之工豈神之質猶玉帛之非禮鐘鼓之非樂以此方之一作而推義斯見矣邢云季札言無不之亦言散盡若復聚而為物不得言無不之也弼曰骨肉下歸於土魂氣則無不之此乃形墜魂逰往而非盡如鳥出巢如蛇出穴由其尚有故云無所不之若令無人也之將焉適延陵有蔡微之識知其不隨於形仲尼發習禮之歎美夫神一作其字與形别若許以廓然然則人皆季子不謂髙論執此為無邢云神之在人猶光之在燭燭盡則光窮人死則神滅弼曰舊學前儒每有斯語羣疑衆惑咸由此起蓋辨之未至思之者不篤竊有未見可以核諸燭則因質生光質大光亦大人則神不係於形神小形豈小故仲尼之智必不短於長秋孟德之雄乃逺竒於邢顒一作雀談神之與形亦猶君之有國國實君之所統君非國之所生不與同生孰云俱滅邢云捨此失彼生生恆在周孔自應同莊周之鼓缶和桑扈之循歌弼曰共隂而息尚有將别之悲窮轍以逰亦興中途之歎況乎一作曰聮體同氣化為異物稱情之服何害於聖邢云鷹化為鳩鼠變為鴽黃為鱉皆是有生之類也類化而相之猶光去此燭燃於彼燭弼曰鷹未化鳩鳩則非有為鼠未化為鴽則以無論闕相之乃似並對之稱既非二有何可兩立光去此燭得燃彼燭神去此形亦託彼形又何二一作感哉邢云從欲使土化為人木為一作生眼鼻造化神明不應如此弼曰腐草為螢老木生一作為蝎造化不能為其然也其後别與邢書云夫建言明理冝出典證而違孔背釋獨為君子若不師古物各有心馬首欲東誰其能禦但一作奚取於適衷何貴於得一逸韻欲髙管懷未諭前後往復再三邢理屈而止一作皆此齊書本傳勞生論盧思道莊子曰大塊勞我以生誠哉斯言也余年近一無近字五十羸老云至追惟疇昔勤矣厥生乃著兹論因時事云爾闕罷羣屏居有客造余者少選之頃旴行而言曰生者天地之至一作大德人者有生之最靈所以作配兩儀稱貴羣品妍媸愚智之辨天懸壤隔行已立身之異入海登山今吾子生於右地九葉卿族天授俊才萬夫所仰學綜九流一作流略慕孔門之遊夏詞窮嵗月一作麗則擬漢日之卿雲行藏有節進退以禮不諂不驕無愠無懌偃仰貴賤之間從容語默之際何其裕也下走所欣羡焉余莞爾而笑曰未之思乎何所言之過也子其清耳請為左右陳之夫人之生也皆未若無生在余之生勞亦勤止紈綺之年服一作伏膺教義規行矩步從善而登巾冠之後彯一作濯纓受署韁鎌仁義籠絆朝市失翹陸之本性喪江湖之逺情淪此風波溺於倒置一作躓憂勞揔至事非一緒何則地胄髙華既致嫌於管庫才識美茂亦受嫉於愚庸篤學强記聾瞽於焉側目清言河㵼木訥所以疾一作疾心豈徒蟲惜春螿一作漿鴟怯腐鼠同江都而永歎傳長沙而不歸固亦魯值臧倉楚逢靳尚趙一為之哀歌張升於是慟哭有齊之季不遇休明俯脰就鞅局蹐一作屏跡無地假圭張讓金貝是祝賈謐郭槐一作淮非腥臊可饜淫刑以逞禍延一作近池魚耳聽惡來之讒足踐龍逢之血周氏末葉仍值辟王斂笏升階汗流浹背蜀一作莒客之踵躋焦原比一作匹兹非險齊人之手執馬尾方此未危若乃羊腸句注之道據鞍振策武落雞田之方櫛風沐雨三旬九食不敢稱弊此之為役蓋其小小者耳當今運祚一作泰運肇開四門以穆冕旒司契於上䕫龍佐命於下岐伯善卷耻狥幽憂卞隨務光悔從木石今年在秋方已迫知命情禮冝退不獲晏安一葉從風無損鄧林之攢植雙鳬退飛不虧渤澥之遊泳耕田鑿井晚息晨興侯南山之朝雲覽北户一作堂之明月汜勝九榖之書觀其節制崔實四人之令奉以周旋晨荷蓑笠白屋黃冠之伍夕談稼穡一作穡榖霑體途足之倫濁酒盈樽髙歌滿席恍一作忱兮惚兮天地一指此野人之樂也子或以是羡余乎客曰吾子之事既聞之矣他人有心又請論其梗概余答曰雲飛泥沉卑髙異等圓行方止動息殊致是以摩霄運海輕罹羅於藪澤五衢四照忽斧斤於山林余晚植昌辰遂其弱質一作尚顧一作觀人事之殞落一作隕獲視一作觀時路之遭危立冬修夜靜言長想可以纍歎悼心流涕酸鼻人之百年脆促已甚奔駒流電不可為辭顧慕周章數紀之內窮通榮辱事無足道而有識者鮮無識者多𥚹隘凡近輕險躁薄居家則人面獸心不孝不義出門則諂諛讒佞無愧無耻退身知足忘伯陽之炯戒陳力就列棄周任之格言悠悠遂一作逺古斯數一作患已積迄於近代此蠧尤深范子一作卿撝讓之風搢紳不嗣夏書昏墊之罪執政所安朝露未晞小車盈董石之巷夕陽早落皂蓋填閻竇之里皆如脂如韋俯僂匍匐噉惡求媚䑛痔自親美言諂笑助其愈樂詐泣佞哀恤其喪紀近通㫖酒逺送一作貢文馳艷姬美女委如脫屣金銑玉華棄同遺迹及鄧通失路一簮之賄無餘梁冀就誅五侯之貴將起向之求官買職晚謁晨趨投刺望塵之舊遊偃仰上堂之夜客始則亡魂裭魄若牛兄之遇獸心戰色沮似葉公之見龍俄而抵掌揚眉髙視闊步結侣棄亷公之第携手哭聖卿之門華轂生塵來如激矢雀羅暫設去等絶絃飴蜜非甘山川未阻千變萬化鬼出神入為此者皆衣冠士族或少乏藝服一作有藝能不耻不仁不畏不義罔一作扉愧友朋莫慙妻子外呈厚貌內藴百心由是則紆青佩紫牧州典郡寇情一作寇慎劫人厚自封殖妍歌妙舞列鼎撞鐘耳倦絲桐口飫珍㫖雖素論以為非而時宰不之責末俗嗤鄙一作未蚩如此之弊余則違時薄官屏息窮居甚耻驅馳深畏乾沒心若死灰不營世利家無擔石不齎一一作費囊錢偶影聮官將數十載駑拙致笑輕生所以告勞也真人御宇斫雕為朴人知榮辱時反雍熙風力上宰內敷文教方邵重臣外揚武節被之大道洽以淳風舉必以才爵無濫授禀斯首鼠不預衣簮附一作何黨比周掃地俱盡輕薄之儔滅景竄跡礫石變為圭瑜一作成瑜瑾莨莠化為芝蘭扇俗攪時駭耳穢目今悉不聞不見莫余敢侮易曰聖人作而萬物覩斯之謂乎一作皆隋書本文愚夫哲婦論謝偃昔有愚夫者家本大賈積資巨萬既生豪門長乃潤屋所衣必極麗食必窮珍而禀性頑魯不間貨殖既而父終兄喪生計歸之每有貨易動多遺利其妻敏而有識常私歎曰若此子家貧無日矣夫常市珠及玉所費萬計唯獲燕石魚目而還妻覩而誚之曰此非真也何失鑒其若是乎於是愚夫乃作色蛇鬚攘袂瞋目顧而呵其妻曰吾訪肆人皆云美玉也問諸闤吏咸云美珠也吾固先訪而後市先問而後買豈吾專擇而擅取哉其妻怒而復曰夫玉石異體珠目殊狀雖色類相似而明潤懸絶但子愚昧未詳耳若使人言是而隨是之人言非而隨非之此即取捨在彼子何預焉故有離朱之目者不可惑之以色有師曠之耳者不可惑之以音今若問人而後識者此乃聾瞽之事也豈有耳目者所為哉於是夫妻怨競纍日不息時鄰家有寓居逰士聞而歎曰誠哉哲婦之言可謂信而有徴君子無屈論崔𢎞慶君子無屈道無屈也茍行君子之道身至困而道不屈茍大其道困亦冝之象害舜桀伐湯紂囚文王管蔡謗周公桓魋傷孔子臧倉毁孟軻小人見之曰為善多屈也不善而伸人一無人字君子則發揮也道在我不怍或忙攘失道䎷邪以為正乃觸途因以隨之亦冝矣申生自絶仲由就醢泄冶誅於陳屈原沉於湘是也為德行伸於德行為言語伸於言語為政事伸於政事為文學伸於文學自此以來未有行之而道未伸者也立於世未嘗不出於人也不伸不髙乃似是而非名之曰妖和之不正言德行之妖辨之不正言文學之妖身為妖而不知困將至而乃怨是由大惑也至於六藝百工茍得其道亦伸也嗚呼人以貴尊極為道不屈余以道尊名逺為道伸文王伸於王道周公伸於輔相孔子孟軻伸於儒學都至疑賤道愚人謂之屈而不為也聖賢茍利於人隱其身亦不耻而乃為也稷播殖禹治水伊尹負鼎太公屠釣是也自舜至于丘軻道皆同也當行道之心非求冨貴也道茍行矣曷謂之屈哉君子無屈昭昭矣解詰論𢎞慶作君子無屈論有為文學伸於文學之說或詰𢎞慶曰子非君子歟何道屈也久矣是夫迷其問詰然未數所以酬也及審已行之行而解之余誠非君子也讀孝經則思君子之行讀春秋則思君子之志讀易則思君子之性命讀詩則思君子之諷興讀書則思君子之載言讀禮則思君子之防亂讀樂章則思君子之理心至於非法道未嘗敢言行也夫是鄉里稱余朋友佳余於不道覽疑伸也矣曷來謂為屈哉如以行之未備志之未固性命之未達諷興之未深載言之未當防亂之未至虛舉之濫彰此乃朋友情也非吾之咎語曰四十五十而無聞焉斯亦不足畏也矣余年去三十尚二年矣則去四十五十尚十年二十年矣足得聞疑其心術實其文舉疑也余又何畏哉若以進取之道屈則孔子至聖終於下位顔生至賢竟殁於陋巷顔孔以來則歷書史聖賢尚屈於闕進取况聖已降乎余於進趨之道不敢言屈也已矣况豫得其反未六七年望其進三四年到於七十尚有四十餘矣今天下一家主聖臣忠又不可比披靡之周齷齪之燕而余生之時非為不遭也求進為久也前不逺也豈終於寒餒困苦於千萬人之下哉擬公孫龍子論公孫龍者古人之辨士也嘗聞其論願觀其書咸亨二十年嵗次辛未十二月庚寅僕自嵩山遊於汝陽有宗人王先生名師政字元直春秋將七十博聞多藝安時樂道恬淡浮沉罕有知者僕過憩焉縱言及於指馬因出其書以示僕凡六篇勒成一卷其夜僕宿洞𤣥觀韓先生之房先生名𤣥最字通元從容人間虛談自保與僕觀其書且謂僕曰足下後生之明達者公孫之辨何如僕曰小子何足以知之然伏周孔之門久尋聖賢之論多矣六合之內聖人論而不辨六合之外聖人存之不論簡而易之欲其可行也神而明之存乎其人也陳詩書定禮樂身心之道達而已家國之用足而已變而通之未嘗滯之引而伸之未嘗蕩也令天下思之而後及也令天下得之而不過也若此則六經之義具矣五常之教足矣安取辭堅别白之辨乎故曰若公孫之論非不中也非不妙也其辭逸其理吝其術空其義粗令人煩非髙賢不能知也非明達不能究也抑可以為聖人之理不足以為聖人之教若隨方而言觸類而長何必白馬堅石猶存其理乎故曰因是論之也即直之論也惑其文則不可以為易矣達其意則不足以為難矣可存而不可守也可守而不可行也知者不必言言者不必用也然天下之理不可廢也天下之言不可沮也故理可貫也言可類也若使僕借公孫之理乘公孫之意排合衆議掊一作倍勞羣言則雖天下之異可同也天下之同可異也天下之動可靜也天下之靜可動也堅不堅白不白石非石馬非馬何必聚散形色離合一二者乎先生曰天下有易迷之者難則天下無易矣天下有難能之者易則天下無難矣足下當有易之地用無難之辨能為龍之所為乎僕笑而答曰使虎豹之力移於麋鹿固為虎豹矣使鴈鶩之闕移於鷹隼固為鷹隼矣故以仲尼之道託於盜跖之性則盜跖固為仲尼矣今公孫龍之理處於弟子之心矣弟子且非公孫龍乎遂和墨襞紙援翰寫心篇卷字數皆不踰公孫之作人物義理皆反取公孫之意觸類而長隨方而說質明而作日中而就以事源代迹皆疑因意而存義也以幸食代白馬尋色而推味也以慮心代指物自外而明內也以達化代通變緣文而轉稱也以香辛代堅白慿逺而取近也以稱足代名實居中而擬正也或因數陳色或反色在數或棄色取味或以氣轉形明天下之言無所不及也發沉源而回鶩闢路以先驅庶將來君子有以知其用心也寱王計切論元結元子天寶中曽預燕於諌議大夫之坐酒盡而無以續之大夫歎曰諌議散宄者貧無以繼酒嗟哉元子醉中議之曰大夫頗能用一謀令大夫尊重如侍中威權等司𨽻何若大夫問謀對曰大夫集本文粹無此二字得䆿婢一人在人主左右以䆿言為先諷則可請有所說大夫不聞古有邰侯侯家得䆿婢寐則寱言言則侯輒鞭之如是一嵗婢寱如故侯無如婢何有夷奴每厭勞辱則假寱其言似不怨主而若忠信侯聞問之則曰素有寱病寐中寱言非所知也引寱婢集作妾自辦詞說云云侯疑學婢鞭之不止髠之鉗之奴寱愈甚奴於是重窺侯意先事寱說說侯之過警以禍福侯又無如奴何客有知侯禍機因寱奴之先扣侯門諌侯侯以改過免禍侯納客為上賔復方六切其奴命曰寱良氏子孫世在于邰大夫誠能學奴效婢假寱言以幾諌人主俾悔過追誤與天下如新大夫見尊重威權何止侍中司𨽻大夫乃嘆曰嗚呼吾為文粹作謂今之士君子曽不如邰侯夷奴耶丐論天寶戊子中元子遊長安與丐者為友或曰君友丐者不太下乎對曰古人鄉無君子則與雲山為友里無君子則與松柏為友坐無君子則與琴酒為友出遊於國見君子則友之丐者今之君子吾恐不得與之友也丐者丐論子能聽乎吾既與丐者相友喻求罷丐友相喻曰子羞吾為丐邪有可羞者亦曽知未也嗚呼於今之世有丐者丐宗屬於人丐嫁娶於人丐名位於人丐顔色於人甚者則丐權家奴齒以售邪佞丐權家婢類以容媚惑有自冨丐貧自貴丐賤於刑丐命命不可得就死丐時就時丐息至死丐全形而終有不可丐者更有甚者丐家族於僕圉丐性命於臣妾丐宗廟而不敢丐妻子而無辭有如此者不可為羞哉吾所以丐人之棄衣棄食提鶯荷集作倚杖在於路傍且欲與天下之人為同類耳不然則無顔容行於人間夫丐衣食貧也以貧乞丐心不慙跡與人同示無異也此君子之道君子不欲全道邪幸不在山林亦宜且嬰杖隨我作丐者之狀貌學丐者之言辭與丐者之相逢使丐者之無恥庶幾時世始能相容吾子無驕集作矯然取不容也於戲丐者言語如斯可編為丐論以補時規漫論乾元乙亥至寶應壬寅嵗時人相誚議曰元次山嘗漫有所為且漫聚兵又漫辭官漫聞議云云因作漫論論曰世有規檢大夫持規之徒來問叟曰公漫然何為對曰謾為公也漫何以然對曰漫然規者怒曰人以漫指公者是他家惡公之辭何得翻不惡漫而稱漫為漫何檢括漫何操持漫何是非漫不足凖漫不足規漫無所施漫也他效漫焉何師公髮已白無終惑之叟俯首而謝曰吾不意公之說漫至於此意如所說漫焉是集作足恥吾當於漫終身不羞著書作論當為漫流於戲九流百氏有定限邪吾自分張獨為漫家規檢之徒則奈我何化虎論都昌縣大夫張粲君英將之官與其友賈德方元次山别且曰吾邑多山澤可致麋集作麕鹿為二賢羞賔客何如及到官書與二友曰侍我化行旬月使虎為鹿豹為麕梟為鷓鴣蝦蟇為兔將以豐江外庖厨豈獨與德方次山之羞賔客也德方對曰嗚呼兵興未集作嵗久戰爭日甚生人怨痛何時休息君英之化豈虎豹將恐虎窟公城豹逰公庭梟集公楹羣蛙匝公而鳴敢以不然之論反化君英次山異德方報君英化虎之論豈直望化虎哉次山請商之君英所曰待吾化虎然後羞吾屬也其意蓋欲待朝廷化小人為君子化諂媚為公直化奸邪為忠信化進競為退讓化刑法為典禮化仁義為道德使天下之人心皆涵純朴豈止化虎而羞我哉德方未量君英歟次山故編所言為化虎之論文苑英華卷七百五十八
