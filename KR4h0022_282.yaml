body:
  text: 文苑英華巻二百八十二宋李昉等編送行十七劉駕三首李頻十二首章碣一首皮日休二首許棠七首聶夷中一首鄭谷十三首楊䕫三首杜荀鶴三首周繇六首喻坦之四首黄滔四首送友人登第東歸劉駕同家楚天涯相識秦雲西古來懸弧義豈顧子與妻携手踐名塲正遇公道開君昇我雖黜感恩同所懐有馬不復羸有奴不復飢㶚岸槐花落却是出關時青門一瓢空分手去遲遲期君轍未平我事繼東歸送李殷遊京西前人十年夣相識一覩俄見别征駕在我傍草草意難說君居洞庭日詩句滿魏闕如何萬里來青桂㸔人折行装不及備西去偶成决一作缺孟夏出都門紅塵客衣熱荒城見羊馬野舘具薇蕨邉塞漸無虞依宿常待月西園置酒地日夕簮裾列壯志安可留樽前槐花發送人登第東歸前人學古既到古反求鍳者難見詩未識君疑生建安前海畔豈無家終難成故山得失雖由命世途多險艱我皇追古風文柄付大賢此時如為君果在甲科間晩逹多早貴舉世咸為然一夕顔却少雖病心且安所居似清明冷竈起新烟髙情懶行樂花盛僕馬前歸程不淹留指期到田園香醪四鄰􅍄霜橘千株繁肯憶長安夜論詩風雪寒送許侍御歸潤州李頻家山近石頭遂意在東浮祖席離烏府歸帆轉蜃樓隂霞出海𣪚落日向潮流别有為霖日孤雲未自由送人歸滄州前人風色又西轉坐為千里分髙㠶背楚落寒日逆潮曛㫁燒縁喬木盤鵰隐片雲鄉園有戰地歸去始休軍送人南歸前人行行野雪薄寒氣日通春故國又芳草滄江終白身逰歸花落滿睡起鳥啼新不得無來札空令借問人送人徃太原前人并州非故國所去又何思玁狁方為冦嫖姚正用師戍煙來有號邉雪下無時更想經綿上應逄禁火期送人歸新定前人歸心常共知歸路不相隨彼此無依倚東西又别離山花含雨亞江樹逆一作送潮欹莫戀漁樵興人生各有期送孫明秀才徃潘州訪詩選作謁韋卿前人北鳥飛不到北人誰詩選作今去逰天涯浮瘴水嶺外問潘州草木春冬茂猿猱日夜愁定知遷客淚唯詩選作只敢對君流送人徃太原前人離亭聊把酒此路徹邉頭草白鴈𥘉下時清人去逰汾河流晉地塞雪滿并州别後相思夜遥看北斗愁初下集作來盡遥看集作空看送人逰淮南詩選作之揚州前人一别長安後晨征更信鷄河聲入峽急地勢出關低緑樹叢垓下青蕪澗楚西路長知不惡隨處得詩選作好詩題送九江狄明府前人字人脩祖德清白定聞傳匹馬離秦去孤㠶入楚懸關中寒食雨湖上暑衣天四考兼重攝相和疑作知住幾年送人赴湖南前人關門鳥道中飛轉疑作傳復乗騘暮雪離秦甸春雲入楚宫平蕪天共濶積水地多空使府懸㠶待能銷幾日風送友人東歸前人白社思歸處青門見去人鄉連茂苑樹路入廣陵塵海日潮浮曉湖山雪帯春猶期來帝里未得是閒身漢上送人西歸前人此日看行意令人動逺心野銜天去盡山夾漢來深疊浪翻殘雪髙㠶引片隂唯應留别句畢我白頭吟送韋岫郎中典泗州章碣玉皇恩詔别星班去壓徐方分野間有鳥盡巢垂汴桞無樓不對隔淮山旌旗漸向行時擁案牘應從到日閒想憶朝天獨吟坐旋飛新作過秦關送令狐𥙷闕歸朝皮日休文如日月氣如虹舉國重生正始風且願仲山居左掖只憂徐邈入南宫朝衣正在天香裏諫草應焚禁漏中為說明年今日事晉廷新拜黒頭公送從弟皮崇歸復州前人羡爾優游正少年竟陵風集作烟月似呉天車螯近岸無勞詩選作妨取舴艋隨風不費牽處處路旁千頃稻家家門外一渠蓮殷勤莫笑襄陽住為愛南溪縮項鯿送裴拾遺赴畿令許棠受謫因廷諫茲一作東行不出關直廬辭玉陛上馬向仙山地古桑麻廣城偏僕御閒懸齋高枕卧應夣犯天顔送王侍御越城令前人戴豸忽驅鷄東南上句溪路過金谷盡㠶轉石城西水樹連天暗山禽遶縣啼江人諳舊化那復俟招携送李頻之南陵主簿前人赴縣是還鄉途程豈覺長聴鶯離㶚岸盪槳入陵陽野蕨生公署閒雲拂印牀晴天調膳外垂釣有池塘李員外知揚州留後前人帝命分留後東南向楚天㡬程廽送騎中路上迎船冶列開山鑄民分酌海煎青雲名素重此去豈經年送龍州樊使君前人曽見卭人說龍州地未深碧溪飛白鳥紅斾映青林土産唯冝藥王租只貢金政成閒宴日誰伴使君吟送從弟歸泉州前人問省歸南服懸㠶任北風何山猶見雪半路已無鴻瘴雜春雲重星垂海夜空徃來如不住亦是一年中送前汝州李侍御罷宣城前人吟詩早得名戴豸又加榮下國閒歸去他人少此情雲移寒嶠出燒夾夜江明重引池塘思還登謝朓城送友人歸江南聶夷中皇州五更鼓月落西南維此時有行客别我孤舟歸上國身無主下第誠可悲送徐澳端公南歸鄭谷青衿離白社朱紱始言歸此去多應羡𥘉心盡不違江㠶和日落越鳥近鄉飛一路春風裡楊花雪滿衣送祠部曹郎中鄴出守洋州前人為儒欣出守上路亦戎裝舊制詩多諷分憂俗必康開懐江稻􅍄寄信露橙香郡閣清吟夜寒星識望郎送水部張郎中彦回之宰洛陽前人何遜蘭休握陶潜桞正垂官清真塞詔事簡好吟詩春漏懐丹闕凉船泛碧伊已虛西閣位朝夕鳯書追送吏部曹郎中鄴免官南歸前人髙名向己求古韻古無儔風月抛蘭省江山向桂一作復州賢人知止足中嵗便歸休雲鶴深相待公卿不易留滿朝張祖席半路上仙舟篋重藏呉畫茶新換越甌郡迎紅燭宴寺宿翠嵐樓觸目成幽興全家是勝逰篷聲漁叟雨葦色鷺鷥秋乆别郊園改将歸里巷修桑麻勝禄食節序免鄉愁陽朔花迎棹崇賢葉滿溝郎中崇賢里有幽居席春歡促膝簷日暖扶集作挽梳頭道暢應為蝶集作虎時來必問牛終湏康庻品未爽潄寒流議在歸群望情難戀自由小生誠淺拙早嵗便依投夏課毎垂奨雪天常見憂逺招陪宿直首薦向公侯攀送偏揮灑龍鍾志未醻送進士盧棨東歸前人㶚岸草凄凄離觴我獨携流年俱老大失意又東西曉楚山雲滿春呉水樹低到家梅雨歇猶有子規啼送人之九江謁郡侯苖員外前人澤國尋知己南浮不偶逰湓城分楚塞廬嶽對江州曉飯一作泛臨孤嶼春㠶入亂流䨇旌相望處月白庾公樓送進士許彬前人泗上未休兵壺關事可驚流年催我老逺道念君行殘雪臨晴水寒梅發故城何當食新稻嵗稔又時平送太學顔時明經及第東歸前人平楚干戈後田園失耦耕艱難登一第䘮一作離亂省諸兄樹没春江漲人繁野渡晴閒來思學舘猶夣雪􅐼明送京叅翁先軰歸閩中前人觧印東歸去人情此際多名髙五七字道勝兩重科宿舘明寒燭吟船兀夜波家山春更好越鳥在庭柯送沈集作田光前人九陌低迷誰問我五湖流浪可悲君著書笑破蘇司業賦詠思齊鄭廣文理棹好携三百首阻風湏飲㡬千分耒陽江口春山緑慟哭應尋杜甫墳送進士韋序赴舉前人丹霞照上三清路瑞錦裁成五色毫波浪不能隨集作傾世態鸞凰應得入吾曹秋山晩水吟情逺雪竹風松醉格髙預想明年騰躍處龍津春碧浸仙桃送進士呉延保及第後南遊前人得意却思尋舊跡新銜未得上蘭䑓吟看秋艸出關去逄見故人隨計來勝地昔年詩板在清歌㡬處郡筵開江湖易見淹留興莫待春風吹集作綻瘦梅淮上與友人别前人揚子江頭楊桞春楊花愁殺渡江人數聲風笛離亭晩君向瀟湘我向秦送張相公出征楊䕫得意在當年登壇秉國權漢推周勃重晋譲趙宣賢儒德尼丘降兵鈐太白傳援毫飛鳯藻發匣吼龍泉歴火金難耗凌霜桂益堅從來稱玉潔此更譲朱妍鴛鷺臻門下貔貅擁帳前去知清朔漠行不費陶甄獻畫符中旨推誠契上𤣥願將班固筆書頌勒燕然送杜郎中入茶山脩貢前人一道澄瀾徹底清仙郎輕棹出重城採蘋虚得當時稱述職那同此日榮劔㦸歩經一作揺髙障黒綺羅光動百花明謝公携妓東山去何似乘春奉詔行送鄭谷前人春江瀲瀲清且急春雨濛濛宻復踈一曲狂歌兩行淚送君兼寄故鄉書送賔貢登第後歸海東杜荀鶴歸㨗中華第登船鬢未絲直應天上桂别有海東枝國界波窮處鄉心日出時西風送君去莫慮到家遲以下三篇並見集本送人南遊前人凡逰南國者未有不蹉跎到海路雖盡集作難盡掛㠶人更多潮沙分象跡花洞響蟲歌縱有投文處於君能幾何亂後送友人集作送人遇亂歸湘中前人家枕三湘岸門前即釣磯漁竿壯歳别鶴髪亂時歸岳暖無猿呌江春有鷰飛平生書劔在莫便學忘機送江州薛尚書一作郎中周繇匡廬千萬峯影匝郡城中忽佩虎符去遥疑鳥道通烟霞時滿郭波浪暮連空樹翳樓䑓月㠶飛鼓角風郡齋多岳客鄉户半漁翁王事行春外題詩寄逺公送邉上從事前人戎装佩鏌鎁走馬逐輕車衰草城邉路殘陽壠上笳黄河穿漢界青塜出胡沙提筆男兒事功名立可誇送洛陽崔員外前人塞詔除嵩洛觀圖見廢興城遷周古鼎地列漢諸陵日送歸朝客時招住嶽僧郡齋䑓閣滿公退即吟登送人尉黔中前人盤山行幾驛水路復通巴峽漲三川雪園開四季花公庭飛白鳥官俸請丹砂知尉黔中後高吟採物華送楊環校書歸廣南前人天南行李半波濤灘樹枝枝拂戯猱𥘉着藍衫從逺嶠乍辭雲署泊輕艘山村象路桄榔葉海外人收翡翠毛名宦兩成歸舊隐徧尋親友興何饒送宇文虞前人此别欲何徃未言歸故林行車新歳近落日亂山深野店寒無客風窠動有禽潜知經目事大半是愁吟送友人遊東川喻坦之食盡湏分散將行幾願留春兼三月閏人擬半年遊風俗同呉地山川擁梓州思君登棧道猿嘯始應愁送友人南中訪舊知前人春盡大方逰思君便白頭地蒸川有毒天暖樹無秋水接三巴險猿分五嶺愁為縁知己分南國必淹留大梁送友人東遊前人自古東西路舟車此地分蟇一作河聲梁苑夜草色楚田曛鴈已多南去蝉猶在此聞聖朝無諫獵何計謁明君此詩二百九十五巻重出今已削去注異同為一作送友人遊蜀前人為儒早得名為客不憂程春盡離丹闕花繁到錦城雪消巴水漲日上劔關明預想廽來樹秋蟬已數聲送陳明府歸衡黄滔雛鶴兼雛一作留下單車出桞烟三年兩殊考一日數離筵乆别潮波緑相思嶽月圓翠蘿曽隐處定恐却求仙送翁拾遺前人還家俄赴闕别思肯凄凄山坐軺車看詩將諫筆題天開中國大地設四維低拜舞吾君後青雲更有梯遊邉送友人前人虜酒不能濃縱傾愁亦重關河𥘉落日霜雪下窮冬野燒枯蓬旋沙風匹馬衝薊門雖漢土逰子莫從容送友人遊邉前人銜盃國門外分手見殘陽何日還南越今朝徃北荒沙城經雨壊虜騎入秋狂新詠闗山月歸吟鬢白霜文苑英華巻二百八十二
