  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0022_WYG_504-1a, image: WYG1337/WYG1337-0641a.png}
body:
  text: 文苑英華卷五百四宋李昉等編嵗時門十九道元日奏事上殿不脫劔履判四道懸政象法判三道元日大斗酌酒判三道立春設土牛判二道競渡賭錢判一道伏日出何典憲判三道九日登髙墜腳判二道冬日不獻狼判一道元日奏事上殿不脫劔履判解貢土惟三分爵有五等懋勳庸而賜祿加道德以授封故鄭伯虢公旌於周日鄼侯曲逆表乎漢代咸以胥寧帝道宣翼王室上殿而劔履不脫立朝而贊拜不名貴之與尊粲然明矣丙也三朝上夀百辟齊列敷奏昌言對揚休命逺叶蕭何之軌復同子孟之躅若三台是職雅符周典如一命才登須遵漢律同前蕭昕夷夏一體正朔同班車服旌旗光分五第聲明文物照臨百官國家庶績其凝四聰咸達九重清問每降於絲綸萬人自奏方聞於復逆丙以位階丹陛得奏青蒲竹帛未書既非子孟之錫劍履不脫須置良夫之刑且道在守官物惟藏禮夫子相衛必在於正名謝恩守郕無聞於假器既紊彞典須置嚴科同前崔宇一人垂拱百官象物典禮不易威儀孔昭屬三朝會同萬國咸造列辟勿褻天威不違彼丙何斯伏奏茲日若良夫之傲禮且不釋劍異尚書之寵光徒聞曵履尊於朝聘雖古代之有文失於敬守乃今日之無懵一作愧必也位崇蕭霍榮極縉紳民且爾瞻備周官之九命馬錫蕃庶類康侯之三接不可議罪終然允臧同前揚陵履端於始且正班爵之儀明試以言是陳敷奏之議觀其所會萬國來同相彼多士百寮咸列朝有著定失位有愆國明彞倫干進斯罰丙以䇿名聖代忝迹周行初伏奏於青蒲遂來升於丹陛舍車闕下升坐其幕帶劍君前施棄常禮儻王有錫命同蕭何之寵章人多大功類霍光之舊制既不多於紀律固難措於典刑罪疑於人宜竭兩端之問劾須當理方議片言之折懸政象法判甲元日懸政象之法於闕下金吾不許云職在佐天子以平邦國萬人觀之浹日而斂對姚齊梧獻嵗布德群物俱新懸法施令衆官畢舉是遵往躅無昧彞憲惟甲位當司馬職在平人載舉舊章不忘所守恪言新嵗爰帥其徒因天地之始和擇官司之令典懸之象魏表一人之有法徇以木鐸俾萬方之知禁將使國風所逮丕冒海隅王化所流率先京邑斯乃行古之道得今之冝進不侵官退非越禮奚金吾之妄糾在古典而斯昧無亦禁衛是恤而於職司致尤夏官既掌邦鄙未嘗學矣周禮盡在吾子何所問焉同前衛浦百辟咸乂六卿分職各帥其屬欽乃攸司既立司馬之名亦稱祈父之任相維彼甲是掌邦政率由舊典匪曰曠官將選賢以興功或制軍而轄禁以忠王國實代天工九代藏疑作蕆陳且觀其坐作三陽告始克施乎赦令將懸象魏猶秉于周禮不忘舊章載書於魯䇿既浹日而斂率何法乖且謀之用臧孰云勿許能守爾職夏官未失於先庚不及而言中尉固慙於後動同前李崟六官分職百辟為憲式訓古典率由舊章惟甲藎臣克崇邦政行司馬之法平理萬人懸象魏之書紏綏四國必在肇修人紀董正戎行審鐃鐲之聲教疏數之度一作節以為諸侯入覲列土一作上朝宗序班爵之賢以觀周禮行搜狩之令來覩漢儀布夏官之典常當正月之元吉斯乃敬其所事無曠庶官儻宣父以遊寧有喟然之嘆而子牟不逺必懷多戀之心玉律惟明豫將有問金吾所見子匪良圖大斗酌酒判元日會序賔光祿以大斗酌醴祈黃耉比部以無令式勾徵訴稱以引以翼古之道也對沈東美比年三年殷見時見大會正殿小會東堂典禮序以鬯圭建官司其鍾鎮瞻言光祿式遵古典且爾公酬匪無彝倫功沽之巧周禮酒正注酒有米麯之數乂有功沽之巧沽音古先資於麴蘖水泉既香必潔於湛饎周禮酒正注湛饎必潔瑟彼玉瓉黃流在中挹彼注兹酌以大斗我客戾止嘉賔式宴呦呦鹿鳴酒正斯舉振振鷺舞兕觥其觩俾爾戩榖永錫難老式夷式已以引以翼方得古人之禮寧虧聖主之私郎署雖欲深文卿寺豈冝甘罪同前王昌齡設樽養老序賔惟賢將必發乎直言先用被一作用光被乎孝德徵元會之燕射展古義于君臣金奏洋洋合明神於九變青氣靄靄布慶雲於一色則當嘉賔戾止彞倫孔彰群儒執經之日天子尊師之禮袒割以俾其冕旒乞言以成其福祿昔之所廢今之所崇瞻彼有司未詳光祿嗟引翼之攸懵何令式之無稽徒欲致譏誠堪聳誚同前劉澗元正告朔品物惟慶萬國朝宗九賔式序尊儒尚齒以申其宴慰飬老乞言以成其福祿威儀秩秩辨一作朴舞傞傞等申公之置醴同齊侯之拜爵大斗以將其厚意加籩以寵其元老既醉既飽以引以翼引大雅之謙私致一作成太平一作王非之樂事光祿乃遵古道未蹈深愆比部則格以今科言從勾納法其畫一理在徵收刑責惟輕不宜加罪立春設土牛得宜春縣門外各隨方色造牛耕人州司科不應為訴云春前二日對許景休玄隂方窮青律肇起霜歸寒鴈露洗春木是以星駕方回知四時之代謝嵗隂更始識五行以為法甲以名忝令長頒政邑人固合酌規前經考禮中典將以助養生物叶贊嵗時然而涸隂沍寒王者以磔雞送節達陽遵禮主司以土牛迎氣所為雖合於典時方色頗乖於禮經訴以立春之前雖有近於月令若以隨方之色誠可置於秋官州科典刑竊以為當甲將妄訴罪實難逃同前鄭老萊惟彼璇衡分乎四序調兹玉管載啓三春寰中祈空土之功海內佇農祥之應甲職司銅墨道洽絃歌務切耕耘情深勸勉涓乎立春之日望氣之辰為土牛於縣門設耕人於一作終畎畝隨方所造雖取法於隂陽候節而為固無虧於令式今者四門併造數次施功便於春月之中預設秋冬之事禳災或可在法難通州司科以不應縣局乃為申訴春在兩日雖事分踈齊復三廟何如道理即科其罪恐涉深文輒此商量寧斯折中請從寬典佇叶通規競渡賭錢判揚州深江都縣人以五月五日於江津競渡并設管絃時有縣人王文身居父服來預管絃并將錢物賭競渡因爭先後遂折舟人臂對康建之日一作月觀遙臨旁分震澤雷阪回瞰近屆𨝍溝郊連五達之莊地近一都之會人多輕剽俗尚驕奢序屬良辰躔係令節江干可望俱遊白馬之濤邑屋相趨并載飛龍之舳泛長波而急漿有類乘毛湧修浪而鳴舷更同浮葉蕭吟栁吹疑傳塞北之聲棹引蓮歌即唱江南之曲王文閭閻賤品蓬蓽庸流名教非間喪儀多闕三年居廬無聞毁瘠之哀五月佳遊且預歌絃之樂重以心存清勝志在雄豪爭馳赤馬之津競賭青鳬之貫先後由其不等忿爭於是遂興無思李老之言俄折楊公之臂然則居喪聽樂已紊科條在服傷人一何凶險論情撫事深穢皇猷定罪明刑理資丹筆伏日出何典憲判廣漢等四郡俗並不以庚日為伏或問其故云地氣溫暑草木早生異於中土常自擇伏日既乖恆經出何典憲對邵潤之斗建於戍知立冬之景星火勝於金故至庚而氣伏徵俗忌之故事固稟隂陽按方志之所冝或殊寒暑廣漢四郡蜀門九折通濯錦之流入青衣之徼徒以溫暑異於中夏畜馭同於荒徼許令自擇伏日所以遂其土風當今齊七政之明垂四方之則百蠻由其奉朔九譯於是同文况兹巴蜀之人素陶齊魯之教自當變而至道率乃舊儀茍亂人時奚同文軌風俗通之小説未足憲章中和樂之雅音領崇舞詠請下四郡俾依三伏同前趙如璧天平四序有寒暑之殊地列九州著華夷之别風土既其不等節候於是莫同廣漢夷陬境連巴俗岷隅沓轉雲峯與霞岫爭輝江溜橫分錦派共沙湍遞映候乖中壤菜茂三秋氣離炎州草長二月至若時鍾季夏節屆重陽金方始萌大德不競非無典司之主必告伏匿之辰當復取捨因循何得輒為改革國家明堂布政象法已行豈使均雨之鄉翻聞易日之義雖殊風俗之典恐非得時之宜勒依恆式謂符通理同前崔翹廣漢之郡實惟沃壤江波濯錦斜分白馬之津山嶂吐雲近對黃牛之峽皇明撫運文軌大同自北徂南東被西漸徒以窪一作霔盈異等風候殊宜草木偏早於陽春金火不取於令日炎蒸郁育未見行車毒霧氛氲唯看墜馬論其恆式違帝者之金科語以憲章符漢王之故事是非之理其在兹乎九日登髙墜腳判楊甲九月九日登髙墜腳致跛乙告為不孝科不應為對馮敬徵無射良秋重陽嘉節登髙有興坐追桓景下堂傷足多侔子春雖異全歸何妨憂色寧損為孝之道而斷不應之條告之者未達其幽趣科之者固知其失道棄而不問幸無濫焉同前馮真素楊甲溺志妙賞開襟季月探幽仙術既播美於銷災賾彼禮經復傳芳於作賦茰房辟惡插鬢徒存菊花泛樽傷足旋及下堂之懼空負子春之懷登階與言方貽婦人之笑窮其孝道雖則致於毁傷校彼行章豈有涉於情故乙誠妄告甲乃無辜輒賜片言能符至理冬不獻狼判得丙為獸人冬不獻狼責之訴云秦地無狼對白居易鮮或不給既曠乃官辭且無徵是重而罪丙獸人斯掌禽獸罔共當路可求曽不思於疐尾充庖為用遂有闕於去腸既愆冬獻之期難償秋官之責爰載詳地産須重抵集作核國章薦必以時吾能言於周有生靡常所子勿謂其秦無縱口給之不慙在面欺而無捨文苑英華卷五百四
