body:
  text: 文苑英華卷九百四十七宋李昉等編職官九周大將軍鄭偉墓志一首周大將軍侯莫陳道生墓志一首周大將軍宇文顯墓志一首周大將軍司馬裔墓志一首周大將軍吳明徹墓志一首周大將軍鄭常墓志一首周大將軍襄城公鄭偉墓志銘庾信公諱偉字子直榮陽開封人也周宣母弟就封于鄭河洛之地即有民人虢鄶之君非無郡邑其後蛇鬪於門黿嘗於鼎韓侵負黍晉滅陽城其祀忽諸以國為氏祖徹撫軍周書比史並作祖思明直閣將軍贈濟州刺史父先護驃騎大將軍儀同三司襄城郡公青州刺史永安中洛城晝掩黃河凌合翟泉盟會之地蒼鳥忽飛武庫兵欄之中鱗魚遂上三帥北絏五馬南浮梁武帝大造中原樹君伊洛公之慿軾棧車言歸舊壤起為通直散騎侍郎天厭魏德政在強臣公耻入亂階乃於陳留起義太祖封函谷而待諸侯坐鄷宫而朝群后威懷是接席卷西飛大統三年入朝蒙授武陽縣開國伯食邑六百户尋除龍驤將軍北徐州刺史開河橋之陳解王璧之圍張旃罹作旗於冨平被練於伊闕探虎穴而揮戈上魚門而懸胄故以䇿名司勳功髙舍爵魏將侯景狼顧荆河天子命我偏師赴接垂餌虎口中途背盟事獲交綏公之力也除中軍將軍散騎常侍大都督襲襄城郡公食邑二千户仍除使持節車騎大將軍儀同三司餘如故遷驃騎大將軍開府加侍郎常伯位重霍去病之登朝上將官尊公孫敷之出塞以今方昔異代同榮魏後二年授大將軍事江陵防主都督十五州諸軍事吳兵教士艫舳習流島嶼慿陵波瀾衝激公暫臨江界已悉南越之兵裁沉樓船即善昆彌之戰遂得安歌澧浦弭節涔陽留魯侯而宴章臺對齊人而畋雲夢周保定元年授使持節都督冝州諸軍事宜州刺史天和六年授都督華州刺史餘如故崤函重嶂汧渭分流陽陵之益既奔華隂之學還聚而消渴連年屢有相如之患至于大漸遂如范增之疾桐君對藥分闕神明李柱侍醫更無方便以天和六年四月十七日薨年五十七詔贈本官加少傳都督司豫洛相冀五州諸軍事司州刺史諡曰肅公禮也天子輟朝彌深大臣之議群公會葬咸得同盟之禮夫人李氏頓丘貴姓卿相之門賢才之室霜露先侵策封郊次以其年十一月六日合葬于咸陽之長安縣某原合葬非古既異三王之前死則同穴還同六載之始雖復銜珠兩鶴同歸紫蓋之松出匣雙龍共沒延平之水嗚呼哀哉乃薦銘曰國有巖邑朝多君子武公莊公平王卿士溫麥踰盟祊田廢祀驂乘停輿來朝識履惟祖惟考既侯既公樞機周密出納清通治煩政簡處亂心雄濟河遺惠一作德海岱餘風世濟其美載誕其器忠無不為孝則不匱幽冀紛梗關河鼎沸自北自南聲聞梁魏揚旌汝頴威震三川擁旄江漢席卷樓船成皋塵起廣武烽燃麋興麗箭鴈落驚弦㧾衛蘭錡申威河外山類鼓樓樹如車蓋都護兩道將軍獨拜梧桐茂苑楊栁倡家千金回雪百日流霞凋零倐忽悽愴榮華河陽古樹金谷殘花隴昏雲瞑山深路晚風氣才髙松聲即逺疇昔親友歡愈交結不為平生應為此别周驃騎大將軍開府侯莫陳道生墓志銘前人君諱道生字某朔州武川人也本系隂山出自國族降及于魏在秦作劉父少興武川鎮將山河抗拒關塞被邉早擅威聲咸多雄烈君子讀書馬上清談劔端獨運六竒專精三略雖復身居末將而勇冠旌門位在支軍而謀參幕府魏正光五年任統軍頴天柱爾朱榮征北海王永安三年隨太師賀拔勝入關尋轉别將滑源卷甲關城束馬並皆尅捷君有力焉永熙三年補都督太祖文皇帝奄有關河令行天下以君幹略委之爪牙名洽中涓功參上造兵臨河曲前登白馬之津冦發蒲城先戰黃沙之苑臨晉橫船既禽趙將韓信臨晉陳船虜魏王豹其擒趙虜將自楚拔幟事在豹後未詳馬陵削樹復下齊兵班瑞司勳披圖疏爵授驃騎大將軍金紫光祿大夫鄠縣開國公食邑五百趙儼之為驃騎正駕單車張堪之拜光祿長乘白馬以斯連類朝野榮之大統九年更姓侯莫陳氏隨大將軍拓跋逺經始陽二水長鬪三川無市擐甲搆病死於轅門春秋五十一贈持節都督朔州刺史君在武川文皇帝同鄉里霸功既立王業克成不忘捨講猶論償博今嗣德惟新功臣追逺東都馬鳴不無見日之歎北陵車過終憶平生之言有詔更贈使持節驃騎大將軍開府儀同三司都督冝敷綘三州諸軍事敷州刺史諡某公禮也夫人拓跋氏安邑郡夫人庭有鍾鼓家承針誡教容教德言告言歸天和五年六月薨即以其年十月同葬于京兆某縣洪源鄉武子成寢請西階而合葬平縣下嫁即廬山衛青與平陽主合葬起家象廬山而共墳銘曰凝隂逺寂廣漠平寒沙窮瀚海地盡皋蘭塞鴻秋去胡桑夏乾風土壯氣山河凛然師一作兵旅上谷威雄武川君則繼踵代不乏賢匣有忠劔庭流孝泉魏室多故餘風未殄天保讓德當途廢典上將指縱中涓力展洛城夜捷河梁朝剪鐵劔金龜榮追玉鉉身胄漢祚門承魏緒並擅華宗俱稱當路伉儷云匹年齡並故趙瑟秦聲同為丘墓小陵石槨洪原鄉墓芻靈兩引池桞雙前隊路仍合松城即連霜隨桞白月逐墳圓芝蘭幾代陵谷何年周車騎大將軍贈小司空宇文顯墓志銘公諱顯周書北史並作顯和字某上黨武鄉人也自大霧浮河長虹映渚承源於若一作弱水纂系於蒼林上黨居韓之西常山在趙之北因地為氏可略而言焉祖求南衛將軍冀州刺史父金殿征南將軍定州刺史並控鶴兵俱張戎樂聲榮之盛繼踵當年公稟山嶽之靈擅風雲之氣容止矜莊聲名籍甚彎弧挽強左右馳射故得名高上谷威振樓煩襲爵安吉縣侯食邑五百户永興三年幽并叛換有無君之心帝顧謂公曰天下洶洶將若之何公曰擇善而從之乃誦詩云彼美人兮西方之人兮帝曰是吾心也乃定入關之䇿以公母老家大令預計公曰今日之事忠孝不並君不密則失臣臣不密則失身帝愴然改容曰卿是我王陵遷朱衣直閣閣內大都督改封長廣縣公邑一千五百户武帝初至潼關太祖親迎溱水太祖素知公名而未之識也目於衆疑而不問直云令此人射水傍小鳥應手即著太祖喜云我知卿名周書北史並作工矣即用為帳內都督滄州諸軍事滄州刺史增邑并前二千五百户黃公衡之決土魏后是以推心潘承明之忠壯吳王為之降禮異代同榮見之今日東夏邊隅地連荒服井陘寒道飛狐路斷乃以公為使持節衛將軍都督東夏州諸軍事東夏州刺史白波青犢之兵銅馬金繩之亂莫不交臂屈膝牽羊抱馬在州遘疾解任還朝小馬留廄餘狀挂衽吏人攀戀刋石陘山雖非漢陽之城還似扶風之路授使持節車騎大將軍儀同三司加散騎常侍以魏後元年疾甚亡于同州春秋五十七天子輟樂羣公會喪太祖親臨弔祭哀慟左右于時兵革交侵普斷贈諡即以本官印綬權葬于同州之北今建德二年二月二十三日遷喪於咸陽長安縣之洪瀆原時逢禮樂之遷代屬謳歌之變國雖異政人足追榮乃贈使持節驃騎大將軍開府儀同三司小司空丹延綏三州諸軍事延州刺史諡某公禮也夫人高氏渤海人也柔參晉政拒曹爽之異謀起在漢庭共王陵而俱對况乎針訓有儀言容以德肅泰中興賢才內則豈直不聽雜樂以變齊國之風不食鮮禽以斷荆王之獵昔之命葬季武子之兩寢今之同穴長平侯之北陵世子神舉兄弟至性純孝善居喪禮有終有始於身無改是以宦成名立孝顯忠存銘曰北嶽二名䓤河兩本其峻惟極其源惟逺俗稟山川人資台衮義烈桓桓才雄悃悃乃祖乃父繼踵威雄摐金北陸鳴玉南宫隱若吳漢賢哉竇融負霜依德無雷向風挺此含章生茲秉德孝實天性忠為人則暢轂鏤膺燕南趙北若一作弱水將通九部疑作九都可勒帷幄參謀宫闈典職善擇忠言能防變色繁弱已徑淇園乃直戟中小支禽穿左翼建旟赤谷揮戈武州長城萬里河水雙流潁川多恙淮水未瘳義重穿壁恩深置郵于谷之口于渭之丘陽山零落碑闕低昂草銜秋火樹抱春霜書劍俱沒人琴並亡哀哀嗣子純心靡託孝水未枮悲松先落室逺巢鵀門通吊鶴功臣身殞會圖麒閣周大將軍琅琊莊公司馬裔墓志前人公諱裔字遵胤河內溫人也南正司天北正司地是謂西河之官即嗣重黎之政卬之歸楚與章邯而並封豫之避秦共毛公而俱去祖龍北史全龍仍居選部水鏡三臺父悅再牧荆河威風千里而身遭禍機遂為季布所哭獲存遺嗣實賴程嬰之忠國家追念功臣更撫叔敖之子言思官族還求女齊之胤公始應辟為河內功曹除員外郎常侍汲郡治兵黃河浮馬雄疑作推鋒軹關之捷逐北長城之陳授平東將軍北徐州刺史桞泉風塵三城席卷棠隂鋒鏑千室入關遷車騎大將軍儀同三司開國龍門縣伯仍除巴州刺史雖復巴水三回夷歌數曲徒逄白竹之弩已濟青衣之功朝廷以漢之功臣須開上將之府晉之代胄冝紹琅琊之國遷驃騎大將軍開府改封琅琊公食邑一千五百户宫闈近密實俟忠貞詔為大御伯仍除大御正職司常伯任惣夔龍王道既平絲言惟允尋除始州刺史都督始州諸軍事蠻夷持險狼顧鴟張髙山尋雲深谷無景九地縱橫三門起伏峰危馬束水險橋飛遂得谷靜山空氷消霧散仍為信州刺史都督信州諸軍事精兵守於白帝足懼巴丘之城船梯下於荆州彌動西陵之戍即授使持節大將軍都督西寧州諸軍事西陵州刺史將啓北户之人向通雲南之國聞寵若驚奄從深夜天和六年正月十八日亡春秋六十五詔贈本官加懷邵汾晉泗州刺史諡壯周書北史並作定公禮也以建德元年七月十三日葬于武功之郡三疇原公愛敬純深有隱無犯忠貞亮直知無不為在戎四十一年身經六十九戰至於多竈唱籌並得成功飛沙擁石未嘗乖律恂恂教義吳起西河之風間間鼓旗李牧長平之政身死之日家無餘財山一作出木所資一由詔葬有始有卒生榮死哀銘曰祝融是命重黎克舉公族乃建天官即一代序避世於秦承家於楚金行失馭玉鏡淪輝我之烈祖識變乘機黃旗東沒青蓋西飛落星置道長州出圍及我皇父荆河再撫世屬喪亂身沉猾堅嗟我遺嗣﨑嶇趙武寒覆鳥翼飢吞獸乳獲歸河內更襲琅琊年方小馬怨結長蛇藏兵九地置劍千家雪山埋馬氷河陷車既乃班政超然榮守朱鷺頻飛金龜轉紐築塞長榆營軍髙桞玉案推食河橋勸酒石門氷釋金堤電散蘆水門關茅津成一作茂觀馭風逸翮修途始半建武功臣先悲吳漢沉寥搖落遊揚浸微金城路斷郿塢人稀風松蓋雲白水山衣賢已星殞人沒蘭衰周大將軍懷德公吳明徹墓志前人公諱明徹字通昭一作照兖州陳書作南州秦郡人也西都列國長以王功被山河東京貴臣大司馬名髙西漢豈直西河有守智足抗秦建平有城威能動晉而已也祖尚南譙太守父標南史作樹右軍將軍抗拒淮沂平夷濟滲代為名將見於斯矣公志氣縱橫風情倜儻圯橋取履早見兵書竹林逢猿偏知劔術故得勇爵登朝材官入選起家東宫直後除左軍葛瞻始嗣兵戈仍遭蜀滅陸機才論功業即值吳亡公闕梁未為逹也自梁受終齊卿得政禮樂征伐咸歸舜後是以威加四海德教諸侯蕭索煙雲光華日月公以明略佐時雄圖贊務鱗翼更張風颷遂逺冠軍侯之用兵未必師古武安君之飬士能得人心擬於其倫公之謂矣為左衛將軍尋遷鎮軍丹陽尹北軍中候惣政六師河南京尹冠冕百郡文武是寄公無愧焉蕭湘之役慿陵島嶼風船火艦周瑜有赤壁之兵蓋舳襜艫魏齊有橫江之戰仍為平南將軍開府儀同三司都督湘衡桂武四州刺史遂得左廣回扄轔車反暢長沙楚鐡更入兵欄洞浦藏犀還輸甲庫雖復戎歌屢凱軍幕猶張淮南望廷尉之囚合淝稱將軍之冦莫不失穴驚巢沉水陷火為使持節侍中司空車騎大將軍都督南北兖青譙五州諸軍事南兖州刺史南平郡開國公食邑八千户鼓吹一部中台在玄武之宫上將列文昌之宿髙蟬臨鬢吟鷺陪軒平陽之邑萬家臨災之馬千駟坐則玉案推食行則中分麾下生平若此功業是焉既而金精氣壯師出有名石鼓聲髙兵交可逺故得艫舳所臨蓋于淮泗旌旗所襲奄有龜蒙魏將已奔猶書馬陵之樹齊師其遁空望平隂之烏俄而南仲出車方叔蒞止暢轂文茵鈎膺鞗革遂以天道在此南風不競昔者禆將失律衛將軍於是待罪中軍爭濟荀桓子於焉受戮心之憂矣故疑作胡以事君宣政元年屆於東郡之亭有詔釋其鸞鑣蠲其亹社始𢎞就館之禮即受登壇之䇿拜持節大將軍懷德郡開國公邑二千户歸平津之館時聞櫪馬之嘶舍廣城之傳裁見諸侯之客亷頗眷戀寧聞更用之期李廣盤桓無復前驅之望霸陵醉尉侵辱可知東陵故侯生平已矣大象二年七月二十八日氣疾增暴奄然賔館春秋七陳書本傳作六十七即以其年八月十九日寄瘞于京兆萬年之縣東郊詔贈某官諡某禮也江東八千子弟從項籍而不歸海島五百軍人為田橫而俱死焉嗚呼哀哉毛修之埋於塞表流落不存陸平原敗於河橋死生慙恨反公孫之柩方且未期歸連尹之尸竟知何日逰魂羇旅足傷溫序之心玄夜思歸終有蘇昭之夢遂使廣平之里永滯寃魂汝南之亭長聞夜哭嗚呼哀哉乃為銘曰九河宅土三江貢職彼美中邦君之封殖負才矜智乘危恃力浮磬戢鱗孤桐垂翼五兵早竭一鼓前衰移營減竈空幕禽飛羊皮詎贖畫馬何追茍罃永去隨會無歸存沒俄頃光隂愴悽嶽裂中台星空上將眷言妻子悠然亭障魂或可招喪何可望壯志沉淪雄圖埋沒西隴足抵黃塵碎骨何處池臺誰家風月墳隧羈逺營魂流寓霸岸無封平陵不樹壯士之隴將軍之墓何代何年還成武庫周大將軍上開府廣饒公鄭常墓志作鄭常而九百十九卷神道碑作字文常蓋其役賜也墓志銘前人公諱常字某滎陽人也周宣王之弟初封其國鄭穆之孫始成其姓祖思慶建威將軍山陽太守考項儀同三司豫州刺史南陽坐嘯值此邦君西河建隼逢斯刺舉公侯繼踵冠冕連鑣可得而言傳於史籍公髫齓知禮早年馳譽就經黌舍略見書堂習武兵欄偏知劔術雖復年猶小學已為儒者所稱位在偏禆即入將軍之賞大統三年起義華陽授本縣開國男文皇帝霸迹初基英雄輻輳公拔劔轅門頴川從我洛城逆戰壯於白馬之兵河橋解圍勇於烏林之䇿授平東將軍帥都督襲父封魏後二年授持節車騎大將軍儀同三司車騎用郭淮之勳儀同取王沉之貴公之此授僉曰得人進爵廣饒縣公邑千户保定三年授使持節都督遷州諸軍事遷州九百十九卷宇文常神道碑作羅州刺史今常墓志作遷州按隋地理志西魏時於竹山縣置羅州宇文後周於房陵郡置遷州至隋并號房州刺史即㧾領金州兵馬開拓北疆髙山尋雲深谷無景梯繩乃上浮竹裁通閩越影嚮勾吳聲勢公出戰短兵並皆奔北瓦解氷碎山空谷靜授持節開府儀同大將軍柏梁髙宴有大將軍之詩幕府初開有平陵侯之國比之今日豈可同年而語哉自是使車被之繡服風謡是察刑政事觀公露節東驅風奔群盜埋輪當路威振中原武皇帝有盟津之師以公為中權之徑外從決勝內侍軍謀及文軌既同旃旌已偃司勳行賞軍吏舉功乃授使持節上開府增邑五百户賜姓宇文與國同乘之榮周之宗盟非復異姓之後蕃屏是寄隆寵所歸公室無踈此之謂矣九州都督須得其才千里諸侯實俟其政乃為使持節都督東徐州諸軍事徐州刺史尋遷南衮州諸軍事南兖州刺史公頻惣六條再勞十部俗變風移人懷吏畏滯穗遺秉有利疲人山桑野蠶足充貢賦化被殊俗威行鄰境奏事京師四方第一謂真刺史其在斯乎春秋未髙奄然遘疾以大象元年薨于州鎮時年六十三嗚呼哀哉吏人扳慕飛走變色河濟輟舂淮沂罷市以今年歸葬于滎陽之山詔贈某官禮也嗟陵谷之貿遷懼徽猷之永逺地久天長敢鐫貞石銘曰荆河惟豫洛食之本水繞滎波山斜陸渾德星猶照祥風未逺代不乏賢又無闕衮公之生也實降英靈忠為德本孝稟天經觀書虎館學劔龍亭雕弓偃月行馬流星置陳黎陽麾兵官渡平隂聽烏馬陵書樹氣視回津星占飛步火斷羌營沙崩賊路及驅犀節乃牧雄州吏不驚犬人無喘牛西蠶得嵗東作逢秋草爛獄户星低市樓五將星亡三台嶽折哀哉天道遂當明哲棟梁崩壞風雲寂滅北郭長悲東都永别幽深此地宅兆斯慿山回虎圈路上魚陵悲風夜烈苦露晨凝蘭芬菊茂終古相成文苑英華卷九百四十七
