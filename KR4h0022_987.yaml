body:
  text: 文苑英華卷九百八十八宋李昉等編交舊十一祭栁員外文二首祭吏部韓侍郎文一首祭劉巡官文一首祭座主兵部尚書顧公文一首祭清河李少尹文一首祭韓令公文一首祭豐州李大夫文一首祭李侍郎文一首祭中書韋相公文一首祭李司徒文一首祭栁員外文劉禹錫維元和十五年嵗次庚子正月戊戌朔日孤子劉禹錫銜哀扶力謹遣所使黃萇具清酌庶羞之奠敬祭于亡闕友栁君之靈嗚呼子厚我有一言君其聞否惟君平昔聰明絶人今雖化去夫豈無物意君所死乃形質耳魂氣何託聽余哀詞嗚呼痛哉嗟余不天甫遭閔凶未離所部三使來弔憂我衰病論集作諭是以苦言情深禮至欵密重復期於集作以中路更申願言途次衡陽云有栁使謂承集作復前約忽承訃書驚號大呌如得狂病良久問故百哀攻中涕洟迸落魂魄震起集作越伸紙窮竟得君遺書絶絃之音悽愴徹骨初託遺嗣故集作知其不孤末言歸輤從祔先域凡此數事職在吾徒永言素交索居多逺鄂渚差近表臣分深想其聞訃心勇於義已命所使持書徑行友道尚終當所集作必加厚退之承命改牧宜陽亦持一函候於便道勒石垂後屬于伊人安平宣英㑹有還使悉已如禮形於冥浙本作其書嗚呼子厚此是何事朋友凋落從古所悲不圖此言乃為君發自君失意沉伏逺郡近遇國士方伸眉頭亦見遺學集作草恭辭舊府志氣相感必踰常倫顧余負舋營奉方重集作萬里猶兾前路望君銘旌古之逹人朋友製蜀本作則服今有所厭其禮莫伸朝晡臨後出就别次南望桂水哭我故人孰云宿草此慟何極嗚呼子厚卿其死矣終我此生無相見矣何人不達使君終否何人不老使君夭死皇天后土胡寧忍此知悲無益奈恨無已子之不聞余心不理含酸執筆輒伸復集作復中止誓使周六同於已子魂兮來斯知我深㫖嗚呼哀哉尚饗為鄂州李大夫祭栁員外文前人嗚呼至人以在生為傳舍以軒冕為儻來逹於理者未嘗惑此昔余與君論之詳熟孔氏四科罕能相備惟公特立秀出幾於全器才之何豐運之何否大川未濟乃失巨艦長途始半而喪良驥縉紳之倫孰不墮淚昔者與君交臂相得一言一笑未始有極馳聲日下騖名天衢射䇿差池髙科齊驅携手書殿分曹藍曲心志諧同追歡相續或秋月銜觴或春日馳轂甸服載朞同升憲府察視之列斯焉接武君遷外郎豫侍內闈出處雖間音塵不虧勢變時移遭罹多故中復賜環上京良遇曽不踰月君又即路逺持郡符栁江之壖居陋行道疲人歌焉豫來夏口忽復三年離索則久音貺屢傳篋盈草𨽻架滿文篇鍾索繼美班揚差肩賈誼賦鵩屈原問天自古有死奚論後先痛君未老美志莫宣邅廽世路奄忽下泉嗚呼哀哉令妻早謝稚子四嵗天喪斯文而君永逝翩翩丹旐來自遐裔聞君旅櫬既及嶽陽寢門一慟貫裂衷腸執紼禮乖出疆路阻故人奠觴莫克親舉馳神假夢冀獲晤語平生密懷願君遣吐遺孤之才與不才敢同已子之相許嗚呼哀哉尚饗祭吏部韓侍郎文李翺嗚呼孔氏云集作去逺楊朱恣行孟軻拒之乃壞于成佛氏混華異學魁橫兄常辨之孔道益明建武以還文卑質喪氣萎體敗剽剝不讓儷花鬬葉顛倒相上及兄之為思動鬼神撥去其華得其本根開文粹作關合怪駭驅濤湧雲包劉越嬴並武同殷六經之風絶而復新學者有歸大變于文兄之仕宦文粹作官罔辭於艱文粹作于難疏奏輒斥去而復遷集作還升黜不改正言亟聞貞元十二兄在汴州我遊自徐始得兄交視我無能待豫以友講文析道為益之厚二十九年不知其久兄以疾休我病卧室三來視我笑語集作言窮日何荒不耕㑹之以一人心樂生皆惡言凶兄之在病則齊其終順化以盡靡憾文粹作惑于中别我集作欲别千古意如不窮臨喪大號决裂肝胸老𣆀言夀死而不亡兄名之垂星斗之光我狀兄行下于太常聲殫天地誰云不長喪車之來集作來東我刺廬江君命有嚴不見兄喪遣使奠斚百酸攪腸音容若在曷日而忘嗚呼哀哉尚饗祭劉巡官文前人維元和七年嵗次壬辰九月景辰朔十五日庚午觀察判官攝監察御史李翺等謹以清酌庶羞之奠敬祭于劉君之靈我等與君同列賔筵共食偕行嵗辰再遷公事多暇嬉遊自般栁垂於集作于塘荷秀于川或泛在水或登在山歌京本作飲酒終夜觴觥往還笑言無虛咸盡其歡君實强盛時惟壯年宜哉夀考福祿來臻奈何遭疫集作疾針藥弗痊日冀返初憂危遽傳長路未極琴書忽捐嗚呼哀哉堂有老母室有少妻幼男稚女蜀本作幼女稚男或童或孩發聲怨切弔者酸悽祔葬舊城隨喪以歸已矣劉君自古如斯有肉一豆有酒一蜀本作盈巵我來告集作一别去去長辭嗚呼哀哉尚饗祭座主故兵部尚書顧公文吕溫集無維貞元十年嵗次甲申月日門生侍御史王播監察御史劉禹錫陳諷栁宗元左拾遺吕溫李逢吉右拾遺盧元輔劍南西川觀察支使李正叔萬年縣主簿談元茂集賢殿校書郎王啓祕書省校書郎李建京兆府文學李逢渭南縣尉席䕫鄠縣尉張𨽻初奉禮郎獨孤郁協律郎蕭節奉禮郎時元佐滎陽主簿李宗衡前鄉貢進士鄭素等謹以清酌之奠祭于座主故兵部尚書東都留守顧公之靈峩峩靈山時雨將泄耽耽大厦崇構已設嵗旱方極川流遽閟宏棟待施梁木斯折玉碎清瑩芝焚酷烈貞芳獨留千古不滅嗚呼哀哉伏惟公神氣輔質天降英靈剛健中正內外和明岐嶷之初不教而成敦敏之後確然已貞靄靄孤雲逸我髙情昭昭白日懸我明誠志勵義深心融氣清靖若翔隼藹如芳英於乎立人成身忠孝一美自古全者一人而已明君得臣賢父知子公獨兼備敢陳終始厥初知禮嚴訓柔順義方年未逾丱道行于鄉盈庭之戲衆稚且狂觹管在身我獨矜莊沐浴風雨盥潄雪霜未薦甘㫖未敢衣裳斯惟至性厥有大孝乃揚儒風乃奉文教服勤之功煥飾之效金石成聲縟麗開照越國山秀吳門水深句曲宵朗湘沅夕隂怡神導和滌思凝心棄我竒寶鑑然至音天寶季年安史內侵翰苑詞人播遷江潯金陵㑹稽文士成林嗤衒爭馳聲美共尋損益褒貶一言千金洙泗之風弊而侵淫我乃閉關響絶光沉藏輝必發含章以俟蛟龍得雲平陸騁鷙人或妙用我藴成器人矜謏聞我愚大智聿來膠庠厚此淳懿鄉選或兢我則無愧芳桂盈手青霄坐致春從王畿冬踐郎吏危險立則一作績艱難見志諌草焚灰絲綸深祕命官儲賢有國大備至公茍在淳化不墜翰選精重睿思䖍志繫於安危𢎞此教義我雖受命求人報天工惟選藝器必搜賢松菊有烈薰蕕在前妍媸自分衡鏡髙懸潛符希夷化若神仙道貫品類心冥陶埏歸吾至精復命上𤣥物不可棄道由爾全毛翔鸞鳳殼蛻龜蟬萬類俱適三清晏然伊昔仲尼其徒三千命不可求文實在焉微言僅存正氣莫宣用茍登席希徒執鞭曷如清時文柄克専髦彥必舉典謨備甄中侍六載內朝十年三司秋賦五掌春銓翼翼京師教化之先肅恭誠敬昭彰可傳在昔成周左伊右瀍乃命保釐撫我三川資仁感義與道周旋煥乎成功嶷若崇巔乃飾兵車兵利革堅乃修農畝闢隴開阡榛穢荒蕪化為良田汙潦溝瀆流為清泉忠至誠逹思焦身捐醴甘必竭膏明乃然嗚呼哀哉馹騎霄馳皇慈中激后復真質臯還魂魄新命簫鼓舊原松柏陵谷可移德音不易嗚呼哀一作痛哉播等援自諸生升為王賔念必期于霄漢手親擢其泥塵播嘗再忝於科第始一命於朝倫感自衷於誠接歡自己而情均或負知於一紀或登用於數旬恨俱長而各異哀靡極而寧伸凡在京兆一十九人四忝御史三為諫臣孔門有光游夏修身逺奠雖設用兹慰神馨香可薦醪醴方陳歔欷相從列拜斯文伏惟尚饗祭河南李少尹文沈亞之維長慶四年五月十七日福建等州團練副使沈亞之謹遣部集作郡吏李權奉酒殽之奠敬祭于故河南少尹李公之靈夫哲智之逹塞兮繫其時之難集作艱通故孔子厄而周公隆管遇齊而卒業賈遭漢而不終嗚呼哀哉古昔所集作何思所思惟時謨不我進綱不我維民不得濟道安集作不得施雖富且貴夫何用為夫子之道沒矣今將遺誰卷清明之特逹歸壤厦而藏之哀哉尚饗為韓尹祭韓令公文前人澤梁宋之戎郊涵雄渾於雲水陶沉毅以集作與濃剛作耽耽集作晄晄之巨士綿將流於先故集作洪光鼓神濤之在已昔丞相之東征統梁城之千雉命賔余以掌檄蹤枝馬之遺美見公佩之橫腰冠衙旗於宋壘及夷門之節卧余奉歸于故里寧後者之無當鴻集作顧狂埃之勃起司馬啖而賔徒烹血肉肆而為市何繼師之無作始公之功由是伏豺豹於神貌遂寧清乎千里聞君書於天閽帝嘉悅而忘恥嘗叙族以姪余謂同源於康子言康樂於一方竟綿歷乎再紀廪蓄衆集作粟以億計積有餘而流委櫪甲馬之萬銜惟君王之所指撲淮童與齊蠆猶烹冰以燎葦想集作視燕趙之强侯若負垤之羣蟻彼承風其如何聞當飯而遺匕乃集作及柱天而轍日信博壯之可倚逢諒隂集作暗之初晨遂踐阼而為治推轂兮升壇河橋兮鄜畤恩光被以湛稠仍分疆以及嗣遵比集作往年之來覲見差班於父子復何殃之不造遽相追而沒齒榮華之不道兮倏云乎已矣悼皇情以注想每凝旒而撫扆錫袐物之必周余將集作得命為臨視還壤厦之將駕導清笳於哀徴鑒卑志之潔恭願降欽而省此嗚呼哀哉尚饗祭豐州李大夫十八丈文令狐楚嗚呼髫齔之年獲見大夫自以成器異於羣倫自降而遷垂三十春服義懷德逺而逾親靈州不協坐謫三楚遐服徂征髙館晤語謂天之道正直是與捧手欲辭以心相許羣后抗疏頌疑作訟公無辜羽林森森天授兵符適值南還頴耀神都風天雪夜買酒相呼帝命并土喜公為副令尹是毗賢王是輔嗟我小子此焉婚娶贄幣既求酒牢亦具河外西城振胡鎖戎詔遷大夫開府其中平生相知招我以弓竟逼方寸不能從公自此違奉無由詣謁絡繹篇章綢繆書札不聞嬰疾不得留訣倉卒一辭寂寞長别嗚呼哀哉惟先將軍有庸有勳及公嗣興武不害文義分如霜志氣干雲頭蓬靣垢報國事君土田未封旄鉞未受天實福善神明為咎埋沒黃沙摧殘白首雖以瞑目豈能鉗口孤旐翩翩反葬秦川經過故府悵望新阡魂氣何之音容悄然攀轅薦奠苦淚潺湲祭李侍郎文白居易維長慶元年嵗次辛丑五月景申朔十日乙巳翰林學士守中書舍人集作中散大夫守中書舍人翰林學士上柱國賜紫金魚袋元稹朝議郎守尚書主客郎中知制誥白居易謹以清酌庶羞之奠敬祭于故刑部侍郎贈工部尚書隴西李公杓直之靈於戲代重名義公能佩服德潤行羶彬彬集作溫溫郁郁凡嚮善者如蟻慕肉時重爵位公負楨幹天官是攝司冦是贊集作春秋天官是攝是贊尚書六職公理其半朝重文翰公掌詔令西閣絲言內庭密命公實出入迭操二柄家重隆盛公暨陳許兩掖中臺差肩接武青幢赤茀叔出季處門重婚嗣公娶令族鎗鎗振振和鳴以續男女七人五珠二玉年重夀考公亦云老心雖壯健髮已華皓五十加八亦不為夭人重康寧公體豐盈逮乎奄忽不失和平啓手足夜無呻吟聲古稱五福公有七福凡人得一死猶瞑目矧公兼之豈有不足所不足者不在公集作其身怏怏惻惻其在他人為門户惜主為骨肉惜親為吾儕惜良友為朝廷惜賢臣况稹也不才居易無似辱與公遊十九年矣昔貞元年集作嵗俱初筮仕並命同官蘭臺令史以公明逹以我頑鄙度長挈集作潔能信非倫擬一言吻京本作合不知所以莫逆之交實集作貴從兹始間登清近集作清問登近遞罹讒毁江澧通州左遷萬里或合或散一伏一倚浩浩世途是非同軌齒牙相軋波瀾四起公獨何人心如止水風雨如晦雞鳴不已不因紛阻孰辨君子以膠投漆如弧有矢所以綢繆見于生死前年去年次第徴還或先或後俱到長安水流火就松茂柏歡置酒欲飲握手何言初論瘴癘次叙艱難三心六眼同一澘然稹與居易旋登禁掖公領銓衡職勤務劇私室多故公門少隙歡㑹實稀光隂虛擲互相勸勉急務歡適且曰朱顔已去白日可惜花時集作寺春朝松園月夕大開口笑滿酌酒喫言約則然心期未獲嗚呼杓直而忍我遺棄我何遽集作處捨我何之豈反真歸寂冥然而無所為將精多魄集作魂强的然而有所知恍如聞兮倏如覩未甘心於永辭彼有靈兮此有夢胡不一來兮質我疑逝川渺其不回日月忽乎有時指岐下以歸祔備大葬之威儀禮有進而無退祖於庭而送於京本作之畿旌竿舉兮轜輪動遂不得少留乎京師嗚呼杓直其鑒于兹爵盈不飲豆乾不食如之何勿思公兒號我公馬嘶我如之何勿悲嗚呼杓直已而已而哀哉尚饗祭中書韋相公文前人維太和三年嵗次己酉六月乙酉朔三十日戊寅中大夫守太子賔客分司東都上柱國晋陽縣開國男食邑三百户賜紫金魚袋白居易謹以茶果之奠敬祭于故中書侍郎平章事贈司空韋公德載惟公忠貞大節輔弼嘉謨倚注深恩哀榮盛禮伏見册贈制中已詳惟公世祿官業家行士風茂學清詞冲襟𢎞度伏見碑志文中已詳此不重書但伸夙願公佩服世教棲心空門外為君子儒內修菩薩行嘗集作常接餘論許追髙蹤元和中出守開忠二郡日公先以喻金礦偈相問往復再三繇是法要心期始相㑹合長慶初俱為中書舍人日尋詣普濟寺宗律師所同受八戒各持十齊繇是香火因緣漸相親近及公居相位走在班行公府私家時一相見佛乘之外言不及他誓趨菩提交親集作相度脫去年臘月勝業宅中公云心集作必結佛緣無如願力因自開經篋出大方廣佛華嚴經京本有中字十願品一通合掌焚香口讀手授自持護始傳一人曽未經旬公即捐館追思復視似不偶然今即日於道場齊心持念一願一禮如公在前以至他生不敢廢墜至若與公同科第聨官寮奉笑言䝉推奬窮通榮悴之感離合存歿之悲盡成虛空何足言歎今兹薦奠不設葷腥庶幾降臨鑒察情集作精意噫浮生是幻真諦非空靈鷲山中既同前㑹兜率天上豈無後期嗚呼韋君先後間耳伏惟尚饗祭李司徒文前人維太和四年嵗次戊戌七月癸酉朔十九日辛卯大中大夫守太子賔客分司東都上柱國賜紫金魚袋白居易內重表弟朝請大夫守少府監上柱國李翺謹以清酌庶羞之奠敬祭于故相國興元節度使贈司徒李公惟公之生樹置名集作制節忠貞諒直天下所仰惟公之歿連集作遭罹禍變京本作亂寃憤痛酷天下所知雖千萬其言終不能盡於集作故兹奠次但寫私誠居易應進士以鄙劣之文䝉公稱奬在翰林日以拙直之道䝉公扶持公雖狥公愚則受賜或中或外或合或離契濶綢繆三十餘年至於豆觴之㑹軒蓋之遊多奉光塵最承歡惠眷遇既深於常等痛憤實倍於衆情永訣奈何長慟而已翺情兼中外分辱眷知綿以嵗時積成交舊敢申薄酬集作奠庶鍳微衷嗚呼哀哉伏惟尚饗文苑英華卷九百八十八
