body:
  text: 文苑英華卷二百九十二宋李昉等編行邁四崔皓四首祖詠四首儲光羲二首宋昱一首常建一首王昌齡六首陶翰一首郭向一首薛據一首高適六首劉長卿七首崔曙二首沈頌二首張謂二首岑參八首李嘉祐四首錢起一首皇甫曾一首張繼四首顧况一首司空曙二首舟行入剡崔皓鳴棹下東陽回舟入剡鄉青山行不盡緑水去何長地氣秋仍濕江風晚漸凉山梅猶作雨溪橘未知霜謝客文逾盛林公未可忘多慙越中好流恨閲時芳晚入汴河前人昨晚行南楚今朝北泝河客愁能幾日鄉路漸無多晴景搖津樹春風起棹歌長淮亦已盡寧復畏潮波發錦沙村前人北上途未半南行嵗已闌孤舟下建德江水入新安海近山常雨溪深地早寒行行泊不可須及子陵灘行經華隂前人岧嶤太華俯咸京天外三峯削不成武帝祠前雲欲散仙人掌上雨初晴河山北枕秦關險驛樹西連漢畤平借問路傍名利客無如此處學長生泊揚子岸已見一百六十四卷祖詠江南旅情前人楚山不可極歸客但蕭條海色晴看雨江聲夜聽潮劍流南斗近書寄北風遙為報空潭橘無媒贈洛橋過鄭曲前人路向榮川谷一作夕晴來望盡通細烟生水上圓月在舟中岸勢迷行客秋聲亂草蟲旅懷勞自慰淅淅有凉風次圃田居前人前路入鄭郊尚經百餘里馬煩時欲歇客程去未已落日桑柘隂遙村煙火起西歸不遑宿中夜渡京水行次田家溴梁作儲光羲田家俯長道邀我避炎氛當暑日方晝高天無片雲桑間禾黍氣桞下牛羊群野雀棲空屋晨風不復聞前登溴梁坂極望溫原曛集作泉分逆旅方三舍西山猶未分集作曛夜到洛口入黃河前人河洲多青草朝暮增一作滋客愁客愁惜朝暮枉渚暫一作聊停舟中宵大川靜解纜逐歸流浦溆既清曠沿洄非阻修登艫望落月擊楫悲新秋儻遇乘槎客永言星漢游晚次荆一作京江宋昱孤舟大江水水涉無昏曙雨暗迷津時雲生望鄉處漁翁間自樂樵客紛多慮秋色湖上山歸心日邊樹徒稱竹箭美未得楓林趣向夕垂釣還吾從落潮去泊舟盱眙常建泊舟淮水次霜降夕流清夜久潮侵岸天寒月近城平沙依鴈宿候館聽雞鳴鄉國雲霄外誰堪羇旅情九江口作王昌齡漭漭江勢濶雨開潯陽秋驛門是高岸望盡黃蘆洲水與五溪合心期萬里逰明時無棄才謫去隨孤舟鷙鳥立寒木丈夫佩吳鈎何當報君恩却繫風霜頭客廣陵前人樓頭廣陵近九月在南徐秋色明海縣寒煙生里閭夜帆歸楚客昨日渡江書為問易名叟垂綸不見魚山行入涇州前人倦此山路長停驂問賔御坰林往或回集作林巒信回惑白日落何處徙倚望長風滔滔引歸慮微雨隨雲收濛濛傍山去西臨有邊邑北走盡亭戍涇水橫白煙州城隱寒樹所嗟異風俗已自少集作省情趣豈伊戀懷土集作懷土多解物且欣遇集作觸目欣所遇宿灞上寄侍御璵弟前人獨飲灞上亭寒山青門外長雲驟落日桑棗寂已晦古人驅馳者宿此凡幾代佐邑由東南豈不知進退吾宗秉全璞楚得璆琳最茅山就一徵柏署起三載道契非物理神交無留礙知我滄溟心脫略腐儒輩孟冬鑾輿出湯谷羣臣㑹半夜馳道喧五侯擁軒蓋是時燕齊客獻術蓬瀛內甚悅我皇心得與王母對賤臣欲干謁稽首期殞碎吾一作哲弟感我情問易窮否泰良馬足尚踠寶刀光未淬昨聞羽書飛兵氣連朔塞諸將多失律廟堂始追悔安能召書生願得論要害戎夷非草木侵逐使狼狽雖有屠城功亦有降虜輩兵糧如山積恩澤如雨霈羸卒不可興磧地無足愛若用匹夫䇿坐令重圍潰不費黃金資寧求白璧賚明主憂既逺邊事亦可大荷寵務推誠離言深慷慨霜搖直指草燭引明光珮公論日夕阻朝廷蹉跎㑹孤城海門月萬里流光帶不應百尺松空老鍾山靄大梁途中作前人怏怏步長道客行渺無端郊原欲下雪天地稜稜寒當時每酣醉不覺行路難今日無酒錢悽惶向誰嘆途中作前人遊人愁嵗晏早起遵王畿墜葉吹未曉疏林月微微驚禽棲不定寒獸相因依歎此霜露下復聞鴻鴈飛渺然江南意惜與中途違羇旅悲壯髮别離念征衣永圖豈勞止明節期所歸寧厭楚山曲無人長掩扉早過臨淮陶翰夜得三渚風晨過臨淮島潮中海氣白城上楚雲早鱗鱗漁浦帆漭漭蘆洲草川路日浩蕩惄然心如搗但言任倚伏何暇念枯稿范子名屢移蘧公志恆保古人去已久此理誰足道途中口號郭向抱王三朝楚懷書十上秦年年洛陽陌花鳥弄歸人泊震澤口薛據日落草木隂舟徒泊江汜蒼茫萬象開合沓聞風水沿洄值漁翁􅌄窱逢樵子雲開天宇靜月明照萬里早鴈湖上飛晨鐘海邊起獨坐嗟逺逰登岸望長洲寥落星欲盡朣朧氣漸收行藏空自秉智識仍未周伍胥既伏劍范蠡亦乘流歌竟鼓楫去三江多客愁魯郡途中遇徐十八録事時此公學王書嗟别高適誰為嵩潁客遂經鄒魯鄉前臨少昊墟始覺東䝉長獨行豈吾心懷古激中腸聖人久已矣游夏遙相望徘徊野澤間左右多悲傷日出見闕里川平知汶陽弱冠負高節十年思自强終然不得意去去任行藏髙適此詩已見本集及百家詩選中今英華誤作王昌齡詩自淇涉黃河五首前人朝從北岸來泊船河南滸試共野人言深覺農夫苦去秋雖薄熟今夏猶未雨耕耘自劬集作日勤勞租稅兼舄鹵園蔬定詩選作空寥落産業不足數尚有獻芹心無因見明主以下五篇並見集本二兹川方悠悠集作邈雲沙無前後古塔集作堰對河壖長林出淇口獨行非吾意東向集作南日已久憂來誰得知且酌樽中酒三皤皤河濵叟相遇似有恥輟榜聊問之答言盡終始一生雖貧賤九十年未死且喜對兒孫彌慙逺城市結廬黃河曲垂釣長河裏溟漫望雲沙蕭條聽風水所思强飯食永願在鄉里萬事吾不知其心只如此四孟夏桑葉肥濛濛集作濃隂夾長津蠶農有時節田野無間人臨水狎漁商集作樵望山懷隱淪誰能去京洛憔悴對風塵五南登滑臺上却望河淇間行樹夾流水孤村集作城對逺山念兹川路闊羡爾沙鷗間遙憶集作長想别離處獨集作猶無音信還餘干旅客劉長卿搖落暮天逈青楓霜葉稀孤城向水閉獨鳥背人飛渡口月初上鄰家漁未歸鄉心正欲絶何處搗寒衣以下七篇並見集本安州道中經滻水有懷前人征途逢滻水忽似到秦川借問朝天處猶看落日邊映沙晴漾漾出澗夜濺濺欲寄西歸恨微波不可傳松江獨宿前人洞庭初下葉南客不勝愁明月天涯夜青山江上秋一官成白首萬里寄滄洲久被浮名繫能無愧海鷗却歸睦州至七里灘下作前人南歸猶謫宦獨上子陵灘江樹臨州晚沙禽對水寒山開斜照在石淺亂流難惆悵梅花發年年此地看北歸入至德州界偶逢洛陽鄰家李光宰劉長卿生涯心事已蹉蛇舊路依然此重過近北始知黃葉落向南空見白雲多炎洲日日人將老寒渚年年水自波華髮相逢俱若是故園秋草復如何溫湯客舍前人冬狩溫泉嵗欲闌宫城佳氣晚宜看湯熏仗裏千旗暖雪照山邊萬井寒君門獻賦誰相逹客舍無錢輒自安且喜禮闈秦鏡在還集作盡將妍醜赴春官入桂渚次砂牛穴前人扁舟傍歸路日暮瀟湘深湘水清見底楚雲淡無心片帆遵集作落桂渚獨夜依楓林楓林月出猿聲苦桂魄集作渚天寒桂花吐此中無處不堪愁江客相看淚如雨途中曉發崔曙曉霽長風裏勞歌赴逺期雲深一作輕歸海疾月滿下山遲旅望因高盡鄉心遇物悲故林遙不見况在落花時早發交崖山還太室前人東林氣微白寒鳥髙高翔吾亦别一作自兹去北山歸草堂仲冬正三五日月遙相望蕭蕭過頴上朧朧辨少陽春氷生積雪野火出枯桑獨往路難盡窮隂人易傷傷此無依客如何度雪霜一作蒙雨霜早發西山沈頌逰子空有懷賞心杳無路前程數千里乘夜連輕馭繚繞松篠中蒼茫猶未曙遙聞孤村犬暗指人家去疲馬懷澗泉征衣犯霜露喧呼溪鳥驚沙上或騫翥娟娟東岑月照曜獨歸慮衛中作前人衛風愈艷宜春色淇水清泠增暮愁縱使榴花能一醉終須萱草暫忘憂辰陽即事張謂青楓落葉正堪悲黃菊殘花欲待誰水近偏逢寒氣早山深常見日光遲愁中卜命問周易病裏招魂讀楚詞自恨不如湘浦鴈春來即是北歸時邵陵作前人嘗聞虞帝苦憂人秪為蒼生不為身已到一朝辭北極何須五月更南巡昔時文武皆銷鑠今日精靈長寂寞斑竹年來笋自生白蘋春盡花空落遙望零陵見舊丘蒼梧雲起至今愁唯餘帝子千行淚添作瀟湘萬里秋奉和杜相公初發京城作岑參按節辭黃閣登壇戀赤墀銜恩思報主授律逺行師野鵲迎金印郊雲拂畫旗叨陪幕中客敢和出車詩登臨洮赴北庭留别見二百九十九卷岑參晚發五渡前人客厭巴南地鄉憐劔北天江村片雨外野寺夕陽邉芋葉藏山徑蘆花間渚田舟行未可住乘月且須牽巴南舟中夜事一作市前人渡口欲黃昏歸人爭渡喧近鍾清野寺逺火照江村見鴈思鄉信聞猿積淚痕孤舟萬里夜秋月不堪論楚夕旅泊古興前人獨鶴唳江月孤帆凌楚雲秋風冷蕭索蘆荻夜紛紛忽見湘川老欲訪雲中君騏驎息悲鳴愁見豺虎羣赴犍為經龍閣道前人側徑轉一作摶月璧危梁透滄波汗流出鳥道膽碎窺魚窩驟雨暗溪谷歸雲網松蘿屢聞羌兒笛厭聽巴童歌江路險復永夢魂愁更多聖朝幸典郡不敢嫌岷峨早上五盤嶺前人平旦驅駟馬曠然出五盤江回兩岸濶日隱羣峯攢蒼翠烟景曙森沉雲樹寒松踈露孤驛花密藏回灘棧道溪雨滑畬田原草乾此行為知已不覺蜀道難奉和相公發益昌前人相國臨戎發帝京擁旄持節逺橫行朝登劔閣雲隨馬夜一作晚渡巴江雨洗兵山花萬朵垂征蓋川栁千條撥去旌暫别蜀城應計日須知明主待持衡自常州還江隂道中作李嘉祐處處空籬落江村不忍看無人花色慘多雨鳥聲寒黃霸初臨郡陶潜未去集作罷官乘春務征伐誰肯問凋殘以下四篇並見集本南浦渡口前人寂寞橫塘路新篁覆水低東風潮信滿時雨稻粳齊寡婦共租稅漁人逐鼓鼙慙無卓魯術解印謝黔黎至七里灘作前人遷客投于越臨江淚滿衣獨隨流水逺轉覺故人稀萬木迎秋序千峯駐晚暉行舟猶未巳惆悵暮潮歸早秋京口旅泊章侍御寄書相問因以贈之時七夕前人移家避冦逐行舟厭見南徐江水流吳地征徭非舊日秣陵凋弊不宜秋千家閉户無砧杵七夕何人望斗牛秪有同時驄馬客偏題尺牘問窮愁春江晚行錢起斜日片帆隂春風孤客心山來指樵火岸去惜花林海氣蒸雲黑潮聲隔水集作雨深鄉愁不可道集作過草色晚鶯吟晚至華隂皇甫曾臘盡促歸心行人及華隂雲霞仙掌出松柏古祠深野渡水生岸寒川燒隔林溫泉程一作看漸近宫樹晚沉沉晚次淮陽張繼微凉風葉下楚俗轉清間候館臨秋水郊扉掩暮山月明潮漸滿一作近露濕鴈初還浮客了無定萍流淮海間初出徽安門前人洛陽天子縣金谷石家鄉草色侵官道花枝出苑墻書成休逐客賦罷遂為郎貧賤非吾事西逰當自强楓橋夜泊前人月落烏啼霜滿天江楓漁父詩選作江楓漁火對愁眠姑蘇城外寒山寺夜半鍾聲到客船閭門即事前人耕夫召募逐樓船春草青青萬頃田試上吳門窺郡郭清明幾處有新煙歷陽苦雨一作夜雨顧况襄集作哀城秋雨晦楚客不歸心亥市風煙接隋宫草路深離憂翻獨笑用事感浮隂夜夜空階響唯余蚯蚓集作蜻蛚吟下武昌江行下岑陽集作望岑陽司空曙悠悠向楚鄉樊口下岑陽雲隱洲渚暗沙高蘆荻黃漁人共留滯水鳥自喧翔懷土年空盡春風又渺茫望商山路前人南見青山道依然去國時已甘長避地誰料有還期雨霽殘陽薄人愁獨望遲空殘華髮在前事不堪思文苑英華卷二百九十二
