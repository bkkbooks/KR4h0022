body:
  text: 文苑英華卷九百二十五宋李昉等編職官三十三長史一周隴右總管長史贈太子少保豆盧永恩碑一首唐同州長史宇文珽碑一首唐齊州長史裴府君碑一首周隴右總管長史贈太子少保本傳及碑中止云贈少保豆盧公神道碑庾信君諱永恩字某昌黎徒何人本姓慕容燕文明帝皝之後也朝鮮微子之封孤竹伯夷之國漢有四城秦為一侯其先保姓受氏初在栁城之功開國承家始靜遼陽之亂自天市星妖連津兵覆尚書府君改姓豆盧筮仕於魏祖代左右將軍魏文皇帝直寢父長少以雄畧知名不幸早世周朝以公兄弟佐命義存追逺保定二年有詔贈柱國大將軍涪陵郡公是知春雨潤木自葉流根西伯行而疑推存及歿公以山岳精靈星辰秀異氣侔鐘鼎聲感風雲觀於秦兵尚稱童子對於楚戰猶在青衿太祖文皇帝乗時撥亂奄有覇業潁州一作昌従我舊愛無望舂陵故人相知惟有普泰二年闗西建義授殄㓂將軍奉迎大駕賜封新興縣伯邑五百户開新安之郡還移楊僕之闗觧𢎞農之圍更入劉昆之郡援桴併轡並預前驅大統三年有沙苑之戰四年河橋之役介胄蟣虱戎馬生郊公應一作靈變愈長風颷更勇隠若敵國强人意授龍驤將軍中散大夫八年授直寢右親信都督尋轉大都督加通直散騎常侍十六年授使持節車騎大將軍儀同三司魏元年授驃騎大將軍開府儀同三司鄧隲以漢朝親戚始授中台黄權以魏國功臣初登上將公頻煩寵授朝野為榮三周書作二年都督成州諸軍事成州刺史尋加侍中外揔連帥振威百城内叅常伯榮髙八舎于時隴坻黠羌時穿上谷榆中郡賊或聚漁陽公巻甲星馳長驅千騎迴洛兇徒望風草靡𤓰州豪傑束手歸軍後魏元年改封龍支乃抱䍐郡也周書作来縣侯三年朝廷使大將安政公隨突厥一有天子二字吐蕃一作谷渾歸國河鄯二州屬當路首公領騎八千以為戎防南通丹粟西望白蘭闗塞無虞公之勲也周元年授都督鄯州諸軍事鄯州刺史其年改封沃野縣公増邑千户二年授隴右總管府長史武成元年都督利涉汶三州諸軍事利州刺史五千兵破文州陽陣蠻仍平瀘水以保定元年一有遣將兵破巴州恒獌獠度瀘五月葛亮有深入之兵長坂九迴王尊有忠臣之路霜雹不驚水草無乏天幸將軍斯之謂矣其年授司㑹八法斯掌九賦是均事總嵗成功參日要三年還授隴右總管府長史公屢弼英蕃頻相大府北海入朝仰以對問東平謁帝因而定禮遂使馬首懐燕不無樂毅蕃臣擬漢或多因疑作田叔兄楚國公以參和挹讓莊贊樂推建國開都奄荒南服求以先封武陽郡三千户益公沃野之封朝廷以兄弟相讓不無前史推恩分邑有詔許焉増邑并前合四千七周書作五百户既而六氣相犯五聲相觸靈夀不終遊魂且變薨於官舎春秋五十八周書作四十八詔贈少保幽翼定相等五州諸軍事幽州刺史諡曰敬公禮也天和元一作六年二月六日葬於咸陽洪瀆州大夫墓樹以柏諸侯墳高於雉嗚呼哀哉公資忠履孝藴義懐仁直幹百尋澄波千頃留心職事愛玩圖籍官曹案牘未嘗煩委一作擁戎馬交馳不妨餘裕兄弟公侯國朝親戚宜春有湯沐之盛濯龍無流水之機渭南千畝之竹尚懼盈滿咸一作池陽二頃之田常思止足立身則十世可有遺子則一經而已刺史賈逵之碑既生金粟將軍衛青之墓方留石麟乃為銘云朝鮮建國孤竹為君地稱髙栁山名密雲遼陽趙裂武遂秦分寳珪世胄雕戈舊勲名稱賓實言謂身文挺此含璋降兹岐嶽有犯無隠王道正直唯愛唯敬永成恱色枕籍禮闈留連學植左傳作殖策參帷帳功披荆棘韓陣揮戈齊城憑軾豹䇿乃建龍韜同啓校戰岐陽申威隴坻城壘畫地山林聚米上馬諭書臨戎習禮賈復開營㢘公屈禮従容傳㑹占對造請用此㢘平終兹寛猛緑林兵息潢池盗靜名振赤山威髙青嶺𤣥獸浮河飛螟出境災氣出隴毒水侵涇朝傾地鎮夜落台星石壇承祀豐碑頌靈渭城前柏昌陵下庭湏知地市為讀山銘唐同州長史宇文公神道碑楊炯諸侯計功其銘曰仲山甫誡集作誠于百辟大夫稱伐其銘曰正考甫恭于集作於三命所以揚其先祖所以示其子孫上古之初刋於禮樂之言中年以降述於宗廟之祖集作碑文質既殊條流遂廣山河永配金石長存或旌原氏之阡或表滕公之墓觀百林之字者孝㢘之舊業於是乎不愆不忘讀黄鳥之詞者文範之餘風於是乎可久可大公諱珽字救珉河南洛陽人也宇文歸之逺派宇文翰之餘秩龍火集作燭龍晝夜於鍾山集作東山鵬雲南北於溟海自中州圯坼上國崩離魏氏賜集作忘其寳圖齊人弄其神器則天有成命周雖舊邦天下以業重三分昭事上帝武王以功成八百隂隲下民車書混一於域中子弟星羅於海内方於劉澤乃集作即天漢之懿親匹以曹洪即當途之近屬及其集無此字隋室遷鼎重運握符固亦壇社仍存山河不替曽祖顯和後魏將集作冠軍本傳作冠軍將軍朱衣直閣東夏州刺史車騎將軍散騎常侍長廣郡本傳作縣公周贈使持節開府儀同三司延丹綏三州諸軍事延州刺史周書有傳對揚天命保乂王家霍去病初封冠軍周亞夫始為車騎剖符之重任在於六條建國之榮禮髙於五等祖神舉使持節驃騎將軍開府儀同三司京兆尹柱國大將軍并潞肆隋地里志屬鴈門郡石四州十二鎮諸軍并州總管東平郡公贈少保周書有傳材優輔弼業贊雲雷晉則羊祜儀同楚則若集作共敖柱國王章之拜京兆天子聞其直言郭伋之涖并州諸童符其恩信考誼隋文皇帝挽郎皇朝益州青城瀛州清苑二縣令鈎深致逺直道之詞不汲汲於富貴每乾乾於日夕廣都蔣公琰非無社禝之能太邱陳仲弓自有閉門之徳公慶成弧矢氣襲芝蘭州則赤山之精照牽牛於北列集作斗鼎則黄雲之寳入天駟於東方資大孝而立身藴中和以集作而成徳詞參變化稽百代之闕文學富圖書閱三冬之舊史司徒袁粲許之以栝柏豫章處士禰衡目之以椅桐梓漆初任國子生擢第授道王府參軍兼鄭州參軍事横經太學射䇿王庭高陽才子宣慈恵和之譽武公新邑濟河洛潁之間兼攝務殷參卿位重王徽之任達國士行車劉簡之博聞中郎寓直秩滿授遂州司户參軍事天開并洛地洩江源財集作才雄翕習於外區棟宇相望於近甸尹子集作興為政知陸續於賦人黄讜臨官識包咸於數子尋遷絳州翼城令大梁星野少澤封圻城故絳以深其宫都新田以流其惡實惟繁劇載佇循良魯國有司無擅徴之事南陽郡吏罷休沐之娱州府狀聞鄉亭頌徳亦由禮讓之化綿竹於是乎作歌風俗之夷浚儀於是乎刊石稍遷符璽郎尋奉勑檢校鴻臚本官如故環濟要畧掌天子之符璽劉熙釋名表京師之心腹是分麾節式贊王侯國信不差郊迎有序遷尚書職方員外郎夏書禹貢辨其川澤周禮職方明其物土清晨伏奏㡬承題柱之恩閑夜潔齋惟有張燈之宿詔除朝散大夫晉州司馬尋遷長史平陽舊縣姑射靈山玉印仍存瑶城未改習鑿齒之逢宜武三命而踐侍中管公明之謁冀州四見而登别駕詔遷同州長史河西輻輳渭北膏腴秦地之下邦漢京之左輔使君何以為政端右宜其得人江統知賢直言則陳晉阮宣子唐彬集作林薦善通理則汝南王叔度王祥糾合屈公輔之宏材荀羨逸羣杜沖天之勁翮享年六十有五以永淳元年六月二十一日終于華州之别業嗚呼哀哉公元亨利貞文行忠信禮樂之君子儒林之丈夫當在顔冉中求自是風塵外物友于之義伯淮與季江同寢朋従之道鮑叔與管仲推財優游大學之中籍甚平臺之下輜車就烈疑化洽於二同油軾當官政成於半刺道尊徳貴而大位不躋有志無時而天年不永即以其年十月遷窆於鄭縣安樂鄉之西源嗣子某官等詩禮預聞箕裘早學生則盡其養劉殷積粟於七年歿則致其哀唐頌絶漿於九日占白鶴相青烏鄭伯所封有咸林之采地晉侯所輅有河外之城邑其川渭水而玉璜其鎮華山而金石沓習集作習習旟旐紛紜集作紛紛野田范巨卿則素車来哭韓元良集作長則緦麻設位大夫受梁鴻之命終陪烈士之墳妻子従田豫之言竟托神人之墓集作冢嗚呼哀哉銘曰國日東集作有部承家集作家承北平遂荒中縣奄有神京時逢日漙運改天正二王之後三代之英其一惟宗惟祖有典有則大魏將軍隆周相國於穆顯考其儀不忒禮樂宣恩閨門表徳其二五才鍾秀百福與賢蜀都集作郡曽子漢代顔淵公之廣學其積如山公之大辨其流如川其三親則郕霍地居周鄭人物㑹同歌謡鼎盛設官外職天子有命束髪登朝參卿軍集作改政其四江漢之流集作表河汾之都禮優懸榻任重前樞集作驅六璽為貴皇天降符九州為廣益地開圖其五平陽土守下部風俗秦晉閭閻山河軌躅緹油之化海沂之典始聴鷄晨行復驥足其六龜長筮短吉往㐫来賓朋永訣徒御相哀華館無家集作象𤣥堂不開青龍水曲白馬車迴其七漠漠古墓郭門之路槭槭寒桐平林之東天光少日地氣多風凡生物而必死唯君令始而善集作令終其八唐齊州長史裴府君神道碑李迴秀蓋聞仲弓之徳太邱播其英聲休徴之道瑯琊闡其茂績是知利之所博非待殖林而貴名之所遵無假列爵而重若乃地兼崇禄門擅清華邁掲氏之五公冠張侯之七葉森森棟幹聞謝樹之生庭落落瓌竒見韋珠之照乗其於裴府君具之矣公諱希惇字䖍實河東聞喜人也有若顓頊遵昌源於長流有若大費啓洪基於敷土后子保河汾之邑非子據汧渭之封千乗由其克昌三牢疑所以能覇至如司空領袖吏部清通勢壓八王名髙百秩家風祖徳亦何代無其人哉曽祖靜慮世系表作澄字靜慮後魏著作郎諫議大夫散騎常侍金紫光禄大夫汾州刺史諡曰文儀刑雅淡籍甚當時業茂烝鼎功標彛器祖尼後魏給事中奉車都尉通直散騎常侍贈輔國將軍隋州刺史道著巖廊功光朝野屬詞留於騎省追旌彼疑作被於外臺父之隠按世系表希淳乃之爽之子隠乃之爽之兄隋侍御史上儀同三司駕憲二部侍郎扶風河南二郡贊治皇大僕司農二少卿武安郡太守始州刺史通直散騎常侍益州長史㑹稽縣開國男諡曰安望重縉紳榮兼出内寄隆咨岳任切象河八命遵其衮裳五等列於蒲穀公承積慶之繁祉稟中和之正性清光初廸照金玉於靈臺雅量甫成鬱松筠於識宇逺慕先王之道繼通賢哲之徳𢎞止水以待物仰髙山以立身涯涘莫窺宫牆罕測談諧諷席業優學肄然則幽林之芳必薦於三閣井里之寶自運於十城解褐授普安郡丞轉蓬州别駕君山該博屈伏六安之丞仲舉峻清来従譽州之辟方義比徳千載一時除冀州南宫縣令兩河舊殊常之地中冀為絶北之野民俗昌阜政化大行肥野㢘問而識賢孔丘及庭而稱善徙瀛州樂夀縣瀛壖之境風壤所接人民知方不言自理稍遷雍州鄠縣令王畿之地帝京是屬子羽捨困於櫟陽無伯祈星於緱氏㢘能之化復如在昔拜齊州長史歴下咽喉華泉襟帶州將欣其四見王化合於萬里公銓藻品第股肱拜國百姓乂安一變鄒魯奏課連最己申考功之名奉計京師遽有永明之拜既留郡邸遘疾彌留上藥難逢莫觸疑作蠲二豎之害中使罕遇不賭十全之術以永徽元年三月四日終於長安春秋六十三至景龍年中纉戎帝籙禮穆王姬以公嫡孫遷尚主之故乃下制追贈使持節商州諸軍事商州刺史魏后恱平叔之才晉皇貪司空之族寵成外館榮被宗祔惟公豪邁不羣風韻彌邵澄清内英華外發辨㵼言泉韜光於若納之㫖學該書圍晦跡於惟疑之地總六藝之隅奥括百行之樞機質負珪璋門維軒蓋祖孫流譽聚潁川之徳星鄉邑稱髙載平輿之月旦威儀棣棣聲望雅雅猶鄧林之徙植若咸池之疏派公之宰樂夀也既去之後吏人追思美政遂為立碣不其頌歌無間於刊勒榆次紀石止事於身後歴職著聞皆此類焉夫人京兆韋氏贈扶陽郡夫人祖恭故上大將軍隋州刺史建安公父仁基故綿州别駕龍州刺史殷伯兆其綿構楚傳開其茂緒朱紱隆可疑及之暉黄金著經藝之績夫人笄纚式典遵寢門之雅訓匜盥有行叶宜家之縟禮言容孔備國史聿脩堇荁是奉蘋藻無匱加以深悟空寂大闡迦維究隨順理開决擇分六姻景行九族式瞻有婦徳焉有母儀焉以乾封二年十一月二日終岐州司士官第春秋六十七粤以景龍二年十月二十六日合塟於咸陽之北原禮也嘉耦是合未窮絳縣之夀同穴終窆遽開京兆之阡勅萬年縣令盧齊卿監䕶塟事并給帳幕手力羽儀鼔吹仍送至墓所贈授制莽疑率禮加於兹日輕車介士盛儀方於昔年有子六人長曰思進位隋縣令贈蒲州長史大僕卿次曰思約位榮州威逺縣令次曰思禮位宋州穀熟縣令次曰思政太學生次曰醫王位太子僕少曰思温太學生荀氏八龍且知慙徳東莱千里不足方駕懐仁服義海内所推曳組簮纓朝中歸美並父従運惟未及卜宅風煙銷歇霜露霑濡嫡孫選鴻臚卿駙馬都尉上柱國魏郡開國公行極天經才為世出門題金榜家振玉簫雕軒繡轂結徹於平陽之第青巾紫綬交錯於沁水之園當年之盛如此永慕之心如彼夫計功稱伐里藹於舊聞勒銘刊頌義炳乎来裔豈可使恂櫟靡述衞鼎無聲爰訪世親俾叙鴻烈其詞云惟霍之鎮積玉含章彼汾之水神鼎敲光豈獨靈異亦誕賢良培風直上籋影髙驤家聲祖徳川流岳峙家聲伊何載於國史祖徳伊何冠乎人紀翕習交映芬芳不已公之生也克壯其猷勝衣志立弱嵗名遒華如琬琰絶代莫儔郁若蘭蕙亦孔之休如登之堂月將日就詞髙文苑理窮辨囿研味風騷掎摭科籒一日千里一年三秀筮仕之班應務陟歴為邑累諫列郡成績忘其忮求晦兹矯敵令聞令望知柔知錫疑作如金如錫蔵舟易失傳薪不停未聞九轉俄愴百齡功著口實徳範明經安仁願誄子玉思銘黑水西流黄山東出季武成寢滕公見日煙隧蒼茫風柏蕭瑟人世雖謝徳音可述文苑英華卷九百二十五
