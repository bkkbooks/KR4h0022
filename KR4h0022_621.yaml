body:
  text: 文苑英華卷六百二十二宋李昉等編上封事論時事表一首直諫表一首進封章表一首上封事表一首獻事表一首論諫職表一首論時事表唐髙祖李綱臣綱言臣伏見武德五年之後四海初定陛下自負太平日就驕侈傷於酒德稍怠萬機専與幸臣旦夕遊宴所重唯聲樂所愛唯鷹犬夷夏進送道路不絶又斥辱功臣多所輕侮或發其微時細過或加捶撻於殿庭德澤漸虧下將疑懼而戚藩公主皆踰憲式嬪緩之家多違法度不加禁止頗有侵漁行路之間非無喧籍又皇太子令及秦齊二教共詔勑並行唯計日之先後州郡之職無所的從授官分賞在意所欲不復論功伐簡才行矣加以每嵗秋冬田遊無度王公妃主雜揉其間或時逢考選皆在原野至於歷時不返京邑略無居人億兆失望陰懷歎息朝之綱紀漸以弛紊而陛下不悟政教日頽在內不許論事當朝略無諫者愚臣竊懷栗畏誠有危亡之慮臣不敢不盡言伏待刑憲直諫表代宗獨孤及臣及言伏見陛下屢發德音招延獻納使左右侍臣得直言極諫忠謇者無不聽犯計者無不容又辛丑唐書作壬辰詔書詔裴冕崔渙等十有三人並集賢殿侍制以備詢事考言之問此五帝之盛德也而臣以目睹生則幸矣然頃者陛下雖容其直而不録其言進匭上封者大抵皆事寢不報書留不下但有容諫之名竟無聽諫之實遂死諫者稍稍自省集作引鉗口就列飽食偷安相招為祿仕此忠鯁之士所以竊歎而臣亦耻之也十室之邑必有忠信如孔丘者况以朝廷之大卿大夫之衆而陛下選授之精與假令不能如文王之多士堯舜之比屋其中豈不有溫故知新可使懋陳政要而億則屢中者乎陛下惟虛存其議令條奏不曠及議政之際曽不採其一説堯之疇咨禹之昌言豈若是耶昔堯設謗木於五逹之衢孔子亦曰以能問於不能以多問於寡又曰丘也幸茍有過人必知之然則多聞闕疑不耻下問聖人之心也臣不勝大願願陛下誠以堯孔之心為心日降清問啓其𢎞説其不可者罷之可者議之於朝與執事者共之使知之必言言之必行行之必公則君臣無私論朝廷無私事天下無私政陛下以此辨可否於獻替而建太平之基可也况國體乎自師興不息十年矣百姓之生産空於杼軸擁兵者第館亘街陌奴婢厭酒肉而貧人羸餓就役刻剝及膚長安城中白晝稚剽京兆尹不敢詰加以官亂職廢將惰卒暴百揆隳刺如紛麻沸粥百姓不敢訴於有司有司不敢聞於天聽士庶茹毒飲痛窮而無告今其心顒顒獨恃於麥麥不登則易子咬骨可跂而待眠於焚薪之上其危如此陛下不以此時軫薄氷朽索之念厲精更始思所以救之之術忍令宗廟有纍卵之危萬姓悼心而失圖臣實懼焉去年十二月丁巳夜中星隕如雨昨者清明降霜三月苦熱寒暑氣候錯綜顛倒沴莫大焉豈下陵上替怨讟之氣熖以取之耶不然天意之丁寧告戒以此警陛下陛下宜反躬罪已旁求賢良而師友之黜棄貪佞不肖而竊位者詔去天下所疾苦廢無用之官罷不急之費禁止暴兵節用愛人罔使宦官亂國政佞言敗厥度兢兢乾乾以徼福于上下必能使天神感而地祗應反妖災以為嘉氣彼太戊桑榖宋景熒惑焉足為陛下道哉臣昨陳奏請減江淮山南等諸道等兵馬以贍國用陛下初不以臣言為愚妄許當施行然及今日未有霈然之詔臣竊遲之今天下惟朔方隴西有吐蕃僕固之虞邠涇鳳翔等兵足以當之矣自此而往南洎海東至番禺西至巴蜀萬里無鼠竊之盜已積嵗矣而兵不為之解傾天下之貨竭天下之榖以給不用之兵而為無端之費臣不知其故假令居安慮危用唐書作以備不虞自可於厄害集作要之地少置屯禦餘悉休之以其糧儲扉屨之資充疲人貢賦嵗可以減國賦之半陛下豈持集作遲疑於改作逡巡於舊貫使大議有所壅而兵卒集作率土之患日甚一日是益其弊而厚其疾也臣竊惑焉夫療癰者必決之使潰今兵之為患猶癰也不以漸戢之其害滋大大而圖之必力倍而功寡豈周易不俟終日之義歟伏惟圖其始而要其終天下幸甚臣無任懇欵之至進封章表齊映臣某言臣聞恩之重者非命可酬誠之切者無言以代但無以非命又無以可伸臣某中謝臣又聞君親之恩天地之理在臣所感異於常恩臣於廣德二年曽授徐州一尉既不赴任即同無官建中之初便荷聖澤自此纍擢以至台司此臣所感異於常恩一也聖朝特重史官宰臣先獲兼授况臣不逮忽竊殊私此臣所感異於常恩二也敢言守直實稟至愚是以凡所歷官必遭飛謗慈母有投杼之惑古人著竊鐵之疑臣獨何人纍蒙聖察此臣所感異於常恩三也但夙多羸疾今迫衰齡常恐殊恩未酬朝露溘盡負天愧地不知所云臣某中謝臣又聞西晉山濤之事君每有所知必有密奏晉代謂之山公啓事實若令之榜也意在臣展盡忠之道君擇可採而行使政自上施言無外見但以臣性本庸淺識又暗劣每有聞見莫辨是非若合陳不陳懼乖耳目之任不合奏妄奏則當塵瀆之辜是積慙惶函歷星嵗竟未能舉一賢以自代興一利以上陳冒寵偷安其罪至重更以臣除官制云爾其竭誠啓沃以廣視聽故臣得以盡其管見塵浼天聽謹别録狀同進以聞無任兢惶戰汗之至上封事表李渤臣渤言臣伏見今月一日赦聞中外僚例應有策略可濟時者悉許上陳無有所隱臣竊以陛下登極已來擢自巖野者惟一人而已臣感殊奬不合私身身既不私豈宜愛死若臣者得死於義則榮於生逺矣以元和九年十二月二十六日奏平賊三術並皆請不捨元濟其上是感其次是守其下是戰又言感不成不失為守守不成不失為戰此求廟戰為陛下萬全之謀也其直言必戰者是見無禮於君如鷹鸇之逐鳥雀奮不顧身真陛下義勇之臣也昔漢代先零羌反趙充國守屯田辛武賢請討襲宣帝兩行之雖各成本功豈如陛下雄邁獨斷竟斬滅凶虜則微臣前者上言為國之道也今掃清淮西是陛下之聖也社稷之福也臣獨不勝懇欵願朝廷增修德政以享外寧之功輒復自忘幽朴逺獻芻言冀以塵露少禆海嶽竊以陛下天縱生知又嗜學不倦故臣敢依托經史敷陳下情特乞聖慈容其迂繁曲賜終覽則疏退小臣死骨不朽矣臣某中謝臣昔負薪偷暇讀書至周禮見春官外史掌三皇五帝之書即楚靈王所謂三墳五典是也書敘又云三墳言大道也五典言常道也然則三五之君君之至者矣臣曽學易見三皇之道加之以書見五帝之德加之以詩禮見三王之仁加之以春秋見五霸之義尋戰國䇿極於隋史見沿代得失參以百家統以九流又遺其繁華托其精實收視黜聽順其所自故遊涉中理也髣佛三皇之化自冥於天天法道者不疾而速不行而至範圍天地曲成萬物易稱先天而天不違又云鼓萬物不與聖人同憂是三皇在上至朴未散天下大同無思無為逍遙而已五帝之教自冥於地則天者其德廣運乃聖乃神乃武乃文書曰天聰明自我民聰明天明畏自我民明威孔子曰唯天為大唯堯則之是也五帝在上惟精惟一允執厥中百姓不知其德至矣三王之政自冥於仁仁效地者不識不知無思不服本以六德六行文以五禮六樂孔子曰以仁治人又曰克已復禮天下歸仁焉是也三王在上上仁下義仁義相感天下太和故行葦天保之詩作成康襲政刑措四十年至于五霸力義統盟功過糅駮傷壞王猷秦政賊隳周法剗去井田殘蝕六國知及之仁不能守之故二世唐諱而亡漢髙帝寬仁大度與人同利任能使善聽納竟甸萬國孔子曰其或繼周者雖百世可知也彼蕭曹輩生於秦長於秦習於秦惑於秦不盡刷秦惡特見制度與夫三代聮輝此其未至也然皆根於忠朴與清靜其世唐諱一作上疑代長久者亦在此文帝躬約素德罷構露臺却千里馬熙然與刑措無異賈誼尚以為皇號甚美論德不稱豈非兼以造程裁範未抵大中歟景武昭宣亦各有美皆以樂賢從諫風流無窮元成哀平過有輕重皆以黜賢嬖佞稔疊亡國光武皇帝躍白水乘舊德賊莽百萬且潰且溺又平赤眉銅馬隴蜀諸冦非項氏等夷其佐命與三傑亦異校其武蹤功次髙祖若乃稽古宅周勳臣壽儒學光教化浹洽躬踐治平自牧以謙自勤以勞兢兢若不及過矣無次也明帝孝思敦九族旰食以逹幽枉無幸私無矜色章帝性仁厚行春令健胎養法賦貧人以苑地和帝抑符瑞省貢獻有明章餘風皆洛都之令主自殤以下不足徵也桓靈不道羣醜侵政誅滅賢俊流毒蒸人鬻官於朝列肆於內羣盜大起腥聞在上赤帝之祚其亡也忽焉蜀先主任託孔明有仁人風烈魏文帝席父業擅妄大言輕議舜禹摧末疏本其昏塞劇矣然災眚罪已罷劾三公終制省薄亦足稱也此外無他勝略繼以荒胤鄰豪敵臣姦雄延數代而亡實為幸矣晉武承三葉權力通一淮海焚怪服讓泥金容劉毅直辭輝光靄然違欽言嶠議使黼衣左袵數百年華風不振者罪杇疑矣南北分朝質文術背造邦者挺雄才騁竒算約之以勤儉必有憂吕之功焉殘國者皆淫逸其心猜毒溺私移之以務禽奢奔必有失鮌之敗焉嗣主善惡紊駮三者擬諸二漢凶或逾之美不及者也大槩吳風巧其失也浮虜俗愚其失也鄙滯名不勝質故陳滅於隋昔漢世唐諱祖帝隴蜀更詔以書貴服其心耻以虛為勝也何以造以疑島夷索虜相濟得不愧顔於讓畔通樂乎自隋沒唐祚十一帝頒春嚮二百年矣革土垂號亞姬敵劉但房杜病同蕭曹祖述秦漢憲章周隋使周邵得擅美於前代者龜玉毁於櫝中矣乃玄宗中興崇敏璟直敏未逹直不深皆輔理名才不宜責以經國也李林甫元載媚君以佞諛迷君以嗜好引同誅異封其邪志致逆羯啓釁燎原不滅者非二子而誰異代同愆共汙三紀遂使朝多忌諱俗尚茍容波驚雲撓蕩動未息易曰通其變使人不倦神而化之使民宜之窮則變變則通通則久自天祐之吉無不利竊聞至德以來天下常思太平君臣之心非不懇切迄于今來未稱者是人倦而不知變雖君儕堯禹臣越伊周詔如尚書典誥日下既不行之行之亦何由得通且久乎易曰化而裁之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎德行天祚聖唐以變通之數遺陛下順而革之則悠久大歷必自此而更始矣臣觀前代嗣帝功未有如陛下今日之盛也宜乘今戳淮冦之勢以德制恆兖則恩威兼暢矣恩威兼暢而又加之以捨小過舉賢才則陛下雖欲讓太平之勳美臣知必不得明矣伏望廓開聖德以撥亂意自兼劇奏滅政志於炎昊間再造鴻業與天地惟新馳之於無窮昔舜禹以匹夫宅四海其烈如彼今聖代以五朝營太平其難如此臣又竊聞之陛下使工伎必能是不欲其兩傷也如此推而進之則建皇極致雍熙如指諸掌乎臣疑宰相公卿藴其略但啓沃之次第未及使陛下翹思文武凝望殷湯主憂臣辱孰不憤歎今陛下蹈道據德安仁存義則三皇五帝三王五霸之美兼矣與人同利從諫如流尚約素斥珍竒則漢髙孝文之美兼矣尊儒學兢兢若不及幽枉必逹無幸私無矜色則光武孝明之美兼矣任託不惑容受直言則蜀先主晉武之美兼矣約以髙祖太宗之善訓貫以陛下之明聖總萃前美混論消息融而為至德發而為玄化以王道為尺以大中為刀度時之宜裁酌古今引知蕩寃驅末還本正六官敘九疇舉王制於月令調兵食崇孝弟敦九族闢諌路顯儒學退文華黜選舉復俊造定四人省道釋明刑以行令理兵以禦戎然後經之以禮樂緯之以道德推誠信以化之播風雅以暢之坐明堂登靈臺休息乎祥氣之間陛下襲羲軒於上公卿儕稷契於中黎元歡鼓腹於下挹甘露潄醴泉禽畜四靈不為難矣臣愚寡聞不識逺大伏望下宰相公卿大夫議之如瞽言可採伏乞搜巖封野博引海內巨儒耆德玄識明斷之士大開學館與朝賢參講令其稽古應時據經更俗仍使切磋周洽復出精義重作制度使合乎宣父繼周之旨夫正氣振彼承家鼠冦戎狄裔夷若稿業迎霜輕氷涉暑瞥然已去間然已亡固不足塵於聖慮矣今臣謹竭管見獻五事如後是非疏密懸在天鑒蕞爾昏塞何能自分若乃沿革次第時政所切伏計宰輔必已詳奏亦不敢更言臣今幸生聖代又曽謬處諫垣逢中興將啓之期知太平必成之術實懼不言為罪也狂瞽微臣不勝感恩中憤之過謹勒祗承人某奉表披露丹懇以聞臣渤誠惶誠恐獻事表憲宗元稹元和元年臣稹言臣聞理亂之始各有萌象二者無門在君上啓之而已所謂萌象豈有他哉容直言廣視聽躬親集作勤庶務委信大臣使左右近習者不敢唐書作得蔽疏逺之臣庶此理之象也此而不理萬無一焉大臣不親直言不進抵忌諱者殺犯左右者刑與一二近習者決事於深宫之中羣臣莫得參預籌畫此亂之萌也此而不亂亦萬無一焉是以古者人君即位之始萌象未見之時必有狂直敢言之士抵忌諱獻危言在上者茍或宥而容之激而進之則天下之君子望風而恱曰彼狂而猶容於上上之人其欲來天下之士乎吾之道可以行矣其小人擇唐書作竦利而言曰彼之直可以得幸於上吾將以直言集作直言以徼利可也由是天下之賢與不肖各以所忠貢言於上下之志霈然而通得失之情幽逺必逹合天下之智理萬物之心人人樂得其所戴其上如赤子之親慈母也雖欲誘之為亂其可得乎臣故曰容直言廣視聽而不理者萬無一焉及夫進計者入而不出直言者戮而不容則天下之君子自謀於心曰與其言且不用而身為戮吾寧危行言遜以保其終乎其小人擇利而喜曰君之所惡者拂心逆耳之言也吾將茍順是非以幸集作事之可也由是進見之者隔集作革而不納言事者寢而不聞若此則十步之事不得見也朝廷之事集作情不得聞也而況於天下之大四方之逺乎故曰聾瞽之君非無耳目也蓋在集作任左右前後者屏蔽之不使視聽耳此而不亂其可得乎集作哉昔太宗文皇帝初即位時天下之人莫有諫者唯孫伏伽嘗以小事持諌於上文皇帝大恱厚賜田宅以勉之自是言者唯懼乎言不直諌不極不能激文皇之盛意曽不以觸龍鱗犯忌諱為不可矣於是房杜王魏之徒議可否於前天下四方之人言得失於外不三四集作四三年而天下大理豈文皇獨運聰明於上哉蓋亦羣下各盡其忠言以揚宣發暢於天下也且夫樂安全而惡戮辱古今之情一也豈獨貞觀之人輕犯忌諱而不惡戮辱哉蓋文皇激而進之之切集作功也喜順從而怒謇犯亦古今之情一也豈獨文皇甘逆耳而怒從心哉蓋以順從之利輕而危亡之禍大無窮之業重而奉已之事微思為子孫垂不朽建永安之計也為後嗣者豈集作其可順一朝之意而輕用二字唐書作篾文皇之天下乎纍聖傳序於今垂二百年矣莫不率由斯道致俗和平况陛下以上聖之資紹復前統即位之日天下惟新罪叔文之徒而凶邪之黨散縣惠琳之首而悖亂之氣清集作消發承光之詐而假威之孽除反焦陂之田而蒸庶之情感其餘滌瑕緩死薄賦恤人賜帛耆年旌閭孝弟修廢學建義倉莫不曲被殊私覃於集作于有截斯皆陛下上法堯舜近法太宗致理之萌形見者數十豈臣庸劣一二而能明然而臣竊復孜孜蚩蚩集作咄咄有所未決者獨以陛下即位以來既周嵗矣百辟卿士至于天下四方之人曽未有獻一計進一言受陛下伏伽之賞者左右前後拾遺補闕亦未有奏一封執一諌受陛下激而進之之勸者設諌鼓置匭函曽未聞雪一寃決一事明陛下無幽不燭集作察之意者若臣等備位諌列名為供奉官曠日彌年不得召見每就位屏氣鞠躬不敢仰視又安暇議得失獻可否哉供奉官尚爾又況於疏逺之臣庶雖有特逹不羣之智思欲自效其路何階遂使凡今之人以諌鼓匭函為虛器謂拾遺補闕為冗員臣竊思之以陛下之睿博𢎞深勵精求理豈或入而不言出而不用哉蓋羣下因循不能有所發明之罪也且臣思之今之備召見承顧問者獨一二執政而已每一對揚不及俄頃之間議天下之事臣竊料之恭承聖問仰謝寵光之不暇又安得集作暇陳理亂議教化哉其餘瑣瑣有司或時一召者集作見言簿書之出入計錢榖之登降不暇又安足致齒牙間臣竊惟陛下以受集作景命維新之初何如貞觀致理之後以房杜王魏匡輔之智而猶上封進計者荐至獻可替否者日聞今陛下當致理之初在四方多虞之日然而言事進計者終嵗無一人豈非羣臣集作下因循竊位之罪乎若臣某者稟性駑鈍昧然無識然以當陛下臨御之始首陛下䇿賢之科擢授諌司恩萬恆品若復默默與在位者處則臣莫大之罪亦萬於恆品矣輒將集作貢冒昧殊死伴奏十事於後一曰教太子以崇唐書作正邦本二曰任唐書作封諸王以固磐石三曰出宫人以消水旱之災集無此二字四曰嫁諸唐書作宗女以遂人倫五曰無時召宰相以講庶政六曰序次對百辟以廣聰明七曰復正衙奏事以示躬親八曰許方幅紏彈以懾姦佞九曰禁非時貢獻以絶誅求十曰省出入畋遊以防銜蹶凡此十者設使言之而是是而見納集作用非臣之福也天下之福也苟或言之而非非而見罪乃臣之分也亦臣之願也無任懇悃奮激效節愛時之至謹詣東上閣門奏表并事件以聞臣稹誠惶誠恐頓首頓首罪死罪死謹言論諫職表憲宗臣某言臣聞先王之制祿也居其位不行其職者誅是以上無虛受下不隱情臣竊觀今時集作之備位素餐不行其職者莫過於臣輩臣聞太宗文皇帝時以王圭魏徵為諌官文皇雖宴遊寢食之間王魏實在其所用至於文皇發一言則王魏詳之而後出舉一事則王魏慮之而後行以文皇之明合王魏之智是以舉無遺事言有典常文皇猶以為視聽未廣也因許集作命三品以上入議軍國必遣諌官一人一作員隨入以參驗之當是之時耳目股肱之任者有君臣之義焉有父母之恩焉有朋友之歡焉是否無不替可無不行不四三年而天下大理蠻夷君長帶刀入侍者不可勝計豈干戈征伐之所致蓋壅蔽之患銷而幽逺之情逹也若此然後可以稱天子之爭臣矣近之司諌爭者則不然大不得備召見次不得參時政排行就列纍纍集作纍纍而已且臣聞之諫臣集作官之職曰左右前後拾遺補闕大則廷議小則上封近年以來正衙不奏事庶臣集作官罷廷對若此則不見遺闕補拾何階不得敷陳廷議安設其所謂舉諫職者唯獨誥令有不便除授有不當則奏一封執一見而已以此集作臣思之君臣之際論列是非諷諭未形籌畫於至密尚不能回至尊之盛意備讒慝之巧言而況於既行之誥令已命之除授然後執集作奏一封奏集作執一見而私欲收絲綸之詔回日月之光信無裨於萬一矣至使凡今之人以上封進計為妄動拾遺補闕為冗員此稱供奉官與王圭魏徵為等列臣雖至愚能不自愧且陛下若以為臣等無所裨補不足參侍從固不當假以名器無立集作立之於朝苟以為務廣聰明稍問集作關理道又不宜集作當屏棄疏賤之使至於此伏願陛下許臣於延英候對召臣一見賜以溫顔使臣得盡愚懇之誠備陳諫官之職苟或言有所集作可採得禆陛下萬分之一是臣千載之一時也如或言不詣理塵黷聖聰則臣自置刑書以謝謬官之罪亦臣之所集作以字甘心也無任懇欵發憤守集作效職忘軀之至謹詣上東閣門奉表以聞文苑英華卷六百二十二
