body:
  text: 文苑英華卷五百二十七宋李昉等編田稅溝渠門十八道什一稅功臣判一道受田兼種五菜判五道為吏私田不善判一道稅千畝竹判三道徴什一稅判三道無夫修堤堰判四道修河堤不溉田判一道什一稅功臣判得京兆府行什一稅功臣不伏云賞地無國征對盧士瞻禹貢三壤周頌九賦此為古制實曰有經且四方無虞法宜仍舊三邉有備正可隨時瞻彼咸京是為上國擁山川之固護百二稱雄開井邑之災畬什一編稅將期倉庾流衍斯箱發詠於詩人軍國豐盈盍徹見遵於有若功臣何者曽不是思忘雨露之鴻恩有違上命矜爪牙以怙寵無入國征同彼宋人不修職貢類茲楚子闕薦包茅罰可置於刑書訟何聽於詭説受田兼種五菜判丁受田兼種五菜吏稅之丁云在外田稼不善詣郡科吏吏固執合稅久莫能決亷察使按郡守令不行對平伾度土有衆務農理國人力是借公田為居既八家而共資亦五菜而云取惟丁率常由已不遷見異守質抱甕將類漢隂之夫間居鬻蔬未減河陽之令相維彼吏而乃弗經既忘過籍之非將為履畝之稅是同大桀宜刺小東且私田於人餘力豈讓吏之不恤稼乃無戒失官之譴已彰稅人之理徒執季孫苟賦周典聞仲尼之言宣公不仁魯史有穀梁之議吏而多僻守可論刑不能蒞官何逃使按同前平超然擇土制邑度地居民唐諱是分公私爰制內外食九食五一作外食內食制稱上下之農逺郊近郊師有異同之賦彼丁何者實曰田夫四體初勤五菜云樹既緑葵而白薤亦秋韭而冬菁但類潘仁用供朝夕之費同夫揚惲取給公上之求公田為居履畝非古考龔遂之政計口而畦讀穀梁之書損廬以種稼則不善吏固應科既匪一作匪經大猷爰彰薄訴籍而不稅雖固執而奚為分而無成於從政乎何有亷使所按誰曰不然同前熊季成度土居民唐諱使有寧宇省徭薄賦期於利物政之善者傳不云乎惟丁計畝受田奉時供上周公之典斯在穀梁之志可徴且同居八家並種五菜取其蔥薤既云救乏賙無樹以楸桑誠得養生送死人苟利矣吾無間然此夫伊何多求是務不遵有若之盍徹徒事冉求之聚斂况廬舍自損田園將蕪勤私自可以非人率禮無聞於稅畝迷而不復過也必文以虧郡守之明宜允使司之舉同前李黃中王者域人是制廬井丁之受地用給公私以耕以耘窮筋力於嵗月是藨是蓘慘容鬢於風霜猶旨蓄以禦冬慮艱食而為饉漢隂抱甕殆欲忘懷於陵灌園庶乎自適雖屋粟興稅園廛有征而田畯急民唐諱已闕三時之務誠邦家有賦焉取五菜之供恐非民唐諱之未宜將責吏之為當還同履畝郡令誰可封行請效埋輪廉使即當隼擊同前李夷吾五土異宜三農是務井田肇啓稅畝斯均非無沃塉之差實為封疆之異顧惟田畯職在主農徴收雖合以時役使宜遵常典安得不供所職有紊彞章將奪三時之功用此八家之力俾務農之士東作愆期使擊壤之夫西成何望必公田不善即過在夫人私稼靡登乃罪招於吏眷言丁訴理或有憑審聽吏詞義將未可今者百城滯訟八使舉繩曠官之責自貽不法之名斯在為吏私田不善判丙為吏公田善私田不善或以議課不齊辭云非吏之罪對康元懷阜俗敦本長財飭力三時展務九扈分官自公田而及私田俾我疆而豐我理千箱起詠佇美於詩人四體既勤孰慙於夫子當勤氓而有典奚議課以不齊丙也伊何職茲為吏任農均力未恤於人言徇公害私旋招於物議事頗彰於妨奪法難逭於科繩考魯宣之舊章有同大桀徴穀梁之前志須用小懲宜祥刑於士師盍歸罪於田畯稅千畝竹判乙家於渭川有竹千畝京兆府什一稅之云非九穀對姚齊梧度田居民唐諱因地制賦出不過籍汔可小康貢之無藝是稱大桀相維乙也業乃齊民唐諱營營四時頗聞潤屋青青千畝自比封君京兆以任切都城事繁供億主家戚里無聞萩漢貨殖傳河濟千樹萩乃梓也後世謂萩為蕭蒿恐合作楸集韻楸萩通用英華作荻非竹之奢比屋編氓何擅渭川之富俾其什一而稅均夫播植之家事雖合權道恐非古必也稅同里布征異漆林自可責以所宜誅其入觀二字疑九土之法賦不同科四人之事業乃殊等今乃責非其有出不以地僕雖無似竊亦有疑同前李崟專欲召災藴利嗇禍克勤於儉庶曰式臧乙志在垂竿居於渭涘師計然之術恥回也之貧侈埒封君竹已遍於千畝富同季氏田不播於九穀遂使檀欒之質請擅利於膏腴耘耔之功不服勤於錢鎛府司登夫衆寡均彼有無爰度百夫之田用收什一之稅誠謂薄賦輕斂人無桀貊之謡缶米稯禾國盈流衍之積自可貢其藝極弗犯有司豈得莠爾煩言以成無妄曽謂鬻貨不如𨽻農同前衛俌生民唐諱異業近郊制賦以物地事將均土法惟乙何人卜居渭汭臨川垂釣未坐太公之茅緑葉翠莖且多子猷之竹况梢雲千畝栖鳯五毛豈是齊魯之桑還同漢蜀之漆頗為潤屋咸曰比侯京兆救時什一之稅奚爽乙之無理九穀之訴何為徴什一稅判長安縣徴什一稅百姓訴云取已過半人將不農縣官云恐國用不足對髙果眷彼長安是稱輦轂詢於百姓賦彼三農倘儲廪之未供在畎畝而攸給稽諸魯史什一稅而可徴詠彼魏風三百㕓而斯取是為盍徹未抵彞倫雖過半有詞且悲杼柚而官惟恤隱冝窒盈庭如或水旱不時藨蓘無取嵗莫資於稼穡人必慮其流亡則徹田為糧盡輸王府而賑廪同食猶餼疲人將循古而知方亦從權而未爽同前莊若訥秦雍皇居田疇為上若年有豐耗稅則等差相彼老農聿求多稼勤其四體庶彼千倉必也如京如坻無廢周公之典然而不足與足何耻魯侯之問縣司雖守文不替訴者亦舉直難違豆區之量必均過半之詞自息同前房説務農重穀徹田為糧布教頒常示人以信不足於二且異魯侯拾而糴三非如漢吏况決渠降雨神臯奧區既稱百二之雄何辭什一之稅殊大桀而小桀且如茨而如梁杼軸其空則吾豈敢膏腴兼倍於爾何傷徒誶語以無稽須甘心而受諜抵欺赤縣曽是迷愚家財若不助邉軍實如何取給訴云過半誠為罔上之人又曰不農恐涉要君之責載翕其舌無厚爾顔無夫修隄堰判河南諸州申無夫修理隄堰請與之平價仍免外徭省司以為與平價則官無所供免外徭則公事廢闕不之許州訴人實阻飢恐不及冬成至春復桃花水為害對元承先備預不虞古來善䇿隨事興理今亦宜然於廓長河邈界中國來萬里之外歷數州之間榮光載浮竹箭長下千里作曲呈瑞馬以出圖三日成霖或迷牛而為害永言諸郡夾河之壖堯水屢逄媧灰未正疑作當止淮南子女媧積蘆灰以止淫水俾太守沉馬空竭精誠將軍負薪猶勞太息則必土功展事金堤爰起匪用齊人之力孰免為魚之歎恭聞漢事以蠲六月之徭大哉聖朝實平百姓之價公家之事知無不為苟利於人胡為不可省司所見未窒盈庭之辭州訴宜從可塞如川之口同前郭尚溫使人以時不奪農務前王令典歷代通規頃屬月離畢星天作霖雨緣河諸郡水害方殷王尊之祭徒誠陽侯之怒無息是隳堤堰乃請修營動衆興功雖不違於九月免徭酬直或大優於百姓握蘭則兩停俱廢恐未得於隨時剖竹則二事兼全一作行亦頗同於太過况頻遭墊溺人實阻飢若不冬成必貽春慮理須折𠂻事遣合宜則丞相無壞陂之尤將軍免負薪之苦同前劉閏邦寧本固書稱經理之方慮始樂成昜著變通之義且河分南北境控青徐壤雜下田土為上賦荐逄堯水乍闕殷儲感發於中思索其極順時令庀工徒版築爰興堤防互設崛然特起同斷岸之孤標的爾殊形狀屯田一作雲之錯峙期於永逸汔用小康望免外徭式酬平價州將當撫循之寄顧瞻黔黎省司應出納之權愛存府庫俱為奉國咸是循公探源君混其淄澠究理頗别於涇渭何則雖言營造本資其井田徒謂繕修未起於桑梓力常有限徭或可蠲役靡踰時價無冝給是則上省勞費人忘阻飢無闕於農不愆於素縱使堤踈瓠子不復興歌浪起桃花誰能為害同前孟楚瓊五材並用水德靈長八卦裁成坎宫流潤銀河有飄查之浪金堤苦懸米之憂漢書以溝洫興謡史記乃河渠發詠疏導得理編氓以寧眷彼諸州是稱修葺堤堰縱橫瓠子須切黎人阻飢匏瓜莫食逺由蘭署庶救梅林何髙見之不同而平價之無給夫則非人莫可人則非食罔存數日暫勞猶宜不許纍旬重役焉可闕如官供尚且云無私備奚能取濟况國家無事主是唐堯河內有倉吏非汲黯但使凖格興役何必申省拘文公課自有常程令式寧無舊例免徭請價義竊惑焉修河堤不溉田判乙主河隄郡守詰其不以溉田詞云亦有以據對唐南華長河千里聖主一清漢帝宣防猶負薪於瓠子王尊東郡尚堅立以安人所以河公不仁時聞泛濫主司有事每見堤防蓋却略於石門亦摧殺其水怒傅以客土將全其邑居聚之淇竹實拯以昏墊常流不弛於正道泗野寧浮於齧桑諒巡植之為功奚褰帷而見詰必人同鄭白食我京師或且溉而有餘何屯膏而不作均夫鄴令招不智於漳河異彼武安頓遺利於鄃邑良能沃野義在隨時請據河渠之書無忘溝洫之志文苑英華卷五百二十七
