body:
  text: 文苑英華卷一百四十宋李昉等編蟲魚二南有嘉魚賦二首羡魚賦二首結網求魚賦一首巨鼇冠靈山賦一首黿鼉為梁賦一首釣鼇賦一首寅月釁龜賦一首蜃樓賦一首蚌鷸相持賦一首水母目蝦賦一首南有嘉魚賦以樂得賢者次用韻楊諫后非賢不乂魚非水不託賢豈晦以養䝉魚在藻而自樂故比事思理以徵以求如南有嘉魚是網是繳此所謂旌别淑慝愛人治國為鹽梅之器用作生靈之表則不然豈延故老於終南收釣翁於渭北張皇勳業者棄此曾未得我國家憂勞庶績寤寐求賢且束帛戔戔每布之於寰海豈矰笱罩罩獨蒸然於巨川吳坂不遺於騏驥丙穴載詠於鱏鱣詩人格言必將興之於王國老氏遺戒不可脫之於重泉所謂持竿執柄者未容易焉爰有深沉參對純嘏雖臨矰以及繳苟未髙於天下徒噞喁於香餌終夷猶於取捨儻鼎味之見珍井殺身於庖者第二同前韻李䝉惟帝王之應運孰無賢而能作雖道洽於唐虞尚翹翹於林壑彼嘉魚之發興實思賢而共樂蓋一作念風俗之盛衰以廢興為善惡惟魚在淵兮其跡惟深賢在野兮其道惟默植忠信以自保俟休明而觀國屬王度之清夷復何求而不得然後為衡為衝疑是效是則成天下之亹亹定衆人之惑惑國家化造往古政在求賢釣嘉魚在丙穴得竒士於滋川呂氏春秋呂望釣於滋川故開闢之功作之於我太平之人匪降自天余是以知玉帛之禮至矣嘉魚之詩大焉若乃日旰而食思彼賢者念兹在兹誰與天下心不忘於寢處足流詠於風雅斯蓋嘉魚之義故可得而述也羡魚賦王起客有羡魚者立河壖俯臨泉窺緑藻瞰紅蓮彈鋏之歌逾切觀濠之意彌堅則有頳尾殊品紫鱗異質或依蒲而自娛或擁芡而爭出揚鬐奮鬛已見其由戢尾貫鰓未知其術是用乘良辰守通津望噞喁而注目聆瀺灂以勞神乃嘆曰深不測者水藏諸水者鱗營之何及獲之何因彼不脫於泉徒求於泉下彼不蕩於水奚求於水濵喪志而退問於漁人漁人曰噫子過矣君子謀不失利動必合理禽之中也先夫矰繳獸之獲也資乎弓矢夫吾子坐金堤降玉址疑作趾無罶而窺其發發無笱而思其唯唯此所謂自包其羞不求諸已向若有具施之於水則和羹可待食肉兹始不為緣木之難自叶忘筌之美斯言富哉感激而回求詹公之術盡任子之才器必備藝咸該將中否之不惑希取捨之無猜羡之可以已也是以結網而復來第二并序敬栝閏正月旬有八日李崔二侯命余于邑之南澗以求魚也洎至止人鮮力微網則虛設遂無所獲願莫我從且漁者卑事非其人猶不可力行特取豈容易哉因貽賦云南有澗兮湜湜其流北有人兮溫溫寡侔涉春水兮以遨以遊羡嘉魚兮載沉載浮且人以功為志魚以水為利功髙則其事易成水深則其魚易致况我網孔張我心匪臧網無及則魚以遐遁魚已遁而人猶未忘亦何異驅倚市者就戰俾善駕者持航雖終朝而筋骨之勞備盡徒悉力而尺寸之功不揚振振者李胡為乎至此平陸不可以行舟干將不可以補履歸止歸止振振者崔胡為乎忽來過屠之嚼何益臨川之羡空回歸哉歸哉結網求魚賦以臨川羡魚未若結網為韻王起網則結緒魚方躍泉其結也踈而不失其躍也瞻之在前一縱一橫既克張於萬目無小無大亦何逃於百川是以揚鬐振鬛噴沫飛涎初同求於發笱終取義於忘筌於是當巧孜孜抗精上林賦抗士卒之精屑屑細緝絲枲解紛結絶想江湖之相忘遂綱維之備設搖頳尾以游泳爾不厭深運素手以繽紛我思善結俾晝作夜日居月諸成兹密網念彼嘉魚庖犧之舊制無改良罟之新規有餘獻鮮槀之時兹為謀始烹釡鬲疑作鬵之日此乃厥初且夫注目劬勞井心健羡於結網兮何有徒噞喁而可見金盤既設無靃靃以霏霏錦質乍窺徒赫赫而戰戰孰若氣奪九罭網殊一面始結繩而爰設終在藻而咸薦踈密由已卷舒從心此紛紛而不紊彼潑潑而方禽亦何必不網而為子釣斷罟而諫君臨其動則終疑其力不費事有類於組織志未殊於經緯薦尾安在提綱尚未想飛鴻而則羅曷游魚兮不畏向若臨河廣恣心賞隨揭厲之淺深當鱗甲之來往出彼赫鰓亦同反掌營鱣鮪方同濊濊之施罛禁鯤鮞豈比恢恢之漏網則知無其備者其功略有其具者其利博此不愆其經營彼無逃於潜躍夫然觸類斯長緣情可託結詩書而為網網則有條驅爵祿而為魚魚兮咸若吾所以考先賢之微言悟臨川之妄作巨鼇冠靈山賦以滄溟之上神化不測為韻楊濤海環四方東為之滄有巨鼇兮其大無極載仙山兮其力難量是山也根無附麗彼鼇也勢則騰驤積浪淪漣拖其身而歘以動蕩攢峰回互加於首而隨以低昂豈不以稟兹魁大舉其峻極當一動一息之際見翻海回山之力延頸而羣嶺騰青聳身而半天映黑徴物象之無比見神用之罕測亘橫天極地之質邈爾形標冠蓬萊方丈之尊輕如首飾然則神嶽之高兮莫知大鼇之壯兮若兹視鵾鵬如纎芥比嵩華於毫釐嶔崟之容初結根於無地突兀之狀終冠首於此時舉其大吞舟不足稱也喻於小戴勝有以似之觀其轉峰巒偃波浪萬派沸渭特立放曠荷至重而匪重見大壯之用壯風水之運贔屓而上摩天垠丘山可勝崷崒而高標海上蓬臺之靈神仙之扄獨冠岧亭橫截滄溟莫究其廣大之形溪谷陵阜嶄嵓紛糾仰戴於首無可無不可疑乃與夫天地相久者哉兹嶺磅礴隨流混淪聳切雲之高且知其抗首鼓翻波之勢想見其側身順時而或踴或躍推理而乃聖乃神比愚公之移有異想龍伯之釣無因兹可謂氣冠渺瀰力疑均造化則鼇之載山也以地載疑之力相亞黿鼉為梁賦以王師逺征水族冥感為韻王起周穆窮轍跡之所經駕黿鼉而咸疑作感靈所以濟浩汗所以通杳𡨕蜲蜲蜿蜿以代造舟之利匪雕匪刻皆連外國之形諒人力之不勦信神功而永寧當其師旅闐闐旌旗肅肅臨九江而澶汗駐八駿而誇疑作踡局望既濟於未濟終歎無梁思載沉而載浮孰能刳木得不乞靈於水府假道於介族則黿也不得而深藏鼉也不得而潜伏既而擘波有聲異狀可驚出層潭而櫛比駕飛浪而砥平連足俄維比浮柱之初立鏤甲迭映同板築之相成齊首而繩墨勿用曵尾而規模自呈其利惟博其安無傾殊滄海之龜構異銀河而鵲征彼詭類之可覽實至誠之所感假贔屓以臨深託盤跚而習坎其勢邐迤其狀參差無逺不届惟危具持照赫燮之五刃度張皇之六師乘以周旋且異琴髙之鯉載於沉溺還符毛寶之龜漁者徒驚工人有耻同罛共羅而罔及畫鶂雄虹而莫擬題之不可殊長卿之見書抱之則難謝尾生之沉水是知伐鼉以冒鼓其用匪良解黿而染指其謀匪臧孰若奮功於舟楫感聖於君王昔在深泉懼屑沒於其穴今符至德忽結構而成梁固蹂躙而無害將騰躍而有光我皇仁洽道豐文修武偃要荒畢服淳離斯返何必驅鼉而駕黿勞師而習疑逺釣鼇賦以一舉而連六鼇為韻張友正東海有三山山有六巨鼇鼇則偃蹇以戴山下橫乎大壑山則穹崇以壓海逈出乎洪濤哂鯨鯢兮瑣細視嵩華兮秋毫此則鼇之所以為大山之所以為高乃有龍伯之國巨人攸處謂天生之神物可以充乎鼎爼壯圖方啓髙足云舉曾移十步之餘已奄五山之所於是載揭長竿别疑綸巨緇俯滄溟其流如帶垂芳餌有肉如坻既投之以潜下果食之而不疑其肉未入於口而鈎已貫於頥爭心既憤勇氣相持崩騰渤澥磅礴嵎夷蹴天柱裂地維地雖廣兮振矣天雖高而殆而欲出不出騰躍非一萬川倒流八氣旁溢血吞瓊田之草波陷鮫人之室輕共工之觸山小夸父之逐日豈長蛇趨閬風之足數大鵬徙天池而可匹爾其駭百神奔萬族波臣蕩而失水海若迸而登陸以鼇之靈慿帝之福謂優游以無窮何瞬息而連六猶將灼其骨豈惟離其肉于以洎釋文洎肉汁說文洎灌釡或疑作湘烹也之幾竭東海之水于以燔之足盡南山之木羣仙於焉以墊溺三山由是而淪覆且山之俄疑然若與天連鼇以首戴之里數不知其幾千彼大人兮併之於背負之而顛斯其為大也胡可得言而稱天天字疑恃其人人有所不及恃於力力有所不全若使以陰陽為網以道德為筌以信智為機於其上以仁義為餌於其前則所為獲物者其為鼇也大焉寅月釁龜賦以擇兹上春䖍俟明火為韻王起國家謹時以授人敬卜以事神每殺牲以獻嵗用釁龜於孟春法於天不失建寅之正位塗以血而皆祀骨之至珍是尊是奉必躬必親周官之規不爽呂氏之令惟新時也斗柄潜移葭灰稍暢簭一作菙周禮雖有菙氏掌卜又有簭人凡國大事先簭後卜下文云占有待宜兩存之者也氏之占有待龜人之職無曠由是發巾笥之下於廟堂之上乾乾兮捧九江之殊形翼翼兮出十朋之異狀然後刲牲來思流血注兹映乎顔則渥丹初啓運乎手則研朱乍施所以布幽全之物於枯槁之姿必勾芒之用事俾僂句之不欺負圖之處既占獻兆之求心果迫而察也異太史之定墨逺而望焉謂卜師之揚火物以好生為德我則鑽而堅物以受汚為纍我方告其䖍不僭寧同於居蔡見珍皆得於巢蓮閲山澤之形紛其惟錯染青黑之緣赫以相鮮木德式臨官占有俟幽贊先知之道啓迪從長之美豈比夫楚軍鼉鼓虐執蹶由齊國鯨鍾仁稱孟子且車甲之釁也所以交於神明孰若考元吉謀永貞候青陽之辰是儀是準設朱殷之色必信必誠用能稽大疑决碩畫罔櫝中而致毁咸蓍下以慎擇既釁之而有徴願保之而無斁蜃樓賦以海旁蜃氣象樓臺為韻王起伊浩汗之鵬壑有岧嶤之蜃樓不因材而結構自以氣而飛浮閟然無朕赫矣難儔出彼波濤必麗天以成象化為軒楹疑寧假日以銷憂足以掩鼇山於别島漏一作陋蛟室於懸流若乃霧歇煙銷雲歸月一作天朗千里目極八紘心賞惟錯之類咸伏陽侯之波無響於是吐氛氲騰泱漭隱隱逈出亭亭直上乍明乍滅舒渤澥而新鮮若合若離結麗譙而博一作傳敞雖舟子來萃國工是仰莫不驚天地之赫靈覩井幹而成象赫奕奕而有光紛郁郁而難詳影臨貝闕彩曳虹梁比繩墨之曲直如規矩之圓方嶽嶽之仙乍窺于天表盈盈之女且愧於路傍八忩未工百尺非峻伴祥煙於巨浸雜佳氣於重潤仰層構之如翬必巨川之化蜃大壯𡨕立全模洞開吐嗽而侔華宇呼吸而象瑰材翔鵾拂而不散賀燕往而復來依稀碧落想像瑶臺旁輝日域下瑩珠胎比落星之流㸃綴疑明月之照徘徊則知霞駮雲蔚有壯麗之貴棟折榱崩無壓覆之畏既變態於倐忽亦慿虛而髣佛豈比夫鼎居汾水赩赩以騰文劍在豐城雄雄而增氣方今聖功不宰海物咸在固知吐為樓閣以全其軀豈爭彼魚鹽弗加於海蚌鷸相持賦以洛城風日為韻郗昂水濵父老以漁弋為事常持釣緡荷矰繳旦浮瀍澗晚泝伊洛亂平溆之磷磷步清流之鑿鑿匪畋魚以為務將釣國而為託異戕一作夭忽而害生特自斃而方搏亦猶守兔者目注於盧犬救疑彈者志在於黃雀斬長鯨而四海晏如得巨魚而千里饜若夫一舉而擒兩固功全而利博同不狩而獲多齊不耕而自穫訝彼老蚌含胎孕明鷸是翔禽一作禽是翔鷸翼迅體輕或依岸而開合或遵渚以飛鳴既相遇於茲地亦相殘於此生鷸以利觜為銛鍔蚌以外骨為堅城鷸以蚌為腐肉可取蚌以鷸為微禽可營鷸曰今日不雨必刳蚌之腹蚌曰明日不出必喪鷸之精並相持而坎難俱莫知其困并彼漁父聞而造曰危哉二蟲吾見爾命之將絶吾知爾力之已窮胡不潜泳於深水胡不乘高一作陵於大風何故枯骸於波際何故落翮於沙中乃携以俱歸釋此雙疾利其美用取其形質鷸有羽兮彩映華冠蚌有珠兮光照巨室雖假物類以為用誠亦辨說之良術莊生寓語於前古是用廣之於今日水母目蝦賦以有相須而後濟者為韻楊濤物有相感動無不濟嗟水母之不明假蝦目以能睨因依倚以自警當行止而有制荷茲眄睞非唯一目之所加遊彼波瀾固亦兩心之潜契生雖異禀趣則同途託清明之餘照遵茫昧之微軀誠有利於攸往胡可去其斯須唯暗一作音是投唯明是假彼動容而有類此轉盼而奚捨乍若䝉駒之未視從彼母兮又似瞽人之將行待彼相者傋察察於清矑二字見楊雄傳之際共悠悠於碧波之下俾其誠以明之是同我之身也斯則目非獨見用必更相形質既資於自晦視瞻每比於偷光分水類之餘睛每能瞿瞿遊泉室而有路曾不倀倀雖則視之不見終似暗然而章豈不以水母為名蝦居於首委雙眸而不吝當四望之能久處浩浩之無際瞻之在前俾冥冥之有知不曰我後由是審利害之所宜俾出處之從時合之則昭然發䝉固無隱也離之則寂爾無覩豈不默而既精誠之是逹在終始以相持我無爾虞既一作恆司明以不替而一作爾為我目其在暗而無疑則知明不自守昧者為偶物有察而應心功有踰於假手是同久要之道曾不吾欺每思一盼之恩慙非已有文苑英華卷一百四十
