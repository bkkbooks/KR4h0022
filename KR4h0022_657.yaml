body:
  text: 文苑英華卷六百五十八宋李昉等編投知一為蘇令本與岑內史啓一首上明員外啓一首上許左丞啓一首上郎都督啓一首上司列太常伯啓一首上李少常伯啓一首上兖州刺史啓一首上兖州崔長史啓一首上兖州張司馬啓一首為蘇令本與岑內史啓陳子昻某啓某聞子以母貴自古通方禮以親榮在昔恆理豈非奉上之道休泰必同膝下之恩親愛先及伏惟舅寵居密戚位列崇班實富貴於當今允尊榮於前代居得言之地據至要之途九族同欣皆慿於奬盼六親咸賴仰德於恩波莫不拂飾集作拭生其羽儀談薦長其光價某自惟末品忝在甥徒早蒙撫育之恩不殊骨肉之愛自痛無福家禍遂纒爰在孤遺載延慈眷愛同諸子禮越常流遂得教訓成人䇿名從宦舅又曲垂顧念恩甚庭闈渭陽之情實多荷戴猥以庸薄叨纍周行自委質戎班集作昭昭集作班名果毅經今一十三載集作歲矣而竟未一遷仰望儕流莫不皆居顯位旋觀時輩亦已再歷榮班猥亦何人集作獨某一人空嗟留滯雖命途乖舛良或甘心然親貴盈朝豈忘提奬所以仰瞻恩惠不棄於踈微冀降慈仁集作流有憐於孤賤伏願舅大𢎞收採之眷特垂咳唾之恩矜憫小子使得宦及朋友寵以親榮私門載昌幽冥是賴豈不幸甚豈不幸甚無任企仰之至謹奉啓不宣謹啓上明員外啓王勃某啓側聞金烏聳轡俯圓燧而抽光瑶兔浮輪候方諸而吐液斯則洪纎異數𡨕符造化之津髙下相懸精契陶鈞之表故知聲同義合存長幼於三州理隔氣殊置山川於一靣神交可託風雲於杵臼之間道不虛行涇渭於簮裾之列其有跡申知已投爵里於思齊事迫當仁抱龍泉而願割雖荆山已峻多輕抵鵲之珍而渤澥方春敢進歸鳬之景伏惟丈人珠躔降德銑社抽英河嶽縱其神器煙霞發其符采江東第一家傳正始之音日下無雙譽重名流之首三冬文史先兆跡於青襟百里絃歌即馳芳於墨綬彭澤陶潜之菊勝氣仍存河陽潘嶽之花芳風遂逺榮加從𬒮一作秩上清蘭府之遊寵奪攀輪更掌蓬山之務麟圖緝諡定榮辱於三泉鵷閣一作閣裁書考薰蕕於四部既鶴鳴雲路望偃朝端鴻漸星臺俯諧僉議亷平譽號李宣伯之當官雅操繩時山巨源之稱職加以文場武庫發揮廊廟之師瓊樹瑶林寥廓風塵之表一丘一壑同阮籍於西山一嘯一歌列嵇康於北面詞條鬱霧遙騰駕日一作月之隂辨鍔橫霜直上衝星之氣鳬鐘蓄韻聞片言而指掌鸞鏡懸心見一善而明目情源九𣲖士流欣滿腹之期德宇干門詞人有庇身之望方當坐談帝席雄視羣公豈徒比跡天府雌伏郎官而已哉某崇徽啓緒盛德在家承太子之仙宗析將軍之逺系米輪在漢列髙士於三台青蓋浮江扈平王於七姓遺風舊烈尚存清白之基祖德家聲代有縱橫之目及金陵東覆玉馬西奔髦頭傑起文儒繼出鳯鳴朝日森梢煙雨之標龍躍雲津盤礴江山之氣雖雄名雅譽隨朔野而揚聲而華冕雕軒比南風而不競陳太丘之積善羔鴈成羣謝車騎之餘芳蘭蓀不替趨庭洽訓共歌未蕚之篇避席承觀猶守青箱之業嘗謂酣神北阜藉春渚而忘歸動影南櫺坐秋山而長往不意蘭臯獨嘯輕交委鶴之書芝澗行謡坐辱飛龍之使年殊賈誼仰宣室而方同業謝劉繇俯長途而遂恧塞上浮雲之跡空倦吳山隋侯明月之珠終悲暗室豈不知拂衣長謝林泉多倦一作倨俗之因安枕有餘廟堂非養髙之所松楹坐月臨黛壑而遐征桂席攀風俯青嵓而自足而欲俯首屈膝逡巡多士之林弔影慙魂骯髒文昌之府徒以牛蹄已倦臨文壑而驤鱗羊角可逢想髙衢而撫翼參名國士方叨智伯之恩揮迹奉常冀雪公孫之恥識正平於處士雖在孔融期仲容於望外終資許允猶恐先馳折翮頻驚鶂路之風再舉枯鱗空擊龍門之水丈人借以顔色資以恩波垂雅契於長年叙情交於纍代情加倒屐知步頃之生光禮極升堂覺聲名之有地是用俯抽丹思上瀆清顔鏤殊奬於肝膽銜德音於咳唾懦夫增氣先歌易水之風壯士投心思赴吳宫之火恩崇命淺瞻吕梁而可泛山髙海深涉孟門而何險謹啓上許左丞啓某啓自違阻恩華嬰纒風恙守愚空谷斂跡仙臺同衛玠之虛羸談非正始愧劉楨之逸氣卧似漳濵朝野既殊風猷遂隔望芝蘭之漸逺覺鄙吝之都生所以暫下松丘言遊洛邑永懷前倦疑逡巡元禮之門延首下風匍匐文章之府實願稍捐人事少奉清言質儒釋之幽疑訪空𤣥之極境願聞者道敢披江海之心所進者榮非慕軒裳之重雖齒絶位殊空塵左右而道存目擊豈隔形骸輕陟階堂伏深悸越謹啓上郎都督啓某啓某聞古之君子重神交而貴道合者以其得披心胸而盡志義也是以叔牙茍在管仲分多而不貪無知尚存陳平受謗而非罪何則逹其趣者能申其迹收其大者能讓其細也今某東鄙之一書生耳少懷耿亮頗慕髙烈俯仰相得則屠博可遊造次不諧則軒冕異路蒙君侯國士之遇受君侯長者之禮繾綣談謔殷勤誨誘今有情而不告是不盡也有窘而不託是有疑也將恐季布無侣於後葉孫臏獨稱於前古嗟乎可以竭誠矣敢不盡言乎勃家大人天下獨行者也性惡儲斂家無擔石自延國譴逺宰邊隅常願全雅志於暮齒揚素風於下邑而道里􅞅遙資糧窘鮮秩寡鍾釜債盈數萬此某所以側目扼腕臨深履薄庶逢知已之厚以成大人之峻節也古人有言富觀其所與貧觀其所取又曰損有餘補不足於君侯何如哉然則定其交而後求敢無愧已易其心而後語夫何飾讓賑給之義既惟其常厚薄之差伏希俯訪輕塵視聽伏增兢惕上司列太常伯啓駱賔王側聞魯澤祥麟希委質於宣父吳坂逸驥實長鳴於孫陽是則所貴在乎見知所屈集作伸由乎知已故雕其朴嶧陽集作山有半死之桐賞其聲柯亭無永枯之竹伏惟明常伯公儀天聳幹集作構橫九霄而拓基浸地開源控四紀而疏𣲖自赤文薦祉曲阜分帝子之靈紫氣浮山集作仙函谷誕真人之秀本支百代君子萬年道叶神交黃石授帝師之略德攸集作由天縱白雲集作星降王輔之精至若峯秀學山列三墳而仰止瀾清筆海疏四瀆集作委九流以朝宗登小魯之巖辨練光於曵馬臨大吳之國識寶氣於連牛垂秋實於談叢絢春華於詞苑辨河飛箭激流翻白馬之津文江散珠圓波潄驪龍之穴是用德茂麟趾削桐葉以分圭道煥鵷集作宛鶴池映桃花而曳綬既而揆留皇鍳忠簡帝心奉職春宫燦離光於青殿代工天府明台曜於紫宸綜理𤣥風燮諧元氣含暉禮閣皎愛日以流光散集作育彩文昌映德星而開照若乃識度𢎞逺器宇疏通明允篤誠盛業隆於厚土惠和忠肅𤣥功格於上天則伊陟謝其緝熙巫咸慙其保乂舉才應器與士無私水鏡澄華炫金波於靈府氷壺徹鍳朗玉燭於神機則鄧攸莫際其瀾盧育罕窺其術故使妍蚩各安其分輕重不失其權五教克敷百揆時叙折衝千里魯連談笑之功師表一時郭泰人倫之度加以分庭讓士虛右集作席禮賢片善經心揖仲宣於蔡席一言合道接然明於鄭階賔王蓬廬布衣桑樞韋帶自弱齡植操本謝聲名中年誓心不祈集作期聞逹上則執鞭為仕王庭希干祿之勞次則捧檄入官私室庶代耕之願集作祿然而忠不聞於十室學無專於一經退異善交集作藏進殊巧宦摶羊角而髙翥浩若無津附驥尾而集作以上馳邈焉難託實欲投竿垂餌晦幽集作名跡於渭濵抱甕灌園絶機心於漢渚幸屬乾坤貞觀烏兔光華嵩山動萬歲之聲德水應千年之色雖無為光宅欣預比屋之封而有道賤貧恥作歸田之賦於是朅來甕牖利見金門指帝鄉以望雲赴長安而就日美芹之秀集作願徒有獻於至尊蟠木之姿誰為容於左右明公惟幾成務論道經邦一顧之隆駘足踰於仙鹿片言之重魚目軼於靈蛇庶望顧兔離集作羅非箕動薰風於舜海從龍潤礎霈甘雨集作澤於堯雲則膾餘之魚希振鱗於吳水膳後之豕翻化龜於魯津趨拜階庭集作拜伏階墀增其氷谷謹啓上李少常伯啓賓王啓竊惟隂陽作炭化一氣以陶甄天地為爐混萬物於集作為芻狗然則璧輪均照或流景於萊城玉燭平分猶集作獨翔寒於黍谷是知隆汙遞集作迭襲榮悴相仍集作循得氣者繁滋失時者零落伏惟集作以君侯疏乾激𣲖龍門開竹箭之波鎮地橫基鵠翅峙蓮花之嶽集作嶺曜重輝於若月炳疊彩於非烟至若瑞動赤光著元勳於東漢烽驚紫塞宣武功於北征奕葉龍光蟬聮龜組德攸天縱白星降王輔之精道叶神光黃石授帝師之略故得三千運北擊舜海以遊鱗九萬圖南望堯雲而矯翰折衝千里魯連談笑之功師表一時郭泰人倫之度於是九重銜紱昭星彩集作影非於宸維四逹埋輪震集作振霜威于集作於權右加以分庭讓士虛席集作坐禮賢片善必甄揖虞翻於東箭一言可記許顧榮以南金某蟠木朽株散樗賤質牆靣難用灰心易寒集作然退無毛薛之交進乏金張之援塊然獨處集作居一紀于集乍十載於兹矣然而日夜相代歎集作笑溝壑以集作之非遙貧病交侵思薜蘿而可託常欲乘幽控寂追綺季於青山樂道栖真從魯連於滄海幸屬舜門廣闢漢幣交馳遂得佇嘯髙丘應箕文而動韻聆吟大野浮艮爻集作軸以流隂將恐在藻纎鱗終絶集作寡登龍之望槍榆弱羽徒仰摶鵬之髙所覬曲逮恩光滋餘潤於東里襲承道集作遵引託輕葛集作夢疑作蔓於南樛撫已多慙覘躬彌懼集作修躬增懼謹啓上兖州刺史啓側聞未遇孫陽鹽車無絶塵之跡時逢和氏荆山有連城之珍豈若聽清音於㸑餘則枯桐發響收夜光於𤣥璧則怪石騰輝在物猶然况於含識者矣伏惟明使君公鳯穴振儀龍門標峻瓊姿集作雕嶽立表秀干雲霞煥霜飛瑶貞鏡鍳集作霞煥霜霏澄虛鍳物既而代工天府忠簡帝心擁熊蓋集作軾而撫百城建隼旟而臨千里坐堂敷惠恩纒去思剖竹垂仁式歌來暮清凝夜燭化警晨烏外朂九農內𢎞五教導之以禮樂齊之以刑書約法遵寬誤示二字集作設蒲鞭之耻發集作立言唯信結集無結字控竹馬之期甘雨隨車雲低輕重之蓋還珠合浦波含逺近之星至如卧理稱難坐嘯匪易披裳問疾垂愛景以字人褰帷廣聽穆薰風以集作而扇物飛集作嚴霜秋降叶隼擊而防小人零雨集作露春濡飾羔旌而禮君子於是仁風革俗集作仁必有勇吏不忍欺美譽鬱於三高集作齊芳猷勝於萬古若乃清規逺鏡皎月色於靈臺𤣥鍳虛凝穆松風於智府研機十篋探賾九流縟綺集作翠蕚於詞林綷仙花於筆苑文江翻浪織玉㶑以韜霞學海驚瀾綴珠連集作鱗於濯錦加以懸榻待士擁篲禮賢汲引忘疲奬提不倦懷經味道之客望範圍以駿奔兼流包略之夫窺義園而遐集求小善於毫芥顧正禮於二龍振幽滯於泥沙許公明於一驥某淹中故俗休列朴厚之清集作𢎞規稷下遺氓祗陶禮義之餘化頗遊簡素少閲縑緗每蟋蟀凄吟映素雪於書帳莎雞振羽截翠集作碧蒲於翰池既而學異懷蛟才非夢鳥價乍齊於南漢芳不重於東山幸屬日月光華雲霞紛郁方結羡魚之網將謡扣角之詞奮短翮於榆枌集作槍榆希髙標之餘拂躍纎鱗於涓滴望鴻澤集作浪之微霑所冀顧盼曲流翦拂增價則鉛刀起一割之用跛鱉致千里之行是以集作知竊混吹於齊竽濫飛聲於郢唱集作路抱山雞而自恧顧遼豕以多慙輕觸威顔不遑流汗謹啓上兖州崔長史啓側承酆城戢耀駭電之輝俄剖沙丘蜿跡籋集作躡雲之轡載馳然則激澑集作瑞侵星佩潜蛟於壯武騰鑣歷塊騁蹀駿於咸陽且煦轍波鱗側羡鼇潭之躍觸籠雲翼局望鵬隅集作田之迅是以齊郊夕唱牛歌掞白水之詞漢境朝趨車候驚拂塵之思伏惟某公騰瀾浴景濬靈𣲖以含珠擢幹梢雲翊淮巖而聳桂崇基疊秀匡霸道於周盟茂緒聮輝贊文場於漢戚偉龍章之秀質騰孔雀於集作之觹年叶鳯彩之集作於英姿辨蟾精於弱歲集作日靈臺宏逺聘霄練於霜潭䇿府幽深絢朝虹於璧渚心波湛漢詠魄曜於黃陂情嶽干天韞集作韜風雲於稽巘龍津共濟競欣登御之車蕪室欽賢必攬集作擁澄清之轡鬱文條而耀彩藻逸潘花曄詞峯而衒價光浮衛玉然則昆溪既琢必見山川之精樹羽已懸行嗣雲韶之響是以佐龜隂而演化務肅萬城集作百城翼集作甫麟壤以宣風恩覃千里徽猷克著逾盛德於休徴聲績聿宣軼規模集作模規於恭祖佩吕刀而紹美以集作已贊褰帷之遊屈龎驥而流芳集作末伸將叶順風之問集作將騁仁風之駕加以側階引彥鍳宋集作宗子之微言倒屣迎賔辨王生之雅量故使圓流之下探照乘於長波髙岫之巔剖連城於幽石某瓶筲小器鷦蚊末品斜帶嶧梧戢晞陽之厚德旁鄰汶篠慕貫時之貞徑直以容膝一丘曲阜之瓢遽切枕肱五畝成都之壁已勞擔石厭於糟糠負薪疲於短褐然則少奉過庭之訓長趨克已之方弋志書林咀風騷於七略耘情義圃偃圗籍於九流灑惠澤於陽波集作渥於羊波屢泛文通之麥峻曲岸於鶯谷時遺公叔之冠雖不能縱逸韻於霜臯唳野致九天之響而頗亦蓄餘芬於露薄垂薰有十步之芳而乃恧迹魯鴻悲荆山之抵鵲簉鳴韓犬歎稽阜之橫梁方今玉管集作琯躔秋金風動籟吳宫歸乙望隂岫以依遲素林反鴈候朝陽集作潮陽而低舉籝金味道之子候纁帛以彈冠屑玉含毫之人望弓旌而蹺集作翹足竊不揆於庸識輒輕擬於揚庭所冀恩波時流集作留咳唾儻蒙集作能分其斗水濟濡沫之枯鱗惠以餘光賑孀居集作棲之寒女得使伏櫪駑蹇希騏騮集作驥而蹀足竄棘翩翾排鵷鸞而刷羽則捐軀匪吝碎首無詞雖復投報楊金君子以之貽惠集作戒效誠魏草小人知所懷恩輕瀆威嚴懼深履尾載塵聽覽迫甚蹈氷謹啓上兖州張司馬啓某啓竊聞網澗緝裳傃指雲於偃蓋排虛止棘附絶電於纎離然則左方為容鏘金有階於蟠木無因而至按劍致懼於連城是以賃牘干榮發仭資於禽息求光抱燧束髮濟於于髠伏惟某官瓊峯聳峭儼㬢觀而爭峙瑶𣲖驚瀾泝天潢而比濬漢臺引路夕翊浮雲之隂晉閣垂璫朝曄文星之苑劍池濯彩耀震德於渥津弱水摛祥炫離精於丹穴辨懸瞳於朗鏡肇自鐫年對似魄於虧陽光乎弱嵗言阿一作辨言激箭浴紫貝以飛湍情嶽驚峯蔽丹霄而傑峻文條擢秀馥長坂之幽蘭筆苑揚葩曄小山之丹桂松飈結韻縉紳藉以雌黃嵓電流光通賢資其月旦於是佐褰帷於魯甸威讋列藩匡露冕於梁隂恩覃絶境緝諧鱗疑作麟甸下白鶴於仙庭輔弼鳬郊重黃金於帝里加以奬拔幽滯汲引英髦錫以吹噓暖燕郊之隂谷延之顧盼熖漢圄之寒灰某篠𣲖庸微桐巖賤伍託根鄒邑時聞闕里之音接閈雩津屢聽杏壇之說加以承斷織之慈訓得鋭思於書林奉過庭之嚴規遂容情於義圃方欲閉門却掃養拙以終年幽遁鑿杯甘貧而卒歲直以栖遲五畝獲鷦鷯之數粒蕭條三徑匱侏儒之斗儲雖則放曠林泉頗得間居之趣而乃寂寥蓬户惟深色養之憂是以望檄動容慨南陽而閴寂祈名夙駕嘆郢路而依遲方今凉秋屇節嚴飈扇序衡陽極浦振朝音於負霜寒臯逈甸驚宵吟於靜野弓旌之禮斯及辟聘之際是期不揆庸愚輕斯自衒所冀分其末照惠以餘波得預觀光全由咳唾倘雲鑣釋絏申其潄玉之音霜匣開輝照以盤蛟之影則隂山之雀敢懷餐蘂之心漢東之蛇期致投珠之報不勝窘迫之至謹啓文苑英華卷六百五十八
