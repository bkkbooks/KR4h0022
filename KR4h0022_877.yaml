body:
  text: 文苑英華卷八百七十八宋李昉等編祠廟一嵩山啓母廟碑一首少室山少姨廟碑一首后土神祠碑一首溧陽瀨水貞義女廟碑一首湘源二妃碑一首嵩山啓母廟碑崔融臣聞天地生成其法自然之謂道隂陽鼓舞其功不測之謂神然則物或類感事因通變乾棟傾而三光北馳坤輿缺而百川東瀉河淪越俊有郡邑之為魚水陷歷陽有吏人之化鱉訪遺蹤於女峽風雨蕭條徴往事於始泉絃歌響亮盈虛靡定合散焉常不知誰子既老氏之多懵忽然為人寧賈生之足辨仰觀俯察裁識幽眀之故原始反終未窮死生之說得於道而失於道義有必然出於幾而入於幾理無或廢知變化者其知神之所為乎臣謹按啓母廟者蓋夏后啓之母也漢避景帝諱改啓之字曰開厥後相傳或為開母而顧野王輿地志盧元眀嵩髙記並不尋避諱之㫖以為陽翟婦人事不經見諒無所取粵若玉斗璇璣李母之居鄰北極金臺石室王母之宅在西山氣為母則羣物以萌月為母則容光必照坤為母則上下交泰后為母則邦家有成故華胥履跡而雄氏孕女登感神而炎運作星流華渚而白帝生月貫幽房而黑精降明眀有夏穆穆塗山子娶於度土之辰女婚於台桑之地搜竒帝紀識一作托異歸藏束生發蒙而有迷韓子稱賢而不朽漢臣之筆墨泉海陳其令名秦相之一字千金叙其嘉應士歌南國徒聞一作問侯禹之詞石破北方終見生余之兆則郭璞所謂陽城西啓母石李彤所謂嵩山南啓母祠隋巢之說有徴鴻烈之言無爽者矣昔者鸞川之上母變空桑豚水之濵男生破竹美人之虹名螮蝀仙婦之月作蟾蜍精衛銜木而償寃女尸化草而成殯山崩蜀道臺候婦而無歸石立武昌亭望夫而不及論乎誕載羣下莫尊於帝王語乎遷易凡百無聞於感致美矣哉不可得而稱也大唐革去故鼎取新與運而生繼天而作握乾坤而造物海內知春闢混沌而為家域中無外天皇膺厯數順謳歌金匱玉板服皇王之能事衢室廟堂承祖宗之茂烈垂衣裳而作元后端拱北辰負黼扆而朝諸侯嚮眀南面周邦赫赫其道洽於成康漢室巍巍其化鍾於文景東漸西被逺安邇肅海三年而無波雲連月而不散天瑞降地符升靈鳳五文嵗時來苑囿神龍八卦昏旦遊池沼禮云乎哉無取於周旋揖讓樂之謂也必在於移風易俗司祿益富家國於是乎有餘司命益年臣人於是乎不夭眀王三懼未嘗遺戒慎之心天子四鄰莫能展弼諧之用家安其業但聽於鄰雞人得其和遂同於野鹿表䜟記奏河圗四十六事之著眀曷云尚也登太山襌梁甫七十二封之可識何以加乎且夫窮聖神備道德滋萌元氣開闢太初斯乃天皇氏之所以應乎天也依土地眀神靈駕六羽而上騰交九州而下濟斯乃人皇氏之所以順乎人也造書契教畋漁合五緯而節四時登九天而類萬物斯乃犧皇氏之所以制人法也務播殖該變通嘗藥以救兆人聚貨而交天下斯乃農皇氏之所以興人利也振夔鼓載龍旗天則𤣥女授符帝則黃神降升一作斗斯乃軒轅氏之所以除人害也均度量正都邑惣秋令於金天分瑞官於鳳紀斯乃帝昊氏之所以為人極也潔祭祀義鬼神履時以象天養財以任地斯乃帝頊氏之所以為人教也秋乘馬春乘龍順三辰而天道平建五正而人事理斯乃帝辛氏之所以為人政也眀如日晦如隂人無識其名帝何力於我斯乃帝堯氏之所以昭君德也聞一善舉八才帝唱動而爛星雲天歌發而蹌鳥獸斯乃帝舜氏之所以章后功也夫三統者道之大五行者生之宗三皇法之而列五帝則之而序道以三興德以五立非天下之至聖孰能兼於此乎而猶雖休勿休損之又損下眀詔發德音尊天而重人省方而巡狩舉星畢曳雲稍召風伯以清塵命山靈而護野馳洛邑騖壤城天回而地遊雲合而霧㳫周穆王來逰太室先徴夏啓之居漢武帝有事嵩邱即訪姒開之石徒觀其丹青嵗古霜露年侵聖情有眷興言改葺其山則古文之外方其地則新邑之中土銘壇邐迤斜分玉女之臺碑闕相望近封石人之廟金草生而五色貝樹長而三花紫雲合㳫於溪澗白霧氛氲於巖嶺考之易林信為神眀所伏求之遁甲固以威靈肅然夫其命有司乘務隙因髙背下察隱嶙之餘基審日觀星揆摧殘之落構周官置臬郢匠揮斤異態神行金模化造紅葩奪日飛纍榭於山間綺綴衝風架回廊於木末仙人在棟神女臨窗周施玳瑁之椽遍覆琉璃之瓦赤玉為階甃黃金作門闕山如白岸樹似青溪羞蕰藻於前庭籍生芻於後徑蘭香夾水居然洗沐之資竹帚臨風自隔囂塵之境夢臺雲雨宋玉樹而先驚楚璧山川屈原書而幾倦夀宫憺兮不擾象設安兮逾肅霜羅曵曵雲錦披披鴛鴦褥兮翡翠幬白羽扇兮青絲履垂玉鸞之珮若往而若還戴金雀之叉不長而不短其居處也曖曖昧昧隂閉陽開其被服也煌煌熒熒霞駮雲蔚鼎爼則麟胎鳳卵蒸蕙燃蓂餌膳則木密金膏玉漿瓊酒當是時也合五嶽訊九魁選太隂命𤣥闕馮夷鳴鼓女媧清歌左蒼龍兮吹箎右白虎兮縆瑟金真拂座玉女焚香肅肅習習天媛來風雨氛氛霏霏神姬下霜雪孔雀飛而儀鳳舞弄玉邀歡軿車合而羅綺陳智瓊陪宴麻姑服道變海水而來逰織婦希風填河津而下謁洛妃綽約江妃綿眇𤣥女以眀月為珠素女以穨雲作髻九天真母八極夫人畢集於兹矣青霞衣兮翠雲裘靈連蜷兮既留車回風兮馬飛電視倐忽兮無見昔者濟隂山下降堯母之精靈湘川水曲留舜妃之響像壝壇或在徒聞介福之名棟宇不修誰辨安歌之處豈知夫三仙福地百姓尊祠挾王者之都畿當聖人之順動犧牲玉帛可以洽氣和神幼婦外孫可以披文相質䖍奉綸㫖式陳壯觀雖周人作詩自得后妃之美而魏臣獻賦終慙神女之工敢作銘曰九州地險五嶽天中蛟龍洞冗日月仙宫蓄泄雲霧震蕩雷風笙歌近接鐘鼓遙通其一其在媯帝洪泉未塞昏墊下人泛濫中國於鑠大禹顯允天德龍畫旁分螺書遍刻其二佩文北海省土南方還從碣石更下台桑豫娶有禮我都攸昌八年不顧四載惟荒其三宛委既登轘轅佇鑿家室誤往熊羆方作天道幽祕生涯紏錯其化則遷其靈是託其四虙妃之館仙女之臺物類通感精魂去來巫山廟立漢水祠開壝壇嵗古棟宇年摧其五皇矣大唐麗哉神聖膺圗受籙體元居正赫赫髙祖天有成命眀明太宗於兹為盛其六重光纍洽下武嗣文負扆而化垂衣以君三靈肹蠁六氣氤氲魚鱉咸若雞犬相聞其七重譯請命殊鄰禀朔化及中孚風移大朴天秩百禮人和萬樂汾水可逰峴山何邈其八隋巢舊說夏啓遺居盛德不泯嘉聲在諸周王轉蹕漢帝回輿聿懷降鍳其祀如初其九虞衡掌木班倕葺宇虹亘梅梁龍盤桂柱草積庭院水周堂廡石室置儔軒官為輔其十珠簾洞卷玉座含清金翠玓瓅羅縠輕眀儀刑若動侍衛疑生依俙有物惝恍無聲其十一帝子湘川天孫漢曲翩綿縹眇躊躇躑躅神女㺯珠靈妃啓玉倐來忽往星繁電燭其十二壯矣麗矣神之聽之聰眀是屬景福無欺夫人立館幼婦鐫辭巍巍皇室萬萬餘基其十三少室山少姨廟碑楊炯臣聞崑崙集本文粹並作閬西北之地二本無此字天門也則五帝處其陽陸三王居其正地太集作泰山東南之地二本無此字日觀也則秦皇刻其石銘漢帝探其玉䇿故知建都邑正方位劃文粹作畫崇墉刳濬洫必憑天地之險然後四海為家擁神休尊眀號叶時月同量衡必致山川之祠然後羣神受職少室山者山嶽之神秀者二本無此字也憑河圗而括象文粹作地用遁甲以集作而開山發揮宇宙之精噴薄隂陽之氣壁立而千仭削成而四方北臨恆碣猶如聚米南望荆衡財文粹作才通用同覆簣共工氏觸皇天之八柱未足擬議龍伯人鈞溟海之五文粹作三山無階響像考於含神霧文粹作紐白玉猶存驗於山海經黃花不落其名有序則太室西偏其位可知則嵩髙佐命若乃乾坤之所合雷雨之所交仰躔七星之野俯鎮三河之曲朝市臨於域中樞機正於天下六合交㑹於是二本有乎字有天帝之下都九州名山於是二本有乎字有靈仙之窟宅臣謹按少姨廟者則漢書地理志嵩文粹作崇髙少室之廟也其神為婦人像者則故老相傳云啓母塗山之妹也昔者生于石紐水土所有二本作以致其功娶于塗山室家所以成其德后宗之位象南宫之一星外戚之班比西京之列傳惟幾不測其道無方騁神變而揮霍降精靈而肹蠁亦猶蔣侯三妹青溪之軌跡可尋虞帝二妃湘水之波瀾未歇何止祠稱丁婦廟號勝二本作滕姑少女宅於西宫夫人館於南嶽山臨白崖空聞石室之靈浦對青崖獨有金臺之異若斯而已矣年文粹作時更魏晉數歷周隋四望於是莫修八神以之無主炎凉代序寧觀爼豆之容霜露沾衣非復絃歌之地國家乘天造之草昧屬人謀之與能奄有大寶遂登神器天地水火之無象則女媧氏補之於是乎鍊其五石東西南北之失位則神農氏立之於是乎甄其四海天皇貴與天乎合德富與地乎侔貨窮變化之道二本作理盡神眀之數伏羲畫卦唯觀鳥獸之文黃帝垂衣蓋取乾坤之象利兼於成器功周於備物瑶臺美化闡邦國之風猷銀榜嘉聲備集作美文粹作茂君親之典禮稱才子者八族則叔獻季貍有亂臣者十人則太顛閎夭若夫圓丘方澤所以饗天神地祗復廟重欄所以序文昭武穆命秩宗之位分太宰之官考虞夏之質文定殷周之損益其大禮有如此者髙陽有飛龍之樂始㑹八風帝舜有儀鳳之音初調九奏后夔典其教制氏辨其聲鐘磬笙竽二本作竽瑟致其和尊卑長幼成其序其廣樂有如此者太微營室眀堂布政之宫白獸蒼龍象魏懸書之法下應猶草王言如絲北辰而拱衆星南靣而朝天下其為政有如此者紏萬人者施之以八刑誥四方者戒之以三典畫衣不犯載酒無寃免禽獸於網羅備二本作納寰瀛於軌物其恤刑有如此者周人之養國老始闢西膠漢氏之召諸生初開太學辟雍所以行其禮泮宫所以辨其教二本作政童子三一本作五尺羞談文粹作稱霸后之臣冠者六人唯述眀王之道其文德有如此者凉風至司馬於是乎陳兵太白髙將軍於是乎宜戰乘斗杓而誓旅出星門而杖鉞莊周稱天子之劍舉之按之吕望言聖人之兵如風如雨其武功有如此者稽其殷室二本作令有文犀利劍之效珍考其周書有兹文粹作諸白乘黃之騁力東漸西被南馳北走盧敖之窮觀六合不出於城隍陶侃之飛入八門未遊於仙二本作宫室其疆理有如此者察璿璣而平大運天回地遊吹玉律而部人時陽動隂靜煙雲蕭索而合彩日月淑清而啓旦豈直鳳巢阿閣入軒后之圗書魚躍中舟稱武王之事業其休徴有如此者然則囊括混沌發揮生靈大庭不足使驂乘驪連不足使扶轂可以㑹玉帛可以答靈祗行聖人之大孝既郊祀而宗祀昭帝王之盛節亦因天而事天猶復下聽輿人旁求故實以為唐堯五載無聞太室之儀殷帝八遷未卜王城之地是用陳圭置臬建周后之兩都制二本作詔蹕鳴鑾巡漢王之中嶽熒惑先列招搖在上隱天二本有而字動地欱文粹作吹野二本有而字噴山旌旗則日月運行鐘鼓則雷風相薄道伊闕據轘轅怡然肆二本作長望邈乎周覽壯靈山之雲雨仍求載祀之經對間寢之邱墟思秩無文之禮於是降天渙命司存因其舊跡葺其新廟詳費務議工徒下隴蜀之名材致荆藍之寶玉易者言乎悅使人文粹作民唐諱忘其勞詩者歌乎子來成之不日東西膠葛文粹作較轕南北峥嶸繡栭兮雲楣光照耀兮奪日二本作目桂棟兮蘭橑氣氛氲兮襲人皎日登於綺一作納疏奔星下於閨闥珠簾玳匣上髙閣而三休金柱銀檻二本作楹巡步廊文粹作出長廊集作步長廊而中宿窮山海之瓌寶盡人神之壯麗豈直文粹作止河庭貝闕俯鏡文粹作馮夷之都洛水瑶壇旁臨虙妃之館爾其巖嶂重復岡巒左右青霞起而照天白露二本作霧生而匝地餘基隱嶙仍知萬嵗之亭古木摧殘尚變二本作辨三花之樹眀公舊祀棟宇岧堯仙女層臺風煙爛熳文粹作漫軒轅之訪大隗二本作塊非先求牧馬之童太一之微少君直下乘龍之使夫峻極也天地因而㑹昌夫降神也景福由其興作於是乎昭之以眀德聽之以和聲可以羞澗溪沼沚之毛可以奠潢汙行潦之水聰眀正直惟鬼神而有知玉帛犧牲在文粹作實陳信而無愧日之吉靈之來霓為旌兮翠為蓋雷為車兮電為䇿鼓之以南箕風嫋嫋而先路潤之以西畢雨冥冥而灑道其始至也若海靜山空曈曈朧朧照白日於扶桑之東其少進也若移星轉漢燦燦爛爛吐眀月於瀛洲之半佩珠玉而的文粹作玓瓅襲羅紈二本作縠而飄颻建晨纓之寶冠踐逺遊之文履命儔兮嘯侣徙倚兮徘徊羣仙畢集衆靈咸至有西華之紫妃有中黃之素女華山之上飛二本作眀星逺燭陽臺之下暮雨潜通或瓊室而文粹作以飛霞或銀臺而薦樂天孫忽降暫停支石之機神女相歡即起投壺之電左侍右衛則甲申之瓊石乙已之蘭蕭妍倡妙妓則憑悅之清歌幽靈之鼓瑟樂章既闋禮容斯備回風兮雲旗入不言兮出不辭荷衣兮蕙帶倐而來兮忽而逝惟神享德降百福而無窮惟嶽配天視三公而有典昔者夏后氏之乘四載仍開宛委之圗周穆王之御八龍猶紀弇二本作春山之石况乎上照下漏天平地成人主宅中旁羅於宇縣山靈顯位密邇於神州豈使令德不傳頌聲寂二本無此字無紀述二本無此字由是三天降䇿有南霍之升文粹作叔儲八丈鐫銘有西王之服道魏國鍾繇之字唯勒嵗年晉家張載之文遂承眀制二本作詔其詞曰上帝有命皇天無親樹之元后以牧蒸民唐諱二本作人光宅六合懷柔百神德成郊祀禮備宗禋其一軒稱配永崑墟帝出堯號則天汾陽詔蹕觀人設教叶時同律有感必通無文咸秩其二皇家啓聖受命于天上鍊五石旁疏百二本作九川開階運斗宅海乘乾王母益地周公卜年其三天子建德重規疊矩聖敬日躋宗文祖武範圍三極和平萬宇率由舊章粵若稽文粹作乩古其四璇宫夜敞銀榜朝開德象隂月聲象二本作符震雷山河翼載文粹作戴星緯鹽梅能事畢矣乾元大哉其五理二本作化定制禮功成作樂日月旗二本作旗常夏殷正朔德溥二本作澤天外文眀地角氣白星黃風搖露濁其六兩京畿甸五載巡逰馳驅太一部列蚩尤將見大隗爰尋許由回鑾躑躅寓目周流其七鬱鬱靈鎮巖巖積石直上五千去天三百帝休非逺真經可覿石室徘徊瓊膏滴瀝其八山唯二本作惟地德神即隂靈瑶姬逐雨玉女隨星隂陽不測黍稷非馨倐忽年代荒蕪廟庭其九旁求祀典載垂天漢二本作渙始制二本作詔林衡俄成壯觀紫柱文粹作挽星錯丹梁霞煥似對青溪如逰集作臨白崖其十文貍赤豹電䇿雷車隱隱中道訇訇太虛遂停龍駕永託神居天回地止霧歇雲除其十一衆靈晱暘文粹作易羣仙容與衡嶽夫人漢濵遊女洛川解珮天河弄杼顧慕招携繽紛儔侣同聲同氣文粹作同氣同聲爰笑爰語其十二于以採蘋南澗之濵于以採藻于彼行潦吉日文粹作日吉兮辰良浴蘭湯兮沐芳揚抱兮拊鼓奠桂酒兮椒漿神其醉文粹作萃止降福穰穰其十三后土神祠碑并序𤣥宗御製張說詞古之王者皆受天命禮樂有權神祗是主郊兆所設雖定於厥居精靈所感則通乎其變一作變化大抵一作匠歸正旁行不流唯創制者為能之亦安在守文而己脽土祠者本魏地鄧邱之舊而漢家后土之宫汾水合河梁山對麓地形惟堀一作堆阜天然詭異隆崛岉以一作而特起忽盤紆而斗絶景象相傳肹蠁如在有物不可以終否有典不可以遂廢故推而行之神而眀之嵗在癸亥始有于兹焉在昔后王時邁省方柴燎告至幽隱胥洎大舜則三一作五載一巡武帝則三嵗一祭古今大變四字一作今時代丕變人神禮煩朕就為損益折以法度一紀冉駕亦無間一作闕焉二十年冬勤兵三十萬一作逾萬騎旌旗徑一作亘千里校獵上黨至于太原赫威戎于朔陲沛一作霈展義於南夏肆覲羣后道有以大備懷柔百神文無而咸秩先是有司宿設恪敬乃事己未師次一作頓于齊宫庚申親祀于后祗聖考在天侑而作主何禮不舉靡神不遍往者漢氏之祠也牲以養牛五嵗璽栗所以貴其誠藉以采席六重藁秸一作秸所以尚其質事與古及一作反義不經見朕因其地而不因其儀取其得而不取其失凡牲幣法物之事歌舞接神之類咨故實於方澤不遂過於元鼎此皆公卿大夫鴻生巨儒獻其方聞匡於不逮朕何有也且王者事天明事地察示有一作其本教以孝奈何郊丘之禮猶獨以祈穀為名者耶於戲享于至誠錫以繁祉黃雲蓋于一作於神鼎降光燭于一作於靈壇自昔己然乃今復見斯固隂精有所寓寶氣為不誣雖寂寥而不動亦動之而斯應顧朕之不德靈感何從賴纍聖儲祉福流所致乃眚災肆赦與物更始大賚天下有慶兆人山川鬼神鳥獸魚鱉莫不允若莫不咸寧此所以承一作仰覆載報生殖資元元盡翼翼豈與夫封禪有牒專在求仙祕祝有辭密于一作於移過而己其銘曰至哉坤元萬物資生王者母事德合天眀義有大報用叶永貞茫茫九土思索其精因天事天因地事地彼汾之曲髙脽傑異景象遺光壇場舊位寂寥一作寞千祀精靈永一作長閟誣神不祥復古惟祺文所無者秩而祭之矧曰后土昔載眀祠何必國一作因隂乃為我師意多漢武跡在橫汾風流可接簫鼓如聞夀宫創制神鼎勒勳古往今來豈無斯文溧陽瀨水貞義女廟碑李白皇唐葉有六聖冉造八極鏡清集本文粹並作照萬方幽眀咸熙天秩有禮自太二本無太字古及今君君臣臣烈士貞女采其文粹有史傳二字名節尤章可激清頽俗者皆掃地而祠之蘭蒸椒漿嵗祀罔缺而兹邑貞義女光靈翳然埋冥文粹作名古逺琬琰不刻豈前修博達者為邦之意乎貞義女者溧陽黃山里史氏之女也以家溧陽史闕書之嵗三十弗移天于人五字文粹作不移其志清英潔白事母純孝手柔荑而不龜身漂擊文粹作激以自業當楚平王時王虐忠助讒苛虐厥政芟於尚斬于二本作於奢血流于朝赤族伍氏怨毒於人何其深哉子胥始來二本作東奔勾吳月涉星遁或七日不火傷弓于飛逼迫于二本作於昭關匍匐於瀨渚捨車而徒告窮此女目色以臆授之壺漿金二本作全人自沉形與口滅卓絶千古聲凌浮雲激節必報之讐雪誠無疑之地難乎哉借如曹娥潜波理貫於孝道聶姊殞肆槩動于天倫魯姑棄子以却三軍之衆漂母進飯沒受千金之恩方之於此彼或易耳二本作爾卒使伍君開張闔閭傾蕩鄢郢吳師鞭尸於楚國申胥泣血於秦庭我亡爾存亦各壯志張英風於古今雪大憤于天地微此女之力雖云為之士亦焉能咆哮烜二本作煊赫施于後世耶望其溺所愴然低回而不能去每風號吳天月苦荆水響像如在精魂可悲備昔集作惜其投金有泉而刻石無主哀哉邑宰熒陽鄭公名晏家康成之學世子産之才瑟清心間百里大化有若主簿扶風竇嘉賔縣尉廣平宋陟南郡陳然丹陽李濟二本此句在上清河張昭皆有卿材霸略同事相協𬗟紀英淑勒銘道周雖陵頽海竭文或不死其詞曰粲粲貞女孤生寒門上無所天下報母恩春風三十花落無言乃如之人擊漂清源碧流素手縈波二本作彼潺湲求思不可秉節而存伍胥東奔乞食于此女分壺漿滅口而死聲動列國義形壯士入郢鞭尸還吳雪恥投金瀨沚報德稱美眀眀千秋如月在水湘源二妃碑栁宗元元和九年八月二十日湘源二妃廟災司功掾守令彭城劉智集作知剛主簿安邑衛之武告于州刺史御史中丞清河崔公能祗栗厥戒㑹羣吏洎衆工發開元詔書懼廢守祀搜考嬴羡均節委積咸執牘律至于祠下稽度既備傭役惟時斬木于上遊陶埴于水涯乃桴乃載工逸事遂作貌顯嚴粲然而威十有一月庚辰陳奠薦詞立石于廟門之宇下唯父子夫婦人道之大大哉一神咸極其㑹為子而父堯為婦而夫舜齊聖並眀弼成授受內若嚚瞽上承輝光克艱以乂德罔不至帝既野死神亦不返食于兹川古有常典驅祓戾孽恢宣淑靈敢或失職以奸天刑有翼其恭有苾其馨沉牲爰告即石是銘銘曰淵懿承聖舜妻堯女德刑媯汭神位湘許揆兹有初克碩厥宇命秩其祀集作唐命秩祀兹邑攸主毛牷既肆栁州本作疈椒馨爰糈𦙍千萬年期保伊祐僣集作替火煽孽炖于融風神用播遷時罔克龔邑令羣吏告于郡公廉用積餘以就爾功桴木負埴載流于江既夷以成崇宇峻墉潔嚴清間左右率從神樂來歸徒御雍雍神既安止邦人載喜奉其吉主集作王以對嘉祉南風湑湑湘水如舞將子無歡神聼鐘鼓豐其交報邦邑是與刻此樂歌以極終古文苑英華卷八百七十八
