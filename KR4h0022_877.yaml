body:
  text: 文苑英華巻八百七十八宋李昉等編祠廟一嵩山啓母廟碑一首少室山少姨廟碑一首后土神祠碑一首溧陽瀬水貞義女廟碑一首湘源二妃碑一首嵩山啓母廟碑崔融臣聞天地生成其法自然之謂道隂陽鼓舞其功不測之謂神然則物或類感事因通變乾棟傾而三光北馳坤輿缺而百川東瀉河淪越儁有郡邑之為魚水䧟歴陽有吏人之化鼈訪遺蹤於女峽風雨蕭條徴往事於始泉絃歌響亮盈虚靡定合散焉常不知誰子既老氏之多懵忽然為人寧賈生之足辯仰觀俯察裁識幽眀之故原始反終未窮死生之説得於道而失於道義有必然出於幾而入於幾理無或廢知變化者其知神之所為乎臣謹按啓母廟者葢夏后啓之母也漢避景帝諱改啓之字曰開厥後相傳或為開母而顧野王輿地志盧元眀嵩髙記並不尋避諱之㫖以為陽翟婦人事不經見諒無所取粤若玉斗璇璣李母之居隣北極金臺石室王母之宅在西山氣為母則羣物以萌月為母則容光必照坤為母則上下交泰后為母則邦家有成故華胥履跡而雄氏孕女登感神而炎運作星流華渚而白帝生月貫幽房而黒精降明眀有夏穆穆塗山子娶於度土之辰女婚於台桑之地搜竒帝紀識一作摭異歸藏束生發蒙而有迷韓子稱賢而不朽漢臣之筆墨泉海陳其令名秦相之一字千金叙其嘉應士歌南國徒聞一作問侯禹之詞石破北方終見生余之兆則郭璞所謂陽城西啓母石李彤所謂嵩山南啓母祠隋巢之説有徴鴻烈之言無爽者矣昔者鸞川之上母變空桑豚水之濵男生破竹羙人之虹名螮蝀仙婦之月作蟾蜍精衛衘木而償寃女尸化草而成殯山崩蜀道臺候婦而無歸石立武昌亭望夫而不及論乎誕載羣下莫尊於帝王語乎遷易凡百無聞於感致羙矣哉不可得而稱也大唐革去故鼎取新與運而生繼天而作握乾坤而造物海内知春闢混沌而為家域中無外天皇膺厯數順謳歌金櫃玉板服皇王之能事衢室廟堂承祖宗之茂烈垂衣裳而作元后端拱北辰負黼扆而朝諸侯嚮眀南面周邦赫赫其道洽於成康漢室巍巍其化鍾於文景東漸西被逺安邇肅海三年而無波雲連月而不散天瑞降地符昇靈鳳五文嵗時来苑囿神龍八卦昏旦㳺池沼禮云乎哉無取於周旋揖讓樂之謂也必在於移風易俗司祿益富家國於是乎有餘司命益年臣人於是乎不夭眀王三懼未嘗遺戒慎之心天子四鄰莫能展弼諧之用家安其業但聽於鄰鷄人得其和遂同於野鹿表䜟記奏河圗四十六事之著眀曷云尚也登太山襌梁甫七十二封之可識何以加乎且夫窮聖神備道徳滋萌元氣開闢太初斯乃天皇氏之所以應乎天也依土地眀神靈駕六羽而上騰交九州而下濟斯乃人皇氏之所以順乎人也造書契教畋漁合五緯而節四時登九天而類萬物斯乃犧皇氏之所以制人法也務播殖該變通嘗藥以救兆人聚貨而交天下斯乃農皇氏之所以興人利也振夔鼓載龍旗天則𤣥女授符帝則黄神降升一作斗斯乃軒轅氏之所以除人害也均度量正都邑惣秋令於金天分瑞官於鳳紀斯乃帝昊氏之所以為人極也潔祭祀義鬼神履時以象天養財以任地斯乃帝頊氏之所以為人教也秋乗馬春乗龍順三辰而天道平建五正而人事理斯乃帝辛氏之所以為人政也眀如日晦如隂人無識其名帝何力於我斯乃帝堯氏之所以昭君徳也聞一善舉八才帝唱動而爛星雲天歌發而蹌鳥獸斯乃帝舜氏之所以章后功也夫三統者道之大五行者生之宗三皇法之而列五帝則之而序道以三興徳以五立非天下之至聖孰能兼於此乎而猶雖休勿休損之又損下眀詔發徳音尊天而重人省方而巡狩舉星畢曳雲稍召風伯以清塵命山靈而䕶野馳洛邑騖壌城天迴而地㳺雲合而霧㳫周穆王来逰太室先徴夏啓之居漢武帝有事嵩邱即訪姒開之石徒觀其丹青嵗古霜露年侵聖情有睠興言改葺其山則古文之外方其地則新邑之中土銘壇邐迤斜分玉女之臺碑闕相望近封石人之廟金草生而五色貝樹長而三花紫雲合㳫於溪澗白霧氛氲於巖嶺考之易林信為神眀所伏求之遁甲固以威靈肅然夫其命有司乗務隙因髙背下察隐嶙之餘基審日觀星揆摧殘之落構周官置臬郢匠揮斤異態神行金模化造紅葩奪日飛累榭於山間綺綴衝風架迴廊於木末仙人在棟神女臨窻周施瑇瑁之椽徧覆琉璃之瓦赤玉為階甃黄金作門闕山如白岸樹似青溪羞蕰藻於前庭籍生芻於後徑蘭香夾水居然洗沐之資竹帚臨風自隔囂塵之境夣臺雲雨宋玉樹而先驚楚璧山川屈原書而幾倦夀宫憺兮不擾象設安兮逾肅霜羅曵曵雲錦披披鴛鴦褥兮翡翠幬白羽扇兮青絲履垂玉鸞之珮若往而若還戴金雀之釵不長而不短其居處也曖曖昧昧隂閉陽開其被服也煌煌熒熒霞駮雲蔚鼎爼則麟胎鳳卵烝蕙燃蓂餌膳則木宻金膏玉漿瓊酒當是時也合五岳訊九魁選太隂命𤣥闕馮夷鳴鼓女媧清歌左蒼龍兮吹箎右白虎兮縆瑟金真拂座玉女焚香肅肅習習天媛来風雨雰雰霏霏神姬下霜雪孔雀飛而儀鳳舞弄玉邀歡軿車合而羅綺陳智瓊陪宴麻姑服道變海水而来逰織婦希風填河津而下謁洛妃綽約江妃綿眇𤣥女以眀月為珠素女以穨雲作髻九天真母八極夫人畢集於兹矣青霞衣兮翠雲裘靈連蜷兮既留車迴風兮馬飛電視倐忽兮無見昔者濟隂山下降堯母之精靈湘川水曲留舜妃之響像壝壇或在徒聞介福之名棟宇不脩誰辯安歌之處豈知夫三仙福地百姓尊祠挾王者之都畿當聖人之順動犧牲玉帛可以洽氣和神㓜婦外孫可以披文相質䖍奉綸㫖式陳壮觀雖周人作詩自得后妃之羙而魏臣獻賦終慙神女之工敢作銘曰九州地險五岳天中蛟龍洞宂日月仙宫蓄洩雲霧震蕩雷風笙歌近接鐘鼓遥通其一其在媯帝洪泉未塞昏墊下人汎濫中國於鑠大禹顯允天徳龍畫旁分螺書徧刻其二佩文北海省土南方還從碣石更下台桑予娶有禮我都攸昌八年不顧四載惟荒其三宛委既登轘轅佇鑿家室誤往熊羆方作天道幽秘生涯紏錯其化則遷其靈是託其四虙妃之館仙女之臺物類通感精魂去来巫山廟立漢水祠開壝壇嵗古棟宇年摧其五皇矣大唐麗哉神聖膺圗受籙體元居正赫赫髙祖天有成命眀明太宗於兹為盛其六重光累洽下武嗣文負扆而化垂衣以君三靈肹蠁六氣氤氲魚鼈咸若雞犬相聞其七重譯請命殊鄰禀朔化及中孚風移大朴天秩百禮人和萬樂汾水可逰峴山何邈其八隋巢舊説夏啓遺居盛徳不泯嘉聲在諸周王轉蹕漢帝迴輿聿懐降鍳其祀如初其九虞衡掌木班倕葺宇虹亘梅梁龍盤桂柱草積庭院水周堂廡石室置儔軒官為輔其十珠簾洞巻玉座含清金翠玓瓅羅縠輕眀儀刑若動侍衛疑生依俙有物惝怳無聲其十一帝子湘川天孫漢曲翩緜縹緲躊躇躑躅神女㺯珠靈妃啓玉倐来忽往星繁電燭其十二壮矣麗矣神之聽之聰眀是屬景福無欺夫人立館㓜婦鐫辭巍巍皇室萬萬餘基其十三少室山少姨廟碑楊炯臣聞崑崙集本文粹並作閬西北之地二本無此字天門也則五帝處其陽陸三王居其正地太集作泰山東南之地二本無此字日觀也則秦皇刻其石銘漢帝探其玉䇿故知建都邑正方位劃文粹作畫崇墉刳濬洫必憑天地之險然後四海為家擁神休尊眀號叶時月同量衡必致山川之祠然後羣神受職少室山者山岳之神秀者二本無此字也憑河圗而括象文粹作地用遁甲以集作而開山發揮宇宙之精噴薄隂陽之氣壁立而千仭削成而四方北臨恒碣猶如聚米南望荆衡財文粹作纔通用同覆簣共工氏觸皇天之八柱未足擬議龍伯人鈞溟海之五文粹作三山無階響像考於含神霧文粹作紐白玉猶存騐於山海經黄花不落其名有序則太室西偏其位可知則嵩髙佐命若乃乾坤之所合雷雨之所交仰躔七星之野俯鎮三河之曲朝市臨於域中樞機正於天下六合交㑹於是二本有乎字有天帝之下都九州名山於是二本有乎字有靈仙之窟宅臣謹按少姨廟者則漢書地理志嵩文粹作崇髙少室之廟也其神為婦人像者則故老相傳云啓母塗山之妹也昔者生于石紐水土所有二本作以致其功娶于塗山室家所以成其徳后宗之位象南宫之一星外戚之班比西京之列傳惟幾不測其道無方騁神變而揮霍降精靈而肹蠁亦猶蔣侯三妹青溪之軌跡可尋虞帝二妃湘水之波瀾未歇何止祠稱丁婦廟號勝二本作滕姑少女宅於西宫夫人舘於南岳山臨白崖空聞石室之靈浦對青崖獨有金臺之異若斯而已矣年文粹作時更魏晉數歴周隋四望於是莫脩八神以之無主炎凉代序寧觀爼豆之容霜露沾衣非復絃歌之地國家乗天造之草昧屬人謀之與能奄有大寳遂登神噐天地水火之無象則女媧氏補之於是乎鍊其五石東西南北之失位則神農氏立之於是乎甄其四海天皇貴與天乎合徳富與地乎侔貨窮變化之道二本作理盡神眀之數伏羲畫卦唯觀鳥獸之文黄帝垂衣葢取乾坤之象利兼於成噐功周於備物瑶臺羙化闡邦國之風猷銀牓嘉聲備集作羙文粹作茂君親之典禮稱才子者八族則叔獻季貍有亂臣者十人則太顛閎夭若夫圓丘方澤所以饗天神地祗複廟重欄所以序文昭武穆命秩宗之位分太宰之官考虞夏之質文定殷周之損益其大禮有如此者髙陽有飛龍之樂始㑹八風帝舜有儀鳳之音初調九奏后夔典其教制氏辨其聲鐘磬笙竽二本作竽瑟致其和尊卑長㓜成其序其廣樂有如此者太㣲營室眀堂布政之宫白獸蒼龍象魏懸書之法下應猶草王言如絲北辰而拱衆星南靣而朝天下其為政有如此者紏萬人者施之以八刑誥四方者戒之以三典畫衣不犯載酒無寃免禽獸於網羅備二本作納寰瀛於軌物其恤刑有如此者周人之養國老始闢西膠漢氏之召諸生初開太學辟雍所以行其禮泮宫所以辨其教二本作政童子三一本作五尺羞談文粹作稱覇后之臣冠者六人唯述眀王之道其文徳有如此者凉風至司馬於是乎陳兵太白髙将軍於是乎宜戰乗斗杓而誓旅出星門而杖鉞荘周稱天子之劍舉之按之吕望言聖人之兵如風如雨其武功有如此者稽其殷室二本作令有文犀利劍之効珍考其周書有兹文粹作諸白乗黄之騁力東漸西被南馳北走盧敖之窮觀六合不出於城堭陶侃之飛入八門未㳺於仙二本作宫室其疆理有如此者察璿璣而平大運天囘地㳺吹玉律而部人時陽動隂静煙雲蕭索而合彩日月淑清而啓旦豈直鳳巢阿閣入軒后之圗書魚躍中舟稱武王之事業其休徴有如此者然則囊括混沌發揮生靈大庭不足使驂乗驪連不足使扶轂可以㑹玉帛可以答靈祗行聖人之大孝既郊祀而宗祀昭帝王之盛節亦因天而事天猶復下聽輿人旁求故實以為唐堯五載無聞太室之儀殷帝八遷未卜王城之地是用陳圭置臬建周后之兩都制二本作詔蹕鳴鑾巡漢王之中岳熒惑先列招摇在上隐天二本有而字動地欱文粹作吹野二本有而字歕山旌旗則日月運行鐘鼓則雷風相薄道伊闕據轘轅怡然肆二本作長望邈乎周覧壮靈山之雲雨仍求載祀之經對閑寝之邱墟思秩無文之禮於是降天渙命司存因其舊跡葺其新廟詳費務議工徒下隴蜀之名材致荆藍之寳玉易者言乎悦使人文粹作民唐諱忘其勞詩者歌乎子来成之不日東西膠葛文粹作較轕南北峥嶸繡栭兮雲楣光照耀兮奪日二本作目桂棟兮蘭橑氣氛氲兮襲人皎日登於綺一作納䟽奔星下於閨闥珠簾瑇匣上髙閣而三休金柱銀檻二本作楹巡歩廊文粹作出長廊集作歩長廊而中宿窮山海之瓌寳盡人神之壮麗豈直文粹作止河庭貝闕俯鏡文粹作馮夷之都洛水瑶壇旁臨虙妃之館爾其巖嶂重復岡巒左右青霞起而照天白露二本作霧生而匝地餘基隐嶙仍知萬嵗之亭古木摧殘尚變二本作辨三花之樹眀公舊祀棟宇岧堯仙女層臺風煙爛熳文粹作漫軒轅之訪大隗二本作塊非先求牧馬之童太一之㣲少君直下乗龍之使夫峻極也天地因而㑹昌夫降神也景福由其興作於是乎昭之以眀徳聽之以和聲可以羞澗溪沼沚之毛可以奠潢汙行潦之水聰眀正直惟鬼神而有知玉帛犧牲在文粹作實陳信而無愧日之吉靈之来蜺為旌兮翠為葢雷為車兮電為䇿鼓之以南箕風嫋嫋而先路潤之以西畢雨㝠㝠而灑道其始至也若海静山空曈曈朧朧照白日於扶桑之東其少進也若移星轉漢燦燦爛爛吐眀月於瀛洲之半佩珠玉而的文粹作玓瓅襲羅紈二本作縠而飄颻建晨纓之寳冠踐逺㳺之文履命儔兮嘯侣徙倚兮徘徊羣仙畢集衆靈咸至有西華之紫妃有中黄之素女華山之上飛二本作眀星逺燭陽臺之下暮雨潜通或瓊室而文粹作以飛霞或銀臺而薦樂天孫忽降蹔停支石之機神女相歡即起投壺之電左侍右衛則甲申之瓊石乙已之蘭蕭妍倡妙妓則憑悦之清歌幽靈之鼓瑟樂章既闋禮容斯備囬風兮雲旗入不言兮出不辭荷衣兮蕙帯倐而来兮忽而逝惟神享徳降百福而無窮惟岳配天視三公而有典昔者夏后氏之乗四載仍開宛委之圗周穆王之御八龍猶紀弇二本作春山之石况乎上照下漏天平地成人主宅中旁羅於宇縣山靈顯位宻邇於神州豈使令徳不傳頌聲寂二本無此字無紀述二本無此字由是三天降䇿有南霍之升文粹作叔儲八丈鐫銘有西王之服道魏國鍾繇之字唯勒嵗年晉家張載之文遂承眀制二本作詔其詞曰上帝有命皇天無親樹之元后以牧烝民唐諱二本作人光宅六合懐柔百神徳成郊祀禮備宗禋其一軒稱配永崑墟帝出堯號則天汾陽詔蹕觀人設教叶時同律有感必通無文咸秩其二皇家啓聖受命于天上鍊五石旁疏百二本作九川開階運斗宅海乗乾王母益地周公卜年其三天子建徳重規疊矩聖敬日躋宗文祖武範圍三極和平萬宇率由舊章粤若稽文粹作乩古其四璇宫夜敞銀牓朝開徳象隂月聲象二本作符震雷山河翼載文粹作戴星緯鹽梅能事畢矣乾元大哉其五理二本作化定制禮功成作樂日月旗二本作旂常夏殷正朔徳溥二本作澤天外文眀地角氣白星黄風摇露濁其六兩京畿甸五載巡逰馳驅太一部列蚩尤将見大隗爰尋許由迴鑾躑躅寓目周流其七欝欝靈鎮巖巖積石直上五千去天三百帝休非逺真經可覿石室徘徊瓊膏滴瀝其八山唯二本作惟地徳神即隂靈瑶姬逐雨玉女隨星隂陽不測黍稷非馨倐忽年代荒蕪廟庭其九旁求祀典載垂天漢二本作渙始制二本作詔林衡俄成壮觀紫柱文粹作挽星錯丹梁霞煥似對青溪如逰集作臨白崖其十文貍赤豹電䇿雷車隐隐中道訇訇太虚遂停龍駕永託神居天迴地止霧歇雲除其十一衆靈晱暘文粹作易羣仙容與衡岳夫人漢濵㳺女洛川解珮天河弄杼顧慕招携繽紛儔侣同聲同氣文粹作同氣同聲爰笑爰語其十二于以採蘋南澗之濵于以採藻于彼行潦吉日文粹作日吉兮辰良浴蘭湯兮沐芳揚抱兮拊鼓奠桂酒兮椒漿神其醉文粹作萃止降福穰穰其十三后土神祠碑并序𤣥宗御製張説詞古之王者皆受天命禮樂有權神祗是主郊兆所設雖定於厥居精靈所感則通乎其變一作變化大抵一作匠歸正旁行不流唯創制者為能之亦安在守文而己脽土祠者本魏地鄧邱之舊而漢家后土之宫汾水合河梁山對麓地形惟堀一作堆阜天然詭異隆崛岉以一作而特起忽盤紆而斗絶景象相傳肹蠁如在有物不可以終否有典不可以遂廢故推而行之神而眀之嵗在癸亥始有于兹焉在昔后王時邁省方柴燎告至幽隐胥洎大舜則三一作五載一巡武帝則三嵗一祭古今大變四字一作今時代丕變人神禮煩朕就為損益折以法度一紀冄駕亦無間一作闕焉二十年冬勤兵三十萬一作逾萬騎旌旗徑一作亘千里校獵上黨至于太原赫威戎于朔陲沛一作霈展義於南夏肆覲羣后道有以大備懐柔百神文無而咸秩先是有司宿設恪敬乃事己未師次一作頓于齋宫庚申親祀于后祗聖考在天侑而作主何禮不舉靡神不徧往者漢氏之祠也牲以養牛五嵗璽栗所以貴其誠藉以采席六重藁稭一作秸所以尚其質事與古及一作反義不經見朕因其地而不因其儀取其得而不取其失凡牲幣法物之事歌舞接神之類咨故實於方澤不遂過於元鼎此皆公卿大夫鴻生鉅儒獻其方聞匡於不逮朕何有也且王者事天明事地察示有一作其本教以孝柰何郊丘之禮猶獨以祈糓為名者耶於戱享于至誠錫以繁祉黄雲葢于一作於神鼎降光燭于一作於靈壇自昔己然乃今復見斯固隂精有所寓寳氣為不誣雖寂寥而不動亦動之而斯應顧朕之不徳靈感何從頼累聖儲祉福流所致乃眚災肆赦與物更始大賚天下有慶兆人山川鬼神鳥獸魚鼈莫不允若莫不咸寧此所以承一作仰覆載報生殖資元元盡翼翼豈與夫封禪有牒專在求僊秘祝有辭宻于一作於移過而己其銘曰至哉坤元萬物資生王者母事徳合天眀義有大報用叶永貞茫茫九土思索其精因天事天因地事地彼汾之曲髙脽傑異景象遺光壇塲舊位寂寥一作寞千祀精靈永一作長閟誣神不祥復古惟祺文所無者秩而祭之矧曰后土昔載眀祠何必國一作因隂乃為我師意多漢武跡在横汾風流可接簫鼓如聞夀宫創制神鼎勒勲古往今来豈無斯文溧陽瀬水貞義女廟碑李白皇唐葉有六聖冄造八極鏡清集本文粹並作照萬方幽眀咸熈天秩有禮自太二本無太字古及今君君臣臣烈士貞女采其文粹有史傳二字名節尤章可激清頽俗者皆掃地而祠之蘭蒸椒漿嵗祀罔缺而兹邑貞義女光靈翳然埋冥文粹作名古逺琬琰不刻豈前脩博達者為邦之意乎貞義女者溧陽黄山里史氏之女也以家溧陽史闕書之嵗三十弗移天于人五字文粹作不移其志清英潔白事母純孝手柔荑而不龜身漂擊文粹作激以自業當楚平王時王虐忠助讒苛虐厥政芟於尚斬于二本作於奢血流于朝赤族伍氏怨毒於人何其深哉子胥始来二本作東奔勾吳月渉星遁或七日不火傷弓于飛逼迫于二本作於昭闗匍匐於瀬渚捨車而徒告窮此女目色以臆授之壺漿金二本作全人自沉形與口㓕卓絶千古聲凌浮雲激節必報之讐雪誠無疑之地難乎哉借如曹娥潜波理貫於孝道聶姊殞肆槩動于天倫魯姑棄子以却三軍之衆漂母進飯沒受千金之恩方之於此彼或易耳二本作爾卒使伍君開張闔閭傾蕩鄢郢吳師鞭屍於楚國申胥泣血於秦庭我亡爾存亦各壮志張英風於古今雪大憤于天地㣲此女之力雖云為之士亦焉能咆哮烜二本作煊赫施于後世耶望其溺所愴然低回而不能去每風號吳天月苦荆水響像如在精魂可悲備昔集作惜其投金有泉而刻石無主哀哉邑宰熒陽鄭公名晏家康成之學世子産之才瑟清心閑百里大化有若主簿扶風竇嘉賔縣尉廣平宋陟南郡陳然丹陽李濟二本此句在上清河張昭皆有卿材霸略同事相恊𬗟紀英淑勒銘道周雖陵頽海竭文或不死其詞曰粲粲貞女孤生寒門上無所天下報母恩春風三十花落無言乃如之人擊漂清源碧流素手縈波二本作彼潺湲求思不可秉節而存伍胥東奔乞食于此女分壺漿㓕口而死聲動列國義形壮士入郢鞭尸還吳雪恥投金瀬沚報徳稱羙眀眀千秋如月在水湘源二妃碑栁宗元元和九年八月二十日湘源二妃廟災司功掾守令彭城劉智集作知剛主簿安邑衛之武告于州刺史御史中丞清河崔公能祗栗厥戒㑹羣吏洎衆工發開元詔書懼廢守祀搜考嬴羡均節委積咸執牘律至于祠下稽度既備傭役惟時斬木于上㳺陶埴于水涯廼桴廼載工逸事遂作貌顯嚴粲然而威十有一月庚辰陳奠薦詞立石于廟門之宇下唯父子夫婦人道之大大哉一神咸極其㑹為子而父堯為婦而夫舜齊聖並眀弼成授受内若嚚瞽上承輝光克艱以乂徳罔不至帝既野死神亦不返食于兹川古有常典敺祓戾孽恢宣淑靈敢或失職以奸天刑有翼其恭有苾其馨沉牲爰告即石是銘銘曰淵懿承聖舜妻堯女徳刑媯汭神位湘許揆兹有初克碩厥宇命秩其祀集作唐命秩祀兹邑攸主毛牷既肆栁州本作疈椒馨爰糈𦙍千萬年期保伊祐僣集作替火煽孽炖于融風神用播遷時罔克龔邑令羣吏告于郡公㢘用積餘以就爾功桴木負埴載流于江既夷以成崇宇峻墉潔嚴清閑左右率從神樂来歸徒御雍雍神既安止邦人載喜奉其吉主集作王以對嘉祉南風湑湑湘水如舞将子無讙神聼鐘鼓豐其交報邦邑是與刻此樂歌以極終古文苑英華巻八百七十八
