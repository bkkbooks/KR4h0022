body:
  text: 文苑英華卷三十九宋李昉等編水八玉壺氷賦一首氷壺賦二首漢光武渡滹沱氷合賦一首履薄氷賦二首履霜堅氷至賦一首藏氷賦一首開氷賦一首東風解凍賦一首陽氷賦一首玉壺氷賦以堅白貞虛作人之則為韻壺至潔玉至鮮有若君子清標儼然色澄澄而外徹質規規而內圎月出皎兮入夜而其儀難見氷以風壯處寒而其實逾堅諒負竒而可玩超衆器而為先當其韜光幽山韞耀窮石隱榛蕪而懷寶淪泥滓而藏白如虹之氣雖無謝於雲煙抵鵲之鄉常見儔於瓦礫於是卞生見而神動匠氏聞而心惜乃奮剖刻耀精明以玉之美作壺之形信無瑕之可用若不琢兮何成以虛而受逹人侔其𢎞量以明而鑒志士效其淸貞若其稟性溫如作器含虛正色則惟珍是務立操則匪貞不居爾乃嚴氣凝玄隂作寒飇一振具物寥索川皛皛以凌滿林稍稍而木落日既暮兮金閨寂夜一寒兮玉壺陳素氷滿腹清光照人臨象筵而色媚入金鏡而影新對之者暢慮觀之者清神能勵貪夫何假盤盂之戒有同儒士長為席上之珍是以隨珠奪魄趙璧慙姿瑚璉之器斯實為之美人曽不足方其皎潔錦衾亦安敢誇其陸離偉夫掩物之美比人之德素其表兮其儀不忒實其中兮秉心淵塞伊烈士之指南固賢人之軌則氷壺賦以清如玉壺氷何慙宿昔意為韻陶翰惟氷也有堅凝之貞惟壺也有虛受之明謝周流之弱質託鎔鑄以成名直方任器規圓愜情對光輝而比色因擊扣而馳聲氷假壺以為用壺含氷而轉淸及夫歡呈朝晏之餘瑞表經綸之初尤荀吳之失對陷王霸之後車既遇賞以為樂乃獲成於所如但觀夫推移在道澄徹如玉時見瑩而則明或將摧而不曲故曰氷貴於水器尊者壺國因時而必用軍每擊而何虞若乃周將酬客魯欲藏氷揖籍父其何忌顧申豐而可慿是以用之者廣須之者多遇薛鼓而擊誦豳詩而何至時氷銷滴潤壺罄成酣乃挾纊以荷德豈知漏而興慚昔者趙衰從徑魏主其逐雖有餒而仍携顧無麋而未宿每覽餘軌當思踐迹志未吐於平生容已衰於疇昔儻開氷之可薦庶投壺而無斁况霜空且寒晚景仍墜雖杼軸而不輟猶髣佛而無記將投皎潔之姿願假含容之意第二同前韻崔損炯乎太陽之精玉有真質氷則貞清我君子象諸溫如皎如正其色兮匪真不克峻其節兮匪貞不居爾其製盤盂訪結緑瞻白虹之氣詠生芻之束乃賦于他山攻此良玉剡之成器錯以成壺信以旁逹忠不掩瑜以虛而受用當其無及乎嚴律閉隂氣升氛霧結河海凝沙驚鴈塞雪滿崤陵於是天景初夕玉壺始氷臨象筵而孤映對金鏡而相澄爾其淋漓未泮溫潤而瑳纎光不隱毫末不過豈爾瑕之可匿玷之可磨不然珉之衆矣貴玉者何心之潔矣飲氷則那莊氏寓論宣父式談夜光奪魄明月懷慚豈比夫立槩生操激淸勵貪伊至人之比德同貞士之司南夫以物象所鑒精明所蓄霜華晨清月影寒宿故覽之者魂竦慿之者慮惕逮北風之已壯幸西陸之未覿客有撫而歎曰猗歟猗歟吾無是易且漏巵無當兮歎諸古大圭不琢兮聞諸昔曷若兹器之可佳諒君子之𢎞益然後宣其烈贊其意抽毫命簡賦氷壺之盛事漢光武渡滹沱氷合賦以上天無親惟德是輔為韻獨孤及昔漢光武收河北之年馳馬將進滹沱在前為敵所迫當氷不堅及軍裝隱轔以登岸殺氣峥嶸而塞川意者欲定神器於兹日彰聖人之動天若非使不道者喪有德者王則水不能以造次而結氷不能以斯須而壯變浩浩之流為峩峩之狀擁高旌以進雷長轂以上及企路以全軍又迎風而破浪于時進隔關于長津顧邀遮其後塵患勢莫之敵沒不可振求一徑而莫遂惟羣臣之不親賴王霸至誠之力協光武至聖之德人從悅己之詐天贊勤王之直故得舟楫不設衣裳不濡避地以往乘氷以趨一水之上兩軍相殊使後人視水則有求氷則無望飛塵而惆悵對寒流而踟蹰由是知天人之合發與神祗而相符不然則何以延十二之祚總四七之輔滅新室毒流之日作漢氏中興之主受命之瑞也亦何異玄女降於軒轅白魚躍於周武此下未見惟字官韻燕趙之間清流瀰瀰髙風以逺遺躅於是履薄氷賦以戒慎之心如履氷上為韻皇甫湜氷之積也不厚人之履也難任此焉投足可為寒心彼墊溺之攸慮在恐懼而誠深慎同數馬之人然非萬石誡若倚衡之子不以千金水始凝氷未壯乏六尺之為厚非七月之所尚螽斯之股兮猶且不同齊人之紈兮曽無以况雖鞠躬而欲涉何跬步之能抗有同居纍卵之危無殊坐積薪之上股栗兮在兹魂驚於所之怵惕求前豈人心之難測趦趄有畏類狐性之多疑每縮縮而若墜常兢兢而自持與巢幕兮焉比將臨泉兮是擬丈夫不處斯畏其沒身夫子所懲不惟於滅趾徐子忘其故步尚書越其素履行自失於佻佻舄無施於几几視之豈無履而若虛非北陸積堅之始是東風所解之餘水蟲隔而纎鱗必露秋蟬比而輕翼不如當履道未成其難汔濟縱善行無迹不可躊躇兢慎圖其不敗震懾謂其將壞步搖搖爾式彰君子之行身飄飄然誰謂邑人不戒如何克己若此履氷與習坎而相類符執玉而可懲故疊足是虞側身以進言忘足履之適自近亷隅庶藏心腑之中無貽悔吝得過隕易危之吉靡濡首失容之釁行之止於三思戒實先於六愼第二同前韻氷之薄兮消釋可期人之履兮憂患是持將秉心於處險諒投足而增疑故君子假輕重之喻為安危之資跬步未移顧見吉凶生矣躊躇欲泮行觀左右流之是以義比垂堂戒同狎水乍兢兢而股戰時剡剡而屨起步難免於褰裳憂有甚於濡履則知吉凶繫乎物動靜由乎己不敢不蹐雖厚地而莫安時止時行固輕氷之可以故知我者見我戰戰兢兢不知我者謂我視川若陵既無咎於素履尚可期於積氷或北陸初結或東風始興覩之也知其脆易破涉之也恐其任不勝由是屏氣而行虛心而進在陽敢思乎不冶海賦陽氷不冶通隂庶懷乎克慎身若重於千鈞氷疑銷於一瞬憂心展轉危步虛徐空色不分每疑於滅趾氷容無響或遠於曵裾將釋兮畏明君之渙若其行也懼大易之屯如然則觀薄氷之為象知立身之所尚類將墜於焦原之前如待燃於積薪之上始玲瓏而若盡復皎皛而可望就其淺玉石無以隱其輝臨其深魚龍不能掩其狀大矣哉其薄斯在其虞則深將以戒乾乾於終日持惕惕之小心當見晛而或躍懼霜霰之未任故曰古之機言今之攸戒儻所行而不惑俾處薄而勿壞履霜堅氷至賦以君子之道暗然而日章為韻王起霜之履兮白商應氷之堅兮玄律分其履也結之寒露其堅也矗若長雲當萬物始挫之時降於青女及六尺凝寒之日可薦明君信履微而至著宜布象於前聞乃若嵗如何其夜亦秋止稜稜稍結兢兢未履漸皚皚於葛屨之下將皎皎於玉壺之裏雖嚴凝作氣必納於輿人而愴悽動容先感於君子此謂履霜之始暨夫變化無朕堅剛有期律移緹幕之候辰當黑帝之司由是璀璨無積清明自持則豐山古鐘不舂容而鳴矣鄴臺舊井可皎潔而藏之此所謂堅氷之時也霜之飛兮至微氷之潔兮自保所以通變其德所以馴致其道畜峩峩之色且寒於長河改丁頰反早霜也之光寧留於徑草凝冷兮漸滋積素兮斯瞰始落金波之上有助其明終藏隂室之中不欺於暗氷因乎厚地霜本乎高天何質變而增勵何節窮而更妍亦由洪因纎起高以下先投一迹而千里路極覆一簣而九仭功宣則求己者知霜氷之言理有漸周身者知霜氷之防於未然固宜研精屑屑覃思乾乾豈玩蒹葭蒼蒼之色鑿山谷沖沖之堅哉士有錯綜文房琢磨儒術以修詞為履霜也不同於豺祭之辰以干祿為堅氷也不同於狐聽之日願察言而觀行儻循名而責實况乃良牧煌煌近天子光引凝隂之義為勸學之方則因卑致崇匪一朝一夕為大於細在日就月將然後知作者之微旨嘉言孔彰藏氷賦以堅明潔鏡為韻張皓國之造物時惟用天履在嵗之窮紀知層氷之腹堅可以備用凌人主焉羞秬黍以為薦率司寒而是先於是入坎窞踰崢嶸乍逼側以經險復趦趄而不征爽氣旁逹凝隂上清始峩峩而不見遽沖沖而有聲是伐是取登乎上京候朝風而益壯對夜月而俱明崇凌既啓隂井方泄含玉色而轉深拂霜威而逾潔不劘不劂如磋如切掩下方以涸沍匪上騰之發泄方見象於為寒且多驚於內熱顧惟不佞括結成性彼蓄物以俟用亦何異乎藏氷將有冒於嚴凝豈見遺於水鏡開氷賦王起國家順仲春之律開藏氷之室將以均寒暑分老疾北風始壯且納於必周西陸有期因用而斯出是時木德司辰條風報春物惟求舊令乃謀新有頒氷之職有伐氷之臣安得深藏於重壤自當登御於一人有司奉明詔一作誠薦清廟啓其室觀其徼連鍤既下不作沖沖之聲厚土忽開已發峩峩之照獻羔之禮既宣祭韭之義克全將使隂不伏陽不愆詎有東風之解莫移北陸之堅皎潔兮玉壺乍奪清瑩兮金鏡爭鮮鑒乎其中雖臨深而履薄積于其外終嶽峙而峯連此輿人之所納縣人之所傳乃祓以桃弧升於蘭殿凌隂去而寒盡御座來而春變其為利也溥其為用也遍羣寮是錫足以表鴻恩百祀方修足以成嘉薦向若藏之不以宜啓之不以時自然光而不耀貞以自持同土石而棄矣何賔祭而用之德既自此宣政亦自此審禦霜雹以清沴調風雨而成稔開五色之瑞福應方來叶七月之章頌聲曷寢豈惟求履霜之堅思積水之凛氷之開也在於人氷之用也進於君昔時司寒雖蒙於幽閉今將清暑終見於區分儻不遺於兹日期不掩於前聞東風解凍賦以立春之日氷凍銷釋為韻韋充三陽布萬物新攝提建月勾芒御辰惟東風之解凍明下土而知春於是嗣木德遊水濱拆涸沍開奫淪始自震而發迹終習坎而成仁原夫其始也出大塊乘新律度暗川經暖日積習習之淑氣散峩峩之素質順流而委想銀河之漸傾逐吹以分訝瑶池之漸失飄然既至颯爾攸興潛融積溜暗斷輕氷自太蔟氣生功因入律悅中流而瓦解聲若裂繒不疾不徐如考如擊動輕澌於皎潔上遊鱗於磧礫未分蘋末疑馮夷之剖蚌胎稍辨波心若荆山之流玉液意同攻陷勢若刳剔何虎嘯之威方微信狐疑之心已釋羊角既止蟬翼潛銷表一嵗發生之候當三春啓蟄之朝鼓怒斯至徘徊遽飄圓折之時初疑破鏡亂流之處盡若回潮斯以見寒暑不愆推遷屢急何一氣之自噫信百川而皆及導仁為煦決滯之義則深以德而和陷堅之功斯立當其晴流漸泮麗景初馳飄忽既及凝滯無遺狀曉河雲卷之初忽其明矣若太素氣分之際難可辨之是知天地既春欣榮者衆將以遂於羣性不獨釋於積凍然後驅飛亷命羲仲俾風日之可遊冀臨川而必中陽氷賦以海上沙前光耀清景為韻林滋考庶物於朱垠得陽氷於碧海託巨浸以潛結泛驚波而長在堅乎自得峩峩之素色寧虧渙若無虞皎皎之清光詎改始其孕太隂之精因積水而成徑颼飀之逺吹澄滉漾之餘清别浦宵凝狐聽之聲乍絶回汀曉合蟲疑之質俄生繇是外肅重溟中分萬景滄淵掩巨蚌之魄碧落奪寒蟾之影幽疑玉樹露皓氣之皚皚淨若銀河亘秋光之耿耿既叶數九寧將屢遷乍瑩洪濤之末時明緑岸之前不解東風諒難資於履薄非藏北陸復何患於攻堅炎炎之畏景雖臨冽冽之寒威益壯皓輝想氷始之日洞徹得夏頒之狀鮮飇乍觸無慙於雲母屏中纎翳不生曷愧於琉璃地上淨拂霜影輕籠月華稟質苟因於涸沍分形詎委於泥沙既異在隂彩射鮫人之室非同向晦光寒漁父之家至若浪息遙川煙收遠嶠焱晶鑠野以增熾皓色澄空而引耀清含上善曽無泮渙之期素激中流豈憚赫曦之照所謂出自靈長居然異常苟惟貞而是守雖盛暑其何傷亦由抱素者絶陷已之患履道者為終身之防幸消釋之無日庶永託於朝光文苑英華卷三十九
