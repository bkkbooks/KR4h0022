body:
  text: 文苑英華卷四十三宋李昉等編帝德三君臣同德賦一首垂衣治天下賦一首信及豚魚賦一首王言如絲賦一首舜有羶行賦一首舜歌南風賦一首禹拜昌言賦一首木從繩賦二首王者父事天兄事日賦一首君臣同德賦失名曰若稽古巨唐纍聖重光盛烈貫於千古英聲超於百王爾乃羣瑞呈祥衆靈叶慶神降休祉天垂寶命鳳籙於是荐臻龜書以之疊映萬姓欣東戶之日一人奏南風之詠至矣哉微無德而稱焉臣聞非常之主必有非常之臣是以元凱升而唐德茂稷卨用而虞化淳武丁夢徴兮求版築之士文王卜兆兮得垂釣之賔豈直星精之誕方朔維嶽之降甫申故能殷周歎其多士皇漢歌其得人亦有九合稱齊三分號蜀猶傳善政尚留芳躅方鴻翼以濟時比魚水而敦俗誠小國之邊鄙亦順時而自足豈若我聖明之有天下也總六合以為家籠八荒而建國既垂拱而敷化諒偃兵而興德為百代之規模立萬邦之軌則於是大君端冕而多暇羣臣奉職而有方巍巍蕩蕩濟濟鏘鏘咸有一德視人如傷䕫龍在位鵷鷺成行君臣同德而均美聖母臨人而永昌豈徒超五臣而逾十亂固將六五帝而四三皇小臣微淺才智疏越濫吹紫庭獻賦絳闕敢同輿頌竊為歌曰元首明哉股肱良哉盛德至矣大業廣矣我一人兮化無窮臨萬國兮道既融同心同德君聖臣忠子子孫孫永代克隆垂衣治天下賦以聖理無為道光前古為韻失名天眷唐帝恭承永命守無事為至德彰不言為大令當寧而百蠻自賔垂衣而八極居正當書軌以混合系祖宗而作聖治契無外人羞有為戴北極以定位比南山而一作之不移皇皇焉儼六服以御㝢燭燭焉虛四聰而聽卑備其文火龍回帶以如動藏乎用天地成功而不知與區夏再造俾古今同道靜以虛襟固其大寶儲精而雲鬱冠蓋恭已而耀生黼藻故能追軒皇躡陶唐文物周衛邦家有光颯祥雲乎五彩蟠瑞氣於六章豈徒具飾乎領袖亦以權量乎圓方是知垂拱者古之難委裘者聖之㫖蓋與神合寧將智使不然何以酌天心安地紀一家之大無煩車馬以巡遊九重雖深盡見山川之疆理所尚者形神不拘清淨為徒體安以一襲道洽於三無俟時不在於顛倒致美何傷乎曳婁于時天淨泰階城開外戶應星精以列將動嶽神而生輔楚製者分閫而守封縫掖者坐帷而論古纊未周而如挾衮有闕而咸補德既昌焉不亦宜然蓂出豈勞於問厯山呼無待於卜年凝旒而惠澤潛布斂衽而皇風靡前與三五爭步驟微臣亦迷其後先信及豚魚賦以聖朝道孚微隱為韻封孟申皇帝奉天心執人柄自毛羣之賤品及水族之微命咸安其生各遂其性小既化矣諒庶物以歸知大亦宜然由一人之有慶允所謂法中孚以立極體渙汗而施令其信也符天之不言其德也與道際其聖徒觀其行藏出處安逸逍遙時乃上氷且不爽於春候時乃登俎幸見録於清朝何政令之不誠何性命而不保清瀾自適則樂我深泉行葦不傷則樂我豐草趨時者保去留之性默處者契雍熙之道懿夫堯之為理路行皆如此二字一作孚比易之取象叶義必同塗物苟在微則豈唯豚爾類苟在隱則何必魚乎可謂德侔造化道泯虛無無逺不均將由夫大而不約何幽未及詎同彼小且未孚穆穆巍巍我后垂衣域已臻於仁壽信乃及於賤微恣彼噞喁在安流而長逸睹其膚革與至道而俱肥斯可以見聖皇軌物誠理是非奚獨龜龍假而表瑞麟鳳降而增輝而已哉士有象既得而言欲忘信已誠而行庸謹安貞誓於期耄慎獨稟乎齠齔觀光上國感豚魚之以孚願仕清朝匪巖穴之可隱王言如絲賦以有云如絲演若綸組為韻謝觀君言之重兮發彼加人如絲之細兮出已成綸將植樞機之本必滋秒忽之因初具體而微降一句之繩凖俄觸類而長入百司而縷陳是知作彼紀綱從而推闡密㫖欲布殊私以展透冕旒以尚細入鈞衡而漸演及爾如貫審知詞理綿綿搏之則微益見言密繭繭且夫謂至密而已著將未聞而已聞遂意淫繹隨聲糾紛無類而洪纎起散有條而派脉别分離一庭之間聽皆歷歷出九門之外逺已云云是故遐邇羈縻上下聮絡毛舉之讚是恤蠶食之誠詎作詔多事而折藕難比寫綢繆而曳緒不若遇終軍之一請便吐長纓後龔遂之載言俄陳亂索不同抱布而取詎等茹柔而吐孜孜下問義同小往大來軋軋若抽事符以索繼組不可卷也引而伸之不滯異維舟之紼無㸃殊墨子之絲與奪而起於分寸傾危而失在毫釐夫如是上言也不可不精下聞也不得不受知駟足之難及保三緘之可守語不惰而寰宇歸心思無邪而蠻夷稽首可以網羅八表可以倫貫九有然後緝熙不紊條章有餘自契不言化矣豈假聞斯行諸方知微細之喻也敢願戒慎之所如舜有羶行賦以天下歸之如蟻慕肉為韻謝觀肉不愛蟻蟻自來依舜不求人人自來歸爾則以羶生嚮慕我則以思深惻疑作測微祁祁子來竟歡懷於德飽侁侁類聚各霑濡以家肥是以取喻於彼欲明於此播薰風於酷烈比黎庶於螻蟻溫恭允塞諒不阻於幽微𤣥德升聞固無間於遐邇是故四海分㑹千門競追共仰來蘇之日誠非逐臭之時以孔甘為味以潤下為脂率從其㫖爰度乃私應其欲而徇矣思所利而瞰疑作噉之各竭血誠汝則如饑如渴無勞肉視吾乃龍章鳳姿載求而羶不在身三嗅而羶不在服在乎安長幼資亭毒行葉揚芳言蘭芬馥以膏腴及萬姓萬姓熙熙以霈澤滂四門四門穆穆咸遂其性各安其族並飲其風順雨調豈止於觴酒豆肉若乃望之如日戴之如天不銷不歇沛然靄然如此乃聞羶者焉如或失之於上迷之於下四罪之徒三苖之野如此乃聞羶之者喻既斯大義豈憑虛以心求芬芳者得以鼻求芬芳者疏自發德馨之惠寧同乳臭之餘服媚嫓之而孰可芬香擬之而豈如由是蒸黎子來蠻夷蟻附八方咸戴其照育九土共臻其道路惠然若歸往也如慕煥重瞳而日月清朗齊七政而恩威布濩至矣哉巍巍堂堂可謂承天有裕舜歌南風賦以能感和樂生殖羣物為韻楊乃巍巍舜德于今人稱居北極而惟大歌南風以敷宏歌之伊何制絲桐而合奏風之至矣信長育而有徴兹可謂無為而自理天縱而多能美夫誠發深衷物能應感憫沃瘠之勞逸均隂陽之舒慘是用作則於世利之孔多風詠凱兮美萬物之蕃衍樂操琴也佳五聲以同和復而不厭逺而匪他方將煦嫗之為意豈徒娛樂於斯歌觀其發宫應徴揚清激濁自南習習同詩人喻彼棘心入夜泠泠異貧士叩其牛角則知聖人審音以知政化俗而作樂者有矣夫懿其出乎幽谷應以繁聲若雲龍之潛召同律吕之相生萬籟動八音清匪鳴條而扇物方靡草而作程是以人荷時康功歸帝力四氣以之而不撓百穀從兹而蕃殖節有度守有則始從邇而及逺終自南而徂北爾乃匪徐匪疾乍過乍聞颯颯輕音疑少女之初至泠泠餘韻謂别鶴之求羣亦為父母之罔極何必聲變而成文是以德冠百王致成萬物正南面而恭已懋功千載不咈禹拜昌言賦以聖人之心聞善必拜為韻失名大禹君臨勤求意深苟一言之入耳必載拜以明心蓋以勵華夷形古今所以㫖酒盈前莫縱彈絲之響美詞將貢俄聞撼玉之音豈不以詢彼芻蕘防乎驕逸既可大而可久亦無固而無必所以嘉謀乍聽當嶪嶪以折腰直語才聆復䖍䖍而屈膝蓋以廣乎所見求其所聞欲使善惡之源自别賢愚之路斯分况乎傳舜之規受堯之命得不固社稷根本察風俗利病是以臣不能諫君兮非曰忠君不能納諫兮非曰聖執至理以垂教採昌言而化人苟有言可佐王道正人倫陶也不得不進禹也不得不遵所以聞妙略以開容拖冕旒而拂地覽宏謨而致敬低珩珮以鏘身懼溝洫之未通憂禮樂以將壞以正直為龜鏡以忠讜為規戒是以藴昌言兮不可不陳聞昌言兮不得不拜遂使共守丕業上光帝基若魚水相逢之日同雲龍㑹合之時符郊畤以陳儀固難比矣望竹宫而設禮曷可方之我皇紹九聖之雄圖舉百王之令典急於求士樂於聞善所以獻昌言之忠臣必待之台鉉木從繩賦以聖君順諫如木從繩為韻王起惟山有木惟木從繩繩舒卷而克正木堅貞而有憑杞梓未分規矩假之以冥立斧斤斯運曲直欺之而不能古人以政有得失俗有廢興因納諫之善喻為針闕之明徴當其懿匠貟來瑰材旅進既陳之以糾纆將加之以霜刃掌握初縈綢繆忽振尋尺曳而愈出分銖算而底慎則椓之橐橐既砥平而履端伐之丁丁亦木開而委順則明正不得不受曲直不得不容如獻替於百度宜啓沃於九重繩墨之間既無違於目巧君臣之際固宜警其面從然則上達四聰下延五諫比斯木之猶惑待斯繩而作限廣狹有凖短長無間自然巨川舟楫何虞沈潛之憂大厦棟梁不貽壓覆之患有條不紊兮其功有餘舉直錯枉兮可以行諸既爰究而爰度亦匪疾而匪徐向若置而不用藏而不舒我有梓材坎坎之聲奚自我有剞劂恢恢之刃焉如裊裊緒抽綿綿繦屬比朱絲之在琴瑟若飛流之界山谷裁成廊廟之器剖判隂陽之木自同絃直不為絲棼匪專美於成風之匠亦垂訓於背誕之君雖鱗皴異質擁腫多紋散作輪轅小大之宜不忒鑿為户牖毫釐之度斯分所以喻謇諤於後學昭輔弼於前文方今補衮為勤和羮克正契君臣以魚水以繩墨為龜鏡則考殷宗披說命未若𢋫歌於元聖第二以木以繩直君由諫明為韻張聖之古之善諫者喻其心如繩直展成規於良木既折中而經始必周流而牽復以其性有曲直固從乎彌綸以其材有短長必由之盈縮故可彰其言兮直如矢喻其諫兮從如水既應用而無方且適道而虛已為棆桷之無繆成棟梁之有以舉直錯枉且明徑挺之心動而悅隨不失縱橫之理觀夫度彼山林直以絲繩既遵時而有作乃底績而其凝斷長補短物無失性損上益下道罔不興猶其善而惟變所適類夫諫而不命其承匪差毫釐存乎楷式在操張而為務乃經紀以成德操端有凖希匠石以財成枉撓必從表王道之正直况夫凖以綸綍順乎節文不循枉以為利必適道而斯分假物而言故引從繩之木樂諫為喻明乎則聖之君原其納誨之謀觀其所由既規矩而有制豈文理而是求糾纆既施足彰妙道之用衆材方正比夫從諫如流且夫獻直言者必有備無患木從繩者叶執藝而諫故得明乎官以相規人之無訕矧其不枉道以求用恆守道以為名匡乎不正使其正規其不平使其平使一作正或作此所謂不可欺於繩墨乃得配乎權衡恭惟賦於說命知諫道之克明王者父事天兄事日賦以子弟誠賢國家靡失為韻浩虛舟二儀覆載德之廣者唯天三光照臨明之大者唯日故王者於天也父事無怠於日也弟恭靡失布和施令將成不宰之功明目達聰欲亞無私之質當其萬邦作貢四海為家仰元氣而晨昏靡隔指陽精而伯仲非賖草色難窮屢軫南陔之戀棠隂易匿常思棣萼之華所以化洽中原祥臻上國法寒暑觀從政之道無薄蝕見相容之德登封泰嶽猶疑陟岵之時展禮東郊似望在原之力愛敬無斁恪恭盡䖍窺一氣異厯山之泣攀六龍為荀氏之賢覆燾成功且異靡瞻之義古今垂象難窮以長之年且夫致敬唯精傾心仰止誰嬰同席之亂誰效攘羊之㫖曾聞有闕逺懷幾諫之心每懼曰明寧有逺遊之理所以惟法前哲規後嗣播洪猷恢至美教天下之為人子者矣又若卑已謙恭端心愷悌同明無終鮮之歎可愛有既和之體桑榆未及魯衛之道咸興葵藿皆傾管蔡之讎不啓所謂扶枝葉周根蒂播仁風匡大禮教天下之為人弟者矣範人倫者莫先於元首遵孝禮者在致乎精誠必有尊也天其父必有先也日其兄九服洽和若嗣髙於廣大萬機洞照契承照於貞明故得孝道日彰休聲風靡指圓蓋兮欽若仰紅輪兮翼爾由是海內無賊子姦臣吾君如此文苑英華卷四十三
