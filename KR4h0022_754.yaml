body:
  text: 文苑英華卷七百五十五宋李昉等編史論二隋書儒林傳論一首隋書隱逸傳論一首王昕及弟晞傳論一首平臺稱略論十首三國論一首隋書儒林傳論魏徴儒之為教大矣其利物博矣篤父子正君臣尚忠節重仁義貴亷讓賤貪鄙開教一作政化之本源鑿生人一作民之耳目百王損益一以貫之雖世或汙隆而斯文不墜經邦致治非一時也涉其流者無其祿而冨懷其道者無其位而尊故仲尼頓挫於魯君孟軻抑揚於齊后荀卿見珍於强楚叔孫取貴於隆漢其餘處環堵以驕冨貴安陋巷而輕王公者可勝數哉自晉室分崩中原喪亂五胡交爭六一作經籍道盡魏氏發迹代隂經營河朔得之馬上兹道未𢎞暨夫大和之後盛修文教縉紳碩學濟濟盈朝縫掖巨儒往往傑出其雅誥奧義宋及齊梁不能尚也南北所治章句好尚互有不同江左周易則王輔嗣尚書則孔安國左傳則杜元凱河洛左傳則服子慎尚書周易則鄭康成詩則並主於毛公禮則同遵於鄭氏大抵南人簡約得其英華北學深蕪窮其枝葉考其終始要其會歸其立身成名殊方同致矣爰自漢魏碩學多清通逮乎近古巨儒必鄙俗文武不墜𢎞之在人豈獨愚蔽於當今而皆明哲於往昔在乎用與不用知與不知耳然曩之弼諧庶績必舉德於鴻儒近代左右邦家咸取士於刀筆縱有學優入室勤踰刺股名髙海內擢第甲科若命偶時來未有望於青紫或數竒一作將運舛乃棄置一作必委棄於草澤然則古之學者祿在其中今之學者困於貧賤明逹之人志識之士安肯滯於所習以求貧賤者乎一作哉此所以儒罕通人學多鄙俗者也昔齊列康莊之第多士如林燕起碣石之宫一作室羣英自逺是知俗易風移必由上之所好非夫聖明御世亦無以振斯頺俗矣自正朔之變一作不將三百年師說紛綸無所取正髙祖應期纂厯平一寰宇頓天綱以掩之賁旌帛以禮之設好爵以縻之於是四海九州强學待問之士靡不畢集焉天子乃整萬乘率百僚遵問道之儀觀釋奠之禮博士罄懸河之辨侍中竭重席之奧考正亡失一作逸研核異同積滯羣疑渙然氷釋於是超擢竒俊厚賞諸儒逹于一作乎四方皆啓􅓺孰一作校齊魯趙魏尤多英拔一作學者尤多負笈追師不逺千里講誦之聲道路不絶中州儒雅之盛自漢魏以來一時而已及髙祖暮年精華稍竭不恱儒術專上刑名執政之徒咸非篤好既一作暨仁夀之間遂廢天下之學唯存國子一所弟子七十二人煬帝即位復開庠序國子郡縣之學盛於開皇之初徴辟儒生逺近畢至使相與論討得失於東都之下納言定其差次一以聞奏焉于時舊儒多已凋亡二劉拔萃出類學通南北博通古今後生鑽仰莫之能測所製諸經義疏縉紳咸師宗之既而外事四夷戎馬不息師徒怠散盜賊羣起禮義不足以防君子刑罰不足以滅小人空有建學之名而無𢎞道之實其風漸墜以至滅亡方領矩步之徒亦多轉死溝壑凡有經籍自此皆湮沒於煨塵矣遂使後進之士不復聞詩書之言皆懷勷欲一作攘冦之心相與陷於不義傳曰學者植也不學將落然則盛衰是繫興亡攸在有國有家者可不慎歟諸儒有身沒道存遺風可想皆採其餘論綴之於此篇云逹於四方此上隋書有京邑二字一作皆隋書本文隋書隱逸傳論自肇有書契綿歷百王雖時有盛衰未嘗無隱逸之士也故易稱遁世無悶又曰不事王侯詩曰皎皎白駒在此空谷禮云儒有上不臣天子下不事諸侯語曰舉逸民天下之民歸心焉雖出處殊途語默異用各言其志皆君子之道也洪崖兆其始箕山扇其風七人作乎周年四皓光乎漢日魏晉以降其流逾廣其大者則輕天下細萬物其小者則安苦節甘賤貧或與世同塵隨波瀾以俱逝或避世隋書本文作違時矯俗望江湖而獨往狎玩魚鳥左右琴書捨遺粒而織落毛飲石泉而䕃松柏放情宇宙之外自足懷抱之中然皆欣欣於獨善鮮汲汲於兼濟而受命哲王守文令主莫不束帛交馳蒲輪結轍奔走巖谷唯恐不逮何哉以其道雖未𢎞志不可奪縱無舟楫之功終有堅貞之操是以立懦夫之志息貪競之風與苟得之徒不可同年共日所謂無用以為用無為而無不為也故叙其人列其所以備隱逸篇云列其所隋書作行王昕及弟晞傳論蘇世良自晉失綱紀世道交喪遺風餘烈掃地將盡魏父疑遷宅伊洛情存典故衣冠舊族威儀式序於是風流名士往往間出遵業王誦導清流於前元明孝詣振芳塵於後元景少自矜莊早馳名譽儀範詞韻標映人倫雖樂廣王衍之徒不能尚也嘗試論易稱君子之道四焉是以朝廷之士入而不出山林之子往而不返然則入朝廷者冝盡忠義以忘軀希貞固之幹事升之宰輔必致元氣之和處以末班思竭匪躬之節往山林者便可違親避世枕石潄流上期御氣飱霞下足激貪勵俗隱顯之徒在斯而作外漸疑應實內謝治身義與隨時情非髙尚食人之祿忘人之憂淡泊囂塵之中虛無廊廟之下始之以踈簡成之以誕傲髙談莊老獨扇𤣥風送疑軌長驅流宕忘返乃至阮籍為名教罪人叔夜以髙才齒劔惜哉王公以禮度自拘異於二子但迹預周行志輕流俗凝神於陳力之地嘯咏於伏奏之辰義匪勞心情乖易祿足為纍矣雖然善人天地之紀安可絶乎昆季履道俱有風尚閨門雍穆見重時皇永建之時晞處帷幄情存稽古蓋有憑焉平臺祕略論十首王勃孝行一論曰昔之列桐圭建茅土者非一君焉至於孝思可稱仁風茂存乎緗牒十一而已豈非生於深宫之中長於婦人之手膏肓積乎驕慢情奔疑淪乎嗜欲嗚呼有國有家者可不誡乎貞修二論曰美哉貞修之至也或抗情激操仗清剛而勵俗或理韻和神抱清方而守道或旌竒表善擢才於不次之階或剖滯申嫌措辭於難犯之地並能以禮升降以時舒卷既明且哲以保其身盛矣哉原夫御俗裁風變彛倫者寄乎直全身逺害得隨時者存乎變夫然故進不違義退不復生清貞靜一保其道委迤屈伸合其度易曰君子或出或處或默或語天下何思何慮同歸而殊途百慮而一致此之謂也文藝三論曰易稱觀乎天文以察時變傳稱言而無文行之不逺故文章經國之大業不朽之能事而君子等役心勞神冝於大者逺者非緣情體物雕蟲小技而已是故思王抗言詞訟恥為君子武皇裁勑篇章僅稱往事二字疑不其然乎至若身處魏闕之下心存江湖之上詩以見志文宣王有焉忠武四論曰隂陽代興剛柔合運威恩參用以成化文武相資以定業況乎卑疑侯自我宗子維城者乎城陽之權略明決卒摧吕氏之變任城之志意剛斷實啓有魏之業蓋有助焉陳思雅懷忠勇義形家國表奏永昌洞曉兵數績著疆場長沙武陵亦足云也益政五論曰東平以盛德匡時大興禮樂齊獻以至親統物光濟中外淮陽安定峻必行之典安陸扶風深受遺之泣能義形家國理極忠貞使黃河如帶垂芳不朽盛矣乎守方雅以調蕃政用公直而掌朝論昻然直上凛有生氣衡陽太原亦足云也尊師六論曰前史稱良藥苦口而利於病忠言逆耳而利於行豈非事情竭於不顧主色期於難犯中人以下罕免斯纍其有抗辭必盡忠烈橫匪石之心聞善若驚君王動順風之請相須之際良可詠也清河之恭慎真懇雅為亂益二字疑上引聖朝下託師傳和矣哉褒容疑七論曰原夫重藝尊師登竒佇逸道存萬里神交一面故有推輪擁篲寡人忘千乘之榮越席分庭上才當四海之禮斯實蕃邸之盛事間平之用心也而有矯情役智揚疑逸名利之間室疑作窒隙蹈瑕乾沒英翹之地便僻脂韋飾其迹甘言巧辭運其辨假君王之顧盻用君王之威福傳曰好善而不擇人則前代有以之傾矣至於興諧文雅賞盡煙霞月庭廣闢風閨洞敞西園故事下蘭坂而肖疑歌東苑遺塵坐視疑庭而曉賦折旋書藝之園翺翔儛詠之隙洋洋乎亦為樂之一方也初俊八論曰夫濫觴懸米闕藩浮天地之源寸株尺蘖擢捎雲蔽景之幹豈非積微成大陟遐自邇易曰山下有泉䝉君子以果行育德故考其前事備之於篇規諷九論曰夫陵谷好遷乾坤忌滿哀樂不同而不逺吉凶相反而相襲故有全中卒疑行用心於不爭之場杜漸防危投逸疑作迹於知幾之地昔之善持滿者用此者也諺曰禍不入慎家之門前代有以之興矣至若中山激難重存親禮武陵變色復延情愛子建之陳辭貢憤長沙之發對因機雖亦各逹其心未若洪慶之希聲也慎終十論曰詩云靡不有初鮮克有終若夫東平之奉憲遵約耿介原陵之奏中山之見賢思齊殷勤濮陽之託庶幾乎可謂慎終矣至于一作子塵之奉行文處此句疑中慰之逺述河間陳思尅已並未易誣也三國論論曰漢自順桓之間國統屢絶奸回竊位閹宦滿朝士之蹈忠義履氷霜者居顯列則陷犯忤之誅伏閭巷則嬰黨錮之戮當是時也天下之君子掃地將盡雖九伊周十稷契不能振已絶之綱舉土崩之勢明矣嘉平中大黃星見楚宋之分遼東殷馗曰其有真人起於譙沛之間以知曹孟德不為人下事之明驗也先時秦帝東逰亦云金陵當有王者興董扶求出又曰益州有天子氣從兹而言則長江劍閣作吳蜀之限天道人謀有三分之兆其來尚矣然廢興有際崇替遞來每攬其書曷能不臨卷而永懷撫事而伊鬱也嘗試論之曰向之疑何進納公業之言而不追董卓傕汜棄文和之䇿而不報王允則東京焚如之禍關右亂麻之尸何由而興哉至使乘輿䝉塵於河上天子露宿於曹陽百官饑死於牆壁六宫流離於道路蓋由何公之不明賈翊之言過也於足劉岱喬瑁張超孔胄之徒舉義兵而天下響應英雄者騁其驍悍運其謀能海內囂然於兹大亂矣袁本初據四州之地南向爭衡劉景升擁十萬之師坐觀成敗區區公路欲居列郡之尊瑣瑣伯圭謂保易京之業瓉既窘斃術亦憂終談尚離心琮琦失守其故何哉有大賢而不能用覩長䇿而不能施便謂力濟九區智周萬物天下可指麾而定宇宙可大呼而致也嗚呼悲夫余觀三國之君咸能推誠樂士忍垢藏疾從善如不及聞諌如轉規其割裂山河鼎足而王冝哉孫仲謀承父兄之餘事委瑜肅之良圖泣周秦之痍請吕䝉之命惜求一無求字休穆之才不加其罪賢子布之諌而造其門用能南開交趾驅五嶺之卒東界海隅兼百越之衆地方五千里帶甲數十萬若令登不早卒休以永年神器不移於暴酷則彭蠡衡陽未可圖也以先主之寬仁得衆張飛關侯萬人之敵諸葛孔明管樂之儔左提右挈以取天下庶幾有濟矣然而喪師失律敗不旋踵奔波謙瓉之間羇旅袁曹之手豈拙於用武將遇非常敵乎初備之南也樊鄧之士其從如雲比到當陽衆十萬餘操以五千之卒及長坂縱兵大擊廓然霧散脫身奔走方欲逺竄用魯肅之謀然投身夏口于時諸葛適在軍中向令帷幄有謀軍容宿練包左車之計運田單之竒操懸軍數千夜行三百輜重不相繼聲援不相聞可不一戰而擒也坐以十萬之衆而無一矢之備何異區犬羊之羣餌豺虎之口固知應變將略非武侯所長斯言近矣周瑜方嚴兵取蜀㑹物故於巴丘若其人尚存恐玉壘銅梁非劉氏有也然備數困敗而意不折終能大啓西土者其惟雅度最優乎武侯既殁劉禪舉而棄之覩譙周之懦詞甘忿憤而忘食聞姜維之立事又慷慨而言喜惜其功垂成而智不濟豈伊時喪抑亦人亡乃知德之不修棧道靈關不足恃也魏武用兵髣佛孫吳臨敵制竒鮮有喪敗故能東擒狡布北走强表破黃巾於夀張斬睦固於射犬援戈北指踏頓懸顱擁斾南臨劉琮束手振威烈而清中夏挾天子以令諸侯信超然之雄傑矣而弊於𥚹刻失於猜詐孔融荀彧終罹其災孝先季圭卒不能免愚知操之不懷柔巴蜀砥定東南必然之理也文帝冨於春秋光膺禪讓臨朝恭儉博覽墳籍文質彬彬庶幾君子者矣不能恢崇萬代之業利建七百之基骨肉齊於匹夫衡樞委乎他姓逺求珠翠廢禮諒暗之中近抱辛毗取笑婦人之口明帝嗣位繼以奢淫征夫困於兵革人力殫於臺榭髙貴鄉公明決有餘而深沈不足其雄才大略經緯逺圖求之數君並無取焉山陽公之墳土未乾陳留王之賓館已啓天之報施何其速哉故粗而論之式闕勸戒俾夫來者有以疾諸者焉文苑英華卷七百五十五
