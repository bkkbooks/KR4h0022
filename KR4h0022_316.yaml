body:
  text: 文苑英華巻三百十六宋李昉等編居處六亭六十九首逍遥溪亭王建逍遥公在此徘徊帝改溪名起石臺車馬到春常借㸔子孫因選暫歸來稀踈野竹人移折零落蕉花雨打開無主青山何所直賣供官稅不如灰江亭寓目盧拱江郭帶林巒津亭倚檻㸔水風蒲葉戰沙雨鷺鷥寒晩木初凋柳秋叢欲敗蘭哀猿自相呌鄉淚好無端題楊侍郎新亭劉商毗陵過柱史簡易在茅茨芳草和花種脩篁帶笋移逕幽人未賞簷靜鷰初窺野客憐霜壁青松畫一枝題賈廵官林亭楊巨源白鳥閒栖亭樹枝緑罇仍對菊花籬許詢本愛交禪侣陳實由來是好兒明月出雲秋舘思逺泉經雨夜忩知門前長者無虛轍一片寒光動水池盧十五竹亭送姪偁文粹作俌歸山楊衡落葉寒擁壁清霜夜沾石正是憶山時復送歸山客殷勤一樽酒曉月當牎白歩出武陵東亭臨江偶望劉禹錫鷹至威風候霜餘變林麓孤㠶帶日來寒空轉沙曲戍遥旗影動津晩艣聲促月上彩霞收漁歌逺相續劉駙馬水亭避暑前人千竿竹翠數蓮紅水閣虚凉玉簟空琥珀盞烘疑漏酒水精簾瑩更通風賜氷滿椀沉朱實法饌盈盤覆碧籠盡日逍遥却集作避煩暑再三珍重主人翁道州夏日郡内北橋新亭書懐贈何元二處士吕温結構池梁上登臨日幾廻晴空交宻葉隂岸積蒼苔爽氣中央滿清風四靣來振衣生羽翰髙枕出塵埃齊物漁何樂忘機鳥不猜閒銷炎晝靜集作盡選集作靜勝火雲開僻逺宜孱性優游頼廢材願為長泛梗莫作重燃灰守道窮非過先時動是災寄言徐孺子賓榻且徘徊和李使君三郎早秋城北亭宴崔司士因寄闗中張評事三字一作兄弟前人黄花古城路上盡見青山桑柘晴川口牛羊落照間野情隨巻幔塵事隔重闗道合偏重賞官微獨不閒鶴分琴久罷書到鴈應還為謝登臨客瓊林一作枝寄一攀此詩二百十五巻重出前已削去雲溪西亭晩望張籍雲水碧悠悠西亭桞岸頭夕隂生逺岫斜照逐廻流此地動歸思逢人方倦遊呉興耆舊盡空見白蘋州題韋郎中新亭前人起得幽亭景復新碧莎地上更無塵琴書著盡猶嫌少松竹栽多不集作亦稱貧藥酒欲開期好客朝衣暫脫見閒身成名同日官連署此處經過有幾人東亭閑坐白居易東亭盡日坐誰伴寂寥身緑樹集作桂為佳客紅蕉當美人笑言雖不接情狀似相親若不集作不作悠悠想如何度晩春松江亭携樂觀魚宴宿前人震澤平蕪岸松一作吳江落葉波在官常夣想為客始經過水靣排罾網船頭簇綺羅朝盤鱠紅鯉夜燭舞青蛾鴈斷知風急湖平得集作見月多繁絃集作絲與促管不解和漁歌題周皓一作浩大夫新亭前人東道常為主南亭列大集作别待賔規摹何日創境集作景致一時新廣砌羅紅藥髙集作疎窓䕃緑筠鎖開賔閣晩集作曉梯上妓樓春置醴寜三爵加籩過八珍茶香飄紫笋膾縷落紅鱗輝赫車輿閙珍竒鳥獸馴獼猴㸔櫪馬鸚鵡唤家人錦額簾髙捲銀花盞謾廵勸嘗光禄酒周簾光禄卿許㸔洛川神周有家妓數十人斂翠凝歌黛流香動舞巾裙翻繡鸂鶒梳䧟鈿麒麟笛怨音含楚箏嬌語帶秦侍兒催畫燭醉客吐文茵投轄多連曙集作夜鳴珂更達晨入朝紆紫綬待漏擁朱輪貴介交三事光榮照四隣甘濃將奉客稳煖不縁身十載歌鍾地三朝節鉞臣愛才心倜儻敦舊禮殷勤門以招賢盛家因好事貧始知豪傑意富貴為交親奉和李大夫題忘筌新亭前人翠巘公門對朱軒野逕連只開新户牖不改舊風煙虚室閒生白髙情淡入𤣥酒客同坐勸詩借屬城傳自笑滄江畔遥思絳帳前亭臺隨處一作事有爭敢比忘筌題嚴氏竹亭戎昱子陵栖遁處堪繫野人心溪水侵山影嵐煙向竹隂忘機㸔白日留客醉瑶琴愛此多詩興歸來歩歩吟題湖亭詩選作移家别湖上亭前人好是春風湖上亭桞條藤蔓繫離情黄鸎久住渾相識欲别頻啼三一作四五聲流盃亭李徳祐激水自山椒折波分淺瀬廻還疑古篆詰曲如縈帶寜愬羽觴遲惟貪一作歡親友㑹欲知中聖處皎月臨松葢早秋龍興寺江亭閒眺憶龍門山居寄崔張舊從事江亭感秋至蘭逕悲露泫秔稻秀晩川杉松蔚集作欝晴巘嗟余有林壑茲夕念繁集作原衍緑竹集作篠連嶺多青莎近溪淺淵明菊猶在仲蔚蒿莫剪喬木粲陵霄集作苕隂崖積幽蘚遥思伊川水北度龍門峴蒼翠雙闕間逶迤清溪一作灘轉故人在鄉國嵗晏路悠𬗟惆悵此生涯無由共登踐登江亭晩眺賈島浩渺浸雲根煙嵐沒逺村鳥啼沙有跡㠶過浪無痕望水知柔性㸔山欲捲魂縱情猶未已廻馬欲黄昏宿杜司空東亭牀頭枕是溪中石井底泉通竹下池宿客未眠當半夜獨聞山雨到來時登田中丞髙亭前人亭髙林表迥嵯峨獨坐秋宵不寐多玉集作白兎玉人歌裏出白雲雖白集作似不相過集作和寄和蔡州中丞一作寄蔡州田郎中題蔣亭釋無可遺跡仍一作遺路惟留蔡幽人出漢一作往朝門深荒徑在亭迥數峯遥岸石欹相倚一作對忩松偃未凋尋思方一去豈待使君招題崔駙馬林亭前人宫花野藥半相和藤蔓參差惜不科纎草連門留徑細髙樓出樹見山多洞中避暑青苔滿池上吟詩白鳥過更買太湖千片石疊成雲頂緑嵯峨宣義亭子劉得仁暮色遶髙亭南山出竹青夜深斜舫月風定一池星島嶼無人跡菰蒲有鶴翎此中休便可何必泛滄溟冬日題駱家亭子前人亭臺臘月時松竹見貞姿林積煙藏日風吹水合池恨無人此住静有鶴相窺是景與秋景吟詩亦各宜題何氏池亭周賀信是虛閒地亭髙亦有苔遶池逢石坐穿竹到山廻果落纎萍散龜行細草開主人偏好事終不厭頻來題袁集作元處士髙亭杜牧水接西江集作江西天外聲小齋松影拂雲平何人教我吹長笛興倚秋集作春風弄月明題池州貴池亭前人勢比陵歊宋武臺分明百里逺㠶開蜀江雪浪西江起集作滿强半春風集作寒去却來與張處士同題集作訪李隠居林亭集作不遇許渾千巖萬壑獨携琴知在陵集作龍陽不可尋去轍已平秋草遍集作色變空齋長掩暮雲深霜肥橡栗留集作霜嚴枳橘山䑕月冷菰蒲散一作泛水禽惟有西隣一作林張仲蔚坐來同愴别離心此詩二百十七巻重出今已削去注異同為一作題陸侍御林亭前人野水通池石疊臺五營無事隠雄材松齋下馬書千巻蘭舫逢人酒一盃寒樹雪晴紅艶吐逺山雲曉翠光來定知别後無多日海柳江花次第開同孫盧二仙侣遊樊明府林亭集作湘南徐明府余之南陵久不還家因題林舘前人湘南官罷集作滿不歸來髙閣經年掩緑苔魚溢池塘秋雨過鳥還集作環洲島暮潮廻集作雲回堦前石穏碁中局忩外山寒集作髙酒滿杯借問先生獨行處集作在一集作逺籬疎菊又花開秋晴獨立南亭楊發晝對南風獨閉闗暗期幽鳥去仍還如今有待終身貴未若忘機盡日閒心似䝉莊遊物一作象外官慙許掾在人間開襟自向清風笑無限秋光為解顔宿晉昌亭聞驚禽李商隠覉緒鰥鰥夜景侵髙忩不掩見驚禽行集作飛來曲渚煙方合過盡南塘樹更深胡馬嘶和榆塞笛楚猿吟雜橘村砧失羣掛木知何限逺隔天涯共此心奉和秘監從翁夏日陜州河亭晩望姚鵠洪河何處望一境在孤煙極野如藍日長波似鏡年巻簾花影裏倚檻鶴巢邉煆熖侵旌斾灘聲雜管絃鍾微來疊岫㠶逺落遥天過客多相訪一作指應疑㑹水仙和徐薰先輩秋日遊涇州南亭呈二三同年多少歡情泛鷁舟桂枝同折塞同遊聲喧海上巢松鶴影落盃中過水鷗送日暮鍾交戌嶺呌雲寒角動城樓酒酣笑話秋風裏誰道槐花更起愁偶題林亭集作題友人池亭温庭筠月榭風亭繞曲池粉墻集作垣廻互瓦參差侵簷片白摇飜影落鏡愁紅寫倒枝鸂鶒刷毛花蕩漾鷺鷥拳足雪離披山翁醉後如相憶羽扇清罇我自知題懐貞亭舊遊集作崔公池亭前人皎鏡方集作芳塘菡蓞秋此來重見採蓮舟誰能不遂集作逐當年樂還恐添為集作成異日愁紅艶花集作景多風嫋嫋碧空雲斷水悠悠簷前依舊青山色盡日無人獨上樓陪河中節度使遊河亭前人倚欄愁立獨徘徊欲賦慙非宋玉才滿座山光摇劔㦸遶城波色動樓臺鳥飛天外斜陽盡人過橋心倒影來添得五湖多少恨桞花飄蕩似寒梅題樟亭張祐見集本曉霽憑虚檻雲山四望通地盤江岸絶天暎海門空樹色連秋靄潮聲入夜風年年此光景催盡白頭翁題昭應王明府溪亭趙嘏靖節何須彭澤逢菊洲松島水悠溶行人自折門前桞髙鳥不離溪畔峰曉渭度簷㠶的的晩原含雨樹重重軒車過盡無公事枕上一聲長樂鍾南亭前人孤亭影出亂花中悵望無人此醉同聽盡暮鍾猶獨坐水邊襟袖起春風許州徳星亭薛能漢水南流東有堤堤邊亭是武陵溪槎松配石堪僧坐蘂杏含香欲烏啼髙處月生蒼海外逺郊山在夕陽西頻來不是軍從事只戴沙巾只杖藜題河中亭子前人河擘雙流島在中島中亭上正南空蒲根舊浸臨闗道沙色遥飛傍苑風晴見樹卑知岳大晩聞車亂覺橋通無窮勝事應須宿霜白蒹葭月在東此詩三百十五巻重出前已削去旅次洋州寓居郝氏林亭方干舉目縱然非我有思量自在故山時鶴盤逺勢投孤嶼蟬曳殘聲過别枝凉月照牎集作床欹枕倦澄泉遶石泛觴遲青雲未得平行去夣到江頭身在茲集作江南身在覊書吳道士隠林亭前人蘚榭沙亭蘿篠隂依稀氣象似山林橘枝亞樹香集作路黄苞重井脉牽湖碧甃深稚子遮門留熟客驚蟬入葉避遊禽四隣不見孤髙事集作處飜笑騰騰只醉吟題陸州吕郎中郡内集作中環溪亭前人為是仙才登望處風光便是武陵春閒花半落猶邀蝶白鳥雙飛不避人樹影興餘侵枕簟荷香坐久着衣巾暫來此地非多日明主那容借冦恂題越州南郭袁秀才林亭前人清邃林亭指畫開幽巖别𣲖像天台坐牽蕉葉題詩語一作句醉觸松集作藤花落酒盃白鳥不歸山裏去紅鱗多自鏡中來終年此地為吟伴集作侣早起尋君薄暮廻湘隂江亭寄友人李羣玉湘岸初晴淑景遲風光正是客愁時幽花暮集作夜落騷人水芳草春深帝子祠往事隔年如過夣舊遊回首謾勞集作追思煙波自此扁舟去酌酒聮文杳未期秋宿潤州劉處士江亭李洞北夣風吹斷江邊處士亭吟生萬井月㸔盡集作見一天星浪靜魚衝石集作鎖窻髙鶴聽經東南渺集作杳無畔世界半滄溟苑中題友人林亭李頻林邑藏巖洞幽栖趣若何春篁兼笋宻夏鳥雜雛多坐有清風起林無暑氣過亂書還就葉真飲不聽歌片景明紅蘚斜隂暎緑蘿雄文終不惜莫便棄髙科題耿處士林亭喻坦之身向閒中老生涯本路然草堂山木下魚艇鳥花邊窺井猿兼鹿啼林鳥雜蟬何時人事了依此亦髙眠題賈氏林泉聶夷中市朝束名利林泉繫清通豈知黄塵内迥有白雲蹤輕流逗宻篠直幹入寛空髙吟五君詠疑對九華峰我知種竹心欲扇清凉風我知决泉意將明濟物功有琴不張絃衆星列梧桐須知淡泊聽聲在無聲中地非樵者路武陵又何逢秪慮迷所歸池上日西東水軒鄭谷日日狎沙禽偷安且放吟讀書老不入愛酒病還深亂集作兼後為覉集作饑客兵餘問故林楊花滿床席搔首度春隂望湖亭前人湘水似伊水湘人非故人登臨何獨語風桞自摇春七松亭張喬七松亭上望秦川髙鳥閒雲滿目前已比子真耕一作棲谷口豈同陶令卧江邉臨崖把巻驚廻燒掃石留僧聽逺泉明月影中宫漏近珮聲應宿使朝天題圭峰下長孫家林亭韓琮趙國林亭二百年緑苔如毯葛如煙閒期竹色摇霜㸔醉惜松聲枕月眠出樹圭峯寒壓坐入籬沙瀬碧流天明知富貴非身物莫為金章堕此仙和容南韋中丞題瑞亭白鷺白鼠六眸龜嘉蓮陳陶伏波恩信動南夷交趾喧傳四瑞詩鷰鼠孕靈褒上徳龜蓮增耀答無私廻翔雪侣窺簷處照暎紅巢出水時盡寫流傳集作風流在軒檻嘉祥從此百年一作城知夏晩望嵩亭有懐羅鄴正憐雲水與心違湖上亭髙對翠微盡日不妨憑檻望終年未必有家歸青蟬漸傍幽叢噪白鳥時穿返照飛此地又愁無計住一竿何處是因依題蔣亭前人西風才起一蟬鳴便算闗河馬上程碧浪鷁舟從此别丹霄鵠箭忽無成二年芳思隨雲雨幾日離歌望一作怨斾旌廻首横塘更東望露荷煙菊倍傷情題水簾亭一作洞亂泉飛下翠屏中名共真珠巧綴同一片長垂今與古半山遥聽雨兼風雖無舒巻隨人意自有潺湲濟物功每向暑天來往見疑將仙子隔房櫳偶題離亭前人萬般名利不闗身況待山平海變塵五月波濤爭下峽滿堂金玉為何人謾誇浮世青雲貴未盡離桮白髮新誰似雨蓬蓬底客渚花汀鳥自相親江亭别裴饒羅隠行盃且待怨歌終多病憐君事事同衰鬢别來光景裏故鄉歸去亂離中乾坤墊裂三分在井邑摧殘一半空日晩長亭問西使不堪車馬上萍蓬闗亭春望前人闗畔風雲拂馬頭馬前春事共悠悠風欺岸桞長條困露浥山花小朶愁信越功名髙似狗裴王氣力大於牛未知至竟將何用渭水涇泥一作川一向流于越亭前人楚水蕭蕭多病身强凭危檻過殘春髙城自有陵兼谷流水那知越與秦岸下藤蘿隂作恠橋邉蛟蜃夜欺人琵琶洲逺江村濶廻首征途一作㠶淚滿巾李郎中林亭曹松秪向砌邊流野水樽前上下㸔魚兒笋溪已長過人竹藤徑從添拂靣絲若許白猿垂近户即無紅菓壓低枝大才必擬逍遥去更遣何人佐盛時漢南郵亭裴說髙閣水風清開門日送迎㠶張獨烏起樂奏大魚驚驟雨拖山過㣲風拂靣生閒吟雖得句留此謝多情蒲津河亭唐彦謙宿雨清秋霽景澄廣亭髙樹更晨興煙横博望乗槎水日上文王避雨陵孤棹夷悠期獨往曲欄愁絶悔長凭思鄉懐古人傷别此際哀吟幾不勝東亭茶宴女郎鮑君徽閒朝向曉出簾櫳茗宴東亭四望通逺眺城池山色裏俯聆絃管水聲中幽篁引沼新抽翠芳槿低簷欲吐紅坐久此中無限興更憐團扇起清風文苑英華巻三百十六
