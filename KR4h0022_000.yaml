body:
  text: 纂修文苑英華事始三朝國史藝文志注太宗太平興國七年九月詔翰林學士承㫖李昉翰林學士扈䝉給事中直學士院徐鉉中書舍人宋白知制誥賈黄中吕䝉正李至司封員外郎李穆庫部員外郎楊徽之監察御史李範祕書丞楊礪著作佐郎呉淑吕文仲胡汀著作佐郎直史館戰貽慶國子監丞杜鎬將作監丞舒雅等閱前代文集撮其精要以類分之為文苑英華其後李昉扈䝉吕䝉正李至李穆李範楊礪呉淑吕文仲胡汀戰貽慶杜鎬舒雅等並改他任續命翰林學士蘇易簡中書舍人王祐知制誥范杲宋湜與宋白等共成之雍熈三年上凡一千巻近印程俱麟臺故事全録此叚誤以興國七年為淳化七年國朝㑹要太平興國七年九月命翰林學士承㫖李昉學士扈䝉直學士院徐鉉中書舍人宋白知制誥賈黄中吕䝉正李至司封員外郎李穆庫部員外郎楊徽之監察御史李範祕書丞楊礪著作佐郎呉淑吕文仲胡汀戰貽慶國子監丞杜鎬將作監丞舒雅閱前代文集撮其精要以類分之為千巻雍熈三年十二月書成號曰文苑英華昉䝉䝉正至穆範礪淑文仲汀貽慶鎬雅繼領他任續命翰林學士蘇易簡中書舍人王祐知制誥范杲宋湜與宋白等共成之帝覽之稱善降詔褒諭以書付史館賜器幣各有差崇文總目文苑英華一千巻宋白等奉詔撰采前世諸儒雜著之文李燾續通鑑長編太宗以諸家文集其數實繁雖各擅所長亦榛蕪相間乃命翰林學士宋白等精加銓擇以類編次為文苑英華一千巻雍熈三年十二月壬寅上之詔書褒答熊克九朝通畧并川本小類書所載並取諸此陳騤等中興館閣書目太平興國七年命翰林學士承㫖李昉及扈䝉徐鉉宋白賈黄中吕䝉正李至李穆楊徽之李範楊礪呉淑吕文仲胡汀戰貽慶杜鎬舒雅等閱前代文集撮其精要以類分為千巻號曰文苑英華昉䝉䝉正至穆範礪淑文仲汀貽慶鎬雅繼領他任續命蘇易簡王祐范杲宋湜與白等共成之雍熈三年上帝覽之稱善詔付史館案鄧名世姓氏辨證元有戰姓後漢初戰兢為諌大夫今修書官戰貽慶殆其後歟國史并㑹要並作戰惟淳熈館閣官以稀姓為疑偶失稽考既修中興館閣書目乃改為戴貽慶誤矣今有忠訓郎戰廸兩任汀州差遣見居于汀臣伏覩太宗皇帝丁時太平以文化成天下既得諸國圖籍聚名士于朝詔修三大書曰太平御覽曰冊府元龜曰文苑英華各一千卷今二書閩蜀已刋惟文苑英華士大夫家絶無而僅有盖所集止唐文章如南北朝間存一二是時印本絶少雖韓栁元白之文尚未甚傳其他如陳子昻張説九齡李翺等諸名士文集世尤罕見修書官於宗元居易權徳輿李商隐顧雲羅隐軰或全巻收入當真宗朝姚鉉銓擇十一號唐文粹由簡故精所以盛行近嵗唐文纂印寖多不假英華而傳况巻袠浩繁人力難及其不行於世則宜臣事孝宗皇帝間聞聖諭欲刻江鈿文海臣奏其去取差謬不足觀帝乃詔館職裒集皇朝文鑑臣因及英華雖秘閣有本然舛誤不可讀俄聞傳㫖取入遂經乙覽時御前置校正書籍一二十員皆書生稍習文墨者月給餐錢滿數嵗補進武校尉既得此為課程往往妄加塗註繕寫装飾付之秘閣後世將遂為定本臣過計有三不可國初文集集作籍雖寫本然讐校頗精後来淺學改易寖失本指今乃盡以印本易舊書是非相亂一也凡廟諱未祧止當闕筆而校正者於賦中以商易殷以洪易𢎞或值押韻全韻随之至於唐諱及本朝諱存改不定二也元闕一句或數句或頗用古語乃以不知為知擅自増損使前代遺文幸存者轉増疵纇三也頃嘗屬荆帥范仲藝均倅丁介稍加校正晩幸退休徧求别本與士友詳議疑則闕之凡經史子集傳注通典通鑑及藝文類聚初學記下至樂府釋老小説之類無不參用惟是元脩書時歴年頗多非出一手叢脞重複首尾衡决一詩或析為二二詩或合為一姓氏差互先後顛倒不可勝計其間賦多用員来非讀秦誓正義安知今之云字乃員之省文以堯韭對舜榮非本草註安知其為菖蒲又如切磋之磋馳驅之驅掛㠶之㠶仙装之装廣韻各有側音而流俗改切磋為効課以駐易驅以席易㠶以仗易装今皆正之詳註逐篇之下不復徧舉始雕於嘉泰改元春至四年秋訖工盖欲流傳斯世廣熈陵右文之盛彰阜陵好善之優成老臣發端之志深懼来者莫知其由故列興國至雍熈成書嵗月而述証誤本末如此闕疑尚多謹俟来哲七月七日少傅觀文殿大學士致仕益國公食邑一萬五千六百户食實封五千八百户臣周必大謹識欽定四庫全書集部八文苑英華目録一總集類巻一賦一天象一天十首巻二賦二天象二日九首巻三賦三天象三日十首巻四賦四天象四日十一首巻五賦五天象五日十一首巻六賦六天象六月十首巻七賦七天象七月十首巻八賦八天象八星九首巻九賦九天象九星十首巻十賦十天象十星斗天河共十二首巻十一賦十一天象十一雲十首巻十二賦十二天象十二雲十首巻十三賦十三天象十三風十首巻十四賦十四天象十四雨十首巻十五賦十五天象十五露九首巻十六賦十六天象十六露霜雪共九首巻十七賦十七天象十七雷電霞霧虹共十首巻十八賦十八天象十八天儀大衍共五首巻十九賦十九天象十九律管九首巻二十賦二十天象二十氣象空光明驕陽共十首巻二十一賦二十一嵗時一春元日共五首巻二十二賦二十二嵗時二春令中和莭春儺麥秋七夕共五首巻二十三賦二十三嵗時三七夕秋冬大儺嵗共九首巻二十四賦二十四嵗時四寒四時閏漏共九首巻二十五賦二十五地類一地土地圗土牛共九首巻二十六賦二十六地類二土風塵泥共六首巻二十七賦二十七地類三山四首巻二十八賦二十八地類四山十首巻二十九賦二十九地類