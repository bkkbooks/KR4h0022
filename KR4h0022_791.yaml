body:
  text: 文苑英華卷七百九十二宋李昉等編傳周大將軍邱乃敦崇傳一首唐相國兵部尚書梁國公李峴傳一首唐故東川節度使盧坦傳一首周使持節大將軍廣化郡開國公邱乃敦崇傅庾信崇恆州代郡鼓城縣廣義鄉孝讓里人也昔夀邱建國賜姓者十二人平陽舉賢登朝者十六族况復大電繞樞流星入昴派分源别幹其嗣興者乎魏道武皇帝以命世雄圖飲馬河洛兄弟十人分為十姓辨風吹律族氏即其一焉五代祖邈驃騎大將軍開府儀同三司營邱郡開國公于時天道西北既稟謀謨馬首東南實資匡贊因以封名仍為賜氏與夫南公伯即有連類宗則疑樂正非無凖則曽祖雙軌使持節驃騎大將軍司徒青兖二州刺史范陽文昭公洛食之始上馬治國登庸之初升槐論道生則絶席武宫死則配祠清室夫人太原王氏三世為將四代為公社稷大宗鍾鼎貴族伉儷是歸秦晉匹也祖提使持節衛將軍駙馬都督河交二州刺史靈夀縣開國公公子公孫聲名籍甚增輝增耀弱冠升朝夫人清亷郡長公主孝文帝之第二女也王姬有行車服不繫故得衛青上將張耳賢夫父願使持節大都督徐州諸軍事徐州刺史平陽縣開國公食邑四千户少年習象多見兵書澆沙聚石之營却日橫雲之陳彎弧則戟破小支抽劔則泉飛枯井夫人宇文氏周文皇帝之第三妹也母儀令範女師賢哲德高隆慮義重河陽魏受其終周新其命式墓封墳追旌盛德乃贈使持節大將軍廣化郡開國公食邑一千户夫人贈安德郡長公主遊魂寃結非無廣漢之城久客思歸唯有東平之樹自永安以來魏室大壞海水群飛天星亂動禮樂征伐不出於人主舉賢誅暴議在於強臣高丞相驅率風雲奄荒齊晉我舅氏文皇帝駕馭龍虎據有周秦南北渝盟東西敵怨既而各受圖書並當圭壁百姓則父南子北兄東弟西事主則憂親求生則慮禍大周親戚遍鍾荼炭輸之城旦下之織室關河嚴隔三十餘年天厭喪亂人思反德彼之風塵既靜函谷此之冠蓋屢涉漳濵中山寃枉之餘代郡凋殘之澤並遇革音咸蒙禮送崇賔兄弟二人相看氣息親愛凋零方寸久亂恆山殺翮豈望同飛而安國徒中鬱為卿相班超絶域遂得生還天和四年至於新邑朝廷以舅甥之國外內之親乃授賔使持節驃騎大將軍開府儀同三司大都督安樂縣開國公食邑一千户賔得免虎口仍上龍門聲價已高風焱即逺方欲討論國恥申雪家寃橫尸原野是所甘心時不我與先從朝露春秋若干衛國興文子之慟長安有詔葬之悲乃贈本官加少傅蒲虞勳三州諸軍事蒲州刺史以天和六年某月日葬於長安之洪瀆原妻青州石氏長城郡君胤子孤煢生妻嫠室即能有節還成守義崇蒙授使持節大都督驃騎大將軍開府儀同三司廣化縣開國公食邑一千户昆季二人同年上將彤廷交映棨戟相臨昔二馮同德繼踵當官兩杜齊名夾河為郡比斯榮寵彼將慙色俄然賔疾奄捐館舍崇兄弟勝衣備罹禍酷同氣長養得及全人今者來歸更連凶閔每一悲慟行路傷心撫飬愛子情深馬援之慈恭事寡嫂義甚顔含之孝天和六年授大將軍餘如故龍庭賞出塞之功玉門勞旋師之寵異代同和見之今日建德二年授使持節都督宜州諸軍事冝州刺史匆匆橫閣但有誦書曖曖重帷惟聞善政清不置水眀非舉燭乃是入境移風非直停車待雨有勑大將軍冝州刺史廣化郡公崇自夏季無雨以迄於今雖靡神不禱仍未降感知彼州內獨蒙滂澤諒由大將軍精誠所至憂念郡人豐稔可希良以為慰又勑廣化公崇知此存心政術治勤黎人受委稱職嘉尚無已古人有言非行之難念加勉朂以致盡善指令宣納抑操賜齊陳物如别宜諭朕懷昔陽平太守别降紅粟之恩荆州刺史偏蒙衮衣之賜治績尤異此之謂乎崇清淨為政廉明為法人不忍背吏不忍欺性不飲酒無所嗜欲深沉牆仭喜愠不形文必正詞絃惟雅曲仁義禮節是所用心緹祑緗素愛玩無已當今四郊多壘尚有公卿之辱鼓鼙不息猶勞將帥之謀語其讐耻唯願橫行死地思其報國不吝身膏原野但令天假之年時綏之福忠貞之事公其取焉略書梗槩陳之直史故相國兵部尚書梁國公李峴傳李華梁公諱峴字某其先隴西人曽祖曰吳王大宗愛子也父曰信安郡王玄宗之大臣肅宗之軍佐也公年二十學道於大智禪師志深行苦禪師謂曰汝當為國家陳力緣不在此也自太子通事舍人五遷為魏州刺史化行河朔冉遷為京兆尹嵗大水至尊幸溫湯每冬為恆畿輔進奉萬計公止府縣無所獻上知其針亮益以重之甸服千里飢不為害忠矣哉權臣所排出守零陵冉遷御史中丞荆州等五道副元帥徵為宗正卿鳯翔太守時兵荒之後兩京未復公為政人不勞而公賦足智矣哉除尚書左丞禮部尚書御史大夫兼京兆尹公明賞罰而隱人過下吏不逮上延威伸一無此字令引自謝責而慰安之推德及人剛柔皆化仁矣哉平訟一無此字獄刑察以人情斷以古義正詞匡上直法伸下明矣哉遷吏部尚書平章事以正直進以正直退貶蜀州刺史遷為御史大夫兼江陵尹節度觀察使入為禮部尚書宗正卿加黃門侍郎平章事以道事君不可則止可謂大臣歟行垂益之道事堯舜之君公志不申元元失望除大子詹事又歷御史大夫禮部尚書遷吏部領選江西改兵部復命至南陽詔兼衢州刺史一州之人如得父母永泰二年八月薨于衢州一州之人如絶乳育天地痛心朝廷悲懷贈太子少師諡曰某兵部尚書少師同先父之職國家孝治追其世德乎周之興也內有周召外有伯禽康叔漢之盛也東平入輔聖德巍巍公為股肱衛侯之哭栁莊曰非寡人之臣社稷之臣也公可謂社稷之臣歟夫子稱閔子騫曰孝哉閔子騫稱史魚曰直哉史魚宣盛德者一言蔽之與公遊者詠公之德曰柱石天下儀刑縉紳宋一作宗韓房後惟公一人公享年五十五伯兄峘户部尚書統江淮嘗與公並為御史大夫及公之逝伯季同齒哀哉仲兄嶧户部尚書散騎常侍一門親賢繼美畢榮盛矣哉公嗣子大理司直孝孤女范陽盧浩妻哀有餘禮孝因其心孝矣哉哀奉世父尚書公之裳帷自信安歸于上都跣行號哭三千餘里以大歷二年某月日窆於某原禮也夫人河南獨孤氏祔焉夫人某官某之女以才淑禮法聞于邦族公為茂德崇勳之後享大名尊位有令兄弟有賢夫人有孝男有孝女全美如是雖古烈無之故東州節度使盧公傅盧坦字保衡河南人父巒贈鄭州刺史坦少孤初任韓城縣尉歷宣城一作武縣鞏河南三縣尉其吏河南知捕賊杜黃裳為河南尹謂坦曰某家子與惡人遊破家産公為捕賊盍使察之坦抑集作仰曰凡居官終始亷白祗入俸錢者雖歷大官亦無厚蓄以傳其能多積財者必剝下以致如其子孫善守之是天富不道人之家也集有不字若恣其不道以歸於人坦以為冝故不使察黃裳驚視因使升就集有堂字坐自此日加重及黃裳為吏部侍郎將授以太常博士會鄭滑節度使李復表請為判官得監察御史薛盈珍為監軍使纍侵軍政坦每據理以拒之盈珍嘗曰盧侍御所言皆公我故不違也有善吹笛者大將十餘人同啓復請以為重職坦適在復所復問曰衆所請可許否坦笑曰大將等皆久在軍積勞亟遷以為集作及右職奈何自薄欲與吹笛少年集有同字為列耶復告諸將曰盧侍御言是也大將慙遽走出就坦謝且曰向聞侍御言某等羞愧汗出恨無穴可入李復病甚盈珍以甲士五百人入城州人皆駭恐坦遽止之盈珍不敢違復率盈珍主兵事制以姚南仲代盈珍方會客言曰姚大夫書生豈將才也坦私謂人曰姚大夫外雖柔中甚剛又能斷監軍若侵之必不受禍自此萌矣若從公喪而西必遇姚大夫吾懼為所留以及禍遂潛去姚果以牒來請終以不逢得解及盈珍與姚有隙從事多黜死者王緯觀察浙西兼鹽鐡使請坦為轉運判官及李錡代請如初轉殿中侍御史錡所行多不循法坦每爭之詞旨深切聽者皆為之懼纍求去不得凡在錡府七年官不改錡惡狀滋大坦慮及難又非可以力爭遂與裴度李約李稜繼以罷去後數年詔追錡入錡遂扇兵士殺留後以留已因發兵取宣州為其將所擒送斬死順宗寢疾王叔文居翰林決大政天下凛凛坦説宰相韋執誼速白立皇太子以樹國本執誼深納其言將以為殿中侍御史時御史中丞亦以為請王叔文使人請坦將以為員外郎知楊州集作子留後坦假他辭不受叔文不説故事皆不行及王叔文貶出坦遂為殿中侍御史權德輿為户部侍郎請為本司員外郎尋轉户部兼侍御史知雜事未久遷刑部郎中知雜事如故赤縣尉有為御史臺所按者京兆尹密救之上使品官釋之坦時在宅臺吏以告坦白中丞請覆奏然后奉詔品官遽以聞上曰吾固宜先命所司遂使宣詔乃釋數月遷御史中丞賜紫衣分司東都尋歸西臺初上禁絶罷鎮節度使等獻財貨載於赦條時山南節度使栁晟浙東觀察使閻濟美皆罷鎮有所獻坦劾奏之晟濟美皆白衣待罪上召坦對因曰栁晟閻濟美所獻皆家財非刻下卿勿劾坦對曰陛下所以布大信于天下者赦令是也且兩臣首違詔臣職當舉奏陛下不可以失大信于天下上曰朕既受之矣如何坦對曰出歸有司以明陛下之德上善之竟為宰相所寢李錡之誅有司將自淮安王之下墳墓皆毁之宰相不敢言坦奏曰李錡與國同族其反逆不道身既斬死并殺其子罪塞矣若將追毁祖父墳墓臣以為不可淮安王有佐命之功且國真又死王事漢誅霍禹不毁霍光之墳房遺愛伏誅罪不誅於玄齡此前代及聖朝之故事也康誥曰父子兄弟罪不相及若將易之無乃罪及良臣且傷大體乎上改容曰非卿言何由知此集無此字遂命停毁仍禁採樵給伍户守淮安王之墳以示不忘其功上䇿試賢良方正之士有懷書䇿入者將深罪之坦奏言四方不明知所犯必以為策辭抵忤宜輕其責上從之江陵節度使裴均入為僕射行香時將處常侍諌議之上坦引故事及姚南仲近例以為節集作證裴均怒曰姚南仲何足為例耶坦應曰姚僕射但不是勑使耳何不足以為例也遂為均所排改右集作左庶子坦初為殿中當杜黃裳為相故纍遷凡二十有三月而至中丞及居官守道正言日聞而人忘其遷之速也集無也字數月宰相裴垍白以為宣歙池等州都團練觀察處置節使兼御史中丞宣州刺史劉闢之逆其壻蘇強坐誅死強兄𢎞為晉州從事自免歸人莫敢用坦奏言蘇𢎞有才行以其弟強坐誅死劉闢反誅𢎞與強相去三千里必不通謀以強廢𢎞非陛下惜材之意因請𢎞以為判官上曰假令蘇強當時不就誅尚且宜隨材而任之况在其兄耶遂得請及在宣州江淮大旱米價日長或説節其價以救人坦曰宣州地狹穀不足皆他州來若制其價則啇不來矣價雖賤則無穀奈何五字集作如無穀何後米斗及二百商人舟米以來者相望坦乃借兵食多出於市以平其價集作直人賴以生當塗縣有渚田久廢坦以為嵗旱茍貧人得食取傭可易為功於是渚田盡闢藉傭以活者數千人又以羡錢四十萬代稅户之貧者故旱雖甚而人忘災五年冬遷刑部侍郎充諸道鹽鐡轉運使減冗職八十員自江之南補置付之院監使無所與數月轉户部侍郎判度支坦更歷集作歷更重位以朝廷是非大體為已務故多所陳請或上封告泗州刺史薛謇為代北水運使時畜馬數百匹有異馬不以獻者事下度支乃使巡判官往驗之未返上遲之使品官劉泰昕案其事坦上陳以為陛下既使有司驗之又使品官往豈大臣不足信於品官乎臣請先罷免疏三奏上於是遂追劉泰昕舊賦於州郡者或非土地所有責厚價以市之他境坦悉條奏各去其所無罷宣歙旨支米收其價以移之於湖南免江南鹿臘配之鄜汝州以韓重華為代北水運使開廢田列柵二十益兵三千人嵗收粟二十萬石八年西受降城為河所壞城使周懷義上言宰相議徙天德故城坦以受降城張仁願所作當磧石得制北狄之要若避河流宜退三數里其費不多天德故城北倚山去河甚逺失制虜要地非便因使水運使察視逺近利病以圗進上使品官強文彩覆之文彩言與坦合上召坦使條陳將行之竟為宰相所奪乃出坦為劒南東川節度使周懷義數月憂卒燕重旰代其位遂移天德故城軍士歸怨因殺重旰屠其家初坦與宰相李絳議論多合綘藉為己助及坦出半嵗而綘罷坦至東川盡罷兩稅外山澤鹽并𣙜率之籍夷人歌之綿劒二州有通文成州路每嵗奏發二千兵以防西蕃其實不過一二百人坦乃奏於衝地置戍鎮之上誅蔡州詔發兵二千人於安州每朔望使人問其父母妻子其有疾者與之藥故兵士皆感恩集而有字無逃者及薨贈禮部尚書文苑英華卷七百九十二
