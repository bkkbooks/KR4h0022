body:
  text: 文苑英華巻十宋李昉等編天象十星囬于天賦一首查客至斗牛賦一首德星聚賦一首斗為帝車賦一首天上種白榆賦一首明河賦一首秋河賦一首天河賦一首曙觀秋河賦一首星囬于天賦以數将已終歲且更始為韻馮宿天其運乎嵗聿云莫彼星囬而斗建實維新而去故攝提克正無聞黍累之差懸象著明不忒隂陽之數仰觀蒼蒼悠乆且長一十二分終而復始二十八宿巡而有常各安其位各正其方每披雲而見質恒耿漢而流光凌霜晰晰燭夜煌煌瞻彼星之囬復知改嵗之方将豈不以式遵晷度無失綱紀縱横其狀逐青陽而左旋璀璨其容候招摇而東指匝四氣而為度臨萬戸而可視聖人所以叅象於躬考正極中天蓋高而道逺星且囬於嵗終悠悠積氣奕奕長空潜應厯以相授若循環之不窮且運故無窮時亦有替三光垂其極四序成其嵗必當觀大象以立規騐周星而取制方今時惟行夏令無苟且帝感於天而克保休祥星囬於天而不乖次舍故得律應時貞昭囬上清星歸其本嵗亦将更遵舊紀而無謬反初元而作程則有博古之士學於太史觀嵗杪而星窮知有卒而有始於是徴月令以揮翰談天經而賦羙查客至斗牛賦何類瑜客有逺人寰家海泬聲銷迹巻兊塞巧絶浩然太素之和氣勁然喬松之全節當鬱島以閒安就靈濤以怡恱喜仙查之千里每秋風之八月知必至之不欺乃乗流以長發爾乃制芰俶裝舂菰裹糧以晝以夜若行若藏沉浮于渤潏之中央蕩摇乎聱軋之大方豈靈恠之歴討實險阻之備嘗獨出於有間之世轉入於無何之鄉聽不聞其聲類馮異之依大樹乆乃有所遇若伊尹之在空桑乗悠逺兮不知其行道𣺌瀰兮無遺其跡人與木兮俱浮天與海兮同碧次黄道之的的穿白榆之歴歴反不記其所從又焉知其所適飲牛於津者誰子弄杼於室者何人軋軋有聲繽綺縞兮如雪盈盈不語粲明眸兮若神忽􅌓眙以相顧雖婉孌而不親既持石以贈子令致問於嚴遵當是時也星則知客犯爾位客不知星則吾身何碧空之無涯乃飃然而獨徃非智力之所及寔風波而是仰昔未乗查也則在地而成形今之乗查也則在天而成象若不資巨浪之潜運安得排青冥而直上倬彼星漢自天而垂澹横河之清淺皎列宿以參差客無查徒勞勤而事何可濟查非客雖徃來而世莫之知信其致人於霄漢者不必輕舟迅檝之力忘情於夷險者亦無波臣川后之欺吾既異此事乃斯焉而賦斯德星聚賦以賢人下㑹德星上聚為韻何類瑜惟德星兮聚于中天伊賢人兮集于潁川人以文而㑹也星不言而信焉彼星惟德彼人惟賢不然安得萃於中夜格于上𤣥猗歟陳氏德必有鄰展矣乾象應亦如神繄伊人之所感諒皇天之無親蓋以彰矣星辰旌乎逸人人也惟何賢之衆也星也惟何靈之大者人之有感故昭昭而應上星之不謟亦煌煌而臨下於是太史既奏潁川斯㑹賢之生兮五百年中賢之聚兮五千里内星見而粲粲爛爛人集而無小無大至若雲開天碧逈然可覿接青漢之皎皎含白榆之歴歴參差其貌炳煥其色九霄列而再揚光芒萬里視而不違咫尺既含曜而應物亦昭賢而表德觀夫天經嘒彼德星禀陽高逺垂象青冥五緯不能亂其色七紀不能雜其形明麗乎天則高而可仰光粲于夜亦爛而有靈且其賢者人之所重星者人之所仰伊賢之契星猶影之與響者也是故星垂天際應彼潁上克明克信不忒不爽拂皓月而火㣲㸃晴空而珠朗借如三星現而在戸五緯聚而表祚氣冲斗而劍出客犯斗而槎度少微興處士之憂熒惑感景公之懼曷若乎名實可乆古今是慕也則羣仰賢人之聚斗為帝車賦以運乎中央臨制四海為韻白行簡惟斗之列在天之中象其車之為用明乎運而不窮爛然有光隨月建而不忒循環靡定轉天道而潜通爾其自彼𤣥功彰乎真宰輻輳而衆星有次環回而周天可待将臨無極同樂御之在君隨轉無窮異月輪之生海故得四時式序九有皆臨順乎軌而協隂陽之分比於轂而正天地之心宛轉潜移循環微至周行不失於紀綱順動罔差於躔次何有象而著天何無跡而行地是使星辰日月之度光不失三春夏秋冬之期時不愆四懿夫拱極昭彰垂精耀芒将侔功於引重在載德以知方莫測車行式瞻其上象遥觀帝座宛在彼中央是動不過位止無其常作觧疑夫轞轞有耀想乎煌煌然則七星所臨下土之分度數必循於厚載經行用昭其廣運是以義将德比動與化俱廣覆之恩既博致逺之道斯殊輪不摧兮展雲鋒而罔懼駕非馬也歴天險而無虞所以取轅轂喻璿樞見維北之運矣豈指南而已乎猶一人之在上而萬國之是制規圓而輪轉罔差鱗次而運行無替遵不已之道豈念窮途駕自然之車寧愁輿曵是則天衢可陟雲路有勢幸見殊於輪扁之徒不可使其致功而効藝天上種白榆賦以垂隂天上歴代不凋為韻薛逢象帝之先種白榆於自然布歴歴之真質遍高高之逺天攀折何因杳在寰區之外隂陽不測永無彫落之年徒觀夫夾帝座以分行直天街而互對婆娑乎黄道之側䕃映乎端門之内匪據險以稱關詎臨戎而設塞星槎去日曽莫問其短長鶴駕來時又不言乎年代易古移今烟濃霧深當空耀本向日舒隂攅柯於貝闕之前圓光靄靄倒影於瑶池之上寒彩沉沉輪囷既出於中台偃蹇亦臨乎上将分土明得地之勢編珠表連理之狀或全或缺陋蟾桂於月中莫徃莫來鄙蟠桃於海上羙素莢之規規狀列錢之離離苒蒻雲竦玲瓏露垂崇朝而顥氣常積永夜而𤣥風自吹發端既異於乾行成象固殊於隰有曲直之號徒爾斤斧之虞則否始或叢丘墟依培塿與槎枿混枯朽歎頺齡之日既不殊桑充燧火之時焉能異栁夫如是又安得越漢排霄含芳振條壅靈根而萬古長爛披素葉而千霜不彫所謂向晦而明終天而覿衰榮不繫乎寒暑運動罔差乎經歴榆之夀兮誠大椿之莫敵明河賦謝偃月初囬於夕陽日夜没於天綱歩庭砌以逰衍覺雲霄之杳茫氣象萬殊𬗟星河而盡列光輝一道羅銀漢之靈長徒觀其粲兮如磋潔兮如磨明月照而不失其素飄風驚而匪揚其波莫測其深含天際之四氣莫度其逺掩人間之衆河及夫嵗入三秋勢直千里度龍駕而容曵搆鵲橋而迤邐霞粧星靨知婺女之不如雜珮明璫必姮娥之相似七夕作之以良㑹羣方於是而仰止固能流不可凖涯不可度既莫見乎端倪亦焉知其厚薄夫其為謙也太陽曜而不争其光夫其為德也巨海枯而莫之能涸奪凝霜之漫漫方白石之鑿鑿居崇高而不危體虚無而自若名連地脉影雜天文當霽夕而逾曉凝微雨以暫曛明白可稱則皓如曳練正平可緝亦矗似長雲亘紫極以斜轉横碧空而中分吐宵光而澹灔含曙色而氤氲将欲問之於槎客如何欲决於嚴君秋河賦張環倬彼昭回鑿天而開含秋耿耿積曙皚皚水清淺而不落光逶迤而屢廻非碧海之分上即黄河之轉來萬里直繩九霄横帶奕奕高影湯湯連瀬透垂簾於戸前飛瀑布於雲外黯如平江不動矗似長雲欲銷映東呉而寫練掛南斗而成橋氣象晶明波瀾澒洞泛濫星㸃紆餘月弄界黄道而宵迎落青山而曉送雖滔天而作限乃沃日而為節識示盈而必謙恒昏凝而晝滅亦猶靈烏之謝顧兎之缺適足明其舒巻夫何累乎昭晰於是張平子仰而嘆曰此何靈輝若有若微杳杳廻薄茫茫是非鵲填銀而何去人取石而何依乗槎之子兮上不上弄杼之女兮歸不歸坐廻遑而曉失空白露兮霑衣天河賦以天空色際寧見浮槎為韻盧肇惟天有河是生水德凌浩渺之一作於元氣掛峥嶸之逺色所以正辰極奠南北其清莫挹濯星斗以滋上𤣥其惡可流蕩雲霓以臨下國赫赫融融自西自東沿大象而其源不竭横終古而其運無窮磅礴九霄浸潤豈沾於土宇輕清一氣波瀾寧動於天風匪蕩蕩而就下但耿耿而浮空處晝則潜由一作逄昏則見俟良夜之延矚故髙明而自擅光連月窟何慙媚以懐珠影照天津豈愧静而如練至若白榆風勁析木烟秋吹玉葉而将一作盡落泛金波而共流皎皛無際闌干自浮渡蟾魄之孤輪不聞濡軌漲鵲橋之逺岸詎見操舟莫議高深孰能一作知掲厲演漾必滋於一作乎若水氛氲更襲於一作乎丹桂映蒼天一作山而漸出想積石於一作之河源拂逺樹以将低誤一葦於天際遥思濯手逺一作静憶乗槎流合璧之輝幾疑沉玉映散金之氣或類披沙辨牛豈見其津涘聞鷄遽隐於雲霞是宜以河之名居天之大閣道蛇一作虹横於曲渚驪珠蚌剖乎一作於淺瀬源流自逺清無可羡之魚分野甚明皎若誓封之帶鑿自太古䟽于囿一作圓靈奔注肯一作豈隨於川瀆高明自貫於一作乎日星夫其一作莫不濟黄道决青冥䕃地軸灑天經悠矣乆矣配吾君之永寧盧肇有集印行大抵不若寫本之善今間取二三為一作曙觀秋河賦以寥天曉清景耀昭晰為韻王損之邈彼斜漢麗於中天遇良宵之已艾與清景而相鮮勢則昭回既闌干而逺映時方蕭瑟亦汎濫而高懸的爾遥分凄然仰眺澄奕奕之浮彩隐蒼蒼而引耀孤星迥泛狀清淺之沉珠殘月斜臨似滄浪之垂釣輕暉羃羃逺景蕭蕭色分隐映光凝泬寥疑瀑布而下落似輕雲之欲銷夜景将分清光向曉縈碧落以廻薄澹晴空而縹緲躋攀不及限一水以心遥曠望空勞邈九霄而思杳發跡無際凌虚不傾積曙色之牢落涵爽氣之凄清疑曵練而勢逺訝殘虹而體輕逺想牽牛漸失迢迢之状遥思弄杼無聞軋軋之聲景氣潜昭氛埃逺屏寧在地以為狀信滔天而掛影可以翫清光狎餘景分暉爽亮向曉色而亭亭逺勢縱横帶秋光之耿耿偉兹垂象倬彼青霄映星躔之的的出雲路以昭昭想穿鑿之初悠然莫測稽源流之始邈矣方遥則知匪自人功實惟天設自虚無而想像界寥廓而昭晰意天邉之横注逺若波瀾想空裏之潜流遥疑嗚咽宜其臨清泚挹澄澈儻天路之可昇與清漪而比潔文苑英華巻十
