body:
  text: 文苑英華卷六百二十五宋李昉等編雜諌論三論塩鐵表一首為田神玉謝不許赴上都䕶䘮表一首論裴延齡表二首論追制表一首論請不用奸臣表三首夔州論利害表二首為濮陽公論皇太子表一首諌中官打人表一首為集賢崔相公論京兆除授表一首論塩鐵表劉彤臣聞國之興衰在人不在天政之理亂在變不在習故殷辛失道雖得嵗而亡齊桓反經雖改法而覇此則神而明之存乎其人之明效也是以五帝不相襲禮三王不相沿樂者豈祖孫父子自欲殊其業耶誠代異乎宜而時有所適不得已而然耳故能功格天地道濟生人三五而來未聞有弊而不遷以之長世唐諱者也國家承亡隋一作百二之季開累聖之業至於憲章彛典立教垂訓一作統可謂詳矣然猶倉廪未實流庸未還俗困兼并人嗟杼軸者所謂能適道矣而未能權積習之見不廻而隨時之宜未得故也臣聞漢之五葉孝武為政一廐馬三十萬疋後宫數千萬貢禹傳孝武取好女數千人以填後宫萬字疑衍人外討戎夷内興宫室殫費之甚實百當今然而古費多而貨有餘今用少而財不足者何也豈非古取山澤而今取貧人哉取山澤則公利厚而人歸於農取貧人則公利薄而人去其業此所以古今不一贏儉相懸故先王之作法也山海有官虞衡有職輕重有術禁發有時一則専農二則饒國濟人盛事也臣實謂當今宜之夫煮海為塩採山鑄金伐木為室者豐餘之輩也寒而無衣饑而無食庸賃自資者窮苦之流也若能求山海厚利奪豐餘之人輕調徭役免窮苦之子所謂損有餘而益不足帝王之道可不然乎臣願陛下詔塩鐵木等官收興利貨貿遷於人則不及數年府有餘儲矣然後下寛大之令蠲窮獨之徭可以恵羣生可以柔荒服討百蠻不憂千金之費懐萬國自有三錫之饒雖戎狄降附堯湯水旱無足虞也如此則成康刑措而頌聲作臣愚易之臣聞可與守一作樂成而難與慮始者常情是也陛下若允臣愚計便付有司則恐由習常就闕無日伏請付中書門下令妙擇才幹委以使車則愚臣所獻儻裨萬一奉天適變惟在陛下行之為田神玉謝不許赴上都䕶䘮表此篇當在五百九十七卷䘮􅌾門今已移入姑存其目論裴延齡表徳宗元稹按陸贄貞元十年敗元稹元和元年除拾遺相去十一年二表恐非稹作集亦無之臣某言臣昨二十五日宰臣伏宣聖㫖以陸贄敗官罪狀不可書於詔命陛下慈仁愛人恩宥愚直仍令後有所見得以上聞臣忝職諌司不勝大幸臣等前所上表言陸贄等得罪之由起於讒構此皆延齡每自倡言以弄威寵及奉宣示奸詐乃明陸贄久在禁垣復典樞要今之譴責固出聖衷竊以李充勵志䘏人勤身奉職恵愛之化洽於細㣲頃以公事之間與延齡相敵未貶之月延齡亦以語人讒構之端羣情是惑臣聞大臣之體出於讒辭安可持宻勿之言為忿怒之柄朝廷側目逺邇摇心百官素不能親附延齡者屏氣私門不知自保陛下聖徳下照物無所遺豈獨厚於一夫而乃薄於天下伏惟發誠謹中官備問閭里有言延齡無罪李充有過臣實㣲眇敢逃天誅李充覆族亡家於臣何害事關大本不敢自私延齡奸計萬殊方司邦賦必能公用財賄陰結匪人則他時之過彰聞路絶伏以貞觀遺訓日經宸心去其邪謀以慰天下幸甚幸甚臣不勝懇廹之至同前徳宗前人臣某言間者陛下親授臣以直言之詔又命臣以言責之官奉職以來未嘗忘死誓將忠懇上答鎔造竊以裴延齡虧損聖徳瀆亂典章逞其心欲以蝥毒黎元恣其苛刻以動摇邉鄙弄陛下爵位以公授私人盜陛下威權以誘脅忠善賢愚注耳朝野同辭臣固不敢飾其繁文再擾聰明所以晝夜感憤不能自寧者以陛下執刑賞之柄不僣在人延齡狡詐公行曽不為念伏見去年十二月五日勑度支計管李玘配流播州張勛配流崖州仍各決六十斯則延齡自快怒心曲遂其狀陛下聽之以誠謂為當舉峻其所罰用直羣司罪名及加寃聲大振陛下深鑒其事詔命中留曽不旬朝馳聞海内使逺方之人疑陛下明有所擁令無必行奸以䧟君孰任其咎儻二人獨決延齡之手死不得言化理之失豈不重乎陛下常以登聞之鼓置之於庭必欲人情纎㣲不滯於外比來或事繫度支衘寃上訴皆不即驗問盡付延齡縲囚衣冠攘奪孤賤身不足償其怒家無以應其求怨痛内緘誰與為理矰繳盈路動而見拘咫尺天門不敢上訴延齡之威益熾疲人之苦日深陛下必以延齡為賢言者皆妄不若明白其罪昭示萬方使延齡無辜辨之何害儻兇惡滋蔓欝於人心決之不時所傷豈細臣實寒心銷肉用是為憂伏惟俯鑒聖情召臣問狀有一非㨿罪在靣欺臣不勝廹切之至論追制表元稹臣某言臣聞令之必行於下者集作必如行之者信也令茍不信患莫大焉今陛下初臨㝢内務切黎元至於牧守字人之官所宜詳擇茍未得人不當虛授茍或任使不可屢遷臣竊見近除寧州刺史論傪虔州刺史髙𢎞本通州刺史豆盧靖曽不渉旬並已追制又以杜兼為蘇州刺史行未半途復改郎署臣不知誰請於陛下而授之誰請於陛下而追之追之是則授之非授之是則追之非以非為是者罰必加然後人不敢輕其舉以是為非者罪必及然後下不敢用其私此先王所以不令而人從不言而人信豈異事哉率是道也今陛下如綸之令朝降反汗之詔夕施紛紛紜紜無所歸咎臣竊恐陛下之命未能取信於朝廷而况取信於天下乎臣伏願陛下徵舉者之詞察追者之請若舉者之詞直則請而追之者不得無過若追者之理勝則舉而授之者不得無辜賞罰是非所宜明當况陛下肇臨黎庶教化惟新詔令之間四方所仰小有得失天下必聞臣實庸愚謬居諌列職當言責不敢偷安茍有所補集有作裨萬死無恨無任愚廹懇欵之至謹詣東上閤門奉表以聞論請不用奸臣表穆宗裴度臣度言臣聞主聖臣直今既遇聖主輙為直臣上答殊私下塞羣望一作謗誓除國蠧無以家為茍獻替之可行何性命之足惜臣某中謝伏惟文武孝徳皇帝陛下纂一作恭承丕業光啟雄圖方殄頑人之風以立太平之事而逆豎搆亂震驚山東奸臣作朋撓亂集作敗國政陛下欲掃蕩幽鎮先宜肅清朝廷何者為患有大小議事有先後河朔逆賊只亂山東禁闈奸臣必亂天下是則河朔患小禁闈患大小者臣等與諸道戎臣必能剪滅大者非陛下制斷非陛下覺悟無計驅除今文武百寮中外萬品有心者無不憤忿集作怨有口者無不咨嗟直以威權方重奬用方深有所畏避集作忌不敢抵觸恐事未行而禍已及不為國計且為身計一作謀者耳臣比猶懐一作思隠忍不願發明一則以罪惡如山怨謗如雷伏料聖君一作明必自誅殛一則以四方無事萬樞且過紀綱潜壊賄賂公行待一作候其貫盈必自顛覆今屬兇徒擾攘宸衷憂軫凡有制命繫一作計於安危痛此姦臣一作邪恣其欺罔干亂聖略非止一途又與翰苑近一作舊臣結為朋黨集作黨與陛下聽其所說則必訪於近臣不知近臣已先一作私相計㑹更唱迭和蔽惑聰明所以臣自兵興已來所陳章疏皆是至切一作事皆要切所奉集作連書詔多有參差蒙一作惜陛下委寄之意不輕被奸臣抑損之事不少臣所與一作素知佞作亦無讐嫌秪是昨者臣請乗傳詣闕面陳戎事奸臣之黨一作徒最所畏懼知臣若到御座之前必能悉數其罪一作過以此百計止臣此行臣又請領兵齊衆一作進逐便討賊一作攻討奸臣之黨尤所一作典加阻礙恐臣統率諸道或有成功進退皆受覊牽集作束意見悉遭杜一作蔽塞復恐三人一作復與一二險狡同辭合力或令兩道招撫逗留旬時或遣蔚集作他州行營拖拽日月但欲集作願令臣失所使臣無成則天下理亂山東勝負悉不顧矣為臣事君一至於此且陛下前後左右忠良至多亦有熟㑹典章亦有飽諳師旅足得任使何獨斯人以臣愚見若朝中奸臣盡去則河北逆賊不討而自平若朝中奸臣盡一作尚在則河朔逆賊雖平益熾一作縱平無益臣伏讀國史知集作見代宗之朝蕃戎侵軼直至畿甸一作直犯都城代宗不知盖被程元振壅一作蒙蔽幾危社稷當時柳伉乃太常一博士耳猶抗表歸罪為國除害今臣所任兼揔將相豈可坐觀兇邪有曀日月臣不勝感恩一作憤嫉惡之至謹附中使趙奉國奉表以聞儻陛下未甚信臣一作未信忠言猶惑奸黨伏乞出臣此表令三事大夫與百寮集議彼不受責臣合伏辜天鑒孔集作郎明照臣肝血但得天下之人知臣不負陛下則臣雖死之日猶生之年第二表集作狀前人臣某言臣聞木有蠧蟲其木必壊國有奸臣其國必亂伏以前件人為蠧為奸欺下罔上百辟卿士莫不知名集作莫敢指名若不竄逐必為患難陛下雖一作他時追悔亦恐無及臣所以奮不顧身舉明罪惡其第一表第二狀伏恐聖意含𢎞留中不行臣謹再寫重進伏乞聖恩宣出令文武百官於朝堂集議必以臣表狀虛謬牴牾權倖伏望更加譴責以謝𢎞簡元稹如𢎞簡元稹等實為朋黨實蔽聖聰實是奸邪實作威福伏望議事定刑以謝天下臣今將赴行營誓除集作誅兇冦而憂心在腹不在四支憂在朝堂一作廷不在河朔伏感諸葛亮出師之時上表言事猶以宫中府中不宜集作合同異科犯為善為惡請申刑賞臣才雖不逮諸葛亮心有慕於古人昧死聞天伏紙流汗同前白居易臣某言臣聞主聖臣忠聖主既明臣輙獻至忠之誠上理國之典下去邪之疑伏望陛下納臣之諌則海隅蒼生兵屯咸偃無大臣之諌則國必敗有大臣之諌則國必安非疑元稹之愆其事有實亦不虛矣矯詐亂邪實元稹之過朝廷俱惡卿士同寃裴度論議之謀陛下已令奬度之勲不允所請理已為乖今陛下含忍不為竄逐處之台司同議國典天下人心無不惶戰何執元稹之言居度散司之職且同議裴度今功業今代一人卿侯士庶無不同惜今天下欽度者多奉稹者少陛下不念其功何忍信其奸臣之論况裴度有平蔡之功元稹有囂軒之過東都留守誠即清閑大勞之功不合居於散地伏望陛下聖恩照明並無矯言伏乞追裴度别議寵榮臣素與元稹志一作至交不欲發明伏以大臣沉屈不利於國方斷往日之交以存國章之政臣等職當諌列不敢不奏謹奉表以聞無任兢廹戰切之極瞻望廻恩天下同慶元白交分始終不替方元傾裴白不應有此論列集固無之光謂君直友逆則順君以誅友古有行之者則此奏亦不為過但白非其人也與元稹二表俱非是當以唐書為正夔州論利害表劉禹錫臣某言伏凖元和十二年四月十八日勑諸州刺史如有利害可言者不限時節任自上表聞奏者臣伏見貞觀中詔許羣臣各上書言利便馬周時一布衣遂因中郎將常何獻䇿二十餘事太宗深竒之盡行其言擢周為御史一有裏行二字至龍朔中璧州刺史鄧𢎞慶進平素看精四字堪為酒令髙宗嘉之亦行其言遷𢎞慶為朗州刺史則知茍有所見雖布衣之賤逺守之㣲亦可施用况臣早受國恩徳宗朝忝為御史逮今歴事四聖集作朝頻領藩條當陛下至明之時是㣲臣竭節之日伏以守在遐郡不敢廣有所陳凖勑上利害及當州公務各具别狀奏集作以聞伏乞聖慈俯賜鑒照無任同前前人臣某言伏凖今年四月五日徳音宣令諸道觀察使刺史各具當處利害附驛以聞者伏惟皇帝陛下睿哲自天纘承列聖善述光志發揚徳音率土人臣不勝慶幸臣虔奉詔旨宣示蒸黎伏以華夏不同土宜各異詳求利病謹具奏聞伏乞聖慈俯賜昭鑒臣伏覽國史竊見開元十八年朝集使至京師𤣥宗臨軒親問利害時宣州刺史裴耀卿上便宜事論轉運甚詳竟不行下至二十一年耀卿為京兆尹再以前事奏論方見允納比及三年漕運七百萬石省脚三十餘萬貫當耀卿前不見納必有人非之及後數年得集作方展其効臣僻守逺郡敢望言行祗奉詔書或冀萬一伏惟明主擇之無任為濮陽公論皇太子表李商隠臣某言今月某日得本道進奏院狀報今月六日宰臣鄭某等率三省官屬入論皇太子事者禠魄疆塲馳魂輦轂莫知本末伏用驚惶臣中謝臣聞禮賛元良易標明兩是司司鬯以奉宗祧華夏式瞻邦家大本自昔質文或異歩驟雖殊既立之以賢則輔之有道北宫養徳東序承榮集作勞非務近正人用光繼體周則周公為太傅太公為太師漢則疏氏二賢商山四老内揚孝道外進忠規猶在去彼猜嫌辨其疑是不由㣲細輕致動摇乃得守三十代之丕圖延四百年之景祚著於史冊煥若丹青伏惟皇帝陛下道冠百王功髙三古事窺化本謀洞機先皇太子自正位春坊傳輝望苑陛下旁延雋乂以賛温文並學探泉源氣壓浮競嗜魚不進求玦莫從有王褒之獻箴無卞蘭之奉賦今縱粗乖睿㫖㣲慊聖心當以猶屬妙齡未加元服或携徒御時縱一作致逸遊樂野夏儲亦嘗觀舞南皮魏副屢見飛觴陛下濬發慈仁殷勤楷教稍踰規戒即震威靈雖伐木析薪必循其理而逝梁發笱亦有可虞抑臣又聞父之於子也有嚴訓而無責善君之於臣也有掩惡而復録功故得各務日新並從夕改同寘子集作于道不傷其慈儻犯在斯湏便遺天性過當造次遽抵國章則以古以今孰為令子在朝在野誰曰全臣虛牽復之㣲集作至言失不貳之深㫖伏以集作惟陛下侔覆育於天地霽赫怒於雷霆復許省勵宫闈卑謝師傅蹈殊休於列聖慰欽矚於兆人臣才則荒凉志惟朴騃因緣代業蒙被官榮竊諸侯之土田領大將之旗鼓當車折檻合首他人瀝膽刺心正當今日而名非朝籍務切軍機道阻且躋佇立以泣龍樓獻直戴逵之辭翰蔑聞鳳闕拜章張儼之精誠未泯干冐宸極無任隕涕祈恩之至謹差某官某奉表陳論以聞諌中官打人表劉寛臣某言臣生逢昌運謬列班行官為御史職在舉事齒髪始壯名籍已至在臣至㣲誠為多幸所以愛惜朝廷宗廟之意與元老大臣不殊臣昨遇郊禋得陪盛禮見執事者說陛下饗獻太廟至穆宗皇帝第九室跪起嗚咽感動神人臣不覺涕淚知陛下孝徳可以化天下矣又至圓丘覩陛下升降嚴恭之禮不覺手足舞蹈知陛下誠敬可以逹神明矣如嚮者數事非根於生知禀於天授固非一朝一夕之所能致推是而論則三皇之徳必可侔五帝之業不足跂洎車駕即路臣實先馳至丹鳳門南禮物備具忽聞傳說云適有白身數十人於金鷄竿下奪囚崔發亂打致死有司救止力不能禁兵仗紛紜僅以格戰瓦礫交下傍中朝臣不勝驚痛盖惜其無知毁損聖徳也如此崔發為縣令有事疑當之罪抵朝廷之法有不赦之科斷自宸衷寘諸刑典則可矣豈得下人肆意騁憾一時紊亂綱紀敗失國體豈可使縱恣漸隳也儻陛下欲杜將來之萌絶偏黨之說俾罪人斯得正是刑名則太平之業日益崇矣臣又以為今日構扇人數至多若盡加誅恐非中典茍捨而不問實蠧大猷以臣愚見莫若勑左右軍使尋求首謀者一二十輩下明詔以示海内知人臣無専殺之文乗間之謀不敢萌貯庶無私之徳與日月盡明又伏聆今日赦書求理至切令一作命諌臣論事遣憲吏執法乗輿服御志在抑損又以見陛下遵禹湯之㫖同堯舜之求臣為耳目若有所聞而不上啓是臣負陛下之深也焉敢不言不勝慺慺懇切之至為集賢崔相公論京兆除授表錢珝臣某言今月某日伏奉宻詔具審聖㫖欲以某官鄭浦除京兆尹令臣進擬來者出自宸衷敢言違詔事非允當合具奏聞伏以三輔之雄京兆居首王畿之理専制甚難歴代重官當今急務比者任用多是丞郎給舎有才之人或藩方善政之師宣宗皇帝求理之切常輟翰林學士韋澳授以此官今陛下固合且命中書令其公選茍或未稱即可改張鄭某自守疑周行頗聞静守當官蒞職亦極恪勤量材則可以序遷進善則無妨奬勸至於關中户口本貫京師轂下威權莫先尹正畿甸之内諸鎮甚多都城之間萬户來㑹責辦則供湏極衆整肅則彈壓且殷鄭浦入仕之初曽為塩州軍事判官幸守章程粗成勞績因兹際㑹遂列朝班物望固輕揚歴未久儻以此官除授必當不叶羣情向者嗣薛王柔以宗室大臣久兼崇秩事功已著㹅領方宜以浦代之恐失所稱浦既乏公望又匪異材遽逹宸聰必因薦導失舉之誤所繋非輕臣知柔出藩便憂京兆之任盖二十四縣無不凋殘况屬今秋又罹兵火鄉閭刼殺尚且未安軍鎮侵陵比常多事賦輸之際撫緝尤難頃自黄巢犯闕災患相繼京畿百姓傷死固多今所保全皆由自備凡為兵器無不家蔵冦至即設寨依山事已則還鄉力穡可耕可戰自是精兵今近鎮多强不為無事徵召外藩騎卒朝廷又乏軍糧昨者猖狂兼為患禍毎宜深戒不可遽忘實任京兆之權兼湏武略不惟便於政理亦要防於艱虞臣請便言冀合睿算竊見某官李鋋一作鋌下同兩朝宿將久立茂勲頗以威名彰於委寄衆情甚洽公論多推授以尹京必能通濟京畿制置兼以命之有權則可抑豪强用武則可清奸盜圖安之本全在京都備患之先無加軍旅鋋之才略得以㹅臨畿内戸人累經賊冦農收之暇訓練不難鄉閭自强侵擾固息無事則各營耕稼有慮則便執干戈不假饋糧又非失業既安必集就便不煩况目下京都未能安堵速湏制置安得因循非李鋋不可委任事惟一作權重難尋已叅詳外度人情内思機便悉宜如此方敢陳論伏乞聖明静賜睿一作循覽以京尹難理之事思當今奸弊之初用非材無望之人可以控制於此若他時不濟何以謀安雖欲用典罪之固亦無救於患且李鋋與臣無素分鄭浦於臣無宿嫌與奪之間公當而已切於此事尋欲兼候奏聞便屬忽患瘡痍不離枕席近雖潰穴尚有本根固極虛羸且湏將理寢食敢忘於機務敷陳又隔於天顔遂敢直奉牋毫粗逹肝膈伏以反正之新致理仍急有犯無隠臣心合罄於此時從善如流聖政宜先於大者甚難甚切不敢不論伏以睿斷精明臣等常切感作今兹論列實冀允從儻或未察愚衷臣實不敢奉詔干冐宸扆臣某無任惶恐廹切之至文苑英華卷六百二十五
