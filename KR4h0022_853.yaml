body:
  text: 文苑英華巻八百五十四宋李昉等編釋五滄州弓髙縣實性寺釋迦像碑一首洛州昭覺寺釋迦牟尼佛金銅瑞像碑一首滄州弓髙縣實性寺釋迦像碑張文成詳夫元天北列運斗極於璇樞大地東傾鎮江河於岊玉晝夜則晦明無定曦舒為朝夕之資動静則虧缺有時乾坤非長乆之噐豈湛然常住大雄包混沌之源寂爾無生正覺出氤氲之表故能使九十六道紀菩提之一門三十三天貫湏彌之四頂振嵐颷而吹大塊運僧祇於埏埴之前揚智炬而爍闕置賢刼於陶鈞之上其去也後天而㓕故現滅而歸無其來也先地而生故因生而示有青霄帝座降靈氣于中胎白净王宫孕神姿於右脇蓮乘七歩樹下六年薦玉象於祥符啟金人之瑞夣影流中國大地由其震動光入太㣲垣星為之不見法王之應跡也妙覺常身本無顔色至人埀教遂有形儀開滿月之竒姿韞中天之異相髻衘龍髮頂秀螺文萬印生於瑞手千花發於神足蓮開青目毫光照於四天花艶丹脣頂彩周於十地法王之實相也具一切智號悉逹多通萬物名心希有往來不窮之謂聖隂陽不測之謂神不化而行不言而信持惠燈而耀長夜揚法舸而救迷津為塵品之醫生作群生之慈父法王之至仁也法忍智忍率難忍以皆空無心即心緫群心而俱攝珊瑚江海一指測於波瀾琉璃日月二手分其晝夜目連持線天地為之頺綱舍利投針山石由其絶紐法王之神力也儒童毓秀闕里生歎鳯之君摩訶降跡苦縣誕闕龍之彦仲尼禮義之標首抑至聖於迦維伯陽道徳之真宗訪右皇於天竺故知一乘妙㫖超然居十翼之先二諦㣲言邈矣出童之表法王之威徳也率陀天上飛閤神宫舍衛城中香䑓造化百千妙界生於鳥翅之間十二音聲出於象牙之長金䋲百丈下照月宫珠網七重傍臨月殿萍流地上化為池沼之形花散空中變作樓䑓之影法王之壯觀也佛中佛日天上天人金口振於西方銀凾洎乎東夏無能間細冩鼇滶於波流一作瀾有外談空運迦維於宇宙合掌腹内思聞十善之音舒翼殻中遥相四天之說法王之仁化也髙梯直上包括太虚抽針旁紋區分小有貫花之句光如水上之蓮花說偈之音皎若星中之月非有相而非無相凡聖莫測其幽㣲空是色而色是空聖愚不知其要妙法王之教化也法身無像故因像以宣功道本無言亦因言而示教塵俗不可以乆䖏故厭世而歸空真如不以道摽故凝神而降跡吾之去也因其辯無常吾之來也因來談縁起情有所至河海為之編龍神有所歸叢林為之變鶴從滅至滅能通寂滅之因無生示生永入長生之地法王之變化也由是八方廽向萬國歸依惠日被於三千法雨流於百億周穆王之代聖教方融漢眀帝之時慈風漸扇年移晉宋運屬周隋蒼鵝出而天地屯赤龍發而干戈起秦川涌血羅什不歸趙郡僵屍圖澄永去西域䭾經之路荆棘参天東郡畫像之郊風塵撲地我髙祖神堯黄帝傍廽地軸蹴崑崙以傾西惟太宗文武聖皇帝仰握乾符掃欃槍而南滅削平嶽瀆舒巻風雲芟毒樹而建祗園㧞邪山而開福地實性寺則貞觀三年奉勑之所建也平原控趙渤海臨齊上衡畢昴之星下瞰衡漳之地浦稱駿瀆馬頰太史之遺蹤地號弓髙龍頟將軍之舊業爰於此地廽構乾堂興八㑹之香䑓闢三休之妙觀龔遂觧䋲之邑寶線争長一作將曹丕沉李之郊天花競落螺宫映水枕藕關於黄河魚梵吟風接蜃樓於滄海實栖神之秘宅毓善慶之神區者哉寺主乆依定水早庇禪林功濟有縁業優無學意花不染𢎞上善於慈心勝累疑作果争攀察中乘於惠眼非色非相凝神䆒竟之端無我無人髙蹈苦空之外上座都維那等並尋鷲嶺訪道鷄園歸誠甘露之門自得醍醐之性鵝珠䕶戒標苦節於堅林龍鏡澄空照真歸於净域以為脩身者福福遂則殃銷堅善者功功施則縁發旁求大匠廣召山虞粤以儀鳯二年移寳堂於寺内去舊䖏三百餘歩設竒功於地道神妙無方窮逸思於天關靈機不測魚鱗翠瓦逐層閤而舟移鴈齒青階帯崇基而轂轉虹梁曜日煥若神行鯨棟凝煙故非人力寳階星動似忉利之飛來紺殿雲同浮化城之涌出豈非威神自在不可思議者哉於寳堂内敬畫什迦尊像一鋪鎔金範素冩艧圖青斵象浦之靈珠瑑龍泉之羽壁鮫人水織競送霜縑蛾客抽絲争投雪線七重交映百寳莊嚴實相端凝粹容圓備蜂王獻蜜紛飛紫紺之樓龍女持花出入珊瑚之殿諸獻天果芙蓉生寳座之前居士焚香栢葉起金爐之上千軀聖像㨿六地而揚音八部龍神下三天而奏樂斯乃𤣥功幽賛故無徳而稱焉調露之初邉烽屢警七重黒暈萬里黄沙旄頭干太白之精素髮拒中台之翠鄉人等九州令族四海良家提龍劒而星馳撮􅙈渠而電激為鵬為鶚輕飛鴈塞之前如虎如貔廽嘯狼居之表隂山霧廓澣海波清慿惠力而服魔軍持廟筭而摧孺子共申𢎞願植此豐碑記歴代而長存惟令名之不朽奉為髙宗大帝星珠歛耀斗電潜輝御鸞鳯於金轝邃攀龍於鼎嶠媧皇誕裔姫姒降禎㫁鼇立極之神功乘龍御天之大業凝情三昧早惠六通坐蘭㧞而䖍誠仰次山而展慶使持節滄州諸軍事滄州刺史李公挺堅林之雅操列烏喙之殊姿漢太尉之名家履龜文之異相賈琮出刺下車而肅百城韓壽閒居閉閤而綏千里長史北平公晉太尉寵首有虞陶唐左相之榮實兼平景龎士元之展足終非百里之材王休徴之佩刀實有三台之望朝散大夫行弓髙縣令晉君嘉禾獻瑞門傳翠葉之風鬯草襲勲業踐彫弓之錫横綺琴於膝上翠翟朝馴攬眀鏡於懐中青鸞曉集丞太原王愿主簿隴西李灌尉河東衛神暹常山張行昇等並周靈王之史仙人白鶴之苖裔帝顓頊之孺宗柱史青牛之葉胄羊車映玉煥昇氣於淮疑作脽川鵲印欝靈符於寳軸驥從東道方申逐日之功鵬舉北溟皆戢摩霄之翼鄉望某等並地鄰鄒魯境接燕齊俗冨詩書家豐禮樂海隅鷗狎猶存射雉之規河朔鷹揚仍帯爽鳩之氣雋不疑之故里氣調魁梧石仲容之舊墟英靈俊傑徳由名顕功以頌宜非筆無以申其功非言無以叙其徳旁求翠琰逺播鴻徽刻龍首于銀鈎鑿龜文於玉版蓬萊之水三尺孤標碣舘之前扶桑之日再中獨立金䑓之上俾夫天銷刼石瓊文冩而無窮地入㣲塵寳字書而不滅重宣此意而為頌曰大虚混沌寂寥沉黙二儀既判三才允植地缺東南天傾西北陵遷轂轉山開水塞月滿則虧日盈則昃大哉正覺意元不側先地而極後天而益不滅不生無聲無色曜魄指掌乾坤胷臆聖人立教用形表則實相端嚴粹容岐嶷銷滅五苦削平六賊水號連河山名檀持六度斯闡三眀在即牛口西來馬明東陟玉偈光啟金言允克碣石燕郊平原趙國雀䑓西指蜃樓東逼建此神區爰崇净域龍圖合兆龜書應墨綺綴星浮金鋪電絶地神獻果天厨送食八㑹雲平三門箭直寳堂移轉神通智力飛簷振羽虹梁重翼閤似雲行樓如鶴息増日逐堦旋天橋縱匿野外塵黄星間暈黒爰慿净居剪除荆棘鴈塞消氣龍樓受職銀書玉版鐫名記徳臨鴈塔之堦基對蜂䑓之閫域窮逸思於圖篆放神功於剪刻孤標九流之間獨立金䑓之側惟令名之不朽或馳芳於百億洛州昭覺寺什迦牟尼佛金銅瑞像碑李嶠盖聞發體凝寂離形相之區道心𤣥㣲同虚空之徳不可以名言說不可以去來敢泊矣無繋脩焉似存潜輝匿端而迹滿三界滅識掩智而行該萬法契存於希夷之表機動于忽恍之中談其空則不盡有為索其朕則服歸無物非闕天之至妙其孰能與於此乎夫權智無方說三應物真乘寂住抱一湛然同天等人寜累於我净見病示慘未虧於常樂故能蒙塵於八邦疑之路含垢於五濁之津入其廽輪爾乃脫生死共其迷復然後舟航顛倒撫神機而獨化携弱䘮而同歸大悲所薰其利博矣𤣥徳所被可勝言哉及道墮盈虚教遷正像猶嘱累於句偈尚隄防於脩習足疑作是以四依弟子深演䕶持之功十行法師大𢎞供飬之事爪甲儻盡悉成菩提心口能存俱離煩惱法雲上際於兠率慧日傍臨於震旦魯人將聖神契闇托於西方漢主聖眀靈議夜飛於東國屈伸變化其不可思議之致歟皇帝以六龍乘時三獸演法窺道品于掌握接聖期於闕暮彈壓海際彌綸沙境赤縣為吉祥之宅蒼生沐仁夀之賜瑶凾玉檢荅宇宙之隆平寳網珠幢迎天人之勝福丕業以不宰成務深慈以無縁致功固已合上帝之元符開中天之寳藏豈徒窮數盡妙越契踰䋲而已哉太子左衛率上柱國相王八卦乾男五行帝子金相玉質鳯毛龍翰㓜承寵異列爼豆於南郊長懋徽音粢盛於東陸孝友隆其三善温良登其四行貴而思降體易象之流謙冲而不盈道家之日損每推太宗之重深讓元良之徳攀紫庭而抗䟽懼隔照臨仰𤣥四而申䖍庻通誠感異固疑作冀因十善之力遂廽九臯之聽跪辭銀版褰裳下天地之宫拜受玉璜備物坐侯王之國裂山河於大郡黒社生光屬七鬯於元昆黄離遐阻欣跗蕚之有序慶宗祏之彌隆載荷今恩永垂曩誓乃發願造什迦牟尼佛尊像一軀大菩薩弟子神王各二身方撒東山之府且模西竺之容皇嘉廼誠用錫休命制度廣輪之法咸順私心琢磨鎔範之資盡令官給於是乎百工獻技九牧輸琛瑞雀棲鑪仙人練火觀秘影於龍窟得真形於鷲山三輪千輻之偉姿七滿八圓之殊相青毛紺髮蓮目睟容珠纓大士登䕶法之筵金杵神王夾降魔之座罄崑岑之瑶碧窮蜀道之丹青黼繢周施荘嚴具足瞸兮似金山之出海毗首天近慙其琱刻靈儀始畢寳餙纔終眉宇之間忽呈異彩圓周一作同植璧冏若懸珠合身之千光連西門之五色官司駭視而愕立逺近争途而交赴廽兩宫之軒騎動七貴之輿輪稍積旬時愈益郎則神變無象真筌隐乎宻㣲感通有途妙契存乎咫尺自非聖靈合徳忠孝因心何以發金鞍之殊祉玉闕之秘相者哉西域金身既遷於勝妙之塔南宫像盡亦送於清源之䑓揆卜因安有自來矣聿求勝壊用遷期刹有司制禮具音樂洛州供車乘内出神幡香轝送至道塲於是士女雲趨衣冠翕集二龍灑道千馬隨軒幡花經鐵鏁之橋讃唄下金䋲之路前後遵從梧宫竹苑之球琳左右奉持秦圃蔗園之龍象煙霞將囂庭混色鼓鍾與蠡具齊音園繞周旋逹於净境既安象設仍建齊筵親屈萬乘之尊俯從八關之㑹日月天子來待威儀星辰大夫預陪文物携麒麟之貴戚入鸚鵡之仙䑓樹低隂祥蓮接歩以犧帝龍顔之相謁象王螺髻之容對奉二宫忽疑什迦之讓座詳觀兩聖更似多寳之分䑓一作塔于時人天盡室法俗傾都衆有稲葉之多地無針鋒之隟並晞玉鏡咸仰珠輪莫不注目䖍心稽首禮足慶薝蔔之還嗅悅優曇之更開咸訝難思得未曽有爾乃寳坊四敞銀關䨇闢地如龜甲山似龍鱗羽騎衘枚列萬隊而清警天龍按部緫八神而環衛威容儼其既肅中外寂而無譁然後借座燈王請飯香士大乘法匠開不住之宗耆儒禮官獻無庶之式傾中藏之寳貨移太官之玉厨衣鉢分行簮居聮事流三川之水未足方油渠酪池興二室之榮疑作雲不能嫓香烟花雨大樂驚於寳刹髙幢入於梵宫誦經則上界遥聞彈指則下方俱動用慈悲而行喜捨以清浄而為功徳初中之布施寜比其多南北之虚空未量其果方見如來種智化成於天寳之基菩薩慧眀利建闕成之業寜止百千聞法咸蒙離垢億萬同㑹俱證無生惟抱義含仁顧言慎徳文章冠代禮樂在躬以旦奭之周親踐曽史之名行詩書探四學之奥篆籀殫六文之功資寛和之性不伐不矜秉夷澹之心無榮無欲用能體道悟發遺榮去羡讓其天下髙名動於萬方得其環中妙果深於大度觧末俗之常愛蹈真空之逺跡勝上之業所以崇奉君親謙偽之風所以率先黎獻行可以激貪止競誠可以運神感靈即事論功因今揆昔則南吳去國心未階於紹隆東海稱藩福不登於資敬豈足以梗槩風範叅差軌轍昔栒邑以塵勞樹績猶勒琱戈衛臣以陪𨽻収功尚銘彛鼎矧乃調御輪闕之功亦君王去就之事津洭共滄溟埒廣名節與嵩岱齊髙形舞詠而被笙鏞固其宜矣書版圖而鏤金石夫何愧焉爰命下臣式旌髙躅庶山飛海竭將地軸而無傾火刼風災共金堅而不朽重宣此義敢作銘曰心行之表虚空之際有物闕成是名真諦非生非滅不巨不細去失其方來無所繋潜通鍳揆闔發機神大闕流俗權開應身非邪作正一作綱導法為輪蟄户逄照迷途得津天籥含聲衢樽稱物酌焉不匱動而愈出說果眀因談因證實波旬廽首尼揵頓膝應變開鑿隨方汲引徳洞幽深化緜區畛洽恩洎縁停報斯盡石室韜光金河輟軫慈舟已謝慧炬俄沉色相俱覩希夷莫尋蒸哉睿聖皇矣君臨更維象法還開佛音有羙親賢于嗟檀捨讓踰㫁髮誠均捧馬脫屣青宫分茅黒社道闕方外義髙天下將追宿契且樹良縁乃隆皇造爰抽國泉觀形兠率取法優填大治神化靈儀自然異相紛紜殊姿掩藹黼闕丹艧莊嚴金闕面似月輪頂如天盖十位傍拱四神來㑹真契何逺心誠則通毫文玉㓗額理金融色動天印輝含帝弓不資睿徳孰顯神功象設既安闕塲乃闢玉輿廽軫瓊柯侍席伏一作伏是擁曲鈎筵羅飛錫海引千供霞張奕人天鼓闕龍象徘徊作花盖烟為寳䑓闕嘉願克成供因無乏百靈衛善千祥䕶法眇眇三思悠悠萬刼永固彛噐長隆寳葉文苑英華巻八百五十四
