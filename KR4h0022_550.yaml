body:
  text: 文苑英華卷五百五十一宋李昉等編雙闗門中十二道鍾官不充亭長易傳判一道同㸑不服義居芝草判一道掌麑擅放穿墻流惡判一道襲封録兄女代父刑判一道常好種荔繼母出服判一道甲居重澤田獲三品判一道是儀書衣主司舉正判一道旄人奏散率木脩防判一道登城而指専席而坐判一道元日懸象税千畆竹判一道罷役務農論象肉刑判一道主司徵筭探卵窺隣判一道鍾官不充判庚為鍾官所鑄不充嵗計工部按其罪訴稱鉛錫不足亭長易傳判又亭長私易傳置為嗇夫所糾對賈晉六官既分百工有序五里作候十里為亭鍾官所資藉洪鑪以鑄䥱一作鎔鑄傳置之用通遐方以奔走典尚方之衡量揔亭郵一作旅亭之掃除位雖列於周官役乃疑於劉氏不充嵗計鉛錫有虧私易傳車三千難逭工部以禮闈望重欲飛奏草一作章之刑嗇夫以傍舍朅來將對上林之問庚有詞而難罰亭易傳而寘愆㑹府無妄繩之辜紏人彰嫉惡之徳况風嚴北陸日落西山仰鳳闕而神㣲擁鶉衣而思奪同㸑不服判得王甲與從母夫趙乙同㸑乙有罪物故甲不為三月服䘮從母訴甲無義縣令王庚笞甲四十死州斷庚加役流庚不服義居芝草判又虞乙家五從義居園中禾生兩穂庭中産芝草蓋形紫色隣人告隠瑞州不斷罪亦不上聞對李龜年命以義夫光昭令徳俾立家室其一作禮或有差同㸑則緦已發檀弓之問義居成瑞雅均唐叔之謡王甲㝠豫在躬物故無服虞乙至誠必察感而遂通從母薄言因遘憫而興謗隣人所告何至攻乎異端徳音莫違及爾偕老制義居業光輝日新繐帳空懸悲深苦月芝庭獨秀榮曜生春一作春風宿草之墳未展生芻之禮擢蘭之砌已交蓂葉之隂縣令能業其官懲忿窒欲州司以明庶政敢復未聞罰既甚於蹊田瑞頗陳於州里欲拘司敗法也何逃或禮出異文縁情僶俛瑞符等級易有随時未尋物故之由難語不應之坐竚詳靈草之異方書掩瑞之愆掌麑擅放判丁獲麑付已掌已愍麑放之丁毆已穿墻流惡判又甲孟穿墻為水竇流其惡於街衢坊人論告對辛則然帝徳廣運皇綱載紐鳥獸咸若閭閻且千麛卵無不時之求比屋有可封之美丁以庸妄謬居東户之朝孟以謏聞獲染南風之化自合依仁游藝頌明王之盛徳皷腹撃壤成一作歌太平之樂事何得盤遊無度肆情於麑鹿之間穿穴匪恒流穢於街衢之内已則志惟惻隠處食野之長驅坊則情深嫉惡在公庭而載理徵諸故事已有託付之髙考之今法盖有干違之舋請科毆已之犯仍坐穿墻之愆庶不慚於丹筆亦無媿於青史襲封録兄判得丁長當襲代封主司以冇兄不録其讓女代父刑判又乙坐法女請代未齓官勒從奴對髙璠不掩厥善代選爾勞伊人祗辟咸示中正朝廷作乂大明黜陟使苴茅永建無替於乃服鄭竹斯刋審欺于誠道丁以祖孫繼體位由當室乙則戒慎不足人自速辜徳在友于復公侯於令季既生女子濟緩急其及嗣仰丁鴻之清節逺且逃身慕緹縈之淳志期無鑿顙有司務随時之才徒髙守法當官藉通變之識未宜膠柱昔太伯三讓公季代緒漢除五刑班史垂則行古之道仲子所以捨孫易父以死趙簡申其禮聘相彼一時之義今為千載之明豈可使帶礪遂絶於承家齠齓服刑而代罪兄則不返封欲誰承女既年弱奴何足任鮑公徃矣丁必無由理屈淳于獲宥乙女亦可恤刑景之前聞庶無凝滯常好種荔判戴子恭平居常好種荔時人以為不道繼母出服判又曽元母出不知服對易曰出處語黙非一途語曰慎終追逺民唐諱歸厚則所好不等有如其面一作其如衆面合禮而作難責一作則因心戴㳟戴安之餘曽元曽參之後二十八宿外當處士之星七十二人中有至孝之性幽寂水石髙山景行多所仰止信而欽風絃歌取樂無妄種荔霜露增感早切采蘭居然傲時遵是繼母春池湛澹萋已緑風樹蕭條静復鳴莖葉相依亦謂盛矣屺岵無託則可親之將備歉一作隤嵗無情故匣貯期剪緝别偶雙飛將髙竒致化成異物結而為裳思得其趣不茍制服曷所見尤楚客興歌江潭可想周公範法日月斯懸彼俗何知正刑不濫與其嗤誚豈如勿言道存固合賞人義盡理難論罪甲居重澤判得甲居重澤介疾有喜遂存乎辭或告其妄干他事初不量力甲云剛德閑邪何徃不利田獲三品判又丙田獲三品自稱有功所統斷為强暴天物且違時禁丙請三司訴持法不中對魏嘉慶麗澤作兊馳騁為獵大易克演老氏攸誡故違者匪宅是卜終莫之陵愚者動而離制事不師古甲也所處得八卦之龜奥丙其于田獲三品之獸物介疾生喜式損於悔吝自衒厥功載象於士女詳諸訟者反而不思稽以斷之固未為失初尋量力義叶獲麟之傳末觀强暴罪挂吞鯨之網茍用則徳歸藏之繋象可尊奄一作奪詣有司温柔之薄言斯在况何徃不利違禁見嬰宜寘妄干之責勿容不中之訴則髙尚其事甲取類於緇衣下人之孽丙乖慕於白賁是儀書衣判是儀鬻書衣於市或人告其不仁主司舉正判又鞏朔身為主司不舉正之術對是儀無首三國志是儀本姓氏孔融嘲儀氏字民無上改為是族變於句吳鞏朔司軍績宣於全晉昔聮榮於方冊今異軫於旗亭至於質彼有無雖歸列肆譏其滛巧必在儲胥詭濫有彰典刑斯舉書衣創制編冊攸資厠緑篋以相耀雜紫荷而交映是儀所鬻非法貽譏既多謝於緹油徒獲愆於倍市不任疑作仁斯露刑故何逃眷彼主司冝從舉正委而不察事或有由更詰源流兼責名品所犯無謬方可用科旄人奏散判日本請吏賜宴於朝旄人奏散不以靺為惠文冠所持辭云屬鞮鞻氏率木脩防判又柴桑備陽侯脩防率土木丁獨不從曰將俟息壤無何是成徒告其祅縣以為瑞科告不伏並仰正斷對朔南聲教萬國賔王神靈滋液百珎寳用日本歸獻越沙海而西浮陽侯順流泛滄江而東徙衣冠所列是同於中外帷盖其飛有觀於今昔而賜之禮樂餙以隄防歌鍾之奏已聞土木之功爰事將使陳茲禁靺無差絶國之音乗彼柴桑有廣通津之備彼而奏發稍一作盖失有常此獨不從寔乖於衆遽彰紏禁幾抗成詞初引罪於鞮鞻竟登期於息壤職司之分是則可矜祅妄之疑未應為允惠文所効旄人不可寘刑息壤既成縣斷理宜稱瑞各從案記庶用平反登城而指判甲登城而指乙告其惑衆甲云寔無祅言専席而坐判又丁専席而坐庚遂弔之或以為失禮庚不伏對禮經爰備䘮紀攸設君子行之以立身賢者俯之以合道理須非禮勿動循不忒之威儀臨而必哀弔有䘮以匍匐甲也未逹自貽登城之罪庚也有儀俄驚失禮之謗彼則戾矣此何誤焉且登而不言既異仲宣之賦弔而未爽無違孔父之經撫事勞於一作而三思片言申其一割但指則為惑一作惑衆何必有於祅言弔其有䘮寜可科其失禮向若登而不指乙告即曰誣人坐而不専庚弔便為失禮况理則無昧事其可觀自邀惑衆之科未闕弔人之禮寘甲之罪斯為得歟論庚之辜頗多失矣元日懸象判甲懸政象之法闕下金吾不許曰職在佐天子以平邦國浹日而歛之税千畆竹判又乙家渭濵有竹千畆京兆府什一税之辭云非九糓對李陽氷司馬之職懸政一時封君之富比竹千畆髙標魏闕事昭晰於周官近數渭濵理詳明於漢典所以平邦國之度通貨殖之冝傳稱百王其禮一作道不易著乎三代厥義難渝方今區宇乂寧刑辟不用百工以理庶績其凝實由懸法有孚執古以道寜從變俗之禮以紊守官之政歛在浹日孰云其非至如什一而取井田遺制九糓之外均輸未聞茍脩篁之可率且丹橘其何賦金吾不許實懵大猷乙也有云雅符舊典兩端是扣片言斯折罷役務農判得户部議請罷秦中百役專務農計其人可止闗東轉漕長吏云兵滿近郊一作懸農人未復恐不足支國用論象肉刑判又甲與乙俱獻書甲請復象刑云行之已乆人必自化乙請復肉刑云三代舊法所活甚多大理議俱不中對李紳四征不庭錢糓是貴百王所切刑法其難將哀輓粟之勞同舉赭衣之論顧兹建議惟彼獻書職勞不來既有東人之歎惟命難繼永瞻緹縈之感豈擢髮之未宜一作允何刺一作次骨之攸聞澶漫渭川曽莫顧其千畆刻深秦法且不愧於多端應縁兵未解鞍衣迷襏襫人猶㧞劍法異墨幪計必平均不應瘠魯肥把令資禁止何必噬膚刖足况國家儉嗇寡欲好生惡死永懐其禍每捐無盖之功尚媿論兵豈命有司之殺職由是舉合量出入得疑作徳用不擾當測淺深减功恤勞既令戎祀能給揆今酌古必使憲章勿墜三輔長吏不牽復於所司千代宏綱兼行之於聖日主司徴筭判得主司徴筭癸訴未冠探卵窺隣判又毌丘三兒登木探卵隣人以窺見室家執縛之對岐敬忠輕徭賦則人安不覆巢則鳳集有司徴筭誠逺符於漢主毌丘探卵斯近慕於晉臣癸且有詞實庸人之告訴丘為無頼何小子之猖狂若國用耗虚自七嵗而宜筭宅居隣里思一顧而便窺亦何限於冠年須發怒於登木况為無事詎藉税錢之歛既㓜而小何處望風之責甲宜釋放癸請不徴文苑英華卷五百五十一
