body:
  text: 文苑英華卷六百八十三宋李昉等編邊防中為高僕射與司馬消難書一首為李密移郡縣書一首為李密與袁子幹書一首報竇建德書一首諫曹仁師出軍書一首為高僕射與司馬消難書盧思道名曰一成雲雨冉歷炎涼引領南望勞眷無已嵗暮寒重想比勝宜羇泊水鄉無乃勤悴公居齊室家實元勳後入周朝爵窮上等富貴榮名時無與二西征南逝一作遊蓋不獲巳且聖主敬於恩舊情期欵到背冰之始曲憲申恩公之妻孥一無所問行李往來想宜知悉陳氏背盟負約事非一緒所以爰詔大將軍恭行天罰靈旗電掃師次江陽延首金陵但增翹注昔龎萌重獲漢主宥其深辜魏洽張邰歸曹操魏洽未詳冉歸曹王棄其大眚惜其才也今古如一醉飽之過願不自疑兼齊氏王姬宛然在室諸子陸陸如何易忘門生故吏遍於京輔舊友密親擊鍾鼎食萬里飄然音塵不嗣眷言及此伊何可懷今元戎啓行易為去就承眷有素敢布腹心若使雙舠浮渡三叛獲俘函首長安悔無及也為李密移郡縣書已見六百四十六卷祖君彥為李密與袁子幹書久藉英風未由披覽其為眷佇夢想增勞寒勢轉嚴比當清吉久事昏朝無乃勤悴夫福善禍淫實上天之常道兼弱攻昧往哲之成規自昏狂嗣位棄德崇姦疲苦生民塗炭天下是以暴骨滿於原野積惡比於丘山莫不奮白旄而誅獨夫仗朱旗而勦二世孤為海內豪傑共推盟主百萬義師大會河洛因苦秦之衆乘厭紂之機共救蒼生大造區夏振兹長䇿濟此橫流義勇如雲林合響應東窮海岱南徹江淮三分宇宙二為我有公早發風雲之志獨宣王佐之才理追冦鄧之名當慕韓彭之氣何乃頓為殘賊迷復成凶竭力昏亂之朝盡節危亡之國同扶纍卵如坐積薪靜言思之可為長歎秦則楊熊李由並從顯戮晉則茍晞王浚悉見殱亡詎若微子去殷伊生歸亳擅榮寵於當年傳功名於後代知公素有赤誠思來歸義見機而作不容淹久今授公上柱國東平公告身隨送至宜檢納脫更遲疑必為人制王世充自守西洛前後四度摧剪死在朝夕翹足可見薛雄比從涿郡欲赴黎陽竇建德逆往邀擊隻輪無返公之羸卒其數非多北顧西瞻何所慿賴然白馬之津諸軍雲合船車下粟艫艦相尋足食足兵如貔如虎四靣攻圍千里援絶地不可入天不可登兵戈一臨何處逃死吉凶二理幸自圖之故遣使指令宣德意報竇建德書唐太宗雲霧不披山河在望企余之歎良用興懷鄭息有違齊楚交絶自逺勞師旅當甚疲敝國家與彼本與仇隙彼之於我未始猜嫌往者趙魏諸藩皇風久扇恆衛之地素為我有足下首為冦亂屢來侵奪但以淮安喪師責躬由巳公主飄寓歸寧本朝並得保宥危亡負荷大惠親鄰之好昭然著眀雖則俘若王官前欵作翦左傳翦我羈馬同羈馬既懷坦蕩曾無蒂芥庶此冠蓋相望輶軒繼軌引弭兵之義敦方穆之期如何言不由𠂻翻懷慝怨無名之舉遽發危機背德之蹤遂為戎首吁可怪也良深歎息王世充滔天猾夏自貽伊戚舋毒三川一作自貽伊舋毒被三川腥聞四國皇情軫慮哀彼黎元推轂投柯申兹弔伐走以不武奉遵朝寄自揚旌河洛結壘伊瀍拯弊除凶屢摧羣醜其餘渠魁危蹙獨保孤城重圍巳合自知淪敗茍延朝夕之命空為衒誘之言其濟惡反善雷同冦逆適所以心同霸楚若非國家膺圖受籙剪暴除凶亦當并吞東夏自稱西伯足下豈不屈膝稽首著在前聞飾智詭詞以分謗亂渝盟背惠職此之由又世充與足下舊稱和好中塗翻覆罕能結誠遣使頻説胸奴一作結好欲令侵伐冀土外欺內忌唯利是圖居安尚不自存處危何力之有決疑今糧儲整竭帑藏空虛折骸莫弩命懸晷刻足下欲以三軍之衆仰哺他人千金之資坐求外費理殊畫餅未見其宜足下前者殉地屠城親至東境孟海公歷時抗禦未即從順頻令告急請我師救見逼求和一作知義所不取是以案兵辭使恩全世充又我國家不遑及逺海公援絶方歸執事假我風雲差無負德縈一作縈下諸州鄰近東鄙以足下風牛罕及停戍靡戒農居安堵未相猜二所以曹公兵前並追足下乘我無虞之城貪冒尋常之地進無投迹之所退有迷據之色誰為計者良非上算比者漳滏喪沒既往不追河濟傾淪成事誰咎今乃過相陵侮方深起難所以故到成臯佇承來旨昨者前茅警路候騎啓行乃與足下中途相遇旌麾未列鋒鏑暫交彼之士馬自相騰踐郊勞之儀遂爽犒師之禮未通雖則為彼禍先能無懷愧國家夷凶撥亂唯以匡時濟俗不欲窮民極武專任甲兵故蓄鋭停師冀聞擇善可否之事幸速圗之若不獲命終為怨府雄夫奮其智勇猛士發其餘怒諸軍霧合指日風驅屬􅐤鞬於中野縱矢鏑之餘費燎原覆醢雖悔難追必然一作欲繼好息民更敦前好况兵交使往遲覽還音諫曹仁師出軍書陳子昂臣伏見詔書發懷逺軍令郎將曹仁師部集作訊勒以征胸醜臣聞古之天子方建大禮必先振兵釋旅以告成功故漢孝武皇帝將封禪乃徵精卒十萬北巡朔方略地而還此蓋遵古先哲王之禮也今神皇陛下應天受籙將欲郊祭天地巡拜河洛建眀堂朝萬國斯邁古之盛禮也誠合式遵舊典耀武塞上畢境而還恐恐集作臣猶慮曹仁師未識典禮肆兵長驅窮極砂磧不恤士馬專以務得為利不以全兵為上今朝廷百僚雖有疑者無敢言之臣誠愚昧不識忌諱曾聞事君之道所貴盡心心以為非安可不言臣料仁師到雲內城發兵之日合至九月初到突利城回兵之日合至十月初胡地隆冬草枯泉涸南中士馬不耐郊寒計仁師所將之馬從靈州常所發之處却廽到雲內城巳行四千餘里雲內城中又先未支度馬既疲瘦經冬無粟以臣愚算十不存五紫蒙之軍類例相似且仁師此行計遲發速至於應會不甚精備以臣計料恐未成功脫若功未克成士馬先喪盡中土求市卒又難得且自古與胸奴戰非士馬相資不可臣恐馬既虛用致盡賊又竄逺未平但慮後之謀臣悔於今事且古來絶漠多喪士馬非臣抑疑度輒陳聞昔漢室以衛青出塞是時漢馬三十萬匹旋師之日馬唯餘四萬十四年不得事胸奴蓋由此也臣願陛下考驗前古收臣愚誠望與三公大臣審更詳議文苑英華卷六百八十三
