body:
  text: 文苑英華卷七百十九宋李昉等編餞送二送麴郎將使默啜序一首送吉州杜司户審言序一首暉上人房餞齊少府使入京序一首餞陳少府從軍序一首送懷州皇甫使君序一首送尹補闕入京序一首三月三日於灞水曲餞豫州杜長史别昆季序一首送裴五司法赴都序一首袁侍御序餞永昌獨孤少府序一首鄴公園池餞韋侍郎神都留守序一首餞常侍舒公歸覲序一首餞宋司馬序一首景龍觀山亭集送密縣髙贊府序一首送李郎中赴京序一首送李侍御之芳黔中掌選序一首送張補闕歸鄴序一首送蔣胄曹充隴右營田判官序一首送裴參軍充大稅使序一首送遂州紀參軍序一首送康若虛赴任金鄉序一首送竇侍御知河西和糴還京序一首送王侍御赴劍南序一首送麴郎將使默啜序陳子昂蓋問北夷不羈之日久矣天子垂玄默穆皇風而狼居革心蟻伏請職嵗一月上將恤戎乃以金革假麴公為司賔卿載馳錦車諭意雲幕且欲頓單于之膝受呼韓之朝不踰青春復命紫闕其忠臣烈婦之節感激壯矣朝廷以逺赴集作赴此絶國追送郊邱集作近郊登熊山望雁塞黃雲千里亭臯悠然僉曰賦詩絶句以贈送吉州杜司户審言序前人嗟乎德則有鄰才不必貴昔有耕於巖石而名動京師詞感帝王乃位升一作卑武騎夫豈不遭昌運哉蓋時命不齊竒偶有數當用賢之世賈誼竄於長沙居好文之朝崔駟放於遼海况大聖提象羣臣守規杜司户炳靈翰林研幾策府有重名於天下而獨秀於朝端徐陳應劉不得劘其壘何王沈謝適足靡其旗而載筆下寮三十餘載秉不羈之操物莫同塵合絶唱之音人皆寡和羣公愛禰衡之俊留在京師天子以桓談之非謫居外郡蒼龍閹茂扁舟入吳告别千秋之庭回掉五湖之曲朝廷相送駐旌蓋於城隅之子孤遊渺風帆於天際白雲自出蒼梧漸逺帝臺半隱坐隔丹霄巴山一望魂斷渌水於是邀白日藉青蘋追瀟湘之遊寄洞庭之樂吳歈楚舞右琴左壺一作左琴右壺將以緩燕客之心慰越人之思杜君乃挾琴起舞抗首髙歌哀皓首而未遇恐青春一作雲之蹉跎且欲攜幽蘭結芳桂飲石泉以節味一作明節詠商山以卒嵗返耕餌术吾將老焉羣公嘉之賦詩以贈凡四十五人具題爵里合絶集作舍絶暉上人房餞齊少府使入京序前人永淳二年四月孟夏東海齊子官于此州雖黃綬位輕而青雲望重故能委邦君而坐嘯屈刺史而知名屬乎鑾駕巡方諸侯納貢將欲對揚天子命我同行集作行人執玊帛而當朝擁騑驂而戒道指途河渭發引岷嵎粵以丙丁之日次于暉公别舍蓋言離也爾其巖泉列坐竹樹交庭吐青藹於軒窗棲白雲於左右參差池榭亂山水之清隂繚繞階庭雜峯崕之異勢入禪林而避暑肅風景於中林開水殿而追涼徹氛埃於户外瑶琴合奏翠斚時行談窈窕於天人極留連於晷刻既而歡樂極良辰征攀白日而不回唱浮雲而告别山光黯黯凝緑樹之將曛嵐氣沉沉結蒼雲而遂晚雖同交未阻風月可留岐路方乖關山成恨嗟乎朝廷子入期當貴於崇朝林嶺吾棲學神仙而未畢青霞路絶朱紱途遙言此會之何時願相逢而誰代永懷千古豈知仁者之交凡我三人盍崇不朽之迹斯文未喪題之此山同疏六韻云爾清隂集作清音餞陳少府從軍序夫嵗月易得古人疾沒代不稱功業未成君子以自強不息豈非懷其寶思其用然後以取海內之名以定當年之策展其才力受以驅馳少府叔鳳彩龍章才髙位下班超逺慕每言關塞之勳梁竦長懷恥為州縣之職屬胡兵犯塞漢將臨邊商君用耕戰之謀充國起屯田之策皇華出使言收疆場之功白水開筵遂為雲雨之别爾其蒼龍解角朱鳥司辰溽景薰集作蒸天炎光折地山川漸逺行人動遊子之歌樽酒未空送客起貧交之贈嗟乎楊朱所以泣岐路蘇武所以悲絶國古之來矣盍各言志以敘離歌送懷州皇甫使君序宋之問甸服三百里共京都參化良吏二千石與天子分憂覃懷奧區必寄能者皇甫使君纍司寵職夙著香名威惠厯刺於外臺風流載欵於京國議者應南宫之象實謂光朝使乎奏西河之能更勞為郡襜帷即路供帳出郊宿雨碧滋浮漢城之氣色朝陽紅景入太山之草樹新豐美酒不換離心函谷重關能搖别恨河內未理暫借寇恂潁川既輯佇歸黃霸廟堂側席羣公以尚義相髙川陸分途我輩以贈言為貴况筵開灞岸路指太行請居人贈王粲之詩去者留阮公之作送尹補闕入京序河間尹公博物君子解褐調慈州司倉白雲在天不樂為吏有竹林近鄠杜南山彈琴讀書日益淪放雖道貴物外久無世情身退名髙再顯天爵遂使公卿舉手羔雁成羣無何敕書到秦徴詣函洛天子以其老成逹學昂藏有古人風命典著書職在補闕時議以為伯喈得召仲甫登聞既而藉馬入關西攜老幼重見喬木載馳舊山念出處事違居人惜别離車將逺凡我同志賦詩贈行三月三日於灞水曲餞豫州杜長史别昆季序前人上巳佳遊近郊春色朱軒映野見東流之祓禊白雲在天愴南登之送别杜長史言辭灞滻將適荆河戀舊鄉之喬木藉故園之芳草鴒原四鳥是日分飛輿泉二龍此時云逺緑潭一望青山四極秦人去國乘右輔之修途洛客思歸憶東京之曲水請染翰操紙即事形言各賦蘭亭之詩咸申葛陂之贈送裴五司法赴都序夫有别必感今昔共之蓋理逼聚𣪚事均窮逹望秦是斷腸之所况念故園懷洛多掩涕之人更分良友裴五官業傳河寶才誕嶽靈彩思有神鬚眉若畫一日不見鄙吝都生千里送歸風流忽逺朝英出餞回北走於郊隅野墅銷氛引南山於庭際客飲恨而歡促席含情而景遲目喬樹之將華青門戀舊背芳萱之稍吐金谷逢春舉杯伊何願君軫之少駐賦詩於是旌余志之所之敢謂座賔盍宣離唱袁侍御席餞永昌獨孤少府序前人春其暮兮勞志士之幽歎友其行矣結吾徒之逺悲豈不以時物華嵗好事者賞而不足名流才子相歡者懷而不見河南獨孤册風儀松竹詞賦雲泉清義多一作許南史之才選署半一作曹署北部之慰袁侍御風霜利器金石宏材執憲稱柱下之雄禮士採域中之俊爾乃撰辰開宴考地疏筵落花覆沼懸藤掃砌竹林以清氣娛賔蘭畹以芳心愛客環坐三尺起君子之風祖道百壺酌賢人之酒去留交軫舞詠相喧管召魚樂杯薰鶯醉此時奚集作生怨盛集無何是日增悲韶芳亦盡啼烏送晚遙棲御史之林班馬嘶歸近送舍人之驛夫登髙動詠贈逺形言豈鄙懷之庶幾乃羣公之事業盍請離唱用貴洛陽之紙焉人採一言各題四韻鄴公園池餞韋侍郎神都留守序張説夫良才出乎休運大任歸乎令德四海既安乃注意於賢相兩都分正實具瞻於師尹鸞臺侍郎兼左庶子韋公國之楨幹人之表儀矜嚴有叔子之容持重得楊公之望門集作閨通禁省當朝稱纍代之名管綜諸闈帖職盡一時之美頃以五星東聚八月西巡武王既入於鎬京君陳當往於洛邑者集無者字中日晷之盈縮均天宇之會同清廟明堂政理之本也敖倉武庫兵食之原也機務所總半天下之軍國聽訟實繁連海隅之郡縣恩有密而處逺事有疏而授親腹心遐寄惟賢是屬嵗臨單閼月在長嬴同蕭何之居守當隂識之留鎮北闕拜辭西堂宴餞大君垂藻承集作乘月露之光榮元良賜服被星海之耀潤執事以同列之好載壺酒而送行鄴公以彌甥之禮掃郊園集有而字留别此地有離洲别嶼竹館荷亭曲沼環合而連注叢山相望而間起幽隱長寂蕭條逺風通終南之雲氣下昆明之水鳥爾其駐馬青林肆筵碧岸清管四發坐客增悲髙臺一望遊人忘返韋公方祗率嘉命保釐成周樹之風聲流我王澤然而臨觴不樂首路遲遲瑣闈夕拜戀未央之宫闕錦服晝遊懷杜林之桑梓層城日下髙蓋雲飛天子賦詩已載寵行之史羣公盛集須傳出宿之文凡若干首合成一卷陸生何幸暫遊朝宰之間商也悲然輕述國風之序云爾餞常侍舒公歸覲序蘇頲右𣪚騎常侍兼國子祭酒崇文館學士舒公邦之碩儒也富於學深其智秉辟雍之禮講金華之義者嘗有日焉辨大而言若訥位髙而志益下造膝則人無異辭匪躬則我有餘力儀正可象聲希必應此所以孔光密而張輔寵也故進避榮而榮自取退崇讓而讓得之既而命列幡旗焜煌照於西第徒成俎豆眷戀馳乎東國每灑涕而祈主將候顔以拜親天子懷公逹之舊惜康成之往乃眷中留久而下制是月惟閏乘春載陽服老萊之衣飄組丈二擁終童之傳送車數百晨省偉其傳呼晝遊嘉其飲餞來而喜懼經躍鯉之新泉至則光輝對回龜之舊浦夫志於道者二三子之莫逮善於孝者千萬人之所説未有丹誠注於闕下白首登於堂上門生仰而結轍邦牧趨而負弩豈非訓虞一作虔非受封就宗傳業俾魯師之教者其馮母之榮乎於是絲庭華省之家虎觀鴻都之士屬鶬鶊鳴矣楊栁依依情搖江上之楓思結河邊之草吳州日見楚山雲絶莫不捧袂黯然彈毫以贈庶幾離言之至知儒行之尊歟餞宋司馬序張九齡宋司馬才通命塞雲翼泥盤集作蟠蔡雍朔方不廢琴書之業賈誼宣室欲言鬼神之事既而出宿南浦與鴻雁而集作以同歸追餞北梁對江山集作丘山而不樂是日渚雲欲霽林鳥將春惜時物之芳華重情人之自逺羣公有感中座無歡他日清風自當玄度之夕茲辰零雨得無子荆之詠遂相與援翰賦詩贈行景龍觀山亭集送密縣髙贊府序前人景龍東山初生弟也始其署金榜築鳳臺窮土木之功極岡巒之勢議與盤古集作石同體造化較力何其壯哉自吾君茅茨不翦采椽不斫既抑華而務實將設教以垂範以故平陽化焉罷歌舞於其地麻姑見者變桑田於此時所謂長女之宫鬱為列仙之館其後常集作嘗有好事以為勝遊今日芳辰㩦手接袂往往而在祗取樂焉髙十官雌伏都畿星言至止聞殊庭之可尚召嘉客以相歡徒觀其匠幽竒宅爽塏十里九坂豈唯梁氏之作千巖萬壑宛是吳中之事青林修竦集作聳而垂綵緑蘿蒙籠以結隂清流若鏡下照金沙之底雜花如錦傍緣石菌之崖則可以藻飾形神揮斥氛滓相顧風塵之表無負雲霄之槩既而東主西賔酒酣樂闋聚必有𣪚匪伊麋鹿之羣往而不返固亦山林之弊髙公乃振衣而起舉杯有屬却計送人出長安之東道退思征馬向洛陽之南陌雖暫勞於州縣迫於簿領方欲厭於承明資其騫躍夫如是相知意氣何恨仳離盍賦詩焉以贈行者送李郎中赴京序孫逖今上有天下之十載鑾輅在鄷而大夫師長庶士御事分曹成周俾贊居守嵗八月詔下東都召水部員外郎李公拜工部郎中崇德也李公主善秉哲敏才慮行葆光能明冥樞自逹始以茂才擢第與今中書舍人許公俱補廣陵掾相與沿逹淮泗嘯歌雲物雅頌有鑠東南有光官匪慢而趣成道不行而樂在自時厥後蓋四三年或翰飛禁垣或鷹騰仙闕接武軒陛迭耀冠劍夫豈求之歟皆溫良恭儉讓以得之也所謂謙受益德必聞崑崙琅玕南國橘柚無逺不屆彼何言哉傳置具車候亭出餞西皓沆碭北隂肅殺風落崤澠霜飛河濆金羈載馳紫亭何逺夫居四民時地利周所以貴冬官草奏議應列宿漢所以寵郎署之人也之德也必能簡孚乃職克休厥聲天秩虛求名疑庭反席矣凡今作者賦詩贈行送李侍御之芳黔中掌選序髙陽氏之才子侍御其人焉夏之文求也藝兼而有之矣頃者持斧河朔獨按専城明罰飭法所向風靡是以有黔中之往俾修河朔之政不然者何萬里而南為至如遐荒靡莫之俗置吏羈縻之道則衆賔敘之矣倦談者何得而稱焉送張補闕歸鄴序余射策於洛城南門者有年數矣補闕張子嘗同彚征逮揮翰於禁庭又聨官於近侍人各有舊所貴於同聲吾愛其才敢忘於久要承明厭直河朔言歸且鄴惟舊都漳有深涉昔聞七子今在一門北州為營當有聚星之會西垣贈别請陳零雨之詩送蔣胄曹充隴右營田判官序前人古之使臣必有命介所以謀闕計事類能撰功蔣侯之往佐輶軒蓋其義也夫其敏行精識長才博聞克荷詩禮之訓聿修清白之業故妙年從官已著老成之風卑飛未騁共許垂天之翼是行也必能使田有封洫事著典常儲峙孔殷甲兵不頓愛人許國何以尚茲時中丞公亢寵天朝而子勤役邊鄙豈不以策名委質者義方之大訓出入顧復者常情之小慈不貴垂堂之説還嗤倚門之望懿乎哉又聞君子之逺其子也河隴先秋鷹隼方擊贊成糾慝今也其時羣公題之賦詩以贈送裴參軍充大稅使序古之王者稅公田衡虞之人給郊廟賜與之用無有逺邇咸率乃職越會稽郡者海之西鎮國之東門都會蕃育膏肆兼倍故女有餘布而農有餘粟以方志之所宜供天府之博斂篚絲紵緡金刀浮江逹河命為泛舟之役撰功底績實賴飲氷之使是行也裴子為政焉乃命水工具行器節制費用詳度川陸指洞庭以北上向長安而西去談笑之外厥有成功樽俎之間見其從事展使能者非子而誰而疇昔交情今茲吏道歎淪落於荒服結殷勤於官次喬木之國子其歸乎篁竹之鄉余何為者肝膽楚越始合終離嗚呼岐路素絲得其幾矣十月冬旱三江晝晴夢故園之黃落見長河之鴻雁澤國山水天資助人炎方草樹嵗寒未入居者愛客行者徇公拜神禹之清祠泛伍員之濤水車馬疊迹傾越人於外郊樓船接艫溢吳歌於寒浦贈君以不拜戒君以登陟攬涕何道賦詩詠曰不録送遂州紀參軍序遂州參軍紀公吾友雲將之令弟也敏於行志於道克修民彞允副兄朂噫周公之胤紀為其首天祚明德必將有後不然何棣華之可久也選曹舉善羣吏須才九霄始構一命而傴穆卜吉日遄征畏途緬躋岷峨遐涉褒漢宿息巖險凌臨湍悍仗信不栗載義必亨方慕忠臣之志固無垂堂之責爾之寡兄克施有政是則是效念茲在茲福利則覦心永隔逺嫌則荒言自絶固雖卭𤏡之産巴蜀之饒不潤脂膏誰謗薏苡懋厥丕德時維哲人羣公贈言要僕題序送康若虛赴任金鄉序昔太史公涉汶泗登鄒嶧以觀孔氏之遺風康子之吏於是邦有以見古人之心矣况大君出豫將事升中之禮有司擇人俾佐奉髙之邑利在求舊急於使能位俾才難亦可宗也夫強學者義之用工文者藝之夲明識者智之府令名者德之輿子曰疑四德以待百事如農之既勤若射之有志行無越思往無不利彼遊刃於理劇固恢恢乎有餘地矣初余以朋友之故謫居荒服憔悴湘汾縉雲不調明時殆將十載是舉也所謂理舊汙續常職信有國之令典知若人之晚成五月鳴蜩載驅翹翹贈之維何折彼桑條餞之維何席彼莠葽炎雲在天景風拂野時燠方熾吾子勉之請各賦詩以無忘平生之好送竇侍御知河西和糴還京序髙適天子務西州之實嵗糴億計何始於貴取而以耗稱俾邊兵受寒戰馬多庾挽域中之稅鑄海上之山江淮之人蓋奔命矣豈財賦之地抑以從來將利害之鄉猶有所關廟堂精思其故表竇公自憲闈而董之關精集作開釋叢脞之病發揮鹵莽之極政之大者不其然歟今農夫力於必登廉賈知夫勇賤嗚集作於戲若惟思之義以見天下之兵我幕府涼公勤勞王家常用此道干戈所適戎狄相弔宜哉八月既望公於是領錢穀之要歸奏朝廷副節制郎中裴公軍司馬員外李公追臺閣之舊遊惜軒車之逺别席樓船於池上泛雲物於城下胡琴集作笳羌笛繚繞隈隩儛羅集作耾裴映帶洲渚醉後歡甚東日遐瞻集作東林日高語岐路於樽前指華京於天眇有若司直崔公之逸韻嘉其廷評數賢之間作適忝斯人之後敢拜首而序云送王侍御赴劍南序陶翰國家既誅卭筰之遊魂收滇池之陳地以蠻陬君長未即敘徼外新國約非甚堅將欲宣王風布中典必候才英矣監察御史王公志標徑節天假異能秉心而忠義必聞多方而文武不墜我中丞鮮于公以功名立破城江南關啓而虜不敢窺城峻而敵不敢守者皆倚匡時之策仗橫行之氣不然者豈有夕捨一尉旦磨疑作麾三軍旴衡於不毛之間決勝於大荒之表取廷評者浹月登憲府者周星繡衣照於江原風霜掃於劍壁斯不足畏矣中朝名雅嚮義趨風餞筵傾誠翰墨紛矚百壺追送來登董原之野萬嶺蒼然更繞華陽之國豫以授簡敢無斯文文苑英華卷七百十九
