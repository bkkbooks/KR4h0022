body:
  text: 文苑英華卷二百八十六宋李昉等編留别一梁元帝二首何遜一首任昉一首吳均五首劉顯一首劉孝綽一首宗史一首庾抱一首賀力牧一首孫萬夀一首孔紹安一首王勃三首盧照鄰四首駱賓王三首禇亮一首崔融一首陳子昻六首宋之問四首崔湜一首張說五首蘇頲一首王維二首孟浩然五首杜甫三首李白三首祖詠二首常建一首別荆州吏民二首梁元帝寄言謝桀黠無乃氣干雲安知灞陵下復有李將軍二莫言江漢逺烟霞隔數千何必黃丞相重應臨潁川從鎮江州與故逰别何遜歷稔共追隨類聚作遊一旦辭羣匹復如東流水未有西歸日夜雨滴空階天曉類聚作曉燈暗離室相悲各罷酒何時更促膝别蕭咨議衍任昉離燭有窮輝别念無終緒岐言未及申離白一作目已先舉揆景巫衡一作荇蕪阿臨風長楸渚浮雲難嗣音徘徊悵誰與儻有關外驛聊訪狎鷗嶼一作鷺凡一作皆藝文類聚贈别新林吳均僕本幽并兒抱劔事邉陲風亂青絲絡霧染黃金羈天子既無賞公卿竟不知去去歸去來還傾鸚鵡杯氣為故交絶心為新知開但令寸心是何須銅雀臺發湘州贈親故别三首前人相送出江潯淚下霑衣襟何用叙離别臨岐贈好音敬通才如此君山學復深明哲遂無賞文華空見沉古來非一日無事更勞心二雲生曉靄靄花落夜霏霏問余何意别答言倦遊歸徒勞易水布空負洛陽衣懷金無人别抱玉遂成非安得久留滯商山饒白薇三君留朱門裏我至廣江濆城高望猶見風多聽不聞流蘋方繞繞落葉尚紛紛無由得共賞山川間白雲壽陽還與親故别前人故人來送别帳酒臨行阡露繁秋色慢氣愴蟪聲煎鴈渡章華國葉辭洞庭天復有向隅淚中腸皆涕漣但願千丈松結景雲之峰山高日華早枝多風彩疑重我還愛芳杜君住揖驪龍發新林浦贈同省劉顯見類聚回首望歸塗山川邈離異落日懸秋浦歸鳥飛相次感物傷我情惆悵懷親懿發建興渚示到陸二黃門劉孝綽見類聚扁舟去平樂還顧極川梁猶聞棗下吹尚識杏間堂洛橋分曲渚官寺隱回塘客行裁跬步即事已多傷况復千餘里悲心未遽央别蕭咨議衍宗史别酒正參差乖情將陸離悵焉臨桂苑愍然瞻華池輕雲流惠彩時雨亂清漪耿耿類聚眇眇追蘭徑悠悠結芳枝眷言終何托心寄方在斯别蔡參軍庾抱人世多飄忽溝水易西東今日歡娛盡何年風月同悲生萬里外恨起一杯中性靈如未失南北有征鴻亂後别蘇州人賀力牧徘徊睇閶闔悵望極姑蘇慨矣嗟荒運悲哉惜霸圖子常終覆郢宰嚭遂亡吳石隕星方暗山崩川自枯周京摧棫朴漢社落枌榆宫毁無巢燕城空餘樂烏兹邦號端委多士自相趨照廡同燕石光車等魏珠言離已惆悵念别更踟蹰若訪任公子求余東海隅贈别孫萬壽昔我遊雲閣及爾謬同官髙步參師友長裾接綺紈索居方十載相思勞萬端不言今夕遇得盡故人歡酒隨彭澤至瑟即武城彈高齊屏餘熱珍簟宿輕寒葉落霜威重蓂踈月色殘將歸動離恨彌傷行路難别徐永元秀才孔紹安金湯既失險玉石乃同焚墜葉還相覆落羽更為羣豈謂三秋節重傷千里分促離絃易轉幽咽水難聞欲識相思處山川間白雲秋日奉别王長史公王勃别路千萬里深恩重百年空悲西候日更動北梁集作北京篇野色籠寒霧山光斂暮烟終知難再奉懷德自澘然别薛升華前人明月沉珠浦秋風濯錦川樓臺集作關山臨絶岸洲渚亘長天旅泊集作飄泊成千里棲遑共百年窮途唯有淚還望獨澘然秋日别薛升華前人送送多窮路遑遑獨問津悲凉千里道悽斷百年身心事同漂泊生涯共苦辛無論去與住俱是夢中人西使兼送孟學士南遊盧照鄰地道巴陵北天山弱水東相看萬餘里共以疑一征篷零雨悲王粲清樽别孔融徘徊聞夜鶴悵望待秋鴻骨肉胡秦外風塵關塞中唯餘劔鋒在耿耿氣成虹還赴蜀中貽示京邑遊好前人籞宿花𥘉滿章臺栁尚飛如何正此日還望集作喜昔多違悵别風期阻將乖雲㑹稀斂衽辭丹闕懸津陟翠微野禽喧戍鼓春草變征衣回顧長安道關山起夕霏晚渡渭橋寄示京邑逰好前人我行背城闕驅馬獨悠悠寥落百年事徘徊萬里憂途遙日向夕時晚鬢將秋滔滔俯東逝耿耿泣西浮長虹掩釣浦落鴈下星洲草變黃山曲花飛清渭流迸集作逆水驚愁鷺騰沙起狎鷗一赴清泥道空思𤣥灞逰從蜀還京贈别己見二百六十七卷盧照鄰秋日别侯四得彈字駱賔王我留安豹隱君去學鵬摶岐路分襟易帆潮集作風雲促膝難夕漲流波急秋山落日寒唯有思鄉集作歸引悽斷為君彈西行别東臺詳正學士前人意氣坐相親關河别故人客似秦川上歌疑易水濵塞荒行辨玉臺逺尚名輪泄井懷邉將尋源重漢臣上苑梅花早御溝楊桞新秖應持此曲别作邉城春别李嶠得勝字芳樽徒自滿别恨轉難勝客似遊江岸人疑上灞陵寒更承夜永凉景向秋澄離心何以贈自有玉壺氷晚别樂記室産褚亮窮途屬歲晚臨水忽分悲抱影同為客傷情去此時霧色侵虗牖霜氛冷薄帷舉袂慘將别停杯悵不怡風嚴征鴈逺雪暗去蓬遲他鄉有岐路遊子欲何之留别杜審言并呈洛中舊遊崔融斑鬢今為别紅顔集作塵昨共遊年年春不待處處酒相留駐馬西橋上回車南陌頭故人從此隔風月坐悠悠落第西還别魏四凛陳子昻轉蓬方不定落羽自驚弦山水一為别歡娛復幾年離亭暗風雨征路入雲烟還因北山徑歸守東陂田以下六篇並見集本落第西還别劉祭酒髙明府前人别館分周國歸驂入漢京地連函谷塞川接廣陵集作陽城望逈樓臺出途遙烟霧生莫言長落羽貧賤一交情春夜别友人二首前人銀燭吐青烟金樽對綺筵離堂思琴瑟别路繞山川明月隱高樹長河沒曉天悠悠洛陽道此㑹在何年二紫塞白雲斷青春明月𥘉對此芳樽夜離憂悵有餘清泠花露滿滴瀝簷宇虗懷君欲何贈願上大臣書遂州南江别鄉里集作曲故人前人楚江復為客征棹方悠悠故人憫追送置酒此南州平生亦何恨夙昔在林丘違此鄉山别長謡去國愁别李參軍崇嗣前人四十九變化一十三死生翕忽𤣥黃裏驅馳風雨情是非紛妄作寵辱坐相驚至公集作人獨幽覽窈窕隨昏明咫尺山河道軒窗日月庭别離焉足問悲樂固能并我輩何為爾栖遑猶未平金臺可攀陟寶蓋絶將迎户牖觀天地階基上杳冥自超三界樂安知萬里征中國要荒內人寰字宙縈弦望如朝夕寧嗟蜀道行留别之望舍弟宋之問同氣有三人分飛在此晨西馳巴嶺徼東去汶陽濵强飲離前酒終傷别後神雖集作誰憐散花蕚獨赴日南春漢江宴别前人漢廣不分天舟移杳若仙秋虹映晚日江鶴弄晴烟積水浮冠蓋搖風逐管絃嬉遊不可極留恨此山川積水集作積氣端州别袁侍郎前人合浦塗未極端溪行暫臨淚來空泣臉愁至不知心客醉山月净猿啼江樹深明朝共分手之子愛千金渡吳江别王長史前人倚棹望兹川銷魂獨黯然鄉連江北樹雲斷日南天鈎别集作劔别龍𥘉沒書成鴈不傳離舟意無限催渡復催年贈蘇少府赴任江南余時還京崔湜丈夫不歎别達士自安卑攬泣固無趣銜杯空爾為流雲春窈窕去水暮逶迤行舟忽東泛歸騎亦西馳秦地多芳草江潭有桂枝誰言阻遐闊所貴在相知南中别王陵成崇張說握手與君别岐路贈一言曹卿禮公子楚媪饋王孫倐爾生六翮翻飛戾九閽常懷客鳥意㑹答主人恩以下五篇並見集本石門别楊六欽望前人燕人同竄越萬里自相哀影響無期㑹江山此地來暮年傷泛梗纍日慰寒灰潮水東南落浮雲西北回俱看石門逺倚棹兩悠集作悲哉端州别高六戩前人異壤同羇竄途中喜共過愁來時舉酒勞罷或長歌南海風潮壯西江瘴癘多於焉復分手此别傷如何南中别蔣五向青州己見二百六十七卷前人南中别陳七李十二年共遊處一旦各西東請君聊駐馬看我轉征蓬畫鷁愁南海離駒思北風何時侣春鴈雙入上林中陳倉别隴州司户李惟深蘇頲京國自携手同途欣解頥情言正的的春物宛遲遲忽背雕戈星疑旋瞻獲寶祠蜀城余出守吳嶽爾歸思歡愜更傷此春殷殊念兹揚麾北林徑跂石南澗湄中作壺觴餞回添道路悲數花臨磴日百草覆田時有美同人意無為行子辭高歌拔劔起吾是答恩私留别溫古上人兄並示弟縉王維解薜登天朝去時集作師偶將集作時哲豈唯山中人兼負松上月宿昔同遊止致身雲霞末開軒臨潁陽卧視飛鳥沒好依盤石飯屢對瀑泉歇一作渴理齊狎小隱道勝寧外物舍弟官崇髙宗兄比削髮荆扉但灑掃乘閒當過拂集作歇留别丘為前人歸鞍白雲外繚繞出前山今日又明日自知心不閒親勞簮組送欲趂鶯花還一步一回首遲遲向近關將適天台留别臨安李主簿孟浩然枳棘君尚栖匏瓜吾豈繫誰念離亭下集作當夏淡一作飄泊指炎裔江海非惰逰田園失歸計空山既早發漁浦亦宵濟泛泛隨波瀾行行任艫枻故林日已逺羣木坐成翳羽人在丹丘吾亦從此逝東京留别諸公前人吾道昧所適驅車還向東主人開舊館留客醉新豐樹繞溫泉緑塵遮曉日紅拂衣從此去高步躡華嵩留别王侍御前人寂寂竟何待朝朝空自歸欲尋芳草去惜與故人違當路誰相假知音世所稀秪應守索寞還掩故園扉遊江西留别富陽裴劉二少府前人西上遊江西臨流恨解携千山疊成障萬水瀉為溪石淺流難泝藤長險易躋誰憐問津客歲晏此中迷適越留别譙縣張主簿申屠少府前人朝乘汴河流夕次譙縣界幸因集作值西風吹得與故人㑹君學梅福隱豫隨集作從伯鸞邁别後能相思浮雲去集作在吳㑹暮秋將歸秦留别湖南幕府親友杜甫水濶蒼梧晚集作野天髙白帝秋途窮那免哭身老不禁愁大府才能㑹諸公德業優北歸衝雨雪俱集作誰慜弊貂裘留别嚴賈二國老兩院遺𥙷諸公前人田園須暫往戎馬惜離羣去逺留詩别愁多任酒醺一秋常苦雨今日始無雲山路晴吹笛集作角那堪處處聞别董頲前人窮冬急風水逆浪開帆難士子甘旨闕不知道里寒有求彼樂土南適小長安到我舟楫去覺君衣裳單素聞趙公節兼盡賔主歡己結門廬望無令霜雪殘老夫纜亦解晚粟朝未餐飄蕩甲兵際幾時懷抱寬漢陽頗寧靜峴首試考槃當念著白帽采薇青雲端夜别張五李白吾多張公子别酌酣髙堂聽歌舞銀燭把酒輕羅裳橫笛弄秋水集作月琵琶彈陌桑龍泉解錦帶為爾傾千觴江夏别宋之悌前人楚水清若空遙將碧海通人分千里外興在一杯中谷鳥吟晴日江猿嘯晚風平生不下淚於此泣無窮出金門後書懷留别翰林諸公前人好古笑流俗素聞賢達風方希佐明主長揖辭成功白日在青天回光照微躬恭承鳯凰詔欻起雲蘿中清切紫霄迥優遊丹禁通君王賜顔色聲價凌烟虹乘輿擁翠蓋扈從京城東寶馬麗絶景錦衣入新豐倚巖望松雪對酒鳴絲桐因學揚子雲獻賦甘泉宫天書美片善清芬播無窮歸來入咸陽談笑皆王公一朝去金馬飄落成飛蓬賔從日踈散玉樽尋己空才力猶可倚不慙世上雄聞作東武吟曲盡情未終書此謝知已滄浪集作波尋釣翁留别裴聰盧象祖詠朝來已握手宿别更傷心灞水行人渡商山驛路深故情君且足謫宦我難任直道皆如此誰能淚滿襟歸汝墳山莊留别盧象前人淹留歲將晏久廢南山期舊業不見棄還山從此辭漚麻入南澗刈楚向東菑對酒雞黍􅍄閉門風雪時非君一延首誰慰遙相思潭州留别常建賢達不相識偶然交已深宿帆謁郡佐悵别依禪林湘水流入海楚雲千里心望君杉松夜山月清猿吟文苑英華卷二百八十六
