body:
  text: 文苑英華卷二百六十七宋李昉等編送行二盧照鄰六首駱賔王七首陳子昂七首李嶠六首同餞唐州南使君赴任九首同餞許州宋司馬赴任七首宋之問十一首張說十首送鄭司倉入蜀盧照鄰離人丹水北逰客錦城東客恨良無已離憂自不窮隴雲朝結陳江月夜臨空關塞疲征馬霜氛落早鴻潘年三十外蜀道五千中送君秋水曲酌酒對秋風送梓州髙參軍還京前人京洛風塵逺褒斜煙霧深北逰君似智南飛我異禽别路琴聲斷秋山猿鳥吟一乖青嵓酌空佇白雲心還京贈别此詩二百八十六卷重出今已削去前人風月清江夜山水白雲朝萬里同為客三秋契不凋戲鳬分斷岸歸騎别髙標一去仙集作遷橋道還望錦城遙送幽州陳參軍赴任寄呈鄉曲故集作父老薊北三千里關西二十年馮唐猶在漢樂毅不歸燕人同黃鶴逺鄉共白雲連郭隗池臺處昭王樽酒前故人當已老舊壑幾成田紅顔如昨日衰鬢似秋天西蜀橋應毁東周石尚全灞池水猶緑榆關月早圓塞雲初上鴈庭樹欲銷蟬送君之舊國揮涕獨澘然大劍送别劉古史前人金碧禺山逺關梁蜀道難相逢屬晚歲相送動征鞍地險綿川咽雲凝劍閣寒儻遇中孝所為道憶長安綿州官地餞别同賦灣字前人輶軒遵上國仙氣下靈一作雲關樽酒妨集作方無地聫綣喜暫攀離言欲贈策髙辨正連環野徑逰集作浮雲斷荒池春草斑殘花落古樹度鳥入澄灣欲叙他鄉别幽谷有綿蠻秋日别侯西駱賔王我留安豹隱君去學鵬摶岐路分襟易風雲促膝難夕漲流波急秋山落日寒唯有思歸引悽斷為君彈以下七篇並見集本送吳七逰蜀前人日觀分齊壤星橋接集作抵蜀門桃花嘶别路竹葉㵼離樽夏老集作盡蘭猶茂秋深集作新柳尚繁霧銷山望迥風髙野聽喧勞歌徒欲奏贈别竟無言惟有當秋月空照野人園秋日餞集作送尹大之集作赴京前人挂瓢余隱舜負鼎爾干湯竹葉離樽滿桃花别路長低河耿秋色落月抱寒光素書如可嗣幽谷佇賔行餞鄭安陽入蜀前人彭門集作山折坂外井絡少城隈地是三巴俗人非萬集作百里才畏集作長途君悵望岐集作别路我徘徊心事集作賞風煙隔容華歲月催遙遙分鳳野去去轉龍媒遺錦非前邑鳴琴即舊臺劍門千仞起石路五丁開海客乘槎渡仙童馭竹回魂將離鶴逺思逐斷猿哀唯有雙鳬舄飛去復飛來送劉少府逰越州前人一丘余枕石三月爾懷鉛離亭分鶴蓋别岸指龍川背夏蟬聲斷來寒鴈影連如何溝水上悽斷聽離絃送郭少府前人開筵枕集作抗德水輟棹艤仙舟貝闕桃花浪龍門竹箭流當歌悽别曲對酒泣離憂還望青山外空見白雲浮送費元之集作云還蜀前人星樓望蜀道月峽指吳門萬行流别淚九折切驚魂雪影含花落雲隂帶葉昏還愁集作當三徑晚獨對一清樽送東萊王學士無競陳子昻寶劍千金買平生未許人懷君萬里别持贈結交親孤松宜晚嵗衆木愛芳春已矣將何適無令白首集作髮新以下六篇並見集本送魏兵曹使嶲州得登字見三百九十六卷前人送客前人故人洞庭去楊柳春風生相送河洲晚蒼茫别思盈白蘋已堪把緑芷復含榮江南多桂樹歸客贈生平送殷大入蜀前人禺集作蜀山金碧路集作地此地饒英靈送君一為别悽斷故鄉情夏集作片雲生極浦斜日隱離亭坐看征騎役唯見逺山青送梁李二明府前人負書猶在漢懷策未聞秦復此窮秋日芳樽别故人黃金裝屢盡白首契逾新空羡雙鳬舄俱飛向玉輪送别陶七同用風字前人黃鶴煙雲一作霞去清江琴酒同離帆方楚越溝水復西東芙蓉生夏浦楊柳送春風明日集作月相思處應對菊花叢送别崔著作東征前人金天方肅殺白露始專征王師非樂戰之子慎佳兵殺集作海氣侵南郡邉風掃北平莫買龍寒劍集作莫賣盧龍塞歸邀麟閣名送光祿劉主簿之洛李嶠函谷雙崤右伊川二陜東仙舟窅將隔方斚暫云同朋席餘歡盡文房舊侣空他鄉千里月岐路九秋風背櫪嘶班馬分洲呌斷鴻别後青山外相望白雲中送駱奉禮從軍前人玉塞邉烽舉金壇廟略申羽書資鋭筆戎幕引英賔劍動三軍氣衣飄萬里塵琴樽留别賞風景惜離晨笛梅含晚吹營柳帶餘春希君勒石反歌舞入城闉餞駱四二首前人平生何以樂斗酒夜相逢曲中驚别緒醉裏失愁容星月懸秋漢風霜入曙鍾明日臨溝水青山幾萬重二甲第驅車入良宵秉燭逰人為集作追竹林㑹酒獻菊花秋霜吹飄無已星河漫不流重嗟歡賞地翻召别離憂送李安邑前人落日荒郊外風景正凄凄離人席上起征馬路傍嘶别酒傾壺贈行書掩淚啼殷勤御溝水從此各東西又送别前人岐路方為客芳樽暫解顔人隨轉蓬去春伴落梅還白雲渡汾水黃河繞晉關離心不可問宿昔鬢成斑餞唐州髙使君赴任岑義蒼茫南塞地明媚上春時目極傷千里懷君不自持征車别岐路斜日下崦嵫一歎軺軒阻悠悠即所思同前崔湜芳春桃李時京東集作都物華好為嶽豈不貴所悲涉逺道逺道不可思宿昔夢見之贈君雙佩刀日夕有集作無親期同前盧藏用餞酒臨豐樹搴帷出魯陽蕙蘭春已晚桐柏路猶長祖逖方城鎮安人外氏鄉從來二千石天子命惟良同前張說常時好間晏集作獨朋友集作舊少相過及爾宣風去方差離别集作别多淮流春婉娩汝海路蹉跎百年集作嵗屢分散欲言復幾何同前徐彥伯香蕚媚紅滋垂條縈緑絲情人拂瑶袂共惜此芳時驌驦已躑躅鳥隼方萎蕤跂豫望太守流潤及京師同前永日奏文時東風搖蕩夕浩然思樂事那復念一作復贈征客淮水常流清一作清流楚山雲水白一作暮雲白勿言行路逺所貴專城伯同前淮源水之清可以濯我一作君纓彼美稱才傑親人佇政聲嵗寒疇曩意春暖一作晚别離情終難疑作歎臨岐逺行看擁傳榮同前桐柏膺新命芝蘭惜舊逰鳴臯夜鶴在遷木早鶯求傳擁淮源路樽空灞水流落花紛送逺春色别離憂同前馬懷素外牧資賢守斯人奉命一作帝俞淮南應建隼渭北軫疑分符坐歎煙波隔行嗟物候殊何年升美課回看此城隅餞許州宋司馬赴任李適昔吾逰箕山朅來涉蘋水復有許由廟迢迢白雲裏聞君佐繁昌臨風悵懷此儻到平輿泉寄謝干將里同前展驥旌時傑談雞美代賢暫留仙掖務追送近郊筵地慘金商節人康璧假田從來昆友事咸以佩刀傳同前國為休徵選輿因仲舉題山川襄野隔朋酒灞亭暌零雨征車警秋風别驥嘶離歌一曲罷愁向勿悽悽同前馬懷素頻水開郡邑角宿躔分野非君仲舉材誰是題輿者憫憫琴上鶴蕭蕭路傍馬嚴程若可留别袂希再把同前徐堅舊許星車轉神京祖帳開斷煙傷别望寒雨送離杯辭燕依空逺賔鴻入聽哀分襟與秋氣日夕共悲哉同前令弟與名兄髙才振兩京别序聞鴻鴈離章動鶺鴒逺朋馳翰墨勝地寫丹青風月相思夜勞望潁川星同前潁郡水東流荀陳兄弟逰偏傷兹日逺獨向聚星州河潤在明德人康非外求當聞力為政遙慰我心愁宋公宅送寧諫議宋之問宋公爰創宅庾氏更誅茅間出人三秀平臨楚四郊漢臣來絳節荆牧動金鐃樽溢冝城酒笙裁曲沃匏露荷秋變節風柳夕鳴梢一散陽臺雨方隨越鳥巢送趙司馬赴蜀州前人餞子西南望煙綿劔道微橋寒金鴈竝集作落林曙碧雞飛宴拜輿方逺仙城履㑹歸定知和氏璧遙掩玉輪輝送武進鄭明府前人絃歌試宰日城闕賞心違北謝蒼龍去南隨黃鵠飛夏雲海中出吳山江上微氓謡豈云逺從此慶緇衣送合宫蘇明府前人鉉府誕英規公才天下知謂乘羔鴈族繼入鳳凰池赤縣求人隱青門起路岐翟回車少别鳬化舄遙馳神哭周南境重歌豫北豫集作渭垂賢哉荀奉倩職衮佇來儀送永昌蕭贊府前人柳變曲江頭送君函谷逰弄琴寬别意酌醴集作酒醉春愁戀本亦何極贈言微所求莫令金谷水不入故園流送李奉集作符制前人行李戀庭闈乘軺振綵衣南登指吳腹北走出秦畿去國夏雲斷還鄉秋鴈飛旋聞郡計入更有使臣歸送朔方何侍御前人聞道雲中使乘驄往復還河兵守陽月集作日塞虜失隂山拜職常隨驃銘功不讓班旋聞受降日歌舞入蕭關送楊六望赴金水前人借問梁山道嶺岑幾萬重遙州刀作字一作路絶壁劍為峰惜别路窮此留歡意不從憂來生白髮時晚愛青松勿以西南逺夷歌寖盛容台階有髙位寧復久臨卭送杜審言前人卧病人事絶聞絶句詩選作嗟君萬里行一作君行萬里程河橋不相送江樹逺含情别路追孫楚維舟弔屈平可惜龍泉劒流落在豐城餞胡州薛司馬前人别駕促嚴程離筵多故情交深季作友義重伯為兄鎮靜移吳俗風流在漢京㑹看一作逢陳仲舉從此拜公卿送趙六貞固前人目斷南渚雲心醉東郊柳怨别此何時青芳來已久與君共時物盡此盈樽酒始願今不從春風戀携手嶽州宴别潭州王熊張說縉雲連省閣溝水透集作遽西東然諾心猶在容華歲不同孤城臨一作連楚塞逺樹入秦宫誰念三千里江潭一老翁南中送蔣五岑向青州前人老親依北海賤子棄南荒有淚皆成血無聲不斷腸此中逢故友彼地送一作迓還鄉願為江楓集作楓林葉隨君度洛陽此詩二百八十六卷重出今已削去幽州别徐集作隂長河行先前人惠愛交千里集作惠好交情重辛勤世事多荆南久為别薊北逺來過寄目雲中鳥留歡酒上歌影移聲復間遲暮兩如何送蘇合宫五官賴前人都邑群方首商身集作泉萬俗訛變風須愷悌成化佇絃歌疇昔圭璋友雍容文雅多振纓逰省闥鏘玉宰京河别曲鸞初下行軒雉尚過百壺非餞意流詠在人和送趙二尚書彥昭北伐前人虜地河氷合邉城備此時兵連紫關路將舉白雲司提劍榮中賞銜杯集作珠感出師日華鮮集作光組練風色熖一作艷旌旗投筆樽前起橫戈馬上辭梅花吹白集作别引楊柳賦歸詩送王光庭前人同居洛陽陌經日懶相求及爾江湖去言别悵悠悠楚雲眇羈翼海月倦行舟愛而不可見徒嗟芳嵗流嶽州别姚司馬紹之制許歸侍前人和玉悲無已長沙宦不成天從扇枕願人遂倚門情方外懷司馬江東憶步兵向君棲泊處空嶺夜猿驚洛橋北亭餞諸刺史前人離亭拂御溝别集作岸曲舞船樓詔餞朝廷牧符分海縣憂股肱還入郡父母更臨州扇逐仁風轉車隨靈集作霽雨流恩光水上溢榮色柳間浮預待群芳最三公不逺求送崔二長史日知赴潞州前人東山憐集作懷卧理南省悵悲翁共見前途促何知後㑹同莫輕一筵酒集作筵宴又作壺酒明日半成空况爾新離集作離庭闕思歸迷夢中送李侍郎回秀薛長史季昶同賦水字漢郡接胡廷幽並對峯壘旌旃集作旌旗按部曲文武惟卿士薛公善籌畫李相威邉鄙中冀分兩河長城各萬里籍馬黃花塞搜兵白狼水勝敵在安人為君汗青史此詩卷宋之問送杜審言詩共四韻而洪邁絶句詩選及别本只收前兩韻書此以示後文苑英華卷二百六十七
