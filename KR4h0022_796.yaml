body:
  text: 文苑英華卷七百九十七宋李昉等編宫殿唐重修漢未央宫記一首㕔壁記一中書政事堂記一首昭文館大學士壁記一首翰林翰林院㕔壁記一首翰林承㫖學士㕔壁記一首重修承㫖學士􅈦壁記一首翰林院使壁記一首宫殿唐重修漢未央宫記裴素皇帝嗣位之年衆靈恱附日月所照莫不砥厲是以逺夷慕義琛賮鼎一作負來用文明以為理洞風露之所啟草木茂暢山川景清擊壤鼓腹莫識由乎帝力矣嘗思勝日聖思閑逺倦大厦之講習想鮮原之遊衍乃命法駕備宮馭細草迎輦神飈引衣超然肆行造適自得視往昔之遺館獲漢京之餘址邈風光以遐矚𦕈思古以論都襟靈洋洋周視若感者久之於是召左䕶軍中尉志𢎞指示之曰此漢遺宫也其金馬石渠神池龍闕往往而在朕常以古事况今亦欲順考古道訓齊天下也至是遐歴恍然深念且欲存列漢事悠揚古風耳昔人有思其人猶愛其樹况悦其風登其址乎吾欲崇其頺基建斯餘構勿使華麗爰舉舊規而已庶得認其風烟時有以凝神於此也於是命工度材審曲靣勢裁成法度以就斯宫攅攎拱密玉石碧瓦龍錯層軒烏跂崇墉粉靜璇題月照舒廊四注以雲委隆臺分據而山屹蟠虬蜿蜒鱗動梠桷蹲獸却騁姿雄欄檻宏㐮乎豁逹一作達跨臨乎涇渭縁竹凝逺繁松藹深竒樹流光丹墀迴遶於是闢戲馬之廣場開逺目之閑館天地景新山川勢重廻太華之秀氣列終南之翠屏九嵕􅏭􅙙而固䕶八水分流以縈帯而又揚太液之波繚周帝之垣原隰成文丹素含華翼樓杳以分張雄虹直而中跱神機一發廓若懸㝢祥煙瑞彩欝欝䓤䓤瞻廻途一作逺以下濟撫璇璣而高視見秦川風物漢原邐迤感前王興廢知稼穡艱難吾君用此鏡是非閲思慮豈獨資耳目縱遊翫也凡殿宇成搆㧾三百四十九間工徒役指萬計武夫奮力將校呈規然而材匪藻梲塗唯儉静經之營之不日而成也按漢史高祖初定天下悦卜洛之邑為天地之中有周室遺風將都之婁敬諌曰陛下取天下與周室異不可居也夫洛陽四戰之地豈若秦川天府之國山河形勝真百二之勢乎髙祖是日駕如長安其後七一作十年北擊韓王信相國蕭何居守而營未央宫因龍首山作前後建觀闕街道周廻七十里臺殿四十所帝還見之怒曰何治宫室之過度也何曰天子以四海為家非壯麗無以重威徳帝恱而就居焉自漢元年乙未嵗至聖唐㑹昌元年之辛酉凡一千四十有七年矣其傾頺毁圮悠然邈然竟無有存之者我后𬗟慕古昔之興時即其舊而新是圖築摧基而繩脩木不侈不約巍然嶷然時以通覽無方周視有截則有若志𢎞奉聖君之㫖也志𢎞姓魚氏代宗皇帝之功臣朝恩之孫也以績効而封國公由忠義而位上將自揔右廣貞心冠古陛下龍昇大寳光啟帝運左右同德東西一心變生人之耳目渙大明之徽懿武力忠壯𤣥機天啟式是萬旅吾唐有人由是委以腹心寄之環列上曰忠為令德有若士良志𢎞為吾左右矣明年上親見祖考郊天神雪灑川原塵清城闕陽和風扇緑野烟澹是月也三辰承初以表無事上乃顧新宫迴玉輦列騎雲動彩仗天旋乃出金風疑由是乎造于未央俯仰周視肅威神而煌煌遊焉息焉容與恱懌晴山屏開以四遶故城巉然而隱嶙鮮風美景薰然入座上從容言曰吾今建是殿且錫之以嘉名名其殿曰通光其東曰韶芳亭其西曰疑思亭乃立臯門曰端門其應門題曰未央宫所以志大臣之功力且不忘吾好古也乃命侍臣曰爾為我記之刻以貞石傳示乎不朽臣素任當承㫖不敢固讓惶恐拜舞而文之時㑹昌元祀濡大澤之明月也謹記廳壁一中書政亊堂記李華政事堂者自武徳以來已常於門下省議事即以議事之所一無此六字謂之政事堂故長孫無忌起復授司空房𤣥齡起復一無此二字授左僕射魏徵授太子太師皆知門下省事至高祖光宅元年裴炎自侍中除中書令執宰相筆乃遷一作移政事堂於中書省記曰政事堂者君不可以枉道於天反道於地覆道於社稷無道於黎元此堂得以議之臣不可悖道於君逆道於人黷道於貨亂道於刑尅一方之命變王者之制此堂得以易作一移之兵不可以一本無以字下六字同擅興一作誅權不可以擅與一作施貨不可以擅蓄王澤不可以擅奪君恩不可以擅間私讎不可以擅報公爵不可以擅私此堂得以誅之事不可以輕入重罪不可以生入死法不可以剥害於人財不可以擅加於賦情不可以委之於倖亂不可以啟之於萌伐紊不賞爵紊不封聞咸作知荒不救見或作知饉不驚或作知逆諫自賢為道傷古此堂得以殺之故曰廟堂之上樽爼之前有兵有刑有挺有刃有斧鉞有酖一作鳩毒有夷族有破家或作有破家有覆族登此堂者得以行之故伊尹放太甲之不嗣周公逐管蔡之不義霍光去一作廢昌邑之亂梁一作狄公正廬陵之位自君弱臣強之後宰相主生殺之柄天子掩九重之耳爕理化為權衡論道變為機紐一作論思變成機務道變一本無此二字傾身禍敗不可勝數列國有傳青史有名可以為終身之誡無罪記云十一字或作幸為戒之無罪斯記一作皆唐文粹昭文館大學士壁記權徳輿聖人南靣以理天下在崇起于集無于字教化緝熈于光明太宗文皇帝敷文徳建皇極始於𢎞文殿側創𢎞文館藏書以實之思與大雅閎逹之倫切劘理道金玉王度盛選重名虞世集無世字避唐諱南禇亮而下為之學士更直密侍於其中其論思應對或至夜艾誕章逺猷講議啟廸武徳貞觀之澤洽於元元厥有助焉其後徙於門下省景龍初始置大學士名命益重多以宰司處之所以登閎古先腴潤大政則漢廷之金馬石渠蘭臺延閣方斯陋矣按六典帝令給事中一人判館事每二府爰立則統於黄樞而或署集作置或否不為恒制後後字集作孝文後元二十年間斯職闕焉前年秋八月今河中司空公居之今年夏五月相國蕭公居之公粹清莊重山立泉塞苞孔門之四教藴洪範之三徳靜若彛器扣如黄鍾由小司徒升左輔乃蒞斯職於是戒官師稽憲令貴游青襟辨志樂群皆循集作脩其方而遜其業且以左户之羨財百萬附益而脩餙之公署書府靜深華敞清禁之内輔臣攸居宜乎舒六藝而調四氣於此室也於公之王父考功府君在中宗朝為直學士懿文含章休有厥聲至公則聿脩之𢎞文貽厥之昌阜盡在是矣至若命館之名集無名字冄為脩文終為昭文改復嵗月傳諸故志前賢名氏宜列屋壁公以徳輿交代於中臺之任踊躍於大冶之中惠然授簡使得論次自景龍二年李趙公嶠始受命為大學士至公凡若干人揭而書之所以備文館之故實廣台臣之年表抑公之命也不敢辭焉元和二年秋九月記翰林翰林院㕔壁記韋處厚魏晉已後復典綜機密政本中書詔命詞訓皆必由焉唐有天下因襲前代爰自武徳時有密命則温大雅魏徴李百藥岑文本之屬視草禁中乾封年一無此字則劉懿之一無之字周思茂范履氷之倫直一作秉筆便坐自此始號北門學士皆自外召入一作人未列秘署𤣥宗開廣視聽搜延俊賢始命張説陸堅張九齡徐安貞軰待詔翰林厥后錫以學士之稱蓋由徳成而上與夫術數工藝一作數術典藝禮有所異也逮自至徳台輔伊説之命將壇出車之詔一作誥霈洽天壤之澤遵揚顧命之重議不及中書矣尺牘旁午章奏叢至指蹤中外一作指縱命中之畧謀謨帷一作帷幄之秘隂陽一作隲造化嘉猷密勿萌制一作制萌乎將然事構乎無形皆功一無功字歸元后而徳一無此字播興運循名跡者莫窺其轍想風彩者孰一作罔䆒其端雖然臧否無得而稱矣貞元中由此而居輔弼者十有二一有焉字元和中由此而膺大用者十有六一有焉字近日丞相府不由内庭者斷國論宰法度雖有利器長材未免缺折棹撓建中一作以來簡㧞之一作尤重故必密如孔光博如延州文如卿雲學如向歆器如黃顔直如史魚然後得中第士之㳺心處已景行於六如者而又餙之以㓗球璋之行貫金石之誠雖潛聲匿迹而其二字作莫能脫乎漢時始建一作置尚書郎五人平天下奏議分直建禮含香握蘭居錦帳食大官則今之翰林名異而實同也時論以為登玉清翔紫霄豈蓬山瀛州而足喻乎齊桓公納廐人編棧之説以為直木傳曲一作直則曲無由至曲木傳直一作曲則直無由至後之君子戴明聖恊盛時推廐人之規移于一作規矩乎引賢使如是一無是字貫珠駢璧則瑕瑜不雜矣内給事李常暉内謁者監一作將王士政一作玖並掌院事延于一作近乎十年與直徇公之議聆於朝端一無此二字中書舍人杜元頴兵部侍郎沈傅師洎諸學士皆渉歴嵗乆備乎前文一作聞者也李常暉以北閣舊記室别堵殊義非貫通改于前㕔僉一作時以為便聖上詔復墜典留神太古處厚與司勲郎中路隋職參侍讀一作講通籍近署紀述之事前託沈傳師沈公以為稱善之在已不若使其人讓于處厚因字一作固陋無以辭時皇帝統臨四海之初元也一作皆翰林志翰林承㫖學士㕔壁記元稹舊制學士無得以承㫖為名者顧問應對參㑹翰林志作參列班第旋次翰林志集並作旋次班第以官為上下憲宗章武孝皇帝以永真元年即大位始命鄭公絪為承㫖學士位在諸學士右居在東第一閣乘輿奉郊廟輙得乘廐馬自浴殿由内朝以從揭雞竿而翰林志無此字布大澤則昇丹鳯之西南隅外賔客進見於麟徳一有殿字則直上翰林志作止直集作上直禁中以俟大凡大詔二本作誥令大廢置丞相之密畫内外之密奏上之所甚注意莫不專受專對他人無得而參非自異也法不當言用是十七年間由鄭至杜十一人而九參大政其不至者衞公詔及門而返事適然也至於張則㺯相印以俟其病間者乆之卒不興集作典命也已若此則安可以昧陋不肖之稹繼居九丞相二名卿之後乎俛瞻仰翰林志作贍仰覩如遭大賔每自誨其心曰以若之不俊不明而又使欲惡欹曲攻於内且决亊於㝠㝠之中若之二本無此二字無暴揚報校二本作効之慮遂忿行於私易易也入翰林志作遂忿行私易也然而隂潜之神必有記善惡之餘者以君父之遇若如是而猶舉枉錯直可乎哉使若之心忽而為他人盡數若之所為而中不自愧斯翰林志作乃可矣昔魯恭王餘畫先賢於壁以自警臨我以十一賢之名氏豈直自警哉由是謹述其遷授書于座隅長慶元年八月十日記重脩承㫖學士壁記丁居晦尚書元稹承㫖學士㕔壁記舊題在東廡之右嵗月滋乆日爍雨潤牆屋鏬缺文字昧沒不稱深嚴之地院使郭公王公皆以茂器精識參掌院事顧是言曰吾儕釐務罄盡心力細大之事人謂無遺而茲獨未暇使衆賢名氏翳不光耀失今不治後誰治之遂召工賦程不日而成峭麗齊平粉繪耀明或作目玉粹雲輕隨顧而生貫列英豪使千萬齡無缺無傾工役一無此字告休命予紀完緝一作葺之羙舊記所載今皆不書開成表號之二年五月十四日記一作皆翰林志翰林院使壁記杜元頴聖明以文明敷于四海詳擇一作延文學之士置於禁署實掌詔命且備顧問又於内朝選端肅敏裕邁乎等倫者為之使有二員進則承睿㫖而宣於下退則受嘉謨一作謀而逹于上軍國之重亊古今之大體庶政之損益衆情之異同悉以闗攬因而啟發若非有逹識有精材一心守公百志根正則曷能保維密勿之際傳導吁俞之間哉故嘗由是職必極其位有若今之右軍梁時進樞密劉堅焉當先聖躬勤萬務志清九有築壇互登持柄驟移賛命於是乎出號令於是乎發急宣密付波至颷去二使之任尤所重難乃以今内給亊李常暉内謁者監王士政繼領其職既而掃殄淮蔡廓平海岱有魏以六州底貢常山以二郡獻地北逐犬戎南剪溪蠻凡兵事之所㑹符檄之所至籌畧之所授告諭之所加决於一言歘以萬里得失以之而定安危以之而分降自九天之上行乎四海之外一作内無不靣奉宸斷在競競跼喘汗之中揣切必䆒毫芒靡失不有絶人之神用其孰能處於此乎勤勞夙夜亦云至矣我皇初纉寳祚特加寵奨榮以金印紫紱玉帶之賜尋又就遷命秩勲階兼崇蓋舉勞以行賞也爾其聳善嚮義愛才好直周旋蚤暮率履無越每聞激忠之詞及有所論必加慰勉欣喜外形此又列内庭者所共幸也至于増葺院署使群英有㳺處之安栽培松筠使多士有吟翫之適表裏融暢始終堅全固不易得也若無題叙則將來者何以景行之因移學士舊記遂徵前院使之官族斷自元和已後列于屋壁焉時庚子嵗夏五月一日記文苑英華卷七百九十七
