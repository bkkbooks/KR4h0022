body:
  text: 文苑英華卷六百九十九宋李昉等編文集一庾信集序一首文思博要序一首王勃集序一首庾信集序宇文逌蓋聞五聲調應則宫徴成其文八音克諧則絃管和其韻所以周南召南之篇為風人之首小雅大雅之作實王政之由復其疑作有陽春白雪之唱郢中之曲彌髙秋風黃竹之詞伊上之才尤盛遂能𢎞孝敬敘人倫移風俗化天下兼夫吟詠情性沈鬱文章者可略而言也開府司宗中大夫義城公庾信字子山南陽新野人也若夫有周之時掌庾源其得姓皇晉之代大尉闡其宗譜舄奕氤氳布在方䇿國史家諜世並詳焉八世祖滔散騎常侍領大著作遂昌縣侯祖易徴士隱遁無悶確乎不拔宋終齊季早擅英聲父肩吾散騎常侍中書令文宗學府智囊義窟鴻名重譽獨步江南或昭或穆七世舉秀才且圭且璋五代有文集貴族華望盛矣哉幼而清惠唯良之美稱共治之能佩犢帶牛有侔龔遂桑枝麥穗無謝張堪入為司憲中大夫帥掌三勑之法助宣五禁之書秋府得人於斯為盛嘗且上府賦詩曰詰旦啓門闌繁辭擁筆端蒼鷹下獄吏獬豸飾刑冠司朝引玉節盟載捧珠盤窮紀星移次歸餘律未殫雪髙軍尺厚冰深一寸寒短笋猶埋竹香心未起蘭孟門久失路扶搖忽上摶栖烏遷得府棄馬復歸欄榮華名義重虛薄報恩難枚乘遷疑起疾貢禹遂彈冠方隨蓮葉斂未用竹根丹一知玄象法詎思垂釣竿其王事之中優遊如此出為洛州刺史德茂褰帷才膺刺舉吏不敢賄人不忍欺上洛童兒如迎郭伋商山故老似值劉𢎞復為司宗中大夫總轄禮府佐治春卿辨九拜之儀教六詩之義自梁朝筮仕周世驅馳至今嵗在屠維龍居淵獻春秋六十有七齒雖耆宿文更新竒才子詞人莫不師教王公名貴盡為虛襟信降山嶽之隆緼煙霞之秀器量侔瑚璉志性甚松筠妙善文詞尤工詩賦窮緣情之綺靡盡體物之瀏亮誄奪安仁之美碑有伯喈之情針似揚雄書同阮籍少而聰敏綺年而播華譽齠嵗而有俊名孝性自然仁心獨秀忠為令德言及文詞穿壁未勤映螢逾甚若乃德聖兩禮韓魯四詩九流七略之文萬卷百家之説名山海上金匱玉版之書魯壁魏墳縹帙緗囊之記莫不窮其枝葉誦其篇簡豈止仲任一見之敏世叔五行之速強記獨絶博物不群年十五侍梁東宫講讀雖桓驎十四之嵗答宿客之詩魯連十二之年杜離堅之辨匪或斯尚同日語哉玉墀射䇿髙等甲科公孫金馬之時仲舒鴻漸之日未能連類曾何足云解褐授安南府行參軍尺木未階髙衢方騁尋轉尚書度支郎中壯嵗精練必以吏能上象列宿非因忿氣夜不離閣後漢黃香晝夜不離省閣無愧於黃香開霧覩天有同於樂廣仍為郢州别駕刺史之半驥足斯展于時江路有賊梁先主使信與湘東王論中流水戰事醜徒聞其名德遂即散奔深為梁主所賞蓋善戰者不陳此之謂乎兼通直常侍使於魏土接對有才辨雖子貢之旗鼓陳説仲山之專對智謀無以加也還本國為正員郎職位清顯以望以實又為東宫領直春宫兵馬並受節度龍樓蘭錡寵寄逾隆值侯景篡逆攻圍淮海建康宫殿非無流矢之兵丹陽帝居遂有生荆之痛出往上流來歸全楚于時州后即湘東王其後封豕既誅長蛇受戮湘東有雪恥之功淮海有勤王之旅同少康之復夏若太戊之紹殷即於荆江驟置文物復為梁後主蕭繹御史中丞中興司直具瞻斯在貴戚斂手豪族屏氣遷散騎常侍右衛將軍豐貂右珥戎章再徙阮籍非好之職鄭點參乘之官著德廊廟切問近對拜武康縣開國侯開國承家信圭是執河帶山礪貽厥于后即以本官奉使大國光華重出原隰再來太祖夾輔魏朝作相關右三分有二九合一匡德邁晉宣雄踰魏武功髙網地道映在田亦見子山賜識如舊屬武太祖獻䇿魏帝命將荊衡尋值本朝青蓋入洛於是捨節入仕乃沐霸恩改授使持節車騎大將軍儀同三司戎號光隆比儀台鉉髙官美宦有踰舊國又遷驃騎大將軍開府儀城公王沈晉代始授此榮黃權魏時首膺斯命降在季世秩居上品爵為五等榮貴兩朝出為𢎞農郡守職實剖符寄深分竹加以冥心資敬篤信天倫孝實人師刑推士則愠喜不形於色忠恕不離于懷矜簡儼然師心獨往似陸機之愛弟若韓康之養甥環堵之間怡怡如也屢聘上國特為太祖所知江陵名士唯信而已綢繆禮遇造次推恩明帝守文偏加引接武皇英主彌相委寄密勿王事多歷嵗年自攜老入關亟移灰琯蒸蒸色養勤同扇席及丁母憂杖而後起病不勝哀青鸞降宿樹之祥白雉有依欄之感晉國公廟期受託為世賢輔見信孝情毀至每自憫嗟嘗語人曰庾信南人羈士至孝天然居喪過禮殆將滅性寡人一見遂不忍看其至德如此被知亦如此昔在陽都有集十四卷值太清罹亂百不一存及到江陵又有三卷即重遭軍火一字無遺今之所撰止入魏已來爰洎皇代凡所著述合二十卷分成兩帙附之後爾余與子山風期款密情均縞紵契比金蘭欲余製序聊命翰札幸無愧色非有絢章方當貽範搢紳懸諸日月焉文思博要序髙士亷大矣哉文籍之盛也範圍天地幽贊神明用之邦國則百官以乂用之鄉人則萬姓以察非松喬而對振古瑾户牖而覿遐方故先王以之建極聖人以之設教師範百代彌綸四海是以刋之金石與天壤而相弊書之竹素一作帛與日月而俱懸者莫尚於此爰自卦起龍圖文成鳥䇿墳典開其緒丘索導其流虞夏之書猶旭日之始旦殷商之誥若覆簣之為山及曲阜佐周攝政踐阼而又闕里自衛將聖多能捐益禮樂極乎天而蟠乎地祖述堯舜繁星辰而振河海郁郁焉鼓王風於九合誾誾焉闢儒門於百代既而雅道雖廢學者未衰挾册如林遂偶縱橫之運懷經成市俄屬坑焚之災下土怨咨上天回眷咸洛基命懸賞而崇儒術曹馬御紀疏爵而啓膠庠人拾青紫家握鉛素求古文於孔壁專門者重闡收竹書於汲塜異説者無遺逮乎有隋失馭群凶競逐辟雍蔓於荆棘延閣殫於煨燼孟堅九流與川瀆而俱竭𢎞一作尹非度四部隨嶽敦而分崩淹中許下博古洽聞之生盡殄散矣蘭臺藏室金簡玊匱之文咸殘逸矣皇帝仰膺靈命俯叶萌心智周乾坤之表道濟宇宙之外操參一作征伐而清天步橫崑海而紐地維櫜弓矢於靈臺執贄者萬國張禮樂於太室受職者百神蒼旻降祥黔黎禔福置成均之職劉董與馬鄭風馳開崇文之館揚班與潘江霧集搢紳先生聚蠧簡於內輶軒使者採遺篆於外刋正分其朱紫繕寫埒於邱山外史所未録既盈太常之藏中經所不載盛積祕室之府比夫軒皇宛委穆滿羽陵炎漢之廣內有晉之祕閣何異乎牛宫之水爭浮天於谷王蟻蛭之林競拂日於若木也帝聽朝之暇屬意斯文精義窮神微言探賾紆樓船於學海獲十城之珍駐羽蓋於翰林搴三珠之寶以為觀書貴要則十家並馳觀要貴博則七略殊致自非總質文而分其流混古今而共其轍則萬物雖衆可以同類千里雖遙可以同聲然則魏之皇鑒登巨川之濫觴梁之遍略標崇山之增構嵗月滋多論次逾廣類苑耕録齊玉軑而並馳要略御覽揚金鑣而繼路雖草創之指義在廉也而編録之內猶多遺闕並未能絶雲而負蒼天杜罻羅之用激水而縱溟海息鈎餌之心帝乃親縈聖情曲留玄覽垂權衡以正其失定凖繩以矯其違頓天網於蓬萊綱目自舉馳雲車於䇿府轍迹可尋述作之義坦然筆削之規大備馳進尚書右僕射申國公士廉特進鄭國公魏徴中書令駙馬都尉德安郡公楊師道兼中書侍郎江陵縣子岑文本中散大夫守尚書禮部侍郎顔相時中散大夫守國子司業朱子奢給事中許敬宗朝散大夫守國子博士劉伯莊朝散大夫行太常博士吕才祕書丞房玄齡朝散大夫行太學博士馬嘉運朝散大夫行起居舍人禇遂良朝議郎守晉王友姚思聰唐書作廉太子舍人司馬宅相祕書郎宋正跱唐書有李淳風無宋正跱籠緗素則一字必包舉殘缺則片言靡棄而有檢簡而不失同兹萬頃塍埓自分譬彼百川𣲖流無壅討論歷載琢磨云畢勒成一家名文思博要一百二十帙一千二百卷并目録一十二卷義出六經事兼百氏究帝王之則極聖賢之訓天地之道備矣人神之際在焉昭昭若日月代明於下土離離若星辰錯行於躔次斯固墳索之苑囿文章之江海也是為國者尚其道德為家者尚其變通緯文者尚其溥諒足以仰觀千古同羲文之爻彖俯視百王軼姬孔之禮樂豈止刻石漢京懸金秦市比丘明之作傳侔子長之著書而已哉王勃集序楊炯大矣哉文之時義也有天文焉察時以觀其變有人文焉立言以重其範歷年兹久遞為文質應運以發其明因人以通其粹仲尼既沒遊夏光洙泗之風屈平自沈唐宋𢎞汨羅之迹文儒於焉異術詞賦所以殊源逮秦氏燔書斯文天喪漢皇改運此道不還賈馬蔚興已虧於雅頌曹王傑起更失於風騷僶俯大猷未忝前載洎乎潘陸奮發孫許相因繼之以顔謝申之以江鮑梁魏群材周隋衆制或茍求蟲篆未盡力於丘墳或獨徇波瀾不尋源於禮樂會時沿革循古抑揚多守律以自全罕非常而制物其有飛馳倐忽倜儻紛綸鼓動包四海之名變化成一家之體蹈前賢之未識探先聖之不言經籍為心得王何於逸契風雲入思叶張左於神交故能使六合殊材並推心於意匠八方好事咸受氣於文樞出軌躅而驤首馳光芒而動俗非君之博物孰能致於此乎君諱勃字子安太原祁人也其先出自有周濬啓大明之裔隱乎炎漢𢎞宣髙尚之風晉室南遷家聲布於淮海宋臣北徙門德勝於河汾宏材繼出達人間峙祖父通隋秀才髙第蜀郡司户書佐蜀王侍讀大業未退講藝於龍門其卒也門人諡之曰文中子聞風睹奧起豫道惟揣摩三古開闡八風始擯落於鄒韓終激揚於荀孟父福畤歷任太常博士雍州司功交址六合二縣令為齊州長史抑惟邦彥是曰人宗絶六藝以成能兼百行而為德司馬談之晚嵗思𢎞授史之功揚子雲之暮年遂起參玄之歎君之生也含章是託神何由降星辰竒偉之精明何由出家國賢才之運性非外奬智乃自然孝本乎未名人應乎初識器業之敏先乎就傅九嵗讀顔氏漢書撰指瑕十卷十嵗包宗疑作綜六經成乎暮月懸然天得自符音訓時師百年之學旬日兼之昔人千載之機立談可見居難則易在塞咸通於術無所滯於詞無所假幼有鈞衡之略獨負舟航之用年十有四時譽斯歸太常伯劉公巡行風俗見而異之曰此神童也因加表薦對䇿髙第拜為朝散郎沛王之初建國也博選竒士徴為侍讀奉教撰平臺鈔略十篇書就賜帛五十匹先鳴楚館孤峙齊宫乘忌側目應劉失步臨秀不容尋反初服逺逰江漢登降岷峨觀精氣之會昌玩靈竒之肸蠁考文章之迹徴造作之程神機若助日新其業西南洪筆咸出其詞每有一文海內驚瞻所製九隴縣孔子廟堂碑文宏偉絶人稀代為寶正平之作不能奪也咸亨之初乃參時選三府交辟遇疾辭焉友人陵季友時為虢州司法盛稱𢎞農藥物乃求補虢州參軍坐免嵗餘尋復舊職棄官沈迹就養于交址焉長卿坐廢於時君山不合於朝豈無媒也其惟命乎富貴比於浮雲光隂踰於尺壁著撰之志自此居多觀覽舊章翾翔羣藝隨方滲漉于何不盡在乎詞翰倍所用心嘗以龍朔初載文場變體爭構纎微競為雕刻糅之金玊龍鳯亂之朱紫青黃影帶以徇其功假對以稱其美骨氣都盡剛健不聞思革其弊用光志業薛令公朝右文宗託末契而推一變盧照鄰人間才傑覽清規而輟九攻知音與之矣知已從之矣於是鼓舞其心發泄其用八絃馳騁一作驟於思緒萬代出沒於毫端契將往而必融防未來而先制動搖文律宫商有奔命之勞沃蕩詞源河海無息肩之地以兹偉鑒取其雄伯壯而不虛剛而能潤雕而不碎按而彌堅大則用之以時小則施之有序徒縱橫以取勢非鼓怒以為資長風一振衆萌自偃遂使繁綜淺術無藩籬之固紛繪小才失金湯之險積年綺碎一朝清廓翰苑豁如詞林增峻反諸宏博君之力焉矯枉過正文之權也後進之士翕然景慕久倦樊籠咸思自釋近則面受而心服逺則言發而響應教之者逾於激電傳之者速於置郵得其片言而忽焉髙視假其一氣則邈矣孤騫竊形骸者既昭發於樞機吸精微者亦潛附於聲律雖雅才之變例誠壯思之雄宗也妙異之徒别為縱誕專求怪説爭發大言乾坤日月張其文山河鬼神走其思長句以增其滯客氣以廣其靈已逾江南之風漸成河朔之制謬稱相述罕識其源扣純粹之精機未投足而先逝覽奔放之偏節已滯心而忘返乃相循於局步豈見習於通方信譎不同非墨翟之過重增其放豈莊周之失唱髙罕屬既知之矣以文罪我其可得乎君以為摛藻雕章研機之餘事知來藏往探賾之所宗隨時以發其惟一作文應便稽古以成其殆察微循紫宫於北門幽求聖律訪玄扈於東洛響像天人每覽韋編思𢎞大易周流窮乎八索變動該乎四營為之發揮以成注解嘗因夜夢有稱孔夫子而謂之曰易有太極子其勉之寤而循環思過半矣於是窮蓍蔡以像告考爻彖以情言既乘理而得玄亦研精而徇道虞仲翔之盡思徒見三爻韓康伯之成功僅踰兩繫君之所注見光前古與夫發天地之祕藏知鬼神之情狀者合其心矣君又以幽贊神明非杼軸於人事經營訓導乃優遊於聖作於是編次論語各以群分窮源造極為之古訓仰貫一以知歸希體二而致逺為言式序大義昭然文中子之居龍門也睹隋室之將喪知吾道之未行循歎鳯之逺圖宗獲麟之遺制裁成大典以贊孔門討論漢魏迄於晉代刪其詔命為百篇以續書甄正樂府取其雅奧為三百篇以續詩又自晉太熙元年至隋開皇九年平陳之嵗褒貶行事述元經以法春秋門人薛收竊慕同為元經之傳未就而歿君思崇祖德光宣奧義續薛氏之遺傳制詩書之衆序包疑舉藝文克融前烈陳群稟太丘之訓時不逮焉孔伋傳司冦之文彼何功矣詩書之序並冠於篇元經之傳未終其業命不與我有涯先謝春秋二十八皇唐上元三年秋八月不改其樂顔氏斯殂義賈誼鸝賦作養空而浮賈生終逝嗚呼天道何哉所注周易窮乎晉卦又注黃帝八十一難幸就其功撰合論十篇見行於代君平生屬文嵗時不倦綴其存者才數百篇嗟乎促齡材氣未盡歿而不朽君子貴焉兄勔及勮磊落詞韻鏗鍧風骨皆九變之雄律也弟助及勛總括前藻網羅群思亦一時之健筆焉友愛之至人倫所及永言存歿何痛如之援翰紀文咸所未忍蓋以投分相期非宏詞説澘然攬涕究而序之分為二十卷具諸篇目三部盛作恨不序於生前七志良書空撰得於身後神其不逺道或存焉文苑英華卷六百九十九
