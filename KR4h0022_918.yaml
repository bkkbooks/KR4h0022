body:
  text: 文苑英華卷九百十九宋李昉等編職官二十七刺史一周柱國楚國公岐州刺史慕容寧碑一首周兖州刺史廣饒公宇文常碑一首兖州當作商兖州下同唐恆州刺史建昌公王義童碑一首周柱國楚國公岐州刺史慕容公神道碑庾信昔在殷書懋賞周禮議勳諸侯計功大夫稱伐惟師尚父昆吾載寶鼎之銘王命尸臣栒邑傳雕戈之賜故知太上立德明試以功存有顯爵之榮歿有大名之貴昊天不弔其惟楚國公乎可以旌德景鍾勒勳彛器式昭盛美載揚洪烈者焉公諱寧字永安昌黎徒河周書作何人也都尉㧾六縣之卿名山稱五嶽之佐燕太祖文皇帝慕容皓以當世英雄奄有河朔趙之南境且建王城冀之北土仍為興國公既皓之苗裔家世燕陲髙祖侍中使持節都督中外諸軍事太保録尚書北海王慕容超之世蕃屏王室詳之燕録可得稱焉曽祖尚書府君因魏室之難改姓豆盧仍為官族祖仕魏文成皇帝考早亡朝廷以庸勳攸屬恩深追逺保定三年有詔贈柱國將軍少師涪陵郡開國公食邑二千户公禀氣中和降神川嶽岐嶷表羈貫之年通禮稱綺紈之嵗夙著竒節幼表大成兄弟分果備知推讓賔客解鈴曾無吝色永安元年太宰爾朱天光魏室滿疑輔握兵淮右抗權江南公時任别將便從征伐自是長城碣石必先行陳秦南隴西每當矢石權疑降乘勝莫不前驅策勳行賞常居第一永熙元年補子都督并加鼓節軍儀除桑乾太守轉補都督其年以魏皇西幸奉迎大駕賜封河陽縣開國伯增邑三百户俄遷大中大夫改伯為侯增邑合九百户仍授使持節都督顯州諸軍事顯州刺史四年遷鎮東將軍金紫光祿大夫其年秋河橋之役先登破陳遷為車騎大將軍儀同三司五年沙苑之功加封合前二千户俄授敷州刺史加散騎常侍外深推轂內侍集書十五年授右衛將軍十六年授大將軍後魏元年重授敷州刺史公以先經刺舉固辭不就三年改封武陽郡開國公除尚書僕射職惟贊奏任居封掌分左右之儔兼典舉之選屬以江南阻兵渚宮邊敵軍機警急鋒鏑縱橫公奉命星言元戎啓路惣秦人之鋭士兼荆户之廣卒水龍競雙刀之勢步竒陳四分之威夷陵既燒黔中方定旋軍反斾解甲休兵其後鳳州內叛成都外絶公又惣督衆軍搜乘即道兵不血刃並皆擒獲遷其酋豪納其降附皇朝受終文祖革命神宗選賢與能改絃創制爰降冊書授公柱國增邑四千户二年授同州刺史襟帶關輔唇齒秦晉編户殷積邸閣儲峙藩籬是任親賢勿居公建旟作牧褰帷行部六條斯舉百城咸勸三年授公大司寇又以公勳庸特著冊封楚國公食邑一萬户蓋因破万俟仁等於荆陜即其地而封焉逖糾王慝弛張刑政式遏冦虐於是御之以寬猛柔逺能邇然後平之以冲和舜任咎陶不仁者逺晉舉隨㑹羣盜皆奔保定四年授岐州諸軍事岐州刺史沉痼彌留保定五年三月四日薨于私第春秋六十有二詔贈某官諡某公禮也十月庚申葬于洪瀆之川馳綍毀宗客車專道𤣥甲被屬國之兵介士陳輕車之騎克善令終生榮死感嗚呼哀哉經德秉哲體道居貞履貴思冲居盈一作滿念損澄波千頃不能變其清濁高墻百仭無以測其汙隆立身行已居安如墜亡躬殉義視嶮若夷至於將略應變出竒設伏太一風角之占常從星辰之候艛船戰陳之録强弩馳射之書莫不動㑹機神發符雷電梯衝所向地靡百樓之城長㦸所臨野關三門之陳是以斬將搴旗四十三戰尊官厚祿三十七年武彰七德之義歌誦九功之業迹紀庸器之文行昭易名之典昔臧文既殁穆叔稱其立言鄭僑云亡宣尼泣其遺愛德陽青石之墓千年未平板江白虎之碑百代無毀敢因斯義乃作銘曰遼水之東冀州之北既曰都尉兼稱屬國斂氣餘勇雄邊遺則孝實天經忠為令德冠冕世祿羽儀祚𦙍俗被燕丹風漸英藺劬勞行役辛苦行陳勇過溺駿氣踰瓦震王國克生思皇多士溫溫恭人謙謙君子擁旄仗節出蕃入仕五朝建旟千里時逢改特疑名載策勳淮隂召拜昭陽破軍職司刑政獄慎深文沈羊不飲萑盜無聞巴庸薄伐江漢專征軍惣六校兵兼七營運長擊短後實先聲增壘威敵减竈潛兵鐘鳴夜漏晞露朝陽邑里蕭索宅帷荒凉豐碑下柩題凑遷喪宮臨樗里臺傾孟嘗卜兆戒期逺辰告筮德遺身後名昭殁世館舍長捐泉扄永閉晏嬰悼齊柳莊悲衛風秋北原日沒川逝葬田舊頃客土新封淚墮片石劔挂孤松清徽令範千載餘蹤周兖州刺史廣饒公宇文公神道碑前人唐朝以元凱並進十有六人周室以昭穆先封十有五國發源纂胄葉𣲖枝分開國承家珠聮璧合是用克明俊德思皇多士盛德有後公其裕哉公諱常字子元豫州滎陽人也周宣中興然後樹賢建戚鄭武有國然後保姓受氏荆衡之賦千乘莫敢加兵虢檜之封十城翻為獻邑况復郊門致騎先迎內史之賔南宮旦朝獨識尚書之履祖思慶建威將軍山陽太守建威取曹仁之號可以定名山陽有王暢之賢足觀風俗考頊銀青金紫方於溫羡傳祗鎮南征東比於劉𢎞荀顗報功之冊則槐路是儀贈行之典則荆河惟牧公弱齡早惠幼志夙成立必正方言無勦說青襟智勇即埋雲夢之蛇童子仁心已愛中牟之雉始遊庠孰不無儒者之榮或見兵書遂有風雲之志出忠入孝事盡於心修身立名理窮於性天統三年起義華陽先登廣武浮潛逾沔入渭亂河䝉授永安縣開國男輔國將軍自爾長從太祖入為帳內都督河橋接戰秋水則三月不流洛城揮鋒金墉則一月路斷西京不賔羌戎侵軼城如飛鳥地有伏龍公以金僕裁抽靈鉟暫舉蜂目已奔狼心遂革遷平東將軍帥都督十五年襲父封魏昌縣開國伯轉大都督魏後三年授使持節車騎大將軍儀同三司黃權受詔嘉其入魏之功竇憲當官賞其平戎之策公之此授勳庸著矣進爵廣饒縣開國公邑五百户保定三年授都羅州諸軍事羅州刺史仍領金州兵馬應接上庸公於文谷路溪澗崢嶸巖崖豁嶮山窮水斷馬束橋飛中垺既開雙城即欵往者申息盡掩江黃無援涔陽極浦亟犯風塵夏首西浮頻遭鋒鏑公以伏波受脤樓船誓衆入橫江之陳進下瀨之兵越客文身湛盧終去吳人長鬛艅艎遂逺建德四年授使持節開府儀同大將軍公孫敖下光祿之塞諸葛誕勒丸都之山公之處焉差無慙德四方雜俗天下殊風以君亷能使兼觀察馳傳擁節揚旌持斧既乘驄馬仍被繡衣羣盜纍足貴戚斂手鄉亭留宿幸無歸忌之疑公車奏事寧有反支之日是使陽球司𨽻無所申威鮑恢都官因人成事高祖武皇帝以仲春誓衆甲子濟河公仗劔六軍披圖八陳譬彼張遼前鋒而報魏主方之耿弇先戰而待蕭王及乎九州攸同四隩既宅遂得功參勇爵名入司勳授上開府增邑五百户加以舉功行賞推恩分邑兼乘而反光乎譙郡之城載寶而歸照於臨漳之水即日賜姓宇文與國同族婁敬上書於鹿輅項伯舞劔於鴻門公之此榮足為連類以公績著屯險誠貫風霜其年授使持節督東徐州諸軍士事徐州刺史宣政元年授都督南兖州諸軍事南兖州刺史作牧濟河風行於雷澤建旟海岱化被於淮沂䄡帷入境貪殘者解印冕旒從政仁義者郊迎豈直白石開渠青鹽換粟祥雲入境行雨隨軒而已哉在任遘疾薨於方鎮皇甫嵩監御斯牧賢能刺史荀中郎連率此則中興方伯英聲茂實公之有焉詔贈某官諡某公禮也以大象二年十一月十日歸葬於滎陽之某山舊墓九原悽愴趙文子其何言駟馬悲鳴滕成公其已逺若夫勒鼎刋碑銘功頌德陳其令範必在生前嗟乎此之樹碑異乎洙泗之水此之勒石異乎燕然之山嗚呼哀哉乃為銘曰高陽之子少典之孫蒼林逺遘若水遙源公侯復始鐘鼎逾繁承基纂胄建國開藩我壯我武既公既侯緇衣出鄭卿士歸周魚陵北上滎澤東流河移酸棗雨粟陳留祖守南邦考鎮東部兩龜回印雙蛇結綬日察隂風星占長柳是曰世載其名不朽事親之道孝以立身事君之道忠以立仁今君嗣德一此君親如松之茂如竹之筠功參荆棘職主兵戈北臨青嶺南通白波直雲橫塞長星渡河陳開沙斷師移竈多舉功行賞封疆受位宫室鏤圭山河分地决勝千里謀深計祕建武功成名連星次建旟濟漯擁節龜䝉既蠶桑土實撫梧桐野無異器河無别風吳亭楚障莫敢彎弓倐忽身世俄然松檟路轉銅魚山迥石馬武侯之廟欒公之社望此高碑悽然淚下唐恆州刺史建昌公王公神道碑楊炯王氏之先代為佐命秦之霸也則王離滅楚國而三將連衡漢之興也則王陵誅項籍而五侯同拜南陽定命集作克定應圖䜟而作司空西晉聿興合歌謡而濟天下昔者伊尹伊陟但保乂於商朝太公桓公唯夾輔於周室蕭何之後居食祿而無聞鄧禹之孫在當塗而不嗣未有夏殷三統金木五遷册命重光軒裘集作裳代襲則我琅琊之郡有冠蓋之里乎建昌之縣有公侯之子乎公諱義童字元稚其先琅琊臨沂人也永嘉之末徙于集作於江外皇運之始遷于集作於五陵今為雍州萬年人也祖僧興齊會稽令梁安郡守南安縣開國侯祿位千石圭符五等營室回於羽儀山河入於盟誓父方賖梁正閣主簿伏波將軍梁安郡守隋上儀同三司以惠和之性集作德有文武之才伏波將軍從征等於馬援儀同三司開府均於鄧隲家餘積慶郡不乏賢代臨本州則元賔之父喜形於色繼為本守則張翕之子送集作迎者如雲自齊國遜位於梁庭及隋人內禪於皇室夏禹之鼎寶命集於周朝御龍之家世集作代祿歸於范氏公台階茂緒昴宿精靈五百歲之賢才一千里之皇佐忠規武節集作略學府詞林元方閨門敬其有德少游鄉里稱其善人實惟清廟之器是曰皇居集作家之寶韻諧金石奏虞廷之八音德合圭璋列塗山之萬國黃河一曲之水莫測其源赤城千丈之巖未階其峻羣童忽聚綴帛而引幡旗父老相呼授履而傳兵法隋授左勳衛率非其好也漢東離析海內風塵天子溺於膠船諸侯問於金鼎能扶天下之危者必據天下之安能除天下之憂者必享天下之樂我高祖神堯皇帝就之如日望之如雲發三河之雷電集作霆平四海集作時之厯象武王之仗黃鉞一月臨於孟津高帝之執朱旗五星會集作聚於東井公瞻烏于屋射隼于集作於墉陳平則間行而去楚酈生則長揖而歸漢奉符繫組觀軹道之降王偃武修文見山陽之散馬初拜車騎將軍稍遷右屯衛將軍録有功也考於周典崇德報功稽於春秋策勳舍爵車騎萬隊備凉土之羌戎衛軍千兵掌京師之屯禁于時天下集作保初定邊方未輯二十八舍尚有吳越之妖氛一十三州猶積東南之殺集作反氣武德四年詔公為江南道招討使鼓琴而送受命而行乘使者之輶車掌行人之旌節陸賈至於南海先責尉他隨何入於九江即徵黥布詔除泉州都督封建昌縣男食邑三百户斗牛星象舜禹精靈境接東甌地鄰南越言其寶利則玳瑁珠璣叙其風俗則丹雞白犬公門容駟馬位列三刀防薏苡之譏嫌絶簡書之流謗豈知集作直廣州清節酌貪泉集作水於石門合浦神君返明珠於漲海貞觀三年詔還集作除散騎常侍行果州刺史授期天帝肇跡人皇南充國之舊都西巖渠之古邑岡巒紛糾天彭雙闕而作門珠貝浮沉集作沉浮巴水三回而成字公入參師友出居方伯金蟬右貂朱旗曲蓋才臨蜀郡即聞來暮之歌初踐益州已聽中和之樂七年詔遷銀青光祿大夫行恆州刺史西街畢昴北嶽恆山天開太一之宫地列并州之鎮境分靈夀魏將樂羊之所封邑對行唐趙王惠文之所築公政成朞月風行萬里鄧晨一郡漢帝稱為主人李廣數年胸奴號為集作其飛將行嘗計日郭伋不負於童兒郡異中平王觀無私於任子既導德而齊禮亦勝殘而去殺三禾在殿將拜鄭𢎞兩鴈集作鷹隨車坐悲虞國享年若干以十五年冬十一月二十五日薨於洛陽之清化里公家集作門傳將相世集作代有忠貞屬離集作裘亂之𢎞多值風集作雲雷之草昧河宗兩日負鼎而謁成湯渭水七年垂釣而逢西伯將軍再命刺史三遷仲皓欒巴牧人之良翰集作幹龎參虞詡將帥之宏規立事於當年揚名於後代兄國卬榖州刺史二字集作牧下同弟國稀仁州刺史荆枝擢秀棣蕚生光何止平輿之二龍是為賈家之三虎唐虞之際四嶽分居趙魏之間八男為郡公雖勳參締搆位惣班條金友玉昆良田廣宅而能吐食集作養下士倒屣迎賔無笑客之美人有拜賔之童𨽻策名委質善始令終生當封侯克成丈夫之志死而可作無忘事君之道越十六年二月二日葬于集作於伊闕縣之萬安山詔賜雜物百段給儀仗往還禮也亭連長樂城枕高都守闕塞者汝寬適伊川者辛有北瞻洛汭尚想元亮集作凱是之境東望邢山依然國僑之基夫人楊翟縣君河南褚氏即太常卿楊翟康侯亮之女中書令河南郡公遂良之妹也宋公子之流派集作𣲖别褚先生之苗裔𢎞夫人之禮傳淑女之詩有文在手歸於魯國有鳯和鳴適於陳氏邑之石窖縣以封丘夫尊於朝妻貴於室仙人暫别初悲寡鶴之聲寶劔才分終合雙龍之氣以某年月日薨於某所越某年月日祔集作於建昌公之舊兆長子師本太穆神皇后挽郎襲建昌公歷韓王府祭酒岐州司士參軍定州安喜縣令譽聞州里學富丘山以卿子而為郎以象賢而開國朝遊楚澤暮宿燕宫東臨石柱雍為積高之地右會長星唐是中山之邑出遊鄰國不以陪臣見朝上謁邦君不以屬官相待洛陽朝覲適見雙鳬東都墓田行悲駟馬以某年月日終於某所越某年月日即陪葬於先兆次子師表左千牛備身遷尚輦直長歷許州臨潁博州堂邑滄州樂陵綿集作錦州萬安果州西充五縣令能傳祖業克嗣家聲有言偃之文章兼仲由之政事晨陪紫極繞鈎陳之六星旦奉黃麾屯玉車之千乘至若繁昌土宇魏文帝之墠壇堂邑隄封漢陳嬰之侯國河分九道渤海東臨江𣲖五津崑崙北指莫不愛人以禮為政以德鍾離意之禁暴不用尺刀集作五兵公孫述之有神能持五縣次子師𤣥嶲州都督府臺徵縣丞次子師楚䕫州都督府雲安縣令芝蘭有秀羔鴈成行滇北數十尹莫大邛都之縣邑東七百里唯有巫山之峽言其縣職黃一作䕫龍入於闕門叙其宰人集作邑鸞鳥翔於學舍咸能生盡其孝集作養喪集作沒盡其哀積粟萬鍾思負米而何集作可得榱題三尺泣吾親而不見卜其宅兆麟鳯匝其岡巒陳其簠簋春秋變其霜露思傳舊德式建豐碑戴安道作頌於鄭𤣥蔡伯喈披文於郭泰魏武王讀而稱妙非所望焉夏侯堪見而陋之固其宜也銘曰厥初兮后稷導生人兮知集無此字稼穡降及文王精翼日兮衣青光平東遷兮郟鄏晉上賔兮帝鄉秦三將兮繼代漢五侯兮克昌比狼集作琅是山兮峻極等淮水集作海兮靈長惟祖考兮鼎盛佩金璋兮疊映彼山川兮降靈生玉樹兮青青成張良兮昴宿乘傅說兮箕集作尾星出忠兮入孝武緯兮文經陳嘉謨兮制千里摛藻思兮掞天庭有隋兮喪亂土崩兮瓦散皇運兮權輿人神兮攸贊值笙鏞兮變響屬天地兮貞觀河兩日兮事殷井五星兮歸漢帶長劔兮暐曄擁幡旌集作旗兮照爛周命兮惟新雲雷兮尚屯控東南兮荒景負江海兮未賔陳禮樂兮命使動輶車兮轔轔用蛇符兮澤國頒武節兮山人專一方兮革面重九譯兮稱臣天垂兮星紀地連兮交趾山草樹兮潛移蜃樓臺兮鬱起遷合浦兮太守為廣州兮刺史臨漲海兮明珠飲石門兮貪水侃沖天兮八翼代出身兮萬里全蜀兮奧區枕邛笮兮倚巴渝有靈臺兮古跡有充國兮舊都豐貂兮左珥介士兮前驅濬三刀兮持節昌兩日兮剖符降鳴鳩兮大夏騁神馬兮長衢畢昴兮分野蘭堂兮四下漢皇帝兮國都耿將軍兮壇社若恆山兮詔鄧猶朔方兮命賈李北平兮漢飛郭并州兮竹馬瞻太階兮坐躡惜天年兮不假伊天姓兮潁川有美人兮嬋媛桂生兮因地女嫁兮因集作移天見乘龍兮奕奕覩飛鳯兮翩翩知蘧瑗兮有禮笑虞邱兮未賢始銜悲兮晝哭終共盡兮千年卜龜謀集作龜謀應兮習吉陳㫖酒兮嘉栗車徒儼兮在門旌斾紛兮竟術循洛橋兮南渡從國門兮右出樹蕭蕭兮有風雲慘慘兮無日指丘陵兮一閉與天地兮相畢悲孝子兮純深孰憂思兮可任訴高天兮泣血蹐厚地兮崩心樹碑兮神道無愧兮詞林歷陽之都兮水沒圓嶠之海兮山沉俾外孫兮幼婦生白玉兮黃金文苑英華卷九百十九
