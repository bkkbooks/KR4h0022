body:
  text: 文苑英華卷四百三十三宋李昉等編赦書十四雜赦書曲赦并州管內詔許敬宗門下上玄育物大德基於施生前哲至仁大造原於去殺是以矜愼庶獄得其情而泣辜兼濟含靈窮其巢而解網朕懷此道逾切古人彼蒼垂鑒使膺司牧爰自幼齒乃屬時屯五嶽為封豕之墟四海被長鯨之毒茫茫區夏並懸命於焚原蠢蠢窮黎咸轉骨於冰谷是用仁心內發龔討外申吟嘯風雲揭日月而清大祲簸跳山河補乾坤以正封域救其垂餌之厄惠其夀考之安煦以陽和同被發生之貺溽以膏潤申兹愷澤之錫粵自斯壤首建鴻名資此義徒遂登大寶夫小物不忘稟靈周於兆庶惟朕懷舊植性同其五情語地雖異中陽論心不殊代邸今兹黃髮已留連於廣宴在彼赭衣宜霑恩於宥罪可曲赦并州管內貞觀二十年正月十六日申時以前大辟罪已下已發覺未發覺已結正未結正繫囚見徒皆赦除之其犯十惡故殺人劫贓傷人謀殺人已傷官人枉法受財監治主守自盜所監治并常赦不免者不在赦例其有挾藏軍器亡命山澤百日不首復罪如初敢以赦前事相告言者以其罪罪之安養百姓及諸改革制內制敕愛人者天地之德育物者陽和之氣朕立極行政體元順時期於緝熙致彼仁夀今永惟春令慶在發生當萬有之遂心慮一物之失所救人恤隱雖已著於成式施惠布德俾更𢎞於新令其天下百姓有灼然單貧不存濟者緣租庸先立長行每鄉量放十丁猶恐編户之中懸磬者衆限數既少或未優洽若有此色尚軫于懷特宜每鄉前放三十丁仍準旨條處分待資産稍成任依恆式其所放丁委縣令對鄉村一一審定務須得實仍令太守子細案覆本道使察訪如有不當者本里正村正先決一百配入軍團縣令解太守本道使不舉者量貶降十德為武必先禁暴五材並用誰能去兵自古蓋非獲已關山逺戍雖多戀本之情祿位高懸終有懋功之賞若能感激信可優矜其諸征行人家有兼丁如載限向滿情願自相替者宜聽其家內應合更差防及諸雜差科一切放免古者黜陟幽明廉問風俗匪惟察吏亦以恤人今考績之期已滿於三載求瘼之意欲觀於四方宜即選擇使臣分往諸道訪察官吏善惡巡問百姓疾苦兼太守縣令老耄者比問諸郡或有損處尋令賑恤猶慮艱辛須更優矜務使周濟其開元二十九載內外官所舉太守縣令等朕以撫字之任急於用賢特令舉親務欲求實翹車既至頓網無遺不限登科皆令效職既推心而無負期濟理而有成一自守官向已終秩思聞為政之績以觀推薦之義先有處分必行賞罰尤須審察將復前言回日並具狀奏聞且量地制邑大小雖殊置吏養人逺近如一比來中下縣令或非精選吏曹因循徒務填闕天下大率小縣稍多至於蒼生詎免其弊若無優奬豈致循良既在得人寧拘格限宜令選人內取中外清資是明經進士應制明法并資蔭出身有幹局書判者各於當色內量減一兩選注選擬赴任之日仍令引見朕當察審去就其老弱者更不得輒注考滿之後準畿官等例三選聽集在任有政績尤異者三考外委本道採訪使與通狀應是下下縣仍并升為中下縣又令長字人不可蹙闕比來補授直至選時亦可縣在僻逺多不情願遂虗其位纍載闕人既無本官為政不一户口逃散莫不由兹自今已後宜令選司先量才注擬如非時有事故等闕者所有當月牒中書門下於內外官中簡擇進擬遣今所在京員外人數稍衆既無職事頗亦滯才其高品者宜簡擇量授郡守六品以下堪理人者亦授縣令俾其效用冀有成績天下郡縣先有欠公廨本處今既分稅錢並準式依本足例支給使厚其祿以竭其心經國之制省官為本况分司揆務既有常員授職任人須存定限若踰程式實紊紀綱其內外六品以下員外官至考滿後一切並停合依選例自今以後更不得注擬其皇親諸親幼小及諸色承恩授官軍功技術內省左右龍武軍并諸畨官等不在此限所司仍具作條件處分且禮經垂訓篇目攸殊或未盡於通體是有乖於大義昔如堯命四子所以授時周分六官曾不繫月先王行令蓋取於斯苟分至之可言何弦望之足舉其禮記月令宜改為時令但五分定位嶽鎮總其靈萬物阜成雲雨施其潤上帝攸宅寰區是仰且岱宗西嶽先已封崇其中嶽等三方典禮猶闕朕以眇身紹膺鴻緒紫機夙讓黃屋非尊屬天衢未亨王室多難載迫公卿之議遂膺歷數之重凛乎馭朽栗若涉泉自臨萬邦斯為三載頃者居遏密之際莫議郊禋之禮霜露之恩日月增深今三元告辰萬物伊始假于清廟升彼圓丘躬耕祈榖率禮斯備大官視膳而牲潔奉常陳樂而雍和爰自降制之始迄于禮畢之際祥風候律瑞日揚光卿雲紛集於壇場甘露傍流於郊甸非常之慶豈獨在豫宜因天地之心式覃雷雨之澤可大赦天下至都大赦天下制蘇頲黃門周宅中土秦里上田皆王者之都也時邁觀風載巡展義皆王者之政也朕嗣守宸極頗移年所冕旒而視心每周於萬邦車轍所屆迹不出於三輔豈懷安於憚勞姑省費而休力然以設京師者不偏於西據奉宗廟者亦候於東征安可阻從人之心增徯豫之怨是用闓陽發嵗練日簡辰乘和氣以應物御惠風以行令永言告至載叶伻來顧兹菲躬畏此鴻業下輦而有宫室即舊不加登臺而有山川覽今猶昔森然在目用軫于懷思𢎞逺圖俾作寬典不忘師古之義特布惟新之澤可大赦天下自開元五年二月三日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不原者咸赦除之唯謀反大逆不在赦限云云夫政欲清淨詞尚省要間者思致於一作于乂未臻其道文書盈几閣而吏益欺詔命下閭里而人莫諭得非失於抵牾弊於詔令作在煩蕪耶簡而易從禁則難犯令式格敕有不便者先令尚書省集議刋定宜詳厥衷合于大體亡命山澤挾藏軍器百日不首復罪如初敢以赦前事相告言者以其罪罪之赦書日行五百里布告天下知朕意焉主者施行大厯四年大赦天下制常衮敕至理之代先德後刑上歡心以臨下下欣然而奉上禍亂不作法令何施去聖久逺薄於教化簡書填委獄訟煩興苛吏舞文寃人致辟思欲刷耻改行厥路無由豈天地父母慈愛之意也朕主三靈之重託羣后之上夕惕若厲不敢荒寧內訪卿士外咨方嶽日不暇給八年于兹而大道淳風鬱而不振四郊多壘連嵗備邉師旅在外役費尤廣賦輿輸轉疲耗吾人困竭無聊窮斯濫矣下之愚昧舊唐書作下庶暗昧集作下愚暗昧不見刑網戎士在軍未習法令犯禁抵罪其徒實繁幽繫狴牢集作繫牢之間未詳事實吏議不決動淹時序傷沮和氣屢彰咎徴此皆朕之不明教之未至豈上失其道而繩下以刑敢不罪已以答災眚且人者君之肢體害之則君有所傷刑者教之輔助失之則人無所措慮有寃濫慘然憂傷用明慎罰之典俾𢎞在宥之澤其天下見禁囚徒死罪降從流流已下罪釋放其左降官及流人并移𨽻等並與量移仍委所司即勘責送名中書門下奏聽進止如聞縣官比年率意恣行粗杖不依格令致使殞斃深可哀傷頻有處分仍聞乖越自今已後非灼然蠧害者不得輒加非理仍委觀察節度等使嚴加捉搦勿令有犯如違録名奏聞量情科貶宣示中外宜悉朕懷大厯五年大赦天下制門下惟辟奉天作人父母若天垂戒於上人不安於下則修德勤政以達至誠恤刑獄之寃滯問閭閻之疾苦招納諫諍訪求賢良允迪前烈率由兹道朕獲承宗廟之重托於王侯之上夙夜齋栗莫敢荒寧推誠以撫萬邦屈已以安百姓憂勤之至日慎一日服御之給損之又損而涉道猶淺燭理不明國經王度多有廢闕加以冦戎驟犯軍國煩勞賦重人竭因之嵗歉田荒業廢逋散相仍每深怵悼頻有蠲降兼亦簡求良吏以惠矜人除去姦凶用達幽枉大變風俗更張刑政冀人和之漸洽何天眚之屢彰固以朕德之寡昧化之衰薄其咎不逺在豫一人亦由郡邑之政未盡條理或貪以害物或擾以傷農有凌弱暴寡之寃有不均失中之政人無所措多陷刑辟蓋上之教道未至豈忍以文法繩之慘然憂嗟深自引慝雖靡草麥秋之候方斷薄刑而薰風長養之時宜寬庶獄大決踈集作疏網與之更新其天下見禁囚徒死罪並降從流流已下並釋放內外文武官及前資官六品已下并草澤中有碩學專門茂才異等智謀經武諷諫主文者仰所在州府觀察牧宰精求表薦如所由搜揚未盡遺逸林間者即宜詣闕自舉親當策試量能擢用朕每覽漢文詔書至陽和之時草木羣生之類皆有以自樂而吾百姓或阽於死亡而莫之省緬然遐想感嘆增懷哀今之人又甚於昔思有贍恤俾安其居觀察節度使及刺史各宜訓勵所部使奉科條變貪官之節激循吏之行其清白明著政理殊尤者具以名聞必加奬擢若冒于貨賄紊我綱紀切宜紏摘當峻刑憲其官人犯賄集作贓經恩免罪者並宜申報中書門下及所司不得容其却上自王室多故積有嵗時皆我文武之臣中外戮力今天下既定崇德報功與之剖符傳代不絶至於蒞官述職各宜明慎典刑貽慶子孫永同休戚於戲武德貞觀之間有若魏徴王圭李靖李績房玄齡杜如晦等扶翼大運勤勞王家尊主庇人匪躬致命咸有一德格于皇天緬然長懷風烈猶在其後嗣沈翳特加優奬如廟宇荒毁即宜修葺無德不報何日忘之具鰥寡孤獨老幼貧窮不能自存者委州府縣吏取諸色官物量事賑給仍招擕户口勸課農桑應所在州府有興功役處非灼然急切者宜並停之四瀆五嶽名山大川神明所居風雨是主宜委中書門下分使致祭以達精誠孝子順孫義夫節婦事迹明著者特加旌表頒示中外知朕意焉主者施行大厯七年大赦天下制門下濟於道者化醇而刑措善於理者綱舉而網踈朕涉道未𢎞燭理多昧常亦遐想太古高揖玄風保合太和在宥天下蓋德薄而未臻也是用因時以設教便俗以立防務盡平恕用伸哀恤又教淺而多犯也加以邊虞未戢井賦猶繁荒瘵之際冦攘斯起遂令圜土嘉石之下積有纍囚危章互簡之中困於法吏屬盛陽之候大暑方蒸永念狴牢何堪鬱灼所以沮傷和氣感致咎徴天道人事豈相逺也如聞天下諸州自春以來咸一作或愆時雨首種不入宿麥未登哀我矜人何恃不恐皆由朕過益用懼焉惕然憂嗟深自咎責所以悉減常膳唐書作減膳撤樂别居齋宫禱于神明冀獲嘉應仲夏之月靜事無刑以助晏陰以𢎞長養斷薄決小已過於麥秋繼長增高宜順乎天意可大赦天下其大厯七年五月十五日昧爽已前已發覺未發覺已結正未結正應天下見禁囚徒罪無輕重一切悉宜放免所司詔令作由更不須類例聞奏宜令諸道節度觀察及諸州牧縣宰於當管內所有名山靈迹各精誠致祭祈降甘澤冀獲豐稔永思流弊庶振風猷其巴南諸州仍嵗水旱迫於凍餒或至流離因有剽求苟全性命懼刑網之所及姑嘯聚以相依抑有由焉蓋非獲已永言其弊用軫于懷如能相率來歸各安生業並無所問咸許自新敢以赦前事相告言者以其罪罪之亡命山澤挾藏軍器百日不首復罪如初赦書日行五百里宣示中外咸使知聞主者施行大赦京畿三輔門下古者以季春三月布德行惠恤刑振乏朕親執犧牲玉帛獲奉于上帝神祗九年于兹矣克已思理明不能燭昆夷未敘王略猶虞嵗會三秦之師日有千金之費悉索敝賦疲於餽軍侯甸之間徴求耗竭百榖翔貴關中小歉窮則斯集作思濫安能懼刑因而成盜多有犯法至於軍戎之士致使廪賜不充因之逃亡扺于詔令作或抵邦憲事非獲已情亦可察焉集無此字近以露濡之感集作思明發有懷屬禁煙集作火之令節方薦鮪於寢園聖祖敷佑景靈告祥先天後天載荷嘉貺以陰以雨又助發生固宜順釋音曲成之仁布惟新之命赦罪育物曠然滌除其京兆府及三輔并京城內諸司諸使見禁囚徒犯死罪已下特宜釋放其有犯未發覺者罪無輕重亦宜一切放免如有妄論告者以其罪罪之其官典犯贓不在免限頃者魚朝恩夙有功勳委之戎事而徴求黎庶空竭閭閻加之廣有貿易奪人賄利京城之內擅致刑獄恣行忍虐幽執無辜部領師人乖於撫馭資糧刻薄勞役煩苛惡稔釁盈自嬰沉痼念其勳舊許以優間令罷兵權遂其養疾而宗社降鑒神明所殛羸瘵不起旋至斃亡既往無追一切不問所管將士等同坐於王事各效忠詔令作辛勤是朕爪牙自致勳業並宜仍舊勿有憂懼蓋以朕誠乖感物明未知人失於授任而臻此也今則虛懷引咎親御禁戎特集作必加優寵以表勞績其資聖寺禁人并追捕勘責等即宜並停然以王畿艱集作多弊矜恤疲人蠲稅罷徭與之休息尚恐流庸罕復貧弱未安益用憂勤諒資損約京兆府百姓承前應欠負官物等委所由勘責實在百姓腹內者一切放免其在所由腹內者不在放限畿內官人手力資課及府官充職掌名額稍多所有集作在祗供不免煩費並諸縣郵遞路次館驛諸色徴科等一物已上並委中書門下與京兆尹即會計責取色目一一商量條件處置務令減省以息煩勞其諸司諸使回易一切並停不急之務亦宜且罷農隙之後然準常式宣示中外知朕意焉赦京城內囚徒制門下朕以寡薄獲守丕圖恭詔令作龔默思道克謹天戒常恐至誠不達景化未敷寅畏之誠寢興在慮自純陽用事靈雨愆旬麥雖有秋禾未嘗畝有阻三農之候將貽百姓之憂是用齋心滌思禱于上下神祗雲從自郊月未離畢膏澤不降憂勤益深雖水旱成災陰陽恆數而刑法集作政刑失中或致愆伏豈信集作簡孚有爽衷敬未誠歟嗟我矜人陷於集作于刑辟當炎蒸之序在縲絏之中久積幽寃有傷和氣所以引成湯之六事過實在豫寬大禹之九刑誠存育物期於作解以救如焚其京城見禁囚徒死罪降從流流已下罪一切釋放仍委中書門下即疏理處分訖奏聞雖赦罪從輕或謂之長惡宥過無小寧失於不經庶空夏臺用緩秋典宣示中外令知朕意文苑英華卷四百三十三
