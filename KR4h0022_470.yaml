body:
  text: 文苑英華巻四百七十宋李昉等編吐蕃書下與吐蕃宰相尚騎心兒等書白居易勅吐蕃宰相尚騎心兒等論悉吉贊及論思諾悉等繼至省表并進奉具悉卿等才器特茂識畧甚明仗義立身資忠事主上佐贊普下康黎元以尋盟納欵為謀以繼好息人為請是卿上策叶朕中心毎覽表章輙用嘉嘆朕與彼蕃國代為舅甥日結恩信自論盟㑹頗歴嵗時常欲速成以為永好雖誠明之内彼此無疑而言約之問往復未盡今故畧叙來意重示所懐想卿通明當所鑒悉河隴之地國家舊封論州郡則其數頗多計年嵗則没來甚近既通和好悉合歸還今者捨而不言豈是無心愛惜但務蚤成盟約所以惟論集作言三州則没於彼者甚多歸於此者至少猶合推為集作於禮讓豈假形於言詞來表云此三州非創來侵襲不可割屬大唐且此州本不屬蕃豈非侵襲所得今是却歸舊管何引割屬為詞去年與論㪍藏來耶一作却云覆取進止贊普便請為定今兩般使至又云此之小務未合首而論之前後既有異同信使徒煩來去雖欲速為盟㑹其如無所適從静言二三固不在此若論和好即合各無侵軼已同一家若議修盟即須重定封疆先還三郡若三郡未復兩界未分即是未定封疆憑何以為要約彼若恡惜小事輕易逺圖未能修盟且務通好至於信使一往一來但令速數得中足表情意不絶彼有要事即令使來此有要事亦令使往若封境之上小小事意但令邊頭節度兩處計㑹商量則勞費之間彼此省便前般蕃使諭悉吉贊至縁盟約事大須審商議集作量未及發遣後使續來來使雖是兩般所論只縁一亊故令相待令遣同歸在於日時亦未淹乆所送鄭叔矩及路泌神柩及男女等竝已到此良用惻然厚賵集作贈逺歸深嘉來意其劉成師元非劉闢之子姪本是成都郡人已令送還本貫其餘事目竝贊普書中卿等宜審叅量以副朕意使回之日可備奏聞今遣兼御史中丞李明銛及中使與回使同往各有少信物具如别録集作數至宜領之秋涼卿等各得平安好遣書指不多及與吐蕃贊普書封敖皇帝舅敬問贊普外甥尚屈立熱論拱熱等至得書并物具悉外甥雄武挺生英威特立本邦奉化隣國推賢修仁義以保名仗誠明而遂物􅐤弓匣劒無聞戰伐之音被野縁原不廢耕耘之具一作作儻非理化孰見和寧足觀盛業興行人心率服以茲觀政深用慰懐朕自守丕基敬遵前訓君臨四海子育萬方誠信必及於豚魚恩澤不遺於草木况外甥親臨極分嵗月滋深雖山河阻修而音耗鄭重疆分二塊地合一家載覽來章具悉深㫖所欲務存乆要頗見良圖但能各重其歡各厚其俗戎車息駕烽火不飛共保封疆兩均休戚質神明而不惑覽日月而常明宜體至懐永綏多福承前朝覲人數界首素有常儀公家之事難於違越昨者尚屈立熱等到鳳翔隨從共七十人凖舊例只合十人入朝今縁兩國和好不同元和已前遂令三十五人赴闕自今已後所遣使須遵舊例不得剰史差人勿令交馬之後妄有論請拱熱等還蕃有少物數如别録黠戞斯書與黠戞斯可汗書李徳裕皇帝敬問黠戞可汗温仵合將軍至覽書及所獻馬百疋鶻十聨具悉可汗特稟英姿生知雄畧奮揚威武底定龍充掃回鶻之穹居報怨以直䕶公主之罽幕事大以誠又遺貴族信臣載馳朔漠名馬鷙鳥逺涉流沙既展同姓之親克副懐柔之意集作㫖眷言勲績深慰予𠂻朕獲奉丕圖撫寧萬國豈望化孚有截致殷湯來享之明實恐徳未徧覆愧漢宣兼臨之盛况與彼國壤隔外内非正朔所加禮既不施政豈宜及但以惜可汗宗盟之國願保光集作先名為可汗乆集作宏逺之謀須除後患所以具古今禍福往諭至懐昔呼韓耶單于以郅支尚存國難未靖稱蕃事漢福及子孫至後漢單于比以其集無其字大父依漢而安繼襲其號上書欵塞永願藩蔽漠南遂得集作致朔塞底寧烽燧永息近則回鶻仗集作結大國之援雄長北蕃諸部率從莫敢不服一隅安樂百有餘年此事昭然可汗所覩今回鶻種類未盡分集作竊居蕃漢之間爰及黒車子乆畏其威素習非信慮彼再振常持兩端湏令小蕃知朕親厚可汗棄絶回鶻實在和好分定内附約明則邪計姦謀無由而入故欲顯加冊命昭示萬方况登里可汗回鶻舊號是國家頃年前集作所賜非回鶻自製此名今回鶻國已破亡理當嫌避朕以可汗先祖在貞觀中集作往在貞觀身自入朝太宗授以左衛將軍堅昆都督朕思欲繼太宗之舊典彼亦宜遵先祖之明誠便以堅昆為國施於冊命更加美號以表懿圖集作親况堅者不朽之名昆者有後之稱示不忘本豈不美歟朕昨令禮部尚書鄭肅等與彼使臣靣陳大計温仵合將軍等皆諭朕旨願言結成豈必契徑路之金舉留犂之酒前漢匈奴傳單于以徑路刀金留犂橈酒注云徑路匈奴寳刀契刻也留犂飲上也英華直作瑠璃今從漢書保茲誠信固在厥初頃者回鶻初至塞上請國家精兵十萬送至漠北漸歸本蕃又請借漢界一城養育疲羸以圖興復朕以可汗之故盡不聽從今回鶻是國家叛臣為可汗讐敵須去根本方保永安况是天亡之時易於攻取古人云天與不取反受其咎可汗須乗此機便早務芟夷回鶻未㓕已前可汗勿以飲食為甘弋獵為樂勵兵秣馬不可暫閒所恨限集作隔在諸蕃國家難為集作以同力儻更近塞豈復稽誅又恐餘孽歸降集作無歸可汗未能盡戮納有罪之衆受逋逃之臣儻収吾憎必仍邊隙此則是蕃養虺毒自生厲階前年回鶻宰相等向漢使云李靖擒頡利可汗後國中只是三二十人便却興復雖在危困尚示集作亦張皇可汗深察此言豈得不慮又聞合羅川回鶻牙帳未盡毁除想其懐土之心必有思歸之志要速集作速要平其區落無使孑遺既表成功彼當絶望可汗以集作已攄積年之憤自為一代之雄至於居處服章皆宜變革焉得安於所習姑務因循則何以震耀北方彈壓諸部朕撫有中夏愛育生靈常恐百姓未安一物失所豈願更廣威畧遥制要荒但縁與可汗方保和盟義同憂樂纎微之事皆欲備言想可汗與將相籌謀副兹誠意此使到日必諒朕心即宜速遣報章此當遣重臣冊命夏熱想可汗休泰將相已下竝存問之遣書指不多及與黠戞斯書皇帝敬問黠戞斯可汗將軍諦德伊斯難珠至覽書并白馬二匹具悉可汗降精斗極䧺漠朔以為君集作雄朔漢以稱君禀耀旄頭分天街而建國特表集作負英豪之氣夙推統馭之才眷相嘉猷載深寤歎來書云温仵合將軍歸國後漢使不來温仵合去日朕書具云速遣報章此當遣重臣冊命自是可汗未諭此意報答稍遲此則尋欲遣使只是延望來信又云金石路隔絶盖為山川悠逺未得自與可汗封壤接連非是兩國之情猶有阻隔想可汗明識無復致疑又云兩地遣書彼此不㑹且書不可以盡言言不可以盡意况蕃漢文字傳譯不同只在共推赤心永保盟好豈必縁飾此語以此交歡想毎欲思惟先思好意不更疑惑便是明誠又曰集作云欲除却兩楹間惡刺此之一事最集作實是嘉言縁回鶻雄據北方代為君長諸蕃臣伏百有餘年今可汗掃除穹廬集作掃其穹居大雪讐耻功業既髙於前古威聲已振於北荒固當深務逺圖豈可更留餘燼黒車子不度徳量力敢保冦讐則是侮慢可汗獨不嚮化此而可忍孰不可容况可汗前來云求訪送公主使上天入地必須覔得今若捨而不問何以取信朕懐想可汗前乗彼盛秋長驅精騎問回紇逋逃之罪行黒車子後服之誅取若拾遺役無再舉從兹蕩定豈不美與來書又云送公主到彼無一語來縁公主纔離可汁五日便被回鶻刼奪所遣來使盡被傷殺公主二年之中流離沙漠事已隔逺所以不再叙言然趙蕃去日已具感悦之心足表懃懃集作慇懃之意又聞今秋欲移住集作就回鶻牙帳滅其大國便保舊居足使諸蕃畏威回鶻絶望稍近漢集作邉境頗謂良圖所云請發遣兵馬期集去處縁黒車子猶去漢界一千餘里在沙漠之中從前漢兵未曾到彼已聞回鶻深意常欲投竄安西待至今秋朕當令幽州太原振武天徳縁邊四鎮要路出兵料可汗攻討之時回鶻必當潛遁各令邀截便可梟擒此是軍期須如集作合符契想可汗必全大信用叶一心諦徳伊斯難珠朕已於三殿靣對兼賜宴樂竝依來表不更滯留續遣重臣便申冊命故先達此旨令彼國明知冊命之禮竝依回鶻故事可汗爰始立國臨長諸蕃須示隣壤情深宗盟義重以此鎮撫誰敢不從宜體至懐共恢集作宏逺畧春暖想可汗休泰將相以下竝存問之遣書指不多及與黠戞王書皇帝敬問黠戞王時及陽和想比佳適注吾合素等至省表并進馬事具悉國王隂山雄勁朔野英雄包智畧以周身推誠明而有衆聲髙夷落威重蕃疆專遣使臣逺獻名馬嚮化之誠既展輸忠之効頗明臨軒省章輟食嘉歎眷言忠藎寧忘寢興頃於貞觀中彼國常奉朝貢亦授官爵寵賜而還爾後但訝音耗乆乖不知中為回鶻所隔及覽來表方嘉壯圖蓄鋭多年乗機大舉快雪寃憤豁開心懐回鶻之營壘既平國家之山河不間既為隣境遂閲貢章又知破回鶻之時取得太和公主特遣專使送歸闕庭雖聞行至中途却為回鶻所奪在國王遵以禮義推之和寧逺同族之譏嫌厚親隣之恩信賢明如此愧慰難名回鶻頃以失國為詞款塞相託朕以勲親是念拯䘏屢加曽不知㤙漸開疑稔惡賤棄公主侵暴平人日尋干戈時竊牛馬朕為全舊好不下明誅嵗月滋深邊防將倦各用長策繼彰殊勲焚帳幕而公主歸還透網羅而元惡逃遁顧其餘類何所寄生國王逺聞想同深一作與同慰然猶恐奔竄尚有姦兇又慮侵彼封疆將復讐怨國王亦須嚴為備擬陵設機謀同務討除盡其根本無貽後患勉繼前修親仁善隣惟彼與此勿謂遐逺常一作嘗非存寤思因注吾合素回且先詔示其他禮命續專遣使宣慰想宜知悉紇扢斯書按唐書黠戞斯古堅昆國亦曰紇扢斯後訛為黠戞斯詳書中事意與前黠戞斯書及唐黠戞斯傳竝同今華既出黠戞斯門又有紇扢斯門當考與紇扢斯可汗書皇帝敬問紇扢斯可汗時屬載陽想彼休泰朕撫臨萬㝢子育群生思致洽和用臻至理將軍􅀈布合祖等至覽表具知可汗生戴斗之郷居寒露之野智謀精果材志沉雄威動龍荒聲馳象魏眷言丕績深注予集作用注懐我太宗文皇帝聖徳髙於百王英才軼於千古内定諸夏外服百蠻貞觀四年西北蕃君長詣闕頓顙願請上尊號為天可汗是後降璽書西北蕃君長皆稱皇帝天可汗臨統四夷實自茲始洎貞觀六年太宗遣使臣王義恒集作𢎞至可汗本國將命鎮撫貞觀二十二年可汗本國君長身自入朝太宗授左屯衛將軍昆堅都督至天寳末年朝貢不絶則可汗祖先已受我國家恩徳計可汗國中遺老必自流傳朕續奉丕圖思申舊好比聞天徳集作寳已後為回鶻所隔乆阻誠欵集作懇回鶻自謂天驕罔修仁義肆行殘忍凌虐諸蕃知可汗代為仇讐果能報復滅其國邑皆以丘墟驅彼酋渠盡逾沙漠茂功壯節近代無儔回鶻當中國伐叛之時嘗展勲力列聖加其大順累降姻親今失國逃亡依集作審于塞上只合早歸窮款受朕撫循而乃轉自鴟張益懐狼顧在隂山之外誘惑小蕃乗我無虞即來侵掠恣為邊患今已四年朕大徴甲兵欲盡集作乆欲除剪比令幽州太原兩道節度皆充招撫以示綏懐望其悛心猶務含育而陵蔑公主頓擬傷殘馳突邊城敢謀竊盗近太原節度使劉沔不勝其忿潛出偏師乗其譸張便襲虜衆大濆穹廬盡焚亢惡傷夷集作殘脱身潛竄已取得太和公主即至闕庭回鶻殘兵不滿千人㪚投山谷計旬日之内必合梟擒朕再見公主良深集作用欣慰可汗既為讐怨須盡殱夷儻留餘燼必生後患想逺聞慶快當倍惬集作愜素心聞可汗受氏之源與我同族北平太守材氣天下無雙結髪事邊控弦貫石自後子孫多習武畧代為將門嫡孫都尉提精卒五千深入大漠單于舉國來敵莫能抗威身雖䧟敗名震蠻貊集作天下我國家承北平大守之後可汗又是都尉苖裔以此合族尊卑可知昨聞太和公主為可汗兵衆所得可汗以同姓之國便遣歸還有此見可汗秉禮義之心重親隣之好朕深用感歎至于涕集作泣零公主尋為回鶻刼奪乆不歸國可汗所遣使臣皆被殘戮朕言念傷痛至今不忘昨見可汗表求訪送公主使上天入地必須覔得今邊將憤惋已立竒功回鶻罪人計日可致即當顯戮以謝可汗况回鶻夷滅種族必盡與可汗便為隣國各保舊疆繼好息人事同一體從此邊陲罷警弓矢載櫜必當諸部服從皆懐徤羡知我兩國永為宗盟想可汗明智自有良筭故令太僕卿兼御史丞相趙蕃特充節使以答深誠質於神明用存大信朕言不貳可不勉歟又自古外蕃皆須中國冊命然可彈壓一方今欲冊命可汗特加美號縁未知可汗之意且遣諭懐待趙蕃回日别命使展禮以申和好彼國集作間將相竝存問之遣書指不多及南詔勅西南蠻大首領蒙歸義書張九齡勅西南蠻大師特進蒙歸義及諸酋首領等卿等近在邊境不比諸蕃率種歸誠累代如此况卿等更効忠赤朕甚嘉集作知之頃者諸酋之中或有携貳相率自討惡黨悉除即日蕃中應且安帖然則地臨外境亦須有豫人無逺慮必有近憂卿可思之豈虚語也所有蕃中事意使者具知之比秋凉卿及首領百姓竝平安好遣書指不多及勅柘静州首領書勅柘静等州部落昨王承訓去縁當州百姓有相扇動故令宣旨告示彼人如卿柘静等州種落各異本自寧帖何復為言比者􅀈訪使處置或未得所朕既知之已有處分卿等祖父忠赤輸誠國家既是子孫乆襲冠帶各守先業足得坦然何所憂虞而云驚懼宜各遞相告語勿使更然夏中已熱首領百姓等竝平安好遣書指不多及勅西南蠻大首領蒙歸義書勅蒙歸義吐蕃於蠻擬行報復又雋州鹽井本屬國家中間被其内侵近日始復疑収得卿彼蕃落亦應具知吐蕃唯利是貪數論鹽井比有信使頻以為辭今知其將兵擬侵蠻落兼取鹽井事似不虚國家與之通和未嘗有惡今既如此不可不防卿即與達奚守珪部落勤集作團練候其有動然可出兵必無事蹤亦不得先舉又嶲州相去道里稍遥若有警急復須為援竝委卿與達奚守珪計㑹無失事宜卿於國輸集作盡誠在邊為捍委寄得所朕復何憂秋中漸凉卿及首領部落百姓竝平安好故令内給事中王承訓往一一口具遣書指不多及勅蠻首領鐸羅望書勅故姚州管内大酋長郍傍時嫡孫將軍鐸羅望卿之先祖輸忠奉國遽聞徂逝深愴于懐言念邊人必藉綏撫又逼蕃界兼資鎮遏卿宜纘承先業以副朕心故遣宿衛首領王白于姚州都督達其守珪計㑹就彼吊慰便授卿襲浪穹州刺史并賜綾綵三百疋至宜領取秋中已凉卿及首領已下並平安好遣書指不多及勅安南首領巋州刺史㸑仁悊書前人勅安南首領巋州刺史㸑仁悊潘州刺史潘明威僚子首領阿辿和蠻大鬼主孟谷悞姚州首領左威衛將軍㸑彦徵將軍昆州刺史㸑嗣紹黎州刺史㸑曽戎州首領右監門大將軍南寧州刺史㸑歸南王寧州司馬威州刺史都太鬼主㸑崇道昇麻縣令孟聘集作躭卿等雖在僻逺各有部落俱屬國家竝識王化比者時有背叛似是生梗及其審察亦有亊由或都府不平處置有失或朋讐相嫌經營損害既無控告自不安寧兵戈相防亦不足深怪也然則既漸風化亦當變俗二字集作頗革蠻俗有須陳請何不奏聞蕃中事宜可具言也今故遣掖庭令安道訓往彼宣問竝令口具有不穏便可一一奏聞秋中已凉卿及百姓已下竝平安好遣書指不多及與南詔清平官書白居易勅南詔清平官叚諾突李附覽㸑何棟伊輔首叚谷普李异傍鄭蠻利等叚史倚一作傍至知異牟尋䘮逝朕以義重君臣情深軫悼卿等哀慕所切當何可任又知閣勸繼業撫人輸誠奉教黎蒸咸乂封部獲安皆是卿等同竭忠謀佐成休績永言及此喜集作嘉慰良深勉於集作終令圖以副遐矚今遣諫議大夫兼御史中丞叚平仲持節冊命閣勸想當悉之卿等各有少信物具如别録至宜領也春寒卿等各得平安好遣書指不多及同前封敖勅段琮傍段酋琮獨㨂楊遷趙文竒蒙善政李守約等各藴器能夙懐忠義宣功爾室贊理本邦禮樂具修車書必㑹勵輸忠之節操披嚮化之誠明亟􅍱道途逺遵職貢威儀就列同慶於三朝筐篚充庭有勤於萬里道光殊俗禮慕華風克成君長之賢深見佐臣之美勞忠可尚鑒寐寧忘勉守令圖用慰遐矚得前嶲州録事㕘軍陳元舉男播狀稱父及弟末等二十七人自太和三年没落在彼未蒙追索詳其語旨切在感傷朕思骨肉之情人倫所極家郷一異音耗兩亡生死莫知幽明同怨為人君長深用軫憂今與豐祐書中具言其事卿等職當毗贊義重君臣執之何補於良圖歸之尤重於交好想同㕘議用解幽寃今賜卿少信物具如前數文苑英華巻四百七十
