body:
  text: 文苑英華卷六百八十一宋李昉等編文章下答進士梁載言書一首與元九書一首與劉蘇州書一首答莊充書一首謝西川白相寄賜新詩書一首與崔學士書一首與李生論詩書一首答進士梁集本文粹並作王載言書李翺翺頓首足下不以翺卑賤無所可及集本文粹並作乃陳詞屈慮我先以書且曰余之藝及心不能棄于集作于時將求知者問誰可則文粹作則可皆告曰其李君乎告足下者過也足下因而信之又過也果若來陳雖道德備具文粹作道備德具且猶不足辱厚命况如翺者多病少學其能以此堪足下所望博大而深宏者耶雖然意盛文粹作盛意不可以不答故敢略陳其所聞蓋行已莫如恭自責莫如厚接衆莫如𢎞用心莫如直進德集作道莫如勇受益莫如擇友好學莫如改過此聞之於師者也相人之術有三迫之以利而審其邪正設之以事而察其厚薄問之以謀而觀其智與不材集作才賢不肖分矣此聞之于集作於友者也列天地立君臣親父子别夫婦眀長幼接集本文粹並作浹朋友六經之㫖也浩乎若河集本文粹並作江海髙乎若丘山赫乎若日月集本文粹並作火包乎若天地掇章稱詠津潤怪麗六經之詞也創意造言皆不相師故其讀春秋也如未嘗有詩集作也字其讀詩也如未嘗有易集作有字其讀昜也如未嘗有書集作也字其讀屈原莊周也如未嘗有六經集作也字故義深則意逺意逺則理辨理辨則氣厚集作直氣厚集作直則詞盛詞盛則文工如山有恆華嵩衡焉其同者高也其草木之榮不必均也如瀆有濟淮河江焉其同者出源到海也其曲直淺深文粹有其字色黃白不必均也如百品之雜焉其同者集作也非飽於腹文粹作腸也其味醎酸苦辛不必均也此因學而知者也此創意之大歸也天下之語文章有六說焉其上文粹作高異者則曰文章辭句竒險而已其好理者則曰文章叙意茍通而已其溺于集作於時者則曰文章必當對其病于是者則曰文章不當對其愛難者則曰文章宜深不當易其愛易者則曰文章宜通不當難此皆情有所偏蜀本作偏也滯而不流不集作未識文章之所生集作主也義不必深不主蜀本作求至於理言不必信不在於教勸文粹作義不主於言理不在於教勸而詞句怪麗者有之矣劇秦美新王褒僮約是也其理往往有是者而辭章不能工集作者字有之矣劉氏人物志王氏中說俗傳太公家教是也古之人能極於工而已不知其辭之對與否易與難也詩曰憂心悄悄愠于羣小此非對也又曰遘閔既多受侮不少此非不對也書曰朕堲文粹作疲非讒說殄行震驚朕師詩曰苑彼桑柔其下侯旬捋采其劉瘼此下民此非易也書曰允恭克讓光被四表格于上下詩曰十畝之間兮桑者集作柘閒閒兮行與子旋兮此非難也學者不知其方而稱說之如前所陳者非吾之所敢聞也六經之後百家之言興老𣆀列禦冦莊周田穰苴孫武屈原宋玉孟軻吳起商鞅墨翟集作鬼谷子三子荀况韓非李斯賈誼枚乘司馬遷相如劉向揚雄皆足以自成一家之文學者之所歸也故義雖深理雖當詞不工者不成為文且集有於字不能傳也文理義三者兼并乃能獨立乎集有於字一時而不泯滅於後代能必傳也仲尼曰言之無文行而集作之不逺子貢曰文猶質也質猶文也虎豹之鞟猶犬羊之鞟此之謂也陸機曰怵他人之我先韓退之曰唯陳言之務去假令述笑哂之狀曰莞爾則論語言之矣曰啞啞則易言之矣曰粲然則穀梁子言之矣曰攸爾則班固言之矣曰囅然則左思言之矣吾復言之與前文何以異也此造言之大歸也吾所以不協于時而學古文者恱古人之行也恱古人之行者愛古人之道也故學其言不可以不行其行行其行不可以不重其道重其道不可以不知集作循其禮古人之集作之人相接有等輕重有儀蜀本作差列於經傳皆可詳引文粹作别如師之於門人則名之於朋友則字而不名稱之於師雖朋友亦名之子曰吾與回言又曰參乎吾道一以貫之又曰若由也不得其死然是師之名門人驗也夫子於鄭兄事子産於齊兄事晏集有嬰字平仲傳曰子謂子産有君子之道四焉又曰晏平仲善與人交子夏曰言游過矣子張曰子夏云何曾子曰堂堂乎張也是朋友字而不名驗也子貢曰賜也何敢望回又曰師與商也孰賢子游曰有淡臺滅明者行不由徑是稱於師雖朋友亦名驗也孟子曰天下之達尊三曰德爵齒惡得有其一而慢其二足下之書曰韋君詞楊君潜足下之德與二君未知先文粹作前後也而足下齒幼而位卑而皆名之傳曰吾見其與先生並行也竊懼足下不思乃陷于此韋踐之與翺書亟叙足下之善故敢盡詞以復足下之厚意計必不以為犯李翺頓首與元九書白居易某月日居昜白微之足下自足下謫江陵至于今凡枉贈答詩近集作僅百篇每詩來或辱序或辱書冠于卷首皆所以陳古今歌詩之義且自序為文因緣與年月之逺近也僕既愛足下詩又諭足下此意常欲承答來㫖粗論歌詩大端并自述為文之意總為一書致足下前纍嵗已來牽故少暇間有一作苦容隙或欲為之又自思所陳亦無出足下之見臨紙復一本作自字罷者數四卒不能成就其志以至于今今俟罪潯陽除盥櫛食寢外無餘事因覽足下去通州日所留新舊文二十六軸開卷得意忽如靣㑹一作㑹靣心所蓄者便欲快言往往自疑不知相去萬里也既而憤悱之氣思有所泄遂追就前志勉為此書足下幸試留志為僕集作試為僕留意一省夫文尚矣三才各有文天之文三光首之地之文五材首之人之文六經首之就六經言詩又首之何者聖人感人心而天下和平感人心者莫先乎情莫始乎言莫切乎聲莫深乎義詩者根情苖言華聲實義上自賢聖下至愚騃微及豚魚幽及鬼神羣飛集作分而氣同形異而情一未有聲入而不應情交而不感者聖人知其然因其言經之以六義緣其聲緯之以五音音有韻義有類韻協則言順言順則聲入類舉則情見情見則感易交於是乎孕大含深貫微洞察上下通而一氣泰憂樂合而百志熙二集作五帝三王所以直道而行垂拱而理者揭此以為大柄决此以為大寶也故聞元首明股肱良之歌則知虞道昌矣聞五子洛汭之歌則知夏政荒矣言者無罪聞者作戒言者聞者莫不兩盡其心焉洎周衰秦興採詩官廢上不以詩補察時政下不以歌泄導人情乃志於諂成之風動救失之道缺于時六義始刓矣國風變為騷詞五言始於蘇李蘇李騷人皆不遇者各繫其志發而為文故河梁之句止於傷别澤畔之吟歸于怨思倣徨抑鬱不暇及他耳然去詩未逺梗槩尚存故興離别則引雙鳬一鴈為喻諷君子小人則引香草惡鳥為比雖義類不具猶得風人之什二三焉于時六藝始缺矣晋宋已還得者蓋寡以康樂之奧博多溺於山水以淵明之高古偏放於田園江鮑之流又狹於此如梁鴻五噫之例者百無一二集有馬字于時六義寢微矣陵夷至於梁陳間率不過嘲風雪弄一作詠花草而已噫風雪花草之物三百篇中豈捨之乎顧所用何如耳設如北風其凉假風以刺威虐也雨雪霏霏因雪以愍征役也常棣之華感華以諷兄弟也采采芣苡美草以樂有子也皆興發於此而義歸於彼反是者可乎哉然則餘霞散成綺澄江净如練離花先委露别葉乍辭風風之什麗則麗矣吾不知其諷焉故僕所謂嘲風雪弄花草而已于時六義盡去矣唐興二百年其間詩人不可勝數所可舉者陳子昂有感遇詩三十首鮑防有感興詩十五首又詩之豪者集有世字稱李杜李之作才矣竒矣人不逮矣索其風雅比興十無一焉杜詩最多可傳者千餘首至於貫穿古今覼縷格律盡工盡善又過於李然撮其新安石濠潼關吏蘆子關花門之章朱門酒肉臭路有凍死骨之句亦不過十三四杜尚如此况不逮杜者乎僕常痛詩道崩壞忽忽憤發或食輟哺夜輟寢不量才力欲扶之嗟乎事有大謬者又不可一二而言然亦不能不粗陳於左右僕始生六七月時乳母抱弄於書屏下有指無字之字示僕者僕雖口未能言心已默識後有問此二字者雖百十其試而指之不差則僕宿習之緣已在文字中矣及五六嵗便學為詩九載暗識聲韻十五六始知有進士苦節讀書二十以來晝課賦夜課書間又課詩不遑寢夜集作息矣以至于口舌成瘡手肘成胝既壯而膚革不豐盈未老而齒髮早衰白瞀瞀然如飛蠅垂珠在眸子中也動以萬數蓋以苦學力文所致又自悲矣家貧多故二十七方從鄉試既第之後雖専於科試亦不廢詩及為集作授校書郎時已盈三四百首或出示交友如足下輩見皆謂之工其實未窺作者之域耳自登朝來年齒漸長閲事漸多每與人言多諭集作詢時務每讀書史多求理道始知文章合為時而著歌詩合為事而作是時皇帝初即位宰府有正人屢降璽書訪人急病僕當此日擢在翰林身是諌官月請諫紙啓奏之外有可以救濟人病禆補時闕而難於指言者輒詠歌之欲稍稍遞進聞於上上以廣宸聰副憂勤次以酬恩奬塞言責下以復吾平生之志豈圖志未就而悔已生言未聞而謗已成矣又請為左右終言之凡聞僕賀雨詩而衆言籍籍已謂非宜矣聞僕哭孔戡詩衆靣脉脉盡不恱矣聞秦中吟則權豪貴近者相目而變色矣聞登樂遊園寄足下詩則執政柄者扼腕矣聞宿紫閣村詩則握軍要者切齒矣大率如此不可偏舉不相與者號為沽名號為詆訐號為訕謗茍相與者則如牛僧孺之戒焉乃至骨肉妻奴皆以我為非也其不我非者舉世不過三兩人有鄧魴者見僕詩而喜無何而魴死有唐衢者見僕詩而泣未幾而衢死其餘則足下足下又十年來一無此字困躓若此嗚呼豈六義四始之風天將破壞不可支持耶抑又不知天之意不欲使下人之病苦聞於上耶不然何有志於詩者不利若此之甚也然僕又自思關東一男子耳除讀書屬文之外其他懵然無知乃至書畫碁博可以接羣居之歡者一無通曉即其愚拙可知矣初應進士時中朝無緦麻之親達官無半靣之舊䇿蹇步於利足之途張空拳於戰文之場十年之間三登科第名入衆耳足集作跡升清貫出交賢俊入侍冕旒始得名於文章終得罪於文章亦其宜也日者又聞親友間說禮部舉選人多以僕私試賦判傳為凖的其餘詩句亦往往在人口中僕恧然自愧不知信也及再來長安又聞有軍使高霞寓者欲聘倡妓妓大誇曰我誦得白學士長恨歌豈同他妓哉由是增價又足下書云到通州日見江館柱間有題僕詩者復何人哉又昨過漢南日適遇主人集衆娛樂他賔諸妓見僕來指而相顧曰此是秦中吟長恨歌主耳自長安抵江西三四千里凡鄉校佛寺逆旅行舟之中往往有題僕詩者士庶僧徒孀婦處女之口每每有人詠僕詩者此誠雕篆集作蟲之戲不足為多然今時俗所重正在此耳雖前賢如淵雲者前輩如李杜者亦未能忘情於其間哉古人云名者公器不可以多取僕是何者竊時之名已多既竊時名又欲竊時之富貴使已為造物者肯兼與之乎今之迍窮理固然也况詩人多蹇如陳子昂杜甫各授一拾遺而迍剝至死李白孟浩然輩不及一命窮悴終身近日孟郊六十終試協律張籍五十未離一太祝彼何人哉彼何人哉况僕之才又不逮彼今雖謫佐逺郡而官品至第五月俸四五萬寒有衣饑有食給身之外施及家人亦可謂不負白氏之子矣微之微之勿念我哉僕數月來檢討囊篋中得新舊詩各以類分分為卷目自拾遺來凡所適所感關於美刺興比者又自武德訖元和因事立題題為新樂府者共一百五十首謂之諷詩又或退公獨處或移病間居知足保和吟玩情性者一百首謂之間適詩又有事務牽於外情性動於內隨感而形於歎詠者一百首謂之感傷詩又有五言七言長句短句自二韻至百韻者集作自一百韻至兩韻者四百餘首謂之雜律詩凡一集作為十五卷約八百首異時相見當盡致於執事微之古人云窮則獨善其身達則兼濟天下僕雖不肖當師此語大丈夫所守者道所待者時時之來也為雲龍為風鵬勃然突然陳其力以出時之不來也為霧豹為冥鴻寂兮寥兮奉身而退進退出處何往而不自得哉故僕志在兼濟行在獨善奉而終始之則為道言而發明之則為詩謂之諷諭詩兼濟之志也謂之間適詩獨善之意也故覽僕詩者知僕之道焉其餘雜律詩或誘於一時一物發於一笑一吟率然成章非平生所尚但以親朋合散之際取其釋恨佐歡今詮次之間未能刪去他時有為我編集斯文者略之可也微之夫貴耳賤目榮古陋今人之大情也僕不能逺徵古舊如近嵗韋蘇州歌行才麗之外頗近興諷其五言詩又高雅間淡自成一家之體今之秉筆者誰能及之然當蘇州在時人亦未甚愛重必待身後然後貴之今僕之詩人所愛者悉不過雜律詩與長恨歌已下耳時之所重僕之所輕至於諷諭者意激而言質間適者思淡而詞迂以質合迂宜人之不愛也今所愛者並世而生獨足下耳然千百年後安知復無足下者出而知愛我詩哉故自八九年來與足下小通則以詩相戒小窮則以詩相勉索居則以詩相慰同處則以詩相娛知吾罪吾集作最要率以詩也如今年春遊城南時與足下馬上相戲因各誦新豔小律不雜他篇自皇子陂歸昭國里迭吟遞唱不絶聲者二十里餘樊李在傍無所措口知我者以為詩仙不知我者以為詩魔何則勞心靈役聲氣連朝接夕不自知其苦非魔而何偶同人當美景或花時宴罷或月夜酒酣一咏一吟不知老之將至雖驂鸞鶴遊蓬瀛者之適無以加於此焉又非仙而何微之微之此吾所以與足下外形骸脫蹤跡傲軒鼎輕人寰者又以此也當此之時足下興有餘力且與僕悉索還往中詩取其尤長者如張十八古樂府李二十新歌行盧楊二祕書律詩竇七元八絶句博搜精掇編而次之號曰元白往還詩集衆君子得擬議於此者莫不踊躍欣喜以為盛事嗟乎言未終而足下左轉不數月僕又繼行心期索然何日成就又可為之嘆息矣又僕常語足下凡人為文私於自是不忍於割截或失於繁多其間妍􅑦益又自惑必待交友有公鍳無姑息者討論而削奪之然後繁簡當否得其中矣况僕與足下為文尤患其多已尚病之况他人乎今且各纂詩筆粗為卷第待與足下相見日各出所有終前志焉又不知相遇是何年相見在何地溘然而倒集作至則如之何微之微之知我心哉潯陽臘月江風苦寒終嵗集作嵗暮鮮歡夜長無睡引筆鋪紙悄然燈前有念則書言無次第勿以繁雜為倦且以代一夕之話也微之微之知我哉樂天再拜與劉蘇州書李翺夢得閣下前者枉手札數幅兼惠答憶春草報白君巳下五六章發亟披文而後喜可知也又覆視書中有攘臂痛拳之戲笑與抃㑹甚樂甚樂誰復知之因有所云續前言之戲耳試為晋聽僕與閣下在長安時合所著詩數百篇集作首題為劉白唱和集卷上下事具集解中去年冬夢得由禮部郎中集賢學士遷州刺史氷雪寒路自秦徂吳僕方守三川得為東道主閣下為僕稅駕十五日朝觴夕詠頗極平生之歡各賦數篇視草而别歲月易得行復周星一往一來忽又滿集作盈篋誠知醜老集作老醜冗長為少年者所嗤然吳苑洛城相去二三千里捨此何以啓齒而解頥哉嗟乎微之先我去矣詩敵之勍者非夢得而誰前後相償集作答彼此非一彼雖無虛可擊此亦非利不行但止交綏未嘗失律然得雋之句警䇿之篇多因彼此唱集作唱此和中得之他人未嘗能發也所以輒自愛重今復編而次焉以附前集合成三卷題此卷為下遷前下為中命曰劉白吳洛寄和卷自太和六年冬送夢得之任之作始居易頓首答莊充書杜牧某白莊先輩足下凡為文以意為主以氣為輔以辭彩章句為之兵衛未有主疆盛而輔不飄逸者兵衛不華赫而莊整者四者髙下圓折步驟隨主所指如鳥隨鳳魚隨龍師衆隨湯武騰天潛泉橫裂天下無不如意茍意不先立止以文彩辭句繞集作統前捧後是言文粹作詞愈多而理愈亂如入闤闠紛然莫知其誰暮散而巳是以意全勝者辭愈朴而文愈髙意不勝者辭愈華而文愈鄙是意能遣詞詞不能成意大抵為文之㫖如此觀足下所為文百餘篇實先意氣而後辭句慕古而尚仁義者茍為之文粹作文非不巳資以學問則古作者不為難到今以某無可取欲命以為序承當厚意惕息不安復觀自古序其文者皆後世宗師其人而為之詩書春秋左氏已降百家之說皆是也古者其身不遇於世寄志於言求言遇於後世也自兩漢以集作己來富貴者千百自今觀之聲勢光明孰若馬遷相如賈誼劉向揚雄之徒斯人也豈求知於當世哉故親見揚子雲著書欲取覆醬瓿雄當其時亦未嘗自有誇目况今與足下並生今世欲序足下未巳之文此固不可也茍有志古人不難到勉之而巳某再拜謝西川白相寄賜新詩書薛逢某啓伏䝉仁恩猥垂下顧兼賜新詩二十首向風長跪齊思探𤣥如畏途咀冰若旱苖䝉澤瑩心冷骨潤葉滋莖曠無津涯杳邈集作失顧視秋日懸而氛昏息雅音作而聾聵醒輒欲再頥幽𤣥重開户牖旁窺涉級漸冀升堂徒循夫子之牆未夢江生之筆今則緘之瑞錦貯以盤囊不獨榮耀於子孫實亦發揚於流輩生死幸甚伏計即離征鎮當赴闕庭鼓萬有而罏冶重開序羣倫而權衡再設使鄭衛不作咸韶更張吹噓而寒谷春生霑灑而枯荄萌動天下甚幸某此時或希匠化獲序宗彛願承舟楫之功得出風波之路嗟嘆不足繼之詠歌謹録長句七言詩一首獻上塵黷尊嚴惶恐無狀與崔學士書賢弟過岐山賦謁讓帝陵二篇自三兩復莫究津涯煥乎與日月齊明洶乎與江海爭大苞若天地速如鬼神迎之不見其前隨之莫覩其後波瀾之外懲勸在焉崛立當今峭若嵩華是以謂之文矣歎之不足繼之詠歌霜霧興懷未即拜賜謹先奉狀代申誠欵不宣謹狀與李生論詩書司空圖文之難而詩之難尤難而古今之喻多矣而愚以為辨於味而後可以言詩也江嶺之南凡足資於適口者若醯非不酸也止於酸而已為文粹作若鹺非不醎也止於醎而已華之人文粹有所字以充饑而遽輟者知其醎酸之外醇美文粹有者字有所乏耳彼江嶺之人一作外習之而不辨也宜哉詩貫六義則諷諭抑楊渟蓄淵雅皆在其中矣然而直署集本文粹並作致所得以格自竒前輩編文粹作諸集亦不專工於此矧其下者耶王右丞韋蘇州澄淡精緻格在其中豈妨於道學哉賈閬仙誠有警句然視其全篇意思殊餒大抵附於蹇文粹作寒澀方可致文粹作置才亦為體之不備也矧其下者哉噫近而不浮逺而不盡然後可以言韻外之致耳愚竊集作幼嘗自負既久而愈集作逾覺缺然然得於早春則有草嫩侵沙短文粹作長氷輕著雨銷又人家寒食月花影午時天上句云隔谷見雞犬山苖接楚田又雨微吟足思花落夢無憀英華無自人家以下四字又夜短猿悲减風和鵲喜靈此二句集本文粹並在方響夜深船之下得於山中則有坡暖冬生笋松凉夏健人又川明虹照雨樹密鳥衝人得於江南則有日帶潮聲晚煙和楚色秋集本文粹並作戍鼓和潮暗船燈照島幽又曲塘春盡雨方響夜深船得於塞下則有馬色經寒慘鵰聲帶晚饑得於喪亂則有驊騮思故第鸚鵡失佳人又鯨鯢入海涸魑魅棘林高得於道宫則有碁聲華集作花院閉幡影石壇集作幢幽得於夏景則有地凉清鶴夢林靜肅僧儀得於佛寺則有松日明金像苔龕響木魚又解吟僧亦俗愛舞鶴終卑得於郊園則有暖景雞聲美微風蝶影繁一作還集本文粹並無此二句又逺陂春早滲猶有水禽飛上句云緑樹連村暗黃花入麥稀得於樂府則有晚粧留拜月春睡更生香得於寂寥則有孤螢入空巢集本文粹並作出荒池落葉穿破屋得於愜適則有客來當意愜花發遇歌成雖庶幾不濵於淺涸亦未廢作者之譏訶也又文粹無又字七言云逃難人多分隙地放生鹿大出寒林又得劒更勝集作乍添健僕亡書渾集作一似憶良朋又孤嶼池痕春漲滿小欄花韻午晴初又五更惆悵回孤枕猶自殘燈照落花上句云故國春歸未有涯小欄高檻别人家又殷勤元日日欹午又明年上句云甲子今重數生涯只自憐自五更至此英華無亦集作皆不拘於一槩也且集作蓋絶句之作本於詣極俾終古不能扣我耳八字集作此外千變萬狀不知所以神而自神也豈容昜哉足下之詩時輩固有難色儻復以全美為上文粹作工即知味外之㫖矣勉哉文粹作旃司空表聖再拜文苑英華卷六百八十一
