body:
  text: 文苑英華巻十八宋李昉等編天象十八齊七政賦一首渾天賦一首新渾儀賦二首大演虚其一賦一首齊七政賦以明主法天用齊七政為韻周渭天之垂象兮無臭無聲君之立徳兮赫赫明明将同符而合矩在璿璣與玉衡故運彼四時寒燠隨其建指齊其七政有道感於無情故使黎民於變萬物由庚神不祕其福地不愛其禎原其天斯覆兮地斯載播羣芳而作主日陽徳兮月隂靈俾五星而為輔諒無私於照燭或任晦於煙雨國風可仰守官方賛於羲和人力不侔杖䇿已疲於夸父夫能文者政乃不乏示寰瀛之大法運天者道在於乾占日月之初躔既推厯以生律亦鈎深而索𤣥徒觀其如璧之合如珠之聮甲子不迷符太初之朔旦精義以享同肆類於昊天七政匪差萬邦攸共採石氏之經聽疇人之頌逺而望也粲粲映非雲之雲黙而識之昭昭為非用之用嵗在木而循度鎮居中而不携熒惑無犯於奮若太白莫陵於攝提将不盈而不縮豈乍髙而乍低故我后所以引唐堯而作式指虞舜而思齊動於天兮徳有一麗於天兮曜有七四海以之升平千箱以之充實豈比見暈珥適背之狀語恠變雲氣之質前漢天文志暈適背穴抱珥虹霓迅雷風妖恠雲變氣非訓俗以齊人徒廢時而亂日客有從筆硯而未逹懐忠信而待命望蒔蓂於朝階知如春之聖政竊昧談天之辯庶俾觀象之詠渾天賦并序楊烱顯慶五年烱時年十一待制𢎞文舘上元二年始以應制舉補校書郎朝夕靈䑓之下備見銅渾之儀一作象尋反初服卧疾丘園二十年而一徙官斯亦拙之效也代之言天體者未知渾葢孰是代之言天命者以為禍福由人故作渾天賦以辯一有文字其辭云客有為宣夜之學喟然而言曰旁望萬里之横一作黄山而皆青一有翠字俯察千仭之深谷而一有皆字黝黒蒼蒼在上非其正色逺而望之無所至極日月載於元氣所以或中一有而字或昃星辰浮於大空所以有行一有而字有息故知天常安而不動地極深而不測可以作一作為觀象之凖繩可以作譚天之楷式有稱周髀之術者辴一作囅然而笑曰陽動而隂静天廻而地游天如倚葢地若浮舟出於卯入於酉而生晝夜交於奎合於角而有春秋天則西北既傾而三光北轉地則東南不足而萬穴通一作東流比於圓首前臨胷者後不能覆背方於執炬南稱明者北可以言幽此天與而不取焉一作惡遑遑而更求太史公有睟其容乃盱衡而告曰楚既失之齊亦未為得也言宣夜者星辰不可以闊狹有常句言葢天者刻漏一作漏刻不可以春秋各半句周三徑一逺近乖於辰極東井南箕曲直殊於河漢明入於地葛稚川所以有詞日一作俟非應於天桓君山由其發難假蘇秦之不死莫能為二字一作既莫知其説儻𨽻首之重出一作生亦不能成其筭一有也字二客甞亦知二字一作聞渾天之事歟請為左右揚㩁而陳之原夫杳杳冥冥天地之精混混沌沌隂陽之本何太虚之無礙俾一作偉造化之多端南溟玉室之宫爰皇是宅西極金䑓之鎮上帝攸安地則方如棊局天則圓似一作如彈丸天之運也一北而物生一南而物死地之平也影短而多暑景長而多寒太隂當日之衝也成其薄蝕衆星傅月之光也因其波瀾乾坤闔闢天地成矣動静有常隂陽行矣方以類聚物以羣分吉凶生矣在天成象在地成文一作形變化形一作見矣部之以三門張之以八紀其周天也三百六十五度其去地也九萬一千餘里日居而月諸天行而地止載之以氣浮一作乗之以水生之育之長之畜之亭之毒之葢之覆之天聰明也聖人得之天垂象也聖人則之其道也不言而信其神也不怒而威驗之以衡軸考之以樞機三十五官一作宫有羣生之繫命一十二次當下土之封畿中衡外衡毎不召而自至黄道赤道亦殊途而同歸表裏見伏聖人於是乎發揮分至啟閉聖人於是乎範圍可以窮理而盡性可以極深而研幾天有北斗杓携龍角魁枕參首天有北辰衆星環拱天帝威神尊之以耀魄配之以勾陳有四輔之上相有三公之近臣華葢巖巖俯臨於帝座離宫奕奕旁絶於天津列長垣之百堵啟閶闔之重闉文昌拜於大将天理囚於貴人見晉天文志泰階平而君以穆招摇指而天下春東宫則析木之津夀星之野箕為傲客房為駟馬天王對於攝提皇極臨於宦者左角右角兩曜之所廵行隂間陽間五星之所取一作次舍後宫掌於蕃一作燕息太子承於冡社宗人宗正内外敦叙於家邦市樓市垣貨殖畢陳於天下北宫則靈龜潜匿螣蛇伏藏匏𤓰宛然而獨處織女終朝而七襄登漸䑓而顧歩御輦道而徜徉聞雷霆一作電之隐隐聽枹鼓之硠硠南斗主爵祿東壁主文章湏女主布帛牽牛主闗梁羽林之軍所以除暴亂壘壁之陣所以備非常西宫則天潢一作漢咸池五車三柱奎為封豕參為白虎胃為天倉婁為衆聚旄頭之北宰制其邊陲天畢之隂蓄洩其雲雨大陵積尸之肅殺參旗九斿之部伍樵蘇之地出入於園苑萬億之資填積於倉庾南宫則黄龍賦象朱鳥成形五帝之坐三光之庭傷成於鉞誅成於質一作鑕福成於井徳成於衡執法者廷尉之曹一作列大夫之象少㣲者儲君之位處士之星天弧直而狼顧軍市曉而雞鳴三川之郊鶉火通其耀七澤之國翼軫寓其精南河一有北河二字象闕於是乎増峻左轄一有右轄二字邉荒於是乎自寧乃有金之散氣水之精液法清渭二字一作渭水之横橋像昆明一作池之刻石嵗時占其水旱滄溟應其潮汐織女之室漢家之史一作文可尋飲牛之津海畔一作上之人易覿日也者衆陽之長人君之尊天雞曉唱靈烏晝踆扶桑臨於大海若木照於崑崙太平太蒙所以司一有其字出入南至北至所以節一有其字寒温龍山銜燭不能議其光景夸父棄䇿無以方其駿奔月也者羣隂之紀上天之使異姓之王后妃之事方諸對而明水洽一作浹重暈匝而邉風駛裁一作纔盈蚌蛤則虜騎先侵適鬬麒麟則暗虎潜值五星者木為重華火為熒惑鎮居戊已斯為土徳太白主西辰星主北俯察人亊仰觀天則比參右肩之黄如奎大星之黒五才一作材以之一作所以致用七政於焉不忒同舍而有四方分天而利中國赤角犯我城黄角天之争五星同色天下偃兵趋前舍為嬴一作盈退後舍為縮嬴一作盈則侯王不寧縮則軍旅不復或向而或背或遲而或速金火犯之而甚憂嵗鎮居之而有福觀衆星之部署歴七曜之一作而驅馳定天下之文所以通其變見天下之賾所以象其宜然後播之以風雨成一作威之以霜霰或吐霧而蒸雲或擊雷而奔一作鞭電一旬而太平感膚寸而天下遍白日為之晝昏恒星為之不見爾乃重明合璧五緯連珠青氣夜朗黄雲晝一作旦扶握天鏡授河圖若曰賜之以福此明王聖帝之休符至如恠雲祓氣一作祅氛冬雷夏雪日暈長虹星芒伏鼈隂有餘而地動陽不足而天裂若曰懼之以災此昏主亂君之妖孽昔者顓頊之命重黎司天而司地陶唐之分叔仲宅西而宅東一有其字後宋有子韋鄭有裨竈魏有石氏齊有甘公唐都之推星王朔之候氣周文之視日呉範之占風有以見天地之情狀識隂陽之變通詩云謂天葢髙語曰惟天為大至髙而無上至大而無外四時行焉萬物生焉羣神莫尊於上帝法象莫大於皇天靈心不測神理難詮一作筌日何為兮右轉天何為兮左旋盤古何神兮立天地巨靈何神一作聖兮造山川螟何細兮師曠清耳而不聞離婁一作朱拭日而不一作無見鵬何壯兮摶扶摇而翔九萬運海水而擊三千龜與蛇而一作兮異其短長之質椿與菌兮殊其小大之年鐘何鳴而一作兮應霜氣劍何伏兮上一作動星躔列子何方一有兮字御風而有待師門何術一有兮字驗火而登仙魯陽麾戈兮轉於西日陶侃折翼兮登於一作乎上𤣥女何怨一作寃兮為一作化精衞帝何耻兮為杜䳌争疆理者有零陵之石聞弦一作絃歌者有葢山之泉若怪神之不語夫何述於此篇以天乙之武也焦土而爛石以唐堯之徳也㐮陵而懐山以顔回之仁一作賢也居在二字一作貧居於陋巷以宣尼之聖也情希於一作乎執鞭馮唐入於郎署也兩君而未識揚雄在於天祿也三代而不遷桓譚思周於圖牒一作圖䜟也忽然一作焉不樂張衡術逹一作窮於天地一有也字退而歸田我無為而人自化吾不知其所以然而然凢一作皆文粹新渾儀賦并序李光朝天垂象見吉凶聖人指象之法莫先於渾儀是以王者将下理於萬人先上齊於七政軒昊之後分重黎二官唐虞之日命羲和四子代掌其器以為人極聖作有程必應其變故有謂之周髀葢天謂之渾天宣夜用則假於器妙則存乎人曰若開元天寳聖神文武皇帝以為天有時時有變不可從舊更法而取新更之立革疑銅渾無毫釐之差得精一之義引而上則邁於古推而下則合於今非古之聰明神睿者孰能為之乎於是五緯連珠兩曜合璧神輸祥瑞天降嘉生黙而不談且慮樵夫之笑言而未逺且陳君子之心遣於鄙辭乃為賦曰國之神器名之渾儀法天之象知天之為雖考古以作則亦惟新而成規琢璿為衡範金為葢其狀則小其用則大南極北極正其端隅上規下矩正其外内繚繞黄道環廻紫宫斗居其北日起其東别度數於分寸之内㸃星象於毫釐之中處動而能静妙同乎造化之意寂無以為有用擬於隂陽之功有象必見惟幽是通乃知近能則逺合下正則上同因之以言寳厯遂乃授乎人時以通天下之志以斷天下之疑違之則失信之無欺聖也智也念茲在茲四時以之咸序萬物以之攸理弦望之候不愆寒暑之期可紀測天地之否泰知隂陽之終始述作固稱於帝王司存乃歸於太史猗此成器為國之寳通幽洞㣲賛我皇道第二李光朝夫象之大者曰天地理之廣者曰隂陽分八極懸三光不言而化有形而彰雖羲氏代掌初聞疑乎欽若而疇人離散覆亂其紀綱魏滅晉紹易齊為梁莫革其弊有失其方将以事極則反否泰何常故渾儀之制而新之我皇則天工恊謀鳬氏畢至煽洪鑪以效役鎔珍金以為器列管之應一十二律罔極為期周天之列二十八宿各分爾位然仰觀俯察以參以稽森羅乎象緯窮極乎端倪視朔於初時必書於雲物履端於始嵗如得乎攝提候月既殊於蓂草測景方異乎土圭侔漢厯之黍累不失同舜年之風雨不迷且如人之常性也重更改貴因循罔知失善是與謀新更苟有利何憚釐革循苟有失何必相因故天垂象聖人以審度厯乖次聖人以創陳亦将利物安下適時補政齊上方之斗極為來代之龜鏡其意既美於斯為盛恐貽誚於不談故形之乎賦詠大演虚其一賦以首先處虚用隨數為韻謝觀大演之數五十其用四十有九未諭一之本末徒訝數之竒偶於是稽所據推所受以不用為用端以非數為數首方知一不可見上不在天一不可尋下不在田是太極含三之本居混元不二之筌成出天入地之契乗屈伸合散之權作數之本為唱之先伏質於無體之體反形於自然而然則無者有之宗有者無之據一從虚而體立數慿一而神助舒而用萬象自虚無而來攝而終萬象復虚無而去安得不存我而立因我而著昧者以此一為無用之徒先聖以此一為庶幾之處是以捨此則數不足兼之則義有餘終萬物之末始萬物之初在窮理以考實勿存形而課虚亦猶一人無為兆人欣奉一氣無體羣生所共本立而道存主適而臣從若十二月之輪轉不宰者嵗之宗三十輻之運行無有者車之用今則以未分而象太極中分而象二儀未分而百事隐中分而百事隨然後四四而布七七而具可以眀淺深可以眀好惡總而舉也叶仲尼知命之籌考其成焉契伯玉識非之數儻眀得一之義庶逹傳心之路文苑英華巻十八
