body:
  text: 文苑英華卷八百九宋李昉等編館驛館驛使附滑州新驛記一首滑州新驛碑隂記一首宋州重修五驛記一首館驛使壁記一首樓上翰林學士院新樓記一首鳯翔鼓角樓記一首泗州重修鼓角樓記一首襄陽北樓記一首泉州北樓記一首館驛館驛使附滑州新驛記李勉滑臺舊驛天寶丙申嵗逆臣盜國師競而焚滑臺四衢通于四海夷貊奉聘諸侯覲王有疊騎擊轂填郛翳直之日也或寒沍凝血或炎赫鑠肌疲心躁憤駢立無寄剛寒者多氣奮盱衡溫願者猶神忿吐息雖逺馨醪膳腐積菽藁小吏夏執輕箑冬備重裘獻用無所曷補餒殆常惕惕祗懼終湑湑一作滑滑議繁亦有吟憤作誣口吻震發者幕客請余構驛傳以備政縣吏請余廣驛傳以息責遂命試光祿卿兼同州别駕裴萬以恪以幹俾主剞劂圬墁之工授其意曰無尚雕木之異無榮飾土之竒揆時勿奪詳費就簡惟疏楹棟將違暑也廣庭廡將逹風也取寧體之用去娛目之奢彤彩為文刻剸一作晉像物有益勞費豈利蔭庥况玩巧蕩神誇麗踰度乎及息役休工門成度費闕不墮余誠素不違乘軺之賔無或嗤余不效徐湛之風亭月觀之盛也大厯甲寅嵗八月二日記滑亭新驛碑隂記崔祐甫古之君子約已而裕人知和而勤禮接賔以願一作厚是務施於豐鄭公孫僑論晉文襄之霸也宫室卑庳無觀臺榭而崇大諸侯之館故來者如歸今我連帥尚書汧公為國垣翰于東土軍禮肅人謡興新其亭傳以待賔旅謀之有程設之有所力肆於悅巧悛於淫勿亟而成得其時制博敞髙明倬然其閈閎沉深奧密杳然其堂室論者謂華之普德虢之閿鄉自昔為之疑衍郵亭之甲今茲白馬可以抗衡汧公仁以愛衆儉以化下陋居室而恢賔館節豐華而廣廕庥稱時計功永代為憲方操八柄揉此萬邦于庇人其德弘大於是舉也見其端焉夫其去故就新之議屬徒揆日之制作而示後公實書之蓋聞傳春秋序風雅者丘明卜商之事也下吏敢亦庶幾宋州重修五驛記鄭就戊子嵗大彭戍卒有在南方者一旦衆譁于營刃殺主將不待朝廷命卷斾而歸既至所止即共樹小吏以張大凶天子震怒徴諸侯師以討之常時挾刃為盜匿蔽榛莽者咸來附離叶拒王師而睢陽最與賊近忽剽攘不徇志必縱火火爇傳置尺椽盡為餘燼時隴西公以重望鎮諸方徴師悉出其地供億大費不煩朝廷而又戒嚴疊門賊馬首不敢西向我季父貂蟬適守睢陽大軍頓其所資糧餽餉且靡闕一毫明年九月賊平我公念鴈池洎會亭五郵前為賊熾熖所滌况沿一作官河旁午豈可使厦屋不修乃劂材孱工未數月而畢其創匠輪奐為客館之甲君子以為非我隴西公大才不能當劇賊非我季父稱事不能新郵亭冝乎礱石刻文聲其美績就久奉隴西公命牢讓不免其敘事也質而直微而簡俾後之為政者識我季父之多能咸通庚寅年秋七一作八月記館驛使壁記栁宗元凡萬國之會四夷之來天下之道塗畢出於邦畿之內奉貢輸賦修職於王畿者入于近關則皆重足錯轂以聽有司之命徴令賜豫布政於下國者出於甸服而後按行成列以就諸侯之館故館驛之制於千里之內尤重自萬年至於渭南其驛六其蔽曰華州其關曰潼關自華而北界于櫟陽其驛六其蔽曰同州其關曰蒲津自灞而南至于藍田其驛六其蔽曰商州其關曰武關自長安至於盩厔其驛十有一其蔽曰洋州其關曰華陽自武功而西至于好畤其驛三其蔽曰鳯翔府其關曰隴關自渭而北至于華原其驛九其蔽曰坊州自咸陽而西至于奉天其驛六其蔽曰邠州由海之內總而合之以至于關由關之內束而會之以至於王都華人夷人往復而授館者旁午而至傳吏奉符而閲其數縣吏執牘而書其物告至告去之役不絶於道寓望迎勞之禮無曠於日而春秋朝陵之邑皆有傳館其飫餼饔饋集作飲飫餼饋咸出於豐給繕完築役集竹復必歸於整頓列其田租布其貨利權其入而用其息集作積於是有出納竒贏之羡集作數勾會考校之政大厯十四年始命御史為之使俾考其成以質于尚書季月之晦必合其簿書以視其等列而校其信宿必稱其制有不當者反之於官尸其事者有勞焉則復于天子而優升之勞大者增其官次者降其調之數又其次猶異其考績官有不職則以告而罪之故月受俸二萬于太府史五人承符者二人皆有食焉先是假廢官之印而用之貞元十九年南陽韓泰告于上始鑄使印而正其名然其嗣當斯職未嘗有記之者追而求之蓋數嵗而往則有集作失之矣今余為之記遂以韓氏為首且曰修其職故首之也樓上翰林學士院新樓記韋表微長慶二年春翰林院學士缺穆宗皇帝顧謂左右曰孰可充是任者皆曰恭恪可以奉密命通敏可以肆皇猷有若內謁者藍田季溫可上曰俞洎四年夏院使缺敬宗皇帝顧謂近臣曰孰可補是職者皆曰博覽以好古清白以奉公有若奚官局令衛元璨可上曰俞是以授金紫之賜承侍從之榮典司禁闈參掌詔令嘗因暇相與議曰夫宫室臺觀蓋有宜稱茍失其制人何法焉內署與集賢史館祕書省皆號圖書府而內署最為密近故學士之登將相踐崇顯者十有八九焉彼三署不可同年而語矣而庭宇逼仄屋室卑陋非聖朝待賢之意豈羣彥飬德之所于是梧桐高則可以栖靈鳯巖嶺秀則可以韞美玉是宜革作以新其居乃同詞上聞詔命惟允錫以材布作帛假其工徒心匠始形於事先物境潛運於度內乃撤小屋崇廣厦揭飛梁於層構聳危樓於上楹重簷翼舒虗牖霞駮甍棟豐麗欄檻周固三門並設雙閣對啓延清風於北户候朗月於南榮積其典墳藏於扄鑰因討閲之際資登眺之娛若乃前瞰雲山傍窺臺觀仰丹霄於咫尺納皓氣於襟抱八表殊望四時異境觸類生趣隨方散懷其下廊廡對序階陛四匝中創小亭以候宴語卉木駢植松竹交隂拆一作林高標於棼橑散餘芳於户廷信可久之宏規不泯之盛迹也經構之始侍講崔學士出拜小宗伯樓成之月學士韋公秉國鈞旬日侍講高學士拜夕郎明年正月學士路君遷小司馬為承旨表微洎王宋二舍人皆遷秩加職院使復以成績並命遷內常侍夏四月中書鄭舍人駕部郎中皆以鴻文碩學為侍講學士有詔賜宴始觴於斯中外之知者朝昏皆賀豈興作之會契於隂陽之運乎而土木之動應於福慶之數乎表微學愧鏤氷文慙畫虎秉筆視草于茲六年備歷規度之謨詳觀一作都新舊之制承命為記實慙菲詞時太和元年某月日記鳯翔鼓角樓記韋慶復十月成樓記時也自聖人觀象立制則重門擊柝以待暴客故天下都邑大崇建之凡千乘之君其外者郛其內者城郛之門所以苞納州聚城之門所以嚴護師長故諸侯國多以內城門於中軍為最近率皆樓於斯飾於斯建鼓角於斯先是此府無內城無重門廳事之階才隱內屏旌門之次迫於通道大將軍鼓角置於郛晏然而安積有嵗矣今我江夏公七月下車首乎其謀八月慮事鳩乎材九月恩洽得乎衆十月勞農興乎役然後下令葺簣相土命毁削舊宇坦平新途回還翼張絢潔氷靜既而版幹具畚築興山虞納材梓人凖繩雕琢切磨丁丁登登重楹疊户霞起雲蒸如翬斯升勢將騫騰如山斯層崔嵬凌競君子曰大哉斯樓之作上可以陳列鼙鼓下可以禁限中外近可以張皇斯衆逺可以戒勵大軍稽晷度不失於方中審山川乃得其靣勢衆心多樂成之助工徒有恱使之勸非大君子淵慮宏謀則茲樓何從而興也或者以為前之闕政公能補之愚則不然夫舉一事建一功不量其小大茍能迥拔人表獨得殊見則無非天假之才得之縱有賢方伯比肩於前欲責其人表之見無乃過歟然則斯樓曠之於前宜也成之於今亦宜也奚所謂稱補其闕哉樓成二日我公與護軍中貴人洎賔僚偕登而閲之慶復仰而歎曰公之政教見於斯樓盡矣且棟之梁之小大攸宜材不缺也壁壘完堅圬塗縝密人不偷也繩墨修整苦窊不用法至行也丹雘鋪彩光輝燭人照至明也舉是署以福我境內之人德澤甚厚豈土木云乎哉元和二年十二月十有一作十月十一日記泗州重修鼓角樓記李磎烈而悲者角之聲歡而壯者鼓之聲烈與悲似義歡與壯似勇夫軍以義集以勇進故軍城例樓鼓角於正門以嚴暮警夜二物用固均然凡發語雖先鼓及奏而一有古字角先鳴者蓋欲勇生於義云泗城據汴淮奔會處汴迅以射淮廣而吞擰勢雄重翕張氣象故其出人物義且勇與鼓角之聲相叶雖商販四衝船擊柂交而氣不衰雜防禦使劉公郡人也其義勇智傑拔於萬衆間始為郡諸將黃巢陷關徐以西討急務在廣兵力按舊屬郡名取泗泗稱未奉詔不服徐師因大至公為都馬步司轉司衙皆總兵柄捍守連年徐竟解圍而去已而上欲久安徐泗卒以泗屬徐會有新防禦使昧軍機意泗人含憤復激令背徐不屬一作出公執詔爭不得衆因大呼逐防禦使扶公坐公不得已詔亦因命公徐帥太尉巨鹿王感公於已絶他心曲折惟天子命相得益歡甚於故焉公既挈防禦印登城四靣望皆拒戰後火燼餘或石拋所傾方圍急城中又壞屋給薪併是屋廬少全者乃鋭意自鞠鬬場上佐院稍稍營葺且謂鼓角樓者軍門眉首冝特華壯樓及左右鼓棚新者二十七間益揭其柱危其檻以激響日沉宵寒聽吹擊者疑岸浦泉窟龍吟鼉作時時相應和既而郡衆列觀欲咨文人紀績或揖衆而進曰公之功行甚多非止此樓門左右臂出廊及都廂等院凡二百餘間悉公重修又修孔子廟佛祠黃帔道宫觀文武吏舍靈山神宇凡數百千間又勸里人益構其居荒毁更新鬱鬱如春發寒槎又增武器庫旗矟千竿鎚百柄甲裝三百劔千環箭六萬羽弓弦角千凡營制悉以家私財佐用又教屬縣樹桑栁棗榆至二萬本無名役除律敕外擅立條歸之簡切用是人益附親逋竄自返萬三千户朝客中貴人往來饔餼餞迎如完盛時防護淮浙等貢上錢貫數百萬此其大略公所以能若是者由誠疑者公具侍一作具待下懇為尊中丞郡太君得拜封爵邑連表乞歸侍其誠切動人如此所以能堅奉明天子者以首出其政耶由此言之豈一樓而已乎且公用孝資忠用義發勇其壯烈聲又豈鼓角而已乎安可但記一樓而遺他事乎衆曰然則何如而可進談者曰吾聞古人以玉况德以器銘功豈玉足况器足銘耶蓋借玉為喻因器而盡銘他善今儻告文人請借鼓角以况公心而因記樓盡述公之功行儻可乎咸曰善然健於筆者不能寫是當緩以俟之積月而史官尚書司封郎中李磎自淮楚趨闕驛泗於是郡從事張信與同僚及將吏等磨石濡筆且以衆志白于公請磎為記磎不敢辭即所聞實書于石於戲樓以中和五年二月二十八日成以其年九月三十日書襄陽北樓記符載天時有晦明人情有舒慘或感瘁交搆鬱凝不發非登髙逺眺望則無以疏達其氣導沖和之性焉藹藹襄陽山水之鄉征南興峴亭賞賢王造北樓之勝緬邈千載遐襟一致靜躁一作操其有一作旨得不根柢於是乎然勢勝則同制作乃異請得本末而言之先前之人公舍之內特建危榭以瓌碩之材樹窐雜之地左右翳薈顧視生熟人莫能登一有庇字甚無光輝我公懷之思有所致會異日官府無事攜鄒生枚叟之客高步縱覩于城之墉次于北隅大獲偉地公竟符曩意據陴不去玄機一發樓在吾目由是振陳成新拔卑為髙經營鼓智財力什一笑抃之下峩峩橫空襄人駭之謂靈物佐助不然者何以不殫貨不峻程不罷民而成不朽之績容易若此之甚也夏五月辛巳公欲亟逞遐屬亦既樂只為食肴酒聚賔而登之異其勢隱軫氣崇融上乘百雉旁壓萬井飛陛虹指長檻雲截陵昭回而永睇關一作闋萬態之紛糾楚山無際漢水逺去郢門商雒微茫天外當是時大火炎炎里閈如燔更簟驟盥躁灼不解及其燕也即窈靄靜深端和肅清輕颷四來衝闥動扄座賔相顧如在皓氣况乎春之發舒秋之泬寥固不言而勝矣壯而不侈謂之範作而不費謂之智登降有序謂之禮享宴有惠謂之仁道崇者聲輝位大者物舉搢紳君子咸謂為此樓與羊公峴亭不沒矣若掘客土斬異材礱他山之石奪齊人之力肆浩蕩之觀窮靡嫚之樂實曰涼德賈謗不暇亦文者何述焉野人鯫劣備詳公明白之實敬揚休休為來者大猷五年六月十五日記泉州北樓記歐陽詹釋名曰樓瞜也謂高明覿逺瞜瞜然也建於第宅則以閲園林有媚樹於雉堞則以警寇盜不虞故墨子曰城備集無備字三十步一坐候樓百步一立候樓茲樓者蓋此郡北墉之立候樓也卜築之始而有之三字集作微而具之袤不倍常廣唯再尋製造日逺土木功集作力殆左騫右陊上露下圯有年數矣邦牧安定席公貞元七年下車至九年月之三祀重民力而未形言是年暮秋嵗豐農隙有司率常典告有事于土功公曰斯郡國集無此字之南極也元后帝鄉實在於北詩不云乎心乎愛矣遐不謂矣欲固集作因戀主向方瞻矚惟此有樓半傾半摧日夜闕登陴擊柝之所風雨憂折榱復隍之患政因時令爾其營之俾有布席跪立之地集有間字更人防卒之位位字集作蒞事豫將時躋展北面拱辰之心焉而受命之集無之字者感公之意如公之意杼人羣庶感公之誠如公之誠川朝子來坯集作坯崩易蠧址有餘而不剗基墌自延材有長而不剪棟宇自崇既望庀徒未晦成功倚層霄於軒檻納千里乎忩牗如鱗之𪠘署若岸之軍壁得不牧三字集作得之狀若連山之有重巒長江之蹙洪濤氣勢繇是而集作以雄焉公每子牟情來莊舄思生俯仰於斯徘徊於斯夫完城壯邑有邦之本也戀闕愛君為臣之節也善矣哉公廣茲樓也逺得有邦之本近貞為臣之節執邦之本曰公謹臣之節曰忠唯公與忠公斯昭矣小子家在委巷多聞輿誦藝忝儒術數集作每侍公居上志下衷兩獲而達敬書其事為之記以獻至若眺四維之雲物臨萬井之煙景遐象佳致眸一作瞬莫勝觀非公有樓之素故不載之集作之載貞元九年秋九月三十日獻文苑英華卷八百九
