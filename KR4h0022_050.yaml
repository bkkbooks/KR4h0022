body:
  text: 文苑英華巻五十宋李昉等編宫室四問津臺賦一首測景臺賦二首觀風臺賦一首通天臺賦三首集靈臺賦一首烏臺賦一首問津臺賦鮑防惟嵗臨乎甲午余經蔡以遊陳見巋然之故臺没路隅之荒榛側聞夫子于此問津敢問夫子何負於人凄凄夫子魯不容身乃泫然而出涕聊託辭以自申𤣥黄之初萬物為銅形象既著造化無功匪伊無功不宰其中禮樂之初崩壊未正詩書既出夫子無命匪伊無命不耀其聖向使魯同季氏一作孟齊等田常貪浮雲之不義忘夕露之瀼瀼豈無十室之邑亦有三家之堂奚自衛而反魯每困窮於路旁浩浩其天茫茫其野近不見於文武逺不逮於虞夏彼通津與直道故無得而知者已矣夫子時乎時乎進皆鳥獸之羣退異沮溺之徒霜雪昏其大澤荆棘穢其通衢撫川陸之險難憫人世之﨑嶇方太公迷殷遇文王伊尹迷莘遇成湯何夫子之不遇處昏濁而遂亡永追想於遺跡遂投吊於寒荒測景臺賦范榮大聖崇業萬象潛通據河洛之要創造化之功建以黄壤亘以紫宫右輔伊闕左連轘嵩銀臺比而可擬瀛壺方而詎同掩扶桑於日域包蓬萊於海𪷟式均霜露之氣以分天地之中於是仰𤣥穹之文俯黄壤之理下壓坤德上羅乾緯垂形象物既不假於玉衡司刻探𤣥何必邀於銅史其細也難究其妙也若此斯豈光隂而若易徙且夫聖不可測道實兼致天地與能幽靈必契囊括衆巧網羅羣藝自然而來疇能比計今來古往時移道替滋嵗月以成朽覺風塵之漸異人有代兮俗疑没地有形兮無制零落空階莓苔古砌頺墉邐迤但覺蕭條髙阜荒凉寒城蕪翳攀聖迹而難企感吾徒而流涕猗歟成周系聖纂極君少臣政流言更逼自陜卜洛其儀不忒公敷其化人盡其力惠而不費功成事息欽聖德之㣲臭豈賦者之能識第二以設在天中端景垂則為韻失名瞻彼古臺揆日爰設載徴經始之㫖將測運行之節天地之心可見風雨之交既别玉律匪先土圭是揭以徴隂陽之短長以察浮驂之晷轍不然者焉可以酌其數於髙空建中天而有截詳厥周典詢諸日官以寒暑為假以隂陽為端且俯接神州逈當嵩嶺憑累土之增構運孤標之直影矧因髙以垂範異尋虚而捕景分至有度知王者之迎長盈縮不愆念志士之思永􅑬嵼霄聳昭明有融九層一驗萬㝢攸同彰宣精而示下表無私而得中況復圭植于臺日生于海當呈象以委照必澄霞而賦彩兩童之辯猶惑太史之占斯在上千里而是馳下寸晷而未改嗟夫悠也久也𤣥之又𤣥昇大明而赫矣顧崇址而巋然是以分北陸識南躔審以作程定此而㑹期率土中以舉正因兹而仰辨均天唯彼𤣥德我后是則普觀端景知立表於天中潛測末光思勞躬於日昃至若視朔興紀書雲立規浮箭司辰且於室内建木滅影出淮南子或在天垂豈比夫兹臺之特立平四氣而正兩儀觀風臺賦以曾構重屋以觀八風為韻失名我天子德廣虞夏業傳髙曾展義之心攸克觀風之禮必登故臺之用也斯建臺之名也是宏然後度材比德奢而不盈興功俾役儉而不陋萬物是集百工是凑從繩罔愆運斤以鬭欻以山立揭焉雲構豈不謂鴻休叶贊元德時雍錯綜之典不革經始之道克從闢以九戸聳以千重接祥光於温液見張平子東京賦納瑞氣於驪峯觀乎大厦眈眈飛簷穆穆殊形詭制羣品異族或霞駮而電開或龍蟠而獸伏浩飾彰盛洞文潛蓄既藻井以垂珠亦丹墀而布玉晴天反照垂螮蝀於雕梁霽色澄明挂蟾光於重屋混合元麗巍峩特起入窈窱兮不知其所之視瓌譎兮不知其所以及夫西成罷務北陸將寒霜封原隰雲蔽峯巒金輿斯御綵仗初攢寧侈心以攸往必風俗之所觀設教陳詩事必彰於禮備承天統物政本在於人安至如庭宴薰薰衣冠察察其樂將萬其儀用八奏金石兮匪疾匪徐命鼓琴兮載擊載戛既而若登仙景若奪神功度宏觀兮其外動變態乎其中傍眺六合逺視八風吐元和而納純懿詠仁洽而歌道豐則魏之所造漢之所崇伊制作而靡及豈古今而遽同客有觀乎順動審彼始終因厥誠兮受慶宜永永兮無窮通天臺賦以洪臺獨存浮景在下為韻失名行人徘徊登秦原而遊目見漢右之荒臺清風穆其尚在翠華歸而不迴對古情至臨髙思來披蔓草以遐想覩離宫而興哀試問薪者乃秦人也云漢之興兹臺之下馳道通乎中禁周牆繞於平野經逝川而不息撫環堵而殊寡昔漢皇帝幸甘泉宫肆目將逺築臺其中髙居物外若與天通祈列􅋖之戾止致壽聖之延洪繹繹憑雲蹲蹲捧日干元氣以直上倚長空而逈出危檻岧嶤迴途鬱律植承露之盤開肅神之室將以接上元朝太一乗大君之登降訪惣真之撫實於戲郊祀之義志而可採鴻紛之狀望而已改哀壯麗之都失想威靈其如在徒野鳥之飛來何真人之可待且白日可以精貫𤣥珠難乎力求雖層臺􅑬嵼磴道周流秦畤乎西面齊宫乎上頭仰通蒼昊俯瞰皇州寧不死之可致諒其生也若浮我國家立太平尚清静儼宸居以自整絶仙臺之望幸雖丹檻栖於列宿飛梁歴於倒景有唐堯之允一作化恭無漢武之遊騁化由其衷居慎其獨有儀可象無思不服自然為域中之大獲天下之福等南山之不騫何髙臺之是築第二同前韻任公叔武皇起雲陽之宫致崇臺於爽塏就山谷之交㑹得神明之所在近瞰八極周臨四海將端冕而不二必垂衣而有待是用迥載天路髙標地游依俙𤣥圃想像丹丘磴道邈以特立通天赫其無儔託神靈於秦甸結元氣於雍丘白日旁轉青雲上浮八垓可接於咫步萬象無逃於寸眸是嵗獻春衆靈咸秩天子乃舉羣祠撰吉日郊上𤣥禮太一風伯陪乗蚩尤扈蹕向甘泉以整像届通天而挺出既而越氛霧之途近星辰之境背麟衍之五畤面長安之萬井岐陽太華雙標象魏之形秦嶺終南遥樹軒墀之屏蹈煙霞而有慕潔齋戒而思眚一作永奉寳位之䖍恭佇神仙於光景當其宵衣待曙暘谷未開鈎陳匝乎營衛天漢列以昭回爟火周起神光迥來暨三山之遍登當仰候於斯臺靄靄髙躅神祗煜煜喜氣周旋慶雲迴復召安期於滄海降王母於黄屋樹翠玉以青蔥草靈芝以芬馥上結綵熾疑髙居耳目斯覽物以懐柔非取樂於幽獨觀乎層構陵空形勢作雄風起而纎埃不致雨過而瀑溜潛通其載惟厚其覆惟洪所以大啓於皇祚豈徒峻極于蒼穹是以擁帶休徴感通純嘏㑹歌童之曲節彰從臣之風雅立極人望叶靈王者將大漢之可追願侍祠於臺下第三同前韻楊系伊昔炎漢功髙化洪樂率土之暨阜築通天而且崇初一簣以發地終百尋以隱空構之以楩梓飾之以丹紅浮彩外爍流光内融赫兮烜兮獨出煙雲之表壯矣麗矣迥標天地之中栢梁不同井榦非匹勢岌嶷以山峙體曈曨而景軼中邃窅窕入之者當晝而居昏上跂崚嶒登之者先曙而觀日偓佺於是乎宴處安期於是乎暇逸月上壁而旁飛雲縁梯而下出燦燦彩彩靈仙兮所在若瑶臺之雲馭冠鼇山於溟海炳炳彪彪天子兮共遊若瓊樓之霞蔚照龍燭於崑丘光玉樹而蔥翠影甘泉以沈浮於是孝武皇帝紹祚䘏𦙍登眺逺騁髙揖八極俯窺萬井拂軒楯之宛虹歩檐楹之倒影乃言曰可以臨萬國可以遊九垓凡厥層構莫先斯臺窺地底以豁險羾天門以崔嵬謂四夷不遐將拓跡以開統見百神咸在則祈禠而禳災既玉女之下視復金烏之上迴既而襄雲獻賦文質彬郁且曰陛下承天啓聖聿膺多福排玉戸於玉堂颺金鋪於金屋亦可以上憂宗社下恤惸獨何峻極於臺榭恣歡娱於耳目將乗奔而獨懼矧長途而中宿至矣哉斯言也我皇德循楷式帝鍚純嘏儻茅茨而是陋堯何事乎光宅天下集靈臺賦以聖君宏道景福㑹昌為韻張良器希夷乎人皇居明堂闢隂開陽冠通天兮䕃華蓋發大號兮流耿光將樂瑶池之宴集由喜玉京於壽昌降清問於宣室討真經於栢梁乃因髙為臺順時謀築披翳薈剪林麓鏟重岡移峻谷量其逺近以議夫土功命彼般倕再度乎山木使人以悦無告于勞均力取材不逺而復屹九重以初起馮一匱疑作簣而始覆其為勢也峨峨皚皚粉壁光兮朱門開若方丈與蓬萊其為麗也崢嶸郁煜星柱浮兮雲楣肅狀靈光與景福有時鳴猿告曉貞松歛靄千峯轉日迎秀色於瓊樓萬歳傳聲和幽音於地籟磅礴壓乎人境􅀈屴聳乎天外王喬飛舄見鳬影之翩翩神女窺窓聽鸞歌之􅎪􅎪俯衆山兮如束縈八川兮如帶上方向晦宴息齋心防戒乗金根囬玉軑夸父秉鉞蚩尤揚斾鐵衣沸渭以焜煌寳馬騰驤一作綝纚而沛艾環鈎陳而列武士震砰訇兮軼埃􅝙登夫集靈之臺謂天帝而為㑹奏無聲之樂寂寞而難分展無體之禮質素而無文睟容綽約元化氤氲聖主湛恩散作八方之雨清都喜氣凝為五色之雲彼昇龍鑄鼎之后捧盤承露之君徒髣象於前載孰能成乎此勛然大造之徳曰生大君之位曰寳未有離於兆庶而復謂之至道願獻華封之壽上祝唐堯之盛股肱為良元首作聖用壯辟雍之美乃經靈臺之政豈必沐咸池陵倒景脫屣乎㝢縣棲真乎絶嶺届中天之峻極從化人兮習静然後居無何之鄉去有為之境者也於是情冥具一作其慾德貴惟恒可大可久不騫不崩動植風靡雍熈日宏宜其四溟式晏而人和年登烏臺賦失名士有利於鴻漸者觀乎憲臺降太液邇蓬萊風威四警霜氣傍催地疏曹而獨秀居對禁而分開提綱必理舉職惟才門凌晨而豸出樹夕陽而烏來旌良表正癉惡繩回乍以飛騫凄其嶷矣時為搏擊吁可畏哉嚴城岑寂靈臺􅑬嵼直狀臨而逾明偽迹投而遽剗故座有彛法門無濫板理從擾而庭幽事雖繁而人簡及夫貪吏無厭豪宗不戒酷奮黔俗洪威桎械致中典之淪否令下人之凋瘵百城相師而自若五兵乂安而不恠是司也故以務逺聲哇長喟若恠切奉絲綸以遐察騰錦車而遥届則䟦扈顔沮强梁志憊望驄馬而跼蹐仰繡衣而下拜是知上能賛聖下足安凢顧眄而朝班已肅推彈而邦度增嚴庶究厥能請循其始官則秦置臺從漢起或掌方書或稱柱史朱何以忠雅標懿栢陳以剛直著美上封則起於鄭均埋輪則逺聞張紀虞詡之人方側目暴勝之名兼直指皆玉秀珠眀鷹瞵鶚視既幹時而助化亦圖國而逺恥莫不才挾主以成功主因才而共理唐纉玉葉藎臣惟哲法省嬴劉臺兼員薛昻凉階宇奮迅霜雪耿獨坐而情雄邈羣司而位絶稠人廣衆望影而魂禠暴黨姦雄覩形而膽折豈徒以聳動寮宷逡巡朝列儻吾道之將行庶從兹而振節文苑英華巻五十
