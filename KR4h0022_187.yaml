body:
  text: 文苑英華巻一百八十七宋李昉等編省試八秋山極天浄一首落日山照曜一首積雪為小山一首監試蓮花峯一首謝真人僊駕過舊山二首宣州試䆫中列逺岫一首登雲梯二首日暖萬年枝四首風動萬年枝三首禁中春松四首貢院樓北新栽小松四首尚書都堂瓦松一首文宣王廟古松一首幽人折芳桂一首秋風生桂枝一首月中桂樹一首華州試月中桂一首府試木向榮一首古木卧平沙一首竹箭有筠三首震為蒼筤竹一首嘉禾合穎二首秋稼如雲一首麥穗两岐一首餘瑞麥一首良田無晩歲一首霜菊二首月夜梧桐葉上見寒露一首秋山極天浄朱延齡雨洗高秋淨天臨大野閑葱蘢清萬象繚繞出層山日落千峯上雲銷萬壑間緑蘿霜後翠紅葉雨來殷散彩輝呉甸分形壓楚闗欲尋霄漢路延首願登攀落日山照曜失名徘徊空山下晼晩殘陽落圓影過峯巒半規入林薄餘光徹羣岫亂彩分重壑石鏡共澄眀巖光同照灼棲禽去杳杳夕烟生漠漠此境一作景誰復知獨懐謝康樂積雪為小山劉慎虚飛雪伴春還春庭曉自閒虚心應任道遇賞遂成山峯小形全秀巖虚勢莫攀以幽能皎㓗謂近可循環孤影臨氷鏡寒光對玉顔不隨遲日盡留顧歲華間監試蓮花峯劉得仁太華萬餘重岧嶤只此峯當秋倚寥泬入望似芙蓉翠㧞千尋直青危一朶穠氣分毛女秀靈有羽人蹤倒影侵闗路香風集作流香激廟松塵埃終不及車馬自憧憧謝真人僊駕過舊山范傳正麾盖從僊府笙歌入舊山水流丹竈缺風起草堂闗白鹿行為衛青鸞舞自閒種松鱗未老移石蘚仍斑望路烟霄外廻輿嶺岫間豈惟遼海鶴空歎令威還同前夏方慶何年成道去綽約化童顔天上辭真侣人間憶舊山桑田今已變蘿蔓一作逕尚堪攀雲覆瑶壇浄苔生丹竈閒逍遥㸔白石寂寞閉𤣥闗應是悲塵累思將羽駕還宣州試窻中列逺岫白居易天静秋山好窻開曉翠通遥憐峯窈窕不隔竹䝉籠萬㸃當虚室千重疊逺空列簷攅秀氣縁隙助清風碧愛新晴後明宜反照中宣城郡齋在望與古詩集作時同登雲梯殷琮碧落逺澄澄青山路可昇身輕疑易蹋歩獨覺難慿邐迤排將近廻翔勢漸登上寧愁屈曲高更喜超騰江樹遥分藹山嵐宛若凝赤城容許到敢憚百千層同前湯洙謝客常遊處層巒枕碧溪經過殊俗境登陟象雲梯歩歩勞山屐行行躡澗霓廻臨天路廣覆聎夕陽低賞詠情彌愜風塵事已睽前脩如可慕􅀈疑作投足固思齊日暖萬年枝蔣防新陽歸上苑嘉樹獨含妍散漫添和氣曈曨巻曙烟流輝宜聖日接影貴芳年自與恩光近那闗煦嫗偏結根誠得地表壽願符天誰道陵寒質從茲不曖然同前鄭求旭日升溟海芳枝散曙烟温仁臨樹久煦嫗在條偏陽徳符君惠嘉名表聖年若承恩渥厚常屬棟梁賢生植雖依地光華只信天不才堪仄陋徒望向榮先同前王約靄靄􅊮庭裏沉沉玉砌陲初升九華日潜暖萬年枝煦嫗光偏好青葱色轉宜每因韶景麗長沐惠風吹隠映當龍闕氛氲隔鳯池朝陽光照處唯有近臣知同前鄭師貞禁樹敷榮早偏將麗日宜光摇連北闕影泛滿南枝得地方和煦逢時異赫曦葉和盈數積根是永年移霄露猶殘潤薫風更共吹餘暉誠可託况近鳯凰池風動萬年枝韋紆嘉名標萬祀擢秀出深宫嫩葉含煙藹芳柯振惠風參差摇翠色綺靡舞晴空氣禀禎祥異榮霑雨露同天年方未極聖壽比應崇幸列華林裏知殊衆木中同前樊陽源珍木羅前殿乗春任好風振柯方裊裊舒葉乍䝉䝉影動丹墀上聲傳紫禁中離披偏向日凌亂半分空輕拂祥煙散低摇翠色同長令占天眷四氣借全功同前許稷瓊樹春偏早光風處處宜曉浮三殿日暗度萬年枝婀娜摇僊禁繽翻映玉池含芳煙乍合拂砌影初移為近韶陽煦皆先衆卉垂成隂知可待不與衆芳隨禁中春松陸贄類詩作白行簡隂隂清禁裏蒼翠滿春松雨露恩偏近陽和色更一作正濃高枝分曉日靈韻一作虚吹雜宵鐘嵐一作香助鑪烟逺形疑盖影重願符千載類詩作千嵗壽不羡五株封儻得類詩作長得廻天眷全勝老碧一作一峯同前周存幾嵗含貞節青青紫禁中日華留偃盖雉尾轉春風不為繁霜改那將衆木同千條攅翠色百尺澹晴空影宻金莖近花明鳯沼通安知幽澗側獨與散樗叢同前員南溟欝欝貞松樹隂隂在紫宸葱蘢偏近日青翠更宜春雅韻風來起輕烟霽後新葉深棲語鶴枝亞拂朝臣全節長依地陵雲欲致身山苖䕃不得生植荷陶鈞同前常沂映殿松偏好森森列禁中攅柯霑聖澤踈盖引皇風晩色連秦苑春香滿漢宫操將貞石固材與直臣同翠影宜青𤨏蒼一作纎枝秀碧空還知沐天眷千載更葱蘢貢院樓北新栽小松李正封青蒼初得地華省植來新尚帯山中色猶含洞裏春近樓依北戸隠砌浄遊塵鶴壽應成盖龍形未有鱗為梁資大厦封爵耻嬴秦幸此觀光日清風屢得親同前白行簡華省春霜曙樓隂植小松移根依厚地委質别危峯北户知猶逺東堂幸見容心堅終待鶴枝嫩未成龍夜影㸔仍薄朝嵐色漸濃山苖不可䕃孤直俟秦封同前錢衆仲愛此凌霜操移來獨占春貞心初得地勁節始依人晩疑月烟猶薄當軒色轉新枝低無宿羽葉静不留塵每與芝蘭近常慙雨露均幸因逢顧盼生植及茲辰同前呉武陵拂檻愛貞容移根自逺峯曽經芳一作已曽經草沒終不住疑苔封葉少初陵雪鱗生欲化龍乗春濯雨露得地近垣墉逐吹香㣲動含烟色漸濃時廻日月照為謝小山松尚書都堂瓦松李曄華省祕僊蹤高堂露瓦松葉因春後長花為雨來濃影混鴛鴦色光含翡翠容天然斯所寄地勢太無從接棟臨䨇闕連甍近九重寧知深澗底霜雪嵗兼封文宣王廟古松李胄列植成均裏分行古廟前隂森非一日蒼翠自何年寒影煙霜暗晨光枝葉妍近簷隂更静臨砌色相鮮每愧聞鐘磬多慙接豆籩更宜教胄子於此學貞堅幽人折芳桂失名厚地生芳桂遥林聳榦長葉開風裏色花吐月中光曙鳥啼餘翠幽人愛早芳動時垂露滴攀處拂衣香曲調聲猶苦孤一作因高力自強一枝終是折榮耀在東堂秋風生桂枝失名寒桂秋風動蕭蕭自一枝方將擊林變不假舞松移散翠幽花落摇青宻葉離哀猿驚助褭花露滴争垂遺韻連波聚流音萬木隨常聞小山裏逋客最先知月中桂樹顧封人芬馥天邊桂扶踈在月中能齊大椿長不與小山同皎皎舒華色亭亭麗碧空虧盈寧委露摇落不闗風歲晩花應發春餘質詎豐無因遂攀賞徒欲望青葱華州試月中桂張喬與月轉鴻濛扶踈萬古同根非生下土葉不墮秋風每以類詩作毎向圓時足還隨缺處空影高羣木外香滿一輪中未種丹霄日應虛玉一作白兎宫如何當一作何當因羽化細得問𤣥功府試木向榮鄭谷園林青氣動衆木散寒聲敗葉墻隂在滋條雪後榮忻忻春令早藹藹日華輕庾嶺梅先覺隋堤栁暗驚山川應物候臯壤起農情秪待花開日連棲出谷鶯古木卧平沙王冷然古木卧平沙摧殘嵗月賖有根横水石無葉拂煙霞春至苔為葉冬來雪作花不逢星漢使誰辨是靈槎竹箭有筠李程常愛凌寒竹堅貞可喻人能將先進禮義與後彫隣冉冉猶全節青青尚有筠陶鈞二儀内柯葉四時春待鳯花仍吐停霜色更新方持不易操對此欲觀身同前席䕫共愛東南羙青青歎有筠貞姿衆木異秀色四時均枝葉當無改風霜豈憚頻虛心如待物勁節自留春鮮潤期棲鳯嬋娟可並人可憐初籜卷粉澤更宜新同前張仲方東南生緑竹獨美有筠箭枝葉詎曽凋風霜孰云變偏宜林表秀多向嵗寒見碧色乍葱蘢青光常蒨練皮開鳯彩出節勁龍文見愛此守堅貞含歌屬時彦震為蒼筤竹朱慶餘為擢東方秀蕭集作脩然異衆筠青葱纔映粉䝉宻正含春嫩籜霑微雨幽根絶細塵乍憐分徑小偏覺帯烟新結實皆留鳯垂隂似庇人願為竿在手深水釣集作掛赬鱗嘉禾合穎孟簡玉燭將成嵗封人亦自歌八方霑聖澤異畆發嘉禾共秀芳何逺連莖瑞且多穎低甘露滴影亂惠風過表稔由神化為祥識氣和因知興嗣嵗王道舊無頗同前失名天祚皇王德神呈瑞榖嘉感時苖特一作自秀證道葉方華氣轉騰佳色雲披映早霞薫風浮合頴湛露浄祥花六穗垂兼倒孤莖嫋復斜影疑同唐叔獻稱慶比周家秋稼如雲蔣防肆目如雲處三田大有秋葱蘢初滿墅類詩作蔽野散漫正盈疇稍混從龍勢寧同觸石幽紫芒分羃羃青野類詩作清夜澹油油始愜倉箱望終無滅裂憂西成知不逺雨露復何酬麥穗两岐鄭畋聖慮憂千畆嘉苖薦两岐如雲方表盛成穗忽標竒瑞露縱横滴祥風左右吹謳謡連上苑花日遍平陂一作岐史册書堪重丹青畫更宜願依連理樹俱作萬年枝餘瑞麥張聿瑞麥生堯日芃芃雨露偏两岐分更合異畆穎仍連冀獲明王慶寧唯太守賢仁風吹靡靡甘雨長芊芊聖德應多稔皇家配有年已聞天下㤗誰為濟西田良田無晩歲丁澤人功雖未及地力信非常不任耕耘早偏宜黍稷良無年皆有穫後種亦先芳憮憮疑盈千畆青青保萬箱何湏祭田祖詎要察農祥况是春三月和風日又長霜菊席䕫時令忽已變行㸔被霜菊可憐後時秀當此凛風肅淅瀝翠枝翻淒清金蘂馥凝姿節堪重登艶景非淑寧祛青女威願盈君子掬持來泛罇酒永以照幽獨同前失名秋盡北風去律移寒氣肅淅瀝降繁霜離披委殘菊華滋尚照灼幽氣含紛郁的的冐空園萋萋被幽谷騷人有遺詠陶令曽盈掬儻使懐袖中猶堪襲餘馥月夜梧桐葉上見寒露戴察蕭踈桐葉上月白露初團滴瀝珠疑光滿熒煌素彩寒風摇愁玉墜枝動惜珠乾氣冷初疑秋晩聲微覺夜䦨凝空流欲遍潤物浄宜㸔莫厭窺臨倦將晞聚更難文苑英華卷一百八十七
