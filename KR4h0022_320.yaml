body:
  text: 文苑英華卷三百二十宋李昉等編郊祀宿齊八首祠廟五十六首宿齊和劉尚書亷明堂齊宫梁元帝微質攝上宰詰旦乘軺軒四邸陳蒼玉六變舞雲門香浮鬱金酒煙繞鳳凰尊新花臨御街一作御宙春色起天園河間獻樂語斯道愧能論扈從郊廟因呈兩省諸公韓翃丹墀列士主恩同廄馬翩翩出漢宫奉引乘輿金仗裏親嘗賜食玉盤中晝趨行殿旌門比夜宿齊房刻漏東明日駕回承雨露齊將萬嵗及春風朔旦冬至攝職南郊因書即事權德輿大明南至應集作慶天正朔旦圜丘樂六成文軌盡同堯歷象齊祠忝備漢公卿星辰列位祥光滿金石交音曉奏清更有觀臺稱賀處黃雲捧日瑞升平癸已嵗吉甫圜丘攝事合於中書後閣宿齊常負忝愧移止於集賢院㑹門下相公以七言垂寄亦有所求短章絶韻不足抒意因叙所懷奉寄相公兼呈集賢院諸學士前人淮海同三入樞衡過六年後漢牟融六年任職廟齊兢永夕書府㑹羣仙粉壁連霜曙氷池對月圓嵗時憂裏換鍾漏靜中傳蓬髮顔空老松心契獨全贈言因傅說垂訓在三篇奉酬中書相公至日圜丘攝事合於中書後閣宿齊移止於集賢院叙懷見寄之作武元衡郊廟祗嚴祀齊莊覿上𤣥别開金虎觀不離紫微天樹古長楊接池深集作清太液連仲山方補職集作衮文舉自傷年風澀銅壺漏香凝綺閣煙仍聞白雪唱流詠滿鵾𤣥同前裴度見集本翼亮登三命趙公三拜中書侍郎平章事謨猷本一心致齊移祕府祗事見冲襟皓月當延閣祥風自禁林相庭方積玉王度已如金運偶唐虞盛情同丙魏深幽蘭與白雪何處寄庸音同前崔曙典籍開書府恩榮避鼎司郊丘資有事齊戒守無為宿霧蒙瓊樹餘香覆玉墀進經逢一夜展禮值明時勳共山河列名同竹帛垂年年佐堯舜相與致雍熙奉和李相公攝事南郊覽物興懷呈一二知已集作舊韓愈燦燦辰角曙亭亭寒露朝川原共澄映雲日還浮飄上宰嚴祀事清途振華鑣圜丘峻且坦前對南山標村樹黃復緑中田稼何饒顧瞻想巖谷興歎倦塵囂惟彼顛冥集作宣非者去公豈不遼為仁朝自治用靜兵以銷勿憚吐握集作促勤可歌風雨調聖賢相遇少功德今宣昭祠廟和蕭東陽祀七里廟梁簡文帝萬里實幽宗三神亦天構豈謂木石精斯乃山川守逺來太白旗遙徵青烏候以茲敬弗怠方知教應富以下十篇見藝文類聚漢髙廟賽神前人玉車犬朝行動閶闔一作閭閻旦應開白雲蒼梧上丹鳳類聚作霞咸陽來日正山無影城斜漢屢回瞻流如地脉望嶺匹天台欲祛九秋恨聊舉十千杯祀五相廟梁元帝石城寧足植金陳詎能追楚關開六塞吳兵入九圍山水猶縈帶城池失是非空餘夀宫在日暮舞靈衣賽漢髙廟庾肩吾昔作唐山曲今承紫月壇寧知臨楚岸非復望長安野曠秋光動林髙葉早殘塵飛逺騎沒日徙半峯寒徒然仰成誦終用試才難亂後經夏禹廟前人金簡泥初發龍門鑿始通配天不失舊為魚微此功林堂上偃蹇山殿下穹窿侵雲似天闕照水類河宫神來導赤豹仙去擁飛鴻松龕撤暮爼棗徑落寒叢仙舟還入鏡玉軸更乘空去國嗟行邁離居泣轉蓬月起關類聚作吳山北星臨天漢東申胥獨類聚作猶有志荀息本懷忠待見攙槍滅歸來松柏同登二妃廟吳筠朝雲亂入目帝女湘川宿折菡巫山下採荇洞庭腹故以輕薄好千里命艫舳何事非相思江上葳蕤竹西門豹廟庾信君子為利博逹人樹德深蘋藻由斯薦樵蘇幸未侵恭聞正臣類聚作直祀良識佩韋心容範雖年代徽猷若可尋菊花隨酒馥槐影向忩臨鶴飛疑逐舞魚驚似聽琴漳流鳴磴石銅爵影秋林從駕祀麓山廟楊慎聖德憂民暇麾斾謁山靈畫航泛北渚文馬侍東平春浦戈鋌照寒林鐃吹鳴依稀長安舞類聚作驛蕭條都尉城井泉能共動江帆得分行忩幽細綱合階净落花明櫩巢始入燕軒樹已遷鶯菲菲蘭爼馥淡淡桂樽清銀塘類聚作堂日影晝類聚作盡玉坐舞衣輕行經季子廟張正見延州髙讓逺傳芳世祀移地絶遺金路松悲懸劔枝野藤侵藻井山雨濕苔碑别有觀風處樂奏無人知遊卞山楚廟江總蘋藻祈明德倚棹息巖阿忽聽晨雞類聚作鳥鳴曙非是類聚作復楚人歌閒階剃宿薺古木斷懸蘿幃一作帳堂寂易晚枹鼓自相和盛祀流百世英威定幾何攝官梁小廟前人疇昔遊衣所今日薦櫻時憲章誠有革嵗月遂難思故人獨之子官聮更在兹虛簷靜暮雀洞户映光絲平生復能幾語事心傷悲和謁孔子廟劉斌性與雖天縱主世乃無由何言太山毁空驚逝水流及門思往烈入室想前修寂寞荒階暮摧殘古木秋遺風暖疑如此聊以慰蒸一作蒙求謁漢髙廟李百藥纂堯靈命啓滅楚閏餘終飛名膺帝籙泛一作沉迹韞神功瑞氣朝浮碭祥符夜告豐抑揚駕人傑叱吒掩時雄締構三靈改經綸五緯同干戈革宇內聲教盡寰中運謝年逾逺魂歸道未窮樹碑留故邑抗殿表祠宫沐蘭祈泗上謁帝動深衷英威宿如在文物杳成空竹皮聚寒徑枌社落霜叢蕭索隂雲晚長川起大風登葉縣故城謁諸梁廟前人總轡臨秋原登城望寒日煙霞共掩映林野俱蕭瑟楚塞鬱不窮吳山髙漸出客行殊未已沐澡期終吉椒桂奠芳樽風雲下虛室館宇肅而靜神心康且逸伊我非真龍勿驚疲朽質過老子廟唐𤣥宗仙居懷聖德靈廟肅神心草舍人蹤斷塵濃鳥跡深流沙丹竈沒關路紫煙沉獨傷千載後空餘松柏林送特進李嶠入都祔廟徐彥伯特進三公下台臣百揆先孝圖開寢石祠坐卜牲筵思急青綸賜徂裝紫橐懸綢繆金鼎席宴餞玉橫川北斗分征路東山起贈篇樂池歌緑藻梁苑籍紅筌騎轉商巖日旌搖關塞煙廟堂須鯁議錦節佇來旋竭禹廟宋之問夏王乘四載茲地發金符駿命終不易報功疇敢踰先驅總章㑹後至伏靈誅玉帛空天下衣冠照海隅旋聞厭黃屋便道出蒼梧林表祠轉茂山阿井詎枯舟遷龍負壑田變鳥雲蕪舊物森如在天威肅未殊𤣥夷届瑶席玉女待清都奕奕閨一作扃闥邃軒軒仗衛趨氣清連曙海雲白洗春湖猿嘯有時合禽言常自呼靈歆異蒸糈至樂非脫竽茅殿今不襲梅梁古制無運逢日崇麗業盛答昭蘇伊昔力云盡而今功尚敷揆材非美箭精享愧生芻郡職昧為理拜空寧自誣下車霰已積攝事露行濡人隱冀多祜曷惟霑薄軀章㑹集作昌㑹時合集作時答緱山廟見二百二十六卷汾隂后土祠作李適昔豫讀舊史遍覩一作觀漢世君武皇實稽古建兹百代勳號令垂懋典舊經備闕文南巡歷九嶷舳艫被江濵勒兵十八萬旌旗何紛紛朅來茂陵下英聲不復聞我行嵗方晏極望山河分神光終冥寞鼎氣獨氛氲攬涕涉脽上登髙見彼汾雄圖今安在飛飛有白雲冬日洛城北謁𤣥元皇帝廟廟有吳道子畫聖圖杜甫配極𤣥都閟憑髙禁籞長守祧嚴具禮掌節鎮非常碧瓦初寒外金莖一氣傍山河扶繡户日月近雕梁仙李盤根大猗蘭奕葉光世家遺舊史道德付今王畫手看前輩吳生逺擅場森羅移地軸妙絶動宫墻五聖聮龍衮千官列鴈行冕旒俱秀發旌斾盡飛揚翠柏深留景紅梨迥得霜風箏吹玉柱露井動銀牀身退卑周室經傳拱漢皇谷神如不死養拙更何鄉禹廟前人禹廟空山裏秋風落日斜荒庭垂橘柚古屋畫龍蛇雲氣虛清壁江聲走白沙早知乘四載疏鑿控三巴蜀相廟前人丞相祠堂何處尋錦官城外柏森森映階碧草自春色隔葉黃鶯集作鸝多空好音三顧頻煩天下計兩朝開濟老臣心出師未捷集作戰身先死長使英雄淚滿襟謁漢世祖廟劉希夷舂陵氣初發漸臺首未傳列營百萬衆持國十八年運開朱旗後道合赤符先宛城劔鳴匣昆陽鏑應弦儣獸血塗地巨人聲沸天長驅過北趙短兵出南燕十守迎門外王郎死道邊升壇九成陌端拱千秋田朝廷方雀躍劔佩幾聮翩至德行四海神儀翳九泉宗子行舊邑恭聞清廟篇君容穆而聖臣像儼猶賢攢木承危柱踈蘿挂朽椽祠庭巢鳥啄祭器網蟲緣懷古江山在惟新歷數遷空餘今夜月長似舊時懸嚴陵祠洪子輿漢主召子陵歸宿洛陽殿客星今安在隱迹猶可見水石空潺湲松篁尚葱蒨岸深翠隂合川回白雲遍幽徑滋蕪沒荒祠羃霜霰垂釣想遺芳掇蘋羞野薦髙風激終古語理忘榮賤方驗道可遵一作尊山林情不變登樂遊廟懷古豆盧田一作回緬維漢宣帝初謂皇曾孫雖在襁褓中亦遭巫蠱寃至哉丙廷尉感激義彌敦馳逐蓮勺道出入諸陵門一朝風雲㑹竟登天地尊握符升寶厯負扆御華軒赫奕文物備葳蕤休瑞繁卒為中興主埀名於後昆雄圖奄已謝餘址空復存昔為樂遊苑今成狐兔園朝見牧豎集夕聞栖鳥喧蕭條灞亭岸寂寞杜陵原羃䍥野煙起蒼茫嵐氣昏二曜屢回薄四時更凉溫天道尚如此人理安可論湘妃廟劉長卿荒祠古木暗寂寂此江濆未作湘集作湖南雨知為何處雲苔痕斷珠履草色帶羅裙莫唱迎仙曲空山不可聞過桃花夫人廟前人寂集作𡨕寞應千嵗集作載桃花想一枝路人看古木江月向空祠雲雨飛何處山川是舊時獨憐春草色猶似憶佳期登首陽山竭伯夷廟李頎古人已不見喬木竟誰過寂寞首陽山白雲空復多蒼苔歸骨地皓首採薇歌畢命無怨色成仁其若何我來入遺廟時候辨淳和落日弔山鬼回風吹女蘿石門正西壑引領望洪河千里一飛鳥孤光東逝波驅車層城路惆悵此巖阿陪皇甫大夫竭禹廟嚴維竹使羞殷薦松龕拜夏祠為魚致美後舞羽降神時仗衛瞻如在精靈信有期夕陽陪醉止塘上馬咸遲題遊仙閣息一作白公廟李嘉祐見集本仙冠輕舉竟何之薜荔緣階竹映祠甲子不知風馭日朝昏惟見雨來時霓旌翠蓋終難遇流水青山空所思逐客自憐雙鬢改焚香多負白雲期夜聞江南人家賽神因題即事前人南方淫祠一作祀古風俗楚媪解集作嫗能唱迎神曲鎗鎗銅鼓蘆葉深寂寂瓊筵江水渌雨過風清洲渚間椒漿醉盡神欲集作迎神還帝女凌空下江岸畨君隔浦向堯山月隱回塘猶自舞一門依倚神之祜韓康賣集作靈藥不復求扁鵲傳集作醫方曾莫覩逐客臨江空自悲月明流水無已時聽此迎神送神曲携觴欲弔屈原祠題尹真人廟郎士元窅窅雲旗去不還隂隂祠宇閉空山我來始悟丹青妙稽首如逢氷雪顔奉陪侍中春日過武安君廟盧綸見集本長裾間一作問貔虎遺廟盛攀登白羽二千騎紅林一萬層元臣逹幽契祝史告明徵撫坐悲今古瞻容感廢興回風卷叢柏驟雨濕諸陵倐忽煙花霽當營看月升題舜廟張濯上都遺廟出河汾一作濆萬代千秋仰聖君蒲坂城邊長逝水蒼梧野外不歸魂寥寥薦設魂應在寂寂虞篇德已聞向曉風吹庭下柏猶疑琴曲咏南薰題伍相廟常雅蒼蒼古廟映林巒羃羃煙霞覆石壇精魄不知何處在威風猶入浙江寒巫山神女劉方平神女藏難識巫山秀莫羣今宵為大雨昨日作孤雲散漫愁巴峽徘徊戀楚君先王為立廟春樹幾氛氲華嶽集作山南廟李益隂山臨古道廟閉空集作廟貌間山碧落日春草集作木中搴芳薦瑶席明靈達精意髣佛如不隔微雨集作岩風神降時回風集作飇入松柏常聞坑儒後此地曾返集作返秦璧自古害忠良神其輔宗祏經夫差廟陳羽姑蘇城畔千年木刻作夫差廟裏神冠蓋寂寥塵滿室不知簫鼓樂何人經伏波神祠劉禹錫蒙蒙篁竹下有路上壺頭漢壘麏鼯鬬蠻溪霧雨愁懷人敬遺像閲世指東流自負霸王略安知恩澤侯鄉原集作園辭石柱筋力盡炎州一以功名纍翻思馬少遊陽山廟觀賽神梁松南征至此遂為其神在朗州前人漢家都尉舊征蠻血食如今配此山曲蓋幽深蒼檜下洞簫愁一作吹絶翠屛間荆巫脉脉傳神語野老娑娑啓醉顔日落風生廟門外幾人連踏竹歌還題山中古祠張籍春草空山暮荒林鳥雀飛記年碑石在經亂祭人稀野鼠緣朱帳隂塵蓋一作幞畫衣近門集作來潭水黑時見宿龍歸經貞女祠僧無可朝賽暮還祈開唐復歷隋精誠山雨至嵗月廟松衰窺穴龍潭黑過門鳥道危不同巫峽女來至集作往楚王祠聖集作神女廟許渾停車祠聖女凉葉下隂風龍氣石牀濕鳥鳴集作聲山廟空長睂留桂緑丹臉寄蓮集作蘭紅莫學陽臺畔朝雲暮雨中聖女祠二首李商隱杳靄集作藹逢仙迹蒼茫集作莊滯客途何年歸碧落此路向皇都消息期青雀逢迎異紫姑腸回楚國夢心斷漢宫巫從騎栽寒竹行車䕃白榆星娥一去後月姊更來無遼鶴集作寡鵠迷蒼壑羇鸞集作鳳怨翠梧秪應碧桃下方朔是狂夫二松篁臺殿蕙花圍集作香龍護瑶忩鳳掩扉無質易迷三里霧不寒長著五一作六銖衣人間定有崔羅什天上應無劉武威寄問叉頭雙白燕每朝朱館幾時歸題谷神廟集作題竹谷祠溫庭筠蒼蒼松色集作竹晚一徑入荒祠古樹風吹馬虛廊日照旗煙煤朝奠處雲雨夜歸時寂寞湘江客空看蔣帝碑題蕭山廟前人故道木隂濃荒祠山影東杉松一庭雨幡蓋滿堂風客奠晚沙集作曉莎濕馬嘶春集作秋廟空夜深雷電歇龍入古潭中蘇武廟前人蘇武魂銷漢史前古祠髙樹兩茫然雲邉鴈斷胡天月隴上羊歸塞草煙回日樓臺非甲帳去時冠劔一作蓋是丁年茂陵不見封侯印空向秋波哭逝川黃陵廟二首李羣玉小孤一作袁洲北浦雲邊二女啼粧共儼然野廟向江春寂寂古碑無字草芊芊東風日暮吹香一作芳芷落日山深哭杜鵑猶似含顰望巡狩九嶷愁黛隔湘川二黃陵廟前莎草春黃陵女兒茜裙新輕舟小楫隨歌去水濶山長愁殺人許由廟羅隱髙桂風飄濯漢濵土階三尺愧清塵可憐比屋堪封日若到人間是衆人韓信廟前人剪項夷秦勢已雄布衣還是負深功懦夫女子集作寡妻稚女俱堪恨却把餘杯奠蒯通題段太尉廟前人近甸蒙塵日南梁反正年飄流茂陵碗零落太官椽建纛非降楚披圖異録燕堪嗟侍中血不及御衣前湘妃廟前人劉表荒碑斷水濵廟前幽草閉殘春已將怨淚流斑竹又感悲風入白蘋八族未來誰北拱四凶猶在莫南巡九峯相似堪疑處望見蒼梧不見人竹郎廟薛濤竹郎廟前多古木夕陽沉沉山更緑何處江村有笛聲笛聲盡是迎郎曲謁巫山廟韋莊亂猿啼處訪髙唐路入煙霞草木香山色未能忘宋玉水聲猶似哭襄王朝朝夜夜陽臺下為雨為雲楚國亡惆悵廟前多少柳春來空鬬畫睂長文苑英華卷三百二十
