body:
  text: 文苑英華巻一百四十八宋李昉等編草木六採蓮賦一首秋蓮賦一首長樂花賦一首庭莎賦一首蓮蘂散賦一首採蓮賦并序王勃昔之賦芙蓉者多矣雖復曹王潘令集作陸之逸曲集作興孫鮑江蕭之妙韻莫不權陳麗美粗舉採掇豈所謂䆒厥艷態窮其風謡哉頃乘暇景歴睹衆製伏翫累日有不滿焉遂作賦曰非登髙可以賦者唯採蓮而已矣况洞庭兮紫波復瀟湘兮緑水或暑雨兮朝霽乍凉飈兮暮起黛葉集作質青跗煙周五湖紅葩絳蘤電鑠千里尤見重於幽客信作謡於君子爾其珍族廣茂淑類博𫝊集作𫝊鮮藻河渭之空曲被沮漳之淪連集作漪漣燭澄灣而爛爛立集作亘脩漲之田田豈直水區澤國江漘海壖是以吳娃集作姬越艷鄭婉集作媚秦妍感靈翹於上朔集作節悦瑞色於中年錦㠶映浦羅衣塞川飛木蘭之畫楫駕芙蓉之綺船問子何去幽潭集作澤採蓮已矣哉誠不知其所以然賞由物召興以情遷故其一作所非遊泳一致悲欣萬緒至若金室麗妃璇宫佚女傷鳳臺之寂寞厭鸞扄一作鴈扄之閒處侍飲南津集作洲陪歡北渚見磯岸之紆直覿旌旄集作旐之低舉上苑神池芳林御陂樓隂架沚殿彩乗漪張拜洛之容衛備横汾之羽儀簫鼓發兮龍文動鱗羽喧兮鷁首移咸靚粧而麗服各分騖而竝馳蘋縈槳疑作將礙荇觸船危視雲霞之沃蕩望林泉之蔽虧洪川泱泱四字集作洪水决决兮菡蓞積緑集無緑字水湛湛兮芙蕖集作蓉披惜時嵗兮易晚集作惜嵗時兮易暮傷君王兮未知折紺房與緗菂攬紅葩集作續及碧枝廻綃裙集作裾兮竊獨歎歩羅韈兮私自竒莫不驚香悼色畏别傷離復有濯宫年少期門公子翠髪蛾眉赬唇皓齒傅粉蘭堂之上偷香椒屋集作房之裏亦復銜恩激誓佩寵緘愁承好賜之珍席奉嬉逰集作宴之彩斿繡棟曛兮翠羽帳瑶塘曙兮青翰舟搴條拾蘂沿波泝流池心寛而藻薄浦口窄而萍稠和橈姬之衛吹接榜女之齊謳去復去兮水色夕採復採兮荷華秋願承歡而卒嵗長接集作奉席而寡仇於時薊北無事闗西始樂霧静江垠氣恬海寞集作漠消集作寢恠氣於沅澧集作湘照榮光於河洛殊方異類舞詠相錯王公集作侯卿士歌吹並作則有侯家瑣第戚里芳園穿池㶚岸之曲蓄水河陽之源隄防谷口島嶼轘轅嘉木畢集作異植靈草具繁集作綺麗且繁沉桂北之丹藕播集作濯荆南之紫根欝萋萋而霧合燦曄曄而霞翻洎乎氣徹都鄙景華川陸麥雨㣲凉梅飈集作颸淺燠命妖侣於石城嘯娯朋於金谷乃使緑珠捧棹青琴理舳樽芳醪藉珍餗汎玉潭之瀰漫遶金渠之隈隩石近水而苔濃岸連集作匝山而樹複排芰末而争逺託蘆間而競逐赴汨凌波飛袿振羅集作踐褥風低緑幹水濺黄螺上客喧兮樂未已美人醉兮顔將􅋳畏蓮色之如臉願衣香兮集作而勝荷徘徊郢調悽慘燕歌念窮歡於水涘集作曲誓畢賞於川阿結漢女邀湘娥北溪花尚集作蘂向宻南汀花更多恨集作惜光景兮不駐指芳馨兮謂何若乃南鄢集作楚義妻東呉信婦結䄜整佩承筐奉帚忽君子兮有行復良人兮逺征南討九真百越北戍雞田鴈城念去魂駭相視骨驚臨枉集作春渚之集作兮一送見秋潭兮集作之四平與子之别煙波望絶念子之寒江山路難水淡淡兮蓮葉紫風䬃䬃兮荷葉丹剪瑶蒂而猶欷集作恨獨折瓊英而集作兮不歡既而緣隈逗浦還栧歸㯭睠芳草兮已殘憶離居兮方苦延素頸於極漲攘皓腕於神滸惜佳期兮未日一作末由徒増思兮何補又若倡姬蕩勝命侣招羣淇上洛表湘臯汝濆望洲草兮翡翠色動浦水兮驪龍文願觧珮以集作而邀子思褰裳而從君恐集作悲時暮愁日曛鳴鐶釧集作佩兮響窈窕艷珠翠兮光繽紛憐曙野之絳氣愛一作望晴天之碧雲棹巡汀而栁拂船向渚而菱分掇翠莖以翳景襲朱蕚以為裙艇楫凌亂風流雨散鳴桹絡繹霧罷煙釋狀飛蚪之蜿蜿若驚鴻之奕奕艇怯奔潮篙憎淺石絲著手而偏遶刺牽衣而屢襞廼有貴子王孫乗閒縱觀何平叔之符彩潘安仁之藻翰稅龍馬於金隄命鳬舟於石岸錦纜翻洒銀墻照爛日側光沉風驚浪深紆北渚之新贈恣東溪之宻尋鴛鴦繡彩之文履瑇瑁瓊華之寳琴扣舷擊榜呉歈越吟溱與洧兮葉覆水淮與濟兮花冒潯值明月之夕出逢丹霞之夜臨茱萸歌兮軫妾思芍藥曲兮傷人心伊採蓮之賤事信㤀情之盖寡雖迹兆於水鄉遂風行於天下感極哀樂聲參鄭雅是以緬察谷底窮覽地維北盡豐鎬澇潏南究巴集作江沲越沂莫不候期應節沿濤汎湄薄言採之興言報集作服之發文扄之麗什動幽幌之情詩使人結眷令人相思宜其色震百草香奪九芝棲碧羽之神雀負青􅀈之寳龜紫帙流記丹經祕詞豈徒加繡柱之光彩曄文井之華滋已矣哉向使時無其族代乏厥類獨秀上清之境不生中國之地學鸞鳳而時來與鶼鶼而間至必能使衆瑞彩没羣貺色沮湯武齋戒伊臯虚集作延佇豈俾夫楚集作秦童趙僕倡姬艷女狎而翫之擷而採之乎時有東鄙幽人西園舊客常陪帝子之輿經侍集作在天人之籍詠緑竹於風曉賦彤管於日夕集作賦朱華於月夕暑往寒來忽矣悠哉蓬飄梗逝天涯海際似還卭之寥廓同適越之淫滯蕭索窮途飄颻一隅昔聞七澤今過集作遇五湖聽菱歌兮㡬曲視蓮房兮幾株非鄴地之宴語異睢苑之歡娯况復殊方别域重瀛複嶂虞翻則故鄉寥落許靖則生涯惆悵感芳草之及時懼脩名之或䘮誓剗跡潁上棲影渭陽枕箕岫之孤石汎磻溪之小塘餐素實兮吸絳芳荷為衣兮芰為裳永潔己於丘壑長寄心於君王且為歌曰芳草集作芳華懼脩名集作懼功名竒秀兮異植紅光兮碧色禀天地之淑麗承雨露之霑飾集作華飾蓮有藕兮藕有枝才有用兮用有時何當婀娜華實移為君含香藻鳳池秋蓮賦并序宋之問天授元年勅學士楊烱共一作與之問分日一作直於洛城西入閣一作閤每雞鳴後至羽林仗閽人奏名請龜契佇命拱立於御橋之西玉池清泠紅蕖菡萏謬履扄闥自春徂秋見其生視其長覩其盛惜其衰得終天年而無夭折者良以隔礙仙禁人莫由見向若生於瀟湘洞庭溱洧淇澳即有呉姬越客鄭女衛童芳心未成採擷都盡今委以白露順以凉風榮落有期私分畢矣斐然願歌其事久之乃為秋蓮賦焉若夫西域秘掖北禁仙流見白露之先降悲紅蕖之已秋昔之菡蓞齊秀芳一作芬敷競發君門閟若一作兮九重兵衛儼兮千列緑葉青枝緣溝覆池映連旗以摇艷輝長劒兮陸離疏瀍兮引一作裂糓交流兮相沃四遶兮禁營一作丹禁三入一作帀兮承明曉而望之若霓裳宛轉朝玉京夕而察之若霞標的爍散赤城既而秦女艷日兮鳳鳴又似洛妃拾翠兮鴻驚足使瑶草罷色芳樹無情複道兮詰曲離宫兮相屬飛閣兮周廬金鋪兮璧除君之駕兮旖旎蓮之葉兮扶踈萬乘顧兮駐綵騎六宫嘉一作喜兮停羅裾仰山遊而徳澤縱𤣥覽而神虚豈與夫溪澗兮沼沚自生兮自死海沂兮江沲萬里兮煙波汎漢女逰湘娥佩鳴玉戯清波一作渦中流欲渡兮木蘭楫幽泉一曲兮採蓮歌江南兮峴北汀洲兮不極有芳意兮何成一作既有芳兮莎成長無艷一作依兮水國豈知移植天泉飄香一作香飄列仙嬌紫臺之月露含玉女之風煙雜芳一作葩兮昭属一作燭衆彩兮相宣鳥翡翠兮丹一作舟青翰樹珊瑚兮林碧鮮夫其生也春風晝一作盡蕩爍日相煎夭桃盡兮穠李滅出大隄兮火一作艶欲燃夫其謝也秋灰度琯金氣騰天宫槐疎兮井梧變摇寒波兮風颯然歸根息豔兮八九月乗化無窮兮千萬年越人望兮已長久一作久長鄭女採兮無由緣何深葉之能固何香名一作穠香之獨全别有待制揚雄悲秋宋玉夏之來兮翫早紅秋之暮兮悲餘緑禮盛燕臺人非楚材雪霧圖兮蘭為閣一作閤金銀酒兮蓮作盃落英兮徘徊風轉兮衰頽入黄扉兮灑錦石縈白蘋兮覆緑苔寒暑忙忙兮代謝故葉新花兮往來何秋日之可表一作哀託芙蓉以為媒長樂花賦并序蘇頲蜀太守庭際有紫華草秋中始繁英露洗冬早尚且一作直本霜封蕪雜大同於衆卉盛衰小異於羣物余訝而未識吏或告余曰此長虞所賦蜀長樂花也故心暗賞焉因口授書吏遂黙而成作恨不見古人所為得髣髴其㫖爾夫長者以短長之形度其長者一作則至美夫樂者以哀樂之類同其樂者一作則至喜長也樂也吾安得而聞之嘉纎植之並用偉令名兮在兹徒見其豐族苯䔿髙標璀璨莖丹外而縞中葉縹分以紅貫綴緑頴之重疊索紫蕤之爛熳廹而象之君子其常或㣲或章聳危冠兮纓若綬黙退静其何望逺以意之佳人欲翔炫炫煌煌重羅綺兮撲摇一作璞瑶翠蹇來思而未嘗匪以幽兮自直匪以直兮自藏匪以晚兮自耀匪以耀兮自强文濁露之均灑庇清舒之汎光本無嫌於散地甘有寓於殊方然則太液初滿上林新霽䒠茸灼爍萬品千計摇瑞色而函芝雜竒葩而轉蕙孰與夫玉堂金闕一作閣之徧一作偏賞白日青雲一作春之特麗嵗不與兮時向闌風蕭蕭兮夜漫漫賔逺鴻於沙塞呌離鶴於江干君曽不見三月華矣盡林間之稿木千霜殞矣亦庭下之枯蘭懿此常度陵於早寒假春期而不採一作彩雖秋令而不殘衝雨散之飛薄任雲山之險艱一作難芳弗珍於靃靡節常慕於檀欒吾則知樹背之奚託傾心之可安如後凋之是貴㒺獨立其誰觀文學掾起而為辭曰白露瀼瀼何草不黄紫華的的一作灼灼生君之堂彼不伐兮秋自翳時或珍兮君是恵形一作彤庭赫兮朱草駢交屈軼兮友賔連伊榛莽而荒些君曷為兮賦旃庭莎賦并序蕭頴士天寳十載集作十有二載予以史臣推擇待詔闕下僻直多忤連嵗不偶未選叙集作未以選叙求參河南府軍事府尹裴公以予浮名枉顧遇焉而尹之外姻或綰紀綱之局怙勢矜權求府僚降禮於己予清慎自守不能附會爰逝我陳詩胡逝我陳注陳堂塗也集作隟非嫌怒遂構又同官多貴遊右戚酒食之會絲竹之娯無間旬朔予人集作受質鄙野雅不之好常願鷗鳥為儔江海是處往嵗久逰剡集作吳中將遂終焉朝㫖廹召故不獲展著白鷴賦以寄斯意至是欝悒彌用増想㕔堦之下溪集作爰有莎草故叅軍宋之問徙於伊川而植焉結根五紀綿羃庭際廣累萬歩髙樹十餘間以雜果隂蔽其上俗吏往來必凌踐之歎其禀山野之姿而託非其所以就窘廹因而賦曰集作云厭公門之窘束玩纎草於兹亭奚卑弱之斯極豈雨露之愆靈尚含和以順時隨春夏之凄清集作而凄清軒房洞啟廣階脩直槐楊蔽虧桃李集作珍果對植横層隂之𡨕宻綴繁英之翕赩既髙低以異姿亦濃淡而殊色胥徒牒訴雜沓乎其側逰塵浮烟蒙翳而不息雖蕭颯以自得亦喧卑集作闐而見逼宜夫坐莽集作漭浪之野帶江湖之涘託集作結根山阿摇頴緑水芊綿靃靡連亘乎十數集作百字里何推遷而連會繆産蒔於庭隅憂好尚之傾奪見芟夷於難集作及除既無心於寵辱又奚議於集作夫親疎承滴集作斚瀝之甘潤蔽衣衿之曵婁雖為幸於斯日諒禀性之云殊聞哲王之布澤迨蕭葦而霑鋪苟一類而集作其失所猶納隍之在予矧皇穹之播氣陶庶彚於靈樞曷兹卉之攸託慘終年而莫舒吾將徴宰物之至理聿歸問於𤣥虚者焉蓮蘂散賦并序蕭頴士予同生繼夭集作殖􅉃戚所萃己未嵗夏六月旅寄韋城憂傷感集作成疾腫生於左集作右脇之下彌旬不愈楚痛備至友生于逖張南容在大梁聞之以言於方牧李公公予之舊知也俯垂驚嗟逺致是産題曰蓮蘂合合字集作命和之以蘇用附腫上又覆以油帛以羃集作宻之其瘳如洗一夕復故感恩歎異於以賦焉彼散維黄曰蓮之蘂有輕其質如雪伊灑君子賚焉厥疾遄已揆艱疾集作疚之永戚矧覊孤一作旅之逺情諒積悲而成疢爰被腫而集作之斯嬰遘徂夏之赫曦蹇憂虞於此城堆以壅蓄介於腰腹如煙集作熛斯焮如蠆斯觸靡宵靡晝莫獲偃伏亦既浹辰寘予於毒惴然集作焉其恐兮如集於木幸于張之久要干至貴而為言感知已於名公降踰涯之厚恩旅信宿以集作而問至致良散以集作之斯存於是滫以蘇膏羃集作瑾以油帛兹焉塗附未始竟夕有瘳如神兮厥痛斯滌彼挂㠶而奔駟曽莫速乎靈跡雖兼金而集作與製錦豈厥價而能集作之云敵異哉討竒篇於緑帙搜秘巻於青囊奚要術之備列獨無聞於此方苟佳名之是徴乃菡萏之餘芳原夫託根清泚敷蘤馨香宜蠲穢而蕩邪救吾人之疾集作疵瘍於以用之終焉允臧愷悌君子徳音不忘昔禽蛇之見拯尚有答於集作乎隨噲矧圓首之為貴聿稱靈於覆載慙力㣲而施重懼殞墜於酬戴集作載蓮之蘂兮永以為佩文苑英華巻一百四十八
