body:
  text: 文苑英華卷六百五宋李昉等編太子公主上請僧請附皇太子請停幸東都表一首皇太子請家令寺地給貧人表一首皇太子請放罪囚表一首皇太子請復膳表一首皇太子請起居表一首皇太子請給庶人衣服表一首皇太子請脩書表一首皇太子請加相王封邑表一首為太平公主請住山陵轉一切經表一首為太平公主辭欲起新宅表一首為魏國北寺西寺請迎寺額表一首為人請子弟出家表一首為東都僧等請留駕表一首為洛下諸僧請法事迎秀禪師表一首皇太子請停幸東都表高宗崔融臣某言臣聞乘雲駕羽者非以逸樂其身觀風設教者將以𢎞濟於物故後予胥怨幾一作􅔵望湯來吾王不遊嘗思禹會伏惟天皇大帝道敷皇極一日二日智周於萬幾先天後天化成一作行於四序雖鴻名已建銘日觀而知尊而膏澤未流御雲臺而不懌市朝之邑天地所中四方樞一作極會百物阜殷爰降恩旨行幸東都然以星見蒼龍日纒朱鳥清風用事庶彚且繁桑翳葉而眠蠶麥飛芒而雊雉詳求易緯是君無發衆之辰博訪禮經當人急勸農之月固未可陳詩展義拜洛觀河况序屬亢一作正陽時方避暑露臺風舘尚多薫灼之勞帳殿帷宫將有鬱蒸之弊天皇昔常服餌近更躬親睿情勤苦天儀憔悴若何以萬乘之重四海之尊暴露而行旰日而食者也加以官僚扈從或少資糧程期迫促未遑周辦必若事應廵狩一作省務從寛恤猶望白露凉風然後清畿洒道下不違於人欲一作願上無隔於天心可舉而行庶幾於此臣又聞關中屬縣畿内傍州百姓驅馳頗多饑餒天皇仁深覆育並令賑贍求轉徙者任其逐糧欲寧居者加其廪食家懐再造人得安全乞至秋來不煩聖慮特乞少留𤣥鑒俯察丹誠廻太陽之末光納蒙泉之餘瀝臣三朝問寢常候色於宸慈五日詣臺每承言於聖奬輙陳冗職輕進芻詞踏地知驚窺天自失無任私懇之至謹遣某官奉表以聞皇太子請家令寺地給貧人表前人臣某言臣聞法天之道義屬於有餘象地之宜理存於益寡頃以咸城近縣鄜市傍州頗積風霜或侵苖稼天皇兩儀合德百姓為心發倉廪以賑貧人垂雨露以滋㣲物俗荷財成之施家懐亭毒之恩臣濫奉宗祧親承覆載歳時衣服咸憑府藏之餘朝夕膳羞必佇饔餼之辦過此以往臣亦何求但知問竪寢門尊師胄序魏兩文儒之盛竊所係心漢儲湯沐之資未嘗留意但關輔之地萌庶孔殷丁壯受田罕能充足所以水旱之歳家室未豐正末端本思有裨助臣家令寺有地九百餘頃特請廻授關中貧下等色雖地非安邑寧期千户之封而價等露臺虛費十家之産伏乞皇恩逺及聖澤旁流矜臣愚効遂臣誠請謹遣某官某奉表以聞皇太子請放罪囚表前人臣某言臣聞堯舜推心諒因於百姓禹湯責已必在於至一作庶人頃以炎亢踰時資儲頗乏天皇情勤戒慎務切憂勞發倉廪以賙窮罷珍羞而酌損紅粟未阜愈兢御朽之懐白粲有形特軫推溝之念爰降恩㫖俯加寛恤凡在生靈不勝鼓舞然以和風所被蘭芰同榮膏雨所流公私並潤徒刑之軰已沐於深慈杖罪之流未霑於厚渥且五刑之内笞坐為輕兩造之間原情可恕時當慘勁命甚漂浮因兹决罰或從顛躓伏乞迎春布澤應天道而無違任地成功順人時而不奪使三農有望萬物知歸臣濫守儲闈叨陪帝幄乾坤覆載荷至德而徒深日月昭明在末光而何助無任區區之至皇太子請復膳表前人臣某言臣聞善持國者舒慘必繫于天時德稱皇者動静莫違于物理故百姓不足一人所以載懐四海為家萬方由其在慮伏惟天皇觀風設教拜洛遊河光華前乎日月法象齊乎天地頃以歳儲㣲耗年糓未登睿㫖憂勞宸一作冲情戒惕菲飲食而卑宫室居常夏禹之期减厨膳而徹一作撒鍾懸重取黄軒之事由是神靈肹蠁景氣氤氲雪千里而朝飛雨四溟而夜下兩河之甸瑞麥盈疇三川之境嘉苖被隰天意人事其在兹乎可以隨道抑揚可以與時通變周王之本枝百代每進鱻庖殷帝之亢旱七年猶資鶴鼎昔賢具稱其美往聖不議其非唯此小心將乖大德臣又聞下之奉上猶枝附根君以人作基人以君為命天皇恩深子育念切家安損己勵精無違早晏停滋罷味已隔歳時聖躬有勞悴之容羣類動兢惶之責伏乞俯從人欲仰順靈心具珍物以登羞隨太陽而復膳􅛋莆知送凉之地芝英識駐壽之期豈使眇眇燧皇獨流名於膰炙悠悠黄帝空紀稱於庖犧而已哉臣寄忝元良任當監守春冬胄序學書禮而空勤朝夕寢門視寒温而未即無任悃欵之至謹遣某官奉表陳請以聞皇太子請起居表高宗前人臣某言今月某日起居舍人某至一作還伏承聖躬頃稍不安今已痊復手舞足蹈慶躍兼深臣聞孝於事親為子之方以一作已極恭於奉上為臣之道則先臣自違侍軒墀已淹時序周儲故事一日三至於寢門晋兩一作室舊儀一月五朝於左一作龍閣今之望古臣獨何人日者瀝膽陳祈焦心覲謁伏惟天皇以關河鎮重監守務殷睿㫖冲邈未垂矜亮今既十月築場三農事隙特乞暫流恩召俯念單誠遂以起居假以時月得晨拜旒扆遂一作展臣私情則暮辭闕庭在臣無恨不勝戀慕之至謹遣某官奉表陳請以聞一作皆唐類表皇太子請給庶人衣服表前人臣某言臣聞心有所至諒在于聞天事或可矜必先於呌帝庶人不道徙竄巴州臣以兄弟之情有懐傷憫昨者臨發之日輙遣使㸔見其縁身衣服㣲多故弊男女下從亦稍單薄有至於是雖自取之在於臣心能無憤愴天皇衣被天下子育蒼生特乞流此聖恩霈然垂許其庶人男女下從等每年所司春冬兩季聽給時服則浸潤之澤曲霑於螻蟻生長之仁不遺於蕭艾無任私懇之至謹遣某官奉表陳請以聞皇太子請修書表前人臣聞昔者明王學以化人成俗古之君子文以緯地經天雖有閬風之高嶽弗登弗知其峻也雖有浴日之巨溟弗涉弗知其廣也伏惟天皇域中居大天下化成百官以理萬人以察日行中道而淑清歳起攝提而位序光薫萬物豈直芝珥蓂􅟏澤加一作施四海寜惟壽麻孤竹地成形而天成象其道彌光河出圖而洛出書其徵可驗環林璧沼金門石室墳典積于邱山筆墨盈于泉海聖朝多士自可包二代之文臣顧不才何足奉三王之教皇慈渥洽帝奬優隆擢公望為太師徵子房為少傅所冀習與智長化與心成嘗辛苦於歳餘終未階於日就臣聞學者殖也問以辨之積必有成勤則不匱以周公之上聖日讀百篇以孔父之多能韋編三絶臣雖不敏竊所庶幾然以列代遺章先王舊典康成興業纔覽卷於八千士安覃思願加年於累百豈不以學而時習博則難精者乎今欲搴其蕭稂撮其樞要可以出忠入孝可以益國利人極賢聖之大猷盡今昔之能事商榷百氏勒成一家庶有代於箴規長不違於左右又近代書鈔寔繁部帙至如華林園徧畧修文殿御覽壽光書苑長洲玉鏡及國家以來新撰藝文類聚文思博要等竝包括𢎞逺卒難詳悉亦望錯綜羣書刪成一部藝官賔舘亦既天皇立之矣端士正人亦既天皇致之矣伏乞俯從㣲願特降鴻私許臣撰緝遂臣誠請當宫學士如少仍望通取京官謹當開桂樹之山鑿芙蓉之水引甘泉之詞賦㹅望園之賔客下芸閤而長謠臨梓厨而高㑹一遊蘭芷佇變蓬麻區區之誠敢希矜允豈使肅城門内唯傳魏國之名崇政殿中獨紀晋朝之事而已無任誠懇之至謹遣某官某奉表陳請以聞皇太子請加相王封邑表李嶠臣某言臣以相王旦發彩璿蕚承流寳𣲖雖班彛錫瑞既同於伯叔之封而食采苴茅不逮於子男之國敢縁敦叙之義輙獻由衷之誠而葵藿傾心徒希皇矣之鑒雲霄絶望不流霈然之澤惝怳如失徘徊増佇臣某誠惶誠恐頓首頓首死罪死罪臣聞命以車服錫之土田實將共安邦家永固宗祏炎漢之開藩樹屏㕓開七十城隆姬之書社建侯封疆四百里故知業隆者基大本盛者末豐涯涘濶而潤澤深枝條繁而庇䕃逺伏惟皇帝陛下握河開歴截海凝圖化緜於商夏之朝地廣於唐虞之域裁舊典之損益補前王之闕漏萬官咸事百度以貞雖穆穆之風具宣於政理而親親之道或廢於揖謙至今骨肉禮薄藩維業曠曲阜之特高才藝仍减附庸平臺之深篤孝慈僅留湯沐徽章空列於五等禄秩不踰於九命曦舒兼曜之德乆被於寰中雲雨曲成之恩翻遺於膝上異强幹弱枝之道違先親後踈之意非所以上崇王室下睦帝姻况天垂後星承髮膚者蓋尠卦膺習坎奉晨昏者非衆荷圓穹之寳覆藉厚載之珍腴若令寵數不加等威無辨便是卑萬乘之尊䕃缺四海之遐瞻蠻貊荒陬猶知不可衣纓士庶孰謂其宜伏念天倫深惟國體情實存於公道理不涉於私求伏願曲降聖慈俯收愚懇愜乆逺之大義抑冲撝之小節疇咨故實申命有司劃以山川優其井賦剖符開國依希魯衛之親盤石居宗髣髴應韓之躅明鳲鳩均養之惠慰鶺鴒同氣之心使麟趾式安犬牙愈一作逾固則洪恩所被允及於萬方靈貺一作慶所覃豈惟於九族無任悃欵屏營之至謹遣某官某奉表陳請以聞為太平公主請住山陵轉一切經表前人妾某言妾生涯有縁仰繫皇極孝行無感上傾乾䕃號天罔極扣地不追集蓼萌心茹荼泣血自攅開東洛紼下西秦氣朔遄移光靈浸逺怨晨昏之易隔悲節叙之難留舉目摧傷觸途殞裂今橋山已祔灤水還封二曜停臨九天絶仰慟遺弓於此日思稅駕其何年追想平居永惟曩載粤自襁褓迄於成立鍾慈結愛殆欲蒙携於掌中候色承顔何嘗暫離於膝下方倚南山之固長承北極之尊豈圗就養之歡遽乖於扇枕問安之地翻類於過隙念㐫妨而自咎思顧復以何酬所冀扶杖墳塋結廬山隧瞻奉觴奠依憑園寢終三年之禮企及通䘮轉一切之經庶邀冥福上以資未來之果下以攄罔極之心伏惟陛下孝通神明仁洎草木乞體荒疾特埀憐許使烏鳥㣲志獲與耘禽致哀犬馬孤誠得從耕象申慕則窮喘無恨餘生知幸無任哀切之至謹附使具官某奉表陳請以聞為太平公主辭欲起新宅表見五百七十八卷前人為魏國北寺西寺請迎寺額表武后李嶠沙門臣某等言竊聞加隆園寢漢道以光潔誠宗廟周卜惟永斯但禮極崇奉事昭嚴配未能遵揚七覺酬顧復於前生幽贊三途樹津梁於後刼伏惟聖母神皇陛下中天構極截海凝圖懸法日而貞觀汎慈舟而利涉天經地義之德率禮因心奉先追逺之誠宅縁證果𢎞濟深於㝠境薫修入於梵門天子之孝感隂陽而通鬼神聖人之心刑萬邦而被干祀乃者深發睿思永懐遺躅襜帷轍跡之所盡建寳坊南北東西之城咸脩法宇佛刹周於天壤寺名因於國號自崇陽改謚奉明増邑雖配天盛典已革於常數而净境大名尚題於舊額是以稻麻衆侣葵藿㣲心願𢎞金石之名思降瓊瑶之禮疑作札愚言聖澤已蒙昭許日往月來未遑迎致今望以九秋嘉節七月良晨當蓂莢之初滿屬盂蘭之始獻勝幡香蓋延寳字於金門法鼓天花奉鸞書於象闕俾夫道路瞻仰虛空㖵讃高懸銀牓豈惟天地之宫列署瑤房逺邁神仙之宅某等或枌榆故社或桑梓舊京謬叅龍象之筵預奉衣冠之列白雲千里瞻帝鄉而極目朱門九重望宸陛而延首倘皇慈曲被人願不違則八部式歌四海知幸無任懇倒之至為人請子弟出家表陳子昻臣某言臣以險舋私門不造亡父故某官先臣某早先朝露永謝休明日月不居星紀云暮伏以先臣榮綰章綬累忝榮私三歴名卿職叅於河海八居㹅守任切集作叨於股肱而報効莫聞零落先及啓足英華作發足非之日露首知慙是以臣克奉誥集作話言志期㝠報請以當家子弟三兩人奉為高宗大帝出家歸道而孤煢在疾遺嘱未申奉以哀號實貫心髓今者高宗大帝登仙之忌已及兹辰先臣懇誠未効他日所以乞遂㝠願敢覬天恩庶菩提之因發揮於正覺湼盤之證幽讃於宸階先臣夙心無恨於集無於字泉壤伏願上天降鑒㣲誠可哀因縁獲展存没交慶不勝崩廹之至為東都僧等請留駕表中宗宋之問臣僧某等言臣伏見某日月勑以今月十九日集作今年九月將幸長安東都道俗不勝攀戀伏惟應天皇帝陛下重興靈命再造黎元域中懐三聖之恩天下識吾君之子關西帝宅渭北神臯思切園塋未謁長陵之樹貴為天子不歴咸陽之宫宜應萬乘廵遊展鎬池之新慶三秦故老覩漢家之舊儀率土顒顒孰不欣躍但以先後神寢夏首方成太子仙墳秋中未畢王主陪奉更促工徒雖力以子來而頗妨農事倘千官扈輦同費太倉之粟萬國來庭共索長安之米將何給用以濟公私且東都有河朔之饒食江淮之利九年之儲已積四方之賦攸均誠宜宅幸三川寛徭八水稍登稔歳方事歸鑾以欲從人孰不幸甚則天聖后乆成佛果俯應輪王冀發無邉之巨願光有為之妙福經始大像年籥滋深愧緇流之净財念蒼生之苦力俯從羣議莫遂聖情陛下孝感傍通冲襟獨斷追成先志上合天人故得蓮礎未施為停風雨梅梁鬰起若有神明施其力者萬殊莫分龍鬼捨其財者千計豈辨人祗岌已集作以干雲程之匪日實冀金輿近幸玉輅親臨禮如來之大身畢先聖之遺㫖然後載詣京輔馳謁山陵即付嘱無違情禮兼極無任懇欵戀慕之至為洛下諸僧請法事迎秀禪師表前人僧某等言某聞住持真教先憑帝力導誘將來逺屬能者伏見日月勑遣使迎玉泉寺僧道秀陛下載𢎞佛事夣寐斯人語程指期朝夕詣闕此僧契無生至理傳東山妙法開集作門室巖集作齋居年過九十形彩日茂𢎞益愈深兩京學徒羣方信士不逺千里同赴五門衣鉢魚頡於草堂菴廬鴈行於竹帛集作丘阜雲集霧委虛往實歸隱三楚之窮林繼一佛而揚化栖山好逺乆在荆南與國有縁今還豫北九曲集作江道俗戀疑作愛之如父母三河士女仰之猶山嶽謂宜緇徒野宿法事郊迎若是集作使輕來赴都遐邇失望威儀俗尚道秀所忌崇敬異人和衆之願倘得焚香以遵法王散花而入道塲則四部銜恩萬人生善無任懇欵之至謹詣闕奉表請與都城徒衆將法事往龍門迎道秀以聞輕觸天威伏深戰越文苑英華卷六百五
