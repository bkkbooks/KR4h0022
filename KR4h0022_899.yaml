body:
  text: 文苑英華卷九百宋李昉等編職官八東宫官一周太子太保步陸逞碑一首唐贈太子少保劉知柔碑一首唐贈太子少保崔公碑一首周太子太保步陸逞神道碑庾信公諱逞字季明本姓陸吳郡一有吳字人也君子至止既紹虞賔鳯凰于飛實興齊國南越使者解漢帝之衣西陵將軍覆吳王之蓋曽祖載為宋王司馬留鎮關中赫連之亂仗劒魏室黃河參陵或亡追路烏江艤船更無歸迹今為河南洛陽人也髙祖冠軍將軍營州刺史吳人有降附者悉領為别軍自是官師擁鐸更為吳越之兵君子習流别有樓船之陳父政驃騎大將軍儀同三司恆州刺史中都獻公太祖扶危濟傾經綸夷阻報君之恥逺襲平原以髙平霸業所基委命留事關中餽食非直滎陽之師河內供軍豈但淇園之竹公秉照晉之靈降明神之德猛虎振檻七年不驚羝羊觸藩九齡能對諸兄以公先君愛子稱之曰仁推而襲封雖復季末大成之心守節疑有闕誤既遭燻穴翻從壓紐太祖初封函谷始合諸侯以公詞令參謀機密故得戎政克宣師言無漏賜姓步陸孤氏委鹿輅而論都入鴻門而舞劒方之吹律綽有餘榮出身羽林監輕車將軍除尚書右丞官聨會計務殷平凖水衡貫朽常平粟紅授使持節車騎大將軍儀同三司增邑千户尋遷駕部中大夫領兵部中大夫領蕃部疑誤東京鼎實先加鄧隲之勳西晉官人多用山濤之啓豈若五王登朝必司賔主之禮六龍御轡定取鸞和之節御正以官觸父名不拜會稽有王會之名其子不為太守博陵有王沉之封其兒不為刺史遷驃騎大將軍開府入掌納言治司宗伯又為軍司馬職居常伯勤問於南宫位管王言連官於北斗豈止郊天祀地龍門嶰谷之聲贊鼓頒旗白露涼風之月暗夜有人餉羅數十匹公閉門不受行人干觸具以聞奏朝野稱之太尉楊震髙疑作直推故吏之金涼州張奐髙揖羌人之馬清畏人知我無慙德齊國通和封人受使以公有出境之才見命張旜之禮既珠盤歃血定楚國之連名七首登壇反齊人之侵地是謂使乎固稱光國久疑輔公侯五陵鐘鼎桐街柳市塵起風飛乃授京兆尹增邑通前一千六百户餘官如故上林兵息蘭池盜靜不學王陽平生鑄金之術未同張敞終日章臺之逰家僮暮行還得遺錢於道并白絁十匹公訪得其主即以還之見金於路指以示人得錢於道留持挂樹方之今日異代同風俄遷司會治小司馬重總六軍再操八柄考績入於嵗成論功書之年表尋授冝州諸軍事冝州刺史露冕觀風停車待雨百城解印憚朱穆之威千里相迎受王基之德曽未期月被敕追還眷眷吏民不無河內之請依依故老實念黎陽之别少陽養德前星守器尊師讓齒必俟賢能乃授太子太保方之劉實道髙於大邦疑作郡譬以山濤榮深於小輦本有消渴之疾常餌金石自理舊疾微增奄捐館舍茂陵之下不留封禪之書校尉之營惟餘服食之器嗚呼哀哉春秋四十有七建德二年五月十一日也天子以大臣之喪躬輟聽訟東朝以師傅之尊親臨攢祭詔贈某官本傳作贈大將軍諡某公禮也以今三年正月十日葬於京兆之髙陽原夫人郁久閭西遇王姬愛敬肅恭言容令淑有聞針爨無廢紘綖爰在盛年先從大夜今節婦開墳松柏已拱季孫成寢丘陵始同况復圖畫賢妃一作姻方在甘泉之室瘞埋才子即用髙陽之原公儀表外明風神內照器量深沉階基不測事君惟忠事親惟孝言為世範行為士則留連墳索怊悵文詞霜府録於尚書天官總於司會出入匡贊常帶數職身具六龜腰恆四綬陳平密謀既非天子所見荀彧上䇿又非諸侯所聞其為郡也惟取赤土封書其為州也唯以青鹽換粟留家則千樹無資遺子則一經而已嫡子操至性過禮純孝不遺墳前之樹染淚者先枯庭際之禽聞悲者則下銘曰山連日觀水枕滇機富春沙起開陽柱飛大夫屈節將軍振威南越受吏西陵解圍昔我烈祖垂翅秦中白馬無路烏江不通笛吟鄉里琴哀土風營州恆州擁旄世載壯節旃襟人雄關塞直河穿趙平雲臨代生謂立功沒為留愛降兹嶽瀆誕此貞明祥符雲氣慶合星精宫惟定䇿殿柱書名忠泉暗漏孝笋寒生世屬殷周時逢楚漢天下三分鴻溝一半以我明略來參匡贊日乃再中天成兩旦遞參三事歷副六卿天師一作司光宅地載謨明春官定禮夏官治兵讖言默識溫樹無名謙恭周密言行無乖忠公兕殪隂德蛇埋軍國紛總部領瑱階一作偕馬不入廄金不入懷具瞻惟德髙山惟仰甲觀初登龍樓初上東國桓榮西京踈廣年齡俄頃風電相摧銘旌兩沒池桞雙廽煢煢胤子在一作御疚銜哀身彰野火心懼天雷日月其除榮終哀始馬歸司𨽻書還太史歷對天星墳連地市山勢接飛松形蓋起德音無絶平原忽矣唐贈太子少保劉知柔神道碑李雍雍聞古之常銓今之大寶或藉地因勢或經德自身或經疑樂國工或詞學時秀或貴盛終吉或等祀老成或廣孝聞家或納忠刑國有一於是則百斯慶書于牘大其聞矧乃揔集髙曽備致昆弟悉數以周稱同原而合流息女擇於賢夫胤子訓於良冶首止光寵出入震耀若此表裏者矣府君姓劉氏諱知柔字某彭城人也其先府君母弟銀青光祿大夫左常侍崇文館學士修國史子玄按史諜推之楚孝王囂之後粵若伯豫談經景瑜志學令言頴邁王喬名理回仁之撫綏內使之節義是以嗣前人食舊德鼓簧史傳柱石邦家其來逺矣髙祖魏驃騎大將軍北州刺史禕府君諡曰懿曽祖齊散騎常侍文林館學士岷府君祖朝散大夫陳留縣長玄邃唐宰相世系作隋留縣長務本府君考宋州司馬贈徐州刺史藏器府君莫不都長忠方簡質貞亮業行優絶政理殊尤府君稚節一成立年博逹典學為海懿文為林鎮重為山幽靜為谷清淡事約言遣理深謙常後身儉不逼下至若儀刑碩偉風神散逸立若尸祭坐若肅賔認金不爭闕馬引罪公庭絶於私議虛室造於玄門逺遺之觀一作覩物則一作得名顔子之聞一知十無以過也嘗以為權略多舋皎察不詳和令乃私靜勝而言一作立立一作言莫神怨行莫人誅固能陳無兵火無爇變奪物性延集福根然後至精啓純全德居厚崇化務俗樹德垂聲可也識者以為張華茂才荀彧逺略雖曰王佐則無天年今府君二者兼之一言得矣觀藝知巧覩葉知秋吉祿大來夀考休佑吾無間然矣逮計考甲科薄逰異迹宅憂殆滅有命從師辭爵廬墳受錫表闕黨錮光復佐職難疑作艱貞歷荆府司馬史氏詳矣自皇運啓聖清途授德典國胄司人曹拜司業兼侍讀漸也府君雅伏忠公固拒權寵耻或趨貴哲不易方出荆府長史復户部徙同宋二州揚益二府一淮南廉察再山東巡撫加銀青光祿大夫進爵彭城侯大府有四公居其三要轄有三公提其兩冡卿有九公自屬國二年尚書有六公以司空十載分爵有五公當侯伯之榮居守有一公兼宗祏之寄巡使有十公兼東土之俗疑輔有三公首儲宫之傅至於仁以養之義以行之慎憲以恤人闢土以祈榖制曰黃霸之奉法循理錫以髙車郭賀之惠化仁明加其冕服至於發貯賑施書板賦財已一作以字擊單于且平水土制曰出膺賢守則郡國循良入侯名臣則衣冠凖的俾遷榮於北斗冝作範於南宫夫如是有足以論道經邦助天開化增河海之渥澤近日月之景光府君止足發衷辭滿得地終讓八座還忌三旌聖上録德序功養老懷舊就成頥攝一作妾留連間矌制曰乃建儲二聿求賔客允兹懋官惟爾崇德府君固乞骸骨退守田園息疑作恩一作思命如第尚給全祿嗚呼日有昃嵗有除澤藏山風振海矧伊人也矧伊人也春秋七十有五以開元十一年六月十五日遇疾薨於東都康俗里之私第皇情震悼追褒荐及制曰簮纓舊德楨幹通才清以立身儉而率下出入三署綢繆兩宫曽不憖遺奄然喪逝言念遺老惻悼于懷冝寵贈章式旌泉壤可贈太子少保物二百假米粟各二百石葬日官供幔幕手力等太常考行諡曰文以某年月日葬于河南府緱氏縣景文山原禮也府君昔在平日深戒厚葬祖載服用子壻黃門侍郎宗子皓所營奉祀子某官某等追惟先志臨穴長號謹以焚之殆無遺者尚曰史册者揚乎名碑版者紀于迹今願杼哀敬却樵蘇發頌聲彰末嗣雍曰唯唯敢不十一千百焉其詞曰漢起沛楚封徐代一作氏則九慶實餘惟英秀閲一作粵卓犖㧾文史張禮樂諫而尊道而勝集百祿延周稱貴自取闕可榮弟紫紱壻黃門始孝思後忠烈歷中外偹名節嵗彌長聲更揚隱屬國老文昌懷逺圖忌太盛謝人爵委天命月有虧日有昃皇恩動物情惻猗孝子奉惟疑作遺訓服用薄哀榮順布史簡繼碑石名教開幽明激唐贈太子太師崔公神道碑李華禮之中庸曰父為士子為大夫葬以士祭以大夫是禮也於國為恩於人為孝朝廷贈趙公之先人故晉州司法參軍贈清河太守三至太子少師褒少師之德揚趙公之孝國之恩也書之洪範曰是訓是行以近天子之光趙公奉若少師之訓為國股肱翊大君之明可謂忠矣傳曰有明德者必昌於後世後必有逹人故叔梁紇有子曰文宣王陳仲弓有孫曰司空羣積德於身以垂厥後猶洪河廣大於涓流太山峻極於丘陵藴百行惟少師宣六德惟趙公父慈子孝移孝於忠盛矣哉維烈山氏以稼穡代畋漁伯夷以秩禮諧神人太公以大勳平禍亂季子以讓德辭社稷崔氏其後也有魏名臣琰降至宋度支郎中贈冀州刺史元孫隕身成名興起百代生魏吏部尚書左僕射貞烈公亮六為吏部郎三為吏部尚書再為大中正連部二千石一為大將軍歷侍中太常光祿大夫男為部官女為九嬪與伯父之子僕射休首出羣姓為海內甲門孫曰肇師以令望為中書侍郎以才辨為聘梁使中書孫諱道淹北齊安州㧾管椽生少師之祖諱方騫皇朝萬年主簿臨洺子臨洺子生少師烈考諱貞固皇朝武功主簿贈吏部尚書娶趙郡李氏新定之子髙都之姪中外之甲光標士林少師諱景晊清河東武城人也三嵗丁太夫人憂十二居武功艱號哭無時鄰里輟相終制讀書嵗不踐閾一覽數紙終身不忘年十七與親兄晙一舉明經同年擢第二十三一作三十二調補梁州南鄭縣尉以能政聞轉蜀州晉原縣尉以清白器幹為按察使倪若水表薦大理評事以親纍貶利州葭萌丞歷梓州鹽亭丞晉州司法參軍公風度詳雅器宇方深有道者悅之而不厭不仁者憚之而遷善蘧瑗在衛衛多君子子賤居魯魯有賢人若至聼詞必察臨事能斷吏不忍欺人不敢犯刺史齊景胄洎州長舉公清明中正差充支使畢構代齊假為判官開元三年終於官舍春秋四十權庴於邙山玄元廟西北原公之逝也宗族嘆曰孝可以動神祗而不夀僚友歎曰仁可以師天下而不貴聞者歎曰清可以激貪俗而不昌命矣天乎盛德不疑作必興冝其疑作有後也夫人滎陽鄭氏皇朝兵部郎中衛州刺史玄升之子吏部侍郎平章事愔之女弟以德範儀少師以才明訓趙公天寶十二年享齡六十九終於京兆崇賢里殯於長安南杜陵原有一子二女神龍中申明舊詔著之甲令以五姓婚媾冠冕天下物惡太盛禁相為姻隴西李寶之六子太原王瓊之四子滎陽鄭溫之三子范陽盧子遷之四子盧輔之六子公之八代祖元孫之二子博陵崔懿之八子趙郡李楷之四子士望四十四人之後同降明詔斯可謂美宗族人物而表冠冕矣在周則邵單為公族媯嬴為上國西京竇傅之貴東漢袁楊之盛魏一作晉以荀陳為德門南朝以王謝為髙望方之於公川谷江海也嗣子圖以文學早知名射䇿上第官歷臺省尋拜蜀郡長史兼御史中丞加節度使時安祿山起幽朔連陷潼關賫表腰金懇迎玄宗省表垂泣召宰相謂曰世亂識忠良今見之矣除中書侍郎益州長史節度等如故及乘輿至蜀朝廷羽儀如京之制終古難之肅宗幸彭原將復天下以劒南無事不假此人詔赴行在咨以締構扈從還宫日月並照玄宗獲申聖慈肅宗獲申聖孝鄼侯功大博陵賞尊一作髙詔曰一匡天下大庇生人遷特進中書令集賢殿大學士修國史封趙國公昔成王以曲阜命周公王曰叔父親親也以營丘命太公王曰叔舅賢賢也惟肅宗亦以趙國錫崔公今上以少師贈先公三代之極教也後轉太子少師兼御史大夫東京留守尋為工部尚書揚州長史浙江東西二道觀察使吏部尚書知省事餘如故又轉尚書右僕射四年某月日龜筮叶吉奉少師滎陽夫人之喪合祔於東京河南邙山之某原禮也世傳清白子孝臣忠山東士大夫以五姓婚姻為第一朝廷衣冠以尚書端揆為貴士惟公兼之清河崔氏至趙公三代僕射可謂盡善矣太山羊衜世傳清德北海范育兒無常親揔此二者為公家法華學放史氏敢播風烈焉昔孔悝銘鼎備舉前代史克頌魯獨美僖公用以誕敷先人照示後代在禮然也今兹在頌書國家之孝理列聖君之得人崔氏之世緒少師之懿範趙公之孝思士正祖德末一作未是為不朽崔氏之門為不朽矣若終疑者華安得不頌之其文曰周之上公讓為大夫秦之司徒家於冀都伯從清河德緒繁多仕至揚州出將封侯惟德惟器魏之中尉降及元魏羣從並貴才如尚書德如評事古之廷評伏念惟刑我聞德聲繼佐葭萌安道和俗化行三蜀彼汾之曲片言折獄清風人穆升聞輦轂葦轍蒲帷公行不歸哲人其萎後賢用微滎陽夫人柔明佐君嫁有嘉聞首代馨芬高陽才子唐虞多士克先趙公大雅爰起有子如是可謂孝矣崇原既平伊洛攸清永安厥靈萬有斯年子孫以寧文苑英華卷九百
