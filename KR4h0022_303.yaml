body:
  text: 文苑英華卷三百三宋李昉等編悲悼三哭人六十一首杜甫四首沈宇一首常建一首高適二首劉長卿四首李嘉祐一首皇甫曽一首盧綸一首韋應物一首顧况四首耿緯二首司空曙二首李益一首權德輿三首于鵠二首杜誦一首李敬方一首衛象一首戎昱一首劉商二首釋靈一一首釋護國一首釋皎然一首釋靈徹一首王建一首楊衡一首韓愈一首劉禹錫十首孟郊七首哭李常侍嶧杜甫一代風流盡修文地下深斯人不重見將老失知音短日行梅嶺寒山落桂林長安若箇畔猶想映貂金哭嚴僕射歸櫬前人素幔隨流水歸舟返故京老親如夙昔部曲異平生風送蛟龍匣天長驃騎營一哀三峽暮遺後見君情哭李尚書芝芳前人漳濵與蒿里逝水竟同年欲把留徐劍猶回憶戴船相知成白首此别問黃泉風雨嗟何及江湖涕泫然修文思管輅奉使失張騫史閣行人在詩家秀句傳客亭鞍馬絶旅櫬網蟲懸復魄昭邱逺歸魂素滻偏樵蘇封葬地喉舌罷朝天秋色調春草王孫若箇邉奉漢中王手札報韋侍御蕭尊師亡前人秋日蕭韋逝淮王報峽中小集作少年疑柱史多術怪仙公不但時人惜祗應吾道窮一哀侵疾病相識自兒童處處鄰家笛飄飄客子蓬強吟懷舊賦已作白頭翁塞外哭友人沈宇菊黃蘆白鴈初飛羌笛胡笳淚滿衣送君腸斷秧江外一去東流何日歸弔王將軍墓常建嫖姚北伐時深入幾文粹作強千里戰餘落日黃軍敗鼓聲死常言文粹作聞漢飛將可奪單于壘今與山鬼鄰殘兵哭遼水哭單父梁洽少府高適開篋淚沾臆見君前日書夜臺今集作空寂寞猶是子雲居疇昔探靈集作貪雲竒登臨賦山水同舟南楚夜集作浦下望月西江裏契濶多離别集作當别離綢繆到生死九原即何處萬事皆如昨晉山徒嵯峨斯人已冥寞常時祿且少集作薄殁後家復貧妻子在逺道弟兄無一人十上多苦辛詩選作心一官恆自哂青雲將可致白日忽先盡獨推詩選作有身後名空流集作留無逺近哭裴少府前人世上誰不死嗟君非生慮扶一作無病適到官田園在何處公才羣吏感葬時他人助余亦未識君闕悲哭君去哭李集作陳歙州劉長卿千秋萬古葬平原素業清風及子孫旅櫬歸程傷道路舉家行哭向田園空山寂寂開新冢喬木蒼蒼掩舊門儒行公才竟何處集作在獨憐棠樹一株存雙峯下哭故人李宥前人憐君孤塜寄雙峯埋骨窮泉復幾重白露空沾九原草青山獨閉數株松圖書經亂如何在妻子移家失所從惆悵東臯却歸去人生無處更相逄哭張員外繼公及夫人相次殁於洪州前人慟哭鍾陵下東流與别離二星來不返雙劔沒相隨獨繼先賢傳誰刋有道碑故園荒峴曲旅櫬寄天涯白簡曽連拜滄洲每集作豈共思撫存憐齒稚歎逝顧身衰泉壤成終古雲山若在時秋風鄰笛發寒日寢門悲世難愁歸路家貧緩葬期舊賔傷未散夕臨咽恆遲自此辭張邵何由見戴逵獨聞山吏部流涕訪孤兒哭魏兼遂公及孀妻糿子與家童數人相次逝沒葬丹陽前人古今俱此集作有此去修短竟誰分樽酒空如在絃琴豈重聞一門同逝水萬事共浮雲舊館何人宅空山逺客墳艱危貧且病少小秀而文獨行依窮巷全身出亂軍嵗時常寂寞煙月自氛氲隴樹隨人古山門對日曛泛舟悲向子留劍贈徐君來去雲陽路傷心江水濆傷歙州陳二使君李嘉祐憐君辭病卧滄洲一旦云亡萬事休慈母斷腸妻獨泣寒雲慘色水空流江村故老長懷惠山路孤猿亦共愁寂寞荒墳近漁浦野松孤月集作煙朝暮即千秋傷陸處士皇甫曽從此無期見柴門對雪開二毛逢世難萬恨掩泉臺返照空堂夕孤城弔客回漢家偏訪道猶畏鶴書來同兵部李紓侍郎刑部包佶侍郎哭皇甫侍郎曽盧綸攀龍與泣麟哀樂不同塵九陌霄漢侣一燈冥寞人舟沉驚海濶蘭折怨霜頻已矣復何見故山應更春悲故交韋應物白璧衆求瑕素絲易成汙萬里顛沛還高堂已長暮積憤方盈抱纒哀忽逾度念子從此終黃泉竟誰訴一為時所集作事感豈獨平生故唯見荒邱原野草塗朝露哭從兄長前人洞庭違鄂渚嫋嫋秋風時何人不客遊獨與帝子期黃鵠鎩飛翅青雲歎沉姿身終一騎曹高蓋者為誰從駕至梁漢金根復京師皇恩溢九垠不記屠沽兒立身有高節滿卷多好詩赫赫承明庭羣公默無詞草木正搖落哭兄鄱水湄共居雲陽里轗軻多别離人生倐忽間旅櫬飄若遺稚子新學拜枯楊生一枝人生倐忽間精爽無不知舊國數千里家人由未知人生倐忽間安用才士為傷子前人老夫哭集作喪愛子日暮千行血聲逐斷猿悲路隨飛鳥滅老夫已七十不作多時别悼稚前人稚子比來騎竹馬猶疑只在屋東西莫言道者無悲事曽聼巴猿向月啼哭張融耿緯早嵗能文客中年與世違有道類詩作有家孀婦少無子弔人稀繐帳塵空積集作空暗銘旌雨不飛依然舊鄉路寂寞幾回歸哭麴象此篇三百五首重出今已削去前人憶昨秋風起君曽歎逐臣何言芳草日自作九泉人傷苖員外呈張參軍苖公即參軍舅氏司空曙思君寧家宅久接竹林期嘗值偷琴處親聞比玉時高人不易合弱冠早相追集作相知思藝集作試藝臨諸友能文即我師陵寒松未老先暮槿何衰季子生前别羊曇醉後悲夀堂乖一慟奠席阻長辭因瀝殊方淚遙成墓下詩哭王注前人已歎漳濵卧何言駐隙難異才傷促短諸友哭門闌古道松聲暮荒阡莫色寒延陵今葬子空使魯人觀惜春傷同幕故孟郎中杜侍御兼呈去年看花友一作故人李益畏老身今老逄春解惜春今年看花伴已少去年人哭劉四尚書權德輿士友惜賢人天朝喪守臣才華推獨步聲氣幸相親理析環中妙儒為席上珍笑言成月旦風韻揖天真丹地膺推澤青油寄撫循豈言朝相位翻是卧漳濵命賜龍泉重追榮密印陳撤絃驚物故庀具見家貧牢落風悲笛汍瀾涕泣巾共嗟蒿里月非復栁營春黃絹碑文在青松隧路新音容無處所歸作北邙塵張工部發引日屬傷足卧疾不遂執紼前人子春傷足日况有寢門哀元伯歸全去無由白馬來笳簫里巷咽龜筮墓田開片石潺湲淚含悽集作悲敘史才哭張十八校書數日前辱書未及還答俄承凶訃前人藝閣為郎一命初桐州寄傲十年餘魂隨遊水歸何處名在新詩衆不如蹉跎江浦生華髮牢落寒原會素車更憶八行前日到含悽未報秣陵書哭王都護于鵠老將明王識臨終拜上公告哀鄉路逺助戰戍城空素幔朱門裏銘旌秋巷中史官如不濫獨傳説英雄悼孤子前人年長始一男心亦頗自娛生來嵗未周奄然却歸無祼送不以衣瘞埋於中衢乳母抱出門所生亦隨呼嬰孩無哭儀禮經不可踰親戚相問時抑悲空歎吁襁褓在舊牀每見立踟蹰靜思益傷惜畏老為獨夫哭李暹前人驅馬街中哭送君靈車碾雪隔城門唯有山僧與樵客共舁孤櫬入幽墳哭長孫侍御杜誦道為詩書重名因賦頌雄禮闈曾擢桂憲府舊集作屢或作近乘驄流水生涯盡浮雲世事空唯餘舊臺一作臺上柏蕭瑟九原中此詩見中興間氣集亦云杜誦作今載杜甫集可疑聞陳高侍御卒貶所李敬方西京高院長直氣似吾徒走馬論邊備飛聲感廟謨官移闕未察身沒事多符寂寞他年後名編野史無傷李端衛象才子浮生促泉臺此路賖官卑揚執戟年少賈長沙人去門栖鳥災成酒誤蛇唯餘封禪草留在茂陵家聞顔尚書陷賊中戎昱傳道征南殁那堪故吏聞能持蘇武節不授馬超勳國破無人信天秋有鴈羣同榮不同辱今日負將軍哭韓淮端公兼上崔中丞劉商堅貞與和璧利用歸干將金玉徒自寶高賢無比方挺生巖松姿孤直陵雪霜亭亭結清隂不競桃李芳讀書哂霸業翊贊思皇王千載有疑議一言能否臧儒風久淪弊顔閔夀不長邦國豈殄瘁斯人今又亡别離長春草存沒隔楚鄉聞問尚書慟淚凝向日黃奄忽薤露晞杳冥泉夜長賢愚自修短天色空蒼蒼銘旌斂歸魂荆棘生路傍門桞日蕭索繐帳掩空堂燈孤晦處明高節沒後彰芳蘭已灰燼幕府留餘香常愛獨坐尊繡衣如鴈行至今虛左位言發淚沾裳同諸子哭張元易前人盛德高名㧾是空神明福善大朦朧遊魂永永無歸日流水年年自向東素帷旅櫬鄉關逺丹旐燈闕客舍中伯道共悲無後嗣孀妻老母斷根蓬哭魏尚書釋靈一畫戟重門楚水隂天涯欲暮共傷心南荆雙履痕猶在北斗孤魂望已深蓮花幕下悲風起細栁營邉曉月臨前路茫茫向誰問感恩空有淚沾襟傷蔡處士釋護國篋中遺草是琅玕對此空令灑淚看三徑尚餘行迹在數螢猶是映書殘晨光不借泉門曉暝色唯添壠樹寒欲問皇天天更逺有才無命説應難五言哭吳縣房聳明府釋皎然仁人邁厚德可謂名實全撫迹若踈曠會心極精研履危節詎屈廣德初江南寇盜充斥賊遍召宰長城縣屢至害身竟不就著論識不偏公注道性論一篇恨以榮級淺嘉猷未及宣伊人期逺大志業難比肩昭世既合并吾君藉陶甄奈何明明理與善徒空詮徴教或稽聖窮源及問天一官自吳邑六翮委江壖始是牽絲日翻成撤瑟年金膏果不就房公昔日就沈道士學長生之術盡以佛理難之玉佩長此捐倚伏信𡨕昧天夀驚後先安知忘情子愛網素已褰為有深仁感遂令真性遷心悲空林下淚灑秋景前夫子寡兄弟無孤傷藐然傾雲為慘結弔鶴共聫翩割念歸命駕訣詞空向筵樹桃隂始合愛客位常懸恍若逺行時􅀢望歸朝旋悟兹歡宴隔哀彼嵗月延書帶變芳草履痕移緑錢冥期倘可逄生盡會無緣王坦之初與沙門竺法師甚厚每共論幽明報應便要先死者當報其事後經年師忽來云貧道已死罪福皆不虛唯當勤修道德升濟神明耳幸願示因業闕代居運専沈約死後冥中見千因師云急為我造經拔我苦難相思轉寂寞獨往西林泉欲見故人心時開所贈篇素高陶靖節今重楚先賢芳躅將遺愛可為終古傳聞李虔州亡釋靈徹時時聞説故人死日日自悲垂老身白髮不生應不得青山長在屬何人弔孟東野二首王建吟損一作哭盡秋天月不明蘭無香氣鶴無聲自從東野先生死側聼雲山得散行二老松臨死不生枝東野先生早哭兒但是洛陽城裏客家傳一本長殤詩哭李象楊衡白雞黃犬不將去寂寞空餘葬時路草苑花開年復年後人知是何人墓憶君思君獨不眠夜寒月照青楓樹哭楊兵曹凝陸歙州參韓愈人皆集作生期七十才半豈蹉跎數集作併出知巳淚自然白髮多晨興為誰慟還坐久滂沱論文與晤語集作新墳與宿草已矣兩集作復一作可如何哭王僕射相公播時兼鹽鐵暴薨劉禹錫于侯一日病滕公千載歸門庭颯已變風物慘無輝羣吏謁新府舊賔霑素衣歌堂忽暮哭駕雀盡驚飛許給事見示哭工部劉尚書詩因命同作前人漢室賢王後從叔望在河間孔門高第人濟時成國器樂道任天真特逹圭無玷堅貞竹有筠揔戎寬得衆市義貴能貧護塞無南牧馳心拱北辰乞身來闕下賜告卧漳濵榮躍初題劒清瀛已拖紳宫星徒列位隙日不回輪昔自追飛侣今為侍從臣素絃哀已絶青簡歎猶新未遂揮金樂空悲撤瑟晨凄涼竹林下無復見清塵傷獨孤舍人并引前人貞元中余以御史監祠事河南獨孤生始仕為奉禮郎有事宗廟郊畤必與之俱繇是甚熟及余謫武陵九年間獨孤生仕至中書舍人視草禁中上方許以宰相元和十年春余祗召抵京師次都亭日舍人以疾不起余聞因作傷詞以為弔昔别公年少今悲喪國華逺來同社燕不見早梅花傷假右丞江湖舊逰南宫交代前人江梅多豪氣朝廷有直聲何言馬蹄下一旦是佳城哭龎京兆少年有俊氣嘗擢制科之首前人俊骨英才氣褎然䇿名飛步冠羣賢逢時已自致高位得病集作疾還因倚少年天上别歸京兆府人間空歎茂陵阡今朝繐帳哭君處前日見鋪歌舞筵哭吕衡州時余方謫居前人一夜霜風凋玉芝蒼生絶望士林悲空懷濟世安人略不見男婚女嫁時遺草一函歸太史旅墳三尺近要離朔方徙嵗行當滿欲為君刋第二碑傷循州渾尚書前人貴人淪落路人哀碧水連天丹旐回遙想長安此時節朱門深巷百花開重至衡陽傷栁儀曹并序前人元和乙未嵗與故人栁子厚臨湘水為别栁浮舟適栁州余登陸赴連州後五年余從故道出桂嶺至前别處而君殁於南中因賦詩以投吊憶昨與故人湘江岸頭别我馬映林嘶君帆轉山滅馬嘶循故道帆滅如流電千里江蘺春故人今不見謫居悼往前人悒悒何悒悒長沙地卑濕樓上見春多花前恨風急猿愁腸斷呌鶴病翹趾立牛衣獨自眠誰哀仲卿泣遙傷丘中丞并引前人河南丘絳有詞藻與余同升進士科從事鄴下不幸遇害故為傷詞鄴下殺才子蒼茫寃氣凝枯楊映漳水野火上西陵馬鬛今無所龍門昔共登何人為弔客唯是有青蠅哭李觀孟郊志士不得老多為直氣傷阮公終日哭夀命固難長顔子既殂謝孔門無輝光文星落竒曜寶劍摧修鋩常作金應石忽為宫集作參别商為爾弔琴瑟斷絃難再張偏轂不可轉一作推隻翼不可翔清塵無吹噓委地難飛揚此義古所重此風今已一作則亡自聞喪元賔一日八九狂沉痛此丈夫嗚呼彼穹蒼我有出俗韻勞君疾惡腸知音既已矣微言集作善誰能彰旅葬無高墳栽松不成一作依行哀歌動寒日贈淚沾晨霜一作衣裳神理本窅窅集作冥冥今來更茫茫何以蕩悲懷萬事付一觴哭盧貞國前人一别難與期存亡易寒燠下馬入君門聲悲不成哭自能富才藝當冀深榮祿皇天負我賢遺恨至滿目平生嗟無子家事親相囑哭祕書包太監前人哲人卧病日賤子泣玉年當恐寶鏡破明月難再圓文字未改素聲容忽歸玄始知知音稀千載一絶絃舊館有遺琴清風那再傳哭李舟員外并寄杜中丞前人生死方知交態存忍將齖齚報幽魂十年同在平原客更遣何人哭寢門悼吳興楊衡評事前人君生集作在霅水清君去霅水渾空有集作令骨肉親集作情哭得日月集作白日昏大夜不復曉古松長閉門琴絃緑水絶詩句青山存昔為芳春顔今為芳春根獨聞冥寞一作冥冥理先儒未嘗一作曽言李少府廳弔李元賔遺字元賔題少府廳云宿從叔宅有感有其義而無其辭零落四五集作三四字忽然集作成千萬年那知真寂客集作那知冥冥客不有補遺集作亡篇斜月吐集作弔空壁旅人難獨眠一生能幾時萬集作百慮來相煎戚戚故交淚幽幽長夜泉已矣難重言一言一潸然悼幼子前人一開黃蒿門不聞白日事生氣散成風枯形化為地負我十年恩欠爾千行淚灑之北原上豈集作不待秋風至文苑英華卷三百三
