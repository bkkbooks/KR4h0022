body:
  text: 文苑英華巻十七宋李昉等編天象十七雷賦一首春雷賦一首雷在地中賦一首初雷起蟄賦一首霹靂賦一首禦雹賦一首餘霞散成綺賦一首秋霧賦一首晴虹賦一首虹藏不見賦一首雷賦張仲甫粤若稽古太始之初隂陽和而為炭天地張而為爐鎔鑄品類陶汰清虚名之四海謂之八區隂陽相盪感成雷乎號曰天地之鼔事載河圖之書藏冰以時則響出而不震仲秋之月必聲隐而無餘或震怒百里雨潤同沾法威刑於牧宰察醜惡於毫纎或殷轔而鼔作或滅沒而韜潜吼若天開闢如地裂動静必以其時喜怒於焉有節是以樊重入室王裒遶墓終不苟於瑕疵冀中平於朗寤蠻夷於是膽懾賢豪於是心懼惡不戒而潜至善乃全而焉措無貴無賤敬天之怒五星不逆六氣合度發陽和啟蟄户農事興作秋成斯覩以日繫時有倫有序歘焉而來倐焉而去鼓踴莫測其蹤安息莫知其所搜獲山川洗滌寰宇爾其為状也則乃聮鼓畾畾力士雄雄雲飛電耀起自震宫其為聲也磊磊落落砰砰訇訇龍潜魚躍海湧山傾星宿為之霾翳日月為之昬暝夫其赩赫震耀紛紜煽作臨峻崖投深壑終不騁於雄豪将勸善而懲惡布雲雨於潜龍銜丹書於白雀若乃王綱如繩籠羅有情是謂小人無禮君子無刑守容貌而無恒豈耳目之不明終冀貞㢘於衆口法令未若於雷霆春雷賦以符珍紀元天地作解為韻樊珣惟聖作乂先天授人惟天輔徳啟聖無親故我皇齊七政恊三辰化孚大麓道暢經綸是以慶集天寳祥開地珍法威刑於震燿効生植於陽春鴻名既増睿厯伊始當涣汗之初發聽春雷之肇起将克宣陽罔忒時紀導達萬萌震驚百里南山望逺乗雨氣而方來長門聽深象車聲而未已若䧏在下如飛在天鬱重電而虺虺殷髙棟以闐闐作解羣物揚靈上𤣥啟春和於蟄户兆農慶於豐年若乃勢猛陵空聲雄出地形未遷而必肅政不戒而潜至渾渾其象含四氣於一朝虩虩其威警千官於庶位及夫薈蔚云巻煙埃稍廓餘雲既稀厲響不作攄殘怒於平野轉輕音於峻閣來雖莫制必先戒而後臻去則何言知勸善而懲惡是故知聖人御氣立極居貞體元災攘不令祉䧏攸繁豈與夫震廟為凶方知展氏之慝雹災莫禦乃訊申豐之言則有抱影窮居在隂向隅雖倚楹而有得終棄室以思濡進道則望深知已觀光而業謝㝠符感雲雷之布澤思自逹於通衢脫解字一韻雷在地中賦以復其見天地之心為韻滕邁雷動而息地卑而深當嚴凝之戒節向博厚以潜音順静於時乃退藏而黙處反本乎土乍響絶而聲沉豈獨歛震驚於坤徳抑亦彰休復於天心原其辭滿盈止奮肆混然無朕寂兮深閟解威隣於蟄户銷聲處夫隂位足可以善列缺之歸功見𤣥㝠之内事以是細觀其所廣徴其類初疑罷轉石逺積南山之陽又若駐奔車深掩長門之地象則存矣理難求焉冲融将凝沍暗息隐轔與涇洛潜連道尚處幽奚爽下安於土功存作解終期上奮於天足使至人将齊其黙黙楚客絶想夫塡塡苟有託其厚載亦無辭於小畜駭氣結乎土嚢迅音止夫坤軸斯可以驗啟閉分寒燠不失動静乃順之於時将體行藏故受之以復未萌響像詎可求思勿以潜雖伏矣是當薄言震之一陽之氣始生孰能輕動百里之音未發吾非後時自然居善閉之中因積風所扇且㝠寂以斯在豈迅烈而遽變覩秋毫之末者無慙聽而不聞寫鼓鐘之音者空嘆視而不見若夫𤣥律云暮衆彚淒其苟未離乎坎窞且自理於希夷不然先王何以取象大易於焉立辭至矣哉法雷而行教也弛張之義在茲初雷啟蟄賦謝觀蟄處於冬雷生自震啟一聲於春候知萬類之奮迅虺虺初動祁祁始振首出庶物為隂陽號令之端有開必先作天地發生之信原夫飛走各志羣分處隂既不戁以不竦尚聲銷而影沉及夫勾芒御辰夾鍾應律整雲師布露之澤廹和氏春分之日温風載扇重隂四宻動豐隆之大聲發昆蟲之暗室跂行喙息聞塡塡而鼓舞争馳脰振翼鳴隨虩虩而雷同競出隐蔽雖久騰揚有期變軒轟而作矣俱引領以從之見羣生嚮風之義知六鈞播物之時是則感之於彼而乃乗之在茲且遂隐隐以起予各侁侁而挺爾穴處者聆之而厲志泥蟠者聞斯而舉趾均發萬品非唯百里各騰聲實鸎出谷而載飛競逐明時范彈冠而思起摇車効之而可也聚蚊因之而有以然後捨彼即此違隂就陽角觡奮迅羽翼弛張殷南山之粗厲啟出地之潜藏似桴鼓之纔終戈鋌熠熠如擊石之止後鳥獸蹌蹌有若衆彚居蒙一呼而告羣生未覺一言以導曽無震寝之虞誰有擊䑓之暴於是桃吐其秀鷹化為鳩助發生之徳省囹圄之囚潜匿假之而振㧞毛介因斯而處休大哉震元利拯羣生而出幽霹靂賦張鼎殷其雷在南山之隈黒蜧翔雲暗天起黄雀驚風動地來飄忽兮霏煙翳霧拂樓䑓慘烈兮飛砂走礫揚塵埃波濤翻而海水激樹㧞根而山石摧於是隂陽交戰晦明相賊或擊或馳乍通乍塞望螣蛇之上下見飛龍之南北電光開而山澤紅雨氣合而原野黒威聲奮擊於霄漢逸嚮振動於都國而乃隐軫徘徊謂髙天壓而泰山頽鼓怒發洩謂厚地震而梁木折聲之所射者向無不碎氣之所奔者中無不絶值石則片片氷開當樹則重重瓦裂其為始也則赫赫奕奕若烈風猛火之燎崑崙其為終也砰砰轟轟若决水轉石之潰龍門擬戰鼔則三軍亂擊方戎車則百兩齊奔川岳為之摇蕩天地為之晝昏豈直聞之者掩耳而奪氣見之者瞑目而埋魂若斯而已哉觀其咈鬱氤氲騰波磊落輝光之所倐閃聲氣之所噴薄豈在微而應必有感而作擊齊堂也識孝婦之懐寃震魯廟也哂佞臣之隐惡故導風伯從雨師以豐隆為號令以列缺為鞭笞洪涯飛霆以瀝液奔源走沫以流漦廹鯨鯢使蹭蹬怛蛟螭使躨跜鼃黽䘮明於竈穴鱣鮪失路於庭墀當此時也别有跡履姦慝事兼狂狷想人孽之無逃慮天災之有譴各憂心而股慄咸戢驚而肉戰雖重華順之而不恚宣尼驚之而不變若乃依仁游藝之伍含道養性之流心且静而神逸名既揚而行脩通人倚柱而坦蕩孝子遶墓而思柔苟寡尤而寡悔夫何懼而何憂辭疑作亂曰我何憂兮憂天怒豈不欲徃兮為多露我有懼兮懼天威豈不欲往兮露未晞素履直載時遯善肥古而可作吾與同歸禦雹賦以日在北陸藏氷為韻聖人常夕惕而不寐懼時令之有失欲禦雹於明年必藏氷於是日深山窮谷於是收桃弧棘矢而後出葢所以息天時之暴殄成國家之元吉不然者當純陽之用事有伏隂之相蒸炎雲際天而涷雨驟落芳草竟野而凄風暴興夫傷糓者莫大於雹禦雹者其在乎氷俾四時之事不悖信七月之詩有徵日臨下土時在北陸乃命凌人出斯氷谷威刺刺而正切聲冲冲而轉速雖暫勞而可倦終永寧以多福今國家酌於故實考于先王雖雹可以禦亦氷其是藏等至仁於天地曽何咎於隂陽斯道可久百王不改苟或失之四方何罪周官之禮是具魯史之言斯在抑為人者仰於食動於天者唯其徳苟能用於天道自可㤀其帝力夫如是用天與地自南自北寧有夭折之苦曽無凍餒之色若待反時以為災其何禦之能得餘霞散成綺賦以題為韻韋充試一望兮雲晩而山晴白日欲沒兮紅霞始生含江天之霽潤籠煙景之虚明發光華而不定若組織之相成陽文隂漫乍合乍散離披晃朗錯雜陵亂麗雲日之幾重鋪綺繡之千段翻光倒影擢菡萏於湖中舒豔騰輝攅螮蝀於天半照萬象於晴初散寥天於日餘吐丹氣於青嶂為金光於碧虚越女浣紗恥鮮明之莫及巴姬濯錦慙光彩之不如攅紅散紫參差邐迤状羣飛之鸞鳳類叢生之花蘤始一變而舒霞終一變而成綺當是時也則有才子去國逰人别家汎濫秋景徘徊霽華惜賞心之日暮悵逰目於天涯積九秋之懐抱對茲夕之煙霞仰丹宵之愁斷想赤水之路賒能不沉吟徙倚卧坐疑興嗟况復雲景廻午蒼凉愁暮思攄懐以振藻返疑憂而失趣空吟謝客之詩遐想興公之賦秋霧賦以輕散長空寒飛逈野為韻謝良輔有物混成隂陽之精騰而為質晦而為名逰塵未足方其細纎縠不能揣其輕度水陵亂從風泮散表銀山之美素色増鮮沐𤣥豹之姿竒文獨焕若乃暑退朱方時惟白藏空濛大澤鬰郁崇岡始經夫少昊之野終遍於無何之鄉含草木而功大混山川而氣長浮我極浦靄我層穹如雨如霰自西自東倐而來比君子之道廣忽而逝侔至人之性空奚水土之同致俾隂陽之異觀秋何霧而不起霧何秋而不寒至徳發祥雜非煙於北極皇居瑞聖伴佳氣於南端及夫丙火方馳螣蛇欲飛三辰被汨疑五星霏㣲道不虚行來集黄公之呪神其有感去射疑作解白登之圍則知因時舒巻與物動静資於坱圠變態俄頃興非塞望雄鳴之路不迷冐且有聞彦輔之天自逈露逰兮月之下霞歛兮風之假俟一揚於飛塵同秋空於迥野晴虹賦閻朝隐一隂一陽備藻繢以成文章載清載濁挂天涯而臨地角生於氣立於空宛宛轉轉曈曈曨曨上下眀媚表裏冲融洗竒光於暴雨留豔彩於飄風隐顯之情奚爾造化之理何窮若乃碧嶂無雲清江息浪曲折異體低昻殊狀半出髙岊疑蟾魄之孤生全入澄瀾若蛾眉之相向又乃綺忩逺闢錦帳斜褰髣髴天上依稀目前暐兮曄兮既類丹山碧樹之重疊斷兮連兮又似美人綵女之嬋娟察之無涯究之無實光天地之大造保雲霄之元吉爰有下才或趨㣲秩其志謇謇其心慄慄體物無功著書有疾既藴慙於眀鏡載有閣於鴻筆虹藏不見賦以隂陽所陵故結狀之為韻李處仁虹在東方小雪而藏貫日之形莫覩彌天之象難詳居曖昧之中光而不耀入混茫之裏闇然而彰表天時而無失其候順寒暑而不愆於陽眇望遼夐窮覽洲渚邈不察其形容何以知其處所見飛梁之跨水髣髴猶疑望慶雲之在天依稀延竚豈不以晦明有日隐見有期寒節方來斯則潜雖伏矣清明如到終當出而見之閟乎渥彩蓄以雄姿類成文隐霧之日同衣錦褧裳之時𦕈𦕈天末悠悠雲路御座之祥不逢美人之號難遇冥蒙向晦徒欲想其爛然杳藹藏輝孰能知其去故宛得啟閉之道以明天地之心憐彎環之挂空猶隔層碧思紆餘而飲井當疑阻重隂不測之狀難狀無形之形罔尋若夫風雲尚慘我則隐蔽而知藏陽氣未騰我則炫燿而不結亦有霞散成綺雲吐如繒曷若拖軒之名上林賦宛虹拖於楯軒将順時而出沒廻舘之勢毎應候而升陵至哉終取貴於彩章亦何慙於小畜孕明於煙霧之際誰辨輝光混迹於沉埋之間難呈紛郁事同嘉遯道叶悠伏虹兮虹兮何當洒其霡霂文苑英華巻十七
