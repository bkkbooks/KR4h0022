body:
  text: 文苑英華卷八百一宋李昉等編㕔壁記五州郡中夀州刺史壁記一首鄂州新㕔記一首宋州刺史㕔壁記一首鄧州刺史㕔壁記一首湖州刺史㕔壁記一首道州刺史㕔壁記一首隴州刺史㕔記一首州郡中夀州刺史壁記李華禹貢淮海惟揚州彭蠡三江在焉漢文帝封淮南王長子安為王都夀春即此州也兩漢揚州刺史治於此州墠壇猶在後魏盧潛為揚州亦鎮于兹潛有惠政時人比之羊祜厥後州境或南或北隨人推遷國朝一家天下華夷如一壽春或疑衍郡在淮南隸揚州其風俗山川可得而知也某年以兼侍御史揚州司馬獨孤問俗為壽州刺史公有德政理外如內易不遺物周不害通忠孝簡於王室亷平聞於天下剛克以順柔謹而肅公理州三年遷御史中丞鎮江夏工部郎中楚州一作中張緯之代公為州牧某部郎中韋延安代張典此州僉有政聞故書其事以慰楚人之心鄂州新㕔記趙憬自昔秦置郡有守漢魏以降因之其秩二千石雖有監刺而宰制威福之重蓋古之諸侯鄂在楚為國秦為縣吳為江夏郡綿歷至宋乃維八郡置郢州及齊更郢為鄂隋氏披其郡猶謂之州官則刺史而政無條刺之法矣皇朝㳂襲舊制或為郡或為州剖符責成其實乃太守之職前代建置所理之處其城不垣今之州即舊城於江夏吳仲謀經營之程普始守之當荆吳江漢之衝要為藩鎮固護之雄制天寶以前四方無虞第據編戶衆寡等襄州望鄂是以齒於下後國家多事㝢縣沸騰屯兵阻險斯稱巨防朝廷尋州陟疑作陟州列將寄勳賢之重廣德二年遂聨嶽沔事置三州都團練使大厯八年加觀察處置使十四年六月二使廢時置當州防禦使且屬於江西國家姑務省官息人而終慮咽喉襟帶之地思典守者既輕其權矣復欲俾任重尤難其選是月十日乃命祕書少監兼侍御史李公授之公名兼隴西人也到官三年之五月使改為三州防禦使江嶽隸焉仍領元戎之副董江西諸軍鋭師以伐叛于襄陽既而尅平九月就加散騎常侍防禦洎州如舊公之蒞鄂也今茲四年以清德誠信為教化以至公深仁為字育則鄽閈里閭僑舊詠歌如嬰兒之得乳母餒夫之逢稔歲理軍施令其士卒歡慶亦如之但加乎肅畏而已繇是所防三千餘里洞庭彭蠡在其間水舟陸車山藪塢野皆我長城之內用是加之王人絡繹天書繼至三軍萬一作為户以為禁而耆老懼去不得而借也初刺史有小大之㕔其度甚卑或門屏迫近或廊廡狹隘將吏參集回旋逼側綿歷年代未遑革之㕔之左二曰一作日府舍摧壞空曠公乃剗濶其地作為新㕔大厦既立長廊以二則儉而規法結構殊精因士卒忘勞之力出貨財足用之羡經營有成井邑莫知惟昔之公門今為外入一作人非而遂東廣開崇庸北逹於里一作重門棨㦸森列戒徒儼衛每饗士誓衆駢羅廣庭蕭墻之隂旗旐繽紛威容克振君子謂之智憬將赴京師目覩嘉謀輒紀新㕔之壁庶允朝選之盛時舊有㕔都團練觀察使記刺史無記曩賢名氏多所闕焉是用求訪遺者得之必書蓋李公之志也求哲繼踵兾增輝於此堂時建中三年十有一月也宋州刺史㕔壁記顧况商丘之地辰火之宿孟諸之湄閼伯所遷微子所封之國也厥貢絺紵厥篚纎纊有蒙盧二門有睢渙二水炊骨易子隕星退鶂仲尼之伐木子罕之棄車左傳作甲皆此地焉梁孝王時四方逰士鄒生敉叟相如之徒朝夕晏處更唱迭和天寒冰凍酒作詩滴是有文雅之臺清冷之池鴈鶩之所棲集園苑方三百餘里制度法於長安漢末始置為睢陽郡皇家大臣房梁公嘗牧此州今相國彭城劉公勛德有光亦典此郡前破李靈曜後破李希烈為梁開路而東方諸俠井賦鹽泉所以嵗約三千萬緍商在其外明年來朝天子天子嘉之俾平水土乃拜司空俾敷五教乃拜司徒入參大政出擢威武范陽君以智略佐之由御史中丞行軍司馬節度留後而領于是邦幕府得人於斯為盛下車之日無土不殖桑麥翳野舟艫織川城髙以堅士選以飽詩所謂誰謂宋逺誰謂河廣者矣自貞觀以來列名氏者而房梁公為首存乎東壁大厯之後繼聲躅者宜司徒公為首遂刋於座右也貞元五年四月十九日記鄧州刺史㕔壁記符載國家自祿山犯德五兵勃起毒流天下於鄧最劇是州也地宜政事與他郡不類故得詳備而記之案天官書角亢之下為鄧鄧侯吾離之國也本楚地六國時屬韓秦昭王三十五年取韓地置南陽郡既滅韓徙天下不軌之人而實之至兩漢間多封勳庸大臣外戚主家氣髙野曠地方千里控二都之浩穰道百越之繁㑹藩閫桐柏陂池江漢商於臨汝環我股臂故自前代至於我唐戰爭攘奪千載不息多為暴强者攻取之其望雄其俗豪鬭伉健尚畋獵藏亡匿死橫猾難制其有臨之者踈緻不中輒失聲實天寶十五年春魯炅自商州刺史御史中丞領是州牧是年六月二京陷于祿山其帥阿史那王立李節來冦我焉魯接戰大敗之其明年春逆將武珣二唐書作武令珣復圍我焉魯培墉補卒堅峙自正月至于八月不下他一作地日絶食整旗犯出彼將乘病而困之反手與鬭賊頗橫潰因退保我城焉魯屯居順楊山谷中積數月肅宗皇帝升寶位于靈武詔加御史大夫襄鄧節度復牧我壘完葺如故至德初一有載字冦讐滅定頴國公來瑱以御史大夫代魯公之政先是有驍將李釗二唐書作昭梁崇義者二人素齊名皆負威望㑹來朝京師釗得授權柄崇義不欲出其下攘城縱跡因殺而並之代宗含垢務理未即顯戮遂署為襄陽節度是州隸焉崇義以受命一作授之際狀不明白蒙穢跋扈二十餘一作𢾗年晚節謀叛無臣子道天子命淮西節度李希烈誅之希烈無妄生釁復以怒取使宿賊封有麟主張焉建中四年希烈僭逆于梁諸侯之師荷㦸四㑹有麟亦嬰城自守連攻不拔丙寅嵗皇帝厭亂淮西始定連帥陳仙竒禆將李季汶來討一作平之季汶雅有膽略以機擒敵以誠誓衆遂梟有麟以聞是時天子尤寶鄧為咽喉之地以為兵戎之後黎民破碎苟非賢哲不能生活乃詔尚書金部郎中王公綏而治之其始至也宣天子之恩澤使民沐浴之垂方伯之教令使民承受之然後以大誠受物以至信結物以𤣥機運物以嚴禁肅物構壞竿為廬舍銷遺鏃為鋤耜伐蒿萊為場圃掘腥穢為泉井交一作合父子之歡正夫婦之倫依仁化者如水赴壑首年而富中年而教季年而政成其籍版一作版籍自四千户至千萬三千户藏其屯粟自三千斛至數一作四萬斛其餘一有虗字飾傳遞一作即之舍作栖旅之館儲什器之用蓋餘力也先是有奉天禦侮臣十𢾗輩上多其功既侯王之復賜得公田五十萬畝以我郡壤寬且膄將併力焉公以為鄧在邦畿千里之內詭隨授與則上以耗天子之地下以貽齊民之困堅秉古制不輸尺土此又政之殊尤者也於戲民之生也如鳥獸然饑食渴飲難馴易駭名公端士承時之平因俗之阜或以智力理之可也若移之於瘡痏毒痛一作痡之後非德信積中和粹發外以誠被物如父愛子則何以臻於此夫人君臨上百辟在下其欲正生人之性命敷大中之教化扶淫僭之風俗行明白之刑罰一作賞非有功者則不得操其柄焉故刺史於他官為重漢制秩中三千石冠進賢銀印青綬隼旟龍節蓋所以大其威而昭其德也今天下郡國僅四百餘所上憂黔首垂意於理有淳政被民者增秩賜金如漢宣帝時濟濟多士作民父母遐邇一德同思於理則雍熙仁夀之化豈其逺乎載寓逰樂土聞公撫凋瘵之民也善故書宇下以貽為政或足文行佞亦無取焉自貞元夏五月郡公名氏品秩遷授雄劇年代寖逺亦列叙其次使將來者覽之端如貫珠也五年八月十五日記湖州刺史㕔壁記顧况江表大郡吳興為一夏屬揚州秦屬㑹稽漢屬吳郡吳為吳興郡其野星紀其藪具區其貢橘柚纎縞茶紵英靈所誕山澤所通舟車所㑹物土所産雄於楚越雖臨淄之富不若也其冠簮之盛漢晉以來敵天下三分之一其刺史沿革不同或稱太守或稱內史或稱都督也一無也字他州或否如魯史晉乘侯牧一也其鴻名大德在晉則顧府君祕祕子衆陸玩陸納謝安謝萬王羲之坦之獻之在宋則謝莊張永禇彥回在齊則王僧䖍在梁則桞惲張謖在陳則吳明徹在隋則李德林國朝則周擇從令聞也顔魯公忠烈也袁給事髙讜正也劉員外全白文翰也洎于頔大夫作塘貯水溉田三千頃今使君辭唐景皇帝七代一有之字孫先公尚書先公大夫奕葉之勛一作勳有功於民公實嗣之孔悝銘鼎天下大器天王褒拔于公陟襄陽節度李公陟當道觀察統諸道鹽鐵轉運二牧既陟唯公盤桓鴻鵠不飛飛即摩漢其逋者復其危者安其憂者泰所謂善緝於是拓郛耰萊就便除害政之餘力作銷一作消暑樓於南端復亭署於白蘋洲聿興廢土光明敞豁湧出漢谷其舊記吏部李侍郎紵撰其圖經竟陵陸鴻漸撰使君命况揔兩家之說俶落晉宋訖於我唐凡一百九十七人及歷代良二千石儀形略也鋪張屋壁設作存勸竦神告人一作民春秋不朽之義也貞元五年十二月哉生魄華陽山人顧况書一作皆唐文粹道州刺史㕔後記吕溫壁記非古也若冠綬命秩之差則有格令在山川風物之辨則有圗諜在所以為之記者豈不欲述理道列賢不肖以訓於後庶中人以上得化其心焉代之作者率異於是或誇學名數或務工文粹作攻為文居其官而自記者則媚已不居其官而代人記者則媚人春秋之㫖蓋委地矣賢二千石河南元結字次山自作道州刺史㕔事文粹無事記既集無既字彰善而不黨亦指惡而不誣直舉胸臆用為鍳戒昭昭吏師長在屋壁後之貪虐放肆以生人為戲者獨不愧於心乎豫自幼時讀古循吏傳慕其為人以為士大夫立名於代無以高此前年冬由尚書刑部郎中出為此州雖苦文粹作履劇自課而未能逮其意也往刺史有許子良者輒移元次山記於北牖上文粹作下而以其文代之後亦有時號君子之清者蒞此熟視焉而莫之改豈是非之際如是其難乎豫也魯安知乎集作其他則命圬而書之俾復其舊且為後記以廣次山之志云隴州刺史㕔記沈亞之昔制戎於安西瀚海之時而隴汧去塞萬三千里其處內居安如此朝之命守猶以為重地必拔其良能當時之務其難者不過理寵門大家之內集作田園陂池而已觀升平之塞其須賢如此今自上邽清水以西六鎮五十郡既失地地為其田城為其固人為其奴婢顧隴涇鹽靈皆列為極塞而隴益為國路凡戎使往來者必出此視其守由主人也其言語威儀豈容易而處近世集有者字朝之命守殆未能注意耳今清河崔公承寵世仕安西軍司馬公生長於戎然而神性傑異行賢知之路頗通詩書又能慱九州山川之理而國中之士知而仰者無幾人近嵗西戎纍犯塞前年今上即位欲以姻交北敵以輔中國公上書兩言蕃之事天子覽書以為必能伺戎夷情故命使之今年拜守隴州拜之日朝之卿士咸謂隴之得賢為賀居郡而戎來者必憚愛而去嗚呼何嚮之命守未能注意而今之悟得其人賢何嚮之知者無幾而今之稱者盈朝豈一郡之事有時而理邪一郡之人有時而幸邪智者之道有時而用邪長慶初余西視戎至於隴下聞郡人之所美故歷署而刻記焉文苑英華卷八百一
