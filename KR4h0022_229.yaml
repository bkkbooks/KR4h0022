body:
  text: 文苑英華卷二百二十九宋李昉等編道門五送贈道人五十九首送宫人入道五首送贈道人靈都觀李道士張籍仙集作山觀雨未靜繞房瓊草春素書天上字花洞古時人泥竈煮靈液掃壇朝玉真幾回遊閬苑青節亦隨身贈山中女道士集作不食姑前人女仙唯獨住集作幾年山裏住已作緑毛身護氣常虛集作稀語齋心集作存思自見神飬龜同不食留藥任生塵要問西王母仙中第幾人送隂集作徐先生歸蜀前人日暮逺歸處雲間仙觀鍾唯持青玉牒獨上碧鶴峰隂洞新生集作長收乳寒泉舊飬龍幾時因賣藥得向海邊逄道一作隱者見二百三十二卷贈道士宜師前人自到皇城得幾年巴僮蜀馬共隨緣兩朝侍從當時貴五字聲名逺處傳舊住江集作紅樓通內院新承墨詔賜齋錢間坊暫喜居相近還得陪師坐竹邊送胡鍊師王屋山前人玉陽峰下學長生洞府仙中已有名獨戴熊鬚冠暫出唯將鶴尾扇同行鍊成雲母休炊㸑召得雷公當吏兵却到天壇上頭宿應聞空裏步虛聲中元日看諸道士步虛殷堯藩玄都開祕籙白石禮先生上界秋光淨中元夜景清星辰朝帝處鸞鶴步虛聲玉樹花難老珠宫月最明掃壇天地肅投簡鬼神驚儻賜刀圭藥還留不死名贈溫集作王尊師姚合先生自説瀛洲路多在青松白石間海岸夜中常見月仙宫深處却無山犬隨鶴去遊諸洞龍作人來問大還今日偶聞塵外事朝簮未擲復何顔贈王道士于武陵日日市朝路何時無苦辛不隨丹竈客終作白頭人浮世度千載桃源方一春歸來華表上應笑北邙塵天柱山贈峨嵋田道士施肩吾古稱天柱連九天峨嵋道士棲其巔近聞教得玄鶴舞試慿驅出青芝田贈道者一作士朱慶餘自識來清瘦尋常語論真藥成休仗火符驗不傳人獨有年過鶴長無病到身潛教問弟子居處與誰鄰山中道士賈島頭髮梳千下休糧帶瘦容養雛成老集作大鶴種子作髙松白石通宵煮寒泉盡日春不曽離隱處那得世人逢送道者前人獨向山中見今朝又别離一心無挂住萬里獨何之到處絶煙火逢人話古時此行無弟子白犬自相隨送胡道士前人短褐身披滿幘集作清野苔靈溪深處觀門開却從城裏携琴去許到山中寄藥來灑雪集作臨水古壇秋醮後集作罷啄查寒鳥暮飛回集作宿杉幽鳥夜飛回未遊彼地空勞想師往如雲不可陪集作丹梯頭逐真人上日夕歸心白髮催贈王尊師劉得仁為道常日損尊師修此心挂肩黃布被穿髮白蒿簪符札靈砂字絃彈古素琴囊中常有藥點土亦成金山中尋道人不遇前人年過羽冠風塵裏常擬隨師學鍊形石路特來尋道者雲房空見有仙經碁於松底留殘局鶴向潭邊退數翎便欲此居間到老先生何日下青冥送張尊師歸洞庭許渾能琴道士洞庭西風滿歸帆路不迷對岸水花霜後淺傍簷山果雨來低杉松近晚移丹竈巖谷初寒蓋藥畦他日相思一行字誰人知處武陵溪寄崔先生溫庭筠往年江海别元卿家近山陽古郡城蓮浦一作沼香中離席散栁堤風裏釣船橫星霜荏苒無音信煙水微茫變姓名菰黍正肥魚正美五侯門下負平生敬答李先生前人七里灘聲舜廟前杏花初盛草芊芊緑昏晴氣春風岸紅漾輕輪野水天不為傷離成極望更因行樂惜流年一瓢無事麛裘暖手弄溪波坐釣船雪中寄殷道士方干大片紛紛小片輕雨和風激集作繫更縱橫園林入夜寒光動忩户凌晨濕氣生蔽野吞村飄未歇摧巢壓竹密無聲山隂髙集道士多吟興六出花邊五字成因話天台勝異仍送羅道士前人積翠千層一徑開盤紆集作遙盤山腹到瓊臺藕花飄落前巖去桂子流從别洞來石上叢林礙星斗忩邊瀑布走風雷縱云孤鶴無留滯亦集作宅恐煙蘿不放回贈天台葉尊師前人莫一作難見平明離少室須知集作猶須薄暮入天台常時愛縮山川去有夜自一作曽携星月來靈藥不知何代得古松應是少年栽先生暗笑看一作觀碁者半局碁邊白髮催此詩二百六十二卷重出今已削去注異同為一作送道人歸舊巖前人舊巖終副却歸期巖下有人應識師目覩嬰孩成老叟手栽松柏有枯枝前山低校無多地東海淺於初去時若把古今相比類姓丁仙鶴亦如斯賦得送軒轅先生歸羅浮山李洞仙山歸隱浪搖青緑髮雙瞳一帙經符帖布帆猿鳥看鶴煎金鼎鬼神聽洞深頭上覺船過樓靜鼻中聞海腥此處先生應不住吾君南望謾勞形贈玉芝觀王尊師雍陶處處煙霞尋總遍却來城市喜逄師時流見説無人在年紀唯應有鶴知大藥已成寧畏晚小松初種不嫌遲長憂一日歸天去未授靈方遣問誰玄都觀李尊師喻鳬蘚幘翠髯公一作微翁存思古觀空曉壇柳葉露晴圃栁花一作杏花集作木苖風夀已將椿並碁難見局終何當與髙鶴飛去海光中送羽人王錫歸羅浮曹唐風前整頓紫荷集作霞巾常集作歸向羅浮保集作報養神石磴倚天行帶月鐵橋通海入無塵一作津龍蛇出洞間邀雨犀象眠花不避人最愛葛洪尋藥處露苖煙蘂一作雨滿山春送劉尊師祗詔闕庭三首前人海風葉葉駕霓旌天路悠悠接上清錦誥凄涼遺去恨玉簫哀絶醉離情五湖夜月幡幢濕雙闕清風劔珮輕從此集作莫道暫辭華表柱更集作已應千載是歸程二五峯已集作此别隔人間雙闕何年許再還既掃集作拂山川收地脈須留日月駐天顔霞觴共飲身雖在風馭今集作難陪迹集作路未間從此枕中唯集作雖有夢夢魂何處訪三山三仙老間眠碧草堂帝書徵入白雲鄉龜臺欲署長生籍鸞殿邀論不死方莖露想傾延命酒素煙思爇降真香五千言外無文字更有何詞贈武皇贈華陽宋真人兼寄清都劉先生李商隱淪謫千年别帝宸至今猶識集作謝蘂珠人但驚茅許多玄分集作洞仙籍不記盧劉是世親玉檢賜書迷鳯籙集作篆金華歸駕冷龍鱗不因杖屨逢周史徐甲何曽有此身送費鍊師供奉赴上都姚鵠縮地周遊不計程古今應只有先生已同化鶴臨華表又見驂龍向玉清蘿磴靜攀雲共過雪壇當醮月孤明無因相逐朝天帝空羡煙霞得送迎贈道士項斯見來知養氣度日語時稀到處唯開井經寒不絮衣病鄉多藥惠鬼谷有符威自説身輕健今來數夢飛華頂道士前人仙人掌中住坐有上天期已廢燒丹處猶多種杏時養龍於淺水寄鶴在髙枝得道復無事相逄盡日碁秦中逢王先生趙嘏萬萬東流不一回先生獨此負仙才蘂宫橫浪海邊别鶴趐駐雲天上來幾處吹簫森羽衛誰家殘日下樓臺青春正好分瓊液乞取當時白玉杯贈王先生前人太一真人隱翠霞早年曽降蔡經家羽衣使者峭於鶴鳥爪侍娘飄若花九鼎欄干歸馬齒三山窈窕步雲涯時因弟子偷靈藥散落人間駐一作潤物華贈道者前人華蓋飄飄緑鬢翁往來朝謁蘂珠宫幾年山下隂陽鼎盡日澗邊桃李風野迹似雲無處著仙容如水與誰同應憐有客外妻子思在長生一顧中一作諾中王先生不别而去前人仙翁歸袖拂煙霓一卷素書還獨携斸藥滿囊身不病抱琴何處鶴同棲霑衣盡日看山坐搔首殘春向路迷樹樹白雲幽徑絶短船空倚武陵溪送趙道士歸天目舊山薛能愚朴尚公平此心憐道情有祿終自鄙何計逐師行日者聞髙躅時人蓋強名口無滋味入身欲羽儀生表乞還鄉速集作逺詩曽對御成土毛徵一作珍到越塵髮捲離京符呪風雷惡朝修月露清觀臨天目頂集作秀家住海濤聲導引圖看足參同注解精休糧一擬問忽集作蔥草俟回程别道者劉駕自君入城市北邙無新墳始信壺中藥不落白楊根如何忽告歸蕣華還笑人玉笙無遺音恨望緱嶺雲贈王道士周賀藥力資蒼鬢應非舊日身一為嵩嶽客幾葬洛陽人石縫飄探水雲根斧斷薪關西來往路誰得水銀銀送梁道士周朴舊居桐柏觀歸去愛安間倒樹造新屋化人修古壇晚花霜後落山雨夜深寒應有同溪客相尋學鍊丹謫仙吟贈趙道士李羣玉汗漫東遊黃鶴雛縉雲仙子住清都三元麟鳯推髙座六甲風雷閟小壺日月暗資靈夀藥山河直擬一作常值化生符若為失意居蓬島鰲足塵飛桑樹枯送秦鍊師陳陶紫府靜沉沉松軒思别吟集作到琴水流寧有意雲泛本無心錦洞桃花逺青山竹葉深不因時賣藥何路更相尋溪行寄道侣張祜見本集白日長多事清溪偶獨尋雲歸秋水濶月出夜山深坐想天涯去行悲澤畔吟東郊古人在應笑未抽簮訪嵩陽道士不遇聶夷中先生五嶽遊文焰滅金鼎日一作月下鶴過時人間空落影常言一粒藥不隨死生境何當列禦冦去問仙人請送何道士歸山張喬身非絶粒本清羸東挂仙經杖一枝落葉自隨一作逺路獨尋流水去深山長與白雲期樹臨丹竈寒花疾壇近清風夜月遲樵客若能一作隨過洞裏回歸人世始應悲寄中嶽顓頊先生前人先生顓頊後得道言何人松柏卑於夀兒孫老却身夜窗峯頂曙寒澗洞中春戀此逍遙景雲間不可親贈崔道士杜荀鶴四海干戈無靜處人家廢業望烽煙九華道士渾如夢猶向樽前笑揭天送鄒尊師歸洞庭楊逵衆島在波心曾居一作為舊隱林近聞飛檄急轉憶卧雲深賣藥唯供酒歸舟只載琴遙知明月夜坐石自開襟遇道者張蠙數里白雲裏身輕無履蹤故尋多不見偶到即相逢古井生雲水髙集作幽壇出異松聊看杏花酌便似換顔容贈道者前人得道疑人識都城獨閉關頭從白後黑心向閙中間飢渴唯調氣兒孫亦駐顔始知仙者隱殊不在深山送苪尊師王貞白石上菖蒲節節靈先生服食得長生早年避世憂身老近日登山覺步輕黃鶴待傳蓬島信丹書應換蘂宫名他年控鯉升天去廬嶽逋民願從行寄程尊師羅隱鶴信雖然至集作到五湖煙波迢遞路﨑嶇玉書分薄花生眼金鼎功遲雪滿鬚三秀紫芝勞夢寐一畨紅槿恨朝晡未知朽敗凡間骨中授先生指教無第五將軍於餘杭天柱觀集作宫入道因有題寄前人交梨火棗味何如聞説苕川已卜居一作下車瓦榼尚携京口酒草堂應寫潁陽書亦知得意須乘鶴未必忘機便釣魚即集作却恐武皇還望祝軟輪徵入問玄虛寄聶尊師前人欲芟荆棘種交梨指畫城中日恐遲安得紫青磨鏡石與君間處看榮衰逄道者神和子前人珍重神和子聞名五十年童顔終不改緑髮尚依然酒裏消間日人間作散仙長生如可慕相逐隱林泉贈道人曹松住山因以福為庭便向山中隱姓名閬苑駕將雕羽去洞天贏得緑毛生日邊腸胃飱霞火月裏肌膚飲露英顧我從來斷浮濁擬驅雞犬上三清訪道士裴説髙岡微雨後未一作木脫草堂新惟有踈慵者來看淡薄人竹芽生礙路松子落敲巾粗得玄中趣當期宿話頻送宫人入道王建休梳叢鬢洗紅粧頭帶芙蓉出未央弟子抄留集作將歌遍疊宫人分盡集作散舞衣裳問師初得經中字入靜獨燒內裏香發願蓬萊見王母却歸闕下集作人世一作城關施仙方同前張籍舊寵昭陽裏求集作尋仙此最稀名雖集作初出宫籍身未稱霞衣已别歌舞貴長隨鸞鶴飛中官看入洞空駕玉輪歸同前于鵠十五吹簫入漢宫看修水殿種芙蓉自傷白髮辭金屋許著黃衣向雪峰解語老猿開曉户學飛雛鶴落髙松定知别後宫中伴遙聽緱山半夜鍾同前張蕭逄捨寵求仙畏色衰辭天素面立階墀金丹擬駐千年貌玉指休勻八字眉師主與收珠翠後君王看戴角冠時從來宫女皆相妬聞向瑶臺盡淚垂同前項斯願隨仙女董雙成王母前頭結百家詩選作作伴行初戴玉冠多誤拜欲辭金殿别稱名將敲碧落新齋磬却進昭陽舊賜筝旦暮焚香繞壇上步虛猶作按歌聲文苑英華卷二百二十九
