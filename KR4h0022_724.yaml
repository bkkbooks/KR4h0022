body:
  text: 文苑英華卷七百二十五宋李昉等編餞送八送趙晏歸江東序一首送賈九歸鳴水序一首送從叔南逰序一首送從舅赴陽翟序一首送楊倓南逰序一首送庫狄縱入蜀序一首送盛卿序一首送通上人之南海便赴上都序一首送鋭上人逰羅浮山序一首送朱秀才歸上都序一首送陳秀才序一首送冷秀才東歸序一首送竇秀才序一首送蔡秀才序一首送朱拾遺序一首陪江西李大夫東湖賦詩送宣武軍趙判官還使序一首送韋處士適東陽序一首送張明謙適越序一首送謝舍人赴朝廷序一首奉送泉州席使君赴任序一首送李補闕歸少室養疾序一首送耿拾遺歸朝廷序一首送朱拾遺赴朝廷序一首送趙晏歸江東序于邵四官擢天府一枝之秀居十二年而先其文章用譽聲馳一作怚寰海內行循疑作修潔正為人言故王公卿士願見顔色皆延以座右挹以上樽結平生之至歡聽傳習之餘論翕然而風靡矣自隨牒吳楚諸府交辟有車轔轔無一日而止故驟遷於維荆仍假治書亦既逹矣今上觀兵鳳翔之嵗公以錫貢會于闕庭舉朝延首以望真拜屬多難之際蒼黃易誣斬馬未聞於去佞𢎞羊且偏於用法是有流沙之譴不及旬日至于五原犬戎合圍我在堅壁以功復為詞曹外掾雖雷雨作解而風塵未厭流離辛苦又屆乎漢陽雲天路長骨肉為念將欲出三峽浮二江漸逹於吳昌接行鴈於舊地問伯魚之他日蓋生死骨肉之會豈勝言哉大寒之嵗衆木皆死相彼松柏雖復小凋而貞心徑節不改柯易葉實君子之大端也持此貺别不知其他送賈九歸鳴水序賈生深於義者也又能保和天資強學不倦井禦冦之執㸑處原憲之非病行於一作逰林泉蓋數周矣實沉之會賁然來思南郭之下言尋舊好顧州縣而不為道屈齊得失而戒茲福利實君子之大端也知我者鮮謂豫知之朝夕之歡經時不去式歌且賦嘗至于夜分不知天下之秋颯然而至詠采薇以獨往始班荆而送别南指蜀路江山四蔽苟吾道之可存居鳴水而何陋是為不侵不叛之地得以長處約矣乃知全謀決䇿可以逺馭青溪白雲時復助興二三子豈知樂在其中乎出郊之時論别而已送從叔南逰序叔父乃相國東海公猶子之慶裔今少師郢國公外王父之介弟也生於台庭長於儒門修先王之典禮操作者之文律斯亦叔父立身之道𢎞矣屬時艱難流離辛苦田園蕪沒族黨淪謝斯又叔父厚生之道窮矣三十年間為東西人豈無常科亦有世路道之不由吾其與也得非恢逹自是處之無悶耶况郢公和義以仁如存展敬居常館給不度以年因得造寢席問起居不敢墜睦親之禮久矣夫不羈之才若不繫之舟不然則何以泛其流而析其滯歟既而將登商顔尋綺季翼儲之顯晦進浮滄浪追漁父遁代之始終或經九疑或入五嶺探靈感廣異聞崇朝命駕來告于邁不懌者結遐方之離思所賀者從諸侯之勝逰敬奉觴以祖軷遂贈言於慎夏云送從舅赴陽翟序昔者秦賦渭陽之詩蓋孟公子三字一作君子之出祖也綿歷千祀頌聲不泯幼失慈愛於斯為苦未嘗不廢卷撫膺書紳自勉以為罔極之報祭在如存之禮不其然歟自幽燕稱亂伊洛內覆爰我舅黨舉族東遷祏室無祀名園何在永懷展敬謁日無緣叔舅十年過江三命作吏慶垂必復休有令聞使車斯來輒不自意陽翟駿選天書寵光思同晝逰有日矣伯舅京劇先鳴曷由偕往小子江華罷守未離繫滯指途惜别卜勝初筵當獻嵗之方春對上林之晴雪興酣景晏欲罷不能則叔舅之慈惠鍾於我也良可知矣望鈞臺舊都返伊川故里出鄢郢長道控河淮要衝于焉馳名于以在我况清白以世業留遺貞幹以天資自許鴻鵠之舉雲霄可期慙無酷似拜命之辱敘離道念庸不喻乎司勳貟外郎鄭一作程昌締邵同等也實為首唱其或繼之者則以多為貴爾送楊倓南逰序𢎞農楊倓世以文藝登甲乙科而倓克構前烈復修儒行升高作賦正始言詩期于拾青今也被褐蓋未遇云爾桂林之逰我何憂哉在幕則副使韋公存乎舊判官韋公置乎客其外則韓萬州為知舊則倓不孤客則倓有已知則倓可逰豫亦子之舊也見其來則撫之憂則樂之命諸子以同之其他則不如二三子之強大嘗所愧焉忽有餘興言將南邁尋桂江之逺近度疑山之險易適諸侯之管披三越之圖並蒼梧以右轉觀象地之發迹亦何謝泛五湖探禹穴而暢其孤憤哉扁舟一葉風濤千里於所適復何危乎吾當俟子於夀星之會而復祗命所在念此無忽興元之元季夏之望河南于邵詞送厙狄縱入蜀序夫以禮樂為用檢身若不及者嘗聞其語矣今見厙狄子雅而有之况心氣爽練尤於妙理原憲非病黔婁自安沽之哉吾待價也漢陽之米人食如玉有妻子以宜家無饘粥以糊口余承艱否又不能救夏四月告余以行舉家杖藜將赴于蜀蜀多竒士吾道其南風水之便宜未量一作當也隴俗春晚梅花始發言送山路蕭然雨寒四郊多虞舉手千萬送盛卿序老夫負纍炎方僻處南館東阻高岸西臨通衢衡門寂寥誰與為晤數日之後而得比鄰盛卿者眷道以間處約以靜詩禮日訓柴荆晝關嘗思急病之用載勤稽古之力每接以三餘時復一見來不飲酒去無可欲儒之敬慎有如此者春三月叩門告别且曰本剡中人也家於錢塘一入桂林一作嶺十周星矣漸走長安之道將尋吳會之事乘其波流聊以自適僕老者病者以憂以悒留之則難别又不易子之不飲不可以斗酒歡一作勸我以窮途無得以束修贈執手分手傷如之何雲雨一散江山萬里東西南北其有會乎遷客于邵贈言而已送通上人之南海便赴上都序通公釋門之秀者也生本逹節出修𣑽行表之以威儀文之以外教始具戒于衡山之下瀟湘之間嘗以律人法雖可住而相不可住是以杖飛錫入五嶺將逺一作遐舉於羅浮尋迹於現靈為矯其因而集乎緣逰其方而廣乎志洪惟通公之為心也其至矣夫猶復歷天柱訪爐峯背淮淝即嵩頴翺翔乎中國以及乎上京上京聖君布政之所也公觀夫宫闕則曷若西方之諸天公接彼龍象則曷若西方之衆聖加以探密藏傳意味發揮象法啓迪來學在此行也扁舟而南溟漲茫茫要荒積阻動千萬里嵗月不之計岐路不之悲曠哉釋子不可得而攀也送鋭上人逰羅浮山序釋子一作氏之有出家猶儒門之務行道既得其道則思其通過去諸佛以故能聖則出證於無生歸於等觀安可倪乎有乘精於斯勤於斯乃至旋頂無苦剜身為樂赴湯蹈火而不舍晝夜者是夫鋭公天縱明惠學究多聞誦詩三百而言思無邪閲部十二而心義自了寄文章為語默任施捨為行藏內修為法律外習為祕苑豫則不敏人皆仰之前年皆一作背自瀟湘登桂嶺大人君子延方丈之室與論實相下士齊人奉次第之食為説皆空習靜而外郛求安得朋而西山有寺青蓮宫裏日月宵中雖法侣常逰而吾儕不間嘗憶浮山是蓬萊一島浮來與羅峰合秀班房瑶臺一作室七十有二松閣玉一作石樓千百其數麻姑舞鳳之地葛仙蟬蛻之所將欲導殊勝廣異聞鋭公此行天下莫二矣十月良月晴天愛景密葉彌茂繁花不寒羣山壁立而合沓百巒長江海連而澎湃萬里搜竒索異可駐行舟懷哉勝逰不愧相送逮春之冰泮期我於荆峴之間乎送朱秀才歸上都序嘗喜南中之遇墨客者甚矣今又得會稽朱因卿焉序而字之蓋美之爾况其學也博其文也精凡作為篇章皆可興詠處之於代則詩人之選也邵故東西南北願與修好從可知矣始至之日贄見于我府公府公答之以客禮亦既館給終然宴私高枕延國士之風開門多長者之轍義非苟合道不虛行叩清徴而况我知音執禮容而許我先逹歡與老夫接辱與胤英華作涓非子逰風雨如晦孰云其已而一作西北走長安萬里帝王居治所也賢關啓鑰哲匠見焉鵬摶鳳翥造次於是彼美因卿在斯一舉餘勇可賈矧爾彀中瀟湘悠悠鄢郢阻修商峴衡疑白雲間之登山臨水楚人之重别也人涉卬否衛詩之歎異也雖欲勿歎得無歎乎送陳秀才序秀才以我府公有元昆同官之舊邂逅不見于今三年故不逺數千里泝瀟湘踰零桂而循來上謁府公府公嘉是來也館有加籩之餼宴有承筐之禮上下交好州人恱之既而盈卷新文惠豫佳句艤舟將往咨我緒言夫閉門循來者遷客之心也窮巷迂轍者逹士之情也以逹士之情也眷率遷客不腆之作雖處憂危得無承一作詩乎多謝之仁行矣自愛送冷秀才東歸序昔忝鄉賦多與太學英逹為之逰二十年間學者逃難石渠遂閉鼓篋無聞近三四年復與士合每嵗以故事選實而流頌聲則江寧冷侯由此擢秀今之與比前或少雙是以中朝宗文當代秉義者蓋嚮風矣不復相鄙愚無間然得為田蘇之逰不負金石之契亦既多矣吳會之地慈親倚門冷侯言歸心切攸往白鴈初過清𡨕轉高駕言東逰雲雨惜别邵亦是日理裝也始同末異愴此岐路冷侯深於詩也祕監韋公敘焉其為歌詩以出餞皆漢廷顯逹士林精妙各附爵里為一時之榮邵何言哉貺别而已送竇秀才序曩嵗忝西掖舍人與秀才世同官逰朝赴玉墀夕下金闕于今二十年矣今復左遷僻地羈旅信安不期東逰邂逅相遇而能倍一作信年下禮論舊加敬實髙標雅裁為邦家之光故懷袖雄文豫得興詠長途逸足豫將企望而殿中侍御史范陽盧公聿來監州持我文柄解簡書之畏嘗翰林主人來者飲德挹之不竭嘯歌攸同逮茲中冬將盡厚意不虞作别况豫之與名輩者乎如何選一作撰舟告我行邁羅郭之下縠川可厲枯桑槭而不知有風暮天暗而且欲飛雪此時以長年其悲懷哉曷日相會哉送蔡秀才序蔡氏之子曰虛舟以十月良月旅次於信安謂余老於文者展後進之禮清晨來思贈余舊文凡數十篇與之討論導以無倦蔡子乃盱衡而納焉夫如是則何患乎名不揚道不行春官卿復將示諸掌乎佻兮逹兮亦以永日言飲之酒時無間焉客非滯者逰有常者言告言歸明日遂行雖江南地暖於景度短急張帆便風猶可及逺蔡子其將邁乎常山公于邵敘别送朱拾遺序顧况楚天暮秋衰草多霜我送朱兄置酒寒塘他方有遺名之人語出世之事昔我一作者成大師居毗耶離方丈之室以虛空量納諸群有為法而來難於酬對兄辨才者精於語默雪山有草可生醍醐上賢不自豐故貧也上智不任數故樂也言出以機在心為咎故慎也和平發中金玉鏗鏘如秋水之溢塘殊不知長松倚空逺鶴孤唳如一有朱字兄也將刀畫水水中不斷以道親人人何有别何山不可以為家何水不可以泛舟我送朱兄浮于亂流主明不在諌故一有諌字臣在瀾漫之逰陪江西李大夫東湖賦詩送宣武軍趙判官還使序相國大司徒統戎于汴汴之介者有長鬛廣顙乘遽四方交歡諸侯以利君實我大夫待以加等問其所欲蓋相國於其君義踈而後有誡誡存而後有别此敬相國而及子其告復乃賦平字之什以寵之春秋之義凡君子之嘉一善接一士皆欲有所用必相其宜而比之昔代之阿鄄燕侵河上晏相之薦穰苴文能附衆武能威敵果却燕晉之師送韋處士適東陽序珠玉在淵蘭在深林士不定方而處東陽佳地樓上隱侯之八詠溪中康樂之贈答韋生翺翔若復故都會豫放逐相逢姑蔑之山所裁新詩婉而有意凡逰山水苦無卷軸復無幽人携手一何異飛鳥一翼行車隻輪眼界孤矣於疑作放言自譴以貺處士乎哉送張鳴謙適越序晉司空十四代梁尚書左僕射纘武代孫曰鳴謙問行於我我對曰乃祖蹈道隱黃鵠山乃先敦德隱朝陽山今子洽聞繼修先好是一門而三隱矣臺仲之處也雲翔冥廓亦復何礙又將嫁于四方余常適越東至剡南登天姥天姥而西即東陽太末姑蔑之地盤桓乎弋陽其山霞錦其水紺碧其鳥好音其草芳葩奪人眼晴猶未麗也仙人城在其上可以汰神可以建文可以棲豫獨不見錯誅而回樂乎感隙駟之末光事塗龜之修齡觀萬化之始終道訓曰處其厚不處其薄丈夫之事豫亦從此逝矣適人之適孰與自適其適乎送謝舍人赴朝廷序梁肅見集本初公以文似相如得盛名於天下大歷再居獻納俄典書命時人謂公視三事大夫猶寸步耳爾來六七年同登掖垣者已迭操國柄而公方自廬陵守入副九卿器大舉遲不其然歟前史稱漢文帝對賈生語至夜半且有不早見之歎矧公才為國華識與道并當欽明文思之日繼宣室前席之事必將敷陳至論超履右職使賢能者勸彼棘寺竹刑豈君子淹心之地乎亦既撰吉晉陵主人於夫子有中朝班列之舊是日惜歡會不足乃用觴豆宴酬以將其厚意意又不足則陳詩贈之屬而和者凡十有一人小子適受東觀之命從公後塵行有日矣存乎辭者祗以道詩人之意而已至於瞻望不及之思不敢自序云奉送泉州席集作石使君赴任序使君至德初以一命領太原尉俄歷御史參丞相軍事所從之主則李侍中王黃門其人當時議者謂翰音上騰非決起所及展轉祿仕三十餘年乃以宰邑功次除晉安守其恬於名利如是體命者歟後時然乎傳稱士任重而道逺惟先尚書文公茂德盛名光乎集作于前朝吾子淑慎其身荷伯父覆露銀章皂蓋秩二千石方將布王澤以牧閩人得不謂重且逺乎行當變餘善之俗使至齊魯然後祗承優命超處蕃閫集作近藩乃其盛也七月之吉火雲在天征車徂東瞻望不及所當慎者殘暑而已豈以逺道為戒哉橾札一作槮袂如之何序以道意送李補闕歸少室飬疾序昔司馬相如當漢六葉為言語侍從之臣今天子用人文化成亦以君有相如之才擢居諫職且掌宸翰賦頌書奏粲然同風夫君子之道與命與時三者并則不期集作蘄逹而逹不然則或鼓或罷或塞或通是以長卿屢去其官而君亦以疾退息各其時也君曩時祭夏圭集作主頌比于馭龍射虎其詞最盛如夏雲秋濤變化騰湧蔚乎當代學者誦之及夫朝夕論思上尤所器異故乞身之表七上而後賜告有以見聖王之愛才也夫賢者境不靜則神不怡身不安則疾不去故夫子暫遊江湖樂其靜也復還少室就其安也易傳稱飬正則吉矧夫氣甚和志甚邁興愈贍而才未集作不竭是行也方憩于雲林之中陶然自飬以餌浩氣然後階集作升浮雲翼疾風登紫垣步清漢當此時無妄之疾抑自去不暇安肯住於蘧廬集作肌膚間哉始君未為近臣時論有積薪之歎及其造退朝廷厚優賢之禮今也于歸君子賦考槃之詩此數者足以觀子之義不可以不序焉爾送耿拾遺歸朝廷序國家方偃武事行文道命有司修圖籍三字集作條祕圖籍且慮有闕文遺編逸詩墜禮分命史臣永之天下若汲冡墓陵山穴之徒必從而搜焉拾遺耿君於是乎擁輕軒奉明詔有江湖之役亦勉已事將復命闕下七月乙未改轅而西將朝夕論思左右帝扆用廣犬天祿石渠之籍託風求集作於吟咏情性之作當堯舜之聰明魏丙之謨猷以拾遺之才之美其翰飛逺邇不可度已衆君子蓋將賀不暇彼吳秦離别於我何有作者之志小子承命而序之送朱拾遺赴朝廷序上將以道蒞天下先命大臣舉有道以備司諌故朱君長通有拾遺之拜時議以為明天子在上百僚奉職於下化既成矣而猶廣獻納以通諷諭聖人之心其至矣初長通以比興之文名震翰林又以玄逺之致升聞天朝其靜也眄滄海以遂志其動也披白雲以受詔吳中賢士大夫相賀不暇長通方移疾餌藥不出東山者三年或曰以君之才之識冝行而止冝語而默且君命召其可以久乎由是不俟駕亦不敢言病獻嵗之吉涉江而西夫宴息以𢎞道由道以致逺位在乎忠道在乎辭蓋拾遺之志如此彼離别之難秦吳之逺前期之不易皆付之樽中可也又曷足置於心胸間羣賢於是乎酒酣歌詩以代雜珮之贈文苑英華卷七百二十五
