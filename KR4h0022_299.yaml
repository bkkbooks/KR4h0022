body:
  text: 文苑英華卷二百九十九宋李昉等編軍旅一講閲三首征伐十九首邉塞五十四首講閲從齊武帝琅瑘講武應詔沈約九功播祧墠七德陳武縣展事昌國圖息兵由重戰皇情咨閲典出車逮辰選飾徒映寒隰翻綏臨廣甸颯沓佩吳戈參差腰夏箭風斾舒復卷雲霞清以轉一作雲葭清以轉輕舞信徘徊前歌且遙衍秋原嘶代馬朱光浮楚練虹壑寫飛文巖阿藻餘絢發震嶽靈從揚旌水華變慿高訓武則中天起遐眷鳯蓋掩洪河珠旗掃集作拂長汧方待翠華舉逺適瑶池宴從駕觀講武庾信校戰出長楊兵欄入鬬場置陳橫雲起開營鴈翼張門嫌磁石礙馬畏鐵菱傷龍淵觸牛斗繁弱駭天狼落星奔驥騄浮雲上驌驦急風吹戰鼓高塵擁貝裝駭猿時落木驚鴻屢斷行樹寒條更直山枯菊轉芳豹略推全勝龍圖一作韜揖所長小臣欣寓目還知奉會昌奉和杜員外扈從教閲李嶠杪冬嚴殺氣窮紀送頺光薄狩三農隙大閲五戎場萊田初起燒蘭野正開防夾岸虹旗轉分明獸罟張燕弧帶曉月吳劔動秋霜原啓前禽路山縈後騎行雲區墜日羽星苑斃天狼禮振軍容肅威宣武節揚神心體殷祝靈兆叶姬祥幸陪仙駕末欣採翰林芳征伐送北征祖珽翠旗臨塞道靈鼓出桑乾祁山斂氛霧瀚海息波瀾戍亭秋雨急關門朔氣寒方繫單于頸歌舞入長安同前裴讓之沙漠胡塵起關山𤇺燧驚皇威奮武略上將揔神兵商類聚作高臺朔風駛絶野寒雲生胸奴定逺近壯士欲橫行南征蘇子卿一朝逰桂水萬里别長安故鄉夢中近邉愁酒上寬劔鋒但須利戎衣不畏單南中地氣一作氣多暖少婦莫類聚作早愁寒從駕送軍沈炯見類聚惟堯稱乃武軒后號神兵吊民資知勇治亂屬師貞我君膺寶業歷駕視前英浦海方無浪夷山未有平星光下結斾劔氣上舒精雲開萬嶺徹日麗百川明撫鼓山靈應詔蹕水祗驚奉報趙王出師在道賜詩庾信上將出東平先定下江兵彎弧伏石動振鼓沸沙鳴橫海將軍號長風駿馬名雨歇殘虹斷雲歸一鴈征暗巖朝石濕空山夜火明低橋澗底渡狹路花中行錦車同建節魚軒異泊榮軍中女子氣塞外夫人城小人乖攝養岐路阻逢迎幾月芝田熟何年金竈成哀笳關塞曲嘶馬别離聲王子身為寶深思不倚衡和趙王送從軍前人樓船聊習戰白羽試撝軍山城對却月岸陳底平雲赤地懸弩影流星抱劔文胡笳遙警夜塞馬暗嘶羣客行明月硤猿聲不可聞軍師凱旋自雍州順流舟中李嶠鳴鞞入嶂口泛舸歷川湄尚想江陵陳猶疑下瀨師岸回帆影疾風送鼓聲遲萍葉沾蘭槳林花拂桂旗弓鳴蒼隼落劔動白猿悲芳樹吟羌管幽篁入楚詞一作祠全軍多勝䇿無戰在明時寄謝山東妙長纓徒自期平胡二章并序唐玄宗戎羯不虔竊我荒服命偏師之浮剪彼應期而咸殄一麾克定告捷相仍爰命是詩以言其志集作愛作是詩聊以言志雜虜忽猖狂無何敢亂常羽書朝繼入烽火夜相望將出凶門勇兵因死地強蒙輪皆突騎按劔盡鷹揚鼓角雄山野龍蛇入戰場流膏潤沙漠濺血染鋒鋩霧廓清玄塞雲開靜朔方武功今已立文德愧前王二邉服胡塵起長安漢將飛龍蛇開陳法貔武振軍威詐虜腦塗地征夫血染衣今朝書奏入明日凱歌歸奉和御製二首裴灌玄漠聖恩通由來書軌同忽聞窺月滿相聚冦雲中廟略占黃氣神兵出綘宫將軍行逐虜使者亦知戎一舉轒輼減再麾沙朔空直將威禁暴非用武為雄飲至明軍禮疇勳錫武功干戈還載戢文德在唐風二殊類驕無長王師示有征中軍才授律妖冦已亡精斬虜還遮塞綏降更築城從來攻必克天䇿振竒兵同前韓休南牧正紛紛長河起塞氛王兵徴選士金鉞拜將軍疊鼓遙邉吹連旌暗朔雲祅星乘夜落吉氣入朝分始見幽烽警俄看烈火焚功成奏凱樂戰罷䇿歸勳盛德陳清廟神謨屬大君叨榮逢姬伯率舞詠時文夏日都門送司馬員外逸客孫員外佺北征沈佺期二庭追虜騎六月動周師廟略天人授軍麾相國持復言徴二妙才令重當時畫省連征橐橫門共别詞雲迎出塞馬風卷渡河旗計日方夷冦旋聞杖杜詩同前時相王為元帥魏大夫元忠為副李乂日逐滋南冦天威撫北垂折圭行仗節持印且分麾羽􅊾雙鳬去兵車駟馬馳虎旗懸氣色龍劔抱雄雌候月期戡剪經時念别離坐聞關隴外無復引弓兒送兵還作集作薊中作高適䇿馬自沙海上集作長驅登塞垣邉城高集作向蕭條白日黃雲昏一到征戰處每愁胡虜翻豈無安邉書諸將已承恩惆悵孫吳事歸來獨閉門從軍北征李益天山雪後海風寒橫笛偏吹行路難磧裏征人三千萬一時回向月中集作明看聽曉角前人繁霜一夜落平蕪吹角當城片月孤無數塞鴻飛不度秋風卷入小單于平戎時諫官論比虜未回天德軍師請收城備胡之際趙嘏邉聲一夜殷秋鼙牙帳連𤇺擁萬蹄武帝未能忘塞北仲舒才足使膠西氷橫曉渡胡兵合雪滿窮沙漢騎迷自古平戎有良䇿將軍不用倚雲梯降虜前人廣武溪頭降虜稀一聲寒角怨金微河湟不在春風地歌舞空裁雪夜衣鐵馬半嘶邉草去狼煙高映塞鴻飛揚雄尚白相如吃今日何人從獵歸邉塞於北平作唐太宗翠野駐戎軒盧龍轉征斾遙山麗如綺長流縈似帶海氣百重樓巗松千丈蓋兹焉可遊賞何必襄城外和邊城秋氣早李義甫金微凝素節玉律應清葭邊馬秋聲急征鴻曉陳斜關樹凋涼葉塞草落寒花霧暗長川景雲昏大漠沙溪深路難越川平望超忽極望斷煙飄遙落驚蓬沒霜結龍城吹水照龜林月日色夏猶冷霜華春未歇睿作髙紫宸分明映玄闕冀北春望崔液回首覽燕趙春生兩河間曠然餘萬里際海不見山雨歇青林潤煙空緑野間問鄉無處所目送白雲關邊愁崔湜九月蓬根斷三邊草葉腓風塵馬變色霜雪劒生衣客思愁隂晚邊書驛騎歸殷勤鳯樓上還袂及春暉早春邊城還歸前人大漢羽書飛長城未解圍山川凌玉障旌節下金微路向南庭逺書因北鴈稀鄉關搖别思風雪故戎衣嵗盡仍為客春還尚未歸明年征騎返歌舞及芳菲塞外三首鄭愔塞外蕭條望征人此路賖邊聲亂朔馬秋引動胡笳遙障侵歸日長城帶晚霞斷蓬飛古戍連鴈聚寒沙海暗雲無葉山春雪作花丈夫期報主萬里獨歸家二荒壘三秋夕窮郊萬里平海隂凝獨樹日氣下連營戎斾霜疑重邊裘夜更輕將軍猶轉戰都尉不成名折桞悲春曲吹笳斷夜聲明年塞一作漢使返須築受降城三陽鳥南飛夜隂山北地寒漢家征戍客年嵗在樓蘭玉塞朔風起金河秋月團邊聲入鼓吹霜氣下旌竿海外歸書斷天涯旅鬢殘子卿猶奉使恆向節旄看邊秋薄暮蘇頲海外秋鷹繫霜前旅鴈歸邊風思鞞鼓落日慘旌麾浦暗漁舟入川長獵騎稀客悲逢薄暮况乃事戎機送張判官赴河西王維單車曽出塞報國敢邀勳見逐張征虜令思霍冠軍沙平連白雪蓬卷入黃雲慷慨倚長劒髙歌一送君送元二使安西前人渭城朝雨裛輕塵客舍青青桞色新集作春勸君更盡一杯酒西出陽關無故人送劉司直赴安西前人絶域陽關道胡沙與塞塵三春時有鴈萬里少行人苜蓿隨天馬蒲萄逐漢臣當令外國懼不敢覔和親遼西作崔皓燕郊芳嵗晚殘雪凍邉城四月青草合遼陽春水生胡人正牧馬漢將日徴兵露重寶劒濕沙虗金鼓鳴寒衣著已盡春服與誰文粹作誰與成寄語洛陽使為傳邉塞情發臨洮赴北庭留别岑參聞説輪臺路年集作連年見雪飛春風曽集作長不到漢使亦來一作應稀白草通疏勒青山過武威勤王不敢道逺思一作思向夢中歸此詩二百九十二卷重出前已削去注異同為一作磧西集作石題送李判官入京前人一身從逺使萬里向安西漢月垂鄉淚胡沙損馬蹄尋河愁地盡過磧覺天低送子軍中飲家書醉裏題過磧前人黃沙磧裏客行迷四望雲天直下低為言地盡天還盡行到西安更向西營州髙適營州少年滿集作歇原野狐集作皮裘蒙茸獵城下魯酒千杯不醉人胡兒十嵗能騎馬涼州王之渙黃河直上白雲間一片孤城萬仞山羌笛何須怨楊桞春光不度玉門關邊頭作李端邠郊泉脈動落日上城樓羊馬水草足羌胡帳幕稠射雕過海岸傳箭脅邊州何事歸朝將今年又拜侯過五原至飲馬泉集作監州胡兒飲馬泉李益緑楊著水宛集作草如煙舊是胡兒飲馬泉幾處吹笳明月夜何時倚劒白雲天從來凍合關山路今日分流漢使前莫遣行人照容鬢恐驚憔悴入新年塞北行次度破訥沙前人眼見風來砂旋移經年不省草生時莫言集作無論塞北無春到集作至縱有春來何處知上黃堆峰集作𤇺堆前人心期紫閣山中月身過黃堆峰集作堆𤇺上雲年髮已從書劒老戎衣更逐霍將軍送客還幽州前人惆悵秦城送獨歸薊門雲樹逺依依秋來莫射南來鴈從遣乘春集作風更北飛此詩二百七十五卷重出前已削去早發破訥沙前人破訥沙頭鴈正飛鸊鵜泉上戰初歸平明日出東南地滿磧寒光生鐵衣此詩二百九十三卷重出前已削去宿金河戍張震朝發鐵麟驛夕宿金河戍奔波急王程一日千里路但見容鬢改不知嵗華暮悠悠沙漠行王事彌多故邊詞張敬忠五原春色舊來遲二月垂楊未挂絲即今河畔氷開日正是長安花落時邊行書事又玄集作塞上行李昌符朔野煙塵起天軍又舉戈隂風向晚急殺氣入秋多又一集作莽蒼蘆關北孤城帳幕多客軍甘入陳老將望回戈樹盡禽棲草氷堅路在河汾陽無繼者集作尋下世離集作羌虜肯先和近無西耗李敬芳逺戎兵壓境遷客淚橫襟𤇺候驚春塞縲囚困越吟自憐牛馬走未識犬羊心一月無消息西居日又沉送張司直往單于于鵠若過并州北誰人不憶家塞堡一作深無去伴路盡到平沙磧冷唯逢鴈天春不見花莫隨邊將意垂老事輕車邊思楊衡蘇武節毛盡李陵音信稀梅當隴上發人向隴頭歸思遊邊友人賈島凝愁對孤燭昨日飲離杯葉下故人去天中新鴈來連沙秋草薄帶雪暮山開苑北紅塵道何時見逺回送友人遊塞前人飄蓬多塞下君見益􅏰然回磧沙銜日長河水接天夜泉行客火曉戍向京煙少結相思恨佳期芳草前塞上行作劉得仁鄉井久離别窮邊觸目愁主人居外地塞雪下中秋鴈舉之衡翅河渟入虜流將軍心莫苦向此取封侯登臨洮望蕭關李昌符漸覺風沙暗蕭關欲到時兒童能探火婦女解縫旗川絶銜魚鷺林多帶箭麋暫來戎馬地不敢苦吟詩送友人出塞姚鵠帝城春色著寒梅去恨離懷醉不開作一作相别欲將何計免此行應又隔年回入河殘日雕西盡卷雪驚蓬馬上來有思莫忘清寒學衆傳君負佐王才邊遊項斯古鎮門前候長安路在東天晴槐葉霧日暮葦花風塞館皆無簟儒裝亦有弓防秋故鄉卒曽喜語音同邊城寫眺馬戴聊憑危堞望暗起異鄉情塞曲關防絶山昏霧露生河灘胡鴈下戎壘漢聲一作鼓驚獨對殘秋色狂歌淚滿纓送友人邊遊回薛能一作馬戴遊子新從絶塞回自言曽上李陵臺樽前語盡北風起秋色蕭條胡鴈來送李溟出塞前人邊城官尚集作向惡况乃是羇遊别路應相一作多憶離亭更少留黃沙人外闊飛雪馬前稠甚險穹廬宿無為過代州此詩二百八十一卷重出前巳削去注異同為一作送友人出塞前人榆關早不可何况出榆關春草臨岐斷邊樓帶日間人歸穹帳外鳥發廢營間此地秋堪集作堪愁想霜前作意還回中作溫庭筠莽莽雲空逺色愁嗚嗚戍角上髙樓吳姬怨思吹雙管燕客悲歌動集作别五侯千里關山邊草暮一星烽火朔雲秋夜來霜重西風起隴水無聲凍一作噎不流送人往北寒李頻上馬問雲中長川送北風日西身獨去山轉路無窮樹隔髙關斷沙連大漠空君看河外將早晚合平戎代北言懷喻坦之困馬榆關北那堪落景催路行沙不絶風與雪兼來草得春猶白鴻侵夏始回行人莫逺入戍角有餘哀書邊事二首張喬調角斷清秋征人倚戍樓春風對青塜白日落梁州大漠無兵阻窮邊有客遊蕃情如此水長願向春流二萬里沙西寇已平犬羊羣外築空城分營夜火燒雲逺教獵秋雕掠草輕秦將力隨胡馬竭蕃河流入漢家清羌戎不識干戈老須賀明時聖主明送人遊邊鄭谷春亦怯邊遊此行風正秋别離逢雨夜道路向雲州磧樹藏城逺河沙漾日流將軍方破虜莫惜獻良籌京集作涼西即事韓宗秋草河蘭起陳雲涼州唯向管絃聞豺狼毳幕三千帳貔虎金郊十萬軍候騎北來驚有説戍樓西望悔為文昭陽亦待平安火誰握旌旗不見勳邊思周朴年髙來逺戍白首罷干戎夜色薊門火秋聲邊塞風磧浮悲老馬月滿引新弓百戰山隂去唯添上將雄邊庭送别張蠙一生雖達理逺别亦相悲白髮無修處青松有老時暮煙傳戍起寒日隔沙垂若是長安去何難定後期登單于臺前人邊兵春盡回獨上單于臺白日地中出黃河天上來沙翻痕似浪風急響疑雷欲向隂關度隂關曉不開過蕭關前人出得蕭關北儒衣不稱身隴狐來試客沙鶻下欺人曉戍殘衙火晴原起獵塵邊戎莫相忌非是霍家親薊北書事前人度磧如經海茫然但見空戍樓承落日沙塞礙驚蓬暑過燕僧出時平虜客通逢人皆上將誰有定邊功朔方書事前人秋盡角聲苦逄入唯荷戈城池向隴小岐路出關多鴈逺行垂地𤇺髙影入河仍聞黑山寇又覔漢家和邊夜羅隱光景漂如水生涯轉似萍鴈門窮朔路牛斗故鄉星地盡人一作書罷愁誰切歌終淚自零夜闌回首算何處不長亭文苑英華卷二百九十九
