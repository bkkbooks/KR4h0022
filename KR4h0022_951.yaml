body:
  text: 文苑英華卷九百五十二宋李昉等編職官十四戴容州叔倫墓志一首崔饒州適墓志一首陸歙州參墓志一首李郴州伯康墓志一首崔房州述墓志一首朝散大夫容州刺史戴公墓志銘權德輿維貞元五年夏四月容州刺史經略使侍御史譙縣男戴公至部之三月以疾受代回車甌駱六月甲申次于清逺峽而薨春秋五十八眀年正月庚申返葬於金壇玉京原之舊封宜敘世德以識幽穸云公諱叔倫字幼公本譙國人其先在宋為公族於漢為儒宗東漢則司徒涉西晉則有司農逯集作逵非下同逯後南渡始居丹徒八葉至宋臨湘侯眀寶眀寶曽孫梁左丞皓皓玄孫皇德州司士好問公之曽王父也王父修集作循譽父眘用皆自縻天爵不顧翹車傳次君之禮文盡通奧旨師安道之晦德尤惡知名故世風純慶及公而發公早以詞藝振嘉聞中以材術商功利終以理行敷教化帥集作率履素王之訓周旋君子之儒淑聲休問苾芬四暢初摳衣於蘭陵蕭茂挺以文學政事見稱蕭門文本菁華而長於比興粲為集作焉采章集作焉鏘如珩璫集作璜是鼓鐘于宫纍辟大府分命於計相也則為湖南河南留後自祕書正字三遷至監察御史曳裾於賢王也則為湖南江西上介由大理司直轉至尚書祠部郎中其阜人成化也則東陽一同之人沐旬嵗之治撫人飲集作飫三年之惠容人被踰月之教夔人聞詔而歡承訃而哀不及蒙其澤歷官十一而雲安不書所至之邦必刻金石始在轉運府也量則集作董賦於南荆會蜀將楊琳擁徒阻命詔書告諭初革至集作無革志宵引鋭卒劫脅使臣曰歸我金幣可以紓死公山立不撓勇生於仁端其詞氣強於師旅暴叛知感乞盟於公黎眀率其徒西嚮拜泣指京師臣列狀六字集作指期詣闕家臣列狀天子召對而推功於府不伐其勞時談翕然勇讓具舉其在臨川也清眀仁恕多省費方略蜀郡崇儒之化南陽均水之法精力區處民以便安田壤耕闢獄犴清淨居一年璽書褒異就加金紫未幾而有容州之拜且都督集作智字府所治列城十三訓戎撫俗之任招徠式遏之寄非通方眀略無以威懷蓋皇慈所軫先於柔逺方將布愷悌於夷落致風俗於休嘉議者以九伯二南可跂而至天則不弔末如之何君直清篤厚博物通理有大學之眀誠大雅之疏達靜如淵泉動如鏌干不緇不磷與令問終始起布衣儒服位視方隅歸全之日才具祭器去國見麾幢之盛返葬備裧輤之儀列松檟於舊封展牲牢於新薦哀榮之禮鄉黨稱焉初公娶京兆韋氏永州長史采之女繼室以博陵崔氏殿中侍御史殷之女皆淑眀柔嘉不幸早世胤子曰郅曰邡年甫及齓哀如成人公仲兄新城長伯倫以豫夙承公歡且有遺託既不獲讓是用直書銘曰信都九江文禮章章百代彌光司徒佐漢司農匡晉乃熾而昌世無違德時有通塞或行或藏克生容州貴為諸侯其道直方政成中和播為頌歌化被二邦列爵疏土燦爛龜組鸞聲鏘鏘宜享繁祉以媚天子今也則亡還葬故里遷集作仙山之趾德音不忘朝散大夫使持節饒州諸軍事守饒州刺史上柱國崔君墓志銘前人博陵崔氏為東山右族以政事方直稱者曰饒州刺史諱適字某貞元十四年某月甲子寢疾終于所部之𪠘舍春秋若干君仁厚信實方嚴清厲詞無枝葉而顧言必踐交不諂瀆而與人必誠深於士行精於吏職蓋其天性然也一命為懷州參軍纍遷至大理評事司直監察御史好畤武功二縣令常絳二州司馬乃理富平遂佐興元貞元十一年春以西諸侯之師轉粟調食特拜倉部郎中兼御史中丞以董其事其年冬徴拜衛尉少卿眀年改鄧州刺史麾蓋將行文换鄱陽歷官十五竟未充量其為御史也賈常侍至以才名尹轂下實所慰薦為之賔介蔣常侍沇以公廉幹河運交辟將事𢎞助居多其宰封畿也縣鄙之地直于西郊禁衛之師勤于左次事為之節官修其方軍興人安闔境謡誦其佐晉陵也晉國韓公當撫封之重署為推官軺傳所至平反審克假守新定之人宜之薄於進取未數月引去其領陵邑也克奉肅敬里閭均安集作定黠吏強家望風纍息相率屏匿者十八九其分憂為邦約已惠人樂易而知禁清眀而不擾此皆厯職必聞之效也至若章章尤著為士君子之所景行者則奉使西土鄙能言之縣官以乘塞宿兵旌旄相望饋餉之重非君莫可就集作既而經費出納制於中臺尅伐之人順非言利大率以布帛之不中於度不鬻於市者積以窳濫備其名物移用於軍增三倍之價平糴於人無一時之蓄掠是根本命為竒贏既衰邊備實蔽理道時有覆視誨其相蒙徒列簿書之文不登釜鍾之量因緣繆巧集作功非觸類而起君受命不茍臨事風生條其積弊盡達聰耳集作聽雖狺狺之吠營營之飛置於度外不直不已連章上訴詞旨深切羣情惴駭處之恬然謝病乞告終無所屈皇眀嘉納入亞九卿時縉紳之士多以憑暴為戒怵迫附離而不能自固者多矣如君之特立剛毅不更其守古之儒行何以加之集作嘉焉此德輿所以受其孤之哀請而不敢辭也君之曽祖玄基皇朝散大夫會州長史祖紹先皇揚州揚子縣尉父炅皇大理司直兼河南府河隂縣令代名土行裕是遺烈初君娶于某氏某官某之女生子曰包而殁繼室以某氏某官某之女皆有淑行如君之志以十四年某月日叶用吉卜附窆於河中某縣鄉原之舊封禮也初包以德輿朴而好直且嘗奉行君之命書者四乃列其官簿次第俾識於墓石既而包毁瘠滅性夭於倚廬之中諾其請矣故銘之曰崔君之直兮不枉尺兮崔君之正兮不由徑兮展如之人宜錫蕃祉兮天實奈何一麾遄已兮襜襜帷裳來自鄱之陽兮峩峩丘封葬於河之東兮刻此貞珉識清風兮使持節歙州諸軍事守歙州刺史賜緋魚袋陸君墓志銘前人君諱參字公佐吳郡人曽祖某某官考某某官君蚤孤與兄隱居於越有佳山水率子弟耕汲於其中因集作日修桑門之法擯落人事貞元初兄既殁始為宗姻士友所強慨然有應知己之心繇試佐環衛歷大理評事攝監察御史裏行佐黔中又以殿中侍御史內供奉佐浙東凡四居憲職介二方伯皆有直聲休利邦人宜之十二年所從既罷繼之者再至率以重禮禮君終不能屈非所樂而不茍合故也朝廷宗公賢大夫多悅其風十六年徴拜祠部員外郎居二年執事者上言其才請為劇曹會東方守臣表二千石之缺天子方加恩元元循責吏理面命執事曰誠如是姑使為郡須其報政縻以集作加好爵遂拜歙州刺史在途發瘍夏四月二十日三字集作景字卒於洛師享年五十五夫人河東栁氏殿中侍御史并之息女才淑有賢行長子某年在羈貫嗣子某未離褓抱夫人既得吉卜具集作且以孤藐之詞請表墓於父友故鄙夫泣書於寢門之外而不讓云君峻而通直而和羣而不黨至於流俗之齷齪細人之姑息屑屑汲汲之態不萌於胸中器度夷逺英華發外居常無怵迫臨事有風節同心定交造次以之評議鑒裁精明不惑從善親仁發於肺肝文章𢎞朗有作者風格學不為人與古為徒嚮使登其年充其量束帶公朝其骨鯁魁壘之士與嘗與故虔州刺史隴西李公受故右補闕安定梁寬中今禮部郎中京兆韋德符右補闕廣平劉茂𢎞祕書郎趙郡李叔翰方外士右諭德博陵崔公穎暨豫友善􅐵夫相視莫逆行二十年洪範之攸好德儒行之逺相致今則已矣可勝慟耶時貞元十八年集作嵗嵗直鶉首秋七月甲子鏤堅石而銘曰皎皎陸生中和粹清直如朱絃潔如白珩或默或語不將不迎如何斯人暗忽冥冥蚩蚩下輩戩穀或丁曄曄芳蘭嚴霜飄集作夙零命不可問死不可作集作死不作兮嗚呼陸生使持節郴州諸軍事權知郴州刺史賜緋魚袋李公墓志銘前人君諱伯康字士豐隴西成紀人自涼武昭王玄孫文穆公沖為元魏僕射司空與兄穆侯恭侯惠侯莊公中秉樞揆外顓方國文穆公二子長曰廷實次曰休繤論道追命皆至司徒蟬聮茂盛冠於百族君即叔氏司徒之後也曾祖仲進皇宣州司馬祖僑皇河南府澠池縣令父愔皇朝議大夫宗正丞贈濮州刺史三葉用晦仕不過郡佐縣令夫典司宗籍而天爵崇茂士林嚮仰君以才實克家清方入官始為知己者所薦授閬州司倉掾轉下邽福昌奉先三縣尉皆有能名建中三年調補御史臺主簿成奉未下以太夫人寢疾歸侍藥膳眀年丁內難集作艱衣裳外除迫嚴君子之命復調為長安尉時王師清宫鑾輅初復武人干吏理轂下為多事邑之細大必決於君每嵗考績為府中最貞元五年再集荼蓼終喪猶毁不交人事屏居池陽以耕植自業九年春西鄙不靖詔城五原以備邊鄜坊節將選重賢佐以厚禮辟君實董塞門之役不愆於素抑有勞焉拜監察御史轉殿中丞賜以章紱尋遷侍御史加檢校工部員外郎九十四年徙官為鄜上介代謀而鄜之師以律折獄而鄜之人不寃十八年從守臣來朝行次中部所從復於左轂護其輤裧以至京師庀具會事稱情中禮十九年秋七月拜郴州刺史精力惠養蠲除煩苦導利省嗇而人不擾廉平信厚而吏知方今相國左丞鄭君頃移佐兹郡知君也熟洎入總綱轄盛推理行再管宰政方圖陟眀斯言未復奄忽雕落時永貞元年十月某日甲子春秋六十三悲夫君天資器幹機用強敏夷易疏通不移名聲學尚周給集作洽而緣情甚集作其麗業履端修而睦姻尤甚時人多知君吏理過於文行唯故相太傅盧恭公今相國左丞鄭君臮鄙人實知之而棲遲下國迫厄委化斯可歎已夫人范陽盧氏宣城縣令炅之女華緒令儀執笄佐餕先於君殁二十年矣嗣子盧氏縣尉操次子前眀經掖支子某等皆以孝謹而承訓義居集作君令弟長安主簿少安請急喪集作襄事崩波勤逺自荆抵洛泣奉轜車以元和元年某甲子葬于某縣某原之舊封君子曰於長安之兄之喪有以見同氣之痛德輿以中外伯仲周知所履刻石紀事朴而不誣銘曰郴之政兮理平君之行兮廉清矧有深知兮秉國之成亟言於朝兮將陟其眀窘然符守兮奄忽冥冥胸臆約結兮未攄平生道途自逺兮廣桞芻靈風雨所交兮卜洛佳城元龜是貞厚載是寧吁嗟乎內兄房州刺史崔公墓志銘前人公諱述字元眀博陵安平人自東漢長岑長濟北相代擅雕龍之美濟北五代至晉大司農𢎞司農八代至北齊右僕射昻僕射三代至公曽祖皇朝散大夫冀州武邑縣令諱紹大父同州白水縣尉諱頊烈考晉州汾西縣令贈定州刺史諱升之代有文行懿德為北州冠族公夷雅溫粹安舒廉靜於座右銘得含元之妙於政論得理道之奧以之修身以之蒞官蓋家法積厚而公能踐之之故也始自宫衛試守未弱冠而為藍田尉已有嘉聞尋轉婺州浦陽令揚州兵曹參軍皆以吏理著稱故辟書交委命書隨之歷監察御史再為侍御史五字集作殿中侍御史再為侍御史實佐夀潭洪三邦車賦之重拊循輯睦繄上介是賴府遷于荆薦言于朝拜著作郎虞部員外郎論著奏議率循憲矩不毁方以求合不遊徑以取捷貞元十二年出為房州刺史承長帥剛嚴之理當輿師饋餉之殷暴征繼起煩言狎至而能推情廣身以裕勞人惻隱所被四封嘉靖十七年秋九月辛酉感疾捐館舍春秋五十七夫人京兆韋氏承公宫之訓為女士之表凡合姓二紀柔而正勸以義之道備焉其孤文伯武伯等學通禮籍姿性循至斬焉相視泣奉裳帷以冬十一月甲子祔葬于東都某原禮也初公仲兄左庶子安平公有重名於時安平所與遊者公皆從而遊焉故常與賢士大夫推集作摧古今世道博約論辨攄之於詞凡數千言因曰勝質之文吾所甚懼彼奔集作舛馳塞路者既不可遏又惡用斐然為之耶遂輒削去其用晦如此行義醇備慈仁任恤安平既即世伯兄繼殁猶子之解巾結䄜先於已子故不舉火之日男未仕女未行其於疾則十起衣無常主雖伯魚稚春不能如集作嘗焉羣從族姻均祿直以賙其乏不結黨友不趨聲利常集作加欲修性息迹考一丘之樂而未克齒與位皆負其實奄然不淑為知者所歎建中初德輿遇公于九江之西其後辱安平戴公集作侯是之知於公獲南容之眷刻石志美不敢曼辭而實録焉銘曰齊稱大風漢有文宗雋賢葳蕤以續昭融坦坦房陵勞謙孝恭優遊祿仕惟道之從素履不華黃裳在中乃儀列星乃飾伏熊居易處厚有初有終魂氣杳冥諸孤哀恫圓蓍大蔡先逺攸同刻兹貞珉永賁丘封文苑英華卷九百五十二
