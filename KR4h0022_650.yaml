body:
  text: 文苑英華卷六百五十一宋李昉等編諫諍諫東宫啓一首諫東宫左右非其人啓一首諫東宫引突厥達哥友入宫內啓一首重諫東宫啓一首規正東宫啓一首重上直言諫東宫啓一首諫東宫啓三首上東宫啓二首諫東宫啓于志寧按舊唐書太子承乾以農時營造曲室志寧上此書又載六百六十七卷書門今存其目諫東宫左右非其人啓此篇按舊唐書是諫承乾第二書當移入六百六十七卷書門今存其目諫東宫引突厥達哥友入宫內啓前人按舊唐書志寧上太子承乾第三書又載六百六十七卷書門今存其目重諫東宫啓張𤣥素此篇按舊唐書是諫承乾第三書當移入六百六十七卷書門今存其目規正東宫啓髙宗時太子賢韋承慶儀鳳四年為太子司議郎臣承慶言伏以殿下國之儲二主器承祧百姓繫心萬方延首行一事天下所瞻出一言天下所聽動靜不可以不慎進退不可以不思固須數引正人詢謀得失使忠言日聞於耳善事每關於心所為合度必自知其過如此則正心起邪心息德業日新聲聞彌廣福祿可以長守榮位可以久安若諂諛在側忠良不進意有所向則合詞稱善言未出口則同聲稱美有非莫悟有過莫知便自為神睿聰明超絶今古驕溢之漸常必由之伏願特留睿情每存規誡聞過必改見善必行朝夕孜孜常恐不及則邦家是賴天下幸甚進德修業大易垂文說禮敦詩春秋所貴尚書云念終始典于學禮云玉不琢不成器人不學不知道孔子曰吾嘗終日不食終夜不寢以思無益不如學也殿下昔在藩邸耽讀典墳論道觀書匪朝伊夕自升儲二巳歷炎凉侍讀承言稍以稀簡雖睿姿天挺神用生知器業自然非求外奬然更加研勵彌益風猷伏願數召儒生勤修學藝縑緗不離於左右披閲無捨於光陰使日知所未知月聞所未聞凡在匹夫苟能强學猶可以髙取名譽坐致簮纓况殿下以儲后之尊而能留心於學德音之美固無得而稱焉畋獵馳騁敗德之源必須順動不可以盤逰無度至於從禽逐獸絶野馳原駿足雲飛輕弧電舉當其適意豈憚艱危無險不陵無深不赴忽然奔馬委轡猛獸逸羣致驚駭之憂貽顛墜之患雖有所悔如何可及夫以千金之子猶且坐不垂堂况在萬國之貞豈可不思重慎殿下初升儲位養德春闈理宜靜默自居文史為務不可數為逰縱以損德音尚書云內作色荒外作禽荒甘酒嗜音峻宇雕墻有一於此未或不亡伏願詳覽古今以為鑒誡殿下驅使之人每於北門召入如此等色皆是憸利小人緣得供奉祗承自謂别䝉恩幸外則妄為威福內則專事諂諛巧媚百端以求顔色日為一事時進一言漸漬纎微遂成瑕纍此之浸潤最難覺察特須斥逺屏黜不宜親近左右殿下皇儲國嗣帝子天孫府庫充盈宫室崇麗但使不為鄙僻不作奢淫凡所營求有司畢備何藉此等别有祗承今南衙官寮皆是搢紳士子或耆年舊德博識洽聞或雅望英材修身潔行莫不䇿名委質奉事殿下自非陪扈法仗不得一奉宸顔豈有僕𨽻輿臺而可特承恩盼伏願一皆杜絶勿許更至宫闈所見者唯端士正人所聞者唯詩禮典誥則邪孽無由而起咎悔無從而生睿德彌髙休聲日逺伏見今年六月三十日令書以崇文館中學士極少令賔客庶子詹事及宫官五品以下各舉所知令出巳來日月巳久官寮所舉咸巳進名迄至于今更無進止殿下敦崇學藝廣訪時英天下四方莫不欣恱文學之士飭躬待問而淹歷時序未有指歸朝士搢紳咸謂殿下徒有其聲而無其實私談竊議頗盈衆口但令出惟行理非虛設舉能進善其事不輕一降令書終年寂寞天下英髦誰不解體此乃欲益反損應是更非伏願與賔客庶子等量宜早為處分事或不可專决亦須速以聞奏不可淹延致招誹議今關隴之外蕃夷寇竊國家將用弔伐大興師旅轉輸給用糜費日多聖上內恤黎元外憂疆埸宵衣旰食惕慮兢懷殿下在國為儲君在家為長子事兼家國何以自寧至於居處服玩飲食聲樂並請務從省約以助聖上憂勞不可每事豐華自為安逸儲副之尊士庶瞻仰雖宫闈務簡不資每日坐朝至於朔望之辰諸王賔客咸萃皆欲親承睿㫖肅奉宸儀伏見秋冬巳來纍月不曽一坐恭巳之義竊謂有虧伏願每至此朝特臨法仗則殿下無宴安之逸羣寮有趨奉之歡臣聞體寬裕之德者在乎納諫懷忠貞之極者期於盡節是知君以不諱昭其美臣以無隱逹其誠固君臣之大義古今之通道伏惟殿下挺睿研幾凝貞育照處帝王之元子為億兆之副君當其冊命之初天下含齒戴髮童兒牧豎莫不歡欣踴躍抃舞謳歌者以殿下至德至仁克忠克孝故能上當天意下應人心雖夏邦建啓周朝立誦不之及也但能行之以道守之以仁居安慮危在滿防溢一日三省一事九思知稼穡之艱難省宫苑之逰玩正辭雅誥每關心術奸聲亂色不留聰明忠讜者引而親之便佞者屛而逺之則可以長主宗鬯永任國本照黃離以保元吉居蒼震而亨利貞臣出自膠庠即參藩邸微班再易馳年十變短才弱翰濫䝉甄奬書記文章特受恩寄洎乎嗣登銀榜復得忝侍銅闈俯存簮屨之餘仰攀鱗羽之末蕩蕩鴻澤一作鴻霈蕩澤霑濡不巳區區淺志答效無階所以輸罄心源瀝盡肝血奉芻蕘之片議獻狂瞽之一言庶輕露馳聲薄滋於少海纎塵驟影微助於遙山逆耳儻伸觸鱗甘罪無任悾款之至謹奉啓以聞重上直言諫東宫啓髙宗時臣聞太子者君之二國之本也所以承宗廟之重繫億兆之心萬國以貞四海屬望殿下以仁孝之德明睿之姿嶽峙淵澄金貞玉裕天皇升殿下以儲副寄殿下以監撫欲使照無不及恩無不覃百寮仰重耀之輝萬姓聞洊雷之響夫君以人為本人以食為命君非人無以保其位人非食無以全其生故孔子曰百姓足君孰與不足百姓不足君孰與足自頃年巳來頻有水旱菽粟不能豐稔黎庶自致煎窮今夏亢陽米價騰踴貧窶之室無以自資朝夕皇皇惟憂餒饉下人之瘼實可哀矜稼穡艱難所宜詳悉天皇所以垂衣北極殿下所以守器東朝一作宫為天下之所尊得天下之所利者豈惟上𤣥之幽贊亦百姓之力也百姓危則社稷不得獨安百姓亂則帝王不得一作能獨理故古人云二字一作之明君飽而知人饑溫而知人寒每以天下為憂不以四海為樂今關隴之外凶冦憑陵西土邉氓凋喪將盡干戈日用烽柝荐驚一作興千里有勞於饋糧三農不遑於稼穡雖蜂蠆之小毒亦足以煩師旅而擾邉隅矣殿下為臣為子乃國乃家為臣在於竭忠為子期於盡孝在家不可以自逸在國不可以自康一物有虧聖上每留神念三邉或梗殿下豈不兢懷况當養德之秋非是任情之日伏承北門之內造作不常玩好所營或有煩費倡優雜伎不息於前鼓吹繁聲亟聞於外既喧聽覽且黷宫闈兼之僕𨽻小人緣此得親左右亦既奉承顔色能不恃賴一作記恩光作福作威莫不由此若不一作不加防慎必有愆非儻使微纍德音於後悔之何及書云不作無益害有益此皆無益之事固不可耽而恱之臣又聞在上不驕髙而不危制節謹度滿而不溢髙而不危所以長守貴滿而不溢所以長守富是知髙危不可不慎滿溢不可不持易曰君子終日乾乾夕惕若厲無咎敬慎之謂也在於凡庶能守而行之猶可以髙振聲華坐致榮祿殿下有少陽之位有天挺之姿片善而天下必聞小能而天下咸服豈可不為盡善盡美之道以取可久可大之名哉伏願博覽經書以廣其德屛退聲色以抑其情靜默無為恬虛寡欲非禮勿動非法不言居處服玩必修節儉畋獵逰娛不為馳騁正人端士必引而親之便僻側媚必斥而逺之使惠聲溢於逺近仁風翔於內外則可以克享終吉長保利貞為上嗣之稱首奉聖人之鴻業者也一作矣臣昔參朱邸忝膠東之藩吏晚侍青宫叨望苑之儲宷每得親承睿盼側奉宸規出入銀榜之前旦暮銅樓之下小人頂戴無以勝恩區區淺誠竊不自已古人耻其君不及堯舜臣亦願殿下超於啓發是以冒進狂言庶有禆於萬一微生萬死實無恨於三泉謹啓一作皆舊唐書本傳諫東宫啓三首姚珽按舊唐書節愍太子舉事不法珽上書三篇並見六百六十七卷書門今存其目上東宫啓睿宗時𤣥宗為太子李景伯景雲中為太子右庶子臣聞書曰惟上帝不常作善降之百祥作不善降之百殃禍福之來惟人所召應符影響可不懼哉伏惟殿下禀粹重離摛英若木道光儲二譽表元良掃凶祲而邦家以寧贊寶歷而皇祚方永凡在羣品莫不仰賴語成功則巳大矣論盛業則巳崇矣唯當養德青宫問安紫極去惡除本為善務滋納忠讜於正人杜浮媚於邪徑逰心經史引接文儒覽古今之得失為行事之龜鏡日新其美豈不盛歟近承諂曲之徒私進女色莫非倡蕩穢跡可知將入宫闈以為娛樂傷教敗禮豈復是過及其出入矜誇恩幸坊曲之間能無漏泄至如榮忝簮笏跡預朝廷稍涉奸私尚為深纍况一國之儲副萬方所瞻奉焉可不自戒且政之興衰皆由化下自上所及若草隨風理在必然不可不慎竊惟後宫命婦員品稍多兼選良人固為淑麗止足之賞疑詎假旁求此非殿下之本心直被小人之所誤臣實庸鄙智識無聞濫齒榮班謬參宫相職在規諫冀申裨補若其默而自守何以上答聖恩非直尸素之罪人亦當神祗之所譴敢罄愚直以效涓塵伏願悔巳往之失知昨非之弊念色荒之誡懲縱敗之言勿近小人無聽邪說常恐有失兢懼為心則睿德被於羣方頌聲振於氓俗天垂福祐永保無疆儻䝉採納幸甚幸甚謹昧死奉啓以聞輕觸威嚴伏待斧鉞謹啓上東宫啓𤣥宗在東宫遣使采女樂就率更寺肄習賈曽景雲中為太子舍人臣聞作樂崇德以感人神韶夏有容咸英有節婦人媟黷無預其間昔魯用孔子幾致舊唐書作至於霸齊人懼之饋以女樂魯君既受孔子遂行戎有由余兵强國富秦人反間饋之美女戎王耽恱由余乃奔斯則大聖賢君舊唐書作名賢疾之巳久良以婦人為樂必務冶容娃姣動心蠱惑喪志上行下效淫俗將成敗國亂人實由兹起伏惟殿下神武命代文思登庸宇內顒顒瞻仰德化而渴賢之美未被於氓謡好妓之聲或聞於人聽豈所以追啓誦之徽烈襲堯舜之英風者哉至若監撫餘閒宴私多豫後庭妓樂古或有之非以風人為弊猶隱至於所司教習彰示羣寮慢妓淫聲實虧睿化伏願下明舊唐書作教令發德音屛倡優敦雅頌率更女樂並令禁斷諸使採召一切皆停則朝野內外皆知殿下放鄭逺佞輝光日新凡在含生孰不欣戴謹啓文苑英華卷六百五十一
