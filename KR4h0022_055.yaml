body:
  text: 文苑英華卷五十五宋李昉等編禋祀二至日圓丘祀昊天上帝賦二首東郊迎氣賦一首東郊迎春賦二首西郊迎秋賦二首北郊迎冬賦一首東郊朝日賦一首南郊享夀星賦一首至日圓丘祀昊天上帝賦以題為韵蕭頴士政教之始莫重乎郊祀郊祀之先莫尊乎昊天是以前王垂之於典訓後帝奉之以周旋以事大矣其儀盛焉日之至也所以明氣之至丘之圓也亦以象天之圓於是致齊於宫合樂於律羣有司肅肅以警戒百執事乾乾而莊栗牲用騂犢以貴誠酌用𤣥酒以明質豈但愛人而尊祖蓋欲報天而主日天子乃乘玉輅駕蒼虬搢方珽服大裘率九儀之卿士從五等之諸侯旌旗露卷冠蓋雲浮展國容於御路行大禮乎郊丘百役既備司儀辨位劍佩紛紜以陸離鐘鼓鏗訇而沸渭君明其義臣敬其事執鸞刀以啓毛奠蒼璧以為贄爵一獻而上下胥悅樂六成而神祗麏至後乃取血膋陳玉幣置于薪樵一作積薪之上燔于嘉壇之際飛燎煙於太清合蕭光於上帝是以神降我福人懷我惠時罔凶荒物無疵癘致洪化於仁夀豈不由肅敬於大祭客有旅逰函關欽兹至道觀祀事於國典仰明靈於有昊敢陳輿頌式播𤣥造頌曰日南至兮既望祀太一兮圓丘上萬斯年兮承天貺第二同前韻賈餗惟天為大惟聖奉天所以就陽位郊上𤣥禮髙明之覆育答生植之陶甄告太一以祗敬擁神休而吉蠲於是採遺範於周故封土以成丘取法於乾故象形以應圓顧椒糈之莫逹慿柴燎以斯傳是時星昏東壁日躔南至爰命有司肅將祀事羅幄帟以雲黕駢罍爼以鱗次藉白茅兮取諸潔薦蒼璧兮象其類皇威允穆司儀辨等而以班明德惟馨祝史陳辭而不愧於是啓禁扃警仙蹕千官拱立六龍齊膝濟濟鏘鏘匪徐匪疾奉常告備乘輿乃出覆玉葉之卿雲昭扶桑之初日齊心滌慮所以感無不通樂遍禮成故能神降之吉觀夫廣場還合泰壇五畤告萬物之生成當一陽之初晷揖羣望以咸秩列衆靈以備祀紫微開兮天意通元氣調兮薰風起祀之大者莫盛茲道展敬乎皇心報功乎𤣥造奏搏拊之清樂徹純殷之蒼昊實祀典之所崇諒邦家之攸保若乃陳以牲幣酌以秬鬯歌大吕以為節舞雲門以為狀逹誠於氤氲之際降靈於閶闔之上騰瑞氣而宛延燭神光兮溥暢我國家報本克禋順時修祭配太祖於座于以敬宗祀皇天於郊為能饗帝此所以神祗降鍳天人合契保昌運兮永貞崇明祀兮不替東郊迎氣賦以青陸朝覿陽和啓蟄為韻賈餗聖人克崇祀典大啓皇綱布發生之新令遵迎氣之舊章于以式綏景福于以𢎞開化光南至生春送固沍之𤣥律東郊展禮迎煦嫗於青陽于時太史陳詞嵗發其木天子乃警仙蹕纛黃屋蒼龍矯首以虛徐玉輅啓行而肅穆千官萬騎拱神位於中霄太皥勾芒扇和風於東陸明德惟馨蒼精降靈寒色尚留於壇墠淑氣已生乎杳冥少陽始來隨初日而其輝未赤新春乍應拂大旌而其色彌青天統則彰禮容斯覿樂聲動蕩於木氣黃道麗彩於蒼璧一本云樂聲動蕩于黃道麗彩初鱗於蒼璧氣先四序克配於木德震宫光被八紘不逃於金壺玉厯迎之伊何神人以和明命既頒於執事遐邇必聞於賡歌時也韶景熙熙仁風習習日月克符於躔次草木遂生于原隰施惠而榖雨垂恩發號而春雷起蟄其道孔昭其律已調禮展於斯且殊夫禮月之夕拜之於曉有類乎拜日之朝我后崇五帝之經教酌三代之典禮振六樂之鏘鏘列千官之濟濟八音已陳夫濩武萬祗既歆於壇陛夫如是者惟聖所符惟天所啓故迎氣之祀事正皇王之大體者矣東郊迎春賦以立春之日備禮東郊為韻王起我皇則銅渾而有倫應木德之惟新展東郊之盛禮出左個而迎春所以先庚有秩舊典攸遵將欽承上帝而敬授於下人者也於是法駕鏗鏘嚴城翕習見太史之先謁知勾芒之已及都人士女候彩仗以駿奔文物聲明擁翠華而鱗集莫不聼玉漏而雷動起靈壇而嶽立於是闢重門遵九逵服蒼玉載青旗草木之萌必因兹而動矣原野之蟄亦自此而啓之展聖容之穆穆引天步之遲遲有翼有嚴不徐不疾百辟陪乘千官扈蹕遵皇衢而却轉度青門而回出八鑾振響隨解凍之和風五輅騰輝映麗天之遲日東郊之中肅穆㑹同爼豆莘莘而駭目衣冠楚楚而鞠躬祥雲為之郁靄佳氣為之葱蘢青帝克禋必來顧而來饗𤣥穹廣覆何自西而自東當是時也四遐縱觀五服來備瞻聖皇之回輪知太昊之整轡登臺者漸樂擊壤者咸遂莫不荷煦嫗於隂陽感溫仁於天地夫然則跂行可以不夭根著可以漸苞貴疑作異逆暑之吹豳空聞乎德肅於火殊迎寒於旁磔何足以禮行於郊則知和氣熙熙盛容濟濟必蒼龍之整駕當青鳥之司啓握金鏡而明王道調玉燭而昭國體莫不在迎春之盛禮第二以天子率公侯共行事為韻謝觀𤣥冥之政已息青帝之令將行太史先三日以奏天子率千官以迎是知齊沐夙興䖍恭慎栗命奉常按東郊以嚴備詔金吾肅中禁以警蹕內外相比上下是率俄而斗轉招搖日當甲乙裭𤣥冕於殘漏掛青衣於曉律翠華忽舉見閶闔之初開蒼龍啓行與朝陽而對出觀夫飛輦輅儼珠旒萬騎而前分儀仗千乘而後列公侯出青門之郊至祈神之地簨簴羅植珍羞有次陳靈威於中宫之座設太昊於配享之位東嚮西嚮勾芒嵗星而對列左之右之三辰七宿以相厠既竭百辟之心用展一人之事帝乃玉色以進磬折而前求發生之候不忒祈溫和之氣罔愆盡敬於地冀祐於天一拜而北陸之寒去矣再拜而東方之風煦然獻酬既已尊卑備矣拂祥光於龍顔之上納和氣於御衣之裏鳳詔還闕金輿反軌逐舉措而凝令載行隨指顧而發生四起我風有截郊祀無假於文王我化無為律吕不勞於鄒子故乃布德施政逺逹幽通髙卑咸沐貴賤攸同始振蟄蟲在好生惡殺遂行慶賜可滅私狗公乃得化洽方隅恩光岐雍遵古典以立則授人時而敬用願迎乎千春萬春與夷夏之所共西郊迎秋賦張秀明彼𤣥天平分以成乎嵗也惟日有令將法於王者服蒼玉而應春居明堂而順夏既隨時而有義皆率禮而無捨若乃律中夷則神司蓐收凉風以厲大火西流草木不芳誰忍聞於鶗鴂囹圄再繕亦申命於鷞一作爽一作州鳩先三日而太史以謁率百官而天子乃逰然後天仗齊列野慶清秋乘白輅而啓行載白旗而扈從天顔乃一作斯穆帝典攸重彼詞客與史臣咸作歌而陳頌既啓鑾輅爰居總章備水潦修隄防鴻鴈將賔待橫舟於汾曲鷹隼已擊且校獵於長楊實惟道映三五何啻聲超百王而已哉别有原憲長貧仲尼少賤朝逰白社驚一葉之辭秋夜宿靈臺聚羣螢而燭卷既覩西郊之禮將述東山之禪欣庇影於禹隂願陳力於周諺第二以題為韵馬逢稽夫王者御極上法璿衡分五方以辨位察四時以作程節既云徂躬履端而御厯氣之將始必出郊以親迎然後人心不惑君德用明是時火官威寢金精氣浮有司來奏詰旦迎秋皇帝乃齊心以待曉御衮龍以垂旒俄而金闕戒辰司魚鑰以撒鍊玉漏將曉直雞人以獻籌乘輿乃駕赫奕皇州天仗倐以雲合風旗閃而星流馳六飛以啓道騰八駿以夾輈祝疑作祀三辰與七宿儼公卿與諸侯在位則其帝少皥配坐則其神蓐收我皇乃順時候育黔黎佩白一作皇綬執白圭盛德在金就金方以蕆事西成有望出國門以面西豈比夫簫鼓徒樂於汾水玉帛空朝於㑹稽誡辰既畢酒縮靈茅笙鏞謁廟粱稻充庖日轉天旋既將歸於北極雲行雨霈匪空自於西郊是月也天地始肅秋冬疑將布勞我農民張我王度疑獄在斷命司冦而按囚徒逺方來賔發天兵而開武庫然後人畏威而自正俗知禁而刑措休祥畢至則河湧靈圖慶賜遂行乃山呼聖祚於赫哉國容既備時令將徂樂萬姓以雍熙惣疑百川而奔注余亦願於賔王效武賁而作賦北郊迎冬賦以題為韻王起我皇審緹幕候𤣥英法天之序作人之程律變於冬必順時而冬命水盛於北亦隨方而北迎所以修舊典闡鴻名受太史之先謁率羣辟而躬營况肅殺以北陸將昭宣乎上京于時時和嵗豐勞農息力結氷於坎改火於國天欣玉燭之太和人受銅渾之罔忒由是文物成聲明飾皇皇濟濟鏘鏘翼翼向仙蹕之駐方引斾於司南望曉星之殘尚建杓於禮北及夫禁城啓寒漏極分天仗而雲布遵皇衢而繩直嚴颷絶𤣥輅之響愛日動鐡驪之色一人由之而展容萬姓於焉而仰德既而臻靈壇薦嘉肴奠之以玉縮之以茅雖布政於𤣥堂以居乎左個而司晨者黑帝必祭於北郊蓋示敬於端冕非取樂於懸匏及夫整宸儀回天步考時訓而咸若稽月令而畢賦導嚴凝之氣無奪其倫應廣莫之風不愆于度則知北郊之為禮所以佐天而成功亦以感神而叶中故宜百神肸蠁萬㝢朝宗豈止運行而成嵗閉蟄而為冬東郊朝日賦以國家行仲春之令為韵陸贄日為炎精君實陽德明至乃照臨下土德盛則光被四國天垂象聖作則候春分之節時則罔愆順周官之儀事乃不忒於是載青旗儼翠華蓋留殘月旗拂朝霞咸濟濟以皇皇備禮容於邦家天子躬整服以待曙心既誠而望賖倐而罷嚴更闢禁城五輅齊駕八鸞啓行風出郊而草偃澤先路而塵清卷餘靄於林薄動神光於斾旌初破鏡而半掩忽成輪而上征杲耀榮光分輝於千品萬類烟煴瑞色均燭於四夷八紘一人端冕以仰拜百辟奉璋而竭誠故曰天為父日為兄和氣旁通帝德與日德俱逺清光相對帝心與日心齊明時也春事既用夾鍾律中登觀臺而瑞集覩芳甸而農衆東為陽位故出拜於國東仲居時中乃展禮於春仲既而盛禮畢陳鍚鑾回輪家有罄室巷無居人備禮服之燦燦殷遊車之轔轔人望如草我澤如春惟天德與聖夀配朝日而長新伊兹禮之可持歷前代而修之漢拜庭中成煩䙝之細事魏朝嵗首失禮經於舊時國家欽若天命率由時令矯前王之失德修古典而施敬俾伯夷之掌禮侔軒后以作聖恭承命於春卿遂觀光而興詠南郊享夀星賦周鈐玉露初降金風正秋有夀星之發彩出離方而若浮太史于是奏時令贊天休謂三光之丕顯蓋萬乘之勤修天子乃命有司灌鬱鬯登靈壇以蕆事敬南極而延望當其氛霧寢煙霞曠循大象之昭回見孤光之寥亮月來嵗往常居赤帝之前目擊心祈空仰碧霄之上所欲精誠斯感肸蠁潜交矚神靈兮心馳箕斗奠椒漿兮酌滿陶匏事異乞言殊養老於東序祭惟合禮同祀月於西郊時也隂陽正位晝夜平分思薦祉於人夀遂大享乎天文則知秩天宗用郊祀斯祭也象在角亢壇用戊已月皎皎而清漢波流夜蕭蕭而白榆風起齊心常潔蘋蘩之薦已申夀域光開龜鶴之年可俟祀事既道之南恍惚兮光臨爼豆依稀兮氣動煙嵐由是見星躔之不爽知君德之相參彼牛女迢遞以增思參商隱見而差失處圓靈兮徒分炳煥於敬授兮未為真吉曷若我冠衆星而稱老當三秋而迥出既有補於乾坤詎廢書於時日是宜執犧象展雞彛召馮相而司厯命祝史以陳辭如此則所謂一人有慶兆民賴之文苑英華卷五十五
