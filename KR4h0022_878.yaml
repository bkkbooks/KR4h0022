body:
  text: 文苑英華巻八百七十九宋李昉等編祠廟二燕支山神寧濟公祠堂碑一首南海神廟碑一首河瀆神靈源公祠廟碑一首燕支山神寧濟公祠堂碑楊炎西北之巨鎮曰燕支本匈奴王庭昔漢武納渾邪開右地置武威張掖而山界一作介二郡間連峰委㑹雲蔚黛起積髙之勢四面千里陽崖有栝栢之材備幹革隂壑有堅剛之璞化五兵維人氣雄其畜多焉虜得之以制隂國主天街周以之興秦以之霸漢得之以斷右臂却南牧西距于海北瀦一作經于河自外而望上也熊熊一作雄乎一氣旁䕃朔鹵前衡塞門與積石来朝崑崙相長一作負洎陟蒼蒼臨峻極則刑變六合空同大荒青冥在混元之中絶壁揭宇宙之外舊史云封祀之山八中國之外三自夏缺壌一作秩奠漢疆土宇一作漢攘疆土時更百王四字一作于時更而王者莫能配天其意者将纉禹之業以俟聖人乎維唐百一作之非三十載賁𤣥化之紀息金革之虞一作金革之墟茫一作蠢蠢蒸然革一作萃于聖澤於是左丹穴右崆峒古而一作所未賔咸頓首于路門之外天子登神宫勒金版将復羙于郡一作義于郡岳告成于昊蒼議夫一作云此山天合氣以正秋方地與神以主西國一作而主戎國俾蚪螭者為師為旅貔虎者為妾為臣不在於巨靈乎其封神為寧濟公錫之鞶帯備厥禮物詔邦牧太子少保哥舒公卜吉日築臺一無臺字靈祠于髙麓之陽每嵗盛秋以笙鏞之器錡釡之品率封内以望之索羣神以㑹之亞旅師氏旄頭弩牙金鼓七校車徒十萬從饗于廟庭大閲于山外一無外字所以固一作因天界以崇聖功乗地險而恢逺略也觀夫叢嵓懸抱烟雨屑窣宫庭晃其閑一作角暮林石古而幽隂神其居之可以禱安静矣樹一作拊是空桑變鐘石神其聽之可以感和樂矣大玉通帛熊蟠桂漿粲其傾筐采章一作物煌煌神其歆之可以祚永一作有年矣維石巖巖日月不老維靈是與生此熊羆神其薦之可以奉吾君矣於戱陳信克享正詞幽感宜乎有祈而降有祭而歆龍也無風雨之愆虵一作敵也無氣熖之作此神之職又何羞焉乃作頌曰掲靈山兮天地界勢奔壮一作突兮風雲駭峰龍有一作峰蹲龍兮入天門氣蛇變一作變蛇兮破淫一作烟嵐昬祐自天兮得終古被一作備華蟲兮駕朱虎南海神廟碑韓愈海於天地間為物最鉅自三代聖王莫不禮集本文粹作祀事考於傳記而南海神次最貴在北東西二本有三神二字河伯之上號為祝融天寳中天子以為古爵莫貴於公侯於海岳之禮二本作祝犧幣之數放而依之所以致崇極於大秩一本作神今王亦爵也而禮海岳尚循公侯之事虚王儀而不用非致崇極之意也由是册尊南海神為廣利王祀祀一本作祝號祭式與次俱升因其故廟易而新之在今廣州治之東南海道八十里扶胥之口黄木之灣常以立夏氣至命廣州刺史行事祠下事訖驛聞而刺史常節度五嶺諸軍仍觀察其郡邑於南方亊無所不統地大以集註作而逺故常選用重人既貴而富且不習海亊又當祀文粹作祝時海常多大風将往皆憂戚既進觀顧怖悸故常以疾為辭文粹作解而委事於其副其来久矣二本作己久故明宫齋廬上雨旁風無所葢障牲酒瘠酸集註牲瘠酒酸取具臨時水陸之品狼籍籩豆薦裸興俯不中儀式吏滋不恭神不顧享盲風恠雨發作無節人䝉其害元和十三年始詔用前尚書右丞國子祭酒魯國孔公為廣州刺史兼御史大夫以殿南服公正直方嚴中心秉直二本作樂易祗慎所職治人以眀事神以誠内外單盡不為表襮至州之眀年将夏祝冊自京師至吏以時告公乃齋祓視册誓羣有司曰册有皇帝名乃上所自署且文粹無且字集作其其文曰嗣天子某謹遣某官某敬祭其恭且嚴如是敢有不承眀日吾将宿廟下以供晨事眀日吏以風雨白不聽於是州府文武吏事凡百數交詞二本作謁更諫皆揖而退公遂升舟風雨少弛櫂夫奏功雲隂解駮日光穿漏波伏不興省牲之夕載陽載隂将事之夜天地開除月星眀概五鼓既作牽牛正中公乃盛服執笏以入即事文武賔屬俯首聽位各執其職牲肥酒香罇斚二本作爵静潔降登有數神且文粹作其集作具醉飽海之百靈秘恠慌惚畢出蜿蜿蛇蛇二本作蜒蜒来享文粹作慕飲食闔廟旋艫祥飈送颿旗纛旄麾飛揚晻藹鐃鼓嘲轟髙管噭噪武夫奮棹工師唱和穹龜長魚踴躍後先乾端坤倪軒豁呈露祝之之嵗風災息㓕人厭魚蟹五糓豐二本作胥熟眀年祀歸又廣廟宫而大之治其庭壇坎二本作改作東西兩序齋庖之房百用俱二本作貝脩眀年其時公又因二本作固往不懈益䖍嵗仍大和耋艾歌詠始公之至盡除他名之税罷文粹無此字衣食於官之可去者四方之使不以資交以身為帥燕享有時賞與有節公藏私蓄上下與足於是免文粹有于字屬州負逋之緡錢十有八萬集註作一十有四萬米三萬八千二本作八萬二千斛賦重二本作金之州耗金一嵗八百困不能償皆以丐之文粹作正之加西南二本作四面守長之俸誅其尤無良不聽令者由是皆自重慎法人士之落南不能歸者與流徙之胄百二十八族用其良才而廩其無告者其女子可嫁者與之錢財令無失時刑徳並流方地數千里不識盗賊山行海宿不擇處所亊神治人其可謂備至耳矣咸願刻廟石以著厥羙而繋以詩乃作詩曰南海陰集作之墟祝融之宅即祀于旁帝命南伯吏惰不躬正自今公明用享錫右文粹作祐我邦家惟明天子惟慎厥使我公在官神人致喜海嶺之陬既足既濡胡不均𢎞俾執亊樞公行勿遲公無遽歸匪我私公神人俱依河瀆神靈源公祠廟碑王延昌中國經瀆河為長上應析木下朝扶桑演崑崙踰積石繚大漠經龍門灌注九州之間經營萬里之外鱗介所宅神靈所一作之都𤣥冥總之以命官憑之以為伯唐堯觀諸疑龍圗肇見周公沉璧榮光發祥元符之来彪炳彰灼古先哲后罔不欽崇奠封居之儀修壇墠之制存乎祀典代以為常則班固序漢書所謂河祠臨晉是也偉其南直太華左隣中條渭水過其旁汾脽掲其後風雲相盪精氣交馳一作配于以禮神事之宜也不然發源自逺地則多漫一作綿地則多胡為不昭晰於他邦獨受享於兹土前賢經始抑有其由至於春以泮凍秋以涸流漢書作凍初以嵗禱終以報祈嘗醪有加駵駒是薦葢以在雍州之域通天子之都地既稱雄禮云異數與夫淮流桐栢江出㟭山僻在遐方莫我京也幽賛之力實頼河公以潔為清瀾至於數四息昏墊之苦絶羡溢之憂濵河之人濶無大害此靈長之徳上善之功也祈以正直享以精誠未嘗不誘其𠂻而降之吉也或進以便佞言以矯誣未嘗不奪其魄而貽之禍也嵗大旱而作霖雨時大札以惠嘉生依仁而行唯徳是輔天寳嵗安祿山稱兵朔裔肆逆東夏熖烻扇燥烝人爇焉宗社有綴旒之危士庶畜阽危一作原之懼太上南幸肅宗北巡賊相張儒據有長安賊将崔乾祐固守蒲坂今闗内河東副元帥中書令汾陽郡王郭公時為兵部尚書門下平章事朔方節度使訓兵誓衆超百二之險謂此邦底定則京師可圗䖍禱于河潜軍以往金鼓掩夜渠魁出奔遂收蒲城神所道一作導也及師次渭汭隂霧晦宴公假寝之際夢河神謂曰永豐倉側将有急變不如速退姑以避之比全軍及郊虜己雲合克違㓂難神所扶也其後李國貞之遇禍公復總戎故絳僕固懐恩之逆命公又出鎮河東大君日旰食中外騷擾公獨奮無前之勇馳不測之深始按節而来終奠醑其邁所謀必克無往不平再安叛渙神所相也爰自兵亂以迄于今時更十年代歴二聖國之氛霾惟河公蕩滌國之土宇惟河公廓開國之忠良惟河公保祐國之奸慝惟河公殄摧誠靡幽而不應澤罔㣲而不該得一以靈不其宜哉汾陽王深惟據我屢崇昭報奉牲玉莫敢愛也致精意未嘗怠也每蠲吉歴選自郊徂宫奠于堂户之間則神之昆弟具在酧于屋漏之内則神之伉儷攸居文墨國語文墨尋常之間注云五尺為墨相望男女無别公曰神人之主也禮政之源也人有上下則禮有内外之制人所謂否神具可考盍築館于後以安靈匹乃諮于副元帥副使太子賔客御史大夫知河中府事崔公寓量功命日而後役於河西縣大夫李開不徴貨財不殫日力曾不踰月克復于成大厦耽耽欝其特起内寝既立神儀穆然於是齒危髪秃之老王端等進而稱曰大河浩蕩弊邑之望也自公杖鉞三至我里靈應肹蠁未嘗或欺國之克復實始於此安天歩於臲卼定人心於繹騷大君成湯武之功賢相保桓文之業皆神之由也矧内寝棘翼今兹有成此而無述何以示後願刻樂石以彰厥庸公教曰諸公之辭固不可抑頌祗則可無推羙於予墨客聞敢繋辭曰浩浩長河中國之紀洪流激射横制地理蒸雲吐霧薦圗効祉是曰經瀆斯為徳水聖唐六葉巨猾挻災搟音攇舉手擬之也楊雄長揚賦麾城搟邑或作漸非邑麾城如霆如雷汾陽矯矯杖鉞而来乃臨蒲坂神實先道一作導乃亂渭水亦亦疑胥告嗟我上相神之所勞汾陽之徳温恭正直柔嘉維則忠勤是力秉心泉淵字唐諱塞不測不克東西南北勦絶奸慝入登九命一人是毗出統三軍四方是維維言祐之河公降禧衆神在列曾未區别公為之節内寝攸設寝廟亭亭中外有經濯濯厥靈妃偶攸寧於戱祠宇焜燿中土在河之滸在城之下刋兹片石昭灼千古文苑英華巻八百七十九
