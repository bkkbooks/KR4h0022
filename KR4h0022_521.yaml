body:
  text: 文苑英華卷五百二十二宋李昉等編刑獄門二十八道流人降徒判一道竒請他比議判一道誘人致罪判一道因丑致罪判一道詐稱官銜判一道犯徒加杖判一道解桎判一道刑罰疑赦判一道告密判一道贓賄判一道吏犯徴贓判一道主簿取受判一道尉用官布判一道未上假借判一道乾沒稍食判一道取錢授官判一道受囚財物判一道脫枷取絹判一道免罪不謝判一道子行盜判一道冒名事發判一道請不用赦判一道失囚判一道遇毒判一道被妻毆判一道稽緩制書判一道刺史違法判一道私發制書判一道流人降徒判大理申去年流人恩降徒今徒會慮合免刑部駁制免徒罪此非本坐不許徒者寃訴對曼倩持法恭聞至理之名公閭在官雅得平反之稱與其失善寧可利淫頃以澤被寰中風行水上象雷雨以作解自昆蟲而必及五流之罪恩降一至於徒年三宥之條會慮復加於清雪渙然無咎咸與惟新大理以慮合從寬雅符平典刑部以徒非本坐何太深文竒音基請他比議判法司以竒請他比議為蠲除而留臺持之不宜數變乃引聖智之所為患前漢刑法志竒請他比日以益滋議可蠲除者或曰法難數變此庸人不逹疑塞治道聖智之所常患者也對政貴有常理惟體要明罰勑法取誡於先王議獄緩死致誠於君子俾其科條克敘輕重有倫惟齊非齊以殺止殺事必謀始則司契之義明道先仍舊則改作之功末鄭僑鑄鼎猶慙叔向之言周滿作刑稱耄吕侯之策况聖君御物天下文明人識舊章國懸常典舞文巧詆非則於張湯捨虐從寬有依於定國矧乃漢盜陵土惟輕載美於釋之於昭八議誠以類而可徴永言三尺復何慙於師古誘人致罪判甲誘丁致罪令其同坐云人各有心對率心無邪詩參履福作偽背道經喻焚身若從惡而自貽將異罪而同罰利交相啖唯甲與丁鄰德不慕於田蘇樂禍更移於齊豹謗招惡子名近盜夸且飭躬無良以欲敗度誘人汙迹以一作於義傷風六行舉挂於爰書兩造不聞於在宥待窮實狀方置科條一作刑因丑致罪判癸因丑致罪所由欲科之及丑自死癸云罪人則亡我更何若一作善所由亦不知作何處分對生諒不謹法必繩愆既三禁而無移在五月一作用而難捨丑孽不可逭鬼得而誅癸戮出於身官慢其業雖天網不漏亦未失刑而職司是虧攸冝坐罪且罪有輕重失亦降差刑難變於一成減可從其二等詐稱官銜判辛詐稱官銜取給州縣所司以偽論不伏仰正斷對辛在德多涼於朝不齒九班之榮未及三思之志闕如妄稱爵里之尊以求州縣之給詐難久恃偽果自彰行詐為官仲由以欺天見誚言偽而辨少正以左道受誅前史以舉其不然在律又繩其有過理冝緘口何恤薄言犯徒加杖判乙犯徒訴家無兼丁縣斷加杖人告其有妻年二十一已上對麗刑務輕罰懲非死若膚受之訟則哀矜難原乙何人哉有耻未格不化厥訓自貽伊咎當從傅氏之策若赴驪山之徒謂無兼丁則合加杖而配有偶應是克家來訟無稽未冝易法縣且失律豈曰能官人之糾謬斯一作誰謂不冝一作他人之糾謬謂不直解桎判得甲送徒道解桎梏恣所過御史糾訴云尅期俱至無違者對法在安人刑忌留獄苟信不繼則噬膚而莫懲如得其情則緩死而無逸惟彼甲者奉詔送徒解其桎梏遵大易之利用申其甲庚係小子而且格承命為信義則乖於守官推誠於物仁或昭其恤下與其刑兹無赦利武人之貞曷若感而遂通資文明以悅且虞廷作法人不敢欺鍾離縱徒尅期而至有叶良吏無瀆簡彞欲依驄馬之糾恐越鷞鳩之法刑罰疑赦判甲刑罰之疑俱赦有司以刑不上備省科之云適輕下服諸罰有權對先王立辟議事以制得情勿喜寧失不經故三宥以順時重一成而不改水懷中典亦謹無良惟罰與刑有疑俱赦厚倫正俗立教在寬二罪並興載難上備五聽無濫冝遵下服既有權而適道當惻隱而從輕不俾少懲將為允當告密判雍州申綿州告密囚王禮告本州人有謀反行至散關夜已將半關吏以其夜到不為開門禮緣事急遂越關而度至留守所告關令趙秀并自首越關事到神都法司斷秀應為而不為主簿批為不當舉牒議卿判秀當知反而不告下符科結秀經亷使披訴仰正斷對王禮生於劔表長自巴中身在重關之外心馳魏闕之下踰岷越嶂雖效赤誠觸網冒羅遂縈丹筆何者但緣謀反律有明條本州既不告言他邑寧且寢默必也同夫兆一作風火應合控彼星昴何須乘夜犯關侵宵越棧異田文之徑度不聽雞鳴殊孫龍之縱辨無論馬色雖未詳其五聽聊請扣其兩端告密縱使非虛越關無宜首免贓賄判河南縣丞張季昭貸官錢一千貫私用縣令王楷糾從枉法季昭云既立帖取明即擬還不伏御史宋沖斷為真盜對雷電作威先王以嚴刑斷獄脂膏不潤古人以從政立身故貪乃敗名子罕以不貪為寶財悖而入疏廣以多財纍愚河南帝城四方取則毗贊之職必惟其人季昭策名清時沐我玄化不能獨峻其節有戾氷霜翻乃難滿為心自同溪壑况飛龍在運振鷺盈朝官材必孚名器無假不義而富聞夫子之有言刑故無赦著文王之作罰臨財苟得古則恥之陳力不能今也冝止黃圖貴令欲以枉法定刑繡衣御史斷為真盜論罪既立文帖應有限期或即結刑恐成疑獄空仰九天之問慙無一割之能待結事由置之邦典吏犯徴贓判吏人犯枉法贓會恩免罪所由不徴正贓御史舉以非枉法不伏對肆眚從輕前王以之宥罪一成不變君子於焉盡心黠吏伊何罔知紀極貪藩身之貨自底不經沐渙汗之恩幸而獲宥雖小懲大誡既曰刑其恤哉而免罪徴贓尚謂罔之生也酌彼三尺折以片言柱後為官御史之舉非斯當頥中有物所由之不伏未孚敢肆剛腸輕申直筆主簿取受判外州申屬縣主簿部內取受州將不之罪也出錢與之對束紳從官既儋人爵析圭銜命須代天工不息惡木之隂不畏貪泉之味豈溪壑其志山川其心錢且深藏非從地出金常密受不畏天知效無彰於萬分法宜加於三尺州將情為寬簡道取敦龎必令上化用孚將使下僚知恥若過而能改合道期於反經若情不自悛罰罪當於懲惡請更研問方事科條尉用官布判鄖縣尉單則將官布七百端質錢還債經一百日合科何罪對單則策名柱下述職江濵才靡效於一身害已深於五蠧用公府之財酬私門之債虧貞節於箭巖汨清流於鏡水九章彞憲不惠姦疑三尺明科無捨刑故雖復陪填已畢終是濫竊成愆指事論情實嬰疏網披文按法或蔽蒙襟委諸兩造之司庶盡片言之斷未上假借判丁受官未上於所部假借科其監臨不伏對命官以賢底祿以道猶未涖事胡為賄聞無魏子之悛心有叔魚之黷貨即為假借曽不內愧于躬式冒刑典仍欲外文其過實叨懫之自速非監臨之謂何加言是丁不可逃罪乾沒稍食判乙主稍食輒自乾沒為方書所劾對列爵分官用資監守臨班掌務必藉亷平其有黷貨居心類長安之小吏不貪為寶殊宋國之司城時所未容法宜難捨况主茲稍食慢彼嚴章竊人之財從已之欲方書職惟糾謬本曰懲非罪即不誣任依輕典取錢授官判得楊甲選以錢十萬金三十斤求山乙得官後被告大理以甲選數合留官不越次會恩洗滌甲不解任錢金不追刑部斷甲解見任徴乙金錢對學古入官不聞黷貨以賢制爵安可非材楊甲人實妄庸謬參調選山乙志惟貪冒多受金錢良以職謝巨源賢慙伯起鴻猷載黜是則難容大理同拘自貽伊戚承恩合免雖則棘署守文會赦獨徴實亦仙臺直筆請依省斷竊謂為冝受囚財物判丁受囚財增其語贓輕減罪省司駁議非當鬻獄對鬻獄賈直實誡魯史舞文巧詆用存漢策小大之察必惟其情輕重之權固茲無濫眷彼丁者職在監臨貨以藩身見魯豹之裂帶貪而速戾同叔魚之敗官且無屬厭難以末減省司忠告實謂平反脫枷取絹判祁陽縣尉董則任大理獄吏與囚脫枷取絹兩匹斷除名對刑政所存為國之本有倫有要𢎞慎斯歸就重就輕哀矜無失董則事緣贓賄斷彼除名黷貨於無器之時定罪於有官之日問既承引斷亦甘心兩縑雖則難容雙啓終須審究脫枷狀非枉法凖絹不至徒年除名雖據本條斷罪冝無覆定永州申上不詳前任之文刑部重尋妙得無官之列除名之坐未可依前罪不合徒何容濫罰免罪不謝判得乙有罪丁救以免乙不謝或責之乙云不為己對白居易在公而行誠非為己懷惠以謝則涉徇私彼既求仁而得仁此冝以直而報直乙惟獲戾丁乃解紛以為非罪而拘冶長見稱於尼父直言以免叔向寧謝於祁奚論恩則丘山不勝在道而江湖可忘况情非私謁可以不愧於人義在公行實亦一作已無求於我盍加遺直勿聽責言子行盜判得甲告其子行盜或誚其父子不相為一作容隱甲云大義滅親對法許原情慈通隱惡俾恩流于下亦直在其中甲齒忝人倫忍傷天性義方失教曽莫愧于父頑攘竊成姦尚不為其子隱道既虧於庭訓禮遂闕於家肥且情比樂羊可謂不慈傷教况罪非石厚徒云大義滅親是不及情所冝致誚冒名事發判得丁冒名事發法司凖法科罪節度使奏丁在官有善集作美政請免罪真授以勸能者法司以亂法不許對宥則利淫誅為一作則傷善失人猶可壞法實難丁僣濫為心僶俯從事始假名而作偽咎則自貽及勵節而為官政將可取節使以功惟補過情一作請欲勸能憲司以仁不惠姦議難亂紀制冝經久理貴從長見小善而必求才雖苟得踰大防而不禁弊將若何濟時不在於一夫守法宜守乎三尺盍懲行詐勿許拜真請不用赦判得乙上封請永不用赦大理云廢赦何以使人自新乙云數赦則姦生恐弊轉甚對刑乃天威赦惟王澤于以御下存乎建中上封以宥過利淫幸門冝閉大理以蕩邪除舊權道當行皆推濟國之誠未逹隨時之義何則政包寬猛法有弛張習以生常則起為姦之弊廢而不用何成作解之恩請思砭石之言兼詠蓼蕭之什數則不可無之亦難失囚判得甲為獄吏囚走限內他人獲之甲請免罪對圜土不嚴罪人其遁亡而由己誠曰慢官獲則因人其何補過相彼維甲所謂攸司不念恪居警于羑里旋聞失守逸乃楚囚雖非故縱所因曽是慢常而致徒稱勿佚未可塞違得於他人自是疏網無漏失其所職豈可出柙不科無貪假手之功固念集作合甘心於責集作罰遇毒判得丙於逆旅食噬臘遇毒而死其黨訟之主人云買之有處對生不可保死必有因盍知命於喪豫豈尤人於食我丙秋蓬方轉朝薤欲晞旅次方來將受飱而已生涯溘盡當終食之間且非祭地之餘集作疑自是逄天之戚永言其黨不察所由死且焉知徒云噬臘之毒買而有據請無置堇之嫌誠虐士之可哀在主人而何咎幸思恕物無妄罪人被妻毆判得甲居家被妻毆笞之鄰人告其違法縣斷徒三年妻訴云非夫告不伏對禮貴妻柔則冝禁暴罪非夫告未可麗刑何彼無良於斯有怒三從罔敬待以庸奴之心一杖所加辱於女子之手作威信傷於婦順集作道不告未失集作爽於夫義集作和招訟於鄰誠愧聲聞於外斷徒不伏未乖直在其中雖未集作非家肥難從縣責稽緩制書判得甲為所由稽緩制書法直斷合徒一年訴云違未經十日對王命急宣行無停晷制書稽緩罪有常刑將欲正其科繩必先揆以時日甲懈位敗度慢令速尤蓄怠棄之心既虧臣節壅駿奔之命自抵國章然則審時勾稽考程定罪法直以役當期月所由以違未浹辰將計年以斷徒恐乖閲實請據日而加等庶叶決平是曰由文俾乎息訟刺史違法判得丙為録事恭軍刺史有違法事丙封狀奏聞或責其失事長之道丙云不敢不忠于國對守位居常小冝事大持法舉正卑可糾尊丙名署外臺身由中立直冝自守郡郵之政必行明不相蒙州將之邪無隱且六條枉撓百事滋昏苟不提綱是為漏網雖舉違犯上虧敬長之小心而陳奏盡忠得事君之大節既非下訕難抑上聞私發制書判得丁私發制書法司斷依漏泄坐丁訴云非密事請當本罪對君命是專刑其無小王言非密罪則從輕丁乃攸司屬當行下不慎厥德擅發如綸之言自災于身難求疏網之漏然則法通加減罪有重輕必也志在私行唯當專逹之責如或事關樞密則科漏泄之辜請驗迹於紫泥方定刑於丹筆文苑英華卷五百二十二
