body:
  text: 文苑英華卷四百四十五宋李昉等編冊文四諸王冊文二冊漢中王瑀等文賈至見唐大詔令維天寶十五載嵗次景申七月戊子朔皇帝若曰咨爾漢中王瑀臮御史中丞魏仲犀王室多難凶逆未誅是用建爾子姪以為藩屏命爾忠良以攝傅相安危繫是舉可不慎歟夫王侯之體則以任能從諫為本親賢仗信為則好問樂善為心安仁容衆為節然後能建其功業夾輔王室是以漢之宗王多委政守相故能享祚長久令聞不已朕聞汝瑀能寬大儉約樂善好賢敦恱詩書動必由正而久於髙簡未習政途又聞仲犀才幹振舉憂勤庶績必能固爾磐石匡補闕漏軍旅之事必委其專獄訟之煩必與其决簡賢任能必使其舉懲惡勸善必任其斷惟協惟睦其政乃成同德合義何往不濟於戲瑀其鎮撫黎人莊肅守位仲犀其悉心戮力贊我維城瑀有任賢之名仲犀有忠勤之績匡復社稷戡定冦讐在此行也朂哉其無替朕命冊魏王文玉堂遺範維咸通三年嵗次闕皇帝若曰夫翦圭分器事炳周經裂地疏封道光漢冊莫不克隆磐石作固本枝並建親賢以崇藩翰朝有定制朕安得私爰稽盛時俾隆錫社咨爾長男佾通輝日月禀慶霄漢詔令作黃䕃若木之凝華派璿源之積潤天姿岐嶷神侍疑聰明早彰樂善之規夙有辦牘之知卓爾器度藹然徽猷宜荷寵章以開土宇今遣使門下侍郎兼吏部尚書平章事杜悰副使左散騎常侍趙格等持節命詔令作冊爾為魏王於戲河外名都漳滏奧宅爾其竭奉上之孝敬慎臨下之儀刑守道宜鑒於逺名尊賢無忘於置醴用新魯衛之政以昭間平之德服我休命可不慎歟冊凉王文維某年月日皇帝若曰夫維城作捍實隆定鼎之業犬牙列國以盛建瓴之功故廣樹戚蕃畢王子弟歷朝茂典列聖宏規舉而行之朕不敢廢咨爾第三男侹分暉紫極託詔令作挺質丹宫器度沉詳姿容端粹藹有成人之量形乎佩韘之年志玩楚詩情通沛易不勞師傅之訓動形忠孝之規爰嘉令猷俾建侯社今遣使門下侍郎兼吏部尚書平章事杜悰副使左散騎常侍趙格等持節冊爾為凉王爾其奄長洪河大啓西土紹于前烈恢我舊疆敬慎於朱邸之間謹睦於玳筵之上靖恭其位克廣其心無從匪彜服我休命冊蜀王文維某年月日皇帝若曰夫堯序九族周列五等事髙維翰或作幹道在睦親况居帝子之尊宜荷封王之典用彰慶羡以固洪基咨爾第三男佶符彩昭融姿容朗悟騰英日域儲秀星樞已多稱象之能才是勝衣之嵗靜不好弄言必成文曽無紈綺之心每服詩書之訓嘉其幼智錫以大封今遣使門下侍郎兼吏部尚書平章事杜悰副使左散騎常侍趙格等持節冊爾為蜀王爾其宅于坤維建諸赤社疏以江漢鎮以岷嶓列為侯王邇我宫禁以謹恭而接下秉忠孝以律身服是寵光終于戒慎擬冊齊王文劉禹錫以下四萹集無維某年月日皇帝若曰啓茲東國境于青州略嵎夷導濰淄鹽絺貢庭檿絲入篚粵在少昊為爽鳩之域沃若殷商乃薄姑之丘周實太公之國積海岱之饒習戎革之盛因俗簡禮其政易成咨爾第二子某直諒多聞溫裕有立樂於為善力其未能行本貞亷言依忠孝固可錫茲青社俾藩于東是用命使某官某乙持節冊命爾為齊王往欽哉冝聽朕命夫敬人可以理國然後已可以得人謂已不明任賢良以為明謂已不德資師傅以為德國安則備爾忠孝人散則忝爾君親慎乃厥修無替休命擬冊楚王文維某年月日皇帝若曰衡嶽峙靈雲夢潤德錫十朋以備神物包三眷以供王祭浮江潜漢實曰渚宫俗輕而佻上難其化咨爾第三子某正性自得懿行克修廣淡居心寬裕推已移此成器綏于荆蠻錫爾赤社以屏南土是用命使某官某乙持節冊命爾為楚王往欽哉宜聽朕命於戲布政在寬革俗先信分吾之憂以惠黎庶勵爾之志以報君親為子為臣克忠克孝臻於二德在理一邦祗敬勿休無忝我命擬冊邠王文維某年月日皇帝若曰朕讀詩至豳風見古公亶父之跡然後知王業之難仰惟我太祖太宗之􅌨沐風雨以啓天下是用兢惕若墜泉谷豳之舊地積德之餘俗厚而忠人恱其上王于茲土克𢡟賢戚咨爾第四子某質重性和神清氣茂威儀儼若恬淡寡言介然風規坐鎮流俗固可將吾勤儉宣化豳郊錫爾白社藩于西土是用命使某官某乙持節冊命爾為邠王往欽哉冝聽朕命於戲播種者后稷公劉之業善繼者古公亶父之志積德行義國人戴之詩有七月之章非惟王業艱難亦俗阜化成之風也爾其日夜思之談以溫柔之教無奪農時使獨戴周德以忝我一人之命擬冊晋王文維某年月日皇帝若曰涉河之東千里而廣右浸衛水左據常山蒲坂唐堯所封之丘歷山虞舜隱耕之地晉陽我髙祖誓衆之野本晉國也而謂之唐其人憂深思逺有帝堯之遺風焉故我國家因之以啓王業將我朝政保茲舊邦克建戚藩以任賢德咨爾第五男某和裕禀質端貞理身撝謙似不能好善如不足行歸於厚口無擇言本孝克家資忠體國固可嚴奉啓聖之域綏懷積德之邦錫爾黑社以藩于北是用命使某官某乙持節冊命爾為晉王往欽哉冝聽朕命於戲踐唐堯之地理虞舜之人開髙祖之域爾其兢兢底慎以臨其人思流愷悌之風祗敬興王之地無一舉足以忘我祖宗艱難之業往利厥土以孚于休封鄂王制蔣伸見唐大詔令門下周家受命諸子疏封漢氏造邦二等垂制式崇藩屏思固本根逮于國朝必稽典憲太宗創久長之業乃建親賢列聖遵繼守之文廣分土宇朕獲承丕構敢廢彛章非唯永保於皇基蓋亦無私於天下第六男潤生而聰敏性則溫恭孝敬夙彰誠明日至能服詩書之教居然禮義之姿雖在幼年動由義訓周旋知為善之樂謙和無自伐之心足一作是可以膺犬牙之封􅌋麟趾之慶授以茅社錫其桐圭俾為戚藩以輔王室爾宜繼二南之美躅習三雍之舊儀敬服斯言用光禮命可封鄂王令所司備禮冊命大中五年六月封棣王制沈詢門下朕聞王者建植子弟胙以茅土將欲蕃昌磐石深固本根周漢之隆率由斯道及我列聖每用舊章所以撫安生靈保祐中外朕恭承天序敢紊前規爰加立愛之恩庶廣推公之義憲宗第十八子惴生則溫柔性惟聰達神邁氣朗閲詔令作聞禮知方藴積中之粹和資奉上之孝敬必能副豫之詔令無之字友愛始終令圖以耀金枝以輔王室是合俾開朱邸盛建戚藩載啓唐虞之風用崇麟趾之慶嗚呼惟茲盛典用别親賢必思繼美二南紹休五等佩維城之重思外屏之尊無怠無荒服我丕命可封棣王仍令擇日備禮冊命大中六年十一月冊景王文錢珝維年月日皇帝若曰周官八統其一親親漢制皇子為王得使立社于國固本之大哲后皆然咨爾第八男祕當襁褓詔令作保抱之間有敏惠之性亦既總角遂能勝衣默識天經潜滋日就未嘗玩物可以疏封乃告守龜且聞叶吉來受茲典永為東藩今遣某官某乙持節冊爾為景王嗚呼見厥賢而能思賢爾則必賢矣知可逸而能無逸爾則常逸矣是宜廣王緒承丕休敬而聽之罔失厥度冊輝王文維年月日皇帝若曰古君子篤於親者使天下興於仁也故二王五子之封非獨立愛而已咨爾第九男祚克岐之質見善欲遷禀訓導而必開故戲言而不受一隅以詔令作已逹四術可陳乃申胙土之章俾奉成人之美詔令作禮今遣某官某乙持節冊爾為輝王於戲為臣為子皆在爾躬有器有名敢私國典錫類則非孝不可逺耻則非恭不能無替聿修以光利建白茅金璽昭物具焉爾其夙夜循思用稱休命乾寧四年十月冊祁王文維年月日皇帝若曰廟立之重天序可承將茂本枝式遵懸法庸就至公之體諒非吝子之心咨爾第十男祺植性惟貞詔令作和挺才亦秀飾躬罔念於紈素樂善欲忘於鼓鐘㭊壤之休自天而體臨軒之命秉禮則安今遣某官某乙持節冊爾為祁王於戲保在深宫鮮知政詔令作正範在一作任之作傳我必擇人苟有如韋孟之諷諭安國之輔導者爾當俯聽其言勤行其教使我自家之訓克刑于詔令作彰於萬邦而固爾建社之寵不其大哉乾寧四年十月冊雅王文維年月日皇帝若曰周王之嗣分茅土者十五國漢景之代書簡冊者十三王朕以寡昧之資奉神靈之統每顧諸子實惟天休期訓導之將成諒封建而可享咨爾第十一男楨方當稚齒復在深宫有知憂知懼之心見聞詩聞禮之志詔令作學詩學禮之性自然而禀最樂不渝遂詔有司往申舊典今遣某官某乙持節冊爾為雅王於戲受冊之命重屬汝躬列聖在宫百辟在位在天必聽在位必觀罔怠交修用承多祐光化元年十一月册瓊王文維某年月日皇帝若曰不廢懿親大封同姓吾嘗觀於經籍矣然而歷代賢君正名用典必擇材行使之光昭其可以子弟之私恩冒先王之成憲朕雖不德必慎有為咨爾第十二男祥於兒戲之時多幼敏之智謂之材也不曰近乎處昆弟之間有推讓之性言其行也不曰類乎是宜疏封且命申誥今遣某官某乙持節冊爾為瓊王噫作德日休爾則逸作僞日拙爾則勞擇利而行令名斯至封棣王䖍王沂王遂王制陸扆門下我國家奄宅中區光啓祖業析圭胙土唯親與賢故本根茂而枝葉榮王室尊而藩屏壯肆豫眇末叨獲纂承賴至道之𤣥慈鍾列聖之餘慶顧茲𦙍嗣實謂蕃昌爰稽典謨用建邦土第三男祤星辰育粹嶽瀆降靈早彰岐嶷之姿克禀徇齊之度第五男禊龜龍應瑞鵰鶚凌空溫恭自得於天和頴悟實由於神賦第六男禋璆琳挺秀鸑鷟呈祥爰當好弄之年雅號夙成之器第七男禕珠璣耀彩菌簵含貞風神潜茂於端莊質性已彰於惠敏而皆生知孝敬志樂文儒問安靡曠於晨昏禀訓每由於詩禮智有刻舟之妙辨多對日之竒是宜分以白茅錫其朱邸叶犬牙於漢制光麟趾於周詩厭次名邦境連於齊魯南康粵壤上接於荆吳琅琊廓詔令作敦儒素之風遂寧實阜殷之俗咸稱重地各服徽章於戲器以琢成道由學顯勉禀君親之教敬承友傅之規勿追平樂之歡無好任城之勇懋建厥德永享于休祤可封棣王禊可封䖍王禋可封沂王禕可封遂王仍令所司擇日備禮冊命主者施行乾寧元年十月皇第十一男禎封雅王第十二男祥封瓊王制張𤣥晏門下成周之建藩翰也本以宗盟大漢之分茅社也先諸子弟推强幹弱枝之義遵自家刑國之文用能夾輔公朝尊奬王室朕上承宗廟下撫黎元固安詔令作妥萬邦惠綏群品事必在於師古理寧繫於狥私爰舉舊章式為令典第十一男楨忠肅挺秀清明在躬孝敬本於生知端粹資乎神授藴題鞭之妙思慕置醴之前規第十二男祥美秀呈姿溫良育德體寬雅以情詔令作成性持願恭而立身踵為善之懿圖繼好學之休譽咸在齠齔克守義方必當益茂清徽俱為令器是用各分圭瑞並列封疆申以渥恩委之善地於戲當綺紈之嵗膺茅土之榮鳳序聮芳犬牙錫壤爾宜簡以蒞衆儉而在公善友應徐敬師申白交修魯衛之政俾成虞芮之風往惟欽哉服我丕訓􅐃可封雅王祥可封瓊王仍令所司擇日備禮冊命主者施行光化元年十一月皇帝第八男祕第九男祚第十男祺封王制詔令作封景王輝王祁王制鄭璘門下昔者明王臨御之理立德於至道茂緒於惟親朕嗣守丕圖祗若鴻訓未嘗不稽古以建于邦家勵精以奉我皇唐之宗祖况洎漢而還封冊之重抑有前典煥乎彜章當知子之敢私亦內舉之良愧第八男祕粹和包美謹厚自居踐禮樂之德文佩詩書之義府第九男祚生而向善夙賦好謙克明教導之風蔚有端莊之質第十男祺後星表詔令作增潤甲觀呈祥妙彰岐嶷之姿雅得聰明之性而又並標嘉器皆禀溫文慰沃且多寵數宜舉爰擇重地式崇其名於戲恭乃修持服諸訓順俾成詔令作盛磐石之固允膺典禮之榮勉樹令徽各欽休命祕可封景王祚可封輝王祺可封祁王乾寧四年十月文苑英華卷四百四十五
