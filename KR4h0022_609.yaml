body:
  text: 文苑英華卷六百十宋李昉等編進文章一進文章表二卷英華所編失年代先後今正之進象經賦表一首聖製故司空魏徵挽歌詞表一首為李祕書上祖集表一首上九成宫頌表一首上拜南郊頌表一首進洛圖頌表一首為朝集使絳州刺史孔禎等進大酺詩表一首為鳯閣侍郎王方慶進書法表一首為鳯閣侍郎王方慶進南齊臨軒圖表一首進神鳯頌表一首為陳御史進奉和秋景觀競渡詩表一首進東嶽朝覲頌表一首進孝烏頌表一首進喜雪詩表一首進封西嶽賦表一首進雕賦表一首為陳正卿進續尚書表一首進象經賦表周武帝庾信臣某言臣伏讀聖製象經并觀象戲私心踴躍不勝抃舞伏以性與天道本絶尋求直以懸諸日月遂獲瞻仰九州既奠近對河圖四轍中繩全觀玉策未飛玄鶴先聞金石之聲不上赤城獨見煙霞之氣置管而測光景愈高沉玉而觀淵泉益逺寢不自涯課虛為賦詞非寥亮學無雕刻遂敢陳述誠為厚顔况復日之逺近本非童子所問天之渾蓋豈是書生所談冒用奏聞伏增流汗之至聖製故司空魏徵挽歌詞表唐太宗禇亮臣亮言伏見聖製故司空鄭國公挽詞十首詞窮清曲理備哀傷漢武北管之書更慙追逺魏文南皮之歎取愧悼亡與辰緯而相暉隨鍾石而俱振魏徵早逄興運譽美當朝為聖主之賢臣預能官於多士出納通顯憑藉寵私忠誠所到心力同盡而逝水不追清徽永謝樹碑荒壠已叨相質之文哀歌泉路復降高堂之曲事重一時榮流千載臣趨侍學林竊觀睿藻不入玉山屢逢盈尺如遊珠水常都照車慶抃之深唯知舞詠不任下情為李祕書上祖集表上官儀臣某言臣聞漢朝中葉陳農求訪於圖書魏歷初基袁渙請收於篇籍遂使容臺增飾曲府載輝雅道照於前古風流被於末裔伏惟陛下睿德緯天神功光表截海班朔益地延圖垂衣視典探羣玉之幽賾虛已緣情動兼金之歌詠由是藝香祕室青簡具陳璧水上庠漆書咸集臣大父隋金州刺史元操筮仕登朝官成三代學綜書部思洽詞源雖歲序寂寥微塵無弭河東薛道衡人推才傑范陽盧思道時號文宗並叶契相忘齊聲比價競炫梁車之寶爭擒鄴騎之珍而二家文集久蒙宸照獨於臣門未汙天燭貽厥之訓在臣宜守獻書之典有國通規今繕寫已訖合若干卷謹詣闕奉進上九成宫頌表高宗王勃臣某言臣聞帝機無朕道洽則時雍靈化不言功成則頌顯伏惟陛下體元纂極模神建隧疑棟梁三氣疑庭衝六合松軒夜警杳冥姑射之心茅殿晨凝寥廓洞山之駕臣霑風太上庇影華胥仰衢室而無階候襄城而有地雖望卑平叔空勤景福之詞而文謝子雲願竭甘泉之思謹憑天造輒貢九成宫頌二十四章攀紫墀而絶望呌丹闕而纍息臣誠惶誠恐死罪死罪謹言上拜南郊頌表高宗前人臣伏見㧾章元年十二月四日詔既清東冦將覲南嶽甫資元勳旋窺大典伏惟皇帝陛下黼藻神器御策睿圖用天老之前機戮防風之後至為而不恃懸寶位於中宸卑以自居託靈符於上帝禮凝蒼璧瑞溢玄圭紫旻降祐黃祗叶矩微臣學不照吉才不曠時窺宇宙之神功覩郊禋之盛節時非茍邁懷雅頌而知歸道不虛行想謳歌而有志豈與夫周傳考室裁稱棟宇之規漢奏甘泉未息嬉遊之諷比興衰於列代較馳驟於同衢而已謹憑天則輒貢拜南郊頌十章文不足竒意有遺美臣誠惶誠恐謹言進洛圖頌表武后崔融臣某言奉某年月日勑令臣撰洛圖頌伏以陛下聖烈豐懿應期首出珍一作元符炳鑠曠代罕聞雖臯繇歌虞伯禹申歎其或生於今日尚不足以談天况臣涉學蓋淺揆才多陋安可潤色皇化對揚神休竊讀古文幽尋舊式言大道者莫先於典誥序以之生焉美盛德者莫近於詩什頌以之成焉其辭婉而微其事簡而要今臣斟酌前訓擬議鴻猷述洛圖頌一篇并序謹詣宣議一作義門奉進誠未能探索玄奧憲章經書庶幾竭肝膽效塵露增日月之末光階天地而不朽斯亦微臣之願足矣臣拜手稽首冒顔以聞死罪死罪為朝集使綘州刺史孔禎等進大酺詩表武后李嶠臣禎等言臣聞謡誦必採而風俗可觀舞詠既陳而德音不泯伏惟金輪聖神皇帝陛下金口屈道璿樞正辰慶徽號於法宫撫懷生於淨國玄猷再闡紫極重光天地合德而同休黎氓改視而易聽萬方欣戴百寮抃舞臣等備列下藩預承大慶三年入計行趨玉帛之禮五日賜酺即奏雲天之宴覩光靈之赫奕接恩貺之綢繆酬報何階空誓心而銘骨嗟嘆不足遂抽毫而授簡非效狂而貢斐實有感而求音同盍各於二三冀揄揚於萬一并題序引式光鴻造雖戴天辨日誠不窺於兩童而講德陳詩庶無慙於四言不量踈野輕敢薦聞繕寫畢功進上如别繫轅之陋輒簉響於雲門化草之微遂馳光於日谷旋顧庸鄙追增悚汗臣禎等無任為鳯閣侍郎王方慶進書法表武后前人臣某言奉墨勑令臣家所有書法並將進來但臣家書法屬隋季亂離並多墜失臣十代再從伯祖羲之書先有四十餘紙貞觀十二年太宗文武皇帝購求遺迹臣亡父先臣私直並將奉進一不敢留今之所存唯有一卷并臣十一代祖導已下書一秩十卷謹隨狀進上但臣弓冶不嗣堂構缺然雖奉納楹多逢壞璧亡失之外所餘無幾私珍緹襲方遺子孫不謂兩曜廽光九霄俯聽曲延採拾遂登旒扆使千載遺寶重增於光價九泉深隧更奉於恩渥寵被私門榮霑異代懷恩慕逺感佩兼深臣方慶誠惶誠恐頓首頓首死罪死罪謹言為鳯閣侍郎王方慶進南齊臨軒圖表臣某言臣家有齊帝臨軒圖是南齊袁倩下手所畫私門傳寶以為妙絶伏惟聖情兼尚睿鑒旁周稽古軼於虞聰幽求過於魏覽萬機多暇百代可知或厭遊娛儻存觀省臣暮年多幸得奉休明竊謂珍竒無容隱默近從京宅取到不獲早以上聞今謹詣闕隨狀奉進輕塵旒扆伏用慙惶屏營之至進神鳯頌表武后陳子昂天授元年臣子昻言臣聞昔周道昌而頌聲作遂能昭配天地光烈祖宗垂之無窮永為代典伏惟聖神皇帝陛下闡玄極升紫圖光有唐基以啓周室不改舊物天下惟新皇王已來未嘗覩也臣聞仲尼曰聖人丘不得而見之矣又曰舜禹之有天下丘不預也又曰鳯鳥不至河不出圖丘已矣夫皆傷不得見大道之行而鬱悒也臣草鄙愚陋生長休明親逢聖人又覩昌運舜禹之政河洛之圖悉皆目見幸亦多矣今者鳯鳥來赤雀至慶雲見休氣升大周受命之珍符也不稽元命探祕文採風謡揮象物紀天人之會以協頌聲則臣下之過也有國彛典其可闕乎臣不揣固集作朴陋輒獻神鳯頌四章以言大周受命之事誠未足以潤色鴻業揄掦盛美亦小臣區區丹慊文粹作悃之至謹詣洛城南奉進塵冒冕旒伏表慙惶云云為陳御史進奉和秋景觀競渡詩表武后前人臣某言臣伏見去月日御製秋景務餘聊觀競渡故陳先作式佇來篇凡六韻天文爰降品彚咸亨金簡潛開珍圖斯見臣聞白雲興詠漢遊汾水之詞黃竹申歌周舞瑶池之駕然而志崇逺轍事式集作或勞人故文思之化未光太清之道猶集作攸闕伏惟聖母神皇陛下太虹齊聖感月含神玄德茂於皇階文明照於天下用能提玉斗把集作挹璇衡百神景從三靈叶贊青雲出洛爰開受命之符赤甲縈河終御興王之寶非窮神之至德者其孰能格集作與於是哉既而黃屋務間紫極時暇洞庭張樂思接軫於軒遊媯水披圖想同參於堯輦然而逺而勞物者未若近而安人動而勤已者豈比靜而神泰於是徙金蹕鳴玉鑾清禁林御池殿肅波臣集作神而戒事命舟子為水嬉彩鷁蓮歌乍起吳江集作江吳之引青龍桂楫時謳越女集作時搖毆越之風鳥逝虯集作虬驚沸珠潭而競逐雪飛電集橫玉浦而流光信可以娛樂性靈發揮文物皇歡允洽白日俄光於是奏薰風於管絃詠嚴雲於林籞帝歌爰作天藻遐集作攸彰黼帳帷宫縟文房之繡綵祥煙集作雲瑞景霏翰苑之榮光信探賾集作道於玄苞得斯文於紫極太平允矣元首康哉方欲朝明堂之宫輯集作受羣后之瑞尊崇顯籙集作號光啓聖圖封玉嵩丘以接千年之統泥金少室攸增萬歲之規卓哉煌煌聖君之表也微臣曲學蓬户竊位蘭臺未聞驄馬之謡非有雕龍之思鞠躬霜署謬覩於天章逖聽鈞臺側聞於帝樂天文尊貴不逺於下臣帝寶殊集作珍崇曲宣於近貴竊以為君唱臣和固不隔於尊卑宫變商從方允諧於金石輒用齋心扣寂假翰求詞將以攀日月之末光繼螢爝之微照不勝云云進東嶽朝覲頌表玄宗蘇頲臣頲言臣學不淵唐諱博詞蓋實滯陛下過聽被恩最久喜規封岱增天帝王壯觀臣以宗伯秩禮陪清道之輿臣之幸一也又伏覩自天垂象銘嶽昭訓臣已有司上載封禪一作光封之烈臣之幸二也臣再三之幸萬百常情臣某中謝臣東京奉旨竊聞刻石三頌臣草一敷聖主之玄猷次紀宰臣之鴻筆斯事至大咎繇吉甫之難也臣自料度不勝惶悚而議者謂臣光榮之至死且不朽臣以羸疾翳然言罕能述忠闕愚臣極思慮罄肝膽而為之伏希演修德之符非敢助親文之化儻以潤色鴻業一蒙睿覽則臣之至懇萬殞知歸輕塵冕旒若置冰谷無任區區戰灼之至進孝烏頌表楊談草莾臣談言臣聞自昔皇王撫運提象天錫禎應以光盛業臣伏見以為至道有孚能招異類深仁所協克順天心陛下孝理天下孩視羣動恩被羽族感通陽精雖器車馬圖洋溢祕府而黃龍丹雀委積近郊此或為常不甚專美豈如孝烏俯爾營巢不懼不驚以育羣子臣幸逢昌運好覽休祥萬古殄圖安能有此百代良史未之前聞况宿一作肅穆紫宸曉夕嚴警會辨星列瓜士雲屯燕雀飛梁無相賀之所魚龍在棟成駭目之觀唯此孝烏晏然能馴明陛下深愛子物之慈表皇太子歸哺報恩之孝首出象疑作衆瑞莫與之齊謹按符瑞圖云宗廟肅敬則孝烏至昔范覽對蜀主言慈烏知孝誠飬之禽必有缺方懷而至者陛下聖策逺備威震遐戎略地攻城無歲不克巴蜀之外今斯獲醜慈烏效祉可謂有徵加以逺降日輪近巢天宇據北辰以永固豈南飛以逺枝自古攸傳無聞此瑞願陳不朽垂裕將來謹獻孝烏旌德頌七首雖論揚之美有愧於清風葵藿之心無忘於捧日謹投延恩匭奉表以聞冒觸宸嚴伏增戰越臣談誠恐頓首死罪謹告進喜雪詩表李雍臣雍言一昨瑞雪愆期農人阻望陛下以億兆勤慮倉廪貽憂禋祀玄冥祈禱黑帝固能至誠應物聖德動天朔雪下於龍山海神朝於鳯闕是以途歌邑舞野慶朝歡荷一人之渥恩為四海之膏澤臣仰思揚化伏念輔時雖力減鴻毛而情殷鶴立無任喜躍慶賀之至謹昧死詣金闕門陳表貢詩一章臣雍誠惶誠恐進封西嶽賦表玄宗杜甫臣甫言臣本杜陵諸生年過四十經術淺陋進無補於明時退常困於衣食蓋長安一匹夫耳頃嵗國家有事于集作於郊廟幸得奏賦待制於集賢委學官試文章再降恩澤仍猥以臣名實相副送𨽻有司參列選序然臣之本分甘棄置永疑始望不及此豈意頭白之後竟以短篇隻字遂曾聞徹辰極一動人主是臣無負於文少集作少小多病貧窮好學者也集作已在臣光榮雖死萬足至於仕進非所集作敢望也日夜憂迫復未知何以上答聖慈明臣子之效况臣常有肺氣之疾恐忽復先草露塗糞土而所懷冥漠實孤負皇恩敢攄竭憤悶領略丕則作封西嶽賦一首以勸所覬明主覽而留意焉先是御製西嶽碑文之卒章曰待豫安人富國然後徐思其事此蓋陛下之至謙也今兹人安是也集作已今兹國富是也集作已况符瑞翕習福應交至何翠華之脈脈乎維嶽固陛下本命以永一作承嗣業維嶽授陛下元弼克生司空斯又不可以寢也集作已伏惟天子霈然留意焉春將披圖視典冬乃展采錯事日尚浩闊人匪勞止庶可試哉微臣不任區區懇禱之極謹詣延恩匭奉表進賦以聞臣甫誠惶誠恐頓首頓首謹言進雕賦表已見一百二十六卷玄宗前人為陳正卿進續尚書表玄宗蕭頴士臣某言臣林莾介賤幼而強學竊聞諸大易之説曰觀乎天文以察時變觀乎人文以化成天下夫察乎變者立德以貞其象成乎化者立言以贊其效故太極列三階五緯於上聖人著三墳五典於下至哉文乎天人合應名數指歸之大統也今之言文字者始於太昊徵訓典者本於唐堯振頽綱者孰若漢朝興盛業一作言者莫如聖代是則太昊朕之軒轅章之唐堯祖之虞舜述之漢高作之光武維之祖宗開之陛下因一作固之臣愚以為太昊至于一作於我高祖太宗軒轅之于一作於我開元聖文神武皇帝陛下稱廣運者四代繼成功者四君咸宜布昭睿典光熙德政矣然則伏羲創文籍黃帝立史官太古淳奧權輿朴略至陶唐氏而後大備故孔子美之曰堯之為君也煥乎其有文章由是敘帝王之書首唐虞之典於堯則曰欽明文思於舜則曰誕敷文德文之時義大矣哉夏商已後德弗及舜仲尼雖一作雜目其書而不為典言未能察變成化比唐虞之際也何則夏之興也泣辜殊於政一作至理殷之興也慙德乖於雅樂周之興也謂武微於盡善其不為帝典宜矣陵夷僣亂以暨暴秦剗亂墳籍瞽聾兆廉王者之風殄矣先王一作生人之道窮矣天之未喪斯文也故帝道復興於漢家數百年中一作間而憲章具舉夫其推步律厯帝堯分命之典也增修封禪帝舜時巡之義也約三章之法以正咎繇之刑班四時之舞以續一作纘后夔之樂臣竊覩一作觀三代之作貽範垂訓體國綏人雖載祀綿一作延長德澤深逺皆因循轍迹故弗易其事孔子曰殷因於夏禮周因於殷禮所損益可知也未有踵七雄交爭一作戰之末繼六籍焚如之後帝典缺而更張淳風醨而載洽若夫漢氏之難者也八字一作若大漢者也且義帝之喪三軍縞服異夫湯武之放弒其君矣諸吕之郤一作亂浹辰底定異夫羿浞之驟移其祚矣中興之盛華戎率服異夫吳楚之僣竊其名矣夫如是有漢之美固可以肩虞后千載一時之運歟曹馬以還曾何足擬四分五裂朝成暮敗其間雖晉平吳蜀隋舉梁陳混并未幾危亡荐及法令不足以禁齊人聲名不足以垂後裔其於帝道踈矣又况乎南遷淮海北起胡一作獯戎者邪兹又二朝之不若也臣聞乾道運行否終則泰上帝有以輔文明之哲后表光宅之休期必將乘喪亂之極繼驅除之運故有周之末禮樂崩壞連橫合從俱非正朔則秦氏略定而漢代以興在晉之亡宇縣崩拆南吳北虜各擅名號則隋氏削平而聖朝以作此天意也不然何秦隋二葉而亡也若彼唐漢一家之盛也如此於赫盛唐正百王之闕思文陛下光五聖之嗣啓運應期之符吊人伐罪之義制禮作樂之本郊天禪地之位萬庾三登之穰河海晏清一作河清海晏之瑞舞七旬而殊俗格歌六律而薰風至故以一作已騰子姒而絶景挹媯邪而高議矣又何東晉後魏梁陳周齊之足道哉誠宜詔史官一作臣敷帝載炳唐虞之故實黜遷固一作商周之遺制矣漢氏已略之於前皇唐復曠之於後臣實惜焉知而不述則臣子之罪也臣誠一作實愚淺陋一無陋字竊不自揆敢緣聖朝稽古之道陛下文思之德耕牧餘一作解暇輒復著書討尋載籍于兹一紀謹上今文四字一作今謹上續尚書一部凡若干篇卷始有漢二典次我唐二典以續夫前書堯舜之典也其餘文景明章之後魏晉宋齊已還南訖有陳北起元魏歷周隋洎夫高氏以至聖朝總一十三一作二代詔策章疏頌歌符檄忠臣之正議武士之權謀類而刋之次以年代以續夫夏商周秦魯之篇也臣聞古者右史記事左史記言舉其大略前書之義備矣孔聖沒而微言絶暴秦興而挾書罪雖戰國遺策舊章駮亂於從橫漢臣者紀新體互紛一作約於表志其道末者其文雜其才淺者其意煩豈聖人存易簡之旨盡芟夷之義也昔文宣修帝者之書究三王之季臣性非天縱學異人師稟生何幸親逢帝一作聖代此皆文武聖皇之遺旨臣愚曷足以知之何者臣嘗伏讀貞觀實録昔太宗因聽政之暇觀覽尚書謂侍臣曰朕每庶幾一作希唐虞亦欲公等齊肩稷契又曰令數百年外讀我國史豈獨窺兩漢哉臣故知有漢之功業與我唐之化理俱可以繼夫唐虞之盛也伏惟陛下玄德昭升至仁廣被乃二十一年正月制曰各勵精一志一作心共興玄化俾蒼生登於仁壽天下還於淳朴愚臣緬述太宗之旨伏思一作惟陛下之詔固非一作宜取類於三代之間也勒成帝典不亦宜乎陛下睿思雄飛宸章間發質文一變風雅大興臣聞水之細者江海假其深材之短者棟梁資其峻陛下必謂臣所著小有可觀賜以召見闕庭一垂試問臣採托之外亦以學文縱不能光揚盛美猶庶乎細水短材之益則聖旨之含容大矣臣之誠願畢矣文苑英華卷六百十
