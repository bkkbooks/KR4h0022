body:
  text: 文苑英華巻一百三十三宋李昉等編鳥獸三古駿賦一首呉坂馬賦一首驥服鹽車賦一首却走馬賦一首相馬賦一首萬年縣試金馬式賦一首銅馬賦一首寗戚飯牛賦一首目無全牛賦一首古駿賦牛上士寒關月壯羽書南向虜馬秋肥朔兵犯障爟烽夜驚候馬相望雲横朔塞之前雪滿天山之上於是天子按劍将軍事邊雷驅甲卒直指幽燕風别本作蓬而出海波漫漫而騰天當鴈門而北上薄龍沙而左旋既而漢虜齊兵三軍合陣虹旗篲掃鼔聲雷振奕奕熊羆森森鋒刃或左提而右拂乍一留而一進則有俠少驫眓上必由下許聿切二字見呉都賦雄駒㨗疾耳若挿筩顱疑削出跼金鑣以弄影控鐵銜而齧膝始驂驔以舞風忽濩略而追日蒙具装擇組練雜然一徃鼔仆旗旋足不得摇目不得眄超騰絶壑走及奔箭疑隔漢之流星似披雲而出電左贒為之膽懾骨都為之頷戰飛奔肅肅恣意馳逐宛若逰龍行如驚鹿左右披靡東西徃復溝蹙漢以朱殷毛拂霜而蝟縮蕭條萬里顧盼翹陸横塞上以長嘶餘聲振于山谷况乃項籍英雄驅馳冠戎旗翻落日劍倚長虹惜良騅之不逝歌美人於帳中摧拔山之氣泄指烏江而路窮遂使畢㑹戰塲挑身鋒鏑人控馬以騰踊馬隨人而奮擊轉足生風籋塵無迹跳山超澗冐刃衝敵突圍則漢將奔波怒目則追軍辟易遭楚王之不利當壯年之虛擲也别有渥水龍媒朱旄逸才䨇瞳目疑作日耀五色花開逢漢王之棄置跼呉坂前後竝用呉坂戰國䇿作虞坂以徘徊思效技於金埒願追仙於玉臺懐玉臺兮傷逺道朝朝暮暮銜枯草千金買骨君儻知百萬交錢猶未老垂两耳兮伏鹽車倚䨇輈兮慙蹇驢絆權竒而不用空倜儻其焉如呉坂馬賦以下覩泥驥廻知貴駒為韻謝觀呉坂之馬兮駿且竒伊孫陽兮不知伏櫪而誰憐拘絆疑倚輈而但見清羸兩耳長垂不斷於嘶風噴月四蹄可式一作試何愁於玉勒金覊當其初出渥洼孰分駑驥雖白日之可逐曷青雲之自致頓銜驤首逢人兮不鳴强鳴弄影超羣知已兮未至須至嗟乎全無芻粟半卧沙泥况精靈之粗有亦毛骨以非低金埒行時儻㧞風塵之跡玉鞭垂處願親桃李之蹊於是将躍未騰欲眞尚假徘徊龍廐之側踡跼鹽車之下良時易失常憐過隙之光朗鑒難逢多是迷途之者善相爰來精神陡一作斗廻奮迅而蝟毛俱聳嘶鳴而星眼俄開舊皁云辭歩歩而風雲借便長衢一去行行而珂珮相催曩夕猶賤凌晨已貴羣心愓愓以暗伏衆口喧喧而相謂乍同曲突收将宫徴之音又似豐城指出斗牛之氣蓋非斯人無以辨龍駒非斯馬無以動寰區固二者之㝠契播一時之令圖馬兮雖遇新知還因舊主儻一頋之未替必載馳而可覩更有瑶池方外之程願著鞭於造父驥伏鹽車賦闕名有驥子兮維之朽索服鹽車兮困于絶漠将發憤於一哀遂求知於伯樂由是騰健歩奮竒毛連嘶自若驤首彌高負調鼎之資空慙引重持向人之意終願代勞當其迢遰燕郊蒼茫呉坂悲東道之莫及念北風之將晩既同跼蹐載馳之用靡分倘遇知音千里之期何逺寧曳輪之是辱恐負軏之非名飲齕雖憐其垂耳鞭驅奚敢以抗衡是使𤣥黄莫遇一作喻欵段無營汗血匪難一日有祈於用力求人未易三年何恨於不鳴今也勞役薦臻髙名斯矚将激昻以待頋願奔馳而徇欲重伸羸氣自殊覂駕之難載發哀聲幸比擊轅之曲或有賤同牛皁用匪龍媒亦在異於剪拂辨以駑駘夫如是則當於輗軏之下自然不媿於羣材却走馬賦以天下有道無所用之為韻闕名貞元初既平㐫醜海縣安阜歸戍人於田里却戰馬於隴畆所以示力爭之無益昭靜勝之足有乃命司武關一作闢御皁出羣騶於紫陌閱衆驥於黄道吉行之乗存六駁而有餘無戰之時惜萬蹄而空老於是脫覊鞅任超逾騰驤於古塞之外飲齕於洪池之隅恣蕭蕭之永逸免逐逐之長驅天廐初辭誠貴人而賤畜農車倘駕亦以有而之無留之則踠一作跳其駿足而不與人共捨之則遂其生適而省其國用頋東道之常來凌北風而逺縱曩者揚鏕噴沬環一作被甲鳴鞭角紫燕以行地隨飛龍而御天追風於陣表絶電於君前功徳難忘信彌多而不厭驕奢作戒故雖愛一作受而必捐任物自然仁之上者脩文偃武徳之要也屏危事之形影張禮容於宗社尚兹恬淡見道發宸衷釋彼權竒知化成天下材雖駔駿用亦有時艱難則雲從而騁力開泰則野逸而呈姿昔常代於人勞良多效矣今則遂其天性非曰棄之感君恩之有序彌天壤而得所望驂騑而躑躅依水草以容與彼周武之歸漢文之却曷足方我皇之明舉相馬賦武少儀徐先生相馬不相色不相力相其徳奥乎不可測何以徴之鬛青絲兮風生眼黄金兮電光蹄盤攤而散花毛翕赩而成章衆人觀之已駢於路旁不啻於堵墻一曰為龍一曰為鹿中間何敢乎比方先生則異於是忘筌於毛質之外引鏡於肺腑之裏見其心兮如思勿思見其目兮如視非視虛舟為動喬木為止合大道而自然䘮一齊至人而何處有以若此者足不以遵地影不以逐形騰六合歕四溟截飛鳥遺流星日車為之不轉風馭為之中停二師以之罷貢伯樂為之焚經卓然擅天下名宜乎不爾直中繩曲中鈎徘徊閶闔之逰圓中規方中矩蜿蟺交衢之舞亦以其次噫徐公不至駑駘共皁於騏驥徐公一來騏驥出羣於駑駘由此觀之世上贒才用則虎否則䑕何以異哉小人也内頌無國馬之贒遇君有徐公之術早已蒙於一頋至今長鳴猶未騁於千里更思剪拂超然自得怳然自失倘受恩兮果如前則平生之願畢矣萬年縣試金馬式賦以漢朝鑄金為名馬式為韻吕鏄馬以行地致用式乃範金取規表騏驥以立則擬形容而可知合諸法象遵彼權竒卓爾趫姿想從革而乍見駭兹殊相疑軼塵而載馳毫髪盡此纎穠不差誠駿骨之倜儻亦巧心之云為本其稱自前朝制於往漢金也者持堅剛之可乆式也者驗逸異而有案形乃辨於千里功詎勞於萬鍜匪刻鶴之同科豈偶人而齊貫載錬載精我馬是程虎脊乍覩龍文可名星氣想合金光發明踠足不前如俟孫陽之顧望雲邈視寧殊洼水之生向日而疑将奮影臨風而状若長鳴曲盡其趣不愆于素冩逸態以全能制蘭筋而巧附瞳䨇鏡而可鑒顴一作權兩月以合度謂天驥之呈材乃良金之所鑄取則不逺其象孔昭常矯矯以示象特昻昻而建標騕褭在目飛一作訾黄立朝哂求市之三年終觀駿死無相肥於一槩何慮駒跳所以稽乎驥徳垂此作式指半漢以成規豈駑駘之可惑置於宫壼有待獻書之贒鑄以越銅載假伏波之力事與名逺理将意深寧俟造父之能馴驊騮乃覿何必九方之善相驪牝獨尋等循形以觀影咸得駿於斯金故曰考兹術也選無違者可以斷臧否明取捨形分似是類别真假欲獻狀於國門赭白馬賦獻狀絳闕期一中於名馬第二同前韻王起先賢鑄金之英為馬之形馬無疆而致用金不朽而垂名瞻之在前則至寳山立寂然不動則異體峰平固将六龍可驗八駿斯營遐廹絶足逺契長鳴豈徒玩熒煌之彩眄熠爚之情哉始其模既全體将具思求絶塵之貎是假在鎔之鑄踴躍其液渥洼之形未出撲滅其煙浮雲之姿已露方中矩兮圓中規勢倜儻兮精權竒誠可傳而可繼每不驅而不馳其一作嘗巧既畢安貞莫移豈貪夫而是徇諒工者之所為若乃大閲羣騶旁搜萬國獻絳闕而咸萃充華廐而尚惑乃審厥象俾臻其極仰從革之輝光知代勞之軌則駑駘沓至自乖百鍊之形駔駿俱一作貟來允叶萬邦之式其狀惟肖其儀孔昭仰沛艾以龍翥若驂驔而鹿超摧詩摧之秼之秣勿施異乗黄之伏皁縶維罔及殊赭白之來朝翼翼雄姿煌煌壯觀恒引耀以錯落每勝疑作騰精而半漢牛以石兮多慙池以銅兮非翫是知武皇之制博伏波之㫖深用之則行昔飛聲於東道確乎不㧞終成象扵南金髙門洞闢秘殿旁臨将萬古以駭目俾四方而宅心豈作賂大宛其形見棄為神蜀郡厥祀方歆者哉固宜無迯扵衆寡不昧於取捨永作鏡扵域中比懸衡扵天下則稱驥徳頌駉牧者未若似是而非常以馬而喻馬銅馬賦以鑄金象形用求良駿為韻紇干俞昔伏波資越銅之具皇漢得天馬之度蓋以張戎容程國歩允稱其徳懐致逺之無疆既授扵師必命工而所鑄象物惟肖利人則深研精以範酌憲于心始察形而視骨遂修火以鎔金煥若中起昻然四臨望丹闕以就日俯𤣥墀而擇隂俾夫司僕載馳别扵羣而是仰倌人匪懈御于王而審象疑顧影以權竒乍含輝而爛朗由兹而明式遐布觀我而逸材利往即山為類且尚其功存齕草無施敢勞扵惠養徒想其屹以沛艾爛兮晶熒狀赤文而呈瑞方候日於堯庭超乎獨立的爾殊形訝騏驥之變態聿登歌於彼駉叶以隂徳禀于地靈列君軒之粹異咸此駿之儀形是知法以疑衍與人共思衆材而膺國用王惟智周寫𢎞範而俾營求矧乎揉其物於精剛制其器扵質良克絶奔踶邈無𤣥黄雖齊力齊毫用每虧扵典禮建如龍如鹿形既造而昭彰美成式之不替信改鑄一作煎之有常奚絶塵之足比庶出水而同方者哉銅為寳兮固越俗之所擯馬之神也仰漢庭而未進猗善相以來歸豈康衢之増駿乎寗戚飯牛賦以取賢在牛首之下為韻王履眞惟彼甯戚兮既貧且窶跡未出扵樵夫身尚同於牧豎劬勞日夕頓冐風雨苟直道而退讓不非義而進取執以綆索積諸歲年取疑作飯以露草飲之靈泉取東臯之田同無得而乃得居南山之石常思賢以薦賢髙節彌堅潔操無改扣角之音雖倦立身之志恒在遊乎緑野息以青疇雲霞掩曖山川阻修異董生之乗馬同巢父之飲牛棲屑岐路蹉跎壟畆衣褐不足蔽其骭糠粃不足充其口心常想扵青雲貎恐遲於皓首強於學也以待問藏其器焉以待時獨商歌而奚謂思齊君而聽之君乃問旃知其在野君臣從此而道合理化以之而相假才足堪於輔佐位寧卑於庸下目無全牛賦以虚心通明暗與理㑹為韻王履真著絶藝者積功而成窮物理者因心而明觀彼庖丁之㳺刄合夫天道之至情運心術於妙用得𤣥技於惟精相彼牛兮雖完體斯在扵我目也而折爼已呈豈不以因功之深為志所使揮無厚以合度投有間之中軌積就之妙既由乎月将操割之微亦依乎天理若動不導窽見荘子任非由己則必受夫力劬孰能免夫目視始吾扵牛也膚革未充筋骨靡窮心無所措其利手無所施其功惑臂羺疑作臑之原本迷脉腠之要終動既多悔勤而未通逮三載以積用乃一朝而發䝉今吾扵牛也察其博碩考其小大不俟一作候刀觧自将神㑹定貴賤之骨若委地而在前視血膋之骨雖表革而無外信功著而理貫乃道成而情泰遂得不遵蓮鍔不合桑林騂騂之軀折如應手􅋾􅋾之角割若惬心此乃變化斯探視聽靡濫美候明而咸見雖處幽而無暗夫人之脩業頗亦象諸能𤣥通而理逹則疑釋而悟虚一作法别有技業目牛得同碩䑕取勢行止喻依庠序竊學見賢思齊敢望惟仁是與儻王庖之可待願發硎而延竚文苑英華巻一百三十三
