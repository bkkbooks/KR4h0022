body:
  text: 文苑英華卷四百九十三宋李昉等編直言賢良方正直言極諫策一道賢良方正直言極諫䇿太和二年春三月問朕聞古先哲王之理也𤣥黙無為端拱司契舊唐書作思道陶甿心以居簡凝日用於不宰立本以厚下諸本作厚下以立本推誠而建中繇是天人通隂陽和俗躋仁夀物無疵癘噫盛徳之所臻夐乎其莫可及已三代令王質文迭救而巧偽滋熾風流寖微自漢魏已降足徵益寡朕顧昧理道祗荷丕構奉若謨訓不敢荒寧諸本作怠荒任賢惕厲宵衣旰食詎追三五之遐軌庶紹祖宗之鴻緒而心有所未逹行有所未孚由中及外闕政斯廣是以人不率化氣或堙厄災旱竟嵗播植愆時國廪罕蓄乏九年之儲吏道多端微三載之績京師諸夏之本也將以觀理而豪猾舊唐書有時字踰檢太學明教化之源也期於宣化而生徒多惰業列郡在乎頒條而干禁或未絶百工在乎按度而淫巧或未衰俗墮風靡積訛成蠧其擇官濟理也聽人以言則枝葉難辨御下以法則耻格不形其阜財發號也生之寡而食之衆煩於令而鮮於理思欲䆒此繆盭致之治平兹心浩然若渉泉水故前詔有司博延羣彦佇啓宿懵冀臻時雍子大夫皆識逹古今志在康濟造庭待問副朕虚懷必當箴主之闕辨政之疵明綱條之所紊稽庶富之所急何施斯革於前弊何澤斯恵於下土何施而往古可近何道而和氣可充推之本源著於條對至若夷吾輕重之權孰輔於理嚴尤底定之䇿孰叶於時元凱之考課何先叔子之克平何務推此龜鑑擇乎中庸期在洽聞朕將親覽對劉蕡對褐衣小臣蕡沐浴齋戒伏於彤庭之下謹頓首上言皇帝陛下臣誠不佞有匡國致君之術無位而不得行有犯顔敢諌之心無路而不得達但懷憤抑欝思有時而一發耳常欲與庶人議於道商旅論於市得通上聽一悟主心雖被妖言之罪無所悔焉况逄陛下以至德嗣興以大明埀照詢求過闕咨訪謨猷下制中外舉能直言極諌者臣既辱斯舉専承大問敢不悉意以言至於上之所忌時之所禁權幸之所諱惡有司之所與奪臣愚不識文粹有大體二字伏惟陛下少加優容不使聖朝有讜直而受戮者乃天下之幸也非臣之所望也謹昧死以對伏以聖䇿有思古先之理念𤣥黙之化將欲通天人以濟俗和陰陽以煦物見陛下慕道之誠也臣以為哲王之理其則不遠惟陛下致之之道何如耳伏以聖䇿有祇荷丕構而不敢荒寧奉若謨訓而罔有怠忽見陛下憂勞之至舊唐書作志也若夫任賢愓厲宵衣旰食宜黜左右之纎佞進股肱之大臣若夫追蹤三五紹復祖宗宜鍳前古之興亡明當時之成敗心有所未逹以下情蔽而不得上通行有所未孚以上澤壅而不得下浹欲俗之化也在脩已以先之欲氣之和也在遂性以導之救災旱在致乎精誠廣播植在視乎食力國廩罕蓄本乎冗食尚繁吏道多端本乎選用失當豪猾踰檢由中外之法殊生徒惰業由學校之官廢列郡干禁由授任非人百工淫巧由制度不立伏以聖䇿有擇官濟理之心阜財發號之嘆見陛下教化之本也且進人以行則枝葉安有難辨乎防下以禮則恥格安有不形乎念生寡而食衆則可罷斥惰游念令煩而理鮮要在察其行否博延羣彦願陛下必納其言造庭待問則小臣其諸本作安敢愛死伏以聖䇿有求賢箴闕之言審政辨疵之令舊書作念見陛下咨訪之心勤也遂小臣屏奸豪之志則弊革於前守陛下念康濟之言唐書作心文粹作方則恵敷于文粹作孚於下邪正之道分而往古可近禮樂之方著而和氣克充至若夷吾之法非皇王之權嚴尤所陳無㝡上之䇿元凱之所先不若唐堯之考績叔子之所務不若虞舜之舞干且俱非大德之中庸未可為上聖之龜鑑又何足為陛下道之哉或有以繫安危之機兆存亡之變者臣請披瀝肝膽為陛下别白而重言之臣前所言諸本作謂哲王之理其則不逺者在陛下慎思之力行之始終不懈而已臣謹按春秋元者氣之始也春者嵗之始也春秋以元加於嵗以春加於王明王者當奉若天道以謹其始也乂舉時以終嵗舉月以終時春秋雖無事必書首月以存時明王者當奉若天道以謹其終也王者動作始終必法於天者以其運行不息也陛下既能謹其始又能謹其終懋而脩之勤而行之則可以執契而居簡無為而不宰矣廣立本之大業崇建中之盛徳矣又安有三代循環之弊而為巧偽滋熾之漸乎臣故曰惟陛下致之之道何如耳臣前所謂若夫任賢愓厲宵衣旰食宜黜左右之纎佞進股肱之大臣者實以陛下憂勞之至也臣聞不宜憂而憂者國必衰宜憂而不憂者國必危今陛下不以國家存亡之計社稷安危之䇿而降於清問臣未知陛下以為布衣之臣不足以新唐書作與定大計也耶或萬幾之勤而聖慮有所未至耶不然何宜憂者而不先憂乎臣以為陛下之所慮者宜先憂七字諸本作所宜先憂者宫闈将變社稷将危天下将傾海内将亂此四者乃國家已然之兆故臣謂聖慮宜先及之夫帝業既艱難而成之胡可容易而守之昔太祖肇其基髙祖勤其績太宗定其業𤣥宗繼其明至于陛下二百有餘載矣其間明聖相因擾唐書作憂亂繼作未有不委用賢士親近正人而能紹興徽烈者也或一日不念則顛覆大器宗廟之耻萬古為恨臣謹按春秋人君之道在體元以居正昔董仲舒為漢武帝言之略矣其所未盡者臣得為陛下備而陳之夫繼故必書即位所以正其始也終必書所終之地所以正其終也故君者所發必正言所履必正道所居必正位所近必正人臣又按春秋閽寺殺吴子餘祭書其名三字舊唐書作不書其君春秋譏其疎逺賢士眤近刑人有不君之道矣伏唯陛下思祖宗開國之勤念春秋繼故之戒将明法度之端則發正言而履正道將杜簒弑之漸則居正位而近正人逺刀鋸之殘親骨鯁之直輔文粹作相臣得以専其任庶寮唐書作職得以守其官奈何以䙝近五六人揔天下之大政外専陛下之命内竊陛下之權威懾朝廷勢傾海内羣臣莫敢指其狀天子不得制其心禍稔蕭墻奸生帷幄臣恐曹節侯覽復生於今日矣此宫闈之所以將變也臣謹按春秋魯定公元年春王不書正月者春秋以為先君不得正其終則後君不得正其始故曰定無正也今忠賢無腹心之寄閽寺専廢立之權陷先帝不得正其終致陛下不得正其始况皇儲未建郊祀未脩将相之職不歸名分之宜不定此社稷之所以將危也臣謹按春秋王札子舊唐書作禮字殺召伯毛伯春秋之義兩下相殺不書而此書者重其専王命也夫天之所授者在君君之所操者在命操其命而失之者是不君也侵其命而専之者是不臣也君不君臣不臣此天下所以将傾也臣謹按春秋晉趙鞅以晉陽之兵叛入于晉書其歸者以其能逐君側之惡人以安其君故春秋善之今威柄陵夷藩臣跋扈或有不達人臣之節首亂者以安君為名不䆒春秋之微稱兵者以逐惡為義則政刑不由乎天子征伐必自於諸侯此海内所以將亂也故樊噲排闥而雪涕袁盎當車以抗詞京房發憤以殞身竇武不顧而畢命此陛下皆明知之耳舊唐書作矣臣謹按春秋晉狐射姑殺陽䖏父書襄公殺之者以其君漏言也襄公不能固陰重之機䖏父所以及戕賊之禍故春秋非之夫上漏其情則下不敢盡意上洩其事則下不敢盡言故傳有造膝詭詞之文易有失身害成之戒今公卿大臣非不欲為陛下言之慮陛下必不能用之新唐書作不能用也文粹作忽而不用之陛下既忽之而不用必洩其言臣下既言之而不行必嬰其禍適足以鉗直臣之口而重姦臣之威是以欲盡其言則有諸本作起失身之懼欲盡其意則有害成之憂故低舊唐書作徘徊欝塞以俟陛下感悟然後盡其啓沃耳陛下何不以聽朝之餘明御便殿召當時賢相與舊徳老臣訪持變安危之謀求定傾救亂之術塞陰邪之路屛䙝狎之臣制侵陵迫脇之心復門户掃除之役戒其所宜戒憂其所宜憂既不得理於前當理於後不得正其始當正其終則可以䖍奉典謨克承丕構終任賢之効無旰食之憂矣臣前所謂若夫追蹤三五紹復祖宗宜鍳前古之興亡明當時之成敗者臣聞堯舜之為君而天下大理者以其能任九官四岳十二牧不失其舉不二其業不侵其職居官惟其能左右惟其賢元凱在下雖微而必舉四㐫在朝雖强而必誅考其安危明其取舎至秦之二代漢之元成咸願措國如唐虞致身如堯舜而終敗亡者以其不見安危之機不明取舍之道不任大臣不辨奸人不親忠良不逺讒佞伏願陛下察唐虞之所以興而景行於前鍳秦漢之所以亡而戒懼於後陛下無謂廟堂無賢相庶官無賢士今綱紀未絶典型猶在人誰不欲致身為王臣致時為昇平陛下何忽而不用之邪又有居官非其能左右非其賢其惡如四㐫其詐如趙髙其姦如恭顯者陛下又何憚而不去之邪神器固有歸天命固有分祖宗固有靈忠臣固有心陛下其念之哉昔秦之亡也失於强暴漢之亡也失於微弱强暴則賊臣畏死而害上㣲弱則姦臣擅權而震主臣伏見敬宗皇帝不虞亡秦之禍不翦其萌伏惟陛下深軫亡漢之憂以杜其漸則祖宗之鴻緒可紹三五之遐軌可追矣臣前所謂陛下心有所未逹以下情塞而不得上通行有所未孚以上澤壅而不得下浹者且百姓有塗炭之苦陛下無由而知則陛下有子恵之心百姓無由而信臣謹按春秋書梁亡不書取者梁自亡也以其思慮昬而耳目塞上出惡政人為寇盜皆不知其所以然以自取其滅亡也臣聞國君之所以尊者重其社稷也社稷之所以重者存其百姓也茍百姓之不存則雖社稷不得固其重茍社稷之不重則雖國君不得保其尊故理天下者不可不知百姓之情也夫百姓者陛下之赤子陛下宜命慈仁者親之育之如保傅焉如乳哺焉二句文類作如母之乳哺焉如師之教導焉故人之於上也敬之如神明愛之如父母今或不然陛下親近貴倖分曹建署補除卒吏召致賓客因其貨賄假其氣勢大者統藩方小者為牧守居上無清恵之政而有饕餮之害居下無忠誠之莭而有奸欺之罪故人之於上也畏之如豺狼惡之如讎敵今四海困窮處處流散饑者不得食寒者不得衣鰥寡孤獨者不得存老幼疾病者不得養加以國權兵柄専在左右貪臣聚斂以固寵奸吏夤緣而弄法寃痛之聲上逹于九天下入于九泉鬼神為之怨怒陰陽為之愆錯君門九重唐書作萬里而不得告訴士人無所歸化百姓無所歸命官亂人貧盜賊並起土崩之勢憂在旦夕即不幸因之以師旅舊唐書作疾癘繼之以㐫荒臣以謂陳勝吳廣不獨生於秦赤眉黄巾不獨生於漢臣所以為陛下發憤扼腕腐心泣血耳如此則百姓有塗炭之苦陛下何由而知之乎陛下有子恵之心百姓安得而信之乎致使陛下行有所未孚心有所未逹者固其然也臣聞昔漢元帝即位之初更制七十餘事其心甚誠其稱甚美然紀綱日紊國祚日衰奸兇日强黎元日困者以其不能擇賢明而任之失其操柄也自陛下御宇憂勤兆庶屢降徳音四海之内莫不抗首而長息自喜復生於死亡之中也伏願陛下慎終如始以塞萬方之望誠宜揭國權以歸其相持兵柄以歸其將去貪臣聚斂之政除奸吏夤縁之害惟忠賢是近惟正直是用内寵便辟無所聽焉選清慎之官擇仁恵之長毓之以利煦之以和教之以孝慈導之以徳義去耳目之塞通上下之情俾萬國歡康兆人蘇息則心無所不逹而信諸本作行無所不孚矣臣所言欲人之化也在脩已以先之者臣聞徳以脩已教以導人脩已也舊唐書作脩之也唐文類作脩之徳則人不勸而自至導人也唐書作道之也文類作導之教則人敦行而率從是以君子欲政之必行也故以身先之欲人之從化也故以道御之今陛下先之以身而政未必行御之以道而人未從化豈不以立教之㫖未盡其方耶夫立教之方在乎君以明制之臣以忠行之君以知人為明臣以匡時為忠知人則任賢而去邪匡時則固本而守法賢不任則重賞不足以勸善邪不去則嚴刑不足以禁非本不固則人流法不守則政散而欲教之使必至化之使必行不可得也陛下能斥奸邪不私其左右舉賢正不遺其疎逺則化洽於朝廷矣愛文粹作勸人以敦本分職而奉法脩其身以及其人始於中而成於外則化行於天下矣臣前所言欲氣之正也在安其情以和之者諸本作在遂性以導之者當納人於仁夀也夫欲人之仁夀也在乎立制度脩教化夫制度立則財用省財用省則賦斂輕賦斂輕則人富矣教化脩則爭競息爭競息則刑罰清刑罰清則人安矣既富則仁義興焉既安則夀考生唐書作至焉仁夀之心感於下和平之氣應於上故災害不作休祥荐臻四方底寧萬物咸遂矣臣前所言救旱災在致乎精誠者臣謹按春秋魯僖公一年之中三書不雨者以其人君有恤人之志也魯文公二年之中一書不雨者以其人君無憫人之心也故僖致精誠而不害物文無憫恤而變唐書作旱成災陛下誠能有恤人之心則無成災之變矣臣前所言廣播植在視乎食力者臣謹按春秋君人者必時視人之所勤人勤於力則功築罕人勤於財則貢賦少人勤於食則百事廢今財食與人力皆勤矣願陛下廢百事之用舊唐書作勞以廣三時之務則播植不愆矣臣前所言國廪罕蓄本乎冗食尚繁者臣謹按春秋臧孫辰告糴於齊春秋譏其國無九年之蓄一年不登而百姓饑臣願斥游惰之徒舊唐書作人以督其耕植省不急之務文粹作費以贍其黎元則廩蓄不乏矣臣前所言吏道多端本乎選用失當者由國家取人不盡其材任人不明其要故也今陛下之用人也求其聲而不求其實故人之趨進也務其末而不務其本臣願覈考課之實定遷序之制則多端之吏道息矣臣前所言豪猾踰檢由中外之法殊者以其官禁不一也臣謹按春秋齊桓公盟諸侯不書日而葵邱之盟特以日者美其能宣明天子之禁率奉王官之法故春秋備而書之夫官者五帝三皇之所建也法者髙祖太宗之所制也法宜畫一官宜正名今又分外官中官之員立南司北司之局或犯禁於南則亡命於北或正刑於外則破律於中法出多門人無所措實由兵農勢異而中外法殊也臣聞古者因井田以制軍賦間農事以脩武􅊀提封約卒乘之數命将在公卿之列故兵農一致而文武同方可以保乂邦家式遏亂略舊唐書作禍亂暨太宗皇帝肇建邦典亦置府兵䑓省軍衛文武叅掌居閒歳則櫜弓力穯将有事則釋耒荷戈所以脩復古制不廢舊物今則不然夏官不知兵籍止於奉朝請大将文粹作六軍不主兵諸本作武事止於養勲階軍容合中官之政戎律附内臣之職首一戴武弁嫉文職如仇讎足一蹈軍門視農夫如草芥謀不足以翦除奸兇而詐足以抑揚威福勇不足以鎮衞社稷而暴足以侵軼里閭覊紲藩臣干陵宰輔隳裂王度汨亂朝經張武夫之威上以制君父假天子之命下以馭英豪有藏奸觀釁之心無仗節死難之義豈先王經文緯武之㫖耶臣願陛下貫文武之道均兵農之功正貴賤之名一中外之法還軍伍之職脩省署之官近崇貞觀之規逺復成周之制自邦畿以刑于萬國始天子而諸本作以逹于諸侯則可以制豪猾之强無踰檢之患矣臣前所言生徒惰業由學校之官廢者盖以國家貴其禄而賤其能先其事而後其行故庶官乏通經之學諸生無脩業之心矣臣前所言列郡干禁由授任非其人者臣以為刺史之任理亂之根本繫焉朝廷之法制在焉權可以抑豪猾恩可以恵孤寡强可以禦奸寇政可以移風俗其將校曽經戰陣及功臣子弟各請隨宜酧賞如新唐書作茍無理人之術者不當授任此官則絶干禁之患矣臣前所言百工淫巧由制度不立者臣請以官位禄秩制其器用車服禁金銀珠玉錦綉雕鏤不蓄於私室則無蕩心之巧矣臣前所言辨枝葉者在考言以詢行也臣前所言形耻格者在道徳而齊禮也臣前所言念生寡而食衆可罷斥游惰者已備之於前矣臣前所言令煩而理鮮要在觀察賢否者臣聞號令者乃理國之具也君審而出之臣奉而行之或虧益止畱五字舊唐書文粹作或虧上㫖罪在不赦今陛下令煩而理鮮得非持之者為所蔽欺乎臣前所言博延羣彦願陛下必納其言造庭待問則小臣豈敢愛死者臣聞晁錯為漢畫削諸侯之䇿非不知其禍之將至也忠臣之心壯夫之節茍利社稷死無悔焉今臣非不知言發而禍應計行而身戮盖所以痛社稷之危哀生人之困豈忍姑息時忌竊陛下一命之寵哉昔龍逄死而啓殷比干死而啓周酈生死而啓漢陳蕃死而啓魏今臣之来也有司或不敢薦臣之言陛下又無以察臣之心退必受戮於權臣之手臣幸得從四子遊於地下固臣之願也所不知殺臣者臣死之後将孰為啓之哉至於人主之闕政教之疵前日之弊臣既言之矣若乃流下土之恵脩近古之理而致其和平者在陛下行之而已然上之所陳者實以臣親承聖問敢不條對雖臣之愚以為未及教化之大端皇王之要道伏惟陛下事天地以教人敬奉宗祀以教人孝養高年以教人悌二唐書有長字育百姓以教人慈二唐書作幼字調元氣以煦育扇太和於仁夀可以逍遥而無為端二唐書作垂字拱而成化至若念陶鈞之道在擇宰相而任之使權造化之柄念保定之功在擇庶官而任之使専職業之守分萬姓之愁痛在擇長吏而任之使明恵養之術自然言足以為天下教動足以為天下法仁足以勸善義足以禁非又何宵衣旰食勞神愓慮然後以致其理哉謹對文苑英華卷四百九十三
