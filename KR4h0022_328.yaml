body:
  text: 文苑英華巻三百二十八宋李昉等編禽獸一鳳三首鶴二十七首鷹五首烏五首鵲七首雁二十首鸎十首鳳賦得威鳯棲梧桐張正見見初學記丹山下威鳳來集帝梧中欲舞春花落將飛秋葉空影照龍門水聲入洞庭風别有將雛曲翻更合絲桐鳳李嶠見單題詩有鳥居丹穴其名曰鳳凰九苞應靈瑞五色成文章屢向秦樓側頻過洛水陽鳴岐今日一作已見阿閣佇來翔同前伊夢昌好是山家鳳歌成非楚鷄毫光洒風雨紋彩動雲霓竹實不得飽桐孫何足栖岐陽今好去律吕正凄凄鶴登板橋詠洲間獨鶴梁簡文帝逺霧旦氛氲單飛纔可分孤驚思類聚作宿嶼浦覉唳下江濆意惑東西水心迷四面雲誰知獨辛苦江上念離羣賦得舞鶴前人來自芝田逺飛渡武溪深振迅依吳市差池逐晉琴竒聲傳廻澗動趐拂花林欲知情外物伊洛有清潯主人池前鶴吳均本自乗軒者為君堦下禽低昻初學記作摧藏多好貎清唳有竒音稻粱恩類聚作恵既重華池遇亦深顧思初學記作懐恩未忍去非無江海心賦得華亭鶴孔徳紹見初學記華亭失侣鶴乗軒寵遂終三山陵苦霧千里激悲風心危白露下聲斷綵絃中何言斯物變翻復似遼東鶴李嶠黄鶴逺聫翩從鸞下紫烟翶翔一萬里來去幾千年已憇青田側時遊丹禁前莫言空警露猶冀一聞天郡府中毎晨興輙見羣鶴東飛至暮又行列而返哢吭一作唳雲路甚和樂焉余愧獨處江城常目送此鳥意有所羡遂賦以詩張九齡雲間有數鶴撫翼意無違曉日東田去宵烟北渚歸讙呼良自適羅列好相依逺集長江静髙翔衆鳥稀豈煩仙子馭何畏野人機却念乗軒者拘留不得飛遇旅鶴孫昌允靈鶴産絶境昻昻無與儔單飛滄溟曙一叫雲山秋野性方自得人寰何所求時因戲祥風偶爾來中州中州帝王宅園沼深且幽希君恵稻粱欲拜辭丹丘不然奮飛去将適汗漫遊肯作池上鶩年年空沉浮寄興國池鶴上劉相公張衆甫見類詩馴狎經時久䙰褷短翮存不隨淮海變空媿稻粱恩獨立秋天静單棲夕露繁欲飛還歛翼詎敢望乗軒白二十集作白二十二侍郎有雙鶴留在洛下集作中予西園多野水長松可以棲息遂以詩請之裴度聞君有雙鶴羇旅洛城東未放歸仙去集作路何如乞老翁且将臨野水莫閉在樊籠好是長鳴處西園白露集作松逕中酬裴相公乞予雙鶴白居易警露聲音好冲天相貎殊終宜向寥廓不稱在泥塗白首勞為伴朱門幸見呼不知踈野性觧愛鳯池無送鶴與裴相臨别贈詩前人司空愛爾爾湏知不信聼吟送一作乞鶴詩羽翮勢髙寧惜别稻粱恩重莫愁饑夜棲莫集作少共烏争樹曉一作日浴先饒鳯占池稳上青雲一作㝠勿廻顧的應勝在白家時失鶴前人失為庭前雪飛因草集作海上風九霄應得侣三夜不歸籠聲斷碧雲外影沉明月中郡齋從此後誰伴白頭翁和裴相公寄白侍郎求雙鶴劉禹錫皎皎華庭鶴來隨太守船白君罷呉郡太守携鶴雛來青雲意長在一作長在意滄海别經年留滯清洛苑徘徊明月天何如鳯池上雙舞入祥烟别鶴張籍雙鶴出雲溪分飛各自迷空巢在松樹集作頂折羽落江泥尋水終不飲逢林亦未棲别離應易老萬里草集作兩萋萋失鶴李逺秋風吹起雜詠作却九臯禽一片閒雲萬里心碧落有情應悵望瑶䑓詩選作青天無路可追尋初來一作來時白雪翎猶短欲去一作去日丹砂頂漸深華表樹頭留語後不知消類詩作更無消息到如今過舊遊見雙鶴愴然有懐前人郎公何嵗掩松楸雙鶴依然傍玉樓朱頂㠝岏荒草上雪毛零落小池頭蓬瀛路斷君何處雲水情深我尚留他日若來華表樹更添多少令威愁崔卿池上鶴賈島月中時叫葉紛紛不異洞庭霜夜聞翎羽如今從放長一作從今如罷剪猶能飛起向一作上孤雲憶鶴劉得仁自爾歸仙後經秋又過春白雲尋不得類詩作見紫府去無因此地空明月何山伴羽人将期華表上重見類詩作瞻望令威身同前前人白絲翎羽丹砂頂曉度秋烟出翠㣲來向孤松枝上立見人吟苦却髙飛山陽盧明府以雙鶴寄遺白一作伯氏以詩為答因寄和趙嘏緱山雙去羽翰輕應為仙家好弟兄茅固枕前秋對舞陸雲溪上夜曽嗚紫泥封處曾囘首碧落歸時莫問程自笑滄江一漁叟何由似爾到層城失鶴二首薛能偶背雕籠與我違四方端佇竟㤀歸誰家白日雲間見何處滄洲雨裏飛曽啄稻粱殘粒在舊翹泥潦半蹤稀凴人轉覓多相誤盡道皤然作令威二華表翹風未可期變丁投衞兩堪疑應縁失路防人損空有歸心最我知但見空籠抛夕月若何無樹宿荒陂不然直道髙空外白水青山屬臘疑作獵師答賈支使寄鶴前人瑞羽竒姿踉蹌形稱為仙馭過青㝠何年厚禄曽居衛幾世前身本姓丁幸有逺雲兼逺水莫臨華表望華亭勞君贈我清歌侣将去田園夜坐聼陳州刺史寄鶴前人臨風髙視聳竒形渡海冲天想盡經因得羽儀來合浦便無魂夣去華亭春飛見境乗桴切夜唳聞時醉枕醒南守欲知多少重撫毛千萬喚丁丁失鶴李羣玉瑶䑓烟霧外一去沒還心集作不廻心暗集作清海蓬壺逺秋風碧落深堕集作墮翎留片雪雅操入孤琴不集作豈是籠中物雲蘿更莫集作莫更尋鶴鄭谷一自王喬放自由俗人行處懶囘頭睡輕旋覺松花墮舞罷閒聼澗水流羽翼光明欺積雪風神灑落占髙秋應嫌白鷺無仙骨長伴漁翁宿葦洲病中題主人庭鶴羅隠遼水花亭舊所聞病中毛羽最憐君稻粱且足身兼健何必青雲與白雲鷹詠鷹隋煬帝見初學記遷朔欲之衡忽投罻羅裏既以羇華絆仍持獻君子青骹固絶儔素羽誠難擬深目表兹稱濶臆斯為美驚獸不及奔猜禽無暇起雖䝉韝上榮無復陵雲志觀放白鷹李白八月邊風髙胡鷹白錦毛孤飛一片雪百里見秋毫見人臂蒼鷹前人寒多集作楚十二月蒼鷹八九毛寄言燕雀莫相啅自有雲霄萬里髙同前章孝標星眸未放瞥秋毫頻掣金鈴試雪毛㑹使老拳供口腹莫辭親手啖腥臊穿雲自怪身如電殺誰知爪一作吻勝刀可惜忍饑寒日暮向人鵮知咸切鳥啄食也斷碧絲絛白鷹鄭繇白錦文章亂丹霄羽翮齊雲間呼暫下雪裏放還迷梁苑驚池鶩陳倉拂野鷄不知寥廓外何處是一作别依棲烏詠烏代陳師道唐太宗陵晨䴡城去薄暮上林棲辭枝枝暫起停樹樹還低向日終難託迎風詎肯迷只待纎纎手曲裏作宵啼晩飛烏虞世基向日晩飛低飛飛未得棲只為歸林逺恒當侵夜啼詠巢烏應詔楊師道桂樹春暉滿巢烏刷羽儀朝飛䴡城上夜宿碧林垂背風藏宻葉向日逐踈枝仰徳還能哺依人初學記作仁遂可窺驚鳴雕輦側王吉自相知詠霜朝城上烏王拊霜旦早暉通城烏漸颺空聲喧髙疊疑外曲韻楚琴中樓寒映曉日竿㢠噪朝風雖狎金墉上獨一作猶畏虎賁弓烏李嶠日路朝飛急霜䑓夕影寒聫翩依月樹迢遞繞風竿白首何年改清琴此夜彈靈䑓如可託千里向長安鵲看栁上鵲魏收背嵗心能識登春巢自成立枯隨雨霽依枝湏月明疑是雕籠出當由抵玉驚間闗拂條軟廻復振毛輕何獨離婁意傍人但未聼詠鵲蕭紀欲避新枝滑還向故巢飛今朝數聲喜家信必應歸鵲李嶠不分荆山抵甘從石印飛危巢畏風急繞樹覺星稀喜逐行人至愁隨織女歸倘遊明鏡裏朝夕動一作發光輝類詩作倘教明鏡裏朝夕有光曦山行見鵲巢蒋冽鵲巢性本髙更在西山木朝下清泉戲夜近明月宿非直避網羅兼能免傾覆豈復一作憂五陵子挾弹來相逐夜飛鵲北林夜方久南月影頻移何啻飛三匝猶言未得枝壬申閏秋題贈烏鵲李商隠繞樹無依月正髙鄴城新淚濺雲𫀆幾年始得逄秋閏兩度填河莫告勞鄜州進白野鵲薛能輕毛疊雪翅開霜紅觜能深練尾長名應玉符朝北闕色柔金性瑞西方不憂雲路填河逺為對天顔送喜忙從此定知栖息處月宫瓊樹是仙鄉鴈詠鴈一作賦得隴坻鴈初飛梁簡文帝髙翔惮濶海下去怯虞機霧闇早相失沙明還共飛隴狹朝聲亂風急暮行稀雖殄輪䑓援未觧龍城圍相思不得反且寄别書歸夜聼鴈蕭子範天月廣夜輝遊鴈犯霜飛連翩辭朔氣嘹唳獨南歸夜長寒復静燈光暖類聚作曖欲㣲悽悽不可聼何况觸愁機詠鴈王褒伺朝聞曙雞妬隴類聚作壟有春翬豈若雲中鴈秋時塞外歸河長猶可渉海濶故難飛霜多聲轉急風踈行屢稀園池若可至不復怯虞機失羣鴈并序盧照隣温縣明府以鴈詩垂示余以為古之郎官出宰百里今之墨綬入應千官事止鴈行未宜傷嘆至如羸臥空石者乃可為失羣慟耳聊因伏枕多暇以斯文應之三秋北地雪皚皚萬里南翔渡海來欲隨石燕沉湘水試逐銅烏繞帝䑓帝䑓銀闕距金塘中間鵷鷺已成行先過上苑傳書信暫下中州戲稻粱虞人負繳來相及齊客虚弓忽見傷毛翎顦顇飛無力羽翮摧頺君不識唯有荘周觧愛鳴復道郊歌重竒色惆悵驚思悲未已徘徊自憐岡中一作中岡極傳聞有鳥集朝陽詎勝仙鳬邇帝鄉雲間海上應鳴舞逺得鵾弦猶獨撫金龜全冩中牟印玉鵠當變萊蕪斧願君弄彩鳯凰池時憶籠中摧折羽同臨津紀明府孤鴈前人三秋違北鴈一作地萬里向南翔河洲花稍白闗塞葉初黄避繳風霜勁懐書道路長水流疑箭動月照似弓傷横天無有陣度海不成行㑹刷能鳴羽還赴上林鄉秋鴈駱賔王聫翩辭海曲摇曳指江干陣居金河冷書歸玉塞寒帶月陵空易迷烟逗浦難何當同顧影刷羽泛清瀾同張二詠鴈前人唼藻滄江一作蒼梧非逺銜蘆紫塞長霧深迷曉集作晩非景風急斷秋行陣照通宵月書封幾夜霜無復能鳴分空知愧稻粱南中詠鴈韋承慶萬里人南去三春鴈北飛不知何嵗月得與爾類詩作汝同歸詠鴈李嶠春暉滿朔方歸单題詩作候鴈發衡陽望月驚弦影排雲結陣行徃還倦南北朝夕苦風霜寄語能鳴侣一作伴相隨入帝鄉同綦毋學士月夜聞鴈張九齡棲宿非無意飛飛更逺尋長塗未及伴一作半中夜有遺音月思闗山笛集作路風號流水琴空聲兩相應幽感一何深避繳歸南浦離羣呌北林聫翩俱不定憐爾越鄉心歸鴈杜甫聞道今春鴈南歸自廣州見花辭漲海避雪到羅浮是物闗兵氣何時免客愁年年霜露隔不過五湖秋孤鴈前人孤鴈不飲啄飛鳴聲念羣誰憐一片影相失萬重雲望盡似猶見哀多如更一作更復聞野鵶無意緒聲噪自一作亦紛紛送征鴈錢起秋空萬里静嘹唳獨一作鴈南征風急翻霜冷雲開見月驚塞長憐去翼影滅有餘聲悵望遥天外鄉愁滿目生沙上鴈耿湋衡陽多道里弱羽復哀音還塞知何日驚弦亂此心夜隂前侣逺秋冷後湖深獨立汀洲意唯憂霜霰侵早鴈杜牧金河秋半虜弦開雲上集作外驚飛四散哀仙掌月明孤影過長門燈暗幾聲來雖一作未隨胡馬翩翩去集作湏知胡騎紛紛在豈逐春風一一廻莫厭一作好是瀟湘少人處水多菰米岸莓苔同前顧非熊逐暖來南國迎寒背朔雲下時波勢出起處陣形分聲急奔前侣行低續後羣何人寄書札絶域可知聞同前鄭谷八月悲風九月霜蓼花紅淡葦條黄石頭城下波摇影星子灣西雲間行驚散漁家吹短笛失羣征戍鎻殘陽故鄉聞爾亦惆悵何况扁舟非故鄉新鴈杜荀鶴暮天新鴈起汀洲紅蓼花踈絶句詩選作開水國秋想得故園今夜月幾人相憶在江樓歸鴈陸龜䝉北走南征像我曹天涯迢遞翼應勞似悲邊雪音猶若初背岳雲行未髙月島聚栖防暗繳風灘斜起避驚濤時人不問隨陽一作陽臺非意空拾欄邊翡翠毛鸎鸎李嶠芳樹雜花紅羣鸎亂曉空聲分折楊吹一作栁嬌韻落梅風冩囀清絃裏遷喬暗木中友生若何疑作可冀幽谷響還通集作睍睆度花紅闗亂曉空乍離幽谷日先囀上林風翔集春壺側低昻錦帳中聲詩辨搏黍此興思無窮同前鄭愔欲囀聲猶澁将飛羽未調髙風不借便何處得遷喬龜兹聞鸎梁陟邊樹正参差新鸎復陸離嬌非胡俗變啼是漢音移繡羽花間覆繁聲風外吹人言曽不辨鳥語却相知出谷情何寄遷喬義取斯今朝鄉陌伴幾處坐髙枝聼宫鸎王維春樹遶宫墻宫鸎次第翔忽驚啼欲斷移處哢還長隐葉棲承露攀花出未央遊人未應返為此始思鄉春曉聞鸎武元衡寂寂蘭堂曉夢驚緑林斜集作殘月思孤鸎猶一作獨疑蜀魄千年恨一作變非化作禽寃萬囀聲奉和武相公春曉聞鸎許孟容碧樹當窗啼曉鸎間闗入夢聼難成千囘萬囀盡愁思疑是血魂哀困聲同前李益蜀道山川心易驚緑窗魂絶句詩選作殘夢曉聞鸎分明似雪文君恨萬恨千愁絃上聲同前于敖玉繩河漢曉縱横萬籟潜收鸎獨鳴能将百囀清心骨寧止閒窗夢不成同前皇甫鏞華舘沉沉曙境清伯勞初囀月㣲明不知台座宵吟久猶向花窗驚夢聲黄鸎鄭谷春雲淡淡集作薄薄日輝輝宫樹烟深隔水飛應為能歌繫仙籍麻姑乞與女真衣文苑英華巻三百二十八
