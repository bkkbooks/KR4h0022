body:
  text: 文苑英華卷九百九宋李昉等編職官十七諸將軍六忠武將軍茹義忠碑一首驃騎大將軍論惟賢碑一首鎮軍大將軍王榮碑一首忠武將軍茹公神道碑張賁然在昔帝軒之裔有控帶絶塞擁據羣雄殆於斯萬年得茹茹之部謂名王盛族大人鴻胄聨華魏室接慶齊庭鐘鼎焜耀於數朝土田陪敦於列辟自拓跋宇文氏降為著姓焉則公之先也公諱義忠本家鴈門今為鴈門人矣祖惠隋定州深澤縣丞父簡皇澤州永固府左果毅都尉莫不果行育德修身踐言以北方之強為南金之寶英風雋列海內知名公特稟元和偏鍾間秀瓌貌傑出雄鋩挺生幼則知書長遂多藝知人能事靡不盡善有識一見即以逺大相期然而家傳崇業尚豪舉雖曰雅好博物終恥猶為腐儒未嘗不一心殉邊百死許國與孫吳而暗合以驃衛為已任開元中以良家子戰功居右補涇州四門府别將䇿勳之授也久之秩滿六鈞伎癢七札賈餘歷試粉闈長驅金埒措杯入妙曽不出正相圃擇賢觀者如堵以武部試甲科改授河南府王屋府果毅加遊擊將軍用絶倫也纍遷汝州魯陽府折衝尋改虢州金門府折衝驟增武功級敘忠武將軍夫其䇿名委質積行纍功祿以實干職無越請雖晉用之有次亦周行而未髙至於幕有急賢司有渴理仁資規畫爭請於𢎞羊武藉詞華競留於阮瑀豈直軍形疑地勢聚米成圖抑亦國要時須立談集事是亦為政奚必褰帷之與綰墨歟但以公之德之才令問令望執先府君先夫人之喪也二連之孝聞與上交下交之契也三益之信著在師旅有不可犯之色於鄉黨則謙似不能言寬猛得其中卷舒合夫禮可謂古之文武不墜斌斌君子者矣擁旗旄享茅土亦術內之事耳性頗樂道情兼慕間每凝想於清髙不致身於趨競僶俯芳嵗蹉跎後時未展丹心徒嗟白髮命之不偶李廣寧遂於封侯生也有涯賈誼終傷於嘆鵩天寶元年蓋寢疾者浹日以六月十九日薨於京兆長安縣太和里之私第春秋八十嗚呼哀哉梁木壞乎將壇隳矣罷市無喻輟舂如何有才子三伯曰元皓皇易州遂城府左果毅仲曰元晃左羽林大將軍季曰元曜則今之驃騎大將軍行左羽林大將軍知軍事上柱國鴈門郡王當斯時也靡不血泣無訴柴毁過人即以其七年七月十六日葬於京兆長安縣永平鄉阿房殿之墟禮也先是夫人陳留郡君謝氏贈沂國太夫人語成圖史動合禮容德重陶親賢過孟母然而當年桂歇早嵗蘭摧石􅐎之封徒髙薤露之悲終積於戲大業之後景系之餘間雖陵夷小不進用尋必福履大賢出焉故公以之隂隲於身善積於物河瀆為之吐秀山嶽為之降靈挺然鬱闕生夫驃騎矣皎若片玉粲如渾金眀月照人干將立斷長才廣度茂績殊勳羽林應上天之星鴈門封塞下之地公侯必復斯之謂歟若不然者則須疑以凶舋次鍾伯早世克家紹構孑然一人而能敘終身之悲展罔極之痛二十年上有詔贈公為汾州刺史拜册于先塋斯亦可謂事親之禮終哀榮之道備矣且陵或變谷海有為田滕椁未開防墓誰辨匪慿不朽之石曷傳無婉疑作愧之詞爰訪墨卿以述銘曰秦殿南趾漢池東曲莾蒼開原蕭條古木于嗟鴈塞赫矣雄族昔也摐金兹焉埋玉鏌鎁徒挂大屈終藏日色不暖風枝自傷萬事颯而煙盡片石歸而天長庶德祖之來思無慙黃絹幸仲宣之見背不墜餘芳驃騎大將軍論公神道碑吕元膺公諱惟賢字惟賢其先西土人也髙祖諱東贊作相于西戎因官立姓遂為論氏貞觀中威懷四裔平定北庭蕃戎欵附萬里獻琛慕嚮華風欲為和親延頸企踵心馳闕下太宗皇帝覽其誠至遂許之公主時戎王遣相一作祖東贊為使來迎不忒其儀不愆于素召見顧問進退合旨詔以琅琊公主外孫女妻之東贊自陳以本國有妻又以贊府未謁公主陪臣不敢先授疑作受殊寵太宗嘉之又竒其對撫以厚恩遂有歸化之心曽祖陵與祖躬仁同總衆于東至髙宗朝拔部落七千餘帳歸國拜特進左玉鈐衛大將軍封歸懷郡王褒忠奬誠寵錫殊厚子孫因家自銀州至於京兆祖躬仁朔方副大總管雲麾將軍行左驍衛大將軍酒泉郡開國公贈撥川郡王諡曰忠自髙至大父皆有勳烈著于當時父誠節朔方節度副大使開府儀同三司右金吾衛大將軍知階州事武威郡王賜太子太傅天寶季年安祿山作逆塵起山東皇上省方于巴蜀肅宗巡狩于朔陲危亂之時見其臣節帥子弟及家僮以牧馬千駟罄其財用以奉禁旅公少有志尚奮身轅門隨先父統其士馬與元帥哥舒翰犄角扞冦鋒刃既接大小數十戰摧陷堅陳洎王師失御以智信保全所領之軍馳于靈武扈從肅宗與先父洎乎昆弟立勳成效不可備述至德中授壽府典軍次授左衛郎將賜紫金魚袋俄轉左監門率又遷左領軍衛將軍又特進右領軍衛大將軍西平郡開國公食邑三千户元勳之胤受兹光寵先時代宗皇帝為天下元帥求武勇之士公與兄懷義惟真同為先鋒討擊使又領部落數千人鎮岐陽縣被堅執鋭一月三捷洎除凶清亂至上元二年授特進行大光祿兼右領軍衛大將軍充鳯翔節度副使馬軍兵馬使寶應中丁艱茹荼朝廷以金革從權由斯奪禮廣德二年授開府儀同三司殿中監充劔南節度副使大歷中受開府儀同三司太常卿上柱國進封成國食邑三千户旋受渭州節度都知兵馬使公以從戎嵗久雖齒髮未衰而疾疢屢作代宗寵其勳舊詔許還京仍全祿賜同大將軍俾其優間建中末德宗遷幸巴梁公以所疾沉綿不獲扈蹕逆臣朱泚迫以凶威不變其志雖積年之疾纍日而瘳貞元十五年授驃騎大將軍行左武威衛將軍上柱國公斯實朝廷奬舊勳矣止足求退俄以本官致仕中使就間寵秩有光元和四年七月十日寢疾終于靜恭里之私第以某年十月一日葬于萬年縣洪固鄉之古原故夫人太原王氏袝焉詔給鹵簿鼓吹所以褒寵也嗣子輔鼎同州白水縣丞次曰倜常州江隂縣尉次曰俶右領軍衛騎曹參軍泣血茹荼存無改之義公之季弟惟眀為時英髦文武備用建中興元之際仗義討逆摧殄凶徒勳彰險艱謀著忠益一作蓋貞元初以太常伯執金吾授鉞渭北八座上相崇奬忠功元膺獲佐戎幕備閲忠義由是盡知公之世業勳德矣銘曰大忠之胤本自西土奕也崇勳既眀且武在太宗時有道攸覩洎夫撥川緒業光輝天寶季年塵起幽燕自與其家殄冦功全乃拜公侯寵榮無替用表豐碑昭於東裔鎮軍大將軍王榮神道碑戴少年天列鈎陳之象國維環衛之儀蒼旻立程圖謀斯載心膂之寄賢良是疇茍非副慎選曷以將軍纍代而居其位焉將軍姓王氏諱榮字榮與本太原人也肇自軒后延于周室自靈王喪道黜太子晉於河東時人號為王家子孫因以命氏子晉生宗敬為司徒至秦始皇大將軍翦子曰賁孫曰離皆以武略著名列于戰國䇿及漢昌邑中尉吉博通墳典形于書籍生二子長曰霸居太原次曰駿居琅琊公即霸之後矣自翦至魏凡三十四代有昶為征南將軍後遇西晉陵替子孫有過江者為江東盛族其不往者代有賢豪史傳備彰此無縷載隋季喪亂龍蛇起陸爰有唐之始祖舉義師于北京惟公之先宗嚮雄風于西土繇是奕葉承緒因家上京曽祖玄皇越州長王父思獻唐元功臣行右龍武軍大將軍父崇俊皇開封儀同三司行左龍武軍大將軍事莒國公兼京功德使贈太子太保慶有所屬世無乏賢猗歟將軍即太保之元子也髙門有嗣美玉無瑕識鑒精通知謀周達忠孝立志溫良飾躬總角精乎兩經弱冠窮于三略文武不墜剛柔得中風姿逸羣果斷在已公門家子也肅宗皇帝美公先父有勤勞于國有訓導于家爰自妙年授公左龍武軍司戈廣德初轉本軍中候未幾遷同州伏龍府折衝賜紫金魚袋本軍衛宿衛皆特降恩煦寵於勳賢代宗之初蕃戎豕突烽燧西舉鑾輿東巡公之父子俱為侍從翼戴往復公家是先特拜公陜府元從遊擊將軍守左龍軍馮翊府左郎將上柱國太原縣開國伯食邑七百户公以恪居韶淑之年志出雲霄之路勤守職業色養無虧雖居長上以公代有勳績將施延賞之恩特賜故右龍武軍將軍李敬照長女以其令淑有聞日內而降疑作烽為公之夫人也恩逾國戚寵過常倫服琉禮義無非常賜渥澤雱濡未之前聞公謙沖有恆恭儉無替並謂禍生不意家釁洊臻公柴骨棘心居苫枕塊左右墳闕薦奠朝哺覩之者涕零聞之者惻怛可謂至孝之至恭仁疑之數年後遷右神武軍翊府中郎將尋改右清率府率建中末賊泚勝姦乘其不虞禍起肘腋宫室蜂蠆車駕郊畿公乃奔馳扶輪躬奉矢石出殁生死羽衛君王是知仁者必有勇也上嘉其誠特封武威郡王食邑三千户實封五百逮于克復城闕載酬厥勳興元初拜奉天定難功臣雲麾將軍守右監門衛率府率尋充左龍武軍南仗使八年轉左內率府軍職如故公家之事知無不為晝警暮巡考課尤著者有詔補本軍通直將軍職其將遷望亦增重松竹之操森然可觀貞元來特拜左龍武軍事居文眀之代翊舜禹之君嗣業既彰軍風載振昔𢎞農楊氏四世三公太原王君三代三品於戲德宗皇帝奄忽升遐順宗欽眀踐祚皇極公以册立之重拜御史中丞尋加鎮軍大將軍賜一子正員八品改贈先父太子太保殊常之澤併集公門雖承湛露之恩不易履氷之誡霜仗增肅天門益雄規謀昭彰職事修舉前後倫類莫之與京於是書芳躅於武經寫丹青於麟閣俄乃紫微遷位皇室薦哀二帝山陵六軍扈蹕羽儀爭勝公也推先煥采寶厯新升恩加近侍遷本軍大將軍兼御史大夫佩玉腰金朱門綵戟昔馬援有伏波之號班超揚定逺之名雖門望同途終華裔别實豈若登壇柱國授鉞中朝晝列彤庭暮嚴清禁渙汗之重孰云比肩至如君盡其臣忠子及於父位萬乃有一公其獲諸公之性也矜孤愍窮寬仁厚德不伐其善無施其勞忠孝仁義全乎始終財帛洽於姻親粟祿霑于鄉黨享福君疑作居崇固其宜矣公當拜命之始將軍疑有事於南郊獻鋒鋭者盈於九門執玉帛者來于萬國公為六軍之首將持百代之名敷陳盛儀逈出羣格美望充於朝野嘉聲達於聖聰因賜二子出身用旌厥德公竭其筋力罄于心神靡盬自哀積勤致疾天醫繼路御餌盈庭雖上命以惜賢竟膏肓之罔救公纍官十任歷事五朝謀猷克申威惠斯在猶以遺訓貽乎子孫身後之儀靡不詳告有始有卒公其得之公嘗謂知已曰大丈夫誓當開拓疆境掃滌攙搶誅鋤姦凶廓清華夏致君堯舜之上榮名管葛之前豈可保位金門坐安天祿而已何乃壽齡不永事與願違未盡所試奄辭眀代嗚呼元和二年十月二十一日薨于道政里之私第享年五十有六萬乘眷勳勤之德徹食傷嗟三軍思撫育之情攀轅慟泣意夫卞氏之玉絶迹於良時隋侯之珠韜光於幽壤翩翩盛德足繼前修亹亹餘風揚乎後代亦可謂殁而不忘者也來年十一月二十四日丹旐既舉青鳥告期有司上聞錫葬殊等出天厨以饗奠俾中貴以臨喪鹵簿溢于郊衢笳簫震于阡陌寵光存殁澤被幽眀棲神于鳯城東南龍首原先靈之左禮之至也夫人隴西郡夫人李氏婦德柔眀母儀貞順視孤惸以灑泣撫靈櫬以銷魂追思飾終罄竭家産嗣子朝散郎前行左內率府録事參軍太原縣開國公諒及王女等或婉淑沖和或貞剛勵節各稟家訓修于令閫絶漿豈獨於曹參負米猶思於子路終天罔極叩地何追慮嘉躅之遺聞請修文以記德豫以素承交契見託臨終辭之不俞聊載貞石銘曰顒顒聖君兮諤諤良臣惟德是輔兮皇天匪親國有環衛兮天有鈎陳心膂之寄兮疇咨哲人將軍之孫兮將軍之子開國承家兮提綱振紀君臣浹洽兮永冀終始形圖彩閣兮名列青史彼蒼者天兮殱我中賢皇王軫悼兮士旅澘然于以展思兮式薦奠筵于以飾終兮鹵簿旌旃龍首之原兮鳯城之前蕭蕭白楊兮窅窅黃泉立石刻名兮紀勳紀德揚名播美兮千年文苑英華卷九百九
