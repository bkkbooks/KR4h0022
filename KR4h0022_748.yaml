body:
  text: 文苑英華巻七百四十九宋李昉等編刑賞應正論一首片言折獄論一首斷刑論一首刑論一首褒貶論一首賞論一首應正論并序王志愔志愔為大理正奏言法令者人之隄防隄防不正則人無禁竊見大理官僚多不奉法以縱罪為寛恕以守文為苛刻臣濫執刑典實恐為衆所謗臣常著應正論以見㣲志因上之其論曰臣嘗讀易至萃利見大人亨聚以正也六二引吉無咎注曰居萃之時體柔當位處坤之中已獨處正與衆相殊一無此四字異操而聚民之多僻一無此四字獨正者危未能變體以逺於害故必見引然後乃吉而旡咎也王肅曰六二與九五相與俱履真正引由迎也為吉所迎何咎之有未嘗不輟書而歎曰居中理正事之常體見引旡咎道亦宜然有客聞而感之因謂僕曰今主上文明域中理定君累司典憲不務和同處正之志雖存見引之吉難一作誰應行之於已余竊懼焉僕歛衽一作襟降階揖客而謝曰補遺闕於衮職用讜言一作忠讜為已任以䝉飬正見引獲吉應此道也仁何逺哉昔咎繇謨虞登朝作士設教理訓一作物開物一作訓成務是以五流有宅五宅三居怙終賊刑刑故無小於是舜羙其事曰汝明於五刑以弼五教期于予理刑期於一作無刑人恊于中時乃功懋哉故孔子歎其正一作政曰舜舉臯陶不仁者逺此非明辟執法大人見引之應乎季孫行父之事君也舉竊寳之愆黜受邑之賞明善惡而紏慝議僣賞以塞違在虞舜之功居二十之一主司得行其道時君不以為嫌此非已獨處正引吉一作應正而無咎矣乎觀一作矢漁于棠臧伯正色賂鼎在廟哀伯抗詞言者得盡其忠聞之不加其罪故春秋稱臧氏之正曰積善之家必有餘慶此非異操而聚引吉之所致乎魏絳理直晋侯乃復其位邾人辭順趙盾不伐其國此非正體未變為吉所迎者乎夫在上埀拱臣下守制若正應乎上乃引吉于下而中士聞道若存若亡交戰於胷臆之中一作譎正之門懐疑乎語黙之境懼獨正之莫引忘此正之必亨于嗟乎行已立身居正踐義其動也直其止也方維正身如是歟六字一作維正直而是與何徃而非攸利何以明之坤六二直方大不習無不利言曰直其正也方其義也君子敬以直内義以方外敬義立而徳不孤直方大不習無不利則不疑其所行也稽康撰釋私論曹羲著至公論皆以崇公激俗抑私事主一言可蔽之歸於體正而已矣禮記曰刑者侀也侀者成也一成而不可變故君子盡心焉若以喜怒制刑輕重設此是則橋前驚馬用違一作希㫖論人苑中獵兎以從欲廢法理有違而合道物貴和而不同不同而一作之和正在其中矣昔任延爲武英華作建非威太守漢帝誡之曰善事上官無失名譽延對曰臣聞忠臣不私私臣不忠上下雷同非國家之福善事上官不敢奉詔任延雅奏漢帝是其正一無此字言此則歸正不囬乖㫖順義不以忤懐見忌斯亦違而合道晏子春秋景公見梁丘㨿曰㨿與我和乎晏子曰此同也非和也夫和者君甘則臣酸君淡則臣鹹今㨿也君甘亦甘所謂同也安得爲和是知一作以濟鹽梅以調羹乃適平心之味獻可替一無此字否而論道乃一作方恢正體之節候引正而遵度故曰物貴相一無此字和而不同劉曼山辨和同之義有㫖哉若以不同見議一作譏未敢聞誨客曰和同乖訓則以聞之援法成而不變者豈恤獄之寛憲耶書曰御衆以寛傳曰寛則得衆若以嚴綜一作統物異乎寛政矣對曰刑賞二柄惟人主操之崇厚任寛是謂皇一作帝王之徳慎之曰以力役法者百姓也以死守法者有司也以道變法者君上也然則非一作匪人臣之所操後魏㳺肇之為廷尉也魏帝嘗私勑肇有所降恕肇執而不從曰陛下自能恕之豈可一作足令臣之曲筆也肇知任寛恕五字一作是知寛恕是君道曲從非臣節人或未逹斯㫖不料其務恕乎一無此字以平刑為峻将曲法為寛謹守憲章號為宻網一作深宻内律云釋種虧戒律一日誅五百人如來不救其罪豈謂佛法為殘刻耶老子道徳經云天網恢恢踈而不漏豈謂道教為凝峻耶家語曰王者之誅有五而竊盗不預焉即心辨言偽之流禮記亦陳四殺破律亂名之謂也豈是儒學執禁孔子深文哉此三教之用法者所以明真諦重𤣥猷存天綱集作網立人極也然則乾象震曜天道明威齊衆惟刑百王所以垂範折人以法三后於是成功所務掌憲决平斯廷尉之職耳昜曰家人嗃嗃旡咎婦子嘻嘻終吝嚴於其家可移於國何有一無此二字昔崔寔逹於理體而作政論仲長統曰凡為人君宜冩政論一通置諸坐側其大概一作抵云為國者以嚴致平非以寛致平者也然則稱嚴者不必喻條越制凝網重罰在於施􅕍括以矯枉用平典以禁非刑故有常罰輕無捨人不昜犯防之難越故也但人慢吏濁偽積贓深而曰以寛理之可以無過何異乎命王良御駟一作􅀈捨衘轡於奔縱一作蹄請俞跗攻疾停藥石於膚腠適見鞅一作鞦駕轉逸膏盲更深醫人僕吏一作夫何功之有又謂僕曰成法之一作而變為唯帝王之令一作命歟對曰何為其然也昔漢武帝甥昭平君殺人以公主子廷尉上請論刑左右為言武帝垂涕歎曰法令者髙一作先帝之所造也用親故撓一作誣先帝之法吾何面目入髙廟乎又下負萬人乃可其奏近代隋文帝子秦王俊為并州總管以奢縱免官僕射楊素曰曰一作奏言王陛下愛子請捨其過文帝曰法不可違若如公意我是五兒之父非兆人之父何不别制天子兒律乎我安能虧法卒不許此是帝王操法叶於禮經不變之義也况於秋官典職司冦肅事而可變動者乎我皇睿哲登宸髙視巖廊之上宰衡明允就列輯穆廟堂之下乾坤交㤗日月光華庶績其凝衆功咸理聚以正也僕幸利見大人引其吉焉斯一作期飬正於下位中正是託子何懼乎夫君子百行之基出處二途而已出則䇿名委質行直道以事君一作人進善納忠仰大階而輔一作揖攻諤諤其節思為社稷之臣蹇蹇一作謇謇匪躬願叅柱石之任處則逺辭徴召髙謝公卿孝友揚名是亦為政煙霞尚志其用永貞行藏事業心跡斯在至如水中汎汎天下悠悠執馭為榮掃門自媚拜塵邀勢括囊守禄從來長思以為深耻客乃逡廵不對遂無以問僕也一作皆舊唐書本傳片言折獄論懐州應宏詞試歐陽詹孔集作夫子說季路於人曰片言折獄者其由也歟夫子之言盖非非集作有激於季路之云也後之人不窮聖㫖以為夫子羙於集作夫季路任一時之見輕而折獄者有若是焉四字集作十有八九焉迂哉斯人也夫兩訟之謂獄獄折而有刑刑者侀也侀者成也一成而不可變不其重歟古之帝王將刑一人脩三槐歴九棘訊群臣訊群吏訊萬人億兆絶議然後治法狥於朝示於野六字集作狥於朝於市於野昭然於衆同集無同字方棄之所示容二字集作以不易也也君莫聖於堯加有舜禹稷契佐之莫明于集作於舜而有䕫龍缙雲髙陽佐之莫哲于集作於禹莫賢於湯莫察於文武莫智集作敏於成康於集作于時皆濟濟盈朝明明在位豈無獨見而可臆㫁慎刑之道如斯集作法不敢失明刑獄不可輕也凡至獄訟多在小人至於訟也皆欲已勝何則不勝乃罪戾隨之若然一作是又作折則君子時或妄訟于集作於人未有小人而能自訟者片之為言偏也偏言一家之詞也集無也字偏詞雖君子不信之三字集作不足以信字矧非君子乎且先師曰人而無恒不可以作巫醫善夫集無此二字巫以鬼神占良集無良字醫以筋脉體無恒之人筋胍且不足以自體而况訟訟集作語言又作有言乎鬼神不足以為占而况視聴乎以斯折獄也小則肌膚必有朴抶集作抶撲之濫焉大即集作則字性命必有鈇鑕之寃焉夫子祖述堯舜憲章文武師老𣆀之誨以三字集作而崇周公之集作此六人者集無此字無一以集作好輕又作欲輕傷於人者夫子豈輕傷人集作好輕傷哉脫夫子實謂片言可以折獄者不㡬乎一言可以䘮邦歟夫子之言盖輕蜀本作非於季路賢者七字集作非茍然者審之片言不可以折獄者集無者字必然之理也㫁刑論桞宗元余既為㫁刑論或者以釋刑復於予其辭云云予不得已而為之一言焉六字文粹作為之言焉夫聖人之為賞罰者非他所以懲勸者也賞務速而後有勸罰務速而後有懲必曰賞以春夏刑以秋冬而謂之至理者偽也使秋集有冬字為善者必俟春夏而後賞則為善者必怠春集有夏字為不善者必俟秋冬而後罰則為不善者必懈為善者怠為不善者懈是敺天下之人而入於罪也敺天下之人而入於罪又緩而慢之以滋其懈怠此刑之所以不措也必使為善者不越月踰時而得其賞則人勇而有勸焉為不善者不越月踰時而得其罰則人懼而有懲焉為善者日以有勸為不善者日以有懲是敺天下之人而從善逺罪也敺天下之人而從善逺罪是刑之所以措而化之所以成也或者務言天而不言人是惑於文粹作于道者也胡不謀之人心以熟吾道吾道之盡而人化矣是知文粹無知字蒼蒼者焉能與吾事而暇知之哉果以為天時之可得順大和之可得致則全吾道而得之矣全吾道而不得者非所謂天也非所謂大和也是亦必無而已矣又何必枉吾之道曲順其時以謟是物哉吾固知順時之得天不如順人順道之得天何也使犯死者自春而窮其辭欲死不可得貫三文粹作五木加連鎻而致之獄更大暑數月痒不得搔痺不得摇痛不得摩饑不得時而食渴不得時而飲目不得瞑支不得舒悲號之聲聞於里人如是而大和之不傷天時之不逆是亦必無而已矣彼其所宜得者死而已矣又若是焉何哉或者乃以為雪霜者天之經也雷霆者天之權也非常之罪不時可以殺人之權也當刑者必順時而殺人之經也是又不然夫雷霆雪霜者特一氣耳非有心於物者也聖人有心於物者也春夏之有雷霆也或發而震破巨石裂大木木石豈為非常之罪也哉秋冬之有雪霜也舉草木而殘之草木豈為集作有非常之罪也哉彼豈有懲於物也哉彼無所懲則效之者惑也果以為仁仁必知經果以為智智必知權川文粹作果以為仁必知經智必知權是又未盡於經權之道也何也經也者常也權也者逹經者也皆仁義之事也離之滋惑矣經非權則泥權非經則悖是二者强名也曰當斯盡之矣當也者大中之道也離而為名者大中之器用也知經而不知權不知經者也知權而不知經不知權者也徧知而謂之智不智者也徧守而謂之仁不仁者也知經者不以異物害吾道知權者不以常人拂吾慮合之於一而不疑者信於道而已也文粹作矣且古之所以言天者盖以愚蚩蚩者耳非為聦明睿智者設也或者之未逹不思之甚也刑論牛希濟刑罰之用盖將以革人之心勸之於善所以小罪輕刑以正其失大罪重罰以勵其衆將刑王者為之不舉以示仁恕之心也棄人必於市明其罪之死也皆欲遷人於善豈圖㫁其肌膚殘其支體流其膏血盡其性命以逞於威怒者也三代之後五刑之用劓刖之屬最可以為耻於衆觀者則知其所犯毁其父母之遺體㒺不憯痛於心犯者不能諱其罪亦可以永戒其悪所謂有耻且格及笞杖之法易隠其跡行鄉而無愧茍富貴而或得行者其暴犯者不以為耻誠哉免而無耻漢文帝感緹縈之一言廢肉刑用笞杖及後笞者多死文皇帝視明堂圖亦輕其罰天下之獄㡬亂知刑罰者治之具也不可暫捨然罰無輕重杖無大小皆成之於胥吏之手㫁之於出沒之文上之人其知乎夫鞫獄之法始於疑辯之中成於案牘之内吏典之者捨其罪而彰其是其不與者除其善而彰其惡又復刑律之中或一與一奪隨其取捨以為出入官必不盡知此為弊之一也畫灰為獄誓不願入刻木為吏誓不願對獄吏之尊聲色之大桎梏之重輕搒掠之多少率由其意孰可與爭此為弊之二也又或欲其偽而怒其真惡其輕而思其重或捽其首或批其頰詬辱毆繫無所不至又節其飲食嚴其徽纒外殘其軀内脅其心壯士勇夫且必流涕孤弱之人敢不從命此為弊之三也或上下其手以取其信或黙疑作㸃染富室以求資賄則衆知其非不能即止此為弊之四也具獄既乆改為疑讞逺取支證廣擒黨與淹延嵗月以伺赦宥此為弊之五也棰栲之下昜以强抑人之支體頑非木石若加其殘忍取其必然誠雖無罪百不能免盖不勝其楚掠之毒寧甘心於一死狡猾之吏㫁成其獄故戮死之後盗自他發衆方知其無辜且桎梏之苦笞棰之嚴輕罪者願重刑而獲出無辜者畏殘害而求死皆狡猾之所能為也即平人孰敢與吏為敵公卿尊嚴察視不及䑓寺懸逺訢訟無門死者不可再活親戚焉能申寃何以感致和氣平一水旱此為弊之六也復有衆皆知非難加以法當炎酷之時穢其傍而成其疾疫奪其餉而致其饑餓圜扉嚴䆳守者羅列親戚之人胡能知其食與不食渴與不渴但成其困以取其斃此為弊之七也况外府法司又為不道或土囊以鎮其腹或濕紙以䝉其面拘録所至號呼莫聞暝然而去孰知其由昔東海誤殺貞婦致三年之旱今天下之刑晝常雨血尚未足以泄其寃憤且刑罰者逺於人非近於人犯之者皆自求之也非刑之就於人也皆人就也上自天子下至庶人若為不道必歸於法故商辛夏桀懸首於白旗此天子之刑也則公卿之下獄黎庶之就戮又何足道哉是知上下皆有分故君子常懐畏懼夫厲聲變色揚眉張目樂刑罰以毒物之性命殆非人類信豺狼之心也故曽子曰如得其情則哀矜而勿喜又于定國每嵗次疑作决獄先自流涕悲哉仁者之心深知刑獄之本所以勸人非以虐人也今天下之大九州之衆一嵗决獄之多少皆由吏議豈能盡平莫若重明桎梏笞杖重輕之制禁計日月之逺近寒暑静疑作清温其所處饘粥每給其饑渴决罪遍求於刑律察詞必盡於疑辯庶㡬少塞其弊當不濫於無辜以成王者之理褒貶論仲尼之修春秋也先成其志後誅其意是以晋侯召王書曰天王狩于河陽本其尊奬其謀也許止不嘗藥書曰太子殺其君以為防㣲之道卿行稱字得所舉也師行稱人闕有辭也以一字稱褒貶之意為千載不刋之典亂臣賊子莫不知其善不可奪惡不可掩其懸之日月以為王化今國家公卿大臣文武將帥之初命也其為相者禹稷之化也蕭曹之上也爕理隂陽平和九州斯其人也及其被廢之日竊位之小人也亂國之小人也是不可忍也及復之日周公之被謗也召公之相疑也子文之三已也孫叔敖之三相也然後可以為賢人其為將者扞城之材為國之屏也式遏冦虐底定王國斯其任也其被罪之日匹夫之勇也非國將之材也覆軍敗國棄戈奔北者矣殆不可用也復用之日荀林父再敗而勝孟明視三敗而後獲以何傷乎百執事之間率如是用捨觀其人或始於善終於惡中復可用後又不可用是非相渾善惡相離皆欲遵之王言以為之國乃奸謀之深蠧者也後有寒素者與奄人結刑壯疑之盟以取鈞軸之任偶以章䟽得罪上雖切齒朋援未移衆知必復其位時為執筆者乃大美其辭以謀其身必使朝廷怒而譴之一南行而已果皆中其㫖未朞年而舊相復入僅三嵗而公亦入相台文非求宦者乃結官者之深者又機巧之㣲宻者也今之世若藴曜嫉正之歸國奪其鹽鐡之柄乘休惡景望之文行同居鈞衡之列近師有尚父之號崔之猶子持謀臣之權采納二字疑而至中多議定出二相之口趣三鎮之師且曰興晉陽之甲誅君側之惡不逾月而二相被誅九廟以危外之人皆曰武臣之為亂也我知之矣此皆儒者之為亂也此意之深罪之明者仲尼皆所宜誅者究朝廷為亂之本始由君臣同心同徳以誅宦官嫉之太甚湏至於亂遂至所立必冲㓜所命非賢良以階其亂以危社稷之人其知之乎不得以在位者為賢人負罪者為非材惜哉賢人之事業夫子之褒貶後之為史者當訪於長者之譚求之於野人之說斯可以正之矣賞論賞勸之典所以顯忠尊賢而待用闕感人之心使各盡其材以顯於時以為立身揚名之本故冠冕衣服車輅祭祀之儀皆以品秩為差君子之人其甘心焉孜孜於善希公朝之禄賞可以榮於家可以榮於宗廟祖考賞之義也大矣哉今國家懸髙科虚重位此文士之賞也計首級視所傷此武士之賞也文不中理宗伯所棄殺傷奔北軍法所誅擇善勸人亦以明矣衰世之中文假他人之手身居書辭之列名䧟澆浮之中坐登卿相之位射不穿札生不見敵榮持斧鉞之柄行居将相之任皆藉累世之基業或由勲伐之餘名竊位尸禄觀者憤歎而已至有文之衰也行為四海推重不成一名不沾寸禄老死凍餒之地或有獻一書陳一䇿探治亂之精㣲盡當時之利病君上不省察奸邪者深以為嫌縱未能顯加明誅彷徨焉擠之於散冗斥之於外任不復省問可勝言哉武之衰也弓聲劔氣立為勍敵馳突擊刺於横陣之前出入如鬼神謀取必勝瘡痍遍於首面身委卒伍之中老棄瘦馬之列或有破一大敵擒一渠帥賞不踰外藩之職賜不越繒帛之㣲㨗聲已振於萬里姓名未逹於九重降符節益封土翻為統帥之福豈不悲哉文之求也既不因於行藝武之用也又不因於材力乃有温溲溺之器以媚黄門者有繫鞋自名以從公相者履歴官常出入藩翰其餘資材以致名第以榮郡邑者不可遽数之况時君㓜主有宴樂玉堂從禽豊草發自愉悅之意聴從左右之言滛樂之叟優倡之子錫以朱紫升於官秩下致飛禽犬馬之㣲物亦光於封賞且國家以五岳四凟為視公侯之秩乃崇其禮尊爵敬神之道也今厮飬禽獸之屬皆列於官與士君子比肩于朝無神怨乎故志士仁人甘心草澤沒身白日不復思用力以在位者為深耻昔仲叔于奚救公孫文左傳作孫桓子恐避諱之患請以繁纓假借也孔子猶曰不如多與之邑將以定永代之制杜萌漸之謂也漢明帝不以館陶子為即寧賜之百萬曰夫即出宰百里上應列宿不可虚授信夫為中興之嗣也且賞勸不恒服章紊亂君子在野小人在朝将難以守四海之業若善人在位紀綱大定賞罰必中百官稱職天下焉能為亂文苑英華巻七百四十九
