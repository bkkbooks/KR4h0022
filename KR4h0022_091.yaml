body:
  text: 文苑英華卷九十一宋李昉等編人事二悔賦一首感舊賦二首江上愁心賦二首愁賦一首悔賦并序梁簡文帝夫機難預知知機者上智智以運巳迷巳者庸夫故易曰吉凶悔吝生乎動者也又曰悔吝者憂虞之象也傳云九德不愆愆作事無悔是以鄭國盜多太叔之恨表衛風義失宣公之刺彰無將詠興壟事書作季文再思而未可南容三復而不暇余以固陋之資慎履氷一作霜之誡竊服楚王之對每徴后稷之詩觸類而長乃為賦曰默默不怡恍若有遺四璧無寓三階寡趣月露澄曉風栁悲暮庭鶴雙舞檐烏獨赴岸林宗之巾憑南郭之几𤣥德之眊聊縈子安之嘯時起靜思悔吝鋪究前史弔古傷今驚憂嘆圯成敗之蹤得失之理莫不關此令終由乎謀始棄夸言於一作之頓丘重前非於蘧子蹟夫履疑作覆車之人一作戚豈止一途而巳至如秦兼四海之尊握天下之富混一車書鞭笞宇宙胡亥之寄巳危萬代之祀難構阿衡失責成之所趙髙秉棟梁之授拒諌逞刑戮宰誅守矜上林之戲馬嘉長楊之射獸囁呫禁中之言欺侮山東之寇及其祠崇涇水作疊夷宫徒希與妻子伍下願與黔首同信殪絶於凶醜何前謀之不工至如下相項籍才氣過人拔山靡類扛鼎絶倫聲駕盛漢勢壓餘秦巨鹿有動天之卒轅門有屈膝之賔既刓有功之印亦疑竒計之臣唱雞鳴於垓下泣悲歌於美人抱烏江之獨愧分漢騎之餘身郭君失位徒馭而亡尚悲殘糗獨飲餘漿枕畚空卧伏軾懷傷魂飄原野骨餌豺狼楚王刻鶴播徙南地鐃管徒鳴才人空置豈輜車之足榮匪射獵之娛意幽泉斯即白日何冀寧喜納君恃功肆寵衛侯厭黷忠臣憤勇昏迷靡悟敗不旋踵商君被執李斯赴收身居一作拘闕下命厄秦囚追傷用法之弊還思不諌之尤亦何解於今酷終無追於昔謀伯卓跋扈豺目為輔弒君鴆子誅李害杜鬻恩販寵怨庶虐人蔽朝政之聰察害上書之烈臣榮昵子於阿尹肆貪濁之淫威樹姦黨於宫禁察人主之纎微卒其膏鈇潤鉞置纆逢徽壯武英逸才為時出陸離儒雅照爛文筆江東啓吞併之籌幽州著懷逺之術運鍾毁冕時屬傾顛鏑鳴水濶日黑山遷留卞一作劉卞見張華傳之謀不决忠良之戮巳纒台耀之災雖啓鷦鷯之賦徒然士衡文傑綽有餘裕氣含珠璧情藴雲霧志闕沉隱心耽進趣倔一作掘兹猛衆臨此徑兵抗言孟玖見陸機傳肆此孤貞箋辭巳切墨幔徒榮疑作縈用陸機黑㦥繞車事形殞河上心憶華亭若夫楊惲狂言灌夫失志卒其殞命埋軀傷形屬吏周君飲後裴子酣狂靳固紀瞻之妾眠卧季倫之房亦足以魂驚神爽悔結嫌彰巳矣哉波瀾動兮昧前期庸夫蔽兮多自欺不逺而復幸無嗤建功立德有常基胸馳臆斷多失之前言往行可為師感舊賦并序唐太宗余將問罪東夷言過洛邑聊因暇景散慮郊畿流眄城闕之間覩弱齡遊觀之所風雲如故卉木惟新少壯不留忽焉白首追思曩日緬成異世感時懷舊撫轡忘歸握管叙情賦之云爾惟端辰一作扆之餘隙屬凝隂於暮年時觀兵於九伐聊息駕於三川登臨原隰悵望郊壥覽綺紈之遊踐觀疇昔而依然地不改其城闕時無異其風煙想飛蓋於河曲思解珮於芝田挾彈銅駝之右連鑣金谷之前薪指倐其代謝舟壑俄而貿遷屬隋漢東大國通鑑初書楊忠為隨公楊堅隨王文帝方省為隋季之分崩遇中原之喪亂濯龍變為汙池平樂化為京觀天地兮厭黷人神兮憤惋遂收𬒮而電舉乃奮衣而雲翔據三秦兮鳳跱出九谷兮龍驤揮寶劔之虹彩一作影廽雕戈於日光掃欃槍兮定六合廓氛沴兮靜八荒昔㧾戎於藩屏今恭巳於巖廊營餘故栁壘有殘牆懷壯齡之慷慨撫虛躬而自傷觀世俗之飄忽鑒存亡於宇宙林何春而不花花非故年之秀水何日而不波波非昔年之溜豈獨人之易新故在物而難舊嵗月運兮寒復暑日月流兮夜還晝信造化之常經孰聖賢之可救於是停輿郊郭極眺山川信茲都之壯麗乃卜宅於姬年興亡兮代襲隆替兮相沿惟在德而為故實棄道而難全仰煙霞兮思子晉俯浩汗兮想張騫歎髙蹤之美一作靡覿嘉令譽之空傳聊慿軾而靜慮懷古人而悵焉况復氣結隆冬嵗窮餘律對落景之蒼茫聼寒風之蕭瑟雲散葉而無蒂雪凝花而不實霧嶺斷兮疑連煙林疏兮似密節物同於前載歡憂殊於曩日扣沉思而多端寄翰墨而何述第二并序岑參參相門子五嵗讀書九嵗屬文十五隱於嵩陽二十獻書闕下嘗自謂曰雲霄坐致青紫俯拾金盡裘弊蹇而無成豈命之過歟國家六葉吾門三相矣江陵公為中書令輔太宗鄧國公為文昌右相輔髙宗汝南公為侍中輔睿宗相承寵光繼出輔弼易曰物不可以終泰故受之以否逮乎武后臨朝鄧國公由是得罪先天中汝南公又得罪朱輪翠一作華轂如夢中矣今王道休明噫世葉一作業淪替猶欽若前德將施於後人參年三十未及一命昔一何榮矣今一何悴矣直念昔者為賦云其詞曰吾門之先世克其昌赫矣烈祖輔于周王啓封受楚佐命克商二千餘載六十餘代繼厥美而有光其後闢土宇於荆門樹桑梓於棘陽吞楚山之神秀與漢水之靈長猗盛德之不隕諒嘉聲而允臧慶延自逺祐洽無疆自天命我唐始滅暴隋挺生江陵傑出輔時一作持為國之翰斯文在茲一入麟閣三遷鳳池調元氣以無忒理蒼生而不虧典絲言而作則闡綿蕝以成規革亡國之前政贊聖代之新軌捧堯日以雲從扇舜風而草靡洋洋乎令聞不巳繼生鄧公世實須才盡忠致君極武登台朱門復啓相府重開川换新楫羹傳舊梅何紏纒以相軋惡髙門之禍來當其武后臨朝姦臣竊命百川沸騰四國無政昊天降其荐瘥靡風發於時令籍小人之榮寵墮賢良於檻穽苟惛怓以相䝉胡醜厲以職競既破我室又壞我門上帝懵懵莫知我寃衆人懀懀烏外切思㑹也悶也不為我言泣賈誼於長沙痛屈平於湘沅夫物極則變感而遂通於是日光回照於覆盆之下陽氣復暖於寒谷之中上天悔禍贊我伯父為邦之傑為國之輔又治隂陽更作霖雨伊廊廟之故事皆祖父之舊矩朱門不改畫㦸重新暮出黃閣朝趨紫宸繡轂照路玉珂驚塵列親戚以髙㑹沸歌鐘於上春無小無大皆為縉紳顒顒卭卭踰數十人嗟乎一心弼諧多樹綱紀羣小見醜獨醒積毁鑠於衆口病於十指由是我汝南公復得罪於天子當是時也逼側崩波蒼黃反覆去鄉離土隳宗破族雲雨流離江山放逐愁見蒼梧之雲泣盡湘潭之竹或投於黑齒之野或竄於文身之俗嗚呼天不可問莫知其由何先榮而後悴曷曩樂而今憂盡世業之陵替念平昔之淹留嗟豫生之不造常恐墮其嘉猷志學集其荼蓼弱冠干于王侯荷仁兄之教導方勵巳以增修無負郭之數畝有嵩陽之一丘幸逢時主之好文不學滄浪之垂鈎我從東山獻書西周出入二郡蹉跎十秋多遭脫輻纍遇焚舟雪凍穿屨塵緇弊裘嗟世路之其阻恐嵗月之不留眷城闕以懷歸將欲返雲林之舊游遂撫劔而歌曰東海之水化為田北溟之魚飛上天城有時而復陵有時而遷理固常矣人亦其然觀夫陌上豪貴當年髙位歌鐘沸天鞍馬照地積黃金以自滿矜青雲之坐致髙館招其賔朋重門疊其車騎及其髙臺傾曲池平雀羅空悲其處所門客肯念其平生已矣夫世路﨑嶇孰為後圖豈無疇日之光榮何今人之棄豫彼乘軒而不恤爾後曽不愛我之羇孤歎君門兮何深顧盛時而向隅攬蕙草以惆悵步衡門而踟蹰强學以待知音不無思達人之惠顧庶有望於亨衢江上愁心賦贈趙侍郎張說江上之峻山兮鬱﨑峨而不極雲為峯兮煙為色歘變態兮心不識江上之深林兮杳冥濛而不巳鶯一作鳥為花兮猿為子紛蕩漾兮情一作言莫擬夏雲峻一作隂兮若山秋水平兮若天冬氷澌兮一作冬沙飛兮淅淅春草靡兮芊芊感四時一作節非之默運知萬化之潜遷伴衆鳥兮寒渚望孤帆兮日邊雖欲貫愁腸於巧筆紡離恨一作夢於哀絃是心也非模放之所逮將有言兮是然一有將無言兮是然六字謝燕公江上愁心賦趙冬曦江上之仙鶴兮鳳翥而龍躍氣摩青天兮遙橫碧落集洞庭兮乍駐倐廽翔兮寥廓江上之鳴鴈兮違隂以就陽中霄翻翰兮上帶青霜雖主人兮感㑹蹇淹留兮瀟湘湘水兮深深荆山兮岑岑荆有玉兮玉為音湘有芷兮芷為心我所思兮愔愔不得見兮霑襟搦芳札兮援寶瑟申短音疑作短章兮吐長吟草萋萋兮自緑目征帆兮春水曲永一望兮空躑躅望眇眇兮思綿綿憶都門兮夏雲邊邈千里兮無由緣送凉風兮脫葉復窮隂兮冒天緬一日其如嵗矧四運之相遷離别也騷愁焉惡乎然惡乎不然愁賦苻載愁之為物也親賤貧傲富貴無賢知兮不肖事違衷而必至非𤣥黃之色殊甘辛之味其去也若緣雲之難其來也類走丸之易愁兮愁志士蹇以徘徊鬱風雲之氣挺棟梁之材思宏廓以經濟刻洪勳於鼎鼐命路猶隘天衢未開滄波悠悠以東注白日匆匆其西頺𤣥德拊髀以泣下孔明抱膝而思來愁兮愁靜女悵其誰語聳端操而不爽抱明心以自處當泮氷之良辰期鳴鴈之得侣桃李艷於淑景蕙蘭生於幽渚望蹇修兮不來念良人兮何許愁兮愁邊塞兮行役始忘家而徇國忽時淹而嵗積金河流而更遙銅柱去而太劇凝雲披嶺驚沙滿磧馬向北以嘶風人上隴而吹笛功名慨其緬邈鬢髮颯以斑白伏波據鞍而骨驚定逺操戈而涕激愁兮愁禁掖兮恩光爭修曼態競飾明璫動千金之巧笑希一顧於君王嬌妬盈於思慮移奪起於毫芒何長門之咫尺邈阻絶乎陵岡宫殿深兮月皎歌吹清兮夜長班姬無言以掩扇陳后廽裾而就床愁兮愁春與秋兮登臨放臣寓目遊子開襟楓江千里青壁萬尋微波蕩漾灌木蕭森香一作杳雜花而覆水見槁葉之亂林起宋玉之沉思傷屈平之逺心愁兮愁往事紛其斷續申生被譛周勃受辱樂毅無階以轉燕黃權何計而歸蜀投令君於虗器疑卞和之美玉李廣失路於胸奴徐市泛舟於海曲過山陽而日晚望西陵而樹緑包胥感激於秦庭鄒陽畏逼於梁獄愁兮愁羈志杳而無伴鴻漸于陸層霄未半懷戴君與利物每行吟而坐歎安得百斛之醇醪使斯愁也霞開而霧散者哉文苑英華卷九十一
