body:
  text: 文苑英華卷八百七十一宋李昉等編紀功一贈太尉假秀實紀功碑一首西平王李晟東渭橋紀功碑一首幽州紀聖功碑一首贈太尉段秀實紀功碑并序德宗立人之道曰君與臣為臣之義曰忠與節忠莫極於衛國節莫大於忘身存其誠德貫乎天地致其功用施于社稷獨斷勦凶慝之命沉謀安宇宙之危其智勇足以拯時其義烈足以𢎞教非昊穹錫慶敷佑皇家重振紀綱再激汙俗何遘迍之㑹而獲見斯人開府儀同三司檢校禮部尚書兼司農卿上柱國張掖郡王段氏名秀實字成功應期降生扶翼唐祚禀隂陽之粹氣備剛柔之全德體正眀道從時卷舒蓄為淳和發為功烈朕宅帝位之五載孟冬十月賊臣朱泚反天悖人因時多虞乘我無備誘聚叛卒作亂于京師朕深惟罪已之誠逺遵避狄之義駕自中禁狩于近坰賊隂謀為奸陽言示順以公嘗任涇帥素得士心採諸衆情引以自助公感時悲憤思定大業謂復國安人由已不可以顧私謂開物變化在權不可以虛死略匹夫之褊介藴曠代之宏規內貞其心外混其跡且控察元惡情狀將因而圗之賊果不疑委以心腹一作腑遽發凶黨謀襲我師公詭說以詞止之不可及疑作乃竊取官印假為兵符急追寇軍不逺而復銷禍紓難隂陽若神于時物情危疑忠邪莫判卒乘未輯軍旅未完微公之謀吾幾蔑濟既而密結勇敢誓殱寇讐决策尅期中外發應㑹賊泚召公計事引入閣中露其姦情言及僣竊公氣填胸臆植髮衝冠仰天大呼𤣥鍳何昧孰為臣子而忍是心語未絶音奮笏前擊凶徒敗靣既躓而奔左右愕然初未敢動繼者不至事遂無成逆徒交鋒因而遇害嗟乎天生萬物唯人最靈禀元氣之精鍾五行之秀是宜守正居順移孝資忠君君臣臣父父子子各履於達道同臻于太和天乎不融生彼狂悖神乎不惠喪我忠貞靜言思之輟饋忘寐詳求其理抑有以焉兹朕不眀敗德招損故列聖垂祐警戒于豫則泚之亂所以懲既往朂將來禮教陵夷風訛俗弊故上帝𤣥一作降鍳聳動于人則假公之死所以勵當今傳不朽也訪彼前史稽諸昔賢全大節者不必成功建大功者或未立節非節不可以禆教非功不可以持危義實相須事難竝備吉甫以文武翼周室宣王中興絳侯以智謀安劉氏文皇紹立茂功著矣而節未可稱董卓脅國以擅威伍孚刺之而不畏王敦擁衆以稱亂周顗折之而無疑奇節偉矣而功竟不就至若屈伸合變進退知機智以遂其謀勇以决其死功與時竝節與名偕中古已還無公儔比貞烈之至通於神眀桀驁聞之而動心仇讐感之而不怨死於義而義著忘其家而家全行路興悲懦夫增氣矧豫之慟其可弭忘且人之所愛者身也國之所重者位也公能殺身狥國朕得不以重位報之哉乃詔有司册贈太尉諡曰忠烈賜實封五百户莊宅各一所嗣子授三品正員官諸子各授五品正員官表其閭里護其喪葬官立祠宇史載忠勳哀榮之典備矣君臣之義極矣公始以天寶四載奮筆從戎才為時生官由才達得司馬戰陳之法參將軍帷幄之籌纍典方州更踐臺寺出擁旄節入為卿士位歷十七嵗踰三紀封王列於異姓開府比於台司參職六官食賦百室言不伐善慮常下人恆持順信之規罔居疑悔之地利刃在手投節皆虛貞松有心老而彌徑吞大憝於方寸之內定危疑於晷刻之間力可屈而志不可遷身可殺而節不可奪所謂有始有卒為臣之極致者歟日月有期宅兆云畢身歿功在凛然如山勒銘傳芳終古不滅以志吾過且旌善人銘曰浩浩上天四序唯均氣或堙鬱過一作乃為災氛否不可終必復元亨洗以膏雨播之祥雲濟濟蒸人五常是則時或迍難乃生凶慝亂必有定允歸皇極拯以茂勳輔之眀德勳德克崇兹惟假公實天降靈寧保朕躬日月蔽虧宇宙昏䝉冏然眀誠獨誓深忠豺狼為羣㹞㹞逞志咆哮奔突乘我未備公飛尺符橫制醜類變化若神邦家不墜元惡大憝誘姦作狂竊器僣名反易天常公獨挺身奮擊暴強烈烈英武歿而彌彰義振名教功存社稷贈極上台賞延真食省咎祗畏懷賢憫惻刻銘豐碑昭示萬國西平王李晟東渭橋紀功碑前人天有柱以正其傾地有維以紐其絶皇王有輔佐以濟其艱難非命厯所歸不得生良弼非君臣相合不能集大勳非暴亂𢎞多不足表忠節非奸猾熾熖不克展雄才天與事一有君字肆㑹然後臣功著而王業興焉髙祖太宗拓跡垂統掃乾坤之沴氣一作氛沴拯生靈之塗炭其受命也正其布澤也寬六宗丕承克廣前烈雖遇屯否化危成安二百年間五夷大難由內以正宸極者再自外而復都邑者三山嶽降神雲龍叶契繼生賢哲保定邦家神龍中諸武擅權甚疑作惎間王室則有若扶陽王彥範等推戴中宗紹復洪業景龍末嬖韋窺國瀆紊乾綱則有若徐國公幽求等左右𤣥宗掃除凶穢天寶之季盜起幽陵翠華南征潼關不守廣德之際戎軼邠郊皇輿東巡酆宫罷警則有若尚父子儀等殄殪醜逆册肅宗于岐攘却蕃夷翊代宗于陕建中四祀寇發上京暴蔑人神僣稱名器則有若西平王晟等剪滅大憝廓清中區惟兹數公異時同德道濟于社稷勳書於鼎彛唐之得人於斯為盛東渭橋抵王城東北四十里而國之廩積在焉始晟於此駐孤軍紏羣帥俟時而動一舉成功豫是用揚其美而紀其功以明事之有因謀之有素也粵若菲德嗣膺大寶化乖柔逺眀不燭幽淮右賊臣提一作阻兵犯順憑陵汝服震壓洛師朕憫將吏之受汙哀蒸黎之無訴罔思衛已姑務靖人亟發禁師東征不軌猶慮勝敵之未勇一作果乃徴涇師以繼之賊泚畜姦覷隙乘便餌誘貪卒扇結暴徒伺其不虞譟聚犯闕朕引咎出次薄犯二畿封豕長蛇穴處宫廟磨牙噴毒噬螫害人晟時總偏師逺戍河朔曾不俟召聞難駿奔鼓義勇仗順之師吞敗亡稔惡之寇雄威勝勢疾若颷馳屬賊帥昏迷恃衆貪亂誘我蟊賊連謀內逼朝廷載遷關河長擾豺狼塞路羿澆爭驅人煙絶於井邑隂燐交於田野物情大駭蕩然靡依晟乃設㑹軍門哭而誓衆國讐不滅無以身為遂發感激嗚咽流涕天地為之變色將帥為之動心軍中較然知有逆順晟乃一作又度公積計私課程賞典定刑章行令自身録功先下由是勇者奮力智者效謀其氣增倍其心如一屹立堅壁于渭之陽姦逆畏威而震懾忠義奮氣而聳慕分二凶之勢不敢相附為諸鎮之援俾得自堅晟之力也二月守暨乎夏五月晟知衆心可用乃揀日饗士乙未陳師于東郊如虎唐諱如豹如熊如羆凶徒接戰纍合皆北倒戈棄甲罔敵我師乘而殪之摩壘而止戊戌方旭連營進攻賊衆相驚股戰魄駭登陴而不敢拒闔門而不敢窺晟仗鉞啓行執桴親鼓斂塞也隍塹排墻垣勝氣兆於風雲威聲振於原野指顧摧靡蕩無孑遺布朝旨以寬脅從勵臣節以誅同惡乾軸傾而復紐皇維弛而更張遷梟聲為好音變祅祲為和氣然後間戎律釐軍容不喧一作傲不譁有嚴有翼搜苑囿殄遺冦清宫門授彼有司宣言于衆曰龔行天討將以遏亂略去人害王師所至歌舞從之其或矜勇恃勳作威肆掠是則以暴易暴夫何賴焉懋功有恆賞違禁有常罰惟國之令典不得以贖論敢犯令者殺之無捨爰擇便地引軍出屯馬無錯羣士必成列尅敵彌日都人莫知徐命有地之官同一作周諭鄽里士庶聞巨猾之殱殄而我師壺觴犒軍如恐不及者若赤子之保慈母涸鱗之赴洪波或欣而呼或感而泣吾是以知烈祖積德人懷其深賢臣佐時功濟斯美晟有興運之略有匪躬之誠有定亂之勳有禁暴之德俾豫從乂垂拱仰成乃册拜司徒兼中書令加實封一千戶録功第一序位居首事業編乎史册德輝流乎頌聲入為夔龍出作方召贊賀一作贊贊徽烈中外具瞻而晟居髙牧卑辭滿守約崇讓而勳閥彌耀惡盈而福祿攸歸斯又眀哲之規慎終如始者也夫制敵在謀不在衆感人以義不以威當天地屯䝉邦家離析援孤者踣黨勝者強羣心囂囂靡所止戾若風動中野波騰滄溟從而拯之豈易為力于時馬不滿百駟兵不盈萬人無郡邑土田之資無城池險阻之固獨立不懼氣吞羣凶以盡忠誓心以必死勵已以大順率衆以至誠動天衆心攸同天意允答故措軍散地而不可拔致討勍寇而力有餘國危能安軍勝能整古所謂衛社稷者晟其當之播揚休風篆刻貞石俾厥後嗣無忘乃功銘曰赫矣我唐受天眷命祖功祖德浸澤儲慶窮海請吏遐荒禀令寧一九服惠康萬姓三五以還莫之與盛逮豫不類辱守丕圗燭理匪時立誠未孚蠢爾孽臣扇兹潰徒震驚朕師黷穢皇都宇宙沸騰人神睢盱重以統戎誘姦同貫播還斯載嵗聿云半天既悔禍人胥厭亂乃錫元臣夷凶剪叛昏祲茫茫橫流湯湯挺然孤軍在渭之陽我城非完恃順為防我旅非衆同心為強由義率人人皆嚮方萬事如一爭先啓行拗憤求逞畜威斯張力足勢全時惟鷹揚以戰則克以謀則臧指麾之間羣醜潜亡鯨鯢既平宫室既清軍伍無聲都人不驚成功禁暴自昔稀有實天生德彰于厥後洋洋令名兹為不朽幽州紀聖功碑銘并序李德裕幽州盧龍軍帥檢校尚書左集作右僕射張公仲武往年修獻捷之禮今嵗有銘勳之請二者君子韙之豈不以諸侯有四夷之功獻其戎捷春秋舊典也宗周納肅慎之貢銘於楛矢天子令德也斯可以為元侯表可以為後代法聖上嘉其動而中禮乃命宰臣採其尤集本文粹作元功傳於惇史臣德裕敢揚言曰夫兵者所以除暴害也愛人則惡其為害禁暴則惡其為亂雖睿智不殺化之以神至德允懷招之以禮然書有猾夏之戒傳有修刑之訓虞舜四征二本作罪乃成大功文王一怒以至無侮非德教之助歟仁聖文武章天成功神德眀道大孝皇帝熙我大二本作文典煥而二本作乎光眀極象外之微臻於至道鼓天下之動致於中和慮必鈎深退而藏密故能神幾獨照伐未兆之謀威光逺震制不羈之虜當其時也烽燧迭驚二本作警羽書狎至人心大搖羣帥二本作師沮氣皇帝以軒后之威神漢髙之大略光武之雄斷魏祖之機權合而用之以定王業此議臣之所以延延字二本作不敢望於清光也倬哉天地應而品物生君臣應而功業成故龍躍而雲從鶴鳴而子和方叔伐獫狁蠻荆來威安逺擊車師西域震服宜有良將殿于朔邉張公禮閲戰器書成傳癖張仲孝友子孺塞泉二本作淵唐諱留落見漢書二本作㵁落不偶光景未耀眀主雅聞竒志持印而拜將軍遙推赤心築壇而命元帥拔自雄武授之薊門果能精誠奮發䇿慮愊憶二本作福臆千里獻籌一心憂國則知龍顔善將任人傑而不疑日角好謀歎敵國而強意回鶻者本北狄之裔也或曰獯狁或曰山戎五帝所不能臣三王所不能制前史載之詳矣暨薛延陀之敗也酋帥吐迷度率衆欵塞太宗幸靈武納降立回鶻部落置瀚海都督因我封殖遂雄北方代集作肅是宗之戡內難也葉護以射鵰之士親扈戎旌亦由羌髳率師以翼周北貊梟騎以助漢既滅大憝乃疇厥功集作庸特拜葉護司空嵗賜絹二本作繒二萬匹厥後飾宗女以配之立宫室以居之其在京師也淫集作瑶祠雲構甲第棊布棟宇輪奐衣冠縞素交利者風偃挾邪者景附其翎疑作翖侯貴種則被我文繢帶我金犀悅和音猒珍膳蝎蠧上國百有餘年既而桀驁無親天命不祐僣侈極欲神道惡盈本國荐饑畜産耗半黠戞斯因利乘便遂焚龍庭區文粹作墟落蕭條隂燐青熒今之烏介可汗亡逃失國竊號沙漠非我册命自為假王其來也瀰漫隂山䁹二本作俾睨髙闕𤣥塞之下氛霧蔽天質貴主以前驅依大國而求援或丐我米糒救其饑人或邀我甲兵復其故地外雖柔服內有桀心因行人置辭徴呼韓故事願居光祿塞急保受降城其下有二部曰赤心宰相那頡啜特勒赤心者天性忿鷙戎馬尤盛初與名王嗢沒斯首謀內附俄而負力怙氣潜圗亂集作厲階為嗢沒斯所給文粹作招誘以俱謁可汗戮於帳下其衆大潰東逼漁陽上乃賜公璽書問二本作授以方略公以室韋悍函二本作亟之兵近我邉鄙俾其偵邏且禦內侵尋以徴役不供為虜所敗由是介馬數萬連亘幽陵伏精甲於松樠布穹廬於磧鹵散若飛鳥止如長雲火燎于原不可嚮邇公激義氣以虹貫發精誠而石開竒計兵權密授髦雋乃命介弟仲至與禆將遊奉寰王如清左敵萬李君慶張自榮髙守素李志操率鋭兵三萬建斾而前介胄雪照戈矛林植命以義殉壯由師直聲隆隆而未泄欲逐逐而不食戢以聽命嚴而有威公曰險道傾反且馳且射胡兵所以無敵也致之平原勒以方陳我師可以逞志也於是據于莽平環以武剛首尾蛇伸左右翼張輕騎既合竒鋒橫騖如摧枯株如摶畜兔攝讋者弗取陸梁者盡二本作皆仆虜侯王集作王侯貴人計以千數然後盡衆服聽悉數係二本作索纍谷靜山空靡有孑遺槖駝駃騠風澤而散㫋墻罽幕布野畢收馬牛幾至於谷量虜血殆同於用决徑路寶刀祭天金人竒貨珍器不可殫諭乃命從事李周瞳馳傳上奏又命牙門將周從玘繼獻戎俘皇帝受而勞之羣臣畢賀昔長平七征驃騎六舉竇憲令集作合氐羌之衆陳湯檻城郭之兵或生靈减耗士馬物故文粹作痛傷或文粹無此字邀功救罪矯命專征然猶告類上帝薦功清廟顧視二漢不其恧歟以公威動蠻貊功在漏刻因命公為東靣招撫回鶻使先是奚契丹皆有虜使監護其國責以嵗遺且為漢諜自回鶻嘯聚靡不鴟張公命禆將石公緒等諭意兩部戮回鶻八百人雖介子討罪於龜兹班超行誅於鄯善未足儔也回鶻又遣宣闕二本作門將軍等四十七人詭辭結歡潜伺邉隙公密賂其下盡得隂謀且欲馳入五原大蜀本作盡毆雜虜公逗留其使緩彼師期竟得人病馬瘏縮衄而退挫鋭解紛繄公善計今鳥介自絶皇澤莫敢近邉并丁零二本作令以圗安依康居而求活盡徙餘種屈意黑車寄託逺遁流離饑凍黑車亦依其威重迫脅諸戎造謀藉文粹作籍兵解仇交質自謂約齎二本作賫深入漢將取而未期渡漠二本作幕輕留王師往而非利公以壯猷逺御集作馭長計羈縻不偷便嫌之使二本作避嫌之便終盡致集作終致盡敵之術將時動而得雋豈嵗數而勝微矧乎眀主杖集作仗將帥為爪牙視叛蕃為虎兕方獵猛獸不玩細娛非周宣無以成召武二本作虎唐諱之勳非漢宣無以聽營平之計朂哉上將光我中興公前後受降三萬人特勒二人可汗泲一人大二本無大字都督外宰相四人其他禆二本作侯王騎將不可備載王褒以日逐歸德稱為人瑞班固以稽落蕩寇大振天聲孰若天子神武百蠻震疊集作摺乘其蹙國集作困臨以兵鋒割單于之旗納休屠之附非萬里之伐無三年之勤巍乎成功輝焯後代宜刻金石以揚鴻休銘曰太和之初赤氣霄興開成之末大茀雲凝二本作彤雲暮凝異鳥南來破賊之徴北夷颷掃厥國土崩逼迫遷徙震我邉鄙長蛇去冗奔鯨失水上郡二本作都薊門近集作兵連千里曾不畏天猶為驕子丐我邉穀邀我王師假我一城建彼幡旗歸計強漢郅支嫚辭睥睨朔野伏莽見羸鴈門之北羌戎雜處濈濈羣凶茫茫大鹵縱其梟騎驚我牧圉猛若貔貅疾如風雨皇赫斯怒羽檄徴兵謀如泉默斷乃霆二本作雷聲沉機變化動若神明沙漠之外二本作北虜無隱情漁陽突騎燕歌壯氣赳赳元戎耽耽虎視金鼓誓衆干旄蔽地爰命介文粹作其弟屬之大事翩翩飛將董我王軍禀兄之制代帥之勤威掠二本作略火烈胡馬星分戈回白日劍薄寒二本作浮雲天街之北旄頭巳落絶轡之野蚩尢未縛俾我元侯恢𢎞逺略終取集作取彼單于係之徽索隂山寢烽亭徼櫜弓萬里昆夷集作吾九譯而通蠻夷既同天子之功儒臣篆美刋石闕鴻文苑英華卷八百七十一
