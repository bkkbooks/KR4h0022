body:
  text: 文苑英華卷十九宋李昉等編天象十九律中黃鍾賦一首律吕相生賦一首律吕相召賦一首葭灰應律賦一首鄒子吹律賦一首律移寒谷賦一首黃鍾管賦一首黃鍾宫為律本賦一首懸土炭賦一首律中黃鍾賦以聖人有以見天地之賾為韻裴度古者推厯生律懸法示人在寒暑之未兆已斟酌於至神故能推一陽之生為三正之始察黃鍾之氣煦然以升辨青帝之功微而可紀外去涸沍之節內見發生之理具無形而有聲徒明目而聰耳得於心而不昧藏諸身而有以人事尚昧於先春天統已彰於建子若夫衆象髙懸可伺察於穹天羣形多類可區别於厚地雖紛綸而靡極終視聽之攸記未若竹管之用前知嵗時葭灰之動罔失毫釐物之先見應必在茲取竅厚而均者當微眇而候之是則隂陽之運變化之期易以形隱難以氣欺懿其十一月之節十二辰之首因積小以成大得出無而入有遂能以吹灰於中動穀於口亦猶道之生一宛在陽之初九觀乎窮天地之性興邦國之政洎純隂之始凝導太陽之將盛何制器之精微可驗物於遼敻故曰述之者明作之者聖所以觀一管之動靜效五音之邪正斯乃造物於又玄考時於至賾就兩儀之茫昧先萬物而探索六律六吕由是以相生八風八音由茲而卒獲矧夫國家仰合天法俯回天眷既用晦而必明亦處蒙而可見敦氣數之元本去聲色於宇縣彼唐堯敬授羲和欽若未曰窮微而知變律吕相生賦以豫欲聞六律五聲為韻王起律吕以迭而相成隂陽以獨而不生總二氣而取則俾萬物而立程可以揣亭毒之理可以賾天地之情其繫時也必誠必信其吹萬也無臭無聲原夫制自伶倫迹於嶰谷始叶音於靈鳳終制器於截竹其名可紀則一暑而一寒其數可陳則隂六而陽六所以均我節物而周乎倚伏借如黃鍾建子以為本林鍾建未以為君動夷則而葉墜應姑洗而草薰霜雪因之以罔忒禽鳥候之而必聞雖覆載之莫窮而飛灰可揣謂隂陽之不測而寸管斯分故王者厯象為務職司是朂奉之以布令法之以成俗肅殺初佐於金風絪緼竟一作終調於玉燭動植無擾含靈斯足莫不因律吕之相生濟仁夀之大欲既而同其法度節其疾徐既環周之無極亦鱗次而用諸故能欽月令之不爽布嵗和之有餘八風既從兮惠化爰被十旬不散兮休徵可書伊上瑞之臨汝實疇人之起豫則律不作無以叶五音之術吕不助無以成萬物之實洞於精微生於隂隲在孕育以咸暢處金石而無失則吹於寒谷不惟鄒子之方叶於樂府奚獨延年之律我皇欽若時令克諧宫羽來逺人而風雲表祥張大樂而鳥獸率舞是知順相生之義而德冠乎三五律吕相召賦以聲氣相叶如響之應為韻昔者聖人稽天地之本達造化之方將以律而召吕明自隂而應陽清濁所資叶贊之功共有煦吹無滯輔成之理更相所謂以氣而導聲以聲而宣氣用諧和而感通上下假欣合而生成品彚窮神於短長之象動必相須會數於九六之爻用而不既當其二儀方闢萬化攸初以嶰谷厚均之美審葭灰聚散之餘氣類潛通若琴瑟之心相感雄雌既辨比鳳凰之德皆如亦由顧影而形分命宫而商應合君臣際會之理得夫婦剛柔之稱精誠所致雲龍之感召必同終始相明日月之循環可證若八風順序六氣和平等四時之代運符五位之相生定寒暑之功必能成嵗審疾徐之度亦足和聲故得天理不姦物情和愜草木以之而暢遂乾坤於焉而交接兵家之否臧未兆懸以先知樂府之聲音所諧動能允叶今也初陽應候萬物思時念惠風之將入顧寒谷而奚疑必使法軒轅之明方今可也如或繼伶倫之妙何代無之於是放志希夷凝心惚恍酌動靜之理於開闔逹感應之情於影響今所以賦律吕之事莫不欲使百王而共仰葭灰應律賦以四時運行應候不差為韻葭灰陽物銅管隂類陽物以健動為宜隂類以虛受為器一則本乎天一則通乎地因時出矣本乎天者親上乘氣泄焉通乎地者啓閟感兩儀以成道應六管而為事明夫律通則氣來灰動則時至知晝夜之迭代表子午之更位辨方辨卦乃立節以為八定至定分故均氣以為四於是聖人設矣君子用之于以則地氣于以奉天時仲夏將臨則蕤賓啓候孟秋既屆乃夷則應期大吕具實而冬窮於丑太簇已散而春蠢於寅可謂自微形著有條不紊明天道之大備則帝道之廣運且夫範金以為律當其空有律之名燔葭以為灰當其動用灰之輕律之空則或吐或納灰之輕則有虛有盈由是識坤德之順靜探乾德之逰行其入也柔順其出也剛勝或處陽而隂主或在隂而陽孕見律中而灰動知地感而天應如此神可以窮數可以究事可得而待時可得而候是以聖人執茲一柄形彼九有時寒暑之往來辨昏眀之然不夫物之妙用則感於無為物或不爽則應用無差彼葭灰之造微與天地而冝契我皇敬授不忒故能燮理無虧鄒子吹律賦以吹律洞微寒谷生黍為韻鄒子處寒谷之陲審至音之宜能噓吸而律應使嚴凝而氣移驗乎卜居殊緹幕之攸設稽乎假器匪葭灰之所吹當其地映嶔崟山連鬱律夏皚皚而多凍晝蒼蒼而少日草木絶其滋榮飛走悲其慘栗雖彈絃於帝舜孰致其和雖扣角於師文必慙其術由是鼓其用濟于衆將鈎深以致逺在識密而鑒洞響發於寒威氣感於春輝何斷續而臻極乃洪纎而入微飂飂其和土囊之風乍出淒淒稍變夾鍾之律方歸逸韻未殫發越林巒始驚蟄於煦嫗俄解凍於淒寒誰謂暖氣早來節奏於絳脣之末誰謂溫風潛扇抑揚於玉指之端于以闡溫燠于以發亭育鄙玄鶴之舞庭類雕虎之嘯谷清泠散徙岡聮嶺屬疇人慙其術窮田父欣其野沃則十旬不散之瑞其事未榮南薰一作軍不競之占其理未精孰若探至賾究幽情化烈烈之瘠土成薿薿之嘉生豈比夫廟列零陵徒聞白琯之麗竹收嶰谷空為丹穴之鳴别有翻飛之侣暄妍是處固將嚶嚶以出谷豈獨離離而生黍律移寒谷賦以至人感音能變生植為韻張友正惟北有谷純隂之位無溫煦以生成失膏腴之美利是吹孤竹之管將變不毛之地聲能叶候期四序以平分氣乃應時見三陽之揔至伊彼鄒衍仰師伶倫窮雅韻於條暢得和聲於厚均爾乃循窈窱傍嶙峋有薰風以舒物敷順氣以和人一奏而層氷以解再揚而稿木驚春是知道契至精事符玄覽谷居隂靜宜隂慘之莫舒律屬陽方因陽和而相感且陳夾鍾之管召清角之音聲之所涵者博志之所逹者深律氣旁通於陽氣人心上導於天心夫乾德無隔土宜有恆南無嚴凝北無鬱蒸若變寒為燠昊穹所未必能以荒為稔后稷所不足徵將祁寒之恆若諒大化之何稱爾乃天下盛陽此谷飛霰日中方晝此谷見晛豈無三光曾照臨之不遍雖有四氣曾沍寒而莫變寧知至人爰來陽律斯扇清音未發猶萬壑之荒涼和風方流忽千林之蔥蒨故谷得陽以盈陽因律以生田疇以之沃衍節氣以之和平我墟既耕我黍既成耦十千而南東其畝㕓三百而庾廩如京實無窮之嘉績與造化而爭衡别有處幽谷而思遷待暄風而撫翼空勞苦寒之詠獨厲後凋之色儻一借於吹噓願均榮於動植黃鍾管賦以一陽既生三元克序為韻黃帝稽六氣正三光頒命於伶倫之職伐竹於嶰谷之鄉創管籥於分寸審制度於毫芒為十二之首律道初九之潛陽伺青陸之功微而可紀察黃鍾之氣暗然而彰所以位定於初道生於一將啓四分之厯潛運三重之室取厚竅而均者當分至而藏密統緹幔以依辰布葭灰以候律經天順地察晷度而有常隂伏陽回知萌芽而溥出超土圭之至理得銅渾之妙術在沍涸之窮冬引發生之遲日既而推萬物之道統三正之元清濁既分於上下躔次不愆於晝昏是日也百辟稱賀萬邦以則垂元化於本始體髙明於柔克一氣潛應定立均於數源七曜旋行酌至神於物極變化之道周流可測人事尚暗於先春天統已彰於陽德繇是平之以六紀之惟三仰經綸之祕奧終視聽之所覃單穆不獨稱其美周景抑亦懷其慙故以鳳為名也於盡善而稱未以律為候也實用之而不既振潛伏以蒙泉贊玄微以通氣靜室無聲微風不驚吹灰於中八音由是乎卒獲動榖於口五聲以是乎相生國家上法黃軒推衡律吕覘一律之動靜俾四時而式序彼唐堯敬授羲和欽若未曰窮於寒暑者哉黃鍾宫為律本賦以究極中和是為天統為韻王棨玉律奚始黃鍾實先潛應仲冬之候仍居大吕之前聲既還宫初協乎八音七始數從推厯終由其兩地參天當其黃帝命官太師授職參六宫以迭用本一陽而立則八風自此以條暢萬物於焉而動植權衡有凖知纍黍之無差寒暑相生諒循環而不極是知召吕者律為君者宫既從無而入有可原始而要終聲雖發外氣本從中或煦或吹根初九爻而立紀日來月往守十二管以成功懿夫肇啓乾坤潛分節候見厯數以無紊顧萌芽而欲秀革彼應鍾先乎太簇克諧韶濩唯子野以能知自得厚均匪伶倫而莫究故洪纎溥暢上下無頗騰葭灰而漸散映緹幕以方多初感于人復京房之姓氏終均於地成燕谷之陽和俾玉燭以調均與璿璣而錯綜于以宣夫四序于以貞乎三統自然功歸不宰理叶無為蓋隂陽之變化信氣序之推移雄鳳鳴而雌鳳應蓋皆類此商為臣而徴為事未足方斯為律之本兮既如彼為天之統兮又如此明廷樂叶寧俟於李延年皇上聲撝豈慙於夏后氏既而榮發枯稿春流遐邇願一變於寒枝獲生成兮若是懸土炭賦以寒暑相參輕重可驗為韻王起國家順天之情作人之程乃懸乎土炭有象夫權衡惟土也叶隂氣之動惟炭也應陽氣而生故將法之而令出瞻之而教成乃左乃右一重一輕苟二物之不爽知四序之攸平有司修厥官承厥緒繩木有凖鈞銖獲所香炭於是而善繫纍土由之而具舉分乎多少則無黨無偏候以髙卑知一寒一暑若乃芳嵗闌嚴更殘黃鍾中律黑帝司官昴中見而昭晰日北至而沍寒於是岌岌斜指亭亭上干土則從輕知衆隂之將謝炭惟持重知一陽之已攢暨夫春令變木夏德司火鹿解角而氣新君登臺而物夥二氣交而猶昧六律推而未可然後懸法示人表微在我觀夫炭則髙而漸危窺夫土則垂之如墮彼銅渾兮自慙空鎔鑄以相參彼金壺兮可厭從晝夜而為驗孰若土炭之有常為邦國之舊章恆不飾而不美無玉振與金相影每分於髙下色且對乎玄黃不假飛灰自符於律吕何必測影而知夫短長向若鴻爐長爇厚地斯藏安足以調夫四氣而傳之百王於赫大君穆然端拱懸之而無冬無夏法之而是遵是奉信不謬於隂陽詎可欺其輕重文苑英華卷十九
