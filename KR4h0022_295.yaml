body:
  text: 文苑英華卷二百九十五宋李昉等編行邁七劉駕二首李頻三首劉滄二首喻坦之四首陳陶八首楊夔一首許棠五首司空圖四首鄭谷六首崔塗四首張喬六首羅鄴四首杜荀鶴五首王貞白二首曹松五首羅隱七首裴説四首早行劉駕馬上續殘夢馬嘶時復驚心孤多所虞僮僕近我行棲禽未分散落月照古城莫羡間居者溪邊人已行出門前人出門羡他人奔走如得途翻思他人意與我或不殊以兹聊自安默默行九衢生計逐羸馬每出似移居有從我鄉來但得鄰里書田園幾换主夢歸猶荷鋤進猶希萬一退復何所如况今闢公道安得不躊躇初離黔中泊江上李頻去去把青桂平生心不違更蒙蓮府辟兼脫布衣歸碧岫明殘雪清波漾落暉無窮鷗鳥興日起棹前飛八月峽石一作口作前人萬里西南水秋來滿峽流亂山無陸路行客在孤舟洶洶灘聲惡冥冥樹色秋免為三不吊終白一生頭黔中罷職泛江東前人黔中初罷職薄俸亦無殘舉目鄉關逺携家旅食難野梅將雪競江月與沙寒兩鬢愁應白何勞把鏡看早行劉滄旅途乘早起一作景䇿馬獨凄凄殘影郡樓月一聲關樹雞聽鍾煙栁外問渡水雲西當自勉行役終朝疑作期功業齊秋月旅途即事前人驅羸多自感煙草逺郊平鄉路幾時盡旅人終日行渡邉寒水驛山下夕陽城蕭索更何有秋風向鬢生大梁道别見二百八十二卷喻坦之發浙江前人島嶼遍含煙煙中濟大川山城猶轉漏沙浦已搖船海曙霞浮日江遙水合天此時空闊思翻想涉窮邉晚泊盱眙前人廣葦夾深流蕭蕭到海秋宿船橫月浦驚鳥繞霜洲雲濕淮南樹笳清泗水樓徒懸向國思羇迹尚東逰東一作春歸江南前人歸日值江春看花過楚津草晴蟲網遍沙曉浪痕新蓮華初浮水鷗雛已狎人漁心慙未遂空厭路岐塵早發始興陳陶雲裏山已曙舟中火初爇緑浦待行橈玄猿催落月沿流信多美况復秋風發挂席借前期晨雞莫嘲􅑜清源途中旅思前人古木閩州道驅羸落照問投村礙野水問店隔荒山身事幾時了蓬飄何日間看花滯南國鄉月十灣環濟浙江已見二百六十二卷前人畨禺道中作前人博羅程逺近海塞愁先入瘴雨出虹蝀蠻江渡山急常聞島夷俗犀象滿城邑鴈至草猶春潮回檣半濕丹丘鳯凰隱水廟蛟龍集何處樹能言幾鄉珠是泣千年趙他國霸氣委原隰齷齪笑終軍長纓禍先及鍾陵道中作前人原隰經霜蕙草黃塞鴻消息怨流芳秋山落照見麋鹿南國異花開雪霜煙火近通槃瓠俗水雲深入武陵鄉曾逢齧缺話東海長憶蕭家青玉床旅泊塗疑江前人煙雨南江一葉微松潭漁父夜相依斷沙鴈起金精出孤嶺猿愁木客歸楚國柑橙勞夢想丹陵霞鶴間音徽無因得似滄溟叟始憶離巢已倦飛上建溪前人崆洞一派㵼蒼煙長揖丹丘逐水仙雲樹杳冥通上界峯蠻回合下閩川侵星愁過蛟龍國採碧時逢婺女船已判猿催鬢先白幾重灘瀨在秋天冬暮旅泊廬陵前人螺亭倚棹哭飄蓬白浪欺船自向東楚國蕙蘭增悵望畨禺筐篚旅虛空江城雪落千家夢汀渚氷生一夕風棄置侯鯖任羇束不勞龜瓦問窮通寧州道中楊夔城枕蕭關路胡兵日夕臨唯慿一炬火以慰萬人心春老雪猶重沙寒草不深如何驅匹馬向北獨間吟早發洛中許棠昨夜别清洛不知過石橋雲增中嶽大樹隱上陽遙塹黑初沉月河鳴欲認潮孤村人尚夢無處暫停鑣客行前人日日唯草草此生誰我同故國夢魂外長恨别離中人事萍隨水年光鳥過空欲吟先落淚多是怨途窮雕隂道中前人五月綏州北途程少鬱蒸馬依羶草聚人抱濁河澄邉人多以瓦澄水疆固長城壘寃深太子陵往來經此地悲苦有誰能過湍浦谷前人西去窮湖處岩崖境不常石形相對聳天勢一條長棧底鳴流水林端斂夕陽雖隨兵馬至未免畏豺狼春日鳥延道中前人窮途厄未窮復此逐歸鴻去路多相似行人半不同山川藏北狄草木背東風虛負男兒志無因立戰功江行二首司空圖地闊分吳塞楓高映楚天回塘春盡雨方響夜深船行紀添新夢羇愁甚往年何時京洛路馬上見人煙二初程風信好回望失津樓日帶潮聲晚煙含楚色秋戍旗當逺客島樹轉驚鷗此去非名利孤帆任白頭浙江二首前人華下支離已隔河又來此地避干戈山田漸廣猿時到村舍新添燕亦多丹桂石楠宜並長秦雲楚雨暗相和兒童菜熟迷歸路歸得仍隨牧竪歌二西北鄉關近帝京煙塵一片正傷情愁看地色連空色靜聽歌聲如哭聲紅蓼遮村人不在青山繞檻路難平從他煙棹更南去休向津頭問去程潼關道中鄭谷白道曉霜迷離燈照馬嘶秋風滿關樹殘月隔河西來往非無倦窮通豈易齊何年歸故社破雨剪春畦江行前人漂泊病難任逢人淚滿襟關東多事日天末未歸心夜雨荆江闊集作漲春雲郢樹深殷勤聽漁唱漸漸入吳音舟行前人九𣲖迢迢九月殘舟人相語且相寬村逢好處嫌風便酒到醒來覺夜寒蓼水白波喧夏口柿園紅葉憶長安季鷹可是思鱸鱠引退自知時所難集作知時自古難逰蜀前人所向明知是暗投兩行清淚語前流雲橫新塞一作寨遮秦甸花落空山入閬州不分黃鸝驚曉夢惟應集作起杜宇信集作起春愁梅青麥緑無歸處可得漂漂愛浪逰倦客前人十年五年岐路中千里萬里西復東匹馬愁衝晚集作曉村雪孤舟悶阻春江風達士逰來知道在昔賢何必哭途窮間烹蘆笋炊菰米會向漁鄉作醉翁下峽前人憶子啼猿繞樹哀雨隨孤棹過陽臺波頭未必人頭白瞥見春風灔澦堆商山道中崔塗一日又將暮一年看即殘病知心事少老别故人一作交難山盡路猶險雨餘春却寒那堪更回首烽火是長安夕次維揚道中前人秋風吹故城城下獨吟行高樹烏已息古原人尚耕流年川暗度往事月空明不復嘆岐路馬前塵後生巴山道中除夜書懷前人迢遞三巴路羇危萬里身亂山殘雪夜孤燭異鄉春漸與骨肉逺轉於僮僕親那堪正漂泊明日嵗華新途中懷感前人久客厭岐路出門吟且悲平生未到處落日獨行時芳草長不緑故人無重期那堪更南度鄉國已天涯商山道中張喬春去計秋期長安在夢思多逢山好處少值客行時雲起爭風勢花交隱澗枝停驂一惆悵應秪嶺猿知荆楚道中前人前程曾未到岐路擬何為返照行人急荒郊去鳥遲春宵多旅夢閏夏逺相期處處牽愁緒無窮是栁絲江行前人江風木落天行子感流年萬里波連蜀三更雨到船夢殘燈影外愁積葦藂邉不是貪名利家無負郭田吳江旅次前人行人愁落日去鳥倦遙林曠野鳴流水空山響暮砧旅徒歸計晚鄉樹别年深寂寞逢村酒漁家一醉吟東歸有感前人東風搖衆木即又見花期紫陌頻來日滄江獨去時郡因兵役苦家為海翻移未老多如此那堪鬢不衰宿照應前人夜憶開元事凄涼里巷間薄煙通魏闕明月照驪山半壁空宫閉連天白道間清晨更回首猶向灞陵還巴南旅泊羅鄴巴山慘别魂巴水徹荆門此地若重到居人誰復存落帆紅葉渡駐馬白雲村却羡南飛鴈年年到故園東歸前人日日惟憂行役遲東歸可是有家歸都緣桂玉無門住不算山川去路非秦樹夢愁黃鳥囀吳江鈎重一作憶錦鱗肥桃夭杏艷清明近惆悵當時意兩違早發前人一點殘燈魯酒醒已携孤劒事離情集作程愁看飛雪聞雞後獨向長空背鴈行白草近關微有路濁河連底凍無聲此中來往本迢遞况是驅羸客塞城行次前人終日長程復短程一山行盡一山青路傍君子莫相笑天上由來有客星秋江集作夜晚泊杜荀鶴一望一蒼然蕭騷起暮天逺山行落日歸鳥渡平川家是去年别月當今夜集作夕圓漁翁似相伴徹曉葦藂邉秋日旅中前人浮宦集作世浮名能幾何致身流落向天涯少年心壯輕為客一日病來思在家經雨凍蟬隨葉墮過湖秋鴈趂雲集作風斜前程雖有投人處爭奈鄉關日漸賖集作山頂老猿啼古木渡頭新鴈下平沙不堪吟罷西風起黃葉滿庭寒日斜早發前人東忩未明塵夢蘇呼僮結束登征塗落葉鋪霜馬蹄滑寒猿哭月人心孤時送集作逆帽簷風刮項旋呵鞭手凍粘鬚青雲快活一未見爭得安間釣五湖舟行即事前人年少髭鬚雪欲侵别家三日幾般心朝隨商客憂風色夜逐漁翁宿葦林秋水鷺飛紅蓼晚暮山猿呌白雲深重陽酒熟茱萸紫却向江頭倚棹吟春日行次錢塘却寄台州姚中丞豈謂無心求上第難安帝里為家貧江南江北間為客潮去潮來老却人兩岸雨收鶯語栁一樓風滿角吹春花前不獨垂鄉淚曾作集作是朱門寄食人曉泊漢陽渡王貞白落月臨古渡武昌城未開殘燈明市井曉色辨樓臺雲自蒼梧去水從嶓冡來芳洲號鸚鵡用記禰生才隨計前人徒步隨計吏辛勤鬚易凋歸期無定日鄉思羡回潮冒雨投前驛侵星過斷橋何堪穆陵路霜葉更瀟瀟南逰曹松直道南箕下方諳一作諸漲海頭君恩過銅柱戎節限交州犀占花隂卧波銜瘴色流逺夷君不樂自是北人愁荆南道中作前人十月荒郊雪氣催依稀愁色認陽臺逰秦分繫三條燭出楚心殊一寸灰高栁莫遮寒月落空桑不放夜風回如何住在猿聲裏却被蟬吟引下來嶺南道中前人百花成實未成歸未必歸心與志違但有壺觴資逸詠盡交風景入清機半川隂霧藏高木一道晴霓雜落暉逰子馬前芳草合鷓鴣啼歇又南飛春日自吳門之陽羡道中書事前人勝異恣逰應未遍路岐猶去幾時還浪花湖闊虹霓斷桞線村深鳥雀間千室綺羅浮畫楫兩州絲竹會茶山眼前便是神仙事何必須言洞府間將入關行次湘隂前人背顧秦城在何處圖書作伴過湘東神鴉亂噪黃陵近候鴈斜沉夢澤空打槳天連晴水白燒田雲隔夜山紅也知漸老巖棲穩爭奈文闈有至公南康道中羅隱弱冠負文翰此中聽鹿鳴使君延上榻時輩仰前程丹桂竟多故白雲空有情惟餘路傍淚沾灑向塵纓西上集作所思前人西上青雲未有期東浮滄海一集作去何遲酒闌夢覺不稱意花落月明空所思長恐老集作病侵多病集作事日可堪忙過少年時鬪雞走狗五陵道惆悵輸他輕薄兒過廢江寧縣王昌齡曽尉此縣前人縣前水色細鱗鱗一為夫君吊水濵謾把文章矜後代可知榮貴是他人鶯偷舊韻還成曲草賴餘吟盡解春我亦有心無處説等間停棹似迷津東歸途中作前人松橘蒼黃覆釣磯早年生計近年違老知風月終堪恨貧覺家山不易歸别岸客帆和鴈落晚程霜葉向人飛買臣嚴助精靈在應笑無成一布衣金陵夜泊前人冷煙輕淡傍衰藂此夕秦淮駐斷蓬栖鴈逺驚沽酒火亂鴉高避落帆風地銷王氣波聲急山帶秋隂樹影空六代精靈人不見思量應在月明中東歸前人仙桂高高似有神貂裘弊盡取無因只集作難將白髮期公道不覺丹枝屬别人雙闕往來慙聘集作請謁五湖歸後耻交親盈盤紫蟹千巵酒添得臨岐淚滿巾早行集作早發前人北去南來無定居此生生計竟何如酷憐一覺平明睡長被鄰雞半夜啼過洞庭湖裴説浪高風力大挂席亦言遲及到堪憂處爭如未濟時魚龍侵莫測雷雨動須疑此際將情賴何門寄所思旅行聞冦前人動步憂多事將行問四鄰深山不畏虎當路却防人豪富田園廢疲羸屋舍新自慙為旅客無計避煙塵旅中作前人妄動逺拋山其如餒與寒投人言去易開口説貧難澤國雲千片湘江竹一竿時明未忍别猶待計窮看旅次衡陽前人欲往幾經年今來意豁然江風長借客嶽雨不因天戲鷺飛輕雪驚鴻呌亂絃晚秋紅藕裏十宿寄漁船文苑英華卷二百九十五
