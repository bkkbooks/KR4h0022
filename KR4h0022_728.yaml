body:
  text: 文苑英華巻七百二十九宋李昉等編餞送十二送從舅泳入京序一首送三從弟長孺擢第後歸徐州覲省序一首送再從弟少清赴潤州叅軍序一首送從兄頴遊江西序一首送從兄立赴崑山主簿序一首送從叔赴任鄱陽序一首送三從弟况赴義興尉序一首送𤣥上人歸天竺寺序一首送道依闍黎歸婺州序一首送靈澈上人廬山廻歸沃州序一首送渾淪先生遊南岳序一首送從兄南仲登科後歸汝州舊居序一首送鈕秀才謁信州陸員外便赴舉序一首送獨孤孝亷應舉序一首送興平鄭少府歸上都覲省序一首送巴東林明府之任序一首送鹽山林少府之任序一首送常熟許少府之任序一首送建上人訪尋陽司業後詣涇原劉行軍序一首送元和上人徃五䑓山序一首送李孝亷及第東歸序一首送洪孺卿赴鄉舉序一首送族叔行元落第歸廣陵序一首送薛大信歸臨晉序一首送從舅泳入京序權徳輿從舅詞甚茂行甚修嘗見其縁情百餘篇得騷楚之遺韻故江南煙翠多在其集作句中蓬累江湖坎壈終嵗而衣不襲突不黔彼乘堅驅良㓕沒於康莊者復何人哉繇從舅而言可以言命冬十一月方以大袂單衣挈書笈西遊且見訪曰予不試乆矣道不可以終寠今將遊上京抵名卿以决出處其可乎哉徳輿曰時有通塞道有顯晦審時行道惟賢者能之今王度清夷紀律昭明宴安迷邦是為大謬是舉也得審時行道之宜矣又何敢規送三從弟長孺擢第後歸徐州覲省序前人吾嘗思天下之理必求其端於士行博厚人文昭明則理道從之孤卿大夫皆繇士而進得不謹於初以自重耶然則鏌干之刃騄驥之歩百錬千里必俟知者此長孺所有獲進於左君之門也左君嘗貳六官之半復以綱轄再臨儀曹銛鋒絶足於是乎得且爾齠嵗集作年秀發好學不遷迨乎弱冠餘勇可賈脩詞體物講貫習復發鏃集作功中的觀者偉之夫毎嵗登名者四方之人皆属耳目以評其當否不可誣也若爾之敬遜務時敏沛然得之異時逺至如在歩武矣吾與長孺曽王父在永崇開耀集作輝非之間繼以賢能之書來獻于王庭徳名家法華蕚相輝暨吾早嵗亦將砥礪充賦而先友過聽遽以名聞蓬茅之中未筮而仕既而中外族姻有以前心見勉者吾以為雖冗員觧巾亦君所命也豈可更名越禮以孟晉求售耶循性所安遊寓湖海或辱賔召亦嘗從之頃嵗以禮官徴在闕下因縁朝奬忝冐清近既非所宜居常缺然嵗時易過道義難就視爾之年猶前日耳毎思孔孟不惑不動心之言以為元龜而未能也然則舉於鄉者士君子之本爾能聿脩其慰如何叔父以廷尉評典城于蘄集作豊里有課最家有教義駕言歸寧拜慶上堂青純被體桂枝在手服名教者相賀况吾之心耶宗門單尠羣從集作從弟之登集無登字仕次者不十數軰相愛以誠惜别為甚因爾之文藝徴吾之出處故詞雖繁而不能已也噫風水之積厚也方可以負大舟大翼爾其勉之集有其字餘則節食集作良㑹慎夏寓書而已十四年四月從曽祖兄徳輿叙送再從弟少清赴潤州叅軍序今年羣從之調試於天官春官者以十數興亷舉秀既有其人而少清以經明觧巾叅南徐州軍事其伯氏掾周衛叔氏簿郟城代耕話别徴詩導志夫千里足下九江濫觴致逺就深在乎不已况爾文敏脩㓗澡身立誠康莊渤澥吾見其徃至如鮑昭之詞律孟嘉之風流又其次也想自丱嵗僑居是邦趨朝七年束一作榮以紳珮烟霞井田如在目前舉白祭軷離憂加等尚書公以政成事簡鎮安一方幕庭婉婉多我之執爾其敬恭以事長者求為可知闇然日彰嚮吾所謂不已之道在此而已十三年三集作二月醉後序送從兄頴遊江西序昔安丘敬公以王佐之才而運丁符氏故經綸大畧堙阨不振如其乘時行道可以財成家邦豈止於相區區前秦與王景略齊名而巳時軋道塞從古以然徳輿與兄實承安丘之遺烈其後枝流以食舊徳故兄能踐中行蹈貞厲守師氏之訓脩君子之詞慤静而用晦誠謙以居約者向二十年衮衣大帶名未登於王府方以一葦為航遊江湖間今將省家於上饒順流於潯陽羈旅之中未始以進趣為念鄙則不敏粗為哲兄言之自十數年間戎車居天下之半故純白清静之士多欝而不發其或倚佳名集作兵席世集作勢卿以取貴富者皆朝為屠沽夕拖章組風波變化以萬萬計其次或雜與諸生之徒冠柱後惠文持從事使者之檄溢於府寺諠於傳置風流不還聲實相逺然則得喪本不足以滑曠士之慮又况今之得喪耶先師曰知足者不以羡自累行脩於内者無位而不怍此二者可以書紳而三復也鄙夫所獻者如斯己矣如其地理所歴與煙霜之候皆備於詩人之思此略而不書送從兄立赴崑山主簿序士君子筮仕之門有以代徳庥廕而奉清廟齋祠者及夫試吏就禄與秀才孝亷郎等盖以舊服流慶後昆宜之其於奬人為善之義深矣從兄承舄奕簮纓之後荷葳㽔文誼之訓敏於學行而薄於宦名乃今調於天官署崑山主簿以姑胥之通邑士衡之佳句僑舊耕種集作植多依是間上有良二千石為東諸侯表率其飾躬敬事夙夜勤敏推輪積水或在茲乎從弟中書舍人徳輿序其所繇俾群從偕賦奉送從叔赴任鄱陽序叔父端懿誠厚退然自牧博洽前載不以沽名待價為心徳輿覊丱時伏見從叔義興君户部君送别二序自前秦安丘敬公至周千金恭公而下徳善功烈辨其昭穆叔父承千金廣川清水三葉紹封之慶其素履淑行二叔父實詳言之爾來三十餘嵗矣服義日茂用晦如初以仁愛任恤復趨選部銅章列城得之不勤昔季路宓不齊理蒲與單父為孔門上第𢎞之在人仁逺乎哉况畨君故地理通下邑其壤沃其境清惠和簡亷可以游刃異日九江之西上百里課第於有司者其在叔父乎佐酒霑醉歌詩為禮有命曰爾宜序謹序送三從弟况赴義興尉序漢廷諸公皆附經術而施政事故其有猷有為不疚不懼若况者嘗理左右史記事記言之經傳謩訓居有司藉奏中乃令叅調署吏以養以仕言顧於行行本於經脩性勤身而禄在其中矣夫學者病口𨽻其言而心不能通故吾三年第經明者三百餘士而知類通逹者徃徃有焉嘗與賢諸侯河東柳敬叔吴郡陸伯冲寓書徃復論取士之道二君子言之頗詳若况之所履其吾與二君子之所欲求也豈無多文之富耶而况不耀豈無趣揵之敏耶而况不為盖質素者受采必固平夷者遵道必逺况之志其在是乎吾與况也行以五綵衣裳視朝夕膳裘褐初觧綬黄甚新彼陽羡有佳山水玉潭東舍溪南岳洞靈仁祠僊觀邑子郷尊窮年勝賞筮仕於斯其樂如何有以賀義方之慶輕少别之戚伯仲羣從類其詩文亦命小子􅟛繫集作繁非於編末時皇帝御極甲子赦令之後一月也送𤣥上人歸天竺寺序度門之教根於空寂因修以取證階有以及無不踐精深之習而悟虛無之理者未之有也未得為得則其病歟僕乆味斯法思與言者既而得𤣥禪師師早誦大乘經各集作㣲言數萬言晩得觀門之學今則色空如一哀樂不入矣桑門之患有二焉未得之患為外見所雜既得之患為内見所縳今𤣥公翛然於二見之間集作門不内不外𡨕夫至妙身戒心惠合於無倪且以勾吳有山水之絶境天竺又經行之静界振錫而徃其心浩然盖隨縁生興觸物成化而不為外塵所引也幅巾男子權德輿稽首送道依闍黎歸婺州序予與惠公游十年而惠公以其徒依公見訪靄然之和發於眉宇得其道者不待言說予嘗欲黜健羡遺名聲不使塵機世相滑湣靈府故毎隨縉紳士則神怠與依惠游則性勝盖循分而動亦境所由然上人以東陽為山水佳地且生約二徳昔所游踐况雲洩石室花發桃巖是二精舎為東南甲乙乃振緇錫泛然而行道機法樂盡在是矣如僕者方牽攣世教未得與師為方外之遊遐情幽賞期一二偈䟽送靈澈上人廬山廻歸沃州序昔廬山逺公鍾山約公皆以文章廣心地用賛後學俾學者乘理以詣因言而悟得非𤣥津之一𣲖乎吳興長老晝公掇六義之精英首冠方外入其室者有沃洲集作州通用靈澈上人上人心𡨕空無而跡寄文字故語甚夷易如不出常境而諸生思慮終不可至其變也如風松相韻氷玉相叩層峯千仭下有金碧聳鄙夫之目初不敢眡三復則淡然天和晦於其中故睹其容覧其詞者知其心不待境静而静况㑹稽山水自古絶勝東晉逸民多遺身世於此夏五月上人自鑪峯言旋復于是邦予知夫拂方袍坐輕舟泝沿鏡中静得佳句然後深入空寂萬慮洗然則嚮之境物又其稊稗也鄙人方景慕集作行企尚之不暇焉集作惡敢以離羣為歎送渾淪先生逰南岳序李逺予丱嵗時遇渾淪於荆溪徒見其山中疑衍巾羽衣有𤣥古之貌瞻敬不暇未遑問道倐然一别俄六七年今茲獻春相訪于練湖之濵藥囊葵杖就舘於我參希夷之㫖折萬物之理皆發於全樸𡨕于大道集作通非夫人之為道道烏乎在嘗以郭氏注莊生之書失於脗合萬物物無不適然則桀鷔饕戾無非逐性使後學者懵然不知所奉因自爲注觧并作三十三篇指要佳言精理特出古人之右矣夫然者睹其容則鄙恡無自入聞其言則和易浹於内兩忘所得得之至也既而振拂屨杖超集作冷然逺逰浮洞庭陟廬阜然後揮手人世南登衡山將長徃而不返耶或蹔遊人間而不可得見之耶予風波之人未脫世累得以愚薄自全静每造適今日之别在於忘言送從兄南仲登科後歸汝州舊居序前人古者採詩以辯志升歌以發徳繫於時風播為樂章有不類者君子羞之今兄能泝其末流詠于深源志之所之不遷於物以為洙泗弟子起予者商而又嘉囬之屢空鄙賜之屢中故帶經食力耕於汝山之下環堵蓬茨若廕華榱逸韻麗藻鏘然在聴去嵗臨汝守首賢能之書貢于儀曹瞻言正鵠審固則獲前此亦嘗失之矣退實無愠羸而不囂盖能反諸巳而巳且用亷賈之道故也今將抵洛郊歴平陽與賢諸侯交歡假道然後自洛之汝燕居中林磅礴古昔務居逺大鶯出幽谷鵬擊南溟將與羣從叔季復修異日之賀豈止於今耶南宫郎有雅知兄者且與徳輿為僚徴詩貺别以附其志謹序送鈕秀才謁信州陸員外便赴舉序前人清旭燕居有秀才鈕氏以儒者衣冠訪我於衡門之下用文一軸與刺偕至訪其行也則曰將抵賢二千石陸上饒然後自江而西射䇿上國且上饒以偉詞邁氣待東南之士士至必循分加禮繇是褒衣之徒耻不登其門故殿中韓侍御亢直工為直詞嘗貺若以序故臨海守李君子從父户部皆以文義風騷為師友又貺若以詩矧夫植文行於内親仁賢於外強學不倦㓗巳以進今茲行也以桂林一枝為已任豈虚也哉辱徴不腆是用詞逹送獨孤孝亷應舉序取士以孝秀二科古道也家有賢者時論多之君子之羣從皆以文藻射䇿或致位郎署今孝亷又以温凊之餘力行居業業茂行脩西逰太學吾子當集作知天上第之後衣春服吟舞雩東還南徐拜慶堂下粲粲門子經術發身古人有俯拾地芥之說斯濫觴矣送興平鄭少府歸上都覲省序穆員凡我東周之逰誰非君子之門吏子之至也惠羣公之思且惜其去之速子有别墅我為甘棠富清溪翠竹豐流鸎宻樹比而遐幽而曠羙而不華野而不陋用厥羣勝甲於東溪四月之節其芳始茂葉成清隂花結朱實中林摧籜碧玉呈鮮麥風之秋與輕暑偕至二三子春醪夏服於是乎宜之陟則在庭降則在舟湍冷竹韻合如簫管時有山鳥雜乎其間羣籟同音俱以留客而嚴城暮日與林泉意殊奪我當歡趣子命駕諸公以為他日過庭之問一作間次詩禮者其惟吾黨與東溪乎屬事徴詞實假㑹文之友况吾子以言以立可乆可大作者之意不惟系召南之什宜用緇衣之美副焉送巴東林明府之任序歐陽詹國以人為本縣令親人之親者茍有命授無非慎擇今年執政又加精選自吏曹銓擬仕集作枉而退下者十之五六濟南林公以始仕之調發硎之刄請宰一邑天官劇巴東也而使為之平衡無疑鈞軸不轉非輕重質噐目以昭如則安可於其難而易若此觧褐結綬當時之盛既受牒恭命而南征集作濟南公與予郷而且故㓜而知公行先郷曲譽是通閭井之意術以經明集作明經升實操教化之本今有社稷有民人則弓矢入養叔之手徽絃在師曠之膝何㣲之不中何妙之不盡去矣無使朱邑魯恭專美集作何是官其餘則巫峽峨峨岷江湯湯水天下清山天下秀逰盤貴境為池為墉退公暇而集作多暇為我廽睇送鹽山林少府之任序新授鹽山尉孝亷郎濟南林君脂轄東轅蒞官也鹽山滄州之屬邑也滄州戎狄接境集作際之地國家虞守之㑹東南居恃力之卒西北有矜功之衆從事之劇惟天下先若非機足應權逹能通變則不之與也公以二善而時與之夫騏驥未馳知有致逺之能集作力干將未割知有剸堅之功堂堂林君不假曽試集作假道試使嶧桐嶰竹必中音律勉以能事為邦之光禄者所以食人為國俸者所以表集作衣人賛時予尚知之而君豈不知之苟知之何徃而不利送常熟許少府之任序始入仕一有縣尉或中或上或𦂳銓衡評才若地稱而命之至於𦂳無得幸而處而𦂳中之羙者尤難以人今年孝亷郎髙陽許君授常熟尉者實𦂳中之美君十三舉明經十六登第後三舉進士皆屈於命去冬以前明經從常調䕃資貴中之乙判居等外之甲既才且地擢以是官夏四月隨牒之官四字集作隨之官之牒玉貌青春芬芳有蒨望棠隂而委質欝蘭陔以辭親征車轔轔所徃在目異時九仭由茲一簣在邦猶家也不出於忠信許君常以為巳任夫何䘏哉士之生制四方之志軫念於離别非所以為士也行乎哉送建上人訪陽司業後詣涇原劉行軍序前人建上人自茲又集作而西更為故人也至集作巫咸山有道釋子建上人元和之淳氣以類合休神遂性曩與少司成陽公得于林棲公從下風之請斯縻大君之爵同方相致殊途且來雖覊鸞𡨕鴻一飛一籠遐心逺意終共超曠遊佛廟賞虚集作靈臺湖氷片玉光潔再裕來為去始散實聚終上人故人有在西土曰大夣未覺還宜一歡陶瓶芒履此焉而徃東路㸔集作着首悠然髙雲西之人幾日而覿松栢之本集作下無凡草鸑鷟之侣無凡禽西之人豈陽公之儔歟則集作則字覯遇之辰瓊玖之列詩云可頌徳覩於斯其撰之竹帛儻傳俾後之人知貞元是嵗賢人之㑹二也送無知上人徃五臺山序無生永存㫖不易源綿兮在煩滴兮處渾釋氏子味其實歸其根其教雖傳非言可言惟相似者復到其門無知上人其到門者歟上人從儒至道從道至釋如歴星月以得白日若投集作棄扇翣而灑長風真空洞照熱惱頓盡水其性雲其身周四海以終静出六合而非寄維揚秋抄方至自閩日未成旬作臺山之適目闗河於不計擬衣食乎隨施怡如也澹如也以一作此行逢流得抵集作坻虚舟無程峨峨五峯幾日而上登異清凉侣善知識所至也之至𤣥之又𤣥乎予弱冠之年周集作同世諦之學神不逺逮溺在利名集作名利禮足而别悽然自傷岐途既殊聊各以行勉哉無知公勉哉歐陽生送李孝亷及第東歸序明經自漢而還取士之嘉也經也者聖人講善之録志立身正家齊國理在乎其中為人之父集作父者莫不欲其子之明為人之君集作君者莫不欲其臣之明明斯行行斯近則平乎性命逺則成乎政令爾來加取比興屬詞之流更曰進士則近於古人之立言也為時稍稱其僥倖浮薄之軰希以無為有雖中乾外矯集作稿多捨明趨進俾去華敦集作取實君子惡以真混假含章抱器乎捨進為明新及第李孝亷則含章抱器捨進為明者晳晳肌膚松寒玉清以志學升太學以學就升宗伯背文手沾滯義口占二戴集作工載非不徃集作售皇鄭復來投短書出長巻精博集作專炳煥儔倫褎然聖朝貞元癸丑嵗明經登者不止集作上百人孝亷冠其首非獨學勝亦以文聞則具集作有我芳華加之典實不惡夫僥倖浮薄角力於比興屬詞並失分弓未知鹿死誰手不為也拾青紫之有路獻榮名以趨庭長途春光我美多彼噫盡藝而適猶有前聞家食非明時相待之意孝亷其志之送洪孺卿赴鄉舉序三折肱為良醫予五升詞場四遭掎摭是以竊知乎文則洪氏子舉秀才前後集作其非勝負予得而廣集作度字夫子集作天子黼黻之性加好勤苦之節紡績墳典織組篇什觀經緯機杼則重錦繡段日日當成今年秋預貢士首薦五字集作貢士果居首薦歌鹿鳴以飲集作食為餞想鵬摶而餙駕金欲入集作求鍜玉將就磨光芒頴耀朝夕以冀廽鴈賔海秋風落山雖難别離問集作向慶無恨中鵠餘矢猶思再發升冬𤣥月期㑹闕下送族叔行元落第歸廣陵序族叔行元既射䇿於主司不合春二月將歸淮南所寓羣公設祖方獻未酬族集無此字叔悄然有不暢之色羣公亦愕爾而阻歡小子侍觴奉觴而前曰歸好事春美時酒樂物叔於三者加同人將之而有未恱豈禮闈失意之爲乎昆吾産金荆山産玉自民役巧鎔琢盖多唯干將和璞有大聞非百錬則其工集無工字良可用歟非三獻而其寳可集作乃真歟茍良茍真不即成不即售適以精其研稔其實如叔也亦何稽於一邂逅哉若昔之人作必行動必中則是蘇秦無履穿之歎寗戚無石爛之歌孫𢎞無十上之勤商鞅無再干之勞也知泰而不知否知易而不知難是夫人也非所以待乎叔也叔如之何叔忻然見卞氏又集作再來之路平歸心納春景安酒意四坐以叶千鍾有娱既醉升車秋為到期送薛大信歸臨晉序吕温先師曰益者三友吾能得之豈惟直諒多聞而巳可以旁魄天人談堯舜之道則有吾族兄臯可以根本性情語顔夷之行則有太原王師簡可以發揚古訓論三代之文則有河東薛大信此三君子或道以樂我或行以約我或文以博我遭時則有光遁世則無悶其為益也不亦大乎大信與予最舊始以孝弟餘力皆學于廣陵之靈巖寺雲巻其身討論數嵗常見大信述作必根乎六經取禮之簡樂之易六字集作禮之簡要詩之比興書之典刑春秋之褒貶大易之變化錯落混合崢嶸特立不離聖域而逸軌絶塵不易雅制而瓌姿萬變有若雲起日觀盡成丹霞峯折靈掌無非峻勢皆天光朗映秀氣孤㧞豈藻餙而削成者哉聖上方欲觀人之文潤色鴻業秉筆者如三光得天毎賀大信有其時矣無何余被鄉曲之譽賦于闕下以文乖時體行失俗譽再為有司所黜此時大信亦與計偕知機全髙匣刄不試昔趙殺鳴犢仲尼臨河而逝予之見黜子亦逡廵事雖不同其所感一也嵗八月以岵屺之戀告予于歸予思古人有處有贈乃語之曰吾聞賢者志其大者文為道之餙道為文之本專其餙則道䘮反其本則文存且使不存又何傷矣彼邦是堯舜之遺俗唐叔之所理必有忠信如君者焉問安之暇可與之處琢磨仁義浸潤道徳考皇王治亂之迹求聖哲行藏之㫖逹可以濟乎天下窮可以攄其光明無為矻矻筆硯間也行矣大信茍非同志勿失予言文苑英華巻七百二十九
