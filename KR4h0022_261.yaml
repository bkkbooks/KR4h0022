body:
  text: 文苑英華卷二百六十一宋李昉等編寄贈十五周賀二十一首溫庭筠二十四首杜牧十八首許渾十八首曹汾一首寄寧海李明府周賀山縣風光異一作美公門石水清一官居外府幾載别一作日到東京故疾梅天發新詩雪夜成家貧希一作思减選時靜憶歸耕抱疾窮一作把疏尋書義澄心得獄情夢靈邀客一作韶解劍一作鏡古揀人一作覔僧呈守月通一作閔宵坐尋花回路一作傍徑行從來知愛道何慮白髭生投江州張郎中前人要地無集作多閒日仍容集作容仍冒謁頻借集作買山年涉閏寢郡月踰旬驛徑曽衝雪公泉省滌塵隨行溪路細接話草堂新减藥痊餘一作全除癖飛書問苦集作苦問貧噪蟬離宿集作拋壞殼吟客寄秋身鍊句盈箱篋懸圖視蜀閩靜居集作使君匡阜近終作社中人出關寄賈島一作送客前人舊鄊無子孫誰共老青門迢遞早秋路别離深夜村伊流偕逺客嶽響答啼集作清猿去後期招隱何當復此言此詩二百七十九卷重出今已削去贈胡僧前人瘦闕無血色草履著行穿閒話似持咒不眠同坐禪背經來漢地袒膊過冬天情性人難㑹逰方應信緣贈然上人前人竹徑瓶水新深稱北窗人講罷見黃葉詩成尋舊鄰錫陰迷集作連坐石池影露齊身苦作南行集作逰約勞生始問津春日山居寄友人前人春居無俗喧時立澗門前路逺少來客山深多過猿帶集作倚巖松色老臨水杏花繁除憶文留役集作外何人更可言贈朱慶餘校書前人風泉盡一作夜結氷寒夢一作入徹西陵越信楚城得逺懷中夜興樹停沙島鶴茶㑹石橋僧寺閣連官舍行吟過一作到幾層贈緱氏集作山李明府前人貴邑清風滿唯集作誰通上宰心杉松出郭部集作杉柳出外部雨雹下嵩陰度鴈方當壘來僧始到岑西池月色逈集作孤月色㑹接一宵吟寄杭州姚合郎中前人轉海移集作轉刺來山郡連年别省曹分題得客集作惠少著價買書髙暮集作晚栁蟬和角寒城燭照濤鄱陽集作溪卧疾久集作者未暇集作不及從乘艘寄朱慶餘已見二百三十一卷贈李主簿前人稅時兼主印每日得閒稀對客放科吏為官亦典衣案遲吟坐待宅近步行歸見說論詩道應愁斷是非贈厲元侍御前人山松徑與瀑泉通巾舄行吟想越中塞鴈去經華頂末鄊僧來自海濤東關分河漢秋鍾絶露滴獼猴夜嶽空抱疾因尋周柱史杜陵寒葉落無窮贈姚合郎中前人望重來為守土臣清髙還似武公貧道從㑹解惟求靜詩造𤣥微不趂新玉帛定知難撓思雲泉終是得關身兩衙向後無餘事門館多逢請益人晚秋江館書事寄姚郎中前人病寄西州居帶城倚門孤桞一蟬鳴澄江月上見魚擲荒徑葉乾聞犬行越島夜無侵閣色寺鍾寒有隔源聲故園賣卜休歸去湖水秋來空自平上陜府姚中丞前人此心長愛狎禽魚仍候登封獨著書領郡只嫌生藥少在官長恨與山疏成家盡是經綸後得句應多諫諍餘見說養真求退靜溪南泉石許同居贈道人前人布褐髙眠石竇春迸泉多濺黑紗巾搖頭說易當朝秀落手圍棋對俗人自算天年窮甲子誰同雨夜守庚申擬當太華何時去他日相尋乞藥銀寄韓司兵前人多病十年無舊識滄洲戰後始逢君已知罷秩辭瀧水相勸移家近嶽雲泗上旅郵侵疊浪雪中歸路踏荒墳若為此别終期老書札何曽寄北軍夏日寺居寄楊侍御前人雨過北一作碧林空晚景院閒人去掩斜陽十年多一作苦病度寒一作落葉萬里亂愁生夜牀終欲反耕甘性拙多一作夕慙他一作多事與身忙還一作遙知謝客名先重肯為詩篇問一作接楚狂寄金陵僧前人水石致身閒自得平雲竹閣少炎蒸齊牀幾减供禽食禪徑寒通照像燈覔句當秋山落葉臨書近臘硯生氷行登揔到諸餘寺坐聽蟬聲滿四稜寄長孫中丞前人潯陽却到是何日此地今無舊使君長憶窮冬宿廬嶽瀑泉氷折共僧聞寄潘緯前人楊栁垂絲與地連歸來一醉向溪邊相逢頭白莫惆悵世上無人長少年寄山中人溫庭筠月中一雙鶴石上千尺松素琴入爽籟山酒和春容幽瀑有時斷片雲無所從何事蘇門嘯携手東南峯旅泊新津欲寄一二知已前人維舟息行役宵景近江村併起别離恨思聞歌吹喧髙林月初上逺水霧猶昏王粲平生感登臨幾斷魂初秋寄友人前人閒夢正悠悠凉風生竹樓夜琴如欲雨曉簟覺新秋獨鳥楚山逺一蟬關樹愁慿將離别恨江水問同一作東逰贈僧雲棲前人麈尾與笻杖幾年離石壇梵餘林雪厚碁罷嶽鍾殘開卷喜先悟潄瓶知早寒衡陽寺前鴈今日到長安雪夜與友生同宿曉寄近鄰已見一百五十四卷前人鄠郊外墅寄所知前人持頥望平緑萬景集所思南塘過新雨百草生容姿幽鳥不相識美人何可期徒然委搖蕩惆悵春風時贈盧郎中前人白首方辭滿荆扉對渚田雪中無陋巷醉後似當年一笈負山藥兩瓶携澗泉夜來風浪起何處任漁船贈盧長史前人移病欲成隱扁舟歸舊居地深心事少官散故交疏道直更無侣家貧惟有書東門煙水夢非獨為鱸魚寄渚宫遺民𢎞里生前人桞弱湖堤曲籬疏水巷深酒闌初促席歌罷欲分襟波月欺華燭江雲潤故琴鏡閒花共葉牀冷簟連心荷疊平橋暗萍稀敗舫沉城頭五更鼓窗外萬家砧異縣雨投浪當年鳥共林八行香未减千里歎難尋未肯暌良顧空期嗣好音他時詠懷作猶得並南金春日將欲東歸寄新及第苖紳先輩一作下第寄司馬禮前人幾年辛苦與君同得喪悲歡盡是空猶喜故人先折桂自憐羇客尚飄蓬三春月照千山路集作道十日花開一夜風知有杏園無路一作計入馬前惆悵滿枝紅贈李將軍前人誰言荀一作家荀羡愛功勳年少登壇衆所聞曽以能書稱內史又因明易號將軍金溝故事春長在玉軸遺圗火集作文華半焚不學龍驤畫山色集作水醉鄊無迹似閒雲寄盧生前人遺業荒凉近故都門前堤路枕平湖緑楊隂裏千家月紅藕香中萬㸃珠此地别來雙鬢改幾時歸去片帆孤他年猶擬金貂換寄與黃公舊酒壚贈袁司録即丞相淮陽公之猶子與庭筠有舊也前人一朝辭滿有心期花發楊園雪覆一作壓枝劉尹故人諳往事謝郎諸弟得新知金叉醉就胡姬畫玉管閒留洛客吹記得襄陽耆舊語不堪風景峴山碑寄清凉寺僧已見二百三十三卷贈蜀將蠻入城都頗著勳勞見三百卷邊將門前人春暮宴罷寄宋夀先輩前人斜掩朱門花外鍾曉鶯時節好相逢窗間桃葉集作蕊宿粧在雨後牡丹春睡濃蘇小風姿迷下蔡馬卿才調似臨卭誰憐芳草連集作生三徑參佐橋西陸士龍寄嶽州李外郎逺一作肱前人含嚬不語坐榰頥天近樓髙宋玉悲湖上殘碁人散後嶽陽微雨鳥來遲早梅猶得回歌扇春水還應理釣絲獨一作唯有袁安一作宏正憔悴一樽惆悵落花時投集作上翰林蕭舍人前人人間鴛鷺杳難從猶恨集作獨恨金扉直幾集作九重萬象曉集作晚歸仁夀鏡百花春滿集作隔景陽鐘紫微芒動詞初出紅臘香殘詔未封每過朱門愛庭樹一枝何日許從容秋日旅舍寄義山李侍御前人一水悠悠隔渭城渭城風物近柴荆寒蛩乍響催機杼旅鴈初來憶弟兄自為林泉牽曉夢不關砧杵動秋聲子虛何處堪消渴試向文園問長卿却歸集作徑商山寄贈同行友人前人曽讀逍遙苐一篇爾來何事集作無處不恬然便同南郭能忘象兼笑東林學坐禪人事轉新花爛熳驛集作客程依舊水潺湲若教猶作當時意應有垂絲在鬢邉逰南塘寄王知白前人白鳥梳翎立岸莎藻花菱刺泛微波煙光似帶侵垂栁露㸃如珠落黯荷楚水晚凉催客早杜陵秋思傍蟬多劉公不信歸心切聽取江樓一曲歌晚坐寄友人前人九枝燈在瓉窗空希逸無聊恨不同曉夢未離金夾睞早寒先到石屏風遺簮可惜三秋白蠟燭猶殘一寸紅應卷蝦簾看皓齒鏡中惆悵見梧桐西江寄友人集作貽釣叟騫生前人碧天集作晴江如鏡月如鈎泛灧蒼茫迷客愁夜淚潜生竹枝曲春灘遙聼集作上木蘭舟事隨雲去身難到夢逐煙銷水自流昨日歡娛竟何事集作在一枝梅謝楚江頭寄河南杜少府集作尹前人十嵗集作載歸來鬢未雕玳簮珠履見常僚豈關名利分榮路自有才華作慶霄鳥影不飛集作參差經上苑騎聲相續過中橋夕陽亭下集作畔山如畫應念田歌正寂寥許七侍御棄官東歸瀟灑江南頗聞自適髙秋企望題詩寄贈十韻杜牧天子繡衣吏東吳美退居有園同庾信避事學相如蘭畹晴香嫩筠溪翠影疏江上九秋後風月六朝餘錦肆開詩軸青囊結道書霜巖紅薜荔露沼白芙蕖睡雨髙梧密碁燈小閣虛凍醪元亮秫寒膾季鷹魚塵意迷今古雲情識卷舒他年雪中棹陽羡訪吾廬於義興縣近有水榭除官行至昭應聞友人出官因寄前人賤子行集作來千里明公去一麾不能揮集作休涕淚豈獨感恩知草木窮秋集作秋風後山川落照時如何望故國驅馬却遲遲江上雨寄崔碣已見一百五十三卷贈張祜前人詩韻一逢君平生稱所聞粉毫惟畫月瓊尺只裁雲黥陳人人懾秋霜集作星歷歷分數篇留别我羞殺李將軍寄張祜見三百十三卷寄李起居四韻前人楚女梅簮白雪姿前溪碧水凍一作水醪時雲罍心凸知難捧鳳管簧寒不受吹南國劒眸能盼睞侍臣香袖愛僛垂自憐窮律窮途客正劫孤燈一局碁李給事前人一章緘拜皂囊封集作中凛凛集作栗栗朝廷有古風元禮去歸綸氏學李膺退罷歸綸氏教授生徒給事論鄭注告滿歸頻陽也江充來見犬臺宫鄭注對於浴堂中紛紜白晝驚千古鐵鑕朱殷幾一空曲突徙薪人不㑹海邉今作釣魚翁李膺事載後漢本傳今杜集誤作緱氏寄宣州鄭諫議前人大夫官重鎮江東瀟灑名儒振古風文石階集作陛前辭聖主碧雲天外作𡨕鴻五言寧謝顔光祿百嵗須齊衛武公再拜宜為集作同丈人行過庭交分有無同豫章中丞業深韜略志在功名再拜集作奉長句兼有咨勸前人檣似鄧林江泊天越香巴錦萬千千滕王閣上柘枝鼓徐孺亭前鐵軸船八郡元侯非不貴萬人師長豈無權要君一作知嚴重踈歡樂猶有河湟可下鞭時收河湟初春雨中舟次和州裴使君見迎李趙秀才同來因書四韻兼寄許渾前人芳草渡頭微雨時萬株楊栁拂波垂蒲根水暖鴈初浴梅徑香寒蜂一作蝶未知詞客倚風吟暗淡使君回馬濕旌旗江南仲蔚多情調惆悵春隂幾首詩途中寄友人前人道傍髙木盡依依落葉驚風處處飛未到鄉關聞早鴈獨於客路受寒衣煙霞舊想長相阻書劔投人久不歸何日一名隨事了與君同採碧溪薇贈李處士長句四韻前人玉函怪牒鎖靈篆紫洞香風吹碧桃老翁四百爪牙利擲史萬里精神髙靄靄祥雲隨步武纍纍秋塜嘆蓬蒿三山朝去應非久姹女當窗織羽袍贈李秀才是上公孫子前人骨清年少眼如氷鳳羽參差五色層天上麒麟時一下人間不獨有徐陵寄揚州韓綽判官前人青山隱隱水遙遙秋盡江南岸草集作草木凋二十四橋明月夜美集作玉人何處坐集作教吹簫冬至日寄小姪阿宜前人小姪名阿宜未得三尺長頭圓筋骨緊兩臉明且光去年學官人竹馬繞西廊指揮羣兒輩意氣何堅剛今年始讀書下口三五行隨兄旦夕去斂手整衣裳去嵗冬至日拜我立我傍祝爾願爾貴仍且夀命長今年我江外今日生一陽憶爾不可見祝爾傾一觴陽德比君子初生甚微茫排隂出九地萬物隨開張一似小兒學日就復月將勤勤不自已二十能文章仕宦至公相致君作堯湯我家公相家劒珮常丁當舊第開朱門長安城中央第中無一物萬卷書滿堂家集二百編一作三百篇上下馳皇王多是撫州寫今來五紀強尚可與爾讀助爾為賢良經書刮根本史書閲興亡髙摘屈宋艷濃薰班馬香李杜泛浩浩韓桞摩蒼蒼近者四君子與古爭強梁願爾一祝後讀書日日忙一日讀十紙一月讀一箱朝廷用文治大開官職場願爾出門去取官如驅羊吾兄苦好古學問不可量晝居府中治夜歸書滿牀後貴有金玉必不為爾藏崔昭生崔藝李兼生窟郎堆錢一百屋破散何披猖今雖未即死餓凍幾欲僵參軍與縣尉塵土驚劻勷一語不中治笞箠身滿瘡官罷得絲髮好買百樹桑稅錢未輸足得米不敢嘗願爾聞我語歡喜入心腸大明帝宫闕杜曲我池塘我若自潦倒看汝爭翺翔揔語諸小道此詩不可忘赴京初入汴口曉景即事先寄兵部李郎中前人清淮控隋漕北走長安道檣形櫛櫛斜浪態迤迤徒何反好初旭紅可染明河淡如掃澤闊鳥來遲村饑人語早露蔓蟲絲多風蒲燕雛老秋思髙蕭蕭客愁長裊裊因懷京洛間宦逰何戚草什伍持津梁澒湧爭追討翾便詎可尋幾祕安能考小人乏馨香上下將何一作祠禱唯有君子心顯豁知幽抱題安州浮雲寺樓寄湖州張郎中見三百十三卷前人贈宣州元處士見三百三十一卷前人寄題南山集作商洛王隱居許渾近逢商洛客知爾住南塘草閣平春水柴門掩夕陽隨蜂收野蜜尋麝採生香更憶前年醉松花滿石床留贈偃師主人前人孤城漏未殘徒侣拂征鞍洛北去愁逺淮南歸夢䦨曉燈回壁暗晴雪卷簾寒強盡集作更盡主人酒出門行路難贈梁將軍前人曽經黑山虜一劍出重圍年長窮書意時清隱戰機集作釣磯髙僧集作齊雲外住瘦馬月中歸唯說鄊心苦春風鴈北飛贈桞璟陶馮二校書前人霄漢兩飛鳴喧喧滿集作動禁城桂堂同日盛藝閣隔年榮香掩蕙蘭氣韻髙鸞鶴聲應憐茂陵客未有子虛名寄友人集作寄袁校書前人新嵗集作貧居樂遊北江海思迢迢雪夜書千卷花時酒一瓢獨吟集作愁秦樹老孤夢楚山遙有路應相念風塵滿黑貂將歸茅山兼寄李叢時兩河用兵集作聞兩河用兵因貽友人前人故人日已逺身事與誰論氣直集作性拙難趨世心孤易感恩晨歌集作秋悲憐宋玉夜舞笑劉琨從此歸山去無因更出門集作徒有干時策青山尚掩門長興里夏日寄南陵避暑前人侯家大道傍蟬噪樹蒼蒼開鎖洞門逺下簾髙館凉欄圍紅藥盛架引緑蘿長永日一欹枕故山雲水鄊舟行早發廬陵郡郭寄滕郎中前人楚客停橈太守西集作知露凝丹葉自愁集作秋悲蟹螯只恐相如渴鱸鱠應防曼倩饑風卷曙雲飄角逺雨昏寒浪挂帆遲離心可羡髙齊夢集作夕巫峽花深醉玉巵京口閒居寄兩都親友集作京洛友人吳門煙月昔同逰梧葉蘆花並客舟聚散有期雲北去浮沉無計水東流一樽酒盡青山暮千里帆集作書回碧樹秋何處相思不相見鳳城宫闕楚江頭集作樓郊園秋日寄洛中友人一作親友前人楚水西來天際流感時相一作傷别思悠悠一樽酒盡青山暮千一作萬里書一作春回碧樹秋日落逺波驚一作低宿鴈風吹輕浪起眠鷗嵩陽親友誰相念一作如相問潘嶽閒居欲白頭此詩第二聫與前篇同未喻獻鄜坊邱常侍前人詔選將軍護北戎身騎白馬背彤弓桞營逺識金貂貴榆塞遙知玉帳雄秋檻鼓鼙驚朔雪曉階旗纛起邊風蓬萊每望平安火應奏班超定逺功寄當塗李逺前人賦擬相如詩似陶雲陽煙月又同袍車前驥病駑駘逸架上鷹閒鳥雀髙舊日樂貧能飲水他時隨俗願餔糟不須倚向青山住詠雪題詩用意勞寄殷堯藩前人十年聞君集作名翰墨林為從知已信浮沉集作沉沉青山有雪諳松性碧落無雲稱鶴心帶月獨歸蕭寺逺玩花頻醉庾樓深尋思集作思君一見如瓊樹空把新詩盡日吟移攝太平寄前李明府前人病移巖邑稱閒身幾集作何處風光貰酒頻溪桞繞門彭澤令野花連洞武陵人嬌歌自駐壺中日集作景艷舞長留海上春早晚髙臺更同醉緑蘿如帳草如茵春日思舊逰寄南徐從事劉三復前人風暖曲江花半開忽思京口共銜杯湘潭雲盡暮山出巴蜀雪消春水來懷玉尚悲迷楚塞捧金猶羡樂燕臺薊門髙處極歸思隴鴈北飛雙燕回贈河東虞押衙前人吳門風水各集作洛萍流月滿花開懶獨逰萬里山川分曉夢四鄰歌管送春愁昔年顧我長青眼今日逢君已集作盡白頭莫向樽前更惆悵古來投筆盡集作揔封侯移攝太守集作陵陽春日寄汝洛舊逰許渾百年身世學集作似飄蓬澤國移家疊嶂中萬頃碧波魚戀釣九重青漢鶴愁籠西池水冷春巖雪南陌花香晚集作曉樹風縱有芳樽何處集作心不醉故人今集作多在洛城東寄友人集作寄示汝都許渾朱檻煙窗集作霜夜坐勞美人南國舊同袍山長水逺無消息瑶瑟一彈秋月髙望九華寄衡陽杜員外曹汾載月早辭三秀館遲明初識九華峯差差玉劒寒鋩利裊裊青蓮翠葉重竒狀却疑人畫出嵐光如為客添濃行春若到五溪上此處褰帷正面逢諸夲兩卷皆作二百六十一其篇數雖合總目而詩多重復㦯全異者如周賀十二首重者三溫庭筠十五首重者五杜牧九首皆不同許渾十四首前卷闕其九後卷增其一所贈者許集又無之而總目却有曹汾一首疑是汾詩今合為一卷去其重復注異同為一作文苑英華卷二百六十一
