body:
  text: 文苑英華巻八百四十二宋李昉等編誄一北齊盧紀室誄一首梁度支尚書陸君誄一首從子永寧令謙誄一首隋秦孝王誄一首盧紀室誄盧思道齊正統二年秋七月司徒記室參軍事永安鄉男范陽盧詢祖卒先民有言惟徳可久抑又聞之惟名為夀爾之無禄沒而不朽乃援弱翰告哀哀友遂作誄曰皇虚𦕈邈師緒蟬聮大儒漢世名公魏年司徒藹藹撫翼冲天尚書亹亹亦稱象賢若人擢一作挺秀絶後光前發榮隨浦韞耀春田爰在弱齡孤根回立内無怙恃外寡朋執行有餘力藝無不習善價斯待香名允集下學上逹鑚幽洞微九流百氏異軫同歸文成鐘律韻響珠璣麗詞泉涌壯思雲飛雄州擢第言割其楚我實褎然觀國而舉自茲不調多歴年所㳺泳儒𤣥從容嘿語納扵大麓崇建府朝八紘所掩車乘翹翹我有明徳乃應嘉招超自幕下来儀鳳條應徐並轍潘顧齊鑣聲華簮帯譽動朋僚逖矣江隂承風請朔莊生喻指季子觀樂立朝所寄俊才優學懸河自口靈珠在握乃參軍事仍賛中鉉大冲所縻徳施攸踐同推麗則俱謝蟲篆何才之髙何位之鮮天下士也冝享多福豹變其文鴻漸扵陸神之聽之于何不淑營魄遂徃音儀在目嗚呼哀哉昔余與子分重契深譬諸投漆如彼斷金余慕大隠子惟陸沉等趨一作超宫閣並綴衣簮春臺共踐秋水偕臨還馬齊轡出盖連隂良書濁酒永嘯長吟羙言俱賛闕行同箴娯樂未㡬險阻相尋忻既無極憂亦難任云胡不弔亡我知音百年已矣萬事傷心嗚呼哀哉亭伯君山並嗟湮滅荀粲王夀同悲夭折蘭菊無墜鐘鼓不絶之子云亡何愧前烈靈衣襲几奠酒盈杯故庭飛籜虚悵凝埃僕流離而涕泗驂顧慕以遲迴出南陽之舊道掩北邙之夜臺趙卿之銘巳勒滕公之隴未開臨象設而不靣詎幽魂之可来嗚呼哀哉梁故度支尚書陸君誄江總君諱襄字師卿呉人也祖惠徹宋車騎府法曹行參軍父閑揚州别駕齊永元紹厯蕭遥光謀反伏誅閑以州職一作端見害子絳共日并命忠孝之道萃此一門襄時年十四號毁殆滅布衣蔬食終扵身世起家著作佐郎出為永寧縣令累遷臨川王廬陵王法曹外兵記室入為太子洗馬掌管記中書舎人管記如故為丹陽尹丞俄遷太子庶子掌管記揚州治中太子家令領國子博士管記如故丁母顧夫人憂廬乎墓所服闋又從家令轉中庶子並掌管記遷中散大夫金華宫家令出為鄱陽内史除尚書吏部郎秘書監領揚州大中正度支尚書太清二年三月京師傾覆君竄迹還鄉呉民陸黯起義民攻郡擾攘之際憂憤而終春秋七十有二余避世河滸暫之呉國百舍不容千里無饋陸公國士之眷惠好之深朝同飦粥夕共瓢飲契闊晤言流連晦朔日月逝矣懐古何忘臨哀能誄久願摇筆時事屯邅不遑削藁梁季適越未戢干戈世人仕累為物所役杼軸扵懐四十餘載隋開皇九年扵長安致仕懸車巳洎就木㡬何但東海成田南冦永縶龜山更促空想吹笛之哀馬角徒生絶望通波之水嗚呼哀哉攬涕操觚乃為誄曰媯苗碩茂完裔繁昌賔門穆穆筮仕鏘鏘食采命氏遐哉陸鄉四昇臺省八辟賢良分柯振葉令聞令望𤣥蕤朱鞸翠弁金鐺流聲世祀列讃祠堂别駕貞烈志存名教捐生徇一作報主知死不撓暉映泉壤痛此忠孝扵鑠夫子積徳累仁韜光戢耀隠璞含真居哀能痛至情通神淚枯壠樹哀感馴禽永慟家禍長號不辰𤣥黄絶睇蔬布終身心符屈婞離騷婞直以亡身或作是非室等原貧分甘共感内族外婣求之今古斯為異人月下奏章螢前讀史給紙蘭臺觀書洛市强學待問潤身為已結髪濯纓登朝入仕昻昻逸驥逐日千里宛宛長離陵江迅起枳棘栖鳳化行乳雉平臺累陟石扇蹔履跧一作雌伏不競棼絲自理倚席無譏師訓胄子驥足時務俊民斯俟秋實選能春華備羙思媚儲后逰息承華書記䇿擢爵命増加彈碁擊筑沉李浮𤓰追隨飛盖侍從鳴笳二儀迴幹四氣淹賖離景遽沉前星奄滅撫巳惟舊懐恩守節昔荷故臣攀號聲折登髙能賦大夫就列金華式肇更奉清切修竹貞松含霜抱雪下車軒日一作月求瘼康時良辰坐嘯朗夜卧治懸魚化静佩犢去思廣𢎞條教精察毫釐典選搜揚操刀宻勿一作没不紊朱紫傍無請謁秘署學林得人超忽延閣緗素校文遺闕上妙鉛槧譽成碁月鴈行攸序龍作疑簡才讓珠不拜賜劒恩來帝曰俞徃爾行兼該金城失險玉弩流灾年臻几杖病息草莱世故天禍臣悲主辱露盡朝陽風驚夜燭黄鵠超遥白駒何促事廹歸魂依然啟足悠悠世路辛苦難虞尋戈滿道暴骨交衢家無半菽地絶飛芻念君桑梓零落凋枯傷君并邑子戾﨑嶇䘮亂絶卜葵藿荒蕪凄凉故友擗摽遺孤臨穴外野撫棺窮途嗚呼哀哉為善豈懼修名難假徳履中和道周文雅不朽之迹非謂泉下亹亹清名一作風泠泠獨冩嗚呼哀哉從子永寧令謙誄王僧孺余之從子謙字㓜光以昭陽紀嵗蕤賔旅月啓足閩隅暝目泉岫是殱才子實䘮俊民若其孝親睦友故非天墮地出異才絶學如有鬼告神授玉懐瑕而可指桂含蠧其取傷孰與九徳彰扵造次百行動為表徴一作綴吐論含毫宣赴鐘琯標心用巳懸符矩艧疑作惠響棲道一作悽悽清心可鏡和而靡屈簡而周爽邃若凝雲潔如止水無慙座右不愧屋漏蒼苔繞路素塵滿席蕭索庭戸靡事鮮明沉淪典籍將絶弔賀室如夏甫狀等安有所累清塵一作安其所有清塵惟不能忘懐藝而巳斯羙冝久冝長而驥騄之歩中行鸞鷟之趐未矯一歸寥廓長反虚無雖東隅再暝一作冉冉鉗丙之御無及北顧相望𨽻首之數不盡而恒化非常人所不免况風雲萬里間此山川客思故鄉次房之念何極輕棺反蜀允南之思可知而魂兮𦕈𦕈扁舟靡靡生人之望巳冥死歸一作父之期又阻痛心傷目豈伊一事無以少寄辛傷故復誄之云爾昭昭洪胄映䇿光書違嬴避項從衛遷徐基忠踐孝抱約懐虚有顯而黙匪屈伊舒如茲邴魏譬彼董踈入登髙闕出啓精廬瞻星畫野望閫推車履仁不匱蹈道有餘九世盛矣七葉光諸徃弼睿主來傅英儲峨峨三祖羅室並居前瞻紫闕傍望白渠髙軒霞被四馬龍櫨疑作攎温温司武皎皎秘書義髙松竹價重璠璵元昆世父重規疊矩容與學丘徘徊詞府青紫巳拾大夫斯取盛藩徃相名畿來撫暉光不巳驚生之子謖謖萬尋昻昻千里實鳳靡雜真龍非似均情蘧寗得意莊李室有虚白門無囂滓遺心沮勸忘懐愠喜貧靡斯攝疑作懾賦疑作富其無耻險而不峭方而能理徳有潤身學斯為巳逸羽難集孤峯易峙南邁瑶琨西踰杞梓人亦有言名為實使譽傾邦國價騫州里崇蘭自芳珏玉自光汪汪巨壑曖曖重墻靡造靡請不迎不將久而愈敬狎而愈莊即無矯資一作即斯無矯此有循常黙非蓄短顯弗用長豈伊墜岸如彼懸梁惟學已聚待問則强偏在三箧兼下五行亦税其巾于彼王吏如龍宫楚有斯内侍藴此上才安茲下位儲扉始闢傳府初開爾其戾止辟彼昔才從斯簡帝仍此追陪何以闕自茲翰飛傍佐戎列來攝儒衣儒衣濟濟訪對斯歸是義罔惑惟禮無違悠悠越障决决閩海薄言銅墨蒲宻斯在孰云識吏政均舊宰循猛是兼絃韋無怠補袍方服治情莫改増貲匪課歸民自倍十郡為則百城斯採化日未逄政稱異等斯痛斯傷䘮善殱良妖同武擔疾甚清漳闔棺陋邑掩櫬蕪鄉嗚呼哀哉𦕈𦕈輕艫悠漫長途一作悠悠漫途風生閶闔日去昆吾空歸故國寧識舊都水鳴秋鶴岸集寒烏寒不夜哭惟獨呱呱茫茫大塊杳杳𤣥墟嗚呼哀哉伊吾與爾大别惟名肥泉猶接𤓰瓞未輕義雖子道思一作恩實友生歡憂共日險泰均情如菊有芬如蘭有薰别唯慕類居實有羣盡日持論遥夜披文漸漬羲老祖述淵雲惟昏及旦自旭徂曛人道實難譬彼徂湍驅車崤嶝執手河干三川縈薄七嶺悠漫自茲不見心譬迴瀾嵗佇㑹靣日望音翰歡無一緒悲有萬端濛隂遽戢扶景易殘即斯大暮為此一棺山足難曉壟首易寒秋蟲相呌暮羽来搏宿草行没宰樹方攅昭塗長巳疑大夜斯安孰知冥黙徒此汍瀾嗚呼哀哉隋秦孝王誄隋煬帝維開皇二十年六月二十日丁丑上柱國秦孝王薨于仁夀嗚呼哀哉八元八凱濟濟虞則周南召南赫赫周國扵穆孝王紹彼一作慈明徳天實䘮予殱我剛克嗚呼哀哉如何上靈降此災否國䘮宗臣家已千里嗚呼哀哉爰初不豫冕旒視疾及至大漸停鑾駐蹕親臨屬纊俯觀徹瑟感動皇情痛深慈膝一辭明世千秋長羃如何綿綿終古仲秋卜宅將歸泉戸梁山之陽永寧后土嗚呼哀哉余寡兄弟愛篤彌深奄然零落痛體傷心嗚呼哀哉追悼無及永分古今神雖虚翳一作神靈虚翳徽聲靡替誄王徳音貽千百世乃作誄曰皇隋啓運應天順民保茲七百静彼四隣利建宗子藩屏懿親孝王惟允俾侯于秦爰自聖章天性誠愿色養烝烝孝立名建恭近扵禮耻辱斯逺嘉之弗忘懼而無怨孝悌之至通扵神明温温居徳肅肅厲精恭敬表志退讓為情韡此棠棣敦斯鶺鴒仲稱令弟叔曰仁兄猗歟我弟好學無替九流日修三餘卒嵗琴臺夜開書帷晝閉聰敏若神雄辯無滯妙矣聲律明哉龜筮𤣥象風角扵焉及睿允文允武多才多藝惟善惟樂為仁為惠天挺出羣英圖命世欽若孝王容止堂堂振鷺將集鳳雛斯翔人之領袖國之輝光輝光伊何肅肅翼翼義以處身仁以經國明燭縶符財成淵塞靖恭爾位好是正直令聞令望無反無側皇枝闕盤古維城東京舊都河南殷博惟我哲王行臺惟寞飛轡崤凾褰帳伊洛徳被汝墳仁行鞏亳西秦右地實賴英雄寔惟王化一作匪他乃即龜䝉惠和布澤易俗移風亹亹孝王仁而能斷徳敷大國有符公旦移鎮樊征述職江漢地接冦讐稜威靖難文徳招逺懐勞伐叛蹔輟外藩入侍天軒典茲戎衛仍居納言寳劒横曜豐貂尤温周衛清切敷奏便繁獻替惟允禁旅斯敦偽陳不恭軼我炎鄙王赫斯振將清江涘圖斯元帥難全其備惟我孝王膺茲無愧恭行天討受脤建旗申威鄂渚鞠旅江湄軍容﨣﨣逋醜􅀈􅀈一作纍纍雲陳不布髙城靡持泥首衘璧請命于台兵不血刃野無横屍善戰不陣我弟于兹金陵戡定飲至京師廣陵淮海一都之㑹牧彼頑民作相于外時雨隨車棠隂逐盖惟晉太原寄隆望大表裏山河要衡襟帯東自維揚一作揚越迴旌轉斾善政㢘平扵斯為最胡虜畏威氓黎荷賴𤇺火戎馬俱清邊界寒暑失御庸一作痛衛弗開言旋京邸去彼叢臺扈駕仁夀撫席巖隈連綿藥餌嵗去年来秀而不實禍極生灾天胡不弔木壊山頺嗚呼哀哉至尊廢朝而悼傷皇后輟膳而摧痛甚秦國之永辭劇梁武之長送昆弟哀哀而日嗟僚友嗷嗷而悲慟嗚呼哀哉歎日月之不居何卜逺之詎促旌旐飄颻而從風笳管酸嘶而響谷服馬顧而不能行挽夫悲而不成曲霜霰落兮山谷寒木葉下兮丘壟殘風颼飀而吟樹泉幽咽而悲湍離羣之獸絶跡孤飛之鳥悲酸背離宫而東轉歴山邸而北度去甲第之樓臺即荒田之丘墓昔時鳴鑾而戒途今日靈輀而啓路臨朝謁之平衢永絶茲之一歩儻若神而有靈㡬悲傷而留顧嗚呼哀哉棄永一作白日之昭昭襲長夜之悠悠苦𤣥扄而無曉悲黄泉而永幽湮盛年扵萬古阻壯志扵千秋嗚呼哀哉慟反哭扵秋季悲復歸扵故地伊形逰而不遷何魂煢之空志嗚呼哀哉酒罇浮塵兮獨滿琴絃含風兮自斷冥夜久其何期焉知嵗月之長短孝王與我體宻情親孔懐之篤有踰常倫昊天何酷哀哉哲人奈何吾弟先我長淪煩寃痛毒悲恨何陳嗚呼哀哉痛母弟之同胞棄共被之寒郊豈止三荆之變色非惟四鳥之分巢遽一朝而云逝曷何去而何止形未捨目言猶在耳彼蒼者天子何甚矣嬛嬛一作惸惸友于哀哀吾子痛當奈何痛當何巳想髣髴而不見猶盤桓而佇立空撫膺而莫追抑飲淚而何及嗚呼哀哉嗟地久而天長終倫彼疑作淪沒乎幽方徒春華而秋落不復見我弟兮孝王何謝安之蔬食豈子路之䘮亡獨端憂而無一作誰告徒哽塞而追傷悲莫悲兮長别痛莫痛兮終絶因悽愴以冩情慟人琴而永訣嗚呼哀哉文苑英華巻八百四十二
