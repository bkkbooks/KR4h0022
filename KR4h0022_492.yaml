body:
  text: 文苑英華巻四百九十二宋李昉等編直言賢良方正直言極諫䇿一道賢良方正直言極諫䇿沈亞之對臣伏念目之包明其在昬夕之時則與盲者等及屬日蒙光乃能寤𤣥黄披萬類傑智之才其䖏濁俗之中則與愚者混非遭聖偶時安能調隂陽育萬物其理一也盲者雖蒙光莫能視愚者雖蒙聖莫能智集作資其理一也故舜禹翔其光於上益稷之徒周其視於下其猶懸白日而省離婁也三代以降君之光微臣之智狭見其手而迷其足覩其前而昧其後其猶舉燭螢而臨庶目也今陛下神光動天鍳彼幽塞猶懼理有未至故親省羣言而臣瞽愚非能踰於智傑副陛下之清問臣以相與貢臣文粹作而勉臣以相與貢臣以賢良應詔微臣所冐非任當伏竄棄之尤不足以塞罪乃輙伏進所言伏讀睿問周視聖㫖見陛下思天災之病也臣愚以為皆由尚書六曹之本壞而致乎然也今請統而條指之睿問有念人俗之凋訛及於卒乗之數貨幣之資臣請以今户部兵部之壞舉之睿問有思才周於文武本固在於士農臣請以禮部工部之壞舉之睿問有欲以辨行之真偽臣請以吏部之濫舉之睿問有朝廷之闕臣請以刑部之失舉之睿問有四方之弊臣請以山東隴右之急奏之伏願陛下詳臣之言察臣之志無以臣微而輕集作忽其奏也臣聞周設六官以統百辟立國八百年由綱之不絶於所制也太宗龍興革魏晉之殘政脩法度立中事設尚書六曹以叙班文武以條系天下號令既布而萬方從矣愛其人若愛已之徳保其黎庶若保幼子恐有墜也明四目以先其視指其未見者也集作指教其未見也逹四聦以先其聽喻其未聞者也集作開喻其未聞也尊賢之言而為視聽視聽先張則黎庶不陷於災害而康泰矣後代雖有盗臣姦黨而終不患其亡由綱之不絶於所制也夫尚書六曹之設猶人之有六腑也耳目口鼻之樞繫於元首手足之用闗於肘膝其血氣根脉文粹作端緒皆統於六腑符而命之然後能動用失其用者非邪則眩夫人莫不尊其三字文粹作尊於首故足司其所履指司其所執百體之司各勤其用則首安其尊而不勞首之䖏身猶君之居上也百辟以位則君安其尊而不勞明矣今尚書六曹外雖備其官而中實謬今人俗凋訛者其由户部之綱不理也昔户部其在開元最為治平當時西有甘凉六府之饒東有兩河之賦仰給之卒不過四五帥其餘利殖所入盡與齊人四十年間富庶滂洋之若是及一日上恃昇平之功相肆威驕之狠直言得死諛色獲進轉掌之間清蹕巡於巴蜀矣今西凉為虜兩河為兵盡開元天下之兵不過當今數郡之卒勝衣之農而百徭出矣鞭役重繁不勝於籍𣙜之不顧其害刑之不問其深吞危文粹作危苦衆多欲無凋訛不可得也兵部之選武士亦謬矣夫試射百中集作矢為重馳射次之馳戈亦次之此武夫賤者之宜業也而真者百無一焉其餘盡置豪姦之革役者以俟冐入奮戈戲馬者亦得中名則估肆富人之子弟彼安能致武之所用顧欲占籍自恃以逭徭於鄉閭耳而欲卒乘貨幣之充强臣未見也今兩河之間至於幽薊連屬西邉北邉而仰給之卒多於其土之齊人十九在兵部者所操曽不能制一校尉而况紐文粹作揔其綱乎古者兵農之一體也三時務農一時習兵故春耕而夏植秋藏而冬講武誠願使兵部之綱紀根於古道之要兵部之令加於將帥之臣則本乆益大矣何卒貨不充於古哉今禮部之得進士最為清選而以綺言聲律之賦詩而擇之及乎集作中為仕也則責之不通天下之大經無王公之重器今取之至微而望之甚大其猶擊陋缶而望曲齊於韶濩也今仕進之風益壞矣必以隂詐為朴陽明為狂顧以武為汙矣而况兼學乎陛下何不令禮部之臣督其所業雜考其所能則人可化矣夫惟博大之士為能兼學耳夫持綱舉維非博大之士不能也夫求博大之士非竭誠不能也故殷宗之竭誠於神神感於夣而得傅說周文之竭誠於氣氣感於兆而得太公陛下如能用殷周之誠而求之何患用才之不至矣今工部之綱不舉其由百工之不條理焉且務於捷濫則能速壞惑於邪巧則多改作速壞相仍改作無已欲使財費之不窮工力之不竭臣未見也夫堯之功與天比覆居於土階之上蔭於茆茨之下土簋而具禹親勤理水而卑宫室是二君者非不能極巧侈之端故䖏陋而無厭盖欲使天下之人自然而儉易從也而周官百工之職一文粹作載於六職之書詳矣其後昏君亂主未有不極游觀之樂窮巧侈之娱恣羅紈之靡雖有生植之衆不足充虞人之裁雖盡隴畆之農不足塞百工之役雖竭蠶婦之勞不足給綺綵之廣集作貢秦隋之末君不如此不足以隳宗社今仕家不著籍於鄉閭亦已乆矣則農夫唯恐他業之不容於趨也安肯顧隴畆而戀其本哉伏願陛下仰堯舜禹之聖敬畏秦隋之敗奢念漢文之節儉凡在百工之用闗於将作内作技同者必使統於工部以觀制作之度使勞費之怨不起於下人則堯聖禹明周規漢儉唯陛下擇耳何止士農之固業哉今吏部之補吏嵗調官千餘其試以偶文儷語之書程以二百字為準考之文粹作其能否以定取舍直使其人真能然尚何以補况十九皆偽人乎以此而求其實不可得也且昆吾之利莫耶之才雖巧用不能雕咫尺之木鷙鳥之羅雖善掩者不能拘蚊蚋如使恢宏博大之士裁心鏤舌於於字文粹作以為此辭而其道安可見乎陛下何不命羣官立於朝者嵗各貢其所知各以其所長試之各以其器任之不勝其任者罪罔上闕其貢者罪蔽賢而洽聞者爵逾次禮部吏部以時舉籍刑部督其不察如此則人人爭好賢人人務克已何患乎真偽不可辨哉今朝廷之闕衆多其最急者刑部刑部之綱不舉其由賞罰之不信勅命迭降而其㫖相違故有行之於今日而廢之於明日罪之於此而赦之於彼是慢易欺詐之藪耳欲無枉撓不可得也誠願斥其煩苛去其相逾則人人易守難犯然後命儒賢究掌之不明於此者不得為刑部之官無令猾賊之徒輕身重貨竊法以自弄如此則清矣賞信刑果則逺罪脩已之風序今非止於闕盖将病且痼矣夫病者其在皮膚則易也六腑尸文粹作已繆氣非所經而其體痼不亦危乎臣請以醫方之言諭國之病伏惟陛下察焉臣聞良醫之理痼也陳以竒方伐集作進以猛餌外以針火導其血絡藥病相攻戰於其中及痼解病瘳六腑亦憊於是竭良藥以材調德膳以味從而補之然後六腑平百體正内强而外和矣夫代之愚醫則不然必使病勝而形羸不危其身者稀矣三公六曹國之六腑也果刑信賞國之筋絡也九州百郡國之四體也四夷八蠻國之外膚也驕荒淫異國之痼病也嘉謀長算國之竒方也强將勁兵國之針火也禮樂法度國之德膳良藥也夫百骸居於外六腑列於内相假而成生相致而動息本為一身也及一腑失理容而不攻其乆日大攻而不除其乆為痼除而不補其乆復發為廢集作瘵難矣臣以為天寳貽痼始於一支而容之浸及百體㡬危其形𤣥宗肅宗除而不終痼及興元德宗之時又無良臣可進内强之術而攻不克集作就先皇攻於除而不攻於補今乃復發於幽薊居國之左右又有西戎之厲居於右掌之膚渉腕逾肘今已及肩何以知其自掌而及肩也以安西至於涇隴一萬二千里其間嚴闕疑重阻皆為戎有由此知其及肩也則王畿界戎無五百里此肩之去喉能逺乎奈何容而不除也此皆發於中朝之闕而流其病也若四方之弊莫若山東隴右之急莫若武備之不至又請詳舉之夫聖人之母萬物必體天地之功故以陽為文教極其光明也以隂為武備盡其肅厲也夫陽盈則韜而隂藩之隂盈則復而陽濟之故能相理而不亂五月陽盈使一隂居其間明正陰之有位而盗陰不生也故聖人因之以武備至於十一月陰盈包將来之陽可大可乆也故外作雪霜以厲之恐僣陽之道也内宻燠而養之使其為文為光也故聖人因之求賢以為輔雹凍霜雪禁其㷊蕪陰用也故聖人因之以正刑雷風為前驅蕩其所不通温光從而暘集作舒之陽徳也故聖人因之以大宥是以聖人之徳文雖先川文粹作雖尚文而武備不去前年淮夷擒齊魯滅常山死幽薊歸集作幽燕歸文粹作幽薊翫臣未見制法有方法也而議者且以為兵可戢也遂用羸将守常山滯儒臨薊北不旋踵而賊氣復作矣伏願陛下慎動誡盈無傷陰之大候且行化在便人舉兵在立勢夫百斛之車百蹄之牛不能摇其轂如措之峻坂之上擾之力者不盡數牛及轟然而遷則牛足之運不給輪奔矣此立勢之樞也今幽薊之兵其由病者之再病也人虚而强履獨有立勢而誅之立勢之急在於聚威於深闕實力於滄定然後以趙魏臨常山環兵而攻之則冀馬之縱不望合於燕蹄矣以太原之師入薊邱則易水之東左臂不能旁運矣此拘燕固集作囚冀之方也如其擒縱之法出於一時者則名將而用耳川文粹作則在名將而用耳如其威不聚於急力不實於危雖有名将不能為也陛下見西制戎北制虜壁壘之勢盤連交錯兵甲之多賞勞之厚以為戎虜之畏此而不敢犯塞今以刑賞之不信也而戎臣以自入士卒虚名占籍者十五不啻日夜飛金壁走銀繒市言唯恐田園陂池之不廣也簮珥羽鈿之不侈也洞房綺闥之不邃也不如此不足以積怨勞卒及寇來則必固壁閉兵無敢出擊者如一日戎戈東刄陛下將安倚乎今北方擾攘猶已事嫁矣川文粹作既已負約矣而西戎之虚盟安足信之不可無虞也夫人性有勇怯地形有險易勇怯可以習制制之以刑則亡怯樂之以利則亡怯慴之以勢則亡怯假如陟險利強弩以持文粹作遲重者據之平陸利騎戈以捷手健蹄者兼之此得勢而亡怯也今士卒之獲戎者得其馬羊牛雜畜及衣装寳絡皆與之無令有所奮奪此顧利而亡怯也蒙兵失律者皆誅此畏刑而亡怯也如此而用勇倍百矣臣嘗仕於邉又嘗與戎降人言自瀚海已東神鳥燉煌張掖酒泉東至於金城㑹寧東南至於上邽清水凡五十郡六鎮十五軍皆唐人子孫生為戎奴婢田牧種作或貶集作藂居城落之間或散䖏野澤之中及霜露既降以為嵗時必東望啼呼集作嘘其感故國之恩集作思如此陛下能不念之臣意西戎今冬當踰河拒北虜明年必大入靈武寇西城先擊監宥誠能因此時詔寧隴邠涇及南梁皆㑹兵計事獨得以老弱留謹城其他少壮及騎士皆持装佩鹽糗令邠寧涇原軍皆出平凉道弹筝邠寧軍北固崆峒守蕭關涇原軍西遮木硖關鳳翔軍逾隴出上邽因臨洮取鳳林闗南梁軍道鳳逾黄花因狄道㑹隴西得其利則擊因其牛羊足以供具各以輕騎入賀集作河蘭撫諭其遺人飛聲流勢延而益西則故地盡可得也如此則王畿之内安有警烽之虞哉臣固曰四方之弊莫若山東隴右今䇿臣之目曰直言極諌則言無所不直直不懼於罪也若諌無不極者今百不盡臣之一二焉何者荅問之所及或未利於國臣雖欲漏之而不解則懼執事之臣不寤也睿問之所不及者當臣之所蓄集作言實或集無或字有利於國臣雖欲奏之臣懼罪言於非宜也而况晦寒集作短晷之晨奔光馳曜之下筆之條奏拘以文陳乎臣所以憤懣之誠百不及一二也豈無異日而顧問哉伏惟陛下察焉謹對文苑英華巻四百九十二
