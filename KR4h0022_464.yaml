body:
  text: 文苑英華卷四百六十四宋李昉等編詔敕六廢置置乾封明堂縣制制集東臺元天著象於紫微厚地區域於赤縣外崇四嶽伊帝闡其宏規旁别九州玄王邵其丕績所以料兹物土畫野分疆相彼人事觀時濟俗開物成務理則由然髙祖皇帝誕膺靈命肇開景業括囊軒頊孕育胥庭太宗文皇帝大聖登期自天縱哲撲崑岑之猛燎拯滄海之飛流巍巍蕩蕩無德而名朕以虛薄夙奉瑶圗承纍德之洪猷履會昌之嘉運中外禔福逺邇乂安仰薦成功升禋岱巘緬惟嚴配祗建合宫感事開元聿光先德俾我黎獻永賴隆平寧濟之方實資寬簡鑒寐凝想思致厥塗以為翼翼上京率土攸仰剪華抗堞貫渭疏瀾城闕崇嚴都邑夷敞户口盈積市獄殷繁東西兩縣官曺尚少在於撫字事或難周至於辭訟綜理時闕須分所職各使兼濟其長安縣宜置乾封縣萬年縣析置明堂縣並於京城內近南安置其户口即於兩縣逐便割𨽻應須官寮并公𪠘等一事以上并凖長安萬年兩縣各令所司處分奏聞庶使憂勤之懷獨映於前古建元之慶長垂於後葉揔章元年十一月二十二日置鴻宜鼎稷等州制鸞臺朕聞先王疆理天下也莫不料其土宇相其地宜分五服以應財成宅三川而適通變辨方樹辟協和之道以隆置郡罷侯經始之圗載逺而區分或異制度罕同連率法於在鎬牧守儀於起沛官稀則政毁地狹則人勞義在隨時期於致乂我大周席蘿闡化夢梓登期通三授玄扈之濵得一升翠媯之汭春秋合成圗曰黃帝逰玄扈洛上云云又河圗挺怪輔日黃帝齋七日至翠媯之川云云並見藝文類聚維嵩設險聳危峯於少室在河稱防𨗳洪波於太史卜兹洛食是曰奧區物産孔殷形勝斯在朕仰膺眷命俯叶時雍詔令作樂推即瀍澗之基恢鼎革之運珍符寶貺賁發郊藪佳氣榮光昭煥川澤建明堂而陟配立清廟以嚴禋方闡隆周之業以光卜年之兆况成王定鼎此則餘基永言朝貢實歸中壤是霜露之所均當水陸之交會庶齊勞逸無隔遐邇作制王畿雖憲章於故實緬惟帝邑未折衷於新規宜𢎞自我之典式廣來蘇之澤但京兆之地舊號秦中乃眷編氓最為繁殖一州獨治事多擁滯宜令雍州管內析置五州其間於雍州以西安置潼關即宜廢省然以千里之內舊制通畿征賦所出事資廣逺又王侯設險以固其國若無襟帶何以為守雍州并所析州同州太州並通入畿內洛州南面東面北面仍各置關庶幾食菜之家詔令作地自分湯沐之邑棄繻之客更從軒蓋之逰其雍州舊管及同太等州土狹人稠營種辛苦有情願向神都編貫者宜聽仍給復三年百姓無田業者任其所欲即各差清強官押領并許將家口自隨便以次三字詔令作便於水次量給船乘作船次進發至都分付洛州受領支配闕安置訖申司録奏聞人惟邦本本固邦寧將以不肅而成既庶而富欲令率土黔黎咸得遂性勞求安措一作集人不廢詔令作失業其有諸州人或先緣飢嵗流宕忘歸或父兄去官因循寄住為籍貫屬恐陷刑名荏苒多時未經首出衛士雜色人等並限百日內首盡任於神都及畿內懷鄭汴許汝等州附貫給復一年復滿便依本畨上下其官人百姓有情願於洛懷等七州附貫者亦聽應須交割及發遣受領並委本貫共新附州分明計會不得因兹隱漏户口虛蠲賦役并新析五州三面及雍州以西置關處所司具為條例務從省便奏聞天授二年七月九日廢潼關雍洛州置開鄭汴許衛等州府制詔令作以鄭汴等州為王畿制鸞臺朕聞上圗列宿垂七紀而環紫微下科物土制八紘而尊赤縣是以帝猷方盛開甸服於平陽王業肇基創神郊於景亳雖政或沿革道有汚隆強幹弱枝率由兹典用能體國經野阜詔令作濟俗安人法天險之崇髙顯宸居之壯觀朕膺詔令作應此符命大庇黎元俯順謳歌君臨區夏紹隆周之睿業因丕洛之鴻基相彼土中實惟新邑五方入貢兼水陸之詔令作而駿奔六氣運行均霜露而調序山川形勝祥祉荐臻逺寐乾心近收氓欲式建宗社大啓神都知王者之無外明在德之可久粵自夏殷分土列爵爰及秦漢置守罷侯所以東姫握圗王畿存千里之制西京御歷帝里據三輔之饒否泰既殊損益且異務歸於適物義尚於隨時朕以鼎業惟初寶祚伊始斟酌今古申畫封疆征賦科徭實資寬簡沃塉勞逸宜有平分緬懷習武之規載隆辨方之術可以洛東鄭州汴州南汝州許州西陜州虢州北懷州澤州潞州東北衛州西北蒲州為王畿內鄭州汴州許州可置八府汝州可置二府衛州可置五府别兵皆一千五百人所司詳依格格明為條例庶使固本之道􅞂轢於前修足兵之義牢籠於振古主者施行天授二年四月二十九日却置潼關制鸞臺山河作固肇自往圗關梁是修抑惟前典朕情存太朴志在無外成臯姫陜勿用咽喉函谷秦封解其襟帶欲使鴈行靡拾鶉居不擾而氓俗澆弊浮惰者多非所以禁絶末逰作限中外事資權變理貴從宜便可率由舊章安置應須修補及官典兵防一事以上所司速凖例處分其神都四面應須置關之處宜令檢校文昌虞部郎中王玄圭即往檢行詳擇要害務在省功斟酌古今必令折衷還日具圗樣奏聞聖厯元年五月十九日置勞州都督府制朕聞舞干戚者所以懷荒逺固城池者所以欵戎夷我國家頃有營州兹為虜障使北戎不敢窺覘東藩由其輯睦者久矣自趙翽失於鎮靜蕃部因此攜離頗有負塗之暌族聞改邑之歎髙墉填塹故里為墟言念於此每思開復逹奚饒樂郡王李大酺賜婚來朝已納呼韓之拜契丹松漠郡王李失活遣子入侍彌嘉秺侯之節咸申懇請朕所難為宜恢逺圖用光舊業其營州都督宜依舊於桞城置置北都制經邦創制建都設險必因時順人統物立極我國家以神武聖德應天受命龍躍晉水鳯翔太原建萬代之模為億兆之主猶成湯之居亳有一作姫周之興岐顧朕一作朕以眇身纂承昌運守宗社一作祖宗之大寶恢中原之鴻業叶時卜狩始經此一作北都事本因心情兼惟舊近者嘉一作禎祥荐至休瑞屢臻此皆宗祐一作祉降靈神祗潛暨豈豫匪一作伊菲德獨享厥休昔堯理唐郊式建丹陵之地漢居洛邑更表南陽之都今王業所興宫觀猶在列於邊郡情所未安非所以恢大聖之鴻規展孝思之誠敬其并州宜置北都改州為太原府刺史為尹司馬為少尹太原晉陽為赤縣諸縣為畿縣官吏品第視闕京河南府開元十一年正月一作皆唐大詔令條理詳定刑名制詔令作頒行新律詔制集門下朕聞大德曰生肖天地而為貴大寶曰位體宸極以居貞所以經緯三才彌綸萬物順人心以敷化因天討而立刑易稱明罰哀矜之志愈逺書云肆眚簡惠之道斯崇故能象服畫冠化隆上葉道德齊禮刑清中代暨乎大道既隱淳風已衰元首司契徇驕奢以臨下股肱贊道用深刻為奉公罪名積於簡書滋章被於率土姫訓夏法峻網備於三千秦革周科深文加於九族漢祖約法後嗣不勝其弊晉武蠲刑末流竟致一作臻其酷遂使茫茫區宇圄犴所以實繁蠢蠢黔黎手足為之無措自斯以降禁網愈密難深袁凖之書事切劉𢎞之奏太宗文皇帝至道難名玄功不測撥亂反正恤獄慎刑杜澆弊之餘源削繁苛之峻法道臻刑措二十餘年恥格之義斯隆惻隱之懷猶切玉几遺訓重令刋改瞻奉隆規興言感咽朕以虛寡夙嗣寶圗寅畏上玄憂勤庶類乘奔履薄懼一物之未安旰食宵衣慮萬方之多罪雖解網之德有慙列聖而好生之惠無愧伊心於是仰遵先旨旁求故實詔太尉揚州都督監修國史上柱國趙國公無忌開府儀同三司上柱國英國公績尚書左僕射監修國史上柱國燕國公志寧尚書右僕射監修國史上護軍北平縣開國公行成光祿大夫侍中監修國史上護軍蓨縣開國公高季輔銀青光祿大夫行黃門侍郎平昌縣開國公宇文節中書侍郎桞奭右丞假寶玄太常少卿令狐德棻吏部侍郎高敬言刑部侍郎劉燕客給事中趙文恪中書舍人孝友益少府丞張行實大理丞元紹太府丞王文端刑部郎中賈敏行等爰建朝賢詳定法律酌前王之令典考列辟之舊章適其輕重之宜採其寬猛之要使夫畫一之制簡而易從約法之文詔令作章疏而不漏再移期月方乃撰詔令作始勒成宜班下普天垂示來葉庶設而不犯均被皇恩詔令作均彼上皇凡在羣司詔令作臣逮於列嶽其務在審慎稱朕意焉永徽二年閏九月十四日刪定刑書制門下蓋大帝臨下覆燾之德彰焉聖人在上財成之迹著焉然則統天理運微政令不能通其道經國訓人非渙汗無以宣其化故羲爻演繇后以施命誥四方虞典記言帝乃敷文偹九域豈惟遒人振鐸理存乎闡教象闕懸書義在於垂法雖時分步驟必修詔令作循先甲之規代變驪騵無革逹名之軌既而淳源已往澆風漸扇姦宄於是萌生譎詐以之颷起相彼群俗頗乖於信義顧之庶尹罕嗣於忠勤尺一交馳徒有書亭之弊五條間出猶招挂壁之譏非所謂光闡帝圗作為人極者也由此緑綈爰降尤慎於繁冗黃素所施彌崇於曉諭皇家創業抑揚前古粵在貞觀大啓憲章浹聲教於幽遐燭文明於區宇鴻池衍誥統理詳密螭鈕騰文規模𢎞逺固以貽厥將來懸諸日月朕祗肅鴻業恭臨寶位握千載之禎符承百王之末緒凝神間館託軒夢以憂人深誦康衢用堯心而拯物然以萬機事揔恐聽覽之或遺四海務殷慮綏緝之多闕南宫故事綜覆已殫內史舊章搜羅殆盡自御宸扆一作居每懷氷谷身雖處於巖廊情實係於億兆比者在外州府數陳表疏京下諸司亦多奏請朕以為帝命多緒範圍之旨載𢎞王言如絲彌綸之道斯洽前後處分因事立文嵗序既淹條流遂積覽之者滋惑行之者愈詔令作逾怠但政貴有恆詞務體要道廣則難備事簡則易從故自永徽以來詔敕揔令沙汰詳稽得失甄别異同原始要終捐華托實其有在俗非便事縱省而悉除於時適宜文雖繁而必録隨義刪定類别詔令作以類區分上稟先規下齊庶政導生靈之耳目闢風化之户牖俾夫施之萬祀周知訓夏之方布之八埏共識司南之路仍令所司編次具為卷秩施行此外並停自今已後諸有表奏事非要切並凖敕令各申所司可頒示普天使知朕意主者施行儀鳯元年十二月五日定刑法制詔令作頒行律令格式制門下朕聞唐虞膺録畫象而人知禁夏商御圖設刑而罪不息周秦以降沿革罕同漢魏而還條流浸廣雖或輕或重一弛一張義在於訓人事期於肅物然則刑辟勿用見稱於昔典法令滋章貽譏於前哲朕情在愛育志切哀矜踈網恢恢實素懷之所尚苛政察察良夙心之所鄙方冀化致無為業先刑措近見所司進律令格式一一自觀至於經國成務之規訓俗懲違之範萬目咸舉一事無遺但能奉以周旋守而勿失自可懸諸日月播之黎庶何事不理何化不成先聖憂勤萬務遺念庶績或慮須有弛張所以泛令刪定今既綱維偹舉法制𢎞通理在不刋義歸無改豈可更有異同别加撰削必年月久逺於時用不便當廣延羣議與公卿等謀之今未有疑無庸措筆其先律令格式之本宜早先布凡厥在職務須遵奉輒造異端妄踰軌躅者咸禁除之庶用刑符於畫一守法在於無二內外寮宷知朕意焉文明元年四月二十二日申理寃屈制門下大帝降鑒無幽不燭下人上訴在屈必伸將使處巖廊者户牖絶千里之蔽詔令作遙御億兆者門庭無九重之隔故堯推心以撫俗業濟天下湯克己以察寃惠孚海內朕祗膺寶厯詔令作厯嗣寅奉璇圗常居安以戒危每在得而思失慮一夫之弗獲憂萬方之有罪以為承平既久區宇至曠州邑相望衆庶殷阜事繁則詐起法弊則姦生念兹寃滯載懷惻隱是以頻發詔書庶幾息訟比命申理未副朕懷百姓雖事披論官司不能正斷及於三司陳訴不為究尋向省告言又却付州縣至有財物相侵婚田交爭或為判官受屬有理者不申或以按主取錢合得者被奪或積嫌纍載橫誣非罪或肆忿一朝枉加殺害或頻經行陳竟無優賞或不當矢石便獲勳庸改换文簿更相替奪或於所部憑倩織作少付絲麻多收絹布或營造器物耕事田疇役即伍功雇無半直又境內市買無所畏憚虛立錢價抑取貴物實貪利以侵人乃據估以防罪或進退丁户等色多有請求或解補省佐之流專納賄賂或徴科賦役差點兵防無錢則貧弱先行詔令作充有詔令作行貨則富強獲免亦有鄉邑豪詔令作旋強容其請造或酒食交往或妻子去還假託恩威公行侵暴凡如此事固非一緒經歷臺省往來州縣動淹年嵗曽無與奪欲使元元何所控告見在京訴訟宜令朝散大夫守御史中丞崔謐朝散大夫守給事中劉景先朝請郎守中書舍人裴敬彛等於南牙門下外省共理寃屈屬户所有訴訟隨狀為其勘當有理者速即奏聞無理亦語發遣其有虛相搆架浪擾官方若更處分喧訴不絶者宜即科決使知懲厲仍限今年十二月內使了其在外州縣所有訴訟寃滯文案見未斷絶者並令常處速為盡理勘斷務使甘伏勿使淹滯若處斷不平所司紏察得實者所由宫人隨即科賦一作條付布告遐邇使知朕意主者施行儀鳯二年十一月十三日省獄官制詔令作減大理丞廢秋官獄敕鸞臺崇德簡刑列辟之彛範併官省事有國之良圗聖人執契以乘時道苞乾大善政改絃而馭俗義叶鼎新朕虔荷先基恭臨下土運一心之淺慮憂四海之羣生馭朽載兢踐氷惟惕幸賴九玄垂裕七廟宣靈天地以清風雨咸若菽粟登稔疆􅗲無虞荗祉日繁殊禎嵗集答昊穹之眷命順億兆之誠祈蒼璧靈壇展嚴禋於上帝黃金祕牒追顯號於前王大典聿申鴻符允暢斯實祖宗之遐慶函夏之多福豈朕虛薄能臻此乎但萬嵗初元肇開昌厯九章恆憲甫釋嚴科逺近無縲絏之寃老幼有歌謡之樂人皆遷善政在惟新丹筆刑官已絶理梧之聽黃沙獄户將為鞠草之場而法禁之曹宷寮斯衆司刑一局便有八丞既罕囚徒靜無推案豈煩多士虛習夏書宜減二員俾從他職文昌國府建禮天闈庶政是歸具寮攸仰諒青縑之美地非頳服之攸居雖復時有申讞頗斯聽斷兩造之文必具吾詞之理亦窮詎彼狴牢方甄枉直先臺置獄甚謂非宜今欲揔撤踈羅寧可别施囹圄其秋官獄即冝除毁朕既深居祕宇不能遍覽綿區惟仗時賢共康天下州縣牧宰寄重親人寮守勾曹任惟綱紀百姓或有愆犯必須盡理推尋審知罪狀分明方可禁身科斷不得才聞小過遽縶圜扉髙下其心同叔魚之鬻獄輕重其等爽定國之平刑黠吏從姦恣其乾沒要囚多滯積以炎涼有一於兹當加貶譴幸悉心而慎罰同底績以勝殘佇𢎞勿辟之規用闡無為之化將使三千之罪永絶於當年豈惟數百之刑僅寬於昔代布告天下識朕意焉萬嵗登豐元年十月十三日申寃制門下九重嚴邃非呌閽之可聞萬邦遐曠因表疏而方逹朕尊居黃屋乃心詔令作心念蒼生微物不安每切納隍之慮一人失業更軫宵衣之懷思欲下情上通無令壅隔所以明四聰者也其官人百姓等有寃滯未申或獄訟失職或賢才不舉或獻納詔令作進獻謀猷如此之流任其投匭凡百士庶宜識朕懷神龍元年二月二十七日文苑英華卷四百六十四
