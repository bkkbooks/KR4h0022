body:
  text: 文苑英華卷一百五十七宋李昉等編天部七元日二首春四十三首人日三首上元三首寒食二十首上已五首三月晦日一首附夏八首端午二首伏日一首元日元日寄韋氏妹杜甫近聞韋氏妹迎在漢鍾離郎伯殊方鎮京華舊國移春城回北斗郢樹發南枝不見朝正使啼痕滿面垂元日劉長卿建寅回北斗看厯覘東風律變蒼雜詠作滄江外年加白髮中春衣試稚子夀酒勸悲翁今日陽和發榮枯豈不同春春日想上林梁簡文帝春風本自竒楊柳最相宜柳條類聚作葉恆著地楊花好上吹處處春心動常惜光隂移西京董賢館南苑習都池荇間魚共樂桃上鳥相窺香車雲母幰駛馬黃金羈晚春前人紫蘭葉初滿黃一作嬌鶯㺯不稀石蹲還似獸蘿長更如一作勝衣水曲一作凍文魚一作鰩聚林一作山暝鴉鳥飛渚蒲變新節巖松長舊圍風花落未已山窗一作齊開夜扉一作皆藝文類聚春日梁元帝新鶯隱葉囀新燕向窗飛柳絮時依酒梅花任初學記作乍入衣玉珂隨風度金鞍照日暉無令春色晚獨望行人歸春詠吳均春從何處來拂水復驚梅雲障青瑣闥風吹承露臺美人隔千里羅幃閉不開無由共得類聚作得共語空對相思杯同前王筠金堤草非舊玉池泉已新風生似羊角雲上若魚鱗幽閨多怨思停織坐回春芳華既零落方作向隅人春日貽劉孝綽蕭子顯澗水初流碧山櫻早發紅新禽爭弄響落絮類聚作落蘂亂從風拂一作掃筵多軟幹映户悉花叢誰云相去逺垂柳對高桐此詩後五句一本誤作簡文帝春日庾肩吾桃紅柳絮白照日復隨風影出朱城外花類聚作香歸青殿中水映寄生竹山橫半死桐頒文知淚類聚作渥重嫋札愧才空同前聞人舊高臺動春色清池映日華緑葵向光轉翠柳逐風斜林有鳴心鳥園多奪目花相與咸知節歎豫獨離家初春沈約扶道覔陽春相將共携手草色猶自非林中都未有無事逐梅花空教信楊柳且復歸去來含情寄杯酒詠春前人楊柳亂如絲綺羅不自持春草復黃緑客類聚作傷心悲此時青苔已結洧碧水復盈淇日華照趙瑟風心動燕姬襟中類聚作襟中萬行淚故是一相思同前前人弱草半抽黃輕條未全緑年芳被禁籞煙華繞曽曲寒苔卷復舒名泉斷方續早花散疑金初露泫成玉春日寄鄉友王僧孺旅心已多恨春至尚離羣翠披類聚作枝結斜影水緑散直文類聚作緑水散圓文戲魚兩相顧遊鳥半藏雲何時不憫默是日最思君春思前人雪罷枝即青氷開春類聚作水便緑復聞黃鳥聲全作相思曲詠春前人岸集作崖煙起暮色岸水帶斜暉集作輝徑狹橫枝度簾搖驚燕飛落花承步履流澗寫行衣何殊九芝蓋薄暮洞庭歸奉賀趙王西京路春旦庾信直城龍首抗橫橋天漢分風鳥疑近日露掌定高雲新渠還入渭舊鼎更開汾漢獵熊攀檻秦田雉失羣宜年動春律御宿斂寒氛弄玉迎簫史東方覔細君楊柳成歌曲蒲桃學繡文鳥鳴還獨解花開先自薰誰知灞陵下猶有故將軍詠春前人逍遙遊桂苑寂寞想桃源狹石分花徑長橋映水門管聲驚百鳥人衣香一園定知歡未足橫琴坐樹根春望周宗懷日暮春臺倚初學記作傍徙倚愛餘光都尉新移棗司空始種楊一枝猶桂馥十步有蘭香望望無萱草忘憂竟不忘早春前人昨暝春風起今朝春氣來鶯鳴一兩轉花樹數重開散粉成初蝶剪彩作新梅逰客傷千里無暇上高臺晚春隋煬帝見初學記洛陽春稍晚四望滿清暉楊葉行將暗桃花落未稀窺簷燕爭入穿林鳥亂飛唯當關塞者溽露方霑衣山庭春日江總洗沐惟五日棲遲在一丘古槎橫近澗危石聳前洲岸緑開河柳池紅照海榴野花寧待晦山蟲詎識秋人生復能幾夜燭非長逰春庭晚望初學記作春晚庭望隋蕭懿春庭聊縱望樓臺自相隱窗梅落晚花池竹開初筍泉鳴知水急雲來覺山近不愁花不飛到畏花飛盡首春唐太宗寒隨窮律變春逐鳥聲開初風飄帶柳晚雪間花梅碧林青舊竹緑沼翠新苔芝田初鴈去綺樹未鶯來月晦前人晦魄移中律凝暄起麗城罩雲朝蓋上穿露曉珠呈笑樹花分色啼枝鳥合聲披襟歡眺望極目暢春情春朝閒步楊思道偃沐垂閒豫清晨步北林池塘藉芳草蘭芷襲幽襟霧中分曉日花裏㺯春禽野徑香恆滿山階筍屢侵何須命傾蓋桃李自成隂春日行歌劉希夷山樹落梅花飛落野人家野人何所有滿甕陽春酒携酒上春臺行歌伴落梅醉罷卧明月乘夢逰天台遊春邢巨海嶽三峯古春皇二月寒緑潭漁子釣紅樹美人攀弱蔓環沙嶼飛花㸃石關溪山逰未厭琴酌弄晴灣春曉孟浩然春眠不覺曉處處聞啼鳥欲知昨夜風集作夜來風雨聲花落知一作無多少立春後休沐包佶心與青春背新年亦掩扉漸窮無相學唯避不才譏積病攻難愈銜恩報轉微定知書沒雜詠作課日優詔許辭歸春夜所思岑參洞房昨夜春風起遙憶美人一作故人尚隔湘江水枕上片集作半時春夢中行盡江南數千里春日即事二首耿緯詩書成志業懶慢致蹉跎聖代丹霄逺芳時白髮多淺謀猶集作堪自笑窮巷憶誰過寂寞前山暮集作路歸人樵採歌二數畝東臯宅青春獨屏居家貧僮僕慢官罷友朋疏强飲沽來酒羞看課了書閒花開集作更滿地惆悵復何如詠春色楊衡靄靄復濛濛非霧滿晴空密添宫柳翠暗泄路桃紅縈絲光乍失緣隟影才通夕迷鴛枕上朝漫綺絃中促駟馳香陌勞鶯轉艷叢可憐腸斷望併在洛城東春日偶題前人何處春先到橋東水北亭凍花開未得冷酒酌難醒就日移輕榻遮風展小屏更無人勸飲集作不勞人勸醉鶯語漸叮嚀早春即事前人眼重朝眠足頭輕宿醉醒陽光滿前户雪水半中庭候集作物變隨天氣春生逐地形北簷梅晚白東岸柳先青葱隴抽羊角松巢墮鶴翎老來詩更拙吟罷少人聽送春前人三月三十日春歸日復暮惆悵問春風明朝應不住送春曲江上眷眷東西顧但見撲水花紛紛不知數人生似行客兩足無停步日日進前程前程幾多路兵刃與水火盡可違之去唯有老到來人間無避處感時良為已獨倚池南樹今日送春心心如别親故早春司空圖傷懷同客處病眼即花朝草嫩侵疑沙短氷輕著雨銷風光知可愛容髮不相饒早晚丹丘去飛書首見招春日溫庭筠柳岸杏花稀梅梁乳燕飛美人鸞鏡笑嘶馬鴈門歸楚宫雲影薄臺城心賞違從來千里恨邊色滿戎衣同前方干年去年來似有期日高添睡是歸時雖將細雨催蘆笋却用東風染柳絲重霧已應吞海色輕霜猶自銼花枝此時野客因花醉醉卧花間應不知春隂鄭谷携琴當酒度春隂不自謀生祗解吟舞蝶歌鶯莫相試老郎心是老僧心惜春羅鄴燕歸巢後即離羣吟倚東風恨日曛一别一年方見我愁來愁去不禁君鶯花御苑看將盡絲竹侯家一作門亦少聞獨在南樓最惆悵柳塘飛絮更紛紛早春周朴良夜歲應足嚴風為變春遍回寒作暖通改舊成新秀樹因馨雨疑融氷雨泛蘋韶光不偏黨積漸煦疲民長安春感杜荀鶴出京無計住京難深入東風集作門轉索然滿眼有花寒食下一家無信楚江邊此時晴景愁於雨是處鶯聲苦極集作却蟬公道算來終逹去更從今日望明年立春曹松春日一杯酒便吟春日詩木梢寒未覺地脉暖先知鳥囀星沉後山分雪薄時寧無剪花手贈與最芳枝雜詠作賞心枝人日人日思歸薛道衡見雜詠入春才七日離家已二年人歸落鴈後思發在花前人日登高喬侃見雜詠僕本多悲者年來不悟春登高一遊目始覺柳條新杜陵猶識漢桃源不辨秦暫若升雲霧還似出囂塵賴得煙霞氣淹留攀桂人人日寄杜二高適人日題詩寄草堂遙憐故人思故鄉柳條弄色不忍見梅花滿枝堪集作空斷腸身在逺集作南藩無所預心懷百憂復千慮今年人日空相憶明年此集作老日知何處一卧東山三十春豈知書劒與集作老風塵龍鍾還忝二千石愧爾東西南北人上元十五夜觀燈盧照鄰見雜詠錦里開芳宴蘭釭艷早年縟彩遙分地繁光逺綴天接漢疑星落依樓似月懸别有千金笑來映九枝前正月十五夜蘇味道集無此篇火樹銀花合星橋鐵鎖開暗塵隨馬去明月逐人來遊騎雜詠作妓皆穠李行歌盡落梅金吾不禁夜玉漏莫相催同前崔液見雜詠玉漏銅壺且莫催鐵關金鎖徹明開誰家見月能閒坐何處聞燈不看來寒食寒食清明日早赴王門率成李嶠遊客初雜詠作趨梁邸朝光入楚臺槐煙乘曉散榆火應春開日帶晴虹上花隨早蝶來雄風乘令節餘吹拂衣灰雜詠作歌吹拂輕灰嶺表逢寒食歡州風景不作寒食沈佺期嶺外遲集作海外無寒食春來不見餳洛陽新甲子何日是清明花柳爭朝發軒車滿路迎帝鄉遙可念腸斷報花情寒食絶句李宗嗣普天皆滅焰匝地盡藏煙不知何處火來至集作就客心燃和常州崔使君寒食夜孫逖見雜詠聞道清明近春庭向夕闌行遊晝不厭風物夜宜看斗柄更初轉梅花暗裏殘無勞秉華燭晴月在南端和上已連寒食有懷京洛前人天津御柳碧遙遙軒騎相從半下朝行樂光輝寒食借太平歌舞晚春饒紅粧樓下東郊道青草洲邊南渡橋坐見司空掃兩第看君侍從落花朝寒食汜水山中作王維見雜詠廣武城邊逢暮春汶陽歸客淚沾巾落花寂寂啼山鳥楊柳青青渡水人一百五日夜對月杜甫見集本無家對寒食有淚如金波斫却月中桂清光應更多仳離放紅蘂想象嚬青娥牛女漫愁思秋期猶渡河清明前人此身飄泊苦西東右臂偏枯半耳聾寂寂繫舟雙下淚悠悠伏枕左書空十年蹴踘將雛逺萬里鞦韆習俗同旅鴈上樓歸紫塞家人鑽火用青楓秦城樓閣煙花裏漢主山河錦繡中春去集作風水春來洞庭濶白蘋愁殺白頭翁奉和陸中丞使君長源寒食日作釋皎然寒食江天氣最清庾公晨望動高情因逢內火千家靜便覩行春萬木榮深淺山容飛雨細縈紆水態拂雲輕腰章本郡誰相似數日臨民雜詠作人政已成寒食日即事韓翃春城無處不飛花寒食東風御柳斜一夜集作日暮漢宫傳蠟燭青集作輕煙散入五侯家洛陽清明日雨霽李正封曉日清明天夜來嵩少雨千門止煙火九陌無塵雜詠作風土酒渌市文粹作河橋春漏閒宫殿午遊人戀芳草半犯嚴城鼓寒食日寄李補闕郭鄖蘭陵士女滿晴川郊外紛紛拜古埏萬井閭閻皆禁火九原松柏自生煙人間後事悲前事鏡裏今年老去年介子終知祿不及王孫誰肯一相憐洛橋寒食白居易上苑風煙好中橋道路平蹴毬塵不起潑火雨新晴宿醉頭仍重晨遊眼乍明老慵雖省事眷集作春誘尚多情遇客踟蹰立尋花取次行連錢嚼金勒鑿落寫銀罌府醖傷教送宫集作官娃氣集作起要迎舞腰那及柳歌舌不如鶯鄉國真堪戀光隂可合輕三年寒食節集作遇寒食盡在洛陽城寒食江畔前人草香沙暖水雲晴風景令人憶帝京還似往年春氣味不宜今日病心情聞鶯樹下沉吟立信馬江頭取次行忽見紫桐花悵望下邽明日是清明寒食前有懷溫庭筠見雜詠萬物相鮮雨乍晴春寒戚雜詠作寂歷近清明殘芳苒荏雙飛蝶晚睡朦朧百囀鶯舊侣不歸成獨酌故園雖在有誰耕悠然便雜詠作耕起嚴灘恨一宿東風蕙草生寒食遣懷趙嘏折柳城邊起暮愁可憐春色獨懷秋一作羞傷心雜詠作沾襟正歎人間事回首更慚江上鷗鶗鴂聲中寒食酒芙蓉苑外夕陽樓憑高滿眼送清渭去傍故山山下流寒食日早出城東羅隱青門欲曙天車蓋集作馬已喧闐禁柳搖風細墻花折露鮮向誰誇麗景只此是雜詠作是歎流年不得高飛便回頭望紙鳶長安清明韋莊早是傷春暮雨天可憐芳雜詠作風草更芊芊內官初賜清明火上相閒分白打錢紫陌亂嘶紅叱撥緑楊高影雜詠作映畫秋千遊人記得承平事暗喜風光似昔年寒食二首李山甫柳礙雜詠作撥東風一向斜春隂淡淡濛人家有時三㸃兩㸃雨到處十枝五枝花萬井樓臺疑繡畫九原珠翠似煙霞年年今日誰相問獨坐長安泣歲華二風煙放蕩花披猖秋千女兒飛出墻繡袍馳馬拾雜詠作掇遺翠錦袖鬬雞喧廣場天地氣和融霽色池臺日暖燒雜詠作繞春光自憐塵土無多事空脫荷衣泥醉鄉上已三日率爾成篇沈約麗日屬元已年芳具在斯開花已匝樹流鶯復滿枝洛陽繁華子長安輕薄兒東出千金堰西臨鴈鶩陂逰絲映空轉高柳拂池垂緑萍類聚作帷文照耀紫燕光陸離清晨戲伊水薄暮宿蘭池象筵鳴寶瑟金瓶泛玉巵仍憶蠶眠起類聚作寧憶春蠶起日暮桑欲萎長袂屢以拂雕胡方自炊愛而不可見宿昔减容儀早常忘情士歎息獨何為上已禊飲盧思道山泉好風日城市厭囂塵聊持一樽酒共尋千里春餘光下幽桂夕吹舞青蘋何時出關後重有入山人桂州三月三日宋之問代業京華裏逺投魑魅鄉登高望不見涉海四茫茫伊昔承休盼曽為人所羡兩宫雜詠作朝賜顔色二紀陪遊宴昆明御雜詠作籞宿侍龍媒伊闕天泉復幾回西夏黃河水心劒東周清洛羽觴杯苑中落花掃還合河畔垂楊撥不開千秋獻夀多行樂柏梁和歌攀睿作賜金分帛駐光輝風舉雲搖入紫微晨趨北闕鳴珂至夜出南宫把燭歸載筆儒林多歲月襆被文昌佐吳越越中山海高且深興來無處不登臨永和九年刺海郡暮春三月醉山隂愚謂嬉遊長作昔不言流寓倐成今始安繁華舊風俗帳飲傾城沸江曲主人絲管清且悲客子肝腸斷還續荔浦衡高萬里餘洛陽音信絶能踈故園今日應愁思曲水何能更祓除作伴唯憐合浦葉思歸豈食桂江魚不求漢使金囊贈願得家人錦字書上已日劉駕上已曲江濵喧於市朝路相尋不見者此地皆相遇日光去此逺翠幕張如霧何事歡娛中易覺春城暮物情重此節不是愛芳樹明日花更多何人肯回顧同前一作上已日寄韓八唐彥謙上已接寒食鶯花寥落辰微微潑火雨草草踏青人凉似三秋景清無九陌塵伯輿一作怕與同病者對此合傷神三月晦日贈録事一作評事賈島三月更當更一作正三十日春一作風光别我苦吟身共君今夜不須寢集作寐一作睡未至曉鐘集作未到五更猶是春此詩二百五十九卷重出今已削去注異同為一作夏夏夜獨坐蕭子範節序遇類聚作值徂炎茲宵在三伏憑軒佇凉氣中筵卷煩燠寂寞對空窗清疏林類聚作臨夜竹蟲聲亂階草螢光繞庭木簾月度斜暉風花起餘馥一傷年志罷長嗟逝波速夏日徐朏夏景厭房櫳促席玩花叢篠初學記作荷隂叙合翠蓮影對分紅此時避炎熱清樽獨未空同前李德林見初學記夏景多煩蒸山水暫追凉桐枝覆玉檻荷葉滿銀塘輕扇搖明月珍簟拂流黃壺盛仙客酒瓶貯帝臺漿才人下銅雀侍妓出明光歌聲越齊市舞曲冠平陽微風動羅帶薄汗染紅粧共欣陪宴賞千秋樂未央初夏唐太宗一朝初初學記作春夏改隔夜鳥花遷隂陽深淺葉曉夕重輕煙哢鶯猶響殿橫絲正網天珮高蘭影接綬細草文連碧鱗驚棹側𤣥燕舞簷前何必汾陽處始復有山泉賦得夏首啓節前人北闕三分晚南榮九夏初黃鶯哢漸變翠林花落餘瀑流還響石初學記作谷猿啼自應虛早荷向心捲長楊就影舒此時歌不極調軫坐相於夏日即事裴說僻居門巷靜竟日坐階墀鵲喜雖傳集作還逢信蛩吟不見詩筍抽通舊竹梅落集作墮立閒枝此際無塵繞僧來稱所宜夏日即事劉得仁到曉改詩句四鄰嫌苦吟中霄橫北斗夏木隱棲禽天地先秋肅軒窗映月深幽庭多此景却恐曙光侵晚夏前人日夕是西風流光半已空山光漸凝碧樹葉即翻紅學淺慚多士秋成羡老農誰憐信公道不泣路岐中端午五日王筠見初學記裁縫逗早夏㸃畫守初晨綃紈既妍媚脂粉亦香新長絲表良節命縷應佳辰結蘆同楚客採艾異詩人折花競鮮彩拭露染芳津含嬌起斜盼斂笑動微嚬獻璫依洛浦懷珮似江濵須待恩光接中夜奉衣巾同前魏收見初學記麥凉殊未畢蜩鳴早欲聞喧林尚黃鳥浮天已白雲辟兵書鬼字神印題靈文因想蒼梧郡茲日祀陳君伏日伏日作鄭曉平生三伏時道路無行車閉門避暑卧出入不相過今世褦襶子觸熱到人家主人聞客來嚬蹙類聚作蹴奈此何謂當起行去安坐正踞跨所說無一急踏􅀈一何多疲倦向之久笑問君極那搖扇臂類聚作脾中痛雜詠作疼流汗正滂沱莫謂此小事亦是一大瑕傳戒類聚作語諸高明熱行宜見訶文苑英華卷一百五十七
