body:
  text: 文苑英華卷二百六十宋李昉等編寄贈十四姚合十三首于武陵四首朱慶餘八首厲元一首釋無可七首劉得仁十九首贈太祝張籍姚合絶妙集作妙絶江南曲凄凉愍女詩古風無手敵新語是人知飛動終由格功夫過却竒儒書參雜集作添集卷樂府换歌詞李白應先拜集作許劉禎必有集作自疑貧須君子救病合國家醫野老集作客開山借鄰僧與米炊甘窮集作貧辭聘幣依選授集作受官資多見愁連曉集作晚稀聞債盡時聖朝文墨集作物盛太祝獨低眉以下十三篇竝見集本惟寄李使君一篇集無贈王建司馬前人久向空門隱交親亦不知文髙輕古語集作意官冷似前資老學集作覺僧齊健貧還藥價集作酒債遲仙方小字寫行坐把相隨寄李頻前人性疏常似病集作閉門常不出閒院一作惟覺長庭莎朋友來看少詩書卧讀多命隨才苦集作共薄愁與酒集作醉相和珍重君名字新登甲乙科寄王度前人憔悴王居士顛狂不稱時天公與貧病時輩便集作復輕欺茅屋隨時賃集作年借盤餐逐日移集作炊棄嫌官似夢敬集作珍重酒如師無竹栽蘆看思山疊石為靜窗邀客睡集作留客話古寺覔僧棊瘦馬寒來死羸童餓得癡唯尋阮籍傳集作唯應尋阮籍心事逺相知寄賈島前人漫向城中住兒童不識錢甕頭寒絶酒竈額曉集作冷無煙狂發吟如哭愁來坐似禪新詩有幾首旋被衆人傳寄李羣玉前人九衢名與利無計擾閒人道逺輕欺世才髙貴重身石脂稀勝乳玉粉細如塵骨換肌膚膩心虛集作靈氣色真嵩山髙到日洛水暖如春居住應安穩黃金幾竈新懷書寄友人六韻前人精心奉北宗微官在南宫舉世勞無適開門事不窮年來復幾日蟬去又鳴鴻衰疾誰人問閒情與酒通四鄰寒稍靜九陌夜方空知老何山是愚歸幽谷中寄裴使君集作喜覽裴中丞詩卷前人新詩盈道路清韻似敲金調格江山峻功夫日月深蜀箋方入寫越客始銷吟後輩難知處朝朝枉用心寄綘州李使君前人獨施清靜化千里管橫汾黎庶應深感朝廷亦細聞心期在黃老家事是功勳物外須仙侣人間要使君花多勻地落疑山近滿庭雲戎客無因去西看白日曛寄陸渾縣尉李景先前人微俸應集作還同請唯君獨自閒地偏無驛路藥賤管仙山月色生松裏泉聲在石間吟詩復飲酒何事更相關奉寄集作和東都留守令狐相公前人除書集作官東守洛陽宫恩比藩方任更雄拜表出時傳七刻排班衙日有三公旌旗嚴重臨關外侍府集作庭宇清深接禁中三十六峯詩酒思朝朝閒望與誰同寄東都分司白賔客前人闕下髙眠過十旬南宫印綬乞離身詩中得意應千首海內嫌官只一人賔客分司真是隱山泉繞宅豈辭貧竹齊晚起多無事唯到龍門寺裏頻寄狄文粹作耿拾遺時魏州從事前人少在兵馬間長還繫戎職雞飛不得逺豈要生羽翼三年城中遊與君最相識應知我衷腸不苟念衣食主人樹勳名欲滅天下賊愚雖乏智謀願陳一夫力人生須氣健饑凍縛不得睡當一席寬覺乃千里窄古人不懼死所懼死無益至交不可合一合難離析君嘗相勸勉苦語毒胸臆百年心知間誰恨集作限河南北贈賣松人于武陵入市雖求利憐君意獨真欲將寒澗樹賣與翠樓人瘦葉幾經雪淡花應少春長安種桃李徒染六街塵友人南逰不回因而有寄前人相思春樹緑千里亦依依鄠杜月頻滿瀟湘人不歸桂花風半落煙草蝶雙飛一别無消息水南車迹稀早春日山居寄城郭知已前人陽和潜發蕩寒隂便使川原景象深入户風泉聲瀝瀝當軒雲岫自沉沉殘雲帶雨輕飄雪嫩栁含烟小綻金雖有眼前詩酒興遨遊爭得稱閒心寄友人前人長安清渭東逰子迹重重皆是紅塵路難尋君馬蹤昔時輕一别漸老貴相逢應戀嵩陽住嵩陽有古松孔尚書致仕因而有寄贈朱慶餘髙人心易足三表乞身閒與世長集作因踈索唯僧得往還直聲留闕下生計在林間時復逢晴集作清景乘車看逺山上汴州集作淮南令狐相公前人罷相恩猶在那容處靜司政嚴初領節名重更因詩公事巡營後戎裝拜𠡠時恭聞長與善應念出集作合在身遲贈集作題寄王祕書前人唯求賣集作買藥價此外更無機扶病看紅葉辭官著白衣斷籬通野徑髙樹䕃鄰扉時復留僧宿餘集作逰人見亦稀上江州李員外前人起家聲望重自古更誰過得在朝廷少還因諫諍多經年愁瘴癘幾處想一作遇恩波入境無餘事唯聞父老歌賀張水部員外拜命前人省中官最美無似水曹郎前代佳名遜當時重姓張白鬚吟麗句紅葉吐朝陽徒有歸山意君恩未可忘發沂州寄田少君前人識君心未半意欲往經秋見酒聫詩句逢花跋馬頭别來唯獨宿夢裏尚同逰所在求餐過無因解得愁上張水部前人出入門闌久兒童亦有情不忘將姓字長說向公卿每許連床坐時容並馬行恩深轉無語懷抱自分明贈江夏盧使君前人詩人中最屈無與使君儔白髮雖求退明時合見收登山猶自健縱酒可多愁好是能騎馬相逢見鄂州寄婺州溫郎中時刺睦州厲𤣥積雪沒蘭溪鄰州望不迷波中分鴈宿樹杪接猿啼婺女家空在星郎手未携故山新寺額掩泣荷重題中丞捨宅為寺郎中為題寺額故有此句贈王將軍釋無可勳髙絶少年分衛玉階前雄勇明王重溫恭執友賢功書唐史闊集作闕名到虜庭偏劒彩浮龍影衣香襲御烟搜書秋霽閣走馬夕陽田急兔投深草瞋鷹下半天野人迎邸第朝客醉盤筵位在集作立將軍列官隨憲府遷刻心思報國吁氣欲開邊選帥如公議須知少比肩寄羽林盧大夫將軍前人將軍集作焚香直禁圍一作闈繡服耀集作黃金羈羽衛九天靜英豪四塞知望雲回朔鴈隔水射宫麋一作聼水入宫池舊國無歸思秋堂夢戰時門風荀氏敵劒藝霍家推計日旌旄下蕭蕭萬里追集作馬隨書事寄萬年厲員外前人帝城皆劇縣令尹美居東遂拜趙張下暫離星象中擁歸從北闕送上動南宫舉起盆中日驅行草上風不驚盧犬集作聞靈鵲吠漸見夏臺空紫禁黃山繞滄溟素滻通封疆親日月邑里出王公逐盜千門啓興祥五稼豐胥徒迎曉集賦稅共秋終條教關天道歌謡入聖聰土膏寒麥覆人海晝塵蒙廨宇松連翠朝街火散紅文場新桂茂粉署舊蘭崇留客揮盈爵抽毫詠早鴻公與諸文士賦早鴻詩也前騶潘嶽貴故里邵平窮勸隱蓮峯久期耕樹谷同素約同歸華山樹谷鳬飛將去葉劍氣尚埋酆一作豐何必華隂土方垂拂拭功寄姚諫議前人鳴鞭靜路塵寂寞集作藉藉諫垣臣函疏封還集作受專密爐香立獨親篋多臨水作窗宿卧雲人危坐開寒紙燈前起草頻大理正任二十所和江淹擬古三十章寄示前人不啻回青眼應疑似碧雲古風真往哲雅道濫朝聞活獄威豪右銷時賴典墳如何經濟意未克致吾君寄殿院薛侍御前人名髙意轉集作本閒墻仞日集作浮俗自難攀佐蜀連錢出朝天獬豸還回翔歷清院彈奏迥離班僧到休揮翰開軒復解顔集作休瀚通𤣥㫖留僧晝掩關秋中聞馬戴逰華山因寄前人三峯待秋上鳥外掛衣巾獨見無窮境應非暫往集作住身水寒仙掌路雲住集作林靜華陽人欲問壇邊月尋思缺復新上翰林丁學士劉得仁今代如堯代徵一作崇賢察衆情久聆推行實然後佐聰明官自文華重恩因顧問生詞人求作稱天子許和羮御栁凋霜晚宫泉滴月清直廬寒漏近秋燭白麻成玉殿移集作多時對金輿集作階數侍行賜衣香未散借馬色難名時輩何偏羡儒流此最榮終當聞燮理寰海永升平登第山中舒懷寄上丁學士前人五字投精鑒慙非大雅詞本求閒賜覽豈料便䝉知幽拙欣殊幸提携更不疑弱苖須雨長懶翼在風吹礪鏃端楊葉光門待桂枝計聞塵裏譽因和禁中詩學士有禁中詩早春曽命和上姚諫議前人髙文與盛德皆謂古無倫聖代生才子明庭有諫臣已瞻龍衮近漸向鳳池新却憶波濤郡來時島嶼春名因詩句大家似布衣貧曽暗投新軸頻聞奬滯身照吟清夕月送藥紫霞人終計依門館何疑不化鱗陳情上李景讓大夫前人一被浮名誤旋遭白髮侵徘徊戀明主夢寐在秋岑遇物唯多感居常只是吟待時鈐定口經事壓低心辛苦文場久因緣戚里深親弟大中元年尚主老迷新道路窮集作貧賣舊園林晴賞行聞水宵棊坐見參龜留閒去問僧約偶來尋望喜潜慿鵲娛情願有琴此生如遂意誓死報知音上德憐孤直唯公拔陸沉丘山恩忽被螻蟻力難任作鑒明同日聽言重若金從茲更無報一作限翹足俟為霖上丁學士前人何處訪岐路青雲但憶歸風塵數年限集作恨門館一生依外族帝王是中朝故一作親舊稀翻令浮議者不許九霄飛贈雍陶博士前人腹是羣書笥官為六義師情髙少塵事朝下足間時有句同人伏無私胄子知漢廷公議在正與觸邪宜和鄭先輩謝秩閒居寓書所懷前人西風日夜吹萬物共離披近甸新晴後髙人得意時慙間心亦泰論道靣難欺把筆還詩債將琴當酒資藍衫懸竹桁烏帽掛松枝名占文章重官歸諫憲遲生涯貧帝里公議到台司室冷沾苔蘚門清絶路岐莫言鄰白屋即賀立丹墀豈慮塵埃久雲霄故有期夏日感懷寄所知前人了了見岐路欲行難負心趨時不圓轉自古易湮沉日正林方合蜩鳴夏已深中郎一作蔡雍今逺在誰識爨桐集作中音病中晨起即事寄場中往還前人昨日離塵裏今朝懶已成豈能為久隱更欲泥浮名虛牖晨光白幽園曉氣清戴沙尋水去披霧入林行疊葉孤禽在初陽半樹明桑麻新雨潤蘆荻古波聲易向田家熟元於世路生病多三徑塞吟苦四鄰驚陳情上知已前人性與才俱拙名場迹甚微久居顔益厚獨立事多非刻骨搜新句無人憫白衣明時自堪戀不是不知集作忘機秋夜寄友人前人永夜無他慮長吟畢二更暗燈搖碧影滯雨滴階聲道進愁還淺年加睡自輕如何得深術相與捨浮名集作榮寄春坊顧校書前人寧因不得志寂寞本相宜瞑目𡨕心坐花開葉合集作花落時數畦蔬甲出半夢鳥聲移只恐龍樓曉集作吏歸山又更一作見違寄雍陶先輩前人久别青雲士幽人分固然愁心不易去蹇步卒難前盡落經霜葉頻隂欲雪天歸山自有限豈待白頭年寄友人前人所思同海岱所夢亦烟波默坐看山久閒行值寺過獨吟黃葉亂相去碧峯多幸一作我有歸心在君行竟若何對月寄雍陶前人圓明寒魄上天地一光中臨水通宵坐知君此興同華凝衣有露靜極樹無風若向湘江見湘江見底空喜顧非熊上第其年內索文章前人愚為童稚時已解愛君詩怪得髙科晚須逢聖主知花前翻有淚鬢上却無絲從此東西集作歸去休為墜葉期寄謝觀前人十五年餘苦今朝始遇君無慙於白日不枉别孤雲得失天難問稱揚鬼亦聞此恩銷鏤骨吟坐葉紛紛贈敬晊助教二首前人到來常聽說清虛手把𤣥元七字書仙籍不知名姓有道情惟見往來疏已能絶粒無饑色早晚休官買隱居便欲去隨為弟子片雲孤鶴肯相於二街西靜觀求居處不到權門到寺頻禁掖人知連狀薦國庠官滿一家貧清儀都道一作稱是蓬瀛客直氣堪為諫諍臣自顧無成年漸長報恩唯願殺微身文苑英華卷二百六十
