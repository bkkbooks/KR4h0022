body:
  text: 文苑英華巻一百三十四宋李昉等編鳥獸四由鹿賦一首管窺豹賦一首田獲三狐賦一首狐死正丘首賦一首狐聽氷賦二首敎猱升木賦一首𤣥猨賦一首馴猿賦一首傷斃犬賦一首由鹿賦并序吕温貞元丁卯一作丁已嵗予南出襄樊之間遇野人縶鹿而至一作捕者問一作詰之答曰此為由鹿由此鹿以誘致羣鹿也備言其狀且曰此鹿每有所致輙鳴嘷不飲食者累日予喟然歎曰虞之即鹿也必以其類致之人之即人也亦必以其友致之寔繁有徒古之一作從古然矣嗟乎鹿無情而猶知一作有痛傷人之一無此字與謀一有而字宴一作實安殘酷者一無此字彼何人斯一本疊用此四字物微感深遂作賦曰鹿之生兮亦秉亭毒備齒角以無競循性情而自牧姑有昧於行止尚焉知乎倚伏捨爾崇林輕逰近麓偶巧網之生致蒙主人之全育飲以一作于渫井飼于芳庭寢卧荃柔騰倚蘭馨露往霜來日安月寧雖矯性而非樂終感恩而不驚曽不知飬非玩物一作致飬非真用有一作别包深意命曰由鹿一作命之曰由俾陷其類凉秋八月爽景清氣覊致或作彼山阿縻于或作乎蹊隧設伏以待翳叢而伺同氣相求誘之孔易將必慕侣豈云貪餌呦呦和去聲鳴麌麌狎至彼泯慮於猜信此無情於誠偽就是倉卒禍生所忽毒鏑歘以星貫潜機劃其電發或洞胷而逹腋或折足而碎骨望林巒兮非遠頋町疃兮未滅風嘷澤而北迅一作至日掩山而西沒走駭侣於巖煙呌饑麛於澗月苟行路之聞者孰不心摧而思絶相一作想爾由矣野心而仁望純束兮一作而驚惋一作顧顧一作随獲車兮逡廵視鼎中之消爛觀机上之剖一作割分忽哀鳴以感類若沉痛之在身雖復處之宻邇享以豐珍比檻猿之駭躍同海鳥之愁辛敢擇音而後死一作止思走險其何因痛無知以相陷含惋一作怨毒而莫伸客有感而言曰物誠有諸人亦宜乎摭事或比一作撫亊或比原心則殊借如淮隂構禍寃在神理通說且拒豨謀寧起堂堂蕭公實曰知已紿致鍾室胡寧忍此吕禄之難誰非漢臣交則不義賣亦不仁彼美酈生既為交親誘襲軍印豈無他人於戲㣲獸傷類如不自容忍一作伊人賣友而享其功滅交道兮墜義風曾麋鹿之不若何仁信之可宗已焉哉諒此世之茫茫吾未見其始終一作參用集本及文粹管窺豹賦以管中窺豹時見一班為韻闕名管實圓通豹稱竒質將竊窺以無視果遇文而得一言如立信初云必有可觀美在其中終荷守而勿失奚執虚而莫見諒衡一作衝空而有窺注目每思其一作夫破竹專心常切於主皮故得精神靡怠盻睞無虧辨或未分豈敢曰小人所視言如有凖安得謂童子何知事不可輕智難相短瞻夫隠霧之獸乃用窺天之管豈文質之不伸獨孤明之所滿分形既内識規規視逺惟中央坦坦然後知虛心可逹小智攸同毫釐必逺一作則長短皆通投迹倘遇於東周孰辨犬羊之鞟有文而比夫西伯豈殊縲絏之中是謂祈進奚為求知不倦將希國士之察用當君子之變羅因一目期一作斯所視之無偏利絶一源專向明之獨見乃知蔚文者道不足攀俯視者智或防閑一作智之或閑何㣲明之有辨果偶中之無難一作艱謂容止可觀且殊窒隙同邂逅相遇更善通班信專美之獨嘉諒生知而何教流涕已假夫觀止審像乃知其是效十年之學自分西晉之賢一管之明更識南山之豹夫如是則履中不昧應手無疑冀覦覬一作闞𨵦之有以得專精而所之亦何必誇乆視騁一時然後知求仁之可驗唯智者之念兹田獲三狐賦以田獲三狐吉無不利為韻李咸客有都尉崔公嘗以投筆筮仕遇觧九二爻應無何而立功成名遂之來一作無何立功異域名逺之來相與逰逺而獲三狐公以為應往者之兆遂為田獲三狐賦余因應云放心而適者其在乎遊田徒御自肅鐶鋂相牽指東郊以按轡乗北風以鳴鞭風威初厲鷹隼斯擊英寮訟閒農人務隙分曺命侣榮隨所歴未濟之狐歘起荒陌多疑膽捐虛驚心惕趫材競逐良弓可射筭分銖商逺近乃捨㧞而則獲於是長舒逺引自北徂南遇豐草而必陟逢虎穴而争探車輕輪髙羣足䟃𧽼將使蹂躪其十二三爾乃出林莽踐平蕪歴歴爾見綏綏有狐莫赤其色又腯其膚各挾爾之矢先張爾之弧雖羅空三面而人合四隅終見加其一目遽生擒於僕夫更有七擒七縱乍奔乍逸忽投足於舊邱且守之而勿失俄而獵父疑作火焰熾藴崇烟欝知隠伏之無所動險中之瞰出搏噬交亂竿殳惶觱西京賦竿殳之所揘觱罔觧狐之終凶扶疑作符九二之貞吉得理中之道偕枉直之實且夫平原廣衍何有何無獨兹狐之見獲應君子之筮謨君子云誰其唯崔公筮謨伊何當入其仕乎固欲知蔡澤之躍馬而問詹尹以泛鳬公侯干城則四方壯士文章經國則一代英儒我章斯銀我綬斯朱安比夫求魚靡餌即鹿無虞哉已而日低嵐岫煙生寒桞韔弓釋掤割鮮縱酒是田也盖一作盡以集彼戎事從其羣醜第吾人之讙謡則疑郢中之能不豈徒焚林竭澤乾池滌藪况夫天誡其馳騁御難其枯朽雖俟俟一作侯儦儦或羣或友皆棄之而不受一作取嘻兹狐之無知何雖一作處獸而似智當其七雄分勢遇楚相以申威九尾來儀感魏君而呈瑞又若腋入珍裘肉登爼味在物斯賤與人為利利之者以此載詠歌而無愧狐死正丘首賦以樂生戀本仁者之心為韻白行簡狐者㣲物死乃可珍想彼邱而結戀正兹首以歸仁生也有涯且不忘其本死而無二亦不䘮其真可比徳於先哲寔聞言於古人原夫委化將終㣲情有托面淇梁之窟穴目武都之林壑頋慕而首尾不差向背而東西必度死生契闊知歸骨之莫從視瞻無囬念舊郷之可樂矧兹異質藴彼仁心寧九尾之足尚實三徳而可欽豈不以懐舊誠切戀主志深等太公之於齊終聞返塟比荘舄之去越尚發哀吟想夫溘爾數窮隐然存盼歎青丘之永訣想南山之不見其心懐土望故處以増悲惟首正丘聊向隅而表戀知其戀本者合於禮戀舊者繼乎情何綏綏之陋質叶仁人之美名觀物化感平生頥指而千羊讓徳頭㑹而百獸慙獰徒觀其首也不回心乎惟懇殊聽氷而表智異含沙而招損正有芃之質志在慎終委莫赤之容仁無棄本想其美也合於禮者鄙墳首之牂羊符戀主之良馬觀跂行喙息之類其數則多察樂生念本之徒斯情盖寡繫一作繄兹獸之可竒諒古今而稱之死不擇音嗟逐鹿於往日生而隠霧歎𤣥豹於昔時曷若懐念逺之感軫去故之悲異哉首邱之仁也非衆類之等夷狐聽氷賦以将濟大川慎其所履為韻楊濤風之壯兮長川凝閉狐之聽兮將往復滯慮陷身之有咎常屬耳而未濟究隂氷之厚薄聽濳溜之微細蹀足将舉故軫墜泉之憂傾首不移酷似枕流之勢豈不以禀心回惑澄思精專欲趦趄以未進恐凝沍之匪堅青熒在目懾慄臨川躡彼素姿恐有希夷之韻憂其翠㶑忽生歩武之前何危疑以立身匪果敢以行已不處其薄豈陷而止蟲疑之理有殊鶴警之聽可比俯連白之上惟恐有聞頋莫赤之軀重其所履若將墜而常怯致身謂盖厚而方敢舉趾且夫氷結也徒稱百丈狐疑也何啻三思顧流音之蔑爾増殺氣以凄其同夫不可陷也曷肯聞斯行之所以汔濟等在梁之固保安同履地之時盖由乎懼彼其融處於不磷雖磑磑而罔釋猶兢兢以克慎馮河有志且居安以思危濡尾是憂故易退而難進觀其俯皓質俛一作映清光惟審固而後行或逗撓而不遑審固而或行或止逗撓而若迎若將猜忌罔恤雖稱妖婦之化戒慎為意未喻君子之防所以志無堅决状若虛佇想清流之若驚知素履之有所諒躡虛以為警將保全以為大俟無聞而後行豈貽乎滅趾一作跡之害第二以堅勁之上審聞始行為韻滕邁狐出濳穴氷膠廣川俯皛皛而是聽慮峩峩之未堅於是臨渚曲傍河壖疑涓溜之在中尨茸不動審凝沍之徹底睢盱欲前足縮縮而心感疑貎綏綏而聽專積素之姿逾净莫赤之容濳映逼嚴凝以屬耳寧惮苦寒思涸沍以投軀必資餘勁若夫烟横古岸月照空崖寂無人而乆聽紛觸物以多疑聆逺吹之颼飅謂波摇岸曲聞殘錚之浙瀝驚溜斷河湄却曲載移於短歩忙懐一作壤屢變於妖姿望寒墟之在前庶斯逺矣惑夏頒之不至俯而聽之逺近隂凝淺深風壮念兹道理在此氷上試之以耳猶廽耳之可圖試之以身将退身而何望况復窮隂慘凛川長難審徴春魚之欲上驗時不同比夏蟲之有疑執心彌甚及夫虛盈以測厚薄斯分颯為裘之毛知不可陷低正丘之首惟恐有聞既勃窣而投趾乃凌兢而慎履尋聲不離於聽表處薄恐成於禍始奮自擾之迹一却一前曵有芃之軀時行時止是知事欲審於未萌心無妨於若驚儻躡虛以輕進必履險而忘傾則濡尾之憂至溺身之害并異哉一獸之智可以階善必聽而配規行者也教猱升木賦以仁義在躬教之則進為韻賈餗猱之為物兮敏㨗無倫人之設教兮質性是因頋升木之容易豈從師之苦辛於是授以程度使之縁循歩歩彌高同下學而上逹孜孜不倦若逰藝而依仁原夫引進他材發揮以知不言而化若喻於義指蹤在手所謂導而不牽嗜學因心誠冝誘之孔易俾夫趫容所騁迅足無累笑碩䑕之五能掩都盧之百戲初疑鴻漸訝走險之翩翩卒若熊經忘阽危之惴惴則知夫性自天而莫改教率性而斯在失之者進寸而退尺得之者師逸而功倍從輪桷之異規随曲直於真宰故君子将遷於物必省厥躬彼可適道吾方擊䝉野性既馴自殊於狼子怒心不發何愧於狙公牧羊以不鞭為機養雞以似木為傚一則行之而未逺一則乆之而成教孰與簡易為師攀援是資既得心乎愛矣方將教以化之負凌雲之材庶幾仰止守墜地之道難可求思至矣哉發彼駿一作驍騰頼兹引力足循循而風舉木杳杳而繩直千尋雖險亦可超而宛升一跌無虞那肯勃如戰色豈翫物以為用將育材而取則所以木不告勞猱惟効順學無間於時習功自得於日進彼以求易於難致逺由近可因兹而立信𤣥猿賦并序吳筠前者一作志稱周穆王南征君子變為猨鶴小人變為蟲沙夫神用無方未必不爾筠自入廬嶽則覩斯𤣥猨嘉其一作夫雨昏則無聲景霽則長嘯不踐土石超遥於萬木之間春咀其英秋食其實不犯稼穡深棲逺處猶一作獨有君子之性異乎狙猱之倫且多難已來庶品凋敗麋鹿殚於網罟遺甿困於誅求此獨蕭然物莫能患豈不以託跡夐一作𡨕絶不才逺禍昔夫子雖一無此字歎山梁雌雉曰時哉時哉予因感之聊以作賦云耳伊𤣥猨之所育于南國之層岑動不踐地居常在林雖泛泛而無據亦熈熈而有心雲一作雰嵐昬而共黙風雨霽而争吟使幽人之思清暢覉客之涕霑襟何必聆嶰谷之管對雍門之琴哉歴千尋之喬木俯萬仞之危嶠弄逰雲之亂飛嬉落日之横照連肱澗飲命侣煙嘯一作哨或聚而閒棲或分而逈趠壽同靈鶴性合一作本君子阻重巖之險非虎豹所履䕃交柯之宻豈鵰鶚能視故逢䝉操弓弹一作惮髙深而止鄧公折箭含惻隠而已何患累之罕臻不干物以利己詎若􅀈􅀈一作狒狒凌人以就戮猩猩甘酒而遄死夫時珍貂裘世寳狐白彼徒一作徒能工於隠伏終見陷於機辟麝懐香以賈害狙代一作伐巧而招射小則翡翠殞於羽毛大則犀象殘於齒革孰能去有用之損取無用之益因一作固棄置於常情永逍遥以自適無威刑相臨有族類相親一作無威刑以相臨有族類而相親食資諸物衣取諸身不賦不役靡勞靡勤如政教之未絶保巢居之淳淳匪虞代一作氏之所及何狙公之能馴吾固知人為萬物之貴又焉測元化之所大均乎馴猿賦李子仞節彼南山宛出人寰天分翼軫地界荆蠻標竒峰於海上置髙嶺於雲間千林蓊欝萬壑幽閒蓄霧藏煙信洪爐之造化匪朝伊夕即𤣥猿之徃還爾其秉質𤣥造㳺心逺峰徹三聲於谷静藏萬影於山重聮綿緑竹牢落青松其㨗難紀其居易容不衒文章輕霧中之隠豹豈矜變化賤雲裏之非熊但恣乎任情之樂寧知乎有智之凶既而列卒籠山張羅竟野陣影開鶴雲光亂馬廹呉質之檻中驚楚臣之箭下既歎拙謀還傷力寡踰峰越嶂宛辭岑寂之居歴暑離寒歘就喧卑之舍於是屈猛從縶宛安順逰頋歩蘭砌因依蕙樓跼標影之髙下挫疑人心之去留載馳載驅異追風之整轡或驚或躍同在水之銜鈎日潛餘巧空長孤愁悲夫自貽伊戚信美非珍雖徘徊於厚養終惆悵以勞神夜廡幽隂憶南隴之吟月花朝明媚想喬林之弄春未屬放麑之慜且從飛雀之馴已矣哉樂鷃以鼔載鼷以車固不如深林之棲息窮谷之虚徐諒物性之同此希達人之鑑諸傷斃犬賦闕名何仲尼之仁智雖敝蓋之不棄憫畜狗之將死恐肝腦以塗地豈不以其守禦之功多惻隠之情至况嵗年馴養倐忽非命生而効能死不因病分以身首委其陷穽我誠拙於人謀彼何傷於物性雖無衛生之智且有天然之識出其門吠非其主知其愛摇尾求食傳尺書而致逺逐狡而盡力信聰慧之兩兼亦忠勇而何極原夫萬物莫不以智遇禍以材喪身象以其齒龜以其神蟬得美䕃而忘己魚貪芳餌而挂綸由此言之莊周達者老氏至人吾將師之養素全真文苑英華巻一百三十四
