body:
  text: 文苑英華卷五百八十五宋李昉等編藩鎭謝官二為濠州刺史王弼謝上表一首為福建李中丞謝上表一首為柳州鄭郎中謝上表一首刺史謝上表十六首為濠州刺史王弼謝上表李邕臣某言伏奉某月日制除臣濠州刺史聖澤天臨寵章霞燠身微草芥地疑作施重丘山臣某中謝臣某奉詔字人星言即路三省不及二過有懷棄短之恩竭力難負悔非之感瀝血未申以某月日到州上訖臣履氷誓心飲水銘骨勵精為政刻意求仁實望昭發宿誠宣揚大化上酬天地之徳下盡臣子之忠臣萬死足矣為福建李中丞謝上表于邵臣某言臣以二月二十四日特奉渥恩授臣福建都團練觀察處置等使福州刺史兼御史中丞某月二十九日與中使某南北路分即以今月某日至所部上訖感戴踰涯跼天增懼臣某誠惶誠恐頓首頓首臣聞度材任器論吏底祿三代所以直道而行迭相沿襲未之易也伏惟皇帝陛下聖謨廣運光宅天下徳澤遐溢蒼生海隅至若閩越都會東南重鎮爰思俾乂宜者甚衆則中外咨謀孰非俊選豈臣薄劣一無所取超奨不次特禀宸衷是以前表上陳披肝布懇自兹夙夜不遑底寕况今右武之狀疑作秋先資輯睦安人之切又藉綏懷貢賦不差於時蠻夷得令安堵惟是四者之備皆臣之職分也誓将克勤竭力處約勵心日宣皇化以展微誠無任忘軀報國之至謹遣某官奉表陳謝以聞臣某誠憂誠懼頓首頓首謹言為柳州鄭郎中謝上表臣某言臣伏奉某月日制書授臣某官即以今月日到任上訖臣某中謝臣緒承舊族師事通儒萬里成功雖無壯志九夷不陋庶纂前蹤二紀蠻陬三提郡印惟貞苦節以奉休辰牙管一䨇未嘗闗慮集作目竹書兼兩何敢輕懷渭水之隂弊廬斯託毎還初服常慊上農今者又即殊方復臨雜俗固蒙聲敎終逺文明謹當宣舉一作亟奉詔書撫安縣道媒官學舎畢納於人倫畜蠱帶牛盡移於地利至於因遐弄法挾逺生情縱漏嚴科必貽隂責山兼象縣江帶龍城撫心跼天敢㤀𤣥造舉頭望日何處皇居慿宵夣以銜誠託歸飛而結懇無任瞻天戀闕之至淄州刺史謝上表李邕臣某言伏奉某月日恩制除臣淄州刺史以今月日便道至任逺自江左近守河南收奬死灰建置生路别荷成造兼冀昇遷三慶集身百齡踰外中謝臣聞天地大徳含育及於昆蟲雨露深仁霑霈及於蕭艾不限微品有愧洪鑪職臣之謂歟伏惟陛下道揔三才在璿齊政運超四孟與物為春𤣥造加於萬方聖慈周於一物子人開化議事立權張皇連城勸勉犀岳身同京職承祿賜之恩榮子預選曹廣門閭之恵澤是以龔黄蓄銳卓魯専精一作稱能竭盡公忠𢎞宣績用但駑駘之力不足以騁長衢朽木之資不足以施長桷徒遷厚祿無益聖朝撫事捫躬慙魂跼影伏以東臨巨壑借渤澥之水寛西望京師就長安之日近岳州刺史謝上表張說臣說言伏奉四月十有二日制書除臣岳州刺史某月二十七日遞集作魚書到相州承恩惶怖狼狽上道以今月一日至岳州上訖臣以昔侍金華過蒙榮寵負乘招宼日待譴黜一作非短日聞聖慈遲廻仍委符守刻肌刻骨誠願上報恩私無術無才将何克宣風化夙夜慙惕胡顏集作寧啓處伏以貶官到任理在速聞不敢循常稽緩附使無任荷恩兢懼之至謹逓表陳謝以聞荆南集作州謝上表臣某言伏奉二月二十五日制書除臣荆州大都督府長史拜集作受命荒服浮舟遄泝以今月十七日到州上訖山列楚望水横南紀徳非羊祜迹謝朱均何以鎮静流亡攘除猛虣臣某中謝臣宿濫宸睠累塵榮奬福過生災至剛多缺及一辭庭闕已涉五年不有自白之書竟無因人之請天光獨照雲霧頓披窮鱗更躍鎩翮仍翥揣分瞻恩何階及此媿乏才能集作用不足宣暢皇風敢竭心力少冀上酬𤣥造無任欣抃兢惕之至謹附送丁匠資使所部文林郎守公安縣主簿封希魯奉表陳謝以聞武州刺史謝上表于邵臣某言伏奉今月日制除臣兼武州刺史本官勲封如故寵榮洊及忝竊逾涯心魂驚越啓處無地臣某中謝臣本虛賤生遇休明雖跡淹戎位而功微㳙滴自陛下聖理天下孝感神明任人無舊在物無棄故臣得參定洛汭凱旋鎬京職分上卿位列特進材力之所不足官謗之所自貽跼天蹐地心愧顏厚殞身滅迹無以上報猶且恤臣家帑放臣休沐遂嬰疾苦未及歸朝一年以還四命為牧内省尸素空勤竹符将免胄而有期且戴天而何力即以今月日至州上訖奉宣皇化以靖方隅誓求人瘼勉守亭障無任負恩勵節之至汝州刺史謝上表賈至臣某言伏奉某月日制一作敕除臣汝州刺史捧荷恩私違離軒陛専城之寄則厚魏闕之心斯切即以今月至州上訖臣某誠惶誠恐頓首頓首臣遭遇艱難謬忝近侍扈廵巴蜀朝覲朔方﨑嶇三年恒伏輿下一作軫而才微智淺内不能申竒謀異畫外不能預武毅崇一作戎勲掌翰承榮日以為愧屬陛下神武勘難再構乾坤動植生靈濟於塗炭臣以庸劣績用無聞生覩中興以為殊幸官登列守彌覺叨榮汝墳一作濆之人久罹殘賊閭閻凋弊萑蒲未静闡陛下慈䘏之㫖承陛下雷霆之威緝理疲人畏懷亡命均其一作爾賦役免其農桑庶慿睿謀迄可底定敢勵鉛刀之割終於一作成犬馬之戀不任慺慺之至謹奉表陳謝以聞臣某誠惶誠恐頓首頓首謹言忠州刺史謝上表李吉甫臣某言伏奉恩命擢授臣持節忠州諸軍事守忠州刺史越自東海牧於巴中秩優専城任切謡俗臣某誠歡誠喜頓首頓首頃以進取乖方譴累斯及逺投海裔分棄朱崖類表作生涯恐是陛下精意饗天覃恩率土故臣得澡身霈澤剖竹藩方一作方州恩出九重謗銷衆口受命之日心魂載馳屬楚越途遥奔馳道阻泝流七干陟一作涉險非一虐暑嬰癘羸骸僅存以今月七日舁曵到所部上訖臣徃嵗曲臺掌禮已蒙一作承訪對之榮南宫起草猶兼表蕝之任陛下展事宫廟臣實職導乘輿接星仗於鈎陳趨日馭於黄道奉璋薦鬯左右天威增秩進階霑濡慶渥臣業以儒進才匪時須書生之幸亦已過分中貽謗缺咎則自招一作已貽今荷寵光恩由天造勤一作期勵精於緝理庶有効於㳙塵一作埃巴山萬里峽水千仞微分一作公非何寄長瞻北辰臣無任感戴屏營之至謹遣衙官朝散大夫試兖州長史賜紫金魚袋宇文儇奉表陳謝以聞臣某誠惶誠恐稽首頓首謹言一作皆唐類表為汝州刺史謝上表穆貟臣某言伏奉正月九日敕授臣使持節汝州諸軍事守汝州刺史充本州防禦使臣祗荷寵命兢惶戒路以今月二十五日到州上訖臣聞位非所據榮實為憂任過於量勤不補敗伏自省懼心魂震驚臣某誠惶誠恐頓首頓首臣頃佐方鎭本逃饑寒推遷嵗時累忝班序而身逺跡賤才薄官微宣力中朝事将望絶昨者一介陪𨽻萬國朝元不寤日月垂明幽隠斯燭荒徼末效記意於勞問之初愚懇微誠畢辭於朝賀之次亦既信宿遽承寵光况地屬王畿任當時要憂寄所切文武是資何堪負乘又過奨擢唯當以竭誠自勵戒懼自持庶副所受安人理戎之命少酬萬一無任懇悃屏營之至謹遣某官奉表陳謝以聞為福州刺史謝上表常衮臣某言奏事官特進試鴻臚卿臣郝誠益類表作誠溢至伏奉墨制優答兼賜手詔宸㫖寵臨榮渥光被跪讀流汗捧抃失容臣某誠懽誠喜頓首頓首伏以聖慈宥過朝奬踰涯敢希身榮以冒班列殊死陳乞冀遂愚誠天覆棄瑕藩寄如舊宜勵駑鈍以効㳙塵類表作毫不敢稽恩有􅌤承命感戴欣躍仰荷殊私踧踖戰兢實憂曠職謹當宣布徳澤奉行科條苦節以緝疲人誓心擬補前咎夙夜祗畏懲省微勤期於萬一以申上報無任捧戴屏營之至謹奉表以聞潮州刺史謝上表臣某言臣冐犯刑章合當萬死曲蒙慈貸特賜再生仍假分符更承寵授感恩待罪心魂戰越以九月十一日到州上訖臣某誠惶誠恐頓首頓首臣凡賤末品非才冒榮虚忝國恩實昧朝典尸榮無補公責所歸竊自循省早宜譴黜永惟光顧未答殊私慙負至深悚惶靡及陛下以大聖承統以至眀照臨孝思感於天地儉徳齊於堯禹道在還淳化先無事臣宜進賢以報國同力一作休以守公而乃輕奏忠良茍循愚執豈非臣褊心失措躁遽而然亦是速戾之時迷誤至此負恩既重自孽何逃處之嚴刑猶未逭責豈謂特廻宸斷俯降天慈矜臣蠢愚憫臣孤弱全其将朽之骨復其已逝之魂俾奉藩條獲從職守悚愑懼荷罔知所圖臣自辭闕庭深省罪釁一作釁咎未嘗頃刻輙忘悔尤中朝再馳毎步懲戒終夜不寐毎思兢慙尚偷餘生誓将改過敢惜微命以自懐安惟勵丹誠庶答鴻覆况親人之寄在逺猶切謹當宣揚聖化慰撫海隅少安疲甿以展微効伏以差使上謝有虧格文跼蹐憂惶不敢専擅無任懇廹之至謹附本道觀察使附便使奉表陳謝以聞柳州刺史謝上表李吉甫臣某言伏奉詔書授任柳州刺史以今月二十五日柳宗元集作二日至所部上訖臣某誠惶誠恐頓首頓首臣前嵗以疾集作久停官去年蒙恩除替便欲裂裳裹足趨赴京師以舊疾所嬰彌年未愈逮及今夏始就歸途襄州集作陽節度使于頔與臣早嵗同官見臣當暑在道懇留就舘尋假職名意欲厚臣非臣本集作所願伏惟陛下光被之徳道已洽於區中憂濟之勤心毎徧於天下常以萬邦共理必藉於循良一物不遺尚延於愚邈假臣寵渥重領方州駑駘復効於馳驅集作奔馳枯朽更同於華秀臣某誠懽誠喜頓首頓首臣聞潢汚易竭徒有朝宗之願犬馬無識猶知戀主之誠揣分則然惟天所鑒况臣昔因左官一紀于外子牟馳心于魏闕汲黯注意集作積思於漢庭豈伊非夫類表作臣豈非人集作豈非其人獨無斯戀去就者榮辱之主朝廷者仕進之源臣子之宜忠貞所志臣雖心同犬馬而分比潢汙幸躡康衢意集作竟悲往蹇臣之此誠口不能諭意欲自集作悉達文非盡言此臣所以自咎自傷恨乖志願猶冀苦心勵節上奉詔條恵寡安集作䘏貧下除人瘼恭宜皇化少答鴻私不勝感戴歡欣之極謹遣軍事衙前虞候王國清奉表陳謝以聞新唐書李吉甫傳改郴移饒舊唐書乃以郴為栁致柳宗元集三十八卷誤收兩表前題謝除云奉三月十三日制六月二十七日上訖此即宗元表也後但題謝上又云今月二十日上訖月日文理皆非宗元事其為吉甫何疑饒州刺史謝上表臣某言今月五日中使劉元晏奉宣聖㫖擢授臣饒州刺史兼賜官告仍至當州送上者臣與元晏某一作其月二十三日至州上訖臣伏以郡守分符朝有常典王人賜告班一作榮竝貴臣事出非常恩超往例拜一作抃舞之際悲歡失容臣某誠歡誠喜頓首頓首臣聞千年一聖生聖一作此時者為遭逢萬朝一昌偶昌期一作斯運者為嘉會臣頃者毎念生聖時逢聖運而職在遐外莫能自通何嘗不顧影獨悲捫心屢泣晝望白日夜瞻北辰豈謂分寸之績未施丹懇之誠若感微藿傾心葢草木之常分太陽廻燭及幽逺而不遺今陛下降不次之恩授分憂之地拜章承㫖皆自中人聖渥霑濡天威咫尺從此萬里不為孤臣臣某誠歡誠喜頓首頓首臣又聞臣子之道犬馬代勞義不辭難分當竭命臣竊以一作鄙飽食厚祿肌一作肥生澤膚猶願荷戈於逐虜之疆免胄於捐軀之所至於理財均賦恵寡安貧勸農桑敦學校儒吏之常節駑駘顧何以堪當此殊勞少答𤣥造高秩以忝鴻私未酬慺慺此誠没齒無怠不任感涕屏營之至三十八字一作駑駘匪勞願上表詔條下除人瘼恭宣大化少答鴻私不勝感戴欣歡之極一作皆唐類表柳州刺史謝上表柳宗元臣宗元言臣伏奉三月十三日制除臣使持節柳州諸軍事守柳州刺史以六月二十七日到州上訖臣宗元誠惶誠恐頓首頓首早以文律參於士林徳宗皇帝遷於衆流擢列御史陛下嗣登寶位微臣官在禮司百寮稱賀皆臣草奏臣以不愼交友旋及禍訩集作誣聖恩𢎞貸謫在善地累更大赦獲奉詔追違離十年一見宫闕親受朝命牧人逺方漸輕不宥之辜特奉分憂之寄銘心鏤骨無報上天謹當宣布詔條竭盡駑蹇皇風不異於遐邇聖澤無間於華夷庶答鴻恩以塞餘罪無任感恩隕越喜懼之至謹遣軍事才将劉伯通奉表以聞代永州韋刺史謝上表臣某言臣伏奉某月日制書除臣永州刺史以某月日到州上訖受命若驚臨職彌懼臣某誠惶誠恐頓首頓首臣以無能累更事任神州赤縣實所備嘗過量逾涯毎深兢惕不謂聖恩推擇濫駕朱輪祿秩徒增詎施乳哺之恵服命虚受寕興襦袴之謡况此州地極三湘俗參百越左袵居椎髻之半可墾乃石田之餘曠牧守於再秋彌驕獷俗代征賦於三郡重困疲人分災本出於一時積弊遂逾於十稔撫安未易知法出而姦生子育誠難懼力勞而功寡夙夜憂切不敢遑寧謹當宣布天慈奉揚神化以日繫月儻或有成少裨愷悌之風因答生成之造臣無任感恩隕越之至道州刺史謝上表吕温英華作吕頌非臣某言臣去十月十七日蒙恩授使持節道州諸軍事守道州刺史奉命星馳不敢遑息以今月七日類表作二十八日到州上訖祗寵自天戰類表作抃跼無地臣某誠兢誠感頓首頓首臣謬以孱庸早忝朝序再塵憲府三踐文昌竟不能著稱彌綸賛肅綱紀合行殿黜集作誠合休黜翻蒙奨任共至公之理分子物之憂自古審官莫斯為重臣才乏吏用識昧政經将何以克副聖心撫寜遐俗唯當勤宣皇一作王化䖍奉彛章苦節勵精類表作精心少酬萬一臣無任受恩感激之至謹奉表陳謝以聞衡州刺史謝上表臣某言伏奉五月十一日恩制授臣使持節衡州諸軍事守衡州刺史散官勲賜如故謹以七月十五日到本州上訖恭承寵命循顧庸虚感抃失圖戰跼無地臣某誠感誠懼頓首頓首臣聞三載陟明虞書盛典六條舉最漢制宏規必在上允帝俞俯諧師錫臣謬領郡務素無吏能䖍守國章布宣皇化匪寧一作能夙夜再換炎凉仰奉陛下憂勤以恤逺人凋瘵雖檢身肅下不敢愧於神明而阜俗移風竟未彰於績用将何以特膺睿奨簡在宸心當愷悌之旁求副集作辱循良之愼集作盛選省躬增愧集作惕殞首知慙謹當恪勵集作罄竭精誠策磨朽鈍冀集作庶立日新之効少酬天覆之恩實望聖慈照臣肝膽臣無任感躍屏營之至謹差某官某乙奉表陳謝以聞黔州刺史謝上表吕頌臣某言伏奉去年某月日恩敕授臣使持節都督黔州諸軍事守黔州刺史兼御史中丞一作大夫臣某中謝臣以今年某月日到所部上訖螢爝之光無裨日月螻蟻之垤謬厠丘山臣素以凡庸㓜乏師訓遭逢聖代一作多難志業無聞往昔建中之初嘗備對敭之末臣於延英殿獻大禮賦一首特奉恩㫖令臣自讀天顏咫尺芻鄙必聞一覽繁詞三蒙眷奨宣付史舘列在圖書此微臣之榮一也尋屬賊臣希烈上表臣奉詔奔馳因兹淪陷臣忍死効節偷生竭忠分士伍以弱枝獻土地以強幹當元兇授首之際亂兵害帥之時玉石不分生殺一作殺傷未定初則𫝊臣及禍後乃知臣僅存陛下分命宰臣念形于色始臨軒而出涕終省表而再歡君上之慈古今未有此微臣之榮二也妖氛既殄飛詔追臣就拜銀青仍一作特加金印授官華省列位聖朝萬死之中再肉白骨九泉之下獨見青天此微臣之榮三也去嵗季春一作去年春陛下與太子諸王賦詩見宴中書宣付遍示百寮凡在臣下一作朝臣無不奉和擢居第一唯臣一人獨荷殊旌乃一作仍蒙厚錫光生御札榮溢天衢百辟具瞻萬人𫝊誦此微臣之榮四也臣本書生謬登清秩始詳刑政旋改轄司陛下不念愚蒙一作念臣愚衷擢臣非次草奏之地忽降旌旄郎署之間遽一作速遷方鎭此微臣之榮五也臣聞受寄崇者其勲大荷恩重者其感深今臣無迹可稱無功可紀累承睿渥叨冒寵章草木逢春罔答陽和之煦昆蟲啓蟄寧知天地之仁将何以受陛下非次之恩答陛下殊常之造臣伏以黔巫逺一作遐僻山洞阻深地極荒陬人多逋梗不生五穀不一作豈識桑蠶廹之則鳥獸同羣緩一作綏之則木石為伍臣謹當申明朝典宣布皇慈扇以仁義之風諭以君臣之道俾知敎化或漸庶幾誓安逺人永清殊俗臣無任荷恩冒寵之至一作皆唐類表文苑英華卷五百八十五
