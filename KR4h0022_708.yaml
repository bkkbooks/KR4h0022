body:
  text: 文苑英華卷七百九宋李昉等編遊宴二宴族人楊八宅序一首初秋於竇六郎宅宴序一首秋日於益州李長史宅宴序一首初秋登王司馬樓宴序一首秋日與羣官宴序一首晦日楚國寺宴序一首薛大夫山亭宴序一首冬夜宴臨卭李録事宅序一首早秋上陽宫侍宴序一首奉敕從太平公主遊九龍潭尋安平王宴别序一首奉陪武駙馬宴唐卿山亭序一首三月三日奉使涼宫雨中禊飲序一首上已泛舟昆明池宴宗主簿席序一首春日宴兵部韋員外韋曲莊序一首先天酺宴序一首季春下旬詔宴薛王山池序一首南省就竇尚書山池尋花栁宴序一首集賢殿書院奉敕送學士張説上賜宴序一首陪王司馬宴王少府東閣序一首宴族人楊八宅序楊盈川僕聞八音繁會合其德者宫商萬壑沸騰殊其流者涇渭方以類聚物以羣分出言斯應則四海之內可以為兄弟吾道不行則同舟之人可以成胡越夫俗徒擾擾天下喧喧風雲竭而交道衰勢利行而小人長固知深期罕遇所以縱傾蓋之談髙契難并所以泣相知之晚道之存也獨在兹乎楊八官金木精靈山河粹氣一門九龍之紱冕四代五公之緒秩天資學業口談夫子之文日用溫良身佩先王之德獨遊山水髙步煙霞諸侯聞之而願交三公禮之而爭辟暫同流俗薄遊朝市人倫賞鑑同推郭泰之名好事相趨畢詣揚雄之宅爾其年光六合常疑邑三春膏雨零於山原和風滿於城闕遙遙别館花開玉樹之宫望望八川苔發璜溪之水當此時也披雲霧傲松喬坐忘樽酒之間戰勝形骸之外雕蟲壯思則符彩驚人非馬髙談則鏗鏘滿聽亹亹然信天下之竒賞陶陶然誠域中之樂事若使陳雷可作攝齊於廊廡之間管鮑再生擁篲於髙門之外盍因文會共記良遊人賦一言同裁四韻初秋於竇六郎宅宴序駱賔王六郎道合採葵嘯懸鶉而契賞諸君情諧伐木仰登龍以締歡于時一葉驚寒下陳柯而捲翠百花凝照對集作撲虛牖以披紅既而俱欣得之情共掩亡羊之淚物我雙致匪石席以言蘭心口兩齊混汙隆而酌桂雖忘筌戴笠與交態於靈臺而搦管操觚叶神襟集作心於勝氣盍陳六義請賦一言即事凝毫成者先唱云爾秋日於益州李長史宅宴序前人夫以五嶽栖真杳眇青溪之上六爻貞遁寂寥滄海之濵斯並激俗矯時獨善之風自逺懷才韞智集作價兼濟之道未𢎞長史公玄牝凝神靈丹應物得喪雙遣巢由與許史同歸寵辱兩忘廊廟與山林齊致乘展驥之餘暇俯沉犀以開筵曲浦澄漪似對任棠之水芳亭興洽如臨疑作歸山簡之池加以秋水盈塘集作襟寒臯集作郊滿望洲渚肅而蒹葭變風露凝而荷芰踈忘懷在真俗之中得性出形骸之外雖四子講德已擅集作頌美於中和而五際陳詩未形言於大雅爰命虛謏題其序云側辨頺山集作辨側山頺自有琴歌留客操觚染翰非無山水助人盍各賦詩式昭集作貽樂事云爾初秋登王司馬樓宴序前人司馬公千里騰光翼外臺而展足九日多暇敞麗譙以開筵于時葭散秋灰檀移夏火鴻飛漸陸疏集作流斷吹以來寒鶴鳴在隂振集作上中天而警露於是肴開玉饌交雜佩以薰蘭集作蕳酒泛金花集作翹溢集作映非清樽而湛菊雖旁臨廣𣲖有異漳渠之遊而俯瞰崇墉雅叶城隅之會物色相召江山助人請振翰林用濡筆海云爾秋日與羣官集作公宴序前人昔挂瓢隱舜蹈箕山而不歸臨組逃齊泛滄波而長往咸用潛神集作心物外擯影丘中豈若擬迹小山陶心大隱叶仲長之怡性偶潘嶽以集作之栖間羣公或道洽忘筌契金蘭而貴舊或情深傾蓋披玉葉以交集作文新于時玉女司秋金烏反照煙含碧篠結虛影於鮮枝風起青蘋動波紋於異態加以庭榴剖實耀丹彩而含珠岸石澄瀾泛清漪而散錦既而誓敦交道俱忘白首之情言欵朝期一作欵爾連襟共把青田之酒不有雅什何以攄情共引文江同開筆海云爾晦日楚國寺宴序前人夫天下通交忘筌蹄者蓋寡人間行樂共煙霞者幾何羣賢挹集作抱古人之清風玩新年之淑景情均物我緇衣將素履同歸迹混汚隆廊廟與江湖齊致于時春生城闕氣改川原聞遷鶯之候集作後時行欣官侣見遊魚之貪餌坐悟機心加以慧日低輪下禪枝而反照法雲凝蓋浮定水以涵光忘懷在真俗之中得性出形骸之外雖處集作交非習靜多慙谷口之遊集作談然醉可逃喧自得山陽之氣詩言志也可不云乎薛大夫山亭宴序陳子昻夫貧賤之交而不可忘珠玉滿堂而不足貴閉門無事對黃卷以終年髙論不疲逢故人而永夜薛大夫其人也下官昔承顔色早蒙車騎之知晚接恩光不異平津之舊蔡雍書史許以相資張載文章見稱於代爾其華堂别業秀木清泉去朝廷而不遙與江湖而自逺名流不雜既入芙蓉之池君子有鄰還得芝蘭之室披翠微而列坐左對青山俯盤石而開襟右臨澄水斟渌酒弄清絃索皓月而按歌追涼風而解帶談髙趣逸體靜心間神眇眇而臨雲思飄飄而寓物林軒寂寞星漢縱橫思欲乘汗漫而羣遊與真情而合契歡窮興洽樂往悲來悵鸞鶴之不存哀鷞鳩之久渂徘徊永歎慷慨長懷東方明而畢昴升北閣曙而天雲淨悲夫向之所得已失於無何今之所遊復羈於有物詩言志也可得聞乎冬夜宴臨卭李録事宅序前人下官遊京國久矣接軒裳衆矣池臺鐘鼓雖有會於終朝琴酒管絃未窮歡於永夕豈非殊我親愛異我風謡而使臨堂有懷聞樂增歎者也何公曹嶲州耆老迹尚於沉冥李録事吾土賢豪義多於遊俠髙軒置酒甲第迎賔絲竹紛於綺窗琅玕盛於雕爼樓臺若畫臨故國之城池軒騎如雲捴名都之車馬於是乘興自此而遊安得不放意留歡遺老忘死金壺漏晚銀燭花微北林之煙月無光南浦之星河向曙赤車使者下官雖謝於古人錦里名家羣公豈慙於昔彥我之懷矣每集作實在於斯同賦一言俱為四韻早秋上陽宫侍宴序宋之問臣聞神器至大非聖無以光臨寶位至尊非神無以長守我金輪聖神皇帝垂妙覺撫鴻勳出軒宫而鎮紫微卷翬衣而襲玄衮釋罘祝網萬族咸寧革故維新五刑不用潤玉律而含元氣輪金渾而調順晷窮荒極逺重譯左言之俗負阻憑危背德殊風之類莫不厥角稽顙執贄來庭煙火通於萬方車書混於千界慶延八室享配於明祗辟水三雍講論乎道義麟鳳薦祉龜龍奉圖石銘顯瑞於郊畿玉書告祥於宫掖以日繼月紛綸葳𬎼竹帛書之而未窮夷夏歌之而不極聖人之具品周矣天子之能事畢矣自千古以下迄于梁隋何功於人比我全德於是寧宴坐展豫遊順四時乘六辨先王洛食上帝河都樞機正於域中雨露均於天下徒觀其離宫别殿彌復道而亘南端髙閣重甍瞰崇墉而連北斗滄洲曉氣化為宫闕之形閶闔秋風亂起金銀之樹降雕輿而式宴簮紱凝嚴披鏤檻而升髙山河在目參光有地遊日月於天邊睨逺無窮見城池於掌上四達分九重之路積樹捎雲雙莖當鐵鎖之橋流珠耿漢霞漿玉醴與湛露而俱傾鳳管龍絲雜商飈而共作遂流汗拜首而為序云垂妙覺垂集作乘奉敕從太平公主遊九龍潭尋安平王宴别序前人安平王地惟藩翰才實宗英懸鵲鏡於胸懷運龍泉於掌握以為時和政理實探道之期賤物貴身尚延齡之術悠然逺覽乃卜兹山屬聖主之能仁遂賢王之雅好羅紈罷御與朱邸而長辭金玉滿堂棲白雲而不顧巖石信美結構多竒錦壁周庭以造天玉泉注户而鳴壑三光貝樹影入山窗九節昌蒲光搖砌水竹林茅宇自冥棲隱之心藥物圖書即有靈仙之氣人惟帝念一作命巖穴所以增輝地入王家樵採尤其不犯嗟乎林棲谷飲古亦有之豈有貴而為王鍊形雲壑希世獨立萬古誰鄰子晉已來一人而已羣公等銜紫泥之寵命間清溪之逸遊駐驂騑步巖石藉落花而聽時鳥纍宿忘歸蔭芳樹而弄春泉窮年不厭衣冠車馬明日下於春山鸞鶴笙歌今宵共乎芳月隱淪可作將知心與事違城闕非遙終惜風流雲散下官少懷微尚早事靈丘踐疇昔之桃源留不能去攀君王之桂樹情可何之請人賦一言俱裁六韻奉陪武駙馬宴唐卿山亭序前人一人御厯乾坤盡覆載之功四海為家朝野得歡娛之契若乃侯門向術近對城隅帝子垂休時過戚里銀爐絳節辭北禁而渡河橋駿馬香車出東城而臨甲第林園洞啓亭壑幽深落霞歸而疊嶂明飛泉灑而回潭響靈槎仙石徘徊有造化之姿苔閣茅軒髣佛入神仙之境芳醪既溢妙曲新調林園過衛尉之家歌舞入平陽之館是日也涼隂稍下溽暑將闌前階晚而白露生後池夕而秋風起重兹行樂欣陪駟馬之遊繼以望舒不頓六龍之轡爰命箋札咸令賦詩記清夜之良遊歌太平之樂事各探一字先成受賞云爾三月三日奉使涼宫雨中禊飲序前人三月上已有祓除禊飲者成俗久矣摯虞對而不經束晳言而有禮漢庭故事衣冠就玄霸之橋晉國遺風輜軿耀翠媯之浦興秦宫者我大周之所建也境連伊塞岸隔河都清暑必在於三伏殊寒不踰於十里占星已畢擢仙闕而威百神匪日將成宜聖皇而福四海吾儕恭興露寢初忝雲軺違北京之宴樂坐南山之霧雨相與會良友陶暮春席幽林觴曲水是日也雜英初發羣物半榮春逶迤而上山雪嶔崟而藏谷髙人一坐杞梓交隂作者肆筵芝蘭同氣遞襲歌詠不登絃管嵇叔夜之鳴琴偏依緑竹郭子期之春酒本出青山論史可聽談玄愈默不覺齊萬品溢九圍愛流波惜遲景顧盼相謂雖非巢許之間左右同聲盍各巖泉之助請染翰操紙賦詩言志人探一言俱題四韻上已泛舟昆明池宴宗主簿席序前人僕不遊於兹十有五載矣心由物感遐矣不忘迹為事牽近而難挹南陽宗雍文通學古器重名髙令君有奉倩象賢丞相生玄成邁德暮春修以文之會上已邀祓禊之遊乃結搢紳撰清辰殷殷轔轔歊霧驚塵望於昆明之濵觀其大浸川陸博資畿甸鳬鷖發海來往沉浮日月麗天東西出入千年珍館無復豫章四面金堤仍同樹杞是日也駕肩錯轂備朝野之歡娛袨服靚粧匝都城之里閈翠幕星布錦帆霞屬餘瀝下醉於綃人新聲逺䀨於川后縱目遐覽識皇代之承平得意同歸有吾儕之行樂髙明一座桂樹藂生君子肆筵玉山交映束晳以言談得俊張華以史漢先鳴登旨酒而無荒絃清琴而自逸於是涉連榻命孤舟桃水漲而浦紅蘋風搖而浪白逼匡阜兮遵彭蠡邈矣載浮指衡嶽而超洞庭眇焉疑到曲島之光靈乍合神魂密遊中流之萍藻忽開龜魚潛動睎鏤鯨而鼓棹共看燒劫之灰歷牽牛而問津欲取支機之石晴光劃野有象而必形夕陽照山無竒而不見思溢今古心搖草木漢家城闕遺之以雜霸之風秦塞膏腴潤之以太平之色景窮勝踐歸限嚴闉思染翰於上林願揮戈於濛汜主稱未醉唯見馬駐浮雲賔共少留自有魚銜明月宫商待叩群公之獲助已多序引先題下走之求蒙不逮請授素幅以頌佳遊使一時之興詠遙存千古之姓名常在春日宴兵部韋員外韋曲莊序前人長安城南有韋曲莊京郊之形勝也却倚城闕朱雀起而為門斜枕岡巒黑龍卧而周宅賢臣作相舊號儒宗聖后配元今為戚里韋丈官雙珠絶價百金懿名文華得俊於陸氏兄弟掩譽於荀家先人結盧當大厦之地衆賔連袂乘暮春之月觀其奧區一曲甲第千甍冠蓋列東西之居公侯開南北之巷嬴女樓下吹鳳降於神仙漢妃館前遊龍走其車馬地靈磊落而間出天爵蟬聨而相繼拜郎起草襲鴈而傳羔補衮司槐送伯而迎季爾乃闢虛幌敞華筵閨門之秀士咸集京邑之清流畢萃萬株果樹色雜雲霞千畝竹林氣含煙霧激樊川而縈碧瀨浸以成陂望太乙而鄰少微森然逼座尚書未至曳履驚鄰宫尹遞來鳴騶動壑登玉爼醉金觴地髙而珍物維豐理洞而清徽不雜以醉觀德因談獲情外戚遨遊自携歌吹主人賞會但有琴詩於是下髙臺陟曲沼鋪落花以為藉結垂楊而代幄霽景含日晚霞五彩而丹青韶望卷雲春臯一色而凝黛景闌興逸氣清心逺仰大儒之肆其德可師入處士之廬斯人若在諷誦於逸彭之藻沐浴於扶陽之墟向來挹清議擅風流即事竒偉佳辰行樂安可無述文在兹乎酆國善誘一作議詞宗見收士末內史禊亭之集竊倚琳琅衛尉别業之遊濫先題目歸軒莫駐麗城將掩拙而不速恨無倚馬之才婉而且微請談雕龍之什公命賦水字盍成四韻云爾文華集作文章陸氏集作班氏秀士集作秀才煙霧集作煙雨景含日集作容斂月恨無集作愧無先天酺宴序張説先天初集作元祀孟冬十月東都留守韋公寅奉聖朝述宴集作宣嘉旨乃合洛京之五省招河尹之二縣將吏咸集佩璋集作章有序鏘鏘濟濟侃侃誾誾供張於興教之門式酺宴也原夫樂生於心非因結風之奏和達於氣無待陽春之節蓋澤之所及者集作也深則情之所感者逺國家天地一統君臣百年朝榮舊德之緒野服集作賴先疇之業玄化漸漬洪恩既久太上功成集作德不宰夏后命子之初皇帝孝理無為漢祖事親之日先堯舜之集作於天屬見文武之集作於同時前古未逢斯人何幸是日六樂振作萬舞苒弱英華作攸同非鳥獸徘徊士女踴躍則知衆庶觀聽之所樂也旨酒絡繹大庖燔炙芳溢風煙醉流阡陌則集作又知衣冠酣暢之所適也由近而視逺萬國之慶皆然自明而察幽三靈之歡一作欣可接若夫吟咏德澤播越仁聲斯固雅頌之餘風集作波政教之遺美同集作凡我詞客安可集作敢闕如賦詩展事垂列于后季春下旬詔宴薛王山池序前人有生之微萬殊無方之感集作盛一節陽和而動植暢春滿而臯壤悅后皇所以發時令布新慶二南邁周召之風百辟形金石之詠者也碧樓日暖青集作南山雪殘首獻歲之浹辰尾暮春之提月帝京形勝借上林而入遊戚里池臺就修竹而開宴泉賙御府味給天厨仙倡侑樂中貴督酒太平佳事前史未書大矣哉一德日新九功惟敘運璿樞而均四氣握金鏡而靜萬方堯舜湯文不違顔於咫尺夔龍伊吕共接武於朝廷不可見而見焉不可聞而聞者豈深思勝殘去殺纍百年之至仁推厯按圖啓干齡之昌運河清難得人代幾何擊壤之歡良有以也地即集作此則青門上路朱邸平臺城煙屢起而汨山野風時來而過水春將悵别愛落花之灑途夏如欣會玩峯雲之映沼爾其列筵授集作受几分曹設幕艇送江鳬船迎海鶴魚龍丸劒曼延揮霍鸞鳳鳴簫鼓作集作鸞鳯簫鼓朋鳴輩作申錫逾集作開於百甕慈惠集作心出於三爵炮炙熏林塘醪醴厭丘壑抃急管於無算醉湛恩以取樂羣公賦詩俾僕題序長卿消渴覺含毫之轉遲子雲壯集作老夫見雕蟲之都廢敢憚鄙詞之訥澀恐貽盛集之蕪穢云爾南省就竇尚書山池集作亭尋花栁宴序前人尋花栁者上賜羣臣之宴也大哉春氣同夫聖心無物不榮有情咸説集作達况乃五教敷洽萬邦懷和尉候警而莫犯刑法存而不用歷觀近古此遇良難諸公入金門侍瑶殿窈窕雲閣葳蕤華館集作紱不亦泰乎然王事靡盬夙夜在公接良會於愷懌集作澤散煩襟於清曠不亦優集作佳乎爾其嘉賔爰集勝賞斯偹召絲竹於伶官借池亭於貴里雕爼在席金羈駐集作臨門逺山片雲隔層城而助興繁鶯芳樹繞髙臺而共樂旨酒未缺方塘半隂盍陳既醉之詩以永太平之日集賢殿書院奉敕送學士張説上賜宴序張九齡集賢殿者本集仙殿也上不以文粹無此二字惟睿作聖而猶垂意好學用相必本於經術圖王亦始於師臣及乎鴻生碩儒博聞多識之士自開元肇建以迄于今大用徴集煥乎廣內而聽政餘暇式宴在兹忠臣嘉賔得盡心之所聰明文思有光被之德故下以道親上亦歡甚即於御座爰發德音以為候彼神人事雖前載傳於方士言固不經遂改為集集作仙為賢去華務實且有後命增其學秩是以集賢之庭更為論思之室矣中書令燕國公外弼庶績以奉沃心之謀內講六經以成潤色之業故得出入華殿師長翰林惟帝用臧固天集作凡所賴拜命之日荷寵有加降聖酒之罍頒御厨之膳食以樂侑人斯德飽時有侍中安陽公等承恩送集作預焉學士右散騎常侍東海公等攝職在焉或稷契大賢或淵唐諱雲諸彥文王多士周室以寧武帝得人漢家為盛而髙視前古獨不在於今乎咸可賦詩以光鴻烈陪王司馬宴王少府東閣序前人夫道行與廢命也非謀之不臧命通與塞時也豈力之為弊古之君子推其分養其和仲尼得之以弦歌傅説因之以版築至若詩有怨刺之作騷有愁思之文求之微言匪云大雅王六官志其大者司馬公引而伸之謫居何心不欲賈生之投分集作吊窮愁非我安用虞卿之著書嘗以風月在懷江山為事簿領何廢形勝不孤集作辜與孤同既好樂而無荒亦尚集作上同而不入逮乎倚集作考層閣慿華軒川澤清明上懸秋景岑嶺回合下帶溪流連草樹而心搖際煙氛而目盡兹邦枕倚是日登臨豈子虛之過詫誠仲宣之信美物色起殊鄉之戚誰則無情而道術得異人之資吾方有遣於是旨酒時獻清談間發歌滄浪以放言詠蟋蟀而傷儉蓋古人之作者豈異於斯盍賦詩焉以揚厥集作其美之戚集作之感有遣集作有適宴宗主簿席序匝都城匝集作空請授素幅集作請授素篆以頌集作以頒興詠集作歌詠文苑英華卷七百九
