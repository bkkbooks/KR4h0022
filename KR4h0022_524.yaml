body:
  text: 文苑英華卷五百二十五宋李昉等編田農門二十二道勞農有闕判二道惰農判三道棄農判二道居喪惰績判一道均輸田判二道田中有樹判三道易田請加倍數判一道給地過數判五道屯田不開渠判一道屯田佃百姓荒地判二道勞農有闕判冬勞農大酋有闕主司糾劾訴稱六物未備對闕名昔在后稷躬稼宣王命藉用天之道因地之利率先以勸敦本斯在是候春鶊初飛饁彼南畝秋蟬已噪穫乎東臯順月令以迎貓佇星回而合蠟八政罔忒九職攸序搜粟多乎敖廪典農蓄於京坻以備荒札將禦凶饉而穰田滿篝豈用淳于之哂載肴入野常聞王丹之勞惟彼大酋是稱司醖徒學杜康之藝有愆儀狄之職陶器必良工善其事火齊式序職司其憂和羮既用於鹽梅合禮必資於麯蘖六物未備胡不及言三農既休忽此闕禮使上農空迷於帝力大酋合置於國章同前張榮問蓋取諸益乃九扈之資始仰法於旗天門文書酒旗星去極七十七度亦六齊之攸作國家制事利物順時設教豳詩土鼓不忘舊章飲酒勞農聿修前典屬務畢南畝嵗居北陸司穡無事索綯以居維彼野人草笠斯糾我皇流澤既一弛而一張農夫力田必強飲而強食俾乎老物是息畯人醉止百里以洽一國若狂瞻彼大酋掌此公酒既盎緹之有闕云秫稻之未備人而是糾方事畢修職司其憂必作事而謀始欲求無咎豈惟刑之可逃惰農判甲有田不耕被罰三夫稅粟以質劑致人甲告旅師施惠散利法司科旅師罪不伏對敬授區分經邦所重畯農懋力緯俗攸先行夏正於東郊黎元不惑歌豳風於南畝田畯知勸逖覽藏書率由茲典乙逄昌厯甲預堯封玉燭時和無聞於勸勵金刀産匱罕見於籌謀異楚客之逃名耕耘不嗣匪梁巖之徇節藨蓘何施行有察於農功遽見徴於屋粟質劑爰致投告旅師施捨未忘貽刑司敗採周年之故事頗叶常規求聖日一作旨之明科稍乖通典但以薄言未息被罰猶嫌簡孚五詞詳明八辟待窮根柢方置彛條同前儀崇哲三推貽訓昭賁於天田萬井開規發揮於地利故五稼庭碩成厚下之道四氓阜滋得奉上之績甲圭衡賤彚農保浮生青郭無起伏之田緑野有災畬之地爰稽版籍舊一作應列郊封匪蠶而衣著於前誡不耕而食豈免復科且甲異嗇夫師非田畯瞻惟惰窳不勤百畝之勞空致質劑未舍三夫之稅訟旅師之散利以避罰而尤人美疑合劵以免科終飾非而為己眷茲甲罪宜峻刑章惟彼旅師請從寬典同前九扈分官四星垂彩廢其業則金湯莫守修其本則禮節是興故朝錯獻書每論春稼仲舒上䇿特説秋麥人之天也其可輕哉甲有良田從來不墾佩犢之風未革維魚之夢豈成以粟輸官自貽重罰輒將施惠遂有薄言然而周覽經史備觀賢哲漢臣散利不見貽辜齊客市義無聞結怨欲加嚴罰不亦難乎甲告誠是妄陳旅師請從寬宥棄農判乙農家子棄業從戎縣令捕而科之詞云征稅繁重餒在其中苟圖庇身非棄本也對三農飭力九穀是資田祖報以斯箱蒸民由其粒食乙輟耕壠上擐甲戎行棄帶經肆力之勤務投筆徇身之計遂使經行靡望委臺笠於中田尺籍移名閉蓬門於故里父耕子播亦足庇身君義臣行如何棄本而乃昧洪範之先食決逐剽姚黜素王之去兵輕逃力穡徒託詞於凍餒終難逭於刑憲且縣尹之職鄉户是司觀惠偖於字人定否臧於襁負必也稅符大桀詠減唐堯坐琴堂以素餐帶墨綬而尸祿自宜禠服寧止免冠待窮兩造之詞聊舉一隅之説同前張叔政農政之先戎事之大乙也業惟田畯流匪兵家固當不見異物豈伊敢有二事屬裔夷壓境殘賊犯邉誰謂百夫之雄且懼二吾之稅退惟憂於餒在進或望於名成秦楊漢貨殖傳秦楊以田農而甲一州之蓋一州非其事也定逺之遊萬里竊有慕焉誓捐中野之軀寧顧西成之業縣令名當墨綬志在繭絲惟一作雖求化洽之方奚必禁人之犯况北虜欵塞西戎來王聖朝偃伯之日賢相冨人之時已見小康孰虞多難是知且耕且戰荷戈非黷武之夫足食足兵釋耒豈惰農之士欲令科罪必使正名居喪惰績判得甲居喪不績採訪使責太守風化不著訴稱誠恥之也是亦為政對柴少儒先王垂教則喪也寧戚君子立身必造次於是甲何為者焉知禮乎惰爾庶功隳我王化既稱家而罕制復居里而無職且啜菽飲水樂盡其中泣血寢苫孝乎斯在何必厚藏醯醢效襄公之送妻自可薄盡有無同子栁之葬母忽而都闕未之前聞不績無縗則周官之故事有裘勿服乃郕人之匪臧况八使觀風澄清可尚六條曠職政化蔑如不懲熊軾之愆孰謂蟹筐之責均輸田判吉泰將均輸地上已籍下人告不合對禹制初闢周疆肇建蕭收漢閣益掌虞邦井田有差經遂無紊順陽和以肅事映秋霜以畢力四時得業萬邦作孚豈容吉泰愚駑致心誣妄析言興盜亂名改作革公田以入己自犯嚴科移私籍以安居不知天憲往聞匡子今觀吉生幸付司刑以議其罪同前樊光大邦列土畀畫有則齊氓分利割據必書苟非躬田無或編版功以受錫人其捨諸吉泰攝生明代志事耕鑿率情暗昧固貪井屋官未聞於三命謨亦乏於九功匡救本無封賞何有輒將均輸之地以載充家之籍則𢎞羊蕆事今也雖存劉盆祝食此而安取既黷常典合置常刑田中有樹判乙有樹於田中里人讓之稱在疆埸對薛季連天官分政載師任土必均三壤以務九農乙則匪人其何妄作將有樹於田畝誠害稼而傷農稽諸古經則有之矣考以今制誰曰其然里人有孚可以受服乙也非古宜乎褫帶同前張璜國有謨訓人惟定居非周封之井疆異秦制之阡陌乙有嘉樹森乎甫田上含煙飈下潤溝洫擢本抽幹豈彭澤之五栁負隂向陽等江陵之千橘此乃是地良美繇條草木有滋稼穡看施饁野之勞益我公私見滿如坻之積縱使羣木聳秀何妨百穀用成今則不廢藨蓘况乎實在疆埸里人之讓未知相土之宜司冦之局須置贖金之名同前𬗟彼古制攸列場人候農祥之戒晨服先疇之畎畝乙偶昌運不知帝功是藨是蓘爰稼爰穡場列瓜蔓圃資蔬材靃靡芬芳嵗阜其用多稌多黍乃顧於中田優哉遊哉坐矜於老圃果碩於灌或成蹊而則妨枳樹於籬任為疆而何有里人不識輕為誚一作詰讓徒肆無稽之言難投有戾之任易田請加倍數判後篇作授田判乙授易田請加數倍所由以非寬鄉不給訴云三易以上對敬括勞役異等廣狹殊制易固有數授惟從宜爾乙於何伊田是職衣夫襏襫徒思畝疑作敏以四支闕彼萊蕪難望豐其五穀因而上請冀以曲從但務居塉之嫌莫原負郭之貴且一易再易禮誠舉以加饒近郊逺郊義或隨其衆寡枝辭不已甚所未然此篇五百二十六卷重出今已削去給地過數判甲給地過數科所由曰更耕之田對韓秀榮總目作明掌地之圖辨邦之數分疆畫野度土居民唐諱將以均其賦役一其征繕俾上下而為宜體磽肥而施法甲之所給類彼均人度以物情頒其職事我疆我理雖差百畝之田如茨如梁何乖一易之地且稽諸王制考彼周官當務審其徴求而克均其政令李悝為魏方興地力之能管仲相齊式廪軍實之要更耕而穫豈昧隨時受以功田雅符通典若科之罪勿使能殖同前磽肥異宜給授殊制苟夫田之可易在公道而奚爽惟甲奉其所主念此為農無怠無荒將陳耕鑿之力是藨是蓘以期國家之利雖在勤不匱而處瘠則勞風雨每調莫覩如雲之稼收穫斯至空嗟懸罄之室徒逄時於樂土終歎乏於良田懷不足而是憂思鼓腹而何及觀其所給察其所由在周典而無辜論漢史而何著惟農是恤於法何乖寧易地以豐財豈守株而喪本更耕之訴據百畝而何傷過數之科在三章而宜捨同前蘇稱沃土辜土厥有區分一易再易非無異制實資均政以利耕者甲有司也政實存焉因資地利之殊計若農家之請庶以通其勞逸齊厥等差實謂更耕克精受授孰云過數且曰守經古可明徴今寧有罰同前八政交修桑農為本六官致理冨教居先將取地財之生成須辨夫家之沃瘠惟甲率是吏職行乎周禮我疆我理爰受授於三農如京如坻佇陳陳於九穀足使丁壯盡力汙萊合宜何斯有功輒欲加罪若也閭閻櫛比煙火星繁占天子之牛田廢將軍之馬埓則當惟辨布政求弊是圖况今邉鄙不聳流庸適至宜剪荆棘俾生稻粱勸農既任其易耕給地何限於過數庶從行古未可非今同前張澮凡制農田是分地職家給百畝夫當一㕓矧伊所由慎乃厥事善相丘陵坂險能均地邑人居使一易之田加之以二再易之地增之以三蓋居瘠土者勞則宅沃土者逸將更耕以獲利與不易而方齊故俗阜時康以廣數圻之外家給人足寧嗟十畝之間曠土既無代田是匹欲科之罪其名一作善有詞屯田不開渠判甲當屯於戊巳校尉故地乙告其常行厭勝之術御史按云唯使丁開渠播種不伏科罪對富國強兵允資重種闢土殖榖必俟良農雖云因地之利無爽用天之道惟甲克勤稼穡受任軍屯候正嵗之布和乃宣乃理及王瓜之生夏或錢或鎛遂使其茨如梁必周戊巳之地其比如櫛不忝京坻之詩眷此屯功宜蒙上賞誰聞興利之舉翻招厭勝之訟然而六甲紀則剛柔異體五行統嵗禳厭分區苟獲賴於柔嘉固無嫌於法術况丁也為役職此開渠雖決泄之誠勞豈蒼黃而妄告仰稽古訓甲則無辜旁酌人情乙宜致詰必若事非政要術異農祥請遵持斧之繩勿恕薄言之訴屯田佃百姓荒地判諸畿縣置屯田佃百姓荒地主令復業請自耕種屯司不與縣司執申若不還地人即却逃對李暄敬承畿縣素匪萊田是中邦之廬伍為上農之井賦日者旄頭失象狂冦亂華王師未赫國人猶恐是以苟安便地多出近關惜三徑之就荒歎五溝之不樹人迷可復土利宜敦等充國之大開時欣嵗足類信臣之廣闢每詠年豐今乃黎庶重遷歸還樂土服先疇之疆畎守故里之松榆將持襏襫願事藨蓘誠宜饁彼南畝勞乎東郊國本必於務農人安固在循業永言縣執何謝屯司同前人散久矣地廣大荒開都護之屯田闢天子之縣內且耕且戰嵗取十千以餉農足食足兵武有七德以威敵殊管氏之見奪異周制之不頒且運屬中興人多復業惟桑與梓詩人興敬止之辭安土重遷縣司敦仁人之禮請從地著之業無俾流萍之歎文苑英華卷五百二十五
