body:
  text: 文苑英華卷七百三十宋李昉等編餞送十三送友人遊蜀序一首送鄭尚書序一首送殷員外使廽鶻序一首送許使君刺郢州序一首送鄭十校理序一首送河中楊少尹庶子歸鄉序一首送幽州李端公序一首送水陸運使韓潭州序一首送楊儀之歸潭州序一首送竇從事平序一首送孟東野序一首送李願歸盤谷序一首送董少南逰河北序一首送區册序一首送令縱上人西逰序一首送間師上人序一首送李礎判官正字歸湖南序一首送友人逰蜀序吕溫始吾挹至源之貌若隴底積雪聳寒木於雲溪次吾覽至源之文若驪龍追走集作相追弄明月於泉窟末吾聽至源之論若泰山欲雨倒雲氣於滄溟如其貌可以振肅周行如其文可以光潤石渠如其論可以感動宣室而淪蕩江海垂二十年則不知天所以生之之意貞元甲乙嵗以親故勸勉來逰亰師時然後言無辨以動衆樂然後笑無歡以接物義然後取無食以寧居慨然悔之決䇿長往因登紫閣峯而指曰西南青𡨕色連岷峨吾行何歸山盡則往翌日告别于友人太原王玄運顧謂豫曰髙雲出岫無時雨之會與風悠揚轉逺而散若至源者其猶雲耶盍亦贈之序豫和汝送鄭權尚書序韓愈嶺之南其州七十其二十二𨽻嶺南節度府其四十餘分四府府各置帥然獨嶺南節度為太府大府始至四府必使其佐啓問起居謝守地不得即賀以為禮嵗時必遣賀問致水土物大府帥或道過其府府帥必戎服左握刀右屬弓矢帕首袴鞾迎于郊及既至大府帥先入據館帥守屏若將趨入拜庭之為者大府與之為讓至一至再乃敢改服以賔主見適位執爵皆興拜不許乃止虔若小侯之事大國有大事咨而後行𨽻府之州離府逺者至三千里懸隔山海使必數月而後能至蠻夷悍輕易怨以變其南州皆岸大海多洲島飄集作帆風一日踔數千里漫瀾不見蹤迹控御失所依險阻結黨仇機毒矢以待將吏撞搪呼號以相和應蜂屯蟻雜不可爬梳好則人怒則獸故常薄其征入簡節條條集作而踈目時有所遺漏不究切之長養以兒子至紛不可治乃草剃而禽獮之盡根株痛斷乃止其海外雜國若耽浮羅流求毛人夷亶之洲林邑扶南真臘干陀利之屬東南際天地以萬數或時候風潮朝貢蠻胡賈人舶交海中若嶺南帥得其人則一邉盡治不相冦盜賊殺無風魚之災水旱癘毒之患外國之貨日至珠香象犀玳瑁竒物溢於中國不可勝用故選帥常重於他鎮非有文武威風知大體可畏信者則不幸往往有事長慶三年四月以工部尚書鄭公為刑部尚書兼御史大夫往踐其任鄭公嘗以節鎮襄陽又帥滄景德棣歷河南尹華州刺史皆有功德可稱道入朝為金吾將軍散騎常侍工部集有侍郎二字尚書家屬百人無數畝之宅僦屋以居可謂貴而能貧為仁者不富之效也及是命朝廷莫不恱將行公卿大夫士茍能詩者咸相率為詩以美朝政以慰公南行之思韻必以來字者所以祝使公成政而來歸疾也送殷員外使廽鶻序唐受天命為天子凡四方萬國不問海內外無小大咸臣順於朝時節貢水土百物大者特來小者附集元和睿聖文武皇帝既嗣位悉治方內就法度十三年詔曰四方萬國唯廽鶻於唐最親奉職尤謹丞相其選宗室四品一人李孝誠持節往賜君長告朕之集作之朕意又選學有經術集作法通知時事者一人與之為二由是殷侯侑自太常博士遷尚書虞部員外郎兼侍御史朱衣象笏承命以行朝之大夫莫不出餞酒半右庶子韓愈執盞言曰殷侯一作殷大夫今人適數百里出門惘惘有别離可憐之色持集作襆被入直三省丁寧顧婢子語刺刺不能休今子使萬里外國獨無幾微出於言面豈不真知輕重大丈夫哉丞相以子應詔真誠知人矣士不通經果不足用於是相屬為詩以道其行云送許使君刺郢州志雍序愈嘗以書自通於于公頔纍數百言其大要也言先逹之士得人而託之則道德彰而名問集作聞流後進之士得人而託之則事業顯而爵位通下有矜乎能上有矜乎位雖恆相求而不相遇于公不以其言為不可復書曰足下之言皆是矣三字集作是也于公身居方伯之尊蓄不世出羣集無出羣字之才而能與卑鄙庸陋相應答如影響是非忠乎君而樂乎善以國家之務為已任者乎愈雖不敢私其大恩抑不可不謂之知已恆矜而誦之情已至而事不從小人之所不為也故於使君之行道刺史之事以為于公贈凡天下之事成於自同而敗於自異為刺史者恆私於其民不以實應乎府為觀察使者恆急於其賦不以情信乎州由是刺史不安其官觀察使不得其政財巳竭而斂不休人巳窮而賦韓集舉正作怒愈急其不去為盜也亦幸矣誠使刺史不私於其民觀察使不急於其賦刺史曰吾州之民天下之民也惠不可以獨厚觀察使亦曰某州之民天下之民也斂不可以獨急如是而政不均令不行者未之有也其前集有之字言者于公既已信而行之矣今之言者其有不信乎縣之於州猶州之於府也有以事乎上有以臨乎下同則成異則敗者皆然也非使君之賢其誰能從集作信之愈於使君非燕逰一朝之好也故其贈行不以頌而以規送鄭十校理序祕書御府也天子猶以為外且逺不得朝夕視更始聚書於集賢殿别置校讎官曰學士曰校理常以寵丞相為大學士其他學士皆逹官也校理則用天下之名士集作而能文學者苟在選不計其秩次唯所用之由是集賢之書盛積盡祕書所有不能處其半書日益多官日益重四年鄭生涵始以長安尉選為校理人皆曰是宰相子能恭儉守教訓好古義施於文辭者如是而在選公卿大夫家選之子弟其勸耳矣愈為博士也始事相公於祭酒分教東都生也事相公於東太學今為郎於都官也又事相公於居守三為屬吏經時五年觀道德於前後聽教誨於左右可謂親薰而炙之矣其髙大逺密者不敢隱度論也其勤巳而務博施以巳之有欲人之能不知古君子何如爾今生始進仕獲重語於天下而慊慊若不足真能守其家法矣其在門集有下字者可進賀也求告來寧朝夕侍側東都士大夫不得見其面於其行日分司郎吏與留守之從事竊載酒殽度定鼎門外盛賔客以餞之既醉各為詩五韻且屬愈為序送楊巨源少尹序昔疏集作踈廣受二子以年老一朝辭位而去于時公卿設供帳漢書作張祖道都門外車數百兩道路觀者多歎息泣下共言其賢漢史既傳其事而後世工畫者又圖其迹至今照人耳目赫赫若前日事國子司業楊君巨源方以能詩訓後進一旦以年滿七十亦白丞相去歸其鄉世嘗説古今人不相方集有及字今楊與二疏豈其異意耶集作其意豈異也余集作豫忝在公卿後遇病不能出不知楊侯去時城門外送者幾人車幾兩馬幾駟一作匹道邉觀者亦有歎息而集無此字知其為賢與否而太史氏又能張大其事為傳繼二疏蹤迹不落莫否見今世無工畫者集有而字畫與不畫固不論也然吾聞楊侯之去丞相有愛而惜之者署以為其都少尹不絶其祿又為歌詩以勸之京師之長於詩者亦屬而和之又不知當時二疏之去有是事否古今人同不同未可知也中世士大夫以官為家罷則無所於歸楊侯始冠舉於其鄉歌鹿鳴而來也今之歸指其樹曰某樹吾先人之所種也某水某丘吾童子時所釣遊也鄉人莫不加敬誡集作戒子孫以楊侯不去其鄉為法古之所謂鄉先生沒而可祭於社者其在斯人歟其在斯人歟送幽州李端公序元年集有春字非今相國李公藩為吏部員外郎愈嘗與偕朝道語幽州司徒公劉濟之賢曰某前年被詔告禮幽州入其地迓文粹作訊勞之使纍文粹作里至每進益恭及郊司徒公紅帕集作首鞾袴握刀杭本有在字左右雜佩弓張集作韔服矢插扇俯立迎道閣本作賔左某禮辭曰公天子之宰禮不可如是及府又以其服執集作即事某又曰公三公不可以將服承命及館又如是集作之卒不得辭上堂即客階文粹有即字座必東嚮愈曰國家失太平於今六十年夫十日十二子相配數窮六十其將復平乎韓即舉正作平平必自幽州始亂之所出也今天子大聖司徒公勤於禮庶幾帥先河南北之將來覲奉職如開元時乎李公曰然今李公既朝夕左右必數數為上言元年之言殆合矣端公嵗時來夀其親東都東都之士大夫一作大夫士莫不拜于門其為人佐甚忠意欲司徒公功名流千萬嵗請以愈言為使歸之獻送水陸運使韓約一作重舉侍御歸所治序前人六年冬振武軍吏走驛馬詣闕告飢公卿廷議以轉運使不得其人宜選才幹之士往換之吾族子重華適當其任至則出贓罪吏九百餘人脫其桎梏給耒耜與牛使耕其傍便近地以償所負釋其粟之在吏者四十萬斛不徴吏得去罪死假種糧齒平人有以自效莫不涕泣感奮相率盡力以奉其令而又為之奔走經營相原隰之宜指授方法故連二嵗大熟吏得盡償其所亡失四十萬斛者而私有其贏餘得以蘇息軍不復飢君曰此未足為天子言請益募人為十五屯屯置百三十人而種百頃令各就髙為堡東起振武轉而西過雲州界極於中受降城出入河山之際集作險六百餘里屯堡相望寇來不能為暴人得肆耕其中少可以罷漕挽之費朝廷從其議秋果倍收嵗省度支錢千三百萬八年詔拜殿中侍御史錫服朱銀其冬來朝奏曰得益開田四千頃則盡可以給塞下五城矣夫田五千頃法當用人七千臣令吏於無事時督習弓矢為戰守備因可以制虜庶幾所謂兵農兼事務一而兩得者也大臣方持其議吾以為邉軍皆不知耕作開口望哺有司常僦人以車船自他郡往輸乘沙逆河逺者數千里人畜死蹄踵交道費不可勝計中國坐集有見字耗虗而邉吏恆苦食不繼今君所請田皆故秦漢時郡縣地其課績又巳驗白若從其言其利未可遽以一二數也今天子方舉群䇿以收太平之功寧使士有不盡用之歎懷竒見集作死而不得施設也君又何憂而中臺士大夫亦同言侍御韓君前領三縣紀綱三集作二州奏課常為天下第一行其計於邉其功烈又赫赫如此使盡用其䇿西北邉故所沒地可指期而有也聞其歸皆相勉為詩以推大之而屬豫為序送楊儀之支使歸潭州序愈在京師時嘗聞當今藩翰之賔客惟宣州為多賢愈與之遊者有二人焉隴西李博清河崔羣羣與博之為人吾知之道不行於主人與之處者非其類雖有享之以季氏之富不一日留也以羣博論之凡在宣州之幕下者雖不得集作盡與之遊皆可信而得其為人矣愈未嘗至宣州而樂頌其主人之賢者以其取人信之也今中丞之在朝愈日侍言於門下其來而鎮集作領茲土也有問湖南之賔客者愈曰知其客可以信其主者宣州也知其主可以信其客者湖南也去年冬奉詔為邑於陽山然後得謁湖南之賔客於幕下於是知前之信之也不失矣及儀之之來也聞其言而見其行自於是以下二十三字集作及支使之來也聞其言而信其行於是知前之信之也不失矣則向之所謂羣與博者於吾何先後焉儀之集作支使明集作智足以造謀材足以立事忠足以勤上惠足以存下而又侈之以詩書六藝之學先聖賢集作人之德音以盛集作成其文以輔其質宜乎從事於是府而流聲實於天朝也夫樂道人之善以勤集作勸其歸者乃吾之心也謂我為邑長於斯而媚夫人云者不知言者也工乎詩者歌以繫之送竇平從事序踰甌閩而西集無此字南皆百越之地於天文其次星紀其星牽牛連山隔其隂巨海敲集作敵其陽是維集作皆島居集作夷卉服之民風氣集作俗之殊著自在諸本作古昔唐之有天下號令之所加無異於逺近民俗既遷風氣亦隨雪霜時降癘疫不興瀕海之饒固如其諸本作加於初是以人之之集作於南海者如東西州焉皇帝臨御天下二十有二年詔工部侍郎趙植為廣州刺史盡牧南海之民署從事扶風竇平平以文辭進於是集作其行也其族人殿中侍御史牟合東都交逰之能文者二十有八人賦詩以贈之於是昌黎韓愈嘉趙南海之能得其人壯從事之答於知我一作巳不憚行於逺也又樂集有其字貽周之愛其族叔父能合文詞以寵榮之作送竇從事少府平序送孟東野序大凡物不得其平則鳴草木之無聲風撓之鳴水之無聲風蕩之鳴其躍也或激之其趨也或梗之其沸也或炙之金石之無聲或擊之鳴人之於言也亦然有不得巳者而後言其歌也有思其哭也有懷凡出乎口而為聲者其皆有不集作弗平者乎樂也者鬱於中而泄於外者也擇其善鳴者而假之鳴金石絲竹匏土革木八者物之善鳴者也維天之於時也亦然擇其善鳴者而假之鳴是故以鳥鳴春以雷鳴夏以蟲鳴秋以風鳴冬四時之相推􅟃其必有不得其平者乎其於人也亦然人聲之精者為言文詞之於言又其精也尤擇其善者而假之鳴其在於唐虞咎繇禹其善鳴者也而假之以鳴夔不不水作不能以文辭鳴又自假於韶以鳴夏之時五子以其歌鳴伊尹鳴殷周公鳴周凡載於詩書六藝皆鳴之善者也周之衰孔子之徒鳴之其聲大而逺傳曰天將以夫子為木鐸其弗信矣乎其末也莊周以其荒唐之詞鳴集有於楚二字非莊子未嘗仕於楚楚大國也其亡也屈原以集作以屈原鳴臧孫辰孟軻荀卿以道鳴者也楊朱墨翟管夷吾晏嬰老聃申不害韓非慎到田駢鄒衍尸佼孫武張儀蘇秦之屬皆以其術鳴秦之興李斯鳴之漢之時司馬遷相如揚雄最善鳴者也其下魏晉氏鳴者不及於古然亦未嘗絶也就其善鳴者其聲清以浮集作淳其節數以急其詞淫以哀其志弛以肆其言也亂集作辭雜而無章將天醜其德莫之顧耶何為而集作乎不鳴其善鳴者也唐之有天下陳子昻蘇源明元結李白杜甫李觀皆以其所能鳴其存而在下者孟郊東野始以其詩鳴其高出晉魏不懈而及於古其他浸淫乎漢氏矣從吾遊者李翺張籍其尤也三子者之鳴信善鳴矣抑不知天將和其聲而使鳴國家之盛耶抑將窮餓其身思愁其心腸而使自鳴其不幸耶三子者之命則有懸乎天矣其在上也奚以喜其在下也奚以悲東野之役於江南也有若不釋者然集作不懌然者故吾道其命於天者集有以字解之送李願歸盤谷序太行之陽有盤谷盤谷之間泉甘而土肥草木叢茂居民鮮少或集有曰字謂其環兩山之間故曰盤或曰是谷也宅幽而勢阻隱者之所盤旋石本無此字友人李願居之願之言曰人集有之字稱大丈夫者我知之矣利澤施於集作于人名聲昭乎集作于時坐于廟朝文粹作堂進退百官而佐天子出令其在外則樹旗旄羅弓矢武夫前呵從者塞途供給之人各執其物夾道而疾馳喜有賜集作賞怒有刑才俊集作畯滿前道古今而譽盛德入耳而不煩曲眉豐頰清聲而便體秀外而惠中飄輕裾翳長袖粉白黛緑者列屋而間居妬寵而負恃爭妍而取憐大丈夫之遇知於主上集作天子用力於當世者之集有所字為也吾非惡此而逃之是有命焉不可幸而致也窮居而野處升髙而逺望集作望逺坐茂樹以終日濯清泉以自潔采於山美可茹釣於水鮮可食起居無時唯適之集作所安與其集有有字譽於前孰若無毁於其後與其集有有字樂於身孰若無憂於其心車服不維刀鋸不加理亂不知黜陟不聞大丈夫不遇於時者為之二字集作之所為也我則行之伺候於公卿之門奔走於形勢之途足將進而趦趄口將言而囁嚅處汙穢而不羞觸刑辟而誅戮僥幸於萬一老死而後止者其於為人賢不肖何如也昌黎韓愈聞其言而壯之與之酒而為之歌曰盤之中維子之宫盤之土維子之稼四字石本作可以稼一作可以藝稷黍盤之泉可濯可集作而沿四字一作可以濯而盥焉盤之阻誰爭子所窈而深廓其有容繚而曲如往而復嗟盤之樂兮樂且無央虎豹逺迹兮蛟龍遁藏鬼神守護兮呵禁不祥飲且集作則食兮集有既字夀而康無不足兮奚所望膏吾車兮秣吾馬從子于盤兮終吾生以徜徉送董邵南逰河北序燕趙古稱多感慨悲歌之士董生舉進士連不得志於有司懷抱利器鬱鬱適茲土吾知其必有合也董生勉乎哉夫以子之不遇時茍慕義強仁者皆愛惜焉矧燕趙之士出乎其集有情字性者哉然吾嘗聞風俗與化移易吾惡知其今不異於吾集作古所聞集作云邪聊以吾子之行卜之也董生勉乎哉吾因之有集有所字感矣為我吊望諸君之墓而觀於其市復有昔時屠狗者乎為我謝曰明天子在上可集有以字出而仕矣送區册序陽山天下之窮處也陸有丘陵之險虎豹之虞水有文粹無此二字江流悍急橫波之石亷利侔劔戟舟集有之字上下失勢破碎淪溺者往往有之縣郭無居民官無丞尉夾江荒茅篁集作叢竹之間小吏十餘家皆鳥言夷面始至言説不相通畫地為字然後可告以出租賦奉期約是以賔客逰從之士無所為而至愈待罪於斯且半嵗集有矣字有區生者誓言相好自海拏舟而來升自賔階儀觀集作冠非甚偉坐與之語文義卓然莊周云逃空虗者聞人足音跫然而喜矣况如斯文粹無此字人者豈易得哉集作耶入吾室聞詩書仁義之説欣然喜若有志乎集作於其間也集有且字與之翳嘉林坐石磯投竿而漁陶然而集作以樂若能遺外聲利而不厭乎文粹無此字貧賤也嵗之初吉文粹作吉歸覲文粹作拜其親酒壺既傾序以識别送令縱上人西逰序其行異其情同君子與其進可也令縱釋氏之秀者也又善為文浮泛集作遊倘佯迹接天下藩維大臣文武豪士令縱未始不褰裳而負業往造其門下其尊行美德建功植集作樹業令縱從而為之頌歌集作歌訟典而不諛麗而不淫其有中古之遺風歟及促席接膝十三字集作其中有古人之風所與乘間致密促席接膝譏評文章商較人士浩浩乎不窮愔愔乎深而有歸於是乎吾忘令縱之為釋氏之子也其來也雲凝其去也風休方歡而已辭雖義而不求吾於令縱不知其不可也盍賦歌集無此字詩以道其行乎送髙間上人序茍可以寓其巧智使機應於心不挫於氣則神完而守固雖外物至不膠於心堯舜禹湯治天下養叔治射庖丁治牛師曠治音聲扁鵲治病僚之於丸秋之於奕伯倫之於酒樂之終身不厭奚假外慕夫外慕徙業者皆不造其堂不嚌其胾者也往者集作時張旭善草書不治他伎喜焉草書怒焉草書八字集作喜怒窘窮憂悲愈佚怨恨思慕酣醉無聊不平有動於心必於草書焉發之其觀於物見山水崖谷鳥獸蟲魚草木之花實日月列宿集作星風雨水火雷電霹靂歌舞戰鬬天地事物之變可喜可愕一寓於書故旭之書變動猶鬼神不可端倪以此終其身而名後世今間之於草書有旭之心哉不得其心而逐其迹未見其能旭也為旭有道利害必明無遺錙銖情集作精炎於中利欲鬬進有得有喪勃然不釋然後一決於書而後旭可幾也今間師浮屠氏一死生解外繆集作膠是其為心必泊然無所起於杭本作於起其世必淡然無所於嗜泊與淡相遭頽墜集作墮委靡潰散集作敗不可收拾則其於書得無象之然乎然吾聞浮屠氏善閣本作善幻多技能間集作師字如通其術則吾不能知矣送李礎判官正字歸河南序貞元中愈從太傅隴西公于汴州李生之尊父以侍御史管汴之鹽鐡日為酒殺羊享賔客李生則尚與其弟學讀書習文辭以舉進士為業愈於大傅府年最少故得交李生父子間公薨軍亂軍司馬從事皆死侍御亦被讒為民日礎之父仁鈞流愛州英華作由非南其後五年愈又貶陽山令今愈以都官司員外郎守東都省侍御自衡州刺史為親王集有府字長史亦留此三字杭本作政掌其府事生以集作自湖南從事請告來覲於時太傅府之士唯愈與河南司録周君巢獨存其外則李氏父子相與為四人離十三年幸而集處得宴而舉一觴相屬此天也非人力也侍御與周君於今為先輩盛杭本作成德集有若字李生溫然為君子有詩八百篇傳詠於時唯愈也業不益進行不加修顧唯未死耳往拜侍御謁周君扺李生退未嘗不發愧也往時侍御有無盡費於朋友及今則又不忍其三族之寒飢聚而館之踈集作疏逺畢在集作至祿不足以集有為字養李生雖欲不從事於外其勢不可得已集作止也重李生之還者皆為詩愈最故故又序云集作之文苑英華卷七百三十
