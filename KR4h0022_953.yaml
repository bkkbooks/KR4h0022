body:
  text: 文苑英華卷九百五十四宋李昉等編職官十六崔虢州元亮墓志一首鄭滁州郎墓志一首邢歙州羣墓志一首李處州方元墓志一首虢州刺史贈禮部尚書崔公墓志銘白居易唐有通四科達三教者曰惟崔公公諱元亮字晦叔其先出於炎帝至裔孫穆伯受封於崔因而命氏漢初始分為清河博陵二祖故其後稱博陵人曽祖悅洛州司户參軍贈太子少保祖光迪贈贊善大夫考杭揚州司馬兼通事舍人贈太子少保集作師妣太原王氏贈晉陽郡太夫人公即少師季子解褐補祕書省校書郎從事宣越二府奏授協律郎大理評事朝廷知其才徴授監察轉殿中歷侍御史膳部駕部員外郎洛陽令密州刺史公集有師至密密民之凍餒者賑恤之疾疫者救療之胔體集作骼未殯者命藏葬集作葬藏之男女過時者為嬪集作娶嫁娶之三月而政立二年而化行密人悅之發於謡詠換歙州刺史其政如密先是歙州集無此字民畜牛馬而生駒犢者官書其數吏緣為姦公既下車盡焚其籍孳息貿易一無所問先是歙民居其集無此字山險而輸稅米者擔負跋涉勤苦不支公許其計斛納緍賤入貴出官且獲利人皆忘勞農人便之歸如流水朝廷聞其政徴拜刑部郎中謝病不就俄改湖州刺史政如密歙加之以聚羡財而代逋租則人不困謹茶法以防黠吏則人不苦修堤塘以備旱嵗則人不飢罷民集作氓賴之如依父母入為祕書少監改曹州刺史兼御史中丞謝病不就拜太常少卿遷諌議大夫屢上封章言行職舉上召對加金紫以奬之假貂蟬以寵之未幾朝有大獄人心惴駭勢連中外衆以為寃百辟在庭無敢言者公獨進及霤危言觸鱗天威赫然連叱不去公遂置笏伏陛極言是非血淚盈襟詞竟不屈上意稍悟容而聽之卒使罪疑從集作惟輕實公之力既而真拜用集作因旌忠臣由是正氣直聲震耀朝右縉紳者相賀曰集作賀皆曰國有人焉國有人焉公以為名不可多取退不必待年決就長告徑遵歸路朝廷不得已在途拜太子賔客分司東都公濟源有田洛下有宅勤誨子弟邀招賔朋以山水琴酒自娛有終焉之志無何又除虢州刺史蓋執政者惜其去將欲馴致而復用之太和七年七月十一日遇疾薨于虢州廨舍天子廢朝一日贈禮部尚書周行士林聞者相弔宗族交友靡不出涕遺直遺愛公兼有焉嗚呼公之將終也遺誡諸子其書大略云吾年六十六不為無夀官至三品不為不達死生定分何足過哀自天寶以還山東士人皆改葬兩京利於便近惟吾一族至今不遷我沒宜歸全于滏陽先塋正邱首義也送終之禮集作事務從儉薄保家之道無忘孝悌吾玊磬琴留别樂天請為墓志云爾夫人范陽盧氏先公而殁有子九人長曰煴通事舍人次曰芻言罕言舉進士次曰緩集作綬中牟尉其下皆幼稚煴等哀毁孝敬號護轜翣以九年四月二十八日用大葬之禮歸窆于磁州招義縣磁邑鄉北原遷盧夫人而合祔焉遵理命也公之丁少師憂也退居髙郵其地卑濕泣血卧苫者三載因痼集作病痺其兩股焉逮于終身集有竟字不能趨拜從弟仁亮竄謫巴南殁而無後公先命長男煴護喪歸葬後命幼子聽繼絶承祧自宗族及朋執間有死無所歸孤無所依者公或祭之葬之或衣之食之或婚之嫁之侯齊二家之類是也故閨門稱其孝羣從仰其仁交遊服其義可不謂德行乎公幼嗜學長能集作善屬文以詞賦舉進士登甲科以書判調天官入上等前後著文集凡若千卷尤工五言七言詩警䇿之篇多在人口其餘製述作者許之可不謂文學乎公之典密歙湖也理化如此集作被可不謂政事乎居大諫騎省也忠讜又集無又字如此可不謂言語乎公夙慕黃老之道集作術齋心受籙服氣鍊形暑不流汗冬不挾纊膚體顔色氷清玉溫未識者望之疑神仙中人也在湖三載集作嵗嵗修三元道齋每集無此字輒有綵雲靈鶴回翔壇上久而去之集作久之而去前後置齋七八而鶴來儀者凡三百六十其內修外感也又集無又字如此可不謂通於大道乎公之晚年又師六祖以無相為心地以不二為法門每遇僧徒輒論真諦雖耆年宿德集作學皆心伏之及易簀之夕大怖將至如入三昧恬然自安仍於遺疏之末手筆題云暫榮暫悴敲石火即空即色眼生花許時為客今歸去大厯元年是我家其解空得證也又如此可不謂達於佛性乎總而言之故曰通四科達三教者也居易不佞辱與公遊者三十餘年年老分深定為執友况奉遺札託為斯文且慙鄙陋不敢辭讓銘曰滏水之陽鼓山之下吉日吉土載封載樹嗚呼博陵崔君之墓滁州刺史鄭公墓志銘前人周宣王封母弟桓公于鄭厥後因封命氏為滎陽人鄭自桓公而下平簡公而上世家婚嗣咸載集作詳于史諜故不書公諱朗字某五代祖諱某北齊尚書令是集作諡為平簡公曽祖某下邳集作邽郡太守王父諱某衛州刺史皇考諱某祕書郎贈鄭州刺史公即祕書第三子好學工詞賦舉進士中第判入髙等始授郾城尉無何本郡守移地部州民有暴悖者相率遮道麾呵不去公忿其犯上立斃六七人採訪使竒之奏署支使改浚儀主簿轉大理評事兼佐漕務集作豫非彭果領五府奏公為節度判官會果坐贓連纍僚佐貶光化尉移向城尉歷北海尉時安祿山始亂傳檄郡邑邑人孫俊鄧羅伽毆市人劫廩藏以應公時已去秩因奮呼率寮吏子弟急擊之殺俊羅伽盡殱其黨由是一邑用寧朝廷嘉集作美之擢授登州司馬尋轉長史纍加朝散大夫入為太子左贊善大夫尚書屯田員外郎太子中允出攝淄州刺史俄改集作換萊州連有善最詔授檢校司勳郎中兼侍御史充青萊登海密五州租庸使太尉李公光弼鎮徐州奏公為節度判官改太子左諭德屬海州沂州飢盜賊起詔除沂州刺史充海密沂三州招討使加正議大夫賜紫金魚袋公惠威舊著比至部而蒼山賊帥李浩與其徒五千來降由是三郡底定復入為衛尉少卿相國王公縉統河南奏公為副元帥判官未幾除祕書少監兼滁州刺史本州團練使居八載政績大成大厯十三一作二年二月十五日薨于揚州權窆于某所享年七十有八公凡七佐軍四領郡俸不積滯衣食無常主常嘆曰以飽暖活孀幼以清白貽子孫是吾心也逮啓手足卒如其志先是太夫人嘗寢疾公衣不解帶髮不櫛者彌年侍疾執喪憂毁過禮公尤善五言詩與王昌齡王渙之崔輔國輩聫唱迭和名動一時迄一作逮今著樂府詞播人口者非一晚賦思舊遊詩百三十篇亦傳於代前夫人清河崔氏贈清河郡太君後夫人博陵崔氏贈博陵郡君生子七人長子雲逵有才名至刑部侍郎京兆尹公由京兆纍贈官至散騎常侍刑部尚書次子徴終潤州司馬次子公達一作逵有至行初以公年髙不就仕及居憂廬墓泣血三年淮南節度使本道黜陟使洎朝賢袁髙恭等纍以孝弟稱薦嚮名教者慕之今為侍御史上柱國滄景節度參謀次子方達衡州司士參軍次子震陽二字集作農當塗集作當陽縣丞次子震弼集作文弼幽州參軍公自捐館殆逾三紀家國多故未克及葬至元和五年移集作始遷于鄭州新鄉縣某原祔先祕書塋二夫人從焉時京兆已即世諸弟在下位獨侍御史銜恤考集作襄事考備終始見託追撰銘于墓石銘曰世祿德門斯之謂可久懿文茂績斯之謂不朽二千石之祿七十八之年斯之謂貴夀內史之顯揚柱史之孝行斯之謂有後嗚呼鄭公榮如是哀如是又何不足之有歙州刺史邢君墓志銘杜牧亡友邢渙思諱羣牧大和初舉進士第於東都一面渙思私自約曰邢君可友後六年牧於宣州事吏部沈公渙思於京口事王并州俱為幕府吏二府相去三百里日夕聞渙思佽助并州巨細合宜後一年牧奉沈公命北渡揚州聘丞相牛公往來留京口并州峭重入幕多賢士京口繁要遊客所聚易生譏議并州行事有不合理言者不入渙思必能奪之同舍以為智不以為顓并州以為賢不以為僣侵遊客賢不肖不能私諭議集作譏以一詞公事宴歡渙思口未言足未至缺若不圓牧曰往年私約邢君可友今真可友也盧丞相商鎮京口渙思復以大理評事應府命今吏部侍郎孔溫業自中書舍人以重名為御史中丞牧以補闕為賀客孔吏部曰中丞得以御史為重輕補闕宜以所知相告牧以渙思言中丞曰我不素知願聞其為人牧具以京口所見對後旬日詔以為監察御史會昌五年渙思由户部員外郎出為處州時牧守黃州嵗滿轉池州與京師人事離濶四五年矣聞渙思出大喜曰渙思果不容於會昌中不辱吾御史舉矣渙思罷處州授歙州牧自池轉陸歙州相去直西東二百里問來人曰邢君何以為治曰急於束縳黠吏冗事弊政不以久逺必務盡根本牧曰邢君去縉雲日稚老泣送於路用此術也復問間日何為曰時飲酒髙歌極歡牧曰邢君不喜酒今時飲酒且歌是以不用繫集作繁慮而不快於守郡也復問曰日飲幾何曰嗜彘肉日再食牧凡三致専書曰本草言是肉能閉血脈弱筋骨壯風氣嗜之者必病風數月渙思正握管兩手反去背仆于地竟日乃識人果以風疾發舟東下次于睦兩扶相見言澀不能拜語及家事曰為官俸錢事骨肉親友緣集作隨手皆盡蓋壯未期病病未期死今病必死未死得生至洛幸矣妻兒不能知矣君進士及第歷官九歷職八始太子校書郎協律郎大理評事監察御史京兆府司録殿中侍御史户部員外郎處州刺史歙州刺史職為浙西團練巡官觀察推官度支巡官再為浙西觀察推官轉支使為户部員外郎判度支案代劉稹為制使使鎮魏科集作料軍食賜緋服銀章初副李丞相回再副髙尚書銖撫安上黨三面征帥大中三年六月八日卒於東都思恭里年五十邢氏周公次子靖淵封為邢侯國滅因以為氏西漢宇為太尉子綏為司空曽孫也世宗光武時為驃騎將軍世宗玄孫顒因居河間當曹魏時參太祖丞相事終於大常邢有河間南陽君實河間人太常後也後至晉魏已降皆有官祿唐麟臺郎仲集作中舉於君為曽祖麟臺生奉天令待封奉天生緱氏丞至和君即緱氏子兩娶前夫人隴西李氏忠州刺史佐次女今夫人南陽張氏夀州刺史植女四男曰懌愔集作惜溫郎夀郎用某年某月某日葬于偃師縣某鄉某里某原葬有月日其孤立使者哭告于柩來京師請銘銘曰十五知書二十有文三十登進士五十登刺史才能溫良并包與之而止於斯七政在天一回一旋差以氂數能窮如集作知賢賢者多夭不肖夀考誰為聖魁孔不能究無可奈何付之以命曰如命何處州刺史李君墓志銘前人君諱方元字景業刑部尚書贈司空貞公長子也貞公事憲宗皇帝兄弟受寄西集作四鎮在漢南時戰淮西未利監軍使崔談峻讒言中入為太子賔客後淮西平李光顔移鄭滑陳許無帥帝間宴獨言曰徑兵三千集作萬誰可付者談峻侍則曰有大臣家不三十口俸錢委庫不取小僮跣足市薪此可乎帝曰誰為者談峻進則集作即以貞公言帝即日起貞公為陳許帥其儉德服人如此景業少有文學年二十四一貢進士舉以上第升名解褐裴晉公奏以祕書省校書郎校集賢殿祕書聰眀才敏老成人爭與之交後以協律郎為江西觀察支使裴誼觀察判官有殺人獄法曹官煆集作斷成當死者十二人景業訊覆數日內活十二人寃人集無人字尚書以上下考奏裴公移宣城授大理評事團練判官後尚書馮公宿自兵部侍郎節鎮東川以監察御史集無此二字裏行為觀察判官不以嵗御史府取為真御史分察鹽池左藏吏盜隱官錢數十二字集作千萬獄竟遷左補闕遇事必言不知其他丞相固言以門下侍郎出鎮西蜀奏景業以檢校禮部員外郎參節度軍謀事仍賜緋魚袋徴拜起居郎出為池州刺史始至創造籍簿民被徭役者科品髙下鱗次比比一在我手至當役役之其未及者吏不得弄景業賞集作嘗歎曰沈約身年八十手寫簿書蓋為此也使天下知造籍役民民庶少活復定户稅得與豪猾沉浮者凡七千户衮入貧弱不加其賦堤州南五里以涉為衢凡裁減蠧民者十餘事城東南隅樹九峯樓見數千里鑿齊山北面得洞穴怪石不可名狀刋石於嵓下自紀其事凡四年政之利病無不為而去之罷去上道老民攀哭景業季父刑部侍郎建與貞公以德行文學俱髙一時時之秀雋半歸李氏門下景業復聰眀少鋭儉苦溫謹早與長者遊備知天下之所治嘗慷慨有意於經綸少在諸侯府入為朝官出為刺史蚤夜勤苦為學不已屈指計量必伸已志雖時之名士亦以此許之罷池廉使韋公溫館于宣城會易四集作五年四月某日卒于宣城客舍年四十七集作三七代祖逺後周柱國大將軍都督雄集作熊陜十六州陽平郡公曽王父珍玉綿州昌眀令昌眀生震集作此字雅州别駕贈左集作右僕射生貞公遜先夫人滎陽鄭氏贈本縣太君後夫人范陽盧氏男若干女若干人銘曰顯莫識其端幽莫見其緒已乎景業何付與之多而奪之何遽夭顔病冉孔子不知其故於景業兮杳欲何語嗚呼哀哉文苑英華卷九百五十四
