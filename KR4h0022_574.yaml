body:
  text: 文苑英華卷五百七十五宋李昉等編宰相讓官四讓中書侍郎表一首代史館相公讓官表六首為王相公讓加司空表一首為徐相公讓加食邑表一首為中書崔相公讓官表五首代史館王相公讓相位表二首讓中書侍郎表令狐楚臣某言臣聞斗筲之器不可持盈腹背之毛安能翔遠是以知進忘退易象之深戒在寵若驚道家之切訓此微臣所以皇皇然久積肝血銜恩陳露而未得者也中謝臣代業儒素心遊文史雖自勵已豈敢發身始望之官止於中臺郎吏外郡牧守而已幸而因緣昌運遭遇盛時振拔羣倫驟登台衮伏惟皇帝陛下欽明御厯睿哲配天華夏宅心俊賢翹首方當選衆固合退身豈意遷於皇閣之崇參以紫微之重特出睿旨不因人言九重所知萬殞何答誠宜建用皇極保合太和𢎞聖功於堯舜之時追恪德於夔龍之列而和羮乏用覆餗為憂空有仰於清光實無裨於𤣥化一自叨竊遽經炎凉局影兢魂痛心疾首伏乞鑒其悃欵察其疾羸賜以冗員置於散地溥求俊傑委屬鈞衡則大君知人之明永光於典策微臣妨賢之責將息於輿言一作廟朝天下幸甚微臣幸甚不勝感恩屏營之至代史館相公讓官第一表錢珝臣某言伏奉今月十三日制命授臣某階某官仍加食邑一千户今日獲於延英親承聖造瀝懇陳讓未賜允從臣某誠感誠憂頓首頓首臣聞衽席之上讓而坐下人猶犯齒朝廷之位讓而就賤人猶犯貴人情之間讓猶如此况其不讓無犯則難而復台輔至崇鈞軸至重頃年陛下擢臣秉政莫獲固辭已乖戾於當時敢因循於今日伏惟尊號皇帝陛下於君臣之際今古所希有善必知有過必掩使之夾輔恐不光昭故重器崇名焜耀而常思假寵進言一作良論道周旋而盡鑒推誠上感天心臣非木偶今之讓爵蓋懼生災猶慮天下之人將有所犯敢於翰墨略布肺肝且陛下示以殊恩增其貴秩當庶事苟同未稱在衆心必以為非旒扆寓臨宗祐權設有兵革未能載戢有法制未盡公行凡此憂虞不遑寤寐茲以受命可謂稱乎聖澤才流謗言亦至縱朝行為臣箝結顧寰海必自沸騰則上有私於輔佐之間而臣闕啓災咎之本繇一作緣是終始揣度進退驚疑以此拜章實期得請陛下加臣以渥澤不若使臣合物情寵一作措臣以光華不若遣臣免災咎儻人言不息天咎必來焉得自隱自欺不披不露懇悃伏惟洞開睿鑒俯循愚衷且遣粗安更容陳力廣至明之德罷已降之書昭示四方用新聖政臣某無任感激惶懼屏營之至第二表臣某言伏奉今月某日批詔具承聖旨臣昨者固辭寵休有異常等然始以謙讓為說終以災咎自陳未能便動天心上回睿渥復傾肝血進拜封章直舉其言冀蒙昭允臣某誠迫誠懼伏惟陛下寬明有制聰哲成文揚憲祖宣祖之風冀元和大中之運故欲治而尚亂欲泰而未安潛測聖懷常縈百慮臣為宰輔得不周知且自去秋以來國步未復臣每思人事每揣人情內激肺腸有如湯火陛下當食不美當寐不甘欲以攻苦食淡之心抱公滅私之道致陛下之理釋陛下之憂然而再秉機權未能致此者蓋臣去已之事尚有因循防患之謀率多容易若臣去已必决防患必專天下之憂庶幾稍改而祿位輕授之弊近歲愈深上自侯王下至卒伍受爵賞者所承不重荷恩澤者所感不深蓋緣族類之間踰謬者衆不重則無以勸其戮力不深則何以激其盡心因之且不禀朝廷不畏法度不禀必亂不畏必危本末之間實出於此今臣貴為四輔重有萬幾階秩就加朝廷常典又何必齷齪謙讓而違君命也但欲審度去就明辨否臧以臣去已决烈之心拒天下越等干求之患使爵賞不濫與一作及恩澤不妄加則承之者必重感之者必深如此自凛朝廷自畏法度有患可弭有難可平此事非所難為祗在陛下明察倘或信其誠請遂寢新恩則君臣之志氣大同理道之根源必正若陛下不顧其說在臣亦欲何為但抱憂惶難居夾輔有渝斯語是謂明欺君道始終聖情深淺祗期遂志不敢匿情再黷冕旒若臨泉谷臣某無任迫切惶恐俟命允許之至第三表臣某言臣昨者再獻封章實披肝膽而詔書批諭德澤滋深有志未從有言未納雖屬沍寒之候不勝流汗之憂臣某誠悸誠惕臣聞帝王以國事之重倚於輔相者既觀舉直之誠必責理平之效故責之必信信之必終然則歷覽古今此乃明君遇賢臣之事今陛下明德非臣獨知臣之非賢人共知耳而待罪之位非次久居陛下知臣之心處臣之地每升便殿常認聖慈謂臣輸寫甚忠舉措多直每忝大政皆聽淺謀有間之言無從而入至如一昨忽構羣邪奏密而左右不知禍巨而本根已固雖傾陷盡闕一作關於大事而譖傷先在於微臣陛下知臣素無他腸知彼但肆讒口聰明一寤擊斷不疑否則臣永抱幽寃已當誅殛棄逐奸臣之日忽降渥恩蓋欲使中外之人明知遇臣益厚以茲銜謝詎並尋常則臣自此事君自此執政每圖報效且合何如所以固讓重恩深申血懇昨者所陳章表始末以去已為言蓋欲以人情所難為臣願為之於今日陛下所賜之異寵臣願却之於此時將使萬邦盡驚致理因茲約束冀漸和平若臣冒寵不辭何術可制天下至大至切不得不然今陛下未察愚衷頃疑作頻加聖澤與向來知臣之旨昨者保臣之心顯有不同臣將何託前所謂齷齪謙讓臣實不為伏望陛下以所奏之書靜賜睿覽察其陳讓之懇匪以沽激為名利於國家不避震怒倘陛下將期復國别欲任賢奪臣迫切之心以示棄絶之旨則當避賢而退不敢更煩聖聰竊期此言得遂堅請臣某無任拜首瞻天瀝血隕涕懇激倣徨之至第四表臣某言今月十八日延英敷奏親獲固讓官榮徒荷皇私未從丹悃今日又聞芝檢復閲綸言莫聽鋪陳尚令祗受臣某誠懼誠迫臣聞高下相遠者天地也而天地之氣必通所以四時周旋萬物生育尊卑相懸者君臣也而君臣之道必合所以統理諸華肅齊庶政天地不通則萬物夭君臣不合則庶政乖今臣讓爵推誠極言防患拜章纍日答詔三臨聖鑒未回愚衷無感耻君道之難合懼庶政之特乖內負沉憂若罹昭憲是以泣邀神助往覺魂飛伏念此心匪緣他事推誠為國防患為君恭惟睿慈寧忍不察且朝廷之勢不强於藩方輔相之權見侵於將帥隳毁我法制殘虐我生靈臣常結憤於胸中陛下亦興歎於南靣固欲乘機革弊因事抑强二者之能不假奇術但所行必正所作無私祗於賞罰之間必與物情相順陛下申命宰臣奉之聾聵皆披頑嚚可化而將帥見侵之患日息則朝廷不强之勢日興罔害政理之大經罔纍聖明之全德將使國平時泰不慮不憂陛下若棄此不從是怠於中興之志矣臣之痛惜如割肌膚心腹腎腸傾寫罄竭臣血可嘔臣軀可糜已决之心則不可奪臣某叩頭屈膝無任涕流泣血精爽隕越之至第五表臣某言臣今月某日延英靣獲陳讓後復拜封章詔諭又臨懇激未遂臣某誠兢誠栗頓首頓首臣聞琴瑟有不調者尚或改而張之辨士之言良史必記朝廷命官之典故大於琴瑟之弦公輔求理之謀亦重於辨士之說况所命者宰相崇高之秩所謀者邦國臨制之機而臣等堅辭必防他患陛下固奪將啓後艱他患若生後艱何救且臣伏思陸贄以忠信事德宗皇帝建中初方為侍從之臣事繫安危言皆激切有不納者必能力爭當彼冦難之時德宗欲加尊號訪於陸贄遂獻忠言以為大憝猶存中區多梗是天意去就之際人情向背之秋若使重益美名必纍中興之業德宗英寤遂納忠言當時轉禍之期實若走丸之速然則以近臣直道奪聖主鴻名有犯之言莫甚於此今臣讓官辭爵與彼輕重不同而於危難之中陳匡救之力愛君為國心則無殊昔者德宗再閲披陳具明損益今臣四上直疏陛下未察愚誠是何恩澤之深全惑是非之理感泣慙懼知臣者天然陛下處多難之時欲繼德祖之美彼則深思利害聽一學士之苦言今則可見否臧阻三宰臣之固請臣是以極疑此事是皇天誡陛下之心皇天無親惟德是輔今若尚令批諭抑與寵私則臣恥陛下不如德宗臣亦自恥不如陸贄臣自知其恥天下得不其然積恥成憂積憂生疾心神錯亂舉措顛危祗於旬時必當覆餗便須永棄不見中興以是而思生不如死臣言至此臣意可憐唯在聖明速賜聽允臣某無任俯伏嗚咽以身候命之至第六表臣某言同心同德是為亂臣五獻封章繼陳懇悃復升便殿纍貢切言天高而曾不少聞日近而未嘗俯照臣某誠憂誠迫頓首頓首臣聞詩云受爵不讓至於已斯亡仲尼刪詩此言不去則古之為君者非憎其臣而欲以爵亡之也蓋勸忠勞昭典冊無以加於爵位也古之為臣者非惡其爵而欲讓之也蓋定是非畏盈滿無以加於謙讓也得受爵之宜無不存也失讓爵之宜無不亡也古人所謂亡者彼亦不過其身既而有益於君亡亦可也苟或亡身敗國無益於君致亂階於一時流惡名於千載今臣之不讓是長亂階且陛下觀天下之事理乎觀宰臣之心忠乎若天下已理宰臣不忠陛下迫以爵位致其危亡臣則瞑目而歸何害於國若天下未理宰臣則忠陛下不聽苦言但加重爵臣則碎首而退何利於國臣實不畏其亡但當未理之時不可更長亂階也所謂未理則非聖德有所不能蓋天下承弊日深諸侯不順其理故臣欲以今日之讓制天下承弊之風而正其不順也不革承弊不正不順而望萬人再安四方無事者是抱薪救火其可撲滅乎言出臣口事痛臣心假使嚴旨復臨臣則終讓而已奚自拜疏却類叩閽臣某無任流涕哽切進退屏營之至為王相公讓加司空表臣某言伏奉今月某日恩制特受某官者三公之選八命而居前古以來無人則闕仍開大國兼進崇階言渥恩則深若紫泉顧名器則重侔泰嶽揣分一作揣循非次恐悸難安臣某誠惶誠恐頓首頓首臣忝列公台忽踰半紀事乖允當識昧便宜何施作相之材但纍知臣之道頃因出狩自合乞骸未臨復國之期敢有逃天之意而君能得一日且再中空知陪扈之勞獲覩清夷之慶伏自去歲至于今春每懷失職之憂繼瀝避賢之懇愚衷無感睿鑒莫回徒齷齪以受譏但因循而竊位何言霈澤又降重霄實慙夢賫之人安稱坐論之地捫心自省沾背不遑雖陛下修道側身發言罪已可卜運興之兆將承天賜之休然則劔㦸未銷江關或阻猶煩聖慮且乏嘉謀敢於此時輒荷極寵上祈𤣥造俯信赤心行之則明主有私罷之則微臣無咎推諸至理是以固辭蓋欲保全實非飾詐冀蒙矜鑒特賜允從冒黷冕旒臣無任兢感戰越之至為徐相公讓加食邑表闕名臣某言伏奉今月某日恩制加臣食邑一千户實封一百户臣某伏惟尊號皇帝陛下文武應天憂勤厚國旁求翊贊慎擇能賢如臣之才焉可執政徒以其濫承台蔭擢處鼎司屢改流年多隳彛憲莫獲乞骸之便空懷沾背之羞頃屬陛下尚駐乘輿且臨關輔都人久散廟貌未嚴顧居守之重難注宸衷而任使聖言親降霈澤遽行拜官仍忝於緇衣備位不離於黃閣寵靈則固兢栗載深蓋以乍違天顔初達帝里雖南山渭水變王氣以潛新而荒草壞垣動秋風而尚慘連甍何有編户猶稀臣當此時莫知所措實賴祖宗垂祐睿哲申謀兼委近藩旁分庶事免微臣之獲戾濟重務以有成遂致五輅鳴鑾六師被甲陳吉行之盛禮正法座於良辰誕告四方復興景運御日月而無違素志嚮丘園而已動歸心遽謂聖慈忽加𤣥造尚責佐王之效重增開國之封仍容素餐兼賜奠食祇承異數徒冒優恩已虞招損之譏敢竊好謙之美况佳兵未息公聚多虛詎宜特命輔臣更加井賦事非允當言必喧傳伏唯曲鑒愚誠便回厚渥冀絶謗論且顯聰明臣某無任荷聖感恩瀝懇待命激切屏營之至為中書崔相公讓官第二表錢珝臣某言今月某日伏奉批詔以臣陳讓寵光未賜允許揣分而省躬知懼感恩而鏤骨徒深臣某誠憂誠激頓首頓首伏念臣之事君也輸忠竭力以從政君之使臣也增爵進秩以報勞勞既未申寵至必讓凡於庶事皆在適時當其時不得不行非其時不得不止今臣承命可謂非時且思加獻鴻名是為常典而去歲之首羣臣數四拜章願增神武之名用稱欽明之德而陛下永惟大體堅奪衆心蓋以反正之初艱難未濟仰惟睿旨非獨謙光欲廣嘉猷深知不可陛下之志既定臣子安敢復言亦以非時罷茲盛典今臣之愚懇竊合聖謨去春方在京師尚隳此事比者猶當巡幸固不可為內度宸衷必開𢎞鑒遂敢再披肝膽實期便輟渥恩請候鑾輅歸還干戈弭息却施綸綍俾合憲章今日皇私則難濫受可行可止事理甚明伏冀睿慈更收霈澤再冒旒扆臣某無任兢悸迫切之至第三表臣某言臣昨以寵光踰濫循省兢憂兼懼用典非時有纍日新之德再傾肝血實冀允從而天鑒未開愚誠愈迫臣某誠惶誠激頓首頓首伏以陛下濬哲自天憂勤為國感屯蒙之未泰先昧爽以有臨臣每奉清光備承睿旨無言不盡無理不思决去邪懲惡之謀若反掌轉圜之速况察忠仗信據禮任材誣譖者徒欲橫侵傾危者皆令立定茲所謂疏通知遠淵靜有謀闢四門明四目者也臣不知昔之令主何以加於陛下之道乎然睿哲憂勤昭彰如此今宰臣以非時之命有所堅辭蓋欲朝廷行事得宜天下物情共洽則臣可以制天下非宜之請廣朝廷致理之端用贊中興以新庶政詎獨務為飾讓而進犯宸嚴且濬哲則何嚮不通憂勤則何思不至既通既至必察必知臣之所陳實欲利國神明所聽毫髮敢欺况有常情亦難自匿臣雖乏出羣之智才踰强仕之年幸偶文明方圖富貴苟或拜恩可稱荷祿不慙則何必固小節以鳴謙干大君而違命跪承批詔退揣事機讓之則所益必多受之則所損非細仍念王摶崔𦙍以懇激拜章并臣披露之辭略盡否臧之說雖煩聖覽當察羣心得不遂有改張遽收渥澤斯為從善實可經邦且凡受寵休有所退避或名聲不稱或遭遇非才小則恥識者談笑之端大則憂賢人譏責之罪今臣於談笑譏責亦不敢以君恩避之實欲制天下之非宜廣朝廷之政理用光興復永濟艱難仰望聖慈臣某無任寤寐齊禱激切之至第四表臣某言伏奉今月某日批詔以臣堅讓寵章未賜允許者憂誠若焚駭汗如雨發於肝膈鑒在神祇臣某誠恐誠迫頓首頓首臣聞以欲從人則可以人從欲鮮濟此蓋左丘明之信史臧文仲之至言陛下多閲正經以資明德固於深旨靡不盡知然而陛下優遇台臣恢張天覆賜爵而唯恐不重流澤而唯恐不深茂典畢申睿慈未足此蓋陛下以無私之欲勸有位之臣使其更竭謀猷以濟難否是陛下之欲也臣匪不知臣所以斯須不寧數固而讓者蓋緣陛下在省方之地有國未歸微臣忝執政之權遇昧未泰謂為輔弼實抱憂慙刻苦厲精進賢讓寵所期天下之士且不加罪於臣既安其心庶竭其力此臣之欲也陛下之欲不過勉勞臣等三人納善罷之小無所損微臣之欲使昭示天下之人聽而俞之大有所利利在邦國皎然可知陛下若以欲從臣理無不可若以臣從欲鮮濟不疑雖又新奉聖慈未容陳讓在臣丹赤誓不禀遵其於利害之言辨析將盡實以多為緣飾亦不敢更黷英明進思之心死請而已臣某無任懇激兢越之至第五表臣某言臣事君未盡舉職無聞瀝血懇而黊纊不聽降皇使而紫泥適至臣某誠惶誠懼頓首頓首臣聞啓乃心沃朕心哲王所以倚輔相而成理道也然則觀便宜陳訏謨務匡救而由諌諍不可必奪可者必行竭力盡忠是為啓沃苟無啓沃何用弼諧伏以陛下自周歲以來出居未復南嚮而坐聖慮日深思頃來及霤之言還天下投荒之土潛心有感逆耳多容今大駕方欲還京宰臣非時進秩上虧聖政旁啓貪謀宇內幸門因茲大啓竊念久隳法制何堪更自破除倘陛下固行寵光乃是姑息之旨信任則疏四海得以酌量萬事更當奸弊且臣罔受爵祿惟惜政經盡理極詞未蒙聖鑒則是陛下棄啓沃而任獨見絶諫諍而惡正言自此朝廷却成壅蔽凡關得失凡有是非徒欲抗論必無允納則不知天下之事自此如何近歲宰執加恩不過再陳謙讓至于今日莫並前時朝省夕思可畏可懼蓋二年之內六馬再奔若使理道昭彰奸凶凛畏何由致此安得不憂聖聽雖煩朝綱必振良圖甚大至化斯明若以干犯未休震怒不捨即臣直視鼎鑊如對軒裳蓋有氣經邦有心事主死而無悔言實可悲唯恐但留名聲不足弭其憂患更無多語祗欲長號臣某無任披膽隳肝請罪之至第六表臣某言某五奉批詔尚未允臣所讓官階爵邑者伏以將相大臣凡被恩命有所辭讓不過再三安則禀而受之不安者亦許其讓今臣已倍再三之數情固有所不安聖鑒未開憂心如醉臣某誠恐誠迫頓首頓首臣聞杜恕魏之名臣也常以立心行事若非明達君子見諒本心不然則刳心示人與臣何異臣雖不侔常歎其言知信人難古昔如是然杜恕於族類之內尚興此言今臣幸以遭逢重為宰執雖論才較智莫稱陶鈞而秉直輸忠敢欺神聖拜章之請擇利經邦况奉天顔盡披血懇誓然疑作言莫信死請莫從則臣刳心於丹扆之前陛下亦當未察兢憂慙歎無地可逃今辭理已殫懇激愈甚蓋臣於不安之事終無受寵之期苟或譴怒下臨臣則伏罪而去干犯宸嚴臣某無任隕涕流汗惶越之至代史館王相公讓相位第一表臣某言臣聞君人之私在始終而必遂人臣之分於進退以自圖嘗觀古今莫不如此臣謬從先訓本涉儒流傳之者猶有琴書教之者令歸忠孝臣之不佞頗墜所承唯於忠孝之心實畏神明之責䇿名游宦止望周行偶聖立身俄塵大任材同常士寵過素期雖欲遠慕前修旁探令典窺其事業勵此顓蒙副明主之憂勤避衆人之指笑而所務者生靈富壽每痛凋刻所制者兵革弭寧尚聞侵伐報然備位何以事君不唯久合避賢固亦尋宜獲罪偷安四輔忽已六年假名器而則崇執機權而益拙循省是懼斯須不遑然臣於六年之中未忍為一朝之計者蓋以陛下信其愚直如見肺肝資以弼諧終無疑間事不幸者必䝉曲恕心不欺者則荷明知忝異禽魚感深骨髓强陳蹇力用答聖慈今則曠敗漸多智謀將竭不能引退定至顛危况陛下光復京師已逾周歲臣之去就亦謂得宜竊見嶺南節度使薛王知柔近有封章懇求替罷是以臣今日敢於便殿直冒宸嚴乞免鈞衡得分節制赤誠盡寫天眷莫回既集兢憂彌增激切伏念臣之心力則未甚衰嘗學政經因參戎事尚可遠臨海服具舉化條每推糾率之勤兼濟邦家之用謹亷無犯攻苦不私微臣所能庶幾有效實非飾詐輒罔睿明隳膽獻書期於聽允登壇受命皆是寵光遂之則臣必有為奪之則臣將不逮上惟君命乃獲始終且使臣又全進退自昭聖德未爽舊章仰望鴻恩臣某無任迫切悸恐之至第二表臣某言去冬以持衡力竭待罪年深曾披肺肝乞免機務兼遇嶺南節度使知柔上書求代臣遂仰告聖慈願守遠藩别立微效陛下未容休罷尚委弼諧旋命貴臣密宣睿旨臣之去就詎合固違焉敢復拜封章是以苟安廊廟又移歲序何補國家臣頃者瀝懇之時陛下亦降許臣之旨欲俟他日知柔再有陳情則於此時允臣所請邇來備位不敢更言上荷皇私且䇿駑蹇今知柔又貢章表辭甚激切宗枝將帥事體可從亦繫機宜便合制置速擇交代免失一方倘陛下念知柔陳乞之私察臣披露之懇使之仗鉞委以藩條必能撫諭島夷董集征賦旁資國用粗慰聖心躬親則可以便人亷謹則不令生事擇利而斷全在宸衷當邦家匱乏之時敢違輸貢兵革交侵之際幸保土疆臣與知柔各獲其所伏惟尊號皇帝陛下恭默守位明哲臨人每務永圖以揚丕烈克全君體尤重大臣苟非輔相之間誰能盡窺聖德臣之遭遇獨異等倫臨事出言未嘗不信輸忠抱直無所不知七年以來萬幾實重仍逢多難唯任至愚若非聖明尋合顛敗由兹感激更竭筋骸近者自量力實不逮今所陳乞未曰退休荷寵出藩臨戎報國誓秉始終之節兼推糾率之心直寫赤誠冀開𤣥鑒今日延英殿已具奏聞未蒙聽允輒陳箋翰更冒宸嚴臣某無任祈恩待命迫切兢悸之至文苑英華卷五百七十五
