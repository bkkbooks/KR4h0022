body:
  text: 文苑英華卷六百十六宋李昉等編邉防三屯田倉牧附論西川討賊表一首論討西戎表一首代裴度論淮西事冝表一首代韓僕射諫伐淮西表一首代王僕射諫伐淮西表一首代淄青諌伐淮西表一首宰相諫罷討伐請不幸奉天表一首請置屯田表一首論廢楚州營田表一首請修義倉表一首論萊州置監牧及和市牛羊奴婢表一首論西川討賊表憲宗元稹元和初臣某言伏見賊闢有不庭之罪陛下尚覆露以待之此誠陛下罪已泣辜之仁也微臣又何足以識之哉然臣聞之天之所以為天者以其能化物也物之性不一故天之道有和煦震曜之異焉始其生也董集作動之於集作以非幽伏被之以春陽扇之以仁風潤之以膏雨則百果草木之柔者順者油然而生矣及夫勾曲角觡堅本頑心凝者滯者幽者蟄者扇之以和煦而不出潤之以膏雨而不滋則必迅之以雷霆曜之以威赫然後頑滯之心改幽蟄之氣宣豈天之道仁於彼而厲於此乎化與不化之異也是以蚩尤之作亂黃帝鑄五兵以殺絶之共工之行惡虞舜揭五刑以放死之豈不欲夢華胥舞干羽而躋之於仁壽哉蓋不可化也及夫舞干而適至因壘而來歸此又物之可化者也豈黃帝虞舜文王之德有優劣哉蓋蚩尤共工與苖人崇人之罪有深淺也今陛下法天之德與物為春凡在生成孰不柔茂而蕞爾微醜天將棄之置蟊賊於其心假螻蟻以為聚忠臣孝子思得食其肉而快其心久矣陛下猶聳之以名爵導之以訓誥崇之以寵章而不至假之以旌鉞而益驕戕賊我忠貞損汚我仁義人人不勝其憤有司不忍其威是以違陛下匿瑕含垢之仁順皇天震曜殺戮之罪集作用此誠天下人人快憤激忠之日也陛下猶思因壘以降之舞干以化之善則善矣其如天下之憤何其如天下之憤何臣願陛下可有司之奏法皇天之威與公卿大臣議斬叛弔人之師以快天下人人之憤天下幸甚微臣無任懇悃嫉惡之至謹詣東上閣門奉表以聞論討西戎表前人臣某言臣某月日蒙恩顧問竊見陛下患戎之意深矣自貞元已來國家所以甘億兆之費於塞下蓋以犬戎有侵軼之患而邉人思守禦之利也然而河湟之地日削田萊之業日空塞下之人日亡戎狄之心日熾若此無集作非他不得備戎集作之之術也且臣聞之君之命帥帥之命將將之使卒猶心之使臂臂之使指然後敵可擒而軍可制也今之屯戍者則不然衆其城堡異其師長獲一馬則圖功虜一戎則告捷至於屠縣道掠方人則曰使之集無此二字力弱不足以應敵援寡不足以摧凶茍謹閉繕完不失其守者則朝廷議賜集作賞之不給又孰肯摧鋒刃冒殊死而出入於係虜哉此又非他衆分力散而責帥之刑無所加也而又加之以為農者不教戰屯聚者不兼農冦至則卒伍被甲而乘城野人空拳以應敵此又耕種之術不修而屯聚之兵集作方太逸也今夫邠岐汧隴之地皆后稷公劉之所理也土冝植物人務稼穡陛下誠能使本道節制廣於荒隙大建屯田塞下諸軍除使令防守之外一切出之於野限之名田復其租入然後因其阡陌制之閭井由集作因其卒伍樹之師長固其塍塹以備不虞犬戎適至則有連阡接畛之兵戎騎才歸則復耰鋤穫耨之事若此則曩時之聚食者盡歸為服勤之農矣前此之係虜者盡化為守禦之兵矣不三五年間塞下有相因之粟邉人無侵軼之虞陛下又董之以良帥威之以必刑則彼瑣瑣之戎陛下將署其君長征其牛羊奴虜以擒之可也螻蟻以攘之可也又何必詢王恢使蘇武用朝錯訪婁敬而後復河湟稱即敘哉此禦集作備戎之大略也方今猶有急於此者臣敢冒昧殊死而言之臣聞善奕棊者將劫其棊必固其羸是以敵可殺而地不危今庸蜀有犬吠之驚南蠻無貢賦集作絶貢誠之路陛下又輟邉將以統問罪之師脫或蜂蠆相守尚稽天討兵連不解綿夏涉秋則犬戎乘釁啓心之日也陛下其圖之愚臣無任懇欵憂惶之至謹詣東上閣門奉表以聞代裴度論淮西事冝表韋嗣立臣某言臣伏以方嶽之任職主分憂茍事涉安危利深社稷詞得専逹臣敢備言是用輕冒上聞伏惟少紓僅踰數月朝廷未議所伐臣恐日長姦謀彼將膠固士心必希徼幸啖利滋蔓事則難圖當其人情尚搖足以觀釁臣自聞少陽權主留務衆未甚寧昨知少誠之子誘扇其軍又以誅戮天其或者勦絶姦類大振皇綱陛下得不上順天心乘時廢置而又謀之遲久臣竊為陛下惜之何則夫以少誠怙兵偷安二十餘載恩惠自己人知素懷衆之所懷必厚其一無此字子弟其勢以分臣度具聞不與者半所以人心持兩至有動搖以斯觀之或未盡附少陽又以新殺其子必有疑衆之心今若及未寧出於不意擇四方節制之臣可為其帥者使馳而入之移少陽於他鎮以待之彼得一作被待得所安必效順承而無固衆之志則其黨自離心矣因其所離而制其命何求而不克哉易所謂見幾而作不俟終日然以方布大信不冝隱情若先命中貴他日奉明詔將告易位以誠諭之從而後行事可以濟臣乂度當今節制可以處淮西任者莫若河中節度使王鍔寬厚慎重練識軍情必能恱慰羣心鎮撫疑黨若將移鍔於淮西而俾一無俾字與少陽不逺矣朝廷立一無此字遷授之權而內足以除姦蠧之本使少陽感恩以效命王鍔推誠以蒞衆是淮西絶繼代之業朝廷存𢎞貸之德亦將以息河北狐鼠之勢示去逆效順之利自然風靡以承化從此不希於茍得矣斯事體大伏惟陛下行之議者以為少陽兵戎賊臣曽居叛黨若將易處於關輔之地寵任以兵戎之權何異夫朝四暮三而終不離其數是不然也夫根深者難拔源長者難絶彼盤結衆根其人久矣我能絶之使安植施於他以變其所庸非至計乎且事不先漸化之道而欲頓歸於大政亦難矣方今征承宗以名聞於天下者豈不恃衆違命邀爵乎若使少陽復而行之則其罪均矣不可獨赦則必分師以討之當淮楚災旱之餘征賦耗竭之日是使蒼生興流亡之歎甲兵無暫息之時上以傷陛下子育之心下以竭邦賦資用之費得不審慎其舉而保其成算哉伏以國家艱難已來河北戎臣竊據州郡父殁子代兄終弟及皆朝廷稽緩其事不時即謀使生人之心率以沿習為患久矣陛下神略獨斷超冠百王事當其機冝以時革臣不勝誠懇悃欵之至代韓僕射諫伐淮西表張述臣某言某月日中使某至伏奉手詔兼宣聖旨以淮西事體令臣謬竊藩隅每慙叨忝職惟承命恩深隕越一作恩不越人陛下特迂宸聰議及凡品纍從聽之德慙啓聖之才感恩徘徊難酬寵遇敢不罄陳愚瞽竊備篘蕘伏以少陽男元濟不取聖裁擅理戎務國有常典罪必當誅或恐淮西一使曽經反側衆情所裁覬自偷安元濟此時求免無路陛下式遏為心死冦一無此二字固合深除剪滅猥蒙詢訪無有冦能不死勢必萬全天討淹留衆心前却則干戈難弭殺戮滋深陛下愛人之心異殷湯釋網之意伏願與輔弼信臣朝廷碩德平章利害以取厥中使兆庶安生四方蒙福實天下幸甚豈惟臣一方臣所部兵馬排比有序但思報國恭候指揮伏惟賜鑒微詞俯察愚懇輕陳睿烈慚懼伏深云云代王僕射諫伐淮西表王計臣某言中使至奉詔兼宣口敕以彰義軍節度使吳少陽不起所疾奄謝明時聖情追念藩臣良深軫悼少陽男元濟不待朝旨自領軍戎陛下尚念舊勳特頒詔命冀其追悔未即加兵以臣謬列方隅俯賜宣示絲綸逺降天使荐臨祗奉睿謀仰荷玄澤亮臣微賤素無識知猥蒙恩私訪以去就其於利害臣所難言以臣旋觀誠在天斷伏以陛下內有輔弼外有勳賢資廟算可以叶宸衷審政議可以正天下如臣庸瑣備位藩屏為將非衛霍之儔在朝無絳灌之烈徒以虛承重寄茍竊明時每荷寵光載懷兢惕豈敢輕塵聖聽以冒天威倣徨靡寧進退維谷臣有愚懇思欲上逹况承天問敢不奏陳伏惟陛下光有萬方子育兆庶安危所繫實在陛下忠於陛下者則獻弭兵之謀諂於陛下者則獻用兵之計臣性本専直心願竭忠茍徇群情是惑宸聽臣若勸陛下韜兵匿甲則淮西受賜又慮多士橫議微臣以臣私情有何阿黨二途之內伏俟聖裁臣於藩閫之中名位最下雖陳鄙見豈副天心其有不載表章附李誠義聞奏伏希玄造俯賜明鑒限守戎律不獲陳露闕庭代淄青諫伐淮西表陸行儉臣某言臣聞忠以事君則正其詞所以誠臣也詔以事君則偽其辭所以諛臣也臣以多幸生逢昭代受方隅之重寄藉一作竊日月之餘輝荷寵益深殺身難報而心尚謇直志無回邪茍利國家敢無隱一昨中使李誠義銜命逺降軍中蒙以淮西事宜俯賜宣示跪捧宸諭枉受德音仰荷自天之恩下訪列藩之將恭承聖問思露下情芻蕘之言慮有塵黷誠義回日已附表奏聞雖詞達於上而誠欵動天倣徨轅門懼獲罪戾伏以堯舜在上伊臯立朝陛下謀及宰臣詢於卿士並以弼諧帝道匡贊皇猷在臣何知豈冝獻計然臣擁旄嵗久受國恩深玄造未酬赤誠空竭得申犬馬之志敢逃湯鑊之誅仰天誓心白日所鑒伏以陛下君臨萬國子育兆人覆載所均無逺不至溥天之下孰非王土率土之濵孰非王臣永言雨露之澤豈隔遐邇之人今少陽云亡胤子在疚賞未追於後嗣兵已纒於四郊然則一方之人豈非陛下聲教所加盍示懷柔俾霑恩信竊料中外日獻章疏來陳所見以惑上心夫為姦邪者則願師旅荐興秉忠誠者則願干戈再戢群情不一豈叶大中伏望聖明燭幽宸鑒及逺誠冝辨邪正於衆口斷可否於萬幾擇善而行從諫則聖如臣愚直謬竊寵私不敢以息兵沮一作阻議今所上表貴以直書非敢私於淮西誠願安於宇宙不然者恐煩聖上之慮有費天府之財不惟塗炭一方誠亦憂危四海盡忠於國者猶自銷難不忠於國者因此生禍國之理亂實所攸繫伏冀陛下𢎞以好生之德降以推恩之典使死者獲愧於幽壤生者盡節於聖朝凡在臣子孰不幸甚陳露愚懇輕冒天威周章失容進退無據臣限以戎閫不獲陳露闕庭無任憂惶隕越之至宰相諫罷討伐請不幸奉天表錢珝臣某等言伏以伐叛興戎國之大事有不得已然後行之而食在兵先兵居謀後餽餉必足經略無遺得必勝之帥臣有可用之徑卒然後更度利害熟計始終以是興戎乃可伐叛昨者陛下以某臣節有虧嘗犯天怒而易其鎮守猶示渥恩遷延未行包藏難測聖慮潛察睿斷勇為爰命宰臣使奉成算臣等雖承嚴旨敢不深思實以國用方虛軍糧難濟藩垣調發深恐依違兼量於足食足兵二者皆所未備况去秋冦孽犯順鑾輅出居宗廟震驚士庶流落尚賴皇威所被大憝尋平宫闕復清生靈全活今才周嵗始得稍安至於畿甸之間尚有瘡痍之疾一作患臣等所以纍因敷奏具寫便冝且乞明聖一作聖明更詳事理緩謀周慮全體養威必使盡叶事機而後重行討伐愚誠無感睿志不移旬月之間血誠備瀝事行已定不敢復言昨日仰奉天顔密承聖旨又欲出幸近縣親督戎師仍慮冦盜奔衝且貴城壘堅固特令臣等更共平章祗稟宸嚴敢不傾竭蓋陛下將恐姦凶遽至奔軼遂欲先居髙壘免動驚塵備審睿懷切在於此又以為出臨戎事促詔藩臣督集卒徒以速誅剪言於常理固合所宜然臣披抉腹心陳其數事一則伏思朝廷今日之事與建中之難不同當時猛將如雲謀臣如雨國贍九年之蓄兵持百勝之權德宗皇帝出幸奉天以為長策一旦懷光繼叛晷刻難安遽逺宗祧遂奔梁漢陛下視將帥之材與粟帛之積得如當時否天下盡忠之力赴難之心又得如當時否以此度量實恐稍難二則陛下雖處奉天之固不可遽棄京師忽使姦謀馳於間道直趨闕下一作城闕大縱戕殘陛下隔在孤城衆軍各圖其利謀危救亂欲仗何人三則士庶疑懼之心尚賴宸極安止若使鑾鈴順動禁掖頓空則萬姓之心一時何仰况輕違廟社遽捨生靈自古帝王未嘗至此四則秋序肅殺之氣金一作全在西方昨者冒此用兵犯隂陽大忌今陛下以一朝之怒忽萬乘之尊逺出皇居又衝王氣忝為臣子復列宰衡茍不盡言是負聖德五則凡有天象之變所以警動帝王昨者妖星頗多陵犯陛下深知戒懼且降德音兼有禳祈欲銷災咎而銷災之本全在清靜無為今則伐叛用兵天心不易又欲當災星謫見之後衝王氣以征行訪於匹夫亦知不可惟此五事敢不具言今則實在陛下英朗疏通且思守位以陛下語臣二者之意評愚臣五事之言裁在宸衷以安大事去此就彼聖慮自深輒貢直言難逃罪戾臣某等無任惶越懇激之至請置屯田表張説臣某言臣聞求人安者莫過於足食求國富者莫先於習耕臣再任河北備知川澤竊見漳水可以灌巨野淇水可以溉湯隂若開屯田不減萬頃化萑葦為粳稻變斥鹵為膏腴用力非多為利甚溥諺曰嵗在申酉乞醬得酒來嵗甫邇春事方興願陛下不失天時急趨地利上可以豐國下可以廩邉河漕通流易於轉運此百代之利也當今國儲未贍邉軍未息靜人農業願留聖意亦嘗賜前階之食承後騎之顧竟唯唯而無言者豈敢隱情於聖主哉集作也正以職在伏衛憂於部伍馬上非公議之所囿遊非朝廷之事今昧死上愚見乞與大臣籌謀速下河北度支及溝渠使檢料施功不後農節謹附賀正使隨軍前曹州考城縣尉同希再奉表以聞謹言論廢楚州營田表為淮南杜相公憲宗劉禹錫臣某言中使曹進玉至奉宣聖旨存問兼賜臣墨詔以楚州營田廢置事令臣商量奏者跪捧天書恭承睿旨道存致用義在隨時云云伏以本置營田是求足食則徒有縻費鮮逢順成刈穫所收無禆於國用種糧每闕常假於供司較其利害冝廢已久比來循守舊制不敢輕有上陳皇明鑒微特革斯弊取其田蓄授彼蒸黎仍俾薄租誠為至當但以田數雖廣地力各殊須量沃塉用立程度臣已追里正與商量利便謹具别狀奏聞伏惟聖慮俯賜詳擇請修義倉表齊映臣某言臣聞荷覆載之德者願酬天地之仁懷涓埃之助者冀裨海嶽之大所以思或出位知無不為况臣受寵過深感恩逾切不竭忠以自效是盜祿以茍安臣某中謝臣伏見一時愆雨一榖不登黎庶以闕二字不知卿士以月俸自恃竊惟聖慮已積憂勤凡在人臣何以安處昨者自春接夏時雨暫愆陛下心憂於清穆之中躬禱於靈池之上精誠所至昭感遂通祥禽呈瑞於御前膏雨布澤於天下遂使百榖皆稔九土大豐國無不獲之夫代成亷讓之俗斯乃皆由聖德上合天心顧此齊人俱受其賜此何異開口待哺澡身仰衣豈知宸衷一作心不可常勞靈雨亦難恆若者也必在酌堯舜之至道舉祖宗之成法復修義倉以救歉嵗則黎人絶水旱之困陛下釋憂勤之念君逸無勞乃合至道足食無患斯謂雍熙豈臣率心實聞方册又臣伏以賦稅之道理化之源必資考古酌今以通其變俾為經制豈利因循各具狀别隨表臣某中謝伏以聖心屬念惟在黎元微臣蠢愚嘗歷州府敢以所見備於上聞徒竭誠請理猶未明輕冒宸嚴不勝隕越論萊州置監牧及和市牛羊奴婢表張廷圭臣廷圭言竊見國家於河南北和市牛羊及荆益等州市奴婢擬於登萊州置監牧此必有人謂頃嵗以來軍裝所資國用不足或將見陶朱公公孫𢎞卜式之事而為陛下陳其策耳臣愚以齷齪小算有損無益不足為盛明天子行法於代也何以明之彼三人者實為匹夫藉空虛之地罄勤勞之力畜牧積嵗增致千金茍以一家言之其計得也今聖朝疆域四海臣妾萬方天覆地載莫非所有而欲必取於人從牧於國何示人之不廣而近樹私也况和市遞送所在騷然公私煩費不可勝計臣聞諸古人曰百姓足君孰與不足百姓不足君孰與足蓋君之與人上下同體無所間也今河南牛疾甚處十不一存傷農豈徒百姓而已又今牧童取其牛在將者下俚尤要一無此十一字一則利其孳産二則不廢營農家家保之豈願輒賣今雖和市甚於抑奪百姓之望是牛再疫而農重傷此則有損無利一也頃者諸州雖定估價既緣併市則雖平準加其簡擇事須賄求侵刻之端從此而出牛羊踴貴必倍於常百姓私賠則破家業一作産雖官得一牛一羊而百姓已失兩牛兩羊價矣此則有損無利二也登萊之境是稱海隅因之水氣加以風廽秋則早寒春則晚煦深山大澤咸生蛟蛇一作産若置群牧必多死損此則有損無利三也髙原之田百姓耕植下濕之地不堪放牧若奪百姓髙處兩州皆失丁田至于牛羊復相踐暴久長如此闔境不安非直百姓被侵蓋失國家租賦則有損無利四也且又荆益等州親疑是和市奴婢多是國家戶口姦豪掠來一入於官永無雪理况南北既逺風土非冝乍到登萊必生疾疫此則有損無利五也且方今東洎滄海西洎流沙亭障多虞甲胄未息戎機調發嵗時相繼由是丁兵逃散戶口流亡略舉大凡十有數四陛下天憐黔首光啓玄猷將命使臣分道巡撫簡而靜鎮難必乂安矧乃征伐外繁徴求內廣欲使萬方兆庶安堵復業亦猶剪烏之翼而望其騰騫一作飛騰脫魚之鱗而願其遊泳臣又聞之君所恃者人人所生者食食所資者耕耕所恃者牛廢耕則去食去食則無人人無以生君將何恃然則牛者君國字人之本豈可無故一旦取之哉臣又度羊之為須非軍國切要假命畜牧能遂繁滋三數嵗間億萬可致陛下豈可鬻之於外蕃射其利為用乎又可鬻之於中土割其命為資乎牛之為損則如彼羊之無益則如此臣雖愚戅知其必不可也伏願陛下特加審慎詳圖損益諸有所和市及新置監牧等儻回聖慮即日停絶天下蒼生豈勝幸甚昧死上奏以聞文苑英華卷六百十六
