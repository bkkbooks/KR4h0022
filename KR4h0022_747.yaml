body:
  text: 文苑英華卷七百四十八宋李昉等編兄弟賔友兄弟論一首正交論一首臣友論一首賔客論一首兄弟論并序常德志余以天倫篤睦日重月深每惟兄弟孔懷在物無喻嘗讀陸士衡之兄弟文勤勤懇懇未嘗不廢卷歎息向其為人而世人云陸機兄弟同居以之為異傷哉斯固異其所稀見也將恐悠悠千載不無此感疑作惑敢託陸之㫖以作論云客謂陸平原曰吾聞天降地騰夫婦之情見矣星分嶽列兄弟之義存焉是以聖人之立教也上稽𤣥極下順人情故使判合為同穴之親昆季有異居之道斯則人倫之大典豈作者之謬陳哉而子大夫名為習禮伯仲無門庭之别室家匪琴瑟之間雖激揚風俗獨為君子違道任心將使先人事也事不師古䝉竊惑焉豈有說乎願聞其㫖平原曰何居斯言之玷可謂末學膚受曽莫是師即如君子之談必且輕於身而纍於俗以疑是矣獨不聞夫六龍方駕斯有御天之功駟馬班如用效行地之力是故大鵬之始宛轉北溟鄧林之初婆娑下土至於羽翮相資遂能負蒼天而逰罩青雲而立此則相須之道𢎞也至如梁山萬仭上干星辰楚殿三休俯臨風雨及土石異勢榱桷分離遂與沙麓俱崩坳塘莊子作堂共泯此則相須之道乖也是知同德者易為功離心者難為力在物猶爾而况人乎然不善其疑作莫大於不睦溺於情者薄於義寡於私者豐於道故牝雞晨鳴三賢奴戮關睢樂得十亂同知故名賢之所聞豈烏有之談也且夫兄弟者同天共地均氣連形方手足而猶輕擬山嶽而更重雲蛇可斷兄弟之道無分鶺鴒載飛急難之情斯切先王知兄弟之為重也故歌之於韶夏之舞誦之於風雅之篇敦骨肉而正人倫風鬼神而動天地大矣哉請為左右梗槩其說夫兄弟之情也受之於天性生之於自然不假物以成親不因言而結愛鬩墻不妨於禦侮踰里猶惜於伐樹馭朽則須洛而歌彎弓則涕泣而道斯乃情存於不捨義形於惻隱豈如悠悠良辰從容永歎而已是以四鳥禽也不能各疑離别之聲三荆木也不能忍分張之痛矧在人流有靦靣目拆枝分骨如何勿傷至於夫妻之為義矣非有血屬之親譬猶風虎雲龍騰嘯相感如髧彼兩髦結歡二族始有共牢之禮終為同穴之親斯亦未為輕也然而德在聽從主唯蘋藻不可以寄百里之命不可以託六尺之孤况有棄姓無常拂衣再醮至如買臣之室主父之妻固未可以言也自非道讃移天德均惟鵲孰能長螽斯之羽翼茂葛藟之夲根者乎是以通人君子動無失德全同生之重則恭順有章戒惟家之索而椒蘭無替夫妻和於鼎飪兄弟穆於清風緑衣無燕燕之悲角弓匪騂騂之歎其或分星宅土開國承家則能藩屏維城左右王室力足拔山不敢問九鼎之重才能動俗不敢窺司馬之門遂使封豕長蛇望國門而斂迹井蛙幕燕覩盤石而飛鳴故能夲支百代洪基峻極配合二儀平章百姓其在白屋黃冠蓽門圭竇三徑五畝有足相容至有同衾共席推梨讓棗樂以簟瓢榮同華蕚死生契濶白刃交前弟瘦兄肥無胥逺矣爾其友于怡怡揚名以顯髙視風俗長揖縉紳斯文足為樂也而無賴之徒不思其友或溺於私愛棄彼天倫生在膏腴乘藉地勢錫圭分竹奄有山河不能輔車相依股肱同患乃欲搖動我家宗拔塞我本源竟而青蠅飛於干旌無極逰於二壘集矢長勺撫劔共池是以五爭四裂非關蛇鬪之妖九合一匡猶見蟲流之禍鬼神不勝其酷生民不勝其弊吁可畏也何其謬哉又有里閈之人繩樞之子栖息不過於蓬蓽咀嚼不越於糟糠無財可不忿爭乃復尺布斗粟不能相容睚眦蠆介側目切齒遂使蕞爾箕帚蠢爾孩童萋菲其章成是貝錦於是乎分裂蝸角稱競鴻毛骨肉為行路之人兄弟無陟岡之望痛矣悲矣何必情矣宫之竒脣亡之歎深可撫心王叔冶斷臂之言足為流涕其知也如此其謬也如彼逺乎得失豈可同年而語哉是知禍福無門唯人所召靜言成敗則可得而論何則存亡之道若行邁之有途得之者安於廟堂失之者顛沛斯及至如三叔狼顧七國闕連貔虎摶噬江山表裏當其時也滄波可汲而斷泰山可踏而覆朱旗尚卷蒼兕未馳不待髙壘之謀勿俟銜枚之陳固以氷判瓦解魚潰鳥驚身膏草莾名彰史䇿經過者為之回車言談者為之洗耳斯豈時不利而兵不徑者哉固以天地所不容人神所同惡者也斯乃在和不在衆在德不在强商周之不敵亦所聞也假使驅長狄駕遺風宋萬附輿慶忌參乘勍弓飲石長劔挂頭疑作頥冠雞佩猳拖象拉兕然而使之超九折跨三危浮吕梁赴滄海五尺童子知其必亡何則道之非也茍令心腹無瑕昆季輯穆雖使要離䇿杖不占緩步周流九逵容可危乎近者劉荆州之意氣袁渤海之縱橫當其吐納荆揚鞭笞河朔猛將厲於鵰鶚謀臣盛於雲雨從容嘯咤有席卷八荒之心固以震懾人靈熏灼宇宙者既而良圖未就壯志先秋瘡痏實生蕭牆糜潰天道與人事共往生人與草木俱萎雖睦於曹公尚無旰食之暇安得馬上而舞哉斯有惑之甚也豈如稷契升朝同心同德魯衛為政雖休勿休得使康哉良哉洋洋盈耳卜代卜年之祚悠悠無極是知管蔡之玉食不如夷齊之餓死君頽之萬舞不如延陵之退耕詩不云乎彼令兄弟綽有餘裕一作綽綽有裕不令兄弟交相為愈善哉言也吾無間然今吾子以同穴者重之於天倫異居者成之於行路是見詩人之糟粕未睹宫牆之室家固未可與適道也若以骨肉逺而為踈即手足無心腹之用判合近而為重即衣衾為血屬之親若衣衾附體而可離手足逺身而可絶斯則室家之不侔於兄弟固亦明矣况作者之意有異是乎夫異家者所以避私同穴者示以不返一作及故傳曰昆季一體又兄弟之道無分然而有分者何謂異居同財者若委支體於行路阻天倫於胡越固非其所願聞疑也且余聞士龍少遭憫凶攀風樹而興歎懷仁義以罔極零丁齡齓霜露摧心契濶九夷更相為命常恐黃耳蕭條白駒超忽洞庭木葉零巖花落無時雖復飲啄相依光華未著局天蹐地每一作心深慙德友于兄弟何日忘之將謂吾子有以成教而反問我比以流俗祗足以攪其心慮非所望於吾賢也於是客赧然而起曰僕固小人無聞至道雖生堯舜之代未登孔子之堂茍有胸而無心遂逐情而忘性言排名義之外身陷泥塗之下今子大夫幸而見睹博我以友弟𢎞我以禮經洋洋乎理出天人之表恢恢焉道周仁義之鄉而今而後謹聞命矣是知安社稷御邦家調隂陽化風俗播清猷於緗素垂令範於黎氓橫之於天地而自安處之於生死而無慮者其惟兄弟乎正交論李華上古無文飽於和氣從化而避何交之哉至於善惡分利害競而後有交交天命也附奔走之友夫走疑天縱也亦然微鮑子之知管氏則諸夏遷為左祍無歸生之說屈建則椒舉死於他國大者濟天下叔牙夷吾是也小者全宗族聲子伍舉是也慈明奉元禮一如大人真長喪仲祖臨柩慟色由是近於骨肉之恩不止交逰而已矣王邑崇繼前好父事君卿梁松恃貴遺舊構陷伏波兩存其道而後兼善是知人事艱難僅發於造次生死變禮不必更相代朋友漸於講習緣情而親於我為重憂危相急仕進相推望而不從厚實生怨詩曰喪亂既平既安且寧美道義相成也又曰將恐將懼維豫與汝將安將樂汝轉棄豫哀勢利相傾也三代之教自家行國樹之以師經啓其心而修則家事理次定朋友端其姓疑作性術攝稱從之聲與實諧次諸侯無貢士及於政是以富有賢哲動符六經王䇿既衰小雅皆廢諸侯無貢士之理司馬無論材之政猷或先王教存國有君子聖人生於魯七十子遍逰諸侯文武之道噎口疑復明孔伋孟軻之徒並不儒尊漢代人心尚朴辟署由州羣疑作郡公府往往有竒節駭俗之士東京宗祖好學海內翕然是以王室多柱石之臣交逰有死生之友降及魏晋亦未甚偷近代無鄉里之選多寄𨽻京師隨時聚散懷牒自命積以為常吠形一發羣響雷應銓擇多誤知之固難使名實兩虧朋友道薄蓋由此也况衆邪為雄孤正失守誘中人之姓疑作性昜於不善求便身之路庸未直道不從流俗修身俟死者益寡焉加以三尊闕師訓之喪朋友無寢門之哭學府無衰服之制禮亡浸逺言者為非人從以偷俗用不篤弊在不專經學淪於茍免者也師之儒宗則道不尊道不尊則門人不親友非學者則義不固義不固則交道不重選不由鄉則情不繫府情不繫府則舉薦寡恩三者化人之大端而情禮盡曠徼幸道長而純慤道消悲夫禮首於冠而成人筮日筮賔即事於廟同師之友鄉邦之族醮而禮之禓疑相與字之身何以不嚴友何以不敬雖有暴慢無自入焉嗚呼士夫略之禮以墜於地久矣信義不厚斯有漸歟後進未較是以非辨者多附成而逺敗成或非輕敗或非義三代之理不能無是矧弊末乎於是大雅之友掃除無忘疑作妄之交風動利招則不悔機罔名眩則甘心鼎鑊傾之以勢則不畏於天地餌之以權則忍絶其親愛茍患所不至故詩有谷風之刺禮有邦朋之禁以此防人猶或踰之嗟夫竒巧釣情者明哲所惡鋒芒逆物者道家不取受施忘惠者仁義之蠧跡均心異者蠻貊之俗靣附背擕者人道所棄逺賢奔利者商販之行俞可强不者僕妾恆姓疑作性愛子遺親者犬彘之心若然者無代無之嗚呼至交之道殆絶乎如有唱而無應非唱者過也善交者不好甘而惡章貴棄同而即和鮑叔潔亷而敬管仲三歸至知之契故無與二君子不器交議宜然義在切切偲偲匡救其闕善則輔宣之過則以規誨之不從則一心以蔽之不幸置於刑辟則生死以全之傳曰朋友無大故不棄此之謂也茍能久要之約必存平生之言可復如樓護終身與吕公同食張裔養楊恭母如親則室家有歸人誰虞死古者言之不出耻躬之不逮也行之難言之得無訒乎務省諸身而已矣臣友論李德裕君之擇臣士之擇友當以氣志為先患難為急漢髙以周勃可屬大事又曰安劉氏者必勃也文帝戒太子曰即有緩急用粹作急緩亞夫真可任將兵此皆得於氣志之間而後知可以託孤寄命矣何者人君不能無緩急川粹作急緩士君子未嘗免於集無於字憂患故漢髙知周勃可託文帝識亞夫可任信陵降志於朱亥爰盎不拒於劇孟且夫周文由閎天而禦侮宣孟以彌明而免難孔聖得仲由而不聞惡言宋祖失穆之而謂人輕我則擇臣求友得不先於此乎太倉令淳于公歎生子不生男緩急非有益也女緹縈自傷乃上書贖父罪詩曰鶺鴒在原兄弟急難父子兄弟未嘗不以赴急難為仁孝况朋友之際本以義合貴盛則相須集作望以力憂患而不拯其危自保榮華坐觀顛覆可不痛哉昔衛青之衰也故人多事冠軍而任安不去吳章之敗也門人更名他師而幼孺自效此所以可貴也善人良士祗可以淡水相成虛舟相值聞其患也則䇿足先去曰見幾而作不俟終日知其危也則奉身而退曰既明且哲以保其身集有良字士之人如是曷若識劇孟朱亥哉賔客論古人稱周公吐握下士而天下歸心惟周公則可何也文王之子武王之弟成王之叔父於天下無嫌矣故唯周公則可深知他人不可故再言之禀上聖之資邪不得入是以好士不為纍也漢武為戾太子立慱望苑使通賔客多以異端進者始皆欲招賢人而天下賢人少小人多賢人難進小人昜合難進者鴻冥昜合者膠固矣何以知之劉濞有枚乘鄒陽不用其言而應髙田祿伯為其羽翼劉武有鄒陽韓安國不用其謀而羊勝公孫詭為其腹心劉安行隂德好文辭雖愛神仙黃白未害為善終以左吳伍被而敗以是而知雖骨肉之親非周公聖德皆不可也班固稱四豪者六國之罪人也今不復論矣吕不韋習戰國之餘風陳豨值漢綱之踈濶逮乎魏其武安終以權勢相傾自武安之後天子切齒魏霍改節則賔客之為害固可知矣公孫𢎞起客館開東閣以延蜀夲有賔客二字賢人與參謀議非也然謂之賢人必非黨附朝宰交亂將相者矣其時武帝躬親萬機嚴明御下人自守法不敢為非宰相唯有平津政出一空音孔出吕覽自然無傾奪之勢其食袁本作賔客故人不居顯位似未足為朝廷患也然主父偃言朔方地肥饒阻河䝉恬築城以逐胸奴滅胡之本公孫𢎞以為不可朱買臣發十難𢎞不能得其一又奏人不得挾弓弩吾丘夀王以為不便上以難丞相丞相詘服則知平津之賔客不及天子之近臣明矣雖有賔客川粹作館何益於謀議哉况近世秉大政者常不下三四人而輕薄逰相門與桞槐集作槐桞齊列所謀以傾奪為首所議以勢利為先是以魏其武安之徒共成禍敗劉班殷鐡之客不相往來又役奸智獻其計者導其邪徑茍合匪人世道險巇無不由此昔漢武謂田蚡曰君除吏盡未吾亦欲除吏哀帝責鄭崇曰君門如市人集本無人字何以欲禁切主上皆賔客之害也余謂丞相閉關謝絶賔客則朝廷靜矣文苑英華卷七百四十八
