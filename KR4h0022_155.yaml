body:
  text: 文苑英華卷一百五十五宋李昉等編天部五詠雪雜題二十八首晴霽三十首詠雪雜題玄都觀春雪張正見見初學記同雲遙映嶺瑞雪近浮空拂鶴伊川上飄花桂苑中影麗重輪月飛隨團扇風還取長歌處帶曲舞春風玩雪王衡寒庭浮春初學記作暮雪疑從千里來皎潔隨處滿流亂逐風回璧臺如始構瓊樹似新栽初學記作裁不待陽春節誰持競落梅望雪唐太宗見初學記秋雲宵遍嶺素雪晚凝華入牖千重碎迎風一半斜不粧空散粉無樹獨飄花縈空慚夕照破彩謝晨霞和陳校書省中玩雪包融藝閣朝來雪飄颻正滿空褰開明月下校理落花中色向懷鉛白光因翰簡融能令草玄者逈思入流風瑞雪篇此詩見三百三十一卷歌行門劉庭琦南陽北阻雪孟浩然我行滯宛許日夕望京豫曠野莽茫茫鄉山在何處孤煙村際起歸鴈天邊去積雪復集作覆平湍集作臯飢鷹捉寒兔妙集作少年弄文墨屬意在章句十上恥還家徘徊守歸路和王員外雪晴早朝錢起紫微晴雪帶恩光繞仗偏隨鴛鷺行長信月留寧避曉宜春花滿不飛香獨看積素凝清禁已覺輕寒讓太陽題柱盛名兼絶唱風流誰繼漢田郎舟中夜雪懷盧侍郎集作御杜甫朔風吹桂水大雪夜紛紛暗度南樓月寒深北渚雲燭斜初近見舟重竟無聞不識山隂路聽雞更憶君秋浦清溪雪夜對酒客有唱山鷓鴣者李白披我貂襜褕對君白玉壺雪花酒上滅頓覺夜寒無客有桂陽至能吟山鷓鴣清風動窗竹越鳥鳴集作起相呼持此足為樂何煩笙與竽此詩一百六十六卷重出今已削去終南望餘雪祖詠終南隂嶺秀積雪浮雲端林表明霽色城中增暮寒竹下殘雪丘為一點銷未盡孤明在竹隂晴光夜轉瑩寒氣曉仍深還對讀書牖且關乘興心已能依此地終不傍瑶琴會稽郡樓望雪張繼江城昨夜雪如花郢客登樓望霽華大禹壇前仍聚玉西施渚上更飄紗簾櫳向晚寒風度睥睨初晴落影斜數處微明消不盡湖山清映越人家小雪戴叔倫類詩作釋清晝花雪隨風不厭看更多還肯失類詩作蔽林巒愁人正在書窗下一片飛來一片寒韓舍人書齋殘雪戎昱風卷黃雲暮雪晴江煙洗盡柳枝輕簷前數片無人掃更得書窗一夜明早春雪中前人隂雲萬里盡漫漫愁坐關心事幾般為報春風林下雪柳條初發不禁寒晨起登樂遊原望終南積雪僧皎然凌晨擁敝裘間上古原頭雪霽山疑近天高思若浮瓊峰埋積翠玉嶂掩飛流曜彩舍朝日搖光奪寸眸寒空標瑞色爽氣襲皇州清眺何人得終當獨再遊山雪前人見文粹夕陽在西峰疊翠縈殘雪狂風卷絮回驚猿攀玉折何意山中人悮報山花發盧郎中拜陵遇雪蒙見召因寄楊巨源南宫使者有光輝欲拜諸陵瑞雪飛蘋葉已修青玉薦柳花仍拂赤車衣應同谷口尋春去定似山隂帶月歸寒冷出郊猶未得羡公將事看芳菲和劉夢得終南秋雪白居易遍覽古今集都無秋雪詩陽春先唱後隂嶺未消時草訝霜凝重松疑鶴散遲清光莫獨占還集作亦對白雲司洛中集作下雪中頻與劉李二賔客宴集因寄汴州李尚書前人水南水北雪紛紛雪裏歡遊莫厭頻日日暗來唯老病年年少去是交親碧氊帳暖梅花濕紅燎爐香竹葉春今日鄒枚俱在洛梁園置酒召何人積雪賈島昔屬時霖滯今逢臘雪多南積飄狂渚北訝雨交河盡滅平蕪色珍集作彌重古木柯空中離白氣島外下滄波隱者迷樵道朝人冷玉珂夕繁仍晝密漏間復鐘和想積高嵩頂新秋皓月過殘雪許渾憶昨新春霰雪飛階前簷上鬬寒姿狂風送在竹深處隔日未消花發時輕壓嫩𬞞旁出土冷衝幽鳥别尋枝晚來又喜登樓見一曲高歌和者誰敘雪寄喻亮方干類詩作杜荀鶴密片繁聲旋不類詩作久未銷縈風雜霰轉飄颻澄江莫蔽長流色衰柳難粘自動條濕氣添寒類詩作隂森酤酒夜素花迎曙類詩作晶耀卷簾朝此時明類詩作行徑無行類詩作人迹唯望徽之問寂寥方干集中又有敘雪題目同而詩異今並載于此密片無聲急復遲紛紛又勝落花時逡巡不覺藏莎渚宛轉偏宜傍柳絲透室虛明非月照滿空回散是風吹高人坐卧才方逸援筆應成六出詞長安雪後喻坦之雪疑落雲收盡天涯雪霽時草開當井地樹折帶巢枝野渡滋寒麥高泉漲禁池遙分丹闕出迥對上林宜宿片攀簷取凝花就砌窺氣陵禽翅束凍入馬蹄危北想連沙漠南思極海涯冷光兼素彩向暮朔風吹書齋雪後趙嘏擁褐坐茅簷春晴喜初日微風入桃徑爽氣歸集作生縹帙頻時苦風雪就景理巾櫛樹暖高鳥來窗間曙雲出鄉遙路難越道蹇時易失欲靜又不集作未能東山負芝术寒日間居新雪薛能大雪滿初晨開門萬象新龍鍾雞未起蕭索我何貧耀若花前鏡清如物外聲細飛斑户牖乾酒亂松筠正色凝高嶺隨流助要津鼎消微示滓車輾半和塵茶興留詩客瓜期想戍人終篇無本字誰别勝陽春峩嵋雪鄭谷萬仞白雲端經春雪未殘夏消江峽滿晴照蜀樓寒造境知僧熟歸林認鶴難會須朝集作上闕去祗有畫圖看雪中偶題前人亂飄僧舍茶煙濕密灑歌樓酒力微江上晚來堪畫處漁人披得一蓑歸潤州甘露寺看雪上周相公羅隱篩寒灑白亂溟濛祈禱集作禱請功兼造化功光薄乍迷京口月影交初轉海門風細粘謝客衣襟集作裙上輕拂集作墮梁王酒盞中一種為祥君看取半禳集作攘災沴半年豐晴霽開霽梁簡文帝景落商颷靜煙開四郊謐偃蹇暮山虹遊揚下峰日水文城上動城樓水中出竟微共治功空卧淮陽秩雨後梁簡文帝散絲與山氣忽合復俄晴雷音稍入嶺電影尚連城雨餘雲稍薄風收熱復生望夕霽王筠連山卷族雲長林息衆籟密樹含緑滋遙峰凝翠靄石溜正潨殘山泉始澄汰物華方入賞跂豫心期會喜晴庾信比日思光景今朝喜暫逢雨住便生熱雲晴即作風水白澄還淺花紅燥更濃已歡無石燕彌欲棄土龍雨晴王胄初晴物候涼反景照山莊殘虹低飲澗新溜上侵塘風度蟬聲逺雲開鴈初學記作鳥路長初晴落景唐太宗晚霞聊自怡初晴彌可喜日光百花色風動千株翠池魚躍不同園鳥聲還異寄言博通者知余物外志幽山雨後應令虞世南肅城臨上苑黃山邇桂宫雨歇連峯翠煙開竟野通排虛翔戲鳥跨水落長虹日下林全暗雲收嶺半空水泉鳴石澗地籟響嵒風雨後李百藥晚來風景麗晴初物色華薄雲向空盡輕虹逐望斜後窗臨岸竹前階枕浦沙寂寥無與晤樽酒對風花雨晴一作秋霽二首杜甫天外一作際秋雲薄從一作松西萬里風今朝好晴景久雨不妨農塞柳行疏翠山梨結小紅胡笳樓上發一鴈入高空二雨晴山不改晴罷峽如新天路看殊俗秋江思殺人有猿揮淚盡無犬附書頻故國愁眉外長歌欲損神晚晴二首前人村晚驚風度庭幽過雨霑夕陽薰細草江色映疏簾書亂誰能帙杯乾可自添時聞有餘論未怪老夫潛二返照斜初徹集作散浮雲薄未歸江虹明近集作逺飲峽雨落餘飛鳬鴈集作鶴終高去熊羆覺自肥秋分客尚在竹露夕集作久微微晴二首前人久雨巫山暗新晴錦繡文碧知湖外草紅見海東雲竟日鶯相和摩霄鶴數羣野花乾更落風處急紛紛二啼烏爭引子鳴鶴不歸林下食遭多泥集作遭泥去高飛恨久隂雨聲衝塞盡日氣射江深回首湖南客驅馳魏闕心院中晚晴省集作懷西郭茅舍前人天際集作幕府秋風日夜清淡雲踈雨過高城葉心珠集作朱實看時落階面青苔老更集作先自生復有樓臺銜暮景不勞鐘鼓報新晴浣花溪裏花饒笑肯信吾兼吏隱名曉晴李白野涼疏雨歇春色遍萋萋魚躍青池滿鶯吟緑樹低野花粧面濕山草紐斜齊零落殘雲片風吹挂竹溪湖中晚霽常建湖廣舟自輕江天欲澄霽是時清楚望氣色猶霾曀踟蹰金霞白波上日初麗煙紅落鏡中樹木生天際杳杳涯疑欲斑濛濛雲復閉言垂星漢明又觀寰瀛勢微興從此愜悠然不知歲試歌滄浪清遂覺乾坤細肯念客衣薄將期永投袂遲回漁父間一鴈聲嘹唳酬鴻臚裴主簿雨後北樓見贈王昌齡暮霞照新晴歸雲猶相逐有懷晨昏暇想見登眺目問禮待彤襜題詩訪茅屋高樓多今古陳事滿陵谷地久微子封臺餘孝王築徘徊顧霄漢豁逹俯川陸逺水對秋城長天向喬木公門何清淨列戟森已肅不歎携手稀常思著鞭速終當拂羽翰輕舉隨鴻鵠喜晴劉長卿曉日西風轉秋天萬里明湖天一種色林鳥百般聲霽景浮雲滿逰絲映水輕今朝江上客凡慰幾人情山下晚晴崔曙寥寥逺天淨溪路何空濛斜光照疏雨秋氣生白虹雲盡山色暝蕭條西北風故林歸宿處一葉下梧桐樂遊原晴望寄中書李侍郎錢起爽氣朝來集作分萬里清憑高一望九秋集作愁輕不知傅説集作鳳沼霖初霽但見集作覺堯天日轉明四野山河同集作通逺色千家砧杵共秋聲遙指集作想青雲丞相府何時開閣對集作引書生泉上雨後作元季川風動蕩煩暑雨息佳霽初衆峰帶間雲秋氣入我廬颯颯鮮一作涼飈來窺臨一作臨窺愜所圖緑蘿長新蔓裊裊垂座隅流水復簷下丹砂發清渠養葛為我衣種芳為我蔬誰能一作是畹與畦彌漫連野蕪一作見唐百家詩選喜晴時左遷台州刺史李敬方到台十二旬一片雨中春林果垂楊盡山苖半夏新陽烏晴展翅隂魄夜飛輪坐兾無雲物分明見北辰春晴任翻楚國多春雨柴門喜晚晴幽人臨水坐好鳥隔花鳴野色臨空闕疑作澗江流接海平門前到溪路今夜月分明江城秋霽戎昱霽後江城風景涼豈堪登眺只堪傷逺天螮蝀收殘雨映水鸕鷀近夕陽萬事無成空過日十年多難未還鄉不知何處銷茲恨轉覺愁隨夜夜長答韋先輩春雨後見寄劉得仁風散五更雨鳥啼三月春軒窗透初日硯席絶纎塵箇箇峰頭出家家樹色新憐君高且靜有句寄幽人春日雨後作前人朝來微有雨天地爽無塵北闕明如晝南山碧動人車輿終日别草樹一城新枉是吾君戚何門謁紫宸塞路初晴雍陶晚虹斜日塞天昏一半山川帶雨痕新水亂侵青草路殘煙猶傍緑楊村胡人羊馬休南牧漢將旌旗在北門行子喜聞無戰伐間看集作時逢逰騎獵秋原晚晴李商隱深居俯夾城春去夏猶清天意憐幽草人間重晚晴併添高閣曉微注小窗明越鳥巢乾後歸飛體更輕白石潭秋霽作周繇潭心煙霧破斜暉殷殷雷聲隔翠微崖蹙盤渦翻蜃窟灘吹白石上漁磯陵風舴艋謳啞去出水鸕鷀薄泊飛秋霽更誰同此望逺鐘時見一僧歸文苑英華卷一百五十五
