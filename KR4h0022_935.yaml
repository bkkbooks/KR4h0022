body:
  text: 文苑英華卷九百三十六宋李昉等編宰相一左丞陸元方墓志一首中書令逍遙公韋嗣立墓志一首尚書左丞張說墓志一首崔相國澳墓志一首文昌左丞陸公墓志序張說集無公諱元方字希仲蘇州吳縣人也帝典惟二虞盡美於南風强國有七齊莫大於東海元侯制食因為宗丞相册勳開吳佐命盛德之後瑶琨代襲故丹青奕世三君之望並高金玉聨華五常之目齊重公即陳給事黃門侍郎琛之曽孫唐荆州當陽縣丞山仁之孫司儀郎柬之之姪豫章尉𤣥之之子體𤣥黃之純粹峻清白之隆基鵬翼載軒騏鳴自逺始以司成明經業優擢第補三水扶風渭南三縣尉授裏行監察殿中三御史遷鳳閣舍人兼太子中舍又判鳳閣又守秋官行鸞臺三字侍郎同鳳閣鸞臺平章事坐公事降為綏州刺史居無何檢校春官又試天官二侍郎兼司衛卿復除鸞臺侍郎同鳳閣鸞臺平章事轉右庶子轉文昌左承前後掌選及知考各二歲九流銓總代天理物公執其衡鏡而野無遺賢三載考績惟王舊典公秩其一作黜陟幽明而庶官咸事斯並憲章臺閣藉甚人倫至於經濟大道彌綸庶務嘉猷削於隱德𢎞益晦於推美蓋不得而聞也古人有言進退在命忠信在人一出持州再入蒞政汲長孺之方直時守外臺胡伯始之詳明亟司中禁抑有由焉嗚呼人之淑斯宜享難老昊天降戾曽不憗遺大定元年二月七日寢疾而終春秋六十有三歷事兩宮三十餘載奉上惟敬臨下惟誠密勿兩終靜而調理心尚坦率不違名教之地迹列軒裳不雜風塵之伍施與忘倦鄉黨穆焉夷險若一朋友義焉所謂終溫且惠行同歸於大雅克已復禮身不離於令名及東首歸全西階撤奠無食粟之馬無衣帛之妾知與不知莫不嘉歎粵三月十四日假葬之國門之南費村永刋昭烈垂之幽礎其銘元本不載此篇元在九百四十卷職官門今移于此中書令逍遙公墓志銘張說唐故中書令逍遙公韋氏諱嗣立字延構京兆杜陵人也受渾元之正性挺生人之秀傑門為孝悌之府世處台衡之地蓋上林之高標宗臣之首出者也生於秦之清水長于鄭之成臯聰明先覺博古兼覽究蓬山之百氏綜闕里之六藝文而不華實而不滯原夫志在於易行在於禮守槖籥之冲虛播朱絃之愷悌事有則而言有度神無方而用無體其與人也溫良善誘仁恕多容俾夫頑蔽開拆愎鷙擾從君子進道小人革慮聞者願來見者忘去若膏澤之浸陽和之感萬物不知其化矣及夫履簀登朝濫觴宰邑聖朝知其周慎忠肅簡易循良是以綢繆兩禁重疊千里迄踐宰衡終厥有成凡化二邑理七郡三入中書再統兵部選吏部集本文粹作兵部各兩典樞密共五載光弼四主歷政三十有餘其間纍有謗集作傍及官因左退日月蝕而更明隨和幽而不昧爾其為邦設教尊德間邪身勤心苦誠感物化禮讓興於私室刑罰廢於公家衡鏡髙懸文武矯首才無我失善若已有風流明教作法垂後訏謨皇極功格天地茫茫蠢蠢既生既遂四夷來王五靈皆至然而外榮中素迹邇心遐杳然朱石二本作户之若喪𬎼二本作邀若赤松之可接西宴驪山之谷東息龍池之野擇逍遙而建號裂土宇而西社明主封帝邱之謀表髙臣之志也公考侍中為國元輔公兄承慶當代齊名咸以令德繼和金鼎扶陽二相陳氏三君復追美名二本侯侍中前夫人崔氏生黃門而即世後夫人王氏生公而偏愛公克諧以孝因心則友啓均養之德成無間之言天下之人比之祥覽惟公德行言語文學政事四者實惣而兼之事親養志而能爭居喪過哀而顧禮此又善中之善者也善人天之經也國之寶也道將興廢木鐸之用有時命或推移蒼天二本之作生之望恆在春秋六十有六遘疾陳郡還醫洛師開元七年九月二日薨于歸德里有詔贈兵部尚書諡曰孝禮也明年某月葬于某地有子孚恆濟夬儡然在疚靡所置哀以某忝縉雲之舊寮沐清風之餘論入難名之閫域窺妙德之形容見託銘志庶傳精爽至於歷官次序平居事業當見御府遺愛之碑國史銘臣之傳故不存焉銘曰峩峩仁公抱孝含忠文獻則足高明有融翻飛王佐穆我清風道濟明時心樂幽地薜衣華衮坦然一致逍遙啓封帶礪傳嗣二本作祀生涯共盡振古其常人秉三德天歸百祥臧孫有後公業不亡開府儀同三司行尚書左丞相燕國公贈太師張公墓志銘張九齡大唐有天下一百一十三年開元十有八載龍集庚午冬十二集作一月戊申開府儀同三司行尚書左丞相燕國公薨于位享年六十四嗚呼哀哉皇帝悼焉素服舉哀廢朝三日乃下制贈太師蓋師傳之舊恩禮有加也詔葬先逮襄事有日又特賜御詞表章琬琰公義有忘身之勇忠為社稷之衛文武可憲之政公侯作捍之勳皆已昭昭於天文雖日月爭光可矣公諱說字道濟或字說之見唐書范陽方城人晋司空壯武公之裔孫周通館學士諱弋府君之曽孫贈慶州都督諱恪府君之孫贈丹州刺史刑部尚書諱隲府君之季子自上世積慶及公而祥發神明所祐集作府道德為樞生以寧濟幼而聰悟集作體祥鷹揚虎視英偉磊落越在諸生之中已有絶雲霓之望矣初天后稱制舉郡國賢良公時大知名拔乎其萃者也起家太子校書迄于左丞相官政四十有一而人臣之位極矣尚書國之理本公悉更之中書朝之樞密公亟掌之休聲與偕升降數四守正而見逐者一遇坎而左遷者二其餘惣戎于外為國作藩所平除者唯幽并秉節鉞而已至若三登左右丞相三作中書令唐興以來朝佐莫比聖賢之運有㑹師臣之道欲行人雖求多我每餘地馨香之發敷聞自久宜其翊戴聖后師範百寮功烈過於如神德聲出於咸一此固與版築崛起屠釣作合之類亦云異也公志𤣥逺而性高亮未嘗自異㑹節乃有立何所不可體道以為宗既定國於一言亦保身於大雅其於經理世務雜以軍國决事如流應物如響紛綸輻輳其猶指掌及夫先聖微㫖稽古未傳缺文必補墜禮咸甄與經籍為笙簧於朝廷為粉澤固不可詳而載也始公之從事實以懿文而風雅陵夷已數百年矣時多吏議擯落文人庸引雕蟲沮我勝氣邱明有恥子雲不為乃未知宗匠所作王霸盡在及公大用激昂後來天將以公為木鐸矣斯文豈喪而今也則亡嗚呼克生以輔時而臣道不究致用以利物而人將安仰上撫床以念往下輟相而哀至復見之於公焉大常議諡曰文貞二十年秋八月甲申遷窆於萬安山之陽燕國夫人元氏祔焉夫人故尚書右集作左丞相武靈公懷景之女也動為柔範皆可師訓及公之貴連姻帝室雖處榮盛若非在已內執謙下外睦親疏古之賢明未始兼有開元十九年三月壬戌薨于東都康俗里私第享年六十四長子均中書舍人次曰垍駙馬都尉衛尉卿季曰椒符寶郎泣血在疚皆我之有後也嗚呼𤣥堂永閟何事春秋幽篆斯在亦云不朽而巳銘曰天有密命滋液百寶時無大賢誰與明道我公允叶我德孔昭翰飛戾天羽儀清朝功遂身謝名由實美言而有立古無不死南山之下詔葬于兹後之與歸惟我太師相國崔公墓志銘穆員皇唐相國博陵公姓崔氏諱澳字某佐𤣥宗扶正厄運保維宸極戴肅宗紹復大業底綏生人事代宗朝羽儀百辟歷官二十三享年六十二以大歷三年冬十有二月二日薨于道州刺史之寢明年歸祔于洛北陽邙山今上六年追贈尚書左僕射夫人榮陽鄭氏華隂郡太夫人以子貴也公娶前夫人生冡子常山公公之清德重望洎天官亞相之位事後夫人榮陽鄭氏恭公之理命以無遺為大而黽勉拘忌出入銜恤推周公合祔之事凡龜從筮逆者數嗚呼天不以西漢韋平之美惠于吾君使常山下世永懷不集故有沒代之庸著遺令焉貞元元年秋九月季子京兆府三原丞楊孫前渭南尉元方哀奉常山之志逮乎在殯是月壬午啓博陵公之隧明月丁酉以華隂郡太夫人洎繼夫人隴西李氏之喪歸禮也公大父諱𤣥偉唐書作暐中書令博陵王於皇唐有再造勳事具國史考璩禮部侍郎襲博陵王與魏元忠趙貞固為友出處齊名公則禮部之第二子也天寶中歷屯田左司二員外郎出為歙州刺史換綿州錫金印紫綬大駕南巡以至誠大義感悟聖主中興之業見於言下擢拜門下侍郎平章事靈武即位與上宰房公琯奉冊書國璽唯新景命是時也中原有羿浞之亂東南有吳濞之釁乃三分天下之一以八柄付公俾公仗節督護河南山南江南淮南之地凡受賑專征者由公以律二千石已降唯所遷置公於是度用均賦息人繕兵外攘四封內敘多士望髙寄重怙寵者排之降左常侍領杭州刺史俄轉常州徵拜祕書監太子賔客大理卿坐失繫囚移信王府傳轉尚書左右丞吏部侍郎御史大夫大厯中元載顓政中外附之公對􅤬內廷數其不赦之罪上含之未諭公抗詞焉寺人屬垣漏言于載未幾有道州之役逞憾故也公標鑒遐明姿度𢎞粹松茂玉潔風清雨潤文以經邦為用學以為已為宗承祖禰以付子孫者清白孝友其哲人哉夫人磁州刺史曽之孫頴川太守長裕之女年若干捐公之館子曰縱實常山公繼夫人舒州刺史紹之孫左羽林録事參軍晃之女年若干遺公之録子曰璉世系表作摙仕萬年尉不幸早夭二夫人地清天和夫賢子孝四者均有之清之發祥和之應夀賢之用貴孝之報榮四者皆違之哀哉孝孫元方痛先人存沒不伸之志其號天也與吉凶俱咨于叔父揚曰先志未從不敢以見先祖是日也奉二夫人合于此室既定而常山祔焉員常山門吏見託銘石其詞曰於穆元輔歸全帝邱列樹已拱清風悠悠邈矣夫人同凋上春配忠生孝翊聖懷民賴及於國慶達其身五父雙啓九泉同閉遺厥嘉祥及爾昆裔文苑英華卷九百三十六
