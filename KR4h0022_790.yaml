body:
  text: 文苑英華巻七百九十一宋李昉等編雜箴凡百箴一首詞塲箴一首暗室箴一首兵箴一首五箴五首懼箴一首憂箴一首師友箴一首行已箴一首續虞人箴一首六箴六首動靜箴各一首酒箴一首食箴一首凡百箴梁武帝凡百衆庶爾其聼之事之大小先當熟思思之不熟致成反覆其心不定不可施令是曰亂常是曰敗政弗正一作止厥身亦䘮厥命惟慈惟恕惟孝惟敬嚴惟率下直惟厥正如彼互鄉如彼暴虎家聲不建有忝爾祖思之既熟决意而行臨難必勇見義忘生門有賢良家有忠貞勿恃爾尊驕慢滛昬勿謂爾貴長夜荒醉日不恒中月盈則虧崇山落峯高樹折枝履邪念正居安思危莫言爾賤而不愛命君子小人本無定性勿謂人㣲而以自輕張他疑為卒李衡為兵忠信孝友皆以揚名有黃叔度父牛醫者聲高海内名重天下伊尹負鼎太公屠肉寗戚飯牛傅說版築皆王覇師世受爵禄誡爾凡百勿戾勿昬人無貴賤道在則尊余重告爾莫自抑卑疑克家棟梁唯斯為吉水清照凈表直影端近取諸身無假逺觀猗歟哲人勿謂斯難詞塲箴于邵惟士立徳必先脩詞學猶殖也問以辨之古有明訓守而弗失質豈勝文文其猶質近古以降末學非倫友無求已進欲干人鍾皷在堂和聲逺至金玉無質良工以器良工謂何如琢如磨唯善克舉不知其他文之為大言不可已上應天光下符地理彼其之子云胡不知見豺則戰惟武之皮坦坦理疑作履道自强不息粲然可觀何命與力耽耽公府秩秩徳音文苑重式詞塲以箴側陳芻議敢告翰林暗室箴歐陽詹行以集作之檢身非以為人無滛無泆出處冝一孜孜碩人冥冥暗室罔從爾禮集作神罔輕爾質逺茲小惡念彼元吉勿謂傍集作旁帷上蓋天鑒無外勿謂後掩前扄神在無形天不長慝神實正直神怒天誅未始有極昔者趙盾假寐兢莊天廻厥害鉏麑已集作以亡又有集作日苻堅竊為制度神散其類蒼蠅以呼天窺神窺人無不知神忿天忿身無所隱澗松抱節幽蘭以集作有薰歳寒不變無人亦芬草木猶爾人其曷云恐懼文粹作戒慎乎其所不見戒慎文粹作恐懼乎其所不聞先師有言敢告夫君兵箴梁肅皇道無名帝始文粹作治有征故効天殺作為五兵曰王及覇功濟天下威實助徳伐乃除祻逐鹿於文粹作于原戰龍在野大寳􅀈卼非兵孰可動如决河靜踰滅火蒼蒼萬姓懸命在我所行者師所統者徳功本乎義不本乎力順之曰聖逆之曰賊成敗存亡鮮不是則衆不足恃勝不足保武王一戎奄有九有紂之百克其卒無後故長民者無曰我强莫予敢亢尋邑百萬覆乎昆陽無曰我大莫予敢制陳呉攘袂嬴氏大潰武不可翫翫則必窮兵不可廢廢則終㓙故曰天下雖平忘戰集本文粹作兵則危不教民戰是謂棄之一作師齊桓矜衆集作振矜九國以離徐偃仁義本邦亦隳傳美止戈易稱以律古之睿智神武不殺治亂之機繫於杪忽壯直且順孰云我遏旅臣斯箴敢告執鉞五箴五首并序韓愈人患不知其過既知之不能改是文粹無此字無勇也予生四文粹作三十有八年髪之短者日益白齒之摇者日益脫聰明不及於前時道徳日負於初心其不至於君子而卒為小人也昭昭矣作五箴以訟其惡云游箴余文粹作于下同少之時將求多能蚤夜以孜孜余今之時既飽而嬉蚤夜以無為嗚呼予乎其無知乎君子之棄而小人之歸乎言箴不知人之言烏可與言知人之言黙然文粹作焉而其意已傳幕中之辯人反汝以文粹作汝下同為叛謂在徐州時臺中之評人反汝以為傾謂為御史時汝不懲邪而呶呶以害其生邪行箴行與義乖言與法違後雖無害汝可以悔行也無邪言也無頗死而不死汝悔而何宜悔而休汝惡曷瘳冝休而悔汝善安在悔不可追文粹作止悔不可為思而斯得汝則勿思文粹作弗思好惡箴無悖集作善而好不觀其道無悖而惡不詳其故前之所好今見其尤從也為比舍也為讎前之所惡今見其臧從也為媿舎也為狂維讎維比維狂維愧於身不祥於徳不義不義不祥維惡之大㡬如是為而不顛沛齒之尚少庸有不思今其老矣不謹集作慎疑避諱而改胡為知名箴内不足者急於人知沛然集本文粹作焉有餘厥聞四馳今日告汝知名之法勿病無聞病其曄曄昔者子路唯恐有聞赫然千載徳譽愈尊矜汝文章負汝言語乗人不能掩集作揜下同以自取汝非其父汝非其師不請而教誰云不欺欺以賈憎掩以媒怨汝曽不窹以及於難小人在辱亦克知悔及其既寧終莫能戒既出汝心又銘汝前汝如不顧辱則集作禍亦宜然懼箴柳宗元人不知懼惡可有為知之為美莫若去之非曰童昏昧昧勿思禍至而懼是誠不知君子之懼懼乎未始㡬動乎微事遷乎理將言以思將行以止中决道符乃順而起起而獲禍君子不恥非道之愆非中之詭懼而為懼雖懼焉如君子不懼為懼之初憂箴憂可無乎無誰以寧子如不憂憂日以生憂不可常常則誰懌子常其憂乃小人戚敢問憂方吾將告子有聞不行有過不徙宜言不言不宜而煩宜退而勇不宜而恐中之誠懇過又不及憂之大方唯是焉急内不自得甚泰為憂省而不疚雖死優游所憂在道不在乎禍吉之先見乃可無過告子如斯守之勿堕師友箴今之世為人師者衆笑之舉世不師故道益離為人友者不以道而以利舉世無友故道益棄鳴呼生於是病矣歌以為箴既以儆已又以誡人不師如之何吾何以成永本作承字不友如之何吾何以増吾欲從師可從者誰借有可從舉世笑之吾欲取友誰可取者借有可取中道或捨仲尼不生牙也久死二人可作懼不吾以集作懼吾不似中焉可師恥焉可友謹是二物用惕爾後道苟在焉傭丐為偶道之反是公侯以走内考諸古外考諸物師乎友乎敬爾無忽行已箴李翺人之愛我我度于義義則為朋否則為利人之惡我我思其由過寧不改否又何仇仇實生怨利實害徳我如不思乃䧟于忒内省不足愧形于顔中心無他曷畏多言唯咎在躬若市于戮慢謔自他匪汝之辱昔者君子惟禮是持自小及大曷莫從集作由斯苟逺於集本文粹作於此其何不為事之在人昧者亦知遷焉及已則莫之思造次不戒禍焉可期書之在側以作集作為我師續虞人箴元和十五年穆宗時白居易唐受天命十有二聖業業惕惕新唐書作競競業業咸勤于唐書作厥政鳥生深林獸在豐草春蒐冬狩取之以道鳥獸蟲魚各遂其生君民朝野唐書作民野君朝亦克用寧在昔𤣥祖厥集作祖訓孔彰馳騁畋獵俾心發狂何以驗唐書作効之曰羿與康曾不是誡終然覆亡故我列聖鑒彼前王雖有畋遊樂不至荒髙祖方獵蘇長進言不滿十旬未足為懽上心忽悟為之輟畋故武徳業垂二百年降及宋璟亦諌𤣥宗怡集作温顔聽納獻替從容及璟趨出唐書作璟趨以出鷂死握中故開元事播于無窮噫逐獸于野走馬于路豈不快哉衘橛可懼噫夜歸禁苑朝出皇都豈不樂哉冦戎可虞臣非獸臣不當獻箴輙思出位敢諫從禽螻蟻命小安危計深苟禆萬一臣死甘心自噫夜歸至此四十九字唐書作審其安危惟聖之慮六箴并序皮日休皮子嘗謂心為已帝耳目為輔相四肢為諸侯已帝苟不徳則輔相叛諸侯亂古之人失天下䘮國家集作家國者良由是也帝身且不徳能帝天下乎能主家國乎因為心口耳目手足箴書之于紳安不忘危慎不忘節窮不忘操貴不忘道行古人之事有如符節者其在六箴乎心箴大化之精孕之曰人大純之華集作靈結集作形之曰心心由是君身由是臣中既齟齬外亦集作乃紛綸耳厭聞義目惡覩仁手持亂柄足踐禍門舜為天子舜不得尊其不尊者與身集作心為臣紂為天子紂乃得尊其得尊者與心為君天子之外復有尊者乃舜之心將舜之身天子之外復有卑者乃紂之心將紂之身危乎惕哉臣之諫君苟輔相不明諸侯不賓君為穢壤臣為賊塵未及於斯良可自勤嗚呼吾君無忽茲文口箴古銘金人謂無多言忽有所發不可不論既有所論復論集作謂多言中庸之士由茲保身吾謂斯銘未足以珍出為忠臣言則及君入為孝子言則及親非君與親則宜黙云謗訕之言出入􅔿淪一息之波流于無垠猜毁之言如臨帝閽集作出如鈞天鈞天之樂聞于無聞佞媚之言出如絲棼一入于人治亂不分間諜之言出如鷹鸇鷹鸇之迅一舉凌一作戾天無嗜于酒酒能亂徳集作國無味于味味能敗徳以道為飲以文為食成吾之名繄乃勉力耳箴聼於無聼黙黙𤣥性聞於無聞洋洋化源勿恃已善不服人仁勿矜已藝不敬人文勿聆鄭聲其亂乃神勿信美談其殛乃身聼誤多害聼妄多敗近賢則聦近愚則瞶堯居九重聼在民耳故得大舜授彼神器勿聼他富熒惑乃志勿聞他貴隳壊乃義慎正今非慎明古是捨是何適古樂而已目箴愧爾瞭焉集作然為吾所視髙覩古人有如隣里勿分秋毫分于邦理勿視邦祿視于人紀惟書有色艶于西子惟文有華秀于百卉見彼之倨汙甚塗害見彼之賢綿甚葛藟勿顧厲階紊吾大志勿窺怨府損吾高義入吾明者何人而已古之忠臣古之孝子上立大業中光信史苟不若是蚳蝝之類手箴惟爾之指屈伸由已勿執亂權勿樹賊子勿秉非道勿持非理勿擠孤危勿援集作授姦宄慎握吾操俾直於矢慎持吾心俾平如砥剪惡如草颺姦如粃為而不矜作而不恃智如公倕勿為小巧機如偃師勿為竒伎身髙道端毫直國史敬之戒之俟為天吏足箴惟爾跰跰為吾所先居必擇地行必依賢勿踐亂堦勿履利門勿蹈一作踏怨府勿躡禍源鳯凰乃禽不棲凡木騶虞乃獸不踐生物惟爾棲踐保茲無忽動箴動生於欲行生於為欲則不忘為則不疑吾道未䘮予何不知勿生季世有爵則危勿居亂國有祿必尸住無布怨去無取嗤迹無顯露名勿文粹作無求知聲無取猜譽無致疑坦道如砥履過蒺藜四海如家去劇縶維日慎一日念集作言茲在茲靜箴冥冥黙黙惟道之域處不違仁居無悖徳勿欺孩孺衣冠失則勿慢皁𨽻語言成隙深山雖寂集本文粹作樂豺狼爾殛深林雖安虺蜴爾螫音釋居不必野唯性之寂止不必廣唯心之適勿慠乎名要乎聘帛勿矯乎節取乎禄食躬雖已文粹作以安若敵鋒鏑味雖已文粹作以甘若含氷蘗成吾淳集本文粹作髙風唯靜之力酒箴并序皮子性嗜酒雖行止窮泰非酒不能適居襄陽之鹿門山鹿門山去襄陽南三十里後漢逸民傳云龎公與妻子入鹿門山採藥不反是山或名蘇嶺山以山稅之餘繼日而釀終年荒醉自戱曰醉士有醉士傳存於他録居襄陽之洞湖洞湖去襄陽南二十里龎徳公之舊隱也襄沔記曰龎公居上洞楊顒居下洞以􅺂䑿上目下宿小船也載醇酎一甔音眈可受一石徃來湖上遇興將酌因自諧曰酒集作醉民有酒民頌存於異書於戱吾性至荒而嗜於此其亦為聖哲之罪人也又自戱曰醉士自諧曰酒集作醉民將天也至廣不能害醉士酒集作醉民哉又何必厠絲竹之筵粉黛之産也襄陽元侯聞醉士酒集作飲民之稱也訂皮子曰子躭飲之性於喧靜豈異耶皮子曰酒之道豈止於充口腹樂悲歡而已哉甚則化上為滛溺化下為酗禍是以聖人節之以酬酢諭之以誥訓然尚有上為滛溺所化化為亡國下為酗禍所化化為殺身且不見前世之飲禍耶潞鄷舒有五罪其一嗜酒為晋所殺慶封易内而躭飲則國朝遷鄭伯有窟室而躭酒集作飲終奔於駟氏之甲欒高嗜酒而信内卒敗於陳鮑氏一有之甲二字衞侯飲于籍圃卒為大夫所惡嗚呼吾不賢者性實嗜酒尚懼為鄷舒之僇過此吾不為也又焉能俾喧為靜乎俾靜為喧乎不為靜中滛溺乎不為酗禍之波乎既滛溺酗禍作於心得不為慶封乎鄭伯有乎欒高乎衞侯乎盖中性不能自節因箴以自符箴曰酒之所樂樂其全真寧能我二本作全醉不醉於人食箴并序皮子少且賤至於食自甘梁糲集作粢糲是下同而已未嘗食於鄉里食於親戚食於州鄙有鄧邑大夫鄧邑去襄陽沔二十里春秋曰鄧之南鄙鄾人是邑也嚮皮子之名曽未相贄具厚羞以賔之皮子辭大夫訂之曰子自甘梁糲則可矣於鄉里親戚州鄙何有皮子曰一杯之食至鮮矣苟專其味必不能自抑既不能自抑日須豐其羞既日須豐其羞則貧也不能無不足因是妄求苟欲之心生窮貪極嗜之名生且大夫不見前世之味禍乎故一作在羊斟不及華元受其謀黿羹不均子家肆其禍熊蹯不熟殺宰夫而趙穿弑雙雞易䳱饋子雅而慶舍死嗚呼吾不仁者乎誠頼其因集作用所欲不可求所嗜不可得方自甘梁糲而已使我生於鍾鼎之家膏梁之門日縱異嗜年成奇欲未必不為御者之奔華元也子家之伐靈公也晋靈之殺宰夫也盧蒲癸之殺慶舍也此猶之貪集作禽獸爭食而死者矣故食於天子者則死其天下食於諸侯者則死其國食於大夫者則死其邑食於士者則死其家又焉能以鄉里親戚州鄙為讓乎大夫曰善自惟食之性不能自節亦猶酒之性也復箴以自符箴曰寧能我食不食於人既集作復食於人是食其身文苑英華巻七百九十一
