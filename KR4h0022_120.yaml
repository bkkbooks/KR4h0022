body:
  text: 文苑英華卷一百二十宋李昉等編絲帛二冰蠶賦一首海人獻冰蠶賦一首海人獻冰紈賦一首鮫人賣綃賦一首獻繭賦一首素絲賦一首直如朱絲繩賦一首斷織賦一首五絲續寶命賦一首冰蠶賦以凝沍之境成彼竒彩為韻王起懿北極之寒徑有珍蠶之處冰匪柔桑之是食匪幽室之是憑託彼峩峩且不資於春煦抽其曵曵自有樂於隂凝既違燥而就濕知同類而殊能爾其玄律窮芳歲暮百谷風壯羣川氷固遊片片之凝光映重重之積素十畝之間兮泄泄何勞六尺之內兮涓涓正沍既苦寒而不倦將載績而是務觀夫如臨如履經之營之隔皚皚之積冰吐漠漠之輕絲朱緑曵而愈出黼黻成而是資煥乎有章豈寒女之能得超然獨處信夏蟲之所疑淋漓未泮組織方逞匪繅於盆匪懸於井蠶事登矣必因一作固之而剖冰繭稅求焉將取之而越境豈比夫風戾之所生歲單之所成蠶月而方育蠶器而見營安能苦其節履其貞窺之有戰戰之色取之有沖沖之聲匪樹而遊奚感仙而化不筐而績奚假蟹為名宜乎海人見彩堯帝斯呈伊蠢蠢之繁委實生生之殊詭一作軌鼠遊冰下我亦來思龜生穴中吾乃異彼況乎雪霜是履鱗角多竒若解以東風或泉魚而共躍藏諸北陸幸輿人之見知宜乎含章勿改牽絲有待儻來獻於九重必相宣於五彩海人獻冰蠶賦以四夷即敘海不藏珍為韻張良器員嶠之山兮迥踴遐壤旁臨窮海嘉冰蠶之砥貢彰逺人之無怠原其稟氣斯異含靈有待鱗角是帶育七寸之殊形雪霜載加發五彩之異色資纎縷以成績弄杼攸勤美重錦之可持女工能即施勞且異於三盆為用寧同於五緎致美之厚罔差其妍不入獻之光必資於善良驚揖疑云邁懿一作承筐是將涉三山之重阻辭萬里之遐荒越溟漲屆帝鄉升玉殿薦君堂示彼有誠則申屈膝之贄樂我無事願充垂拱之裳蓋威靈之有及故珍物之不藏懿乎生乃因地育乃非時四氣平分屆嚴冬而成止五方異俗在中國之莫為自堯年而效美暨今日而來思足以彰德風之普洽表王道之清夷不然則修路﨑嶇洪漣濧一作澎濞校道里而纍億罹寒暑而數四匪化理而無虞曷員來之可致彼躬桑載育獻繭為均浴濯龍之水漲川館之春而後羅紈是績筐筥一作篚攸陳固在常而可悅殊自逺而為珍是知化之所被物無不臻德之所加人無或阻託兹賦以極思臻皇猷之焯敘海人獻冰紈賦以四夷即敘海不藏珍為韻韋執中憬彼員嶠兮阻夫窮海厥貢冰紈兮備諸渥彩産非中夏故致用之所資來自殊方表懷人之斯在然則蠶雖土育紈實人力稟鱗角以成質則或屈或伸因冰雪以爽容而匪雕匪飾作九服之上貢應五方之正色雖寒暑鱗次必藉至隂之時而風土所宜則異中和之域既生既育是凖是則諒因時之所致實希代之莫識所美夫得之斯難所貴夫逺而能即亦由我后洪化浹洽淳風遐被方五帝而可六比三王之可四是使貢獻逺物德格異類爰發迹於僻界肆涉遐而執贄獻土地之所生攜篋篚之云洎亦既覯止侯其敢一作孔臧不灼不濡將火鼠以比義或朱或緑豈橦花吳都賦有橦花之足方既同練雲繚繞而交映又似仙花暐曄而含芳間衮龍以發色集黼黻以成章昔苞茅不貢昭周室之壞法今冰紈入獻覩邦家之耿光非夫混一車軌茂育華夷何則不逺其逺獻兹在兹既有勞於跋涉亦多歷於歲時標為貢首雖一時之可不獻於君所知四方之咸敘是則其求匪易其用何珍儻見加於剪拂度一作庶暉光之日新鮫人賣綃賦以難得之貨色如輕霧為韻馮宿彼巨海兮鮫人是居作輕綃兮厥狀紛如不日而成固可卷而懷也候時將見期善價而沽諸出波心而月彩相絢映泉室而雲隂乍虛其來不測其麗何極行市道而莫知訪人寰而未識非運思於文繡詎用功於紡織足使大賈一作價慙容衆珍掩色豈重錦之云比諒千金而求直夫鮫者水府之所生綃者鮫人之所成竒貨聿來寧假手於蠶績變形斯至非挂籍於王征方霧縠而猶薄擬冰紈而更輕苟未知而不售恆固執而潛行皓如凝露紛若遊霧爰潔爾容不愆于素質初偕於蜃蛤名不登於貢賦知慢藏誨盜哂泉客之遺珠悟冶容誨淫恥風人之抱布偉夫遊洞穴媚清瀾趨市人逺凌波路難貴朴全真詎關乎日浴出潛離隱豈效於泥蟠且深不可測赤水之珠求得往莫可追漢臯之佩且欺是綃也成於無朕動若隨時辭海底之潛處赴日中之會期未見之字官韻屬吾皇斥無用之寶賤難得之貨徒待價而稱珍庶轉身而逺播獻繭賦以將以給宗廟之服為韻李君房冠六宫六職者公桑而已矣既卒蠶於世婦乃奠繭於天子稽諸祭典實可重考諸女工斯為美信率土而在兹亦奉先而是以當其令布明堂時更青陽蠶事既卒女工式臧然後衣禮服出棘墻奉兹珍繭盈彼懿筐纍纍乎如將薦卵皎皎乎有類凝霜既依于一作乎后亦獻于王所以申課績之勞止展威儀之孔將遂繅三盆修六服或黼或黻或朱或緑期有事於王公庶無勞於杼軸侯其禕而已注在前實足尚之享廟之容克備展敬之禮允釐斯蓋夫人之畏慎王者之肅祗不然者賦有織絍之筐貢有岱畎之絲海人奉冰蠶至止園客將絲緒來兹冠冕之服可成祭祀之儀可輯可以重其珍美可以揚其裼襲何必桑壇而世婦斯復繭館而夫人乃入俾來者既單恆日不暇給蓋欲輸於勤苦表我敬恭厚禮奉於先祖躬勤勸乃農功使三官疑作宫之有序斯百代之攸宗是以獻繭之道治國之要將取嫓於三推明至誠於九廟素絲賦以貞素持質功濟為韻張良器羽雖白賁然而輕玉雖白堅然而貞未若素絲之為用以轉化而為名匪剛克以居體實柔立而有成其正也可以如繩之直其順也可以繞指而縈故能紛以隨時浩然養素揮流水則轉增其妍染繪色則不吝其汙動必隨人寸無恆度其來也何所自園客而出茲厥賦也何地由岱畎而貢之俯乎列疑作冽井將稽㡆氏之練疑作凍見考功記實乎澤器徒為墨子之悲信干旄之望美非庶士之可持不願充嫠婦之緯不願托寒女之絲因弄杼以成韻庶補衮而為期代若好五彩我則大白以受質代若厭羣居我則衆縷以為匹非異俗而招纍將矯世而托實夫其公孫奉駕長倩趨風贈以生芻之束朂以素絲之總蓋取諸自微之著積小成功君無謂我微君無謂我細若綦之可織則假手以成勞如裳之可縫則因緣而善繫功無不給物無不濟彼服卉佩蘭衣荷帶蕙念牽絲之無日傷考槃之失計今將侔潔白以修身詠羔羊而取嫓儻黃絹之可比希菅蒯而無替第二以貞素持質積功為韻喬潭色之真者尚乎白質之細者珍乎絲真則貞而潔矣細則積而多之故君子輶德是務清以自持將經綸以濟物先組織以修詞惟絲之故不愆於素組以飾馬言好善而不忘紽之在羊時退公之有度始也重蠶事終婦功促季月候戾風爰求柔桑寧止於十畝既登分繭乃布於三宫至若三盆既繅八月成績方勤水練疑作凍爰去地尺晝曝於日吸太陽之光華夜懸諸井濡厚載之靈液於是典絲瞻臨㡆氏引繹引之於手如皓魄之飛承之以筐若凝霜之積既而嬪婦化理周禮嬪婦經緯縱橫當軒兮婀娜之織弄杼兮軋軋之聲映羅袖而增麗度金梭而轉明每知白以自守亦含章而可貞夫以白能受采文匪勝質故公孫戒於從微墨翟悲其患失青為轡兮非擬朱為繩兮未匹珍蠶耻越鄉而來移繭嗟自園而出唯彼蚩蚩之喻無愧一作如皎皎之實乃續曰絲之素兮貞且吉人之質兮清且一若一作儻見用於當時寧七襄於終日直如朱絲繩賦以題為韻薄芬物有正而可尚者其繩則直如砥之平如竿之植不舒卷以隨用終徑挺而立極有旨哉為天下式且取其直也故能為道之逆旅為義之蘧廬為人之端操為政之權輿于以方內君子所如木從之則正君受之疑作從之則聖猗歟猗歟未見朱字官韻原夫被物之際作巧之時運功疑人之手績寒女之絲是尋是尺經之綸之其為用也不資於善結其為興也蓋取於無私以之為準也則矯枉有度以之辨物也乃去邪勿疑大者逺者念茲在兹俾夫貪者栗栗智者兢兢其為舉直錯枉當有事於從繩斷織賦仲子陵儒有學而未殖敏而多識庶幾立言無念進德當年以倦中道而息余雖不知請喻斷織伊昔孟子受學輟然如疲日忘其所志月忘其所知母也賢只教之勤斯拔銛刃以一割應鳴梭而中隳且自賢亦自滿泥鈞成器玉琢成瓉鄰於墓爾則有踴躍築埋之非近於鄽爾則有嬉遊賈御之短是用居爾於學官之舍納爾於經籍之館期子襟之青青致履道之坦坦胡為乎不勤以學惟事于散苟爾學之可停猶吾織之斯斷其貌既舒其言又徐投杼惘爾操刀介如絲之傷一緯飄其無緒帛之裂千經蕩其無餘前工後拙始密今踈牽梃為之中止杼軸猶其一虛且以絲喻人以織喻學若金受礪如木斯斫夫絲可以衆而不可寡織可以勤而不可以捨一絲所纍以倍乎尋常一織所工而衣乎天下因兹細故以及大者彼婦道之信然況君子之事也故形於織女思其功一作巧移於學士念其終業暢於外美歸於中則以顧綃之理宏素王之風我友我生無落無廢學若山積心無蓬穢當求斷織之義若之何以艾五絲續寶命賦半夏生木槿榮時五月鵙始鳴楝來見切葉結綵絲襭續齊諧記五月五日祭屈竹筒貯米以棟塞其上綵絲縛之祭彼三閭蛟龍不竊祭之水曰汨羅祭之日曰端午情既本乎楚俗奉又告乎夀縷夀縷其娜色絲五紽色絲何始金閨之子畫嘉嚬於青蛾發宜笑之皓齒國風既哀其窈窕家事詎忘乎絲枲别有恩從天上飛入宫中二八春日十五玉童誰其尸之奉蘋藻於清廟何彼襛矣司衣裳於聖躬洎天子御絺之日后妃獻繭之時顔是渥丹對回鸞之十字一作子手如振素盤續命之五絲其五絲也蕙緑輕重蘭紅淺深皎皎而有鶯其領采采而亦翠其襟既比方而一色又條暢乎數尋觀其髮齊萬計花柔四赩宛委蛇盤張皇虹直植其鷺羽雜之而奪其鮮對彼鳳毛久之而寡其色别有金華别殿鈎弋靚糚褰開筐笥貢奉君王懿夀絲之禮大續寶命之天長衮冕紱班疑榮夀絲以成錦遊纓錫美比夀絲以無疆錯以五采凖日以符節也綜以萬緒盈數以尊夀也龍爛蛇伸光氣騰騰以禦邪也瑞等乾坤拜啓獻也汪濊霑止其兵辟也不待萬歲蟾蜍其理疾也豈藉單衣龍子四海銷夭札之癘百姓登仁夀之祉微臣敢問天寶之建元則曰甘露黃龍之年紀文苑英華卷一百二十
