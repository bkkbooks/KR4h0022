body:
  text: 文苑英華卷一百五十三宋李昉等編天部三雨十七首喜雨九首對雨十二首苦雨九首雜題雨三十首雨詠細雨梁孝元帝風輕不動葉雨細未霑衣入樓如霧上拂馬似塵飛詠雨唐太宗和風吹緑野梅雨灑芳田新流添舊澗宿露足朝煙雁濕行無次花霑色更鮮對此欣登歲披襟弄五絃雨李嶠西北雲膚起東南雨足來靈童出海見神女向山回斜影風前合圓文水上開十旬無破塊九土信康哉微雨僧皎然見高僧詩片雨拂簷楹煩襟四座清霏微過麥隴灑一作蕭散傍蓑城靜愛和花蘂幽聞入竹聲朝觀趣無盡高詠寄閒情山雨雜言前人一片雨半山晴長風吹落西山下滿樹蕭蕭心耳清雲鶴驚亂下水香凝不然風回雨定芭蕉濕一滴時時入晝襌雨孟郊朝見一片雲暮成千里雨淒清濕高枝散漫霑荒土隂雨二首白居易潤葉濡枝浹四方濃雲來去勢何長曠然寰宇清風滿救旱功高暑氣凉二嵐霧今朝重江山此地深灘聲秋更急峽氣曉多隂望闕雲遮眼思鄉淚集作雨滴心將何慰幽獨賴此北窗琴雨杜牧連雲接塞添迢遞灑幕侵燈送寂寥一夜不眠孤客耳主人窗外有芭蕉細雨二首溫庭筠細雨濛濛入綘紗澧湖寒食孟珠家南朝漫自稱流品宫體何曾為杏花二憑軒望秋雨凉入暑衣清極目鳥頻沒片時雲復輕沼萍開更斂山葉動還鳴楚客秋江上蕭蕭故國情秋雨前人雲雨疑鳥行滅池涼龍氣腥斜飄看碁簟踈灑望山亭細響鳴林葉圓文破沼萍秋隂杳無際平野但冥冥春雨薛能電濶疑照潺潺驚流往復還逺聲如有洞迷色似巫集作無山利物乾坤內并風竹樹間靜思來朔漠愁望滿柴關迸濕消塵慮吹風觸病顔誰知草茅徑集作者沾此尚虛閒夏雨前人何處發天涯風雷一道賒去聲隨地急殘勢傍樓斜透樹垂紅葉沾塵帶落花瀟湘無限思閒看下蒹葭雨韓琮隂雲拂地散絲輕長得為霖濟物名夜浦漲歸天塹濶春風灑入御溝平軒車幾處歸頻濕羅綺何人去欲生疑不及流他荷葉上似珠無數轉分明雨張蠙半夜西亭雨離人獨啓關桑麻荒舊國雷電照前山細滴高槐底繁聲疊漏間唯應孤鏡裏明月長愁顏春雨羅鄴兼風颯颯灑皇州能滯春寒阻勝遊半夜五侯池館裏美人驚起為花愁喜雨從駕喜雨庾肩吾西嶽浮樽桂東皇事溢類聚作浴蘭赦詔還京師類聚作兆歸神出灌壇濕風含酒氣隂雲助麥寒典農欣受職治粟喜當官復此隨車雨民人類聚作天知可安喜雨魏收霞暉染刻棟礎潤上雕楹神山千葉照仙草百花榮瀉溜高齊響添池曲岸平滴下如珠落波回類璧成氣調登萬里年和欣百靈定知丹甑出何須銅雀鳴和李司録喜雨庾信見類聚節文純陽實久亢雲漢乃昭回臨河沉璧玉夾道畫龍媒離光初繞電震氣始乘雷海童還碣石神女向陽臺雲逐魚鱗起渠隨龍骨開崩沙雜水去卧樹擁槎來嘉禾雙合穎熟稻再含胎屬此欣膏露逢君摛掞才愧之疑作乏瓊將玖無酬美且偲晚秋喜雨并序李嶠咸亨元年自四月不雨至于秋九月王畿之內嘉榖不滋君子小人惶惶如也天子慮深求瘼念在責躬避寢損膳録寃弛役牲幣之禮遍於神祗鍾庾之貸周於窮乏至誠斯盛疑作感靈眷有融爰降甘澤大極疑作拯炎亢朝廷公卿相趨動色里閈氓庶謳吟成響年和俗阜於焉可致撫事形言孰云能已乃為詩曰積陽纒首夏隆旱届徂秋炎威振皇服歊景暴神州氣滌朝川朗光澄夕照浮草木委林甸禾黍悴原疇國懼流金眚人深懸磬憂紫宸兢履薄丹扆念惟疑作推溝望肅壇場祀寃申囹圄囚御車遷玉殿薦菲撤瓊羞濟窘邦儲發蠲窮井賦優服閒雲驥屏冗術土龍修睿感通三極天誠貫六幽夏祈良未擬商禱詎為儔穴蟻禎符應山蛇毒影收騰雲八際滿飛雨四溟周聚藹籠仙闕連霏繞畫樓旱陂仍積水涸沼更通流晚穗萎還結寒苗瘁復抽九農歡歲阜萬㝢慶時休野洽如坻詠途喧擊壤謳幸聞東李疑道欣奉北場遊西山祈雨是日輒應因賦詩言事張九齡見文粹茲山藴靈異走望良有歸丘禱亦一作雖已久氓心難重違遲明申藻薦先夕旅嵓扉獨宿雲峰下蕭條人吏稀我來不外適幽抱自中微靜入風泉奏凉生松栝圍窮年滯逺想寸晷閲清輝虛美悵無屬素情緘所依遭一作詭隨嫌弱操羈束謝貞肥義濟亦吾道誠存為物祈靈心歘以應甘液幸而飛閉閣且無責隨車安敢希多慙德不感知復是耶非和崔尚書喜雨前人積陽雖有悔集作晦經月未為災上念人天重先祈雲漢回仁心及草木號令起風雷照爛隂霞上交紛瑞雨來三農被集作破黍稷四逺集作逹屏氛埃池溜因添滿林芳為灑開聽中聲滴瀝望處影徘徊惠澤成豐歲昌言發上才無論驗石鼓不是御雲臺直煩皇恩浹崇朝遍九垓喜雨杜甫南國旱無雨今朝江出雲入空才漠漠灑迥已紛紛巢燕高飛盡林花潤色分晚來聲不絶應是集作得夜深聞同薛員外喜雨詩兼上楊使君釋皎然積旱思飛灑蒸民喜亦傾郊雲不待族雨色飛江城燋稼濯又發敗荷滋更榮時隨霧縠重集作柳絲輕一宿恐魚飛數朝徴鶴集作鸛鳴毒暑澄為冷高塵滌還清乃知隂隲數制在理化情及此接歡賀臨風聞頌聲喜雨白居易西北油然雲勢濃須㬰雱沛雨飄空頓蘇萬物焦枯意定看秋郊稼穡豐賀雨前人皇帝嗣寶厯元和三年冬自冬及春暮不雨旱爞爞上心念下民懼歲成災凶遂下罪已詔殷勤告萬邦帝曰豫一人繼天承祖宗憂勤不遑寧夙夜心沖沖元年誅劉闢一舉清巴卭二年戮李錡不戰安江東顧惟眇眇德遽有巍巍功或者大一作天降沴無乃警豫躬上思答天戒下思致時雍莫如率其身慈和與儉恭乃命罷進獻乃命賑饑窮宥死降五刑已責二字出左傳文粹作責已非寬三農宫女出宣徽廄馬减飛龍庶政無不舉皆出自宸衷奔騰道路人傴僂田野翁歡呼相告報感泣涕沾胸順人人心悅先天天意從詔下才七日和氣生冲融凝為悠悠一作油油雲散作習習風晝夜三日雨凄凄復濛濛萬心春熙熙百榖秋芃芃人變愁為喜歲易儉為豐乃知王者心憂樂與衆同皇天與后土所感無不通冠珮何鏘鏘將相及王公蹈舞呼萬歲列賀朝廷中小臣誠愚陋職忝金鑾宫稽首再三拜一言獻天聰君以明為聖臣以貞為忠敢賀有其始亦願有其終對雨對雨梁朱超當夏苦炎埃習靜對花臺落照依山盡浮凉帶雨來重雲出類聚作吐飛電高棟響行雷灑樹輕花發滴沼細萍開泛泳縈階草奔流起砌苔無因假輕蓋徒然想上才對雨有懷北齊劉逖重輪宵犯畢行雨旦浮空細落疑含露類聚作霧斜飛覺帶風濕槐仍足緑沾􅘟類聚作桃更上紅無由似𤣥豹縱意坐山中閒居對雨陳隂鏗四𡨕一作冥飛早一作旦雨三徑絶來遊震位雷聲發離宫電影浮山雲遙似帶庭芥一作葉近成舟茅簷下亂滴石竇引潨流寄言一高士如何麥不收一作皆藝文類聚單于川對雨蘇味道見集本飛雨欲迎旬浮草已送春還從濯枝後來應洗兵辰氣合龍祠外聲過鯨海濵伐邢知冇屬已見靜邊塵對雨李白集無此詩卷簾聊舉目露濕草綿綿古岫披雲毳空庭織碎煙水紅疑作紋愁不起風線重難牽盡日扶犂叟往來江樹前和段學士南亭春日對雨喻鳬晨飛晚未休蘭閣客吟愁蕭颯柳邊挂縈紆花底流聲繁乍雜集疑作有籟灑急不成漚經夕江湖思煙波一釣舟春暮對雨劉得仁春暮雨微微翻疑墜葉時氣䝉楊柳重寒勒牡丹遲未夕鳥先宿然疑晴人有期何當廓隂閉新暑竹風吹精舍對雨戴叔倫空門寂寂淡吾身溪雨微微洗客塵卧向白雲晴未盡任他黃鳥醉芳春對雨愁悶寄錢大郎中劉灣積雨細紛紛饑寒命不分攬衣愁見肘窺鏡覔從讀如從理入口之從文九陌成泥海千山盡濕雲龍鍾驅欵段到處倍思君盧氏池上對雨溫庭筠簟翻凉氣集溪上潤殘棊萍皺風來後荷喧雨到時寂寥閒望久飄灑獨歸遲無限松江恨煩君解釣絲春初對暮雨前人淅瀝生叢篠涳疑濛泫網軒暝姿看逺樹春意入塵根㸃細飄風急聲輕入夜繁雀喧爭槿樹人靜出蔬園瓦濕光先起房深影易昏不應江上草相與滯王孫夏日對雨裴度登樓逃盛夏萬象正埃塵對面雷嗔樹當街雨趂人簷疏蛛網重池濕燕泥新吟罷清風起荷香滿四鄰苦雨苦雨寄房休集作四昆季高適獨坐見多雨况茲兼索居茫茫十月交集作郊非窮隂千里餘彌望無端倪北風擊林烟白月集作日眇難見集作覩黃雲爭卷舒安集作焉得造化功曠然一掃除滴瀝簷宇愁寂寥談笑踈泥塗擁城郭水潦盤丘墟惆悵憫田農徘徊傷里閭曽是力耕稅曷云無斗儲萬事切中懷十年思上書君門嗟緬邈身計念居諸沉吟顧草茅鬱怏任盈虛黃鶴集作鵠不可羡鳴雞時起豫故人平臺側高館臨東渠兄弟方荀陳才華貫集作冠應徐彈琴自多暇飲酒復集作更何如知人想林宗直道慙史魚推集作携手風流在開襟鄙吝袪寧能訪窮巷相與對家一作嘉集作園蔬在滁苦雨歸桃花崦傷親友略盡顧况廢氣忝殘生後來亦先夭詩人感風雨長夜何時曉去國官情無近鄉歸夢少庇身絶中援甘靜忘外擾麗景變重隂洞山空木表靈潮若可通寄謝西飛鳥苦雨前人朝與佳人期碧樹生紅蕚暮與佳人期飛雨灑清閣佳人窅何許中夜心寂寞試憶花正開復驚葉初落行騎飛泉鹿卧聽雙海鶴嘉願有所從安得處其薄南海苦雨寄贈王四侍御楊衡炎風雜海氣暑雨每成霖塗泥親杖屨苔蘚漬衣襟念近劇懷逺涉淺定知深暗溝夜滴滴荒庭晝霪霪折簡展離曠理徑俟招尋處隂誠多慘况乃觸隅禽此詩二百五十七卷重出今已削去雨中寄張慱士籍侯主簿喜韓愈放朝還不報夜半一作半路踏泥歸雨慣曽無節雷頻自失威見墻生菌遍憂麥作蛾飛歲晚偏蕭索誰當救晉饑此詩二百五十卷重出今已削去注異同為一作苦雨行劉禹錫悠悠飛走情同樂在陽和歲中三百日常苦風雨多天人信遐逺時節易蹉跎洞房有明燭無乃酣且歌和韓侍郎苦雨白居易潤氣凝柱礎繁聲注瓦溝暗流窗不曉凉引簟先秋葉濕蠶應病泥稀燕亦愁仍聞放朝夜誤出到街頭酬王集作任疇協律夏中苦雨見寄姚合銀漢波瀾溢經旬雨不一作未休細聽宜隔牖逺望憶高樓風急飄還斷雲低落更稠走童驚掣電飢鳥啄浮漚絲網張空際珠繩續瓦溝青蛙多入户潢潦欲勝舟雷怒疑山破池渾似土流灰人漫禳厭水馬恣沉浮廣陌應翻浪貧家集作居貧恐作湫陽精藏不耀隂氣盛難收逺色重林暮繁聲四壁愁集本無此四句望晴思見日防冷欲披裘枕膩集作潤眠還懶車羸出轉憂琴書凉簟靜燈燭夜窗幽樹暗蟬吟咽巢傾燕語愁薄煙凝竈額荒草覆墻頭天上那能問龍邊本不求集作豈易求此兩句仍在幽字韻下下床先杖一作仗屐汲井抵瓢集作恐飄甌逺思成涯涘佳期念阻修集作酒思凄方罷詩情耿始抽此二句仍在頭字韻下殷勤集作勞君寄新什清韻益難酬集作終日不能酬苦雨前人江昏山半晴集作山昏天半晴南阻絶人行葭菼連雲色杉松共雨聲早秋仍燕舞深夜更鼉鳴為報迷津客訛言未可輕雜題雨賦得入階雨梁簡文帝細雨階前入灑砌復沾帷漬花枝覺重濕鳥羽類聚作翻飛遲儻令斜日照併欲似蓬類聚作遊絲和太子春林晚雨梁劉孝威雲樹交為密雨日共成虹雷舒長男氣枝搖少女風葉珠垂滴水檐繩下􅘇空蝶濡飛不揚花沾色更紅明離信養德能事畢春宫誰堪偶鳯吹唯有浮丘公行還值雨又為清道所駐前人齊楚盤石貴韓吳異姓王俱來早朝罷相隨出建章喧呼驚里閈呌咷駭康莊皂騶同隼擊青櫜細櫜以盛印似鷹揚掖門南北逺復道東西長幡旗爭絡繹官騎鬱相望微風生棨傳輕雨潤帷裳油衣紛競道小蓋列成行八舍便繁密五營輿服光回車避司𨽻俄側也軒揖內郎况余白屋士自依卑路旁日月雖臨照仄陋難明敡早榮羞日及晚知慙豫章徒抱凌雲意終愧摩天翔安能久淪辱圖南㑹有方望雨前人清隂蕩暄濁飛雨入階廊曕空亂無緒望霤耿成行交枝含曉潤雜葉帶新光浮芥離還聚沿漚滅復張浴禽飄落毳風荇散餘香瓊綃疑掛綃幕象簟列華床侍童拂羽扇厨人奉濫漿初學記類聚並無此四句詳此詩象簟列華床乃夏日雨也按內則有漿有濫注濫凉也寄言楚臺客雄風詎獨凉擬雨梁虞騫見類聚清風送凉氣薄暮蕩炎氛虹照漣漪水電出嵯峨雲落暉散長足細雨織斜文秋雨卧疾劉孝綽賈君徭役少潘生民務稀及此同多暇高卧掩重闈寂寞桑榆集作榆葉晚滂沱曀不晞電隙時光帳風簾乍扣扉集作如飛望夕雨劉苞崇朝遘行雨薄晚屯密雲緣階起素沫竟水散圓文河柳低未舉山桃落已紛清樽久不薦淹留遂待君雨從箕山來宋之問雨從箕山來條集作倐與飄風度精明西風集作峯日緑縟南溪樹此時客精廬幸䝉真僧顧深入清净理妙斷往來趣意得兩契如言盡共忘喻觀花寂不動聞鳥懸可晤向夕聞天香留戀不能去春夜雨杜甫好雨知時節當春及集作乃發生隨風潜入夜潤物細無聲野徑雲俱黑江船火獨明曉看紅濕處花重錦官城朝雨凉風曉蕭蕭江雲亂眼飄風鴛藏近渚雨燕集深條黃綺終辭漢巢由不見堯草堂樽酒在幸得過清朝雨前人萬木雲深隱連山雨未開風扉掩不定水鳥去集作過仍回蛟館如鳴杼樵舟豈伐枚清凉破炎毒衰意欲登臺黃梅雨前人南京西集作犀浦市集作道四月熟黃梅湛湛長江去溟溟細雨來茆茨疏易濕雲霧密難開竟日蛟龍喜盤渦與岸回雨不絶前人鳴雨既過小雨微集作漸細微映空搖揚如絲飛階前短草泥不亂院裏長條風乍稀舞石旋應將乳子行雲莫自濕仙衣眼前江舸何匆促不得集作未得安流逆浪歸江山阻風雨岑參江上風欲來泊舟未能發氣昏雨已過突兀山復出積浪成高丘盤渦為嵌窟雲低岸花掩水漲灘草沒老樹蛇退皮崩崖龍退骨平生抱忠信灘險殊可忽詠浮漚為辛明府作鄭縉行潦散輕漚清規晚一作吐未收雨來波際合風起浪中浮晶晃明苔砌參差繞芥舟影疑星泛曉光似露涵一作含秋皎皎珠同净漂漂梗共流潔容無變染圓知有謙柔欲作微涓效先從淡水遊此詩一百六十四卷重出今已削去注異同為一作酬劉員外雨中見寄錢起苦雨滴蘭砌凄風生葛衣潢汙三徑絶砧杵四鄰稀分與𤣥豹隱不為湘燕飛慙君角巾折猶肯問衡闈陸勝一作瑛宅秋暮雨中賦韻一作探韻同作張南史見間氣集同人永日自相將深竹閒園偶辟疆已被秋風教憶鱠更聞寒雨勸飛觴歸心莫問三江水旅服從沾九月霜醉裏欲尋騎馬路蕭條幾處有垂楊此詩二百十五卷重出今已削去酬苗員外仲夏歸郊居遇雨見寄盧綸雷響風仍急人歸鳥亦還亂雲方至水驟雨已喧山田鼠依林上池魚戲草間因茲集作高屏埃霧一詠一開顔夜雨見投司空曙出户繁星盡池塘暗不開動衣凉氣度遞樹逺聲來燈外初行電城隅忽隱雷因知謝文學曉望北塵埃酬韓祭酒雨中見寄張籍雨中愁不出隂黑盡連宵屋濕惟添漏泥深未放朝無芻憐馬瘦少食信兒嬌聞道韓夫子還同此寂寥和李僕射雨中寄盧嚴二給事前人郊原飛雨至城闕濕雲埋逆㸃時穿牖浮漚欲上階偏滋解蘀竹併灑落花槐晚潤生琴匣新凉滿藥齊從容朝霧退一作後放曠掖曹乖一作儕盡日無來客閒吟感此懷奉和門下相公雨中寄裴給事姚合曉起門看雨垂簷自滴階風清想林壑雲濕似江淮石信浮漚重泥從積蘚埋氣消濃酒力心助獨吟懷颯颯通琴韻蕭蕭靜竹齊綵毫無限思念與夕郎乖江上雨寄崔碣杜牧春半平江雨圓文破蜀羅聲眠蓬底客寒濕釣來蓑暗淡遮山逺空濛著柳多此時懷一恨相望意如何此詩二百一十六卷重出今已削去夜雨前人九月三十日雨聲如初秋無端滿階葉共白幾人頭㸃滴侵寒夢蕭騷著淡愁漁歌聽不唱蓑濕掉回舟大雨行前人東垠黑風駕海水海底卷上天中央三吳六月忽悽慘晚後㸃滴來蒼茫錚棧雷車軸轍壯矯躍集作躩蛟龍爪尾長神鞭鬼馭載隂帝來往噴灑何顛狂四面崩騰玉京仗萬里縱橫集作橫牙羽林槍雲纒風束勢集作亂歊磕黃帝未勝蚩尤强百川氣勢苦豪俊坤關密鎖愁開張太和六年亦如此我時氣壯神洋洋東樓聳首看不足恨無羽翼高飛翔盡召邑中豪健者濶展朱盤開酒場奔觥槌鼓助聲勢眼底不顧纎腰娘今來集作年闒茸鬢已白竒遊壯觀唯深藏景物不盡人自老誰知前事堪悲傷雨夜贈元十八白居易卑濕沙頭宅連隂雨夜天共聽簷溜滴心事兩悠然把酒循環飲移床曲尺眠莫言非故舊相識已三年秋雨夜眠前人凉冷三秋夜安門一老翁卧遲燈滅後睡美雨聲中灰宿溫瓶火香添暖被籠曉晴寒未起霜葉滿階紅雨夜寄馬戴賈島芳林杏花樹花落子西東今夕曲江雨寒催朔北風鄉書滄海絶隱路翠微通寂寂相思際紅江殘漏中蜀中春雨鄭谷海棠風外獨霑巾襟袖無端惹蜀塵和暖又逢挑菜日寂寥未是探花人不嫌蟻酒衝愁肺却憶漁蓑覆病身何事晚來微雨後錦江春學曲江一作池非春荆渚八月十五日夜值雨寄同年李嶼前人共待清光集作暉光夜翻成暗淡秋正宜清路望濳起滴階愁棹倚袁公集作宏渚簾垂庾亮樓桂無香實落蘭有露花休玉漏添蕭索金樽阻獻酬明年佳景在相約向神州文苑英華卷一百五十三
