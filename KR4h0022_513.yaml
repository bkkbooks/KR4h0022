body:
  text: 文苑英華巻五百十三宋李昉等編射御門三十一道澤宫置福判六道張侯下綱判五道不以騶虞為節判一道不以采蘋為節判二道郷射司正倚旌判一道賔觀武藝判一道矜射判二道祭侯判五道馬驚師徒判七道射不穿札判一道澤宫置福判甲司澤宫將祭而習禮所由置福不設中御史劾之訴云自邦國已下則有名制王者之式未之前聞對鄧承緒六藝之脩五善之備禮稱觀徳義在興賢豈加爵而益封實選士而預祭惟甲何者司射澤宫見狸歩之張侯以鹿鳴而應樂設中置福用陳矢筭之儀釋獲建旌遂明多少之數賔主存乎百拜公卿繼乎六耦能其中質定以和容豈罰觥之為慙亦削地而成耻禮之美者徳實在兹况名位不同自邦君而節制器物有等寔王者之殊儀卑不踰尊上得兼下法官所効敢奉守官之誡訴者有辭恭聞克謹之義同前潘文環祭以訓恭射唯觀徳出正中質將定於賢愚備物致用是昭其典禮瞻言爾甲司此澤宫張熊侯以示威酌貍歩而尊美飲筭初列爰立豐以表儀射器斯存亦置福而供命然以髙卑異等名位殊倫若事屬諸侯固宜同於相圃而舉非王者爰可論於設中既無共職之愆寧懼守官之効同前程休刑措化成教尊義立將崇大射爰𨽻舊章先習禮於澤官且觀徳於方國恭惟彼申天子有司展四體而能勤事一人而匪懈固合在儀必備豈可立事無規今則乾道昭回天光臨下捨矢如破雖則射不主皮置福無中如何發彼有的法官之効以告闕於今供司存之辭訢未聞於古制雖五等有數四侯既張而兹禮不存斯人何罪同前蔣凖射以觀徳禮先擇士是明五善之義豈從六藝之卑况聖敬日躋王假有廟將期預祭之事是知必爭之道甲學乎相圃司彼澤宫并夾既陳决拾斯似思備物以致用奚曠官以速尤竟不具於鹿中乃空歌於貍首末學兹甚不敏則多天子之儀用或兼下諸侯之禮事乃舉中使揚觶而有言自發的而足獻遂合㑹稽之美每抽厨子之房肅慎之貢仍韜夏后之服繄謂同前裴子建選贒觀徳存乎射義為邦之度因文物以肅陳將祭之儀必先朝而慎習於是審兹貍歩張彼熊侯揖至譲升和容顯於相圃持弓挾矢雅頌彰乎澤宫司馬分進退之規王人奏蘋蘩之節百禮式序五善無替既有備於置福復何遽於設中法官執此簡書欲行觥撻訴者確乎執理慿於名制用捨之道抑有司存且列國諸侯擇士而祭自守彛憲無相奪倫事乃屬於邦君罪寧歸於彼甲緬稽古訓斯為正典得失之㫖居然可知同前劉肱大聖嗣文明時偃武弧矢之利可以訓戎禮容之規於焉觀徳將因捨奠是用求賢甲為主司素非違一作逹吏澤宫之制何昧周官相圃之儀旋乖魯典既而工歌九夏庭列三侯决捨既似於琱弓并夾則陳於揚矢標名一作中標鹿兕或有國之前聞皮稱熊豹葢王者之恒制語而有訴雖以執禮為詞闕而不供終當毁櫝之責請依中典以勸無哀張侯下綱判景張侯下綱不及地武賔遂貫之監者謂無揖讓之禮不坐奠豐上賔袒决而退對劉璀六藝崇射五善遵禮景也張侯職効能於棲鵠賓之遂貫遽呈妙於啼猿曽不知搢䇿有揖讓之儀飲筭行多少之節下綱不及如堵奚曕監者有知奠豐是闕人而無禮袒决難留以之觀徳從何擇士若不論辜是誣恒憲同前王諲國將郊禘王有聘享宴而習禮射以觀徳大侯既抗敦一作彫弓乃堅天子張熊武之威諸侯異朱𤣥之殺不及地武何所失儀髙下其綱誠為順理然禮崇三讓無聞固請之辭射有五容先招不至之誚雖飲於少筭自可奠豐而獻爾發功方觀袒决於賔㣲於一作為捨禮在景何所愆儀但欲旌能期於書過同前考贒論材審藝觀徳爰設三侯之禮以崇五善之儀貍首登歌是求於合雅采蘋斯奏何先於主皮惟彼武賔齒于其位宜揖讓中節允諧一作叶於觀善何穿洞非儀坐彰於伐徳綱則未下射何速如自貽監者之尤遂干司馬之政不奠於坐誠叶周人之式袒决而還亦符相圃之事雖君子之爭戒一作或所茍得而士師之律未可深文宜從肆緩謂叶平典同前姚承構開彼澤宫臨兹相圃可以觀徳必也射乎所以揖讓而升審固而動矢流貫的侯服親於主皮樂奏采蘩笙鏞備於和體豈失于獻士而亂於簡能下綱靡及於地前飛羽虚驚於雲際坐奠斯闕袒决而還宣父之妙誰崇仲由之令何寄且君子之爭應兑於嚴科小人伐伎湏從於薄黜禮律之道斯合宜然同前嚴迪景遵貍歩張是熊侯地武茍合於舊儀下綱未踰於先則賔則有藝執射多功舒巻寧懼於出正發縱每聞於破的彤弓既彀與明月而合規白羽纔飛狀流星而遂貫然而禮成揖讓不獨主皮徒矜袒决之容未覩奠豐之事作而非法不足書能人而無儀誠湏寘罰不以騶虞為節判大射之禮主司不以騶虞為節對㓂泚禮經之設寔和天地凡在有司理資䖍恪况大射斯御大侯既張誦貍首以成章歌騶虞而應節匪文匪武載光於禮容爰逰爰豫一作爰豫爰謀式備於彛典崇折爼之儀助發生之氣豈得弨弓之㫖致闕公宫彼茁之規猶虧相圃位已乖於司射法湏加於秩宗請寘鷞鳩之科以懲樹皮之失不以采蘋為節判甲㑹射制氏不以采蘋為節所由加罪訴稱非三命已上對韋述射以習戰樂本宣風雖君子之所爭乃先王之修訓惟甲幸逄光宅早踐榮班羔裘以朝未登三命之秩主皮為㑹咸兹五善之儀興武與同必期多筭和容中質不出于正節未及於采蘋事有歸於制氏欲加其罪竊謂誣辭且物有司存孔門垂教失官為慢春秋所規節以樂章誠則大夫之禮非禮不動實惟先聖之謩師古未表其明知禮反招其咎所由斯罰有異繩愆制氏有言誠為舉枉同前馮萬石三皇威察利用弧矢六藝和容率由飲射故澤宫相圃揆尊卑之節出正中質定賢愚之分既叅之以樂章必備之以禮物甲利乃習妙言㑹其儀豈徒主皮之善將勤君子之爭制氏頗曉鏗鏘班乎樂職屬斯登降須狥疇人寧宜簨􅙇不修鍾皷靡奏闕於所守罪亦何疑至如武侯熊侯自天子而斯達采蘋采蘩一作采蘩采蘋由命士而有差理合各附等威咸依節制訴非三命已覺詞游將扣兩端須知甲品請更閲實然後定刑鄉射司正倚旌判甲司正命獲者倚旌為有司所紏詞云兼官無事對李思元國有燕饗代存飲射貴以觀徳先乎踐禮故比兹六耦是辨其等威抗彼三侯必慿乎班列眷言伊甲則曰司存寔掌厥儀克閑乃事序賔明揖讓之則進或厯階賛射辨升降之儀退惟輔序而决捨是佽弓矢斯調射人發功非無破的之藝司正命獲爰有倚旌之禮將欲乘其多筭罰以弛弓使夫沮勸必明威容可則况職不在備禮或從宜無事則兼寧云離局之過有司所紏實負曠官之責賔觀武藝判乙為賔觀武藝主人三拜不答兩拜責其闕禮對李暄侯以明之射有觀者設中筭以章物立其賔以相儀乙鄉黨稱賢進退有度將拜至而拜洗且三讓而三揖一作接是欲體和容之節知曲藝之美匪惟訓人抑又觀徳豈可空瞻棲鵠未盡主皮尚陳旅酬必候一作侯興答將疑飲數故異禮容既不爽於威儀亦何勤於偏拜謂之有闕宜乎未甘矜射判樊少翁與箭張廻各自矜尚詣府以廻優少翁不伏對李辿武有七徳所以保大定功器重五兵所以禁暴戡亂在三端而不棄居六藝以為先張廻擅飛衛之功樊少得養由之妙同觀挂蝨並斷征鳬暫彎繁弱之弓載發忘歸之矢俱窮中質各盡和容未見於撝謙遽聞於矜尚君子無爭必也射乎府司既曰廻優少翁如何不伏同前郭行則少翁繁弱靈苖張廻忘歸逺系各是良弓之子俱膺羙箭之名類飭角以甄形攸資定體固鐵羽而成質期乎䧟堅蓋取諸暌用明弧矢之利道該於藝允覿和容之能非唯取貴禮經固亦以威天下是處顔高之室稱乎六鈞寔發養由之弦先於百中論其飲羽本為相資誥以主皮事非獨善瞻言繕造何劣何優據其精靈徒矜徒尚文戰而失覺先鳴齊驅而適聞後殿少翁不伏雅叶道方張廻非優謂符彛典祭侯判得甲祭侯辭曰強飲食御史紏非息宴之禮不伏對袁歆唯祀與戎禮之大者觀射見徳侯其是歟俾徼福於爾靈將示威於我衆所以司馬張皇於五射梓人盛餙於三侯繫而有儀下綱不及於地武祭以盛禮上射更揖於堂楣是則爼豆克陳熊武相間多筭少筭射人或觥於示疑作爾爵强飲强食祝史無愧於我辭冀必懲於不庭是有祈於介福雖非宴禮寔曰武經既庶幾於戢兵復何疑乎致祭乘騘之紏斯心奚至於加諸而中鵠之誠彼甲未越其典則禮不瀆也神其吐之同前魏兼柔揖譲而升發彼以析爾爵正鵠茍失必也反求諸身甲主張三侯是供五射簋貳以薦初陳强飲强食之辭金奏既動間以采蘩采蘋之節屬九圍有截五兵載槖宜習禮於澤宫可觀徳於相圃下綱不及於地武中掩以待於張弓惟若寧侯則抗而祝也所以擇士乃與之祭焉稱非息宴妄為柱史之紏觀其守職未失梓人之䂓無咎可徴甲免夫戾同前李挺澤宫舊典相圃遺法實備多儀亦彰異數至若一日之澤息物休農四牡既朝勞勤式宴於是取像貍歩設廣庭之禮物載張獸侯量下綱於地武射之義也豈直主皮神則慿焉必侯工祝羞酺醢之嘉薦陳儆戒之順辭或中鵠而升則實爵以獻終乃示其慈惠庶將强其飲食正依經禮寧畏簡書爰詢袹署之言未達梓人之職甲之不伏可謂守官同前秦用五善與能三侯是列俾射夫有獻庶君子必爭甲藝窮决拾心惟審固成規月滿則先張之弧如破風馳能發彼有的對梓人之成器受司馬之滿觴祭則有經辭豈失舊既不寧是抗非貽福謂何且使臣農夫息宴以禮而主皮栖鵠降殺異宜如或獸侯斯張是則豸冠虚觸尚迷岐路更佇指縱同前姜庭琬祭以主敬射以觀徳三侯既設遂聞熊豹之差二簋可享爰申脯醢之奠甲進退有度揖讓而升方備於五善詎界於六藝有如武子之妙以取牛心類后羿之能無全雀目祭必如在神當格思唯寧者立以繼代不屬者抗而射女强飲强食陳祝史之正辭克禋克祝介曽孫之景福必也正其齒位稱彼兕觥將勞農以休息乃示宴以惠慈鐵冠所紏恐未三思鉛刀見用終資一割同於噬腊難以甘心馬驚師徒判卜氏為御馬驚師徒小却監軍紏為無勇卜氏遂死之或誄其功監軍請寘乎理誄者執云非罪對梁庶戎御近官事資良藝或逐禽而過表且并轡而授綏克敵是因搴旗攸屬卜氏叅名訓僕奉職佳兵懸父之焉或奔晉侯之車將敗師徒小却鉦皷㣲旋既獲譴於言司載興慙於無勇鳴轂小故猶有伏劔之臣敗軍大尤須聞免胄之客是用捐軀不恡一作吝視死如歸東野傾轅雖則其罪國書殞首終用可嘉足比乘丘之能宜錫滑臺之誄庶執死節以寵鬼雄同前楊仲昌師貞以律大易㣲言羣吏聽誓先王垂則卜氏致躬厮役頗事戎昭似乘丘之惣立寧執御而無勇遂使秋一作伙還塞比介胄慙容日暮城南皷􅎏傷氣監軍執簡而往操刀必割冀圖賞罰以制忠邪但授一作援綏匪愆流矢斯驗嘉赴敵以徇節亦議功而何妨禮經孔昭誄徳惟允實卜也之非罪宜捨諸而無惑同前吕令問將執御乎必使能者伎茍有素失乃非愆卜氏御戎豈其敗績六藝之末尚勤夫子之言十乘之先遂執王良之轡既而師貞以律騎勇爭鋒外强中乾忽陸離而莫制大軍小將却遷延而欲奔非馬其人異叔牂之没怨有矢在肉知賁父之非罪圉人以告誠合誄之生也不欺將子無怒同前梁渉赤羽相向魯戴乘丘之役紅塵交飛國驂賁父之御事疋䝉馬力均投牛變非銜撅驚為流矢殊郤克之不止因潰齊軍成魯師之小却便亡卜氏汙朱輪豈敢言病驗白肉乃知非罪逝者既往吾誰與歸死而可哀士始有誄此焉寘理孰曰監軍雖欲必也正名是故惡夫侫者同前禇思光卜氏習聞秋駕工隨水曲屬出車檻檻有六月之師將執訊連連成九天之勝而深谿難拔小駟易驚殊攝叔之致師有懸賁之敗績是無勇也於此死之監軍紏慝未窮通憲必若馬為流矢所驚人殊執轡之罪則死非其道一作過誄得其功率象前聞寧宜寘理同前楊慎金邉候時驚聞列將之授師戎車啓行有僕夫之執御白刃交下望軍麾而且前紅塵四飛聞戰皷而俄駭甚杇索之為御因交綏而小却疇昔為政雖異羊斟不仁今時敗績還同卜國無勇結纓而盡復矢空非請易其名葢難霑於下士將寘于理焉可罪於亡魂雖聞舊經非辜當失不誄不罪斯焉取斯同前劉濬登庸取士六藝稱先設策除兇五兵是要卜氏為御招尤於馬驚監軍正刑志存乎鸇逐昔懸賁理御嘗聞流矢之災卜國佐驂遂彰白肉之患有功必賞有犯必科未明敗績之由須覈馬驚之故請重尋詰然定是非庶使幽𡨕申寃功過昭著即寘於理深渉乖踈射不穿札判得甲獻弓蹲甲而射不穿一札有司詰之辭云液角者不得牛戴牛角對白居易貫革乖方則宜致詰相角失理亦可徴辭甲奠體以成執簫而獻中規無一作不撓六材雖則合三捨抜有愆七札不能穿一且集作宜恐傷人之甲不曰堅乎而非戴牛之弓無自入也液信虧於巧者射遂爽於臧兮周典足徴彼自乖於三色楚君明試此無愧於二臣咎且有歸責之非當文苑英華巻五百十三
