body:
  text: 文苑英華巻七十一宋李昉等編樂一筝賦一首金錞賦一首琵琶賦一首笙賦一首洞簫賦一首塤賦一首筝賦梁簡文帝江南之竹弄玉有鳴鳳之簫焉洞隂之石范女有遊仙之磬焉若夫排雲入漢之美含商觸徵之奇罷雍祠之麗響絶漢殿之容儀别有泗濵之梓聳幹孤峙負隂拂日停雪栖霜嶔崟岝崿𤣥嶺相望寄丹崖而茂采依青壁而懐芳奔電碭突而彌固嚴風掎㧞而無傷途畏峯澁人羣罕至乃命䕫班翦而成器隆殺得宜修短合思矩制端平雕鎪綺媚既而春桑已舒暄風晻曖丹荑成葉翠隂如黛佳人採掇一作捋動容生態值使君而有辭逢秋胡而不對里閭既返伏食蠶飢五色之縿雖亂八熟之緒方治異東垂之野繭非山經之漚絲於是制絃擬月設柱方時若夫鏗鏘奏曲温潤初鳴或徘徊而藴藉或慷慨而逢迎若将連而類絶乍欲緩而頻驚陸離抑按磊落縱横奇調間發美態孤生若将往而自返似欲息而復征聲習習而流韻時怦怦而不寧如浮波之逺驚若麗樹之争榮譬雲龍之無蔕如笙鳳之有情學離鵾之弄響擬翔鴛之妙聲朱絃在手擊重還輕爾其曲也雅俗兼施諧雲門與四變雜六列與咸池王讚既工阮賦亦奇曹后聽之而懽讌謝相聞之而涕垂至若登山望别之心臨流送歸之目隴葉夜黄闗雲曉伏覩獨鴈之寒飛望交河之水縮聽鳴筝之弄響聞兹絃之一彈足使遊客戀國壮士衝冠若夫楚王怡蕩楊生娱志小國寡民督郵無事乃有燕餘麗妾方桃譬李本住南城經移一作居北里納千金之重聘擅専房之宴私方美珥而不減擬甘一作投橘而無嗤聞削成於斜領照玉緻於鉛脂度玲瓏之曲閤一作閣出翡翠之香帷腕凝紗薄珮重行遲爾乃促筵命妓一作友銜觴置酒耳熱眼花之娱千金萬年之夀白日蹉跎時淹樂久玩飛花之度窓看春風之入柳命初學記作合麗人於玉席陳寳器於紈羅撫鳴筝而動曲譬輕薄之經過黛眉如掃曼睇成波情長響怨意滿聲多奏相思而不見吟夜月而怨歌笑素彈之未工疑秦宫之詎和若夫釣竿復發蛺蝶初揮動玉匣一作連之餘怨鳴陽烏之始飛逐東趨於鄭女和西舞一作儛於荆妃足使長廊之瓦虚墜梁上之塵染衣鱏魚遊而不没白鶴至而忘歸於是乎餘音未盡新弄縈纒參差容與顧慕流連落横釵於袖下歛垂衫於膝前乍含猜而移柱或斜倚而續絃照瓊環而俯捻度玉爪而徐牽見微嚬之有趣看巧笑之多妍抗長吟之靡曼雜新歌之可憐歌曰年年花色好足侍愛君傍影入著衣鏡裙含辟惡香鴛鴦七十二亂舞未成行故乃宋偉緑珠之好聲文君慎女之清角上掩靣而不前言韜輝而恥學實獨立之麗人乃入神之佳樂凡一作皆藝文類聚金錞賦并序舍弟西中郎致金錞一枚周禮云鼓人掌六鼓四金以節聲樂以和軍旅以金錞和鼓金鐲節鼓注曰錞錞于也圜如椎頭大上小下樂作鳴之與鼔相和淮南云兩軍相當鼓錞相望若古之禮器飾軍和樂者矣吾竒而賦之其詞曰有錞于之麗器實軍樂之兼珍伊前古以為美成名都之匠人採赤鋈於蜀壘求銅精於灌濵若夫鼓以陽鑪營之隂炭是鐫是刻載輝載煥笑烏獲之奮槌踰嵇生之善鍜實規形之可恱以妙聲之逺聞譬洪鐘之虎鈕疑學章疑鼎之龍文至於簨簴先列金石俱諧八能效技六變程才觀雲龍之鬱郁望威鳳之徘徊沛縣留三日之飲平樂有十千之杯揮秦筝之慷慨伐晉鼓之嘽啍皆能協宫和徵節往通来宣奏有序度曲可觀鄙金鋪之非徳嗤商鼗之易殫應南斗之鳴瑟雜西漢之金丸若夫伏波出討貳師逺征蒲昌對戰孤竹臨兵映似月之遥羽飛如鳬之去旌軍魚麗而齊上陣龍膝而俱行望烏雲之臨敵聞條風之入營壮士被犀良馬絡鐵野曠塵昏星流電掣日侵山而欲隠霧陵空而不滅望水色其如花覩奔沙之似雪咸聽響而先登普一作並聞鳴而為節當此時也畫角恥吟胡笳不吹刁斗暫捐金鉦虚置何資和之不營而吐聲之雄異制六師之進旅警三軍之武志嗟吾弟之博物實愛竒之已深識且鑒於鳴石貺有踰於兼金如陳器於栢寝似出鼎於汾隂豈寳玦之為貴非瑚璉之可欽昔武都之一扇乃銘功以述心矧元常之五熟又刻篆以書音况兹贈之為美而古跡之可尋聊染翰而操筆終有愧於璆琳琵琶賦虞世南若夫巢木為金門之始轉蓬乃玉輅之先斯盖前古之樸畧而後代之精研是以鼉鼓質而罕聽葦籥輕而莫傳笛不為於商律瑟見毁於繁絃此皆白圭玷肓一作以成疾嗟近者之莫言嘆知音之不述惟皇御極書軌大同鑠矣文教康哉武功既象舞之載設亦夷歌之逺通乃定八音論六樂成均弦誦之藝制氏鏗鏘之學辨新聲於變徵研竒操於清角鏞管咸奏絲桐畢陳有琵琶之妙曲乃越衆而超倫器便時而適用節每叚而逾新謐四座以傾耳歎和聲之入神爰詔百辟備序厥因於是大司樂進而稱曰臣以末學聞諸前志尋斯樂之所始乃絃鼗之遺事强秦創其濫觴盛漢盡其深致爰有達人演兹竒器集一作参古今而定質擬神眀而攄思慰逺嫁之覊情寛絶域之歸志既而班爾運能鈞繩將設求嘉木於五嶺取殊材於九折剖剖一作折文梓而縱分割一作剖香檀而横裂木𤓰貞柘盤根錯節或錦散而花開或絲縈而緒結徒觀其為状也則象形斗極殊姿巧製隨身一作良樸之脩短逐一作任規模之巨細既異才而合體亦列一作刻方而為銳惟適道以從宜故無取乎凝滯若乃琢玉範金之巧雕文鏤采之竒上覆手以懸映下承絃而仰施帖則西域神獸南山瑞枝屈盤犀嶺廻旋鳳池開寳掫一作撥以更運帶文緩而旁垂體備商角一作聲備角商韻包宫羽横却月於天漢寫廻風於洛浦始聞絃之既調乃長弄之一作而徐撫應緩韻一作歩之疎節隨輕身之妙舞悲紫塞之昭君泣烏孫之公主季倫歡金谷之宴仲容暢竹林之聚至如七徳昭備六軍凱旋諧戎麾而威逺合金奏而功宣詠燕山之已勒美瀚海之方鐫亦有飛梁邸逰楚館聞促柱之再調聽鳴絃之踈彈叶髙文而自達飛羽觴之無算又如長河草綠髙樓月下入小苑而看花逰上蘭而藉野泛澄波而轉鷁息長松而繫馬臨清吹之二字一作流而揮絃與殊方而俱寫其竒趣則抑揚嘈囋聨綿斷續紆餘雙鵠一作鶴之吟清壮三秦之曲望南山之遙翠見西江之始緑少年有長命之詞娼女有可憐之調願百齡兮眉夀重千金之巧笑逮乎嘉客既醉髙宴将䦨浮觴劇飲披襟極歡乃催絃而急調交酬獻之無端若以河而注海亦柸来而始彈蓋感物動神和心恱耳豈振木之為輩奚繞梁之足擬夫道以簡易為尊物以精微為貴嗟四絃之已約乃包含於元氣叶笙鏞之律吕㕘鍾石之經緯於是鳳簫輟吹龍笛韜吟𤣥雲掩影白雪藏音故以暢皇風之威武恱大雅之神心者也凡一作皆初學記笙賦馮竇南郡作李百藥馮南郡天才豔發含章挺生既研精於舊史笙人姓史氏亦流恱於新聲佩銀章於東洛分竹使於南荆芬盛徳於蘭茝獵香風於杜蘅縱調文於雅笛留神思於和笙客有寓於郢都者聞結風之妙曲預髙堂之歡宴拂長袖而善留絶飛纓以増盼重鳳翼之次羽愛鸞音之清轉請體物而味言寄風流於藻絢君曰懸匏出自西河竒簳生於南國山川載挺之異班倕攄思之徳固常人之所知無假言於翰墨至於曲引繁㑹之美才人妖麗之則實有動於余衷庶陳詞而袪惑覬傳芳於風雅将永代於刋勒客曰唯唯惟八音之遰作總六律而相旋徐疾短長之攸濟寒暑風雷之所宣清廟象功則韶舞播於金石良辰歡宴則鄭衞流於管絃豈無求於變俗将區分而在焉於是𤣥英在吕青陽戒律雲捲蕙樓風生蘭室栁佩翠而辭寒梅含香而受日始覺華樹鶯啼早不悟雕梁燕来疾縱勝氣之逍遥眷春光而怡逸命郊驛以迎賔爛華茵而促膝玉饌厲而不爽金罍湛而将溢佳麗新妝而疑缺徐歩長廊風摇裙佩日照釵梁慣同琱輦乍出閑房時顧歩而疑進或輕臨而欲翔耀千金之重價婉二八而成行發繁絃於流徵動浮磬於清商舒披蓮於舞席散垂藻於歌牀獨仙吹之容裔将陵雲而抑揚見秦趙之音劣識巴渝之調下掩衆技而奪氣諒聲髙而和寡歌狂㑹於楚謡詠承筐於周雅既駭聽於吴札亦留神於晉野婉婉鴻驚喈喈鳳鳴或萬殊而競響乍孤囀而飛聲清則混之而不濁濁則澄之而不清實當無而應有固虚受而徐盈舄奕多緒紛綸難狀抑之則徘徊綿密申之則散朗寥亮始掩歛以夷靡終優㳺以怊悵隨流睇而煦愉應徵疑嚬而悽愴挫玉簫之清管息瓊篁之虚唱落遺囀於梁間墜纎腰於掌上既而重門半掩髙宴将終飄餘音於霄漢遏嬌韻於房櫳逺而聽之若遊鴛翔鶴嘹唳飛空近而察之譬瓊枝玉樹響亮從風信絶俗之神解何變態之無窮爾乃綺帳垂妓行散巫雲歛楚妃歎獨婉孌於瑶笙尚纒綿於皓腕蘇合薰兮龍燭華連理解兮鴛枕粲既藉寵而横陳恣深心之秘翫懼管聲之易歇恐君愛之難終起長歌於清夜寄微意於春風歌曰新聲雖自知舊寵㑹應移無令棗下吹變作一枯枝重歌曰為想雍門歎當思執燭逰不惜妾身難再得方期君夀度千秋洞簫賦以四聲為韻失名南國之紀兮江水深中嶻孼兮天姥岑試一望兮見簫筦之参差碧雲飄一作彯其正色白日出其重隂每含和以自守雖嵗寒其莫侵於是乃使夫匠人陵皛淼􅀈明幽窅攀重蘿閱豐篠截成枝之龍質擬銜花之鳳鳥作為洞簫其聲窈窕矇瞽之士純精所至尤疑澹澹兮無營浩紛紛兮縱肆纎指敏手隨抑揚之虚滿曲折等分任吹嘘而懿􅗍爾其為樂也則龢羅稽詣而逸其為苦也則瀏漂洌清而悴或􅡲㟋以相從復淋漓而逺被有若層山抱空而晴燭巨海涵虚而夕涖是以君子聽之載其平粹及乎弄玉既好簫史亦出登翠檻之巍峩結紅羅之婉蔚楊葉鮮吹荷花浴日對吟空闊之情復感神仙之術若乃漢皇未躍周勃䕶䘮哀笳左引畫翣前張靈逶迤而就挽思徘徊而永傷悽其吻吮誰非斷腸故若翔若止心中定矣若反若墜不遺其類趣從容以向空乍猗那以内閟信大雅之紆直繹兹聲之開塞匪天地兮同和孰能與夫偕極塤賦鄭希稷至哉塤之自然以雅不僣居中不偏故質厚之徳聖人貴焉於是挫煩淫戒浮薄徵甄人之事業暴公之作在鈞成性其由槖籥隨時自得於規矩任素靡勞於丹雘乃知瓦合成亦天縱既敷有以通無遂因無以有用廣纔連寸長匪盈把虚中而厚外圓上而銳下器是自周聲無旁假為形也則小取類也則大感和平之氣積滿於中見理化之音激揚於外邇而不逼逺而不背觀其正五聲調六律剛柔必中清濁靡失将金石以同功豈笙竽而取匹及夫和樂既翕燕婉相親命矇瞍鳩樂人應仲氏之篪自諧琴瑟雜伊耆之鼓無相奪倫嗟乎濮上更奏桑間迭起大希之音見遺俚耳則知行於時入於俗曽不如折楊之曲物不貴人不知豈大雅守道之無為夫其髙則不偶絶則不和是以桓子怠朝而文侯恐卧豈虚然也為政者建宗立樂者存一作和㫖化人成俗何莫由此知音必有孚以盈之是以不徒忘味而已文苑英華巻七十一
