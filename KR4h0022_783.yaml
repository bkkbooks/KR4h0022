body:
  text: 文苑英華卷七百八十四宋李昉等編圖畫益州長史胡樹禮為亡女宇文氏造畫讃一首畫馬讃一首吳使君㕔鄭華原壁畫松樹讃一首江陵府陟屺寺雲上人院壁張操員外畫松讃一首龍馬圖讃一首騶虞畫讃一首貘屏讃一首畫鵰讃一首􅏜松圖讃一首雜讃鶴讃一首平臺祕略讃十首雙白鷹讃一首從叔任偃師主簿馬鞭等奉别讃五首靈濤讃一首嵗星居心讃一首霹靂琴讃一首酒功讃一首吳興靈鶴讃一首圖畫益州長史胡樹禮為亡女造畫讃盧照鄰夫鎔金逞妙徒罄中人之産架寶崇奢未階大乘之化豈若圖徽紈素卷舒方丈之筵表裏丹青藻繪多林之色獨為先覺其在兹乎益州長史公道洽中孚履黃裳以貞吉寄隆分陜苴白茅而涉川一作利涉猶為龜組相輝不離泡幻之域熊車結轍尚迷苦愛之津爰捨净財幸求多福為亡女宇文氏敬造像等徴奇綃於水府採妙色於霞莊月面澄華疑金雲之夜敞蓮毫吐照狀珠浦之晨開花寶參差晀鶴林其非逺仙雲肹蠁登鷲巖其可望窮形盡相陋燕壁之含丹寫妙分容嗤吳屏之墜筆式揚顯福俾讃幽魂其詞曰正教東漸遺像西至化格三天功超十地偉歟大士𢎞兹逺致追慟幽途載營檀施皎潔霜紈照影丹素果發金口蓮生玉步地寶天花星羅雲布惠炬長設迷津永度畫馬讃杜甫韓幹畫馬毫端有神驊騮老大騕裊清新魚目瘦腦龍文長身雪垂白肉風蹙蘭筋逸態蕭踈髙驤縱恣四蹄雷雹一日天地御者開集作間敏去集作云何難易愚夫乘騎動必顛躓瞻彼駿骨實維龍媒漢歌燕市已矣茫哉但見駑駘紛然往來良工惆悵落筆雄才吳使君㕔鄭華原壁畫松樹讃邵貴之者真得之者難松有徑質匠乎筆端森疏空倚挺拔上干如出絶壑若生大寒枝蟠龍變皮折龜攢青蘿若桂白鷺愁看美華原之墨妙能入室而思彈疑作禪願王人之比夀從君子之靜觀江陵府陟屺寺雲上人三字一作靈人院壁張璪一作操員外畫雙松讃世人丹青得畫遺跡張公運思與造化敵根如蹲虬枝若交㦸離披慘淡寒起素壁髙秋古寺僧室虛白至人凝視心境雙寂龍馬圖讃并序柳宗元始吾聞明皇帝在位靈昌郡得異馬於河而莫覩其形好事者涿人盧遵以其圖來示余其狀龍鱗虺尾拳髮集本文粹作髦環目肉鬛馬之靈怪有是耶居帝間為馬文粹無此二字幾二十年從封禪郊籍鳴和鑾者數十事遇禍文粹無此字亂帝西幸馬文粹無此字至咸陽西入渭水化為龍泳去不知所終且其來也宜于時其去也存其神是全德也既觀一本作覩其形不可以不贊靈和粹異孕至神兮倮尾童鬛疏紫鱗兮巍然特出瑞聖人兮理平和樂百禮集作禮樂陳兮鳴鑾在御大路遵兮世厖道悖還吾真兮哀鳴延首慕文粹作渭水濵兮沛焉潛泳旋奫淪兮淵居海遊文粹作靈無鄰兮出處孔時類至仁兮嗟爾衆類孰是倫兮進昏死亂阽厥身兮匪馬之慕吾誰親兮贊之斯圖宜世珍兮騶虞畫讃并序白居易騶虞仁瑞之獸也其所感所食暨形狀質文孫氏瑞應圖具載其事元和九文粹作元年夏有以騶虞圖贈豫者豫愛其外猛而威內仁而信又嗟其曠代不覿引筆贊之詞曰孟山有獸仁心毛質不踐生芻不食生物有道則見非時不出三季已還退藏於密我聞其名徴之於書不識其形得之於圖白質黑文猊首虎軀是耶非耶孰知之乎已矣夫已矣夫前不見文粹有其字往者後不見文粹有其字來者于嗟乎騶虞貘屏讃并序貘者象鼻犀目牛尾虎足生南方山谷中寢其皮辟溫圖其形辟邪豫舊病頭風每寢息常以小屏衛其首適遇畫工偶令寫之按山海經此獸食鐵與銅不食他物因有所感遂為讃焉文粹作云邈哉奇獸生于南國其名曰貘非鐵不食昔在上古人心忠質征伐教令自天子出劒㦸省用銅鐵羡溢貘當是時飽食終日三代以降王法不一鑠鐵為兵範銅為佛佛像日益兵刃日滋何山不剗何谷不隳銖銅寸鐵罔有孑遺悲哉彼貘無乃餒而嗚呼匪貘之悲惟時之悲畫鵰讃并序夀安令白旻集本文粹作昊豫宗兄也得丹青之妙傳寫之要毛羣羽族尤是所長長慶九二本作元年以畫鵰貺豫豫愛之因以集無以字題讃云鷙禽之英黑鵰丁丁鈎綴八爪劔插六翎想入心匠寫從筆精不即不離一日而成軒然將飛戞然欲鳴毛動骨活神來著形始知造物不必杳集作窅通用冥但獲天機則與化爭韓幹之馬籍籍知名薛稷之鶴翩翩有聲研工核能較真鬬靈豈無化人不如我兄怪松圖讃并序陸龜䝉有道人自天台古本作南嶽來示余怪松圖披之甚駭人目根盤于巖穴之內輪囷逼側而上身大數圍而髙不四五尺儡磈集作礧然蹙縮然幹不暇而集本文粹無此字枝枝不暇而二本無此字葉有若龍攣虎跛壯士囚縳之狀道人曰是何奇二本作物怪之如是耶子能辨之乎余曰草木之生安能怪耶二字蜀本作常性耶苟肥瘠得於中寒暑均於外不為物所凌折未有不挺而茂者也况二本作矧松柏乎今不幸出於巖穴之內脞脆者則硜然之牙伏死其下矣何自奮之能為是松也雖邪二本作稚氣初年二本作拆而正性不辱及其壯也力與石鬬乘陽之威怒二本作悲已之軋拔而將升卒不勝其壓擁勇鬱遏坌憤激訐然後大醜彰於形質天下指之為􅏜木吁豈異人乎哉天之賦才之盛者蚤不得用於世則伏而不舒薰蒸沉酣日進其道摧二本作權擠勢奪卒不勝其厄號呼呶拏發越赴訴然後大竒出二本有於字文彩天下指之為怪民嗚呼木病而後怪不􅏜不能圖其真人病二本作文病而後奇不竒不能駭於俗非始不幸而終幸者耶道人曰然為我讃之讃曰松生䕃隘巖嶽二本作獄穴械病乎不􅏜卒以為􅏜擁腫支離神羞鬼疑道人咨嗟古本作嗟咨筆傳其竒集作援筆傳奇或怪乎二本作其形或竒于辭吾二本作自為怪魁是以讃之雜讃鶴讃庾信武成二年春二月雙白鶴飛集上林園大將鄭偉布弋設罝並皆禽獲六翮已摧雙心俱怨相顧哀鳴孤雄先絶孀妻向影天子愍焉信奏事階墀立使為讃九臯遙集三山逈歸華亭别唳洛浦仙飛不防離繳先遭見羈藝文類聚作台圍籠摧月羽弋碎霜衣塞傳餘號關承舊名南遊湘水東入遼城雲飛欲舞露落先鳴六翮摧折九門嚴閉相顧哀鳴肝心斷絶松上長悲琴中永别平臺祕略讚十首王勃孝行第一受訓椒殿承輝桂閾資父事君自家刑國孝惟忠本忠隨孝得履薄深淵惟王之則貞修第二列藩好德清修互起峻局剛情中孚素履道契𤣥極芳圖青史為善不同同歸于美藝文第三榮分上邸業盛文場爭開寶札競聳雕章氣凌雲漢字挾風霜後之來者其在君王忠武第四闕善政第五榮開社稷業照旗常是恢藩化或固朝章功成道洽身沒名揚唯忠與孝千載生光尊師第六奔霆易駭巨豁欵作壑難遊主明臣直撫類相求道行言用性逸神休吁嗟盛軌從善如流褒容疑作客第七功惟應物業貴逢時君王樂道上客含詞情起月肆興入煙逵文林辨圃何代無之幼俊第八列后雲騰英童霧躍年妙識逺理豐詞約寵照王旗文先銅爵勿疏小善方恢大略規諷第九寵榮有極恭冲是守軸碎羣毛金銷衆口全忠衛國順時藏垢周之宗盟異姓為後慎終第十具覽藩猷遐窺國篆罕兼百行多褒一善履忠存性慎終思逺生榮死哀身沒名顯雙白鷹讃并序蘇頲開元乙卯嵗東夷君長自肅慎扶餘而貢白鷹一雙其一重三斤有四兩其一重三斤有二兩皆皓如練色斑若綵章積雪全映飛花碎㸃所謂金氣之英瑶光之精髙髻偉臆長距秀頸奮發而鋭堅剛則厲摩天絶海電文粹作雷擊飇逝觀其行時令順秋殺指麾應捷顧盻餘雄當落鵬之賞蔑仇鷂之敵實稀代之尤也皇上秪膺聖圖欽若王道方寶賢重穀尊儒養艾後宫撤綺繡前殿焚珠玉與王侯卿士朝夕論思異無所貴輕衛公之好鶴竒無所珍同漢皇之却馬畋豈務於馳騁獵以存乎搜狩未嘗合圍掩群截羽灑血乃强不攫而猛不噬矣然以萬方入貢懷其來也三年重譯嘉其至也故仁為之心有仁則勇威為之力有威則重况此鳥猛過於衆重倍於凡禮於君則勸忠祭於祖則立敬壯其體則用武粹其翼則成文彼寵而服之鶡也能果榮而戴之蟬也能潔矧乎職命司冦師維尚父聞針刺姦擇善為吏蓋選士之是式匪從禽之足云此所以備於圖而警在位也微臣奉制敢稱讃曰鷹之大者精明竦峻徑而橫絶雄則逺振錦文素綵珠聫玉潤往乃奮威將軍所怐鷹之次者勇鋭光芒截海而至乘風載揚絡以紅聫文其綵章下韝必中惟吏之良從叔任偃師主簿以馬鞭等奉總目作贈别讃五首前人馬鞭將馭黠馬利之銜䇿彼其有人敢奉行役綵箋五十張曷用綵箋爛其華篇文字當代此實歸焉銀卷荷杯一卷舒荷心登用則可清白相照其源自我布衫假一紵之以績藍因之染緑兮衣兮俯拾斯漸吳絹袴假一吳越之縞裁縫之袴懷風納凉君子尚素靈濤讃李華泱泱一作決決靈川滄溟一支每嵗八月雄濤應期昧爽風生凛若切肌淒清隂淹曠朗陽晞雪山橫江神物驅之萬里齊足千車並馳雷破天動山捶地移湯室雲一作雪分却躍鷺飛突象瑳切奔鯨合離踣逃䕫魑竄蟄龍羆共工折柱武安行師羣源委㑹祥怪叢滋熾毒乘人帝降明威一日再至洗其纎疵仲秋大至以蕩以夷世稱伍員忿憾而為肇開混元寧莫常斯惟天隂隲日用不知是述是讃嗚呼慎詞嵗星居心讃文粹作并序頌下同權德輿興元紀號皇上宅位六祀七政貞明於上七教敷聞於下其有不迪不吉不庭不若之徒皆薰然而和䁆然而化春三月司天氏奏嵗星居心宿五度其色黃明潤大光祥文粹作帝位積五十餘日詔下有司頒示中外故臣得而言之以形歌頌臣謹按嵗星五帝為蒼五行為木五常為仁五事為貌天意若曰時以至仁為理覆露萬人洽浹生類協於五行五事之用則發於星緯形於占文粹作禎應隂隲大化昭報成功𤣥符幽贊其昭昭如是禮運之論聖人曰以日星為紀以四時為柄洪範之叙皇極曰斂時五福用敷錫厥庶人發於人格於天天人交感合若符節其年秋平河中之冦葬其遺骸復其世祀班淮右之師用𢎞文告用去武備此二帝三代所以恢令名也於是一統類以昭德明法制以塞違薦禮百神賔懷曠俗嘉瑞美祥紛委狎至置之而不有哲人端士連茹播職求之如已失然後端拱於穆清怡神於靜冥驅一代為純誠接萬靈於明庭斯又登邁邃古光昭聞見巍乎紹天統物之盛者也微臣伏於草茅之下六字文粹作瓉賤沐浴仁聖敢獻嵗星居心讃一章以備周詩由庚由儀之闕讃曰皇矣上帝降鑒下人后王承之制作禮文人用清明家尚孝仁人無癘疵俗以阜蕃敷佑四方一作海發為天祥重華煌煌乃居明堂下煦仁澤上為祥光肸蠁集本文粹作回復感通天人攸同乃去五事乃建大中君君臣臣德輝昭融保佑命之自天無窮微臣作文粹作頌歌敢備唐風此本并權集皆節略今以文粹增入靈靂琴讃并序栁宗元霹靂琴文粹有者字零陵湘水西震餘枯桐之為也始枯桐生石上說者言有蛟龍伏其文粹作核一夕暴震為火之焚至旦乃巳其餘硿然倒臥道上震旁之民稍柴薪之超道人聞取以為三琴琴莫良於文粹作于桐桐之良莫良於文粹作于生石上石上之枯又加良焉火之餘又加良焉震之於文粹作于火為異是琴也既良而集作且入作加異合而為美天下將不可載一作再焉微道人天下之美幾喪余作讃辭識其越之右與左集作左與右以著其事又益以序以文粹作而為他傳辭曰惟湘之涯惟石之危龍伏之靈震焚之奇既良而異爰合其美超實為之讃者栁子酒功讃并序白居易晉建威將軍劉伯倫嗜酒有一作作酒德頌傳一作行於世唐太子賔客白樂天亦嗜酒作酒功以繼之其詞曰麥麴之英水泉之精作合為酒孕和産靈孕和者何濁醪一樽霜天一作月或作朝雪夜變寒為溫産靈者何清醑一酌離人遷客轉憂為樂納諸喉舌之內淳淳泄泄醍醐沆瀣沃諸心胸之中熙熙融融膏澤和風百憂齊息時乃之德萬緣皆空時乃之功吾嘗終日不食終夜不寢以思無益不如且飲吳興靈鶴讃事具黃籙齊記中有鳥有鳥從西北來丹腦火綴白翖雪開遼水一去緱山不回噫吳興郡孰為來哉寶厯之初三元四齊天無微飈地無纎埃當白晝下與紫雲偕三百六十拂壇徘徊上昭𤣥貺下屬仙才誰其居一作尸之太守姓崔文苑英華卷七百八十四
