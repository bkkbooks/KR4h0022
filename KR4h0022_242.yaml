body:
  text: 文苑英華卷二百四十二宋李昉等編酬和三宋鼎一首王維六首孫逖四首孟浩然三首杜甫四首李白五首盧象二首祖詠一首王昌齡三首高適六首劉長卿九首酬故人還山宋鼎舉棹乘春水歸山撫嵗華碧潭宵見月紅樹晚一作曉開花肅穆輕風度依微隱徑斜危亭暗松石幽澗落雲霞思鳥吟一作鳴高樹遊魚戲淺沙安知餘興盡相望紫烟賖和僕射晉公扈從溫湯作已見一百七十一卷王維和尹諌議史館山池已見一百六十六卷前人酬張少府前人晚年一作來唯好靜萬事不關心自顧無長一作良䇿空知返舊林松風吹解帶山月照彈琴君集作若問窮通理漁歌入浦深酬郭給事七言前人洞門高閣靄餘暉桃李隂隂柳絮飛禁裏疏鐘官舍晚省中啼鳥吏人稀晨搖玉珮趨金殿夕奉天書拜璅闈強欲從君無那一作奈老將因臥病解朝衣和太常韋主簿五郎溫湯寓目之作前人漢主離宫接露臺秦川一半夕陽開青山盡是朱旗繞碧澗翻從玉殿來新豐樹裏行人度小苑城邊獵騎回聞道甘泉能獻賦懸知獨有子雲才故人張諲為一無此字詩善易卜兼能丹青草𨽻頃以詩見贈聊復酬之前人不逐城東逰俠兒隱囊紗帽坐彈碁蜀中夫子時開卦洛下書生解詠詩藥欄花徑衡門裏時復據梧聊隱几屛風誤㸃惑孫郎團扇草書輕內史故園高枕度三春永日垂帷絶四鄰自惜集想作蔡雍今已老更將書籍與何人奉和李右相中書壁畫山水孫逖廟堂多暇日山水契中集作真情欲寫高深趣還因藻繪成九江臨户牖三峽繞檐楹花柳窮年發烟霞逐意生能令萬里近不覺四時行氣染荀香馥光含樂鏡清詠歌齊出處圖畫表冲盈自保千年遇何論八載榮李公詩云八載忝司存奉和李右相賞㑹昌林亭前人賢相初陪蹕靈山本降神作京雄近縣開閣寵平津地勝林亭好時清宴賞頻百泉榮草木萬井布郊畛諸鄰切德與春和盛功將造化鄰還嗤渭濵叟歲晚獨垂綸酬萬八賀九雲門寺歸溪中作前人晚從靈境出林壑曙雲飛稍覺清集作青溪盡回瞻畫剎微獨園餘興在孤棹宿心違更憶登攀處天香盈袖歸和左衛武倉曹衛中對兩劇集作創韻贈右衛李騎曹二人同任校書前人林父同官意宣尼久敬交文場刋玉篆武事掌金鐃道合宜連茹時清豈繫匏克勤居簿領多暇屛歡譊美酒懷公宴𤣥談俟客嘲薄雲生北闕飛雨自西郊院暑便清曠庭蕪覺漸苞高門關詎閉入聲逸韻柱難膠枳棘鸞無歎椅梧鳳必巢忽聞徴並作觀海愧堂坳和張丞相春朝對雪已見一百五十三卷孟浩然和張明府登鹿門山前人忽示登高作能寬旅寓情絃歌既多暇山水思彌清草得風先集作光動虹因雨後成謬成巴里和非敢應同聲和張二自穰縣還途中遇雪前人風吹沙海雪來作本團集作園春宛轉隨香騎輕盈伴玉人歌疑郢中客態比洛川神今日南歸楚雙飛似入秦奉和薛十二丈判官見贈杜甫忽忽峽中睡悲風方一醒西來有好烏為我下青冥羽毛淨白雪慘淡飛雲汀既蒙主人顧舉翮唳孤亭持以比佳士及此慰揚舲清文動哀玉見道發新硎欲學鴟夷子待勒燕然集作山銘口重斬邪劒集作誰重斷蛇劔致君君未聽志在麒麟閣無心雲母屛卓氏近新寡豪家朱户集作門扃相如琴集作才調逸銀漢㑹雙星客來洗粉黛日暮拾流螢不是無膏火勸郎勤六經老夫自汲澗野水日泠泠我歎黑頭白君看銀印青卧病識山鬼為農知地形誰矜坐錦帳苦厭食魚腥東南兩崖集作岸拆積集作橫水注滄溟碧色忽惆悵風雷搜百靈空中右集作有白虎赤節引娉婷自云帝里集作李女噀雨鳳凰翎襄王薄行迹莫學冷如氷千秋一拭淚夢覺有微馨人生相感動金石兩青熒丈夫集作人但安坐休辨渭將集作與涇龍蛇尚格鬪灑血暗郊坰吾聞聰明主活集作興國用輕刑銷兵鑄農器今古歲方寧天王集作文日儉德俊乂始盈庭榮華貴少壯豈食楚江萍酬韋韶州見寄前人養拙江湖外朝廷記憶疏深慚長者轍重得故人書白髮絲難理集作並新詩錦不如雖無南過鴈看取北來魚答高使君見贈前人古寺僧牢落空房得集作客寓居故人供祿米鄰舍與園蔬雙樹容聽法三車肯載書草𤣥吾豈敢賦或比集作似相如奉酬李都督表文早春作前人力疾坐清曉來詩悲早春轉添愁伴客更覺老隨人紅入梅集作桃花嫩青歸柳葉新望鄉應未已四海尚風塵江上答崔宣城李白太華三芙蓉明皇玉女峯尋仙下西嶽陶令忽相逢問我將何事湍波歷幾重貂裘非季子鶴氅似王恭謬忝燕臺召而陪郭隗蹤水流知入海雲出集作去或從龍樹色曉集作繞洲月山鵲鳴夜鐘還期如可訪台嶺䕃長松酬中都小吏擕斗酒雙魚於逆旅見贈前人魯酒若琥珀汶魚紫錦鱗山東豪吏有俊氣手攜此物贈逺人意氣相傾兩相顧斗酒雙魚表情素酒來我飲之鱠作别離處雙鰓呀呷鬐鬛張跋刺銀盤欲飛去呼兒拂几霜刃揮紅肌集作腮花落白雪飛為君下筯一餐罷集作飽羞看金鞍上集作醉著金鞭馬歸酬裴侍御對雨感時見贈前人雨色秋來寒風嚴清江爽孤高繡衣人瀟灑清霞賞平生多感激忠義非外奬禍連成集作積怨生事及徂川往楚邦有壯士鄢郢翻掃蕩申包哭秦庭泣血將安仰鞭尸辱已及堂上羅宿莽頗似今之人蟊賊一作􅈮陷忠讜渺然一水隔何由稅歸鞅日夕聽猿愁懷賢盈夢想酬崔十五見招前人爾有鳥折集作跡書相招琴溪飲手跡尺素中如天落雲錦讀罷向空笑疑君在我前長吟字不滅懷袖且三年以詩代書答元丹邱前人青鳥海上來今朝發何處口銜雲錦書與我忽飛去鳥去凌紫烟書留綺窗前開緘方一笑乃是故人傳故人深相朂憶我勞心曲離居在咸陽三見秦草緑置書雙袂間引領不暫間長望杳難一作不可見浮雲橫逺山奉和徐侍中書叢篠詠見二百七十五卷盧象奉和張使君宴列加朝散前人佐理星辰貴分榮渙汗深言從大夫後用答聖人心騎擁軒裳客鸞驚翰墨林停杯歌麥秀秉燭醉棠隂爽氣凌秋笛集作草輕寒散暝砧祗應將四子講德謝集作識知音酬汴州李别駕見贈祖詠秋風多客思行旅厭艱辛自洛非才子逰梁得主人文章參末議榮賤豈同論歎世同王演懷賢憶法真情由恩舊好契託死生親所愧能投贈清言益潤身淇上酬薛據兼寄郭微王昌齡自從别京華我心乃蕭索十年守章句萬里空寥落北上登薊門茫茫見沙漠倚劒對風塵慨然思衛霍拂衣去燕趙驅馬悵不樂天長滄洲路日暮邯鄲郭酒肆或淹留漁澤屢棲泊獨行備艱難孰辭于鼎鑊皇情念淳古時俗何浮薄理道須任賢安人在求瘼故交負奇才逸氣包謇諤隱軫經濟䇿縱橫建安作才望忽先鳴風期無宿諾飄颻勞州縣迢遞限言謔東馳眇具邱西顧彌虢略淇水徒自深浮雲不堪託吾謀適可用天道豈遼廓不然買山田一身與耕鑿奉酬睢陽路太守見貽之作前人盛才膺命世高價動良時帝簡登藩翰人和發詠思神仙去華省鴛鴦憶丹墀清淨能無事優遊即賦詩江山紛想像雲物動葳蕤逸氣劉公幹𤣥言向子期多慙汲引速翻愧激昂遲相馬如何恨登龍返自疑風塵吏道迫行邁旅心衰一作悲拙疾徒為爾窮愁欲問誰秋風一片葉朝鏡數莖絲州縣甘無取邱園悔莫追瓊瑤生篋笥光景借茅茨他日青霄一作雲裏猶應訪所知留答武陵田太守前人仗劔行千里微軀感一言曾為大梁客不負信陵恩答侯大少府高適常日好讀書晚年學垂綸漆園多喬木睢水清磷磷詔書下柴關集作門天命敢逡巡赫赫三伏時十月到咸秦褐衣不得見黃綬翻在身吏道頓羈束生涯難重陳北使經天寒關山饒苦辛邊兵若芻狗戰骨成埃塵行矣勿復言歸歟傷我神如何燕趙陲忽遇集作偶平生親開館納征騎彈絃娛逺賔飄颻集作飄飄天地間一别方茲晨東道有佳作南朝無此人性靈出萬象風骨遺常倫吾黨謝王粲羣賢推郤詵明時取秀才落日過蒲津節苦名已富祿微家轉貧相逢愧薄逰撫已荷陶鈞心事正堪盡離憂寧太頻兩河歸客集作家遙二月芳草新柳接滹沱集作􅀈池暗鶯連渤海春誰謂行路難猥當希代珍提握每終日相思猶比鄰江海有扁舟邱園有角巾君意定何適我懷知所遵沉浮各異宜老大貴全真莫作雲霄計棲遑集作遑遑隨縉紳漣上酬集作别王秀才前人飄颻經逺道客思滿窮秋浩蕩對長漣君行殊未休﨑嶇山海側想像無前儔誰謂照乘珠忽然欲暗投東路方蕭條楚歌復悲愁暮帆使人感去鳥兼離憂行矣當自愛壯心莫悠悠豫亦從此辭異鄉難久留言宴集作贈言豈終極慎勿滯滄洲酬裴秀才前人男兒貴得意何必相知早飄蕩與物華集作永蹉跎覺身老長卿無産業季子慙妻嫂此事難重陳集作論未為衆人道酬陸少府前人朝臨集作映淇水岸還望衛人邑别思集作意在山河集作阿征途背原隰蕭蕭集作稍稍前村口惟見轉蓬入氷渚人去遲雪集作霜天鴈飛急我行應不逺集作固應不逺别所興終集作與路未及欲濟川上舟相思空竚立同吕員外酬田著作莫門軍西宿盤山秋夜作前人磧路天早秋邊城夜應永遙傳戎旅作已報關山冷上將頓盤反疑作坂諸君遍泉井綢繆閫外書慷慨幕中請能使勳業高動令氛霧屛逺途能自致短步終難騁羽翮時一看窮愁始三省人生感然諾何啻若形影白髮知苦心陽春見佳景一作境星河連塞路刁斗兼山靜憶君霜露時使我空引領酬岑主簿秋夜見贈前人舍下蛩亂嗚居然自蕭索緬懷高秋興勿枉清夜作感物我心勞凉風生集作驚二毛池枯集作空菡蓞死月上集作出梧桐高如何異鄉縣復得交才彥汨沒嗟後時蹉跎恥相見箕山别未久魏國誰不戀獨有江海心悠悠未嘗倦奉和杜相公新移長興宅呈元相公劉長卿間氣集作世生真宰同心奉至尊功高開北第機靜灌中園入並蟬冠影歸分騎士喧窗聞漢宫漏家識杜陵原獻替常焚藳優集作清間獨樹萱花香逐荀令草色對王孫有地先開閣何人不掃門江湖難自退明主託元元酬張厦雪夜赴州訪别途中苦寒作前人扁舟乘興客不憚苦寒行晚暮相依分江湖别有集作欲别情水聲氷下咽沙路雪中平舊劒鋒鋩盡應嫌脫自集作贈輕酬包諫議見贈集作寄之作前人佐郡愧頑踈殊方親里閭家貧寒未度身老歲將除過雪山僧至依陽野客舒藥陳隨逺宦梅發對幽居落日棲梟鳥行人達鯉魚高文不可和空愧學相如酬張廈别後道中見寄前人離羣方歲宴謫宦在天涯暮雪同行少寒潮欲集作獨上遲海鷗知吏傲沙鶴集作沙鳥見人衰只為憶春草西歸亦未期酬李貟外從崔録事戴華宿三河戍先見寄前人寒江鳴石瀨歸客夜初分人語空山答猿聲獨戍聞遲來朝及暮愁去水連雲歲晚心誰在青青見此君酬滁州李十六使君見贈李公與豫俱於陽羡山中新營别墅以其同志因有此作前人滿鏡悲華髮空山寄此身白雲家自有黃卷業長貧懶任垂竿老狂因釀黍春桃花迷聖代桂樹狎幽人幢蓋方臨郡柴荆忝作鄰但愁千騎至石路却生塵酬張廈人日長沙感懷見贈此公比經流竄親在上都前人舊俗歡猶在憐君恨獨深新年向國淚今日倚門心歲去流湘水春生近桂林流鶯且莫弄江畔正行吟酬皇甫侍御見寄時前相國姑臧公初臨郡前人離别江南北汀州葉再黃路遙雲共水砧逈月如霜歲儉依仁政年衰憶故鄉佇君集作看宣室召漢法倚張綱苕溪酬梁耿别後見寄已見一百六十六卷文苑英華卷二百四十二
