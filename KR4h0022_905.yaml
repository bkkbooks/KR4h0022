body:
  text: 文苑英華卷九百六宋李昉等編職官十四諸將軍三周車騎大將軍賀婁慈碑一首唐左將軍魏哲碑一首後周明威將軍梁待賔碑一首周車騎大將軍賀婁公神道碑庾信昔者軒邱命氏初分兄弟之姓若水降居始建諸侯之國自是以官為族因地為宗水𣲖枝分其可知矣公諱慈字元達本姓張清河東武城人也仕於周張仲為孝友謀於晉張彥為賢臣韓有開地則五世強國趙有孟談則三卿不戰祖慶少習邊將憑伏智勇雖復五車行簡不取博士之名一卷兵書即以將軍自許角端在手必無齊魯之侵蓮花插腰甚得蛟龍之氣為車騎大將軍儀同三司散騎常侍霸城開國伯贈河州刺史父璨公子公孫有鎡基於天下良弓良冶有世業於家風書則百家可知劔則千人可敵三槐以鼐鼎象物知其神奸五等以桓圭斾疑瑞守其宫室君以才望兼而有之終於使持節車騎大將軍儀同三司散騎常侍武定縣開國公贈秉河州刺史兼山嶽之靈受星辰之氣年在髫髮甫就勝衣竹馬來迎已知名於郭伋羊車在道即見賞於王澄豈直童子眀經書生說卦而已至如禪河清論秋水髙談故以辨折龜林聲馳鹿苑國家官族君為首姓起家車騎大將軍儀同三司襲魯為公邑合一千六百户弱冠登朝傳呼甚寵漢魏台鼎故無此比中朝方伯罕有其年大冡宰任總機衡是勤王略惜君忠壯委以爪牙鎮左廂親信出梁州防主華陽西極漢水東流巴濮既寧沉黎即靜保定四年王師北伐以君驍勇被召將兵師下宜陽身登函谷將燒白馬之城以覆烏巢之壘既而中途甚雨未獲圍原軍師聞喪不成侵宋柱國趙王今上之第九弟也文則河間上書武則任城置陳作鎮岷邱陽旍一作軫錦水白虎之俗難安黃龍之盟不定以君智略入佐中權天和元年授使持節大都督治柱國㧾府司録仍轉司馬餘官封如故相如西喻鏤石於靈山武侯南征浮船於瀘水方之今日彼獨何人九品課工為上之下四年入朝歸事宰旅即受載師大夫將命齊國尋盟出境即用和鄰入國聞喪仍從㑹葬之禮可使南面此之謂乎尋以本官入治軍正至如渭水兵書存心為志軒邱陳法聚石成圍既得師不疲勞兵無怨讟入陪中禁更領儀同邸客城池門䦨户籍咸資巡警並用司存帝城近臣公室密戚如逢司𨽻似畏都官既而孤城鄭嫗不相其年巴水深翁不醫其疾春秋三十有三奄捐官舍吕子眀之疾甚歎軫吳王阮文瑜之長逝悲深魏主有詔贈某官禮也以建德四年三月日歸葬於河州苑川郡之禁山公六郡良家西河望族地壯金行人雄塞氣兵書七卷河水浮來射法三篇天弧夜下鋒旗不息刁斗恆驚猶得馬上讀書軍中習禮太史子儀善於謀䇿諸葛公休長於撫馭四代儀同三司七世河州刺史鍾鼎成烈冠蓋連隂謂生為貴臣死為貴神者也但以遊魂久客反葬途逺道阻山長妻孤子幼哀聲滿野愁氣連雲况復松檟飄颻方臨武威之戍丘陵回逺直對臨兆之城馬援亡於武溪尸柩返於魏里梁鴻死於㑹稽妻子歸於平陵嗚呼哀哉嶇﨑逺矣昔者繁昌祠前即有黃金之碣德陽基下猶𫝊青石之碑是謂勒功乃為銘曰七葉佐漢五世相韓忠臣入仕孝友當官青城仙洞黃石祠壇臺堪走馬書足回鸞武定風飈霜城嚴肅並馳雙𫝊俱分兩行重世刺舉連鑣衮服草靡青邱風馳赤谷世不乏賢挺兹上嗣孝有三德忠無二志劔足身挺書堪靣試旍節既秉髙蟬且珥龜轉印函蛇盤綬笥左右將軍前後常侍繼踵五侯因循三事旍􅏧九坂艫舳雙流還驅木馬更引金牛江波錦落火井星浮蹲酒望帝安歌蜀侯受服河陽偏師洛浦置陳成臯連旗廣武朝兵减竈夜營多鼓箭起六麋鋒摧九虎倐忽人世俄然今古崇發兩星醫驚二竪逰魂通夢言返舊塋紫泥賜冊黃腸贈行途登石紐路入金城寒關樹直秋塞雲平劔埋合柱書藏鑿楹武侯為廟欒公為社雲蓋低臨電裳紛下碑枕金龜松橫石馬永矣身世留名華夏唐左將軍魏哲神道碑楊炯天經地緯集作經天緯地之帝求集作制禮作樂之才撥亂反正之君資拔山超海之力繼韶夏而崇號諡非無陳戰之風披皇圖而稽文武集作帝非或集作咸非用干戈之道故能彌綸宗廟彈壓山川苞四海以為家一六合而光宅是以二十八宿懸列將而察休徴三十五星聚天軍而赫符彩吕望垂竿於渭涘道峻匡周張良授䇿集作履於圯橋功崇佐漢乃有心如鐵石氣若風雲洛䜟書名集作名書河圖祕象青聨集作絲雷燭歷大塊以三休碧羽霜凄倚渾一作暉天而一息岑彭許允征南鎮北之名馮異王昌大樹中軍之號杜太行而泥函谷猛氣無前戳封豕而斬長鯨雄圖不測元戎十乘驅衛霍於前矛甲士三千集作千人列孫吳於後殿秋風白露執金鼓而齊六軍太山黃河折銅符而光百代建廟堂之䇿為社稷之臣孰能與於此乎在我真將軍矣公諱哲字知人巨鹿曲陽人也七代祖靖非前秦征北大將軍鎮北地上郡其後子孫因居集作家於寧州襄樂縣開國承家之始誕姓命氏之源大名發於本支當途峻於集作其層構三辰鬱鬱天街分畢昴之都九野茫茫地險列集作裂山河之境丞相以萬機論道匡大運以集作而震威嚴尚書以八座當官贊金行而標領袖文昭武穆方駕齊驅公子王孫朱輪華轂大鵬垂翰馭風伯而指南溟天馬騰姿偶集作按雲師而集東道祖唐隋天水郡丞河陽都尉瑶林瓊集作玉樹擢標格以千尋圓折方流委波濤而萬頃雄飛有望豈惟京兆之丞隂德不愆何直丹陽之尉父寶皇朝通議大夫總管府司參軍事東家孔子至德生於上天南國申侯眀靈誕於中嶽居集作君朝翊贊道先王之法言公府弼諧對上天之休命若夫聖人作而萬物覩元首眀而庶事康日月粲其光華山川鬱其雲雨則有英靈間出丹陵諧白獸之旌集作祥符瑞挺生黑帝感蒼龍之傑隋珠一寸魏后揚眉和璧千金秦王動色顔生殆庶聞於竹馬之年揚子參𤣥發自銅車之嵗建情峯而直上疏筆海以橫流雕墻則百堵皆興峻宇則千門並列可大可久無忘簡易之途為子為臣率由忠孝之境郭林宗之披霧豈敢名言孔文舉之欽風每相推薦若乃五才左傳作材並用誰能去兵七德兼施止戈為武出師於九天之上暗合兵書取法集作暌於十日之前懸符射法固以文武之道揄揚滿於城中將相之才籍甚聞於海內貞觀十五年起家補國子博士集作學士喬集作環林掃日驚白鳯於詞條璧水澄天駭雕龍於義壑班超慷慨常懷萬里之心季路平生每負三軍之氣十六年勑授左翊衛北門長上祿賜同京集有官字仍令為飛騎等講禮鄧司徒之舊事馬上讀集作披書祭征虜之前聞營中習禮宫集作杏花如錦還臨拜將之壇槐葉成帷復對聞軍之市自皇王眷命大帝應期運璇衡而制八方調玉燭而臨四極𤣥菟白狼之野來奉衣簮蟠桃析木之鄉尚迷聲教太宗文皇帝操斗極把鈎陳因百姓之心問三韓之罪勝殘去殺上馮宗廟之威禁暴戢兵一作姦下藉熊羆之用公丹心白刃本自輕生六郡三河由來重氣烏江討逆剖集作割項籍於五侯涿集作鹿野懲奸磔蚩尤於四宰集作豕二十年詔除游擊將軍右武侯信義府右集作左果毅都尉長上如故顯慶二年以內憂解職痛深吳隱哀集作禮極顔丁蹐厚地以崩魂訴髙天如泣血紫泥垂渙頻降璽書墨縗集作紱臨戎遂從金革三年詔除左衛清宫府左果毅都尉尋圉谷府折衝都尉並長上如故又以應詔舉對䇿甲科遷左騎衛郎將于時長榆歷歷烽火猶驚髙柳依依邊風尚急關山夜月遂為毳幕之秋西北浮雲翻作穹廬之景集作氣四年詔公為鐵勒道行軍總管陳兵玉塞按節金微學常山之蛇擬麗譙之鸛集作鶴鍾鼓嘈噆上聞於天旌旗繽紛下蟠於地伏尸百萬因瀚海而藏舟闢地數千即燕山而築觀武臣雄略氣懾西零神將宏圖威加北敵麟德元年詔遷左驍騎中郎將尋檢校右監門左武衛將軍本官如故昔者封禪陟雲亭之後七十二君圖書出河洛以還三千餘嵗振兵釋旅方崇薦帝之儀道洽功成必致禋集作因天之禮粵以皇家闢統之五十年今上開基之十七載登封告禪玉諜金繩建顯號而施尊名揚英聲而騰茂實華夷輯睦皆承萬嵗之恩朝野歡娛咸奉千年之慶乾封元年詔加眀威將軍本官如故大風遺孽叛換青邱小水殘魂慿陵碧海率百官於文祖尚興彭蠡之師㑹萬國於塗山猶有防風之戮是嵗也詔公為遼東道行軍總管營雄集作軍營對日兵氣橫集作浮天開玉堂而按部坐金城而勒陳闕鞏之甲犀兕七重艅艎之船舳艫千里駕鼉梁於聖海秦皇息鞭石之威泛鼇鈎於仙洲愚叟罷移集作拔非山之力然後風行電卷斬將屠城塞丹浦之遙源伐黑集作拔緣林之奧本王孫公子集作何孫曰子名霑皂𨽻之臣深集作澤谷太山境入樵漁之囿二年詔加上柱國仍檢校安東都護導之以德齊之以刑威振六官風揚五部兵戈載戢無勞尉侯之虞桴鼓希聞寧有穿窬之盜仰太陽而晞湛露方預四朝臨逝水而急寒風俄悲一去齊集作薛孟嘗之下淚髙榭曲池魯司冦之悲集作行歌頽山壞木長安杳杳集作眇眇還符日近之言京兆悠悠理一作竟絶天髙之問紫關生入判自無期繡服危集作晨還竟知何日總章二年三月十六日遘疾薨於府第春秋五十有四嗚呼哀哉詔贈左監門將軍禮也唯公被服忠孝周旋禮樂仁者見之謂有集作之仁智者見之謂有集作之知研幾冊府金縢玉版之書索隱兵鈐𤣥女黃公之法每建旟推轂三令五申躬擐甲胄親當矢石軍井未建集作達如臨盜水之源軍竈未炊似對嗟來之食由是南馳北走東討西伐集作征擲集作運之無旁按之無下載匡集作載筐漢書天文志作載筐宫裏遙登將軍之壇集作階閣飛星集作旗邊獨列集作踐中軍之位雖龍泉匿字薰歇光沉而麟一作鳯閣飛名天長地久夫人扶風氏隋濠州刺史闕之孫也五松春艷牽少女之祥風八桂秋雲降仙娥之寶魄謝家之子歌柳絮而知慙劉氏之妻頌椒花而自恥三周按禮無虧內則之風四德揚𬎼載闡中閨之訓宿盤集作蟠龍於月境集作鏡早沒鸞床集作林矯飛翼於霞樓先沉鳯穴珠星璧月終陪季子之階金鼎銀樽竟列齊侯之寢以貞觀十五年五月五日終于某所越咸亨元年某月日袝於某原長子瓜州司倉擇木次子右集作左衛親衛𤣥封等門傳萬石庭列雙珠花蕚爭榮芝蘭藹秀集作疊藹天經地義欽承避席之談日就月將䖍奉超庭之教變槐檀而瀝膽木石悲酸代露霜以崩心幽眀感動葬之以禮登之以時生民集作人之本盡矣死生之義備矣孝子之事親終矣於是門生故吏共緝家聲才子文人思傳盛德庶使蘭相如之壯集作生氣歷千載而猶存隨季集作武子之餘風盡集作登九原而可作其詞曰文王受命畢公餘慶玉樹聨芳金枝叠映三分並列七雄齊競建國承家重熙纍盛功宣蹈舞德流歌詠河洛垂文山川吐集作出雲驪珠育照虹玉呈文集作氣直立孤聳天然不羣棲遲膠孰恱懌集作敦閲邱墳恥為儒者自許將軍伊祁不懌軒轅討逆陳擁遼河嶽鎮集作屯碣石班超投翰揚雄執㦸弓合三才刀長四尺爰清尉侯載澄疆場得人者昌失人者亡皇恩俾乂帝曰眀揚幽桂含馥滋蘭吐芳承天待詔觀國賔王茂實集作續斯逺音聲一作華克彰鵬池渺漫雞山禍亂出閫集作門辭家夷凶靜難金微瓦解玉亭水泮扈駕命旋集作天門陪祠日觀萬邦胥恱千齡啓旦斗骨危城占蹄舉兵丸山霧塞渤海波驚帝赫斯怒王師有征䖍劉北貌疑作循集作類戡剪東眀遵以文軌宣其德刑太微上將文昌貴相非熊非羆令聞令望寵踰軍幕榮參武帳本謂來朝何期返葬原野蕭瑟風烟悽愴天道如何吞恨者多松風夜響薤露晨歌秋月如練春波集作雲似羅榮華滅後寒暑經過青烏邱壠白馬山河後周明威將軍梁公神道碑蓋聞君為元首臣作股肱或論道三槐或折衝千里至有道存爼豆藝總干戈髙視翰墨之英猶布瓜牙之旅䆒青編於學府業有多聞受黃石於兵符算無遺䇿故得九功咸叙七德攸彰文武不墜公實兼美公諱待賔安定臨涇人也竦以英才逺邁知州縣之徒勞鴻以抗節遐征覽帝京而有作由是五噫標興播金石而騰徽七貴承榮綰銀黃一作璜非而叠茂貞規盛烈映史凝圖粗紀詠歌無俟詳確髙祖禦後魏駙馬都尉侍中少保金紫光祿大夫揚州總管贈太尉諡昭公食邑二千户銀榜增輝玉壺流渥位隆三少化浹五胥既而幽壠埋魂終降槐庭之贈髙門納駟式居茅社之封曽祖睿宇文周駙馬都尉鄜秦二州總管光祿大夫兵部尚書隋益州總管蔣國公贈司空食邑三千户白水時清乳武之謡行息光祿武垂異扣馬之諫必申加以主西子之羣英名髙八座遵文翁之遺訓學富三巴茂先榮級忽光泉壤漢祖寵章永有帶礪祖演隋沙州刺史上柱國公踐仲寧之餘躅奸邪斂手簽疑孝仁之逺蹤羣凶革面連州跨郡邁陶氏之隆基開國承家掩張門之纍葉父贊隋左千牛備身驪山府上騎上柱國唐朝豐王府咨議雲州司馬冀州長蔣國公襲良弓於簪笏榮侍紫宫翼雕㦸於巖廊肅趨丹地西園坐謶疑作宴侣眀月而飛文北土行康望浮雲而展足公漸潤膏腴發靈川嶽七年可識抱杞梓而呈才千里見知負騏驥而騁駿靈臺逺鍳與霜月而齊眀智府𢎞深共烟波而等曠踐仁義於區域白璧已輕許然諾於樞機黃金豈重因心孝友宜於自然率志謙冲得乎而疑作所性不脂韋而求達不詭計而自媒被玉軸之文章三冬遽足窮金壇之祕訣百戰不孤譽滿寰中聲蓋天下而學優將仕允屬名家欲升鴻漸之姿終佇鶴鳴之問以唐朝麟德二年補左親衛從資例也屬金甲出戰玉帳論兵從命文昌問罪遼碣公提戈赴海投筆從燕智者有謀仁者必勇孤鋒直進九種於是克清匹馬橫行三韓由其殄􅀈疇庸賞最我有力焉俯洽恩波泛承勳級即綬上柱國公深漸位薄命舛數竒雖霑勒石之勳未展披堅之效嗟呼揚子雲之才藻空疲執㦸馬相如之文詞猶勞武騎今古同貫夫復何言既而從牒隨班牽絲闕務起家拜朝議郎永淳元年正月三十日一無此字授伊州伊吾縣丞非所好也路闕金河途連玉塞塵沙共起烽火相驚秋草將腓胡笳動吹寒膠欲折敵騎騰雲公佐佑多方掌司攸寄服叛懷逺擒奸擲伏於是冦敵不敢窺邊歌頌因兹溢境曽未朞月正疑作政令大行特簡帝心超居不次永淳二年二月四日制授昭節校尉守右衛蒲州府佐果毅仍令長上兼於上陽洛城等門供奉公洞曉戎章妙詳兵律軍國是賴戎幕允歸由是徼道長巡嚴扄每奉朝求夕警不怠於風霜善投能防更申於間皂其年十月七日奉勑命於仗內祥麟廄檢校馬公識髙東野職參西極勵銜䇿而追風逐日加剪拂則絶電奔星駃騠將駙騄齊衡驥騮共騊駼伏櫪於是龍媒間出麟友挺生伯樂多謝於精微日磾有慙於秣養恩制褒奬又加崇秩文眀元年二月二十日遷游擊將軍仍依舊長上大周革命兩儀開闢爰覃作解之恩式暢惟新之典勤勞夙著體望允歸拜職遷榮實符僉議天授元年九月十六日加威武將軍守左玉鈐衛翊善府折衝都尉依舊長上封安定縣開國男食邑三百户公祗奉王庭職司兵衛八屯由其增峻五校於是克宣翼翼兢心積劬勞於嵗月勤勤忠志懷局蹐於序時憂能傷人竟成沉疾以長壽二年正月六日終於神都旌善里私第春秋五十惟公弱不好弄卓爾不羣九嵗眀詩七齡通易月初能對即習黃童目不相訓還慙夫子經耳不忘歷口不遺性沉深有器度能倜儻無拓闕重交友雅愛林泉月幌風襟每吟謡於箋綵花新葉早必賞㑹於琴樽加以啼猿落鴈之竒鸞驚鳯翥之妙㵼水懸河之辨背碑覆局之精標映前哲公實多敏至孝過人雍和絶俗事父母則造次不違友弟兄則溫柔必盡既風樹興感霜露纒悲聿修之德惟新欲報之恩罔極䖍誠大象𢎞誓小年疑作乘廣樹慈仁庶慿因果月抽官俸日减私財並入薰修咸資檀施故得雕檀之妙俯對禪龕記葉之文式盈梵宇粵以大周長壽二年嵗次癸已二月辛酉朔二十四日甲申遷窆於雍州藍田縣驪山原舊塋禮也葬事之屬一皆官給鼓吹儀仗一作事儀送至墓所墳開白日終留恨於滕城禮被皇家忽霑榮於霍隧嗚呼哀哉嗣子左千牛去疑哀纒泣柏思結餐荼仰庭禮而不追覩極書而增慕恐𤣥穹倚杵碧海成桑敬勒貞堅乃為銘曰大哉嬴國逺矣少梁與秦同祖今則夏陽爰暨伯翳胙土惟良自兹厥後人物克昌逮乎漢朝令望不已三至連輝七侯承祉或顯或晦有文有史舄奕圭璋芬芳蘭芷少保名揚司空道泰惟祖惟禰蟬聨軒蓋挺生令則在邦之最丱嵗騰芳􅀢年超靄君號神童晚稱英傑佩仁服義又眀且哲七步立成五行不輟家惟萬卷韋實三絶詞髙許下學富淹中志惟謹潔心亦冲融溫淳植性朗潤在躬閨門禮洽朋友財通思若雲飛辨同河㵼兼該小說雍容大雅武擅孫吳文標董賈樹下啼猿封中試馬且文且武闕登位海隅不賔命我偏帥既陪勒石還從飲至輔翊百里褒升佐二既總兵權入司宫掖徼道宵警禁門曉闢式重其駿載懷斯癖我馬既良我軍既雄折衝千里趨奉九重行承芝詔坐啓茅封恨深負米榮暨擊鍾爰持戒律思答慈容將福有徴謂仁必壽如何淑德遭此凶咎孺慕崩心惸婺宿首泉扄一間疑作閉天長地久文苑英華卷九百六
