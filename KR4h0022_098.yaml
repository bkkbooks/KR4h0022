body:
  text: 文苑英華卷九十八宋李昉等編志二虛室賦一首宴居賦一首巖棲賦一首述初賦一首幽懷賦一首釋懷賦一首問大鈞賦一首虛室賦張說明月忩前古樹檐邊無北堂之樽酒絶南鄰之管絃理涉虛趣心階靜緣室惟生白人則思𤣥厭百慮之勞止歸一途之兀然嗟乎巧智首亂禮樂增矯名起異端利成貪兆役二見之交戰驅五神而雜擾形何費而不衰性何煩而不夭每竭源而追末必志一作忘多而獲少玉帳瓊宫圖奢務豐朱門金穴恃滿矜隆榮與欲一作辱而俱盛事隨憂而不窮陷營為之桎梏留健羡之池籠心元是幻法本皆空莫不因無證實假異生同魚何知而樂水蛇何意而憐風大哉默識守此𤣥通顧瞻天下還如夢中宴居賦并序魏歸仁一作仁歸張校書作虛室賦以示豫文㫖清峻𤣥義深逺豫味之有感聊為宴居賦以和之其詞曰氣序忽諸日月其除夏盡炎歇秋至凉初地僻而人物自少庭閒乃室宇成虛寂爾無悟蕭然宴居覽聖賢於上古窺得失於前書或智之不足或愚而有餘諒千變而萬化尤難得而備疏若夫名因行立身一作官由才致官要則謗議斯起譽髙必讒毁自一作俱至所以君子逃名逹人避位養性以安其體摛文以見其志且貴不如賤善亦同惡貴則但益憂勞善乃未離貪著徒憐顛覆之禍虛纒愛欲之縛前事既忘後車焉託儻來未足有慰或去可以無怍固當絶於可否齊其適莫聞寵詎驚其心居陋寧改其樂蓋老氏稱德所貴先慈孔門之道一以貫之於常則有允出厥兹一作於帝則允出茲在兹屈伸委運行用隨時既無去無取亦何慮何思凡一作見張說集巖棲賦吳筠感𤣥聖之垂訓悟已親而名疏言可放而從默身應卷而忽舒爰鷦鷯之巢林在一枝而有餘性所悅而難違託茲山以結廬果栖遲而我愜即逍遙之靈墟觀其繚崇巒橫峻谷激泌泉羅森木後巍峩以縈紏前參差而聳伏追隂壑之夏凉偃陽崖之冬燠美徑節於松筠玩幽芳於蘭菊虛籟清耳閒雲瑩目因海鶴以警夜任鵾雞以知旭慮靜於無擾神恬於寡欲於是歌考槃於詩人諷嘉遁於大易逺浮俗之艱險消毁譽之損益蹈方外之坦途信可免於兢惕既即隂以息影由不行而滅跡雖區中之末計實世途一作表之良一作長䇿人所棄而已收故處約而恆適覽無見以收視聽無聲以黜聰和匪專於㫖酒樂奚必於絲桐焚清香以練氣啓玉檢而擊蒙期遺滯於昭曠庶近真於感通鑒太虛之有象覆妙用之非空朝天甚簡採藥多暇形猶資於吐納意已迸於將迓知道無廢興而物有存謝故挹生本而常生體化宗而不化蕭蕭絶塵境誰與鄰一作與誰為鄰跡逺而朋逰一作友益曠機忘而鳥獸可馴韻靡叶於當時心常依於古人仰由皓之逸軌詠羲農之化淳師黃老之𤣥奧友松喬之道真慙無功之逮物良獨善於吾身秪所幸其自得敢韜精於隱淪述初賦并序梁肅豫幼而漂流遂寓於江海之上與鳬鴈為伍有年矣或祿仕以代樵牧其暇則以羣籍自娛又嘗染重膇疾每求長桑氏之術以為療其他未之思也方俟一作疾字間則追尚平五嶽之逰無幾何㑹明詔以監察御史徵俄轉右補闕羈守職次未遑自免江湖之思漫如也間一歲加翰林學士領東宫侍讀之事既微且陋載荷天眷上不能宣令一作上德通古今當論思之任次不足𢎞三善備教諭充端士之列每省名位眄章綬中心􅜢然不欲寢食無一日而安一作忘者三年於茲其愧畏乃如是時步自中禁休於里巷病攻其外神倦於中囂焉忘形思及道本然後知一動一靜萬化殊塗寂然同歸未始有物且不知夫曩嵗之浮逰與今之局束彼乎此乎是歟非歟杳不得其倪矣於是作述初賦以紀懷且貽諸同志焉耳􅜢然一作惄然我洪系兮肇昭耿乎伊唐始贊禹以陳謨末開國而為梁遭暴嬴以滅周兮涉天漢而方彰社一作祖郃陽而守九江系祖漢廷尉郃陽侯諱放見漢書武威九江太守髙山侯諱統見後漢書逮七序而見光後漢侍中褒親愍侯諱竦作七序有傳云耳維凉牧之豐融後漢黃門侍郎凉州刺史侍中關內侯諱寬見魏書咨散騎之狥節晉散騎常侍馮翊太守扶風鄉侯諱廙死愍帝之難贈吏部尚書益州刺史見晉書遭匡攘以遷逝遵河右以蟬蛻晉蜀郡太守寧州刺史扶風鄉侯諱迪生酒泉太守關內侯諱秋避亂居張掖綿侯服以守業傳龜組而罔替自酒泉以下六世郡守關內侯煒司空之藩魏𢎞茂德為表綴魏大將軍洛州刺史贈侍中司空郃陽公諱越見後魏書翼翼尚書允明且哲司空之孫隋御史大夫刑部尚書邯鄲敬公諱晄隋書有傳納言執法乃遂乃逹播五葉而逮豫垂慎一作奮身之芳烈伊孤朦一作蒙之薄祜撫生植之多艱豈前修之將墜藐才菲一作下而體孱奉徙宅之善教得帶經之殘編諒不師而不訓烏一作焉識立德與立言洎章甫之在首始礪志以就賢思琢璞以解蔽終扞格而難前升九一作孔皓之宏軌探乾坤之大紀求專直與翕闢問性命之終始曰君子之不用實未成之所擬苟體健以立誠何剛柔之不履慨尋繹以內省觀萬動之攸歸若捫天而罔階知集木之匪危何大道之汗漫一作坦慢悼一作惟吾人之崎巇一作戲仰前哲二字一作哲賢之休風屢惆一作怊悵以忸怩且自擊以自考亦三復而九思庶初筮以發蒙敢捨龜而觀頥美海嶽之靜深援幽人以為二字一作而與期聿投迹於林中就拙者之所宜屬夫上有聖帝旁求俊又戴馳車乘搜及瑣細彼執持憲簡與匡補闕載宜乎學該紀律識洞經制故一作胡小人之備官幸不招損而速戾一有斯字時也天光鏡乎宇內洪稜憺乎荒外上躬祀於泰壇先假廟以告配百神受職以咸秩萬國駿奔而來祭肆覲創五月之吉朝宗盛三朝之㑹月窟日際風行雨霈謬參侍從之臣獲睹人神之泰又感一作盛夫翰苑崇祕人文是經樂正司業元良以貞講藝承華視草承明莫不才侔相如道博桓榮何皇鑒之偏屬降湛恩於鯫生若側足以登塗方飭躬以效誠􅋏書紳之猶怠慮數馬之非精晝兢兢以徊徨夕默默以屏營豈不以命重才輕惕一作隕字墜而不敢寧也我寓一作㝢我居於彼南里匪揚車騎實逺朝市羌歸沐以斯憩聊優遊以休止旁枕大道其平如水南望南山橫空黛起君子所履小人所視乍掃室以自安殊塞門而不仕於是有竹有梧清風穆如放懷端居𤣥宇一作默自虛遺原憲一作思之貧病忘􅑔武之智愚喪我南郭之几盡性西域一作方之書悟幻有之遷幹得環中之妙樞合乃一指流為萬塗審物我之同域又遑遑其焉如何睿后之渥飾冝克恭以忘劬惟一作奚少海之洪瀾豈勺水之云輸伊志慮之久曠矧疲疴之集豫徒端直以勿二又焉能以一無此字為乎有無冥冥飛鴻其虛其徐英英白雲亦卷亦舒吾企夫物之未及故浩然而述初幽懷賦并序李翺朋友有相嘆者賦幽懷以答之其詞曰衆囂囂而雜處兮或嗟老而羞卑一作感老而嗟卑視豫心之不能一無此字然兮慮行道之猶非儻中懷之自得兮終老死其何悲昔孔門之多賢兮惟回也為庶幾越一作超羣情以獨去兮指聖域而髙追因一作固簞食與瓢飲兮寧服輕而駕肥望若人其何如兮慙吾德之纎微躬不田而飽食兮妻不織兮一作而豐衣援聖賢而比度兮何僥幸之能希念所懷之未展兮非悼已而陳私自祿山之始兵兮嵗周甲而未夷何神堯之郡縣兮乃家傳而自持稅生人而育卒兮列髙城以相維何茲勢一作世之可久兮宜永念而遐思有一有三字苖之逆命兮舞干羽以來之惟政刑二字一作刑德之既修兮無逺邇而咸歸當髙祖之初起兮提一旅之羸師能順天而用衆兮竟掃寇而戡隋已注在前况天子之神明兮有烈祖之前規剗弊政而還本兮如反掌之易為苟廟堂之治德兮何下邑之能違哀余生之賤逺兮包深懷而告誰嗟此誠之不逹兮惜此道而一作之無遺獨中夜以潛嘆兮匪吾憂之所宜凡一作皆集本釋懷賦并序讀黨錮傳哀直道之多尤不容作釋懷賦其詞曰懷夫人之鬱鬱兮歷晦蚤而傷一作不離吾心直以無差兮惟上天其能知袤於一作崇德而必好兮忠何尤而甚一作彼疑彼陳詞之多人兮胡不去衆而訊之進盡言之不信兮退逺去而不獲弗驗實而考省兮固余道之所厄昔師商之親一作規聖兮德既均而行革惟肝腸之有殊兮守不同其何責願披懷而竭聞兮道既塞而已行路非險而不通兮人忘我而異情王章直而獄死兮李固忠而陷刑自古世之所悲兮矧末俗之衰誠哀貞心之潔白兮疾苖莠之紛生令農夫以手鋤兮反翦去乎嘉莖豈捐一作豈不指穢而語之兮詳一作佯瞪矒而不肯聽欲釋去而不忍兮終留滯亦一作以何成當晨夕一作旦而步丘一作立兮仰白日而自明處一世之若流兮何久求一作永而傷情樂此言而自一作內抑兮壯大觀於兢生拔馨香之茞蘭兮樹蒿蔚以羅列斥通路一作道而使蕪兮戀棘徑之中絶置春秋而狥心兮羌與此其奚别昔誓辭而幼一作約文兮期共死以皆居嗟而而作所守之既異兮乃漫汗而遺初心皓白而不容兮非市直而望利忠不顧兮立忘一作忠不顧而立忘兮交不同而行棄悲夫不狥已而必仇兮諒非水火其可一作何畏猥一作獨吾行之不然兮直愧心而懼義嘉山松之蒼蒼兮嵗苦寒而亦瘁一作悴吾固樂其貞剛兮夫何尤乎小異欲靜默而絶聲兮豈不悼厥初之所志抑此懷而不可兮終永夜以歔欷一作噓唏凡一作皆集本問大鈞賦并序劉禹錫始余失臺郎為刺史又貶州司馬俟罪朗州三見閏月人咸曰數之極理當遷焉因作謫九年賦以自廣是嵗臘月詔追明年自闕下重領連山郡印綬人咸曰美惡周必復第行無恤嵗杪其復乎居五年不得調嵗二月有事於社前一日致齊孤居慮靜滯念數起伊人理之不可以曉也將質諸神乎謹貢誠馳精敢問大鈞其夕有遇寤而次第其辭以為賦圓方相函兮浩其無垠窅冥翕闢兮走三辰以騰振孰主張是兮有工其神迎隨不見兮强名之曰大鈞敧以臨下兮巍乎雄尊天為獨陽髙不可問工居其中與人差近身執其權心平其運循名想像或一作斯可以訊曰嘻䝉之未生其猶泥耳落乎埏埴惟鈞所指忽然為人為幸大矣工賦其形七情與俱嗇智不受畀之以愚坦坦之衢萬人所趨䝉一布武化為畏途人或譽之百說徒虛人或排之半言有餘物壯則老乃惟其常否終則傾亦不可長老先期而驟至兮否踰數而叵量雖一夫不獲兮亦大化之攸病謹薦誠上問兮俯伏以聼是夕寢熟夢逰乎無何有之鄉抗陛級乎重霄兮異人間之景光中有威神巾金巾見黃庭經一作甲而煒煌命之使前兮其音琅琅曰吾大化之一工也居上臨下廉其不平汝今有辭吾一以聽播形肖貌生類積億槖籥圈匡鎔鍊消息我之司智初不爾嗇不守以愚覆為汝賊既賦汝形輔之聰明盍求世師資適攸冝胡然抗心一作志遐想前烈倚梯青冥舉足斯跌韜爾智斧無為自伐鑿竅太繁天和乃泄利徑前誘多逄覆轍名腸內煎外火非熱今哀汝窮將厚汝愚剔去剛健納之柔濡塞前竅之傷夷一作疾兮招太和而與居貰以待人兮急以自拘道存壼奧無示四隅軌一作骩物之勢不作兮見傷之機自無汝不善用吾焉嗇乎且夫貞而騰氣者膴膴健而垂精者昊昊我居其中猶輪是蹈以不息為體以日新為道倮鱗蜚走灌莾苞皂乃牙乃甲乃殈乃剖陽榮隂悴生濡死槁一作薨各乘氣化不以意造賦大運兮無有淑惡彼多方兮自生醜好爾奚不德余以驟壯姑尤我以速老耶觀汝自為又或不然赤子哇哇忽其能言亦既名物幾時蹁躚春耕其丘投種之日釋耒而嘆何時實栗望所未至謂余舒舒欲其久留謂我瞥如我一子二誰之曲與彼蒹葭之蒼蒼兮霜霰苦而中堅松竹之皸皴索籜兮不若榯筍之可憐納材葦而搆明堂兮固容消而力完揚且之晳兮不可以常然當錫爾以老成蒼眉皓髯山立時行去敵氣與矜色兮噤危言以端誠俾人望之侮黷不生爾之所得孰與壯多不善處老問余而何受教而廽蘧蘧形開嚮之威神孰為來哉乃遽衣促盥端慮滌想委佩低簪持簿叩顙而言曰楚臣天問不訓今臣過幸一獻三售始厚以愚終期以壽忘上問之罪濯已然之咎心增故術腹飽新授馳神清𤣥拜手稽首文苑英華卷九十八
