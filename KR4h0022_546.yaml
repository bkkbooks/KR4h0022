body:
  text: 文苑英華卷五百四十七宋李昉等編鳥獸門二十四道屠龍判一道射牛判一道驅犢蹊園判一道殺牛判一道為父殺牛判一道不埋狗判一道射猿判一道死官鵝判一道斷屠月殺燕判一道養賈兒判一道為硩蔟判一道殺鳥獸判一道解牛鳴判一道解鵲語判一道神為異聲判一道弓矢驅烏鳶判一道蕃客求魚判一道獻千嵗龜判一道宴客鱉小判一道養雞豬判一道父病殺牛判一道狗傷人有牌判一道牛抵馬判一道解牛鳴判一道前有此判題各對屠龍判丁以屠龍為業乙告不經對鱗族惟錯實繁有徒人不知非龍實有智風雲遇坎見困豫且變化逢屯充膳夏后丁以詭俗為事遊刃非物或異仁賢罔識悔吝何則犬不言殺前哲良規馬重有功後代明訓况四靈之貴萬化之資匪惟瑞啓漢年固以仙登軒帝以屠為稱豈不作法於涼以律繩之可謂自貽伊戚射牛判萬年縣申王祚告侯明射牛明疑狼入圈中齧牛將弓射狼誤中牛事對三元赫赫牛星紀於北方八極悠悠牛山建於東國錢塘水上逺浮金鎖之輝蜀郡江前遙沉石犀之影豈止披蹄載角玉鞅華鞦南州聞果下之名西域表花津之異固以禮標極敬大祀資於潔圭易贊神明引重憑於致逺由是降兹綸綍著彼科條薑牙絶其鼓刀庖丁息其遊刃侯明鄉閭賤品稼穡庸夫常傳寧戚之經久習髙堂之法西河資産希十千而萬計東州奔駿方一日而千里俄而野心興暴縱目為災引騂角之雕弓控青筌之箭羽異天弧之垂象空法向狼之星殊封禪之舊章便為射牛之事誤殺不禁著自彛章罪疑從輕聞諸古實驅犢蹊園判乙驅犢蹊丑園丑怒留其犢乙訴強劫對人守堅貞克終無替苟失亷節其弊斯生乙棲心丘園偃志間雅忘負鼎之事從叩角之遊徘徊泉石躑躅林草雅志情逺防微理乖事須正子夏之冠避朱仲之李豈得牽壽春之犢踐於陵之園人而失圗一至於此丑也奚據罰彼何深所損既在於場苗取酬便過於佩犢叔時作喻蹊田罪輕丘明述事奪牛刑重前文已決後見須依殺牛判丙告丁殺牛事丁别款丙鑄錢州斷盡處極刑使出從徒對議獄緩死先典攸愼聽言觀色法貴詳平刑罰暫虧手足無措眷彼丁矣有異里仁見蒲葉之生春無聞曵耒入桃林之巨野爰事鼓刀遂令河渚風秋奄沉星彩蜀山路險不見金生丙匪良交遂來相訴芳蘭入詠遽展契於風雲叢棘議刑幾窮詞於刀筆搖尾求食斯之謂乎朝歌殺牛理非謬矣方引循環之辨翻露鑄錢之責𬗟監厥迹奚其若斯未盡金潭之由更起淮陽之獄州司振藻處以極刑使者彈毫將為徒坐諒哀矜而勿喜何輕重其若斯狀外不推使司得其折衷案中論死州法酷其深文結以徒刑吾無間矣為父殺牛判韓孝隨父行牛驚抵人恐損父遂以刀殺牛牛主論告孝請價陪填事對天經地義道冠生靈立身揚名德光終始見危授命宣尼以為美談臨難捐軀馬遷述其遺烈韓孝不忝人子先隨父行逢瑩角之初驚以衝燕壘遇奔蹄之暫躍若走秦郊蒼黃貽性之憂倏忽慮庖之患霜鋒一舉若庖丁之刃遊氷鍔聊揮似宰夫之斷割原始雖稱犯罪要終未可論辜既符名教之規還申壯勇之節酬價匪虧公理與直有愜私家庶叶平反之詞以表從輕之典不埋狗判城外多死狗法司責京兆府不埋訴非掩骼時對惟犬守禦居人是要混雞而入坐識於新豐伴鷹而遊行傳於上蔡是故閭閻密邇音響相聞喧雀成譁表貧吏之節噬腓起戒陳為主之誠何畜養之是均而城外之多死知殃預兆未䘖吳相之衣遘斃遄深為食驪姬之藥流穢行路彰聞法司舉過從愆事關京兆且弊帷從棄孔丘之義有虧掩骼候時周公之禮可守二途交戰須定是非執禮而行斯亦為得射猿判戊至丙乘舟來峽射猿中之黜其職丙不伏對沉沉長江巖巖峻峽波瀾浴日嶺嶂橫雲路出東吳即是三聲之地途危西蜀還尋萬里之橋顧維彼丙在兹于役乘流振楫方從赤馬之遊滿月彎弧遂落玄猿之影雖同養由之妙終致桓公之黥於人則事乖親愛在獸則理切肝腸彼或可傷此可辭黜死官鵝判乙養官鵝多死或告不以人養鳥對池籞大開羽族無算乙忝夷𨽻職養官鵝諒須盡心能識其性稻粱可遇蔓藻堪遊浮積水而連羣向長風而鼓翅一作翮遂其棲托終冀繁多倦鸚鵡以樊籠樂鶢鶋以鍾鼓以人養鳥不死胡為儻或類兹如何免責且片言折獄自古攸難理宜再詰是非不可輕為與奪斷屠月殺燕判甲為蒺藜飼􅜈子致死鄰人告斷屠月殺燕子對丁家巢泥載聞於頭秃黃氏把火旋見於眼傷甲之無良情則非善以蒺藜而充飼三子俱亡無桃李之垂隂一朝被告迹符周氏罪挂湯羅循情合科凖狀難捨養賈兒判丁養賈兒能馴擾啄人穀不伏陪對丁為拙好收養賈兒日月淹延羽毛成就逢人不懼遇物無驚有鴨羣之精神得鸒斯之風彩楚鳥一作烏既非别族吳鴉亦是一宗未能甘鼠已聞啄穀鳥未損物人則何辜即索陪填恐非通允丁稱不伏理亦無乖為硩蔟判甲為硩蔟以十日號覆鳥巢對順時之令則無覆巢作災之禽固資書版陳之禮典布以人倫苟或在辰克用兹道是以有梟萃止爰結興於詩人見彈而求乃寓言於莊叟長沙夭性入室貽凶曲阜陳誠毁巢標喻硩蔟氏職惟斯掌務乃昭明有均大羅之躅是忝虞人之效將去妖鳥式徇其義一作議既均惡聲庶無全卵日號月號之法書而不愆從子從角之規用則斯備周典非昧方書是懸均射隼於高墉豈巢鵀於外户將使驚鳴緒閴同反舌之無聲聫翩影搖隨退鶂之不駐事非詭妄告實欺誣諒稽十日之號難置三章之典殺鳥獸判今有過而殺傷鳥獸者甲以人成之對大羅以往禮猶因襲豢龍斯廢法亦罕聞自我化及豚魚仁霑草木放楚人之鵠不咎使乎驚梁君之鴈豈誅行者獸育豐草鳥棲平林一角以瑞於昌期九苞載叶於仁義瞻言過者豈得傷乎必也百獸異倫六禽殊類稻粱空費庖厨未供遇而見傷亦何矜其非政捨而勿問庶得令其維新一作令其惟新甲以人成恐乖中典欽哉惟恤寧失不經解牛鳴判乙聞牛鳴云是生三犧或告妖妄欲科罪不伏對隂陽不測造化多端故有夷蠻之𨽻實司鳥獸之語乙波流未息克廣前書精義不窮旁通異類告稱妖妄欲抵刑章即科介葛之辜實恐冶長非罪以今况古不坐為然解鵲語判乙被告殺夫縣執之訴稱鄰婦不伏其罪郡以鵲來相告將可為徴者對道全皆應感至必通能分禽獸之言豈專夷貊之𨽻公冶長之縲絏鳥語知非介葛盧之犧牲牛鳴辨數始由人聼終見物情乙以氣烈剛腸寃深反目素不謹於帷薄終取敗於嫌疑行兹亂風自抵邦憲徒嫁禍於鄰婦冀逃刑於我躬屬郡縣察微輕重不濫比夫窶數知來頗類乎方朔驗兹􅀈鵠古沃切廣韻􅀈鵠鵲取效何異於公明管輅字也鳴鵲事見夲傳古而有徴今也寧惑殺人之罪按律可求孽乃自作死將誰緩神為異聲判甲邑里有神為異聲所不供太隂之弓請科之訴云掌非武庫對至若日月薄蝕君臣著象夢轉歌於童子聞取幣於嗇夫伐鼓回輪有祗膺之事迹隂弓枉矢開救射之規模義雖責於上公物終列於庭氏藏非武庫救即羣妖何邑居之有災見主司之不務殊若在已近欲幸人既闕五兵之威因虧十日之號實忓古安切擾也又胡旦切抵也於典良尸厥官思取義於磔攘請論刑於徽纆弓矢驅烏鳶判詔賜蕃客宴有司不以弓矢驅烏鳶御史劾之詞云非祭祀之事對蠻夷麏至潔牛羊以宴私弓矢載張備烏鳶之鈔盜苟饋食而則爾豈薦饗之獨然况乎要服在庭舌人委體方示懷於犒飲胡廢職於驅除且賔主恪恭須防墜鼠之穢牲牢備禮寧無攫肉之虞曾是闕於弦弧復何徴於擊豕疑周禮盡在既專分鳥之司陳力自乖宜憚乘􅍡之劾蕃客求魚判蕃官一作客至鴻臚寺不供魚客怒辭云獺未祭朝議失隨時之義對沙漠實來供宜必備澤梁有禁殺則以時信能及於鯤鮞化方行於蠻貊彼卿之屬得禮之中雖諭以象胥或聞彈鋏而徴諸獺祭未可振緡既懷友一作支國語禮之立成者為飫飫歌名曰支以享夷狄疑用此事物之虞遂阻烹鮮之請辭不失舊事必有初是曰國之典常焉用隨時之義且駒支昧禮信未習於華風里革見國語當朝返有迷於夏濫矜其異俗責在有知合恕過求姑懲輕議獻千嵗龜判戊獻千嵗龜有司以欺罔舉科訴云得之於叢蓍之下對獻其介物雖合疑年驗以生蓍則當有數戊得兹外骨藉自幽叢嘗聞見夢之神將期百中况察退藏之所足辨千齡冀令僂句不欺誰謂蜉蝣興惑盍徴幽贊寧罪矯誣居蔡於家則吾豈敢遊蓮有嵗視子非無科之蓋有不知獻者此宜無罪宴客鱉小判甲饗客羞鱉小客怒其不敬辭曰水煩非傲對燕以示懷鱉於何有姑宜飲德豈誚水煩責外骨之不豐顧褊心之奚甚甲大將展禮旋遇過求水潦方塗且乏大為貴者壺餐一作饔飱苟備何必長而食之我惟敬於上賔爾寧貪於介物小不能忍禮何以觀儻羞南澗之毛尚當遺味詎勞東海之鱉然後合歡詞未爽於小施怒難信於堵父養雞豬判甲為郡守令百姓養母豬及雞督郵諌其擾人不許對扇以仁風阜財為急教之畜擾利俗則多甲位列馮熊政司佩犢將除飢餒之患用先蕃息之資俾爾生生非豫擾擾二彘既侔於龔遂五牸足驗於陶朱訓養雖勤割烹斯利既符孳貨庶罔食貧使荷蓧之夫不空為黍倚杖而牧豈獨割葵人無見卵之思俗皆掩豆而祭實惟務夲焉用他規且異米鹽之煩寧懼糾繩之諫父病殺牛判壬父病殺牛祈禱縣以行孝不之罪州科違法對力施南畝屠則干刑祭比東鄰理難逢福冠帶縱勤於侍疾鋩刃寧同於彼祅壬憂或滿容殺非無故愛人以德未聞易簀之言獲罪於天遂抵椎肥之禁志雖行孝捨則亂常父病雖切於肺肝私禱豈侔於繭栗且宋人皆用或免乘城之虞魏郡不誅終非棄市之律令不惟反政是以常縣恐漏魚州符佩犢狗傷人有牌判癸家養狗傷人乙論官請償辭云有牌記行者非慎對畜狗不馴傷人必罪有標自觸徴償則非既縣迎吠之書寧忘慎行之道癸非用犬乙豈尤人防虞自失於周身齧噬尚貪於求貨有牌記而莫慎則欲請庚無標識而或傷若為加等徴詞可擬往訴何憑牛抵馬判得甲牛抵乙馬死乙請償價甲云在放牧處相抵請陪半價乙不伏對馬牛放牧蹄角難防苟死傷之可徴在故誤而宜别况日中出入郊外寢訛既谷量以齊驅或風逸而集作之相及爾牛孔阜奮騂角而莫當我馬用傷踠駿蹄而致斃情非故縱理合誤論在皂棧以來思罰宜惟重就桃林而招損償則從輕將息訟端請徴律典當陪半價勿聼過求解牛鳴判得乙聞牛鳴曰是生三犧皆用之矣問之皆信或謂之妖不伏對上稟天性旁通物情是謂生知孰云行怪况形雖異類心則同歸四鳥分飛聽音既稱有信三犧皆用聞鳴豈可為妖且叶前言殊非左道爾惟不講我則有辭揆以周官業將司於夷𨽻詳夫魯史責不及於葛盧獸鳴可徵人言奚恤文苑英華卷五百四十七
