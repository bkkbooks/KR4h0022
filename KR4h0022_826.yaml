body:
  text: 文苑英華卷八百二十七宋李昉等編宴遊五居處盧郎中齊居記一首㑹稽虛上人石帆山靈泉北塢記一首司徒岐公杜城郊居記一首廬陵所居竹室記一首堂上草堂記一首虢州三堂記一首廬山草堂記一首尉遲長史草堂記一首居處盧郎中齊居記李華鴻鵠遡清風陵皓氣翺翔自得於冥冥之間故虞衡矰繳不能為患甘芻豐秣羈縶駿驥首冠鑁錫身被纓纕力方盛也騁於康逵及其殆也困於鞭策由是智者高鴻鵠而卑駿驥豈妄而論之一無之字哉今凶渠假息五兵未偃廟堂有風力之臣征鎮皆方召之老則仁人靜士戢伏自持各其志也尚書左司郎中嗣漁陽公盧振字子厚奉世德而聿修之味道風而遊泳之處于九江南郭荒榛之下不貽害於身不假力於人夷堆墆填一作實窪穽尋尺無遺材草木不移植書堂齊亭成於指顧高松茂篠森於門巷晏然燕居勝自我得君子出則行其志也公以瑚璉之器為郎官以干將之斷宰赤縣君子入則善其身也公就鴻鵠之冥冥捨騏驥之馳騁况大江在下名山當目嘉賔時來拱手長望可以頥神養一作逺夀暢其天和浴乎沂風乎舞雩吾與㸃也潯陽僑舊推仁人焉推智者焉廣德二年四月五日趙郡李華記㑹稽虛上人石帆山靈泉北塢記權德輿靈泉北塢之主人曰大苾芻虛公於諸佛微言義味之中深入圓净之集作以是辨才實智離於二邊嘗經行於邪溪稽山之下初石帆山侣有頴川陳公表久挂法冠抗迹塵外既以自適為適且悅虛公之風乃捨其北塢為公禪誦之地公既至則疏翳薈刳擁腫隨其汙崇作為勝勢先是此山無泉逺汲溪流人既勞止而水之為用不足公乃默以心集以作然感恍若有通崖隒集作隙之下微得泉脉及剃草轉石凖潛集作潗濬是沮洳畚之鍤之决之濬之噴若玉竇泄為瑶池净如醍醐瑩若琉璃疑青蓮可植金沙在下惠風天籟相為虛寂然後代集作殖碧鮮以相接引清流而備用以盥以潄以糜以茗或以助火化或以袪熱惱日用無窮不知其功使夫後學趨道之徒至於此者則浣濯纓塵漸漬法味還源復往以聲容為類不其至哉貞元初州牧左常侍王君行春訪道因以泉名塢又前代隱賢多逰踐於兹自東晉而下謝敷王子敬支遁白道猷洪偃皆有遺跡集作趾留於巖中今兹公宗本之外又牙以勝槩標品徐㑹稽公李渤疑海則命其溪曰五雲諫大夫齊君避舉則命其山曰玉笥其餘冠柱後惠文者有王氏張氏陸氏率用仁智樂兹清輝嘉名競爽以傲軒轂日至泉下為公宗雷雖匡山之社錫杖所叩不足集作是過也每𤣥關道機演暢微妙聞其一音皆攝妄言以趨靜性居常淡然與靈泉為侣集作伍蓋戒本其潔定因其止惠取其用然後觀身及泉二具集作俱無得清淨洄澓無入而不自得焉問法者又因泉以見虛公之道斯為至矣三年春獲與公遇俾豫傳信故不敢沒其美又不敢蔓其辭時嵗在丁卯二月甲子記司徒岐公杜城郊居記司徒岐國公以盛德相三朝以大中敷五教帝載協和太階躋平既致用於方內亦宅心於事外神京善地啓夏南出凡十有六里而仁智之居在焉縈回巗巘左右勝勢徑術逶迤於木杪臺亭􅑬嵼於山腹下崇岡冒青蒼步履平夷以至於堂皇四敞賔榻中容宴豆孤齊間館幽槩隨之乃䦕洞穴以導泉脉其流泠泠或決或渟激而杯行瀑為玉聲初䝉於上下終滙於池際白波淪漣繚以方塘輕艫緩棹沿洄上下見煙霞澄霽之狀魚鳥飛沉之適濯于潺湲風于碧鮮紅葩火燃素英雪翻芊眠葱倩杳窱回合含虛籟以四逹遡清輝而交映故其休休集作休沐燕息盍簮投轄則有鳴佩拖紳宗公雋人金閨集作闕玉堂之賔淑姿修態流光含睇迥回風遏雲之藝中飲笑抃交歡擊莭不知公相之為貴適其適故也易坤之說曰君子以厚德載物詩曰愷悌君子求福不回惟公以德受福故光明昌大每溫室宴見一人尊禮而不名故其代天工斷國論卓爾以冠羣后暨夫暇日之戾止於斯也則暢天理棲皓氣翛然以遺萬物其無方與其不器與昔子房赤松子之逰且非代教安石東山之賞僻在下國豈若公密贊化育內諧恬曠如春之仁如樂之和以君臣之交感兼動靜之極摯從古以還無公比焉公之華宗自漢延平侯徙杜陵三守本封幾乎千祀故城南墟里多以杜為名逮今郊居不忘厥初又以見積厚流澤此焉回復且公之心無町畦夀若岡陵昭融烜赫未始有極德輿謬陪衆君子升公之堂嘉招盛集無間弦晦以衆美之不可以不紀也承命遽數文粹作書刻于巖石云廬陵所居竹室記房千里凡天地之氣煦嫗乎春曦彤乎夏凄乎秋而冽乎冬楚之南當冬而且曦燕之北當夏而且栗一作冽是皆不得氣之中正人之百骸上陽而下隂陽戒於焮故膏肓欲寒隂戒於溺故腎脅欲燠人之外好欲軒冕文彩以為榮似若動且陽焉人之內好欲寡慮恬默以為泰似若靜且隂焉其門外一作外門欲肥馬大車以為熱者其室內欲虛堂廣厦以為清者果反是必為災且妖且病且亂且窮矣天地之性一作氣當夏而冽當冬而曦其嵗時惡人之百骸上陽而不能寒下隂而不能煦其一有形字神瘵外飾文采不能動而榮一作且陽而必慊其心躁一無此字內思恬默不能靜且泰而必汨其志亂一無此字外門凄凄而寒者內室彤彤而熱者其士一作事窮豫三年夏待罪于廬陵其環堵其棲者率用竹以結其四周植者為柱楣撑者為榱桷破者為霤一作寅非削者為障臼者為樞篾者為繩一作纏絡而籠土者為給一作級橫而格音各空者為梁方大暑火烘爆霤坼壤者一作此字若墜于爐若燎于原舌呀而不能持支墮而不自運赫赫爞爞一作熖熖如列千萬炬于室內視其門即寂寥虛閴一作間若清秋之山焉若寒浦之波焉豫乃知嚮所謂天地之氣人之百骸與其心形之內外居室之寒燠反是果為災且妖一作妖且災且病且亂且窮也今豫方窮不能奮果窮也其處于是亦宜矣天地之氣不能易者也鄒子有吹律之變人之生死不可制者也俞扁有針砭之術是二者尤不可革且有道而得一作革之今豫室之曦豫門之寒豫亦姑思其治之之道將爇其廬而斬其工竹室一無此二字其能永永以爍豫書其詞于壁一作皆唐文粹堂上草堂記栁識海昏縣東北一二里有澄陂永泰初檢校左司郎中蘭陵蕭公置草堂于陂上偶然疏鑿從其易也虛楹東向清曠十里傍有古樹密竹一如籬落澄漪風篁終日不厭非出非處優遊中道于兹三年矣紫篠為門蔬圃取給怡愈色充止足於斯士君子皆仰其清逹也清而多愛達而彌約曩昔持憲仁德恤刑進退之道道皆可勸豫學史者也得而紀述思簡豫天下之士往嵗天子自鳳翔歸于上都大兵之後秦人陷法抵冒者衆疑似詿誤者倍之皇綱初振國典未一公職在畿甸位卑才露京尹器之委以決獄惟刑之恤上簡帝心向三年遷以持憲歷臺三院折獄如初或如絲棼因我繩直蓋亦多矣不其才難未止於此當此之時冦逆雖却而猶金方播氣事多隂勝公仁勇中發忘危與衆前後按乎舊獄察色見情疑似當刑口伏心怨果斷出之者數百人去其智足飾非盤根難狀為無辜之害者亦數十人持憲如此仁乎至哉向使生全愛養之心不備乎隂陽運用之才則視人殘傷空歎息而已焉能密網之中多所濟活昔人有生全之功髙眀待封者欲人行之所以彰其善也知止足者委順志之所以誨一作晦是其善也其意不同同歸於德其德雖異觀各有宜詩曰愷悌君子民之父母此之謂也豫家於修江之上十年矣兹地阻逺兵戈不至而猶日見乎罷人貨鬻之怨時聞乎豺狼凌肆之殘春對乎凄風苦雨之音暮秋經乎炎燠札瘥之氣又見野有此當益感歎而已大厯二年正月七日左拾遺栁識述虢州三堂記吕溫應龍乘風雲作雷雨退必蟠蟄以全其力君子役智能統機劇退必宴息以全其性力全則神化無窮性全則精用不竭深山大澤其所以蟠蟄乎髙齊清地集作池其所以宴息乎虢州三堂者君子宴息之境也開元初天子思二南之風並選宗英共持理柄虢大而近匪親不居時惟五王出入相授承平易理逸政多暇考卜唯一作佳勝作為三堂三者明臣子在三之節堂者勵宗室克構之義豈徒造適實亦垂訓居德樂善何其盛哉然當時漢同家人魯用王禮棟宇制度非諸侯居後刺史馬君錫因其頽陊始革基構豐而不侈約而不陋以琴筑詩書之幽素易綺紈鐘鼓之繁喧雖林池煙景不讓他日觀其廣踰百畝深入重扄回塘屈盤水集本文粹作杏島交映溟渤轉於環堵蓬壺起於中庭浩然天成孰謂一本作曰智及春之日衆木花折岸浦島織沉浮照耀其水五色於是乎襲馨擷竒方舟逶迤樂魚時翻飄蘂雪飛泝沿廽環隱映差池咫尺迷路不知所歸此則武陵仙源未足以極幽絶也夏之日石寒水清松密竹深大栁起風甘棠垂隂於是乎濯纓漣漪解帶升堂晨景火雲隔林無光虛夢沉沉皓璧如霜羽扇不搖南軒清凉此則楚襄蘭臺未足以滌炎鬱也秋之日金飈掃林蓊鬱洞開太華爽氣出關而來於是乎絃琴端居景物廓如月委浩素水涵空虛鳥驚寒沙露滳髙梧境隨夜深疑與世殊此則庾公西樓未足以淡神慮也冬之日同雲千里大雪盈尺四眺無路三堂虛白於是乎置酒褰帷憑軒倚楹瑶階如真玉樹羅生日暮天霽雲開月眀水集作氷泉潺潺終夜有聲此則子猷山隂未足以暢吟嘯也於戲不離軒冕而踐夷曠之域不出戶庭而獲江海之心趣近懸解跡同大隱序閲四時之勝莭宣六氣之和貴而君子可謂一本作日厚矣若知其身既安而思所以安人其性既適而思所以適物不以自樂而忽鰥寡之苦不以自逸而忘稼穡之勤能推是心以惠境內則良二千石也方今人亦勞止上思乂息州郡之選重如廷集作庭臣由是南陽張公輟揮翰之任受剖符之寄逰刃而理此焉坐嘯靜政令若水木間人文粹作全戶民如魚鳥馴致其道暗然日章大人以公執友也小人奉命幸來祗謁十五字一本止作小子以通家之好集作愛獲拜床下且齒諸子侍坐於三堂見知惟文不敢無述捧筆避席請書堂隂俾後之人知此堂非止燕逰亦可以觀清靜為政之道廬山草堂記白居易匡廬竒秀甲天下山山北峯曰香爐峰北寺曰遺愛寺一無此字介峯寺間其境勝絶又甲廬山元和十一續廬山記無此字年秋太原人白樂天見而愛之若逺行客過故鄉戀戀不能去因面峯腋寺作為草堂眀年春成草堂集本文粹集草堂成三間兩注集本文粹作柱二室四牗廣袤豐殺一稱心力洞北戶來隂風防徂暑也敞南甍納陽日虞祁寒也木斫而已不加丹墻墟而已不加白磩階用石羃忩用紙竹簷集本文粹作簾紵幃率稱是焉堂中設木榻四素屏二素諸本無此字漆琴一張儒道佛書各數數字文粹作三兩卷樂天既來為主仰觀山俯聽泉旁睨竹記作草樹雲石自辰及酉應接不暇俄而物誘氣隨外適內和一宿體寧再宿心恬三宿後頽然嗒然不知其然而然自問其故答曰記無此字是居也前有平地輪廣十記作一丈中有平臺半平地臺南有方池倍平臺環池多山竹野卉池中生白蓮泉集作白魚又南抵石澗夾澗有古松老杉大僅十尺集作人圍髙不知幾許許字集作百尺修柯戛雲低枝拂潭如竪幢如張蓋集作如幢竪如蓋張如龍蛇走松下多灌叢蘿蔦葉蔓駢織成翳日月光不到地盛夏風氣如八九月時下鋪白石為出入道堂北五步據層崖積石嵌空垤堄雜木異草蓋覆其上緑隂濛濛朱實離離不識其名四時一色又有飛泉植茗就以烹燀好事者見可以銷諸本無此字永日堂東有瀑布水懸三尺瀉階隅落石渠昏曉如練色夜中如環佩琴筑聲堂西倚北崖石諸本作右趾以剖竹架空引崖上泉脉分線懸自簷注砌纍纍如貫珠霏微如雨露滳瀝飄灑隨風逺去其四旁耳目杖屨可及者春有錦繡谷花夏有石門澗雲秋有虎溪月冬有爐峯雪隂晴顯晦昏旦含吐千變萬狀不可殫記集作紀覼縷而言故無甲廬山者噫凡人豐一屋華一簣而起居其間尚不免有驕矜諸本作穩之態今我為是物主物至致集作知知各以記作有類至又安得不外適內和體寧心怡諸本作恬哉昔永逺宗雷輩十八人同入此山老死不返去我千載我知其心以是哉矧豫自思從幼逮老若白屋若朱門凡所至集本并記作止雖一日二日輒覆簣土為臺聚拳石為山環斗水為池其喜山水病癖如此一旦蹇剝來佐江集本并記無此字郡郡守以優容撫我廬山以靈勝待我是天與我時地與我所卒獲所好又好求焉尚以冗貟所羈餘纍未盡或往或來未遑寧處待豫異時弟妹昏嫁畢司馬嵗秩滿出處行止得以自遂則必記無此字左手引妻子右手抱琴書終老於斯以成就我平生之志清泉白石實聞此言時三月二十七日始居新堂四月九日與河南元集虛范陽張允中南陽張深之東西二林長老凑公諸本無此字朗滿晦堅等凡二文粹無此字十有二人具齊施茶果以樂記作落之因為草堂記尉遲長史草堂記李翰吾友晉陵郡丞河南尉遲緒節闊逹志遐逺含和而不暇文粹作假修推誠而不詭行外若可渾其中甚清外如可雜其中甚靜夫求賢逹之趣當考其中若然夫子其逹者歟而境或超詣心或獨得飄飄然不知冠冕之在己浩浩然不知天地之為大其宜文粹作冥機慎道迹繫心廣人或未覩吾能知之大厯四年夏乃以俸錢構草堂於郡城之南求其志也材不斫全其朴墻不雕分其素然而規制宏敞清泠含風可以却暑而生白矣後有小山曲池窈窕幽徑枕倚於髙墉前有芳樹珍卉嬋姢修竹隔閡於中屏由外而入宛若壺中由內而出始若人間其幽邃有如此者夫子又有雄辭奧學潤色其事階上何有有羣書萬卷階下何有有空林一瓢非道統名儒不登此堂非素琴香茗不入兹室是知草堂之貴夫子之靜天下茫茫人未易悉吾與夫子昔同賔賦三十四年於兹矣吾則棄於世矣歎夫子下位每求其故而有疑焉今觀夫子之志乃鄰於道寥寥草堂自致之資書於壁微吾非俟其嵗秋八月乙丑朔記文苑英華卷八百二十七
