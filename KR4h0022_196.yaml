body:
  text: 文苑英華卷一百九十六宋李昉等編樂府五俠客行六首西遊咸陽中一首俠客控絶影一首劉生九首燕客行八首鴈門太守歌四首將軍行一首戰城南十首塞上曲三首俠客行王筠俠客趨名利劔氣坐相矜黃金塗鞘尾白玉飾鈎膺晨馳逸廣陌日暮還平陵舉鞭向趙李與君方代興同前王褒京洛出名謳豪俠競交遊河南期一作朝四姓關西謁五侯鬬雞橫大道走馬出長秋桑隂徙一作徒將夕槐路轉淹留同前庾信俠客重連鑣金鞍被桂條細塵障路起驚花亂眼飄酒醺人半醉汗濕馬全驕歸鞍畏日晚爭路上河橋同前陳良洛陽春色麗遊俠騁輕肥水逐車輪轉塵隨馬足飛雲影遙臨蓋花氣近薰衣東郊鬬雞罷南坡射雉歸日暮河橋上揚鞭惜晚暉同前李白趙客縵胡纓吳鈎霜月明銀鞍照白馬颯沓如流星十步殺一人千里不留行事了拂衣去深藏身與名閒過信陵飲脫劔膝邊橫將炙啖朱亥持觴勸侯嬴三杯吐然諾五嶽倒為輕眼花耳熱後意氣素霓生救趙揮金鎚邯鄲先震驚千秋二壯士烜赫大梁城縱死俠骨香不慙世上英誰能書閣下白首太𤣥經同前崔國輔玉劔膝前橫金杯馬上傾朝遊茂陵道夜宿鳳凰城一作亭豪俠多猜忌無勞問姓名西遊咸陽中隂鏗上林春色滿咸陽遊俠多城斗疑連漢橋星像跨河影裏著飛轂塵前聽逺珂還家何意晚無處不經過俠客控絶影楊縉青門小苑物華新花開鳥哢㑹芳春仙掌層臺浮麗日長楸橫路起紅塵園中追尋桃李徑陌上逢迎遊俠人遊俠英名馳上國人馬意氣兩俱得白玉轆轤秋水劔青絲宛轉黃金勒復有魚目並龍文躡景追風本絶羣影入吳門疑曳練形來西北似浮雲寄語幽并馳射客未肯推名持借君劉生梁元帝任俠有劉生然諾重西京扶風好驚坐長安恆借名菊花連夜飲竹葉解朝酲結交李都尉遨遊佳麗城同前張正見劉生絶名價豪俠恣遊陪金門四姓聚簫鼓一作繡轂五香集作五侯來塵飛瑪瑙勒酒映車渠杯别有追遊集作隨夜愁窗向月開同前柳莊四坐驚稱字一作坐驚稱字孟豪雄道姓劉廣陌通朱邸大路起青樓要賢驛已置留客轄仍投光斜日下霧庭隂月上鈎同前江暉五陵多美選六郡盡良家劉生代豪蕩標矩一作舉獨榮華寶劔長三尺金樽滿百花唯當重意氣何處有驕奢同前徐陵劉生殊倜儻任俠遍京華戚里驚鳴筑平陽吹怨笳俗儒排石氏新室是誰家髙才被擯壓自古共憐嗟同前江總劉生負意氣長嘯共徘徊髙論明秋水命賞陟春臺干戈倜儻用筆硯縱橫才置驛無年限流俠四方來同前𢎞執恭英名振關右雄氣逸江東遊俠五都內來去三秦中劔照七星影馬控千金驄縱橫方未息因兹定立一作武功同前楊炯鄉家本六郡年長入三秦白璧酬知己黃金謝主人劔鋒生赤電馬足起紅塵日暮歌鐘發喧喧動四鄰同前盧照鄰劉生氣不平抱劔欲專征報恩為豪俠死難在橫行翠羽裝劔鞘黃金飾馬鈴但令一顧重不吝百身輕燕歌行梁元帝燕趙佳人本自多遼東少婦學春歌黃龍戍北花如錦𤣥莵城中月似娥如何此時别夫壻金羈翠眊往交河還聞入漢去燕營怨妾心中一作愁心百恨生漫漫悠悠天未曉遙遙夜夜聽嚴一作寒更自從異縣心同别偏恨同時成異節橫波滿臉萬行啼翠眉漸一作暫斂千重結並海連天合不開那宜一作堪春日上春臺唯見逺舟如落葉復看遙舸似行杯沙汀夜鶴嘯羈雌妾心無怨生别離翻嗟漢使音塵斷空傷賤妾燕南垂同前蕭子顯風光遲暮出青蘋蘭條翠鳥發春鳴洛陽梨花白如雪河邊細草青如茵桐生井底葉交枝今看無端雙燕離五重飛一作花樓入河漢九華閣道暗清池遙看白馬津上吏傳道黃龍征戍兒明月金花徒一作從照妾浮雲玉葉君不知思君昔去柳依依至今八月避暑歸明珠蠶繭登勉機鬱金春花特香衣洛陽城頭雞欲曙丞相府中烏未飛夜夢征人縫狐貉私憐織婦裁錦絡吳刀鄭錦結句寒閨夜被薄芳年海上水中鳬日暮寒夜空城雀一作空城寒夜雀同前王褒初春麗景鶯欲嬌桃花流水沒河橋薔薇開花百里葉楊柳覆池數一作楊柳拂地散千條隴西將軍號都護樓蘭校尉稱嫖姚自惜别如春燕分經年一去無相親一作相聞不一作無復漢地關山一作長安月唯有漠北薊城雲淮南鏡一作桂中明月影流黃機上織成文充國軍行屢築營楊史討虜陷平城下風不多能却陳沙中雪淺詎停兵屬國小婦猶年少羽林輕騎數征行遙聞陌上採桑曲猶勝邊地胡笳聲向暮使人泣還使一作長望閨中空竚立桃花落地杏花舒一作桃花復地桃花舒桐生井底寒葉踈試為來看上林鴈應一作必有遙寄隴頭書同前庾信代北雲氣晝昏昏千里飛蓬無復根寒鴈嗈嗈一作丁丁又作一一度遼水桑葉紛紛落薊門晉陽山頭無箭竹踈勒城中乏水源屬國征戍久離居陽關音信絶能踈願得魯連飛一箭持寄思歸燕將書度遼本自有將軍寒風蕭蕭生水紋妾驚甘泉足烽火君訝漁陽少一作多陳雲自從將軍出細柳蕩子空牀難獨守盤龍明鏡餉秦嘉辟惡生香寄韓夀春分燕來能幾日二月蠶眠不復久洛陽遊絲百丈連黃河春氷千片穿桃花顔色好如一作如好馬榆莢新開巧似一作似細錢蒲桃一杯千日醉無事九轉學神仙定取金丹作幾服能令華表得千年同前屈同漁陽八月寒草腓征人相對併思歸雲和朔氣連天暗蓬雜胡沙散野飛此時天地隂埃遍瀚海龍城皆血戰兩軍鼓角暗相聞四面旌旗看不見昭君逺嫁己年多戎狄無厭尚不和漢兵候月秋防塞胡騎乘氷夜渡河河塞東西萬餘里地與京華不相似燕支山上少光輝黃砂磧下無流水金戈玉劔十年征紅粉青樓多怨情厭得殊方久為别秋來愁見搗衣聲同前陶翰請君留楚調聽我吟燕歌家在遼東頭邊風意氣多出身為漢將正值戎未和雪中凌天山氷上渡交河大小百餘戰封侯竟蹉跎歸來灞陵下故舊無相過雄劔委塵匣空門垂雀羅玉篸還趙女寶瑟付齊娥昔日不為樂時哉今奈何同前高適開元十六年客有從御史大夫張公出塞而還者作燕歌行以示適感征戍之事而和焉漢家煙塵在東北漢將辭家破殘賊男兒本自重橫行天子非常賜顔色摐金伐鼓下榆關旌斾逶迤碣石間校尉羽書飛瀚海單于獵火照狼山山川蕭條極邊土胡騎慿陵雜風雨戰士軍前半死生美人帳下猶歌舞大漠窮秋塞草衰一作腓孤城落日鬬兵稀身當恩遇恆輕敵力盡關山未解圍鐡衣逺戍辛勤久玉筯應啼别離後少婦城南欲斷腸行一作征人薊北空回首邊風飄颻難可越一作那可度絶域蒼茫無所一作更何有殺氣三時一作日作陳雲寒風一作聲一夜傳刁斗相看白刃徒一作血紛紛死節從來豈顧勳君不見沙場征戰苦至今猶憶李將軍同前賈至國之重鎮惟幽都東威九夷北制胡五軍精卒三十萬百戰百勝擒單于前臨􅀈沱阻易一作後阻水崇山沃野亘千里昔時燕王重賢士黃金築臺從隗始倐忽興亡空一作王定薊丘漢家又似封五一作王侯蕭條魏晉為橫流鮮卑竊據朝五州我唐區夏餘十紀軍容武備赫萬祀彤弓黃鉞授元帥墾耕大漠為內地季秋膠折邊草腓理兵羽獵因出師千營萬隊連旌旗望天一作之如火忽電馳胸奴懾竄窮髮比大荒萬里無塵飛君不見一無此三字隋家昔為天下宰窮兵黷武征遼海南風不競多死聲鼓臥旗折黃雲橫六軍將士皆死盡戰馬空鞍奔故營時移道革天下平白環入貢滄海清自有農夫已髙枕無勞校尉重橫行鴈門大守歌二首梁簡文帝輕霜終夜下黃葉晚辭枝寒苦春難覺邊城秋易知風急征旗斷塗長鎧馬疲少解孫吳法家本幽并兒非關買鴈肉徒勞皇甫規二隴暮風恆急關寒霜自濃櫪馬夜方飼邊衣秋未重潜師夜接戰略地曉催鋒悲笳動胡塞髙旗出漢墉勤勞謝勳業清白報迎逢非頒主人賞寧期定逺封單于如未繫終夜慕前蹤同前禇朔二月柳花合四月麥秋初幽州寒食罷鄭國採桑踈更聞鴈門守一作戍結束事戎車去歲無霜雪今年有閏餘月如弦上弩蝗類水中魚戎車攻日逐燕騎蕩康居大宛歸善馬小月送降書寄語閨中妾勿怨寒牀虛同前李賀黑雲壓城城欲摧甲光向日金鱗開角聲滿天秋色裏塞上燕支凝夜紫半卷紅旗臨易水霜重鼓寒聲不起報君黃金臺上意提携玉環一作拏為君死將軍行劉希夷將軍闢轅門耿介當風立諸將欲言事逡巡不敢入劔氣射雲天鼓聲破原隰黃塵塞路起走馬追兵急彎弓從此去飛箭如雨集突圍一百重一作里斬首五千級代馬流血死胡人抱鞍泣古來養甲兵有事常討襲乘我廟堂運坐使干戈戢獻凱帝來勞一作歸京都一作歸帝京軍容何翕習戰城南四首吳均蹀躞青驪馬往戰城南畿五歷魚麗陳三入九重圍名懾武安將血濺秦王衣為君意氣重無功終不歸二前有濁酒樽憂思亂紛紛少年重意氣學劔不學文忽值胡關靜胸奴遂兩分天山己半出龍城無片雲漢世平如此何用李將軍三陌上何喧喧胸奴圍塞垣黑雲藏趙樹黃塵埋隴根天子羽書勞將軍在玉門四此第四首而五卷有之題作古意今存于後而削此同前張正見薊北馳胡騎城南接短兵雲起一作屯兩陳合劔聚七星橫一作明旗交無後影角憤有餘聲戰罷披軍策還嗟李少卿同前楊炯塞北途遼逺城南戰苦辛幡旗如鳥翼甲胄似魚鱗凍水寒傷馬悲風愁殺人寸心明白日千里暗黃塵同前盧照鄰將軍出紫塞冒頓在烏貪笳喧鴈門北陳翼龍城南雕弓夜宛轉鐡騎曉驂驔應須駐白日為戰待方酣同前李白去年戰桑乾原一作源今年戰葱河道洗兵條支海上波放馬天山雪中草萬里長征戰三軍盡衰老胸奴以殺戮為耕作古來唯見白骨黃沙田秦家築城備胡虜漢家還一作猶有烽火燃烽火燃不息長征一作征戰無已時野戰格鬪死敗一作駑馬嘶一作號鳴向天悲烏鳶啄人腸銜飛上挂枯樹枝士卒塗草莽將軍空爾為乃知兵者是凶器聖君一作人不得已而用之同前戰地何昏昏戰士如羣蟻氣重日輪紅血染蓬蒿紫烏鳥銜人肉食悶飛不起昨日城上人今日城下鬼旗色如羅星􅎏聲殊未已妾家夫與兒俱在􅎏聲裏同前劉駕城南征戰多城北無饑鴉白骨馬蹄下誰言皆有家城前水聲苦倐忽流萬古莫爭城外地城裏終一作有閒土塞上曲吳筠劍頭利如芒恆持一作時照眼光鐡騎追驍虜金羈討黠羌髙秋八九月邉地早風霜男兒不惜死破膽與君嘗同前前人十月繁霜下征人逺鑿空雲遙一作搖錦更節海照角端弓暗磧埋沙樹衝飈卷塞蓬方隨膜拜入歌舞玉門中同前李白十萬羽林兒臨洮破郅支殺添邉地骨降足漢營旗塞濶牛羊散兵休帳幕移空餘隴頭水嗚咽向人悲文苑英華卷一百九十六
