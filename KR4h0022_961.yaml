body:
  text: 文苑英華巻九百六十二宋李昉等編雜二張處士恪墓誌一首徐氏子巖墓誌一首殤子韋八墓誌一首鄭處士稷墓誌一首李傪墓誌一首殤子穆若愚墓誌一首裴處士墓誌一首侯處士髙墓誌一首鄭君子挽墓誌一首駱處士峻墓誌一首盧秀才霈墓誌一首龔進士軺墓誌一首處士張府君墓誌銘張説府君諱恪其先晉人晉有張老韓有開地漢有留侯侯八代孫皓為司空司空子宇為北平太守遭漢亂離家於范陽至𤣥孫華復為晉司空遇難子孫南渡其處者或寓於蒲坂周齊間有歸者因從一有徙字焉君晉司空十一代孫也曽祖徵君諱子犯祖河東郡從事諱晙集作俊父道通館學士諱弋徳音遺範詳諸家諜君孤紹單門傍無兄弟苗而不秀未仕而卒道未融於邦國位未揚於王庭故老之口浸逺好事之書又闕是後生不得預聞焉哀哉嗣子晉州洪同丞隲襁褓縗麻育於舅氏夫人隴西董氏常州長史雄之女也早年守義唯鞠一子嚴而有檢勤而善訓成先人之丕烈貽後嗣之積善微太夫人徳則張氏幾將墜焉開耀元年十二月二十七日終于集作於鄜城縣世婦馮氏之别業春秋七十有二先君之違世也太夫人在堂大門闕殯日月逾邁有志未從是諸孫疾馬若履淵谷以景龍三年嵗次己酉冬十月二十六日克𦵏王父王母於蒲坂東司空之村成先志也銘曰綿綿王父續我靈基㓜而植徳人莫知之烈烈王母克明克類教成鬻子光我族嗣中條之北大河之東丘陵桑梓鬱鬱崇崇千年啟室百嵗來同永惟先志欽成厥終徐氏子墓誌銘前人徐氏子者名巖字某司封員外郎堅之第四子也驥子睨雲風毛洗日孝友因性聰敏若神置在膝前已㑹星辰之氣戲于床下能記賔主之詞及總角成童精意好學聞一知十升堂覩奥下筆成章而倫要發言為論而卓詭識者咸謂增世搆之崇藴益源流之洪潤雖甘茂之孫十二飛辯班彪之子九嵗能文不尚之也天乎何辜顔淵無命年十有三嵗大定元年九月遭疾而没嗚呼哀哉琱月始生不見其盈瓊枝方秀不見其茂悲哉銘曰生日何淺死路何深珠碎脁月花殘稚林哀哀父母孰處其心殤子韋八墓誌獨孤及殤子河南獨孤氏小字韋八以其弱而未名也故以字稱北齊司空行臺尚書令臨川郡王之七代孫有唐安南郡長史府君之曾孫潁川郡長史府君之孫左驍衛兵曹參軍公之元子秘書省著作郎京兆偉偉集字作韋儧之甥生有竒表温朗集作明聰秀覃訏於保姆傳婢之手嶷然異於凢童氣閑體和取與必時諸父諸母每謂興我家者必此兒也賔客之至者看玉人不暇儻蒙集無此字假以壽命則成器致位未易度也不幸多病大厯六年嵗次辛亥集作丑非十二月二十二日夭於舒州壽至集作止五嵗三集作四非十甲子長㓜惋毒六姻悼惜嗚呼天將不昌吾後裔乎不然曷使此孩不至於集作于成歟大厯八年夏四月十六日以其喪歸葬洛陽祔于王父集有母字宅兆之側其仲父銜涕書其始終紀于墓云此篇誤編在九百六十六巻婦人門今移於此鄭處士墓誌梁肅嵗在戊午六月戊子處士滎陽鄭君卒于常州福業寺庚寅權窆于某鄉原嗚呼處士之為人也入則孝出則悌直而不犯柔而不懾好讀周易及太史公書嘗遊於集無於字南巢作弔夏桀文其辭甚典集作正一作工足見其質嚮使天假之壽與之禄則其道可熾坎壈世故行年三十三集作二而夭哀哉處士諱稷故酸棗令某之孫今黄巖令季江之子故吏部侍郎贈左僕射齊公澣之外孫也合内外之休徳成中和之茂行使夫生不得其辰沒不見其親託遺骸於他土顧稚子而未識痛矣夫斯命也於是書石以誌卒葬且懼年祀超忽故月而日之李傪集作隴西李君墓誌前人君諱傪姓李氏隴西成紀人涼武昭王𤣥盛之後曾祖如順皇朝太子洗馬生大父元恭開元中以文學政事歴大理卿判尚書吏部侍郎侍郎生烈考訥官至太府寺丞君承家集作夙承休緒少有令聞孝敬仁順𢎞毅貞亮非禮不言見善必行行有餘力則覃思六經揭厲百氏是故淳秀之氣播為文章發於事業難於進易於退道不茍行位不虚受常州刺史獨孤公及之臨舒城聞而悦之辟為集作如非從事府遷於常州君亦至焉獨孤公文德為天下望君入則從容討論出則勤慮政事議者以君建大名致厚位必自此始不幸短命享年若干以大厯十二集無此字年春三月甲子寢疾而沒焉集無此字嗚呼天與之才天集無天字一本作又與之器不與之壽不與之位天何言哉君娶范陽盧韶女一子越在襁褓哭泣無主其仲兄武進尉迅銜天倫之哀謀及卜筮以是月既朢抱其孤送君之喪權窆于正勤佛寺之北原時不利不克反葬集作喪故也友人安定梁肅紀其終始徳善著于石俾來者有以知君子之墓云殤子穆若愚墓誌穆員穆若愚唐秘書監新安公之孫前御史中丞公之第五子貌宜貴壽神宜才藝氣宜淑哲生七年而夭痛莫如之時諸父不天方集荼蓼一慟之外且相諭曰老氏謂身為大患然則人之生也適與患並男子既亂以往患於是始此子也生無有生之患没有無患之樂一作生無生之患莫無死之患歘然與大化潛契曠然與太古為鄰齊彼彭𥅆為歸坏土命也如何偃師首陽山之北原吾祖宗之所宅翌日遷祔於先府君之後又翌日窆焉貞元十一年六月二十五日叔父員記裴處士墓誌前人唐貞元四年春正月員太夫人惟杜氏西階之事命長子貲咨於家君習於卜筮展孝思於罔極抒孔懐於同氣躬備如新之庶物洎一日二人之具授從父之弟湊浮舟于河啟殯于淇二月癸巳舅氏奉我外王父朝城府君王母豐縣君劉氏洎伯舅之喪至自衛先是卜兆于偃師首陽山之北原壬寅遷朝城豊君歸於貞宅伯舅祔焉伯舅諱浩字某皇朝并州石艾縣丞文行曽孫絳縣令𤣥度孫魏州朝城令翔之第二子也孝弟篤實可移於事君肅恭信順可施於有政行成於進而名未之歸學優於用而禄未之及天寳末天下亂藏於衛州之别墅昏氛四塞犲虎信狺行無所從退迫咥噬殷憂不壽發疾而終時至徳三年二月二月春秋三十有五夫人京兆韋氏挈未童之孤孫是逃鋒刃保朝夕之不遑而踰月之禮蓋闕乃於其所殯焉我慈親念羈魂之靡託者心不忘痛永言改𦵏與大事俱世道多故坎壈未集嗣子佐餘力能學含章而文仕潤州參軍杭州司田越在東南計之靡及夫人後元年棄養於潤州官舎將謀同穴蓋時趣道逺如佐之不至且俟佐焉然則夫人之家聲美行請讓於來者之誌銘曰嗚呼没而無知也盡我慈親之情成爾孝子之志而已矣如有知也父母與子相見泉隧其樂融融其樂洩洩彼美家室昔如琴瑟他年令嗣祔𤣥堂使我長夜覩白日處士侯君墓誌李翺侯髙字𤣥覽上谷人少為道士學黄老練氣保形之術居廬山號華陽居士每激發則為文達意其髙處駸駸乎集有有字漢魏之風性剛勁懷救物之略自儕周昌王陵所如固不合視貴善宦者如糞溲與平昌孟郊東野昌黎韓愈退之隴西李渤濬之河南獨孤朗用晦隴西李翺習之相往來汴州亂兵士殺留後陸長源東取劉逸淮乃作弔汴州文投之大川以訴貞元十五年翺遇𤣥覽於蘇州出其詞以示翺翺謂孟東野曰蜀本有我字誠之至者必上通上帝聞之劉逸淮其將不乆後數月而劉逸淮竟死其首章曰穹穹與厚厚兮鳥憤予而不攄翺以為與屈原宋玉景差相上下自東方朔嚴忌皆不及也達奚撫為楚州起攝盱眙祭酒李公遜刺衢州請治信安其觀察浙東又宰于剡三縣皆有政不幸得心疾留其子狗兒於翺家而歸廬山不到卒於江西其子婿王適使傭吉勉求君所如蜀本作知值君卒吉勉以君喪殯於襄州之野而復於適適又死適之妻使吉勉來告於翺翺以狗兒歸適妻居二年適妻又死狗兒尚童翺慮吉勉之短長不可期則君之喪終不墳矣故使吉勉往葬之而識其墓以示狗兒有唐君子鄭公墓誌銘歐陽詹貞元十一年歲在乙亥某月日清源郡晉江縣君子鄭公年若干終于其居州閭親識逺近漣涕重吉人也嗚呼把梓植於深林雖人不知不妨其為天下之材也珠玉碎於重泉雖人未玩不妨其喪天下之寳也公之生則深林之材公之沒則重泉之寳不知而有未玩而亡哀哉公諱晩字秀集作季實其先宅滎陽永嘉之遷逺祖自江上更徙于閩今為清源晉江人曾祖某官祖某官父某官太夫人同郡潁川陳氏育者三男三女公則長男也自七八歲則明敏嚴潔無復童心洎十二三則温良貞亮有成人之徳既冠儀表可觀孝悌惠和侔於前哲人望無間時譽皆歸鳯不近腥龍多自盤優遊仁里四十不試詹有若如集無如字人之妹獲配於公公太夫人早亡集作世妹不逮事則見公霜露之感蒸嘗之敬公尊府君近捐甘㫖妹及同養則見公晨昏之愛縗斬之至奉公居閨門鄉黨者十有五年故集作顧詹於公善良内外兼得受命不永其如命何蘭芳集作芬蕙馨或亦中敗惜哉子二人皆㓜公在日名之曰彥文彥章詹既在京師不遂撫慰來人有述實孺能號妻亦聞哀有過人禮不逾制定集作窆取逺日堂殯三年以貞元十三集作二年某月日永厝于郡城東偏闡儒里常熟湖之北原禮也妹有逺告咨余題誌既忝親集作貞懿實舊知人江嶺則遐想像不昧取斯集作思芳茂為寄銘墓誌云集作以寄為銘銘曰有斐秀集作季實君子之禎忠信温良自㓜而行少不改任長更推誠材植逺林寳産遐壤無知無玩自生自喪骨肉歸土用瘞斯原嗚呼斯原永棲君子之魂駱處士墓誌杜牧灞陵駱處士名峻字肅之華州華隂人也當建中四年年二十遊京師值泚亂為其黨源休拘委以軍集無此字事處士逸一日夕行二百里拜親於華隂因啟度賊終不能東出百里間鄉里不足憂願得一見天子於艱危中遂入奉天至漢中屢以兵食干執事者後長安李懐光踵叛闗中公私饋李馬渾兵十餘萬計日餉食有司因請授處士岳州巴陵尉繫職於饋運間後四遷至揚州至作上士曹參軍至元和初以母喪去職哀哭濵死終喪因曰汙音烏吾跡二十餘年食豐衣鮮以有養也今可以行吾志也乃於灞陵東坂集作坡下得永集作水樹以居之相國杜公黄裳在蒲津相國張公𢎞靖在并州大梁渾尚書鎬在易定潘侍郎孟陽在蜀之東川司徒薛公萃集作革疑作苹在鄭滑皆挈卑詞幣馬至門曰處士不能一起助我為治乎皆以疾辭長慶初桂府觀察使杜公凡兩拜章乞為梧州刺史詔因授之衆皆曰今黄家洞賊熾邕容兵連敗縮首不出猶鼎鱉耳交阯殺都䕶復旱亂相仍朝廷豈捐此三處不以公治之而反置公為梧守耶處士慘而讓祗以疾辭解訖不言其他爾後人知其堅不可復動矣田三百畝果蔬占其一捽墾辛苦不受一人錢惠朝之名士多造其廬未嘗以栖退超脱之髙露於言色温敬畏下如勇於仕進者論及當代利病活人綏邊之策必亹亹盡吐冀達於在位者至於安危機鍵之語黙不出口尤不信浮圖學有言者必約其條目引六經以窒之曰是乃其徒盜夫子之㫖而為其詞是安能自為之善圖山水狀鑒者比之朱審王維之儔鄉里百家鬬訟集作訴吉凶一來決之凡三十六年無一日不自得也以㑹昌元年十一月某日卒年七十九以某年月日歸葬於華隂縣先人之墓處士常曰相國劉公晏不急征不横賦承喪亂集作亂亾之餘食數十萬兵者二十餘年斯過蕭何逺矣每長短校量今古富人强國之術我烈祖司徒岐國公丞相趙國公李公當貞元元和時儒學術業冠天下每與處士語未嘗不嗟嘆其才恨其尚壯不可屈以仕優禮接之嗚呼賢哉銘曰不見可欲使心不亂古之作者窮栖自斷作鍛子伯子至王霸夕臥向栩相趙馬良車煥子夏高弟心中交戰處士之居洛集作落青門畔文駟連羇繡軿集作軒交貫危冠自喜音戲前集作首縈後絆言訖揖去一如不見我齒未衰誰為集作知已知岐公主師見必迎喜語必移時論兵計食屈指無遺功名富貴不能鈎集作釣之諸侯六辟南服一麾笑而不答亦無是非三百畝田百實滋繁集作繁滋三十六年食具衣完人集作今其去矣誰知其端嗚呼賢哉范陽盧秀才墓誌前人秀才盧生名霈字子中自天寳後三世集作代或仕燕或仕趙兩地皆多良田畜馬生年二十未知古有人曰周公孔夫子者擊毬飲酒馬射走兔語言習尚無非攻守戰鬬之事鎮州有儒者黄建鎮人敬之呼為先生建因語生以先王儒學之道因復曰自河而南有土地數萬里可以燕趙比者百數十處有西京東京西東集作京是有天子公卿士人畦居兩京間皆億萬家萬國皆持其土産出其珍異時節朝貢一取約束無禁限疑忌廣大寛易嬉遊終日但能為先王儒學之道可得其公卿之位顯榮富貴流及子孫至老不見戰爭殺戮生立悟其言即隂約母弟雲竊家駿馬日馳三百里夜抵襄國界捨馬走行徑入王屋山請詣道士觀道士憐之置之外門廡下席地而處始聞孝經集作開孝經論語布褐不襪捽草為茹或竟日不得食如此凡十年年三十有文有學日閑習人事誠敬通達汝洛間士人稍稍知之開成三年來京師舉進士以集作於是羣輩中酋酋然凡曰進士知名者多趨之願與之為交生嘗曰丈夫一日得志天子召坐於前以笏畫地取山東一百二十城唯我知其甚易耳因言燕趙間山川夷險教令風俗人情之所短長三十年來王師攻擊利與不利其所來由明白如彩畫一一可以目覩開成四年客遊代州南歸某月某日於晉州霍邑縣界晝日盜殺之京師名進士聞之多有哭者資其弟雲至霍邑取生喪來長安以某年某月某日葬於城南某縣某鄉某里其所資費皆出於交游間曾祖昌嗣涿州刺史祖顓集作顗易州長史父勸鎮州石邑令某常以生之才節薦生列集無列字於公卿間聞之死哭之因誌其墓進士龔軺墓誌前人㑹昌五年十二月牧自秋浦守桐廬路由錢塘龔軺袖詩以進士名來謁時刺史趙郡李播曰龔秀才詩人兼善鼓琴因令操流波弄清越可聴及飲酒頗工集作攻章程謹雅而和飲罷牧南去舟中閲其詩有山水閑淡之思後四年守吳興因與進士嚴惲言及鬼神事嚴生曰有進士龔軺去歲來此晝坐客館中若有二人召軺者軺命馬甚速始跨鞍馬驚墮地折左脛旬日卒余始了然憶錢塘見軺時徐徐尋思如昨日事因知尚殯于野乃命軍吏徐良改葬于卞山南去州城西北一十五里嚴生與軺善亦不知其鄉里源流故不得記嗚呼胡為而來二鬼驚馬折脛而死哉大中五年辛未歲五月三集作二日記文苑英華巻九百六十二
