body:
  text: 文苑英華卷九百十宋李昉等編職官十八諸將軍七將校附唐左羽林大將軍史用誠碑一首周右衛郎將楊令一碑一首唐右衛郎將葛威德碑一首唐上騎都尉髙則碑一首唐昭武校尉曹通碑一首唐左羽林軍大將軍史公神道碑奚敬玄將軍諱用誠字君諒河南人也曽王父諱惟靜開府儀同三司檢校太子賔客兼侍御史河南節度先鋒兵馬使大父勒銀青光祿大夫試太常卿兼侍御史河南節度兵馬使烈考播銀青光祿大夫檢校國子祭酒河東節度兵馬使兼御史中丞普寧郡王三代為將克昌惟武垂慶後世傳芳于公公即中丞第四子義感得一時之俊沉謀有周身之防貞元初藝成絶倫縱遊郡國名藩重鎮爭致邀迓乃不屑就其道益光襄陽節度樊公澤虛心好才與能樂善聞公有縱橫之略剛決之姿由褥禮以接之選右職以署之而能恪勤厥位練習武經繇是樊公益所委重纍遷至馬軍兵馬使會吳少陽卒其子元濟席凶器以竊據淮蔡詔命唐隨節使李公訴總齊軍士以討伐之命公為遊奕兵馬使指顧麾下號令前驅率先啓行深入賊境遇敵必戰所向無遺會賊將領徒千人草創營壘旗號日興橋柵而公伺其軍食無儲是刈是獲備其乾餱鴟張蟻聚控扼要害公度其孤虛可以攻取以少擊衆如其前堂堂之勢若然中斷殺傷奔潰靡有子遺生擒賊將衆皆請殺而公不聽以客禮待之曰吾不能殺義士從其歸死於天子乃送其人于闕繼而陳章疏懇請全活憲宗皇帝英眀聽斷詔下許之還賜軍前驅使俾領先鋒將興公偕行遵其鋭卒沍寒之夜凌犯雪霜擊破賊城官軍坌入先擒元濟以檻車獻於宗廟得正刑典由公之生致賊將化為忠臣覆其妖巢以功補過朝廷推賞纍寵旌節授公銀青光祿大夫檢校太子賔客兼御史中丞仍賜上柱國詔曰素抱將才能通武訓䇿名戎旅委質藩方敷七德以招懷推一心而撫納遂使戴天之大節因事斯彰奉國之名謀逢時乃合奮其勇士潰彼凶徒堅壁洞開罪人斯得永言實效無忘窹思其圖爾勞是舉朝典旋以東平不虔將議征討詔命李訴為徐泗節度俾行天誅訴以公沉勇夙彰思同王氏列名表請委以親兵充行營都虞侯公恪勤無私戰陳有勇破賊柵者有六收縣邑者有三教令必嚴刑戮不濫仁而有法其若是歟賊平遷檢校國子祭酒詔曰平齊之役諸軍指期衆校合戰各奮義勇同樹勳勤永思積日之勞頗愧踰時之賞故於奬授有所超遷時屬邊事重難非公莫可詔統麾下鎮防朔方居三年朝議以頻建茂功位未充量趣徴赴闕除左羽林將軍詔曰沉勇英決挺直將才制勝出竒合於兵法風勵勤王之節嘗從伐叛之師赫然殊功於是纍振諸侯方嶽多有薦揚北路親軍寄雄心膂統率貔貅之衆申眀羽衛之嚴宜奬壯猷且兼峻秩敬宗皇帝以張韶作亂禍生不測環衛嚴整狂賊誅夷拜兼御史大夫嵗月滋深竭誠盡瘁遷大將軍知軍事疏封列爵褒寵勳賢勞績既彰優榮斯及封武昌縣開國子食邑五百户上方倚注信臣錫宴别殿論功校藝公實居多方委爪牙之雄未兼鐵鉞之寄竟以積勞成疾憂國忘身太和四年嵗在庚戍冬十一月乙未薨于升平里之私第享齡五十九皇帝軫悼廢朝賻禮加等粵辛亥二月十五日甲午葬于京兆府萬年縣長樂鄉宋侯之西原後三月詔贈工部尚書表勳臣也夫人李氏從夫之貴封趙郡夫人淑慎眀賢而能正婦道即哀盡哭動合禮經長子宗簡福王府參軍次子宗授一子出身幼子福郎小女平娘孩啼孺慕絶及旋懷抱以敬玄昔因朝奏相遇諸途語及戰伐之事備聞功業之本其子以理命見託固徴斯文而表諸道蓋不虛矣其詞曰惟天生人必以類分定亂以武克生武臣洸洸史公振輝羣倫正直不回剛決無鄰沐若膏雨煦然陽春濟以寬猛施之威仁三代為將道家所忌為將四世彌彰勇毅制勝料敵善利全活擒生度材任知寒天雪夜萬里齊轡攻討賊城致之死地干戈將戢弓矢載櫜懋功既立爰議賞勞謙闕愈彰寵錫彌髙貴婚華憲輝映賢豪王者之師勝殘去殺由不得已在懲桀黠惟公訓齊確然不拔令亦寬簡政不苛察羽林震衛克壯其猷推心誠膂練習貔貅忘身奉君勞積生憂運促潛奪名無建侯追榮八座寵錫威武葬于九原軫悼眀主勳名獨在骨肉歸土表行豐碑垂休萬古周右衛郎將集作宣威將軍楊公碑張説公諱令一字令一太州仙掌人也隋司徒觀王之玄孫周孝眀髙后之歸孫今司衛卿之元子維有隋接三統建萬國我髙祖以同姓為王維皇周敦九族敘百官我諸楊以外戚而貴公體玄黃之純粹承河山之丕緒孝乎內炳忠焉外灼集作均性與天和道合仁愛收恤孤老分産踈屬泰於周施約於妻子加以樂善而好學降尊而容衆能辨樂和思柔酒德容止可度溫溫如也文章可觀彬彬或作粲粲如也淵英皎穆當世碩士與之遊焉而曰君子若夫漢魏鼠族有恩澤之封公卿門子有良家之傳集作侍公浮雲世祿匪石儒風究乎王道之紀綱眀乎人事之終始年十九舉進士髙第授潞州參軍轉千牛胄曹遷洛陽尉從班次也居無何拜朝散大夫行通事舍人俄而加太中大夫檢校天官員外郎夫行人之在周禮方國是接公修其政令帝曰豫嘉郎官之著漢儀列宿是應公司其典故時稱邦則國家左賢右戚一武一文以公地望羽儀寄深虎旅除宣威將軍行右衛翊府郎將僶俯從事非其好也初公時為郎也遼蕃肆擾作患幽冀皇上燠體下人故我有神兵之役選達權靡盬之吏佐猛毅維城之師乃下制以公為兵曹焉實有密贊軍政獨飛長䇿豈云卒乘輯穆戎機式序若此而既哉俾雷霆飈動勦匿殿邦威玄兔懷黃龍馬未汗而狄盡人不疲而兵戢者公與有力也及班師振旅册勳踰時帝用咨有司之違古念有功之未録將遷德命霈多勤有日矣方當翼大化增三光之眀熙天秩垂九德之聲昊天不惠癘氣流行如何斯人胡不眉壽年四十一聖厯元年夏六月辛丑遘疾而卒嗚呼哀哉梁木惟施豫道不究呱呱稚嗣仰號蒼穹哀哀嚴親惴臨淵谷遐邇寮舊既乎欽風未識之徒罔不盡一蟲作盟朋悲而冀一作增􅀈矣天子憫焉弔之以玉册贈之以錦衾羣公傷焉誄德於素斾圖像集作體於青史粵乙卯假葬於合宫縣平樂鄉之北阜郭門十里邙山西岡巒萬古之阡都邑九重集作原之地隧寄新壠魂懷故域藐是諸孤未遑歸葬平生志事孰已焉哉厥弟五人比才連譽曰踐一獻一循一惟一尚一等因心則友世稱萬石之閨門死喪之戚吾見伯淮之兄弟僉曰我圖後事日月除乎哉龜云此地陵谷居乎哉乃布哀友生託詞懷舊迹德表墓示之來昆其銘曰洪河南注少華西峙氤氲靈會生此君子生此君子惟國之紀宣慈惠和禮樂文史敦錫宗類汲揚徴丕勤能集作然濟物若不由已克眀從政集作訓誕膺集作敷厥美修辭比闕潤色東里揮翰文昌列星順晷交戟禁衛為王爪士允武允文翁歸是比疇曰禦冦諗軍北鄙攘敵黃龍濟師蒼兕將王玄默繄公是恃帝懿乃勳將圖膴仕仇仇執憲不我力以役役大勞未受多祉景命無祿洪基中圮父兮葆鬢孤兮稚齒孔懷靡及凡伯瘁止陟彼邙山邱墟嵗磊荒壠集作章無際羣哀所起于嗟楊侯託居此矣沕潏綿曼德音不已久客思鄉永懷桑梓唐元域府左果毅郎將葛公碑前人公諱威德字某曰葛氏京兆涇陽人也其先嬴姓咎繇之後夏有葛伯氏族興焉寧陵之傍尚傳侯國綏山之下獨有仙祠嬰則威服五城襲則績稱二縣鴻臚秀於吳會散騎崇於晉京集作景在其子孫是冝繁羡公生而開朗長而英拔非因馬鄭之學動合禮經不待孫吳之書暗同兵法有拳勇尚氣槩顧盻稜華風神都爽五馭善於東野六射徑於西霜少以嫖姚之才入光供奉之選御橋驂駕犯清蹕而不驚輦道啼烏應鳴弓而自落便蕃左右星嵗重深贈上柱國拜元城府左果毅天下大定李廣之用無施雲中薦賢馮唐之言已老春秋六十有五神功二年某月終於落師藁殯邙阜夫人太原郡王氏夫人郭氏實生大將軍福順一見聖主再紐乾綱重位冠乎北軍茂功藏乎南史故象服臨祭魚軒以朝天子深嘉嘆馮勤之母羣公列拜賀虞潭之親享年七十有五薨於京兆之三真里公愛敬奉親軌則可集作可字移於後代義方訓子福祿集作祿字來及於先人葬有日矣乃下制曰禮著飾終情惟悼往詢前列抑有舊章前左羽林軍大將軍葛福順亡父某字某謙素𢎞此藝能未展才術奄從凋須而嗣子克家式昭勳業既念功以追逺亦自葉而流根宜申奬贈俾慰泉壤可贈遊擊將軍守左驍衛翊府郎將開元九年二月九日葬我郎將君軍前夫人王氏後夫人郭氏祔焉禮也章芾以遂輅旗在列廟食備其牲牢法葬陳其簫鼓孝慈之道著矣哀榮之禮備矣尋彼平生之事忽如絶光繫乎碑版之才永存遺烈銘曰闕角立傑堅神鋭玉劔氣雄金鼓六藝爰設射馭為武百行雖多集作名忠信為主時不兼命位不充才善流慶答身謝榮來太原棣棣實惟嘉偶羽林桓桓克大其後唐上騎都尉髙君神道碑楊炯南方火德陽精赫雷電之威西陸金行秋令毒風霜之氣達其變聖人所以定天下之文象其宜聖人所以觀天下之變或衣裳六合舞干戚而掃虔劉或鍾鼓八紘用甲兵而誅暴亂若夫皇天失紀彗孛飛流后土不繩集作綱是山河崩竭蚩尤食石交集作災害於生人項羽拔山慿陵於上國天子聞鼓鼙之響思將帥以龔行將軍屬甲胄之容攬英雄而決勝則風雲潛感豪傑挺生得七星之武曲破軍受五運之金多木少四時繁弱射連尹於嶅山萬辟太阿殺顔良於官渡然後達人知足徒興集作從白髮之歌烈士徇名不受黃金之賞與夫棄其筆墨漢家封萬里之侯稱爾戈矛集作干戈周王命百夫之長豈可同年而語哉君諱則字𢎞規其先渤海人也後代因官遂家于涇州之定安唐書作安定縣神房阿閣太山橫日觀之峰金闕銀臺滄海蔽天虛之岸風土形勝關河表裏三分六州之大業師尚父贊其經綸一匡九合之元勳齊桓公拓其疆場髙柴至德籍東魯之聲名髙鳯沉研盛西堂之學校英才磊落而秀發人物蟬聨而間起三光不墜察髙星於太紫之宫八柱無疆奠髙嶽於中黃之域曽祖沖北齊鷹揚郎將周右屯衛清宫府别將成軍夜火教戰秋風九天揚後一之兵六合擁前三之陳張生集作良入漢行觀滅楚之徴微子奔周坐見亡殷之兆祖赦周褒郡南和縣長陶元亮攝官於彭澤道契羲皇陳仲弓歷職於太邱德符星緯飄風驟雨不入集作過灌壇之鄉暴武蒼鷹潛出集作變瑕邱之境考才朝議郎止開府孫子荆之天骨亮拔不羣王夷甫之道心神鋒太峻議郎清秩懸符處士之星開府崇班上接台階之位君雄心獨斷猛氣無前用兵書六甲於自然知射法三篇於性道早圖星象管公眀懷察變之心幼識旌旗集作畨陶恭祖有行師之略屬隋人板蕩天下崩離朱陽夾飛鳥之雲紫極現集作恕雄雞之象陳兵爭戰窺玉䇿於中州姚石壇場竊金符於宇縣我髙祖黃雲大帝白水真人風雷海嶽之神精天地隂陽之正氣媧皇受命殺黑龍而定水災漢祖乘集作機斬白蛇而開火運君夜觀乾象晝察人情審熒惑之歌謡驗集作考嵩山之讖記關中王氣不勞井德之言沛國真星無待殷馗之説賊薛舉豺狼梟獍檮杌窮竒守幽疑作幽集作函隴以行災負關河而作孽天王按劔出軍於玉帳之前猛將分麾受律於金壇之下以義寧二年王師薄伐趙國公長孫無忌精兵若獸利器如霜問君以帷幄之謀待君以心腹之寄營當月暈因八門之死生陳法天星乘五將之關格蔭華蓋歷眀堂以我和而制其離以我直而摧其曲敗楚師於柏舉未足權衡執秦桴於崤陵無階等級此實君之功也其年詔授朝散大夫賜物三百段排患而釋滯功成而不居比踈傅而辭榮追留侯以髙蹈三靈革故君子於焉待時四海清平謀臣以之歸第自太王基命成康隆玉版之圖髙帝受終文武盛金刀之業家給人足天成地平猶勞水旱之餘尚想京坻之積咸亨三年春奉勑於河陽檢校水運使集無使字搜粟都尉河堤使者銅橈鐵舳蒼鷹白鶴之船竹箭桃花貝闕龍堂之水引紅粟於淮海泛歸舟于秦晉遂使齊臣獻納先陳不減集作涸之名漢后絲綸即有常平之號望千石之氣可以療飢開萬箱之儲自然知禮此又君之功也其年詔賜上騎都尉嗟夫河流曲直天道盈虛鬼神莫之要聖賢莫之預髙臺下泣孟嘗君之惻愴可知梁木興歌孔宣父之平生已矣上元三年春三月日終于樂邑里之私第享年七十六惟君魁梧動俗符彩驚人忠孝天資溫良日用一門兄弟盡同鍾育之車千里賔朋時命嵇康之駕每至白雲生海素月流天未嘗不顧眄山河抑揚琴酒馮異異字集作公孫之大樹對諸將而無言集有禽字子夏之名山謝時人以不語集作而長往四林遊刃八水忘筌能祛有漏之因早得無生之法雖十年俱盡陸士衡之長嘆集作歎逰有徴而千載猶生藺相如之壯心恆在即以冬十月丁酉葬於定安東南二十里之平原禮也陶公相宅郭璞占墳靣丹鳯而背玄龜兆青鳥而徴白馬三百篇之後卜筮何從二千石之榮子孫無替長男仁睿中男仁楷少男上護仁眆等或體窮三變潘陸不足以升堂或力敵萬夫關張不足以扶轂有元方季方之長幼傳學詩學禮之門風金友玉昆忠臣孝子窮號積於心髓創巨纒於肌骨星辰已變昊天無報德之期霜露潛移君子有終身之感葬之以禮垂制度於三王思之以時别蒸嘗於四季然後按韋賢之舊德敘潘嶽之家風戴逵銘北海之文張昶刻西山之石若使鄧將軍之一見自得嘉名魏太祖之來觀懸知絶唱其詞曰金闕千仭銀宫百常發揮雷雨震動隂陽山水形勝人神會昌九州霸業賜集作四履勤王樂只君子邦家之光驚雷氣候大昴徵祥運屬飛海時逢吸霜中原逐鹿西嶽亡羊漢起髙帝周興太王乃披荆棘即闕壇場國步猶阻黎元未康將軍不拜使者相望陳合星斗兵符玉璜殱夷判逆刷滌邊荒化穆三代時清九皇猶思禮節尚試堯湯漕通淮海水泛舟航蒼鷹鷁舳紫貝龍堂功立身退乃懸車杖鄉百年俄項萬緒悲涼昔時華屋今日玄房平天慘慘半月蒼蒼地謂西郭山言北邙曲池無處松檟成行唐昭武校尉曹君神道碑前人君諱通字某其先沛國譙人也近代因官遂居于瓜州之常樂縣故今為縣人焉顓頊髙陽之子孫曹叔振鐸之苖裔山河白馬漢丞相開一代之基譙沛黃龍魏武帝定三分之業承家集作苖恤胤嶽峙星羅居雍州集作之字西境斷胸奴集作之字右臂門容駟馬旌旗玉塞之雄坐列三貂人物金行之秀祖某隱居不仕父顯蕩冦將軍河庭寶玉廣都鸞鳯或閭閻之內禮敵於諸侯或抱鼓之間威振於千里功則可大以官族而為官德亦不孤惟將門而有將君天才卓越雄略縱橫陶謙性好於幡旗王濬志在於長戟東方諫議口誦孫吳諸葛武侯坐吟梁甫屬有隋之末四海分崩皇運之初三光草昧五星同聚田橫猶在於草集作每中九代飛榮隗囂尚屯於隴右賀拔盛操符誓衆斬木稱兵以雕題鑿齒之餘負徑努強弓之勇遂欲驅馳我塞北撓亂我河西天子不懌於廟堂鼓其雷電使者相望於道路申其弔伐武德元年乃詔侍中楊仁恭出使先之以德義陳之以兵甲七旬干羽不籍有苗之師萬國侯王坐見防風之戮君深知逆順獨斷胸懷去危即安轉禍為福非如馬援遨集作來逰二帝之都不學竇融自保三分之重勑授昭武校尉鮮卑醜類慕容殘孽遷于大棘之城止於小蘭之界雖謂其羣下願聞禮於上宗集作京而拜以將軍遂誇大於諸國貞觀八年詔特進代國公李靖為行軍大總管登壇拜將授鉞行師開太一之三門閉隂符之六甲決勝於爼豆然後折衝萬里信賢如腹心故能匡正八極君當仁不讓聞義則行從王粲之戎旅棄班超之筆硯係單于之頸有類長沙斬樓蘭之王更加平縣集作樂詔除上騎都尉車師舊國俯桃集作枕前庭戊巳遺墟斜連後壁負天山而版蕩擁蒲海而虔劉聖人之德非欲窮兵黷武王者之師蓋為夷凶靜亂十四年詔兵部尚書侯君集為行軍大總管軍營玉帳武略珠韜旌旗蔽於日月金鼓聞於天地安人保大實慿帷幄之謀斬將搴旗誠藉武夫之力君𬗟懷髙義思報國恩從來六郡之子是惟集作為萬人之敵梯衝所及攻靡堅城矛戟一作弟伐匪所臨野無橫陳一舉而清海外再戰而滌河源飲至䇿勳抑惟恆授詔除上柱國君備嘗艱阻頻有戰功天子聞之纍加徴辟慕田疇之節羞賣盧龍之塞髙魯連之義請從滄海之逰遂乃散髮鄉亭拂衣邱壑為趙魏之老在羲皇之上集作年關內諸公深知郭解洛陽人物髙談劇孟家僮有禮皆使拜賔門客多才咸能市義南宫養老坐聞鳩杖之榮東嶽逰魂俄見鶴書之召以龍翔元年某月某日終于里第嗚呼哀哉夫人某官之女也流湘降祉河洛騰休符玉石之堅貞貫風霜之慘烈鏡飛天上窺祥鳯集作死鸞鳴於銀臺劔動星文祕蛟龍於玉匣以某年某月日終越某年月日合葬於某原君孝實因心忠為令德鮮花匝苑集作樹盡兄弟之歡娛好鳥鳴林展交逰之宴喜太初朗月俯照金鞍叔夜清風來生寶劔故能戰必勝攻必取西零種族遙憚武臣北漢酋豪見稱飛將雖死之日猶生之年園令獨慕於相如漢帝長懷於李牧長子遊擊將軍和政府右果毅都尉上柱國永雄次子朝散郎行西州柳中縣主簿上騎都尉知君等三餘廣學百戰雄才就養之方兼申愛敬慎終之道不忘哀戚雖雨崩闕子之格言而鼠齧前松集作末禾有文王之故事即以某年月日改葬於木城之平原長婦某氏即永雄之妻也某官之女柔風淑譽習禮聞詩上奉舅姑旁睦娣姒溫家之婦方歡白玉之臺盧氏之妻空對黃金之碗先以永淳元年某月日終至是即陪窆于塋內右翊衛𢎞軌兵圖日用劔術天知六郡許其良家三川養其聲利思𢎞祖德願敘家風託無愧之銘跋涉載勞於千仭訪他山之石東西向踰於萬里炯效官昌運負譴眀時始以東宫學士出為梓州司法傾蓋相逢當仁不讓庶使見曹娥之碣楊修歎其好詞讀元壽之文髙祖稱其佳作其詞曰大矣丞相天地翼集作寅亮蒸哉侯王子孫蕃昌條分葉散源濬流長金城北見集作峙玉關西侯山澤駢羅冠車集作衣冠輻湊降神生德興賢誕秀曰有人英材標國楨髫年學劔丱集作弱嵗論兵以身許國東討西征皇家啓聖撥亂反正􅊇賊遊魂不恭王命亦既授首河西大定蕞爾湟中車書未同帝赫斯怒攢其英雄風行電集作地轉谷靜山空二庭遺孽交河路絶天子聞鼙元戎按節王師無戰海外有截歸我田廬功成不居嵗云秋矣日月其除壽非金石命也如何孝乎兄弟葬之以禮蓼蓼者莪人生若多言猶在耳眇邈集作邈若山河文苑英華卷九百十
