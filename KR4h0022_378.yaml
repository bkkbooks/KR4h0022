body:
  text: 文苑英華卷三百七十八宋李昉等編識行行難一篇交難說一篇述行一篇雜製作祗園寺净土院志一篇植松論一篇觀市一篇觀博一篇骰子選格序一篇植蘭說一篇止妬一篇識行行難韓愈或問行孰難曰捨我之矜從爾之稱孰能之曰陸先生參何如曰先生之賢聞於天下是是而非非貞元中自越州徵拜祠部員外郎京師之人日造焉閉門而拒之滿街某嘗往間客一作賔席坐定先生矜語其客曰某胥也某啇也其生某任之其死某誄之某與某可一作何人也任與誄也非罪歟皆應曰然愈曰某之胥某之商其得任與誄也有由乎抑有罪不足誄而任之耶先生曰否吾惡其初不然任與誄也何尤愈曰苟如是先生之言過矣昔者管敬子取盜二人為大夫於公趙文子舉管庫之士七十有餘家夫惡求其初先生曰不然彼之取者賢也愈曰先生之所謂賢者大臤貝歟抑賢於人之賢歟齊也晉也且有二與七十焉而可謂今之天下無其人耶先生之選人也已詳先生曰然愈曰聖人不世生集文粹作出賢人不時出千百嵗之間儻有焉不幸而有出於胥商之族者先生之說傳吾不忍赤子之不得乳於其母也先生曰然他日又往坐集無坐字焉先生曰今之用人也不詳位乎朝者吾取某與某而已在下者多于朝凡吾與者若干人愈曰先生之與者盡於是乎其皆賢乎抑猶有舉其多而沒其少者乎先生曰固然吾敢求於集作其全愈曰由宰相至執事凡幾位由一方至一州凡幾位先生之得者無乃不足充其位也耶不早圖之一朝而舉焉今雖詳集有且微二字其後用也必粗先生曰然子之言孟軻不如交難說李觀交之難兮久矣且苟合兮為耻昔人病於無友嗟友不可以已矣絶壑萬丈􅀈􅀈集作鏗鏗龍吟𤣥雲遂興六合為陰碧山嵌空虎嘯其中百獸悍栗歘然集作焉長風夫物以類感何感不致交以心契何心不契此處疑衍何心不祕然執可久之契先古稱利集作制言求於斯不可易易二氣陶甄曰人是先足矩地首規天大朴摧頽六情入焉一與一奪失集作喪其自然積有億年人增險難集作艱使我行無所之居無所安遊集作末流濺濺潰我素源源無清流棄沉逐浮作集作詐色自伐僞心相求睢盱竭歡未竟成讐一日銷落連如凉秋其集作朝榮無遺俗態豈留獨見神嶽寒柏千尋無儔直天而生髙略集作干斗牛下睨群植匪堪與謀集作侔何者為交窮逹不偷樂亦同樂憂亦同憂生死循環其道率由破産之集作作惠不相為酬如斯之謂也昔夷吾九合之䇿知者不孤巨卿千里之哭今也集作人則無石父解縳於齊相智罃負慙於賈夫行集作信微其可有集作及乎知我則友何微之居集作拘古之奉交多集作都不獲全耳餘之初刎頸慨然隱憫就辱激昻自堅及其據兵而坐勢不相果白刃可吹集作追赤心乃携憑怒相殺氣干虹霓嗚呼噫戲也交之難兮二字集作以利苟合忿深咆哮余當識集作常戒之不妄語交矧今之人兮無異二字集作實䝉虺􅔼是故獨處兮而悲蠨蛸冀幸歟集作若及者可振豫願言與鄰驂吾相之駕捧仲尼之輪義者有其義仁者師其仁不其仁不其善疑作義歟何滯於斯憂辛述行噫聖人之所能而賢人所難曰德德不愧則修立之事著矣琛每究聖人旨顯而微隱而著義讓以表其外德行以明其內恩信以招其賢寬惠以廣其物剛毅以將其志溫柔以制其勇去義讓則父子之道乖捨德行則君臣之志缺廢恩信則朋友之道墜亡寬惠則刑法之政弊用剛毅則勇果之心遂斥溫柔則和弱之旨怠六者聖人之尊賢人之難也所以堯舜而治丹均而廢禹湯得堯舜之道桀紂蕪禹湯之化是則德行義讓恩信剛柔偕隨時而晦明也吁以偶為己任以利為己友一作反夫如是雖冠帶儼然事虛美於寰宇下具年足之一氣爾烏異沭猴而冠者耶德行可置宜乎哉雜制作祗園寺净土院志梁肅祗園精舍净土院者沙門常輝觀佛三昧之所也按契經西方極樂界曰有佛集作有佛曰無量壽如來誕敷本願爰宅彼土垂拱東向以提群生如想念者利有攸往往而至者住不退地至矣哉蓋出世之康衢三乘之舟楫也原夫真俗同體聖凡一貫隨心升降見境差别於是深靜集作染靜相形依正相成離為百界合成一念如來以其然也故因其所習視其所安隨所感化示所依處無量壽國蓋所示之一歟有若觀心佛二者不來不往誰縛誰解如是觀者生之上也如是如見集無如見二字信解觀念漸純生之次也繫緣闕事厭染懷净又其次也或近或逺或真或假值佛聞法同歸一地此西方教所以為至也或者以為法有相空不可得生彼界者與斯土何以異是不知佛意逺矣輝既修此道場懼昧者不知所以然因命我紀之植松論符載楚國主人嗜材搴異有樹美松於庭者培沃土灌甘澤根柢深固柯葉暢逹居二三年起盈尺挺於纍丈始筳筯大於拱抱髙姿傑然若陵重芬主人方凝睇結意曰是可采之矣將行斧焉客有遇之者曰噫其甚也是木有戞雲之姿有搆厦之材繩墨太速恐夭其理今植於庭除之間充耳目之玩尚見狎近氣色不振若徙於嵩岱之間沆瀣之華注於內日月之光薄於外祥鸞嗷嗷戲其上流泉湯湯鳴其下巖岫重復漠漠然清净靈風四起聲掩竽籟是時也當境勝神王拔地千丈大疑衍根實黃泉枝摩青天則可以柱明堂而棟大厦也豈暇曠之㫖捨此而取其榱桷棼橑哉主人曰客言雖濶而無岸然余終能大之矣觀市劉禹錫由命士已上不入於市周禮有焉乃今觀之蓋因也元和二年沅南不雨自季春至於六月毛澤將盡郡守有志于民誠信而雩遂遍山川方社又不雨遂遷市于城門之逵余得自麗譙而俯焉肇令下之日布市籍者咸至夾軌道而介分次焉其左右前後班間錯跱如在闤闠制其列區榜楬價名物參外夷之貨馬牛有牽集作緯私屬有間在巾笥者緘文及素焉在几閣者􅀈彤及質焉在筐筥者白黑巨細焉業于饔者列饔膳集作饎陳䴵餌而苾然業于酒者舉酒旗滌杯盂而澤然鼓刀之人設髙爼解豕羊而赫然華實之毛畋魚之生交蜚走錯水陸群狀夥名入隧而分韞藏而待價者負挈而求沽者乘射其時者竒贏以游者坐賈顒顒行賈遑遑利心中驚貪目不瞬於是質劑之曹較固之倫合彼此而騰躍之易集作冒非良苦於集作之非巧言斁量衡於險手杪忽之差鼓舌傖儜詆欺相髙詭態橫出鼓囂譁坌煙埃奮羶腥壘集作疊巾履囓而合之異致同歸雞鳴而爭赴日午而駢闐萬足一心恐人我先交易而退陽光西徂幅員不移徑如初中無求隟地俱唯集作為守犬鳥烏樂得腐餘是日倚衡而閲之感其盈虛之相尋也速故著于篇云觀博客有以博戲自任者速集作遲余觀焉初主人執握槊之器置於廡下曰主進者要者約之既揖讓則集作即次有博齒齒異乎古之齒其制用骨觚稜四均鏤以朱墨耦而合數取應暮月視其轉止依以爭道是制也通行之久矣莫詳所祖以其用必投擲故以專投設之是日客抵骨於局且祝之曰其來如趣集作趨其去如脫事先趦趄命中無蹉跌無從彼呼無俾集作戾我怛分曹道迫自旦至于日中昃而率與所祝異焉客視骨集作祝如有情焉或憑焉悉詈之不泄又從而齕囓蹂躪之莫顧其十目之咍讓也乃曰非余術之不工是朽骼者不余畀也請刷耻于奕棋主人促命燭以續之騖神默計巧竭智匱主進者書勝負之數于牘視其所喪又倍前籍焉觀者曰以夫人之𥚹心亦將詬棋而柢枰矣既乃恬而不恤𧹞然有失鵠求身之色人咸異之子劉子曰先人者制人博投是已從人者制於人枯棋是已二者豈有數存乎其間哉何處之勢異耳是知當軸者易生嫌而退身者易為譽易生之嫌不足貶也易為之譽不足多也在集作亦辨其所處而已骰子選格序房千里古之序班位列爵祿非獨以理萬民總百事且用以别白賢不肖堯為君舜為相其下有共鯀焉成王為君周公為相其下有管蔡焉舜周公之貴非幸也宜也共鯀管蔡之殛放非不幸也宜也故賢者宜進之雖已貴益其祿厚其爵不為幸不肖者宜退之雖已賤奪其廪削其秩不為歉由是人用自勵遷善去惡强奮自篤後代衰微升於上者不必賢沉於下者不必愚得不必功失不必過賢者知其善不足恃耻比肩而趨故賢未嘗進不肖者知其惡不果棄文粹有惟字奮臂而逞故不肖未嘗退有賢者退人雖心知之卒無奈何且曰非人也命也有不肖者進人雖心知之又文粹有益字無可奈何亦曰非人也命也以是善不勸而惡不悛率曰付文粹作賦諸命而已矣果如是聖人所謂仁誼忠信者何足道哉姑徵其有命無命耳悲夫斯後代之不可復古豈不由是也開成三年春豫自海上北徙舟行次洞庭之陽有風甚急繫船野浦下三日遇二三子號進士者以六骼文粹作骰雙雙為數文粹作戲更投局上以數多少為進身職官之差數豐貴而約賤卒局座客有為尉掾而止者有貴為相臣將臣者有連得美名而後不振者有始甚微而歘升于上位者大凡得失酷似前所謂不繫賢不肖但卜其偶不偶耳逹人以生死為勞息萬物為一焉果如是吾今之貴者安知其不果賤哉彼真為貴者乃數年之榮耳吾今貴者亦數刻之樂耳雖久促稍異其歸於偶也同列禦冦叙穆天子夢遊集作事字近者沈拾遺述枕中事彼皆異類微物且猶竊爵位以加人或一瞬為數十嵗吾果斯人也又安知數刻之樂果不及數年之榮耶因條所置進身職官遷黜之目為骰子選格序植蘭說楊䕫或種蘭荃鄙不遄茂乃法圃師汲穢以溉而蘭净荃潔非頓乎衆莽苖既驟悴根亦旋腐噫貞哉蘭荃歟遲發舒守其元和雖瘠而茂也假雜壤亂天真雖沃而斃也守真介而擇祿者其蘭荃乎樂淫亂而偷位者其雜莽乎受莽之僞爵者孰若龔勝之不仕耶食述之僣祿者孰若管寧之不位耶嗚呼業圃者以穢為主而後見龔管之正止妬梁武平齊盡有其內獲侍兒十餘輩頗娛於目俄為郗后所察動止皆有隔抑拗其憤恚殆欲成疹左右識其情者進言曰臣嘗讀山海經云以鶬鶊為膳可以療其事使不忌陛下盍試諸梁武從之郤茹之後妬減殆半帝愈神其事左右復言曰願陛下廣羞諸以遍賜羣臣使不才者無妬於有才挾私者不妬於奉公濁者不妬其清貪者不忌其廉俾其惡去勝忌前皆知革心亦助化之一端也帝深然其言將詔虞人廣捕之㑹方崇內典誡於血生其議遂寢文苑英華卷三百七十八
