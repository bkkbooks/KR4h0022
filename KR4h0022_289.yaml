body:
  text: 文苑英華卷二百八十九宋李昉等編行邁一梁元帝三首江洪一首吳均二首劉孝儀一首劉孝威一首王僧孺一首朱超一首隂鏗三首庾信一首顔之推一首王褒一首江總一首孔德紹一首孫萬夀四首陳子良二首李百藥一首王勃七首楊炯二首盧照鄰四首駱賓王十二首席豫二首陳子昂二首沈佺期七首早發龍巢梁元帝征人喜放溜曉發晨陽隈初言前浦合定覺近洲開不疑行舫動唯看逺樹來還瞻起漲岸稍隱陽雲臺自江州還入石頭前人鼓泄浮大川遙睇雒城觀雒城何鬱欎杳與雲霄半前望青一作蒼龍門斜瞻白鶴館槐垂御溝道桞綴金堤岸迅鳥一作馬晨風趨輕輿流水散高唱一作歌梁塵下湘瑟翔禽亂一作絙瑟荆琴亂我思江海遊曽與朝市玩忽寄靈臺宿空軫及關嘆仲子入南楚伯鸞出東漢何能栖樹枝取斃王孫彈一作皆藝文類聚赴荆州泊三江口前人涉江望行旅金鉦間綵斿水際含天色虹光入浪浮桞條恆拂岸花氣盡薰舟叢林多故社單戍有危樓疊鼓隨朱鷺長簫應紫騮蓮舟夾羽氅畫舸覆緹油榜歌殊未息於此泛安流江行江洪日沒風光靜逺山清類聚作深無雲潮落晚洲出浪罷沙成文挾琴上高岸望月彈明君去家未千里斷絶怨離羣江上酬鮑畿吳均振棹出江湄依依望九嶷欲謁蒼梧帝過問沅湘姬折荷縫作蓋落羽紡成絲吾行别有意不為君道之初至壽春作前人桓談不賣集作買交馮子任紆直浮溺逐波影飄揚恣風力北州少知舊南陽寡相識中駕每傾輪當鶱復集作輒摧翼望美無津梁私自憐何極帆度吉陽洲劉孝儀揚帆乘浪華摻鼓要類聚作噪鼓揚風力近樹倏而遐遙山俄已逼欲比驚龍掣將頓陽烏翼客行悲道逺唯須前路極同前劉孝威江風臨曉急鉦鼓候晨催幸息榜人唱聊望高帆開聫村倐忽盡循汀俄頃回疑是傍洲退似覺前山來將與圖南競誰云勞泝洄至牛渚憶魏少英王僧孺楓林曖似畫沙岸淨一作靜如掃空籠望懸石回斜見飛鳥一作危島緑草間遊蜂青葭集輕鴇布老切鴇性不止樹徘徊洞初月浸淫漬一作潰春潦非願歲物革一作華徒用風光好一作皆藝文類聚夜泊巴陵朱超月夜三江靜雲霧四邉收淤泥不通挽寒浦劣容舟回類聚作回風折長草輕氷斷細流古村空列樹荒戍久無樓和傅郎歲暮還湘州隂鏗蒼茫歲欲晚愁一作辛苦客方行大江靜猶浪扁舟獨且征棠枯綘葉落一作盡蘆凍白花輕戍人寒不望沙禽逈一作回未驚湘波若空一作各深淺輕棹一作空軫念歸情一作皆藝文類聚晚泊五洲前人客行逢日暮結纜晚洲中戍樓因嵁險村路入江窮水隨雲度黑山帶日歸紅遙憐一柱觀欲輕千里風渡青草湖已見一百六十三卷同州還庾信赤岸繞新村青城臨綺門范雎新入相穰侯始出蕃上林催獵響河橋爭渡喧竄雉飛橫澗藏狐入斷原將軍高宴晚來過青竹園從周入齊夜渡砥柱顔之推俠客重艱辛夜出小平津馬色迷關吏雞鳴起戍人露鮮華劔彩月照寶刀新問我將何去北海就孫賔渡北河已見一百六十三卷王褒并州羊腸坂江總三春别帝鄉五月度羊腸夲畏車輪折翻嗟馬骨傷驚風起朔鴈落照盡胡桑關山定何許徒御慘悲凉夜宿荒村孔德紹綿綿夕漏深客恨轉傷心撫弦無人聽對酒時獨斟故鄉萬里絶窮愁百慮侵秋草思邉馬繞枝驚夜禽風度谷餘響月斜山半隂勞歌欲叙意終是白頭吟行經舊國孫萬夀蕭條金闕逺悵望羇心愁舊邸成三徑故國餘一丘庭引田家客池泛野人舟日斜山氣冷風近樹聲秋弱年陪宴喜方兹更獻酬修竹慙詞賦叢桂且淹留自忝無員職空貽不調羞武騎非吾好還思江漢遊早發揚州還望鄉邑前人鄉關不再見悵望窮此晨山煙蔽鍾阜水霧隱江津洲渚斂寒色杜若變芳春無復歸飛羽空悲沙塞塵東都在路率爾成詠前人學宦兩無成歸心自不平故鄉尚千里秋山猿夜鳴人愁慘雲色客意慣風聲羇恨雖多緒俱是一傷情和張丞奉詔於江都望京口前人回首觀濤處極望滄海湄流波去無限喬木不勝悲蓬萊雖已變池塘尚所思歸飛路窮此悵望情難持吾生乃世季疇日佐藩維尚想西園夕猶懷北固時城邑才辨處風烟忽何之跂豫未能已顧嘆空遲遲入蜀秋夜宿江渚陳子良我行逄日暮彌棹獨維舟水霧一邉起風林兩岸秋山隂黑斷磧月影素寒流故鄉萬里外何以慰羈愁於塞北春日思歸前人我家吳㑹青山逺他鄉關塞白雲深為許羈愁長下淚那堪春色更傷心驚鳥屢飛恆失侣落花一去不歸林如何此日嗟遲暮悲來還作白頭吟晚渡江津李百藥寂寂江山晚蒼蒼原野暮秋氣懷易悲長波渺難泝索索風葉下離離早鴻度丘壑列夕隂葭菼凝寒露日落亭臯逺獨此懷歸慕散關晨度王勃關山凌旦開石路無塵埃白馬高談去青牛真氣來重門臨巨壑連棟接崇隈即今揚䇿度非是棄繻回易陽早發前人飭裝侵曉月奔䇿候殘星危閣尋丹嶂回梁屬翠屏雲間迷樹影霧裏失峯形復此凉飈集作商飈至空山飛夜螢焦岸早行和陸四前人侵星違旅館承月戒征儔復嶂迷晴色虛巖辨岸流猿吟山漏曉螢散野風秋故人渺何際鄉關雲霧浮麻平晚行前人百年懷土望千里倦遊情高低尋戍道逺近聽猿聲集作泉聲澗葉才分色山花不辨名羈心何處盡風急暮猿清深渡夜宿主人依山帶江津塗臨巨壑村宇架危岑堰絶灘聲隱峯交樹影深江童暮理楫山女夜調砧此時故鄉逺寧知遊子心長桞前人晨征犯烟磴夕息在雲間晚風清近壑新月照澄灣郊童樵唱返津叟釣歌還客行無舊識集作與晤賴此釋愁顔泥溪前人彌棹凌奔壑低鞭躡峻岐江濤出岸險峯磴入雲危溜急船文亂巖斜騎影移水烟籠翠渚山照落丹崖風生蘋浦葉露泣集作泫竹潭枝泛水雖云美勞歌誰復知早行楊炯敞朗東方徹闌干北斗斜地氣俄成霧天雲漸作霞河流才辨馬巖路不容車阡陌經三歲閭閻對五家露文沾細草風影轉高花日月從來惜關山猶自賖途中前人悠悠辭鼎邑去去指金墉途路盈千里山川亘百重風行常有隊雲出夲多峰鬱鬱園中桞亭亭山上松客心殊未樂鄉淚獨無從早度分水嶺盧照鄰千集作丁年遊蜀道萬里集作斑鬢向長安徒費周王粟空彈漢吏冠馬蹄穿欲盡貂裘敝轉寒層氷橫集作蟠九折積石凌七盤重溪既下潄峻峯亦上干隴頭聞戍鼓嶺集作雲外咽飛湍瑟瑟松風急蒼蒼山月團傳語後來者斯路誠獨難入秦州界前人隴坂長無極蒼山望不窮石徑縈疑斷回流映似空花開緑野霧鶯轉紫巖風春芳勿遽盡留賞故人同至陳倉曉晴望京邑前人拂曙驅飛傳初晴帶曉凉霧斂長安樹雲歸仙帝鄉澗流漂素沫巖景藹朱光今朝好風色延瞰極天莊晚渡浮沱敬贈魏大前人津谷朝行逺氷川夕望曛霞明深淺浪風捲去來雲澄波泛月影激浪聚沙文誰忍仙舟上携手獨思君春日離長安客中言懷駱賔王年華開早律霽色蕩芳晨城郭千門曉山河四望春御溝通太液戚里對平津寶瑟調中婦金罍引上賔劇談推曼倩驚坐揖陳遵意氣一言合風期萬里親自惟安直道守拙忘因人談器先蟠木圖榮異後薪欷歔悲路鬼憔悴切波神𤣥草終疲漢烏裘幾滯秦生涯無歲月岐路有風塵還嗟太行道處處白頭新曉度天山有懷京邑前人忽上天山望依然想物華雲疑天苑葉雪似御溝花行嘆征蓬逺坐憐衣帶賖交河浮絶塞弱水沒流沙旅思徒漂梗歸期未及瓜寧知心斷絶夜夜泣鳴笳晚泊河曲前人三秋倦行役千里泛歸潮通波竹箭水輕舸木蘭橈金堤連逺岸貝闕影浮橋水淨千年近星飛五老遙疊花開宿浪浮葉下凉飈浦荷踈晚的津篠漬寒條恓惶勞梗泛悽斷倦蓬飄仙槎不可託河上獨長謡晚渡黃河前人千里尋歸路一葦亂平源通波連馬頰迸水急龍門照日榮光净驚風瑞浪翻棹唱依聞集作臨風斷樵歌集作謳入聽喧岸回秋霞落潭深夕霧繁誰堪逝川上日暮不歸魂晚泊江鎮前人四運移隂律三翼泛陽侯荷香銷晚夏菊氣入新秋夜烏喧粉堞宿鴈下蘆洲海霧籠邉徼江楓繞戍樓轉蓬驚别渚徙橘愴離憂魂飛灞陵岸淚盡洞庭流振影希鴻陸逃名謝蟻丘還嗟帝鄉逺空望白雲浮早發諸暨前人征夫懷逺路夙駕上危巒薄烟橫絶壑集作巘輕凍澀回湍野霧連空暗山風入曙寒帝城臨灞涘禹穴枕江干橘性行應化蓬心去不安獨掩窮途泣長歌行路難至分水戍前人行役總離憂復此愴分流濺石回湍咽縈叢曲澗幽隂崖常結晦宿莽競含秋況乃霜晨早寒風入戍樓夕次集作晚泊蒲類津前人二庭歸望斷萬里客心愁山路猶南屬河源自北流晚風連朔氣新月照邉秋竈火通軍壁烽烟上戍樓龍庭但苦戰燕頷㑹封侯莫作蘭山下空令漢國羞早發淮口回望盱眙前人養䝉分四瀆習坎奠三荆徙帝留餘地封王表舊城岸昏涵蜃氣潮滿應雞聲洲逈連沙淨川虛積溜明一朝從捧檄千里倦懸旌背流桐柏逺逗浦木蘭輕小山迷隱路大塊切勞生唯有貞心在獨映寒潭清渡瓜步江前人捧檄辭幽徑鳴櫓下遺洲集作鳴桹下貴州驚濤疑躍馬積氣似連牛月逈寒集作黃沙靜風急夜江秋不學浮雲影他鄉客集作空滯留途中有懷前人眷然懷楚奏悵矣背秦關涸鱗驚照轍墜羽怯虗彎素服三川化烏裘十上還莫言無皓齒時俗薄朱顔望鄉夕泛前人歸懷剩集作到不安促榜把風瀾落宿含樓近浮月帶風寒喜逐行前至憂從望裏寬今夜南枝鵲應無繞樹難江行紀事二首席豫飄颻任舟楫回合傍江津後浦情猶在前山賞更新樹深烟漠漠灘淺石磷磷川路難行逺淹留惜此辰二江帆春風勢山樓曙月輝猿攀紫巖飲鳥拂清潭飛古樹崩沙岸新苔覆石磯津途賞無限征客暫忘歸西還至散關答喬補闕知之陳子昻葳蕤蒼梧鳯嘹唳白露蟬羽翰夲非匹結交何獨全昔君事胡馬余得奉戎旃携手向沙塞關河緬幽燕芳歲幾陽止白日屢徂遷功業雲臺薄平生玉佩捐歎此南歸日猶聞北戍邉代水不可涉巴江亦潺湲攬衣度函谷銜涕望秦川蜀門自兹始雲山方浩然宿空舲峽青樹村浦前人的的明月水啾啾寒夜猿客愁集作思浩方亂洲浦寂無喧憶作千金子寧知九逝魂虛聞事朱闕結綬騖華軒委别高堂夢集作愛窺覦明主恩今成轉蓬去嘆息復何言度安海入龍編沈佺期我來交趾郡南與貫胸連四氣分寒少三光置日偏尉他曽馭國翁仲久遊泉邑屋遺氓在魚鹽舊産全集作傳越人遙捧翟漢將下看鳶北斗崇山掛南風漲海牽别離頻破月容鬢驟催年昆弟推由命妻孥割付緣夢來魂尚擾愁委疾集作病空纒虛道崩城淚明心不應天十四時嘗從巫峽過他日偶然有思前人小度巫山峽荆南春欲分使君灘上草神女館集作廟前雲樹悉江中見猿多天外聞别來如夢裏一想一氛氲夜宿七盤嶺前人獨遊千里外高卧七盤西山月臨忩近天河入户低芳春平仲綵集作緑清夜子規啼浮客空留聽褒城聞曙雞初達歡州前人自昔聞銅柱行來尚一年不知林邑地猶隔道明天雨露何時及京華若箇邉思君無限慮堪作日南泉自樂昌流至集作自昌樂郡泝流至白石嶺下行入郴州前人茲山界夷夏天險集作際橫寥廓太史漏登探文命限開鑿北流自南瀉羣峯回衆壑馳波如電騰激石似雷落崖留盤古樹澗蓄神農藥乳竇何淋漓苔集作莓蘚更綵錯姢姢潭裏虹渺渺灘邉鶴歲杪應流火天高雲物集作初薄金風吹緑梢玉露洗紅蘀泝舟始興廨登踐桂陽郭匍匐緣修坂穹窿曵長䋏集作索礙林徒集作阻往來遇堰每前却救艱不遑食飯畢昏無託集作救艱不遑飯畢昏無暇泊濯溪寧足懼磴道誰云惡我行湍險多集作山水間山水集作湍險皆不若安能獨見聞書此貽京洛從崇山向越常并序前人按九真圖崇山至越常四十里杉谷起古崇山竹溪從道明國來於崇山北二十五里合水欹缺藤竹明昧有三十峯夾水直上千餘仭諸仙窟宅在焉朝發崇山下暮坐越常隂西從杉谷度北上竹溪深竹溪道明水杉谷古崇岑差池疑集作將不合繚繞復相尋桂葉藏金嶼藤花閉石林天忩虛的的雲竇下沉沉造化功偏厚真仙迹每集作纍臨豈徒探怪異聊欲緩歸心遙同杜員外審言過嶺前人天長地濶嶺頭分去國離家見白雲洛浦肝腸無用說崇山瘴癘不堪聞南浮漲海鳶集作人何處北望衡陽鴈幾羣兩地春集作風光萬餘里何時重謁聖明君文苑英華卷二百八十九
