body:
  text: 文苑英華卷四百八十二宋李昉等編方正賢良方正策七道賢良方正策七道第一道問朕聞經國體野取則於天文設官分職用立於人紀名實相副自古稱難則哲之方深所不易朕以薄徳謬荷昌圖思欲追逸軌於上皇拯羣生於季俗澄源正本式啓惟新俾用才委能靡失其序以事効職荅䇿作力各得其長至於考課之方猶迷於去取黜陟之義尚惑於古今未知何帝之法制可遵何代之沿革斯衷此雖戔戔束帛每賁於丘園翹翹錯薪未獲於英楚並何方啓塞以致於兹竚爾深謀朕將親覽對張柬之對臣聞仲尼之作春秋也法五始之要正王道之端微顯闡幽昭隆大業瀍洛之功既備範圍之理益深伏惟陛下受天明命統輯黎元載黄屋負黼扆居紫宫之邃一作中坐明堂之上順陽和以布政攝三吏而論道雍容髙拱金聲玉振徵求無厭誤及厮賤微臣材朽學淺誠不足以膺嚴㫖揚天休雖然敢不盡芻蕘罄狂瞽悉心竭節昧死上對臣聞天者羣物之祖王者受命於天故則天而布列職天生蒸民樹之君長以司牧之自非聰明睿哲齊聖廣淵不能使人樂其生家安其業陛下徳自天縱慈憫元元既樂其生且安其業臣聞瑞者上天所以申命人主也故使麒麟遊於囿鳳凰集於庭慶雲出神龍見其餘草木烟露之祥不可勝記陛下日慎一日雖休勿休故天申之以禎石告之以神文大矣哉聖人之鴻業也臣聞河圖洛書之不至也久矣孔子曰鳳鳥不至河不出圖吾已矣夫師說曰聖人自傷已有能致之資而天不致也陛下有能致之資而天蘊者所以扶助聖徳撫寧兆人也臣觀今朝廷含章贍博之士鯁言正議之臣陛下誘而進之並踐丹地伏青規顒顒昻昻雲屬霧委鸞騫鳳振一作翥佩金鳴玉曵朱紱揚翠緌充牣於階庭者矣昔舜舉十六相去四凶人有大功二十而為天子前史美之稱曰盡善盡美雖甚盛徳無以加此陛下彰善去惡昭徳塞違萬萬於虞舜自託薄徳愚臣何足以望清光而敢有議哉制策曰思欲追逸軌於上皇拯羣生於季俗澄源正本式啓惟新臣聞善言古者必考之於今善談今者必求之於古臣竊以當今之務而稽之往古以往古之跡而比之當今以為三皇神聖其臣不能及故於疑親之陛下刋列格正爰書脩本業著新誡建總章以申嚴配置法匭以濟窮寃此前聖所不能為非羣臣之所能及也今朝廷之政上令下行如身之使臂臂之使手百僚師師罔不咸乂此羣臣之能奉職也書曰元首明哉股肱良哉庶事康哉故臣以為陛下有三皇之位而能隆三皇之業也臣以今之刺史古之十二牧也今之縣令古之百里君也有官聨焉有社稷焉可謂重矣任非其材其害亦重矣昔周宣王欲訓其人問於樊仲曰吾欲訓人諸侯誰可者仲曰魯侯肅恭明神敬事耆老必咨於故實問於遺訓乃立之晉之名臣亦言舍人洗馬一時之髙選臺郎御史萬邦之俊哲若出於宰牧頌聲興矣由此言之則古牧州宰縣者不易其人也自非惠訓不倦動簡天心者未可委以五符之重百里之寄今則不然多以門資擢授或以勲階蒞職莫計清濁無選藝能負違聖誡安肯肅恭明神輕理慢法安肯敬事耆老取捨自便安能求之故實舉措縱欲安能問之遺訓選異一時之髙材非萬邦之俊傑於是多其僕妾廣其資産齒角兩兼足翼雙備蹈瑕履穢不顧亷恥抵網觸羅覆車相次孔子曰旣得之患失之苟患失之無所不至矣故臣以為陛下有三皇之人無三皇之吏也制策曰俾用才委能靡失其序以事効力各得其長至於考課之方猶迷於去取黜陟之義尚惑於古今未知何帝之法制可遵何代之沿革斯衷臣聞皇王之制殊條共貫雖有改制之名無不相因而立事孔子曰殷因於夏禮所損益可知周因於殷禮所損益可知其或繼周者雖百世可知也然則虞帝之三考黜陟周王之六廉察士雖有沿革所取不殊期於不濫而已陛下取人之法甚明考績之規甚著臣以為猶舟浮於水車轉於陸雖百王無易也今丘園已賁英楚雲集啓塞之路豈愚臣所能輕云也謹對第二道問朕聞軌物垂訓必隨一作體正於因生開國承家理崇光於敦本故七葉貂珥表金室之榮十紀羽儀峻班門之躅保姓受氏義先於睦親翼子謀孫事隆於長發朕以塞昧叨奉先靈墜典咸新遺章畢覩思欲甄明譜系澄汰簪裾𣲖别淄澠區分士庶至如陳田互出虢郭俱開束晢改漢𫝊之宗輔果易晉卿之號巨君之姓曾非馭鶴王子晉也之苗元海之家諒非擾龍之族永言紕繆良用憮然子大夫十室推英三冬富學允迪褎然之舉宜揚鏘爾之詞至若北郭南宫本因何義三烏五鹿起自何人公孫之由司馬之姓咸加辨析且顯指歸式副對揚朕將親覽對對臣聞保姓受氏明乎典訓或因地以賜姓或因官而命氏或官以代功亦以官族或所居之地因以為氏諸侯之子稱為公子公子之子稱為公孫公孫之子乃以其王父字為氏後代因之亦以為姓田陳虢郭以聲近而遂分輔果束晢以避難而更改王莽以田王為氏元海因漢甥立族騷括分南北之號充宗為五鹿之先應氏著書具表三烏之始司馬司徒是曰因官公孫叔孫春秋備載陛下盡六藝之英窮百氏之要淑問揚天地𤣥情貫幽顯黄竹清歌詞窮五際白雲髙唱文包萬象昔曹門三祖道愧由庚劉氏四葉仁非解愠豈若睿思瓊敷同雨露之霑漸一作漬神機苕發等曦望之照臨起帝典而孤立孕皇墳而獨秀臣沐浴淳和叨承至訓名聞於聖聴言奏於闕前謹對賢良方正策第一道後篇題作政理問欲使吏潔氷霜俗忘貪鄙家給人足禮備樂和庠序交興農桑競勸善師期於不陣上將先於伐謀未待干戈遽清一作淨金庭之祲無勞轉運長銷玉塞之塵利國安邊佇聞良算明言政要朕將親覽對吳師道對臣聞棲培塿者不覩嵩泰之干雲遊濘濚者詎識滄溟之沃日臣蒿萊弱質衡泌鯫生未一作焉識廣厦之居安知大牢之味不量蕞爾輕縱一作從褎然謬達天聽兢惶聖問粤惟皇家出震累葉重輝天人歸七百之期宗祊聨億兆之慶太宗以明一察一作體道括珠囊而總萬方髙宗以通三御宸轉金鏡而清九服用能肅清天歩夷坦帝途垂莫大之鴻基託非常之元聖伏惟皇太后陛下道超鍊石化軼捫天被子育之深仁𢎞母儀之博愛星階已正尚雖休而勿休宸極既安猶損之而又損方欲還淳返朴振三古之頺風緝政蒼生降四海之昌運㧞幽滯舉賢良黜讒邪進忠讜故得鴻稽大鴻大稽黄帝相也接軫和宇宙之陰陽龍武書䕫龍朱虎分曹節風雨之春夏禮樂備舉學校如林俗知廉讓之風人悦農桑之勸猶復旁求謏議虚佇芻蕘既屬對敭敢陳庸瞽誠願察洗幘布衣之士任以台衡擢委金讓玉之夫居其令守則俗忘貪鄙吏潔氷霜矣旌好學之流賞力田之伍則家罕貧惰位列文儒矣降通親之使喻彼梟心發和戎之官收其鷄肋則四夷左袵顛倒來王三一作二邊元惡謳謡仰化矣自然籠羲駕昊六五帝而四三皇逺肅邇安飛英聲而騰茂實謹對此篇問答又載四百九十六卷今削去注異同為一作第二道後篇題作求賢問朕聞運海摶扶必藉垂天之羽乘流擊汰必佇飛雲一作端之檝是知席蘿黄屋握一作緬鏡紫微誠一作咸資獻替之功必待弼諧之助所以軒轅撫運遂感大風之祥伊帝乗時遽致秋雲之兆朕雖慙古烈而情切上皇未校滋泉之占猶虚傅野之夢欲使歲星入仕風伯來朝河薦蕭張之名山降甫申之佐垂衣佇化端拱仰成多士溢於周朝得人過於漢日行何政道可以至斯一作不知何道可致英才思聞進善之言以副求賢之㫖對對臣聞立極膺乾之君當宁御坤之主欲臻至道將隆一作扶景化莫不旁求俊彦廣命英竒凝庶績以安人綏萬邦一作方而撫俗是故軒丘膺籙委四監以埀衣丹陵握圖舉八元而光宅於是齊桓擬之於飛翼殷武興之以羮梅一作調羮克賛人謀寔宣神化陛下功包邃一作遽古道逸上皇授受惟明謀謨克序弼輔之任總風力一作后於前驅燮理之司列伊周一作尹於後乘振鷺翔鸞之客畢凑天階乘箕降昴之英咸趨日路猶且慮心卜兆託想旁求冀山谷之無遺庶賢良之畢萃俯訪愚魯一作叟敢述明敭誠願發徳音下明詔咨列嶽訪羣公舉爾所知不遺於側陋知人不易無輕於慎擇下僚必録上賞頻霑則葉縣遊龍自九天而下降燕郊駿馬赴千金而遥集漢未為得周豈能多盡善盡美於斯為盛謹對此篇問答又載五百二十巻今削去注異同為一作第三道後篇題作祥瑞問朕聞明王闡化感人靈之心聖后宣風移動植之性遂使翔龍薦檢鳴鳳司晨獸解觸邪草能指佞仰一作永惟前烈何徳而臻此乎朕逖聽遂初載欽神化每欲反斯焭薄景彼上皇欲使瑞蓮司庖僊蓂候月逰四靈於翠苑集五老於榮河致此休徵良由政感佇聞啓沃以副虚襟對對臣聞化浹乾樞景緯呈其靈貺澤周坤絡卉木效其禎祥是以若霧非煙必應文明之后九莖三秀允符光宅之君陛下應期納籙撫運登皇孝道格於𤣥穹仁心光於紫極自臨萬域輯御羣方靈瑞屢臻休徵荐至五蹄仁獸樂君囿而來遊六象一作翼威禽拂帝梧而萃止豈直銀黄玉紫雉白烏丹一作黄金紫玉白雉丹烏飜鄗上之二桴一作雙杯㧞江間之三脊固亦巡河受檢拜洛披圖降五老於星躔歸四神於雲路盛矣美矣巍乎煥乎躪三五以騰徽吞八九而髙視尚且崇謙讓之道守冲撝之徳抑斯天瑞訪此人謀陛下雖不宰一作徒不幸其成功微臣亦不知其所謂謹對第四道後篇題作五運問朕聞三微遞一作迭代哲后所以承天五運因循明王由之革命或金水而鱗次應火木以環周或寅子變正天人之統斯辨驪騵改色昏旦之用有殊兹乃渙汗圖書昭彰厯數受位一作乗出震以迄一作邐迤于今莫不母子相承終始交際然而都君土徳飜乃尚青天乙水行寧宜用白深明要㫖其義何從若以秦氏覇基便有符於紫色則魏人鼎足豈復應一作紀於黄星緬鏡前修又以一作為矛盾張蒼之議既頗反於公孫賈𫝊之談復逺乖於劉向子大夫學包羣玉文擅鏘金既聽南史之篇方佇東堂之問詳敷事實靡得浮詞商𣙜前儒誰一作却為折𠂻對對臣聞方圓既闢帝王斯建四遊將六氣交馳五徳與三微遞變自攝提著紀出震登皇循木火而相承用驪騵而繼作雖復武功文徳揖讓干戈御旒扆以髙居握圖籙而深視莫不埀天人之統順寅子一作丑之正始終之際何莫由斯暨乎運偶都君時云土徳道鍾天乙數叶水行子勝母而尚青母生金而尚一作亦白略言其美斯窮奥㫖至若秦居閏位紫實非正之符魏得中區黄標應星之紀未有一作為矛盾允愜随時漢祖承天人多異議張蒼言水而黑畤方興公孫據土而黄龍復應代疑作逮二劉之父子推五運之相沿代二至相沿十二字一作賈傅之言雖逺劉向之論可推也較彼前談斯為折衷臣學非博古識昧知新輕陳管穴之窺猥奉天人之問慚惶靡地一作既悚越兼深謹對右第三第四道問答並又載五百卷今削去注異同為一作第五道後篇題作歴代帝王為理問朕以紫極暇景青史散懷𦕈尋開闢之源遐覽帝王之道或載記遥邈無其處而有其名或墳籍䘮亡有其號而無其事將求故實一作必以佇多聞至如化被柱州遁甲開山圖天皇在柱州崑崙山下創基刑馬一作熊耳按開山圖地皇興於熊耳山又榮氏曰人皇生於刑馬山今對策曰地皇故兩存之兩代之事誰逺五徳之運何承石樓之都開山圖有巢氏治石樓南山見匪均霜之地窮桑之壤帝王世紀少昊邑於窮桑元非測景之區時將城彼偏方惟一隅而獨王輕兹中土棄九洛而不營大夏之時化臻禁甲隆周之日道致韜戈而七十一征翻在鳳凰之運五十二戰更屬雲官之期斯則偃伯之人無聞於太古推鋒之弊反息於中葉澆淳之道名實何乖欲令歴選前聖逺稽上徳採文質之令猷求損益之折衷何君可以為師範何代可以取規繩遲爾昌言以沃虚想對對臣聞一剖為三始鴻濛於太易九變於七漸茫昧於無為既分清濁之儀乃列君臣之位則有天皇首出瞰柱州而宅土地皇革命俯刑馬一作符熊耳以開都年匪異於萬八千號稍殊於七十二既云木徳亦曰火行開於天地之初録自帝皇之紀至若石樓逺界窮桑延壤非萬邦之土中為二代之天邑斯乃時猶􅙿一作各非飲道上鶉居誰知風雨之均能建皇王之宅亦分長於九域豈獨王於偏方乃觀象垂衣化穆羲軒之代剪商伐扈人澆周夏之年而皇徳方隆未弭戰争之患王道纔著復存韜偃之日一作目是則一作即懷柔伐叛取亂侮亡雖鍾大道之行終佇勝殘之戰是故劣於太古非事優於中代陛下選芳列辟埀範千年王化既平能事斯畢亦何必損益今辰之政師謨往聖之規撫和琴而促柱御夷途而止轍因循勿失臣謂其宜謹對此篇問答又載四百九十四卷今削去注異同為一作文苑英華巻四百八十二
