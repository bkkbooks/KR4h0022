body:
  text: 文苑英華卷六十七宋李昉等編治道一懸法象魏賦一首八使出巡賦一首振木鐸賦三首鄉老獻賢能書賦三首政不忍欺賦一首懸法象魏賦以正月之吉懸法象為韻蘇珦建皇極者存乎正名體元命者存乎作程彼宗周之創業遂體制而緣情職命六官必先庚而著令厯分三統因建子而為正當是時也𤣥律司候黃鍾紀月伊歲序之允初懿陽和之始發於是懸邦國之六典致象魏之兩闕俾萬人觀而取象罔敢逾越者也大矣哉示人有則布政惟時既當途而明矣亦浹日而斂之是則是效念兹在兹乃人君之大象諒王國之元龜是知象魏之章煥為故實分章授事典司非一或以理象為理人之規或以教象為教人之術觀之者仰而可見從之者貞而且吉俯黃道而高懸與蒼龍而逈出法之不朽雖草創於前王體有可傳亦恢張於是日國家以務人為本以施命為先拱北極之六星庶官咸備張南端之雙闕舊典常懸是知大聖君臨名臣不乏欽承帝道足以為法以之安人其國斯廣敢引此以為喻亦因兹而取象懸法魏闕其教可以普施懸法禮闈其人可以外奬夫然則青雲可期於影響八使出巡賦以彰善貶惡黜陟幽明為韻張友正明明漢皇文物昭彰順帝以化俾人從康將欲敷聖政舉皇綱乃分國之八使而宣命於四方八使伊何朝中之善將假其權尤難其選稱直指而獨立歌皇華而分遣繡衣既盛於新儀四牡載光於古典當官而行受命無忝善微毫而必舉惡纎芥而必貶舉善兮必尋其清流之源貶惡兮必去其阿諛之諂或負宫闕之厚拔不顧城社之微托無懼薰燒不驚矰繳肆豺狼之毒懷梟鏡之惡徑持斧而前進歘下鞲而直搏誓將去大族而拔盤根安問狐狸之與鳥雀其有鋭心公器戮力王室知賢才而能進察奸佞而能黜必將上聞於天子寧俟於終日道之不愆人亦焉廋操利劍而剸其固懸明鏡而燭其幽使乎使乎萬方觀德天下之治也賢者當其權天下之亂也不肖居其職求訛僞之訟採妖艷之色方直者于以退藏阿諛者由是登陟若謂之治也歟適足以亂其國我國家統紀有經超古作程采虞典之考績法漢家之分行舉八元而普天輯睦按十道而攬轡澄清太階既平君聖臣明豈待久於其道而後天下化成振木鐸賦以孟春之月遒人狥路為韻王起國家敷文教布時令爰振鐸於九衢將採詩於萬姓上立其典將興詠之必聞下聼其音知從諫而則聖事且彰於歲首禮無虧於春孟所以下訓是崇周官克敬亦既戒止居然可珍赫赫奕奕爛爛燐燐以金為鈴且嘗巧於懿匠剡木為舌將托音於下人及夫拂拭光生提擕彩發順一人之施令採四海之針闕鐬鐬於遐邇之路杳若和鑾煌煌於前後之車爛如明月于以闡幽于以冥搜知政教之兹始表申嚴之所由動素手而知音愈出注清耳而其義可求色耀皇衢映遲遲而日麗聲搖紫陌隨獵獵而風遒昭彰有儀掌握成韻因木德之將盛懷金聲而載振或聆之而胥悅或仰之而旅進豈比夫鼓有節而斯通雷發聲而先狥可以展六義可以成四詩在道途而無壅致朝廷之允釐驚百衆以泠泠昭其聲也沃九重於翼翼失則革之鐸之為義也深鐸之為用也固虛其中而不屈圓其外而合度可以揚天之聲可以遵王之路令出不返知遒人之是司道之將行幸夫子之可喻故其鎔鑄式珍錯磨永新舊典斯考英聲克振既有符於𤣥化斯永保夫青春第二以振文教而納規諌為韻白行簡國家古典修時令順命遒人之職執木鐸以狥本其教在每歲之發生聼其音知羣物之始振於是官師傾聼道路咸聞採謳謡於多士延諷刺於大君外振金聲將發號而施令中含木德貴偃武而修文所以應之如響從之如雲道達天和契宫商而成韻揄揚帝命獻詩頌而為羣懿夫一器維則萬人是效警于有位佇從善而如流愼乃攸司固匪怒而伊教百官奉職而奔走萬族尋聲而騰趠觀乎四㑹五達舉而搖之溥天率土孰云逺而期赫赫於永代每鏘鏘於此時響不聞空能同誹謗之木聼猶在耳將陳誦諫之詩莫不獻其詞而諤諤帥其屬而師師靡其荒怠曷不肅祗士傳言而戾止工執藝而疇咨足以播祥風於地末闡皇明於天垂故夫聖之欣合詢芻蕘而聼納動而悅隨謀卿士之針規乃知我武不施司馬之執奚為斯文未喪封人之喻攸宜徒云擊石拊石曷若恩斯勤斯與德音而共暢載仁聲而逺馳則六變通神九成感物不足擅義而標奇也故我后振鐸以聳善喜人之敢諫俾夫下不瀆上不慢由和鈴之昭其聲致朝野之清晏第三以發號施令王猷所先為韻羅立言上方繼統大寶發號初年俾木鐸是狥彰皇恩而宣清韻乍分庶道乎無逺不浹長聲始振將表乎有開必先蓋欲由舊章布新令使有聞而必戒如審樂以知政德音爰降義符招諫之君大典允敷道契多能之聖洪纎手運斷續風移始條貫以遐逺終激揚而廣施發千門以瀏亮警三條而逶迤將警乎羣心斯乃有倫有要言提乎衆耳孰可不識不知且夫洞然諧音鏘爾立號豈比官師之職無勞有司之告則知君立教非鐸而不宣金有聲非木而奚道所以酌彛古典稽法前王範乎金蓋取乎剛德示利振以木期在乎直言有章罔匪舌而是出信有聲而必揚鄙伐鼓之坎坎小和鈴之央央節奏中規周旋有序合椌楬諧律吕侈弇之制自異陶匏之音不舉動而逾出擊且殊於匏竽虛以和鳴懸匪勞於簨􅒶帶未央晨漏時與俱來混南山殷雷乍迷其所于以明盛禮于以揚王猷日聞四方聼思聰而廣被教覃萬國澤咸霈而周流或乃妙響清越綿綿將歇敢煩手於再振冀駭耳於一發客有觀光以成文願刋象魏之闕鄉老獻賢能書賦以行誼昭洽可升王庭為韻封殷至哉求士之方稽彼側陋書乎善良備採擇於鄉老爰升薦於天王乃曰行之實藝之長可謂舉不踰等信乎幽而有芳用之則行豈遐方之繫滯時不可失逢昭代之明揚於是申衆寡稱旗章播唐風而靡闕同周制而有常操簡兢兢願獻巖廊之器率徒濟濟咸從禮義之鄉佐理之源匡時之盛可以榮鄉黨可以輔國政豈徒稱藝能褒德行而已亦以示尊寵尚賢能再拜之儀設五物之禮興俾地官而是載命天府而爰登膺選以行豈黃冠而是阻策名之後見青雲而可升所謂納芻蕘拔淹滯或端莊而果行或踴躍而負藝聞善必舉誠哉不過其辭惟賢是求豈曰後難為繼是以臻彼道德致乎雲霄多士如流可閲一編之上羣才是選寧辭萬里之遙矧物類之咸若在皇明之孔昭考鄉閭之中既已為善顧周行之內無愧嘉招原夫進以守法明乎化洽庶所以觀士無取乎徹甲方今搜賢鄉黨致理國經具名氏於尺牘先貢獻於彤庭隨籍而來先容必假於垂白進善以致克已自期乎拾青士有其心徒堅其誠未果道寧忘於光大藝必慙乎微瑣沈潛下國隨鄉書而計偕希望榮名在王庭之試可第二同前韻張嗣初皇上尊教本旌藝能徵鄉舉里選之人則哲俾含光抱素之用必稱故講信修睦之􅑫坦然𢎞大謙光素履之士赫爾昭升時乃正月初吉鄉老旁戾奉簡牘之詞詣闕傾葵藿之心獻歲且曰君不可以獨理必敷求以兼濟賢不可以失時故修已而獻藝惟古訓之是式叶周官之舊制自家刑國率是道而克明選賢與能誠致逺之不泥逖覽虞舜稽古唐堯明揚側陋惠訪庶僚由是金鏡朗玉燭調禮崇儉約樂奏咸韶致王道之易易啓賢路之昭昭豈不以道不逺人𢎞之在我察言行之枝葉執禮義為韁鎖惟仁是與諒俾善以交修在邦必聞非據德而孰可斯實義光前古道冠百王德政者介爾以昭進學植者暗然而日彰賤不遐遺邦教以順乎九有下無沈抑聖謨猶洎於萬方矧乎職有司存令申先甲既自上而下下誠德優而化洽是以敦育德理疑作禮窮經激浮惰以食力耨甫田於拾青片善罔遺君子何辭於在野芻言式衆多士必見其盈庭吾君於是納逺謀守至正欽若前典申鍚時命曰酌爾之令德竭爾之文行俾敷奏沃余一人而聲教一作政加乎萬姓是用尊賢以崇德致君而齊聖丕休哉揭捍一作激捍之道洵君人之大柄第二同前韻滕遇審其賢必鄉之耆德納其獻惟國之哲王爰進牘以舉善希命官之必良修身既浹於閭里纍行宜應乎搜揚垂鶴頭之書來自衡門之下俯鮐背而獻發乎丹闕之旁書曰能藴於藝文賢彰其德行文可以贊謀猷光教命德可以鎮邦慝備匡諍今則潜獲其人可施於政咸能藏器以自持秉心而無競處乎野興在軸之歌遇其時仰干旄之詠矧臣察之而甚熟交之而益敬逼桑榆暮景敢罔於天聰當杞梓良材將禆於國慶若夫博通之藝可稱虧汚之德難升臣不敢書其德而妄舉賢能若乃閨門之風雖浹鄉黨之言未洽臣不敢請於王而逺離荷鍤凡所稱無黨所覆有經録其功能策勳於盟府采其藝能掞藻於天庭豈以臣之職所言莫可昔明王問政於耆耋聖后取人於農瑣帝乃啓書而相視賢不佻聼讜言而其容穆穆納嘉猷而厥德昭昭由是道冠百王風馳四裔使居鄉者契一作潔其已在家者修其義以黃髮薦士之書為式欲庶官推賢之路無蔽彼周詢鄉老漢延羣儒未足量功而並利叶韻力計切政不忍欺賦以愛飬人為本為韻蔣防政之至也物全其真德之至也信洽於人不矜不能彼則先之於戒令無偏無黨我則獨寄於真淳諒保政以自睦乃去邪而存仁不然曷以姦歸曲直從伸風俗優遊而嚮化草木條暢而和春者哉觀夫穆穆時和溫溫德廣漸之以忠信紀之以刑賞奉聖日之貞明助南風之長飬於以任人而任德豈唯舉直而錯枉戴星從事我且大務其劬勞鳴琴在堂我又不違其偃仰是知循名法者非鴻醇之盛代施慘烈者翥疑冬日之可愛苟和順以積中故信誠而發內人知我所奚憂險易之爭政致平康誰假韋弦之佩事無事為無為清淨而時惟昭泰簡易而人不驅馳物無欺兮彛倫式序政有經兮百度咸宜布和為風而偃草降德為澤而濡枝匪寬猛以取濟匪恩威而自施一德旁流齊是非於衆庶三無合則混情性於髙卑豈不以酌元和叶誠悃遷善者斯焉而取斯懷慝者損之而又損君子謂是政也為邦家之大本文苑英華卷六十七
