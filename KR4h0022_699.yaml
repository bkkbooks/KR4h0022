body:
  text: 文苑英華卷七百宋李昉等編文集二駙馬喬君集序一首南陽公集序一首陳氏集序一首上官昭容集序一首駙馬都尉喬君集序盧照鄰昔文王既沒道不在於兹乎尼父充生禮盡歸於是矣其後荀卿孟子服儒者之褒衣屈平宋玊弄詞人之柔翰禮樂之道已顛墜於斯文雅頌之風猶綿聨於季葉痛乎王澤既竭諸侯為麋鹿之場帝圖伊梗天下作豺狼之國秦人一滅舊章大愚黔首群書赴火化崑嶽之髙煙儒士投坑變蓬萊之巨壑樂沈於海河間王初眷眷於古篇禮適諸夷齊叔孫區區於綿蕝安國討論科斗五典叶從史遷祖述獲麟八書爰創衣冠禮樂重聞三代之風玉帛謳歌無墜六經之業鬱其興詠大雅於是為群自此迄今年逾千祀聖門論賦相如為入室之雄闕里裁詩公幹即升堂之客陸平原龍驚學海浮天泉以安流鮑參軍鶴翥文場代黃金之平埒臨曲臺之上路面通衢之小苑蓮紅水碧堪釣叟之淹留桂白山青宜王孫之攀折香車貴士不掩龍關縫掖書生時通驛騎坐蘭徑敞松扉北牖動而清風來南軒幽而白雲起欣然命駕弔曲江之隑淵興盡而歸聆伊川之笙吹三朝慶謁趨劍履於南宫五日歸休聞歌鐘於北里雍容車騎屢動雕章嘯傲煙霞仍涵寶思奢不敗德笑金谷之羅紈儉不邀名悲蘭陵之芻布榮期三樂君實四之平子四愁我無一矣君教訓子弟不讀非聖之書撫愛家僮常恐名奴之辱婚嫁巳畢欲就金丹輪蓋非榮猶思道樹明霞曉挹終登不死之庭甘露秋團儻踐無生之岸凡所著述多以適意為宗雅愛清靈疑作虛不以繁詞為貴足以傳諸好事貽厥孫謀故撰而存之凡為若干卷云爾南陽公集序昔者龍蹲東魯陳禮樂而救蒼生虎據西秦焚詩書以愚黔首通其變參天二地謂之神合其機一隂一陽謂之聖是以楚漢方鬭蕭曹絳灌負長劍於此時袁曹已平徐陳應劉弄柔翰於當代聖人方士之行亦各異時而並宜謳歌玊帛之書何必同條而共貫文質再而復殷周之損益足徴驪翰三而始疑作改虞夏之興亡可及美哉煥乎斯文之功大矣自獲麟絶筆一千三四百年遊夏之門時有荀卿孟子屈宋之後直至賈誼相如兩班叙事得丘明之風骨二陸裁詩含公幹之竒偉鄴中新體共許音韻文成江左諸人咸好瓌姿艷發精傅爽麗顔延之急病於江鮑之間踈散風流謝宣城緩步於向劉之上北方重濁獨盧黃門往往髙飛南國輕清惟庾中丞時時不墜嗟乎古今之士遞相毀譽至有操我戈矛啓其墨守三都既麗徴夏熟於上林九辨已髙責舂歌於下里蹐駮之論紛然遂多近日劉協文心鍾嶸詩評異議蜂起髙談不息人慙西氏空論拾翠之容質謝南金徒辨荆蓬之妙拔十得五雖曰肩隨聞一知二猶為臆說俞曰未可人稱屢中化魯成魚曷云其逺非夫妙諧鐘律體㑹風騷筆有餘妍思無停趣作龜作鏡聽歌曲而知亡為龍為光觀禮容而識大齊魯一變之道唐虞百代之文懸日月於胸懷挫風雲於毫翰含今古之制扣宫徴之聲細則出入無間粗則彌綸區宇逶迤綽約如玊女之千嬌突兀崢嶸似靈龜之孤朴乘槎上漢誰問坳塘莊子作唐之淺深荷㦸入秦寧議長安之逺近是非未定曹子建皓首為期離合俱傷陸平叔終身流恨超然若此適可操刀自兹已降徒勞舉斧八病爰超沈隱侯永作拘囚四聲未分梁武帝長為聾俗後生莫曉更恨文律煩苛知音者稀常恐詞林交喪雅頌不作則後死者焉得而聞乎貞觀年中太宗外厭兵革垂衣裳於萬國舞千戚於兩階留思政塗內興文事虞李岑許之儔以文章進王魏來禇之輩以材術顯咸能起自布衣蔚為卿相雍容侍從朝夕獻納我之得人於斯為盛虞博通萬句對問不休李長於五言下筆無滯岑君論詰亹亹聽者忘疲許生章奏翩翩談之未易王侍中政事精密明達舊章魏太師直氣鯁辭兼包古義禇河南風標特峻早鏘聲於冊府變風變雅立體不拘於一塗既博既精為學遍遊於百氏自豸冠指佞雞樹登賢內掌機密外修國史晨趨有暇持綵筆於瑤軒夕拜多閒弄雕章於琴席含毫顧盼漢家之城闕風烟逸韻縱橫秦地之林泉魚鳥黃山羽獵幾奏瓊篇汾水樓船參聞寶思南津弔屈去逐蒼梧之雲西路悲昻來挽葱巖之雪江湖廊廟造次不忒其儀沙塞朝廷顛沛必歸於漢是使名流俱至親翰闐門愛客相尋雞談滿席嚶嚶好鳥花欲白兮栁將飛潎潎逰魚蓮欲紅兮蘋可望緑樽恆湛齊閣臨霞綺札逾新園亭坐月凡所著述一千有餘篇今之刋寫成三十卷餘早逰西鎬及周史之闕文晚卧東山憶漢庭之遺事平津侯之賔館馬廄蕭條李司𨽻之仙舟龍門荒毀交交黃鳥集於栩兮集於桑營營蒼蠅止於樊兮止於棘九原可作松有隧兮兔有埏三湘不追川無梁兮鳥無徑輟斤之慟何獨莊周聞笛而悲寧惟向秀徒勤觀海未知渤潏之倪永好談天莫究氤氳之數遂抽短翰為之序云陳氏集序盧藏用昔孔宣父以天縱之才自衛返魯乃刪書詩書文粹作定禮述易道而修陳集作作春秋數千百年文章燦然可觀者文粹無者字也孔子殁二百嵗而騷人作於是婉麗浮侈之法行焉漢興二百年賈誼馬遷為之傑憲章禮樂有老成人文粹無人字之風長卿子雲之儔瑰詭萬變亦竒特之士也惜其王公大人之言溺其陳集文粹並作於流雜而不顯其後班張崔蔡曹劉潘陸隨波而作雖大雅不足然其遺風餘烈尚有典刑宋齊已來文粹作末字蓋憔悴矣逶迤陵頺流靡忘返至於徐庾天之將喪斯文也後進之士若上官儀者繼踵而生於是風雅之道掃地盡矣易曰物不可以終否故受之以泰道喪百嵗而得陳君君名陳集作諱子昻字伯玊蜀人也崛起江漢虛視函夏卓立千古橫制頺波天下翕然質文一變非夫岷峨之精巫廬之靈則何以生此故有文粹作其諫爭之辭則為政之先也昭夷之碣則議論之當也國殤之文則大雅之怨也徐君之議則刑禮之中也至於感激頓挫微顯闡幽庶幾見變化之朕以接乎天人之際者則感遇之篇存焉觀其逸足駸駸方將摶扶搖而陵太清躐遺風而薄嵩岱吾見其進未見其止惜乎湮厄當世道不偶時委骨巴山年志俱夭故其文未極嗚呼聰明精粹而淪剝貪叨桀驁以顯榮天乎天乎吾始未知夫天焉昔嘗與余有忘形之契四海之內一人而已良友殁矣天其喪豫今採其遺文可存者編而次之凡十卷恨不逢作者不得列於詩人之什悲夫故粗論文陳集有文字變而為之序至於王霸之才卓犖之行則存之别傳以繼於終篇云耳上官昭容集序張說臣聞七聲無主律吕綜其和五彩無章黼黻交其麗是知氣有噎鬱非巧辭莫之通形有萬變非工文莫之寫先王以是繼天地究人神聞寂寞覽文粹作鑒幽昧文之辭義大矣哉上官昭容者故中庸侍郎儀之孫也明淑挺生才華絶代敏識聰聽探微鏡理開卷海納宛若前聞搖筆雲飛咸同宿構初沛國夫人之方娠也夢巨人俾集作升之大稱曰以是稱量天下既而昭容生彌月夫人弄之曰稱量天下豈在子乎孩遂啞啞應之曰是生而能言蓋為靈也越在襁褓入於掖庭天實啓之故毀家而資國運將興也故成德而受任自則天久視之後中宗景龍之際十數年間六合清謐內峻圖書之府外闢修文之館搜英獵俊野無遺才右職以精學為先大臣以無文為恥每豫遊宫觀行幸河山白雲起而帝歌翠華飛而臣賦雅頌之盛與三代同風豈惟聖后之好文亦云奧主之協讃者也古者有女史記功書過復有女尚書决事宫閣昭容兩朝專美一日萬機顧問不遺應接如響雖漢稱班媛晉譽左嬪文章之道不殊輔佐之功則異跡祕九天之上身沒重泉之下嘉猷令範代罕得聞庶幾後學嗚呼何仰然則大君據四海之圖懸百靈之命喜則九圍挾纊怒則千里流血靜則黔黎乂安動則蒼氓罷弊入耳之語諒其難乎貴而勢大者疑賤而禮絶者隔近而言輕者忽逺而章忠者忤惟窈窕柔慢文粹作曼誘掖善心忘味九德之衢傾情六藝之圃故登崑巡海之意寢剪胡刈越之威息璿臺珍服之態消從禽嗜樂之端廢獨使溫柔之教漸於生人風雅之聲流於來葉非夫𤣥黃育粹貞明助思衆妙挨識群靈挾志誕異人之寶授興王之瑞集作端其孰能臻斯懿乎鎮國太平公主道髙帝妹才重天人昔嘗共遊東壁同宴北渚倐來忽往物在人亡憫雕琯之殘言悲素扇之空曲上聞天子求椒掖之故事有命史臣叙蘭臺之新集凡若干卷列之如左文苑英華卷七百
