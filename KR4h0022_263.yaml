body:
  text: 文苑英華卷二百六十三宋李昉等編寄贈十七李商隠二首薛逢三首姚鵠十四首項斯三首趙嘏二十八首馬戴十一首及第東歸次㶚上却寄同年李商隠芳桂當年各一枝行期未分壓春期江魚朔鴈長相憶秦樹嵩雲自不知杏苑經過勞想像東門追集作送餞又差池㶚陵柳色無離恨莫枉長條贈所思飲席代官妓贈兩從事前人新人橋上着春衫舊主江邉側帽簷願得化為紅綬帶許教䨇鳳一時銜伏聞令公疾愈對見延英因有賀詩逺封投獻薛逢吉語云云海外傳令公疾愈起朝天皇風再扇寰區内人鏡重開日月邉光啟四門通夀域深疏萬頃溉情田陪臣自訝迷津久願識方舟濟巨川題劍門先寄上西蜀司徒杜前人峭壁横空限一隅劃開元氣建洪樞梯航百貨通邦計鍵閉諸蠻屏帝都西蹙犬戎威北狄南吞荆郢制東呉千年管鑰誰鎔範只自先天造化爐北亭醉後叙舊贈東川陳書記前人二十年前事盡空半隨波勢半隨風謀身喜斷韓雞尾辱命羞携楚鶴籠符竹謬分錦水外妻孥猶隔散闗東臨岐莫恠朱紘絶曽是君家入爨桐塞外寄張侍御姚鵠千里入黄雲覉愁日日新疎鐘闗路曉逺雨塞山春南眺有歸鴈北來無故人却思陪宴處廻望與天隣寄贈許璋集作瑺少府前人若說君髙道何人更得如公庭唯樹石生計是琴書詩句峭無敵文才清有餘不知尺水内争滯北溟魚寄雍陶先輩前人知音杳何處書札寄無由獨宿月中寺相思天半集作畔樓露凝衰草白螢度逺煙秋悵望難歸枕吟勞生夜愁寄友人前人西風又開菊久客意如何舊國天涯逺清砧月夜多明時難際㑹急景易蹉跎抱玉終湏獻誰言念薜蘿書情獻知已前人日日恨何窮巴雲舊隠集作望空一為棲寓客三見北歸鴻有道期攀桂無門息轉蓬賃居将磬比乞食與僧同花月登臨處江山悵望中衆皆輕病驥誰肯救焦桐坐惜春還至愁吟夜每終谷寒思變律葉晩怯回風謁蔡慙王粲憐衡兾孔融深恩如尚在何處問窮通感懐陳情前人恩重空感激何門誓殺身謬曽分玉石竟自困風塵隂谷非因煖幽叢豈望春升沉在言下應念異他人旱魚詞上苗相公前人似龍鱗已足唯是欠登門日裏腮猶濕泥中目未昏乞鋤防螘穴望水㵼金盆他日能為雨公田報此恩將歸蜀留獻恩地僕射二首前人自持衡鏡採幽沉此事嘗聞曠古今危葉只將集作應終委地焦桐誰料却為琴蒿萊集作蓬詎報生成徳犬馬空懷感戀心明日還家盈眼血定應回首即沾襟二江上長思狎釣翁此心難與昨心同自承邱嶽新恩重已分煙霞舊隠空龍變偶因資巨浪鵬飛誰肯借髙風應憐死節無門効氷炭潛憐集作永歎潜懐逐轉蓬襄州獻尚書前人立事成功盡逺圖一方獨與萬方殊藩臣昔競師兵畧相國今多揖廟謨禮樂政行凋敝俗歌謡聲徹帝王都即隨鳳詔歸何處祗是操持造化爐隨州獻李侍御二首前人彩筆曾專造化權道尊飜向宦途閑端居有地惟栽藥静坐無時不憶山徳望舊懸霄漢外政聲新溢路岐間衆知聖主搜賢相朝夕欲待黄覇還二再刖未甘何處說但垂䨇淚出咸秦風塵匹馬來千里蓬梗全家望一身舊隠每懐空竟夕愁眉不展㡬經春今朝儻降非常顧倒屣寧惟有古人虢州獻楊侍御二首前人盖世英華更有誰賦成傳冩徧坤維名科累中求賢日苦節髙標守郡時樓上呌雲秋鼓角林間宿鶴夜旌旗徵歸詔下應非久徳望人情在鳳池二碧山曽共惜分隂暗學相如賦上林到此敢踰千里恨歸家且遂十年心疎愚只却膺門險淺薄争窺孔室深一顧儻憐持苦節更令何處問升沉贈金州姚合郎中項斯為郎名更重領郡是蹉跎官筆題詩盡衙庭㸔鶴多城池連竹塹籬落帶椒坡未學旌旛闕閒遊觸處過寄江南親故前人古巷槐花合愁多晝掩扉猶存過江馬強拂看花衣送客身先醉尋僧晩未歸龍鍾易惆悵莫遣寄書稀獻令狐相公時相公郊壇行事廻前人鶚在卿雲氷在壺代天才業本訏謨榮同伊陟傳朱户秀比王商入畫圖昨夜星辰回劍履前年風月滿江湖不知機務時多暇還許詩家屬和無贈越客趙嘏故國波濤隔明時心久留獻書䨇闕晩看月五陵秋南棹何當返長江憶共逰定知釣魚伴相望在汀洲贈李祕書前人束帶臨一作隨風氣調新孔門才業獨誰倫杉松韻冷一作静雪溪暗鸞鶴勢髙天路春美玉韞來休問價芳枝攀去正無塵莫将芸閣經科第湏作人間一作詞塲第一人寄歸前人三年踏盡化衣塵只在又𤣥集作見長安不見春馬過雪街天未曙鄉迷闗路淚空頻桃花塢接啼猿樹野竹庭通畫鷁津早晩粗酬身事了水邉歸去一閒人一作雲樹廻於道中寄舒州李與相公前人都無鄙吝隔塵埃昨日丘門避席來静語乍臨清廟瑟披風如在九層臺㡬煩命妓浮溪棹再一作每許論詩注酒杯從此㣲誠知感戀七真臺上集作壇畔望三台舒州獻李相公前人野人留得五湖船丞相興歌郡國年醉筆倚風飄澗雪静襟披月坐樓天鶴歸華表山河在氣返青雲雨露全聞說萬方思舊徳一時傾望重陶甄獻淮南李相公前人傅巖髙静見台星廟畧當時討不庭萬里有雲歸碧落百川無浪到滄溟軍中老将傳兵術江上諸侯受政經聞道國人思再入鎔金新鑄鶴儀形成名年獻座主僕射兼呈同年前人拂煙披月羽毛新千里初辭九陌塵曽失𤣥珠求罔象不将䨇耳負伶倫賈嵩詞賦相如手楊乗歌篇李白身除却今年仙侣外堂堂又見兩三春歳暮江軒寄盧端公前人積水生髙浪長風自此時萬艘俱擁棹上客獨吟詩路以重湖阻心将小謝期渚雲愁正斷江鴈重驚悲笑憶逰星子歌尋罷貴池夢來孤島在醉醒百憂隨戍迥煙生晩江寒鳥過遲問山樵者對經雨釣船移敢嘆今留滯猶勝曩别離醉從陶令得善必大人知道蹇才何取恩深劍不疑此身同岸柳只待變寒枝抒懐上歙州盧中丞宣州杜侍御前人東來珠履與旌旗前者登朝亦一時竹馬迎呼逢稚子柏臺長告見男兒花飄舞袖樓相倚角送歸軒客盡隨獨有賤夫懷感激十年兩地負恩知山陽韋中丞罷郡因獻前人笙歌只是舊笙歌腸斷風流奈别何照物二年春色在感恩千室淚痕多盡将魂夢隨西去猶望旌旗暫一過今日罇前無限思萬重雲月隔煙波山陽即席獻裴中丞前人早年天上見清塵今日樓中醉一春暫肯剖符臨水石㡬曽焚筆動星辰瓊臺雪映迢迢鶴蓬島波横浩浩津好是仙家羽衣使欲敎垂涕問何人西峯即事獻沈大夫前人松竹閒逰道路身衣襟落盡往來塵山連謝宅餘霞在水映一作應琴雞疑作溪舊浪春拂榻從容今有地酬恩寂寞久無人安知不及屠沽者曽對青萍淚滿巾杜陵貽杜牧侍御前人紫陌塵多不可尋南溪酒熟一披襟山髙晝枕石床隠泉落夜牕煙樹深白首尋人嗟問計青雲無路覔知音唯君懐抱安如水他日門墻許醉吟下第後上李中丞前人落第逢人慟哭初平生志業欲何如鬢毛洒盡一枝桂淚血滴來千里書谷外風髙摧羽翮江邉春在憶樵漁唯應感激知恩地不待功成死有餘淛東贈李副使員外前人妙盡戎機佐上台少年清苦自霜臺馬嘶深竹閒宜貴花拂朱衣美稱才早入半縁分務重晩吟多是看山廻名髙漸少飜飛伴㡬度煙霄獨去來寄淮南幕中劉員外前人郎官何遜最風流愛月憐山不下樓三佐戎旃換朱紱一辭蘭省見清秋桂生巖石本瀟洒鶴到煙空更自由休向西齋久閑卧滿朝傾盖是依劉宛陵寓居上沈大夫二首前人滿耳謌謡滿眼山宛隣城郭翠㣲間人情已覺春長在溪户仍将水共閒曉色入樓紅藹藹夜深尋砌碧潺潺幽雲髙鳥俱無事晩伴西峰醉客還二溪樹參差緑可攀謝家雲水滿東山能忘天上他年貴來結林中一日閒醉叩玉盤歌裊裊煖鳴幽澗鳥闗闗觥籌不盡湏歸去路在春風縹緲間淮信賀滕邁台州前人凋瘵民思太古風上賢綏輯副宸衷舟移清鏡禹祠北路轉翠屛天姥東旌旆影前横竹馬詠歌聲裏樂樵童遥知到郡滄波晏三島離離一望中獻秘書元少監前篇作三像酬元秘監見二百三十八卷前人薛廷範從事自宣城至因贈前人少年從事霍嫖姚來自楓林度栁橋金管别筵樓灼灼玉溪回首馬蕭蕭清風氣調真君輩知已風流滿聖朝獨有故人愁欲死晩簷疎雨動空瓢寄潯陽趙校書前人簾下秋江夜影空倚樓人在月明中不将行止問朝列唯脫衣裳與釣翁㡬處别巢悲去燕十年回首送歸鴻那應更結廬山社見說心閑勝逺公贈李從貴前人白馬嘶風何處還鞭梢拂地看南山珠簾捲盡不回首春色欲䦨休閉闗花外鳥歸殘雨暮竹邉人語夕陽閒知君舊隠嵩雲下巖桂從今㡬更攀下第寄宣城幕中諸公前人一醉曽将萬事齊暫陪歡去便如泥黄花李白墓前草碧浪桓彛宅後溪九月霜中隨計吏十年江上灌春畦莫言春盡不惆悵自有閒眠到日西贈陳正字前人魯儒今日意何如名挂春官選籍初野艇㡬曽尋水去故山從此與雲疎吟憐受露花隂足行覺嘶風馬力餘聞說晩心心更静竹間依舊卧看書洞庭寄所思前人目斷蘭臺空望歸錦衾香冷夢來稀書中自報刀頭約天上三看破鏡飛孤浪謾疑紅臉笑輕雲忽似舞羅衣遥知不語坐相憶寂寞洞房寒燭㣲代人贈杜牧侍御宣州㑹中前人郎作東臺御史時妾長西望斂䨇眉一從詔下人皆羡豈料恩衰不自知髙闕如天縈曉夢華筵似水隔秋期坐來情態猶無限更向樓前舞柘枝寄逺前人禁鐘聲盡見棲禽闗塞迢迢故國心無限春愁莫相問落花流水洞房深冬日寄河中楊少尹馬戴洪河岸木衰城下渡凌澌年長從公懶天寒入府遲家山登㡬徧衛闕赴何時懐古心誰識應多謁舜祠到山寄部姚員外前人朝與城闕别暮同麋鹿歸鳥鳴松觀静人過石橋稀木葉摇山翠泉聲入澗扉敢招仙署客暫此拂朝衣寄金州姚使君員外前人老懐清净化乞去守洵陽廢井人應滿空林虎自藏迸泉疎石窺誤殘雨發椒香山缺通巴峡江流帶楚檣憂農生野思禱廟結雲装覆局松移影聽琴月墮光鳥鳴開郡印僧去置禪床罷貢金休鑿凌寒笋更長退公披鶴氅髙步隔鵷行相見朱門内麾幢拂曙霜夕發邠州寧寄舒從事前人半酣走馬别别後鎖邉城日落月未上鳥棲人獨行方馳故國戀復愴長年情入夜不能息何當開此生贈北客前人君生逰俠地感激氣何髙飲盡玉壺酒贈留金錯刀鴈闗飛霰雪鯨海落雲濤决去如征鳥離心空自勞長安寓居寄賈島前人歳暮見華髪平生志半空孤雲不我棄歸隠與誰同枉羡紫宸竭一作謁妨栽丹桂叢何如隨野鹿栖止在林中贈别江客前人湘中有岑穴君坐挂㠶過露細蒹葭廣潮廻島嶼多汀洲延夕照楓葉堕寒波應便同漁疑作隠者生涯許釣歌贈楊之梁先輩前人平生閒放久野鹿許為羣居止隣西嶽軒忩度白雲齋心飯松子話道接茅君漢主方清净休書諫獵文贈鄠縣尉李先輩二首前人同人家鄠杜相見罷官時野坐苔生石荒居菊入籬聽蟬臨水久送鶴背山遲未擬還城闕溪僧别有期二休官不到闕求静匪營他種藥唯愁晩看雲肯厭多渚邉逢鷺下林表伴僧過閑檢仙方試松花酒自和贈祠部令狐郎中前人官初執憲稱雄才省轉為郎雅望推待制松隂移玉殿分霄露氣静天臺筭碁黙向孤雲坐隨鶴閑窮片水廻忽憶十年相識日小儒新自海邉來文苑英華卷二百六十三
