body:
  text: 文苑英華卷七百八十九宋李昉等編器用刀銘三首唐北京崇福寺銅鐘銘一首太清觀鐘銘一首素木盤盂銘一首越州華嚴寺鐘銘一首興唐觀新鐘銘一首陶器銘一首洪州大雲寺銅鐘銘一首泗州開元寺鐘銘一首陸傪一作陸參之檻銘一首盤石銘一首二銘二首後二銘二首刀銘三首庾信風伯吹爐雲師煉一作鍊冶鐵𦦨朝流金精夜下價重十城名髙千馬千金穎合百鍊鋒成光連斗氣𦦨動山精身文水動刃古珠生斗精遙降山靈下從水文千曲蛇鱗百重燕砥斂刃蜀水開鋒氣生分景環成屈龍唐北京崇福寺銅鐘銘并序吳少微夫鐘者梵場之信鼓也聚萬法者莫大乎信鼓是故佛置信鼓所以窮逺究微一切賢聖恆河沙類者也所以開教設敬使天下之人善勸而淫懼也所以制鬼神之端而魔魅不得閃其人疑衍姦義剎一作殺不得載其毒也故以聽則不惑以念則受福者信鼓之謂矣洞夫樹之而不朽功一作攻之而不匱揚言曰皇后之舊業一作葉也飛龍在天載華厥號殿赩翼庭煌煌井甃不改耽耽萬構有鐘在堂窕而不漏越相公御史大夫巨鹿魏元忠仗旄鉞振金鼓發秦兵河率利伐獫狁鈎車逐而北之於是休兵十月入自禪關聞鐘聲薄而觀之曰斯一鼓鐵也曷以昭蘇羣聾光響皇梵願稅金紫之秩賈梁岷之銅張而鏞之俾兵一作碑丘哮吼埏周俶字一作叔字會東郊不開公於是再有盧龍之役天子申命執金吾南陽張公仁亶以魏公之事端尹北京保釐府戎左右梁葉纂鑄洪器庀工慮鈞塗坯堪劂壤象晞炭墜宣火房􅀈飛亷扇回祿金光轢鉛液注煎凖沸渭爛烻烘赫爇重雲焮寶界鬱攸而不可嚮者句有日矣乃撒乃相制作可觀嘗試而鏗之聲聞于天得未嘗有大而不槬敏也長而不掉正也周而無瑕忠也扣之則應信也大扣則粗厲而猛奮勇也小扣則清逾而溫韻仁也剛而為圜天也含章而貞地也非夫虛疑妙純粹幽贊而不測者孰能致於此故良冶歔欷羣真恞躍自相與建髙臺於西廂殫土木之瓌峻赫如也則俯紼以纍之攢欒以扛之千人引萬人唱大力斯拔乃登夫懸焉猛虎贔負以奮翣長絙製疑作掣曳以縻􅀈疑四緇用壯是拒是考始作也鍠鍠乎雙城井陌震來虩虩少縱也驚逺而懼邇山訛而河泄蹶狂故顔魚一字疑啜爾其亂也天地殷雷霆鬬魚脫淵羽膋雊虥駮栗栗而汗涸况貔虎與百獸夫其終也戢怒遊威春容將盡久而不絶雄雄乎無間北方之強能與疑罔不諦聽而求時夜於是旭旦之音達而人用悛惕伐虞泉而人悲衰老鼓昏定而人誤煩愛一作受霄中哉人釋其病昧爽哉人窒疑其意欲總九圍而利萬有者勉是夫初大夫之禱施也人咸曰休哉夫美而不稱君子以為誣矣若二公美莫不可歌也則其疇離之頌曰佛説撞鐘本三聲昭會百衆持六情厥有吒王愛輪疑割故我長擊以護脫因而作偈演之曰一救冥獄湯劒時二救餓厲釋縲飢三救六畜報愚癡四救修羅勇且疑凡鑠堅剛十耗一我金再鍊溢一作滋百鎰巍巍神力誰其尸大道至感曰諸佛此銘序多不可解疑有脫誤太清觀鐘銘并序蘇頲大矣哉鐘之為用軒轅氏和音樂一作聽之夏后氏陳義聽之此皇王所寶也太微君上真撫之紫虛君玄方撫之此仙聖所珍也國家誕發元系丕承景業一作耀與時偕行惟道則佑以太清觀金庭晃朗玉京崇絶七映嚴飾四時洞開戞雲璈椎雷鼓嘗有之矣然而陶鑄三品大造融於得一範圍四名大空合於吹萬其鳬氏鴻鐘歟工以思專神以響會鐘一作爐用乃息器或云一作玄聚攫蹲獸而俯一作旁捧儼旋蟲而上扶號逺則傳聲希以節廣於已日普集諸天契九仙於福堂起六幽於苦海重以珍珠為闕琉璃作地皓魄初滿清霜始飛近召香童遙徴羽使時環而載擊載考律應而不舒不疾西升路接韻閭闔之清一作秋風北斗城連含未央之夕漏非與其至妙孰臻於此乎在昔圖旗常勒彞鼎者所以建功樹善紀德昭事未有萬人斯和傾耳歸真四魔是革調心服道徹於千界揚我巨唐之聲懸於億劫齊我巨唐之算安可不篆于銘銑者哉其詞曰碧落朱宮兮鬱其崇金振玉扣兮殷而鴻九枚是獻兮百神工成之不日兮鏗乘風聲無已兮福無窮素木盤盂銘并序先天嵗夏五月頲蒙恩旨傳還洛京時韋祭酒丈人任膺居守嘗撰素木盤盂分諸好事頲既至丈人垂眷猶昔銜衣撫孤得拜清顔訴窮欵於此矣他日復往又以木器謂疑之亦頒斯惠豈散則當棄木有先容而見知豈朴則能堅器有晚成而獲贈覩以為誡仍邀作銘退而力鄙懼不如命山有木兮全真而生君子器之審而用一作用而成渾則不矯受則不盈辨一作辨以文直牢因素真抱朴委性誡奢逺名慮終謀始能合道精越州華嚴寺鐘銘并序李雍有同乎源播厥𣲖者夥哉沿之惟輪則終列大輅革以穴處則崇構夏屋譯梵言於華學象楗槌於景鐘從來久矣觀其聆妙音奬𢎞誓艾苦趣警禪門劒輪疑在空法衆斯集鏞之時義大矣哉郡司冦北平楊公沙門師萌抵淨根保耳一無此字界妙有忠為迦維之業堅朴象正之鈞嘗慨靈越樂郊勾吳通邑雖經行大壯塔廟藝釋訓乃首唱羣吏傳聞庶氓合聽悉心聚糧殫幣鑠文馬以庀製驤羣龍以範鐘撰祥時歷令日傾郛鄙畢緇黃舉帆雲屯擊轂雷動百身勇施纍讚願言者計以萬億然後陶人事爐火正疏冶風伯鼓槖樂工楊嬉疑煥乎鼎陳蔚焉丘峙手舞者翳景稱慶者振林遲明藏功亭午卒業於是層臺大起雕簴懸列鯨魚吒怒以震擊蒲牢跧曲以駭噭隱天綱謍地理剎那昭應一念信心有無識生幽執鬼物莫不休復淨域貞觀真諦矣有若大者不槬小者不窕則州鳩之聽曷以臻其間歟其詞曰大雄立號兮考彼華鐘震發三界兮以覺其聾俾我羣動兮不罹厥凶君子是象兮載鑠載鎔彌億斯年兮罔有天鏞興唐觀新鐘銘并序權德輿聲為陽所以發越金尚羽所以清徹故鳬氏工焉法器成焉玄門揭焉與夫樂出虛鏗立號同其功用而信響受祉之説倍焉興唐觀新鐘者觀主道門威儀太清宮供奉郤尊師彝素之所創也是觀經構之初與舊鐘俱當開元甲戍距今七十有七嵗啞缺毁棄法音不嗣久矣師有環中火辨為道流龜龍循其照觀其妙法自然無為八字集作觀其妙然後無為而無不為所以恢玄功𢎞願力誠修而物應言發而響會上士仁人展其助飛亷回祿理其具精乎六齊合以萬數以心齊以神遇槖地籟騰天光無害金無耗氣不窕不槬不石不播於是登簴在懸希聲殷然小大隨扣昏昕警衆周六虛而洞三界投九幽而清五苦皇都人士遊者萃者感於耳和於心躁者靜者懸解師之善利利物可勝道哉古者林鐘景鐘皆銘其功儒氏之典也推類以鏤文字師之心也銘曰其動也懸而集作如天其用也虛而圓雷大音兮集羣仙福元后兮斯億年鏗訇響亮鴻都前上入冥兮下徹泉然後舂容銷散兮返萬物於自然陶器銘并序歐陽詹常侍論於長者儳有之曰近代之作玉杯麗則麗矣愚以不如古之人集作人之為陶長者韙之以為知言退而思其所自多亦不泰集作沗是伊人之譽器以利用道從易簡利用者貴無往而不適易簡者取立功而匪勤今天下集有之字至富者土也不勞而成者火也夫陶掬攘集作壤下同之集作以制焚蒸以凝就其不勞因其至富不瑩而氷清珠睍集作皖不煆而金固石堅一工致功千室以給觳鬲罍甗瓶缶杯盂大窮擔頭集作石是小極圭撮經鼎鑊而自若在燀爇而莫渝滿堂絶侈靡之譏極集無此字提潔無剽殺之患其功則易簡也其實則利用也其藏又保安也易簡二儀之理利用五行之本保安立身之方執人之方履物之本從天地之理此三皇五帝所以內户不扄外户不閉無為之德所由生也豈夫玉杯之獨劣其餘孰得而儔焉則刓材搜璞窮山越壑磨礱雕琢鑄鍊丹雘力盡終年之功財殫不訾之産量才斗合質忌湯火富集作置家得奢盈之譏集作議中懷生賊害之纍其功則非易簡也其實則非利用也其藏又非保安也悖二儀之理違五行之本乖立身之方此夏桀商紂所以人人頗邪比屋可戮亡身之禍所由生也省費鮮勞皆備於物德且如彼而人賤之煩人蠧財不周於用禍又如此而人貴之久矣哉世之迷亂集作也物有賤而可貴亦有貴而可賤惟賢者能審之小子不幸億而有中誠背常人之見敬為銘以廣之銘曰黜汙易杯聖人製器易簡作程利用為貴稽諸往載陶集作極實攸興裁因掬攘成假焚蒸不雘不丹不雕不刻自集作日結金堅天然氷色財無害産功非殫力量畫洪纖周窮幽仄物有千金相異我取不費為利用集作物有積巧集作功相崇我取不勞為工物有患湯忌火我取往無不可物有剽殺焚軀我取懷藏不虞心存目視奢尋彼至堂集作室滿堂盈侈莫我生省庸周用所賤謂何賈害勤人所貴者那可貴不貴物戾其類失類曰昏雖隆必墜可賤不賤物得其選得選曰明雖幽必見上唯五帝下洎三王實有以興實有集作亦有一作實可以亡蚩蚩百工孰若我陶敬銘有器永告滔滔洪州大雲寺銅鐘銘獨孤及參變化孕律吕和神人莫疾於聲故天地以雷震萬物人以樂節八風佛土以鐘警六時天造聖作同符異貫自真乘開設其輪三轉像教不墜而法鼓之製在焉三字集本文粹作制存彤彤蓮宮于江之濵萬井在其前善惡興乎人將欲誕敷我法音啓迪我善根集有我字是以作萬鈞之鐘大其器所以昭其度也侯誰尸之長者杜海洎此方上士釋文粹作精法觀釋法二字集作精鸞與比丘衆百三十有五人實果其願將辦所作于時火官金工循集作修厥戒令範集作法隂陽九六之數以合造化均薄厚侈弇之齊以諧清濁聚精會神鳩工於其間𢎞誓既達昏疑皆破故衆心如城施者成集作如市大悲之感與萬靈接集有况字祝融回祿髣佛交應越五日集本文粹作月辛丑新鐘成於是此邦民大和會膜拜縱觀川塞衢隘集作盈川塞衢億兆諦聽鯨魚乃發訇然如扶搖號而萬竅怒霹靂作而崇山破在坑滿坑在谷滿谷金界岌峇若震若蕩文粹作蕩既而拗怒散渙與回飈俱激度越集作越若大千周流六虛經于禁集本文粹作嚴城入于梵宫徘徊乎霜天凌厲乎清夜千門徹萬户警魚龍皆奮蟲豸不蟄於是聆其音者貪騃遷善聾盲知方識浪安流地獄清涼吒王解形刀輪摧藏嚴乎心者聞聲以知受觀受以悟法若露清耳根鏡照身業彼金鼓聲氣木鐸徇路整衆孚號方斯陋矣蓋聖人𢎞道以勸善因善以建法作法器以為天下利利者教之果法者教之因善者教之宗我鐘我懸是訓是崇世界有極大音無窮泗州開元寺鐘銘并序李翺維泗州開元寺遭罹水火飄集作漂焚之餘僧澄觀與其徒僧若干復舊室居作大鐘貞元十五年厥功成於是隴西李翺書辭以紀之八月梓人功既休戊寅鑄集無此字大鐘成先時厥初罹于天葘波沉火燔既浮為薪既蜚為塵澄觀之初恢復其居革舊而新環墉如陵臺殿斯嚴乃三其門俾後勿踰其徒不譁咸服其勤有加于初屋室既同乃範乃鎔乃作大鐘乃懸于樓以鼓其時以警淮夷非雷非霆鏗號其聲淮夷來警集作驚上天下地弗震弗墜大音無斁千僧戮力願昭其績乃銘于石陸傪檻銘晝日居于是窮性命于是待賔客交其賢者亦于是有客李集作曰翺銘于是盤石銘并序白居易大和九年夏有山客贈余盤石轉置於履道里第時屬炎暑坐卧其上愛而銘之云耳客從山來遺我盤石圓平膩滑廣袤六尺質凝白雲文拆煙碧莓苔有斑麋鹿無迹置之竹下風掃露滴坐待禪僧眠留醉客清冷可愛支體甚適便是白家夏天床席二銘并序羅衮黃帝作巾几之法孔甲有盤盂之誡太公陳觴鏡之銘所以昭成敗而防遺闕也衮不敢追迹聖賢輒取枕杖二物而為之銘亦賤士區區文粹作亦古之賤士不忘君臣之分也枕銘或枕或欹有安有危勿邪其思杖銘身之疲杖以扶之國之危賢以圖之後二銘并序前惟王者之義無所不正或得賢以反國既作枕杖二銘以風復念時人歉於自修卒違善反禍或侈滿不能長嗣因亦銘諸櫛銘諸門以勸櫛銘盧同集作梳銘而有髮旦旦思理有心焉有身焉胡不如是文粹作人之有髮兮旦旦思理有身兮有心兮胡不如是盧同集作有髮兮朝朝思理有身兮胡不如是門銘金樞玉鍵何足牢止盈修德後必髙文苑英華卷七百八十九
