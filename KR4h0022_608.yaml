body:
  text: 文苑英華卷六百九宋李昉等編雜上請三為崔大夫請入奏表二首為劒南西川崔僕射再請入朝表一首為益州父老請攝司馬鄧公為真表一首為益州父老請留史司馬表一首為益州父老請留博陵王表一首為公卿請復常膳表一首中書門下請進膳表一首熒惑退舍宰相請復常膳表一首為宗正卿請復常膳表一首為鳯翔李尚書請使人拜掃表一首代河南裴尹請拜掃表一首請河北遭旱潦州凖式折免表一首代人至渭南縣降服請罪表一首代人奉御批不許請罪謝恩表一首駕幸長安起居表一首代人行在起居表一首代張侍郎起居表一首為崔大夫請入奏表李舟臣某言臣以久違闕庭歲請朝覲在宣州日伏奉德音且以河南用兵許臣事平入奏尋蒙寵命移鎮浙東臣自至越州旋經歲序瞻戀宸極道路轉遙俯察微躬疾病加劇實慮溘先朝露永謝明時昨者隨表便行冀蒙聖恩昭許續奉進止所在令廽伏迫宸嚴不敢冒進臣防身寡智處衆多尤但恐讟謗之聲日聞天聽浸潤之漸將廽聖慈憂疹相并死亡無日臣管州郡幸無逋懸西河之間又已寧靜伏願陛下察臣誠懇許臣朝謁實冀犬馬之疾歸上國而蠲除風波之言仰皇明而昭鑒無任懇迫之至同前臣某言臣一昨初承國哀號慕罔極已陳哀懇請赴山陵伏奉批答上遵違㫖不許奔㑹𤣥宫甫閉攀扈無由永惟舊恩實延巨痛陛下自登寶位日月重光百靈昭蘇萬物咸覩臣限所守僻在海隅遐瞻闕庭未獲稱慶陛下湛恩雨施大號風行繁徭頓除窮海知化臣管內州郡幸獲安帖在臣使務必有常規將臨元㑹之期倍切朝宗之戀伏願許臣暫趨天闕獲覲龍顔集禀命於聖君退宣風於遐壤臣死生無恨榮願之至為劒南西川崔僕射再請入朝表于邵臣某言去冬臣知衙事官姚悟廽伏奉手詔許臣入朝臣自西川一作山軍還理裝撰吉與監軍使孟遊仙等以今月五日發成都十二日至綿州羅江縣中使馬承積至又奉恩㫖令臣與遊仙等却廽臣久辭闕庭從事邉塞思一朝覲如天無階忽遂此行神道所感豈知中路猶阻懇誠揮涕慙對於三軍結戀詎同於他日臣所行意實不謀身一欲辨折讒一作戎間兼欲敷陳國要有不可形之翰墨有不可傳之外人表臣心切唯天而已將士等知臣悃欵共憂家國見臣不行魂氣俱喪臣以迫於所務抱恨南邉固請監軍使行猶期上訴雖一夫阻命而違衆實難逰仙今於漢州便發以從諸將之請軍中務要悉以咨之伏乞聖聰俯遂羣議則冀上輯下睦永無外虞西南艱危再沐清晏豈臣獨夫之幸實充萬人之幸無任懇迫屏營之至謹附監軍使孟遊仙奉表陳請以聞益州父老請攝司馬鄧公為真表閭丘均臣聞天工人代安危所存得其情則風化淳厚失其性則氓庶流離臣等本部益州司馬臣某雅慮忠純貞心剛克通識人理博綜古言州無牧伯居攝端右靜以鎮撫物情功乃隱於視聽事益於國家故不可一二而言也臣又聞冦恂為郡甚得人心將拜汝南百姓遮道漢皇如請竟留一歲敢緣斯義上犯天顔伏乞陛下憫垂涕之慈惠黎民之願即其所守除以為真使生人無惜去之嗟孤貧有永綏之賴則上下咸得中和可期伏表上祈以驚以震云云此篇元編在五百七十八卷辭讓門今移入於此為益州父老請留史司馬表益州大都督府草莾臣某等若干人謹冒死言臣聞理有所藉潁州重覩於黃霸惜其不可河南一借於冦恂古之恩迹今亦宜有臣等出身草莾茂育𤣥德井飲田食齒老年衰安全家道傾疑遂天性皆賴陛下聖情恩利惠及蒼生擇循吏以共康官賢才而俾牧者也臣州佐某官英明興疑氣忠志居心該舉墳典猶協文史充美價於一省者能聲於邦國緹油至止光輔藩維體要而庶政必凝憂勤而自公知退伏見今月日除節彭州刺史璽函適到熊軾將登吏人傳聞驚嗟相惜臣聞天地之道每從人欲帝王之義必順人心所以黎庶安寧上下禔福今此百姓乞留一年庶得服習其教而易安優柔其道而自得閶闔天逺上祈猶難伏乞聖慈回眷殊渙中留停已出之㫖復如初之望使祈一作折心重至驚魂還歸時雨一霑同養萬物無任瞻望佇廽之至益州父老請留博陵王表臣某言臣伏見陛下睿圖興復寶命維新救㝢縣於阽危拯蒼生於塗炭凡在戴髮孰不幸甚蜀鄉財産古稱天府疲弊始西軍之役屢空拯疑冒賄之夫滿路吁嗟棄親亡散維貸是視愛養誰能陛下所以惠賜藩王鎮撫梁益因之傳一作博利期以政成而𤣥暐至止才移弦朔除替旋聞臨筵不暖陛下與而奪之勾萌未逹於方春濟舟忽度於中水天下何謂亡疑此哀憐今者百姓甚性一作情於官人貪富疑作留𤣥暐缺師恩缺斯弊遂革美其風而不見其好移其政而不失其宜且益州者列嶽之雄望𤣥暐者朝廷之忠良明使是推能術尤急理以才名相副義與隨時不乖陛下何惜一賢以遺百姓特望俯廽授受留借期年瀝懇上陳馳情無地瞻帝閽而遐呌佇天眷而西流獲遂丹誠戴恩瞑目無任悃欵屛營之至為公卿請復常膳第二表臣某等言前以减膳日久憂損聖躬率土廽惶輕陳管見而孝情凝邈猶未俯同誠不感天增其履薄臣聞先王垂教以禮制情聖人無心以身從物故能上安七廟下字兆民唐諱所以孝治唐諱莫非斯道伏惟陛下率由過禮至性光前想終身之憂懷茹荼之酷愆子卯之制淹晦朔之期生靈皆所不堪聖體必將勞悴貽臣子之危懼忘社稷之晏虞緬善靡逹一作緬兹一善方招兩失求諸典故兼且未安詢及普天孰云其可既守高祖之天下為萬國之歡心先當愛身以寧宗社無宜獨善用杜衆情伏願俯順禮經仰廽天眷則羣臣荷賴庶品咸康不任懇切之至中書門下請進膳表常衮臣某言伏奉以華陽公主攝和稍類表作小乖思念所切齊宫親禱輟膳終朝臣等下情不遑寸刻竊以經時之疾變節或加分至所臨晦明異狀漸過其後旋即如初頃嘗驗之多亦然矣陛下以海內之衆子育寧殊豈天屬之間皇慈獨軫伏願忘懷淡慮常膳以時保安聖躬用慰臣下屬兹煩暑尤切懇誠謹奉表陳露以聞無任兢惶迫切之至熒惑退舍宰相請復常膳表錢珝臣某等言今月某日伏奉批詔以臣纍陳列宿之間熒惑退舍所冝升臨正殿進復常羞而睿聽彌高羣誠莫遂顧台星之有位居公府以不遑伏惟陛下道合秉陽事皆師古禀天明於垂象察時變以側身克示允恭未忘戒懼考乎經籍實契規摹雖退就卑宫儉惟降食方期應感合舉典彛然而芒角既收運行已順歷懇亦循於故實拜章敢惑於聰明而𤣥鑒未開丹心如燭鋪陳無序裨贊失圖伏以大配乾坤重承宗廟執禮必遺於小者推誠皆可以貫之則行正道以臨萬邦不在乎不居法座也布王澤而滋庶物不在乎不食重味也而陛下未嘗不行正道於遐邇布王澤於細微茍行之有終𢎞之不已則天惟輔德心實彌災視棟宇而自安御豆籩而何爽敢祈聖鑒必念斯言伏惟俯狥愚誠特允所奏干冒旒扆臣無任云云為宗正卿請復常膳表臣某等言今月某日伏奉批詔以臣所請復常膳御正殿未賜允許者臣等恭承詔㫖竊仰聖謀以為前史所垂正言可取則應天動人之事實哲王致理之先然臣伏思陛下繼體以來推誠必至友愛之道顯教萬方惻隱之心罔遺一物於王師致討司冦用刑率皆毒被蒸人罪興衆怒救殘虐之極弊懲悖亂之元凶而後效順立功報之爵祿勞心焦思痛在瘡痍屢降德音勤行王道得非應天以實而動人以行哉况謫見之後戒懼不遑朝野所知星辰所照則大官進御路寢燕居既舉舊章將踰期月固可以特開睿鑒俯狥羣心理且叶於至公事兼存於大體臣某等謬居宗緒敢貢飾詞盡布腹心復干宸扆無任仰望兢越屏營之至為鳯翔李尚書請使人拜掃表韓翃臣某言臣聞子之能仕父教之忠臣仕雖無聞忠冀盡力當陛下至理之日偶四方無事之時臣幸揚名清朝全節聖代於臣之分榮感多焉而罔極之心未遑省告伏以先臣墳墓逺在定州道路所經瞻馳靡及臣自入宿衛三十四年頃者師旅雖寧武臣分閫臣職叨禁近事絶私情𢎞覆之德靡所不容而兢懼之誠實自難處空懷怵惕之感莫申展奠之儀今寰宇廓清憂疑必釋當天下交泰之際是人神叶吉之期臣寄重藩維不合上請今遣弟某官某專拜掃以道途所近便取北路赴定州輒披懇誠無任兢惶云云代河南裴尹請拜掃表令狐楚臣某言臣聞天地之大曲成於品物臣子之心無隱於君父下情上逹至化旁流伏惟開元天寶聖文神武應道皇帝陛下睿謀作聖孝理奉天蒼生之願不違皇極之慈廣運不以臣微劣無取纍擢大官位高尹京職重居守犬馬陳力未酬明主之恩霜露感懷遽有私家之請臣某中謝先臣墳墓俯在近郊頃歲以來闕伸拜掃每至寒節展臣情禮晨往暮還所職無闕又臣於墳塋立碑恐其向就建樹之際獲遂躬親重泉承日月之光舉宗蒙雨露之澤不勝罔極之至請河北遭旱潦州凖式折免表張廷圭臣廷圭言伏見景龍二年三月十一日勑河南北桑蠶倍多風土異宜租庸須别自今以後河南河北蠶熟依限即輸庸調秋苖若損唯令折租乃為常式者臣聞皇天無私覆后土無私載日月無私鑒隂陽無私育是以明王聖帝則而像之慶浹萬邦政敷文德故書曰無偏無黨王道蕩蕩無反無側王道正直伏惟聖朝御歷皇極在人正朔所覃率土奉若百年于兹矣頃於災歲重賦饑人頓革彛典特開變例雖施蠻貊之邦臣愚猶知不可况此兩道枕倚大河南接神州上通天邑郡縣雄劇人物昌阜既類股肱之地尤宜得其欣心豈可殊其土風異其徭賦不恤災患而殫其財力者即以桑蠶别加徵稅至如隴右百姓羊馬是資山南諸州椒漆為利其或銅鍚鉛鍇貨自巖通蜃蛤魚鹽財自海殖土物惟性錯貢四字一作惟錯方隅咸有潦年並無他稅旱歲各凖常規豈獨斯人外之王度且天灾所降年榖莫登在於貧弱或至殍殣生理既其難恃人心固未易安就其憂危載空杼軸窮斯濫矣將無不至臣效官頴服在河南每見部人衆稱寃苦伏思景龍之際時多賊臣有若宋楚客紀處訥武延秀韋溫等蔽虧日月專擅威權各食封遍河南河北屬當水旱屢致蠲除因而遂矯制命固非先朝之本意也伏願陛下廣天成之德均子育之愛式崇大體追復舊章許河南河北有水旱處依貞觀永徽故事一凖令式折免則在蒼生不勝幸甚謹因所部法司參軍鄭𤣥亮奏潦損謹附表以聞代人至渭南縣降服請罪表韓翃臣某言臣自出邉鄙素無才術頃因冦難纍效驅馳遂荷殊私謬膺重寄介於偏僻密邇冦讐備歷艱危得全節義遼陽移拔趙北掃除皆伏威靈非臣力致幸逢清廓輒自寬閒麾下不虞舟中生變坐移疑作貽顛沛實愧無謀縱欲粉身於何塞責陛下念臣微效未即書刑許歸朝廷俾露誠懇王畿日近聖問荐臨雖承雨露恩深其若丘山罪重闕庭進對臣亦胡顔鈇鉞就誅甘當碎首謹於路側降服而囚且十年以來秉戎律者其於綏撫或有乖方不待刑章弊於部曲隱而不數斯輩亦多臣以負罪雖同免罹其禍幸全腰領伏俟天誅臣之為榮死亦不朽臣無任懇欵之至代人奉御批不許請罪謝恩表前人臣某言奏事官蘇翼廽伏奉聖造答表勒臣即復章綬速赴闕庭捧讀震驚心魂爽越臣某中謝臣智稱統戎罪深負國奉期死所翻荷生成恩承主偏法為臣屈廽謝九原之路仰銜再造之功拜命之初不勝忭躍臣即匍匐拜謝闕庭無任感戴云云駕幸長安起居表武后時冨嘉謨臣某言伏奉車駕以今月二十二日西至長安臣聞咸秦奧壤河洛舊區王者是宅因時順動故睿情載佇西眷邦土玉軔金根天旋雲被皇輿凱入在藻知歸臣忝葭莩謬膺垣翰尹京靡託陪鑾遂阻紫宸漸遙丹慊空積伏惟祁寒在候輦路逶迤法駕就蹕聖躬多祐然後闢天陛而臨舊都巡卜征而考元吉者也無任悅豫之至謹遣某官奉表以聞代人行在起居表德宗時于公異臣某言自中使至伏奉手詔後行在所未有人至伏以巴梁既逺信使全稀路有豺狼時當否塞東征西怨彼雖幸於南巡捧日望雲臣獨瞻於北極伏惟陛下以重慎為意以社稷為心每於寢膳類表作食必盡頤攝况朱明啓夏小暑届時曽觀蜀漢之風小異咸類表作亟秦之氣尚衣侍膳之分莫敢侵官資父事君之誠空思入面違奉既久涕戀無從不任之至同前羊士諤臣某言臣以菲才親奉昌運受瀋隅之重任類表作寄效犬馬之微誠惟君知臣特受恩奬夙興夕惕榮懼積中臣某中謝伏以租稅之殷江鄉為重閭井之化水旱是虞臣職有分憂期於富庶宣陛下雨露之惠令獲小康守朝廷刑賞之規敢思中立條賦斂以辦集除疾苦而均安閉閣齊心仰思類表作答𤣥造竊以聖慈廣被每念遐方臣忝守官合具聞逹代張侍郎起居表吕溫臣某言孟秋猶集作尚熱伏惟聖躬萬福臣以去月二十一日到薄安山見蕃胡尚綺里徐等同集作固令盈珍等却廽奏事令臣取今月發赴衙帳者伏惟聖德集作澤非柔逺皇明獨幽蕃情大歡首帥知感䖍奉朝㫖賔禮使臣迎勞肅恭饋餼豐潔益知集作明嚮化彌表革心臣恭備單車不勝慶抃嚴程方始絶域未窮白日在天瞻仰如近青蒲之地伏奏猶賖感戀倣徨罔知攸措無任犬馬屏營之至謹因中使第五忠憲附表起居以聞文苑英華卷六百九
