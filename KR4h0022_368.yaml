body:
  text: 文苑英華卷三百六十八宋李昉等編針誡五誡持衡并序彈琴并序對鏡并序辭金氷壺并序守誡口兵誡猶子蔚適越誡三誡臨江之麋黔之驢永某氏之鼠敵誡針言并序五誡姚元崇持衡一作執稱誡持衡者一作稱者衡衡天下平也君子執之以平其心夫衡在天所以齊七政在人所以均萬物稱物平施為政以則一作公毫釐不差輕重必得是執衡持平之義也一作是執稱衡之理也聖人為衡四方取則志守公正一作平體兼平一作正直用於天官銓綜斯德用一作行於里閈紛競以息故南北一作西以對左右以持稱物低昻不差毫釐使錙銖不惑輕重無疑智不能矯愚不能欺存信去詐以公滅私王道無偏一作無偏無黨君子無黨一作似之法者天下公器官者庶人師長一作之師其身率一作既正不令而行在下無怨唯上之平故曰上之所為下必從矣上之所教人亦效矣一作上之所仰人皆其向我之所教人皆其效心苟至公人將大同心能執一政乃無失嗟爾多士欽哉勉旃庶此觀稱一作庶以觀則同夫佩弦彈琴誡并序琴者樂之和也君子撫之以和人心夫其調五音諧六律則移風易俗感舞禽獸而况和人乎故身不下堂不言而理者蓋鳴琴故也樂導至化聲感人情故易俗以雅樂和人以正聲樂有琴瑟音有啇徴琴音能調天下以治異而相應以和為美和而不同如彼君子故善為政者若彈琴宫君啇臣則治國之道大急小緩豈安人之心不調者改張踰於立法聲悲者調下感於知音昔武城單父以弦歌樂職鄒忌雍門以辨對匡國美此調撫而人是則昭告後來無怠於德對文粹作執鏡誡并序執鏡者文粹無者字取其明也夫內涵虛心外分朗鑒萬文粹無萬字物不可以匿詐衆象二字文粹作體無得以逃形是以野鹿窺而慙山雞對而舞故君子是繪是畫置之座隅蓋將照姦回之心絶險詖之路也詩曰我心匪鑒不可以茹亦其理焉秦樓明鏡鑒有餘暉色自凝曉光能洞微飾以鞶組匣以珠璣龍繞池卧烏臨月飛傍入四鄰中延萬象濟物攸溥利人斯廣握在帝心則宇宙融朗懸諸銓臣則翹楚瞻仰且明不匿瑕君子是嘉不疲屢照君子是效嗟爾在職為代作則刑不可濫政不可賊凡今之人鮮務為德紛綸諂媚汨沒忠直當須如鏡之明斷可以平如鏡之潔斷可以決敢告後來無忝前哲辭金誡并序辭金者取其廉慎也昔子罕辭玉以不貪為寶楊震辭金以四知為慎列前古之清潔為將來之龜鏡原其立者俯而揖讓也跪者仰而受恭也俾左右顧盼又得謙恭之道焉古之君子策名委質翼翼小心乾乾終日慎乎在位欽乃攸司請謁者咸息苞苴者必辭爾以金玉為寶吾以廉謹為師爾以夜昏可納吾將暗室不欺若爾有贈吾今取之爾其喪寶吾則懷非故曰欲人不知莫若勿一作不為欲無悔吝不若守慎慎之伊何主誡在乎瓜李悔之伊何讟謗由乎薏苡慎則禍之不及貪則災之所起苟自謹身必無謗耻凡所從政當須正已誡往修來慎終如始氷壺誡并序氷壺者清潔之志文粹作至也君子對之示不忘乎清也夫洞徹無瑕澄空見底當官明白者有類是乎故內懷氷清外涵玉潤此君子氷壺之德也玉本無瑕氷亦至潔方圓相映表裏皆徹喻彼貞廉能守其節凡今之人就列稱臣當官以割剝為務在上以財賄為親豈異夫象之有齒以焚其身魚之貪餌必曝其鱗故君子讓榮不憂辭滿為珍以備其德以全其真與其濁富寧比清貧吳隱酌泉龎恭致水席皮洗幘緼袍空裏雖清畏人知而所知逺矣嗟爾在位祿厚官尊固當聳廉勤之節塞貪競之門氷壺是對炯誡猶存以此清白遺其子孫守誡韓愈詩曰大邦維翰書曰以蕃王室諸侯之於天子不唯守土地奉職貢而已固將有以翰蕃之也今之人有宅於山者知猛獸之為害則必高其柴楥而外施窞穽以待之宅於都者知穿窬之為盜則必峻其垣墻而內固扄鐍以防之此野人鄙夫之所及非有過人之智而後能也今之通都大邑介於屈文粹作倔下同強之間而不知為之備噫亦惑矣野人鄙夫能之而王公大人反不能焉豈材力有不足歟蓋以為不足為而不為耳天下之禍莫大於不足為而不為材力不足次之不足為者敵至而不知材力不足者先事而思則其於禍也有間矣彼之屈強者帶甲荷戈不知其多少其綿地則千里而與我壤地相錯無有丘陵江河洞庭孟門之關其間又自知其不得與天下齒朝夕舉踵引頸冀天下之有事以乘吾之便此其暴於猛獸穿窬也甚矣嗚呼胡知之而不為之備乎哉賁育之不戒童子之不抗魯雞之不期越一作蜀雞之不支今夫鹿之於豹非不巍然大矣然而卒為之擒者瓜牙之材不同猛怯之資殊也曰然則如之何而備之曰在得人口兵誡并序劉禹錫余讀蒙莊書曰兵莫慘於志莫邪為下缺然知志一作智士之傷夫生也他日讀逺祖中壘校尉書曰口者兵也䀌然知言之為兵又慘乎志因博考前載極其兩端夫志兵之薄人激烈抗憤不過無從容於世耳口兵之起其形渥焉􅀈是知吾祖之言為急作戒以書于盤盂五兩之傷藥之可平一言成疴智不能明人或罹兵道塗奔救投方效技思恐其後人或罹譛比肩狐疑借有紛解毀輒隨之故曰舌端之孽慘乎楚鐵夷竈誠謀執戈以驅掩人誠智折笄以一作之詈賢者誨子信其有旨發言之難往古集作伸舌猶爾辨為詐謀默為德基玉櫝不啓焉能瑕疵犨麋深居孰謂可嗤我誡於口集作我口之啓惟心之捫無為我兵當為我藩以慎為一作謹鍵以忍為閽可以多食勿以多言猶子蔚適越誡劉禹錫猶子蔚晨跪于席端曰臣幼承叔父訓始勾萌至於扶踈前日不自意有司以名汚賢能書又不自意被丞相府召為從事重競纍愧懼貽叔父羞今當行乞辭以為戒余曰若知彛器乎始乎斫輪因人一作磨斫輪囷規矩中度外枵然而有容者理膩質堅後加密石焉風戾日晞不剖集作副不聲然後青黃之鳥獸之飾乎瑶金貴在清廟其用也羃以養潔其藏也櫝以養光苟措非其所一有毫髮之傷儡然與破甑為伍矣汝之始成人猶器之作朴是冝力學為礱斫親賢為青黃睦僚友為瑶金忠所奉為清廟盡敬以為羃慎微以為櫝去怠以護傷在勤而行之耳設有人思披重霄而挹皓氣病無階而升有力者揭層挮而倚泰山然而一舉足而一高非獨揭梯者所能也凡大位未嘗曠故世多貴人唯天爵并者乃可偉耳夫偉人之一顧踰乎華章而一非亦慘乎黥刖行矣慎諸吾見垂天之雲在爾肩掖間矣昔吾友柳儀曹嘗謂吾文雋而膏味無窮而炙愈出也遲汝到丞相府居一二日袖吾文入謁以取質焉丞相吾友也汝事所從如事諸父借有不如意推起敬之心以奉焉無忽三戒并序柳宗元吾恆惡世之人不知推已之本而乘物以逞或依勢以干非其類出技以怒強竊時以肆暴然卒逮于禍有客談麋驢鼠三物似其事作三戒臨江之麋臨江之人畋得麋麑畜之入門羣犬垂涎揚尾皆來其人怒怛之自是日抱就犬習示之使勿動稍使與之戲積久犬皆如人意麋麑稍大忘已之麋也以為犬良我友抵觸偃仆益狎犬畏主人與之俯仰甚善然時啖其舌三年麋出門見外犬在道甚衆走欲與為戲外犬見而喜且怒共殺食之狼藉道上麋至死終不悟黔之驢黔無驢有好事者船載驢以入至則無可用放之山下虎見之尨然大物也以為神蔽林間窺之稍出近之憗憗然莫相知他日驢一鳴虎大駭逺遁以為且噬已也甚恐然往來視之覺無異能者益習其聲又近出前後終不敢搏稍近益狎蕩倚衝冒驢不勝怒蹄之虎因喜計之曰技止此耳因跳踉大口闞斷其喉盡其肉乃去噫形之尨也類有德聲之宏也類有能向不出其技虎雖猛疑畏卒不敢取今若是焉悲夫永某氏之鼠永有某氏者畏日拘忌異甚以為已生歲直子鼠子神也愛鼠不畜貓又禁僮勿擊鼠倉廪庖厨悉以資鼠不問由是鼠相告皆來某氏飽食而無禍某氏室無完器椸無完衣飲食大率鼠之餘也晝纍纍與人兼行夜則竊齧鬬暴其聲萬狀不可以寢終不厭數歲某氏徙居他州後人來居鼠為態如故其人曰是隂類惡物也盜暴尤甚且何以至是乎哉假五六貓闔門撤瓦灌穴購僮羅捕之殺鼠如丘棄之隱處臰數月乃已嗚呼彼以其飽食無禍為可恆也哉敵戒皆知敵之仇而不知為益之尤皆知敵之害而不知為利之大秦有六國兢兢以強六國既除􅑲􅑲乃亡晉敗楚鄢范文為患厲之不圖舉國造怨孟孫惡臧孟死臧恤藥石去矣吾亡無日智能知之猶卒以危矧今之人曽不是思敵存而懼敵去而舞廢備自盈秪益為愈敵存滅禍敵去召過有能知此道大名播懲病克夀矜壯死暴縱欲不戒匪愚伊耄我作戒詩思者無咎針言并序白居易貞元十有五年天子命中書舍人渤海公領禮部貢舉事越明年春居易以進士舉一上登第洎翼日至於旬時伏念固陋懼不克副公之選充王之賔乃自陳戒于德作針言曰我聞古君子人疾沒世名不稱耻邦有道貧且賤今我生休明代二十有六年乃策名名既聞於君乃干祿祿將及於親升聞逮養繄公之德之死矢報矢報之義靡他惟勵乃志逺乃猷俾德日新道日就是報於公匪報於公是光于躬匪光于躬是華于邦吁其念哉其朂哉庶俾行中規文中倫學惟時習罔怠棄位惟馴致罔躁求一德五常陶甄于內四科六義斧藻于外若御輿既勒銜䇿乃克駿奔若冶刃既砥淬礪乃克用利無曰擢甲科名既立而自廣自滿尚念為山九仞虧于一簣無曰登一第位其逹而自欺自得尚念行千里始于足下嗚呼我無監於止水當監於斯文庶勉斯厥止慎厥終日顧於針言無作身之羞公之羞文苑英華卷三百六十八
