body:
  text: 文苑英華巻九百六十宋李昉等編職官二十二髙贊府墓誌一首郭贊府墓誌一首盧贊府墓誌一首崔贊府遴墓誌一首盧贊府峴墓誌一首權贊府達墓誌一首鄭主簿約墓誌一首李主簿少安墓誌一首韓主簿慎墓誌一首崔少府泳墓誌一首皇甫少府墓誌一首獨孤少府正墓誌一首宣義郎騎都尉行曹州離狐縣丞髙君墓誌銘陳子昻君諱某字某其先渤海蓨人也因仕居洛陽集無此字今為陽翟人昔赭鞭乗運襲赤帝之宗蒼兕膺集作應期承太公之𦙍崇勲霸業光烈猶存曽祖某北齊太子中舍人贈冀州刺史青宫近侍光寵朝班皂盖追榮恩崇國禮祖欽仁隋左親衛大都督檢校祕書郎帯七尺劒始遊天子之階提集作持三寸筆終入芸香之閣父相唐江州潯陽令舒州懐寧令絃歌之化身不下堂神眀之威蝗猶避境君即懐寧府君之長子也黄河一直青松千集作萬仭性惟仁孝行實温恭文義必以潤身名節由其徇物唐龍朔元年應集作有制舉忠鯁君對䇿及第試永州三字集作試守秦州非湘源縣尉位卑黄綬志在清規秩滿以常調補鳯州黄花縣丞梁竦長懐尚勞州縣桓譚不樂空負琴書又轉易州遂城縣丞以管輅之才從趙典之任古人斯在君子居之大周革命任曹州離狐縣丞而春秋已髙日月方出武盡美矣不侍集作得夷齊之臣文武郁乎自循集作邈夏商之道於是因階秩滿告老歸閒閉郊扉於南野習巖居於東澗詩書琴酒以觀先達之風山木丘園將為遺老之賞天授二年嵗在單閼七月二十二日考終厥命卒於陸渾縣眀髙之山莊時年七十有二嗚呼哀哉君雅尚清節素履元亨懐古人之逺圖慕先賢之遺烈以為桓魋石槨非合集作則於禮經墨翟桐槨實宜於聖典遺令薄𦵏務取隨時即以其年十月日𦵏於北邙山平樂之原禮也嗣子思恭孝思罔極喪制過哀思封樹而緬懐恐東西而不志白楸為槨爰遵古𦵏之儀丹漆題封即表永年之記銘曰泱泱大風其太公兮穆穆君子紹厥宗兮中鯁察㢘仕漢宫兮才位髙卑考永終兮哀哀孤子號蒼穹兮歸𦵏平陵松柏拱兮集作柏松桐兮咸陽縣丞郭君墓誌銘常衮公諱某字某昔蔡邕叙有道之碑已詳姓氏司徒以㢘直稱太守以仁眀著祭酒之籌畫黄門之才理克作於曾祖驃騎將軍光禄卿仁最祖汝州司馬茂禕父濟州刺史崇禮咸以文武孝謹傳於子孫公即濟州府君之長子也髙朗有識奉親孝事上敬睦於兄弟信於朋友好言王覇大略經術大義簡而無傲剛近於仁而能端本静末仗雅居正年十二有老成之量季父崇黙不以常児見遇謂必大吾門伏波之言不敢失墜仲容之器居然宏達尋以眀經擢第厯洺州平恩縣尉左金吾衛兵曹叅軍眀恕貞恪清㢘仁愛克施於政政有經矣故幕府三辟時稱得俊御史中丞李處古侍御史崔希逸節度使張嵩爰以將命之務諮焉公之佐㢘問也旌别淑慝樹立風聲進厥賢良不仁者逺率由簡易希下按章從容以和大變其俗公護戎事也善用文韜制其邉患本詩書之義府資徳刑之戰器軍吏緩帶兵車税鞅譚笑樽爼疆陲晏然凡所介貳皆有卓絶之稱毎歸功於上豈代師受名而士君子多所推重方將萬里横海一飛青雲三十有六年至於命夭開元十八年四月十八日寢疾終於長安第里命薄葬布車一乗而已不忘平生之儉以示後昆之訓惟公博識强辨尤好理論至於縉紳風教得失之間處正其義不以錙毫假物善與人交不改柯葉一時之俊千里應言分宅字孤謂之已任而特相友善者時則有若吕向梁渉庫狄履温終以偉才良器綢繆省闥每一拜命未嘗不相謂曰使君不殁吾輩豈先處顯地其精鑒雅望有如此者夫人安定梁氏執禮之坊有儀可則哀敬以事宗廟謙柔以和娣姒栢舟之誓年在㓜冲諸孤始孩一生所寄送往過禮撫存以慈魚菽之祭以彰勤儉爼豆之訓不墜文儒時人謂之大家國史編於烈女徽音淑行雅有餘芳開元十九年十二月二十四日終於雒陽私第𤣥寢異室三紀于兹壬寅嵗詔贈府君大理丞追封夫人安定郡太君徳盛流光禮徽優典永泰二年十一月日合祔於金城縣太平原禮也嗣子大理丞縱侍御史絳夙遭閔㓙不及詩禮之誨尚賴慈奬㓜彰令聞白簡持憲丹筆詳刑忠信孝友合於純性悲夫欲養而親不逮再仕而心不喜春秋窀穸痛結寒泉月日有時禮尊同穴蒸蒸之慕有感人倫以衮夙有通家之好俾叙先君之徳銘曰世載忠厚有倬其道尊顯府君光昭祖考逹識宏量汪汪浩浩五經紛綸精義入神勞我州縣汨我風塵不屑其志與時屈伸乃佐軍政戎荒底定乃登輶軒郡邑從令交則不黷久而益敬有才無年零落重泉遺孤改隧合祔終焉舒州望江縣丞盧公墓誌銘梁肅范陽盧君諱某字某漢侍中尚書植之裔孫北齊民部侍郎范陽伯士嬰之元孫上蔡令彛倫之孫泌陽令某之季子其令徳甲集作官族上矣君孝發於内不懈於外禮極於上不遺乎集作其下得太和之正性藴眀哲之茂器學以聚之問以辨之百行行之一以貫之干禄代耕非近榮也安卑從政非離羣也弱冠舉孝㢘授舒州望江縣丞夫道徳繫乎已窮達繫乎時惟天生徳於君而止諸下位卑道消乎當世十字集作不畀之年不與之位噫造物者不其惑歟享年四十有四天寳元年月日終於慰氏私館是嵗權窆於潁川之許昌里大厯七年月日𦙍子太常寺恊律郎東美初奉嚴訓以公之喪後祔二字集作從先大夫於陽翟之某原禮也夫黙而成之存乎徳紀徳音者存乎詞銘曰顯允君子克廣徳心邈乎其髙淵乎其深雲藏乎山風隠於林時雨下降不聞其音性合元化形隨逝水天何言哉命也已矣山川有變兮集無兮字令聞不已洪州建昌縣丞崔君墓誌銘權徳輿君諱遴字某博陵安平人也六代祖北齊右僕射昻以文學正直周歴諸曹禮樂刑政所損益者十七八生隋水部司門二郎中洽有風儀器尚以世其家司門生皇掖縣令曇首掖縣生武邑令昭集作紹武邑生白水尉頂頂生汾西令贈定州刺史昇之自掖縣四世含徳不耀君即定州府君之長子故相國右庶子安平公其介弟也恬淡愿懿不遷於時仁於鄉黨友于兄弟大厯中御史大夫賛皇李公之宣風於呉也聞其賢起家表薦集無此字為常州武進縣尉跡聞集作徇知已心不近名俛視官曹非其好也建中初嗣曹王分閫案部於九江之西乂以名聞轉洪州建昌縣丞君喟然曰莊生於陵子吾之師也惡用是哉終不屑就先是築室於昆陵䟽清流䕃碧蘚樹藝偃仰有終焉之志貞元十年正月日寢病集作疾終於其家享年六十三夫人范陽盧氏華宗淑行動脩集作循禮法其孤景伯等年未及冠皆専經趣善藐然銜恤䕶奉輤車以眀年十月某日歸祔於河南東原之舊塋先逺故緩也季弟著作郎逑貞謀集作諒是遜弟稱於士林抱終鮮之痛主歸全之禮以徳輿詳其素履俾為墓銘銘曰公綽之道澹無欲兮結集作潔身用晦言可復兮視履考祥宜戬穀兮乃如之人胡不淑兮周原舊封森拱木兮於以寧神識陵谷兮潤州丹陽縣丞盧君墓誌銘前人君諱峴字某范陽人自一有元字魏已降官婚人物為天下清甲大略書於國史詳言在乎家諜今所書三葉自曽王父衛州司馬府君諱宏夀初貞晦不仕公車徴拜生冀州信都主簿府君諱友裕友裕生揚州髙郵縣令府君諱相君即髙郵之第若干子奉前人之業講先師之訓以之克家以之從政直方謙厚卑不可踰筮仕三次不離州縣之職曰亳州蒙城縣主簿楚州寳應縣尉潤州丹陽縣丞寛敬蒞事不希名譽故每當㢘問薦延之目集作日使臣陟眀之舉皆遷延晦避時議多之清行懿名竟用不振以大厯九年七月日寢疾終於官舍享年五十五其婺隴西李氏柔順有婦行嗣子某等訣於蓍蔡衘恤襄事以闗河不靖未克歸祔遂以某月日權厝於縣之北原焉從宜也予僑居丹陽嘗與君游故粗書事實以備刻石銘曰生死沄沄如環斯循于嗟盧君於此歸根再從叔京兆府咸陽縣丞府君墓誌銘前人府君諱達字某天水略陽人曽祖崇本皇朝散大夫滑州匡城縣令祖若納皇通議大夫桂歙梓三州刺史考僎皇深州安平縣令自十二代祖前秦安丘敬公至四代祖平凉公皆有勲力為通侯大吏自匡城至安平以文采政事為列城二千石家法休聲貽於後昆府君以士行吏理平端簡實大厯初調為家令寺主簿厯同州馮翊縣尉河南府登封主簿京兆府咸陽縣丞居之必聞考績得之必由綜覈中外之姻或據戚里都侈鄉未嘗巧從以去窮約且以枉道由徑食浮於人為誡大率毎十嵗徙一官故厯三紀而四受禄勤官肅事不誘於長上循理蹈和不懾集作攝於健羨其有常歟其難進歟貞元十九年嵗在癸未秋七月壬戌感風疾終於新昌里享年六十先是夫人南陽張氏眀茂有禮法亦天奪其夀府君周縗既除三月而鞠㓙及悲夫子塤等謀於族屬家老以眀年春二月已酉祔真宅於萬年縣龍首原謹書官次以納幽穸銘曰幽丘而下奕奕圭組宜昌鄜城仍集作乃代啓土平凉䇿勲梓州懿文家諜徳風儀刑薦紳時惟叔父祇服丕矩始仕宫卿乃從左輔周旋二畿坦坦安卑遵道而行不競于時修短奄忽兮嗚呼涕洟崇岡美檟兮永識于兹河南府洛陽縣主簿鄭君墓誌銘穆員鄭君諱約字某元魏中書令周小司空金鄉文公穆之七代孫皇朝東都留守京兆河南尹福建觀察使御史大夫懿公叔則之冡子擢眀經調大原府叅軍厯興平尉洛陽主簿娶范陽盧氏生二男未齠二女未笄春秋四十六貞元十年四月八日卒於東都尊賢里第十有一月某日從先君子萬安山陽哀哉君事先大夫以聞禮為業奉繼太夫人以無違為志孝也地貴門髙盖羣從外姻歸之者如市身為冡嫡率以和氣煦其歡心行也不籍世資自求於古立也餘力學文㑹友藝也前者先大夫出入貴仕羽儀中朝君仲父季父皆以令名列於清貫赫奕髙眀之盛莫之與京既而季父陷於國讎先大夫薨於遐裔仲氏繼殁於位二夫人次夭於家君與諸父兄弟斬焉相從藐爾相弔曰昊天之不我䘏也逮三年矣奈何聲未絶口而君又往焉於戲積善餘慶之道信乎何其於始也信未及其終而欺繼之季弟納柔眀而文次迫當室孔懐加等之外似有怨且懼焉謂員先公下賔仲季之執䟽君景行俾勒泉扄銘曰人生盛衰如朝夕可歎繁華與凋落髙門冠盖昔如雲一旦弔賔何寂寞盛徳之後仁所歸嗟嗟之子何福違我從先君終此山讓厥嘉祥貽後昆長安主簿李君墓誌銘權徳輿君諱少安字公和隴西成紀人自元魏僕射文穆公冲而下為西州冠族或位不充者必以令徳聞曽祖仲進皇宣州司馬祖僑河南府澠池縣令父惜朝議大夫宗正丞贈濮州刺史君即濮州第三子敏信寛綽篤於行義方舉孝㢘偶為所親者遷遷字集作薦延授冀州阜城縣尉既非所好終不屑就王黔中礎之持節㢘問也表為推官轉支使厯左武衛士集作胄曹叅軍大理評事用誠直贊佐夷落之人宜之府除至京師轉三元集作原是縣尉筦中書甲庫考績四俱集作居上第遷長安主簿二陵復土之重比嵗㑹輦轂之下集作㑹同軌轂下儲峙二字集作所蒞儲峙無違典司廐置肅給安静尹守以為能方受集作授代而復表留一嵗御史府集作司字察視者數薦君自代君方勇於退故朝命未及焉元和三年三月乙酉感疾不起於長安興化里第享年五十君温仁孝友喻義循理恢恢然有君子之度齒位皆屈而知者歎焉夫人滎陽鄭氏太僕少卿叔規之女仁而不夀先是君元兄桞州刺史捐館舍請君襄事間闗勤逺間一嵗有㗳然之痛喪服甫除俄啓手足噫以積善之家而叢不淑如是糾纒之數其可問邪嗣子拭授等號奉輤車以夏五月景申祔於東都穎陽縣之某原禮也音徽未昧集作泳志義相倫情殷中外年同甲子濡涕操管銘於墓門銘曰族之盛兮才之令兮纔知命兮俄大病兮葬者藏兮頴之陽兮誌丘荒兮杳茫茫兮温縣主簿韓君墓誌銘桞宗元有唐故温縣主簿諱慎字某漢弓髙侯其先也從集作徙於南陽傳世至今唐侍中璩集作瑗克用貞亮奮於國難侍中兄子郢州刺史諱某某先御史著作郎諱某某生尚書庫部郎中萬州刺史諱某嗣以文行大其家業君萬州長子也叔父任為建陵挽郎累調授王府叅軍相州襄陽尉至於是邑貞元十六年又調於天官署河陽丞未拜十有一日暴疾卒於長安永崇里先人之廬又十有一日龜筴襲吉祔於咸陽洪瀆原先人之墓正集作禮也先三日外姻家老謀為之志季弟秦集作泰哀不能文故託於友焉嗚呼生也以其弟之恭知君之為友没也以其弟之戚知君之為愛惟友愛出於孝移於忠施於人事無往不達故予集作余故得受其辭以書於石集作書於石曰友而愛愛而忠忠而孝宜之十一字集止作友而愛而忠而孝之貌稱其行行稱其詞賤受集作而不夀為善是悼祔於祖考初筮攸告季也之純寘哀無垠終窶且貧控於仁人備物稱家其儀式陳爰相其悲載刋集作刻兹珉陸渾尉崔君墓誌銘穆員崔君名泳字君易清河東武城人皇朝刑部尚書贈太傅忠公隠甫之孫河南少尹㣲唐世系表同一作徴非之子進士擢第調同州叅軍陸渾尉生四十有三年以貞元四年冬十月景子卒於洛陽毓徳里之第丁酉從先尚書少尹於此丘禮也崔族著眀洎忠公徳如其諡焯乎代之聞見其所憑者厚矣惟先王之樂實祖考之世及君子之所以為構為穫者加生知之力行之故其事親也以無間言無違志無失色無過行其執喪也視禮經有加等而惡用吾情之歎異夫古焉其蒞官也才無不器事至一作主以鋒致理者以備羣司陟眀者以充首賦其㑹友也以晏平仲久敬子路無宿諾植之為本而游夏之藝文嚮使錫厥永年被之貴仕俾自家刑國以及生人未始涯也嗚呼才長命短古有之矣君之所以墮諸公之淚使有餘恨者方兄弟燕言之次無分隂之疾如寐如息而不反焉夫人范陽盧氏令族美行宜一作而為君之伉儷四子男曰某女孟仲季未笄未弁初河南府君祥踰月夫人范陽縣君違養又祥踰月君繼夭君長兄河南府君司録叅君溉不勝其哀乃至謂其身之存不若君之没而無知也當無窮之若疑作苦如有知也先人在焉託我友生銘其𡑞埏詞曰有生有死彭殤同致徳義為宗崇髙匪貴雲收於山曷為時雨嗟我哲人脩邙之土鄭州新鄭縣尉安定皇甫君墓誌銘梁肅君諱某字某皇朝監察御史某之曽孫贈兵部侍郎某之孫唐州長史某之第三子尚書左丞侁之愛弟厯葉聚祉左丞又嗣以淳徳義之門宜有仁人君生而冲茂聰悟孝敬弱冠以眀經登科始長安丞又轉新鄭尉性恬曠不甚以禄仕為意避亂至江南以墳籍自娛謂論語二十篇有夫子微言故嘗翫其章句以導情性非至徳要道未嘗經懐老氏不居其華孟軻言必仁義君子集作之志也晩節多病享年七十七以興元元年正月三日啓手足於嘉興縣私第夫人博陵崔氏生一子曰攸號慕哀敬禮無違者左丞嗣子兵部郎中政實營護喪事以前月三日權厝於某鄉原不克及葬難故也郎中於予有鄉黨之舊泣書美行見命誌之銘曰温良恭儉徳之柄兮居常待終天之命兮卜𦵏從權變之正兮桓州真定縣尉獨孤君墓誌銘前人君諱正河南洛陽人皇朝光禄大夫河集作洛後亦云洛南之禰南公諱義順之元孫故殿中侍御史潁川郡長史贈祕書監府君集無此二字諱某之少子故常州刺史府君諱某之愛弟春秋四十六大厯十一年某月日卒於晉陵郡眀年某月日歸葬於洛陽南先塋元兄水部員外郎兼侍御史汜銜天倫之痛且懼陵谷之不可常也於是昭銘景行誌其墓曰君之先出自劉氏漢世祖之裔有進伯者北征以師敗績降匈奴因部易姓其後有永公羅辰臨川王永業魏齊二代開國承家臨川生開府儀同三司武安公子佳洛南之禰也厯代之崇業茂勲其餘祉於是有祕書之遺直常州之厚集作茂徳徳美休裕叢滋於君君温恭集作良淑和孝友慈仁居處進退非禮不動嘗謂學者義之府文者質之薄故娛心典墳簡棄詞藝又謂干禄者躁之㡬蔵宻者静之奥故反情樂道居易脩業少時解褐授真定尉非其所好棄官不之晩節尚黄老慕禪味槖籥心懐夣幻生死端居一室澹如也逮疾病集無病字或勸之藥君集作石曰命之不可奈何雖有藥石將焉所施言未絶口㗳焉順化未婚無子知者痛之嗚呼予嘗窺天人而考性命夭夀之數福極之源盖昏黙而不可究已以獨孤君藴純粹之質蹈淵騫之行而生不躋艾服慶不植後嗣彼造物者以三夀百福與闕先是君李氏之姊捐館其眀年四月常州府君薨反葬之日三喪俱引故親舊惋痛為善者相弔水部之哀又其可既乎肅常辱常州之眷且與真定游文集無文字故備其實録刋於貞石銘曰顯允君子徳心廣兮與道為徒以蒙養兮桑扈反真泊然往兮刻石九原畢天壤兮文苑英華巻九百六十
