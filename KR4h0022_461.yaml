body:
  text: 文苑英華巻四百六十一宋李昉等編詔制三廵撫使遣廵撫使勑賈至勑厄運者天地一無地字之時也理亂者人君一無君字之政也是以軒轅不能止蚩尤之患帝舜不能無有苖之征盖在於人君脩徳刑以除之也頃者羯賊開釁亂常干紀誘脅戎卒竊弄邉兵九有之人罹其㐫害當戰争之地則肌骨多斃於鋒鏑在遐僻之方則杼軸其空於征賦離鄉去邑棄業抛一作亡家契闊凍餒飄颻畏逼朕毎永念心折涕零是用嚴奉睿謨恭行天罰躬被介胄大率戎夷掃清中原誅斬蛇豕豈朕薄徳能建功業盖人心竭節於本朝而戮力於冦難也所以給其優復減其賦稅省其聚歛息其征徭賑其匱乏宥其罪戾實其倉廪捨其逋懸飬其傷痍賵其死事將使萬一作百姓永登仁夀猶慮撫字尚闕疾苦未除於是分遣使臣親訪閭里夫人君髙居大位非可以目徧四海耳周八極必仗賢能以廣其視聽而一作頃今使臣咸未稱職多僶俛經一作輕畧未盡至公致一作遂令逺人寃不上逹而弊不下去今擇朝端忠貞仁恵之士飲氷乗驛廵撫四方其有政教煩苛勑令不便妨於耕稼害於蠶桑徴傊於人無踰小大咨爾兆庶必聞於使又有官吏邪虐豪猾侵漁擾於黎甿冐於貨賄上無隠也當悉懲之朕方以萬一作百姓心為心蒼生夀為夀自欲獨賢自聖而為理疑暴恵姦而墮人率土之濱宜知一作悉朕意至徳十年二月日一作皆唐大詔令宣撫使發宣撫使勑此篇已見四百四十巻題作嗣聖徳音詔令作遣畢搆等慰撫諸道制内制勑昔者前篇作門下風化前篇詔令並純作風咸知前篇咸人之模詔令作之謀庶尹前篇作士庶詔令作士庶所冀前篇詔令並作冀逮遐曠詔令作遐逺禍起前篇詔令並作起籍疚懐詔令作疾事識見前篇作識具嘉聲前篇作嘉譽泊于前篇詔令並作泊乎各恭前篇詔令並作各敬遣宣撫使勑勑為國之道莫不家給人足令行禁止而族譚者苦疆埸之戍役偶語者傷户口之凋殘且夫懐土重遷人之常性離邦去里孰無其情或委非其才或政非其要致令父不保子兄不寕弟井邑有流離之怨道路有吁嗟之聲靖言思之良可歎息故發使車以廵郡縣其縁邉兵士等或逺辭鄉壌乆事戎旃饑寒而食衣不充疾病而醫藥不至邉烽忽警將何以堪云云宣慰使出使優恤制詔令作遣使河北河南顧察利害詔内制勑伊昔明王奉若天道所寳惟榖所尚詔令作仗惟賢故能務穡勸分興利除害朕以薄徳纂承洪緒政期克己誠不動天頃嵗河南北諸州蝗虫為害雖當道常遣除痊恐今仍生育天戒若是朕甚懼焉罪實在予殃豈移嵗且牧宰之任朝廷所委茍得良才式敷恵訓古有夀張飛逝中牟不入者斯其効也刺史縣令等當各竭乃心用攘厥患方考休咎大明黜陟惟爾凡百可不勉歟宜令户部郎中蔡秦客徃河北道侍御史崔希喬徃河南道觀察百姓間利害便宜州縣等籌度隨事處置還日奏聞開元五年二月遣鄭叔清徃江淮宣慰勑一作制賈至勑逆虜未平師旅淹嵗軍用匱乏常賦莫充所以稅畆於荆吳校練於淮海從權救弊盖非獲已夫法明則吏不欺歛均則人不怨輯事無擾繫乎使臣度支員外郎鄭叔清貞固幹事節用愛人考績視成所厝斯枉詔令作考志視成可歴斯任宜以本官兼侍御史充江淮東西及淮南道宣慰使至徳二年七月十二日李涵河北宣慰制常衮門下河朔一隅地方千里外捍夷狄内輔成周撫勤王之師脩任土之貢顧其方鎮可謂崇重眷我侯伯是有勲勞且將相國之股肱兆庶君之支體事同休戚寜忘鍳寐思撫廵而未獲念征鎮而永懐爰命宗臣徃申㫖諭銀青光禄大夫尚書左丞襄武縣開國公李涵朕之荗親腹心攸寄純固所以致命文質所以經邦温恭禮譲誠信易直勵匪躬之節秉憂國之心羙其公才嘗所任委再令宣撫皆合事經既述謙誠之辭兼陳理化之績詔令作迹慰我憂念意甚嘉之今秋冬在候徭戍勤止將校有介胄之勞黎元有賦稅之役代予親問詔爾使臣仍兼副相之秩詔令作榮式重登車之務可兼御史大夫充河北宣慰使本管勲封如故李涵再使河北制勑書有施命以誥四方禮有誦志以廵邦國明王所以垂拱而天下理者非家至而日見之也實頼腹心耳目之臣審訓命於外俾徳澤教化敷於四海情有所逹事適其宜上下交暢則天地之和應矣喻我朝㫖寄於宗英銀青光禄大夫行尚書兵部侍郎襄武縣開國公李涵志以定言學於古訓安和好敬慎静尚寛服居大僚常所親信毎授重寄必掦休聲徃以幽燕詔令作薊渤碣之間戎府方州之大俾輔詔令作付王命以親諸侯至於再三秉此純一盡人臣之節罔或辭難狥國家之利豈憚勤逺信以恊誠恵以交福周爰咨度不遑啓處朔垂寜晏敬頼親賢今以侯伯之勲勞師人之戍守顧其忠効宜在詔令作有撫廵髙選中朝允兹僉論詔令作議加以丞相之副増其原隰之華時惟懋哉無替厥服可兼御史大夫河北宣慰使餘如故臧希讓使朔方制勑元帥都虞侯臧希讓冲明在躬質重成性閲禮樂以經武秉公忠而濟時夙傳金匱之符乆揔牙璋之律勲髙坐樹業荗分茅中外洽其嘉聲始終全其勁節嘉乃公望簡于朕心惟彼朔方乆罹邊患地即興王之所人推奉上之誠言念勤勞豈㤀慰恤宜應使乎之選式副徃哉之寄温造可起居舎人充鎮州四面宣慰使制白居易勑殿中侍御史温造嘗糾天府不曠官馳軺車不辱命况為人外和内决以兼濟為心持橐亦作㧞居殿中以備指使㑹吾憂两河間事求可以諭朝㫖慰人心者使焉撥効酌能汝中吾選故不待滿嵗擢為右史出則銜吾命入則記吾言奬任不輕思有所立可依前件授劉沔招撫迴鶻使制李徳裕昔東漢中夏既寜匈奴饑饉臧宫請命將臨塞圗刻石之功光武報云柔能制剛弱能制强且傳聞之事常多失實雖滅大冦不如息人朕毎覽前史為之興嘆又以大舜脩徳有苖歸心周穆徂征荒服不至固存取亂在擇良圗迴鶻頃以本國荐饑種落携貳黠戛集作紇扢斯乗其衰亂遂覆危巢既焚老上之庭盡剪名王之族可汗失地逺害來附塞垣朕言念親姻不忘勲力諭以呼韓羙志集作欵塞漢氏舊章戎不亂華國之大典且分兵食救彼饑人令歸漠南方議贍恤集作賑贍屬可汗乆嬰沉痼酋長異心雖隨蓄荐居固無定所而控弦深入頗已集作亦渝盟邊將戎集作良臣屢抗其集作章疏䇿慮副一作腷臆咸請驅除朕以王者之師以全取勝匈奴見短嘉婁敬之善籌馬邑設畫集作權戒王恢之兵首推誠含垢亦已踰時况朔雪沍寒有皸瘃之患隂山遥路多曲折之艱宜以徳綏豈勞兵瘁具官劉沔乆臨沙漠頗識虜情既啓十乗之行必致六驘之遁委之告喻方俟成功可守本官兼充招撫迴鶻使如不自改悔終須驅逐其諸道行營兵馬使擢令指揮主者施行授張仲武東面招撫迴鶻使制前人門下古人云兵者所以明徳除害也故舉得其集作於外則福生於内朕毎念戎事務安生靈既獲逺圗宜恢長筭迴鶻可汗寄託塞上未歸虜庭近者遣使薊門懇陳誠欵宋人病告於子反朝鮮心附於樓船我之信臣實得要領幽州盧龍節度副大使知節度事觀察處置押奚契丹两畨經畧盧龍軍等使銀青光禄大夫檢校工部尚書兼幽州大都督府長史御史大夫蘭陵郡王食邑三千户張仲武風雲感契鳬藻恊誠自升將壇屢集作首剪狂冦戈鋋亟聞於彗掃馬牛殆至於谷量故能望影揣情已探致虜之術豈止聞風破膽益堅慕義之心遽奏封章願申告諭彼既率服寜忘懐柔况虜騎徃來疾於風雷集作電沙場夐邈介集作但以山川臨敵應機固難統一昔衛霍之襲葷允異道而征辛趙之擊䍐集作當羌兩從其志成予廟勝之䇿在舉髦傑之臣俾爾鷹揚挫其狼顧將服蠻夷之叛固在七擒勉思將帥之風無㤀五利崇以夏官之秩委其統制之權當竭一心敬兹休命可檢校兵部尚書兼充東面招撫迴鶻使其當道行營兵馬及奚契丹室韋等並自指揮餘如故主者施行廵察使遣陸象先等依前按察制蘇頲黄門古者恊和萬邦疇咨四岳柔逺能邇明目逹聦以變於人也自朴散醇醨割方肆直失於徳者格之以禮失於禮者助之以刑故懼羅網而畏簡書必振其綱而操其柄庻乎舉二字詔令作平政之要也間嵗天下諸州岳牧先充本道按察誠以今之刺舉昔之率連盖欲為吏之黜陟審人之愁苦中念作姦犯科獲罪相次棄木或尤於拙匠採葑不以於下體由是申命有司咸多叙用至於按察暫令休罷夫泉有魚矣雖見則不祥林有獸焉而為之不採與其存而勿用孰若狎以玩之俾便於時復修其政銀青光禄大夫益州大都督府長史姚嶲處置兵馬上柱國兖國公陸象先等早藴宏量深甄大體清能勵俗仁以敦風必將權豪檢御昭明淑忒宜興化以樹善佇責成而求當可依前件餘各如故一事已上並准舊例處分本道所𨽻之州有偏逺不穏便者仍令所司量宜分割永為定額訖奏聞主者施行開元二年三月七日遣王志愔等各廵察本管内制前人黄門上天降禍大行太上皇厭代升遐俾予一人㷀㷀在疚攀號荼毒觸向摧隕百辟卿士等上遵遺誥下狥羣心寰區任殷社稷務重資於聽斷不可暫缺遂力衰迷甫從勤請恭惟顧託之㫖思致平和之化雖在荒瘵敢㤀負荷是用泣血撫膺執䘮視事夫後王者代天理物師表者助朕理人物之所以荗育人之所以蕃庶盖欲遂其性而安其業也朕毎置旌進善仄席翹賢恐閭閻有愁苦之聲草澤無明敭之舉吏或慢法官或非才因疑之致理且未為得其何以㢘庶詔令作敗政恤寃刑問惸婺招荗異寛賦歛節征詔令作更徭使天下為無為事無事也頃分連率則曰使臣將求人瘼克宣朕命諸道按察使揚州長史王志愔廣州都督宋璟益州長史韋杭博州都督詔令作蒲州刺史程行諶汴州刺史倪若水魏州刺史楊荗謙詔令作靈州都督強循潤州刺史李濬荆州長史任昭理泰州都督張嘉貞洪州都督楊虚受梁州都督張守潔等並邁迹垂憲偉才通識有其直方無所廽避宜令各廵本管内官人有清介獨立可以標映士林或文吏兼優可以潤益邦政者百姓中有文儒異等道極專門或武力超倫聲侔敵國者並精加訪擇具以名聞其官人有老弱及乆病妨於政理並才用劣下全不稱職者上佐已下委使人便停務其官交要者便簡清勤人權攝其京官及畿内州委御史大夫及吏部長官准此詳察録奏諸道僻逺州及嶺南道委使人量差判官分道廵按其天下囚徒慮有寃滯宜令大理寺及本廵使所在按理流罪已詔令作以下非犯名教及官典取受並聽減一等収贖即便非理均事可疑者并杖以下罪並宜放免縁山陵所科夫匠等有父母年老家無中男已上者容其侍飬不湏差遣其河南河北遭蝗虫州十分損二已上者差科雜役量事矜恤詔令作放百姓間有不穏便事委按察使與本州長官啇度隨事處分奏聞布告遐邇令知朕意主者施行開元四年七月六日按察使制詔令作遣陶史大夫王晙等廵按諸道制前人勑苛慝不作人斯無怨寛猛相濟政是以和周禮以官刑紏邦理以官叙正羣吏允廸前烈式惟舊章且夫寰宇至大不可以周覽黎甿至殷不可以獨化熈我庶政實惟具寮茍非其才罔以稱理朕惟夙夜不遑晏寜言念政道載深宵旰頃開元之𥘉分遣按部紏摘姦犯頗聞懲息以其事乆則煩尋亦並從停廢綿以嵗月浸成寛弛今聞在外官寮多違憲法牧守則寄任兹重令長則禄秩且優凾聞侵竊屢有章奏雖賜金為恵未媿張武之心而還珠表徳罕見孟嘗之政豈敦諭之言未孚於就列將貞髙之節有謝於前修永懐於此良用沉歎且政寛而慢法弊則弛通而張之庶其可理一作可其致理御史大夫王晙等並識通政要位以才逹荗其聲實𢎞此憲章宜分命廵按以時糾察廵内有長吏貪擾獄訟寃滯暗懦尸祿苛虐在官即宜隨事按舉所犯罪狀並推勘一作鞠凖格斷覆訖聞奏仍覆便囚夫牧宰之任一作職教道是先禄曹之職一作任紏綱一作綱紀斯在其有政績一作理殊尤清直獨立者咸以薦舉一作名薦餘官有清白著聞及諸色不善各别為科目同狀奏聞其尋常平狀並不湏通俾夫善取其尤罰無所濫踈而不漏宻一作察不為苛必將正其源流𢎞彼綱目不可揔此煩碎擾其吏人應是州縣常務事非損益者使人更不湏干預其百姓交下不支濟應處分訖奏聞一作置事有不便於人湏釐革者與州縣啇量處分訖奏聞宜副虚佇之懐以光澄清之舉其外官充使者至明年冬入朝京官湏奏任量事來去判官任使簡擇各依前件開元八年八月一作皆唐大詔令文苑英華巻四百六十一
