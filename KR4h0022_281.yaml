body:
  text: 文苑英華卷二百八十一宋李昉等編送行十六喻鳬六首李商隱一首薜逢七首姚鵠四首項斯四首趙嘏十四首馬戴六首顧非熊六首薛能九首送武㲄之邠寧喻鳬戍路少人蹤邉烟淡復濃詩寧寫别恨酒不止離容燕拂沙河桞鴉啼石窟鐘悠哉一遐集作暌阻山疊虜雲重以下六篇並見集本送賈島往金州謁姚員外前人山光與水色獨往此中深溪瀝椒花氣巖盤漆葉隂瀟湘終共去巫峽羡先尋幾夕江樓月元暉伴靜吟送友人罷舉歸蜀前人憔悴滿衣塵風光豈屬身賣琴紅粟貴看鏡白髭新棧畔誰高步巴邉自問津悽然集作恓恓莫滴血杜宇正哀春送衛尉之延陵前人草木正花時交親觸雨辭一官之任逺盡室出城遲乳滴茅君洞鴉鳴集作啼季子祠想知佐理暇日有詠懷詩送越州髙録事前人官曹權紀綱行李半舟航浦溆潮來廣川原鳥去長筍成稽嶺岸蓮發鏡湖香澤國還之任鱸魚浪得嘗送潘咸前人時時齎破囊訪我息閒坊煮雪問茶味當風看鴈行心齊山鹿逸句敵桞花狂堅苦今如此前程豈渺茫別薛巖賔李商隱曙爽行將拂晨清坐欲凌別離真不那風物正相仍漫水清集作任誰照衰花淺自矜還將兩䄂淚同向一忩燈桂樹乖真隱藝香是小懲清規無以况且用玉壺氷送西川梁常侍之新築龍山城并錫賚兩州刺史及部落酋長等薛逢聖主憂夷貊屯師剪束欽浪吉一名束欽皇家思眷祐星使忽登臨用命期開國違天必釁砧化須均草樹恩不間飛沉束馬凌蒼壁捫蘿上碧岑瘴川風自熱劔閣氣長隂迅瀨從天急喬松入地深仰觀唯一徑俯瞰即千尋水作新城帶山為故壘襟東開洞君聽南闢納蠻心渥澤濡三部謂三王部落衣冠化兩林帶文雕白玉符理篆黃金鳥道經卭𤏡星纒過觜參廽軒如一作知睿奬休作苦辛吟送西川杜司空赴鎮前人黑眉元髮尚依然紫綬金章五十年三入鳯池操國柄八分龍節付兵權東周城闕中天外西蜀樓臺落日邉莫遣洪爐曠真宰九流人物待陶甄送司徒相公赴闕前人承相銜恩赴闕時錦城寒菊始離披龍媒舊識朝天路雞樹長虛入夢枝十載殿庭連步武兩來庸蜀撫疲羸莫愁中土無人識自有明明聖主知送封尚書節制興元大封茅土鎮褒中醉出都門殺氣雄陌上晚花迎虎節馬前新月學彎弓珂臨響澗聲先合斾到春山色更紅欲識真心報天子滿旗全是發生風送靈州田尚書前人隂風獵獵滿旗竿白草颼颼劔氣攢九姓羌渾隨漢節六州蕃落從戎鞍霜中入塞雕弓硬月下翻營玉帳寒今日路傍誰不指穰苴門户慣登壇座中走筆送前蕭使君前人笙歌慘慘咽離筵槐桞隂隂五月天未學蘇秦榮佩印却思平子賦歸田芙蓉欲綻溪邉臉楊桞初迷渡口烟自笑無成今老大送君墮淚郭門前重送徐州李從事商隱前人曉乘征騎帶犀渠醉别都門摻袂初蓮府望髙秦御史桞營官重漢尚書斬蛇澤畔人烟曉戲馬臺前樹影踈尺組掛身何用說古來名利盡邱墟送人歸吳姚鵠東吳與上國萬里路迢迢為集作偶别晨昏久全輕水陸遙湘隂島上寺楚色月中潮到此一長歎集作望知君積恨銷以下四篇並見集本送石貫集作賈歸湖州前人同志幸同年髙堂君獨還齊榮恩未報共隱事應閒訪寺臨湖岸集作上開樓見海山洛中推二陸莫久戀鄉關送劉耕歸舒州前人四座莫紛紛須臾岐路分自從同得意誰不惜離群舊國連青海歸程在白雲棄繻當日路應競看終軍送黃頗歸袁州前人莫倦連朝在醉鄉孔門多戀惜分行文章聲價從來重霄漢途程此去長何處聽猿臨萬壑幾宵因月滯三湘爐峯若上應相憶不得同過惠逺房送殷中丞逰邉項斯話别無長夜停燈聞曙鴉巳行難避雪何處合逄花隴寺門多閉羌樓酒不賖還須問邉將誰擬靜塵沙送顧逄尉永康前人作尉猶年少無辭去路賖漁舟縣前泊山吏日髙衙夏景臨溪寺秋聲織紵家行程須過越應醉鏡一作滿非湖花送歐陽衮歸閩前人秦城幾年住猶著故鄉衣失意時曽識成名後獨歸海秋蠻樹黑嶺夜瘴禽飛為學心難滿知君更掩扉送苖七求職前人相逄不得三回笑風送離情入剪刀客路最能銷日月夢魂空自怕波濤獨眠秋寺琴聲急逺拜城隍劔氣髙去去緣多山與海鶴身寧不為飛勞送令狐郎中赴郢州趙嘏佐幕才多始拜侯一門清貴動神州霜蹄曉駐秦雲斷野斾晴翻郢樹秋幾處塵生隨候騎半江帆盡見分流大馮罷相吟詩地莫惜頻登白雪樓送張文新除溫州前人東晋江山稱永嘉莫辭紅斾向天涯凝絃夜醉松亭月歇馬曉尋溪寺花地與剡川分水石境將蓬島共烟霞却愁明詔徴非晚不得秋來見海槎集作乘秋見海槎共烟霞共集作接送滕邁郎中赴睦州前人郡齊秋盡一江橫頻命郎官地更清星月去隨新詔動旌旗遙映故山明詩尋片石依依晚帆掛孤雲杳杳輕想到釣臺逄竹馬只應歌詠伴猿聲送蕭俯相公歸山前人眼前軒冕是鴻毛天上人情謾自勞脫却朝衣便東去青雲不及白雲髙送王龜拾遺謝官後歸滻水山居前人水邉殘雪照亭臺臺上風襟向雪開還似當時姓丁鶴羽毛成後一歸來送剡客前人兩重江外片帆斜數里林塘繞一家門掩右軍餘水石路橫諸謝舊烟霞扁舟幾處逄溪雪長笛何人怨一作思桞花若到一作到日天台洞陽觀葛洪丹井在雲涯集作丹竈在雲涯送盧緘歸揚州集作盧針前人曽向雷塘寄掩扉荀家燈火有餘輝關河日暮望空極楊桞渡頭人獨歸隋苑荒臺風裊裊灞陵殘夢雨依依今年春色還相誤為我江邉謝釣磯李先輩擢第東歸有贈送前人金榜前頭無是非平人分得一枝歸正憐日暖雲飄路何處宴回風滿衣門掩長淮心更逺渡連芳草馬如飛茂陵自笑猶多病空有書齊在翠微送李裴評事集夲無李字前人塞垣從事識兵機只擬平戎不擬歸入夜笳聲含白髮報秋榆葉落征衣城臨戰壘黃雲晚馬渡寒沙夕照微此別不應書斷絶滿天霜雪有鴻飛白髮集作素髮城臨集作城連此别集作别後送同年鄭祥先輩歸漢南時恩門相公鎮山南前人年來驚喜兩心知髙處同攀次第枝人倚繡屏閒賞夜馬嘶花徑醉歸時聲名夲自文章得藩閫曽勞筆硯隨家去恩門四千里只應從此夢旌旗送沈單作尉江都前人煬帝都城春水邉笙歌夜上木蘭船三千宮女自塗地十萬人家如洞天熖㷔花枝官舍晚重重雲影寺墻連少年作尉須矜慎莫向樓前墜馬鞭送李藴赴鄭州因獻盧郎中又𤣥集作中丞前人僕射陂西想到時滿川晴色見旌旗馬融閒卧笛聲逺王粲醉吟樓影移幾日賦詩秋水寺經年草詔白雲司唯君此去人多羡却是恩深自不知到時集作别時草詔集作起草送韓絳歸淮南寄韓綽先輩前人島上花枝繫釣船隋家宫畔水連天江帆自落鳥飛外月觀靜依春色邉門巷草生車轍在朝廷恩及鴈行聫相逄且問昭州事曽鼓莊盆對逝川且問昭州事集作莫問揚州事送薛耽先輩歸謁漢南前人雲繞千峯驛路長謝家聫句待檀郎手持碧落新攀桂月在東軒舊選牀幾日旌幢延駿馬到時氷玉動華堂孔門多少風流處不遣顔回識醉鄉送田使君出蔡州馬戴主意思政理牧人官不輕樹多淮右地山逺汝南城望稼殷田隔登樓楚月生懸知蔣亭下渚鶴伴閒行送吕郎中牧東海郡前人假道經淮泗檣烏逐隼旟蕪城沙菼接波島石林踈海鶴公庭下夷人逺岸居山鄉足遺老佇聽薦賢書送人逰蜀前人別離楊桞陌迢遞蜀門行若聽清猿後應多白髮生虹霓侵棧道雨雪雜江聲過盡愁人處烟雲是錦城送狄參軍赴杭州前人新官非次受聖主寵前勳關雪發車晚風濤挂席聞海門山疊翠湖岸郡藏雲執簡從公後髯參豈勝君送從弟一作叔赴南幕前人洞庭秋色起哀狖更難聞身往海邉郡帆懸天際雲炎州羅翠鳥瘴嶺控蠻軍消息來非易堪悲此路分雪中送青州薛評事前人臘景不可犯從戎難自由憐君急王事走馬赴邉州嶽雪明日觀海雲冒營邱慙無斗酒瀉敢望御重裘送杭州姚員外顧非熊浙江江上郡楊桞到時春塹起背城鴈帆分向海人嶠雲侵寺吐汀月隔樓新靜裡更何事還應詠白蘋送朴處士歸新羅前人少年離夲國今去已成翁客夢孤舟裡鄉山積水東鼇沉崩巨岸龍鬪出遙空學得中華語將歸誰與同送馬戴入華山前人古木亂重重何人識去蹤斜陽收萬壑圓月上三峰雲裏泉縈石窗間鳥下松唯應採藥客時向此相逄送喻鳬春歸江南前人去年登第客今日早春歸鶯影離秦馬蓮香入楚衣里閭爭慶賀親戚盡光輝唯我門前渚苔應滿釣磯送友人及第歸蘇州前人見君先得意希我命還通不道才堪並多緣蹇共同鶴鳴荒苑內魚躍夜潮中若問家山路叨連震澤東送皇甫司録赴黔南幕前人黔南從事客祿利先來饒官受外臺屈家移一舸遙夜猿聲不斷寒木葉微凋逺别因多感新郎倍寂寥送浙東集作西非王大夫薛能天爵擅忠貞皇恩復寵榮逺源過晉史甲族夲緱笙亞相兼尤美周行歷盡清制除天近曉衙謝草𥘉生賔客招閒地戎裝擁上京九街集作衢鳴玉勒一宅照紅旌細雨當離席遙花顯去程佩刀畿甸色歌吹館橋聲騕裊從秦賜艅艎到汴迎步沙逄霽月宿岸致嚴更渤澥流東鄙天台壓屬城衆談稱重鎮公意念疲氓井邑曽多難瘡痍此未平察應均賦斂逃必復桑耕隼重權兼帥鼉雄設有兵越毫隨厚俸剡硾得尤名近相傳搗熟紙名硾夜蠟集作獵州中宴春風部外行香奩扃鳯詔朱篆動一作進龍坑報後功何患投虛論素精徵還真指掌感激自關集作閒情舊業懷昏作微班負旦評空餘騷雅事千古傲劉楨以下九篇並見集本送李殷遊京西前人立馬送君地黯然愁到身萬途皆有匠六義獨無人莫怪敢言集作言如此已能甘世貧時來貴亦在事是掩何因投刺皆羇旅逰邉更苦辛岐山終蜀境涇水覆蠻塵埋沒餐須強炎蒸集作凉醉莫頻俗徒欺合得吾道死終新展分先難許論詩永共親歸京稍作意充斥犯西鄰長安送友人之黔疑作湖南前人衡嶽猶云過君家獨幾千心從賤逰話分向禁城偏陸路終何處三湘在素船琴書去迢遞星路照潺湲臺鏡簮秋晚盤蔬飯雨天同文到鄉盡殊國共行連後㑹應多日歸程自一年貧交永無忘孤進合相憐送胡澳下第歸蒲津前人無媒甘下集作不飛君子尚麻衣嵗月榮終在家園近且歸山光臨舜廟河氣隔王畿甚積湯原思青青宿麥肥湯原故地送馬戴書記之太原前人一曲大河聲全家幾日行從容長約夜差互忽離城鎮北湖沙淺途中霍嶽橫相於莫已泛詩句負雄名送進士許棠下第東歸前人長安那不住西笑又東行苦似貧無計因何事有成雲峯天外出江色草中明謾忝相知分吾言世甚輕送劉駕歸京前人相逄聽一吟惟我不降心在世憂何事前生得至音蒲多南去逺汾盡北遊深為宿關亭日蒼蒼曉欲臨送李溟出塞見二百九十九卷前人送李涪巡官歸永樂舊居前人羡君歸處集作去五峯前往往星河實見仙麥隴夏枯成廢地棗枝秋赤近髙天山泉飲犢流多變村酒經蠶味可憐曽託道門終却住步虛聲裡寄閒眠文苑英華卷二百八十一
