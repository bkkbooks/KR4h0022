body:
  text: 文苑英華巻三百宋李昉等編軍旅二邉將六十四首邉城將四首吳均塞外何紛紛胡騎欲成羣爾時始應募來投霍將軍刀含四尺影劔抱七星文袖間血灑地車中旌拂雲輕軀如未殯終當厚報君二僕本邉城將馳射靈闗下箭銜鴈門石氣振武安瓦勲輕賞廢丘名髙拜横野留書應鑿楹傳功須勒社徒傾七尺命酬恩終自寡三聞君報一飡逺送出平野玉標丹霞劔金絡艷光馬髙旗入漢飛長鞭歴地寫曙星海中出曉月山頭下嵗晏坐論功自有思一作恩臣者四臨淄重蹋鞠曲城好擊刺不要身後名專騁眼前智君㸔班定逺立功不負義掣拽二丈旗躑躅雙鳬騎但問相知否死生無險易送魏大從軍陳子昂匈奴猶未滅魏絳復從戎悵别三河道言追六郡雄鴈山横代北狐塞接雲中勿使燕然上獨有漢臣功安輯嶺表事平罷歸李嶠雲端想京縣帝鄉如何見天涯望月䑓海路幾悠哉六月飛鵬去三年瑞雉來境遙銅柱出山險石門開自我違瀍洛瞻途屢揮霍朝朝寒露多夜夜征衣薄白簡承朝憲朱方撫夷落既宏天覆廣且諭皇恩博皇恩溢外區憬俗詠來蘇聲朔臣天子壇場拜老夫絳營韜將畧黄石請兵符返斾收龍虎空營集鳥烏日落澄氣藹慿髙視衿帶東甌抗于越南斗臨吳會春色遶邉陲飛花出荒外卉服紛如積長川思逰客風生丹桂曉雲起蒼梧夕去軸艤清江歸軒趨紫陌衣裳㑹百蠻賝賮委重關不學金刀使空持寳劔還送趙頥貞郎中試集作赴安西副大都護張説絶鎮功難立懸軍命匪輕復承遷相後彌重任賢情将起神仙地才稱禮樂英長心堪繫虜短語足論兵日授休門法星教置陣名龍泉恩已著集作署鷰頷相終成月窟窮天逺河源入塞清老夫操别翰承㫖頌營平同餞陽将軍兼原州都督御史中丞蘇頲右地接龜沙中朝任虎牙然明方改俗去病不為家将禮登壇盛軍容出塞華朔風摇漢皷邊月思胡笳旗合無邀正一作整冠危有觸邪當㸔榮旋日及此御溝花送趙都護赴安西張九齡将相有更踐簡心良獨難逺圖長畫地超拜乃登壇戎即崑山序車同渤海單義無中國廢情必逺人安他日文兼武而君集作今栗且寛自然來月窟何用刺樓蘭南去三冬曉集作晩西馳萬里寒封侯自有處征馬去嘽嘽送趙都督赴戈州得青字王維天官動将星漢地集作沚栁條青萬里鳴刁斗三軍出井陘忘身辭鳳闕報國取龍庭豈學書生輩窓中老一經贈裴旻将軍腰間寳劔七星文臂上琱弓百戰勲見説雲中擒黠虜始知天上有将軍送趙都䕶赴安西孫逖外域分都護中臺命職方欲傳清廟畧為取劇曹郎已佩登壇印猶懐伏奏香一作章百壺開祖餞駟牡結戎装青海連西夐黄河帶北凉關山瞻漢月戈劍宿胡霜體國才先著論兵策復長果持文武術還繼晉一作壮當陽送軍中賀知章常經絶脉塞復見斷腸流送子成今别令人起昔愁隴雲晴半雨邉草夏先秋萬里長城寄無貽漢國憂投贈哥舒開府翰二十韻杜甫今代麒麟閣何人第一功君王自神武駕馭必英雄開府當朝傑論兵邁古風先鋒百勝在畧地兩隅空青海傳飛集作無傳箭天山早挂弓廉頗仍走敵魏絳已和戎每惜河湟棄新兼節制通知謀垂眷想出入冠諸公日月低秦樹乾坤遶漢宫胡人愁逐北宛馬又從東受命邊沙逺歸來御席同軒墀曾寵鶴畋獵舊非熊茅土加名數山河誓始終策行冝戰伐契合動昭融勲業青冥上交親氣槩中未為珠履客巳是白頭翁壮節初題柱生涯獨轉蓬幾年春草歇今日暮途窮軍事留孫楚行間識吕䝉防身一一作腰間有長劔聊集作将欲倚崆峒送羽林陶将軍李白将軍出塞擁樓船江上旌旗拂紫烟萬里横戈探虎穴三杯㧞劍舞龍泉莫道詞人無膽氣臨行将贈繞朝鞭餞王将軍赴雲中孟匡明貳師慿廟略分閫佐元戎勢亞彤弓寵時推金印雄關山横代北旌節壮河東日轉前茅影春生細栁風飲氷君一作傳命速揮涕餞一作别筵空佇聼隂山静誰争萬里功送李大都護常建單于數不戰都護事邊深君執幕中祕能為高士心海頭近初月磧裏多愁隂西望郭猶子将分淚滿襟送單于裴都護赴西河崔顥征馬出翩翩秋城月正圓單于莫近塞都護欲臨邉漢驛通烟火胡沙乏井泉功成須獻捷未必去經年贈梁州張都督前人聞君為漢将虜騎不南侵出塞清沙漠還家拜羽林風霜臣節苦嵗月主恩深為語西河使知余報國心古逰俠呈軍中諸将前人少年負膽氣好勇復知機杖劍出門去孤城逢合圍殺人遼水去一作上走馬漁陽歸錯落金鎻甲䝉茸貂䑕衣還家且行獵弓矢速如飛地廻鷹犬疾草深狐兔肥腰間帶兩綬一作鞬轉眄生光輝顧謂今日戰如何隨劍威此詩三百三十三巻重出今已削去注異同為一作贈輕車前人悠悠逺行歸春日涉長道幽冀桑始青洛陽蠶欲老憶昨戎馬地别時心草草烽火從北來邊城閉常早平生少相遇未得展懐抱今日杯酒間見君交情好送南特進歸行營劉長卿聞道軍書至揚鞭不問家虜雲連白草漢月到黄沙汗馬河源飲燒羌隴坻遮翩翩新結束去逐李輕車代邊将有懐前人少年辭魏闕白首向沙塲瘦馬戀秋草征人思故鄉暮笳吹塞月曉甲帶胡霜自到雲中郡于今百戰强送人赴安西岑參上馬帶呉鈎翩翩度隴頭小來思報國不是愛封侯萬里鄉為夢三邊月作愁早須平敵至無事莫經秋贈劉将軍韓翃明光細甲照錏鍜昨日承恩拜虎牙膽大欲欺姜伯約功多不讓李輕車青巾校尉遥相許黒矟将軍莫太誇闕下來時親伏奏胡塵未盡不為家送李将軍赴定州郎士元䨇旌漢飛将萬里受横戈春色臨關盡黄雲出塞多皷鼙悲絶漠烽戍隔長河莫斷隂山路天驕已請和代員将軍罷戰後歸里贈朔北故人盧綸結髮事疆塲全生俱到鄉連營防鐵嶺同日破漁陽牧馬胡天晩移軍磧路長枕戈眠古戍吹角立繁霜歸老勲仍在酬恩慮未忘獨行過邑里多病對農桑雄劔依塵席隂符寄藥囊空餘麾下将猶逐羽林郎贈史開府戴叔倫南天胡馬獨悲嘶白首相逢話皷鼙野戰頻年沙朔外旌竿高與雪峯齊扁舟逺泛輕全楚落日愁㸔舊紫泥早晩瑶階歸伏奏獨一作猶能畫地取關西贈淮西賈兵馬使已見二百五十七巻晩秋贈張折衝此公事制舉薛業都尉今無事時清但閉關夜霜戎馬瘦秋草射堂閑位以穿楊得名因折桂還馮唐真不遇嘆息鬢毛斑贈老将權徳輿白草黄雲塞上秋曾隨驃騎出并州轆轤劍折虬鬚白轉戰功多獨不侯奉使朔方贈郭都護李華絶塞臨光緑孤營佐貳師鉄衣三月冷金皷朔風悲都護徴兵日将軍破虜時揚鞭玉關道廻首望旌旗河原破賊後贈袁将軍釋法震白羽三千駐蕭蕭萬里行出關深漢壘帶月破蕃營蔓草河原色悲笳碎葉聲欲朝王母殿前路駐高旌贈張開府耿緯寥落軍城暮重城反照間皷鼙經雨暗士馬過秋閑慣守臨邊郡曾營近磧山誰云張校尉萬里鑿空還代宋州将淮上乞師唇齒幸相依危亡故郡歸身經百戰後家出數重圍上将堅深壘殘兵闘落暉嘗聞鐡劒利早晩借餘威上将軍行前人蕭關掃定犬羊羣閑閣層城白日曛櫪上驊騮嘶皷角門前老将識風雲旌旗四面寒山映簫管千家静夜聞更想他時㸔竹帛功成不獨霍将軍此詩二百五十四巻重出題作上裴行軍中丞詞頗不同全載於此贈隣家老将楊巨源白首羽林郎丁年戍朔方隂天瞻磧落秋日渡遼陽大漠寒山黒孤城夜月黄十年依蓐食萬里帶金瘡拂雪陳師祭衝風立教場箭飛瓊羽合旗動火雲張虎翼分營勢魚鱗擁陣行誓心清塞色鬬血雜沙光戰地晴輝薄軍門曉氣長寇深争暗襲關迥勒春防身賤竟何訴天高徒自傷功成封寵将力盡到貧鄉雀老方悲海鷹衰却念霜空餘孤劔在開匣一霑裳征人楊衡西風屢鳴鴈東郊未昇日繁烟羃羃昏暗騎蕭蕭出望雲愁玉塞眠月想蕙質借問露沾衣何如香滿室漁陽将張籍塞深沙草白都護領燕兵放火燒奚帳分旗築漢城下營㸔嶺勢尋雪覺人行更向桑乾北擒生問磧名安西将前人萬里海西路茫茫邊草秋計程沙塞口望伴驛峯樓雪暗非時宿沙深獨去愁塞鄉人易老莫住近蕃州據張籍集安西将送邊使各是一詩今英華送邉使詩已入二百九十七巻而此安西将一篇却誤以送邊使詩充之今用集本釐正征西将前人黄沙北風起夜半又離集作翻營戰馬雪中立探人氷上行深山旗未展隂磧皷無聲幾道征西将同収碎葉城送防秋将前人白首征西将猶能射㦸支元戎選部曲軍吏換旌旗逐虜招降逺開邊舊壘移重収隴外地應似漢家時劒氣詞三首姚合聖朝能用将破敵速如神掉劒龍纒臂開旗火滿身積屍川有岸流血野無塵今日當場舞須集作還知是戰人二夜渡黄河水将軍險用師雪聲集作光偏著甲風力不禁旗陣變龍蛇合軍雄皷角知今朝意氣集作重起舞記得戰酣時三破虜行千里三軍氣益集作意氣麤展旗遮日黒驅馬踏河枯隣境求兵畧皇恩索陣圖元和太平日自古恐應無送振武将軍李廓葉葉歸邊騎風頭萬里乾金装腰帶重錦綘耳衣寒蘆酒燒蓬煖霜鴻撚箭㸔黄河古戍道秋雨白漫漫老将賈島膽壮亂鬚白金瘡蠧百骸旌旗猶入夣歌舞不開懐鷰雀來鷹架塵埃滿箭靫自誇勲業重開府是官階贈王将軍前人宿衛爐烟近除書墨未乾馬曾金鏃中身有寳刀瘢父子同時捷君王畫陣㸔何當為外帥白日出長安贈金河戍客雍陶慣獵金河路曾逢雪不迷射鵰青塜北走馬黒山西戍逺旌幡少年深一作少年帳幕低酬恩須盡敵休說夢中閨罷還邊将前人白鬚虜将話邊事自失公權怨語多漢主豈勞思李牧趙王猶是一作自用廉頗新鷹飽肉唯閑獵舊劒生衣懶更磨百戰無功身老去羨他年少渡黄河贈邊将姚鵠三邊昔一作近日往來通盡是将軍鎮撫功兵統萬人為上将威加千里懾一作攝西戎清笳遶塞吹寒月紅斾當山肅曉風却恨北荒霑雨露無因掃盡虜庭空邊将馬戴玉榼酒頻傾論功笑李陵紅韁跑駿馬金鏃掣秋鷹塞逈連天雪河深徹底氷誰言提一劒勤苦事中興送武陵王将軍前人河外今無事将軍有戰名艱難長劒閣功業少年成曉仗親雲陛寒宵突禁營朱旗身外色玉漏耳邊聲開閤談賔至調弓過鴈驚為儒多不達見學請長纓贈蜀府将蠻入成都頗著功勞温庭筠十年分散劒關秋萬事皆隨一作從錦水流志一作心氣已曽明漢節功名猶尚帶一作自滯呉鈎鵰邊認箭寒雲重馬上聽笳塞草秋今日逢君倍惆悵灌嬰韓信盡封侯此詩二百六十一巻重出前已削去注異同為一作傷邊将前人昔年戎虜犯榆關一敗龍城疋馬還侯印不聞封李廣别人丘隴似天山送魏尚書赴鎮州行營張祜河塞日駸駸恩酧報盡深伍員忠是節陸績孝為心坐激書生憤行歌壮士吟慙非燕地客不得受黄金贈邊将張喬将軍誇膽氣功在殺人多對酒擎鍾飲臨風㧞劒歌翻師平碎葉畧地取交河應笑孔門客年年羨四科河湟舊卒前人少年隨将討河湟頭白時清返故鄉十萬漢兵零落盡獨吹邊曲向殘陽宴邊将前人一曲梁州今不清邉風蕭䬃動江城坐中有老沙場客横笛休吹塞上聲邉将二首張蠙歴戰燕然北功高劒有威聞名外國懼輕命故人稀角怨星芒動塵愁日色㣲從為漢都護未得脱征衣二按劒立城樓西㸔極海頭承家為上将開地得邊州磧逈兵難伏天寒馬易収胡風一度獵吹裂錦貂裘邉将羅鄴馬上乗秋欲建勲飛狐夜鬭出師頻若無紫塞煙塵事誰識青樓歌舞人戰骨沙中金鏃在賀筵花畔玉蟾新由來邊卒皆如此只是君門合殺身平陵老将韋莊白羽金僕姑腰懸雙轆轤前年葱嶺北獨戰雲中胡疋馬塞垣老一身如鳥孤歸來辭第宅却占平陵居贈邉将前人昔因征逺向金㣲馬出榆關一鳥飛萬里只攜孤劒去十年空逐塞鴻歸手招都護新降虜身著文皇舊賜衣只待煙塵報天子壮心無事别無機文苑英華巻三百
