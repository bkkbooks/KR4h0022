body:
  text: 文苑英華卷四百八十九宋李昉等編體用才識兼茂明於體用策一道直言賢良方正直言諌諍策一道才識兼茂明於體用策策目見四百八十七卷元稹同羅讓對臣聞千業萬化聖帝哲王聲烈遐戴者無他中心無為以守至正而已矣以謀大化而己矣伏惟皇帝陛下垂拱六極始初清明丕揚纍休渙發于詔啓天宇而遡古薰至和以拯今咸懷浸沉罔不濡澤誠至正也誠大化也猶復乃逺乃近乃左乃右旁求下問舉薦奔走履衆美而不顓儲神明其如遺銓邦政之肥瘠鏡人事之善敗優遊紬繹以循一作修始終外其牽制常其忌諱恢乎輮􅞂百王之獨致也臣愚智能淺薄不明大體時用之宜術業暗昧不充才識兼茂之稱徒冒萬死觸罪以聞臣伏讀聖策首陳禹拜漢徵之旨求索真之要臣聞上古之君薰能同和不敢自是必求讜諫以諭缺敗用心之過則薄奬其人言之失中則寬容無虞使人上得其情下得流通也一作使夫上下其情得流通也後代帝王雖有作者道或外是已實內非言之或臧寥寥無聞言之或違隄防斯至雖科條增設適足張其亂目矣叩擊切害適足寵其直聲矣聞之失得君之效歟今陛下躬神聖之資痛源流之塞較量至當加迪今來黜退姦邪咨謀體要誠猜雄者之所共逺亦狹隘者之所共難凡曰胸臆是皆聳實詳近一作延語直之幸也伏見聖策咨問兵戰商農之道臣請指事而言之臣聞兵者以謀全以氣勝以謀全制度為神耳得其數則威令格物少能成功失其數則黠疑作黷武無别一作列多益為弊寢疑作寖用不制刑于宇內今國家自兵興以來僅數十年生物以之暴殄人情以之盩違殆握兵者建置失其道歟何者天下之甲兵其數則不廣屯置散地且或至半而兵柄之臣率好生事不思戢伏貴算威名則有崇廣卒徒之員聚擁虓闞之羣厚斂殘下偷取一切要君飬敵張軍自衛望容攻守之至復有懷弱軟以內顧務儲蓄以託私倚行伍之數訖資廪之具外實內虛守以藉之固者及殷而成一作乘之熊疑而戰之其中未必有也朝廷又影響誅罰索其效死其可得乎此兵之所以煩而益病也而人之所以困而不解也大抵不賢者得掌其兵百則思兵千尋掌其兵千又思兵萬尋掌其兵萬又思兵數萬以因其力以贍其欲長一日之廢代一作誅伐謀萬里之策勳徒仰費於縣官髙疑病於悠久誠何謂矣陛下盍亦慮之乎伏望躬親視其將帥之為茍非任盡易之不令其凝一作疑留而後圖也嚴備其要地之屯茍不切盡罷之不令其廣置而出入也其所閲揀非實不用其所樹置兵精不在多使名弓者必用沓發之巧名劒者必有刺擊之妙名騎者必有超乘之捷名步者必有卒奮之竒自外徂中歸乎一體自然無冗軍無惰人以守則固以戰則勝軍無大半之耗人懷反業之心此減兵之術也富庶之教於是乎生亦何逺取於古法也然而思戀本之心蠲重賦之困又在於賦稅之道矣臣請得而具之臣聞古者因地而料人今則稅人而舍地古者任土而作貢今則溢貢而棄土古者均田而抑富今則與富而奪貧是以人口剪耗而不息田畝汙萊而甚曠者非人懷茍且之志樂懈惰之方迫不可忍勢有由耳王者在上量入以出祿食賜與歲養經費必厚下以為用助而不稅㕓而不征亦非無其事也用菽粟藁秸有常稅人不愛也絲枲布帛有常賦人不艱也雜以凶荒接以喪死間以興廢子弟父兄猶復勉勵率從不更其業何者制度專也以臣觀之則今之賦稅仍舊貫籍斂不加重而畎畝流離窮困無告殆執事有殊陛下之意乎必有急令暴賦發取無厭徭山役海詭求無狀竒貢珍獻希冀無怠託公寄私崇聚無極於是一水一土一草一木圭要殫利俯𣙜仰算蒞之官焉專守之刀兵焉商不得回睨農不得舉手既奪其利又却其人此而不困孰以為困榷酤之道如是乎人顧其上猶仇讐安能思戀骨肉乎人視其居猶鳥獸安肯繫著桑井乎人慳其取猶冦盜安望輕重元本乎所以遁走茍免死亡不顧財日窮而事日削地益無疑作蕪而人益煩猶前事也伏惟陛下審念之其有不經不度之人不常不政之調必禁其所萌必罰其所自則姦官濫守慎不敢生事生生之理阜繁矣陛下又以禮節其情以樂樂其志又何患乎不復其盛不濟其難一作艱臣伏見聖策顧問既往將來之事臣謹以江淮凶旱之事明之臣聞凡有災傷水旱之處歷代所説多聞詭隨之詞媚時主必曰帝堯乎有懷山襄陵之運也成湯乎有流金鑠石之運也是皆曲骩非愚則誣臣嘗私怪之何不曰大舜乎無雷風霜雹之運也神禹乎無飛流彗孛之運也不直其詞因循若是天運之時集變易水旱歲時未為災也理或失中感動陰陽頃刻為災也故精舒謹孚則七年不足罹其咎簡誣輕忽則一日二日亦未成其災修政著誠端心復德既往之事陛下宜以此為懲矣然臣之所慮江淮又急者禦災之術將來之戒復憂於斯願悉數於陛下矣今國家內王畿外諸夏水陸綿地四面而逺而輸明該之大貴一作費根本實在於江淮矣何者隴右黔中山南已還墝瘠嗇薄貨殖所入力不多也嶺南閩蠻之中風俗越異珍好繼至無大贍也河南河北河東已降甲兵長積一作漬農厚自任又不及也在最急者江淮之表裏天下耳陛下得不念之乎屬頃者連郡五十蒙被災旱長老聞見未之曾有涯脈川澤坌為埃塵草木發為煙火斗粟之價重於兼金餓莩之家十有七八聞乞僕於男女者何暇保其家室乎聞立死於道路者何暇思其粳粃乎嗷嗷蒸徒展轉無所灰燼狼顧至今未寧且今日狼顧明日狼顧力大勢詘禍欲何圗此臣所為陛下惜也長吏者又聞或非良善厚其毒忍療疑痏而簡問威剝而自虞則陛下雖有賑發不輕得及雖有蠲放不輕得獲雖有詔諭不輕得聞此臣所為陛下疑也然欲安存緝理斯終何由以臣計之視長吏之悖理者選其重臣代之不待其為蛇為虺也察郡縣之受災者擇其實以勞之不使其寃而無告也如此則朝令夕悅江淮保全則四嚮賦稅轉輸肩摩轂擊關中坐固而根本不搖猶無凶旱矣臣故曰將來之由在此而已矣臣伏見聖策次問推恩寓令之計夫漢朝錯陳諸侯削地之制謀之至者主父偃獻子弟推恩之令計之術者削地之制行則轉弛為急七國之難結推恩之令下則強幹弱枝一王之理定猶見之熟與不熟法之漸與不漸在於漸也則寒暑得其相成以暴則天地不能速化求之昔意庶取於今又齊桓之霸國管仲之寓令晝戰足以目相識夜戰足以耳相聞將取威於鄰敵俾逞志於天下五霸之事仲尼之門五尺童子猶羞言之若此者則小國權臣之細術耳臣固不能為陛下述伏讀聖策次問專委儒術者臣聞聖王在上賢臣在下道德兼濟材智樂備專於上則聰明倍資安有無其效耶委於下則公器相率安有用其私耶然今以陛下之資材清光群臣其敢及若集事者在陛下必躬必親之謂乎躬之無偏親之有制則埀衣執契亦不爽矣孝元則制自左右非用儒之失也光武則弊及羣下非用課之得也儒近於得而所用者宜一變其弊若臣所見今之大者政或貴此可得而言國朝自武德已來典章甚明職員甚列官吏甚該備而道不𢎞政要或未臻者其官非人歟理非道歟略其大歟録其小歟臣所謂小者則天官卿采之調閲致驗選書至於一簿一尉一掾之末銓次升降勞而後罷是詳於核小也及其揣量親人撫字之官又未喻也臣所謂大者天子之庭日相日受軼越倫輩乃有名邦聞邑羣居之柄不階課最是非未聞蹤迹賢不肖欵言喧譁隨其所來轉化容易似不留聽是鹵莽於天下也詳核及小鹵莽及大輕重反殊使盜名死官之徒波走飈馳惟恐居後狂扇誘掖寵賂為事以相終始夫復何望夫持尺寸之祿懷輕握微齟齬施為尚猶不堪况明權不制一作濟資藉殺生之柄兼兵馬之衆連數十城之地庸雜橫恣偷居其上何以堪之設曰不堪耳目陰附事亦無由得而聞悔之何益耶陛下得不慎其所授乎臣以為今之郡縣長帥之官最關生人性命用在百里之父母莫如縣宰君乎千里之父母莫如刺史列城之父母莫如郡統使一得之必小康二得之必中康三得之必大康矣陛下雖不在驅天下之人洽於理平終亦無由誠不在多惟慎此三官而已矣臣又聞書曰爵罔及惡德春秋傳曰官之失德在所納邪惟君無邪則不納邪矣夫偏聽獨任牽於左右所自邪也小臣大祿制度失中所自邪也錦文珠玉淫佚充斥所自邪也教令察視壅遏不宣所自邪也掊克聚斂億度於上所自邪也依阿求同徑而不道所自邪也煩察繳縳弊歸於下所自邪也坐躋仁夀陛下又何疑乎不得浩然其心此微臣之志也伏惟審察之伏惟審念之臣伏見聖策終有究旨屬篇之説者臣固無以道師之説僅能勿墜耳俯仰睿問偃薄無所震其心熟知不免寧不自勝攀懇之至一作震其心胸如不克寧不勝云云謹對賢良方正直言極諫策元和三年二月二十三日問皇帝若曰蓋聞古登科記作昔之令王體上聖之姿御大寧之時猶懼理之未至也求賢以致用猶懼動之不中也咨諫以聞道登科記作過矧惟寡昧膺受多福思負荷之重警風波之虞求賢咨諫豈敢忽怠至若窮神知化以盛其德經緯文武登科記作經武緯文以大其業考古會極通教化之源明目達聰周視聽之表斯夙夜之所志也子大夫將何以匡逮登科記作建而致之乎自中代以還求理者繼作皆意甚砥礪而效難彰明莫不欲還朴厚而澆風常扇莫不欲遵儉約而侈物常貴莫不欲逺小人而巧諛常進莫不欲近莊士而忠直常疏莫不欲勉人於義而廉愧集作隅常不修莫不欲禁人之登作無字為非而抵冒常不息其所謬盩豈無根源爰自近歲仍敷大澤霜露所墜霑濡必同滌瑕穢以導人心省徭役以豐物力蠲田租以厚農室葺國學以振儒風督廢職以補維綱備衆官以敘賢俊庶繼先志臻乎治平而改行者未聞輸勞者未艾登科記作乂農者無以免艱食學者無以通微言立事之迹未紀於庶工乏才之嘆未輟於終食蠧於法者無不去而法未修明切於政者無不行而政未光大豈丕變其俗道廣而難濟乎豈不得其門事繁而愈大乎佇聞嘉言無或隱諱周之德受田有經制漢之法力登科記作名田有恆數今疆畛相接半為豪家流傭登科記作庸無依率是編户本為登科記作於交易焉得貪三字集作奪富以補貧將欲因循是曰文粹作豈至二字集作豈損多而益寡一作少酌於中道其術如何取人惟其行不必文采命官惟其才不必資考然則行非造次而備察才非錯綜而遍知不必文采為輕重而士可進退不必資考為程凖而吏有條貫適變矯枉渴集作合於良規何方可以序六氣來百祥何施可以夀羣生仁衆姓徵於前訓而可登科記作有據設於當代而易從勿猥勿并以稱朕意對皇甫湜對臣伏見陛下徵天下之士親策於廷求賢思理亦云至矣然臣未知將以為虛策乎將以求其實效乎以為虛策則後之縉紳者觀書於太史氏曰天子之憂人如此急賢如此徵賢良方正直言極諫之士親禮而問之斯亦足以為名矣若以得人為務社稷之計為心則不宜待之如是也夫王者其尊集作道如天其威如神以諛集作聘問先之以禮貌接之造膝而言虛心以受猶恐懼殞越而不得自盡其所懷况乎坐之階庭試以文字拳曲俯僂承問而上對乎且天下之事雖一二以疏舉臣所當言又有非臣下所宜聞知清問所不該文粹作説又鬱而不得發強附之於篇考視者必以為餘煩又擯而不得進文粹作通矣陛下何惜一賜臣容足之地於冕旒之前使得熟數之乎可采則行之無用則罷之何損於明也然臣不敢有望於是謹旁緣聖問粗竭遇瞽儻陛下憐察其志而寬其誅賜之當一作異日之問而卒其説則覆照之下形氣之生孰不甚幸制策曰蓋聞昔之令王體上聖之姿御大寧之時猶懼理之未至也求賢以致用猶懼動之不中也咨諫以聞道集作過矧惟寡昧膺受多福思負荷之重警風波之虞求賢咨諫豈敢怠忽至若窮神知化以盛其德經緯文武集作經武緯文以大其業考古會極通教化之原明目達聰周視聽之表斯夙夜之所志也子大夫將何以匡逮集作建而致之乎此陛下之憂勤如此集作切至也臣聞堯舜以有天下為已之纍而不以位為樂也臣又聞百事之成也必在敬之其失之也必在慢之今陛下念前王之戒而不敢怠忽思為國之經而不忘夙夜求賢咨諫延及微士集作賤臣有以見堯舜之心矣夫法天地之道以施政順陰陽之和以育物事無不序動無不時此窮神知化之盛德也武以止殺禁暴則兵宜戢文以經邦濟時則化必行此經武緯文之大業也崇禮而明義好士而尊儒斥魏晉已降衰末之法稽周漢已踐集作前盛明之理集作禮斯考古會極之方也任賢而勿二招諫而必行屏近習之邪集作纎佞進周行之骨鯁斯明目達聰之道也抑臣又聞先王所以不視而明不聽而聰披頸集作技斯負之明斷非僻之緒其道易知也蓋左右僕御惟正之供必有知法集作足信者必有知禮者坐集作出使足以盡情偽居常足以助聽覽左右之臣既如是矣而又曰以公卿大夫講論正事史書其舉官針其闕以至於百工庶人莫不諫而謗焉濟濟之士為之股肱赳赳武夫為之爪牙此所以永有天下也今宰相之進見亦有數侍從之臣皆失其職百執事來集作奉朝請而退而律且有議及乘輿之誅未知為陛下出諫喉舌者為誰乎為陛下爪牙者為誰乎日夕侍起居燕遊集作遊豫與之論臣下之是非賞罰之臧否者復何人也股肱不得而接爪牙不足以衛其何獻替之有三句集作股肱不得而接何疾如之爪牙不得而衛其危甚矣美夫褻狎集作裔夷虧殘之微褊集作偏險之徒皂𨽻之職豈可使之掌王命握兵柄內膺腹心之寄外當耳目之任乎此貞夫義士所以寒心銷志泣憤而不能已者文粹作也誠能復周之舊典去漢之末禍還諫官史官侍臣之職使之左右前後日延宰輔與論義理有位于朝者咸引而進之溫其色以安其意久其對以盡其詞可採者必行有犯者無罪王之爪士宜擇公卿大臣總統而分理之則政不足平刑不足措人不足和財不足豐蠻夷戎狄不足臣休徵嘉瑞不足致矣又何慮乎視聽之表有所不周乎制策曰自中代已還求理者繼作皆意甚砥礪而效難彰明莫不欲還朴厚而澆風常扇莫不欲遵儉約而侈物常貴莫不欲逺小人而巧諛常進莫不欲近莊士而忠直常疏莫不欲勉人於義而廉愧一作隅常不修莫不欲禁人之為非而抵冒常不息其所謬盩豈無根源者臣聞一日克己復禮天下歸仁焉王者之謂也故人不從上之令而從其所行夫上古之君躬率已集作以正軌度其流集作信恕已及物自誠而明此所以其化如神天下如截也中代已還則異乎此至誠不著而欲任法以防人忠信不行而欲縱身以檢物雖砥礪其意而事實不符此所以有其意而無其效也夫欲人之朴厚而不先之以少私寡欲無為至誠所以澆風常扇也欲人之儉約而不率之以卑宫菲食沉珠貴穀所以侈物常貴也欲逺小人而好悅耳之言所以巧諛常進也欲近莊士而惡拂心之慮所以忠直常疏也欲勉人於義而貪濁在位所以廉愧集作隅常不修也欲禁人為非而法則集作制不一所以抵冒常不息也則謬盩之本其在兹乎陛下誠能一皆反之其效可立彰明矣制策曰爰自近歲仍敷大澤霜露所墜霑濡必同滌瑕穢以道人心省徭役以豐物力蠲田租以厚農室葺國學以振儒風督廢職以補維綱備衆官以序賢俊庶繼先志臻乎治平而改行者未聞輸勞者未艾農者無以免艱食學者無以通微言立事之績未紀於庶工乏才之嘆未輟於終食蠧於法者無不去而法未修明切於政者無不行而政未光大豈丕變其俗道廣而難濟乎豈不得其門事繁而每失乎佇聞嘉言無或隱諱者臣以陛下滌瑕穢而改行者未聞政之集作言不自其本故也夫欲人之改行率德慎集作在明賞罰不濫集作在滌瑕穢也故賞當善罰當惡天下曉然逃惡而趨善賞當功罰當罪天下聳然逺罪而趨功集作起功則人自為理而上無為矣此堯舜之所以蒞集作利天下也夫賞罰皆集作者報也賞之失稱罰之不當咎孰甚焉伏見兵興已來開權宜之道行苟且之政臺省之官王公之爵溢於國集作州郡遍於輿臺將帥之臣借緋紫而集作於使令定官位集作員而奏請名器均集作輕於土芥操柄擅於爪牙此其所以賞人而人不勸也州縣之斷獄月以千數連年纍紀未聞有一疑獄而上集作決于朝者未聞有屈人而訴于王集作闕者豈天下長吏盡如臯陶哉律令格式具而不遵鄉縣州府各自為制所怒則專殺居常則臆斷人過且不知其所避而能自達不其難乎况乎賦役之不恆衣食之不足尚不懼死焉能避罪此其所以罰人而人不沮也賞之不勸罪之不沮欲人改行其或難焉雖滌其瑕穢惠姦貸法而已又何為也伏惟陛下慎用賞賞必當功則天下之善勸矣慎用刑刑必當罪則天下之非沮矣夫擇人而任之則僣濫不作富庶而教之川文粹作審人而赦之則廉恥自生如是則無所改其行無所滌其瑕矣又何足憂之哉陛下省徭役而輸勞者未艾小惠未遍而有司長吏或壅而未承故也若陛下加惠而俯察之則物力何懼乎不豐勞者何憂乎未艾乎陛下蠲田租以厚農室而人猶艱食者生者猶少而費者猶多故也商乘堅而厭肥工執輕而仰給兵橫行而厚祿僧道無為而取資勞苦頓瘁終歲乏絶集作矻矻濱於死而為農者亦愚且少矣况乎兩稅不均失變通救弊之法百端橫賦隨長吏自為之政乎若困工商老釋之邪末均集作輕田野布帛之徵稅禁集作蠲橫暴之賦減鎮防之兵則耕者如雲積者如山矣臣請再為陛下精言之夫賤瑰集作珍竒之貨斥雕琢之淫則工商之道自息矣黜異端之學使法不亂而教不煩則老釋之流當屏矣且天下所以葸葸川文粹作嗸嗸然者豈非以兵乎使稅之原集作厚而可行集作不可蠲徭役者豈非以商乎今昆夷未平邊備未可去中夏或虞鎮防未可罷若此生集無此二字就其功則莫若減而練之可也今之將帥勝任而知兵者亦寡矣怙衆以固權位行貨集作賄以結恩澤因循鹵莽保持富貴而已豈暇教訓以時服習其任集作事乎今若特加申飾使之教閲簡拳勇秀出之才斥集作去屠沽負販之黨則十分之士可省其五矣夫多而無用曷若少而必精乎又比者州府虛張名籍妄求供億盡沒其給以豐其私今若核其名實糾以文法則五行之兵又可省其二矣夫衆之虛曷若寡之實乎一則以強兵一則以寬賦若江淮州郡逺冦戍屬清平自非具使令備儀注者一切可罷以其輕費代征繇薄集作蕩逋懸然後慎擇長吏曲加綏撫無集作不四三年則集作而家給而人和則橫暴不作賦斂自均至理而升平矣尚何虞於人猶艱食乎陛下葺國學以振儒風而微言尚集作猶鬱者蓋其所以集作由干祿而得仕者以章句記讀而不由義理故也若變其法則可以誅集作除其弊矣陛下督廢職以補維綱而立事之績未紀於庶工者庶工二字集作實有司之罪也今職備而不舉法具而不行諫諍之官溢集作備員不聞直聲彈察之臣塞路未嘗直指公卿大夫則側合苟求集作容持祿養交為親戚計遷除領簿籍而已興利之臣專以聚斂計數一有之不移三字為務共理之吏專以附上剝下為功習以為常漸以成俗標異而圭角者悔吝旋及和光而淈泥者富貴立須雖陛下焦勞聰明如此之切至理何益矣伏請下明詔為畫一之法使居是官理是人職集作奉是法者必有明績然後許遷擢考功之殿最無敢阿比而干刑司則能者日進不能者日退而庶工立事之績將褒揚記述之不暇矣陛下備衆官以序賢俊而乏材之歎未輟於終食者猶奉集作由奉上者遷之太亟居下者刻之太深故也古之取人也拔十得五猶以為多也曲輪直桷各適其用今則不然舉於禮部則曰幽昧凡陋而不可採選於吏部則曰聲名虛浮而不可用工文者則懼華而不實敦質者則懼朴而寡能冠蓋之族則以為因依微賤之人則以為幽險上求之愈切下搜集作損之彌深夫士何負於有司而乃蹇頓之抑刻之如是哉才能如積鬱抑居集作在下一朝闕輔集作將相之職卿士集無士字大夫之官求之不得則曰嶽不降神時之乏人於是循環其所已用者遞遷居上者不知格限無聞聲績或一時三集作趨拜或再歲九集作四遷是以位髙者當能也集作以是為適當然耳是仕進之門常闔而天子之官天子之權當途者五六人迭居持之而已以陛下之明聖夫豈不欲國之得人乎以宰相之公忠夫豈不欲人之足用乎蓋從來已久因循如是耳伏惟陛下曲集作申勑朝廷州府令每歲各舉所知於禮部吏部於計偕常選之中訪察推擇得其人則待以不次之位遇以非常之恩不得其人則必行殿最集作罰以懲渝集作踰濫則周之以寧舜之可封坐而致矣乏才之歎何有於聖朝乎陛下謂蠧於法者無不去而法未修明切於政者無不行而政未光大者由有司長吏不得其人也舍人務政雖勤何益臣伏見赦書集作令節文周備纎悉然空文虛聲溢於視聽而實功厚惠未有分寸及於蒼生主集作聖德不宣王澤不流雖陛下寤寐思理宰相憂勤奉職不可集作又何為也夫將直其枝必正其根朝廷乃根也州郡乃枝也今朝廷之號令有朝令集作出而夕改者矣主司之法或有昔集作昨破而今行者矣伏惟陛下正綱以張萬目澄源以清萬𣲖則四方大幸矣由是言之非道廣而難濟事繁而愈失也實承詔將事者之罪耳制策曰周之受田有經制漢之力集作名田有恆數今疆畛相接半為豪家流傭集作庸無依率是編户本為交易焉得貪集作奪富以補貧將欲因循是曰集作豈損多而益寡酌於中道其術如何者臣聞古之道不可變也古之法不必行也夏之桀殷之紂周之幽厲井田法非亡也而天下大亂我太宗玄宗井田法非修也而天下大理夫貞觀開元之際不受田而均不名田而贍者朝廷正法令行一人之術集作寃得以聞一吏之犯得以除由此致也是法之舉化之成則田自均人自贍而天下陶然化矣豈待曲吏川文粹作防而事為川文粹作制乎其與貞觀開元非異時也法苟未行政集作人苟失職徒易其制處集作更擾人斂怨而已矣集作耳制策曰取人惟其行不必文采命官惟其才不必資考然則行非造次而備察才非錯綜而遍知不必文采為重輕而士可進退不必資考為程凖而吏有條貫適變矯枉渴集作合於良規者今之取士以文學集作字記讀為法其素履集作敦實行則無門而知使由文學集作字而進者往往犯姦賊集作贓為梟獍此誠甚弊也乾元以還版籍斯壞而所在遊寄莫知所從集作從來伏請勑天下人士未歸者一皆復貫願留者則令著籍置鄉校縣學州庠以教訓其子弟長育其才志自鄉升之縣自縣升之州自州升之禮部公卿子弟盡育集作養長于京輦者則使之必由太學然後登有司如是則其幼弱其壯老發言舉足云為趣進皆可得而知矣然後參以才藝試其器用誠取人之急務伏惟陛下裁之密集作若資考之集作以限其章句之庸才資廕之常調者宜仍舊貫四字集作而欲得賢能之士則皆一作宜行臣嚮者之謀從有司長吏之舉其賞必行集無行字其法信焉可已也制策曰何方可以序六氣來百祥何施可以夀羣生仁衆姓徵於前訓而可據設於當代而易從勿猥勿并以稱朕意者臣聞古者山林藪澤皆有時禁動作之為害集無害字無差月令則六氣以序百祥以來而懷生之願莫不躋仁夀之域矣今舍此而不務殺胎毀卵傷仁撓和而使諸集作奉胡夷之法以正月五月九月斷天下之屠欲蕃物産而祈福祐斯亦誣集作無謂矣伏惟陛下動遵月令垂集作前訓可據之文事稽時禁當代易從之道施之而不已執之而有恆則帝皇之美逺想於今日矣謹對文苑英華卷四百八十九
