body:
  text: 文苑英華卷七十三宋李昉等編樂三太常觀四夷樂賦一首太學釋奠觀古樂賦一首冬至日陪位聽太和樂賦一首太常新復樂懸冬至日薦之圜丘賦一首吳公子聽樂賦一首吳公子聽樂觀風賦一首鈞天樂賦三首雲韶樂賦一首太常觀四夷樂賦以澤被逺夷入附聲頌為韻劉公輿聖皇窮天覆以張宇極地載以光宅端拱協有虞陶唐獻樂奏戎夷蠻貊豈不以浹洽𤣥化沐浴聖澤於是鞮鞻掌其方位太常總其樂器列在天庭陳其鼓吹僸佅兜離風旋鳥翅其舞也無進旅退旅之容其音也非皎如繹如之義狄鞮騁能扶婁效智既夷樂之具陳彰帝德之光被觀其隨樂官入禁苑荷恩覃化及之德無踰山涉海之逺我聖君文眀立極化本雍熙太和克同於天地貢樂不假於蠻夷所以司於太常奏於丹墀俾華夷之風不隔羈縻之義在兹夫其始也伊四部之爰來闢九門而並入水火之位雕題衣毛以相向金木之方皮服左衽以對立于以彰四夷之咸賔于以表五兵之載戢雖搏考之有聲靡塤簴疑作箎之可附樂章既異無勞季札之觀曲度自殊奚假周郎之顧爾其非今非古乍濁乍清不雜中華之樂自作異方之聲聞奏既移於白日窮規以悅於皇情於是詔帑藏以頒賜命象胥以回衆九夷八蠻喜氣溢於咸鎬六戎五狄歡聲動於岐雍豈獨納魯廟而見稱獻漢庭而足重微臣賀華夷之混一敢承舞而獻頌太學釋奠觀古樂賦以聲淫及商武亂偕坐為韻李程天子崇儒兮闢此虞庠仲秋上丁兮奠我素王既斯禮之畢具伊古樂而遂張於是調律吕備宫商笙鏞嘈而並奏干羽儼其成行進旅退旅爰擊爰拊鳴宫懸起萬舞設崇牙森樹羽斯道渢渢斯人俁俁和聲合氣綴規接武聽其韻可以窒欲覽其儀可以道古濟濟祁祁莫不賁然而來覩有歎者曰太和之音其樂愔愔作以崇德和而不淫所謂建藻薦之禮革慆堙之心雲英之聲何質韶濩之樂則深見師襄之擊磬聞瓠巴之鼓琴借如發揚蹈厲右秉左執其從純其始翕登歌初彌下管相及朱絃徐泛覺虞舜之風薰玉戚載持想周武之山立懿其五節清九奏成播殷周之頌無鄭衛之聲亷正以作姦邪不生蓋由德音洋溢樂教衆夥誠無象而不傳非有功而不可魏文侯昔著於發問賔牟賈嘗稱於侍坐乃知雅音為邦家之本正樂非耳目之玩可以洽人神可以彰理亂而况八佾成列八音克諧尊儒訓兮國風之始闡樂正兮王政不乖夫如是所謂光揚盛禮和樂孔偕冬至日陪位聽太和樂賦以文德光宅天敬萬夀為韻陸贄樂自上古兮和洽是聞日至南極兮隂陽肇分名太和而順氣取初陽而配君則知天授聖而正厯聖應天而效勳惟至也去隂就陽惟樂也偃武修文八佾初陳雜鸞鳯而容裔九奏斯畢降佳氣之氤氲爾其順元辰體乾德赫容衛之森肅儼宸位之恭默班禮樂於千品陳贄幣於萬國濟濟皇皇威容孔彰望北辰以列位指南山而獻觴慶雲叶符榮觀臺之加一作崇麗太陽臨照煴魏闕而增光於是太常導干羽而前曰八音自設千古靡隔所以賞諸侯之功暢聖君之澤失其度則惉懘寖興適其儀則上下咸格清淨順氣而不擾和樂自心而來宅可以導情欲可以滌煩劇既而筍簴齊列笙竽互傳偕肅肅而合雅亦啾啾而同𤣥備以四夷識四海之無我一作外成於九土知九德之咸宣崇易簡豈同於濮水務德化寧比於鈞天既損之而又損蓋斯焉而取焉故所以移風易俗發號施令周天地而不流匝寰宇而無競斥鄭衛而不御暢柔一作虛和而全正群黎足蹈而手舞百僚儀肅而心敬則知一人作則萬邦為憲來逺人以干舞播聲頌而吹萬則鄭之細晉之思不可以勸湯之放武之伐而猶有怨豈比我照二儀形九有舒太和之至德居盛陽之元首咸有典而有則固可大而可久眀眀我后於斯萬夀太常新復樂懸冬至日薦之圜丘賦以題中字為韻周存聖人之作樂也將以同和於天地崇祭也將以合奠於鬼神祭有倫而六宗不忒樂具象而萬國以親皇家握乾符以御㝢廣樂教以同人雖功成而有作亦襲古而彌新皎如繹如風俗咸和而自化擊石拊石鳥獸率舞以來馴頃以賊臣不順悖於典常震驚我師旅竊犯我紀綱禮樂之儀雖可久而可大文武之道亦一弛而一張是以七德興而有輯六樂缺而未彰今五典不用百度載光海外懷仁以有截天下好樂而無荒帝乃誕敷文教式奏薰絃命太常以修樂將享帝而配天於是繩五元以氣應考八能而術全侈弇不興鳬氏之規惟妙上下合度磬師之法可傳爰設業以設簴備宮懸與宿懸爾其金石具陳鞉鼓間出和其戛擊節以徐疾五色不亂以成文八風不奸而從律大章彰之已合陶唐之代韶盡美矣不惟有虞之日既而樂復音和仲冬日至戒殷薦之祭典將孔明於祀事用享乎上帝乃奏夫圜丘撞黃鍾而角動扣太簇而徵流大不踰宫而清濁迭和細不過羽而終始相酬是以六變而天神可禮九成而帝德惟休大禮畢雅音收居清穆以合理思宥密而為猶雖化洽時和惟善政所致而風移俗易將復樂之由吳公子聽樂賦以四聲為韻髙郢延陵季子節髙神融博辨精通其識達其聽聰方辭吳而聘魯因請樂以觀風主人於是設嘉饗進樂工陳金石絲竹於堂上舞干戚羽旄於庭中客乃凝情滌慮幽聽遐想翕如也見雅調之始作美矣哉歎至德之彌廣自周而下自鄶以上備聞變態之音默見興亡之象時則崇牙對望猛簴相向槌鐘擊鼓乍陵厲而清壯鳴磬戛絃又發越而寥亮八音宣六律暢馬弭髦而仰秣魚竦鱗而躍浪弭髦竦鱗字見吳賦信可以察邦國政教之盛衰見造化隂陽之情狀及夫曲已終奏斯闋言之者莫隱觀之者咸恱足使䕫曠心沮牙期思絶是知大樂與天地同和大禮與天地同節乃為理之樞柄化人之軌轍者也夫聽者納於耳而察於心伊事也傳於古而繼於今陽春白雪之歌其和寡流水髙山之曲其意深姑使清濁不亂鄭衛莫侵雖千載之後亦何謝乎前賢之知音吳公子聽樂觀風賦以自鄶已下無聞焉為韻有東吳子博識洽聞欲觀風於上國期屬意於南薰審樂聲以殊志將理化之可分名籍籍以播物意飄飄以凌雲聿來洙泗當周之季禮樂之化已虧文武之音一作道亦墜嗟矇瞽之多逸嘆君臣之不自閲鄒魯之儒書獨可稱其樂爾乃金石迭奏匏革互起主每齊於屈伸客克諧於音㫖𢎞慈愛於寬裕展肅敬於廉恥和風陶陶以感心繁音洋洋以盈耳剛不怒兮稽其度柔不懾兮得其理雖曲度而屢絶尚鏗鏘而未巳政教則異褒貶無愆題深思於唐俗稱大風於齊篇察邶詩之不困知鄭祀之不延釋獨一作猶憾之南籥愍黍離之東遷是皆清眀華鑒修短昭然雖謂千祀曽何聞焉幸遇休命沐兹至化太和覃於夷狄神功格於上下五英六莖之義咸池大章之徒與歷代而共樂匪古有而今無且夫樂著太始配天為大實欲庶物之暢茂非獨五音之繁㑹故省樂之理明乎否泰方且樂於無聲又何假聞乎自鄶鈞天樂賦以上天無聲昭錫有道為韻裴度嘉大樂之同和惟上帝之申錫豈功成之可致必神遇而來覿吉夢足徵竒音無斁爰升天表備聽乎皎如繹如方悟人間徒聞乎擊石拊石想夫秦穆趙簡逰魂太清下連宵而無覺上和奏而有聲感之深殊九變之曲神而化異三代之名則知昭假于下潛通在上俾晝作夜既尚寐而冥濛好樂無荒乃克諧而瀏亮翕然並作隱爾盡暢所以娛其精誠所以滌夫昏妄既而受天錫降天衢空惚恍於沖漠猶髣佛於虛無餘響愔愔而在聽撫躬眇眇而異途原夫育萬靈騰九有縱未央之娛樂表不息之悠久永為二主觀樂鈞天假夢中之髙㑹豈邦內之歡然一作常未若我皇沖一氣而獨運協六律而相宣發善令為鐘鼓播仁聲於管絃將興慶於乾坤之內非取樂於耳目之前不識不知順天之道旁流喜氣寧候於鏗鏘盡得歡心詎資於擊考斯乃常聞於率土不閟於重霄致中和而廣被誠教化之孔昭是曰鈞天之樂也又何萬舞之與九韶第二同前韻失名何上天之默默有鈞天之可名蓋德至而則至從無聲而有聲和樂發音與夢寐而潛契精誠自感何耳目之能營懿乎𤣥德升聞天降靈貺匪同乎搏拊之和豈在乎霄雲之上感夫心志達乎肌膚都萬物而有喜聞九奏而可娛其靜也寂寂其動也于于異霜天之鐘應同漢日之山呼肸蠁兮乍有杳冥兮若無表穆公之休烈為簡子之祥符以遨以遊實我心之獨得不考不擊豈他人之是愈惟兹至樂信夫𤣥造非天私於二君惟天饗於有道不然何融融泄泄發於自然萬籟不雜八音相宣且降歡以入夢知惟德之動天實深乎骨髓之內豈専於視聽之前惟寤語之有說何言詞之能全至哉無金石之迭代無宫商之先後忽變化於合漠韻鏗鏘於妙有既登不死之福庭自諧保生之仁夀則知夫天可通兮道可守自一作眀感應之無差知影響之不苟降鑒匪遙德音孔昭鄙未善之周武甚盡美之虞韶豈獨聆之兮四肢酣暢感之兮心神洗滌將使道德之不昧必受如斯之殊錫者也第三同前韻李觀異哉天地之樂其可聞乎美矣盛矣神夫至夫謂其有不見其有謂其無不見其無是惟德盛者能感匪詞工者足愈故昔秦穆之寐也去乎人間即乎天上豁如有遇杳若無妄大音嘈兮交作上帝儼以延望百神紛紜而齊赴萬變合沓而殊狀日月正其東西星辰分其背向乃有地祗上謁天仙下朝奕奕翩翩霓裳羽蓋之洊集砰砰磕磕撞鐘擊鼓之相囂舞之者傞傞而中節歌之者泄泄而匪驕其疾武足畏其徐文足昭遇之以神殊季札之觀魯樂而忘味類宣尼之聽韶是知窮深極厚于何不有罕究其真莫尋其首德聲及於無外協氣積於虛受駭矣乎樂以和未詳其義和之至而天用作天之神而樂克宣其動也與元氣迭運其靜也與太虛相全噫乎哉不可階升者天道但見夫乘宣疑作虛躡浩乍如周文之夢實異季路之禱獲覩天樂之和羅神工之擊考是天之所合道不虛行九奏未終初疑八佾三歎既退方異六英徒觀一作恱夫鏜鞳之內響優柔之正聲六幽為之震魄七曜為之重晶而莫識其曲達其情既覺既悟如喜如戚天樂之遺音在耳天神之仿像猶覿顧何德而承之受祉於天錫雲韶樂賦邵軫帝唐之於宣昭立極本乎神堯彌六葉以開泰接三正而㑹朝樂一人之淳德成萬國之謳謡故太宗載櫜而象舞聞於破陳我后垂拱而作樂嗣曰雲韶夫道者率性作者謂聖統同積和倫理知政斯古之所以歌九德誦六詩咸池備矣大章繼之玉戚朱干降及禮文之代蕢桴管一作敔籥行乎朴略之時若乃周道衰王澤竭正始之音奔散哀思之風鬱結逾千載而未返以俟我開元之濬哲噫我樂之方作也天保定武功成紹堯光澤嗣武重眀感物以風下理心而和聲稽六律之宫變諧八音而磬清越二十四祀建寅望之夕啓千門以達陽氣御重城而臨百辟張彩燈之煌煌敞新樓之奕奕甸師庭燎武賁陛㦸命典庸使設簨簴飾羽旄而展金石納四夷之僸佅兜離奏六代之翕純皎繹乃翌日出雲韶而舞之徒觀其降輦路臨廣場曳羅裙之嫋嫋鳴玉佩之鏘鏘始逶迤而並進終婉一作宛轉而成行於是合以絃匏從之磬管昭敬意於廉直本善心之嘽緩克和四夷應春候而角調取象八風如舞行之綴短霓裳綵鬬雲髻花垂清歌互舉玉步徐移俯仰有節周旋中規將導志以變轉幾成文於合離爾其美目流盼輕姿聳峙或少進而赴商俄善來而應徵貫魚初度驚鴻乍起容裔自得蹁躚未巳褧衣屢更新態不窮忽舉袖而縈紫復回身而拖紅及夫繁音九變曲度將終神人以和天地攸同立五常之行移四海之風然後樂師告罷退之惟宫時也皇歡浹睿澤深一人有慶萬國歡心群臣獻華封之祝天子御薰絃之琴照寰光於合璧式王度其如金乾道兮下濟湛恩兮汪濊四三皇兮六五帝于胥樂兮千萬歲文苑英華卷七十三
