body:
  text: 文苑英華卷三百四十八宋李昉等編博戲碁三首長行二首打毬二首競渡二首險竿二首西涼伎一首雜歌上汾隂行一首疇昔篇一首江南遇天寶樂叟歌一首彈碁歌韋應物圓天方地局二十四氣子劉生絶藝難對曹客為歌其能請從中央起中央轉鬬頗集作破欲闌零落勢背誰敢集作能彈此中舉一得六七旋風忽散霹靂疾履機乘變安可當置之鬬地翻取強不見短兵反掌收已盡唯有猛士守四方四方又何難橫擊且緣邉豈知集作如昆明與碣石一箭飛中隔逺天神安志愜動十全滿堂驚視誰得一作能然觀碁歌送儇師西遊劉禹錫長沙男子東林師間讀藝經工奕碁有時凝思如入定暗覆一局誰能知今年訪余來小桂方𫀆袖中貯新勢山城無事秋日長白晝懵懵眼一作眼在匡床因君臨局看鬬智不覺遲景沉西墻自從仙集作山人遇樵子直到開元王長史前身後身付餘習百變千化無窮一作看不己初疑磊落曙天星次見搏擊三秋兵鴈行布陳衆未曉虎穴得子人皆驚行盡三湘不逄敵終日饒人損機格自言臺閣有知音悠然逺起西逰心髙山夏木隂寂寂好處徘廽駐飛錫忽思爭道盡平沙獨笑無言心有適藹藹京城在九天貴逰華士足華筵此時一行出人意賭取名聲不要錢彈碁歌李頎崔侯能一作善彈碁巧妙盡於此藍田美玉滑如砥白黑相分十二子聨翩百中皆造微魏文手中不足比緣邉度隴未可嘉鳥跂星懸危復斜廽風轉指速飛電拂取五四如旋花座上齊聲稱絶藝仙人六慱何曽繼一别恆山道路遙為余更作三兩勢薛卿教長行歌時景移湖州别駕釋皎然桂陽仙栁道家説昔傳蘇君今是薛聊將握槊偶時人却一作便被人間稱冠絶黃楊文局龜螭蟠琢成頭子雙琅玕初疑月破雲中墮復怪星移指下攢誰識兵竒勢可保坐看將軍占一道長行有將軍梁有時彩王去聲非所希笑擊單于出重圍鳬驚隼擊疾若飛左顧右盼生光輝家本聨姻漢戚里身是長安貴公子名髙藝絶何翩翩幾回決勝君王前屢作㞎遊長樂與祈年人望青雲白日邉謫官江南嵗隂晚還將此道聊自遣由來君子行最長長行經有君子行小人行豫亦知君子寄逺一作寄心逺廢長行箋云辨其惑於無益之戲而不務恤民也趙傳紫牙鏤合方如斗二十四星銜月口貴人迷此華筵中運木手交如陳鬬不算勞神運枯木且廢為官恤惸獨門前有吏嚇孤窮欲訴門深抱寃哭耳厭人催坐衙早才聞此戲身先到理人似愛長行心天下安平多草草何當化局為明鏡挂在髙堂辨邪正何當化子作筆鋒常在手中行法令莫令終日迷如此不治生民負天子打毬篇蔡孚臣謹按打毬者往之蹴踘古戲也黃帝所作兵勢以練武士知有材也竊美其事謹奏打毬篇一章凡七言九韻德陽宫北苑東頭雲作髙臺月作樓金鎚玉鎣千金地寶杖雕文七寶毬竇融一家三尚主梁冀頻封萬户侯容色由來荷恩顧意氣平生事俠逰共道甲兵如斷蔗俱能走馬入長楸紅鬛錦鬟風騄驥黃絡青絲電紫騮奔星亂下花埸裏初月飛來盡杖頭自有長鳴須決勝能馳迅足滿先籌薄暮漢宫愈樂罷還歸堯室曉垂旒酬韓校書愈打毬歌張建封僕本修文持筆者今來帥領紅旌下不能無事習蛇矛間就平埸學使馬軍中伎癢驍智材競馳駿逸隨我來護軍對引相向去一作出風呼月旋朋先開俯身仰擊復傍擊難於古人左右射齊觀百步透短門誰羡養由遙破的儒生疑我新發狂武夫愛我生雄光杖移鬃底拂尾後星從月下流中場人一本疊字不約心自一馬一本疊馬不鞭蹄自疾凡情莫辨捷中能拙目翻驚巧時失韓生訝我為斯藝勸我徐驅作安計不知戎事意疑作竟何成且愧吾人言一惠競渡歌劉禹錫五月五日天晴明楊花繞江啼曉鶯使君未出郡齊外江上早聞齊和聲使君出時皆有凖馬前已被紅旗引兩岸羅衣破鼻香銀叉照日如霜刃鼓聲三下紅旗開兩龍躍出浮水來棹影幹波飛萬劔鼓聲劈浪鳴千雷鼓聲漸急標將近兩龍望標目如瞬波上人呼霹靂驚竿頭綵挂虹霓暈前船搶水已得標後船失勢空揮撓瘡眉血首爭不定輸岸一朋心似燒只將輸嬴賞兩岸十舟五來往須臾戲罷各東西競脫文身請書上吾今細觀競渡兒何殊當路權相持不思得所各休去會到摧舟折楫時競渡曲競渡始武陵至今舉楫而相和之音咸呼何在斯招屈之義事見圖經劉禹錫沉江五月平堤流邑人相將浮綵舟靈均何年歌已矣哀謡振楫從此起揚桴集作抱擊節雷闐闐亂流齊進聲轟然蛟龍得雨鬐鬛動螮蝀飲河形影聨刺史臨流展一作褰翠幃揭竿命爵分雄雌先鳴餘勇爭鼓舞未至銜杖顏色沮百勝本自有前期一飛由來無定所風俗如狂重此時縱觀雲委江之湄綵旗夾岸照蛟室羅襪陵波呈水嬉曲終人散空愁暮招屈亭前水東注險竿歌顧况宛陵女兒擘飛手長竿橫空上下走已能輕險若平地豈肯身為一家婦宛陵將士天下雄一下定却長稍弓翻身挂影恣騰踏反綰頭髻盤旋風盤旋風撇飛鳥驚猿繞樹枝裊頭上打鼓不聞時手蹉腳跌蜘蛛絲忽雷掣斷流星尾矐睒劃破蚩尤旗若不隨仙作仙女即應嫁賊生賊兒中丞方略通變化外戶不扃從女嫁險竿行栁曽山險驚摧輈水險能覆舟奈何平地不肯立走上百尺髙竿頭我不知爾是人耶復猱耶使我為爾長嘆嗟我聞孝子不許國忠臣不愛家爾今輕命重黃金忠孝兩虧徒爾誇始以險技悗君目終以貪心媚君祿百尺髙竿百度緣一足參差一家哭險竿兒聽我語更有險徒險於汝重於權者失君恩落向天涯海邉去險竿兒爾須知險途欲往爾可思上得不下下得上一作不得我謂此輩險於竿兒西涼伎白居易西涼伎西涼伎假面胡人假獅子刻木為頭絲作尾金鍍眼睛銀貼齒奮迅毛衣擺雙耳如從流沙來萬里紫髯深目羌集作兩胡兒鼓舞跳梁前致詞道是涼州未陷日安西都護進來時須臾云得新消息安西路絶歸不得泣向獅子雙涕集作涕雙垂涼州陷沒知不知獅子廽頭向西望哀吼一聲觀者悲貞元邉將愛此曲醉坐笑看不足誤集作享賔犒士宴監軍獅子胡兒長在目有老集作一征夫年七十見弄涼州低面泣泣罷斂手白將軍主憂臣辱昔所聞自從天寶兵戈起犬戎日夜吞西鄙涼州陷來四十年河隴侵將九千里平時安西萬里疆今日邉防在鳯翔平時開逺門外立侯去安西九千九百里以示戎人不為萬里行其實就盈數也今畨漢使往來悉在隴州交易矣緣邉空屯十萬卒飽食厚集作溫衣間過日遺民腸斷在涼州將卒相看無意收天子每思長痛惜將軍欲説含慙羞奈何仍看涼州集作西涼伎取笑資歡無所愧縱無智力未能收忍取西涼弄為戲雜歌上汾隂行李嶠君不見昔日西京全盛時汾隂后土親祭祠齋宫宿寢設儲一作厨供撞鐘鳴鼓樹羽旗漢家四葉才且雄賔延萬靈服九戎柏梁賦詩髙宴罷詔書法駕幸河東河東太守親掃除奉迎至尊導鑾輿五營夾道一作將校列容衛三河縱觀空里閭廽旌駐驆降靈場懷椒奠柱一作樊香奠醑邀百祥金鼎發色一作食非正焜煌靈祇􅀈􅀈摛一作􅀈􅀈慮景光埋玉陳牲禮神畢舉麾上馬乘輿出彼汾之曲嘉可逰木蘭為楫桂為舟棹歌微吟綵鷁浮簫鼓哀鳴白雲秋觀娛宴賜洽群后家賜一作家復除户牛酒聲鳴集作明動天樂無有千秋萬嵗南山夀自從天子向秦關玉輦金車不復還珠簾羽帳長寂寞鼎湖龍髯何處一作安可攀千年一作齡人事一朝空四海為家此路窮雄豪意氣今何在壇場宫觀一作館盡蒿蓬道邉故一作路逄古老長嘆息世事回環不可識一作測昔時青樓對歌舞今日黃埃聚荆棘山川滿目淚霑衣冨貴榮華能幾時不見即一作只今汾水上唯有年年秋鴈飛一作皆文粹疇昔篇駱賔王少年重英俠弱嵗賤衣冠既託寰中貴方承膝下歡敖逰灞水集作陵曲風月洛陽端且知無玉饌誰肯逐金丸金丸玉饌盛一作信繁華自言輕侮季倫家五霸爭馳千里馬三條競騖七香車掩映飛軒乘落一作夜照參差步障列朝霞池中舊水涵明月集作懸鏡屋裏新粧不讓花意氣風雲倐如昨嵗去年來集作月嵗春秋屢回薄上苑頻經栁絮飛中園幾見集作畨去聲梅花落當時門客今何在疇昔交朋集作遊已踈索不集作莫見憔悴損容儀會在集作得髙秋雲霧廓淹留坐帝鄉無事度集作積炎涼一朝披短褐六載賦長楊集作奉長廊賦文慙昔馬執戟歎集作慕前掦揮戈出武帳荷筆入文昌文昌隱隱皇城裏由來奕奕多才子潘陸詞鋒駱驛飛曹張文集作張曹翰苑縱橫起卿相未曽識王侯寧見擬垂鈎井成白首翁負薪何處逄知己二句集作徒勞倦負薪何處逄知己判一作誰將運命賦窮通從來竒一作命舛任西東不應一作豈言永棄同芻狗且復飄飄類轉蓬客集作容鬢年年異春華嵗嵗同榮親未盡禮徇主欲申功脂車秣馬辭鄉集作京國䇿集作縈轡西南吏卭𤏡玉壘銅梁不易攀地角天涯渺難測鸚囀蟬鳴集作吟有悲望鴻來鴈度無音息陽關積霧萬里昏劔閣連山千種色蜀路何悠悠岷峯阻且修廽腸隨九折迸淚下雙流寒光一作雲千里暮霧氣二江秋長途看䇿一作來馬平水見沉牛華陽舊地標神制石鏡峨眉偏集作真秀麗諸葛才雄已號龍公孫躍馬輕稱帝五丁卓犖多竒力四士蜀都賦云江漢炳靈世載其英蔚若相如皭若君平王褒韡曄而秀發楊雄含章而挺生四士指此一本作皓非兼末句有商山四翁之句英靈冨集作用文藝雲氣橫開八陳形橋影遙分七星勢川平煙霧開遊戲錦城隈牆髙龜步轉集作牖髙龜望山水靜鴈文廽尋姝入酒肆訪客上琴臺不識金貂重偏惜玉山頽他鄉荏苒銷年月帝里悠悠限集作沉沉恨城關不見猿聲助客啼唯聞旅思將花發我家迢遞關山裏關山迢遞不可越故園梅栁尚餘香集作春來時勿使芳菲歇解鞅集作秧欲言歸執𬒮愴多違北梁俱握手南浦共沾衣别情傷去蓋離念惜徂集作光暉知音何所托木鴈薦集作木落有南飛回來望平陸春來酒應熟相將菌閣卧集作望清溪且用藤柸泛黃菊十年不逹集作調為貧賤百日屢遷隨倚仗秪為須求負郭田使我再干州縣集作郡祿百年鬱鬱少騰遷萬里遙遙集作迢迢入鏡川吳江拂潮衝白日淮海長波接逺天叢竹凝朝露孤山起暝煙賴有邉城月來集作常傍客旌懸東南美箭稱吳會名都隱軫三江外塗山執玉應昌朝集作期曲水開襟重文會仙鏑流音鳴鶴嶺寶劔分暉若蛟瀨未看白馬對蘆芻且覺浮雲似車蓋江南節序多文酒屢經過莫集作共踏春江曲但集作俱唱採菱歌舟移疑入鏡棹舉若乘波風光無限數集作極歸楫礙池荷眺聽煙霞正流眄即從王事歸艫轉芝田花月集作發屢徘徊金谷佳期集作德明非重逰衍登髙北望集作南適嗤梁叟慿軾西征想潘椽峯開華嶽聳疑蓮水激龍門急如箭人事謝光隂俄遭霜露侵偷存七尺影分沒九泉深窮途行泣玉憤路未藏金茹茶空集作􅀈有歎懷橘獨傷心年來嵗去成銷鑠懷抱心期漸寥落挂冠裂冕已辭榮南畝東臯事耕鑿賔階客院常踈散蓬徑柴扉終寂寞自有林泉堪隱栖何必山中事丘壑我住青門外家臨素滻濵遙瞻丹鳯闕斜望黑龍津荒衢通獵騎窮巷抵樵輪時有桃源客來訪竹林人昨夜琴聲奏悲調旭旦含嚬不言集作成笑果乘驄馬發囂書復道郎官稟綸詔集作誥非冶長非罪曽縲絏長孺然灰也經溺于集作髙門有閲不圖封峻筆無聞欲敷妙適離京兆謗還從御史集作府彈炎威分集作資夏景平曲况秋翰畫地終難入書空自不安吹毛猶集作未可待搖尾且求餐丈夫坎􅀈多愁疾契闊迍邅盡今日慎罰寧慿兩造詞嚴科直挂三章律鄒衍銜悲繫燕獄李斯抱怨拘秦桎不應白髮頓成絲直為黃沙暗如漆紫禁終難呌朱門不可集作易排驚魂聞葉落危魄逐輪霾集作理霜威遙有勵雪枉遂集作更無階含寃欲誰道飲氣獨居懷忽聞驛使發關東傳道天波萬里通涸鱗去轍還集作先逰海幽禽釋網更集作便翔空舜澤堯曦方有極才言巧侫讜疑無窮誰能局蹐依三輔會就商山訪四翁江南遇天寶樂叟白居易白頭病叟泣且言祿山未亂入黎園能彈琵琶和法曲多在華清隨至尊是時天下太平久年年十月坐朝元千官起居環珮合萬國會同車馬奔金鈿照矅石甕寺蘭麝薰煮溫湯源貴妃宛轉侍君側體弱不勝珠翠繁冬雪飄飄錦𫀆暖春風蕩漾霓裳翻歡娛未足燕寇至弓徑馬肥胡語喧豳土人遷避夷狄鼎胡龍去哭軒轅從此飄淪落集作漂淪到南土萬人死盡一身存秋風江上浪無限暮雨舟中酒一鐏涸魚久失風波勢枯草曽沾雨露恩我自秦來君莫問驪山渭水如荒村新豐樹老籠明月長生殿暗鎖黃昏紅葉紛紛蓋欹瓦緑苔重重封壞垣唯有中官作宫使每年寒夕一開門文苑英華卷三百四十八
