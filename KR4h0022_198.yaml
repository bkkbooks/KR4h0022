body:
  text: 文苑英華巻一百九十八宋李昉等編樂府七度關山七首關山曲二首關山月十七首隴頭水十四首隴頭吟三首隴西行八首岀自薊北門行六首擬塞外征行一首苦戰行一首度關山梁簡文帝關山遠可度遠度復難思直指遮歸道都䕶總前期力農爭地利轉戰逐天時材官蹶張皆命中宏農越騎盡搴旗搴旗遠不息驅虜何窮極狼居一封難再覩閼氏永去無容色鋭氣且横行朱旗亂日精先屠光禄塞却破夫人城凱歌歸舊還今日是功名一作凱歌還舊里非是衒功名同前劉尊隴頭一作樹寒色落寒雲朝欲開谷深鼙易響路狹幰難廻當知結綬去非是棄繻來行人思顧返道别且徘徊願度關山鶴勞歌立可哀同前王訓邊庭多警急羽檄未曽閒從軍出隴坂驕一作驅馬度關山關山恒掩靄一作掩害髙峯白雲外遥望秦川中一作水千里長如帶好勇自秦中意氣本一作多豪雄少年便習戰十四己從戎昔年從一作經上郡今歲出雲中遼水深難渡榆關斷未通折衝陵絶域流蓬驚未息胡風朝夜起平沙不相識兵法貴先聲軍中自有程逗留皆一作難贖罪先登盡一城都護疲詔吏将軍擅發兵平虜疑縱火飛鴟畏犯營輜重一為鹵金刀何用盟誰人知出外一作誰知出塞外獨有漢飛名同前關山度曉月劔客還一作逺從征雲中出廻陣天外落竒兵輪摧偃去節樹倒礙懸旌沙場折一作楊坂暗雲磧榆溪明馬倦時衘草人疲屢㸔城寒一作塞隴胡笳澁空一作寒林漢皷鳴還嗟幽一作聽嗚咽水併切斷腸聲同前戴暠昔聽隴頭吟平居已流涕今上關山望長安樹如薺千里非鄉邑四海一作百姓為皆兄弟軍中大體共一作自相褒其間得意各為曹愽陵輕俠皆無為幽州重氣本多豪馬肥一作􅔷苜蓿葉劔瑩鸊鵜膏初征心未息復值鴈飛入山頭㸔月高一作近草上知風急笛掲一作碣曲難成笳繁響還澁武帝信一作初承平東伐復南一作西征薊門海作塹榆塞氷為城催令四校出倚望三邊平箭箙朝來動刀環臨陣鳴将軍一百戰都尉一作䕶五千兵且决雌雄眼前利誰道功名身後事丈夫意氣本自然來時辭第已聞天但令此心此命在不教一作持烽火照甘泉同前李端鴈塞日初晴飛狐一作胡關又作狐關雪復一作雪覆平危關一作樓又作竿縁廣漢古竇傍長城挿一作㧞又作拂劔金星出飜弓玉羽輕一作彎弧玉羽鳴誰云一作知係敵者賈誼是書生同前王貞白只領千餘騎長驅磧邑間雲州多警急雪夜度關山石響鈴聲逺天寒弓力慳秦樓休悵望不日凱歌還關山曲二首馬戴金鎻耀兠鍪黄雲拂紫騮叛羗旗下戮䧟壁夜中收霜霰戎衣月關河磧氣秋箭瘡殊未合更遣在一作擊蘭州二火發龍山北中宵易左賢勒兵臨漢水驚鴈散胡天水落防河急軍孤受敵偏猶聞漢皇怒按劔待開邊關山月梁元帝朝望青一作清波道夜上白登臺月中有一作含桂樹流景一作影自徘徊寒沙逐風起春花向一作犯雪開夜長無與晤衣單誰為裁同前梁陸瓊邊城與明月俱在關山頭焚烽望别壘擊斗宿危樓團團婕妤扇纎纎秦女鈎鄉園誰共此愁人屢益愁同前張正見巖開度月華流彩映山斜暈逐連城璧輪隨出塞車唐蓂遥合影秦桂逺分花欲騐盈虚駛一作理方知道路賖同前二首徐陵關山三五月客子憶秦川思婦髙樓上當牎應未眠星旗映踈勒雲陣上祁連戰氣今如此從軍復幾年二月出柳城東微雲掩復通蒼茫縈白暈蕭瑟帶長風羗兵燒上郡胡騎獵雲中将軍擁節起戰士夜鳴弓同前賀力牧重關歛暮煙明月下秋前照石疑分鏡臨弓似共一作引弦雲一作霧暗迷旗影霜濃濕劔蓮此處離鄉客遥心萬里懸同前阮卓關山陵漢開霜月正一作自徘徊映林如璧碎侵塞似輪摧楚師随晦進胡兵逐煖來寒笳将夜鵲相亂晩聲哀同前王褒關山夜月明一作今夜月愁一作秋色照孤一作關城半形一作影虧同漢陣全影一作輪滿逐胡兵灰一作天寒光轉白風多暈欲生寄言亭上吏遊客解鷄鳴此詩一百五十巻重出今削去同前盧照隣塞垣通碣石虜陣一作障抵祁連相思在萬里明月不長一作正孤懸影移金岫北光斷玉門前寄言閨一作書謝中婦愁一作時㸔鴻鴈天同前崔融月出一作生西海上氣逐邊風壮萬里照一作度關山蒼茫非一状漢兵開郡國胡馬窺亭障夜夜聞悲笳征人起南望同前李白明月出天山蒼茫雲海間長風幾萬里吹度玉門關漢下白登道胡窺青海灣由來征戰地不見有人還戍客望邊色一作邑思歸多苦顔髙樓當此夜歡息未應閒同前釋皎然家家望秋月不及秋山望山心萬境長寂寞夜夜孤明我山上海人皆在疑生海東山人自謂出山中憂歡虞樂皆占月月本無心同不同自從有月山不改古人望盡今人在不知萬世今夜時孤月将誰更相待同前司空曙見集本蒼茫明月上夜乆光如積野幕冷胡霜關樓宿邊客隴頭秋露暗磧外寒沙白唯有故鄉人霑裳此聞笛同前李端露濕月蒼蒼關頭榆葉黄廻輪照海逺分彩上樓長水凍頻移幕兵疲數望鄉只應城影外萬里共胡霜同前鮑君徽髙髙秋月明北照遼陽城塞逈光初滿風多暈更生征人望鄉思戰馬聞鼙驚朔風悲邊草胡沙昏敵營霜凝匣中劔風憊原上旌早晩謁金闕不聞刁斗聲同前陳陶昔年嫖姚護羗月今照嫖姚雙鬢雪青塜曽無尺寸歸錦書多一作曽寄窮荒骨百戰金瘡體沙磧鄉心一片懸秋碧漢城應期一作漢帝應啼破鏡時胡塵萬里嬋娟隔度磧衝雲朔風起邊笳欲晩生青珥隴上横吹霜色刀一作色如刀何年斷得匈奴臂此詩一百五十二巻重出今已削去注異同為一作隴頭水梁元帝衘悲别隴頭關路漫悠悠故鄉迷逺近征人分去留沙飛晩成幕海氣夜一作旦如樓欲識秦川處隴水向東流同前劉孝威從軍戍隴頭隴水帶沙流時觀胡騎飲常為漢國羞釁妻成兩劔教子犯雙鈎将頓樓蘭膝一作頓取樓蘭頸就解郅支裘勿令如李牧功名遂不酬一作勿令如李廣功遂不封侯同前顧野王隴頭望秦川迢遞隔風煙蕭條落野樹幽咽響流泉瀚海波将息交河氷未堅寕知蓋山水逐節赴危絃同前謝燮隴坂望咸陽征人慘思腸咽流喧斷岸遊沫聚飛梁鳬分歛氷彩虹飲照旗光試聽鐃歌曲唯吟君馬黄同前二首張正見隴頭鳴四注征人逐貳師羗笛合一作含流咽胡笳雜水悲湍髙飛轉駛澗淺蕩還遲前旗去不見上路杳無期二隴頭流水急流急行難度逺入隗囂營傍侵酒泉路心交賜寶刀小婦成紈袴欲知别家乆戎衣今已故同前徐陵别途聳千仭離川懸百丈攅荆夏一作下不通積雪冬一作終難上枝交隴底暗石礙波前響廻首咸陽中唯言徃時夢同前二首江總隴頭萬里外天崖四靣絶人将蓬共轉水與啼俱咽驚湍自湧沸古樹多摧折傳聞愽望侯辛苦持一作題漢節二霧暗川中日風驚隴上秋徒傷幽咽響不見東西流無期從此别更度幾年幽遥聞玉關道望人杳悠悠同前車􅛴隴頭征人别隴水流聲咽只為識君恩甘心從苦節雪凍弓弦斷風鼓旗竿折獨有孤雄劔龍泉字不滅同前盧照隣隴坂髙無極征人望故一作一望鄉關河别去水沙塞斷歸腸馬繫千年樹旗懸九月霜從來苦一作共嗚咽皆是為勤王同前楊師道隴頭秋月明隴水帶關城笳添離别曲風送斷腸聲映雪峯猶暗乗氷馬屢驚霧中寒鴈至沙上轉蓬輕天山傳羽檄漢地急徴兵陣開都䕶道劔聚伏波營於兹覺無度方共濯胡纓同前沈佺期隴山風落葉隴鴈淚寒天君見三秋水分為兩地泉西流入羗郡東下向秦川征客方回首肝腸空自憐同前員半千路出金河道山連玉塞門旌旗雲裏度楊柳曲中喧蹀血多壮膽衰草疑作裹草無怯魂嚴霜歛曙色大明辭朝暾塵銷營卒壘沙靜都尉垣霧巻白山出風吹黄葉翻将軍獻凱入萬里絶河源隴頭吟王維長城少年遊俠客夜上戍樓㸔太白隴頭明月􅒯臨關隴上行人夜吹笛關西老将不勝愁駐馬聽之雙淚流身經大小百餘戰麾下偏禆萬户侯蘇武纔為典屬國節旄空盡一作零落海西一作南頭同前二首釋皎然隴西心欲絶隴水不堪聞碎影摇槍壘寒聲咽幔軍素從鹽海積緑帶柳城分日落天邊望逶迤入塞雲二秦隴逼氐羗征人去未央如何幽咽水併欲斷君腸西注悲窮漠東分憶故鄉旅魂聲攪亂無夢到咸一作遼陽隴西行三首梁簡文帝隴西四戰地羽檄歲時聞䕶羗擁漢節校尉立功勲石門留鐡騎氷城息一作悉夜軍洗兵逢驟雨送陣出黄雲沙長無止泊水脉屢縈分當思勒漢鼎一作勒鼎鼐一作勒彛鼎無用想羅裙二悠悠懸斾旌如何隴西行减竈驅前馬衘枚進後軍一作兵沙飛朝似暮一作幕雲起夜疑明一作城廻山時阻路絶水亟一作極稽程徃年郅支服今歲單于平方歡凱樂盛飛葢滿西京三仲一作邊秋胡馬肥雲一作雪中驚冦入勇氣特一作時無侣輕兵救邊急沙平不見虜嶂轉一作險還相及出塞豈成歌經川未遑汲烏孫塗更阻康居路猶澁月暈抱龍城星眉照馬邑長安路逺書不還寕知征人獨一作空佇立同前庾肩吾借問隴西行何當驅馬征草合迷前路雲濃暗後城寄語幽閨妾羅袖勿空縈同前四首陳陶漢主東封報太平無人金闕議邊兵縱饒奪得林胡塞磧地桑麻種不生二誓掃匈奴不顧身五千貂錦䘮胡塵可憐無定河邊骨猶是春閨夢裏人三隴樹三㸔塞草青樓煩新替䕶羗兵同來死者傷離别一夜孤䰟哭舊營四黠虜生擒未有涯黒山營陣識龍蛇自從貴主和親後一半胡風似漢家出自薊北門行徐陵薊北聊長望黄昏心獨愁燕然一作山對古刹代郡隱一作倚城樓屢戰橋恒斷長氷塹不流天雲如地陣漢月帶胡秋乞一作請一作漬土泥函谷接繩縛凉州平生燕頷相㑹自去一作得封侯同前庾信虜陣横比荒胡星耀精芒羽書速驚電烽火盡連光虎竹投一作救邊急戎車森已行明主不安席按劔心飛揚推轂出猛将連旗登戰塲兵威衝絶漠殺氣凌穹蒼列卒一作陣赤山下開營紫塞傍孟冬風沙𦂳旌旃一作旗一作斾颯凋傷畫角悲海月征衣巻天霜揮刃斬樓蘭彎弓射賢王單于未一作一平蕩種落已奔亡收功報天子歌舞歸咸陽同前李希仲旄頭有精芒胡騎獵秋草羽檄南渡河邊庭用兵早漢家愛征戰宿将今已老辛苦羽林兒從戎榆關道一身救邊庭一作速烽火連薊門前軍鳥道斷一作飛斷格鬬塵沙昏寒日皷聲急單于夜将奔當湏狥忠義身死報國恩同前曹鄴長河凍如石征人夜中戍但恐筋力盡敢憚将軍遇古來死未歇白骨碍官路豈無一有功可以髙其墓親戚牽衣泣悲號自相顧死者雖無言那堪生者悟不如無手足得見齒髪暮乃知七尺軀却是速死具同前王貞白薊北連極塞塞色晝𡨕𡨕戰地骸骨滿長時風雨腥沙河留一作流不定春草凍難青萬户封侯者何謀靜虜庭擬塞外征行前人冦騎滿雞田都䕶欲臨邊青泥方絶漠懷劔始辭燕旌旗挂龍虎壮士募鷹鸇長城威十萬髙嶺奮三千行行向馬邑去去指祁連皷聲遥赤塞兵氣逺衝天對陣雲初上臨城月始懸風驚烽易滅沙暗馬難前恩重恒思報勞心疑作心勞屢損年微功一可立身輕不自憐苦戰行杜甫苦戰身死馬将軍自云伏波之子孫干戈未定失壮士使我歎恨傷精魂去年南行一作江南討狂賊臨江把臂難再得别時孤雲今不飛時獨㸔雲淚横臆文苑英華卷一百九十八
