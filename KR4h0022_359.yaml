body:
  text: 文苑英華巻三百五十九宋李昉等編帝道擬劇秦美新一首玊諜真紀一首唐真符觧一首唐天志一首擬劇秦美新岑文本伊太極草昧元氣氤氲二儀肇闢三才乃分火化之風既徃結繩之政無聞遐哉邈矣故靡得而云也逮乎書契興爻彖辨皇王著謚號闡歴選列聖逖聴貴篆犧農崇行道之化堯舜𢎞揖譲之風湯武以干戈而稱盡美成康以刑厝而表成功雖歩驟殊時澆淳異世一作帝道有文質政有隆替不在天文因人垂制規模煥其有章聲實渺其難繼異哉秦氏之為政也恃崤函之作固因襄文之餘烈窮起剪之暴兵納鞅斯之邪説兼兩州之地削六雄之轍先王之道廢曩聖之徳㓕利觜長距殫蒼生之命刮語焚書愚黔首之性海内訾其凶滅天下苦其苛政於是懐道挾術之士背三秦而逺跡抱樸飬素之夫竄九夷而自適趙髙閻樂啓其亂陳勝呉廣伺其隙喪六璽於二代隳七廟於一擲永鑒其弊吁其劇歟粤若漢祖之龍飛踐宸極居大寳感素靈之符行𤣥聖之道靖大亂以永寧濟斯人於難老洎文景之纂厯乃守文之有聲逮武宣之繼統亦王功之有成然而闕皇王之要道慙天地之至精仍踵秦之制度尚沿秦之章程既無聞於改作孰與發其聲明雖時乗於六位實紿誚於三靈者矣我有新之創業也累功而㨿帝圗積徳而膺寳命政化洽於巖廓惠澤溢於號令四表荷其亭毒萬物遂其正性帝典闕者既補王綱弛者咸正其徳也彌厚其道也彌盛若夫文軌大同夷狄嚮風武功也制禮裁樂遷風變俗文教也肇改正朔爰變服色至聖也盡禮郊禋致敬鬼神大孝也幽人咸洎竒士畢至濬哲也既厝刑書亦廢囹圄鴻徳也是以天不愛其道地不愛其寳龜威浮洛飛黄服皁一角九尾之瑞朝夕埛牧并柯共穗之祥日月畿服超邃古之芳英邁前王之簡牘其天意也如此其人事也如彼諒可以披緑圖詔青史降齊郊下嬴里登介邱以昭徳同梁甫以播美摛記牒於無窮播歌誦而盈耳俾夫千載之上徃聖惡其鴻名百代之後下王奉其英聲固皇極於造化合至道於神明豈不美哉豈不美哉玉諜真記謝偃粤一氣未分之前二儀肇闢之始綿哉邈矣固無得而稱焉洎乎立極斷鼇補天煉石三光抱日之帝九色乗雲之皇龜文發而八封成鳥跡命而六體備於是書契著矣文籍興焉是以褒貶定于一言美惡在乎千里或揖讓以崇文徳或干戈而擅武功雖五運代昌三正更襲質文殊軌馳驟異規莫不詳諸典䇿可備而言矣爰自近代迄乎周秦兵革迭興英雄一作某互起假名竊號者三分有二干紀亂常者十居其九是以八維幅裂四海𤓰分玊壘稱王金陵謀帝重以中原塗炭戎羯憑陵衣冠禮樂掃地將盡數百年間未聞一作定正朔我聖王之受命也則九服翹心三靈竚睠振乾維以綴象舉地絡以籠人曩者炎運將終九域淪䧟於是披丹霄而軒鵬翼駕𤣥海而截鯨鱗俯㧞嵩華仰廽星漢納風雲於懐抱鼔雷電於胷臆流雕矢於日谷横文劔於天外所以八狄乗風九夷請朔固可以包鎮虞夏跨躡殷周於是體天制作順時立極進力牧於沮澤求風后於海隅所以三傑並臻十亂咸集故能佐命垂統飾化開業也所以神功茂績通幽洞𡨕反無為於上皇復淳朴於太素是以歌五英則八風順奏六徳則百獸舞至於素毳丹羽極飛走之祥頳蕚華叢窮草木之瑞天無所秘地無所隠圖史一作籍所莫紀篆諜所未詳莫不昭晰相暉紛綸交映充庭滿囿盈郊洽野豈止二氣運而景星出三文著而神鳯儀而已哉於皇上帝於始月首日乃負斧扆御華軒駐金根陳五輦千門既啓萬國咸萃金石備列琛贐畢陳於是九司三事羣公百辟相與端紱理纓趨而進曰臣聞惟天為大聖人所以取則謂地盖厚皇王所以受圖是知仰觀俯察明靈斯在上戴下履福應攸歸莫不順之者獲昌違之者致咎臣逖聴邃古遐觀徃諜睿君哲主無易茲道雖復七十二代書契莫司至於登介丘基孕地建顯號施尊名展禮告成其義一也此乃百王之壯觀萬古之丕業昔齊桓以三代之功處諸侯之位尚睥睨梁甫睠顧太山况乎扼四海吞萬國寵九域括八荒如何湮没而無聞哉夫登封者所以昜姓奉繼興絶崇功不可闕也是可闕也則神可誣而天可欺矣今陛下乃欲貶惡百靈拒絶羣議虧厥真紀昧茲懿徳使泰山指望梁甫失幸金繩脱檢玉牒收文瑞日潜暉徳星晦色此非所以發榮舒徳應天順時垂裕百代激流千祀者也臣等盡慮悉心不敢奉詔胷計腹議切欲獻忠徃者九章淪次五緯一作紀失方遂令歸餘爽終履端乖始陛下既考之以玉律又則之以金儀定千載之差辰正百王之廢朔符洛下之明驗復容成之妙㫖此又聖徳之感也伏願陛下上祗天休下順坤徳叶羣神之里從億兆之心清蹕云亭鳴鑾岱岳肆射牛之禮展大澤之詩垂紺幄而佇羣神謁紫壇而陳衆瑞使白雲朝起靈光夜燭應千齡之期流萬歳之響則四溟受福天下稱泰臣等敢資靈貺合符瑞之至極願以固請於是乃凛然動色曰過乎何辭之飾也朕聞惟徳弗逮罔有克惟言弗審罔有徴觀乎周漢之苟進退足惡矣縱天命有在予將崇讓焉於是搢紳之徒俯而謝仰而頌徳曰明明聖範巍巍至徳𤣥化難名神功靡測上包乾䝉下括坤城五岳塵銷四溟波息仁風綿浹惠澤下霈船海極琛梯山窮貝九譯同徳萬里齊信宿彗收芒朝雲觧陳階蓂晦落庭軼晨鮮氤氲和氣蕭索非煙輸重璧合星次珠聮鴻名始茂景祚方延霧闢雲岸霞褰日觀山川效祉人神叶賛靈貺凝祥光華啓旦播美貞石馳芳柔翰徳盈彌損道積逾中禮成思大樂變推功譲為政始益寡謙終千齡展美萬古承風唐貞符觧栁宗元負罪臣宗元惶恐一作懼言所貶州三字文粹作貶所量移流人呉武陵為臣言董仲舒對三代受命之符誠然非耶臣曰非也何獨仲舒爾自司馬相如劉向楊雄班彪彪子固皆沿襲嗤嗤推古瑞物以配受命其言類淫巫瞽史誑亂後代不足以知聖人立極之本顯至徳揚大公一作功甚一作皆失厥趣臣為尚書郎時嘗著貞符言唐家正徳受命於生人之意累積厚乆宜享年無極之義本末閎闊㑹貶逐中輟不克究備武陵即扣頭邀臣此大事不宜以辱故休缺使聖王之典不立無以抑詭類㧞正道表覈萬代臣不勝奮激即具為書念終冺没蠻夷不聞於時獨一作猶不為也苟一明大道施于人代集作世臣死無所憾用是自决臣宗元稽首拜手以聞曰孰稱古初朴䝉倥侗而無争厥流以訛越乃奮敓文粹作擊鬪怒振動專肆為滛威曰是不知道惟人之初摠摠而生林林而羣雲霜文粹作霜雪風雨雷電暴其外於是乃知架巢空穴挽草木取皮革饑渇牝牡之欲敺其内於是乃知噬禽獸咀菓榖合隅而居交焉而争際文粹作暌焉而鬪力大者摶齒利者齧爪剛者决羣衆者軋兵良者殺披披藉藉草野塗血然後強有力者出而治之徃徃為曹於險阻用號令起而君臣什伍之法立徳紹者嗣道怠者奪於是有聖人焉曰黄帝遊集作道其兵車交貫乎其内一統類齊劑量然猶大公之道不克建於是有聖人焉曰堯置州牧四岳持而綱之立有徳有功有才集無此二字有能者叅而維之運臂率指屈伸把握莫不統率堯年老舉聖人而禪焉大公乃克建由是觀之厥初罔匪一作不極亂而後稍可為也而非徳不樹故仲尼叙書於堯曰克明峻徳於舜曰濬哲文明於禹曰文命祗承於帝於湯曰克寛克仁彰信萬民於武王曰有道曾孫稽揆典誓貞哉維茲徳實受命之符以奠永祀後之妖淫嚚昏好恠之徒乃始陳大電大虹𤣥鳥巨跡白狼白魚流火之烏以為符斯皆詭譎闊誕甚可羞也而莫知本於厥貞漢用大度克懐於有氓登能庸賢濯痍煦寒以廖以熈茲其為符也而其妄臣妾乃下取虺蛇上引天光推類號休用夸誣於無知之垊増以騶虞神鼎脅敺縱㬰俾東之太山石閭作大號謂之封禪皆尚書所無有莽述成効卒奮驁逆其後有賢帝曰光武克綏天下復承舊物猶崇赤伏以玷厥徳魏晉而下龎亂鉤裂厥符不貞邦用不靖亦罔克乆駮乎無以議文粹作譏為也積大亂至于隋氏環四海以為鼎跨九垠以為鑪㸑以毒燎煽以虐熖其人沸湧灼爛號呼騰蹈莫有救止於是大聖乃起丕降霖雨濬滌蕩集作盪沃蒸為清氛疏為冷風人乃漻然休然相晞文粹作歸以生相持以成相弭以寧刳集作琢屑屠剔膏流節離之禍不作而人乃克完平舒愉尸其肌膚以逹集作逞于夷途焚折抵掎奔走轉死之害不起而人乃克鳩類集族歌舞悦懌用祗于元徳徒奮袒呼犒迎義旅讙動六合至于麾下大盗豪據阻命遏徳義威殄戮咸墜厥緒無劉于虐人乃並受休嘉去隋氏克歸于唐躑躅謳歌灝灝和寧帝庸威栗惟人之為敬奠厥賦積藏于下是謂豐國鄉為義廩歛發謹飭嵗丁大祲集作侵人以有年簡于厥初刑不殘而懲是謂嚴威小屬而支文粹作小厲而有非大生而孥愷悌祗敬用底于理凡其所欲不謁而獲凡其所惡不祈而息四夷稽服不作兵革不竭貨力丕揚于後嗣用垂于常一作帝式十聖濟厥治孝仁平寛惟祖之則澤乆而逾深仁增而益髙人之戴唐永永無窮是故受命不于天于其人休符不于祥于其仁惟人之仁匪祥于天匪祥于天茲惟貞符哉未有喪仁而乆者也未有恃祥而夀者也啇之王以桑榖昌以雉雊大宋之君以徳文粹作法星夀鄭以龍衰魯以麟弱白雉亡漢黄犀死莾惡在其為符也不勝唐徳之代光紹明濬深鴻龎大保人斯無疆冝薦于郊廟文之雅詩祗告于徳之休帝曰諶哉乃黜休祥之奏貞符之奥思徳之所未大求仁之所未備以抵于邦治以敬于人事其詩曰此下集有六字於穆敬徳黎人皇皇集作之惟貞厥符浩浩將將集作之仁函于膚刄莫畢屠澤熯文粹于㸑沸一作鬻炎以澣殄厥凶徳乃敺乃夷懿其休風是煦是吹父子熈熈相寧以嬉賦徹而藏厚我糗糧集作粮形輕以清我完文粹作俾我靡傷貽我子孫百代是康十聖嗣于理神后之子子思孝父文亦患已集作昜患于已拱之戴之神具爾宜集作神其祐焉載揚于雅承天之嘏天之誠神宜鑒于仁神之曷依宜仁之歸滌訟集作濮沿于北祝栗于南幅員西東祗一乃心祝唐之紀後天罔墜祝皇之夀與地咸乆曷徒祝之心誠篤之户文粹作神恊人同道以告之闕彌文粹有億字萬年不震不危我代之延永永毗之人増以崇曷不爾思有號于天僉曰嗚呼咨爾皇靈無替厥符唐天志歐陽詹天雖覆育生生如有集作其情則或與或否其與也非徒與其否也非徒否受命有生生者率其道反其道之致焉率則與反則否斯理也固必信至皇帝以孚皇唐百七十有五載皇帝御宇之十四祀也嵗在辛未實貞元七年其受命率道天與生生如其情之秋歟神哉靈哉明允惠和哉是嵗之天也亭乎其正洞九霄之清澈清澈之中若有同夫有求者欝乎其變浮五色以薰郁薰郁之中若有察夫所厭者稱物之性應時之欲手足之赴人心羽翼之循鳥情農夫在畦蠶婦在林啇或舟車工或烻艧願燥願濕罔不從志其餘則三光流序六氣時行上至事事下洎營營羽毛鱗介勾甲芽萌求諸濡渥則常雨求諸煦旭則常晴求諸吹盪則常風求諸恬謐則常寧求諸煙雲則常隂求諸日月則常明非不雨也非不晴也非不風也非不寧也非不隂也非不明也合雨而後雨物不乏其雨合晴而後晴物不乏其晴合風而後風物不乏其風合寧而後寧物不乏其寧合隂而後隂物不乏其隂合明而後明物不乏其明實皇帝知上帝以生生為已物與其禍福配已得失而𡨕之欽若兢若温如穆如心性二儀支體四時似續上𤣥之効文粹作命與夫人心能領天之憂承父之命繼堂紹構得其心贈遺獻酧愜其中則財賄器物惟意是役一作用牧圉臺𨽻唯意是用一作役以其役無不當也以其用無不宜也土徳勝天寳隨維唐皇帝則唐天子第九子也既克負荷上天所以雅意焉且煙雲風雨亦天之財賄也日月星辰亦天之器物也神祗精靈亦天之牧圉臺𨽻也是以皇帝動息神祗莫不隨㫖趣精靈莫不由肅穆寂寥絡繹虚無囊篋日月管鑰風雨敬恭誅責而啓閉多少之故將䕃庥施煙雲若自請帷幕而使張矣將灑潤散氣風雨若自請盆翣而使澆扇矣將烜清晝布陽徳若自請爐竈而使燀灼矣將光幽夜啓隂靈若自請燈燭而使昭明矣處植維茲含靈不折以莓莓熈熈蓋子祗父慈相為福釐也凡書惡紀善雖史官之職箴淫述徳或人所通規鯫生則人之一匹夫耳謳吟日月而為之志若簡䇿已載復何言哉儻猶未也庶補其闕是嵗也扶風竇公叅河中董公晉輔政之三年趙郡李公紓為天官之四年范陽盧公徴為地官之元年范陽張公濛為春官之二集作三年昌黎韓公佪為夏官之三年呉郡陸公贄同為夏官之二年京兆杜公黄裳為秋官之二年清河張公式文粹作或為冬官之五年夫太宰六官於天子之為理棼一作亦澄派而清洪流者故列于斯志之末文苑英華巻三百五十九
