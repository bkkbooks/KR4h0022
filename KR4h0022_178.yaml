body:
  text: 文苑英華巻一百七十八宋李昉等編應制十一寺院四十首雜題六首宫觀十三首雜題六首寺院過慈恩寺唐太宗日宫開百仭月殿聳千尋花蓋飛員影幡虹曵曲隂霞綺遙籠帳叢珠細網林寥廓烟雲表超然物外心奉和同前應制許敬宗鳯閣隣金地龍旂拂寳䑓雲楣將葉並風牖送花來月宫清晩桂虹梁絢早梅梵鏡留宸瞩掞發麗天才和九月九日登慈恩寺浮圖應制李嶠瑞塔千尋起仙輿九日來茰房陳寳席菊蕋散花臺御氣鵬霄逈雜詠作近升髙鳯野開天歌將梵樂空裏共徘徊同前趙彦昭出豫一作御辦乗嘉節慿髙陟一作嵩出梵官皇心滿塵界佛迹見虚空日月宜長夀天人一作人天得大通喜聞題寳偈受記莫由同同前鄭愔見雜詠湧霄開寳塔倒影駐仙輿鴈子乗堂處龍王起藏初秋風聖主曲佳氣史官書願獻重陽夀承歡萬嵗餘同前劉憲飛塔雲集作香塔増霄半清晨羽斾一作仙鑣净境遊登髙一作臨慿季月逺近一作寥廓見中州御酒新寒退天文瑞景留一作寳氣浮却邪將介福一作獻夀兹日奉千秋同前李乂湧塔開𤣥地髙層瞰紫㣲鳴鑾雜詠作鸞陪帝出攀橑翊天飛慶洽重陽夀文含列象輝小臣叨載筆無以雜詠作此頌巍巍同前宋之問見雜詠鳯刹侵雲半虹旌倚日邉散花多寳塔張樂布金田時菊芳仙醖秋蘭動睿篇香街稍欲晩清蹕扈歸天同前上官昭容雜詠作崔湜帝里重陽節香園萬乗來却邪萸結珮獻夀菊傳杯塔類承天藻門疑待佛開睿詞懸日月長得御雜詠作仰昭回閏九月九日幸揔持寺登浮圖應制李嶠閏節開重九真㳺下大千花寒仍薦菊座晩更披蓮刹鳳回雕輦幡虹間綵旃還將西梵曲助入南薫絃同前雜詠作和聖製閏九月九日登莊嚴揔持二寺閣宋之問閏月再重陽仙輿歴寳坊帝歌雲稍白御酒菊尤黄風鐸喧行漏天花拂舞行豫游多景福梵宇自生光同前劉憲見雜詠重陽登閏序上界叶時廵駐輦天花落開筵妓樂陳城端刹柱見雲表露盤新臨睨光輝滿飛文動睿神同前李乂見集本清蹕幸禪樓前驅歴御溝還疑九日豫更想六年逰聖藻輝纓珞仙花綴冕旒所欣延億載寧祗慶重秋奉和幸三㑹寺應制寺傳云蒼頡造書䑓李嶠故䑓蒼頡里新邑紫泉居嵗在開金寺時來降玉輿龍形雖起刹鳥迹尚留書竹是蒸青外池仍㸃墨餘天文光聖草寳思合真如謬奉千靈日欣陪十地初同前鄭愔鳥籀遺新閣龍旂訪古䑓造書臣頡往觀籍帝羲來睿覽山川匝宸心宇宙該梵音随駐輦天歩接承杯舊苑經寒露殘池間刼灰散花將捧日俱喜聖慈開同前劉憲岧嶤蒼史䑓敞朗紺園開戒旦壺人警翻霜羽騎來下輦登三襲褰旒望九垓林披館陶牓水浸昆明灰網戸飛花綴幡竿度鳥廻豫逰仙唱動瀟洒出塵埃同前李乂睿德揔無邉神臯懌勝縁二儀齊法駕三㑹禮香筵漢闕中黄近秦山太白連䑓疑觀鳥日池似刻鯨年滿月臨真境秋風入御絃小臣叨下列持管謬窺天同前宋之問六飛廻玉輦雙樹謁金仙瑞鳥呈真宇神龍吐玉泉净心遙證果睿想􅍦超禪塔湧香花地山圍日月天梵音迎雨徹空樂倚雲懸今日登仁夀長㸔法鏡圓同前上官昭容釋子談經處軒臣刻字留故䑓遺老識殘簡聖皇求駐蹕懐千古開襟望九州四山縁塞合二水夾城流宸翰陪瞻仰天杯接獻酬太平詞藻盛長願紀鴻休奉和幸大薦福寺寺即中宗舊宅李嶠鴈沼開香域鸚一作嬰林降綵旃還窺圖鳯宇更坐躍龍川桂嶼朝羣辟蘭宫列四禪半繩銀閣斷分砌寳繩連甘雨申譙澤慈雲動沛篇􅍦慚賢作礪空喜福成田同前趙彦昭瑤地龍飛後金身佛現時千花開國界萬善累皇基北闕承行幸西園属住持天衣拂舊石王舍起新祠刹鳯迎琱輦幡虹駐綵旗同沾小雨潤竊仰大風詩同前宋之問香刹中天起宸逰滿路輝乘龍太子去駕象法王歸殿飾金人影窓摇玉女扉稍迷新草木遍識舊庭闈水入禪心定雲從寳思飛欲知皇刼逺初拂六銖衣同前鄭愔舊邸三乗闢佳辰萬騎留蘭圖奉葉偈芝蓋拂花樓圖㑹人王法宫還天帝逰紫雲成寳界白水作禪流鴈塔昌基逺鸚林睿草抽欣承大風曲竊預小童謳同前劉憲地靈傳景福天駕儼鈎陳佳哉藩邸舊赫矣梵宫新香塔魚山下禪堂鴈水濵珠幡映白日鏡殿㵼青春甚歡延故吏大覺拯生人幸承歌頌末長奉属車塵同前李乂象設隆新宇龍潜想舊居碧樓披集作搜玉額丹仗導金輿代日興光近周星掩曜初空歌清沛筑梵樂羙河書帝造還三界天文賁六虚康哉孝理日崇德在真如薦福寺應制趙彦昭雲驂驅半景星蹕坐中天國誕𤣥元聖家尋碧落仙玉杯鸞薦夀寳筭鶴知年一覩雲華唱欣承道德篇奉和同前應制宋之問梵筵光聖邸仙象覽宏規不改靈光殿因開功德池蓮生新歩葉桂長昔攀枝湧塔庭中見飛樓海上移聞韶三月幸觀象七星危欲識龍歸處朝來雲氣随岳寺應制前人暫幸珠筵地俱憐石瀬清泛流張翠幕拂迥挂紅旌雅曲龍調管芳樽蟻泛觥陪懽玉座晩復得聴鐘聲少林寺應制前人紺宇横天室回鑾指帝休曙隂迎日盡春氣抱嵒流空樂繁行漏香煙薄綵逰玉膏從此泛仙馭接浮丘從幸香山寺應制沈佺期南山奕奕通丹禁北闕峩峩連翠雲嶺上樓䑓千地起城中鐘鼓四天聞旃檀曉閣金輿度鸚鵡晴林綵毦分願以醍醐參聖酒還將祇苑當秋汾奉和聖製同皇太子逰慈恩寺應制前人肅肅蓮花界熒熒貝葉宫金人來夣裏白馬出城中湧塔初從地焚香欲遍空天歌應春籥非是為春風同前二首張說翼翼宸思集作恩永煌煌福地開離光升寳殿震氣遶香䑓上界幡花合中天妓樂集作日月來願君無量夀仙藻屢徘徊二朗朗神居峻軒軒瑞象威聖王集作君成願果太子拂天衣至樂三靈㑹深仁四皓歸還聞渦水曲更繞白雲飛奉和聖製七月十五日題章敬寺應制崔元翰妙道本非説殊途或異名聖人得其要俱以化羣生鳯吹從上苑龍宫連直城花鬘列廣殿雲蓋一作䍐駐前庭松竹含新韻一作秋軒窓有餘清𬗟懐崆峒事湏繼管絃一作簫管聲離相境都寂忘言理更精域中信稱大天下乃為輕屈已由濟物堯心豈所榮駕幸天長寺應制釋廣宣天界宜春賞禪門不掩闗宸逰䨇闕外僧隐百花間車馬喧長路煙雲净遶山觀空復觀俗皇鑒此中閒駕幸普救寺應制前人南方寳界幾由旬八部同瞻一佛身寺壓山河天宇静樓懸日月鏡光新重城栁暗東風暖複道花明上苑春向暖鸞輿歸鳯闕曲江池上動青蘋駕幸聖容院應制前人大唐國裏千年聖王舍城中百億身却指容顔非我相自言空色是吾真深殿䖍心随寳輦廣庭徐歩引金輪古來貴重縁親近狂客慙為侍從臣紅樓院應制前人紅樓疑見白毫光寺逼宸居福盛唐支遁愛山情漫切曇摩泛海路空長經聲夜息聞天語鑪氣晨飄接御香誰道此中難可到自憐深院得徊翔寺中賞花應制前人東風萬里送香來上界千花向日開却笑霞樓紫芝侣桃源深洞訪仙才寺中柿樹一蔕四顆詠應制前人珍木生竒畆低枝拂梵宫因開四界分本自百花中當夏隂涵緑臨秋色變紅君㸔藥草喻何減太陽功雜題降誕日内庭獻夀應制前人慶夀千齡逺敷仁萬國通登霄欣有路捧日愧無功仙駕三山上龍生二月中脩齋長樂殿講道大明宫此地人難到諸天事不同法筵花散後空界滿香風早秋降誕日獻夀二首應制前人秋蓂開七葉元聖誕千年繞殿祥風起當空瑞日懸道光中國主人識大羅仙敢賛無疆夀香花上法筵二萬方瞻聖日九土仰清光罄地山河壯彌天福夀長瑞烟薰法界真偈啟人王願獻千秋樂千秋樂未央禁中法㑹應制前人天上萬年枝人間不可窺道塲三敎㑹心地百王期侍讀沾恩早傳香駐日遲在筵還向道通籍許言詩空媿陪仙列何階荅聖慈從今精至理長願契無為再入道塲紀事應制前人南方歸去再生天内殿今年異昔年見闢乾坤新定位㸔題日月更髙懸行随車輦登仙路坐近鑪烟講法筵自喜恩深陪侍從兩朝長在聖人前雜言奉和聖製至承光院見自生藤感其得地因以成詠應制崔元翰新藤正可翫得地又逢時羅生宻葉交緑蔓欲布清隂垂紫蕤已帶朝光暖猶含輕露滋遙依千華殿稍上萬年枝餘芳連桂樹積潤傍蓮池豈如幽谷無人見空覆荒榛雜兔絲聖心對此應有感隐跡如斯誰復知懐賢勞永嘆比物賦新詩聘丘園訪茅茨為謝中林士王道本無私宫觀幸白鹿觀應制李嶠駐驆三天路回車萬仭溪真庭羣帝饗洞府百靈棲玉酒仙壚釀金方暗壁題佇㸔青鳥入還陟紫雲梯同前崔湜御旗探紫籙仙仗闢丹丘捧藥芝童下焚香桂女留集作流鸞歌無嵗月鶴語寄春秋臣朔其何幸常陪漢武逰同前沈佺期紫鳯真人刼斑龍太上家天流芝蓋下山轉桂旌斜聖藻垂寒露仙杯落晩霞唯應問王母桃作幾時花同前劉憲𤣥逰乗落暉仙宇暖霏㣲石梁縈澗轉珠斾掃壇飛芝童薦膏液松鶴舞驂騑還似瑤池上歌成周馭歸同前李乂制蹕乗驪阜廻輿指鳯京南山四皓謁西岳兩童迎雲幄臨𤣥圃露集作霞杯薦赤城神明近兹地何必往蓬瀛同前武平一玉府凌三曜金壇駐六龍綵旒懸倒景羽盖偃喬松𤣥圃靈芝秀華池瑞液濃謬應沾舜渥長願奉堯封同前張說洞府寒山曲天逰日旰回披雲㸔石鏡拂雪上金䑓行徑龍驂下松庭鶴轡來雙童還薦藥五色耀仙才同前徐彦伯鳯輿乗八景龜籙向三仙日月移平地雲霞綴小天金童擎紫藥玉女獻青蓮花洞留宸賞還旗繞夕烟同前蘇頲碧虚清吹下藹藹入仙宫松嶝攀雲絶花源接澗空受符邀羽使傳訣駐香童詎似閒居日徒聞有順風奉和御一作聖製登降聖觀與宰臣同望之作王維鳯扆朝碧落龍圖耀金鏡維岳降二臣戴天臨萬姓山川八校滿井邑三農竟比屋皆可封誰家不相慶林疎逺村出野曠寒山净帝城雲裏深渭水天邉映佳集作喜氣含風景頌聲溢歌詠端拱能任賢彌彰聖君聖奉和聖製慶𤣥元皇帝玉像之作前人明君夣帝見集作先寳命上齊天秦后徒聞樂周王恥卜年玉京移大像金籙㑹羣仙承露調天供臨空敞御筵斗廻迎夀酒山近起爐烟願奉無為化齊心學自然安國寺随駕幸興唐觀應制釋廣宣東林何獻是西隣禪客垣墻接羽人萬乗逰仙宗有道三車引路本無塵初傳寳訣長生術已證金剛不壊身兩地盡脩天上事共瞻鸞駕重來巡奉和華清宫觀行香應制崔國輔天子蘂珠宫瑤䑓碧落通豫逰皆汗漫齋䖏即崆峒雲物三光裏君臣一氣中道言何所説寳厯自無窮雜題春日從駕新亭應制劉孝綽旭日輿輪動言追河曲逰紆餘出紫陌出一作入迤邐度青樓前驅掩蘭徑後乗歴芳洲春色江中滿日一作雪華巖上留江風傳葆吹巖花映采斿臨渦起睿作駟馬暫停輈侍從榮前阮雍容慙昔劉空然等彈一作殫翰非徒嗟未遒一作皆集本侍從途中口號應制閻朝隐疵賤出山東忠貞任土風因敷河朔藻得奉洛陽宫一顧侍御史再顧給事中常願粉肌骨持荅造化功扈從出長安應制杜審言分野都畿列時乗川集作六御均京師舊西幸洛道此東廵文物驅三統聲名走百神龍旗縈漏夕鳯輦拂集作出鈎陳撫迹地靈古逰情皇覽新山追散馬日水憶釣魚人禹食傳中使堯樽遍下臣省方稱國阜問道識風淳嵗晩天行吉恩豐景從親歡娱包歴代宇宙兩宜春集作忽宜春初冬從幸漢故青門應制沈佺期漢皇建都邑渭水對青門朝市俱東逝墳陵共北原荒凉蕭相闕蕪沒邵平園全盛今何在英雄難重論故基仍岳立遺堞尚雲屯當極土功壯安知人力煩天逰戒東首懐昔駐龍軒何必金湯固無如道徳藩㣲臣諒多幸參乗偶殊恩預此陳古事敢奏興王言春日幸龍門應制武三思鳯駕臨香地龍輿上翠㣲星宫含雨色月殿抱春輝碧澗長虹下雕梁早鷰歸雲疑浮寳蓋石似拂天衣露草侵堦長風花遶席飛日斜宸賞洽清吹入重闈駕幸龍門應制宋之問宿雨霽氛埃流雲渡城闕河堤栁新翠苑樹花初發洛陽花栁此時濃山水樓䑓映幾重羣公拂霧朝翔鳯天子乗春幸鑿龍鑿龍近出王城外羽從琳瑯集作淋漓擁軒蓋雲䍐纔臨御水橋天衣已入香山㑹山壁嶄巖㫁復連清流澄澈俯伊川塔影遙遙緑波上星龕奕奕翠㣲邉層巒舊長千尋木春壑初飛集作分百道泉彩仗紅旌繞香閣下輦登髙望河洛東城宮闕擬昭回南陌溝塍殊綺錯林下天香七寳䑓山中春酒萬年杯㣲風一起祥花落仙樂初聞瑞鳥来鳥來花落紛無已稱觴獻夀烟霞裏歌舞淹留景欲斜石闗猶駐五雲車鳥旂翼翼留芳草龍騎駸駸映晩花千乗萬騎鑾輿出水静山空嚴警蹕郊外喧喧引㸔人傾都南望属車塵囂聲引颺開黄道佳氣周旋入紫宸先王定鼎山河固寳命乗周萬物新吾君不事瑤池樂時雨來觀農扈春文苑英華巻一百七十八
