body:
  text: 文苑英華卷四百四十宋李昉等編德音七雜德音一貸逃背征役德音編制門下朕祗膺靈命君臨宇縣詔令作區宇承凋弊之餘拯橫流之難雖復蠲除徭賦督課耕農安集黎元與之休息然而鯨鯢未剪四海多虞師旅荐興事不獲已及其士卒浮惰苟求逸樂憚於征役離其營伍因此逃竄濳匿﨑嶇盜竊為資規免朝夕良由勸勵不明部署失所弛慢之責在於朕躬琴瑟不調已云變革多墜刑網情實一作兼軫悼宜從寬宥許以自新其義士募人有背軍逃亡者自武德二年十月二十日以前罪無輕重皆赦除之飢寒困弊不能自存者所在官司隨事賑給士非素厲難以應敵設法垂憲期於不犯自今以後有背軍鎮征役者隨即科處必無容貸宜明宣告咸使聞知武德二年十月原宥代州德音詔令作宥劉武周餘黨詔門下祝網泣辜章乎舊典赦過宥罪著自前經往者劉武周竊據邉陲擁逼良善石嶺以北皆罹其弊雖復武周奔竄寄命畨夷而殘黨餘氛尚懷旅拒致使朔漠猶警關塞未寧屢動干戈久違聲教代州總管定襄王大思勤績克著安輯邉境討擊未賔率其從化朕君臨天下義存撫育念彼凋弊若納諸隍但朔代黎元逆命日久今雖歸附仍屢詔令作懷反側其代州總管府內石嶺以北自武德四年二月二十九日以前所有愆犯罪無輕重悉從原宥可並令安居復業勿使驚擾武德四年二月恤刑慶賜德音詔令作賜孝義高年粟帛詔門下百行之本要道唯孝一言終身恕而已矣春生夏長寬仁實録作簡詔令作裕之令行焉齊禮道德耻格之義斯在朕爰自幼年夙稟庭訓豈徒學聞詩禮因令匡定家國實録作國家是以提三尺之劒起一旅之師戮鯨鯢於原野拔實録作救蒸黎於塗炭雲雷締構備嘗夷險仁發於心義形於色大敵必勇匪為身謀大憝必誅志安天下太上皇留情姑射尚想軒轅駐蹕大安使朕正居紫極顧惟虛薄辭不獲免祗奉制詔負扆當朝乃眷宫宇載懷冰谷未明求衣乙夜忘寢靜思七政言念九功何以答上玄之心稱嚴君之志庶欲勤恤典刑舉直錯枉允釐人瘼親賢用能拯濟困窮抑損澆偽開直言之路廣不諱之門聞所未聞日慎一日望人皆見德變於志道若一物失所一人有惡則朕躬之責實録有恐字訓道不明也朕聞書曰至諴感神况於兆庶乎比聞逺近黔黎耻為盜賊州縣囹圄多並空虛豈由德教至此自是人心厭亂因其遷善可以化之朕往因征伐行天下多矣每見村落丘墟未嘗不撫膺歎息自登九五不許橫役一人唯冀遐邇休息得相存養長育詔令作幼有序敬讓興行其孝義之家賜粟五石高年八十已上粟二石九十已上三石百嵗加絹二匹婦人正月以來生男者粟一石鰥寡孤獨不能自存逃户初還交實録作嵗無糧貯州縣長官量加賑恤詔令作濟諸州官人或正直亷平刑清訟息實録作簡或貪婪貨賄害政損人宜令都督刺史以名封進白實録作比屋之內閭閻之人但有文武才能灼然可取或言行忠謹堪理時務或在昏亂而肆情遇太平而克已亦録名狀與官人同申泣辜慎法前王所重枉繫一日事等三秋州縣法司特宜存意普告天下知朕意焉貞觀三年四月養老德音詔令作太上皇康復詔門下書不云乎一人有慶兆民賴之朕虔奉大安愛敬崇極日嚴之養祗栗斯在近日聖躬違豫寢膳有虧憂懼在懷不遑寧處博求醫術備盡蠲療祈告明靈具陳懇篤上玄降福遂蒙昭祐應時康愈萬福咸宜喜幸之隆實兼家國思頒愷樂洽於卿士然而尚齒崇孝德教所先饗餼是加義超常等諸州都督刺史及文武官人老人八十以上并孝子旌表門閭者並宜節級賜物以申饗宴庶使萬國之內同此歡心施于四海皆知朕意貞觀四年七月優奬太原勳舊德音詔令作高祖山陵畢賜元從功臣及百姓恩澤詔編制門下高祖大武皇帝天縱神武膺籙受圖可久之德格乎區宇敦睦九族協和萬邦賢能必進德化潛洽革百王之弊興三代之風天平地成邇安逺肅至德被於四海休烈光於千載巍巍蕩蕩無得而稱焉朕嗣膺寶祚夙夜兢惕思述先志被之率土其內外姻戚平生故舊太原元從官人及歷試之所文武僚佐爰洎胥吏往雖每降國恩恐未周悉或才用不申階品屈滯或家道貧匱子孫淪沉須有矜量咸使得所先朝憂勞庶政唯以恤民為本諸州都督刺史政績可稱者宜以名聞奏其諸州百姓營奉山陵者宜量與詔令作有蠲免可令所司詳為條例聞奏并務從優厚稱朕意焉貞觀九年十一月嗣聖德音後編作發宣撫使敕門下昔者明王之御天下也內有公卿允釐庶績外有侯伯司牧羣黎猶懼至道不孚淳風或替故有巡狩之典黜陟幽明行人之官省方察俗用能遐邇咸乂一作遂性情偽無遺於變時雍率其道也朕祗膺嗣德恭守帝圖上稟過庭之謨下憑士庶之力竭精思理兩載于兹冀逮小康漸躋至化而區宇遐曠風教未周負扆長懷責深在已近者姦回搆釁竊起蕭牆宗社降靈應時殱殄今又恭承聖訓總統大猷率彼百官齊兹七政恐倉廪不實禮節未興吏靡息於貪殘人或滯於幽枉永言於此明發疚懷今卜征未及時邁仍逺宜分輶軒慰撫黎庶畢構等並操履公清識具明允茂績彰於歷試嘉譽滿於周行宜膺行李載光原隰所至之處申諭朕心并令屏絶浮華敦崇仁厚務修孝悌勤事農桑耆老鰥惸征人家口不自存者咸加恤問德舉言揚唯賢是急若有良才異等藏器下僚哲人竒士隱淪屠釣審知才行灼然者各以名聞凡百牧宰洎乎吏人咸悉朕心各敬乃事勤則不匱仁逺乎哉勉矣朂之以副朕意先天二年七月此篇四百六十一卷重出今已削去居大明宫德音一作大明宫成放免囚徒等制蘇頲黃門朕聞養人者謂之司牧非逸於人上事天者謂之帝皇一作王蓋御乎一作於天下故作為棟宇以避燥濕居於臺榭以順高明斯乃奉時令布政教一作而行政也朕以不德祗膺睿圖寶十家之産愛兆人之力未嘗興功於土木役思於池籞冀之休乂以致雍熙自律應長贏時方大暑溽雲屢起溫風且至伏以太上皇宴居珍一作頥衛滌慮清間迹不往於甘泉心每期於汾水朕侍于左右以奉晨夕助玄默之化則虧於聽理當炎蒸之序又瀆以囂煩惕焉在懷敢忘順色然大明創兆先聖所營即舊不加因時而往千門萬户外雖謂於别宫一日三朝中自連於復道下所以寧問安之懇上所以資習靜之娛實獲我心禆康政理古有服珍裘者則念人之寒居夏屋者則念人之熱况此嵗阻飢饉甫田不稔或愚人陷罪圜土稱寃凡厥庶僚將何以恤兩京及諸州宜令長官親理寃獄除犯名教及官典犯贓并緣祅一作妖通用偽以外餘罪徒以下咸宜放免其有茂才異等拔萃超羣緣無紹介久不聞達者咸令自舉朕當親問其應宣撫咸使名聞舉人試第四等宜準舊例别加優奬見任人各量與改轉前資常選人至冬依選例處分其未出身者兼一作並授散官先天以來軍將押衙官等在陳戰亡者令本軍勘實奏聞其妄説災祥狂惑閭里并令州縣長官等嚴加捉搦仍令御史金吾訪察繩紏有能直言極諫補朕之闕者各封狀進朕將親覽如有可採當加奬擢其皇親諸親及東宫承優任員外檢校等官近停令至冬處分者有家道貧迫情願外任者亦令所司勘績闕量才注擬其緣坐流人處置有輕重不類者令所司勘會聞奏主者施行開元二年六月八日一作皆唐大詔令營興慶宫德音一作興慶宫成御朝德音編制門下朕昔在藩國此維邸第乾坤未泰隂陽尚蒙則有神物效靈祥符肇貺飛嘉一作佳氣於在田之際湧瑞池於或躍之時惟此舊居式加新宇周墻僅板於百堵卑宫不階於三尺棟梁之用毁撤所餘聊以紀天地之休徴貽子孫之儉約耳屬春令變一作爰始時惟發生萬國來朝千官入賀既稱觴以獻夀宜施惠以布德况農桑在候稼穡正興或幽彼囹圄獨隔陽和之澤或迫於徭役不遂農桑之務言及於此軫歎良深其徒已下罪且令責保其一作并應當畨兵丁匠等灼然單貧者所由勘會並放營農所在訴訟長官隨事疏理勿使寃滯非軍國所要餘不急之務一切並停仍加勸課循植農穡其河北水損户既屬春事慮有乏絶不支濟者宜委使與州縣相度量加賑恤諸處行人之家及鰥寡惸獨不能自存者州縣長官親加優撫使得存濟應有差科量事矜放且宣風緝化職在令長有司銓藻之次特宜審擇其才惟德與刑為政之要頃無聞於風化多取威於檟楚理人之道其若是乎愚昧之流或輕抵犯宜加曉諭使識章程其含生之類不得輒有屠殺天下捕獵亦宜禁斷仍嚴加捉搦百司各遵時令務𢎞寬大之典使正理無失稱朕意焉開元十六年正月二十六日一作皆唐大詔令皇太子納妃德音張九齡敕禮有謹於初義亦重其本凡是姻媾且宜正於人倫况在元良更將承於宗祀皇太子鴻儲副是屬仁孝自然爰從吉辰式備嘉禮上祀一作事下繼君子重之言告言歸朕豈無慰非獨在豫之慶宜申與衆之澤應天下囚徒死罪特宜免死配流嶺南逺處流罪降至徒徒已下罪並宜釋放其造偽頭首勾合知情受偽人等罪雖徒流仍使𨽻於百姓至彼勿許東西諸道征行人家及鰥寡惸獨委州縣長官檢校矜放差科使安其業中間有不支濟者量事賑給仍量助其營種長安萬年兩縣百姓及今月當上彍騎衛士雜匠掌間幕士駕士工人樂人供膳主膳官馬主食弓手等並免其家今年地稅三衛細引飛騎萬騎監門長上及禮生有職掌者各減一年勞在京文武官九品已上見在京外官因公使及堂上在京新除五品已上外官未辭并致仕官朝朔望者各賜勳一轉東宫官九品已上及諸司緣禮會祗供官等更加勳一轉五禮使兵部尚書兼中書令蕭嵩特封徐國公禮會使黃門侍郎同中書門下平章事韓休特與三品妃禮會使少府監馮紹正賜紫金魚袋諸副使及判官更加勳一轉禮官儐者夾侍官及孔目官使典主旌節等選日優與處分仗內馬家內侍省給使教坊音聲人緣太子禮會祗供者各賜勳一轉皇太子舅尚輦奉御趙逈遵特與三品仍改與三品官前右武衛騎曹趙逈進特與五品仍改與五品官皇太子侍讀侍書等各加一階皇太子諭德潘蕭特與五品太子妃兄通事舍人薛願特與五品仍改與五品官兄吏部常選怤特與五品仍與五集作六品官今日應預會官等各節級給賜物即宜領取宴慰者所以宣其情頒賜者所以將其意公卿百辟庶知朕心開元二十一年五月二十一日優恤德音門下朕猥際休運多謝哲王而哀矜之情大小必慎自臨寰宇子育黎蒸未嘗行極刑起大獄上玄降鑒應以祥和叶平邦之典致之仁夀之域自今有犯死刑除十惡宜令中書門下與法官詳所犯輕重具狀奏聞崇德尚齒三代不易移風勸俗五教攸先其曾任五品已上清資官以理去職者所司具録名奏老疾不堪釐務者與致仕祿道士女道士宜𨽻宗正寺僧尼令祠部檢校百司每旬休節假並不須親識事追勝為樂以示內外知朕意焉開元二十五年正月十七日嵗初處分德音張九齡敕天地以大德育羣生詔令作生羣有聖人以大寶守萬物古者受命之君謂之承天之序明有所代夫豈徒然若道無欽崇命不永保帝實臨汝人曷戴君朕所以每期庶乎合於仁覆之意也夫伏羲神農黃帝堯舜或誅而不怒或教而不誅彼亦何為獨臻於此朕自有天下二紀于兹雖未能畫衣以禁亦未嘗刑人於市而政猶踳駁俗尚澆漓當是為理之心未返於本耳凡人豈不仁於父母兄弟不欲於飲食衣服乎而率被無孝友之名不溫飽之困其故何哉蓋未聞義方不識善道或任小智而為偽或見小利而苟得致逺則窮繼之以暴已而身受戮辱家不相保愚妄之徒類多自陷獄訟之弊恆由此作吁可悲乎亦在教之不明也蓋刑罰者不獲詔令作得已而用之天下黔黎皆朕赤子以誠告示其或知歸何必用威然後致理先務仁恕寧不懷之且五常循行豈須深識六親和睦何待丁寧自宜勉之以副所望刑措不用道在于兹今獻嵗之吉迎氣伊始敬順天常無違月令所由長史可舉舊章諸有嫗伏孕育之物蠢動生植一作靈之類慎無殺伐致令夭傷九土異宜三農在候聚衆興役妨時害功特宜禁止以助一作租春事至若家有征鎮人或孤惸物向陽和此獨憂瘁良可憫也亦令所由一作在隨事優恤蓋不體仁無以為長不知道無以用心故道者衆妙之門而心者萬事之統得其要會義可以兼濟於人失其指歸生不能自全於已故我玄元皇帝著道德經五千文明乎真宗至於妙用而有位者未嘗詔令作之講習不務清淨一作靜欲令所為之政詔令作正教何從而至于太和者耶百辟卿士各須詳讀勉存進道之誠更圖前席之議至如計較小利綜緝煩文邀名且行去道彌逺違天和氣生人怨心朕甚厭之所不取也各勵精一共興玄化俾蒼生登於仁夀天下還於淳朴豈逺乎哉行之可至其老子道德經宜令士庶家藏一本仍勸習讀使知指要每年貢舉人量減尚書論語一兩道策準數加老子策俾敦崇道本附益化源朕推誠與人有此教誡必驗行事豈垂空言今之此敕亦宜家置一本每須三省以識朕懷開元二十二年正月一日文苑英華卷四百四十
