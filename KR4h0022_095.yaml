body:
  text: 文苑英華卷九十五宋李昉等編人事六夢逺遊賦一首夢遊仙庭賦一首夢賦一首夢五色筆賦一首夢捧日賦一首髙宗夢得說賦一首莊周夢為蝴蝶賦一首莊周夢蝴蝶賦一首夢舞鍾馗賦一首夢逺遊賦并序獨孤及老氏稱吾所以一有有字大患者為吾有身大哉聖人之知微乎一有夫字生者一氣之暫聚耳有天地之和自然之力以運其行止節其夭壽非智力之所一有能字扶明矣而舉世矻矻莫不保持形骸謂為已有特執迷妄往而不返小者攘禮樂竊忠信以賈譽大者盜天地之權至於忘身道德之衰皆此物也豫生於浮而長於妄汨沒當世與羣動俱不智不能逃形於聲名之韁鎖脫屣於冠冕之籠檻及其世界顛倒萬物反覆始反照收視以觀身世然後知一生之患假合真合真字一作豈直芻狗土梗一作苴熱焰聚沫而已則我之身與百憂偕長况重險之中乎思欲冲三清出五濁乘陵虛極與造物者為伍莫有由矣嘗中夜夢飛升太空若有以名跡見誚者覺而自失乃為賦以狀逺遊且旌吾聞二字一作吾道之晚也其詞云仰太素兮觀元精烟煴敦官司乎物初一作物物兮得流形一有而字為人太皥遺我八卦藏天地於文字黼而黻之為聖為智褒衣之徒相與擊建鼓一有而字揭日月兮奔孝慈而走仁義而一作其弊也古是而今非身賤而名貴驂驔馺遝兮道路屯雲而奔波絢煥轇轕兮玉帛鐘鼓之駢羅霍􅀈鬱密兮心懸天地而火馳蒼黃一有兮字得未終也而失一有已字繼之百骸與日月並馳一作走五藏與哀樂交戰羲和未一有及字弭轡榮枯紛一有而字萬變何生涯一有之字侘傺兮蹇吾降此中州馮世道以上下若涉水而無津兮與吹萬同其波流况世緒坱圠兮如棼絲之相繆一作樛見辰極之低昻兮知杞人之殷憂顧兔呀以蝕月兮天地閉而雲愁鳳凰焚其故巢兮繞舊國以失儔埃壒塕以上薄兮虞一有羅字紛其四州吾始未知一有夫字六合湫隘之若此孰與居一作吾兮逺遊豈無太清之路兮夫何漫漫而迢遰望帝鄉而一作之低徊兮微白雲與之皆一作偕逝澄豫神於遙夜與皓氣期乎無垠真境沕穆以傍感精誠薰然而來親歘乘夢以奮飛摶至虛一作靈以上賔望見碧落天地如掌洞開八門别有萬象亭亭物外乘化直上身世雙遺獨與道往其往也泛兮若遊魚振鱗而泳清川坰兮若翔鴈得順風而緣秋天忽不知豫誰之身夫何為者深一作探入空界七耀在下問豫津於混茫兮蹇徜徉以延佇若有人兮縹眇指人間以唁豫曰鳳兮鳯兮何德之暌天固桎若以禮義梏若以事機蓋支離其德而逃一作起乎物纍使逸翮可得而籠樊兮孰云夫五色五色二字一作五毛之自異天運地載剛柔生焉千變萬化如環無端彼興廢與往復同大壑之波瀾將令歸根明徵其源則吾與若一有皆字幻也又奚睢盱於其間幻未始有封物未始有疆成則虧進則傷無汨而和無易而方山立其中央善汝行密汝藏道將自光吾在大羅之上𤣥都之所乾坤為家日月為宇噓吸元氣太虛之下音户尚一乃心勿謂道阻遊乎無窮吾顧見汝奉真誥以自省兮五情愁其增熱哀攀龍之無階兮思遇一作過天之曷月未知去下方幾萬億兮退將返遵吾歸轍循玉虛以下降濟銀河以中歇馮東井以俯視識故國之城闕千門萬戶遙如蟻穴百川綺分五嶽羅列覔舊山與喬木才依稀而明滅見伊川之一無之字大道鞠為戎狄歷陽故人半作魚龜一作龞曩之奔命於市朝者如紛紜飛馳囁囁蚩蚩蹩􅍷蹁躚肖翹陸離若蟣虱之聚壞絮蜘蛛之乘逰絲一有吾字乃命今日識羣動之變態兮莞然倚長空而笑之亦既自得周覽未畢惕然形開萬象都一作如失羣有儼以皆作百慮繽其來歸乃夙昔之人寰如故時之喧卑向之俯仰欣戚無非妄者然後知吾之生也與妄皆生邪氣乘之萬緣合并為憂為患為虧為盈彼君子兮一作方碌碌自然以為覺猶飾妄以賈名安知聖人不以世界為重狴生死為大夢視變化以一作與品類亦由一作猶神交之飛動與貴一作遺物以顧身兮悟生浮而質陋以一氣之秒忽與萬化而紛糅自視俄然寄形宇宙尚何能濡首於榮辱之境甘口一作心於哀樂之囿鷦鷯于飛載翩載翾一作翻君子至止棲息化元獨立載一作乾又作道樞怡神胚渾萬物轉薄吾真長存止水不波浮雲無根與時盈虛委質乾坤倚伏相軋吉凶同源物各自爾豫欲無言優哉游哉聊以窮年夢遊仙庭賦王延齡葛稚川見素抱朴傲世忘榮循潔白之道吸元和之精泊乎意朕飄然體清於時秋風蕭蕭秋夕凛凛野猿垂幕山童薦枕須臾之間乃安斯寢神倐忽而逾邁眇不知其所届紛溶溶而上馳將若遊乎天外駕白鹿驂斑麟飛翠蓋騰紅輪橫絶南斗超凌北垠出崑虛以騁志過滄溟而問津呵風伯叱雷父披天門謁天宇太一之居兮金碧堂洞鬱密兮不見陽蘂珠履地雲屏匝廊色剡剡其揚彩爛煜煜以成章旖旎旌節襂襹羽裳蒼龍吹篪丹鳯為舞洞轇轕乎東廂此其大較也若乃羣仙之所盤薄珠庭之所雘濩曼以玉堂映以朱閣靈怪潛祕光華相錯隂陽不能授其寒暑造化不能生其美惡及乎上真降命赤書爰作速陽侯而波靜走姮娥而月落值江妃之倩練驚海童之閃爍其翺翔曠逺者嬉九垓排三山紫烟生白雲閒偃蹇夭矯翩綿縹眇可見而不可攀至夫靈草自然珍木不死餐霞咽液乘鴻躡鯉或隱山林或遊城市斯實𤣥都之能事尤難測其云已洪崖先生方睟其容頷其頥曰中州之士也爾來何遲出祕訣約真期挹華池之水唱天關之詞既乃避席屏氣拜命之辱精皎皛兮從空浮長覺悟兮還舊丘唯見塵書滿屋皓月生樓涉化窮極無跡難求豈莊周夢為蝴蝶蝴蝶夢為莊周歟意者天聰明神正直親其貞亮之槩照以𤣥魁之極雙童兮何日再逄上清兮何時再陟掩空館而愁卧撫長懷而歎息夢賦杜頠夫人者何乾坤之至精夫夢者何精爽之所成及乎羣動息閒守一作宇清淡爾安寢儼乎無營亦或不意而得亦或因感而生明休咎之先兆通喜怒之深情其為吉也懸三刀以作郡凌八門而上征或生松以表秩或贈蘭以為名盬音古腦審其戰勝鑿心啓其才英其為凶也晉侯彌留作疾於二竪孔公將殁觀奠於兩楹雖否臧之殊感諒希微之難明是以太古無夢以絶欲聖人肇夢以治想隨事而生觸類而長或含悲以憎暢一作惕或當歡而契賞曽有慕而忽來屬所思而必往雖遼萬里遽諧疇昔之遊縱冥九泉亦覯平生之像鬼出神入惟惚惟恍則有暌聞疑作間庭闈烟霜嵗慕疑常馳戀於定省忽飛魂於寐寤撩軒幌而無隔邈山河之徑度常倐忽而往來竟不由於道路獨有遭遇明時羇遊上國才譽不振命途仍塞仰軒后之通感慕殷宗而見刻當捧日而振一作披誠庶明君之夢得夢五色筆賦夫何言吉夢兮杳杳冥冥若有一人兮遺我鴻筆居然五色兮其狀炳靈煥錯彩於無像紛斑斕而有形匪沉淪於畫一作盡墨那渾濁於殺青獲乎希微來何處所彩非染而自備管在搦而神與意藻思之相授期文章而見許信魂夢之有乎曽目成而不阻神之正直福非回邪何代無才曷江淹之允屬則吾豈敢疇郭璞之孔嘉繄有靈兮未悟儻知夢兮增華始其良夜幽閒齊心朗暢寢彌安於自得思不適於無妄故降綵筆冥微疑𤣥貺與蠅集而殊端方兔毫而詭狀丹翠式序𤣥黃可分參乎素色爛以成文若以我修詞五彩必能吐鳯若以我揮翰一飛何謝慶雲是知物有幽通神為真宰夢於掌握驚茲夕以靈奇瞻彼筆端勝常時之光彩誠有志而必達冝飾躬而不殆展轉虛室曈曨曉日目眩眯於花容想綢繆於錦質或乍進而乍退類若虛而若實既而駭人恍然觀身雖放言之在我豈假手而非神則知五色之靈筆善誘斯文之日新夢捧日賦以神遇輝燭兆發嘉祥為韻蔣防靈降嘉夢天垂至陽誠發身之兆朕符翊聖之禎祥所謂神而遇暗而彰息沖淡之居于于而自得見貞明之質曖曖而彌光倐爾疑升瞰兮下燭曈曨甘寢之所恍惚曽泉之曲撫金烏之翼匪隔雲霄駐羲和之車乍回昏旭想夫卑髙莫鄰授受何因忽煌煌而委照值默默而凝神寂其神乃無間而通碧落上其手自有昊而得紅輪縹眇魂交光芒景附肘腋輝爍襟懷煦嫗類銜規於逺山同抱璧於中路在忘形之際用示無私當向晦之時將祛未寤豈不以精誠可託光隂可駐從九霄之降祉表千載之嘉遇者也故曰道契幽微天且不違肹蠁隂隲指掌陽輝載營魄而虛無默住荷靈貺而照燭潛依至若冥蒙上越埃壒中歇始悠悠以神契俄赫赫而明發驗扶桑之際其往阻修偶支枕之時其來倐忽是知天無親降靈而非遐神不昧獨幽而不賖不然何虛徐袵席承奉光華髙眠而不驚不悚見瑞而可仰可嘉然則荀令之談足徴程昱之榮有兆常眷眷於天路每拳拳於雲表周旋寤寐偃仰昏曉庶照臨之理感通知葵藿之誠不小髙宗夢得說賦以恭默思道帝賚良弼為韻李觀殷之哲王唯政是恤夜分而寢夢獲良弼雖神悸而若驚冀形求而勿失爰徴營匠刻乎獨見之真乃俾庶僚訪其唯似之質當厥夢也神馳無方未訖永夕如躋彼蒼恍其神兮以浮偃其體兮若亡形接乃夢斯人甚良側身徘徊於已之傍將舉趾以趨附又伸眉而抑揚言霏霏而無瑕目矎矎而有光觀其儀可用為列辟之式察其志不獨稱百夫之防升降咸若周旋允臧寂乎昭昭既寢不忘斯后克明承天之賚謂濟川之器而投足不濡履大覺之端莊子有大覺而後知此其大夢也而遊夢無閡其中蕩蕩其表曖曖雖用助理於一人實候清平於千載於是武丁夢於宫而上與天通傅說築於外而中合神契持緡向老諒殊渭水之涯負畚將疲久困傅巖之際說匪丁而空山長往丁匪說而大位斯替如魚水之相因保君臣之雙麗惟說也䇿名歸主惟丁也受命於帝帝何言哉邈以𤣥造隂推吉士以佐有道說之居兮山之幽雲峩峩兮水浩浩彼人兮何斯歘中心兮夢之如渴兮在茲如饑兮在茲一作如渴兮如飢在茲兮匪茲想遺眷以索隱撫空懷而嘆思思之未得端扆沉默其夢也則誠其寤也則惑其收之於野而寄之以國有唐時雍上明下恭君與之同日臣與之比蹤事不惟舊今之斯從斐而成章有愧雕龍莊周夢為蝴蝶賦以昔者莊周夢為蝴蝶為韻賈餗窮萬化之指歸得七篇於往昔何真人之形氣以異類而遷易將以明道之樞喻心之適徐徐在寐忽羽化於他方栩栩既遊忘魂交於此夕是知溥天之下萬物一也雖飛走之或殊何生成之為假形隨夢改豈必大人占之心與物遷孰云夫子聖者淡然休息恍爾飛揚暗出蠨蛸之户潛辭蟋蟀之堂風景熙熙但娛情於蝴蝶是非草草已委蛻於䝉莊既而忽忽悠悠東西泛浮動皆造適止必忘憂草上翩翻與百花而共媚林間搖曵似一葉之先秋彼賢愚波注禍福環周信乃人間之纍非同域外之遊且夫浩浩隂陽茫茫羣衆紛胸襟之憂患勞日夜而迎送是以至人因茲託諷為魚而江湖可入為鳥而風雲可控飄然而往安知棄我如遺倐爾復來又疑與爾俱夢故得弔詭之理出莊子明懸解之規方形神之寂寞有變化之云為夢也者不期而㑹飛也者以息相吹豈銜髮之能診蓋忘蹄之可知至乎往復須㬰與化為徒寤與覺而未辨蝶將周而已殊是以大同而言萬物為肝為膽小異而說一身為越為胡苟愚智而自得實聖靈之軌模客有志業未如居多不愜六夢紛其夜動七情忘於晝接乃陳古以况今賦莊周之夢蝶莊周夢蝴蝶賦以題為韻張隨伊漆園之傲吏談𤣥默以和光表人生之自得繄萬化之可量萬靈齊乎一指異術吻乎通莊忘言息躬輒造逍遙之境靜寐成夢旋臻罔象之鄉於以遷神於以化蝶樂彼形之蠢類忘我目之交睫於是飄粉羽揚翠鬛始飛飛而稍進俄栩栩而自愜烟中蕩漾媚春景之殘花林際徘徊舞秋風之一葉於戲變化悠悠人生若浮希微兮其狀方異恍惚兮其神遂收雖蘧蘧而復體尚悄悄以在眸我豈彼類彼寧我儔苟夢非而覺是誠虛往而實留且𤣥蹤莫覿真理難求莊周之夢蝶而蝴蝶之夢周歟乃知元氣混然感通斯衆為生死之異分量寤寐而適中形因靜息符大辨之不言神以化遷異至人之無夢若夫氣為質本夢與道俱以我之有化彼之無固假寐而倐忽越百靈疑作齡以須臾其在周也不知蝶之於彼矣其在蝶也不知周之於此乎若然者萬物各得其性一體或殊其途有徐徐而龜曵其尾有察察而狼跋其胡智者所以自智愚者所以自愚則孰能間其巨細孰能别其榮枯欲窮莊生夢蝶之理走將一問於洪爐夢舞鍾馗賦以德至前王始觀神跡為韻周繇皇躬抱疾佳夢通神見畨綽兮上言丹陛引鍾馗兮來舞華茵寢酣方悅於宸扆不知為異覺後全銷於美疢始訝非真開元中撫念齊民憂勤萬國萬幾親决於宸斷微瘧遂沾於聖德金丹術士殊乖九轉之功桐籙醫師又寡十全之力爰感神物來康哲王於時漏滴長樂鐘敲建章扃禁闥兮間羽衛虛寢殿兮閴嬪嬙虎魄枕欹象榻透熒熒之影蝦鬚簾卷魚燈搖閃閃之光聖魂惝恍以方寐怪狀朦朧而遽至􅀈矹疑作硉矹標衆䫜類特異奮長髯於闊臆斜領全開搔短髮於圓顱危冠欲墜顧視才定趨蹌忽前不待乎調鳳管撥鸞絃曵藍衫而颯纚揮竹簡以蹁躚頓趾而虎跳幽谷昻頭而龍躍深淵或呀口而揚音或蹲身而節拍震雕栱以將落躍瑶階而欲折萬靈沮氣以慞惶一鬼傍隨而奮躑烟雲忽起難留舞罷之姿雨雹交馳旋失去來之跡睿想才寤清宵已闌祛沉痾而頓愈㾕山錦切寒也御體以猶寒對真妃言寤寐之祥六宫皆賀詔道子寫婆娑之狀百辟咸觀彼號伊祁亦名鬱壘儺襖於凝沍之末驅厲於發生之始豈如呈妙舞兮薦夢明君康寧兮福履文苑英華卷九十五
