body:
  text: 文苑英華卷七百七十宋李昉等編雜議象古建侯未可議一首賞舊左右議一首漢高祖偽遊雲夢議一首奏貓鼠議一首晉文公問守原議一首昭陵寢宫議二首酷吏傳議一首世祖封不義侯議一首西伯受命稱王議一首焚舟議一首象古建侯未可議魏徴議曰臣聞三代之利建藩屏保乂皇家兩漢之大啓山河同奬王室故楚國不恭齊桓有邵陵之師諸吕稱難朱虛奮北軍之謀九鼎絶而復安諸侯傲而還肅比夫秦之孤立子弟為匹夫魏氏虛名藩捍一作翰若囹圄豈可同年而語哉至於同憂共樂之談百不一存十二字通典作自隋氏亂離百殃俱起黎元塗炭十不一存如蒙聖帝敷至仁以流玄澤沐春風而沾夏雨一朝棄之為諸侯之𨽻衆心未定或致逃亡其未可一也既立諸侯當建社廟禮樂文物儀衛左右頓闕則理必不安粗修則事在未暇其未可二也大夫卿士咸資祿俸薄賦則官府困窮厚斂則人不堪命其未可三也王畿千里征稅不多至於貢賦所資在於侯甸之外今並分為國邑京師府藏必虛諸侯朝宗無所取給其未可四也今燕秦趙代俱帶蕃夷黠羌旅拒胸奴未滅追兵內地逺赴邊庭不堪其勞將有他變難安易動悔或不追其未可五也原夫聖人舉事貴在相時或未可理資於通變敢進芻蕘之議惟明主擇焉謹議此篇英華多脫略今從通典增入賞舊左右議議曰昔晉文反國爰議從亡之賞漢皇定鼎先説入蜀之功太宗兆協大橫未忘代邸之舊光武符膺赤伏猶念潁川之勤此一霸三王名高前代豈溺情於近習曲私於一物哉蓋理有必然義不得已也書曰人惟求舊左右等攀附鱗翼多歷嵗年入參社稷之守出為羈絏之僕冒犯鋒鏑契濶險難或力盡鞍甲一作馬恩澤莫沾或身沒戰場子孫未録羣議不息實由於此今時來有運天門已開故攀桂疑作擊柱之歡未絶積薪之歎尚深若不申此大通疑考之羣望介之推髙潔猶未免言臣等慮不及逺輒申狂瞽伏惟深察悚栗謹議漢高祖偽遊雲夢議高參或曰漢髙帝偽遊雲夢以擒韓信果哉其智足稱也豫以為文粹作謂漢祖不思𢎞逺之規而務一時之計於是乎失政刑矣聖人貴正不貴幸與律不與臧昔者明王五載一巡狩令文粹作合諸侯各朝于方嶽大明黜陟故無德者削地有功者進律漢氏君臨萬國示人以偷偽遊之名不可以訓且當此之時韓信未有逆節一朝繫信而生諸侯之疑天下皆疑則所利者少而所失者多矣文粹無矣字昔崇伯之方命圮族共工之靜言庸違帝堯以則哲之明而未有去者蓋以其行偽象恭且有四嶽之舉故也向使堯惡四凶之行拒四嶽之舉不待試用加之誅放天下必以為戮不辜矣夫刑一人使天下知其罪則服賞一人使天下知其賢則勸若賞而不勸刑而不服堯所不為也漢祖不能斟酌古典卒用陳平之言執信而歸於京師一二年間韓王信反馬邑趙相貫高謀柏人陳豨反代地彭越黥布盧綰之徒悉以叛換漢書顔氏訓叛换叛與畔同豈非服勸用刑之失歟傳曰君人執信臣人執忠古之盟主耻襲侵之事况光有天下者乎於戲悠悠千載變詐萌生使天子不復言巡狩諸侯不敢議朝覲大者自嫌強盛小者懼於囚執是恩信不流于下而忠孝不逹于上王者之澤寖以凌遲自雲夢始矣奏貓鼠議崔祐甫右今月日中使某宣進止以籠盛貓鼠示百寮臣聞天生萬物剛柔有性聖人因之垂訓一作範作則禮記郊特牲篇曰迎貓為其食田鼠也然則貓之食鼠載在典祀一作禮經以其除害利人雖微必録今此貓對鼠不食仁則仁矣無乃戾於性乎鼠之為物晝伏夜動詩人賦之曰相鼠有體人而無禮又曰碩鼠碩鼠無食我黍其序曰貪而畏人若大鼠也臣旋視之雖云動物異於麋鹿麏兔彼皆以時殺獲為國家一作之用此鼠有害亦何愛而曲全之一無此十一字貓受人畜養一作養育棄職一作職既不修亦何異於法吏不勤觸邪疆吏不勤扞敵又按禮部式具列三瑞無貓不食鼠之目以此一作兹稱慶臣所未詳伏以國家化洽理平天符荐至紛綸雜沓史不絶書今兹貓鼠不可濫厠若以劉向五行傳論之此一無此字恐須申命憲司察視一作聽貪吏誡諸邊候無失徼巡貓能致功鼠不為害臣忝樞近職司聰明不揆狂愚輒獻公議謹議一作皆舊唐書本傳晉文公問守原議桞宗元晉文公既受原於王難其守問寺人勃鞮以畀趙衰余謂守原政之大者也所以承天子樹霸功致命川文粹作令諸侯不宜謀及媟近以忝王命而晉君擇大任不公議於朝而私議於宫不博謀於卿相而獨謀於寺人雖或衰之賢足以守國之政不為敗而賊賢失政之端由是滋矣况當其時不乏言議之臣乎狐偃為謀臣先軫將中軍晉君疏而不咨外而不求乃卒定於內豎其可以為法乎且晉君將襲齊桓之業以翼天子乃大志也然而一作則齊桓任管仲以興進竪刁以敗則獲原啓疆適其始政所以觀視諸侯也而乃背其所以興迹其所以敗然而能霸諸侯者以土則大以力則強以義則天子之册也誠畏之矣烏能得其心服哉其後景監得以相衛鞅𢎞石得以殺望之誤之者晉文公也嗚呼得賢臣以守大邑則非失舉也蓋失問也集作問非失問舉非失舉也然猶羞當時陷後代若此况於問與舉又兩失者其何以救之哉余故著晉君之罪以附春秋許世子止趙盾之義謹議昭陵寢宮議王仲舒右奉進止寢宫在山上置來多年曽經野火燒爇摧毁略盡其宫尋移在瑶臺寺左側今屬連年欲議修置會要作理緣舊宫本在山上元無井泉每緣供水稍逺百姓非常勞弊今欲於見住行宫處修造所冀久逺便人會要作安又為改移舊制恐所見會要作在未周宜令中書門下及百寮同商量可否聞奏者守右補闕王仲舒議曰伏詳勑旨以太宗陵廟衣冠所遊嚴上之誠重於改作實聖人之孝也但以既經焚毁舊制將來仙馭所經恐違虔奉之意其本地素無泉源日羞饋祀出於人力登降難為褻味又仲尼有言易墓非古臣庶兆域尚重芟夷園寢之間豈宜振擾不可再興版築理足明徴陛下聰明聖神德協文祖寢宫廢墜嵗序滋深獨留其功以候聖旨伏惟精選信任大臣嚴重其禮昭告陵廟以通明靈令於柏城之中卜其近地略雕琢之費因耕稼之休務録愛人節用之心副文皇還郭之志天下幸甚謹議同前權德輿議曰臣聞古宗廟之制前有廟廟列昭穆後有寢寢陳衣冠自秦漢已來始因陵立廟有寢宫便殿雖廟居陵傍而無必在山上不可在山下之定制且禮文所貴宜也稱也祀事所資敬也潔也伏以昭陵因山太宗所建宫在上以便集作便於當時自野火延燒行宫山下亦已久矣今若伐木縮版程功就險神道貴靜或非所宜則與置陵之初事體為異况舊制既毁新宫是修考於便地可以經久所謂宜且一無且字稱也又井泉在下汲引為易饗獻之禮是資嚴恭本於明德惟馨亦在吉蠲為饎故禮之言祭也水曰清滌言於一作其潔淨滌濯也又曰不敢用常褻味所以交於神明也因兹冽井以備薦羞所謂敬且一作而潔也凡舉事必以制度當否為大而以人力勞逸為細若於事為當而又無一有所字勞不亦順昭陵愛人之心乎不亦協陛下從宜之禮乎今列聖寢宫有在山下者矣然則致敬來格之義豈以山上山下而為逺近耶臣愚以為但在柏城之內則不云逺陛下精誠愼重詢及庶寮徒獻所聞伏增戰越謹議一作皆唐文粹酷吏傳議詩美仲山甫曰剛亦不吐柔亦不茹故體備健順是為文粹作謂全德不然則直已循性能秉一方事舉於中集本川文粹作惡皆川文粹作背理道也得柔之道者為循吏失剛之理者為酷吏司馬氏修史記文粹有始字作二傳以誡世爾而後以郅都為酷吏傳首愚有惑焉都之為中郎將上欲搏野彘活賈姬從容奏議引宗廟太后之重其為濟南守誅豪猾首惡人文粹作道不拾遺其為中尉宗室貴臣斂手仄目其為鴈門守胸奴不敢近邉至為偶人像之騎射莫能中然其勇敢氣節根於公亷不發私書不受請寄具此數者為漢名臣入居命卿出㧾列郡文粹作郡守堅剛忠純終始若一坐臨江之嫌當太后之怒身死漢庭首足異處有以見漢氏之不綱王澤之弛絶也蓋在史氏發而明之以旌事君以勵使臣俾百代之下有所懲勸子長既首冠酷吏班氏乂因而從之善善惡惡之義於此缺矣夫椎埋沉命舞文巧詆之徒目為等夷雜列篇次至於文粹作其述贊雖云引是非爭大體又何補焉噫􅐵洪範之沉潛大易之直方皆臣道也都雖未蹈之斯近之矣不隱忠以避死不枉道以善文粹作蒞官無處父之華異申棖之欲所至之邦必以稱職聞其古之剛而無害文粹作虐怒而中節者歟剛似酷弱似仁在辨之不惑而已天下似是之為失多矣文粹作天下似而非失之多矣豈獨是哉開卷之際恍然有感且以司馬氏班氏皆良史氏文粹作也猶不能辨也文粹無也字故斐然成文世祖封不義侯議豫讀東漢史至彭寵舉兵拔薊城自為燕王倉文粹作蒼頭子密等因寵獨在便室卧寐遂共殺之以其事詣闕封為不義侯愚以為非先哲王封賞之本旨也遂作議云先師曰惟器與名不可以假人又曰必也正名乎又曰惟則定國於戲有國者可不務乎當世祖之初天命再集於此時貞百度正三綱纂修德教允答天意時彭寵以南陽舊恩位列上將有舉漁陽之功饋邯鄲之忠竟以讒謗獲罪反側怨望遂攻朱浮於薊自稱燕王時師旅孔熾元元苦甚時君宜以息人紓難為心則當録念功用昭洗瑕穢次則布之威懷革其非心必不得已則仗大順以討之出王師以征之以明君君臣臣之義此三者皆不能用之或用之而不能盡及夫倉頭子密有便室之逆運其狙忍待其文粹作時伺卧寢遂使命懸僕𨽻倉卒授首及詣闕也封為不義侯愚以為伯通之叛命子密之戕君同歸於文粹作于亂罪不相蔽宜各致於法昭示王度反乃爵於五等又以不義為名且舉以不義則莫可侯也文粹有而此侯三字通鑑作此而可侯漢爵為不足勸矣春秋書齊豹盜三叛人名之義無乃異於是乎且如欒布之哭彭越孔車之葬主父使於東漢議罪罪孰甚焉况四方甫定傷痍未復不稽古訓以喜怒為刑賞使天下陪臺厮養各幸其君之亂而徼侯印授諸侯危疑之勢鼓臣下叛換漢書顔氏訓叛換叛與畔同之源棄名器而汨彛倫且以憲令為戲時風浩浩蕩而不復至使桓靈不君文粹作道山陽脅奪本其所自庸詎知非封不義之效歟西伯受命稱王議梁肅太史公曰詩人道西伯以受命之年稱王而斷虞芮之訟遂追王太王王季改正朔易服色十年而崩或謂大雅序文王受命作周秦誓序十有一年武王伐殷妄徴二經以實其説豫以為反經非聖不可以訓莫此文粹有為字甚焉嘗試言之夫聖人無作作則為萬代法蓋仲尼美文王之德曰三分天下有其二以服事殷又曰內文明而外柔順以蒙大難文王以之未有南面稱王而謂之服事易姓創制而謂之柔順仲尼稱武王之烈曰湯武革命又曰武王末禮記作末受命未有父受之而子復文粹作後革命父為天子子云末受當武王之會盟津也告諸侯曰汝未知天命未可以誓師也曰惟我文考四字文粹作惟九年大統未集豫小子其承厥志孰有王者出征復俟天命大統既改而復云未集禮大傳稱牧之野既事而退文粹有遂字柴于上帝追王太王王季文王改正朔殊徽號若虞芮之嵗稱王則不應復云追王王制既行則不復應文粹作應復云改物是皆反經者也夫大者天地其次君臣聖人知定位之不可易也故制為上下之禮財成天地之道使各當其分而不相間若億兆之去留天命之與奪則與文粹作存字乎其時聖人順而行之故謳歌文粹有所字歸而舜禹揖讓桀紂惡文粹有盈字則湯武放伐所謂後天而奉天時不得已而為之者也若殷道未絶紂惡未極而遂稱王以令天下則不可謂至德也此其非聖者也豫以為大雅作周之義蓋取夫積德纍仁為海內所歸往武王因之遂成大業非文粹有所字謂革命易姓為作周也泰誓紀年蓋武王周公追考前文陳王業之盛自虞芮始故斷為受命之嵗仲尼憲章文武故因而敘之曰十有一年武王伐殷非所謂自稱王而為之數也文王既沒經義斯在如曰不然以俟君子焚舟議楊夔秦伯伐晉兩用孟明皆敗績用之不怠復伐于晉晉人不出遂封殽尸霸者以武為功乎昔楚子敗晉京觀以昭武功楚子不從曰所以稱武者以有七德也我無一焉其可稱哉今稽秦師忽蹇叔之忠諫納杞子之狂謀勞師欲以襲國殽及彭衙之敗隻輪不返渡河焚舟示其致死晉不與敵遂霸西戎亦未為勝也况兩敗一勝與敵乃亡尺全寸焉足為功哉夫飢虎餒狼一意於吞噬乎吾見晉之懸門不發者君子多矣文苑英華卷七百七十
