body:
  text: 文苑英華卷四百宋李昉等編館殿監官附史館修撰授沈傳師左拾遺史館修撰制白居易勑京兆府鄠縣尉沈傳師庶職之重者其史氏歟歷代以來甚難其選非雄文博學輔之以通識者則無以稱命今兹命爾其有旨哉昔談之書遷能修之彪之史固能終之惟爾先父嘗撰建中實録文質詳略頗得其中爾宜繼前志率前修無忝爾父之官之職可授韓愈比部郎中史館修撰制勑太學博士韓愈學術精博文力雄健立詞措意有班馬之風求之一時甚不易得加以性方道直介然有守不交勢利自致名望可使執簡列為史官記事書法必無所苟仍遷郎位用示褒升可依前件授考功員外郎鄭璘司勳員外郎盧擇並充史館修撰制薛廷圭勑具官鄭璘等堯舜禹湯文武之善桀紂幽厲之違非直筆信史後王莫得而詳也我國家列聖行事亦具書于史官將以昭示後昆垂訓不朽紀綱專總於丞相筆削分任於名儒非夫望藴司南才膺載筆者不當其選而崇望言爾璘等博聞強識繩直氷清四時之和氣襲人一字之褒貶惟正聞見事典一作業周知故實可以著不刋之書論司過之史爾宜詳於注記紀乎言動之非繼彼春秋明乎得失之迹彰善疸惡無忿疾厥心舉直錯枉無上下其手佇聞稱職當議陟明可授陸鼎史館知修撰制常衮勑左補闕陸鼎終始于學以致其道先儒未詳多所究博一作精究秉南史之遺直補東觀之闕文左右諌曹所宜迭處鴻都講藝亦在論思可左補闕充史館修撰授荀尚史館修撰制勑處士荀尚昔荀卿荀恱並有著書而尚逺承儒史之業深得述作之意思精大體經通王道慨然一作慷慨論事來自山東灼見古今之宜熟數理安之册嘉樂賢俊副于懷人春秋一字使之潤色結綬京輔進而祿之行成乎身不患無位可華州下邽縣尉充史館修撰校理授夏侯瞳忠武軍節度副使薛途涇陽尉充集賢校理等制杜牧勑前昭義軍節度判官朝議郎殿中侍御史內供奉夏侯瞳等瞳以科名詞學開敏多才久逰諸侯常藴令聞周知吏理兼能潔身戎臣上言願為毗贊既諾仕以委質宜直道以酬知途以文行策名節趣一作趣尚清逺言於後進實為秀人延閣典校丞相所請勉循階級以至堂奧可依前件授蕭孜著作郎裴佑之陜府巡官崔滔櫟陽縣尉集賢校理等制勑在春秋時晉為諸侯國也尚立公族大夫教育諸卿之子富有賢哲不假搜聘召同列而會者三百餘年况今天覆盡得而禹畫無遺名卿賢相之家清風素範之族子孫森羅髦雋並作次第敘用豈歎乏才匭使判官將仕郎守國子監太學博士蕭孜等或以秀異得舉文學決科或以行實立身遭逢知已皆後生可畏之士為當時有才之人東觀著述延集作殿閣典校參畫幕府開導獻納清秋美職二者兼之不由階級安至堂奧勉於修慎以俟超升可依前件授李毗集賢校理等制崔嘏勑祕書正字集賢校理李毗等披書殿讎校之文秉東觀鉛黃之筆必選其雄詞擲地敏學通天者而授之爾等皆以後來之英前達所許人推領袖名於縉紳或荆山藴片玉之姿或桂樹擇一枝之秀五常師於中道萬里視其長途况我台臣監領二職以爾上請是謂得人宜思結綬之榮各勉分飛之勢推輪覆簣其在兹乎毗可藍田縣尉充集賢校理浣可興平縣尉直史館授前京兆府參軍錢珝藍田縣尉充集賢校理鄉貢進士崔昭緯祕書省祕書郎充集賢校理制薛廷圭勑具官錢珝等儒術可以厚風俗人文可以化天下帝王興創不能遺之粵我皇祖肇基丕闡兹道反隋氏之政追孔門之風鼓篋升筵者餘八千人邦寧本固者垂三百載貽厥沖眇不敢昏迷佐豫中興乃眷於是良重集賢藏書之府故用丞相司之得選官屬將慎廢墜以珝禮為身幹慎得言樞奉典刑之遺無辱趙氏以昭緯名冠來籍道絶下交居德行之科不減顔子方設鉛槧有期丹黃爾宜窮四部之多正五體之别無使我集賢殿不及漢興之東觀祕書也勉矣哉可授户部巡官祕書省校書郎楊玢武功縣尉充集賢校理制錢珝勑具官楊玢士子由科而進得為館殿吏者俯視華資如拾地芥然而道不益固名不益彰則朝之華資其可俯視而拾之哉玢質秀氣實自立頗強窺其所為誠在於道固名彰之本也今既列書殿仍懷令圖奚患華資不能俯拾可依前件授李轂河南府參軍充集賢校理制李磎勑李轂書府皆以丞相為大學士蓋理化之本在焉而集賢嘗鄙仙殿之稱時之論者亦以為尤重今太學士謂爾轂儒學賢相之後以進士擢科今典籍散亡編簡殘缺轂紹儒學之業實進士之名儻能討尋質正請使校羣書焉豫嘉而聽之參軍府庭則序官然耳河南京兆大何足論噫苟能副太學士之委諫官御史豈吝汝遷可依前件太常博士授陳貞節太常博士制蘇頲勑宣議郎右拾遺內供奉陳貞節卞寶輝光楚材翹秀窮禮經之奧博踐詞律之風雅參名列侍每獻昌言掌事奉常宜銓令典可守太常博士散官如故授鄭涵等太常博士制白居易勑具官鄭涵等並早以文行久從吏職輩流之間頗為淹滯况雅有學識進修不已禮官方缺宜當此選凡朝廷禮制或損益有疑中外諡議或褒貶不決爾為博士皆得正之所任非輕各敬乃事並可依前件授蕭峴太常博士制杜牧勑禮至則無怨樂至則不爭揖讓而理天下者禮樂是也今國家上法三代下採兩漢質文降殺皆有舊章今命博士非欲草具集作革其儀法但使提舉考習而已登仕郎守祕書省著作佐郎蕭峴聞爾昆弟之間著友愛之稱復能於知已依投之地竭力報效况乎富有文學默守恬退執一作操心處巳不亦多乎爾其為吾折中輕重詳校疑似使祝宗卜史之徒不敢以近習欺爾斯則可矣勉於自強可守太常博士散官如故授杜濛太常博士制勑守左拾遺杜濛爾五廟祖常佐太宗同安生人共為天下者也爾能自以文學策名清時升為諌臣豈曰虛設如聞同列墻進而不爾容爾亦拜章自陳極詞貢情乃令徴辨盡知其由僉曰爾以齒少有才不能韜晦或處衆矜巳或遇事𥚹𠂻言於慎微則亦乖矣仕於清貫斯豈廢乎考衆惡必察之言徴怨不在大之説官移禮寺迹去掖垣屈既伸眉事亦存體酌此二者頗得中道况乎職業至重藴蓄可施無使衆多復有窺測可守太常博士祕書郎授衛惲一作暉校書郎制常衮勑三品子衛惲漢制有任子之令國朝二千石理行尤異者賞亦及之况幼有令聞服於經訓校書集作文祕閣以奬其才可宣義郎試祕書省校書郎授張籍祕書郎制元稹勑張籍傳云王澤竭而詩不作又曰采詩以觀人風斯亦警豫之一事也以爾籍雅尚古文不從流俗切磨諷興有助政經而又居貧晏然廉退不競俾任石渠之職思聞木鐸之音可守祕書郎授王建祕書郎制白居易勑太府丞王建太府丞與祕書郎品秩同而祿廪一今所轉移者欲職得冝而才適用也詩人之作麗以則建為文近之矣故其所著章句往往在人口中求之輩流亦不易得帑藏之吏非爾官也而翺翔書府吟咏祕閣改命是職不亦可乎可祕書郎授劉縱祕書郎制杜牧勑具官劉縱徒步詣闕上獻封章又自敘其先臣陳許間事皆歷歷可聽公侯子弟多溺於驕邪爾能讀書學文自可嘉奬圖籍之府命爾為郎豈惟振滯求能且不欲使勳勞一作勞能之後栖栖於塵土中也可祕書省祕書郎著作郎授崔融著作郎制李嶠鸞臺具官崔融長才廣度贍學多聞詞麗楊班行髙曽史外臺美其方正中省推其良直永言司典尤俟得人載筆西垣既藉微婉紬文東觀更資博通冝升著作之庭兼踐記言之地可著作郎仍兼一作於右史內供奉官授吳兢著作郎制蘇頲黃門朝議大夫守諫議大夫上柱國兼修國史吳兢袛服言行貫穿典籍藴良史之才擅巨儒之義頃專筆削仍侍軒階而官之正名禮不以諱冝著書於麟閣復載一作籍於鴻都可行著作郎兼昭文館學士餘如故主者施行授胡皓著作郎黃門朝議大夫檢校祕書丞兼昭文館學士上柱國胡皓屬文用思知名最久才清調逺寓興皆新頃掌祕文佇刋良史宜擢金閨之彥用光石渠之作可行著作郎餘如故主者施行授司馬利賔著作郎等制孫逖勑朝議郎行祕書省著作佐郎司馬利賔等或富於學業或精於吏能公清為潔已之資詞賦有成名之美舉其同術宜並拜於軒墀甄其異用俾分官於儒館可依前件祭酒授楊嶠國子祭酒制蘇頲黃門師氏之職訓於胄子儒林之選必俟賢人魏州刺史上柱國北平縣開國子楊嶠直清莊敬浩素純密伏膺勤業道在其中因心執禮行成於內樹風有循良之課試劇聞精練之能往在東都攝於西序巾卷資其導誘紀綱正其頺弊惟教之立厥聲孔臧俾崇於釋菜逾勸於攻木可國子祭酒勳封如故主者施行授劉瑗國子祭酒等制孫逖門下名器所歸必徴於才實進用之序亦慿於歲年邠王傅上柱國豐縣開國男劉瑗等備聞素行纍踐清資佩服文儒周旋禮讓效官惟謹考績皆深以類而遷既有均於平施至公斯在亦何患於後時冝悉虛懷各從分職可依前件授太僕卿賜紫李涪國子祭酒制錢珝勑右武以來國子失教聖域何逺儒風寖衰今朕考元龜備法駕言旋京師有日矣姑欲開六學之署以教諸生而張吾理道之本思得通四術者以蒞厥職一作官具官李涪以爾受爵素髙去朝斯久奉車親重乃以太僕命之宗籍宿儒時謂非稱擢居雅秩幸得其人以爾藴學之優當吾選求之要勉來分職昭我用才可依前件授前左散騎常侍楊授國子祭酒制薛廷圭勑具官楊授乃眷膠庠文學所聚聿求臨長必在通儒以授洛下髙才關西冠籍台庭襲慶士族揚芳守欹器之不盈蹈黃裳之元吉策名筮仕垂四十年流落栖遲失騫翥勢所嗟暮齒久困窮途勉當文理之朝蒞乃成均之職我惟求舊爾往崇儒載推尚齒之恩仍假納言之任噫𨽻名之籍今無聞焉丘園之秀為我屬意敬承休命以振斯文可依前件司業授崔挹成均司業制李嶠鸞臺大中大夫使持節博州諸軍事守博州刺史崔挹懷才抱器悅禮敦詩博究毁陵深窮壞壁秦章漢綬雖踐吏途魯衣宋冠無輟儒行虎門齒胄蟻術橫經重道尊師於是乎在宜罷外臺之任俾升上庠之秩可行成均司業散官如故主者施行授鄭諝國子司業制蘇頲黃門銀青光祿大夫宋王府長史上柱國襄城縣開國伯鄭諝純固仁厚溫恭雅實嘗覽墳籍克修言行玳筵承寵已參佐於王門瓊林講藝用周旋於師氏可行國子司業散官勳封如故主者施行授裴巨卿國子司業等制孫逖門下朝議大夫著作郎裴巨卿厚德馴行性與淳和朝請大夫殿中丞上柱國張九臯雅量清才體合明允咸推逺一作達識皆有令名能勵節於朝廷將致美於兄弟詩書是悅宜當六學之師章奏惟難更擅一臺之妙巨卿可國子司業九臯可尚書職方郎中散官勳如故授裴迪太僕卿元鎬京兆少尹盧玭國子司業等制薛廷圭勑具官裴迪等天子擢侯府之彥升諸周行掄材奬勞斯謂彛制逮于搜索淪滯羽儀膠庠四面取人一時慎選以迪卿材應聘儒席稱珍以鎬幕畫有聞賔榮具美以玭華宗輝譽官路流芳各負所長求伸其志而諸侯之府裨贊是繄驗安劉戴舜之功見難進易退之道太僕禦侮二尹優賢司成古官歷代清選唯爾三子來服訓詞交修厥官以稱我意可文苑英華卷四百
