body:
  text: 文苑英華卷二十五宋李昉等編地類一地賦一首土賦二首五色土賦二首蓋地圖賦一首立春出土牛賦一首土牛賦三首地賦劉允濟元氣攸分太極斯判建三才以可久開二儀以貞觀偉坤德之無疆恢地道之幽贊叶髙明而資始孕沉潛而剛斷空徴王母之圖竟勞豎亥之算用能載九嶽振百川蕩雲霧泄風煙羣物畢發衆象森然飛沉咸遂動植斯甄五億十選二萬八千含靈應節蓄聖懷仙元命之所苞矣彛倫之所繫焉周易以為理契於牝墨翟以為仁深於天由是開階一作陸立隧一作墜提衡建極置羲和之官列司徒之職審其逺近辨其紆直廣輪之數不愆夷險之情不匿用能峻市朝明甸侯既布井而陳邑亦列郡而分州窪盈沃瘠之品原野墳衍之流斂跨萬俗兼該六幽隔蠻壤限夷陬珍卉竒木之他族鱗介羽毛之異儔詭怪畢備璀璨咸周銀臺瑶檻𤣥闕丹丘鄒衍之所不議方朔之所難紬禎符應於河象災異紀於春秋爾乃禮備玉衣葉隆金屋彌北渚而應慶邁東陵而誕福辭珠璫屏綃縠配飛龍以凝順詠關雎以薦淑契眀理於東南想賢才於薖軸化漸蘋藻教敷種稑詠麟趾而合符比螽斯而繁育功疑作力宜右轉道叶上升遵四時以生殺順六氣以陶蒸珍符顯見寶厯相仍我疆我理如坻如陵徽猷潜暢禮節鬱興大爐交泰庶績其凝用能祀列黃琮禮配蒼璧揚義聲於農步飛仁風於禹跡服耒耜於田疇偃戈矛於邉埸諒嬪則之廣被信輿圖之逺闢土賦吕太一一闔一闢分陽分隂坎為水兮離為火東方木兮西方金惟土德之為大處中位而君臨寒暑不能易其節鬼神無以測其深吐納清濁區分㝢縣帝軒感氣於星斗虞舜降精於雷電爾其荆河墳壤淮海塗泥草木漸苞於赤熾疑作埴璆鐵作貢於青黎火以炎上為母水以潤下為妻黃白分於雍兾官位列於東西蒸之以為城闕北連朔野纍之以為臺觀上構虹霓為海為河為牛為馬起圓規於陳法美教化於王者負之為模邊人失其膽氣得之為祥晋卿載於原野且久且大非名可名定剛柔於坤德合絲竹於宫聲夫其為重也封割五色分茅錫社夫其為厚也包括萬象含姿育靈處瘠則勞處沃則逸白獸忽見羵羊間出體均物而為象抱溫柔以成質舟航才盡則青縷飛神六五既臨則黃裳元吉萬國收其利三公主其秩因覆簣而成山為幽居而鑿室不借譽於龍鳯直養德於麒麟失之則昆蟲作孽得之則宗族以親雖鼇足初分重濁者為之地而羊角勃起輕清者為之塵授之可薦於宗廟捧之未塞於孟津起刑馬而為首祀勾龍以為神漢廟玉環方之則君王納諌豐城寶劒拭之則光彩射人含物吐象包藏玉石均王四時卑陛三尺運乎虛舟之中不以為損捧乎泰山之上不以為益土之為德也重土之為性也平爰稼穡而為務被朱紫而為榮余以既藉形體承恩天壤公和之山窟非陋子猷之冬林自賞先君列國猶未斷於封疆軒佐吹塵直庶幾於夢相第二以中方正色繁育生類為韻韋岫質賦坤元形分地類有持帶山川之力有長養稼穡之利結為大塊中含萬物之根充被方輿外定九州之位於是黃帝后土怒而交爭曰天有兩曜日為最眀地有五行土為至精人無我而不立子無我而不成故禮得之而以壇以墠君得之而以社以城子言各執其一端子智不出乎四域缺生字官韻向者夸競交肩紛紜未息殊不知皆在五土何自德色木之始藂榮本茂葉秀枝繁不依於土何因託根火之重赫奕華夏照曜乾坤無吾為土雖猛不存金生於山山吾所育水出於地地吾之族若藏礦朴於峯巒化江湖於原陸子何有哉吾為五方之主為萬聖之雄造邦本立大中布而為金木水火分而為南北西東使百王之傳授若四氣之始終皆德非博厚故號不統同國家保大定功體元立正法土德受天命陵無一抔之盜貢有五色之盛合為應鼓擊六氣以還淳纍作春臺熙萬人之遂性子蓋疑作盍鳩合異類率賔殊方歸有極贊無疆帝乃約束逺近神乃紏合要荒咸鞠躬離位厥角來王自是盡四夷之君長皆朝我唐五色土賦以皇子畢封依色建社為韻崔損按唐登科記大厯十年上都試賦第四崔恆第六崔種無名損者至哉土德光含五色其色也辨五方以建侯其德也發萬物以生植自夏禹而作貢在徐方而是職王者立社以封疆諸侯苴茅而有國於赫巨唐德之皇皇實乘土而化康采大漢强幹之宜裂地以爵法有周維城之制分土而王各班其位各正其方用甲日而靡忒建隂氣而允臧定五方而式序分五色而有章平野烟銷發卿雲之瑞彩髙天雨霽浮麗日之重光衆色環封所以示外共其方職正色居上所以表內附於中黃觀其儀則知大君之有弼稽其㫖則知邦伯之有秩列三才則惟數在五參十端則惟德居一一作德居于一既眀既麗可以比乎天文不騫不崩所以保乎隂隲配皇王之永久齊天地而終畢矧夫經一作建邦理一作禮社必土是封光昭聖德叶贊時雍將尊天以親地在侯土與國社既蕃翰乎四海實底寧乎天下若然者君立社以布政臣受土而宣威象君臣之同理知社土之相依是以成百王之則作萬邦之憲圭璋玉帛莫不因我而執公侯伯子莫不因我而建土之德也斯美社之義也奚擬其色也匪同五星而乍連乍散其質也各表一方而嶽立山峙有以崇國祚於我皇有以同盤石於宗子夫如是則其義廣矣豈斯文之所能盡紀第二同前韻盧士開登科記作士閲尊彼國常乃立人極依大社以封土命諸侯以方色木官復位東方一作極於焉必書火正是司南方由之可識西同白帝之象北察𤣥武之職配中黃而立名覆四方而作式於是端扆穆穆授策皇皇賢戚封建君臣樂康既載人之爾厚亦植物而惟良可以載八紘包大荒豈離逖于爾邑盡東南于我疆昔神黷無厭聞革故於有魏天祚明德遂惟新於聖唐總祝融與蓐收臣𤣥冥與勾芒知合之以濟代故貢之以來王守于爾位亦有寵子思翦桐而是立故分茅以共理所以維城所以撫封爰作稼穡錫之附庸列五色以相備和八音以相從色能惟正音乃叶雅將察之以報功故封之以立社惟人是恤選賢以建仰夏王之攸敦法周官之大憲胙之而氏可命相之而宅可依五德聿修萬方知歸即之也真彩煌煌望之也靈壇巍巍足以表正方夏發揚德輝等乎圭瑞叶以元吉建樹侯家藩屏王室分之惟五行之惟一實邦家之永固與天壤而齊畢蓋地圖賦以聖德感通靈仙降獻為韻錢起有虞氏提地釐享天命光唘九有緝熙八政能使坤德以寧祥符錫慶神矣王母通靈感聖獻爾寶圖昌爾金鏡嗣堯之美於斯為盛固知冥貺有則休眀無極非天私我有虞惟神歸于至德必將永其厯數寧惟錫彼封域俾皇鑒之昭昭豈神明之默默諒可耀寰宇盛邦國蓋地如何匪茲不克懿此圖籙實昭應感廣豎亥之遐步資重華之睿覽規方逺近微妙𤣥通致蠻貊於度內出山川於卷中可以明四目逹四聰易曰不出户知天下何莫假此神功徒稽其囊括也吞八極盡四溟霜露所墜日月所經莫不總天目入帝庭嗤秦政得燕圖以拓境小穆公夢鶉首以稱靈亦有周王御天漢君求仙窮人力於宇宙遍轍跡於山川孰與夫髙居深視探微洞𤣥得地理於冥契擁神休以永年則知明德在茲景福是降播頌聲以洋溢洎寰海與里巷美矣哉厯選列辟符瑞巨萬雖𤣥圭告成白環入獻曷若斯圖之用也九土𢎞而庶績建立春出土牛賦以平秩東作敬授人時為韻常惟堅月周於紀水次於行其候凛冽其氣清英倐嵗隂之將盡復陽春之載眀知北陸之寒光向斂喜東郊之暖氣先迎是以候鴈思朔潜鱗或驚裂金火以取諸助氣策土牛以示乃發生在弦望而宜早當晦朔而得平我皇於焉以設教賢相由是以持衡請循其本也太史告時有司選吉冬官蕆事牛人乃出將協地紀克符天秩約嵗時之儉泰示農耕之遲疾惟榖是登惟人是恤察前後之凖祈倉廩之實故知丑以牛為用牛以土為質合隂陽之妙㫖齊冬夏之祕術豈比夫作享昊天為牲繭栗而已哉於是時既斯得令無不通候農祥而取正引丁壯而就功我疆我理自西自東以茲政行而化洽宜其人和而年豐徒觀乎彼蟄將唘斯牛是作正我耒耜務我耕鑿首巍巍以山聳角戢戢而林錯制以紅縻飾以丹雘出北陸以送寒佇西成而取穫野人知五畝可樹逰子懷二頃負郭國之有令岡敢不敬一人布和萬邦咸慶恩深草木澤浸翔泳考來今之規矩立振古之龜鏡自得上行下效紛紛輝映然後鼎取新革去舊惟利是持惟時是授自可家給而人足無乃兵强而國富曽孫之稼克稔唐叔之禾乃秀不忤於物有利於人稽乎天文上列於乾象究諸地志下協於坤珍不獨山川其捨曷云九十其犉夫如是物各遂其性農不奪其時仰崇丘之翼翼登春臺而熙熙相陳力而久矣願負重而來斯永懷種德兾念茲而在茲土牛賦以示農耕之早晚為韻陳仲師服牛是比合土成美將十鈞之重斯得而一撮之多有以雖欲勿用泥蟠之質初分誰謂爾無塊立之形酷似是月也採吕氏時令徴圬人巧指始辨塗附寧分脉起誠安愧乎角立復何勞於肉視然後遵土訓唘人時戒曉而出迎春是資于以審先後之節有以占疾徐之期仰白榆之文慙其睆彼叶葱犗之色則而象之能首出於泥滓豈羣分於毫釐彼芻狗之列飾文繡以求媚泥龍之興因舞雩而取類曷若標國典配田器比物以作則順時以相示同乎非馬契莊叟之至言偶彼真龍殊葉公之繪事質美埏埴巧逾覆簣那虞食角之患寧假熒蹄之異俾逰刃者訝全之於目運斤者喜墁之在鼻且耒耜斯呈我則正春扈於農耕干戈既偃我則歸郊馬於嵗晚將物候自然諒人情何逺必也攬洪縻親紺幰覩似是之足尚謂來思使畜疑之人猶將屢飯由是出五種命三農乃修故事于彼窮冬闢我疆則厥壤爰度考爾牧則其犉有宗今也物被殊私形分大造載之以厚地之德奉之以先天之道時將敬授在三推播植之前物或肇牽察庶物生成之早其用則大其儀可考故曰如土委地者豈必以載牛為寶第二以四聲為韻闕名維土作稼維牛配坤將底法於田賦故侔形於國門其聼也非喘其視也非奔協東風之表慶俾南畝之司存戒期於彼發令於此知出者之在衢見觀者之如市三之日可以于耜四之日可以舉趾稽小大之聿修標逺近而稱美為德不殊建功能大思負軛之無虧豈蹊田之有害曽是獨立農人咸集非芻茭之是仰豈鞭策之云及騂而且角異魯國之山川花以為蹄同漢朝之井邑若乃擇元辰司上春塗泥萃丹雘陳牛從繩兮則正人從物兮惟新既牽之而不復亦繫之而克馴其儀可采其跡難改奚中立而不倚若將行而有待假使越俗多方武侯専思或封泥作雨或刻木成器五榖以之惟豐三軍以之不匱徒見機而有作匪應節而攸利豈如我以牛為名以土為質示菑畬之早晚驗播植之舒疾在天成象望北陸而分區在地成形近東郊而候律百王傳而靡替丸扈司而弗失等農祥於程度祈帝籍之充實第三闕名土牛所置惟民是利將立表以勸農勝陶冶而為器相牽之狀或垂象而在天觀出之期諒成形而在地所以無芻豢之損殊死生之類實大塊之所資豈一撮之所致故乃用為恆典蕆其成事執農政之後先因策人以相示觀夫出康莊之際當立春之期既合土而成象矣還服箱而似之誠鞭策而無用信耒耜之是持異彼土龍每因旱而方致同夫芻狗表至仁而無私若非農為國本曷能敬授人時原其事始誠則有以圖白巫以侔形每葱犗而在視寧同日夕與羣羊而下來諒在月窮惟御人之所指是以先春斯舉農正是供察之者覺順時而行令觀之者知有事於上農既惟人而是瞻豈與驥而同皂足以符務農之政足以叶勸人之道立之於後訝春事之尚遲御之於前悟農功之在早令出惟行百姓昭眀既有象而垂則表得時而親耕立以示農豈憂燧尾之禍莫由而飯奚聞扣角之聲事有開而必先義任重而致逺既遵之而為早方驗之而知晚非同金鎖入寒渚而無蹤有異紺轅行籍田而方墾夫然則土牛之出也可以為農政之本文苑英華卷二十五
