body:
  text: 文苑英華卷二百十五宋李昉等編人事二宴集六十八首陪宋中丞武昌夜飲懷古李白清景南樓夜風流在武昌庾公愛秋月乘興坐胡床龍笛吹寒水天河落曉霜我心還不淺懷古醉餘觴流夜郎至江夏陪長史叔及薛明府宴興德寺南閣前人紺殿橫江上青山落鏡中岸回沙不盡日映水成空天樂流香閣蓮舟揚晚風恭陪竹林宴留醉與陶公春日陪楊江寧及諸官宴北湖感古前人昔聞顔光祿攀龍宴明集作京湖樓船入天鏡帳殿開雲衢君王歌大風如樂豐沛都延年獻佳作邈與詩人俱我來不及此獨立鍾山孤楊宰穆清風芳聲騰海隅英寮光簪組集作滿四坐粲然集作若瓊林敷鷁首弄倒景蛾眉掇明珠新絃綵一作採集作來黎園古舞嬌吳歈曲度繞雲漢四座集作聽者皆歡娛雞栖何嘈嘈松集作沿月拂笙竽古之帝宮苑今乃人樵蘇感此勸一觴願君覆瓢壺盛時當作樂無令後賢吁趙都護宅宴别盧象見集本結客候旌麾元戎復在斯文開都護府兵動羽林兒黠虜多翻覆謀臣有别離智同天所授恩共日相隨漢使開賔幕胡笳送酒巵風霜迎馬首雨雪事魚麗在策應無戰深情屬載馳不應行萬里明主寄安危宴吳王宅祖詠見集本吳王承國寵列第禁城東連夜徵辭客當春試舞童砌分池水岸窗度竹林風更待西園月金樽樂未終清川口宴張郎中别業前人田家復近臣别業不遺親霽日園林好清明煙火新以文常會友唯德自成鄰池沼窗隂晚杯觴藥味春簷前花覆地竹外鳥窺人何必桃源裏深居作隱淪何九於客舍集王昌齡客有住桂陽亦如巢林鳥罍觴且終宴功業曽未了山月空齋時江月髙樓曉門前泊舟楫行次入松篠此意投贈君滄波風嫋嫋晦日陪辛大夫宴南亭劉長卿月晦逢休浣年光逐宴移早鶯留客醉春日為人遲蓂草全無葉梅花遍壓枝政間風景好莫比峴山時同諸公袁郎中宴筵喜加章服前人手詔來筵上腰金向粉闈勳名傳舊閣蹈舞著新衣白社同逰在滄洲此會稀寒笳發後殿秋草送西歸世難常摧敵時間已息機魯連功可讓千載一相輝西庭夜宴喜評事兄拜命前人猶是南州吏江城又一春隔簾湖上月對酒眼中人棘寺初銜命梅仙已誤身無心羡榮祿唯侍却垂綸惠福寺與陳劉諸官茶會得西字前人到此機事遣自嫌塵網迷因知萬法幻盡與浮雲齊疏竹映髙枕空花隨杖藜香飄諸天外日隱雙林西傲集作微吏方見狎真僧幸相携能令歸客意不復還東溪夏日宴魏萬成湘水亭前人何年家在此江濵一作濆幾度門前北渚春白髮亂生相顧老黃鶯自語豈知人梁州陪趙行軍龍岡寺北庭泛舟宴王侍御得長字岑參誰宴霜臺使行軍粉署郎唱歌江鳥沒吹笛岸花香酒影搖新月灘聲聒夕陽江鐘聞已暮歸棹緑川長早春陪崔中丞浣花溪宴得暄字張謂旌節臨溪口寒郊斗覺暄紅亭移酒席畫鷁逗江村雲帶歌聲揚風飄舞袖翻花開催秉燭川上欲黃昏宴鄭伯璵宅前人正月風光好逢君上客稀曉風吹鳥囀春雪帶花飛堂上吹金管庭前試舞衣俸錢供酒價行子未須歸郡南亭子宴集作春宴前人亭子春城外朱門向緑林栁枝經雨重松色帶煙深漉酒迎仙客穿池集水禽白雲常在眼聊足慰人心夜同宴用人字前人北斗回新嵗東園值早春竹風能醒酒花月解留人邑宰陶元亮山家鄭子真平生頗同道相見日相親春園家宴前人南園春色正相宜老婦同行少婦隨竹裏登臺人不見花間覓路鳥先知櫻桃解結垂簷子楊栁能低入户枝山簡醉來歌一曲參差笑殺郢中兒與從弟正字從兄兵曹宴集林園李嘉祐竹窗松户有佳期美酒香茶慰所思輔嗣外甥還解易惠連羣從總能詩簷前花落春深後谷裏鶯啼日暮時去路歸程仍待月垂韁不控馬行遲晚春宴集無錫蔡長官集作明府西亭前人茅簷間寂寂無事覺人和井近時澆圃城低下見河興緣芳草積情向逺峯多别日歸吳地停橈更一過秋晚招隱寺東峰茶宴送內弟閻伯均歸江州前人萬畦新稻傍山村數里深松到寺門幸有香茶留釋子不堪秋草送王孫煙塵怨别唯愁隔井邑蕭條誰忍論莫怪臨岐獨垂淚魏舒偏念外家恩此詩二百三十六卷重出今已削去夜宴南陵留别前人雪滿前庭月色間主人留客未能還預愁明日相離處匹馬千山與萬山秋夜與梁鍠宴錢起客到衡門集作間林下林香芳蕙時集作林香蕙草時好風時集作能自至明月不須期秋水翻荷影晴霜脆栁枝集作絲微官是底物許日廢言詩陪考功王集作韋員外城東池亭宴前人無雙錦帳郎絶景有池塘集作絶境有林塘鶴靜疏羣羽蓮開失衆芳青集作晴山看不厭流水趣何長日晚催歸騎鐘聲促集作下德陽太子李舍人城東别業與二三文友逃暑前人下馬失炎暑重門深緑篁宮臣禮嘉客林表開蘭堂兹日一作夕興難盡澄罍照墨場東林晚來好極目趣何長鳥道挂疏雨人家殘夕陽城隅擁歸騎留酌集作醉戀瓊芳奉陪郭常侍宴滻水山池前人掖垣携愛客勝地賞年光向竹過賔館尋山到妓堂歌聲掩金谷舞態出平陽池滿簪裙影花添蘭麝香鶯啼春未老酒冷日猶長安石風流事須歸騎省郎陪郭常侍令公東亭宴集前人盛業山河列重名劒履榮珥貂為相子開閣引時英美景池臺色佳期宴賞情詞人載筆至仙妓出花迎暗竹朱輪轉回塘玉珮鳴舞衫招戲蝶歌扇隔啼鶯飲德心皆醉披雲興轉清不愁歡樂盡積慶在和羮春夜皇甫冉宅歡疑酒張繼流落時相見悲歡共此情興因樽酒洽愁為故人輕暗滴花垂露斜暉月過城那知橫吹曲江外作邊聲禇主簿宅會畢庶子錢員外郎使君韓翃開甕臘酒熟主人心賞同暮天疏竹上殘雪亂山中更喜宣城印朝廷與謝公華州夜宴庾侍御宅前人世故他年别心期此夜同千峯孤燭外片雨一更中酒客逢山簡詩人得謝公自憐驅匹馬拂曙向關東春日陪兩省諸公宴張舍人宅郎士元懶尋芳草徑來接侍臣筵山色知殘雨墻隂覺暮天鶯歸漢宮栁花隔杜陵煙地與東城接春光醉目前春宴王起城東别業前人栁陌乍隨洲勢轉花源忽傍竹隂開䁩令瀑水清人境直取流鶯送酒杯山下古松當綺席簷前片雨滴春苔地主同聲復同舍留連不畏夕陽催宴趙氏昆季書院盧綸詩禮挹餘波相歡在琢磨琴樽方會集珠玉忽駢羅謝族風流盛于門福慶多花攢騏驥櫪錦絢鳳凰窠詠雪因饒妹書經欲換鵝仍聞廣練被更有逺儒過春日喜雨奉陪馬侍中宴白樓前人鸛鵠相呼緑野寬鼎臣間倚玉欄干黃河擁沫流仍急蒼嶺和雲色更寒艷艷風光呈瑞嵗泠泠歌頌振雕盤今朝醉舞同鄉老不覺頻傾集作欹獬豸冠九日奉陪渾侍中宴白鶴樓前人露白菊氛氳西樓盛襲文玉筵秋令節金鉞漢元勳説劒風生座抽琴鶴繞雲謏儒無以答願得備前軍此詩三百十二卷重出今已削去和李太守早秋城北亭宴司士因寄關中兄弟見三百十六卷丁評事宅秋夜宴集栁中庸翠幕卷回廊銀燈開後堂風驚擁砌葉月冷滿庭霜綺席人將醉繁絃夜未央共憐今促席誰道客愁長郡齋雨中與諸文士宴集韋應物兵衛森畫戟宴寢凝清香海上風雨至逍遙池閣涼煩痾近集作正消散嘉賔復滿堂自慙居處崇未覩斯民康理會是非遣性達形迹忘鮮肥屬時禁蔬果幸見嘗俯飲一杯酒仰聆金玉章神歡體自輕意欲集作氣凌風翔吳中盛文史羣彥今汪洋方知大藩地豈曰財賦強宴李録事前人與君十五侍皇闈曉拂爐煙上玉墀花開漢苑經過處雪下驪山沐浴時近臣零落今誰在仙駕飄颻不可思此日相逢思曩集作舊日一杯成喜亦成愁軍中冬宴前人滄海已云晏皇恩猶念勤宴論集作式宴遍恆秩柔逺逮集作及斯人兹邦實大藩伐鼓軍樂陳是時冬服成戎士氣益振虎竹謬朝寄英賢降上賔徒罄周旋禮愧無海陸珍庭中丸劒爛堂上歌吹新光景不知晚觥杓集作酌豈能一作言頻簞集作單醪昔所感大醵况同欣顧謂軍中士仰答何由申玩花與衛長林二字集作象同醉司空曙衰鬢千莖雪集作白他鄉一樹花今朝與君醉忘却在長沙早春夜集耿拾遺宅李端如何逋客會忽在侍臣家新草猶停雪寒梅未稱花銜杯雞欲唱逗月鴈應斜年齒俱憔悴誰堪故國賒軍中醉飲寄沈八劉叟暢當酒渴愛江清餘酣潄晚汀軟莎欹坐穩冷石醉眠醒野膳隨行帳華音發從伶數杯君不見都已遣沈冥偶宴西蜀摩訶池前人珍木鬱波池風荷左右披淺觴寧及醉慢舸不知移蔭簟流光冷凝簪照影欹胡為獨羈者雪涕向漣漪殷卿宅夜宴張南史日暗城烏宿天寒櫪馬嘶詞人留上客妓女出中閨積雪連燈照回廊映竹迷太常今夜宴誰不醉如泥陸璞宅秋暮雨中探韻同作已見一百五十三卷前人江鄉故人偶集客舍戴叔倫天秋月又滿城闕夜千重還作江南會翻疑夢裏逢風枝鳴散集作驚暗鵲露草覆寒蛩羈旅長堪醉相留畏曉鐘勸陸三前人寒郊好天氣勸酒莫辭頻擾擾鍾陵市無窮不醉人奉酬盧端公飲後贈諸公見示之作前人佐幕臨戎集作人旌斾間五營無事萬家間風吹楊栁漸拂地日映樓臺欲下山綺席晝開留上客朱門半掩擬重關當時不敢辭先醉悟一作誤逐羣公倒載還此詩二百四十四卷重出今已削去奉陪李大夫九日龍沙宴會得遲字權德輿龍沙重九會千騎駐旌旗水木秋光淨絲桐雅奏遲煙蕪斂暝色霜菊發寒姿今日從公醉全勝落帽時韋賔客宅與朱博士宴集前人纍抗乞身章湛恩比上庠賔筵徵稷嗣家法自扶陽簪組歡言久琴壺雅興長隂嵐冒苔石輕籟韻風篁佩玉三朝貴揮金百慮忘因知臥商雒豈勝白雲鄉閏春宴花溪嚴侍御莊戎昱一團春翠色云是子陵家山帶新晴雨溪留閏月花瓶開巾漉酒地拆笋抽芽綵縟承顔服朝朝奏白華冬夜宴梁十二廳前人故人能愛客秉燭會吾曹家為朋徒罄心緣翰墨勞夜寒銷臘酒霜冷重綈袍醉臥西窗下時聞鴈響髙宴城東莊崔惠一月生人笑幾回相逢相值且銜杯眼看春色如流水今日殘花昨日開同前崔敏童一年過又一年春百嵗曽無百嵗人䁩向花中幾回醉十千沽酒莫辭貧五言奉和顔使君修韻海畢州中重宴釋皎然世學髙南郡身封盛魯邦九流宗韻海七字挹文江借賞雲歸堞留歡月在窗不知名教樂千載與誰雙五言冬至日陪裴端公使君清水堂宴集前人亞嵗崇髙雜咏作嘉宴華軒照緑波渚芳迎氣早山翠向晴多推往知時訓書羣疑作祥辨政和從公惜日短留賞夜如何五言晦日陪顔使君白蘋洲集得東字前人南朝分古郡山水似湘東堤月吳風在洲居雜咏作湔車楚客同桂寒初結斾雜咏作佩蘋小欲成叢時晦佳逰促髙歌聽未終五言陪盧判官水堂夜宴前人暑氣當宵盡徘徊坐月前靜依山堞近涼入水屏偏久是栖林客初逢佐幕賢愛君髙野意烹茗酌淪漣春夜與諸公同宴呈陸郎中前人南國宴佳賔交情老倍親月慙紅淚燭花笑白頭人寶瑟絙一作恆餘怨瓊枝不讓春更聞歌子夜桃李艷粧新春晚奉陪相公西亭宴集武元衡林一作花苑春向闌髙會重邀歡感物惜芳景放懷因綵翰玉顔穠處並銀燭焰中看若折持相贈風光益别難奉陪相公西亭夜宴陸郎中崔備賔閣玳筵開通宵遞玉杯塵隨歌扇起雪逐舞衣回剪燭清光發添香暖氣來令君敦宿好更為一徘徊同前王良士芳氣襲猗蘭青雲展舊歡仙來紅燭下花發綵毫端海嶽期方逺松筠嵗正寒仍聞言贈處一字重琅玕同前蕭祐宏閣陳芳宴佳賔此會難交逢貴日重醉得少時歡斂黛凝歌思求音足筆端一聞清佩動珠玉夜珊珊同前盧士政華堂良宴開星使自天來舞轉朱絲一作絃逐歌餘素扇回水光臨曲檻夜色靄髙臺不在賔階末何由接上台同前獨孤實仙郎膺上才夜宴接三台燭引銀河轉花連錦帳開靜看歌扇舉不覺舞腰回寥落東方曙無辭盡玉杯和劉員外陪韓僕射野亭公宴楊巨源好客風流玳瑁簪重簷髙幕曉沉沉綺筵霜重旌旗滿玉帳天清絃管聲繁戲徒過魯儒目衆歡方集漢郎心寒笳一曲嚴城暮雲騎連嘶香外林邵州陪王郎中宴前人西塞無塵多玉筵貔貅鴛鷺儼相連紅茵照水開樽爼翠幕當雲發管絃歌態曉臨團扇靜舞容春映薄衫妍魯儒縱使他時有不似歡娛及少年文苑英華卷二百十五
