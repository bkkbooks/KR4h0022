body:
  text: 文苑英華卷一百三十五宋李昉等編鳥獸五鸚鵡賦一首白鸚鵡賦三首寒梧棲鳯賦一首江曲孤鳬賦一首馴鳶賦二首白鷴賦一首大鵬賦一首鯤化為鵬賦一首鬬鴨賦一首鸚鵡賦李伯藥嘉靈禽之擢秀資品物以呈祥含金精於兊域體耀質於炎方候風海而作貢備黼黻以成章繡領綺翼紅襟翠裳飾以朱紫間以𤣥黃碧雞仰而寢色金鵝對以韜光亘萬里之重阻隨四夷而來王既逾嶺以自致亦凌江而逺翔開神情之聰辨發樞機而抑揚粵惟上聖先天成命在萬物而畢覩舉四海而咸鏡仁沾草木信暨翔泳咨此鳥之來儀亦攝生而遂性辨方物於圖象具靈表於言詠酬對清敏發吐祥正實靡靡而可恱雖喋喋而無競徘徊阿閣容與堂皇背風雲之遐路承日月之休光聽簫韶之逸響味椒掖之餘芳更無歎於羅罻終懷恩於稻粱齊鵬鷃於一指屬鵷雛而兩忘翠融孔質鴻騫鶚跱應舞節以鸞回慕知來而鵲起先假道於朱咮方徐行於紺趾配六象以表德參四靈而效祉庭開霧夕景净霞空乍褰珠網始出金籠逰萬年於木末玩四照於花叢窺仙盤而飲露登井幹以承風懷故鄉之逺思戀羇雌之舊侣望天衢以寄聲託歸飛而延佇不假物以自衛必任真於出處以薄伎而見知亦無憂於鼎爼不違道以飾智故忘情於所語豈止往來丹陛周旋玉除恱芝英之靃靡愛蓂莢之扶疏將以整六翮而遐逝望一舉而冲虛希九成之兆吉覬七日以傳書時光華而始旦嵗蹉跎而遽晚彼候鴈與賓鴻違風霜而未返嗟銜蘆以避繳恨日暮而塗逺羡嚶嚶之好音獨遷喬於上苑仰上林之爽塏襲昆閬之重規實神祕之栖息萃羣飛之羽儀翔靈囿遊天池翳叢薄泛漣漪况能言之擅美冠同類以稱竒奉皇恩之亭育將謝生而莫施惟一人之有慶願千嵗其若斯白鸚鵡賦以容日上海孤飛色媚為韻王維若夫名依西域族本南海同朱喙之好音變緑衣於一作而素彩唯兹禽一作鳥之可貴諒其美之斯在爾其入玩於人見珍竒質狎蘭房之妓女去桂林之雲日易喬枝於一作以羅袖代危巢於一作以瓊室慕侣方逺依人永畢託言語而雖通顧形影而非匹經過珠網出入金鋪單鳴無應隻影長孤偶白鷴於池側對皓鶴於庭隅愁混色而難辨每一作願知名而自呼明心有識懷恩何一作無極芳樹絶想雕梁撫翼時銜花而不言每投人以方息慧性孤禀雅容非飾含火德之明暉被金方之正色至如海燕呈瑞有玉笥一作篋之可依山雞學舞向瑶一作寶鏡而知歸皆毛羽一作羽毛之偉麗奉日月之光輝豈憐兹鳥地逺形微色凌紈質彩奪繒衣深籠久閉喬木長違倘見借於一作其羽翼與遷鶯而共飛凡一作皆文粹及集本無韻腳三賦雖注八韻今第一第二並止五韻疑唐制不同當考第二同前韻闕名稽聖人之遺文懿珍禽之不一彼善言之靈鳥孕聰明以自逸苞火德之竒姿誕金方之素質匪含章以就殞故逺時而襲吉憐碧山之孤髙恃疑榮松之蔽密傳衆音於清吹凝白華於皎日由是既飲既啄載留載飛觸雲網以摧羽閉雕籠而見歸豈不由蓄素姿以羅患懷海隂而遂違雖失羣以傷指亦順人而可依登玉架覘朱闈苟安性以知樂每求容而自微雪膚皎晶擯池鷗之光潔霜毛瑩净奪軒鶴之清輝且其翔不忘止居必任疑側莫厭傳弄豈驚撫拭狎君子之光儀逺虞人之網弋感珍念而矜眷託恩馴以棲息而愛其豐姿氷華金疑作全體玉色匪鵷彩之爭妙何衆禽之比德呼名自應隔羅幔而飛來教語半成學美人之漸逼故對綺琴而傾聽上金屏而斂翼蒙正平之翰藻應司空之寵識夫𤣥默者動之所求潔素者默之攸尚矧聰性以受絏悲惠心之為亮抗幽意於霞表羡髙儔於海上彼不材兮見留此能言兮何妄或曰物惡近以招纍理貴逺而無凶雖道形以取美獨抱清而不從豈知夫善生者託人以逺害能夀者輔德以自容是以承君子之恩渥獨䝉幸以遭逄者也第三以容日上飾孤飛色媚為韻郝名逺珍禽生矣于彼南域禀離宫之淳精得金方之正色明而且慧聰而多識雖羽族之殊流與人智而同德懿其霜毛雪毳鮮襟皓臆明眸珠朗修趾頳飾理翮整翰仰雲路而翻飛自邇陟遐託風林以棲息及夫出層嶠集髙松刷徑翼端麗容遇天網之四掩獻君門於九重用能辭羣别類重譯而至閉以雕籠處之丹地夫違忤則傷性常順㫖以從人乖背一作背道則喪生不貪榮以求媚爰一作愛逰上都隻影長孤懷好音而願語每稱名而自呼當其踰山越嶂萬里遐曠常恐微軀毁全無妄豈知承曲成之惠渥奉君子之嘉貺朝食琅玕之實夜宿畫梁之上而已哉顧慕多違自惜容輝夢鄉山而𣣔戀思恩波而不飛獨有邈乎長想欣然志逸效彼珍寶瑞我帝室坐使素烏惡彩白鷴慙質苦炎洲之愁霧嘉長安之聖日信能言之見知接鶯谷而同出寒梧棲鳯賦以孤清夜月為韻王勃鳯兮鳯兮求一作來何所圖出應明主言棲髙梧梧則嶧陽之珍木鳯則丹穴之靈雛理符有契誰言則孤逰必有方哂南飛之驚鵲音能中吕嗟入夜之啼烏況其靈光蕭散節物凄清疏葉半殞髙歌和鳴之鳥也將托其宿之人也焉知此情月照孤影風傳暮聲將振耀其五色似簫韶之九成九成則那率舞而下懷彼衆㑹罔知淳化雖碧沼可飲更能適於醴泉雖瓊林可棲復憶巡於竹榭念是欲往敢忘晝夜苟安安而能遷我則思其不暇故當披拂寒梧翻然一發自此西序言投北闕若用之銜詔冀宣命於軒階若使之逰池庶承恩於嵗月可謂擇木而俟處卜居而後歇豈徒比跡於四靈常栖栖而沒沒江曲孤鳬賦并序王勃梓州之東南涪江之所合有潭焉周數十步青壁絶地緑波澄天常有孤鳬栖蕩其側飛沉翻唼而天性不違嗟乎宇宙之容我多矣造化之資我厚矣何必處華池之內而求稻粱之恩哉遂作賦曰靈鳯翔兮千仞大鵬飛兮六月雖憑力而易舉終候時而難發不如深澤集作潭之鳥焉順歸潮而出沒迹已存於江漢心非繫於城闕吮紅藻翻碧蓮刷霧露栖雲烟迫之則隱馴之則前去就無失沈浮自然爾乃忘機絶慮懷聲㺯影乘駭浪而神驚漾澄瀾而趣靜耻園雞之戀促悲塞鴻之赴永知動息而多方屢沿洄而自省故其獨泛單宿全真逺致反復幽溪淹留勝地傷雲鴈之嬰繳懼泉魚之受餌甘辭稻粱之惠焉而全飲啄之志也馴鳶賦王勃海上兮雲中青城兮絳宫金山之斷鶴玉塞之驚鴻謂江湖之漲不足憩謂宇宙之路不足窮終銜石矢坐觸金籠聲酸夕露影怨秋風已矣哉何氣髙而望濶卒神悴而智癢徒騖迹於仙逰集作遙竟纒機於俗網未若兹禽猶融泛想慙丹丘之麗質謝青田之逸響與道浮沉因時俯仰去非內懼馴非外奬夫徑翮揮風雄姿觸霧力制煙道神周天步鬱霄漢之𢎞圖受園庭之近顧質雖滯於城闕䇿已成於雲路陳平負郭之居韓信昌亭之遇似逹人之用晦混塵濛而自託類君子之含道處蓬蒿而不怍悲授餌之徒懸痛聞弦之自落故爾放懷於誕暢此寄心於寥廓第二盧照鄰孕天然之靈質禀大塊之竒工觜距足以自衛毛羽足以凌風懷九圍之逺志託萬里之長空隂雲低而含紫陽景升而帶紅經過巫峽之下惆悵彭門之東既而摧頽短翮寥落長想忌蒙莊之見欺哀武溪之莫往進謝扶搖之力退慙歸昌文選注鳯聲也之響腐食多懼層巢無象屈猛性以自馴抱愁容而就養於是旁眺德門言棲仁路不踐高梁之屋翔止吾人之樹聽鳴雞於月曉侣一作繞羣鵲於星暮狎蘭砌之高低玩荆扉之新故循廣庭之一息歷長檐而徑度若乃風去雨還河移月落徘徊亂於雙燕鳴舞均乎獨鶴乍哨聚於露集作霞莊時追飛於雲閣荷大德之純粹將輕姿之陋薄思一報之無階欣百齡之有託白鷴賦并序蕭頴士白鷴羽族之幽竒一有也字素質黑章爪觜純丹體備冠距頗類夫雞翟神貌清間不雜一有於字衆禽栖心一作止遐深與人境罕接固莫得而馴狎也上聞而徵一作收焉處以雕籠致以驛遽一作騎是將集長楊遊太液行有日矣天寶辛邜一有嵗字豫飄一作旅泊江介一作㑹流宕踰時秋八月自山隂前次東陽方議夫南登西泛極聞見之義諒褊懷所素蓄而未之從也㑹有命自天召赴京闕適與兹鳥偕至于㑹稽一有之字傳舍觀其宛頸旁睨回惶一作徊徨掩抑往往孤鳴音韻凄凉如慕侣而不獲因感而賦之曰鳥之生矣于彼南山彩必𤣥素文不綺斑備文武之正飾懋一作微妖姬之殊顔情莽眇以耿潔貌軒昻以安間無馴擾之近性故不愜於人寰逰必海裔栖必雲間曽一作冀養拙以自保祛未萌之憂患不然豈陋彼都邑之佳麗顧投身乎阻艱以至一作其標自然之靜故名之曰白鷴者歟何天聽之緬邈辱微禽之瑣細偶一日一作目之見羈委微軀以受制望層城以斂翼懷衆侣而孤唳從廄置之駿奔仰君門以遐逝君門兮九重洞沓一作䆗窱兮穹崇池太液兮島方壺萬族翔泳乎其中晝聒未央之繁絃夕驚長樂之虛一作靈鐘顧踈野之踐一作賤迹豈敢求一枝而見容越水清兮鏡色吳山逺兮天逼窺淺深以飄一作揚影逗清一作杳冥兮一息謂杉松可得永日而噪聚蓴荇足以窮年而唼一作喙食一與心賞兮暌違念歸飛兮何極鸚能言而入座鶴善舞而登軒殊二者之常一作俗態諒慙惶於主恩是以雖信美而非其志獨屏營而兢魂者焉凡一作皆文粹大鵬賦并序李白豫昔於江陵文粹有口字見天台司馬子微謂余有仙風道骨可與神逰八極之表因著大鵬遇希有鳥賦以自廣此賦已傳于世往往人間見之悔其集粹有少作二字未窮宏逹之㫖中年棄之及讀晉書覩阮宣子大鵬贊集作讃鄙心頗陋其作六字集作鄙心陋之遂更記憶多將舊本不同今復存於集粹無於字手集粹作于集豈敢傳諸作者庶可示之子弟而已其詞曰南華老仙發天機于漆園吐峥嶸之髙論開浩蕩之竒言徴至怪於齊諧談北溟之有粹作巨魚吾不知其集粹無其字幾千里其名曰鵾化成大鵬質凝胚渾脫修鱗二字集作鬐鬛于海島張廣翅集作羽毛于塞門集粹作于天門刷渤澥之春流晞扶桑之朝暾烜赫粹作赫奕乎宇宙慿凌乎昆崘一鼓一舞煙蒙集粹作朦沙昏五嶽為之震蕩百川為之沸騰集粹作崩奔爾乃蹶巨壑集作躋厚地陵集作揭上清粹作摩太清左回右旋倐隂忽明激三千以崛起摶集作向九萬而迅征背岌泰山之崔嵬翼舉垂集作長天之縱橫自左回至縱橫三十四字集粹作亘層霄突重溟激三千以崛起摶九萬而迅征背嶪太山之崔嵬翼舉垂雲之縱橫左回右旋倐隂忽明歷汗漫以夭矯排閶闔之峥嶸簸鴻濛扇雷霆斗轉而天動山搖而海傾集粹有怒無所搏雄無所爭固可想像其勢髣佛其形若乃二十字足䇿集粹作縈虹霓目輝集粹作耀日月連軒沓拖揮霍翕忽噴氣則六合生雲落集作灑毛則千里飛雪邈彼北荒將窮南隅集作圖塊視三山杯觀五湖燭龍銜光以照影列缺施鞭而啓途塊視至啓途二十二字集粹作運逸翰以旁擊鼓奔飇而長驅燭龍銜光以照物列缺施鞭而啓途塊視三山杯觀五湖其動也神應其行也道俱集粹有任公見之而罷釣有窮不敢以彎弧莫不投竿失鏃仰之長吁爾其雄姿壯觀映背河漢三十四字上摩蒼蒼下覆漫漫盤古開天而直視羲和倚日以旁歎繽翻集作紛乎八荒之間隱集作掩映乎四海之半橫大明而掩晝集作當胸臆之掩晝若渾沌集作混茫之未判忽騰陵集作覆以回轉粹作旋則霞廓而霧散然後六月一息至於天池集作海湄溟漲沸渭丘陵遷移長鯨扶栗以辟易巨鼇攝竄而躨跜窮洪荒之壯觀浮萬里之清漪借如羽蟲三百鳯為之王或歎不至時無望遑猶迫脅於雲羅乃賢哲之所傷彼衆禽之瑣屑同蟭螟之渺茫自溟漲至渺茫共七十六字文粹作歘翳景以橫榰逆髙天而下垂憩乎泱漭之野入乎汪湟之池猛勢所射餘風所吹溟漲沸渭巖巒紛披天吳為之㤕栗集作怵栗海若為之躨跜巨鼇冠山而却走長鯨騰海而下馳縮殼挫鬛莫之敢窺吾亦不測其神怪而若此蓋乃造化之所為豈比夫蓬萊之黃鵠誇金衣與菊裳耻蒼梧之𤣥鳯耀彩質與錦章既服御于靈仙亦集作久馴擾于池隍精衛殷勤集作勤苦于銜木鶢鶋悲愁乎薦觴天雞警曙于蟠桃踆烏炳集作晰耀于太陽不曠蕩而縱適何拘攣而守常未若兹鵬之逍遙無厥類而比方集粹有不矜大而暴猛每順時而行藏參𤣥根以比壽飲元氣以為漿二字集作充觴戲晹谷而徘徊慿炎洲而抑揚三十六字俄而希有集有鳥字見而謂之曰偉哉鵬乎若集無此字此之樂也吾左集作右翼掩乎東集作西極右集作左翼蔽乎西集作東荒集粹有跨躡地絡周旋天綱八字以恍惚為巢以虛無為場我呼爾遊爾同集作呼我翔於是大鵬許之欣然相隨此二禽已登于寥廓而尺鷃之輩空見笑于藩籬鯤化為鵬賦髙邁北溟有魚其名曰鯤橫海底隘龍門眼睔睔而明月不沒口呀呀而修航欲吞一朝乘隂陽之運遇造化之主脫我鬐鬛生我趐羽背山橫而壓海嵳峩足山立而偃波揭豎張皇聞見卓犖今古過魯門者纍百曽莫敢覩來條支者成羣又何足數既負此特逹壯心亦有取也若乃張垂天激洪漣海若簸其後陽侯騰其前􅍅如也皓一作皎如也蛟螭為之悚一作怛怖洲島為之崩騫如此上未上之間邈矣三千接海運摶風便飛亷倐而走羊角忽而轉勃如也蓬如也雲溟為之光掩山澤為之色變如此髙未高之間騰夫九萬足踏元氣背摩太清指天池以遙集按高衢而迅征時與運並道與時行遺夭閼之類放逍遙之情如此自一日亘千嵗隂數與陽數際乃下夫南溟之裔嗚呼誰無借便之事九萬三千故非常情之所希冀誰無回翔之圖一翥六月故豈常情之所覬覦由此言之則鳯凰上擊誠未得其錙銖鴻鵠一舉適可動其盧胡况鷦鷯一作郭鵪之輩尺鷃之徒易安易給其足其居須臾之間騰擲無數齷齪之內翩翻有餘伊小大之相紀亮在人而亦爾凌雲詞賦滿腹經史婆娑獨得骯髒自是不大遇不大起謂斯言之無徴試假借乎風水看一動一息凡歷天機一作夫幾千萬里鬬鴨賦李雍東吳王孫笑傲閶門魚橫玉劍蟻沸金樽賔僚霧進逰俠星奔桂舟兮錦纜碧澗兮花源爾乃輟輕棹登水閣絲管遞進獻酬交錯雲欲起而中留塵將飛而遂落既而酣歌徙座取物為娛徴羽毛之好鳥得渤澥之仙鳬出籠而振少步而趨唼喋爭食䙰褷帶雛隨緑波而淡淡向紅藻而傲愈鳬之為物也詭類殊種遷延遲重其聚則同而不和其鬬則仁而有勇參差聱軋疑作耴飄疑作颯沓繽紛其浮蔽水其旋如雲共洽波而弄吭各求匹而為羣繞菰蒲而相逐隔洲渚而相聞於是乎㑹合紛泊崩奔鼓作集如異國之同盟散若諸侯之背約迭為擒縱更相觸搏或離披以折衝或奮振以前却始戮力兮决勝終追飛兮襲弱聳謂驚鴻回疑返鵲逼仄兮掣裔聨翩兮踴躍忽驚迸以差池倐沉浮而閃爍號噪兮沸亂傾耳為之無聞超騰兮往來澄潭為之潰濩排錦石蹴瓊沙披羽翰簸煙霞避參差之荇菜隨菡蓞之荷花駐江妃之往棹留海客之歸槎而乃擁津塞浦辨觀如堵空里鄽訇厲天蛙黽兮失穴龜魚兮透泉專場之雞沮氣傾市之鶴慙妍其為狀也不一其為態也且千豈筆精之所擬非意匠之能傳良戒之於在鬭俾聞義而忘筌文苑英華卷一百三十五
