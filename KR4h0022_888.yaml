body:
  text: 文苑英華巻八百八十九宋李昉等編將相七贈官御史大夫贈右丞相程行謀神道碑贈右僕射王光謙神道碑贈太師崔倕神道碑御史大夫贈右丞相程行謀神道碑蘇頲御史大夫維弼之副尚書丞相粤官之長若庭堅是勑山甫為式凝纉之一作以懋追榮末一作未極可也聖皇執象増天報功元老恊斯捧日疇貴将詔頌其羙稱用命伯嬰與之佐佑存趙立孤可也廣平之傑出者公名則字行謀世以字行始終不易源彼二烈泉乎百代門閭當華嶽之峯碑闕倚桃林之塞遷自吾祖定成我居作鄭人矣曽祖諱慶隋長子令祖諱德淹隋太康令考諱藥王皇秋浦令子男樹聲太崇於官閥令長傳業夙振於台揆况一變從道三稱靡風乎公神靈特應金火殊發含照灼而更幽蓄堅剛而轉銳常謂處山者猛不採藜藿成蹊者芳不言桃李静安獨行汎覧羣書以管晏之謀迪訓貽典用申韓之法徵竒撮要髙深廣大盡在是矣志大好學首中甲科初補潞城尉轉趙之平棘換虞鄉主簿任非待賢居是適用嬰酷而罷居䘮幾㓕率由於至性每不勝哀禮闋入為鄠尉時吳郡顧琮秉銓調餗致公宻啓授萬年尉尋遷左肅政臺監察御史裏行歴二尉尉字一作殿字左右肅政丞侍御史廻復䨇拜周旋五人悉心果孚履尾奚懼獖豕旣制闕於威弧之張神羊既立挫三思於止戈之武固亦霜驅隼勁露落鵬槯豈避憸言俄招毁議出為幽州司馬都督薛訥以元帥綜戎仗權公為在端寮設文備甲兵繕食一作倉廪績絶漠以奔嚴城洞啓遷定州長史未詣軄入除金部郎中景龍六年鳴牝肆孽分宰京邑先屠戚黨吏部人相狃獄市皆紛徵拜公長安令丕弊不辜大安所屬無何除將作少匠少府少監餙􅀢蓏二字疑愛費閉奢曽不無益而成有吝豋加七命食千戸俾侯於廣平國轉刑部侍郎兼檢校送王府長史司冦持平以議罪君王好直而請由是用刑不頗為善最樂也明年王正月我后時邁翠華順動蒼駕廵逰幸朔方而經周漢陟河東而觀舜禹命公爲蒲州刺史本道按察偉儲峙之饒悅股肱之壮期至人於道路寔君子於雲天然後摶擊守宰澄清中理上因聴政顧侍臣曰江淮之間風氣果銳吏諸尤者朕已得之又遷揚州大都督府長史公刈作姦鉏撓法萬商利於舟檝三具貞於鼓鑄皇念勤矣徴拜鴻臚卿即殿中監國開賔舘威懐柔服之序王列御府備物致用之殷則九卿不如六尚書也公力主財巨細錙銖定豊省翹天地之蘇三字疑來自西極溢水衡之貫獻于北宫擢拜御史大夫朝之紀也夫端以憲軄流為法家含𢎞則弊於僶俛竦踊則嫌於激許狂徒一作徒任失得且觀一作開興替公之度盖不然森貎寡詞彼憚嚴而惴察悞欵幽二字一作㣲藏宻我易躁而安動庻物和矣群司晏如加尸益榮金紫宣命賚予虗佇丹青尹政嗚呼方恒位事歘謝期頥享年八十有三以開元十四載春之孟庚寅綂日薨於洛陽之審政里第宸極悼焉行必馳組請不釋服曷云多矣一作也一尚德二尚厚三尚齒四尚舊以革而問遺中使者鴻寳金相一作醫望自闕逮凶則撫贈左一作右丞相衾常疑布帛盡萃其家䘮禮塟數邁超夷等伊我公蹈規懸觧臨事黙識至初疑為心至公陳力薄驕奢之行卑乃崇髙重明哲之謀尊而夀考匪有倫有要知至知終何以符契於君臣寵靈於存殁古未之効也以貞為謚然與其年暮春壬寅十朋啓塋雙表昭𡑞歸厝于鄭之少華原禮也一子鎮之㓜爲尚舍直長稟義方之誨成幹裕之能以杖扶後起柴毁孤立凡厥所嗟上之所隕直清而羙者則御史彭城劉彦囬同郡宋詢並謂勞人祗服盍承報國聞薦府庭朝夕棟宇遇甚恩結悲盈涕濡相與開陳詔命甄用詞藻爰備刋勒宜存妙好顧秩重黎之司日其正兮禮者其不佞乎粗言銘曰程伯休父膺厥命兮我公之貞保氏姓兮我公之德宣歌詠兮至于天官翊明聖兮登以碩老資忠敬兮夀必待終名轉盛兮卜而獲兆典實令兮嗚呼太史秉直少華南映望陪我京還即于鄭贈右僕射王光謙神道碑權德輿天球白珩産於崇山扣之而清越格人莊士生於隤德用之而𢎞大其或含光而耀藏噐不發乃熾而昌是滋百祥藴而為義方餙而為徽章故太原王公四筮仕而領通邑五追崇而登端右循政茂於官下湛恩集於身後有繇然也公諱光謙字某自東漢鴈門太守澤五代至晋中書令獻之坦之葳蕤德名與吉祥一作禄侔盛自後魏龍驤将軍長社穆侯慧龍五代至隋秘書少監邵以勲華文學復大其門秘書生隋揚州户曹叅軍來宰相世系表作楊州司馬孝京戸曹生皇青州司戸叅軍子竒司戸生羙原丞贈太常卿慶賢三代沉晦邁其風訓公即太常府君之長子也㓜而岐嶷長而淳懿絜矩愼獨抱仁戴義閎深博辯之學稽古禮文之事炳然含章靡不通貫至若文舒之清脩亷實處冲之剖析𤣥㣲安期之𢎞恕懐祖之沉静合是家法而躬行之始以門䕃受署凡四徙官曰幽州三水潞州潞城二主簿絳州萬泉縣丞楚州淮隂縣令所至之邦二千石必加禮慰薦而公牢譲勇退卑不可踰及為縣令也務清净之理而去其煩苦推明誠之本而敎以亷隅一同熈熈生殖阜滋楚風丕變㡬至齊魯因喟然曰彼天爵羙禄者在仁義與樽酒而已太邱彭澤豈多秩耶於是放懐於外嗇神於内沉研象繫之表盤礴天人之際其致知格物不可詳已以開元二十九年春正月捐舘舍于淮隂年六十九其明年返塟于河南府偃師縣北山之陽夫人博陵崔氏贈愽陵太夫人繼夫人隴西李氏後夫人同郡武氏贈彭城郡太夫人餙終三加子貴故也公之才子五人長曰翊以博一作文雅典憲亮直方貞集作直方貞厲歴御史中丞在㪚騎常侍刑部吏部二侍郎御史大夫贈户部尚書謚曰忠惠次曰翺吏理詳明官河南府翟陽縣尉集作丞次曰翃循良愷悌勲德茂盛歴辰朗容三州刺史容管經畧使兼御史中丞河中少尹朔方節度留後汾州刺史單于副都䕶鎮武軍使徴拜京兆尹尋兼御史大夫再居大理寺卿爲福建觀察使入爲太子賔客貞元十二年檢校禮部尚書東都留守踐履藩垣逾四十年階至特進爵封本郡次曰向士行清脩為秦州上邽縣尉幼曰翽文敏有幹裕歴監察御史三原縣令著作郎太子僕翺向皆不幸蚤夭翽亦命屈其志而忠惠公太原公惣集休祉為宗工藎臣初忠惠公與肅宗代宗從容言天下事甚衆且曰文致太平在正名百軄危言悃愊痛詆闕條䟽理道坦然章明沃心前席倚以為相者數矣雖位闕不致而其遺風直聲暴乎天下太原公剖符賦政累刻金石㓕夷越劇賊開地靖人倅蒲也以沉㡬銷急變䕶單于也以尺書柔獷俗中外官師淑聲流聞保釐尹正式是東夏安危注意未始有極言代德者以公之保集無保字道未光而慶下鍾惟其有之是以佀之之故也初以忠惠公扈鑾輅於岷峨其勤匪懈贈公隴州刺史又以持節印冊命專對於北方間關忠力再贈公秘書監後以太原公南服嘉庸三贈公為工部尚書以轂下肅清四贈公為太子少保以閩方報政五贈公為尚書右僕射噫嘻賢人教忠之業令嗣揚名之孝大君追逺之澤是三者可為至矣十七年太原公貞于龜筮得二月壬寅吉於是備八旒七章鷩冕佩玉之餙博陵彭城二郡太夫人以象服祔焉詔給鹵簿官司䘮事慶靈集於一門光耀被於九原君子然後知積德豐報之不誣矣至若忠惠之子為守臣太原之壻居台司諸孫昌阜冠映圭組則列諸碑隂以備代家斵茲琬琰銘公德羙集作善其詞曰有匪集作匪人君子兮德行醇備蟬聮烜集作咺赫兮峻閥𢎞義闕靈龜兮懼腊毒之厚味樹風百里兮馳蒲宻之極摯慈和安靖兮闔境如春仲叔容儀兮與古為倫全才不耀兮流慶後昆忠惠旣没兮太原顕尊五加追命兮賁茲𤣥壌隼旟龍劔兮以至師長澤流根葉兮恩及漏泉夀堂拱木兮以集無此字横蒼煙隨武可作兮臧孫有後崇岡樂石兮昭晰攸乆吁嗟王公所為不朽故朝㪚大夫檢校尚書吏部郎中兼御史中丞賜紫金魚袋清河縣開國男贈太師崔倕宰相世系表作倕神道碑太師名倕字某清河東武城人太公望旣封于營邱子伋嗣侯伋之孫曰穆伯食邑于崔遂以為氏後十四世至秦末東萊侯意如東萊侯之子伯基始居清河又十五葉生琰為魏名臣又九葉生休仕後魏為七兵尚書七兵之弟曰寅為樂安太守公即樂安八代孫始以門子補鄭州叅軍力行好學於子道以孝聞處伯仲間以友聞讀易至編絶以精義聞至德中戎羯猾夏王師出征公少有竒志思因時以自奮乃作伐鯨鯢賦上獻旣聞集有爾矣二字果噐之㑹弟五丞相以善言利得幸盡付利權始有塩鐵使之目愼選僚属表公為介轉臨晋縣丞處繁應卒鋩刄不集作無頓府罷再遷至太子司議郎韓晋公時爲户部侍郎掌邦賦急於用材薦公為監察御史主河東租庸之務尋轉侍御史充京東平糴使建中初德宗始親萬機儲精治本有漢宣與我共治集作理之歎謂大臣求可當良二千石者遂以公帶本官權知袁州刺史朞月有成詔書顯揚就加真秩益以金紫居無何韓晋公為丞相制國用思公前績乃傳召之抵京師授檢校户部郎中兼侍御史幹池塩于蒲脩牢盆謹衡石煎和旣精飴㪚乃盈商通而􅥐至吏懼而循法民不絓網而國用益饒嵗抄㑹其所入嬴羡什百詔下褒其能轉吏部正郎兼御史中丞具加五等之爵方倚以重任天富其材而不遐其福享齡六十有五貞元七年某月某日遘疾終于治所上聞悼之因降愍冊贈鄭州刺史賚錢三百萬以備餙終之禮明年某月某日還塟于成周之偃師從世墓也累贈至太師夫人隴西李氏汾州司倉叅軍咸一之女生才子六人長曰邠及公終集作卒時已為左拾遺後至太常卿次曰鄷後至太府卿次曰郾至外臺尚書次曰郇今為廷尉次曰鄯至執金吾季曰郸今為太常卿同中書門下平章事惟夫人姑藏冠族以蘋蘩組紃輔佐君子為令妻積三十餘年以慈儉忠厚訓誡諸子為賢母二十有三年當永貞初順宗踐祚澤流自葉長子邠時為詞臣草册書以文當進階遂上䟽乞移榮於親優詔允之特封清河郡太君士林聳慕皆自痛其不及邠為太常鄷為大農咸白髪貴綬以奉膳羞諸季各以簮𥚑給事左右愉愉然先意無違言世榮者舉無與比以子貴累封贈至凉國太夫人元和八年三集作二月十六日捐舘舍夀七十有九是嵗某月某日合祔惟太常及尚書既今相國皆有中書舍人為禮部侍郎凡五貢賢能得士百四十有八人言兄弟者許為人瑞崔氏之門六人皆入文昌宫其間三人歴八侍郎統而論之三代卿兩連率二翰林學士一執金吾言冠冕者許為世雄與姑臧李范陽盧世為婚媾入于姻黨無第二流言閥門者許為時表太常二子亦以才能同入尚書璜為吏部郎􅗕為司勲郎其他支孫未登金閨籍者詵詵然魚貫而進文采集作業甚似而孝謹不衰猗歟君子之澤其所從來逺而有光乎開成已未嵗七月甲辰相君受詔於明庭始操國柄仲冬奉常事于家禮成起慕悄然永懐曰古者卿大夫廟有鼎墓有碑皆銘之以紀先德也今備位宰相敢不敡前人之耿光乃俾家老條白事功咨於學古集注作士者徵其詞尚信也又命宗祝卜柔日告于廟盡誠也儀甚集作其非備而敬有餘斯所謂逹禮之君子遂刋勒如式掲于道周銘曰奕奕四姓崔為之冠瞻其門墻倬若雲漢善積家肥子孫多才如彼榱棟必生徂徠太公之後彌二千祀烱如貫珠焯見圖史顯允太師丕承德基構于其堂亦旣塈茨生逢艱虞戎夏交師獻賦伐叛忠存乎詞兵興事叢飛輓四馳歴踐劇軄視屯如夷乃主平糴乃分行使治粟為邦其道一致蒲實近地塩為利泓使車來思剗弊立程吏亷商通嵗倍其贏奏課連最德音褒明就加執法好爵兼榮天賦之才不與夀并生樹德本歿揚淑聲上聞軫懐侑樂為停贈襚之禮侔于公卿萬石貽訓根於孝友太邱種德乃稔身後家有令子妻為夀母二十餘年人倫之首六子來侍如龍如虎衆婦來饋維筐及筥佩玉鳴環交饗庭户申申秩秩歡不踰矩昔為甲族今為興門天爵人爵蔚然两尊集作存先德䕃之黙集作黯如重雲孕和含集作合粹濯潤本根景亳之源圖書之川陽陵帝壇磅礴廽環世安其神世嗣其賢聆德風者拜于碑前文苑英華巻八百八十九
