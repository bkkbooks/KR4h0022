body:
  text: 文苑英華巻一百九宋李昉等編器用八竹杖賦一首卭竹杖賦一首簾賦一首席賦一首清簟賦二首鎮座石獅子賦一首砥石賦一首𢷬練賦一首竹杖賦庾信桓宣武平荆州外白有藝文類聚有人字稱楚丘先生來詣門下桓公曰名父之子流離江漢孤之責矣及令引進乃曰噫子老矣鶴髪鷄皮蓬頭歴齒乃是江漢英靈衡荆杞梓雖有聞於十室幸無求於千里寡人有銅環靈夀銀角桃枝開木𤓰而未落養蓮花而不萎迎仙客於錦市送游龍於葛陂先生將以養老將以扶危先生笑而言曰中國明於禮義闇於知人心之憂矣惟我生民雖復疎條勁柘促節貞筠杖端刻鳥角首圖麟豈能相予此疾將予此身若乃世變市朝年移陵谷猿吟鷹厲風霜慘黷楚漢爭衡袁曹競逐獸食無草禽巢無木于時無懼而慄不寒而戰胡馬哀吟羌笳悽囀親友離絶妻孥流轉玉關寄書章臺留釧寒關悽愴羈旅悲涼疏毛抵於矰繳脆骨被於風霜髪種種而愈一作逾短眉髟髟而競長是以憂幹扶疎悲條鬱結宿昔僛醜俄然耆耋變田鳳於承宫改陽文於鬷蔑潘岳秋興嵇一作舎生倦遊桓譚不樂吳質長愁並皆年華未暮容貌先秋予此衰矣雖然有以非鬼非蜮乃心憂矣未見從心先求順耳伯玉何嗟丘明惟恥拉虎捭熊余猶稚童觀形察貌子實悲翁别有九棘龎眉三槐暮齒孔光謝病袁逢致仕吳濞不期楊彪喪子明公此贈或非乖理先生乃歌曰秋藜促節白藋同心終堪荷蓧自足驅禽一傳大夏空成鄧林卭竹杖賦庾信沉㝠子遊巴山之岑取竹於北隂㛹娟髙節寂歴無心霜風色苦露染斑深每與龍鍾之族幽翳沉沉文不自殊質而見賞藴諸鳴鳳之律制以成龍之杖拔條勁直璘斌色滋和疑輪人之不重待羽客以相貽青春欲暮白雲來遲謀於長者操以從之執末而獻無因自持諸蔗雖甘不可以倚彼藜雖實不可以美未若處不材之間當有用之始魯分以爵漢錫以年昔尚爾齒今優我賢書横几玉塵筵則函之以後拂之以前爾其摘芳林沼行樂軒除間尊卑之垂悅隨上下之遊紆夫寄根江南淼淼幽潭傳節大夏悠悠廣野豈比夫接君堂上之履為君座右之銘而得與綺紳瑶珮出芳房於蕙庭簾賦孫逖智者創物有以而然簾之為用博利存焉若乃少婦重閨王孫華館映錦屏以猗猗增繡戸之煥煥瓊鈎上而齊女謳珠影垂而楚妃歎蓋私宴之樂飾異在公之達觀至於因依華省隠映長廊交輝朱紱接影金章隔至人之清鏡雜僊署之餘香禁鐘啓明納晴天之曙色嚴城驚疑作警夕引華月之宵光盼睞成寳終然允臧豈備物而致用亦道同於君子輕明無隔將引喻於虚心巻舒任時足烱誡於行已組織成象含游夏之文繩約善結得老莊之理豈徒然哉斯盡美矣原夫青青梁苑猗猗淇澳冒雪停霜是稱脩竹紆匠人之巧思列冡卿之華屋甘剖節而離根奉榮光而再穆則有製長笛成洞簫器同握玩聲引風飇徒擅名於昔日詎齊美於今朝席賦彼美嘉席施於髙堂廣狹有凖巻舒匪常承以彩薦貯之牙牀玉几蟠蜿而上列寳屏邐迤而外張狎髙瑟必疑透響染薰爐以流香瞰金牕以隔影瑩珠箔而凝芳洎乎禮義多則卑髙異行或主或賔浹歡於北院東嚮西嚮取上於南方南方何有是肴是酒或因食而即前或屬虚而盡後彼固若是不亦如斯必順時以革易乃任人以推移不正不坐道通於曩儀寒温暑凊自有其先規所以簟固夏設席乃冬施傾莊敬以揖讓成疑作誠君子之攸宜管寧别居且申情於分割曾子避坐將有敏於謙撝若夫行之於俗蘭房之曲有美一人容顔如玉摳長裾一作裙而來就歛雙眉而下矚憐織綴而留心賞華新而不足凌朝啓鏡入夜燒燭每因眠而取暖加以羅衾怨孤坐而多寒増之錦褥則有務學之子安貧順理㓗一作絜酒擕琴躭籍翫史居環堵而養性遥太階而虚俟出陳子之幽扃慕戴公之重美既懐珍而待聘當彈冠而入仕詩言我心匪席不可巻也斯言豈謬矣清簟賦仲子陵創物者必正其名以清命簟惟簟斯清雙入巧作連心織成始葱蘢而席巻終絢練而砥平本其初則王爾運心班匠寓目吳谿赤剛楚澤寒竹皓簳氷截素膚縞裂斷此枝間畧其溝節然後角軼手匠妙意文理横生波瀾洊至雕龍綺錯切玉鱗次澹氷泮而泉開分霜勁而雪地疑信通才之云欲非吾人之所為於是時授形疑暑天旋太陽山成爛石泉若探湯有美一人兮明時節求暑備兮珍簟長知薜荔之空靡意荃蘭之虚芳若乃買以兼金縁以純錦思因人之共弊庶君子之安寢出此入彼俱處芳蘭之室上㨿下承必兼芬若之枕况乃虚館方晝華堂且空髙梧閟景密篠生風撤文茵與綺席虚翠幕及朱櫳惟珍簟之在御望美人之來同美人遲兮隔脩路對珍簟兮日已暮矚筵幌之虚深卧層雲之空度帶餘霞而歛綺映片月而舒素昭列宿之清光披青天之薄霧于時輕箑屏用微綃罷服霜簡自凄氷壺増肅涼風忽至獲五福之康寧炎氣四除忘庶徴之時燠且物有小而喻大事有淺而用深道之將行我則開而當暑道之將廢我則巻而在隂是謂清簟之理願為君子之心第二獨孤授楚竹嬋娟英柔碧鮮折其膚以為簟俟方暑而登筵信服物之妙麗何巧心之纏綿故匠士意其用也清以目焉有若粉署僊郎翰林髙價義鈞膠漆官則同舍獲五尺之珍簟當三伏之炎夏以為身之所安願與友而共藉嘉貺允屬其人如玉發緘而氷氣驚容入座而波文滿目在一物之足貴亦兼金而匪欲親於體有寢處之同觀疑適於時念巻舒之齊躅矧夫畏日赫赫蒸雲爍石髙館沉沉面池枕林芳華交映軒雨疑靜深乃爾娯坐開張聯心清引微飇涼迴夕隂可以娛幽獨可以蕩煩襟賦明水而詎屏委輕扇而自任幸君之拂拭奉君之休息襲握蘭之晨芳㕘覆錦之夜飾貞可比操文用表徳入芙蓉之幕煥以相鮮照瓊樹之姿粲其増色亦有别號行唐是稱流黄紋織錦象凝霜承以羅綺薦於玉牀肅葱籠之翠幄取寂歴之洞房夫君不至而碧鮮迥美人獨居兮清晝長雖或殊姿而異質亦云蠲暑而致涼物則周用時然斯在遇陽之夕陳於寢以發華洎隂之興韜於筒而祕彩懼流麝疑而將暗同棄席之見待儻無忘於遺簮為君含情而不改鎮座石獅子賦以今日良宴㑹為韻閻隨侯有西域之奇獸獸疑嘉名於古今因匠石之著象非虞羅之所擒若乃良牧見恱觀者同欽以可重而作鎮將制猛以示心仁而能馴似恱君子之徳獸用不擾無假虞人之箴爾其拂拭為容剖斷成質臨玉簟而雙麗向雕楹而對出形勢雄壯似生入戸之風浮彩輕明欲奪臨軒之日用之則進捨之則藏信賢智之堪擬豈飛走之可當幸兹為玩設彼華堂祝之者震來虩虩對之者容自鏘鏘俯以瑠璃之砌安以玳瑁之牀芳座艶綺羅之色錦衣染蘭麝之香光耀銅武彩映銀章威慴百城褰帷見之而增懼坐鎮千里伏猛無勞於武張有足不攫若知其豢擾有齒不噬更表於循一作馴良豈比夫昔者作貢從來於逺幸蒙處之羅薦承榮靡倦一為席上之珍幾對髙堂之宴棄置為從於取捨光價幸生乎顧盼觀乎府庭之内莫之為最其情也無欲於中其質也見生於外既狎人之不恐亦與物而何害願承剪拂之恩長表衣冠之㑹砥石賦并序州時在朗劉禹錫南方氣泄而雨淫地慝一有而字傷物媪神噫濕渝色壊味雖金之堅亦失恒性始予有珮刀甚良至是澁不可拔剖其室乃出遡陽眇眡傳刃蒙脊鱗然如痏痂如墨一作黒子如青蠅之惡銳氣中錮猶人被病然客有聞焉裒密石以遺予沃之草映一作搜雜以鳥膏切劘下上真質焯見躊躇四顧返爾謝客微子之貽幾喪吾寳客曰吾聞諸梅福曰爵禄者天下砥石也髙皇帝所以礪世摩梅福傳即用此摩字諸本作磨非鈍有是邪予退感其言作砥石賦我有利金兮以利為佩遭土卑而慝作兮雄芒為之潛晦如景昏而蝕既兮與肌漆而為厲顧秋蓬之不可刜兮尚何一作可遊乎髖髀之外利物蒙蔽材人惆悵俾百沃之至精蟠一作播一檢而多恙豈害氣之獨然兮將久不試而然彼屠者之刀一作刃兮獵者之鋌不灌不淬兮糅錯一作錫銜鉛日鼓月揮兮刲腴擊鮮睨熣穫禾火以耀芒一作醜㸌爟以輝芒蓊淫夷而騰羶豈不涉暑而蒙沴兮鼎用之而成妍有客自東遺予越砥圭形石質蒼色膩理剗其鱗皴滑以滫瀡如衣澣垢如鼎出否霧盡披天萍開見水拭寒焰以破眥擊清音而振耳故態復還寳心再起既賦形而終用一蒙垢焉何恥感利鈍之有時一作兮字寄雄心於瞪視嗟乎石以砥焉化鈍為利法以砥焉化愚為智武王得之商俗以厚髙帝得之傑材奔走一作傑材以凑得既有自失豈無因漢氏以還三光景分隨道濶狹用之得人五百餘年唐風始振懸此大一作天砥以礱兆民播生在天成器在君天為人君二字一作物天君為人天安有執利一作礪世之具而患乎無賢歟凡一作皆集本𢷬練賦魏璀細腰杵兮木一枝女郎砧兮石五彩聞後響而已續聽前聲而猶在夜如何其秋未半於是拽魯縞攘皓腕始於摇揚終於陵亂四振五振驚飛鴈之兩行六舉七舉遏彩雲而一斷隠髙閣而如動度遥城而如散夜有露兮秋有風杵有聲兮衣有縫佳人聽兮意何窮步逍遥於涼景暢容與於晴空黄金釵兮碧雲髪白素巾兮青女月佳人聽兮良未歇擘長虹而乍開凌倒景而將越是時也餘響未畢微影方流逶迤洞房半入宵夢窈窕閒館方增客愁李都尉以胡笳動泣向子期以隣笛增憂古人獨感於聽今者况兼乎秋屬南昌舊福東魯前丘昇黄綬之堂論文謝賈入素王之廟捧瑟齊由願君無按龍泉色誰道明珠不可投文苑英華巻一百九
