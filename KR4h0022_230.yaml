body:
  text: 文苑英華卷二百三十宋李昉等編隱逸一徵君二十一首居士十首處士三十一首徵君答何徵君任昉散誕羈靮外拘束名教裏得性千年同山林亦一作無朝市勿以耕蠶貴空笑易農士宿昔仰髙山超然絶塵軌傾壺已等藥命管亦齊喜為歎君獨遊若路一作終方同止一作皆藝文類聚贈徐徵君前人促生悲永路早交傷晚别自我隔容徽於焉積嵗月情非山河阻意似江湖恱東臯有儒素杳與榮名絶曽是違賞心曷用針余缺眇焉追平生塵書廢不閲信此伊能已懷抱豈暫輟何以表相思貞松擅嚴一作巖節贈李徵君大夀王纘孔淳辭散騎陸昶謝中郎幅巾朝帝罷䇿杖去官忙附車還趙郡乘船向武昌九徵書未巳十辟譽彌彰副君迎綺季天子送嚴光霸陵幽徑近磻溪隱路長編蓬還作室績草更為裳會稽置樵處蘭陵賣藥行看書惟道德開教止農桑别有懷幽侣由來髙讓王前年辭厚幣今嵗返寒鄉有書橫石架無氊坐土牀蘭英猶足釀竹實本無糧澗松寒轉直山菊秋自香管寧存祭禮王霸重朝章去去相隨去披裘驕盛唐答田徴君宋之問家臨清溪水溪水繞盤石緑蘿四靣垂裊裊百餘尺風泉度絲管苔蘚鋪茵席傳聞潁陽人霞外潄靈液忽枉巖中翰吟卧朝復夕何處文粹作當遂逺遊物色候逋客徵君宅今祗洹寺是許景光徵君昔嘉遁抗迹遺俗塵了心悟有物乘化遊一作入無垠道喪歷千載復存潁陽真上虞佳山水晚嵗耽隱淪內史既解綬支公亦相親儒道匪逺理意勝聊自欣洄沿南溪夕流浪東山春石壁踐丹景金潭冒緑蘋探鍊備海嶠賞心寓情人奈何靈仙骨鎩一作斂翮瑶池津寥寥虛白字夙創招提因家風緬多尚玄德謝無鄰謬陪金門彥矯迹侍紫宸皇恩竟已矣遺烈庶不泯行至汝墳寄盧徵君孟浩然行乏憩余駕依然見汝墳洛川方罷雪嵩嶂有殘雲曵曵半空裏明明五色分聊題一時興因寄盧徵君贈楊集作陽徵君鴻此公時被徵李白陶令辭彭澤梁鴻入會稽我尋髙士傳君與古人齊雲卧留丹壑天書降紫泥不知楊伯起早晚向關西寄趙徵君蕤前人吳會一浮雲飄如逺行客功業莫從就嵗光屢奔迫良圖俄棄捐衰疾乃綿劇古琴藏虛匣長劍挂空壁楚懷奏鍾儀越吟比莊舄國門遙天外鄉路逺山隔朝憶相如臺夜望子雲宅旅情初結緝秋氣風寂歷風入松下清露出草間白故人不在此而我誰與適寄書西飛鴻贈爾慰離析尋廬山崔徵君丘為日髙雞犬靜門掩向寒塘夜竹深茆宇秋庭冷石牀住山年已逺服藥夀偏長虛棄浮生者相逢益自傷家叔徵君東溪草堂作二首盧象關山十餘里青壁森相倚欲識堯時人一作天東溪白足一作雲是雷聲轉幽壑雲氣相表裏一作杳流水澗影生蟲蛇巖端翳柳一作化梓大道終不易君恩曷能已鶴蓋一作羡無老時龜言攝生理浮年笑六甲元化潛一指未暇掃雲梯空慙阮家一作氏子二今朝共遊者得性間未歸已到仙人家莫驚鷗鳥飛水深嚴公釣松挂巢父衣雲氣轉幽寂溪流無是非名理未足羡腥臊誰文粹作詎所希自惟負真意何嵗一作年當食薇自鄱陽還中道寄禇徵君劉長卿南風日夜起萬里孤帆漾元氣連洞庭夕陽洛波上故人煙水隔復此遙相望江信久寂寥楚雲獨惆悵愛君清川口弄月時棹唱白首無子孫一生自踈曠同王徵君洞中有懷張謂八月洞庭秋瀟湘水北流還家萬里夢為客五更愁不用開書篋集作帙偏宜上酒樓故人京洛滿何日復同遊送孔徵君皇甫曽谷口幽集作山多處君歸不可尋家貧清史在身老白雲深掃雪開松徑疏泉過竹林余集作餘生負丘壑相送亦何心陪王郎中尋孔徵君韋應物俗吏間居少同人會靣難偶隨香署客來訪竹林賢暮館花微落春城雨暫寒甕間聊共酌莫使宦情闌酬秦徵君徐少府春日見寄集作奉酬秦徵君系春日撫州西亭野望兼寄徐少府前人終日愧無政與君聊散襟城根山半腹亭影水中心朗詠竹窗靜野情花徑深那能有餘興不作剡溪尋此詩三百十五卷重出今已削去送戴三徵君還谷口舊居釋理瑩巖穴多遺秀弓車屢逺招周王尊渭叟潁客傲唐堯出處天波洽關河地勢遙瞻星吳郡夜作霧華山朝清論虛重席間居挂一瓢漁歌思坐酌宸渥寵行軺春為荷裳暖霜因葛履消層崖懸瀑溜萬壑振清飈谷鳥猶一作還遷木場駒正一作會食苖謝安何日起台鼎佇君調送駱徵君陳潤野人膺辟命溪上掩柴扉黃卷猶將去青山肯更歸馬留苔蘚迹人脫薜蘿衣他日相思處天邊望少微經李徵君故居溫庭筠霧濃煙重草凄凄樹映欄干栁拂堤一院落花無客醉五更殘月有鶯啼芳筵想像情難盡故榭荒涼路已迷風景宛然人自改集作惆悵嬴驂往來慣却集作每經門巷馬集作亦頻嘶贈鄭徵君集作題鄭徵君家匡山首春與丞相贊皇公遊前人一拋蘭棹逐燕鴻曽向江湖識謝公每到朱門還悵望故山多在畫屏中九華山費徵君所居羅隱草堂何處試徘徊見説遺蹤向此開蟾桂自歸三徑後鶴書曽向九天來白雲事迹雖然集作依前在青瑣光隂竟不回盡日集作夕為君思曩昔集作曩日一作往日野泉嗚咽路莓苔居士早春贈别趙居士還江左時長卿下第歸嵩陽舊居劉長卿見君風塵裏意出風塵外自有滄洲期含情十餘載深居鳯城曲一作北日預龍華會果有集作得僧家緣能遺俗人態一身今已適萬物知何愛悟法電已空看心水無礙一作礙且將窮妙理兼欲一作亦尋勝槩何獨謝客遊當為逺公輩放舟馳楚郭負杖辭秦塞目送南飛雲令人想吳會遙思舊遊處髣佛疑相對夜火金陵城春煙石頭瀨滄波極天末萬里明如帶一片孤客帆飄然向殘一作青靄楚天含江氣雲色常霮䨴隱見湖中山相連數州內君行意可得全與時人背歸路隨楓林還鄉念蓴菜顧豫尚羈束何幸承盼睞素願徒自勤清機本難逮纍年忝賔薦末路逄沙汰濩落名不成徘徊意空大逄時雖一作難貴逹守道甘易退逆旅鄉夢頻春風客心碎别君日已逺離念無明晦豫亦還柴荆山田事耕耒送薛居士和州讀書嚴維孤雲獨鶴共悠悠萬卷經書一葉舟楚地巢城民舍少村煙杜樹鷺湖秋蒿萊織女晨炊黍籬落耕童夕放牛年少不應辭苦節諸生若遇亦封侯自青山詣於潛道中作呈元八居士釋靈一苕水灘行淺潛州路漸深參差逺岫一作村色迢遞野人心凍澗氷難釋秋山月易隂不知天目下何處訪雲林此詩二百九十三卷重出今已削去注異同為一作欲尋天目先問元駱二居士已見一百六十六卷送沈居士還太原釋皎然辭鄉因世難家族盛南朝名重郊居賦沈休文作郊居賦才髙獨酌謡沈文子作浪花飄一葉峯色向三條髙逸雖成性弓旌肯妄招秋宵即事示崔居士前人禪性愛方丈寂寥無四鄰秋天月色正清夜道心真大夢觀遺迹浮名誤此身不知庭樹意榮落感何人滑中贈崔髙士王季友夫子保藥命外身得無咎日月不能老化腸為一作無筯否十年前見君甲子過我夀云何今相逄華髮在我後近而知其逺少見今白首遙信蓬萊宫不死世世有玄石采盈襜神方祕其肘問家唯指雲意氣常言酒攝生固如此履道當不朽未能太虛同願亦天地久實腸以芝术賤形乃芻狗自勉將勉余良藥在苦口此詩三百四十卷重出今已削去留題杜居士許渾松偃石牀平何人識姓名溪氷寒棹響嵓雪夜窗明機盡心猿伏神間意馬行應知此來客身世兩無情贈滔口苗居士鄭谷嵗晏樂園林維摩契道心江雲寒不散庭雪夜方深酒勸漁人飲詩憐稚子吟四郊多壘日勉我捨朝簮敷溪髙士前人敷溪南岸掩柴荆挂却朝衣愛淨名間得林園栽樹法喜聞兒姪讀書聲眠窗日暖添幽夢步野風清散酒醒謫去徵還何擾擾片雲相伴看衰榮處士贈周處士庾信見類聚九丹開石室三徑沒荒林仙人翻可見隱士更難尋籬下黃花菊丘中白雪琴方欣松葉酒自和遊仙吟尋周處士宏讓前人試逐赤松遊披林對一丘梨紅大谷晚桂白小山秋石鏡菱花發桐門琴曲愁集作曲道泉飛疑度雨雲積似重樓王孫若不去山中定可留贈周處士王褒我行無嵗月征馬屢盤桓崤曲三危阻關重九折難猶持漢使節尚服楚臣冠巢禽疑上幕驚羽畏虛彈飛蓬一作鴻去不已客思一作念漸無端壯志與時歇生年隨事闌百齡悲促命數刻念餘歡雲生隴坻黑桑疏薊北寒鳥道無蹊徑清瀨類聚作溪有波瀾思君化羽翮要我鑄金丹别周處士一作尚書宏正庾信扶風天桂一作石橋北函谷故關前此中一分手相逄知幾年黃鶴遂反顧徘徊一作戀應愴然自知悲不已徒勞減瑟絃此詩二百六十六卷重出今已削去注異同為一作還草堂尋處士弟周宏正嵗時易荏苒百齡倐將半故老多零落山僧盡離散宿樹倒為查舊水侵成岸幽尋屬令弟依然歸舊館感物自多傷况乃春鶯亂贈程處士王續百年長擾擾萬事悉悠悠日光隨意樂集作落河水任情流禮樂囚集作因姬旦詩書縛集作傳孔丘不如髙枕枕時取醉消愁贈衛八處士杜甫人生不相見動如參與商今夕復何夕共此燈燭光少壯能幾時鬢髮各已蒼訪舊半為鬼驚呼熱中腸焉知二十載重上君子堂昔别君未婚兒女忽成行怡然敬父執問我來何方問答乃未已集作未及驅兒羅酒漿夜雨剪春韭新炊間黃粱主稱會靣難一舉纍十觴十觴亦不醉感子故意長明日隔山嶽世事兩茫茫留别龔處士李白龔子棲間地都無人世喧栁深陶令宅竹暗辟疆園我去黃牛峽遙愁白帝猿贈君卷施草心斷竟何言贈丹陽周處士惟長前人周子橫山隱開門臨城隅連峰入户牖勝槩凌方壺時枉白紵詞放歌丹陽湖水色傲溟渤川光秀菰蒲當其得意時心與天壤俱間雲隨舒卷安議集作識身有無抱石耻獻玉沉泉笑探珠羽化如可作携手集作相携上清都贈張公洲革處士前人列子居鄭圃不將衆庶分革侯一作卓然遁南浦常恐楚人聞抱甕灌秋𬞞心門遊天雲每將瓜田叟耕種漢水濆時登張公洲入獸不亂群并無桔橰事門絶刺繡文長揖二千石逺辭百里君斯為真隱者吾黨慕清芬巴陵别劉處士王昌齡劉生隱嶽陽心逺洞庭水偃帆入山郭一宿楚雲裏竹映秋館深月寒江風起煙波桂陽接日夕數千里嫋嫋清夜猿孤舟坐如此湖中有來鴈雨雪候音旨過湖南羊處士别業劉長卿杜門成白首湖上寄生涯秋草無集作蕪三徑寒塘獨一家鳥歸村落靜水向縣城斜愛子醒還醉籬東菊正花集作自有東籬菊年年解作花過終南山栁處士司空曙雲起山蒼蒼林居蘿薜荒幽人老深境素髮與青裳雨滌莓苔緑風搖菡蓞香洞泉分𣲖一作流淺巖笋出叢長敗屨安松砌餘碁在石牀書名一為别還路已堪傷因省風俗訪處士姪不見題壁韋應物去年澗水今亦流去年杏花今又拆山人却歸來問誰還是去年行春客潘處士宅會别戴叔倫相邀寒影晚惜别故山空鄰里踈林在池塘野水通十年難遇後一醉幾人同復此悲行子蕭蕭逐逺蓬留别宋處士前人留歡方繼燭此會豈他人鄉里遊從舊兒童內外親夜深愁不醉老去别何頻莫折園中栁相看惜暮春待漏假寐夢歸江東舊居因寄惠闍梨茅處士時德輿秉政未果會故也權德輿十年江浦卧郊園間夜分明結夢魂舍下煙蘿通古寺湖中雲雨到前軒南宗長老知心法東郭先生識化源覺後忽聞清漏曉又隨簮佩入君門送李處士歸弋陽山居前人暫來城市意何如却憶葛陽溪上居不憚薄田輸井稅自將佳句著州閭波翻極浦檣竿出霜落秋郊樹影踈想到家山無俗侣逄迎只是坐籃輿勞山居寄呈吳處士釋皎然山事由來别只應中老身寒園掃綻栗秋浪拾乾薪楚人呼養柴為柴浪領鶴間書竹誇雲笑向人俗家一作流相去逺野水作東鄰同前前人官居鼎鼐古今無名世才臣獨一余賢閣御題龍墨燦詔歸補衮在須臾贈王處士王建松樹當街雪滿地青山掩障碧紗帷鼠來案下長集作上常偷水鶴在牀前亦看碁道士寫將行氣法家僮授與步虛詞世間有似君應少便一作願乞從今作我師送盧處士歸嵩山别業劉禹錫世業嵩陽集作山隱雲深無四鄰藥爐燒姹女酒甕貯賢人晚日華隂霧秋風函谷塵送君從此去鈴閣少談賔經王處士原居張籍舊宅誰相近唯僧近竹關庭寒雲滿井窗曉雪通山來客半留宿借書多寄還明時未中嵗莫便一生間寄梅處士前人擾擾人間足是非集作是與非官間自覺省心機六街班裏身常下九列符中事且集作亦稀市客慣曽賖賤藥家童驚見著新衣君今獨得居山樂應笑多時未辦歸送耿處士賈島一瓶離别酒未盡即言行萬水千山路孤舟幾月程川原秋色靜蘆葦晚風輕迢遞不歸客人傳虛隱名憶吳處士前人半夜長安雨燈前越客吟孤舟行一月萬水與千岑島嶼夏雲起汀洲芳草深何當折松葉拂石剡溪隂憶江山吳處士前人閩國揚帆去蟾虧還復圓集作蟾蜍虧復圓秋風吟渭水落葉滿長安此地聚會久集作夕當時雷雨寒蘭橈殊未返消息海雲端尋陳處士山堂劉得仁步溪凡幾轉始得見幽蹤地集作路隱千根樹門集作房開萬仭峰片雲生石竇淺水臥枯松窮谷風光冷深山翠碧集作越濃鶴看空裏過仙向坐中逄底露秋潭水集作石聲微迥觀鍾暮年來此定異日願相容且喜今歸去人間事更集作事事慵訪曲江胡處士前人何况歸山後而今已似仙卜居天苑畔間步禁樓前落日明沙岸微風上紙鳶靜還林石畔一作下坐讀養生篇送姚處士歸亳州前人白髮麻衣破還譙别弟回首垂聽樂淚花落待歌杯石路尋芝熟柴門有鹿來明王下徵詔應就碧峰開題王處士山居前人茅堂入谷逺林暗絶其鄰終日有流水經年無到人溪雲常欲雨山洞别開春自得仙家術栽松獨養真文苑英華卷二百三十
