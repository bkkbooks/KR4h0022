body:
  text: 文苑英華卷五百四十一宋李昉等編軍令門上十九道執鐃失位次判一道挈壺挈轡不供判一道載稻判一道誓戒判一道請侯降者判一道不受敵判一道先登判一道斬將後殿判一道戰勝作彛器判一道克狄拏來判一道獲五甲首判一道為將失禮判一道旋凱獻俘判一道獻捷稱其伐判一道還生口判一道獲俘衣之判一道單醪投河判一道受敵人藥判一道將不迎制書判一道執鐃失位次判公司馬執鐃或告失位訴云不爽疾徐之節也對分命庶官各供所職有厥居守無相奪倫師貞丈人或曜威而振旅政成司馬將作氣而利用則擊鼓其鏜執鐃以節苟逺疑作表盈竭無乖疾徐類援枹而可嘉何動􅀈而能擬或其失位訟匪有孚我則辨明訴乃無咎挈壺挈轡不供判律挈壺氏合挈轡以令之云官有守不供其事對甲兵用嚴班位在守慘不畏法是瘝乃官挈壺挈轡陳力同道軍井軍舍從事殊觀匪恪居於戎律遽俶擾於侯度使介胄之夫云思拜井熊羆之將方解佩刀繄所掌而有失故流毒之夫衆出晉侯於淖大夫且謂侵官加韓昭以衣典冠乃為越事爾不還忌咎從自及載稻一作養士判甲為侯邑鄰於虜每載稻與脂於車行孺子之逰者無不餔也無不啜也必問其名居廉使奏飾情邀譽訴云候其壯以威虜對介狄荐居緣邉鎮國有備無患則為邦之大同使勇知方乃訓人之善者惟彼甲也膺兹利建食兼縣邑位列通侯密邇寇讐每愓不虞之至不一作無忘戒懼空思誘掖之仁載稻與脂惠雖存於孺子式餔且啜吾淺為之丈夫何則政貴有恆弗惟好異仁稱兼愛無獨孩提徒必問其名居亦奚俟於丁壯絶甘分苦事雖均於越王小信未孚曾不酌於曹劌廉其邀譽法則傷深方乎詐善理難置罰誓戒判甲掌誓戒鋪敦大防人告其紹逰云不可測度對國章有節軍政必戒兹不率典誠為曠官甲屬當戒行謹初乃事鑿門而誓伐鼓以律戎狄孔棘懼邉塵之是侵咨謀有方遂鋪敦而外禦式遏冦虐載孚備預觀釁以動在春秋而則書匪紹而言於雅頌而何失彼人所告不亦厚誣勿得孤虗之竒無乖測度之道請侯降者判浙江西防禦使請侯降者御史臺守約而爭云非功臣對褒德祿賢建封列爵以勸能者且旌善人惟彼輶軒是職防禦敷其七德耀以五兵故戎狄之人重譯來朝北闕蠻夷之類稽顙願沐南薰使司欲以德招攜請封茅土憲臺以舊非心膂未許繁纓得失可知與奪斯在且官不必備器無假人願取則於周書無貽誚於漢法不受敵判安西使路中遇賊命其改所受辭不甘致死甲以死王事論賞所司以為非因戰陳不合訴者不伏對刑典有常君命無二臨危不撓視死如歸瞻彼皇華職思其任眷言青史誰其嗣之况西蕃小寇亂我邉境忠臣效節絶其姦詐使國之軍威得存乎信人之質直以成其名事有類於解揚見稱晉代節無虧於蘇武不遺漢策斯乃一言可以興邦獨行可以振古宜申厚賞以勸不能何所司之見疑昧將軍之雅意訟端不息誠合其宜先登判甲先登死於霤下司馬三禭之與之犀軒直蓋御史劾其專命對委質策名惟忠與敬苟失兹道未之前聞甲實鯫生情深義勇常思報效願納忠貞且預公徒寧懷於倒戟忝膚介士遂自於先登嗟爾徇名何期死政任患有同於丑父見薨則類於紛如左傳石之紛如死於階下難不越官我其懷矣死而利國爾實為之何直蓋之先華俾懦夫之增氣生涯已謝魂魄焉依昔日求尸則聞五家之免今承寵命遽申三襚之儀優則未乖論且非當徴諸魯史親推見賞於無存考以國章禭服豈聞於祈父劾為專命對將何辭御史頗得於彈毫司馬宜懲於出位斬將後殿判丙為將斬將搴旗還後為殿久而不至帥詰之云馬不進非敢後也對讓禮之夲矜伐之賊大勇不鬬小智自私故范宣執謙其下皆讓宣尼垂訓欲速不逹丙也出師自承王命被堅執鋭皆奉廟謀斬將搴旗莫非皇化雖聞拓地之績未可貪天之功彼帥不仁責其後殿有詞則捨之可也詐善亦不猶愈乎戰勝作彛器判小侯戰勝作彛器銘功林鍾軍正訟言時有妨小侯云以示子孫不伏對天子令德名一作銘曰日新諸侯計功取彼凡獲永啓厥後無忘逺圗方展器於樽彛果昭宣於篆刻所以懲其不恪載此嘉猷何蕞爾之小侯敢招賢於大國雖出師易作師出以律其如尅敵之雄而救死何庸乃是因人之力同季孫之取惡且鑄齊兵聞臧氏之所言誠非魯德亦胡顔於燕翼遽有訟於妨時請從軍正之言以蔽林鍾之失克狄拏來判甲克狄邑長拏來有非寮者以有疑作其拏行軍吏執之云非事士也對弧矢所以立威征伐所以柔逺瞻言甲也利用行師奪長策以從戎俄聞獲醜遽前歌以獻捷方見勞旋惟彼非寮職居何等將守死以效節豈成仁而有渝謀之孔臧實曰有倫有義忠以明訓必也主亡與亡行為盡室之謀坐為刻吏之詰類伯夷之潔已不食於周同夙沙之策名何賴於鼓主則辱矣士也何依既無二君之心宜遂匹夫之志獲五甲首判丙獲五甲首請𨽻五家御史按景干賞蹈利訴云鋭士對休明在時蒸人亡戰雖塞垣無恐猶勞禦侮之師而鋭士從戎理急策勳之典日者白蘭塵起紫塞煙飛無風而羌笛自吟有月而胡兵不去天子聞鼓􅎏之響按劒興師將軍厲甲胄之容登壇受鉞丙以聲雄薊北望重關西斬將搴旗威推八陳屠凶執馘勇冠三軍盛績攸聞戎氛自滅甲首五級功可傳於藁街請𨽻五家罪方招於石室論咎雖云蹈利據理抑可酬功罰疑從輕景訴誠為順理賞疑從重霜臺豈可置刑既有司存請依彛典為將失禮判甲為君之右令將卒取清有司劾云雖免君之難而失右之禮訴云若不欺軍安得不獲對危事不齒善敗豈亡茍能愛而盡忠何傷詐以兼智惟甲迹同丑父貌類頃公立於戎馬之前應識被廬之術進則思賞退則圖全擁鐸拱稽初言以律靡旗亂轍俄見覆軍方知處死之難期於隕命之禮梅林止渴蓋是從權竹簡議刑將何勸善免於軍難亦曰師貞殊不知索彼車中范睢以逺降之城下紀信空存宜表洋洋之人以旌赳赳之列有司見劾無罪可書旋凱獻俘判軍旋凱獻俘毛有二者執法止而劾之軍司云拔距石者對兵居死地百戰功宣將鑿空門三軍獻凱度關山之月橫笛吟秋驅隴路之風長旌曵曉實賈豫勇寧老我師告捷攸屬獲多斯舉故得繫頸請命不以懸首為威亭障罷警邉城偃柝十角搖讋二毛就擒徴古可縱在今莫捨既負投石之力允當操袂之來執法劾止未諧通議請依軍見得謂其宜獻捷稱其伐判河源使獻捷驟稱其伐對師克在和軍政以順將敷奏其勇何求掩於人以為司馬出征君子於役即戎禦寇初利於九征執訊獲醜俄獻於三捷式宣王命大殪戎師而悉引厥功以為已力橫草可重坐樹無聞方飲御於諸友遂揚言於執事同郤至之稱伐非范宣之能讓攻戰必取欲先二子之鳴班列不同終在七人之下聚為怨府職在亂階蓋是速戾於爭功實乃包羞於閲禮不可在位何以佐軍還生口判得甲為平盧小將軍軍中有擒得生口者盡還之節度使欲加兵罪云古之名將亦有如此者對獲則必取兵家舊法捨之一作以從權伐國新意惟甲早從師旅久戍邉庭將立大勳以圖貴位爰從是役得展其謀於萬人之中力能獲醜用七縱之術志在平戎是則捨此一家將來九族果取其國何止於鄉類孔明之用師威懷蠻長同叔子之居鎮德服吳人皆呈輔相之材明於制度誰謂𥚹禆之任暗合前規節使屬當戎行未知軍要此宜論賞翻欲加刑由是觀之罪有所在獲俘衣之判乙攻城獲俘衣之或以為非曰使其如歸對德以綏邉仁惟克敵必將制勝是曰能賢乙出師以和攻昧以順戈矛雲合士卒星馳既左旋右抽期一月三捷人思懸布軍以獲俘以為安忍無親黷武無烈作其令主徴冶夫之謀費還其侵地善羊枯之取吳則寒者衣之人遽叛於南氏歸乃有所城亦復於季孫美績可書策勳宜賞彼或非者徒測海而多愧爾有詞焉固包荒而無怍單集作簞下同醪投河判得甲為將以單醪投河命衆飲之或非其矯節甲云推誠而已何必在醉對將主軍情酒存人欲推誠之義必在於均飽德之文不專於醉甲寄分外閫令出中權九醖投河義由獨斷一瓢飲水惠在同沾儻師人之多寒恩逾挾纊如戰士之載渴功倍望梅分少以表無頗和衆寧宜及亂豈資滿腹所貴歸心少卿絶甘見稱漢代子反獨醉實敗楚軍茍臧否之是集作必由何古今之有異非其矯節是不知言受敵人藥判得丙為將敵人遺之藥景受而飲之或責失人臣之節不伏對軍尚隱情臣宜守道况握中權之要當絶外交之嫌丙受命建牙遇敵飲藥直雖可舉忠則不知且事君在公訓旅貴信失人臣之節爾豈自明惑士卒之心吾將安仰况兵惟尚詐人不易知同饋醪而無他推誠猶可茍毒流而不察雖悔寧追無謀既昧三思不伏恐涉二過勿疑以飲徒徇陸抗之名未逹而嘗且墜宣尼之訓是違師律難償鄰言將不迎制書判得甲替乙為將甲欲到乙嚴兵守備不出迎發制書勘合符以法從事御史糾其無賔主之禮科罪不伏對師律貴貞兵符示信茍未會合敢忘戒嚴乙奉中權甲承後命推輪相待集作代言赴及瓜之期衷甲自防猶軫前茅之慮且信惟守器權在隱情符節既未合同軍衛如何徹警所宜逺慮安可徇私闕於將迎雖乖主禮完其守備是叶軍謀無責建牙恐非直指文苑英華卷五百四十一
