body:
  text: 文苑英華卷一百七十三宋李昉等編應制六嵗時二七夕五首九日十六首九日追賞一首雨八首喜晴一首雪三十二首七夕奉和七夕兩儀殿㑹宴應制李嶠靈匹三秋㑹仙期七夕過槎來人泛海橋渡鵲填河帝緌升銀閣天機罷玉梭誰言七襄詠重入五絃歌自李嶠詩至九日門釋廣宣詩共二十首皆見嵗時雜詠同前趙彥昭青女三秋節黃姑七月雜詠作日期星橋渡玉佩雲閣掩羅帷河氣通仙掖天文一睿詞今宵望靈雜詠作雲漢應得見蛾眉同前劉憲秋吹過雙闕星仙動二靈更深移月鏡河淺渡雲軿殿上徴方朔人間失武丁天文兹夜裏光照紫微庭同前李乂桂宫明月夜蘭殿起秋風雲漢彌年阻星筵此夕同倐來疑有處旋去已成空睿作鈞天響魂飛在夢中同前蘇頲靈媛乘秋發仙裝警夜催月光窺欲渡河色辨應來機石天文寫針樓御賞開竊觀栖鳥至疑向鵲橋廽九日九日侍宴樂游苑正陽堂劉苞上郡良家子幽并游俠兒立乘爭飲羽側類聚作倒騎競分類聚作紛馳明珂飾華毦金袍類聚作鞍映玉羈膳羞殫海陸和齊視秋宜雲飛雅琴類聚作樂奏風起洞簫吹曲終髙宴罷景落樹隂移微薄承嘉惠飲德良不訾取效續無紀感恩心自知九日侍宴一有樂游苑為西豐侯作八字何遜皇德無餘讓重規習一作襲帝勛垂衣化比屋眷顧一作眷領慎為君翾飛恱有道卉木荷平分宸一作神襟動時豫嵗序屬凉氛城霞朝一作早晃朗槐霧曉氛一作氤氲鸞輿和一作和馳八襲鳯駕起一作啓千羣羽觴歡一作歌湛露佾舞奏承雲禁林終宴晚華池物色曛疏樹翻髙葉寒流聚細文一作紋日斜迢遞雨風起嵳峩雲運偶參侯服恩洽厠朝聞於焉籍多幸嵗暮仰遊汾晴軒連瑞氣飛惹御香芬一作皆藝文類聚九日從駕王褒黃山獵地廣青門官路長律改三秋節氣應九重霜曙影初分地暗色始成光交斾長秋坂緹幕杏間堂藝文類聚有此四句射馬垂雙帶豐貂佩兩璜苑寒梨樹紫山秋菊葉黃華露霏霏冷輕飈颯颯傷終慙屬車對空假侍中郎侍宴九日庾肩吾轍跡光周頌巡逰盛夏功鈎陳萬騎轉閶闔九門一作關通秋暉一作蟬非逐行漏朔氣繞相風獻夀重陽節廽鑾上苑中疏山開輦道間樹出離宫玉醴吹岩一作承苑菊銀牀落井桐御梨寒更紫仙桃秋轉紅飲羽山西射浮雲冀北驄塵飛一作揚塵金埓滿葉破一作破葉桞條空騰猿疑矯箭驚鴈避虛弓雕才濫杞梓花綬接鵷鴻愧乏天庭藻徒參文雅雄此詩一百六十九卷重出今已削去注異同為一作奉和九日賀敱商飈凝素籥𤣥覽賁黃圖曉霜驚斷鴈晨吹結相烏寒花低岸菊凉葉下庭梧澤宫申舊典相圃叶前模玉砌分雕㦸金溝轉鏤衢帶星飛夏箭映月上軒弧慶展簮裾洽恩融雨露濡天文發丹篆寶思掩𤣥珠承歡徒聳抃負弛一作受施竊忘軀九日侍宴一有應制得長字沈佺期御氣幸金方慿髙薦羽觴魏文分一作須菊蘃一作藻漢武賜萸房秋變一作美銅池色晴添銀樹光雜詠作去鶴留笙吹歸鴻識舞行年年雜詠作臣歉重九慶日日一作月奉天長此詩一百六十九卷重出今已削去注異同為一作九日幸臨渭亭應制趙彥昭秋豫凝仙覽宸逰轉翠華呼鷹下鳥路戲馬出龍沙紫菊冝新雜詠作析夀丹茰辟舊邪須陪長久宴嵗嵗奉吹花奉和聖製重陽節宰臣及羣官上夀之作王維四海方無事三秋大有年百生逢此日萬夀願齊天芍藥和金鼎茱茰插玳筵玉堂開右個天樂動宫懸御桞踈秋景城鴉拂曙烟無窮菊花節長奉柏梁篇奉和聖製重陽旦日百寮曲江宴示懷崔元翰偶聖覩昌期受恩慙弱質幸逢良宴㑹况是清秋日逺岫對壺觴澄瀾映簮紱炮羔備豐膳集鳯調鳴律薄劣厠英豪歡娛忘衰疾平臯行鴈下曲渚雙鳬出沙岸菊開花霜枝果垂實天文見成象帝念資勤恤探道得𤣥珠齊心居特室豈如橫汾唱其事從雜詠作徒驕逸奉和聖製九日言懷賜中書門下及百寮應制權德輿令節在豐嵗皇情喜乂安絲竹調六律簮裾列千官烟霜暮景清水木秋光寒筵開曲池上望盡終南端天麗慶霄漢集作天文麗慶霄墨妙驚飛鸞願言黃花酒永奉今日歡奉和聖製重陽日中外同歡以詩言志因示羣臣前人玉醴宴嘉節拜恩歡有餘煌煌菊花秀馥馥茰芳舒白露秋稼熟清風天籟虛和聲度簫韶瑞氣深儲胥百辟皆醉止萬方今晏如宸衷在化成藻思煥瓊琚微臣徒竊抃豈足歌唐虞奉和聖製重陽日即事六韻前人玉燭降寒露我皇歌大風重陽德澤振雜詠作展萬國歡娛同綺陌擁行騎香塵凝曉空神都自藹藹佳氣助葱葱律呂金石集作隂陽暢景光天地通徒然被鴻霈無以報𤣥功奉和聖製豐年多慶九日示懷作前人寒露應秋節集作杪清光澄曙空澤均行葦厚年慶華黍豐聲名暢八表宴喜陶九功文麗日月合樂和天地同聖言在推誠臣職惟集作事非匪躬瑣細何以報翾飛淳化中同前武元衡令節寰宇泰神都佳氣濃賡歌禹功盛擊壤堯年豐九奏碧霄裏千官皇澤中南山淡凝黛曲水清涵空金玉美王度歡康謡國風睿文垂日月永與天無窮奉和聖製重陽日即事六韻前人嘉節在陽數至歡朝野同恩隨千鍾洽慶屬五稼豐時菊洗露華秋池涵霄空金絲響仙樂劍舄羅宗公天道光下濟睿詞敷大中多慙擊壤曲何以逹堯聰九日菊花詠應制釋廣宣可訝東籬菊能知節候芳細枝青玉潤繁蘂碎金黃爽氣浮朝露濃姿帶夜霜泛杯傳夀酒應共樂時康奉和聖製九月十八日賜百寮追賞因書所懷權德輿錫宴朝野洽追歡堯舜情秋堂絲管動水榭烟霞生黃花媚新霽碧樹含餘清同和六律應交泰萬宇平睿藻下中天湛恩闡文明小臣諒何幸集作以亦此彯華英雨庭雨應詔沈約見初學記出空寧可圖入庭倍難賦非烟復非雲如絲復如霧霡霂裁欲垂霏微不能注雖無千金質聊為一辰趣發營逢雨應詔虞世南豫遊欣勝地皇澤乃先初學記作光天油雲隂御道膏雨潤公田隴麥霑如翠山花濕更燃稼穡良所重方復恱豐年奉和春日途中喜雨魏知古見初學記皇游向洛城時雨應天行麗日登巖送隂雲出野迎濯枝林杏發潤葉渚蒲生絲入綸言喜花依錦字明微臣忝東觀載筆佇西成詠雨唐太宗罩雲飄逺岫噴雨泛長河低飛昏嶺腹斜足灑巖阿泫叢珠締葉起溜鏡圓一作圖波濛栁添絲密含吹織空羅奉和詠雨應詔許敬宗舞商初赴節湘燕逺迎秋飄絲交殿網亂滴起池漚激霤分龍闕斜飛灑鳯樓崇朝方浹㝢宸盼俯凝旒奉和春日逰苑喜雨應詔李嶠園樓春正歸入苑弄芳菲密雨迎仙步低雲拂御衣危花沾易落度鳥濕難飛膏澤登千庾歡情遍九圍同前李乂見集本仙蹕九成臺香筵萬夀杯一旬初降雨二月早聞雷葉向朝霽密花含宿潤開幸承天澤豫無使日光催奉和御製雨後出城觀覽敕朝臣已下司空曙上上開鶉野師師出鳯城因知聖主念得遂老農情隴麥垂秋合郊塵得雨清集作晴時新薦𤣥祖嵗足富蒼生却馬川原靜聞雞水土平薰絃歌舜德和鼎致堯名覽物欣多稼垂衣御大明史官何所録稱瑞滿天京晴喜晴應詔敕自疏韻庾信御辨誠膺録惟皇稱有建雷澤昔經漁負夏時從販柏梁驂駟馬髙陵馳六傳有序屬賓連無私表平憲河堤崩故栁秋水髙新堰心齊愍昏墊樂徹憐胥怨法輪開勝辨禪河秉髙論王城水鬬息洛浦河圖獻伏泉還習坎歸風已回巽桐枝長舊圍蒲節抽新寸山藪欣藏疾幽棲得無悶有慶兆民同論年天子萬雪詠春近餘雪應詔前人送寒開小苑迎春入上林絲條變栁色香氣動蘭心待花將對酒留客擬彈琴陪逰愧並作空見奉恩深喜雪唐太宗碧昏朝合霧丹卷暝韜霞結葉繁雲色凝瓊遍雪華光樓皎若粉映幕集疑沙泛栁飛飛絮粧梅片片花照璧臺圓月飄珠箔穿露瑤潔短長階玉叢髙下樹映桐圭纍白縈峯蓮抱素斷續氣將沉徘徊嵗云暮懷珍愧隱德表瑞佇豐年蕊間飛禁苑鶴處舞伊川倘詠幽蘭曲同歡黃竹篇奉和喜雪應制許敬宗嵰州表竒貺閟竹應遐巡何如寓京洛流霰下天津忽若瓊林曙俄同李徑春姑峯映仙質郢路雜歌塵伏檻觀花瑞稱觴慶冬積飄河共㵼銀委樹還重璧連山分掩翠綿霄逺韜碧千里遍浮空五軔咸淪跡機前暉列素池上侔凌波騰華承玉宇凝照混金娥是日松筠性欣奏柏梁歌詠雪唐太宗潔野凝晨曜裝墀帶夕暉集條分樹玉拂浪影泉璣色灑粧臺粉花飄綺席衣入扇縈離匣㸃素皎殘機奉和詠雪應制寒雲垂廣幕飄霰下天津無轍方祗至有感瑞氣新色映姑山質舞對洛川神忽奉瑶池韻慙和郢中春奉和人日清暉閣宴羣臣遇雪應制李嶠見雜詠三陽遍勝節七日最靈辰行慶傳芳蟻一作信升髙綴綵人階前蓂候月樓上雪驚春今日銜天造還疑上漢津同前宗楚客見雜詠窈窕神仙閣參差雲漢間九重中禁啓七日早春寒太液天為水蓬萊雪作山今朝上林樹無處不堪攀同前劉憲輿輦乘人日登臨上鳯京風尋歌曲揚雪向舞行縈千官隨興合百福與春雜詠作時并承恩常若此微賤幸輕生同前李乂見雜詠上月登樓賞中天御輦飛後庭聮舞唱前席仰恩輝睿作風雲啓農祥雨雪霏幸陪人勝節長願奉垂衣同前趙彥昭出震乘東陸慿髙御北辰祥雲應早嵗瑞雪候初旬宮樹千花發階蓂七葉新幸逢今日宴長奉萬年春同前蘇頲樓觀空烟裏芳年瑞雪過苑花齊玉樹池水作銀河七日祥圖起千春御賞多輕飛傳綵勝天上奉薰歌遊禁苑幸臨渭亭遇雪應制李嶠同雲接野烟飛雪暗長天拂樹添梅色過樓助粉妍光含班女扇韻入楚王絃六出迎仙藻千箱答瑞集作舜年同前李適長樂喜春歸披香瑞雪飛花從銀閣度絮繞玉窗飛寫曜銜天藻呈祥拂御衣上林紛可望無處不光輝同前蘇頲平明敞帝居霰雪下凌虛寫月含珠綴從風薄綺疏年驚花絮早春應管絃初已屬雲天卦欣承需澤餘同前李乂青陽御紫微白雲下彤闈浹壤流天霈綿區灑帝輝水如銀度燭雲似玉披衣為得因風起還來就日飛同前徐彥伯玉律藏氷候彤階飛雪時日寒消不盡風定舞還遲瓊樹留宸矚琁花入睿詞懸知穆天子黃竹謾言詩奉和遊苑遇雪應制李嶠散漫祥雲逐聖回飄飄瑞雪逺天來不能落後爭飛絮故欲迎前綻早梅同前劉憲龍驂曉入望春宮正逢春雪舞東風花光併載天文上寒氣行消御酒中同前宋之問紫禁仙輿詰旦來青旗遙倚望春臺不知庭霰今朝落疑是林花昨夜開奉和洛陽玩雪應制沈佺期周王甲子旦漢后德陽宫灑瑞天庭裏驚春御苑中氛氲生浩氣颯沓舞回風宸藻光盈尺賡歌樂嵗豐奉和春日玩雪應制宋之問北闕彤雲掩曙霞東風吹雪舞仙家瓊章定少千人和銀樹長芳六出花喜雪應制宗楚客飄颻瑞雪下山川散漫輕飛集九埏似絮還飛垂栁陌如花更繞落梅前影隨明月團紈扇聲將流水雜鳴絃共荷神功萬庾積終期聖夀百千年野次喜雪唐𤣥宗附見張說集拂曙闢行宮寒髙野望通繁雲低逺岫飛雪舞長空賦象恆依物縈回屢逐風為知勤恤意先此示年豐奉和同前應制張說寒更玉漏催曉色幄集作御非前開泱漭雲隂積氛氲風雪廽山知集作如銀作甕宫見璧為集作成臺欲驗豐年象飄颻仙藻來溫湯對雪唐𤣥宗附見張說集北風吹同雲同雲飛白雪白雪乍回散北風集作同雲何慘烈未見溫泉氷那集作寧知火井滅表瑞良在兹庶希可怡悅奉和溫湯對雪應制張說瑞雪帶寒風寒風入隂琯隂琯方凝閉寒風更凄斷宫似瑶林匝集作布庭如月華滿正賡挾纊詞非近湯泉暖校獵義成喜逢大雪率題九韻以示羣臣唐𤣥宗弧矢威天下旌旗搖近縣一面施鳥羅三驅教人戰暮雲成積雪曉色開行殿皓然原隰同不覺林野變北風勇士馬東日華組練觸地銀麞出連山縞鹿見月落髙矰星狼下飛箭既欣盈尺兆復憶磻溪便嵗豐將遇賢俱荷皇天眷奉和同前應制張說見集本文教資武功郊畋閲邦政不知仁育久徒看禽獸盛夜霰氛埃滅朝日山川淨綽仗飛走繁抨弦筋角徑帝射參神道龍馳合人性五豝連一發百中皆先命勇爵均萬夫雄圖羅七聖星為吉符老雪作豐年慶喜聽行獵詩威神入軍令喜雪唐𤣥宗附見張說集日觀卜先征時巡順物情風行未備禮雲密遽飄霙委樹寒花發縈空落絮輕朝如玉已㑹庭似月猶明既覩膚先合還欣尺有盈登封何以報因此謝功成奉和同前應制張說聖德與天同封巒欲報功詔書期集作斯日下靈感應時通觸石雲呈瑞含花雪告豐積如沙照月散似麵從風舞集仙臺上歌流帝樂中瑤池百神喜灑路待行宫同前徐安貞西宮齊祭近登臨雨雪紛紛天晝隂祗為輕寒無瑞色頓教正月滿春林蓬萊北上旌門暗花萼南歸馬跡深自有三農歌帝力還將萬庾答堯心雜言奉和聖製瑞雪篇張九齡萬年春三朝日上御明臺旅庭實初瑞雪兮霏微俄同雲兮蒙密此時騷切隂風生先過金殿有餘清信宿嬋姢飛雪度能使玉人俱掩嫮皓皓樓前月初白紛紛陌上塵皆素昨訝驕陽積數旬始知和氣待迎新匪惟在人利曽是扶天意天意豈云遙雪下不崇朝皇情玩無斁委雪方盈尺草樹紛早榮京坻宛先積君恩誠謂何嵗稔復人和預數斯箱慶應如此雪多朝冕旒兮載恱想臺集作臺笠兮豐一作農節倚瑤琴兮或歌一作侍瑤瑟兮成歌續薰風兮瑞雪福寖昌應尤盛瑞雪年年常感聖願以柏梁作常為栁花詠文苑英華卷一百七十三
