body:
  text: 文苑英華卷六百四宋李昉等編請致仕二謝表附告老乞致仕表一首請致仕侍親表四首請致仕表四首謝恩勑許致仕表一首代崔公授袐書監致仕謝表一首為蕭太師謝致仕表一首謝分司表一首告老乞致仕表宋璟開元二十年臣璟言臣聞力不足者老則更衰心無主者疾而尤廢臣昔聞其語今驗諸身况且兼之何能為也臣拔自幽介欽屬聖明才不逮人藝非經國徒以久從驅策歷參試用命偶時來榮因歲積遂得再升台座三入冡司進階開府增邑大郡所更中外已紊彛章逮居端揆尤竊一作叨右職何者丞相官司之長任重昔時愚一作微臣衰朽之餘用慙他日位則逾盛人則浸微盡知其然何居而可頃所以二字一作者僶俯從政蒼黃不言實懷覆載之德冀竭涓塵之效今積羸成憊沉痾一作痼莫瘳耳目更昏手足多廢顧將隕越寧遂宿心安可茍徇大名仍尸重祿且留章綬不一作未上闕庭儀刑此乖禮法何設伏惟陛下探一作選能以授為官而擇察臣之有詞矜臣之不逮使得罷歸私室養疾衡門上弭官謗下知死所則歸全之望獲在愚臣養老之恩成於聖代日暮途逺天高聽卑瞻望軒墀大深感戀臣比一作此伏枕不堪詣闕無任誠懇之至謹遣男朝請大夫行起居郎渾於朝堂奉表陳乞以聞請致仕侍親表敬讓臣某言臣聞事君事親率由之道斯一為臣為子資敬之途無二臣實不才纍升榮級徒以家承勳舊地分茅土寵命優渥實此之由非臣妄庸所堪奬拔臣未登壯歲乾蔭先傾逮于強仕母氏為育欣欣而就祿者希祿養之及親也臣雖愚鄙妄佩朝簮臣母王夙侍巾櫛久經憂苦一纒風疾二十餘年今秋已來所苦增劇板輿周覽近在於家園綵服承歡久違於膝下臣謬居藩佐纍變炎涼瞻望庭闈五情紆結雖王臣蹇蹇匪躬之故而孝道蒸蒸因心罔極伏惟陛下聖明統業孝理天下文軌同於八荒德教加於百姓况臣沐浴皇化差池班列塵忝滋久臣復何言臣兄弟之中臣又居長五起三省是臣微志視膳嘗藥非臣而誰臣之愚誠天地神袛所共照鑒伏乞天恩少留哀察臣請解所職侍養京都冀烏鳥之情俯遂終食犬馬之報希酬萬一臣雖死之日猶生之年無任倥偬一作惶悃迫切之至請致仕侍親表拓跋興宗天寶中臣某言臣聞懷祿者恥於冒進事親者貴在及時茍貪非分之榮何報所生之德臣興宗中謝伏奉某月日勑許臣入京覲省者臣母譙郡太夫人曹氏今八十有四一遭風疾倍加羸惙臣之戰灼罔知攸從然曹氏有臣更無他子臣才齠齓父已背亡守志偏棲鍾情善訓恩深徙宅慈過折葼孤危相保臣得成立蕃夷賤末久荷國恩磨鈍䇿疲已歷三紀腰金拖紫四升八命每慙祿厚慮臣身災况老親在堂迫於衰疾而更晨昏有闕尸素無厭碩鼠貽刺林烏不若尚參朝列心豈遑安特乞停官許從歸侍則藜藿之養子道獲申桑榆之暉母心是慰當今大聖御極羣賢共理豈資微臣而在冗職雙鳬隻鴈寧覺少多九牛一毛未為增損倘明神見祐母體漸平在臣犬馬敢不驅䇿伏望採詩人之錫類鑒令伯之陳情曲降鴻私俯矜微懇垂恩遂志死將萬足不勝懇欵之至第二表前人臣某言臣前表自陳上訴母親乞停所職以就私養聖恩未許懇願莫從母子二人肝腦塗地臣某中謝臣初孩則孤未冠而仕不識父兄之教但承慈母之育向母無臣則烏鳥誰哺向臣忘母則禽獸不若更無性命以至成長今臣老母八十五載矣加之疾疹日甚一日有增無減一作瘳湯藥杜口粥食不入頃乃祈恩請命忍死待臣臣不承聖恩不復見母母不蒙聖造亦不重見臣自從去年漸能開釋若臣又辭母母更别臣臣母必即倚門氣絶上馬心斷母必失臣臣亦失母忠孝雙缺公私並喪假臣強顔茍冒榮寵猶望孝理抑就名教以蕃夷之賤品忝冠冕之清流身帶三印爵封五等入踐命卿出為副將正是臣報國立功榮宗輝戚之時愛惜毛羽保持名位寧可進寸其容退尺豈願驅一作損華轂以傳板輿樂間居而忘厚秩士君子猶貪其富貴臣種類豈知其矯飾母不能割慈忍愛子不可背義違親二者之心賢愚共悉方寸既亂焉可以理軍否臧皆凶焉足以謀敵無自招於遄死則未戰以取亡何以為萬人之命赴國家之意陛下於愚臣過聽謂邉將得人則有隴右專知教練兵馬使右驍衛將軍藺廷輝材略冠軍智勇無對今節度王忠嗣知其名已令攝使替臣如流輩諸將皆是可惜臣匹夫之勇而不見萬人之敵何抑烏鳥之衆而不用熊羆之帥一作師陛下必以臣幸無大過不令失職即望全其官守罷以軍麾減其俸祿以延老母略許其宿衛兼遂微臣之定省朝則覲君退還侍母公私兩遂忠孝並存母子如初生死萬足逺近夷落咸知聲教無任懇切危急之至第三表前人臣某言臣聞事君愛親出忠入孝孝茍不足忠能獨全自古及今未之有也臣夙遭凶憫早喪父兄母祗育臣臣唯侍母更相為命逮至于今誠願報國安親兩遂忠孝况臣少從邊役侍養多違母常憶臣積憂成疾往者一辭天闕六變星霜徒叨守郡之榮終切倚門之望加以老母年將遄邁景晏桑榆衰疾交侵藥餌無主頃乃祈哀上請忍死待臣臣幸獲歸寧老母稍安寢息再造之施空荷於乾坤廣大之恩無階於答效臣又聞子急告父臣急告君今母若無臣臣定失母所以隳裂肝膽塵犯威嚴乞停臣尸素之祿假老母殘餘之命誠為至願非敢飾情自聖鑒未回懇誠猶阻而臣又不幸愚子供奉官右威衛郎將守義近亡臣今惸然形影相弔生人之極無甚於臣老母既見孫亡預愁臣去舊患未損泣盡繼血伏惟聖主孝理天下特降綸言户有老親令蠲賦役鄉有孝子必表門閭洎乎荒外百蠻咸被教化臣雖戎狄賤品忝沐薰風烏鳥之心實愧乳哺若使貪榮徇祿背義忘親固天地所不容人倫所同棄更何面目敢列聖朝特望上垂天光俯照愚懇矜臣養親之日短效命之日長允其停官許令侍疾四夷慕義陛下之德化無窮豈惟微臣獨荷恩施無任迫切屏營之至請致仕表憲宗高郢臣郢言臣聞量力而仕臣下之審分知止不殆道經之明訓所以七十致仕禮式其期臣犬馬之年去春已滿頃者方欲陳乞屬蒙新授今任欣時忘老祗命戀恩復屬王師出征聖軫方切輒求安退又所不敢伏惟睿聖文武皇帝陛下德廣天地道孚干羽承宗順命服罪效誠制誥班師萬方軌道昆蟲草木各遂其性臣早當告謝無忘夙心不應遲回更俟終日况復夏官任重賢路久妨時制已過衰疾兼甚實懼夜行之罪上纍明時之寵伏乞許遵恆典特賜餘年止物議之貪榮洽宸慈於休老微臣之願庶蒙矜允臣竊惟塵曠謬迹三朝叨承睿奬中外六任竟無毫髮上答恩私齒盡請骸終慚且惕徘徊積戀戰汗陳愚天闕一辭朝車永稅方從野老共樂堯年臣郢不勝感恩兢惶之至第二表前人臣郢言臣上陳丹懇非敢飾辭前月二十三日中使梁士平奉宣旨賜臣還詔聖慈曲念未忍棄捐綸音下臨特加褒奬心魂震悚拜舞靦容臣某中謝臣血氣既衰戒之在得鍾漏云盡行者當止臣今所乞已過常期若志恱前言事違往行雖稱守命誰曰非貪况臣升朝以來歷忝清貫歲時曠久叨疑作功用蔑聞前恩無報後效焉取使蚊負山欲強何由臣伏以戀主之心古今齊致暫從外補猶所不樂永違闕庭豈遑勇退竊以菌蟪生促無幾光隂駑駘齒窮匪任衡軛加以疾疹時發筋力日耗與曠官而叨寵寧量已以乞恩庶蒙聖鑒昭回愚悃特許臣得從時休息以禮進退免於黃耉猶負素餐全度庸微生成莫大天無私覆冀收惠渥歲不與臣敢忘披露再黷宸聽辭隨涕零臣郢不勝感戀兢戰之至第三表前人臣郢言再表陳情一心仰施瞽言無感宸眷不回今月四日中使魏寶羲至奉宣進止賜臣還詔倍加榮奬未允愚衷驚寵循涯伏躬隕越臣某中謝臣聞勞生佚老天理自然蠕動翾飛日入皆息時不期而必至物雖強而無由禮經所以制限疲苶所以獲退自非貢禹之守終據古趙嘉之正身匪懈韓暨之志一作至非節高潔山濤之道德模表人皆顧望禮以至公縱過常期詎為貪冒其有當仁不讓急病忘身豈止君命猶宜自舉故魏伐秦師唐睢請闕車而闕説漢謀邉將充國對無踰於老臣所謂臣事君以忠君使臣以禮忠無不納禮亦從宜如此則選舊任能足供國用優年加惠得遂時歸古之進退鮮不由此臣以不才叨辱高位幸而免戾年及乞骸茍蒙得請之恩實受終身之賜若叨榮不怍當退而留則上纍皇明下重臣罪况臣自少力薄不知等夷年老氣衰見孰疑作就羸憊形因榮弊疾與齒并營衛每乖膝脛多痺既憂廢職又懼妨賢內外交攻生涯轉迫窮暮之懇不遑起居芻蕘之辭已罄肝膽一物有關於亭毒容光時假於照臨顧西山而骸目瞻北闕以馳心臣郢不勝戰惕感戀之至謝致仕表孔戣臣某言臣聞七十致政禮經格言此蓋先王立教示人有終也茍或冒榮貪祿不知其退亦縉紳之醜也今臣年已過矣耄亦及之顧盼班行每懷慙靦幸屬聖明御宇多士盈朝百度既貞萬靈遂性躍魚戲在藻之樂野夫盡擊壤之歡微臣叨逄此時得以陳露而猶進不知止懼損明風况齒髮已衰筋力不逮雖力官次恐貽敗闕伏以南宫左轄華省紀綱政理所關選用為重豈臣衰朽久膺此任伏乞聖鑒察臣誠懇賜臣骸骨歸老丘園所冀聖朝無浮食之人微臣免強飯之責將違聖代戀闕誠深無任悃欵之至謝恩勑許致仕表睿宗李嶠臣某言伏奉恩勑聽臣致仕祗服慈造不勝銘戴臣本無器識素乏材能幸屬時來屢蒙朝奬虛受榮遇迄無成績光隂漸迫衰疾常留二竪頻侵十旬每曠懼忝腹心之寄遂陳骸骨之請天情曲奬聖澤旁流殷鼎調梅雖輟參議漢藩剖竹仍叨卧理百城肇案六疾彌加竟虧露冕之功俄錫懸車之寵方循初服退守故園忘機求漢水之翁擊壤就堯衢之老歌太平而永日飲聖澤而窮年林壑長辭俟卉木而俱稿雲霄坐隔仰闕庭而增慕無任犬馬悽戀之至謹因留守起居使奉表陳謝以聞謹言代崔公授袐書監致仕謝表常衮臣某言伏奉恩制授臣銀青光祿大夫袐書監仍聽致仕臣聞不修其德老當見遺無益於時祿不虛詔伏惟陛下以大聖撫一作臨運以至公宰物凡在爵秩必俟賢能况兹寵異豈及駑朽臣官歷五朝年踰八十勤勞莫效齒髮久衰舊好同遊索然已盡經行郡國不見一人歡娛且少形魄如寄古之養老義在師臣必公卿大夫耆年多疾乃有詔書褒勞之寵靈壽安車之賜不然則高尚之士亦以道存非閔仲之潔清薑肱之孝行固不可猥承嘉命特受殊禮今陛下以臣之甥任在樞近階緣厚遇曲被鴻私官品過崇越於班列疵賤忽貴枯瘁增華親戚相榮以感以涕猶復恤其羸憊貸以休間成一作從周禮四方之適存漢儀八月之問惠養益厚等威益尊冒恩不訾仰戴無力殘生有幾上報一作答何階無任感戴一作荷之至一作皆唐類表為蕭少師謝致仕表德宗髙郢臣昕言伏奉今月二十三日制除臣太子少師致仕仍給半祿料其晏會及朝朔望並依常式者桑榆暮齒忽遂休間犬馬微誠仍參朝會臣某中謝臣本書生資於巾褐每歷清列尸曠徒深早迫流年止足有素特以四朝受任千載逢時難勝戀闕之心久滯乞骸之疏陛下俯憂羸老曲被庸愚三印之辰更加新命懸車之後且許時朝榮賜俸祿澤深惠養昊天罔極思上報而無階餘日幾何奉湛恩而不朽無任感戴欣忭之至謝分司表劉禹錫臣某言伏奉今月十九日制書授臣太子賔客分司東都者寵命自天戰越無地臣某中謝臣發迹書生以文為業出身入仕四十餘年頃自集賢學士出守吳郡面辭之日親承德音念百姓水潦之餘示微臣政理之法臣祗承集作膺聖旨夙夜竭誠閭里獲安流庸盡復猥蒙朝奬錫以金章及遷同州又遇歉旱悉心綏撫幸免流離今荷天慈憫臣耆舊列名賔護之職分局河洛之都老馬霑束帛之恩枯株蒙雨露之澤獲居榮秩以畢餘年顧此微軀實為厚幸伏以臣始為御史逮事德宗今忝宫僚幸逢聖日舉四海之內賢能則多求六朝之臣零落將盡雖迫桑榆之景猶傾葵藿之心無任感恩惕抃之至文苑英華卷六百四
