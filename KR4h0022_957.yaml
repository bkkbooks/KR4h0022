body:
  text: 文苑英華卷九百五十八宋李昉等編職官二十王倉曹墓志一首李巡官戡墓志一首杜支使顗墓志一首杜司馬詮墓志一首裴巡官希顔墓志一首揚州倉曹參軍王府君墓志銘白居易公諱某字士寬其先出自周靈王太子晉凡二十一世集作代而生翦翦為秦將軍又三世而生珣珣居太原故今為太原人又一十九世集作代而生瓊瓊為後魏僕射諡孝簡公又三世集作二代而生曽祖諱滿官為河南府王屋縣令王父諱大璡為嘉州司馬父諱昻集作升為京兆府咸陽令河南府伊闕令有文行學術應制舉對沈謀祕略䇿登科詩入正聲集公則集作即伊闕第三子好學善屬文天寶中應眀經舉及第遷授婺州義烏縣尉以清幹稱刺史韋之晉知之署本州防禦判官無何租庸轉運使元載又知之假本州司倉専掌運務嵗終課績居多又集作遂奏聞真受永泰中敕遷越府户曹屬邑有不理者公假領之所至必理大厯中本道觀察使薛兼訓以公清白尤甚表奏之有詔權知餘姚縣令時海寇初殄邑焚田荒及營邑居四字集作公乃營邑室創器用復流庸闢災畬凡江南列邑之政公冠其首焉集無此字其制邑闢田增户之績則會稽之牒地官之籍載焉建中初授揚州倉曹參軍至四年七月二十六日疾殁于揚州江都縣私第集作殁于江都縣之私第春秋六十有二夫人清河崔氏鳯閣舍人融之姪孫鄭州司户集作法昻之女婦順母儀集作訓為中外師集作中外師之貞元二十年十一月十三日疾終于三原縣之官舍享年六十有三集作二有子曰播曰炎曰起咸以進士舉及第播應制舉對直言極諌䇿授集賢殿校書郎纍遷監察殿中侍御史三原令炎既第未仕起應博學宏詞科選授集賢殿校書郎昆季三人不十年而五登甲科時論者榮之一女適范陽盧仲通播等護號集作號護靈輿以永貞元年十月二十五日遷祔于京兆府富平縣淳化鄉之某原從吉兆也嗚呼夫懋言行蓄事業俾道積于躬者在人也踐大官贊元化俾功加於民者由命也有其人無其命雖聖與賢無可奈何惟公受天地之和積為行發為文宣為用故在家以孝友聞在官集作行已以清廉聞從事以幹蠱聞如金玉在佩動而有聲其大者又常以經德秉哲致君濟人為已任有識者心集作深知之宜乎作王者心膂耳目之官以經緯其邦家而才為時生道為命屈名雖聞於天子位不過於陪臣鬱然殞殁不展其用者集作鬱鬱然沒而不展其用者命矣夫古人云有眀德大智者若不當世其後必有餘慶今其將在後嗣乎不然者何乃德行政事文學具美叢於公之三子乎天其或者殆將肥王氏之家大王氏之門以甚眀報施之道者也某不佞頃對䇿於王庭也與播集作炎同升諸科焉祗命於憲府也與播連集作取執其簡焉及其集無此字為考文之官也又起在選中焉既集無此字辱與公之二三子遊而聆公之遺風甚熟故作斯文無隱情無愧辭焉銘曰緱一作淮非山道光淮水靈長繩繩子孫代有賢良將軍輔秦武功抑揚孝簡翊魏文德暗彰降及於公實生于唐大智全才應用無方作掾於郡三語有章承乏於邑一同在康展如之人何用不臧直登大位俾紹前芳嗚呼百鍊之鋼集作金不鑄干將十圍之材不作棟梁公亦如之與世不當道不虛行後嗣其昌平盧軍節度巡官李府君墓志銘杜牧牧大和元年舉進士集作及字第貢於集作鄉貢上都有司試於東都在二都羣進士中往往有言前十五年有進士李飛自江西來貌古文髙始就禮部試賦吏大呼其姓名熟視符驗然後入飛曰如是選賢耶即求貢如是自以為賢耶因袖手不出眀日徑返江東牧曰誠有是人吾輩不可得與為伍矣後二年事故吏部沈公於鍾陵宣城為幕吏兩府凡五年間同舍生蘭陵蕭置京兆韓乂博陵崔夀每品量人之等第必曰有道有學有文如李處士戡者寡矣是卑進士不舉嘗名飛者牧益恨未面其人宜喜其人之在位也大和九年為監察御史分司東都今諫議大夫李仲敏左拾遺常楚老前監察御史盧簡求咸言於牧曰御史法當檢謹子少年設有與遊宜得長厚有學識者因訪求得失資以為官洛下莫若李處士戡牧謝曰素所恨未見者即日造其廬遂旦夕往來開成元年春二月平盧軍節度使王公彥威聞君名挈卑詞於簡副以幣焉請為節度巡官眀年春平盧府改君西歸病於路卒於洛陽友人王廣思恭里第享年若干君諱戡字定臣七代祖渤海王奉慈祖杠衢州盈川令父登婺州浦陽尉浦陽晚無子夫人吳興沈氏夢一人狀甚偉捧一嬰兒曰豫為孔某以是與爾及其集作期而生君因名曰天授君幼孤旁無羣從可以附託年十餘嵗即好學寒雪拾薪自炙夜無燃膏默念所記年三十盡明六經書解決微隱蘇融雪釋鄭元至于孔穎達輩凡所為疏注皆能短長其得失一舉進士恥不肯試歸晉陵陽羡里得山水居之始開百家書緣飾事業每有小功喪訖制不食肉飲酒語言行止皆有法度陽羡民有鬬諍不決不之官人必皆以詣君所著文數百篇外于仁義一不關筆常曰詩者可以歌可以流於竹鼓於絲婦人小兒皆欲諷誦國俗薄厚扇之於詩如風之疾速常集作嘗痛自元和以來有元白詩者纎豔不逞非莊士雅人多為其所破壞流于民間疏于屏壁子父女母交口教授淫言媟語冬寒夏熱入人肌骨不可除去吾無位不得用法以治之欲使後代之有發憤者因集國朝已來類於古詩得若干首編為三卷目為唐詩為序以道集作導其志居江南秀人張智實蕭寬韓人崔夀宋邧楊發王廣皆趨君交之後皆得進士第有聲名集作名聲官職君尚為布衣然於君不敢稍怠君在洛中困甚河南節度使蕭洪移鎮鄜州諫議大夫蕭俶以君言於洪洪素敬諌議即欲謁君以請君曰人間譁言洪盜籍外戚一窺其面能易吾死尚且不忍死况為其黨乎居數月洪果敗娶𢎞農楊氏女早卒子二人長曰審之次曰鼎郎始五嵗以某月日權葬于常州宜興縣某鄉里某於君為晚交得君最厚因為之銘曰命如煙雲道比集作宅宫道煙雲飄揚莫知往來為道不至無以偃息有道有命偶然相值命不在我不肖亦貴豈可指此與彼為市嗚呼定臣曰德孔循集作修曰學必聖飾集作飾我競競不一集作一不言命可傳其心以教後生嗚呼哀哉淮南支使試大理評事兼監察御史杜君墓志銘前人君諱顗字勝之曽祖涼州節度使襄陽公贈左僕射希望大父司徒平章事太保致仕岐國公贈太師佑皇考駕部員外郎贈禮部尚書從郁君幼孤多疾目視昏近先夫人不令就學年十七讀尚書十三篇禮記七篇漢書至集作止賈誼傳不復執卷年二十四眀年當舉進士始握筆草集作葺闕下獻書與裴丞相度指言時事成合集作各數千字不半嵗遍傳天下進士崔岐有文學峭澀不許可人詣門贈君詩曰賈馬死來生杜顗中間寥落一千年二十五舉進士二十六一舉登上第時賈相國餗為禮部之集作二字年朝士以進士干賈公不獲有傑強毁朝者賈公曰我只以杜顗敵數百輩足矣始命試祕書正字匭使判官李丞相德裕出為鎮海軍節度使辟君試協律郎為巡官後貶袁州語親善曰我聞杜巡官言晚十年故有此行太和九年夏君客揚州六月授咸陽尉直史館君曰訓注必亂可徐行俟之至汴二凶敗及洛以疾辭東下居揚之集作州龍興寺承相牛集作竒章公僧孺請君入幕府君謝曰李公在困未願副知已開成二年春目益昏冬遂喪眀李為淮南節度使復請為試評事兼監察御史支使兄牧自馮翊迎醫石生曰是伏集作狀腦脂下融名曰內障如蠟塞管蠟去管明俟脂凝可以抉去無不愈者後二年石曰可治治不效自馮翊别迎醫醫曰嗟乎障有赤脈如木根橫可牢不可斷是法名曰日腳內障生日腳者法不可治君因居淮南築室治生不復言治眼事聞於天下無不嗟嘆君安泰自如令人旁讀十三代史書一聞不遺客來與之議論證引聽者忘去年四十五大中五年二月二十五日卒男集作一男曰麟師年十嵗女曰署集作暑兒始五嵗六年二月八日歸葬先塋實萬年縣洪原鄉少陵西南二里牧今年五十假使更生十年為六十人不夭矣與君别止三千六百日耳况早衰多病敢期六十人乎忍不抑哀以銘吾弟銘曰古之達人以生為寄為夢以死為歸為覺集作竟不同不知生偶然乎其有裁受乎偶然即泯為大空與不生同其有裁授集作受乎嗚呼勝之今既歸而覺矣其自知矣何為其然乎嗚呼哀哉復州司馬杜君墓志銘公諱詮字謹夫河西隴右節度使襄陽公贈司空之曽孫司徒岐國公贈太師之孫司農少卿贈給事中之子公以岐公蔭調授揚州參軍同州馮翊縣丞衛尉寺主簿鄂州江夏縣令復州司馬年六十某年月日終於漢上别業岐公外殿內輔凡四十年貴富繁大兒孫二十餘人集作孫兒餘二十人晨昏起居同堂環侍公為之親不以進門內家事條治裁酌至於筐篋細碎悉歸於公稱謹而治自罷江夏令卜居於漢北泗水上烈日笠首自督耕夫而一年食足二年衣食兩餘三年而室居集作屋完新六畜肥繁器用皆具凡十五年起於墾荒不假人集作之字一毫之助至成富家翁常曰忍恥入仕不緣妻子衣食者舉世幾人彼忍恥我勞力等衣食耳顧我何如後授復州司馬半嵗棄去終不復仕以某月某日歸葬于長安城南少陵原司馬村先塋牧為從父涕泣而銘曰集作泣涕而書銘曰公侯之家所業唯官薄官集作官業農墾荒室完入仕多恥以農力勞等衣食耳勞力者賢歸全故丘慶期子孫集作孫子雍府巡官裴君墓志銘前人君諱希顔字某裴氏於百氏中獨標其族曰眷三分之為東西中君東眷裴在國朝名位最大曰冕艱難中定册立肅宗於靈武而相之繼相代宗僅十五年國史有傳冕於君為堂伯祖父王考某終朗州刺史娶宣州寧國令滎陽鄭某女生四男君為首生朗州為盩厔河西令道朗二州刺史公廉剛簡強於愛人凡關百姓一毫事與京兆尹節度使爭論大聲於庭府間前如無人然未嘗以杖責治家家人有過失則諭之諭不變者出之為良人終不忍牽鬻於市將終鄭夫人泣請遺令曰吾之廄騾為盩厔時役之今踰十年聽其老死慎不可賣言訖而絶君生浸染仁父之化溫良柔友窮居鄂集作鄠縣飢寒集有餘字二十年未嘗出一言以愠不足司農卿裴及為雍府經略使辟君為從事得南方疾歸大中二年某月日卒於集有其字家享年若干不娶無子牧娶裴氏實君之私其弟覺泣來請銘銘曰淑其性生無位死無子孰識其端文苑英華卷九百五十八
