body:
  text: 文苑英華卷三十二宋李昉等編水一水德賦一首水彰五色賦一首鑒止水賦三首止水賦二首如石投水賦三首水德賦梁洽大哉乎兹水獨靈長以利貞分位象於八卦得柔謙於五行混之不濁流之不盈蓄恬淡以凝潤含虛無而洞清其近窺也若氷鮮與玊潔映曙空而內徹其遙視也如雨罷而日晶澄逺氣於初晴德之深與上善而均美讓之大居下流而不爭處地為泉源則江漢朝宗之義立在天為霧露則隂陽燮理之功成辨涇渭於九流雖衆不雜察媸妍於萬象在隱皆明亦何異翹翹邦彥濟濟朝英作我吏部為周亞卿昔掌地官其守土也能審今來㑹府其應物也以精回廣照之能比其妙識以無偏之志喻此持衡故得自陜以東更仰知人之鑒普天之下皆稱如凖之平則有登舟未涉處轍未停逰子隴頭嗚咽斷腸之奏知音席上傳聞盈耳之聲儻為廣由中之德流潤下之情則所謂清通之一過可以濯吾纓水彰五色賦以渥彩彰明必資乎水為韻善利無方莫先乎水識疑當潤色之際必取務滋之㫖黑黃蒼赤皆類其激物黼黻文章咸本而資始德既洽於濟物色且叶於通理自得𤣥之又𤣥何謝美之為美于以增曄曄于以散煌煌浴飛翬於陳寶浸社土於徐方染氏繄而衆彩繁糅繢人因而品彚咸彰博我以文不獨專於潤下用而不竭將以效其靈長原夫被物如濡霑顔載渥狀暮山而翠疊法朝景而霞駮逺同墨氏類素絲之屢遷尚想蜀江嘉貝錦之斯濯飾衮衣而煥爛成繡服之葳蕤何采章之不昧一作勝由浸潤之所資漸以化成能令素以為絢期於敷演孰謂涅而不緇既得色斯舉矣亦可狎而玩之不假濯於滄浪寧同資於碧海凝瑞霞之炫耀發慶雲之光彩寫補天之績錬石之資必該圖應聖之祥威鳯之儀咸在佐益丹而惟其深矣當後素而不曰白乎流濕之光允若受采之時是須且比成人之美實同因物有孚助其言而載隨炳其用而無必乍成藻火之文幾變素紈之匹榮光可愛初謂出河之符備色咸宣更入夢江之筆先王所以因而立㫖諭以相成含章而其輝未著發澤而其道彌精儻不苟於體用庶可致於文明鑒止水賦以澄虛納照遇象分形為韻吕溫水止矣靜之其徐物鑒矣久而益虛既一作且無情於美惡又奚議夫親踈委質由來所期乎上善同利忘筌已悟寧患乎至清無魚若乃回塘月皎一作抱髙岸環合泥滓湛而一作然自沉金沙炯其不雜同道德以虛而受異川澤唯汙是納有斐君子此焉明徵氣隨浪一作波息心與源澄端形赴影如木從繩其表微也挂金鏡而當晝其索隱也隔玉壺而見氷爾其色必洞徹一作激光無滉漾不蒸蓊欎之氣不激潺湲之響百丈在目千仭指掌惡每自乎中見美實非乎外奬鑒形之始方似以身觀身得意之間乃同求象忘象觀其下倒星漢上披煙雲守其常而性將偶一作道合居其止一作所而物以羣分君鑒之以平心臨下必簡臣鑒之以一作而勵節在邦必聞妍媸無形兮惟人所召物我兼進一作遺兮水無不一作私照亷士以之洗心二字一作立誠至人以之觀妙豈比夫逝者如水敵若建瓴一作流若激矢波如建瓴不舍晝夜爭輸滄溟徒乖躁靜之理莫辨真僞之形者哉邦家以道一作邦國以賢為止水鑒有餘裕羣形鱗集萬景雲附一作衆象景附濫巾竊吹者十手所一作共指研精托實者千載一遇夫如是姑自攝其威儀亦何憂而何懼凡一作皆集夲第二同前韻張仲素水可取鑒人能就諸將審已以徵實必含形而內虛其止也靜其清也徐方湛兮而皎鏡異沔彼而淪胥符上善之心自多𢎞納見無私之狀臨或躊躇資坎德之深矣諧至人之淡如當其曉日增鮮光風未度既淸泠以爰止持炯戒以為喻等濫觴之猶蓄何一杯之是措諒善惡之咸觀必形影之自遇豈獨無當五色空涵衆文伊吉凶之肇起如動靜之潜分俯而窺似神交之淡泊默而察若靈化之絪緼且義叶養蒙道深觀竅洞虛無以責有在清明而惟肖心不同也常稱厚貌之疑鑑之精兮未若重泉之照辨妍媸而無失固潔著而為妙斯所以田巴覽之而獨悲陸雲觀之而自笑若乃芳塘始啓白水初澄有美人兮方覿坐曲岸而情凝毫髮已分想沉姿而映藻清華不動見浮彩之生靈是知聲有往而必復者謂其響答水以止而能鑒者謂之冥合方取則於川渟孰混歸於海納此亦紀人事垂正經庶在觀身而責影豈徒品物而流形今則萬頃方臨羣容在掌隨方圓以見意在清通而賦象苟明鑒之不遺願飭躬而是往第三同前韻王季友鑒於水者不在於廣大而疑在於澄渟奔流則崇山莫辨靜息則纎芥必形故能任人倫之巨細隨物色之丹青皆一鑒而洞逹若三光之出冥因見底之清成照膽之朗以無心而應物皆潔已而呈象如白日之輝輝無孤蓬之振蕩憑虛之狀信有姸而有媸閲實之明固無偏而無黨若乃仙井舊泄華池既瀦中無浴鳥下絶遊魚疑金鏡之湛寂若琉璃之至虛當其來見威儀之酷似及其去無朕迹於淪胥向使潺湲不息噴薄長住將沃日而騰虹或因山而瀑布遭駭飇之歘起值潜虬之交騖雖有淸明之本質豈能使形影之相遇是知專而靜可以居要明而動亦不能照斯大道之指歸豈常情之感召得懲躁之為誡知飾容之惟肖人觀於水既定而後詳水鑒於人當止而為妙照其美也非所愛照其惡也非所憎不分明於有位不掩映於無朋諒可移性俾居於正直豈懷鑒貌獨貴於清澄想夫煙雨初霽泥沙不雜明看皎練止若氷合忽形來而影見類聲往而響答在良賢而暫窺宜陋軀之愧納今者貞清特異頴耀前聞雖萬形之森列終一鑒而區分止水賦以清審洞徹涵容為韻劉清開元五年登科記第十三劉廷玉至第十七劉凝無劉清名觀乎太古之初乾坤定列有坎方一德之大成江河四瀆之別注仙海以環流度星橋而靡竭立體清靜舒光朗徹觀五行以獨舉潤萬物而齊悅豈惟以善下之故長應流行抑亦能遇坎則止以竭為平居荒野而不動合寒虛而自清晝則煙雲亂出夜則星象羅生若乃湖稱青草澤若雲夢淺深瀠一作瀯渟表裏寒洞當朱陽之夏晚遇白露之秋仲紫關之鴻鴈飛來緑浦之蓮舟風送既能止而利物所以歸之者衆亦有凰鳯之沼明月之潭每澄流於庭院常不注於東南蒙寮寀之玩洽渾琴酌而相參以逰以賞如液如涵若英賢之取則類貞咸之是湛届夫玉一作宙宇初晴風飇載寢籠碧天而似鏡展紅霞而若錦納衆影而不遺比羣情而特甚用使至人觀之而心察智者樂之而情審逹士愛而欲臨高節聞而願飲復乃養龜鶴藏魚龍怪石積明珠重虛以受物謙而克從有一人兮充賦每咨歎於澗松飾淸顔而自肅希止水而今逢則知無美惡以畢鑒豈徒取乎矯容第二同前韻王泠然嘗聞神心保正天道害盈漏巵添而復出欹器備而還傾豈若兹水居然可名既混之而不濁又澄之而不清時止則止時行則行峻隄防則其源見塞開汲引則其道能亨安波不動與物無爭如方圓之得性何寵辱之能驚故為國者取象於止水使其政公平為身者亦同於止水使其心至明至察可尚柔謙何禀思遠道則一葦能航守貧居則一瓢可飲接下流則卑以自牧鑒羣物則寬而能審誠用之而捨之在去泰而去甚水之為德也長水之為功也衆散成雲雨畜作潭洞浮芥則傲吏措杯種瓜則幽人抱甕無朝夕之出納有飛沉之狎弄徒觀其深虛見底咫尺宜探千流並入萬象皆涵搖樹影於靑岸落山光於碧潭其仁可以濟物其義可以激貪既而壅之不流蒙則未决照春物而畫屏相似映晴空而明鏡無別雨來而圓㸃亂生風靜而長波自滅任天時以開閉隨王澤而盈絶受涓滴而逾深處氷壺而更徹書云視水責影能見形容視人行事能知吉凶政煩則人擾水濁則魚喁夫子欲精神而不惑俾榮利無繫於心胸比浮雲之於我觀止水而為容兀兮若枯木坐忘淡兮若虛舟見逢正道未遠斯言可從儻不違疑作遺於射鮒希有便於登龍如石投水賦以仁義忠信公平能諫為韻劉闢聖之求賢也詳明水之受物也柔順石遇柔而不阻臣俟明而必進漢祖興兮昌言納留侯輔兮皇威振喻石水以興詞配鹽梅而稱雋堅脆性異應廣納而來投尊卑禮殊致精誠而取信伊水為體既清而平猶君為德既貞而明石豈自投假海納之𢎞量臣非苟進由天聽而察誠用率於有類將感於無情虛而受者其理逺含而容者其道行何幽邃之能間奚渺瀰之足驚夫國之勃興必多賢智繼九臣之跡膺三傑之義煥發英藻呈龍章與鳯姿敬宣嘉猷謂嶽生而天賜豈不由山有巨石水有通津忽擊流以澎湃俄答響於奫淪雖源深流長乃入無不至而體柔處潤則託有所因移他山之貞質依上善之全仁夫水石之奧㫖與君臣之等倫今天子端居穆淸時和海晏念投石之契爰求秉鈞思針闕之規載徵驟諫由是如石之義啓投水之情通彼以誠應我亦符同懸天爵之榮獲斯人瑞尊五嶽之禮視乎上公恆啓沃以為志方淸明而在躬比石固業欽賢纘功儻或水不周容石乃無由寓質君不虛己臣則曷能推忠可以垂誡訓可以流德風則知聖既作兮政惟恆石既投兮賢必澄敢獻良哉之詠願揚美於亷能第二以聖奬忠直從諫如流為韻盧肇石比臣心水猶君德誠見投而不阻如從諌而無極蓋所以作仁聖思正直清逾萬頃能容落落之姿操或一拳以透沉沉之色惟我聖后啓乎宸聰每以淡然之德能取確爾之功言乎水也逾漢祖之虛受稱乎石也遇留侯之盡忠是以王事竭誠羣臣報政具懷鑿鑿之美允納洋洋之聖君心潤下已覃滂沛之恩臣志補天願表堅貞之性故得朝廷肅穆上下交慶小伊傅以輸忠配唐虞而比盛者也當其欲進嘉謀心懷隱憂思衮職而有補隨諌鼓以來投於是咸趨丹陛若蹈洪流且推誠而上逹亦虛心而下求既乃契皇情承天奬介然允臻乎浹洽渙若盡納其忠讜一言初進開龍顔而似激圓波萬國皆聞入宸心而若流淸響乃知窺日月之光有虧必諌震雷霆之怒有諌必從雖磊落以難進乃廣大而見容既無悔以無尤子産徒言於狎水那將恐而將懼韓非奚患於櫻龍且夫瓊瑶為報而匪珍夜光處暗而多患未若我喻水於盛德比投於納諌允當上善之求勿謂下流之訕遂用握金鏡臨玉除忠言得進以無隱聖慮每徴於往初如是則祥符出惠澤舒將無事而無諌見寰瀛之晏如第三同前韻白敏中石明臣節水喻聖聰順投既因於納諌虛受必俟乎輸忠從以讜言出清規而有中類夫貞節入碧浪以無窮爰自人謀式彰天奬言必在乎能發道奚疑於虛往自懷從善聞蹇蹇於股肱何異臨川運磷磷於指掌理既符於水石事且契於雲龍佇啓心而是贊在虛已而能容石投水而誠資手敏臣佐君而詎得面從當手敏則水不傷淸匪面從則君能立政嘉獻替而無爽幸遭逄而有慶致至堅於𤣥奧象以得賢受可轉於清流因之啓聖所以垂衣廣納側席深居言之者何嘗率爾聞之者足以啓豫攻玉之形隨帝心之沃若補天之質應王澤之濡如既而流謗靡行沉幾自得當持重而無撓冀臨深而不惑逆於耳而順於心黜其邪而褒其直用礪金於睿鑒渙汗潜通舉韞玉於恩波津涯莫測於是宣教化罷畋逰開直道務旁求發揮諤諤之明節會合洋洋之聖謀石以貞堅本無疑於虛擲水惟柔順安有阻於暗投夫然則臣心磊落而上逹君德汪洋而下流况乎舟楫之道大行不侮不慢藥石之言盡入何憂何患當道泰而人悅固河清而海晏彼漢髙之用留侯未若吾皇之納諌文苑英華卷三十二
