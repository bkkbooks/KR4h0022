body:
  text: 文苑英華巻七百六十二宋李昉等編明堂明堂議三首郊丘明堂等嚴配議三首明堂大饗議一首明堂告朔議三首明堂議魏徴貞觀五年議曰明堂之作其所由來逺矣爰自軒唐逮乎秦漢有損有益或同或異記述參差莫能詳究今稽諸古訓參以舊圖其上圓下方復文粹作複廟重屋百慮一致異軫齊舊唐書禮儀志㑹要文粹並作同歸暨當塗膺籙未遑斯禮典午聿興無所取則裴頠以諸儒持論異端鋒唐書文粹作蠭起是非舛互靡所適從遂乃以人廢言止為一殿宋齊即仍其舊梁陳遵而不改雖嚴配有所祭饗不匱求之典則道實未𢎞何者夏禹哲王致美于祭服周公大孝備物於宗祀聖人設教夫豈徒哉然則身處卑宫神居重屋斯豈苟求壯麗崇飾華侈固亦致孝尊親之道因髙事天之義求其逺趣非無深㫖盖以神以虛𤣥無聲無臭視之不見聽之不聞旣杳𡨕而莫測故廣袤之度罔知自何者至此一百一字唐書㑹要文粹並無夫孝因心生禮縁情立心不可極故備物以表其誠情無以盡故飾宫以廣其敬宣尼美歎諸本作意意諸本作其在兹乎自五帝迄今代有損益宫室制度每越舊章重屋規模獨虧前典文祖過土階之儉世宗踰卑宫之陋配天致極理必未安伏惟陛下以上聖之英靈承皇天之眷命一六合而光宅得萬國之懽心九譯之貢旣陳明堂之位仍闕永言殷薦誠感自中自五帝至此九十四字諸本並無臣等親奉德音預諸本作令叅大議思竭塵露増崇諸本作㣲増山海凡聖人有作義重隨時萬物斯覩事資通變若㨿蔡邕之説則至理失於文繁若依裴頠所為則大體二字諸本作又傷於質略求之情理未臻諸本作允厥中今之所議非無用捨請為五室重屋上圓下方旣體有則象又事多故實下室備布政之居上堂為祭天之所人神不雜禮亦宜之其髙下廣袤之規几筵尺丈之度諸本作制則並隨時立法因事制宜自我作故諸本作而作不諸本作何必師古圖像備陳决之聖慮廓千載之疑議為百王之懿範不使㤗山之下惟聞皇帝之法汶水之上獨稱漢武之圖則通乎神明庶幾可俟子來經始成之不日謹議同前顔師古議曰竊以明堂之制爰自古昔求諸舊唐書志㑹要文粹並作之簡牘全文莫覩起自舊唐書㑹要文粹作肇起黄帝降及唐諸本作有虞彌歴夏殷迄于周代各立名號别創規摹衆說舛駮互執所見鉅諸本作巨儒碩學莫有詳通斐然成章不知裁斷究其㫖要實布政之宫也徒以戰國從横典籍廢棄暴秦酷烈經禮湮亡今之所存傳記雜說用為凖的理實文粹作實亦蕪昧然周書之叙明堂記其四面則有應庫諸本作門雉門㨿此一堂固是王者之常居耳其青陽總章𤣥堂太廟及左个右个與月令諸本無此二字四時之次相同唐志作用則路寢之義足為隠括諸本作明証又云諸本作文王居明堂之篇載帶以弓韣禮於禖下諸本作禮于高禖下九門磔禳諸本作攘禦止諸本作以禦疾疫置梁除文粹作隂道以利農夫令國為諸本作有酒以合三族凡此等事諸本作凡一事等皆合月令之文觀其所班諸本作為皆在路寢者也又記云三字諸本作戴禮昔者周公朝諸侯于明堂之位天子負斧扆南鄉而立明堂也者明諸侯之尊卑也周官又云周人明堂度九尺之筵東西九筵堂一筵據其制度即大寢也尸子諸本無此二字亦曰黄帝曰合宫有虞氏曰總章殷曰陽舘周曰明堂斯皆路寢之徴知非别處大戴所說初有近郊之言後諸本作復稱文王之廟進退無據自為矛盾原夫負扆受朝常居出令諸本作立旣在臯庫之内亦何云於郊野哉孝經傳曰諸本作云在國之陽又無里數漢武有懐創造廣集諸本作詢於縉紳言論紛紛諸本作然終以不定諸本作終無定㨿乃立於汶水之上而宗祀焉明其不拘逺近無擇其方唐志文粹作亦無方靣孝成之世諸本作代表行城南雖有其文厥功靡立平帝元始四年大議營起諸本作創孔牢等乃以為明堂辟雍太學一實三名諸本四字作其實一也而有三名金裒唐志㑹要作褒等又稱經傳無明文不能分别同異中興之後蔡邕作論復云明堂太廟一物二名鄭𤣥則曰在國之陽三里之外淳于登又云三里之外七里之内景已之地潁容字子嚴釋例亦曰明堂大廟凡有七名其體一也苟立同異競為巧說並出自胷襟曽無師祖審見且夫功成作樂治諸本作理定制禮草創從宜質文遞變旌旗冠冕今古不同律度權衡前後莫諸本作不一隨時之義斷可知矣聖上大啟崇基光膺寳運功髙開闢之後德邁邃古之初鳯紀龍官譬畎澮於溟渤隨山練石慙培塿於方壺大樂與天地同和豈奏曩時之韶夏大禮與天地同節寧踵前代之膠庠天縱多能睿喆𤣥覽總五行之秀氣抱六藝之菁華秩宗茂典皆取必於宸極共工妙術咸禀訓於深衷隠顯無遺洪纎必應百神受職萬物斯覩將建明堂爰降絲紱規矩之度久已蓄於聖懐逺近之宜實不惑於僉議自聖上至此一百五十四字諸本無假如姬旦諸本作周公舊章猶當擇其可否宣尼彛則尚或補其闕漏况乎鄭氏臆說淳于謏聞匪異守株何殊膠柱昔漢謹封禪博召諸生則乖戾多端事乃依違累載惟倪寛先覺獻奏昌言獨斷之於天子於是制詔始下决策施行紹列辟之鴻明成天下之壯觀今旣時和嵗稔俗阜人安兆庶子來鈎繩庀具揆景置臬良其㑹也愚謂不出墉雉邇接宫闥唐書㑹要作闈實允事宜量無所惑但當上遵天㫖祗奉德音作皇代之典彛諸本作明堂永貽則諸本作範於來葉區區碎議皆可畧而不論悠悠常談不足循其軌轍謹議同前陳貞節議曰臣等竊聞明堂之建其所從來逺矣舊唐書有自字天垂象聖人則之蒿柱茅簷之規上圓下方之制考之大數不踰三七之間定之方中必居景已之地豈非得房心布政之所當太微上帝之宫乎故俯仰從容諸本作仰協俯從正名定位人神不雜各司其序則嘉應響至保合太和焉唐書作昔漢氏承秦經籍道息旁求堙墜詳考文粹作據唐志作究難明孝武初議立明堂於長安城南遭竇太后不好儒術事乃中廢孝成之代又欲立於城南議其制度莫之能决至孝平元始四年始創造於南郊以申嚴配光武中興㑹要作元是元年立於國城之南自魏晉迄於梁朝雖規制或殊而所居之地恒取景已者者字㑹要作而已斯盖百王不易之道也髙宗天皇大帝纂承平之運崇朴素之風四夷來賔九有咸乂永徽三年詔禮官學士議明堂制度羣儒紛競各執異端久之不决因而遂止者何也非謂財不足力不堪也将以周孔旣遥禮經甚諸本作且紊事不師古或爽天心難用作程神之諸本無之字不孚佑者也則天太后揔禁闈之政籍軒臺之威屬皇室中圯之期躡和憙後漢作憙諸本作熹從權之制以為乾元大殿承慶小寢當正陽已諸本作亭午之地實先聖聽斷之宫表順端門唐志文粹作闈儲精營室爰從朝饗未始臨御乃起工徒挽令摧覆旣毁之後雷聲隠然衆庶聞之或以為神靈之象也於是増土木之麗因府庫之饒南街北闕建天機大儀之制乾元遺趾興重閣層樓之業會要作基煙熖蔽日梁柱排雲人斯告勞天實貽誡煨燼甫爾文粹作邇遽加修復况乎地殊景已未答靈心跡匪膺期乃申嚴配事乖諸本作昧彛典神不昭格此其不可者一也又明堂之制木不鏤工文粹作上不文今體式乖宜違經紊禮雕鐫所及窮侈極麗此其不可者二也高明爽塏事資䖍敬宻近唐志文粹作邇宫掖何以祈天人神雜擾不可物取諸本作放物此其不可者三也况兩㑹要作四京上都萬方取則而天子闕當陽之位聽政居便殿之中職司其憂豈容沉黙當須審巧歴文粹作歴之計擇煩文粹作繁省之宜不便者量事改脩可因者隨時唐書㑹要作而文粹作宜適用削彼明堂之號克復乾元之名則當宁無偏人識其舊矣謹議郊丘明堂等嚴配議孔𤣥義議曰謹按孝經云孝莫大於嚴父嚴父莫大於配天旣言莫大於配天明配尊大之天舊唐書通典㑹要無此二字昊天是也物之大者莫大唐書作若於天推父比天與之相配行孝之大莫過於此以明尊唐書作配之極也又易曰唐書㑹要作云先王以作樂崇德殷薦之上帝以配祖考鄭𤣥注上帝天帝也故知昊天之祭合祖考並配請奉太宗文武聖皇帝高宗天皇大帝配昊天上帝於圜丘義符孝經周易之文也神堯皇帝肇基㑹要作開王業應天順人配感帝於南郊義符大傳之文也又按祭法云祖文王而宗武王祖始也宗尊也所以名祭為尊始者明一祭之中有此二義又孝經云宗祀文王於明堂文王言祖而云宗者亦是通武王之義故知明堂之祭配以祖考請奉太宗文武聖皇帝祖諸本無此言高宗天皇大帝配祭於明堂義符周易及祭法之文也謹議同前沈伯儀議曰謹按禮有虞氏禘黄帝而郊嚳祖顓頊而宗堯夏后氏亦禘黄帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊𡨕祖契而宗湯周人禘嚳而郊稷祖文王而宗武王鄭𤣥註云禘郊祖宗謂祭祀以配食也禘謂祭昊天於圜丘祭上帝於南郊曰郊祭五帝五神於明堂曰祖宗伏尋嚴配之文於此最為詳備虞夏則退顓頊而郊嚳殷人則捨契而取㑹要作郊𡨕去取旣差唐書作多前後乖次則舊唐書志㑹要通典作得禮之序莫尚於周禘嚳郊稷不聞於二主明堂宗祀不兼於兩配成王以三字唐志作咸以文王武王父子殊别文王為父上主五帝武王對父下配五神孝經曰嚴父莫大於配天則周公其人也昔者周公宗祀文王於明堂以配上帝不言嚴父武王以配天則武王雖在明堂理未齊於配祭旣稱宗祀義獨主於尊嚴雖同兩祭終為一主故孝經緯曰后稷為天地主文王為五帝宗也必若一神兩祭便則五祭十祠薦獻蘋蘩唐書如此英華㑹要並作頻繁禮虧於數此則神無二主之道禮宗諸本作崇一配之義竊尋貞觀永徽共遵專配顯慶之後始創兼尊必以順古而行實謂從周為美高祖神堯皇帝請配圜丘方丘通典㑹要作澤太宗文武聖皇帝請配南郊北郊高宗天皇大帝德邁九皇功開萬㝢制禮作樂告禪升中率土共休普天同頼竊惟莫大之孝理當揔配五天謹議同前元萬頃議曰伏惟高祖神堯皇帝鑿乾構象闢宇通典作上開基太宗文武聖皇帝紹統披元循機闡極髙宗天皇大帝𢎞祖宗之大業廓文武之宏規三聖重光千年接旦神功叡德罄圖牒而難稱盛烈鴻猷超千古舊唐志作古今而莫擬豈徒錙銖堯舜糠粃殷周而已哉謹按見行禮昊天上帝等祠五所咸奉高祖神堯皇帝太宗文武聖皇帝兼配今議者引祭法周易孝經之文雖近稽古之辭殊失因心之㫖通典作雖近古之祠殊失聖㫖但子之事父臣之事君孝㑹要作恭以承唐志通典作成志忠而順美竊惟唐志通典作以兼配之禮特禀先聖之懐爰取訓於通唐志作前規遂申情於大孝詩云昊天有成命二后受之易曰殷薦之上帝以配祖考敬尋厥㫖本合斯義今若逺摭遺文近乖成典拘常不變守滯莫遷唐志作通便是臣黜於君遽易郊丘之位下非於上靡遵弓劔之心豈所以申太后哀感之誠徇皇帝孝思之德慎終追逺良謂非宜嚴父配天寧當若是伏據見行禮高祖神堯皇帝太宗文武聖皇帝今旣兼配五祠理當依舊無改髙宗天皇大帝齊尊耀魄等邃含樞闡三葉之宏謨唐志作基開萬代之鴻業重規疊矩在功烈而無差享地郊天豈祠配之有别請奉高宗天皇大帝歴配五祠以申典禮謹議明堂大饗議韋叔夏議曰謹按明堂大饗惟祀五方帝故月令季秋令云是月也大饗帝則曲禮所云大饗不問卜鄭𤣥注云謂徧祭五帝於明堂莫適卜是也又按祭法云祖文王而宗武王鄭𤣥注云祭五帝五神於明堂曰祖宗故孝經曰宗祀文王於明堂以配上帝㨿此諸文明堂正禮唯祀五帝配以祖宗及五帝五官神等自外餘神並不合預伏惟陛下追逺情深崇禮唐志作禋志切故於明堂饗祀加昊天上帝皇地祗重之以先帝先后配饗此乃補前王之闕典𢎞嚴配之䖍誠徃以神都郊壇未建乃於明堂之下廣祭衆神盖義出權時非不刋之禮也謹按禮經其内官中官等五嶽四瀆諸神並合從祀於二至明堂揔奠事乃不經然則宗祀配天之親雜與㑹要作以小神同薦於嚴配之道理有不安望請每嵗元旦唯祀天地大神配以帝后其五嶽以下請依禮於冬夏二至從祀方丘圜丘庶不煩黷謹議明堂告朔議聖厯元年閭仁諝議曰臣等謹按經史正文無天子每月告朔之事唯禮記玉藻云天子聽朔於南門之外周禮天官太宰正月之吉布政於邦國都鄙干寳注云周正建子之月吉朔日也此即玉藻之聽朔矣今嵗首元旦於通天宫受朝讀時令布政事則京官九品以上諸州朝集使等咸列於庭此則聽朔之事畢而合於周禮玉藻之文矣而鄭𤣥注云玉藻聽朔以秦制月令有五帝五官之事遂云凡聽朔必特牲告其時帝及其神配以文王武王此鄭注之誤也故漢魏至今莫之適㑹要作行用按月令云其帝太昊其神勾芒者謂之宣布時令告示下人其令詞云其帝其神耳所以為敬授之文欲使人奉其時而務其業每月有令故謂之月令非謂天子每月朔日以祖配帝而祭告之其每月告朔者諸侯之禮也故春秋左氏傳曰公旣視朔遂登觀臺又鄭注論語云禮人君每月告朔於廟有祭謂之朝饗魯自文公始不視朔是諸侯之禮明矣今王者行之非所聞也按鄭所謂告其帝者即太昊等五人帝其神者即重黎等五行官雖並功施於人列在祀典無天子每月拜祭告朔之文臣等謹檢㑹要作按禮論一作記非及三禮義宗江都集禮貞觀禮顯慶禮及祠令並無天子毎月告朔之事若以為近代無明堂故無其告朔之禮則江都集禮貞觀禮顯慶禮及祠令著祀五方上帝於明堂即孝經宗祀文王於明堂也此即于明堂而著其饗祭何為告朔獨闕其文若以為一作君有明堂即合告朔則周秦有明堂而經典正文並無天子每月告朔之事臣等詳求一作歴觀今古博考載籍旣無其禮不可習非望請停每嵗一月一作每月一日告朔之祭其文以正國經竊以天子之尊而用諸侯之禮非所謂頒告朔令一作頒告朔於諸侯使奉而行之之義也謹議一作皆舊唐書志同前王方慶議曰謹按明堂天子布政之宫也盖所以明一作順天氣統萬物動法於兩儀德被於四海者也夏曰世唐諱室殷曰重屋姬曰明堂此三代之名也明堂天子太廟所以宗祀其祖以配上帝東曰青陽南曰明堂西曰總章北曰𤣥堂中曰太室雖有五名而以明堂太廟一無此二字為主漢代逹學通儒咸以明堂太廟為一漢左中郎将秦邕一作蔡邕立議㑹要作義亦以為然取其宗祀則謂之清廟取其正室則謂之太室取其向陽則謂之明堂取其建學則謂之太學取其圜水則謂之辟雍異名而同事古之制也天子以孟春正月上辛日於郊揔校授十二月之政還藏於祖廟月取一政班於明堂諸侯以孟春之月朝于天子受十二月之政藏於祖廟月取一政而行之盖所以和隂陽順天道也如此則禍亂不作㑹要作生災害不生㑹要作作矣故仲尼美而稱之曰明王之以孝理天下也人君以其禮告廟則謂之告朔聽視此月之政則謂之視朔亦曰聽朔雖有三名其實一也今禮官議稱按經史正文無天子每月告朔之事者臣謹按春秋文公十㑹要作六年閏十月不告朔榖梁傳云閏者附月之餘日天子不以告朔左氏傳曰閏月不告朔非禮也閏以正時時以作事事以厚生生人之道於是乎在矣不告閏朔棄時政也臣據此文則天子閏月亦告朔矣文粹有以此二字寧有他月而廢其禮者乎博考經籍其文甚著何以明之周禮太史職云頒告朔於邦國閏月告王居門終月又禮記玉藻云閏月則闔門左扉立於其中並是天子閏月而行告朔之事也禮官又稱玉藻天子聽朔於南門之外周禮天官太宰正月之吉布政於邦國都鄙千寳注云周正建子之月吉日也此即玉藻之聽朔矣今每嵗首元旦通天宫受朝讀㑹要作頒時令布政事京官九品以上諸州朝集使等咸列於庭此聽朔之禮畢而合於周禮玉藻之文矣禮論及三禮義宗江都集禮貞觀禮顯慶禮及祠令並無王者告朔之事者臣謹按玉藻云𤣥冕而朝日於東門之外聽朔於南門之外鄭𤣥注云朝日春分之時也東門南門皆謂國門也明堂皆在國之陽每月就其時之堂而聽朔焉卒事反宿於路寢凡聽朔必以特牲告其時帝及其神配以文王武王臣謂今嵗元旦通天宫受朝讀時令及布政自是古禮孟春上辛㧾校受十二月之政藏於祖廟之禮耳而月取一政頒於明堂其義昭然猶未行也即如禮官所言遂闕其事臣又按禮記月令天子每月居青陽明堂總章𤣥堂即是每月告朔之事先儒言舊説天子行事一年十八度入明堂大饗不問卜一入也每月告朔十二入也四時迎氣四入也廵狩之年一入也今禮官立議惟嵗首一入耳與先儒旣異在臣不敢用一作同鄭𤣥云凡聽朔告其帝臣愚以為告其朔之時一作日明五方上帝之一帝也春則靈威仰夏則赤熛怒秋則白招拒冬則叶光紀季月則含樞紐也並以始祖而配之焉人帝及神列在祀典亦於其月而饗祭之魯自文公始不視朔子貢見其禮廢欲去其羊孔子以羊存猶可議一作識其禮羊亡其禮遂廢故云爾愛其羊我愛其禮也漢承秦滅學庶事草創明堂辟雍其制遂闕漢武帝封禪始建一作造明堂於太山旣不立於京師所以無告朔之事至漢平帝元始中王莾輔政庶幾復古乃建明堂辟雍為禘祫祭三字㑹要作禘祫於明堂諸侯王列侯宗子一作室子弟九百餘人助祭畢皆益户賜爵及金帛増秩補吏各有差漢末䘮亂尚傳其禮爰至後漢祀典仍存明帝永平二年郊祀五帝於明堂以光武配祭牲各一犢奏樂如南郊董卓西移記載湮滅一作載籍烟滅告朔之禮於此而墜暨於晉末戎馬生郊禮樂衣冠掃地揔盡告朔之禮於此而墜暨于元帝過江是稱狼狽禮樂制度南遷盖寡彛典殘缺無復舊章軍國所資臨事議定一作之旣闕明堂寧論告朔宋朝何承天纂集其文以為禮論雖加編次事則闕如梁代崔靈恩撰三禮義宗但捃摭前儒因循故事而已隋大業中煬帝命學士撰江都集禮只抄撮禮論更無異文貞觀顯慶禮及祠令不言告朔者盖為歴代不傳所以其文遂闕各有由緒不足依據今禮官引為明證在臣誠實有疑陛下肇建明堂聿遵古典告朔之禮猶闕舊章欽若稽古應湏補葺若每月聽政於一堂一作明堂二字事亦煩數孟月視朔恐不可廢謹議由緒浙本文粹作縁由一作皆舊唐書志同前張齊賢議曰禮官狀云經史正文無天子每月告朔之事者謹按穀梁傳曰閏月天子不以一無此字告朔是知他月天子告朔矣又按左氏傳以魯侯不告朔為棄時政也則諸侯閏月亦告朔矣又按周禮太史職頒告朔於邦國之中一作下禮記玉藻天子聽朔於南門之下一作外皆有閏月王居門之事是天子亦以閏月告朔矣非是天子不告而諸侯亦告也榖梁子去聖尚近雖閏月告朔之義與左氏不同然皆以天子諸侯每月當行告朔之事兩禮之設一作兩傳其文甚著不可謂經史無正文也又禮官狀以一作云周禮天官太宰職云正月之吉始和布治唐㑹要如此英華作政恐元本避諱於邦國都鄙乃懸象一無此字法于象魏使萬人觀之一作象浹日而歛之即是謂禮記玉藻之聽朔因此遂謂王者唯以嵗首元旦一告朔此説非也何者太宰所云布治唐㑹要如此英華作政恐元本避諱于邦國都鄙者布其所掌太宰之典也故地官司徒職則布教典春官宗伯職則布禮典夏官司馬職則布政典秋官司㓂職則布刑典唯冬官司空職亡以五官之職言之則其職亦當布事典也此乃六官各以正月之吉宣布其職之典非告朔也干寳之注以一無此字經所云正月之吉者即是正月之朔日也故觧云吉是朔日也今云告朔日者即一作是傳寫之誤不可據以為説也又禮官狀云每月告朔者諸侯之禮故云左氏傳云旣視朔遂登觀臺今王者行之非所聞也又云以天子之尊而用諸侯之禮非所謂頒告朔令諸侯使奉而行之之義此大謬也何者左氏所言視朔者猶玉藻之聽朔也今禮官據左氏有魯侯行視朔之禮即謂諸侯毎月當告朔玉藻亦有天子行聽朔之禮又有閏月王居門之亊即一作若謂天子惟嵗首一告朔何其一取而一捨也又孝經云昔者明王事父孝故事天明又云明王以孝理天下豈有王者設教使諸侯尊祖告朔而天子不告也非所謂以明事神訓人事君之義又禮官狀云鄭所謂告其時帝者即大皡等五人帝此又非也何者鄭注惟言告其時帝及其神配以文王武王不指言天帝人帝但天帝人帝並配五方時帝之言包天人矣既以文王武王作配則是並告天帝人帝諸侯受朔於天子故但於祖廟告而受行之天子受朔於上天理宜於明堂告其時之天帝人帝而配以祖考也故玉藻疏載賀瑒義亦以時帝為靈威仰等五天帝且聖人為一作唯能饗帝孝子為一作唯能饗親今若但吿人帝則聖人之道未備非所謂能饗也又禮官狀云若天子每月朔旦告祭然後頒之則諸侯安得受而藏之吿而行之足明太宰以嵗首宣布一嵗之令太史從而頒之令既頒矣政既行矣而王猶月月告朔復欲何所宣布者春官太史職云頒告朔於邦國是揔頒一嵗之朔於天下諸侯故諸侯得受而藏之吿而行之而王猶月月告朔頒之于官府都鄙也此謂畿内彼謂畿外事不相關也又禮官狀云漢魏至今莫之用者秦人滅學經典不存漢祖馬上得之未能備禮自魏以一作已下喪亂孔多豈可以漢魏廢禮欲使朝廷法之也又禮官狀云禮論等及祠令並無天子毎月告朔之事謹案禮論王珉范寗等議有明堂毎月告朔之禮者崔靈恩三禮義宗廟祭服義亦載天子視朔之服不可言無正文也又貞觀顯慶禮及祠令非徒無天子每月告朔之文亦無天子嵗首告朔之事今禮官何以言天子嵗首一告朔乎借矛擊盾昭然易了每月告朔在禮不疑尊祖配天於義為得若乃創制垂統損益舊章或欲毎月聴政或欲孟月視朔此則斷在宸極事關執政固非羣議所得參詳謹議一作皆唐㑹要文苑英華巻七百六十二
