body:
  text: 文苑英華卷六百八宋李昉等編雜上請二將加神龍尊號羣官請公除表一首為崔冀公請赴山陵表一首為宰相請不停千秋節宴會表一首請入湯表一首代郭令公請雪裴僕射表一首為衛尉許卿請留男表一首為人請合祔表一首為崔僕射請弟寬當元載纍表一首為郭令公請授四節度大使及五府大都督表一首安西請衣賜表一首請置兩省官表一首為趙侍郎乞歸河中侍兄表一首為王相公請改六書表一首為河東副元帥馬司徒請刻御製針銘碑表一首為中書門下請追尊號表一首中書省請册皇后表一首史館王相公請册淑妃何氏為皇后表一首將加神龍尊號羣官請公除表蘇頲此篇當在五百七十一卷遷祔門今已移入姑存其目為崔冀公請赴山陵表已見五百七十一卷于公異為宰相請不停千秋節宴會表玄宗孫逖臣等伏見太常卿韋縚奏稱京兆韓朝宗面承進止云若更不雨即停作千秋節者臣等伏以千秋令節萬壽良辰上以答皇天啓聖之休下以展蒼生務農之望禮白帝賽田神著在典式久通誠感陛下以經旬不雨憂人軫念有阻羣情將停盛德疑勤恤之旨被物以深而祈報之歡於義難間况近城郊甸雖以愆陽自餘郡縣頻霑霈澤今自東京起居使魏方進至臣等親問方進云自陜以東數日一雨秋稼滋茂特異常年此則萬庾可期三農無害近郊之內雖未霑霈率土之濱已知豐衍太平令典豈可闕如又數年以來此禮頻廢臣子之地獻壽無因朝野之情多歡莫展特希天鑒俯暢人心請入湯表常衮臣衮言臣先患腰膝比成積疾自從趍侍漸覺痊除每屬隂寒即微發動近加秋冷轉不支持半身風痺右足拘急謂其冷甚因以熱攻遂覺頭旋兼之眼暗寒溫相觸調息實難伏蒙聖慈特賜醫藥殊造至深灰粉酬恩未申萬一生成之功雖則頓瘳積久之癥固難速效沉綿增劇憂懼失圖先因入湯常愈斯疾漸逼冬候今正其時伏望天恩許臣就湯將息駑駘蹇步冀效驅馳螻蟻微誠庶回昭鑒無任懇迫之至謹奉表陳乞以聞代郭令公請雪裴僕射表代宗邵説大歷中臣某言臣聞忠邪不可以並立善惡不可以同羣吳任宰嚭而伍胥鴟夷楚任靳尚而屈原放逐逺惟前事孰不痛心伏見灃州刺史裴冕明允忠肅道高德厚匪躬無怠有謇諤之風首佐先帝驅馳靈武贊雲雷之業成社稷之勳程元振忌其直道缺方遂加誣構缺謫荒裔天下稱寃空懷醜正之悲莫雪盜憎之耻今姦邪屏退聖政文明百度惟貞四門已穆而寰海之內元元之人莫不延首德音思聞至化伏願特令追冕列在朝廷俾之台座端揆庶僚平章百姓處訏謨之任當燮理之權必能叶和萬邦致君堯舜臣位兼將相職忝股肱竊思賢傑共熙帝載無任懇迫之至為衛尉許卿請留男表于邵臣某言臣男某官某頃年二十一二因外人招誘性乏天和臣又拙訓遂交遊非類妄用錢物臣恐滋蔓纍及家私臣某年任寧州刺史表請磧西效力離鄉别親庶其思過臣遽缺流竄比屬艱難遐荒萬里分為阻絶近節度使差奏軍事會臣待罪輦轂重與相見至京以來臣竊窺察誘其由衷似辨君親近於觀志屢申懇倒願留晨昏夫物感人情况兹天屬茍及於此惕然關心臣今齒髮衰暮唯生此子倘其改行家有所傳九原之下可以塞責臣昨詢問磧西職掌殊非要重伏乞聖慈回鑒許為父子如初便留效節東軍與叔冀逐急征討盡其武用或樹功勳王事不殊殘冦又切臣得地近時復知聞縱其不賢猶可備缺老臣之幸至微至賤輕黷宸嚴靦冒之求戰越無地為人請合祔表前人臣某言臣固不肖寵由父任纍荷朝奬非臣本才永惟筮仕之初濫觴有地感舊恩愛竊係于心故開府儀同三司兼太常卿李承光頃充河西兵馬使天寶年中録臣帳下自兹效用得列戎班出入五涼艱勤一紀風雨寒暑未嘗廢離俄屬幽燕作逆伊洛陷冦蒲潼不關天地交閉承光臨計自失倉卒西還亦既通表華陽奉箋靈武枕干待命俟期而往曽未信宿先朝賜書敦敘兄弟如家人禮當是時也臣親見之開緘涕流是日便發及至行在特加天下兵馬副元帥改名匡國扈蹕彭原别承誥旨因此伏法當瘞朔陲身雖受刑家免拏戮遽蒙昭雪發使宣恩特令安存葬日官給今長男願見充鎮西副將次子諤又知覃懷兵馬女壻周鼎分閫河西咸受緑車之榮並為白馬之將聖朝寵寄洎男及女臣謂匡國雖死猶生近以孀妻告終願從合祔諤等銜血無由上陳將傳銘誄未正官爵且匡國非禁人收視之責微臣當故吏願言之時輒冒宸聰乞從優贈縱前封尚在詎敢追榮倘後命有加方期復魄則衛青有時將葬而欒布不負一言黃泉有知丹慊斯在無任懇欵求哀之至謹詣某門奉表陳乞以聞為崔僕射請弟寬當元載纍表前人臣寧言伏見詔命以中書侍郎元載黷貨無厭姦邪迹露國有明憲已置嚴科臣弟御史中丞寬頃緣長春宫事蒙恩充載判官今罪纍所加寬亦合從譴責念其愚直罹此禍階每荷聖朝奬拔之私纍忝中臺精選之務因逾所效寵貴當時上答之期分知死所臣忝骨肉之分休戚是均夙夜震驚反側難措朝典輕重不為微臣伏乞聖恩無以私貸伏增惶懼之至謹遣某官某奉表請罪以聞為郭令公請授四節度大使及五府大都督表王諫臣某言皇太子者王之枝葉固當使之繁茂以蔭本根國家自頃以來率由此道莫不重其職任以維四方如朔方范陽河南隴右劒南等州節度大使并五府大都督一切並用皇子以相監統內以制姦宄外以威冦戎雖未合封建舊章亦所以廣維城盤石之義也自羯胡肆逆海內糜沸務求武將授以兵權於是大使大都督之職廢而不復用矣近日僕固㻛梟夷之後陛下以朔方巨鎮冦逆未平將授其使賜臣靈州大都督單于安西大都護朔方節度使此一時之事非經久之術今妖氛電掃中外小康忝職樞衡代天理物固合遵守舊典宣明國章豈可復竊大名紊亂常式此臣所以內懷氷炭俯仰增慙伏乞選之親王授以斯任俾臣兼靈州長史及副大都護節度大使佐理其中并諸府節度亦望凖此處置四夷聞親王分鎮必當逺近畏威將亦絶其覦心不敢妄動又大元帥頃者並無親王為之自皇太子册在春宫遂罷斯職今但置元帥司馬而元帥未有其人四方將帥之臣無所稟命亦望陛下復授皇太子以振兵威此國家要務也臣前月已具聞奏陳其事猶懼陛下未察愚言不以為念是以敢再三抵冒昧死上陳倘允臣所祈天下幸甚無任懇願之至安西請衣賜表臣奉某月日勑令臣河西㨂招五千人赴磧西逐面防捍者臣到西安之日安西早以翻營軍令有行困不敢息鐵衣不解吹角便行邉庭路長去去彌逺往還三萬里辛苦二周年朝行雪山暮宿水澗溪深路細水粗缺大約一程少亦百渡人膚皴裂道上血流畜蹄穿跙才與切行不進也路傍骨積征馬被甲塞草不肥戰士戎衣胡風盡化今邉秋早冷赤肉迎霜臣凖勑放還實恐磧途凍死伏惟矜慈育物逺念單寒請令安西給付綿帛蓋其凍露路免疆疑作僵尸生入鐵門死將不朽請置兩省官表權德輿臣德輿言臣聞堯之為君也百工允釐舜之官人也九德咸事伏惟陛下文明御宇建用大中德厚侔於集無於字二儀利澤施及集無及字四海中外庶政寢興求思舉一事必稽於禮法命一官必詢其望實故朝無虛授時絶幸人厲精萬樞超冠前古可封之俗比屋相歡詩曰嗟我懷人置彼周行言思其才也又曰翹翹錯薪言刈其楚言選於衆也蓋在旌别能否循責功實以爵䘵為砥礪以羣才為鋩刃則舉不失職人效其能左右掖垣首承詔命奉行詳覆各有攸司然後下於中臺頒於海內誠至重也彌綸政事侍奉軒墀分曹十員今則殆絶昔衛多君子晉有卿材况巍巍聖朝淳化所被濟濟多士豈謝古人要重之司曠闕既久則事有所壅吏得為非亦慮四方聞知謂朝廷乏士事關理道豈止官常臣以凡庸過蒙慈渥塵汙清近超集作逾越等倫前後對揚備承奬飾德音顧問魂爽震驚而朴訥孱微不能自逹又去四月三日面奉進止令臣有所見即條疏奏來者輒以愚管手疏上陳集作聞干黷宸嚴伏待罪責無任兢懼隕越之至謹奉表以聞為趙侍郎乞歸河中侍兄表臣某言臣私門積釁幼集荼蓼賴諸兄訓育得漸有成比登官序各限中外聚居則少離别則多類表作為别居多兄薰頃任河中少尹先因風痺成疾手足不理于今纍年中間迎到上都類表作京臣自躬親方藥兄以枌榆松檟盡在河東懷土之心暫來輒去近從數月頗益沉綿形貌支離言詞蹇澀甥侄數輩年盡兒童雖在左右未能侍類表作奉養欲重迎至此在兄則羸瘵難堪將馳往近關顧臣為官守所繫魂銷氣索志往形留百憂攢心動失次第伏以聖慈涵育至德潛通肖翹之倫各遂其性特乞罷臣所職許以還鄉倘得數歲侍兄必冀沉痾有間然後星言匍匐稽首闕庭臣之至願於斯萬足無任懇願迫切之至為王相公請改六書表武后臣某言臣聞兩儀定位法象必在於區分百物正名稱謂不可以相奪然則當至公之運勿用於權處大朴之辰宜循其本臣竊見周官保氏教國子六書一曰指事二曰象形三曰諧聲四曰會意五曰轉注六曰假借夫假借者謂本無其字假用音者也昔伏羲氏仰觀法於天俯觀法於地爰造書契是生文籍夫書者著也篆者傳也所以昭著誓言傳之不朽推意結字斷天下之疑垂萌示象紀天下之德安可穿鑿音韻假濫言詞者哉自史籀篇亡李斯簡脫古文有數物類難周雖魯恭王壞孔子之宅河內女子毁老𣆀之家而屋壁之餘門庭蓋鮮敬侯所寫凋訛於正始之間汲冡所開散落於太原之際由是後儒晚學苦音訓之繁耆生故老嗟異同之雜下兼案牘旁洎質劑聽受施行莫能見曉規摹典憲於何取則不有釐改孰導羣疑當今受神册鑄寶鼎封禪之隆固將九皇比德文章之盛豈直三代同風百官以理萬人以察臣此一作比伏見御筆前後所製新字等神功開合天地盤旋於筆端玄造運行日月相望於紙上玉牒石記無以校其幽深河圖洛書不能方其麗則臣幸承皇訓親沐聖猷窺東國一札之文奉西京七言之詠劉德之陳雅樂雖未澄心劉儻一作黨之學史書頗嘗遊目輒欲循環睿旨罄竭蒙情凡所借音並加新字將令分有一定無汨於源流理或萬殊各隨其事業以此化俗佇微益於毫釐以此教人儻不虧於影響伏乞上玄卑聽至道曲成矜此庸愚霈然聽許臣即望以類撰綴隨了進呈輕觸冕旒不勝惶惕之至為河東副元帥馬司徒請刻御製針銘碑表德宗臣燧言臣前竊睹御製賜靈鹽節度使杜希全君臣針一篇輒請刻石於太原興王之都與玄宗所製起義堂頌碑並列垂訓後代光示萬邦伏奉批表及賜臣等手詔俯蒙允許仍賜臣一本又賜臣御製宸扆台衡銘二首并敘精義微言深于羲文之旨明訓大誡叶于舜禹之謨􅉼類表作函周詩而軼商頌凖天地而懸日月五彩彰施而溢目八音均調以動心至於上下咸和君臣交警僻邪無自而入猜虐不萌於中鬱堙底伏之氣宣強悍類表作憸巧讒諛之説泯援申甫以作誡紹唐虞而追蹤誠文教之極而至治唐諱之本也臣餘生陋質材朽功微陛下奬勵過深寵錫逾厚使得獲睹殊觀接聞至音目以勳賢稱其威武跪捧震駭顧循悚怍實願周旋奉戴內以為子孫藏恢演昭宣外以垂金石刻今者琢磨已就刋勒方施至於類表作其次序篇章論載年月未敢即定謹令圖畫進上仍請於碑首正面刻類表作利作御製針銘四字其下刻年號月日字建針銘二首并序其碑首隂面伏請凖起義堂頌碑例刻年號月日字建其下刻臣所上表疏伏蒙批表勑語及所賜臣手詔庶使後之觀者尋其并連究其本末以知盛德之事懿鑠丕顯遊揚無極臣之所願也不勝欣懼悃懇之至謹遣某官臣某奉表以聞臣誠歡誠喜頓首頓首謹言為中書門下請追尊號表宣宗杜牧臣某等言伏以收復河湟廊開土宇北絶梓嶺西過榆溪壯中夏起塞之雄奪西戎理弓之地至使強虜不敢觸鋒山鎖七關地闢千里歌貍首而息射詠杕杜以勞旋聖德神功超今越古某月日臣某等於延英殿面奉德音陛下以克定舊疆獲成先志歸功祖考追尊鴻名臣等伏念國家之為理也溢三皇之軌躅奮百代之上下天寶之未天下大集作泰寧恃富貴集作庶而醉飽非集作無虞韜干戈而凶逆僣作大歷貞元之際河北河南之地朝廷行姑息之政郡國皆叛亂之臣茍且之令行畫一之法廢日增月長雄唱雌和李錡宗子劉闢書生東據石頭西斷劒閣朝廷所有唯止西京伏惟憲宗皇帝順上帝之心酌列聖之法爵不踰德集作等舉不失賢親端莊之正人去側媚之邪士集作親莊正之人去側媚之士然後提挈綱紀震疊雷霆誅夷羣凶灑掃四海百度如律九功可歌天業益張聖統無極詩曰惠我無疆子孫保之復曰周雖舊邦其命維新伏惟元和之初集作功實開中興之業伏惟聖敬文思和武光孝皇帝陛下修先王之大道行天下之逹德廣問延諫褒直盡下首雪寃獄常對法官是集作則字虞舜恤刑文王慎罰無以過也開張聰明延納諫諍守職業者無職不舉被言責者無事不言皆獲甄升豈惟假借夫仲尼以三人有我師大禹以愚夫能勝豫是仲尼之好問大禹之拜言無以過也是以百姓手足皆安於錯置四海風俗益臻於和平尚猶子集作午夜觀書日昃聽政下採人病上求天端帝典曰聖敬日躋湯銘曰日日新是誠集無誠字陛下之德有以方之集作過之仲尼曰禹立三年百姓以仁遂仰陛下之至理知孔聖之可驗矣西戎強盛自古無之包有引弓之人盡臣集作為跨馬之國天下獻力備邉不克四海輸賦養兵不足廣川薦草盡為所有健兵倅馬不可當鋒雖李廣材能充國沉勇但能閉壁集作疊豈敢交綏伏惟聖敬文思和武光孝皇帝陛下畜睿算於雲集作霄漢之表畫聖謀於造化之先捕虜將軍射聲校尉羽林突陳之騎酒泉校尉集作射之兵親自指蹤同時受命信星效祉靈旗呈祥壁壘言言而洞開渠魁纍纍以集作而自縳解辮削袵投戈委弓懾怛威靈歡呼冠帶破種徙域空漠淨邉指北海而封燕然中西域而立幕府鄭吉之理烏壘班超之鎮他乾大庇生人一寬天下昔漢武帝之逐北虜四海耗半殷高宗之伐鬼方三年乃克尚書班史稱德詠功今陛下用仁義為干戈以恩信為疆場所求必至有開必先不遺一矢不頓一刃洗八聖廽首集作旰食之恨刷百年亡地之羞小雅盡興大業無極為而不有歸功先帝禮曰天子有善讓德于天仲尼曰武王周公其逹孝乎蓋以善於繼述能光祖考今者陛下謙讓之道符於禮經繼述之孝稱於孔聖臣等待罪宰相目覩升平謹具太常追尊順宗皇帝憲宗皇帝諡號如前伏候集作聽勑旨尚書易髙宗伐鬼方今云尚書得非通稱上古或逸書乎中書省請册皇后表錢珝臣某等言伏聞禮云男正位于外女正位于內乃欲承天休正人紀事宗廟奉蒸嘗是以詩有關睢貫三百篇之首用以佐天下而正夫婦乃政之所由興也伏以聖唐積仁纍德列聖重光莫不師古以訓人𢎞禮以敦本遂得九垓從化萬國用康曩者彛倫稍愆王道微缺使龍樓曠主鬯之位翟衣闕助祭之規則外和而國安內和而家理安得而致也必將有以待之伏惟陛下纘列聖之洪業恢百王之令圖爰建東宫再振墜典凡居寰海莫不欣歡百辟庶臣所懷尚慊蓋以中壼之位未立六宫之政未崇臣案天極四星一為正妃上天垂象不可虛其應伏聞淑妃某氏以坤厚之性母範有融淑懿之姿光乎內理用能誕生哲嗣克當天心竊願陛下思啓大猷仰𢎞丕訓淑妃某氏特依故事册為皇后使六宫之內一以遵承所為王政之所由興而風化天下臣等位叨近密職在絲綸朝廷舊章合有論請上期聖造特賜允從輕冒宸嚴無任恐戰之至史館王相公請册淑妃何氏為皇后表前人臣某言臣聞乾坤相配所以全覆載之功日月相隨所以明照臨之道惟王建后惟后助王若乾坤相配以成功若日月相隨而行道古皇有制歷代皆然伏惟皇帝陛下法天作聖引古為師興邦則啓於聰明為禮必循於先哲然則中宫久曠隂教罔修伏自纍朝遂同廢典四海絶仰觀之表九嬪無所統之尊誰詠國風空垂易象永惟委墜可謂因循漢氏以來舊章不易常先立后始可建儲今元良已視於東朝而柔順未臨於內職既虛正位莫敘大倫臣等每奉清光纍陳彛憲竊詳睿旨俯鑒愚衷請問守龜必當告吉掖庭纍行詎無白燕之徵簡策正名宜受金螭之錫是以敢干旒扆進拜封章伏乞申命有司擇定良日俾行盛禮自叶至公冒黷宸衷臣等無任懇迫惶恐之至文苑英華卷六百八
