body:
  text: 文苑英華卷八百八十三宋李昉等編將相一此下七卷英華所編失作者先後今正之太子少傅蘇環神道碑一首贈太尉裴神檢神道碑一首太子少傅蘇環神道碑盧藏用序張説銘維唐景雲元年嵗在庚戌十一月己巳太子少傅許國蘇公薨于崇仁里之私第春秋七十有二嗚呼哀哉一無此二字粵明年三月己酉制葬我公于武功之先塋禮也公諱環字昌容京兆武功人也其先出自帝高陽厥胤曰黎實勤火正逮昆吾之子始封於蘇以國受氏公其後也暨漢平陵侯子侍中嘉魏侍中則晉尚書遁聮華國圖代載明德公髙祖周度支尚書封國公諱綽立言成務垂法後王言曽祖隋尚書僕射開府儀同三司雍州牧諱威嘉謨成績懿于當代大父隋尚書職方郎中鴻臚卿諱夔理綜羣品識覃衆妙烈考祕書丞沁台二州刺史追贈岐州刺史逰藝聚學素風不隕一作隤公系上聖之遐緒鍾盛德之衆茂資元和以體仁穆清明以成美初孩而孤稟絳郡夫人之慈訓幼而岐嶷聰敏冠常始讀山棲志一覽便誦及長博通經史尤善屬詞年十八進士髙第補寧州參軍轉恆州司法丁絳郡夫人憂自中出涉寒從至京兆哭不絶聲性以禮全形以哀瘠左庶子張大安以孝悌上聞服闋拜恭陵丞轉相王府録事王改封豫官亦隨府上帝即拜朝散大夫尚書水部員外郎未幾兼侍御史淮南亷按俄轉闕官員外郎兼官尹丞歷水部祠部郎中兼判司禮事以親聮出為朗州刺史轉歙州刺史武興令檢校冀州刺史纍遷汾鼎同汴楊䦼以纍最入為尚書又拜右丞加銀青光祿大夫遷尚書左丞戶部尚書又拜侍中京師留守兼理寃滯車駕還京持節河比安撫加金紫光祿大夫轉吏部尚書東都留守尋追還守本職尋拜尚書右僕射同中書門下三品封許國公修國史今上踐祚拜尚書左僕射屢抗詞乞骸優答不許拜太子少傅公長子頲歷給事中中書舍人嘗與公聮侍紫墀接機黃閣前後之拜近古未有公體道貞固立志一作心簡直多識前言遍詳舊事自周隋損益家牒可紀公則紹之罔不畢綜故閨門之內孝悌成則朋友之間忠信克舉其在參佐也婉孌柔嘉醜夷不爭其事藩邸也從容諷議賔僚是仰四為郎而彌綸之功布于省閣九為牧而循良之績著于州郡周旋二轄焞耀文昌回翔兩宫耀鑠巖廟版圖國之信而五教在寬冡宰人之紀而九流式敘左右端揆盡訐謨之略東西掖闈備忠讜之美德逾盛而心益下位彌大而行益恭用能髙而不危長守冨貴考父三命謙光數朝平仲一心中孚纍聖非至德淑慎疇至此哉夫其仁恕篤密清亷簡惠躬儉約以自持蹈名教以檢物祿以周給不積於家財以睦親必均於衆故義廣而私謁之途阻名揚而兼濟之道宣茲亦叔敖之賢國僑之懿也幾深通志精晤默識然文以跖迹一作實靡絢其華學以辨微固伸於已故始終機揆舉無遺䇿斯又子房之智孔明之能也造膝沃心務存匡救引過稱善不近於名故聲聞於天而口無擇績宣于事而心罔專蓋叔子之仁孔子之慎也兼斯衆善以享明德方將三階載理兩宫更曜天命不祐奄忽遷殂朝喪其楨人隕所戴天子悼焉臨遣大府卿李從逺策書吊祭輟朝三日有司備禮發哀追贈司空荆州大都督賻絹八百假米粟八百石凶事葬事並官給賜東園祕器大鴻臚卿監護官為立碑皇太子别次發哀遣洗馬吊祭賻物二百假羲和擇日太常考行朱旗載路班劔啓行哀榮之禮備矣諸侯之孝終矣公家代尚儉載在縑竹是疑作其生也門無主賔堂無客其終也塋無封樹隧無碑表大漸之始遺令遵行頲等泣血受命罔有踰越雖逼朝旨不旌墳壙建碑于塋北一十五里故文藝之行經緯之迹雖備于國章布在人口懼違先訓皆略而不書中書侍郎同中書門下平章事范陽張公雅俗之鎮具瞻令德文章之雄談者為楷偉公道德之首徽猷可行刋石紀頌穆如淸風頌曰一作其詞曰斤斤蘇公正體張集作體正含道稟靈淳粹為唐元老忠以衛主孝以立身文以經國惠以安人司牧九郡九郡爰靜平章百工百工爰整千載典憲三朝綱領上慕先人五代相國下垂餘慶七子令德帝謂庭碩伊公是似一作以非接侍玉墀序拜金戺聮華疊潤佐我天子於戲彼蒼國幹云亡地頺五獄天折三公備禮詔葬群官會喪掌史司德刋銘路傍贈太尉裴行儉神道碑張説星辰玄集作懸象所以殷時布氣然而行不言之道者天也文武用才所以勤官定國然而收集有致字無為之理者帝也當高宗之休運任名世之良臣清九流而闢四海代天工而張帝德歷選前哲豈多乎哉公諱行儉字守約河東聞喜人也其先出于嬴姓伯益之後也秦則裴侯始封漢則侍中受職魏晉之代鬱為盛門八裴方於八王聲振海內三子尊為三祖望高士族自冀州刺史徽至公十二代中軍將軍雙虎唐諱至公六葉代無遺德不隕厥問者已大王父伯鳳周驃騎大將軍光汾二州刺史琅邪郡開國公大父定高大將軍馮翊郡守襲琅邪郡公諸侯受封山河傳國天子共理循良克家考仁基隋左光祿大夫以隂圖王克伏義拔舊主遭時不利玉折名揚聖唐龍興旌淑勵節贈原州都督命諡曰忠盡集作蓋春秋之褒也公清明本乎世德正性出乎胎教氣潤河靈貌雄嶽立仁孝之道天生而知將相之器與年俱長以高蔭為𢎞文生絶事篤學纍年不舉房僕射異而問焉對曰隋室喪亂家亡集作乏典籍館有良書探討未遍故少留耳梁公驚曰驥子志氣凌雲一日千里其早為通人之目也如是明經補左屯衛倉曹詔舉轉雍州司士選金部户部二員外歷都官郎中長安令明慶中與長孫太尉禇河南論及中宫廢立國家憂患有公伯僚譛行於季氏出為西州長史又改金山副都護又拜安西大都護西域從政七八年間窮荒舉落重譯向化我之獨賢邉之多幸乾封嵗徵為同文少卿尋除司列少常伯官復舊號為吏部侍郎加銀青光祿大夫自居銓管大設綱綜辨職差才審官序爵法著新格言成故事上元中長星出天秃髮入塞詔公為洮州道左軍總管又為秦州鎮撫右軍總管並受元帥周王節度雖祭公有諫耀武之事不行而方叔陳集作帥師來威之道備矣儀鳯二年十姓生可汗匐延都支為集無此字裴行儉傳作及李遮匐潛構犬戎俶擾西域朝廷慿怒將行天討公進議曰敬玄敗績於茅戎審禮免胄而入狄豈可絶域更勤集作貫王師今波斯王亡侍子在此若命使册立則路由二蕃便冝取之是成擒也高宗善其計詔公以名册送波斯兼安撫大使公往蒞遺愛洽於人心是行也百城故老望塵而雅拜四鎮酋渠連營而􅖴酒一言召募萬騎雲集公乃解嚴以反諜託獵以訓旅誤之多方間集作聞其無備裹糧十日執都攴於帳前破竹一呼鉗遮匐於麾下華戎相慶立碑碎葉蓋美克雋不殺而是講集作用謀要集作安人以德而去害審集無此字廓氛祲於地表燀皇靈於天外充國有屯田之頌竇憲有燕山之銘訂集作詢茲逺略彼何微也遷禮部尚書加上柱國又特降恩命兼右衛大將軍夷典秩宗神必據我文昌有將天道存焉調露中單于可汗伏念外叛大鴻臚蕭嗣業喪律詔公為定襄道大總管軍至朔州斥堠相接胸奴故態狃劫糧以餒師神將出竒張虛勢以陷敵偽為轉運伏其壯士示羸師以綏行隱精騎以躡迹冦果大下援兵奔散驕虜益驁自為得色驅此車牛憩彼泉井於是箱中兵起千弩齊發要路騎飛一息而至群胡顛沛殺傷滿野從此饋運路無驚者觀夫大漠無倪穹廬靡所追之逃遁捨之慿陵費日老師兵家所病公潛使緩頰均其利心深圖既入狼意亦改及委罪衙官隂送降欵公密上其事人莫之知及如所期舉國歸附煙塵大起師徒惶惑公徐使令軍曰此是伏念執溫傳來降非他冦也俄而銜璧轅門釋縳納欵帝加厥勳命尚書崔知悌乘馹勞軍備禮獻凱册勳之日程務挺張虔朂者行軍之偏將也訴言子勞集作營逼逐闕降大軍又屬秉鈞忌才上下其手公曰雖不逮羣師之讓功集作力猶恥與二王之競力集作功今而殺降後無來者乃封公聞喜縣開國公而伏念溫傳皆戮都市是年也伏念弟元珍擁其餘種復叛則天稱制追正宿枉贈伏念太僕卿程張諸家别故夷族君子以為神理之不可誣也永淳元年詔公為金牙道大總管未行遘疾四月二十八日薨於京師延夀里春秋六十有四長子貞隱早卒嫡孫闕玄嗣封藐是諸孤哀哀童幼髙宗悼焉贈幽州都督賜凶儀還鄉喪葬官供禮部郎中監護窀穸之數率禮有加别勑留守委皇太子擇六品京官一人檢校家事五六年間待兒孫稍成長日停寵極哀榮禮之厚者澤周集作及存沒義莫重焉太常議諡博古多能文武表式曰憲其年十月葬我憲公於聞善之東良原禮也神龍中興朝思舊德贈公揚州大都督開元孝享皇帝辛集無此三字宰嗣延恩贈公太尉生不登于集作乎台階沒追位乎靈庠序四時於地下集作下之調三光於天上集作上天聖人神教意在兹夫公志堅慮精神勇識徹藝必討本學皆覩奧又善測候雲物推步氣象鬼無遁謀靈不藏用著文集二十卷造草字數千文皆寶傳人間以為代法又撰譜十卷又為軍營行陳部衆料敵等四十六訣大聖天后令祕書監武承嗣就家取進以為密祕述三字集作祕術豈比馬卿浮華難留封禪之草劉安虛誕空傳鴻寶之書而已哉加以汲引沉淪推奬氣類虛懷而襟帶不設𢎞亮而城集作藏府洞開故虎旅雲從詞林響應若羽毛之宗麟鳯衆川之長江河也在選曹見駱賔王盧照鄰王勃楊炯評曰炯雖有才名不過令長其餘華而無集作不實鮮克令終見蘇味道王劇嘆曰十數年外當居衡石後各如其言其在軍麾擇帳下之士則有張知運薛訥閻敬客井元暕裴思諒王智方吕休璟劉玄意引偏禆之將則有程務挺張虔朂王方翼崔智辨黨金毗郭待封劉敬同李多祚黑齒常之凡所進拔盡為名將此則有道之人倫武侯之賞鑒也公之送波斯也入莫賀延闕中遇風沙大起天地暝晦引道集作遵皆迷因命息徒至誠虔禱徇於衆曰井泉不逺須臾風止氣開有香泉豐草苑在營側往來之人莫知其處此乃耿公之拜井商人之化城也公在禮闈敕賜善馬及寶鞍令史奔馳馬倒鞍破懼而逃罪公使詔之曰知汝誤耳又平都攴遮副大獲珍異酋長將吏請遍觀焉有馬腦大盤希代之寶也隨軍王休烈捧盤跌倒應時而辟叩頭流血惶怖請死公笑曰事有不意何至重玉而害人乎此又文饒之含容邴吉之仁恕也公西擒都攴北降伏念前後錫馬五百匹僮二百人金銀器物三千器錦罽織皮三百假公受置庭中旬日散盡此又趙屠之待士田文之市義也若夫知人以為本感通以為行善貸以為常散積以為樂古之友道者從事於斯矣公元夫人河南陸氏兵部侍郎爽之女也陸氏卒繼室以華陽夫人厙狄氏有任姒之德班左氏之才聖后臨朝召入宫闕拜為御正中宗踐祚歸養私門嵗時致禮媧皇集作后補天進參十亂少康嗣夏退叶三從晉朝公卿列拜虞潭之母周官音注近同韋逞之家皇上臨極旁求隂政再降綸言將留內輔夫人深戒榮滿逺悟真筌固辭羸憊超謝塵俗每讀信行禪師集録永期尊奉開元五年四月二日歸真京邑其年八月遷窆之於終南山鴟鳴堆信行禪師靈塔之後古不合葬魂無不之成遺志也長子參玄官至涇鄧二州刺史聿修厥德人亡道存次子延休并州文水令世載文雄家傳草聖次子慶逺協律郎深逹禮樂克和神人咸負長才同淪短運季子光庭侍中兼吏部尚書輔政雍熙致君堯舜孝理發乎陵廟仁澤遍乎松檟是故妻以夫榮母以子貴以集無以字尚書先贈方伯申命上公夫人舊封華陽增號晉國詩云文武吉甫萬邦之憲上公有焉又曰彼美孟薑德音不忘小君有焉孝經云立身行道以彰集作顯唐諱父母侍中有云合三德而為家橫百代而濟美信可以言時稱代鏤石刋金者歟神道前銘薛令所撰具有後命俾余係述馬遷世家益孟堅之一傳劉寬表墓並伯喈之兩碑報德教忠俱傳不杇銘曰天生亞聖祚此王國文綜九流武參七德柔逺服叛窮西盡北赫我皇靈去其蝥賊仁則不逺智何不周如山之峻如川之流術與神合藝將道逰書來懸帳賊出登樓司馬軍陳官人紀綱帝加常伯國于聞喜室有令妻家成克子社金傳世桓圭守祀神道集作為上台永介邦祉文苑英華卷八百八十三
