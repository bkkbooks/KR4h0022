body:
  text: 文苑英華卷三百七十三宋李昉等編諷諭一截冠雄雞志一首説鶻一首羆説一首捕蛇者説一首紀梟鳴一首養狸述一首紀稻鼠一首蟹志一首禽暴一首截冠雄雞志李翺翺至零口北有畜雞二十二者七其雄十五其雌且啄且飲集作且飲且啄而又狎乎人翺甚樂之遂掬粟投于地而呼之有一雄雞人截其冠貌若營羣望我而先來見粟而長鳴如命其衆雞衆雞聞而曹奔於粟既來而皆惡截冠雄雞而擊之而曵之而逐出之已而競還啄其粟日之暮又二十一其羣栖于楹之梁截冠雄雞又來如慕侶將登于梁且棲焉而仰望焉而旋望焉而小鳴焉而大鳴焉而延頸喔咿其聲甚悲焉而遂去焉至集作者于庭中直上有木三十餘尺鼓翅哀鳴飛而栖其樹顛翺異之曰雞禽于家者也備五德者也其一曰見食命侣義也截冠雄雞是也彼衆雞得非幸其所呼而來耶又奚為既來而共惡所呼者而迫之耶豈不食其利背其惠耶豈不畏喪其見食命侣之一德耶且一作是何衆栖而不使偶其羣耶集作也或告曰截冠雄雞客雞也豫里東鄙夫曰陳氏之雞焉死其雌而陳氏寓之于我羣焉勇且善鬪家之六雄雞勿敢獨校焉且其集作是以曹惡之而不與同其食及棲焉夫雖善鬪且勇亦不勝其衆而常孤遊焉然見食未嘗先啄而不長鳴命侣焉彼衆雞雖賴具召召集無此字既至反逐之昔日亦猶是焉截冠雄雞雖不見答然而其迹未曾變移焉翺既聞之惘然感而遂傷曰禽鳥微物也其中亦有獨稟精氣義而介焉者客雞義勇超於羣羣皆妬焉尚不與儔焉况在人乎哉况在朋友乎哉况在親戚乎哉况在鄉黨乎哉况在朝廷乎哉由是觀天地之集無之字間鬼神禽獸萬物變動情狀其可以逃乎吾心既傷之遂志之特集作將用警豫且可以作鑒于世之人説鶻栁宗元有鷙曰鶻者穴於長安薦福浮圖有年矣浮圖之人室于集作宇於其下者伺之甚熟為余説之曰冬日之夕是鶻也必取鳥之盈握者完而致之以燠其爪掌左右而易之旦則執而上浮圖之跂焉者縱之延其首以望極其所如往必背而去之焉苟東矣則是日也不東逐南西北亦然嗚呼孰謂爪啄毛翮之物而不為仁義器耶是故無號位爵祿之欲里閭親戚朋友之愛也出乎鷇卵而知攫集作摶字食決裂之事爾不為其他凡食類之飢唯旦為甚今忍而釋之以有報也是不亦卓然文粹作絶有立者乎用其力而愛其死以忘其飢又逺而違之非仁義之道耶恆其道一其志不欺其心斯固世之所難得也余又疾夫今之説曰以喣喣而默徐徐而俯者善之徒以翹翹而厲炳炳而白者暴之徒今夫梟鵂晦於晝而神於夜鼠不穴寢廟循墻而走是不近於喣喣者耶今夫鶻其立躍然其動砉然其視的然其鳴革然是不近於翹翹者耶由是而觀其所為則今之説為未得也孰若鶻者吾願從之毛耶翮耶胡不我施寂寥泰清樂以忘飢羆説鹿畏貙貙畏虎虎畏羆羆之狀被髮人立絶有力而甚害人焉楚之南有獵者能吹竹為百獸之音嘗集作昔云持弓矢罌火而即之山為鹿鳴以感其類伺其至發火而射之貙聞其鹿也趨而至其人恐因為虎而駭之貙走而虎至愈恐則又為羆虎亦亡去羆聞而求其類至則人也捽搏挽裂而食之今夫不善內而恃外者未有不為羆之食也捕蛇者説永州之野産異蛇黑質而白章觸草木盡死以齧人無禦之者然得而臘之以為餌可以已大風攣踠瘻癘去死肌殺三蟲其始太醫以王命聚之嵗賦其二募有能捕之者當其租入永之人爭奔走焉有蔣氏者専其利三世矣問之曰吾祖死於是而吾父死於是今吾嗣為之十二年幾死者數矣言之貌若甚戚者余悲之且曰若毒之乎余將告于蒞事者更若役復若賦則何如蔣氏大戚汪然出涕曰君將哀而生之乎則吾斯役之不幸未若復吾賦不幸之甚也嚮吾不為斯役則久已病矣自吾之三世居是鄉積於今六十嵗矣而鄉鄰之生日蹙殫其地之出竭其廬之入號呼而轉徙飢渴而頓踣觸風雨犯寒暑呼噓毒癘往往而死者相藉也曩與吾祖居者今其室十無一焉與吾父居者今其室十無二三焉與吾居十二年者今其室十無四五焉非死而徙爾而吾以捕蛇獨存悍吏之來吾鄉呌囂乎東西隳突乎南北譁然而駭者雖雞狗不得寧焉吾恂恂而起視其缶而吾蛇尚存則弛然而卧謹食之時而獻焉退而甘食其土之有以盡吾齒蓋一嵗之犯死者二焉其餘則熙熙而樂豈若吾鄉鄰之旦旦有是哉今雖死乎此比吾鄉鄰之死則已後矣又安敢懼毒耶余聞而愈悲孔子曰苛政猛於虎也吾嘗疑乎是今以蔣氏觀之猶信嗚呼孰知賦斂之毒有甚是蛇者乎故為之説以俟夫觀人風者得焉紀梟鳴林簡言東渭橋有賈食於道者其舍之庭有槐焉聳幹舒柯布葉凝翠若不與他槐等其舍既陋主人獨以槐為飾當乎夏日則孕風貯涼雖髙臺大屋諒無慙德是以徂南走北步者乘者息肩於斯稅駕於斯亦忘舍之陋長慶元年簡言去鄜得息其下觀主人德槐之意亦髙臺大室者也洎二年去夏陽則槐薪矣屋既陋槐且為薪遂進他舍因問其故曰某與鄰俱賈食者也某以槐故利兼于一作豫鄰鄰有善作梟鳴者每伺宵晦輒登樹梟鳴凡側于樹若小若大莫不凛然懼悚以為鬼物之在槐也不日而至也又私於巫者俾於鬼語槐於去梟不息主人有母者且瘵慮禍及母遂取巫者語後亦以稀賔致困簡言曰假為梟鳴滅樹殃家甚於真梟非聽之誤耶然屈平謇諤非不利於楚也靳尚一梟鳴而三閭放楊震訏謨非不利於漢也樊豐一梟鳴而太尉死求之於古主人亦不為甚愚養狸述舒元輿野禽獸可馴養而有禆於人者吾得之於狸狸之性憎鼠而喜愛其體趫其文班豫愛其能息鼠竊近乎正且勇嘗觀虞人有生致者因得請歸致新昌里客舍舍之初未為某居時曽為富家廪墉堵地面甚足鼠竅穴之口光滑日有鼠絡繹然某既居果遭其暴耗常白日為羣雖敲拍叱嚇略不畏忌或暫黽侻跧縮須臾復來日數十度其穿巾孔箱之患繼晷而有晝或出遊及歸其什器服物悉已破碎若夜時長留缸績疑作續晨與役夫更吻驅呵甚擾神抱有時或缸死睫交黑暗中又遭其緣榻過靣泊泊上下則不可奈何或知之借櫝以收拾衣服未頃則櫝又孔矣豫心深悶當其意欲掘地誅剪始二三十日間未果頗患之若抱癢疾自獲此狸嘗闔關實竇縱於室中潛伺之見軒首引鼻似得鼠氣則凝蹲不動斯須果有鼠數十輩接尾而出狸忽躍起堅瞳迸金文毛磔班張爪呀牙劃泄怒聲鼠黨帖伏不敢竄狸遂搏擊或目抉牙截尾捎首擺瞬視間羣鼠肝腦塗地逮夜始背缸潛窺室內灑然豫以是益寶狸矣一作命常自馴飼之到今僅半年矣狸不復殺鼠鼠不復出穴穴口有土蟲絲封閉欲合嚮之韞櫝服物皆縱橫拋擲無所損壞噫微狸鼠不獨耗吾物亦將咬嚙吾身矣是以知吾得高枕坦卧絶瘡痏之憂皆斯狸之功異乎鼠本統乎陰蟲其用合晝伏夕動常怯怕人者也向之暴耗非有大膽壯力能凌侮於人以其人無禦之之術故得恣橫若此今人之家苟無狸之用則紅墉皓壁固為鼠室宅矣甘醲鮮肥又資鼠口腹矣雖乏人智其奈之何嗚呼覆燾之間首圓足方竊盜聖人之教甚於鼠者有之矣若時不容端人則白日之下故一作此字得騁於陰私故桀朝鼠多而關龍逢斬紂朝鼠多而王子比干剖魯國鼠多而仲尼去楚國鼠多而屈原沉以此推之明小人道長而不知用君子以正之猶嚮之鼠竊而不知用狸而止遏縱其暴橫則五行七曜亦必反常於天矣豈直流患於人間耶某因養狸而得其道故備録始末貯諸篋內異日持諭於在位之端正君子化稻鼠陸龜蒙乾符已亥嵗震澤之東曰吳興自三月不雨至於七月常時汙拗沮洳者埃􅝙坌勃棹楫支𣲖者入扉屨無所汙農民轉逺流漸平聲潤集無此字稻本晝夜如乳赤子欠欠然救集作極渴不暇僅得葩折穗結十無一二焉無何羣鼠夜出嚙而僵之信宿食殆盡雖廬守板擊驅而駭之不能勝若集作苦官督户責不食者有刑當是而賦索愈急棘束械榜箠木肌集作脛頸者無壯老吾聞之於禮曰迎貓為食田鼠也是禮缺而不行久矣田鼠知之復集作後歟物有時而暴歟政沓貪而廢一作發歟國語曰吳稻蟹不遺種豈吳之土鼠與蟹更伺其事而效其力殱其民歟且魏風以碩鼠刺重斂碩鼠斥其君也有鼠之名無鼠之實詩人猶曰逝將去汝適彼樂土况集作矧字乎上招其財下啖其食率一民而當二鼠不流浪轉徙聚集作徒字而為盜何哉春秋螽蝝生大有年皆書是聖人於豐凶不隱之驗也余通於春秋又親蒙其災於是乎記蟹志蟹水族之微者其為蟲也有籍見於禮經載於國語揚雄太玄辭晉春秋勸學等篇考於易象為介類與龜集作用與字非鱉剛其外者皆乾之屬也周公所謂旁行者歟參於藥録食疏蔓延乎小説其智則未聞也唯左氏紀其為災子雲譏其躁以為郭索後蚓而已蟹始窟穴於沮洳中秋冬交必大出江東人云稻之登也率執一穗以朝其魁然後從其所之蚤夜觱沸指江而奔漁者緯蕭承其流而障之曰蟹斷音煆斷音短其之江之故文粹無故字道焉爾然後扳援文粹作奔紛越軼遁而去者十六七文粹作八九既入于江則形質寢大於舊自江復趨于海如江之狀漁者又斷而求之其越軼遁去者又加多焉既入於海形質益大海人亦異其稱謂矣嗚呼穗而朝其魁不近於義耶捨沮洳而之江海自微而務著不近於智耶今之學者始得百家小説而不知孟軻荀楊氏之道或知之又不汲汲於聖人之言求大中之要何也百家小説沮洳也孟軻荀楊氏聖人之瀆也六籍者聖人之海也苟不能捨沮洳以集作而求瀆由瀆而文粹作以至于海是人之智反出水集作介蟲下能不悲夫吾是以志其蟹禽暴冬十月豫視穫于甫里旱苖離離年無以支憂傷于集作盈懷夜不能寐往往聲類暴雨而疾至者一夕凡數四明日訊其氓曰鳬鷖也其曹蔽天而下蓋田所當之禾必竭穗而後去曰得無弋羅者捕而耗之耶對曰江之南不能弋羅常藥而得之㯅㯕上箆下西塗枝叢植于陂一中千萬膠而不飛是藥也出於長沙豫章之涯行賈貨錯嵗售於射鳥兒盜興已來蒙衝塞江其誰敢商是藥既絶群鳬恣翔幸不充乎口腹反侵人之稻粱豫曰嘻失馭之民化而為盜關梁急征商不得行使江湖小禽亦肆其暴以害民食古聖人驅害物之民出乎四裔况害民之物乎俾生靈之衆死乎盜死乎飢吾不知安用馭者為文苑英華卷三百七十三
