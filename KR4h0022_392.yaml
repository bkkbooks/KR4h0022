body:
  text: 文苑英華卷三百九十二宋李昉等編南省八兵部員外郎授楊仲昌吏部員外郎李巖兵部員外郎制孫逖門下左司員外郎楊仲昌朝散大夫户部員外郎李巖等雅才明識敏行能文修身懷止水之清應物有操刀之利並膺時選所謂人英宜遷禮闈之秩更展劇曹之用仲昌可吏部員外郎巖可兵部員外郎散官各如故授敬羽武部員外郎兼殿中侍御史制賈至勑攝武部員外郎朔方採訪等使敬羽美才多適直道滅私通明可以斷疑貞固足以幹事自持風憲糾逖回邪不吐茹於剛柔有鷹鸇之搏擊與能褒美俾轉臺端載執謙光思𢎞讓節宜遂其懇志退守本官可守前官授柏耆兵部員外郎制元稹勑守起居舍人賜緋魚袋柏耆朕聞亟遷則彛倫斁滯賞則勞臣怠兼用兩者謂之政經夫南憲右掖至于中臺我朝之極選也俾爾環歲之內周歷兹任豈無意焉元和中盜殺丞相賊集作疾傷議臣齊冀之間交以禍端相嫁耆自青溪窖中提轉丸押闔之書馳於諸鎮使承宗疑否隔塞一朝豁然納質獻地克終於善承宗既歿承元授事耆又將朕教告命于承元萬衆無一作喧非譁一方底定此而不録將何以勸凡百多士無忘急病之心可守尚書兵部員外郎授李虞仲兵部員外郎崔戎户部員外郎制白居易勑劔南西川節度判官朝散大夫檢校尚書户部員外郎兼侍御史上柱國賜紫金魚袋李虞仲劔南西川觀察判官朝議郎檢校尚書刑部員外郎兼侍御史雲騎尉賜緋魚袋崔戎等去年春朕憂西南事授丞相文昌鉞往鎮撫之次選郎吏有才實如虞仲輩者往贊理之故其制云苟佐吾丞相以善政聞寧久遺汝於諸侯乎今蜀政成矣蜀人乂矣是汝輩職修事舉而奉吾詔書甚謹也一作矣前言在耳安可弭忘並命為郎主吾信賞虞仲可行尚書兵部員外郎戎可行尚書户部員外郎散官勳各如故授前司勳員外郎賜緋徐綰兵部員外郎前庫部員外郎李光嗣右司員外郎等制前人勑具官徐綰以丞相之子為尚書郎人得見於會朝而不得見於私室其言不敢近政其動未嘗違謙用是寡尤式彰能訓論者美宣祖大臣以至行移風稱易名者必曰光嗣之王父也爾克敬有後敏以自圗多所周防恐墜遺法而皆以去列可使陟居武庫部都曹郎選惟重並舉而授無墮當官可依前件授司封員外郎賜緋崔貽孫守兵部員外郎判户部案制錢珝勑具官崔貽孫冠族以德範遺後昆者剛鯁清素代稱爾家又能樹立本根嗣守風法為士之道自求必聞故朝缺美官人思公舉今丞相以版賦之重用爾為佐理之才更遷右曹往事吾相無謂司貨籍者近乎俗吏而忽於躬親使滋其煩弊也可依前件職方員外郎授李何忌職方員外郎制賈至誥右補闕李何忌後進人物一時雋選或丕承清緒多負美才或直言正詞有犯無隱或繡衣持斧擲伏擒姦或馳譽翰林文詞藻麗或知名吏道政事詳密在邦必達歷試有聞宜居鴛鷺之列俾𢎞準繩之紀可試職方員外郎駕部員外郎授趙升卿駕部員外郎制蘇頲勑朝議郎前行兵部員外郎上柱國趙升卿爰以詞學亟兼文吏踐行貞固用心純密校人祗事郎位求才宜膺賜筆之榮重陟含香之列可行尚書駕部員外郎散官勳如故庫部員外郎授崔玄暐庫部員外郎制李嶠鸞臺朝散大夫行尚方監丞崔玄暐理懷沉正文藝優深內府策名已馳聲績中臺揆務更佇良能宜收起草之才俾升握蘭之位可行文昌庫部員外郎散官勳如故主者施行授趙良弼司庫員外郎制賈至勑攝河東司馬趙良弼以敬直方內義形於色藴帷幄之謀略真一作是士林之忠良元戎起行師出以律將謀韓厥之職宜選子方之智俾登仙署仍佐中權可行司庫員外郎充朔方行軍司馬刑部員外郎授張景升刑部員外郎制蘇頲門下太中大夫尚書都官員外郎上柱國張景升操履精密刑書洞曉自遷郎位咸服吏能用於噬嗑必資哀敬丕蔽之審惟才是擇可行尚書刑部員外郎散官勳如故授柏庭昌憲部員外郎制賈至勑監察御史柏庭昌吏道稱優公才致逺文法之用蓋推於友朋操割之能亦聞於臺省仙郎之選人譽是歸道有籍於簡孚官不循於資序當兹清職冝最愼擇可憲部員外郎授崔殷刑部員外郎制常衮敕朝議大夫試太子舍人兼殿中侍御史崔殷學義精深詞華絢集作縟麗臺郎髙選清論洽於朝倫郡掾左遷善聲彰於時聽頃從奬序未副才名亟集作冝膺新命俾光舊列可行尚書刑部員外郎散官如故授王鎰刑部員外郎制白居易敕刑曹外郎缺朕詔執事擇可以善於其職者而殿中侍御史王鎰自居殿中能察非法連鞫庶獄多叶平允一作反加以溫敏靜專可當是選一歲之獄決在秋冬今方其時宜敬乃職可依前件授李行修刑部員外郎制李虞仲敕登仕郎殿中侍御史內供奉護軍李行修沉正為質發強於用敏識可以周務懿文可以誠身連擢憲闈聲績甚茂近以江淮災旱眷切疲黎舉爾忠實往申慰撫攪轡有恤人之色登一作旋車多濟物之心一作方既表嘉庸仍當滿秩一作歲優其遷擢以勸公勤刑曹詳讞之難郎署彌綸之重斯為盛選無愧當官可守刑部員外郎散官勳如故授李朋刑部員外郎李從晦都官員外郎等制杜牧敕書曰庶獄庶事豫罔敢知此乃周文王之所以理天下也惟獄惟事會於南宫求郎之難豈敢輕易將仕郎侍御史內供奉李朋能積行實發其詞華徑正端愼官業克舉天平軍節度副使朝議郎檢校尚書祠部員外郎兼侍御史賜緋魚袋李從晦宗室子弟美秀而文嘗經磨涅不改堅白今者取自憲府擢於幕吏各有所授皆為清秩當自宣室受讞之際思滿堂飲酒之言至於刑章尤繫念慮豫曰罪爾勿罪豫曰寬爾勿寬問法何如無即上意各冝勉勵勿自輕怠朋可守尚書刑部員外郎散官如故從晦可守尚書都官員外郎散官賜如故都官員外郎授苗發都官員外郎制常衮敕朝散大夫前守祕書丞龍門縣開國男苗發德厚流光相門才子代重一經之業家承萬石之風理詣精微行歸純至麗以文藻振以英華端其誠而有恆敏於事而兼適早登學省用汰儒流喪紀外除素冠未改弟兄有裕清論多之處以彌綸之職當兹俊茂之選可行尚書都官員外郎賜緋魚袋散官封如故授侍御史沈栖逺右司員外郎殿中張玄晏都官員外郎制薛廷圭勑具官沈栖逺等由御史屬為尚書郎選擢之重難踐歷之清切所以廣育材之道也以栖逺清白嚮正藝實揚名魯人將以為木鐸太一下傳其洪範石渠鉛槧諫署淹翔動靜有常職業惟允以玄晏詞無枝葉道有汙隆履君子之中庸練國朝之故實直方之氣僉論多之文藝之優前輩髙許而皆乘驄衣繡為我憲臣指佞埋輪恪居官業疇其久次爰俾序遷勉思伏奏之勤無忘率職之重可比部員外郎授莫藏用比部員外郎制常衮勑朝議郎檢校尚書倉部員外郎兼侍御史充稅青苗錢使判官賜緋魚袋莫藏用飾以文行敏於理道集作政理自執霜簡頗振風憲頃馳輶一作輅軒尤詳使命務辨斯切集作尤詳使務倚辨斯切積勞有成宜正列星之次俾承賜筆之寵可行尚書比部員外郎散官如故授張勝之比部員外郎制李虞仲勑宣武軍節度判官朝議郎檢校尚書户部郎中兼侍御史賜緋魚袋張勝之卑以自牧文而有禮既踐憲臺遂參相府事人見必盡之操在醜有不爭之美尚書列屬分曹蒞職聽其會計以考歲成擢用為郎是稱清選勉一作謹爾從政以體輿議可行尚書比部員外郎散官賜如故授李渾比部員外郎等制崔嘏勑著作郎李渾等台庭積慶文苑馳聲玉讓其溫華山挺其芳茂幼聞詩禮在家推鯉也之賢夙稟清英行已有藹然之譽蓬丘探討蓮府周旋頗聞編軸之功雅得副車之體綱曹妙選粉帳華資方承綵服之榮共許應星之美為郎匪因於父任題柱自奏於帝知勉服鴻休更觀驥騁可依前件司門員外郎授髙𢎞簡司門員外郎判度支案制前人勑司國計者統天下之財貨量入以為用在於賦有餘也事歸一途故必馭一作取其強力多聞分掌簿籍俾操剸無滯精明莫欺𢎞正上言以爾嘗居憲署亦領郡符通於吏術素傳儒業是可以分列宿之位理聚人之財爾其佐我才臣資於國用無俾健酷以罔遺利可依前件工部員外郎授李全昌工部員外郎制蘇頲門下朝散大夫殿中侍御史李全昌措懷條暢臨事明允執憲繩違以文從吏五材審用百工為職握蘭之美賜筆攸歸可行尚書工部員外郎散官如故主者施行授李岑工部員外郎制賈至勑京兆府兵曹參軍李岑敏而好學出言有章纍登甲乙之科嘗居匡輔之任雋才利器在邦必聞俾振翮於仙署用揚光於列宿可工部員外郎授羅讓工部員外郎制元稹勑義成軍前度支判官朝議郎檢校刑部員外郎兼侍御史上柱國賜緋魚袋羅讓昔陶𢎞景一代髙人始願四十為尚書而猶不遂國朝選署尤用其良以爾讓敏而好學直而能溫甲乙亟登班資歷踐頃將軍辟士權資孫楚之坐籌今會府掄材復奬馬宫之射策無忘辨護以宣程品日省月試用勸百工可尚書工部員外郎屯田員外郎授遊子騫屯田員外郎制蘇頲敕通直郎行殿中侍御史河北道度支營田使遊子騫在公必愼臨事克誠言用身謀智為心計頃持憲簡嘗騖使車往則甄明動惟𢎞益宜登仙署之列佇揔公田之事一作重可尚書屯田員外郎散官如故授宋晦屯田員外郎制賈至敕行殿中侍御史宋晦質性溫敏行能詳實再策名於霜簡久更事於輶軒理必有常條而不紊禮闈舉直郎署求才俾廽秋憲之威以佐冬官之屬可屯田員外郎授蘇彰總目作漳屯田員外郎制崔嘏敕具官蘇彰嘗以藝能再升憲府聞其奉使亦甚稱職往來萬里勤勞一心而卧疴經時賜告逾歲遷居粉署用應星文勉思覆被之榮無沗握蘭之美可屯田員外郎虞部員外郎授劉繹總目作澤虞部員外郎制孫逖門下朝散大夫行河南府倉曹參軍關內道度支判官上柱國彭城縣開國侯劉繹緒一作署業清華行能修飭表通明於吏迹持雅正於公心幕府徴才久聞成效星臺列位冝膺俊選可尚書虞部員外郎餘如故授丘紓陳鴻員外郎等制元稹敕朝議郎行左補闕上柱國丘紓諫諍之臣入言於密勿之際群下莫得而知然而政有汙崇由爾之得失也朝議郎行太常博士上柱國陳鴻禮秩之官草儀於朝廷之內四方之所觀聽是以察其事為見爾之能否矣以爾紓久於侍從可以序遷以爾鴻堅於討論可以事舉並命省闥足謂恩榮愼乃攸司無違夙夜紓可膳部員外郎鴻可虞部員外郎水部員外郎授王琪水部員外郎制蘇頲門下宣議郎試大理評事王琪奕代儒雅門傳教義風襟育粹詞韻含清雖職尚安卑而才方致逺連枝席寵爰映於棣華起草升榮俾光於蘭握可朝散大夫水部員外郎主者施行授鄭渾水部員外郎制常衮敕朝散大夫集作郎殿中侍御史內供奉賜緋魚袋鄭渾族華才俊風韻朗然禮以約已學以潤政常在清選久於持綱廉平簡直甚有名望舊制尚書郎缺以殿中執法次補之服我新命用循階歷可守尚書水部員外郎散官如故授張籍水部員外郎制白居易敕登仕郎守國子監博士張籍文教張集作興則儒行顯王澤流則歌詩作若上以張教流澤為意則服儒業詩者冝稍進之頃籍自校祕文而訓國胄今又核名揚稱以水曹郎處焉前年以來凡歷文雅之選三矣然人皆以爾為宜者豈非篤於學敏於行而貞退之道勝邪不與之寵名何以奬夫集作與之寵名可以奬夫不汲汲於時者可守尚書水部員外郎散官如故文苑英華卷三百九十二
