body:
  text: 文苑英華卷三十四宋李昉等編水三海重潤賦一首海水不揚波賦一首江漢朝宗賦一首衆水歸海賦一首襄華貫洪河賦一首三門賦一首渭水象天河賦一首清濟貫濁河賦二首渭水貫都賦一首涇渭合流賦一首海重潤賦梁洽道之應物兮小大咸信物之感道兮禎祥必順况我儲君元膺在震乾乾夕惕兢兢日慎德澤潤於生靈滄海得無重潤惟海之量百川朝宗猶君之美萬國向風朝宗者歸其廣向風者欽其政既同類以相求故重潤而必應是使日光分色山輝度映風雨不淫魚龍遂性羣氓仰止是燔瘞以告成外國聞焉願梯航而來聘然則我君之明兩也景育前星休徵夢月主鬯之功昭著牽衣之智逸發四皓既親三朝不闕故曰惟其有之是以似之海則靈潮晨夜而無替君惟順動溫凊而有時詳夫海之為器也吞吸八裔流不逆細怪必思蓄珍無不麗浺瀜濜汨膠轕澎濞飛濤疊躍於秋隂白浪翻光於春霽雖則沙石混濁不蕩其清波瀾迅委終復於平惟此之故彰我君明至矣哉靈海之潤孰知其極願乘桴以攸往非引蠡而能測道未行兮竊喜取材敢獻賦兮揚君之德海水不揚波賦以平上去入倒用為韻石岑太極立天地疏嶽瀆所以鎮四維橫九服伊海之為德有王之法象故量納羣川而道遒百谷功配乾絡運回坤軸氣蒸混於灝元潮動襄乎山陸示懲惡則鼓怒見夫羣怪將瑞聖則不波介以景福唐興百三十有四載湛恩溢乎荒外倬五聖之在天奄六合而成大赫吾君之光贊敷至道而允泰政符純德昭千古而惟新澤體上仁同萬類而咸賴八狄窮陬而盡歡九夷無遠而不㑹則成周之德未足雙越裳之來今至再是以四海盡鏡九瀛涵影寫合璧之祥光湛連珠之瑞景德侔上善洗物而容潔道本𤣥元澄心而體靜湛兮恆清晏兮砥平泊乎無情蕩乎難名如君之道酌焉而不竭象君之德注焉而不盈所謂皇得一則政能貞海得一則波不驚恍兮惚兮其中有物杳兮冥兮其中有精精罔竒而不育物無大而不成鯤將化鵬欲征蚌且剖珠其明誰能一借扶搖便為君御之貢王城江漢朝宗賦以百川㑹流必歸於海為韻樊陽源江漢之流始滔滔乎楚澤雖導源而則異必朝宗而來格故能吞別派而且千壅細流而纍百初謂發岷山之濺濺出嶓冡而涓涓忽洊至以盈坎遂同歸於巨川洋洋不窮驅迅波以來注浩浩何足走驚浪而方前沸渭迸瀨崩奔爭㑹過東陵而更長歷南國而彌大引汲清濁并包畎澮始逶迤於域中終委輸於區外雙流渺渺並騖悠悠滈汗乎萬里經營乎數州靜委極深且無驚於若海疑作海若潜盈巨壑亦何怒於陽侯彼𢎞納之無際信為長於百流爾其揭厲莫從深淺無必絶地脉於飇駛透天池而箭疾善下以潔乎龍堂流謙更清乎鮫室就其深矣誰識濫觴之源不可方思空想觸舟之實終始齊赴周流不違似有待而俱進何經始之相依演漾紆餘必遠分而邇合洄洑激射雖異出而同歸則知海之為量也虛而有餘水之趨本也道亦相於二派既朝於滄海衆星如拱於辰居漢之廣兮明委積之有所江之永矣表靈長之在諸是俾涵虛之狀益深浮天之容斯在苟歸塘之不息諒納汙而惟倍大矣哉誰究其廣深空有望於靈海衆水歸海賦以納衆流而成深廣為韻大矣哉海浩漾尋之無際望之無象利萬物以成德總羣川而為長柔能善下禀巨壑以包涵握而朝宗覩衆流之歸往是以臨不測者未足言其濟深思利涉者孰可詠其河廣究其所由得之在柔濫觴之初因一勺而畎澮循環無際想三嵗之周流伊昔洪水方割夏禹是理既濬崑崙之輸爰標南國之紀故導之逾遠非壅之可止將虛受之為德諒成大而有以且明乎避高之義自得乎潤下之㫖始將就濕想浩浩而其來終類沃焦見滔滔之未己原夫水反於壑海不厭深其有也靡患乎泛濫其細也不逆於浸淫是知衆流同歸異源將合注而不竭但見乎川流滿而不盈更因乎海納廣哉巨瀛莫之與京萬里波委四時砥平灌以涇不能混其濁注以渭不能益其清不涌浪而跳沫獨持盈而守成故得萬穴爭赴九河自同類夫雲之從龍鳥之附鳯又似一人立國萬方入貢願以含垢之體為納汙之諷因知夫海為川谷之王以寬而得衆不見而字官韻襄華貫洪河賦以崇嶺橫斷靈瀆長注為韻太極經始純坤傾東勢以嶽鎮氣以川融於是靈闢襄華象開鴻濛橫大野以中豁夾洪河而北崇而一作爾其沓嶂無際連波方永噴激萬里回合千嶺總崤函之氣象壓秦晉之封境山以河潤上騰雲雨之祥水與時清下倒巖巒之影若乃騁逺望馮層城秋爽元氣朝升大明偉連天之浩汗壯發地之崢嶸翠岫屏擁澄瀾砥平疑白虹飲壑而半隱似寒雲抱塞而初橫及夫俯臨迫察詭麗雄恆疑作悍峻勢危而不騫靈源注而常滿一作半積隂騰氣與嵐色而相鮮爍日生霞連榮光而不斷觀其畜含精秀孕育風霆應㑹昌運發揚炳靈茂賢傑於間出翊邦家而永寧况乎山積鴻休川流景福明徵祥瑞幽贊化育此其所以配乾坤此其所以稱嶽瀆豈徒玩夫縈帶委注蓮開翼張巍巍峩峩滔滔湯湯于天之峻極赴海之靈長而已士有圭竇強學金門獻賦因陶侃之無津耻孫𢎞之不遇覽襟帶而增氣追聖賢而遐慕想劉公之歎微禹其魚感吳子之言在德為固義由景行仰高山而自慙志切朝宗與大海而同注儻餘潤之波及期變化於雲路三門賦并序趙冬曦砥柱山之六峯者皆生河之中流蓋夏后之所開鑿其最北有兩柱相對距崖而立即所謂三門也次于其南有孤峯揭起峰頂平闊夏禹之廟在焉西有孤石數丈圓如削成復次其南有三峯東曰金門中曰三堆西曰天柱湍水從黃老祠前東流湍激蹙於蝦石折流而南潄於三門包於廟山乃分為四流淙於三峰之下抵於曲限㑹流東注加以兩崖夾水壁立千仭盤紆激射天下罕比時以內兄牛氏壯而逰焉相顧賦之以紀竒跡大河瀰漫上應天漢濬靈波於積石之西瀑懸流於崑崙之半茫茫禹功兹焉㑹同鑿連巖而瀉㶑羅崛島以攢空濶兮若橫兩闕於江上岌兮若稜三山於海中崇山嶔崟呀水淙射左右飛濤起伏相擊截奔湍兮躋石臺目霍濩兮心徘徊三峰砥其却立架崇門以洞開連嶂紆河以壁峭疊巘喬空而半頺洪流蹙折以坌涌潄湍崟窟而相磓苞巒祕隒砯其鼓作徊澎瀑灕以山摧奔濤迅澓紛其蕩駭蓬渤滑淈霍以雲回盤渦窙寥以谷施奔石砰磕以成雷拗怒未泄橫流逆折合如地轉散若天裂搖騰䂬嶼刷疑當作刷吳都賦云刷蕩渏瀾蕩珊疑當作㘱他藍切水衝岸壞也穴硉岩腰而沫沸淙隘口而湍洇然後澡雲霽靄收濤卷瀨汨沄沄以無聲漫浩浩以東㑹總四流而混合注三穴而滂沛泛洪漣於大磧之東薄餘怒於天地疑作池之外當其時也山獸驚躍水禽亂飛魚獺沉潭以不動獑猱拱樹以相依竄鮫人於洞壑帖舟子於連漪莫不愁白鷺之初下歎黃牛之暝歸若乃降望金門忀徉石觜窮岩萬仭一曲千里松歷歷而生涯草鬖鬖而覆水雲蓬茸兮歷地生風颼飀兮百籟驚猿惜暮而悲呌鳥辭春而不鳴阽嵲屼兮杪崢嶸飛客心兮動客情憐石菌之冬茂賞瑶芝之夜明惟夏君兮永蟄拜靈廟兮何及榱梁古兮山鳥棲階壁蕪兮野鼯入感微禹之歎深亢幽歌以佇立歌曰申負石兮空自竒客乘查兮何遠為君不見虛舟之泛泛浩乘流而不羈渭水象天河賦以題為韻劉珣昔我先王肇修人紀乃建邦國以立都鄙或處沃而稱奧或宅中而為美周分景臺之測用㑹隂陽之擬漢據鶉首之分實為山河之理故右扶風而左馮翊距涇川而浮渭水潼函襟帶豐鄠巍峩下則崇岡於地險上乃取範於天河城雉周環而斗設宫觀駢㸦而星羅轉曲江於前岸俯冀闕於中波車馬喧流渾派聲之交錯風塵日夕與津霧而相和蓋聖人垂則必天之象王者都㑹大洽斯享運璇衡以齊玉燭法露盤以崇金掌四方輻凑萬國攸仰風雲以之吸合日月於焉澄朗苟禎祥而應㑹則乾元之攸往何必河出圖洛出書然後為卜食之華壤者也懿哉作者元后中興後嗣同天之道順人之意橫橋乃牽牛之設素滻則飲龍之謂晚光淡灔接鳯苑之祥煙曉色清明連斗城之佳氣樓臺傍而津涯隱伏鐘鼓作而波濤汨沸不覩斯焉以取斯寧復知王者之貴不察所由於所以又安明坎德之靈而主乎渭徒觀其遠界汧隴橫截秦川沃長安之霞日浮京兆之雲天都邑傍於左右舟楫來而泝沿上林之煙開霧卷建章之戶萬門千朝而望兮蓬瀛若留乎岸側夕而臨也河漢宛在乎目前是以婁敬云被山帶河四塞為固豈不謂天道無親惟德是輔祥符不及瑞圖斯遇以登仁夀之理用表坤靈之喻請謂東周安處先生之徒與須知西朝翰林主人之作賦清濟貫濁河賦以與濁同流清源自別為韻李君房濟有瀾兮清泠不窮以清激濁兮洪河之中迤靈長而委注忽洊至而爭雄懼淈乎泥我則貫而愈净將合於道我則和而不同徒覩其虛明皎潔秀色澄徹漾淸泚以遐分界飛濤而劃絶始騁迅以中㵼載流謙而東泄德惟靜自澄之於本源體雖柔豈混之於派別懿夫貞不受汙淸非可混噴中流而激射劈巨浪之崩奔狀浮雲决開晴天之灑空碧若輕埃乍斂明鏡之洗蒙昏遠而望之孤煙橫於曲渚迫而察也霜練引於靈源是知夫道惡比周物莫相與彼流濕之為類尚沿源而異處匪泥沙之可雜豈湍洑之能阻越洪濤之浮浮駛清浪之悠悠不學淄澠之難辨且殊涇渭之同流于以用之甘見和之醴就其深矣欣可泛乎舟狀盤渦之瀺灂不染乎濁前跳沫之飛驚不傷夫清均上善以清美含至虛而體平度龍堂而愈灑洗貝闕而增明何必溱洧之陽然後濯其髮寧俟滄浪之畔然後澡其纓截河而流所以為異導沇而注明乎所自釃濁波而回逗沛驚湍以自致庶彌久而不渝鑒妍媸兮無愧第二同前韻許堯佐河之並濟兮惟秩其平濟之貫河兮勢若相傾非剛克無以見其柔立非甚濁無以彰其至淸是以靈源濬發柔德兼呈徒觀其流波委注秀色澄徹冲融而濁水遙開鼓怒而洪流直截遂使還淳之士疑二氣之初分䇿功之臣驚一帶兮中裂既處濁而不染每含貞而自潔苟與和光者殊致寧與淈泥者無別是以霍濩波激崩騰勢翻濟水與河水相輝光容易識清流與濁流不雜質性難論苟徵之於變化可察之於本源于以表德于以辨類方九折而橫流啓重泉而直至故以盤渦渾曉日之輝疊鏡寫晴峯之翠絶河而去孰與我爭先導沇斯來孰謂我奚自若乃冲虛是玩迅激難儔廣可涉兮思航葦於寒渚清可挹也欲濯纓於夕流貫長川之浸浸委輕浪之悠悠然下流綿邈願表清而不濁上善昭融故守和而不同故可扶正直之純志助潤澤之成功動漣漪於回浦萃光景於微風且淮之清兮濱於夷江之遠兮界於楚豈若貫大川以揚波臨大都而分渚含清濁而獨秀求匹敵而誰與苟河淸之可期願朝宗而為侶渭水貫都賦以帝王建都取諸上象為韻衛次公清渭天鑿名都王制貫金城千里之域寫銀河九霄之勢同穴發源衆川潜泄分黑水以渺漫繞黃山而迢遞水能濟物用導於中州君德配天故法於上帝都之㑹也皇皇渭之流也湯湯異東西之瀍澗非汲引之沮漳夏后濬川分流非肇於伯禹秦德王水貫都必因於始皇照雙鳯之丹闕架長虹之飛梁褰裳者不勞於揭厲濯纓者何必於滄浪泛彼樓船掩橫汾於武帝濱之釣叟感入兆於文王且夫前王酌憲惟皇都之所建度地有孚因貫渭之上腴曲抱乎周原秦野旁臨乎八逹九衢既流衍以紅粟誠輝煥乎黃圖則知八水皆流豈清於渭水五都並制莫大於西都原夫渭者雍之巨浸都者人之所聚天垂法君必取曵雲間之清渭何殊雲漢移天上之紫宮洞開天府及乎縈流一帶中派紆餘蕩元氣澄太虛稽前典而備矣於名川而舍諸豈惟積潤於庶物固亦近壯於皇居至乃春景澄廓晴霞朗暢涵萬象於影中度牽牛於波上客有觀光者於兹而寫望美夫取法可仰因天垂象疏紫陌而逶迤流丹霞而蕩漾周公卜洛雖云風雨所交秦后貫都實謂膏腴之壤惟洪業之永固與渭流而彌廣涇渭合流賦以題為韻獨孤綬逰者感異源而合趣指涇渭於秦樹涇如經也自北而南流渭若緯焉從西而東注性相近以不息勢使然而自遇湜湜其沚昔既聞之於詩湯湯其流今則狀之為賦夫至清者渭至濁者涇惟清也鑒物之道著惟濁也含垢之義形共導金氣咸通井星混殊流之昭晰成一帶之瀠渟初以縱亂橫似爭長而難雜終以潔受汚何極暌而乃合禹功之所兩存漢苑斯焉博納乍異其色覺游鱗之隱見必同乎聲帶長風之蕭颯象昭回之可求歌鄭白之有由飲馬投錢足以發明亷士决渠降雨足以殷富神州既相𢎞以利物寧自異乎並流知之者齊我以不皎不昧感之者比我於一薰一蕕斯乃柔以長存和之足貴近則順洪河之紆直遠則成滄海之濩渭同功一體叶靈通氣信殊榖洛之流寧爽淄澠之味夫然彼獨清而無偶非逹識之所謂文苑英華卷三十四
