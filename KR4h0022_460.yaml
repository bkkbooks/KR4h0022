body:
  text: 文苑英華巻四百六十宋李昉等編詔勑二朝集使處分朝集使勑蘇頲勑朝集使等朕自臨萬邦倐已三載何嘗不兢兢業業勵精政道思欲棄末敦本阜俗安人寰瀛之間日月以繼所以急於農務不奪人時富而教之庶乎可致夫苛政甚於猛虎貪人比之蝥賊頃雖臨軒遣使詔令作臨遣使臣未能澄正此弊或刻以害物或擾以妨農或背公向私或全身養望至使錢糓不入杼軸其空損瘠相仍流庸莫返且四方事廣一人獨化共理之寄非卿而誰卿等至州逓相朂勉詔今作勵勤恤孤弱勸率耕桑各効清勤無或隳廢詔令作怠開元三年三月十五日同前張九齡勑朝集使等朕恭已承天守文繼位布一心於兆庶明四目於萬方恒恐道或未周物不遂性旁求俊乂共理黎元于咨集作茲羣辟寧不我副凡今政要畧有四端衣食本於農桑禮義興於學校流亡出於不足争訟由於無耻故先王務其三時將以厚生也修其五教將以惇俗也有國有家同知此義不患不知患在不行耳且長吏數改政教屢移在官當先為國理人各惕其職不當冐榮干進茍利其身澆俗不可不革淳風不可不長近令刺史在任四考方遷實欲始終其情黜陟斯繫必若縣得良宰萬户息肩州有賢牧千里觧帯仁政不遥行之則是皆能勵節朕復何憂且如浮迯客户所在安輯征鎮人家每事優當集作卹倉廪集作儲惟實賦役惟均鰥寡撫存盗賊禁止郵驛無弊姦訛不生念茲八事朕常屬集作屢想嗟爾庶尹可不用心卿等還州逓相勸勉遵此王度恤彼下人敬順天常無違月令夫星列躔次土分區域休咎之徴惟人所感善必知生惡亦有由每至歳成當加賞罰宜知朕意詔令有焉字竝即好去開元十二年三月十三日處分十道朝集使勑勑朕臨御天下二十餘載每思至理實仗羣賢何嘗不敷求循良共底于道隼旟熊軾光寵有加丼露鳯凰寂寥無紀豈朕之不徳感致所然為庶尹所能已極於此是用寤寐増歎殷憂集作勤永懷更為後圖或未晩也且一郡之政繫一人集作已之能泉源既清蓬麻自直為長吏者可不勉之卿等至州遞相慰誨以副共理之意用光分命集作憂之委且如河南集無此二字江左爰及山南歳小不登人已菜色皆由好逐朝夕之利而無水旱之儲卒遇㐫年莫非艱食此則政乖慮始人無勸分欲免流庸不可得也夫萌詔令作氓者冥也豈能自謀政者正也當矯其弊所有長吏可不勉歟相其物土之宜務以耕桑之本時無妨奪吏不侵漁既富而教奚畏不理至若征鎮役重孤弱命窮特湏哀矜以遂仁恕其餘常科所禁自可舉而行之豈煩縷説但集作方振綱領乃者庚子制書已明理要徐思其意勿謂空言若風教未𢎞議能蓋闕競入朝計冀幸遷除勿曰不知而集作將自誣也方牧叅佐各宜思之朕所待賢能不惜官秩唯聲實是與唯理行是慿古者刺史入為三公郎官出宰百里豈有限也何在汲汲不安於理郡哉誠須勵精以俟後命並即好去開元三十一年閏三月一日處分朝集使勑勑朕受命子人義兼君父思致可封之化集作地無忘終食之間自有萬邦幾將二紀而刑政或舛風俗尚澆行所望而未至顧本懷而自失雖朕之不徳在予之過有歸而卿等共理患已之誠豈到至如典郡集作州當侯伯之尊宰邑敵子男之寵好進之軰且不務於政成欲速集作達之心獨未思於義取朕所以數戒勑以見意増禄秩以勸能何嘗有公方清白者不升理道循良者不用聲績未著黎庶未康牧守來集作未朝而輙遷叅佐踰年而競入此獨為人之資地耳豈是責成之意耶以故一切還州將矯弊也集作其弊卿等至彼明諭朕意知不以中外為隔惟以億兆為憂頃以天下浮逃先有處分所在括附便入差科輙相容隱亦令紏告如聞長吏不甚存心致令流庸更滋前弊未革自行此法即有姦生逃者租庸類多乾沒長吏明察豈其然乎此色每年别須申省比類多少以為殿最又獄訟所寄人命是懸近恐妨農特原輕繫俾加閲實乃多幽枉都畿尚爾郡縣可知各已貶官用懲主吏自今以後天下繫囚非應申覆知證在遠而就中稍重者不得過十日次不得過五日其餘輕科量宜决遣不得因此復加楚毒且外臺者長吏主之至如禮義不興耕桑不勸孤寒詔令作寡不恤徭役不均不肅吏人不清盗賊不懲侵暴不紏姦訛有一於此是誰之過其遊僧幻者誑誘愚人窮其根萌特湏禁絶諸軍征鎮每遣憂矜如聞比來未免辛苦特宜撫恤使得安存今農扈戒期耕夫在野事非急切不得追呼卿等至州一一宣示當遣察問勿不用心竝集作即宜好去開元二十一年四月一日處分十道朝集使勑勑十道及朝集使等信賞以勸能必罰以懲惡謂之二柄所以一人朕念彼黎元比遭水旱而賦役不等浮惰相仍且無緝寧漸用凋弊所以慎擇長吏兼命使臣寵數所加亦云不薄知詔令作智能自效豈為是圖政之殊尤永用虚佇且郡縣所理黎庶是切善為政者防於未然詔令作萌均其有無省其差役事事有豫早為之所雖遭歳惡固亦人安况在豐年不能招輯遂使户多虚挾詔令作掛人均苦攤務欲削除更成詭故詔令作固已迯者未必得集作為削為姦者因此便除一啓其端豈勝其弊向若州有明牧縣有良宰而精心緝理豈若是乎卿等至州將朕此意優柔慰勉各令用心招撫流庸補綴居業使免助迯之費是為救弊之先此不存心更知何理且刺史縣令專任不輕自有非違將何率勵至於親識遊客慿恃威權囑託下寮揺動獄訟或差遣不當致令損失或處置集作分有乖便致煩擾兼有不肅諸吏唯只自謹一身姦豪盗賊無所畏懼是虚荷榮寵徒資禄秩此而可容孰為尸曠並委諸道條察具狀奏聞今丼澤以時耕桑為重不急之務先已勒停宜更申明勿妨春事諸處百姓貧寠者多雖有壠畆或無牛力勸率相助令其有秋所繫囚徒速宜集作令决斷無令寃滯致有妨奪鰥寡惸獨征鎮之家倍湏存恤勿有科喚朕所懸爵秩唯待賢能若政舉一州惠施一縣使者亷問必以狀聞既能副於朕懷亦當待以不次誠可復也豈食言哉並宜集作即好去開元二十一年勑朝集使八道勑朝集使等朕聞御寰瀛者不可以獨化養黎庶詔令作獻者必存於共理故專一方親百姓能致循良之術使無愁苦之聲非牧伯之賢疇能於此所以精求臺閣歴選縉紳常舉百寮之要以先六制之重虚想佳政用成庶績自去冬入計者則循名責實詢事考言雖不無等差終未有殊異得非歳時或淺風教未洽耶故一切不除各再臨所典至於敬耆老恤㷀弱止姦盗挫豪強人不忍欺吏不敢犯田疇墾闢獄圄空虛徭役必平浮詔令作逋逃自復門杜請謁庭無滯留若是者廼闗乎職思可以力致至於弭災𤯝集休祥尚徳義崇禮樂儒風大長道化滂流耕夫克讓織婦知節草木不夭昆䖝咸遂扇彼淳源登茲壽域若是者亦𢎞之在我仁逺乎哉豈惟禄秩就加當以公卿入拜其或靡副朝奬不恭朕言陟既有之黜故宜及勉㫋逾往各勤我班瑞之分命開元六年三月六日又勑諭朝集使朕聞天生蒸民薄于四海天有成命孚于萬邦必内立公卿外建侯伯后非賢罔使賢非后罔事借耳以廣聼假目以遐覽則諭上㫖通下情庶政諧而羣萌樂矣由是三考黜陟百官㑹疑昔之訓然耶朕以薄徳祚膺寳位受乾坤之顧荷宗廟之靈凛乎若渉春氷如馭朽索責在司牧所頼分憂曷嘗不想望賢才馨香至化七年于茲矣咨爾羣嶽實邦之良服勤政圖深佇嘉績豈為吏罕乆與人未信何由異絶寥寂厥聲恭惟永圖當副虚矚孔子曰茍有用我者三月有成漢宣曰庶人安於田里無愁恨之心者政平訟理也以為太守數易則下不安誠哉是諭矣今之牧守古之諸侯寵數特加情寄尤切故躬饗庭内則飲食宴樂幣帛筐篚入至朕前則敷袵以陳命席而對所冀仁且不逺言之必行以副朕憂勞之心託卿勤恤之助卿等宜慎厥始成厥終往欽哉祗守而興操一州之統分六條之察念茲在茲用光我班瑞之命有賞有罰朕無戲言並即好去開元七年三月十一日又勑朕自君臨區域子育黎庶歳年是慎夙夜惟寅而誠或不孚信詔令作政猶未洽所在旱澇屢觀章表因饑饉而為理竭憂勞以養人非夫二千石孰應斯委下户給之髙户貸之所須賑恤竝先處分至於常賦則著恒典檢㨿成損蠲减有條又近日已來中外少事差科調發殆至於無處馭通融當免於弊不知卿等從州來日百姓間得安穏否以其閭閻未便勑令有闕且以陳聞副我深寄時寒渉路並平安好且三兩日尋親識後取曹司進止開元七年十月二日又勑朕聞諸禮曰刑禁暴爵舉賢則政均矣好惡著則賢不肖别矣其道然也詔令作耶朕以虚薄祗膺景命荷宗社之靈當億兆之責曷嘗不早朝晏坐畏天愛人思欲保其和樂躋於仁壽則與我共理者其唯良二千石乎每計吏還州與之陞見示其賞罰錫以筐篚亦云命而已矣而朝集使豫州刺史裴綱分典刑獄為政煩苛頃嵗不登合議蠲復部人有訴便致科繩縣長為言仍遭留繫御史推按遽以實聞虐政弊人一至於此朕夙夜競惕匪遑寧居尋遣使存問其諸道有損處已量加賑恤水旱不時實朕之過惠養失所分刺之由是用黜綱於嶺裔儆彼羣嶽朕於蒼生若保赤子為之均田邑制廬井必欲其時和年登逺安邇肅託于牧宰代以躬親故歴難其官誠經國致理之意也夫德惟善政政在養人故土煩則草木不長水煩則魚鱉不大必也寛恕貴乎清淨諸刺史都督宜問疾苦拯窮貧杜畋詔令作侵漁察寃獄至於賦役務從减省深刻為事人何以堪私惠茍行法或將墜理須折𠂻用存楷式其百姓有便者随事條奏朕將親覽焉欽爾有官各勤為政如風化允穆課績殊尤當擢之不次旌乃厥美凡百庶邦敬聽朕命開元八年二月十八日又勑朝集使古者班一作覲羣后比萬國黜幽陟明循政思理罔之廢也朕以虚薄屬當期運受命穹昊司牧黎元何嘗不中夜求衣分晝忘食欲其日月所燭霜露所墜不獨親其親不獨子其子五糓豐殖萬物阜安為無為事無事與能共化于茲八年矣而淳源未還至道猶鬱豈朕之不徳耶將吏之不賢耶徭賦或繁耶綱維或紊耶故延入陛階躬問得失悉如卿所對則朕無憂矣書曰知之非艱行之惟艱語曰仁逺乎哉我欲仁斯仁至矣卿等宜祗典厥職克正其身修于國章允茲朝寄因乎風俗示之訓誘必也道徳齊禮以公㓕私田里息愁怨之聲邦家聞寛厚之化乃及優賞如或依勢作威倚法以削流亡未至教令不行加乃常罰自餘宜依别勑處分勤恤人隱以副朕懷竝即好去開元八年三月十一日又勑朝集使等朕承天丕命子育萬方樹之師長俾敷景化將以固茲邦本致諸昇平而大道𬗟然淳風未暢租賦頗减户口猶虚水旱相仍耕桑莫贍蓋朕之不徳而吏之無方永言於茲良増歎息往歳河南失稔時屬薦饑州將貪名不為檢覆致令貧弱萍流外境責其政理有從貶黜因茲以來率多妄破或式外奏免或損中加數至如宻州去秋奏澇𬋩户二萬八千八百不損者兩户而已無田商賈之流雷同入數自餘諸州不損户即丁少得損户則丁多天災流行豈應徧併皆是不度國用取媚下人曩之刻薄也如彼今之踰濫也如此不副朕意一至於斯踈怠之愆雖已㑹赦尸曠之跡豈不多慙當令所司比類澄汰卿等與朕共理實惟分憂各勉思政途以匡不逮其百姓間事理詔令作物去冬赦書已處分訖若人有疾苦卿有姦豪不勤農蠶不崇學校並宜敦勸以正風俗逃亡人户必藉招携差科之間務令停减如臺省處事有不穏便於時者具利害聞奏勿復依隨以損百姓卿等至州之日宜一留念詔令作意用綏我庶人竝即好去開元十年正月十一日又勑朝集使等朕君臨㝢内子育黎元何嘗不簡易愛人勤恤庶政天下至廣不能獨任故樹之方牧咨其共理而淳化未敷至道猶鬰庸賦未减户口且虚水旱相仍倉儲莫贍無聞慈惠之政未息凋弊之流豈朕之不明而吏之無術言念於此用惻于懷卿等是行勉思厥政百姓聞有鰥寡惸獨不能存濟者務令優養游業浮惰不勤稼穡者特令懲肅敦以學校勸以農桑差科之間務使平允逃亡之户兼藉招携令其下人使得蘇息諸州遭澇之處多是政理無方或堤堰不修或溝渠未洩頻已處分竟無成禀常破詔令作被租庸是何檢校至州之日各宜勸勉應合修塞開導宜預施功若不蹔勞何以獲利已令御史分知訖宜勵所職勿犯常科今考課績深者已有除改資歴淺者更佇良能應還州人已令所司各與賜物待駕發後三五日别親識並即好去開元十年二月二十七日又勑朝集使等𢎞風善俗寄於良吏求瘼卹隱職在親人朕並建藩牧擇其師長欽若古訓俾人用康而教化或未洽黎甿或未定詔令作寧攘竊者時有犯禁逋亡者罕聞復業豈朕敦諭之道尚闕而牧宰之訓未明歟永念於此不忘旰昃卿等咸承朝寄分掌外臺共理之道期於康濟至若率身以正馭衆以仁而下不化者未之有也卿等還州宜禁侵漁絶浮惰惸獨鰥寡時詔令作尤資惠育盗賊祅訛特宜禁斷其征鎮人家每湏優當科歛之事必在均平頃者水災薦及河朔朕思無不至憂彼元元發倉廪漕江河以賑之蠲租稅停征役以安之今屬春陽布和農事方起慮有乏絶致妨耕桑雖已令詔令作遣使宣撫或恐事未周贍如有未及詔令作支濟者即便量事賑給諸道有損之處亦宜准此朕不欲一物失所一夫不獲納羣生於仁夀躋大化於升平卿等各宜恭守朝章宣布朕意雖萬方有罪敢詔令作莫忘在予而三載考績湏徴行事安人稱職可不勉歟並宜好去開元十六年十二月十七日文苑英華巻四百六十
