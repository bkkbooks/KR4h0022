body:
  text: 文苑英華卷五百三十四宋李昉等編縣令門十六道縣令有惠化判一道損户繭絲判一道夷攻蠻假道判九道廪無積粟判一道縣令辭疾判一道增年避役判一道竊錢市衣與父判一道集百姓不便判一道縣令有惠化判晉陵縣人王茂於訪察使所稱縣令任意有惠化終日清談職務修理每行笞罰惟以蒲鞭舉請升進使司以為寬踈不依令式欲科縣令不伏對康庭芝任意慶偶千齡榮登萬室彈弦作宰動宓賤之芳聲製錦無傷追尹何之美政浹辰行化方類子平終日清談更同夷甫有耻且格寧收檟楚之威以德代刑但示蒲鞭之罰王茂幸編名數預奉弦歌欣承赤子之恩喜沐慈君之惠屬以皇明逺散天使遐巡思甄三異之能式舉一同之善訪一作亷察使官膺珥筆任總方書飲驄馬於江城集霜烏於海樹埋輪紏忒豈謝張綱攬轡澄清何慙孟博眷言褒貶當適古今儻昧激揚遂乖彰疸徵劉寬之故事仁迹斯存覽任意之清猷嘉聲可挹既稱良吏雅合名聞忽見吹毛便虧直指銅章有術久垂桃李之隂鐡柱一作握無謀一作死且寢梧桐之問損户繭絲判甲宰邑而損其户數按察使紏按曰不為繭絲對林琨安人立政輯寧是職茍失厥德其惟不康伊甲宰邑墮爾于位異彼魯恭無聞馴翟詎同言偃不見割雞視兹荻蒿嗤士言之招納且修保障類尹鐸之權宜事雖害公義不徇已損其户數法所難踰務以繭絲時維救弊假如晉陽始禍朝歌同惡事貴適時辭之或可况今聖一作理惟敦本政在養人且乖既庶必招明罰察使所紏寧叶大中夷攻蠻假道判夷攻蠻道由邉邑麥已熟或請人皆出穫宰不許郡長讓之云恐為不耕者所得對史藏用善教者為政有聞適權者在邦必逹能臨事而當斷非不詢而作謀茍或越官是稱專欲屬王風不振霸業衰陵蠻夷假道於上國丁壯就功於下土我承其弊肆毒宜縱於貪狼爾無令聞為患亦同於蟊賊思營負户議發懸門雖師將入郛而人未及麥茂宰施令黔黎酌心能操製錦之刀不紊在綱之網禮先敦義政貴有恆盡地必資於勸分滌場或存於禁末我疆有畔須務材而訓農他人越思豈瘠魯而肥杞縣大夫之立法於豫何誅郡符竹之薄言將子無怨且人有食色師非及耕宜從宣父之存信不讓荀吳之棄鼓况縣道駢雜寇衝錯聮若從穫於或一作域人是亂行於田畯則輕賫者先於望嵗剽劫者多於服勤革其虛求亦謂盡善同前魏季龍大為之防自我王度動不失實為爾政方茍消息之乖宜諒子惠之無取相兹邉邑正曰寇衝務時訓農猶溫麥而雖盛勵一作利兵秣馬假虞道而方深實慮欺天之凶寧顧如雲之稼或人行險以徼幸將馮河而請收縣宰觀變以咨諏固下關而不許度其危亂之際想其爭奪之源恐服田者不得自專而遊手者坐乘其利則不收不獲誠虛力穡之功而惟一惟精實杜無知之俗臨下以簡示人不偷得仲康馴翟之風符子賤彈琴之化何剖竹之虛讓掩烹鮮之異能同前成貴王者無外寰中有截邉鄙不聳邦國以寧蠢爾蠻夷遽相攻伐異一作思荀息之假道且欲涉虞殊申舟之是行無聞聘晉屬四月維夏三農聿興麥已熟於東臯人未饁於南畝瞻言縣宰重化黎氓彈琴自娛宓子賤之多暇戴星以出巫馬期之克勤過齊魯之相持觀邉徼而皆警是割是穫雖美或人之謀我疆我理須從宰君之法何者食曰人天茍求食而忘耻農為政本有惰農以自安候其觀舋之生將欲不耕而穫惡未可長患實預防百里正且得中六條恐為虗讓同前李昕於從政乎務知逺者茍施小惠是紊大倫惟彼邉邑地雜華裔允兹賢宰政協良能雲雨之施既行蒲密之風斯得屬麥秋已至農事方殷不虞蠻夷聿相寇虐豺狼猖獗一作滑沒且迷假道之心原野馮陵得無犯苖之患遂使我疆我理不復如茨如梁將從皆穫之詞是利不耕之願雖或思茍得從效單父之氓而宰絶妄求式光宓子之教末哉郡長昧此令圖雖為責人無難其如有孚窒惕同前于邵舉政之要先禁乎惠姦因人之欲必從於義取固防間之是以雖顛沛而無凛一作懷蠢彼邉邑實由徼路屬門繫闕於下幾出戰於行間瞻彼麥田是登乎秋野惟人之恤且發乎縣門多稼其豐誰資於出穫或人為請雖楚得其所之宰也有詞寧齊至而作告一作害庶有耻於吾化將不耕為爾虞此日方殷人期利寇他年有事誰不幸災異鄭師以取溫周人既怨同單父之規魯子賤猶生為郡依何徒聞有讓理邑餘裕云胡不知此而厚誣曷旌善績以贊不欺之政因明致詰之非同前宇文賞蟊賊尋戈聳我邉鄙穡人是溷曠兹割穫且蠻方不率夷德無厭贄幣不通范宣止其預會攻取有道一作何有楚子莫與一作得同盟乃類乎齊有魯師晉假虞道俾我原田亂轍麥壠啓行川上芃芃豈遑出穫邑中惴惴時有登陴明宰道不忍欺弦歌斯洽以為不耕而穫負胡取之義有僃而舉寧一作徵牽復之辭百里此勤信微我有咎六條所讓伊不明謂何同前楊歸俗􅍯豫不虞古之善教防萌是禁今也難易惟彼邉邑賴斯良宰行化使尊其五教務穡不奪其三時屬夏麥已熟秋成未幾丁壯愍焉望嵗農父期於有年甸人未進於絳君鄭師何傷於周野豈謂東夷有事南蠻是襲𤇺火驚候於甘泉虜騎振威於沙塞固當因兹料敵無乃啓戎縱彼所取肆其所穫則愚夫毋渴於僥求空思寇盜田畯獨嗟於茍得欲罷耕耘誠百里之良一作長謀豈一同之紊政况慮深知逺而智在窮微雖為郡長之讓難聽士師之罰同前元子貢法不可易政貴有恆利物雖在於隨時出令必資於長久逖矣逺邑濵諸蠻夷蔑其蝸角之兵無能猾夏不虞蜂聚之衆將犯麥秋同鄭伯之襲溫若齊師之入魯自可申之􅍯預固其封疆豈宜因彼犬戎縱其斂積是教玩寇何以字人雖無厚於讐前監是與然不耕而穫後嗣何觀邑宰不從得宜頗類於宓子郡長見讓失指有契於季孫宰實有詞理宜無罰同前權軼疆場之事先於慎守田農之業在乎克勤必資禮以防之是謂政有經矣國家卧鼓荒徼偃伯靈臺干戈既戢雖息犯邉之慮蠻夷相攻尚無假道之禮今者大田既稼滯穗未收邉邑常近於寇讐或人且慮其蹂踐請皆出穫成此有年欲使功見於多安能義然後取邑人爭出必盡室以行我倉既盈或不耕而穫豈伊恤病實長幸災惟彼前修邑宰之化斯得徵諸故事郡長之讓頗乖廪無積粟判得甲為縣宰廪無積粟人言其過曰蓄積於人對王系設法安人守官之能政革弊易俗經邦之茂典必從宜而有素豈循常以見稱一作非甲恤隱在懷藴利為任思豐穰以務本患杼軸之將空畝稅惟輕地利斯盡庶無捐瘠俾家給而藏嫌於聚斂何縣廪是積况詩刺重賦傳美寬征魯公不足聞諸有若之對齊國以富實資管仲之言曽謂舉善奚其數過但恐永圖難繼涼德不堪茍闕斯人容無效此縣令辭疾判鄭胄授山隂令赴任行至浙江遇風濤鼓怒弭棹而回乃辭疾解職人告詐病對康庭芝鄭胄家承曵履職綰鳴弦將登會玉之山欲界一作屆沉錢之浦方冀騁牛刀於劍冶舞鸞磬於鍾巖不孤王阜之能方繼子遊之躅洎乎行窮楚塞路入吳江遙山將逺樹不分極岸與長天共合歸濤活活全疑白鷺之飛去舸遙遙直似青鳬之逝覩兹艱險慮有漂沉方懷魚腹之憂豈顧龜腸之斃情來斂轡既有慕於王陽興盡回舟亦何思於載道行背浙流之右坐歸漳水之濵從此挂冠頗諧髙節因兹弭棹不一作來犯彛章輒被告言殊驚物聽任其罷退良謂合宜增年避役判乙為縣令百姓有增年避役者廉使察其無風化州將云移風易俗須久於其政令未成而驟改之何暇為理也對李淑安人之本為政是先法令克修紀綱不忒乙授兹六命職彼一同實曰子男作人父母綏之以德化紏之以典刑自可禮義從心回邪革面何乃慢其銜䇿紊彼彛倫使氓之蚩蚩已懷姦慝之計而政罔察察徒云久逺之方廉使以紏謬為心當繩漢律州將以飾詞為喻有昧一作紊周官百姓合此從刑縣宰宜從通計竊錢市衣與父判丁竊錢市衣以與父父曰邑長如是使詣縣首丁往長問之具以父言長以衣賜其父錢主告長縱盜對盡敬事親居致其樂永錫爾類將為色難丁也無良斂怨為德殺牲之養猶曰不仁竊人之財誰謂其孝動生悔吝行乏義方惟彼循良是稱邑長飲氷壺以從政播清風而成俗用既戒惡觀過知仁將順一作顧綵衣之歡以原丹筆之罪雖聚蒲惡子難以法寬而偃草小人或期化理諒從權而適道豈撫俗以隨時錢主薄言誠稱縱盜宰君善政可謂勝殘於豫何誅將子無怒集百姓不便判得魏州貴鄉學士謝希顔告本縣令鄭國僑每集百姓以為不便勸以六禮兼用七教修殷摯之法後井一作復伍其田百姓披論國僑法外妄加箠楚處分對宋璟墨綬臨人國僑隨班於邑宰青襟敬業希顔齒迹於鄉校將宣風於禮教道化未敷議為政之得失訟聲斯起利害之間非是相半何則修六禮以節性明七教以崇德蓋聞皇王之風何虧令長之教至若廢耕釋耒方行殷摯之法計畝分疆後施子産之令風雨惟序豈資區種之勤虞芮不爭焉用井田之制處事則於人不便容或弛張加箠則於法有違固須科結文苑英華卷五百三十四
