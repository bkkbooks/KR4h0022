body:
  text: 文苑英華卷二百三十七宋李昉等編寺院五塔附楊巨源六首楊衡四首韓愈一首陳羽一首劉禹錫三首白居易六首李紳一首劉商三首姚合四首賈島八首釋無可六首周賀四首劉得仁九首和鄭少師相公題慈恩寺禪院楊巨源舊寺長桐孫朝天是聖恩謝公詩更老蕭傅道方尊白法知深得蒼生要重論若為將此望心地向空門同趙校書題普救寺前人東門高處天一望幾悠然白浪過城下青山滿寺前塵光分驛道嵐色到人煙氣象須文字逢君大雅篇春日與劉評事過故證一作澄上人院前人曾共劉咨議同時事道林與君方掩淚來客是知心階雪凌春積鍾煙向夕深依然舊童子相送出花隂春雪題興善寺廣宣上人竹院前人皎潔青蓮客焚香對雪朝竹風催淅瀝花雨讓飄颻觸一作灑石和雲積縈池拂水消只應將日月顔色不相饒和鄭少師尋興善寺廣宣上人不遇前人放心蓮境去又值竹房空幾韻飄寒玉餘清不在風夏日苦熱同長孫主簿過仁夀寺納涼前人火入天地爐南方正何劇四郊長雲紅六合太陽赤爀爀沸泉壑焰焰燋砂石思減祝融權期匡諸子宅因投竹林寺一問青蓮客心空得清涼理證等喧寂開襟天籟回步履雨花積微風動珠簾惠氣入瑶席境間性方謐塵逺趣皆適淹駕殊未還朱欄敞虛碧逰峽山寺楊衡結構天南畔勝絶固難儔幸蒙時所漏遂得恣間逰路石蔭松蓋檻藤維鶴舟雨霽花木潤風和景氣柔寶殿敞丹扉靈幡垂絳旒照曜芙蓉壺金人居上頭翔禽拂危剎落日避層樓端溪瀰漫駛曲澗潺湲流髙居何重沓登覽自夷猶煙霞無隱態巖洞詎遺幽奔駟非久耀馳波肯暫留會從香火緣滅迹此山丘宿陟岵寺雲律師院前人像宇鬱參差寶林踈復密中有彌天子燃燈坐虛室心澄紅蓮喻迹羈青眼律玉爐揚翠煙金經開縹帙肆陳堅固學破我夢幻質碧水灑塵纓涼扇當夏日宿禽詎相保迸火煙欲失願回戚促勞趨隅事休逸題山寺前人千峯白露後雲壁挂殘燈曙色海邊日經聲松下僧意間門不閉年去水空澄稽首如何問森羅盡一乘宿吉祥寺寄廬山隱者前人風鳴雲外鍾鶴宿千年松相思杳不見月出山重重一作孤月出山重題臨瀧寺韓愈不覺離家已五千仍將衰病入瀧船潮州集作陽未到吾能集作人先説海氣昏昏水拍天題清鏡寺留别陳羽路入千山愁自知雪花撩亂壓松枝世間一作人並道别離苦誰信山僧輕别離宿誠禪師山房題贈二首劉禹錫宴坐白雲端青江直下看來人望金剎講席繞香壇虎嘯夜林動鼉鳴秋澗寒衆音從集作徒起滅心在淨集作定中觀二不出孤峯上人間四十秋視身如傳舍閲世甚東流法為因緣立心從次第修中宵問真偈有住是吾憂和河南裴尹侍郎宿齋太平寺詣九龍祠祈雨二十韻前人有事九龍廟潔齋梵王祠玉簫何時絶碧樹空涼颸吏散埃壒息月髙庭宇宜重城肅穆閉澗水潺湲時人稀夜復間慮靜境亦隨緬懷斷鼇足凝想乘鸞姿朱明盛農節膏澤方愆期瞻言五靈瑞能救百榖萎咿喔晨雞鳴闌干斗杓一作柄垂修容謁神像注意陳正辭驚飈起泓泉若召雷雨師黑煙聳鱗甲灑液如棼絲豐隆震天衢列缺揮火旗炎空忽凄緊髙霤懸綆縻生物己滂霈濕雲稍離披丹霞啓南陸白水含東災熙熙飛走適藹藹草樹滋浮光動宫觀逺思盈川坻吳公敏於政謝守工為詩商山有病客一作者言賀舒厖眉題東虎一作武丘寺六韻白居易香剎看非逺祗園入始深龍蟠松矯矯玉立竹森森怪石千僧坐靈池一劔沉海當亭兩靣山在寺中心酒熟憑花勸詩成倩鳥吟寄言軒冕客此地好抽簮送王十八歸山寄題仙逰寺前人曽於太白峯前往數到仙逰寺裏來黑水澄時潭底出白雲破處洞門開林間暖酒燒紅葉石上題詩掃緑苔惆悵舊逰那集作無復到菊花時節羡一作侍君回夜逰西武丘寺八韻前人不厭西丘寺間來即一過舟船轉雲島樓閣出煙蘿路入青松影門臨白月波魚跳驚秉燭猿覷怪鳴珂搖曳雙紅斾娉婷十翠娥香花助羅綺鍾梵避笙歌領郡時將久逰山數幾何一年十二度非少亦非多孤山寺遇雨前人拂波雲色重灑葉雨聲繁水鳥集作鷺雙飛起風荷一向翻空濛連北岸蕭颯入東軒或擬湖中宿留船在寺門旅泊景空寺宿幽上人院前人不與人境接寺門開向山暮鍾寒鳥聚秋雨病僧間月隱雲樹外螢飛廊宇間幸投花界宿暫得靜心顔宿靈巖寺上院前人髙髙白月上青林客去僧歸獨夜深葷血屏除唯對酒歌鍾放散只留琴更無俗物當人眼但有泉聲洗我心最愛曉亭東望好太湖煙水緑沉沉憶登西霞寺峯懷望效梁簡文李紳香印煙火息法堂鍾磬餘紗燈耿晨熖釋子安禪居林葉脫紅影竹煙含綺疏星珠錯落耀月宇參差虛顧眺匪恣適曠襟懷卷舒江海渺清蕩丘陵何所如滔滔可問津耕者非長沮茅嶺感仙客蕭園成古墟移步下碧峯沙澗更躊躇鳥噪啄秋果翠驚銜素魚回塘彩鷁來落影標一作在籃箊漾漾棹翻月蕭蕭風襲袪勞歌起舊思感歎竟難攄却數共逰者凋落非里閭同徐城季明府逰重光寺題晃師房劉商野寺僧房逺陶潛引客來鳥喧殘果落蘭敗幾花開真性知無住微言欲望回竹風清磬晚歸策步蒼苔題悟空寺前人扁舟水渺渺曲岸復長塘古寺春山上登樓憶故鄉雲煙橫極浦花木擁回廊更有思歸意晴明陟上方題廢禪居寺前人凋殘精舍在連步訪緇衣古殿門空掩楊花雪亂飛鶴巢松影薄僧少磬一作誦聲稀青眼能留客踈鍾逼夜歸過無可上人院姚合寥寥聽不盡孤磬與踈鍾煩惱師長别清涼我暫逢蟻行經古蘚鶴毳落深松自想歸時路塵埃復幾重題雲花寺寶上人院前人九陌最幽寺吾師院復深煙霜同覆屋松竹雜成林鳥語境微集作彌寂客來機自沉早年集作知如到此應不帶朝簮僧院引泉巳見一百六十四卷前人題山寺前人千重山崦裏樓閣影參差未暇尋僧院先看置寺碑竹深行漸暗石穩坐多時古塔蛇蟲善隂廊鳥雀癡雲開上界近泉落下方遲為愛青桐葉因題滿樹詩靈凖上人院賈島掩扉常太半集作當太白臘數等松椿禁漏來遙一作遲夜山泉落近鄰經聲終卷曉草色幾芽春海內知名士交逰湯上人升道精舍南臺對月寄姚合前人月向南臺見秋霖洗滌餘出逢危葉落靜益衆峯踈冷露尋時有禪窗此夜虛相思聊悵望潤氣遍衣裾集作初非題青龍寺鏡公房前人一夕曽留宿終南搖落時孤燈岡舍掩殘磬雪風吹樹老因寒折泉深出井遲踈慵豈有事多失上方期宿贇上人房前人階前多是竹間地擬栽松朱點草書迹雪平麻履蹤御溝寒夜雨宫寺靜時鍾此室無他事來尋集作多不厭重就可公宿前人十里尋幽寺寒流數𣲖分僧同雪夜坐雁向草堂聞靜語終燈焰餘生許嶠雲猶集作由來多抱疾聲不達明君宿慈恩寺郁公房前人病身來寄宿自掃一牀間反照臨江磬新秋過雨山竹隂移冷月荷氣帶禪關獨往天台意方從內請還崇聖寺斌公房前人近來唯一食樹下掩禪扉落日寒山磬多年壞衲衣白鬚長更剃青靄逺還歸仍説逰南嶽經行是息機早秋寄題天竺靈隱寺前人峯前峯後寺新秋絶頂髙窗見沃州人在定中聞蟋蟀鶴曽棲處挂獼一作猿猴山鍾夜度空江水汀草一作月寒生古石樓心憶懸帆身未遂謝公此地昔年逰宿西嶽白石院釋無可白石上嵌空寒雲西復東瀑流懸住處雛鶴失禪中嶽壁松多古壇基雪不通未能親近去擁褐愧相同青龍寺縱公房前人從誰得法印一作傳印法非不離上方傳夕磬城霜下寒窗竹月圓燈一作煙殘衰木落一作畔客往磧一作客住積雲邊未隱滄洲去時來於此禪過石溪寺寄姚員外前人門徑衆峯頭盤巖復轉溝雲僧隨樹老古木落紅流峽狖有時到秦人今日逰謝公多晚望此境在南樓安國寺靜居法師故院前人雨後清涼境因過欲不回井甘桐有露竹迸地多苔幡映宫牆動香從御苑一作殿來青牛舊經疏寥落有誰開逰山寺前人千峯盤路盡林寺昔何名步步入山影房房聞水聲多年人迹斷殘日石隂清自可求居止安間過此生寄題廬山二林寺前人廬嶽東南秀香花惠逺蹤名齊嵩一作髙嶺峻氣比沃州濃積岫連何處幽崖越幾重雙流湓隱隱九𣲖棹憧憧山限東西寺林交旦暮鍾半天傾瀑溜數郡見罏峯巖並金繩道潭分玉像容江微匡俗路日杲晉朝松棕徑新苞拆梅籬故葉壅嵐光生疊砌霞焰發髙墉窗籟虛聞狖庭煙黑過龍定僧仙嶠起逋客虎溪逢濩落垂楊戶荒涼種杏封塔留紅舍利池吐白芙蓉畫壁披一作和雲見禪衣對鶴縫喧經泉滴瀝沒履草丰茸翠竇歌攀乳苔橋側杖笻探竒盈夢想搜峭滌心胸冥奧終難盡登臨惜未從上方薇蕨滿歸去養乖慵入隱靜寺途中作周賀亂雲遙逺寺入路認青松鳥翅緣巢影僧鞋印雪蹤草煙連野燒溪霧隔霜鍾更問樵人院猶言過數峯集作更遇樵人説猶言過數峯空上人移居太雲寺前人竹溪人請住何日向中峯瓦舍山情少齋身病色濃臘髙移坐次菊淺露行蹤來往湓城下三年兩度逢宿甄山南溪晝公院前人從來作何客别離經半年却來峯頂宿知廢甄南禪餘霧沉斜月孤燈照落泉何時間事盡相伴老溪邊宿隱靜寺上方前人一宿五峯林渡寺虛廊中夜磬聲分踈林未一作才落上方月深澗忽生平地雲髙鳥背泉栖靜境逺人當燭想遺文暫來此地歇勞足望斷故山滄海濆宿僧院劉得仁禪地集作定無塵夜焚香話所歸樹搖幽鳥夢螢入定僧衣破月斜天半髙河下霧集作露微翻令嫌白月集作日動即與心違題景元禪師院前人古僧精進者師復是誰流道貴一作愧行無我禪難説到頭汲泉羸鶴立擁褐集作毳老猿愁曽住深山院何如此院幽宿普濟寺前人京寺數何窮清間此不同曲江臨閣北御苑一作水自牆東廣陌車音急危樓夕景通亂峯沉暝野毒暑過秋空幡揚虛無裏星生杳靄中月光籠月殿蓮氣入蓮宫綴草涼天露吹人古木風飲茶除假寐聞磬釋塵蒙童子眠苔淨髙僧話漏終俄撞曉鍾後萬井復朣朧青龍寺僧院前人常多簮組客非獨看髙松此地堪終日開門見數峯苔新禽迹少泉冷樹隂重師意如山裏空房曉暮鍾冬日題邵公院前人無事關多掩隂階竹拂苔徑風吹雪聚渴鳥啄氷開樹向寒山得人從瀑布來終期天目老擎錫逐雲回夏日逰慈恩寺前人何處消長日慈恩精舍頻僧髙容野客樹密絶囂塵間上凌虛塔相逄避暑人却愁歸去路馬迹並車輪晚逰慈恩寺前人寺去幽居近每來因採薇伴僧行不困臨水語忘歸磬動青林晚人驚白鷺飛堪嗟浮俗事皆與道相違秋晚與友人逰青龍寺前人直集作髙視終南秀西風度閣涼一生同隙影幾處好山光暮鳥投羸木寒鍾送夕陽因居話心地川暝宿僧房慈恩寺塔下避暑前人古松凌巨塔修竹映空廊竟日聞虛籟深山止集作只此涼僧真生我敬水淡發茶香坐久東樓望集作上鍾聲振集作送夕陽文苑英華卷二百三十七
