body:
  text: 文苑英華巻八百九十四宋李昉等編職官二北省二翰林附贈左散騎常侍王定碑一首左散騎常侍王崇術碑一首西臺舍人徐齊聃碑一首中書舍人朱巨川碑一首翰林學士李白墓碑故太子右庻子集賢院學士贈左散騎常侍王公神道碑權德輿興元元年春二月太子右庻子王公艱貞歸全于京師新昌里夏五月王師震耀祲沴銷散天子以公忠義風節可以聳勵人臣追命左散騎常侍且詔有司䕶葬如集作如葬禮冬十一月寧神于咸陽縣肺浮原先公之兆域既葬十二嵗其孤仲周以德輿昔在覊丱獲見於公無容之敬甞拜子集作于字牀下乃泣状代德俾表識于神道云公諱定字鎮卿京兆人其先魏信陵君無忌之後秦㓕魏謂之王家周太尉尚書令羆以勲勞閥閱為藩衛威重從太尉三代至集作之隋司金邢孟集作上士洺相等七州刺史明進明進生五字集作明生進進生同州河西縣令喜二十四字唐宰相世系表作周司四上士明逺生隋州都七職主簿夀生河西令詰喜生蒲州長史贈禮部郎中集作尚書慶慶生吏部侍郎揚州大都督府長史贈禮部尚書揚州大都督易從積是德善叢滋彰大公即尚書第若干子弱冠游太學舉進士甲科補太子校書以文雅盛德集作德器名聲四暢属執亊者用喜怒為刑賞上蔽天明婚親坐累微文痛詆歴湘潭藍山雲夢鹽城四邑之属天寳末違難家食於淮湖聞四征五府聘問狎至某年元尚書載集作中書元載㢘問九江表公為介授右集作左驍衛兵曹叅軍以疾乞告不屑就焉集無此字無何元拜小司徒執憲乘軺實頴徽集作㣲字令復表公為大理評亊奉詔踵門詞禮皆切不得已而從之恥騖功利每稽中正酌輕重之法通方圓之冝叩難應於舂容技寧投於肯綮纔逾旬朔復以疾辭時薦紳先生多遊寓於江南盍簪清議以天爵為貴集作富退然絜矩名動京師宰相得君且務樹善俄除監察御史不樂拘屑換太守司議郎公望寖盛徴書累下不就朝論以九遷是望大僚之七發相繼拜起居舍人尋加理匭使歷禮部吏部二員外於是昭法誡廣聰明裁百辟之章䟽治集作助九流之刀尺私回屏伏公是興行遷考功郎中每嵗覈群吏之能否書其上下之籍有司職禄此焉質正吏詐諼以常巧法靡宻而不勝公乃大為之防盡去其弊於是集作是嵗選部以稱職聞或賀之者舉手曰此考功之力也豈敢攘善尋以本官知制誥嵗中遷諌議大夫掌誥如故且加命服凡賛書名命必輔以精誠其㫖在於搴菁華而去枝葉故簡實體要不為蔓辭明年宰臣伏法移太子洗馬今上嗣統東求吏師授隰州刺史以南京歸重尋拜吏部郎中再授方面命循行方國初自淮淝至于汝南後自上黨亘于山東辯逆節以致謀宣王澤以𢎞化德立刑行時公之功遷太子右庻子集賢院學士或歎以才全位散非公所宜者公蹵然曰此予仲父叔之職官也竊懼不稱豈必使如濡集作濡翼腊毒然後為得耶明年冬上思避敵之仁集作亂玉虬西狩公聞集作間挈二子奔扈行宮在途發集為兇黨所得不敢加害刼送京師元惡惜公素名汙以右職桀友日至盗言孔甘不時赴就期以大戮公瞑目噤口其心確然私謂所親曰忘君恩以茍生非忠蹈賊刃以誅死非孝於是藥攻五臟艾集作大非灼四肢耗其形神終啓手足任重道逺君子以為難前此理命其子曰吾嘗被冕服近天子之光不能酬恩刷恥而遭罹執刼得正而斃猶生之年但慮竊國泉以賻我義無所受勿使偽命汙吾之行口占遺表然後集作言終而絶禮盛服充追崇具集作身後君君臣臣其至矣哉故尚書吏部郎趙郡李公洎公皆德輿先大夫之執也李公嘗稱公交道之深評議之正天下之人以為知言前夫人京兆韋氏刑部尚書贈太子賔客堅之女繼夫人隴西李氏右金吾衛将軍資集作安州刺史延業之女龍旂麟趾之慶重於淑哲皆叶公之至而先公之殁長子逢以進士宏詞甲科歷咸陽萬年尉監察御史殿中侍御史佐制河東之畫才名休茂不幸蚤代㓜子仲周亦以進士甲科使車交辟以廷尉評攝監察御史佐元侯外任實商功利用敏職集作識文明脩行集作文明行脩論撰先烈炳然詳實故採獲始終用成斯文銘曰大玉孚尹慶霄絪緼有悼王公清方直温考績中䑓吏理有倫宻侍右掖化成人文時或屈伸道無緇磷别殿清近東朝顯尊盗泉滔天猛猰狺狺不虧其全不害其人凛凛風節崇諸集作崇追厚恩玉集作宻印金貂襚于墓門家法馮慶崇于後昆集作家法憑厚慶崇厚昆纂叙德輝敬而不諼岡連夏屋木拱秦原傳信貞珍令聲無垠故鄜州伏陸縣令贈左散騎常侍王府君神道碑前人國家以孝理天下褒有功之臣寄崇元侯澤及先子印綬名器賁于𡨕𡨕繇是王公三受追命有金貂附蟬之餙公諱崇術字敬方其先太原晉陽人晋司徒渾之後也中以閥閱徙於帝丘今以名數籍于轂下曽王父皇集州司倉叅軍𤣥素生朝散大夫滑州衛南縣令瓌瓌生蔚州司法叅軍𢎞効皆用儒行自牧故纓轂未華仕不過郡掾史縣大夫而休問四暢公即司倉府君之子方嚴宻靜忠厚温克覽六籍三畧如見古人之心開元中舉孝㢘仍嵗為有司所詘因罷巻慨息慕班超傅介子之為人遂從河南節度杜尚書暹撫劒相合一命昭武校尉蘭州金城府集作縣非别将再命鄜州修武府左果毅都尉代謀决勝多以咨之屈戱下數嵗因喟然曰務功伐而違敬養豈吾之心耶陟屺倚門慈戀交感乃嘉仲由而罪吳起去危事以承歡顔既至郡按察使表其義行可移於教化有詔試守鄜州伏陸令為之三年禮俗休和入有怡聲出有修集作循政熈熈然千室以仁遂焉雖宓不齊之理單父庚桑楚之居畏壘不是過也察㢘薦延者方因公以俟上賞俄丁太夫人憂喪制斬焉闋而猶毁又喟然曰嚮所以不擇禄者備膳羞耳今則求志豈蘄畜於樊中耶於是善閉以葆其身教忠以大其門語仁義於燕閒集寵嘉於後昆以天寳八年春正月考終命於濮陽縣享年七十二嘉耦北平田氏夏州司馬藝之息女淑慎柔正宜于家室後七嵗没于徐州有子三人長曰竒哲俶儻沉勇與河内尚衡扶義于河南積功勞至恒州刺史蹈難以没不害於仁次曰栖榮亦以忠力䇿謀至左威衛将軍㓜曰栖曜寛明博大有文武畧左右征師炳著威功掃蠆毒於姑胥靜詆諠於夷門興元元年以太子詹事加御史大夫繇太原縣侯進封瑯琊郡王貞元三年從晉國韓公來朝京師拜輔國大将軍左龍武軍将軍明年又以御史大夫為鄜坊丹延等州節度觀察等使十二年就加禮部尚書納忠服勞考禮修職克禀風訓為時翰垣旋觀賦政之府乃公筮仕之地感霜露於怵惕展烝嘗於吉蠲盖貽慶考祥必有所自不然何回復𢎞大於是邦耶初大厯十年朝廷以尚書偏師䇿勲贈公開州刺史貞元九年又以撫封集作劒宣力贈公宋州刺史是嵗天子以一純二精大饗報本其明年贈公左散騎常侍夫人始贈北平郡太君再封北平郡太夫人至是三加為燕國太夫人十年十月追錫之車服器用改葬之裧輤合祔于濮陽洛城鄉全義里之西原先是尚書既得吉卜如始居喪之慼累章請乞親壤樹上以戎閫委重俾其子正元往襄事焉噫嘻追養繼志有哀有敬義方啓迪之逺纂服裕蠱之盛蕃衍昌阜襲集作叢于子姓宜哉斵石舊封以攄德善其銘曰仕不必貴難乎其備抑抑王公修仁踐義戎昭再命𢎞厥武事美化一同炳然文吏燕居就養消息恬智從集作縱心之年亦已過二沒代流慶蜜章下賁比追劇藩乃進常侍婉彼燕國柔嘉樂易光協閨門克昌後嗣蟬冠象服同穴兹地金石繫辭式昭遺懿西臺舍人贈泗州刺史徐府君碑張説叙曰經天地揭日月文之義也掌邦籍出王命位之崇也本乎言行君子之樞機成乎易簡賢人之德業則徐公其人也昔公奮明哲之姿當髙宗之盛天保大定俊乂用彰而光曜天䑓雲飛綸閣文敏以暢機務稽古以析嫌疑禮樂政刑擇三代之令典典謨訓誥有唐虞之遺風較然於庻績者可得而聞也其嘉猷讜言沃心造膝滋液内潤精㣲外宻混成於元象者不可得而聞也公諱齊聃字将道姓徐氏東海郯人也逺祖偃王基仁義於上代嚴考孝德濟𢎞美於近世公始以𢎞文生通五經大義發跡曹王府叅軍右千牛兵曹潞王府文學崇文舘學士兼侍皇太子講乂芳林門修書于時中朝碩老下國英雋皆忘年請交不逺來謁望其路者若晨風之赴北林得其門者如衆山之仰東岱公不樂趨競雅尚退謙深以椒房之家聲名太甚求為外職出宰桃林未下車勑改沛王掾終嵗選擬司績員外司議郎並不就乞補雲陽令到官累日詔除司城員外郎乃遷西䑓舍人其為政也如台示一作始云爾初公㓜而殊異八嵗工文太宗聞其聰明召試詞賦錫以佩刀金鞘稱曰神童及中年髙宗嘉乃道優悉命皇子受業訏謨帝采許以國鈞故公備更潞沛豫諸王侍讀上之在周邸也公嘗來誨詩焉夫然集虎觀之書承龍樓之問二宗之代矯首辭林四王之門從容經席非有海山之藝温良之德儀刑以孚柔嘉維則其孰能發揮聖智啓迪天人者乎咸亨元年出為蘄州司馬二年坐事徙於欽州夫君子大守道而小守位汙隆隨時屈伸以義去集作云令尹而不愠失司冦而遂行蕙蘭敗不為不芳日月蝕不為不明姑集作古字務忠信何陋蠻越優游欽江嵗餘而沒春秋四十有二惜乎不登宰衡以平天下天夭是椓集作豦非命也歟既而慶隆嗣子還公孫之柩德施後王拜先師之爵上元三年某月歸葬於少陵原中興神龍元年贈泗州刺史褒賢追逺念道尊師聖人之禮也議者以公考果州府君髙學才華香名省闥武帝賢妃姊也大帝婕妤妹也公既髙歩掖垣子又踐脩舊職同生標藻於鸞殿重世含章於鳯池自班姬父兄文雄漢室左思女弟詞蔚晉宫悠哉二族徐氏三矣才難不其然乎凡是好文之君賞音之士公之逝也豈不慨然閱青簡而存凌雲之志操朱絃而想流水之属哉厥子曰堅景龍中加金章紫綬行禮部侍郎得以命卿之禄奉蠲㓗之祀無念烈考樹之家風迺刋石立頌将以識往行攄無窮使本支百代不忘先人之一有不字隕其名也其詞曰王言惟令中禁是司帝嘉文父曰汝宜之終温且惠習禮明詩長裾入侍集作傳道大筆脩辭鴻業潤色𤣥黻緝熈昊天大戾君子明夷蒼梧啓手湼而不緇中興受命逝者無追靈符泗水崇贈先師髣象精魄丕承聖期教近一作延子貴榮躋父慈學嗣三業一作葉才俱一時春秋孝思霜露深悲後之視昔斯文在兹故中書舍人吳郡朱府君神道碑李紓極以象為文三辰章焉地以植為文百嘉昌焉辟以誥為文萬宇揚焉故三才之文人文為至三代之文周文為備秦漢承式簡而未𢎞魏晉繼軌則而方麗在河朔也其流靡清至江介也其細已甚以逮於亡隋焉國朝鏟邇代之弊振中古之業掌文命官發華歸本出入二百載上下十數公燦燦然與漢魏同風矣而曠士之制博而通豪士之制英而辯道流之制精而宻君子之制直而温吳郡朱君其君子歟諱巨川字德源嘉興人也此邦之人不學則農茍為為字疑作違二業必自他邑故王父舉茂才先子舉孝㢘皆在上第君以文承祖以經傳代行中規身中度陽休於氣和積於中而藻之以文章也年二十明經擢第嘗著四皓碑磅礴君臣之際表章出處之跡正或蒙難顯黜於晦柔能麗明語賢於黙道𢎞藏衍義與定傾識者已知其有易諒子直之風矣其後北蕃擾燕華夏爭土率先心計絿一作詠非競政刑潛不隠鱗飛不藏羽而君深居里巷鮮越户庭靡躬靡親不以㓗羞膳不蠶不績不以獻温凊行之有餘重志于學考經義之箋訓撰策書之賛叙每立新評必度常均将欲含堅超長鍼肓起疾矣又著睢陽守城論一篇以為義者忠之徒危者節之本茍忘義以自重是臨節而可移固以探二公之心垂萬古之訓使違難者銷聲以結舌茍生者寄愧而終身斯深於春秋而不義者逺矣御史大夫李季卿實舉賢能授左衛率府兵曹叅軍户部尚書劉晏精求文吏改睦州録事叅軍亳州獨孤及懸託文契舉授鍾離縣令兼大理評事沔鄂聮師獨孤問俗欣慕士程表為從事授監察殿中等御史數公皆人之望也士趨於門猶恐不及君辟其府未嘗有容至於幹一作翰固守成平端吏職所至蒙其福利所奉由其重輕人皆誦之君以為恥本州牧御史大夫李涵推善里仁拜章特徴薦左補闕内供奉行以直聞文以正舉皆君之素也况官以諌為名乎傳納從容休問昭晣由是擢起居舍人知制誥換司勲員外郎掌誥如初拜中書舍人錫以章綬凢載書之傳信者賛書之加命者詔䇿之封崇者愍䇿之褒厚者其詞必温其道必直洪而不放纖而不繁實根作者之心無愧前人之色前後時宰僉稱任職其小成也猶嘗秉考秀之刀尺掌條流之衡度而焦明顛於層旻飛黄頓於局路此人情所以為慟天問之所宜賦也以建中四年三月九日遘疾終于上都勝業里私第春秋五十有九一作七以其年七月七日歸窆於本縣西上蔡原舊塋禮也詔以侍御從之贈華州刺史俾所在州縣續食以過喪詔恩之崇終始加等朱氏之先出自顓頊吳回人也建國曰邾有儀父勤王之義去邑為朱有平原佐漢之績博以忠輔顯雲以義烈聞從吳為世家在晉為冠族以至于曽祖伯道皇朝襄州司馬祖貞筠皇朝筠州豐利縣令父循贈洗馬君即洗馬府君之元子嗚呼嘉禾之偏宰樹焉依崇丘即髙大浸重潤元精之發回復其中故君生受英華之氣殁歸隠厚之竁宜其騰振洪徽延垂慶嗣也祖宿纂祖之武得君之文甫逮弱齡擢登秀士與其弟端靖定等遐䕶歸輤進拜先友哀託斯銘往旌不朽銘曰猗朱君秉國文星回漢鼎歊汾丹素絢雅鄭分音扣玉氣飄雲才日新行日聞騁夷道夭中身霈洪私贈朱輪勾吳邑靈海濱降精英積氤氲地貞吉宅還眞閟脩夜非我春聳孤石垂後人翰林學士李白墓碑裴敬附見李白集李翰林名白字太白以詩著名召入翰林世稱才名占得翰林他人不復爭先其後以脅從得罪既免遂放浪江南死宣城葬當塗青山下李陽氷序詩集粗具行止敬嘗遊江表過其墓下愛其才壮其氣味其嗜酒知其取適作碑於墓且曰先生得天地秀氣耶不然何異於常之人耶或曰太白之精下降故字太白故賀監號為謫仙不其然乎故為詩格髙㫖逺若在天上物外神仙㑹集雲行鶴駕想見飄然之状視塵中屑屑米粒蟲睫紛擾菌蠢羈絆蹂躪之比乂嘗有知鑒客并州識郭汾陽於行伍間為免脱其刑責而奨重之後汾陽以功成官爵請贖翰林上許之因免誅其報也又嘗心許劒舞裴将軍予曽叔祖也嘗投書曰如白願出将軍門下其文髙其氣雄世稀其本懼失其傳故傳叙之太和初文宗皇帝命翰林學士為三絶賛公之詩歌與裴集無此字将軍劒舞洎張旭長史草書於三絶夫天付上才必同靈氣賢傑相投龍虎兩合可為知者言非常人所知也夫古以明德稱占其官諡者甚希前以詩稱者若謝吏部何水部陶彭澤鮑叅軍之類唐朝以詩稱若王江寧若宋考功韋蘇州王右丞杜員外之類以文稱者若陳拾遺蘇司業元容州蕭功曹韓吏部之類以德行稱者元魯山陽道州以直稱者魏文貞狄梁公以忠烈稱者顔魯公段太尉以武稱者李魏公英公以學行文翰稱者虞秘監唐之得人於斯為盛翰林其以詩稱之一也予嘗過當塗訪翰林舊宅又於浮屠寺化城之僧得翰林自冩訪賀監不遇詩云東山無賀老却棹酒船廻味之不足重之為寳用獻知者又於歴陽郡得翰林與劉尊師書一紙思髙筆逸又嘗逰上元蒋山寺見翰林讃誌公云水中之月了不可取刀齊尺量扇迷陳語文簡事備誠為作者附於此云㑹昌三年二月中敬自淠水草堂南逰江左過公墓下四過青山兩發塗口徘徊不忍去與前濮州鄄城縣尉李邵同以公服拜其墓問其墓左人畢元宥實備灑掃留絹集作綿帛具酒饌祭公知公無孫有孫女二人一嫁集作娶下同劉勸一嫁陳雲皆農夫也且曰二孫女不拜墓已五六年矣因告邑宰李君都傑請免畢元宥力役俾專灑掃事嘻享名甚髙後事何薄謝公舊井新墓角落青山白雲共為蕭索巨竹拱墓如公卓犖天長地乆其名不朽此為祭文冩授元宥乂為碑曰貴盡皆然名存則難故子集作予重名不重官作李翰林碑十五字而已文苑英華巻八百九十四
