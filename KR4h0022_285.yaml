body:
  text: 文苑英華巻二百八十五宋李昉等編送行二十歌附賦物送人四十一首歌十五首賦得鴈送别周員外戍嶺表王胄旅鴈别衡陽天寒關路長行斷由驚箭聲嘶為犯霜罹一作羅繳無人愍能鳴返自傷何如侣泊泊𥘉學記作汎汎刷羽戲方塘此詩三百二十八巻重出今已削去别故人賦得凌雲獨鶴王拊單嘶凌碧霧風颺入青雲九臯空顧侣千里㑹離羣望海飛恒急摩天影詎分欲知凄斷意琴裏自當聞送王賛府叅選賦得鶴駱賔王振衣逰紫府飛盖背青田虛心恒警露孤影尚凌烟離歌悽妙曲别操集作引繞繁絃在隂如可和清響㑹聞天送郭集作鄭少府入遼共賦俠客逺從戎前人邉烽警榆塞俠客度桑乾桞葉開銀鏑桃花曜集作照玉鞍漏月臨弓影連星入劍端莫學燕丹客空歌易水寒送劉散員同賦陳思王詩得好鳥鳴髙枝劉斌春林已自好時鳥復和鳴枝交難奮翼谷静易流聲間關纔得性矰繳遽相驚安知背飛逺拂霧獨晨征賦得山樹鬱蒼蒼許敬宗喬木託危岫積翠遶連岡葉踈猶漏影花少未流芳風來聞肅肅霧罷見蒼蒼此中餞行邁不異上河梁賦得明月照高樓楊濬髙樓一何綺素月復流明重軒望不極餘輝攬詎盈鏡華當牖照鉤影隔簾生逆愁異樽酒對此難為情賦得逰人久不歸劉孝孫鄉闗𣺌天末引領悵懐歸羇旅乆淫滯物色屢芳菲稍覺山意盡行看蓬鬢衰如何千里外佇立霑裳衣賦得春鶯送友人賀朝翅掩飛燕舞啼惱媫妤悲料取金閨意因君問所思流鶯拂繡羽二月上林期待雪銷金禁銜花向玉墀餞濟隂梁明府各探一物得荷葉張九齡荷葉生幽渚芳華信在兹朝朝空此地采采欲因誰但恐星霜改還將蒲稗衰懐君美人别聊取集作以贈心期送姚評事入蜀各賦一物得卜肆前人蜀嚴化已乆湛明空所思嘗聞賣卜處猶憶下簾時驅傳應經此懐賢儻問之歸來說徃事歴歴偶心期竇校書見餞得雲中辨江樹江水連天色無集作天涯净野氛㣲明岸傍樹凌亂渚前雲舉棹形徐集作隨轉登艫意漸分𣺌茫從此去空復惜離羣題𤓰洲新河餞族叔舍人賁李白齊公鑿新河萬古流不絶豐功利生人天地同朽滅兩橋對雙閤芳樹有行列愛此如甘棠誰云敢攀折呉闗倚北固天險自茲設海水落斗門潮平見沙汭我行送季父弭棹徒流恱楊花滿江來疑是隴上雪惜此林下興愴為山陽别瞻望清路塵歸來空寂蔑賦得秤送孟儒卿包何願以金錘秤因君贈别離鈎懸新月吐衡舉衆星随掌握須平執錙銖必盡知由來投分審莫放弄權移送客賦得油席㡌錢起薄質慙加首秋隂幸庇身巻舒無定日行止必依人已沐脂膏惠寕辭雨露頻雖同客衣色不染洛陽塵賦得彭祖樓送楊宗德歸徐州幕盧綸四户八忩明玲瓏逼上清外欄黄鵠下中柱紫芝生毎帯雲霞色時聞簫管聲望君兼有月幢葢儼層城贈送張成季徃江上賦得垂楊前人垂楊真可憐地勝覺春偏一穗雨聲裏千條池色前露繁花的皪日麗影團圓若到隋堤望應逄花滿船送韋判官得雨中山前峯後嶺碧濛濛草擁驚泉樹帯風人語馬嘶聽不得更堪長路在雲中顔侍御㕔藂篁詠送薛存誠前人玉幹百餘莖生君此堂側拂簷寒雨響擁砌深溪色何事鳯凰雛茲焉理歸翼賦得長洲苑送李惠郎士元草深那可訪地乆阻相傳散漫三秋雨踈蕪萬里烟都迷採蘭處強記舘娃年客有遊呉者臨風思𣺌然題竹扇贈别皇甫冉湘竹殊堪製齊紈且未工幸親芳袖日猶帯舊林風掩笑歌筵裏傳書卧閣中竟將為别贈寕與合歡同春鳥詞送元秀才入京顧况春来繡羽齊暮向竹林栖禁苑銜花出河橋隔樹啼尋聲知去逺顧影念飛低别有無巢鷰猶窺幕上泥栁楊送客李益青楓江畔白蘋洲楚客傷離不待秋君見隋朝更何事桞楊南渡水悠悠别鶴詞送令狐校書之桂府楊巨源海鶴一為别高程方窅然影揺江漢路思結瀟湘天皎然仰白日真姿栖紫烟含情九霄際顧侣五雲前遐心属清都凄響激朱弦超遥聞風雨迢逓各山川東南信多水㑹合當有年雌一作雄飛唳𡨕𡨕此意何由傳賦得夜雨滴空堦送魏秀才楊衡委簷方滴滴霑紅復栖緑醉聽乍朦朧愁聞多斷續始兼泉一作松響細稍雜更聲促百慮自縈心况有人如玉送陳偃賦得白鳥翔翠㣲朱灣不知鷗與鶴天畔弄晴暉背日分眀見臨川相映微净中雲一㸃廽處雪孤飛正好髙枝立翩翩何所歸聼江笛送陸侍郎韋應物逺以集作聽江上笛臨觴一送君還愁獨宿夜更向郡齋聞送李竟之宣州謁袁中丞賦得渡江張衆甫古渡大江濵西南距要津自當舟檝路應濟徃來人翻浪驚飛鳥回風起緑鱗一作蘋君看波上客歲晩獨垂綸賦得月下聞蛩送别劉商物候改秋節炎凉此夕分暗蟲聲遍草明月夜無雲清迥簷外見凄其籬下聞感時兼惜别羇思自紛紛秋砧送邑大夫竇叔向斷續長門夜清泠逆旅秋征夫應待信寒女不勝愁帯月飛城上因風散陌頭離居偏入聽况復送歸舟呉興送梁𥙷闕歸朝賦得荻花朱長文栁家汀洲孟冬月雲寒水清荻花發一枝持贈朝天人應比蓬萊殿前雪賦得巴峽啼猿送客釋皎然萬里巴江夜三聲月一作出峽深何年有此路㡬客共霑襟斷壁一作臂分連一作重影流泉入苦吟凄凄别離處一作後聞此更傷心賦得石梁泉送崔逵架石通霞壁懸流散碧沙天晴虹影度風細練文斜攀陟幽期阻㳂洄客意賖河梁非此路别恨亦無涯賦得夜雨滴空堦送陸羽歸龍山前人閒堦夜雨滴偏入别情中斷續清猿應淋漓候舘空氣令煩慮散時與早秋同歸客龍山道東來雜好風賦得謝墅送王長史前人世業州西墅移家長我身蕭踈遺樹老寂寞廢田春車巷傷前轍籬溝憶舊隣何堪冄過此更送北歸人賦得竹如意送詳法師赴講縹竹湘南美吾師尚毁形仍留負霜節不變在林青毎入楊枝手因譚貝葉經誰期沃洲講持此别東亭賦得顔氏古今事得晉仙傳送顔逸梁湘東王國常侍顔協著晉仙傳五篇曾看顔氏傳多記晉時仙却憶桐君老俱還桂父年青春留鬢髪白日向雲烟逺别賫遺簡囊中有㡬篇妙善寺逵公院賦得夜磬送吕評事前人一磬寒山至凝心轉清越細和虚籟盡踈繞懸泉發在夜吟更長停空韻難絶幽僧悟深定歸客㤀逺别寂歴無性中眞聲何起滅奉同顔真卿送李侍御蕚賦得荻塘路前人落日車遥遥客心在歸路細草暗廻塘春泉縈古渡遺蹤歎蕪没逺道悲去住寂寞荻花空行人别無數賦得古原草送别白居易離離原上草一歲一枯榮野火燒不盡春風吹又生逺芳侵古道晴翠接荒城又送王孫去萋萋滿别情賦得望逺山送客歸釋無可遥山寒雨過正向暮天横隱隱凌雲出蒼蒼共集作與水平何時集作年凝厚地㡬處向孤城歸客秋風裏回看傷别情送祝八之江東賦得浣紗石李白西施越溪女明艷光雲海未入呉王宫殿時浣紗古石今猶在桃李新開映故集作古查菖蒲猶短未集作出平沙昔時紅粉照流水今日青苔覆落花君去西秦適東越碧山清江㡬超忽若到天涯思故人浣紗石上窺明月赤壁歌送别前人二龍争戰决雌雄赤壁樓船掃地空烈火張天照雲海周瑜於此破曹公君去滄江弄波集作澄碧鯨鯢唐突留餘跡一一書來報故人我欲因之壯心魄賦得白鷗歌送李伯康歸使盧綸積水深沉句白鷗飛翻句倒影光素句于潭之間句銜魚落句亂驚鳴句争撲蓮句藂葉一作華傾爾不見句波中鳴鶂閒無營句何必汲汲勞其生桞花𡨕濛大堤口悠揚相和乍無有輕随去浪杳不分細舞春風一何有上句已押有字似君換得白鵝時獨凭闌干雪滿池今日還同看鷗鳥如何羽翮復參差復參差海潮瀾漫何由期陳翃郎中北亭送劉侍御賦得帯氷流歌前人谿中鳥鳴春景旦一𣲖寒氷忽開散璧方鏡圓流不斷白雲鱗鱗滿河漢疊處淺旋處深撇捩寒魚上復沈羣鵞鼓舞揚清音主人有客簮白筆玉壺貯此光如一持此贈君君飲之聖君識君氷玉姿洛陽行送洛陽韋七明府一有響字顧况始上龍門望洛川洛陽桃李艶陽天最好當年二三月上陽宫樹千花發䟽家父子錯掛冠梁鴻夫妻虛適越黄鵠樓歌送獨孤助前人故人西去黄鵠樓西江之水上天流黄鵠杳杳江悠悠黄鵠徘徊故人離别堂酒盡清絲絶緑嶼没餘烟白沙連曉月廬山瀑布歌送李顧前人飄白霓挂丹梯應從織女機邉落不遣潯陽潮向西火雷劈山珠噴日五老峯前九江溢九江悠悠萬古情古人行盡今人行老人也欲上山去上箇深山無姓名賦得秋河曙耿耿送郭秀才應舉雜言歐陽詹月没天欲明秋河尚凝白皚皚積光素耿耿横虛碧南斗接北辰連合集作空濛鴻一作鴻濛洞浮髙天湯湯集作蕩蕩漫漫皆皛然實類平蕪流大川星為潭底珠雲是波中烟鷄唱漏盡東方作曲渚集作空曲蒼蒼曉霜落鴈呌疑從清淺驚鳬聲似在沿洄泊并州細侯直下孫才應秋賦懐金門念排雲漢将飛翻仰之踴躍當華軒夜來陪餞歐陽子偶坐通宵見深㫖心知慷慨日集作目昭然集作回前程志在青雲裏錫杖歌送楚上人歸佛川權徳輿上人逺自西天至頭陁行遍南朝寺口翻貝葉古字經手持金策聲泠泠䕶法䕶身惟振錫石瀬雲溪深寂寂乍來松逕風更寒遥映霜天月成魄後夜空山禪誦時寥寥挂在枯樹枝真法常傳心不住東西南北隨縁路佛川此去何時廻應眞莫便遊天台桃花石枕歌送安吉康丞釋皎然君吏桃州尚寄跡桃州採得桃花石爛疑朝日照已舒含似春風吹未坼珪璋特達世所珍吾知此物亦其倫應羡花開不凋悴應喜玉片無緇磷立性堅剛平若砥君子偏將交道比何人亦秉堅剛姿吾見君心得如此君心所好我獨知别多見少長相思從今一作來賞玩安左右萬里提擕君莫辭春夜賦得漉水囊歌送鄭明府前人呉縑楚練何白晳居士持來遺禪客禪客能裁漉水囊不用良工秉刀尺先師遣我戒無缺疑一慮一翻心敢賖夕望東風思漱盥朦朧斜月懸燈紗徙倚花前漏𥘉斷白猿争嘯驚禪伴玉瓶徐㵼尚涓涓濺着蓮衣水珠滿因識仁人為官情還如漉水愛蒼生聊歌一曲與君别莫忘寒泉見底清賦得隨陽鴈歌送兄南遊劉商塞鴻聲聲飛不住終日南征向何處大漠窮隂多沍寒分飛不得長懐安春去秋來年歲疾湖南薊北闗山難寒飛萬里胡天雪夜度千門漢家月去住應多兩地情東西動作經年别南州風土復何如春鴈歸時早寄書賦得射雉歌送楊協律表弟赴婚期前人昔日才高容貎古相敬如賔不相覩手奉蘋蘩喜盛門心知禮義感君恩三星照户春空盡一樹桃花竟不言結束車輿强遊徃和風霽日東臯上鸞鳯参差陌上行麥苖縈隴雉𥘉鳴修容盡餙将何益極慮呈材欲導情六藝從師得機要百發穿楊含絶妙白羽風馳碎錦毛青娥怨處嫣然笑楊生詞賦比潘郎不似前賢貎不揚聽調琴弄能和室更解彎弧足自防秋深為爾持團扇莫忘魯連飛一箭泛舒城南溪賦得沙鶴歌奉餞張侍御赴河南元博士赴揚州拜覲僕射終日閭閻逐群鷄喜逄野鶴臨清溪緑苔春水水中影夜月平沙沙上栖驚謂汀洲白蘋發又疑曲渚前年雪紫頂昻藏肯狎人一聲嘹喨一作唳冲天闕素質翩翩帯落暉湖南渭陽相背飛東西分散别離促宇宙蒼茫相見稀皇華地仙如鶴馭乘駕飄飄留不住延望乘虚入紫霞陌頭回首空烟樹㑹使摶風羽翮輕九霄雲路隨先鳴姑蘇懐古送秀才下第歸江南前人姑蘇臺枕呉江水層級鱗差向天倚秋高露白萬林空低望呉田三百里當時雄盛如何比千仭無根立平地臺前夾月吹玉鸞臺上迎凉撼金翠銀河倒㵼君王醉灧酒峨冠眄西子宫娃酣態舞娉婷香飈四䬃青珠墜伍員結舌長嘘􅐵忠諫無因到君耳城烏啼盡海霞銷深掩金屏日高睡王道潜隳伍員死可歎斗間瞻王氣㑹稽句踐擁長矛萬馬鳴蹄掃空壘瓦解氷銷眞可恥凝艷妖芳安足恃可憐荒堞晩𡨕濛麋鹿呦呦達遺址君懐逸氣還東呉吟狂日日遊姑蘇興來下筆到竒景瑶盤迸灑鮫人珠大鵬矯翼翻雲衢嵩峯霽後凌天孤海潮秋打羅刹石月魄夜當彭蠡湖有時凝思家虚無霓幢髣髴遊仙都琳瑯暗戞玉華殿天香静裊金芙蕖君聲日下聞來久清贍何人敢敵手我逃名迹遁西林不得㶚陵傾别酒莫便五湖為隱淪年年三十昇仙人文苑英華巻二百八十五
