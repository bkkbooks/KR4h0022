body:
  text: 文苑英華卷二百八十五宋李昉等編送行二十歌附賦物送人四十一首歌十五首賦得鴈送别周員外戍嶺表王胄旅鴈别衡陽天寒關路長行斷由驚箭聲嘶為犯霜罹一作羅繳無人愍能鳴返自傷何如侣泊泊𥘉學記作泛泛刷羽戲方塘此詩三百二十八卷重出今已削去别故人賦得凌雲獨鶴王拊單嘶凌碧霧風揚入青雲九臯空顧侣千里會離羣望海飛恆急摩天影詎分欲知凄斷意琴裏自當聞送王贊府參選賦得鶴駱賔王振衣逰紫府飛蓋背青田虛心恆警露孤影尚凌煙離歌悽妙曲别操集作引繞繁絃在隂如可和清響會聞天送郭集作鄭少府入遼共賦俠客逺從戎前人邉烽警榆塞俠客度桑乾桞葉開銀鏑桃花曜集作照玉鞍漏月臨弓影連星入劍端莫學燕丹客空歌易水寒送劉散員同賦陳思王詩得好鳥鳴髙枝劉斌春林已自好時鳥復和鳴枝交難奮翼谷靜易流聲間關才得性矰繳遽相驚安知背飛逺拂霧獨晨征賦得山樹鬱蒼蒼許敬宗喬木託危岫積翠繞連岡葉踈猶漏影花少未流芳風來聞肅肅霧罷見蒼蒼此中餞行邁不異上河梁賦得明月照高樓楊濬髙樓一何綺素月復流明重軒望不極餘輝攬詎盈鏡華當牖照鉤影隔簾生逆愁異樽酒對此難為情賦得逰人久不歸劉孝孫鄉關渺天末引領悵懷歸羇旅久淫滯物色屢芳菲稍覺山意盡行看蓬鬢衰如何千里外佇立霑裳衣賦得春鶯送友人賀朝翅掩飛燕舞啼惱媫妤悲料取金閨意因君問所思流鶯拂繡羽二月上林期待雪銷金禁銜花向玉墀餞濟隂梁明府各探一物得荷葉張九齡荷葉生幽渚芳華信在兹朝朝空此地采采欲因誰但恐星霜改還將蒲稗衰懷君美人别聊取集作以贈心期送姚評事入蜀各賦一物得卜肆前人蜀嚴化已久湛明空所思嘗聞賣卜處猶憶下簾時驅傳應經此懷賢儻問之歸來説往事歷歷偶心期竇校書見餞得雲中辨江樹江水連天色無集作天涯淨野氛微明岸傍樹凌亂渚前雲舉棹形徐集作隨轉登艫意漸分渺茫從此去空復惜離羣題瓜洲新河餞族叔舍人賁李白齊公鑿新河萬古流不絶豐功利生人天地同朽滅兩橋對雙閣芳樹有行列愛此如甘棠誰云敢攀折吳關倚北固天險自茲設海水落斗門潮平見沙汭我行送季父弭棹徒流恱楊花滿江來疑是隴上雪惜此林下興愴為山陽别瞻望清路塵歸來空寂蔑賦得稱送孟儒卿包何願以金錘稱因君贈别離鈎懸新月吐衡舉衆星隨掌握須平執錙銖必盡知由來投分審莫放弄權移送客賦得油席帽錢起薄質慙加首秋隂幸庇身卷舒無定日行止必依人已沐脂膏惠寧辭雨露頻雖同客衣色不染洛陽塵賦得彭祖樓送楊宗德歸徐州幕盧綸四户八忩明玲瓏逼上清外欄黃鵠下中柱紫芝生每帶雲霞色時聞簫管聲望君兼有月幢蓋儼層城贈送張成季往江上賦得垂楊前人垂楊真可憐地勝覺春偏一穗雨聲裏千條池色前露繁花的皪日麗影團圓若到隋堤望應逄花滿船送韋判官得雨中山前峯後嶺碧濛濛草擁驚泉樹帶風人語馬嘶聽不得更堪長路在雲中顔侍御廳藂篁詠送薛存誠前人玉幹百餘莖生君此堂側拂簷寒雨響擁砌深溪色何事鳯凰雛茲焉理歸翼賦得長洲苑送李惠郎士元草深那可訪地久阻相傳散漫三秋雨踈蕪萬里煙都迷採蘭處強記館娃年客有遊吳者臨風思渺然題竹扇贈别皇甫冉湘竹殊堪製齊紈且未工幸親芳袖日猶帶舊林風掩笑歌筵裏傳書卧閣中竟將為别贈寧與合歡同春鳥詞送元秀才入京顧况春來繡羽齊暮向竹林栖禁苑銜花出河橋隔樹啼尋聲知去逺顧影念飛低别有無巢燕猶窺幕上泥栁楊送客李益青楓江畔白蘋洲楚客傷離不待秋君見隋朝更何事桞楊南渡水悠悠别鶴詞送令狐校書之桂府楊巨源海鶴一為别高程方窅然影搖江漢路思結瀟湘天皎然仰白日真姿栖紫煙含情九霄際顧侣五雲前遐心屬清都凄響激朱弦超遙聞風雨迢遞各山川東南信多水會合當有年雌一作雄飛唳𡨕𡨕此意何由傳賦得夜雨滴空階送魏秀才楊衡委簷方滴滴霑紅復栖緑醉聽乍朦朧愁聞多斷續始兼泉一作松響細稍雜更聲促百慮自縈心况有人如玉送陳偃賦得白鳥翔翠微朱灣不知鷗與鶴天畔弄晴暉背日分眀見臨川相映微淨中雲一點廽處雪孤飛正好髙枝立翩翩何所歸聼江笛送陸侍郎韋應物逺以集作聽江上笛臨觴一送君還愁獨宿夜更向郡齋聞送李竟之宣州謁袁中丞賦得渡江張衆甫古渡大江濵西南距要津自當舟楫路應濟往來人翻浪驚飛鳥回風起緑鱗一作蘋君看波上客歲晚獨垂綸賦得月下聞蛩送别劉商物候改秋節炎涼此夕分暗蟲聲遍草明月夜無雲清迥簷外見凄其籬下聞感時兼惜别羇思自紛紛秋砧送邑大夫竇叔向斷續長門夜清泠逆旅秋征夫應待信寒女不勝愁帶月飛城上因風散陌頭離居偏入聽况復送歸舟吳興送梁輔闕歸朝賦得荻花朱長文栁家汀洲孟冬月雲寒水清荻花發一枝持贈朝天人應比蓬萊殿前雪賦得巴峽啼猿送客釋皎然萬里巴江夜三聲月一作出峽深何年有此路幾客共霑襟斷壁一作臂分連一作重影流泉入苦吟凄凄别離處一作後聞此更傷心賦得石梁泉送崔逵架石通霞壁懸流散碧沙天晴虹影度風細練文斜攀陟幽期阻沿洄客意賖河梁非此路别恨亦無涯賦得夜雨滴空階送陸羽歸龍山前人間階夜雨滴偏入别情中斷續清猿應淋漓候館空氣令煩慮散時與早秋同歸客龍山道東來雜好風賦得謝墅送王長史前人世業州西墅移家長我身蕭踈遺樹老寂寞廢田春車巷傷前轍籬溝憶舊鄰何堪冉過此更送北歸人賦得竹如意送詳法師赴講縹竹湘南美吾師尚毁形仍留負霜節不變在林青每入楊枝手因談貝葉經誰期沃洲講持此别東亭賦得顔氏古今事得晉仙傳送顔逸梁湘東王國常侍顔協著晉仙傳五篇曾看顔氏傳多記晉時仙却憶桐君老俱還桂父年青春留鬢髮白日向雲煙逺别賫遺簡囊中有幾篇妙善寺逵公院賦得夜磬送吕評事前人一磬寒山至凝心轉清越細和虛籟盡踈繞懸泉發在夜吟更長停空韻難絶幽僧悟深定歸客忘逺别寂歷無性中真聲何起滅奉同顔真卿送李侍御蕚賦得荻塘路前人落日車遙遙客心在歸路細草暗回塘春泉縈古渡遺蹤歎蕪沒逺道悲去住寂寞荻花空行人别無數賦得古原草送别白居易離離原上草一歲一枯榮野火燒不盡春風吹又生逺芳侵古道晴翠接荒城又送王孫去萋萋滿别情賦得望逺山送客歸釋無可遙山寒雨過正向暮天橫隱隱凌雲出蒼蒼共集作與水平何時集作年凝厚地幾處向孤城歸客秋風裏回看傷别情送祝八之江東賦得浣紗石李白西施越溪女明艷光雲海未入吳王宫殿時浣紗古石今猶在桃李新開映故集作古查菖蒲猶短未集作出平沙昔時紅粉照流水今日青苔覆落花君去西秦適東越碧山清江幾超忽若到天涯思故人浣紗石上窺明月赤壁歌送别前人二龍爭戰決雌雄赤壁樓船掃地空烈火張天照雲海周瑜於此破曹公君去滄江弄波集作澄碧鯨鯢唐突留餘迹一一書來報故人我欲因之壯心魄賦得白鷗歌送李伯康歸使盧綸積水深沉句白鷗飛翻句倒影光素句于潭之間句銜魚落句亂驚鳴句爭撲蓮句藂葉一作華傾爾不見句波中鳴鶂間無營句何必汲汲勞其生桞花𡨕濛大堤口悠揚相和乍無有輕隨去浪杳不分細舞春風一何有上句已押有字似君換得白鵝時獨憑闌干雪滿池今日還同看鷗鳥如何羽翮復參差復參差海潮瀾漫何由期陳翃郎中北亭送劉侍御賦得帶氷流歌前人溪中鳥鳴春景旦一𣲖寒氷忽開散璧方鏡圓流不斷白雲鱗鱗滿河漢疊處淺旋處深撇捩寒魚上復沈羣鵝鼓舞揚清音主人有客簮白筆玉壺貯此光如一持此贈君君飲之聖君識君氷玉姿洛陽行送洛陽韋七明府一有響字顧况始上龍門望洛川洛陽桃李艷陽天最好當年二三月上陽宫樹千花發疏家父子錯挂冠梁鴻夫妻虛適越黃鵠樓歌送獨孤助前人故人西去黃鵠樓西江之水上天流黃鵠杳杳江悠悠黃鵠徘徊故人離别堂酒盡清絲絶緑嶼沒餘煙白沙連曉月廬山瀑布歌送李顧前人飄白霓挂丹梯應從織女機邉落不遣潯陽潮向西火雷劈山珠噴日五老峯前九江溢九江悠悠萬古情古人行盡今人行老人也欲上山去上箇深山無姓名賦得秋河曙耿耿送郭秀才應舉雜言歐陽詹月沒天欲明秋河尚凝白皚皚積光素耿耿橫虛碧南斗接北辰連合集作空濛鴻一作鴻濛洞浮髙天湯湯集作蕩蕩漫漫皆皛然實類平蕪流大川星為潭底珠雲是波中煙雞唱漏盡東方作曲渚集作空曲蒼蒼曉霜落鴈呌疑從清淺驚鳬聲似在沿洄泊并州細侯直下孫才應秋賦懷金門念排雲漢將飛翻仰之踴躍當華軒夜來陪餞歐陽子偶坐通宵見深旨心知慷慨日集作目昭然集作回前程志在青雲裏錫杖歌送楚上人歸佛川權德輿上人逺自西天至頭陀行遍南朝寺口翻貝葉古字經手持金策聲泠泠護法護身惟振錫石瀨雲溪深寂寂乍來松徑風更寒遙映霜天月成魄後夜空山禪誦時寥寥挂在枯樹枝真法常傳心不住東西南北隨緣路佛川此去何時回應真莫便遊天台桃花石枕歌送安吉康丞釋皎然君吏桃州尚寄迹桃州採得桃花石爛疑朝日照已舒含似春風吹未坼圭璋特達世所珍吾知此物亦其倫應羡花開不凋悴應喜玉片無緇磷立性堅剛平若砥君子偏將交道比何人亦秉堅剛姿吾見君心得如此君心所好我獨知别多見少長相思從今一作來賞玩安左右萬里提擕君莫辭春夜賦得漉水囊歌送鄭明府前人吳縑楚練何白晳居士持來遺禪客禪客能裁漉水囊不用良工秉刀尺先師遣我戒無缺疑一慮一翻心敢賖夕望東風思漱盥朦朧斜月懸燈紗徙倚花前漏𥘉斷白猿爭嘯驚禪伴玉瓶徐㵼尚涓涓濺著蓮衣水珠滿因識仁人為官情還如漉水愛蒼生聊歌一曲與君别莫忘寒泉見底清賦得隨陽鴈歌送兄南遊劉商塞鴻聲聲飛不住終日南征向何處大漠窮隂多沍寒分飛不得長懷安春去秋來年歲疾湖南薊北關山難寒飛萬里胡天雪夜度千門漢家月去住應多兩地情東西動作經年别南州風土復何如春鴈歸時早寄書賦得射雉歌送楊協律表弟赴婚期前人昔日才高容貌古相敬如賔不相覩手奉蘋蘩喜盛門心知禮義感君恩三星照户春空盡一樹桃花竟不言結束車輿強遊往和風霽日東臯上鸞鳯參差陌上行麥苖縈隴雉𥘉鳴修容盡飾將何益極慮呈材欲導情六藝從師得機要百發穿楊含絶妙白羽風馳碎錦毛青娥怨處嫣然笑楊生詞賦比潘郎不似前賢貌不揚聽調琴弄能和室更解彎弧足自防秋深為爾持團扇莫忘魯連飛一箭泛舒城南溪賦得沙鶴歌奉餞張侍御赴河南元博士赴揚州拜覲僕射終日閭閻逐群雞喜逄野鶴臨清溪緑苔春水水中影夜月平沙沙上栖驚謂汀洲白蘋發又疑曲渚前年雪紫頂昻藏肯狎人一聲嘹喨一作唳沖天闕素質翩翩帶落暉湖南渭陽相背飛東西分散别離促宇宙蒼茫相見稀皇華地仙如鶴馭乘駕飄飄留不住延望乘虛入紫霞陌頭回首空煙樹會使摶風羽翮輕九霄雲路隨先鳴姑蘇懷古送秀才下第歸江南前人姑蘇臺枕吳江水層級鱗差向天倚秋高露白萬林空低望吳田三百里當時雄盛如何比千仭無根立平地臺前夾月吹玉鸞臺上迎涼撼金翠銀河倒㵼君王醉灧酒峨冠眄西子宫娃酣態舞娉婷香飈四颯青珠墜伍員結舌長噓􅐵忠諫無因到君耳城烏啼盡海霞銷深掩金屏日高睡王道潛隳伍員死可歎斗間瞻王氣會稽句踐擁長矛萬馬鳴蹄掃空壘瓦解氷銷真可恥凝艷妖芳安足恃可憐荒堞晚𡨕濛麋鹿呦呦達遺址君懷逸氣還東吳吟狂日日遊姑蘇興來下筆到竒景瑶盤迸灑鮫人珠大鵬矯翼翻雲衢嵩峯霽後凌天孤海潮秋打羅剎石月魄夜當彭蠡湖有時凝思家虛無霓幢髣佛遊仙都琳琅暗戞玉華殿天香靜裊金芙蕖君聲日下聞來久清贍何人敢敵手我逃名迹遁西林不得灞陵傾别酒莫便五湖為隱淪年年三十升仙人文苑英華卷二百八十五
