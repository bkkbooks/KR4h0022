body:
  text: 文苑英華卷一百八十四宋李昉等編省試五釋奠日國學觀禮聞雅頌二首貢舉人謁先師聞雅樂二首太常寺觀舞聖壽樂一首冊上公太常奏雅樂一首曉過南宫聞太常清樂二首太常觀閲驃國新樂一首郊壇聼雅樂一首舞干羽兩階一首朱絲絃一首夫子鼓琴得其人一首夜聞洛濵吹笙一首緱山月夜聞王子普吹笙二首湘靈鼓瑟五首霓裳羽衣曲一首寒夜聞霜鐘二首曉聞長樂鐘聲一首聽霜鐘二首律中應鐘一首笙磬同音一首范成君擊洞隂磬一首終南精舍月中聞磬二首泗濵得石磬一首風箏一首聽郢客歌陽春白雪一首尚書郎上直聞春漏三首雪後觀象闕待漏一首太清宫聞滴漏一首百官乘月早朝聽殘漏一首春臺晴望三首釋奠日國學觀禮聞雅頌滕珦太學時觀禮東方曉色分威儀何棣棣環珮又紛紛古樂從空盡清歌幾處聞六和成逺吹九奏動行雲聖上尊儒樂春秋奠茂勳幸因陪齒列聊以頌斯文同前令狐􅀈肅肅先師廟依依胄子羣滿庭陳舊禮開户拜清芬萬舞當華燭簫韶入翠雲頌歌侵曉聽雅吹度風聞淡泊調元氣中和美聖君惟餘東魯客蹈舞向南薰貢舉人謁先師聞雅樂吕炅禮聖來羣彥觀光在此時聞歌音乍逺合樂和還遲調朗能諧竹聲微又契絲輕泠流簨虡繚繞動纓緌九變將隨節三終必盡儀國風由是正王化自雍熙同前王起藹藹觀光士來同鵠鷺羣鞠躬遺像在稽首雅歌聞度曲飄清漢餘音遏曉雲雨楹凄已合九仞杳難分斷續同清吹洪纎入紫氛長言聽已罷千載仰斯文太常寺觀舞聖壽樂徐元弼舞字傳新慶人文邁舊章冲融和氣洽悠逺聖功長盛德流無外明時樂未央日華增顧盼風物助低昻翥鳯方齊首髙鴻忽斷行雲門與兹曲同是奉陶唐册上公太常奏雅樂前人司樂陳金石逶迤引上公奏音人語絶清韻珮聲通應律烟雲改來儀鳥獸同得賢因舉頌修禮便觀風聖壽三稱內天歡九奏中寂寥高曲盡猶自滿宸聰曉過南宫聞太常清樂陸贄南宮聞古樂拂曙聽初驚烟靄遙迷處絲桐暗辨名節隨新律改聲𢃄緒風輕合雅將移俗同和自感情逺音兼曉漏餘響過春城九奏明初日寥寥天地清同前張濛玉珂經禮寺金奏過南宫雅調乘清曉飛聲向逺空漫隨飄去雪輕逐度來風逈出重城裏旁聞九陌中應將肆夏比更與五英同一聽南薰曲因知大舜功太常觀閲驃國新樂胡直鈞異音來驃國初被奉常人才可宫商辨殊驚節奏新轉規回繡靣曲折度文身舒散隨鸞吹喧呼雜鳥春襟衽懷舊識絲竹變恆陳何事留中夏長令表化淳郊壇聽雅樂前人泰壇恭祀事彩仗下寒坰展禮陳嘉樂齊心動衆靈韻長飄更逺曲度靜宜聽泛響何清越隨風散杳𡨕微懸和氣聚旋退曉山青本自鈞天降還疑列洞庭舞干羽兩階石倚干羽能柔逺前階舞正陳欲稱文德盛先表樂聲新肅肅行初列森森氣益振動容和律吕變曲靜風塵化美超千古恩波及七旬已知天下服不獨有苗人朱絲絃楊衡寂寞瑤琴上深知直者情幸傳朱鷺曲那止素絲名瑞草人空仰王言世久行大方聞正位樂府動清聲文武音初合宫商調屢更誰能向機杼終日泣無成夫子鼓琴得其人白行簡宣父窮𤣥奧師襄授素琴稍殊流水引全辨聖人心慕德聲逾感懷人意自深泠泠傳妙手摵摵振空林促調清風至操絃白日沉曲終情不盡千古仰知音夜聞洛濵吹笙張仲素王子千年後笙音五夜聞逶迤繞清洛斷續下仙雲泄泄飄難定啾啾曲未分松風助幽律波月動輕文鳯管聽何逺鸞聲若在羣暗空思羽蓋餘氣自氛氲緱山月夜聞王子普吹笙厲𤣥緱山明月夜岑寂隔塵氛紫府參差曲清宵次第聞韻流多入洞聲度半和雲拂竹鸞驚侣經松鶴舞羣蟾光聽處合仙路望中分坐惜千嵒曙遺音過汝墳同前鍾輅月滿緱山夜風傳子普笙初聞盈谷逺漸聽入雲清杳異人間曲遙分鶴上情孤鸞驚欲舞萬籟寂無聲此夕留烟駕何時返玉京唯愁音響絶曉色出都城湘靈鼓瑟魏璀瑶瑟多哀怨朱絃且莫聽扁舟三楚客藂竹二妃靈淅瀝聞餘響依稀欲辨形柱間寒水碧曲裏暮山青良馬悲銜草遊魚思繞萍知音若相遇終不滯南溟同前錢起天寶十載善撫一作鼓雲和瑟常聞帝子靈馮夷空自舞楚客不堪聽逸韻諧一作若調淒金石清音發一作入杳冥蒼梧來一作成怨慕白芷動芳馨流水傳湘浦悲風過洞庭曲終人不見江上數峯青同前陳季神女泛瑶瑟古祠嚴野亭楚雲來泱􅐯湘水助清泠妙指微幽契繁聲入杳冥一彈新月一作斜日白數曲暮山青調苦荆人怨時遙帝子靈遺音如可賞試奏為君聽同前莊若訥帝子鳴金瑟餘聲自抑揚悲風絲上斷流水曲中長出沒遊魚聽逶迤彩鳯翔微音時扣徵雅韻乍含商神理誠難測幽情詎可量至今聞古調應恨滯三湘同前王雍寶瑟和琴韻靈妃應樂章依俙聞促柱髣佛夢新粧波外聲初發風前曲正長淒清和萬籟斷續繞三湘轉覺雲山逈空懷杜若芳誰能傳此意雅㑹在宫商霓裳羽衣曲李肱開元太平時萬國賀豐嵗梨園獻文粹作厭舊曲玉座流新製鳯管遞參差霞衣競搖曵宴罷水殿空輦餘春草細蓬壺事已久仙樂功無替誰文粹作詎肯聽遺音聖明知善繼寒夜聞霜鐘鄭絪霜鐘初應律寂寂出重林拂水冝清聽凌空散逈音舂容時未歇搖曳夜方深月下和虛籟風前聞疑作間逺砧淨兼寒漏徹閒畏曙更侵遙想千山外泠泠何處尋同前盧景亮洪鐘發長夜清響出層岑暗入繁霜切遙傳古木深何城亂逺漏幾處雜踈砧已警離人夢仍知旅客襟待時當命侣抱器本無心儻若無知者誰能設此音曉聞長樂鐘聲戴叔倫漢苑鐘聲早秦郊曙色分霜凌萬户徹風散一城聞已啓蓬萊殿初朝鴛鷺羣虛心方應物大扣欲干雲近雜雞人唱新傳鳬氏文能令翰苑客流聽思氛氲聽霜鐘失名渺渺飛霜夜寥寥逺岫鐘出雲疑斷續入户乍舂容度枕頻驚夢隨風幾韻松悠揚來不已杳靄去何從髣佛煙嵐隔依俙巖嶠重此時聊一聽餘響繞千峯同前失名寥亮來豐嶺分明辨古鐘應霜如自擊中節每相從靜聽非閒扣潜應藴聖蹤風間時斷續雲外更舂容虛警和清籟雄鳴隔亂峯因知一作之諭知已一作者感激更難逢律中應鍾裴元律窮方數寸室暗在三重伶管灰先動秦正節已逢商聲辭玉笛羽調入金鍾密葉翻霜彩輕冰斂水容望鴻南去絶迎氣北來濃願託無凋性寒林自比松笙磬同音失名笙磬聞何處淒鏘宛在東激揚音自徹髙下曲宜同歷歷俱盈耳泠泠遞散空獸因繁奏舞人感至和通詎間洪纎韻能齊搏拊功四懸今盡美一聽辨移風范成君擊洞隂磬范傳正歷歷聞金奏微微下玉京為詳家牒久偏識洞隂名淡佇人間聽鏗鏘古曲成何須百獸舞自暢九天情注目看無見留心記未精雲霄如可託借鶴向層城終南精舍月中聞磬吕溫月中一作峯禪室掩幽徑一作磬淨昏氛思入空門妙聲從覺路聞泠泠流衆一作滿虛壑杳杳出重一作寒雲天籟疑難辨霜鐘詎可分偶來依一作遊法界便欲謝人羣竟夕聽真響荷花積露文一作塵心自解紛同前獨孤申叔精廬慙疑夜景天宇滅埃氛幽磬此時擊餘音幾處聞隨風樹杪去支䇿月中分斷絶如殘漏淒清不隔雲羇人方罷夢獨鴈忽迷羣響盡河漢落千山空紏紛泗濵得石磬李勳浮磬潜清深依依呈碧潯出水見貞質在懸含玉音對此喜還歎幾秋還到今器古契良覿韻和諧宿心何為值明鑒適得離幽沉自兹入清廟無復泥沙侵風筝鮑溶何響與天通瑶筝挂望中彩絃非觸指錦調忽聞風鴈柱虛連勢鸞歌且墜空夜和霜擊磬晴引鳯歸桐幽咽誰生怨清泠自匪躬秦姬收寶匣搔首不成功聽郢客歌陽春白雪歐陽衮寂聽郢中人髙歌已絶倫臨風飄白雪向日奏陽春調雅偏盈耳聲長杳入神連連貫珠並裊裊遏雲頻度曲知難和凝情想任真周郎如賞善莫使滯芳晨尚書郎上直聞春漏張少博建禮含香處重城待漏辰徐聲傳鳯闕曉唱辨雞人銀箭聽將盡銅壺滳更新催籌當五夜移刻及三春杳杳從天逺泠泠出禁頻直廬殘響曙肅穆對鈎陳同前周徹建禮通華省含香直紫宸靜聞銅史漏暗識桂宫春滴瀝疑將絶清泠發更新寒聲臨鴈沼踈韻應雞人回入千門徹行催五夜頻髙臺閒自聽非是駐征輪同前失名地即尚書省人惟鴛鷺行審時傳玉漏直夜遞星郎歷歷聞仙署泠泠出建章自空來斷續隨穴散凄鏘物靜知聲近寒輕覺夜長聽餘殘月落曙色滿東方雪夜觀象闕待漏張少博殘雪初晴後鳴珂奉闕庭九門傳曉漏五夜候晨扄北斗橫斜漢東方落曙星烟氛初動色簮珮未分形雪重猶垂白山遙不辨青雞人更唱處偏入此時聽太清宫聞滴漏嚴巨川玉漏移中禁齊車入太清漸知催辨色復聽續餘聲乍逐微風轉時因雜珮輕青樓人罷夢紫陌騎將行殘魄棲初盡餘寒滴更生慙非朝謁客空有振衣情百官乘月早朝聽殘漏莫宣卿建禮儼朝冠重門耿夜䦨碧空蟾魄度清禁漏聲殘候曉車輿合凌霜劔珮寒星河猶皎皎銀箭尚珊珊杳靄祥光起霏微瑞氣攢欣逢聖明代長願接鴛鸞春臺晴望李程曲臺送春日景物麗新晴靄靄煙收翠欣欣木向榮靜看遲日上閒愛野雲平風慢遊絲轉天開逺水明登高塵慮息觀徼道心清更有遷喬意翩翩出谷鶯同前鄭蕡追賞層臺逈登臨四望頻熙熙山雨霽處處栁條新草長秦城夕花宜漢苑春晴林翻度鳥紫陌閲行人旅客風塵厭山家夢寐親遷鶯思出谷騫翥待芳辰同前喬辨層臺聊一望遍賞帝城春風暖聞啼鳥冰開見躍鱗晴山煙外翠香蘂日邊新已變青門桞初銷紫陌塵金湯千里國車騎萬方人此處雲霄近慿高願致身文苑英華卷一百八十四
