body:
  text: 文苑英華卷六十二宋李昉等編儒學二漢章帝白虎殿觀諸儒講五經賦一首貢士謁文宣王賦一首貢舉人見於含元殿賦一首人不學不知道賦一首重寸隂於尺璧賦一首惜分隂賦一首學植左傳作殖賦一首學然後知不足賦一首文戰賦一首解議圍賦一首漢章帝白虎殿觀諸儒講五經賦以髙㑹群儒討論正義為韻李程漢章帝以文教式孚象德崇儒倣石渠徵校文之所配白虎集青襟之徒於是發明詔下皇都宏辨者憤憤悱悱博議者雲萃風趨所以讃揚政理豈惟探討典謨爾其高觀洞開鴻儒四㑹擅古今之美為皇王之最八索九丘之籍理析異同三墳五典之書義分小大舉兩端而擬議興百代而沙汰既理貫於中亦聲聞於外實鈎深而索隱况致逺而情髙信積學而無倦豈待問而有勞談柄乍揮振冠蓋之岌岌詞源忽注㵼江海之滔滔將以演制度之善論威儀之盛撮五經之閫閾為九流之龜鏡連山魯史自此而刋禮義詩書自兹乃正夫如是始可以化人倫施國柄有典有則惟明惟聖上知恭勤下審教令然後代有等威理歸清净懿哉釋鈐鍵之樞奧賾精微而討論疑之者風散氷釋學之者理順義存可以明乎褒貶從其簡易貢别九州興窮六義豈惟槭之說蓋亦識之智今我后化叶人文莫羣陋漢日越堯君觀其環林森森璧池浩浩鴻儒碩生旦夕探討曲盡庶彚旁流聖造則知儒者可為帝王之師保貢士謁文宣王賦以題為韻黎逢聖人沒而教在明王興而道宣命上公以陳信展大禮以登賢觴酒豆肉金鏞管懸致克禋以如在當質明而不愆祁祁諸生必恭敬止廓廣庭以容衆峩髙冠以修已臨奠獻之筵肅造秀之士階間儼以成列槐隂布以如市將備禮於先師遂儲精於祝史于以致君恢復王化𢎞闡人文磬音繼於夜杵燭影迎於朝雲見曲暢於和易知具歆於苾芬肅肅階戺隂隂門闕喬木棲於暮煙前軒滿於行月羣士沓而歲至庶工齊而曉謁上𤣥酒以清滌間朱絃而踈越齊百王於建號歷千古而未歇蓋以教俟天地而不朽功格宇宙而不伐不朽故可貴不伐故彌彰仰而不及融然有光實橫被於歷代獨崇輝於帝唐德教不輟王猷有昌日尊師於朝歲求士於鄉教之於右孰登之於上庠知本末之可務亦師師而不忘將歷試於宗伯必先謁於素王古先哲君任土以作貢洪惟我后嘉善而容衆猶冀獲師於卜獲相於夢時哉康哉冝阿閣之巢鳯貢舉人見於含元殿賦以題中字為韻失名國家開文學之科旁求英彥爰將貢於禮闈命先參於祕殿欲使懷才抱器自此鷹揚當令較伎呈能從茲豹變是以儒風益振睿澤惟新設薦舉為教化之本致朝見為榮貴之因庶使八紘碧嶂絶卧雲之士遂令萬歲彤庭觀獻賦之人莫不張文柄以旁羅詔諸侯而上貢俾離邦去里若攀龍附鳳或禀間生之瑞出則驚人或懷希代之珍來皆動衆期美祿必取期殊科必中莫不逺凑天闕爭趨帝閽曹劉麏至賈馬雲屯當仲冬月候丹禁門于時銅壺尚滴粉壁猶昏驪駒波躍蠟炬星繁俄而鐘斷長樂殿啓含元中使森而鶴立諸生凛以駿奔進揖退揚儼褒衣而設禮左旋右折俯丹陛以陳言曰臣等才非可升德非可舉幸以辭乎海上達彼君所今則凝神注目無非繡户金鋪接踵比肩盡是鴻儔鶴侣歡聲數四周覽再三散漫而龍池霧起參差而宫樹烟含既而中貴遙宣勞卿逺見咸精筆陳勉赴文戰時康俗泰終有待於英髦擇善搜賢本無遺於寒賤諸生乃退行列整簮裾瞻鳯扆獻玉除俟青春而變化有望當聖意而光輝有餘集鴻都而固難比矣會虎觀而未可加歟則唐之盛也堯舜不如人不學不知道賦以學然後知不足為韻失名君子之為道也敦詩書說禮樂俾其潤身而浴德克已而志學亦猶嘉肴在器良玉抱璞肴之知味既因於嘗玉之成功必由於琢物既肖旃士亦宜然知此道者必勤學焉若夫即其講肄齒以胄筵儒風是習素業斯傳以三墳五典為本以八索九丘為先存乎博奧究其精研漁獵乎六籍之內牢籠乎百氏之前得用而行將陳力於休明之代自强不息必苦節於少壯之年於是慎擇其師審取其友師之嚴則尊敬而匪懈友之直則切磋而可久志有所立言無所苟講道德必探其本源進禮樂必盡其先後故業就而青紫可拾器成而瑚璉自負闕重寸隂於尺璧賦王起闕至若苦心無虧勵志罔移千里而笈是負三年而園不窺孫敬之户長閉仲舒之幃晝埀冬映雪而無倦夜聚螢而罔疲爾乃傾心葵藿屬目桑榆郊影不留於北陸林光或改於東隅則尺璧可輕自可抵於烏鵲寸晷所重恨難繫於白駒固在夫學如不及寧務夫執而不趨是知務彼乾乾瞻其杲杲將以求雲霄之路亦以得青紫之道自然披褐懷玉滿堂獲寶向若貴溫潤之姿賤荏苒之時光收皎皎景失遲遲則如琢如磨未能保其琬琰一寒一暑空見迫於崦嵫則知潤身之德將貽後學尚鄙滿籯之金爰取沉河之璞况乎日就月將今是昨非六藝逺學所以知微則捐谷之中乃用抵璧於谷事自可棄其虹彩測圭之下實有愛於烏輝别有功名未録行古之躅時難冉得嗟晼晚於扶桑寶在不貪賤璘玢之如玉此大禹之所以成績得不述之而自勗惜分隂賦以光景難駐賢哲無怠為韻蔣防君子自彊惜分隂於短刻期碩學於縑緗念冉冉之特移非徒愛景惜依依之為戀足冀回光每正中而圭表常懼减於毫芒事且異於秉燭理寧同於息影崇樹在乎功名淹速繼於時景苟不競夫分寸亦何期乎悠永三冬未就實有念於錙銖九仭將成顧無虧於俄頃當其南軒向晝北戶初寒微照悠揚而漸短斜輝晼晚而將殘分以惜焉豈少私而寡欲時之至也諒失易而得難及其躔次當留光華未暮宜草草以不息希曀曀而常駐出處無瑕故垂法於前賢往來不遑見遺履之莫顧既目擊而眷眷亦心想而專專况志業之難就當清隂之屢遷莫不以日繫月以時繫年是宜向微秒而重矣何得在斯須而舍旃不然夏后何以為聖陶公曷足稱賢於焉激功疑作切仰兹先哲彼分晷而莫駐此寸隂而靡輟不食不寢載勉於勞者之心以遨以遊誠乖乎志士之節皎皎白駒若有若無雖長繩莫得繫於桑野長戈不能却彼泉隅今則曖昧斯在瞬息不改宜乎陋韞石之騰輝輕天疑作尺璧之殊彩庶立功而立事故不愆而不怠學植左傳作殖賦以深根固柢無使將落為韻張泰學者人之本也必資乎窮要道勵專心故假農以為喻將克已而攸針筆力載耕既研精而不倦情田以耨將覃思而惟深懿兹善喻豐滋是務當勤勞而有獲豈滅裂而不固種德潜潤比土膏之勃興修業大成方雲稼之森布切磋討論將究其根孜孜而其功且倍矻矻而其教彌尊苟惰以自安則耒耜之用廢習而不輟則藨蓘之道存藴經笥而煥乎既庶成行業而油然實繁且夫以兹訓語譬彼樹藝學者在清其本末農者在立其根柢庶存心而有補期竭力而無替顧三冬之足用且俟經時異四體之不勤而能望歲其道既敷其志不渝自微至著生有於無厥修乃來類京坻之可積不思則罔同水旱之是虞原夫匪獨化人聿兼為已寧徒取於披閲固可移於任使功成久習宋人之揠足傷事不兩全樊遲之學誠鄙稽其存於日省就此月將覩專專以開帙嫓汲汲而築場勞而無怠焉奚必乎四之日祿在其中矣可期乎萬斯箱客有服膺糟粕惟善是樂恆慮失而不逮詎懷安而自若取疑作敢竊比於農夫懼見逢於搖落學然後知不足賦以君子强志然後成立為韻雍陶士有倦乎耕耘求其典墳每下學以為已期千祿而事君雖歷三冬詞軋軋而未能足用雖觀百氏意歉歉而常如闕聞復得散秩一作帙如初功疑作攻堅兹始謂尺璧兮易得歎分隂之難止隱居就道欲名埀於千萬年嗜學從師將繼志於二三子當其敦詩說禮存誠自强恃少壯而能勉勵懼老大而有悲傷警覆簣之遺事慕絶編以同芳親賔兮莫往莫來晝夜兮無怠無荒始勵已而功疑誠為矻矻乃收心而貴復學茫茫豈九流之深豈六義之祕抑由懵學者請益而尚少雖勤而未至又安得食而求飽困而欲寐忘匡民疑作氏之心無蘇君之志由是其意彌堅其業彌専開卷且爾服膺拳然不出戶期知萬里不下帷寧止三年欲罷不能所求廣矣大矣以思無益故得藏焉修焉始也儻易足於謏聞無求備乎講究顧羣籍而是棄雖勤師而莫誘若然者足見微功併棄於前洪名疾沒於後所以大器不愧晚成時習以資其學殖日就而冀其經明靜而專敞疑而立既勤勤而曽不息又孜孜兮如不及大矣哉學者之心信地芥而必拾文戰賦以士之角文當如戰敵為韻林滋為學之人㑹友以文念斯文之樞要無極將一戰而是非可分索隱窮微既不愆於夫子解紛挫鋭爰取譬於將軍由是推匪石之心召如林之士六籍之奧斯究萬夫之雄莫擬且曰戰也者所以分勝敗之端文也者所以明盛衰之理必將抑浮僞考深㫖措詞苟得於朝聞遊刃寧甘於夕死是用徴師於代疑作伐善之所命將於角勝之場鶚視而鵝鸛斯列豹變而貔貅莫當利口從橫已有摧堅之意雄姿踴躍那無露穎之囊得失未分切磋斯見弛張既出於心術向背寧虞於色戰忠為甲而信為胄豈憚重圍筆有陳而詞有鋒誠能萬變既區以别矣乃則而象之拂緗袠作鼓鼙之響卷絳紗為旌斾之姿波駭九流苟再揚而盡委心攢百箭終一貫而無遺乃考擊蒙諒無前敵决勝既返於三隅請命俄分於四壁是以及門之子互騁其成功無勇之徒空悲於敗績已而探討無餘詞林宴如九合之剛腸斯弭千里之祕思潜舒深淺既分盡洗兵於學海姦回云革皆棄甲於德車蓋以振此芳塵仰于先覺苟能立分於閫閾曷愧坐籌於帷幄今則伏疑作仗其信志其學幸從戰之有聞願無慙於挫角解議圍賦以詞理精通釋然自潰為韻浩虗舟王子猷之延賔暇時偶切磋於經史遂交戰於言詞出竒而彼力方壯向敵而吾矛莫持阻辨口而不通去來都絶閉赤城之深固中外生疑既而謝婦側聆翠幃潜至察攻討之餘勢知勝敗之有自情田遂闢縱堂上之竒兵靈府忽開出身中之利器是用自伐期乎不爭因漁獵之近習得籌謀之至精縱吟嘯為鼓鼙之雄倍增其勇察顔色為風雲之候暗識其情然後以德而攻當無向背迎心石以奔北望詞鋒而辭疑潰一來一往環回於文苑之間或否或臧蹂躪於儒林之內已而容勢相懸抵摧莫前擊觸而剛腸已折交侵而鋭氣難全去不可逃顧咽喉之絶矣敗無相救覺唇齒之茫然觀夫忠甲不免疑德藩何益望風而堅徑不保挫氣而秉持盡釋俄執訊於折角將犒師於重席驗運輸而經笥不窮察苞裹而智囊猶積是以扞格斯闢書文必同逆無不服滯無不通義櫓罷持倒載於德車之上仁寶悉獲橫行於王道之中故得學海長清言讎不起百家咸凑其軌轍六籍各分其疆理是使孤陋寡聞之徒永願伏膺而已文苑英華卷六十二
