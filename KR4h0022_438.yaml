body:
  text: 文苑英華卷四百三十八宋李昉等編德音五征伐德音伐劉闢德音詔令作招諭劍南諸州詔編制門下朕聞皇祖玄元之誡曰兵者凶器也不得已而用之恭惟聖謀舊唐書作謨常所祗服故雖唐書作維文誥有所不至誠信有所未孚姑唐書作始務安人必能忍耻朕之此志亦可明徴近者德宗皇帝舉柔遠之規授宰衡之傑詔令作任𢎞我廟勝遂康巴庸故得南詔入貢西戎寢患績成始著詔令作究元臣喪亡劉闢乘此變故坐邀符節朕以枉成唐書作成狂命者雖乖於理禮從權便者所冀於輯寧竟違卿士之謀遂允僥求之志朕之於闢恩亦𢎞矣曾不知負牛羊之力飽則逾凶畜梟獍之心馴之益悖狂惑士伍圍逼詔令作迫梓州誘陷戎臣塞絶劍路師徒所至燒掠唐書作劫無遺干紀之辜擢髮難數朕為人司牧育唐書作字彼黎元在詔令作如闢之罪非朕敢舍是用協羣率之謀除百姓之害永清妖孽底定一方伐罪弔民於是乎在其逆賊劉闢在身官爵並宜削除今王師鼓行尋濟天險梓潼成守已解攻圍芒卯注營坐看撲滅其西川將士如有乘此聲勢翻然改圖梟斬凶魁以效誠節者必當特加爵秩高位重賞朕無愛焉其餘將吏等但能去逆效順以所領歸降者超三資授官以一身降者亦與改轉長行官健歸順者並與敘録仍加賞給其西川管內刺史等當其阻亂孰克靜科雖章表未通而衷誠可見今能歸欵亦仍舊職如或乘機立效因事建功並特加賞務極優厚夫皇王之道弔伐所加義在除殘誠非樂戰故脅從罔理必誡於徂征焚溺是哀俾興於徯怨禁暴止亂其在兹乎况有迹陷凶徒心非黨惡歸我無路遂至淪胥言念斯流尤深軫惻所以明諭將帥罪止渠魁其餘染汙一切勿問布告遐邇咸懷朕意詔令作宜悉朕懷元和三年三月詔討鎮州王承宗德音門下天地以太和一作德煦物而高秋厲肅殺之威皇帝以至道育人而前王設誅討一作罰之典於是乎有版泉之役有丹浦之師一作威情豈佳兵義存禁暴朕嗣膺寶厯於兹五年以惕厲居於人上以仁恕撫于天下恭惟文祖之訓敢以武功為先昨者吳蜀興妖師徒獻捷朕每念陳原野之衆行鈇鉞之刑雖舉彛章頗有慚德蓋不獲已豈樂於斯王承宗頃在苫廬潛窺戎鎮而內外以事君之禮將唐書作逆非而必誅分土之義專則有辟朕念其先祖常有茂勳貸以私恩抑於公議使臣旁午以告諭孽童俯伏以陳誠順獻兩州期無二事朕欲收其後效用以曲全授節制於舊疆齒勳賢於列位况德棣本非成德所管昌朝又是承宗懿親俾撫近鄰斯誠厚澤外雖兩鎮中實一家而承宗象恭懷姦宵貌稔禍欺裴武於得位之後縲昌朝於受命之中豺狼之心飽之而愈發梟獍之性養之而益生唐書作凶加以表疏之間悖慢斯甚神祗所一有以字不捨一作祐天地所一有以字不容智士所以奮懷義夫所以興憤式遏亂略期於無刑龔行天罰示于有制其諸道諸軍進討兵馬已從别敕一作制處分王承宗在身官爵並宜削奪其鎮州管下一作內將士官吏等久在戎行未知朝典或陷於邪説或迫以凶威雖有忠誠無由自達但能效順即是王人上惟自新一作豈止惟新當加寵渥其有能回戈殄一作弭冦因事立功特有褒崇不拘資次貴爵厚祿設之而高懸實封名藩待之以懋賞其以一州歸順者便與當州刺史仍賜賞二百户如先是刺史以州歸順者超三資與官仍賜實封三百户如以一縣歸順者超兩資與官賜實封一百户其長行官健歸降一作順者亦當一作當與優厚褒賞如將校內有翻然改圖梟斬元惡者授以不次之位寵以殊常之封王承宗如能革心悔過束身歸朝待之如初一切不問仍賜舊官爵别加寵授九字一作仍凖舊官爵寵授於戲王者之師蓋除於暴亂止戈之武豈願於傷殘而承宗不能負荷舊勳祗承新命自貽其咎寧怨於天亟一作遽此興戎至於用鉞固非素意用歎于懷百辟萬方宜諒朕志宣示中外咸使聞知元和四年十一月十日一作皆唐大詔令討王庭湊德音一作詔門下雷霆雪霜上天所以成物明罰敕法聖人垂之易象豈陽春不可以獨化將輔理固在於威刑乎則遏亂禁非法天齊俗諒有為而然也何則三綱五常王化之正本彰善疸惡國經之大防君人者苟不提此柄以示天下是納人於陷穽導俗於豺狼而欲家固人安上和下順猶北轅而適楚也李同􅸤罪暴寰宇告之則悖寵之益凌亂君臣父子之紀綱棄覆育生成之恩義則綏討之命蓋不得已焉而王庭湊為一作作我藩臣久膺寵命致爵位於擾叛之際齊恩澤於忠義之倫贖過圖功宜百羣帥而首扇同􅸤使起自墨縗黨惡之心劇於武兕負德之醜逾于一作於梟獍驅忠義之旅以授凶渠率悅順之人以侵鄰壤藩方統帥飛疏互來朝右公卿懇章繼奏皆期鳴鼓問罪奮戈啓行朕道希包荒志在含垢多端曲護大開坦途諭之使致竒功告之將酬重位顯招密示抑義降心繼馳信臣纍諭深旨而傲狠彌甚凶肆不悛飾一作刑惡言於布一作報章資盜糧於狡寇拘四鄰忠告之使堅一境代襲之謀與逆豎為輔車絶舊歡於姻好屢有降卒備驗姦蹤潛軍入援一作處德棣縱燎以焚瀛莫河東易定被毒騷然憲誠從諫見侵相繼加以猜戮無辜安忍逞欲有族坑屋誅之令極削下僣上之圖井邑銜寃道路以目自頃冀其迷復未議加刑但令閉境猶希補過而乃大舉將卒期覆定州取怒神祗迎風瓦解稔慝搆亂前古罕見若尚為包容則孰分逆順其王庭湊在身官爵並宜削奪應諸道州鎮接界處各宜遂便攻討其鎮州將士如有梟斬王庭湊者先是六品以下官者便授三品正員官其先是五品以上官者節級超奬仍賜莊田各一區錢二萬貫兼授以土地及賜實封如有能率所管兵馬以州郡來降者超三資與官仍便正授刺史賜錢一萬貫以城鎮來降者超兩資與官仍賜錢五千貫如先未有官者即特授三品四品官如以一身降者亦與改轉仍賜錢帛其諸道將士有因立功能梟斬庭湊者亦準前例處分成德一軍山東所賴扼制徑險控束河防武俊之拯橫流承元之變舊俗言念誠節何日可忘智知父兄見劫妻子為質愍惻之志朝夕在懷當無疑謀自致恩外昔光武存大信而捨朱鮪魏祖推至誠而納張繡非無故事朕不食言如庭湊自能束身歸朝並與洗雪若執迷安禍罪止其身其餘脅汙一切不問縱有迹涉逆節事出一時劫於凶威並從寬宥四州之內如有謀為向順屈於垂成家族無辜殘酷所及者宜優加追贈并賜錢帛其有子孫得脫免委四面節度切加搜訪當議與官四州管內百姓久困寃害橫罹挾制念同赤子莫匪吾人諸軍所次不得妄加殺戮并焚爇廬舍暴掠財産及有拘繫以為纍囚四州百姓久廢生業如有歸投各宜存撫老幼丁壯量加優恤仍給與空間田宅使之如歸事平之後願還本貫亦聽於戲原野陳師雖前王之不免干戈屢動諒菲德之所興孤我宿尚良深憮然咨爾輔弼之臣暨于藩守羣帥爾尚悉乃忠力匡豫寡昧經逺猷以端理本恢上略以速戎功緝庶政以康中邦明大教以昭昧俗宣示內外俾知朕懷太和元年九月十一日一作皆唐大詔令破李同􅸤德音敕王者誅暴亂弔傷殘明賞報功拯弊綏衆蓋為邦之大紀也李同􅸤頃自先朝擅謀專土輒抗成命私行墨縗暨朕臨御實思含垢授之以兖海諭之以詔書使臣相望凶志自若而更挺妖結黨劫衆沮兵毒流無辜害被闔境繇是藩臣潛詔令作瀝懇卿士獻規至于興戈諒非得已自元戎環壤王旅進攻卵窺危巢飈振稿葉動必乘彼詔令作於機會退皆扼其咽喉故戴義啓入郛之殊庸李祐展下城之勝略纍稔逋冦一朝削平此誠天人合符中外協力永言勳效無忘晤思其戴義及李祐應加爵命并幽州及齊德兩道在營立功將士各有賞賜並已從别敕處分其賜物仍委度支逐便速與支送仍命使臣分往宣諭各於當處厚加宴勞其立功軍將未經寵授者委戴義李祐即差次等第速具聞奏即有甄奬用答勳勤李同􅸤力屈計窮方圖轉禍朕好生存信初議貸刑而靣縛在途隂懷狡計夜縱火號潛誘家僮更謀網漏自速梟獻憫彼凶魁坐沉家族顧兹貽戚載軫于懷其母孫氏妻崔氏併男及家口等並宜特從寬宥令於湖南管內諸州有空間處安置其歸降將卒不涉翻覆者與戴義李祐審細勘責各與衣糧分配驅使其滄景等州將士有謀執凶黨竟遭誅夷或雖被劫致能全名節者並委李祐按實條奏量加贈録其滄景德棣等四州百姓有是近日被賊點名團結者並放歸營農除非同惡相濟以死拒命者餘一切不問四州百姓久陷汙俗每罹威虐莫匪吾人今既脫難當施德令並宜給復一年不能自存者量給種食其刺史縣令仍委中書門下慎擇循良俾加存撫應諸將校自經戰伐或致死亡載念捐軀良深憫歎並委戴義李祐審加勘定具名銜事迹申奏即與褒贈其長行官健陳亡者並令所在長吏量與收葬同為祭酹其有家口在者各委本軍優恤仍三年無絶糧賜其有因中矢石遂至殘廢者各委本軍厚加存養仍給衣糧終身勿絶敕旨有未該者委戴義李祐比類更作條件奏聞其昭義義武等軍行營在賊境者比相掎角皆有功勤各别有處分於戲整師除害義切於安人撫俗策勳道存於布德爰申彛典且乂新邦咨爾多士宜悉朕意太和三年五月十三日討鳳翔鄭注德音門下王者之御天下也推至誠以格物委大信以任人故能邦家用寧上下交感所以詔爵祿而不吝待臣下而無疑豈謂變起股肱患生毗倚寤寐興歎難弭于懷且負德背恩干紀悖戾而古今未有能濟者蓋人神之所不容逆賊鄭注氣本凶狂志懷姦逆害時蠧政卜射張皇行詐而徑術一作緣術多端黷貨而溪壑難滿情惟點白口可鑠金罔冒包藏為惡滋甚朕處九重之內不得備聞擢於妄庸驟列華貫入司喉舌出總爪牙惟務廢忘不思報國棄生成之恩義亂君臣之紀綱稔慝興妖前古未有罪同梟獍法在必誅况詔旨既追已離城堞一作邑險謀且敗中路遽回又迤邐使人迎接逆賊李訓稽之國法豈逭常刑其鄭注在身所有官爵並宜削奪將士如有能奮揚義勇執戮渠魁者先是六品已下官者便授三品正員官其先是五品已上官者節級超奬仍賜莊田各一區錢二萬貫如有能率所管兵馬以州郡來降者超三資與官便正授嶽牧仍賜錢帛諸道將士雖各守疆土非惟進功如被侵掩因事立效者亦準前例節級處分賊如能知義悔過束身歸朝並與洗雪仍加寵奬幽明可鑑朕不食言但有欵誠自通即委諸道與奏若不能悛悟自取誅夷罪止一身其餘脅汙一切不問其有迫於凶威曾著失節顧存家族事出權時待其平寧並從寬宥將士如有潛謀立功效順被其屠戮並優加追贈并賜錢帛仍與一子官應州縣百姓陷在暴虐莫保性命誠可哀矜諸軍環境不得妄加殺戮并焚毁廬舍掠奪資産及有拘執以為俘囚如有歸投者委諸道據丁壯老弱量加優恤仍給與空間田地便就生産事平之後願歸本貫者亦聽鳳翔一軍素著忠義每臨霜雪之際實見松筠之心凛然義風簡在朕志其大將及軍士並宜坦懷自處勿以為憂兵革既平寵待如故鄭注初到鎮日間有優賞軍士常事不足為疑州縣百姓亦當優給復勉於自效以保令圖於戲佳兵者聖祖之所戒文德者前哲之所崇肆豫寡昧敢忘丕教然以齊四方者號令立人紀者君臣斯言苟違大倫安設今則絶其奔軼示以申嚴懷柔誠貴於止戈執惡何慙於用武布告中外咸知朕意一作懷一作皆唐大詔令文苑英華卷四百三十八
