body:
  text: 文苑英華卷一百四十三宋李昉等編草木一枯樹賦一首髙松賦一首道觀內柏樹賦一首澗底寒松賦一首同崔少監作雙槿樹賦一首木蘭賦一首病梨樹賦一首枯樹賦庾信殷仲文者一無此字風流儒雅海內知名世一作代異時移出為東陽太守常忽忽不樂顧庭槐而歎曰此樹婆娑生意盡矣至如白鹿貞松青牛文梓根柢盤魄山崖表裏桂何事而銷亡桐何為而半死昔之三河徙植一作殖九畹移根開花建始之殿落實睢陽之園聲含嶰谷曲抱雲門將雛集鳳比翼巢鴛臨風亭一作庭而唳鶴對月峽而吟猿乃有拳曲擁腫盤坳反覆熊虎一作彪顧盼魚龍起伏節竪山連文橫水蹙匠石驚視公輸眩目雕鐫始就剞劂仍加平鱗鏟甲落角摧牙重重碎錦片片真花紛披草樹散亂煙霞若夫松子古度平仲君遷左思吳都賦平仲君遷松梓古度森梢百頃槎枿千年秦則大夫受職漢則將軍坐焉莫不苔埋菌壓鳥剝蟲穿或一無此字低垂於霜露或一無此字撼頓於風煙東海有白木之廟西河有枯桑之社北陸以楊葉為關南陵以梅根作冶小山則叢桂留人扶風則長松繫馬豈獨城臨細柳之上塞落桃林之下若乃山河阻絶飄零離别拔本垂淚傷根瀝血火入空心膏流斷節橫洞口而欹卧頓山腰而半折文斜者百圍氷碎一作文邪合體俱碎理正者千尋瓦三字一作中心直裂載癭銜瘤藏穿抱穴木魅䁡睒類聚作睒􅀈碑夲作睒暘山精妖孽况復風雷一作雲不感羈旅無歸未能採葛還成食薇沉淪窮巷蕪沒荆扉既傷搖落彌嗟變衰淮南子云木葉落長年悲斯之謂矣乃歌曰建章三月火黃河千里槎若非金谷滿園樹即是河陽一縣花桓大司馬聞而歎曰昔年種柳依依漢南今看搖落悽愴江潭樹猶如此人何以堪高松賦謝偃登靈嶽以遊目極千里兮周睇盡山川之重沓容雲物之詭怪何兹松之挺茂擢修幹於孤林映丹霄而有葉凌青霞而矯心前絶萬仞却倚千尋俯峥嶸之深谷仰迢遰之層岑霏夕煙而曖景度神飈而流音若乃月起陽爻嵗窮隂律匝地氷厚周空霧密雪積巖而逾峻風乘林而轉疾結暗霮之愁雲黯蒼茫之寒日於是衆草零羣木墜千巖槁萬嶺悴獨潔固而不渝常猗猗而結翠始見貞而表潔乃以叢而辨類夫其深山遂性委液流津感天地之粹質禀隂陽之精純根含氷而彌固枝負雪而更新既無懼於𤣥月寧有悅乎芳春含竒文而養徑收高節而自珍耻取嫓於稽子嗤受封於亡秦本絶希於雕刻詎有憂於斧斤若乃流膏可咀嘉實可薦香有四飛味逾九轉延促齡於度隙駐生涯於流電故餌之者目改服之者容變紛羽翼而上騰排紫虛而高扇起九垓而憩息周四海而顧盼信神經而最品實祕録而精選嗟美材之無用悲側路之嶮巇動跬步而致阻投一足而必危傷拙目之衆毁慨名工之獨知仰徑寸而靡及屈百尺而自卑縈白雲以舒蓋接丹桂而變枝凝暉逺而淡景纎羅挂而輕颸一作垂窮萬祀而不異歷千秋而不萎豈兹木之足歎亦前賢之所規何吾生之命舛懷丹誠而莫披心炳朗而無報情蕩滌而不羈任儻來之否泰委𤣥運之遭隨戢輕翮而未舉蜿一作踠逸足而莫馳實未榮而先怠寧泛駕而致疲誠責躬而咎已豈藏瑕而掩疵恆怯進而勇退每知雄而守雌庶比茲以自朂履貞固而不虧道觀內柏樹賦并序魏徴𤣥壇內有柏樹焉封植營護幾乎二紀枝幹扶疏不過數尺籠於衆草之中覆乎藂棘之下雖磊落節目不改本性然而翳薈蒙籠莫能自申達也惜其不生髙峰臨絶壑籠日月帶雲霞而與夫擁腫之徒雜糅茲地此豈所謂方以類聚物以羣分者哉有感於懷喟然而賦其詞曰覽大鈞之播化察草木之殊類雨露清疑而並榮霜雪茫而俱悴唯旭旭之庭柏禀自然而醇粹涉青陽不增其華歷𤣥英不減其翠原斯木之攸挺植新甫之髙岑干霄漢以上秀絶無地而下臨籠日月以散彩俯雲霞而結隂邁千祀而逾茂秉四時而一心靈根再徙茲庭爰植高節未彰貞心誰識既雜沓乎衆草又蕪沒乎藂棘匪王孫之見知志耿介其何極若乃春風起於蘋末美景麗乎中園水含苔於曲浦草鋪露於平原成蹊花亂幽谷鶯喧徒耿然而自撫謝桃李而無言至於日窮於紀嵗云暮止飄蓬亂驚愁雲疊起氷凝無際雪飛千里顧衆類之颯然鬱亭亭而孤峙貴不移於本性方有儷於君子聊染翰以寄懷庶無虧於善始澗底寒松賦并序王勃嵗八月壬子旅逰於蜀尋茅溪之澗深溪絶磴人跡罕到爰有松焉冒霜停雪蒼然百丈雖崇柯俊頴不能踰其崖嗚呼斯松託非其所出羣之器何以别乎蓋有殊類而合一作共情士因感而成興遂作賦曰惟松之植於澗之幽盤柯跨嶮深柢憑流寓天地兮何日霑雨一作凌雲露兮幾秋見時華之屢變知俗態之多浮故其磊落殊狀森稍峻節紫葉吟風蒼條振雪嗟英覽之希遇保貞容之未缺攀翠崿而形疲指丹霄而望絶已矣哉蓋用輕則資衆器完則施寡信棟梁之已成非榱桷一作棁之相假徒志遠而心屈遂才髙而位下斯在物而有焉余何為而悲者同崔少監作雙槿樹賦并序盧照鄰日昨於著作局見諸著作競寫雙槿樹賦蓬萊山上即對神仙藝香閣前仍觀祕寶金懸秦市楊子見而無言紙貴洛城陸生聞而罷笑故知柔條朽幹吹噓變其死生落葉凋花剪拂成其光價方且傳石渠之故事得槿樹之新名足以脂粉仙臺丹青祕府者也若布衣藜杖巖栖藿食當堯時而非吏處漢代而無田學涉蕪淺文多瞽陋宜其屏竄用其靜默蓋窮而思達人之情也卑而應高物之理也故疾雷作而蟄蟲飛浮雲興而石磶潤不可廢也雖云聖朝多士而公實居之草澤有人亦國家之美事故復奬刷芻鄙作雙槿樹賦詞義猥薄退增慙靦謹啓賦曰方丈蓬萊邈矣悠哉藝居石室圖天揆日若乃羲和掌地太史觀星銅渾玊䇿寶笥金銘地則圖書之府人則神仙之靈中有芳蕣鬱鬱亭亭觀其兩砌分植雙階並耀葉鏤五衢榮回四照紛廣庭之靃靡隱重廊之窈窱青陸至而鶯啼朱陽升而花笑紫蒂紅蕤玉蕊蒼枝露華的皪風色徘徊糝糝衰風妸娜隈緌迫而視之鳴環動珮歌扇開逺而望之連珠合璧星漢回狀仙人之羽蓋疑佚女之瑶臺寂寞攸利棲閒此地委命卷舒隨時榮悴外無嬰夭之禍內有逍遙之致朝朝暮暮落復開嵗嵗年年紅似翠若夫逰蜂戲蝶封其蕚輕煙弱霧結其條來不謂之苟去不為之饒一作去不謂之損來不為之饒故能出君子之殊俗入詩人之舊謡齊顯昧於兩曜放生死於一朝同喪我之非我固雖凋而不凋則有亭伯儒門令思詩友翰苑曠其吞夢文鋒髙而照斗詠蕪滋之朝夕悲積薪之先後縟繡起於緹粉煙霞生於灌莽豈與巖幽弱篠澗底枯松徒冒霜而停雪空集鳳而吟龍詎得奉仙闈之廣價連筆匠之為容已矣哉東方生聞而歎曰故年花落不留人今年花發非故春倐兮夕隕忽兮朝新侏儒何功兮短飽曼倩何負兮長貧聊寄辭於庭樹儻有感於平津病梨樹賦并序癸酉之嵗余卧病於長安光德坊之官舍父老云是鄱陽公主之邑司昔公主未嫁而卒故其邑廢時有處士孫君思邈居之君道洽今古學有數術髙談正一則古之蒙莊子深入不二則今之維摩詰及其推步甲子度量乾坤飛煉石之竒洗胃腸之妙則其甘公洛下閎安期先生扁鵲之儔也自云開皇辛酉嵗生今年九十二矣詢之鄉里咸云數百嵗人矣其語周齊間事歷歷如眼見以此參之不啻百嵗人也然猶視聽不衰神形甚茂可謂聰明博達不死者矣余年垂强仕則有幽憂之疾椿菌之性何其遼哉於時天子避暑甘泉邈亦徴詣行在余獨卧兹邑閴寂無人伏枕十旬閉門三月庭無衆木惟有病梨一樹圍才數握髙僅盈丈花實憔悴似不任乎嵗寒枝葉零丁絶有意乎朝暮嗟乎同托根於膏壤俱禀氣於太和而修短不均榮枯殊質豈賦命之理得之自然將資生之化有所偏及樹猶如此人何以堪有感於懷賦之云爾天象平運方祗廣植挺芳桂於月輪橫扶桑於日域建木聳靈丘之上蟠桃生巨海之側細葉枝連洪柯條直齊天地之一指任烏兔之栖息或垂隂萬畝或結子千年何偏施之雨露何獨厚之風煙愍兹珍木離離幽獨飛茂實於河陽傳芳名於金谷紫澗稱其殊㫖𤣥光表其仙族爾生何為零丁若斯無輪桷之可用無棟梁之可施進無違於斤斧退無競於班倕無庭槐之生意有巖桐之死枝爾其髙才數仞圍僅盈尺修幹罕雙枯條每隻葉病多紫花凋少白夕鳥怨其巢危秋蟬悲其翳窄怯衝颷之搖落忌炎景之臨迫既而地歇蒸霧天收耀靈西秦明月東井流星憔悴孤影徘徊直形狀金莖之的的疑石柱之亭亭若夫西海夸父之林南海蚩尤之樹莫不摩霄拂日藏雲吐霧别有橋邉一作星橋朽柱天上靈查年年嵗嵗無葉無花榮辱兩齊吉凶同軌寧守雌以外喪不修襮而內否亦猶縱酒髙賢一作懸非佯狂君子為其吻合置其憂喜生非我生物謂之生死非我死谷神不死混彭殤於一觀庶筌蹄於兹理木蘭賦并序李華華容石門山有木蘭樹鄉人不識伐以為薪餘一本方操柯未下縣令李韶行春見之息馬其隂喟然歎曰功列桐君之樹名載騷人之詞生於遐深委於薪燎天地之産珍物將焉用之爰戒虞衡禁其翦伐案本草木蘭似桂而香去風熱明耳目在木部上篇乃採斫而歸理疾多驗由是逺近從而採之幹剖枝分殆枯槁矣士之生世出處語默難乎哉韶余之從子也嘗為余言感而為賦云泝長江以遐覽愛楚山之寂寥山有嘉樹兮名木蘭鬱森森以苕苕當聖政之文明降元和於九霄更祲沴之為虐貫霜雪而不凋白波潤其根柢𤣥雪暢其枝條沐春雨之濯濯鳴秋風以蕭蕭素膚紫肌緑葉緗蒂踈密聳附髙卑䕃蔽華如霜雪實若星麗節一作氣徑松竹香濃蘭桂宜不植於人間聊獨立於天際徒翳薈兮為鄰挺堅芳兮此身嘉名列於道書墜露飲乎騷人至若靈一作如雲山霧歇藹藹林樾當楚澤之晨霞映洞庭之夜月發清明於視聽洗煩濁於心骨韻衆壑之空峒淡微雲之滅沒露草白兮山淒淒鶴既唳兮猿復啼窅深林以冥冥覆百仭之𤣥溪彼逸人兮有所思戀芳隂兮步遲遲悵幽獨兮人莫知懷馨香兮將為誰惋樵父之無惠混衆木而皆盡指晝疑類而揮斤遇仁人之不忍方甘心而𠞰絶俄固柢於傾殞憐春華而搴芳顧落日而回軫達者有言巧一作功勞智憂養命蠲疫一作疾人胡不求枝殘體剝澤盡枯留憔悴空山離披素秋鳥避弋而髙翔魚畏網而深逰不材則終其天年能鳴則免於爼羞奚此木之不終獨隱見而罹憂自昔論一作淪芳於朝市墜實於林丘徒鬱咽而無聲可勝言而計籌者哉吾聞曰人助者信神聽者直則臧倉譛言宣尼失職出處語默與時消息則子雲投閣方回受殛故知天地無心死生同域紜紜品物物有其極至人者安性循於自然寧任夫智之與力也雖賢愚各全其好草木不夭其生植一作殖已而已而翳疑不可得文苑英華卷一百四十三
