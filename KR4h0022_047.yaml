body:
  text: 文苑英華卷四十七宋李昉等編宫室一明堂賦四首總章右個賦一首上陽宫賦一首阿房宫賦一首望春宫賦一首華清宫望幸賦一首晴望長春宫賦一首上陽宫望幸賦一首明堂賦劉允濟大哉乾象紫微疏上帝之宫邈矣坤輿丹闕披聖人之宇聿觀文而聽政宜配天而宗祖體神化以成規應靈圖而立矩度七筵以垂憲分四室而通輔合宫之曲疑作典鬱乎軒丘重屋之儀崇於夏禹因殷成於五帝繼周道一作實於千古統正朔之相循起皇王之踵武大禮興而三靈洽至道融而萬物覩其在國乎惟聖踐極配永登樞浹生成於大冶銷品彚於洪爐貫星象而調七政列山川而宅五都開洛陽之寶籍受河闕之禎圖惣䕫龍於國序集鵷鷺於天衢包壯葉疑於𤣥頊籠景化於黃虞功既成矣道既貞矣答后土之嘉祥藹上雲之殊祉望仙閣之秀出瞻月觀之宏峙鏤紅玉以圖芳肅龜壇而薦祀道不言而有洽物無為而自致嚮明南面髙居北辰屬天下之同軌率海內以嚴禋想雲臺以應物考明堂以臨人叶和萬㝢懷柔百神降䖍心啓靈術採舊典詬故實表至德於吹萬起宏規於太一欣作之於有範佇成之於不日工旅奔競人皆樂康訪子輿於前跡揆公玉之遺芳順春秋之左右法天地之圓方成八風而統刑德觀四序而候炎涼跨東西而作甸掩二七以疏疆下臨星雨傍控煙霜翔鶤墜於層極宛虹拖於遊梁崑山之玉樓偃蹇曾何髣佛蒼海之銀宫煥爛安足翺翔於是覽時則徵月令觀百王綏萬姓肆類之典攸集郊禋之禮爰盛衣冠肅於䖍誠禮樂崇於景令三陽再啓百辟來朝元纁霧集旌斾雲搖湛恩畢被元氣斯調羅九賔之玉帛舞六代之咸韶澤被翔泳慶溢煙霄穆穆焉煌煌焉粵自開闢未有若斯之壯觀者矣煥乎王道昭賁三才逺乎聖懷周流九垓鴻名齊於太昊茂實光乎帝魁浹羣山於雨露通庶品於風雷盛矣美矣皇哉唐哉第二任華粵若稽古巨唐千靈纍聖二葉重光思文烈以宗祀象天地之圓方考遺訓建明堂俯南端之赫赫㨖北極之鏘鏘盤螭黝糾捧神珠而髙翥遊鵾翕習仰層檻以回翔星辰出納於疏牖虹霓縈帶於軒廊逺而望之若扶桑吐日生髙岡近而察之若叢雲轉蓋陵昊蒼屹峥嶸以岑立漫離披而翼張其奧祕也懿濞退概靈仙髣佛肅枚枚以實實窅眇清爽日月來往赫昈昈以煌煌階陛嶙峋而分據欒櫨磊落以相望實造化之難測非翰墨之所詳吾君正冠冕垂衣裳佩玉璽腰干將猛簴列崇牙張百揆時序萬國來王敦行尚年既在南而近夏貴仁親族乃居東而曰陽中主尊於太室西導德於總章務兢兢之孝理匪宴宴之樂康然後知嚮明之位正隨時之教盛因方備色乘五運以順行選士養賢崇四學而敷令豈直若斯而已哉其宫十二以象辰行水四周而為海堂筵楣徑可以見乾坤之籌䇿暑往寒來可以知六九之變改室也州之數窗也卦之在髙得黃鍾之實柱懸列星之彩畢千古之能事終一人之不宰至有虞之總章期夏后之太室殷重屋以五周太廟以七伊數君之餘制各殊途而並逸雖信美於當年是無取於今日别有清河絆鳥長沙求贄一作試討論公玉之圖錯綜伯喈之議儻繡桷之有漸庶青雲之可致第三王諲大唐混合寰宇開張時雍體黃中之一德居紫微之九重既而成化載造天下有道得彩鳳之靈圖據飛龍之大寶美其厯數㑹昌纍葉重光真宰無為盛先天之景業聖人有作立配帝之明堂寫神規之大造嶷崇丘一作基之正陽燐燐爛爛熒熒煌煌徒觀其藻畫周設雕刻具美綺寮豁達以生風重簷周流以藏晷嶔崟﨑嶬狀崑嶽含霧而插天衢隆崇峍屼若蓬萊駕鼇而涌海水屹乎氤氲孤標紫氛璇題皓飾金鋪洞文拱星辰以端居傍眺白日憑軒檻以直視俯見青雲爾乃環曲析構重屋蓮銜綺井艷窋吒見靈光殿賦以垂珠階接彤庭影連延而造玉若夫靈姿衆出詭孌一作變叢生畫栱攢施龍桷參差以星布隂室晝朗粉戺皎曜以月明及夫四海波晏一人有慶寒風初盡陽月既正蠻夷颯沓以來王文物葳蕤以交映信所謂不宰而合道居中而作聖第四于沼天子朝諸侯於明堂惟古之制始以講信修睦終以布憲施惠合至德之休光旌中國之巨麗下之象地也以列五位之神上之法天也以配五方之帝稟太一之威靈順隂陽之開閉左個右個分以寒暑之宜以筵以几度以堂室之際觀乎萬國來朝威儀濟濟聖乃負斧扆而南向以布政百僚端冕辨而北面以陳禮是知人以君為心君以人為體晏㑹之節以明於尊卑慶賜之儀以旌於孝悌原夫宅中而起繼天而作遙視嵩少俯枕伊洛巍巍煌煌厥髙不可乎彌度拏龍㰇以蚴蟉亘虹梁而各落綷以綺藻施以丹雘四闥以四氣而開八窗以八風斯廓祥風布影對寶檻以交輝皎日懸光曜金牀而璀錯於是陳三獻之禮臻九成之樂申儀於辟雍崇業於太學甄古今之至理議沿襲之蹖駮既而順斗極運天關皇恩普矣貴賤以頒東門之外以朝乎九國南門之下將享於八蠻正德是宏惠風斯布禁淫慝節制度重三台之任乃申命於中階寵五伯之功遂授鉞於東戶夫明堂者明帝之德體天為狀必資闡化以凖程豈獨宏規而取壯出庶物而咸仰包宇宙而為量惟先聖之是則信百代之可尚總章右個賦以氣變銅渾灰移玉管為韻蕭昕大君嚮明神道設位恢三皇之軌物張五帝之經緯居皇極以體尊配升平而作諡上棟下宇圖出震之垂功崑崙辟雍模大壯之成器分五行以配德合四時而導氣審圓象以規天揆方儀而法地因節候之開闢得四時之奧祕不然何以審寶位之尊彰后王之貴者也夫其體物辨方因宜制變壯雲構之直聳屬星躔而右轉玉露朝落金風夕扇收帝藉於西成誓武人於南面然後緝以衆政休兹百工草黃月季虛正昏中釋菜吹豳命樂人而萬舞斬牲示戮習軍威於五戎既依方以服玉遂候吕以吹銅徒觀其在陽體尊規模所存取閟寒暑以法乾坤環沔彼之流水設有閌之髙門布政居方順時開闔乞言講德肆志討論宣八風而配律齊七政以同渾爾其大體盡設明堂洞開興亡之跡厥德不回見周公之負扆看紂王之罹災設殷監於既往垂大軌於將來邃宇九房採唐堯之茅屋神階十二懲夏癸之瑶臺故當勤求庶政想望英才不爾何勞謙於昃日而旋斡於飛灰既而四方述職九品陳儀禮有攸叙政無不施發聲明於風動趨劍履而星移道敷鵷鷺兆合熊羆永恭已而南面故垂拱而無為非斯宇以攸贊亦何取於成規是月也天子禮神祗展牲玉感物增思䖍心以朂既嘗稻以薦火疑作犬亦趨刑而斷獄明大閲以講威訓羣騶而撫俗别有粉署承風金門獻欵念無媒以贈䇿謬談天於窺管上陽宫賦賈登天子卜惟洛食受於河圖開上陽之别館取大壯之規模爾其則以三象當乎四術沓雲構而承天擎露盤而洗日俯馳道而將半臨御溝而對出疑海上之仙家似河邊之織室昔者嚮明南面十月遊巡既其避暑亦以迎春鏤章霞布環衛星陳集諸侯則朝乎萬國張廣樂則和乎千人得橫汾於即事將宴鎬而為鄰既而大駕斯去華宫不御閉玉戶而藏春掩金臺而罷曙見芳草之空積看桂花之獨著人多望幸之誠地惜離宫之處别有洛陽下客東魯餘風辭官北部對問南宫賦甘泉於此日希客薦於揚雄阿房宫賦杜牧六王畢四海一蜀山兀阿房出覆壓三百餘里隔離天日驪山北構而西折直走咸陽二川溶溶流入宫墻五步一樓十步一閣廊腰縵迥簷牙髙啄各抱地勢鈎心鬬角盤盤焉囷囷焉蜂房水渦矗不知乎幾千萬落長橋卧波未雲何龍復道行空不霽何虹髙低𡨕迷不知西東歌臺暖響春光融融舞殿冷袖風雨凄凄一日之內一宫之間而氣候不齊妃嬪媵嬙王子皇孫辭樓下殿輦來于秦朝歌夜絃為秦宫人明星熒熒開粧鏡也緑雲擾擾梳曉鬟也渭流漲膩棄脂水也煙斜霧橫焚椒蘭也雷霆乍驚宫車過也轆轆逺聽杳不知其所之也一肌一容盡態極妍縵立逺視而望幸焉有不得見者三十六年燕趙之收藏韓魏之經營齊楚之精英幾世幾年剽掠其人倚疊如山一旦有不能輸來其間鼎鐺玉石金塊珠礫棄擲邐迤秦人視之亦不甚惜嗟乎一人之心千萬人之心也秦愛紛奢人亦念其家奈何取之盡錙銖用之如泥沙使負棟之柱多於南畝之農夫架梁之椽多於機上之工女釘頭磷磷多於在庾之粟粒瓦縫參差多於周身之帛縷直欄橫檻多於九土之城郭管絃嘔啞多於市人之言語使天下之人不敢言而敢怒獨夫之心日益驕樊川集文粹並同或添而字非固戍卒呌函谷舉楚人一炬可憐焦土嗚呼滅六國者六國也非秦也族秦者秦也非天下也嗟乎使六國各愛其人則足以樊川集文粹並同或添併力而三字距一作拒秦使秦復愛六國之人則遞三世可至萬世而為君誰得而族滅也秦人不暇自哀而後人哀之後人哀之而不鑒之亦使後人而復哀後人也望春宫賦以春望郊野順時布和為韻失名青門之左兮層宫嶙峋資睿覽以臨下得嘉名於望春故在東以就乎陽位當出震必俟於良辰乃發惠和式遵夫月令無勞轍跡自表於時巡其初也度宏規法大壯標上苑而獨出儼復道而明望逺天聽以遂於羣生浹皇情用交乎四暢鮮飇微扇籠輕靄於髙臺淑氣初臨鎖浮光於綵仗吾君於是縱目前檻馳神逺郊散晴煙於地表拂佳氣於林梢觀青陽之煦然載懷祈穀聽鶬鶊之鳴矣不使覆巢布政有孚宸遊是假察微明於逺嶠睇新緑於平野南山之翠色盈前渭水之素光在下蓋將賦藉田於晉代豈比撰吉日於周雅美矣哉矗雲楣以重疊煥藻井以輝潤居髙而逺無不臨涵澤而動無不順諒可禆於恭默非取樂於崇峻况乎流鶯欲囀初柳生姿懿祥風之習習增麗日之遲遲偉鳳闕之樓臺萬邦仰止眄龍鱗之原隰五稼惟時聖上所以成化用彰克勤是務元功所以遐及仁術紛其大布斯宫寧夸後之為斯望匪盤遊之故既而天地叶神人和修文以昭士耀武以止戈然則賦望春之事宜乎播大雅而登歌華清宫望幸賦以題為韻李程上苑之左兮驪山之中天作髙岫帝為離宫示宸遊之有所表聖鑒於無窮臨峻路而赫其昈昈標爽嵦而屹以崇崇惜翠華之未至閴紫殿而猶空則有望幸其中流睇延慕希天顔而回矚望雲闕而屢顧想恩波之東注俯瞰渭流愛佳氣之西浮空瞻秦樹目盡煙末心馳御路何聖慮之未還獨幽懷而能喻窮轍跡且俟玉山之遊想車音將購長門之賦矧夫閣有朝元之美稱殿有長生之嘉名霞駮二字見靈光殿賦丹檻雲攢繡楹可一作何以召通仙之降止安皇祥之永貞是以仰碧落竭丹誠庶日月之回照等葵藿而同傾濯觱沸之泉每想金輿之度踐萋青之草還思玉輦之行雖託質於别館常寄心於穆清戀戀西向悠悠矚望步磴道以寂歷眄廣庭以寥曠竹花雖吐如含待鳳之誠雲氣才升若睹從龍之狀彼玉山既逺金闕仍賖未若浮遊近縣如在仙家俄天邑之孔邇自神都而不遐雖館稱五柞殿美九華喻之於此曾何以加惜乎神光未矚曠此佳境徒企想以忡忡復懷慕而耿耿閉玉樹於深谷銷金鋪於秀嶺君乎君乎胡不出宸居而來幸晴望長春宫賦以登陴起遐望為韻梁洽雲收野迥兮目極千里空淨川長兮纎埃不起視河外之離宫信寰中之特美非疑作飛重樓之沓秀繚長垣而層趾詳巨制與宏模固一君而萬祀振疑作范秦晉之襟帶據山河之表裏諒神功之所營匪靈光之能擬邈矣轇轕岌乎崚嶒對華山之贔屭挾重關之股肱文物著明則可久可大制度豐敞則不騫不崩來蘇之詠已作觀風之道斯宏逺樹遙晴掛長虹而欲飲祥煙不散俟吾君之復登宫闕多竒欒櫨疊施倚萬楹以磊砢洞千門而陸離玲瓏玉樹則偏澄霽色連鶱繡檻則却映斜曦設璇題以曜殿粘第四十五卷峨和城賦作玷赬壤以文陴度之以几筵則有典有則約之以軌物則不髙不卑當今取實去華匪儉匪奢撙節三代光宅四遐豫順以遊御六龍而戾止聲明自溢奄九有而為家且夫書稱梓材易稱大壯自昔棟宇之作未有兹宫之狀夫長者仁夀之宗符春者發生之所向伊嘉名之可偉乃動植之攸尚客有學古之流乃含毫而一望上陽宫望幸賦謝觀宫闕崇崇縈帶洛河之上據臨天地之中儼百司以還疑作環拱流百川兮㑹同曷君王之未顧屹樓臺而鎮空或斑白里人或前後近侍覩周公之舊制憶開元之故事當域中之正寢實王者之定位何乃內外如一東西有異思紫泥而日日將來仰玉輅而年年未至徒使萬室向曙千門洞開藹臣心以西望希天眷之東回見紅輪之漸晚乂翠華之不來及夫玉漏報更蟾輝永夜皆傾耳以暗屬恐飛詔之潛下徒玉兔之屢虧尚金龍之未駕是必左右獻書股肱啓謀以為王者一德合居上游以為金城千里能制諸侯殊不知四海無虞五兵載戢與殷周而抗節豈秦漢之能及在仁義而聿修奚險固之是急且夫中嶽為內四嶽為藩此則前控伊闕右闢轘轅乃文公立圭之地是成王定鼎之原寧勞百二之勢足居九五之尊所以軋軋屬望戀戀何言尚軫憂人之念未垂巡狩之恩雖年華不負於照灼而煙花暗老於宫垣况復伊洛王畿崤函近地往復無勞人之役邐迤有行宫之備冀我皇之臨兮示天下為家之意文苑英華卷四十七
