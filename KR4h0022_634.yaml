body:
  text: 文苑英華卷六百三十五宋李昉等編賀上賀冊尊號狀二首賀冊皇太子狀三首賀降誕日德音狀一首賀聖躬痊復狀二首賀順宗諡議狀一首賀論三教狀一首賀西幸改期狀一首賀冊尊號狀孔戣右臣聞唐德格天列聖垂祐必紀名號以彰治唐諱功伏惟元和聖文神武法天應道皇帝陛下纘戎十聖時乘六龍躬一德而善繼丕承罄有形而天覆地載既休武力方用文經遺步驟於殷周振聲容於華夏既而天人合應億兆叶心探至道於邦家之先揭鴻猷於彊名之域陛下初違羣議方守謙光旋體至公遽回慈眷德意既降盛禮將陳凡在品彚無任幸甚臣以待罪遐徼不獲稱慶闕庭徒勤子牢江海之心有同太史滯留之日無任歡抃之至賀冊尊號表英華作狀非韓愈此篇當在五百六十九卷表門今已移入姑存其目百僚賀冊皇太子表英華作狀非柳宗元此篇當在五百十七卷表門今已移入姑存其目為崔大夫賀冊皇太子狀孔戣臣聞帝皇立極必建儲二俾承宗祧所以祗奉粢盛永固社稷者也伏惟睿聖文武皇帝陛下積德承業光有天下思正國本以和人心載考春秋之義以明君臣之道主茲匕鬯允屬元良推明至公振舉舊典皇太子體仁秉哲既嫡且賢溫文發中孝友聞外欽若丕訓允膺冊禮陛下將嗣十聖之休烈垂百代之懿範大備禮物廣設明庭隂氣方晦而忽銷旭日既升而增朗夷夏胥悅神祗克諧足以包夏孕商跨周軼漢夫何晉魏以降易置瑣瑣不足侔此盛禮既畢洪恩又洽恤刑議獄旌善賞勞禮問高年存恤疾隱皇王之德於茲備矣臣忝列近侍親承睿謨抃蹈之切不勝愚懇云云為鄭尚書賀冊皇太子狀令狐楚臣聞於宣政殿冊皇太子訖伏以建崇儲位光啓春闈萬方以貞九服同慶伏惟皇帝陛下誕敷聖訓光啓天慈咸元貞於國經鍾福慶於邦本皇太子溫恭比德仁孝因心方育質於龍樓肇增輝於望苑臣戎守有限不及蹈舞稱賀云云賀降誕日德音狀元稹右臣等伏奉今月日勑㫖集作書以降誕之辰奉迎皇太后宫中上夀獲申歡慰宜集百寮及外命婦進名賀皇太后仍御光順門內殿與百僚相見便永為常式者伏以降集作誕聖嘉辰承天令節新恩肇降品彚咸休皇太后念樞星之祥重遊甲觀羣執事排閶闔而入盡唱賡歌同霑就日之榮實慶普天之樂况百官集作寮承式萬歲傳呼永為利見之規彌荷無窮之澤臣等謬參樞務親奉德音慶抃之誠倍萬常品無任鼓舞歡呼之至李令公賀聖躬痊復狀前篇作表已見五百六十九卷于公異平和前篇作康平上天前篇作自天坐朝前篇作求衣之事前篇作之任任於藩臣前篇作彼戎臣其餘所司責成各有常務臣䝉國榮輒露丹懇伏惟察納表臣愚忠無任感激屏營之至前篇作從容聖心消息𤣥化為宗社自愛委諸有司幸甚臣䝉國寵榮輒露誠懇伏惟宷納表臣愚忠為大夫安平公華州進賀皇躬痊復物狀李商隱右臣聞藩方舊德臣子私懷將稱慶於天朝必展儀於土貢伏惟皇帝陛下道苞乾象德總坤靈肇自元正載康福履九廟不忘於繼志兩宫無闕於問安鼓舞萬靈波傳四國驗推測則咸如周卜聽祝詞而皆若華封臣坐擁伏熊行驅畫凖值一人之有慶當春日之載陽心但葵傾跡猶匏繫伏蒲之覲謁未果獻芹之誠懇空深况又地邇宸居俗薰儉德更無玉帛以率梯航前件石器等瑞匪土硎珍慙甗磬並取諸地産皆以勒工名茯苓茯神等品載仙經竒標藥録通靈祛疾不唯色若凝脂延夀安神豈是心如枯木干冒陳進無任兢惶云云賀順宗諡議表英華作狀非令狐楚此篇當在五百七十一卷表門今已移入姑存其目賀論三教狀張九齡右伏奉今日墨制詔諸學士及道僧講論三教同異臣聞好向之論事躓於偏集作萬方至極之宗理歸於一貫非夫上聖孰探要㫖伏惟陛下道契無為思該𤣥妙考六經之同異筌三教之幽賾將以降照羣疑敦集作敷化率土屏浮詞於玉殿緝經集作精義於金門一變儒風再揚道要凡百士庶集作庶士非罔不知歸臣等幸侍軒墀親承至訓抃躍之極實倍恆情望宣付史館謹奉狀陳賀以聞賀西幸改期狀右臣等今日面奉進止西幸有日般運已去仍聞京畿百姓猶有未安儻來歲非熟下無所向集作下人無向朕雖至彼復有何情欲延期至來冬待看榖麥卿等商度以為何似臣等具奏洛陽城闕雖曰皇都至於宫苑之間制度本狹然風土氣候不甚宜人陛下以萬姓為心萬姓以陛下為命億兆所繫誠在聖躬聖躬若安何顧小小陛下遂當寧動色再降德音苟利於人朕何顧惜發言惻隱感動神祗臣等幸聞至言不覺承睫聖恩愛育遂及於此又勑臣等商量進來者湛恩至德焉可使朝臣不知聖恩鴻名不可令史官無述臣望宣聖㫖改用來年十月幸西京仍望具將本狀遍示朝列并宣付史官臣等不勝感戴踴躍之至文苑英華卷六百三十五
