body:
  text: 文苑英華巻六百五十四宋李昉等編謝辟署為同州張評事謝辟并聘錢啟二首為山南薛從事謝辟啟一首為東川崔從事謝辟并聘錢啟二首為河東公謝相國京兆公啟二首為栁珪謝京兆公啟三首獻河東公啟二首上尚書范陽公啟三首為白從事上陳許李尚書啟一首為桂州盧副使謝聘錢啟一首劍門寄上路相公啟一首代青州掌記謝本府辟啟一首為同州張評事謝辟并聘錢啟李商隠潜啟伏奉榮示伏䝉猥賜奏署今月某日勑㫖授官承命恐惶一作懼不知所措某文乖綺繡學乏縑緗負米東郊止勤色養獻書北闕未奉明恩撫京洛之塵素衣穿穴訪江湖之路白髪徘徊大夫榮自山陽来臨沙苑固以室盈東箭門咽南金豈謂搜揚乃加孱𦕈府稱蓮沼慙無倚馬之能地號雲門竊有化龍之勢便居帷幄遽别蓬蒿袁生有望於樵蘇楚子永辭於藍集作襤縷刻諸肌骨知所依歸伏惟特賜鑒察謹啟二潜啟錢若干伏䝉仁恩賜備行李重非半两輕異五銖子母相權饑寒頓解細看銅郭徐憶牙籌雖云集作虞神有魯褒便恐癖如和嶠辦裝無闕通刺有期感戴之誠不知所喻謹啟為山南薛從事謝辟啟傑遜啟今月某日伏䝉辟奏節度掌書記勑下徒有長裾曽無綵筆初疑誤聽乆乃知歸感激慙惶不知所喻某受天和氣而鮮雄材幸承舊族之華遂竊名場之價頃者湮淪孤賤綿隔音塵其後從事梓潼經塗天漢初筵末席披霧覩天自邇以来懐恩莫極鄭𤣥之腰腹若掛丹青崔琰之鬚眉常存夢寐方思捧持杖屨厠列生徒豈望便上仙舟遽塵蓮府尚書士林圭臬翰苑龜龍方殿大藩將求記室是才子懸心之地詞人効命之秋豈伊踈蕪堪此選擢思曾顔之供養念陳阮之才華自公及私終榮且忝伏以家室憂繫初解山川䟦涉未任須至季秋方離上國撫躬泣下尚遥郭隗之門閉目夣逰已入孔融之座下情無任攀戀銘鏤之至為東川崔從事謝辟并聘錢啟前人福啟伏奉公牒伏䝉辟署觀察廵官某早辱梯媒獲沾科第吳公之薦賈誼未塞前叨竇融之舉班彪仍當後忝仰觀蓮幕俯度桂科卵翼不自於他門頂踵實非其已物但賫灰粉逺逐旌幢雖有命以酬實無言可謝伏惟俯賜鑒亮二福啟錢若干伏䝉賜備行李竊以白馬從軍青鳬受聘磨文難滅校貫知多陸賈方驗於火花郭况莫矜於金穴感戴之至不任下情謹啟為河東公謝相國京兆公啟前人某啟今月某日得當道萬安驛狀報伏承遣兵馬使陳朗賫幣帛鞍馬辟召少男者未敢尋盟遽兹聞喜遐瞻闗闥恨乏羽毛伏以自有縉紳誰無交結朋友不全素諾在古殊多父子同受深知當今罕集作未見豈期令徳圗於所難男珪曾未成人纔沾下第辨仲謀之菽麥雖則有餘况安石之芝蘭竊將不可忽依太府便厠英僚東吳之咍恐自此始西園之讌未知如何此皆相公以某謬接藩維乆依繩墨克降由衷之信將酬事大之心不然則安得接集作㧞童子於舞雩禮諸生於白社身枝獲慶城府知歸感激恩光丁寧教誡永言銘鏤尚昧端倪伏俟簡書来至敝邑則專請張覿評事奉啟狀申陳慕義無窮措辭莫盡攀附惶戰集作戢不能究陳謹啟二某啟伏奉榮示伏䝉辟署某第二子前鄉貢進士珪充攝劒南西川安撫廵官并賜公牒舉者某去月得楊侍御書題㣲傳風㫖初如吉夣終謂戱談非不尋思莫得端緒今乃竟詢仲𦙍果降嘉招伸紙發緘悸魂流汗何者某頃居班列已奉陶甄口裏雌黄屢加彫煥胷中雲夣過沐涵濡掀之以順風煖之以愛日兹辰議報不在他門一昨叨裂土田謬分旗蓋適當東道獲事西隣豈望信在言前榮流意外坤維接畛何酬上相之知坎卦成占遂報中男之喜且渠譽乖郄桂名媿謝蘭未學周南召南纔得一科一第縱解問絹不能負薪將何以與先生並行從大夫之後仰塵帷幄佇雜簮纓况襟帶禺同咽喉巴濮求於安撫必也機謀深慮異時莫副虚佇然竊尋史傳所載語父子之間雖石苞獨異石崇而山濤不知山簡亦豈集作安敢保其孱陋遽遣退藏但當授以一經訓之大杖庶將寡過以謝明恩染翰銜情封牋寫抱小人多事拜台席以猶賖童子何知上賔階而在即瞻望閽闥死生以之伏惟深賜鑒信謹啟為栁珪謝京兆公啟某啟散兵馬使陳朗至伏奉榮示兼奉公牒伏䝉召署攝成都府恭軍充安撫廵官者師襄鼓缶或近翫人和氏搜珉能無驚物跪受髙命莫知所裁某藏豹不堅雕龍未巧徒承庭訓遂厠人曹比衛家之一兒天懸鵬鷃望鄴中之七子風逸馬牛已忝决科敢思筮仕伏惟相公以仁義禮智信為基構用温良恭儉讓為藩籬堯時則業貫夔龍殷代則道符尹說入秉文教出曜兵權揮神鋒而劒合隂陽述雅誥而筆開造化况天有井絡地稱坤維控三巴百濮之雄帶南詔西山之險人稱奥府帝謂殊藩固已一作以廣集豪英用資恭佐玳簮珠履緑水紅蓮成籍籍於淮山致憧憧於燕路若某者徒將慕藺何足望囬又安敢集作可拂其塵埃加以冠履伏思相公直以大人頃居班列獲奉恩私羅照乗於驪淵覬歸昌於鳳穴未見其可處之不疑曾不念木朽石頑雕鐫莫就榆瞑豆重性分難移古人所以有以榮為憂受恩如敵斯言之作珪也有焉今月六日辰時輒奉辟書具聞晨省仰承嚴㫖便定行期而又内奮弟兄外誘交友傅翼類虎生角如麟事誠實於顯榮勢莫知其報効尚須旬日方拜旌旄唯當洗心為齋延頸以望持千尋之建木想像瓌姿周萬頃之澄波比量曠度載恩揣已授集作投命依仁神之聽之百生如一謹啟二某啟伏䝉榮示賜及前件衣服叚及束絹等謹依處分捧授訖伏以大人自處通班彌脩儉徳田園唯恐蕪沒子弟不免饑寒去春成名首秋歸覲雖才非張載未刋劒閣之銘而志慕胡威敢問荆州之絹豈謂集作意相公復以簡書召署筐篚加恩古者贖百里奚纔持五羖誚程不識猶惜一錢况某碌碌無竒庸庸自守敢邀厚幣来自雄藩品目難名珍纎可玩仰李膺之徳尚未登門讀戴聖之書集作經已驚潤屋下情無任戴荷悚懼之至謹啟三某啟伏奉榮示令將前件馬及行官延接者某將仕大藩苦無逺道特䝉恩禮曲賜優崇扶以武夫濟之良馬經過燕館將耀於鳴騶夣寐梁園只思於飛鞚感佩之至不任下情謹啟獻河東公啟商隠啟伏奉手筆猥賜奏署某少而孱懦集作薾長則艱屯有志為文無資就學雖雜賦八首或庶於馬遷而讀書五車逺慙於恵子契濶湖嶺凄凉路岐罕遇心知多逢皮相昔魯人以仲尼為佞淮隂以韓信為怯聖哲且猶如此尋常安能免矣集作乎是以艮背却行求心自處羅含蘭菊仲蔚蓬蒿見芳草則怨王孫之不歸集作逰撫髙松則歎大夫之虚位不可終否屬於髙明伏惟尚書春日同和秋霜共冽叔子則九代清徳稚春則七葉素儒君子立言永為周禮正人得位長作嵗星今者初渉將壇始敷賔席射江澳集作奥壤潼水名都俗擅繁華地多材雋指巴西則民皆譙秀訪臨卭則客有相如舉纎繳以下𡨕鴻執定鏡而求西子唯所指命便為丹青若某者又安可炫露短材叨塵記室鹽車款叚徒逢伯樂而鳴土鼓迂踈恐致文侯之卧承命知忝撫懐自驚終無喻蜀之能集作心但誓依劉之願未獲謁謝下情無任感激攀戀之至謹啟二某啟伏䝉示及賜錢三十五萬以備行李謹依榮示捧領訖伏以古求良材必有禮幣一束芻皆堪貺羙五羖皮未曰輕齎况某跡忝諸生名非前哲尚遥玉帳已賚金錢訪蜀郡之卜人懸之莫竭遇河間之姹女數且難窮未草檄以愈風不執鞭而獲富敢將潤屋且以騰裝戴荷之誠寄諭無地上尚書范陽公啟某啟仰䝉仁恩俯賜手筆將虚右席以召下材承命恐惶不知所措某幸承舊族早預儒林鄴下詞人夙䝉推與洛陽才子濫被交逰而時亨命屯道泰身否成名踰於一紀旅官過於十年恩舊凋零路岐悽愴薦禰衡之表空出人間嘲揚子之書僅盈天下去年逺從桂海来返玉京無文通半頃之田乏元亮數間之屋隘傭蝸舎危託鷰巢春畹將逰則蕙蘭絶逕秋庭欲掃則霜露沾衣勉調天官獲昇甸壤歸惟却掃出則卑趨仰燕路以長懐望梁園而結慮尚書道光士範徳冠民宗愷悌之化既流鎮靖之功方懋竊思上國投技集作刺東都及門唯交抵掌之談遂辱知心之契載惟浮泛頻集作頗陟光隂豈期咫尺之書終訪蓬蒿之宅感義增氣懐仁識歸便當焚逰趙之簦毁入秦之屩束書投筆仰副嘉招謁謝未閒下情無任感戀之至謹啟二某啟某猥以謏聞仰承嘉命處囊引喻未施下客之能在握稱珍遂忝上卿之列循揣斯乆兢惶不任况尚書學捴百家術窮三略文鋒筆力抉揚馬之懸門劍氣弓聲割韓彭之右地永言賔畫宜在民宗豈意非才旋䝉過聽末至居右既乏相如之譽後来在上終興汲黯之嗟手足分榮里閭交慶行吟花幕卧想金臺未離紫陌之塵已夣清淮之月依仁佩徳白首知歸伏惟俯賜恩察謹啟三某啟絹若干疋特䝉仁恩賜備行李謹依數捧領託嘉命猥臨厚賚仍及捉襟見肘免類於前哲裂裳裹踵無取於昔人感佩恩私不知所喻謹啟為白從事上陳許李尚書啟某啟伏奉公牒辟署節度廵官兼伏奉榮示賜及疋帛等才異當仁事從非望拜受失度跪捧難勝某符彩無竒局量有限徒以杜林外氏學富文華謝朗舉宗皆親儒墨齠年有志壯嵗無名瞻遺構以自驚奉成書而未遂重以零丁屬舋息類非蕃决稚圭之甲集作射科則行有違離之苦效敬通之却埽則坐無供養之資徘徊盛時鬰抑衷懇敢思聘召忽賜降臨尚書分戚天家揚輝王國攻文而丹青讓巧論兵而鈎觡慙能頃者言自執金雄推受脤河橋三疊當弟子之輿尸易水一集作二城值將軍之下世功深式遏道著綏和中間衛朔拒君邢洺起亂紀侯去國汾晉挻災語其巢穴之間在我封鄰之側而又潜調逺轡宻運良籌輕敵殘人則勇於不敢代謀持重則令在必行今者趙北變風淮南受賜戎麾始至賔驛初開固合大選英髦以充僚屬豈期恩集作思慮遂及孱微賁帛豐盈寓圭重復慈親喜問孀姉號驚姓名遂列於羣英簮笏遽集作再光於單緒感深肌骨戴重邱山未伸刺股集作投刺之誠已定糜軀之誓伏以乆將栖託兼議扶迎更渉旬時方遂行李漆園之蝶濫入莊周之夣竹林之虱永依中散之身蓮幕含誠金臺結想仰瞻恩顧伏撓精魂謹奉啟陳謝謹啟為桂州盧副使謝聘錢啟戡啟錢若干伏䝉賜備行李謹依數捧領訖多若鑿山積如别藏丙科擢第未全染於桂香盛府從知却自驚於銅臭禮於是重富而可求既不憂貧惟思報徳伏惟俯鑒㣲懇謹啟劒門寄上路相公啟胡曽某啟某蓽户庸人荷衣賤子道慙墨妙業媿筆精效枚叟之文章雖憐七發感潘生之嵗月已歎二毛失路腸廻迷邦足刖蟻棲培塿蛙伏潢洿自笑柴愚誰憐参魯尚思逐鹿未分牽羊將趨渙汗疑作汗漫之程詎學邯鄲之歩但以才非逈出性乏孤標雖勤側管之窺終類正牆之視有心吐鳳無夣懐蛟不痊曹操之頭虚刺蘇秦之股誠宜世棄敢望時来方嗟碌碌之生忽忝戔戔之幸朽株委地永甘夫子之捐枯骨凝塵豈料昭王之市遍身徳澤滿目恩輝寧止負嵩仍兼戴華既䝉蜀顧敢望秦留即遂面走鹿頭背馳鶉首如昇青昊似入𤣥都不知劒閣之艱豈覺刀州之逺伏惟相公神資重器天縱偉才邦國金城朝廷玉燭文髙庾月詞峻謝山纔見紫髯便居黄閣陶鈞百辟啟沃一人議平吳皓之時雖云推局報破秦堅之日不廢圍碁故能早執化權乆司政柄今則暫辭龍闕来鎮龜城將軍之細栁雖新丞相之鹽梅仍舊不煩壯士自伏雄圗揚麾而氛䘲晨銷按節而妖星夜落劉焉原野昔為累卵之鄉杜宇山河今作覆盆之地曾實慙孤陋叨沐招延鄭驛將窮燕臺漸近那能倚馬妄竊攀龍仰天上之程途已親台席指人間之岐路尚感客星披霧非遥拜塵在即無任代青州掌記謝本府辟啟顧雲某啟今月日衙前虞候某乙賫到簡牒伏䝉召署節度掌書記者伏以記室司存雄藩重務吳中草檄始召陳琳鄴下裁牋方徴阮瑀咸持彩茟以掌軍書况地控全齊封連巨浸有外夷之琛賮多土貢之賦輿假道既繁飛章亦衆永言斯任宜委髙才且某徒效聚螢未嘗吐鳳讀傳而雖云成癖為文而未見愈風忽辱簡書遽䝉辟召捧函增懼撫已知歸遐想膺門已積糜軀之志仰瞻龍節空懐拜賜之誠文苑英華巻六百五十四
