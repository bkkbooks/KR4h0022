body:
  text: 文苑英華卷九百七宋李昉等編軄官十五諸將軍四冠軍大將軍郭知運碑一首右羽林將軍王君碑一首右羽林將將軍臧公碑一首冠軍大將軍郭知運神道碑張説四序集作時平分清秋之氣勁五方異俗崆峒之人武故隴上多豪山西出將其有雲龍感召星象特生金皷登壇隱如敵國麾幢指塞自比長城得之於太原公矣公諱知運字逄時其先太原著姓今則晉昌人也本乎文武之弟是為虢叔虢或云郭因而氏焉自燕昭尊隗以築宫漢祖封亭以列國其侯于陽曲宅彼太原舊矣亭之𤣥孫友從太原徙隴西昭帝分隴西置平郭氏又為郡之右族友之昆孫武威太守憲憲之猶子散騎常侍芝其有名迹見於魏晉則晉昌諸宗散騎之後也爾乃一門連譽時人號曰三儒四海名齊天下謂之八顧光禄𣲖分於馮翊廷尉世茂於穎川孝則天錫釜金忠則帝彰集作章冕服仁則猛獸不害信則童兒不欺豈但介休見有道之碑畧集作洛陽聞立徳之傳而已曽祖欽𤓰州大黄府統軍上柱國祖才朝議郎𤓰州常樂縣令上柱國父師朝散大夫上柱國贈伊州刺史磧鹵之地戎馬生郊業戰鬭而取集作𢎞勲仕州縣而為達啓莫京之繇福不在於其身積無窮集作聲之善慶必流於後嗣公太白之精雷泉之靈膺家之禎為國而生身長七尺力能扛鼎猿臂虎口虬鬚鶚瞬射穿九札劔敵萬人子卿路逢遥識將軍之相唐舉一見足辨封侯之骨解褐以善戰授昭武校尉秦州三度府左果毅以敗敵集作敵北庭加游擊將軍沙州龍勒府折衝兼右金吾郎將瀚海軍副使尋改朝散大夫伊州長史伊吾副使以軍累破虜即授其州刺史進當軍經畧使朝廷以未愜前除且有後命遷左金吾三字集作本衛中郎將仍舊為州軍使黙啜之冦北庭也公奔命解圍軍聲大振加雲麾將軍集無此字右府衛將軍封介休縣開國公食邑三百集作三千户開元二年吐蕃入隴右掠坰牧公兵以竒勝冦不復蹤積甲山齊而有餘牧馬谷量而未盡歸功廟筭朝議多之授左集作拜右羽林將軍持節隴西集作右諸州節度大使兼鄯州都督河源軍使鎮西陲信國之藩屏坐北洛亦王之𤓰牙故入奉期門而出寄分閫集作出分閫寄於是料敵無備間其師老潜軍一舉大俘九曲鎻甲文劔𤏡馬㹈牛既獻戎㨗遂頒朝賜乃兼鴻臚卿攝御史中丞改封太原郡開國公加前食邑三千户執憲總軍典屬乗障増爵益邑遇厚恩深俄而六州羣部相率大叛命公統隴右之騎濟河曲之兵集作師鋒鏑争先玉石俱碎拜左武衞大將軍授一子官賜金銀器百事雜綵千段旋軍集作班師臨洮遘兹虐疾嗟呼匈奴未㓕宿志不申生也有涯死而猶視開元九年十月二十三集作二日薨於軍舎春秋五十有五蕃夷邊鎮血靣椎心悲慘風雲號慟山谷豈非良將視人如子人亦視猶父乎皇帝閔焉詔贈涼州都督米粟五百石錦帛五百段命都水使者張景洪集作佚備物䕶葬遵朝典也惟公氣猛而性和量寛而精鋭沉謀可以掩蓍蔡雄斷可以奪鬼神故常糟粕韜鈐芻狗風角然其樹恩結信立威用武怛然集作烜赫如風濤震蕩如雷雨戰必勝集作克攻必取每有奏謁帝特稱嘆孝文之得魏尚虜不足憂太祖之見郭嘉知成吾事前後賜集作錫錦衣寳帶文馬素女爛其盈門長鳴在廐感知已之主陳必死之力皇情西顧則九𦍑舋皷詔書北伐則六狄焚旗上成聖君之𤣥鍳下効武臣之素節其意集作竟也如此夫為人子立廟致敬祖考來格不亦孝乎為人臣恢疆禦侮以勞定國不亦忠乎若然者歸義方於先人揚令名於後代可也嗣子英傑起復定逺將軍左領軍衛翊府中郎將借紫服金章隴右經畧集作河西節度副大使英竒朝散大夫前尚輦奉御英恊游擊將軍前京兆勵行府右果毅都尉英彦朝議郎行右二字集作前左衛胄曹叅軍等咸善居喪而過哀哉從王事而奪禮則知辛賢父子繼位將軍祭彤兄弟並叅戎律知本不忘集作去本不蠻達也而新是謀權也嘉此武功創其宅兆以十年七月塟我公太原夫人燉煌索氏祔焉禮也皇上念功以惜逝厚終以遇存有詔詞人為其碑誌介士送塟即封征虜之墳單于入朝當祭度遼之墓銘曰洸洸集作觥觥將軍雄畧冠郡平西征北震戎疊獯亭障闕皷屯田饋軍伏兹集作此白刃致彼青雲郭侯讌喜既多受祉𤣥社集作牡黼衣清廟蠲祀鼎食金奏炮鼈鱠鯉即集作既來不庭有嚴天子流沙愽望羽林飛騎集作騎飛河曲廻兵臨洮舊防手握金節魂沉玉帳千里送喪三軍悽愴詔塟禮崇樹碑恩豐集作恩碑義豐生為神將死為鬼雄身世一㓕榮華萬空祁連之墓長旌武功右羽林將軍王公神道碑維大唐開元十五年九月二十三日庚申右羽林大將軍持節河西隴右兩道節度營田九姓轉運十副大使兼赤水大使專知節度事攝御史中丞判凉州都督上柱國晉昌公薨於鞏芚集作芼亭故也夫事君効命之謂忠殺敵榮親之謂勇干星襲月之謂氣逐日㧞山之謂力有一於此名猶盖代矧兼其四人何間焉是晉昌所以錯落將星峥嶸山嶽者也公諱君字威眀𤓰州常樂人也父壽因公建績致位九卿臨難守死褒贈特進審塞翁之倚伏達家叟集作朦瞍非之俘休老而益壯殁而名位者矣公威聲發於雷泉武義標於峒嶺小頭鋭上猿臂虬髯集作鬚龍劔摧集作漼百勝之鋒地矛得萬人之敵㧞自行軍集作陣果有吕䝉之才拜於壇場不爽韓信之用始仕鎮戍歴班外府及郎將中郎至軍副率雖驟移官守而恒在疆場郭知運推轂河源握符隴外集作古公未登一命事主將之旌麾不出十年代總戎之節鉞慷慨之士以為羙談於是自驍衞將軍遷羽林大將軍既督隴右兼統河西綰塞垣之十軍佩節制之兩印大田多稼而屯廩百億蒐乗藉馬而鐵騎數萬乃蹈赤山焚罽幕獵青鳥驅犛牛喑嗚則七戎避勇集作辟昜烜集作炟赫則千里震動亭候恃其長城廟堂頼其神將月獻戎㨗嵗行軍賞王侯無種屠狗起於將軍戰伐有功爛羊超於都尉前後翻飛幕下奮躍行間跨軍曲郡腰金冠玉者數十百人矣每至入朝奏謁升殿論邊山川險易立成於聚米攻守方畧一决於前籌遥詔置兵先合於漢光之旨親書從事暗同於魏武之心故得延譽上騰風雲欝其氣色恩華下㳫日月借集作供其光輝當斯時也躊躇攘袂三垂可以氣壓百蠻可以力制即叙者先生之常談和親者竪儒之怯一時持計定足為神武非常之主道哉誓請先收犬戎次擊獯鬻盡區域於西海闢郡縣於北荒煇皇靈於天外圖壯節於雲閣其事如果曠古未儔惟君知臣俾集作保斯言之可復何神與善負厥志而無成是年秋八月吐蕃犯邊𤓰州失守盗憎吳將執政集作致是其親公以為背父立威非孝也頓兵縱敵非忠也大義逼而忘家方寸亂而供國其定計也成列而出討賊盡狄而退殺身忠在孝先將之道也公馳驛要諜而迴紇内叛以八九之從人當數百之強虜然猶虓噉擊射殺傷略半勢孤兵盡流矢横及所謂朴而餘威折而不撓矣嗟呼嘗膽之憤空結噉肝之怨莫讐天子聞之黯然興歎人言以命闕國夫豈忘其言哉茍收必死之忠焉問不虞之過至矣集無此字盖聖主推恕心集作仁恕於天下懸大信於後人愛欲其生戀集作懲是晉侯再克之喜惡傷其殁抱秦伯猶用之誠婉獨見之端豈常情所逮謀臣飲恩於望表猛將感徳於事外然後任人之固衆可知也乃下詔追贈特進荆州大都督禮命窀穸加常二等死事之經也公之伉儷曰武威郡夫人夏氏韓母築城之智孟光舉臼之才拔棘解圍三軍懾其徤婦崩城慟哭四海傷其孝妻此又伐間集作間伐之一竒一家之兩絶者也嗣子尚衣奉御承榮天奬賜蘭星祥名寳禮義形於橋梓哀戚過於纕麻稟訓帷堂克持門户特奉恩㫖收其二䕃飾柩玉闗歸魂上國以十六年十月詔葬於萬年縣見子之原鹵簿齊列方相雙引京尹䕶喪史官頌石千乘送葬觀驃騎之威儀十里開塋識龍驤之丘墓銘曰合衆在仁正兵維義將為天目國命所寄曲乃老師輕實兒戱安我封畧才難不易﨣﨣將軍貔貅絶羣超騰白地騫翥青雲朝盛勇爵時稱集作家榮戰勲衆考飛舉集作衆聲飛譽帝曰予聞予聞伊何甲兵繕肅屯積萬庾馬量百谷丼心犬戎指掌獯鬻大軍集作畢是當􅝌單于可掬壯計先達王師未張城隳孤塞冦及髙堂前忠後孝集作忠先孝後拒敵而忘外仇易復内變難防克日將戰呼天不假岑彭詐客張飛帳下流矢集作鏑何人交錢去馬蒼黄反復哀㢤命也羙殮姑闕寵歸芷集作芒陽東都門外南登路旁髙墳纍纍列樹行行父子同兆何殊改集作故是郷詔刻金石義形意氣隱善必書殤魂不諱事棄忠在生輕節貴嗟爾眀靈衘恩永慰左羽林大將軍臧公神道碑李邕夫兵者天之威將者人之命非武功不足以遏虐非智勣不足以視師故四朝簡才三邊受畧百姓拉之如朽五變轉之若丸横大漢而左廻出髙闕一作門而右去單于惟勷一作懐柔以納質匈奴辟易以破膽數騎深偵解鞍却敵入陣周迾摇扇坐謀矧乃大誰羽林離衛宸極蓄志堅石誓心渥丹捧日廓於九霄戴天旋於四孟千年聖主幸而逢之一代勲臣鮮哉稀矣公諱某字時眀東莞莒人也其先𣲖於后稷演於周公洎魯孝公臧因而為氏昔僖伯諫隱觀魚哀伯諫桓納鼎魯多君子視履考祥是以知其有後矣䧏自璋漢城陽王太傅暉蜀郡太守混晉東海内史曽祖滿府君隋銀青光禄大夫海州總管東海公祖寵府君皇朝請大夫靈州長史襲東海公考徳府君皇朝散大夫原州司馬贈銀州刺史上柱國莫不納忠詞光訓彛則大乃嗣種徳在人子孫並於昌時龜組疊於榮問公濬發卓犖雄舉倜儻風雨之氣澟澟出徒金玉之聲鏘鏘激物問家以廣孝形國以盡忠朋執義之昆弟友之雖文忠老成而壯武特立自左衞勲應穿葉附枝舉登科授左玉鈐翊府長史始足下也尋以天驕送死勝府纒兵占幕出竒衝突闕敵遷鴻州長道府左果毅仍長上恩奬充平敵軍都虞侯總管轉左衞陜西州華望府左果毅長上屬雜虜侵别將掎角横戈棹戰匹馬飛行拜游擊將軍本府折衝都尉仍長上公自任邊事每讀兵書山川之形不勞聚米戰陣之勢有以成圖驟施交賢博文求已習眀已至用𢎞畧以壯猷故兵部尚書同中書門下三品平章事韓國公張府君年位不侔志業相許引之入幕辟以論兵抗禮肅庭握手宻坐嘗謂人曰此子才經文武識匹孫呉逸翮將摶巨鱗必縱雖趙有李牧漢有衞青練彼朔方勦于獯狁無以居其右也由是聲聞于天威震于朔凡欲追討皆藉率先洎單于紹親間道畧地絶沙漠氷河公乃連馬拽柴多旗具火詐示遶擊為出分軍敵以表裏驚疑沮衂奔散轉懐州南陽府折衝都尉仍長上朝議以元功未塞後命載加遷寧逺將軍左領軍衞懐州景福府折衝仍長上充大武軍逰弈副使除定逺將軍大衞雍州通樂府折衝仍長上充大武軍慶加眀威將軍本衞左郎仍充東受䧏城副使公以敵騎應來備預宜速出敵不意惟我有謀乃毒以井泉焚以草莾中休㒺以秣馬夕炊㒺以汲人敵歎曰可北而不可以南可望而不可以至公之謀也累加宣威將軍使仍舊載遷忠武將軍左郎將兼安北副都䕶匈奴以地闕援孤士寡糧絶蟻附城下雨射城中公乃偃旄麾匿金皷懸門不發衿甲不陳匈奴且夕却軍遲眀出塞以功遷單于都䕶借紫金魚袋公以北鄙禦冦中道扼喉生門以携之死地以誘之覘其西也將驚其前察其東也將襲其後匈奴進退岐路廻旋二年議者以為約之不以長繩固之不以䧟穽非公用智全勝按甲養兵安能預於此恩制加銀青光禄大夫單于副大都䕶兼朔方軍副大總管上蔡縣開國男公理兵戒嚴撫下勤至感恩挾纊攝威䧟疑作蹈陣匃奴不南牧職公之故也拜靈州都督兼安軍經畧大使兼朔方軍大總管上蔡縣開國子匈奴利於馬牛指於靈夏嘗以三城分守上將專征議雖畫於河南身竟潜於漠北轉鄯州都督兼河原軍經畧使營田大使上蔡縣開國伯公曰且耕且戰足食足兵古制也於是闢屯積榖髙壘止戈轉輪勦勞校卒加勸公之經也恩加雲麾將軍左武威衞將軍經畧營田大使隴西節度副大使上蔡縣開國侯吐蕃恃衆無名嗇禍有素逺掠邇牧横掉我軍公乃下以單師張以厚陣惑之以聚散分之以從横左右夾攻首尾盡殪日公當西守虜蕃南侵獲其迹人審其隂計咸以投艱在將解控惟在疑復以本官兼勝都督東受䧏城大使營田大使兼朔方軍大總管上蔡縣開國公會六州九姓洊㐫階亂倉卒起於懐袖雜沓混於賔主敵接塞聨馬肥弓勁其駭人也公分於二蕃制於散地持必攻之郡計必死之兇出竒兵以四征保危堞以内備雖諸軍合勢而殊効特髙恩拜右武衞大將軍賜物三百叚餘如故自頃塞外餘黨留匿傍山或求食敓攘或逃死嘯聚猖狂三窟澶漫數州關隴震驚道路危阻復拜公朔州軍副大使節度河東道諸軍州兵馬圖是冦也公以敎騎雙絶誠難必擒夷險五岳非使不尅乃傍山釋馬依林去弓接之以銛戈扼之以武依襲其所短連其所長㐫逆鞠窮旬月底定以功最拜羽林衞大將軍復以本官兼安東大都䕶府都督攝御史中丞平盧軍節度使度支營田海運大使往者奚霫諸蕃之詭信也西屬匈奴南冦幽薊乘間每鈔無虞亟和公以兵數實多藉用尤費輕舉則外患不解大舉則内攻更深是以𫝊隂符移間諜飛言以誤其使重賞以賣其隣既伐碩交且斷右臂所謂以武闢武以敵攻敵雖賈誼計然晁錯䇿得無以尚也朝廷多之拜冠軍大將軍復本任東莞郡開國公及武神告天有成登岳展禮白羽日野朱旗霞山臨之以天儀列之以地陣公以驟奔走驅熊羆智勞促來風疾孔亟詔使累䧏御醫洊臻舊疴有痊後命遄拜復起前任無何以本官致仕聖上以公節不可奪故信臣禁兵畧不可謀故臨遣武事入為心膂出作爪牙非夫至公如貔如武焉可逺符夜拜雅杖邊秋萬里為城四鎮為岳澄北海之濤水掃西沙之風昏者哉及孚疑作乎暮律田園庄座枕蓆壯心不已餘興未并宿昔覇陵意將軍之夜獵屏營細柳冀天子之幸臨去鷰悲鳴疲闕跼顧賔御太息覧對永懐嗚呼日也者飄入於泉山者也藏歸於澤人謂之遊神謂之遷其可若何以開元十七年八月二十二日薨於京師平康里之私第春秋六十有八主上感悼邊人掩泣羊祜罷市耿㳟𠢐面見於此矣眀年秋七月日塟於白鹿原禮也長子敬廉定逺將軍前檢校左監門衞中郎將上柱國次子希庄中大夫前安北都䕶上柱國三子敬之前左金吾衞中候賜緋魚袋上柱國四子奉忠前左司禦率府長史賜緋魚袋上柱國五子敬泚前殿中省進馬上柱國並淳孝濟義昭武懿文檢崇讓以後身率周仁以集事光備慈訓追逺先塋雖史簡可𫝊而碑板尚闕顧予以舊執詢予以小才博殷而札翰未宣體大而褒揚不際將竭虛簿曽深其詞云爾惟至聖兮内外無憂任英武兮出入孔休總戎幕兮四紀羽林兮六周樹元勲兮特立隱敵國兮鮮儔救河曲兮走朔方解遼海兮振漁陽一生一死兮鞍甲卧沙雪兮疆場横匹馬兮飛將起萬里兮邊防忠則極兮智亦苦年且髙兮疾不愈事枕席兮忘家瞻日月兮戀主情遝遲兮怛化魂恍惚兮破虜志何深兮命何促時不與兮才不贖碑一代兮人英征九原兮鬼籙嘉孝忠兮題紀貽永載兮陵谷文苑英華卷九百七
