body:
  text: 文苑英華卷七十九宋李昉等編樂九觀舞賦一首舞賦一首開元字舞賦一首兩階舞干羽賦一首舞中成八卦賦三首國子舞賦一首湖南觀雙柘枝舞賦一首鸜鵒舞賦一首觀舞賦應魏王教謝偃惟欽眀之昌運應靈圖而嗣籙紐三代之離術正千齡之差朔可以治定制一作易禮可以功成變樂實磐石之攸寄固維城之斯屬欣微生之多幸濫髙選於名藩列通籍之渥惠承置醴之殊恩晨曳裾於東閣夕侍宴於西園于時霜氣斂靄夜景澄廓雲徹層臺煙銷連閣流月華以照耀間星文而灼爍巖桂偃而未凋宫梧紛而就落於是羅薦周設黼帳髙舒露凝珠網風清玉除燭浮輝一作煙浮暉於緹幕燈一作燭籠光於綺疏爾乃咀哇聲一作咀清哇文選舞賦咀哇咬揚激徵金石奏絲桐理竒調間發新聲互起從宴洽而忘疲歡情暢而未已於是燕餘齊列絳樹分行曳羅一作綃裙兮拖瑶珮簮習一作羽叉兮珥眀璫擢纎腰以孤立若卷旌之未揚紆修袖一作袂而將舉似驚鴻之欲翔退不失倫進不由躅二字一作踰曲流而不滯急而不促絃無差袖聲必應足香散飛巾光流轉玉若乃巴姬並進鄭媛俱前對席齊舉分庭共旋乍差池以燕接又颯沓而鳬連止有餘態動無遺妍似兩艷之同發類雙花之偶鮮進止合度俯仰若一節緩則顧遲唱速則回疾殊姿異制不可談悉若夫金翠的皪緗綺參差方趨應矩圓步中規飛鈿一作耘雪落頽鬢雲垂舒類飛霞曳清漢屈若垂栁縈華池既而曲變終雅奏闋清角止流商絶頓華履以自持整文袿而佇節始綽約而回步乃遷延而就列於是君王悠然懷古怡然自適遷思回慮弛懸改夕揖摛藻之賔引良談之客然後討核八索詆訶六籍語妙則衆絶希夷論逺則喻窮開闢議先哲之往軌考前王之餘迹方欲草登封之頌勒云亭之石與日月而齊眀同天地之不易凡一作皆初學記舞賦平列陳思王榮分帝子寵列天孫集賢東閣追宴西園使趙女携琴文君送酒劉楨吮墨而作賦王粲稱觴而獻夀樂者所以節宣其意舞者所以激揚其氣不樂無以調風俗不舞無以攄情志王乃奏長歌登舞閣徵絶伎於行宫命夭姬而走索同曳緒一作璽之翩聨狀跳丸之揮霍即使燕姬撫琴秦女吹笙楚妃歌防露之曲陳后唱結風之聲則有楚媛巴兒齊童鄭女躡凌波之緩步曵飛蟬之薄縷掩長袖以徐吟頓纎腰而起舞低鳳鬟於綺席聽鸞歌於促柱燭若蓉蕖折波而湧出婉若鴻鵠凌雲而欲舉其為體也似流風回雪而相應其為勢也似野鶴山雞而對鏡總衆麗以為資集羣眸而動咏觀其躡影赴節體若摧折將欲來而不進既似去而復輟回身若春林之動條舉袂若寒庭之流雪乃其指顧倣徨神氣激昻竦輕軀以鶴立若將飛而未翔作之者不知其所觀之者恍若有亡别有丘園羈旅簮纓無序擢髙枝於芳桂挺茂幹於長楚頓雌雄於飛伏卜行藏於虎鼠思擢太常之第求奉揚庭之舉開元字舞賦以全德崇文通節聲色為韻失名禮以訓俗樂以移風粵我皇兮是崇字以形言舞以象德肇開元兮是則是知聖人之合舞也既所以誕敷文教亦所以擬象周旋自我作古示不相沿豈比夫漢主習五行之典虞后陳兩階之前干戚之容雖備文字之旨未全何以哉盡美盡善待吾君其具焉望之如雲聖人為君橫御樓一作座於北極一作樓張古樂於南薰八佾之羽儀繁會七盤之綺袖繽紛雷轉風旋應鼉鼓以赴節鸞回鶴舉循鳥迹以成文周瑜之顧不作蒼頡之字爰分竦萬方之壯觀邈千古之未聞其漸也左之右之以引以翼整神容而裔裔被威儀而抑抑煙霏桃李對玉顔而共春日照晴霓間羅衣而一色霧縠從風宛若驚鴻匿迹於往來之際更衣於倏忽之中始紆朱而曳紫旋布緑而攢紅傅仲之詞徒欲歌其俯仰離婁之目曽未識其變通懿夫乍續乍絶將超復發啓皓齒以吟風騰星眸而吐月搖動赴度或亂止以成行指顧應聲乃徐行而順節且歌者所以導志舞者所以飾情觀其容也或以移乎風俗察其字也或以表乎貞眀振古不覩斯今獨榮掩雲門而奪大頀一作濩鄙咸池而陋六英一人有作萬物咸亨臣固迷於日用願頌美兮載厥聲兩階舞干羽賦以皇風廣被夷夏謐清為韻失名寰海之內長沙大野妖一作祅星既落兮天履其下皇帝將欲罷鑄兵歸䮜馬舞比干羽文化區夏在昔則格虞氏之逺人於今則彰我朝之風雅日麗黃道帝臨丹墀鼓靈鼉兮旗翠鳳登舞童而詔樂師兩階儼然而八佾舞之顧步而動兮成文在兹拊金懸始求聲於律吕揚玉戚非取象於莫疑作華夷且干者兵器去其用而持其實羽者樂音美其聲而秉其質是用抑揚於倒載之後鼓舞於飾容之日肅穆壯成舒遲靜謐周旋乎東向西向行列乎左墄右墄所以增廣殿之煜烜所以符泰階之光眀然後叶順氣繼和聲騖精而白日重貫造物而紅爐再成必使萬類千器一作品四維八紘革心而來約泄泄於靈府鼓腹而進仰巍巍於穆清吾君是以黜掌上之纎腰弛庭中之妙戲况丸劒揮霍巾盤慢易或洶湧於鼇抃或翩翻於鳥企諒文德之無補於樂情之為偽若其條暢旁逹聲眀逺被俾其洞心駭耳屈膝交臂是知至誠可以幽通大樂兹焉統同彼儀鳳之瑞格神之功雖非至理是必同風不然曷能去肉刑除脂網福如山峙澤若河廣蓋總干動其形容理國觀於指掌而已客有窺萬舞美柏皇然後賦兩階之事知五樂之方舞中成八卦賦以中和所製盛德斯陳為韻張存則樂之容舞為則導於情崇於德製其衣而五方咸備頒其序而八卦不惑然後體利貞而疾徐有度法行健而循環不窮數盈而剛柔匪雜綴短而眀德將融初配六以回旋狀馬行於此及變三而成列知龍化其中信乾坤之簡易應金石之變通於是步日而前因風而舉乘飄揚而婆娑雜沓映照燭而長短合序既順之而不却亦眀之而有所則離巽之不差豈進退之無旅則有應水之理象木之規疊若奔溜散如繁絲五色相宣謂神龜初負八音咸奏知靈鳳來儀震如疑作也坎也何斯違斯既以恱隨企其遵令象山而乍結乍凝依澤而若遊若泳狀巍巍之德仰之彌髙節蕩蕩之音於斯為盛是知艮兌之為美故必隨而不競是故聖人窮樂之變制舞惟新效知來而藏往故有要而有倫非干戚之前設若鈞天之所陳至若卿雲共臨瑞日同霽乍離乍合若翔若滯隨方辨色非前代之舊章應節成文實我唐之新製是知舞以適道無頗樂以審政同和觀象取則異乎側辨峨峨則斯舞也實百代之不訛第二同前韻白行簡卦惟體德舞以象功分其節於乾坤之位列其畫於綴兆之中相彼六爻爰配數於六律侔兹八體俾叶義於八風原夫乍合乍離進旅退旅參於繇而九變無撓辨於位而五方有序作既自於天心用必在夫君所剛柔斯别皆取象於負圖俯仰可觀各分行於曳緒爾其舞既備位亦陳贊陽和之啓蟄助雷雨之解屯卦始畫於庖犧當皇唐貞元之嵗易咸列於宣父在聖祖中和之辰度曲未終變態無極震艮以節其動止離坎以分其南北聞之者正性命而深和覩之者守精微而不賊繼虞韶之盡美哂夏樂之慙德徵其本察其儀成於巽而德風備矣變為兊而聖澤在斯近取諸身且表乎是則是效大合乎樂孰謂乎不識不知矧夫作者既取諸身演者必因於聖諒曠代而莫覩實於斯而為盛其始也取於卦而施諸人其終也觀其妙而通乎政是以契兹穆穆異彼傞傞象在於中將致天地交泰德形於外以眀保合太和且夫周八佾而非美漢五行而徒製雖冠華秉翟於干戚之間起索隱鈎深於天人之際曷若容止合於彖象幽賾殊乎卜筮客有欣千載之一時歌聖功而獻藝第三同前韻錢衆仲舞者樂之容卦者象之則故因舞以成卦乃觀象以知德八音是節位必配乎八風五方具陳衣必表乎五色是以德從之理也功加有截化洽無為作樂以習舞同文而共規俾萬姓覩而悅服百代勤而行斯懿其舞者員來樂人攸敘匏土革木兮夙設六律五聲兮具舉初就列以修容忽揚袂而進旅體殊舜樂九成徒辨其疾徐迹類羲文八卦自分其處所行綴罔失俯仰攸同乾坤定而有倫有要震兌分而自西自東稟雷澤以浹洽象天地之昭融紛綸乎抑揚之際輝煥乎節奏之中進退相依變易交映艮巽布而若離若合離坎峙而不譁不競體山風之次序叶水火之情性周旋乎玄武之間繁會乎羽籥之盛既而諧管磬感神人卦成列而不已節有序而復頻赴度應聲倏鳳轉而龍翥攢青拖紫粲霞駭疑而錦新翹遙兮比大章而未匹縹眇兮異鈞天之下陳我后惟眀舊章爰製以嗣以續不陵不替和樂且濡每立象以化人德音不忘故體乾而稱帝是知卦之設也八方正四序和彼象功以眀德安可與兹舞而同科國子舞賦以持羽後見形貌雍雅為韻失名天子斂賢才之地合禮樂之府命宗伯因四時之宜教胄子以六代之舞惟德是務以和為主翕左手以執籥就前軒以樹羽方將發揮五禮張皇六詩忽投步而赴節乍整容而自持雖鏘鏘與濟濟必庸庸以祗祗及夫鐘鼓鏗訇絲竹宴衍音容間起干旄迭見屹然山立歘然風從觀者如堵曷不肅雍實經國之洪範蓋訓人於中庸且樂以平其心舞以發其貌故無小無大是則是效宜合國之子弟實教人於忠孝其儀不忒其德惟馨逺人由是以來之故時無違命眀神可得而禮矣故物無遁形大哉聖人其道可久約我以禮樂𢎞我以孝友覩蹮蹮之屢舞實循循之善誘文德溫恭則羽籥在歸根之時武士一作事發揚則干戈居孽萌之後夫手之舞之有小有大成童舞象弱冠舞夏並允浹於生靈良克諧於風雅莫善於樂執而勿捨聖人若斯須而去身則孰垂拱於天下湖南觀雙柘枝舞賦盧肇瀟湘二姬桃花玉姿獻柘枝之妙舞佐清宴於良時始其金罍欲陳象筵宿設考清音於絃管之部選麗質於綺羅之列何彼姝之婉孌媚戎服之豪俠司樂以魚符發詠侍兒以蘭膏薦潔華燈張翠被徹聽銅壺之刻漏瞻銀漢之眀滅佇新詞以潛習隱含具而才閲恐急節之將差撫柔荑而不絶及夫陽烏浴彩寒雞早晨登粧臺而鸞鳳比翼對寶鏡而菡萏爭春桂裳馥以彩翠玉指皓以璘珣互飾鉛華畏濃淡之殊態共聽金管恐髙低之不均須臾饔正奉羞司樽舉酌左肴兮右胾兕觥兮玉爵朱題赩以垂虹素幕翩以騰鶴羅異果之芬芳映雕盤之錯落時也群工合奏絃悲管清升歌闋賔禮成於是乎􅳤鼉鼓啾鳳笙雲駢四坐花芬兩楹舞師巧誨於蹈戾疑作厲諧優飾辨以縱橫且曰不巾不擲匪鐸匪舌古也郅支之伎今也柘枝之名因清角之繁奏見韶華之並榮佳人乃整一作秀古抽字也金蟬收玉燕襲舞衫突舞辨珠彩熒煌鈐光炫轉外寶帶以連玉中丹裾而疊蒨則有鞶鑑逶迤瓊瑰四垂鞾瑞錦以雲匝袍蹙金而鴈攲將翺將翔惟鴛惟鴦稍隨緩節步出東廂始再拜以離立俄側身而相望思東南之美兮清風甚長凝情頃刻兮靜對鏗鏘再撫華裙巧襞修袂將勻玉顔若抗瓊珶懷要一作衆又作懷妙以盈心望深思而滿背彼工也以初奏迎我舞也以次旅呈乍折旋以赴節復宛約而含情突如其來翼爾而進每當節而必改乍慘舒而復振驚顧兮若嚴進退兮若慎或迎兮如流即避兮如吝傍睨兮如慵俯視兮如引風裊兮弱栁煙羃兮春松縹眇兮翔鳳婉轉兮遊龍相邇兮如借相逺兮如謝忽抗足而相跐復和容而若射勢雖窘於趨速態終守乎間暇飛飇忽旋鸞鶴聨翩撼帝子之瑤珮觸仙池之玉蓮擁驚波與急雪捲祥雲及瑞煙詞方重陳鼓亦再歇我舉袂以容曳忽吐音而清越一曲曲兮春恨深一聲聲兮邊思發傷心兮隴首秋雲斷腸兮戍樓孤月歌扇兮才斂鳴鼙兮更催將騰躍之激電赴迅疾之驚雷忽如厭乎揮霍戢餘勢以徘徊屹而立若雙鸞之窺石鏡専而望似孤雲之駐蓬萊輕攢翠蛾稍拂香汗暫爾安逸復騁陵亂抽軋軋於蕙心耀纎纎之玉腕躊躇曠望若戀虞以南馳俯僂回旋非為劉而左袒拾華衽以雙舉露輕裾之一半花灼灼鼓逢逢帽瑩隨蛇熠熠芝蘭之露裾翻莊蝶翩翩獵蕙之風來復來兮飛燕去復去兮驚鴻善睞睢盱偃師之招周妓輕軀動蕩蔡姬之讋齊公則有拂菻妖姿西河别部自與乎金石絲竹之聲成文乎雲韶咸夏之數然後能使燕趙慙妍威南威毛嬙古美婦人或改威為嬪非嬙掩嫮我之服也匪妹喜之牝雞我之容也匪木蘭之雄兔既多妙以多能亦再羞而再顧鼓絶而曲既終倐雲朝而雨暮鸜鵒舞賦以屈伸俯仰旁若無人為韻謝尚以小節不拘曲藝可俯或是可覩因無官韻改作俯願狎鴛鴦一作鸞之侣因為鸜鵒之舞於是褫貂裘岸章甫在容止可觀之際方見翼如當絃管互奏之時俄逞退旅伊昔王導延為上賓倍謁者讓登之處遇羣賢式燕之晨俎豆在列尊卑且倫始服膺於末席三字一作之末座方酬償於主人償一作賞導曰久慕德音衆皆傾想願覩傞傞之態用答嚶嚶之響非敢玩人以喪德庶使棲遲而偃仰徒欲見長觜利距之能豈比夫弋林釣渚之賞公乃正色洋洋若欲飛翔避席俯傴摳衣頡頏宛修襟而乍疑雌伏赴繁節而忽若鷹揚由是見多能之妙出萬舞之傍若乃三歎未終五音鏗作頷若燕而蹙頓德如毛而矍鑠衆客振衣而跂望滿堂擊節而稱樂且喤喤之奏未終而泄泄之容自若於是愧飲啄盡歡娛聽式歌而調兼吐鳳觀屢起而勢若將雛以樂慆憂既醉者於焉見矣手舞足蹈囅然者豈得而無是知因此名聞那辭迹屈同漁陽之慷慨鄙五原之噎鬱將美其率爾不矯怡然任真自動容於知己非受侮以求伸况乃意綽步蹲然後知鴻鵠之志不與俗態而同塵文苑英華卷七十九
