body:
  text: 文苑英華卷九百七十八宋李昉等編交舊一祭荆州刺史隂道方文一首祭處士仲長子光文一首祭劉少監文一首祭郝少保文一首祭陸郪縣文一首祭汾隂公文一首祭趙郎將文一首祭梁宣王文一首祭魯忠王文一首祭汝南王文一首祭杜學士審言文一首祭楊盈川文一首祭王城門文一首祭荆州刺史隂道方文魏收維太昌元年十二月庚申朔越十二日辛未友人巨鹿魏收謹以清酌少牢之饌敬祭于荆州刺史隂君之靈嗚呼哀哉惟君世載不殞英聲在兹風流有屬自爾𢎞之孝為行本忠實身基既言斯立罄禮窮詩器則清賞才惟英博於暢風雷蕭條丘壑顧言朝市忘懷淡薄比契沉冥均情寂寞往塵守官及爾同僚塤箎合韻琴瑟俱調丹墀踵武清道齊鑣跡淪間曠心共津濠乃眷平生相欣多趣殷勤宴喜流連辭賦溘矣不追長違世務詠歌徒在音徽空樹昔猶肢體與子裘裳今其往也生死殊方形骸何促天地何長申兹沃酹贈以哀傷嗚呼哀哉祭處士仲長子光文王績歲月日鄰人王績集作績謹以魚醴之奠敬祭仲長先生之靈曰明道若昧進道若退鳥飛知還龍亢必集作若悔嗟嗟夫子理融其內不忮不求無憎無愛古人有言微妙𤣥通藏用以密飬正以蒙嗟嗟夫子允執其集作厥中不見其始孰知其終蕩蕩心跡集作止足悠悠默語周覽人事退居河渚何去何從誰求集作棄誰與聊同聚散亦均寒暑大矣夫子其生若浮至矣夫子其死若休鄉黨不懼朋友集作友朋不憂素琴猶在黃經尚留老來難集作不婚梁鴻難偶筵無饋奠室無箕帚嗟嗟夫子豈圖其後金玉滿堂莫為之守集作道為之友凡我故人素服臨旃葛巾從窆桐棺以遷墳不易壠坎不及泉苟無怛疑作恆化于何問天道性既喪仁義鋒起祭非古也禮之為始吾從其俗敢告夫子清樽薄奠神其歆止為薛令作祭劉少監文楊炯中書令河東薛某謹以清酌中牢之奠敬祭故少監劉公之靈惟此陶唐有此冀方上天祚漢人神攸贊開國承家枝分葉散三貂赫赫於臺省駟馬諼諼於里閈德之有鄰吐符兮降神家之積慶受祿兮宜君星躔可以衝南越都邑可以貿集作質西秦言鄭公之不死謂張衡之後身雍州為積髙之地初登吏部尚書即㗋舌之端始拜郎官見天子而題柱侍明光而握蘭入麒麟之閣圖書掌於河洛測璇玉之璣造化窮於制作大風積也方絶於雲天有力負之生悲於溝壑嗚呼哀哉言念平生求其友聲適我願兮共得朋從之道又吾姨也俱承下嫁之榮良辰美景必窮於樂事茂林修竹每叶於髙情援茝蘭而無愧指金石以當行誰言倐忽遽隔幽明人非兮地是心折兮骨驚卜日兮先逺隂靈凝兮嵗將晚臨平郊兮望行幰君一去兮何時返石室兮沉沉蓬萊山兮寂又隂蒼烟漫兮紫苔深陳絮酒兮涕沾襟嗚呼哀哉詹事府官寮祭郝少保文前人少詹事鄧𤣥機永昌令令狐恩府司直王思善楊炯主簿鄭行該等謹以清酌庶饈之奠敬祭太子少保郝公之靈若夫星象降質山川受氣以道為尊以和為貴軒后夢之於大澤文王卜之於清渭實馮舟楫之功集作力必藉鹽梅之味昭昭北斗宫號文昌隱隱西掖池名鳯凰增萬機而恭政本定五字而對休光珥豐貂之韡韡識遺佩之鏘鏘懸車之歲方稱國老步輦之榮遂居師保劉蕃以光祿緝訓和嶠以尚書贊道百年方享於期頥五福兾徴於夀考西山訪藥北壁尋經金丹不化玉釡何成梁木斯壞曲池坐平府庭颯而變色寮屬慘而相驚嗚呼哀哉𤣥機等親聞教義夙承提奬懷德音之不忘痛丹壑之長往門館閴寂簾帷倣像奠行潦之蘋蘩庶明靈之降饗嗚呼哀哉為梓州官屬祭陸郪縣文前人維垂拱二年太嵗景戍正月壬寅朔二十二日癸亥長史劉某謹以清酌庶羞之奠敬祭陸明府之靈夫萬里之别猶使飲淚成血思德音之斷絶况百年之分能不憂心如薰想公子兮氛氲惟彼積德挺生夫君天垂白氣地發黃雲江則有沱集作泛是為國之紀君傳其政愛人如子山則有梁鎮集作國兹一方君𢎞其道視人如傷久勞于外路阻且長曽未朞月人之云亡嗚呼哀哉哀哀弱嗣朝暮一嗌皎皎孀妻饋乎下室蜀門如劔長安如日歸路何從我心如集作之疾嗚呼哀哉凡我在位羈官邊城共戮力兮誰言死生思其人兮造其庭恍無見兮寂無聲稱觴兮酹酒心折兮骨驚嗚呼哀哉祭汾隂公文前人維大唐光宅之元祀太嵗甲申冬十有二月戊寅朔丁亥御辰楊炯以柔毛清酒集作酌之奠敢昭告于故中書令汾隂公之靈靈字集作貴神嗚呼哀哉惟公含純德而載誕兮禀元精而秀出集作特秀非備百行而立身兮半千年而委質屬天地之貞觀兮逄聖人之得一若䕫龍稷卨之寅集作翊亮舜朝兮若蕭曹魏邴之謀猷漢室懸大名於宇宙兮立大勳於輔弼如何斯人而有斯疾曽未遐壽中年殯疑作殞卒嗚呼哀哉若夫家傳寶鼎地闢金溝文則屬詞而比事兮學則八索而九丘入則東藩之上相兮出則南面之諸侯集作通唯盡善兮未善固雖休而勿休既知退而知進兮亦能剛而能柔大才則九功惟叙兮大智則萬物潜周崇德廣業兮樂天知命而不憂嗚呼哀哉門館虛兮寂寞嵗窮隂兮搖落備物儼兮以集作如存光靈眇兮焉託垂繐帷與祖帳兮罷歌臺與舞閣天子惜其毗余兮羣臣思其可作嗚呼哀哉俯循兮弱齡叨襲兮簮纓公夕拜之時也既齒跡於渠閣公春華之日也又陪逰於層集作郡城恭兩宫而承顧盻兮厯二紀而洽恩榮郭有道之青集作題目兮蔡中郎之下迎倐焉今古非復平生無德不報兮願摩頂而至足有生必死兮空飲恨而吞聲天慘慘兮氣冥冥月窮紀兮日上丁籍白茅兮無咎和黍稷兮非馨嗚呼哀哉為李總管祭趙郎將文駱賔王姚州道大總管李義祭趙郎將之靈惟靈降精辰象委質昌期棄筆文場早狥封侯之志彯纓武帳坐升戎秩之榮屬須補挻祅集作妖昆池集作明習戰應星文而動將奉天罰以揚威不能𢎞廟算於五集作四戎叶神謀於九變致使集作令王師失律凶狡憑陵嶲亢南臨同五溪之深入卭關北阻類雙崤之不歸亭候多虞故有負於明代春秋責帥豈無愧於幽途悲夫任賢與能明君之事也陳力就列忠臣之義也郎將雖見危授命固誠節之有餘臨難圖集作權機何智謀之不足嗚呼哀哉義猥以散才謬專分閫途經夷落路踐戎場停疲驂於九泉悲來有地痛遺骸於四野泣下無從暫輟征旅之勤爰崇掩骼之義庶幽靈有托梧丘息入夢之魂壯士不還薤露起送終之曲嗚呼哀哉九真邊徼萬里長安城危疏勒山峻臯蘭因原為隴即壤成棺夕隂低而平蕪晦秋風急而荒戌寒嗚呼哀哉異域幽埏但見新栽松柏他鄉古木非復舊邑枌榆感平生其若集作斯在聊申絮酒儻聰明之不昧式集作或薦單集作簞醪為宗尚書祭梁宣王文宋之問維大唐景龍元年嵗次丁未十月乙未朔四日戊戌兵部尚書宗楚客弟將作大匠秦客等謹以清酌庶羞之奠致祭于梁宣王之靈惟王神嶽降靈英姿濟代在周錫梁社之寵翊唐有代邸之勳不謂業在必安而釁生非意賊臣結黨大集作奔黷宸闈逆子弄兵輊集作讒誣懿戚密謀奉主惟以國家為心飛集作非禍及門翻令父子併命九重軫念悼舟楫之堙沒百辟興嗟愴衣冠之殄悴楚客等早承輝眄夙忝集作奉娛逰姻屬謬接於葭莩兄弟竊方於鴈集作橘序叨列五等同事兩朝昔以髙義銘心今猶德音在耳嚴慈永往伯季凋零友睦申於長昧成立冀於猶子而家不悔禍俱斃仇人集作讐入私庭而痛深過王門而悲極竹池舊賞看鴈鶩之猶歸蒿里新歌恨天人之永逝嗚呼哀哉九原撰日萬古營魂士集作人悲髙駕帝慟津門殯疑作殞賢輔而星圻一作折非害良臣而霧昏想平生之如此集作在庶髣佛於斯樽尚饗為宗尚書兄弟祭魯忠王文前人維景龍二年嵗次戊申月日兵部尚書楚客弟將作大匠秦客等謹以清酌之奠敢昭告于魯忠王之靈惟王寶鼎因地瑶林肅某作蔽天靈資海嶽質冠神仙德潤猶雨機清若泉不孤大造翻摧少集作小年百身豈贖四序云變慈軫玉扆悲盈金殿令德彌秀徽容難見悼前歲之今日共銜酸於隙電錦鸞失偶臺鳯悲隻玳席賔空金鄉戶閴徑不踐兮苔紫庭不逰兮草碧敢申賦於童眇痛平生之姻戚嗚呼哀哉雁池送夏馬埓迎秋露白天净雲低隴愁恨名王之淪枉悲促運之浮休蓄哀思而成泣慿聰明而致羞小山一平兮多桂樹故人雖在兮罷蘭逰心追往而將絶淚橫目兮集作而難收嗚呼哀哉尚饗為常特進已下祭汝南王文前人維大唐景龍二年歲次戊申月日某官某等謹以清酌之奠祭祭字集作敢昭告于汝南王之靈相門踵德王實挺生天資溫克神與聰明人稱玉樹我嗣金籯芝庭欲秀桂林將逐惟彼鴈堂集作黨墜兹鴻陸魅奪精氣墳迷草集作卉木漢皇纂籙周母參功夷夏集作憂昭洗幽明感通九魂見日一葉隨風孝極先妃丹旐前歸慈殷諸季素旐集作旒相次楚氓啜泣秦人下淚荆分自久棣落無餘悲炎海之下制惟集作懷觀津之上書鳶忌南而跕水鴈愛北而隨車嗚呼凡在枝戚銜恩極遍寵賁濯龍榮同化燕獨傷元子𡨕寞無見玉宸下感金屋增悲珠亡禍速沙崩慶遲緑車為贈黃泉各集作永思官舍攸止先塋甫託齊國返葬隨原可作靈之歸來無惑甌駱尚饗祭杜學士審言文前人維大唐景龍二年歲次戊申月日考功員外郎宋之問謹以清酌之奠敬祭于故修文館學士杜君之靈嗚呼位曰大集作天寶才曰天爵辭集作鮮業備而官成名集作多聲髙而命薄屈原不終於楚相揚雄自投於漢閣代生人而豈無人違代而咸若運鍾唐虞崇文寵儒國求至寶家獻靈珠後俊二字集作復有王楊盧駱繼之以子跡集作躍雲衢王也集作服才參卿於西陜楊也終逺宰於東吳盧則哀其栖山而卧疾駱則不能保族而全軀由運然也莫集作聊以福夀自衛將神忌也不得華實斯俱惟靈昭昭度越諸子言必得俊意常通理其含潤也若和風欲曙搖露氣于春林其秉艷也似凉雨半晴懸日光集作足於秋水衆轍同遵者擯落羣心不際者探擬人也不幸而則亡名兮可大而不死君集作靈之栖遑自昔迷方逢時泰兮欲逹聞數竒兮自傷屬文母之丕運應才子之明揚援淪秀於蘭畹侍逰仙於柏梁命以著作拜之為郎始翔鴛於清列旋禦魅於炎荒遺旅鴈兮超彭蠡作編人兮居越裳集作常殊許靖之新適憶虞翻之舊鄉惟皇龍興冉施法度拂洗溟渤騫集作鶱翔雨露通籍於八舍禁門搖筆于萬年芳樹仰赤墀兮非逺謂白首兮方遇君病何病到此彌留藥雖集作勤餌兮寧愈針不及兮可憂雖則妙醫莫識實兾明神獲瘳嗚呼哀哉君集作靈下三字同之將亡其言也善余向十旬日或冉展君感斯意贈言宛轉識金石之契密悔文章之交淺命子誡妻既懇且辨自豫集作僕也與君弱歲逰執文翰共許風露集作霞相浥况窮海兮同竄復文房兮並入川流遽閲隙電初過昔乘運兮如此今造𡨕兮若何懷君疇昔集作好兮恨已積念君恩惠集作近惠兮情倍多道之南宅囷之東粟使君孤之有餘寧我家之不足籍籍流議喧喧薄俗名全每困於鑠金身沒誰恨其埋玉空落長松千尺詎置生芻一束倬彼韋公贈殷禮縟善乎崔子理感情屬相識有素見覽集作賢增朂登君詞賦於雲臺之上藏君齒髮於緱山之曲緱氏山兮山上雲秦城郊兮郊外墳孟冬十日兮共歸君集作送夫君君集作靈下同有靈兮聞不聞我咀瑶屑君知自久坐泣焚芝遙哀畫桞闕視集作親祖載爰集作愛非遺集作遣非巵酒願歆悲誠將告良友尚饗祭楊盈川文前人維大周某年月日西河宋某謹以清酌脯羞之奠敬祭于楊子之靈曰自古皆死不朽者文北河吐集作流液西嶽生靈集作吐雲爰叶集作叶神通氣降精于君伏道孔門遊刃諸子精微博識黃中通理屬詞比事宗經匠史玉璞金渾風搖雲起聞人之善若任諸已受人之恩許之以死惟子堅剛氣陵秋霜行不苟合言不苟忘大君有命徴子文房余亦叨沗隨君頡頏同趨北禁并拜東堂志事俱得形骸兩忘載罹寒暑貧病洛陽裘馬同弊老幼均糧自君出宰南浮江海余嘗苦饑今日猶在之子妙年香名早傳從來金馬夙昔崇賢門庭若市翰墨如泉千載之後聞而凛然死而不忘問余何傷傷余命薄益州零落生平集作平生之言幽顯相託痛君不嗣匪我孤諾君有兄弟同心異體陟岡增哀歸葬以禮旅櫬飄零于洛之汀我之懷矣感歎入𡨕見子之弟類子之形悼往心絶慰存涕盈古人有言一死一生昔子集作之往矣追送傾城今子來也乃知交情惟郭是戚有崔不易來哭來祭哀文在席惟席可集作何依氷雪四滿家人哀哀賔徑微斷今我傷悲情勤昔時子文子翰我緘我持子宅子兆我營我思子有神鍳我言不欺我有絮酒子其歆之我亦引滿儻昭神期魂兮歸來聞余此詞祭王城門文前人維長安二年嵗次月日司禮主簿宋某謹以清酌之奠敬祭于故宫尹丞太原王君之靈惟靈顯考抗志恬漠九辟奚顧一丘自樂行儀集作擬巢由言重許郭粵我先人比德同道理閫探索詞源論討翰墨具存有真有草古人至集作之言朋友世親王氏兄弟既義集作禮且仁撫我則厚莫殊天倫粵我幼䝉哀纒岵屺急難相顧若出諸已聞過必針見善斯喜盛德之後昔聞其昌之子壯年朱紱始光賀者在門哭者在堂慰君之兄撫君之子郭門祖祭平生已矣問天何言閉恨泉裏嗚呼哀哉尚饗文苑英華卷九百七十八
