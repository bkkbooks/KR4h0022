body:
  text: 文苑英華卷七百五十七宋李昉等編史論四三良論一首張辟強論一首晉文公不合取陽樊論一首漢斬丁公論一首周昌相趙王論一首秦穆公諡繆論一首鄼文終侯論一首荀息論一首崔烈論一首石碏論一首三良論李德裕秦穆之殺三良詩人刺之矣春秋譏之矣今不復議唯三良許之以死而前代無議何也且臣道莫顯於咎繇孝友莫盛於周公咎繇尚不殉於舜禹二后周公尚不殉於文武二王三良詎可許之死乎如三良者所謂殉榮樂也非所謂殉仁義也可與梁丘據安陵君同譏矣焉得謂之百夫特哉昔荀息許晉獻一集作以言繼之以死君子猶歎斯言之玷不可為也豈得以生同榮樂死共埃塵以為忠也集作乎晏平仲言君為社稷死則死之斯言得之矣自周漢迄于巨唐殺身成仁代有髦傑莫不顯一身之義烈未有繫一國之存亡唯紀信乘黃屋以誑蜀作詐楚赴丹焰而存漢數千年間一人而已漢祚四百由集作猶此而興余謂漢祖封建紀氏宜在曹蕭之上報德未稱良可悲也張辟強論揚子美辟強之覺陳平非也若以童子膚敏善揣吕后之情竒之可也若以為反道合權以安社稷可謂不甚悖哉授兵産祿幾危劉氏皆因辟強啓之嚮使留侯尚在集作存必執戈逐之將為戮矣觀漢髙集作髙祖遺言吕后制其大事可為謀無遺䇿矣以王陵有廷諍之節置以為相謂周勃堪寄託之任令本兵柄況外有齊楚淮南盤石之固內有朱虛東牟肺腑之親是時産祿皆匹夫耳吕后雖心不在哀將相何必危懼必當憂傷不食自促其夀豈能為將相之害哉漢髙祖曰非劉氏而王者天下共擊之此慮屬在吕宗矣何可背之厥年稱制八年産祿之封殖文粹作植固矣若平勃二人溘先朝露則劉氏之業必歸吕宗及吕后之殁劫酈商以紿吕祿計亦窘矣周勃雖入北軍尚不敢公蜀本作訟言誅諸吕豈不艱哉賴産祿皆徒𨽻之人非英傑之士儻才出於世豈受其紿説哉嗟乎與其圖之於難豈若制之於易由是而言平勃用辟強之計斯為謬矣留侯破産以報韓結客以徂文粹作沮非秦招四皓以安太子所為必仗義居正由此知不尚權譎明矣晉文公不合取陽樊論皮日休三代之賞臣下以爵不以位以名不以器逮夫後世君弱臣侈撥去古法能立一功者先伺君地焉能立一勳者先窺君器焉由是於魯有三桓於齊有田常於楚有白公是賞過有僣生焉甚者奪主其集作從來尚矣且姬之列侯守其本封勝其上集作主爵賜集作錫之以斧鉞分之以鍾彛休戚其民生殺於國其貴已極矣遇天下無事則行其德化奉其貢職居則待乎巡狩行則赴於會同遇天下有事則申之以鐘鼓行之以征伐上以定王室下以正諸侯真侯伯之職業也是常節也茍天子有錫宜以德讓之豈當更受其地也茍讓不獲聽受之者其爵可也謂文天子命晉為侯伯其器可也謂周天子享晉文侯秬鬯圭瓉且天子之地方千里不千里則不足以待諸侯諸侯之地既侵天子之甸由削枝者必及乎幹剸肉者必至乎骨何者勢使之然也如晉文既定襄王于郟鄏王勞之以地謂陽樊茅溫原攢田陽人不服陽樊大邑在畿內晉侯圍之乃辱其宗祊苦其人民虐其甥舅嗚呼其亦不仁矣是晉文雖有入天子之功而有陵天子之威也當王之賜宜讓曰臣重耳以渺渺之德處專征之任遇翟寇肆虐天王少違宗祏集作廟臣敢興下國之師殺凶臣定王室乃臣之常也不足賞也茍天王特念小伐不置諸刑列唐叔之祚獲臣有奉為賞厚矣茍為畿內之地為臣之邑是上濫其賜下僣其受也雖天王之薦寵臣其若宗廟之靈百姓之心後世之罪何而晉文曽不是讓又請隧焉豈內輕衰周之陵遲外恃諸侯之強盛而為邪殊不知周王之尚守乎典禮也謂請隧不許且王曰昔我先王之有天下也規方千集作萬非里焉以為甸服以供上帝山川百神之祀以備百姓兆民之用已王周襄王之言且王之所錫集作賜田皆在周甸也王明知在甸內與乎晉者是力不足集作能制晉也如力足制晉肯以規方千里之內地與夫諸侯哉是王之語晉侯以規方千里者譏其受地也文公不悟卒而受之嗚呼文公之霸也有召君之譏請隧之僣不為甚矣甚者在陽樊也漢斬丁公論忠之為稱也非委身事人五字文粹集本作蓋欲委身以事主不以猜誤二其心不以辨説二其心不以疑懼二其心者乎集作也上有過諍於公不揚名於私豈猜誤之足入乎上有忌逾乎進不逾乎退豈辨説之足入乎上有間去聲懼乎心不懼乎事豈疑懼之足入乎夫茍祿怯生而仕者上有過言未省集作息而懼乎誅諌未再而去乎位自以得古人三諌不從之義然幸其生貪其祿是猜誤而二其心者也上有忌必姦于心機媚于聲氣不思已之不聰而謂上之受謗不思道有未可而謂辨之足從辨之足去四字集作必文粹作不從辨而去是辨説而二其心者也上有問必佞彼愛取乎厚也必諂彼幸求其捨也有愛不可佞幸不可諂即茍而已矣是疑懼而二其心者也嗚呼劉項之作也淮隂不以猜誤而去項乎曲逆不以辨説而去項乎淮南不以疑懼而去項乎去彼而就此果竭忠集作謂乎果謂不忠乎是利則存不利則亡者也則丁公臨敵無殺誠惻隱之心者也豈有猜誤辨説疑懼者邪有利則存不利必亡者邪與其不忠則彼三侯者謂淮隂侯淮南王曲逆侯是也未可免鼎鑊之誅刀鋸之刑也是髙祖斬之果不為當噫漢之初立未為無人當固集作丁公就刑未聞有一言而戾者將固之命邪集作也悲矣周昌相趙王論夫剛柔之分在乎性得失之機繫乎用茍剛暴則勝柔柔久則勝剛物之常理也或用之以剛處柔以柔處剛其機必得矣如以剛處剛以柔處柔其機必失矣周昌之性剛也吕后之性剛也漢髙以百嵗後以趙王如意為憂故輟昌相趙嗚呼漢髙之意非逞志於一時納慮於一諌而相昌乎不然何其用之失也如以昌之剛足固趙國則趙王之兵甲能當漢乎是不可一也如以昌之剛足固趙王則吕后之徴王特一郵夫之力耳足不可二也如以昌之節足以存趙不過乎死死則趙王就徴耳是不可三也卒使百嵗之後如意寃戮周昌憤死惜哉漢祖未崩前以周勃統南軍以昌領北軍以陳平為謀主則吕后之命集作令産祿之謀不能當大難而不回秉大節而不墜者也茍使握軍政執相權昌必能之奈何誤用秦穆公諡繆論聖人務安民不先置不仁以見其仁焉不先用不德以見其德焉茍如是是見危者巳墜而欲援觀鬬者將死而方救噫其亦不仁矣以髙辛之仁化用一摯摯之不善天下之民捕堯以為君以唐堯之仁化用一鯀鯀之不績天下之民譟禹以為功夫如是摯之與鯀是髙辛唐堯誠用之也非先置也推其誠而用之人民尚倍之如是況先置者耶當晉獻驪姬之亂後奚齊卓子之死餘重耳在翟夷吾居秦以秦穆之力制翟而安晉其能必矣夫重耳之賢也天下知之又其從也皆足以相人國趙襄顛頡舅犯之謂如先立之必能誅亂公子去暴大夫翼德於成周宣化於汾晉而穆公反集作乃取公子縶之言謂公子縶曰君若求置晉君以成天下之名則不如先置不仁者以滑其中也乃置先夷吾是為惠公公之入也背內外之賂謂許里克以汾陽文粹作晉之田百萬丕鄭負蔡之田七十萬許公子縶河外列城五黃金三十鎰白玉珩六雙誅本立之臣惠王二年春殺里克秋殺丕鄭是也蒸先父之室謂惠公蒸於獻公夫人賈君是也故生民興誦謂輿人誦曰佞之不佞果喪其田是也死者無報謂惠公即位改葬恭世子而魄於外也卒身獲于秦公以九月獲十月歸而子殺於文粹作于晉謂十五年文粹作三年惠公卒懷公立秦乃召重耳於楚而納之晉人殺懷公於髙梁是也嗚呼致是也非晉人之罪抑秦人之罪耶集作也夫摯立八年不善而去鯀用三載弗績而誅況晉惠公之在位作宗廟之蠧蝎為社稷之稂莠一立十五年其為害也大矣今之學者以秦穆為繆尚疑其諡得斯文也可以諡繆為定鄼文終侯論羅隱沛后既得秦蕭何改秦之法故三章之約焉而何竟自汙者豈非欲刑一作型其德於萬代乎不然奚繫之在人先也且漢之功臣何居第一何不首行其法則後之立功為相者雖貪瀆規弄而法必不加則亂臣賊子於是闕何之法不救當時而豈救後代乎荀息論牛希濟晉獻公子九人聽驪姬之譛也太子申生縊于新城重耳奔蒲夷吾奔屈盡逐羣公子唯姬之子奚齊及其姊之子卓子留於宫公疾病召荀息將使立奚齊荀息曰臣竭盡股肱之力加之以忠貞不濟則以死繼之公曰何為忠貞對曰公家之利知無不為忠也送往事居耦俱無猜貞也公薨荀息立奚齊里克使人殺之喪次荀息將死之人曰無益也不如立卓子于朝荀息又立之里克曰三怨將作秦晉輔之子將何如荀息曰吾與先君言矣我欲復言然為一作謂人已乎里克殺卓子于朝荀息死之丘明褒之曰詩人有言曰白圭之玷尚可磨也斯言之玷不可為也以荀息有復言重諾之義夫荀息晉國之大夫為執政之臣顧命以立其君人能殺之已不能討之是偷於國再立卓子以偷其安里克之告又不得誅以害其主雖曰復言何歎之有且獻公以荀息為執政也以荀息為能賢也而囑之二子今二子無辜而死是荀息之不賢所致其無乃辜先君之托孤之寄乎且巳以大夫也不宜從君於昏而立幼稚知諸子之賢不能立之以利於晉為國家長世之計乎此疑周於姬氏之黨乃嬖之疑衍寵之黨也立二君而不能定其位縱其賊以致亂於其國若亡之黨不可以立乎非巳智力之能全也其輕許之乎是輕之言而許之是貪其位而固其權復言以死之子其不死人以誅之於子矣大國之力不能保其身知賊不討不可謂之忠縱具疑作其為虐不可謂之貞事嬖寵幼弱之子逺霸王賢哲之君耦俱無猜其若是乎若羣盜力爭不能計勝而死猶將賢之若不能討賊無謀自殞將何以尚之哉匹夫匹婦死於溝壑者無以異之凡顧命受遺之日擇長輔少之道非伊周之才智且將不濟豈荀息所能也是以憲宗彌留之日內外疑恐姦邪之人畏蓋一無蓋字之明復誅其黨有來中盡與裴晉公語及大政者公勃言曰當問大臣此非中殿事告者遽退杜黃裳時為庶子亦以王佩繫上陽周一作問問太子安否及臨慰勸之曰冡宰大臣前揭喪中覩天顔哀毁之狀莫不相顧而泣又喜萬國之得主也即深謀逺慮於防微之道如是之備及後國家以副君之命必有社稷之難遺詔擇立以為之常蓋不由大臣之謀始也皆左右近密建議奉迎位既及定乃命百辟以行大禮始謀之臣即新君受賜之地遷之重權委以大政南北二軍歸其肘腋九城之禁由其管鑰若明然公議者尚可知其諌主及後誅戮嗣王之英武者或擇幼沖之可教者其議立之父輪告不實之狀循環署其名民間謂之車轂狀官者謂之金輪圖常有請趙公同署名者公歔欷流涕不忍執筆其子曰事既行矣禍不可變一家三百口在於今日大人何疑之有請筆代署時宦官畏大臣不從必興誅戮當動搖天下及見其名莫不喜恱由是驟命其子以居清列終致權歸疑閹豎傾覆宗社皆趙公之所為也或曰趙公之生也由不如荀息之能盡其生也生之與死皆亂國者何升降之有二子者可謂異代而同罪丘明之褒不其謬歟崔烈論漢室中葉戎狄侵軼之患邉郡略無寧嵗兵連禍積歷世不已天下以困國用不足𣙜酤租算之外方許民間竭産助國出金贖罪貨鏹以為郎以為經世之術救弊之務逮至桓靈之世天子要之百萬然後用為三公崔烈常以賄求備位於公輔問其子外以我為何如對以銅臭之説垂於前史然近之其疑人主無桓靈之僻自咸通之後上自宰輔以取方鎮下至牧伯縣令皆以賂取故中官以宰相為時貨宰輔以牧守為時貨銓注以縣令為時貨宰相若干萬繩刺史若干千繩令若干百繩皆聲言於市井之人更相借貸以成其求持權居任之日若有所求足其欲信又倍於科矣爭圖之者仍以多為愈彼以十萬我以二十萬彼以二十萬我以三十萬自宰邑用賄之法爭相上下復結駟連騎而往觀其堆積之所然後命官權幸之門明如交易夫三公宰相坐而論道平治四海調燮隂陽為造化之主方鎮牧伯天子藩屏以固宗廟社稷之重刺史縣令為生民教化之首率皆如是不亡何待度其心而聞其謀即皆販婦之行一錢之出希十錢之入十萬者望二十萬之獲三十萬者圖六十萬之報盡生民髮與骨髓尚未足以厭其求漢之亡也人主為之國家之禍也權幸為之或曰兆其釁者崔氏之子為不朽之罪人乎武帝開之於前桓靈成之於後以至今日鍾疑作踵而行之而已且烈之世不聞教子以義方不能遺子孫以清白多藏若是俸祿之所獲乎不及於昆弟親戚矣不施於鄰里鄉黨矣其賄賂得之乎今日用之以逺疑不亦是乎且桓靈之世家諜且曰烈為相矣不如是則羣道疑作盜之所奪乃積之者過非用之者罪也被髮而祭於河左傳作野者辛有知其必戎作俑者其無後乎仲尼懼其徇葬蓋知防其漸之日也明明天子許而行之何罪之有崔子素無異聞貪榮固利者小人之常也不施於親戚自圖於爵位者亦小人之常也何足加其罪有國家者不以仁義而務財利之道許而行之斯不可矣不許而自行之而不能知之又不可矣是亦覆國家者不亦過乎石碏論衛莊公寵州吁也且又縱之石碏諌曰臣聞愛子教以義方弗納於邪驕奢淫佚所自邪也四者之來寵祿過也君若與之即將定若猶未也後將悔公不聽州吁竟殺其君而自立石碏之子厚與州吁逰禁之不可春秋之世有弒君之子或朝於王預諸侯之盟不復加討是以厚問定君於石子曰王覲為可曰何以得覲曰陳桓公方寵於王若朝陳使請必可得也厚從州吁如陳石碏使告於陳曰衛國𥚹小老夫耄矣此二人者實弒寡君敢即圖之陳人執州吁于濮石碏使其宰獳羊肩蒞殺石厚於陳君子曰石碏純臣也愛其君而厚預焉大義滅親其是之謂乎父子之道天性也君臣之道人一有之字義也石子諌莊公也以義方教子一作令厚之為也無義方之訓哉且厚非弒君之謀為亂之首州吁既立仍從之逰州吁之為君也命石子逰必將從之況於厚乎已為大臣國有亂賊而不能討之忘其君也父子相欺以成殘忍之計是忘其親也為臣不忠為父不慈將使衛國之人父子相爭屠矣是以先見之明知州吁之必能為亂也當戮力以除之豈止一諌而已哉知石厚必從惡也當嚴毅以討之無使必陷於戮不能救亂以安其國不能謀君以全其子莊公之亡也州吁之戮也石厚之死也皆石子忍闕況其君乎或曰周公之誅二叔聖人之教也日磾之棄愛子賢人之事也若不如是將何以止於亂乎夫周公知二叔之心不利於成王必危於宗廟故先除之以保天子之尊以安大本豈若石子弒莊公而後欺而誅之日磾怒其子與宫人戲蓋防淫亂之本以靜於國石子成其亂而誅之必不使從篡之黨而後誅之也然周公聖人也日磾賢人也知其必至於亂皆不得已而行之且周公日磾防其亂而先誅之以靜於國石子成其亂而誅之無益於理反為相欺之計殘忍之行無父子之慈滅天倫之道且厚能問其父以定君之計是知是非理亂之理也是尊父子之道無疑父之心也疑父之心逆天之道也今乃欺之令朝於陳以行誅計斯人心之熟忍之矣不若告其子以理且曰州吁為子弒其父為臣弒其君也天地所不容者人之子不可與之為伍也是以吾禁子之逰且吾為大臣欲誅弒君之賊以報其國不討其賊是吾有殺君罪也能使州吁朝陳且勿往我將報之石厚尚能求計於其父豈必陷父於惡若然者可以保其子全父子君臣之道矣今石碏以殘忍之性亂君臣父子之理以安其身以求其名而曰大義滅親為罪莫大於亂國不孝莫大於絶嗣今石子亂其國而殺其子矣及後樂羊為魏將伐中山中山殺其子而遺之一杯羮樂羊坐於幕下食之以盡乃拔中山文侯賞其功而疑其心貪其功忘骨肉之痛蓋石子之流也屈突通當隋室之亂未從王師太宗使其子召之通反弓射之曰昔與汝為父子今與汝為仇讐既而捨弓矢於地再拜號泣以别隋后曰臣智力俱困非敢負陛下也然後來歸此又能全君臣父子之道也且能殘其子為仁義之人者未之有也為仁義之人能殘害其子者亦未之有也丘明修千載王化之文欲開父子相疑之心親親相滅之理大非聖人之心乎文苑英華卷七百五十七
