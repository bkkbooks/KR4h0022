body:
  text: 文苑英華卷六十四宋李昉等編軍旅一出師賦三首大閲賦二首飲至賦二首旗賦一首靈旗賦一首太史奉靈旗指蔡賦一首擊柝賦一首出師賦并序趙子卿古之王者出師有征無戰然則兵革之事聖人是興蓋所以威不軌而昭文德也帝乃一作庸欽若堯禹承天運行鮮卑在圖夜郎無外而旄頭賊醜忘道弄邊河浸海寒障路幽朔皇赫斯怒親師用征搖星纛神召募雄合白羽森月朱旗爛空俾夫翕東海之焱波掃北荒之沙雪國用長䇿人忘暫勞聊勝詠歌取思而賦賦曰莫髙匪天兮生我聖人聰明運用兮不測惟神恩澤洪融覆幬彌淳噴窮陸霈無垠珍怪烟委而波屬蠻夷鳥狎而蟲馴粵若鬼方兮獫狁孔狡固隂沍寒兮陵我河津於是按玉劍而慿怒耀金戈而雷震禡蚩尤誓勾陳㑹白帝騎蒼驎天動地應羅羽衛而煌煌風咆雲鬭作笳鼓之殷殷别有哮悍之旅毅勇之賔爰自幽并而投石走巴楚而來臻鐵馬金甲虹旌電輪鳴弦者飛鴈由其殞越揮戈者白日所以逡巡國體兵勢殊容共身既出師於鄠杜亦獵虜於新秦野氣蒼茫而助殺軍聲慷慨以含仁奮威則鯨鯢忉疑釁流詠則梟獍懷親大荒搖落知單于之魄死層氷泮渙感天子之情春昆彚雜種于何不臣寧直誇胡而北省亦當撫柔於叢榛海岱攸類匪兵是遵固將歷三五而髙視豈與夫費百萬於同勤第二并序趙伯勵先天年即是元年獫狁孔熾動搖邊陲是以我國家有事於沙漠也徵甲選徒星馳雲集楚劍霜利吳鈎月懸將以驅日逐之首斬天驕之族蓋使烽埤無火亭障息肩大矣哉自古出師未有若斯之盛者藉雖不敏敢述賦云赫哉帝唐葉殷纍聖光明乾道洗清邦政德所以和懷四夷教所以平章百姓用能盡奄有於天下得樂推於羣黎鳯符以謳歌而適龍厯以揖讓而躋既神化之無外何鬼方之獨迷若乃皇赫斯怒元戎是出其制敵也以威其用師也以律雕戈電舉鐵騎風疾霜明鋒刃夕曜曜以衝星火色旌旗晝炎炎以篲日橫行有同於千里止步不過于六七桓桓大將黃石老之兵符赳赳武夫白猿公之劍術謀無再陳其來若神攻則必取諒資於武既作氣以鼓行受脤者實在乎國英雖假靈於廟算决勝者亦關於天斷固將以拒十角之猖狂豈止掃一隅之陵亂然後作寰宇之清謐成皇王之壯觀别有其儀不忒詩書是則鱗翮初就將騰躍於風波冠劍末從尚棲遑一作遲於翰墨願髙闕之氣殄佇燕然之銘勒優哉悠哉小臣髙歌帝德第三梁獻聖人乘時兮里社鳴聖人御㝢兮天下平百姓日用而不盡四方風動而化行外鎮武將內羅羣英既居尊以體道思順文而偃兵何朔塞之不靖尚居邊而屢驚皇赫斯怒授鉞四七告厯登壇選時習吉流紫泥之明誥開黃石之祕術旌旗翩翻而篲雲刀劍燦爛而含日望𤣥塞而徐邁度青門而􅒯出天子乃整師旅振威德班列品類巾拂輈勒雜沓參差駢闐逼側隱隱軫軫鏘鏘翼翼鋭兵含氣武士作色後殿未出於朝廷前驅已羅乎郊國大哉聖主乘時而撫內修恩德于以廣文外整兵戈于以克武設魚麗布鵝鸛良將徑卒威武剛斷欲使凶渠斬首豺狼懾竄一勞而逸永清疆畔爾其有征無戰縑緗所陳兵不可恃惟道是親昔周君有敵雖戎衣一解而夏禹將戰反修德七旬前君尚以行化而感迷悛况我皇上聖德通神别有窮途下客流落羈栖書劍不用山川幾迷失路空歎亨衢未躋幸逢明聖觸類歸正既懷投筆之用希遇封侯之聘大閲賦以國崇武備明習順時為韻失名惟聖有作含靈大庇萬邦以平羣動咸遂輸瑜景集削祍麏至猶且修干羽除戎器懿文德恢武備大閲之禮所謂簡車徒謀元帥以虞以度習無不利故冬令有典夏官是司尚黑服建黑旗各率屬以于往昭用衆之在兹擇元辰於仲月得剛日於斯時然後萊田立表斬牲狥陳斾游旌控髙靷百其勇倍其信駢馳翼驅旅退旅進鉦鐸鐲鐃之數物有攸施坐作疾徐之節教無不順咸以律而自勉諒匪髙而匪吝才實天生用猶日愼遵蘭防而合禮罷艽野而作鎮邊陲削平天下文明遂以畋而以狩知足食而足兵戎士趫夫呈才逞武將攖戾以雄入顧振旅而盡取公之私之有倫有矩崇七德之豐禁邁三驅而誇詡豈惟兆於熊羆固乃除於䝟貐暨乎整衆而入軍容翕習厖聒騰驤天動地岌亦取睽而致用誡猶火之不戢惟皇建中昭明有融止戈為則垂衣是崇混車書於無外尚何施於一戎别有明試疇庸舉惟慙德徵於二柄或不爽於為邦形於一言庶無忝於觀國第二同前韻胡瑱乾坤設象帝出乎震文經邦而遐邇安武禦寇而上下順厥二道之可久同五材而皆進故軒轅出涿鹿之戰顓頊列共工之陳足以克定禍亂天祿永終雖八荒有截而七德是崇若乃𤣥冥用事律變冬中胡地馬肥寧控弦而習戰漢家農隙且講事而威戎於是簡車徒命將帥崇文物設武備旌旗裔裔而風飛士馬囂囂而雲萃竟澤彌谷殷天動地銜枚無聲擊鼓作氣雕弓月滿寶刀霜利申前驅誅後至為三表而有節歷千古而不墜者也爾其兵勢崩騰軍容翕習𤣥甲鱗布長戈嶽立虞人萊野羣吏作旗事著六職禮分四時可以順少長匡邦國匪盤匪逰有典有則是時也長楊草落鄠杜霜明既不虞而作式亦因狩而治兵大田獲之以三品和門樹之以兩旌抱木之猿見矯矢而遙泣傷弦之鴈聞虛弓而已驚且夫設席張幕蒙盾負羽獸之大小既公私而殊獲野之險易亦人車而各主豈即鹿而無虞誠獻禽而後取此非以田獵縱天下之極觀亦因之簡衆而習武飲至賦以破敵有功為韻李子卿皇矣聖主賢哉良佐廟謨克諧武烈斯播鑿門而上將初出屈指而西戎已破既執訊而獲俘遂䇿勳而類課覩沙漠之旗偃見邊庭之鼓卧蓋所以示王師之有征識天兵之不挫者矣振旅而還軍容畢覿其出也諧六月之功其入也叶三年之績庭實既備皇歡是式醉百壺而軍聲愷康獻萬夀而喜氣綿羃茂勳彰於㝢縣盛禮陳於宗祏知我功之不宰知我武之無敵六師於是乎張皇百蠻於是乎怵惕然後勇爵髙設元功克受搴旗斬將者其錫蕃攻城拓土者其賞厚築京觀而無謂疑銘鼎彛而可久蒲海長清胸奴已聞於斷臂槀街初列戎王正見於懸首舞干且在於舜階挾纊更聞於堯酒此乃征而不戰為而不有者也由是遐荒必通飲化向風息去病之深入罷張騫之鑿空從此止戈不勞乎四伐五伐因兹欵塞無限乎自西自東非我皇明四目達四聰上讓下競君明臣忠則何以建無大之元功第二同前韻崔損聖人推有功擇賢佐武義舉湛恩播所謂君良臣忠上唱下和鬼方難制敢稱亂以蕩搖遐夷恃險不恭命而朝賀然後興以戈矛伐其怠惰自彼曲而我直必義勇而遙破有若霸由一戰晉文伐國以定功師興七旬有苖崩角而自銼然後陳大禮廣庶績乃公乃侯左賢右戚一人有慶必偃武修文四海無虞乃銷鋒鑄鏑宰夫供其牢醴樂人陳其戛擊英英之士爵勞先以伐謀屹屹勇夫寵命嘉其隟疑作勦敵惟我后貫三古之睿哲繼百王之絶紐用伊吕則舉無遺䇿扶衛霍則功稱不朽每懷逺以賞功因勞軍而獻壽坐朝飲至同魯史之䇿勳在泮獻馘恥漢家之斬首逺方安而猶愼多壘靜而不有及夫殊勳既答王懌疑斯崇勞還師以枤杜賜侯伯以彤弓勇爵勸能懦夫增氣於無敵拔卒為將武臣誓心於有功然後寰海逺闢天下大同教化無外昭明有融覩班師之盛禮莫不勵志而飭躬旗賦以風日雲野軍國清肅為韻李昻遐國華之容衛諒兹旗之多工文成日月影滅霜空乍逶迤而掛霧忽搖曳以張風排回驚鳥飛失斷鴻至若混羽旗以橫野則覩之者目駭雜金鼓而特設則見之者氣雄爾其誓將臨邊興師授律擁豹騎而長往指龍山而衝出月陳聮雲星旄鬭日回五翎以隔疑作革面挫三庭而屈膝非旗之佐彼軍容則何以沙場清謐明明我君四海無塵立徽號建洪勳為旗削蚩尤之跡畫蛟龍之文信俟疑功於巢燧諒比德於姜雲奄有天下體國經野覽兹旗之財成故可得而言者儼孤峙以標衆列廣形而助寡隨時卷舒任用行捨不務功以伐謀良有足而稱也徒觀其進退繽紛旖旎三軍可仰可則光輝一國􅀈示迷於指南何登車而逐北塞斷連營幸偶時清對岌岌之臺殿間悠悠之斾旌陵紫霄而風掃逗碧落以雲縈擺帝樓之晴樹弄天門之曉旌高則可仰犯乃不傾每低昻以自守常居滿而望盈時亨大畜于何不育永端容於太階沐皇風之清肅靈旗賦以隨所指方敵必摧為韻獨孤授術有以厭勝則靈旗之制可知寧不師古或取諸隨命曰靈表神靈之託考其象亦象之在斯前史載焉可得而舉用於兵禱之際在乎郊見之所詳厥制之由始信法天而為紀翠華匪倫黃鳥可擬因通帛以作繪樹修竿而直指三星前列成太一之蜂顔師古曰蜂與鋒同旗九仭髙懸拂堪輿之壁壘垂彩揚光煥其有章牡荆郅偈而乍動登龍蚴蟉而欲翔物之精也必異神之用也無方靡微風知其整整含霽景覩夫央央惟時越人害及疆埸彼則神怒我將霆擊乃祈幽贊乃導彼役所以酌意于天所以信威于敵撰辰其吉用致精一𤣥穹是饗太史祗祓及瑄玉既陳而靈旗獨出順徂征之所向庶獲醜之可必異先登之蝥弧同指佞之屈軼常疑作帝車爛爛靡豐蔀而見斗君象昭昭狀寅賔之出日終能吞若裔土克全師律豈得之於伐謀將有類於斯術嘗聞王者兮厥德不回兩階之舞兮三苖實來則吾君紹重華之廣運超帝徹之雄才布澤而陽和乃發抗威而枯朽易摧且將舉天畢以掩凶暴傾雲漢而滌氛埃古靈旗者奚足道於今哉太史奉靈旗指蔡賦以國家兵禱建兹神物為韻失名旗昭戎容武備天討上蔡干紀惟聖后之克誅南越徂征穆漢皇於肇造仰垂象以徼福洎有司而請禱封疆乃俟於指明冦虐方期於蕩掃詳其效虞典之舞羽體周官之禡牙九仞屹以特立三星粲其增華分野髙標象指麾於帝力光耀旁發形耳目於兵家矧夫天飛龍而載圗北有斗而上獻當我師之欲勇乘彼衆之胥怨上宣其意將同乎十手所臨人授其蹤必在夫六斿之建至乃直指遐舉申嚴叶時且殷祭以誠若視凶徒而蠢兹小蝥弧之先登令斯行也奉郅偈以東向神乎尊之匪曵珠而極侈諒懸首而為期懿夫從人謀而罔咈則異於九旗之物攄皇怒以不賔取貴於八方之神故能殺敵啓靈申威定國蟠喜氣以將逺揚勝風而自北儀在端表始合于師貞以出人知嚮方用符于我戰則克奚必彰翠鳯以崇麗法𤣥蛇而辨色適足以計其功庸未可以靖乎氛慝睿略無敵宸心有征侔制勝於左杖聿稱材於牡荆方旗指以神輔俾蔡潰而功成蹈道不昧謀謨孔明徵太史於往制備唐年之主兵者哉擊柝賦以封守勤固禦暴為韻崔琪總目作損嚴城暮兮絶人蹤君門深兮開九重清矣擊柝出彼髙墉候銅壺而發箭雜鳬氏之鳴鐘響以應聲按更籌而宣九陌內以達外禁姦慝而清四封何斯違斯是擊是扣聲參投壤之擊知甚挈瓶之守風雨如晦不假雞鳴夙夜在公但見牛斗至若衛尉奉職金吾克勤蓋欲懲冦暴亦以戒昏昕夜如何其歲聿云暮階凝冬霜月滿蟾兔是時也哀響稍動寒聲轉布窈窕鳯凰之樓蕭瑟銅駝之路於焉巡警自成險固復有空閨怨别幽客飄寓心馳遼陽之戍衣化陸生之素聞一聲莫不䦨干聼萬籟悉以橫注當今六合肅清四夷即叙時無暴客邑空囹圄彼干楯之事擊柝之所尚行於方隅猶用於軍旅者蓋取諸豫備固吾守禦則知自我垂法寧云待暴至矣哉居安思危亦從吾君之所好也文苑英華卷六十四
