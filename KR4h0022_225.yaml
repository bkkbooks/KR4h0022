body:
  text: 文苑英華巻二百二十五宋李昉等編道門一遊仙三十七首神仙二首懷仙五首夢仙二首謫仙一首仙谷遇毛女一首桃源三首秦越人洞中詠一首下元齋詠一首歌詞五首遊仙梁武帝見初學記水華䆒靈奥陽精測神秘具聞上仙訣留丹未肯餌潛名遊柱史隠迹居郎位委曲鳯臺日分明栢寢事蕭史暫徘徊待我升龍轡同前奉和竟陵王沈約朝上閶闔宫髙類聚作暮宴清都闕騰盖擁類聚作隠奔星低鸞避行月九嶷紛相從虹旌乍升沒青鳥去復留髙唐雲不歇若華有餘照淹留且晞髪同前和趙王庾信藏山還採藥有道得從師京兆陳安世城都李意期玉京類集作魚傳相鶴太一受飛龜白石香新芋青泥美熟芝山精逢照鏡樵客遇類聚作值圍碁石紋如碎錦藤苗似亂絲蓬萊在何處漢后欲遥祠同前此詩已見一百九十二巻盧思道同前尋蘇道士効作王績暫出東坡一作波路過訪北一作此巖前蔡經新學道王烈舊成仙駕鶴來無日乗龍去幾年三山銀作地八洞玉為天金精飛欲盡石髓溜應堅自悲生世促無暇待桑田二上月芝蘭徑中巖紫翠房金壺新鍊乳玉釡始煎香六局黄公術三門赤帝方吹砂聊作鳥動石試為羊緱氏還程促瀛洲㑹日長誰知北巖下延首詠霓裳三結衣尋野路負杖入山門道士言無宅仙人更有村斜溪横桂渚小徑入桃源玉牀塵稍冷金爐火尚温心疑遊北極望似陟西崑逆愁歸舊里蕭條訪子孫四真經知那是仙骨定何為許邁心長切嵇康命似竒桑踈金闕逈苔重石梁危照水燃犀角遊山費虎皮鴨桃聞已種龍竹未經騎為向天仙道棲遑君詎知同前葳蕤三珠樹杳靄仙源路日規半隠霞山忩未斂霧泛琴宜秋寂吹簫㸔鳯度披雲振輕衣踏葉羅幽歩前溪鬼谷隠後嶺王喬住翡翠映碧流桂花凝清露𦕈然歸天理逍遥任真趣寄謝桑榆客榮耀非所務同前劉緩税駕倚扶桑逍遥望九州二老佐軒轅稱戈戮蚩尤功成棄之去乗龍上丹丘一作天遊天上見玉皇夀與天地休俯視崑崙宫五城十二樓王母何窈𦕈玉質清且柔揚袂折瓊芳寄我天東頭相思千萬嵗大運浩悠悠安用知吾道日月不能周寄音青鳥翼謝爾碧海流同前賈島借得孤鶴騎髙近金鳥飛掬河洗古貌照月生嫩輝天中鶴路直天盡鶴一息歸來不騎鶴身自有兩翼若人無仙骨芝术徒煩食同前王貞白我家三島上洞户眺一作枕波濤醉背雲屛卧誰知海日髙露香紅玉樹風綻碧蟠桃悔與仙子别思歸夢釣鼇我家集作駕言風綻集作風撼仙子集作神仙大遊仙十三首曹唐漢武帝將候西王母下降崑崙凝想最髙峰王母來乗五色龍歌聽紫鸞猶縹緲語來青鳥許從容風廻水落三清月漏苦霜傳五夜鐘樹影悠悠花悄悄若聞簫管是行蹤漢武帝於宫中宴西王母鼇岫雲低太一壇武皇齋潔不勝懽長生碧字期親署延夀丹泉許細㸔劔佩有聲宫樹静星河無影禁花寒秋風褭褭月朗朗玉女清歌一夜䦨劉晨阮肇遊天台樹入天台石路新細雲和雨動無塵烟霞不省生前事水木空疑夢後一作裏身往往雞鳴巖下月時時犬吠洞中春不知此地歸何處湏就桃源問主人劉阮洞中偶一作遇仙子天和樹色靄蒼蒼霞重嵐深路渺茫雲竇滿山無鳥雀水聲沿澗有笙簧碧沙洞裏乾坤别紅樹枝前日月長願得花間有人出不令仙犬吠劉郎仙子送劉阮出洞殷勤相送出天台仙境那能却再來雲液毎歸湏强飲玉書無事莫頻開花當洞口應長在水到人間定不廻惆悵溪頭從此别碧山明月照蒼苔仙子洞中有懐劉阮不将清瑟理霓裳塵夣那知鶴夣長洞裏有天春寂寂人間無路月茫茫玉沙瑶草連溪碧流水桃花滿澗香曉露風燈零落盡此生無處訪劉郎劉阮再到天台不復見仙子再到天台訪玉真青苔白石已成塵笙歌𡨕寞閒深洞雲鶴蕭條絶舊隣草樹總非前度色烟霞不似昔年春桃花流水依前一作然在不見當時勸酒人織女懐牛郎北斗佳人雙淚流眼穿腸斷為牽牛封題錦字凝新恨抛擲金梭織舊愁桂樹三天雲漠漠銀河一帶水悠悠欲将心就仙郎説借問榆花早晩秋玉女杜蘭香下嫁於張碩天上人間兩渺茫不知誰嫁杜蘭香來經玉樹三山逺去隔銀河一水長怨入清塵愁錦瑟酒傾𤣥露醉瑶觴遺情更説何珍重擘破雲鬟金鳯凰王逺宴麻姑蔡經宅好風吹樹杏花香花下真人道姓王大篆龍蛇隨筆札小天星斗滿衣裳閒抛南極歸期晩笑指東溟飲興長要喚麻姑同一醉使人沽酒向一作下餘杭萼緑華將歸九疑留别許真人九㸃秋煙黛色空緑華歸思頗無窮毎悲馭鶴身難任疑作住長恨臨霞語未終河影暗吹雲夣月花聲閒落洞庭風藍絲重勒金條脱留與人間許侍中穆王宴王母於九光流霞館桑葉扶踈閉日華穆王邀命宴流霞霓旌著地雲初駐金奏掀天月欲斜歌咽細風吹粉蕋飲餘一作酬清露濕瑶砂不知白馬紅韁解偷喫東田碧玉花紫河張休真琪樹扶踈壓瑞煙玉皇朝客滿花前山川到處成三月絲竹經時即萬年樹石㝠茫初縮地盃盤狼藉未朝天東風小飲人皆醉從聽黄龍枕一作抛水眠小遊仙十三首曹唐一偷來洞口等劉君緩歩輕擡緑繡裙旋擘桃花擲流水更無言語倚彤雲二風動閒一作寒天清桂隂水精簾箔冷沉沉西妃少女春思亂斜倚彤雲盡日吟三方士飛軒住碧霞酒寒風冷月初斜不知誰唱春歸曲落盡溪頭白葛花四玉簫金瑟發商聲桑葉乾枯海水清静掃蓬萊山下路畧邀王母話長生五紫雲停歩彩雲飛共㸔真皇海上歸千載桃花香破鼻玉盤盛出與金妃六白石山中自有天竹花藤葉滿溪煙朝來洞裏圍碁了賭得青龍直幾錢七酒灔春濃瑶草齊真公飲散醉如泥玉輪軋軋入雲去行到半天聞馬嘶八南斗瓓珊北斗稀茅君夜著紫霞衣獨乗青鹿趂朝去鳯押笙歌隨後飛九饑即飡霞悶即行一聲長嘯萬山青穿花渡水能相訪珍重多才阮歩兵十東妃閒著紫霞裙自領笙歌出五雲清思宻談誰第一不過邀取小茅君十一朝廻相引㸔紅泉不覺風吹鶴氅偏好見上清騎白鵠旋驅旌一作旄節旋昇天十二紅草青林日半斜閒隨小鳯出彤霞略尋舊路過西國因得氷園一顆𤓰十三風滿塗山玉葉稀赤龍閒卧鶴閒飛紫棃爛盡無人喫何事蘇君去不歸神仙崔仲方崑丘本難陟軒臺不易朝還往麟洲上時聽鳯凰簫霞觀文犀簟香林碧玉條且學燒丹甑何假一作暇摘仙桃同前顔之推紅顔恃容色青春矜盛年自言曉書劔不得學神仙風雲落時後嵗月度人前鏡中不相識捫心徒自憐願得金樓要思逢玉鈐篇九龍遊弱水八鳯出飛煙朝遊采瓊實夕宴酌膏泉崢嶸下無地列缺上陵天舉世聊一息中州安足旋懐仙并序王勃客有自幽山來者起予以林壑之事而烟霞在焉思解纓紱永詠山林神與道超跡為形滯故書其事焉鶴岑有竒徑麟洲冨仙家紫泉潄珠液𤣥巖列丹葩常希集作若披塵網𦕈然登雲車鸞情極霄漢鳯想疲煙霞道存集作在蓬瀛近意愜朝市賖無為坐惆悵虚此江上華觀内懐仙前人玉架殘書隠金壇舊跡集作路迷牽花尋紫洞歩葉下清溪瓊漿猶類乳石髓尚如泥自能成羽翼何必俟雲梯懐仙引雜言盧照隣若有人兮山之曲駕青虬兮乗白鹿往從之遊願心足披磵户訪巖軒石瀬潺湲横石徑松蘿羃䍥掩松門下空濛而無鳥上巉巖而有猿懐飛閣度飛梁休余馬於幽谷掛余冠於夕陽曲復曲兮煙莊䆳行復行兮天路長脩途杳其未半飛雨忽以茫茫山坱軋嶝一作磴連褰攀石壁而無據泝泥溪而不前何無情之白日竊有恨於皇天囬行遵故道通川徧流潦廻首望羣峯白雲正溶溶珠為闕兮玉為樓青雲盖兮紫霜裘天長地久時相憶千齡萬代一來遊懐仙吟二首陳陶丹陵五牙一作霞客昨日羅浮歸赤斧尋不得煙霞空滿衣試於華陽問果遇三茅知採藥向十洲同行牧羊兒十洲隔八海浩渺不可期空留雙白鶴巢在長松枝二雲溪古流水春晩桃花香憶與我師别片㠶歸滄浪滄浪在何許相思淚如雨黄鶴不復來雲深離别處石渠泉泠泠三見菖蒲生日夜勞夢䰟隨波注東溟空懐别時惠長讀消魔經忽夢遊仙王勃僕本江上客牽跡在方内寐寤霄漢間居然有靈對翕爾登霞首依然躡雲背電䇿驅龍光烟道儼鸞態乗月披金帔連星解瓊珮浮識俄易歸真遊邈難冄寥廓沉遐想周遑奉遺誨流俗非我鄉何當釋塵昧夢仙白居易人有夢仙者夢身昇上清坐乗一白鶴前引雙紅旌羽衣忽飄飄玉佩俄錚錚半空直下視人世塵𡨕𡨕漸失鄉國處纔分山水形東海一片白列嶽五㸃青湏臾羣仙來相引朝玉京安期羡門軰列侍如公卿仰謁玉皇帝稽首前致誠帝言汝仙才努力勿自輕却後十五年期汝不死庭再拜受斯言既寤喜且驚秘之不敢泄誓志居巖扃恩愛舍骨肉飲食斷羶腥朝食雲母散夜吸沆瀣精空山三十載日望輜軿迎前期過已久鸞鶴無來聲齒髪日夜衰集作衰白耳目減聰明一朝同物化身與糞壤并神仙信有之俗力非可營茍無金骨相不列丹臺名徒傳辟糓法虚受燒丹經祗自取勤苦百年終不成悲哉夢仙人一夢誤一生謫仙詞陳陶牧龍丈人病歌一作髙秋羣童擊節星漢愁瑶堂鳯輦不勝恨太古一聲龍白頭玉氣蘭光久摧折上清雞犬音書絶蜺旌失手逺於天三島空雲對秋月人間磊磊浮漚客鸑鷟蜻蜓飛自隔不應冠盖逐黄埃長夢真君舊恩澤冠蓋後篇作冠劍仙谷遇毛女意知是秦宫人常建溪口水石淺泠泠明藥叢入溪雙峯峻松栝數一作栢踈幽風垂嶺竹嫋嫋翳泉花濛濛夤縁霽人目路盡心彌通盤石横陽崖前臨殊未窮廻潭清雲影瀰漫長天空水邊一神人千嵗為玉童羽毛經漢代珠翠迯秦宫目覿神已寓鶴飛言未終祈君青雲秘願謁黄仙翁常以耕玉田龍鳴西頂中金梯與天接幾日來相逢同吉中孚夢桃源盧綸夜静春夢長夢逐仙山客林園滿芝术雞犬傍籬柵幾處花下人㸔余笑頭白桃源行劉禹錫漁舟何招招浮在武陵水拖綸擲餌信流去誤入桃源行數里清源尋盡花綿綿踏花覔逕至洞前洞門蒼黑烟霧生暗行數歩逢虛明俗人毛骨驚仙子争來致詞何至此湏臾皆破氷雪顔笑言委曲問世間因嗟隠身來種玉不知人世如風燭筵羞石髓勸客飡燈爇松脂留客宿鷄聲犬聲遥相聞曉光葱蘢開五雲漁人振衣起出户滿庭無路花紛紛飜然恐失集作迷鄉縣處一息不肯集作覺桃源住桃花滿溪水似鏡塵心如垢洗不去山家一出尋無蹤至今流水集作水流山重重尋桃源張喬武陵春草齊花影隔澄溪路逺無人去山空有鳥啼水垂青靄斷松偃緑蘿低世上迷途客經兹盡不迷秦越人洞中詠于鵠扁鵲得仙處傳是西南峯年年山下人長見騎白龍洞門黒無底日夜唯雷風清齋将入時戴花兼抱松石逕隂且寒地響知逺鐘似行山林外聞葉集作乗屐一作履又作屨聲重低礙更俯身漸逺晝夜同時時白蝙蝠飛入茅衣中行久路轉窄静聞水淙淙但願逢一人自得朝天宫宿西山脩下元齋詠前人幽人在何處松檜深溟溟西峯望紫雲知處安期生沐浴溪水暖新衣禮仙名脱履入静堂遶像隨禮行碧紗籠寒燈長幡綴金鈴林下聽法人起坐枯葉聲啓奏脩律儀天曙山鳥鳴分行布菅茅列坐滿中庭持齋候撞鐘玉函散寶經焚香開巻時照耀金室明投簡石洞深稱過上帝靈學道能苦心自古無不成少室山韋鍊師昇仙歌皇甫冉紅霞紫氣晝氛氲綘節青童迎少君忽從林下昇天去空使時人禮白雲上清詞張繼紫陽宫女捧丹砂王母令過漢帝家春風不肯停仙馭却向蓬萊㸔杏花仙女詞楊衡玉京初侍紫皇君金縷鴛鴦滿絳裙仙宫一閉無消息遥結芳心向碧雲玉京詞劉言史絶景寥寥日更遲人間甲子不同時未知樵客終何得歸後無家是㸔碁瑶水詞集作懐仙鮑溶崑崙九層集作閬風綺閣幾千丈瑶水四集作西流十二城心羡集作曽見周靈王太子碧桃花下學吹笙文苑英華巻二百二十五
