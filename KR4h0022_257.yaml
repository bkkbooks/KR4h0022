body:
  text: 文苑英華卷二百五十七宋李昉等編寄贈十一釋清江一首釋靈一一首釋護國一首釋法照一首釋皎然十三首楊巨源八首楊衡三首歐陽詹五首韓愈九首元稹三首贈淮西賈兵馬使釋清江破虜功成百戰場天書新拜漢中郎映門旌斾春風起對客絃歌白日長階下鬪雞花乍發營南試馬栁初黃由來吳楚多同調感激逢君共異鄉此詩重出三百卷中但姓名三字不同江行寄舍人又玄集作寄張舍人釋靈一客程終日風塵苦蓬轉還家未有期林色曉分殘雪後角聲寒奏落帆時月高星使東疑看逺雲破霜逢欲度遲流蕩此心難共説千峯澄霽隔瓊枝山中寄王員外釋護國為問幽蘭桂空山復若何芬芳終有分採折更誰過望在軒階近恩霑雨露多移居儻得地長願接瓊柯寄錢郎中釋法照閉門深樹裏間足鳥來過五馬不復貴一僧誰奈何藥苖家自有香飯乞時多寄語嬋娟客將心向薜蘿奉賀顔使君真卿二十八郎隔絶自河北逺歸釋皎然相一作自失值氛煙才應掌上年久離驚貌長多難喜身全此信尚書重加威太守憐滿庭看玉樹更有一枝連春山抒目寄贈李員外蹤前人南山唯與北山鄰一閉禪門老此身集作古寺連拳似我身黃鶴有心多不住白雲何事獨相親間持竹錫時集作深看水懶繫麻衣出見人無限幽芳從欲寄集作欲掇幽蘭聊贈逺郎官那許集作賞石門春贈李中丞洪前人深沉閫外格一作權奕世當榮寄地裂大將軍家傳介圭瑞至今漳河俗猶受仁人賜公初鎮淮荆決勝無精兵重圍逼大敵六月守孤城政用仁恕立恩猶疑作由賞罰明遂令麾下士感德不顧生于時聞王師諸將兵頗瀆天子狩南漢塵煙滿幽谷純臣獨耿介下士多返覆明公仗忠節一言感萬夫物性如蒺藜化作春蘭敷見讒金被爍終期玉有瑜移官萬里道君子情何如伊昔避事心乃是方袍客頓了空心旨仍髙致君䇿安知七十年一朝值宗伯言如及清風醒然開我懷宴息與逰遨不將衣褐乖海底取明月衝波不可度上有巨蟒吞下多一作有毒龍護一與吾師言乃於中心悟咄哉冥冥子胡為塵自汙採實心竹杖寄贈李蕚侍御前人竹杖裁碧鮮步林賞髙直實心去內矯全節無外飾行藥聊自扶持危資爾力初生在榛莾孤秀豈封殖干雪不死枝贈君期君識秋宵書事寄吳慿處士前人真集作禪性在方丈寂寥集作寥寥無四鄰秋天月色正清夜道心真大夢觀前事浮名悮集作悟此身不知庭樹意榮落感何人贈何評事判官前人廷評年少法家流心似澄江月正秋學究天人知逺識權分鹽鐵許良籌春風憶酒烏家近好月論禪謝寺幽清白此來誰見賞憐君獨有富人侯貽李湯前人茅氏常論七真記壺公好一作愛説三山事寧知梅福在人間獨為蒼生作仙吏日服丹砂骨自清膚如氷雪心更明山中玉筍是仙藥袖裏素書題養生願隨黃鶴一輕舉仰望青宵獨延佇平生好駿君已知何必山隂訪王許贈韓武康前人山僧雖不飲沽酒引陶潛此興少一作無人别多為俗士嫌戲呈吳慿前人世人不知心是道只言道在他方妙還如瞽老望長安長安在西向東笑贈韋卓陸羽前人只將陶與謝終日好忘情不欲多相識逢人懶道名聽寒更寄朱兵曹巨川前人欹枕聽寒更寒更發還住一夜千萬聲幾聲到君處疾愈寄人前人哀樂暗成疾卧中芳月移西山有清士孤嘯不可追搗藥曙林靜汲泉隂澗遲微蹤與麋鹿逺謝求羊一作舊交知對陸迅飲天目山茶因寄元居士晟前人喜見幽人會初開野客茶日成東井葉露採北山芽文火香偏勝寒泉味轉嘉投鐺湧作沫著碗聚生花稍與禪經近聊將睡網賒知君在天目此意日無涯上劉侍中楊巨源命代生申甫承家翊禹湯廟謨膺間氣師律動清霜鍾鼎勳庸大山河一作河山誡誓長英姿凌虎視逸步壓龍驤道協陶鈞力恩回日月光一言𢎞社稷九命備圭璋政洽軍逾肅仁敷物已康朱門重棨戟丹詔半縑緗位總雲一作興龍野師臨涿鹿鄉射雕天更碧吹角塞仍黃深入平夷落橫行闢漢疆功垂貞石逺名映色絲香斷一作度磧瞻貔武臨池識鳳凰舞腰凝綺榭歌響拂雕梁杯淨傳鸚鵡裘鮮照鷫鸘吟詩白羽扇校獵緑沉搶風景佳人地煙沙壯士場幕中邀謝鑒一作監麾下得周郎珠影含空徹瓊枝映座芳王渾知武子陳實奬元方富貴春無限歡娛夜未央管絃隨玉帳樽爼奉金章俗理寧因勸邉城詎假防軍容雄朔漠公望冠巖廊分野鄰孤島京坻溢萬廂曙華分碣石秋色入衡陽城逺迷玄兔川明辨白狼忠賢多感激今古共蒼茫堤擁紅蕖豔橋分翠栁行軒車紛自至亭館鬱相當珍簟回煩暑層軒引早涼聽琴知思靜説劍覺神揚佳景燕臺上清輝鄭驛傍鼓鼙或作鍾喧北里圭玉映東牀敢衒由之瑟甘循賜也牆官微思假路戰勝忝升堂欲奮三年翼頻回一夕腸消憂期酒聖乘興任詩狂海內栽一作分桃李天涯荷一作剪稻粱升沉門下意一作客誰道在蒼蒼一作皆百家詩選贈史開封前人天低荒草誓師壇鄧艾心知戰地寬鼓角迥臨霜野曙旌旗髙對雪峯寒五營向水紅塵起一劒當風白日看曽從伏波征絶域磧西蕃部怯金鞍贈侯侍御前人步逸辭羣迹機真結逺心一作機忘結道心敦詩揚大雅映古酌髙音逃禍栖蝸舍因醒解豸簮紫蘭秋露濕黃鶴晚一作曉天隂舊葉餘荒草寒山出逺林月明多宿寺世亂重悲琴霄漢時應在詩書道未沉坐期閶闔霽雲暖一開襟時朱泚阻兵懷德抒情寄上信州座主前人五馬江天郡諸生淚共垂宴餘明主德恩在侍臣知悵望緘雙鯉龍鍾假一枝玉峯遙寄夢雲海暗傷離幢蓋全家去琴書首路隨滄州值康樂明月向元規鵷鳳終凌漢蛟龍會出池蕙香因晴發松色肯寒移舉世瞻風藻當朝楫羽儀加餐門下意溪水緑逶迤春晚東歸留贈李功曹前人芳田岐路斜脈脈昔年華雲路青絲騎香含翠幰車歌聲仍隔水醉色未侵花唯有懷鄉客東飛羡曙鴉奉寄通州元九侍御前人大明宫殿鬱蒼蒼紫禁龍樓直署香九陌華軒爭道路一枝寒玉任煙霜須聼瑞雪傳心語莫一作却被啼猿續淚行共説聖朝容直氣期君新嵗奉恩光贈渾巨中允前人公子髫年四海聞城南侍獵雪氛氛馬盤曠野弦開月鴈落寒原箭在雲曽向天西穿虜陳慣逰花下領儒羣一枝瓊蕚朝光好綵服飄飄從冠軍贈從弟茂卿時欲北逰前人吾從一作家驥足楊茂卿性靈且竒才甚清海內方微風雅道鄴中更有文章盟扣寂由來在淵思搜竒本自通禪智王維證時符水月杜甫狂處遺天地流水東西岐路分幽州迢遞舊來聞若為向北驅疲馬山似寒空塞似雲南海苦雨寄贈王四侍御已見一百五十四卷楊衡寄贈田倉曹灣前人芳蘭媚庭除灼灼紅英舒身為陋巷客門有絳轅車朝覽夷吳傳暮習頴陽書盼雲髙羽翼待賈藴璠璵纓辨雖云阻音塵豈復踈若因風雨晦應念寂寥居秋夜間居即事寄廬山鄭員外蜀郡符處士前人憂思繁未整良辰會無由引領遲佳音星紀屢以周蓬閬絶華耀况乃處窮愁墜葉寒擁砌燈火一作光夜悠悠開琴弄清弦窺月俯澄流冉冉鴻鴈度蕭蕭帷箔秋悵懷石門詠緬慕一作􅌽碧雞逰髣佛蒙顔色崇蘭隱芳洲詠德上太原李尚書歐陽詹那以公方郭細侯并州非復舊并州九重帝宅司丹地十萬兵樞擁碧油鏘玉半為趨閣吏腰金皆是走庭流王褒見一作頌德空知頌一作感身在三千最上頭以下五篇並見集本太原旅懷呈薛十八侍御齊十二奉禮前人前來稱英雋有食主人魚後來曰賢才又受主人車伊豫亦投刺恩煦胡凋疏既覩主人靣復見集作獻主人書糊口百家周賃廡三月餘眼見寒序臻坐送秋光除西日惄飢腸北風疾集作集絺裾升堂有知音此意當何如李評事公進示文集因贈之前人風雅不墜地五言始君先希微嘉惠章杳𡨕河梁篇理蔓語無枝言一意則千往來更後人澆蕩醨前源傾筐實不收棟宇集作朴􅈪華爭繁大教護微旨哲人生令孫髙飈激頽波坐使橫流翻昔日越重阻側聆滄海傳逮兹覿清揚幸覩青琅編泠泠中山醇片片崑丘璠一杯有餘味再覽爭光鮮對寶人集作豈皆鑒握鞶良自妍吾其告先師六義今還全徐十八晦落第前人嘉穀不夏熟大器當晚成徐生異凡鳥安得非時鳴汲汲有所集作悠為驅驅無本情懿哉蒼梧鳳終見排雲征春日途中寄故園所親前人客路度年華故園云未集作未云返悠悠去源水日日只有逺始歎秋葉零又看春草晚寄書南飛鴻相憶劇鄉縣衆本作中可疑上襄陽相公集作醉中留别襄州李相公見二百八十八卷韓愈奉使鎮州次承天行營上上一作奉酬裴司空相公前人竄逐三年海上歸逢公復此著征衣旋吟佳句還鞭馬恨不身先去鳥飛次石頭驛寄江西王十中丞閣老前人慿髙回馬一作試回首一望豫章城人由戀德泣馬亦别羣鳴寒日夕始照江風逺漸平默然都不語應識此時情自袁州除官還京行至安陸先寄隨州周循員外前人行行指漢東暫喜笑言同雨雪離江上蒹葭出夢中面猶含瘴色眼已見華風嵗暮難相值酣歌未可終雨中寄張博士籍侯主簿喜已見一百五十四卷前人奉使常山次太原呈副使吳郎中前人朗朗聞街鼓晨起似朝時翻翻走驛馬春盡是歸期地失嘉禾處風存蟋蟀辭暮齒良多感無事涕垂頥將入集作至韶州先寄張端公集作使君借圖經前人曲江山水聞來久恐不知名訪倍難願借圖經將入界每逢佳處便開看長安交逰者贈孟郊前人長安交逰者貧富各有途親友相遇時亦各有以娛陋室有文史髙門有笙竽何能辨榮悴且欲分賢愚贈崔立之前人昔者十日雨子桑苦寒飢集作子桑寒且飢哀歌坐空室集作房不怨但自悲其友名子輿忽然憂且思褰裳觸泥水褁飯往食之入門相對語天命良不疑好事漆園吏書之存雄詞千年事已逺二子情可推我讀此篇日正當寒集作雨雪時吾身固已困吾友復何為薄粥不足褁深泥諒難馳曽無子輿事空賦子桑詩見人詠韓舍人新律詩因有戲贈元稹喜聞韓古調兼愛近詩篇玉磬聲聲徹金鈴箇箇圓髙疏明月下細膩蚤春前花態繁於綺閨情軟似綿輕新更妓唱凝妙入僧禪欲得人人伏能教面面全延清集作之苦拘檢摩詰好因緣七字排居敬千詞敵樂天侍御八兄能為七言絶句贊善白君好作百韻律詩殷勤間大祝張君籍好去老通川自謂莫漫裁章句須饒紫禁仙越中寄白樂天集作以州宅誇於樂天前人州城回繞拂雲堆鏡水稽山滿眼來四靣常時對屏障一家終日在樓臺星河似向簷前落鼓角驚從地底回我是玉皇香案吏降集作謫居猶得住蓬萊重誇州宅旦暮景色兼酬前篇末句前人仙都難畫亦難書暫合登臨不合居繞郭煙嵐新雨後滿山樓閣上燈初人聲曉動千門闢湖色宵涵萬象虛為問西州羅剎石樂天答微之詩云落句有西州羅剎之謔風波集作濤頭衝突近何如文苑英華卷二百五十七
