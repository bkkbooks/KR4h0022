body:
  text: 文苑英華巻二百三十四宋李昉等編寺院二塔附王維十首孟浩然八首杜甫八首李白三首祖詠一首丁仙芝一首高適二首蔡希寂一首綦毋潜七首宋昱一首常建一首王昌齡四首陶翰一首劉眘虚一首遊化感寺王維翡翠香煙合瑠璃寳殿平龍宫連棟宇虎穴傍簷楹谷靜唯松響山深無鳥聲瓊峯當户拆金澗透林鳴郢路雲端迥秦川雨外晴雁集作鳯王銜果獻鹿女蹈集作踏花行抖擻辭貧里歸依宿化城繞籬生野蕨空館發山櫻香飯青菰一作萌米嘉蔬綠笋莖集作紫芋羮誓陪清梵末端坐學無生過化感寺曇興上人山院前人暮持笻竹杖相待虎溪頭催客聞山響歸房逐水流野花藂發好谷鳥一聲幽夜坐空林寂松風直似秋過福禪師蘭若前人巖壑帶松集作轉㣲又作帶茅逕雲林隱法堂羽人飛奏樂天一作仙女跪焚香竹外峯偏曙藤隂水更凉欲知禪坐久行路長春芳春日上方即事前人好讀髙僧傳時看辟榖方鳩形將刻杖龜殻用支牀栁色春山映梨花集作花明夕鳥藏北窓桃李下閒坐但焚香逰悟真寺前人聞道黄金地仍依集作開白玉田擲山移巨石呪嶺出飛泉猛虎同三逕愁猿學四禪買香燃緑桂乞火蹋紅蓮集作青蓮草色摇霞上松聲泛月邊山河窮百二世界滿三千梵宇聊憑覽集作憑視王城遂渺然㶚陵纔出樹渭水欲連天逺縣分朱郭孤城集作村起白煙望雲思聖主披霧憶羣賢薄宦慙尸素終身擬尚𤣥誰言草庵客曽和栢梁篇登辨覺寺前人竹逕連集作從初地蓮峯出化城窻中三楚静集作盡林外集作上九江平嫩集作輭草承趺坐長松響梵聲空居法雲外觀世得無生資聖寺送甘二前人浮生信如寄薄宦夫何有來徃本無歸别離方正集作此受桞色藹春餘槐隂清夏首不覺御溝上銜悲執盃酒别弟縉後登青龍寺望藍田山前人陌上新别離蒼茫四郊晦登髙不見君故山復雲外逺樹蔽行人長天隱秋塞心悲宦逰子何處飛征蓋藍田山石門精舍二首前人落日山水好漾舟信歸風翫寄集作竒不覺逺因以縁源窮遥愛雲木秀初言集作疑路不同誰集作安知清流轉偶與前山通二捨舟理輕䇿果然愜所適老僧四五人逍遥䕃松栢朝梵林未曙夜禪心集作山更寂道心及牧童世事問樵客暝宿長林下焚香卧瑤席澗芳襲人衣山月映石壁再尋畏迷誤明發更登歴笑謝桃源人花紅復來覿陪張丞相禮集作祠紫蓋山塗經玉泉諸寺孟浩然望秩宣王命齋心待漏行青襟列胄子從事有叅卿五馬尋歸路䨇林指化城聞鍾鹿門近照膽玉泉清皂蓋依林集作松憇緇徒擁錫迎天堂集作宫上兠率沙界豁迷明欲就終焉志雖謀計未成集作先聞智者名人隨逝水一作波没山逐一作欲覆船一作舟傾想像若在眼周流空復情集本添此四句謝公還欲卧誰與濟蒼集作羣生臘月八日於剡縣石城寺禮拜前人石壁開金像香山繞集作倚鐵圍下生彌勒見廻向一心歸松竹集作竹栢禪庭古樓臺世界稀夕嵐増氣色餘照發光輝講席邀談柄泉堂施浴衣願承功德水從此濯塵機題容山主二字集作融公蘭若前人精舍買金地集作開流泉繞砌廻芰荷薰講席松栢繞集作映香臺法雨晴飛集作霏去天花晝下來一乗談未了集作談𤣥殊未已歸騎夕陽催宿萊集作業師山房期丁大集作公不至前人夕陽度西嶺羣壑倐已暝松月生凉意一作夜凉風泉滿清聽樵人歸欲盡磴一作煙鳥栖初定之子期未來孤宿集作琴候蘿徑同王九題就師山房前人晩憇支公寺故人逄右軍軒窓避炎暑翰墨動新文竹開窻裏日集作竹蔽簷前日雨隨堦下雲周逰集作旋青隂遍吟卧夕陽曛江静榜集作棹歌歇溪深樵語聞歸塗未忍去携手戀清芬陪姚使君題惠上人房前人帶雪梅初暖含煙柳尚青來窺童子偈得聽法王經㑹理知無我觀空厭有形迷心應覺悟客思不集作未遑寧雲門寺西六七里聞符公蘭若最幽與薛八同造前人謂余獨迷一作逰方逄子亦在野結交指松栢問法尋蘭若小溪劣容舟怪石屢驚馬所居最幽絶所徃集作住皆静者宻篠夾路旁清泉流舍下集作雲簇興坐隅天空落階下上人亦何問集作聞塵念都集作俱又作皆已捨四禪合真如一切是虛假願承甘露潤喜得惠風灑依止此集作依此託山門誰願教集作誰知効丘也疾愈過龍泉寺精舍呈易業二公前人亭午聞山鍾起行散集作送愁疾尋林採芝去轉谷集作谷轉松翠宻旁見精舍開長廊飯僧畢石梁集作渠流雪水金鳥集作子又作鳥曜霜橘竹房思舊逰過憇終永日入洞窺石髓傍崖採蜂蜜日暝辭逺公虎溪相送出山寺杜甫野寺殘僧少山園細路髙麝香眠石竹鸚鵡啄金桃亂石通人過懸崖置屋牢上方重閣晩百里見纎毫奉和裴十四廸新津山寺寄王侍郎即王蜀州前人何限倚山木吟詩秋葉黄蟬聲集古寺鳥影度寒塘風物悲逰子登臨憶侍郎老夫探賞集作典日隨意宿僧房題忠州龍興寺所居院壁前人忠州三峽内井邑聚雲根小市常争道集作米孤城早閉門空看過客淚莫覔主人恩淹泊仍愁虎深居頼獨園宿贊公房東京大雲寺主謫此安置前人杖錫何來久集作此秋風已颯然雨荒深院菊霜倒半池蓮放逐寧虧集作違性虛空不離禪相逄成夜宿隴月向人圓上兠率寺前人兠率知名寺真如㑹法堂江山有巴蜀棟宇自齊梁庾信哀雖久何顒好不㤀白牛連逺近且欲上慈航秦州雜詩前人秦州城北寺勝跡隗囂宫苔蘚山門古丹青野殿空月明垂葉露雲逐度溪風清渭無情極愁時獨向東法鏡寺前人身危適他州勉彊終勞苦神傷山行深愁破崖寺古嬋娟碧蘚集作鮮净蕭槭寒籜聚洄洄石根水冉冉松上雨洩雲䝉清晨初日翳復吐朱甍半光烱户牖粲可數拄䇿㤀前期出蘿已亭午㝠㝠子規呌微逕不敢集作復取同諸公登慈恩寺塔前人髙標跨蒼天一作穹烈風無時休自非曠士懐登兹飜百憂方知象教力立集作足可追㝠搜仰穿龍虵窟始驚集作出枝撑幽七星在北户河漢聲西流羲和鞭白日少昊行清秋秦山忽破碎涇渭不可求俯視但一氣焉能辨皇州廻首呌虞舜蒼梧雲正愁惜哉瑶池宴集作飲日晏崑崙丘黄鵠去不息哀鳴何所投君看隨陽鴈各有稻粱謀秋夜宿龍門香山寺奉寄王方城十七丈國瑩上人從弟㓜成令問李白朝發汝海東暮棲龍門中水寒夕波急木落秋山空望極九霄逈賞幽萬壑通目浩沙上月心清松下風玉斗生網户銀河耿花宫興在趣方逸歡餘情未終鳯駕憶王子虎溪懐逺公桂枝坐蕭瑟棣華不復同流恨寄伊水盈盈焉可窮流夜郎永華寺寄潯陽羣官前人朝别凌煙樓賢豪滿行舟暝投永華寺賔散予獨醉願借九江流添成萬一作兩行淚寫意寄廬嶽何當來此地天命有所懸安得苦愁思廬山東林寺夜懐前人我尋青蓮宇獨往謝城闕霜清東林鍾水白虎溪月天香生虛空天樂鳴不歇宴坐寂不動大干入毫髮湛然冥真心曠刼斷出沒題逺公經臺祖詠蘭若無人到真僧出復稀苔侵行道席雲濕出禪衣澗一作溪䑕縁香案山蟬噪竹扉世間長不見寧止暫㤀歸和薦福寺英公新構禪堂丁僊芝上人久棄世中道自㤀筌寂照出羣有了心清衆縁所成於此地築館開青蓮果藥羅砌下煙虹垂户前呪中灑甘露指處流香泉神逺日無事體清宵不眠枳開廬山法松入漢陽禪一枕四山外虛舟常浩然宿開善寺贈陳十六髙適駕車出人境避暑投僧家徘徊龍象側如見香林花讀書不及經飲酒還勝茶知君悟此理所未披袈裟談空㤀外物持誡破諸邪則是無心地相知集作相看唯月華發廣陵栖靈寺塔前人淮南富登臨兹塔信竒最直上造雲族憑虛納天籟逈然碧海西獨立飛鳥外始知髙興盡適與賞心㑹連山黯吳門喬木吞楚塞城池滿窻下物華集作象歸掌内逺思駐江帆暮晴結春靄軒車疑蠢動造化資大塊何必了無身然後知所退登福先寺上方然公禪室蔡希寂名都標佛刹萬構臨河干舉目上方峻森森青翠攅步登諸刼盡忽造浮雲端當暑敞扃闥一作扁闥䆳却嫌絺綌寒禪房最髙頂静者殊閒安踈雨向空城數峯簾外盤午鍾振衣坐招我同一飡真味雜飴露衆香唯茞蘭晩來恣偃俛茶果仍留歡題鶴林寺綦毋潜道門集作林隱形勝向背臨層霄集作行法橋松覆山殿冷花蔵溪路遙珊珊寳幡挂焰焰明燈燒遲日半空谷春風連上潮少憑集作適水木興蹔忝集作添又作令身心調願謝携手客兹山禪誦饒題栖霞寺前人南山勢廻合靈境依此住殿轉雲崖隂僧探石泉渡龍虵争翕習神鬼皆宻䕶萬壑奔道塲羣峰向䨇樹天花飛不著水月白成路今日觀我身歸心復何處登天竺寺前人郡有化城最西窮疊嶂深松門當澗口石路在峰心幽見夕陽霽髙逢暮雨隂佛身瞻紺髮寳地踐黄金雲向竹溪盡月從花洞臨因物成真悟遺世在兹集作孤岑宿龍興寺前人香刹夜㤀歸松青古殿扉燈明方丈室珠繫比丘衣白月傳心净集作静青蓮喻法微天花落不盡處處鳥銜飛題净林集作招隱寺山頂禪院前人招提此山頂下界不相聞塔影挂清漢鍾聲扣集作和白雲觀空静室掩行道衆香焚且駐西來集作束駕人天日未曛題招隠恂集作絢公房前人開士度人久空山花霧深徒知宴坐處不見有為心蘭若門對壑田家路隔林還言澄集作證法性歸去比黄金過上人蘭若前人山頭禪室挂僧衣窻外無人溪鳥飛黄昏半在山下路却聽鍾集此作松聲連翠微題石窟寺即魏孝文之所置宋昱梵字開金地香龕鑿鐵圍影中羣象動空裏衆靈飛簾一作簷牖籠朱旭房廊挹翠㣲瑞蓮生佛步寳樹挂天衣邀福功雖在興王代久非誰知雲朔外更覩化胡歸題破山寺後禪院常建見文粹清晨入古寺初日曜一作朗髙林竹逕通幽處禪房花木深山光恱鳥性潭影空人心萬籟此都寂但餘鍾磬音過香積寺王昌齡不知香積寺數里入雲峰古木無人徑空山何處鍾泉聲咽危石日色冷青松薄暮空潭曲安禪制毒龍與蘇盧二員外期逰丈八寺而蘇不至因有此作前人共仰頭陁行能㤀世諦情廻看䨇樹闕相去一牛鳴法向空林說心隨寳地平手巾花疊净香帔稻畦成問道邀同舍相期宿化城安知不來往翻得似無生洛陽尉劉晏與府縣諸公茶集天宫寺岸道人房前人良友呼我宿明月懸天宫道安風塵外灑掃青林中削去府縣理豁然神機空自從三湘還始得今夕同舊居太行北逺官滄海東各有四方事白雲處處通香積寺禮萬廻平等二聖僧塔前人俱無御化來借有乗化歸如彼䨇塔内孰能知是非愚也駭蒼生聖哉為帝師當時特世出不由天地資萬廻主此方平等性無違今我一禮心億刼同不移蕭蕭松栢下諸天來有時宿天竺寺陶翰松栢亂巖石西山微徑通天關一峰見宫闕生虛空正殿倚霞一作峯壁千樓集作上方標石叢夜來猿鳥静鍾梵響雲中峰翠映湖月泉聲亂溪風心超諸境外了與懸解同明發氣候改起視長崖東湖色濃蕩瀁海光漸朦朧葛僊迹尚在許氏道猶崇獨往古今事幽懐期二公登廬山峰頂寺劉眘虛孤峰臨萬象秋風氣何清髙庭際南郡出林端西明一作庭際南郡出林端西江明山門二緇叟振錫聞幽聲心照有為界業懸前後生徒一作雖知真機静尚與愛網并方首金門路未遑叅道情文苑英華巻二百三十四
