body:
  text: 文苑英華卷八百七十七宋李昉等編祠堂蜀丞相諸葛亮碑一首魏府狄梁公碑一首蜀丞相諸葛亮祠堂碑裴度度嘗讀舊史詳求往哲或秉事君之節無開國之才得立身之道無治人之術四者備矣尊集本文粹作兼而行之即二本作則蜀丞相諸葛公其人也公本系在簡䇿大名蓋天地不復以云當漢祚衰陵人心競逐取威定霸者求賢而不及藏器在身者擇主而後動公是時也躬耕南陽自比管樂公未從虎時稱卧龍詩曰潛雖伏矣亦孔之照故文粹作荆非州平心與元直神交洎乎三顧而許以驅馳一言而定其機勢繇是翼扶劉氏纘成舊服結吳抗魏擁蜀稱漢刑政達乎荒外道化行于域中誰謂阻深殷為強國誰謂􅂒脆勵為徑兵則知地無常形人無常性自我而作若金在鎔故九州之地魏有其七我無其一由僻陋而啓雄圗出封疆以二本作而延大敵財用足而不曰浚我以生干戈動而不曰殘人以逞其底定南方也不以力制而取其心服震文粹作懾諸夏也不敢角其勝負而止候其存亡法加於人也雖徒文粹作從死而無怨德及於人也雖奕葉而見思此所謂精義入神自誠而眀者矣若其人存其政舉則四海可平五服可傾而陳夀之評未極其能事崔浩之説又詰其成功此皆以變詐之略論節制之師以進取之方語化成之道不其謬歟夫委棄荆州不能遂有三郡此乃務增德以吞宇宙不黷武以爭尋常及出斜谷據武功分兵屯田為文粹作謀久駐之計與敵對壘待可勝之期雜乎居人如適虛邑彼則喪氣我方養威若天假之年則繼大漢之祀成先主之志不難矣且權傾一國聲震八紘而上下無異詞始終無愧色茍非運膺五百道冠生知曷以臻於此乎故玄德知人之眀者倚仗曰魚之有水仲達姦人之雄者嗟稱曰天下奇才度每迹其行事度其逺心願奮短札以排羣議而文字蚩鄙日日文粹作志願未果元和二年冬十月聖上以西南奧區寇亂餘烈文粹作業罷氓未息汙俗未清輟我股肱為之父母乃詔相國臨淮公由秉鈞之重乘二本作承推轂之寄戎軒乃降藩服乃理將眀帝道陬落綏懷溥暢仁風閭閻滋殖府中無留事宇下無棄財人知嚮方我有餘地則諸葛公在昔之治與相國當今之政異代而同塵矣度謬以庸薄獲參管記陪二本作隨旌旄而爰止望祠宇而修謁有儀可象以赫厥靈雖徽烈不忘而碑表未立古者或拳拳一善或師長一城尚流斯文以示來裔况如在之嘆終古不絶文粹作紀其可闕乎乃刻貞石庶此都之人存必拜之感云爾銘曰昔在先主思啓疆宇擾攘靡依英雄無輔爰得武侯先定蜀土道德城池禮義干櫓煦二本如此是英華避諱改作與非物如春化人如神勞而不怨用之有倫柔服蠻落鋪敦文粹作敷非渭濵攝迹畏威雜居懷仁中原旰食不測不克以待可勝允臻其極天未悔禍公命不果漢祚其亡將星中墮反旗鳴鼓猶走司馬死而可作當小天下尚父作周阿衡佐商兼齊管晏總漢蕭張易代而生易地而理遭遇風約亦皆然矣嗚呼奇謀奮發美志夭遏吁嗟嚴立咸受謫罰聞之痛之或泣或絶甘棠勿翦駢邑斯奪繇是而言殊途共轍本於忠恕孰不感悅茍非誠懿徒云固結古柏森森遺廟沉沉不殄禋祀以迄于今靡不駿奔若有照臨蜀國之風蜀人之心錦江清波玉壘峻岑入海際天如文粹作知公德音魏府狄梁公祠堂碑馮宿后不可以獨臨必誕生嶽靈扶既傾繫將絶兹梁國狄公是已興於天授之朝藴沉謀奮竒節也物不可以終否必繼起邦傑欽往績𢡟來功兹沂國田公是己挺乎河朔之郊創新祠修舊典也初梁公出牧于魏實宜斯人罔遂乞留則深遺愛闔境同力生祠其神畏威懷仁如在乎上祈恩徼福亦若有答洎胡起幽陵毒痡中邦悍鬬遺餘漸漬氓俗六十年于兹矣戰血滿野忠魂歸天階戺之容隱嶙猶在元和壬辰嵗我天子恢拓千古之不庭凡在率土罔不來服維元侯保和一心之有衆舉兹列城表正多方歸職貢而奉官司尊漢儀而秉周禮鳳鳴而梟音革蘭芳而棘刺死甘醴湧而盜泉竭慶雲飛而濁祲消四郊廓清萬方丕變然後辨正封疆咨謀耋老得是舊址作為新祠鳩材僝功藏事頒役上下有度東西惟序披圗以立儀像據品以昭命數不僣不逼經之營之越十月五日厥功成沂國公於是乎請護軍逮賔寮將校虎貔之羣撰吉而致饗焉先一日執事設次于門西設柔毛翰音腯肥鮮膏之具以俟詰朝公至則改命服于次率護軍等升拜將校己下次拜于堂下公親酌以奠揚觶而言曰昔者皇風中微隂沴勃興六宫弄其神器萬乘遜于羅川生人之耳目盡回元老之肺肝彌固蹈履虎尾攘奪鯨口剃除蔓草扶持忠賢元良克正萬國居貞祕䇿潛授五王奮起包復夏之大業於心術貽安劉之永圗於身後再造唐室時維梁公顧不腆之是羞獲守兹土實羣師與三軍之衆逮封內之黎老勤請于天王天王重違斯人而鑒厥誠未及浹辰而璽書金印命服瑞節一日駢至於是又頒非常之清問下莫大之洪澤馬逐逐車闐闐野接迹空駕肩彼感心與喜氣固己翔九天而滲九泉今所靡皇寧居思有上報竊慕神之志義景神之忠功薦神于此堂吉辰良日以微懇陳告至於修廢繼絶興仁樹善乃守臣之職烏敢為名冉拜而退由是六州之人士知狄公之崇德可享而田公斯言可復也詩云維其有之是以似之乃作銘曰奕奕新祠于魏之疆巖巖梁公惠此一方其惠伊何其人則亡在昔通天邊冦猖狂衝陷連城勢莫與亢山東繹騷駘藉跳梁顧是都會孰能保障天后召公飛傳靡遑至自彭澤屹為金湯以逸待勞以柔摧剛緩賦寬役勉農勸桑外示無虞內為之防虜則引歸嵗獲大穰人荷公來踴躍歡康人惜公遷泣涕倣徨援刀割膚守闕上章終然不克詎可弭忘衆心欲成經始斯堂立公儀形薦此馨香于以祝之萬夀無疆于以歌之久久垂芳追惟我公實邦之良岐嶷有聞金玉其相學以時習暗然日彰文武是經謨謀允臧測圭知正􅉼鼎難量碩大博厚靖和端莊逮使絶域義聲孔揚居夏致感有鳥呈祥氓疑于天理決獄平當亟觸龍鱗驟探虎狼西門沉巫汲直開倉蜀守興學晉臣撫牀公兼有之謇謇在旁宣威中權論道上庠慰薦幽仄懷來暴強天授以還燎火無光藹藹本枝困於斧斨下適人願上回天綱拜洛受圗非劉而王后實當扆唐遷于房時惟正色中激剛腸婪婪一作婪伊侈謀將易儲皇公陳不可校短推長血瀝太階心祈彼蒼長戈倒日徑草橫霜一柱嶷然四維重張帝拜元老春歸少陽潛安爪牙密布棟梁七日變疾五月興唐道優三仁力茂一匡始終無愧夷夏所望維此魏邦實維樂康燕寇之後中為戰場何人不鰥靡室不喪祠宇煨燼階除墟荒故老懷思遺氓慨慷猶依封畛時奠壺觴否道既傾聖歷會昌元和御臣天子垂裳九夷八蠻山梯海航禮備樂陳執贄奉璋思我懷人置彼周行是生沂公忠順激昻劍久埋獄錐能處囊道言愔愔武烈洸洸業尚管蕭化臻龔黃掃除氛祲弔恤災傷尾斷蜂蠆苗鋤莠稂萬夫歸誠有死無將天子嘉之霈澤瀼瀼龍節虎旗玉佩金鐺班其慶賜覃其潛翔沂公滋恭俯伏一作扶服兢惶愧負山嶽誓酬毫芒乃建新祠嫓彼甘棠航疑其厦屋繚以周牆吉蠲羞容羽衛兩廂仰止何逺中心是藏地靣沙麓河抱衡漳刻勒豐碑揭乎中央文苑英華卷八百七十七
