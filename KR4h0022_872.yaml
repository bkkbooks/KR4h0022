body:
  text: 文苑英華巻八百七十三宋李昉等編隐居隐居貞白先生陶君碑一首梓州射洪縣武東山陳居士碑一首孝善唐善人墓碑一首髙愍女碑一首隐居隐居貞白先生陶君碑蕭綸夫夜光結緑非胠箧之恒珍逸羽翔鱗豈園池之近玩寧期心於逺大葢不知其所以然也是以頴陽髙蹈洗耳於唐朝漢隂貞栖㓕迹於周代盛徳風流有自来矣應期而曜質者其在兹乎先生名𢎞景字通眀本冀州平陽人也其先自帝堯陶唐氏之後𦙍堯治冀州平陽故因居止龍馬見五色之符欽眀表八彩之瑞光宅於天下允釐於庶職洪源夐逺系緒綿長漢興陶舎為髙祖右司馬子青翟位至丞相後至漢末南渡始居丹陽七世祖濬仕吳為鎮南将軍荆州刺史祖降宋南中郎叅軍事父貞寳司徒建安王國侍郎竝立履清約愽渉文史先生含元精之和氣蓄陵颷之雅姿兼宣七善總脩九徳行仁蹈義嶽峙淵渟墻仭無以覩清濁不能測道風與星漢同髙勝氣與煙霞共逺六嵗便解書能属文七嵗讀孝經毛詩論語數萬言曼倩㓜習典墳公幹少誦詩賦方之於古彼有多慙是以岐嶷流聲黄中著稱有鄉人得葛洪神仙傳見淮南八公諸仙事乃歎曰讀此書便使人有凌雲之氣於是寝興諷誦晨夜不輟年二十七為宜都王侍讀總知管記事牓道求賢焚林招士朝難其選是曰得人阮瑀之書記不足扶衡孫楚之才辭何以捧轂齊代好治宫室方脩苑囿清溪舊觀更就起築仍奏表上頌辭事兼美邁彼樂職之篇踰乎景福之製帝省覧久之益以為善除奉朝請恪居官次夙夜惟寅春朝秋請是棫樸者也先生本不希榮常欲辭退乃與親友書曰疇昔之意不願䖏人間年登四十志畢山藪今三十六矣時不我借知幾其神乎無為自苦眀年遂拜表解職抽簮東都之外解組北山之陽同稷邱之栖真慕留侯之却粒便具舟檝永言東邁朝廷錫問時賢餞别祖以二踈招兹四皓超然輕舉異世同符爾乃杖策孤征㳺踐山嶽既而到于句容登於茅嶺以此地神仙之宫府靈異之栖託往不能返遂卜居焉先生曰夫子云隐居以求其志行義以達其道吾聞其語未見其人我今義通無復其一請同求志之業故自稱隐居亦猶稚川之抱朴士安之𤣥晏倚巖栖隐依林遁跡交柯結宇剗徑為門懸崖對溜悲吟灌水深􅊤絶藝文類聚作危峭組織煙霞枕石潄流水禽無撓採藥耦耕野獸不亂逍遥閒曠放浪陵山一作邱嗒然若䘮確乎難拔属齊末道消天命既否水闘榖洛地震由辰先生静思㝠數預識㣲兆於是近逺書問悉皆杜絶昔乃聞之夏甫今則見之先生我大梁休運應期受天眀命三辰開朗四海寧謐先生奉表稱慶於是信問復通天監以来常有勅㫖供給藥餌不乏嵗時渥澤湛恩莫之與比先生七年暫㳺南嶽兹山也譬閬風之地軸若崑陵之天鎮八桂傍臨九純間設樹有琅玕草生車騎遺世獨往是用忘歸一十年有勅遣左右司徒惠眀徴還先生茅山别給廨宇軒后之降精一作情天老漢帝之致禮河宗况於兹日弗能尚也養志山阿多歴年所攝生既善冥祥亦降猛獸不據魑魅莫逢庭無荆棘逺同闕里階吐神泉逕動闕於是羽人徘徊仙客上下鸞鳳㳺集芝英豐潤大造佛像爰及冩經起塔招僧備諸供養自誓道塲受菩薩法夣登七地又得嘉名具以啓聞蒙勅許可葛𤣥之夣見開士朱鸞之逺望尊儀何以擬兹通感疋此徴應以大同三年嵗次景計其時當作丙疑唐人避諱辰三月壬寅朔日癸丑告别年化春秋八十有一天子嗟惜儲皇軫悼有詔稱譽追贈中散大夫諡曰貞白先生禮也以其月十四日窆于丹陽郡句容縣雷平山若軒轅之塟衣冠如王喬之藏劍舄化於兹日可得偶一作紀焉先生器宇凝深思識精贍含章貞吉不脩㢘隅年将中夀匪踰於矩眉目䟽朗儀貎鮮潔實亡勸沮多行徳惠恡惜光景愛好墳籍篤志勵節白首彌至若乃淮南鴻寳之訣隴西地動之儀太一遁甲之書九章歴象之術㓜女銀鈎之敏允南風角之妙太倉素問之方中散琴操之法咸悉搜求莫不精詣爰及卞射荀棊蘇卜管筮一見便曉皆不用心張華之慱物馬鈞之巧思劉向之知㣲葛洪之養性兼此數賢一人而已門人恒法闓等慕遥風於緱氏繪遺像於橋陽勒𤣥碑而相質騰絳霄之流芳乃為銘曰留舄表化棄劍凝神徘徊紫氣照耀丹鱗厥跡猶在餘風可遵誰其嗣此淵哉淑人髙行邁種盛徳日新朗猶懸鏡欝似貞筠身以𢎞道行不違仁昔㳺纓綬頡頏縉紳厭乎匡救勞彼問津亦既解組乃襲山巾逺尋丘壑髙蹈風塵情無𬗟世隐不隔真結宇依巖貞棲茂草水玉留年華精却老乃有令問兼斯夀考泉過危庭峯臨窈洞露凝蘭階雲生桂棟日斜欄席花落窻甕尚平未反王孫不旋海桑交易陵谷貿遷豐碑有樹遺烈無騫梓州射洪縣武東山陳居士集作故居士陳君碑陳子昻君諱嗣字𢎞嗣其先陳國人也漢末淪䘮八代祖祉自汝南仕蜀為尚書令其後蜀為晉所㓕子孫避晉不仕居涪南武東山與唐胡白趙五姓置立新城郡剖制二縣而四姓宗之世為郡長蕭齊之末有太平者兄弟三人為郡豪傑梁武帝受禪網羅英豪拜太平為新城郡守尋加本州别駕弟太樂太濛為黎州長史督䕶二字集作都督䕶南梁二郡太守樂為本郡文粹作州司馬即君之髙祖父也生曽祖方慶好道不樂為仕得墨子五行秘書集有而字隐于武當山生烈祖湯仕郡為主簿遇梁季䘮亂避世不仕生皇考廣文粹無此字迴迴早卒君即迴之第二子也少孤而有純徳恭已飭二本作飾行一日三省家世本以清白崇徳迨君之孤素業空矣君有二兄養母以孝君克順至行同勤苦節夏不避暑冬不避寒烝烝服事行年四十有五入則孝出則悌謹而信汎愛衆而親仁無餘力也以是不優於道逮親終沒春秋已髙從仕二本作事不可以養矣乃輟干祿之學脩養生之道山壑髙居農野永嵗雅聞漢有王丹者放居不仕家累千金以自奉田稼勤者載酒肴從之鄉里承化以相懲沮乃歎曰彼王丹者足以集無以字為政矣奚其為為政也由是始考林澤闢良田習山書務農政天道時變地道化成丘陵泉文粹作淵藪星嵗雲物靡不用心也文粹無也字原田莓莓粳黍稷稷文粹作黍稷漠漠汶陽之稼如雲矣春日二本作也載華嵗聿其秋白露時降百糓收熟君嘗乗乎肩􅓅省農夫饋田畯刑以肅惰悦以勞勤若孫吳之用兵鷙鳥之摶擊也倬彼碩文粹作甫田嵗取十千倉廩實崇禮節恤惸寡賑窮乏九族以親之鄉黨以歡之居十餘年家累千金矣其鄰里有媮衣食帯刀劍椎埋胠箧之類闘雞走狗之豪莫不靡下風馴雅業文粹作素節集作雅素曰里有仁焉吾何從文粹有之字也遂頓浮窈之節肅恭儉之規脩孝悌飭二本作飾㢘恥将欲較君二字文粹作効君子之素業也君時年已耳順素無經世之情林園遺老𤣥黙忘嵗遂保先君武東山之故居行不由徑非公事未嘗至於州縣也昔襄陽有龎徳公谷口有鄭子真東海王霸西山蜀才皆避集有世之二字人養徳退耕集有以字求志軒冕不可得而羈憂患不可得而累迨于我君作者五人矣於戯古者至人不利茍得不務近貴量腹而食度身而衣非其道萬鍾不足豐也匪二本作非其榮五鼎不足餁也躬勤耕稼植其杖而芸不答子路之問者其集無其字豈我君之徒歟綿綿羅網冥冥髙鴻趯趯竹竿穆穆幽龍其與禍敗之遼絶胡楚集無此字越文粹作如胡越哉然則兩龔不免於蘭焚二老不免於薇歎其近貴利耶夫上無憂悔下無饑寒合集作含道以制嗜慾達命以順生死仁以愛身智以養徳俾爾耆而艾俾爾昌而熾君子保之以永夀考非我君者文粹無者字乎享年八十五嵗壬辰五月十三日考終厥命臨終誡曰啓余手啓余足我聞古人有言珠玉而瘞之是暴骸於中原也古者不封不樹後代聖人易之以棺椁吾不敢違聖人可具棺椁而已斂以常服墳無邱壠吾将庶幾以奉先人之清業也有子某某等皆能祗奉遺訓聿從先志長夀二年龍集癸巳某月朔某日𤣥月載踰卜兆時吉始啓殯昭告奉遷於舊塋武東山之陽禮也鄉里㑹塟者千餘人皆涕泣號慕悲純徳之不見咸曰君子沒矣仁文粹作人何以名陵壑集作谷不朽匪惟頌聲小子不敏謹文粹作請述鄉人之教其辭曰肅肅我祖國始於陳中裔淪䘮泊集作沮此江濵山川隆欝旂鼎氤二本作氛氲挺生君子集作生我君子於鑠元真唯孝肅悌唯仁善鄰樂我耕稼忘我縉紳芸芸二本作茫茫田藪嵗也其春農事方作二本作農人肅事君子犒勤孰為夫子植杖而耘弋者何慕集作鴻冥集作飛髙雲楚狂懼世夷叔求仁良圗文粹作時終矣不考于身我異於是非隐非淪撫化隨運安排屈伸大二本作天年既沒長夜何辰聖達不免宇宙同塵桐棺三寸豈我窶貧自古有禮文粹作死非吾從聖人嗟爾百代子子孫孫驕奢自咎天道無親思我松栢恭儉是遵孝善有唐善人墓碑白居易唐有善人曰李公公名建字杓直隴西人魏将軍申公發公十五代祖也周柱國陽平公逺六代祖也緩州刺史眀髙祖也太子中允進徳曾祖也綿州昌眀令珍王大父也雅州别駕贈禮部尚書震考也贈博陵郡太君崔氏妣也陳許節度使禮部尚書遜兄也渭源縣君房氏妻也容管招討使濟外舅也長慶元年二月二十三日夜無疾即世于長安脩行里第是嵗五月二十五日歸附于鳳翔某縣某鄉某原之先塋春秋五十八有二女五男曰訥朴恪慤碩公官歴校書郎左拾遺詹府司直殿中侍御史比部兵部吏部員外郎兵部吏部郎中京兆少尹灃州刺史太常少卿禮部刑部侍郎贈工部尚書職歴容州招討判官翰林學士鄜坊集作州防禦副使轉運判官知制誥知集無知字吏部選事階中大夫勲上柱國爵隴西縣開國男有史官起居郎渤海郡集無此字髙越集作鉞作行状有翰林學士中書舎人河南元稹作墓誌有尚書主客郎中知制誥太原白居易作墓碑大署其碑曰善人墓善人者何公㓜孤孝養太君太君老疾常曰㣦子勸吾食吾輙飽勸吾藥吾意其疾瘳㣦子公小字也及長居荆州石首縣環其居數百家凡争闘稍稍就公决公隨而評之寖及鄉人不詣府縣皆相率曰請問李君公養有餘力讀書属文業成與兄遜起應進士俱中第為校書時以文行聞故徳宗皇帝擢居翰林翰林時以視草不詭隨退官詹府詹府以貞恬自處不出户輙踰月鄜帥路恕髙之拜請為副在鄜時有非類者至以病去為御史時上位有過集作遏其行事者作謬官詩以諷為吏部郎中時調文學科暨吏課髙者得無停年又省成勞文集無文字急成状限繇是吏集作史軰無縁為姦詭集作訖今選部用其法知制誥時筆削間有以自是不屈者因請告改京兆少尹時與大尹議嵗减府税緡十三萬在灃時不鞭人不名吏居嵗餘人人自化在禮部時由文取士集作生非不聽譽不信毁公為人質良寛大體與用綽然有餘裕為政㢘平易簡不求赫赫名與人交外淡中堅接士多可而有别稱賢薦能未嘗倦好議論而無口過逺邪諛而不忤物其居家菲衣食厚賔客敬兄嫂禮妻子愛甥姪初先太君好善喜佛書不食肉公不忍違其志亦終身蔬食自八九嵗時始諷詩書日三百言諷畢盡得其義善治集作理王氏易左氏春秋前後著文凡三百五十二首皆詣理撮要詞無枝葉其卓然者有詹府司直比部員外郎㕔記請䨇日坐疏與梁肅書上宰相論選事状秉筆者許之薨之日不識者惜識者歎交逰者出涕執友者慟夫如是其善人乎傳曰善人國之紀也語曰善人吾不得而見之矣噫善人之稱難乎哉獨加於公無愧焉銘曰古者墓有表表有云顯其行省其文故季札死仲尼表其墓曰君子今吾䘮李君署其碑曰善人嗚呼李君有知乎無知乎君之名與此石俱髙愍女碑李翺愍女姓髙妹妹名也生七嵗當建中二年父彦昭以濮陽歸天子前此者有二字集作賊質妹妹與其母兄者集作而使彦昭守濮陽及文粹作反彦昭以城歸妹妹與其母兄皆死其母李氏也将死憐妹妹之㓜無辜請獨免其死而以為婢于官二字文粹作衆皆許之妹妹不欲曰生而受辱不如死母兄集有且死二字皆不免何獨生為其母與兄将被刑咸拜於集作于四方妹妹獨曰我家為忠宗族誅夷四方神祗尚何知問其父所在之方西嚮哭再拜遂就死眀年太常諡之曰愍當此之時天下之為父母者聞之莫不欲愍女之為集有其字子也天下之為夫者聞之莫不欲愍女之為室家也天下之為女與妻者聞之莫不欲愍女之行在其身也昔者曹娥思夫自沉于江獄吏嘑囚章女悲號思唁其兄作詩載馳緹縈上書廼除肉刑彼四女或孝或智或仁或義噫此愍女厥生七年天至集作生其知四女不倫向遂推而布之于集作於天下其誰不從而化焉雖有逆子必改行雖有悍妻必易心賞一女而天下勸亦王化之大端也異哉愍女之行而不家聞户知也貞元十三年翺在汴州彦昭時為頴州刺史昌黎韓愈始為余言一有之字余既悲而嘉之於是作髙愍女碑文苑英華巻八百七十三
