body:
  text: 文苑英華卷七百五十四宋李昉等編史論一晉書宣帝總論一首晉書武帝總論一首宋略總論一首梁典髙祖革命論一首周書皇后傳論一首周書八柱國論一首晉書宣帝總論唐太宗文皇帝夫天下一作地之大黎元為本邦國之貴元首為先治亂無常興亡有運是故五帝之上居萬乘以為憂三王以來處其憂而為樂競智力爭名利一作利害大小相吞強弱相襲逮乎魏室三分鼎峙干戈不息氛一作氣霧交飛宣皇以天挺之姿膺一作應期佐命文以纘治武以陵威用人如在已求賢若不及情深阻而莫測性寬綽而能容和光同塵與時舒卷戢鱗潛翼思屬風雲飾忠於已詐之心延安於將危之命觀其雄略內斷英猷外決殄公孫於百日滅一作摛孟逹於盈旬自以兵動若神謀無再計矣既而擁衆西舉與諸葛相持抑其甲兵本無鬬志遺以巾幗方發憤心杖節當門雄圖頓屈請戰千里詐欲示威且秦蜀之人勇懦非敵夷險之路勞逸不同以此爭功其利可見而反閉軍固壘莫敢爭鋒生怯實而未前死疑虛而猶遁良將之道失在斯乎文帝之世輔翼權重許昌同蕭何之委崇華甚霍光之寄當謂竭誠盡節伊傅可齊及明帝將終棟梁是屬受遺二主佐命三朝既承忍死之託曽無殉主之報天子在外內起甲兵陵土未乾遽相誅戮貞臣之體寧若此乎盡善之方以斯為惑夫經討之策豈東智而西愚輔佐之心何前忠而後亂故晉明掩面恥欺偽以成功石勒肆言笑姦回以定業古人有云積善三年知之者少以為惡一日聞於天下可不謂然乎雖一有自字隱過於一無比字當年一有而字終見嗤於一無比字後世一作代亦猶盜一作竊鍾掩耳以衆人為不聞鋭意盜金以一作謂市中為莫覩故知貪於近者則遺逺溺於利者則傷名若不損已以益人則當禍福人而福已順理而舉易為力背時而動難為功况以未成之晉基逼有餘之魏祚雖復道格區宇德被蒼生而天未啓時寶位猶阻非可以智競不可以力爭雖則慶流後昆而身終於北面矣一作皆晉書本文晉書武帝總論同前武皇承基誕膺天命握圖御字敷化導民以伕代勞以治易亂絶縑綸之貢去雕琢之飾制奢侈一作俗以變儉約止澆風而反淳朴雅好直言留心採擢劉􅐧裴楷以質直而見容嵇紹許竒雖仇讎而不棄仁以御物寬而得衆宏略大度有帝王之量焉于一作於時民和俗靜家給人足聿修武用思啓封疆決神算於深衷斷雄圖於獨見一作儀表馬隆西伐王濬南征師不延時種一作獯虜削迹兵無血刃揚越為墟通上世一作代之不通服前人之未服禎祥顯應風教肅清天下之功成矣霸王之業大矣雖登封之禮讓而不為驕泰之心因斯以起見土地之廣謂萬葉而無虞覩天下之安謂千年而永治不知處廣而一作以思狹則廣可長廣居治而忘危則治無常治加之建立非所委寄失材志欲就於升平行先迎於禍亂是猶將適越者指沙漠以遵途欲登山者涉舟航而覔路所趣逾逺所向一作尚轉難南北倍殊髙下相反求其至也不亦難乎況以新習易動之基而無久安難拔之慮故賈充凶豎懷姦志以弄一作擁權揚駿豺狼包禍心以專輔及乎宫車晚出諒暗未周藩翰變親以成疏連兵競滅其根本棟梁回一作回忠而起偽讎衆各舉其凶威曽未數年綱紀大亂海內版蕩宗廟播遷帝道王猷反居文身之俗神州赤縣翻成被髮之鄉棄所大以資人掩其小而自託為天下笑其故何哉良由失慎於前所以貽患於後且知子者賢父知臣者明君子不肖則家亡臣不忠而國亂國亂不可以安也家亡不可以全也是以君子防其始聖人閉其端而世祖惑荀朂之姦謀迷王渾之偽策心屬移於衆口事不定於已圖元海當除而不除卒令擾亂於區夏惠帝可廢而不廢終使傾覆於洪基夫全一人者德之輕極天下者功之重棄一子者忍之小安社稷者孝之大況乎資三世而成業延二葉以喪之所謂取輕德而捨重功畏小忍而忘大孝聖賢之道豈若斯乎雖則善始於初而乖令終於末所以殷勤史策不能無慷慨焉一作皆晉書本文宋略總論裴子野宋髙祖武皇帝以蓋代雄才起匹夫而并六合尅國得雋寄迹多於魏武功施天下盛德厚於晉宣懷荒伐叛之勞而夷邊蕩險之力百勝可得而論者矣政疑足行陳之間却孫恩蟻聚之衆一朝奮臂掃桓玄盤石之宗方軌長驅則三齊無堅壘回戈內赴則五嶺靡餘妖命孫季髙於巨海之上而畨禺席卷擢朱齡石於百夫之下而庸蜀來王羌胡畏威交為表裏董率虎旅以事中原石門巨野之隘指麾開闢關頭霸上之阻曽莫藩籬虜其酋豪遷其重寶登未央而灑酒過長陵而下拜盛矣哉悠悠百年未之有也於是倒載干戈休兵泗水彤弓納陛肇有宋都蒂芥必除華夷莫拒然後請乎上帝步驟前王零陵去之而莫猜心髙祖受之而無愧色古之所謂義取天下者斯之謂乎若其提挈草創則魏孟何劉輔相總持則穆之徐羡鎮惡道濟經其武傳亮謝晦緯其文長沙以冡弟共艱難武烈以清貞定南楚其他胥附奔走雲合霧集若榱椽之構大厦衆星之仰河漢或取之於民疑舉或得之於未名羣才必逞智能咸效爵不妄加官無私謁晉末所以荒濟疑淆混阿黨容縱莫不驅掃革易與之更始君行卑菲而國不為陋民勤征戍而下無怨讟品令宥密賞罰端平逺無不懷邇無不附屬為郡縣者則南過交趾西包劍閣北劃黃河而繞東海七分天下而有其四自永初末嵗天子負扆務懷以燕代為戎岐梁重梗將誓六師屠桑乾而境北地三事大夫願疑作顧相謂曰待夫振旅凱入乘轅南反請具銀繩瓊檢告報東嶽既而洮弗興即年獻疑作厭世營陽王狎於弗訓以敗輿太祖寬肅宣惠大臣光表超越二昆來應寶命沈明內斷不欲政由寧氏克滅權逼不使芒刺在躬親臨朝事率尊恭德斟酌先王之典強宣疑當時之宜吏久其職育孫長子民樂其生鮮陷刑辟仁厚之化既已播流率土欣欣無思不服每駕巡幸簫鼓聽聞百姓扶攜老幼想望儀刑愛之孜孜如日不足初徐傅伏誅繼求內相王𢎞處之而思降彭城欲之而弗違王華殷景仁以忠允熙帝載謝𢎞微王曇首以沈密贊樞機徐闕王僧綽以體國彰信義謝方明劉道生以治惠稱良能髙簡則令明清貴則王舊疑文章則顔延之謝靈運有藻麗之巨才儒雅則裴苟何傅擅師表之髙學剛亮骨鯁則袁粲蔡子度建言忠益則范泰何尚之宗室藩翰帝弟帝子則江夏衡陽廬陵隋王建平臨川新喻或清令而審或文敏而洽皆博愛以禮士明靡以流譽十三四年為多士矣上亦藴藉義文思𢎞儒府庠序建於國都四學聞乎家巷天子乃移蹕下輦以從之束帛宴語以勸之士莫不敦恱詩書沐浴禮義淑慎規矩斐然向方其行修言道者然後登朝受職威儀輕佻者不齒於鄉閭公宫非儐羽不來庭私家非軒蓋不逾閾冠冕之流雍容如也於是文教既興武功亦著命將受律指日如斯檀蕭薄伐則南登象浦劉斐爰整則西踐仇他疑作池良駒巨象充塞外廄竒琛環貨下逮百遼禽獸草木之瑞月有六七繩山諷海之譯嵗且十餘江東以來有國有家豐功茂德未有如斯之盛者然值北虜方強周韓嵗擾金墉虎牢代失其御二十七年偏師克復河南橫蹂強胡百萬之衆丐奴遂跨彭沛航淮浦設穹廬於瓜步請公主以和親於時精兵猛將嬰城而不敢鬭謀臣智士折撓而無可稱天子乃朝饗單于臨江髙會於是起盡户之役貸冨室之財舳艫千里緣江而陳我守既嚴胡兵亦怠且大川所以限南北也疲老而退歸我追奔之師槖弓裹足係虜之民流離道路江淮以北蕭然矣重以含章巫蠱始自三逆合殿酷帝史籍未聞仲尼以為非一朝一夕之故其所由來者漸矣辨之不早辨也元嘉之禍其有以焉世祖率先九牧大雪寃恥身當厯數正位天居聰明絢疑練逹博聞強記威可以整法智足以勝姦君人之略幾將備矣一時之風流領袖則謝莊何偃王彧蔡興宗索顗袁粲禦武名將則沈慶之抑元景宗敞疑作慤之或潔清以秀雅或驍果以步疑類因以軌道廓之中方知向時之士若顔竣之經綸忠徑匪躬諒直雖晉之狐趙無以尚焉帝即位二三年間方逞其欲拒諌是已天下失望夫以世祖才明少以禮度自肅思武皇之節儉追太祖之寬恕則漢之文景宗疑作曽何足云景和申之以淫虐太宗易之以昏縱師旅薦興邊鄙蹙迫人懷茍且朝無紀綱內寵方議共安外物已覩其敗已初世祖登遐委重於二載疑作戴謂法興戴明載太宗晏駕亦託孤於王阮泄近之道同歸忡人之釁如一然宋祚未絶於永光更以宗王之見窘水德遂亡於後闕實由強臣之受辱且顧命羣公從容自重畏懦伊霍之機綺靡唐虞之際於是蔚炳胥變明命就遷俯仰之間興衰易用矣周自平王東遷﨑嶇河洛其後二十四世而赧始亡之漢自章和以降顛覆閹豎其後百有餘載而獻始禪之何則周漢靈長如彼難拔近代脆促若此易崩非天時亦人事也聞夫鴻荒者難為慮因事者易為力曹馬規模懸乎前載茍有斯會實啓英雄而況太宗為之驅除先顛其闕本根既蹙枝葉遂摧斯則始於人事也昔二代將亡殷辛夏癸相去數百年間異世而後出宋則景和元徽首尾不能十載而降虐過於二君斯則天之所棄篤於前王者也天意人事其微如是雖欲勿霣其可得乎若乃拯厥塗炭蒙逆取之辱者湯武之志也私鉏當路飾揖讓之名者近代之事也其應天從民道有優劣故宗廟社稷修短異數不然則何殊尤緬邈如斯之逺也夫山嶽崩頽必有朽壤之隙春秋迭代亦有去故之悲是以臨危亡而撫理運未有不扼腕流連者也近古之弊化薄俗行乎宋氏之成敗得失著乎行事從而言之載於篇矣繫敘其所以創業垂統而懷其舊俗遺風逮於賢人君子英聲餘論以附於兹子野曽祖宋中大夫西鄉侯以文帝之十二年受詔撰元嘉起居注二十六年重被紹疑作詔續成何承天宋書其年終於位書則未遑述作齊興後數十年宋之新史既行於世也子野生乎泰始之季長於永明之年家有舊書聞見又接是以不用浮淺因宋之新史為宋略二十卷剪截繁文刪撮事要即其簡寡志以為名夫黜惡章善臧否豫奪則以先達格言不有私也豈以勒成一家貽之好事蓋司典之後而不忘焉梁典髙祖事論何元之歷究前書詳觀往行昭晰千載氛氲萬古考其寬猛知布政之善惡驗其黜陟識其主之是非以曩求今工拙可見齊季昏虐政由羣小朝宰被無辜之誅藩戚懼淫刑之害髙祖痛兄弟之戮因天下之心舉荆雍之師興易疑武之伐指揮則智勇風從號令則遐邇響應取鄢郢若拉枯定金陵如沃雪黃鉞既斬白旗乃懸師不疲勞民無怨讟樂推闕在代德是膺逆取順治享年四紀萬幾事廣六職務殷負扆君臨勤於聽覽兢兢罔倦乾乾不已加以藝業之美莫以比倫洞曉儒玄該羅內外舉洙泗之餘教針其膏肓採周孔之遺文正其魚魯於是廣開庠序敦勸後生親自觀試策其優劣由近及逺咸從風化執經者連袂負笈者排肩濟濟多士於斯為盛至若御民之術未為得也敢以狂瞽請究其説夫根深者葉茂源廣者流長故聖王欲其茂長前為深廣是以擇沃壤以置王畿國都圜於六鄉封城號於千里其外則布之以五等列之以萬國分疆畫野立樹黨閭井隴以懷其仁桑梓以安其俗諸侯守境土以事於上天子執賞罰以臨於下有功則褒無道則廢二伯弼於內朝九牧佐于外政間之以賢戚參之以懿親𢎞仁義於區中被禮樂於遐表忠信之禮逹謙讓之風行爾乃覬覦之心絶兵戈疊息刑辟靡用獄訟罔興然後龜龍逰於池沼鸞鳳栖於苑囿及其末世雖主昏於上民亂於下猶晉鄭有依桓文是相絶而更續顛而必扶數百年外方至於滅周道既沒斯風漸喪洎於後代其弊尤甚罔恤民之不存而憂士之不祿蒞民之長守次更為前人未安後人便及迎新送故疲於道塗為君者甚多為民者甚少由是君臣之義薄狡惡之萌興下上遞憎甚於仇敵百城恣其暴奪億兆困其徴求捐棄舊鄉奔亡他縣地荒邑散私少官多於是倉庫既空賦斂更重天示譴禍地出妖祥飢疫互生水旱交至民不堪命轟然土崩數十年間還為黎庶髙祖博覽今古備觀興亡猶復躡其遺風襲其弊法澆薄逾甚淆紊日滋梁氏之有國少漢之一郡大半之人並為部曲不耕而食不蠶而衣或事王侯或依將帥携帶妻纍隨逐東西與藩鎮共侵漁助守宰為蝥賊收縳無罪逼迫善人民蓋疑作盡流離邑皆荒毁由是劫抄蜂起盜竊羣行陵犯公私經年纍月扺父疑者比室陷辟者接門眚災亟降囹圄隨滿夕散朝聚有若市門里加以朝霧內叢而官方外曠有其位而無其職非其事而侵其官四海至殷機事輻輳人君雖敏有所不周人君雖明有所不照豈可專於親覽忘彼責成就此而言大失有二習守膠之弊棄更張之善屈子投江寧論其痛賈生慟哭豈喻斯悲自五胡競逐晉室東徙權寓江濵遂淹時代桓伐燕秦而不振劉克函洛而還亡至於宋齊疆場侵蹙髙祖躡斯頺運有志吞并斯實王者之宏材有國之通凖然六納魏主一入洛陽竟無所成得不補失民既勞止汔可小康昔勾踐之欲滅吳前為其政兵強國冨然後用之一舉而虜夫差再舉而霸中國髙祖進不擇將退不教民雖慕古人安能有濟孫子曰善戰者前勝而後求戰善勝者前戰而後求勝明者出師必前料敵豈可暗兹人事幸彼天時者哉且國有纍卵之憂俗有土崩之勢開幸人之志兆亂臣之心遂使侯景被吾甲而冠王城驅我人而圍天闕勢如破竹易若轉圜萬里靡沸四方瓦解社稷淪胥龜玉毁廢事非一夕其所由來漸矣太宗孝慈仁愛實守文之君惜乎為賊所殺至乎文章妖艷隳墜風典誦於婦人之口不及君子之聽斯乃文士之深病政教之厚疵然雕蟲之技非關治忽壯士不為人君焉用世祖聰明特逹才藝兼美詩筆之麗罕與為匹伎能之事無所不該極星象之功窮蓍龜之妙明筆法於馬室不愧鄭玄辨雲物於魯臺無慚梓慎至於帷籌將略朝野所推遂乃撥亂反正夷凶殄逆紐地維之已絶扶天柱之將傾黔首蒙拯溺之恩蒼生荷仁夀之惠微管之力民其病乎鯨鯢既誅天下且定早應移鑾西楚旋駕東都禋祀宗祊清蹕宫闕西周嶽陽之敗績信闕宇文之和通以萬乘之尊居二境之上強敵乘釁再覆皇基率土分崩莫知攸暨謀之不善乃至於斯敬皇世祖之裔允膺下武而貞陽以旁枝外入濫尸非次陳武興勤王之師至正當闕璧之后驅斥潛疑作僣王誅鉏亂臣國亡重康彛倫復敘既而天不福善早世登遐土德代興火行告謝驃騎王琳懷申胥之志藴荀息之忠爰納嗣君更紹頽運於是嘯命方嶽大興師旅龍虎戰鬬水潰山崩君臣播越寄命齊土若乃萇𢎞興周而速咎王永復秦而延殃天欲亡之非人能救夫創天下者至明者也喪天下者至暗者也是以禹湯興其功桀紂廢其業莫不得之者前主失之者後君逮兹梁室有異於此何則髙祖撥亂除殘及身招於禍亂世祖復讎雪恥翻手命於寇讎敬皇繼祀而鼎移後嗣紹基而祚徙書曰皇天無親惟德是輔自天所祐歸於有德元之官自有梁備觀成敗昔因出軸流寓齊都窮愁著書竊慕虞子但梁室極促簡牘多闕所得遺逸略不盡舉未獲旋反更窮搜訪採其聞見撮其衆家一代之事可得觀矣周書皇后傳論魏徴書紀有虞之德一有載字釐降二女詩述文王之美一有稱字刑于寡婦一作妻字是知婚姻之道男女之别實有國有家者之所慎也爰自三代迄于魏晉興衰之數得失之迹備乎傳記故其詳可得聞焉若乃納聘以德防間以禮大義正於宫闈王化行於邦國則坤儀式固而鼎命惟新一作永矣至於邪僻既進法度莫修冶容迷其主心私謁蠧其公一作朝政則風化陵替而宗社不守矣夫然者豈非皇王之龜鏡一作鑑歟周氏率由姬制內職有序太祖創基修祍席以儉約髙祖北史作武皇嗣厯節情欲於矯枉宫闈有魚貫之美戚里無私溺之尤可謂得君人之體宣皇外行其志內逞其欲溪壑難滿採擇無厭恩之所加莫限厮皂榮之所及無隔險詖於是升蘭殿而北史作以正位踐椒庭而齊體者非一人焉階房帷而拖青紫緣一作承恩幸而擁玉帛者非一人一作族焉雖辛癸之荒淫趙李之傾惑曽未足比其髣佛也民厭煩苛北史作人厭苛政弊事實多太祖北史作文字之祀忽諸特由於此故敘其事迹以為皇后傳云一作周書本文周書八柱國傳論蕭何文史自愛懼秦法誅戮乃推奉漢髙李通家傳讖術知劉氏當興遂翊戴光武終而白水復禹中陽纂堯方䇿以為美談功臣仰其徽烈趙貴志懷忠義首唱大謀爰啓聖明克復讐耻關中全百二之險周室定三分之業彼此一時足為連類獨孤信威申南服化洽西州信著遐方光照鄰國侯莫陳崇以勇悍之氣當戰爭之秋一作利輕騎啓髙平之扉匹馬得長城之俊一作長坑之俊並以宏才逺略附鳯攀龍績著元勳位居上衮而識慚明哲咸以凶終惜哉信雖不免其身慶延於後三代外戚何其盛歟初魏孝莊以爾朱榮有翊贊一作戴之功拜榮柱國大將軍位在丞相上榮敗後此官遂廢大統三年魏文帝復以太祖建中興之業始命為之其後功參佐命望實俱重者亦居此職自大統十六年以前任者凡有八人太祖位總百揆都督中外諸軍事魏廣陵王欣元氏懿戚從容禁闥而已此外六人各督二大將軍以一作分掌禁旅當爪牙禦侮之寄當時榮盛莫與為比故今之稱門閥者咸推八柱國家云一作皆周書本文文苑英華卷七百五十四
