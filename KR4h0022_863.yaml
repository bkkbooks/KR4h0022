body:
  text: 文苑英華卷八百六十四宋李昉等編釋十五廣陵白沙大雲寺碑一首揚州慶雲寺律師一公塔碑一首舒州山谷寺覺寂塔隋故鏡智禪師碑銘一首栖霞寺故大德珗律師碑一首廣陵白沙大雲寺碑顧况地輪依水水輪依火火輪依風風輪依虛空虛空無所依佛體也變佛體為金色界地輪是也金色界中有香水海水輪是也香水海水中有光明藏火輪是也復有寶林香花瀰漫周遍佛圡風輪是也上至香積下至金色一光明藏依報正報之因歟有智為精界無智為器界佛土為性界法身報身應變之身一也天親以應化非直佛亦非説法者其華嚴則不然諸佛同身流入毗盧遮那智藏之海人有血脈地有湀闢滄島之脅有白沙之墟焉天塹在南屬岡在北敦彼廣斥勾攘五材檑刺元精猛虎蹲路騰蛇跛水氣毋毒形火爐胚物之意揔持相土曰牛欄河灘畔堪造漫吒羅非人乃秩天寶末長安僧絢避虜東土畫為像宫以配梵帝皇猷允塞量福爰集善來若干商主若干與其眷屬爭欲奮迅爰雲構版插定中丕赫微絢之功人其捨諸於戲古稅其薄人猶告困夫絢不柄刑賞不驅其人蓋以天子孝理昭明並受其佑霜露怵惕蓼莪罔極申以上報謏儒經之闕聞此名教君子肝腦而塗地者也不然其孰能與於此乎所作既成推山幹坎金翅吞龍之勢徹乎上王磅礴乎夜摩胸開掌坦棊布箭直廓乎其崇一作索也哉洎夫擑師陶師事匿乾陟方等百一嚴身之具華儉適中滿而不缺三草二木俱霑一雨昔北山之翁天帝命操蛇之神以遂其志是知慈善根一作本力軍吒胸索口唵一作奄火皆暼電春雷張曜威恆保寧剎土易見底迦一時生晦一作悔魔軍一作兵法將不可以較乎勝負吹螺擊鼓歌唄讃嘆旋知之衆莫不圓通信乎罽膩停酸修羅竄迹菩薩鏡生死海為大涅槃大法現前了無塵曀凡有作有證名有相大乘無作無證名無相大乘體相融一真味也涉入無閡因中説果果中説因此文殊道引之智羖羊有角能破金剛不破如如之相我於觀照權實皆如如從心上變起離心無物離物無心固一作因物因迷盧不動有若靈辨禪師者大照大師之上照足如優曇花綱首良制利見如薝蔔花絢上人者根器清淨如拘物頭花芬多利花聿來求我分别三締不有歐和之志悉地之德焉難乎決擇然則嗢陀喃散施有情之義磁石攝鐵不攝鴻毛相應故作針則沉作鉢則浮隨緣故獸齓堅骨魚食碎砂砂骨遊一作逰鋪託胎弗也明佛性故與夫有不染塵空不斷相非空有故若有去來若無去來無去來故若有方所若無方所故佛與衆生數無增減無增減故補得迦羅由來則佛前佛後同名同號乃至不同一一微塵之數微塵數佛各坐蓮臺展臂指塵皆當此説且修多羅藏八萬在婆竭羅龍王宫中以龍樹之聰利受持不盡海惠盡焉一無此字曾不得夫少分一作多或以其言河漢詎知我生一一生隂陽也不測之外更有神速之如此乎是以聖人神道設教大哉神乎若在其上若在其下群玉藏書之府比夫現量春秋敘二百餘年方彼曠劫百千萬億那因他其數略也法從數起從一剎那至一洛剎從一洛剎至一俱祗至一僧祗從一僧祗至一髙出從一髙出至不可轉無邉無礙無鞅一作夫無極重重一本再疊重重字成住壞空空不相凌滅其相去也不亦遼乎假使生肇融睿伊臯稷契共佐唐虞我知不相若也老𣆀曰竺乾國有古先生西過流沙尋師之旨孔子對商太宰曰三五非聖西方之人蕩蕩焉無得而稱又曰聖人邱不得而見之矣日月無燭無不燭聖人無見無不見般若無知而無不知周紀有之昭王二十四年甲寅張棫經世紀年作壬子天地震動江河泛濫王問大史蘇曰此何祥也對曰聖人生於西方穆王三十三年壬申是嵗紀年作壬子傳燈録作五十二年壬申今又作三十三年未知孰是天地震動江河泛濫王問大史扈多此何祥也對曰聖人滅于西方示有生滅實無生滅向使無生之法格乎戰國戰國得之秦不坑儒趙不坑卒小國事大國大國不征小國含哺鼓腹無為之法化也雖有大夢然後大覺塵勞性空有一作空有常寂分改遷易無非法身而大雄法寶五迦葉不得當乎付囑必也當乎不論前後此瞿曇所以贊佛法也文曰佛日之曙兮照乎東方大雄説法兮海印發光獨立世界兮橫吞八荒江沙漫漫兮寺壓其陽撼谷幹波兮氣盤中央揚州慶雲寺律師一公塔碑獨孤及公諱靈一俗姓吳廣陵人也膚集作神清氣和方寸地靈一作虛與自然妙有集作太初元精合其純粹聞思修一作循非惠介然生知九嵗出家十三斷髮集作結嚴持律藏將紹法寶示入一作人文學以誇集作誘世智初不詳集作計身中有我我中有身德充報圓斷緣相滅寶應元年冬十月十六日終于杭州龍興寺春秋三十有六臨滅顧命以香水茶毗為送終之節門弟子虔奉遺旨粵以是某月某日焚身于某山起塔于某原從拘尸城之制也右補闕趙郡李紓殿中侍御史頓邱李湯嘗以文字言語遊公廊廡至是相與追録遺懿以詒塵劫謂公真靜直方淵逺宏大而密識洞鑒天倪道機注不滿酌不竭沖然也自受生至於出家貪恚不入念哀樂不見色自知道至於返真雙舄不踐居士之門六根不染欲界之塵學無常師悟不以漸內以了因證心果外以惠用接物與止水空谷同其應和而法施不住天機無方精義玄言或形於章句騷雅之遺韻陶謝之缺文公能綴之其終篇必以了義博約和者量其根之上下而投以法味飽其風者亦虛而來實而歸或以足言言必緣情一緣則萬緣作而諸相見無乃不可乎曰佛法自利他不係於權實將善誘之心咱和之固曰示入固波可也公又嘗謂無生正位實相宗本二乘所感談者莫究於是著法性論以辨之而迦葉後問惠逺奧旨騞焉疑斷渙若氷釋者是以為向使大啓夀量好務宏道則法王度聞非公孰寄嗚呼生不極其涯道不竟其源豈應物之緣住世之數止於是乎為世締之始終報身之去來非思議之所及乎清塵緬然學者安仰若涉大水而無舟航儒生強名以志陳迹從自知道起至陳迹一假集本作自出家至于涅槃六根不染欲界之塵雙履不踐居士之門公之嚴持也初公之先世為富家既削髮摧萬金之産悉以讓諸孤昆季所取者獨衲衣錫杖及身而三捨七界五欲如棄涕唾公之純白也其所底止必擇山間林下無塵埃之地初舍于會稽南山之南懸溜寺焉興禪宿之達者釋隱虛處印靜虛相與討十二部經第一義諦之旨既辨惑徙居餘杭宜豐寺鄰青山對佳景以嶺松澗石為梵宇竹風月露為丈室超然獨往與法印俱自是師資兩忘空色皆遣暴風偃山而正智不動巨浪沃日而浮囊自安於是著法性論以究實諦公之懸解也公智刃先覺法施無力每禪誦之隙輒賦詩歌事思入無間興含飛動潘阮之遺韻江謝之闕文公能綴之蓋將吻合詞林與儒墨同其波流然後循循善誘指以覺路繇是與天台道士潘清廣陵曹評趙郡李華頴川韓極中山劉穎襄陽朱放趙郡李舒頓邱李湯南陽張繼安定皇甫冉范陽張南史清河房從心相與為塵外之交講德味道朗詠終日其終篇必博之以聞約之以修量其根之上下而投之以法味欲使俱入不二法流公示教之攘門也內張天機外與物接捨法無我以虛受人曠焉若空谷之響止水之像優而柔之使自得之其道樞未始不無為也而飲其和者亦虛而來食而歸明徴其所以然則不得其朕公應用之無涯也宜豐寺地臨髙隅初無止泉公之戾止有靈泉呀然而湧噴金沙之溜于禪庭左右挹之彌清㪺之無窮公精至感物也嗚呼日發天啓夀量俾一劫住世聖道以拯校喪得大雲而涼天宅其公乎于嗟吳穹奪我善友使生不極其涯道不竟其源豈闕就有可出將轉現他方乎為應化之始終法身之去來非思議所及乎凡今學徒戒歸若涉大水而無亳梁抽毫強名以志陳迹其銘曰茫茫集作示生五濁愛習如債何以集作以何為師尸羅之戒卓爾立志於焉懸解持佛密藏俾道勿壞集作一念識滅萬法懸名離性空破魔結壞頴脫諸有獄視三界上德不器大言集作道無方遺言集作天縱之文亦知其方發彼蒙求集作童啓迪思量我皆令發直心道場奈何法船今也則亡適來豈時集作逆適去豈順施未及普天乎集作胡不憗飛鳥無迹法雷罷震福庭空虛來者曷問言之糟粕留為祕印舒州山谷寺覺寂塔隋故鏡智禪師碑銘獨孤及案前志禪師號僧璨不知何許人也出於周隋間傳教於惠可大師樞衣于鄴中得道于司空山謂身相非真故示以集作有瘡疾發無我所故居不擇地以衆生病為病故所至必説法度人以一相不在內外不在中間故必集作足言不以文字其教大略以寂照妙用攝流注生滅觀四維上下不見法不見身不見心乃至心離名字身等空界法同夢幻亦無得無證然後謂之解脫禪師門率是道也上膺付囑下拯昏疑大雲垂隂國土皆化謂南方教所未至我是以有羅浮之行其來不來也其去不集作無去也既而以袈裟與法俱付悟者道存形謝遺骨此山今二百嵗矣皇帝後五年嵗次庚戌及剖符是州登禪師遺居周覽陳迹明徴故事其茶毗起塔之制實天寶丙戌中别駕前河南少尹趙郡李公常經始之碑板之文隋內史侍郎河東薛公道衡唐相國刑部尚書贈太尉河南房公琯繼論撰之而遵宏道之典易名之禮則朝廷方今集無今字以多故而未遑也長老比邱釋湛然誦經於靈塔之下與澗松俱老痛先師名氏未經邦國焉與禪衆寺大律師釋澄俊同寅叶恭亟以為請會是嵗嵩嶽大比邱釋惠融至自廣陵勝業寺大比邱釋開悟至自盧江俱纂我禪師後七葉之遺訓曰相與歎塔之不用命號之不崇懼象法之本根墜于地也願申集作發無邊衆生之宏誓以攄集作行罔極揚州牧御史大夫張公延賞以狀聞於是七年夏四月上沛然降興廢繼絶之詔册諡禪師曰鏡智塔曰覺寂以大德僧七人灑掃供養天書錫命暉煥崖谷衆庶踊躍謂大乘中興是日大比邱衆議立石于塔東南隅紀正集作心法興廢之所以然及以為初中國之有佛教自漢孝明始也歷魏晉宋齊施及梁武言第一義諦者不過布施持戒天下惑於報應而人未知禪世與道交相喪至菩提達摩大師始示人以諸佛心要人疑而未思惠可大師傳而持之人思而未修逮禪師三葉其風浸廣真如法味日漸月漬萬木之根莖枝葉悉沐我雨然後空王之密藏二祖之微言始璨然行於世間浹于人心當時聞集作問道於禪師者其淺者知有為法無非妄想深者見佛性於言下如燈之照物朝為凡夫夕為聖賢雙峯大師道信其人也其後信公以教傳𢎞忍忍公傳惠能神秀能公退而老曹溪其嗣無聞焉秀公傳普寂公之門徒萬升堂者六十有三得自在惠者一曰𢎞正正公之廊廡龍象又倍或化嵩洛或之荆吳自是心教之被于世也與六籍侔盛焉嗚呼微禪師吾其二乘矣後代何述焉庸詎知禪師之下生不為諸佛故現比邱身以救濁劫乎亦猶堯舜既往周公制禮仲尼既沒集作速之遊夏宏之使髙堂后蒼徐孟戴慶之流集作徒可得而祖焉夫以聖賢所振為木鐸其揆一也諸公以為司馬子長立夫子世家謝臨川撰惠逺法師碑銘今集無今字將令千載之後知先師之全身禪門之權輿王命之追崇集作丕顯在此山也則揚其風紀其時宜在法流及當集作嘗是味禪師之道也久故不讓其銘曰人之靜也性與生皆植集作衆生佛性莫匪宿植知誘於外率集作染為妄識如浪斯鼓與風動息淫騃貪怒為刃為賊生死有涯緣起無極如來憫之為闢度門即妄了真以正覺源啓迪心印貽我後昆間生禪師俾以教尊二十八劫迭付微言自摩訶迦葉以佛所付心法遞相傳至師子比邱凡二十五世自達摩大師至禪師凡三世共二十八劫集作世如禪師膺期宏宣世溷法滅獨以集作與道全後周武帝下令滅佛法禪師隨可大師隱遁司空山十有三年童蒙求我我以意傳攝相歸性法身乃圓性身本空我無説焉如如禪師道既棄世將三十紀妙經乃屆皇明昭賁億兆膜拜凡今後學入佛鏡界于取非取誰縳誰解初禪師謂信公曰汝何求曰求解脫曰誰縳汝誰解汝曰不見縳者不見解者然則何求信公於是言不證解脫知見遂願禮請益是日禪師授以祖師所傳袈裟萬有千嵗此法不壞栖霞寺故大德玭一作玭下同律師碑劉軻世説域中四名剎栖霞其一以其髙僧世出自齊梁間大小郎至大師聲聞相襲故江左重呼其名謂栖霞大師焉大師諱曇玭俗姓王氏晉琅琊文獻公後自永嘉南遷為句曲人王父師虔會稽守虔生智髙尚不仕州里號處士生大師自孩抱絶不為兒弄厪能言標頴聰拔羣言祕旨迎耳必了及長不茹葷血乃曰天其或者將滌吾器耶既落髮於金陵希瑜一作喻律師受戒於過海鑒真大師後與友人髙陵恩律師追逺永之遊乃偕隱匡廬之東林雖欲遺名而名已髙矣於是奔走吳楚青徐之學者始五臘講律於豫章龍興環座捧帙者麻葦明年登明寺壇至德三載敕𨽻於明寺後纍蒞事于甘露壇端肅儼恪儀形梵衆大厯初乃歸栖霞其蒞壇傳戒一十五會講訓經律三十七座州牧一有蘭陵二字蕭公髙其人謂標望風度詎獨鄴衛松柏耶乃命為僧正紀綱大振雖一公帖四輩之望無以上也十四年忽昌言於衆曰吾以律從事自謂無愧於篇聚矣然猶未去聲聞之縛既而探曹溪牛頭之旨沉研覃思朗然內得乃曰大丈夫了心當如此建中元年禪坐空谷雖野馬飄鼓星辰凌厯云云自彼我何事焉後瓦官寺其徒聚謀而請曰瓦官寰中之名剎也大師乃江左之碩人也捨是而不居吾屬安仰始出山居焉從人欲也無幾何謂弟子志誠海湘一作潮等曰吾休矣邱井夢電之喻必然耳貞元十三年十一月六日丁亥坐化于瓦官寺律堂是月丙申茶毗塔於新亭之後岡春秋七十五僧臘五十一門人臨壇者有若廬陵龍興寺明則廣陵定山寺道興鄉邑寺行銓臨淮開元寺澄觀九江寶珍寺智滿當州彭城寺惠興瓦官寺靈津鶴林寺常靜天鄉寺日耀龍興寺惠登皆津梁後進為世燈燭賢七十子而後仲尼大聖暏栖霞弟子得不為師氏名焉今寶稱領摩訶苾芻衆壇壓廬嶽大江西南卓然首出若商那之後繼以掬多得不謂釋氏之雄乎軻夙承寶稱之知見命敘述且曰吾得子銘吾大師吾無恨矣文曰有晉氏家地髙琅琊産栖霞兮宿殖有自許身佛氏為釋子兮結􅀈一作夫纒蓋惠刃中淨一作率是誰何對兮璞琢金鎣潭澄月映本清淨兮尸羅毗尼開遮止持作律師兮攝深匡髙以逰以遨鏗蒲羅兮梵行既立薪傳火襲光岌岌兮一作皆續廬山記文苑英華卷八百六十四
