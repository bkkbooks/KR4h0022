body:
  text: 文苑英華卷八百四十一宋李昉等編諡議下駁贈工部尚書馬暢諡議一首太尉晉國公韓滉諡議一首左常侍柳渾諡議一首駁右僕射鄭珣瑜諡議一首駁左散騎常侍房式諡議二首駁贈司徒李吉甫諡議一首贈太保于頔諡議一首晉世子諡恭議一首改恭太子諡議一首駁贈工部尚書馬暢諡議韋奕議曰太常考馬暢之行舉夙夜就事廉方徑正之敬以易其名異乎無所苟于言也比建中興元間暢以父有征討之勳推恩而授爵位父薨家富于財以酒色自娛貞元中嘗傾産交中官因獻田宅以求幸德宗薄其人而終不信用坐前與孤姪寡嫂分居析財醜聲聞于一作于時歿後使孽子孀妻披姦抉私公言盈于庭此皆章著于視聽者可一作何以諡為敬乎議者云先司徒之籌畫而暢揣摩者策無遺焉暢參訂一作計于閨庭之內苟所言屢中而不可隱當指眀其效實而書之俾行道者無所惑不然則莊武公之才略光于典策矣而乃飾虛辭以攘其善為子請諡得非繆盩之甚邪又稱名儒端士皆從之逰未知孰為其畋漁一作田蘇是出左傳耶孟軻云尹公他端人也其取友必端夫為端士而逰乎暢之門况諡法夙夜就事者以其績用可紀非謂其曠日彌月以至乎或作于終身也廉方徑正則暢處已行事未嘗造次而踐其途焉何以諡為敬乎大凡言功伐議德行遵一作尊其跡有以勸善貶其名有以懲惡固非庸者事也如暢之輩烏足以黷典法哉若有司以有為而為之則冝乎勸一無此字貶之例也請下太常重定其諡博士崔韶改諡曰縱一作皆唐會要太尉晉國公韓滉諡議顧况議曰韓滉天然風操自建名實馭下威重允凝績用頃天下兵興務給財食月計億費王府一空中嵗滉領小司徒實專出納平凖齒革之材貿遷虞衡之賦邸無斂貨市均靡物加以嗇用殆復充盈洎擁旄吳楚封略數千里盛名大烈豈疑作望而斯畏嚴令山鎮不可輕沮諭意維揚則張瑗之謀戢矣飛書斬將則沈清之亂平矣采衛邦伯文武陪寮怙勢之徒負阻之族莫不軋軋顒顒如也且天寶以來江左無物産資贍文法浸寬貪夫狥財小人趨利求兹官者十恆八九滉柅能制動絲克理棼過之所至刑必紏之非簡能之不知方矯時而為理興元初姦宄偷變震驚我師滉首獻方物奔貢漢中慶賜遂行邦用由濟貞元初嵗不有秋秦將歉食上憂乏用人心大搖滉發廩救災不俟終日萬鍾繼至二輔斯給昔蕭何轉漕關中冦恂資用河內皆以勤王幹蠱推功第一若敵而言則滉之功非細也爰命作相咨以財計用統邦一作九賦漢粟誠多超古之才髙謝主臣而巳㑹登用日淺其道未光然纍行疇庸可得而擬諡法曰慮國忘家曰忠安君不念巳危曰忠滉安國荒饉濟君艱難屬時多虞立權修賦危巳從怨忘家在公得非忠乎諡法曰剛德克就曰肅執心决斷曰肅滉剛而得位師克以貞令出惟行刑其必犯得非肅乎臣聞舉善不必求備易名是其大者昔謝琰定諡特以忠肅褒榮何曽議諡詔以忠肅追美稽滉勳勞無忝前烈伏請諡曰忠肅謹議左常侍桞渾諡議桞宗元尚書考功伏以魯史褒貶虞書黜陟彰善癉惡王教之端自周公已集作以來諡法未改謹按桞公纍歷臺閣集無此二字清貫茂著名節貞亮存誠潔廉中禮納忠為諍集作爭臣之表出守乃牧人之良刺舉必聞澄清可紀冒危而大節不奪更名而純誠克彰遂踐鼎司以匡王國奉上盡陪輔之志退跡有推讓之高圭璋問望洽於人聽所以聳厲在位關於政教聲聞王者其事實繁褒善勸能固將不廢宗元既當族屬且又通家傳信克備其遺芳考行敢徴於故事謹具署其懿績布以慤詞定諡之制請如律令謹狀下太常博士裴堪諡議曰貞奉敕依宗元乃渾之姪孫作此議上考功或是裴堪因其說而就諡曰貞故載之諡議駁尚書左僕射鄭珣瑜諡議太常博士徐復諡文獻駁之李巽議曰夫諡所以昭德也德既昭矣則文無以加焉故相國鄭公端操特立寡言愼行及居台司有蠲逋恤人之美有知難不汙之節雖無文若之進拔無孟子之是非無賑施之仁無謇諤之義然足以稱賢相也夫文人者大則經緯天地次則潤色王猷周文以至德為西伯季孫以道事其主咸諡曰文為美無以尚也亦焉用兩字然後為備哉竊觀一作以兩字之諡或有兼德一作得一字不足以盡盛德之形容故有兩字生焉然亦興于近古非三代兩漢之事也夫舉典之道信其正不信其邪春秋之大㫖也則兩字之諡非春秋之正也故相國鄭公之諡為文足矣焉用獻哉為獻可矣焉用文哉兩字兼諡竊所未諭請下太常寺重定謹議一作皆唐會要又議議曰鄭珣瑜令德清規坐鎮風俗理人而善政浹洽作相而謀猷密勿其終始事迹于時罕儔所以表賢易名實曰文獻夫文者煥乎大行獻者軒然髙名合而褒之厥有經義亦猶貞惠文子纍數其美至于再三以勸事君者今奉駁議其無進拔無是非無賑施無謇諤且曰二字之諡非三代兩漢之事愚以為異矣㢲之駁所謂進拔者豈不以推擇羣萃致之于庭乎珣瑜任司衡銓暨當鈞軸流品式叙英髦在朝若無奬拔之眀則何以至此但如來議寡言慎行故其端兆不可得而窺也當先朝之日上體不平姦臣王叔文招一作擅權作朋將害于國其視丞相如無也輕議一作詣是相府不循舊章珣瑜意雖能誅力固不足移疾髙謝萬情所歸則是非之眀孰大于此夫所謂賑施者在禮家施不及國賢人君子廣愛為心莫不開移物之源布厚生之政曩者恤災患免逋租亦既當之矣其于篤親庇族衣無常主踐名教者誰則不行若以分孤寡之資同于賑施則于一無此二字珣瑜一作之字所羞言也奚謂無哉至如謇謇匪躬前議巳書其微婉矣既承髙論敢不指眀德宗季年李實為京兆尹殊恩晝接貴幸無比而實以羡餘稱伐莫之敢非珣瑜衆詰所由上陳利害且曰取于人而未酬其直焉得有餘是其言不可謂之無謇諤矣伏以國朝宰輔諡文而兼字者代有人焉故房𤣥齡諡曰文昭狄仁傑諡曰文惠魏徴陸象先蘇環宋璟張說崔祐甫並諡曰文貞劉仁軌劉幽宋姚元崇裴耀卿張九齡並諡曰文獻李元紘韓休並諡曰文忠薛元超曰文懿盧懷慎曰文成蘇頲曰文憲楊綰曰文簡其餘不可悉數若以文包美不冝以他字配之則房𤣥齡狄仁傑以降昭惠貞獻忠懿成簡皆不得正矣我唐聲眀文物垂二百年更閲羣才發揮王度豈議名之典獨未得中耶不然何輕阻一作沮之為駁正所設但當論諡之當否不冝詰字之多少苟有不當雖一字之可乎若皆允冝雖二字何害如韋巨源附㑹凶黨李北海奪其嘉名所言至公人則悅服今既曰賢相而又非之君子于其言豈得苟而巳乎若云二字非三代兩漢之規則又異乎愚所學者夫威烈慎靜史作靚周王之諡也文終文成漢祖之佐命也霍光為宣成孔光為簡烈中代之勳德也劉寬為昭烈楊賜為文烈東郡之鼎臣也安謂其無二字哉况文之為諡一作名其義多矣有經緯天地焉有忠信接禮焉有寡立不懾堅强不暴焉有敏而好學不耻下問焉夫匪一端各有所當若皆俟西伯季孫之德然後稱文則魯侯與文伯歜之類皆不為文矣故誄諡之制因時一作特旌别前狀議珣瑜之行曰為一代之名臣斯其㫖歟謹上採禮經旁觀舊史參諸國典以定二名請依前諡曰文獻謹議又議議曰鄭珣瑜兩字之諡今太常請依前諡曰文獻者夫諡者春秋褒貶之㫖也仲尼書法隨類推廣雖一字褒貶其文猶博蓋欲指眀事業以昭示後代俾後之人懲其惡一有而字勸其善故不可苟夫諡一字正也堯舜禹湯周公召公是也兩字非正也故諡法不載或人臣不守彛章苟逞異端考烈慎靜史作靚是也或時主之權以功德加厚于臣也蕭何霍光房𤣥齡魏徴是也不當加而僣也孔光劉寬薛元超李元紘是也三字過也貞惠文一有子字是也亦諡法所不載也古今無有也公叔文子諡一作是衛君之過也衛之亂制也不然即記之失也以一美加一字即堯舜禹湯當纍數十字以為諡也夫禮記者非盡聖賢之意也非盡宣尼之所述也當時雜記也昔后蒼為曲臺記其弟子戴聖增損刋定為小戴禮今禮記是也若盡宣尼之所述即戴聖豈得而增也昔宣尼修春秋遊夏不能措一詞以知禮記非盡宣尼所述故戴聖得一作後以增損也則貞惠文子之諡衛君亂制也古今無有也非宣尼所述又何足法哉鄭珣瑜和茂修整始終無闕可為一作謂美矣至于議行考功而度越等輩比于鄼文成梁文昭魏文貞則不侔而諡號無差輕用國典失春秋之㫖矣向者鄼梁數公皆經綸草昧輔翼興王以道輔君致于化洽彰灼千古言之者凛然生敬而以珣瑜齒之豈無愧于心哉夫數公者皆時主感風雲之㑹懷謨眀之美故加于常典以眀其德亦所以篤君臣之義也然非正也權制也若後之人非數賢之比則當循常以避數賢地也其劉仁軌薛元超李元紘加字之諡皆黷國典而昧彛倫言之可為寒心豈當舉之以為訓也其餘姚元崇宋璟劉幽求或輔相一代致理平之化或忘身狥難成中興之業又豈珣瑜之以典選為進善以辭疾為嫉惡邪皆尚口僞辨非守典確論也夫以典選者皆為進善耶若然者則國家有天下二百年何裴行儉馬戴盧從願等數賢獨見稱于時也循資署置謂為進善異乎余所聞也又珣瑜之病數月而終豈僞疾耶一作也借使僞疾尤可怪也昔子路之冗食家臣有殺身狥難而珣瑜履台輔之重當危難之際平居則饗其髙爵厚祿見危則奉身自保以此為是非之眀即董狐之書趙盾為妄作也珣瑜之辭疾可責于太常舉以為德信君臣之義非常人所知也珣瑜之下詰李實誠中其疾可謂美矣然則珣瑜自始筮仕至于啓手足垂四十年歷諌職持風憲其忠規激發恐有過此者今太常舉其下詰李實未為多也謂為謇諤者衆矣豈能使汲黯魏徴有慙色哉前巽議云三代兩漢無二字之諡此末一作未學之過也無荀文若之進善無孟軻之是非無文子之賑施無周舍之謇諤以珣瑜之行清而無闕可為掩之不足辨也今所議兩字之諡亦又不當其議固一作故不足斥也前巽之言過矣但兩字之諡加等之美以蕭何房𤣥齡言不在珣瑜也巽雖不敏至于言諡美以感一作惑人聽此嘗所激切而不平也終不欲有僣齒于蕭何房𤣥齡之宗又不欲有造次擬于魏文貞姚元崇宋璟劉幽求之讜言悟主茂績殊勳也夫前車之覆後車所以易轍也前有司之失後有司當有以矯之也不矯之則逶迤遂逹以至亂制此有國之誡也考烈慎靜孔光劉寬薛元超李元紘之同于禹湯文武蕭何霍光房𤣥齡魏徴前有司之過後之專筆削者冝有以矯之也不矯之典禮寢亂矣有司不可以尤而效之也不可以黨所見而遂僣典也鄭珣瑜兩字之諡請下太常重議若一字不足盡珣瑜之盛德必須兩字則敢俟再告謹議竟從復議諡文獻駁左散騎常侍房式諡議太常博士陸亘諡曰傾乾度駁之韋乾度議曰詳觀貞元之末西蜀之事逆豎劉闢構難之初凶邪叶謀噭嘯相聚年深事逺十不記一然而磈磊不平鋒刺舋深者藏在骨髓請舉其梗槩一二焉式自忠州刺史故太師奏授劔南西川度支一作支庶副使後兼御史中丞又剖符蜀州是時貞元十八年也式因晝日昏睡如醉經宿乃寤詢一作訊其左右童僕不知其所從來後逾年却復使職㑹故使太師薨歿劉闢潜扇逆謀禍亂始胎式遂幸姦人之意為譎怪之語謂闢曰乃者蜀州昏病之中見公為上相盧文若為侍郎儀衛甚盛冨貴極矣他日無相忘賊聞大喜布滿軍縣自以為神授非人力也賊每接賔客肆談論撫羣邪申號令未嘗不以是為先深自以為祥兆也豈不因式作異言鼓妖孽惑亂平人堅一作武壯凶險不然何區區之蜀瑣瑣之冦王師討伐經費萬計﨑嶇阻險留年乃拔何哉蓋以式深為浹洽之辭激切嚚固不然何盤柢固根之甚也故使太師永貞元年八月薨其時乾度任殿中侍御史前使度支一作支度判官劉闢自攝行軍司馬節度留後九月初乾度被逐攝簡州刺史名雖守郡其實囚之眀年四月追回勒攝成都一本有射字縣令其時授闢西川節度詔命初下東川之圍未解乃召募亡命兼收管內鎮兵張皇虛聲扇一作熒惑郡縣發兵七千馬畜三萬號為十五萬人轉牒盩厔以來縣道郵次酒肉畢具芻茭無匿署牒首曰闢副曰式參謀曰符載令下之日妖氛一作氣坌興下愚沸騰貪冒姦賞奔走叛命肩磨轂擊爭死恐後當此之時卭蜀震驚田野廢業竄伏山谷邑居人吏分散道路如此之時一作事非得之于人皆親所聞覩時賊圍逼梓州之日一無此二字又王師諸軍稍稍繼至猖狂凶冦不復張矣然嘗察式為人柔而善佞不義不信一作不顧不義不然何劉闢文若喬規符載皆咨諏執禮拳拳以事之以斯而言可以知其所止矣伏以聖上法維天之度崇納汙之𢎞雖𤣥澤滂流鼓蕩昭洗然易名之典在正根源苟非其人不可加美如式西蜀之事大節已虧缺矣何靣目以求諡焉傾之為諡頗乖前狀請下太常重定謹議又議議曰式之在西蜀也入人耳目其事熟矣固非愛之者所能粉飾而文其論惡之者所能披抉而裝其說蜀之此時雖女子小人亦知凶闢斷頭之不日然為其用者乃救死于頸語其無勇烈之心斯可矣豈可盡被其附麗之名乎如式之于劉闢既不能去又不能死可謂求生害仁者也而駁議曰大節巳虧無乃過言歟何從聞之闢之走西山也召所疑畏者十數輩于庭將盡殺之然一作而後去而式在其間賴蒼黃之際闢黨有護持者僅免于難推嚮之論則不當如是眀矣然居此時有將見危授命之義殺身成仁之道詰之者稱式無愧色愚不信也不如是則式之去希烈也理河南也亷宣城也何以無忠敬之目歟愚論之曰式也不疾任永之目不閉吉挹之口乃罪也無王皓棄家之心無譙𤣥受毒之志其罪也如闢之反天子棄墳墓乃曰顧式說一夢以結其心署一牒以張其勢豈其然乎夫人臣不幸罹于是惟死而已矣然孟子曰生吾所欲也矧自軻巳下哉使死之易則王諒李業虞悝馮信不足貴也意者非一作將不可必死望人乎始不以一無此二字非不死罪之以懷生貶之是異論也夫諡者易其名者也夫子曰名以出信又曰名之必可言也名不正則言不順以至于刑罰不中正謂此耳夫豈容易哉語曰于其所不知蓋闕如也恍惚之夢駁議之外無言者懼非所以昭示後世也臯陶謨曰五刑五用哉言用刑必當其罪也刑其支體于一時猶須當其罪矧刑其行義揭之于千萬年歟康誥曰敬眀乃罰請依前諡為傾謹議一作皆唐㑹要駁贈司徒李吉甫諡議張仲方議曰古者易名請諡禮之典也處大位者舉其巨節蔑諸細行昭範當代彰示後人然後書之垂于不朽善善惡惡不可以誣故稱一字則至當焉舉一事則至眀焉定褒貶是非之宜泯同異紛綸之論李吉甫禀氣生材乘時佐治博涉多智一作知含章炳文燮贊隂陽經綸一作緯邦國惜乎通敏資性而便媚取容故載踐樞衡疊補台衮大權在巳沉謀一作議罕成好惡狥情輕脫寡信諂淚在臉遇便則流巧言如簧應機必發夫大臣之翊戴元后者端俗一作恪致治孜孜夙夜緝熙庶績平章百揆兵者凶器不可從我始及其伐罪則料敵以成功至使內有害輔臣之盜外有懷毒薑之孽師徒暴野戎馬生郊皇上旰食宵衣公卿大夫且慙且耻農人不得在畝紡婦不得事一作在桑耗賦斂之常資散帑藏一作庫之中積徴邊徼之備竭運挽之勞僵尸血流胔骼成嶽毒痛之聲一無此二字號呼無辜勦絶羣生一無此二字逮今四載禍胎一作辭之兆實始其謀遺君父之憂而豈謂一有為之二字先覺者乎夫國之論大功者不可以妄取不可以枉致必咨籌畫乃著丕顯不競而分豈妨全美當削平西蜀乃言語侍從之臣擒剪東吳則訏謨廊廟之輔較其時一作德則有異言其力則不倫何乃捨一作取其所重一作輕而録一作捨其所輕一作重存一作録其所小而略其所大且奢靡是嗜而曰愛人以儉授受無守而曰慎才以補斥諌諍于外豈不近之蔽聰乎舉忠烈之廣豈不近之匿愛乎焉一作烏有蔽聰匿愛家範無制而能垂法作程憲章百度謹按諡法曰敬者夙夜警戒曰敬書曰敬明乃訓易曰敬以直內內而不肅何以形于外憲也者刑也法也戴記曰憲章文武又曰發慮憲義以為敬恪終始載考歷位未嘗劾一法官讞一小獄及居重位以安和平易寬柔自處考其名與其行不類研其事與其道不侔一定之辭帷精審慎異日詳制貽諸史官請俟蔡冦將平天下無事然後都堂聚一作叢議諡亦未遲謹議敕賜曰忠一作皆唐會要贈太保于頔諡議王彥威議曰于頔剛毅特立博逰文藝藴開物成務之志為縱橫倜儻之才刺湖州復南朝舊陂以溉人田由是斥一作舄鹵生稻梁嵗時大化得丁壯之物籍者取什一代貧人租入故輕重以濟江南卑濕送終者無懸窆封樹之制髙則不一作不可隱深則及泉土才周棺水至露胔頔悉命以官地收瘞當時稱之為蘇州則繕完隄防疏鑿畎澮列樹以表道决水以溉田其為襄陽當吳少誠弄兵王師不乏糧五字或作王師有征軍不乏見糧軍或作師未嘗退表克吳房即山生得賊將遽以兵柄授之推誠于人有古將略然惜其不能善終如始奉初以還跋扈立名滿盈不戒則有司擬議之際安可不善善而惡惡哉元洪刺郡以官事被謫中貴人銜命部領便道之徒所路出于漢頔遽命武士持刃捕捽洪既就執王人徒歸又不奉詔出師而西抵于鄧軍聲甚雄人聽日駭夫師出以律其出不命時人不能識其指歸王者功成而作樂諸侯則否頔之反斾于蔡也作文武順聖樂貞元御㝢務求寵綏有司請編優詔許之一作莫逆事出一時之澤樂作諸侯之庭良可惜哉然則如頔者是知樂之可作而不知禮之不可作者也迹其馭衆為政之術蓋初以利興害去為巳任而令行禁止其源出于法家者流文深意苛有犯無捨至有屋誅同命之慘然未嘗别白其罪以示顯戮人到于今而寃之洎乎天姻一作恩下浹元侯入覲朝廷申婚姻之好復以宰相待之則又子罪官貶而連起國獄縉紳之論寖益非之謹按諡法殺戮不辜曰厲愎狠遂過曰厲請諡為厲或曰頔頔字一作太保繇文學政事而揚歷中外卒當登壇補衮之寄推于事任亦謂難能則易其名者宜兼舉美惡二字以正褒貶今特諡為厲或有未安愚以為不然誄一作夫類能而授聖人之勸勉議諡貴當有司之職分禮經言諡蓋節以一惠至于論撰之際要當美惡咸在細大無遺議乎諡一作易名則以優迹春秋之義也况援其功不足以補過契其美不足以掩瑕其馭下也任威少恩其事上也失忠與敬諡之為厲不亦宜乎敕賜諡曰忠晉諡恭世子議白居易晉侯以驪姬之惑殺太子申生或謂申生得殺身成仁之道是以晉人諡為恭世子載在方册古今以為然居易獨以為不然也大凡恭之義有三以孝保身子之恭以正承命臣之恭以道守嗣君之恭若棄嗣以文粹作于非禮不可謂道受命于非義不可謂正殺身以非罪不可謂孝三者皆非恭也申生有焉而諡曰恭不知其可若垂之來代以為訓戒居易懼後之臣子有失大義守小節者將奔走之將欲商𣙜敢徴義類在昔虞舜父頑母嚚舜既克諧瞽亦允若申生父之昏姬之惡誠冝率子道以幾諌感君心以至誠雖申生之孝不侔于舜而獻公之頑亦不逮于瞽盍以蒸蒸之乂俾不格于姦乎故咎之始形則齊栗祗載文粹有而字為虞舜可也若不能及禍之將兆則讓位去國為吳太伯可也若又不能及難之既作則全身逺害為公子重耳可也三失無一得于是乎致身于不義不祗陷父于不德不慈負罪被名以至于死臣子之道不其惑歟夫以堯之聖書美曰允恭舜之孝書美曰溫恭今以申生之失道亦謂曰恭庸可稱乎周之衰也楚子以霸王之器奄有荆蠻光啓宇土赫赫楚國由之而興諡之為恭猶曰薄德今申生殉其死不顧其義輕其身不圖其君俾死之後弒三君奚齊卓子懷公殺十有五臣荀息里克丕鄭祁舉共華賈華叔堅騅歂纍虎特宫山祁慶鄭狐突瑕甥卻苪也實啓禍先大亂晉國則楚恭之得也如彼申生之失也若此異德同諡無乃不可乎左氏修魯史受經于仲尼蓋仲尼之志丘明從而明之無善惡無大小莫不微婉而發揮焉至于申生之死也之諡也略而無譏何其謬哉何以核諸且仲尼修春秋明則有凡例幽則有微㫖其有君不君臣不臣父不父子不子者率書名以貶之故書曰晉侯殺其太子申生不言晉人而書晉侯且名太子者蓋明晉侯不道且罪申生陷君父于不義也以微㫖考之則仲尼之明貶可知也文粹集本作矣以凡例推之左氏之闕文可知矣嗚呼先王之制諡豈容易哉善惡始終必褒貶于一字所以彰明往者而勸沮來者故君子于其諡無所苟而已矣繇是而言則恭世子之諡不亦誣乎不亦誣乎改恭太子一作改恭君諡議李溪魯僖公五年晉殺其太子申生先聖之書惡用讒也是時國中請諡不亦過乎詩曰溫溫恭人惟德之基亦曰溫恭朝夕執事有恪皆極言也是故子服景伯戒其徒曰陷而入于恭閔子馬國語作閔馬父笑之為疑作謂周恭王能庇其國語無其字昭穆之闕而為恭楚王能知其過而曰恭先王恭亦不敢自專稱曰自古在昔由是知恭固不易名也今觀申生之事未有得其稱者夫禍機將發子輿之謀狐突之諌明而知之既不肯用至于將死之日復不能以六日之狀自明而曰君安驪姬君非姬氏居不安食不飽我辭姬必有罪是我傷公之心也乃受賜而死嘻越哉其過也獻公雖暗昧好聽讒非中心知之而猶好之也以晉國之地方千里財用之給士女之衆求聘妃后豈無超于驪姬者哉然而獨任專寵諸姬莫奪者得非希意釣情機切其密以傷君心使然耶如此則必以姬之行為善以姬之言為實安而任之漸至作亂史蘇所謂甘受逞而不知至夫事狀明著姦詐漏泄知其不善顯其不實如醉而醒如寐而覺震電慿怒執而戮之必使夬然剛决矣復安有傷心至于不安居飽食哉設令既戮之後思其儀質而怊悵者則亦念其欺罔忿恨矣謂恐傷心無乃謬歟且申生將使獻公逹嘉聲于億載鎮令譽于千古甚于安其居飽其食也失令名于後裔貽讒言于孫謀甚于居不安食不飽也推此大義傷心猶亦不害况于無傷而遽至死耶遂使長惡不懲譛二公子豈曰能庇其昭穆之闕乎沉迷不返人諫而拒豈曰能知過乎親不能庇非執事有恪也過不能知非為德之基也乃此疑滯不通之論謂之恭君亦已過矣諡法曰壅遏不通曰幽如申生者真是也稽之典法改諡曰幽太子使夫後代知所以事君父之道必左右輔弼使不陷令名于簡冊之中不獨虛死其身偷安尊者于日夕而巳丈苑英華卷八百四十一
