body:
  text: 文苑英華卷一百九十三宋李昉等編樂府二神仙篇三首升仙篇一首升天行三首步虛詞十首飛龍引三首鳳簫曲一首鳳笙曲一首陽春歌六首金一作會樂歌三首白紵歌十八首美女篇四首日出東南隅四首日出行三首月重輪一首泛舟行大江二首雨雪曲六首神仙篇張正見集無億舜日萬堯年詠湛露歌採蓮願雜百和氣宛轉金爐前同前盧思道浮生厭危役一作促名嶽共招携雲軒遊紫府風駟立一作上丹梯時見遼東鶴屢聽和一作淮南雞玉英持作寶瓊實採成蹊飛策揚輕電懸旌耀彩霓瑞銀光似燭靈石髓如泥寥廓鸞山右超遙樂府作越鳳州西一作超遙鳳渚西四一丸應五色特此救行迷此詩二百三十五卷道門重出今已削去注異同為一作同前魯把樂府作汜王逺尋仙至欒巴訪術回乘空向紫府控鶴下蓬萊霜分白鹿駕日映流霞杯煎金丹未熟醒一作醖酒藥初開乍應觀海變誰肯畏年頽升仙篇梁簡文帝少室堪求道明光可學仙丹繒碧琳宇緑玉黃金篇雲車了無轍風馬詎須鞭靈桃恆可餌幾回三千年升天行三首劉孝威類聚作曹植乘橋一作蹻追術士逺之蓬萊山靈液飛素波蘭柱上參天文一作玄豹遊其下翔鸞一作鵾戲其巔乘風忽登舉倣佛一作防隍見衆仙二扶桑之所生乃在朝陽溪中心陵蒼皓一作昊布葉蓋天涯日出登東幹既夕沒西枝願得紆陽轡回日使東馳同前盧思道尋師得道訣輕舉厭人羣玉山候王母珠庭謁老君煎為返魂藥刻作長生文飛策乘流電雕軒曵彩一作紫一作白雲玄洲望不極赤野眺無垠金樓旦蹇嵼玉樹曉氛氲擁琴遙可聽一作望吹笙逺詎聞不學一作覺蜉蝣子干侣一作迢一作葬何紛紛道士步虛詞五首庾信渾成空教立元始正圖一作塗開赤玉靈文下朱陵真氣來中天九龍館倒景八風臺雲度絃歌響星移宫殿回青衣上少室童子向蓬萊逍遙聞四會倐忽度三災二東明九芝蓋北燭一作屬五雲車飄颻入倒影出沒上煙霞春泉下玉霤青鳥向金華漢帝看桃核齊侯問棗花上元應送酒來向一作在蔡經家三歸心遊太極回向入無名五香芬紫府千燈照赤城鳳林採珠實舂一作龍山種玉榮夏笛三山響一作夏簧三舌響春鐘九乳鳴絳河應逺别黃鵠來相迎四凝真天地表絶相一作想寂寥前有象猶虛豁忘形本自然開經壬子世一作歲值道甲申年回雲隨舞曲流水逐歌弦石髓香如飯芝房脆似蓮停鸞宴瑶水歸路上鳴天五洞靈尊上德虞石會明真要妙思玄絶一作紀虛無養谷神丹丘乘翠鳳玄圃馭斑麟一作驎移梨付苑吏種杏乞山人自此逢何世從今復幾春海無三尺水山成數寸塵同前釋皎然豫因覽真訣遂感西城作域君玉笙下青𡨕人間未曽聞日華錬精一作魂魄精魄一作皎皎無垢氛謂我有仙骨且令餌氤氲俯仰愧靈顔願隨鸞鵠羣俄然動風馭縹眇歸青雲同前太清宫作顧况逈步遊三洞清心禮七真飛符超羽翼焚一作禁火醮星辰殘藥沾雞犬空一作靈香出鳳麟壺中無窄處願得一容身同前二首陳羽漢武清齋讀鼎書太一作內官扶上畫雲車壇上月明宫殿閉仰看星斗禮空虛二樓殿層層阿母家崑崙山頂駐紅霞笙歌出見穆天子相引笑看琪樹花同前蘇郁十二樓藏玉牒中鳳凰雙宿碧梧桐流霞淺酌留君醉今夜吹簫第幾重飛龍引二首李白黃帝鑄鼎於荆山鍊丹砂成黃金成黃金六字集作丹砂成黃金騎龍飛去太清一作上家雲愁海思令人嗟宫中綵女顔如花飄然揮手凌紫霞從風縱體登鸞車一作從登鸞車侍軒轅侍軒轅一作疊句遨遊青天中其樂不可言二鼎湖流水清且間軒轅去時有弓劍古人傳道留其間後宫嬋娟多朱一作花顔乘鸞飛煙亦不還騎龍攀天造天關造天關聞天語長一作迎雲河車載玉女過紫皇紫皇乃賜白兔所搗之藥方後天而老凋三光下視瑶池見王母蛾眉蕭颯成一作如秋霜同前陳陶有熊之君好神仙餐霞錬石三千年一旦黃龍下九天騎龍枿枿升紫煙萬姓攀髯髯墮地啼呼弓劍飄寒水紫鸞八九墮玉笙金鏡空留照魑魅羽幢褵徙銀漢秋六宫望斷芙蓉愁應龍下揮中園笑泓泓水繞青苔洲瑞風颯還天光淺瑶闕峩峩橫露苑沆瀣樓頭紫鳳歌三株樹下青牛飯鴻龎九闕相玉皇鈞天樂引金華郎散花童子鶴衣短投壺姹女蛾眉長彤庭侍宴瑶池席老兔春髙桂宫白蓬萊下國賜分圭阿母金桃容小摘仙流萬緘蟲篆春三十六洞交風雲千年小兆一蟬蛻丹臺職亞扶桑君金烏試浴青門水下界蜉蝣幾回死鳳簫曲雜言沈佺期八月涼風下髙閣千金麗人卷綃幕已憐池上歇芳菲不念君恩坐搖落世上榮華如轉蓬朝隨阡陌暮雲中飛燕侍寢昭陽殿班姬飲恨長信宫長信宫昭陽殿春來歌舞妾自知秋至容華君不見昔時嬴女厭世氛學鳳吹簫乘綵雲含情轉盼向蕭史千載紅顔持贈君鳳笙曲前人憶昔王子晉鳳笙遊雲空揮手弄白日安能戀青宫豈無嬋娟子結念羅幃一作帳中憐夀不貴色身世兩無窮陽春歌柳顧言春鳥一囀有千聲春花一叢千種名旅人無語出簷楹思鄉懷土志難平唯當文共酒暫與興相迎同前顧野王春草正芳菲重樓啓曙扉銀鞍俠客至柘彈宛一作婉童歸池前竹葉滿井上桃花飛薊門寒水歇為斷流黃機同前吳邁逺百里望咸陽知是帝京域一作國緑樹搖雲光春城起風色佳人愛華景流靡園塘側妍姿艷月映羅衣飄蟬翼宋玉歌陽春巴人長嘆息雅鄭不同賞那令君愴惻生重愛一作受惠輕私自憐何極同前吳象之簾低曉露濕簾卷鶯聲急欲起抱箜篌如疑彩絃澀孤眼愁不轉點淚聲相及淨掃街上花風來更吹入同前檀約青春獻初歲白日映雕梁蘭萌猶自短柳葉未能長已見紅花發復聞緑草香乘此試遊衍誰知心獨傷同前李白長安白日照春空緑楊結煙垂裊風披香殿前花始紅流芳發色繡戶中繡户中相經過飛燕皇后輕身舞紫宫夫人絶代歌聖君三萬六千日嵗嵗年年奈樂何金一作會樂歌梁元帝鳴鳥怨别偶曙鳥憶離一作誰家石門一作闕題書字金燈飄落花東風一作方曉星沒西山晚日斜縠衫廽廣袖團扇掩輕紗暫借青驄馬來送黃牛車同前房篆前漢流璧水後渚映青天登臺臨寶鏡開窗對綺錢玉顔耀光彩羅袖拂金鈿春風散輕蝶明月映新蓮摘花競時侣催柏及芳年同前梁簡文帝槐花欲覆井楊栁正藏鴉山爐好一作當無比玉構火牒賖牀頭辟繩結鏡上領巾斜鐡鑊一作鍾種梁子銅樞生秦一作棗花開門枕水柱一作拋水柱城控一作按特言家白紵歌梁武帝朱絲玉筯羅象筵飛管促節舞少年短歌流目未肯前含笑一轉私自一作自知憐二朱光灼爍照佳人含情逺一作送意遙相親嫣然一一作婉轉亂心神非子之故欲誰因此篇文苑英華接武帝前篇共是一首今郭茂倩樂府拆而為二其題作沈約夏白紵歌却别有武帝一首如後纎腰嫋嫋不任衣嬌怨獨立特為誰赴曲君前未忍歸上聲急調中心飛同前五首張欒秋風鳴一作蕭條露垂葉空閨光盡生一作坐愁妾獨向長夜淚承睫山髙水深一作照非路難涉望君光景何時接二遙夜風逺時既寒秋風蕭瑟白露團佳期不待歲月闌念此遲暮獨無歡鳴絃流管增長嘆三歌兒流唱聲欲清舞女趂節體自輕歌舞並妙會人情調一作依絃度曲惟一作婉盈盈揚一作娥眉為態誰自成一作自誠四遙夜忘寐起長嘆但望雲中雙飛翰明月入牖風吹幔中夜悠悠坐申旦誰能知我中心亂終然有懷歲方晏五日暮搴門望所思風吹庭樹月入帷涼隂既滿草蟲悲誰能離别長夜時流嘆不寐一作寢淚如絲與君之别終何如同前四時隋煬帝東宫春前人洛陽城邊朝日暉天淵池前春燕歸含露桃花開未飛臨風楊柳自依依小苑花紅洛水緑清歌婉轉繁絃促長袖逶迤動珠玉千年萬歲陽春曲江都夏前人梅黃雨細麥秋輕楓樹蕭蕭江水平飛樓綺觀軒若驚花簟羅幃當夏清菱潭落日雙鳬舫緑水紅粧兩搖漾還似浮桑碧海上詎一作誰肯空歌採蓮唱和同前郭茂倩樂府作江都夏盧茂長洲茂苑朝夕池映日含風結細漪坐堂一作當伏檻紅蓮披一作枝非雕軒洞户青蘋吹輕幌芳煙鬱金馥綺簷花簟桃李枝蘭苕翡翠但一作恆相逐桂樹鴛鴦恆並宿長安秋郭茂倩樂府又有茂此篇並附于此露寒臺前曉露清昆明池水秋色明搖環動珮出曽城鵾絃鳳管奏新聲上林蒲桃合縹眇甘泉竒樹上蒼青玉人當歌理清曲媫妤恩情斷復續同前三首李白揚清歌發皓齒北方佳人東鄰子且吟白紵停緑水長袖拂靣為君起寒雲夜卷霜海空胡風吹天飄塞鴻玉顔滿堂曲集作樂未終館娃日落歌吹濛一作深一無此句二月寒江深夜沉沉美人一笑千黃金垂羅舞縠揚哀音郢中白雪且莫吟子夜吳歌動君心動君心冀君疑賞願作天地雙鴛鴦一朝飛去青一作緑雲上三吳刀剪綺集作絲縫舞衣明粧麗服奪春暉揚目集作眉轉袖若雲飛傾城獨立世所稀激楚結風舞名醉忘歸髙堂月落燭已微玉叉挂纓君莫違同前二首楊衡玉纓翠佩雜輕羅香汗微漬朱顔􅋳為君起唱白紵歌清聲裊雲繫思一作思繫多疑笳哀瑟一作琴時相和金壺半傾芳夜促梁塵霏霏暗紅燭令君安坐聽終曲墜葉飄花難再復二躡珠履步瓊筵輕身起舞紅燭前芳姿艷態妖且妍回眸轉袖暗催絃涼風蕭蕭漏水一作流水急月華泛灔紅蓮濕牽裙攬帶翻成泣同前陳標吳女秋機織曙霜氷蠶吐絲月盈筐金刀玉指裁縫促水殿花樓絃管長舞袖慢移凝瑞雪歌塵微動避雕梁唯愁一作恐陌上芳菲度狼籍鳳池荷葉黃美女篇蕭子顯章丹一作邯鄲暫輟舞巴姫請罷絃佳人淇浦出一作洧上豔趙復傾燕繁穠既為李照水亦成蓮朝酤成都酒暝數河間錢餘光幸未借一作惜一作許借蘭膏空自煎同前梁簡文帝佳麗盡關情風流最有名約黃能效月裁金巧作星粉光勝玉靚衫薄擬蟬輕密態隨流臉餘嬌逐語聲一作嬌歌逐軟聲朱顔半已醉微笑隱香屏同前盧思道京洛多妖艷餘春愛物華俱臨梁燈一作墱水一作恆臨鄧渠水共採鄴園花時搖五明扇聊駐七香車情疏看笑淺嬌深盼欲斜微津染長黛新溜濕輕紗莫言人未解隨君獨問家同前王琚東鄰美女實名倡絶代容華無比方濃纎得中非短長紅素天生誰飾粧桂樓椒閣木蘭堂繡户雕軒文杏梁屈曲屏風繞象床萎蕤翠帳綴香囊玉臺龍鏡洞徹光金爐沉煙酷烈芳遙聞行珮音鏘鏘含嬌含笑出洞房二八三五閨心切褰簾卷幔迎春節清歌始發詞怨咽鳴琴一弄心斷絶借問哀怨何所為盛年情多心自悲須臾破顔倐斂態一悲一喜併相宜何能見此不注心惜無媒氏為傳音可憐盈盈直千金誰家君子為藁砧日出東南隅行沈約朝日出邯鄲照我叢臺端中有傾城艷顧影織羅紈延軀似纎約遺視若回瀾瑶粧映層綺金服炫雕欒幸有周一作同匡好西仕服秦官寶劔隨玉具汗馬飾金鞍縈場類轉雪逸控寫一作似騰鸞羅襟一作衣夕解帶玉叉暮垂冠同前蕭子榮大明上迢迢陽城射陵霄光照窗中婦絶世同阿嬌明鏡盤龍刻簪羽鳳凰雕逶迤梁家髻冉弱楚宫腰輕紈雜重錦薄縠間飛綃三六前年暮四五今年朝蠶園拾芳繭一作蠶籠拾芳翠桑陌採桑一作柔條出入東城裏上下洛西橋路逢車馬客飛蓋動襜軺單衣鼠毛織寶劔羊頭銷大夫疲應對御一作從者輟連鑣一作御鑣住間徒脈脈垣上幾翹翹女本西家宿君自上宫要漢馬三千一作萬匹夫壻仕嫖姚鞶囊虎頭綬左珥鳬盧貂橫吹龍鍾管奏鼓象牙簫十五張內侍十八賈登朝皆笑顔郎老盡訝董公超同前盧思道初月正如鈎懸光入鏡一作綺樓樓中可憐妾如恨亦如羞深情出艷語密意滿橫眸楚腰寧且細孫眉本未愁青玉勿當取雙銀詎肯一作可留會待東方騎遙居最上頭同前李白秦樓出佳麗正值朝日光陌頭能駐馬花處復添香日出行蕭撝昏昏隱逺霧團團乘陳雲正值秦樓女含嬌酬使君同前李白日出東方隈似從地底來歷天又復入西海六龍所舍安在哉其行終古不休息一作始與終古不息人非元氣安得與之久徘徊草不謝榮於春風木不怨落於秋天誰將集作揮鞭䇿驅四運萬物興歇皆自然羲和羲和汝奚汨沒於荒淫之波魯陽何德駐景揮戈逆道違天矯誣實多吾將括囊集作囊括大塊浩然與溟涬同科同前李賀白日下崑崙發光如舒絲徒照葵藿心不見遊者集作子悲浙浙集作折折黃河曲日從中央轉㿩谷耳曽聞弱集作若水眼不一作不可見奈何爍石胡為銷人羿能彎弓屬矢那不中足令烏不得翔火不得奔詎教晨光夕昏月重輪戴皓皇基屬明兩副德表重輪輪重非是暈桂滿自恆春海珠全更滅二作減階蓂翳且新媫妤比團扇曹王譬洛神浮川疑讓璧入户類燒銀從來看顧兔不曽聞鬬麟北堂豈盈手西園遍照人泛舟橫大江梁簡文帝滄波白日暉遊子出王畿旁望重山轉前觀逺帆稀廣水浮雲吹江風引夜衣旅鴈同洲宿寒鳬夾浦飛行客誰多興當念早旋歸同前張正見大江修且濶揚舲度回磯渡中畫鷁涌帆上錦花飛舟移停集作厯浦月棹舉濕春衣王孫若定一作客若一作定若逺誰得一作詎得送將歸雨雪曲王筠樂府作江暉邊城風雪至客一作遊子自心悲風哀笳弄斷雪暗馬行遲輕生本為國重氣不關私恐君猶未信撫劔一揚眉同前張正見胡關辛苦地雪露逺漫漫含氷踏馬足雜雨凍旗竿沙漠飛恆暗天山積轉寒無因辭日逐團扇掩齊紈同前江總雨雪阻榆溪從君度隴西繞陳看狐迹依山見馬蹄天寒旗彩壞地暗鼓聲低漫漫愁雲起蒼蒼别路迷同前陳暄都尉出祁連雨雪滿雞田雕陵持抵鵲屬國用和氈氷合軍應度樓寒烽未燔一作燃花迷槎未著踈勒復經年同前謝燮朔邊昔離别寒風復悽切峩峩六尺氷飄飄千里雪深閉一作未塞袁安户行封蘇武節用一作應隨隴水流幾回一作過凝鳴咽同前盧照鄰虜騎三秋入關雲萬里平雪似胡沙暗氷如漢月明髙闕銀為闕長城玉作城節旄零落盡天子不知名文苑英華卷一百九十三
