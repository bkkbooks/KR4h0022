body:
  text: 文苑英華卷六百三十宋李昉等編謝恩三謝勑書手詔狀一首謝中使招撫狀一首奏廣州結好使事由奉詔書謝恩狀一首謝宣慰等狀七首謝御札狀一首謝賜藥狀二首謝臘日賜藥等狀一首謝賜藥金盞等狀一首謝賜藥金狀一首謝賜神刀食金狀二首謝醫藥狀二首謝問疾狀一首謝賜紅雪等狀一首謝勑書手詔狀常衮右今月十一日中使劉廷玉至奉宣慰命賜臣前件書詔臣謬忝防虞未申戎效寄分亷察又乏吏能尸素實深咎責難逭聖慈𢎞貸榮渥纍霑俯降天書兼賜墨詔睿詞寵飾曽無毫髮之勞宸旨密臨特受腹心之寄自驚朽骨逺被殊恩捧承戰悚擎跪踴躍駑蹇之力過負已多鴻私未酬慙懼彌積軍州同慶惠澤漙將慰勉載加感恱交集無任抃躍惶悚之至為王大夫謝中使招撫狀崔行先臣某言頃者元誼等擅固城池有違詔命臣出師野次持守經年以水攻圍俟其離變誓殱凶叛以靜方隅伏以陛下至德至仁好生惡殺恐失理死不忍誅夷特令中使就此招撫今洺州收復閭井獲安此皆天威光被神武底定顧惟愚陋載荷鴻私不勝感戴踴躍之至奏廣州結好使事由奉詔書謝恩狀裴次元右臣伏奉某月日手詔令臣速具前件官本末事由聞奏臣去月日謹具某官歸本道事以聞某月日奏官至伏奉某月日手詔所奏某官尋赴廣州事宜具詳本末想宜知悉者臣伏以綸綍下於紫霄明命光於滄海榮深感極寵洽心驚周章失圖歡惕交集顧臣鄙劣忝寄藩維無補涓埃纍更涼燠矧兹地逺敢望恩加日月照臨之明無幽不燭乾坤生成之德在物莫遺豈期奏報常儀特降詔書慰撫事逾等列喜萬恆情伏以軒墀一違嵗序三變謬職愧深於星琯荷恩思拜於彤庭厠清列於班行峩冠劒而何日守炎荒之遐服甘瘴癘以嬰身懷死節之丹誠願生還於絳闕每承存諭之命更切攀戀之心臣不勝感恩歡躍屏營之至為人謝宣慰狀令狐楚右監軍李輔光回伏奉勑書手詔宣慰臣及參佐將校官吏等者臣竊位大藩連榮近屬戴山之力雖竭橫草之功未聞寢興以思憂愧若厲伏惟陛下日明于上子育其人降玉筯之天書遣銀璫之星使宸心照育下浹於將校慈旨丁寧旁霑於掾吏歡呼之聲雷動舞抃之袖雲翻榮光併臨愁疾如矢不勝歡喜感戴之至謝勑書手詔慰問狀右監軍使李輔光回伏奉勑書手詔慰問臣及將士等者臣自守大藩未申微效每承渥澤實所慙惶今者伏蒙陛下𢎞覆幬之仁與天為大廣照臨之意如日斯升特遣王人復還使府捧絲綸之明詔光寵賤微吐汗漫之溫言霑濡羣萃浮空而喜氣成霧動地而歡聲若雷空知受恩何以勝德所守有限不獲陳謝無任感戴之至謝口勑慰問狀右中使孟升進至伏奉口勑慰問臣及將士等臣素非公才叨總戎律清平無事績用未彰伏惟陛下子惠兆人天成萬物降星分之使宣綸出之言問以炎涼勉其勞役恩踰素望榮冠常倫跪聽歡呼衆心如一臣等不勝感戴之至謝宣慰狀右監軍使某回伏奉勑書手詔兼宣恩旨慰問臣及將士等伏以天地大鈞固無私於覆載豚魚微類皆有荷於生成臣實庸虛叨膺奬用至於師人輯睦封略乂安皆稟廟謀無非宸算豈意天慈廣被聖眷旁流歸復監臨昭宣慰撫為膏之雨泛灑於編人如綍之言傳聞於列校歡生衆口感結羣心同守節以戴天各輸忠而報國臣與將士等不勝感恩抃躍之至謝勑書手詔慰問狀右某月日中使某至伏奉勑書手詔慰問臣及將士參佐等并賜臣官告旌節兼宣口勑授臣節制者臣伏以聖澤汪洋高卑盡滿皇明照耀微細不遺內愧瑣材上煩慈旨朝聞夕惕豈復遑寧夜思晝行不敢失墜今者三軍輯睦萬井歡康皆慿天威盡出宸算慙將孱劣虛受恩榮某月日已差衙官某奉表陳謝訖無任感戴之至謝宣慰諸州軍鎮等狀右中使至伏奉某月日詔書令中使宣慰諸州刺史外鎮將士等令臣亦使人安撫者臣凖詔差虞候張液隨中使某所在存問以某月日却到太原伏以設官分職邦國之恆􅒑秉義納忠人臣之素分伏惟皇帝陛下嘉其奉上念以守邉降驛騎於九重諭天心於萬里法南風之長養豈擇卑微並白日之照臨不遺遐逺邉城將校井里黎人競鼓舞於皇明盡霑濡於聖澤室家相慶關塞無虞臣忝守戎旃不任欣抃之至為崔仲孫弟謝手詔狀右中使尹偕至伏奉手詔慰問臣等伏以聖澤均霑天光下燭欣榮感戴不勝自任臣生代未諧遭家不造嬰孩之日長養於外家童冠之年因依於伯姊容身寄食以至於今李説念臣以密親署臣以散職誓將禆補義不依違誠意莫申大期俄迫今者獲成安泰仰荷聖明豈期特降恩波深蒙慰撫昆蟲賤命不可以戴天葵藿微心空知其向日親踈共感存殁同榮無任感恩抃躍之至謝御札狀元稹御札二十三字右泰倫重晏至宣賜臣前件御札其中聖旨云鎮州逆亂枉害忠良若與元冀鎮州節度便集作使是捨賊之門者伏以睿算若神聖慈猶父視凶狡之構亂義在克清念台輔之䘖寃期於必報此蓋仁深天地勇過雷霆臣實庸愚難議窺測況臣謨集作謀猷失次罪戾是憂宸翰忽臨天章煥發舞鳯回翔於懷抱飛龍顧盼於縑緗豈獨傳之子孫便合鏤於肌骨微臣無任踴躍光榮之至謝賜藥狀集作表張説右內使陳忠盛宣旨賜臣痢藥臣攝生無方自貽疾疢聖慈矜憫垂恩救護氣衰力憊忽吞永命之符腸滑胃虛更服集作餌返魂之草蒙天營祐集作護指日痊平雖萬粉灰何酬造化謹附忠盛奉狀陳謝以聞謝勑賜藥狀張九齡右高力士奉宣恩旨賜臣等鹿角膠丸及駐年靣脂有命自天感戴並至臣等涓滴無補渥澤日深多愧股肱之良每慙智力之效徒承聖恩同體之義更霑御藥駐年之賜事絶希幸禮優常遇微軀賤貌因殊集作大造而載延捧日承天荷曲成而靡集作無極無任悚戴之至為晉公謝臘日賜藥等狀苑咸右昨晚內使曹侍仙至奉宣聖旨賜臣臘日所合通中散駐顔靣脂及鈿合并吃力伽丸白黑蒺藜煎楷齒藥等逼夜又賜粳米一百石麵二十袋適中使楊元新至又賜鯸鮧魚魴魚鮭魚等仍便令膳造伏以嘉平舊節鍊藥良辰錫靈仙之祕方均雨露之殊澤金膏玉散駐齒髮於衰容瑞麵香粳頓豐盈於私廪況鯸魚魴鮭等降自天厨中使炮烹皆承聖法不資椒桂之力備適鹽梅之味臣竊位嵗久叨榮日深調鼎之功未施於毫髮登爼之美屢浹於恩波徒荷生成何酬造化無任稠疊感戴之至謝賜藥金盞等物狀右內給事袁思藝奉宣聖旨賜臣藥金盞一匙并參花密餘甘煎及平晚合二兼令中使輔朝俊親授昨所賜金方法者伏以聖澤無涯已沐九天之施真方不祕更示八公之法王人俯及寶器仍頒自昔名臣近代良佐雖功業攸著或不承此賜况臣才不逮古雨露之澤逾深任重當時涓塵之效無補仰瞻玄造上答何階無任感戴之至謝賜藥金狀右內給事袁思藝至奉宣聖旨賜臣江東成金二挺若服之後深有補益兼延駐者伏以仙方所祕靈藥稱珍必候休明之辰上益無疆之夀不意俯回天眷念及微臣賜九轉之金駐百年之命且螻蟻賤質豈能長固蒲桞易朽常慮先凋竊荷生成之恩寧酬造化之德澤如河海空欣羽翼之期寵若丘山何伸灰粉之謝不任欣抃之至謝賜神刀食金等狀鄭絪右今日中使某至奉某月日墨詔賜臣前件神刀及食金五挺并合子鎖等臣逺赴藩鎮上軫聖憂俯降王人特頒寵賜暢威懷於逺服佩以神刀矜微劣之庸軀賜之靈藥捧受戰越以忭以驚臣即以今日發藍田縣闕庭漸逺道里猶長瞻望天顔感涕交集無任戴荷結戀之極謝賜手詔兼神刀藥金狀孔戣右中使某至伏奉墨詔并賜藥金一合神刀等俯循陋質仰戴殊私渤澥無比其深山嶽無方其重臣篳門賤品環堵諸生乏禦侮之籌謀罕濟時之方略而因緣官學塵忝班行效無可稱事每逾量聖慈過聽擢領藩方祗命戒途不敢陳讓省躬撫事益懼菲才今又特降王人逺臨郊甸寶刀出於武庫上藥本於金精足以蠲除疫癘激發忠勇顧惟孱懦承此寶光捐軀盡節豈足為報無任感戀懇欵之至為人謝問疾兼賜醫藥等狀令狐楚右今月十八日本道監軍使李某至奉宣口勑問臣所疾十九日中使張良祐至伏奉詔書賜臣烏藥蓼子各一合藥方兩紙并借供奉醫官兩人醫臣疾者臣素是凡庸猥當朝寄暫乖將息特軫聖慈綸出王言朝昏不絶星馳驛騎道路相望頒仙藥于雲中降神醫於天上仰承榮寵冀即痊平兢惶失圖感戴無地蒲栁之心猶壯誓竭丹誠狗馬之齒更長敢忘玄造臣見凖詔書與醫人商量服飲未及塗藥將息腫氣已退煩熱未定所守有限不獲陳謝無任感恩結戀之至為人謝詔書問疾兼賜藥方等狀前人右臣奏事官高榮朝回伏奉墨詔問臣所疾并奉宣口勑賜臣藥方者臣疲馬集作駑之質寒熱所侵仰慿天慈今日已損豈意猶煩睿想尚軫聖衷特降千金一作十金之方兼飛五色之詔榮光一燭愁疾如遺誓畢微生以酬殊造無任感戴之至為人謝問疾狀右監軍使李輔光回奉宣口勑問所疾者臣頃因時早疾以憂生仰蒙覆育尋就痊除伏以君恩過厚天聽至卑縷形於詞如撫以手顧慙微細特繫於宸衷內省疲羸尚關於睿想榮深益懼喜極而悲當望雙闕以注心守一隅而盡力不勝感結抃躍之至為令狐相公謝賜金石凌紅雪狀元稹恩賜金石凌紅雪各一兩右中使竇千乘至奉宣進止以臣將赴山陵時屬炎暑賜臣前件紅雪等臣職司復土戀切攀髯方當匍匐而前敢有赫曦之懼豈謂天光下濟靈藥旁霑念臣有丹赤之愚故賜臣以染心之物察臣有木訥之性故賜臣以苦口之滋就日凝不冶之清氷在合若遇圓之絳雪恩加望外感極成悲集作愚衷無任局踳屏營之至文苑英華卷六百三十
