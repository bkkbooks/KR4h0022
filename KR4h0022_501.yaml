body:
  text: 文苑英華卷五百一宋李昉等編泉貨議運漕一道不奪人利一道鹽法之弊一道議罷漕運可否一道均財禁兼一道議井田阡陌一道邊塞議邊塞事一道御狄一道守險一道備邉一道議兵一道選將帥一道議漕運問昔在隋季厫庾空虛爰逮皇家京坻彌望既乘前弊年蓄未登自東徂西依常運漕今送納之所物賤本州欲齎直買輸利益兼倍對衛𢎞敏對什一而稅布政之通規九稔為儲經國之成務倉廪實而知禮夷吾之論有徵金湯守而惟粟墨翟之言無易昔隋季凋殘厫庾並竭洎皇朝纘籙黎獻咸熙並孝弟力田信可封於比屋家給人足實委餘而栖畝於是上直常平將備水旱下斂薄賦以蓄京坻故逺近諸州隨方輸轉陸輦車而接軫川漕引而連檣但六合時雍菽粟流而衍五錢標價水火埒其饒若政利從機惠美無費以送納之所物賤本州欲令齎直買輸不勞而益如愚管見切未為冝何者任土稅田定差於不刋之籍配租納稅設條於惟行之令豈可取越公途茍從私益革送納之通式開買輸之權利者歟謹對不奪人利議鹽鐵與𣙜酤誡厚斂及雜稅白居易問鹽鐵之謀𣙜酤之法山海之利關市之徵皆可以佐助征徭又慮其侵削黎庶舍之則乏用於軍國取之則奪利於生人取舍之間孰為可者此下五篇並於白居易集備制科七作十五門中摘取其問答皆白居易擬對臣聞君之所以為國者人也人之所以為命者衣食也衣食之所從出者農桑也若不本於農桑而興利者雖聖人不能也茍有能者非利也其害也何者既不自地出又非從天來必是强取於人曲成其利利則日引而月長人則日削而月朘至使人心窮王澤竭故臣但見其害不見其利也所以王者不殖貨利不言有無耗羡之財不入於府庫析毫之計不行於朝廷者慮其利穴開而罪梯構然則聖人非不好利也利在於利萬人非不好富也富在於富天下節欲於中人斯利矣省用於外人自富也故唐堯夏禹漢文之代雖薄農桑之稅除關市之征棄山海之饒散鹽鐵之利亦國足用而人富安矣何則欲節而用省也秦皇漢武隋煬之時雖收大半之賦征逆折之租建𣙜酤之法出舟車之算亦國乏用而人糜弊矣何則欲不節而用不省也蓋所謂山林不能給野火江海不能實漏巵夫利通集作散於下則人逸而富利壅於上則人勞而貧故下勞則上無以自安人富則君孰與不足記曰人以君為心君以人為體詩曰愷悌君子人之父母由此而言未有體勞而心逸者也未有子富而父貧者也臣又聞之地之生財多少有限人之食利衆寡有常若盈於上則耗於下利於彼則害於此而王者四海一家兆人一統國無異政家無異風若奪其利則害生害不加於人欲何加乎若除其害則利生利不歸於人欲何歸乎故奪之也若皮盡於毛下本或不存與之也同囊漏於貯中利將焉往與奪利害斯可知焉是以善為國者不求非農桑之産不重非衣食之貨不用計數之利不蓄聚斂之臣聞𣙜管之謀則思侵削于下見羡餘之利則念誅求於人然後德澤流而詠歌作矣故曰利出一孔者王利出二孔者强利出三孔者弱此明君立國子人者貴本業而賤末利也問議鹽法之弊論鹽商之幸對對臣伏以國鹽之法久矣鹽之利厚矣蓋法久則弊起弊起則法隳法隳則利厚利厚則奸生奸生則利薄臣以為隳薄之由由乎院場太多吏職太衆故也何者今之主者嵗考其課利之多少而殿最焉賞罰焉院場既多則各慮其商旅之不來也故羡其鹽而多與焉吏職既衆則各懼其課利之不優也故慢其貨而茍得焉鹽羡則幸生而無厭之商趨矣貨慢則濫作而無用之物入矣所以鹽愈費而官愈耗貨愈虛而商愈饒法雖行而奸緣課雖存而利失矣若今减其吏職省其院場審貨帛之精粗謹鹽量之出入使月有常利嵗有常程自然鹽不誘商則出無羡鹽矣吏不爭課則入無濫課矣鹽不羡出貨不濫入則法自彰而利復興矣利害之效豈不然乎臣又見自關以東農夫貿易其貨産入為鹽商率皆多藏私財别營裨販少出官利惟求𨽻名居無征徭行無𣙜稅身則庇於鹽籍利盡入於私家集作室此乃下有耗於農商上無益於管𣙜明矣蓋山海之饒鹽鐵之利利歸於人政之上也利歸於國政之次也若上既不歸於人次又不歸於國使幸人奸黨得以自資此乃政之疵國之蠧也今若剗革弊法沙汰奸商使下無僥幸之人上得析毫之計斯又去弊興利之一端也唯陛下詳之議罷漕運可否問秦居上腴利號近蜀然都畿所理征賦不充故嵗漕山東榖四百萬斛用給京師其間水旱不時賑貧貸乏今議者罷運榖而收腳價和糴粟而折稅錢但未知利於彼乎害於此乎對對臣聞議者將欲罷漕運於江淮請和糴於關輔以省其費以便於人臣愚以為救一時之弊則可也若以為長久之法則不知其可也何者方今自淮以南逾年旱歉自雒而西仍嵗豐稔彼人困於艱食此榖賤於傷農困則難於徵集作發租賤則易於乞糴斯則不便於彼而無害於此臣所謂救一時之弊則可也若舉而為法修以為常臣雖至愚知其不可何者夫都畿者四方之所凑也萬人之所㑹也六軍之所聚也雖野集作利稱近蜀之饒猶未能足其用雖田有上腴之利猶不能充其用集作費况可日削其榖月朘其糧食乎故國家嵗漕東南之粟以給焉時發中都之廪以賑焉所以贍關中之人均天下之食而古今不易之制也然則用舍利害可明徵矣夫齎斂糴之資省漕運之費非無利也蓋利小而害大矣故久而不勝其害挽江淮之租贍關輔之食非無害也蓋害小而利大矣故久而不勝其利大凡事之大害者不能無小利者也事之大利者不能無小害也蓋恤小害則大害不去愛小利則大利不成也古之明王所以能興利除害者非他棄小而取大耳今若恤泛舟之役忘移榖之用是知小計而不知大㑹也此臣所以謂若以為長久之計則不知其可也立制度節財用均貧富止盜賊起亷讓問天地之利有限也人之欲無窮也以有限奉無窮則必地財耗於僣奢人力屈於嗜欲故不足者為奸為盜有餘者為驕為淫今欲使食力相充財欲相稱貴賤别而禮讓作貧富均而亷耻行作為何方可至於此對對臣聞天有時地有利人有欲能以三者與天下共者仁也聖也仁聖之本在乎制度而已夫制度者先王之所以下均地財中立人極上法天道者也且天之生萬物也長之以風雨成之以寒燠聖人之牧萬人也活之以衣食濟之以器用若風雨淫寒燠甚則反傷乎物之生焉若衣食奢器用費則反傷乎人之生焉故天作四時八節所以時寒燠節風雨不使之過差為沴也聖人制五等十倫所以倫一作制衣食等器用不使之踰越為害也此所謂法天而立極者也然則地之生財者有常力人之用財者有常數若羡於上則耗於下也有餘於此則不足於彼也是以地力人財皆待制度而均也尊卑貴賤皆待制度而别也大凡爵祿之外其田宅棟宇車馬僕御器服飲食之制暨乎賔姻祠葬之度自上而下皆有數焉若不節之以數用之以一作有倫則必地力屈於僣奢人財消於嗜欲而貧困凍餒奸邪盜賊盡生於此矣聖王知其然故天下奢則示之以儉天下儉則示之以禮俾乎貧賤區别貧富適冝上下無羡耗之差財力無消屈之弊而冨安溫飽廉耻禮讓盡生於此矣然則制度者出於君而加於臣行於人而化於天下也是以君人者莫不唯欲是防唯度是守守之不固則外物攻之故居處不守其度則峻宇崇臺攻之飲食不守其度則殊滋異味攻之衣服不守其度則竒文詭製攻之視聽不守其度則奸聲艷色攻之喜怒不守其度則僣賞淫刑攻之玩好不守其度則妨行之貨蕩心之器攻之獻納不守其度則讒諂之言聚斂之計攻之道術不守其度則不死之方無生之法攻之夫然則安得不內固其守甚於城池焉外防其攻甚於寇賊焉將在乎寢食起居必思其度思而不已則其下化之詩曰儀刑文王萬邦作孚此之謂也集作矣議井田阡陌息游惰止兼并實版圖自三代之牧人也立井田之制别都鄙之名其為名制可得而知乎其為功利可得而聞乎又問自秦壞井田漢修阡陌兼并大啓游惰實繁雖歷代因循誠恐弊深而害甚如一朝改作或慮失業而擾人既廢之甚難又復之非便斟酌其道何者得中對對臣聞王者之貴生於人焉王者之冨生於地焉故不知地之數則生業無從而定財征無從而平也不知人之數則夫力無從而計軍役無從而均也不均不平則地雖廣人雖多徒有貴之名而無冨之實是以先王度土田之廣狹畫為夫井量人户之衆寡分為邑居使地利足以食人人力足以闢土邑居足以處衆人力一作衆心足以安家野無餘田以啓專利邑無餘室以容遊人逃刑避役者往無所之棄業遷居者來無所處於是生業相固食力相濟其出財征也不待征書而已平矣其起軍役也不待料人而已均矣然後天子可以稱萬乘之貴四海之冨也洎三代之後厥制崩壞故井田廢則游惰之路啓阡陌作則兼并之門開至使貧弱集作苦者無容足立錐之居冨强者專籠山絡野之利故自秦漢迄於聖朝因循未遷積習成弊然臣以為井田者廢之已久復之稍難未可盡行且冝漸制何以言之昔商鞅開秦之利也蕩然廢之故千載之間豪奪者得其計王莽革漢之弊也卒然復之故一時之間農商者失其業斯則不可久廢不可速成之明驗也故臣請斟酌時冝參詳古制大抵人稀土曠者且循集作按其阡陌户繁鄉狹者則復以井田使都鄙漸有名夫家漸有數夫然則丘田井邑一作井邑丘田之地衆寡相維比閭族黨之居有亡相保相維則兼并者何所取相保則游惰者何所容如此則庶乎人無浮心地無遺力財産豐足賦役平均市利歸於農生業著於土集作地者矣議邊塞事問東鄰入塞北海為墟朝廷徇修復之功邊境乏折衝之寄遼水東西城池不復九山左右職貢猶迷其使三聖遺黎九州故地飄然零落可不痛哉今欲示以威惠申誘約束選衆之舉未睹于今出群之略何必是古指明其要無太簡焉對馮萬石對古之王者仁覆萬類不以中外為隔而以兼濟為心固能出門同人逺近感應含生受氣靡不從助焉蠢彼小腆阻分遼漢挺而走險代搆其患昔我大唐之創業也東舉日域北暨幽陵不毛之類僉率貢職頃邊吏不謹愆我王度夷戎怙亂遂荒塞垣致乃䖍劉朔遼騷驚河冀天地悔禍人亦有心懷我舊章自相魚肉遊魂待命為日久矣光天纂曜景號昭升萬靈與能兩儀交際蠢彼遐荒何獨匪人但未諭堯心自疑其譴纍息局踳猶昧占風且舜自側微舞干而有苖即叙湯亦小侯褰羅而異方懷柔今若一選王人以備行李諭茲天造慰彼遺黎則兼程驟步不日而至北極夷障無限於幽荒東絶扶桑盡同於封內何止兵不血刃野無勞師復遼水之城地循丸山之琛賮而已若乃選衆舉能之術五材三略之竒亦鏘鏘廟堂濟濟朝序人誰不職一作儀知臣在君何待庸言而後行是羲皇之代戰爭不興文景之時韓彭勿用雖欲自效亦無所施謹對禦戎狄徵歷代之䇿陳當今之冝白居易問戎狄之患久矣備禦之略多矣故王恢呈征討之謀賈生立表餌之術婁敬興和親之計朝錯建農戰之䇿然則古今異道利害殊宜將欲採之孰為可者又問今國家北虜欵誠南夷請命所未化者其唯西戎乎討之則疲困師徒舍之則侵軼邊鄙許和親則啓貪而厚費要則作約盟誓則飾詐而不誠今欲遏彼䖍劉化其桀徑來逺人於朔漠復舊土於河湟上䇿逺謀備陳本末此下五篇並於白居易集備制科七十五門中摘取其問答皆居易擬作對對臣聞殊域一氣所生不可翦而滅也五方異族不可臣而蓄也故為侵患之暴久矣而備禦之略亦多矣考其要者大較有四焉若乃選將課兵長驅深入之謀自王恢始建以三表誘以五餌之術自賈誼始厚以賂遺結以和親之計自婁敬始徙人實邊勸農教戰之策自朝錯始然則由王恢之謀則殫財耗力疲竭生人禍結兵連功不償費故漢武悔焉而下哀痛之詔也用賈誼之術則羌胡耳目心腹雖誘而荒矣而華夏之財力風教亦隨而弊矣故漢文知其不可而不行也用婁敬之計則啓寵納侮厚費偷安雖侵掠之患漸集作暫寧而和好之約屢背故漢氏四代為胸奴所欺也用朝錯之䇿則邊人有安土之惠未免攻戰之勞胸奴無得志之虞亦絶歸心之望故漢文病之有廣武漢胸奴贊文帝聚天下精兵於廣武集作式非之役也是以討之以兵不若誘之以餌誘之以餌不若和之以親和之以親不若備之有素斯皆前代已驗之事可覆而覩也以今參古棄短取長亦可擇而用焉然臣終以為近算淺圖非帝王久逺安邊之上䇿也何者臣觀前代若政成德盛國富人安則雖六月有北伐之師不足憂也若政缺國貧德衰人困則雖一時無南牧之馬不足慶也何則國冨則師壯師壯則令嚴人安則心固心固則思理如此久久一作矣則天子之守不獨在於諸侯將在於四夷一作夷狄矣則暫雖有事何足憂焉若國貧則師弱師弱則人困人困則心離心離則思亂如此久久一作矣則天子之憂不獨在於邊陲或在於蕭墻矣則暫雖無事何足慶焉蓋古之王者慶在本而不在末憂在此而不在彼也今國家柔中懷外說近來逺北虜嚮風南蠻賔貢所未化者其為一作余幾何伏願陛下畜之如氓庶視之如蜂蠆不以士馬强而財力盛恃之而務戰爭不以亭障靜而烟塵銷輕之而去守備但且防其侵軼遏其䖍劉去而勿追來而勿縱而已然後略四子之小術𢎞三王之大猷以政成德盛為圖以人安師壯為計故德盛而化則服服則懷柔師壯而動則威威必震讋夫然後可以不糜財用不頓師徒不盟誓而外成不和親而內附如此則四海之內五年之間要荒未服之戎必匍匐而至河隴已侵之地庶從容以歸上䇿逺謀不出於此矣議守險德與險兼用問易曰王公一作侯設險以守其國記曰在德不在險然用之則乖在德之訓棄之則違守國之誡二議相反其指何從又問以山河為寶者萬夫不能當也以道德為藩者四夷為之守也何則苖恃洞庭負險而亡漢都天府用險而昌其故何也今欲鑒昌亡審用舍復何如哉對對臣聞易曰王公設險以守其國又秦得百二以吞天下齊得十二而霸諸侯蓋恃險之論興於此矣史記曰在德不在險傳曰九州之險是不一姓蓋棄險之議生於此矣臣以為險之為用用舍有時恃既失之棄亦未為得也何者夫險之為利大矣為害亦大矣故天地閉否守之則為利天地交泰用之則為害蓋天地有常險而聖人無常用也然則以道德為藩以仁義為屏以忠信為甲胄以禮樂為干櫓者教之險政之守也以城池為固以金革為備以山河為襟帶以丘陵為咽喉者地之險人之守也王者之興也必兼而用之昔漢髙帝除害興利以安天下自謂德不及於周而賢於秦故去洛之易即秦之險建都創業垂四百年是能兼而用之也桀紂三苖之徒負大河慿太行保洞庭而不修德政坐取覆滅者是專恃其險也莒子恃其僻陋不修城郭喪其三都者是怠棄其險也由斯觀之山河之阻溝墉之固可用而不可恃也智以險昌愚以險亡昌亡之間惟陛下集有能字鑒之問備邊併置帥將對對臣伏見方今備邊之計未得其宜何則京西之兵其數頗衆城堡甚備器械甚精以之遏侵掠禁奪攘則可矣夷戎大至長驅而來臣恐將卒雖多無能抗者今所以軫陛下慮者豈非此乎其所以然者蓋由鎮壘太多主將太衆故也夫鎮多則兵散兵散則威不相合而力不相濟矣將衆則心異心異則勝不相讓而敗不相救矣卒然有事誰肯當之今若合之為五將總之以一師將合則戮力師一則同心仍使均握其兵分守其界明察其罪必行賞罰然後據便宜一作利便之地扼要害之衝以逸待勞以寡制衆則雖黠虜無能為也臣又以為自古及今有不能守塞之兵而無不可守之塞有不能備戎之將而無不可備之戎故曰十圍之木持千鈞之屋得其宜也五尺之關能制其開闔得其要也伏惟陛下握戎之要操塞之關則西陲之憂可少息矣議兵用舍逆順興亡問傳曰誰能去兵兵之設久矣又曰先王耀德不觀兵二者古之明訓也然則君天下者廢而不用且涉去兵之罪資以定功又乖耀德之美去就之理何者得中又問兵不妄動師必有名議之者頗辨否臧用之者多迷本末故有戎而業成王霸一戰而禍及危亡興滅之數何由逆順之要安在對對臣聞天下雖興好戰必亡天下雖安忘戰必危不好不忘天下之王也祭公曰先王耀德不觀兵老子曰兵者不祥之器不得已而用之斯則不好之明訓也傳曰誰能去兵兵之設久矣又周定天下偃武修文猶立司馬之官六軍之衆以時教戰斯又不忘之明訓也然則君天下者不可去兵也不可黷武也在乎用之有本末行之有逆順逆順之要大略有三而兵之名隨焉夫興利除害應天順人不為名師義然後動謂之義兵相時觀釁取亂侮亡不為禍先敵至而應謂之應兵恃力宣驕作威逞欲輕人性命貪人田土謂之貪兵兵貪者亡兵應者强兵義者王王者之兵無敵於天下也故有征無戰焉强者之兵先弱敵而後戰也故百戰百勝焉亡者之兵先自敗而後戰也故勝與不勝同歸於亡焉歷代君臣惑於本末聞王者之無敵則思耀武是獲一兔而欲守株也見亡者之自敗則弭兵是困一噎而欲去食也曽不知無敵者根於義自敗者本於貪而欲歸咎於兵責功於武不其惑歟興廢之由逆順之要昭然可見惟陛下擇之問選將帥之方對對臣聞君明則將賢將賢則兵勝故有不能理兵之將而無不可勝之兵有不能選將之君而無不可得之將是以君功見於選將將功見於理兵者也然選將之術在乎因人之耳聽之因人之目視之因人之好惡而取之舍之故明王之選將帥也訪於衆詢於人若十人愛之十人之將也百人愛之百人之將也千人悅之必千人之將也萬人伏之必萬人之將也臣以為賢愚之際優劣之間以此而求十得八九矣文苑英華卷五百一
