body:
  text: 文苑英華卷四百八十六宋李昉等編直言賢良方正能直言極諫策一道賢良方正能直言極諫策問皇帝若曰蓋聞上古有登科記作至道之君垂拱無為以臨四海登科記作海內不理而人化不勞而事成也集無也字星辰軌道風雨時若邈乎其不可繼何施而臻此歟三代以來制作滋廣異文質之辨明利害之鄉威之以刑導之以禮敦其俗而彌薄防其人而益偷豈澆淳必繫於時耶將登科記作何聖賢間生而莫之振也朕柢膺纍聖之業猥居兆人之上䖍恭刻勵如恐墜失憂濟庶類夕惕晨興永惟前王之典謨是憲是則師大禹以集作之崇儉法髙宗以集作之求賢興夏啓之征作周文之伐集作罰旌孝弟舉直言養髙年敦本業平均一作均平徭稅黜陟幽明勵精孜孜勤亦至矣而浮靡不革理化不行暴亂不懲姦犯不息五教猶鬱七臣未臻鄉黨廢尚齒之儀蒸黎無安土登科記作唐之志賦入日减而私室愈貧廉察日增而吏道愈濫意者朕不明歟何古今之事同而得失之效異也思欲剗革前弊創立新規施之於事而易從考之於文而有據備其集作陳本末將舉而行無或憚煩略於條對自頃隂陽舛候祲沴荐登科記作頻興仍歲旱蝗稼穡不稔上天作孽必有由然屢為登科記作降凶災其咎安在傳曰時之不乂厥罰恆暘又曰堯湯水旱數之常也二者相登科記作乖反其誰云從今人靡蓋藏國無廪積朕屢延卿士詢訪謨猷集作謀至乃减冗食之徒罷不急之務既聞嘉話亦已遵行而停廢之餘所費尚登科記作猶廣欲一作侯轉輸登科記作墨於江徼則逺不及期將搜粟於關中則擾而無獲節軍食則功臣懷怨省吏員則多士靡歸中心浩然岡知攸濟子大夫藴蓄材器通明古今副我虛集作旁求森然就列匡朕之寡昧拯時之難災畢志直書無有所隱對穆質登科記作贊第二人對臣聞帝王之理殊塗而諫諍之道一致五諫之要同歸而直諫之用為急今朝廷之不聞直聲久矣伏惟陛下採唐堯師錫之義降禹湯罪已之詞詳延直臣博求失政自近古以來憂勞思理未有如此其至者且何患乎不得為堯舜而已若欲陛下之德與天比崇欲陛下之名與天無極斯乃天之意也臣之志也不然者臣當退從作者七人之八耳孰為來哉制策曰上古有道之君垂拱無為以臨四海不理而人化不勞而事成星辰軌道風雨時若邈乎其不可繼何施而臻此歟三代以來制作滋廣異文質之辨明利害之鄉威之以刑導之以禮敦其俗而彌薄防其人而益偷豈澆淳必繫於時耶將聖賢間生而莫之振也臣聞三皇以道化五帝以德化故曰修已以安百姓埀衣而化天下天何言哉帝何力哉無為而已遂性而已至道既往至德寖衰而三代之主先之以禮義故有法度之制質文之變髙其隄防崇其刑辟不臻大化迄可小康上古之君三代之主教道既異勞逸自殊則知理之盛衰皆德所致效在德有優劣非時有澆淳繼三代者其降殺可知矣制策曰朕祗膺纍聖之業猥居兆人之上䖍恭刻厲如恐墜失憂濟庶務夕惕晨興臣聞舜禹日兢湯武日業皆前代帝王之所以為理憂勤之至也竊聞陛下憂勞大道勤績庶務無大無小必躬必親靡不關心靡不經手勤亦至矣憂亦至矣然神太用則竭形太勞則弊古人云人生處代如白駒過隙耳何忽自苦如此又陛下一則罪已二則罪已若然者復何用宰相乎何用有司乎制策曰永惟前王之典謨是則仰策問作師大禹以崇儉法髙宗以求賢興夏啓之征作周文之伐旌孝弟舉直言養髙年敦本業均平徭賦黜陟幽明勵精孜孜勤亦至矣然而浮靡不革理化不行暴亂不懲姦犯不息五教猶鬱七臣未臻鄉黨廢尚齒之儀蒸黎無安土之志賦入日减而私室愈貧廉察日增而吏道愈濫意者朕不明歟勢不可歟何古今之事同而得失之效異也思欲剗革前弊創立新規施之於事而易從考之於文而有據備陳本末將舉而行臣聞事不師古以克永世匪說攸聞陛下追惟前王之典謨是稽古之道也然陛下師古為理也欲何為乎為皇乎為帝乎為王乎驅天下之人欲令歸忠耶歸敬耶歸文耶漢文帝以清净為宗近稱刑措漢宣帝以刑名律下亦謂中興自古以來未有不舉綱而目正不澄源而流清者矣此亦陛下熟聞之矣是憲是則之宜更申明之使在下者有所趨也臣聞大禹稱三王首者以其卑宫室菲飲食裕人克已儉之至也其道堙沒不嗣久矣惟陛下獨能師而行之茍綸言之可復則天下之可化所謂其身正不令而行其身不正雖令不從者也臣聞自古求賢各以類至三皇師其臣五帝友其臣三王臣其臣欲為皇則行事師之禮欲為帝則行取友之禮欲為王則行取臣之禮自昔哲王則有感夢而行傅巖惟肖則有協卜而出渭濱親載則有卑辭以厚禮湯命五返於處士則有可就不可屈備獨三顧於草廬此皆陛下備聞之矣臣竊見國家取賢之道其禮部吏部失之逺矣則制策之舉最為髙科以臣言之不得無弊且陛下弓旌不出𤣥纁深藏無聘問之先有投刺自媒者無軟輪之禮有躡屩而來者支離於京闕㑹計於有司又廣張節文妄設條格禁御約束鄰諸盜賊防賢之意甚於防姦﨑嶇困辱曠日永久然則一覩天顔一承聖問臣恐皇王佐略不可由此而致也今之所得者乃臣輩瑣瑣者耳彊名曰賢賢者固如是耶厚顔包羞臣竊自笑則髙宗求賢之意似或不然此乃國家最弊之務伏惟陛下加思重而慎之陛下文可經天地武可定禍亂我武載張則河壖亡命之冦既以指朝自滅我文載修則淮瀕逋逃之醜可以不日自來道冠古今功格上下夏啓周發曾何足云陛下旌孝弟而孝弟未能化人旌之未得其實也舉直言而直言未得上達舉之不以其人也養髙年則廢禮已久未有聞焉敦本業則失農者多鮮有勸者平均徭稅而怨嗟日生姦臟之吏未去也黜陟幽明而善惡同貫考課之法未精也陛下師崇儉之遺訓則浮靡何患不革前王之典謨必用則理化何患不行化行則暴亂懲奸犯息然後禮義可浹五教自宣矣七臣者豈非孝經所謂天子有爭臣七人乎今朝廷列官致位有以諫為名者左右前後拾遺補闕其數甚衆不止七人使陛下有未臻之嘆其過將有所歸矣以陛下養髙年之禮著于上則鄉黨不廢尚齒之儀均徭之法行於吏則蒸黎有安土之志安土則樂業樂業則務本務本則興農興農則家給家給則賦不减而人不貧矣吏道愈淫者吏不精也臣竊見吏部課最者遺其實以資歷為優試材者失其本以書判為上加以檢驗滋章簡牘繁揉瞶眊淹滯吏緣為姦事壅於上權移於下胥徒末品得擅官府所以財賄公行不殊市道量職求直價若平凖古則為官擇人今則為財擇官反古害今其弊如是又有通經之目試文之科不同歸於吏部選之至於此雖廉察日增固不及也若剗革前弊明詔固當疾行創立新規微臣以為不可且烈祖之憲章未改前王之法度粲然德輶如毛在克己而已何必改作然後成功因人之欲順天之時則易從行古之道得理之中則有據制策曰自頃陰陽舛候祲沴洊興仍歲旱蝗稼穡不稔上天作孽必有由然屢為凶災其咎安在傳曰時之不乂厥罰恆暘又曰堯湯水旱數之常也二者相反其誰云從人靡蓋藏國無廩積朕屢延卿士詢訪謀猷至乃减冗食之徒罷不急之務既聞嘉話亦已遂行而停廢之餘所費猶廣欲轉輸於江徼則逺不及期將搜粟於關中則擾而無獲節軍食則功臣懷怨省吏員則多士靡歸中心浩然罔知攸濟臣聞旱蝗者稽諸洪範為言不乂之罰也言之不乂令之不信也言者西方金也金失其性為木所傷木東方少陽古云陽騰所以為旱陽既亢極氣又囂蒸則介蟲為孽螽斯為害臣見比年旱魃為害巳甚矣則洪範之徵亦明矣無乃陛下詔令不信乎抑又聞軍旅之後必有凶年其握兵者不本乎仁義貪於殘戮人用愁苦怨氣積下以傷隂陽之和也則國家兵先於河北旱蝗適之次及河南旱亦隨後次關中關中又蝗旱既仍歲蝗亦比年無乃陛下用兵者不詳其道也臣謹稽古典參於歷代禳除異術祈禱多門至若貶食省用稼一作務穡圭璧求邪於幻術覬福於釋流土龍矯首於通衢羣巫分袖而鼓舞此又從人之欲也至若兩漢舊儀三公當免卜式著議𢎞羊可烹此又一時之事也然俱非救旱之本去災之道則有一郡一邑一宰一牧勤恤人隱精達神明或以身禳或以心禱蝗且出境旱不為災牧宰之微尚或臻此况陛下尊為天子德為聖人神動而天從氣使而時變至誠所感何往不通臣伏見陛下去年八月二日所下德音避正殿而不居損常膳而不御議獄緩死掩骼埋胔詔文始書害氣將究詔書始下和氣自生故不旬朝之間凶渠殱殄兵革偃息甘雨荐降氛災自銷天之監人也明矣速矣然則陛下之德有以動天天且不違况於鬼神乎若堯湯之災隂陽之數此則先儒之言略矣小臣不敢傳疑惟洪範之徵信也謹而言之陛下鑒之可也臣聞堯之水湯之旱而國無捐瘠者蓄積多而備先具也今國家或時不雨一歲不登堯湯比之懸矣人至困竭國為空虛者備之不早頃所以賦斂無極怨讟日盈權須詭求朝令夕具豈不以兵食乎今蒲同勞師既還關輔生人才息不急軍食不煩軍須則搜粟關中重擾未可轉輸江徼雖逺可期關兵食以廩儲雖節食猶慮費用者多則功臣何因而懷怨擇賢才以實官雖省員猶慮曠職者衆則多士何憂而靡歸臣聞方內之理亂由君上之所執上有所執則下有所守臣竊觀國理似或不然無可久之圖無常備之制用無本末舉無條綱任運而行應急而化若虛舟之觸用濟江河如亂絲之棼望成綸綍所以遇運則福至遇厄則禍生遇歲惡則勞遇歲豐則逸坐迎天命不關人謀聖心浩然罔知攸濟者乃彞倫不叙之故制策曰子大夫蘊蓄才一作材器通明古今副我虛求森然就列匡朕之寡昧拯時之難災畢志直書無有所隱此乃陛下厚禮衆君子之意臣微曷足以當之若臣者生為唐人馬牛之齒甫以壯矣道不得行身不得遂陋矣賤矣與螻蟻何異然詩書天人之際皇王經緯之道三墳六經九流百氏前王沿革之要歷代興王所由既嘗經之于心頗亦備之于學雖未之究可略而言至若時政之損益任賢之得失刑辟之有輕有重生人之或利或病臣又耳或有所妄聞身逺與寡莫為之先且無因至陛下言之爾皇天后土宗廟社稷實宜知臣之心每用憤發悃欵隱憂臆激於肝腑藏於髓思有以一陳之久矣蒙陛下開天地之德降雷雨之施深詔執事旁延郡國俾有賢良方正直言極諫之舉臣也幸茍有志人乃舉之此亦上天降祐皇唐使陛下錫臣此便得有路索言之於上也若賢與良則臣豈敢惟諫與直或有可觀言不直諫不極是微臣不忠之罪孤陛下虛聽之德也如至忌諱挾誅誹謗附律脯醢淫戮鼎鑊濫刑此乃昏主暴君亡國之具亦陛下之所明知故臣不復有虞於聖朝耳是敢竭慮極愚指陳其切是耶納而行之非也容而宥之所謂言之無罪聞之者足以戒也謹對文苑英華卷四百八十六
