body:
  text: 文苑英華卷五百四十六宋李昉等編錢帛王璧果門二十三道錢帛磨錢判一道無名錢判一道拾遺錢判一道鑄錢數倍判一道鍾官所鑄判一道母子權判一道織素判一道練不宿井判一道黃潤判一道玉銅璧玉節龍輔判一道開銅坑判一道璧判一道玉節判一道穀圭判一道木樹草瓜果採木判一道橘奴判一道平慮判一道竹判一道盜瓜判一道芋判一道椑子判一道梨橘判一道盜稻橘判一道錢帛磨錢判甲磨錢質而取鋊乙告之訴不更鑄對緡鏹爰設銷鑄是司九府匠之以圎方三官因之以文質雖五銖異制半兩分形龍馬之造化不窮權衡之輕重有數實惟泉貸校在水衡人之無良公為不道微漢臣之賜蜀鎔範成姦非魏帝之夢陳錯磨抵禁立辟自貽於錢府舉法須密於金科欲無王衍之害曷云非隱將刻劉陶之議刑其捨諸且取鋊不定其少多致獄孰究其髙下欲加之罪其無詞乎待窮楊可之告緡方誶一作訊五倫之督鑄無名錢判東門韜訴主司負物吏詰之韜云祖有無名錢對易象定位尊卑之禮聿修人倫有序貴賤之容斯立布諸方策聲塵藹然至若爵列子男恩垂帶礪有謀謁帝方承萬戶之榮無種封侯亦受千金之賜陸子囊中之寶已惠私門張氏無名之錢且留公庫東門韜家聲不墜祖德彌光想昔日之恩輝恃曩時之寵寄負玄絶海搶榆知其不逮刳舟剡楫瘣木愧其無施仰堂構而未微思必復而何已薄言公府方論赤仄之資爰詣主司更訴青鳬之鏹亦冀雲油露湛先人承元始之恩自葉流根後胤奉永平之賜迹有符於故事理無紊於今時既於古而無虧豈在今而可抑謂宜從允以叶彛章拾遺錢判乙拾遺錢於路縣科罪訴云家約俯有拾仰有取不敢失業對失得者在乎幾悔吝者生乎動苟或昧之其何以行乙乃妄人不慎厥德既俯拾而仰取亦虛往而實歸路有遺錢且效漢臣之鄙室而藏鏹庶同猗氏之富在國經而斯濫寧家約之可遵且揭而書之縣未徴於古制貪以敗類乙見誚於詩人貽厥孫謀無聞以燕之訓恆有子禍將貽自掇之刑請糾其違用懲于悔鑄錢數倍判江東諸監鑄錢數倍費使牒令停監司云恐棄山澤之利而工匠私鑄犯法對貨以通商財以利俗國法施於九府鑄作行於四方輕重隨時子母由其遞用積流有象泉布所以得名國家立制經邦稽古為理用天分地成其阜安之業聖作物覩有其通變之勞使乎伊何曾不是識專命非據亂常有誅人焉廋哉斯害也已請被刑鼎無擾監司鍾官所鑄判庚為鍾官所鑄不充嵗計工部按其罪訴稱鉛錫未足對辨方制位聿彰治國之典立教富人必先因地之利設家疑作泉府列鍾官將欲布金刀之饒盡銅山之積庚以伎能從職鎔鑄為勞獸炭炎罏非煙上出一作獸爐生炭炎煙上出鳬工動扇驟吹傍飛無名歸張氏之封因寵入鄧通之室自合預圖嵗計先備年支不見請於文符空有辭於鉛錫撫周書而太息有愧川流披漢史而長懷無聞嶽峙仙臺按罪實為通規主局致詞憑何逃責母子權判順成方請為母子權渝其好肉所司下科違法對調以玉燭天運和於四時用以金幣寶貨叶於三品是以榆花落影荇葉分形有母子之相權見大小之為利嵗用不足將救眚災秋其以登孰為鎔鑄眷兹方郡年在順成稱彼兕觥則叶飲蒸之義在其龜貝未詳豐有之期家蓄三年自流衍於紅粟圜資九府實抵冒於丹毫守以規模猶違正典渝其好肉彌阻大同知無不為何見妄從申請罪人斯得誠宜置以科條織素判樊貴使妻織素先示其式而告之曰必如此妻織遂善於式乃出妻兄訴州特一作將判合仍笞貴六十因損一腳履地不得貴不伏訴臺對龜浪披圖地演金夫之卦鵲橋構象天垂織女之星故能隂陽克諧琴瑟斯和其道且合莊敬表於齊眉其情或乖忿怨形於反目樊貴飛鳴聖代飲啄昌期預詳結媛之談早契伐柯之義皇皇受業初未見於拾青軋軋㺯機遽有聞於裂素蜘蛛網戶朝續斷絲蟋蟀鳴階夜催殘織光明似雪未慙董永之妻皎潔如霜翻學王陽之婦兄莫能忍是歸妹之無家女既不良何立身之有地閨門險詖醜行已彰州將科繩罪人斯得有虧於禮善是責之難逃不足與行何藉跛而能履以郭賀為州牧用刑而尚寬既不疑為臺郎所訴之何益練不宿井判丁為水練不宿井七日夜所司科罪訴云書暴對維彼組練濟斯軍國或易象賁其戔戔或詩人歌其皎皎理宜夜懸諸井晝暴於陽何得不務吳門之光坐乖魏闕之理所司詰罪雅叶彛章丁則薄言何其厚貌請依司敗以肅爰書黃潤判黃潤細布也揚子雲蜀都賦曰筒中黃潤乙借甲黃潤示幽閨因被鼠齧甲索比筒乙以當土無請酬價甲不伏集作訴對財以工化物以商通既名竒而可稱於一作亦寶異而為玩或有韜筒比細光越象簟况一作沉藻侔華色逾龍輔貨且難得稱珍於外土寵無不利取恱於中閨皎皎當窗已生紅粉之艷卿卿在室復觀黃潤之竒上客驚燒殊裴楷之未識相鼠斯齧惡蒼舒之啓智緘鐍不固誠毁櫝而亡龜詭異難求豈登山而採蚌依酬元價無徴本物既非吾土所育請絶詩人薄言玉銅璧玉節龍輔判張魯私家畜龍輔不獻對萬宇宅心四人各業不寶逺物載沐玄風南榮之暄猶思上獻東流之水必願朝宗所貴者忠誠孰非臣子所畜者珍物仍在私家况龍輔稱竒鳥篆攸載潛匿不送彰聞有司雖馬駕鼓車天心廣被而人迷日用物議猶多律有明文刑故無捨開銅坑判蔚州申管內銅坑先禁採昨為檀州警發遣兵州庫無物可裝束刺史判令開銅坑以市物給兵幕一作募不闕軍機亷察使科違敕對星帶燕郊雲迷代郡地稱即山之利人擅燒銅之業有敕頒行無令採鑄頃以遼兵候月或渡盧龍之水漢守宣風載撫飛狐之塞救兵屢發帑藏云空方興計日之師遂有隨時之義取銅以給在敕誠違一作誠在違科應機而行於事有一作可恕馮諼市義在昔未以為非汲黯開倉於今不言其失斷從違敕理或可矜璧判璧肉倍好太常以為度失將薦不可對太璞不雕國寶為貴許田斯假諱朝宿之邑秦城可易獻章華之臺况祀地郊天或充禮物來朝入聘以表威儀然則聖人制禮特崇於饗薦王者之孝莫先於崇稷而三后在天聖靈浸逺四方成嵗祭典聿修有事廟庭載陳圭璧太常所主大禮攸存凡厥薦陳須明制度惟此璧禮不虧玉書色侔截肪肉倍於好同楚人之鄙識妄有疵瑕當魯禮之明祠而致違闕曠其所職不得無辜玉節判癸盜玉節於諸其家科盜罪不伏對符璽出入惟帝之命節傳迓送一作官節傳迓有國之恆寶山圖獸知林木之多虞澤國用龍取江海一作湖之安祲飾玉之節惟人所持萬里無塵寢於廟堂之上四郊多壘行於軍陳之間癸何人斯不率而盜子卿漢朝之勇將權一作擁節不移無忌魏國之名臣竊符加罪彼已之子曽不是思藪之􅍉蒲尚聞攻伐邦之旌節安可穿窬請歸義於鈞金庶無譁於束矢榖圭判甲受穀圭之節為使而易行除慝專以和難為務法司劾之不伏對六節崇儀制參龍虎五瑞分命列自公侯備以寵章異其文質嚴國朝而式序戒原隰而斯皇莫不尚以圭璧為之制度氣中浮曜夲自生虹山下沉暉由來抵鵲擬秦城而韞櫝邁燕石以推珍璞琢言敷采就無僣起以軍旅恤其凶荒易行除慝之規結好和難之義咸崇馭下克著彛倫將忝厥司實資謀政甲縉紳髙踐符節光臨既載馳而飲氷豈四方之辱命蒲璧云始早逾列於子男穀圭致榮遂專城於方嶽克謹天戒肅將明威居不失中思非出位寧遑啓處務協仇讐得晉侯之平戎有宣公之靜莒奚為不可而欲論刑易行夲在剡圭此謬請分陶璧木樹草瓜果採木判終南山下人每至冬中於山北採木縣以斬一作砍伐非時皆欲禁斷人云山南險逺終一作皆不可行對節彼南山森乎灌木百工爰度庶人斯採厲禁攸施妄掄材而必制操斧以進何斬伐之乖宜斬陽蓋一作即取乎隂時伐隂須在乎陽月古訓則爾今令惟宜若斷彼良輈剡乎服耜考工有典諒亦難違儻篳路載馳析薪負荷藍縷是阻巖險何階隨時之宜蓋取諸此橘奴判甲有橘奴不書於版圖大比被糾訴稱田賦不闕對江臯芊眠盧橘是植珠樹金實含芬吐芳班史埒富於封君李衡取方於僮僕詳窺夏䇿珍味猶錯於苞貢式遵周禮物生必載於版圖何厚産之闕書而薄言於田賦置於徽纆誠為得宜平慮判僧稱院有一株平慮依驗乃是忘憂對王城福田禪宇清界忍草駢植天花亂開裛香雨而增紅淡祥煙而泛緑徴其種類已偹神農之書覽彼芳菲取惑愚僧之目狀稱平慮驗乃忘憂初欲薦其祺祥終用彰於紕繆只可樹之於背玩彼芳香何乃言之於公取尤眩惑足以發周客之笑生燕人之慙未全害於政經不可罹於刑典竹判衛州申奉敕和市竹州送王芻司法科罪不伏並仰處分對王者立制諸侯附庸海內之化可𢎞任土之宜克著軍國既有彛凖州縣非無舊式眷兹鄘衛築新臺於浼浼帶以淇澳挺緑竹之猗猗雖禹貢分圻尚乎納秸一作秸納而唐年作賦送彼王芻既失奉於芝泥自投刑於棘署司法科罪正叶其宜輒為詞訴殊是踈僻且虧效職之方須速謗官之罪盜瓜判常州申稱錢客每以種瓜為業遂被伶人洪崖盜食其瓜並盡為客所擒遂作術化出滿田是瓜客乃放之崖去後了復無瓜客詣縣告崖是妖賊對錢客家鄰白社業在青門米實蔥花光浮五色藍皮密理美至三搖長懷洗玉之珍方有致金之望洪崖行乖夔足道契狼心不能李徑遺冠翻乃瓜田躡履徇一作狗兹猿臂因採掇而全空眷彼龍蹄隨指揮而忽見寧勞宋灌自含氷谷之文不假曾鋤俄結火山之實錢既迷於術化洪乃集彼回邪於是釋此妖人將殊盜者初觀帶母似逐仙來後察空苗疑因夢失幻人為幻幻已去而無瓜迷者知迷迷既祛而有誤論妖疑切誨盜情深雖陳莠口之詞莫辨訛言之實洪崖不在丹筆何施客告未曉真虛崖實未知州縣更宜尋問方可裁量芋判甲以蹲鴟自業丁告其惰農對我疆我理蓋取其宜採葑採菲止存其善甲以鑿井而飲耕田而食藝彼芋區安厥蓬户不知堯舜之力聿求天地之利有斯而享同計然於范子無悶乃可均沃壤於岷山鄙哉彼丁好訐為直昧長沮之自樂訝夫子之不勤告以惰農未聞其可或恐人慙相鼠務彼蹲鴟匪夫析薪頗黯綱紀則片言難折審慎攸宜請俟三緘方申一剖椑子判柏會一作禽下同南鄰有椑樹垂枝於家侍兒取以噉會會送官仰正斷對柏會操深介直期在公清用理於家可移於國東家之棗昔聞去婦之悲南鄰之椑今見侍兒之執論其嫉惡雖曰至公究其飾情終為小行所盜不言多少量情應有重輕請更詳求方可裁斷梨橘判鄭州劉元禮載梨向蘇州蘇人𢎞執信載橘來鄭州行至徐城水流急兩船相衝俱破梨及橘並流梨散接得半橘薄盛總不失元禮索陪執信不伏對滎澤名區長洲沃壤土宜雖異川路攸通故使賈客相趨乘時射利商人遞委從有之無大谷玄光言移汴北江陵朱實欲度淮南於是鼓帆侵星俱辭故國扣舷忘夕並屆徐城兩鷁爭飛雙鳬不背異虛舟而見觸均斷艦之相逢遂使橈逐蘭摧疑建平之柿下棹隨桂折若河上之查來落果於焉星散榜人由其鶩沒一遊一泳橘包褁而全收載沉載浮梨漂零而半失然防慮之術未聞責已而侵溺之弊直欲尤人乍尋似合酬填審細便難允許何者梨因散失船則共傷若為梨覔陪過自歸於毁櫝如損船索償理乃齊於指馬既非情故徒事披陳盜稻橘判會稽楊真種稻二十畝縣人張辨盜將令訪知收辨科罪訴楊真盜辨木奴復合科罪對汙泉芳稻風傳十里之香江陵木奴地均千户之封青花競吐色亂煙波朱實方成影分霞錦楊真張辨植業營生楚既失之齊亦未得且覆車改轍前代之通宜牽牛蹊田往賢之深誡豈有一彼一此俱行盜竊之心以公以私深失是非之路鍾離牧之推讓曾不留心淳于恭之助收豈知勵俗論犯雖知先後語罪諒乃同歸請勘兩家之贓方定片言之獄文苑英華卷五百四十六
