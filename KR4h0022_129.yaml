body:
  text: 文苑英華卷一百二十九宋李昉等編哀傷一愍時賦一首哀江南賦一首傷心賦一首愍時賦并序梁宣帝于謹平梁之後闔城長幼被虜入關又失襄陽故地乃曰恨不用尹德毅言以致於是又見邑居殘毁干戈日尋耻威略不振常懷憤悶乃著愍時賦以見其意詞曰嗟余命之殊薄實賦運之逄屯既殷憂而彌歲亦坎壈而相鄰晝營營而至晚夜耿耿而通晨望否極而反泰何杳杳而無津悲晉璽之遷趙痛漢鼎之移新無田范之明略愧夷齊之得仁遂胡顔而苟免謂小屈而或伸豈妖沴之無已何國步之長淪恨少生而怯弱本無志於爪牙謝兩章之雄勇恧二策之英華豈三石於鄠杜異五馬於琅琊直受性而好善類蓬生之在麻冀無咎而霑慶庶保靜而蠲邪何昊穹之不惠值上帝之紆奢神州鞠為茂草赤縣繞於長蛇徒仰天而太息空撫襟而咨嗟伊古人之有懷尚或感於知已况華蕚聨於霄極寵渥流於無已或小善而必褒時片言而見美昔待罪於禹州歷三考而見紀一作無獲免戾於明時遂超隆於宗子始解印於稽山即驅傳於襄水彼南陽之舊國實天漢之嘉祉既川嶽之形勢復龍躍之基址此首賞之謬及謂維城之足恃值諸侯之擕二遂留滯於楚川等勾踐之絶望同重耳之終焉望南枝而灑泣或東顧而潺湲歸歟之情何極首丘之思邈然忽值魏師入討于彼南荆既兵車之赫赫俄伐鼓而凌城同寤生之舍許等小白之全邢伊社稷之不泯實有感於生靈伊吾人之固陋本漂泊於流萍忽沉滯於兹土復歲月而無成昔千乘之畿甸今七里而盤縈寡田邑而可賦闕丘井而求兵無河內之資峙同滎陽之未平夜騷騷而擊柝晝孑孑而揚旌烽連雲而回照馬伏櫪而悲鳴既有懷於斯日亦焉得而云寧彼雲夢之舊都乃標竒於昔者驗往記以瞻今何名髙而事寡寂寥井邑荒涼原野徒揄揚於宋玉空嗟咨於司馬南方卑而歎屈長沙濕而悲賈余國家之俟匡庶興周而祀夏忽縈憂於此屈豈年華之天假加以狗盜鼠竊蜂蠆狐狸羣圉𨽻而為寇聚臧獲而成師窺臨津渚跋扈江湄屢征肇於殷歲頻戰起於軒時有扈興於夏典采芑善於周詩方叔振於蠻貊伯禽捷於淮夷在逋穢其能幾會斬馘而搴旗彼積惡之必稔豈天靈之可欺交川路之云擁疑理惆悵而未怡哀江南賦并序庾信粵以戊辰之年建亥之月大盜移國金陵瓦解余乃竄身荒谷公私塗炭華陽奔命有去無歸中興道銷窮于甲戌三日哭于都亭三年囚於别館天道周星物極不反傅燮之但悲身世無處求生袁安之每念王室自然流涕昔桓君山之志事杜元凱之平生並有著書咸能自序潘嶽之文彩始述家風陸機之詞賦先陳世德信年始二毛即逄喪亂狼狽流離至於暮齒燕歌類聚作河逺别悲不自勝楚老相逄泣將何及畏南山之雨忽踐秦庭讓東海之濵遂餐周粟下亭漂泊髙橋羇旅楚歌非取樂之方魯酒無忘憂之用追為此賦聊以記言不無危苦之詞唯以悲哀為主日暮塗逺人間何世將軍一去大樹飄零壯士不還寒風蕭瑟荆璧睨柱受連城而見欺載書橫階捧珠盤而不定鍾儀君子入就南冠之囚季孫行人留守西河之館申包胥之頓地碎之以首蔡威公之淚盡加之以血釣臺移桞非玉關之可望華亭鶴唳非河橋之可聞孫策以天下為三分衆才一旅項籍用江東之子弟人唯八千遂乃分裂山河宰割天下豈有百萬義師一朝卷甲芟夷斬伐如草木焉江淮無涯岸之阻亭壁無藩籬之固頭會箕斂者合從締交鋤耰棘矜者因利乘便將非江表王氣終于三百年乎是知併吞六合不免軹道之災混一車書無救平陽之禍嗚呼山嶽崩頽既履危亡之運春秋迭代必有去故之悲天意人事可以悽愴傷心者矣况復舟楫路窮星漢非乘槎可上風飇道阻蓬萊無可到之期窮者欲逹其言勞者須歌其事陸士衡聞而撫掌是所甘心張平子見而陋之固其宜矣我之掌庾承周以世功而為族經邦佐漢用論道而當官稟嵩華之玉石潤河洛之波瀾居負洛而重世邑臨河而晏安逮永嘉之艱虞始中原之乏主民枕倚於墻壁路交橫於豺虎值五馬之南奔逄三星之東聚彼凌江而建國始播遷於吾祖分南陽而賜田裂東嶽而胙土誅茅宋玉之宅穿徑臨江之府水木交運山川崩竭家有直道人多全節訓子見於純深事君彰於義烈新野有生祠之廟河南有胡書之碣况乃少微真人天山逸民階庭空谷門巷蒲輪移談講樹就簡書筠降生世德載誕貞臣文詞髙于甲觀模楷盛於漳濵嗟有道而無鳳歎非時而有麟既姦回之奰音備匿終不悅於仁人王子洛濵之歲蘭成射策之年始含香於建禮仍矯翼於崇賢逰洊雷之講肆齒明離之胄筵既傾蠡而酌海遂測管而窺天方塘水白釣渚池圓侍戎韜於武帳聽雅曲於文絃乃解懸而通籍遂崇文而會武居笠轂左傳宣四年以貫笠轂而掌兵出蘭池而典午論兵於江漢之君拭玉於西河之主于時朝野歡娛池臺鐘鼓里為冠蓋門成鄒魯連茂苑於海陵跨橫塘於江浦東門則鞭石成橋南極則鑄銅為柱橘則園植萬株竹則家封千户西賮浮玉南琛沒羽吳歈越吟荆艷楚舞草木之遇陽春魚龍之逄風雨五十年中江表無事王歙為和親之侯班超為定逺之使馬武無預於甲兵馮唐不論於將帥豈知山嶽暗然江湖潛沸漁陽有閭左戍卒一作兵離石有將兵都尉天子方刪詩書定禮樂設重雲之講開士林之學談劫燼之灰飛辨常星之夜落地平魚齒城危獸角卧刁斗於滎陽絆龍媒於平樂宰衡以干戈為兒戲縉紳以清談為廟略乘漬一作海水以膠船馭奔駒以杇索小人則將及水火君子則方成猿鶴弊箄不能救鹽池之鹹阿膠不能止黃河之濁既而魴魚頳尾四郊多壘殿狎江鷗宫鳴野雉湛盧去國艅艎失水見被髮於伊川知百年而為戎矣彼姦逆之熾盛久逰魂而放命大則有鯨有鯢小則為梟為獍負其牛羊之力凶其水草之性非玉燭之能調豈璿璣之可正值天下之無為尚有欲於羈縻飲其琉璃之酒賞其虎豹之皮見胡柯於大夏識鳥卵於條枝豺牙密厲虺毒潛吹輕九鼎而欲問聞三川而遂窺始則王子召戎姦臣介胄既官政而離蕩遂師言而泄漏望廷尉之逋囚反淮南之窮寇出狄泉之蒼鳥起橫江之困獸地則石鼓鳴山天則金精動宿北闕龍吟東陵麟鬬爾乃桀點構扇慿陵畿甸擁狼望於黃圖填盧山於赤縣青袍如草白馬如練天子履端廢朝單于長圍髙宴兩觀當戟千門受箭白虹貫日蒼鷹擊殿竟遭夏臺之禍終視堯城之變官守無奔問之人干戚非平戎之戰陶侃空爭米船顧榮虛搖羽扇將軍死綏路絶長圍烽隨星落書逐鳶飛遂乃韓分趙裂鼓卧旗折失羣班馬迷輪亂轍猛士嬰城謀臣卷舌昆陽之戰象走林常山之陳蛇奔穴五郡則兄弟相悲三州則父子離别護軍慷慨忠能死節三世為將終於此滅濟陽忠壯身參末將兄弟三人義聲俱唱主辱臣死名存身喪敵人歸元三軍悽愴尚書多算守備是長雲梯可拒地道能防有齊將之閉壁無燕師之卧墻大事去矣人之云亡申子奮發勇氣咆勃實總元戎身先士卒胄落魚門兵填馬窟屢犯通中頻遭刮骨功業夭枉身名埋沒或以隼翼鷃披虎威狐假沾漬鋒鏑脂膏原野兵弱虜強城孤氣寡聞鶴唳而心驚聽胡笳而淚下據神亭而亡戟臨橫江而棄馬崩於巨鹿之沙碎於長平之瓦於是桂林顛覆長洲麋鹿潰潰沸騰茫茫墋黷墋楚錦切出功臣贊詳見一百十四卷天地離阻人神慘酷晉鄭靡依魯衛不睦競動天闕爭回地軸探雀鷇而未飽待熊蹯而詎熟乃有車側郭門筋懸廟屋鬼同曹社之謀人有秦庭之哭爾乃假刻璽於關塞稱使者之酬對逄鄂坂之譏嫌值耐門之征稅乘白馬而不前䇿青騾而轉礙吹落葉之扁舟飄長風於上遊彼鋸牙而鈎爪又巡江而習流排青龍之戰艦鬬飛燕之船樓張遼臨於赤壁王濬下於巴丘乍風驚而射火或箭重而回舟未辨聲於黃蓋己先沉於杜侯落帆黃鶴之浦藏船鸚鵡之洲路已分於湘漢星猶看於斗牛若乃隂陵路絶一作失釣臺斜趣望赤壁而沾衣檥烏江而不渡雷池柵浦鵠陵焚戍旅舍無煙巢禽無樹謂荆衡之杞梓庶江漢之可恃淮海維揚三千餘里過漂渚而寄食託蘆中而渡水吳越春秋伍子胥事屆于七澤濵于十死嗟天保之未定見殷憂之方始本不逹於危行又無情於祿仕謬掌衛於中軍誤一作濫尸丞於御史信生世等於龍門辭親同於河洛奉立身之遺訓受成書之顧託昔三世而無慙今七葉而方落泣風雨於梁山惟枯魚之銜索入一作有欹斜之小徑掩蓬藋之荒扉就汀洲之杜若待蘆葦之單衣于時西楚霸王劍及繁陽鏖兵金匱校戰玉堂蒼鷹赤雀鐡舳牙檣沉白馬而誓衆負黃龍而渡江海潮迎艦江萍送王戎車屯于石城戈船掩于淮泗諸侯則鄭伯前驅盟主則荀罃暮至剖巢燻穴奔魑走魅埋長狄於駒門斬蚩尤於中冀然腹為燈飲頭為器直虹貫壘長星屬地昔之虎踞龍盤加以黃旗紫氣莫不隨狐兔而窟穴與風塵而殄悴西瞻博望北臨玄圃月榭風臺池平樹古倚弓於玉女窗扉繫馬於鳳凰樓柱仁壽之鏡徒懸茂陵之書空聚若夫立德立言謨明寅亮聲超於繫表道髙於河上更不遇於浮丘遂無言於師曠以愛子而託人知西陵而誰望非無北闕之兵猶有雲臺之仗司徒之表裏經綸狐偃之惟王實勤橫雕戈而對霸主執金鞭一作鼓而問賊臣平吳之功壯於杜元凱王室是賴深於溫太真始則地名全節終則山稱枉人南陽一作南山校書去之已逺上蔡逐獵知之何晚鎮北之負譽矜前風飇凛然水神遭箭山靈見鞭是以蟄熊傷馬浮蛟沒船才子併命俱非百年中宗之夷凶靖亂大雪寃耻去代邸而承基遷唐郊而纂祀反舊章於司𨽻歸餘風於正始沉猜則方逞其欲藏疾則自矜於已天下之事沒焉諸侯之心搖矣既而齊交北絶秦患西起况背闕類聚作關而懷一作壞非楚異端委而開吳驅緑林之散卒拒驪山之叛徒營軍梁溠搜乘巴渝問諸淫昏之鬼求諸厭劾一作禱之巫荆門遭廪延之戮夏口濫逵泉之誅蔑因親以致愛忍和樂於彎弧既無謀於肉食非所望於論都未深思於五難先自擅於三一作二端登陽城而避險卧砥柱而求安既言多於忌刻實志勇而刑殘但坐觀於時變本無情於急難地惟黑子城猶彈丸其怨則黷其盟則寒豈寃禽之能塞海非愚叟之可移山况以沴氣朝浮妖精夜殞赤烏則三朝夾日蒼雲則七重圍軫亡吳之歲既窮入郢之年斯盡周含鄭怒楚結秦寃有南風之不競值西鄰之責言俄而梯衝亂舞冀馬雲屯俴秦車於暢轂沓漢鼓於雷門下陳倉而連弩渡臨晉而橫船雖復楚有七澤人稱三户箭不麗於六麋雷無驚於九虎辭洞庭兮落木去涔陽兮極浦熾火兮焚旗貞風兮害蠱乃值玉軸揚灰龍文折柱下江餘城長林故營徒思拑馬之秣公羊傳圉者拑馬而秣之未見燒牛之兵章曼支一作枝以轂走宫之竒以族行河無氷而馬渡關未曉而雞鳴忠臣解骨君子吞聲章華望祭之所雲夢偽逰之地荒谷縊於莫敖冶父囚於羣帥硎穽摺拉鷹鸇批㩌寃霜夏零憤泉秋沸城崩杞婦之哭竹染湘妃之泪水毒秦涇山髙趙陘十里五里長亭短亭飢隨蟄燕暗逐流螢秦中水黑關上泥青于時瓦解氷泮風飛電散渾然千里淄澠一亂雪暗如沙氷橫似岸逄赴洛之陸機見離家之王粲莫不聞隴水而掩泣向關山而長嘆况復君在交河妾在清波石望夫而逾逺山望子而逾多才人之憶代郡公子之去清河栩揚一作栩陽亭有離别之賦臨江王有愁思之歌别有飄颻武威羇旅金微班超生而望返溫序死而思歸李陵之雙鳬永去蘇武之一鴈空飛若江陵之中否乃金陵之禍始雖借人之外力實蕭墻之內起撥亂之主忽焉中興之宗不祀伯兮叔兮同見戮於猶子荆山鵲飛而玉碎隨岸蛇生而珠死鬼火亂於平林殤魂逰於新市梁故豐徙楚實秦亡不有所廢其何以昌有媯之後將育於薑輸我神器居為讓王天地之大德曰生聖人之大寶曰位用無賴之子弟舉江東而全棄惜天下之一家遭東南之反氣以鶉首而賜秦天何為而此醉且夫天道回旋生民預焉余烈祖於西晉始流播於東川洎余身而七葉又遭時而北遷提挈老幼關河纍年死生契濶不可問天况復零落將盡靈光巋然日窮于紀歲將復始逼迫危慮端憂暮齒踐長樂之神臯望宣平之貴里渭水貫於天門驪山回於地一作平非市幕府大將軍之愛客丞相平津侯之待士見鍾鼎於金張聞絃歌於許史豈知灞陵夜獵猶是故時將軍咸陽布衣非獨思歸王子傷心賦并序余五福無徴三靈有譴至于繼體多從夭折二男一女並得勝衣金陵喪亂相守亡殁羇旅關河倐然白首苖而不秀頻有所悲一女成人一長一作外孫孩稚奄然玄壤何痛如之既傷即事追悼前亡唯覺傷心遂以傷心為賦若夫入室生光非復企及夾河為郡前途逾逺媫妤有自傷之賦揚雄有哀祭之文王正長有北郭之悲謝安石有東山之恨斯既然矣至若曹子建王仲宣傅長虞應德璉劉韜之母任延之親書翰傷切文詞哀痛千悲萬恨何可勝言龍門之桐其枝已折卷施之草其心實傷嗚呼哀哉賦曰悲哉秋氣搖落變衰魂兮逺矣何去何依望思無望歸來不歸未逹東門之意空懼西河之譏在昔金陵天下喪亂王室板一作毁蕩生民塗炭兄弟則五郡分張父子則三州離散地鼎沸於袁曹人豺狼於楚漢或有擁樹罹災藏衣遭難未設桑弧先空柘館人惟一丘亭遂千秋邉韶永恨孫楚長愁張壯武之心疾羊南城之淚流痛斯傳體尋兹世載類聚作戴天道斯慈人倫此愛膝下龍摧掌中珠碎芝在室而先枯蘭生庭而蚤刈命之修短哀哉已滿鶴聲孤疑絶猿吟腸斷嬴博之間路似新安藤緘轊櫝枿掩虞棺不封不樹惟棘惟欒天慘慘而無色雲蒼蒼而正寒况乃流寓秦川飄颻播遷從官非官歸田不田對玉關而羇旅坐長河而暮年已觸目於萬恨更傷心於九泉至如三虎二龍三珠兩鳳並有山澤之靈各入熊羆之夢望隴首而不歸出都門而長送對寶碗而痛心撫玄經而流慟石華空服犀角虛篸風無少女草不宜男烏毛徒覆獸乳空含震為長男之宫巽為長女之位在我生年先凋此地人生幾何百憂俱至二王奉佛二郗奉道必至有期何能相保凄其零零疑颯焉秋草去矣黎民哀哉仲仁冀羊祜之前識期張衡之後身一朝風燭萬古埃塵丘陵兮何忍能留兮幾人文苑英華卷一百二十九
