body:
  text: 文苑英華卷九百十六宋李昉等編職官二十四節度三邠寧慶等州節度史孝章碑一首義昌軍節度使渾侃碑一首邠寧慶等州節度觀察處置使朝散大夫檢校户部尚書兼御史大夫賜紫金魚袋贈右僕射史公神道碑劉禹錫僕射名孝章字得仁本北方之强世雄朔野其後因仕中國遂為靈武建康人曽祖道徳贈右散騎常侍封懐澤郡王祖周洛銀青光禄大夫檢校太常卿兼御史中丞北海郡贈太子太保考憲誠早以武勇絶人積功至魏博節度使終于河中晉絳慈隰等州節度觀察使檢校司徒兼侍中河中尹贈太保其薨也大臣中書令晉國公裴氏為之碑其名益顯公即侍中之元子母曰冀國夫人李氏㓜而聰悟父母贒而加愛焉及長好學遷善秀出儕輩鄴下諸兒號為書生元和中太尉愬為魏帥下令掄材於轅門取大將家翹秀者為子弟軍列于諸校之上公獨昌言願效文職太尉深竒之遂假魏州大都督府參軍長慶二集作三非年常山衆叛害其帥沂國公田司徒於帳下沂公發迹于魏人猶懐之詔命其子布以尚書授鉞統魏兵問罪于此集作北疆且報家禍布既啓行士氣不振渙然内潰獨與冗從之旅偃旗而歸百憤攻中卒自引決先侍中時為中軍都知兵馬使兼御史中丞全師在野閧然推戴之請為假侯以鎮定中貴人飛驛上聞穆宗夜召翰林學士草詔書以真侯命之實有魏土從衆而合權也是歳公自攝官轉本府士曹參軍兼監察御史賜朱衣銀印推恩以及子也一旦跪於父母前進苦言曰臣切惟大河之北地雄兵精而天下贒士心侮之目河朔間視猶夷狄何也蓋有土者多乘兵機際㑹非以義取今臣家父侯母封化為貴門君恩至矣非痛折節礪行彰信於朝廷無以弭識者之譏寤明君之意節著於外福延於家乘時蹈機必不旋踵言訖泣下數行父俞母贊天性交感三心既叶萬衆化天子聞而嘉之曰彼真孝集作有子乃授檢校太子左諭徳兼侍御史充節度副使累遷至散騎常侍兼御史大夫賜金印紫綬既貳軍政事如命卿弛張損益得以參決革故態人知嚮方太和二年滄景節度使李全畧卒其子同捷竊據故地詔下以文誥弗革遂用大刑先侍中表請率先諸侯使元子以督戰制曰可公承君父之命乃捐其軀一舉而下平原壓滄壘由是加工部尚書及王師凱旋上表願一識承明廬允之遂赴北闕下得覿於便殿上曰嚮吾始征滄州議者皆曰彼魏之姻也虜隂為冦謀吾發使數輩以偵之其還也僉曰爾父瀝欵於賔筵爾母抗詞于簾下願絶姻以立效其經始啓發出於爾心今滄海砥平策勲之日宜貴爾三族命爾父為侍中遷鎮于近地加爾禮部尚書相衞澶三州為鎮以君之俾爾一門大榮以誇天下公拜稽首謝父遷讓已爵禮無違者翼日詔下于明庭人咸曰史氏之寵光古無有也牙旗碧幢方指東道侍中以帳下生變聞泰極而否當歌而哭迎柩于路仰天長號因葬于洛陽之北邙山冀國夫人祔焉寢苫枕塊以所仇同天為大酷未幾詔舉金革之義起為右金吾將軍累表陳乞有司以違命督之輿疾即路間歳擢授鄜坊丹延等州節度觀察處置等使居四年遷鎮于滑一歳入為右領軍衞大將軍旋改右金吾大將軍又授鉞于邠土孟秋至治所首冬遘疾拜章入覲不克展和鑾鞗革之儀薨于靖恭里之私第享齡三十有九當開成三年十月二十日上聞而悼之不視朝一日贈尚書右僕射明年二月歸葬于洛都夫人瑯琊王氏祔焉繼室深澤縣君博陵崔氏有一子曰煥生七年而孤僕射之喪自復魄至葬當門户備祭祀建碑表皆縣君之能且命其家具事功來請曰嫠不恤家而憂幼嗣不知其先人之宦業乞詞以傳于後也君子以為知禮謹書之銘曰斗極之下崆峒播氣鍾于侍中孔武且貴奉上致命冝昌後嗣僕射承之良弓不墜耳煩鉦皷心悦文字虎穴之中生此騏驥太和紀元滄景不䖍子弄父兵跳踉海壖有隣隂交蝟起雞連詔下薄伐艮隅騷然時惟侍中實統魏師蓄鋭未發衆心危疑僕射為子陳謀盡詞興言涕零有感尊慈絶姻効節精貫神祇滄波底寧王命褒之乃遷元戎來鎮近畿乃胙元子别建旌麾一門四節焜燿當時倐忽變生魏郊紛披喬木雖大盲風不知干雲之臺列缺焚之哀哀孝嗣丁此大酷迎護幃輤葬于東洛訴天觸地血染纕服禮有金革詔書敦促不遂枕戈驟膺推轂雕隂白馬暨于邠谷雖榮三鎮不荷百禄綺紈之間珪組纍纍如彼晨葩日中而萎有妻名家有子稚齒行號執禮歸窆蒿里洛水之陽脩集作循邙之趾尊穆敬恭集作尊卑穆敬幽顯同理舊松新松集作栢亦象喬集作橋梓刻石紀功垂千萬祀義昌軍節度使渾公神道碑路巖叙曰天業光昭寳臣間出雲臺重沓旂常紛綸吾巨唐乎鎮寧社稷纘揚忠烈勲居第一代代不絶其渾氏乎能遵祖法不失家聲立朝守土所居可紀其康公乎公諱侃字復貴其先姜姓之後漢郡渾邪王之裔始居于崤比後遷于河南今為代人為山西右族七代祖潭仕隋玉鈴衞大將軍生迴貴以兵從我高祖神堯皇帝佐平暴亂拜豹韜衞大將軍唐宰相世系表有靈丘伯三字生元慶為右玉鈴將軍表作鎮國大將軍靈邱伯表無此三字生大夀為太子僕表作大僕丞贈廣府大都督生釋之為開府儀同三司太常卿寧朔郡王廣徳中拒扞西戎身殁王事贈司空公大父諱瑊朔方副元帥河中節度檢校司空中書令咸寧王贈太師有大勲績其秩禄封賞埒汾陽西平皇家中興此三人力也父諱鎬義武軍節度易定觀察使檢校工部尚書贈太子少保取隴西李氏女實生公公為兒時則柔敬敦厚篤志於學九歳由𢎞文生擢孝廉第釋褐參同州軍事既冠益以通敏密静稱於人一無此三字因從先少師于藩方不忍去庭闈諸侯有以幣以馬聘者一無所就元和十二年先少師奉詔以中山兵伐叛而卒與冦遇以數千當數萬力戰而歸坐黜循州公憂蹙内結晨夜在側從容道否泰之理以解發於至誠少師為之洒然少師薨屏勺飲壊容貌幾不全者數矣嚴護踰大江長號動神明親友見者莫不悽惻憂其困絶往往罷弔既而外除大戚不衰遂退不肯仕居處飲食若執喪者是時朝廷循集作脩勲臣後或言曰咸寧功累代不可及其子身當聖朝以譴終未復無以示天下執政立言之天子感其事趣詔盡還少師爵土由是勲閥之家皆喜長慶中又有言公之材行不宜在閭巷者上亦以追顯咸寧功徳未足遂授公右龍武軍倉曹參軍歴太常寺主簿太府寺丞由是以吏事自喜明習文法咸寧王股肱王室卑體下士召置幕府得一時之人少師仕官早成不廢法度有譽於士大夫間公又修潔謙遜辭禮閒雅由是仁人與之遊長者訪其廬矣稱述日甚聞於庭中擢為左贊善大夫轉太子僕能勤其官改太府少卿始用利器貨泉事聚不頓鋒鋩益為試可一日昭獻皇帝讀國史至咸寧王卒嘆渾氏時無大官者欲用公未有縁即日以銀魚袾裷賜之俄拜金吾衞將軍寵以金紫公愈益小心俯僂不暇武宗時至太僕卿以謹良選宣宗即位改少府監以繕理稱又拜左金吾衞大將軍肅環衞明年遷司農卿練經制毎以處逸樂悖勤勞非忠也求出補吏不憚劇郡久之夀陽歳數饑有盜賊上選能理者丞相舉公可用公至則猛糾緩化曉告慰養先是有貨茶盜鬭變難制至是皆解散走匿又芍陂之水溉田數百頃為力勢者幸其肥美決去其流以耕公隄防約束水復盛溢沃野之利歳歳増多徵為殿中監服用如法頃之為昭王傅多稱惜之再為少府監遷檢校工部尚書金吾大將軍日在彤庭宣宗器其能遂賜高牙暢轂鎮于回中公門有將帥風習知四夷事以故綏邊之績不日而成西戎闕種王䝉數為邊害公曰西戎剽刼亦常事不煩兵鏖可以信取諭以咫尺之書果相率遁去居無何又遣其舍人董英粲歸誠且貪錦繡物公必其善意乃許互市竟不敢負約反覆初有戍卒子為族長所掠奴畜之至是董英粲輙購而歸之曰用報徳關城無警早開晏閉矣邊兵之衣輦自京師吏縁為奸纊帛悉濫公始周察變法犯必收按至乎聚給親往觀之舊調軍食倉廪庾回户内反逺不克往取率為空名又度其途以便之自是寒無皸瘃戍益伉健既衣又食之撫士至矣萃戰馬凡五百二十匹牛騾稱是修金革器五萬具備丁壯卒三千人聚新粟五萬斛邊備完富戎心震悚天子使使者賫詔即軍中加公檢校刑部尚書以報之居歳餘復召為大金吾升三品階三領緹騎日益親貴今天子即位謀滄海帥視公曰無以易爾咸通二年遂授義昌軍節度使其理如在經始至則表蠲水旱逋甚衆先是井為海染人不可飲遂閼河以汲舟行則決決又輙塞公視而計之泒鑿扄蓄舟來不留綆垂不息厥功亟就于今頼之有田十頃游惰者不顧公乃勤闢悉為膏腴既飲之又食之養人至矣窮民有鬻子者為之贖歸故校有孤女者時其配偶喪不辦葬骨暴於野皆為調棺柩具粟帛郵亭相逺道里患苦作室其間以庇來往歳比不稔給軍未贍峙糧十六萬石以為儲蓄大抵能推誠於下辛苦率先民愁未解公費未足孜孜雖人之求去已疾謀致家温不如也以故感神貺來瑞鷙百姓文武吏謳謌借留護戎者奏其狀天子嘉焉詔曰幸卒教化之許留旬歳五年秋受代朝廷方圖其功㑹其冬以疾聞明年三月二日薨于大寧里私第享年六十九其年十二月某日葬于京兆府萬年縣洪固鄉胄貴里於戲豹韜以義兵顯寧朔以邊患死咸寧以殊烈一作勲著少師以威名用洎公以材能選陳力無曠廢渾氏之風類是自穆宗後天下少事由是公未嘗有鬬戰功始則以至行好學恂恂若儒者中則以精力辨疑為循吏終則以和衆靜邊名之良帥不矜輿馬之飾不嗜粱肉之味家産稍贍則以振昆弟賔客士有賢者雖貧賤必與之均敵名以修飭光位以功效進自解褐數十年歴九卿為二千石繼父位臨方面榮當代焉保身守道一無塗汙於戲渾氏隂徳代封之慶則大於于公虞詡戰勲忘家之跡則優於平陽去病子孫支屬之榮則高於萬石耿氏然若公之材未大施設不繼乎台鼎不邇於期頤斯慊慊於五福也薨之日天子軫悼不朝贈大司馬葬之日給太常儀仗博士定諡曰康斯可以自見於後代矣長子曰術詹事府司直早終次子徵特徽普卓皆㓜父病篤召從父弟右威武上將軍佶泣告曰先少師以後事託吾季父爾必繼之佶涕泗遵用禮儀備具他日持故吏行狀託余斯文是以叙而銘之曰命氏自姜有後于唐咸寧達人實護玉璜功徳愈甚其緒乃昌少師冝之龍節煌煌尚書有繼卓然丱歳執喪之日厥生幾逝渾氏有子天子下制擢為大官如翼高戾帝前謹恭俾牧于東盜走年豐後為元戎彗煙息波兩有顯庸厥庸惟富施之無窮冝久饗樂神報何薄厥徳有本頌之靡涸實銘于斯不銷不落文苑英華巻九百十六
