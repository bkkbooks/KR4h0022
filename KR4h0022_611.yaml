body:
  text: 文苑英華卷六百十二宋李昉等編進祥瑞齊王進白兎表一首齊王進蒼烏表一首齊王進赤雀表一首為杭州刺史崔元将獻緑毛龜表一首為司農卿宗晉卿進赤觜山鵲表一首為鳯閣侍郎進瑞牛一頭額上有萬字蒙賜馬一疋表一首為鳯閣侍郎李元素進冬椹表一首為留守奏慶山醴泉表一首為留守奏羊乳麞表一首為留守奏嘉禾表一首進鬬羊表一首為李北海作進芝草表一首為楊州李長史作千秋節進毛龜表一首進文馬表一首為崔中丞進白䑕表一首廬州進嘉禾表一首進異馬駒表一首為太原李說尚書進白兎表一首齊王進白兎表庾信臣聞輿圗欲逺則玉虎晨鳴轍迹方開則銀麞入貢伏惟陛下明明在上翼翼居尊徳動天闗威移地軸是以風煙照燭毛羽禎祥史不絶書府無虗日臣受服元戎用綏邉鄙轅門所届始次熊山前茅慮無乃獲白兎光鮮越雉色麗秦狐月徳符徴金精表瑞呈祥輿頌効異披圖尊敬之迹既明應事之機斯兆臣之龔行實従陜略瑞以素質彌雄西氣庶重承廟筭方事申威揜代偃齊分韓裂趙不任鳬藻踴躍之情云云齊王進蒼烏表前人臣某言臣聞飛南陽之雉尚闡霸圖下建章之鵠一作鶴猶調和氣况乃虞庭告瑞姬社呈祥咸髙識哺之心實貴能知之性伏惟皇帝陛下徳教百姓孝刑一作刑於四海攝提従紀天下文明是以東海輸禽乍改黔質西山度羽或變蒼精臣去月三十日行到陜州獲大都督莫仁回樂列稱於州射堂内見一蒼烏林薄囘翔循環不去駐乗木之精轉司風之翼即召儀同某甲等同時觀見斯實禮敬所覃孝慈之感理宜歸瑞秘圖書祥帝冊用光至徳取效昇平無令赤鳯留止偏為瘞玉之歌𤣥鶴徘徊獨擅衘珠之舞齊王進赤雀表前人臣某言臣聞南陽雉飛尚論秦霸建章鵠一作鶴下猶明漢徳當今天不愛寳地必呈祥自應長樂觀符文昌啓瑞伏惟皇帝欽明文思惟以劬勞成務厯象日月允釐百工海水無波天星不動去四月十三日獲隴右符府叅軍李暉牒稱戸屬秦州清水郡伯陽縣文谷林在家庭獲一赤雀光同朱鳯色類丹烏降火飛精似入公車之府流金成製若上凌雲之䑓謹按赤雀衘書止於酆戸周之受命興乎此祥即事所觀同符合契實可圖形瑞譜書頌儒林事足成臺名堪紀號豈直一作有非雲中太守見赤心之奉主蓬莱童子知白環之報恩臣等預觀休徴情廹恒慶不任鳬藻之至為杭州刺史雀元将獻緑毛龜表李嶠臣某言臣聞五氣殊方元龜列於𤣥武四靈異稟神蔡逰於紫泉用能藏徃知来發祥祚聖大禹之永終天禄文薦九疇隆姬之乃命帝庭兆言三吉永言秘寳録仔縑簡伏惟金輪聖神皇帝陛下藴靈沙刼屈道璿樞推正覺而御彛倫𢎞大悲而撫群俗雲行雨施之澤下漏三泉春生夏長之人曲成萬物恩洎草木恵覃飛走天澤感氣而延和神靈應徳而呈瑞伏見所部錢塘縣人聶幹於市内水中獲毛龜一枚脩尾長頭𤣥甲緑毳名掩於楚宗状竒於靈繹雖六眸在首未足尚其禎祥五色成文詎能齊其詭異伏叢蓍而自乆下蓮芳而暫出美兼曠代休踰群祉謹按孫氏瑞應圖曰王者徳澤湛漬漁獵從時則靈龜出禮含文嘉曰内外之制各得其宜則山澤出靈龜陛下觧網收罟𢎞天地之大德創制改物窮帝王之能事冝其膺受冥貺克享珍符且益有十朋表賢才之入用夀踰千祀彰聖歴之無彊嘉祉不召而自臻乾象無祈而潜應臣謬當重寄親奉洪庥靈異爰臻既駭於常觀忭舞胥屬實兼於恒品無任慶躍之至為司農卿宗晉卿進赤觜山鵲表前人臣晉卿言昨於宿羽亭子園内捉得赤觜山鵲一枚其鳥有三足中足有五指近人相託爪上有毛儀觀非常精彩特異雖貌在禽類而名髙羽族鮮毛孕碧勁觜含丹三足呈休與黔烏而比孝五指為瑞共白麟而同德塡河未足方其美繞樹無以儷其珍故使緑衣翠襟羞言辯恵藻翰錦臆憚稱竒偉將明天子之德遂入虞人之羅自非睿感潜通禎符顯應豈能殊祥畢凑異物咸臻曠千古而難逢超百王而獨異臣謬叅簮笏忝列葭莩忭躍之情實倍恒品無任喜慶之至謹奉表稱賀以聞其山鵲謹随表同進為鳯閣李侍郎進瑞一作􅀈牛一頭額上有萬字蒙賜馬一匹表前人臣某言臣昨輕率愚陋進瑞牛一頭今蒙恩賜良馬一匹伏惟陛下道超萬古化穆三神故得天壤薦成幽明歸奉植物動類變形質而呈休羽族毛羣革音容而表貺萬為盈數化成於大武之元􅀈者粹文煥炳於純離之畜斯乃自天靈命曠代殊祥實上聖之元符在微臣之何力猥蒙宸奨曲被皇慈移滅沒於帝閑降權竒於御皁漢宫流赭遂出於玉臺軒后飛黄俯回於馳道一作罄室豈直衣冠同羡固亦妻子相驚臣亦何人冒斯殊寵惟當附茲驥尾希自勵於疲駑託此龍媒庶長承於驅䇿無任悚戴之至謹奉表陳謝以聞為鳯閣侍郎李元素進冬椹表前人臣某言聞京兆萬年縣大寧坊宅内有桑樹一株暮秋生子初冬椹熟今謹取得專輙進奉伏惟陛下恵覃區㝢仁洎草木故得神蠶之樹發秀於寒露之辰帝女之林結實於繁霜之下出於萬年之界彰一人萬嵗之符生自大寧之坊表群生大安之慶鴟鴞已革見夷貊之懐音絲蠒行豐見府藏之逾實殊禎荐委絶貺仍臻凡在含生孰不欣慶無任忭躍之至謹奉表陳賀以聞為留守作奏慶山醴泉表武后張說臣某言臣聞至徳洞微天鑒不逺休徴秘景時和則見是知綿代曠厯慶牒祥經帝王有必感之符神靈無虚出集作應之瑞伏惟天冊金輪聖神皇帝陛下金鏡御天璿衡考政欽若𤣥象𢎞濟蒼甿茂功将大造混成純化與陽和俱扇朝百神之樂職宅萬國之歡心嘉氣内充滛雨外息豈止摇風紀月之草列蒔於堦厨儀簫御籙之禽相鳴於戸閣而已固有發禎厚載抽貺泉源表𤣥徳之潜通顯黄祇之昭報臣去集作於六月二十五日得所部萬年縣令鄭國忠状稱去六月十四日縣界霸陵郷有慶山見醴泉出臣謹差司戸集作戸曹叅軍孫履直對山側集作中百姓檢問得状其山平地湧㧞周回數里列置三峯齊髙百仭山見之日天青如雲集作天晴無雲異雷雨集作風雲非之遷徙非崖岸之騫震歘爾隆崇巍然葱欝阡陌如舊草樹不移騐益地之祥圖知太乙之靈化山南又有醴泉三道引注三池分流接潤連山對浦各深丈餘廣百歩味色甘潔特異常泉比僊漿於軒后均愈疾於漢代臣按孫氏瑞應圖曰慶山者徳茂則生臣又按白虎通曰醴泉者義泉也可以養老常出於京師禮斗威儀曰人君乗土而王其政太平則醴泉湧潜潭集無潭字巴曰君臣和徳道度叶中則醴泉出臣竊以五行推之六月土王神在未母之象也土為宫君之義也水為智土為信集作仁水伏於土臣之道也水相於金子之佐也今土以月王而髙水従土制而静天意若曰母王君尊良臣善相仁化致理徳茂時平之應也臣又以山為鎮國水實利人縣有萬年之名山得三仙之類此盖金契集作輿景福寳祚昌圖邦固不移之基君永無疆之夀自永昌之後迄于集作於茲辰地寳屢昇神山再聳未若連巖結慶並泌䟽英華作疎非甘群瑞同區二美齊舉髙視今古集作古今曽無擬議信可以紀元立號薦廟登郊彰賁億齡愉衍萬宇臣厚司京尹忝寄㽞臺牧西土集作夏之疲人荷東蕃之餘寵㳺泳鴻露集作霈震悚明神禧祉有歸集作神禧嘉祉物感有歸光啟茲部喜覩殊觀實百恒流踴躍一隅馳誠雙闕伏請宣付史館頒示朝廷無任鳬藻之至謹遣某官進圖奉進為㽞守奏羊乳麞表武后前人臣某言臣聞靈感無方每先時以見象神監集作鑒不昩必慿物以示人有徳著而休歸或祥来而事應伏惟天䇿金輪聖神皇帝陛下端冕馭天舞干柔逺南越瑞貢久通譯而歸仁西域竒山近随方而應聖臣今月集作日得所部萬年縣令鄭國忠状送新出慶山下羖牝羊乳麞麑一頭狎擾因依動息隨戀如生集作従所産若素同羣理有可嘉事無前例臣聞異物集作竊以異類相育外方慕化之徴野畜自馴荒服来王之兆必有逺夷觧辮歡心百獸之庭獷俗懐音稽首三朝集作稽顙三乘之㑹臣言可騐翹足自期昔馬或生羊易占得人安之體犬時養彘天鏡顯代康之文援此比蹤實為同貫况復晨飲醴浦夕下靈山翳仙杏之竒花拾嘉禾之餘穂羊禎甚玉麞慶踰集作如銀晦朔未移祥符累集福應之盛今集作前古未聞臣忝尹京都屢薦嘉瑞慶忭集作忭躍之至兼倍恒流謹差某官奉表隨進為㽞守奏嘉禾表武后前人臣某言臣聞天聽自人神和在徳代非乏瑞罕遇開一作交泰之期福不虚徴必俟休明之主伏惟天冊金輪聖神皇帝陛下仁覆萬靈孝理四海功莫集作罔髙於尊祖道莫大於配天嚴備郊禋崇肅宗祀秩百王之禮兼六代之樂恩集作化溢膠庠訓優更老政每先於帝籍役不紊集作奪於農時嘉氣横㳺集作浮祥風紛灑騰文煒色九光連合於貞明逸輩殊倫集作逸輩殊輪百寳駢滋於動植臣今月日奉進㫖告望鳯臺慶山醴泉之瑞其日於山陵東三字集作東山栢城内得嘉禾一木臣初見衆苖亘壟香頴垂秋嘉玩集作翫䌓滋欲觀成粒左右無識折以呈臣異其緑葉緩舒葱芒壁秀熟視竒状乃知嘉祥下則異畝合莖上又同連雙穂昔雍熈之代政理之君雖導出應時而生不擇地未有託根神域彰孝徳之能深吐秀夀宫助粢盛之豐潔此盖睿誠通感靈集作天祐降祥中古以来未覩斯美臣籍慶宗枝久沐星潢之潤躬持瑞穎預奉天保之符忭恱之誠倍兼恒品進鬬羊表𤣥宗前人臣某言臣聞勇士冠鷄武夫戴鶡推情舉類獲此鬬羊逺生越嶲蓄情剛决敵不避强戰不顧死雖為微物志不可挫伏惟陛下選良家於六郡求猛士於四方鳥無遁材獸不藏伎如蒙効竒靈囿角力天塲却皷怒以作氣前躑躅以奮擊趹古冘切疾也若奔雲之交觸碎如轉石之相叩裂骨賭勝濺血争雄敢毅見而充冠鷙狠聞而擊節冀将少助明主市駿骨揖怒蛙之意也若使羊能言必将曰苦鬬不觧立有死者所賴一作願至仁無殘量力取勸焉臣縁損足未堪履地謹遣男附馬都尉垍謹詣金闕舊唐書作明門陳進輕冒宸嚴伏深戰越為李北海作進芝草表𤣥宗蕭頴士臣某言臣聞郊祀盡敬粢盛豐潔則天降休祉地生靈芝大哉斯元和正氣有感而昭敷者爾古先哲后所由盡心臣本郡道學講堂中梁有芝英産見六莖共本正向堂門素色純净流輝棟宇臣遐考曩厯旁窺瑞牒多矣至若神爵九枝青龍三幹菌蠢池籞葳㽔甸服猶復登諸宗廟被以頌聲又况極道徳之至精鑠𤣥元之景命超漢軼魏光圖掩牒之秘瑞伏惟開元天寳聖文神武皇帝陛下大孝尊先𤣥功兆物奐清宫於群國驅赤縣於仁夀天弗違而寳厯重昌瑞有荅而金莖一作英特秀觀其審曲靣勢負隂抱陽當九月而生聿符陽數挺六莖之表遥叶樂章昭聖祚於天長返皇風於古始加之氷霰奪色緇塵不染迎曉日而相鮮與秋雲一作空而共潔雖復晨敷者五競爽於丹田嵗秀者三擢榮於𤣥圃以兹視彼奚其瑣碎臣姓忝宗枝任叨藩首一作守揚吹萬之化預禀陶鈞聳倍百之情寧忘肺腑為楊州李長史作千秋節進毛龜表𤣥宗前人臣某言臣聞在昔上皇之御極也則𤣥化有助嘉祥必臻故升中於天而四靈一作靈貺是格若夫出洛登壇青文丹甲之瑞王霸以降遼哉夐乎不可得而聞已然其緬邈郊藪威夷簡牒與時而升降者亦徃徃而存未有含道徳之純粹闡祖宗之休命俯視千載潜通百靈允符秘祉若今之盛者也伏惟皇帝陛下至誠允迪懸觧自衷神有契而斯輔道惟深而不測故錙銖繫表寤寐胥庭七曜垂文則𤣥言一作元焯叙千秋表節則緑錯来儀以今月某日所部江都縣崇虚觀講聖注道徳經於𤣥元皇帝座隅有毛龜出見翠一作羣毫金介爍日霏烟迹殊生育来縁感召應陛下長靈之期符先聖谷神之妙知来藏徃實見於兹休徴委集萬方幸甚手舞足蹈倍百恒情無任喜恱之至謹奉表以聞進文馬表李邕臣某言臣聞禽獸殊祥卉木竒状自古者疑也必有應焉伏惟陛下徳合天地道通神明天地所以来神物所以見且麟者仁獸主仁者則呈馬者文身君文者即一作則降曽是上叶尊號下報太平也觀夫豹蔚騰文龍章助聖書籍所未載耳目所未聞即知非常之君必有非常之物臣不勝忭躍欣慶之至謹遣某官馳表奉進以聞臣某誠惶誠恐為崔中丞進白䑕表李丹臣某言以今月某日於所部宣城縣謝亭郷百姓姚徳家獲白䑕一素毛毿然净若氷雪體貌閒暇異於其倫臣為一作謂白者少隂之色也䑕者隂姦人之象也夫以晝伏夜動之質穴社穿墉之姿而乃禀金方之正色投籠檻以馴擾此盖小人革性之瑞西戎授首之符臣某中謝臣又聞白虎白䑕皆金行之祥也且獸之大者莫勇於虎獸之小者莫怯於䑕前志有之曰用之則如虎不用則如䑕則虎之與䑕其類之極乎臣愚以為天之意者又以䑕警陛下耳夫犬戎猾夏者乘金方沴氣也陛下若臨之以律防之以時則雖强如虎将弱如䑕矣陛下若臨之失律防之後時則雖弱如䑕将强如虎矣今犬戎未滅秋律始行伏願陛下鍳上天之炯誡納微臣之芻詞考金行従革之儀徴虎䑕强弱之勢則當西極月窟率来王矣况復蠢爾犬戎乎無任廬州進嘉禾表符載臣某言得廬州刺史裴靖状稱巢縣百姓唐海母喪廬墓手自耕植以備祠祭無何於粟田之中輙産嘉禾一本六穂一本五穂即時差録事叅軍朱寧丁寧考驗事状明白臣聞感天地者存乎誠通神明者極乎孝藴而為精粹發而為禎祥上𤣥與之獻酬后土為之泄露故使騰芳髙隴擢頴清秋冠九榖之英英増大田之藹藹此皆陛下聖徳茂鴻化洽名教立風俗厚生人之内有淳孝靈瑞之下有嘉禾邁風烈於前王奐丹青於唐史不然何幽膂𤣥答其若是乎臣猥以純劣祗守風土宣陛下之恩澤撫陛下之庶甿覩茲盛美光榮耳目不勝歡忭踴躍之至進異馬駒表令狐楚臣某言得當道征馬使穆林状稱忻州定襄縣王進封村界去五月十二日夜孶化一作生馬羣内異駒一疋白騧文馬畫圖送到者臣謹差虞候辛峻専徃考驗并母取到太原府而毛色變換與青騧色駝頭趺額紅鼻肉駿尾上茸毛額帯星及旋肋骨左右各十八枝四蹄青兩眼黒續得穆林状稱當生之夜羣馬皆嘶靈質炳然休徴備矣臣某中謝臣聞馬之精也自天而降馬之功也行地無疆是以武藉其威文榮其徳謹按馬經云肋數十六者行千里伏惟陛下握負圖之瑞惣服皁之靈異物殊祥蔚然叢集臣觀前􅟢駒靈表挺特雄姿逸異頸昻昻而鳯顧尾宛宛以蛇蟠信坤元之利貞誠太乙之𤣥貺自将到府便麗于宫每飲以清池牧于芳草則彌日翹立驅之不前及長風時来㣲雨新霽輙驤首奔騁追之莫及臣某恒親省視専遣柔馴倘駿骨峯生竒毛日就獲登華厩既備屬車逺齊飛兎之名上奉應龍之馭天下大慶微臣至願見今養飼至秋中即専進獻伏惟陛下兼愛好竒想其風彩今謹圖畫随表上進伏乞聖恩宣付史館俾此丕烈垂于無窮臣無任戰越之至為太原李說尚書進白兎表見六百四十二卷進貢門前人文苑英華卷六百十二
