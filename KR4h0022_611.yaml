body:
  text: 文苑英華卷六百十二宋李昉等編進祥瑞齊王進白兔表一首齊王進蒼烏表一首齊王進赤雀表一首為杭州刺史崔元將獻緑毛龜表一首為司農卿宗晉卿進赤觜山鵲表一首為鳯閣侍郎進瑞牛一頭額上有萬字蒙賜馬一匹表一首為鳯閣侍郎李元素進冬椹表一首為留守奏慶山醴泉表一首為留守奏羊乳麞表一首為留守奏嘉禾表一首進鬬羊表一首為李北海作進芝草表一首為楊州李長史作千秋節進毛龜表一首進文馬表一首為崔中丞進白鼠表一首廬州進嘉禾表一首進異馬駒表一首為太原李説尚書進白兔表一首齊王進白兔表庾信臣聞輿圗欲逺則玉虎晨鳴轍迹方開則銀麞入貢伏惟陛下明明在上翼翼居尊德動天關威移地軸是以風煙照燭毛羽禎祥史不絶書府無虗日臣受服元戎用綏邉鄙轅門所屆始次熊山前茅慮無乃獲白兔光鮮越雉色麗秦狐月德符徴金精表瑞呈祥輿頌效異披圖尊敬之迹既明應事之機斯兆臣之龔行實從陜略瑞以素質彌雄西氣庶重承廟算方事申威掩代偃齊分韓裂趙不任鳬藻踴躍之情云云齊王進蒼烏表前人臣某言臣聞飛南陽之雉尚闡霸圖下建章之鵠一作鶴猶調和氣况乃虞庭告瑞姬社呈祥咸髙識哺之心實貴能知之性伏惟皇帝陛下德教百姓孝刑一作刑於四海攝提從紀天下文明是以東海輸禽乍改黔質西山度羽或變蒼精臣去月三十日行到陜州獲大都督莫仁回樂列稱於州射堂內見一蒼烏林薄回翔循環不去駐乘木之精轉司風之翼即召儀同某甲等同時觀見斯實禮敬所覃孝慈之感理宜歸瑞祕圖書祥帝册用光至德取效升平無令赤鳯留止偏為瘞玉之歌玄鶴徘徊獨擅銜珠之舞齊王進赤雀表前人臣某言臣聞南陽雉飛尚論秦霸建章鵠一作鶴下猶明漢德當今天不愛寶地必呈祥自應長樂觀符文昌啓瑞伏惟皇帝欽明文思惟以劬勞成務厯象日月允釐百工海水無波天星不動去四月十三日獲隴右符府參軍李暉牒稱戶屬秦州清水郡伯陽縣文谷林在家庭獲一赤雀光同朱鳯色類丹烏降火飛精似入公車之府流金成製若上凌雲之臺謹按赤雀銜書止於酆戶周之受命興乎此祥即事所觀同符合契實可圖形瑞譜書頌儒林事足成臺名堪紀號豈直一作有非雲中太守見赤心之奉主蓬萊童子知白環之報恩臣等預觀休徴情迫恆慶不任鳬藻之至為杭州刺史雀元將獻緑毛龜表李嶠臣某言臣聞五氣殊方元龜列於玄武四靈異稟神蔡逰於紫泉用能藏往知來發祥祚聖大禹之永終天祿文薦九疇隆姬之乃命帝庭兆言三吉永言祕寶録仔縑簡伏惟金輪聖神皇帝陛下藴靈沙劫屈道璿樞推正覺而御彛倫𢎞大悲而撫群俗雲行雨施之澤下漏三泉春生夏長之人曲成萬物恩洎草木惠覃飛走天澤感氣而延和神靈應德而呈瑞伏見所部錢塘縣人聶幹於市內水中獲毛龜一枚修尾長頭玄甲緑毳名掩於楚宗狀竒於靈繹雖六眸在首未足尚其禎祥五色成文詎能齊其詭異伏叢蓍而自久下蓮芳而暫出美兼曠代休踰群祉謹按孫氏瑞應圖曰王者德澤湛漬漁獵從時則靈龜出禮含文嘉曰內外之制各得其宜則山澤出靈龜陛下解網收罟𢎞天地之大德創制改物窮帝王之能事冝其膺受冥貺克享珍符且益有十朋表賢才之入用夀踰千祀彰聖歷之無強嘉祉不召而自臻乾象無祈而潛應臣謬當重寄親奉洪庥靈異爰臻既駭於常觀忭舞胥屬實兼於恆品無任慶躍之至為司農卿宗晉卿進赤觜山鵲表前人臣晉卿言昨於宿羽亭子園內捉得赤觜山鵲一枚其鳥有三足中足有五指近人相託爪上有毛儀觀非常精彩特異雖貌在禽類而名髙羽族鮮毛孕碧徑觜含丹三足呈休與黔烏而比孝五指為瑞共白麟而同德填河未足方其美繞樹無以儷其珍故使緑衣翠襟羞言辨惠藻翰錦臆憚稱竒偉將明天子之德遂入虞人之羅自非睿感潛通禎符顯應豈能殊祥畢湊異物咸臻曠千古而難逢超百王而獨異臣謬參簮笏忝列葭莩忭躍之情實倍恆品無任喜慶之至謹奉表稱賀以聞其山鵲謹隨表同進為鳯閣李侍郎進瑞一作􅀈牛一頭額上有萬字蒙賜馬一匹表前人臣某言臣昨輕率愚陋進瑞牛一頭今蒙恩賜良馬一匹伏惟陛下道超萬古化穆三神故得天壤薦成幽明歸奉植物動類變形質而呈休羽族毛羣革音容而表貺萬為盈數化成於大武之元􅀈者粹文煥炳於純離之畜斯乃自天靈命曠代殊祥實上聖之元符在微臣之何力猥蒙宸奬曲被皇慈移滅沒於帝間降權竒於御皂漢宫流赭遂出於玉臺軒后飛黃俯回於馳道一作罄室豈直衣冠同羡固亦妻子相驚臣亦何人冒斯殊寵惟當附茲驥尾希自勵於疲駑託此龍媒庶長承於驅䇿無任悚戴之至謹奉表陳謝以聞為鳯閣侍郎李元素進冬椹表前人臣某言聞京兆萬年縣大寧坊宅內有桑樹一株暮秋生子初冬椹熟今謹取得專輒進奉伏惟陛下惠覃區宇仁洎草木故得神蠶之樹發秀於寒露之辰帝女之林結實於繁霜之下出於萬年之界彰一人萬嵗之符生自大寧之坊表群生大安之慶鴟梟已革見夷貊之懷音絲繭行豐見府藏之逾實殊禎荐委絶貺仍臻凡在含生孰不欣慶無任忭躍之至謹奉表陳賀以聞為留守作奏慶山醴泉表武后張説臣某言臣聞至德洞微天鑒不逺休徴祕景時和則見是知綿代曠厯慶牒祥經帝王有必感之符神靈無虛出集作應之瑞伏惟天册金輪聖神皇帝陛下金鏡御天璿衡考政欽若玄象𢎞濟蒼氓茂功將大造混成純化與陽和俱扇朝百神之樂職宅萬國之歡心嘉氣內充淫雨外息豈止搖風紀月之草列蒔於階厨儀簫御籙之禽相鳴於戶閣而已固有發禎厚載抽貺泉源表玄德之潛通顯黃祇之昭報臣去集作於六月二十五日得所部萬年縣令鄭國忠狀稱去六月十四日縣界霸陵鄉有慶山見醴泉出臣謹差司戶集作戶曹參軍孫履直對山側集作中百姓檢問得狀其山平地湧拔周回數里列置三峯齊髙百仭山見之日天青如雲集作天晴無雲異雷雨集作風雲非之遷徙非崖岸之騫震歘爾隆崇巍然蔥鬱阡陌如舊草樹不移驗益地之祥圖知太乙之靈化山南又有醴泉三道引注三池分流接潤連山對浦各深丈餘廣百步味色甘潔特異常泉比仙漿於軒后均愈疾於漢代臣按孫氏瑞應圖曰慶山者德茂則生臣又按白虎通曰醴泉者義泉也可以養老常出於京師禮斗威儀曰人君乘土而王其政太平則醴泉湧潛潭集無潭字巴曰君臣和德道度叶中則醴泉出臣竊以五行推之六月土王神在未母之象也土為宫君之義也水為智土為信集作仁水伏於土臣之道也水相於金子之佐也今土以月王而髙水從土制而靜天意若曰母王君尊良臣善相仁化致理德茂時平之應也臣又以山為鎮國水實利人縣有萬年之名山得三仙之類此蓋金契集作輿景福寶祚昌圖邦固不移之基君永無疆之夀自永昌之後迄于集作於茲辰地寶屢升神山再聳未若連巖結慶並泌疏英華作疏非甘群瑞同區二美齊舉髙視今古集作古今曽無擬議信可以紀元立號薦廟登郊彰賁億齡愈衍萬宇臣厚司京尹忝寄留臺牧西土集作夏之疲人荷東蕃之餘寵遊泳鴻露集作霈震悚明神禧祉有歸集作神禧嘉祉物感有歸光啓茲部喜覩殊觀實百恆流踴躍一隅馳誠雙闕伏請宣付史館頒示朝廷無任鳬藻之至謹遣某官進圖奉進為留守奏羊乳麞表武后前人臣某言臣聞靈感無方每先時以見象神監集作鑒不昧必慿物以示人有德著而休歸或祥來而事應伏惟天䇿金輪聖神皇帝陛下端冕馭天舞干柔逺南越瑞貢久通譯而歸仁西域竒山近隨方而應聖臣今月集作日得所部萬年縣令鄭國忠狀送新出慶山下羖牝羊乳麞麑一頭狎擾因依動息隨戀如生集作從所産若素同羣理有可嘉事無前例臣聞異物集作竊以異類相育外方慕化之徴野畜自馴荒服來王之兆必有逺夷解辮歡心百獸之庭獷俗懷音稽首三朝集作稽顙三乘之會臣言可驗翹足自期昔馬或生羊易占得人安之體犬時養彘天鏡顯代康之文援此比蹤實為同貫况復晨飲醴浦夕下靈山翳仙杏之竒花拾嘉禾之餘穗羊禎甚玉麞慶踰集作如銀晦朔未移祥符纍集福應之盛今集作前古未聞臣忝尹京都屢薦嘉瑞慶忭集作忭躍之至兼倍恆流謹差某官奉表隨進為留守奏嘉禾表武后前人臣某言臣聞天聽自人神和在德代非乏瑞罕遇開一作交泰之期福不虛徴必俟休明之主伏惟天册金輪聖神皇帝陛下仁覆萬靈孝理四海功莫集作罔髙於尊祖道莫大於配天嚴備郊禋崇肅宗祀秩百王之禮兼六代之樂恩集作化溢膠庠訓優更老政每先於帝籍役不紊集作奪於農時嘉氣橫遊集作浮祥風紛灑騰文煒色九光連合於貞明逸輩殊倫集作逸輩殊輪百寶駢滋於動植臣今月日奉進旨告望鳯臺慶山醴泉之瑞其日於山陵東三字集作東山柏城內得嘉禾一木臣初見衆苖亘壟香頴垂秋嘉玩集作玩繁滋欲觀成粒左右無識折以呈臣異其緑葉緩舒蔥芒壁秀熟視竒狀乃知嘉祥下則異畝合莖上又同連雙穗昔雍熙之代政理之君雖導出應時而生不擇地未有託根神域彰孝德之能深吐秀夀宫助粢盛之豐潔此蓋睿誠通感靈集作天祐降祥中古以來未覩斯美臣籍慶宗枝久沐星潢之潤躬持瑞穎預奉天保之符忭恱之誠倍兼恆品進鬬羊表玄宗前人臣某言臣聞勇士冠雞武夫戴鶡推情舉類獲此鬬羊逺生越嶲蓄情剛決敵不避強戰不顧死雖為微物志不可挫伏惟陛下選良家於六郡求猛士於四方鳥無遁材獸不藏伎如蒙效竒靈囿角力天場却鼓怒以作氣前躑躅以奮擊趹古冘切疾也若奔雲之交觸碎如轉石之相叩裂骨賭勝濺血爭雄敢毅見而充冠鷙狠聞而擊節冀將少助明主市駿骨揖怒蛙之意也若使羊能言必將曰苦鬬不解立有死者所賴一作願至仁無殘量力取勸焉臣緣損足未堪履地謹遣男附馬都尉垍謹詣金闕舊唐書作明門陳進輕冒宸嚴伏深戰越為李北海作進芝草表玄宗蕭頴士臣某言臣聞郊祀盡敬粢盛豐潔則天降休祉地生靈芝大哉斯元和正氣有感而昭敷者爾古先哲后所由盡心臣本郡道學講堂中梁有芝英産見六莖共本正向堂門素色純淨流輝棟宇臣遐考曩厯旁窺瑞牒多矣至若神爵九枝青龍三幹菌蠢池籞葳㽔甸服猶復登諸宗廟被以頌聲又况極道德之至精鑠玄元之景命超漢軼魏光圖掩牒之祕瑞伏惟開元天寶聖文神武皇帝陛下大孝尊先玄功兆物奐清宫於群國驅赤縣於仁夀天弗違而寶厯重昌瑞有答而金莖一作英特秀觀其審曲靣勢負隂抱陽當九月而生聿符陽數挺六莖之表遙叶樂章昭聖祚於天長返皇風於古始加之氷霰奪色緇塵不染迎曉日而相鮮與秋雲一作空而共潔雖復晨敷者五競爽於丹田嵗秀者三擢榮於玄圃以兹視彼奚其瑣碎臣姓忝宗枝任叨藩首一作守揚吹萬之化預稟陶鈞聳倍百之情寧忘肺腑為楊州李長史作千秋節進毛龜表玄宗前人臣某言臣聞在昔上皇之御極也則玄化有助嘉祥必臻故升中於天而四靈一作靈貺是格若夫出洛登壇青文丹甲之瑞王霸以降遼哉敻乎不可得而聞已然其緬邈郊藪威夷簡牒與時而升降者亦往往而存未有含道德之純粹闡祖宗之休命俯視千載潛通百靈允符祕祉若今之盛者也伏惟皇帝陛下至誠允迪懸解自衷神有契而斯輔道惟深而不測故錙銖繫表寤寐胥庭七曜垂文則玄言一作元焯敘千秋表節則緑錯來儀以今月某日所部江都縣崇虛觀講聖注道德經於玄元皇帝座隅有毛龜出見翠一作羣毫金介爍日霏煙迹殊生育來緣感召應陛下長靈之期符先聖谷神之妙知來藏往實見於兹休徴委集萬方幸甚手舞足蹈倍百恆情無任喜恱之至謹奉表以聞進文馬表李雍臣某言臣聞禽獸殊祥卉木竒狀自古者疑也必有應焉伏惟陛下德合天地道通神明天地所以來神物所以見且麟者仁獸主仁者則呈馬者文身君文者即一作則降曽是上叶尊號下報太平也觀夫豹蔚騰文龍章助聖書籍所未載耳目所未聞即知非常之君必有非常之物臣不勝忭躍欣慶之至謹遣某官馳表奉進以聞臣某誠惶誠恐為崔中丞進白鼠表李丹臣某言以今月某日於所部宣城縣謝亭鄉百姓姚德家獲白鼠一素毛毿然淨若氷雪體貌間暇異於其倫臣為一作謂白者少隂之色也鼠者隂姦人之象也夫以晝伏夜動之質穴社穿墉之姿而乃稟金方之正色投籠檻以馴擾此蓋小人革性之瑞西戎授首之符臣某中謝臣又聞白虎白鼠皆金行之祥也且獸之大者莫勇於虎獸之小者莫怯於鼠前志有之曰用之則如虎不用則如鼠則虎之與鼠其類之極乎臣愚以為天之意者又以鼠警陛下耳夫犬戎猾夏者乘金方沴氣也陛下若臨之以律防之以時則雖強如虎將弱如鼠矣陛下若臨之失律防之後時則雖弱如鼠將強如虎矣今犬戎未滅秋律始行伏願陛下鑒上天之炯誡納微臣之芻詞考金行從革之儀徴虎鼠強弱之勢則當西極月窟率來王矣况復蠢爾犬戎乎無任廬州進嘉禾表符載臣某言得廬州刺史裴靖狀稱巢縣百姓唐海母喪廬墓手自耕植以備祠祭無何於粟田之中輒産嘉禾一本六穗一本五穗即時差録事參軍朱寧丁寧考驗事狀明白臣聞感天地者存乎誠通神明者極乎孝藴而為精粹發而為禎祥上玄與之獻酬后土為之泄露故使騰芳髙隴擢頴清秋冠九榖之英英增大田之藹藹此皆陛下聖德茂鴻化洽名教立風俗厚生人之內有淳孝靈瑞之下有嘉禾邁風烈於前王奐丹青於唐史不然何幽膂玄答其若是乎臣猥以純劣祗守風土宣陛下之恩澤撫陛下之庶氓覩茲盛美光榮耳目不勝歡忭踴躍之至進異馬駒表令狐楚臣某言得當道征馬使穆林狀稱欣州定襄縣王進封村界去五月十二日夜孶化一作生馬羣內異駒一匹白騧文馬畫圖送到者臣謹差虞候辛峻専往考驗并母取到太原府而毛色變換與青騧色駝頭趺額紅鼻肉駿尾上茸毛額帶星及旋肋骨左右各十八枝四蹄青兩眼黑續得穆林狀稱當生之夜羣馬皆嘶靈質炳然休徴備矣臣某中謝臣聞馬之精也自天而降馬之功也行地無疆是以武藉其威文榮其德謹按馬經云肋數十六者行千里伏惟陛下握負圖之瑞惣服皂之靈異物殊祥蔚然叢集臣觀前􅟢駒靈表挺特雄姿逸異頸昻昻而鳯顧尾宛宛以蛇蟠信坤元之利貞誠太乙之玄貺自將到府便麗于宫每飲以清池牧于芳草則彌日翹立驅之不前及長風時來微雨新霽輒驤首奔騁追之莫及臣某恆親省視専遣柔馴倘駿骨峯生竒毛日就獲登華廄既備屬車逺齊飛兔之名上奉應龍之馭天下大慶微臣至願見今養飼至秋中即専進獻伏惟陛下兼愛好竒想其風彩今謹圖畫隨表上進伏乞聖恩宣付史館俾此丕烈垂于無窮臣無任戰越之至為太原李説尚書進白兔表見六百四十二卷進貢門前人文苑英華卷六百十二
