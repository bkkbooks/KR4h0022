body:
  text: 文苑英華卷五百三十七宋李昉等編襲封孝感門十八道襲封佯狂讓弟判二道嗣足不良判三道子姪承襲判一道當襲僞逃判一道用父䕃判一道請封爵贖罪判一道孝感澤中得堇判二道夢得籬粟判三道赤烏巢門判一道投箋獲弟判二道嫂疾得藥判一道襲封佯狂讓弟判陳乙襲爵遂佯狂以讓弟甲嗣爵後方入仕鄰人告甲非嫡子不合襲對房自厚德懋懋官功懋懋賞是崇開國之典以致承家之事陳乙志符前彥愛結友于雖佯狂之或違亦志義之可尚循令問而克嗣固不當仁依德言而靡渝理應承嫡况乃操刀使割能則無傷執射從畋貫乃斯獲仕進所取孝弟歸先苟以讓而入官能濟人而輔國以之立長可不謂賢鄰告失宜竊以為得同前廉方俊封襲大典存乎嫡嗣公侯滎胄貽厥後昆陳乙以代先崇班天賜重爵嗣業相繼家聲逺傳不好榮身克遵於謙讓欲求封弟乃致於佯狂祖業斯廣友于多稱法雖有乖恆典事則不爽人情昔𤣥成見承非妨入仕今陳甲為襲難可置刑嗣足不良判丙食一縣嗣子足不良請立其弟禮司不許云古有其道對大夫稱家榮髙食采冢子當室業茂本枝盈大足徵期克昌於魏國六三能履或取笑於齊堂弱足者居奉身而退據康叔之命以崇次及察韓黯之衷雅符髙讓則先茅舊土今也載傳孤竹遺風此焉無替法聽棄疾禮貴象賢立弟捨兄理復何惑同前張洌藉慶食邑象賢繼踵承家之道將不愧於前修疇嗣之宜庶遙符於古義眷言長嫡疾乃天然既類郤克之刑一作形將同孟縶之廢且仲子立衍循魯禮而知歸韋家封成鏡班書而有序瞻惟乙情未爽通規在律雖違行權則可請停司禁無拒乙辭同前席預錫爵唘土將以疇庸開國承家寄于令嗣乙受封一邑參榮五等髙門不昌厥子嬰疾昔郤克為使取笑齊人孟縶不侯稱於魯史况主喪祭之禮如有朝覲之儀繼代非輕擇賢而立有符故事無爽通途子姪承襲判武功申將軍沛公王伯宜身死無子孫其妻陳氏遂養伯宜再從姪承襲事對辨方經野天子之疇庸開國承家諸侯之立社盟河誓嶽藩屏之任攸歸鏤鼎銘鍾公侯之業為大門驅駟馬路擁幡一作幡旗謀孫寄於衆疑作象賢嗣子希於必復伯宜太微參代登上將之榮階黃土白茅踐通侯之貴族千二百石與群后而俱朝二十八星共功臣而並列當陽侯之文武空勒髙碑孟嘗君之池臺終同下淚數竒興歎殊李廣之無封天道何言傷鄧攸之不嗣陳氏鸞傷玉鏡鶴怨瑶徽分劍匣之沉浮異椅梧之生死崩城一慟非無杞婦之哀染竹千行自有湘妃之泣對霜閨而憫默徒念平生撫猶子而傷心空思繼絶立嫡違法自有全科無後國除宜從甲令當襲僞喑判甲從軍戰亡嗣子當襲僞喑讓人告訴病對楊伯曦總目作湯天子建國酌疇庸之典諸侯立家重延賞之業甲位居戍旅道在干城覩三邉之羽書獻七縱之竒計閫外之事既受命於瓜時軍中之法幾申號於葱嶺雖王師有征而胡兵尚寇甲第之歡未展庚日之悲已及逝者何追空怨盧龍之塞嗣子克荷爰受白茅之封眷彼鴈行同夫鳥啄韋賢之子固是齊芳劉憲之兄宜其等列棣華有訓桃李無言不慙孤竹之風願守延陵之節前史嘉其德讓今人胡乃告論即議霜科寧符日用用父䕃判得乙請用父䕃所司以贈官降正官䕃一等乙云父死王事合與正官同對白居易官分正贈䕃列品階既集作如酬死繼之勳則厚賞延之寵今追思乙父勵乃臣節捐軀致命尚克底一作立定爾功繼代勸能豈忘勤恤我後椒聊既稱有實桃李未可無隂忠且忘身優宜及嗣如或病捐館舍贈官當合降階今則死衛國家叙䕃所宜同正庶旌義烈用叶條章請封爵贖罪判得丁氏有邑號犯罪當贖請同封爵之例所司不許辭云邑號不因夫子而致對邑號旌賢國章議貴如或不能自庇則將焉用其封丁氏恩􅑙閨門罪罹邦憲寵匪他致既因表以勳賢咎雖自貽亦可免於刑戮若不從其寬典則何貴於虗封漢恤緹縈猶聞贖父齊分石窖豈不庇身宜聽輯矣之辭難奪贖兮之請孝感門澤中得堇判王祖母饑病立冬劉公孫因澤中取土得堇粟遺之後有火過於西鄰鄰告云妖有司科之使司奏請旌異對馮待徵至誠感神天道應善雖欲蔽德其如豫何王祖母病既日臻甘脆蓋闕劉公孫孝惟天性墾鑿多勤坐北堂而搖一作招魂仰南陔而結思是賴天靈其鑒地輸其珍緑堇欺霜而㳫榮紅粟無稼而呈粒此一竒也又何如一作賀焉况丹焰飛空以災糜竺之室𤣥應必感不昧劉殷之家鄰者奚愚以厚誣而害物有司何酷載重詰而傷仁明哉使乎清識逺矣舉直錯枉揚于王庭蒙雖不才請從斯矣同前𤣥象凝邈群品必具流濳昭著衆感無隱懿哉公孫躬履節養悼彼祖母歘纒饑疾心乎謂何天亦明視驗粟有殊於籬下泣堇終同乎澤中可謂嗣德劉殷追縱李密激芳塵於西蜀藹嘉聲於東晋霜竹擢笋自可包羞冰魚振鱗頗亦慙德第如蔡順伏柩劉昆叩頭驚風由其蓄緒洪焱為之卷焰精誠所致緗素􅍯列嗟乎至孝孤其善鄰所司科妖將涉厚誣之酷明使旌異深符清德之美夢得籬粟判索和誠一作成下同家貧至孝夢西籬下有粟掘得十五鍾鄉人以告非營求所得請納官對員峴穹壤之福允及君子純嘏之徵良歸盛德索和誠孝揔心極義切天經其行則晉代荀何其道則孔門曾閔獲西籬之粟遂一作便貽俗士之譏採南陔之蘭應招獄官之訟愚謂不可一作如此况夫賢哉同前楊守納索和至孝居家貧窶因心則烏鳥翔翺弊服則懸鶉碎羽立錐無地門挂陳平之席至誠動天庭列孟宗之笋五芝繁茂氣雜仙露四壁森羅隙流頽日遂得𤣥穹降祉紅粟呈祥不資南畝之勤自有西籬之錫諒貞符所降非純孝之精欲以表斯孰能若此鄉人庸謬妄相詆訐不違劉殷之德須遵吕侯之典同前索和中和産德純孝為人親之所安類曽參之至性生無所飬同子路之嗟貧定省切南陔之心殷憂有北門之興精誠所至動於鬼神吉夢有徵啓茲靈貺遂使鍾盈積粟自能貯於西籬庾得如坻無假事於南畝動天地而降福集人靈之休慶美劉殷之孝行再覩於茲伊索氏之鄉一作化人一何狂簡天之所賜不合納官告者誕一作遊詞固宜反坐赤烏巢門判乙喪親之後家有赤烏巢門白兔遊墓人告不報官司對仁者曽輿孝哉閔子感彼天道通乎神明乙以顔色為難溫凊是切顧罔極而何報當永錫以攸居致愛敬之歡盡哀戚之性宣父為政足可連芳頴叔稱純行堪施及志義冲潔精神洞昭故得赤烏巢門白兔遊墓霞明丹翼赩日彩以揚光霜映素毛皓月華而皎質匪徒衒美寧用報官人也無良訐之非直乙兮惟孝善則可嘉宜表陳遺之感用旌吳順之行投箋獲弟判河內縣苟君林乘氷省舅氷陷而逝兄倫求尸不獲遂作箋與河伯經宿氷開獲君林執箋出鄉人告稱妖惑對覃懷舊壤野王遺跡元凱造舟於後忿生食邑於前自晉唘山陽鄭錫河沃精靈有作人物代興相彼君林實為茂族感如存之念恭自出之心憑河履氷自貽陷溺終墜而死當奈若何類無忌之永休比元陽之相負况鴒原稱詠本在急難凡今之人莫如兄弟嫂溺禮通於援手季沒義切於投箋孝悌之心聰明正直靈鑒在斯信宿之間克􅍯喪禮誠有應於今日事無隔於古人告以為妖未符通識誣人之罪法有恆規請據愆尤以定刑典同前風化所行德義為本煥彼經籍形諸典謨君林行著循良道存甥舅比韓君之不别若劉生之酷似秦渭之際寧止康公贈璜晉河之隂非無子犯投壁故使薄氷必履微軀不吝乘遊水而長往泳龍宫而久辭兄倫志切鴒原情敦鴈序散彼棣一作花蕚恨盈東注之流一作川投于箋牒泣下西門之恨疑惟德降美至誠感神芳聲列於緗帙雅譽標於今古執箋而出自可矜於至仁鄉人告妖恐或紊於常典嫂疾得藥判顔甲飬寡嫂疾求藥無出有童子授之化鳥而去鄰告妖異甲不伏對天鑒昭著神心正直苟精誠而聿敷何貺施而靡應顔甲族承先哲行不違仁寧見倨於下機每防嫌於通問榮擢棣蕚痛違愛於仁兄諷起伯梁遂䖍心於寡嫂衣冠肅敬方禮國而躬勤衾枕嬰纒忽孀閨而寢疾四時有厲始見攻裏五藥無資爰將暝昡至誠攸感異兆旋臻豈童子之何知有神人之叶契香囊遽委俄曕見於靈蛇斂衽方回宛遷形於翥鳥聮翩彩翮疑徵入夢之祥坱扎𤣥功即降痊疴之慶勿藥有喜道則雖殊無言不酬一作讐義終可尚鄉黨稱孝固是當仁鄰伍生誣何誠蔽善文苑英華卷五百三十七
