body:
  text: 文苑英華卷二百十九宋李昉等編釋門一五十首何遜一首劉孝先一首蕭子雲一首孔德紹一首武三思一首蘇味道一首宋之問三首王維二首孫逖一首孟浩然二首杜甫一首李白二首王昌齡二首劉長卿九首張謂二首岑參三首李嘉祐二首錢起四首皇甫曽七首皇甫冉一首張南史三首富陽浦口和朗上人梁何遜客心愁日暮徙倚空望歸山煙斂樹色江水映霞輝獨鶴凌空集作煙逝雙鳬出浪飛故鄉千餘里兹夕寒無衣草堂寺尋無名法師梁劉孝先飛鏡㸃青天古詩曰破鏡飛上天橫照滿樓前深一作空林生夜冷復閣上霄煙葉動花中露湍鳴閣疑作谷裏泉竹風聲若雨山蟲聽似蟬摘果仍荷藉酌水用花傳一巵一作杯聊自飲萬事且蕭然贈海法師還甑山梁蕭子雲直心好邱壑偏悅幽棲人忽聞甑山旅蒿一作嵩里自相親泬寥晚霖霽重叠晴雲新秋至蟬鳴栁風髙路起塵動余憶山思惆悵惜荷巾送舍利宿定晉巖隋孔德紹仁祠表虛曠祇園展肅恭棲息翠微嶺登頓白雲峰映流看夜月臨風聽曉鐘澗芳千步草崖隂百丈松蕭然遙路絶無復市朝蹤秋日於天中寺尋復禮上人唐武三思妙域三時殿香巖七净一作寶宮金繩先界道玉柄即談空喻筏知何極傳燈竟不窮彌天髙義逺初地勝因通理詣歸一處心行不二中有無雙惑遣真俗兩緣同摘葉疑焚翠投花若散一作棄紅網珠遙映日簷鐸近吟風定沼寒光素禪枝暝色葱願隨方便力長冀釋塵籠和武三思於天中寺尋復禮上人之作蘇味道藩戚三雍暇禪居二室隈忽聞從桂苑移步踐花臺敏學推多藝髙談屬辨才是非寧滯著空有掠嫌猜五術幽機暢三畨妙鍵開味同甘露灑香似朔風來砌古留方石池清辨燒灰人尋鶴洲返月逐虎溪回連一作企躅瞻飛蓋攀遊想玉一作渡杯願陪為善樂從此去塵埃自衡陽至韶州謁能禪師宋之問謫居窺集作竄炎壑孤帆渺不繫别家萬里餘流目三春際猿啼一作鳴山館曉虹飲江臯霽湘岸竹泉幽行峯石囷集作門閉嶺嶂窮攀越風濤極沿濟吾師在韶陽欣此得躬詣洗慮賔空寂焚香結精集作清誓願以有漏軀聿薰無生惠物用益冲曠心源日間細伊我獲此途遊道悔晚計宗師信捨法擯落文史藝坐禪羅浮中尋異窮集作南海裔何辭禦魑魅自可乘炎癘回首望舊鄉雲林浩虧蔽不作别離苦歸期多年嵗見南山夕陽召鑒師不至前人夕陽黯晴碧集作暮山翠互明滅此中意無限要與開士說徒鬱仲舉思誰集作詎回道林轍孤興欲待誰集作誰待待此湖上月浣紗篇贈陸上人前人越女顔如花越王聞浣紗國微不自寵獻作吳宫娃山藪半潛匿苧蘿更蒙遮一行霸勾踐再顧傾夫差艷色奪常人效顰亦相誇一朝還舊都靚粧尋若耶鳥驚入松網魚畏沉荷花始覺冶容妄方悟羣心邪欽子秉幽意世人共稱嗟願言托君懷儻類蓬生麻家住雷門曲髙閣凌飛霞淋漓翠羽帳旖旎綵雲車春風艷楚舞秋月綿一作纒胡笳自昔專嬌愛襲玩唯矜奢達本知空寂棄彼猶泥沙永割偏執性自長薰修芽携妾不障道來止妾西家夏日過青龍寺謁操禪師王維龍鍾一老翁徐步謁禪宫欲問義心義遙知空病空山河天眼裏世界法身中莫怪銷炎熱能生大地風飯覆釡山僧前人晚知清淨一作靜理曰與人羣疏將候逺山僧先期掃敝廬果從雲峰裏顧我蓬蒿居藉草飯松屑焚香看道書燃燈晝欲盡鳴磬夜方初一悟寂為樂此生閒有餘思歸何必深身世猶空虛送新羅法師還國孫逖異域今無外髙僧代集作世所稀苦心歸集作窮寂滅宴坐得精微持鉢何年至傳燈是日歸上卿揮别操一作藻中禁下禪衣海濶杯還度雲遙錫更飛此行迷處所何以慰虔祈秦中感秋寄逺上人孟浩然一丘常欲卧三徑苦無資北山一作上非吾願東林懷我師黃金燃桂盡壯志逐年衰旦一作日夕凉風至聞蟬但益悲尋香山湛上人前人朝逰訪名山山逺若一作宕又作在空翠氛氲亘百里日入行始至谷口聞鐘聲林端識香氣杕䇿尋故人解鞍暫停騎石門殊豁險篁徑一作逍遙轉森邃法侶欣相逢清談曉不寐平生慕真隱纍日探靈異野老朝入田集作雲山僧暮歸寺松泉多清集作逸響苔壁饒古意願言投此山身世永集作兩相棄别贊上人杜甫百川日東流客去亦不息我生苦漂蕩何時有終極贊公釋門老放逐來上國還為世塵嬰頗帶憔悴色楊枝晨在手豆子雨已熟是身如浮雲安可限南北異縣逢舊交集作友初欣寫胸臆天長關塞逺集作寒嵗暮饑寒集作凍逼野風吹征衣欲别向曛黑馬鳴集作嘶思故櫪歸鳥盡斂翼古來聚散地宿昔長荆棘相看俱衰年出處各努力答族姪僧中孚贈玉泉仙人掌茶李白常聞玉泉山山洞多乳窟仙鼠如白鴉倒懸深溪月茗生此中石玉泉流不歇根柯灑芳津採服潤肌骨楚老卷緑葉枝枝相接連曝成仙人掌似拍洪崖肩舉世未見之其名定誰傳宗英乃禪客集作伯投贈有佳篇清鏡燭無鹽顧慙西子妍朝坐有餘興長吟播諸天别東林寺山僧前人東林送客處月出白猿啼笑别廬山逺何煩過虎溪送東林廉上人歸廬山王昌齡石溪流已亂苔徑人漸微日暮東林下山僧還獨歸昔為廬峯意况與逺公違道性深寂寞世情多是非㑹尋名山去豈復望清輝遇薛明府謁聰上人前人欣逢柏梁故共謁聰公禪石室無人到繩床見虎眠隂崖常抱雪枯澗為生泉出處雖云異同歡在法筵送少微上人逰天台劉長卿石橋人不到獨往更迢迢乞食山家少尋鐘野寺遙松門風自掃瀑布雪難銷秋夜聞清梵餘音逐海潮送靈徹上人歸嵩陽蘭巖前人南地隨緣久東林幾嵗空暮山門獨掩青集作春草路難通作梵連松韻焚香入桂叢唯將舊瓶鉢却寄白雲中送道標上人歸南嶽前人悠悠集作然倚孤棹却憶卧中林江草行將集作將歸逺湘山獨往深白雲留不住緑水去無心衡嶽千峯亂禪房何處尋送勤照和尚往睢陽赴太守請前人燃燈傳七祖杖錫為諸侯來去集作去住雲無意東西水自流青山春滿目白月夜隨舟知到梁園下蒼生賴集作眷此逰初夜集作至碧澗招明契上人前人漸老知身纍初寒曝背眠白雲留永日黃葉減餘年猿護窗前樹泉澆谷口田沃洲能共隱不用道林錢秋夜肅公房喜普門上人自陽羡山至前人山棲久不見林下偶同逰早晚來香積何人住沃洲寒禽驚後夜古木帶髙秋却入千峰去孤雲不可留禪智寺上方懷演和尚寺即和尚所創前人絶巘東林寺髙僧惠逺公買園隋苑下持集作捧鉢楚城中斗極千燈近煙波萬井通逺山低月殿寒木露花宫紺宇燒香靜滄洲罷集作擺霧空鴈來秋色裏曙起早潮東飛錫今何在蒼生待發蒙白雲飛送客黃集作庭葉自辭風捨筏追開士回舟狎釣翁平生江海意唯共白鷗同送靈徹上人還越中前人禪客無心杖錫還沃洲深處草堂閒身隨弊履集作屨經殘雪手綻寒衣入舊山獨向清溪依樹下空留白月在人間那堪别後集作夜長相憶雲木蒼蒼但閉關送惠法師逰天台因懷知大師故居前人翠屏瀑布集作水知何在鳥道猿啼過幾重落日獨搖金䇿去深山誰向石橋逢定攀巖下集作上叢生桂欲買雲中若箇峯憶想東林禪誦處寂寥唯聽舊時鐘送僧張謂童子學修道誦經求出家手持貝多葉心念優曇花得度一作處北洲近隨緣東路賒一身求清靜百毳納袈裟鍾嶺更飛錫爐峯期結跏深心大海水廣願度恆沙此去不堪别彼行安可涯殷勤結香火來世上牛車送青龍一公前人事佛輕金印勤王度玉關不知從樹下還肯到人間楚水青蓮淨吳門白日閒聖朝須助理絶莫愛東山偃師東與韓樽同詣暉上人即事岑參山隂老僧解楞伽潁陽歸客逺相過煙深草濕昨夜雨雨後秋風渡漕河空山終日塵事少出一作平郊逺見人行眇一作小尚書磧上黃昏鐘别駕渡頭一歸鳥寄青城龍溪􅱺道人前人五嶽之丈人西望青懵懵雲開露崖嶠百里見石稜龍溪盤中峰上有蓮花僧絶頂少蘭若四時嵐翠凝身同雲虛無心與溪清澄誦戒龍每聽賦詩人則稱杉風冷袈裟石壁懸孤燈久欲謝微祿誓將歸大乘願聞開士說庶以心相應晚過盤石寺禮鄭和尚前人暫詣髙僧話來尋野寺孤岸花藏水碓溪竹映風爐頂上巢新鵲衣中帶舊珠談禪未得去輟棹且踟蹰送宏志上人歸湖州李嘉祐山林唯好靜行住不妨禪髙月穿松徑殘陽過水泉一作田詩從宿世悟法為本師傳能使南人敬修持香火緣同皇甫冉赴官留别靈一上人前人法許廬山逺詩傳休上人獨歸雙樹宿靜與百花親對酒集作劫須留興觀空已悟身能令折腰客遙賞竹房春山齊獨坐喜元上人見訪二字一作至錢起舍下虎溪徑煙霞入暝開柴門兼竹靜山月與僧來心瑩紅蓮水言忘緑茗杯前峯曙更好集作早斜漢欲西回靜夜酬通上人問疾前人東林生早凉髙枕逺公房大士看心後中宵滴漏長驚蟬出暗栁微月映回廊何事沉痾久含毫問藥王送僧歸日本前人上國隨緣去集作至東集作來途若夢行浮天滄海逺去世法舟輕水月通禪觀魚龍聽梵聲唯憐塔燈影萬里眼中明送外孫一作從孫懷素師還鄉覲省素善草書此詩見二百八十四卷贈鑒上人皇甫曽律儀傳教誘僧臘老煙霄樹色依禪誦泉聲入寂寥寶龕經末劫畫壁見南朝深竹風開合寒潭月動搖息心歸靜理愛道坐中宵更欲尋真去乘船過海潮西陵寄一公前人西陵遇風雨集作過風處自古是通津終日空江上雲山若待人汀洲寒事早魚鳥興情新南望稽山路吾心有所親題贈雲門雍一作邑上人此詩見二百三十五卷秋夕寄懷契上人前人已見槿花朝委露獨悲憔悴在人群真僧出世心無事靜夜名香手自焚窗臨絶澗聞流水客至孤峰掃白雲更想清晨誦經處獨看松上雨紛紛送著公歸越前人誰能愁此别到越㑹相逢長憶雲門寺門前千萬峰石床埋積雪山路倒枯松莫學白衣士無人知去蹤送普門上人還陽羡前人花宮雖集作難久别道者憶千燈殘雪入林路暮山歸寺僧日光依嫩草泉響滴春氷何用求方便看心是一乘同杜相公對山僧前人吏散重門掩僧來閣復閒逺心馳北闕春興寄東山草長風光裏鶯啼靜默間芳晨不可駐惆悵暮禽還送延陵法師往上都皇甫冉延陵初罷講建業去隨緣翻譯推多學壇場最少年浣衣隨野水乞食向人煙遍禮南峯頂焚香古像前西陵懷靈一上人兼寄朱放張南史淮海風濤起江關憂思長同悲鵲繞樹獨坐鴈隨陽山晚雲藏一作和雪汀寒月照霜由來濯纓處漁父愛滄浪寄靜虛上人雲門前人寒日白雲裏法侶自提携竹徑通城下松門隔水西方同沃洲去不自武陵迷髣佛心疑處一作知處髙峯是㑹稽秋夜聞鴈寄南十五兼呈空和尚前人晚節聞君道趣深結茅栽樹近東林禪一作大師幾度曽摩頂髙士何年更發心北渚三更聞過雁西城萬木動寒砧不見支公與元度相思擁膝坐長吟文苑英華卷二百十九
