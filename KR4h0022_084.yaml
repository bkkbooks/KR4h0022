body:
  text: 文苑英華卷八十四宋李昉等編符瑞一四靈賦一首獬豸賦二首黃龍負舟賦一首西海雙白龍見賦一首神龜負圖出河賦一首資州獻白龜賦一首瑞龜遊宫沼賦一首鳯巢阿閣賦一首鳯凰來儀賦一首鳯鳴朝陽賦一首四靈賦以麟鳯四靈王者嘉瑞為韻於惟聖人之志氣如神百物自化四靈荐臻是以鳥獸浸其惠澤昆蟲懷其深仁福應尤盛休祥日新不然何以靈龜挺出飛龍來賔羽族降而集鳯鳥毛羣格而畜麒麟莫不率彼飛走荷此陶鈞或羣或友是擾是馴夫其時然後動動而斯中叶休明之德邁川嶽之貢負圖騰大河之龍銜詔引丹穴之鳯介蟲稱長將開奧以應期肉角為仁示有武而不用原夫契時也其感不一效靈也其數惟四為皇極之休徴作太平之盛事然後魚鮪不淰知化而鱗萃禽獸不狘懷德而麏至非夫天子睿哲二字一作貞明黎元底寧惠化廣被品物流形則何能光有九土克擾四靈美𤣥功而不宰仰洪德而惟馨在郊藪則栖託以自適聞簫韶則率舞而來庭且如羲之道昌龍圖有章姒之功成龜書呈祥或馴麒麟或降鳯凰彼皆一者之或出未若四者之來王又若龍鬬鄭洧麟傷魯野鳯有咏何德之衰龜有靈而夢是假興宣父之嘆運未遇焉叶夏后之祥道之行也出處則以待時乎隱見而允符王者聖德可大靈物可嘉游宫沼兮騤騤無懼鳴苑囿兮鏘鏘不譁遼東獻豕又何足數越裳貢雉失其所誇惟明王之理天下也垂衣恭已修禮逹義儀形隂陽昭蘇品彚天不愛道則乾符應命地不愛寶則坤珍表瑞然後萬物可得而賔四靈可得而致獬豸賦以觸物知邪自然靈獸為韻獬豸出乎唐堯之年神羊至于我后之前雖一物異見實兩時皆然既曰珍祥亦稱絶異是考其迹莫問所至乃審厥生不知其自步𤣥墀以龍擾向彤庭而鶚視夫其洪纎之狀周正之儀摶風比毳素絲類皮人間之所常覩天下之所備知蓋神羊之末事羌難得而稱竒及至一人視朝百辟咸矚張羅杞梓列布瓊玉雖衣冠有貌槐棘祇肅為公卿而是匿非神靈而不觸爾羊來思其儀孔嘉望表知裏揆瑜識瑕於是騰雙眸而舉柱聳特角而觸邪當之者則立成於犴獄見之者則節一作即同於邦家無正不彰靡姦不屈常在公而為言匪從已而犯物百發百中或受命於神祗無黨無偏寧奉辭於綸綍則知惟聖得一以理人得一以靈豈比羵羊下濳空呈怪於季井商羊上舞徒表沴於齊庭日者神直簪筆風潛衣繡順素節以擊揚奉白簡而彈奏指之者豺狼不避觸之者回邪莫漏彼神羊之信靈請從古而歸獸第二宋皓精瑞氤氲兮生獬豸之炳靈志耿介而不羣世情僞而尨雜動微明而鏡分詩美乎思無邪道貴乎解其紛得道之實為身之文豈徒神明其形將以幽贊人君涇也濁渭蕕兮在薰辨之以履霜堅氷無俾乎水深雪紛則致明如日月靈應如風雲所不至者固亦有聞夫道無為神無方聖人之政有以相合靈物之質不必咸章名用而行跡捨而藏與麟趾同符騶虞齊光肇允丕應時唯我皇咨爾輔弼咸懷忠良感觸邪之義成無妄之綱五福儲峙四靈倣徨爾有足兮不行而至爾有角兮其用也剛人是知勸實丁厥祥孰與鳯鳥去飛龍圖未揚惜暌闊於明代竟流連於素王物亦生蠱邪行紊德雖明足辨類凶族起於唐虞智足周身讒巧傾於孔墨水火不可以同器邪正不可以同國懿茲神獸間執讒慝分兩造之疑冠百祥之特勇毅而能斷智明而不惑守法者仰之以司南疾惡者投之於有北固操斧而思用因伐柯而取則龍闕分官烏臺肅政扶直指之角象繩愆之性聨繡衣以生風借白簡而增徑物莫不肅時靡有競所謂君子道長邦家德正苟違中人斯同妄行豈王臣匪躬之德叶哲后授賢之命眷彼法冠恐其規鏡則載鶡聚鷸足為服之盛何必儀形神物示人以敬庶乎在位者竭能而輔政黃龍負舟賦以克已勤物大川效靈為韻吕溫夏后氏奠山疏滯一作川拯溺開泰𤣥圭錫命既成天下之功黃龍發祥一作翔始躍域中之大當其駐軫江甸艤舟洪川天行健而時有未濟地設險而瞻之在前思利涉以撫俗遂精誠而告䖍於是雲氣滃起神光爛然奮角於勿用之窟驤首於或躍之泉光一作安波澄瀾奉天意以顒若拖尾垂鬛夾王舟而負焉合靈符於百代表聖運於千年徒偉夫出無情馳不測如驅風雷若有羽翼觀竭誠以效用似就列而陳力電目流光金鱗耀色天吳奔走陽侯屏息巨險汔濟孰假剡木之能潛怪莫逢寧資畫鷁之息應變化以昭盛一作感出沉潜而剛克其慶惟大賴祉福者兆人其觀惟榮執玉帛者萬國若非平土堙水泣辜罪已菲飲食以昭儉卑宫室而思理德掩乎生成之初功齊乎開闢之始一有則字安有非常之神物不召而萃止濟其不通而彰其具美者也至若漢橫汾水秦抵滄溟實逞心欲匪崇德馨蒼生之虛一作生人之盡瘁靡念方士之空言是聽始川文粹作姑幸免於覆溺夫何望乎炳靈於戲動罔軌模一作動罔軌道言非善教則人雖愚弱或使之而不效其志惟純其德孔殷則龍雖神化將不役而自勤信矣哉國家俾人其蘇在理無鬱超乎大禹不務舟車之勞蜿一作宛彼黃龍但為宫沼之物而已西海雙白龍見賦以天下安樂龍見于海為韻錢起唐六葉嘉祉降皇威宣師出以律將有事于金天赫矣神武感通上𤣥雙龍呈瑞一色皎然惟白也昭素秋誕聖惟龍也主殺氣清邊不爾者寧出乎海不躍於泉穆乎白龍之為物也潛依水德利用天下精異冥通騰驤神假茍非君行其道物有其官則欎湮不育潢汙而蟠隱見罔知其㫖窅冥孰見其端故我君宣八風之惠化澄四海之波瀾覆燾斯極生靈以安惟此上瑞灼然可觀其始見也精光皓耀溟渤清廓曵氷雪於半空晏雷電一作霆於萬壑若長雲帶氷而不散雙劍倚天而中落忽虹立而電迥回其儀不可彌度表其祥同乘黃之偶運處其度掩嘉魚之有樂偉夫鱗介之族莫智於龍茍靈應無兆豈休明再逢昔軒以負圖為景福舜以入壇為神變殊㫖同歸千載一見是以天祚明德幽贊禎符彼二龍之萃止合一聖之有孚皓爾其真異葉公之藻繪超然將舉同正理之友于是時也西戎駭目莫不感化而風趨夫如是則在宥之理足徴無疆之休可待洋洋歌頌日聞于四海者也神龜負圖出河賦以下瑞前王始啓文教為韻裴度茫茫積流祚聖有作動上天之密命假靈龜以潜躍蓋欲以慶遙源敷景鑠寫物象之精密化人物之朴略豈不以河之德兮靈長龜之壽兮會昌載禎符先呈於古帝稱大寶後遺於寧王故將出也感天地動隂陽浮九折之澄碧散五色一作彩之榮光然後蹈箭流而泳花浪露𤣥甲而明繡裳初若沉圓璧而未沒稍似泛孤鳬而欲翔既而降芳蓮躍清泚五老游而共睹列聖過而每喜出朝一作就麗日如耀其寶圖伏靈壇狀陳其鏤簋布爻象之糾紛藴天地之終始負謀謨之畫將化洪荒當授受之時豈思緑水非臆對之可述諒鈎深而有致所以出河宗作天瑞馮夷倚浪以相送神魚鼓舞而旋避於戲冥數窅然自我而傳外骨明賁中心善泉將後天而思永豈為贄而居前至如魚託素以逹情鳯銜詔而展禮未若祥開八卦兆動四體闡文教寧木鐸之足儔贊貞明與日月而同啓洎乎形貌既著品物類分榮萬化之茫昧合一氣之絪緼䜟用光於夏葉繇每煥於羲文此乃天理用彰神道設教故躍波而委質殊以文而飾貌觸綸誠怪於文鱗一作鰩吳賦文鰩夜飛而觸綸隱霧徒嗟乎𤣥豹此悠久也可是則而是效資州獻白龜賦以泰平將合神物效靈為韻獨孤申叔皇帝在位十五載西人獻異龜於王庭匪青黑以飾體特潔白而成形融彩可嘉且不溷於五色呈祥有異詎止齊乎四靈蓋以我皇行化無外止戈偃武一作伯人綏道泰升至德于𤣥穹降殊祥於神蔡且夫龜者禀先知之異白者表司殺之方豈天意興威於有截俾臣下受命而無將西土是生實西方而主義被甲以至猶帶甲以來王不然何以曖烏代切净也純容皎素甲皓霜華而浹洽炯玉質輝金精凝雪彩之清貞泳靈沼而氷靜息太階之砥平足使孟津之麟耻捷乎素鬛越裳一作常之雉羞奮於翹英矧乎禀殊姿體異貌陋三足之為美匪六眸以是效其用也或協聖人之心其動也克符智者之樂然後知戲朝之虎不足徴銜鉤之狼不足云一作神蓋官韻彼駒來思徒稱皎皎爾獸至止虛擅諄諄未若茲瑞德無與鄰應天之命昭王之仁非櫝中之毁棄不蓮上以因循將順乃𤣥穹以呈其貺曷思乎緑水而返其身則彼寧王有遺元緒又安得而比倫嚮非我皇從道不咈必將混於介族詎得分為理物宜乎冠異紀首靈篇且無使其湮欎瑞龜游宫沼賦并序韻以題為周存王者嘉瑞曰四靈龜其一也皇帝握圖御㝢十有一年秋七月旬有一日龜雄雌各一游於內池甲耀金毛文滋緑彩帝乃出示百官以議其瑞僉曰至德之應也少司成命文士賦以美焉敢力下才同夫體物賦曰介蟲之長實曰靈龜明隂陽以應化察利害以俟時於穆我皇德無不被春國洋溢神物來萃雖四靈其必臻懿雙龜以時瑞陋衆水而不處選天池以自寄金甲炫晃帶璧日以流光緑毛丰茸度薰風而含吹不唼喋於蘋藻恣東西於荷芰爾其有金者剛有毛者柔示剛柔之合體表刑德之具修昭品類之德性備雄雌以共游信皇德之上逹俾靈物之告休觀乎巡金塘樂翠沼晦跡無競凝神不擾引修頸而鳥伸動圓目而珠皎映紅蕖而灼爍吸清露之縹眇天資獨智笑漁者二字一作江使而縈羅人謀既臧鄙太卜之問兆若夫百莖蓍下九派江中順衆流而五色斯易邁千齡而片雲在空豈比夫承天眷感宸衷眄青瑣兮鄰紫宫顧宅中之可寶瑞皇室兮無窮鳯巢阿閣賦以天下清泰神物來萃為韻國家化協軒后道超帝先敷至德以被物降殊祥而自天祥異宗周下岐山之鳴矣企觀宸極放阿閣而巢焉由是載止於甍次蓋將呈瑞於君前臨四榮而肅乎雲美播五彩而煥爾霞鮮且將巢者其義久也美德化乎宇內永栖遲於日下爰居爰處恆依應龍之祥一作梁載飛載鳴寧似化鴛之瓦道既砥平時亦鏡清厭丹穴而不息鄙髙岡而不鳴方為應至仁而來𤣥扈豈徒愛層搆而集丹楹彼燕有巢已聞在幕之厄爾鶴稱德更擅乘軒之名一則兆啓乎顛沛一則僣處乎車蓋曷若我愛育元和來儀昭泰奮美羽於軒楹散清音於埃􅝙然後知赤烏不曰珍白龍不曰神或生之於苑囿或厄之於海濵四目鳴而不覩萬户獻而莫臻豈若兹鳯惟閣是因三重其階實惟髙矣顯矣一人斯覩誰謂不躬不親向非我后從政不咈惠生於物執德不回遺乎將來鳯亦逺矣誰能巢哉是知反道者髙閣徒修悖德者鳴鳯罔萃竊稽瑞牒載覽史記惟皇疑作黃帝與帝疑作吾皇能感之而自至鳯凰來儀賦以聖感時平樂和瑞集為韻李解至哉乎鳯凰之致也應運合符體中履正依道德以出處表帝皇之衰盛宣尼興歎見周道之降一作陵夷太史正辭知漢德之明聖寄髙跡於圖牒流遺㫖於歌詠我國家化洽生成歸淳反朴理定制禮功成作樂萬物懷仁四靈沾渥方棲息於上苑寧徘徊於南嶽觀乎肅肅其羽鏘鏘其鳴吸天地之嘉氣赴簫韶之雅聲知至道之可樂識太階之已平身安撫馴或顧步以屢舞心畏榮寵作疑作乍聨鶱而若驚寧同衆鳥之德竊比逹人之情且如六翮已成五文畢備竒姿委疑發逸志殊類挹寥廓以推靈嚮人寰而作瑞籠檻不能展其巧羅網無以施其智豈若翡翠以美色殺身鸚鵡以能言剪翅鴻鵠以稻粱自苦鷹鸇以擊搏取纇孰與夫退則全其性出則得其時將稱年以表德豈反袂以等期夜宿椅桐之枝朝餐竹實之粒望雙闕以上下先百禽而翔集薰風飄而響清甘露沾而羽濕對離景以照耀披慶雲而出入來儀則那樂我時和因物見志為鳯凰之歌歌曰處分明兮繫舒慘一人慶兮萬物感羽族猶得以效珍微生何久於習坎鳯鳴朝陽賦以鳯鳴山陽振翼飛舞為韻崔損杲杲兮日景于彼朝陽萋萋兮桐葉于彼髙岡來儀者鳯允叶禎祥瑞四靈之嘉號煥五彩之文章既和其音爰翥其翼淒唳響暢徘徊綢直旁應𤣥律調十二管於四時上陵紫煙繫九萬里而一息非丹穴勿處非蒼竹不食小鵬起於扶搖卑鸞棲乎枳棘若夫雞冠燕頷心逺貌閒雖衆禽之纍百諒比德而難攀故其發聲也瞻白日以俯仰其餘響也順清風而往還浮泛泛以出谷靜泠泠而滿山既飄颻於有際遂遼敻於無間故曰鱗之有龍鳥之有鳯偶時而見如哲士之間生取類而言同君子之異衆若乃拂杳冥而直上臨峻極而孤鳴虛籟相和隂深以䆗窱霏烟動色紛郁而隨迎六合為之澄朗八風於是揚清川不波而昭其德地不翳而感其聲足使俗登仁夀化洽休平且夫朝陽者象明時之有潜鳯鳴者匹賢人之惟信鳯集朝陽以輕舉賢遇明時而易進整羽翮以迥回翔望青雲以奮振有若秉節操而貞白垂簪纓而篤敬一作敬慎鳯兮鳯兮何德之威鏘鏘于飛應有道而嵗貢敻無文而代希飲必玉池之津游必神仙之府矯翮則羣族咸從和樂而百獸率舞巢阿閣以應昌期棲丹闕而壯天宇載圖牒以傳記必表靈於聖主包衆美以流芳固難得而覼縷文苑英華卷八十四
