body:
  text: 文苑英華巻七百二十一宋李昉等編餞送四送張𤣥武序一首送王及之容州序一首送譚山人歸雲陽序一首餞副大使李藏用移軍廣陵序一首秋夜送孟賛府兄還都序一首春於南浦與諸公送陳郎將歸衡嶽序一首秋於敬亭送從姪耑遊廬山序一首江夏送倩公歸漢東序一首冬夜於隨州紫陽先生飡霞樓上送烟子元演隠仙城山序一首金陵與諸賢送權十一昭夷序一首春於姑熟送趙四流炎方序一首送李侍御充汝州李中丞副使序一首送王舎人歸夀春侍奉序一首送祖評事赴黔府李中丞使幕序一首送杜正字暫赴江陵拜覲叔父序一首送温司馬進降誕方物序一首送宗判官歸滑䑓序一首桂林送前使判官蘇侍御歸上都府序一首送姜司户赴宣州序一首送李彛宰新都序一首秦中奉送前涪城賀㧞明府歸蜀序一首送張𤣥武序元結集無乙未中詔吳興張公為𤣥武縣大夫公舊友河東栁潜夫裴季安扶風竇伯明趙郡李長源河南元次山將辭讌言悉以言贈上有勸仁惠䘏勞苦之風下有惜離異戒行役之諭一作論元子聞之中有所指國家將日極太寧垂休八荒故自近年兵出滇外訂者或曰西南少疲是以天子特有命也將天之命斯未易然於戱蜀之遺民化於秦漢純古之道其由未知無置一作智此焉一有故字姑取廢也如徳以涵灌義以封植其教遲逺其人迎喁至乎不可固未必也則曰保仁以敦養流惠以懐恤知其所勞示其所安無以醜之當可然也潜夫聞之中興不樂歎曰吾嘗與朋友有四方之異不甚感人如今之心多問其故對曰嗟嗟子能有是言也吾故感焉行有規矣多無曰我四十於此無曰我時禄位下哉公乃復曰當不失於二公之意為異年觀㑹之方也巳敢戒行役敢自清慎終不貽朋友之憂何如於是醉歌中堂極樂而已諸公有贈逓相編次送王及之容州序乾元初集作中漫叟浪家于瀼溪之濵以耕釣自全而已九江之人未相喜愛其意似懼叟衣食之不足耳叟亦不促促而從之有王及者異夫鄉人焉以文學相求不以羇旅見懼以相安為意不以可否自擇及於叟也如是之多叟在舂陵及能相遊嵗餘而去將行規之曰叟愛及者也無惑叟言及方壯可强藝業勿以逰方為意人生若不能師表朝廷即當老死山谷彼區區於財貨之末局局於權勢之門縱得鍾鼎亦胡顔受納行矣自愛耿容州歡於叟者及見集作到容州為叟謝主人聞幕府野次久矣正宜收擇謀夫引信才士有如及也能收引乎二三子賦送逺之什以系此云送譚山人歸雲陽序吾於九疑之下賞愛泉石今㡬三年能扁舟數千里來逰者獨雲陽譚子譚子文學隠名山野隠身雲陽之阿世如君何牧犢愛雲陽之宰峻公不出南岳三十年今得雲陽一峯下况譚子又在焉彼真可家之者耶子去為吾謀於牧犢近峻公有泉集有山山二字石老樹夀藤縈垂水可灌田一夫火可燒種菽粟近泉可為十數間茅舎所詣纔通小船吾則集作則吾徃而家矣此邦舜祠之竒恠陽華之殊異潓泉之勝絶見峻公與牧犢嘗一二說之松竹滿庭水石滿堂石魚負樽鳧舫運觴醉送譚子歸于雲陽漫叟元次山序餞副大使李藏用移軍廣陵序李白夫功未足以盖世威不可以震主必挟此者持之安歸所以彭越醢於前韓信誅於後况權位不及於此集有者字虛生危疑而潜苞禍心小拒王命是以謀臣將啖以節鉞誘而烹之亦由集作猶借鴻濤於奔鯨膾生人於哮虎呼吸江海横流百川左縈右拂十有餘郡國討集作計未及誰當其鋒我副使李公勇冠三軍衆無一旅横倚天之劔揮駐日之戈吟嘯四顧熊羆兩集蒙輪扛鼎之士杖干將而星羅上可以决天雲下可以絶地維翕振虎旅赫張王師退如山立進若電逝轉戰百勝僵屍盈川水膏於滄溟陸血於原野一掃瓦觧洗清全吳可謂萬里長城横斷楚塞不然五嶺之北盡餌虵豕四字文粹集本作盡餌於修虵勢盤地䠞不可圖也而功大用小天高路遐社稷雖定於劉章封侯未施於李廣使慷慨之士長吁集作呼青雲且移軍廣陵恭揖後命組練照雪樓船乘風簫皷沸而三山動旌斾集作旗揚而九天轉良牧出祖烈集作列將登筵謌酣易水之風氣振武安之瓦海日文粹作月夜色雲㠶文粹作河中流席䦨賦詩以壯三軍之士白也筆巳老矣序何能為秋夜送孟賛府兄還都序夫士有餙危冠佩長劔揚眉吐諾激昻青雲者莫不二字集作咸誇炫意氣託交王侯若告之急難乃十失八九我義兄孟子則不然耶道合而襟期暗親志乖而肝膽楚越鴻騫鳳立不循常流孔明披書每觀於大畧少君讀易時作於小文四方賢豪泫集作眩然景慕雖長不滿集作過七尺而心雄萬夫至於酒情中酣天機俊發則談笑滿席風雲動人集作天非嵩立之集作騰精何以及此白以弱植早飲香名况親承光輝恩甚華蕚他鄉此别誰無恨耶時林風吹霜散下秋草海鴈嘶月孤鶴翔集作飛朔雲驚魂動骨戞瑟涕流集作落涕杭手緬邁傷如之何請各賦詩以寵岐路春於南浦與諸公送陳郎將歸衡嶽序前人集無仲尼旅人文王明夷苟非其時賢聖低眉况僕之不肖者而遷逐枯槁固其宜耶朝心不開暮髮盡白而文粹無此字登高送逺使人増愁陳郎將義風凛然英思逸發來下專城之榻去邀才子之詩動清興於中流横文粹作汎素波而遙去諸公仰望不及聮文粹作連章祖之序慙起予輙冠名篇文粹作賢之首作者嗤我乃為撫掌之資乎秋於敬亭送從姪耑遊廬山寺余小時大人令誦子虛賦私心慕之及長南遊雲夢覧七澤之壯觀酒隠安陸蹉跎十年初嘉興季父謫長沙西還時余拜見預飲林下耑乃稚子嬉遊在傍今來有成欝負壯集作秀氣吾衰久矣見爾慰心申悲道舊破涕集作啼為笑方集作乃告我逺渉西登香爐長山横䠞九江却轉瀑布天落半與銀河争流騰虹奔雷集作電激集作潨射萬壑此宇宙之竒詭也其上有方湖石井不可得而窺焉羡君此行撫鶴長嘯恨丹液未就白龍來遲使人著鞭先徃桃花之水孤負宿集作夙願慙未歸於名山終期後來携手五岳情以送逺詩寜闕乎江夏送倩公歸漢東序昔謝安四十年卧白雲於東山桓公累徴為蒼生而一起常與支公遊賞貴而不移大人君子神契㝠集作㝠契合正可乃爾僕與倩公一面不沗古人言歸漢東使我心痗夫漢東之國聖人所出神農之後季良為大賢爾來寂寂無一物可紀有唐中興始生紫陽先生先生六十而隠化若繼跡而起者惟倩公焉蓄壯志而未就期老成於他日且能傾産重諾好賢工文即惠休上人與江鮑徃復各一時也僕平生述作罄其草而授之思親遂行流涕惜别今聖朝巳捨季布當徴賈生開顔洗目一見白日冀相視而笑於新松之山耶作小詩絶句以寫别意辭曰路入漢東國川藏明月輝寜知䘮亂後更有一珠歸言歸漢東古本作興言歸東路入集作彼美冬夜於隨州紫陽先生飡霞樓上送烟子元演隠仙城山序吾與霞子元丹煙子元演氣激道合結神仙交殊身同心誓老雲海不可奪也歴考天下周求名山入神農之故鄉得胡公之精宇集作術胡公身揭日月心飛蓬萊起飡霞之孤樓鍊吸景之精氣延我數子高談混元金書玉訣盡在此矣白乃語及形勝紫陽因大誇其集無此字仙城元侯聞之乘興將徃别酒寒酌醉青田而少留夣魂曉飛渡緑水以先去吾不凝滯於物與時推移出則以平交王侯遁則以俯視巢許朱紱狎我緑蘿未歸恨不得同棲烟林對坐松月有所感歎集作欵然銘契譚石乘春當來且抱琴卧花高枕相待以寵别賦而贈之金陵與諸賢送權十一昭夷序斯高柄秦嬴世不二三傑伏草與漢並出莽夷朱暉耿鄧乃起自古英逹未必盡用於當年去就之理在大運耳我君六葉繼聖熙乎文粹作于𤣥風三清垂拱穆然紫極天人其一哉所以風集作青雲之集本文粹無之字豪士散在商釣四坐明哲皆清朝旅人吾希風廣成蕩瀁浮世素受寶訣為三十六帝之外臣即四明逸老賀知章呼余為謫仙人盖實録耳而嘗採姹女於江華收河車於清溪與天水權昭夷服勤爐火之業久矣之子也冲恬淵静翰才文粹作才幹峻發白每一篇一札皆昭夷之所操吁捨我而南若折兩集作羽翼時嵗律寒甚集作苦文粹作色天風苦集作枯聲雲㠶渉漢冏若絶電舉目四顧霜天峥嶸衘杯叙離而群子賦詩以出餞酒仙翁李白辭春於姑熟送趙四流炎方序白以鄒魯多鴻儒燕魏集作趙饒壯士盖風土集作俗之然乎趙少公集作翁才貌瓌雄集作雅志氣豪烈以黄綬作尉泥蟠當塗亦猶鷄棲鶴籠不足以窘束鸞鳳耳以嫉惡抵法遷于炎方辭高堂而墮集作墜心指絶國而集作以搖恨天與水逺雲連山長惜光景於頃刻開壺觴於洲渚黄鶴曉别愁聞命子之聲青楓暝色盡是傷心之樹然自吳瞻秦日見喜氣上當攫玉弩摧狼狐洗清天地雷雨必作自冀白日廻照丹心可明巴陵半道坐見還吳之棹今雪觧而松栢振色氣和而蘭蕙開芳僕西登天門望子於滄集作西江之上吾賢可流水其道浮雲其身通方大適何徃不可亦何戚戚於岐路集作路岐哉送李侍御充汝州李中丞副使序任華華州汝州兩亰股肱郡也朝廷以股肱之郡非有股肱之才者則不可造次任焉是以命華州牧兼御史中丞李公亟乘轅於汝所以輟於華而急於汝者何盖由華巳致理而汝久缺人久缺者何不易其遷故也然則州有兵而刺史為之使使不可以獨理爰命前監察御史李公為之副清泗上朝周之路絶漢東封汝之心岐然長城蕃我王室亦在副貳之力也且御史仲兄金吾將軍嘗處中司之雄職鎮於上洛之要地招我於芸閣之上假我以栢䑓之榮與華甚厚同於骨肉華見侍御如見金吾方將逺别值余有犬馬之疾不遂携酒灞岸賦詩河梁魂銷暮雲心折秋草而已矣汝頴自古頗多竒士荀陳令族豈無子孫君其善待之無忘推遷至如公堂閑坐對三十六峯或青雲半收或新月初挂當有佳句時時寄來送王舎人歸夀春侍奉序太子舎人王良輔時人覩之呼為玉人我心重之有如瓊枝今隴西公即舎人譚公一作侯之親也公尤哀而憐之情義同於長兄禮秋優於諸弟夫如是豈得為萬里之别乎盖以舎人急於倚門之期切以趨庭之戀若之何因留之贈言贈言伊何莫過於勤孝立身伊何莫過於守正而已秋天壓溟海白波走洞庭後期何日悵惘一作恨猨聲送祖評事赴黔府李中丞使幕序前人自武陵守擁旄分閫有唐以來李公一人而已自非忠義特逹有文武才畧者曷以致兹公以黔巫之地西控㣲濾彭濮東接桂林象郡北漸巴峽南馳滄溟盖蠻夷獷俗罕遵聲教必藉於幕畫而詳延祖生豈伊異人即我府主隴西公之嘉客也方將表於金闕而加之鐡冠適㑹有黔中之命相繼而至夫天下之寳當與天下共之况黔中桂林兄弟之國又何間然哉俾朝廷知黔中得人與桂林得人何異出餞何許舜亭峩峩凭檻窺黿鼉之窟酧酒滴魚龍之背金石絲竹雖有秦聲青山白雲恨非吾土華承命製序因贈以言不慮吾子以忠貞為本又當指蹤不選地感恩不顧身死見賢良則引而薦之勿憚勿疑見仇怨則報之以徳勿瑕勿疵吾常以此為終身之寶今以終身之寶贈君以謂何如也送杜正字暫赴江陵拜覲叔父序前人吾見驥子齠齓之時愛其神清知其才清今果爾也頃漂淪荆楚既孤且貧求食於誰託身於誰四海茫茫未獲所寄及遇我隴西公獲所寄矣公以故人之子憐而收之去溝壑而寄乎南山罷轉蓬而䕃於桃李君子曰隴西公在正字為不孤已今離叔父頗久蹔歸阮家之巷感知己厚恩尋赴李膺之門華與臨别撫其背曰高門積慶無忘乎聿脩厥徳大名難繼冝其自强不息念哉送温司馬進降誕方物序昔者黄帝生於夀丘文王生於岐陽數千年間以為盛美况我明主感龍而生如鳳之鳴黄河為之清率土為之寧豈夀丘岐陽足云哉是以四方牧守咸獻方物用賀南山之夀長居北極之尊今此邦使乎誰膺慎擇則司馬温曥其人也曥相門子温其如玉五徳備焉堅其如金百鍊成焉既出車彭彭群公追餞於北郭草亭巃嵸群峯疊出青石逶迤秋水下藏碧沙對此為别歡酒而已送宗判官歸滑臺序大丈夫其誰不有四方志則僕與宗衮二年之間㑹而離離而㑹經途所亘凡三萬里何以言之去年春㑹於亰師是時僕如桂林衮如滑臺今年秋乃不期而㑹于桂林居無何又歸滑臺王事故也舟車徃返豈止三萬里乎人生幾何而倐聚忽散遼夐若此抑知己難遇亦復何辭嵗十有一月二三子出餞於野霜天如掃低向朱崖加以尖山萬重平地卓立黒是鐡色銳如筆鋒復有陽江桂江畧軍城而南走噴入滄海横浸三山則中朝群公豈知遐荒之外有如是山水山水既爾人亦其然衮乎對此與我分手忘我尚可豈得忘此山水哉桂林送前使判官蘇侍御歸上都序前人桂林秦所置郡也南臨天池東枕滄溟西馳牂牁北走洞庭地方三千里帯甲數萬卒實五府一都㑹矣連帥之任朝廷難其人徃年命御史中丞張公公號為稱職去年又命我以佐之初張公受命之日以為五嶺荒服不同於他邦百蠻獷俗不可以獨理乃薦武功蘇澣自秘省校書郎除金吾掾攝監察御史以佐焉澣在幕中多所匡輔洎張公家艱去職澣統其留務凛其正色操持紀綱而十州之地晏如也洎如疑衍我公至止觀其迹而美其政將表請焉澣辭以久辭墳墓不見兄弟已六年願得生入武闗一到闕下足矣公從之或筵於西堂或罇於東樓或饌於亭臯一作高亭凡飲餞之盛未有若此之綢繆者也且予有善公為揚之且予有功公為叙之予有患公為排之予有屈公為伸之亦何異脫騏驥於鹽車擲秋鷹於天畔乃騰騁難料擊搏在即亦足以快意矣且爾兄吾兄也爾身吾身也雖萬里為别何别之哉雖然不能不愴恨儻見二相國當為深陳江嶺安危之體焉料子必見潘庶子因登高把酒南望千峯白雲離披横在山畔與我疇昔所見豈有異乎由是益令人思北歸送姜司户赴宣州序士莫不伸於知己屈於不知己頃姜生以調集不偶薄言東歸乃告辭於吏部徐公公素知其才惜其去竟不與之别無何授宣城掾得不謂小伸於知己乎秋天曉晴碧色如掃横度一鳥時時行雲益令姜生有懐吳㑹况還家有循陔之慶移一作趨府有牒辟之命哉僕與斯人曽未覯止其友人姜一作公正範與余善邀余序之範誠以我筆家流則不知姜意以為如何也送李彛宰新都序宗室後進有以學術辭藻著稱者彛也少好學通九流百家之言善屬文頗有大節去年制舉不㨗無何以書歴抵二相國論安邊術由是召試西掖凡數十百人彛與莊若訥高郢同入高等何垂翅於制舉而奮翼於西掖哉盖道之屈伸命之通塞各有時也執政以彛大人在蜀故授新都以榮之彛豈不欲高歩臺省時時與朝廷群公談笑所以俯就逺縣盖為大人屈耳秦雲滿天倐聚忽散與子分飛亦爾也古人别逺貴於贈言子昔為什邡令盖鳴琴不下堂而理今領新都則異於彼焉盖以廬井灰於焚爇之後甿庶瘡於刀箭之末樹立存育洪惟艱哉况奔衝填凑晝夜風雨誅求供應旬晦山岳其親庶務則宜戴星而出戴星而入焉其接賔客則宜一沐三起一飯三吐焉此朋友之望也如月照雪峯花飛錦江當有新詩時復寄來念之哉李生秦中奉送前涪城賀㧞明府歸蜀序前人吾嘗以忠孝禮義清慎此六者士君子立身從政之道而兼之者稀涪城兼之矣何以知之嘗紏余郡又宰吾邑毎升其堂以觀其政况不以編户遇我而以國士待我情願交深貫於金石自我不見于兹五年長安相逢如自天落而喜可知也公以時命未遇一作偶駕言于歸南山巖巖分我鄉之南北秦雲日暮類吾徒之聚散况公之仲兄季弟與余為忘年友涪水春風巴山秋月靡㳺不同乆阻山陽之歡又此河梁之别二事交戰祗酒一作醉我心今紫㣲郎常公朝廷之詞伯而公之舊也君其請賦一詩以大誇西蜀父老矣文苑英華巻七百二十一
