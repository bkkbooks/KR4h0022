body:
  text: 文苑英華卷二百五十宋李昉等編寄贈四張說三首蘇頲二首張九齡二首裴耀卿一首李林甫一首徐仁友一首王翰一首蔣煥一首張子容三首王維八首孟浩然八首高適五首盧象二首崔皓一首祖詠三首丁仙芝二首蔡希寂一首贈崔公張說我聞西漢日四老南山幽長歌紫芝秀高卧白雲浮朝市集作野光塵絶榛蕪年貌秋一朝驅駟馬連袂入龍樓昔遁高皇去今從太子遊行藏唯聖節禍福在人謀卒能匡惠帝豈不賴留侯事隨年代逺名與圖籍留平生欽厚德慷慨景前修蚌蛤想集作同非隂兔蛟龍望斗牛無嗟異飛伏同氣幸相求嶽州贈廣平公宋大夫前人亞相本時英歸來復國禎疑朝推長孺直野慕隱之清傳節回集作還閩障皇華集作思入漢京寧思江上老嵗晏蹇無成南巾贈髙六戬前人北極辭明代南溟宅放臣丹誠由義盡白髮帶愁新鳥隨炎州氣花飛洛水春平生歌舞席誰憶不歸人間園即事寄集作贈韋侍御蘇頲結廬東城下直望終南山青靄逺相接白雲來復還拂筵紅蘚上開幔緑條間物應春偏好情忘趣轉間憲臣饒美政集作度聨事惜徂顔有酒空盈酌髙車不可攀贈彭州權别駕前人雙流脉脉錦城開追踐年年往復回秪道歌謡迎半刺徒聞禮數揖中台黃鶯急囀春風盡斑馬長嘶落景催莫愴分飛岐路别還當奏最掖垣來當塗界寄裴宣州張九齡故人宣城守亦作集作在江南偏何如分虎竹相與間山川章綬胡為者形骸非自然含情津渡闊待集作倚望眼空悁集作延逺近聞佳政平生仰大賢推心徒有屬㑹面良無緣日久集作夕遵前渚江村投暮煙念行秪意默懷逺豈言宣委曲風波事難為尺素傳贈澧陽韋明府前人君有百鍊刃堪斷七重犀誰開太阿匣特割武城雞竟與尚書佩還應天子提何時遇操柄集作宰當使玉如泥敬酬當塗界留贈之作裴耀卿附見張九齡集茂先實王佐仲舉信時英氣覩衝天發人將下榻迎圭符爾有命江國逺徂征九𣲖期方越千鈞或所集作可輕髙帆出風迥孤嶼入雲平遄邁嗟豫役離憂空自情飭簮陪早嵗接壤厠專城曠别心彌軫宏規義轉傾徒然限饑渴仍况集作况乃諷瑶瓊秋夜望月憶韓庶等諸侍郎因以投贈李林甫秋天碧雲夜明月懸東方皓皓庭際色稍稍林下光桂花澄逺近璧影散池塘鴻鴈飛難度關山曲易長揆豫秉孤直虛薄忝文昌握鏡慙光照持衡愧後行多才衆君子載筆久詞場作賦推潘嶽題詩許謝康常時陪宴語今夕恨相望願欲接髙論清晨朝建章古意贈孫翌徐仁友南望緱氏山一作嶺山居共澗隂東西十數里緬邈方寸心雲日落廣庭一作厦鶯花坐一作對孤琴琴中多苦調悽切誰復尋贈唐祖二子王翰鴻飛遵枉渚鹿鳴思故羣物情尚勞愛况乃豫别君别時花始發别後蘭再薰瑶觴滋白露寶瑟凝涼氛徘徊北林月悵望南山雲雲月眇千里音徽不可聞途次維揚望京口寄白下諸公蔣煥北望情何限南行路轉深晚帆低荻葉寒日下楓林雲白蘭陵渚煙青建業岑江天秋向盡無處不傷心贈司勳蕭郎中張子容作相開黃閣為郎奏赤墀君臣道合體父子貴同時國以推賢答家無內舉疑鳳池真水鏡蘭省得華滋未覩風流日先聞所賦詩江山清謝朓花木媚邱遲吏部來何暮王言念在茲丹青無不可霖雨亦相期昔我投荒處孤煙望島夷羣鷗終日狎落葉數年悲漁父留歌詠江妃入興詞今將獻知巳相感勿吾欺永嘉即事寄贛縣袁少府瓘張子容山繞樓臺出溪通里閈斜曾為謝客郡多有逐臣家海氣朝成雨江天晚作霞題書報賈誼此濕似長沙樂城嵗日贈孟浩然前人土地窮甌越風光肇建寅插桃銷瘴癘移竹近階墀半是吳風俗仍為楚嵗時更逢習鑿齒言在漢川湄苑舍人能書梵字兼達梵音曲盡其妙戲贈王維名儒待詔滿公車才子為郎典石渠蓮華法藏心懸悟貝葉經文手自書楚集作梵非詞共許勝揚馬梵字何人辨魯魚故舊相望在三事願君莫厭承明廬獻始興公時拜右拾遺前人寧棲野樹林寧飲澗中集作水流不用坐梁肉﨑嶇見王侯鄙哉匹夫節布褐將白頭任智誠則短守仁固其優側聞大君子安問黨與讐所不賣公器動為蒼生謀賤子跪自陳可為帳下不感激有公議曲私非所求贈裴迪前人風景日夕佳與君賦新詩淡然望逺空如意方支頥春風動百草蘭蕙生我籬曖曖閨日暖集作日暖閨田家來致詞欣欣春還臯淡淡水生陂桃李雖未開荑英集作蕚滿芳枝請君理還䇿敢告將農時入山寄城中故人一作終山别業前人中嵗頗好道晚家南山陲興來每獨往勝事空自知行到水窮處坐看雲起時偶然值林叟談笑無還期此詩三百十八卷重出今已削去注異同為一作贈崔録事前人解印歸田里賢哉此丈夫少年曾任俠晚節更為儒遁迹集作世東山下因家滄海隅已聞能狎鳥余欲共乘桴贈成文學前人寶劍千金裝登君白玉堂身為平原客家有邯鄲倡使氣公卿坐論交集作心逰俠場中年不得意集作志謝病客逰梁酌酒與裴迪前人酌酒與君君自寬人情翻覆似波瀾白首相知猶按劍朱門先達笑彈冠草色全輕集作經細雨濕花枝欲動春風寒世事浮雲何足問不如髙卧且加餐田家贈丁寓集作丁寓田家有贈前人君心尚棲隱久欲傍歸路在朝每為言解印果成趣晨雞鳴鄰里羣動從所務農夫行餉田閨妾起縫素開軒御衣服散帙理章句時吟招隱詩或製間居賦新晴望郊郭日映桑榆暮䕃集作隂盡小苑城微明渭川樹揆豫宅閭井幽賞何由屢道在終不忘跡異難相遇此時惜别離再來芳菲度望洞庭湖上張丞相集作嶽陽樓三百十二卷重出今已削去孟浩然八月湖水平㴠虛混太清氣蒸雲夢澤波撼嶽陽城欲濟無舟楫端居耻聖明坐憐集作觀垂釣叟集作者徒集作空有羡魚情書懷貽京邑同好前人惟先自鄒魯家世重儒風詩禮襲遺訓趨庭霑末躬晝夜常自強詞翰頗亦工一作攻三十既成立吁嗟命不通慈親向羸老喜懼在深衷甘脆朝不足簞瓢夕屢空執鞭慕夫子捧檄懷毛公感激遂彈冠安能守固窮當途訴知巳投刺匪求䝉秦楚邈離異翻飛何日同答秦中苦雨思歸贈袁中丞賀侍御前人為學三十載閉門江漢隂明敡逢集作明賢遭聖代羇旅屬秋霖匪集作豈直昏墊苦亦為權勢沉二毛催白髮百鎰罄黃金淚憶峴山墜集作墮愁懷襄水深謝公積憤悶莊舄空謡吟躍馬非吾事狎鷗真我心寄言當路者去矣此山岑與崔二十一逰鏡湖寄包賀二子前人試覽鏡湖物中流見集作到底清不知蓴鱸集作鱸魚味但見集作識鷗鳥情帆得樵風送春逢榖雨晴將探夏禹穴稍背越王城府集作守掾有包子文章推賀生滄浪醉後集作從唱因子集作此寄同聲贈蕭少府前人上德流如水安仁道若山聞君秉髙節而集作為得奉清顔鴻漸升台羽一作鼎牛刀列下班處膄能不潤居劇體常間去訐集作詐人無諂除邪吏息姦欲知清與潔明月在澄灣九日龍沙作寄劉文前人龍沙豫章北九日挂帆過風俗因時見湖山發興多客中誰送酒棹裏自成歌竟自乘流去滔滔任夕波寄正字前人正字藝香閣經過宛如昨幽人竹素園文選張景陽雜詩逰思竹素園歸卧寂無喧髙鳥能擇木羝羊屢集作謾觸藩物情今已見徒自集作從此欲無言秋登萬集作蘭山寄張五前人北集作此山白雲裏隱者自怡悅相望始集作試登髙心隨鴈飛滅集作心飛逐鳥滅愁因薄暮起興是清秋集作境發時見村人歸集作歸村人沙平集作行渡頭歇天邉樹若薺江畔舟集作洲如月何當載酒來共醉重陽節古樂府飛龍曲留上陳左相即陳希烈兼李右相髙適德以精靈降時膺夢寐求蒼生謝安石天子富人侯樽爼資髙論巖廊揖大猷卿才傳世業相府盛嘉謀集作相門連户􅀈卿族嗣弓裘豁達雲開景集作霽清明月映秋能為吉甫用集作薦見忝集作善用子房籌户牖集作階砌思攀陟門欄尚阻修髙山不易仰大匠本難投迹向集作與松喬合心緣啓沃留公才山吏部書癖杜荆州幸沐千年聖何辭一尉休折腰知寵辱回首見沉浮天地莊生馬江湖范蠡舟逍遙堪自樂浩蕩信無憂去矣從黃綬歸歟任白頭風塵與霄漢瞻望日悠悠奉贈集作留上李右相林甫前人風俗登淳古君臣揖大庭深沉謀九德密勿契千齡獨立調元氣清心豁窅𡨕本枝連帝系長䇿冠生靈傅說明殷道蕭何律漢刑鈞衡持國柄柱石總朝經隱軫江山藻氛氲鼎鼐銘興中皆潔白集作白雪身外盡丹青江海呼窮鳥詩書問聚螢吹噓成羽翼提握動芳馨倚伏悲還笑升沉醉復醒恩榮初就列含育忝宵形有竊邱山惠無時枕席寧壯心瞻落景生事感流萍莫以才難用終期善易聽未為門下客徒謝少微星贈杜拾遺前人傳道招提客詩書自討論佛香時入院僧飯屢過門聽法還應說集作難尋經剩欲翻草𤣥今已畢此後更何言東平留贈狄司馬前人古人無宿諾茲道未集作以為難萬里赴知巳一言誠可歎馬蹄經月窟劍術指樓蘭地出北庭盡城臨西海寒森然瞻武庫剛若弄儒翰入幕綰銀綬乘軺兼鐵冠練兵日精鋭殺敵無遺殘獻捷見天子論功俘可汗激昻丹墀下顧盼青雲端誰謂縱橫䇿翻為權勢干將軍既坎壈使者亦辛酸耿介揖三事羇離從一官知君不得意他日㑹鵬摶寄孟五少府前人秋氣落窮巷離憂兼暮蟬後時已如此髙興亦徒然知君念淹泊憶我屢周旋征路見來鴈歸人悲逺天平生各千里集作感千里相望在貞堅贈張員外盧象公家世業昌才子冠裴王出自平津邸還為吏部郎神仙餘氣色列宿動暉光夜直南宫靜朝趨北禁長時人窺水鏡明主賜衣裳翰苑飛鸚鵡天池待鳳凰承欣疇日顧未記後時傷去去圖南逺微才幸不忘贈程校書前人客自岐陽來吐音若鳴鳳孤飛果不偶獨立誰見用忽從被褐中召入承明宫聖人借顔色言事無不通殷勤拯黎庶感激論諸公時相猜賈誼圖書歸馬融顧余久寂寞一嵗麒麟閣且共歌太平勿嗟名宦薄贈王威古崔皓三十羽林將出身常事邉春風吹淺草獵騎何翩翩插羽兩相顧鳴弓新或作親上弦射麋入深谷飲馬投荒泉馬上共傾酒野中聊割鮮相看未及飲雜虜寇幽燕𤇺火去不息一作不息夜胡山或作塵髙際天長驅救東北轉或作屢戰解城全一作戰解城亦全報國行赴難古來皆共言一作然此詩三百四十卷重出今已削去注異同為一作贈苗發員外二首祖詠朱户敞髙扉青槐礙落暉八龍乘慶重三虎地集作遞朝歸坐竹人聲絶橫琴鳥語稀花慙潘嶽貌年稱老萊衣葉暗朱櫻熟絲長粉蝶飛應憐魯儒賤空與故山違二宿雨朝來歇空山天氣清盤雲雙鶴下隔水一蟬鳴古道黃花落平蕪赤燒生茂陵雖有病猶得伴君行蘭峰題贈張中丞九臯前人君王既巡狩輦道入秦京逺樹低槍壘孤山出幔城寒踈清禁漏夜警羽林兵誰念迷方客常懷魏闕情贈朱中書丁仙芝十年種田濵五湖十年遭潦盡為蕪頻年井稅常不足今年緍錢誰為輸東鄰轉榖五之利西鄰販繒日已貴而我守道不遷業誰能肯敢效此事紫微侍郎白虎殿出入通籍回天眷晨趨綵筆柏梁篇晝出雕盤大官膳㑹應憐爾居素約可即長年守貧賤戲贈姚侍御前人繁霜曉幕鳴柏烏侍子獸炭燃金爐重門啓鎖紫髯胡新被驄馬隴西駒頭戴獬豸急晨趨明光殿前見天子今日應彈佞幸夫贈張鏡微蔡希寂大河東北望桃林雜樹𡨕𡨕結翠隂不知君作神仙尉特訝行來雲霧深文苑英華卷二百五十
