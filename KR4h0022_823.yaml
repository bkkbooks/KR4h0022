body:
  text: 文苑英華卷八百二十四宋李昉等編宴逰二亭上沔州秋興亭記一首盧郎中潯陽竹亭記一首撫州南城縣客館新亭記一首馬退山茅亭記一首寒亭記一首殊亭記一首廣宴亭記一首鍾陵東湖亭記一首二公亭記一首沔州秋興亭記賈至在陽而舒在隂而慘性之常也履險而栗涉夷而泰情之變也觀揖讓而退覩交戰而競目之感也聞韶濩而和聆鄭衛而靡耳之動也夫其舒則怡一作洽慘則悴栗則止泰則通退則無咎競則有悔和則安樂靡則憂危情性耳目優劣若此故君子慎居處謹視聽焉沔州刺史賈載吾家之良也理沔州未期月而政和於聽一無此字訟堂之西因髙構宇不出庭户在雲霄矣却負大别之髙俯視滄浪一作海之浸閲吳蜀樓船之殷覽一作鑒荆衡藪澤之大亦有旨哉性得情適耳虛目開且處動則倦理倦莫若靜處靜則明惟明以理動窮則變變則通通則久今沔州靈府恬而神用爽政是以和觀其前户後牖順開闔之義簡也上棟下宇無雕斫之飾儉也簡近於智儉近於一作于仁仁智居之何陋之有况乎當發生之辰則攢秀木於髙砌見鶯其鳴矣處臺榭之月則納清風於洞戶見暑之徂矣洎搖落之時則俯皓氣於軒檻見火之流矣值嚴凝之序一作節則目素彩於簷楹一作棲同雲於扄闥見雪之紛矣政成頌清體安心逸而詩人之興常在當一作常時之興秋興最髙因以命亭焉余自巴丘徴赴宣室歇鞍棠樹之側解帶竹林之下嘉其俯仰美其動息乃命進牘抽毫以記二字一作志之盧郎中潯陽竹亭記獨孤及古者半夏生木堇榮君子居髙明處臺榭後代作者或用山林水澤魚鳥草木以深其趣而家一作佳景有大小道機有廣狹必以寓目放神為性情筌蹄則不俟滄洲而間不出户庭而適前尚書右司郎中盧公地甚貴心甚逺欲卑其製集作欲卑其志而髙其行故因數仞之丘伐竹為亭其髙出於林表可用逺望工不過鑿户牖費不過剪茅茨以儉為飾以靜為師辰之良景之美必作於是憑南軒以瞰原隰沖然不知錦帳粉闈之貴於此亭適也前有香草怪石杉松羅生密篠翠竿集作筠臘月碧鮮風動雨下聲比簫籟亭外有山圍湓城峯名香爐歸雲輪囷片片可數天香天鼓若在耳鼻是其所以誇逋客而傲漢貂者百里奚爵祿不入故飯牛而牛肥盧公恬智相養於是竹亭構而天機暢嘗試論亭之趣夫物不感則性不動故景集作境對而心馳也欲不足則患不至集作去故意愜而神完也耳目之用繁于物得喪之源牽於事哀樂之柄成乎心心和於內而事物集無此字應於外則登臨殊途其適一也何必嬉東山禊蘭亭爽志蕩目然後稱賞公欲其迹之可久故命余為志撫州南城縣客館新亭記古者國野之道十里有廬廬有飲食三十里有宿宿有路室於是乎集無此字賔客有止之集作底止羈旅有寄寓而是邦下集作也與兩越七閩犬牙其疆守官者以為地遐途窮而瑣瑣行邁之罕到也則殺其禮而闕其物焉無修除之􅊀無井樹之設及客集作賔至則候人不為導里不授館而盤餐薪芻之貺業集作棄如也由是途而往者僉曰陋如之何是嵗也台司審縣尹之寄擢王公昕為南城公至之日則制其集作考於事典陳其藝極視年之上下去民之疾苦凡三月而南城之人和於是飾廏置以候賔客葺旅次以待羈旅夏六月築其館辨其域于道用作新亭於館之陽厦屋耽耽俯瞰濬壑賔位在左主位在右然後剷集作剗墝埆堙坎窞以為大逵屬之于溪設雙船集作航於清津以備徑渡集作經度每將之迎之則自郊勞至於致飲集作餼非無曠禮無違物而兹亭之經始也取廢徹之材以利集作移用用乃有節入鞭撲之贖以庀工工忘其勞崇棟宇之製集作杜燥濕之虞以禮集作憩賔賔至如歸三者不愆于素功是以懋政是以立若行者有犯較之祭居者修飲餞之好登斯臨斯釃酒以贈之則溪雲竹風生於戶集作棟牖而緑野青山為之集作吾亭衢三爵之後可以送千里之目可以道四方之志焉兹又勝會之佳境凡底績以興利革故以謀始修禮以備物僝功以成務政之大者宜其刋作者之茂實以示後嗣不然他山之石何以在此此字集作兹亭也是嵗廣德二年也馬退山茅亭記柳宗元冬十月作新亭於馬退山之陽因髙丘之阻以面勢無欂櫨節棁之華不斫椽不剪茨不列墉白雲為藩籬碧山為屏風昭其儉也是山崒然起於莽蒼之中馳奔雲矗亘數十百里尾蟠荒陬首注大溪諸山來朝勢落集作若星拱蒼翠詭集作萬狀綺布繡錯蓋天儲集作鍾秀於是不限於遐裔也然以壤接荒服俗參夷徼周王之馬迹不到謝公之屐齒不及巖徑蕭條登探者以為嘆嵗在辛卯我仲兄以方牧之命試於是邦夫其德及故信孚信孚故人和人和故政多暇日繇是常徘徊此山以寄勝槩乃塈乃塗作我攸宇於是不崇朝而木工告成每風止雨收煙霞澄鮮輒角巾鹿裘率昆弟友生冠者五六人步山椒而登焉於是手彈絲桐目送還雲西山爽氣在我襟袖以極萬類攬不盈掌夫美不自美因人而彰蘭亭也不遭右軍則清湍修竹蕪沒於空山矣是亭也僻介閩嶺佳境罕到不書所作使盛迹鬱堙是貽林澗之愧也故志之寒亭記元結永泰丙午中巡屬縣至江華縣大夫忂令問咨曰縣南水石相勝集作映望之可愛相傳不可登臨俾求之得洞穴而入棧險以通之始得構茅亭於石上及亭成也以階檻憑空下臨長江軒楹雲端上齊絶巔若旦暮景風煙靄異色蒼蒼石墉含映水木欲名斯亭狀類不得敢請名之表示來世於是休於亭上為商之曰今大暑登之疑天時將寒炎蒸之地而清涼可安合集有不字命之曰寒亭集有與字乃為寒亭作記刻之亭背殊亭記癸卯中扶風馬向兼理武昌以明信嚴斷惠正為理故政不待時而成於戲若明而不信嚴而不斷惠而不正雖欲理身終不自理况於人哉公能令人理始身多暇昭我畏暑且為涼亭亭臨大江復在集作出山上佳木揚集作木相蔭常多清風巡回極望目不厭逺吾見公材殊政殊迹殊為此亭又殊因命之曰殊亭斫石刻記立于亭側庶幾來者無所惑焉廣宴亭記樊水東盡其南乃樊山北鮮津吏欲於鮮上而集作以為候舍漫叟家于樊上不醉則間乃相其地形驗之圖記實吾故宴逰之處縣大夫馬公登之歎曰謝公贈伏武昌詩云樊山開廣宴非此地耶吾欲因而修之命曰廣宴亭何如漫叟頌之曰古人將修廢遺尤異之事為君子之道於戲天下之廢遺尤異之事如此亭者誰能修而旌之天將厭悔往乎集有如字公方壯而有是心也吾當裁畜簡札待集作持為之頌故作廣宴亭記以先意云鍾陵東湖亭記符載雷霆風雨蕩陽之積也河海川谷泄隂之凝也樓觀臺榭宣人之滯也天氣鬱則兩曜不明地氣塞則萬物不生人氣壅則百神不靈我常侍李公架崇岡作新亭導百骸理七情用斯義也况是郡也翼軫之所照燭江湖之所潨射扼七城控百越地侔千乘艘駕萬舳王臣聘客環至吾府將有以省風而修好也我有善地不築不蓋我有樽酒不斟不酌其將欲斂詩人葛屨之刺乎甚不然也先是東湖汗漫與江邉際秋潦備助人憂為魚故相齊公築塘以禦之厭伊業切殺水勢且便車馬盡續則懋為塗或微而洪之民蓋纍巨萬口噫烏賣切息雷動噓氣霧散繇是行里者駢肩礙踵不得周旋焉我常侍作橋以張之其修也可以發二矢其廣也可以方兩軒結構髙標揭蘖孱顔白晝晴虹東西竟天恢里閈之迫隘通鄉遂之回去聲還一作逺千輪馳萬蹄驅渾渾浩浩水流颷駭盛矣哉澤民利物如是其偉也公樂斯橋之豪大慨一作觀斯橋之孤峙常欲建亭卜勢迭為光華會春物含秀嘯領賔從亟疑作咸來乎其上相與牽率履行而東連岡崒然橫我步武以為兹地必答前志喜形於色竦身而登之即果若真宰以萬古之勝待我矣平坳漏削崕岸鴻盤數仞不知柸土真天造也公暫紆密思計校呈狀萬材已構他人不知於是匠受令一作教吏受命談笑盼睞而亭成其望也神張一作長其登也形端其髙也渠渠其還也耽耽橫四棟以燾奡闢八扉而呀豁飛廊連軒以翼翥旁舍杳靄而雲合然後回首永睇從風開襟當軒萬井直視千里西山邐迤橫擁遼敻占護蒼翠古來無人一朝此地盡得歸我每良辰嘉客思有宴賞輒具肴酒共為歡娛天晴日宴湖光入座寂寞虛徹眇然四去或無鳥過不辨空水於戲牧鍾陵之民五改火矣首年而衣食富二年而姦慝禁三年而禮讓興大抵以清淨慈惠為理本剛明正直為化基與民同欲萬戶一令遂用無事里中或謡曰李公不愈吾何以居李公不室吾何以逸夫如是即斯亭斯榭士林君子猶以為固歟異日捧飛詔擁丹轂霈然為霖沃旱濡焦彼氓之班白童稚徘徊于階墀間者即羊公之峴首召伯之棠樹謳歌思慕尤在永久而不在兹日也載嘗忝從事重逰舊所猥獲登踐陋顔一開顧兹盛美瞽矇有頌然事光而材薄多見其不知量矣是亭居東湖之上因請諡之曰東湖亭二公亭記歐陽詹勝屋曰亭優為之名也古者創棟宇才禦風雨從時適體未盡其要則夏寢冬室春臺秋戶寒暑酷受不能自減降及中古乃有樓觀臺榭異於平居所以便春夏而陶堙鬱也樓則重構功用倍也觀亦再成勤勞厚也臺煩版築榭加欄檻暢耳目達神氣就則就矣量其材力實猶有蠧近代襲古增妙者更作為亭亭也者藉之於人則與樓觀臺榭同製之於人則與樓觀臺榭殊無重構再成之糜費如文粹作加版築欄檻之可處事約集作均而用博賢人君子多建之其建之皆選之於二字文粹作諸勝境今年暮春月邦牧安定席公别駕置同正前相國天水薑公念兹邦川逼溟渤山連蒼梧炎氣文粹作氛時迥回濕雲多來又日臨胃次斗建辰位和氣將徂畏景方至月令云可以升山陵可以居髙明蓋謂是月况地理卑庳而不擇爽塏以蕩夫汚廅乎因問文粹有風字俗相原隰郭東里所共得竒阜髙不至崇卑不至夷形勢廣袤四隅若一含之以澄湖萬頃揖之以危峯千巔文粹作嶺點圓水之心當奔崖之前如鐘之紐集作鈕狀鼇之首二公止旌旟以迥回睇假漁舟而上陟幕煙茵草玩懌移日心謀意籌有建亭之算而未之言也二公既歸集作回邑人踵公逰於斯者如市登巾集作中隆觀媚麗前來後至異口同詞曰文粹作昔漢帝不曰百姓安其田里而無愁怨之聲者其由良二千石乎是謂政平教成時和景清集無此句使俗泰而民以寧者也虞書不曰股肱良哉庶事康哉是謂翼帝藩皇調隂序陽使物阜而民以昌者也席公今日之化育吾徒是以寧薑公昔嵗之弼諧吾徒是以昌且以之寧又以之昌愷弟君子也詩曰愷悌君子民之父母二公者真吾父母矣兹阜二公攸選尚而加愛務休訟簡必復斯至上露下蕪忍令父母憩之乎遂偕發言為父集作公就亭之功蜀本無此句如墻而前陳誠于縣尹縣尹允其請而為之辨方經跖等周環當上頂誡奢訓簡以授子來於是家有餘糧文粹作力圃有餘木或掬一抔土焉或剪一枝材焉一心百身蜂還蟻往榛莽可去以自剃瓦甓無脛而奔萃一之日斤斧之功畢二之日圬墁之傭息再晨而成二公莫知層梁亘以中豁飛甍翼而四翥東西南集作南西北方不殊致糊白墳以呈素雘頳壤而垂繪通以虹橋綴以綺樹華而非侈儉而不陋煙水交浮嵒巒疊迥精舍奉其旁達都城企其遐際容影光彩搖漪入澗集作清澗指朱軒於潭底閲雲岑於波裏曠熿油油集粹作熿熿油演如飛若動又釣人飄颻於左右逰禽出沒乎前後一眄一睞千趣萬態稅息之者若在蓬壺方丈之上二公重清曠於舊賞納衷懇乎羣庶尋幽探異常於斯勞賔祖客常於斯加以平疇間闢通途在下可以觀耕耨可以採謳謡作一亭而衆美具噫天造兹阜其固與人為亭歟不然何不逺郛郭而博敞詭秀之若此非常之地意待非常之人故越千萬祀而至二公方覿也邑人想之復言曰事無隱義物有正名地為二公而見亭從二公而建斯亭也可署二公亭雖芻蕘之云中文粹作其實有謂二公不忽遂以為號小子藝忝于文曽觀光上國去之日歷越逰吳歸之辰踰荆經集作泛漢會稽之蘭亭姑蘇之華亭襄陽峴首豫章湖中皆古今稱為佳境或棟宇猶在或基址未圮文粹作沒山川物像遍得而覽方之於此逺有慙德懿哉二公智周德厚卜地如此感民若彼其文粹作且非飾説入吾邑者知之竒境集粹無此四字升吾亭者知之古之製器物造宫室咸有銘頌以昭其義斯亭也豈無斆古而為之章句者小子薄劣不敢議其事粗述其旨始為之記兼借二公之名紀于左以為邦榮在位元文粹作賔寮亦以次序從公而列貞元九年三月二十五日記文苑英華卷八百二十四
