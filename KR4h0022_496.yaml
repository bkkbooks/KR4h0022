body:
  text: 文苑英華巻四百九十六宋李昉等編政化政理一道政必成化必至一道不勞而理一道風化澆樸一道致和平復雍熈一道號令一道逹聰明致理化一道决壅蔽一道去盗賊一道議赦一道典章禁令一道政理見四百八十三巻題作賢良方正䇿吳師道政必成化必至在敬始慎終白居易問先王之教布在方册事雖易舉政則難成豈文之空垂將行之未至思臻其極佇質所疑此巻並於白居易集凖備制科七十五門中摘取十篇其問荅皆居易擬作對對夫欲使政必成化必至者無他焉在陛下敬始慎終之所致耳臣聞先王之訓不徒言也先王之教不虚行也淺行之則小理深行之則大和淺深大小之應其由影響矣然則天下至廣王化至大増减損益難見其形是以政之損者雖不見其日損必有時而亂也教之益者雖不見其日益必有時而理也陛下但推其誠勤其政敬其始慎其終日用而不知自臻其極此先王終日所務者也終日所行者也不可月㑹其教化之淺深嵗計其風俗之厚薄焉臣又聞易曰聖人乆於其道而天下化成詩曰靡不有初鮮克有終此言王者之教當作政待乆而成也王者之化待終而至也陛下誠而乆之敬而終之八字集作誠能乆而終之則何慮政不成而化不至乎不勞而理在順人心立教問方今勤恤憂勞夙夜不怠而政教猶缺懲勸未行何則上古之君無為而理令不嚴而肅教不勞而成何施何為得至於此對對臣請以三五之道言之臣聞三王之為君也無常心以天下之心為心五帝之為君也無常欲以百姓之欲為欲順其心以出令則不嚴而理因其欲以設教則不勞而成故風號無聞而人從刑賞不施而人服三五所以無為而天下理者由此道也後代反是故不及者逺焉臣請以三代已後之事言之臣聞後代之天下三五之天下也後代之人三五之人也後代之位三五之位也居其位得其人有其天下而不及三五者何哉臣竊驚怪之然亦粗知其由矣豈不以已心為心抑天下以奉一人之心也以已欲為欲咈百姓以從一人之欲也茍或心與道未合政與欲並行得失交争利害相半如此則雖宵衣旰食勞體厲精纔可以致小康不足以𢎞大道故出令而吏或犯設教而人敢違刑雖明而寡懲賞雖厚而鮮勸此由舍人而從已是以勤多而功少也伏惟陛下去彼取此執古御今以三五之心為心則政教何憂乎不洽以億兆之欲為欲則懲勸何畏乎不行政教洽則不殷憂而四海寧懲勸行則不勤勞而萬人化此由舍已而從衆是以事半而功倍也臣又聞太宗文皇帝嘗曰朕雖不及古然以百姓心為心臣以為致貞觀之理者由斯一言始也集作矣伏願陛下從而鑑之嗣而行之則天下幸甚天下幸甚風化澆樸由教不由時問甿俗之理亂風俗之盛衰何乃得於往而失於来薄於今而厚於古或曰興替之道執於集作在君臣又云澆樸之風繫於時代二說相反其誰可從對臣聞代之澆漓人之樸略由上而不由下在教而不在時盖政之臧否定於中則俗之厚薄應於外也何以驗覈伏請以周秦已降之事言之臣聞周室寖衰君臣陵替蠶食𤓰割分為戰國秦氏得之以暴易亂曽未旋踵同歸覆亡炎漢勃興奄有四海僅能除害未暇化人迨於文帝景帝勤集作始思理道躬行慈儉人用富安禮讓自興刑罰不試升平之美隣於成康載在漢書陛下熟聞之矣降及魏晉迄於梁隋䘮亂𢎞多殆不足數我高祖始造集作建區夏未遑緝熈迨于太宗𤣥宗抱聖神文武之姿用房杜姚宋之佐謀猷啓沃無怠於心徳澤施行不遺於物所以刑措而百姓欣戴兵偃而萬方恱隨近無不安逺無不服雖成康文景無以尚之載在國史陛下熟知之矣然則周秦之亂極矣及文景繼出而昌運随焉梁隋之弊甚矣及二宗嗣興而王道融焉若謂天地生成之徳漸衰國家君臣之道漸䘮則當日甚一日代甚一代不應衰而復盛澆而復和必不爾者何乃清平樸素之風薄於周秦之交而復厚於文景之代耶順成和動之俗喪於梁隋之際而獨興於貞觀開元之年耶由斯言之不在時矣故魏徵有云若言人漸澆訛不反質朴至今應為鬼魅寧可復得而敎化耶斯言至矣故太宗嘉之臣又按禮記曰教者人之寒暑也事者人之風雨也此言萬人之從王化如百穀之委嵗功也若寒暑以時則禾黍登而菽麥熟若風雨不節則稂莠殖而秕稗生也故教化優深則廉讓興而仁義作刑政偷薄則訛偽起而姦宄臻雖百穀在地成之者天也雖萬人在下化之者上也必欲以凉徳弊政嚴令繁刑而求仁義行姦宄息亦猶飄風暴雨愆陽伏陰而望禾黍豊稂莠死其不可也亦甚明矣故曰堯舜率天下以義比屋可封桀紂率天下以暴比屋可戮斯則由上在教之明驗也伏惟聖心無疑焉致和平復雍熈在念今而思古也問今欲感人心於和平致王化於樸厚何思何念得至於斯對對臣聞政不念今則人心不能交感道不思古則王化不能流行將欲感人心於和平則在乎念今而已伏惟陛下知人安之至難也則念去煩擾之吏愛人命之至重也則念黜苛酷之官恤人力之易罷也則念省修葺之勞憂人財之易匱也則念减服御之費懼人之有餒也則念薄麥禾之税畏人之有寒也則念輕布帛之征慮人之有愁苦也則念節聲樂之娱恐人之有怨曠也則念損嬪嬙之數故念之又念之則人心交感矣感之又感之則天下和平矣將欲致王化於雍熈則在乎思古而已伏惟陛下仰羲軒之道也則思興利而除害侔唐虞之聖也則思明目而逹聪師夏禹之徳也則思泣辜而恤人法殷湯之仁也則思祝網而愛物鍳漢之盛也則思罷露䑓而海内流化觀周之興也則思塟枯骨而天下歸心𢎞貞觀之理也則思聞房魏之讜議以致升平嗣開元之政也則思得姚宋之嘉謀而臻富夀故思之又思之則王化一作澤流行矣行之又行之則天下雍熈矣號令令一則行推誠則化問號令者所以齊其俗一其心故聖王重之慎之然則號集無號字令既出而俗猶未齊者其故安在令既下集作行而心猶未一者其失安歸欲使下令如風行出言如響應導之而人知勸防之而人不踰將致於斯豈無其要對對臣聞王者發號施令所以齊其俗一其心俗齊則和心一則固人於是乎可任使也傳曰人心不同如其面焉故一人一心萬人萬心若不以令一之則人人之心各異矣於是積異以生疑積疑以生惑除亂莫先乎令者也故聖王重之然則令者出於一人加於百辟被於萬姓漸於四夷如風行如雨施有往而無返也其在周易渙汗之義言號令如汗渙然一出而不可復也故聖王慎之然則令既出而俗猶未齊者由令不一也不一者非獨朝出夕改晨行暮止也盖謹於始慢於終則不一也張於近弛於逺則不一也急於賤寛於貴則不一也行於疎廢於親則不一也且人之心猶不可以不一而理况君之令其可二三而行者乎然則令既一而天下之心猶未悦隨者由上之不能行於已推於誠者也凡下之從上也不從口之言從上之所好也不從力之制從上之所為也盖行諸已也誠則化諸人也速求諸已也至則感諸人也深若不推之扵誠雖三令五申而令不明也集作矣茍不行之扵已雖家至日見而人不信也集作矣聖王知其如此故以禮自修以法自理慎其所好重其所為有諸已者而後求諸人責於下者必先禁扵上是以推之而往引之而來導之斯行禁之斯止使天下之人集作心顒顒然唯望其令聴其言而已故言出則千里之外應如響令下則四海之内行如風故曰禁勝於身則令行扵人者矣又曰下令如流水之集作浚源盖謂是也如此則何慮乎海内之令不如身之使臂臂之使指者哉問達聰明致理化對夫欲達聪明致理化則在乎奉成式不必乎創新規也臣聞堯之所以神而化者聦明文思也舜之所以聖而理者明四目達四聰也盖古之理化皆由聰明出也自唐虞以降斯道寢衰秦漢以還斯道大喪上不以聰接下下不以明奉上聰明之道既阻於上下則訛偽之俗不得不流於内外也國家承百王已弊之風振千古未行之法於是始立匭使始加諌員始命待制官始設登聞皷故遺補之諌入則朝廷之得失所由知也匭使之職舉則天下之壅蔽所由通也待制之官進則衆臣之謀猷所由展也登聞之皷鳴則羣下之寃濫所由逹也此皆我烈祖所剏累聖所奉雖堯舜之道無以出焉故貞觀之太和開元之至理率由斯而馴致矣自貞元以来抗疏而諌者留而不行投書於匭者寝而不報待制之官經時而不見於一問登聞之皷終嵗而不聞於一聲臣恐衆臣之謀猷或未盡展朝廷之得失或未盡知壅蔽者有所未通寃濫者有所未逹今幸當陛下踐阼體元之始施令布和之初則宜申明舊章修集作條舉廢事使列聖之述作不墜陛下之聪明惟新以初為常今其時矣時不可失惟陛下措而行之則堯舜之化一作風祖宗之理可得而致矣臣故曰逹聪明致理化在乎奉成式不必乎剏新規也問决壅蔽在不使人知所欲對對臣聞國家之患患在於臣之壅蔽也壅蔽之由由生於君集作壅蔽之生生於君之好欲也盖欲見於此則壅生於彼壅生於彼則亂作其間歴代有之可略言耳昔秦二代好佞趙髙飾諂諛之言以壅之周厲好利榮夷公陳聚斂之計以壅之殷辛好音師涓作靡靡之樂以壅之周幽好色襃人納豔妻以壅之齊桓好味易牙蒸首子以壅之雖所好不同同歸於壅也集作矣所壅不同同歸於亂也故曰人君無見其意将為下餌盖謂此矣然則明王非無欲也非無壅也盖有欲則節之有壅則决之節之又節之以至於無欲也决之又决之以至於無壅也其所然者將在乎靜思其故動防其微故聞甘言則慮趙髙之諛進於側矣見厚利則慮榮夷公之計陳於前矣聽新聲則慮師涓之音誘於耳矣顧􅝰色則慮襃氏之女感於目矣嘗異味則慮易牙之子入於口矣夫如是安得不晝夜慮之寤寐思之立則見其參於前行則想其隨於後自然兢兢業業日慎一日使左不知其所欲右不知其所好雖欲壅蔽其可得乎此明王節欲决壅之要道也問去盗賊在舉徳選能安業厚生對對臣聞聖王之去盗賊也有二道焉始則舉有徳選有能使教化大行姦宄者去次又安其業厚其生使㢘耻大興貪暴者息故舜舉臯陶不仁者逺晉用士㑹盗奔于秦此舉徳選能之效也成康阜其俗禮譲興行文景富其人盗賊衰息此安業厚生之驗也由是觀之則俗之貪廉盗之有無繫於人之勞逸吏之賢否也方今科禁集作禁科雖嚴桴皷未靜􅐁􅜙時聞於道路穿窬或縱於鄉閭無乃陛下之人有多窮困凍餒者乎無乃陛下之吏有非循良明白者乎伏惟陛下大推愛人之誠廣諭稱善之㫖厚其生業使俗知恥格舉其集作以賢徳使國無幸人自然㢘讓風行姦濫日息則重門罕聞於擊柝外户庶見於不扄者矣問議赦對對臣謹案書曰眚災肆赦又易曰雷雨作解君子以赦過宥罪斯則赦之不可廢也必矣管子曰赦者奔馬之委轡也不赦者痤疽之砭集作􅀈管子作礦石也又諺曰一歳再赦婦兒喑啞斯又赦之不可數也明矣然則赦之為用用必有時數既失之廢亦未為得也何者赦之為徳大矣為賊亦甚矣大凡王者踐阼改元之初一用之則為徳也居常致理之際數用之則為賊也故踐阼而無赦則布新之義缺而好生之徳廢矣居常而數赦則恵姦之路啓而召亂之門開矣由此而觀盖赦者可疎而不可數也可重而不可廢也用舍之要其在兹乎典章禁令問子大夫才膺間出副我旁求宜當悉心靡有所隱其或典章有違於古禁令不便於今爾無面從予將親覽焉集無焉字對對臣伏以今之典章百王之典章也安有戾於古道者歟今之禁令列聖之禁令也安有乖於今集作昔時者歟但在乎奉與不奉行與不行耳陛下之念至此誠思理之心切好問之㫖深也此臣所以極千慮昧萬死而獻狂直者以副天心之萬一焉臣聞典章不能自舉待教令而舉教令不能自行待誠信而行今百王之典具存列聖之法明備而禁未甚止令未甚行者臣愚以為待陛下誠信以行之也三字集作將之昔宓賤行化徳及泉魚一作夜漁非嚴刑所致也推其誠而已魯恭為理仁及春翟非猛政所驅也委其信而已今以陛下上聖之資仁恵之力令行禁止之勢萬萬於一邑一宰也何慮教不敷而化不洽乎臣又聞周公之理也周年而變三年而化五年而定陛下茍能勤教令以撫之推誠信以奉之則三年化成五年理定臣竊未以為遲矣伏惟陛下少垂意而行集作待焉文苑英華卷四百九十六
