body:
  text: 文苑英華卷四百六十二宋李昉等編詔勑四巡幸幸新豐及同州勑蘇頲勑虞之四朝且編區㝢漢之三輔本同京師善於古者考於今發乎邇者應乎逺若順豫之事缺則紊於王制巡逰之典備則慮於人勞朕受命膺期勵精設教幸乾坤幽贊風雨咸若百物既阜三農已登同頴薦詔令作獻於宗廟穭穗生於羣國我無大桀實欣於嵗取人有小康未果於時邁但左翊之地近入黃圗新豐之邑甫鄰青綺山川宫館咫尺相望欲過灞亭而涉􅀈音義新豐水名經沙阜而臨渭見彼耆耋問其疾苦察長吏之政恤黎氓之寃蓋所以展義陳詩觀風問俗始自畿甸化於天下宜以今月二十五日幸長春宫停五日緣頓所須並令所司支備一事以上不得干擾州縣發日唯量將飛騎萬騎行更不須别遣兵馬及妄有科喚朕此行之處不得進奉在路有稱寃苦州縣不能疏决者委御史金吾收狀為進各勉所職副朕意焉開元二年九月十一日幸東都制黃門朕聞遂物之宜上則聽其和樂違人之欲下則生於怨思一物安可弗遂萬人安可固違且先王卜征觀乎風俗大易順動應乎天地由是巡以五載尚遍於人寰設於詔令作為兩京况稱於帝宅東幸西顧乃其常也然朕以行必清道不為無事至而供帳是則有勞故恤人之隱憂人不足於今四年矣遂使東土耆老傾心而徯豫中朝公卿屢言以沃朕或謂國之中洛王者上地均諸侯之賦當天下之樞陸行漕引方舟擊舦費省萬計利踰十倍更知夫便於物者非自奉以懷安嗟於人者豈不誠詔令作識而阻願於是乎見品彚之阜因京坻之饒則無奪農矣陳太師之言獻史臣之頌則無缺政矣信可以偹法駕乘陽春歸於成周布我時令以來年正月五日行幸東都仍取北路所司凖式主者施行開元四年十二月三日幸長安制門下觀俗省方所以愛人治國尊崇一作宗尊廟貌所以事神享親欽若昔典此言大哉一作義朕祗膺鴻業積念咸秦去嵗欲幸洛京已發成命旋屬重營太廟一作天室因將中止誠以其繩則板功且未即展軨效駕信弗可違終四覲於東方恆載馳於西土流晷不駐通喪永畢象居始成如在增慕朕之前志日夕一作夜匪遑故可以詩陳肅雍禮極禋祀神明之奧一作噢時惟雍州稼穡有年莫若關輔王假用吉后來其蘇實獲我心俾從人欲可以今年十月取北路幸長安所司凖式務在節省無得勞費主者施行開元六年六月六日幸西京制張九齡勑朕所時邁皆順物情頃屬關輔無年遽爾東幸固非為已將以息人今百榖既成庶務皆省而五陵所奉誠在京師安可更留周南有闕時薦宜以來年正月七日取南路幸西京所司凖式應行幸所須務從節减所申明為條例勿使勞煩𤣥宗幸普安郡制賈至門下我唐受命百有十載德澤浸於荒裔聲教被於殊鄰紹三代之統緒綜百王之禮樂我髙祖神堯皇帝奄有大寶應天順人我太宗文武聖皇帝戡難造邦光澤天下我髙宗天皇大帝修文偃武惠綏四方我中宗孝和皇帝聿遵孝德惟新其命我睿宗大聖真皇帝清明在躬𤣥化溥暢朕承纍聖之洪訓荷祖宗之丕緒兢兢業業不敢自寧往嵗韋氏作逆宗社將墜是用翼載先後掃蕩凶徒宸極既真寰區載晏爾來在位垂五十年中原幸無師旅戎狄嵗來朝貢夙興旰食勤念蒼生庶𢎞至理永躋仁夀愧無帝堯之聖德而有寄體之不明致令賊臣內外為患蔽朕耳目逺朕忠良或竊弄威權或厚斂重賦泉一作蟻壤一漏成此滔天構逆召戎馳突中夏傾覆我河洛擾亂我崤函使衣冠奔走於草莽黎庶狼狽於鋒鏑伊朕薄德不能守厥位貽禍海內負兹蒼生是用罪已責躬寤寐戰灼上愧乎天地下愧乎庶人外愧乎四夷內愧乎九族乾乾惕厲思雪大恥夫定禍亂者必仗於羣才理國家者先固其根本太子某忠肅恭懿說禮敦詩好勇多謀加之果斷永王璘盛王琦豐王珙皆孝友謹恪樂善好賢頃在禁中而習政事察其圗慮可試艱難夫宫相之才師傅之任必資雅善允屬忠貞况四海多虞二京未復今當慎擇實惟其人太子某宜充天下兵馬元帥仍都統朔方河東北及平盧等節度使與諸路及諸副大使等計㑹南牧長安洛陽以御史中丞裴冕兼左庶子隴西郡公劉秩試守右庶子永王璘宜充山南東道及黔中江南西路節度採訪等使江陵大都督如故以少府監竇紹為之傅以長沙郡太守李峴為副都大使仍授江陵郡大都督府長史兼御史中丞盛王琦宜充廣陵郡大都督府長史仍領江南路及淮南河北等路節度採訪都大使依前江陵郡都督府長史劉彚為之傅以廣陵郡長史李成式為都一作副大使兼御史中丞豐王珙宜充武威郡大都督仍領河西隴右安西北庭等路節度採訪都大使以隴西郡太守鄧景山為之傅兼武威郡都督府長史御史中丞充都副使應須兵馬甲仗器械糧賜等並於當路自供其諸路本節度採訪度支防禦等使號王巨等並依前充使其署官屬及本路郡縣官並各任便自簡擇五品以下任署置訖聞奏六品以下任便授已後一時聞奏其授京官九品以上並先授名聞奏聽進止其武官折衝以下並賞借緋紫任量功便處分訖聞奏其有文武竒才隱在林藪宜加辟命量事奬擢於戲咨爾元子等敬聽朕命謹恭祗敬以見師𫝊端莊簡肅以蒞衆官慈恤惠愛以飬百姓忠恕哀敬以折庶獄色不可犯以臨軍政犯而必恕以納忠規往欽哉無替朕命搜賢詔隋文帝日往月來唯天所以運序山鎮川流唯地所以宣氣運序則寒暑無差宣氣則雲雨有作故能成天地之大德育萬物而為功况以一人君於四海睹物欲運獨見致治不藉羣才未之有也是以唐堯欽明命羲和以居嶽虞舜睿德升元凱而作相伊尹鼎爼之媵為殷之阿衡吕望漁釣之夫為周之尚父此則鳴鶴在隂其子必和風雲之從龍虎賢哲之應聖明君德不回臣道以正故能通天地之和順隂陽之序豈不猶元首而有股肱乎自王道衰人風薄居上莫能公道以御物為下必踵私法以希時上下相䝉君臣義失義失則政乖政乖則人困蓋同德之風難嗣離德之軌易追則任者不休休者不任則衆口鑠金戮辱之禍不測是以行歌避代辭位灌園卷而可懷黜而無愠放逐江湖之上沉赴河海之流所以自潔而不悔者也至於閭閻秀異之士鄉曲博雅之儒言足以佐時行足以勵俗遺棄於草野堙滅而無聞豈勝道哉所以覽古而嘆息者也方今區宇一家煙火萬里百姓乂安四夷賔服豈是人功實乃天意朕惟夙夜祗懼將所以上嗣明靈是以小心勵已日慎一日以黎元在念憂兆庶未康以庶政為懷慮一物失所雖求傅巖莫見幽人徒想崆峒未聞至道唯恐商歌於長夜抱關於夷門逺迹犬羊之間屈身僕𨽻隋書本紀作僮僕之伍其令州縣搜揚賢哲皆取明知今古通識治亂究政教之本逹禮樂之源不限多少不得妄舉限以三旬咸令進路徴召將送必須以聞隋書作禮仁夀三年七月丁邜此詔英華止載庶政為懷已下而無前假今以隋書本紀增入舉賢良詔一作搜訪才能詔許敬宗門下髙明之天資星辰以麗象博厚之地藉川嶽而成形况於帝王體元立極臨馭萬物字飬生民一作靈者乎所以致治一作政之君逺讒佞近忠良屈已以伸人故能成其治一作化為亂之主親不肖踈賢臣虐下以恣情用能成其亂明君遵彼而興國暗主行此而亡身是以朽壤毁於蓮蓬巨蠧傷於翠葉蓮蓬墜澗竟無反嶺之期翠葉隨風終無歸林之望故知亡者難以復生敗者不可重全所以御朽臨氷銘心自戒宵興旰食側席思賢庶欲博訪丘園搜採英俊弼我王道臻於太平一作化焉可令天下諸州明揚側陋所部之內不限吏民一作人唐太宗時二名不偏諱髙宗雖諱治此詔又在貞觀間今唐大詔令易民為靈為人易治為政為化疑是後人追改其有服道栖仁澄心礪操出片言而標物範備百行以綜人師質髙視於琳琅人不間於曽閔潔志丘園揚名里閈或甄明政術曉逹公方禀木鐸於孔門受金科於鄭相竒謨一作謀開發明略可以佐時識鑒清通偉才堪於幹國或含章傑出命世挺生麗藻遒文馳楚澤而方駕鈎深覩奧振梁苑以先鳴業擅專門訓髙載筆或辨調春囿一作圃談瑩秋天發研機於一言起飛電於三寸蓋期一作蓄斯奔箭未遂揚廷並宜推擇咸同舉薦以禮將送具狀奏聞限以今冬並與考使同赴庶擬焚林之舉咸矯翼於巖廊尺木之階方振鱗於逰霧翹心俊乂稱朕意焉主者施行貞觀二年正月六日一作皆唐大詔令搜揚懷才隱逸等勑蘇頲勑立政之本惟賢是切朕祗膺大厯殷鑒逺圗揚于王庭生此王國朕之所望久矣豈徴辟為事未極於巖藪而髙尚絶塵見遺於草澤將何以舉逸而勸賁然來思且才之或偏器罔求備故非臧文之智則尚其言收曲逆之竒則捐其行過而能改仁逺乎哉天下諸州有懷才隱逸跅弛不調及失職寃人等並令諸道檢察使博訪具以名聞副朕饑渴之懷庶廣搜揚之義先天二年十一月四日詔天下搜賢俊制賈至勑朕聞惟理亂在庶官是以先王旁求俊彥思皇多士以倡九牧阜成兆人頃者姦臣執權專利冒寵惟正直是醜惟邪佞是比壅塞賢路罔蔽天聰使忠臣不得盡其謀才士不得展其用廢三載之黜陟寢九德之推擇多有老於郎署滯於丘園吏稱無人才不給位朕以薄質嗣守大寶冦戎未殄王業惟艱詔令作難兢兢乾乾日慎一日緬惟堯舜求賢之意周公吐握之義思欲廣進髦乂輔寧邦家實賴公卿大夫𢎞我視聽易曰方以類聚語曰舉爾所知凡宰相王臣宜加搜擇其常參官及郡縣長史上佐等皆從歷試而踐通榮如各知其密行異能博學深識才堪濟代術可利人名不彰聞位不充量湮淪屠釣流落風波者一善可録便宜公舉逺則裁詔令作訪表附驛近則進狀奏聞勿避親讐無限儕伍其有獨負竒才未逄知已即仰投匭并所在陳狀自論長官登時與奏夫惟詔令作兹薦士非止一舉永為恆典有即登聞昔荀桓子立翟之功士伯受瓜衍之邑桞下惠賢而不舉臧文仲被竊位之名春秋書之千載不朽凡百在位可不勉歟宜宣示中外令知朕意至德二載四月八日求訪賢良詔制集鸞臺上之臨下道莫貴於求賢臣之事君功豈踰於進善所以允凝庶績式靜羣方成大厦之凌雲濟巨川之沃日故周稱多士著美風謡漢號得人垂芳竹素歷觀前代罔不由兹朕雖宵分輟寢日旰忘食勉思政術不憚劬勞而九域之至廣豈一人之獨化必佇材能共成羽翼雖復羣龍在位振鷺充庭仍恐屠釣或違薖軸尚隱未殫巖穴之美或委丘園之秀所以屢廽旌帛頻遣搜揚推薦之道相尋而虛佇之懷未愜永言於此寤寐以之宜令文武官五品以上各舉所知其有抱梁棟之才可以丹青神化藴韜鈐之略可以振耀天威資道德之方可以奬訓風俗踐孝友之行可以勸率生靈抱儒素之業可以師範國胄蓄文藻之思可以方駕詞人守貞諒之節可以直言無隱履清白之操可以守職不渝凡此八科實談三道取人以器求才務適所司仍具為限程副朕意焉主者施行舉賢制鸞臺朕聞璧月珠星實為麗天之象蒼波翠嶽爰標紀地之形是知正位辨方體元建極不憑羣彥孰贊皇猷事總萬機心覃億兆恆靡遑於寢食誠罔憚於憂勤佇賢良則終宵失寢一作寐詢政道則竟日停餐豈直未明求衣昃晷忘食而已比者屢垂旌帛頻訪丘園雖志切於旁求然未逄於俊乂待舟航而涉水思羽翼而陵虛今者更啓搜揚庶得不遺草澤其有文可以經邦國武可以定邊疆藴梁棟之宏材堪將相之重任無隔士庶具以名聞若舉得其人必當擢以不次如妄相推薦一作薦耀亦置科繩所冀多士襲於隆周得人踰於盛漢布告遐邇知朕意焉搜訪賢良詔鸞臺朕聞文武之道憑經緯而開國春秋之功藉生殺而成嵗雖復車書混一中黃之雄氣諒存溫煦方滋太白之髙星必應事既不昧理乃固然朕自臨御天下憂勞兆庶宵衣佇旦望調東户之風旰食忘眠希緝南薰之化故得中外禔福遐邇乂安控蟠桃於滋穴之墟通細柳於炎洲之域楚鋒越刃俱鑠大農之冶俠客雄兒皆服鴻都之肆今若循其至理任彼無為則取夬之道有餘止戈之義不足况金方起暴玉河未靜偷安榆鬼之鄉竊險麻奴之地然而北幽向化已事和親之禮而西璟疑作誤負恩不習用師之偹隨時之義寧可自然當土宇曠修人物繁富三門九地之祕豈謝前規白猿蒼兕之竒何慙曩烈或英謀冠代雄略過人總韓白以先驅掩孫吳而得俊或力能拔距勇絶䝉輪冒白刃其如歸掃蒼璧而不顧或迹隱鄽肆身託村閭行雖犯於俗流器乃堪於拯難或捷如迅電走若追風彎弧則七札洞開奔陳則重圍自潰並有思於制命俱未遇於時須可令文武內外官五品及七品以上清官及外官刺史都督等於當管部內即令具舉且十室之邑忠信尚存三人同行我師猶在㑹須搜訪不得稱無薦若不虛自從褒異之典舉非其士豈漏貶責之科所司明為條例布告逺近知朕意焉籍田制張九齡門下粢盛所以奉神祗耕籍所以助人力既義率於下而敬在其中是為先農存諸大典故周宣不復於古而虢公致諌漢文能修其制而班史美談朕自御極以來勤集作動咨故實唯是十畝未展三推匱神困人降災移嵗靡不在此良以憮然今星紀既周土膏將動去農祥而不日考帝籍之以時朕其親耕以實御廩宜令禮官博士詳擇典故有司速即施行籍田制門下昔者受命為君體元立極未有不謹於禮而能見教於人朕其庶乎有慙作者方册存而可舉舊章闕集作絶而復尋自古所行無一而廢將以上乞靈於宗社前篇作社稷下䝉福於黎元朕兹精誠天實降鑒今則獻二字前篇作嗣嵗𥘉吉農事將起前篇作興禮有先於耕籍義緣奉於粢盛是所嚴祗敢不敬事故躬載耒耜親率公卿以先萬姓遂終千畝謂敦本之為大集作爾可布澤之更深宜有順於發生俾無偏於行惠可大赦天下自開元二十三年正月十八日昧爽以前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒咸赦除之其犯十惡死罪不在赦限自餘死罪特宜配流嶺南逺惡處官典犯贓本犯至死貶與嶺南逺惡左降官至流者亦量貶與逺官典配諸軍效力計贓至徒仍不得重令却上天下諸州損免處地稅先矜於詔令作枚其非損免處有貧乏未納者並一切放免京兆河南府秦州百姓有諸色勾徴及逋懸缺負亦宜放免其在官典及倉督等腹內者不在免限天下色役爰及支用務令節减并諸州貢賦先令中書門下均融减省宜凖前勑速即條奏損免州稅户錢未納并七等已上户租先未處分及五色資錢課未納灼然不辦者並放至蠶麥秋收已來贖納損免州逃兵健兒承前訪捉不獲合取籍人充替自資裝送軍程期逼迫頗亦辛苦並放至蠶麥已後發遣仍令所司預與軍州計㑹諸軍征行人並令州縣存恤其行人有父母年七十已上者委本道採訪使檢責取實牒報本軍即放還本貫軍司據闕數募取健兒充替行人及防丁有身亡者為造棺櫬遞還本處詔令作鄉諸州應發遣防丁去本貫一千里已上比來除正課之外給一丁充資多不濟辦宜更量與資助兩京城內今年所有諸雜夫役並宜免放應須使役以諸色錢和雇取充農桑是時不得妨奪州縣長官倍加勸課孝子順孫義夫節婦旌表門閭鰥寡惸獨不能自存量加優恤天下侍老百嵗已上版授上州刺史九十中州刺史七十已上上州司馬其九十以上所由仍量給酒肉各令存問亞獻皇太子鴻賜物二千匹終獻慶王潭賜物一千匹邠王守禮等各賜物一千匹忠王浚已下各賜物三百匹夾侍正衣進圭捧圭汝陽郡王淳等各賜物二百匹皇太子夾侍正衣等各賜物一百匹裴耀卿張九齡李林甫自其翊贊誠有忠益頒賞以序等數須優宜與一子官仍各賜物三百匹二王後各賜物一百匹長公主公主各與一子官仍各賜物二百匹嗣王郡主縣主各賜物一百五十匹在京文武官見任及致仕并諸色陪位官一品賜物八十匹二品七十匹三品六十匹四品五十匹五品四十匹七品六品三十端詔令作假八品九品二十端詔令作假節度使大夫三字詔令作副大使三都留守京兆尹各一百匹四大都督府長史諸道採訪使各八十匹諸賜物應兩給者從一處給其耕官及待耕官各賜勳兩轉丞相蕭嵩與一子官仍賜物二百匹攝九卿諸侯等各與一子出身仍各賜物一百五十匹侍耕執牛官各賜物一百二十匹升壇行事官修禮儀官及刺史判官等更賜一階應入三品及五品官階相當减四考聽入攝司徒信安郡王禕禮儀官韋縚既不叙階禕與一子官賜物二百匹縚與一子出身賜物一百五十匹其升壇及修禮儀兩兼者從一加階應與一子官及出身者若無子聽廽與周親供奉及押階不升壇并壇下行事及助耕勒牛官别勑差中書門下差定人等泛階合入三品五品官階至考未定者待考定日聽叙非待考者賜勳四轉未承别賜者各賜一等知頓使賜物一百匹修壇場長官屯官撰玉冊文官各賜物捌拾匹書玉冊官賜物五十匹管籍田縣令賜物六十匹在東京文武官朝集使外官充十道採訪使并判官諸道節度副大使并諸方通表使諸勑使判官新除五品已上官未赴任都城畿縣令見陪位者三品以上轉爵一級四品已下進一階皇親諸親及九廟子孫不入等陪位者并外文武官九品已上各賜勳一轉諸蕃入朝及賀正蕃客應陪位者共賜物五十匹節級分付南北衙行從宿衛齊宫者及文武官押當有職掌并諸色雜職掌并應耕公卿從官等各賜勳一轉萬騎及飛騎見當上者各賜勳一轉其宿衛齊宫者加賜物三假仗內坊侍諸色行從人各賜物三假彍騎蕃兵角弓手拏手官馬主見至詔令無至字當畨及留帖人掌間幕士駕士供膳習馭工人樂人見當有上職掌并庶人應耕者各賜物三假齊郎禮生贊者行事者并减兩年勞無勞可减者齊郎放出身禮生贊者選日稍優與處分三衛詔令作闕七色見當畨并流外行署及蕃官見上有職掌者各賜勳一轉河南洛陽縣陪位父老各賜物五假近壇百姓各免今年雜差科宗廟致享務在豐潔禮經沿革必本人情籩豆之薦或未能備物服制之紀或有所未通宜令禮官學士詳議具奏朕自臨天下二紀於兹不敢荒寧日加兢惕前篇作日增兢業而災眚未彌黎人未康若有由而然則在豫之責有能直言極諌者具以狀聞每渴賢良無忘鑒寐頃雖虛佇未副旁求其才有王霸之略學究天人之際智勇堪將帥之選政能當牧宰之舉者五品已上清官及將軍詔令作軍將都督刺史各舉一人孝悌力田鄉閭推挹者本州長官勘責有才堪應務者各以名聞致仕久歷清資始終著稱年漸衰邁情有可矜量與改職依前致仕宗子中有才行著聞比尚沉屈者委宗正勘實奏聞唐充兩營立功宫任折衝並改與郎將郎將改與中郎其亡官失爵量加收叙五嶽四瀆名山大川及自古聖帝明王忠臣良相宜令所司二字集作所在官長精潔集作以禮致祭赦書有所未該者所司比類奏聞亡命山澤挾藏軍器百日不首復罪如𥘉敢以赦前事相言告者以其罪罪之都城內賜酺三日赦書日行五百里布告遐邇咸使知聞主者施行前四百三十二卷赦書門有此全篇題作籍田赦今籍田門所載乃節文自門下至赦天下而止已削前卷録全文于此勸農訪民所疾苦詔沈約見齊書鬱林王本紀門下執耜暫蹇則如懸比室秉機或惰則無褐終年非怠非荒雖曰王道不稂不莠實寄齊書作賴民和頃嵗多稼無麥遺秉如積而三登之美未臻萬斯之基尚逺且風土異宜百民舛務刑章治緒未必同源妨本害政事非一揆冕旒屬念無忘夙興可嚴下州郡務兹齊書作滋耕殖相畝闢疇廣開地利深樹國本克阜民天又詢訪獄市博聼謡俗傷風損化各以條聞無使瘥瘼之苦載興比屋主者詳為科齊書作條格稱朕意焉隆昌元年正月勸農制類制敕農為政本食者人天豐荒相半天之常道隂陽或愆一作舛人則為弊頃者關輔秦雍月離于畢沿河至海雨澤愆期秋穀不登宿麥全少雖令賑給慮未存濟朕視之如子繫于一人元元何辜將致捐瘠朕之不德深用耿然宜令户部侍郎馬懷素往河南道少府監源乾曜往河北道安撫存問其有不收麥處量與賑恤令及秋收仍與牧宰等勸課黍稌及粟穀使得支繼應有蕃役非灼然要者宜委使人量事停減訖奏聞公私不急之務及事有不便於時皆須節省以拯饑乏至於寃滯不申刑獄不理亦委使人隨事處分百姓間有竒才異行藏器抱璞委棄草澤婆娑州里者官人內或貪殘有聲但從私室或循默自守無益公家者還日各具名聞奏所至分明告示務加優養稱朕意焉文苑英華卷四百六十二
