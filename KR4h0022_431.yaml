body:
  text: 文苑英華卷四百三十一宋李昉等編赦書十二平亂赦書赦詔沈約門下朕肅纂乾統思𢎞祖業方欲克廣法猷寧濟遐邇實賴羣才共康世務至於股肱宗戚情委特隆垂拱責成緝熙是寄而各包藏禍心規縱醜逆朕每存容隱冀或能悛而靡懲前慝彌結後釁七百業艱宗廟事重不得不垂涕行戮以義斷恩或藩屬皇宗或睦姻近戚夫豈不懷社稷故也雖四門已穆羣凶靡餘而泣辜之嘆義兼自昔方勵精思治登賢任官隆平之化庶從茲始宜播嘉惠咸與維新可大赦天下自今月二十日昧爽已前謀反大逆手殺人以下皆赦除之頃嵗軍旅繁興叛征者衆其質繫家屬及同伍代役三署見徒詳所尤疑原遣主者施行大赦詔門下王室多難祲沴相仍昔嵗紛阻鋒交九逵今兹狂煽兵連萬雉時事屯厄罕有斯逆故今迷疑互起向背者多元惡既懸猜懼彌廣奔亡草澤自反莫因近雖曲赦與之更始而愚昧之徒猶多竄伏且遏寇未夷役連遐邇刑政弛張陷罪非一思所以曠敷嘉惠被之億兆可大赦天下凡與崔惠南史作慧景協契同謀首為姦逆爰及降叛輸力盡勤良由世道交喪流源浸逺風槩靡立以至如斯悉皆蕩滌一無所問凡諸反側咸與維新並加宣慰還復民伍國信之明皎如日月榜勒畿要咸使聞知惟崔惠景諸子不在赦例主者施行誅張易之等赦文內制鸞臺多難興王殷憂啓聖蕭牆之禍自古有之朕以虛寡宿承先顧社稷宗廟寄在朕躬親理萬幾年踰二紀幸得九玄垂祐四海乂安何嘗不日旰忘食夜分輟寢戰戰而臨寶位乾乾而握聖圖憂百姓之不寧懼一物之失所但以久親庶政勤倦成勞頃日以來微加風沴逆豎張易之昌宗兄弟比緣簿解調鍊久而園苑驅馳賜以殊恩加其顯秩不謂豺狼之性濳起梟獍之心積日包藏一朝發露皇太子顯元良守器純孝奉親知此釁萌奔衛宸極與北軍諸將戮力齊心剿撲凶渠咸就梟斬斯乃天地之大德幽明所叶贊者乎豈惟朕躬之幸抑亦兆庶之福朕方資藥餌冀保全和機務既繁有妨攝理監撫之寄屬在元良宜令皇太子顯監百官總已以聽朕當養間高枕庶獲延齡可大赦天下淮西平赦文玉堂遺範朕聞王者法天作則與衆守邦奉三無私居兆人上當恭已嚮方之際切臨深馭朽之懷憂勤靡遑今古何逺所重者兵革不試軌度自貞熙仁扇和以至大道朕顧惟菲德祗奉睿圖承昊天之眷命纘列聖之丕緒昃食以求至理虛心而俟昌言兢兢業業常懼失墜逮今十有四年矣道且希於廣運意常在於包荒推誠則深感物亦至頃嵗蜀川浙右怙亂阻兵人神共誅剪滅相次務漸偃革期於措刑方蕭斧以懲姦庶干羽以成化而淮蔡冦孽稔禍延災問罪興師蓋非獲已每念征行之暴露軫饋給之煩勞中宵惕然載益祗厲妖凶既殄黎庶用康斯皆宗社垂休中外協力將勤恤於下土冀昭答於上玄兹朕所以思與羣公卿士勵精於庶政也今屬獻嵗發春授時惟敬勾萌盡達幽蟄咸蘇徽纆可矜鰥惸在念俾疏網之是決與慶澤而惟新可大赦天下平朱泚後車駕還京大赦制陸贄門下致理之體先德後刑禮義興行故人知耻格教令明當則俗致和平然後姦慝不萌暴亂不作古先哲后莫不集作何莫由斯國家受命百七十載八聖儲慶敷佑下人邁種寬大之德纍蠲苛酷之令蓋仁之所積者厚故澤之所流者深兹豫小子獲主重器懵於理亂之本溺於因習之安授任不明賞罰乖當立法以齊衆而犯命愈甚興戎以除害而長亂益繁賊臣蓄姦乘釁竊發九廟乏主集作祀兆人靡依猰㺄肆其吞噬豺狼穴於宫闕嵗未云半載罹播遷仰慙穹昊集作旻俯愧臣庶敢愛隕越苟全眇躬集作身誠懼益縱寇讐重辱宗社集作社稷忍耻誓志庶補前羞賴億兆宅心不忘先德將帥戮力恭行天罰集作誅俾余寡昧再膺多祜總詔令作紐乾綱於既紊復天柱於將傾言旋鎬京不改舊物宗祧以集作有序朝享有經集作則責重慶深彌增感惕嗚呼君者所以撫人也君苟失位人將安仰朕既不德致寇興禍使生靈無告受制凶威苟全性命急何能擇或虧廢名節或貪冒貨利陷於集作干法網事非一端究其所由自我而致不能撫之以道乃欲繩之以刑豈所謂恤人罪已之誠含垢布和之義滌清汚俗咸與更新可大赦天下自興元元年七月二十三日集作二昧爽已前大辟罪已下已發覺未發覺已結正未結正見繫囚徒常赦所不原者咸赦除之今年五月二十八日已前左降官即與量移已經量移未復資者更移近處流人及配𨽻罰鎮效役集作力並即放還亡官失爵放歸不集作物齒者量加收序已經收序未復資者更與進改其黜免人等有素著行能傍連集作遭譴纍特加録用勿以為負不有忠者誰復社稷不有勞者誰從巡狩連帥之重所以殿邦禦侮詔令作戎也二千石之任所以分憂共理也方鎮將校勤奉戎役中外寮吏恪居官次國有大慶所宜同之內外文武及致仕官三品以上賜爵一級四品已上集作下加一階仍並賜勳兩轉司徒兼中書令晟應時傑立光輔中興再定皇都一匡天下推恩之典貽慶無窮宜與一子五品正員京官侍中瑊沈邃集作純粹忠厚服勞王家保全危城剪除大憝嘉乃茂績次于寵章宜與一子六品正員京官鎮國軍潼關節度使檢校右僕射駱元光京畿渭南商州節度使檢校右僕射尚可孤邠寧等州節度使檢校左僕射韓逰環奉天行營諸軍節度使檢校右僕射戴休顔咸秉大節著于艱難同勳叶忠翼我興運宜各與一子七品正員官諸道節度使及行在集作營都知兵馬使都虞候興元扈從左右金吾大將軍等各與一子八品正員官諸道諸團練觀察處置等使各與一子官應諸軍赴役上都收復將士等俱以忠集作純誠奮其勇節連年帶甲百戰摧鋒有忘身以效命有滅族集作親以徇義誓平國難如復私讐競揚貔武之雄克清梟獍之孽策勳行賞傳嗣榮親播乃功名與國終始自去冬以來未經甄敘者即與超八資改轉已經甄敘者更與超三資進改三品已上祖父母父母在先無官封者量與詔令作授致仕官及邑號亡者並與追贈四品已下父母在先無官封者亦授致仕官及邑號亡者亦與追贈其賞錢委所司即依元敕支給應扈從將士三品以上賜爵兩級四品已下各加兩階仍並賜勳三轉其祖父母父母官封追贈及支給錢賞並準收京城將士例處分應扈從官普恩之外三品已上更賜爵一級四品已下更加一階若常恭官祖父母父母先無官封者量授致仕官及邑號亡者並與追封贈諸州刺史普恩之外賜爵一級諸道進表官陪位者更加一階其奉天定難及元從功臣宜令本軍本使即定名聞奏所司各準元敕優賞其諸道鎮國軍及行營將士三品已上賜爵一級四品已下加一階仍準今年正月一日制速與甄敘成德淄青魏博等道節度使下并諸道諸軍應歸順將士等各藴誠義積著功勞由朕失於撫綏頃嵗暫懷疑阻尋能勵節不替舊勳是資宴犒俾洽王澤宜委所司即約額支計各賜錢物賞設仍委本道節度準前後敕速條流甄敘其朔方并諸軍應在河中𬋩內及集作并同州將士等自逺赴難解其重圍念兹功勞並未酬報雖遭脅制情有可矜應到行營未經甄敘者並準元敕超五資改轉其賞錢比收京將士例各給一半委本軍兵馬使速條録名銜聞奏所司即支計給付其食實封者亦便配額令其請受應天下諸道諸軍詔令作府州將士如有年老及疾患尫弱不任軍旅願歸鄉里者並給身劵詔令作終身優復州縣切加安存集作存恤勿令侵擾如無家業可歸者量給田宅使得存集作全濟見危致命先典所尚况忠衛社稷殺身成功朕於斯人義有加等贈太尉秀實天授貞烈沮兹姦邪倉卒集作倉黃之中獨藴雄集作神斷將紓國難詭收寇兵凶謀既隳吾事果濟忠誠奮發手擊渠魁英風凛然振邁千古宜即差官致祭并旌表門閭府縣護其喪事緣葬所要一切官供仍於墓所官為立碑以揚徽烈其所賜實封五百户嫡子授正員三品官諸子各授正員五品官委中書門下即準元敕處分應諸道諸軍將士有身死王事者委本道本使具名銜聞奏即與褒贈仍以在身官爵授其子孫內外文武官及諸親諸色人等有橫遭逆賊殺害者各聽其家及親識集作戚於所司陳牒勘會集作責聞奏亦與追贈如迹著忠烈衆所明知仍訪其子孫量加優恤尚齒養老王風之首三代制禮未或遺年朕將遵古典以興化本人心而教孝用優秩賜式慰里閭京兆府耆夀年八十已上並與版授刺史仍賜紫七十以上及諸州府迎駕耆夀亦各版授本縣令仍賜緋天下侍老耆夀等亦各與版授本官如年九十以上者州縣長吏嵗時躬親省問貧弱不能自存者量賜粟帛頃屬多難人俗流弊加之以師旅因之以凶集作飢饉賦役繁起農桑失時哀我疸人汔可小息然以國計猶歉軍實未集作靡充未盡復除良增集作深愧悼應天下建中四年年終已前所有諸色逋欠在百姓復內者一切放免百司及諸軍諸使舉放利錢今年六月已前百姓欠負未納者亦並停徴京兆府百姓普恩之外給復一年其供頓官吏委京兆府尹類例具名銜聞奏量與優奬集作賞古者計户以署吏因時而建職既不乏事亦無冗員今田畝汚萊版圖詔令作籍凋耗齊人編户托庇官曹貪吏黠胥誘為蠧弊集作囊索啓姦墮集作隳業為害集作患尤深應在京百司色役人及流外等委御史大夫即與諸司官長吏集作諸使長官審擬據見所掌事之間劇定額聞奏仍挾名送中書門下務從減省副朕憂人以後應須署置並定名先奏仍永為恆式今年正月一日赦書事詔令作節目有所未行者所司並舉而行之赦書或有不該即此類條件聞奏敢以赦前事相告言者以其罪罪之亡命山澤挾藏兵器百日不首復罪如初赦書日行五百里告布遐邇咸使聞知興元元年七月二十三日文苑英華卷四百三十一
