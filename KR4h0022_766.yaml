body:
  text: 文苑英華巻七百六十七宋李昉等編䘮服朝臣被推劾朞以上親不宜停侍衛入内議一首嫂叔舅服議二首父在為母及舅姨嫂叔等三服議一首廣䘮朋友議一首改葬服議一首子游麻衰議一首朝臣被推劾朞以上親不宜停侍衛入内議魏徴議曰竊以刑辟之設世輕世重防奸慮禍異代同歸傳曰舜之誅也殛鯀其舉也興禹書云父子兄弟罪不相及此乃哲王盛德稱之自逺爰逮近古漸為深防刑人不在君側雖著禮經子孫縁於父祖猶無定式故張湯伏辜安世為漢朝名相嵇康就戮延祖為晉室忠臣是知君有刑臣之道下無讐天之義至於子孫方之昆弟愛敬不同非無等級考之刑憲叅詳古今科條旣殊節文乂異量輕重以原情因親踈以定制踈而不陋簡而易從示無私之心坦至公之路論德則可大為法則可久理不失不害意因循弗革切為未允至若被推劾者朞以上親不許入内此由罪狀初發君怒未怠父子兄弟義不自安上展睿聖之心下申恐懼之意且不聽入未為失理依舊不改亦非乖謬謹議嫂叔舅服議顔師古議曰原夫服紀之制異統同歸或本恩情或申教義所以慎終追逺敦風厲俗輕重各順其適名實不可相違䘮過乎哀承疑象之明訓其易寧戚聖道之遺㫖所議兩條寔為舛駮特降絲綍俾革遺謬歴代之所不寤儒者於是未詳超然𤣥覽獨照深致竊以舊舘脱驂尚云出涕鄰里有殯且輟巷歌况乎昆弟一作季之妻嚴親是奉夫之昆弟貲一作資業本同遂乃均諸百姓絶於五服當其䘮沒闔門縞素已獨晏然𤣥黄莫一作不改静言至理殊非𢎞通無益關防實開偷薄相為制服孰謂非宜在昔子思宣尼之胄為位哭嫂事著禮文哭旣施位明其慘怛茍避凶服豈曰稱情又外氏之親俱縁於母母舅一列等属齊尊姨旣小功舅乃緦服曲生異議兹亦未安秦康孝思見舅如母語其崇重寧非宻戚三月輕服靡副本心愚請為昆弟之妻服當五月夫之昆弟咸亦如之為舅小功同於姨服則親踈中節名數有倫帷薄之制更嚴内外之序増睦至如舅姑為婦其服太輕冡婦止於大功衆婦小功而已但著代之重亊義特隆一作崇饋奠之重一作勤誠愛兼極畧其恩禮有虧慈惠猶子之婦並一作普服大功已子之妻飜其減降又是厚薄乖衷義理相刑一作形以類而言未為允協今請冡婦朞一作周服衆婦大功旣表授室之親又答執笲之養叔仲之後諸婦齊同則周洽平均一作則周合齊平更無窒礙矣謹議一作皆唐㑹要同前魏徴議曰臣竊聞之四字文粹作臣聞禮所以决嫌疑定猶豫别同異明是非者也非從天降非從地出人情而已矣人道所先在乎敦睦由乎親親以及逺親屬有等差故䘮紀有隆殺二十六字舊唐志㑹要文粹並作夫親族有九服紀有六隨恩以厚薄稱情以立文紀唐志作術然㑹要作原夫舅之與姨雖為同氣權之於母輕重相懸唐志文粹作論情度義先後實殊何則舅為母之本宗唐志文粹作族姨乃外戚他族唐志文粹作姓求之母族考之終極去之彌遠唐志文粹作考之經典舅實為重故周王念齊毎稱舅甥之國秦伯懐晉實切渭陽之詩今甥諸本作在舅服止一時為姨居䘮五月徇諸本作循名䘮唐志作責實逐末棄本此唐志文粹作蓋古人之情有所未悟唐志文粹作或有未逹今之唐志文粹作所宜損益實二字諸本作實在兹乎記曰兄弟之子猶子也盖引而進之也嫂叔之無服盖推而遠之也禮繼父同居者則為之朞未嘗同居則不為服為從母之夫舅之妻二夫人相為服或曰同㸑緦然則繼父之徒並非骨肉㑹要有之親二字則服重由乎同㸑恩輕在乎異居因諸本作故知制服雖繫於名盖亦縁恩之厚薄者也或有長年之嫂孩童之叔劬勞鞠養恩若所生分饑共寒契闊偕老譬同居之繼父方他人之同㸑情義之深淺寧可同日而言哉在其生也愛之同於骨肉及其死也則曰推而遠之求之本原深所未喻若推而遠之為是則不可生而共居生而共居為是則不可死同行路重其生而輕其死厚其始而薄其終稱情立文其義安在且事嫂見稱載籍非一鄭仲虞則恩禮甚篤顔𢎞都則志竭誠感唐志作竭誠致感文粹作端肅致感馬援則其見也唐志作之必冠孔伋則哭之為位此並躬踐教義仁深孝友察其所行唐志作尚之㫖豈非先覺者乎唐志文粹作歟但于其時上無哲王禮非下之所議遂使深情欝於唐志文粹作乎千載至理藏於萬古其來乆矣豈不惜哉今属欽明御宇光華再旦唐志文粹作欽明在辰聖人有作五禮詳洽一物無遺猶且永念餙唐志文粹作慎終凝神遠唐志文粹作遐想以為尊卑之叙已備二字唐志文粹作雖煥乎大備䘮紀之制或情理未當唐志作隆文粹作周爰命秩宗詳議損益唐志文粹作更詳考正臣等奉遵明㫖觸類旁求採摭羣經討論傳記或損其有餘益其不足使無文之禮咸秩敦睦之情畢舉二十二字唐志作或引兼實無文之禮咸秩敦睦之情仍有俾字變薄俗於旣徃垂篤義於将來信列聖所未聞唐志文粹作信六籍所不能談超終古文粹作超百王而獨得者也其損益之事備陳如左九字文粹唐志並作諸儒所守互有異同詳求厥中申明聖㫖謹按曾祖父母舊服齊衰三月請加為齊衰五月適子婦舊服大功請加為周年二字文粹作朞衆子婦舊服小功今請與兄弟子婦同為大功九月嫂叔舊無服今請服小功五月報其弟妻及夫兄亦小功五月舅服緦麻請與從母同服小功謹議父在為母及舅姨嫂叔服議元行中議曰夫天地之性惟人最靈者盖以智周萬物惟睿作聖明貴賤辨尊卑逺嫌疑分情禮也是以古之聖人徴性識本縁情制服則有申有壓舊唐志㑹要作厭下同天父天夫故斬衰三年情禮俱盡者因心立極也生則齊體死則同穴比㑹要作狀隂陽而配合同兩儀之化成而妻䘮杖周二本作朞情理俱殺者盖逺嫌疑尊乾道也父為嫡子三年斬衰而不去職者盖尊祖重嫡崇禮殺情也資於事父以事君孝莫大於嚴父故父在為母罷職齊周而心䘮三年謂之尊壓者則情申而禮殺也斯制也二本有可以二字異於飛走别於華夷羲農堯舜莫之異二本作易也文武周孔所同遵也唐志作同所遵也今若捨尊壓之重虧嚴父之義畧純素之嫌貽非聖之責則事不師古有傷名教矣姨兼從母之名又即母之女黨加於舅服有理存焉嫂叔不服逺嫌疑也若引同㸑之緦以忘推逺之跡旣乖前聖亦謂難從謹詳三者之疑並請依古為當謹議廣䘮朋友議崔祐甫殿中侍御史安定皇甫政字公理故尚書左丞之子文行兼茂不忝前烈雅度精識一作誠其儔盖寡佑甫昔年嘗為左丞使介而公理又余之族甥故狎焉大厯七年余寓滁而公理寓楚適有來訊示余以所著䘮朋友議余美其重禮義有古之遺範瞻望德門軌躅無替亦感恩者之所慰幸也公理又諗余曰政自從事於文舅氏未嘗以一言見誨豈所望也盍示今議之利病猗歟公理年四十班於赤墀之下六字一作班在赤墀簮筆持簡為王近臣頃又佐亷問董淮海之部名遂矣權厚矣固當緩歩濶視光車美服為貴為逹而已矣乃不遺我諛狹不畧我衰憊念噬膚之戚收門吏之舊周爰諮謀以師道見待吾亦何有但美子之求益不倦雖一勺而進可以浸天壌一巻之多可以鎭方城况其𣺌瀰旣廣嶄崒已峻増之廓之於成名乎必矣皇甫氏有子哉因覽斯議忽憶永泰中於穆鄂州寜㑹客席與故湖南觀察韋大夫之晉同宴適值有發逺書者知鄭郴州炅之龎歙州濬或以疾而沒或遇戕於盗韋氏出涕沱若有一作而言曰二刺史之晉之交友也於是歛匕箸離筵席因歸於所次而哭三日人來弔之者韋則盡哀長號不徒戚容而已又間嵗祐甫佐江南西道連帥魏尚書時屬幕中之叅佐有加官者聚合藥餌卜日為宴宴前行人至知團練副使考功邢郎中宇捐舘于荆南邢與魏鄉國接近且邢郎中則諸魏之出於尚書為内外昆弟適受朝命為尚書倅僕感杜蕢規平公之事将入言於府主請罷宴若不可則請徹樂卒事而同列之士惡我者嗤鄙之詞充牣於聽謂我樵夫農叟之智也好我者顰一作頻蹙而相誨曰慎無以方枘施圓鑿自取辱焉諄諄如不能已僕懦夫也因是而自悔乃此文粹作及其宴也大庖具酒車傾鄭衛之女列於賔席之末俳優侏儒設於公堂之下晝日不足繼之以燭使膳夫歘來酌曰曠飲斯必當見輿曳之無筭又焉得終其詞哉使我不言適其宜也今者追想韋湖南猶孔門之訓其它則吾不知因縱言之以報公理示之義當矣又何以規議旣成客謂祐甫曰韋湖南魏江西二觀察頗嘗知其風味公直簡諒魏則先之餙情强仁韋之志也今吾子之論無乃剥魏而附韋乎且子魏之上介也論議不隠恐非春秋内魯故宋之義盍辯焉祐甫應之曰噫寜以他規我是論也吾復之熟之有日矣韋湖南之晉飾情强仁誠如來議禮不云乎先王制禮賢者俯而就之不肖者企而及之子張曰先王制禮不敢不至焉韋氏之䘮朋友縱不由衷亦與夫二者之義合矣吾雖欲不與其可得哉至於故府公魏尚書公直簡諒清身敬職郡人戴於下朝聽滿於上狼籍甚盛豈造次之所盡哉但於邢副使之䘮若忍悲而就宴可謂哀樂失其節矣乃左氏傳所載樂祈左傳作祁告人曰君與叔孫其皆死乎及子招樂憂之謂也若情不至焉率而為宴則禮經所謂直情而徑行者戎狄之道也吾雖欲勿議又不可得也且吾之所論者因皇甫公理所著䘮朋友議故縱言及之非敢定二觀察之褒貶文粹無此字韋湖南吾取節焉而已矣來議又以吾嘗為魏公使介今兹著論異於春秋隠魯故宋者兹及近而非中也僕射疑雖不腆中䑓之劇曹郎且兼柱下史有名於著定矣受命為尚書介彌縫潤色之職事安可見責以故君子一作以敬故君之祀嗚呼晉悼公魏絳之君也絳戮悼公之弟韓厥趙宣之所任也厥戮宣子之僕及其終也悼公謝魏絳曰無重寡人之過宣子曰可賀我矣而絳厥無罪焉豈當不懐文粹作慎重公正之一無之字世論議之興刑罪一作與刑罰當豈異哉子何見過川文粹有之字深也嗚呼天下有至公有至當知賢而舉用之至公也臨事而平處之至當也各守其分復何尤哉自漢徐孺子於故舉主之䘮徒歩千里而行一祭厚則厚矣其於傳繼非可也歴代莫之非也近日張荆州九齡又刻石而美之於後受舉為㕘佐者報恩之分徃徃過當或撓我王憲捨其親戚之罪負舉其不令子孫以竊名位背公死黨兹或近之時論從而與之通人又不救遂徃而不返徐生徐生得非失中之履霜也常積憤懣因而書之一作皆唐文粹改葬服議韓愈經曰改葬緦春秋榖梁傳亦曰改葬之禮緦舉下緬也此皆謂子之於父母其他則皆無服何以識其必然經次五等之服小功之下然後著改葬之制更無輕重之差以此知非記其最親者其他無服則不記也若主人當服斬衰其餘親各服其服則經亦言之不當惟云緦也傳稱舉下緬者緬猶逺也下謂服之最輕者也以其逺故其服輕也江熙曰禮天子諸侯易服而葬以為交於神明者不可以純凶况其緬者乎是故改葬之禮其服惟輕以此而言則亦明矣衛司徒文子改葬其叔父問服於子思子思曰禮父母改葬緦旣葬而除之不忍無服送至親也非父母無服無服則弔服而加麻此又著者也文子又曰䘮服旣除然後乃葬者則其服何服子思曰三年之䘮未塟服不變除何有焉然則改葬與未葬者有異矣古者諸侯五月而塟大夫三月而塟士逾月無故未有過時而不塟者也過時而不塟者謂之不能塟春秋譏之若有故而未塟雖出三年子之服不變此孝子之所以著其情先王之所以必其時之道也雖有其文未有著其人者以是文粹無是字知其至少也改塟者為山崩水涌毁其墓及塟而禮不備者若文王之塟王季以水齧其墓魯隠公之葬惠公以有宋師太子少葬故有闕之類是也䘮事有進而無退有易以輕服無加以重服殯於堂則謂之殯瘞於野則謂之塟近代以來事與古異或游或仕在千百二本無百字里之外或子㓜妻稚而不能自還甚者拘以隂陽畏忌遂塟於其土文粹作山及其反塟也逺者或至數十年近者亦出三年其吉服而從於事也久矣又安可取未葬不變服之例而反為之重服歟在䘮當葬猶宜易以輕服况旣逺而反純凶以葬乎若果重服是所謂未可除而除不當重而更重也或曰䘮與其易也寜戚雖重服不亦可乎曰不然易之與戚則易固不如戚矣雖然未若禮之為懿也儉之與奢則儉固愈於奢矣雖然未若合禮之為懿也過猶不及其此類之謂乎或曰經稱改葬緦而不著其月數則以一作似三月而後除也子思之對文子則曰旣葬而除之今宜如何曰自啟殯文粹無此字至于旣葬而三月則除之未三月則服以終三月也曰妻為夫何如曰如子無弔服而加麻則何如曰今之弔服猶古之弔服也子游麻衰議高郢衛司冦惠子之䘮也其子虎見廢不得為嗣子游為之麻衰以譏之将軍文子旣悟而虎得復位載在禮典先儒是非之説禮闕戱人書曰德盛不狎侮使彌牟能知禮也是君子也當書直以救失為不知禮耶是小人也當務疑其闕能提耳喻之何狎侮之為乎觀文子未正虎位非不知也重違惠子之志将候告者而行之偃柰何以廣自許以狎待人重其語言輕其重服乘人之失伐己之明又非美之位不可謂無辱且多識前言闕其失而回遹若此設使立人之朝執人之政至於講大禮臨大節獻可替否任賢去邪言可得聞乎無以乃裂冠毁冕行恠而已矣逺觀望之未見其可直人不以其直也不敢以道徇物而忘其身赴井救人傷教害義殆非所謂習禮者矣文苑英華巻七百六十七
