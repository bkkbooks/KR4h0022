body:
  text: 文苑英華卷三百五十七宋李昉等編騷四讒風伯一首訴螭一首哀溺一首憎王孫一首逐畢方一首罵尸蟲一首招海賈一首讒一作訟風伯韓愈維茲之旱兮其誰之由我知其端兮風伯是尤山升雲兮澤上氣雷鞭車兮電搖幟雨濅濅兮將欲墜風伯怒兮雲不得止暘烏之仁兮念此下民閟其光兮不鬬其神嗟風伯兮其將集作獨謂何我於爾兮豈有其他求其時兮修祀事羊甚肥兮酒甚旨食足飽兮飲足醉風伯之怒兮誰使雲屏屏兮吹使醨之氣將交兮吹使離之鑠之使氣集作雲不得化寒之使雲集作氣不得施嗟爾風伯兮欲逃其罪其又何辭上天孔明兮有紀有綱我今集作今我上訟兮其罪誰當天誅加兮不可悔風伯雖一作之死兮人誰汝一作爾傷訴螭并序桞宗元零陵城西有螭室于江法曹史唐登浴其崖螭牽以入一昔集作夕浮水上吾聞凡山川必有神司之抑有是耶於是作訴螭投之江曰天明地幽孰主之兮夀善夭殤終何為兮堆山釃江司者誰兮突然為人使有知兮畏危慮害趨走祗兮父母孔愛妻子嘻兮出入公門不獲非兮浟浟湘流清且微兮隂幽洞石蓄怪螭兮胡濯益熱卒無歸兮親戚呌號閭里思兮魂其安遊覲湘纍兮嗟爾怪螭害江湄兮遊集作延泳重瀾集作淵物莫威兮蟉形決目潛伺窺兮膏血是利私自肥兮嵗既大旱澤莫施焉妖猾下民使顛危焉充心飽腹肆敖嬉兮洋洋往復流逶迤兮惟神髙明胡縱斯兮蔑棄無辜逞怪姿兮胡不降罰肅川坁兮舟者欣欣遊者熙兮蒲魚浸用吉無疑兮牲牷玊帛人是依兮匪神之訴將安期兮神之有亡於是推兮投之北流心孔悲兮哀溺并序前人永集作零陵之氓咸善遊一日水暴甚有五六氓乘小船絶湘水中濟船破皆遊集作浮其一氓盡力而不能尋常其侣曰汝善遊最也今何後為曰吾腰千錢重是以後曰何不去之不應搖其首有頃益怠已濟者立岸上呼且號曰汝愚之甚蔽之甚身且死何以貨為又搖其首遂溺死吾哀之且若是得不有大貨之溺大氓者乎於是作哀溺文吾哀遊集作溺者之死貨兮惟大氓之為憂泄濤鼓以風湧兮浩滉蕩而無舟不讓祿以辭富兮又旁窺而詭求手足亂而無如兮負重踰乎崇丘既搖集作浮頥而滅膂兮不忍集作欲釋利而離尤呼號者之莫救兮愈搖首以沉流髮披鬟以舞淵集作瀾兮魂倀倀而焉遊龜黿互進以爭食兮魚鮪族而為羞始貪贏而集作以嗇厚兮終負禍而懷讎前既沒而後不知懲兮更攬取而無時休哀茲氓之蔽愚兮反賊已而從仇不量多以自諫兮姑指幸者而為謀夫人固靈於鳥魚兮胡昧罻而蒙鈎大者死大兮小者死小善遊雖最兮卒以道夭與害偕行兮以死自繞推今而鑒古兮鮮克以保其生衣寶焚紂兮専利滅榮豺狼死而猶餓兮牛腹尸而不盈民既貿貿而無知兮故與彼咸諡為氓死者不足哀兮兾中人之為余再更噫憎王孫並序前人猿王孫居異山德異性不能相容猿之德靜以恆類仁讓孝慈居相愛食相先行有列飲有序不幸乖離則其鳴哀有難則內其柔弱者不踐稼蔬木實未熟相與視之謹既熟嘯呼羣萃然後食衎衎焉山之小草木必環而行遂其植故猿之居山恆鬱然王孫之德躁以囂勃諍號呶唶唶疆疆雖羣不相善也食相噬齧行無列飲無序乖離而不思有難推其柔弱者以免好踐稼𬞞所過狼藉披攘木實未熟輒齕咬捉集作投注竊取人食皆知自實其嗛以頰貯食曰嗛山之小草木必陵挫折挽使之瘁然後已故王孫之居山恆蒿然以是猿羣衆則逐王孫王孫羣衆亦齚猿猿棄去終不與抗然則物之甚可憎莫王孫若也余棄山間久見其趣如是作憎王孫云湘水之浟浟兮其上羣山胡茲鬱而彼瘁兮善惡異居其間惡者王孫兮善者猿環行遂植兮止暴殘王孫兮甚可憎噫山之靈兮胡不賊旃跳踉呌囂兮衝目宣齗外以敗物兮內以諍羣排鬪善類兮譁駭披紛盜取民食兮私已不分充嗛果腹兮驕傲歡欣嘉華美木兮碩而繁羣披競齧兮枯株根毁成敗實兮更怒喧居民厭苦兮號穹旻王孫兮甚可憎噫山之靈兮胡獨不聞猿之仁兮受逐不校退優遊兮惟德是效亷來同兮聖囚禹稷合兮凶誅羣小遂兮君子違大人聚兮孽無餘善與惡不同鄉兮否泰既兆其盈虛伊細大之固然兮乃禍福之攸趨王孫兮甚可憎噫山之靈兮胡逸而居逐畢方並序前人永州元和七年夏多火炎日夜數十發少尚五六發過三月乃止八年夏又如之人咸無安處老弱燔死晨不㸑暝不燭皆列座屋上左右視罷不能集作得休蓋類物為之者訛言相驚云有怪鳥莫實其狀山海經云章義之山有鳥如鶴一足赤文白喙其名曰畢方見則其邑有訛火若今火者其可謂訛歟而人又有文粹作有以鳥傳者其畢方歟遂邑中狀而圖之禳而磔之為之文而逐之后皇庇人兮敬授其材大施棟宇小蔽草萊各有攸宅兮時闔而門火炎為用兮化食生一作先財胡今茲之怪戾兮日十爇而窮災朝儲清以聮邃兮夕蕩覆而為灰焚傷羸老兮炭死童孩呌號隳突兮户駭人哀祖夫狂走兮倐忽往來鬱攸孽暴音剝兮混合恢台民氣不舒兮僵踣顛頽休炊息燎兮仄伏煨煤門甍晦黑兮啓伺姦回若墜之天兮若生之鬼令行不訛兮國恐盍已問之禹書畢方是祟嗟爾畢方兮胡肆其志皇亶聰明兮念此下地災皇所愛兮僇死無二幽形扇毒兮隂險詭異汝今不懲兮衆訴咸至皇斯震怒兮殄絶汝類祝融悔禍兮回祿屏氣太隂施威兮玄冥行事汝雖赤其文隻其趾逞工衒巧莫救汝死黠知亟去兮愚乃止此髙飛兮翺翔逺伏兮無傷海之南兮天之裔汝優遊兮可卒嵗皇不恕兮永汝世日之良兮今速逝急急如律令罵尸蟲并序前人有道士言人家有尸蟲三處腹中伺人隱微失誤輒籍記日庚申幸其人之昏睡出讒于帝以求饗以是人多謫過疾癘夭死桞子特不信曰吾聞聰明正直者為神帝神之尤者其為聰明正直宜大也安有下比集作以非隂穢小蟲縱其徂詭延其變詐以害于物而又悅之以饗其為不宜也殊甚吾意斯蟲若果為是則帝必將怒而戮之投于下土以殄其類俾夫人咸得安其性命而苛慝不作然後為帝也余既處卑不得質之于帝而嫉斯蟲之説為文而罵之來尸蟲汝曷不自形其形隂幽詭仄而寓乎人以賊厥靈膏肓是處兮不擇穢卑潛覷默聽兮導人為非冥持札牘兮搖動禍機卑陬拳縮兮宅體險微以曲為形以邪為質以仁為凶以僣為吉以淫諛諂誣為族類以中正和平為罪疾以通行直遂為顛蹶以逆施反鬪為安佚僣下謾上恆其心術妬人之能幸人之失利昏伺睡旁睨竊出走讒于帝遽入自屈羃然無聲其意乃畢求味已口胡人之恤彼修蛔恙心短蟯穴胃外搜疥癘下索瘻痔食人肥膏集作侵人肌膚為已得味世皆禍之則惟汝類良醫刮殺聚毒攻餌旋死無餘乃行正氣汝雖巧能未必為利帝之聰明宜好正直寧懸嘉饗答汝讒慝叱付九關貽虎豹食下民舞躍荷帝之力是則宜然何利之得速收汝集有之字生速滅汝集有之字精蓐收震怒將勑雷霆擊汝酆都糜爛縱橫俟帝之命乃施于刑羣邪殄夷一作殊大道顯名害氣永革厚人之生豈不聖且神歟祝曰尸蟲逐禍無所伏下民百祿惟帝之功以受景福尸蟲誅禍無所廬下民其蘇惟帝之德萬福來符臣拜稽首敢告于玄都招海賈前人咨海賈兮君胡以利易生而卒離其形一作刑大海蕩汨兮顛倒日月龍魚傾側兮神怪隳突蒼茫無形兮往來遽卒隂陽開闔兮氛霧滃渤君不返兮逝恍惚舟航軒昻兮下上飄鼓騰趠一作踔嶢嵲兮萬里一覩崒入泓坳兮視天若畝奔螭出抃兮翔鵬振舞天吳八一作九首兮更笑迭怒垂涎閃舌兮揮霍旁午君不返兮終為虜墨齒棧集作黑齒􅨭齴鱗文肌三角駢列耳離披反齗義牙踔嶔崖蛇首狶鬛虎豹皮羣沒互出歡遨嬉臭腥百里霧雨瀰君不返兮以充飢弱水蓄縮其下不極投之必沉負羽無力鯨鯢疑畏淫淫嶷嶷君不返兮卒自賊怪石森立涵重淵髙下列集作迾置滔危顛崩濤搜疏剡戈鋌君不返兮砉沉顛疊用顛字義不同其外大泊泙奫淪終古回薄旋天垠八方易位更錯陳君不返兮亂星辰東極西傾海流下集作不屬泯泯超忽紛蕩沃殆而一跌兮沸入湯谷舳艫霏解梢若木君不返兮魂焉薄海若嗇貨號一作兮風雷巨鼇頷首嶽山頽猖狂震虩翻九垓君不返兮糜以摧咨海賈兮君胡樂出幽險而疾平夷恟駭愁苦而以忘其歸上黨昜野恬以舒蹈蹂厚土堅無虞岐路脈布彌九區出無入有百貨俱周遊傲睨神自如撞鍾擊鮮恣歡娛君不返兮欲誰須膠鬲得聖捐鹽魚范子去相安陶朱吕氏行賈南面孤𢎞羊心計登謀謨煮鹽大冶九卿居祿秩山委收國租賢智走諾爭下車逍遙縱傲世所趨君不返兮諡為愚咨海賈兮賈尚不可為而又海是圖死為險魄兮生為貪夫亦獨何樂哉歸來兮寧君軀文苑英華卷三百五十七
