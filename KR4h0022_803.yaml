body:
  text: 文苑英華卷八百四宋李昉等編􅈦壁記八州官下判司泉州六曹新都堂記一首河南府倉曹參軍壁記一首京兆府貟外參軍壁記一首河南府參軍壁記一首河南府參軍壁記一首縣令上兖州任城縣令􅈦壁記一首安陽縣令􅈦壁記一首臨湍縣令􅈦壁記一首饒陽縣令􅈦壁記一首漢陽縣令􅈦壁記一首吳縣令􅈦壁記一首州官下判司泉州六曹新都堂記歐陽詹貞元八年刺史安定席公為邦之二祀冬造六曹之都堂公表微而慮逺也天子建六官以紀綱天下刺史分集作分刺史六司用經緯封中猶天之有四時而人之有四支一時不若則嵗罔成功一支不和則體莫全用公以六司之掾如股肱思安之與身之安也火流定中將坯城廓親覽𪠘宇首視斯署既隤而隘非凝神揆務之所日撫人民則不有國營宫室是亦為政乃量羡府以度用指斯宇而命易又曰處湫居卑非智也煩人蠧財非仁也吾欲全仁而就智蕆事者志之有司是以集作於是審基址程廣袤山節藻梲僭也削而不取階茅茨櫩集作土階茅櫚逼也革而是捐非約非豐允執厥中然後計其集作具材量日力土集作山木則酬之如市人功則稅之若時物樂民願未旬而畢飛梁五道而通負連楣六接以都豁陽軒遐引隂户集作室旁啓揖以重屏翼以回廊暗黔黔以祕邃屹崇崇以集作而宏敞夏處其逹則炎天以涼冬居其隩則凄風以溫足以寧肌靜心以釐厥職者也夫哲人有作不唯利身在利人不唯利今在利後想集作相斯堂者公侯卿士禮隔殊品公不之降也斯不亦利人不唯利於身歟堅壯固護存延千祀人不一作公不之建一作逮也斯不亦利後不唯利於今歟覩斯堂見公之意時某處某乙為司功某處某乙為司倉司户司法司兵司田皆外莊內融懷材抱忠無回邪以蒞下有謇諤以承上當時之彥也請列於記左庶後之君子觀名訪德知夫是日堂有人焉建堂之明年記河南府倉曹參軍廳壁記梁肅倉曹掾祿秩位次載於甲令在漢魏間與參軍事其職各異五府州及郡皆有其官北齊天保中又授參軍以繫官曹之號蓋取夫以文吏而參武事隋由之國家亦因之河南府領二十六縣為主東郡環地千里邦畿之內征賦之入凡蓄聚之物皆於其司一都集作郡之移用郡吏之稍食又出焉故其務殷其事積常為他曹劇居之者不勤則廢不亷則敗不明則耗斁干沒之患生其職或擢居集作登南宫及御史府故有司常綜其名實考其功緒集作績然後授之伊陽張君閿鄉李君今並為其官李以貞固稱張用文敏著豫謂命官之職事與二掾之才美不可以不紀遂直筆書之其兩曹位次與前政名氏端如貫珠列于記之左右京兆府員外參軍壁記李華東漢中平以來王室多難元臣統戎括郡才而不遺徴衆慮而從善故公府置參軍事雖位高八命權重三軍苟好謀而成亦參於幕下迄於魏氏沿漢舊章洎有普將殄於全吳石苞責禮於孫楚由是府朝致敬稍用下寮逮南北分於帝郊華夷寢於王澤而此官之選益以衆矣及隋平江嶺唐有天下聖人貴因循而重改作思豫備而戒不虞故因其名而降之秩則殷周之損益可知也至若兩京垂戎於四方府吏同體於郎署非夫公卿盛德之胤才望當仁之流不可膺其任今王國多士賢能嵗益職員之外猶以命之取類乎律吕起於黃鍾滄浪發於清漢人皆以為美也趙郡李諲碣石峰巒藂臺楨幹嬰年聞禮敬睦傳於家庭綺嵗入官名節動於寮友敏以經德清而逹和自懷濟衆之心仍有封侯之骨嘉魚在藻良馬食苖如其人有其位干雲萌於甲折貫革兆於機張且曰清階因之故事則鍾繇李胤魏舒王遵事炳於前代韋僕射李大夫陸少保杜尚書功宣於盛朝叔父侍郎發迹於河南黃門顧闕漸羽於京兆驥子躡乘黃之皂鵷雛入威鳯之巢榮縻九霄縱逰千里其可必也夫其職諧易簡道在中和高步同於列仙彈冠預於朝會若乃簿書堆案則譽發彀中醪醴蒲壺亦名髙方外動靜皆適剛柔兩持是以為從事者所貴師古之事車服盤盂畢聞旌記用垂後代飾布德音况朝之命官闕而不載以華聞於舊史請以直書故略其所知疑殆頗闕云爾河南府參軍壁記文與武邦之大司參以彌綸而果於折中軍以厲禁而闕其暴蔑彌綸之謂文厲禁之謂武居一稱而兼二義參軍司馬一作有焉漢車騎將軍張溫行司空専征關右始徴幽州刺史陶謙參軍事由是上將之府以為常儀魏驃騎將軍石苞鎮揚州普文王命孫楚參苞軍事賔主降禮始於孫石時方用武則軍師之謀主天下乂安則府公之屬吏蓋因府郡之長使持節領諸軍故雖列曹悉以參軍為號若以漢晉儔於聖代郡國比於神州則理一作治亂不侔而小大相妨一作萬矣參軍自國朝以來躋盛位者數十人逺則僕射韋公師保中朝今則中丞蔣公澄清東夏用賢而衣冠焯敘踵武而聲度相鄰選部所以較卿佐之材舉公侯之胄是以慎署斯職而要其德藝傳所謂仕而優則學學而優則仕處下僚而無咎悔從吏道而獲安間差池鵷鷺之間宴息風雲之外矣京兆韋昱門高器全其文也若英敷華其武也長劔淬鍔朗玉調律鷙禽乘秋服楚傳之訓誡傳漢相之經術每從容府中或有異政雖不吾以必預咨謀如川決防如竹迎刃夫然則貴與壽功與名非斯人而誰獲君子之所貴者名位不失其人聲聞不忘於後故搜録官族第其遷授俾將來俊茂有所觀焉時天寶九載九月十三日記河中府參軍廳記沈亞之國朝設官無高卑皆以職授任不職而居任者獨參軍焉觀其意蓋欲以清人賢胄之子弟將命試任使以雅地任集作出之耳不然何優然曠飬之如此其差高下則以五府六雄為之次第蒲河中畍三京左雍三百里且以天子在雍故其地益雄調吏者必以其人授焉噫今之衆官多失職不失其本者獨參軍焉長慶二年余客蒲河中府參軍某參軍某族世皆清胄又與始命之意不失矣乃相與請余記職官之本於其署縣令上兖州任城縣令􅈦壁記李白風姓之後國為任城蓋秦之古集作古之秦縣也在禹貢則南徐之當分成周乃東魯之邦自伯禽至集作到於順公三十二代遭楚蕩滅國集作因屬楚焉炎漢之後更為郡縣隋開皇三年廢高平郡移任城於舊居邑雖集作乃屢遷井則不失集作魯境七百里郡有一十三三字集作十一縣任城當其要衝集作衝要東盤琅邪西控巨鹿集作野是北走厥國南馳牙鄉青帝太昊之遺墟白衣尚書之舊里也土俗古逺風流清高賢良間生掩映天下地博厚川踈明漢則名王分茅魏則天人列土所以代變豪侈家傳文章君子以才雄自高小人以集作則鄙朴難理况其城池爽塏邑屋豐潤香閣倚日凌丹霄而欲飛石橋橫波驚彩虹而不去其雄麗映比有如此焉故萬商往來四海綿歷實泉貨之囊籥為英髦之咽喉故資大賢以主東道製我美錦不易其人今鄉二十六户一萬三千三百一十七集作七十一帝擇明德以賀公宰之公溫恭克修儼碩有立季野備四時之氣士元紆集作非百里之才撥煩彌間剖劇無滯鏑百發克破於楊葉刀一鼓必合於桑林寬猛相須集作濟韋弦適中一之嵗肅而教之二之嵗惠而安之三之嵗富而樂之然後青襟向訓黃髮履禮耒耜就役農無逰手之夫機杼集作杼軸和鳴織集作機罕嚬蛾之女物不知化陶然自春權豪鋤縱暴之心黠吏返淳和之性行者讓於道路任者升其集作併於輕重扶老攜幼尊尊親親千數集作載百年再復魯道非神明慱逹孰能與於此乎白探竒東蒙竊聽輿誦集作論輒記於壁垂之將來俾後賢之操刀知賀公之絶迹者也安陽縣令廳壁記李華令長之位詳於漢官土地之宜列於禹貢談者備矣而詞人略焉則此官之職守此境之風俗可知也國朝之有天下淇漳之間於京師為近守宰之寄於元元最親故授署此官延至王庭曲蒙睿渥制令褒賜與內官同法清貫往往超拜天寶以來東北隅節度位冠諸侯按數軍鉦鼓兼本道連帥以河北貢篚征稅半乎九州邉於山戎嵗備勍寇每置長吏朝廷特難之或操尚虧渝或中丞遷換或流亡未復或委罪刑書繇是使臣慎簡其人密表陳請鍾恩光於異土萃人物於東州不然何公方振羽青雲胡為而在此堂也公以德行文章為人倫羡慕清而一作自是道藝鄰於昔賢自登封主簿撫有兹邑以西門沉巫為不仁仲康解綬為有斷約一作酌古中道為今令圗下車無何休聞四塞他疆之人父母之居尸祝之則境內之歡可以心見君子哉至若由身立政謀近及逺邑人趨拜靜聞堂上之琴軍師往來潛預幕中之畫所利者大豈惟安陽夫然則繁纓曲縣衷甸四牡出左傳人所願也於公宜之記事者志盛德而旌善人今特書公何尊王命其春秋之義歟天寶十載記臨湍縣令廳壁記鄧為天下扄闥兩都南蔽秦漢以來多封將相姻戚故其人益豪強內全邑曰南陽曰穰曰臨湍蓋古新城也穰州府所理吏不暇息南陽領户既寡姦俠所歸惟臨湍境清人間從仕者所樂開元裂此鄉三千户為菊潭縣天寶至德之間狂虜南侵南陽為戰地地荒人散千里無煙猶以郵置之衝往復王命權置官吏招集疲人如寒加裘如餒併食聖朝臨下有赫哀撫兆人誅元凶清天下詔方鎮選良吏平昌孟威一作或字承顔自左驍位兵曹參軍本道節度使表為此縣始至户不盈百為政七月盡室而歸者千餘家難矣哉古之為政者先諸人後諸身先其人則人不勞後其身則身自逸承顔勤恤老幼而休息之損有餘補不足而煦育之人諭其心則不勞而理矣古之來者一作求士古之者觀諸其家知乃為政承顔奉版輿冒虜塵北越鞏洛歸家於漢上又以清白之祿為甘旨之資臣子之道卓然則其餘可知也令長品秩章綬人皆知之故不書今所書議一作儀能也寶應二年七月甲辰左補闕李華記饒陽縣令􅈦壁記喬潭千里之外設方伯帥其屬屬有長今之縣尹焉故縣之庶富尹以賢傑不可冗而庸也一作不可一日而塞也自齊桓九合制我饒陽歷戰國以還遂美其城邑西邇全趙東拒河間燕之南郊冀之北土其有吕尚之遺風乎多竒士好帶劔侈服多佳人善彈弦跕屣其地虜口近擊柝之虞其川滹沱有泛舟之役廣輪七十里編户二萬計行或擊轂市或駕肩日中竒贏雜弊為窳機女狹其幅利染工多其姦色業不可廢訟由是興非夫寬猛以濟之則不能用又宵人課居異政固亦明已我茂宰裴公河汾鼎族公卿門子識經之文緯之教一有才字設而耆幼歸心刑一有不字施而權豪斂迹惠行為膏雨令出為清風君子謂裴公於是乎一有君子二字其高蹈近密翰飛清冥未可涯也余味之久矣豈縣公能事而屋壁不書召彼故老詢於前政莫知其數逺者一作矣闕如權輿先天置郡之後凡名士改轉列於左編庶幾將來亦克用勸漢源縣令廳壁記于邵周克殷列爵惟五實分子男之位洎秦漢以降或令或長雖小有差其揆一也皆銅印墨綬秩六百石非理道之君愛人如子則不能為官擇人矣國家坐進此道至於憂勤爰增六秩以勸賢者皇帝觀兵朔方之嵗始上祿縣更名漢源將復禹舊績以從人欲其山川形勢土地風俗近鎬千里華風不間多乎哉蓋小國以聚大國之義也且夫南呀蜀郡東豁雍畤西走連磧北逾大漢四郊憧憧者於是乎終焉故有獄市之煩供億之費上咨郡府下用臨恤非貞固不足以幹事非亷慎不足以率人清淨則可乎不擾忠恕則可乎求瘼時謂京兆韋子當公府之選推而有之至於今人易受賜邑則一作用稱理聞之見之政參乎前從事雖疲於改易用舉自多於頴脫我則無二不其難乎嗟乎絆驥已久及瓜將代顧此屋壁何其寥寂前芳無聞後進奚覩記者史家之流也亦所以發揮廳事啓迪人物又知韋公授受之始其或繼之者從而記之前後相映光采洽人乾元三年孟夏之日記開元中有柴希言自溢一作釡陽縣尉拜以清白名聞遷洛水縣令天寶中有郭瞻自永康縣尉拜甚有能事秩滿逰河朔遇亂未知所適至德中有郭伯陽自某官拜恂恂如也遷洋州司馬其餘日月某一作其通名氏失之不得次於公之列耳吳縣令廳壁記梁肅在春秋列國各有屬邑其主者魯謂之宰楚謂之尹普謂之大夫秦時天下始置令長宅一同之內操賞罰之柄有民人焉有社稷焉風俗成集作嘉敗本乎身黎元安否繫乎政其體大矣自京口南被於浙河望縣十數而吳為大國家當上元之際中夏多難衣冠南避寓於集作於兹土參編户之一由是人俗舛雜號為難治加以州將有握兵按部之重邑居當水陸交馳之會承上撫下之勤征賦郵傳之繁百倍他縣夥乎其中不可勝紀大厯十一年天官精選可以長民者於是范陽盧公由太源府祁縣令為之公外寬內明敬事而信政本於仁飾身以文下車三年闔境之人安土樂義而不知安樂之所從來蓋和平也三字集作平之以和也士君子立身論道之通塞不論位之升降吳縣下一作與非畿服一等公俯而為之抑選部為官擇人而公履道從政所由然也豫知公者敢集作輒録其實書于東序以播其令聞集作問時十四年二月甲子記文苑英華卷八百四
