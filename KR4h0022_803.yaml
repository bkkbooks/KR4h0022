body:
  text: 文苑英華巻八百四宋李昉等編􅈦壁記八州官下判司泉州六曹新都堂記一首河南府倉曹㕘軍壁記一首京兆府貟外㕘軍壁記一首河南府㕘軍壁記一首河南府㕘軍壁記一首縣令上兖州任城縣令􅈦壁記一首安陽縣令􅈦壁記一首臨湍縣令􅈦壁記一首饒陽縣令􅈦壁記一首漢陽縣令􅈦壁記一首吳縣令􅈦壁記一首州官下判司泉州六曹新都堂記歐陽詹貞元八年刺史安定席公為邦之二祀冬造六曹之都堂公表㣲而慮逺也天子建六官以紀綱天下刺史分集作分刺史六司用經緯封中猶天之有四時而人之有四支一時不若則嵗罔成功一支不和則體莫全用公以六司之掾如股肱思安之與身之安也火流定中將坯城廓親覽𪠘宇首視斯署既隤而隘非凝神揆務之所日撫人民則不有國營宫室是亦為政乃量羡府以度用指斯宇而命易又曰處湫居卑非智也煩人蠧財非仁也吾欲全仁而就智蕆事者志之有司是以集作於是審基址程廣袤山節藻梲僭也削而不取階茅茨櫩集作土階茅櫚偪也革而是捐非約非豊允執厥中然後計其集作具材量日力土集作山木則酧之如市人功則稅之若時物樂民願未旬而畢飛梁五道而通負連楣六接以都豁陽軒遐引隂户集作室旁啓揖以重屏翼以廻廊晻黔黔以秘邃屹崇崇以集作而宏敞夏處其逹則炎天以凉冬居其隩則凄風以温足以寧肌静心以釐厥職者也夫哲人有作不唯利身在利人不唯利今在利後想集作相斯堂者公侯卿士禮隔殊品公不之降也斯不亦利人不唯利於身歟堅壯固䕶存延千祀人不一作公不之建一作逮也斯不亦利後不唯利於今歟覩斯堂見公之意時某處某乙為司功某處某乙為司倉司户司法司兵司田皆外莊内融懐材抱忠無回邪以蒞下有謇諤以承上當時之彦也請列於記左庶後之君子觀名訪徳知夫是日堂有人焉建堂之明年記河南府倉曹叅軍㕔壁記梁肅倉曹掾禄秩位次載於甲令在漢魏間與叅軍事其職各異五府州及郡皆有其官北齊天保中又授叅軍以繫官曹之號盖取夫以文吏而叅武事隋由之國家亦因之河南府領二十六縣為主東郡環地千里邦畿之内征賦之入凡蓄聚之物皆於其司一都集作郡之移用郡吏之稍食又岀焉故其務殷其事積常為他曹劇居之者不勤則廢不亷則敗不明則耗斁干没之患生其職或擢居集作登南宫及御史府故有司常綜其名實考其功緒集作績然後授之伊陽張君閿鄉李君今並為其官李以貞固稱張用文敏著予謂命官之職事與二掾之才羙不可以不紀遂直筆書之其两曹位次與前政名氏端如貫珠列于記之左右京兆府員外叅軍壁記李華東漢中平以來王室多難元臣統戎括郡才而不遺徴衆慮而從善故公府置叅軍事雖位高八命權重三軍苟好謀而成亦㕘於幕下迄於魏氏沿漢舊章洎有普將殄於全呉石苞責禮於孫楚由是府朝致敬稍用下寮逮南北分於帝郊華夷寢於王澤而此官之選益以衆矣及隋平江嶺唐有天下聖人貴因循而重改作思豫備而戒不虞故因其名而降之秩則殷周之損益可知也至若两京垂戎於四方府吏同體於郎署非夫公卿盛徳之𦙍才望當仁之流不可膺其任今王國多士賢能嵗益職員之外猶以命之取類乎律吕起於黄鍾滄浪發於清漢人皆以為羙也趙郡李諲碣石峰巒藂臺楨幹嬰年聞禮敬睦傳於家庭綺嵗入官名節動於寮友敏以經徳清而逹和自懐濟衆之心仍有封侯之骨嘉魚在藻良馬食苖如其人有其位干雲萌於甲折貫革兆於機張且曰清階因之故事則鍾繇李𦙍魏舒王遵事炳於前代韋僕射李大夫陸少保杜尚書功宣於盛朝叔父侍郎發跡於河南黄門顧闕漸羽於京兆驥子躡乘黄之皁鵷鶵入威鳯之巢榮縻九霄縱逰千里其可必也夫其職諧易簡道在中和高歩同於列仙彈冠預於朝㑹若乃簿書堆案則譽發彀中醪醴蒲壺亦名髙方外動静皆適剛柔两持是以為從事者所貴師古之事車服盤盂畢聞旌記用垂後代飾布徳音况朝之命官闕而不載以華聞於舊史請以直書故略其所知疑殆頗闕云爾河南府叅軍壁記文與武邦之大司叅以彌綸而果於折中軍以厲禁而闕其暴蔑彌綸之謂文厲禁之謂武居一稱而兼二義叅軍司馬一作有焉漢車騎將軍張温行司空専征關右始徴幽州刺史陶謙叅軍事由是上將之府以為常儀魏驃騎將軍石苞鎮揚州普文王命孫楚叅苞軍事賔主降禮始於孫石時方用武則軍師之謀主天下乂安則府公之屬吏盖因府郡之長使持節領諸軍故雖列曹悉以叅軍為號若以漢晉儔於聖代郡國比於神州則理一作治亂不侔而小大相妨一作萬矣叅軍自國朝以來躋盛位者數十人逺則僕射韋公師保中朝今則中丞蔣公澄清東夏用賢而衣冠焯叙踵武而聲度相隣選部所以較卿佐之材舉公侯之胄是以慎署斯職而要其徳藝傳所謂仕而優則學學而優則仕處下僚而無咎悔從吏道而獲安閒差池鵷鷺之間宴息風雲之外矣京兆韋昱門高器全其文也若英敷華其武也長劔淬鍔朗玉調律鷙禽乗秋服楚傳之訓誡傳漢相之經術每從容府中或有異政雖不吾以必預咨謀如川決防如竹迎刄夫然則貴與壽功與名非斯人而誰獲君子之所貴者名位不失其人聲聞不忘於後故蒐録官族第其遷授俾將來俊茂有所觀焉時天寳九載九月十三日記河中府叅軍㕔記沈亞之國朝設官無高卑皆以職授任不職而居任者獨叅軍焉觀其意盖欲以清人賢胄之子弟將命試任使以雅地任集作出之耳不然何優然曠飬之如此其差高下則以五府六雄為之次第蒲河中畍三京左雍三百里且以天子在雍故其地益雄調吏者必以其人授焉噫今之衆官多失職不失其本者獨叅軍焉長慶二年余客蒲河中府叅軍某叅軍某族世皆清胄又與始命之意不失矣乃相與請余記職官之本於其署縣令上兖州任城縣令􅈦壁記李白風姓之後國為任城盖秦之古集作古之秦縣也在禹貢則南徐之當分成周乃東魯之邦自伯禽至集作到於順公三十二代遭楚蕩滅國集作因屬楚焉炎漢之後更為郡縣隋開皇三年廢高平郡移任城於舊居邑雖集作乃屢遷井則不失集作魯境七百里郡有一十三三字集作十一縣任城當其要衝集作衝要東盤琅邪西控鉅鹿集作野是北走厥國南馳牙鄉青帝太昊之遺墟白衣尚書之舊里也土俗古逺風流清高賢良間生掩映天下地博厚川踈明漢則名王分茅魏則天人列土所以代變豪侈家傳文章君子以才雄自高小人以集作則鄙樸難理况其城池爽塏邑屋豊潤香閣倚日凌丹霄而欲飛石橋横波驚彩虹而不去其雄麗映比有如此焉故萬商徃來四海綿歴實泉貨之囊籥為英髦之咽喉故資大賢以主東道製我羙錦不易其人今鄉二十六户一萬三千三百一十七集作七十一帝擇明徳以賀公宰之公温恭克修儼碩有立季野備四時之氣士元紆集作非百里之才撥煩彌閒剖劇無滯鏑百發克破於楊葉刀一鼔必合於桑林寛猛相須集作濟韋弦適中一之嵗肅而教之二之嵗惠而安之三之嵗富而樂之然後青衿向訓黄髮履禮耒耜就役農無逰手之夫機杼集作杼軸和鳴織集作機罕嚬蛾之女物不知化陶然自春權豪鋤縱暴之心黠吏返淳和之性行者譲於道路任者昇其集作併於輕重扶老攜㓜尊尊親親千數集作載百年再復魯道非神明慱逹孰能與於此乎白探竒東䝉竊聽輿誦集作論輙記於壁垂之將來俾後賢之操刀知賀公之絶跡者也安陽縣令㕔壁記李華令長之位詳於漢官土地之宜列於禹貢談者備矣而詞人略焉則此官之職守此境之風俗可知也國朝之有天下淇漳之間於京師為近守宰之寄於元元最親故授署此官延至王庭曲蒙睿渥制令褒賜與内官同法清貫徃徃超拜天寳以來東北隅節度位冠諸侯按數軍鉦鼓兼本道連帥以河北貢篚征稅半乎九州邉於山戎嵗備勍㓂毎置長吏朝廷特難之或操尚虧渝或中丞遷換或流亡未復或委罪刑書繇是使臣慎簡其人宻表陳請鍾恩光於異土萃人物於東州不然何公方振羽青雲胡為而在此堂也公以徳行文章為人倫羡慕清而一作自是道藝隣於昔賢自登封主簿撫有兹邑以西門沉巫為不仁仲康解綬為有斷約一作酌古中道為今令圗下車無何休聞四塞他疆之人父母之居尸祝之則境内之歡可以心見君子哉至若由身立政謀近及逺邑人趨拜静聞堂上之琴軍師徃來潛預幕中之畫所利者大豈惟安陽夫然則繁纓曲縣衷甸四牡出左傳人所願也於公宜之記事者志盛徳而旌善人今特書公何尊王命其春秋之義歟天寳十載記臨湍縣令㕔壁記鄧為天下扄闥两都南蔽秦漢以來多封將相姻戚故其人益豪彊内全邑曰南陽曰穣曰臨湍盖古新城也穣州府所理吏不暇息南陽領户既寡姦俠所歸惟臨湍境清人閒從仕者所樂開元裂此鄉三千户為菊潭縣天寳至徳之間狂虜南侵南陽為戰地地荒人散千里無煙猶以郵置之衝徃復王命權置官吏招集疲人如寒加裘如餒併食聖朝臨下有赫哀撫兆人誅元兇清天下詔方鎮選良吏平昌孟威一作或字承顔自左驍位兵曹叅軍本道節度使表為此縣始至户不盈百為政七月盡室而歸者千餘家難矣哉古之為政者先諸人後諸身先其人則人不勞後其身則身自逸承顔勤恤老㓜而休息之損有餘補不足而煦育之人諭其心則不勞而理矣古之來者一作求士古之者觀諸其家知乃為政承顔奉版輿冐虜塵北越鞏洛歸家於漢上又以清白之禄為甘㫖之資臣子之道卓然則其餘可知也令長品秩章綬人皆知之故不書今所書議一作儀能也寳應二年七月甲辰左補闕李華記饒陽縣令􅈦壁記喬潭千里之外設方伯帥其屬屬有長今之縣尹焉故縣之庶富尹以賢傑不可冗而庸也一作不可一日而塞也自齊桓九合制我饒陽歴戰國以還遂羙其城邑西邇全趙東拒河間燕之南郊冀之北土其有吕尚之遺風乎多竒士好帯劔侈服多佳人善彈弦跕躧其地虜口近擊柝之虞其川滹沲有泛舟之役廣輪七十里編户二萬計行或擊轂市或駕肩日中竒贏雜弊為窳機女狹其幅利染工多其姦色業不可廢訟由是興非夫寛猛以濟之則不能用又宵人課居異政固亦明已我茂宰裴公河汾鼎族公卿門子識經之文緯之教一有纔字設而耆㓜歸心刑一有不字施而權豪斂跡恵行為膏雨令岀為清風君子謂裴公於是乎一有君子二字其高蹈近宻翰飛清㝠未可涯也余味之乆矣豈縣公能事而屋壁不書召彼故老詢於前政莫知其數逺者一作矣闕如權輿先天置郡之後凡名士改轉列於左編庶㡬將來亦克用勸漢源縣令㕔壁記于邵周克殷列爵惟五實分子男之位洎秦漢以降或令或長雖小有差其揆一也皆銅印墨綬秩六百石非理道之君愛人如子則不能為官擇人矣國家坐進此道至於憂勤爰増六秩以勸賢者皇帝觀兵朔方之嵗始上禄縣更名漢源將復禹舊績以從人欲其山川形勢土地風俗近鎬千里華風不間多乎哉盖小國以聚大國之義也且夫南呀蜀郡東豁雍畤西走連磧北逾大漢四郊憧憧者於是乎終焉故有獄市之煩供億之費上咨郡府下用臨恤非貞固不足以幹事非亷慎不足以率人清净則可乎不擾忠恕則可乎求瘼時謂京兆韋子當公府之選推而有之至於今人易受賜邑則一作用稱理聞之見之政叅乎前從事雖疲於改易用舉自多於頴脫我則無貳不其難乎嗟乎絆驥已乆及𤓰將代顧此屋壁何其寥寂前芳無聞後進奚覩記者史家之流也亦所以發揮㕔事啓廸人物又知韋公授受之始其或繼之者從而記之前後相映光采洽人乾元三年孟夏之日記開元中有柴希言自溢一作釡陽縣尉拜以清白名聞遷洛水縣令天寳中有郭瞻自永康縣尉拜甚有能事秩滿逰河朔遇亂未知所適至徳中有郭伯陽自某官拜恂恂如也遷洋州司馬其餘日月某一作其通名氏失之不得次於公之列耳呉縣令㕔壁記梁肅在春秋列國各有屬邑其主者魯謂之宰楚謂之尹普謂之大夫秦時天下始置令長宅一同之内操賞罰之柄有民人焉有社稷焉風俗成集作嘉敗本乎身黎元安否繫乎政其體大矣自京口南被於淛河望縣十數而呉為大國家當上元之際中夏多難衣冠南避寓於集作於兹土叅編户之一由是人俗舛雜號為難治加以州將有握兵按部之重邑居當水陸交馳之㑹承上撫下之勤征賦郵傳之繁百倍他縣夥乎其中不可勝紀大厯十一年天官精選可以長民者於是范陽盧公由太源府祁縣令為之公外寛内明敬事而信政本於仁飾身以文下車三年闔境之人安土樂義而不知安樂之所從來盖和平也三字集作平之以和也士君子立身論道之通塞不論位之升降呉縣下一作與非畿服一等公俯而為之抑選部為官擇人而公履道從政所由然也予知公者敢集作輙録其實書于東序以播其令聞集作問時十四年二月甲子記文苑英華巻八百四
