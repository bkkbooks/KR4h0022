body:
  text: 文苑英華卷九宋李昉等編天象九泰階六符賦三首北斗賦一首二氣合景星賦二首天晴景星見賦三首景星見賦一首泰階六符賦以元亨利貞為韻錢起考星象之躔次探瑞氣之奧源得泰階於前史總六符以為言既出沒以候君德又熒煌以麗乾元玄德升聞慶一人而祥發白雲夜卷映九霄而色繁爾其祥德而發觀瑞而明德正則正俗平則平何君王之播理俾品物以咸亨股肱掩于稷契輔翌賢於阿衡人迹其卑慿至誠而上感天象守默因列宿而下呈配兩曜以齊美非衆宿之敢爭豈比夫聚彼德星潁上賢人所感托於箕尾巖間傅説之精而已哉故符之燦兮有明義符之爛兮有深意其形昭晰其理奧祕朝發於天而應於地向夜月而滅沒拂曙光而蒼翠上通其象分三台而為六下應於人感一德之不二皆英主之所有匪常君之能致原其所出將表上帝之心考其所歸實惟天子之利爾其臨大國懸太清德之所感符乃無情既依高以託質亦以數而為名與物無競避太陽之光色相時而作表明王之利貞火映玄天似燭龍之銜吐珠沉漢水無巨蚌之虧盈豈光輝之足異亦感應之可驚忝觀光於上國仰霄漢以屏營第二同前韻婁玄頴倬彼垂象悠哉混元列泰階而有曜應洪化而無言歷歷映天連光於維斗昭昭初月接影於軒轅總而言之三台之號攸著詳而察也六符之驗斯存聖人有以仰觀於變其教彌敦今上握符正位出震居尊宫壼肅穆巖廊政分奉其三無庶欽崇乎道德致其五至洵光被乎乾坤此上台所以曜而不昏也若乃山川降精卜夢斯并野無遺彥朝滿羣英稷契夔龍謀謨乎三署龔黃卓魯鎮撫於百城上下以之和睦品物以之咸亨此中台所以炯然而明矣夫其羣氓是賴一藝必精農無事而狎野仕有祿而代耕康衢之童久間於歌詠擊壤之老無謝於生成此下台所以皎爾而晶矣故能通燭寰瀛交泰天地信景鑠兮物有序降休徴兮靈必至曷比夫兩曜合璧作祥瑞之一端五星連珠為太平之一致况其照耀熠熠其精純粹分輝既象於六爻比影復侔於三事盛其德而高其色通乎微而洞其祕大易所謂自天祐之吉無不利者也乃作歌曰君臣穆兮純化清玉衡正兮泰階平嘉厯數兮無極配乾坤兮永貞第三同前韻房寬天垂象其徒實繁聖作則克叶元元故六符之效祉同五星之可言匪侵名於傅説不奪彩於軒轅有道則見熲然以明示萬物之咸若表三階之砥平歷歷珠貫煌煌辨橫高以視卑八表仰其不忒低而能燭四海恱其光榮昔昧者謂前王之淫縱今明者彰我后之元亨既歸仁於垂拱亦叶政於阿衡寧不以燮理詣極耿光莫京麴糵以之作醴鹽梅於是調羮近取諸身長乎庶類率土雖廣至德遐備救旱則霖雨為先濟川則舟楫是利不然者奚得與南極而齊出拱北辰而為次跂彼無報既織女之多慙晥爾服箱知牽牛之增愧繼東井之應福何潁川之足懿事契其誠萬邦以貞亦既啓瑞終然永清且逢時而不隱猶牧謙而作程每避日以照曜孰與月而爭晶順秋冬以回斡隨河漢以低傾寧直降龍駟之特稟應仙郎之美名信可久而可大等無臭而無聲謬窺管以體物幸芻蕘之見并北斗賦以成象在天維北有斗為韻崔損倬垂象以昭回惟帝居之曰斗壯魁台以立極建衡杓而為首齊七政而均序五行臨四海而橫制九有所以附乾樞壓坤紐携龍枕參左槍右棓總列宿而環衛中宫體羣臣而輔弼元后範圍六合紀綱四維其道不昧其照無私若乃銅渾作式未央取則其變可考其動可測履端於始當獻嵗以指南舉正於中在隂方而主北觀夫峥嶸纚聮若綴若懸氷散珠圓乍似拔長劍而倚天揭西柄以戒滿拱北辰而處偏乘三台而斡運齊七曜而回旋酌天地之心豈酒漿之可挹分寒暑之氣較鈞石而罔愆躔次靡失厯數斯在晝其隱也不爭曜於太陽昏必見焉能藏暉於真宰照萬國兮猶魚從網宗百川兮比朝於海參差北斗闌干太清環帝座之焜耀薄河漢之縱橫不應豐以中見每居次而自明總五緯于天統行四時而嵗成非止雄橋梁於巴蜀壯都邑於咸京而已於是萬人攸仰萬物取象實星之長二氣合景星賦以其狀無常出有道之國為韻裴度星麗天中君居人上觀星文之高朗見君德之洪暢矧乎景以為君氣之可望徒亘其二方之色靡知其千變之狀故隱不可思見無與期必潛拱而玄感乃粲然而著之諒精誠之盡逹若影響而相追且夫浩浩隂隲昭昭元吉匪乘運而生將俟時而出方今統三才而不爽叶一德而無失所以列其數而惟三等其色而如一既參差而比相亦錯落而為質非煙非霧相羃䍥以氤氲散彩耀芒逺精明而成實懿其燭彼天衢同日月之列於三無瑞我元首旌號令之敷於九有不然何以渾青赤之悠揚掩斗牛之熒煌或助月於晦朔或偶聖而昭彰昔在周公之攝贊幼主周武之肆伐大商皆立功而本政亦效祉而垂光未若明庭而治國無事而降康斯時也豈虛其應斯瑞也則惟其常是以瑩霏微之中形璀璨之色仰嘉氣之來輝煥喻他方之歸道德陋虞舜之近加於房小唐堯之才出於翼瞻之踴躍如北面之事一人照之清明若南向之觀萬國豈同乎嘒彼躔次行諸嵗時昏在昴中示春物之將蠢爾申為斗建兆秋風之欲凄其雖窮運數於晷刻未甄邦國之清夷窅綿邈兮玄造在休徴兮載考何燁煜於重霄信恢宏於治道手抃目駭兮載賡歌於大寶第二同前韻國家握乾符定天保禮樂修而叶德星辰行而軌道是以南方之氣共列色於少陽北斗之靈乃垂衣於玄造是時玉燭調律攝提司方巽為發生我則青而呈瑞離為正位我則赤而啓祥其數也合三才而列曜其色也表一德而中黃雖感而匪逺亦見不于常所以合天地之貞觀明教化之昭彰應朱鳥之精生而垂翼躔踆烏之道出則加房觀其氤氲映空光明在上乍元氣之肇分若連珠之逺狀是以覩天道因德而祐符我皇乘土而王乃知惟天為大惟聖則之聖觀象以立極天應聖而無私故星合度於三統氣不姦於四時者也若乃鎮之所加嵗之所守則合氣而出有精淪五老台坼六符則乘氣而入無豈惟繫隱見於虛實定躔舍之徐疾瞻寶玉而非獨衝斗俾滂沱而徒云離畢所以掩萬代而莫類超百祥而獨出不然者何以表至化之文明見玄象之隂隲於是天子占太史命有司諒修德而無怠在降福而不遲是必隱於凶孽是必耀於孝思嗚呼後代不敬曷其太史退乃書曰于時君臣同德蠻夷率職道合上帝信孚下國於是二氣正而叶和三星黃而合色承清問而載言俾洪裔而作則天晴景星見賦以有道之邦德星昭見為韻夏方慶煥彼景星麗于蒼昊其隱也隂魄晦而氛霧作其見也夜景明而欃槍掃敷大信以何言抑殊祥而是考所以叶天經符帝道既表應而無欺亦照臨而不私祚聖而德斯至矣懸象而人皆仰之向晦且殊於中見在天寧比乎明夷垂至精而契至理宏蕩蕩而播巍巍不然出房孰稱乎舜德居翼何貴乎堯時今我皇齊七政以作則奉三無以御極上天降祥景星昭德固云其道不逺孰謂其神不測晦明始見助皇化之惟明動息靡常類乾健而不息應陽精乃三其數彰土德乃黃其色既不孤而有鄰信元吉而柔克時也雲斂遙素天澄逺青纎塵不起微露斯零掩映孤月乘陵衆星回燭北辰似將朝乎帝座傍窺南極疑欲覲乎天庭激高風以熠熠耿斜漢之熒熒青赤以辨其方合散以通其變連二氣而初吐混三光而乍見否泰之運式孚天地之心可見景星之瑞也曷與為雙俾具瞻於萬邦景星之德也配乎悠久粲熒煌於九有于以贊高明于以示休咎察無聲之載非我何知彰有道之邦非我何守不私其用胡繼明於月晦之時克保其謙故騰輝於日入之後是時天鑒匪遙德聲孔昭煥赫綿古光揚聖朝豈徒並連珠而邁同色流碧落而耀青霄第二同前韻陶拱我皇以化洽四夷德應昌期能使嘉祥昭於國典景星耀於天維豈徒呈光芒而出矣遇精彩而見之于時玄穹正清白日初匿爛景星之效質絢佳氣以競色起青方者縈瑞彩以蔥蘢發赤位者統祥光而翕赩比懷珠而其狀匪異等抱珥而其儀不忒懿吐黃以爭光矧聚三而表德莫不熒煌於碧漢焜耀於青霄照下土而乍朗掩繁星而自昭或半虧其形類蟾魄而當晦朔或中虛其狀疑金環之在泬寥故得為帝王之美作祥符之首信歷代之罕見既今辰而方有稽往牒之隱見驗前經之休咎則天下和平域中殷阜佐朗月而其色惟盛臨安邦而其美不朽所以呈祥帝室效祉天庭表我皇之道泰彰我君之德馨豈比夫漢代稱竒空聞乎再中之日堯年紀異徒傳乎入昴之星而已乎則知天贊巨唐神依至道必著明於玄象實垂曜於蒼昊叶妙理於上德表鴻休於大造不然者何為效靈莫匹具美無雙駭逺目於千里播英聲於萬邦是以綏厥黎庶垂諸史傳德匪星而不著星匪德而莫見蓋應運於英精亦叶時之靈變雖云瑞之衆祥之多未可比兹星之獨擅第三同前韻李子蘭君德惟馨天文效靈於是廓氛霧掃青冥發彼嘉氣浮兹景星南有光而霞赤東有色而煙青合彼氣之郁郁渾此色之冥冥昭然在天明乎有德仰其狀而可嘉究其靈而莫測君有至道不間玄以韜光時無纎埃必在天而發色或出或處念兹在兹占莫知其常度出必應乎盛時所以當今夕而彰矣向青霄而仰之乘乎方色遵彼天逵泰階正其位五星守其維然後見兹星之昭燭經彼天以逶迤晴空寥寥列星炫炫紛乎二氣始若煙而非煙炯彼羣星初乍隱而乍見並我質之惟黃總彼氣而成絢霏微類干吕之雲輝赫如繞樞之電星氣合會光華動搖二氣之色交至三星之狀孔昭曭朗惟明疑沐其雲露光芒振曜若擊夫天飇明麗太極遐映青昊呈貺遙對乎三台效祥何慙於五老克表王德信由玄造在翼常瑞於堯年居房永叶乎舜道載美往牒今祥我邦觀兹瑞之尤異知景福之攸降當其次天關歷牛斗既應道而昭格豈越度於前後出無常處向樂土以是臨仰之彌髙登靈臺而可偶是知景星之為德也必得瑞一時光九有乃傳芳而永久景星見賦以垂象含輝有道則見為韻皇天有知明命不疑既何言而守默亦懸象而髙垂彼星之見者下符睿哲上麗圓規將旌德之治亂必審時而推移故行藏克叶乎道盈縮不失其宜於是稽其義觀其象色煥炳光炯晃挂青漢粲粲其輝連白榆歷歷其狀天以祚聖垂玄精而臨下聖以應天慿至誠而感上覩其貌美天文之昭昭原其本知王道之蕩蕩蓋以瑞本斯表祥光是含五緯知讓七紀懷慙與時俱明兮皇化齊美將聖共出兮玄德相參豈同夫入蜀而使臣應其二在戶而詩人詠其三徒觀其象高而逺質明而微如曙燈之欲滅若秋螢之不飛夜則出焉麗乾元以發彩晝而隱也讓太陽而藏輝不然則安知國家無為無事垂拱垂衣乎我唐至德可久立功不朽澤及四海化被九有繄彼景星契我元首俾千品萬類仰而知其太平四夷八蠻瞻而慕乎聖后若然則其驗可徴其事可考伊星之叶聖如風之偃草其靈也在乎或出或處其應也彰乎有道無道彼漢祖之聚五星唐堯之感五老未若帝命是錫生靈載造天祿無疆鴻業永保者也原夫莫大匪天莫明匪德天也惟德是輔德也惟天是則是以垂一星而呈萬國其明孔彰其儀不忒至若雲開天碧昭然可覿炳如金粟燦若銀礫煌煌其明爛爛其色九霄靜而載揚光芒千里望而不違咫尺客有觀天文察時變惟景星之所在信有道而則見美盛德之形容懷斯文而願薦文苑英華卷九
