body:
  text: 文苑英華卷八百五十一宋李昉等編釋二益州德陽縣善寂寺碑一首梓州通泉縣普惠寺碑一首梓州郪縣兜率寺浮圖碑一首益州德陽縣善寂寺碑若夫玉繩髙曜分寶厯於皇階金榜洞開導璸暉於帝幄雖復蒼梧北望湖亞疑盈舜后之歌緑荇西浮江漢積文妃之頌未有激揚煩蔭栖妙果於香城揮發蓋纒樹冥基於淨域則紫房丹室猶居燬室之間朱紱瑶筐未出塵籠之際我國家鳯翔元氣駕黃幄而層飛龍躍太虛絶蒼根而止傃文皇帝以八才御歷光升代野之榮文德后以十亂乘時恭贊塗山之業握仁王之寶鏡日月重光驅梵帝之金輪雷霆靜祲涅槃甘露承眷而宵流般若靈音雜祥以晝引蛟臺蜃閣俄交震旦之墟月面星毫坐照毗邪之國善寂者蓋舊寺之餘趾梁武帝之所建也爾其碧雞仙宇分絶障於金堤石兔遙源控長江於玉峽封畿四會龍垌舍衛之壇里閈三分鹿野徑行之地洎蒼鵝上擊銅馬交馳祗園興版蕩之悲沙界積淪胥之痛火炎崑嶽髙臺與鴈塔俱平水浸天街曲岸與猴池共盡山川隱嶙空傳鷲嶺之基灌漭疑作莾蕭條非復鶯林之樹武德伊始君子道亨正皇極而撫寰中登太階而臨天下函關雲物更逄真聖之期井絡星辰重集會昌之運雖開基撥亂獄訟知歸而繼絶興亡經綸未暇先皇帝統業貞觀仰疑宸奉文物於三天布聲名於十地參羅上下充槖籥於襟懷八部神祗薦圖書於掌握皇寶降地花升含生無昏墊之虞法衆有來蘇之望俄而往疑庭搆癘椒房穆卜六宫震恐三靈愕眙馳瑶展幣有聲於羣宗碧劑元針無徴於衆術帝乃降監廽慮屏璧與圭追勝迹於靈關事良緣於福地爰抒聖綍重啓禪宫峙􅓨利疑作璇剎於將傾鎮一作領銀繩於已絶綵疑作絲綸既洽棟宇行周坤德用寧隂儀載朗於是林衡授矩周官詮揆日之工梓匠揮斤荆客練成風之巧重楹畫栱坐出天霄復樹文閨俯臨電宇顯慶中縣令蕭君道𢎞理鈎繩於日用慿藻繢於天成仙官之妙匠可尋盧舍之神模不墜雕落鶴翥泄珠網於星津繡桷蚪伸吐璿璫於月徑緑房丹鎖彩綴晴霞紫閣青疏光含薄霧春風瓊樹香飄席上之蘭秋水銀塘影數軒中之芰晨光轉卉翻寶宇之龍花溽露低枝蕩真文於具葉天童潤色黃珉碧玉之壇海聖彌縫師子龍王之會建靈幢於厚夜珠飾年深懸法鼓於迷津規模嵗逺時又於佛堂東壁畫二聖僧丹青未畢大啓神光鄰玉塵之崇輝發金龕之實相朱軒夕朗似遊明月之宫紺宇晨融若對流霞之闕由是岷英蜀秀攀講序以雲趨帶燕裙鸞仰齋庭而霧合貪機火阻淨施旁流綺羅分解珮之因軒蓋得捐金之所靈妃翳日捨翠幄於香筵仙客停雲落霓裳於寶地自非沖姿密契景應潛周豈能照義祉於氤氲動元機於肸蠁者也爰有上座𢎞一節並沉研符隱括仁棠疑妙律於神珠肅靈椒於寶印大昊奉楫截若海而橫流風伯扶輪歷邪山而郊駕騰燭龍於惠炬俯鏡重昏奏鳴鳯於天歌下清羣籟摩珍在握遙臨七寶之宫正覺為心俯闢三乘之路湛衝樽於忍地品藻雞園推水抵於言河扶持象化縣令宇文某河南人也帝隋尚書之元孫皇唐侍中之令子爾其虹旗萬里御六氣而鵬翻霜戟千羣擁三州而鶚視帝葉皇枝之重對越乾坤金縢石匱之功光華宇宙公上流提慶中和育祉見鍾鼎於南鄰奉軒寰於北闕雲姿月步下瑶澤而追風雪羽霞臨歷珠田而矯霧芳蘭公子即以地業髙人幽桂王孫即以琴樽待物敘徽猷於禮樂則爼豆縱橫談賞契於林泉則煙霞咫尺自裁聲百里揆化雙川收武城之故事擇中牟之令典仁風易狎候丹籜於春垌惠化難經佇青鸞於曉墜疑山巨源之逺量嘯傲行藏謝太傅之髙風從容語默縣丞王敬衣簮舊族孝友名家白虹緘抵鵲之光紫電蓄衝牛之氣七年髙秀拂層漢以非遙六月雄圖擊長波而未逺鄉堅等少承榮緒中區勝族門稱東别之標地接西隅之嚮嚴君平之履道盛德家傳秦子整之談天風流代襲咸以為妙圖真諦事出於無名翠琰元碑道凝於不朽弇州北跨猶疏騄驥之名文石東區尚勒元龜之頌况乎玉衣流慶事屬於仙幃金屋延祥福纒於梵宇爰求勝筆載記芳謡下官弱植少徒薄遊多暇薜蘿人事空餘江海之心筆札神交尚有淵雲之氣相如謝病訪詩酒於臨卬丘也棲遲聽絃歌於單父羣公以道之存矣思傳記德之書下官以文在兹乎願展當仁之筆其詞曰蜀蒞疑東漸岷山西積月峽星橋勝金孕碧肸蠁靈兆丘墟梵迹鴈塔推基闕肅肅黃運英英文母配乾垂慶儀坤握矩寵照香城仁沾淨土爰光大壯聿求多祚青牛福地白鶴禪林重扄霧敞復殿雲深龕雕翠玉剎樹黃金龜鏡夕照風鐸晨吟蕙樓彌堅化臺出沒棟列長虹忩栖明月果脣周映蓮眸間發雨霽猴池煙生龍窟肅穆禪衆優遊令宰方駕康衢連舟性海鷲嶽增飾雞林潤彩藻繪相尋丹青盡在我今懷矣窮路何長疑承風詠德展義陳詞百年心事千載風期東西南北栖遑幾時梓州通泉縣惠普寺碑若夫元機默運披睿列於三精素鍵潛融肇神功於萬彚則有靈期肸蠁龜龍負河洛之圖帝緒氤氲賢哲舉乾坤之策雖功懸日月終值軌於寰中業靜雲雷未逃規於象外爾其譯雉林之寶偈詮鷲嶺之真圖抽紫玉於禪山朗元珠於智水不生不滅光臨妙物之津無去無來濬發乘時之契仗三明而獨運施洽平分據二諦而同歸功超遂古故能使二千法界向風知袵席之師百億大王聞道失巖廊之貴非什迦之神化其孰能與於此乎既而正法將隱微疑作徵言不嗣應身既沒遺儀間起恆星夜掩西天銜風霧之悲夢日宵成東漢肅壇場之禮由是鹿園曽敞像教旁流宣妙奬於希夷範靈蹤於顯晦瑶龕寶座光華震旦之墟鳳剎霓裳斧藻閻浮之域其寺蓋梁大同年中所建地分彭蜀嶺對岷峨慿廣漢之遺墟籍犍為之舊壤西馳峭崿山連白雉之交東赴東川江走黃牛之峽崇墉却峙之勢庭衢四會勝里九曲之分閭閻萬積危冠祇服參差軒蓋之則露闕畦隱軫亭一作神臯之望是惟先鏡實啓香城煥若神化出紺壇煙屬疏絶閣而三休紫殿雲深徹廽廊而四注重欒復棟霧緝霞張繡桷雕楣鸞伸鶴跂珍臺控景羲和闕練轡之因綺榭裁氛屏翳得停鑣之所連甍積翠交玉鎖於星衢洞户流丹綴金鋪於月竇垂珠網露傍傾漢浦之琛列鐸吟颷上合鈞天之樂固以輪奐之美冠真宰以先鳴雕範之竒告靈基而得雋乃造彌勒下生像一座相好端足姿郎備貞觀末年靈暉繼發房範匝曜疑連不夜之城户牖皆明似出重昏之境自非理參幽贊道叶冥機宣佛鏡於無方演慈燈於已絶豈能寫丹青於實相妙色長存圖銑鋈於真容神光不昧若乃時暄福地低落照於晴暉候肅禪房泛初華於霽景千千寶樹若在雙林一一香仍清八味山暉傃脫枝疑葉序而相鳴野燕迎晨拂花簾而自樂松楹秀蔓曲成蘿薜之衣砌石生蓮直起芙蓉之座則有捨身童子戾止巖扄忍辱仙人來儀澗户都人野彥希梵席而投裾趙美燕餘望齊庭而繼履莫不青鳬委貫俱欣不捨之檀紫具兼眀共化無緣之力故能使雕形畫塔象設年滋彩帙瑶箱龍編月久豈西周之道備南國之風成者乎爰有寺主等覃機色外練迹塵間浴甘露於身田集祥風於性宇栖情不二起初地之權授手大千猶擁彌天之具縣令等或公侯百代元貂列駟之門或文史三冬吐鳯廽鸞之客銅章墨綬任切臨人鐵印黃簮功宣陸漸局一作扄牛烹而待價肆蠖屈以來伸揮鏠九折之隅作鏡雙流之外録事抑元等丹軒紫紱家傳方面之勳驥子魚文地列膏腴之右昔承隋運屢委天書爰自皇初顓流帝禮等賨渝之奉漢類微濮之匡周咸申白馬之盟並受飛龍之託故能遺風罔墜代濟其美望重西南功宣法俗咸以為絃歌小政猶篆德而垂芳鍾􅀢微榮尚銘勳而作鑒况乎神威自在方傳宰匠之功豈可棟宇常存不勒山河之贊爰託幽鄙奉揚微猷敢宣此義而為頌曰天地定位君臣作極道在巖廊功霑寰域尚清皇盻猶歌帝力况我能仁惟神不測誕生迦室利見王城機覃有應業會無生長驅定境振旅魔營恩兼動植勢絶隨迎燕山傾仞鶴林埋景惠日西沉慈波東騁競窺靈相爭參佛影月殿分城雲龕動嶺長江舊域廣漢遺區川分潼峽塞接岷渝閭閻四會亭障威紓爰開寶地實控名都霞牆百雉雲甍四住紫闕尋煙赭樓結霧波流虹起雷奔蠖步網罩星鶉璫栖月兔靈機藻繂禪室安間雕金範玉舉翠浮丹神宫不夜虛室長寒光超有色貺出無端清露花徑飛泉葉户澗緑苔秋山蒼樹古茫茫庶類巍巍淨山鵝鷺同歸華夷共聚第一義諦寥廓法門迹離生滅思舉乾坤情迷則復道在為尊惟名與器萬古長存梓州郪縣兜率寺浮圖碑若夫仙樓白玉窈冥崑閬之墟神闕黃金寂寞蓬瀛之浦斯則岡巒髣佛稽鳯册而空存島嶼慿陵艤龍舟而罕逮至若按皇軒於夏籙考璿構於殷圖周王北洛之宫秦帝南山之閣西京故事不聽雷霆東國餘基俯臨風雨莫不陵遷谷變共榛灌而丘墟火絶煙沉與雲雨而坱芥其有據坤闕之寶位借神道之宜扶占象緯而圖基揆川原而宅址蜂蠆映月還臨舍衛之城鴈塔尋雲即對𡺸闍之嶺成而不毁者將斯之謂歟兜率者隋開皇中之所建也爾其林泉紏合之勢山川表裏之制抽紫巖而四絶疊丹峰而萬變連溪拒壑所以控引太虛蒸雲駕雨所以蕩泄元氣涪江千仞波潮將旭日爭光都城百雉甍棟與晴霞共色信光造化之竒模盡登臨之妙境元房霧轉抗金樞於桂岊之前紺殿星開栖玉剎於闕花落沼近拂天衣澗葉低隂斜籠寶座宵汀鶴警乘鼓吹而齊鳴曉峽猿清挾霜鍾而赴節若乃巡碧磴歷元階鎖􅑵登疑綵瓊鋪洞照神姿滿月疑臨石鏡之峰衆馥揚煙似對香爐之嶽信可下清人境上配天都為勝地之先鳴執名山之右契者也爰有信弟子某乙等夙祛塵網早植慈根悲梵室之未𢎞悼禪居之猶𥚹以為上棟下宇河圖避風雨之災廣榭崇臺時令著髙眀之宅是以菩提長者競潔雲煙之壇天帝人王爭闢仙宫之塔則知威容下麗群生鮮瞻仰之因材朴重雕黎人有子來之地乃於寺內建浮圖一所某年月日鄉望等兆基𢎞願繼發淨因陵轢中天規模大壯髙列砌架廽浮輊軒直上千尋周廽百步占氣候景神祗叶幽贊之功揆墨端行班倕逞絶群之思收岱宗之杞梓聚崑山之玉石土兼五色金逾百練龍蟠萬栱策屏翳而髙驤鶴矯千楣冠扶搖而獨運重簷藹藹雲將反覆於櫺軒洞宇寥寥風伯栖遑於户牖仙娥去月旅方鏡而忘歸寶婺辭星攀圓璫而未返元甍湛䨴若鵬飛之戾九天丹楹聮騫如鳯翔之據千仞每至韶光照野爽靄晴遙列郊墟於四野開雲氣於千里風恬雨霽煙霧藻天地之容野曠川眀風景挾江山之助則有雕簾繡軸排淨域而停輪寶騎銀鞍指珍臺而聳轡於是披岫幌抵巖扄攀翠椱而三休步元梁而十憩廊軒外厰淑氣長延隂室中開鮮颷自激俯環瀛而極野積蘇非逺出雲漢而髙踐靈槎可記真福地之殊觀香城之巨麗者乎寺主等沉研二諦振耀三眀抵蒼壁於邪山攬元珠於定水挹其流者曲成般若之緣承其風者濬發菩提之願長史河東裴某風神朗潤操履貞勤蕭條江海之心磊砢氷霜之節下岷關而叱馭寄切全都臨蜀野而宣條功深半刺縣令衛元闕河東望族縈髙銅墨任屈絃歌浹辰而風化大行踰月而姦豪屏氣陶潛彭澤自得髙人王吉臨卬仍延重客縣丞胡敬仁三河舊徹疑一代良材提鏌鎁而願割局驊騮而待步江湖秩疑作秋至方懷縱壑之圖海浪風髙未接垂天之翼鄉望等並中和受氣孝友承家才稱江漢之靈地實岷峨之秀或以時良入選擢迹鄉鄰或以逾疑望來儀升名郡縣並沐康衢之化俱承比屋之封瞻彼岸而同歸登春臺而共樂咸以垣墉遽覆猶傳路寢之歌銀鼎俄穹尚勒靈臺之頌况乎崇基奕奕與天地而爭土層構峩峩配山川而永固豈可使宏規在我空存蔽月之基雄筆同時不借凌雲之氣謹聞命矣乃作銘云二象成紀三才定位開剖太虛導引元氣紛紛化迹颷颷聖致行傑趣約歸同葉疑異法王西眷教迹東遊功超道茂義冠儒流丹青既備棟宇旋周梵宫霞積香閣星浮緬想規蓬瀛金臺回起曠瞻崑閬瑶房峻峙壯矣名都神居攸止大哉英服兹峰誕紀金繩對嶺玉榜分岑松扄委鬱桂幌深沉雲龕疑晦煙洞花深重巒霧結復澗泉吟肅肅禪衆遙遙淨境鹿野經文龍宫拂影梵臻金室光來石井峽曉猿清池曛警岷峨舊族江漢英姿爭開法願重峻崇基占雲接廡揆景分墀天人合應幽顯呈期靈思孤出神模獨霧積千楹霞張萬栱玉牖星羅璿璫月擁復榭龍蟠重甍鳯聳峩峩峻岊奕奕崇標雕簾切漢寶綴陵霄深窗閟景洞户流颷銀缸夕映珠鐸晨搖我辭秦隴來遊巴蜀勝地歸心名都憩足甫建鄉縣頻移灰燭聿從良時尋妙躅曠望原陸周流江汜桃李春風芙蓉秋水煙霞四面關山千里他鄉寓目兹焉復幾文苑英華卷八百五十一
