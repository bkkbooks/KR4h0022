body:
  text: 文苑英華巻九十三宋李昉等編人事四妄心賦一首愛而不見賦一首謫九年賦一首性習相近逺賦二首知止賦一首知四十九年非賦二首謙賦一首謙受益賦二首妄心賦員峴始吾有形與憂俱生形是幻器憂為妄情愛業潜結貪心日萌如狂犬之逐塊似飛蛾之赴明舉世役役終身無成慨愚者之未達嗟此志之難遏多賤實而貴名咸棄本而逐末利之所在蹈水火而非懼勢之所存棄仁義而如脱方自以為氣足自負殊不知患其可掇夫生也有涯而智之無巳鵬鷃未足適其分儒墨焉能齊其理世謂之憂我適足以為喜世之所譽我適足以為毁自我心而視物四者未知其孰是借如青樓上路紅粉佳人編貝為齒㸃朱為唇朗如明月之初霽芳若緑條之在春流曼臉而光射動鳴環而態新此必天下之巨艶固當衆族而咸親奚為乎鳥見之望層雲而自逸魚見之入深泉而不出彼醜好之非我吾孰知其所失若乃樂府窮選伶人擅名跳丸劒之揮霍奏金石之鏗鍧復燕趙之稱最信音容之莫京清歌一轉而行雲遏長袖屢舞而流風并實天下之樂事當觸類而含情奚為乎爰居卒夭於鐘皷聾俗不知其韶武嗟愛憎之在物吾孰知其所主嘗以為生者物之可欽死者人之可畏方其髑髏之自得也不異夫南面之至貴謂死之為是生之為非何存没之交戰而彼我之相違嗟乎求馬于肆馬不可以得以猿為心猿亦未之息夫制動者以静吾當反照於𤣥極愛而不見賦丙辰嵗待詔京邑貽舊知作蕭頴士嗟乎或愛之而不見者有之一無之字矣何必周秦異代夷夏殊軌阻嚴城之九重限方舟之一水苟時事之多怨故人遐而室邇闗山起於足下堂上逺乎千里聳專專之目成遽將一作時逝而復止詩人所以思婉孌而搔首賦城隅之有俟吁不得其巳也惟夙昔之良㑹夣佳期於北方叙渤澥一作疑渤海之三山吸流霞之景光含芳詞以况予云惠好之不忘願報一作願服義於永日陪遊宴一作嬉於帝鄉廣莫忽而號二字一作其飄怒鯨波洶而騰張俄驚魂以輟寐問一作間窮髪之茫茫將揭厲以復從駭一作駃風濤之匪量思一作顧投軀以靡吝撫遺體以兢惶晨切切以悽悽一作悽愴夕屏營以彷徨追前歡之俯邇歎此恨之攸一作悠長於是收神返慮澄澹静黙𡨕然就寢兀若無識冀良宵之復遇希舊遊之可即徒有頼一作願兮且未克憂深沉一作沉深兮萃胸臆風兮雨兮思君子兮何極謫九年賦劉禹錫古稱思婦已歴九秋未必有是舉為深愁莫髙者天莫濬者泉推以極數無喻九年伊我之謫至於數極長沙之悲三陪一作倍其時廷尉不調行當跂而天有寒暑閏餘三變朝有考績明幽三見顧堯之民一作明兮亦昬墊而有歎歎息兮徜徉登髙髙兮望蒼蒼突弁之夫我來始黄合抱之木我來猶芒山增昔容水改故坊童者鬱鬱兮涸者洋洋天覆地生蓊兮無傷彼族而居曏之投荒彼軒而遊昨日桁楊信及澤濡俄然一作病復常稽天道與人紀咸一僨而一起去無久而不還棼無久而不理何吾道之一窮兮貫九年而猶爾噫不可得而知庸詎得而悲苟變化之莫及乎一作兮又安用夫肖天地之形為性習相近逺賦以君子之所慎焉為韻白居易噫下自人上達君咸徳以慎立而性由習分習則生常將俾夫善惡區别慎之在始必辨乎是非紏紛原夫性相近者豈不以有教無類其歸於一揆習相逺者豈不以殊途異致乃差於千里昏明波注導為愚智之原邪正岐分開成理亂之軌安得不稽其本謀其始觀所由察所以考成敗而取捨審臧否而行止俾流遁者返迷途於騷人積習者遵要道於君子且夫徳莫徳於老氏乃曰道是從矣聖莫聖於宣尼亦曰非生知之則知徳在脩身將見素而抱朴聖由志學必切問而近思在乎積藝業於黍累慎言行於毫釐故得其門志彌篤兮性彌近矣由其徑習愈精而一作兮道愈逺而其㫖可顯其義可舉勿謂習之近徇迹而相背重阻勿謂性之逺反真而相去㡬許亦猶一源派别隨渾一作混澄而或濁或清一氣脉分任吹喣而為寒為暑是以君子稽古於時習之初辨惑於成性之所然則性者中之和習者外之徇中和思於馴致外徇誡於妄進非所習而習則性傷得所習而習則性順故聖與狂由乎念與罔念福與禍在乎慎與不慎慎之義莫匪乎率道為本見善則一作而遷觀炯誡於既徃審進退於未然故得之則至性大同若水濟水也失之則衆心不等猶面如面焉誠哉習性之説吾將以為教先第二同前韻鄭俞酌人心之善敗惟性習之所分習者物之遷以動為主性者生之質以静為君運情有同於鎔鑄通志亦比夫耕耘或定心以純一或逐境而紏紛故定心者若䟽源而自得逐境者猶理絲而又棼且物之惑人無窮人之徇物無己近之則歸於正性逺之則㓕於天理雖真妄之多端諒御用而由巳至若習於所是則孟母之訓子其居也初闤闠之是隣遂賈鬻而無耻及夫又徙于學徒示以墳史卒能振文行以標名鬱古今而播美豈不以性相近而習之至矣又若效之而非則夀陵之從師其故也等善行之無轍見大道之甚夷及夫邯鄲之學匍匐於兹既所能之未盡終故步而莫追豈不以習相逺而性亦失之固宜人定其情物安其所苟欲遷性習以交喪易賢愚之攸處則捨於巳而效於人學彌得而性彌阻述而莫息亦莫之禦是非乖理而亦徇未若襲慎而委順勿牽外以槩名在執中而克慎欽若奥㫖聞諸古先習之則善道可進守之則至理自全兹義也智所不染愚亦難遷儻中庸之可甄願斯焉而取焉知止賦并序李徳裕古之稱山林之士徃而不能返朝廷之士入而不能出先哲所以趣舍異懐隱顯殊迹蓋兼之者鮮矣今余自春秋至西漢取卿士一作取其卿大夫進能知止退不失正者綴為此賦云觀春秋與漢䇿求知止之大夫魯莫髙於栁惠衛莫貴於􅑔俞呉乃得於延州楚乃尚於於菟雖至聖無軌超然不拘猶歎行藏而一作以與顔稱巻懐一作舒而善蘧則由聖門而進退者得一作豈不勇於知止乎佐一作左漢留侯與道為徒厭華屋而不處思赤松以遊娯清則兩龔美則二疏父子欣以相顧衰老至而歸歟祁祁青衿戴負經書藹藹𤣥冕祖我城隅歎冥鴻之不反一作及皆雪涕以漣如嗟余生之疲病念寄世之湏㬰曾陟一作涉險而知懼痛摧輪之不虞諒難復於玷缺韋𤣥成作詩自著復玷缺之艱難且覃思於𤣥虛聊揮金於餘日乃迴駕於迷途况乎托北阜以為宅應璩書曰南臨洛水北據邙山託崇岫以為宅因茂林以為䕃就東山而結廬左思徙居洛陽城東著經始東山廬詩仲樂一作既得於清曠仲長統論曰欲卜居清曠以樂其志陶豈歎於將蕪其逺眺也則伊水陸渾北繞皇居度雙闕之蒼翠若天漢之逶迂少室東映於原隰鳴臯西對於林閭其近翫也則檻泉流於一壑嘉木盈於萬株逕被芳蓀沚映芙蕖聴求友之鳴禽見自樂之鯈魚徙竒樹於台嶺隱翠葉而垂珠得恠石於震澤聳青岑而韜瑜昔有罷侯種𤓰逃相灌蔬竊比君子亦能荷鋤或引蔓於長坂或導流於清渠放一作傲情人世之外寄跡羲皇之初望夕景於平林眺寒煙於逺一作故墟麏麚逺而騰倚鳬鴈去而相呼酌盈樽以一作而自慰賴鳴琴而不孤懐綺皓而披素巻想瀛洲而觀畫圖何必尚尚子平也遍遊於名嶽蠡長徃於五湖嗟夫世於知止之道若存若無李斯忘於税駕惠子疲於據梧盡生涯以自若何智力之有餘庻收光之未晩期終老以一作於桑榆知四十九年非賦以賢者朂身知非昔歳為韻陸肱徃事多違今來覺非嗟忽度於時景懼將萌於禍機新年當艾服之初方能知過徃嵗比靈蓍之數未省防微試問何人云蘧伯玉以道為喻因言自朂追向者以何及悟平生之不足處身而每在廉謹立志而常齊寵辱故乃追徃日想當年似有失禮疑乎不賢懼愧於三千之内仍思於五十之前雖云時不再來悔無及也所謂過而能改善莫大焉想其悒悒自傷兢兢若厲悲急景以隙過歎芳時而川逝將以防彼終身警夫後世馳心於見善之末託意於思賢之際星霜不駐俄符大衍之籌容貌初移忽及始衰之嵗况復日月逾邁春秋載新懼有乖於君子恐時同於小人前違而欲改安得後患而將遷有因百行惟脩宛見日新其徳三緘乍啓可明言出於身自是一悔幽微全忘矯假方同知過之士亡一作何異惡强之者朝來暮徃故無得而踰焉亂世危邦則可巻而懐也窮其過兮嗟嗟莫追考其數一作年兮七七惟竒豈因利而有改雖委骨而無移異買臣官達之期未然而覺契孔氏命窮之日既至而知由是三省為人勞謙自責駟馬將追而莫遂中心欲悔而何益永示千載非唯半百故余當弱冠之年己知非於曩昔謙賦以滿招損謙受益為韻鑒天道之惡盈將守之以持滿窮易象之明義排溢美於虚誕鑒其體而如卑明其訓而非緩惟徳之柄惟行之管是以賢人君子雖百代而同光聖帝明王歴萬古而相纂然則謙之為義與讓同標苟不由於斯理必災禍而自招是以道映三皇明揚側陋智周萬物詢於芻蕘且聖賢而自貶何凡庻而可驕豈不思行髙則憂毁於衆木秀則懼摧於飈矧夫陽光正中映土圭而將轉隂靈纔滿隨蓂莢以旋銷是故君子覩之以為立身之本名彌彰而彌懼功彌髙而彌損不耀彼而自上不明我而自混徒觀其退藏好閉養智於恬幽而坦坦卑以謙謙一辭而行將耻於躁三揖而進何有於嫌况乎海以卑廣居深山以鎮静可久楚莊懼功茂而終吉晉文耻戰克以無咎嗟凡今誇彼而競進何不覩斯而自守徒欲毁信廢忠謀訐自醜想進徳之明義豈見充於虚受曷如君子稱物平施不生頗僻多者用謙為裒少者用謙為益不求翰音以待問必復厚徳以珍席儻不伐之可嘉庻無媒以託跡謙受益賦以君子立身謙徳之柄為韻呉連叔執勞謙者可以為天下君習撝謙者可以為天下勲在易也有自牧之義於書也有受益之文行巳立身而道自著御人率衆而徳有云在上則騰茂實居下則播令聞亦足以化乎四表而行乎三軍若乃天地之義鬼神之理或禍其滿盈或福其廉耻故執羔鴈而行者得之而益貴秉耒耜之列者得之而易使在臣下之尚然况繼天而為子是以敷之而化行執之而教立被車書之所至霑雨露之所及故能邇無不洽逺無不賔豈不以言出乎口行發乎身求之於巳加之於人者也夫心者難備物者難兼故先王所以戒慎徃哲所以崇謙不然者宣子何以稱賢太伯何以為徳書三讓之䇿文作千古之程式其執謙也必在乎合宜其在卑也亦存乎隨時過之者俯而就矣不至者跂而及之無貽誚於巽牀之義無見刺於相䑕之詩惟木兮從繩則正惟后兮從謙則聖雖不富以其鄰而有助於為政理於身也合仁義之五常理於國也一作兮則文武之二柄冝播美於筆端傳謙徳之雅詠第二同前韻孟翺求百行之規矩考三才於典墳歎撝謙之上徳出雅誥之明文天得之而配地臣得之而輔君昭明茂緒啟迪洪勲匪招益而日益不求聞而自聞謙之伊何慎爾攸止益之伊何介爾蕃祉謙持益兮為輔為車益頼謙兮成綱成紀在寵思辱居終慮始昧之者所謂憸人行之者是稱君子其在炎漢英髦盛集京房辭榮疏廣撝挹挂衣冠以長徃辭闕廷而不入棄人間而逺遊顧君恩而尚及斯謙徳之尤著軼羣賢而獨立降及南山綺季谷口子真逃居避竄逺害全身既逍遥以齊物獨放曠以懐一作為仁斯受益之為用在有聞而足珍固知將欲求益莫如好謙覽孫𢎞之為箴滿而恐撲觀周廟之作誡其難更添若露才而揚巳寧韜光而自勿謂天蓋髙其道正直勿謂神無形恒處幽黙既惡盈而惡滿斯好謙而好徳同形影之相隨在毫釐而靡忒既警既戒念兹在兹慮日月之逝矣當寤寐而求之凡曰儒行如何勿思于嗟謙兮惟道之性能執一以無捨一作私在神明而輔正惟觀鉛素希易象之一謙仰望銓衡歌周官之八柄文苑英華巻九十三
