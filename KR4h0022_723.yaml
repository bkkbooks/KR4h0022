body:
  text: 文苑英華卷七百二十四宋李昉等編餞送七春宵餞盧司馬丈歸澧州序一首送前鳳翔楊司馬赴節度序一首送王司議季友赴洪州序一首送張中丞歸魏博序一首送盧侍御赴恆州使幕序一首送高侍御還鳳翔序一首宴餞嚴判官使還上都序一首送尹判官之江陵序一首送鄭判官之廣州序一首送崔判官赴容州序一首送房判官巡南海序一首送盧判官之梧州鄭判官之昭州序一首送楊兵曹太祝兄弟序一首初冬餞崔司直赴京選集序一首送康兵曹入蜀序一首送韋兵曹赴上都序一首送孟司户赴山南序一首送穆司法赴劍州序二首初夏陸萬年廰送奉化陸長官之任序一首送金壇韋明府序一首送河南王少府還任序一首送陳晉李少府歸上都序一首送家令祁丞序一首春宵餞盧司馬丈歸澧陽序于邵大人承門户之資擢衣冠之秀司武湖上休有令聞移家澧陽吾取道勝蓋內緣世故從所擇焉况端公丈二十年間王事靡盬開物致理洽聞朝廷辟公府而載峩鐡冠鎮方隅而寵授金鉞膺我重寄每懷離别豈不欲往職是惣戎六丈念切在原﨑嶇過嶺亦既至止自冬徂春二龍齊驤黼黻交映出恭入友論者榮之春二月巾車戒僕言首歸路凡我同志猶惜别如此而况端公是日之心乎觀察判官鄭公初筵敘離方繼以夜願留候騎陪盡此歡舉白而衆賔已酣未晞而主人猶請邵上負明聖來二藩隅終沐廕庥忝招座右覩今夕之樂想分岐之恨豈登山臨水而曰送乎送前鳳翔楊司馬赴節度序御史大夫李公擁旌旄領鳳翔尹西控數州之地將戡定叛亂紏逖寮吏未及下車而思其人故司馬之才膺此駿選幕中之畫居然有待公頃佐是藩天蹕在雍戎馬巨計注之有司大東小東無不仰給日承顧問休聲四聞人到于今或受其賜交辟之下得無光乎况宏略泉深碩謀雲蓄材氣自逸禮容必循鴻鵠之舉煙霄可仰在此行也公之友兄銜命在館繡衣持照金玉相鮮不由其門孰見庶美驥足方騁鴒原惜别河橋一分雲岫千里鳳凰潭上刁斗初傳寶雞祠下旌旗不捲以言疑衍此送逺豈如贈言行前鶯花亂我心曲干旄美得賢也二三子取而賦之送王司議季友赴洪州序洪州之為連率也舊矣自幽薊外姦加之以師旅十年之間為巨防焉當閩越奧區扼江關重阻既完且富行者如歸偵往之今大和會故朝廷重於鎮定咨爾宗枝勉移獨坐之權實專方面之寄七州奔走而承命一都風化以在我是以王司議得為副車况加彼數賢為之為理何憂乎杼軸為弊何畏乎冦戎不奔歟然則政由宇下風馳境上上下之交理道彰矣良辰嵗首群公敘離蒼然霜林墜葉為聚别怨既如此嵗窮又如此豈長年之所獨悲抑同人之所增歎邵史官也嵗一無此字職在書法以中丞宣力王室以司議碩畫幕中豫將書之行矣自念送張中丞歸魏博序大河故瀆魏之奧境魏大名也今國家以連帥之重特命右僕射田公以鎮撫焉授方面之寄為諸侯之倡職貢不俟於命錫朝奏必資於佐幕是以張侯有獻嵗之會一之日天子勞勤于次二之日有司行賞以扶疑因題柱之舊榮加專席之新寵風生漢闕價重周行光照帝俞僉允時望且端揆有度材之鑒中司懷匪石之心溫溫恭人表以光大多矣恩逾三接詔復兩河向銅臺之地遙覽上京之春盡柏署追餞粉闈惜别才兼二美識者榮之今襄海無虞人神助道遵我王度樹之風聲有來雍雍信足樂之詩可以羣興而羣公賦之送盧侍御赴恆州使幕序聖朝以上台清河王鴻勳茂績焯見羣后得一作俾兼綰中樞將二十年南征北伐投艱排難則倍之矣是則國有恆嶽以公配之而有土天有上將以公委之而分閫勤則至矣位亦極矣談者為美其誰間然故得高枕安邊苞茅述職出奬忠義入延秀異不逺數千里而得盧君君亦感激知己奔波從事雖立資於時實由昔用譽不家而食盡室以行峨鐡冠而利往陪玉帳以參畫何風雲會合而至是乎初此行也鍾陵有連帥之府落帆江浦上謁告離府公以稟命則同奬王室修好則不間遐方爰遵上公是厚賔介我以雜珮必先餼牽便蕃初筵禮無違者玄氷仲月白鴈南飛大舟橫江信宿千里且務從軍之樂不賦苦寒之行蓋時人義之者多矣僕江西旅人也趨風明庭同等見顧常忝座右之客不賤屏外之員送君此行抑有由也然安得容容操疑作摻子之袪乎送高侍御還鳳翔序高侍御文行忠信士林之秀者也御史大夫崔公大勳既集視人如理高選入幕實佐戎機至於是邦隱若敵國攬轡之後郡邑以清若然者艱難之時事鮮不及矣十一月河氷始堅山葉皆盡冒此寒險屆于漢陽且欣郊迎然後疆事昨又繼燭盡使君之歡今之初筵合舍人之宴入室而喜親狐白當杯而願假豸冠熒煌蠟花可以醉止請贊露晞之賦用慰臨岐之恨爾宴餞嚴判官使還上都序馮翊嚴氏之子曰謨昭宣世葉嗣續未廣能讀古訓雅為新詩有叔度黃中之稱有季野四時之備故清風襲人人得披襟而前蓋所嚮者多矣去年冬鄭司勳奉服嶺之役以掄材官人將子為介以體一而二事則於交廣乎何有今年春將復命奏庸公以便道歸定省尋水之下可歌白華龍駒生庭神仙作尉至是邦也而賀者盈門味道探賾遂亦浹辰以王事期迫不敢怠遑是以元方不得將車而旋嚴尊猶切倚門之望有以然也與司勳有西掖之舊文行忠信君子人歟既與子同事又與子同術不追飛雲霄既將置之州牧盧公敘别於初筵郎中蕭公置酒于翌旦皆飛白縱飲高歌結歡屬天降霖潦九𣲖會同雲帆際天行亦勤矣余羈紲未解處墊溺之地與子言别夫復何聊羣公推以舊老略其敗北俾冠篇首得不謂之牽歟常山公于邵序送尹判官之江陵序文者人之華行者人之實不華無以見本匪實無以要終是以知在格物物格則知至及夫至也何所不集焉尹十五官其集之矣故忠信寶於家貞幹珍於國前年度支創平糴之法典斯南海今春轉運即均輸之便導彼西江豈止度四方經費之用蓋在佐副相尹丞之秩先是太夫人在堂指途於涔陽原隰煌煌潔爾夀觴由此告軷孰不稱慶况高門傳綸詔之榮相宅主公台之兆光啓前列我有憑焉孟夏告朔雲隂四合風雨如晦江濤若崩南颷未回好是行邁老夫沐普恩之宥一作澤承近地之遷鶉之首尾可以交歡言且貺别私其則那一作别邪送鄭判官之廣州序今年夏日月會于鶉火公治分汴東之幕經度邦賦于桂之南議絶乎爭蒸人得以相慶秋九月荐加五府之命自嶺之外一以咨之而中丞包公舉賢任能捐萬里勞思之煩委一都專逹之計我州我庶雖違德實難豫取豫求而受賜猶舊觀察使范陽盧公愴雲天之忽間惜姻好之遐阻置酒高會邈歡纍日誰言醉止必待露晞然後維舟陽江宿設候館逰以舟楫一作以逰以揖欲别不能漲濤湧澐長空不分須外徼以內賦詠蒼梧之白雲所以道與簡會壯逰心逸聚散之分抵疑作我勞如何况公風監恢逹博聞明辨從事貞固守常直道奉緇衣之前慶乘扶搖之上激作人之表豫所望焉昭昭令聞日賀光大矣送崔判官赴容州序服嶺之外列巨防者五而容其一焉自中原多故邑居蕩析始則有長吏茍完之命今年春有詔特命元公都督十二州諸軍事資其庶富而宣乎教化者也夫教之以循化之以仁俾其歸于王而不隔乎荒則書同文車同軌當南北萬數千里而還職焉不其遼哉博陵崔公光膺副車之選秋八月傳次于夀春安豐縣之東亭前臨芍陂渺漫無一作天際雖淮海之內浸藪則多而勝景之中堪逰蓋少故邀留貺别非此而何邵孤奉明恩負纍炎徼邂逅相遇歡戚不同既而前多岐路行有先後日暮猶逺自有窮途之泣木葉微脫更切長年之悲其賦離之什則亞相崔公冠乎首矣群公其次第之送房判官巡南海序兩河稽誅為日舊矣固是迷悖腥聞于天法將汙瀦罪爾無赦是用調發集于東郊瞻上將於五道興王師之十萬千金之費實資經度中之一作之中别有鹽府既博之用不勤於人豈與夫漢武事邊窮兵蜀主以小謀大而較其損益哉則天下怙亂不得不除宇內稱兵不可不滅惣是任者惟我國楨兼御史中丞包公專其事佐衛倉曹房公分其巡公英姿秀發相門流慶以公忠為己任以學行為身文蹈和以全真修睦以合義長途逸翮則未可涯冬十月桂林務要皋一無此字畨禺利往輕楫既具高帆欲張煌煌元公作鎮南海在公為外舅在國為屏臣潘楊佳姻氷玉相映式瞻之地其誰不懷桂管經略觀察使范陽盧公惜雲雨為别悵江山暫間置酒高會徴詩寵行南天不寒四氣爭暑黃柑未摘盧橘又一作未花請因衆芳以動佳興將我府公之厚意也送盧判官之梧州鄭判官之昭州序前人中前一作朝有蕭墻之變王宫不開夫莠尚在我憂未弭都人共駭逺服多虞大唐思汔可之安率土獲將來之祐詔下哀痛恩覃動植天地更張乎範圍日月復次於黃道人既受賜其官爰議其能非其能則我命用隳奪其賜則彼氓何戴授之一作此二者至于勤斯桂管都防禦經略觀察使范陽盧公道千乘之國齊百蠻之化敬事而信視人如傷頃者嶺外諸守除書中絶內無合契之符外闕分憂之寄望吳隱而莫至希士燮以實難是用舉所知延幕客盧與鄭二郡有尤凡官材定論物格知至今之抑與誰曰不然必能發凖的於彀中化陋夷於度內上以奉知己下以拯黎元力行近仁於斯為美何必秉鈞當軸方及於人哉桂林陽亭南越之勝雙旌啓路舉棹茲始諸公惜别宿設戒期雲岫座中煙花雨後愛時景之可共悵高帆之不留遷客于邵書其事送楊兵曹太祝兄弟序天寶中謬掌鉛槧領卿大夫門子出於龍樓以鼓篋為事是時與楊氏兄弟相見于今十年矣曽不以薄劣移意克全乎相知不出樓數年各以才進果行敏德依仁據義焜煌而金玉交映肅穆而風塵不雜入其門森森然是所謂難矣屬中原多故荆棘未剪竄身郊山復與合疇昔之好實獲我心今年春清羌白氐相率為虐震我郡邑毒痡生人而楊公侍親日有憂色擇地以養告别遂行是以二王趙蕭四族偕往懿親密友義切同舟並駕而逸足相追拔茅而彚征斯吉方將導黑水以合漢適樂土而中權豈止奔波雲山悵望岐路而已蓋隨之為義也大矣巴防楚塞猿聲千里東出桐柏南拒荆州三江五湖可以利涉心斷卬否薄送于郊非斯人之為别吾誰為賦矣初冬餞崔司直赴京選集序大官大邑惟賢者主之臨安大邑也而崔公兼領浹年之間輿人致誦雖化更有命居之無何然與人休息行難為繼矣屬太夫人在堂閨門之敬舊家於漢上張仲孝友行思板輿談公維私式歌弄印崩波私沂一作松沂疑作沿泝重阻疊里亦既至止稱歡夀觴前彭州司馬公之元昆所遊有方嘉此良會皆才膺開物刃有餘地從士大夫逰必先曲禮二龍方騁未可量也國有衡鏡人歸品藻十月良月駕言北逰當山公一作令持刈楚之鍔信多士發長鳴之日也以彼前慶續兹高選雖欲勿用其若才何雖古人捧檄在此行也故同人惜離出餞于野逺山四合長空泬寥望青林而不盡看白日而將暮忝座右之末陪難孫之行不腆斯文俾專序别蓋讓之不可遂冠於篇首送康兵曹入蜀序與兵曹公敵惠於今三世矣然則子之大人某當肩隨之日雖中年隔别而榮問不輟一作問不虞康子來陟疑作涉吾境見父之執果於覲親可謂逹也况風骨爽秀機會駿發約之以禮博我以文青雲之姿於是乎見矣以日迫諸冦一作冠非家君在蜀乘間赴覲靡遑底寧曽未信宿駕言于邁以此道别無如之何副相嚴公惣統江劒東西郡邑蓋以百數皆風靡波偃奔走乎大府威名之下誰不心注一作注心且鳥擇高梧人歸如水吾子之往矧有舊乎郊坰之南于以送逺楊栁雖緑我意悲春喬梓有方君心是慶白華之美者故歌而道之幕中有行軍馬公判官張公書記崔公高副時選相期郢匠執子之手幸謝故人送韋兵曹赴上都序韋公顯名三蜀出入東西川垂二十年矣至於是邦必聞其政蓋禮者德之幹利者義之和由之不失其道也噫夫克有具美而抑與之徒淹嵗月未上霄漢俾其知己者慙而已雖多亦奚補於時議哉有以知君子不見而彰義然後取信吾寶也杜陵鄉曲千里而近楚王壇上瞻望仍遙鴈隨陽而昨夜初過木落山而寒霜始白今日何日江干送歸豈無樽酒可以晉餞國家開設會府綜核九流衡懸而不欺輕重論定而必先逺大之子之往求善價而沽諸孚愛惟允將美利而利物夫然則家之肥而國又肥也南山之南日復羈齒時因便風無金玉爾音千里韋生跂豫何及送孟司户赴山南序今之天府急賢為事者多矣然則中丞張公賢而佐之公惣統巴徼蓋郡邑百數皆夙興夜寐奔走乎梁州一方無虞千里坐嘯何冦盜之敢暴不澄清而彌肅所以賢與不肖有别而孟户曹應辟焉非夫學究精微德含光大貞幹克副于公望勤勞可著乎王家豈中丞之與能而幕府之英選能致如此閏四月告軷指途出郊相餞昨夜殘雨朝煙稍霽黃鳥上下緑隂若浮此時送君微我無酒况東郊西郊鼓􅎏猶作征軸之弊又急乎安人勉旃孟侯無以自媚送穆司法赴劔州序二首決曹掾穆侯理行歸于劔十月寒矣艱哉是行休於嘉陵之陽一作隅日與樵牧為伍而吾子言涉江水至於室廬告軷之期不逺千里然則取諸羽翮擊彼風水時之來也鳴可驚人而愛親之道敬養為切安得擇仕而以三語為屈哉東江劔門又足助興地氣初閉河風稍嚴青冥為空黃落向盡感物論别者庶存乎歌詩二人謂穆子通於理者也裒然作掾榮問所致一作歸自一作故字隴之下清風可挹人能盡歡邵真知勉矣頃以令弟仕于劔太夫人就養適乎逺雖迫王事心馳倚閭朝辭府庭夕次郊郭不俟高駕拂衣而南郡公錫類詎敢留心各以壺酒垂楊好隂金秋始交火雲猶赫指日獻夀在原增光送君遂行千萬無盡初夏陸萬年廰送奉化陸長官之任序前人豫籍奉化君之猷甚矣今也何幸辱與萬年君逰而獲展禮焉公有入室之清行有顓門之奧學加之理要飾以藝文三十年中猶宰一邑是何竒偶之所不倫乎先是公由外署嘗攝行此職未拜真而復罷人到于今思之豈彼人之幸猶多而資公之政為理不然奚十年之外復與此合耶况今年吏曹尤難其選天子申明乎詔令宰輔論定乎官材天官卿孜孜於取捨膺此舉也授受者安易為力哉拜恩前殿隨牒上道萬年君軫陟岡之歎愴異縣之違敘離公堂言具旨酒二三親好獻酢有章既敬而兄又恱而弟上友下悌何其韡歟鶉尾之會火雲初飛前春花木是日仍茂感而惜分一作令於是為切夫以卿士大夫之會未嘗不引詩人之興以宣其志萬年君所以進牘抽翰邀文屬辭蓋合斯義將用貺别云耳送金壇韋明府序將理大國若烹小鮮不敢撓之故也况子男之為邑庸可撓乎方今兵薄四海師老十年罄人之耕桑窮人之術數勤以奉中國剪以賜諸軍軍興猶艱國議尚乏非夫表微物外洞鑒人間曷能除其災害拯彼塗炭於戲天官氏得之於韋金壇矣公文以藻身行以勵俗道必孚于損益名可逹於家邦醇粹居中而英華發外且三辟大府連衡者人皆奪容一登廷評獨行者我無愠色樂天知命君子攸難偶爾墮銓序之勞超然在甲科之列一作一豈無清切之地竟迫親人之選飛鳬此去逸驥何施然則其崩角所不容悼心而無告者我實行矣爾何對焉鍾茅之間化可見矣厚地始坼寒山盡空同雲不開積雪增沍楊溝追餞蔣亭愈邈心乎愛矣何日忘之今之送君感别而已送河南王少府還任序王公秀出士林香傳國譽玉立增映金聲自逺故弱冠之後代為文人不四三年而交辟如契豈惟鴻鵠勢在千里自是鳳雛生而五色今大夫當弄印之貴積蒼生之望立程朝端舉正天下少府公晨昏之際戀深獨立爰自東洛逹于上京且因王命得及私覲橋梓之慶實為時榮然則赤縣多務不遑久晉素琴在御匹馬云邁清風霽景隨我佳興又足名也頃忝臺憲出于門闌遂使小子知名敢忘國士之遇心乎愛矣此别何言前郊一葉涼風已半金吹淅瀝淒然欲寒兵部貟外郎王公以從父之仁敦北阮之好猥顧同舍謂余知音相期都門方以送逺才子東矣得無斯文送陳留李少府歸上都序天寶年中以公持刈楚之柄言采其華將祓其俗蓋良馬逐逐在公之伯仲乎忝嘗齊衡永以為好逮茲二紀相逢蜀逰不虞斯來復與前合况惣括六藝又擢一枝青春之年黃綬標映瑩若玉立蹌若鶴跱長空無倪可以直上人之望也今諌議大夫崔公冀國之貴介弟於公為外舅焉以兄弟之子猶子也氷玉不間潘楊載睦始君之來拜乎姻婭由君之美加乎愛矣東林表郗公逺鑒南宫實夫子知賢光昭好逑能以德選自中形外論者休之實沉之會言旋上國蜀多名園載酒交餞雪氷初下同雲始飛寒暄正中跋涉無苦豫亦羈齒久而越吟曷為歸期十月良月方將尋鮑子之舊復田蘇之逰若君行此不勤一作歎卬否尚書兵部郎趙公謀以貺别尚書虞部李公作為新題羣公僉同各以位敘云送家令祁丞序祁丞公表微造理之士也嘗精其思而深於詩警其神而存乎象深於詩者得之於風雅存乎象者受之於丹青非竒峰絶壑則不能運其機非緣情體物則不能動其興機興之作為逹者多之去年八月閩越納貢而吾子實董斯役水陸萬里寒暄浹年三江五湖敻然復逰逺與為别故人何情虞部郎中岑公贈詩一篇情言兼至當時之絶也凡敘所以廣意既先見我又何載言一作馬送君都門舉手千萬文苑英華卷七百二十四
