body:
  text: 文苑英華卷五百九十八宋李昉等編謝詔勑書慰問此卷英華所編失年代先後今正之為留守羣官謝恩詔表一首謝勑書表一首為留守少傅等謝勑書慰勞表一首謝問表一首謝恩慰喻表二首代河南裴尹謝墨勑賜衣物表一首謝詔許濠泗州割屬淮南表一首謝手詔慰撫表一首謝恩存問表一首謝墨詔表二首謝手詔表三首謝潘侍郎到宣慰表一首謝恩宣慰并賜手詔表一首謝手詔許受吐蕃信物表一首謝勑書宣慰表一首謝判官郭彥郎中謝手詔表一首代謝賜批答表一首為留守羣官謝恩詔表顔師古臣某等言守太常少卿崔敦禮至京師俯降神筆曲垂誨奬祗奉欣戴伏深抃躍臣等詳觀史䇿歷選前王損益相承質文遞變遺風餘烈昭然可觀自堯舜之後殷周已降政道蹖雜淳風斯寢干戈日用喪亂宏多悠悠千載莫能澄廓况乎有隋失德區宇分離九鼎鳬飛八紘魚爛圓首方足俱委骸於原野跖實排虛同取斃於凶毒亂極則治命實有歸河清啓期天祚攸底陛下獨運神武援手濡足陶甄庶類屈已忘勞日月之所照臨天地之所覆載皆受更生之賜俱荷裁成之力加以留情庶政昧旦丕顯掃滌煩苛澄清禮樂遠邁開闢之功牢籠帝王之表時和歲稔玉燭遐被嘉祉靈貺金英自臻朱明炎暑聊因多暇暫回鸞蹕巡幸甘泉伏承攝衛攸冝聖躬萬福下情慶幸率土咸賴臣等材質庸陋謬荷超擢俯循薄劣懼不克堪謹當夙夜戰兢自相朂勵竭心罄力以酬鴻造使百僚率職仰副天心四方祗勉俱稱慈澤臣無任謝勑書表許敬宗臣某言奉今月十一日勑伏開瑶檢等鑿竅而覩虹霓戴荷絲言似假翼而騰雲漢臣以愚劣本乏詞情比加衰耄更增才盡年踰郭北滯守周南引領天庭望丹霄而結戀馳魂魏闕懼黃落而長違忽預聞韶方申擊壤之慰詞均鄭璞匪無遼豕之慙精衛御芻豈究靈鼇之境秋螢繼日安測陽羽之升天澤旁濡恩光曲照剪拂錫其容彩吹噓飾其羽毛雕朽為妍竊比鏗一作絲金之響涸鱗霑潤縱游陸海之深不勝抃躍之至謹附右崇衛副率賀拔儼奉表陳謝以聞謹言為劉少傅等謝勑書慰勞表楊炯臣某等言司馬郎中王知敬至伏奉今月日手詔璿璣下照覩天象之三光玉檢前開見河洛之八卦發揮圭璧感召風雲不知手之舞之足之蹈之者也臣等稽之天地名山闢長男之宫步之日星樂府奏重光之典疑作曲二王所以立教者天子為先萬國所以稱貞者元良是寄伏惟天皇御中道踐平陛對揚文武之休命紹伏古先一作先王之大業洛京朝市義叶於省方秦地山河事資於監守皇太子一物三善四方繼明孝以承親顯於直地之路明以照下驗於長壽之術虔奉絲綸躬親政事德刑詳矣既遠安而邇肅博愛先之亦途歌而里詠固以禮成恭敬道洽溫文知寶厯之無疆信蒼生之幸甚臣等竊循愚蔽謬荷恩私或位聨輔弼職在台衡希少陽之末光自韜螢火洽重海之餘潤色疑息牛涔不謂殊奬曲覃真文俯及載之眉首奉以周旋聽葛天氏之歌方慙此慶聞有虞氏之石未均斯喜但知懷璧之罪不可越鄉豈敢貪天之功以為已力傾誠每積候朱鳥於南宫拜德無因限蒼龍於左闕臣無任謝問表張說臣說言內給事髙力士至伏奉墨制集作勑聖慈綢繆言及舊昔拜舞捧讀且驚且喜集作且喜且慙臣聞漢主眷驂乘之臣魏君憶同遊之客誠以故舊不棄而光隂易往今之聖情實過於昔臣曩蒙侍文北閣倍宴東堂庭闕一遙寒暄二載不意逢春之草承清集作湛露之惠渥容光之隙引遲日之暉華無任荷恩戀主之至謹附髙力士奉表陳謝以聞謝恩慰喻表李雍臣某言伏奉今年某月日恩㫖恕臣重責護臣小才日月之明早曜絲髮雷雨之施振起昆蟲臣某中謝臣二十餘年數從遠謫流離辛苦契闊死生因陛下興聖謀行天討救萬人之命解四海之懸臣所以脫於往危保於今泰者為此頃歲昌宗執柄三思弄權臣與宋璟同論桓敬俱奏貶臣為常李雍傳作富州司戶實荷陛下誅韋氏之後收正人之餘特拜臣左臺侍御史此陛下活臣之命貸臣之榮一也頃歲譙王重福謀立東都臣當留臺與洛州司戶日知傳作馬崔日知挫其逆形收其餘孽東都底定知臣之功自文林郎拜朝散大夫除戶部員外郎岑曦崔湜之輩以臣再用往還并忌崔隱甫倪若水等恐為陛下之助與臣同制各貶官仍聨翩左遷為崖州舍城縣丞及陛下正位紫宸臣又自嶺南九品遠惡官除朝散大夫戶部郎中又荷陛下活臣之命貸臣之榮二也頃嵗陛下東封將還臣路左謁見猥承聖顧廣録舊文朝議恐陛下用臣薛自勤與外生庫狄履溫羅織臣至死仍承陛下免其罪授臣官又荷陛下活臣之命貸臣之榮三也臣出入嶺南自經一紀自灃州司馬加朝散大夫兼此州牧解青綬埀彤襜去瘴毒之艱遂江山之性又荷陛下活臣之命貸臣之榮四也且臣遠覽前書頗聞故事一食之惠尚可殺身况臣蒙聖主千年之恩救愚臣萬死之急至若訓誨委積率喻再三蚊力負山不勝其重螢火向日徒失其晶必當閉戶絶交澄心去欲下以安所部上以報所天豈徒殞軀喪元焚妻夷族而已無任生死肉骨恐懼感戴之至同前崔沔臣某言伏奉某月日勑書慰問跪捧抃躍不勝感戴臣某中謝臣東鄙孤賤名節未立比州述職績用無聞誠愧王尊傾河羡溢德慙吕望恆雨霖霪加以擅散國儲輒違常憲權稽兵賦不㑹嚴程雖事切憂人而跡冒平法鞠躬夕惕側足屏營伏待刑書豈期恩命陛下明逾日月施重丘山察求瘼之心弛慢公之責紫泥加命降自雲霄𤣥澤殊私旁霑草木振窮之際散發廩之深愆拯溺之辰矜泛舟之小惠恤下諸吏咸知向方徒殺征夫卒獲寧止猥承天造安敢名言徒誓微軀何能答效臣某限以守職不獲蹈舞闕庭無任代河南裴尹謝墨勑賜衣物表臣某言今月日進瓷器官某郎行河南尹鞏縣主簿蔣清還伏奉墨制仍賜臣衣一副瑞錦一端恩垂北闕榮照東園捧戴殊私載兢載惕臣某中謝伏惟開元天寶聖文神武應道皇帝陛下兼上聖之姿運大明之照雨露萬國陶甄百靈履無為而撫域中躬自然而化天下猶復勤勞睿念祗奉宗祧以億兆為心慈儉為寶臣曲延休盻叨據天官上報無階致身惟谷任土修貢臣子率由之禮自天降祐君父非常之恩宸翰昭回聖慈稠疊寧期水土之淺上簡乾坤之心天下幸甚復淳風於大古小儉德於前王特垂懸象之明俯賜名臣之服恩銘骨髓澤被宗門不勝慶幸且重錦之賜取貴春秋解衣之賞見髙漢代服以宫中之製耀其機上之文潢潦獻微邱山報重又臣所進新米特奉手詔更聞豐歲知萬國之至和式潔秋嘗明一人之孝理無任手足蹈舞之至謝詔許濠泗兩州割屬淮南表代相公劉禹錫臣某言伏奉十一月二十九日詔書其濠泗兩州令依前收管臣謬承寵光作鎮淮海位均九伯權揔十連內省無堪常恐不逮豈謂恩私曲被封略有加慙無報政之勤重受分憂之寄伏以兵戎方息閭里未安謹當奉宣皇風慰彼黔首且責成於牧宰期不失於澄清伏惟聖明俯賜照集作昭鑒臣無任謝手詔慰撫表臣某言臣監軍使判官劉寄至伏奉勑書手詔兼奉宣口勑奏事官王穆廽又奉尺書手詔兼宣口勑并慰撫問臣及將士等聖慈稠疊感戴無階臣某中謝臣跡忝總戎力慙致果一昨勵兵秣馬破賊攻城皆承睿略指一作發蹤廟謀制勝豈臣庸妄敢竊勳勞每佳馮異推功見稱良史常惡樂羊求賞翻謝謗書拳拳血誠天實諒只但以孤根獨立衆口易誣銷骨為虞撫心是懼樹楊恐拔非獨一人採葛畏讒信如三月忘寢與食以榮為憂陛下聖聰聽卑宸鍳燭遠天書軫念口詔宣慈特荷知臣之明纍矜報主之效許之純直慰以貞堅北闕之恩謬加倚賴東門之倚又切防虞寵兼腹心澤浸骨髓載欣載躍感戴無階豈惟剪逆梟凶獨申微效實冀粉身灰骨上答殊私臣無任謝恩存問表臣某言王敬仁至奉口勑存問微臣憫其踈遠之悲慰其違離之思臣某中謝臣自今春分司入洛即屬陛下受命承天企揖讓之盛儀隔肅雍之大禮𤣥英匝歲日使懷歸白雲在天闕庭難見豈期廷瓌為寶尚憶他山之石貞明溥臨遠及容光之地仁深行葦眷甚遺簮草木之誠何酬造化無任感恩慕戀之至謝墨詔表臣某言中使陳日華至奉宣聖㫖存問兼賜臣墨詔又以臣所奏羅􅀈及裴靖政理有方今各賜手詔激賞者恩降重霄澤流下土義敦奬勸榮冠等夷臣某中謝臣昨以羅珦裴靖勵精吏理效用著明人感悅安俗致殷阜恐須甄録以勸在官輒獻封章具陳成績伏蒙睿覽集作慈俯亮愚𠂻嘉治行之尤光示絲綸之深㫖守道者益以固志懷慝者由是悛心激俗化人於慈為大臣謬司廉察職在澄清幸遇旌善之時獲免蔽賢之責二臣某言中使陳日華至奉宣聖旨慰勞臣及將佐官吏僧道耆壽百姓等兼賜臣墨詔恩降紫泥澤流下土跪捧自天之命遙傾捧日之心臣某中謝伏以皇帝陛下凝旒穆清軫念黎獻已洽雍熙之化尚存宵旰之勤遠降王人特紆宸翰慰問集作安稠疊曉諭便蕃任重力微不知上答應緣戎旅庶務謹具别狀奏聞伏乞皇明俯賜照鑒無任謝手詔表詔後批云朕自書臣某言中使閻忠信至奉宣聖旨存問兼賜臣手詔拜捧紫泥跪伸金簡承㫖見聖神之略感恩知身命之輕臣某中謝臣素乏異能幸逢昌運猥當旄鉞之寄未靖妖氛榮分台鼎之名何階啓沃竊位斯久速尤是虞豈謂𤣥化曲成鴻私荐及特紆睿思英華作異恩非親灑仙毫降自九天粲然五色初喜麗天之象遠燭輝光旋驚垂露之蹤曲覃霈澤鸞鶴廽集作鸞鳯騫翔而變態煙雲舒卷以呈姿賦彩飛空聳神蕩目恭惟國寶何幸家藏感極涕零莫知上答應緣軍旅庶務謹具别狀奏聞無任屏營之至同前苻載臣某言今月日中使郭忠政至伏奉手詔以臣微疾尚軫聖懷日月私臨於幽一作隂蟲雨露曲霑於旱草感戴所迫若無精魂臣某中謝臣初中風疾狀侯頗劇自蒙聖澤特賜神方酌和劑之冝備甘辛之味曽不信宿已覺痊平伏以聖意纒綿此方神異思慮超古今之表重輕得損益之中故以藥攻病如水灌火且以鴻恩為湯餌何榮衛之不調以造化為岐和何膏肓之不去丘山至重草芥極微報恩之分殺身後已不勝激切危懇之至謹奉表陳謝以聞二臣某言中使某至伏蒙詔旨褒臣政事慰臣疾病并示除改廬州刺史路應等五色絲綸九霄雨露光華潤澤併集微臣捧戴兢惶無地容措臣某中謝臣伏見自淮而南天下重鎮臣叨受旄鉞僅二十年人無夭昏嵗屬豐稔瞻彼疆域小有康寧此皆陛下睿謀鴻化之所被及豈臣薄劣自能致理臣所患風疾自然降損飯食甘適肢體便安此皆陛下神方祕術之所攻療非臣調護所能平愈伏見除改諸州刺史等路應和而明裴靖才而通羅珣斷而達李正臣強而毅陛下或以賞受或以能遷或增之以憲司或擢之以棘寺實所謂宸鑒髙遠睿奬宏深雖虞舜官人之美無以過此臣才非申甫恩重嵩華惟局地以倣徨敢窺天之遠近不勝懇切慺慺之至謹奉表陳謝以聞謝潘侍郎到宣慰表楊於陵臣伏奉八月二十四日勑陛下以江淮旱歉軫慮蒸黎命度支鹽鐵轉運使戶部侍郎兼御史中丞潘孟陽宣諭慰安蠲除疾苦以今月二十九日到臣本州頒賜詔書以示恩化臣及官吏百姓等咸蒙聖慈特加存問爰自城邑達於里閭喜氣浮川歡聲被野臣忝守藩服恭承德音荷戴寵光局蹐無地中謝臣聞天覆無私雖幽必燭人心有係惟聖能通伏惟皇帝陛下德冠君臨澤均子愛一物失所如軫於納隍一人不獲載懷於馭朽敷求至理𢡟建太和明命施行率土欣戴臣實庸瑣叨領方隅奉陛下亭育之仁當海濵旱歉之後人多遷徙賦亦逋縣夙夜憂兢冰炭交戰忽承慈旨特降使臣優貸俯及於藩條勤恤遍加於凋瘵以制國用思致於均平以朂庶官俾甄其課效發號而生靈交暢先春而和氣導迎宇雖廣而煦嫗必周天雖髙而感通一作應寧遠臣幸逢昌運荐沐殊私誓將罄竭駑駘上禆萬一無任激勵踴躍感恩之至謹遣討擊副使曹序奉表陳謝以聞謝恩宣慰并賜手詔表臣某言押領日本國朝貢使廽伏奉宣聖旨并賜臣手詔寵私纍降荷戴難勝臣某中謝伏惟皇帝陛下重光嗣聖𤣥德升聞九有來王萬方率職以日本國使遠獻琛贄畢事旋歸言念梯航之勞厚其行李之費恭承詔旨伏見天慈臣當道發遣素有舊例今則稍加豐備上副懷柔已具别狀分析聞奏臣無任謝手詔許受吐蕃信物表臣某言奏事官戴誠廽伏奉墨勑慰問臣并以臣所進助山陵材木收納訖及吐蕃東道都元帥尚乞悉羅與臣及邵崇政等信物並蒙聖慈許令收領者殊私纍降感抃難勝臣某中謝臣以庸鈍叨膺任寄慿奉聖略藩守疆陲而亭障無虞戎夷獻款每示綏懷之德願輸臣妾之心昆夷喜附於漢疆禮物遺通於邊將陛下以覆載之廣延納是宏假其專受之名外示不疑之禮仰承宏貸俯積兢慙今臣及邵崇政所與廽答信物并凖詔據舊例量事發遣訖其敬國清已牒本鎮令勘待報到續具文奏又蒙宸慈特賜答蕃書本宣威示信體遠懷人俾無飾詐之虞實感曲成之道誓當戮力以俟一時永絶虗名乃臣職分無任感荷屏營之至謝勑書宣慰表臣某言中使馮仙鶴至伏奉手詔兼宣口勑慰撫臣及將士等聖恩曲被戴荷無階臣某中謝臣謬承驅䇿蕩滅凶殘役未踰時恩無曠日九天之上詔下斯須千里而遙威如咫尺示臣攻守之勢朂臣進取之期斷敵用竒皆憑睿略指縱制勝盡出宸衷但當戮力悉心捐軀致命冀申微效仰答鴻私臣無任為判官郭彥郎中謝手詔表臣某言監軍使判官馬某至伏奉勑書奉宣口勑慰撫臣及將士等恩奬殊常寵驚無地臣某中謝臣幸承朝命切佐戎旃無借筯之謀詎申微效有挈瓶之智備守成規戮力彼軍悉心留務雖事皆關白旌斾非遙而職在防虞城池是切豈謂常憂罪戾忽降綸言每驚寵辱特荷恩私聖澤載覃不遺於細物天書忽降曲賜於賤臣手捧紫泥心馳丹闕以欣以抃戴荷無階上答殊恩百生多幸俯慙微命萬死難酬臣無任代裴相公謝賜批答表杜牧臣某言臣伏奉今月日批答令臣冝斷來表不許牢讓者仰承鴻澤跪捧芝緘戰越失圖啓處無地臣某誠惶誠恐頓首頓首臣昨奉制集作詔書付以魁柄自顧斗筲之器朴樕之才乘恩寵時竊棟梁任只合效蔡謨堅卧孔霸懇辭尚猶拜謝天顔進見卿士榮忝既積憂慙集作惶實深是以拜章上陳懇詞自叙冀回聖鑒更擇時賢豈意睿旨重臨綸言再下不令徇志且遣守官大君之成命已行微臣之丹懇不遂誓當戮力盡瘁粉骨捐軀知無不為有集作見死不避冀答君親生成之德用酬乾坤覆載集作育之恩無任感激血誠慙惶戰越之至謹奉陳謝以聞文苑英華卷五百九十八
