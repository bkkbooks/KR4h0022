body:
  text: 文苑英華卷七百十三宋李昉等編詩集二左武衛胄曹許君集序一首裴氏海昏集序一首劉商郎中集序一首盛山十二詩唱和集序一首主客員外郎盧公集序一首董氏武陵集序一首徹上人集序一首因繼集重序一首左武衛胄曹許君集序權德輿建安之後詩教日寢重以齊梁之間君臣相化牽於景物理不勝詞開元天寶已來稍革頽靡存乎風興然趨時逐進此為槖籥紳佩之徒以不能言為恥至吟咏情性取適章句者鮮焉有許氏子者名經邦字某世得命官不書于此如疑作姑舉其始終之略以著于篇君天授純靜不遷於物修檢之中須有夷曠早孤家於鄱陽有佳山水遂以貞遁為心不近聲利孝敬溫信著於州里保間樂退無所撓屈家人近習未嘗見其喜愠之色謀學業文以此為適相國第五公之為郡也軾閭懸榻以禮之咨於連帥薦授試左武衛曹參軍有别墅去家百里秋八月泝溪而上灘激險不幸溺於秋濤之中嗚呼踐儒行而未申其用沾初命而未至於祿受全氣而不終其夀此三者所以為士友之病凡所賦詩皆意與境會疏導情性含寫飛動得之於靜故所趣皆逺其道退其徒寡不交當世故知之者稀惟昌黎韓愈泰山羊滔最為友善羊既物化韓為江西從事今年冬豫役於鍾陵而君去世之三嵗也文行實録皆得之於韓噫嘻士之修道向晦不耀於時以泯沒者可勝道哉如許君者潔身於困約之中講藝於蓬茨之下以六義之文為富以一畝之宫為泰齊人吹竽楚人泣玉故志業內固英華未發介然居易以至歿身其古之牆東谷口之徒與韓以其詩三百篇授豫故類而為集此序云昌黎韓愈友善又云韓為江西從事按愈元和十五年止曽刺袁州時德輿已卒權集亦無此篇恐誤裴氏海昏集序吕溫海昏集者有唐文行之臣故度支郎中専判度支事贈尚書左僕射正平郡公裴氏諱某字某考地育德會友輔仁氣志如神英華發外之所由作也初公違河洛之難以其族行攀大别浮彭蠡望洞庭徘徊乎湓流眄仰乎集作回翔于匡湓流眄于海昏有歐山之竒修江之清陽溪之邃湯集作陽泉之靈竹洞花塢仙壇僧舍雞犬鐘梵相聞於青嵐白雲中數百里不絶時也俗以逺而未擾地以偏而獲寧開元之遺老盡在猶歌詠乎升平公悠然樂之遂與我外王父故屯田郎中集賢殿學士河東栁公諱某外叔祖故相國宜城伯諱渾洎故太常卿蘭陵蕭公定故祕書少監范陽盧公虛州故左庶子隴西李公勛為塵外之交極心期之賞唯故給事中汝南袁公髙故將作監河南元公亘以後進預焉江左縉紳諸生望之如神仙邈不可及每賦一泉題一石毫墨未乾傳詠已遍其為物情所注慕如此無何朝廷命公盈虛東南漕引吳楚中原百萬之衆仰食于公人不堪煩我若無事往往佩聯印擁大蓋枉道而過舊山林壑之間琴詩不廢心計頥指而軍國飫贍其大雅之全才集作材者歟於戲太尉侍中勤勞王家惠于生人至公再世又以盛德屈于年運慶如壅川其決必大由是焜耀之烈重集于我郇公郇公始以大孝聞中以大用顯次以大忠升藩屏三朝出入二揆述先職而掌邦賦修祖德而踐台衡理荆之政篆在樂石定蜀之武藏在册府漢南之化方洽于人謡加以優遊藝文惇悅經術身被華衮門全素風不畏強禦不侮孤賤久要皆當代長者推轂必一時俊傑海內士大夫如麟羽之歸龍鳳集作鸞君子曰憲公忠獻公之勳德節公之雅道為不亡矣郇公以霜露之感泣編遺文思所以垂諸不朽以為節公消息出處之道始於海昏遂於正集外别次當時唱和遊覽餞勞之作凡九十六篇勒為海昏集上下卷不逺三千里授簡於小生俾酌歸趣而為序引某嘗備中臺之屬實辱至公之遇聞命已集作以哀敬不敢文為姑陳古義用贊風訓昔者三代陳詩以觀民風詐信集作信詐淫義躁靜剛柔集作柔剛於是乎取之喜怒哀樂吉凶存亡於是乎觀之兆於此必應於彼成乎終必見乎始詩不可以為偽魏公子為南皮之遊以浮華相髙故其詩傲蕩驕志勝而専勤而不安晉名士為金谷之燕以邪侈相扇故其詩濫溺淫志治而緩往而不返正平公為海昏之會以禮義相誨故其詩恬淡退志莊直立志退以獨全其道立以兼濟于時立而不矜退而不怨集作悲適而不放樂而不荒親而不比數而不黷如切如磋婉而有直體曰比曰興近而有深致仁者見之遁世而無憂知者見之愛身而有待曖乎若冬陽之煦油乎若春澤之浸其誘人也易其感人也深卒不知其所以然也夫如是則觀南皮之詩應劉焉得不夭魏祚焉得不短觀金谷之詩潘石焉得不誅晉室焉得不亂觀海昏之詩裴氏焉得不興我唐焉得不理詩之時義其大矣哉天人家國之際其至矣哉為節公郇公之子孫者其無忘哉元和五年五月七日朝議郎使持節道州諸軍事守道州刺史上騎都尉賜緋魚袋東平吕溫謹述劉商郎中集序武元衡天運地轉剛柔生焉禮辨樂形文章出焉夭之文莫麗乎日月地之文莫秀乎山川聖人觀象立言用稽述作發乎情性形於詠歌大則明天下政途彌綸王化爾小則文舒一時幽憤刺見國風故子夏云在心為志發言為詩聲成文謂之音也固可動天地感鬼神則正始之道存焉有唐文士彭城劉公諱商字子夏眷豫一先後之輩睦豫兩中外之親緣情所鍾愛亦加等顧惟遭幸秉國樞重燮贊台衡之務統臨井絡之人其孤乃緘鐍遺文提捧萬里猥期序引將佐詞林豫感悼故知惻覽華藻珠玉綴錯清泠自飄皆素所狎聞也泫然涕下不能自收矧公遐情浩然酷尚山水著文之外妙極丹青好事君子或持氷素越淮湖求一松一石片雲孤鶴獲者寶之雖楚璧南金不之過也晚嵗擺落塵滓割棄親愛夢寐靈仙之境逍遙玄牝之門又安知不攀附雲霓蛻迹巖壑超然懸解與汗漫遊乎無間邪著歌行等篇皆思入窅冥勢合飛動滋液瓊環之朗潤濬發綺繡之濃華解疑作觸境成文隨文變象是謂折繁音於孤韻貫清濟於洪流者也今所編録凡二百七十七篇及早嵗著胡笳詞十八拍出入沙塞之勤﨑嶇驚畏之患亦云至矣有若太原王緒河東裴茂茂弟薦河南豆盧峯馮翊嚴紳紳弟綬及余伯舅洎于子夏咸以儒業相資冠胄群族雄詞麗句遍在人間豫與司空嚴公親結義深相與編葺恨不得繼采詩之末播于樂章且傳諸名士庶幾不朽忝以宿姻舊好撫事追書故言之不讓也開州韋處厚侍講盛山十二詩序韓愈韋侯昔以考功副郎守盛山人謂韋侯美士考功顯曹盛山僻郡奪所宜處納之惡地以枉其材韋侯將怨且不懌集作釋矣或曰不然夫得利則躍躍以喜不得利則戚戚以泣若不可生者豈韋侯之謂哉韋侯讀六藝之文以探周公孔子之意又妙集有能字為詞章可謂儒者夫儒者之於患難茍非其自取之其拒而不受於懷也若築河堤以障屋霤其容而消之也若水之於海氷之於夏日其玩而忘之以文詞也若奏金石以破蟋蟀之鳴蟲飛之聲况一不快於考功盛山一出入息之間哉未幾果有以韋侯所為十二詩遺余者其意方且以入溪谷上巖石追逐雲月不足日為事讀而詠歌集作歌詠之令人欲棄百事往而與之遊不知其出於巴東以屬朐䏰也于時應而和之者凡十人及明一作此年韋侯為中書舍人侍講六經禁中名處厚和者通州元司馬名稹為宰相洋州許使君名康佐為京兆忠州白使君居易為中書舍人李使君景儉為諌議大夫黔府嚴中丞武方嵩卿韓集舉正作謨時為祕書監樂天集有制詞為祕書集有少字監溫司馬造為起居舍人皆集闕下於是盛山十二詩與其和者大行於時聫為大卷家有之焉慕而為者將日益多則分為别卷韋侯俾豫題其首云云主客員外郎盧公集序集作紀劉禹錫心之精微發而為文文之精妙詠而為詩猶夫孤桐朗玉自有天律能事具者其名必髙名由實生故久而益大尚書郎盧公諱象字緯卿始以章句振集作震起於開元中與王維崔皓比肩驤首鼓行於時妍詞一發樂府傳貴由前進士補祕書省校書郎轉右衛倉曹掾丞相曲江公方執文衡揣摩後進得公深器之擢為左補闕河南府司録司勳員外郎名盛氣髙少所卑下為飛語所中左遷齊汾鄭三郡司馬入為膳部員外郎時大盜起幽陵入洛師冬夏衣冠不克歸王所為虜劫執公墮脅從伍中初謫果州長史又貶永州司户移吉州長史天下無事朝廷思用宿舊徴拜主客員外郎道病留武昌遂不起故相崔太傅時為右史方在鄂以文志其墓其詞曰噫公妙年有聲振耀當代翺翔雲路不虞矰繳盛名先物易生癘疵三至郎署坐成遺耋蹭蹬江臯棲棲沒齒見知者恨之公逺祖元魏北齊後周皆為帝師公之叔父嵩山逸人諌議大夫皓然真隱者也公下世後七十三年其孫元符捧遺草來乞辭以表之嘗經亂離多所𣪚落今之存者十有二卷凡若干篇董氏武陵集序集作紀片言可以明百意坐馳可以役萬景工於詩者能之風雅體變而興同古今調殊而理冥逹於詩者能之工生於才逹生於明二者還相為用而後詩道備矣余嘗執斯評為公是且衡而度之誠懸乎心默揣羣才鈞銖尋尺隨限而盡如是所閲者百態一旦得董生之詞杳如摶翠屏浮層瀾視聽所遇非風塵間物亦猶明金綷羽得於遐裔雖欲勿寶可乎生名侹字庶中幼嗜屬詩晚而不衰心源為爐筆端為炭煆鍊元本雕礱羣形糾紛舛錯逐意奔走因故沿濁叶為新聲嘗所與遊皆青雲之士聞名如盧杜盧員外象杜員外甫髙韻如包李包祭酒佶季侍郎紓迭以章句揚於當時末路寡徒值余歡甚因相謂曰間者身以廷尉屬為荆州從事移疾罷去幽卧于集作於武陵逮今四年言未信於世道不施于集作於人寓其性懷播為吟詠時復發笥紛然盈前凡五十篇因地為目吾子嘗號知我盍表而出集作志之為生羽翼余不得讓而著於篇因系之曰詩者其文章之藴也集作耶義得而言喪故微而難能境生於象外故精而寡和千里之謬集作繆不容秋毫非有的然之姿可使户曉必俟知者然後鼓行於時自建安距永明已還詞人比肩唱和相發有以朔風零雨髙視天下蟬噪鳥鳴蔚在史䇿國朝因之粲然復興由篇章以躋貴仕者相踵而起兵興已還右武尚功卿大夫以安集作憂濟為任不暇器人於文什之間故其風浸息樂府協律不能足去聲新音集作詞以度曲夜諷之職寂寥無紀則董生之貧卧于裔上也其不得于時者歟其不試故藝者歟徹上人集序釋子工集夲文粹有為字詩尚矣休上人賦别怨約法師哭范尚書咸為當時才士之所傾歎厥後比比有之上人生於會稽本湯氏子聰察嗜學不肯為凡夫因辭父兄出家號靈徹字源澄雖受經論一心好篇章從越客嚴維學為詩遂籍籍有聞去聲維卒乃抵吳興與長老詩僧皎然遊講藝益至皎然以書薦於詞人包侍郎佶包得之大喜又以書致于李侍郎紓是時以文章風韻主盟于集作於世者曰包李以是上人之名由二公而揚如雲得風柯葉張王文粹作柯少葉張以文章接才子以禪理悅髙人風儀甚雅談笑多味貞元中西遊京師名振輦下緇流疾之造飛語激動中貴人因侵誣得罪徙汀州會赦二字文粹作入會稽歸東越時吳楚間諸侯多賔禮招迓集作延之元和十一年終于集作於越之山隂年七十有一門人遷之建塔于集作於宣州開元天柱峰之陲從本教也初上人在吳興居何文粹作柯山與晝公為侣皎然字清晝時以字行時豫方以兩髦執筆硯陪其吟詠文粹作詩皆曰孺子可教後相遇于京洛與支許之契焉上人歿後十七年豫為吳郡其門人秀峰捧先師之文來乞辭以志且曰師嘗在吳賦詩僅二千首今刪取三百篇勒為十卷自大厯至元和凡五十年間接詞客文人酬唱别為十卷今也思行乎昭代求一言羽翼之因為評曰世之言詩僧多出江左文粹作右靈一導其源護國襲之清江揚其波法振沿之如么絃孤韻瞥入人耳非大樂之音獨吳興晝公能文粹作服備衆體晝公後徹公承之至如芙蓉園新寺詩云經來白馬寺僧到赤烏年謫汀州云青蠅為弔客黃耳集作犬寄家書可謂入作者閫域豈獨雄於詩僧間耶因繼集重序白居易去年微之取豫長慶集中詩未對答者五十七首追和之合一百一十四首寄來題為因繼集卷之一因繼之解具微之前序中今年豫復以詩五十首寄去微之不逾月依韻盡和合一百首又寄來題云因繼集卷之二卷末批云更㨂好者寄來蓋示餘勇磨礪以戰集作須我耳豫不敢退舍即日又收拾新作格律共五十首寄去雖不得好且以供命夫文猶戰也一鼓作氣再而衰三而竭微之轉戰逮茲三矣即不知有百勝之術多多益辦耶抑又不知鼓衰氣竭自此為遷延之役耶進退唯命微之微之走與足下和答之多從古未有足下雖少我六七年然俱已頭白矣竟不能捨章句拋筆硯何癖習如此之甚歟而又未忘少年時心每因唱酬或相侮謔忽忽自哂况他人乎因繼集卷且止於三可也忽恐足下懶發不能成就至三前言戲之者姑為巾幗之挑耳然此一戰後師亦老矣宜其櫜弓匣刃彼此與心休息乎和晨興一章録在别紙語盡於此亦不修書二年十月十五日樂天重序復以詩京夲作復以近詩文苑英華卷七百十三
