body:
  text: 文苑英華卷二百十八宋李昉等編人事五逢遇六十八首江上暫别蕭四劉三旋欣接遇陳子昂昨夜滄江别言乘集作乖天漢逰寧期此相遇尚接武陵州結綬還逢育銜杯且對劉波潭一濔濔臨望幾悠悠山水丹青雜煙雲紫翠浮終愧神仙友來接野人舟遇荆州崔兵曹使前人輶軒鳳凰使林藪鶡雞冠江湖一相許雲霧坐交歡興盡崔亭伯言忘釋道安秋光稍欲暮嵗物已將䦨古樹蒼煙斷虛庭白露寒琴中集作瑶琴山水曲今日為君彈遇崔司議泰之冀侍御圭二使入蜀前人謝病南山下幽臥不知春使星入東井云是故交親惠風吹寶瑟微月憶清真慿軒一留醉江海寄情人除夜樂城逢孟浩然張子容逺客襄陽郡來過海伴家樽開柏葉酒燈發九枝花妙曲逢盧女髙才得孟嘉東山行樂意非是競繁華鄭果州相過王維斜集作麗日照殘春初時集作晴草木新牀前磨鏡客花下集作裏灌園人五馬驚窮巷雙童逐老身厨中集作中厨辦粗飯常恐集作當恕阮家貧若耶溪逢孔九此詩已見一百六十六卷綦母潛旅次丹陽郡遇康侍御宣慰召募兼别岑單父劉長卿客心募一作暮千里回首煙花繁楚水度集作渡歸夢春江集作江春連故園羇人懷上國驕虜窺中原胡馬暫為害漢臣多負恩羽書晝夜飛海集作塞內風塵昏雙鬢日已白孤舟心可論繡衣從北來汗馬宣王言憂憤激忠勇悲歡動黎元南徐爭赴難發卒如雲屯倚劒看太白洗兵臨海門故人亦滄洲少别堪傷魂積翠下京口歸潮落山根如何天外帆又此波上樽空使憶君處鶯聲催淚痕湖上遇鄭田前人故人青雲器何意常窘迫五十猶布衣憐君已頭白誰言此相見暫得話疇昔舊業今已無還鄉反為客扁舟君獨往桂集作斗酒君自適滄海不可涯孤帆去無跡杯中忽復醉湖上生新魄湛湛江色寒濛濛水雲夕風波易迢遞千里如咫尺回首人已遙南看楚天隔穆陵關北逢人歸漁陽前人逢君穆陵路匹馬向桑乾楚國蒼山古幽州白日寒城池百戰後耆舊幾人集作家殘處處蓬蒿遍野集作歸人掩淚看宋中遇陳兼集作二髙適常忝集作參鮑叔義所寄王佐才如何守苦節獨自集作歸無良媒離别十年外飄蓬千里來安能集作知罷官後惟見柴門開窮巷隱東郭髙堂詠南陔籬根長花草井口生集作垂莓苔伊昔望霄漢于今倦蒿萊男兒須集作未達命且醉手中杯宋中遇劉書記前人何代無秀士髙門生此才森然覩毫髮若見江山來幾載困常調一朝時運催白身謁明主待詔登雲臺相逢梁宋間與我醉蒿萊寒楚眇千里雪天閉集作晝不開末路終離别不能强悲哀男兒爭富貴勸爾莫遲回平臺夜遇李景參有别前人離憂忽浩集作心忽悵然策馬對秋天孟諸薄暮凉風起歸客相逢渡睢水憶昨集作昨時携手已集作向十年明集作日今分途各千里嵗物蕭條滿路岐此行浩蕩令人悲家貧羡爾有微祿欲往從之何所之此詩二百八十七卷重出今已削去逢謝偃前人紅顔愴為别白髮始相逢唯餘昔時慮無復昔時容長安逢故人郎士元數年音信斷不意在長安馬上相逢久人中欲認難一官今懶道雙鬢竟羞看莫問生涯事只應持釣竿逢莊納因贈皇甫冉世故還相見天涯共向東春歸江海上人老别離中郡吏名何晚沙鷗道自同甘泉須早獻且莫嘆飄蓬渭上逢李藏器移家東郡耿湋求名須有援學稼又無田故國三千里新春集作深宫五十年移家還作客避地莫知賢東路今何處風帆去渺然此詩又見二百七十五卷有數字不同巴陵郭逢洛陽故人前人因君知世事流浪已忘機久客多人厭髙年衆病歸連雲湖色逺度雪鴈聲稀又說家林盡凄傷淚滿衣春色遇李侍郎盧綸髙栁滿春城東園有鳥聲折花朝露滴潄石野泉清心許陶家醉詩逢謝客呈應憐末行吏曽是魯諸生關口逢徐遇前人廢寺連荒壘那知見子真關城夜有雪氷渡曉無人酒裏唯多集作移病山中願作鄰嘗聞兄弟樂唯見謝家貧逢楊開府韋應物少事武皇帝無賴恃恩私身作里中橫家藏亡命兒朝枿集作持又作折摴蒲局暮竊東鄰姬司隸不敢捕立在集作登白玉墀驪山風雨集作雪夜長楊羽獵時一字都未集作不識飲酒肆頑癡武皇升仙去憔悴被人欺讀書事已晚把筆學題詩兩府始收籍南宫謬見推非才果不容出守撫􅑏嫠忽逢楊開府論舊涕俱垂座客何由識唯有故人知廣陵遇孟雲卿作前人雄藩本帝都逰士多俊賢夾河樹鬱鬱華館千里連親集作新知雖滿堂中意頗未宣忽逢翰林友歡樂斗酒前髙文激頺波四海靡不傳西施且一笑衆女安得妍明月滿淮海哀鴻逰集作逝長天所念京國逺我來君又旋長安遇馮著作前人客從東方來衣上灞陵雨問客何謂集作為來采山因買斧冥冥花正開揚揚燕新乳昨别今已春鬢絲生幾縷漢南遇方評事詩選作襄州遇房評事由戴叔倫移家住漢隂不復問一作向華簪貰酒宜城近燒田夢澤深暮山逢鳥入寒水見魚沉與物皆無纍終年愜本心京口逢皇甫司馬副端前人潮水忽復至雲帆儼欲飛故園雙闕下左宦十年歸晚景照華髮一作日凉風吹别衣淹留更一醉老去莫相違汝南逢董校書前人擾擾倦行役相逢陳蔡間如何集作何為百年內不見一人閒對酒惜餘景問程愁亂山秋風萬里至集作道又度集作出穆陵關此詩二百八十七卷重出今已削去逢友生言懷集作别前人安親非避地羈旅十餘年道長時流許冢貧故舊憐相逢今嵗暮逺别一方偏去住俱難說江湖正渺然逢許評事前人萬里楊柳色出關逢故人輕煙拂流水落日照行塵積夢江湖濶憶家兄弟貧徘徊灞亭上不語共傷春嶺上逢久别者又别權德輿十年曽一别征斾集作路此相逢馬首向何處夕陽千萬峰逢友人之上都釋法振玉帛徴賢楚客稀猿啼相送武陵歸潮頭望入桃花去一片春帆帶雨飛逢江客問南中故人因以詩寄司空曙南客何時去相逢問故人望鄉空淚落嗜酒轉家貧疏懶辭微祿東西任老身上樓多看月臨水共傷春五栁終期隱雙鷗自可親應憐折腰吏冉冉在風塵冬日逢馮法曹話懷冷朝陽分襟二年內多少事相干禮樂風全變塵埃路漸難秋林新葉落霜月滿庭寒雖喜逢知已他鄉嵗又䦨中峯歸喜見苗發集作雲際中峯寺已見一百六十五卷李端江上逢司空曙前人共有髫年故相逢萬里餘新春兩行淚舊國一封書夏口帆初泊衡陽雁正疏唯應執杯酒暫食漢江魚京西遇舊職集作識兼送往隴州姚係蟬鳴一何急日暮秋風樹即此不勝愁隴隂人更去相逢與相失共是亡羊路徵還京師見舊畨官馮叔達劉禹錫前者匆匆襆被行十年憔悴到京城南宮舊吏來相問何處淹留白髮生嶺表集作外逢故人張籍過嶺萬餘里旅逰經此稀相逢去家逺共說幾時歸海上見花發瘴中無鴈飛炎塗集作州望行集作鄉伴相集作自識北人衣途中逢陽陟已見一百六十八卷于鵠逢張十八員外籍白居易旅思正茫茫相逢此路傍晚風林葉暗秋露草花香白髮江城守青山水部郎客亭問集作同宿處忽似夜歸鄉逢舊前人久别偶相逢俱疑是夢中即今歡樂事放盞又成空逢博陵故人彭兵曹賈島曲陽分散會京華見說三年住海涯别後解餐蓬虆子向前未識牡丹花偶逢日者教求祿終傍泉聲擬致家踏雪携琴集作衾相就宿夜深開户月光集作斗牛斜逢呂上山人劉得仁塵裏正愁老相逢眼益明從前枉多病此後解疏名古柏今收子深山許事兄長生如有分願逐到蓬瀛夜行次東關一作行次潼關驛逢魏扶東歸許渾南北斷蓬飄長亭酒一瓢殘雲歸太華疏雨過中條樹色隨關逈河聲入塞一作海遙勞歌此分首一作手風急馬蕭蕭此詩二百九十八卷重出今已削去異同注為一作廣陵道逢方干周賀野客行無定全家在渭東寄懷一作眠僧閣逈贈别槖金空舊業千山隔歸舟百計同藥資如有分相約老邱中逢僧前人帶疾稀相見西城早晚來山房一作衣風壞衲香罐雨霑灰坐久鐘聲靜談餘嶽影回却思同宿夜髙枕話天台泗上逢韓司徒歸北前人多病十年無舊識滄州亂後只逢君已知罷秩辭瀧水相勸移家住嶽雲泗上旅帆侵疊浪雪中歸路踏荒墳更為此别愁應老書札何由到北軍秦中逢王處士趙嘏萬水東流去不回先生獨自負仙才蘂宫橫浪海邊别鶴翅駐雲天上來幾處吹簫森羽衛誰家殘月下樓臺春風正好分瓊液乞取當時白玉杯江上逢許逸人前人是非處處生塵埃唯君襟抱無嫌猜收帆依雁湓浦宿帶雨别僧衡嶽回芳樽稍駐落日唱醉袖更拂長雲開清秋華髮好相似却把釣竿歸去來落第後歸喜逢僧再陽項斯相逢雖强笑人世别離頻曉去長侵月歸鄉動隔春見僧心暫靜從俗事多屯宇宙詩名小山河客路新翠桐猶入㸑青鏡未辭塵逸足常思驥隨羣自退鱗宴乖紅杏寺愁在緑楊津老病難為樂開眉賴故人岐陽逢曲陽故人話舊馬戴異地還相見平生分可知壯年俱欲暮往事盡堪悲道路頻艱阻親朋久别離解兵逃白刃謁帝值明時淹疾生涯故因官世業移雞鳴關月落雁度朔風吹客淚翻岐下鄉心落海湄積愁何計遣滿酌浣相思汧上欵舊友前人斗酒故人同長歌起北風斜陽一作日斜髙壘閉秋角暮山空雁宿寒流上螢飛淡霧中坐來憂白髮况復久從戎邊館逢賀秀才前人貧病無疏我與君不知何事久離羣鹿裘共敝同為客龍闕將移擬獻文空館夕陽鴉繞樹荒城寒色雁和雲不堪吟斷邊笳曉葉落東西客又分蜀中逢故人李頻自古有行役無人免别家相寬須陌上一醉任天涯積疊山藏蜀縈紆水繞巴他年又何處共說海棠花漢上逢崔八同年前人去嵗同逰帝里春杏花過後各離秦偶先託質從知己獨未還家作旅人世上路岐何繚繞空中光景不逡巡一回相見一回别更得幾回一作多年少身商於逢友人喻坦之行役何時了年年骨肉分春風來漢棹雪路入商雲水險溪難定林寒鳥異羣相逢聊坐石啼狖語中聞灞上逢故人前人花落杏園枝驅車問路岐人情誰可㑹身事自堪疑嶽雨狂雷送溪槎漲水吹家山如此景幾處憶相隨金陵逢張喬楊䕫殊鄉會面時辛苦兩情知有志年空過無媒命共竒吟餘春漏急語舊酒巡遲天爵如堪倚休驚鬢上絲江上逢進士許棠張喬詩人誰上第新榜又無君鶴髮他鄉老漁歌故國聞平江流曉月獨島絆餘雲且了髫年志沙鷗未可羣逢漳州崔使君北歸張蠙在郡多殊稱無人不望回離城携客去度一作出嶺擔猿來障寫經冬蘂瓶緘落暑梅長安有歸宅歸見鎖青苔雲朔逢山友前人㑹靣却生疑居然似夢歸塞深行客少家逺識人稀戰馬分旗牧驚禽曳箭飛將軍雖異禮難便一作便使脫麻衣途中逢孫路因得李頻消息方干灞上寒仍在柔條亦自新山河雖度臘雨雪未知春正憶同袍者堪逢共國人銜杯亦一作益無語與爾轉相親江上逢故人陳陶十年蓬轉金陵道長笑青雲身不早故里相逢盡白頭清江顔色何曽老河上逢友人羅鄴知君意不淺立馬問生涯舊業無歸地他鄉便是家宵吟憐桂魄朝起怯菱花語盡黃河上西風日又斜吳門再逢方干處士前人天上髙名一作才世上身垂綸何不駕蒲輪一朝卿相俱前席千古篇章冠後人稽嶺不歸空挂夢吳一作燕宮相值欲沾巾吾王若致升平化可獨成周只渭濵大梁見喬詡羅隱湘水春浮岸淮燈夜滿橋六年悲梗斷兩地各萍漂刀筆依三事篇章奏珥貂跡卑甘汨沒名散稱逍遙好寺松為徑空江桂作橈野香花伴落缸暖酒和燒晉沼尋逰鳳秦冠竟歎梟骨凡雞犬薄魂斷蕙蘭招悵望添燕琯蹉跎厭魯瓢敗桐方委㸑寃匣正衝霄戰代疑作伐安釐國封崇孝景朝千年非有限一醉解無聊漏永燈花暗爐紅雪片銷久逰家共逺相對鬢俱凋運命從難合光隂奈不饒到頭蓑笠契雨信釣魚潮鍾陵見進士楊尋前人孺亭滕閣少踟蹰三度南逰一事無只覺流年如鳥逝不知何處有龍屠雲歸洪井枝柯斂水下章江氣色粗賴得與君同此醉醒來一作醒醒愁被鬼揶揄湘中見進士喬詡前人吳公臺下别經秋破虜城邊暫駐留一笑有時堪解夢數年無故不同逰雲牽楚思橫魚艇栁送鄉心入酒樓且酌松醪依舊醉誰能相見向春愁錢塘見苪逢前人蔡倫池北雁峯前離集作罹亂相兼十九年所喜故人猶會面不堪良牧已重泉醉思把筯敲集作歌歌席狂憶判身入酒船今日與君贏得在戴家灣裏兩皤然見王貞白裴說共賀登科後明宣入紫宸又看重試榜還見苦吟人此得名渾别歸來話亦新分明一枝桂堪動楚江濵文苑英華卷二百十八
