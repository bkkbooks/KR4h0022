body:
  text: 文苑英華巻三百五十二宋李昉等編問答二七召八首對蜀父老問一首七召何遜假是先生負茲勁挺狀羣飛之噐吉吊切高聲大呼也一本作古䘮字侣似獨行之迷逕神忽忽而若忘意衝衝而不定鍳丹緑其無主聞鐘鼓以失聽至乃冬霰積庭室靡人聲春花滿野地無行者圜堵常閉曲突無煙同生芻之暫有共死灰之壹一作曀燃篤論公子聞而崛起雖道術之可忘亦切磋之所耻命徒御以絡繹將有事於巖中車煜爚而流水馬泮渙以追風乃踰汗漫入䝉蘢至深潭之澳溟有洞室之穹崇居隠磷而出没望嶔岑而下上竹距石以斜通水韻松以含響地不寒而蕭瑟日無雲而曭朗於是整容投刺屣履一作倒屣排門揚眉就席舉袂而言曰若五秀禀其生靈六情通其愛惡憎共集於鄙老嗜同歸於美樂今足下羣鳥獸以為娯處貧賤而不怍欲賔實於孤介乃貽譏於隕穫至乃喀喀死於道邊瞀瞀填乎溝壑削松筆以畫虎鼓鉛刀而刻鶴身既勞而不勌事何感而莫懲欲模名於帶索豈知命於泥䋲何異走長衢以避影煎流水以求氷今欲道足下以衞生之祕術怡神之妙道譬愈疫於寒植同起尸於仙草寧願聞乎先生曰有為之生已逼無益之慮常勞若見明於礙滯幸求救於肓膏公子曰千門始構百常洞啓激洛開渠䟽山抗陛延袤水陸曠望東西下臨江海上属雲霓百丈杳冥以飛跨九層欝律以階梯歩三休而更廽塗中宿而方迷雕墻屈曲以交牙網户周流以重積既隂涔而影響亦呌嘯而廻一作辟易沙板金鋪紫柱玉舄煒煌熻赩碅磳摶敞圖雲霧之蔽虧狀神仙之來徃璧璫自耀珠綴恒響蜉蝣動而晝喧熠燿飛而夜朗既臨下以寥沈亦慿髙而泱漭聞疾雷於階陛一作板弄犇星於帷幌亘以曲堂周以洞房北負連闥南注長廊綺䟽交映鏤檻相望鷰飛蓮井日照杏梁陽烏鶱其將動雲鳯矯而欲翔若乃後沼開源延石崇壤擬崑閬之㠨􅔍比滄溟之瀇瀁其中則有桂宫栢寢呉臺柘館複道耿介而連雲阿閣穹隆而仰漢望虬欄之映水見丹鶴之出岸豔草竒色臺樹珎名長生靈壽男華女貞河栁垂葉山榴發英翫竒花之春滿摘甘實於夏成此實宫苑之壯麗豈能從我而為榮先生曰多言反道辯口傷實懼貽弊於蔀家且自安乎容膝公子曰銅瓶玉井金釡桂薪六彞九鼎百果千珍熊蹯虎掌雞跖猩脣䲋子林切魚两味𤣥犀五肉拾卵鳯巢剖胎豹腹三臠甘口七葅愜目蒸餌十字湯官五熟梅椒魯䜴河鹽蜀薑劑水火而調和糅蘇蔱以芬芳脯追復而不盡犢稍割而無傷黿羮流歠蜒醬先嘗鱠温湖之美蚶切丙穴之嘉魴落爼霞散逐刅飛揚輕同曵璽白似飛霜蔗有盈丈之名桃表兼斤之實杏積魏國之貢菱為鉅野所出衡曲黄梨汶垂蒼栗隴西白榛湘南朱橘荔枝沙棠蒲萄石蜜𤓰稱素腕之美棗有細腰之質並抗吻以除煩亦咀牙而消疾於是三雅陳席百味開印玉璣星稀蘭英縹潤既夷志於坎壈亦懐忘於鄙恡此盖滋㫖之極珍豈能従予而共進先生曰不貴媮食寧甘醇酒既深悟於腐腸豈自迷於爽口公子曰秦氏獨立燕姝絶世如短如長不穠不細信耳目之妖冶乃古今之佳麗妍姿豔逸淑性閑華效施顰於宋里經一作髻堕馬於梁家折纎腰以㣲歩一作於歩障里一作揎皓腕乎輕紗臨池正領拂鏡㸔花觀堵墻以䬃沓傾城國以諠譁墨欲歸而抽軨車攔也疑作軫車後横木也惠將返而廻車至廼鄭衞繁聲抑揚絶調足使風雲變動性靈感召撃哀響則春臺之人愴焉而雪泣一作涕起歡情則崩城之婦嫣然而㣲笑嶰谷調一作棲鳯之竹一作管龍門獨鵠之柯緑珠絳樹宋獵韓娥青春婉娩上客經過開洞房以命賞召才人而合宴舉輕幔以徐來隔珠簾而可見牀披珠一作珍象簟展羅薦聽促柱之方進聞廣聲之始囀歩想象以頓足腕蹣連一作蹁躚而拂靣托斜視於遺簮寄含情而舉扇俄而夕烏東反落日西懸綺霞暎水蛾月昇天觧鴛鴦之繡被拂蛩距之長氊燭中一作羽幃而動爛香山一作薰蕙帳而㣲烟願横施以自眤脱斜領於君前此乃聲色之妖蕩將不從我而留連先生曰淫聲非篤論之㫖麗色本余情所棄伐國不問仁人此言從何而至公子曰嵗晩農休時閒務隙山火已燎野霜初白聊效殺於秋冬乃從禽於草澤蜀地五丁齊國二子氣動山漂汗揮雨起渥洼流頳一作赭蘭池照血躡飛影於未形赴犇星於欲滅革車隠隠轂騎闐闐鼔譟諠而振地烝徒駭而聒天割玉之刀飲石之箭罝羅布其一目罟網周及三靣犬號驤螭鷹名奔電暫離已合忽隠仍見赴迴超危衝林䟦援草随足起山從眼轉跨躡岡澗電舉陵陸鳥不及飛獸不遑伏既前轥而後赴亦左排而右蹴跖疑作蹠實駭而自救騰虛亂而相撲視灑血之丹地見飛毛之暗目傍窮刼剞勢極搜求文皮坐裂膬尾生抽手羇鐵頂足批銅頭象折牙而陵遽貊拉齒而夷由擒髙樓之度索走大樹之神牛鴈聞弦而跕堕猨抱木而啾啁笑楚王之雲夢耻漢帝之中流此武材之矯猛豈能從我而畋逰先生曰馳騁傷仁好殺非勇幸廣内之豐樂何禽荒之足重公子曰踆烏始照宫槐遽而欲舒顧兎纔滿庭英紛而就落一作踆烏始照宫槐遽吹舒顧兎而纔滿盻庭柯而就落譬光影於飛浮比生靈於栖託擾擾摩肩轔轔方駕立怵廹於毁譽獨慇勤於用舎嗟向有而今無歎後榮而前謝清歌雅舞暫同於夢寐廣厦髙堂俄成於幻化若夫洗精服食慕道逰仙尋玉塵於萬里守金竈於千年三尸可度九轉難傳飛騰水陸咀嚼靈𤣥若乃壁上真辭枕中秘要弹壓神鬼吐納靈妙既變醜以成妍亦反老而為少虬駕夭矯而出没霓裳颯沓而容與接鵠馭於後乗追鳯簫於前侣雨散漫以霑服雲霏㣲而襲宇瞰芝闕以窈窕見玉臺之相拒盖排煙而漸㓕旌拖風而未舉值觧佩於江濵逄弄珠於漢渚薄逰𤣥圃弭節太華列神童於羽帳侍玉女於仙車澗採兮危實苑㧞兮廻花聴弱水之晨浪望崑山之夕霞窮北辰而比夀指中岳以為家此神仙之恍惚豈從我而蠲邪先生曰捕影之言莫測繋風之論難盡未嘗留意於死生豈復稍論於椿菌公子曰洙泗遺文鄒魯餘烈其道未逺其風不絶方領圓冠金口木舌談章句之逺㫖搆紛綸之雅說陳五禮明六詩貫穿㣲妙辨析毫釐既待問以重席亦覃思而下幃醖藉愷悌和樂緝熈生徒肅肅賔友師師並接袵以聞道俱援手而受辭心絶内戰事無外慾横經者比肩擁帚者繼足醜申韓之法令陋桓文之風俗六郡溱其衣冠五陵窮其軌躅信斯文其若水實斯人之如玉若夫珠璣産於蚌蛤珪璧出於山淵未有玉不瑩而為寳人無學而稱賢盖持身之管籥進徳之舟船響如鍾而待叩明似鏡而常懸此見重於經術寧降志於吾賢先生曰誠此言之甚美比斯道之為曠耻見嘲於腐儒豈求珍於席上公子曰我大梁之啓基方邃古而無匹先天定始比殷周而餘裕揖讓受終考唐虞而不失道徳有序憲章咸秩六府孔脩百司盡畢搜求儒雅招拾遺逸旰食思治雖聞之於昔談昧旦臨朝乃見之乎兹日蕩蕩薰風泱泱大典道含𢎞而廣被澤汪濊而傍闡採輿人之片言納匹夫之小善事在㣲而畢照然無幽而不顯若夫下車布徳伐罪吊民風無偃稼雨不破塵覩勝殘於朞月見成俗於浹辰含一作幽羣生兮如海養萬類其猶春郷無豕食之禄野靡狼顧之民樵者目金而知耻耕夫讓畔以成仁何大庭之足競豈栗陸之能隣璧水道庠序之風石渠啓珪璋之盛竒士輻凑而騁足異人間出而効命小大之獄無寃民翾飛之物無夭性故能睦之以九世齊之以七政坦坦恢恢巍巍赫赫政徳洽於霜風教義窮於足迹望雲氣而欵關候海水而重譯所謂府不輟貢史無虛帛天瑞磊砢而相尋地符氛氲而不少収六穗於征賦翫九莖於池沼三足應感而來儀一角知時而自擾映景星於初月聆鳯音於將曉若乃亭毒不疪合天地而並施陶鈞日月與造化而齊功故非言辭之可具盡筆札之所能窮懐真獨徃之夫犇走而從事滅迹藏名之士顛倒而向風二漢有同於兒戱魏晋無礙於胷中言未畢先生攝衣而起曰子前所說似玉巵之無當徒費辭而難領譬由背日而視秋毫却行而求鄢郢一聞皇王之盛則豁然神悟而理攄志無時而可巻邦有道而宜舒敢以淺智請從一作附後車對蜀父老問龍集荒落律紀蕤賔余自酆鎬歸於五津從王事也丁丑届於昇仙橋上送客宇即相如所謂不乗赤車駟馬不出汝下者也遇蜀父老皤然龎眉華髮者休於斯謂余曰子非衣冕之族歟文章之徒歟飾仁義以干時乎懐詩書以邀名乎吾聞諸夫子曰邦有道貧且賤焉耻也當今萬方日用九有風靡主上垂衣裳正南靣而已矣庸非有道乎而子爵不登上造位不至中㳙藜羮不厭裋褐不全容非貧賤乎吾視子形容憔悴顔色疲怠心若渉六經眼若營四海何其無耻也何其不一干聖主效智出竒何栖栖營黙自苦若斯吾聞克為卿失則烹何故區區冗冗無所成名余笑而應之曰井魚不可以語於海者拘於墟也夏蟲不可以語於氷者篤於時也盖聞智者不背時而徼幸明者不迂道以干非是以聖賢馳騖莫徹三家之轍匹夫髙抗不屈萬乘之威道在則簞瓢匪陋義存則珪組斯違或立談以邀鼎食或白首而甘布衣或委輅而仕屬論都之㑹或射鈎以相遇匡覇之機亦有朝為伊周暮為桀跖當其時也襲珩珮之鏘鏘失其時也委溝渠而喀喀故使龍丘先生羞聞擁篲鴈門太守不知縫掖孟軻偃蹇為王者師范睢匍匐為諸侯客富貴者君子之餘事仁義者賢逹之常迹來不可違類鴻鴈之随陽去不可留同白駒之過隙行蘇張之辨於委燧之年則迂矣用韓彭之術於堯舜之朝則舛矣守夷齊之節於湯武之時則孤矣抱申商之法於成康之日則過矣彼一時也此一時也易時而處失其所以大唐之有天下也出入三代五十餘載月竁來庭風丘欵塞金革已偃羽檄已平雖有亷白之將孫呉之兵百勝無遺策千里不留行無所用也社首既禪介邱既封創明堂立辟雍雖有闕里之聖淹中之儒叔孫通之蕝公玊帶之徒將焉設也咸英並作韶武畢用奏之方澤而地祗登升之圜丘而天神降雖有伶倫伯䕫延陵子期操雅曲則風雲動激悽音則草木悲又何施也畫衣莫犯囹圄不脩雖有咎繇仲甫之噐釋之定國之儔金科在握丹筆如流非急務也人歸東户家沐南薰山澤無蹊隧雞犬不相聞雖有文翁黄覇之述職子游子賤之絃歌政成禮讓俗被雍和固無取也干戈已戢禮樂已興刑罰已措梁父已昇公卿常伯庶政其凝雖有鴻才大畧麗句一作藻豐辭發言盈乎百代濡翰周乎四時畧無益於今日而適足以拂之是故天子恭已羣臣演成攘袂而陵稷卨撫掌而笑阿衡無為而萬物皆遂不言而品彚咸亨莫不稱賛鴻烈揄揚頌聲言殊者拓疑作招累行危者相傾効智者輟談於草澤出竒者裹足於山楹許由去而堯仁不少善巻逃一作避而舜徳不輕夫周冕雖華猿猴不之好也夏屋雖崇騏驥不之處也載鼷以車馬不如放之於藪穴也樂鷃以鍾鼓不如栖之以深林也此數物者豈惡榮而好辱哉盖不失其天真也若余者十五而志于學四十而無聞焉詠羲農之化翫姬孔之篇周逰幾千里馳騁數十年時復陵霞汎月搦札彈弦随時上下與俗推遷門有張公之霧突無墨子之煙雖吾道之窮矣夫何妨乎浩然今將授子以中和之樂申子以封神疑作禪之篇終𦕈慙乎措地竊所慕於談天於是蜀父老再拜而謝曰鄙夫瞽陋長自愚惑習俗遐陬不逰上國聞主人之休㫖聴皇猷之允塞亦猶獻雉而遇司南衘龍而光有北請終餘論永告卭僰文苑英華巻三百五十二
