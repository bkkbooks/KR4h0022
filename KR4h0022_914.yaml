body:
  text: 文苑英華卷九百十五宋李昉等編職官二十三節度二魏博節度使田承嗣碑一首嶺南節度使韋正貫碑一首昭義節度使辛祕碑一首魏博節度使田公神道碑裴抗理天地者隂陽統邦國者文武才得其位政由其理則元后作聖九有以寧其或組暫解而復維運偶否而終泰是以周十世而生方叔唐八葉而傳太傅保乂藩服昭宣王度嘉言大猷鬱為國禎太傅諱承嗣其先有媯之後自敬仲奔齊五代而昌因采田而氏焉異才茂德繼踵而至其後議郎疇哭劉虞墓讓盧龍勳義聲洋洋焯於古今公則議郎之裔今為北平人也曽祖堪隨州從事祖景皇鄭州别駕烈考守義皇安東副都護贈户部尚書皆恭肅明哲純懿貞良纂邁德之仁傳有後之慶公則尚書之第六子也元和間生其德直方剛毅中正根於天常鍾海嶽之靈抱清淳之氣幼尚擊劔長而事邊度山川之險易計戎狄之勇怯沉機潛運藏用待時開元中林胡犯邊公始以兵術聞節將急而求公乃假公平盧先鋒使即日以偏師敵之公大破夷落斬首萬計朔漠之人恃公為雄戎帥以捷聞特拜公左武衛郎將策殊勳也仍前平盧先鋒使擒俘斬首一月三捷戎陬氣懾邊徼塵清改左武衛中郎將遷左清道率拜左武衛將軍昭武功也天寶季年逆帥安祿山竊幽陵之甲以叛驅劫忠良易其守心跖犬吠主大肆凶逆料天下敵已唯公一人遂乃臨以刀鋸邀其質任爰授兵要置之腹心公迫以凶威計無從出竊謂所知曰昔龔勝閉口君房殺身無補於時自擠溝壑乃呼天飲泣忍死從權將圖不朽之勳以顯大忠之節時冦陷洛陽遐邇震駭大縱虜奪以弭凶徒唯公禁戢屬兵託以戒嚴他盜時大雪滿營間無徑術逆帥巡行諸部躬自勞寒至公之營疑其無人公乃介胄轅門出卒羅拜閲數伍籍不缺一人逆亂之徒尤加敬憚爰及刑獄取決於公寇逆亂常法令苛慘織亂詆告每陷忠良皆以阿旨入法為巳誠察理辨情為携二公將謀知免且欲雪寃每至議讞必歸情實至於免鼎鑊脫桎梏者不可勝數冀其違忤稍見踈逺而逆帥以為平允得當仁德歸厚信重奬助又倍於常其後賊亂鋒起互相吞戮祿山流膏安慶絶凶思明陷刀朝義傳首羿浞既平日月貞明公雲龍交感霖雨將作誓爾有衆同歸聖朝誠意克從大節斯立時代宗在宥天下降衷於人載覽歸欵特加誠順即日除户部尚書御史大夫莫州刺史復以莫州地褊不足安衆特遷魏州刺史貝博滄瀛等州防禦使公榮懼感泣澘然涕流荷天之休誓答玄造一作聖主中以狀聞上收其忠錫以旄鉞真拜魏博等州節度觀察處置等使初懷恩之討朝義也深結歸命之帥隂有一作畜將叛之心及恃功不虔逆節方兆虎據汾晉冦於太原乃分使河朔連扇羣帥邀我同惡示以師期羣帥獻欵決計於公公曰吾儕所以修睦僕固者將欲藩翰王室懷寧逺邇竭股肱之力報亭育之恩乃玩兵左道自任姦慝有死而已吾蔑從之俱精練成師以順王命臣子之職也由是羣帥感悟率德相從械繫行人顯與之絶暨聲問達于四境干紀之師索然氣奪是以懷恩喪子於榆次棄甲於西河北走邊庭埋魂絶域抑有由也蹈危而正可謂文武三傑精剛百練者也惟帝念忠拜公尚書左僕射賞有功也遷大司空旌有德也初公之臨長魏郊也屬大軍之後民人離落閭閻之內十室九空公體達化源精潔理道𢎞簡易剗煩苛一年流庸歸二年田萊闢不十年間既庶且富教義興行魏自六雄升為五府拜公為魏州大都督府長史仍加實封一千户以陟明也而緇黃耋耆詣闕陳乞請頌德褒政列於金石帝曰俞以命先臣門下侍郎王縉撰紀功烈錫魏人以碑之其明年請立生祠而尸祝之公執謙沖抑而勿許茂厥丕績秩遷太尉疇咨補職爰立作相公拜賜荷寵若墜泉谷誓將率先啓行斬伐不臣殄彼昆夷復我河湟然後挂冠都門告老歸第嗚呼有志不就昔人所痛致君之道未展大夜之期俄及大厯十三年春二月遘天倫之戚茹痛而疾秋九月甲午薨于戎府享年七十有五天子悼舟楫之沉覆邦人號榱棟之崩摧罷輟市朝哀慟中外諫議大夫蔣鎮册贈太保臨弔􅉠禮有加等夫人富春孫氏齊莊之德備矣開越國之封列魚軒之貴降年不永先公即世其年十二月十四日得吉兆於魏州貴卿縣金隄鄉吳河里之原遷夫人之殯歸同穴之期而祔焉禮也公孝敬忠信慈仁睦友造次顛沛一以貫之在家如嚴君撫人如慈父違其子而進猶子逾十起之愛傳八命之榮則宋穆不獨賢伯魚有慙德積載餘慶並時而昌胤子十一人長子維皇魏州刺史次子朝左神武將軍知軍事檢校右散騎常侍兼御史大夫三子華皇太常少卿駙馬都尉尚永樂長公主永樂薨復尚新都長公主贈工部尚書四子繹皇試大理評事五子綸皇監察御史裏行七子繪八子純不幸早世九子紛皇河南參軍十子紳殿中侍御史內供奉十一子縉殿中侍御史內供奉皆文武奕世忠孝傳家或至大官或階清級誕生檢校尚書右僕射同中書門下平章事駙馬都尉鴈門郡王襲實封五百户贈司空緒則公之第六子也纂承鴻勳不忝前烈開戚里之貴繼茅土之封繡轂朱輪光輝日新聖朝覃孝里之恩軫聞鼙之念復追贈公太傅復贈魏州大都督相國蒸蒸孝思霜露增感復以生祠故事具表上聞天子彰善崇德乃許追立爰命詞臣禮部侍郎吕渭徵撰休烈厥功茂焉相國生工部尚書兼魏州大都督府長史御史大夫充魏博相貝澶衛等州節度管內度支營田觀察處置等使季安繼踵象賢克荷丕構玉立氷潔孤高不羣駸駸逸足長途萬里勳賢接武今古罕倫嗚呼開國承家之義顯矣翼子謀孫之道光矣沒而不朽非公而誰抗賔事戎麾出入三世目覩芳躅耳聆嘉聲不愧之詞誠非諂上敢刋樂石傳於無窮詞曰維嶽雄氣鍾于崆洞委和孕靈降生我公於惟我公其德崇崇處暗不昧在明則通其一運屬昌時功居顯位天子命我蒞于東魏榮傳曵履寵拜端揆乃領司空俄登太尉其二爰立作相俾屏我王訓節制師威不庭方為國之紀為人之綱教義聿修德音孔揚其三上天降災奪我元老邦國殄瘁誰云夀考梁木其壞嘉言是寶隴月阡松荒煙蔓草其四墮淚碑在生祠廟存澤流福子慶被孝孫日下甘棠風清德門刻此金石傳芳後昆其五嶺南節度使韋公神道碑蕭鄴韋氏之世系尚矣陶唐氏之後有國豕韋者實為商伯周衰遷于楚之彭城故漢興韋孟為楚元王傅繇孟五世至丞相賢韋氏遂顯大賢封扶陽後徙平陵及子玄成别徙杜陵子孫家焉遂為京兆人云玄成生寬寬生育育生後漢尚書令浚浚生梓潼太守豹豹生東海相著著孫胄仕魏為詹事胄少子曰穆後著號為東眷八世至隋郁城莊公諱元禮距四嶽入唐有為陜州刺史者諱嶽子於公為曽祖是生京兆少尹河北採訪使府君諱恆為王父少尹生贈刑部侍郎衡州别駕府君諱平奉天之難冦兵圍逼時鳳翔已害其師張鎰且應賊矣公與從父弟臯能扞朱泚于隴州斬其使者乃折其勢公乃間行西走奉天夜縋城下蠟丸發表具獻功狀德宗把手喜泣曰富貴惟卿所欲口授御史中丞公辭以素卑無資願從州縣祿竟遂其志改萬年尉從上至興元道苦風疾廢居優遊散地既慊當世其後宜有達人娶彭城劉為麟女而生公諱正貫字公理幼而神靈一作玲瓏長而聰異目所擊覽不忘於心耳剽音聲洞識節奏季父太尉公臯特見器屬且必能大其家門故名之曰臧孫年十有五先君歿於衡陽奉喪歸北裴僕均在江陵故少公為表弟欲擅有外家吉凶之事且致贈焉公泣曰不專於孤有諸父在如將聽命恐傷叔父之義不敢拜賜之辱蜀使俄至他日反告太尉深德異之既除喪調補單父尉太尉有大功于國家德勢甚盛韋氏子姓可以坐掇朱青公深自懲刻遂博極羣書自三代已降損益制度無不稽其典要相國韋公處厚及韋湖南詞皆以學識相高每與公論𣙜當世之務咸服其深切事情雖賈生不能過也長慶初遂棄官改名對賢良極諫䇿登乙科授太子校書敬宗朝又以華原縣尉再登詳間吏理科遷萬年主簿考京兆進士能第上下頗得一時之俊尋授監察御史裏行為北都留守推官入臺為真監察避同儕素嫌辭不與齒除河南府司録旋為天平軍節度判官得改員外郎所奉之主即故相國令狐公也丁內艱服闕故李相國紳請為浙東團練副使賜緋魚袋後辭職居洛授檢校主客郎中知鹽鐵福先院非其好也擢萬年令澤州刺史又改太原行軍司馬兼御史中丞加金紫從狄僕射之幕徵為太府少卿改泗州刺史歷光祿卿晉州刺史入拜司農卿時內尚食供億縣官有闕為其奏纍貶均州刺史升夀州團練使公當官剸劇率有良算雖繁劇之來千變萬態一以成機應之故日用公事圭稜歲校能有餘裕所謂循良高妙無迹可尋者耶今上初即位以裏行徵拜京兆尹京師稱難治者日有生事隨時抵巇間不容髮未易以繩墨一面律也闊狹少失其機則見立敗雖有神明之用一作明無及已公能勺藥其間妥一作安然無一事如弄小方州云奉南郊備赦令上下百役抑揚豪弱無不得其平居二年乞退除同州刺史長春宫使加左散騎常侍兼御史大夫百粵之地其俗剽輕獵浮淫之利民罕著本又逺天子之法稅調裒急一舞於吏手故細胥假校益豪民用是困從公至鋤侵牟之窟削冒名之吏盡反為民煩促頓舒流庸盡復先是海外蕃賈籯犀象貝珠而至者帥與監舶使必摟其偉異而以比弊抑賞之至者見欺來者殆絶公悉變故態一無取求問其所安交易其物海客大至越人尚鬼事有置冥者不質於醫而交於神寢以成風公醜其邪命撤屋塗扉禁絶紛紛之禱或曰將不利於公不聽他日秋水大溢將沒民居訛言毀神而致公撰服登城向水酹酒而聲曰苟如云云長史身存無嫁下人俄而斂退卒無害焉針盲反正皆此類也政成亟上疏請覲優詔留之越三歲寢疾薨于位實大中五年七月二十三日享年六十有八天子為之不視朝一日贈工部尚書明年二月庚申祔葬少陵原之世墓比薨醫問相屬比葬弔贈之使交逢凡在嶺之南軍吏與民及部屬鰥寡士子魋髻之族聞公之喪皆哭失市與宴闕篤孝睦親羣昆弟之貧與子姓之孤者收接如歸婚配慰薦惟恐不得其所居弟誨之喪傷哭變白惻動君子與朋友盡誠信於然諾踐報之道不怠如癖名人偉士多與深善樂後雋特露精誠比比得之力仁誼懲華侈下席一作疾之日家無池館疏屬出涕平生行事可知已娶監御史博陵崔升女先公而歿二子長曰參文太子校書次曰溫文華州參軍一女始歲方大病囑其後曰無厚葬無用鼓吹無煩諡于有司志我墓者無如故人趙君檜焉若夫碑則俾我外姪蕭鄴為之銘庶乎實而詳也其敢以辭遂為銘曰雄操京兆奄宅大州太尉之後唯公得侯儒衣極摯公慊人優業術益然及親勇誼善植牧全始卒無愧融鴻清洋式彌乃嗣兹圖石刻以永厥懿商伯以遷汪洋其源至漢始著聿為盛門徙居杜陵承繼遂蕃用儒持家世世顯尊歷隋入唐或軒或庳起墜誠難肖隆匪易尚書之生實屬音燭太尉之後此句疑誤有庸有基可席而位公獨後之刁孑自致追念顯考詘于其身如不我力曷顔于人由卑至巨能以才振小大之治有脊有倫昭義軍節度使辛公神道碑牛僧孺辛氏於隴西為望家其後因官從帝或雍或洛源濬𣲖洪將微復張以及于僕射皇考璿璿益以儒業自喜優遊高放不樂取求制科高第乞官山水朝廷除處州遂昌令嗜不念歸再移仍南及亡纍贈至左散騎常侍僕射諱祕字藏之即常侍府君第四子也以能通五經開元禮三命至華原主簿書判入等為長安尉太常卿故丞相渤海高郢以唐制盡將禮樂委博士奏乞用公朝廷與之不能得去訖六年再為祠部兵部員外博士猶如故朝有禮天地奉山園之使既謝上必奏曰臣唯乞得辛某自副幾不以禮樂纍陛下上高之連可故公再為禮儀使判官雖當時耆年鴻生語及禮即唯曰辛某在若不敢出口元和皇帝初元年高選刺史公出為湖州時觀察使李錡不奉詔舉江南六州兵獲京口窺采石渡臨江索流因命心腹將率壯士高職重賄鈎其膽且約曰若等當以其日同起取五刺史欲斬以號令在錡鎮實多年交有素故刺史不得𨽻兵馬及難作顔防用李雲驅市人舉常一戰敗走李素受縛於蘇項釘船艎唯公以儒雅賊未急迫公乃夜起撫左右曰使若等有父母妻子成其家皆天子恩也若能隨李錡為賊乎左右皆泣曰唯公命乃開羅城門收湖下子弟得人數百公親以衣衣之以食食之蒸里掩出劘壘始呼大戰州東斬將屠營值旦悉先殱登城號令中外恬然於是時武功冠江南錡為之失勢就縛天子親命使以金印紫綬賞公急詔徵為河東軍司馬兼御史中丞其實將以大將節與公以故未畢就拜為左司郎中更京兆汝州刺史本州防禦諫議大夫出為常州刺史治職檢身專疑問昭升取河南尹時天子大舉伐趙既釋復征司空度率五諸侯取蔡連戰四年伊瀍之郊屬刻百役公撫困應須怛怛寧寧上大喜出少府節以豹竿戟纛驛走就授先一日立百辟於朝讀白紙詔命公以昭義軍節度使潞州大都督府長史檢校工部尚書兼御史大夫公褎衣儒冠帶劒持節潞自盧從史不稟不供急斂自守人已大罷及柏鄉連營三歲決死公之至止開城入府量倉數藏酸寒護落公私之具盡可哀痛左右前後計於公請乞救於上公曰天子以兵定殘賊空內府賞死士於今數年矣吾不能如卜式輩以家助獻詎敢復以請求苦上耶於是約出入嗇用度俸不入家聘不賚金宴不侑樂食不兼豆更四年詔徵府有貫十七萬食倉有斛七十萬刃銛函堅幟赤幕青十五年冬行於洛及關以疾不任朝覲天子命中貴人郊勞歸第以十二月已卯薨享年六十四上憫惜震悼罷朝贈尚書左僕射贈賵有加公於得入仕以業儒書於得著名以典禮樂於得勳賞以立武功於善終始以謙退勤儉於中外親既有名而貴於屬且近者餉給無所加踈而賤雖千百里曠不相面頒與無所加疑大官十五年居不易宅死亡之日家不歲計公之於孔門可謂成人矣子男八人少穆少逸少恭長順仲雍行質仲和行檢或儒或文仕遍侯國夫人河東裴氏先公而卒將葬而公歎曰人之居無常而墳墓因焉吾家之兆及於四代三卜矣且使吾死有吾豈止墓而守者焉吾死無吾於地固無擇而已矣他日吾死於此亦遂葬而無用遷焉遂定乎萬年縣洪原鄉少陵原及將亡前為文自志其墓又重前説歿有書一通緘置几上既開之即送往飾終之制具盡於此既儉而周於禮不違時之名人無不多其能終而達其不撓耳諸孤恭命無敢墜失既一作暨葬會謀曰先人德行官業冝刻於石以聞不朽隴西牛僧孺時號專業文陳郡殷台書迹絶妙且其人吾家之壻且練吾先人行事敢不告求僧孺實紀録而台實書既序而銘曰禮災秦漢於綿蕝存晉卑劉僣俎豆禮傾慕古惟唐求野據經公嘗博士綴輯搜尋三代之儀濟濟復興祗職六年區别嚴競儒道克施亦志武事慿江錡反公實郡吏掉棘張空以出不妨萬鳥周網血赫湖塘江南之功焯出有光鄒魯諸生因公張皇憂恭慎法奉守王度入郎出牧尹洛將潞茹剛撫弱銷剔人蠧居不易第服不易初財分先族以儉遺孤恬於將終執筆自志男良女淑既夀而貴謂之為人易此而何詩以備傳不朽不磨文苑英華卷九百十五
