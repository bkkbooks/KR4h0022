body:
  text: 文苑英華卷五百六十一宋李昉等編賀祥瑞一為西京百官賀老君見表一首賀老人星見表五首為汝南公賀彗星不見復正殿表一首為成魏州賀瑞雪慶雲日抱戴表一首為百僚賀雪表一首為定王賀雪表一首為納言姚璹等賀雪表一首為宰相賀雪表一首中書門下賀雪表為京兆韋尹賀元日降雪表一首為百官賀雨請復膳表一首賀祈雨感應表一首中書門下賀雨表六首為宰相賀雨表三首為西京百官賀老君見表崔融臣某等文武官若干人言臣聞至德之運必有告聖之符大道之行必有通一作神靈之應故虞舜氏作五老出遊於河渚周武勃興四神來朝於洛邑伏惟皇太后陛下補天為感配地居尊體國經野肇建惟新之業應天順人果得非常之事伏見某日勑虢州閿鄉縣界老君見并授塢𤣥宗語皤一作皓然鶴首至哉龍德若遊渦水之年疑往流沙之路叙皇威之有截論國祚之無疆道可以濟天下功可以侔造化𤣥言妙鍵關令受教而先迷神理希微河公願談而莫測方驗老人見於南極但謂承天黃人遊於後池止云乘土固不可同年而議也臣等預睹嘉祥早參簮笏惟神降福欣承帝系之隆惟德洞冥願奉𤣥元之慶無任感恱之至謹附某奉表稱賀以聞賀老人星見表武三思臣守節等文武官九品以上四千八百四十一人上言臣聞惟德動天必有非常之應惟神感貺允屬㑹昌之期天鑒孔明降休徵者所以宣天意神聰無昧效嘉祉者所以贊神功故黃一作赤鳥白麟載稱姬漢之日𤣥圭黑玉式昭禹湯之代伏惟天册金輪聖神皇帝陛下潤色丕業光赫寶祚執大象而御風雲鼓洪爐而運寒燠浹洽四海輝華六幽希代符來超今邁昔浪委波屬故合沓而無窮日臻月見尚殷勤而未已伏見太史奏稱八月十九日夜有老人星見臣等謹按黃帝占云老人星一名壽星色黃明見則人主夀昌又按孫氏瑞應圖云王者承天則老人星臨其國又春秋分候懸象文曜鏡云王者安靜則老人星見當以秋分候之懸象著符於上人事發明於下夀昌者知億載之有歸安靜者示萬邦之必附澄霞助月非唯石氏之占散翼埀芒何獨斗樞之說臣等謬參纓笏叨目禎祥慶抃之誠實倍殊品無任踴躍之至同前楊憑臣某言伏聞太史奏昨八月十五日夜夀星見奉敕宣付所司者伏以三光在天垂象以昭德一人御㝢應運以發祥將後天而奉時遂瞻星而稱夀九重納慶萬國同歡中賀臣聞聖王握乾以繼統輔德以垂休則必焜耀耿光昭宣景福歷考圖牒皎然明徵謹按孫氏瑞應圖云老人星見人主壽昌陛下丕承寶厯光宅天下恢𢎞聖烈允執大中化成而天道不遠一作違感至而星精介祉是以去嵗已出今秋又見光靜而明當井絡之端色黃而潤叶中方之位降兹靈貺實契福庭帝圖表無疆之休史册傳萬祀之慶臣生逢聖代幸覩昌期以藩鎮守土不獲奔詣闕庭稱賀北望宸極倍萬恆情同前令狐楚臣某言當道進奏院狀報司天臺奏八月十五日乙亥夜老人星見於井東色黃明潤勑旨宣付所司者率土共觀際天同慶中賀臣聞天不言而星垂象次舍隱見其指甚明伏惟陛下道冠帝先恩覃物表太和之氣上達萬夀之瑞下呈既在井東又當秦分色侔蒸栗光掩連珠彰爾寶圖類堯年之河出延長聖厯齊漢代之山呼凡百臣下歡心如一况臣幸霑皇屬叨守國藩瞻望闕庭不勝慶抃之至同前張權臣某言臣聞惟德動天惟睿作聖既聖德格于上下故𤣥貺動于乾文天髙聽卑應猶影響臣得上都進奏院狀報司天臺奏八月某日老人星見於井東色黃明潤大者臣按文耀鏡曰老人星見則主安又熊氏瑞應圖曰王者承天得理則老人星臨其國中賀臣伏惟睿聖文武皇帝陛下德邁勛華道侔覆載武以勘亂文以化成然猶旰食宵衣憂勤庶政令動植得所㝢縣和平故上感絪緼發瑞辰象色黃兆土德之有慶見井表聖年之無疆昭昭垂休上帝允答求諸簡册光絶古今凡在億兆孰不歡抃臣限以祗守藩鎮不獲稱慶闕庭舞詠之誠倍萬恆品謹遣某官奉表陳賀以聞同前李商隱為滎陽公作臣某官臣得本道進奏院狀報司天監李景亮奏八月六日寅時老人星見於南極其色黃明潤大者聖惟合德神實效祥必垂有爛之文以表無疆之休臣某中謝臣聞𤣥象示人昊穹凝命曜為經而宿為紀則曰常名斗挹酒而牛服箱或標虛稱未若候時而出有道則彰居五福之先在三辰之列伏惟皇帝陛下昭明老契游泳莊寰集作環戒集作式是中秋呈兹上瑞况見於午位又屬寅時仰考𤣥符乃有深意自南耀彩將𢎞解愠之風近曉流光欲助無私之日皇心載裕靈鑒孔昭凡居率土之濵皆慶后天之夀臣誤蒙重寄實逺清光送𤣥燕於梁間傷時自切望集作數白榆於天上厥路無由賀聖戀恩無任蹈舞屏營之至為汝南公賀彗星不見復正殿表臣某言得本州進奏院狀報今月某日夜彗星不見宰臣某等奉表稱賀請御正殿復常膳者天道甚密聖心不遐感極而災亦為祥誠至而妖寧勝德臣某中賀臣聞殷湯以六事責躬止七年之旱宋景以一言修德退三舍之星歷代以來咎徵常有茍君能克已則禍下移人伏惟皇帝陛下寅奉丕圖恭臨大寶尊符列聖酌憲前王昨者天象之開星文稱異載深歸咎爰用覃恩倉箱集作請畢復於九年羅網併開其三靣去營繕絶蕩心之巧申寃結除滅耳之俘而又正殿不居大庖盡減精誠昭逹懇惻敷聞芒熖遽銷晷度如舊况蕞爾戎羯正犯疆場載思星見之徵恐是滅集作虜亡之兆伏惟稍寬聖慮以擁皇休遵九廟之降祥副兆人之欽屬臣又聞皇王之事業也雖至理之時不遺於憂畏集作惕雖至和之氣不忘於將迎是故神農焦勞軒帝憔悴堯既癯瘠舜集作禹亦胼胝此四主側身於昔時陛下用心於兹日千載符契萬方懷柔臣嘗忝內朝今居近甸拱辰不及空瞻北極之尊就日無因忽覺長安之逺唯知抃蹈莫可奮飛况時及初正禮當元㑹華夷畢至玉帛皆陳小國行人外藩下士皆得入趨鳳閣仰望獸樽臣獨限關河坐縈符竹戀既深而詞懇慶已極而涕零無任感恩賀聖鬱戀屏營之至為成魏州賀瑞雪慶雲日抱戴表一首臣某言臣聞𤣥德上升三靈為之動色聖功下濟萬類所以傾誠臣州去秋之間時雨不足自陽風應律子月經年今月十二日晚降雪越至十四旦開霽絮飛千里花翻六出糅初梅而委苞封宿麥而垂津其日晡時西南有慶雲見為樓為閣圖閶闔之九重非錦非繡狀衣裳之五色其時又有日抱戴日晚澄廓天景淑清拖黃氣而重圍舒紅光而四溢臣與司馬樊𤣥則并寮屬吏等三十餘人得所部貴鄉冠氏等縣申稱雪厚一尺以下并覩慶雲抱戴等瑞臣謹按詩云上天同雲雨雪氛氛毛萇云豐年之冬必有積雪若烟汜勝之書云雪者五穀之精又按史記云慶雲一名卿雲若烟非烟若雲非雲郁郁紛紛蕭索輪囷是謂卿雲喜氣也瑞應圖曰景雲者太平之應也一曰慶雲非烟五色氤氲謂之景雲援神契云天子孝則景雲出游又按援神契云王者德至於天則日抱戴在上曰戴在傍曰抱又云黃氣抱日輔臣納忠漢書曰宣重光李竒云太平之代日抱重光伏惟陛下受天寶命冲用情深豐食之要鑒寢憂勞雪為五穀之精麥為六田之首由是天降瑞雪其意若曰太平其有年乎雲者運氣立名布恩成義陛下仁霈草木惠及蟲魚揚宗祖之烈光垂天地之正色由是天降雲瑞其意如一作若曰天子其大孝乎日者衆陽之宗人君之表由是天降日瑞其意若曰天下其大明乎魏州大明之慶基光封之舊國嘉祥備致靈貺綢繆豈徒然哉斯有由矣臣叨陪漢守肅奉堯親逢日月之貞明嘉烟雲之爛漫手舞足蹈地雖限於外臺按牒披圖心已馳於雙闕不任感恱之至為百寮賀雪表李嶠臣某等言臣聞至道充被而冲和感發𤣥化沉潜而祥物昭應伏惟皇帝陛下合德天地齊光日月陶正氣之氤氲降元符之肹蠁用能經緯六合驅馭百靈垂旒法宫而品物清宴疑作晏揆景中土而風雨休若三元肇革九陽初動撞黃鍾而布氣順𤣥𡨕而率職曾隂候律豐澤順時薈蔚方興起太山之膚寸參差荐委自平地而盈尺銅街浩其如素金隄紛其遂滿縈樓棲檻凝璧臺之九重落絮飄花似芳林之二月豈唯洛神呈象來舞帝宫故亦海騎相趨下朝仙闕東臯欣而望嵗南史慶而書祥萬寶登秋居然可詠雙銅叶唱即事非遙自非睿感通微乾心輔德何以降神靈之滋液發兆庶之歡慶臣等恭承𤣥造沐浴太和欣聖澤之滂沛對天休而踴躍無任鳬藻之至謹詣朝堂奉表稱賀以聞為定王賀雪表臣某言自涉隆冬頗虧甘液皇情眷佇聖德憂勤愍囹圄之罹愆念祁寒之在節爰發恩詔親慮囚徒絲綍始行寒光已布德音才降同雲便飛落絮飄花與新梅而競彩凝光吐艷共霄桂而連輝俄盈九域之中遍灑四瀛之外遂使狴牢式舞布霈澤於三天畎畝長歌佇豐年之一作於萬庾報應之速固影響而無違慶躍之私在臣妾而何極無任欣抃之至謹奉表陳賀以聞謹言為納言姚璹等賀雪表臣某言自𤣥𡨕授節素液未流宿麥翹滋陳根俟拔聖情回眷天造曲成載想狴牢有矜幽滯方臨聽訟之觀且閲明刑之書中旨才宣上𤣥俄應沛乎降澤油然興雲凝瑞色於千里散禎祥於六出積素彌晝下集於瓊臺飄花滿空旁霈於玉樹海神奔走而來賀田畯謳吟而共舞靈心昭發事速於置郵聖意𡨕通有同於合契臣等謬當樞近親覿休祥抃躍之情實百恆品無任欣慶之至謹奉表陳賀以聞謹言為宰相賀雪表孫逖臣某言臣伏見自冬已來雨潤微少雖春候尚逺未足為災而聖慮憂勤恐妨農事靈心允答瑞雪其滂自昏逹明已覩於盈尺無逺不及何止於千里既溥既霈足表西成之徵不疾不徐正符東作之候豈伊利澤更是殊祥臣等微生叨荷榮渥幸覩休慶空知抃舞無任欣躍之至謹奉表陳賀以聞中書門下賀雪表常衮臣子儀等言臣聞聖人昭事以奉時乾道下濟以成物伏惟寶應元聖文武皇帝陛下勤勞庶政憂濟萬邦念生靈之未康慮兵食之不足恭默寅畏齊于穆清減膳撤樂以祈𤣥造天人合應雨雪呈祥在登臺視朔之辰飄灑盈尺俯獻嵗發生之節飛舞驚春太素混成浩然萬里甲子之瑞載表於昌期春秋所書亦先於農事重隂益固應水澤腹堅之時積潤潜通迎土膏脉起之候靈貺斯在豐年可知佇登來牟不暇祈穀侍臣相慶野老同歡臣謬奉中樞獲覩嘉慶無任抃躍之至謹奉表陳賀以聞臣子儀等誠歡誠喜頓首頓首同前權德輿臣某等言臣聞王者布令以時應天以實惟兹瑞雪用兆豐年伏惟陛下齊誠念人振廪恤隱同雲斯兆集作應宿麥可期以五穀播植之精驗於農志當一陽發生之候助此休徵感通不違朝野相賀臣等謬居近侍獲奉昌期無任欣抃踴躍之至謹奉表陳賀以聞臣某誠歡誠喜頓首頓首謹言同前臣某言臣聞天道下濟聖心上感以是欣合發為休徵惟兹雨澤之祥必稽時令之順伏惟皇帝陛下憂勞庶政勤憫蒸人寢寐之間不忘於念慮賑恤之使相繼於道途膚寸興雲盈尺呈瑞以來牟之積潤為嗣歲之順成如京如坻百嘉可望既霑既足率土同歡臣等忝列侍臣倍百欣賀無任慶抃踴躍之至謹奉表陳賀以聞臣某等誠歡誠喜頓首頓首謹言為京兆韋尹賀元旦降雪表劉禹錫臣某言伏以去冬以來久無雨雪臣每於殿內親奉德音以宿麥未滋為虞以兆人生憂集作病為念聖情所屬神理潜通獻嵗發春佳雪肇降當夷夏㑹同之日觀天人合應之徵集作期迎喜氣於三光浹歡心於萬國癘集作疹疵永息豐年集作阜可期臣以疾疢未平趨步有阻伏望恩貸已具奏聞謹於光宅寺中勾當本務不獲隨例稱慶明庭既覩嘉祥益彰聖德無任欣躍屏營之至為百官賀雨請復膳表崔融臣某等文武官若干人言臣等聞太平之代天地合而流津至德之時隂陽和而布澤所以三農滋殖百物阜安伏惟天册金輪聖神皇帝陛下寶命絪緼𤣥期肹蠁包混元而建極宅造化而開階德教布濩仁聲洋溢增髙益厚已修中嶽之儀順時班令更緝正陽之禮近以少愆甘㴻親發至誠懷宋景之一言採殷湯之六事德音才降靈心允協捧瑶緘而風起迎寶字而星流雲不崇朝復三千之藥草雨必以夜通百億之江河遍髙下而同霑在公私而並及陳留雨穀譬此非多櫟陽雨金方斯未重邦國延有年之慶黎元罷望嵗之憂臣等中賀伏願陛下凝神保和頥情養夀復鮮庖之舊膳進鶴鼎之常羞使芝英有駐液之期萐莆知送凉之地則光天之下率土之濵孰不欣戴孰不幸甚微臣等幸逢休運預沐恩波混虞獸而同歡比齊禽而纍抃無任悚荷之至謹詣朝堂奉表稱賀賀祈雨感應表張說臣某言臣聞水旱常數堯湯固有聖賢之理恭潔為難自冬踰春積陽成亢陛下以時災繫政人患由君退巫女之雩却應龍之請陛下躬自暴露炎景瞻仰雲漢推心引譴為人受咎誠既發而動天言尅期而降雨今已霖霪三日澤漏重泉草樹含欣郊原變色加以雲平雨細氣潤風和豈唯優渥王畿必將周遍天下羣心舒釋聖情開暢無任萬姓歡恱之至謹奉表陳賀以聞中書門下賀雨第一表常衮臣某言臣一昨奏封親承聖旨以旬期少愆春雨未降雖去冬積雪宿麥頗滋閏年之候農耕未晚再當薦鮪之月爰及禁火之辰紫陌揚塵青郊晦色日勞聖念恐失人時䖍於龍堂親行齊禱德音朝發甘澤夕零霡霂散於城池芳菲遍於草樹四逺皆浹羣情共歡昔在聖人祭則受福必以精意通於神祗伏見陛下每發聖心未常無應與天合德所感昭然慶恱之深倍萬恆品臣等無任欣抃之至第二表臣等言臣聞王者應天以實禮神以誠則其祥大來所榮必速伏惟寶應元聖文武皇帝陛下端命上帝隂隲下人大哉洋洋發育萬物一風一雨必輕疑作經於憂勞惟精惟微久存於齊禱自立春之後膏澤頓滋宿麥方蘇首種不入百穀皆賤羣黎稍安屬盛德在火之辰恐散陽流輝之亢小愆旬候則失人時乃命尹京載明祀典飭三輔之屬吏修百縣之大雩陛下又於龍祠躬自祈請雖田事未廢而皇情過勤意才發而氣蒸令始降而雲合寧止西郊之密且有南山之隮霈然時行丕冒海表浹辰而霽更說羣心擢芒之蕃將豐於時薦流根之潤佇合於秋成固使我倉如陵萬億及秭軍國是賴朝野同歡多福殊休莫盛於此臣等謬塵樞近喜倍恆情無任慶抃之至第三表臣某言臣聞春秋龍見而雩以其盛德在火萬物炳然陽驕而旱也周禮所以修一縣之大祀命三公以卜郊則知古之勤雨首於是月蓋聖人順天以垂訓王者奉時而告䖍伏惟寶應元聖文武皇帝陛下憂勤庶政寅畏上𤣥全萬物而曲成恐一夫之不獲嘉生是降率土皆禳又自春以來膏澤相繼禾方長茂猶潤纎莖麥且耀芒仍涵秀色及純陽用事流輝是憂未見旬期已勞聖慮勉農祈穀合樂圓丘感上帝之儲祉顧蒼生之禔福祭之明日夜合層雲微風既和震電一作雷不作靄然四合滂灑終朝動乾坤而滿盈洽隂陽之化育郊原益茂田稚皆登俯觀秋至之收佇廣嵗成之望自朝及野咸慶時和比肩鼓腹空迷日用臣謬參衮職久荷鴻私仰聖澤之無涯愧生成之未答無任抃躍之至謹奉表陳賀以聞第四表權德輿臣某言臣聞王者以誠愛人以德動天則交感不違庶徵時序頃自春澤愆候上軫皇情協用五紀憂勤六事暨純陽之節雩禱是修齊心勞慮恤隱宥過雲觸石而興潤月離畢以呈祥南畝就功西成可望含哺鼓腹幼艾相觀集作歡見聖人之化育符上帝之隂隲臣等忝列台司喜萬恆品無任慶抃踴躍之至謹奉表陳賀以聞第五表臣某等言百穀所仰甘雨是資三務成功望嵗斯切雖閠侯頗晚農耕未遲而時澤稍集作小愆皇情所軫齊禱上應集作感隂陽以和遲興有淹之潤方茂如茨之稼况霡霂未已公私必均叶聖道之休徵副𤣥功之育物臣等職叨樞近喜萬恆情無任欣賀踴集作抃躍之至謹奉表陳賀以聞臣某等誠惶誠恐頓首頓首謹言第六表臣某等言臣聞聖人之德與天地合則庶徵時若生類昭蘇伏惟陛下慈愛元元統御集作燭萬物憂在稼穡切於登成慮甘澤之愆期憫蒸人之望嵗誠之所感天且不違有淹而興覩一夕之霑洽大田相慶知百穀之阜蕃農夫克敏秀者皆實蓑集作臺笠就緒倉箱可期逺邇幼艾欣歡鼓舞臣等繆當近侍喜萬恆情無任喜抃之至謹奉表陳賀以聞臣等某頓首頓首謹言為宰相賀雨表孫逖臣等今日見髙力士伏承陛下以春雨暫愆皇慈軫念特紆鳳輦俯詣龍祠祝之以聖言詰之以神理靈歆允答膏澤遂盈速若影響合如符節則知聰明之德與乾道而潜通變化之功隨聖情而廣運殊祥昭著丕應難名在於微臣倍深慶恱伏望宣付國史以揚天休無任抃躍之至謹奉表陳賀以聞同前臣某言臣等伏見近者微旱聖情勤勞躬狗物情修禱祀於神明焦思憂人罷歡宴於良節精誠懇至上應𤣥通果叶休徵遂成膏雨植物皆潤已霑霡霂之恩隂雲尚多終致滂沱之澤三農有慶萬㝢一作國同歡臣等職在夑和效無㳙滴久勞聖慮責且重於丘山幸遇甘霖恩實濃於草木無任欣慶之至謹奉表陳賀以聞同前錢珝臣某等今月某日京兆府奏降雨分寸者伏以頃屬時雨稍愆聖慮憂軫尋舉祀典用禱𤣥功臣聞廣覆無親明德是輔誠之所動天則不高仲春以來驕陽頗熾宵旰勞念生靈具知部樂空縣常羞盡減遽陳牲玉並走山川况便殿坐朝深形憂色不責輔臣之咎恐貽赤子之憂槖籥之間神祗咸聽既有聲聞之實寧無昭報之期是以靉靆忽興蜿蜒遂作固得逺踰關輔匪獨周布郊圻君必動天嵗有成於登麥臣雖充位力不足於為霖空喜滂沱敢言燮理甫田皆潤沴氣全銷信可律於豐穰更何求於符瑞臣等無任賀聖欣躍抃舞之至文苑英華卷五百六十一
