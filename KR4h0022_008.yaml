body:
  text: 文苑英華卷八宋李昉等編天象八老人星賦二首五星同色賦四首衆星拱北辰賦二首衆星環北極賦一首老人星賦郗昻魯大夫登大庫觀上玄端北辰以正象望南極之穹天辨列宿之高映見丈人之獨懸色熒煌以奪目形皎潔而臨邊候德至而浮彩副時和而應躔爾其玄烏司分蒼龍御厯節春秋而隱見當丙丁而的爍且遺光以表慶亦應祉而純錫故經曰其國泰其星明天垂象物與禎循晷度而靡替順璇衡而則呈其座也一符帝者之一位其義也夀契蒸哉之夀名玄武宵中偵西陸以凝質白藏氣杪直南郊以散精夫有開必先無福不應若政事中律則嘉祥叶證五緯分影而交朗九月騰華而吐孕此乃王澤宏天瑞作恆星轉耀而同煥布景搖輝以相薄初升穹昊月午而孤燭猶燃末映踈林夜久而圓珠未落景貺繁集靈機衆夥臣望氣以敷奏君向陽而拱坐雖戬榖而自天實休徴之在我騂芒下射滅草莽之飛螢紫焰傍融掩榆關之流火老人彰矣成此乾文老人出矣贊此明君書玉牒以垂範紀緗圖而播芬自古為天官者莫不察時變紀殊尤唐昧擅譽於南楚史佚專美於西周宋則子韋遐鑒鄭乃禆竈深求殷馗縱眺識曹公之肇迹李郃凝目知漢使之將逰余非曩昔之羣彥愧懵學於前修徒循甘石之遺旨願獻祐而歸休第二楊炯赫赫宗周皇天降休麗哉神聖皇天降命開綱布網發號施令河出圖兮五雲集天垂象兮三光映南極之庭老人之星煜煜爚爚煌煌熒熒秋分之旦見乎丙春分之夕入乎丁配神山之呼萬嵗符德水之兆千齡晃如金粟粲若銀燭比秋草之一螢狀荆山之片玉渾渾熊熊懸紫貝於河宫曄曄暐暐曜明珠於漢水其光也如丹其大也如李稽元命之攸述按星經之所紀見則化平主昌明則天下多士經始靈臺嵳峩崔嵬星則唐都講藝氣則王朔呈材晝觀雲物夜察昭回覩南郊之炳耀欣北極之康哉三公輔弼庶官文武獻仙夀兮祝堯奏昌言兮拜禹瞻太霄而踴躍伏前庭而俯僂萬人於是和歌百獸於焉率舞穆穆神皇受天之祥邈矣台州之北窅然汾水之陽貞明也者日月同光貞觀也者天地為常有混成之獨立運元氣之茫茫若夫大虹流渚金天當寧大電繞樞軒轅受圖殷馗則黃星見楚雷煥則紫氣臨吳青方半月東井連珠辰極之齊七政泰階之平六符雖前皇之盛德又何以加於此乎至若甘露溢醴泉出蓂莢生嘉禾實鳯凰丹彩騶虞白質南海無波東風入律比夫皇穹之錫夀何足以談其萬一聖上猶復招列仙擇羣賢日慎一日玄之又玄兵戈不起至德承天臣炯作頌皇家萬年五星同色賦以昊天有成命為韻張叔良聖人守公器膺大寶下順乎黔黎上法乎玄造天且不言而親於德星有同色兮應以道日月既運欃槍必掃近接唐堯遠徴太昊惠化已敷於萬國降精何慙於五老若乃二儀覆載七曜回旋運行有凖次舍有躔或以璧合或以珠連更水火之啓閉遞金木而推遷且鎮也者配萬象以時應周四序以功全德位居中渾儀之人事著矣色黃主上國家之王氣在焉故嵗以春而布令辰以冬而候宣熒惑奉炎於夏日太白御煞於秋天皆青白各爾赤黑自然忽與土而同色瑞我皇之應乾逖覽傳記遐徴休咎隂數六陽數九上蒼降精玄象所守事須合於往契政必由乎厥后二儀交泰兮自古同休五星輝彩兮當今信有天下歡洽百姓殷阜况運昌兮屬乎羲軒矧嵗稔兮逢乎申酉且夫據大號寶鴻名既資乎日角亦稟乎星精然後臻符瑞叶休禎天雖高兮取則不逺象既設兮其應甚明觀五曜之同質審四序之有成則知聖能法天天能瑞聖君臣合作逺近相慶德邁乎古今道洽乎歌咏信五星之一色乃昊天之眷命第二同前韻崔淙大儀設象下土是保作炯戒於人主垂吉凶於穹昊咎厥失政休厥有道盈縮之分足推進退之心可考或主德而有功必祐或主法而有罪必討為天之佐兮融融作乾之緯兮杲杲若乃從橫天宇經紀星躔光芒井口煜耀斗邉乍聚乍散或離或連分道則熒熒氷散周流乃點點珠圓其動也直其靜也專道濁則失位時清則色姸豈比夫二使獨能承命七紀徒為麗天者也今我后運乾之符握坤之紐表正萬方肇康九有啓土繼聖乃人和而嵗阜順時立政故天長而地久所以有倫有次不淫不守光光兮作邦之孚崇崇兮作聖不朽故我后修五禮偃五兵君臣一德歌舞以行斯倉斯廪如坻如京玉衡正太階平遂使金也水也不能知白而守黑木也火也不能全曜而自貞乃並用而丕變與黃中而同明東為四方之首胡不與嵗而同色水為五行之長胡不助神以同榮繄土也是我皇之休運乃昊天而有成且玉燭常明霜天若鏡鄰月魄而璀燦落天津而隱映朝臨日道助我后夙興之勤思暮入天樞表聖皇夜寐之勤政有以見日月之貞觀有以見天地之寶命暫逢急景之時更作重暉之咏第三以天下和平君臣合德為韻姚逖至道無偏隂陽至理象緯不愆爰或五星同色四序調年非天莫能輔聖非聖奚能動天列位有恆皆向北辰為拱偶運則聚寧惟東井見傳觀天文之元吉由人文而化宣爾其嵗星配春維德斯專五常仁也五事貌焉彼若仁無虧夫貌則終日乾乾熒惑紀於朱夏禮貴知於言雅受制之月每獨入於太微休咎之時則先標於分野發號不乖於火德庶績其凝於天下太白出處衆星異科西則隂星以夕見東則啓明以曉過係金為主用義方多政洽則義當政失則言訛蓋秋令之不逆俾金氣而能和辰象韜精用晦而明智克存而聽審冬令順而水清或奎婁而春見或角亢而秋呈既度數而有凖知乾化之升平中央稱鎮應土而分昔則各主方色今則同色垂文特感無為而理實彰有道之君稽乎漢志抑有前聞堯舜為主伊吕作臣時惟尚質俗以還淳六氣氤氲風不鳴于樹三光朗麗雨必降于旬豈惟七步而見祉蓋亦四夷以來賔感而遂通休徴薦答諒朝廷之嘉瑞表君臣之道合豈比夫河在天而虛橫斗建月而空匝宿離不忒實禎于國使七政之以齊何五行之相尅既垂象以昭泰可仰觀而取則因明試而賦斯敬頌聖人之火德第四以天下偃兵無為而理為韻林益惟聖御極兮惟德動天神超繫表兮功軼帝先和氣鬱以交暢休風裕乎上玄耀貞明於日月紛輕靄於雲煙九星不改而仰止五緯相次而燦然若乃嵗位在木辰見於水熒惑表火正之中太白應金方之紀鎮實土德黃為中美惟我皇之至聖信體元以合理萬國同風三光叶晷巖廊有謐垂衣之化炳焉蠻夷自清戢戈之日久矣帝有孚而昭應天何言而效祉登觀臺以書於宣夜徴瑞典載叶於聖期仰三辰之焜耀表六合之雍熙惟皇王之同德彰福應之允滋可以對越郊廟紛被歌詩瞻彼景瑞侯其禕而昭回于天垂象于下回列躔次遙通分野或表異於嵗登乃呈休於王者觀五行之秀氣與一月而齊明同色已傳於堯厯聚井更弭於漢兵足使皇圖有耀史牒增榮天凝兮瑞彩聖稟兮休符映天津乍疑於流火寫漢浦更類於沉珠煌煌則耀衡碧落歷歷則光含白榆惟列宿之自拱倬前古之所無夜何時兮其未返天之迥兮光已逺隨斜漢而影移落堯城之更晚星兮懸倚蓋而垂休伯也知靈臺之已偃聖上事無事為無為精流緯象繇入熊羆猶下弓旌之詔俾收岩穴之竒夫或不敏備謳歌於聖代與帝力之何知衆星拱北辰賦以人歸政德如彼衆星為韻李程為章于天惟彼辰極環衆星於庶位標帝座於有北故昭回之設象俾聖哲而取則鉤陳就列等營衛於宸宫閶闔旁連類藩屏於王國煥乎布彩儼若受職念精氣之無親叶天地之輔德仰圓象之炯爾嘉清輝之曒如昭明有融不韜光於隱晦悠久斯在豈隨運以盈虛戒彼不恆其德故能奠厥攸居當其天宇廓清玄緯交映若萬物之調玉燭猶聖人之握金鏡守寶位而厚羣生在璇璣而齊七政麗天之象拱北辰以是依率土之俗亦向化而無違契一人之有慶同萬姓以知歸不然何躔次縈乎黃道周廬匝乎紫微乍合彩以呈質竟同耀而分輝俾夫左之右之莫不具爾無小無大曷惟嘒彼考時變兮是察知天成兮在此仰觀或辨其晦明內附寧阻其遐邇是以纚連清漢點綴蒼旻流彩未停蜀郡猶占二使圓光既聚潁川應會賢人則知居之者安輔之者衆輻共轂不足以喻其周環斗在天孰可以齊其比諷亦猶元聖立極羣后來庭登三傑而漢道斯盛致多士而文王以寧倘匡聖之有日願在位於恆星第二同前韻邈矣辰極凝光於北以迢迢之逺狀出蒼蒼之正色蔭華蓋作上帝之居擁神休為下土之式厥髙可仰其儀不忒觀衆星之附麗如小邦之懷德至於遐瞻五緯迥眺九圍湛河漢之秋景滅煙霞之夕霏此則信無大而無小諒知彰而知微粲以低昻嗟在空而錯置煥而旋復訝共貫而知歸環紫極而未散流素月而方稀瞻夫攝提引翼鈎陳邐迤或重輝而玉集乍浮爍而波委儲精定位叶天步之廓然有耀逺方振旄頭而嘒彼且沖漠之外或盈或虛宵則觀夫成列晝焉測其所如是知惟辰得中同睿作聖合真宰之至理稟昊天之成命隂滋玉燭徒見𡨕其六符洞契璇樞惟悟齊其七政當其重城未啔永夜向晨想清防於嚴密披玄霄而得真俱熠熠以晶朗乍煌煌而彩新類珠連之可媚儼天行而自陳拱之立言孔氏已傳乎舊史犯而成象漢帝曽容其友人洎乎晷度環合躔次律中輻輳轂才可比其稠水會瀛未足方其衆蓋所以明上德之攸擬宣下情而通諷客有託身白社翹思青冥當天地交泰山川永寧敢屬詞而體物照庶士之從星衆星環北極賦以辰極鎮居衆星拱北為韻趙蕃惟極天之樞惟星日之餘日散精而外布天樞要以髙居的然守中昭上玄之道著爛兮繁會助下濟以光舒况乎有條不紊既明且踈雖貫珠而奚擬縱編貝而豈如周流無窮隨五緯之軌道運行有度參兩曜之居諸疑徐而速若動而息不騫不崩匪差匪忒俱遞遷而序别各有位而分職瞻言粲粲何三五之在東嘒彼纍纍亦四七而朝北是知統太一而為衆處天心而稱極故能總懸象之綱作垂光之則不然何以探天之賾何以表天之闢必得一以含默乃聚黃以修繹明夫據會者靜而處輔相者動而順靜乃常德不離動惟適道無吝然後衆星熠熠外辨方而不迷一極煌煌中居所而作鎮是以仲尼譬為政之德羲和時敬授之信則天道恆象人事或遵北極足以比聖衆星足以喻臣惟臣不矜德合星之夕惕惟聖不伐道配極之日新故得肅清黃道利貞紫宸豈惟大邦是控臨朝御衆而已實將先天稽極後極立經仰觀其動靜旁暢其儀形然後為政同乎北極向方類乎衆星斯乃先哲之臣是崇是奉臯陶所以邁德虞舜所以垂拱不然比衆星之環北又奚足以為重文苑英華卷八
