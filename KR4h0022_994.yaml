body:
  text: 文苑英華卷九百九十五宋李昉等編神祠一祭禜禡祭百神文一首祭名山文四首祭城隍文四首禜海文一首禜城文二首禜龍文二首禜浙江文一首禡牙文一首祭纛文一首黃州凖赦祭百神文杜牧㑹昌二年歲次壬戍夏四月乙丑朔二十二日丁亥皇帝御宣政殿集作樓非百辟卿士稽首再拜敢上仁聖文武至神大孝尊號于皇帝受册禮畢迥回集作此字御丹鳯樓因大赦天下咸告天下刺史冝祭境內神祗有益於人者可抽常所上賦以備供具牧為刺史實守黃州夏六月甲子朔十八日辛已伏凖赦書得祭諸神因為文稱讃皇帝功德用饗神云皇帝嗣帝天飾天付前壬申年造統天集作大業慈仁寬恩聖明文武或曰誅殛曰我父母譬彼嬰兒豈不可怒集作恕或曰畋遊苑大林深喈嘐跳突千毛萬羽豹裂鵬擒其樂無伍皇帝曰不匪我不知言豈假汝未撫四夷未考百度天地宗廟未陳簋簠如寐未窹如癢未愈斥退狗馬未可以御或曰酒飲順氣貌神奠集作此字酋樂工習自祖集有肴字父瑶簮繡裙千萬侍女酬以觥斚助之歌舞富貴四海不樂何苦皇帝曰不如聞四海集作海蝗蔽田畝或曰亢旱或曰淫雨稚老孤寡未盡得所聞一有是首不能舉乃拔畯良乃登耉集作耆老夕思朝議依規約矩詳刑定法深刻不取標揭典制酌之中古逺師太宗近法憲祖怵栗思惟不治是懼四國既平六職攸序黍稷稻梁嘔啞俯僂父父子子供養撫乳集作父子供養嬰兒撫乳萬里齊俗實皇帝力繄眠而食罔知其故皇帝乃曰豫見郊廟嚴法物旓旗旐集作旐旗一作施旐五帝坐壇百神位集作立坫嵬嶷肹蠁捧爵是醮海外天內戎狄蠻夷竒服異貌伏于除外觀喜呌噪回御丹鳯大赦四海改元會昌减論有罪紹功嗣德披集作搜剔幽昧寒暑合節風輕雨碎榖溢陳困畜繁腯大東南西北根集作限岸壃紀無有頓憚得可反不識灾害三事大夫邦伯諸侯曰皇帝德古不能侔謳歌謡詠安得集作能可稱百工庶人亦有聚謀拜章口呼願上大號神聽天聞欲揚皇帝之休四字集作洪休帝曰集作二字帝曰無功不可虛受懇請不已出涕叩頭皇帝不能止曰豫慙羞曰因大赦惟新九州不窮不詐不饑不偷有窮有饑實吏之尤豫實天吏許之省修約束教誡纎悉丁寧品類細偉各當源流皇帝曰俞股肱耳目誠爾集作示非竭力寒暑風雨冝神是酬匪神之力其誰能謀凡爾守土各報爾望剝烹羹胾無愛羊牛天下聞命奔走承事牧實遭遇亦沗刺史齊齊惕栗臨谷將墜視牲濯爵四字集作視牲啓毛濯爵置不委下吏肴羞具潔罔有不備衣冠待曉坐以假寐步及神宇蹐足屏氣神實在前敬恭跪起詩不云乎皇天上帝伊誰云憎天憎罪人天可指視止殃其身豈可傍熾刺史有罪可病可死其身未塞可及妻子無作水旱以及閭里皇帝仁聖神祗聰明唱和符同相為表裏黃治雖逺黃俗雖鄙皇帝視之逺近一致洋洋在上實提人紀無負皇帝自作羞愧月維季夏日維辛已實神降止神如有言我答皇帝寒暑風雨其期必至瘥癘水旱永永止弭爾為官人勉為集作其爾治牧敬冉拜汗流霑地祭霍山文張說長安二年月日皇帝使并州道集作大字行軍副大總管尹元凱等敬薦酒脯時果昭集作敢告霍山之靈皇帝天覆萬物各遂其性禮乎集作祠于群神罔不咸秩獨彼凶虜默啜悖天虐人窺邉猾夏略無寧歲皇帝哀此黎獻勤於征役憫彼夷落毒於昏暴常欲誅其魁首安是藩氓冦虐盈稔神人同棄今自送死并朔近驚集作警山陵命將出師龔行天罰惟神炳靈參野作鎮冀方歆是正直贊揚威武俾敵馬化為沙蟲王師衆於草木獻捷之日昭報神休尚饗别灊山神文李翺維長慶三年歲次癸卯十月壬午朔二十七日戊寅朝議郎守尚書禮部郎中上輕車都尉李翺謹遣舒州攝蜀本作提要籍司衙前虞候吳潭以清酒鹿脯告辭於灊山大神之靈翺自去歲來臨此邦遭罹炎旱淮左畢同鄰郡逃亡十家六空惟此舒人安業于農我政無能遘此歲凶災同報異乃神之聰事幸無敗譽斯有融遂忝帝命復官南宫皆神所祐我亦何功將赴京邑路沿大江遣使告辭神鍳余𠂻尚饗祭匡山文白居易維元和十二年歲次丁酉朔二十一日辛已將仕郎江州司馬白居易謹以清酌之奠敢昭告于匡山神之靈恭惟神道正直聰明扶持匡廬福利動植居易賦命蹇薄與時參差願於靈山栖此陋質遺愛寺側既置草堂欲居其中參禪養素而開構池宇在神域中往來道途由神門外輒用酒脯告䖍于神神其聽之歆此薄奠非敢徼福所期薦誠尚饗祭廬山文前人維元和十二年歲次丁酉二月辛酉朔二十五日乙酉將仕郎江州司馬白居易以香火酒脯敢告于廬山遺愛寺四倚集作傍上下大小諸神居易夙聞匡盧天下神秀幸因在官集作佐位得造兹山又聞逺宗雷同居于是道俗並處古之遺風而遺愛西偏鄭氏舊隱三寺長老招于此居創新室集作堂宇疏舊泉沼或來或往栖遲其間不惟耽玩水石以樂野性亦欲擺去煩惱漸歸空門儻秩滿巳來得以自遂餘生終老願託于斯今葺構既成逰日集作息方始爰以潔敬薦兹馨香不敢媚神不敢攘福但使疵癘不作魑集作魈魅不逄猛獸毒蟲各安其所苟人居之靜謐則神道之光明齊心露誠庶幾有答尚饗祭城隍文張說維大唐開元五年歲次丁已四月庚午朔二十日已丑荆州大都督府長史上柱國燕國公張說謹以清酌之奠敢昭告于城隍之神山澤以通氣為靈城隍以積隂為德致和産物助天育人人之仰恩是關禮集作祀典說恭承朝命綱紀南邦式崇薦禮以展勤敬庶降福四氓式登集作登我百榖猛獸不摶毒蠱不噬精誠或通昭鍳非逺尚饗祭桂州城隍神祝文李商隱維大中元年歲次丁卯八月甲午朔二十七日庚申桂州管內都防禦觀察處置等使正議大夫使持節桂州諸軍事守桂刺史兼御史中丞上柱國賜紫金魚袋鄭某謹遣直官攝功曹參軍文林郎守陽朔縣令莊敬質謹以㫖酒庶羞之奠祭于城隍之神濬洫崇墉所以固吾圉春祈秋報所以輔農功今白露雷收蟲壞水涸念時暘而時雨將乃積而乃倉敢以吉辰式陳常典神其保兹正直歆彼馨香聿念前修勿虧明鍳昔房豹變樂陵之井味任延易九真之風土集作土風豈獨人謀仰由冥助今猶古也神實聽之為安平公兖州祭城隍神文前人年月日致祭于城隍之神四民攸居是分都邑五兵未息爰假金湯神受命上𤣥守職兹土擁長雲之壘提却月之宫主張威靈彈厭氛祲某方宣朝㫖永總藩條帳中之列既安幕內之籌敢失神其守同石堡護等玉關長令崒若岸焉無使復於隍也為懷州李使君祭城隍神文前人某謬䝉朝奬叨領藩條熊軾初臨虎符適至敢資靈於水土冀同固於金湯况彼潞人實逆天理固承明之地以作巢窠驅康樂之民以為蟊賊一至於此其能久乎惟神廣扇威靈劃開聲勢俾犯境者望飛鳥集作烏而自遁此滔天者聽唳鶴以虛聲崇墉載嚴巨塹無壅今來古往永無川竭之因萬歲千秋莫有土崩之事神其聽之無易我言禜海文陳子昻萬歲通天二年月日清邉道軍海運度支大使盰本有兼字虞部郎中王𤣥圭敢以牲酒沉浮海王之神神之聽之我國家昭列象胥惠養戎貊百蠻率職萬方攸同鮮卑猖狂忘道悖亂人棄不保王師用征故有度遼諸軍橫海諸集作之將天子命我嬴糧景從今旌甲雲屯樓船霧集且欲浮碣石凌方壺襲朔裔即幽都而溟漲集作漲海無倪雲濤洄潏孤山逺島鴻洞天波惟爾肅恭祀集作令典導鷁首屏集作騎鯨魚呵風伯遏天吳使蒼猊不驚皇師允濟攘慝剿虐安人定災蒼蒼群生非神孰賴無昏汨亂流而作神羞急急如律令禜城門文張說維大唐開元五年荆州大都督府長史上柱國燕國公張說謹遣議郎行録事參軍皇甫嶧敢告于大府城門天有三光地有五行隂陽順序庶物以生霖雨過旬晦昧不晴奈何以隂賊陽以䝉蔽明恐害嘉榖無奉粢盛維爾崇墉本人所營積隂攸處德在助成苟人是利亦神是臧速收雲雨以復天常報爾特集作時豚薦爾馨香謹以清酌脯醢式陳禜事尚饗禜北城門文為濠州刺史作白居易年月日某官某敬以醴幣禜于集有外字城北門某聞四集作北鄘四門之神有水旱之災於是乎禜之今年春天作淫雨將害于農墊于民惟神積隂之氣惟北太隂之位是用昭告於城之北惟門有神裁之某以天子休命殿于是邦大懼天京本作天厲之不時俾黎民阻饑敢以止辭告神神若之何不聽敢以至誠感神神若之何不弔尚克隂沴不作時暢咸若百榖用成庶民用寧實惟鄘之神門之靈於戲北鄘北門之神明聽斯言罔俾兩昏墊以作某之憂神之羞尚饗禜土龍文獨孤及陽驕隂伏女魃作孽孟夏不雨至于是月后土將乾百榖恐竭天道下濟龍德正中宜其甘雨亦祥其風日歲與時俾和而豐胡屯其膏集作胡然屯膏物乃殄瘁民用艱食神將乏祀豈天不仁豈龍不智盍正直以是輔憫雲漢於下土詔列缺使舉火命商羊以鼓舞暡兮為雲霈集作霖兮為雨滲我王土而毛之取我黍稷而膏之俾爾稼如茨俾爾穗如坻實藏為盛為粢無貽龍羞俾神我欺尚饗禜集作祭龍文白居易維長慶三年歲次癸卯八月癸未朔二日甲申朝議大夫使持節杭州諸軍事守杭州刺史上柱國白居易率寮吏薦香火拜告于北方黑龍惟龍其色𤣥其位坎其神壬癸與水通靈昨者歷禱四方寂然無應今故䖍誠潔意改命於黑龍龍無水欲何依神無靈將恐歇澤能川本作無救物我實有望於龍物不自神龍豈無求於我若三日之內一雨雱霈是龍之靈亦人之幸禮無不報神其聽之急急如律令禜集作祭浙江文前人維長慶四年歲次甲辰五月已酉朔四日壬子朝議大夫持使節杭州諸軍事守杭州刺史上柱國白某謹以清酌少牢之奠敢昭告于浙江之神滔滔大江南國之紀潤下集作安波則為利幹集作洚流則為害故我上帝命神司之今屬潮濤失常奔激西北水無知也如有慿焉浸淫郊鄽壞敗廬舍人墜墊溺籲天無辜居易祗承集作奉璽書興利除害守土守水職與神同是用備物致誠躬自䖍禱庶俾水返于集作歸壑谷遷為陵土不騫崩人無蕩析敢以醴幣羊豕沉奠于江惟神裁之無忝祀典尚饗禡牙文陳子昻萬歲通天二年正集作三月朔日清邉道大總管建安郡王某敢以牲牢告軍牙之神蓋先王作兵以討有罪姦慝竊命戎夷不恭則必肆諸市朝大戮原野我皇周子育萬國寵綏百蠻青雲干呂白環入貢久有年矣契丹凶羯敢亂天常乃蜂聚丸山豕食遼塞集作注野宴安鴆毒作為欃槍天厭其凶國用致討皇帝命我肅將王誅今大軍已集吉辰叶應旄頭首建羽斾前列夷貊咸集集作威將士聽誓方俟天休命為人殄災惟爾有神尚殱乃醜召太一會雷公翼白虎乘青龍星流彗掃永清朔商使兵不血刃戎夏大同以昭我天子之德允乃盱本作爾字神之功豈非正直克明哉無縱世讐以作神羞急急如律令祭纛文獨孤及年月日都統江淮之南節度觀察處置等使户部尚書李峘謹以少牢之奠敬神于六纛之神天地不仁神明無親惟正集作德是與若嚮疑作響之答敢有象恭滔天構釁稱亂國有明罰神其捨諸賊劉展假寵多難敢包狼心竊發蠆毒將敷虐于我上下神祗使東溟揚波群動昏墊皇帝震怒按劍授鉞集作俾勦亂晷命我上將底天之伐於是虎牙鷹揚之臣蛇矛犀渠之群橫行而東我伐用張月羽集作弧雲旗以先啓行方將歷潯陽下南陵收京口掃建業斫梟獍以釁鼓封鯨鯢為京觀俾萬里浪破三象霧廓今以令月吉月釐集作整駕即路是用徼福于爾有神惟神降衷尚弼余志敢告無靡旗無絓驂無汰輈無僨車命五將護野萬靈並轂令天地氛祲望風掃除魑魅魍魎罔不率俾莫我敢遏為神祗羞文苑英華卷九百九十九
