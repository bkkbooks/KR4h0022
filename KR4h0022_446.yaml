body:
  text: 文苑英華卷四百四十六宋李昉等編册文五皇后册文册皇后文詔令作太上皇立皇帝妃為皇后制內制睿宗誥曰王者建邦設內輔之職聖人作則崇隂教之道式清四海以正二儀妃王氏冠蓋盛門幽間令德藝兼圖史訓備公宫頃屬艱危克揚功烈聿興昌運實賴贊成正位六宫宜膺盛典詔令作禮可册為皇后延和元年七月册淑妃王氏為皇后文陸贄維貞元二年某月日皇帝若曰乾坤合德聖人則之惟帝承天惟后配帝嗣續百代母臨萬邦位定于集作於中而尊加於外德修諸已而化被於集作于人御於家邦所繫斯在三代崇替靡不由之豫是以詢衆採賢重難茲命中壼虛位於詔作于今歷年隂儀或虧宗事無主集作相缺於典禮朕甚愧焉稱是徽章聿歸全德咨爾淑妃王氏天與淳集作純粹氣集作神鍾元和含章在中發秀于外卓爾風操穆然容輝周旋中規進退有度仁愛恭儉本於生知詩書禮樂成自師氏竭于集作其孝弟祗事先朝承訓集作順無違克諧尊旨往居桂苑淑問已彰洎奉椒塗謙光載路六宫攸敘九族以親嘗屬艱迍集作屯纍從行幸思賢才以輔佐知臣下之勤勞庶績伊集作其凝頗資內助永念頃筐之志且懷求劍之情崇位長秋永懷盛典矧惟元子貞我萬邦稽以舊章是宜從貴今遣攝太尉某官某乙持節册命爾為皇后嗚呼敬哉王教之端始於內範風美關睢之化雅詠思齊之德罔懈厥位忝于前修克念有終庶無咎悔奉承休命可不慎歟册淑妃為皇后文錢珝維乾元五年嵗次戊午四月􅏤子朔二十七日丙寅皇帝若曰惟王法天惟后象地統理之道相須而成秉陽雖繫於昭垂飬物必歸於厚載惟詔令無惟字處大倫而克正與元化而同光上贊君臨旁資婦順逺徴百代咸本六經而禮曠纍朝位虛中壼嚴禋怵惕玉齍無所進之人內令寂寥彤管有不書之史興廢之重作配實難咨爾淑妃何氏柔既可觀儉皆中度外言罔入懿則自成處間房而椒亦蜚聲御詔令作遇衆妾而木能逮下洎邦家多難輔佐克勤每見求衣未嘗安寢先知旰食不視晨修欲齊京室之賢罔慕長秋之盛勞謙之報降福是宜乃顧皇儲仍因子貴公卿來講龜筮斯從實上帝之所嘉詎朕心之可抑今遣某官某持節册爾為皇后於戲極位正名居尊齊禮典一申而百神聽禮一行而萬國歡詔令作知懼恐詔令作誠懼可以保其名齊莊可以守其位往司詔令作𢎞陰教以永天休册淑妃何氏為皇后文楊巨門下朕博採大易眇觀詩訓觀柔剛咸感之象賦鳴鳩肅雍之德將以視天下之內理敘人倫之大端宜于家邦厚示風化矧九廟在上籩豆是薦三揖在下彜章具陳得不敬詔令作庀乃褘褕稱茲典禮俾承光於軒耀式正位於坤儀淑妃何氏明配圓靈德符厚載圭璋特逹鸞鳳萎葳同輦必辭脫簪能諫四德克備六宫是推述壼職以彌勤煥彤史而斯美况惟元子既登儲二順考古道雅協徽章受貞吉辰􅟹于盛典咨爾克持婦政以率內和齊莊是儀用諧靜德明章之道允在茲乎公主册文册信成公主文孫逖維開元二十五年嵗次丁丑八月癸卯十五日丁巳皇帝若曰於戲易著于歸詩稱下嫁所以正風化厚人倫也咨爾信公主淑慎由衷聰詔令作柔明形外訓以師氏頗詳環珮之儀修其婦功更習紘綖之藝日徴先近年及有行冝錫徽章俾膺茂典今遣使金紫光祿大夫兵部尚書兼中書令集賢院學士修國史上柱國晉國公李林甫副使中大夫守中書侍郎集賢院學士徐安貞持節禮册四字一作持節册爾為信成公主爾其光昭閫德𢎞長國風無怠厥心永綏介福可不慎與册昌樂公主文維開元二十五年嵗次丁丑八月癸邜朔二十九日辛未皇帝若曰於戲好合之禮以正人倫肅雍之德用成婦道咨爾昌樂公主生知法度性與柔和亟聞彤史之言頗識采蘋之事素以為絢既間於內則梅有其實式遵於下嫁宜膺册書之命以備車服之庸今遣使銀青光祿大夫工部尚書牛仙客副使黃門侍郎陳希烈持節册禮四字一作持節册爾為昌樂公主爾其欽崇四教承順六姻式是大邦受茲明命可不慎歟册髙都公主文維開元二十五年嵗次丁丑九月壬申朔十一日壬午皇帝若曰於戲古之聖人垂訓作則必正內外之位以明婚姻之禮兹爾髙都公主生於宫闈自稟幽間之性教以師氏更彰柔順之詔令作更有徽柔則能循法度克慎言容魯館于歸沁園將啓宜膺册命俾叶典章今遣使工部尚書牛仙客副使黃門侍郎陳希烈持節禮册四字一作持節册爾為髙都公主爾其自下于心增修厥德式瞻清懿永固恩榮可不慎歟册永寧公主文維開元二十六年嵗次戊寅八月丁酉朔二十二日戊午皇帝若曰於戲人倫式敘以正國風女子有行將成婦道咨爾永寧公王自幼及長終溫且惠引圖史為鏡鑑用柔和為粉澤許嫁而笄既遵於彛詔令作禮典備物之册宜承於寵命今遣使金紫光祿大夫兵部尚書兼中書令李林甫副使上柱國徐安貞持節禮册四字一作持節册爾為永寧公主爾其謙恭自下淑慎為先無忝公宫之教永貽邦媛之則可不慎歟册臨晉公主文內制維開元二十六年嵗次戊寅閏八月丁邜朔十六日壬午皇帝若曰於戲古之帝女下嫁諸侯以正婚姻之大詔令作懿綱昭肅雍之令德咨爾臨晉公主蹈和成性體順為心頗協生知之敏更承師氏之訓柔明益著淑慎攸彰兼四教而不違勤六行而無斁近日云吉嘉禮有期宜穆彛章載光册命今遣使侍中豳國公牛仙客副使黃門侍郎陳希烈持節禮册爾其克遵法度用廣徽猷發明閫德垂範于後可不慎歟此篇英華題作公主出降制誤入封制中册嘉誠公主文陸贄維貞元元年嵗次乙丑六月甲子朔十三日丙子皇帝若曰王者以義睦宗親以禮敦風化義之深實先於友愛禮之重莫大於婚姻故春秋書築館之儀易象著歸妹之吉豫是用祗考令典詔令作明義率由舊章二句集作追考舊章率由前典咨爾嘉誠長公主孝友柔謙外和內睦集作內和外敏公宫稟訓四實集作德備修孝友至備修十六字詔令作特稟生知重承先訓行必中則意不違仁柔謙惠和孝友純懿嘉乃全德時惟成人疏邑啓封命公為主徽章所被詔令作備物禮實宜之今遣使光祿大夫檢校司徒同中書門下平章事沂國公勉持節册命四字一作持節册爾為嘉誠公主爾往欽哉詔令作嗚呼戒哉下嫁諸侯諒為古制肅雍之德見美詩人和可以克家敬可以行已奉若茲道永孚于休懋敦王風勿墜先訓詔令作懋昭令問無替朕命光膺盛典詔令作禮可不慎歟擬公主册文劉禹錫集無惟某年月日皇帝若曰桃李發詠雲日連輝禮秩克柔肅雍載美築館大國建號名邦乃躅通規用光懿範咨爾長女金枝寵慶玉質輝竒藴異體和含章挺秀柔順懿德幽間可貞已及初笄言從下嫁主之以同姓叔父配之以貴族聞人式遵舊儀錫是土宇是用命使某官某持節册命爾為某公主於戲何彼穠矣詩之國風蓋美王姬能成婦道爾其克念以敬所從無忝我之休命不其猗歟册益昌公主文薛廷圭維乾寧元年嵗次甲寅十月􅏤申朔十四日甲子通鑑作􅏤寅朔十四日癸邜當考皇帝若曰粵昔漢頒魯國魏錫常山繇鍾愛以分封亦旌賢而别壤前王茂典歷代成規朕命嗣守不敢失墜咨爾第七女蘭芷詔令作苴芳猷肅雍懿範坤順之性體於自然天俔之資稟于隂教不明爾德孰慰我心爰稽舊章俾率彛訓乃疏湯邑仍錫粉田所以示鳲鳩均飬之仁樂螽斯宜爾之慶夙興夜寐無忘女史之針下氣怡聲勉習家人之禮女儀婦道可不慎歟公主制封皇第二女常芬公主等制蘇頲黃門諸女皆封先王之制第二女等慶聮霄漢體自穠華常閲禮於后庭必聞詩於師氏朕撫臨億兆憲章古昔俾裂河山之賦用疇湯沐之恩可依前件主者施行開元三年十二月十日封髙都公主等制孫逖門下肅雍之範以成女德湯沐之賜爰著國章第十一女等生於公宫訓以師氏溫惠之性頗有天姿圖史之學仍聞日就初笄甫及外館將歸宜詔令作因司待禮之期式備疏封之典可依前件仍各實封一千户主者施行封永寧公主制門下自昔帝女必建封邑典章不易等數猶存第十七女幼而間和長實徽懿引圖史以自鑒用肅雍而成德詔令作雍將擇近日言遵下嫁冝承湯沐之賜以備車服之庸可封永寧公主邑詔令作食實封一千户主者施行開元二十六年封平昌公主制門下詩美肅雍逺著於風雅禮有封建久存於簡䇿第十九女尚柔成德克順由衷稟於天然自有間和之性訓以師氏備詳圖史之學宜開湯沐俾叶典章可封平昌公主食邑一千户主者施行封永昌公主制制集門下普寧公主天泉浴詔令作滋德崇蘭發彩纂組之華每工於經目保阿之訓深得於雅言詔令作稚禮必叶中言無出閫詔令作容禮必叶言行無間從容珩璜之韻婉娩柔嘉之儀而疏封舊邦禮宜改避是擇美邑再申異恩可改封永昌公主主者施行第七女封公主制元稹見集本門下長女等抱子弄孫之榮貴賤之大情也朕以四海奉皇太后於南宫問安之時諸女侍側螽斯之慶上慰慈顔鳲鳩之仁內懷均飬雖穠華尚少出閣未期而湯沐先施分封有據宜加美號以表令儀可依前件主者施行第十二妹等四人各封長公主制白居易見詔令集無勑古者帝子下嫁必使王公主焉近代或有未笄年而賜湯沐者亦加公主之號以寵重之第十二妹等先皇帝之子也比朕之子宜加等焉故當幼年各封善地咸命為長公主未及釐降先開邑封所以慰太后慈念之心表先帝肅雍之訓亦欲使吾孝理之道敦睦之風自骨肉間以及天下可依前件封大和長公主制勑公主之封號也或以善地或以嘉名立愛展親茲惟舊典第四妹端明成性和順稟教靜無違禮故組紃有常訓動必中節故環珮有常聲嵗茂穠華日新淑問乃眷肅雍之德俾開湯沐之封可依前件集作可封某公主長慶元年三月封盛唐公主制蔣伸門下展親外館則必待年廣愛中闈冝光啓邑第七女祥開銀漢秀發金枝孝敬生知柔間早稟克承姆師之訓每遵詩禮之文法度自持穠華益茂爰申彛典載錫嘉名俾承湯沐之封式示邦家之慶可封盛唐公主備禮册命此為英華誤入册文中今移于後文苑英華卷四百四十六
