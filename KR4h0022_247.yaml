body:
  text: 文苑英華卷二百四十七宋李昉等編寄贈一梁簡文帝一首江淹一首范雲一首吳筠十首何遜一首王僧孺一首栁惲三首朱超一首劉孝綽三首陸倕一首蕭子雲一首朱異一首荀濟一首庾信一首江總三首贈張纘梁簡文帝儀表咸推挹牆仞難窺踐既富垂帷學復折波濤辨綺思曖霞飛清文煥飈轉朱旗赫容與雕棨紛曄煜波搖白鱧舟風動蒼鴈類聚作鷹舳九疑勢參差江天相蔽虧三春澧浦葉九月洞庭枝洞庭枝裊娜澧浦葉參差芬芳與搖落俱應相别離貽袁常侍江淹昔我别楚水秋月麗秋天今君客吳坂春日媚春泉幽冀生碧草沅湘含翠煙鑠鑠霞上景懵懵雲外山涉江竟何望一作事留滯空採蓮贈沈左衛范雲伊昔霑嘉惠出入承明宫逰息萬年下經過九龍中越鳥憎北樹胡馬畏南風願言反類聚作友漁蓨他苖切蓧也津梁肯與通贈周散騎興嗣三首吳筠子雲好飲酒家在成都縣製賦已百篇彈琴復千轉敬通不當豪相如本貧賤共作失職人包山一相見二孺子賤而貧且非席上珍唯安萊蕪甑兼慕林宗巾百年逢繾綣千里遇殷勤願持江南蕙以贈生芻人三吾賢當路者聲名振華夏朱輪玳瑁牛紫鞚連錢馬朝花舞風去夜月窺窗下想君貴易朋居然應見捨集本有此長韻一首與前詩間有同處今全録于此孺子貧而賤且非席上珍唯安萊蕪甑兼慕林宗巾百年逢繾綣千里遇殷勤願持江南蕙以贈生芻人思君欲何言中心亂如霧淚下非一端愁來誰有數子為馮敬通不減汲長孺千里無關梁安得王喬屨與君初相知不言異一宿意欲褰衣裳隂雲亂人目之子伏髙卧伊豫空杼軸無由度淇水見此漪漪竹默然思公子終自不敢言青松蔽南隴白雲生北園沉憂無人語默念空憑軒安得空持劒以報相知恩贈任黃門二首前人相如體英彥左右生容暉已紆漢帝組復解梁王衣經過雲母扇出入千門扉連洲茂杜若類聚作芳杜長山鬱翠微欲言終未敢徒然獨依依二紛吾少馳騁自來之疑作乏名德白玉鏤衢鞍黃金馬腦勒射雕靈丘下驅馬一作虜鴈門北殷勤盡日華留連窮景黑嵗暮竟無成憂來坐默默贈王桂陽前人松生數寸時遂為草所沒未見籠雲心誰知負霜骨弱幹可摧殘纎莖易凌忽何當數千尺為君覆明月遙贈周丞前人巨石亂天涯雜樹鬱參差伯魯留蜀郡長房還葛陂練練波中月亭亭雲上枝髙岑蔽人者無處得相知贈桞祕書前人蘼蕪與丹桂竒心復竒骨已蔽蒼龍門又影鳳凰闕紫雲依夜來清風扶晚發鴛鴦若上天寄聲謝明月贈桞貞陽前人王孫清且貴築室疑芙蓉池羅生君子樹雜種女貞枝南窗帖雲母北户映琉璃銜書轆轤鳳坐水玉盤螭朝衣茱萸錦夜覆葡蔔巵聮翻驂赤兔窈窕駕青驪龍泉甚鳴利如何獨不知贈朱從事前人我行欲何之千里尋膠漆長葭歷渚生踈蒲緣岸出裊裊能隨風離離堪度日客思已飄蕩相思復非一未得幸殷勤先作數行泣日夕望江贈魚司馬何遜湓城帶湓水湓水縈如帶日夕望髙樓一作城耿耿青雲外城中多宴賞絲竹常繁會管聲已流恱絃聲復凄切歌黛慘如愁舞腰疑欲絶仲秋黃葉下長風正騷屑早鴈出雲歸故燕辭簷别晝悲在異鄉夜夢還洛汭洛汭何悠悠起望登西樓的的帆向浦團團月隱洲誰能一羽化輕舉逐飛浮贈顧倉曹王僧孺雒陽十二門樓闕似西崑曖曖罘罳下相望隔畫垣畫垣向阿閣棲鳳復棲鴛一作阿閣棲鳳鴛五曹均趨奏六尚等便煩朝爐何馥馥夜錦有餘溫日中驅上駟驤首遍京宛晨趨魏公子夕宿韓王孫宿昔今何在平生棄不論譬如卷葹草心謝葉空存誰傷類聚作復三承㫸獨念九飛魂贈吳均三首桞惲寒雲晦滄洲奔潮溢南浦相思白露亭永望秋風渚心知别路長不謂若燕楚關候日遼絶如何一作何因附行旅願作野飛鳥飄然自輕舉二逺逰濟伊洛秣馬度清漳邯鄲饒美女艷色含春芳鼓瑟未成曲踏履類聚作跕屣復翺翔我本逰客子情愛在淮陽新知誰不樂念舊苦人腸三夕宿飛弧疑作狐關晨登磧礫坂形為戎馬倦思逐征旗逺邊城秋霰來寒鄉春風晚始信隴雪輕漸覺寒雲卷徭役命所當念豫加餐飯贈王僧辨朱超故人總連率方舟下漢池玉節交橫映金鐃前後吹聚圖匡漢業傾産救韓危昔時明月夜蔭羽切髙枝沖天勢已逺控地力先疲各言獻捷後幾處泣生離歸沐呈任中丞昉時為著作郎劉孝綽步出金華省還望承明廬壯哉宛洛地佳麗實皇居虹霓拖飛閣蘭芷覆清渠圓淵倒荷芰方鏡寫簮裾白雲夏峰盡青槐秋葉踈自我從人爵蟾兔屢盈虛殺青徒已汗司舉未云書文昌愧通籍臨卭幸第如夫君多敬愛蟠木濫吹噓時時釋簿領騶駕入吾廬自嗤誠碔砆無以儷璠璵但願長間暇酌醴薦焚類聚作焚枯魚古意送沈宏已見一百五卷劉孝綽江津寄劉之遴前人與子如黃鵠將别復徘徊經過一柱觀出入三休臺集作靈臺共摛雲氣藻同舉霞文杯佳人每曉逝集作逰禁門恆晚開欲寄一言别髙駕何由來以詩代書别後寄贈陸倕余本水鄉士閉門江海隅時逢世道泰蹇足步髙衢名成官雖立效功日漸踈一作效微功日踈入仕乘肥馬出守擁髙車關門逰昔吏遷亭有故書江派資賢牧宗英出建旟不勞王布鼓無賴露田車弼政非責實求名已課虛長卿病猶在修齡疾未祛詎知亭長肉寧挂府丞魚不能未能止內訟慙諸已僶俯從王事纚舟出淮泗朋故逺追尋暄宿清江隂明旦一分手翻飛各異林歸舟隨岸曲猶聞歌棹音行者日迢逺誰見别離心夕次冽洲岸明登慈姥岑水流多回復余歸良未尋江關寒事早夜露傷秋草心屬姑蘇臺目送邯鄲道葭葦日蒼蒼親知慎早涼劉兄消渴病休攝戒無良殷弟癲眩疾行止避風霜劉侯有餘冷宜餌陟釐方伏子多風咳門冬幸易將率更愛雅體體弱思自強吏曹勉玉潤諷議朂金相比部多暇日奚用肆龍章建德何為者無墮疑無人鄊記室朋從暇露蝎附行商議曹坐朝罷尺板嗣徽疑芳雙棲成獨宿俱飛忽異翔眷言思親友沉思結中腸追惟疇昔時朝府多歡暇薄暮塵埃靜飛蓋遙相迓李郭或同舟潘夏時方駕娛談終美景敷文永清夜促膝豈異人戚戚皆朋婭今日一乖離漼然心事差山川望猶近便似隔天涯玉躬子加護昭質余未虧八行思息勉一札望來儀贈吳筠蕭子雲欲知健少年本年最輕黠緑沉弓項縱紫艾刀橫拔誰持命要寵寧知敵可殺有功終不言明君自應察還東田宅贈朋離朱異應生背芒説石子河阿一作陽文雖有遨逰美終非沮溺羣日余今卜築兼以隔囂紛池入東陂水窗引北巖雲槿離疑作籬集田鷺茅簷帶野氛原隰何邐迤山澤共氛氲蒼蒼松樹合耿耿樵路分朝興候崖曉暮坐極林曛憑髙眺虹霓臨下瞰耕耘豈直娛衰暮坐極林曛憑此句與上同疑有誤懷勞猶未弭獨有望夫君贈隂涼州荀濟副尉西域返伏波南海還坎壈多難構欎快少騰遷孰云功未立寧是契不全直為逢迎寡良由聽受偏若人本髙絶芬馥邁蘭荃驅車趨折坂匡坐酌貪泉洗憤一作濆豈虛唱席皮良信然羣醉嫉孤醒衆嗤恐獨妍龍旗翻委鬱鷁軸更回邅鵾勢終橫海鵬力會沖天昔余遇知巳一面深千祀紆人重結襪辱德逾過市詩酒悅風雲琴歌賞桃李淹留漢水曲契闊渝川涘結綬唯貢公推名實鮑子徒然懷伏劍終無報國士髙懷不可忘劍意何能已已作金蘭契何言雲雨别咄嗟改容鬢俄頃彌年嵗海曲窮地表江源渺天際雲泥已殊路暄涼詎同節桞絮函如絲梅花屢成雪月落桂隂逺風起萱條結鶴舞想低昻鵾絃夢清切聞君戍靈關瓜時猶未還數泛明月沼頻逰尚一作當日灣金碧應髣佛輪鏡幾登攀復承西歸後將兵出湖口經過道路長往來日月久玉體何容歇金漿故應有陽臺可宴私章華堪置酒既彈趙人瑟復擊秦人缶缶瑟多竒調秦趙饒姝妙得意在雙眸傾城猶一笑伯喈恩實早十柱天終少殁等盛姬傷存同魏車照君子篤久要宿昔盛賔僚依依集鱗羽眷眷共枝條一朝限岐路萬里異波潮容儀雖渺渺夢想尚昭昭新人不相識故人詎相憶杳杳間山川迢迢阻意疑作音息各附青雲逺詎假排虛力風月接歡宴酒醴承顔色安知暮儔者潺潺涕沾軾僕本不平人悲愁眉亦頻年來空自老嵗去不知春未能全體命於中欲問津五噫如適越十上似逰秦肌膚積雲露膂力倦風塵烏裘日日故白髮朝朝新人生感意氣相知無富貴懷趙實廉頗思燕唯樂毅博選咆咻士廣慕嫖姚尉映月比刀環瞻星看劍氣郢路一超逺長楸幾歔欷渤澥水尚寬崦嵫日猶未丈夫志四海兒女多辭費待余濟濁河從君宿清渭贈司寇淮南公庾信危邦久亂德天䇿始乘機九河聞誓衆千里見連旗虢亡垂棘返齊平寶鼎歸久弊風塵俗殊勞關塞衣絆驥還千里垂鵬更九飛猶憐馬齒進應念節旄稀回軒入故里園桞始依依舊竹侵行一作何徑新桐益幾圍寒谷梨應重秋林栗更肥美酒還參聖雕文本入微促歌迎趙瑟逰絃召楚妃小人司刺舉明揚實濫吹南部治都尉軍謀假建威商山隱士宅丹水鳳凰磯野亭長被馬山城早掩扉傳呼擁絳節交戟映彤闈遂令忘楚操何但食周薇三十六水變四十九條非丹竈風煙歇年齡蒲桞衰同僚敢不盡疇日懼難追貽孔中丞奐江總我行五嶺表辭鄉初學記作卿二十年聞鶯欲動詠披霧即依然疇昔同寮宷亟初學記作今隨年代改借問藏書處唯君故人在故人名宦髙霜簡肅權豪誰知懷九歎徒然泣二毛步出東郊望心遊江海上寓物便今古何為不惆悵初晴原野開宿雨潤條枚叢花曙後發一鳥霧中來淹留蘭蕙苑吟嘯芳菲晚忘懷靜躁間自覺風塵逺白社聊可依青山乍採薇鍾茅乃得性語默豈同歸鍾茅集作鍾芋遇長安使寄裴尚書江總傳聞合浦葉逺向洛陽飛北風尚嘶馬南冠獨不歸去人目徒送離琴手自揮秋蓬失處所春草屢芳菲太息關山月風塵客子衣贈賀左丞蕭舍人江總輶軒通八表旌節騖三秦聽歌酬敏對繼好佇行人賀生思沉鬱蕭弟學紛綸共有筆端譽皆為席上珍離羣徒悄悄征旅日侁侁黃河分太史一曲悲千里海內平生親中朝流寓士痛哉憫梁阼於焉三十祀鍾儀縶不歸盛憲悲何已隴頭心斷絶爾為參生死回首望長安猶如蜀道難函關分地軸華嶽按天壇行旜方境逝去棹艤江干蘆花霜外白楓葉水前丹翔鷗方怯一作怯下凍落鴈不勝彈輝輝盛王道時務嬰疲老九流倦耳目千一作十年變懷抱何以敦岐路凄然綴辭藻江南有桂枝塞北無萱草斗酒未為别垂堂深自保境逝集作近落鴈集作鴈千年變集作千變年文苑英華卷二百四十七
