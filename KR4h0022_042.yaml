body:
  text: 文苑英華卷四十二宋李昉等編帝德二偃伯靈臺賦一首堯見姑射神人賦一首闢四門賦一首鑄劒㦸為農器賦一首漢宣帝冠帶單于賦一首漢文帝罷露臺賦一首耀德不觀兵賦一首漢高祖斬白蛇賦一首文王葬枯骨賦一首偃伯靈臺賦并序義以時成泰和伯悠久為韻禇實偃伯師節也國家武成止戈文致皇極小宗伯樂之廣有命賦國家執道紀酌天和敷皇極以協德作武成而止戈由是天子居穆清之中念康濟之䇿乃訊元老禮鴻碩恢至道以垂裕義靈臺以偃伯且以韜五兵屏三革服仁義以為壁壘仗道德以為矛㦸俾其庶績咸熙百工惟時弓矢載櫜詎資乎司馬之法仁義無敵寧取乎丈人之師矧乎豐財保大之謂仁濟物安時之謂義義也者所以溥洪暢之德仁也者所以廣生成之施我是以却馬於糞車務仁於穡地然後頌大武歌由庚協神道以廣運致人文以化成以左右萬物以厚利羣生則夫乾元貞坤元亨彞倫叙而太階平豈不以其逺至邇安有截無外却兩階之干羽頌五戎以冠帶百神肹蠁以屬福二氣氤氲以交泰亦以播無疆之休昭有道之大固能協乎上下承以天休俎豆陳而五刑措干戈戢而七德修展威儀之秩秩卷旌斾以悠悠始欲登三以咸五豈徒歸馬而休牛尚矣哉茂祉之彰𤣥德之厚真神明之所福宜配天地而長久偃師節於靈臺之上返淳風於混元之首諒遊聖而難知徒叩虛而責有堯見姑射神人賦以聖德之崇窅然欽道為韻王起帝堯以化成於萬國歌宣於九德出汾水之陽經姑射之側峯巒交映若覩神人之形氷雪相鮮皆呈處子之色若非感而遂應靈而不測何以見不死之庭當至人之域始其厭宫室出茅茨駕鸞輅建羽旗若光若滅乍合乍離寓目於巉巖之頂駐蹕於沮洳之湄爰按節而至矣乃傾蓋而望之倐而五雲繚繞羣仙縹眇出碧嶺之崇崇臨丹丘之窅窅瞻童顔之麗綽約則多觀羽服之鮮􅗒襹非少集其侣乍謂崑崙之巔狀其居不異蓬萊之表由是睋山岊吳都賦嶽之岊矚天潯既𤣥覽而㫖逺亦高蹈而思深乃曰我以萬姓臣服八荒君臨蓋天下之至貴亦域中之所欽安知阻兹崖巘隔彼岑崟有吸風之人遐不可見仰乘雲之客高不可尋既而儼珠旒端玉藻增肅穆之敬念希夷之道見仙人之嶽嶽徒仰高山望鸞鶴之翩翩且輕大寶既而求之不得瞻之在前念四子而莫來莫往思一人而無黨無偏乘白雲而何及引黃屋而來旋故能戒於無怠防於未然向使忘鶉居之性狥龍駕之盛則光宅之德徒聞乎以遨以遊比屋之封詎見乎乃神乃聖我皇明四目達四聰惟神也愛而見惟聖也感其一作而通不窺仙於飲露不問道於順風則姑射之神未為盡善陶唐之主未足比崇闢四門賦以來逺人致多士為韻王起王者居上國來逺人闢四門而不壅俾八方而是遵朝聘㑹同自達於遐邇華夷蠻貊不間於君臣所以表王道之蕩蕩彰皇化之淳淳我皇闢四門也廣天視廓天意總寰海而有截端冕旒而無事猶懼遺淹滯拔秀異或𤣥纁而旁採或弓旌而逺致觀乎天步有四達之清夷仰彼帝閽無九重之奧祕所以逺方知歸羣才不匱彼前代之有四門也或化未洽志未恢水陸之珍是凑丘園之士莫來雖大道甚夷不異乎遐阻雖髙門有閌而同夫不開今我后則不然下土順而風趍王化行而草偃闉闍所湊表聖心之禮賢巖藪皆空知帝德之柔逺士嚮方而集才應時而多鴻鸞接翼而畢萃驥騄齊足而咸過莫不趍斯門之呀豁知我化之休和休和之始聖皇之祉致穆穆於四門獲濟濟之多士關鍵不用無老氏善閉之功車書大同叶王者無外之美至矣哉舜德巍巍復存乎聖理鑄劒㦸為農器賦以天下無事務農息兵為韻裴度皇帝嗣位之十三載寰海鏡清方隅砥平驅域中盡歸力穡示天下不復用兵於是銷鋒鏑而俶載南畝庤錢鎛而平秩西成所以殄凶器降嘉生收禍亂之根本致兆庶之豐盈者也既而清天步虛武庫劒鍔銷㦸鋩露嘗疑作當或作常時出匣揮獷俗以來賔今日在鎔唯良工之所鑄長鎩倐爾而從草覃耜忽焉而中度廢六月之遄征興三時之盛務觀乎聚而改煎欻飛焰而涌煙從而冉造將分地而用天冝人之歌允符於假樂多稼之頌式合於大田若夫弓戈櫜戢於寧歲牛馬放歸於豐年徒虛語耳胡可比焉則知先利其器欲善其事俾汙萊之盡闢由兵革之不試洪爐既煆失似雪之鋒鋩緑野載耕佇如雲之苖穟昔用之而有所雖弭之而不棄矧國家以教令為車徒故器械可得而無以道義為封域故戰爭可得而息由是執帝堯之允恭復后稷之訓農理化資於地力福祥致於天宗此乃慶自一人風行九野建中於上返本於下下臣系而稱曰秦金狄兮未仁周無射兮非雅豈若我后之重榖盡濟群生於良冶漢宣帝冠帶單于賦以威懷禮加北戎遂定為韻裴度昔漢宣帝休明允塞烜中葉之英聲示逺人以文德既而幸甘泉以居正朝呼韓於有北錫之紱冕俾之藩翊位居侯王之上侍在軒墀之側服之孔備垂懸綬之腰章髮則有餘映切雲之首飾且會朝之次昭明孔融雖加之以禮實誘之以衷厥錫既殊荷榮華之寵命其儀未習懵衣服之在躬此實可以閲帝聰播皇風亦何必貺玉帛之資空成耗國錫金石之樂用表和戎夫爵以賞功服以旌禮懿爾容之中順故我命之光啓矧乃來兹鳳闕踰彼龍沙知漢德之全盛厭胡俗之幽遐齊縞帶於周行獨明向化異𤣥冕於醜類豈曰亂華錫之不聞於屢禠崇之豈俟夫三加想夫扣塞懷恩動容思媚乍重譯而獻欵或稽顙而奉贄使羣方之闓樂由一人之錫遂鏘之玉佩顧韋韝而多慙頴以金貂與厖服而自異是使孔熾之類率服而莫違悍戾之屬束帶而共歸知子之來贈同雜珮彰君之化德乃垂衣殊沐猴而可作方戴鶡而有威今我后散皇明而馳聖聽致戎夏之克定勤厲理而明弼諧故蠻夷之允懷尚冠帶於萬里舞干羽於兩階彼長纓之與五餌何斯道之孔乖漢文帝罷露臺賦以百金休功萬國從化為韻李程偉漢文之君臨惟宫室有度以兆庶為心安不忘危豈勞力於纍土用過乎儉亦軫慮於百金懼乎設怨將以激勸若臺之是修唯德之不建是故絶役心於制造𢎞儉德於億萬乃言曰臺者髙峙路者四通不足避燥濕寒暑無以受朝聘㑹同奚必髙居為明四目逺聽為達四聰不重創何以就役不勞力何以成功由是却匠人之計全王者之德豈嗇於財實肥於國雖百工麕疑作麋至無所作則庶人子來曷由陳力言之既終人故適從板築之功既絶尋尺之材勿庸柱礎不施寧轉它山之石棟宇罷構匪斫徂徠之松若夫氣候為備順時布化諒惟國之有恆成兹臺之何暇南至以望太史每升其觀臺仲夏而居有司自設其高榭亦何用土木特建丹雘勤修誠無用之作非不朽之謀豈止全十家之中産貽百代之良籌彼晉靈登臨我則絶彈人之戲宋平興作我則無築者之謳式昭莫大之見用保無疆之休不然何以紹祉祖宗埀芳簡冊踰儉約於三五延載祀於二百豈不以肇於露臺播無為之嘉畫耀德不觀兵賦以明德尚道懷仁畏威為韻張隨惟先王享國建用皇極制五服而有序御四夷而在德近不貢必先威讓之辭逺不庭則修文物之則所以止干戈而重仁義遏寇虐而茂生植夫潔其流者在於源清成其外者在於內平以德則天下順以力則天下爭故有武不黷有兵不征穆王之功何補謀父之言可明將其修已以推畔曷若殺人以盈城於戲至理之時惟德是貴柔其逺而不襲阜其財而不費以道義為干櫓以禮樂為經緯是以文足昭武可畏借如舜帝在上苖人不懷雖􅟹事於伯禹終舞干於兩階然後七旬來格庶績允諧周文既興崇國不道用戡時難以奉天討矧勍敵而未悛爰因壘而自保然後再駕云服四方大造蓋由德所賔信所親豈無五兵且懼於暴物况有七德實在乎安人人勞所以損元氣物傷所以惻至仁乃凶器攸興聖人匪尚車書既其混一牛馬於焉休放兵不戢如火自焚德不修於君曷相所謂圗之大慎之微觀兵何是耀德何非素翟南來而越裳重譯白狼西入而荒服來歸夫欲朝萬國歸四海不可以逞弧矢之威漢高祖斬白蛇賦以漢髙皇帝親斬長蛇為韻白居易漢高帝將戡時難撥禍亂乃耀聖武奮英斷提神劒於手中斬靈蛇於澤畔何精誠之潜發信天地之幽贊卒能滅強楚降暴秦創王業於炎漢于時瓜剖區宇蜂起英豪以堅甲利兵相視以壯圖鋭氣相高皆欲定四海之洶洶救萬姓之嗷嗷帝既心窺咸陽氣王芒碭率卒晨發一作往縱徒夜亡有大蛇兮出山穴亘路旁凝白虹之精彩備素一作白龍之文章鱗甲皚一作皛以雪色睛眸赩而一作其電光聳其身形蜿蜿而莫犯舉其首勢矯矯而靡亢勇士聞之而挫鋭壯士觀一作覩之而摧剛於是行一作從者告於高皇高皇乃奮布衣挺干將攘臂直進瞋目高驤一呼而猛氣咆哮再叱而雄姿抑掦觀其將斬未斬之際蛇方一有欲字縱毒螫肆猛噬我則審其計度其勢口噪雷霆手操鋒鋭凛龍顔而色作振虎威而聲厲一有何字天之啓神之契舉刃一揮溘然而斃不知我者謂我斬白蛇知我者謂我斬白帝於是灑雨血摧霜鱗塗野草濺路塵嗟乎神化將窮不能保其命首尾雖在不能衛其身盛矣哉聖人之草昧經綸應乎天而順乎人制勍敵必示以乃武乃神殄災沴不可以弗躬弗親一作不躬不親原夫一作若夫龍泉黯黯秋水湛湛苟非斯劒蛇不可斬天威煌煌神武洸洸苟非我王蛇不可當是知人在威不在衆我王也萬夫之防器在利不在大斯劒也三尺之長于以攝萬物于以駭八方歷數既終聞素靈之夜哭嗜欲將至知赤帝之道昌繇是氣吞豪傑威振幽遐素車降而三秦歸德朱旗建而六合為家彼一有誅字鯨鯢截犀兕未若提青蛇而斬白蛇文王葬枯骨賦以德及枯骨天下歸心為韻白行簡骨雖無知葬以表德展厚禮於九原示深仁於萬國惠加於鬼則遊岱之魂有依義感於人故歸周之心不忒原夫靈臺肇建璧池是穿宛彼枯骨委兹窮泉既靡覩其銘志曽莫知夫歲年西伯乃色變䀌爾涕流泫然爰命從者將收瘞焉俾夫惻隱之心因形骸而下至于地升聞之德隨精魄而上動于天徒觀其年代超忽英靈淪沒土變豐肌苔封朽骨於是惠霑生死澤及榮枯遣奠有加於蘋藻備物無闕於芻塗幽壤始開見佳城於白日靈丘是啓旋卜宅於青烏既而遷彼古埏葬之中野推誠於重泉之內昭德於普天之下念此窮塵之骨尚或墐之欲使行路之人不得見也且夫聖人哀死君子表微用之於國而上下欣戴書之於史而載籍光輝諸侯感而思服百姓從而知歸以之理人而人自化以之奉天而天不違故能掩骼教行送終義立澤靡不浸仁無不及恩加師旅而同德數千慶延子孫而卜代三十且封比干之墓惟德是欽護信陵之塜其仁未深曷若我罔辨名氏莫知古今招亡散之魂復于棺槨收無主之骨斂以衣衾蓋所以感鬼神而動天地豈止夫三分天下而二者歸心文苑英華卷四十二
