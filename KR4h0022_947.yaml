body:
  text: 文苑英華卷九百四十八宋李昉等編職官十周大將軍桞遐墓志一首周大將軍蕭太墓志一首周大將軍趙廣墓志一首唐邢國公李密墓志一首周大將軍聞嘉公栁遐墓志庾信君諱遐周書作霞字子升河東解縣人也秦始征晉之地漢開平越之鄉律中夷則星居鶉首况復莊謀於衛既為社稷之臣喜對於齊無廢諸侯之職祖叔珍宋員外散騎常侍義陽內使有徐邈之應對居於散騎之省有汲黯之正直理於淮陽之郡父季逺臨川王咨議參軍冝都太守蘭臺石室是所洽聞白馬飛狐逾髙詞氣西都吳一作英融擅名江表言談相會宛如舊焉君膺令德之靈稟沖和之氣齠齓髻髮夙智早成愛敬自天虔恭得性含仁抱義履信居貞世父儀同忠惠公特加器異乃謂公曰吾昔逮事伯父太尉公見語云我昨夢汝登一髙樓樓盡峻麗吾以坐席乞汝汝或冨貴恨吾不及見耳吾向聊復晝寢又夢將昔時坐席還復賜汝汝位官當復見及王祥佩刀世為卿族鮑永驄馬家傳司𨽻以此連類差無慙德輕車西昌侯作藩襄漢君時年十二以民禮修謁進止端詳神情雅正侯目送之不輟試遣左右踐君衣𥚑欲視舉動君徐步稍前曽無顧眄魏侯之見劉廙不覺斂容漢主之觀田鳯遂令題柱比之今日曽何足云驃騎廬江周書作陵王帝子出藩懸衡髙選以君華望召為主簿張坦直諫既稱荀令之香鄒湛知言彌見羊公之德咨議府君於都薨背君奔赴六日即屆京師形骸毁瘁不復可識靈柩泝江中川薄晚亂流乘選回風反帆舟中之人相視失色抱棺號慟誓不求生俄爾之間風波即靜咸以君精誠所致成都孝子自赴江流桂陽先賢身彰野火並存靈柩咸可傷嗟太夫人乳間發瘡醫云惟得人吮癑血或望可差君方寸已亂應聲即吮旬日之間遂得痊復君之事親可謂至矣從兄右衛擁旌嶺表若疑作苦相携致昔焉逰志氣為馬援所知班嗣才學為班彪見賞復聞於今日矣乃除永化縣令靜尋欹案或吟長岑之逺乍撫鳴琴不以河陽為陋日南金柱合浦珠泉莫肯一作曽莫經懷未嘗留目解巾平西邵陵王法曹參軍仍轉尚書工部侍郎始入禮闈既登蘭閣尚書僕射陳郡謝舉人望國華引君言論謂同位坐曰江漢英靈見於此矣西中郎嶽陽王以緑車之重臨西河之牧敕用君為本州治中尋遷别駕王叔理以品物流名陳仲舉以題軒馳譽君之展驥兼而有之及乎大盜移國王室騷然月動星搖雲平虹直嶽陽王承制硤左當壁漢南天綱所頓英賢必集授君散騎侍郎吏部員外郎散騎常侍兼太子侍講監儲甲觀事重史册侍講桂宫名髙張禹俄遷車騎大將軍侍中開府儀同三司餘如故方之驂乘霍去病為侍中譬彼將兵公孫敖為驃騎足以照曜六府謨明九德豈直允諧上將匡贊中軍而已哉既而言從梁國服政鄷都管仲有詞即受下卿之禮臧孫見德還奉嘉賔之宴有詔授使持節驃騎大將軍開府儀同三司霍州諸軍事霍州刺史犀節去關衮衣馳傳迎郊則文學前驅賔衛則邦君負弩直以五溪遼逺馬伏波之思歸三湘卑濕賈長沙之不願是以冝城刺史直會鹿門白沙故地仍留龍種天厲弗戒奄然終極天和某年歸窆於襄陽白沙之舊塋君器宇詳正風鑒𢎞敏澡身浴德遊藝依仁汝南令望扶風長者不言財利王夷甫之為德不談人物阮嗣宗之為人從容亂離之機保此令德舒卷風雲之際無妨貴仕張衡渾儀之後即賦歸田杜預沉碑已來遂停鄉里王仲宣有讀書之樓諸葛亮有彈琴之宅實欲因此謝病間居終焉鳴琴在膝或對故人寶劔自隨時過稚子百年俄頃嗚呼哀哉遂使君子之陵止埋銅劔賢臣之墓唯銘石函銘曰有莊有惠居魯居衛義是隨時才堪濟世比部尚書東京司𨽻必復其始侯君相繼華蓋一嶽文昌一星青襟辨志童子離經義朂非馬書勤映螢往年靈柩漂泊江沱以君哀慟川后停波揚名北海馳譽西河誰登九折不入朝歌蔚炳胥變攀陪遂逺白塵隨軒丹暈附冕位參上將榮兼本選蛇盤綬結龜回印轉來朝平樂歸政咸陽蕃維即啓軍幕仍張起茲禮數峻此戎章長離宛宛刷羽陵江世急奔流年催驚隼滅沒頓轡扶桑搖軫智士石折賢人星殞西鄂芝枯南陽菊盡愴焉啓首疑作手生榮終極相杵輟舂鳴機罷織煢煢胤子視隂餘息霜露履之哀哉欒棘龍巢北望鳯闕前觀松長風逺地厚泉寒書埋簡落琴覆絃寬贈行之册書而納棺故周大將軍義興公蕭公墓銘前人昔司徒之敷五教當堯讓之初丞相之惣萬機值秦亡之後若殷人受氏乃承微子之封梁運應圖實啓延陵之國公諱太周書南史並作泰犯周太祖諱改作太字世怡蘭陵人也太祖文皇帝之孫鄱陽忠烈王之子𣲖别天潢支分若木直幹自髙澄源已逺茂親明德是稱毛畢之功宗子維城乃建邢茅之國大同元年年十六封豐城縣開國食邑五百户山臨鶴塞非無陶侃之賔氣連斗牛即有張華之劔解褐給事中仍太子洗馬公子出身非郎官而同品中朝洗馬異式道而前驅以丘疑居之誠為髙選大同元年入直殿省其年轉太子中書舍人周書作太子中舍人南史止作中書舍人疑並厯二官南宫宿衛職司蘭錡北閣從班榮參顧問通籍兩宫得賢斯在大同三年授持節仁威將軍譙州刺史褰帷祥氣之境刺舉消憂之地南陽風俗文學更多美稷相迎童兒逾逺既而亂離瘼矣王室騷然大夫有行役之悲君子有無期之怨背關懷楚扁舟而行江漢奉當壁之君張華歸中興之主承聖元年拜侍中無雙對問實踵武於丁鴻多識舊章足齊衡於王粲二年除持節平西將軍臨川內史仍轉平南將軍桂陽內史尚方鑄劔再轉金龜御史分符雙封銅虎豈直鄧攸清白見稱五鼓之歌劉寵亷能名為一錢之郡遂以天保未定王途多梗還吳不可歸蜀無路臨淄負海翻然改途竄身清漳垂趐渤海蒙授車騎大將軍散騎常侍仍為持節都督永州刺史而秦亭厭境邾柝聞城鼓角地鳴將軍天落雖復瓶缶聽聲無防於地道冠繩柴疑結不却於雲梯請命受降翻歸都護周朝以楚材晉用不停於平章趙壁秦求無論於羈逺以保定五年降使持節驃騎大將軍開府儀同三司義興郡開國公食邑一千三百户天和二年授使持節都督蔡州諸軍事蔡州刺史楚頃襄之愛子既布衣而戍谷魏安釐之母弟亦羇旅於邯鄲憂既傷人降年不永春秋五十有一薨於蔡州之鎮送故入關空餘衮服歸軒在道還更垂帷嗚呼哀哉有詔贖官周書作贈本官加并洛衣三州刺史贈諡禮也五年十一月葬於長安北原摴里子之墳正臨武庫太史公之墓直對臯門銘曰玄鳥逺烈相土宏謨東封宋社西斂秦圖人承佐漢國紹開吳有美令德茂親藩邸建國皇支承家帝弟率由冥會亮直天啓轅固聞詩唐都習禮博望之逺金華之宫文林講德武帳參戎名書柱上䇿滿帷中託身淄右蒞政淮東秦降西逼楚澤南窮時驚獵火或懼秋風屬期逺略逢茲應變陳橫十里兵圍一靣月暈孤城塵驚虛援春筍非糧秋蒿無箭垂趐卧虎夷矜輟戰時值懷來恩加始賞王爵愈峻戎章更上朱鷺才飛虞歌即響泣子留恨藏書長往炎涼迭運一作送零落山丘霜芬幕月松氣陵秋嗟南國之王子成東陵之故侯周故大將軍趙公墓銘前人公諱廣字乾歸邵惠公之元孫豳孝公之長子若木拂日長蛇委天龍圖幕河之光神鼎連雲之氣六辨搆字五運徴祥是以維嶽降神自天生德凝脂點􅃮日角珠庭為子則名髙五都為臣則光照千里華蓋中天之峰未階其峻虞淵浴日之水不盡其源嵗在雕車年方竹馬月內桂樹切問能訓石上木生懸思即悟年十一孝公薨煢煢在疚孺慕過禮泉驚孝水竹動寒林三行克宣八翼斯舉大周建國宗子維城設壝封人分司典命開國天水郡公食邑二千户元年授使持節驃騎大將軍開府儀同三司其年四月授都督秦州刺史孝公久牧汧隴遺愛在人今見撫我君之子豈獨司𨽻之臺鮑宣纍葉丞相之府韋賢重代二年拜大將軍方衛青之張幕册重元勳譬韓信之登壇榮髙獨拜武成元年遷都督興梁等十九州諸軍事梁州刺史嶓冡導漾乃濟漢之東流蔡蒙旅平實華陽之西極其年九月改封蔡國公食邑萬户地接韓城關鄰楚鄣户封八縣恩深冦恂之功邑啓萬家事極曹參之賞保定元年授少司冦犴户苔生囹關䈁動載酒屬車幸無寃氣觀囚軍府或聽鳴琴二年轉一作敕守蒲城都督潼關等六防諸軍事其年閏月遷都督秦渭等十二州諸軍事秦州刺史公亟牧冀城頻藩隴坻豪桀斂手貪殘解印加以上谷一作國精兵漁陽噪鼓北臨髙栁南望長榆丐奴下馬之山貴相藏酒之谷莫不逺慕威聲遙承風化二年奉詔向井州迎皇后有文書手仲子之歸紀裂繻來卿為君逆自非名髙絶國威被和鄰豈得稱族而行尊君之命四年授柱國大將軍昭陽以功髙見用項梁以名將當官以今方之彼有慙德天和三年授都督陜虞等八州甘防諸軍事陜州刺史屈産垂棘既有滅虢之兵王官羈馬非無絶秦之路公以正正鼓旗間間車軌服叛威邉算無遺䇿但以中外久勞積斯災疾山川則並走群望賔客則諸侯在門是以請謁承明言歸湯沐方詢夏郊之祀或辨桑林之祟更除秦州刺史仍襲父爵豳國公分流之嶺未登晚塞之城空望大夫人以公羸瘠悲泣相守胸氣交衝奄捐館舍公頓伏苫寢水漿不入雖王人勸奪瘡巨愈增母死於子子死於親慈孝之道一朝惣集大漸之辰春秋二十有九四關罷市三軍行哭言尋聽訟猶見寒棠還顧空營唯餘衰桞諡贈某官禮也六年六月歸葬於秦州之某原玄甲啓路追旌一作於驃騎之功龍旗贈行深悼東平之逺公亮直惟忠溫恭惟孝居之仁義􅎖以禮樂風神機警聰睿精明有仭於宫牆無形於喜愠金版玉䇿之記枕籍忘疲蘭葉芝花之圖膏映必舉碣石秋雲昭陽落月思風含臆言泉流吻翩翩書記則阮瑀陳琳荏荏風流則王濛謝眺語其百發弓絶於猿吟論其百中劍深於鴈陳枚乘之望梁苑不憚棄官樂毅之求燕路無辭千里至如應變將略雷電立成帷帳謀猷孫吳暗合有品藻人理之志有清平天下之心鵬路忽催龍津遂壅嗚呼哀哉大宰早茂三荆長辭萬始撫飬遺孤連枝同氣馬援之誡兄子義存謹飾王况之事世叔情深愛敬同德比義此之謂乎乃為銘曰御乾從紀乘離作聖白環讓德玄圭受命平一地紐增輝天鏡傍廕數國前臨七政地屬先登一作平隂時逢下武玉璜撥亂金縢光輔刋晉承家邢茅祚土波分建木𣲖流玄滬景命寅序徽猷淵塞忠有令圖孝為全德山節蒞政桓圭守國瀚海將臨燕山行勒平樂髙宴金華説一作經論儒壁水親禮明庭相風待賦承露須銘乘舟向日䇿馬隨星德舉克明能賢允淑上將授脤元戎推轂趙失東漁敵亡南牧箭下遼城泥封函谷衮衣頻露丹襜亟卷約法情推繁辭理遣盜烏懸察疑蛇立辨人共官園家同野􅗀籋雲推轉風落仭星裂中台山傾左鎮夏楹舍爵殷階啓殯縿幕躐行明旍庭引秦川直望隴水分飛山河滿目容衛靈歸陵圖石馬車畫衮衣小山搖落長林變衰凄愴原隰荒涼宅兆樹密人稀山多路小十里松城千年華表夜臺方寂窮泉無曉唐故邢國公李密墓志銘魏徴觀夫天造草昧之初有聖經綸之始原鹿逐而猶走瞻烏飛而未定必有異人間出命世挺生負問一作扛鼎之雄圖鬱拔山之壯氣控御英傑鞭撻區宇志逸風颷勢傾海嶽或一丸請封函谷或八千以割鴻溝夏殷資以興亡楚漢由其輕重懋功隳乎既立竒䇿敗於垂成仰龍門以摧鱗望天池而墜翼求之前載豈代有其人者哉公諱密字玄邃隴西成紀人自種德降祉𢎞道垂風導碧海之長瀾踈閬峰之遙構家傳餘慶明哲繼軌諭文德則弼諧舜禹語武功則經綸秦漢其餘令望且公且侯垂翠緌拖鳴玉者蓋亦耆舊未得盡傳良史莫能詳載矣曽祖弼周太師八柱國衛公祖曜周太保魏公父寬隋上柱國大將軍涼州總管蒲山郡公並匡周之美吕望愧其嘉謀平吳之功杜預慙其逺略公渥窪龍種丹穴鳯雛降列象之玄精稟成形之秀氣雲生五色一日千里起家左親衛府東宫千牛備身趨馳武帳暉映廊廡出入龍樓光生道路隋文帝精華已竭義不斷恩始開凌長之源將致覆宗之禍公見機而作謝病言歸優遊經史晦明藏用風塵靡雜賔友簡通交必一時之俊談必霸王之略尚書令景武公楊素崖岸峻峙天資宏亮壁立千仭直上萬尋嗣關西之孔子追陜東之姬旦深謀逺鑒獨步當時公年甫弱冠時人未許景武一見風神稱其傑出乃命諸子從而友焉並結以始終之期申以死生之分暨有隋二世肆虐黔首三象霧塞五嶽塵飛妖災所臻匪唯血落星隕怨讟所動寧止石言鬼哭轍迹遍于天下徭戍窮于海外寃魂塞宇宙白骨蔽原野墳壟發掘城郭丘墟萬里蕭條人煙斷絶公與楚公叶契共拯橫流未息溟海之波幾及昆岡之火亡自道中竄身草澤奮臂大呼群雄嚮起豹變梁楚鳯翔鞏洛據敖庾而塞轘轅登太行而臨白馬九服諸侯四方豪傑或跨州連郡或稱帝圖王合從締交爭亡秦族者莫不驅茲青犢背彼黑山擊長轂以雷奔望髙旗而電集不期而會者以百千數遂大開幕府肇啓霸一作雄圖敷七德以宣威掩八紘而取俊鱗羽畢萃草澤無遺於是發人文以化之播仁義以乘之應時機以鼓之惣群䇿以決之九野風馳六合雷駭彈壓趙燕震驚江漢世充甚昆陽之敗煬帝同望夷之禍化及師殱於黎陽建德稽顙於河朔七國之地四為我有五都之所三在域中敵騎千群長戰百萬飲馬則河洛可竭作氣則嵩華自飛近無不懷逺無不肅聲溢寰宇威懾中外屬人神乏主以天下為已任荒裔佇來蘇之望遺離疑作黎有息肩之所雖實下民伊賴然非上帝所臨壯志展於人謀雄圖屈於天命始先鳴於大樹終垂趐於群孽乃眷西顧舉茲東夏載驅周道來謁承明帝曰念功降茲休命上柱國邢國公拜光祿卿公雖威未振主自為謀蓋當世舊部先附多出其右故吏後來或居其上懷漁陽之憤憤耻從吳耿後列同淮隂之怏怏羞與絳灌為伍負其智勇頗不自安俄屬元帥秦王經營瀍洛亦親承祕䇿率卒先行既出雞鳴之關方次休牛之塞詔命施號更盡嘉謀公想雲夢之偽遊慮青衣之詐反心辭魏闕之下志在江湖之上慕范蠡之髙蹈追赤松之逺逰熊耳峰危羊腸徑險降吳不可歸蜀無路短兵既接修途已窮隂陵失道詎展拔山之力騅馬不逝徒切虞兮之歌臨陳喪元時年三十有七故吏上柱國黎陽總管曹國公徐世績等表請收葬有詔許焉體質貞明機神警悟五行一覽半靣十年雅善書劔尤精文史輕字一夫之勇學萬人之敵至于三令五申之法七縱七擒之功出天入地之奇拔幟擁沙之䇿莫不動如神化應變無窮負縱橫之才遇風雲之會望紫氣以驤首凌扶搖而振翮窗不召之衆問獨夫之罪從我如流三分將二遂有囊括四海之志併吞六合之心既而神器有歸朝宗天闕率以從義之旅為勤王之師更名作望重自疑功髙是懼將逺遊以逃難翻途窮而及禍惜乎髙鳥未盡良弓遽折敵國猶梗謀臣已喪天子過細桞以興嗟聞鼓鼙而軫慮雅重事人之節方申詔葬之禮粵以武德二年某月日葬於黎陽山西南五里之平原禮也故吏徐世績等或同嬰世網共涉難艱感意氣於一言託風雲於千載所恨並發唐代不列元凱之功俱為漢臣獨漏山河之誓是以慟深欒布悲甚向雄慮陵谷之推移勒斯銘於泉户庶使神逰楚國無慙項羽之臣魂往齊都不愧田橫之冡乃為銘曰如馬唐臣猶龍周史宏道百世邁德千祀帶地深一作長源極天峻峙玉種逾作俞潤蘭芳不已成形騰氣成象降精餘慶鍾美惟公挺生少表竒智早擅英聲符采發越志略縱橫隋道方衰始開陵長覩兹兆亂𬗟然長想閉關晦迹招弓莫往盤桓利居不嬰世網運居道消時逢改卜朱旗爰止素靈已哭野戰群龍馳走原鹿競窺周鼎爭亡秦族時遭蠖屈運偶鳯翔劬勞百戰經營四方振蕩六合牢籠八荒始聞楚霸終基漢皇群雄並起莫恢王度聖人既作皇天乃顧爰自東夏言遵西路來擬竇融寵逾英布爵窮五等位登九棘帷幄參謀髙衢騁力海運方逺圖南未極縱壑擢鱗摩天墜翼熊耳失路新安殞身長男喪楚少女留秦驚魂靡託反葬何因列樹松檟唯餘故人文苑英華卷九百四十八
