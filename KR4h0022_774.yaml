body:
  text: 文苑英華巻七百七十五宋李昉等編頌徳上唐故襄州刺史靳公遺愛頌一首唐濟州刺史裴公徳政頌一首唐故幽州都督河北節度使燕國文貞張公遺愛頌一首唐故洪州刺史張公遺愛頌一首唐故懐州刺史贈太子少傅楊公遺愛頌一首平原公遺愛頌一首唐故襄州刺史靳公遺愛頌集作并序銘張九齡江漢間州以十數而襄陽為大舊多三輔之家今則一都之㑹故在晉稱南雍在楚為北津厥繇龎雜亦云難理而前此領郡鮮能安人或猛或寛或拘或抗跡多弗類俗亦弗寜是以天子念與我之共理而公受頒條石本作煩卿之寄矣公名恒字子石本無子字濟其先某三字石本作河西人也祖師幽州長史父禮庭奉天尉監察御史世石本作代不茍合義在難進雖無充量之位而有積善之烈矣公性持重有器望即温而聽厲動敬而居簡十字集作即而厲居敬而簡度量可以軌物徳義可以服人而先王遺言率由好學君子行道必本忠恕浚源水潔勵翼雲翔故一舉為拾遺已有逺致三入為御史偘然正色當時知音謂且大用而尚書理本郎官選才亟踐諸曹克厭羣議及在典外集作大郡遂佐益州攝御史中丞集作成丞都督西南軍事原軫超將豈唯上徳翁歸中立實兼文武先是兵連蠻徼嵗轉軍儲擾我公私費以巨億公乃急其所病思有以易之建大田於雲南罷饋糧於巴蜀向之踰重阻冒毒瘴負擔以􅀈斃垂餌集作耳於剽掠者每十有五六及公底績盡境頼全至於是邦也政實有素今也唯行不違其方以索其極莫不教之誨之優之柔之從者善之否則威之先徳後刑端本肇末物知所勸事則有經率訓者衆多變薄為厚感惠者深逺既和且均夫然後石本無後字人斯耻格庭少争訟叅佐閒拱屬城晏和石本作如其始也一年而政成其終也三年而頌盈愛之如父母畏之如神明開元十二年以理跡尤異㢘使上逹天子嘉之稍遷陜州刺史既解印去郡攀車盈途或願石本無願字借留無縁而人吏遮道或瞻望不石本作弗及而老㓜啼呼如是者五里已終朝十日乃出界而皆言曰捨我何之及聞公之䘮哀可知矣市為之罷舂以之輟惠愛之結深古今之感一盖為仁由已而遺徳在人者其若是乎郡中士大夫與門生故吏聚族而議譔徳是以刻石立紀彼鮦陽之陋墮淚成碑此峴山之績集作銘曰英英靳公宣哲秉彛為我髦士作人元龜倜儻大節磊落瑰詞人亦有言天實資之御史直繩郎官髙遷選動必兼能皆再踐紏逷集作遏邦慝彌綸事典遂及我人化流樊沔激勵素風抑揚善政約已為法急人所病物固推誠事匪忘敬感被于下仁明在詠舉徳不鮮渉道載深穆然清風莫其遺音靳公既沒厥跡可尋勒石是圖以慰甿心唐濟州刺史裴公徳政頌孫逖昔太公之理齊也尊賢知尚有功泱泱大風千載不泯石慶古之良相也臨淄社焉于公古之良吏曹也東海祠焉裴公今之良太守也濟北頌焉今古一揆謂之齊志茍非其人名不偽立君子是以知裴公之為政有異能矣初公以甲子嵗秋八月蒞於是邦祗遹明命𢎞敷令典教之誨之養之育之俾夫闔境之内靡清風漸膏雨醉純徳飽話言若卜筮之是孚如草木之允殖用克畏慕外于大繇其明年也皇帝東廵狩至岱宗自洛及充於皇時邁雷轂萬乗雲旗千里供帳於東道者凡十有六州焉大或數圻次或萬井中産者輕幣膏粱者倍征方事之殷猶懼不給茲郡徧小實難圖也公淵然深識卓然逺謀擇利而行慮善以動西自于陽臺一無此字榖東盡于良清造舟為三橋置騎為馬驛闢野為西頃除道為九逵或緫或秸或薪或槱或饔或餼或糧或糗㸑之踖踖積之栗栗其崇如牖其比如櫛皆先之以方畧繼之以生聚因吏禄之竒贏雜官用之餘羡通變合度豐省中程編户之民秋毫勿興繇是邑無征一作征徴令鄉無歛法賈不利於乗急農不傷於甚賤且狎其野而安其業人所謂勤而不得疑作徳施而弗費雖小必濟不亦宜乎抑又聞之居簡則易於徳綏處煩則難於柔克大抵皆是其誰不然公始自知供迨於卒業不鞭一卒不貫一吏繩責勿用鐫譙無施禮以生其恭恱以盡其力役不冄令事無後期雖子文治兵之舉叔敖城拆左傳作城圻之政類能比徳曷足稱多洎鑾輿反斾旌别淑慝監頓使劉日正勸農使盧怡並奏公理行第一議者以為當矣其三年秋大水河堤壊决諸郡有聞皆俟詔到莫敢興役害既滋甚功無已時公以為執事諉上者非至公之法也便文自營者非盡忠之計也亦既成奏因而發卒播告厥指率籲於人荷鍤者襁屬負畚者麏至從公于邁祁祁如雲公俯臨决河躬自䕶作雨不張盖塵不振衣饋不致鮮寢不處館蔬食以同其烹餁野次以同一作均其燥濕板築競勤鼛鼓弗勝克鞏而成匪亟而速以浹辰之役興百倍之利澹一作减災革弊人到于今頼焉古之所謂敏則有功豈虚言矣公之方在河上也有執訊者傳詔命公為宣州刺史公悼其功之不成且懼人之休怠未即宣布周之宻之公撫廵如初食疑厲不輟及提役既畢國人皆賀公於是解印出次啟籥見書莫不瞿然而駭曰不虞公去之速也嗚呼曷歸乎乃大哭既而幢棨就國千旟首途野有輟耕巷無服馬男女以辨號泣相望或觴于郊或餞于境扶服遮道汍瀾駐車莫肯旋歸殆過信宿一作歸夫所居人富所去見思前史以為有徳一有讓字君子之遺風猗嗟裴公盖有之矣公名曜卿字煥之河東聞喜人祖某皇廟亳州鄼縣令父守真皇朝成寜二州刺史贈晋州刺史又贈充州都督偕受祉必大垂裕不朽彰徹簡冊布昭政一作賭聞其緒業有如此者公之昆友故冀州刺史子餘等六人俱以儒行逹天下之人謂之六龍公之自出令屯田員外郎韋述等七人俱以才名進天下之人謂之七子其族姻有如此者公畢疑作覃訏有聲髫非克類公侯表於龜筮詩禮成於小學八嵗神童擢第則已殊於公路矣下髦之後尤邃於文長安中則天首命有司考試調集之士而第其詞之髙下公以甲科授秘書省正字異其對也睿宗之在藩邸精選寮属公為典籖兼掌文翰愛其材也其文藝有如此者頃之遷國子主簿試詹事府丞歴河南府事曹叅軍拜考功員外郎除右司兵部二郎中自長安令臨此郡自宣城守改授冀州翁歸為政不移於故跡延夀理人亟登於髙第入拜户部侍郎今為左庶子其閥閱有如此者若乃邁徳由已全誠自衷出入孝悌周旋禮樂幅利以儉葆光以和仁而有剛直而不倨㣲妙析理入於無間清明開物周於有象享茲具羙可謂大賢其庇身也𢎞矣其所憑也厚矣詩曰布政優優百禄是遒又曰君子萬年介爾景福夫如是欲辭福禄其可得乎方當彌綸帝績豈徒潤色吏事而已盧縣父老某乙等懐公之惠不可弭忘思欲銘徳頌羙計功稱伐以予國之史臣也學於春秋褒貶之義乃因邑子校書郎衛憑假詞不能徴拙於我事則詳實言多遺恨著循吏之傳願守文翁述馬野之詩慙非史克詞曰瞻彼濟矣湜湜其沚有斐君子令聞不已帝省其方和鑾央央務穡布常駿惠于王我隄既溢我民既恤成之不日有始有卒黄髪畨畨飲公之和矢之不多維以遂歌唐故幽州都督河北節度使燕國文貞張公遺愛頌并序有唐開府儀同三司行尚書左丞贈太師燕國文貞公諱說字道濟張氏聖文神武皇帝佐命之臣也開元六祀宅于幽朔及公既殁御撰豐碑以為用公於是邦當革弊之舉訊彼故老徴於前事有以見聖人之情見於辭矣夫㴾碣之北有山戎焉乍臣乍驕或息或縱鎮之以大府府有都督威之以大軍軍有節度二者之任萬邦之屏彌縫其闕必在宗臣曩者天冊之初王尚書不反命則我天后以納言狄公頌之先天之際孫將軍不振旅則我睿宗以太尉宋公為之洎陘口之役薛公小衂後數稔傷痍未平易置諸將少有稱者則我皇帝注意於文貞公社稷之固生民之傑伊昔徇節未嘗顧身靣折二豎辯邪正於君側首謀四㐫决安危於天下勇於義力於忠雖有賁育不能奪已自受命處此聲振殊俗終公之代不敢近邊聖人金城其在是矣先是公之未至也軍實耗斁邊儲匱少帑藏乏中人之産革車無百駟之羣將欲豐之不其難也公問以謡俗因而化之命人採銅於黄山使興鼔鑄之利命杼人斬木於燕岳使通林麓之財命圉人市駿於兩蕃使頒質馬之政命廪人搜粟於塞下使循平糴之法物有其官官瞻其事如川之至以莫不增一年而財用肅給二年而蓄聚饒羡軍聲武備百倍於徃時矣猶以為不一勞者不久逸不暫費者不永寜既庶且富人可用也於是塹山澤起亭障塞鷄鳴之阨守阜陵之衝遮大厦之路距盧龍之口延袤千里横絶一方以順天地之心且為華夷之限命下之日脩塞之後人到于今頼焉夫戎狄逺却暴禁矣貨食滋至財豐矣封守以固人安矣師徒不勞兵戢矣武有七徳我其四焉坐致必勝之道以銷未形之患是公之深計逺慮所致也初公之大用實以詞宗雖亟持國鈞而未執兵柄及台揆中廢荆衡外牧上將復一有内字由因以為將惟幽都克慎厥始惟大原克和厥中惟朔方克成厥終三駕而時靡有争繇是復踐中樞之任矣文武為憲斯之謂歟喬岳告成遂登仲虺之相金華念舊仍遵尚父之師髙朗令終固其宜也昔周有張仲是稱孝友漢有留侯見推籌畫太守飛聲於朔野司空邁績於西晉及公之貴世徳其昌光于祖考則慶州都督刑部尚書追孝於前烈友于兄弟則國子祭酒懐州刺史致羙於當代施于祚𦙍則兵部侍郎駙馬都尉纉戎於後葉人臣尊寵舉集其門豈伊朱綸之盛方繼緇衣之好辯其譜系范陽之大族也叙其封畧燕國之名都也徴其政理幽州之良牧也美數多矣斯人之徳與夫班伯之榮故郡買臣之驚守邸盖不侔矣薊縣父老某乙等感之所致久而益思逺訴不才追書盛徳徽音已隔空悲梁木之歌碑頌獨存應墮峴山之淚仍係辭曰聖出賢覩為師為輔大國宗文殊方畏武帝謂幽朔人思鎮撫受命再贍聿来茲土謀猷既壯闕漏咸補守固邦寜財豐人聚四牡既駕三邊無侮又何與文疑作之𤣥衮及黼范陽宗邑燕垂守宇徳被塞翁恩深召父卓彼遺愛傳於終古貞石不塞疑作騫薊丘之下唐故洪州刺史張公遺愛頌并序集作唐太子賓客兼御史大夫洪州刺史洪吉八州都防禦觀察處置使平原郡開國公張公遺愛頌獨孤及北斗魁戴匡六星曰文昌宫其三曰貴相聖人法天建官作為台司以左右民於是乎有敬敷五教平章百姓之職居之者下代天工上應星宿其或一麾出守八命作牧内為吉甫外為方叔𢎞道利物其政一也惟唐七世皇帝誅羿澆纂舊服得柱石之臣曰平原張公諱鎬字從周秉中庸之徳含光大之量輟耕隴畆為唐臯䕫推轂於河南樹風于荆門作賔銅樓登侍禁掖牧撫人半嵗洪州再稔鰥寡不侮神人咸若慈惠之政洽于百城享夀六十有一嵗在癸卯七月壬寅薨于位夫徳之被物也厚則物之興感也至故公之捐館自九江至於敷淺原南暨於梅嶺東臻于閩徼而蚩蚩之民靡㓜靡艾泣涕乎遺風悽愴乎棠陰懇懇乎若求而不得企而不及也僉曰平原其可謂盛徳也已子惠困窮俾富而庶若解衣衣我輟食食我棄我徃其集作矣誰育我矣逝矣逺矣音徽沫矣吾儕小人嗚呼疇依盍詠歌之刻諸金石秋八月既殯耆老集作夀吉州安福縣丞鄧林集作琳玉等一百一十集作十有五人乃率籲衆慼謀及故吏從事州長縣尹虎賁亞旅鄉老二字集作卿大夫相與稽乎陳迹建頌表徳用廣留侯之世家紀子産之遺愛禮也公曾祖曰善見位朝議大夫越州司馬司馬生武定任荆州都督府户曹叅軍户曹生知古官止代州司馬二字集作司功叅軍廣徳元年贈太子少傅自司馬至少傅世以儒顯天鍾羙於其後嗣四世而生平原燕頷集作河目犀額山立玉色森然若大厦棟梁清廟祭器該綜六學大抵以周易為師將觀集作探化元耻觀朶頥隐居南山盖三十朞天寶十四年集作祀始褐衣召見凡用捨繫于集作乎才行止牽乎時當無為無事即詔二字集作則許由善巻各得安其節及人思俾乂則黄公角里不能逃其集作於用勢使然也繇是一命左拾遺再命右補闕脩國史三命侍御史四諫議大夫五命中書侍郎同中書門下平章事起布衣二年集作嵗綰相印佐王業明敡之盛耀動古今一作今古于時至徳二載也天子集作王方以復夏之師蒐于岐陽三河之人左袵是懼公入叙百揆出分二陜帥東諸侯之兵收復宋鄭誅後至者以懲不恪安危之機懸於方寸方將董正東夏懐柔山戎㑹帝咨百工曰有能典朕荆楚俾姦宄不作予惟克邁乃訓於是拜公荆州大都督府長史明年元良肇建上曰疇若予樂正父師之職汝作賔客卒調䕶太子嘉言惟允於是授太子賔客上思夙夜出納言語侍從之臣命公作散騎常侍㑹鍾陵鄱陽之間人咨難食上又曰命汝作州伯緫十聫之任俾余無虞惟爾集作汝賢於是有洪州之拜粤寶應元年冬十月公朝服受命至自臨川彰善用明瘴惡用威一法度用信布愷悌用徳慰薦掾吏勞俫鰥寡化以公廉扇以禮讓煦而嫗之使自得清而靜之使自定於是豪民猾吏革面歛手家有忠信人懐孝弟暢於事業布於風俗浹於人心被於歌詠是嵗也二吳饑人集作民相食勵集作厲鬼出行札䘮毒痡淮湖之境骼胔成岳而我倉如陵我民孔阜犬牙之境疵癘不作集作入災不勝徳也臨海賊袁晁狃于㑹稽之役侵我東鄙江介大恐民斯繹騷公命左軍屯上饒之隘塞常山之口斬其搪突者三千餘人集作級自是姦黨散落不敢南向而射英華以射字為句是集本連下文邦字非諸郡恐非邦人安焉羣舒集作書成賊帥揚昭集作招非憑蜂聚之衆殺同安郡劉秋子集作狄以叛師潰而奔犯我疆塲公覆而取之懸其首于五逹之衢㐫徒殱焉沈千乗集本書唐作載者新安大豪結權剽之黨為之囊槖用集作弄兵潢地䖍劉我民桴皷之聲相聞郡國二千石不能禁公命次將斬之以狥鋤其根株俾無遺類新安民庶室家相慶江干清焉振六條之宏綱開布大信從善如流視民如赤子克已推誠以百姓心為心飲之以和俾服從教化輕剽啙窳奪攘矯䖍之俗罔或干于政憀悴集作牙口牙切恐懼也蹇亟苛察繳繞之吏不能見其巧哀敬明庶期于無訟徳政行焉眘選乃僚必國之良有若傳陵崔賁昌黎韓洄趙郡李惟岳北海王士華河間邢宙河東裴孝智隴西李道皆卿才也以嘉言碩畫叅公軍事澄清之内無濁流審克之下無寃民淑徳集作忒旌焉公之解短褐而拖國章也十有一年矣雖匪躬之故宣力不暇而滄州願言未始弭忘每曰少伯子房吾之師也累乞骸骨將角巾故山朝廷方虚三老五更之貟集作位待公而備書未及下而公薨焉嗚呼哀哉裒集作哀徳之盛典退身之正志享集作嚮用之遐福三者俱未從人欲斯可以歎矣惟公出將入相文武為憲讜言成畧藏在冊府代莫得而聞也今採其徳刑禮義之善利物者頌之于石慰彼墮淚者之心焉爾其文曰純粹之氣升于星辰降為賢人皇王得之以釐百工以隲下民九江之南五品不遜百姓不親平原来思集作斯遵集作道之以徳俾民化淳寛厚以寜集作清凈清淨飭躬帥先是動集作師先是餙躬訓是勤猛獸不噬夜犬不吠豐年来臻藹藹令徳家有膏雨户有陽春牧我苦晩集作慕棄我若新集作若實天不仁南州寥寥東山依依徳音若存千載之後魂魄登此頌聲不泯唐故開府儀同三司試太常卿懐州刺史贈太子少傅楊公遺愛頌并序皇帝嗣位二載河南得賢二千石曰猗氏楊承仙者剛毅公㢘仁民愛物起鼙皷間為唐循吏天性集作生貞方非有經術潤飾推誠御衆以身帥先民用不擾政是以茂于時王師始平河北而覃懐纔歸于我大軍集作兵之後城郭為墟相國凉公㧞公于戎馬之上表為刺史俾慰安斯民集作人公既至則吊其瘡痍為剪荆棘省事節用寛其征而均其力然后濬决古溝引丹水以溉田田之汗莱遂為沃野衣食河内數千萬口流人襁負不召自至如歸市焉鰥㷀無吿不能自耕者貸首種與農器而教道之視五榖所宜督其程課勞来不怠使人集作民無不咸返其本每循行屬縣問所疾痛時其饑飽心為慘怛如身之恤臂指慈母之視㓜子也性嚴不殘而恭於奉法訓軍以律禁暴必肅有抵刑者雖㧞葵把集作犯禾殺之無赦由是兵不為盗猛獸不食人河内之犬無夜吠者人人得敦其業而厚其生上竒其能以璽書勞勉封𢎞農郡公邑二千户拜其男銳河南府叅軍方倚以牧民集作人民集無此字不遐其福大厯二年八月六日公薨于州春秋四十四皇帝悼惜詔曰軍興以来列郡凋耗二千石少能以政集作教化稱者唯承仙苦心精力惠此一州家給而知禮節氣和而無災害三年有成表課第一賢守既歿誰其嗣之可贈太子少傅好事者譔公景行謂公清直彊力能勤其官百城之州三軍之帥可使居其任重集作量不期集作極而殁惜哉初岐國公魯炅之守襄集作攘鄧也公為新軍佐敢冒集作殊死督戰奮士卒先藺集有矢字石亂中敗面㓕鼻而不言病卒以是挫敵軍中服其義勇及凉公秉鉞公集作而委質焉前後保河陽守髙平安潞鎮鄴董戎壺口戮力危機之中賈勇倉卒之間唯盡敵是求嘗不集作未嘗顧身元戎頼之卒集大勲由是歴羽林金吾光禄殿中由光禄大夫加開府儀同三司試太常卿而後至於是州也公嘗表請歸葬途由於洛陽人聞楊懐州之至也環而觀之及其還也懐人數千湏于路其亡也闔境相吊童子不巷歌凡立誠應物者信不足則行失集作不信餙智沽名者實不足則名䘮若楊公者非仁必由已而誠在言前則不能使千萬人恱之之速如是某官某耆夀等願復攀公之朱轓望公之清揚而靡因也故立石為碑以慰後人思其詞曰六律集作彼永思云吳公文翁遭時無危因而綏之其績易施公之来思集作斯大盗始夷師旅饑饉因集作丁于斯時頑民反側比屋流離飲公醇仁而忘怨咨饑者得食寒者得衣豈知典謀以吏為師豈必法令信則不欺功倍古人愛及㷀婺宜從古欲集作人俾夀無期嗚呼不傭捨我曷歸公俾我活何以報之我思公兮泣淚此碑平原公遺徳頌李華維上帝降靈為賢弼我大邦鈞明說望恊期陳謨仗鉞出師丕赫厥勛大君以距嶺縁湖八州之域天下震擾此邦全寜内輔宗師外飫軍旅咽頥荆越鍾以眷右乃命平原賔䕶東宫而尊大之師長邦憲肅清華夷朱旂暢轂平原戾止秋霜伊何視我直方春雨伊何𢎞我愷悌公張氏諱鎬字從周河内儒家時賢薦讓詔書徴起三年之間位登將相吉甫方叔平原兼之間嵗臨海往疑頑覆浙左滔上饒灊皖冦徒戕害長吏潜逼鍾陵宜春盜帥家兵遍山吏不敢問人愁苦之公黙麾偏師勿駭吾人無聲無色羣兇梟夷下遂其順上遂其仁咸曰不有平原遑恤吾身平原之政以類而舉是邦胡寃公薨於鎮八州文武吏人老㓜途哭家祭不能舉首夫山傾川竭未為成災大臣盛徳捨榮即哀災之大者刻頌之義發乎心播乎聲施事為教感哀為徳公故吏侍御史博陵崔賁文明殿中侍御史昌黎韓洄㓜深監察御史趙郡李惟岳謨道大理寺丞王士華子秀刑部尚書員外郎袁州刺史張澹惟清袁州别駕吳郡陸調牧臣及耆夀袁維清彭正運施希是李開雲百姓彭伋潘玉等一十二人咨余為頌撫石而泣故其詞也哀皇矣明皇求公于野官在諌省將鋤悖兇謂公有勛庸授公肅宗納為輔翼專征獯戎或蹇或通易簡昭融帝命平原八州隄封深湖大江宣布睿徳淳此下國蕩除妖賊安其父子爰及家室時萬時億山川出雲生此元臣獻嵗發春三靈化醇今則逝矣南方愁辛嗚呼平原如其仁如其仁文苑英華巻七百七十五
