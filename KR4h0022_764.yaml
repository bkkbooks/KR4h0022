body:
  text: 文苑英華巻七百六十五宋李昉等編選舉吏部兵部選人議一首貢舉議一首舉選議一首省官議一首尚書省官議一首僕射議一首省試學生代齋郎議一首舉縣宰議一首吏部議一首兵部議一首吏部兵部選人議崔融開耀五年議曰太極生而兩儀見聖人作而萬物覩仰以觀法於天夫君人者以天下之目視以天下之耳聽以天下之智慮以天下之力動故號令能究而臣情得上聞八千年之初不可得而詳矣夫二十四氣之後請推揚而陳之軒轅氏之立議明臺斯所以上官於賢也陶唐氏之清問衢室斯所以下聽於人也以大舜之德也而有告善之旌以大禹之功也而有欲諫之皷然則三皇乘䇿而下濟五帝繁一作擊手而上行唐虞按轡而光宅禹湯驅馳而奄甸雖歩驟之道不同而啟沃之情一貫可不務乎今天皇垂衣裳負黼扆獨得千年之景運猶懼一物之未安發德音採輿議憂選司之或爽慮考績之弗明此天皇堯舜之用心也有司伏奉明㫖以吏部兵部選人每年萬人已上及其銓量十放六七疲於來徃虚費資糧者愚臣敢不悉以陳之夫唐虞稽古建官惟百舉八才命四子上有以明其化下有以晏其風康哉之歌於是乎出郁乎之德於此自興夏商倍之亦克用又濟濟多士文王以寧自周道無章秦原競逐張官設府班員積於簡書選衆舉才受垂疑一於典憲降及漢魏下逮周隋豈其然歟無聞一作問焉爾皇家再造區夏重張宸極四神驟雨而來遊五聖奔星而下降禮明樂備天平地成八百餘國之君長襲賔廷之冠帶七十二代之帝王仰仙閭之軌躅量其土宇固可頓豎亥而迷大章筭其臣人固已讋容成而驚𨽻首室多忠信家盡孝慈老夫不知帝力童子羞論覇道文也武也左之右之實蕃有徒不可勝旣出門無咎適顯於明時比屋可封何驚於聖俗誠望博謀俊德敷求哲人兩曹妙選三官備設然後收其杞梓搴其蕭稂其有狀犯贓私罪當懲貶案覆巳定景迹具存者此等旣未合得官逺來徒為勞費伏望許同選例限以嵗年諸色入流每年叅選資品未著伎藝未工此等自知未合得官情願更加修習伏望許同選例録以選勞闕疑外諸州道理迢逓河洛之邑天地所中伏望詔東西二曹兩都分簡留放旣畢同赴京師選人毎年長名常至正月半後伏望速加銓簡促以程期夫然有署者不來無德者不至來者就而簡之至者速而遣之因其物情亦何疲於來徃順其人欲亦何費於資糧入官考績先慿善最比來乃有不論德行惟據功夫奨勸之道未為折衷者愚臣敢不明目以論之書不云乎三考黜陟唐帝虞帝之遺烈燦焉禮有之矣百官㑹計文王武王之彛典存焉京房進課式之言漢王之所未暇盧毓苦真偽之雜魏后竟以施行盡善之文明詔攸在至如不論德行惟㨿功夫者此由外州郡牧未盡得賢監司長官時有其濫褒貶不遵令式高下隨其愛憎至公外爽曲私内結伏望播告天下申明舊章其有德有行府寮共推者雖有公坐小失重加褒進之無才無識朝廷罕稱者雖有公事微効量加抑退之德行雖不能茂因之以勤勞者亦量加褒進之然後命繡衣驄馬糾舉内外隨狀推科以情案察刑兹無赦令在必行夫然德行為上功夫次之折衷之方庶幾此道微臣等才謝知今學慙半古海内無事君子盈朝天下有道庶人何議謹議貢舉議並序文粹作議楊綰條奏貢舉䟽賈至代宗寳應二年六月勑令州縣毎年察秀才孝亷取在鄉閭有孝悌亷耻之行委有司以禮待之試其所通之學五經之内精通一經兼能對䇿逹於理體者並量行業授官其明經進士並停子舉㑹要無此二字道舉亦宜凖此所司請今年舉人等或篤㑹要作舊業旣成理難速改或逺州所送身已在途事湏收奨不可中廢其今秋舉人中有情願依舊業舉試者亦聽明㑹要作經年已後一依新勑時禮部侍郎楊綰奏請勑令公卿已下集議至時為中書舎人議曰禮部奏每嵗貢人依鄉舉里選勑令議者謹按夏之政尚忠殷之政尚敬周之政尚文然則文與忠敬皆統人之行也且諡號二字文粹作夫述行美極於文文粹有人字文興則忠敬存焉是故前代以文取士本文行也由詞以觀行則及詞也宣父稱顔子不遷怒不貳過謂之好學至乎修春秋則游夏之徒不能措一詞不亦明乎間者禮部取人有乖斯義易曰觀乎人文以化成天下關睢之義曰先王以是經夫婦成孝敬厚人倫美教化移風俗盖化舊唐書楊綰傳文粹並作王政之所由廢興也故延陵聽樂知諸侯之存亡今試學者以帖字為精通而不窮㫖義豈能知遷怒貳過之道乎考文者以聲病為是非而務擇浮艶豈能知移風易俗化天下之事乎是以上失其源而下襲其流乘流波蕩不知所止先王之道莫能行也夫先王之道消則小人之道長小人之道長則亂臣賊子由是生焉臣賊文粹作弒其君子弑其父非一朝一夕之故其所由來者漸矣漸者何謂忠信之陵頺耻尚之失所末學之馳騁儒道之不舉四者皆由取士之失也夫一國之事繋一人之本謂之風賛揚其風繋卿大夫也卿大夫何嘗不出於士乎今取士試之小道而不以逺者大者使干禄之徒趨於文粹作馳末術是誘導之差也夫以蝸蚓之餌雜垂滄海而望吞舟之魚至不亦難乎所以食垂餌者皆小魚就科目者皆小藝四人之業士最關於風化近代趨仕靡然同文椊作向風致使舊唐書賈至傳作所以楊綰傳同正文禄山一呼而四海震蕩思明再亂而十年不復向使禮譲之道𢎞仁義之風著則忠臣孝子比屋可封逆節不得而萌也人心不得而摇也且夏有天下四百載禹之道䘮而殷始興焉殷有天下六百祀湯之法棄而周始興焉周有天下八百年文武之政廢賈至傳作弊而秦始并焉觀三代之選士任賢皆考實行故能風俗文粹作化淳一運祚長逺秦坑儒生二代而亡漢興雜三代之政𢎞四科之舉西京始振經術之學東京終持名節之行至有外戚竊位强臣擅權弱主臨朝文粹作孤立川文粹作外立母后專政而社稷不隕終彼四百豈非學行道扇化於鄉里川文粹作閭哉厥後文章道弊尚於浮侈取士術異苟濟一時自魏至隋僅四百載三光分景九州阻域竊號僣位德義不修是以子孫速顛享國咸促賈至傳作不永國家革魏晉梁隋之弊承夏殷周漢之業四隩旣宅九州攸同覆燾亭育合德天地安有捨皇王舉士之道蹤賈至傳作從亂代取人之術此公卿大夫之辱也楊綰所奏實為正論然自典午覆敗中原板蕩禮樂湮沉衣冠遷徙南北分裂人多僑處聖朝一平區宇尚復因循版圖則張閭井未設士居鄉土百無一二因縁官族所在耕築地望繫數百年之外而身皆東西南北之人焉今欲止依古制鄉舉里選猶恐取士之未盡也請兼廣學校以𢎞訓誘今兩京有太學州縣有小學兵革一動生徒流離儒臣師氏禄廪無向貢士不稱行實胄子何嘗講習獨禮部每嵗擢甲乙之第謂𢎞奨勸不其謬歟文粹作哉祇足唐書有以字長浮薄之風啟僥倖之路矣其國子博士等望加員數厚其禄秩選通儒碩生間居其職十道大郡量置大學舘令博士出外兼領郡官召置生徒依乎故事保桑梓者鄉里舉焉在流寓者庠序推之文粹作焉朝而行之夕見其利如此則青青不復興刺擾擾由其歸本矣人倫之始王化之先不過是也謹議舉選議趙匡本一無本字昔三代建侯與今事異理道損益請自漢言之漢朝用人自詔舉之外其府寺郡國屬吏皆令自署故天下之士修身於家而辟書交至以此士務名節風俗用修魏氏立九品之制中正司之於是族大者第高而寒門之秀屈矣國朝舉選因一作用隋氏之制嵗月旣久其法益訛夫才一有智字因習就固然之理進士者時共貴之主司褒貶實在詩賦務求巧麗以此為賢不惟無益於用實亦妨其習學一作正習不惟撓其淳和實又長其佻薄自非識度超然特成孤秀其餘所習悉昧本源欲以啓導性靈奨成後進斯亦難矣故士林鮮體國之論其弊一也又人之心知一作智盖有涯分而九流七畧書籍無窮主司徴問不立程限故修習之時但務抄畧比及就試偶中是期業無所成固由於此故當代寡人師之學其弊二也䟽以釋經盖筌蹄耳明經讀誦一作書勤苦已甚既口問義又誦䟽文徒竭其精華習不急之業而當代禮法無不面墻及臨人决事取辦一作辨胥吏之口而已所謂所習非所用所用非所習者也故當官少稱職之吏其弊三也舉人大率二十人中方求一作收一人故没齒而不登科者甚衆其事難其路隘也如此雜色之流廣通其路此一彼十此百彼千揆其秩序無所差降故受官多低一作底下之人修業抱後時之歎待不才者何厚處有能者何薄崇末抑本啟昏窒明故士子捨學業而趨末役一作伎其弊四也收人旣少則争第急切交馳公卿以求汲引毁訾同類用以争先故業因儒雅行成險薄非受性如此勢使然也浸以成虧損國風其弊五也大抵舉選人以秋初就路春末方歸休息未定聚糧未辦即又及秋事業不得修習益令藝能淺薄其弊六也羇旅徃來糜費實甚非唯妨闕正業盖亦隳其舊産未及數舉索然以空其弊七也貧窶之士在其逺方欲力赴京師而所冀一作異無際以此揆度遂至沒身使兹人有抱屈之恨國家有遺才之闕其弊八也官司運江淮之儲計五費其四乃逹京邑芻薪之費一作貴又十倍其四一作四方而舉選之人毎年攅㑹計其人畜盖将數萬無成而歸十乃七八徒令關中煩耗其弊九也為官擇人惟才是待今選司並格之以年數合格者判雖下劣一切皆收如未合格而應科目者纔有小瑕莫不見棄故無能之士禄以例臻才俊之流坐成白首此非古人求賢審官之義亦以明矣其弊十也選人不約本州所試悉令聚於京師人旣浩穣文簿煩一作繁雜因此渝濫其事百端故俗間相傳云入試非正身十有三四赴官非一作折正身十有二三此又弊之尤者今若未能頓除舉選以從古制且稍變更以息弊源則官多佳吏風俗可變其條例如後謹議雜色之流此上京本通典有而字一作皆通典省官議杜佑議曰唐虞稽古建官惟百夏商官倍亦克用乂周建六官各有徒屬雖尚文去質吏衆事繁然而條流不紊職非重設秦氏立制多因時宜漢初沿襲後漸一作其後増廣光武建武六年廢罷四百餘縣吏職十置新唐書作署其一魏太和中分命使臣省州縣唐書作郡吏正始中又并合郡縣等晉太元六年省七百餘員晉武帝炎以乙酉嵗受魏禪年號秦始十年至乙未嵗改元咸寧又至庚子改元太康元年始滅吳而荀朂傳所載議省州半吏在咸寧之後而資治通鑑亦書於咸寧之五年今杜佑通典作晉太元六年且有呉國尚在之語所謂太元乃東晉孝武年號非晉初之武帝佑不應爾疑雕印時誤指泰始為太元不及咸寧而新唐書作佑傳亦襲其誤爾當考之隋開皇三年廢五百餘郡國家貞觀初省内官六百餘員詳設官之本為理衆庶所以古者計人置吏故周官鄉遂稍縣畿約人定員吏無虚設自漢魏晉隋暨于聖唐皆因戰爭流離征繕艱勞即省吏職存一作在諸方䇿晉荀朂桓温俱有此議息人救弊何莫由斯昔臯繇作士師正五刑今刑部尚書大理卿是二臯陶也垂作共工利噐用今工部尚書将作監是二垂也契作司徒敷五教今司徒户部尚書是二契也伯夷秩宗典邦禮今則禮部尚書禮儀使是二伯夷也伯益作虞掌山澤今虞部郎中都水使者是二伯益也伯冏作太僕掌車馬今太僕卿駕部郎中尚輦奉御閑廐使者是四伯冏也古者天子有六軍漢家前後左右将軍四人今則十二衛一有八字神䇿等八軍凡有将軍六十人也歴代増益以至於是舊名不廢新職唐書作資日加名繁職重不可遍舉所以後周依古用建六官盖由於此今畧徴外官别駕本因漢置隨刺史廵察若今觀察使之有副使也叅軍後漢末置叅諸府軍一作軍府事若今節度判官也官名職務一作節職遷易不同空存虚稱皆無事實又司田頃景龍三年嘗置無何以煩冗却停併入司户殊為折衷誠宜斟酌繁省詳考損益欲求致理必也正名神龍中官紀隳紊有司務廣集選人競收名稱其時無闕注授於是奏署員外官者二千餘人自爾遂為恒制當開元天寳之中四方無虞百姓全實大凡編户九百餘萬吏員雖衆經用雖繁人力有餘帑藏豐溢縱或枉費唐志作雖有浮費不足為憂今兵革未寧黎庶凋瘵數年前天下簿帳到省百三十餘萬户自聖上御極分命使臣按地收歛土户與客户共計三百餘萬比天寳中纔三分之一就中浮寄乃五分有二出租賦者減耗若此食租賦者豈可仍舊如一州無三數千户置五六十官員十羊九牧疲吏煩衆一作人疲吏衆顧兹大弊實思革之議者多云尚有䟦扈未庭併省官吏之後恐被罷者仕進無路别有依托且縻爵禄兼示一作亦隄防此乃常情之説慮非救時之論有才者即令薦用不才者何患奔亡而况各有姻戚顧戀家産後漢建武六年減縣省官公孫述隗囂未滅魏太和正始中則呉蜀鼎立晉太元六年呉國尚在隋開皇三年陳氏割㨿皆招羅俊又志相吞滅此時猶不慮有失賢資敵務以救弊為謀今田悦之徒並是一作性實庸𤨏繁刑暴賦惟恤軍戎衣冠士人遇如奴虜豈比公孫述諸葛亮之在巴蜀孫權陳覇先之有江南固無范睢業秦賈季强狄之慮斯斷可知矣今若以人情因習旣久不能更改制度併省内官但且權停省外官别駕司馬一作田及叅軍州縣額内官約人户減縣一作封字尉其被罷者但有德行才噐委州府長史搜擇一作擢論薦固亦不遺噐能如或渝濫先坐舉主誰敢罔冐以䧟刑章其有不被舉論但全舊名任叅常調自當修進更俟甄收暫罷嵗時何負此軰如柱國後魏末置並是當時宿德勲盛業崇皆主重兵寵貴第一周隋以後除授至多暨乎國家迴作勲級唯得三十頃地耳又開府儀同三司及光禄大夫亦是官名還為人多迴作階級隨時立制遇弊變通不必因循重難改作待戎車息駕百姓稍寧一作康寧欲増庶官則復舊制謹議此篇當以通典為正其注一作乃英華本誤尚書省官議議曰昔堯試舜於大麓領録天下事似其任也周之司㑹又其職焉秦時少府遣吏四人在殿中主發書故謂之尚書尚猶主也漢承秦置及武帝遊宴後庭始用宦者主中書以司馬遷為之中間遂罷其官以為中書之職至成帝建始四年罷中書官者又置尚書五人一人為僕射四人分為四曹通掌圖書秘記章奏之事及封奏宣示内外而已其任猶輕至後漢則為優重出納王命敷奏萬幾盖政令之所由宣選舉之所由定罪賞之所由正斯乃文昌天府衆務淵藪内外所折衷逺近所禀仰故李固云陛下之有尚書猶天之有北斗斗為天喉舌尚書為陛下喉舌斗斟酌元氣運平四時尚書出納王命賦政四海令及左丞揔領紀綱無所不統僕射及右丞分掌廪假錢榖漢初尚書雖有曹名不以為號及靈帝以侍中梁鵠為選部尚書於是始見曹名揔謂之尚書臺亦謂之中臺大事八座連名而有不合得建異議二漢皆屬少府魏置中書省有監令遂掌機衡之任而尚書之權漸減矣晉以後所掌畧同八座丞郎初拜並集都省交禮遷職又觧交本漢制也至於晉宋唯八座觧交丞郎不復觧交也宋曰尚書寺居建禮門内亦曰尚書省亦謂之内臺每八座以下入寺門生隨入者各有差不得雜以人士凢尚書官大罪則免小罪遣出百日乏代人聽還本職其令及二僕射出行分道之制與中丞同令僕各給威儀十八人自晉以後八座及郎中多有不奏事梁天監元年詔曰自禮闈陵替歴兹永久郎署備員無取職事糠粃文案員尚虚閒空有趨墀之名了無握蘭之實曹郎可依昔奏事自是始奏事矣又詔尚書中有疑事先於朝堂叅議然後啓開舊尚書官不以為贈唯朱异卒特贈右僕射武帝寵之故也自魏晉重中書之官居喉舌之任則尚書之職稍以踈逺至梁陳舉國機要悉在中書獻納之任又歸門下而尚書但聽命受事而已後魏天興元年置八部大夫於皇城四方四維靣置一人以擬八座謂之八國各有屬官分尚書三十六曹及諸外置令大夫主之四年又復尚書三十六曹天賜元年復罷尚書三十六曹别置武歸脩勤二職分主省務至神䴥元年始置僕射左右丞及諸曹尚書十餘人各居别寺北齊尚書省亦有録令僕射揔理六尚書謂之都省亦謂之北省後濟北王以太子監國立大都督府與尚書省分理衆事仍開府置佐後周無尚書隋及大唐皆有其制畧同凡尚書省事無不揔龍朔二年改尚書省為中臺咸亨初復舊光宅元年改為文昌臺垂拱元年又改為都臺通天初復舊長安三年又改為中臺神龍初復為尚書省都堂居中左右分司都堂之東有吏部户部禮部三行每行四司左司統之都堂之西有兵部刑部工部三行每行四司右司統之凡二十四司分曹共理天下之事盡矣謹議此英華有其目而脱其文今以通典増入僕射議按僕射秦官其名則㣲其職甚細東漢以後雖委任漸重職司㑹府而非百僚師長之職也又按丞相亦秦官秦氏每羣臣上表皆云丞相臣某為首漢之宗臣蕭何為丞相漢儀丞相進天子御座為起在輿為下有疾法駕至第問得戮二千石申屠嘉欲斬内史晁錯是也霍光受顧託之重當伊周之地廢昌邑王上表太后丞相臣敞為首大司馬大将軍臣光次之其尊崇如此中間嘗置左右丞相亦嘗改為相國亦為大司徒大抵漢之丞相是為三公於天下無所不統後漢亦以三公為宰相則司徒本西漢丞相也其後或為丞相或為相國或為大丞相雖互為之名其實一也曹公司馬師昭趙王倫王敦王導劉義宣齊高帝梁武帝爾朱榮陳武帝侯景齊獻武隋文帝皆為之歴代多非尋常人臣之職亦多為贈官然自秦以降實居百寮之長今尚書令統領衆務提舉一作舉持綱目僕射貳之誠為崇重且非統國政宰天下之任宜侍中中書令如直以尊崇則太師不然上公太尉始可師長命百寮也龍朔中天寳初嘗改侍中中書令為左右相逺協伊尹仲虺為左右相周公召公相成王為左右之義斯誠允當或謂尚書令僕射則録尚書之職是官之師長按前代録尚書霍光張安世王鳳趙憙牟融鄧彪張禹李固王導禇彦回齊明帝之徒或是三師一作丞相或是三公或是大将軍大司馬兼之皆秉朝政猶古冡宰百官總已實宰輔也其時别自有令僕今僕射雖嘗改為丞相名同而職異品秩又未崇極上有三師三公尚書令豈比前代丞相受任也其襲舊名無實者若今刺史皆云使持節按前代使持節得戮二千石其王公已下封國皆南面臣人分茅建社其開府儀同三司則禮數班秩皆如三公置府辟吏今並豈有其實乎此例甚衆不能遍舉安有僕射因改丞相之名都無丞相之實而為百寮之師長也又與丞郎絶禮若一有不字隔品致敬則諸司長官與隔品寮屬其可絶禮乎斯不然矣謹議一作皆通典省試學生代齋郎議韓愈貞元十一年議曰齋郎職奉宗廟社稷之小事盖士之賤者也執豆籩駿奔走以後子其官之長不以德進不以言揚盖取其人力足文粹集本無足字以備其事而已矣奉宗廟社稷之小事執豆籩駿奔走亦不可以不敬也於是選大夫之子弟未爵命者以塞員填闕而教之行事其勤雖小其使之不可以不報也必書其嵗嵗旣久矣於是乎命之以官而授之以事其亦微矣哉學生或以通經舉或以能文稱其㣲者至於習法律知字書皆有以賛於教化可以使令於上者也自非天資茂異曠日經久以道以業蜀本作以所業進發聞於鄉閭稱道於朋友薦於州府而升之司業則不可得而齒乎學矣然則奉宗廟之小事任力之小者也賛於教化可以使令於上者德藝之大者也其亦不可移易明矣今議者謂學生之無所事謂齋郎之幸而進不本其意因謂可以代任其事而罷之盖亦不得其理矣今夫齋郎之所事者力也學生之所亊者德與藝也以德藝舉之而以力役之是使君子而服小人之亊且非國家崇儒勸學誘人為善之道也此一説不可者也抑又有大不可者焉宗廟社稷之亊雖小不可以不專敬之至也古之道也今若以學生兼其事及其嵗時日月然後授其宗彛罍洗其周旋必不合度其進退必不得宜其思慮必不固其容貎必不荘此無他其事不習而其志不專故也此非近於不敬者歟又有大不可者其是之謂歟若知此不可将令學生恒掌其事而隳壊其本業則是學生之數一作教加少學生之道益貶而齋郎之實猶在齋郎之名苟無也大凡制度之改政令之變利於其舊不然則不可為已又况不如於其舊哉考之於故一作古則非訓稽之於今則非利尋其名而求其實則失宜故曰議罷齋郎而以學生薦享盖亦不得其理矣謹議舉縣宰集作令議元稹右吏部以停年課資之格取宰邑字人之官公幹强白者拘於考淺疾廢耄瞶者得在選中倒置集作署是非無甚於此朝廷将欲漸去其弊所以特設舉薦之科明詔旣行起請尋下有司再議釐革何以取信於人㨿吏部云増加新户開耕集作墾荒田已是課考舊條獄絶繋囚寃人申雪亦是政途常事舉寮吏不法恐生告訐之風有利益公家又未指陳其目選授者例無異績尚得四考守常舉薦者從集作縱未殊尤豈可二年並集作便罷今請但行連坐舉主之文不必更依吏部分析集作外條件又云見任官及處士散試官等並請停集且起家散試固有才能見任之集作他官何妨撫事集作宇若能集作皆限其資歴即與常選何殊今請除見任縣令外其餘並令集作請赴集又云檢勘榜様剥放程式及試書判並請凖平選人例處分若此則案牘之吏得肆奸欺書判雖工何關政術有司咸選赴集豈是特舉與官今請應舉薦人量納文狀便令注擬亦不在剥放及試書判之限又云並請注破碎之縣責其効實本舉良能旣集本作冀䝉優奨皆居破碎之處恐同貶降之條以前數件並恐不可施行伏請但依起請節文處分仍請㨿今年縣令員闕先盡舉薦人數留闕有餘然後許注擬平選人等冀将允當謹議吏部議蔣防議曰吏部擇才用之地職在辨九流之清濁擇四科之邪正推忠良而進英傑舉亷直而黜不職夫天生萬民樹之以元后元后不能以獨任故委之以羣吏羣吏不能以自逹故繋之以選部選部者風化之本源人倫之砥礪也書曰知人則哲能官人安民則惠哲與惠其選部之志歟所謂羣吏者君之耳目君以衆耳聽天下之哀樂則無逺不聞矣君以衆目視天下之得失則無逺不見矣若以耳不為君之聦目不為君之明非羣吏之過抑亦選部之過其故何也背輪轅之用雜賢愚之跡以至於此也夫聖人求賢良而授之政事非徒貴賢良之德義盖重元元之性命也今之有司罕通其意每嵗調天下之士但考其書判㨿其資為之品第授之禄秩先訪私家利便次論俸錢之厚薄多士盈庭而自售若衆賈之徒疑市焉豈銓綜人物品藻英髦之所在也是以天下百姓未臻於和樂者職此之由矣夫以一鏡之明而照天下之形者固難盡其妍媸以一衡之平而稱天下之輕重者固難定其毫釐矣今每嵗選人請委州府長史先研其跡行次考其渝濫曽理務者以恪勤亷慎為一科處丘園者以孝悌貞良為一科著此二科然後申送主司按其詞而閲其材材與行必良則試之以理要可觀則從而禄之其郡府長史當校其殊考若材行相反朋黨相資則從而黜之其郡府長史亦書以下考擇材如此則天下之共公於選吏吏部郎亦不敢私於天下矣俾夫人顧行行顧材材顧禄禄無虛授人無苟得亷耻之化行貪競之風息矣恭聞十目所視十手所指猶是非可辨賢愚可驗况用天下之目乎况用天下之手乎率是道而寮宷不得其人風俗不致和平者未之有也謹議兵部議議曰弧矢之利以威天下其來尚矣仲尼有云不教民戰是謂棄之盖用仁義為之本籌畧為之次果敢為之末故田齊之技擊不可以遇魏之武卒魏之武卒不可以直秦之鋭士秦之鋭士不可以當桓文之節制桓文之節制不可以敵湯武之仁義所謂善師者不陣善陣者不戰盖有自矣今之有司不曽端其本而徒襲其末取天下之士以懸的布埓為之標凖捨矢之中否跨馬之遲速以貎第其人升降其秩豈暇全武之七德射之五善者歟及國家有邉境之虞則被之以甲胄授之以弓矢駈以就役當數倍之師不能屠名城克强敵者何也在司武之不經擇士之無本矣孫呉者兵家之首足不可以廢也今孫呉之術巻而不張徒以干戈為擇士之噐何異夫無首而冠肘足而履哉今請天下應兵部舉選者各習兵書一藝然後試以弓矢復其武弁所謂智勇兼資材畧並運仁義之師復行於湯武之代豈惟式遏冦虐震怛戎虜者哉謹議文苑英華巻七百六十五
