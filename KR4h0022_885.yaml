body:
  text: 文苑英華巻八百八十六宋李昉等編将相四太子太傅貞憲趙憬神道碑一首太師忠武公渾瑊碑一首尚書左僕射宣武軍節度使董晉神道碑一首故正議大夫守門下侍郎同中書門下平章事成紀縣開國男賜紫金魚袋贈太子太傅貞憲趙公神道碑銘權德輿在漢孝宣厲精理道則有魏相通故事丙吉知大體百職脩明中興有聲惟皇帝在位十四祀得賢相成紀公趙氏受天清淳佐時緝熈本洪範之正直躬大雅之明哲左輔右弼調若鼎味降祥而生盡瘁而終時貞元十三年年六十一皇上震悼不視朝三日詔奉常具儀法冊贈太子太傅又俾百執事為位哭於其庭吊祠禮贈集作賻率有加等二府之屬或銘其德於夀堂或狀其行於考功有司稽實謚曰貞憲公之盛業斯謂闕舉其始中終之畧識于神道公諱憬字退翁天水西人其先成子之文宣子之忠文子之知人左邱明太史公實書之曾王父仁本皇司列少常伯同東西臺三品以忠清勵翼多所發明乾封惣章之祭號為稱職王父贈趙集作越州都督誼歴右司郎中乾封縣令司僕少卿烈考贈鄭州刺史道先仕至洪州録事叅軍惟祖禰含章故慶延追錫崇構丕矩復大於公公保抱之嵗生知色養覊冠集作貫之年則無㓜志及夫被儒服踐法言敬直而文肅莊而温端誠博物錯綜古今非大中至正不接於心術寳應中𤣥宗崩肅宗幸梓宮有司議方中復土之制時西鄙日聳嵗饑人流公以王者追孝恤禮宜儉褐衣上䟽詞約指明君子曰此劉更生諌昌陵之言也息偃江介名聲籍甚始佐州司乃辟戎車自試守江夏尉三遷至監察御史其後翹車繼轍賢侯虚左大凡難理之府皆待公為重歴殿中侍御史太子舍人集作中舍丁太夫人憂柴毁孺慕殆將死孝感導善氣降為嘉生有芝煌煌秀于壌樹之側公黙而去之人莫知者旣免䘮徵拜水部員外郎未㡬檢校工部郎中副湘中七州軍事居一年詔領留府尋踐方伯以中執法錫金印紫綬罷職家居拜給事中執法疊懐和北狄有下嫁冊命之禮復兼憲丞以副皇華旋軫未至遷尚書左丞畯人用彰皆以貞勝其初撫封上狩于漢中守臣之任憂寄愈切公恤隱布和仁而愛人輿師知訓善吏樂職行之三年敎化明備底貢有藝賦政不煩絜矩以杜奇衺露章而無吐茹飛語雷動明誠山立受代踰年事實敷聞故有左曹之命講貫舊章惟眞是視刑或失入議将必還公望日盛其勤靡盬故有和戎之役致賜諭㫖恊寕殊憐疆場之言專對而不給紀綱之僕承事而不征保就安利北方咸恱故有在途之拜整南宮之紀律起郎吏之功緒風望素重法制尤精嘗嵗終舉吏可以長人者或以其細故深詆将以病公公乃移書自訟請下其考有博大之度無怨欲之私一臺承式六轡在手持綱體要善否有章故積公輔之望貞元八年夏四月拜中書侍郎平章事明年五月轉門下侍郎以厚德載物以全才宣化舉直盡忠敷納詳集作将明正王集作百是度之本去一朝之便事有統紀心無靣從嘉猷匡英華被諱作讜言鎭定宏大謙厚而不伐持平而居易闢邪塞違貞厲而不校陟恪始終帝載用和戯疑夫先正集無正字帝伯歴左肅機東臺侍郎充著休功再叅大政公皆踐之是以仰之嘗以為漢庭諸公罕備有集作其用以石慶之醇謹而不能關决薛宣之方畧而失於煩碎翟方進之通明而固其位公孫宏之節儉而近於名公備集作偏有其長彼實多缺唯丙魏所履我無愧焉嚮使天與之年盡行其道則天之所化可勝旣乎故其登庸也士之仁者相賀而不仁者相吊其全歸也士之仁者相吊而不仁者相賀斯可知己至若睦中外之姻而均其禄賜嚴宗廟之祀而不理第室啓手足之日家無餘財奉終卽逺待恩禮而後備難矣哉嗣子宣亮全亮元亮承亮等伯季以門子為宏文生叔仲始觧巾受禄皆禀德風㓜而孝謹以十一月景午時得吉卜奉公之䘮祔窆于河南緱氏縣景山之原禮也以德輿叨居宰士嘗辱深知職奉賛書備詳盛烈俾刻金石聞于無窮銘曰晉有成宣代稱忠勲先正常伯匪躬事君纉復於公為時獻臣德不踰閑心不違仁貞其所履以翼天子大猷集作猶是是經中立不倚乃賦明命宜躋遐紀吾道方伸脩途遽已緱原蒼蒼宰樹成行令名章章樂石在旁噫嘻太傅之風永代不忘故朔方河中晉絳邠寜慶等州兵馬副元帥河中絳邠節度度支營田觀察處置等使元從奉天定難功臣開府儀同三司檢校司徒兼中書令河中尹上柱國咸寜郡王贈太師忠武渾公神道碑銘前人天地訢合以生萬物文粹作嘉集作卉其成嵗功也則有肅殺震曜之助焉君臣保乂以熈百志其講武功也則有經綸翼戴之輔焉龍蛇起蟄山澤通氣與運相値有開必先斯太師所以宣力四代稽謨七德煇煌威靈勤身濯行集作征是霆征集作擊風行乃緝熈于光明故琱戈淑旂以嚴師律黄流𤣥衮以正台耀湛露彤弓以覺報宴納書追命以榮恤禮蕃錫始終如公之功公諱瑊字某其先夏姒之後爲淳維漢劉之代為渾耶或强以文粹無以字爲國集作或强與為國或分以保文粹無保字姓貞觀中開置州壤就加官師曽祖元慶皇豹韜衞将軍靈邱縣開國伯祖大文粹作文夀皇太子僕贈尚書左僕射考釋之皇開府儀同三司太常卿兼御史中丞寧朔郡王贈司空惟靈邱紹先公之職居次卿之重僕射以積厚充家寧朔以偉才雄邉貴仕崇勲乃列茅社流光追逺是加宻印回復介祉開先元臣功昭于前人闕君建中癸亥翠華西狩公以大司馬艱貞翼從部闕揣摩殺機勤勞行内為上心膂登壇授律誓命交感如漢拜淮隂侯故事而又加焉乃進左揆遂叅大政惣賦輿而爲之師長恢王畧而以之北伐兇黨盡銳壁于武亭公以事鉅師老則傷威重正合竒勝在於疾力奮寡擊衆鼓行無前殱夷潰弱如建瓴水中堅席勝又覆於咸陽長轂啓行旣闢于延秋㑹西平王以專諸侯之師清宫獻㨗公乃抑其賈勇須彼成功窒士心之尅伐息兵火之氣熖然後窮追斬級冦孽以平備法從於清蹕闕入明於黄道告類薦功豋拜上台撫封尹正復闕虜硧文粹作㑹時北平王出大鹵收絳臺而公已惣成師下左闕於是闕忠力揚竒鋒復離宫㧞堅壘衝陣壓境傳于蒲闕金皷之聲氣相合山河之表裏皆復渠魁授首師帥恊闕安流以濟方軌而前士不離傷文粹作離傷集作離場工不易肆闕文粹作殄冦正刑四方咸龢論道正律乃平水土秉誼靖人闕脩班制休嘉賁于草木利澤逮于鰥寡言為軍志動為史師貞元景子政成一紀進掌邦敎遂居右弼十五年冬寢疾集作病十二月辛未薨于理所享年六十四皇上悼歎不視朝五日冊贈太師賻集作禭吊祠有司備物大僚襄物明年二月甲申塟我太師于萬年縣洪固原太常跡其功德奏謚曰忠武禮也初公年十一以将門子仕于邉部闕弱冠五遷至左驍衞将闕始從朔方之師戰黒山次從隴右之師摧石堡又闕出臨洮奪昆夷之善地而為之壁壘北絶大漠破獫狁之堅甲而焚其廬帳又從汾陽王臨淮王討反虜于山東南攻賛皇北取眞定射其特将李立節貫于左肩斃之又五遷至太常卿皆以功次其間開地于河曲以静九蕃宣威于陜西乃定三川凡王師之所以尅獲都邑元老之所以發揚蹈厲公必居其先偏而當闕勍劇故以御史中丞為靈州左司馬以御史大夫為邠闕刺史以工部尚書為單于大都䕶專征上郡榆林之地闕為左金吾衞大将軍又以戸部尚書奉晉王出車之重闕時厥後投艱感慨能納大忠以恤大事理蒲十六年再闕台以司空兼侍中以司徒兼中書令大凡歴官二十闕眞食干八百室居節制者五副元帥者四材力絶闕樓煩方内洽平乃進咸寧凡汾陽王九代之勲公闕四履之地公皆踐歴憫册師禮法謚尊名公皆如闕不至者夀而已矣惟公厚性寛中智謀深静秉義類闕賦明命植端誠以紏王慝講功述職逺意長利執德之闕蹈禮之輿致其用以格天啓其心以沃聖恊建皇極爲宗工元龜雅好左氏春秋班氐史得考父之恭范宣之讓驃衞之功畧黄韓之敎化又嘗慕太史公自叙著作集無作字行紀文粹作已一篇詞不矜大而事皆明備有子五人曰殿中少監錬太子中允鎬太子司義郎鉅櫟陽尉鋼闕陽尉闕著位于兩宫以奉朝請試吏于縣内以脩事任食德而才禀訓而忠皆以純孝致其哀敬令弟輔國大将軍右領軍衞将軍武當郡王玘與諸孤等推烝彛景鍾之義因識集作職表以聞有詔詞臣刻石傳信乃採其賛書侯表作神道銘銘曰北載斗極隂方尚武𤣥金朱轓錫命都府太師間代感㑹雲雨四征庇人九合尊主昔未成童則能肆勤卓行深入致果忘身弱冠摧鋒環列南軍中興之後書社䇿勲援抱兩河轉戰三秦靈朔郇邠所居必聞出統蕃衞入司徼循時丁阨難節冠群倫逋誅煽結狂穢宫闕西平鞠旅公亦授鉞旣臨延秋如火烈烈休士退舍時惟不伐祲沴乖方蒲津未通北平釋位公實撫封胥命長春克成厥功開壁勞軍靡有不公以律則臧在和而克時惟太師有嚴有翼乃敷仁澤乃布條職時惟太師有功有德三公二府是奨是陟禭印易名以尊以餙材官介士鹵薄悽惻大隧觧原終二本作中南之北萬邦作憲永代是式追琢馨香與唐無極故宣武軍節度副大使知節度事管内支度營田汴宋亳頴等州觀察處置等使金紫光禄大夫檢校尚書左僕射同中書門下平章事西郡開國公贈太傅董公神道碑銘前人漢興五代孝武思理膠西相陳天人之際王道之端昌言大對統紀條貫純嘏積厚逺而寢明帝唐九葉順考古道隴西公兼集作都将相之重承尉衞之崇啓心宣力作率慶平陟恪宗工能積其烈公諱晉字混成河東虞鄉人亷忠温厚絜矩通理秉義以立故不為利疚知動之㣲故每與告疑作吉㑹初肅宗受端命以合兵車思欲去元元於湯火致王度於金玉以文告威讓逺猷密命之為重也故公觧巾披荆校文視草凡三徙官被以采章代宗御天下乃清吏職以為文憲彌綸陪貳事任百辟交脩則理道洽故公再入御史府三為尚書郎歴祕書邱長府奉常武侯之亞今上建皇都以纂鴻業思代天工俾寧方内故公出入屯夷昭明有融中居大僚以至柄用貞元五年春三月拜門下侍郎同中書門下平章事居五年除禮部尚書用耆碩俊德轉遷兵部分正宏化以本官畢命為東都留守東都畿汝州都防禦使安危注意以左揆持相印充宣武軍節度汴宋亳潁等州觀察處置等使十五年二月丁丑薨于位享年七十六罷朝三日追命太傅有司易其名曰恭惠職䘮法賻皆俊彛等所以視其踐履而加優之也初公以祠部郎為出疆從事北方之强驕蹇㳫負伐功怙力徵我厚幣使臣指顧公攝其詞詞逹氣直虜皆震伏殫威命於專對輝光華於外區仁者之勇沛然餘力其為太府未浹日而理乃珥貂蟬實兼憲丞含章以承顧問秉直以司紀集作純律脩起故事京師肅然其為華州徵赴行内以祭酒亞相使于北河其徃也薊門不出關東多壘習俗故態且相附離公則破其從約使循軌道其還也蒲坂旣阻王宮未清婪婪二逆恣睢相合公則折其兇謀因以鬱没慿軾有勞扈蹕而旋益用尊禮大其職業司徼循也五校嚴備持重而不苛䖏網轄也六職遵脩舉直而不紊典禮樂也百神咸秩薦信而不黷其為相也上載元聖下熈百工柔惠小物恊寜大政推明常古之制章叙理平之業粹和而不耀敬讓而不居言陳於前不可悉數拜章八上然後得請其撫封也尤為難理先是在宥推恩叅授兵柄至有恃㐫器以邀好爵者氣𦦨不還風波相沿是邦再亂人用恫恐上以為陳留天下之郊也非素重臣不可以率先賦政公旣受命與一二從事記室儒服而前不待裏言不恃悍衞寛信夷易闇然風行長城大蔡藴在靈府悍將伏罪齊人樂業四隣諸侯折中於公居四年政成力疾累求入覲因條陳利病請制於未然上難其繼以致没代噫夫一邦之人得公而理失公而亂刦介夫殺大吏猶原燎川潰於不可遏嚮公之嘉猷宻䟽如前知焉其明智歟董氏在春秋時書法不隱在戰國時賛明命聞於諸侯自膠西而下淳耀溢大在魏有司徒昭在蜀有尚書令允扶義納忠以幹機衡其族舊矣公曾祖仁琬皇州博士祖大禮贈右㪚騎常侍考伯良開州新浦主簿贈尚書左僕射三代有令德而無貴任蕃祉所鍾發為追崇宜哉有子四人秘書省著作郎全道秘書郎溪大理評事全素太常寺太祝澥等其承學也專其就列也敬斬焉而孤纍然以哀日於先逺象數恊吉以某集作其年十月丁酉奉理命家法薄𦵏公于河南縣萬安山之原以前夫人南陽張氏繼夫人京兆韋氏祔焉從周禮也惟公自筮仕至捐舘四十五年無伐善無違德歴官三十六皆以理効聞自建中以還居中分閫再調鼎實一人而已范文子所謂厚德者能享多福惟公有之全道等猶懼懿鑠之不永于後與陵谷之有遷也以德輿奉行公之命書者三宜金石刻故跡其誄謚而為之銘其詞曰后王財成雋乂昭明以建皇極甫申居内方邵理外周邦是式於惟隴西求福不回文武宣力調和公餗整訓長轂柔惠且直膠西章章道可佐王屈相下國綿代儲慶至公而盛位實配德孑孑干旟昔徃浚都俗旣紓息翻翻素旗今旋洛師人用悽惻惟是壤樹資於四布萬安之側德煇在闕文苑英華巻八百八十六
