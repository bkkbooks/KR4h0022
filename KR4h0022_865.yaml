body:
  text: 文苑英華卷八百六十六宋李昉等編釋十七故章敬寺百巖大師碑一首南嶽彌陀寺承逺和尚碑一首西京興善寺傳法堂碑一首撫州景雲寺故律大德上泓和尚塔碑一首江州興果寺律大德凑公塔碑一首故章敬寺百巖大師碑權德輿禪宗長老百巖大師之師曰大寂禪師傳佛語心法始自達摩至於惠能之文粹作能化行于南服流于天下大抵以五藴九識十八界皆空猶鏡之明也雖萬象畢呈而光性無纍心之虛也雖三際不住而覺觀湛然得於此者即凡成聖不然一塵瞥起六入膠固循環回復於生死之中風濤火輪迷忘不息授受合大師得之一言宗通深入無礙師諱懷暉姓謝氏東晉流寓今為泉州人孩提秀發博䆒書術一旦慨然曰我之祖先今安在耶四肢百體視聽動用孰使之然耶漼然雨泣改服緇褐志在楞伽行在曹溪得圓明清淨之本去妄想因緣之習百八句義照其身心心離文字化無方所於是抵清涼下幽都登徂徠入太行所至之邦蒙破法味止于太行百巖寺門人因以百巖號焉元和三年有詔徴至京師宴坐于章敬寺每嵗召入麟德殿講論後以疾固辭十年十二月二十一日恬然示滅其年六十其夏三十五弟子智朗志操等以明年正月起塔于灞陵原凡一燈所傳一雨所潤入法界者不可勝書著法師資傳一編自雞足山大迦葉而下至六祖二字集作于能秀論次詳實或問心要者答曰心本清淨而無境者也非遺境以㑹心非去垢以取淨神妙獨立不與物俱能悟斯者不為習氣生死幻藴之所纍也故薦紳先生知道入理者多遊焉嘗試言之以中庸之自誠而明以盡萬物之性以大易之寂然不動感而遂通則方抱褒衣其極致一也嚮使師與孔聖同時其顔回閔損之列與釋尊在代其大慧綱明之倫歟至若從師受具之次第宰臣大官之尊信誕生入滅之感異今皆不書德輿三十年前嘗聞道於大寂聿來京下時款師言頃因哀傷似獲悟入則知煩惱不逺文粹作逮菩提雖聚散於此生期㑹歸於彼岸銘曰西方之教南宗之妙與日並照百巖得之為代導師頻若琉璃結火燔性愛流溺正癡冥奔命即心是佛即色是空師之通兮無來無去無縳無解師之化兮揭兹靈塔丹素周匝示塵劫兮南嶽彌陀寺承逺和尚碑集作南嶽大師逺公塔銘記吕溫原夫法起於無色生於妄求離於色者未得皆空狥念於無者斯為有著也集無也字是以至人心無所念念無所求利未動而誰安本不然而何滅然而利根難植頓詣罕聞不有舟梁孰宏濟度匪因陛級莫踐堂塗必在極力以持其善心惠念以奪其浮想不以身率誰集作孰為教先誰能集作其宏之則南嶽大師其人也師諱承逺漢州綿竹縣謝氏之子積修妙性宿起冥因乘報現身應期宏道自天鍾美因地禀靈七尺全軀峨岷與瞻敬之狀九漏懸解江漢資清淨之源殊相夙成隱照潜發甫志學始逰鄉校驚禮樂之陷阱覺詩書之桎梏忽忽不樂未知所逃俄有信士以尊勝真言質疑於學怡然聳聽宛若前聞識契心冥神動意往遂涕訣集作决慈顧行狥幽緣初事蜀郡唐集作康禪師禪師學於資州詵公詵公得於東山𢎞忍堅林不盡祕鍵相傳師乃委質僮役服勤星嵗旁窺奧㫖密悟真乘既壯逰方㳂峽東下開元二十三年至荆州玉泉寺謁蘭若真和尚荆蠻所奉龍象斯存厯劫方契其幽求一言懸㑹於靈集作虛受愛從剃毁始備緇錫昻然古貌森映髙集作喬松真公南指衡山俾分法𣲖越洞庭浮湘沅集作沅湘息于天柱之陽從通相先師受聲聞具戒三乘之經教四分之紀律八正之倫要六度之根源莫不更贊神機遞歸心術聞京師有慈愍集作敏三藏出在廣州乃不逺重阻星言覩謁學如不足求所未盡一通心照兩捨言筌敏公曰如來付受吾徒用宏拯救超然獨善豈曰能仁俾依無量受經而修念佛三昧樹功德集作慈劫以濟羣生由是頓息諸緣專歸一念天寶初嵗還於舊山山之西南别立精舍號彌陀臺焉剃草編茅僅蔽經像居靡童侍室無斗儲一食不遇則茹草而過弊衲不完集作充而嵗寒集作中自若奉持贊嘆苦劇精至恆於真際靜見大身花座踴於意田寶月懸於眼界永泰中集作年有髙僧法照者越自東吳求集作逰於廬阜尊集作尋逺公教跡結西方道場入觀積旬至想傍達見彌陀座下有老比邱焉啓問何人答曰南嶽承逺願告吾土勝緣既結真影來現照公退而驚慕徑涉衡峯一披雲外集作水之塵宛契定中之見因緣昭晰悲喜流涕遂執樞衣之敬願承入室之顧大師德因感著道以證光逺近聆風歸依載路於是大建法宇以從人欲輪奐雲起丹刻化成走檀信集作記於十方盡莊嚴於五㑹香花交散鐘梵相宣火宅之煙熖皆虛欲海之波瀾自定加以寶裝祕偈建幢于臺前玉篆真文揭碑於路左施隨求之印以廣銷業纍造輪轉之藏以大備教典勸念則編集作遍榜於崖谷勵學則兼述於縑緗其欲人如身慈惠懇至皆此類也大師峯栖木下六十餘年苦節真修老而彌篤夙開户牖久啓津途法界之尊重在焉天人集作人天之瞻仰如是常陋處方丈志行平等食不重味寒不兼衣王公之珍服盈廂氓庶之金錢布地莫不回修佛事贍養孤老凡集作眷言施者以是報之期頥將及至集作志力無替中鐘㑹食到必先衆夕磬䖍念居恆達晨其克己練集作錬心慎終如始皆此類也大厯末門人法照辭謁五臺北轅有聲承詔入覲壇場內殿領袖京邑託法雲之逺䕃自感初因分慧日之餘光寧忘本照奏陳師德乞降皇恩由是道場有般若集作舟是之號貞元嵗某獲分朝寄亷問湘中近照德輝獲集備作探衆妙况靈嶽直午先皇本命宜有上士斯焉護持表求興崇詔允誠願臺雖舊號其命維新寺由是有彌陀之額度生二七㑹供千人中貴巡香守臣視饌瑶圖花捧寶字煙開寵降九天暉映三界師亦建不壞之塔以夀君親修無邉之功以福邦國𣑽王之能事畢矣法門之榮觀備矣貞元十八年孟秋既望顧命弟子申明教戒掃室趺座恬然化滅報齡九十有一僧臘六十有五先是忽告門人曰國土空曠各宜勉力數月而災火梵寺周嵗而吾師解形此蓋寶去山枯龍移水涸空曠之㫖乃明前知法衆崩慟若壞梁木邦人號赴如失舟航以其年九月七日遷神于寺之南岡即安靈塔教也前後受法弟子百有餘人而全得戒珠密傳心印者蓋亦無幾比邱惠詮知明道偵超然等皆奧室之秀者以瞻奉將逺經行坐蕪永懷於集作宗是極見託碑紀移有道於物外真無愧詞比遺愛於人間誠當墮淚銘曰浩浩隋集作清塵茫茫逝川大雄作矣救物為先能明大教非師有緣集作明非有照慈亦無緣不宰功立忘機智全誰其宏之南嶽命代習識虛受應身圓對理則歸空教惟不昧末搖本靜行苦神泰雲跡一滅天星六周熱惱就濯童蒙來求攝以尊念驅之力修我法有户誰能不由甘露晨稀香雲夕卷彼岸方濟慈舟忽逺爐煙如在塔樹勿剪刋勒集作豐碑永想正眼西京興善寺傳法堂碑白居易玉城離域有佛寺號興善寺之坎地有僧舍名傳法堂先是大徹禪師宴居于是寺說法于是堂因名焉有問師之名跡曰號惟寬姓祝氏衢州西安人祖曰安父曰皎生十三嵗出家二十四嵗具戒僧臘三十九報年六十三終興善寺葬灞陵西原詔諡曰大徹禪師元和正真之塔云有問師之傳授曰釋迦如來欲涅槃時以正法密印付摩訶迦葉其下二字集作傳至馬鳴文十二葉傳至師子比邱又集作及二十四葉傳至佛䭾先那先那傳圓覺達摩達摩大𢎞可可傳鏡智璨璨傅大醫信信傳大滿忍忍傳大鑒能是為六祖能傳南嶽讓讓洪州道一一諡曰大寂寂即師之師貫而次之其傳授可知矣有問師之道屬曰自四祖以降雖嗣正法有冡嫡而支派者猶大宗小宗焉以世族譬之即師與西堂藏甘泉賢勒潭海百巖暉俱父事大寂若兄弟然章敬塵澄若從父兄弟徑山欽若從祖兄弟鶴林素花集作華嚴集若伯叔然當山忠東京㑹若伯叔祖嵩山秀牛頭融若曾伯叔祖推而序之其道屬可知矣有問師之化緣曰師為童男時見殺生䀌然不忍食退而發出家心遂求落髮於僧曇授尸羅于僧藏崇學毗尼於僧如證大乘法於天台止觀成最上乘道於大寂道一貞元六年始行化閩越間藏余而回心改服者百數七年馴猛虎於㑹稽作勝集作滕家道場八年與山神受八戒於鄱陽作回響集作鬱道場十三年感非人於小林寺二十一年作有為功德於衛國寺明年施無為功德於天宫寺元和四年憲宗章皇帝召見於安國寺五年問法於麟德殿其年復靈泉於不空三藏池十二年二月晦大說法於是堂說訖就化其化緣云爾有問師之心要曰師行禪演法垂三十年度白黑衆百千萬億應病受集作授藥安可以一說盡其心要乎然居易為贊善大夫時嘗四詣師四問道第一問云既曰禪師何故問法師曰無上菩提者被於身為律說于口為法行於心為禪應用有三其實一也如江湖河漢在在立名名雖不一水往如一集作無二律即是法法不離禪云何於中妄起分别第二問云既無分别何以起心師曰心本無損傷云何要修理無論垢與淨一切勿起念第三問垢即不可念淨無念可乎師告之集無此二字曰如人眼晴上一物不住念玉二字即作屑雖珍寶在眼前亦為病第四問云無修無念又集作亦何異於凡夫耶師曰凡夫無明二乘執著離此二病是名真修真修者不得動不得忘動即近執著忘則集作即落無名明其心要云爾師之徒殆千餘達者三十九人其入室受遺集作道者有義崇有圓鏡以先師嘗欲與豫言知豫嘗醍醐嗅薝蔔者有日矣師既沒後豫出守南賔郡逺託撰述逮今而成嗚呼斯文豈直起師教慰門弟子心哉抑且志吾受信默仁字作然燈記記於靈山㑹於將來世故其文不避繁銘曰佛以一印付迦葉至師五十有九葉故名師堂為傳法撫州景雲寺故律大德上𢎞和尚石塔碑前人元和十一年春廬山東林寺僧道深懷縱如建冲契宗一至柔𧦬音辨諸作語非智則智明雲臯太一集本續廬山記作易等凡二十輩與白黑衆千餘人俱實持故景雲大德𢎞公行狀一通贄集作執非錢十萬來詣潯陽府請司馬白居易作先師碑㑹有疾二本作故不果十二年夏作石墳成復來請㑹有疾不果十三年冬作石塔成又來請始從之既而僧反二本作及山衆反聚落錢反二本作及寺府翌日而文就明年而碑立詞曰四字集作云爾我聞竺乾古先生出世法法要有三曰戒定慧戒生定定生慧慧生八萬四千法門是三者迭為用若次第言則定為慧因戒為定根根植則苖茂因樹則果滿無因求滿猶夢果也無根求茂猶揠苖也雖佛以一切種智攝三界必先用戒菩薩以六波羅蜜化四生不能捨律律之明二本無明字用可思量不可思量如來十弟子中稱優波離善持律波離滅有南山大師得之南山滅有景雲得之師諱上𢎞姓饒氏曽祖君雅祖公悅父知恭臨川南城人童而有知故生十五嵗發出家心始從舅氏剃落壯而有立故生二十二嵗集作十五嵗非立菩薩三字二本作立菩提願從南嶽大圓大師具戒樂其所由生故大歷中不去父母之邦請𨽻于本州景雲寺修道應無所住故貞元初離我所徙居于二字集作君非淇州龍興寺說法親近善知識故與匡山法真天台靈裕京門法師集無師字裔暨興果神凑建昌惠璡集作進五長老交逰記作故與匡山法真建昌惠璡天台法裔􅍮門靈裕暨興果神凑五長老交逰佛法屬王臣故與姜相國公輔顔大師真卿暨本道亷使楊君慿韋君丹四君子友善提振禁戒故講四分律而徙集作從善逺罪者無比數隨順化緣故坐甘露壇而誓衆主盟者二十年荷擔大事故前後登方等尸施羅者十有八㑹救拔群生故娑婆男女由我得度者萬五千五百七十二人示生無常故元和十年十月巳亥遷化於東林精舍示滅有所是月丙寅歸于南岡石墳住世七十七嵗安居六十五夏自生至滅隨跡示教行止語默無非佛事夫施於人也博則返諸已也厚故門人鄉人報集作轍非如不及繇是藝松成林琢石為塔塔有碑碑有銘銘曰佛滅度後薝蔔香衰醍醐味醨誰返是香誰復是味景雲大師景雲之生一匡苾芻中興毗尼景雲之滅衆將安仰法將疇依昔景雲來行道集作道行者隨踐跡者歸今景雲去升堂者思入室者悲爐峯之西虎溪之南石塔巍巍有記事者以真實辭書於塔碑江州興果寺律大德凑公塔碑集本續廬山記作塔碣碑前人如來滅後後五百嵗有持戒見性者曰興果律師姓成號神凑京兆藍田人既出家具戒於南嶽希操大師參禪於鍾陵大寂大師志在前首楞嚴經行在四方毗尼藏其他典論以有餘力通大歷八年制懸經論律三科策試天下禪師中等得度詔配江州興果寺從僧望餘二本作移𨽻東林寺即鴈門逺大師舊道場有甘露壇白蓮池在焉師既居是嗣集作事非興佛事元和十二年九月七日遘記作感疾二十六日反真十月十九日遷全身于寺西道北祔鴈門墳左春秋七十四夏臘五十一集有日字至乎哉師本行也以精進心指二本作脂不退輪以男健力撾記作無畏鼓故登壇進律鬱為法將者垂三十年領羯磨㑹十三化未乂集作大衆萬數儀範所攝惠用所誘貢二本作貴髙增一本作慢罔不降伏其威重如是自興果訖東林一盂齊一榻居衣麻寢菅如坐七寶繇是名聞檀施來無虛月盡歸寺藏與大衆共之逮啓手足日二本作目前無長物其簡儉如是師心行禪身持律起居動息皆有常節雖沍寒隆暑風雨黑夜捧一爐秉一燭行道禮佛者四十五年凡十二時未嘗闕一其精勤如是師既疾亟四大將懷無戀著念無厭離想郡太守門弟子進醫饋藥者數四師領之云報身非病焉用是為言訖趺座恬然就化其了悟如是門人道建利𧦬集作辨與𧦬同元審元揔等封墳建塔思有以識之以先師嘗辱與子遊託為銘碣初豫與師相遇如他生舊識一見欣作語合不知其然及遷化時豫又題一四句詩為别蓋欲㑹前心集後緣也不能改作因取為銘銘曰本結香火菩提記作薩社集作菩提香火社共嫌電泡煩惱身集作煩惱電泡身不須戀戀任集作從師去先請西方為集作集主人文苑英華卷八百六十六
