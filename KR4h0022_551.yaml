body:
  text: 文苑英華卷五百五十二宋李昉等編雙關門下十二道司倉拔薤父老送錢判一道父友操杖諸母潄裳判一道春日餧獸夏日迎猫判一道資次如苴卜得乾坤判一道社中木鳩朔望秩酒判一道坐大夫簀喪姊不除判一道損名馬式直講考經判一道男加布首縣宰倉漏判一道私取行馬鸚爵享禰判一道函人所掌張侯下綱判一道結交四騎獲豹不賞判一道被髮禱斗學盤盂書判一道司倉拔薤判滑州刺史初臨人掃第以待司倉乃拔家薤一本水一器置於第中刺史入第見之以其饋餉遂與下考司倉不伏父老送錢判又越州都督更滿將還父老以錢物追送都督各取大錢一枚亷使訪知科其贓罪刑部例以為不當對王友方負海名區攸稱越府濵河大郡爰指滑臺旁連射的之巖俯帶纚舟之浦户千人萬實俟亷能露冕褰帷是資寬惠司倉之置水拔薤方取喻於龎參父老之賫物送錢乃報恩於劉寵漢陽服其髙義耶溪書以清風取之者不以為貪置之者無聞於詭詭不纍物難以損名貪不汝求詎得而罪饋餉之理與此全乖亷察之行殆將謬舉賴秋官審慎𢎞茲閲實類皆無罪竊謂合冝父友操杖判得甲造父友操杖從之友將為謀已命子毆之諸母潄裳判又乙脫犢鼻裩命諸母潄之庶弟告違禮對凡適於尊必聞操杖欲敬諸母豈可潄裳見父之執雖退讓而明禮逢彼之怒遂嫌疑而未防且挂竿之資誠為穢服几杖之類克謀長者將害已而令毆此已負人取諸衣而見滌亦彰無禮子承父命或迫嚴顔季論昆非攸乖禦侮大未離於飛鳥兩難漏於吞鯨春日餧獸判習齒以春日餧獸夏日迎猫判姜肱以夏日迎猫對髙升至人御時大禮爰設資貪疑作含育以為德立隄防以垂範三千之儀畢備九歌之序載揚承規理人開物成化習齒以青陽肇發落韶夏之風景姜肱以朱明始臨欣畏日之卉木俱尊函丈之業共仰摳衣之軌爰茲餧獸未叶於順時復此迎猫有虧於通典事不師古如何兩昧學而不修此焉雙缺適吳蜀以俱廢比臧榖以同年雖聖主寬刑唯留一靣而愚人懵學自挂三章咎也已招法將焉設請從泣辜之筆以懲紊禮之至資次如苴判甲資次如苴乙强力為甲持錢舉半以遺侯家甲告乙盜用錢乙云望依權力人不敢負卜得坤乾判又丙之宋卜得坤乾丁告違禁丙不伏對資貨山積行役如流四人别其工商六位占其來往惟甲與丙食利遇時等朱公之在陶慕梁生之適越豐其家産列次於苴觀彼國風將之乎宋小人窺利冀獲浮雲之財君子于行希就隕星之郡既假人而出舉實跂豫而望之乙寡貞亷欲附其末丙虧典禮誠不足徴異管仲之處南陽同孔某之去東魯所持雖則减半將存故未全賖縱見遺於侯家實無追於殷道徒資權要空遇坤乾據法律而未通在禮經而無禁甲稱盜用頗涉盜由丁告差違豈為差謬文飾其過猶掩耳而盜鐘詰問其源殊疾行而惡迹乙則有罪丙乃無辜彼按三章用肅嚴霜之典此詳五聽須寬纇玉之條狀亦疑既造殊途割斷豈宜同罪社中木鳩判甲旅食於人飲三爵行見社中木鳩鬬嚴駕而去因告主人謀殺朔望秩酒判又丙朝朔由供秩酒不如法對李歆甲常疑作寄字韓信傳常寄食於人食同韓信之未遇丙朝朔拘孔光之暮年王者優賢仍存几杖之禮主人愛客遂陳觴酌之儀三爵初行未應醉止上樽有闕罪即司存既而鳩鬬社中華他於焉辭去醴酒不設穆生所以言歸非養老之恩有虧乃起訟之徴斯驗害人無兆本非謀殺之條供秩乖儀須遵闕養之律罪歸酒正請送士師誣告主人應科反坐坐大夫簀判諌議大夫廖貞坐黜疾用大夫簀喪姊不除服判又俞仲喪姊不除服對張懷道位列千官藻火陳輕重之制禮明五服麻絰分喪紀之儀茍失其中章程是紊廖貞門承纍葉坐登朝散之榮俞仲痛切連枝行招墨綬之問潘仁之遭譴纍將復位而無階子路之寡兄弟欲除喪而未忍與其易而寧戚靡越周公之經當其疾而不遑猶卧大夫之簀下烏臺而遽紏如申避馬之威舉丹筆以緩刑似得求羊之術與奪合理法有固於隄防刑罰失中人無措其手足縱其牀簀不易見譏竹帛之書服制將逾豈纍絃歌之化言規小過欲置深文令長臨人未庶幾於蠶蟹鷹鸇逐雀亦何問於狐狸聽子興之言闕罪不假於科繩事終期於改正仲之無罪小鮮之責太深貞亦何辜大理之折斯當損名馬式判損名馬式直講考經判又直講請考専經對六藝式崇執馭為重九流分派經明可尚執鞭投䇿先古所宗聞道尊儒禮訓攸著凝想彼乙思所出群瞻言于丁學優而仕規玉臺之妙式逺求名馬崇金籯之奧義載想蹲龍故得權竒之形事光於鎔鑄切磋之道譽闡於膠庠紫燕雲飛影弄珂前之雪青襟日就來呈席上之珍既而欲騁長途遂得榮參直講且甲之無故或至損傷丁以有功理宜褒進免科已從寬宥合賞須即告知職司既在専經何得更邀他伎判放之筆詎曉通途告濫之詞未為髙見男加布首判得王甲散官八品有男將加布其首筮於堂縣宰倉漏判又尹乙掌縣倉漏三所斷徴銅自解職仰正斷對魯唐客王甲迹厠九流榮參散冗尹乙聲髙百里任總絃歌玉樹光庭早襲夢熊之慶銅章列位未洽烹鮮之術禮經攸設存乎冠昏人天所賴在於倉儲緇布有序三加之義式陳禮節其興千箱之積斯在過庭之訓教子未虧於義方作宰之規為政殊乖於慎密矧茲卜筮乃撰良辰惟彼蓋藏旋聞弊漏於堂則有虧明禮墮職則須按常刑稽以三千詳諸五聽阼醮陳其升降深謂合冝龜玉毁於櫝中誰執其咎在禮無失於法有違存以威儀同仲尼之好禮輒求解職異淵唐諱明之去官加布未爽於前聞罰銅請依於州斷私取行馬判得暨師私取行馬以㸑為主司所擒獲鸚爵享禰判又乙弗鸚鵡爵不更享禰以翰音或告禮薄並仰處分對邾象錢行馬申儀事章恆典翰音致享理煥經書為法藉於隄防設禮光於昭穆暨將入㸑有異鳳琴之鳴乙制不更遂舉鸚杯之禮但關梁禁遏本防內外之姦黍稷粢盛彌益室家之道私取既無陳請已犯嚴科薄禮即欲告言恐傷孟浪主司擒獲誠曰奉公乙弗所違理宜窮詰且法不違貴必行之命攸申禮不下庶輕重之端宜審竊尋名姓莫辨髙卑請更參詳然後科結庶使兩曹義獄罷雙璧之堅疑比寺平刑絶百金之奸利函人所掌判函人所掌不利欲告鎔範非工張侯下綱判又丙張侯下綱不及地式對楊頥建侯行師豫順以動弦木羽蒿睽威以作數我軍實昭彼文章犀兕允著其夀年熊虎唐諱方異其班飾則考工有職梓人不替五等差數三屬分明實戎律之所先誠保大之攸急聿冝精其鎔範最彼弛張對夫子之和容拒養由之徹箭且賔人實貫昧我通規函人之仁愆乎所掌是以綱不及地將和容之未足而或告非工處常刑而誰捨聖澤遐凑皇明幽燭射以觀士武以備文中罕主皮賔有書於揖讓作而不利人無取於能函昔疑作晉陽之美既虧矍相之儀何覩請徴非道方置嚴刑結交四騎判南郡𤣥栖好黃老通德結交四騎所由以為非宜獲豹不賞判又捕鳥鼠獲𤣥豹訴不酬賞對乘軺持斧漢家有直指之使鳥獸草木舜典標山澤之官考行議能以先清舉選徒校獵自符月令抱甕矯俗已見一作是褒升徒搏異物不聞加賞假漢廷之跡猶或心勞越周家之雄乃聞手格州科妄罪須正本條使稱違式未詳其事被髮禱斗判甲被髮禱于北斗乙告其詛云侯家恐盜學盤盂書判又丁學盤盂書庚相為引重後遂舉行其罪或止之甲云以此報德對律防姦慝書垂勸誡有犯無赦德懋必彰載以王條藏之金匱使邪妄知禁忠義有憑至如北斗星象東臺祕績匪遇疑庶之所規祈實詞儒之所探練甲被髮以淫禱丁伏膺以獵精乙擲詛以明辜庚引重以旌譽詰理則事一作志窮討賊原心則情在崇儒證漢代之浮訛荐彰其蠧習殷時之典訓載穆其方且祝詛星厯刑莫重焉銘頌盤盂道亦斯在息夫妄惑其術昔時已滅其身李尤刋緝其詞後世亦髙其㫖曲而不離請標舋於詳刑婉而且徵疑作微聞舉罪以酬德乙之所訴請置金科或人止之恐昧前典文苑英華卷五百五十二
