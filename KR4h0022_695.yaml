body:
  text: 文苑英華卷六百九十六宋李昉等編選舉請勲戚不拜南省官疏一首請吏部各擇寮屬疏一首論選舉疏一首諫濫官疏一首諫賣官鬻爵宰相子弟居要職疏一首請勲戚不拜南省官疏已見六百二十三卷作論左右丞須得其人表劉洎頗以燭下唐書前篇並作頗亦燭下矯正浮兢前書作趨兢請吏部各擇寮屬疏髙宗魏𤣥同臣聞制器者必擇匠以簡材為國者必求賢以蒞官匠之不良無以成其工官之非賢無以致其理君者所以牧人也臣者所以佐君也君不養人失君道矣臣不輔君失臣任矣任人者誠國家之基本百姓之安危也方今人不加富盜賊不衰訟獄未清禮義猶闕者何也下吏不稱職庶官非其才也官之不得其材者取人之道有所未盡也臣又聞傳説曰明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以理人昔之都一作邦國今之州縣土有常君人有定主自求臣佐各選英賢其大臣乃命于王朝自秦并天下罷侯置守漢氏因之有沿有革諸侯得自置吏四百石以下其傅相大官則漢為置之州郡掾吏督郵從事悉任之於牧守爰自魏晉始歸吏部逓相祖襲以迄於今用刀筆以量才案或作索簿書而察行命官之弊其來自乆盖君子重因循而憚改作其有不得已者亦當運獨見之明定卓然之議如今選司所存者非上皇之令典乃近代之權道所宜遷革實為至要何以言之夫尺寸之量所及者盖短豆區舊唐書本傳無此二字鍾庾之器所積者寧多非其所及焉能度之非其所受何以容之况天下之大士人之衆而可委之數人之手乎假使平如權衡明如水鏡力有所極照有所窮銓綜既多紊失斯廣又以比居此任時有非人豈直愧彼清通昧於甄察亦将竭其庸妄糅彼棼絲情故既行何所不至贓私一啟以及萬端至乃為人擇官為身擇吏顧親踈而下筆看勢要以措情悠悠風塵屯焉奔競擾擾宦逰同乎市井加以厚貌深衷險如谿壑擇言觀行猶懼不周今使百行九能折之於一面其寮屬庶品專斷於一司不亦難矣且魏人應運所據者乃三分晉氏播遷所臨者非一統逮乎齊宋以及周隋戰争之日多安泰之時少𤓰分瓦裂各在一方隋氏平陳十餘年耳接以兵禍繼以饑饉既德業之不逮或時事以未遑非謂是今而非古也武德貞觀與今亦異皇運之初庶事草創豈惟日不暇給亦乃人物尚稀天祚大聖亨國永年比屋可封異人間出咸以為有道恥賤得時無怠諸色流輩一作八流嵗以千計群司列位無復新官一作加加一作官有常員人無定限選集之始霧積雲屯擢叙於終十不收一淄澠混雜玉石難分用捨去畱得失相半撫即事之為弊知及後之滋甚一作失夫夏殷以前制度多闕周監二代煥乎可觀一作覩盖一作豈諸侯之臣不皆命於天子王朝庶官亦不專於一職故周穆王以伯冏為太僕正命之曰慎簡乃僚無以巧言令色便辟側媚其惟吉士此則令其自擇下吏之文也太僕正中大夫耳尚以僚屬委之則三公九卿亦必然矣周禮太宰内史並掌爵祿廢置司徒司馬别掌興賢詔事當時分任於群司而統之以數職各自求其小者而王命其大者焉夫委命責成君之體也所委者衆一作當所用者精故能得濟濟之多士盛芃芃之棫樸裴子野有言曰官人之難先正言之尚矣居家觀其孝友郷黨服其誠信出入觀其志義憂難取其智謀煩之以事以觀其能臨之以利以察其㢘周禮始於學校論之州里告諸六事而後貢之王庭其在漢家尚猶然矣州郡積其功能然後為五府所辟五府舉其掾屬而昇於一作于朝三公叅得除署尚書奏之天子一人之身所試者衆一士之進所課也詳故能官得其人鮮有敗事魏晉反是所失𢎞多子野所論盖區區之宋朝耳猶謂不勝其弊而况於一作于當今乎又夫從政蒞官不可以無學故書曰學古入官議事以制傳曰我聞學以從政不聞以政入學今貴遊子弟例早取官或齠一作髫齔之年已腰銀艾或童丱之嵗已襲朱紫宣文崇賢之流一作生羽林期門一作千牛革脚之類課試既淺藝能亦薄而門閥有素資望自髙夫象賢繼父古之道也所謂胄子必裁諸學修六禮以節其性明七教以興其德齊八政以防其淫舉上賢以崇其德簡不肖以黜其惡少則受業長則出仕並由德進必以才昇然後可以利用賔王移家事國少仕則廢學輕試則無才於此一流良足惜也又勲官三衛流外之徒不待州縣之舉直取之於書判恐非先德而後言才之義也臣又以為國之用人有似人之用財貧者厭糟糠思短褐富者餘肉粱衣輕裘然則當衰弊乏賢之時則可磨䇿朽鈍而乘馭之在太平多士之日亦宜妙選髦俊而任使之詩云翹翹錯薪言刈其楚楚荆也在薪之翹翹者方之用財禮亦當爾選人幸多尤宜簡練臣竊見制書毎令三品五品薦士下至九品亦令舉人此聖朝側席旁求之意也但以褒貶不甚明得失無大隔故人上不憂黜責下不盡搜揚茍以應命莫慎所舉且惟賢知賢聖人篤論伊尹既舉不仁咸逺復患階秩雖同人才異等身且濫進鑒豈知人今欲務得實才兼宜擇其舉主流清以源潔影端由表正不詳舉主行能而責貢一作舉人之庸濫不可得已漢書云張耳陳餘之賔客厮役皆天下俊傑彼之蕞爾猶能若斯况以神皇之聖明國家之德業而不建長乆之策為無窮之基盡得賢取士之術而但須望魏晉之遺風畱意周隋之末事臣竊惑之伏願持者得迴聖慮時採芻言畧依周漢之規以分吏部之選即望所用精詳鮮有差失論選舉疏武后薛登天受中臣聞國以得賢為寳臣以舉賢為忠舊唐書文粹並作士是以子皮之讓國僑鮑叔之推管仲燕昭委兵於樂毅苻堅託政於王猛及子産受國人之謗夷吾貪共賈之材昭王賜唐書文粹並作錫輅馬以止讒永固戮樊世唐諱以除譛處猜嫌而益信行毀謗唐書文粹並作間毀而無疑此由識之至而察之深也唐書作之委之而察之深也文粹作此此由識由㸃而識之委而察之深也至若宰我見遇於宣尼逢萌被知於文叔韓信無聞於項氏毛遂不齒於平原此失士之故也是以人主受不肖之士則政乖得賢良之佐則時泰故堯資八元而庶績其理周任十亂則唐書文粹作而天下和平由是言之則知士不可不察而官不可妄授也何者比來舉薦多不以才假譽馳聲互相推奨希潤身之小計忘臣子之大猷非所以報國求賢副陛下翹翹之望者也臣竊窺自唐書文粹並無自字古之取士實異於今先觀名行之源考其鄉邑之譽崇禮讓以勵已明節義以標信以敦朴為先最以雕蟲為後科故人崇勸讓之風士去輕浮之行希仕者必修貞確不拔之操行難進易退之規衆議以定其髙下郡将難誣於曲直故一作較計貢之賢愚即州縣之榮辱穢行之彰露亦郷人之厚顔是以李陵降而隴西慙干木隠而西河美唐書文粹並有政字名勝於利故唐書文粹並作則小人之道消利勝於名則貪暴之風扇是知唐書作以化俗之本須擯輕誣唐書文粹並作浮昔冀缺以蹈禮唐書文粹並作禮讓昇朝則晉人知禮文翁以儒術化唐書文粹作林奨俗則蜀土崇唐書文粹並作士多儒燕昭好馬則駿馬來庭葉公好龍則真龍入室由是言之未有上之所好而下不從其化者也自七國之季雖雜縱横而漢代求材唐書文粹並作材猶徵百行是以禮節之士毓唐書文粹並作敏德自修里閭推髙然後為府寺所辟魏氏取人尤愛放達晉宋之後祗重門資奨為文粹作為奨人求官之風乖授職惟賢之義有梁薦士雅好唐書文粹並作愛屬詞陳氏簡賢特珍賦詠故其俗以詩酒為重不以修身為務逮至隋室餘風尚存唐書作在開皇中李諤論之於文帝曰魏之三祖更好文詞忽君人之大道好雕蟲之小藝連篇累牘不出月露之形積案盈箱惟是風雲之狀代俗以此相髙朝廷以兹擇士故文筆日繁其政日亂帝納李諤之策由是下制禁斷文筆浮詞其年泗州刺史司馬㓜之以表不典實得罪於是風俗改勵政化大行焬帝嗣興又變前法置進士等科於是後生之徒復相倣效因陋就寡赴速邀時緝綴小文名之秀孝唐書文粹並作策學不以指實為本而以浮虚為貴有唐纂歴雖漸革於前非陛下君臨思察才於共理樹本崇化惟在旌賢今之舉人有乖茂唐書文粹並作事實郷議决小人之筆行修無長者之論策第喧競於州府祈恩不勝於拜伏或明制纔出試遣搜剔驅馳府寺之門出入王公之第上啟陳詩惟希咳唾之澤摩頂至足冀荷提攜之恩故俗號舉人皆稱覔舉乃唐書文粹作覔為自求之意唐書文粹作稱未是人知之辭察其行而度其材則人品於兹見矣徇已之心切則至公之理乖貪仕之性彰則亷潔之風薄是知府命雖髙異叔度勤勤之讓黄門已貴無秦嘉耿耿之辭縱不能挹以唐書作抑已文粹作挹已推賢亦不肯待於三命豈與夫白駒皎皎不雜風塵束帛戔戔榮髙物表校量其廣狹也是以耿介之士羞自拔而致其辭循常之人捨其疏而取其附故選司補授唐書文粹並作署喧然於禮闈州貢賔王諍訟文粹作分爭於階闥謗議紛合浸以成風夫競榮者必有競利之心謙遜者亦無貪賄之累自非上智焉能不移既在唐書文粹並作在於中人理由習俗若重謹厚之士則懷禄者必崇德以修名文粹作㓗若開趨競之門則邀仕者皆戚施而附㑹附會則百姓罹其弊潔名唐書文粹並作已則兆庶䝉其福故風化之漸靡不由兹今訪郷閭之談惟祗歸於里正縱使名虧禮則罪挂刑章則唐書文粹並作或冒籍以偷資或邀勲與唐書文粹並作而竊級假其不義之賂即唐書文粹並作則是無犯郷閭豈得比郭有道之銓量茅容望重裴逸人之奨唐書文粹並作賞拔夏統唐書文粹並作少名髙語其優劣也祗如才應經邦之流惟能文粹作令試䇿武能制敵之例只驗彎弧若其文擅清竒便充甲第藻思㣲減旋唐書作便即告歸以此取唐書文粹並作販人恐乖事實何者樂廣假筆於潘岳靈運授詞唐書文粹並作詞髙於穆之平津文劣於長卿子建筆麗於荀彧若以射策為最則潘謝曹馬必居孫樂之右若使協贊機猷則安仁靈運亦無禆附之益由此言之不可一槩而取也至如武藝則趙雲雖勇資諸葛之指撝周勃雖雄乏陳平之計畧使樊噲居蕭何之任必失文粹作無指縱之機使蕭何入戱下之軍亦無免主之效鬬将長於摧唐書作推鋒謀将審於料事是以文淵聚米知隗囂之可圖陳湯屈指識烏孫之自解八難之謀設髙祖退唐書文粹並作追慙於酈生九拒之計窮公輸息心於伐宋謀将不長於弓矢文粹作馬良将寧資於射策豈與夫元長自表妄飾詞鋒曹植題章虚飛麗藻校量其可否也伏願陛下降明制頒峻科千里一賢尚不能少僥冒進取唐書文粹並僥倖冒進須立提防斷浮虚之飾詞收實用之良策不取無稽之説必求忠讜之言文則試以効官武則令其守禦始既察言觀行終亦循名責實自然僥倖濫吹之伍無所藏其妄庸故晏嬰云舉之以語考之以事寡其言而多其行拙於文而工於事此取人得賢之道也其有武藝超絶文鋒挺秀有効伎之偏用無經國之大才為軍鋒之爪牙作詞賦之標凖自可試凌雲之策練穿札之功唐書文粹並作工承上帝而賦甘泉稟中軍而令赴敵既有隨材唐書文粹並作才之任必無負乘之憂臣謹按吳起臨戰左右進劍吳子曰夫提鼔揮桴臨難决疑此将軍也唐書文粹並作事一劍之任非将軍也謹按諸葛亮臨戎不親戎服領文粹作頓蜀兵於渭南宣王持勁唐書作劍卒不敢當此豈弓矢之用也謹按楊得意誦長卿之文武帝曰恨不與此人同時及相如至終於文園令不以公卿之位處之者盖非其所任故也謹按漢法所舉士之主終身保任揚雄之坐田儀責其冒薦事見方言序成子之居魏相酬於得賢賞責之令行則請謁之心絶退讓之義著則貪競之路銷自然朝廷無爭禄之人選司有撝謙之仕仍請寛立年限容其採訪簡沃其用者令其試守以觀能否叅驗行事以别是非不實免王丹之官得人加翟璜之賞自然見賢不隱食禄不專則荀彧進鍾繇郭嘉劉陶薦李膺朱穆勢不云逺有稱職者受薦賢之賞濫舉者抵欺罔之罪自然舉得才行則君子之道長矣諫濫官疏中宗韋嗣立景龍三年臣聞設官分職量才擇吏舊唐書作量事置吏文粹作量方置吏此本於理人而務安之也故書曰在知唐書作官下同人在安民知人則哲能官人唐書作官下同安民則惠黎民懷之唐書無此一句能哲而惠何憂乎驩兜何畏乎有苗者是唐書無此字也則唐書作是明官得其人而天下自理矣古者取人必先採郷曲之譽然後辟於州郡州郡有聲然後辟之唐書文粹並無此字於五府才著五府然後昇之於天朝此則用一人所擇者甚悉擢一士所歴者甚深孔子曰譬有美錦不可使人學製此明用人不可不審擇也用得其才則理非其才則亂理亂所繋焉可不深擇之哉今之取人有異此道多未甚試効即頓至遷擢夫趨競者人之常情僥倖者人之所趨今之務進不避僥倖者接踵比肩布於文武之列有文者用理内外則有回邪贓汚上下敗亂之憂有武者用将軍戎則有庸懦怯弱師旅喪亡之患補受無限員闕不供遂至員外置官數倍正闕曹署典吏困於祗承府庫倉儲竭於資俸國家大事豈甚於此古者懸爵待士惟有才者得之若任以無才則有才之路塞賢人君子所以遁跡銷聲懐歎恨者也且賢人君子守於正直之道逺於僥倖之門若僥倖開則賢者不復出矣賢者遂退若欲求人安俗化唐書文粹並作化洽復不可得也若乃不安國将危矣陛下安可不深慮之諌賣官鬻爵宰相子弟居要職疏中宗蕭至忠臣聞王者列職分司為人求理求理之道必在用賢得其人則公務克修非其才則厥官加曠曠官則事廢事廢則人殘漸至陵遲率由於此頃者選曹授職政事官人或異才昇多非德進皆因依貴要互為粉飾茍得即是曾無逺圖上下相䝉誰肯言及臣聞官爵者公器也恩倖者私惠也只可金帛富之粱肉食之以存私澤也若以公器為私用則公議不行而勞人解體以小私而妨至公則私謁門開而正言路塞險人逓進君子道消日消日朘卒見凋弊者為官非其人也昔漢舘陶公主為子求郎明帝謂曰郎官上應列宿出宰百里茍非其人則人受其殃賜錢十萬而已此即至公之道不虧恩思之情無替良史直筆将為美談于今稱之不輟其口者也當今列位已廣冗員倍多祈求未厭日月增數陛下降不訾之澤近戚有無涯之請賣官利已鬻法徇私臺寺之内朱紫盈滿官職益輕恩賞咸貴一作彌數貪一作險利之輩冒進而不一作莫識亷隅方雅之流知難而歛分立壠則才者莫用用者不才二事相形十有其五故人不効力而官匪為人欲求其理實乃難遂一作成臣竊見宰相及近侍要官子孫多居美爵此並勢要親戚罕有才藝逓相囑託虚踐官榮詩云東人之子職勞不來西人之子粲粲衣服私人之子百僚是試或以其酒不以其漿鞙鞙佩璲不以其長此言王政不平衆官廢職私家之子列試於榮班茍非其人一作非任之人徒長其飾佩臣愚伏願陛下想居安思危之義行改弦易張之道重一作愛惜爵賞審量材職一作識官無虚授人必為官進大雅於樞近退小人一作子於閒僻政令惟一威恩以信私不害公情不撓法則天下幸甚臣伏見貞觀故事宰相子弟多居外職者非直抑强宗分大族亦以退不肖擇賢才伏願陛下逺稽舊典近遵先聖特降神勑令宰相以下及諸司長官子弟並改授外官庶望分職四方共寧百姓表裏相統遐邇乂安文苑英華卷六百九十六
