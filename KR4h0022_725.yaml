body:
  text: 文苑英華卷七百二十六宋李昉等編餞送九送竇拾遺赴朝廷序一首送韋拾遺歸嵩陽舊居序一首奉送劉侍御赴上都序一首送周司直赴太原序一首送前長水裴少府歸海陵序一首送皇甫七赴廣州序一首送張三十二昆季西上序一首送鄭子華之東陽序一首送靈沼上人逰夀陽序一首送沙門鑒虛上人歸越序一首送皇甫尊師歸吳興卞山序一首送元錫赴舉序一首送薛評事還晉州序一首送袁校書歸祕書省序一首送崔副使歸洪州幕府序一首送韋十六進士及第後歸東序一首送盧端公歸巴陵兼往江夏謁大夫序一首送盧端公歸恆州序一首送盧侍御赴王令公幕序一首送竇拾遺赴朝廷序梁肅至哉聖人在穆清之中注意左右獻納之臣於是扶風竇拾遺易直四字集作遺直由華隂令擢拜左拾遺詔下之日士大夫相見而喜曰遺直舉矣直道其行乎頃之會國家舉風力以變元氣闡文明以張四維上曰五諌寂寥七臣安在由是獻可弼違者悚以奉職夫君亦朝服賁然時然後行七月初吉整車祀軷安定梁肅舉觴以祝曰夫有其道而不得其位得集作有其位而不得其時昔人所以為歎也君以懿文當百寮師師之盛履王臣謇謇之位行見夫束帶彤墀之下髙議明堂之側宣上德抒下情唯夫子集作天下是望彼吟咏集作詠風騷優遊平勃之事又曷足為長者言耶非歌詩無以見惜别之志不可以不賦送韋拾遺歸嵩陽舊居序高人出於華族冠冕處乎山林於士儀見之矣在魏周際逍遙韋公語默之間全清淨之道間餘二百載之子以純懿貞粹追烈祖之蹤一門清風獨集作光映今古可謂全美也已初士儀與孔君述眷同隱于嵩丘上嗣位舉逸民孔以諌議大夫徴且調護太子乘輿還自漢中吾子方倘佯於松桂之下鶴板入谷拜左拾遺固辭獻納之任遂有江湖之適議者稱孔之兼善吾子之自得出處一轍消息同符然後知刻意而髙待時而動者俱失其道理矣揚州刺史杜公藴伊邵之望恱禽息之風士儀依仁遊道幾歷寒暑既浩然有歸思乃忽乎以將行豫嘗同召諌官同被儒服所不同者執李公之御與蹈頴陽之塵而已會脫韁鎖隨煙霞訪吾子於嵁巖之側豈或碌碌久為躁靜之異乎先書寄懷且以序衆君子考槃之什奉送劉侍御赴上都序才全者必幾於道志正英華作大非者必安於時初劉君以文章遊翰林深於文者以公幹越石為比中嵗有邁世志脫略纓辨住江湖間論者又比之阮始平陶元亮未幾詔掌柱下方書出參蜀漢軍事俄復自適其適道岷江浮湘潭歷敷淺源而東君子謂君涉履所至擬司馬子長遂留滯吳南以道自居其名益振其致愈逺向非才全志正又曷由光茂如是乎今軒堯在上伊傅作輔方舉賢能以熙衆職故劉君朝服賁然將如亰師御史延陵包公祖而觴之且曰易傳不云立誠以居業論語不云邦有道則智吾子居可大之業當則智之時是往也將賀不暇豈愴别乎二三子尚未醉盍各賦詩以代踈麻瑤華之贈中丞既歌詩首集作首章命和者用古意皆以一百字成之凡七篇送周司直赴太原序今年春上以副丞相鮑公領太原尹假節主河東諸侯北門宴間夷夏是賴秋七月其部從事大理司直周頌自廣陵赴焉是宜後集作復命禮也初朝廷謂晉陽國家之豐沛天下徑兵所處集作處也故以推轂之任付鮑公公謂三軍經用仰淮湖之餽非仁智不足任也故以泛舟之役咨司直司直器略宏逺文敏忠信夫文則經逺集作有經敏則有功忠信則厚事三務既成單車而還議者謂司直道將光大集作大光乎不然時之與才何其參會也夫躡摶風之便者其翼必大列構厦集作構大厦之重者其材必廣頃鮑公由尚書郎為韓侯之佐三四年間董戎于藩穆如清風文武為憲以司直之懿文碩畫翔集翰林之上陵厲集作邁之勢不可度已非光大而何士有不佞嘗辱盛府之召之子于役我亦集作心載馳因賦思鴈門一章蓋取夫欲往從之路逺莫致云爾送前長水集作安裴少府歸海陵序前人秋風木落臨水一望而集無而字逺客之思多矣而裴侯復告豫將歸故國傷懷贈别之詩於是乎作也夫道勝則遇物而適文勝則緣情而美裴侯溫粹在中英華發外既乘興而至亦虛舟而還與夫泣窮途詠式微者不同日矣若悲秋送逺之際宋玉之所以流歎也况吾儕乎送皇甫七赴廣州序豫同郡皇甫生膚清氣和敏學而文嘗纂家範數千言自逺祖漢太尉晉玄晏先生以還門風世德煥耀篇録生聿修之志可觀矣豫聞璵璠在璞與碔砆等耳及夫琢而成器則價重當世以吾子之質且琢之不已名者公器其可避乎鎮南杜公負佐世之才有盛名於天下門閭之賔唯吾子屬斯往也亦以赴知已而求善價吾儕贈之以詩蓋勉行而已豈以逺道為戒乎唯酒可以破别愁衆君子不可以不醉焉爾送張三十昆季西上序恆衛大陸之間土厚風淳世生偉人其大名大節之後著於天下唯張氏為盛曩豫得其叔季曰芃曰苞始冠章甫遊翰林蓋相知矣而未深也間八九年又相遇於江淮間則叔也秀才登科已知名於代季也立誠居業為後進之表加以簡直強毅恭寬信敏文史足用弛集作施張不窮嚮吾所稱土風偉人蓋此也今年上求士於四方揚州牧扶風公嘗得叔為門閭之賔因以充選議者謂扶風舉賢不避親叔得舉不以私則其才可知也季屬文以氣為主以經為師慕宗伯之賢從州黨之賦則其志可知也始大歷末豫應詔至京師時豫伯氏以文德都絲綸之任博約之道於豫最深絶絃之悲仰前修而未逺斷金之契於吾子而益厚别者集作若人所不免况豫情乎凡道不合則信集作分不深言不盡則意不見序所以盡言而信道焉爾無金玉爾音焉送鄭子華之東陽序鄭侯身甚否而意甚泰家愈貧而學愈富言政必及王言性必及道言文必及經而動不踰間貞不絶俗年出三十其志未光抑有由哉夫風之行也則萬竅怒號時之止也不能動纎毳士不用則塊爾而已遇則雲蒸雨隨是牽於時而不由於已鄭侯雖有洛陽集作下之才淹中之學其如時止何傳曰美惡周必復吾子困于臲卼星幾周矣或者其將復乎豫材薄體弱曩遇晉陵守獨孤公方執文柄為當世集作時律度見視有終日不違之歎公既問服豫將絶絃寢門銜悲適覯吾子子即晉陵之出也一見而觀其禮再見而同其志志同而忘其言悲歎兩集而不知其止邇來蓋一紀矣詩人賦繁霜之月豫滯于吳子遊東陽當逆旅之次送乘桴之士命旨酒登髙樓酣歌氣振人莫知者夫物不可以終聚必受之以散離會不紀何用文焉集作為既而敘行且以見志送靈沼上人逰夀陽序上人形就而心和行獨而志潔辱與僕遊殆二十年矣初用文合晚以道交淡而文文而敬他人未有知也集作未之知也今年春豫有幽憂之疾謁長桑氏于東南上人以無住為樂將邁乎夀陽相待形骸之外相忘江湖之上比夫世間重事者不同日矣彼都人士高陽許生孟容開封鄭侯通誠皆於上人有忘言之契相集作想與夫二者道舊之暇必荷錫而逰問小山叢桂何在濠上鯈魚樂否豫至東越亦訪支許故事歸而於虎丘之精廬先出後期以志少别云爾送沙門鑒虛上人歸越序至人不在方實相無所住此沙門鑒虗所以順理而隨世也適遊皇都談天於重雲之殿今也于歸將休于沃州之上集作山泛然則集無則字無事獨與道俱遇物成不遷之論間吟有定後之作可謂逺也矣曩豫師來集作東越業天台之道追石門之遊爾來已十數年長松飛泉寢集作寢寐吟想送子于往情如之何東南髙僧有普門元浩豫甚深之友也相遇之際幸説鄙夫擾擾俗狀且當澡灌心垢再期於無何之鄉送皇甫尊師歸吳興卞山序尊師以齊物為師抱神為事有年數矣外則質貌蒼古遺是非於耳目內則沖氣浩然卷虛無於槖籥常誦道德上下篇往來吳中諸山如浮雲獨鶴自適其適吾陋且遁迹不暇又焉識其所以戊辰仲夏覿于山隂精舍于時方牧追右軍許邁之期下走集有喜字作壺丘禦冦之遇亦既合契於焉飽和百骸自理滓濁如洗先是師藏道書于卞山之下留止未幾忽乎將行不受一毫之施且輕千里之别有以見無待之情矣豫欲脫形神於鞅絆蹈方外之逸軌有志未就心焉集作馬火馳命飬空而遊相從於赤水之上師乎師乎斯言不苟也夫送韋十六進士及第後東歸序益都有司馬楊王遺風生嘗薄遊西南覽其江山頗奮文辭歎蜀解嘲四子講德之式及夫秀士升貢有司處之以上第時輩歸之以髙名飄飄然有排大風摩青天之勢今嵗後四月謝諸朋遊輕騎東出且以五綵之服拜慶于集作於庭闈榮哉孝乎是往也豫當與生為五湖之遊矣今則繫在柱下不能奮飛送歸如何為愧為羡大雅云敬慎威儀以近有德蓋雖有雜珮不如此詩輟而為好以志少别安定梁肅序送元錫赴舉序自三閭大夫作九歌於是有激楚之詞流於後世其音清越其氣凄厲吾友君貺者實能誦遺編吟逸韻所作詩歌楚風在焉初元之明年豫與君貺兄洪俱參淮南軍事屬河外塵起羽書狎至每沉迷簿領之際一見夫人清陽則煩襟洗如也又常愛其人也淡然其靜也曠然其適也泛然其德集作無不與也且從賔薦之禮以赴揚名之期又見其志也秋氣云暮蕪城草衰亭臯一望烽戍滿目邉馬數聲心驚不已感離别於兹日集作辰限鄉關於逺道孰曰有情而不歎息傷時臨岐者得無詩乎送薛評事還晉州序符載十八年秋七月余自潯陽來赴丞相府與評事始相值初揖其風貌次聆其嘉話終覽其篇詠如逰三山入仙洞沉深窈窱稍造異境煙霞草樹别有姿狀使人淡然忘歸也夫詩之所主大者存諷刺備勸戒觀風俗之美惡細者眄江山采雲物導性情之幽滯評事公之什才思凝逺髙韻孤枝躍出寥廓至于天池雲飛鶴去不可附近尚使名聲濩落晚嵗不偶斯乃執文柄者之咎也薛生何有哉廣陵握手秋往汾晉渺渺長路蕭辰氣清想君馬上見落葉聽候鴈一吟一嘯自有遐趣亦足以開逰子顔也千里之别勿復恨恨送袁校書歸祕書省序國朝以進士擢第為入官者千仭之梯以蘭臺校書為黃綬者九品之英其有折桂枝坐藝閣非名聲衰落體命轗軻一作疴舛不十數嵗公卿之府緩步而登之袁生富有春秋挺豪健之姿心氣剛明端行美文余始見於海昏抵湓浦西逰長安長安士大夫甚多之日者昌黎韓公尹京兆朗鑒之下應鄉賦浩浩千輩生為甲冠繇是為聞秀才焉天官侍郎以判銓調士生涉髙級繇是授讐校之官焉於戲人之生也患詞不修誠不立苟進取行已者盡併一作佇生也欲逃問望傲富貴其可得乎去年秋有休浣之請來覲于伯兄展禮于亞相棣蕚增韡韡之盛賔主得厭厭之樂道光事備青春北歸栁出一作茁帝里蘭芳省署嘯侣持觴吟弄風月一作煙藉藉當年為樂如何走以嘉禮一來江夏相值於諸侯之館因得與群彥賦祖行詩實亦從此旋歸舊隱偶長松老鶴為度時之適豈復以華鬢為肺一作痛腸之慮哉中朝圭組一作璋君子太半皆匡廬之舊間闊久矣為余揖其休暢也送崔副使歸洪州幕府序今四方諸侯裂王土荷天爵開蓮花之府者凡五十餘鎮焉以禮義相推以賔佐相髙長城巨防懸在一士苟人非髦彥延納失所雖地方千里財富百倍一作萬有識君子咸舉手而指之我主君常侍李君以南昌軍倅辟于崔君真得賢也崔君名稅字公約天質方厚氣色淳重有端正之行業有操斷一作切之利用柔則水順剛乃山峙工文章善笑謔一作談笑言語飲酒可百觴交朋好與遊者如攀瓊枝坐瑤圃油然竟日而不知厭也始以貞幹調補義興尉參河南府軍事割而不細曠而能斷蹤迹清直風聲鬱然是知動公卿之顧走群府之檄士林籍籍有自來矣十六年冬自洛陽抵襄州歷江夏將祗承本府之命大夫何公上才碩望作鎮兹地十四年矣急才愛士與飢渴等每賔客至登膺門下陳榻者輒損折威重降就禮數歡愈周旋襟期洞開况與常侍交分重丘山疆場連風煙見我從事暫如會面不得不留連繾綣以道平生之意乎繇是窮勝賞酬一作極宴醵景無徒盡花不浪發江夏郡東有黃鶴山山中頭陀大雲精舍皓師竹院惟一師茶圃又有東城石壁壁前有桃李樹千株澤國多雨芳華久困適值寒食前後天野晴明衆花齊發火然雪白是日也或嗤丸劒之跳躍鄙絲桐之嘈噆大夫乃減徒御挈琴酒相與屢逰乎其間遭石而坐觸隂而息雅杯徐行微微春風好鳥一聲為我笙鏞往復如此彌旬纍晝皆所以竭主人之志盡公約之歡也明發理棹黯然愁慕南浦悠悠别如之何於戲古人云良辰美景賞心樂事四者難并今實并之矣常恐後會追之不及恨恨正在於此耳公約得不思之乎得不念之乎展布才力好輔君子以成賔主之美乃所望也副相視事久困倦劇未能操觚抒思故小生敢於敘述冠于首章不知慙怍之無從也請咸賦春中一物為道路之志送盧端公歸巴陵兼往江夏謁何大夫序前人已卯嵗主君以清淨之理治洪州之三年也侍御史盧公自江夏展禮于我來之日至往之日凡甲子四焉享勞祖軷慊然不足即客之重輕可知也將行主人賦五言詩一首韻諧金石光寵道路亦命酬和璨如編玉顧謂部從事符載序而導之云端公名泰卿作師字成業有當世才幹瑰瑋磊落不縈苛細工為文能讀三略六韜觀其發論指畫規模宏拔真卓然之士也中嵗轗軻竄逐江湖萍泛雲逰二十餘年常侍於公有松柏之心有管鮑之知故再逰長沙一至鍾陵相望益重相歡逾劇方翻驊騮之足簸雕鶚之翮電發千里風生九霄豈止於實其裝槖而已哉蓋通塞有時難與命言悠悠北歸悵望如何山有木工則度之常時而語矣況在其封域焉載知副相必起羸發困結攬賢傑延於參畫之地寧使涉洞庭波視木葉落歸守蓬户飢餓旦夕哉勉矣風水唯當痛飲醉髙秋之别送盧端公歸恆州序今天子纘嗣鴻業也雨露雱然洗濯八荒藩隅安謐交修聘問是以侍御史盧君奉本府司空王公之命以乘馬玉帛展禮于我焉夫使之來也擁萬里之傳結四鄰之歡大或議兵食細即道欵曲重輕之齊懸於俯仰非才人快士之選即何以當之端公少而能斷壯而宏逺練時務之畫負豪爽之聲始至也其氣直而肅其詞遜而婉其儀恭而和折旋應對雅會機要我太尉公恱而延坐與語目為雋異顔色禮數橫加其間可謂賔之秀發者也繇是先太師之意逹賢司空之禮備胸襟之志也展賔主之好也深則皇華之美盡在此矣亦何必誦詩三百然後為得乎太尉南康公作坤維之梁柱二十三年矣大勳大德播塞宇宙藻籍今古逈無其曹明司空英姿粹氣授於天造忠厚義烈繼芳前休異日也合德同心翊戴是思勤於王家康活民庶小子見史臣載事之筆濡翰流離之不暇也實近為司空抃手而遙知端公徘徊此地久而彌暢太尉嚴館戒吏厚餼具牢作羊米禾芻薪亦如之唯恐其超然道别也端公感惜恩貸屢回征駕自去嵗之鑿氷至今嵗之流火方遂其行焉蟬鳴嘒嘒涼飈欲動繚繞長路愁懷若何九月十月之交想端公下太行抵常山停車騎拂霜雪嚴城旦開矛戟如林復命于雙旌之下赫然有光也主君以尊重之命下介引而敘之抽毫之際臨深履薄之不啻也咸賦四韻以代雜珮之贈焉送盧侍御史赴王令公幕序持俯仰全檢劑從容溫謹之地齷齪之士也跨時俗尚竒偉抗志風雲之表從橫之才也監察御史范陽盧公神宇聳峙襟靈爽拔脫苛細於塵垢得豪雋於意氣義分形於造次才畫充於懷抱邁迹遐逸與人無倫年未弱冠為鄱陽尉目事必割間無留刃勢掩曹輩快聲飈馳江西伯常侍鮑公祭酒李公寵以賔介之目授以叢劇之務政或闕漏我能補焉無幾何馳車逺逰北至恆冀聞以利計于司徒王公司徒器之開深沉之懷垂沛然之愛歡則膠固義存諷諭故能不四五年始自黃綬歷廷評司直冠惠文冠御史雖取恩知已實自躡青雲之梯也况年才黑髮采色照地奮于名迹其心嶷嶷則氣髙五白之博室有千金之數直大夫豪逹之事豈足纍隘目一作日之祖耶一昨扁舟南行次廬陵郡下適值侍御將歸華幕幸接便道為共濟之逰話酣意密一作察備取賢主君之盛業歡喜失次若無所從因輒以狂瞽私自忖度以為人生於世其公者樹勳烈銘鼎鼐休聲巍巍垂之無窮其私者富貴夀考而已矣今令公功德格皇天忠義貫古人地方數千里甲兵十餘萬身為上公夀方無疆英英三子殷如川瀆尚書以寬厚保師旅大夫以沉毅威暴亂都尉以才智承恩澤一門雄雄洪業所鍾生人之美盡於斯一作此矣成天下之務者時也射萬世之利者勢也若當此時抗雙旌驅四牡星馳丹陛對揚休命彼燕趙東平之諸侯耻不若也皆執玉帛爭修覲禮使純誠動鬼神之感光耀增日月之輝君臣之道穆穆皇皇則史册之美又盡於此矣夫何犬戎之瑣細而敢為大國之患難紆令公之思慮哉侍御犀額燕頷骨狀甚貴懸知是行也必能露丹懇騁飛辨大陳明義以酬國恩一作士山中異日偶承來問聞侍御褒衣結綬從公于北闕之下明天子以卿大夫印綬加之不可得而讓也窮秋葉脫鴈號霜徑矣行道開襟下帆鍾陵衆君子圭璋偉士英華照爛美侍御之所從也樂請抒詩什以貺之載懦夫也酺腸二字疑所謂以附于敘末文苑英華卷七百二十六
