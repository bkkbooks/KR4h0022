body:
  text: 文苑英華卷七百七十八宋李昉等編宫闕下城邑附乾元殿頌一首新廣雙城門頌一首蘄州新城門頌一首雜頌上馬寶頌一首神雀頌一首宫闕下乾元殿頌并序王勃臣聞鵬霄上廓瓊都開紫帝之庭鰲紀下清珍野闢黃靈之館兼山配極照鸞闕於霞標薦水涵元湛驪宫於霧壑斯則神徴語怪功潜鳥跡之初理涉非經道昧鶉居之始授鳳書而稽碧落仙構罕存按龜籙而質黃圗金模間起粵若風移處暗增巢恢火運之機業拒嚮明上棟括河圗之奧三階布政詠匪日於靈臺百堵陳詩頌斯干於考室亦有黃軒瞰月樵門頺九洛之功璿闥排煙牧野構三河之酷御燕臺而臨北極缺王度於祈招列雲閣而拒南山隕黃謨一作謀於軹道然則卑宫喪禮采椽輕四海之尊豐屋延災柏梁非萬乘之有雖因時立事奢儉殊流而𢎞道在人興亡迭一作遞運靈光末造不窺九室之榮景福宏規猶擁三方之舋聞一作瞻風舊史逮曹馬而無譏觀跡故墟歷周隋而未得自我唐太陵遷構均五方於鶴几之前中野凝圗調六氣於虬牀之下坐圭臺而清俯仰晷緯齊明臨鼎邑而重威靈雲雷合響得𤣥功於大壯其至在茲乎我大唐雞渾制極樹神宰而制山河鶴䜟裁儀闢太虛而有天地黃精吐瑞潜龍苞象帝之基紫氣禎一作頽祥鳴鳳呈真王之表髙祖太武皇帝虹星湛色開寶胄於金壺蛟電凝隂發皇明於石紐白蛇宵斷行移海嶽之符蒼兕晨驅坐遘雲雷之業屬東鄰委馭扇虐政於叢祠北拱隳尊紊皇圗於寶極蜚鴻集野瞻烏鮮投足之因青牘疑作犢青犢光武時賊也嘯風羣鹿無擇音之所天街五裂截鯨浦而飛芒地紐三分觸螯山而按節𤣥虬在御掃圻甸而廓星都黃鳥分麾動扶搖而駭雲陳鑣官杖鉞跨髙陌而登元轡野韜戈陟圯壇而擁號皇圗不恃聖人追卷領之風神器無私一作移才子奉褰裳之運太宗皇帝雲房揖契壓麟璽於庭軒雷渚翔英擾龍鈴於髙席一作周鎬八能一作龍亨運抗鵷邸而杖朱髦十亂恢基臨鶴州而擁黃鉞唐雲祕族潜開白水之徴代景回輪光踐丹丘之運權輿象緯削茅社而建瓊祧草昧風雲席羅圖而創璿厯紫庭合粹括宇宙於宸襟丹扆凝尊運陶鈞於寶思摛碧霄而錬石上清耀魄之宫詔寰海而捐珠俯睇陽侯之室功驅偃伯頓鶚視於華封道被來王靜龍吟於武庫𤣥樞上運卜年開纍聖之符丹竈升遐遺範敞謀孫之畫皇帝陛下椒庭襲慶曜璿蕚於霞庒蘭殿分休湛珠衡於月館道凝瓊鎮下蒼掖而照重熙業峻銅樓憑紫軒而揖羣后環四瀛於舜抱漏蟻覃津栖十景於堯襟巢螟荷照上元開籙寶龜定皇邑之模下武崇基飛龍錫帝臺之構貞明啓運齊一作齊玉鏡於鸞門易簡成功偃銅符於鶴仗一作帳懷降尊於襄野大階忘七起之勞念負重於焦原巾席託三危之險臨翠媯而則道天孕時成坐𤣥扈而被圖神超物妙闕星潯縱淑曳珠紱於銅臯雲野疏祥抗瓊枝於桂浦素蟾登慶六虛充牝馬之貞丹雀御林三雅合關雎之好璿宫夜靜居龍􅎻而調元金房晨開御鴛階而緝化芝庭楫訓逺清和鳳之儀蘭珮承風競峻當熊之節皇太子承雲紫座翊八柱於乾維湛粹青衢揖三樞於地户黃離踵曜太陽分銑樹之輝蒼震薦音少海控銀河之色鶴筌飛奏想丹駕於瓊山鮑爼捐芳齒𤣥冠於寶序彤闈問豎禮崇監撫之威黼席興賢義極君親之愛若乃東門恤𦙍疊仙構於熊山西苑承家導靈波於鴈沼桐圭作瑞鳳毛曜丹穴之英芽壤分維麟距冠𤣥丘之俊㢲宫延粹闢朱柱於娥臺兊野流芬疏紫蘭於别館頻隈育範雲門一作扄分戚里之歡覃嶼凝規星閣絶郎官之請雕龍命職縱跳澤而驤鱗翠鷃調司順義飈而撫翼月軒宵佇虞溪降璿緯之精震帳晨披姜水洞金韜之賾飛鶴書而抽海狀桂壑於是投綸轉麟斾而揖山容松澗由其削衽軒圗瑞矞泛花綬於雞林農紀祥炎濯蘭纓於鳳水仙臺俶務三圭銓棘序之風天秩調邦六府變槐衢之典金門獻納縱麟筆於苔箋石館論恩核龜章於竹槧淹中訪禮蹲龍揚壁水之波稷下談經飛兔躍環林之秀詞庭吐鳳玩鳥跡於春黌書帳翻螢閲蟲文於夏閣杏花千畝紺轅照帝藉一作磨蜃之功桑柘三宫𤣥紱降親蠶之禮圓丘上闢奉蒼璧於靈壇方澤下凝列黃琮於寶墠朱絃翠瓉履霜懷四響之尊復霤重檐涓日正三綱之首五靈奔慶冠蛇澤於黃樞六祀銜欣揚麟煙於紺席遺弓積慕䖍深太廟之儀執豆推恩道振明堂之禮瑶山廣樂備逸調於宫懸洞庭仙奏納遺歌於帝府九韶分唱后夔清桂序之音六變同和飛鳳掌梧軒之律樽爼折旋之數苞舉隂陽堂庭節奏之規彌綸宇宙靈襟索隱控風伯於詞林睿想鈎深詔天吳於筆海神窮獨照傍探赤水之珍思洽幾深逈寫丹溪之韻金壇紫露映銀籀而翻華瑶林白雪藻瓊章而吐絢蟬機樶化銅渾將九聖齊懸虬箭司更銀漏與三辰合運爽鳩分職素雲頺鳥啄之祥神獬關司𤣥水照龍顔之則黃沙鞠草剗叢棘而遷訛丹石滋苔仰甘棠而息訟融臯再稔方聞外戶之謡昧谷千箱坐溢康衢之奏百城煙峙望秋露而乘風千室雲開合霄建而組化彤幃獨選熊轓下蘆鴈之祥墨綬分賢犀檢降槐鸞之祉筠驂佇信髦士剖竹而相尋葦杖霑仁鮐叟攀輪而不暇龍蛇可踐野人豐荷杖之歡雞犬相聞城尉輟鳴桴之響五雲抽潤湛芳氣於璿臺六府威殷唱豐歌於銅闕不一作嚴戒而畀東戶恩周動植之津博施而舉南風化偃胎萌之㝢神謀備預儼七萃於丹樞邃略防微肅千廬於紫衛元戎握節黃公授犀闕之圗帝座聞鼙𤣥女薦龍庭之䇿頳柯椑疑刃中權决勝於兩階白羽俄麾善陳推亡於四表朱匡反景之域削地弭於文㮰黑山明月之鄉委龍琛於武帳錦軒星鶩控乾絡而觀風繡服霞驚浹神紘而問俗川浮沒羽鯨溪靜丹浦之虞陸薦飛毛熊瓛動青雲之偵銀關驟雨望紫陌而趨恩鐵幌馳風計彤闈而瀝思赤馬文猿之寶叢積乎郊虞紈牛露犬之貢滿盈乎儲邸青丘畫野不踰征賦之鄉蒼水奉圖未盡隄封之貫且夫緯武經文宏業也含幽育明至誠也混齊六合大功也規模百代昌數也故能襲九空而寧庶物劃千里而統諸侯休徴象德而動嘉符觸類而至風揚晷洽藻乾慶於芳年司節河謙疑藹坤禎於明渚瑶枝結慶泉埃蕩玉蓋之文瓊液浮甘天酒綴金莖之色黃牟紫脫凑仙頴於中畿翠萐丹蓂疊靈株於上序駢眸候日漾影䝉池比翰翻風栖光理木祥飛井絡震鱗題瑞朔之元祉絢新郊枵獸紀和年之序具靈篇之絶貺䆒仙諜之殊休天人之際交矣皇帝之道備矣由是三靈物覩扣蘭禁而棲誠九服子來詠蒿宫而騁力去奢去甚不矜黃屋之隆匪朴匪雕方順丹墀之請宸規相宅考周舊於靈都睿覽思和獲秦餘於正殿羣臣列陛奏蕭相之遺模天子臨軒採荀卿之故事炎洲八桂簉仙栱於林衡層一作岱畎五松委靈材於梓匠衢宫記範萬機抗九户之尊海孽移琛千欒省十家之費飛廉卷藹徹煙極而浮甍屏翳收津劃星墟而置槷瑶階百雉光懸寶露之壇瓊壁萬尋影綷崇霞之閣拖虹梁而四注星漢虧於上榮疊雲棟而三休寒暑隔於中霤雕楣鶴企沓勢分規繡桷虬奔殊形别起圓璫布藻罄羽璧於狼泉方鏡披蓮孕化璣於蜃浦芝樓對幄重傳五日之風藝閣列錢彩煆三旬之霧文疏罩逈隂兔息肩於綺寮翠幌籠霄陽烏鎩翼於珠網豐隆按節下復橑而司階列缺施鞭低叢楹而假道溫房佇幸煦芳景於佳辰凉室乘閒凛徂飈於火序金鋪夕照若帝圃之輝瓊英寶綴晨懸類阿房之聚銀燭煙丘碧桂翊珉陛而披香雨岫頳筠夾璿流而揚影九衢翻翠雜仙卉於中逵四照霏紅間靈葩於右墄神禽率舞光浮肆夏之軒瑞鳥相鳴響叶鈞天之樂鈎陳宿列儼雙碣於丹霄綺繳霞周闢千門於紫露爾其左扄嵩鎮申侯降太室之禎前枕莘郊伊尹發空桑之秀揭熊山而北眺貝闕猶存覩龜溜而西分瓊臺易接總交中宇廓川陸而疏畿竟想善鄰揆風霜而建野然則因秦構極祖宗耀金䇿之符作洛恢基我后創璿居之始援天引聖隔代重暉橫紫都而可襲配𤣥宫而非逺故能使神光夜燭鏡麟趾於文除仙淹晨華委鸞章於繡礎靈爻密發八方昭大有之和寶篆潜開六合啓同人之㑹兩儀交慶虛碧墠而翹旌萬㝢披歡指蒼車而候蹕雖青蒲頌德東朝獻龍鳳之圗而丹極鳴謙南靣動貂羊之詔百神推䇿望璆徑而䖍誠三讓奉符顧瑶壇而肅事龜書吐瑞按五校而分營鳳䇿揚輝翔八鸞而節步帷宫霧轉列芝蓋於中天帳殿星離軔蒲輪於大野紫鱗充饋若大帝之共臨素鶴翻華類羣仙之廣宴花開瑞雪委瓊饌而調芳綵絢祥雲夾珠旗而曵影功推三祖銀繩勒東岱之威業峻一人金策奉南山之夀道既成矣𤣥符集矣代既貞矣元勳緝矣運三辰而虛玉柄風兊渙其中孚懸五禮而偃金科雷坎光其作解奔烽舉爵溢仙酒於中衢疊鼓分肴浹宸輝於下里吞九重而上運控八聖而遐征翔赤驥而睇風區吟翠虬而掩霄甸隱隱轟轟雷動天驚回輿斜眄而降乎乾元之殿司宫庀職肅坻而神行掌舍巡方煥巖廊而洞啓赫若朱螭負漢而輝橫海之鱗默若蒼鵬架壑而振垂天之翮干官曉次傃銀榜而端簮萬戶宵披候瓊膏而肅帶靈戈列陛天官具三揖之儀雲輅充庭宗伯橫一作寅九賔之禮瑶鯨戒響懸猛簴於端闈銅一作鐐狄分形肅嚴扄於左序排紫微而立極宸儀冠明后之三俯黃道而披軒仙歷用乾元之九蕩蕩乎何聖人之無外巍巍乎而神功之不窮也臣勃席芳十步企景三冬雖承宣室之談猶窘靈臺之影仙壇逺祕已多謝於祥鶼大厦初成復攀榮於賀雀慨深梁甫終乖捧日之歡恩極甘泉未動凌雲之價神圗不測固流絢於丹縢微志可存庶鐫芳於翠琬敢獻頌曰紫扄垂耀黃樞鎮野銀樹霜披珠臺月寫嚮明立極橫神廟一作廓社大壯摛爻斯干韻雅其一鶉居化沒徂訛道長瓊構霞明璜軒露敞棄人崇欲違天蠧象南巢不救東鄰長往其二瑶緘考懿金板藏功道凝茅屋業盛蒿宫龍階察祲鵷閣調風推訪華禮酌儉思冲其三懸釐結疊傅翼生災千甍嶺接萬拱星開爭圗絢侈福極凶來風寒碣館露慘蘇臺其四十館營秦金房砥室千間架漢韜雲閟日濟惡承危同亡異術傾輈未逺遺墟繼出其五龍川結禍鶴塞稱符塵驚八際霧慘三都穹廬寶極罽幕璿樞司宫墜典掌舍淪圗其六蒼衢育祉丹丘表聖鳳矯仙樞龍回寶命道凝金冊功馳玉鏡紫氣抽華黃輝疊映其七神稽鶴䜟迹播雞渾重光纍極翼子謀孫經天緯象就日提元鸞軒湛粹鳳几裁尊其八祥抽紫歷業照彤管珍雀朝翻仙蟾夜滿丹墟獻跡青臺墜卵椒閫儀風芝閨奉欵其九登三建緒明兩開儀龍譙霧鬱鵷禁霞披浪分璿渚景峻瑶枝黃扉曉列丹轂宵移其十龜文獵彥麟旌放逸桂客攀榮松賔改律紫鵷開紀丹虬聳秩縱壑搏飈登山捧日其十一功融棘序道備槐庭不仁者逺惟道斯行煙搖墨綬電轉朱軿境懷春翟野散秋螟其十二鄭竹分科燕棠輟諷銅機化極珠囊業洞禮貴丹虬樂調朱鳳珠坰獻寶錦鄉委貢其十三龍關靜柝鶴塞投弦歌呈豹尾舞進鳶肩銅撓疑月斥鐵輞星懸繩幽架險驛霧馳煙其十四霧壇凝紫河宫湛碧翠萐翻飈丹蓂候魄霜均雹散連珠契璧花蓋籠霏花衢墜液其十五年和政美化極風調靈臺軫詠考室興謡循圖訪典去泰捐雕道存南面讓屈東朝其十六望雲裁搆籠霄建宇方鏡星離圓璫月聚梓匠傾思林衡授矩畫栱栖煙文軒架雨其十七芝房疊翠桂廡流丹霞張萬戶霧葺千欒重扄駐燠洞牖栖寒神加有叙貺入無端其十八帝圗臨御皇僚萃止電㦸揮霜雲旌拒晷紫宫可逼黃街易履鳳礎騰文麟庭抗禮其十九珠泥暢績銀繩鬱契鶴嶺雲明龍壇景惠道超中古功推下濟惟帝惟天惟天惟帝其二十新廣雙城門頌并序符載貞元十四年我常侍鍾陵之政成繇賦均調法令修理男女小大祗承教化土地千里嗤嗤浩浩莫不剗心化為端良然後覃思閒暇將有改築自我官府至于門臺是用乘時洗故作新先是城有贅墉橫亘東西盤護便地甚曰無壯瞻彼闉闍亦特其門崇未及雉廣不容軌公斸掘平夷垣修塗壞撤規模巖巖四扉每五夜將旦候吏雲委鼓嗚逢逢輷然洞開軒蓋絶塵一作麗非而並鶩軍旅擁關而坌入旗過優游馬不駢蹄一作旗過不偃游馬立不駢蹄徘徊流覽勝氣洋溢改作之致騰凌前人真卓然之思也君子謂公氣冥𤣥極智逰象鬱以盛德統于大位茍視民之弊吾見其雍閼不和之氣决防潰澤之不若也豈復有煩寃淫濫之志漸于風俗哉循跡觀改疑正在於是公嘗自濡翰有所紀叙實恐揮謙休聲不揚小子愚陋贊述銘頌請刻于貞石之隂使新門之績也皇皇然頌曰鍾陵古城隘不工麗譙隙穴廢崇牗右貂作鎮寢一作掃前蹤中央砥平溪䝉籠嚴城朝旦日曈曈髙開四門車馬通此邦此績垂無窮敢紹華藻揚清風蘄州新城門頌并序城于防春秋書之重時也城于蘄輿人誦之美功也何可謂之功曰余得言之矣大唐庚辰嵗秋九月嶽卾觀察使御史中丞鄭公前牧于蘄春始佩銅虎符是年冬十一月蔡人不䖍天子詔諸侯之師誅破之我有疆場與人腹背慮禍甚劇為虞落然民大愁恐若寇暴至是邦一作郡也夙昔無事人傲慢垂百餘祀城隍不張頺墉壞堞僅為平野公乃度舊址量客土備畚鍤嘯丁壯勃焉而興於是謹刀布以索力拷鼛鼓以蕩氣嚴進退以設令立師伍以程課蒸徒雷呼萬鎚星飛誅惰聳勞間無留時凡甲子五癸即崒然城成矣墉髙三雉門容兩轍周回一千八百四十步門臺睥睨霞赩雲截如崇山斷岸邈不可嚮議金湯者我居首焉日者嗣曹王臯討希烈之叛于此嘗具板幹作為坯築役徒巨億經費稱是樹而復潰卒無能名風俗耉老以為蛟螭靈怪蟠窟固護使人不見其績也公躬自省視循理辨物心禱且計輔之至誠遂用堅緻於戲蘄城楚舊封也疆淮蔡邇申息地當隘束實生攻奪若嚮時敵者驅鐵衣出穆陵襲我無備搖脛而至即江淮之南吾見其波動矣然俾夫大藩倚一作椅其固屬郡抱其勢千里士庶髙枕而卧寇不致疑作敢萌彎弓捻矢之意者新城之謂也繇是大君聽民問威聲聞望以公有文武上才秉心塞淵可以防方隅可以握貴權故拔自倅牧雄居盛府山川幢蓋皆舊物也寄任之重敻無其鄰夫賢為世出績因時逹微新城吾見公之力才事業其堙鬱不揚乎鯫生作頌頌以示後辭曰庚辰之嵗鶉首有彗人用五兵維彼蘄下壃及風馬實啓戎情在昔無虞蔑其闉闍埤堞頺傾我公作守恢拓荒舊乃新其城百堵言言四阿孱顔矗如雲平扼衡據㑹寇不敢過生人休戚維茲盛烈遭時而發鴻振芳名我有貞石不追不琢孰聞風聲是用作頌冀茲不朽與日月永明雜頌上馬寶頌並序梁文簡帝皇帝應百姓之心副四海之願復履玉衡還臨億兆天地交泰日月貞明至理惟新隆平方始遐邇一體中外禔福含生欣欣若耘耰之逢夏雨懷情坎坎譬草木之值春風帝王之道超邁開闢睿聖之功殫歷邃古軒羲不足鑿枘堯舜不足憲章至哉大哉無得而稱也五月丁酉朔絲竹㑹於德陽之堂一作殿於時日進內宫星次鶉首仲夏之晷稍極陽城之圭𬎼賔之鍾初應潁川之律縉雲旦卷南風晚扇惠氣入帷清隂周宇玉輿雲罕照日充庭羽林中權分階列校簮笏成行貂纓在席昭天之樂金石鏗鏘報地之禮威儀肅省詔以馬寶示羣臣太僕效官趣馬掌贊三令五申丞聫事舉八麗四圍給役相趨暉煜金鑣陸離寶勒天地無疆之德永星致逺之功鸞􅀈善鳴龍儀美稱沸毅權竒之威趨攄抑揚之態足轉驚電眼流含燭霧噴紛霏流沫飄灑數千為夀豈待原蠶之禁萬里一息不藉杜衡之草王良不能控其衡䇿伯樂不能辨其文機方知總轡崑岑周非善馭張樂大野夏有慙德豈止沉河用璧獨有緑文之稱盛德在木偏受蒼龍之名至於干將寶劍遙服書鄭之軍蓮花烏玉騰威大海之際况乎馬寶義實踰之方當夙沙自歸滑疑橋屈滕欵關入塞偃武修文去病無出師之勞充國罷議邉之略五律成珍九河如鏡臣謹按瑞應經彌勒成佛經中阿含經覽愚經並稱第三之馬者三千嵗華子云堯漢皆得馬者堯漢皆火德正斗南方乘德而至也豈非聖德汪濊皇風洋溢研機洞元備禮逹義是以天不愛道白馬嘶風王澤效祥朱鬛降祉比夫圎蹄方足躑躅在郊風嘯電奔聲疑遨處囿五彩依樹三雀登巢安髣佛於當今弗擬議於休應百辟卿士咸稱萬嵗伊臣不佞結慶雲霄親承詔㫖預觀寶瑞手舞足蹈贊揚不足宴禮斯畢退而作頌其辭曰帝廣運德欽明儀郊升道形聲德為軌仁作經璇璣正太階平割五禮和六英開四攝行八政轉輪皇飛行聖愍含識資惠命引蒼生歸法性菩提真般若淨七寶均萬邦寧逖惇史觀陳詩域中大唯聖期聞一作閒𤣥妙復孝慈解流澤隨因時刑已措績咸熙三農盛九榖滋萬祗恱八神怡律有節厯得天景星曜慶雲連珠為月醴為泉民何幸值皇年乾道應坤馬來度玉關升玉臺鏤錫煥鸞鑣回槃雲轉堞塵開千天駟百龍媒永伏皂掃騊駼秣瑶粟委芳芻九夷欵四表清氓胥樂輿頌興神雀頌并序許善心隋開皇十六年臣聞觀象則天乾元合其德觀法審地域大表其尊雨施雲行四時所以生殺川流嶽立萬物於是裁成出震乘離之君紀鳳司鳩一作紀扈司鳳之后玉錘玉斗而降金版金縢以傳並陶冶性靈含煦動植眇𤣥珠於赤水寂明鏡於靈臺一作乎虛堂莫不景福氤氲嘉貺雥集馳聲南薰越響雲韶粵我皇帝之君臨闡大方抗太極負鳳邸據龍圗不言行焉攝提建指不肅清焉喉鈴啓閉括地復夏截夏一作海是剪商就望禮其尊登降一作减或作咸昌其㑹綿區浹宇遐至邇安騰實飛聲直暢傍施無體之禮威儀布政之宫無聲之樂綴兆總章之觀上庠養老躬問百年下士字民心為百姓月棲日浴熱坂寒門吹鱗沒羽之荒赤蛇青馬之裔稽顙請𨽻削袵承風豈止呼韓北場逺頌一作俯勒狼居之岫熄慎南境近表不耐之城故使天不一作弗愛道地寧吝寶川嶽展異幽顯一作明效靈狎素游頳團膏漱醴半景青赤孽歷虧盈足足懷仁般般擾義祥祐之來若此升降之化如彼而登封盛典雲亭佇白檢之儀致治成功紫燎靡𤣥圭之告雖奉常定禮武騎草文天子抑而未行推而不有允恭克讓其在茲一作斯乎七十二君信蔑如也故神禽顯賁𤣥應時一作特昭白爵主鐵象之竒赤雀銜丹書之貴班固神爵之頌履武戴文曹植嘉雀之篇棲庭集牖未若于飛武帳來賀文㮰刷彩青蒲將翺赤罽玉几朝御取玩軒楯之間金門旦開兼留翬翟之鑒終古曠世未或前聞福召冥徴得之茲日嵗次上章律諧大吕𤣥枵㑹節𤣥英統時至尊未明求衣晨興于一作於含章之殿爰有瑞雀翺翔而下載行載止當扆寧而徐前來集來儀乘軒墀而顧步夫瑞者符也聖主之休徴雀者爵也聖人之大寶謹按考異記一作郵曰軒轅有黃爵赤頭立日傍占云土精之應又禮稽命徴云祭祀合宜則黃雀集昔漢集泰畤之殿魏立文昌之宫一見雍丘之祠三入東平一作平東之府並旁觀回矚事陋人微奚足稱之矣抑又聞之不刳胎剖卵則鸞鳳馴鳴不漉浸焚原則螭龍盤蜿是知陛下止殺故飛走宅心皇慈好生而潜浮一作浮潜育德臣靣奉綸綍垂示休祥預承嘉宴不勝藻躍李䖍僻處西土陸機少長東隅微臣慙於往賢逢時盛乎曩代輒竭庸瑣敢獻頌云太素式肇大德資生𤣥功不器道要無名質文鼎革沿習因成祥圗瑞史赫赫明明天祿大定於鑠我君武義乃武文教惟文橫塞宇宙旁凝射汾軒物重造堯風再薰煥發玉䇿昭彰帝道御地七神或作飛天飛天或作星五老山祇吐祕河靈孕寶黑羽升壇青麟伏皂丹烏流火白雉從風棲阿德邵鳴岐祚隆未如仙雀近賀王宫五靈何有百福攸同孔圗獻赤荀文表白節節竒音行行瑞迹化王黼扆銜環陛㦸上天之命明神所格綏應在旃伊臣頌焉永緝丹素方流管絃頌歌不足蹈舞而宣臣拜稽首億萬斯年文苑英華卷七百七十八
