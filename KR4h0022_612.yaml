body:
  text: 文苑英華卷六百十三宋李昉等編雜進奉此卷英華所編失年代先後今正之為晉陽公進玉律秤尺斗升表一首為并州長史張仁亶進九鼎銘表一首為僧履空進圖書古器物等表一首為蜀州刺史第八息進雲母粉表一首代崔大夫進銅燈樹表一首進佛像表一首進渾儀表一首為獨孤中丞天長節進鏡表一首進畫松竹圖表一首為信安王進冩聖容真圖表一首齊賔客進所賜馬表一首脩進繼天誕聖樂表一首進嶺南王館市舶使院圖表一首上禮食為絳州刺史孔禎等上獻食表一首為納言姚璹等上禮食表一首為定王上禮食表一首為魏王賀賊帥李畫滅死及新殿成上禮食表一首為建安郡王獻食表一首皇太子上食表一首為韋將軍請上禮食表一首雜進奉為晉陽公進玉律秤尺斗升表庾信臣某言臣聞三才既立君臣之道已陳六位時成禮樂之功斯正故以叶和日月測度隂陽恱豫兆人儀刑萬國者也伏惟皇帝應籙馭天披圖受命據太陽而懸象履文昌而建極白環表讓德之符𤣥珪告成功之瑞太階既平升中可習必當水建千年山稱萬嵗伏見勅㫖刋正音律平章厯象奏黃鐘而歌大吕變孤竹而舞雲門莫不逺取踈通聲從安樂四分既明三㣲且定是以聞鐘於洛浦即辨聲乖聽鐸於邯郸先知響韻二分二至行於司厯之官九變九成被於中和之職足以動天地感鬼神被風俗平寒暑豈直吟嘯谿谷囬翔鸞鳳而已哉是知零陵廟前徒㝷舜管始平城下空論周尺臣聞上製其禮下習其儀君定其法臣行其事謹造玉律一具并玊秤尺斗升合等始得成功至於分粟累黍量絲數籥實以仰稟聖規叅詳神思所冀節移隂管無勞河内之灰氣動陽鐘不待金門之竹而琬琰事輕般倕慮淺不足展乎成均增輝度量賫器奉表以聞為并州長史張仁亶進九鼎銘表武后吳少㣲臣聞鼎者夏后氏作羣牧貢金逺方圖物備諸山澤以禦魑魅厥後嗣子昬囬一作嗣徳昬亂鼎遷于商夏之寳也把不足徴殷既有之又患失之周徳休明神寳不墜百代可繼伏惟陛下光大而當之若乃崇貴之器金玉之鼎鎔首山發睢上列太廟序明堂克昭一作明非靈命以奉上帝非愚臣所敢議臣聞禮之興也始諸飲食故先王之制日舉九鼎蓋筠藥淳熬滌瀡一作澄膏餌御九州之美順四時之和臣所以征繕北金敢貢新鼎夫有器必有銘臣竊見九州攸同迺述九號夫永昌天中所以基皇周也長安及岐所以紀靈瑞也武興建都所以光帝閈也禮日觀禪雲亭所以美升中也少陽載青所以冀儲徳也東原底平所以廣封植也江都淮海所以肆朝宗也江陵作乂一作鎮所以制荆蠻也成都奥區所以遏珍貢也夫此九者誠不足揄衍鴻休昭振方統庶覩者美其所稱知有由作微臣朽老不達一有有慙二字歌頌慚作塵八命之寵章負中軍之重任匪躬厥獻伏表汗流其九鼎銘謹遣某官奉表以聞八字一作謹敢列上謹遣某官某奉鼎以聞為僧履空進圖書古器物等表閭丘均僧履空言履空幸沐國恩謬齒和衆雖居隣壤志尚幽古禮誦之餘每得披玩前件真迹書及圖書古物等積集既久衆推竒異豈下僧蒙鄙之資所得自畜如將服用必是保衛聖躬謹因括圖使臣某輙附進上表以聞塵黷旒扆伏增戰灼之至爲蜀州刺史第八息進雲母粉表武后前人臣某言伏按雲母者千二百玉石之精也七十二氣霧之英體華而光不為水毁不為火煆夫萬物之精者神氣所㑹未有不化神而能長久者也是以服食者則翺翔自任役使百靈臣肌性虚羸小嬰疾苦務求攝理驗討方書品丹石之名徴草木之氣前聖所録粗知其體即味消邪厲力輔神年類非難得之珍價無兼金之重觸疾則愈莫若兹物伏惟越古金輪聖神皇帝陛下福徳所符天祚攸久豈假上藥方固南山然一日萬幾或煩聖慮色力營衛一作微必有相資臣從西山野人得其良者其色多白乃是一作是名雲液臣不揆拙昩輙採古仙要方量事施藝剪棄粗類収聚輕英開㓗清之所逺淹穢之迹浸以茅露洮以東流曠日彌時然後功就果得光潤融爛質理研微試之柔膚隨手化滅皆云所見未始相侔臣意其精殊倘渉靈秘豈以凡妄所敢飡嘗謹詣朝堂敢冒死封進伏希陛下兼愛博物受其區區不以凡人忽棄神寳無任下情代崔大夫進銅燈樹表薛昇臣伏見兵戈以來紊亂法度小有權位即為僭奢殫物竭財務恣嗜欲故俗無亷恥政有侵漁自陛下蕩穢滌瑕躬儉節用漸清逺邇靡然從風夫以京邑翼翼四方取則故曰城中好髙髻四方髙一尺城中好廣眉四方且半額伏願陛下日慎一日使美化行乎萬邦夫先近以及逺自家而及國文王所以造周也臣竊以所造燈樹匠人計料用錢四萬貫道路運致又約一萬貫百姓辛苦將辦實難况揚州到上都三千餘里州縣所過人皆見之未審此物欲將何用若聖意别有所在即非愚臣合知或有因時設施使夷夏共觀愚臣竊謂有力者愛而效之侈心又萌何可復制非抑奢從儉敦本塞末之道也昔漢文罷露䑓之役晉武焚夏翟之裘豈徒惜一女之功愛十家之産焚而罷之蓋欲慎所好而使天下知所焚疑矣書之青史千載美談今陛下嚮明之理美事多矣宜更昭儉徳以示四方不軌不物明主所慎臣叨居重位師長百寮心有所疑敢不聞奏伏惟聖鑒裁擇臣某無任進佛像表張説臣某言去年行塞至朔州忍辱尼寺見有髙祖太宗造金像銀趺刻題尊號集作諱彼州士女屢覩佛光臣懇思聖心如在咫尺伏以皇帝事業逺存荒塞拯溺救焚身勤慮苦歸誠佛寳何神不據信知功遍區域澤周生人心憑神集作聖靈躬履危險故皇天眷命奄有邦家後嗣聖人欽承大寳當思積徳而興帝國系本艱難而成事業二句集作當思由積徳而興帝系本艱難而成王業先聖一心奉佛者蓋為百姓求福也陛下為繼文之主實創業之功再廓氛祲重安廟社垂統萬億同符祖宗夫惟興王必藉佐命咸有一徳克享天心書曰非天私我有商惟天佑于一徳非商求于下民惟民歸于一徳功臣同徳可不念哉物有小而感深事有㣲而効集作傳逺臣謹將金像隨表奉進謹言進渾儀表𤣥宗前人臣某言臣聞迎日授時莫先於厯象先天成務必歸於制作伏惟開元神武皇帝陛下建中立極緯武經文至徳難名神功不集作莫測於是定厯成嵗立象考天紹唐堯欽若之尊集作典一作文繼集作尊虞舜在璿之義上皇能事於斯備矣臣書院先奉勅造游儀以測七曜盈縮去年六月造畢進奏又承集作奉恩㫖更立渾儀臣等準勅令左衛率府長史梁令瓚檢校創造於是博考傳記舊有張衡陸績王蕃錢樂之等並造斯器雖渾體有象而不能運行事非經久旋即一作亦毁廢臣今按據典故鑄銅為儀圓以像天使得俯察上具列宿赤道周天度數注水激輪令其自轉集作運一日一夜天轉一周又别立二周輪絡在天外綴以日月令得運行每天轉一匝日行一度月行十三度十九分度之七凡二十九轉有餘而日月㑹三百六十五轉而行匝仍置水一作氷櫃以為地平令儀半在地上半在地下晦明朔望不差毫髮又立二木人於地平之上前置鐘皷以候辰刻每一刻則自然擊皷每一辰則自然撞鐘皆於櫃中各施輪軸鋦鍵交錯闗鏁相持轉運雖同而遲速各異周而復始循環不息隂陽不能逃其數分至集作度分不能隠其時究天地之回斡集作斡運極乾坤之變化斯皆上禀聖謨集作模傍獲神助臣等愚思非所能及望録付史館宣示百寮使知告成之功逈超前古無任懃懇之極謹隨表奉進以聞臣某誠惶誠懼為獨孤中丞天長節進鏡表肅宗獨孤及臣某言臣仕於太上聖皇之朝早蒙寵秩位至剖竹任兼干城摩頂至踵皆聖皇所賜陛下又不以臣菲薄加臣憲威殊私降臨榮命重疊臣頃雖罄誠竭節竟未能夷凶靖難思所以仰酬天造緬邈無階以去年五月五日於淮陽鑄上件鏡欲獻之行在為聖皇壽冀申犬馬之意臣子之心屬豺狼方熾道路艱阻懇願空積上達無由今宸極正而乾坤貞觀氛霧収而日月開朗當白露戒序之秋是黄河澄清之日臣幸逢佳節願展微誠謹遣某官某乙進上􅟢二鏡一獻聖皇一獻陛下輙以愚悃上黷聖聰集作上續聖壽臣伏以聖皇執契垂化有如金玉之式陛下時乗馭天騁飛龍於國歩臣故以金龍餙鏡以表聖徳伏冀纎塵莫翳朗鑒長懸挂仙䑓而如日之昇含品物而無私不照而臣之肝膽亦庶呈於此輕凟宸扆戰越交深臣無任之至進畫松竹圖表徳宗四月十九日生于邵臣某言伏以今月十九日累聖儲休之日陛下降誕之辰聲教所加舟車所及固將駿奔大慶鼔舞升平瞻北極而效誠匝南山而獻壽臣輙率鄙思繪松竹圖一靣并陳贊頌願躋聖祚伏貢闕庭臣某中謝伏惟皇帝陛下嗣聖居業統天握圖奄宅九圍光承丕搆𤣥元敷道湏有發明髙祖造邦義資纂大故得上天垂慶八葉騰輝誕聖神於正陽統清明於𤣥昊既徴下武將付中興非徒履迹之祥實叶繞樞之異况臣特受榮遇思効微誠撰獻珍竒則珪璋有可玷之理馳奉章䟽則文字非陳贄之儀故臣常於禮歎松栢有心之􅐾詢於詩仰松栢一作竹植一作恒茂之興則如佳其不朽豈疑著前聞載徴纎微爰有叢竹節雖謝於頴㧞操亦迫於嵗寒故臣輙繪長松佐之脩竹辨其位則松可君於竹掄其材則卑可奉於尊然松竹木中特最為有壽衆材槎卉而翠蓋方成暮霰飄零而繁枝益茂輙所賦形像外移色毫端敢借堅貞之姿願増天地之壽况輕雲瑞氣必呈證聖之祥𤣥鶴仙禽每舉冲天之翼臣所以縁義祝壽出幽入微不散氤氲之容同成俯仰之勢徴畫圖之㫖誠慙創物求比興之義庶近愛君不勝區區之極其松竹圖并頌敢冒陳獻無任戰灼之至為信安王進冩聖容真圖表吕温臣某言臣一昨扈從西狩岐陽時以有年事因農隙整六軍之衆備六田之禮戎卒是訓威武載揚屬草淺獸肥霜清氣殺詔虞人以即鹿命荆州而起烏陛下親御弧矢紆駕林衡曾不合圍取其背者雖有逸羣之狡走險之挺而飛黄騁轡縈拂如組緑沉縱鏑宛轉若伏一作臣必命中於前皆應弦而絶倒其餘變熊不測神妙無方非臣罄言所能模狀既而備獻禽之禮虔薦寢之誠教人以孝自天作則此外郊獲畢賦懿親兼禁羽騎無犯宿麥是行也典禮斯備仁恩允洽三令惟肅七徳以宣魏武何階亦紀功於猛獸周文差擬將比義於飛熊臣忝藉宗枝幸陪鑾輅竊觀神武冠絶古今以為載之空言不若圖之繪事向所述聖今皆冩真雖天顔不違而丹青莫擬徒極愚思庶存萬一謹録上陳獻伏深戰汗請宣付史館齊賔客相公進所賜馬表徳宗權徳輿臣某言臣頃待罪中樞特蒙睿渥既切維鵜之刺又叨錫馬之榮憂在忝曠積成疾瘵聖慈全貸尚列師賓見矜集作驚福過之灾猶積喜中之懼况兹天驥輙自御閑實有代勞之功且期至逺之用特優賜與以寵宰司臣自改官即合進納而心力衰耗晦明纒綿筋骸自便惟在床袵視聽所知不過湯藥沉疴餘息有異常人平居故事皆所廢忘頃年愧懼已切於負乗今日稽留自疑於奪魄因縁尸素積累罪辜踈愚昩瞀隕越無地謹隨表奉進無任惶恐震懼之至臣某頓首頌首謹言貞元十九年閏二月二十三日脩進繼天誕聖樂表徳宗貞元十二年王䖍休臣某言臣聞於師夫君子為能知樂是故審音以知樂審樂以知政治唐諱道備矣故清明廣大終始周旋與天地同其和與四時合其序豈止於鐘皷管磬云乎哉伏惟皇帝陛下繼明御極治定功成則星辰之度以授人時酌昊穹之心以為政本五行隨其用捨九有荷其陶鈞鳥獸魚鼈無不咸若伏見𤣥宗時天長節著于甲令每於是日海縣歡娱稱萬壽之無疆樂一人之有慶故能追堯接舜邁禹踰湯自周以一作已後不復議矣臣竊以陛下降誕之辰未有維新之曲雖太和已布於六氣而大樂未宣於八音毋乃臣子之分或有所闕愚臣不揆頑昩思所祖述每私歌竊忭忘寢與食矣唐書作貪久矣適遇有知音者與臣論及樂章探微賾奥窮理盡情臣乃遣造繼天誕聖樂一曲大抵以宫為調表五音之奉君也以土為徳知五運之居中也凡二十五遍法二十四氣而足成一氣唐書作一嵗也每遍十六拍象八元八凱登庸於朝也所冀與雲門咸池永傳於律吕空桑孤竹同薦於宫懸不雜惉懘之聲先協唐書作長作中和之頌唐書作之樂可使九域之人頓忘於肉味四夷之俗皆播於薰風與唐惟休終古盡善臣不勝懇欵其所造曲譜謹同封進進嶺南王館市舶使院圖表臣某言臣聞無翼而飛者聲也無根而固者情也無方而富者生也聖恩以臣謹聲教固物情嚴為防禁以尊其生由是梯山航海嵗來中國鎮安殊俗皆稟睿圖伏以承前雖有命使之名而無責成之實但拱手監臨大略而已素無簿書不恒其所自臣親承聖㫖革剗前弊御府珍貢歸臣有司則郡國之外職臣所理敢回天造出臣匪躬近得海陽舊館前臨廣江大檻飛軒髙明式叙崇其棟宇辨其名物陸海珍藏狥公忘私俾其戴天捧日見聖人一家之為貴窮祥極瑞知天子萬方之司存今年波斯古邏本國二舶順風而至亦云諸蕃君長逺慕望風寳舶薦臻倍於恒數臣奉宣皇化臨而存之除供進備物之外並任蕃商列肆而市交通夷夏富庶于人公私之間一無所闕車徒相望城府洞開於是人人自為家給户足而不知其然况北户之孱顔南冥之睢盱國異俗泰而安宅生振忘歸而樂業百寳叢貨罔黷於人心群瑞効靈顧懐於天憲臣謬専任重啓䖏不遑供國之誠庶有恒制海門之外隠若敵國海門之内宣知一作和變風後述職於此者但資忠履信守而勿失不刋之典貽厥將來聖恩以軍府交代之際委臣在鎮不獲捧圖陳薦拜舞天庭無任感戀慙惶之至上禮食為絳州刺史孔禎等上獻食表武后李嶠臣禎等言臣聞式宴為歡易著需雲之象晞陽展敬詩有湛露之歌伏惟金輪聖神皇帝陛下功掩大千化髙明一憑五乘而馭羣品秉六度而𢎞萬機俯順人心仰膺佛記尊名大號與日月而齊光凱澤歡酺共雷雨而俱作舞詠溢於三界聲名殷乎四天臣等備守外藩幸欣入計瞻衢路而躑獨望闕庭而悚踴歡情未展空思側弁之娱聖造不貲仍賜合醵之禮三元告始萬品惟新陽進而君道戴昌景延而聖壽彌固具寮稱賀率土同欣願申在藻之心輙效獻芹之志謹上禮食五十轝具如别狀和殊九沸美異八珍有慙殷鼎之滋豈益堯厨之膳輕薦蔬菲追增悚怍臣禎等誠惶誠恐為納言姚璹等上禮食表李嶠臣某等言伏以壇場既畢文物惟新寰區被雷雨之恩宴樂動雲天之曲𤣥髻黄髪式舞遍於康衢車馬衣冠追賞窮於勝境瞻鳯闈而列鼎抗龜浦而開筵風光滿佳麗之城烟霧上神仙之閣傾罍倒斚盡百辟之歡娱伏檻憑軒延九霄之眺瞻五日開十旬之賞千齡逢萬嵗之期固以慶軼朝門一作聞忭深天造無任喜躍之甚謹上禮食若干轝不恥獻芹之陋方期在藻之歡旋願單菲追增悚怍為定王上禮食表前人臣某言伏惟陛下至徳動天深仁被物光輝格乎上下神化行乎中外故能使明祇叶贊景貺駢臻承靈命於九𤣥錫禎圖於萬祀髙秋在律重九御辰陳法駕而展皇儀升紫壇而奠蒼璧欽告類之典盡祗敬之容咸秩群神允釐百福然後玊鑾囬軫金鈸戒塗發雷雨之恩私展雲天之宴樂百寮簪笏承愷悌而沐沉潛四海氓黎欣復除而荷優貸瑶圖載永鼎命惟新忭舞同於十方歡娱邁於千古臣謬當維翰忝屬葭莩敢申慶躍之情願奉宴私之澤謹上禮食若干舉野人何識徒致誠於獻芹天奨曲成倘俯歡於在藻無任區區之至謹昩死奉表以聞臣誠歡誠喜頓首頓首謹言為魏王梁王賀賊帥李盡滅死及新殿成上禮食表前人臣承嗣等言伏見逆賊盡滅未誅先斃叛奚部落不守自降或貫盈而亡或懾懼而伏行從除殄不勝慶快臣承嗣等中賀臣聞違逆助順窮昊所以照臨振逺懐荒邦家所以底定蠢兹豺虺憬彼犬羊稱亂白山虔劉蒼海豈徒石砮楛矢式遏於天朝故亦桑弧鐡衣憑陵於邉朔陛下乃睠愚悖情深遵養聊用七旬之舞未加一作知非五戒之罰雖大聖之徳恒存於好生而冥祇之心有切於除害驅桃都之厲鬼剿檀石之妖魁不資舉網之勤而長鯨已曝無假合圍之費而封豕先屠有以知神道之難誣有以見天心之不逺元凶既覆餘孽旋殱畏威者䑕竄而離心懐惠者鴈行而革靣毳幙連路氊裘成市與夫姬得瑞頴期越裳於累年漢獲駢柯俟匈奴於後嵗若斯而已也方傾巢而盡落佇匣刄而藏鋒自非睿感潛通靈符叶贊豈能使天地假手幽顯同心及有秩之方歌屬斯干之肇獻上棟下宇儲百福而擁神休開陽闔隂積千祥而宜聖壽配南山而永固與北極而長尊仙聖所以安居黎元由其式忭臣等幸逢昌運叨延嘉奨喜遐陬之霧廓且覿歸牛欣大厦之天臨方同賀雀願奉需雲之慶思承湛露之歡無任區區之誠謹上禮食若干轝蘋羞何有希陳上帝之筵芻豢非珍遂同野人之獻旋顧單菲追増悚怍謹隨表進奉以聞臣承嗣等誠歡誠喜頓首頓首為建安郡王獻食表陳子昂臣某言謬籍葭莩叨榮圭社統戎出塞違鳯扆而逾年班師入朝拜鑾闈而有日䇿勲飲至頻承湛露之恩獻夀奉觴未伸行潦之薦所以白茅微藉願享於鈞䑓潢汙菲誠思奉於瑶水謹輙獻食一百轝伏知金鷄一作雄瑞鼎盈上帝之珍羞玉女行厨盡群仙之品味以兹菲薄有陋蘋蘩多慙在藻之歡竊希集作有獻芹之志所願皇慈俯納丹慊獲申天子萬年永慶南山之壽微臣百拜永一作長承北極之恩無任誠懇之至皇太子上食表崔融臣某言伏見臣妺太平公主妾李令月嘉辰降嬪公族詩人之作下嫁於諸侯易象之興中行於歸妺又臣銅樓再惕常荷䕃於中慈金屋相驚忽承恩於内輔周官典瑞傍稽聘女之儀晋朝加璽兼採納妃之制聖懐感慰皇澤霑濡願垂扶木之光俯遂甘芹之請謹上禮食若干轝如列尊師四學雖有謝於温文問豎三朝竊無違於視膳謹遣某奉表以聞為韋將軍請上禮食表前人臣某言臣聞坤徳承天所以曲成萬類隂靈配日所以兼燭四方故媯水佐虞塗山翼夏殷之興也有莘光其業姬之盛也太姒贊其功用能家道以正國風兹始伏惟陛下睿智神武文思聰明光復丕基惟新寳運􅊶混元而建極體造化而開階流形日用而不知含氣風從而自樂皇后坤維發祉軒宫正位黄雲不散白氣常流玉璽載耀椒塗以峻洛書疇能諭其懿河圖不足紀其靈外理克和内徳惟茂臣濫逢明聖忝當姻戚榮寵被於門庭光耀生於道路西京六秩在昔何優東國七家方今未重魚鱉咸若在品物而同歡鳥獸率舞顧㣲臣而倍躍臣聞飲食之禮聖賢所貴以奉君人以親宗一作九族敢因斯義輙罄單誠特望時降特恩聽臣上禮雖玉饔珍味固無假於獻芹而臣下微心實有同於傾藿瞻言忭踴伏佇矜遂無任悃欵踴躍之至謹奉表陳情以聞伏聽勅㫖此篇元誤編在六百七卷雜上請門今移入於此文苑英華卷六百十三
