body:
  text: 文苑英華卷六百二十四宋李昉等編雜諌論二諌農時出使表一首為河內王論功表一首論天官秋官及理匭使愆失表一首論災異表一首論則天不宜合葬乾陵表一首論李多祚充夾侍表一首論中宗皇帝請內朝西宫表一首論别宅婦女入宫表二首論太廟屋壞請修德表一首為從叔鴻臚少卿論旱請掩骼埋胔表一首諌拜陵寢早表一首河南府奏論驛馬表一首諌農時出使表髙宗劉思立臣思立言臣伏見河南河北旱儉勑遣御史中丞崔謐給事中劉景先分往一作道存問兼量事賑貸竊以水旱流行古今代有不敷示責一作眚亦以戒盈伏惟天皇德越堯湯恩隆父母才逢殊候即軫沖襟但謂聖人隔於九重不知皇心遍於四海所以分道出使量使優矜曲成賙給特加存問誠非愚暗所合名言然芻蕘之情尚有未逹敢獻狂直乞垂省覽何者麥序方秋蠶功未及一作畢三時之務萬姓所先敕使巡撫人皆悚忙忘其家業冀此天恩踴躍來一作參迎必難抑止集衆衆英華作其積聚非既廣妨廢亦多加以途程往還兼之晨夕停止一作滯設遣物疑去決不盡還况宣問須見衆人賑給須作文簿少處猶經兩月多處必更淹延都計所歷州縣煩擾不可勝紀又一使之下凡有一十六人并馱所須總乘一馬無驛之處須動公私簡弱取強非五十匹不可禁馬之所求覔甚難使人欲求必須預追簡擇雨後農要唐書作務特切常情暫廢須臾即虧嵗計每為一馬遂勞數家從此相乘恐更滋甚又刺史縣令委任不輕準勑即成合稱明旨用倉給户不足為難且令賑貸庶免飢乏若須出使褒貶請待秋後間時臣備位憲司不敢不奏云云一作皆舊唐書劉憲傳為河南王武懿宗論功表武后臣懿宗言伏奉某月日制書録臣等在軍微功將加勳封嘉命聿至寵靈載優伏對慙殞魂守顛越臣某中謝臣聞古者名將先士卒而後身故其功勸末世庸將窮人力以寵已故其政乖然則簞醪投河三軍告醉刓印在手萬夫以失與衆共功専以獨利成敗之紀興亡繼焉賞者國之大柄不可忽焉日者林胡搆孽敢亂邉陲陛下徴義兵誅不道天下士衆焱集星馳皆忘身憂國紓禍却難至於躬矢石血草莽冒難險歷寒溫氣騰青雲精貫白日誠亦勤矣雖則聖靈威逺逆虜自滅然士卒戮力亦盡其勞今大功未酬衆議猶在而臣等駑怯猥加先封臣不能折衝虜庭還師袵席今坐加第一一作茅土之賜以先將士之勤使鶡冠虎唐諱臣將何以勸今戰夫留滯於外府軍吏咨嗟於下寮臣等胡顔敢冒天造夫賞一勸百猶恐未孚利一沮萬其弊誰救爵命不可以招謗國章不可以假人伏願俯回天光照察軍禮請以臣前件勳封回授征戰之人及立功將士等上以明國之大賞下以知臣等謬功使人恱忘勞士感知死然後兵可訓勵士可誅屠此誠國之元經不可苟而利者臣等不勝區區悚迫之至論天官秋官及理匭愆失表武后徐有功臣有功言自陛下即位已來海內官舊唐書本傳作職員一定而天下選人漸多掌選之曹用舍不平補擬乖次應留即放應放翻留囑請公行顔面罔懼遂使囂謗滿路怨讟盈朝浸以為常殊無愧憚又往屬揚豫搆禍唐書作唐朝季年時多逆節鞫訊結斷刑獄至嚴革命而唐書作以來載祀遽積餘風未殄用法猶深今推鞫者猶行酷法不依律文妄稱異端虛立證據構為罪狀捨法用情格律昭然無心遵奉斷事則不依欵占不據條章狀表生情法外構理率心任意輕重自由天下稱寃莫不緣此陛下九重嚴祕萬機事總何得一一躬覽事事親詳近臣畏罪而不言大臣重祿而不奉遂令刻薄之吏弊法未悛士子朝臣屏氣纍息皆不自保恐墜網羅又陛下所令朝堂受表設匭投狀空有其名竟無其實並不能正直各自防間延引嵗時拖曵來去呌閽不逹撾鼓不聞抱恨銜恩吁嗟而已至誠所感和氣必傷豈不由受委任者不副天心是陛下務欲使申其寃是有司務在增重其枉塵垢聖德隱蔽宸聰者是臣等不勝死罪死罪臣今請考選官銓注不平致令在外怨讟者臣即察訪糾而彈之獲其曲狀望貶考奪祿以愧其心罪仍依法其刑獄推斷之官有行酷法妄加詰斷臣即按驗奏而劾之獲其枉狀請即付法斷罪亦凖前條奪祿貶考以慙其德其三司受表及理匭申寃使不速與奪致令擁滯唐書作塞有理不為申者亦望凖前彈奏貶考奪祿凡在百僚咸蒙委任君臣之際義在無猜寄托之隆無過考選今人監視全無付信徒為證見翻使有詞不知每事委之使臣得搖霜筆其監考選御史望請總停然臣昔處法司緣蒙擢用臣愚無以上答至造願以執法酬恩無縱詭隨不避強禦猛噬鷙擊是臣之分如天恩允臣所奏請降勑施行庶不越旬時亦可以除殘革弊刑措不用天下幸甚論災異表已見六百二十卷武后張説論則天不宜合葬乾陵表中宗嚴思善名撰以字行臣謹按天元房録葬法云尊者先葬卑者不合於後開入臣聞葬一無此三字則天太后卑於天皇大帝今欲開乾陵合葬即是以卑動尊事既不經恐不一作非安穩臣又聞乾陵宫一作闕新唐書作關其門以石關一作閉塞其石縫隙鑄鐵以固其中今若開陵必須鐫鑿以神明之道體尚幽玄今乃動衆加功誠恐多所驚黷又若别開門道以入玄宫即往者葬時神位先定今更改作為害益深又以修築乾陵之後國頻有難遂至則天太后權總萬機二十餘年其難始定今乃更加營作伏恐還有難生但合葬非古著在禮經緣情為用固無定凖一作無足依凖况今事有不安豈可復循斯制伏見漢時諸陵皇后多不合葬魏晉已降始有合者然以兩漢積年向餘四百魏晉之後祚皆不長雖受命應期有因天假然以循機享德亦在時文但陵墓所安必須一作資勝地後胤嗣續一作後之胤嗣用托靈根或有不安後嗣固一作亦難長享伏望依漢朝之故事改魏晉之頽綱於乾陵之傍更擇吉地取生墓之法别起一陵既得從葬之儀又成固本之業臣伏以合葬者緣人一作人緣私情不合者前循一作修故事若以神道有知幽途自得通會若以死者無知合之復有何益然而山川精氣上為星象若葬得其所則神安後昌若葬失其儀則神危後損所以先哲垂範且立一作之葬經欲使生人之道必安死者之神永一作必泰伏望少回天眷俯鑒一作覽臣言行古昔之明規制一作割私情之愛欲使社稷長享天下久安凡在懷生孰不慶幸一作皆舊唐書本傳諫李多祚充夾侍表中宗王覿見舊唐書李多祚傳臣覿言竊惟祔廟之禮在於尊祖奉先肅事之儀豈厭惟親與德伏見恩勑令安國相王與李多祚共唐書作參乘且多祚夷人有功於國適可加之寵爵豈宜逼奉至尊將唐書作侍帝弟以連衡與吾君而共輦誠恐萬方之人不允所望昔文帝引趙談參乘袁盎伏車前曰臣聞天子所共乘輿二字唐書作六尺輿者皆天下豪英今漢雖乏人陛下獨奈何與刀鋸之餘共載於是斥而下之多祚雖無趙談之纍亦非卿相之重不自循省無聞固讓豈國乏良輔更無其人史官所書將示於後何袁盎之強諌獨微臣之不及惟陛下詳擇焉諌中宗皇帝請內朝西宫表盧懷慎臣懷慎言臣聞書曰亶聰明作元后元后作民父母伏惟陛下敬順昊天為人父母人之所仰在於孝乎故曰夫孝者天之經地之義人之本也是陛下躬率此道為天下先每十日朝西宫式展親親之義故得萬國之歡心者實惟陛下孝理天下也臣竊不揆頗聞於師王者必深居而髙視用以表其嚴重也其將動未嘗不清道而後發升車而後引出有警入有蹕用備其周衛也今陛下再立乾坤重安社稷克定中興之業務𢎞大孝之端率禮因心臣何敢預然陛下臣之君父也夫為臣子者得不欲盡忠孝之事臣安敢讓也固知言出必死亦無所辭臣死罪死罪臣聞昔者漢祖受命五日一朝太公於櫟陽宫今日陛下豈不欲為比一作此乎臣度其事業與此有異夫漢祖起布衣登皇極子有天下尊歸於父母故行於此耳今陛下守支繼統嗣武開基奉三聖之休烈當千齡之寶命順天立極蓋曰其常不知何為更用此道逺自三五洎乎夏殷聖帝明王臣所覽見未有用此者陛下安所取則哉臣聞事不師古匪説攸聞禮煩則黷抑有其義况應天去提象才至二里餘騎不得成列車不得方軌於兹屢出假愚人萬有犯屬車之塵者陛下雖罪之何及縱使萬全亦非重慎之道也且唐之寶命繼在陛下雖欲自忽其若社稷何其若宗廟何頃三衛伏中路相失一作及字當時驚動聖聽臣等空知待死臣死罪死罪望陛下從今已後遵其內朝一則有暢於溫凊二則無煩於出入敬慎之道誰曰不然必以長至在辰元正布歷應天納祐行慶有期則願陛下備法駕周羽儀然後出朝亦天下大禮也居常之日竊惟陛下思之臣本書生叨榮執簡輒薦芻蕘之議願申犬馬之誠特乞天恩察其愚懇無任悾欵之至謹詣閣奉表以聞論别宅婦女入宫表張廷圭開元中臣廷圭言昨奉進止别宅婦女皆遣入宫勑至黃門臣已執奏停寢數日宰相重宣陛下以人廢言未蒙允納密旨增峻制獄益嚴事相牽聮重有追掩竊聞輿議足以傷心或母子生離或男女永隔寃酷之至有甚於死方春德澤萬物昭蘇豈獨斯人不霑雨露一傷和氣恐沮聖恩况所進宫人皆非婉麗陛下容易將入下人迫脅而行不作無益害有益臣必知其然矣又陛下至明之君當比德於上皇豈校迹於中古况春秋鼎盛慶祚無窮樹德將逮於千年臣尚謂少行事儻乖於一物臣竊有疑且臣位在黃門年髙白首常恐寵祿過厚顛墜微躬何所覬覦輒有干議伏以遭逢昌運沐浴湛恩如不披心竭誠無乃希旨苟免六合雖廣取容何地不勝愚懇之至謹重昧死奏聞伏望曲流天鑒少垂矜采第二表前人臣廷圭言檢貞觀永徽故事婦人犯私並無入宫之例凖天授二年有勑京師神都犯姦先決杖六十配入掖庭至太極修格已從除削唯決六十仍依法科罪今不依貞觀永徽典故又捨太極憲章而依天授之法臣愚竊一作將謂未便且法令者與天下共之者也君不可失之於上臣不可違之於下如或失之於上則無以御下矣如或違之於下則無以事上矣所以古之聖人垂範作式縣諸象魏銘於景鍾昭示萬方期於畫一由是法有定禁時無濫刑化致雍和俗登仁壽鸞鳳巢閣麒麟在郊膏露浮甘卿雲布彩方今聖道包於天地仁恩洽於品物明無不燭聰無不聽時康俗泰逺肅邇安豈可升平之朝而行未令之罰臣之愚鄙伏深疑懼無任懇迫之極謹昧死重連正勑奏聞特乞天恩曲垂矜鑒得令别宅婦女各凖法處分率土蒼生幸甚如允臣所請仍望便停令勑內宣降進止論太廟屋壞請修德表玄宗褚無量開元五年臣聞尚書洪範傳云王者陰盛陽微則先祖見其變昔成湯遇旱引事自責云女謁盛耶今則太廟毁壞即是先祖示變後宫衆多即是陰盛陽微伏請後宫之中非所幸者親享之後簡出少應其變則上答先祖必災異自消昔殷帝武丁祭成湯有飛雉升鼎耳而雊武丁憂懼問其臣祖乙祖乙曰王勿憂先修政事武丁乃修政行德殷道復興昔大戊之時桑榖二木共生於朝一暮大拱此不恭之罪也大戊修德桑榖自清昔周武王之時周公輔政二叔流言秋熟未獲天大雷電以風禾則盡偃大木斯拔邦人大恐王乃與大夫盡出郊天乃返風禾則盡起嵗則大熟昔宋景公之時熒惑守心景公問之司星子韋對曰禍在君可移於相公曰宰相所與共理國也曰移於人公曰人死誰為君曰移於嵗公曰乏食人必死子韋曰天處髙而聽卑君有至德之言三必三賞熒惑果徙三舍至漢之文景並睿明天子也亦災異繼起修德行政其名益光愚又竊聞左右近臣妄奏云國家太廟其材木是苻堅時舊殿臣按括地志云隋文帝創立新都移宇文廟故殿改造此廟元非苻堅及宇文氏所作也况國家隋文帝貴為天子富有四海豈復遞取苻堅之舊殿以充太廟者乎此則言偽而辨殊不足採納伏願精選舉用賢良節奢靡輕賦稅繼絶代慎刑罰納諌諍察諂諛夫賢良任用則能興化臻理矣節奢靡則不恣耳目之欲清靜之風行矣輕賦稅則下人樂以奉上不困窮矣繼絶代則崇德報功有勸沮矣慎刑罰則寬猛相濟不濫罰矣納諌諍則日聞已過人竭忠矣察諂諛則君子道長無邪僻矣非禮勿動順時行令夫如是則人和人和則氣和氣和則天地和矣天地和會災異自消伏願陛下虔奉神心兢謹天誡幸甚為從叔鴻臚少卿論旱請掩骼埋胔表玄宗蕭頴士臣言臣聞事君之義有犯無隱故心苟所至願必上聞所以罄露塵涓裨助山海則匪躬之節著致主之情竭矣臣實無庸志業非逺幸逢明聖纍忝驅䇿位登四品官亞九卿叨竊已多答效無紀常願刳肝碎骨仰報於天此臣景行前修悃欵終夕不能已也臣某中謝臣聞諸傳曰天災流行國家代有雖升平之代秉哲之君禮義不愆刑罰斯中而適當其際化理不回故商武受命之賢王周宣中興之令主桑林未禱金石以銷禮疑其大統則陰陽之數義實固然推其至理則時事之端政乖取此誠細有所遺驗諸方志昭然可辨雖日月薄蝕無損於明而宵旰兢栗未喻其道良足惜也伏惟開元聖文神武皇帝陛下道格上蒼功深下濟叶兩儀之髙厚等四序之運行告成岱宗而靈饗聿應展禮農籍而嘉禾實頴蒸蒸過於虞后翼翼邁於周文故玄祖契會昌之符蒼生踐仁壽之域臣竊觀圖諜所記生靈以來巍巍赫赫未有如聖朝之盛者也而水旱小數時或愆和一旬不雨仍延聖慮臣竊以殷周之事考之斯可得而言矣臣聞道德經曰大軍之後必有凶年論語亦曰因之以師旅加之以飢饉蓋云曝骨中原感動和氣疵癘是作災害用生故強死之魂傳稱為鬼積尸之氣禮有驅除不徒言也臣竊觀成湯之受命也前有伐葛之役後有升陑之師凡七十二征而天下服故其詩曰武王載斾有虔秉鉞如火烈烈莫我敢遏宣王之中興也亦南征淮甸北伐太原外攘夷狄復文武之土故其詩曰六月棲棲戎車既飭四牡騤騤載是常服則二主用師而定也明矣未聞有岐昌掩骼之政秦穆封尸之令旱暵之故不亦宜乎不然則月令孟春之命一作令掩骼埋胔周禮蠟人職掌凡國胔禁埋而置楬焉豈虛設也臣聞之五材並用誰能去兵小則施諸市朝大則陳諸原野我國家櫜鞬理定十紀于斯陛下重之以懷柔申之以靈武三韓左袵夷於郡縣六狄解辨願為臣妾書詩所載未之聞也而西戎醜類尚興芃野之師東胡噍餘猶警栁城之戍陛下爰整其旅弔厥匪人雖有征無戰不聞遺鏃之矢而恃險與馬猶積杭輪之斃故血膏草莽骸聚丘山史不絶書士有餘勇以為常矣臣又聞之帝王者則天而法地長物以子人如天之無不幬如地之無不載故天無遺人雖古先哲王內諸華而外夷狄亦云要服者貢荒服者王聲教所加合于一揆所以伐其叛而柔其服重其生而哀其死詩曰普天之下莫非王土書曰丕冒海隅莫不率俾此之謂也頃春之季恆陽小愆宿麥未登首種不入賴陛下憂勞日昃以萬物為心天且不違應如影響閏月云暮時雨滂流我田我私既浹祁祁之澤彼黍彼稷方成油油之稼此天慶陛下至誠一作矣人感陛下深矣而密雲未灑忽復二旬時屬炎蒸土仍滲漉元元之望又加于兹昔燕祠寡婦延闔境之潤漢察寃囚致隨車之雨一作澤今陛下當措刑之代濟必封之氓吏不苛刻人無怨訴愆亢之由有異於彼愚臣不敏一有輒字竊有所見謂分宜譴制使往校邊庭凡戰陳之處骸骨所在即將埋掩仍施厲禁則儀刑萬國仁洽九泉存亡均雨露之恩華夷同日月之照庶膏液與聖私齊運旱苖將朽骨俱榮不任云云諌拜陵寢早表劉彤臣彤言陛下明發不寐展敬山陵朝拜之時必候清曉此誠孝思罔極求諸幽明之𢎞義也將士發軫路猶曛黑紅塵四合白刃交馳往來不相知左右不相識假令有敗車逸馬朽木枯株則變在不虞患生所忽不可輕也愚臣淺識實以逼迫伏願慮及細微以安宗社拜陵之日必候朝光則凡百歡心普天幸甚河南府奏論驛馬表臣某言今月一日中使魏光勝至伏奉手詔當管每驛更加添鞍馬不得停留往來使命者伏以所到郵傳以備急宣由臣術無方致令馬畜有闕忽奉恩詔憂惶失圖臣某中謝臣伏以當府重務無過驛馬臣到官之日惟此是圖雖收市百端死損相繼蓋緣府界濶逺山谷重深自春多雨馬蹄又軟驅馳石路斃踣實多比於陜虢已西及汝鄭等處道路稍異日夜倍憂又西自永寧東自汜水南到臨汝北逹河陽正驛都管一十六所常加填備動以久闕此皆以臣無政術上軫聖心局地蹐天詩局天不蹐地不足所處臣今分遣官吏稍加價錢兼令外求冀免有闕臣某中謝又盧會昌到日臣謹依詔旨差人領送上都無任懇迫惶懼之至文苑英華卷六百二十四
