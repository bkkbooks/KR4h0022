body:
  text: 文苑英華卷七百九十四宋李昉等編傳宋清傳一首種樹郭橐駝一首童區寄傳一首梓人傳一首李赤傳一首長恨歌一首宋清傳柳宗元宋清長安西部藥市人也居善藥有自山澤來者必歸宋清氏清優主之長安醫工得清藥輔其方輒易讎咸譽清疾病疕瘍者五字蜀本作信能療病故病者亦皆樂就清求藥冀速已清皆樂然響應雖不持錢者皆與善藥積劵如山未嘗詣取直或不識遙與劵清不為辭嵗終度不能報輒焚劵終不復言市人以其異皆笑之曰清蚩妄人也或者集無者字曰清其有道者歟清聞之曰清逐利以活妻子耳非有道也然謂我蚩妄者亦謬清居藥四十年所焚劵者百數十人或至大官或連數州受俸博其餽遺清者相屬於户雖不能立報而以賒死者千百不害清之為富也清之取利逺逺故大豈若小市人哉一不得直則怫然怒冉則罵而仇耳彼之為利不亦翦翦乎吾見蚩之有在也清誠以是得大利又不為妄執其道不廢卒以富求者益衆其應益廣或斥棄沉廢親與交視之落然者清不以怠遇其人必與善藥如故一旦復柄用益厚報清其逺取利皆類此吾觀今之交乎人者炎而附寒而棄鮮有能類清之為者世之言徒曰市道交嗚呼清市人也今之交者有能望報如清之逺者乎幸而庶幾則天下之窮困廢辱得不死亡者衆矣市道交豈可少耶或曰非市道人也栁先生曰清居市不為市之道然而居朝廷居官府居庠孰鄉黨以士大夫自名者反爭為之不已悲夫然則清非獨異於市人也種樹郭槖駝傳郭槖駝不知始文粹有自字何名病僂隆文粹作癃然伏行有類槖駝者故鄉人號之駝駝聞之曰甚善名我固當因捨其名亦自謂槖駝云其鄉曰豐樂鄉在長安西駝業種樹凡長安豪家富人為觀游及賣果者皆爭迎取飬視駝所種樹或移徙無不活且碩荗蚤實以蕃他植者雖窺視俲慕莫能如集本文粹作加也有問之對曰槖駝非能使木之夀且孶也以能順木之天以致其性焉耳凡植木之性其本欲舒其培欲平其土欲故其築欲密既然已勿動勿慮去不復顧其蒔也若子其置也若棄則其天者全而其性得矣故吾不害其長而已非有能碩而茂之也文粹有吾字不抑耗其實而已非能蚤而蕃之也他植者則不然根拳而土易其培之也若不過焉則不及集有焉字茍有能反是者則又愛之太殷憂之太勤旦視而暮撫已去而復顧甚者爪其膚以驗其生枯搖其本以觀其踈密而木之性日以離矣雖曰愛之其實害之雖曰憂之其實讎之故不我若也吾又何能為矣哉問者曰以子之道移之官理可乎駝曰我知種樹而已理非吾業也然吾居鄉見長人者好煩其令若甚憐焉而卒以禍旦暮吏來而呼曰官命促爾耕朂爾植督爾穫蚤繅而絲二本作緒蚤織而縷字而幼孩遂而雞豚鳴鼓而聚之擊木而召之吾小人輟文粹作具飱饔以勞吏者且不得文粹有日字暇又何以蕃吾生而安吾性耶故病且怠若是則與吾業者其亦有類乎問者曰嘻不亦善夫吾問飬樹得飬人術文粹作而得飬人仍有故字傳其事以為官戒也文粹無也字童區寄傳栁先生曰越人少恩生男女必貨視之自毁齒已上父兄鬻賣以覬其利不足則盜取他室束縳鉗梏之至有鬚鬛者力不勝皆屈為僮當道相賊殺以為俗幸得壯大則縳取么弱者漢官因為己利茍得僮恣所為不問以是越中户口滋耗少得自脫唯童區寄以十一嵗勝斯亦奇矣桂部從事杜周士為余言之童寄者栁州蕘牧兒也行牧且蕘二豪賊劫持反接布囊其口去逾四十里之虛所賣之南越中謂野市為虛為集作日寄為兒啼恐栗為兒恆狀賊易之對飲酒醉一人去為市一人卧植刃道上童微伺其睡以縳背刃力上下集作下上得絶因取刃殺之逃未及逺市者還得童大駭將殺僮遽曰為兩郎僮孰若為一郎僮耶彼不我恩也郎誠見完與恩無所不可市者良久計曰與其殺是僮孰若賣之與其賣而分孰若吾得專焉幸而殺彼甚善即藏其尸持僮抵主人所愈束縳牢甚夜半童自轉以縳即爐火燒絶之雖瘡手勿憚復取刃殺是者因大號一虛皆驚童曰我區氏兒也不當為僮賊二人得我我幸皆殺之矣願以聞於官虛吏白州州白大府大府召視而兒幼願耳刺史顔證竒之留為小吏不肯與衣裳吏護還之鄉鄉之行劫縳者側目莫敢過其門皆曰是兒少秦武陽二嵗而計殺二豪豈可近耶梓人傳前人裴封叔之弟在光德里有梓人款其門願傭隟宇而處焉所職尋引規矩繩墨家不居礱文粹作磨斫之器問其能曰吾善度材視棟宇之制高深圎方短長之宜吾指使而群工役焉捨我衆莫能就一宇故食于官府吾授祿三倍作於私家吾收其直太半焉他日入其室其床闕足而不能理曰將求他工余甚笑之謂其無能而貪祿嗜貨者其後京兆尹將飾官署余往過焉委群材㑹衆工或執斧斤或執刀鋸皆圜立嚮之梓人左持引右執杖而中處焉量棟宇之任視木之能舉揮其杖曰斧彼執斧者奔而右顧而指曰鋸彼執鋸者趨而左俄而斤者斫刀者削皆視其色俟其言莫敢自斷者其不勝任者怒而退之亦莫敢愠焉畫宮於堵盈尺而曲盡其制計其毫釐而構大厦無進退焉既成書於上棟曰某年某月某日某建則其姓字也凡執用之功不在列余圜視大駭然後知其術之工大矣繼而嘆曰彼將捨其手藝專其心智而能知體要者歟吾聞勞心者役人勞力者役於人彼其勞心者歟能者用而智者謀彼其智者歟是足為佐天子相天下法矣物莫近乎此也彼為天下者本於人其執役者為徒𨽻為鄉師里胥其上為下士又其上為中士為上士又其上為大夫為卿為公離而為六職判而為百役外薄四海有方伯連帥郡有守邑有宰皆有佐政其下有文粹有力者二字胥吏及其下皆有嗇夫版尹以就役焉猶衆工之各有執伎以食力也彼佐天子相天下者舉而加焉指而使焉條其綱紀而盈縮焉齊其法制而整頓焉猶梓人之有規矩繩墨以定制也擇天下之士使稱其職居天下之人使安其業視都知野視野知國視國知天下其逺邇細大可手據其圖而䆒焉猶梓人畫宫於堵而績文粹作繪于成也能者進而由之使無所德不能者退而休之亦莫敢愠不衒能不矜名不親小勞不侵衆官日與天下之英才討論其大經猶梓人之善運衆工而不伐藝也夫然後相道得而萬國理矣相道既得萬國既理天下舉首而望曰吾相之功也後之人循迹而慕曰彼相之才也士或談殷周之理者曰伊傳周召其百執事之勞勤而不得紀焉猶梓人自名其功而執用者不列也大哉相乎通是道者所謂相而已矣其不知體要者反此以恪勤為公以簿書為尊衒能矜名親小勞侵衆官竊取六職百役之事聽聽於府庭而遺其大者逺者焉所謂不通是道者也猶梓人而不知繩墨之曲直規矩之方圓尋引之短長姑奪衆工之斧斤刀鋸以佐其藝又不能備其工以至敗績用而無所成也不亦謬歟或曰彼主為室者儻或發其私智牽制梓人之慮奪其世守而道謀是用雖不能成功豈其罪耶亦在任之而已余曰不然夫繩墨誠陳規矩誠設高者不可抑而下也狹者不可張而廣也由我則固不由我則圮彼將樂去固而就圮也則卷其術默其智悠爾而去不屈吾道是誠良梓人耳其或嗜其貨利忍而不能捨也喪其制量屈而不能守也棟橈屋壞則曰非我罪也可乎哉余謂梓人之道類於相故書而藏之梓人蓋古之審曲靣勢者今謂之都料匠云余所遇者楊氏潜其名李赤傳前人李赤江湖浪人也嘗曰吾善為歌詩類李白故自號曰李赤遊宣州州人館之其友與俱遊者有姻焉間纍日乃從之館赤方與婦人言其友戲之赤曰是媒我也吾將娶乎是友大駭曰足下妻固無恙太夫人在堂安得有是豈狂易病惑耶取絳雪餌之赤不肯文粹有服字有間婦人至又與赤言即取巾經其脰赤兩手助之舌盡出其友號而救之婦人解其巾走去赤怒文粹有其友二字曰汝無道吾將從我妻汝何為者赤乃就牗間為書輾而圖封之又為書博封之訖如厠久其友從之見赤軒厠抱甕詭笑而厠視勢且下入乃倒曵得之又大怒曰吾已升堂靣吾妻吾妻之容世固無有堂宇之飾宏大富麗椒蘭之氣油然而起顧視汝之世猶溷厠也而吾妻之居與帝居鈞天清都無以異若何苦余至此哉然後其友知赤之所遭乃厠鬼也聚僕謀曰亟去是厠遂行宿三十里夜赤又如厠久從之且復入矣持出洗其汚衆環之以至旦去抵他縣縣之吏方宴赤拜揖跪起無異者酒行友未及言已飲文粹作飲已而顧赤則已去矣走從之赤入厠舉其床捍文粹作杵門門堅不可入其友呌且言之衆發墻以入赤之靣陷不潔者半矣又出洗之縣之吏更召巫師善呪術者守赤赤自若也夜半守者怠皆睡及覺更呼而求之見其足於厠外赤死久矣獨得尸歸其家取其所為書讀之與其母妻訣其言辭猶人也柳先生曰李赤之傳不誣矣是其病心而為是耶抑固是厠鬼耶赤之名聞江湖間其始為士無以異於人也一惑於怪而所為若是乃反以世為溷溷為帝居清都其屬意明白今世皆知笑赤之惑也及至是非取與向背决不為赤者幾何人耶反修而身無以欲利好惡遷其神而不返則幸耳又何暇赤之笑哉長恨歌傳陳鴻開元中泰階平四海無事𤣥宗在位嵗久倦于旰食宵衣政無大小始委於右丞相苐深居遊宴以聲色自娛先是元獻皇后武淑妃皆有寵相次即世宫中雖良家子千數無可恱目者上心忽忽不樂時每嵗十月駕幸華清宫內外命婦熠耀景從浴日餘波賜以湯沐春風靈液淡蕩其間上心油然若有所遇顧文粹作顧遇左右前後粉色如土詔髙力士潜搜外宫得𢎞農楊𤣥琰女于壽邸既笄矣鬢髮膩理纎穠中度舉止間冶如漢武帝李夫人别疏湯泉詔賜澡瑩既出水體弱力微若不任羅綺光彩煥發轉動照人上甚恱進見之日奏霓裳羽衣曲以導之定情之夕授金叉鈿合以固之又命戴步搖垂金鐺明年冊為貴妃半后服用繇是冶其容敏其詞婉孌萬態以中上意上益嬖焉時省風九州泥金五嶽驪山雪夜上陽春朝與上行同輦居同室宴專席寢專房雖有三夫人九嬪二十七世婦八十一御妻暨後宫才人樂府妓女使天子無顧盻意自是六宫無復進幸者非徒殊艷尤態致是蓋才智明慧善巧便佞先意希㫖有不可形容者叔父昆弟川文粹作仲皆列位清貴爵為通侯姊妹封國夫人富埓王宫車服邸第與大長公主侔矣而恩澤勢力則又過之出入禁門不問京師長吏為之側目故當時謡詠有云生女勿悲酸生男勿喜歡又曰男不封侯女作妃看女却為門上楣其人心羡慕如此天寶末兄國忠盜丞相位愚弄國柄及安祿山引兵嚮闕以討楊氏為詞潼關不守翠華南幸出咸陽道次馬嵬亭六軍徘徊持㦸不進從官郎吏伏上馬前請誅朝錯以謝天下國忠奉氂纓盤水死於道周左右之意未快上問之當時敢言者請以貴妃塞天下怨上知不免而不忍見其死反袂掩靣使牽之而去倉皇展轉竟就死於尺組之下既而𤣥宗狩成都肅宗受禪靈武明年大赦改元大駕還都尊𤣥宗為太上皇就養南宫自南宫遷于西內時移事去樂盡悲來每至春之日冬之夜池蓮夏開宫槐秋落梨園弟子玉琯發音聞霓裳羽衣一聲則天顔不怡左右歔欷三載一意其念不衰求之夢魂杳不能得適有道士自蜀來知上皇心念楊妃如是自言有李少君之術𤣥宗大喜命致其神方士乃竭其術以索之不至又能遊神馭氣出天界沒地府以求之不見又旁求四虛上下東極天川文粹作大海跨蓬壺見最髙仙山上多樓闕西廂下有洞户東嚮闔其門署曰玉妃太真院方士抽簮叩扉有雙鬟童女出應其門方士造次未及言而雙鬟復入俄有碧衣侍女乂至詰其所從方士因稱唐天子使者且致其命碧衣云玉妃方寢請少待之于時雲海沉沉洞天日曉川文作晚瓊户重闔悄然無聲方士屏息斂足拱手門下久之而碧衣延入且曰玉妃出見一人冠金蓮披紫綃珮紅玉曵鳯舄左右侍者七八人揖方士問皇帝安否次問天寶十四載已還事言訖憫默指碧衣取金叉鈿合各折其半授使者曰為我謝太上皇謹獻是物尋舊好也方士受辭與信將行色有不足玉妃固徵其意復前跪致詞請當時一事不為他人聞者驗於太上皇不然恐鈿合金叉負新垣平之詐也玉妃茫然退立若有所思徐而言曰昔天寶十載侍輦避暑於驪山宫秋七月牽牛織女相見之夕秦人風俗是夜張錦繡陳飲食樹瓜華焚香于庭號為乞巧宫掖間尤尚之時夜始半休侍衛於東西廂獨侍上上憑肩而立因仰天感牛女事密相誓心願世世為夫婦言畢執手各嗚咽此獨君王知之耳因自悲曰由此一念又不得居此復墮下界且結後緣或為天或為人决冉相見好合如舊因言太上皇亦不久人間幸惟自安無自苦耳使者還奏太上皇皇心震悼日日不豫其年夏四月南宫宴駕元和元年冬十二月太原白樂天自校書郎尉于盩厔鴻與琅邪王質夫家于是邑暇日相携遊仙遊寺話及此事相與感歎質夫舉酒於樂天前曰夫希代之事非遇出世之才潤色之則與時消沒不聞于世樂天深於詩多於情者也試為歌之如何樂天因為長恨歌意者不但感其事亦欲懲尤物窒亂階垂於將來者也歌既成使鴻傳焉世所不聞者豫非開元遺民不得知世所知者有𤣥宗本紀在今但傳長恨歌云爾此篇又見麗情集及京本大曲頗有異同並録于後位開元中六符炳靈四海無波禮樂同人神和天子在嵗久倦乎旰食始委國政于右丞相端拱深居儲思國色先是元獻皇后武惠妃皆有寵相次夢謝宫侍無可意者上心忽忽焉不自樂時嵗十月駕幸驪山之華清宫浴于溫泉內外命婦熠耀景從浴日餘波賜以湯浴靈液不凍玉樹早芳春色淡蕩思生其間上心油然恍若有遇顧宫女三千粉光如土使搜諸外宫得𢎞農楊氏女既笄矣緑雲生鬢白雪凝膚渥飾光華纎穠有度舉止間冶如漢武帝李夫人上見之明日詔浴華清池清瀾三尺中洗明玉蓮開水上鸞舞鑑中既出水嬌多力微不勝羅綺春正月上心始悅自是天子不早朝后夫人不得侍寢時省風九州泥金五嶽驪山雪夜上陽春朝行同輦止同宴妖其容巧其詞歌舞談笑婉孌便佞以中上心故以為上宫春色四時在目天寶中後宫良家女萬數使天子無顧盼意叔父昆弟皆為通侯女弟女兄富埓王室車服制度爵邑邸第與大長公主侔矣恩澤勢力則又過之出入禁門不問京師長吏為之側目天寶末兄國忠盜丞相位竊㺯國柄羯胡亂燕二京連陷翠華南幸駕出都西門百餘里六師徘徊擁㦸不行從官郎吏伏上馬前請誅錯以謝之國忠奉氂纓盤水死於道周左右之意未快當時敢言者請以貴妃塞天下之怒上慘容怛心不忍見其死反袂掩靣使牽之而去拜於上前回眸血下墜金鈿翠羽於地上自收之嗚呼蕙心紈質天王之愛不得已而死於尺組之下叔向毋云甚美必甚惡李延年歌曰傾國復傾城此之謂也既而𤣥宗狩成都肅宗受命靈武粵明年大赦改元大駕還都駐六龍於馬嵬道中君臣相顧日月無光不翼日父子堯舜天下大和太上皇就飬南宫宫槐夏花梧桐秋雨春日遲遲兮恨深冬夜長長兮怨急自死之日齊之月莫不感皇容悼宸衷每朱樓月曉渌池氷散梨園弟子玉琯一聲聞霓裳羽衣曲則天顔不怡侍兒掩泣三載一意其念不衰自是南宫無歌舞之思求諸夢而精魂不來求諸神而致誠莫敢成都方士能乘氣而遊上清感皇心追念楊貴妃不已乃上大羅天入地府目眩心搖求之不見遂駕琅輿張雲蓋浮碧落東下海中三山遂入蓬萊宮中金殿西廂有洞户闔其門署曰玉真大妃院扣門久之有青衣玉童出方士傳漢天子命既入瓊扉重闔悄然無聲方士息氣重足拱手門下海上風微洞天日暖乃見仙女數人相隨出户延客至玉堂堂上褰九華悵有一人氷雪姿芙蓉冠露綃帔􅌂然如在姑射山前揖方士傳漢天子命言未終退立慘然憶一念之心復墮下界因泣下使青衣小童取金叉一股鈿合一扇奉太上皇茍心如金堅如鈿上為天人下為世人重相見時好合如舊方士受其信將行色有不足玉妃固徵其意復前跪致詞曰請付當時一事不聞於人者驗於漢天子畏金叉鈿合負新垣平之詐也仙子斂容低眉含羞而言曰昔天寶六年侍輦避暑于驪山宫七月牽牛織女相見之夕秦人風俗是夜張錦繡繒綺樹瓜花陳飲食焚香于庭謂之乞巧三拜畢縷針於月紝線于裳夜方半歇侍衛於東西廂獨侍於帝馮肩而立相與盟心誓曰世世為夫婦誓畢執手各嗚咽此獨君王知之方士還長安奏於太上皇上皇甚感自悲殆不勝情嘻女德無極者也死生大别者也故聖人節其欲制其情防人之亂者也生感其志死溺其情又如之何元和年冬十二月大原白居易尉于盩厔子與琅邪王質夫家仙遊谷因暇日携手入山質夫於道中語及於是白樂天深於恩者也有出世之才以為往事多情而感人也深故為長恨詞以歌之使鴻傳焉世所隱者鴻非史官不知所知者有𤣥宗內傳今在豫所據王質夫說之爾文苑英華卷七百九十四
