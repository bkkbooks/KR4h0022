  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0022_WYG_549-1a, image: WYG1338/WYG1338-0108c.png}
body:
  text: 文苑英華卷五百五十宋李昉等編雙關門上十二道不帥僰寄軍獻二毛判一道借罐打破佩刀刺人判一道行盪甕破奴死棄水判二道夾臾合三所知哭寢判一道選擇卒史刑罰疑赦判一道莱田徴稅閒人執事判一道醮子於阼醮子於宫判一道賜告養病父在䘮母判一道漆室染瘡緋衣版授判一道戰勝銘功火災貯水判一道毒藥供醫登髙臨宫判一道不帥僰寄判國子監稱胄子不帥教將棘寄之省讓其侵冒刑章賔疑作寘之於理監固論不已軍獻二毛判又軍旋凱獻俘毛有二者執法止而劾之軍司云㧞距投石者對苖晉卿文以經邦武以禦冦開石渠而設教整金鼓以宣威爰施上下之庠式奉孤虛之術語兹國序相彼軍容槐市立談一作談經未展先王之禮桞營作法但見將軍之令摳衣不聞守道擐甲已見伐功靡好成麟之名且許貪狼之意入室雖無皷篋出塞終有解鞍旣虧來學之能當令誘進未識出師之律誰爲否臧縱暴虎憑河猶其三省豈㧞距投石方擒二毛夫子之道未行齊侯之失斯在自可因其雩詠令爾志之各言豈得承彼凱歌遂責人之不法投諸僰寄稍均束濕之嚴劾以干城恐挫横行之氣矜乎愚戾何異宰予勸此苦辛冝哀去病握蘭稱過正合清明執簡彈違稍乖深識欲存踈網寜失不經借罐打破判村人借罐人家罐未出門戸打破未離夲處佩刀刺人判又有人持佩刀傷人縣以爲用刄州以爲非仰正判對王絃九野太清兆人承慶鑿井而飲方閒射鮒之泉持刃以雄仍均佩犢之日澄瀾可汲思抱甕而無階銛刄將揮提刜鐘而可擬故廼旁求假噐甫當於銅瓶何輕用傷人有類於鉛筑衡門未出遽覩虧全踈網難容俄聞寘罰訟端斯起異共敝而無憾刑柄終疑遂殊條而靡决慎非投鼠破則宜陪法在鷞鳩傷固難逭比盗之訴不亦厚顔用刄之科誠非次骨文漸陸海晷落三晡空有薦於芻詞諒輕塵於藻鏡行盪甕破判甲負甕行被乙盪倒甕破索陪乙不伏奴死棄水判又丙奴死棄水中人告之對吕因埏埴成器盖資虛受之功役使爲臣同禀最靈之德他人毁棄緡鏹之直合酬營魄銷淪埋瘞之義無隔甲行負甕雖有類於戴盆丙畜家童情有虧於物議方漢隂之抱汲初未忘機等蜀郡之裁書唯資力使旣而途遘卒遇瓦解無全命廹力殫舟藏共逺不忘情於毁甑乙合償其錐刀方念舊於敝帷丙須施其薪轊已虧讓行之羙更章速朽之尤折其片言勒陪半價辭名丹籍委骨滄流死埋應切生情寔爽旣違掩骼之典宜從束矢之科同前惟甲與丙殊途異致或行因負甕頗類漢隂之賔或家有役僮不讓江陵之樹旣而甕被盪倒奴則云殂鑿坯無返於在甄丹籍忽辭於白日原其情理覈以根由責之以陪未盡其義棄之於水何太不仁但法貴從寛事或通誤必也康莊廣陌甲負乙棄矜其輕肥故此行突將徴其價尚或未懲如其狭路稠人風昬日暮邂逅而損知欲何傷若取全陪恐乖設律至如畜生之罵猶慮其慙靦犬馬之微不棄其帷盖藏諸廣桞之内託義彌深塟以江魚之腹在情焉取旣爲人告不可無辜請施懲罰輕科以符捨事闕意夾臾合三判勅造夾臾少府合三而成䂓不九科罪所知哭寢判又太史令緒所知亡哭於寢門之外人告違禮對蔣勵已武有七德戎械攸先禮有五經䘮紀爲重少府秦卿命爵海稅孔殷太史吳將䟽苗家聲允廸天有成命式裁弦木之䂓人之云亡來展生芻之弔雖圓鑿方枘恒必由之而同波異瀾區以别矣何者弧矢之利張皇國威俯企之儀撙節人序理宜器因古式自取妙於烏號禮合前聞固無譏於鼠刺昔宋公研慮妙盡踰山齊婦衘哀深辭在野一作弔深辭野何得輕其琱葺命不審於絲言忽彼朋從慟無依於繐帳遂使規殊宛轉未全明月之輝交䘮親仁遽異成風之質且天子䟽制佇九合以成䂓友生不幸拊百身而奚贖魚膠象弭已爽今儀白馬素車全殊昔契造虧夾臾豈獻春材哀傃寢門徒悲宿草眷兹有失請依漢相之科推彼無儀深懵鄒人之識或恐䂓聞異制制因義而隨時禮有異文文緣情而僶俛自須見可而進未必同年擇善而行寜俟終日選擇卒史判有司選擇卒史以文學掌故備員有比百石以上誦多者先求之不得訟如功令刑罰疑赦判又甲刑罰之疑俱赦有司并刑不上備省科之云適輕下服諸罰有權對政以經邦揆務刑以禁暴去邪先王論於股肱大易明其噬嗑故賢能必佐小大以情立綱紀於天官作䂓模於秋典其來尚矣難可忽諸才有所通或徴諸管庫法有明象乃著自星辰所以掌故備員擇先文而後學刑法俱赦執有權而適輕盖晁錯惟勤昔聞其任吕刑髙議已盡其能興訟者何秩旣下於百石折一作所中者理條不紊於三千必也口無擇言身無擇行誦先聖之典誥有夫子之文章自合昇之司徒而曰俊士建功於當代垂裕於後昆未能鳴鶴聞天而乃嚇鴟從事誠宜改革徒以盈庭息乃訟端寢乎功令如有倫有要不僭不忒定國之慶溢髙門蕭何之約在關中雖并制一作刑不上亦片言可折省之可罰甲也有詞法貴從寛難明與罪莱田徴稅判莱田舊不應稅州縣令有徴納閒人執事判又客户閒人請移執事對國家分出輶車董諸田户歛一作致我唐典藝夫周舊一作官别農郊以沃瘠貫流庸於版圖何疑於莱田之征而失於閒人之職豈徘徊中曲候一作俟周郎之顧將疑後素招子貢疑作夏之詞然乃疆名旣訓嗇業須分上下宜繋井丘有菑而畬均其易嵗自門及野化疑作比以同人若未給於棠隂或恐隨於蓬轉惡夫外䑓徴稅尚起異門客户請移方狥常職且禮有恒歛豈宜據於故一作畆人改執事何必越於鄉寘加於刑便以愛羊廢禮立案爲限知其爲虵畫足必也政𢎞通變人急遷移稅錢或致於所收州縣難辭於爲擾事未重詰愚或痛一作病諸而執簡書刑使不若凶年人散省其謂何理在甄詳方可寘定醮子於阼判得甲醮子於阼素積以戒而尊有禁醮子於宫判又醮子於宫𤣥端以戒而姆加丙或告其非禮云古之道對晁良真始乎冠婚是惟逹禮貽之訓誡用肅令儀今昔或違沿革斯别始弁髦而便棄實表成人初結䄜而遂行或諧嘉偶甲以將雛襲慶元服就加乙以鳴鳯告祥束薪言徃尊奠於禁未虧寧敬之直姆加其丙方昭有行之誨𤣥端素積雅叶禮經甲阼乙宫信於師古或者之告理實無從賜告養病判得甲爲郡守賜告養病出界歸家法司科奉制不敬之罪訴云予告得歸賜告亦合乙父在䘮母立凶門判又乙父在䘮母立凶門或告一家不合二門訴云禮旣虞而作主今未有主故以重當主一作輕對尚理漢閣官儀揚眉可見魯門䘮紀拊膺何言觸甲前由竹符持手稽乙今迹桐杖摧心專城無時堊室云入輀車尚動落畫弩於尊前桮棬猶存飄繐帷於舍下芝泥有制則五馬歸來桞翣無因則九鶵相失周人已殁合殷禮之前虞漳濵未痊罷淮陽之獨臥稱賜則元非奏請出自宸𠂻言主則今者始為乃關䘮後病不堪理河内無借㓂之談門或以施淹中絶問䘮之禮哀欲從重法貴從輕旣無不敬之刑恕此訴云之罪三削藁疑札十捫蓬心恨流落之多年辱清通之此問愚所無盡謂惬事宜漆室染瘡判逢故人引入漆室遂患漆瘡訴云料理緋衣版授判又丙版授刺史著緋𫀆村正云不合對甲以芝蘭同味早託葵歌丙以蒲桞侵年方忻艾壽煙火相接昔是往來雷雨或覃即承恩造鶉居䳱疑作鶩飲共申東户之遊鶴髪鷄皮載照西山之景旣無猜於杵臼遂有奉於絲綸攜手入門引故人於漆室披襟就服僭常例於緋衣乙殊聶政之容相㸔不識丙方龎統之秩即事何慙頭面有瘡自均無過耳目不審豈假論辜拊其訴端堪取笑於周客詳其告狀欲何罪於堯封染患自是晦明在法寧知老耄探情未虧於通恕據律不犯於正條便寘嚴霜慮傷非罪乙與村正咸釋爲宜戰勝銘功判得小侯戰勝作彛噐銘林鍾軍正訟言妨時云示子孫火災貯水判又巴東每嵗多火災亷使無術禁止唯令鑿池積水人戸稱勞對潘待福理國之宜有時用戰爲政之要莫先利人先王以禁暴詰姦良使以移風易俗訓兵習武熊羆之士卒在和積習生常卭僰之火災嵗有衘枚被練必狥死而輕生飛焰浮煙或焦頭而爛額小侯以出車受賑始希分閫之威亷使以建節乘軺方展褰帷之惠功成戰勝知彼竭而我盈令行禁止用防微而慮逺林鍾有作同季武之克齊瓘斚無施類國僑之相鄭軍正有訟均夫臧仲之非人户稱勞昧彼亷公之化京觀不築楚功旣存積塗而防宋災亦免因人之功不可藏示之道何施利物之惠爲多無術之談或爽備諸前史焉敢費詞毒藥供醫判甲聚毒藥以供醫事有死傷者造焉十失四乙告違法登髙臨宫判又丙登髙臨宫法司斷徒一年半丙訴云令所對魏牧人生百年飲食過而生疾帝䑓三襲趨拜乖而則刑故良醫之門固多病者而望苑之地胡可窺焉甲則業謝醫工丙乃行同惡少雖有求於毒藥失此疕痬乃無狀而登髙俯其宫闕彼非上藥疾者無瘳此昧古人行不由徑况驗虵盃之影輙欲蠲痾而識龍樓之尊方能起敬醫未三代得無耻之登而四臨過亦甚矣徴周禮而已失宜其息言按吕刑而故違合從減坐則使有疕之者不俗疑而自除無賴之徒伏軾而知禮文苑英華卷五百五十
