body:
  text: 文苑英華卷一百八十八宋李昉等編省試九州府試附花發上林六首曲江亭望慈恩寺杏園花發四首金谷園花發懷古三首芙蓉出水二首華林園早梅一首潘安仁戴星看河陽花發一首宫池産瑞蓮一首小苑春望宫池栁色十首御溝新栁六首原隰荑緑栁一首御園芳草一首龍池春草三首方士進恆春草一首禮闈階前春草生一首春草凝露一首春草碧色二首生芻一束二首花發上林獨孤授上苑韶容早芳菲正吐花無言向春日間笑任年華潤色籠輕靄晴光艷晚霞影連千戶竹香散萬人家幸繞樓臺近仍懷雨露賖願君垂採摘不使落風沙同前周渭灼灼花凝雪春來發上林向風初散蘂垂葉欲成隂人過香隨逺煙晴色自深淨時空結霧踈處未藏禽菶茸何年植間關幾日吟一枝如可冀不負折芳心同前竇常上苑曉沉沉花枝亂綴隂色浮雙闕近春入九門深向暖風初扇餘寒雪尚侵艷回秦女目愁處越人心繞繞時縈蝶關關乍引禽寧知幽谷羽一舉欲依林同前王表上苑春何早繁花已滿林笑迎明主仗香拂美人簮地接樓臺近天垂雨露深晴光來戲蝶夕影動棲禽欲託凌雲勢先開捧日心當知桃李樹從此必成隂同前王儲東陸和風至先開上苑花穠枝藏宿鳥香蘂拂行車散白憐晴日舒紅愛晚霞桃間留御馬梅處入胡笳城郭連增媚樓臺映轉華豈同幽谷草春至發猶賖同前失名花發三陽盛香飄五柞深素暉雲積苑紅彩繡張林落水隨魚戲搖風映鳥吟瓊樓出高艷玉輦駐濃隂亂蝶枝開影繁蜂蘂上音鮮芳盈禁籞布澤荷天心曲江亭望慈恩寺杏園花發李君何春晴憑水軒仙杏發南園開蘂風初曉浮香景欲暄光華臨御陌色相對空門野雪遙添淨山煙近借繁地間分禁一作鹿苑景勝類桃源况值新晴日芳枝度彩鴛同前周宏亮江亭間望處逺近見秦源古寺遲春景新花發杏園蕚中輕蘂密枝上素姿繁拂雨雲初起含風雪欲翻容輝明十地香氣遍千門願莫隨桃李芳菲不為言同前曹著渚亭臨淨域􅑀望一開軒晚日分初地東風發杏園異香飄九陌麗色映千門照灼瑶華散葳𬎼玉露繁未教遊妓折乍聽早鶯喧誰復爭桃李含芳自不言同前陳翥曲池晴望好近接梵王家十畝開金地千林發杏花映雲猶誤雪照日欲成霞紫陌傳香逺紅泉落影斜園中春尚早亭上路非賖芳景堪遊處其如惜物華金谷園花發懷古王質寂寥金谷澗花發舊時園人事空懷古煙霞此獨存管絃非上客歌舞少王孫繁蘂風驚散輕紅鳥乍翻山川終不改桃李自無言今日經塵路凄涼詎可論同前張公乂今日春風至花開石氏園未全紅艷折半與素光翻點綴踈林遍微明古徑繁窺臨鶯欲語寂寞李無言谷變迷鋪錦臺餘認樹萱川流人事共一作近千載竟誰論同前失名春風生梓澤遲景映花林欲問當時事因傷此日心繁華人已殁桃李意何深澗咽歌聲在雲歸蓋影沉地形同萬古笑價失千金遺迹應無限芳菲不可尋芙蓉出水陳至菡蓞迎秋吐夭搖映水濵劔芒開寶匣峯影寫蒲津下照參差荇高辭苒弱蘋自當巢翠甲非止戲頳鱗莫以時先後而言色故新芳香正堪玩誰報涉江人同前賈謨的皪舒芳艷紅姿映緑蘋搖風開細浪出沼媚清晨翻影初迎日流香暗襲人獨披千葉淺不競百花春魚戲參差動龜遊次第新涉江如可採從此免迷津華林園早梅鄭述誠曉日東樓路林端見早梅獨凌寒氣發不逐衆花開素彩風前艷韶光雪後催蘂香霑一作繁香紫陌枝亞拂青苔止渴曽為用和羹舊有才含情欲攀折瞻望幾徘徊潘安仁戴星看河陽花發吕敞行春潘令至勤恤戴星光為政宵忘寢臨人俗冀康曉花迎徑發新蘂滿城香秀色霑輕露鮮輝麗早陽津橋見來往空霧拂衣裳桃李今無數從茲願比方宫池産瑞蓮帖經日試王貞白雨露及萬物嘉祥有瑞蓮香飄雞樹近榮占鳯池先聖日臨雙麗恩波照並妍願同指佞草生向帝堯前小苑春望宫池栁色張昔小苑春初至皇衢日更清遙分萬條栁回出九重城隱映龍池潤參差鳯闕明影冝宫雪曙色帶禁煙晴深淺殘陽變髙低曉吹輕年光正堪折欲寄一枝榮同前黎逢上宫新栁變小苑暮天晴始見和煙密遙憐拂水輕色乘陽氣重隂助御樓清不厭隨風嫋仍宜向日明客中愁一作客愁觀美景池上仰光榮漸到依依處思聞出谷鶯同前丁位小苑宜春望宫池栁色輕低昻含曉景縈轉帶新晴似蓋芳初合如絲蔭漸成依依連水暗嫋嫋出牆明雖以陽和發能令旅思生他時花滿路從此接遷鶯同前元友直栁色新池遍春光御苑晴葉依青閣密條向碧流傾路暗隂初重波搖影轉清風從垂處度煙就望中生斷續遊蜂聚飄颻戲蝶輕怡然變芳節願及一枝榮同前楊系勝遊從小苑宫栁望春晴拂地青絲嫩縈風緑帶輕光含煙色逺影透水文清玉笛吟何得金閨畫豈成皇風吹欲斷聖日映逾明願駐高枝上還同出谷鶯同前楊凌上苑門遊早東風栁色輕儲胥遙掩映池水隔微明春至條偏弱寒餘葉未成和煙變濃淡轉日異隂晴不獨芳菲好還因雨露榮行人望攀折逺翠暮愁生同前崔績帝京春氣早御栁已先榮嫩葉隨風散浮光向日明悠揚生别意斷續引芳聲積翠連馳道飄花出禁城柔條依水弱逺色帶煙輕南望龍池畔斜光照晚晴同前裴達勝遊經小苑間望上春城御路韶光發宫池栁色輕乍濃含雨潤微淡帶雲一作煙晴羃歷殘煙斂搖揚落照明幾條垂廣殿數樹影高旌獨有風塵客思同雨露榮同前張季略韶光歸漢苑栁色發春城半見離宫出才分逺水明青蔥當淑景隱映媚新晴積翠煙初合微黃葉未生迎春看尚嫩照日見先榮儻得辭幽谷高枝寄一名同前沈回今來遊上苑春染栁條輕濯濯方含色依依若有情分行臨曲沼先發媚重城拂水枝偏弱搖風絲已生變黃隨淑景吐翠逐新晴佇立徒延首徘徊欲寄誠御溝新栁賈稜御苑陽和早章溝栁色新託根偏近日布葉乍迎春秀質方含翠清隂欲庇人輕煙度斜景多露滴行塵裊裊堪離贈依依獨望頻王孫如可賞攀折在芳辰同前陳羽宛宛如絲栁含黃一望新未成溝上暗且向日邊春嫋娜方遮水低迷欲醉人託空芳鬱鬱逐溜影鱗鱗弄色滋宵露垂枝染夕塵夾堤連太液還似映天津同前歐陽詹東風韶景至垂栁御溝新媚作千門秀連為一道春柔荑生女指嫩葉長龍鱗舞絮回青岸輕煙拂緑蘋王孫初命賞佳客幾集作欲傷神芳意能集作堪相贈一枝先逺人同前馮宿夾道天渠逺垂絲御栁新千條宜向日萬户共迎春輕翠含煙發微音逐吹頻靜看思渡口回望憶江濵裊裊分遊騎依依駐旅人陽和如可及攀折在茲辰同前李觀集無御溝回廣陌芳栁對行人翠色枝枝滿年光樹樹新畏逢攀折客愁見别離辰近映章臺騎遙分禁苑春嫩隂初覆水高影漸離塵莫入羌人笛還令淚濕巾同前劉遵古韶光先禁栁幾處覆溝新映水疑分翠含煙欲占春悠悠遲日曉裊裊好風頻吐節茸猶嫩通條澤稍均逺和瑶草色暗拂玉樓塵願假鶱飛便歸棲及此辰原隰荑緑栁溫庭筠集無迥野韶光早晴川栁滿一作映栁堤拂塵生嫩緑披雪見柔荑碧玉芽猶短黃金縷未齊腰支弄寒吹眉意入春閨預恐狂夫折迎牽逸客迷新鶯將出谷應借一枝棲御園芳草陸贄集無隂隂御園裏瑶草日光長靃靡含煙霧依稀帶夕陽雨餘荑更密風暖蕙初香擁妓緣馳道乘輿入建章濕煙搖不散細影亂無行恆恐韶光晚何人辨早芳龍池春草陳翊一作詡青春光鳯苑細草遍龍池曲渚交蘋葉回塘惹栁枝因風初苒苒覆岸欲離離色帶金堤靜隂連玉樹移日光浮靃靡波影動參差豈比生幽逺芳馨衆不知同前宋迪鳯闕韶光遍龍池草色勻煙波全讓緑堤栁不爭新翻葉迎紅日飄香借白蘋幽姿偏占暮芳意欲留春已勝生金埒長思藉玉輪翠華如見幸正好及兹辰同前萬侯造暖積龍池緑晴連御苑春迎風莖未偃裛露色猶新苒苒分階砌離離雜荇蘋細叢依逺渚踈影落輕綸遲引縈花蝶偏宜拾翠人那憐獻賦者惆悵惜茲辰方士進恆春草梁鍠東吳有靈草生彼剡溪傍既亂莓苔色仍連菡蓞香掇之稱逺士持以奉明王北闕顔彌駐南山壽更長金膏從騁妙石髓莫矜良儻使霑涓滴還遊不死方禮闈階前春草生失名河畔雖同色南宫淑景先微開曵履處常對講經前得地風塵隔依林雨露偏已逢霜候改初寄日華妍影與叢蘭雜榮將衆卉連哲人如不剃生意在芳年春草凝露張友正蒼蒼芳草色含露對青春已賴陽和長仍慙潤澤頻日臨殘未滴風度欲成津蕙葉垂偏重蘭叢洗轉新將行愁裛徑欲采畏濡身獨愛池塘畔清華逺襲人春草碧色殷文圭細草含愁碧芊綿南浦濵萋萋如恨别苒苒共傷春踈雨煙華潤斜陽細彩勻花黏繁鬭錦人藉軟勝茵淺映宫池水輕遮輦路塵杜回如可結誓作報恩身同前王轂習習東風扇萋萋草色新淺深千里碧髙下一時春嫩葉舒煙際微香動水濵金塘明夕照輦路惹芳塵造化功何廣陽和力自均今當發生日瀝懇祝良辰生芻一束于結比玉人應重為芻物自輕向風傾弱葉裛露示纎莖蒨練宜春景芊綿對雨情每慙蘋藻用多謝茞蘭榮孺子才雖逺公孫策未行咨詢一作詢謀如不棄終冀及微生同前鄭孺華孫宏期射䇿長倩贈生芻至潔心將比忘憂道不孤芝蘭方入室蕭艾莫同途馥馥香猶在青青色更殊芳寧九春歇薰豈十年無葑菲如堪採山苖自可逾文苑英華卷一百八十八
