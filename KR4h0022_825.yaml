body:
  text: 文苑英華卷八百二十六宋李昉等編宴遊四亭下永州法華寺新作西亭記一首零陵三亭記一首東亭記一首燕喜亭記一首枝江縣南亭記一首荇溪新亭記一首連山燕喜亭後記一首郢州孟亭記一首通玄子栖賔亭記一首化洽亭記一首烏程縣修東亭記一首永州法華寺新作西亭記栁宗元法華寺居永州地最高有僧曰覺照照居寺西廡下廡之外有大竹數萬又其外山形下絶然而薪蒸篠簜蒙雜擁蔽吾意伐而除之必將有見焉照謂余曰是其下有陂池芙蕖申以湘水之流衆山之會果去是其見逺矣遂命僕人持刀斧群而剪焉叢莽下頽萬類皆出曠焉茫焉天為之益高地為之加闢丘陵山谷之峻江湖池澤之大咸若有增而廣之者夫其地之竒必以遺乎後不可曠也余時謫為州司馬官外乎常員而心得無事乃取官之祿秩以為其亭其髙且廣蓋方丈者二焉或異照之居於斯而不蚤為是也余謂昔之上人者不起宴坐足以觀於空色之實而逰乎物之終始其照也逾寂其覺也逾有然則嚮之礙之者為果礙也集作耶今之闢之者為果闢耶彼所謂覺而照者吾詎知其不由是道也豈若吾族之挈挈於通塞集有乎字非有無之方以自狹耶或曰然則宜書之乃書于石零陵三亭記邑之有觀逰或者以為非政是大不然夫氣煩則慮亂視壅則志滯君子必有遊息之物髙明之具使之清寧平夷恆若有餘然後理達而事成零陵縣東有山麓泉出石中沮洳汙塗群畜食焉墻藩以蔽之為縣者積十數人莫知發視河東薛存義以吏能聞荆楚間潭部舉之假以湘源令會零陵政龎賦擾民訟于牧推能濟弊來蒞兹邑遁逃復還愁痛笑歌逋租匿役期月辨理宿蠧藏姦披露首服民既卒稅相與歡歸道塗迎賀閭里門不施胥吏之席耳不聞鼛鼓之音雞豚糗醑得及宗族州牧尚焉旁邑倣焉然而未嘗以劇自撓山水鳥魚之樂淡然自若也乃發墻藩驅羣畜決疏沮洳搜剔山麓萬石如林積坳為池爰有嘉木美卉垂冰集作水叢峰玲瓏集作瓏􅌑蕭條清風自生翠煙自留不埴而遂魚樂廣間鳥慕靜深别孕巢穴沉浮嘯萃不畜而富伐木墜江流于邑門陶土以埴亦在署側人無勞力工得以利乃作三亭陟降晦明髙者冠山嶺下者俯清池更衣膳饔列置備具賔以燕好旅以館舍髙明遊息之道具於是邑由薛為首在昔禆諶謀野而獲宓子彈琴而理亂慮滯志無所容入則夫觀遊者果為政之具歟薛之志其果出於是歟及其弊也則以玩替政以荒去理使繼是者咸有薛之志則邑民之福其可既乎余愛其始而欲久其道乃撰其事以書于石薛拜手曰吾志也遂刻之栁州東亭記出州南譙門左行二十六步有棄地在道南南值江西際垂楊傳置東曰東館其內草木猥奧有崖谷傾亞缺圮豕得以為囿蛇得以為藪人莫能居至是始命披拂蠲疏樹以竹箭松柳桂檜柏杉易為堂亭梢為杠梁下上徊翔前出兩翼憑空拒江江化為湖衆山橫環嶛集作崦闊瀴灣當邑居之劇而忘乎人間斯亦竒矣乃取館之北宇右闢之以為夕室取傳置之東宇左闢之以為朝室又北闢之以為隂室作屋于北牖下以為陽室作斯亭于中以為中室朝室以夕居之夕室以朝居之中室日中而居之隂室以違溫風焉陽室以違凄風焉若無寒暑也則朝夕復其號既成作石于中室以告後之人庶無壞元和十二年九月三日栁宗元記燕喜亭記韓愈太原王𢎞中在連州與學佛之石本無之字人景常元惠石本并集本文粹作慧者石本無者字遊異日從二人者行於其居之後丘荒之間上髙而望得異處焉斬茅而嘉樹列發石而清泉激輦糞壤焚椔石本作燔椔翳却立而視之出者突然成丘陷者呀然成谷窪者為池而缺者為洞若有鬼神異物隂來相之自是𢎞中與二人者晨往而夕忘歸焉乃立屋以禦風雨寒暑既成石本與英華同止以禦為避集本作乃立屋以避風雨禦寒暑既成文粹作乃立屋以逰風雨既除寒暑既成愈請名之其丘曰俟石本作埃下同德之丘蔽於古而顯於今有俟時石本無時字集作德之道也其石谷曰受謙之谷瀑曰振鷺之瀑谷言德瀑言容也其土谷曰黃金之谷瀑曰秩秩之瀑谷言容瀑言德也洞曰寒居之洞志其入時也池曰君子之池虛以鍾其美盈以出其惡也泉之源曰天澤之泉出髙而施下也合而言石本作名之以屋曰燕喜之亭取詩所謂魯侯燕喜頌者石本文粹作者頌也於是州民之聞者二字石本文粹作老聞而相與觀焉曰吾州之山水名於石本無於字天下然而無與燕喜者比經營於其石本無其字側者相接也而莫宜石本文粹作直其地凡天作而地石本無地字藏之以遺其石本無其字人乎𢎞中自吏部集注有侍郎二字文粹有侍字西本有郎字貶秩而來次其道塗所經自藍田山石本無山字入商洛涉浙湍臨漢水升峴首以望方城出荆門下岷江過洞庭上湘水行衡山之下繇柳踰嶺猿狖所家魚龍所宫極幽遐瓌詭之觀宜其於山水飫聞而厭見也石本無也字集作之今其意乃石本集本並有若字不足傳曰知者樂水仁者樂山𢎞中之德與其所好可謂協矣智以謀之仁以居之吾知其去是而石本集本並無而字羽儀於天朝也不逺矣遂刻石以記枝江縣南亭記皇甫湜京兆韋庇為殿中侍御史河南府司録以直裁聽羣細人憎集作增搆之責椽南康移治枝江百為得宜一月遂清乃新南亭以適曠懷亭集無此字俯湖水枕大驛路地形髙低四望空平青莎白沙椌柞緣崕澀集作立芰圓葭誕漫朱華接翠裁集作栽緑繁葩春燭決湖穿竹渠鳴郁郁潛魚歷歷産鏡嬉碧淨鳥白赤洗翅窺喫纈霞縠煙旦夕新鮮冷唳暄啼怨柳情綿令君騁望逍遙湖上令君宴喜絃歌未已其寮集無此二字其民日致集作列欣遊成使纓嘆戀停車止征實為官業而費家貨不妨適我而能惠衆嗚呼是乃仁術也豈直目觀而已乎吾知韋君若是也多惜以尺刀效小割異日賦政千里總戎疆場吾知其辨終也亦若是而已矣乃為作記刻于兹石以圖永久荇溪新亭記李濆上臨御明年濆自洛陽令之太守詔牧滁民之三月得古溪郡之東北十里按地圖志在皇道山之右昔始皇途經是山因以名焉其下西永陽嶺迸溪一作流于荇溪此溪是也不濬川導廣泉演漾潭島影溢江漢甬中流袤平壇四浪滉朗雙𣲖委輸襟帶一川斜畍千畝無茭苗蘋萍之雜其渺練如也有廢亭占勝之地其狀依然也照晴而空水相鮮澄逺而霽山㵼色趣向竒狀不可窮竟訪郡之長老考亭之廢興皆曰三十甲子二周星而不知其所由來矣驗圖籍亦昧其始興之嵗也秋七月前河中監察汝南公况前武寧軍殿中隴西公拱州遷客司馬𢎞農公紹復咸以勝槩為宴之須乃卜于亭是咨是謀遂古創今僉曰惟目一作日又作允不越月他工具洎六旬有六日新亭就楹不茀茀昭其儉也甍不仡仡示無僭也內不重門曠其景也外不崇墉達其望也繇是四時之氣成象不絶春木秀容夏雲竒峰秋天爽空冬日暖濃觸類有景與溪無窮雖羊公峴溪曷足以加其勝矣於戲物之廢興時也苟非其時聖人微言矧其蒙者乎時會昌二年正月八日建連山燕喜亭後記李貺余自幼伏覽外王父昌黎文公燕喜亭記則知連州山水之殊亭之稱因記為天下所嘉連為郡既逺且秀亦因亭而髙時談山水可娛者較數連矣中州人既以連遐逺一作邃非不可得與逰皆依記以圖為館宇飾味山水者莫不目登心到焉如此則亭豈可荒記豈可仆乎三年冬余侍行承詔于連水陸南馳幽無所攄志無所用乃縱業於山水以資養志况又外祖所記亭在是耶昔聞今見必矣踵于郛則訪焉耆老曰無矣吁昔奚寵遇而讚詠之如彼今遭何人廢棄之如此豈亭之屯耶竊嘆數月得刺史武公至歎之尤甚且曰不修則過及余矣遽揮徒而窮尋之冒翳履淖抵巇擘蔓得餘趾焉級磚缺擲棟榱垣瓦寸折片碎滃汙其甚石記斷僵莓昧其字公整而修之徴記本於余家易石而琢之不旬就矣於舊不移不損煥而為新命余記一作紀其迹余辭小子豈敢措筆以並前記公曰不與記實此則又毁後人知子至而不顧子過矣奈何别不修者乎余曰諾時會昌五年十一月五日連州刺史武興宗建郢州孟亭記皮日休明皇世章句文粹有之字風大得建安體論者推李翰林杜工部為之尤介其間能不愧者惟吾鄉之孟先生也先生之作遇思入詠不抱竒抉異齷齪束人口者涵涵然有干霄之興若公輸氏當巧而不巧者也北齊美蕭慤有芙蓉露下落楊栁月中踈先生則有微雲淡河漢踈雨滴梧桐樂府美王融日霽沙嶼明風動甘泉濁先生則有氣蒸雲夢澤波動嶽陽城謝朓之詩句精者有露濕寒塘草月映清淮流先生則有荷風送香氣竹露滴清聲此與古人爭勝於毫釐也稱是者衆不可悉類嗚呼先生之道他復何言耶謂乎貧則天爵于身謂乎死則不朽于文粹作於文為士之道亦已至矣先生襄陽人也日休襄陽人也既慕其名亦覩其貌蓋仲尼思文王則嗜昌歜七十子思仲尼則師有若吾於先生見之矣説者曰王右丞筆先生貌集本文粹無此字于郢之亭亭在刺史治所每有觀之志四年榮陽鄭公誠刺是州余將抵江南艤舟而詣之果以文見貴則先生之貌縱視矣先是亭之名取先生之諱其亭舊名浩然亭公曰焉有賢者之名為趨厮走養朝夕言於刺史前耶命易之以先生姓今改為孟亭日休時在宴因曰春秋書紀季公子友仲孫湫字者貴之也故書名曰貶書字曰貴况以賢者名署于亭乎君子是以知公樂善之深也百祀之弊一朝而去百祀者謂開元至今則民之弊也去之可知矣見善不書非聖人之志宴豆既撤集作宴空豆撤立而為文咸通四年四月三日記通玄子栖賔亭記距彭澤東十里有山邃源奧處號曰富陽文士李中白隱焉五年冬别中白嵗且翅再自淝陵之江左因訪于是至其門驂不暇緤而目爽神生恍恍然逮若入于異境矣訴别苦外不復遊一詞且賞集無此二字且樂其得也木秀于芝泉甘于飴霽峰倚空如碧毫掃粉障色正鮮溫鳴溪潨潨源內槖籥韝出琉璃液石有怪者髐然闖然若將為人者禽有異者嘐嘐然若將天馴者每空齋寥寥寒月方午松竹交韻其正聲雅音笙師之吹竽豳人之鼓籥不能過也况延白雲為升堂之侣結清風為入室之賔其為趣則生而未覩矣中白所尚皆古以時不合己故隱是境將至乎老嗚呼世有用隱集無此字君子之道隱者乎有則是境不足留吾中白也昔余與中白有俱隱衡湘之志中白以時不合已果償本心余以尋求計吏不諧夙念今至是境語及名利則芒刺生背矣夫賔之來也不逾于邑邑謂彭澤縣也邑至是十里至是者不為易也賔其延之旦不晡乎晡不夕乎則俟賔之所果不可低庳於是距其寢西向百步則築賔亭焉兩其室而一其厦且曰賔將病暑吾則蔽其簷賔將病寒吾則奧其牖自竟是功則鮮薧之饋罍樽之費縱倍於前矣其功始於咸通二年秋八月後三年五月中白館余於是且禱其記而名之者纍月讓不獲因曰古者有髙隱殊逸未被爵命敬之者以其德業號而稱之玄德玄宴是也夫學髙行逺謂之通志深道大謂之玄男子通稱謂之子請以通玄子為其號請以栖賔為亭名噫知我者不謂我為佞友矣五年五月朔日記化洽亭記沈顔寧國臨縣徑之東南古勝地也頃屬兵興以後盡目一作日非蕪焉稂莠蔽川嘉樹不長氛煙塞路清泉不發幽埋異沒誰復相之是邑汝南長君治民有廖任人得逸乃卜别墅就而營之前有淺山屹然如屏後有卑嶺繚然如城跨池左右足以建亭丘隴髙下足以勸耕泓泓盈盈漣漪是生蘭蘭青青踈篁舞庭斯亭何名化洽而成民化洽矣斯亭乃治長君未至物景頽圮長君既至物景明媚物之懷異有時之否人之懷異亦莫如是懿哉長君雅識不羣愚不紀之孰彰後人時乾寧三年仲夏月十有九日記之烏程縣修東亭記楊夔故相國趙郡李公諱紳寶厯中亷問會稽曰以吳興僧大光有神異之迹為碑文托郡守敬公建立於卞山法華寺會昌中詔毁佛寺此寺隨一作墮廢時縣令李式其碑述相國先人曽宰烏程遂移立于縣之東亭逮今五十載其碑毁折汝南周生以明經四命重宰烏程覩其廢逸遂求於故老獲舊文比類於折碑所失者數字因重刋於石所缺文字不敢臆續蓋所以避不敏尊宣聖不知而作之誡也兼其舊傳云東亭之池時相國誕於縣署學弄之嵗乳母惰於保持俾相國墜於池人莫之覺食頃如有物翼出於池靣家人方得以拯焉衆方懾駭而相國笑語無替於平日人咸異焉初有石數尺勒其事嵗月綿逺石失其處故汝南生廣其亭濬其池再刻其碑重敘厥由蓋欲存縣之故事也生中和初宰此邑及期而代居間閉關淡薄自得郡帥隴西公潛使人伺其所為知其安於貧樂於道閲百代而自娛未嘗以闕物為撓由是官有乏必俾承之而生所至以靜理聞癸丑夏復詔生宰烏程民吏欣欣再偶寬政閣鞭聽訟事簡庭間君子哉汝南學古入仕有其經矣生家於陽羡數世以經明獲祿彼羣從昆弟並一舉而捷凡浙右之士因以嚮風國庠聞其名咸亦推先焉夫善為政者雖於人安而俗阜必當於事有立於意不忘以羽翼厥道也今徭賦既調風俗既安逋逸有歸惸孑有依然後搜遺文刋墜碑此所以見興廢之心也建新亭疏汙一作流汙池此所以見繼絶之志也於戲當天兵之後民間於繁役克俾其民康其務均俗固母視於尹長矣今施政之暇人有餘力然後興起廢墜彰明故事非圖逺經久者孰能為此哉生既重立大光上人之碑遂命某紀其年月别立于石且以旌新一作斯亭之興替有日也文苑英華卷八百二十六
