body:
  text: 文苑英華卷七百六十宋李昉等編雜論下虛名論一首小人論一首退身論隨論上下二首隋對女樂論一首廣廢莊論一首薦士論一首貢士論一首寒素論一首銓衡論一首不招士論一首小功不稅論一首虛名論李德裕夫與膏肓同病者不可療集作治也與衰亂同風者不可理也劉向上書曰幽厲之際朝廷不和轉相非怨君子獨處守正不撓衆枉勉彊以從王事則反見憎毒讒訴蜀本作訴故其詩曰密勿從事不敢告勞無罪無辜讒言集作口嗷嗷又曰分曹為黨往往羣朋將同心以諂正臣正臣進者理之表也正臣陷者亂之機也漢與幽厲之世同風矣干寶晉總論曰朝寡全德之士鄉乏不二之老進仕者以茍得為貴而鄙居正當官者以望空為髙而笑勤恪其倚伏虛曠依阿無心者皆名重海內晉文與元成之世同風矣所謂虛曠名重者蓋議集作譏山濤魏舒之儔耳後之竊虛名者曾不得與山魏徒𨽻齒而靦貌於世未嘗自愧趨之者如飛蛾赴火唯耻不及豈蛩蛩負蟨之謂哉虛名者以衆多為其羽翼時不敢害後來者以聲價出其口吻人不敢議以此相死自謂保泰山之安可以痛心矣集作哉小人論世所謂小人者便辟巧佞翻覆難知集作信此小人常態不足懼也以怨報德此其甚者也二字集作矣背本忘義抑又次之便辟者踈逺之則無患矣翻覆者不信之則無尤矣唯以怨報德者不可預防此所謂小人之甚者也背本者雖不害人亦不知感昔傷蛇傅藥而能報飛梟食椹而懷音以怨報德者不及傷蛇逺矣背本忘義者不及飛梟逺矣至於白公負卵翼之德宰嚭遺灌溉之恩陳餘棄父子之交田蚡忘跪起之禮此可與叛臣怨子同誅豈止於知己之義也世以小人比穿窬之盜殊不然也集作矣夫穿窬之盜迫於饑寒莫保性命於髙資者有何恩義於多藏者有何仁愛既無恩愛則是取資於路拾金於野若能識亷耻而不為是有償金者之行矣集作也若忍饑饉而不食是有䝉袂者之操矣所以陳仲弓觀梁上之盜察非惡人由集作以是而言盜賊未為害矣然操戈鋋挾弓矢以衆暴寡殺人取財謂之盜比於以怨報德之人者亦未為甚焉何者人之父子兄弟有不相知者有德於人者是知之矣焉得負之哉退身論老子曰功成名遂身退天之道也昔余常感焉自大夫種以至於前朝李右相元中書皆宴安厚味終嬰大戮所以文種有弓藏之恨李斯有稅駕之歎張華願優遊而不獲傅亮贊識微而不免此四子者皆神敏知機聰明志古圖國致霸動必成功自謨集作謀其身猶有此恨况常人哉其難於退身者以余忖度頗得古人微㫖天下善人少惡人多一旦去權禍機不測操政柄以禦怨仇者如荷㦸以當猛集作狡獸閉關以待暴客者若捨㦸開關則寇難立至遲遲不去者以延一日之命庶免終身之禍亦猶奔馬者不可以忘集作委轡乘流者不可以去楫是以懼禍而不斷未必皆耽祿而患失矣何以知之余前之在鼎司謝病辭免尋即逺就澤國自謂在外而安豈知天髙不聞身逺受苦蜀作害近者自三公鎮于舊楚懇辭將相歸守丘園而行險之人乘隟構患竟以失巨浪而懸肆去灌木而嬰羅余豈不知身退罹殃蓋耻同種斯之不去也則知勇退者豈容易哉而陸士衡稱不知去勢以求安辭寵以招禍集作福斯言過矣唯有遭逢善人則庶可無患故范睢得蔡澤退而不辱虞丘得孫叔去而不疑集作困其次剛毅者有心者亦可矣子文舉子玉以靖國隨會避郤子以紓亂皆保其安矣若小人則禍必及之無所逃也終不及乘扁舟變姓名浩然五湖之外不在人間之世斯可以免矣隨論上下篇并序李宗閔宗閔讀孟軻書至于王霸之說未嘗不歎曰嗟乎知其時之可者不知時之不可者也即牛鼎之事未嘗不歎曰嗟乎知其身之不可不知其身之可也於是退而著隨論上下篇因明王霸之所以興廢進退之所由同異且以解執事者之云耳論上客有問宗閔曰孟軻稱齊王由反手謂管仲為不足為若是則功業存乎人不存乎時不亦信乎宗閔曰非也可以王而王可以霸而霸非人之能為也皆此時也人皆奉時以行道者也不能由道以作時者也能因變以建功者也不能由一作因功以反變者也昔者紂為無道以流毒於羣邦天下囂然不待文王之仁人然後欣戴之也茍有息肩之所則民莫不疾乎奔走如逃其水火焉當此之時有能扶義陵戎除去大憝則民莫不爭被矢石以報其父兄之仇故太公相武王起而革滅獨夫以成王業冝建其國雖無大惠於羣邦天下順焉雖文王之仁且欲招而懷之也茍微虐殺之害則諸侯孰肯忘國從亂而違其天子焉當此之時有能匡飭暴彊夾輔王室則諸侯孰肯不爭奉盟誓以休其戰伐之勤故管仲相桓公從而撫之藩衛宗周以立乎霸功亦冝也誠使太公居管仲之勢而能以周王天下乎吾有以知其不能也太公管仲並時而起則吾未知孰前焉故仲尼稱管仲曰如其仁稱桓公正而不譎豈有非其道也而仲尼稱之且曰聖人之門無道桓文之事吾不信也客曰然則古人為天下者亦如是乎宗閔曰固也所由曰道道之不可易禮樂仁義之謂矣所遭曰時時不可常應天順民之謂矣昔者陶唐氏之為天下也法天而則地授時以任民垂其衣裳而天下無為推其誠心而刑罰不用當此之時各順其情性樂其習俗保其奉命故謂之至時一大變及有虞之為天下也始放四凶以除民害是故勤而不德時又一變焉及夏后氏之為天下也始用肉刑以寒民心是故威而不能懷時又大變焉及湯武之為天下也始及干戈放殺昏虐是故善而不能善時又大變焉及桓文之為天下也始合諸侯以匡王室是故順而不能革彼三王二公皆元德也夫豈樂為相反哉勢異則事殊時遷則俗易執一不可以通變循古不可以制變是故觀時而立功論世而創業唐虞各以其道而自帝三代各以其變而自王二公各以其時而自霸不其大哉吾故曰禮以因人茍有以因之不必法乎古也樂以和人茍有以和之不必法乎古也兵者除亂茍有以除之不必法乎古也為政者平疑理天下必法乎古人也况古之行法豈有常亦有從其冝當其道天下隨時而已矣然膠柱鼓瑟惡能成其音聲哉若乃誦前聖之言守己行之制遭變而不通得時而不隨夫如是可謂王莽宋襄公之言不足為有道者也昔者王莽嘗為德化矣不問可否語必援經不量人心動必據古於是天下煩潰從而喪之此不知變之禍也昔者宋襄公嘗為仁義矣楚人尚詐我必信彼兵尚竒我必正用欲以興商道霸諸侯一戰而為敵所執再戰而身死國削為天下僇笑此不知時之禍也易曰功業見乎變又曰隨時之義大矣非天下之至明孰能通乎變非天下之至聖孰能通乎時且軻之所言前王之遺迹矣君子亦云道而已矣何必履其故迹耶嗚呼自周室下衰諸侯放恣仁義之道隨沒於戈兵微管仲中國幾為戎矣而曰不足為也孰可為之哉論下客有曰王霸之事既聞之矣或言伊尹負鼎百里奚飯牛而孟軻非之曰未聞枉已而直人者也又曰聖人之行不同潔其身而已矣又可信乎宗閔曰非也聖人以枉道為恥以屈道為辱闕不以屈身為辱唯守其道故雖辱其身而進焉非其道故潔其身而退焉進豈有他唯道所在而已矣天生聖人者孰為然哉為行天下之大道也立天下之大教也利天下之人民也故天下有不由其道者聖人憂也天下有不知其教者聖人憂也天下之人民有不寧者聖人憂也聖人之職也如此聖人之憂也如此得其時遭其㑹上有明天子下有明諸侯遑遑然求合豈不曰今辱吾身則天下䝉其安百姓得其利不辱吾身則天下不䝉其安百姓不得其利吾寧以一身之故而危天下病百姓哉此伊尹之所以樂為割烹而不顧其恥也若不得其時不遭其㑹上無明天子下無明諸侯則必汲汲而求退豈不曰今辱吾身澤得施乎民道得行乎世吾往也今不辱吾身澤不得施乎民道不得行乎世吾止也雖然吾豈圖是安哉亦將激偷幸之風全百姓之教以為乎後之人耳此顔回所以樂窮巷而不動其心者也故易曰時止則止時行則行動靜唯其時故傳曰冨貴可求雖執鞭之事吾亦為之取捨唯其義也然則趨時不可以潔已喪義不可以圖身亦猶追亡者趨拯溺者濡豈樂為之哉其勢則然也故曰觀逐者於其反也觀行者於其終也奈何君子之道豈可以小知哉非匹夫之為諒也觀懸爇之危有救之道小霸則可王則不可而曰非堯舜之事吾不忍為之是知堯舜之道乎是誦堯舜之言乎且軻之言過矣所惡夫干進務入者懼其為利也茍不知為利於辱何有哉客曰然則仲尼不䝉恥而進何也宗閔曰仲尼將䝉恥而不得當也豈不願之乎當仲尼之行也上之人害其道下之人壅其言猶且歷說諸侯環軒於天下冀幸時君之一悟王風之變其存心遇合惓惓而不能已焉終無可奈何故逐於魯斥於齊圍於匡蒲厄於陳蔡栖皇狼狽於楚鄭之間其道逾窮其進彌塞不知者以仲尼之為欲顯榮其名位冨貴其躬者也孰知聖人急於扶世而不恤其難者哉故嘗稱伯夷不辱其身且曰我異於是及公山弗擾以費畔而欲從之豈不將由是道行捨其恥焉可也今牛鼎雖為辱猶不愈於公山氏乎因斯而言仲尼亦有枉也惡有仲尼枉已而不能直人哉安得乎潔其身而已是故水受濁以淳物不傷其清石受磨以利物不磷其堅君子屈已以教人不害其義嗚呼進取之士誠能察伊尹顔淵之所以進退思仲尼執鞭亦為觀大易動靜不失其時後匹夫之果其行無忘兼濟之道則雖有甚於牛鼎之恥吾將歌頌之不暇又何譏焉若果孟軻之言則人之相率獨其善而已矣惡能理天下哉隋對女樂論來鵠隋儒林有說髙祖謂羣臣曰自古天子有女樂否楊素以下莫知所出遂言無之房暉逺進曰臣聞窈窕淑女鐘鼓樂之此即王者房中之樂著於雅頌不得言無隋文悅噫而史不刋者朝與職俱無人也夫秦齊晉皆有女樂由余去孔子行錫魏絳之謂也漢祖唐山夫人能楚聲又舊云祭天用女樂魏武有盧女能鼓琴特異於諸妓則女樂者秦齊晉漢魏俱有之而楊素以下皆不能言者豈以所問是古天子耶若是則有太昊使素女鼓五十絃瑟悲哀帝禁不止後之帝王遂能有之羣臣不能以是言但賢暉逺之說暉逺引詩臆對終為博古通知殊不明恣率一時之言頗昧二南之㫖且詩曰參差荇菜左右芼之窈窕淑女鐘鼓樂之說者后妃有關睢之德乃能供荇菜備庶物以事宗廟盛德者冝有鐘鼓之樂也故琴瑟在庭荇菜羞之上下樂作以盛其禮耳謂以樂樂上音嶽下音洛淑女非謂淑女執其樂也淑女為后妃也安有后妃執樂也荇菜謂在宗廟用也安有謂王者房中樂耶是皆乖謬之甚暉逺瞽詩而終疑作始對欺朝而罔君蓋由隋日無人浪言至是女樂之對猶可君道之問若何上下相䝉履霜於此悲夫廣廢莊論并序李溪王坦之作廢莊論一篇非莊周之書欲廢之其㫖意固佳矣而文理未甚工也且祗言其壞名教頽風俗而未能屈其辭折其辨是真詬之而已莊周復生肯伏之乎其終篇又同其均彼我之說斯魯遽疑也然則莊生之書古今皆知其詭於聖人而未有能破之者何哉則聖人果非而莊生果是矣既莊生云非聖人云是何為不能勝非哉余甚憎之或有曲為之說使兩合於六經者或有稱名實學與𤣥奧不同欲兩存者皆妄也故荀卿曰天下無二道聖人無兩心則異術必冝廢矣余既悟荀卿言嘉王生之用心而憐其未盡故為之廣云世多以莊子為𤣥奧吾獨以為粗見理而未盡耳汪洋七萬餘言然撮其大指舉類而證其得失可見矣且觀其體虛無而不知虛無之妙也研幾於天命而未及天命之源也樂言因任而未知因任之本也窮極性情而未盡性情之變也何以知之夫虛無用之心也必馮於有者也有之得行也必存於虛也是以有無相資而後功立獨貴無賤有固已踈矣且所謂無者特未明也惠子以其言之無用而應之曰知無用始可與言用矣今夫地非不廣且大也人之所用容足耳側足而墊之至黃泉人尚有用乎此言假四旁之無用也以自踰其虛辭則敏矣然無用之說有三不可混而同一有虛無之無用者有有餘之無用者有不可用之無用者虛無之無用者則老子埏埴鑿户之說其用在所無也有餘之無用者則側足之喻其用必假於餘也不可用之無用者苖之莠粟之秕也今莊之壞法亂倫是秕莠之無用矣而自同於有餘之無用不此謬乎此所謂體虛無而未知虛無之妙也稱屠牛而養刀牧羊而鞭其後指窮於為薪皆在生得納養之和夀矣故譏滅裂鹵莽者責袵席之上設食之間而不和滅者然而衛靈公石槨之銘修短必有天𢾗矣豈在鞭與不鞭闕養哉其理自乖舛此所謂研幾於天命乃未及天命之源也夫因任者因羣才可任而任之耳而莊生欲任天下而不理日聞在宥天下不聞理天下也天地固有常矣日月固有明矣星辰固有列矣樹木固有立矣禽獸固有羣矣以為上古至德同乎無知其德不離同乎無欲是謂素朴而人性得矣自懸仁義禮樂而人好和一作知爭歸於利也斯甚不然夫天地日月樹木禽獸不假理者也人則假理者也人生必有欲有欲之心發於自然欲不能無求求不能無爭爭不能無亂故聖人立仁以和之陳義以禁之而反以為害之者則今戎狄之相劫殺魚鱉之相啖食孰行仁義禮樂於戎狄魚鱉之間哉含氣之類莫靈於人物有知也有欲也而人反無之何如且果無知也果無欲也則凡是非好惡分别賢不肖冝皆起於人也而稱厲之人夜半生子遽然取火而視之汲汲然恐其似已者言人皆欲好善而惡惡故可放之而自理也夫厲之有是心也豈非聖人之分别驅動使之然乎安可放之耶如曰天機非由於聖人則固自有知有欲矣仁義禮樂何罪哉此所謂樂言因任而未知因任之本也自生人以來莫不有爭上好勝之心未為之法則爭歸於義先王知其然也故髙為之法訓而峻為之行而人竟疑作競學之亦是爭勝已而爭勝之循道也猶火之燎上也因為之竈以煬之水之趨下也因鑿之溝以注之是亦燎注之得冝也燎與注者得冝則無焚溺之憂矣爭與上者循理則無暴亂之禍矣由知其本而順理之也然則無竈焉火固自燎矣無溝焉水固自流矣將壞竈以絶燎毁溝以息注勢必不可也徒使燎與流者失冝耳無賢聖焉人固有所希慕矣不尚賢殫聖法削魯史之行以絶人之好慕果不可絶徒使所慕所好在於非理耳由不知其本而逆施之莊生徒知好髙慕上之離其本而不知好慕之心發於天機欲絶聖賢使天下各止其知安其分而無所慕何異於毁溝壞竈以止水火者乎其術一何迂此所謂窮極性情而未盡性情之變也用是以觀彼於虛無焉天命焉因任焉性情焉譊譊然道之闕無一洞明者不知𤣥奧者固如是乎故曰粗見理而未盡者也雖根源老氏而詭聖敗法尤深王生欲廢之冝哉或曰莊子皆寄言爾以名實按之不亦踈乎夫寄言者若大鵬尺鷃肩吾連叔雲將鴻䝉漁父盜跖求其理者不可責以事也誡惠子以嗜鼠曹商以䑛痔違其趨者可謂之忿也如是吾豈不練哉若理之所塞趨之所塞則託以寄言而免也至於稱至人得醲氣之守潜行萬物而不空得道者挈天地騎列星外死生而色若孺子者公為虛誕無足詰焉薦士論牛希朝廷求賢之道備於往古以經學文藝之流凡設十有二科以待之郡國每嵗貢士盡應其科其外諸侯各舉所知以為禆補聖世奏章不絶於明廷爵賞實煩於王命當承平之時卿大夫家召傭書者給之紙筆之資日就中書録其所命每昏暮親朋子弟相與候望以其升沉以備於慶賀除書小者五六幅大者十有二三一作一二幅每日斷長補短以文以武不啻三十餘人一嵗之內萬有餘衆或考秩遷滿或方伯慰薦或伐闕功勞或升奬舊勳制詔之辭必嘉其官業賞其才藝褒其行實叙其勞績無一日不為之未嘗得一賢士與天子共治於四海未嘗得一賢將與天子鎮靜於二邉非求之不廣薦之不至也豈五百年一賢闕世哉夫畫餅不可以充饑誦藥不可以愈病蓋無其實而有其名使之然也自朝廷及郡國諸侯之所舉皆無其實將如之何嘗試論之自文藝之流假手於人投擲於公卿之門者率不能知其僞公試之地尚復乞貸經學之子考帖之時預有歌括問義之日一席之內對者六七皆誦本疏别無新意更相救助發起義端有司但記其屬求之也以為之去留即經學文藝之謬也如是况漢世公卿大夫皆以通經對策名動天下然後登用或居諫諍之列或處燮理之任朝廷每有水旱災沴彗孛陵犯日月薄蝕必引所通經義證據以為之救殆與今日之經學者異矣若文學侍從之臣必選於切問近對之才必本於諷諫理辭之要故其文章傳之至今又與今日之辭賦者異矣郡國所送羣衆千萬孟冬之月集於京師麻衣如雪紛然滿於九衢是非相難固不可知矣諸侯所薦率皆應權幸之㫖承交逰之命取其虛名奏署謂之借聽一作㕔取其謬舉之說謂之橫薦凡四方表函達於中書者必可指期於清貫美秩名邦劇邑諸侯之薦士也宰執之命官豈唯平生未交於一言蓋見其姓字而已豈能托實哉官達幸門易如秋草能復貴賤之别闕冠裳之重矣朝廷委輔相之權衡覽諸侯之章疏視其文信其人以為薦公孫𢎞董仲舒之學也相如枚臯之才也冉季政事之能也孫吳將帥之略也時君既不問其實安可不信大臣之言從而與之上下相䝉其何以濟且姬周之世薦賢者多受賞魯史有之矣魏晉之日門生故吏有罪必連坐舉主史有之矣今薦賢之賞久已廢矣連坐之典又不行矣况今之所舉非徒古者知之審取其必達取其必冨貴闕如一死生不變之為誠明也薦其為將也覆軍擒帥代國獲地然後以為得薦其為相也冨國安人來諸侯之朝成霸王之業然後以為得今之舉也士為筮仕結綬之漸一命一官而已他日之功過皆莫知也薦人用人之道何以得其賢矣昔孔文舉薦禰正平以為堪任大臣有臯陶稷契之才漢后委而棄之竟不能知其道之否臧狄仁傑薦張柬之有宰相業武后用之為相果能克正唐祚有中興之功文舉之薦禰衡也委而棄之仁傑之薦柬之也舉而用之豈繫吾道之廢興豈繫厯數之理亂乎然用之則如此不用之則如彼騏驥伏櫪安能千里之步龍泉在匣孰知截玉之利悲夫用與不用耳士之於世不可期於一人之知己者茍有知者甘心死節尚且不疑况復升榮顯之中行心胸之事安人之安而存隨之利人之利而闕有之利天下者以利己之厚者也利百姓者乃利其身之逺者也君子之人豈不利其身哉為國家得人則理失人則亂古今不易之常理安可不以求士為急詩曰濟濟多士文王以寧以四海所歸之聖尚假多士之力况中庸之主哉易曰君子不家食吉仲尼以天縱之德猶思賢者與之共食况尋常人哉又曰皎皎白駒在彼空谷蓋遺賢之歎也又曰束帛戔戔賁于丘園蓋求之於野也賢人君子何代無之哉上之人其求之以道既不廢於朝夕於所薦不公所用非賢將難以至於理當在伸明上賞連坐之典以正之奸邪攀緣之路漸將息矣一舉之妄後當自獲其辜知有畏矣在位者斯有賢者矣有道之士爭趨之矣貢士論禹畫九州列貢輕重舉賢用材咸在其中故周官司馬得俊造之名乃進於天子謂之進士又天子於射宫以擇諸侯所貢之士若善者乃受上賞不善者黜爵其次削地得預於射宫以射諸侯之義而為諸侯所舉者重所用者大漢法每州若干户嵗貢若干人吏以籍上聞計州里之大小材之多少謂之計籍人主親試所通經業䇿問理優深者乃中髙第有行著鄉里辟選自古而然漢世得人於斯為盛國家武德初令天下冬季集貢士於京師天子制䇿考其功業辭藝謂之進士已廢於行實矣其後以郎官權輕移之於禮部大率以三場為試初以詞賦謂之雜文復對所通經義終以時務為策目雖行此擢第又不由於文藝矣惟王公子弟器貌竒偉無才無藝者亦冠於多士之首然相士之道備嘗聞之有門閥清貴者有狀骨卿相者有容質秀麗者有才藻可尚者有權勢抑取者有朋友力盛者機權沉密詞辨雄壯臧否由己升沉在心羣衆必集其門若見公相來交請友識面為難動必有應逰必有從密處隱㑹深誠重約朱門甲第之間鬼神不能知者盡知之雖名臣碩德髙位重權可以開闔之可以搖動之可以傾覆之有司畏之不敢不與之者言泉疾於波浪舌端利若鋒鋩所排殁九泉所引升霄漢默無言衆必謂之長者發中心病時皆目之凶人秋風八月鞍馬九衢神氣揚揚行者避路取冨貴若咳唾視州縣如奴僕亦不獨髙於貴胄亦不賤彼孤介得其術者捨耒耜而取公卿乖其道者抱文章而成痼疾朝廷取士之門於斯為最衰世以來多非其人明廷無䇿問之科有司望疑至公之道登第之人其辭賦皆取能者之作以玉易石羊質虎皮曰一作白抱憤之人汨沒塵土天九重髙不可以呌加以浮薄之子遞相唱和名第之中以隻數為上賤其雙數以甲乙為貴輕彼兩科題目之間增其異名至其傅粉燻香服飾鞍馬之費多致匪人成於牧宰取資貨以利輕肥朋黨比周交逰酒食亂其國政於斯為盛竊願明君賢臣悉以同力大革其弊復以經明行修為急所謂斥彼浮華敦其茂實儒風免墜失取士之道寒素論堯舜興於畎畝之中以仁義而得天下曽顔非諸侯之祚以德行而居儒道之首以曽顔比之於天子天子喜之以桀紂比之於匹夫匹夫怒之豈在其貴賤之位哉為仁義一日則為君子不為仁義一日則為小人豈在世載相襲冠裳相承吁哉蒲輪不往諸侯之家束帛不在闕廷之下皆巖穴隱逸之人行仁抱義之子化之於鄉里聞之於郡國達之於朝廷然後求之豈在卿大夫之子哉諸侯鄉飲之禮敬年尚齒使少年知禮老者獲養修長幼之道也天子太學父事三老兄事五更教人以孝教人以悌興教化之本也文不以爵祿為差也况布素對䇿名聞於天下者有之矣徒走以取公卿者有之矣鄭康成捨胥吏之役歸為儒者黃叔度牛醫之子以德行聞今服冕之家流品之人視寒素之子輕若僕𨽻易如草芥曽不以為之伍寒賤之子能以道德自尊文藝自將見之若敬大臣避之若逢摯獸又不自審之所致也堯舜何人也猶將比肩其道流品何人也余何人也曽不自敬其身故且朝為匹夫暮為卿相者有之矣朝為諸侯暮為餒鬼者有之矣道之用捨在於我而已是玉之美者不産於廊廟之下為瑚璉之器材之美者不出於里閈之內為棟梁之用士之美者非貴胄之子而登卿相之位况投竿而為王者師挽車而為王子相豈白屋之士可自遺之哉銓衡論王者列官分職以成庶政材不可失官不可曠故銓者以慎擇為目衡者以公平無私或失於是豈稱其本自周室以司馬宗伯選士漢魏晉宋降及國朝委吏部擇官上自郎吏下至丞簿皆禀之銓注科名入選品秩所䕃勳代授任四方奏薦加黜伸書易名取姓其為猥詐不可勝紀以天下之大九州之衆職官將萬餘員令長薄尉官秩至卑理道與下最親朝廷輕之委有司而已今吏部自尚書至郎吏五人抱案者向百餘輩桀黠詭譎必出於是視其官屬如弄嬰兒若啖之以利即左右手之不若皆䑛筆署夕且未之暇焉能得其過者掄材為善久廢其事為人擇官殆無虛日其稍留心者止於詰其廕緒循其資歷黜其升遷求其殿犯豈有問其為政之本為理之道至若試以章判拘以棘圍鬻文之徒偏得其便乞憐之子略無愧容大為笑端不可以取亦闕居清官若罷無資財考秩既深然後送堂時宰視之不成芻狗區區風塵殍死者衆胥吏賄賂之交填咽街巷聒于耳目清資劇邑必有主者朝列一作夕之中以藥為之某官若干萬錢某邑若干束絹公然大言曽無畏懼憧憧政路指期而取某之官也納賄償債且未之能豈復為政為理是以生民致困嵗月凋弊逋逃林藪竄伏萑蒲小者掠行旅大者破井邑天下九州蜂飛蝟起以至於阽危宗社夫衆庶非樂於逺父母棄妻子之疑為盜賊甘心於白刃之下生業既亡饑寒是逼遂陷於此皆為政之驅也持衡者得不以銓擇為急不招士論史記以衛青為大將軍門下賔客蘇建常責其不招士青言自魏其武安招致賔客天子常切齒夫選賢任能乃天子之柄豈臣下之所為哉太史公亦美其慎重豫竊未然之夫諸侯貢士者在禮經一與再不貢有黜爵削地之制則當位者其可默默乎且魏其武安之厚賔客非有賢智士也皆任俠之徒以力折公侯為能以權傾州縣為重如是則天子安不切齒哉蕭何薦韓信王陵舉張蒼鮑叔舉夷吾子皮任子産如有益於國濟於時豈天子之能罪哉其後武帝詔於青問選士青但欲以冨金賈人多者皆應命賴賢大夫趙禹知其事召問其故皆聶聶然罔審是非與土偶無别遂悉命其徒於末流中等田仁任安武帝與語大恱皆擢用之若武帝常切齒不當於青之門下選士也得田仁任安協於上意亦不當罪青之門有人也武既不然而青以為切齒無乃誣上之言歟抑唯欲聚冨金多財者歟抑闕其金帛恐招致賢彥有所費耗歟若然則出塞之功無乃幸而成者歟小功不稅論小功不稅制於古行於今然古儒今儒終以為不可何也由不為辨後所以惑也古人不可者曽子曽子曰小功不稅則是逺兄弟終無服也而可乎說者云以為依禮小功之喪日月已過不更稅而追服則是逺處之親聞喪恆晚晚終無追服言不可也今之不可者韓文公以為小功之親多而未踈又不比古圖疑衍國分境狹令之逺者或數千里之外是愈無追小功者矣亦不可也夫禮始於文武制於周公定於孔子此聖人貫萬行極人情其為五服之義宜已謹矣彼曽子仁厚純篤之行以禮為薄而私怪之爾禮所以文制云定者正為此也恐厚者過焉而止之謂也恐薄者不及焉而限之謂也昔子路有姊之喪可以除之弗除也曰弗忍孔子曰先主制禮行道之人皆弗忍也子路聞之遂除之子路弗忍獲正於聖人而後無惑曽子欲稅小功亦弗忍不幸不獲正於聖人使惑者至於今弗解也韓文公可謂與曽子同志而未思於周公孔子者小人論既無恩愛表本作既無恩愛仁義文苑英華卷七百六十
