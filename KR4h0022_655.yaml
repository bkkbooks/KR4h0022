body:
  text: 文苑英華卷六百五十六宋李昉等編謝文序并和詩謝滕王集序啓一首謝趙王示新詩啓一首上髙長史述和詩啓一首謝皇太子玉華山宫銘賦啓一首上從舅侍御啓一首和閨情詩啓一首謝河東公和詩啓一首獻侍郎巨鹿公啓一首上文章啓上上薛令文章啓一首上恩光曲歌詞啓一首上武侍極啓二首上李常伯啓一首上皇甫常伯啓二首上吏部裴侍郎啓一首謝文序并和詩謝滕王集序啓庾信某啓伏覽制垂賜集序紫微懸映如傳闕里之書青鳥遙飛似送層城之璧若夫甘泉宫裏玉樹一叢𤣥武闕前明珠六寸不得譬此光芒方斯照燭有節有度即是能平八風愈唱愈髙殆欲去天三尺殿下雄才蓋代逸氣橫雲濟北顔回關西孔子譬其毫翰則風雨爭飛論其文采則魚龍百變蒲桃繞館新開碣石之宫修竹夾池始作睢陽之苑琉璃泛酒鸚鵡承杯鳳穴歌聲鸞林舞曲況復行雲逐雨回雪隨風湖陽之尉既成為喜之因舂陵之侯便是積慶之地某本乏材用無多述作加以建鄴陽九劣免儒硎江陵百六幾從士一作事隴至如殘編落簡並入塵埃赤軸青箱多從灰燼比年疴恙彌留光隂視息桑榆已逼蒲栁方衰不無秋氣之悲實有途窮之恨是以精采瞀亂頗同宋玉言辭蹇吃更甚揚雄一吟一詠其可知矣好事者不求知音者不用非有班超之志遂已棄筆未見陸機之文久同燒硯至於凋零之後殘缺所餘又已雜用補袍隨時覆醬聖慈憐愍遂垂存録始知揄揚過差君子失辭比擬從橫小人迷惑荆玉抵鵲正恐輕用重寶龍淵削玊豈不徒勞神慮匠石回顧朽材變於雕梁孫陽一言奔蹄成於駿馬故知假人延譽重於連城借人羽毛榮於尺玊溟池九萬里無踰此澤之深華山五千仞終愧斯恩之重即日金門細管未動春灰石壁輕雷尚藏冬蟄伏願聖躬與時納豫南陽寶雉幸足觀瞻酈縣菊泉差能延夀伏遲至鄴可期從梁有日同杞子之盟會必欲瞻仰風塵共薛侯而來朝謹當逢迎冠蓋魚腸尺素鳯足數行書此謝辭終知不盡謹啓謝趙王示新詩啓某啓鄭睿至奉手教纍紙并示新詩八體六文足驚毫翰四始六義實動性靈落落詞髙飄飄意逺文異水而湧泉筆非秋而垂露藏之山嵓可使雲霧鬱起濟之江浦必當蛟龍繞船首夏清和聖躬怡裕琉璃彤管鵲顧鸞回婉轉緑沉猿驚鴈落下風傾首以日為年犍為舍人實有誠願碧雞主簿無由遂心寂寞荆扉踈蕪蘭徑驂駕來梁未期卜日遣騎到鄴希垂枉道上髙長史述和詩啓李嶠某啓近於録事參軍杜延昌處伏見公秋月遙想洛城十韻之作曲中之妙傳乎郢客之聲天下之珍得自隋侯之掌鳳鳴六吕龍文九光駭屬竒觀相趨動色若乃政理餘隙翺翔多暇臨八水之髙秋企三河之上國衣冠濟濟入青瑣而步丹墀車馬喧喧下銅衢而赴金谷人物仙舟之會風塵俠窟之逰莫不屬想心目託情謡詠九回靈府遙馳雨露之郊千里神畿近接風雲之思雕文將錦繡同美惠氣與芝蘭等馥用逈秦肆懸輕吕氏之金持入周京即貴洛陽之紙足使兩都賔主羞談翰墨二陸兄弟耻論詞賦死者可作賈生為入室之徒來者難誣潘子得扶輪之地某學異通敏才非沉鬱刀筆為吏趨馳之嵗月已多黼藻成文雅頌之風流尚缺平原從者終慙入楚之逰闕里門人空積後陳之歎徒以夙承光彩早延提拂曾將薄伎見知思以庸音自效輒忘固陋敢有和歌登卞肆而論寶入夔門而撫節擬託非倫揣摩增􅌤謹啓謝皇太子玉華山宫銘賦啓許敬宗臣敬宗行成季輔等啓昨晚內坊丞王君德奉宣令賚臣等玉華山宫銘賦二本拜承恩貺駭抃交懷跪玩清辭早河溢目伏惟殿下天資學府道貫生知絢發詞林若春華之麗韶景漪清碧海譬秋水之淡晨霞仙鶴和吟慙八音於雅韻神龍縟彩謝五色於雕文綺布天庭雲生石砌理含貞邃雅逹谷處之端趣極幽間妙盡嵓居之體煙松合翠露桂分紅察彼殊形翻然共色究寫真之奧㫖擅體物之窮神若乃漢月鈎空乍臨珠箔石苔垂髮或映莊帷莫不理超詞表意生文外自餘清拔觸類竒新成若神化之工光乎性道之製蓋由基天挺裕纂聖凝離故能邁古超前納卿雲於度內逾儔絶侣括啓誦於胸中臣等忝荷殊私曲䝉垂示見所未見情百恆情無任鳬藻之懷謹上啓陳謝謹啓上從舅侍御啓王勃某啓一昨弟勛至奉命以憲臺詩十首垂示氣橫霜署彩洞雲扃繡衣兼藻肆之華白簡控𤣥機之奧仙驄在馭踐文路而驅神獬冠臨下望詞林而直指某質惟茅艾名隔縉紳虛霑自出之榮每愧諸甥之列恩華曲被誨誘傍臨識謝知音榮深覩奧虞韶忽奏聽律吕而忘疲楚匣遙開仰光芒而不暇昔孔融之逢元禮罕覩髙文王粲之謁伯喈終慙懿戚援今企古議德疇恩荷栗兼儲疑悲欣兩集但才非酷似攀宅相而多慙慕切如存臨渭陽而增感不勝荷戴屏營之至和閨情詩啓駱賔王賔王啓學士袁慶隆奉宣教㫖垂示閨情詩并序跪發珠韜伏膺玉札類西秦之鏡照徹心靈同南指之車導引集作發迷誤竊惟詩之興作兆基邃古唐歌虞詠始載典謨商頌周雅方陳金石其後言志緣情二京斯盛含毫瀝思魏晉彌繁布在縑簡差可商略李都尉鴛鴦之辭纒綿巧妙班媫妤霜雪之句發越清回平子桂林理在文外伯喈翠鳥意盡行間河朔詞人王劉為稱首洛陽才子潘左為先覺若乃子建之牢籠羣彥士衡之籍甚一集作當時並文苑之羽儀詩人之龜鏡爰逮江左謡詠集作謳謡不輟非有神骨仙才集作材專事𤣥風道意顔謝特挺箋辭典麗英華作顔謝鬱為麗則恐非自兹已降聲律稍精其間沿改莫能正本天縱明睿卓爾不羣聽新聲鄙師涓之作聞古樂笑文侯之睡以封魯之才追自衛之迹𢎞兹雅奏抑彼淫哇澄五際之原考四始之弊固可以用之邦國厚此人倫俯屈髙調聊同下俚集作里然思入態巧文隨手變雅調慙其曼聲延年愧其新曲走以不敏謬䝉提汲謹抽詞奉和輕以上呈未近詠歌伏深羞悚集作悚恧謹啓謝河東公和詩啓李商隱商隱啓某前因暇日出次西溪既惜斜陽聊裁短什蓋以徘徊勝境顧慕佳辰為荒草以怨王孫借美人以喻君子思將玳瑁為逸少裝書願把珊瑚與徐陵駕一作架筆褎然而作曾無足觀不知誰何仰逹尊重果煩屬和彌復驚集作兢惶某曾讀隋書見楊越公地處親賢才兼文武每舒錦繡必播管絃當時與之握手言情披襟得侣者惟薛道衡一人而已及觀其唱和乃數百篇力鈞聲同德鄰義比彼若陳葛天氏之舞此必引穆天子之歌彼若言太華三峯此必曰潯陽九派神功古迹皆應物無疲地理人名亦爭承不缺後來酬唱罕繼聲塵嘗以斯風望於哲匠豈知今日屬在所天坐席行衣分為七覆煙花魚鳥置作五衡集作衝詎能狎晉之盟實見取鄫之易不以釁鼓惠莫大焉恐懼欣榮投錯無地來日專冀謁謝伏惟鑒察謹啓獻侍郎巨鹿公啓某啓今月某日舍弟新及第進士羲叟處伏見侍郎所制春闈於榜後寄呈在朝同年兼簡新及第諸先輩五言四韻詩一首夫𤣥黃備綵集作彩者繡之用清越為樂者玉之竒固以慮合𤣥機運清俗纍陟降於四始之際優游於六義之中竊計前時承榮內署柏臺侍宴熊管從畋式以風騷仰陪天籟動沛中之舊老駭汾水之佳人非首義於論思實終篇於潤色光傳樂録道煥詩家况屬詞之工言志為最自魯毛兆軌蘇李揚聲代有遺音時無絶響雖古今異制而律吕同歸我朝已來此道尤盛皆陷於偏巧罕或兼材枕石潄流則尚於枯槁寂寞之句攀鱗附翼則先於驕奢豔佚之篇推李杜則怨刺居多效沈宋則綺靡為甚至於秉無私之刀尺立莫測之門墻自非託於降神安可定夫衆製伏惟閣下借其餘力廓此大中足使同僚盡懷博我不知學者誰可起豫某比興非工顓䝉有素然早聞長者之論夙託詞人之末淹翔下位欣託知音抃賀集作贊之誠翰墨無寄况乎仲氏實預諸生榮沾洙泗之風髙列偃商之位仰惟厚德願沐餘輝輒罄鄙詞上攀清唱聞郢中之白雪愧列千人比齊日之黃門慙非八斗集作斗米干冒尊重伏用兢惶其詩五言四首謹封如右集作别上文章啓上上薛令文章啓陳子昻某啓一昨恭承顯命垂索拙文祗奉恩榮心魂若厲幸甚幸甚某聞洪鍾在聽不足論擊缶之音太牢斯烹安可薦羮藜之味然則文章薄技固棄於髙賢刀筆小能不容於先逹豈非大人君子以為道德之薄哉某猥以二字集作實鄙能未窺作者斐然狂簡雖有勞人之歌悵爾詠懷曾無阮籍之思徒恨跡荒淫麗名陷俳優長為童子之羣無望壯夫之列豈圗曲䝉勞奬躬奉德音以小人之淺才承令君之嘉惠豈不幸甚豈不幸甚伏惟君侯星雲挺集作誕秀金玉集作火間成衣冠禮樂範儀朝野致明君於堯舜皇極允諧當重寄於周集作阿衡中階叶泰非夫聰明博逹體變知機如其仁如其仁方當拔俊賞竒使拾遺補闕坐開黃閣髙視赤松然後與稷契夔龍比功論德豈徒蕭曹魏邴屑屑區區而已哉某實細人過䝉大集作知遇顧循微薄何敢祇承謹當畢力竭誠䇿駑磨鈍期效忠以報德奉知己以周旋文章小能何足觀者不任感荷之至上恩光曲歌詞啓許敬宗某啓少傅𤣥齡奉宣令㫖垂使撰恩光曲詞六言四章章八韻謹率愚管宣述睿懷自惟淺陋深懼不允一作懼允不合竊尋樂府雅歌多皆不用六字近代有三臺傾杯樂等艷曲之例始用六言今故雜以號字稍欲存於古體起草適畢未敢為定䝉假不獲面啓對封藁本上呈可不知宜伏聽後命謹啓上武侍極啓二首王勃某啓某聞𤣥螭掩耀光銷一作生赤堇之芒白鶴催輝影滅青胡之寶由是紫氛霄耿指牛漢而忘歸丹水神迷道一作蹈驪泉而罔悔其有龍文已逺輕圗剸兕之功魚目濫持自疑靈蛇之色循榮覽分朝聞夕可君侯締華椒閣席寵芝扃粲貂冕於金軒藻龜章於玉署月開鸞鏡懷精鑑以分形霜湛虬鍾藴希聲而待物吞九溟於筆海若控牛涔抗五嶽於詞峯如臨蟻垤馳魂霧谷欣逢紫岫之英驛思霞丘佇接青田之響某北巖曲藝東臯下節攀翰苑而思齊傃文風而立至迹疲千里未陪丹轂之逰葉契三英尚隔黃衣之夢謹憑洪貸輒録舊文輕敢上呈列之如右涓波有託望日谷以馳誠鍾鼓無施伏雷門而假息謹啓二某啓一昨不緣媒紹輕承盼飾祇寵相驚俯仰無地何則循方極弊尚虧風雨之間撫翼濡鱗猶失江湖之上况乎九天鵬術一代龍門榮枯舛致山川在目而可以追騰白日忘言於咫尺之書干突青雲投跡於尋常之境徒以北林增秀弱翰知歸東壑流謙纎鰭未己神交道合君侯昭片善之榮千載一時下走得長鳴之所是用謬憑髙奬曲撰蕪音游海無際過雷自讋雖黃金激憤指秦路而方窮蒼璧慙恩伏焦原而未逺謹啓上李常伯啓某啓某聞杞林騰秀羽族知歸暘谷流謙波臣有託然則朝光八聖尚欣牧豎之詞道濟五殘未隔輿人之誦謹憑斯義輒呈宸逰東嶽頌一首當仁不讓下走無慙於自媒聞善若驚明公豈難於知我龍門髙逺眇黃道而無階爵里既投呌丹閽而有地伏願暫停左右曲流國士之恩廣進芻蕘俯息樵夫之議輕陳徑捷退用倣徨上皇甫常伯啓二首某啓一昨奉命令寫新對臺䇿及前後舊文謹憑國士之恩敢進輿人之頌竊以龍鑣就路駑駿相懸鵲鏡臨春妍媸自逺亦有飛霜匝地蘭蕭䘖共盡之悲烈火埋岡玉石抱俱焚之慘然則知音罕嗣流水空存至寶不同荆山有淚君侯飾揚芻議提奬蕪詞白圭成再見之榮黃金定一言之重鵬飈既接仰雲徑而將趨龍阪可登指星臺而有望循襟佩德撫事知恩山嶽有輕河漢無極謹啓二某啓自恭陳薄伎祇奉話言咳唾成恩盼睞為飾征夫擊節方思孤竹之風壯士寒心實有長楊之作謹憑嚴命輕呈乾元殿頌一首將冀導江至海常以筆札見知南館西園遂與簮纓為伍德雖無盡攀驥尾而方遙生也有涯比鴻毛而非重謹啓上吏部裴侍郎啓某啓猥承衡鏡驟照階墀本慙刀筆之工虛荷雕蟲之眷殊恩屢及嚴命頻加責光耀於昏冥課宫商於寂寞進退惟谷憂喜聚門誠恐下官冒輕進之譏使君侯招過聽之議貴賤交失恩愛兩虧所以戰懼盈旬遲回改朔懷鄭璞而增愧捧燕珉而自耻某性惟懵昧識謝沉冥䝉父兄訓導之恩藉朋友琢磨之義好學近乎智力行近乎仁知忠孝為九德之源故造次必於是審名利為五常之賊故顛沛而思逺雖未之逮也亦有其志焉孔子曰言及之而不言謂之隱今者接君侯者三矣承招延者再矣抑亦可以言乎夫文章之道自古稱難聖人以開物成務君子以立言見志遺雅背訓孟子不為勸百諷一揚雄所耻茍非可以甄明大義矯正末流俗化資以興衰家國由其輕重古人未嘗留心也自微言既絶斯文不振屈宋導澆源於前枚馬張淫風於後談人主者以宫室苑囿為雄敘名流者以沉酗驕奢為逹故魏文用之而中國衰宋武貴之而江東亂雖沈謝爭騖適足兆齊梁之危徐庾並馳不能已周陳之禍於是識其道者卷舌而不言明其弊者拂衣而徑逝潜夫昌言之論作之而有逆於時周一作姬公孔氏之教存之而不行於代天下之文靡不一作道大壞矣國家應千載之期恢百王之業天地靜默隂陽順序方欲激揚正道大庇生人黜非聖之書除不稽之論牧童頓顙思進皇謀樵夫拭目願談王道崇大厦者非一木之材匡弊俗者非一日之衛衆持則力盡真長則僞銷自然之數也君侯受朝廷之寄掌鎔範之權至於舞詠澆淳好尚邪正宜深以為者也伏見銓擢之次每以詩賦為先誠恐君侯器人於翰墨之間求材於簡牘之際果未足以採取英秀斟酌髙賢者也徒使駿骨長朽真龍不降衒才飾智者奔馳於末流懷真藴璞者栖遑於下列易不云乎言行君子之所以動天地失之毫釐差以千里書不云乎弊化奢麗萬世同流餘風未殄公其念哉嗟呼蓋有識天人之幽致明國家之大體辨焉而不窮酌焉而不竭抱膝無悶盱衡自得彼悠悠之一作小技焉足為君侯道矣自非奉間宴接清談未可一二言也然竊不自揆嘗著文矣非敢自媒聊以恭命謹録古君臣讃十篇并序雖不足塵髙識之門亦可以見小人之志也伏願暫停左右少察胸襟觀述作之所存知用心之有地謹啓文苑英華卷六百五十六
