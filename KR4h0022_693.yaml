body:
  text: 文苑英華卷六百九十四宋李昉等編封建此門二疏並是請武后復政太子英華因第一篇及封諸孫事誤立封建門當改為復辟請復子正位疏一首請則天皇后復位皇太子疏一首行幸諫太宗畋獵疏一首諫蕃官仗內射生疏一首諫則天皇后幸三陽宫疏一首邉防諫太宗親征髙麗疏一首諫髙宗將伐髙麗疏一首言踈勒等凋弊疏一首言河朔人庶疏一首諫不破突厥疏一首言西蕃疏一首書籍請不賜吐蕃書籍疏一首請置官買書疏一首封建合作復辟已注在前請復子正位疏一作請封建皇家諸孫姪疏蘇安恆大定元年臣聞厯數在躬握璿璣者哲后天命攸屬臨寶極者聖人或揖讓而升或干戈以定二途一也古今共之伏惟皇帝陛下德合天地澤流河海庶物和平靈光充塞臣謂胥庭之化無以過也陛下欽先聖一作聖皇之顧託受嗣子之推讓豈不以極斯大節成此鴻勳應天順人于今二十餘年矣臣馳情緗素竊見女媧之代風俗簡朴人淳易理垂衣拱手不足可言洎漢朝以惠帝幼冲吕后監撫享國八嵗日不暇給雖傳簡䇿亦烏足道哉豈如陛下之在位五星同色四海無波陛下造明堂即祖文宗武之業也封中嶽則萬代一時之事也受寶圖即河圖洛書之瑞也功既大矣業既成矣即當捐其犬馬减其服御觀四大其如遺視萬乘其若脫陛下豈不聞一作思虞舜褰裳周公復辟良以大禹至聖成王既長推位遜國其道備焉故舜之於禹事祗族親旦與成王不離叔父且族親何如子之愛叔父何如母之恩今太子孝敬是崇春秋既壯若使統臨宸極或作扆何異陛下之身陛下年德既尊寶位將倦機務殷重浩蕩勞心一作心神何不釋位東宫自怡聖體陛下縱日慎一日雖休勿休其若大寶何其若人事何陛下輟金輪聖神等號即是厭倦萬機之象此謂天意也太子以奸臣枉搆久已自新相王推位青宫退居朱邸天下聞之莫不謳吟聖代此謂人事也故知天意人事鍾我聖朝大臣重祿不言近臣畏罪不諫使吾君有堯舜之位不行堯舜之道故書曰后德惟臣此之謂也臣又聞自古一作昔明王之以孝理天下者不見二姓而俱王也當今梁定河內建昌諸王等承陛下之䕃覆並得封王臣恐千秋萬嵗之後於事非便臣請黜為公侯任以間簿一作簡曹務臣又聞陛下有二十餘孫今無尺土之侯一作封此非長久計也臣請四面都督及要衝州郡分土而王之縱今年尚幼小未聞一作間養人之術臣請擇立師傅成其孝敬之道將以夾輔周室藩屏皇家使纍葉重光饗祀不輟斯為美矣豈不大哉臣今又聞胡賊侵邉覘中國陛下居總章申廟算赫然發怒分閫出師挽粟飛芻十室而九撓簳鑠刀以時繫年即士卒不遑府庫空竭此其謂也陛下若能告倦萬機推位太子分州列郡以王子孫自然四夷聞之繫頸面縳百姓聞之鼓腹擊壤史臣曰掩媧燧而邁胥庭後代聞之曰四三皇而六五帝豈虛也哉豈虛也哉臣山中一草萊耳無擊鐘鼎食之榮有碩學鴻儒之業臣來日跪而辭父父謂臣曰丈夫處代君子生年必當獻一謀畫一䇿厥塗不就草木何殊今上有堯舜之德下有稷臯之位古人有言欲安其家必先安其國欲安其親必先安其君當今天下雖安亦有未然之計故書曰若昔大猷制理於未亂保邦於未危此其謂也臣母又謂臣曰朝暮倚閭而望汝若能上干人主進書獻說揚名後代以榮父母是吾之子也臣感父母之言明發不寐今故杖䇿千里徒步三川雖牽拙而無同敢獻芹而竊抃陛下若採微臣一言之善成家國萬代之基臣之懇誠幸甚謹言此篇六百卷勸進進表門重出前已削去一作皆舊唐書本傳請則天皇后復位於皇太子疏武后前人臣聞忠臣不順時而取寵烈士不惜死而偷生故君道不明者忠臣之過歟臣道不軌者烈士之過歟昔者先皇晏駕留其顧托將以萬務殷廣令陛下兼知政舊唐書作其事雖唐堯虞舜居其位而共工伯鮌唐書歡兜在其朝間陛下骨肉之恩阻陛下母子之愛愚臣謂聖情以運祚將衰唐書作喪極斯大節天下之人謂陛下微弱李氏貪天之功何以年在耄倦而不能復子明辟使忠言莫進姦邪乘時文粹作姦佞成朋夷狄紛擾屠害黎庶陛下雖納隍興唐書作軫念亦何以唐書作亦罔能救此生靈臣聞天下者神堯文皇之天下也昔有隋失馭小人道長群雄駭鹿四海瞻烏皇唐親事戎旃鳳翔參野削平㝢縣龍飛踐極唐書作踐宸㰱血為盟指河為誓非李氏不王非功臣不封陛下雖居正統實因唐氏舊資文粹作基故詩曰惟鵲有巢惟鳩居之此言雖小可以喻大陛下自坤生德秉乾作主豈不以上符天意下順人心東宫昔在諒隂相王又非長子陛下恐宗祀中絶所以應其謳歌當今太子追回唐書作逗留年德俱盛陛下貪其寶位而忘母子深恩臣聞京邑翼翼四方取則文粹作所視陛下蔽太子之元良枉太子之神器何以教天下母慈子孝焉何以使天下移風易俗焉惟陛下思之將何聖顔以見唐家宗廟將何誥命以謁大帝墳陵陛下何故日夜積憂不知鐘鳴漏盡臣愚以為天意人事還歸李家陛下雖安天位殊不知物極則反器滿則傾故語曰當斷不斷反受其亂此之謂也陛下不如髙揖樞唐書作機務自怡唐書作適聖躬命史臣以書之令樂府以歌之斯亦太平之盛事也臣聞見過不諫非忠臣也畏死不言非勇士也臣何惜一朝之命而不安萬乘之國哉故曰茍利國家雖死可矣願陛下暫輟萬務唐書作稍輟萬機詳臣愚見陛下若以臣為忠則從諫如流擇是而用若以臣為不忠則斬取臣頭以令天下行幸諫太宗畋獵疏虞世南臣聞秋獮冬狩蓋為恆典射隼從禽備乎前誥伏惟陛下因聽覽之餘辰順天道以殺伐將欲推班碎舊唐書作躬推班掌親御皮軒窮猛獸之窟穴盡逸材之林藪夷凶剪暴以衛黎元收革擢羽用充軍器貞觀政要作實旌旗較獵唐書作舉旗校獲式遵古典唐書前篇作前古然黃屋之尊金輿之貴八方之所仰德萬國之所係心清道而行猶戒銜撅斯蓋慎重唐書作重慎防微為社稷計也是以馬卿直言唐書前篇作諌於前張昭變色於後臣誠微賤唐書作微賤㑹要作微末前篇作未察敢忘斯義且夫弧矢畢陳㑹要作且夫弧矢星畢唐書且天弧星畢所殪已多頒禽賜獲皇恩亦溥伏願特前篇作息獵車且韜長㦸不拒芻蕘之請降納涓澮之流袒裼徒傳任之群下貽範百王永光萬代此篇六百二十卷重出前已削去諫蕃官仗內射生疏髙宗薛元超上元三年臣元超臣聞春搜夏苗前王之令典教兵訓卒有國之宏規伏惟天皇以欽明馭㝢中外禔福暫因農隙駐蹕近郊一物一事並從减省在公在私莫不幸賴時惟令月景淑風和宸襟有豫百靈胥悅臣曲荷恩徽重得奉陪鸞駕下情欣躍實倍恆品但以馳原赴草親行聖躬飛蒼走黃頗留神矚控權竒之馬逸影雲趨矯倣徨之箭雄飛星落上截飛鳥下斃狡兔唯恐朽株蟻垤不宜輕之千金之子猶有垂堂之誡萬乘之尊豈忘銜撅之慮又諸蕃首領參豫羽獵天皇以德綏懷遂亦操弓持矢既非族類深用為虞臣雖庸劣嘗聞前古今冒死以為言者非謂出之敢諫惟望經川谷不測之地入藂林可畏之途緣龍駟以揚鑣儼風輿而按節三韓雜種十角渠魁勿使咫尺天顔處於交㦸之外䖍思宗廟之重允副黎元之心凡在懷生幸甚幸甚臣之性命惟天皇宥之臣之冠冕惟天皇賜之謹冒死以聞諫則天皇后幸三陽宫疏張說邉防諫太宗親征髙麗疏禇遂良臣聞有國家者譬諸其身兩京等於腹心四境方乎手足他方新唐書作列裔絶域若此一作在身外臣近於坐下伏奉口勑布誥臣下云自欲伐遼臣數夜思量不達其理髙麗王為陛下之所立莫離支輒殺其主陛下討逆收地斯實承機關東賴陛下德澤久無征戰但命二三勇將新唐書作一二慎將發四五萬人一作發兵四五萬飛石輕梯取如回掌大聖二字一作夫聖人有作必履恆規貴能克平凶亂駕馭才傑惟陛下𢎞兩儀之道扇三五之風提厲人物皆思效命昔侯君集李靖所謂庸夫猶能掃萬里之髙昌平千里之突厥皆是陛下發縱指示爾一無此字聲歸聖明臣旁求史籍詳乎近代為人之主無自伐遼者人臣往征則有之矣漢朝則荀彘楊僕魏世一作代則毌丘儉王傾司馬懿猶為人臣慕容真僣號之子皆為其主長驅髙麗虜其人民間城平莽一作削平城壘陛下立功同於天地美化苞於古昔自當超邁於百王豈止俯同於六子昔翦平冦逆大有爪牙年齒未衰猶堪任用匪惟陛下之所使亦何行而不克方今太子新立年實幼小自餘藩屛陛下所知今一旦棄金湯之全渡遼海之外臣忽三思煩愁並集大魚依於巨海神龍據於川泉此謂人君不可離一作輕而逺也且如長遼之左或遇霖雨霪水潦騰波平地數尺夫𤣥莵濵海途深難測一作帶方𤣥莵海途深渺非萬乘所宜行踐東京太原渭中之地東撝可以為聲勢西指足以摧延陀其於西京徑路非逺為其節度以設軍謨一作某繫莫離支頸獻皇家之廟此實處安全之上計社稷之根本特乞天慈一垂省納一作察一作皆舊唐書本傳諌髙宗將伐髙麗疏李君求臣聞心之痛者一作病不能緩聲事之急者不能安言性之忠一作慈者不能隱情且食君之祿者死君之事今臣食陛下之祿矣其敢愛身乎臣聞司馬法曰國雖大好戰必亡天下雖平一作安忘戰必危兵者凶器戰者危事故聖主明王重行之也憂人力之盡恐府庫之殫懼社稷之危生中國之患故古人云務廣德者昌務廣地者亡昔秦始皇好戰不已至于一作於失國是不愛其內而務其外故也漢武逺討朔方殆乎萬里廣拓南海分為八郡終於戶口减半國用空虛至於末年方垂哀痛之詔自悔其失彼髙麗者遐荒小醜潜藏山海之間得其人不足以彰聖化棄其地不足以損天威何至乎疲中國之人傾府庫之實使男子不得耕耘女子不得蠶織陛下為人父母不垂惻隱之心傾府庫二字作其有限之資貪其一作於無用之地設令髙麗既滅即不得不發兵鎮守少發則兵威不足多發則人心不安是乃疲於轉戍萬姓無聊生也萬姓怨怨一作無聊則天下敗矣天下既敗陛下何以自安故臣以為征之不如不征滅之不如不滅一作皆舊唐書夲傳言踈勒等凋弊疏文粹作請罷百姓西戍踈勒等四鎮疏狄仁傑武后神功元年臣聞天生四夷皆在先王封域舊唐書作疆之外故東距滄海西隔流沙北橫大漠南阻五嶺此天所以限夷狄而隔中外也自典籍所紀聲教所及三代不能至者國家盡兼之矣此則今日之四境已逾於夏殷者也詩人矜薄伐於太原美化行於江漢是則舊唐書作則非前代之逺裔而國家之域中至前漢時胸奴無嵗不犯唐書作陷邉殺略舊唐書作掠吏人後漢則西羌侵軼漢中東冦三輔入河東上黨幾至洛陽由此言之則陛下今日之土宇過於漢朝逺矣若其用武荒外邀功絶域竭府庫之實以爭磽確不毛之地得其人不足以增賦獲其土不可以耕織茍求冠帶逺夷之稱不務固本安人之術此秦皇漢武之所行非五帝三皇之事業也若使越荒外以為限竭資財以騁欲非但不愛人力亦所以失天下舊唐書文粹並無下字心也昔始皇窮兵極武以求廣地男子不得耕於野女子不得蠶於室長城之下死者如亂麻於是天下潰叛漢武追髙文之宿憤藉四帝之儲實於是定朝鮮討西域平南越擊胸奴府庫空虛盜賊蜂起百姓嫁妻賣子流離於道路者萬計末年覺悟息兵罷役封丞相為富人侯故能為天所祐也昔人有言曰與覆車同軌者未嘗安此言雖小可以喻大近者國家頻嵗出師所費滋廣西新唐書作右戍四鎮東新唐書作左戍安東調發日加百姓虛弊聞乎西域舊唐書文粹作問乎西域事等石田費用不支有損無益轉輸靡絶杼軸殆空越磧踰海分兵防守行役既久怨曠益多昔詩人云王事靡盬不能藝黍稷豈不懷歸畏彼罪罟念彼蒸舊唐書作共人涕零如雨此則前代怨思之詞也上不是恤則政不行而而字唐書作政而不行則邪新唐書作害下同氣作邪氣作則蟲螟生而水旱起若此雖禱祀百神不能調隂陽矣方今關東饑饉蜀漢逃亡江淮已南徵求不息人不復業則相率為盜本根一搖憂患不淺其所以然者皆為逺戍方外以竭中國爭蠻貊不毛之地乖子育舊唐書作養蒼生之道也昔漢元納賈捐之之謀而罷朱崖郡宣帝用魏相之䇿而棄車師之田豈不欲慕尚虛名並舊唐書作蓋憚勞人力也近貞觀年中尅平九姓册李思摩為可汗使統諸郡蓋以夷狄叛則伐之降則撫之得推亡固存之義無逺戍勞人之役此則近日之令典實文粹無實字綏邉之故事竊見阿史那斛瑟羅新唐書有皆字隂山貴種代雄沙漠若付舊唐書文粹作委之四鎮使統諸蕃封為可汗遣禦冦患則國家有繼絶之美荒外無轉輸之役如臣所見請捐四鎮以肥中國罷安東以實遼西省軍費於逺方并甲兵於塞上新唐書作要塞則恆代之鎮重而邉州之備實矣况撫綏夷狄蓋防其越逸茍無侵侮之患則可矣何必窮其窟穴與螻蟻計較長短哉且王者外寧必有內憂蓋為不勤修政故也伏惟陛下棄之度外無以絶域未平為念但常舊唐書作當勑邉兵謹守備蓄鋭以待敵待其自致然後擊之此李牧所以制胸奴也當今所要者莫若令邉城警守備逺斥堠聚軍實蓄威武以逸待勞則戰士力倍以主禦客則我得其便堅壁清野則冦無所得自然賊深入必有顛躓之慮淺入必無獲虜舊唐書作虜獲之益如此數年可使二虜不擊而服矣言河朔人庶疏武后時臣聞朝廷議者以為契丹作梗始明人之逆順或因迫脅或有願從或為僞官或為招慰或兼外賊或是土人跡雖不同心則無别誠以山東雄猛由來重氣一顧之勢至死不回近緣軍機調發復重家道悉破或至逃亡拆一作剔屋賣田人不為售內顧生計四壁皆空重以官典侵漁因事而起取其髓腦曾無愧心修築城池繕造兵器州縣役使十倍軍機官司不矜期之必取枷杖之下痛切肌膚事迫情危不修禮義愁苦之地不樂其生有利則歸且圖賖死乃君子之愧辱小人之常行人猶水也壅之則為泉疏之則為川通塞隨流豈有常性昔董卓之亂神器播遷及卓被誅部曲無赦事窮變起毒害生人京室邱墟化為禾黍此由恩不普浹失在機先臣一讀此書未嘗不掩一作廢卷歎息今以負罪之人一作伍必不在家露宿草行潜竄山澤赦之則出不赦則往山東群盜緣兹聚結臣以邉塵暫起不足為憂中土不安以此為事臣聞持大國者不可以小理事廣澤一無澤字者不可以細分人主恢𢎞不拘常法罪之則衆情恐懼恕之則反側自安伏願曲赦河北諸州一無所問自然人神通一作道暢率土歡心諸道一作軍凱旋得無侵擾一作皆舊唐書本傳諫不破突厥疏中宗盧甫臣聞有虞和平一作咸熙苗人逆命殷宗大化鬼方不賔則戎狄侵軼一作交侵其來逺矣漢髙帝納婁敬之議與胸奴和親妻其宗女賂以巨萬冒頓益驕邉冦不止則逺荒之地凶獷一作悍之俗難以德綏可以威制而降自三代無聞上䇿今胸奴不臣擾我亭障皇赫斯怒將整元戎臣聞方叔帥師功歌周雅去病耀武勳烈燕山則萬里折衝在於擇將春秋謀元帥取其說禮樂敦詩書晉臣杜元凱二字一作預射不穿札而建平吳之勳是知中權制謀不在一夫之勇其蕃將沙吒忠義等身雖驍悍志無逺圖此乃騎將之才本不可以當大任且師出以律將軍死綏秦尅長平趙子一作括受戮胡去馬邑王恢坐誅則棄軍有刑古之常典近者鳴沙之役主將先逃輕挫國威須正邦憲又其中軍既敗陳亂矢窮義勇之士猶能死戰功合紀録以勸戎行賞罰既明將士盡節此擒敵之術也臣聞以蠻夷攻蠻夷中國之長算故陳湯統西域而郅支滅常惠挫烏孫而胸奴敗請購辨勇之士班傅之儔旁結諸蕃與圖攻取此又掎角之勢也臣聞昔置新秦以實塞下宜因古法募人從邉選其勝兵免其行役次廬伍明教令則攻一作狃習戎事䆒識夷險其所虜獲因而賞之近戰則守家逺戰則利貨趨赴鋒鏑不勞訓誓朝賦楊栁夕歌枤杜十年之後可以久安臣聞漢拜郅都胸奴避境趙命李牧林胡逺竄則朔方之安危邉城之勝負地方千里制在一賢其邉州刺史不可不慎擇得其人而任之搜乘訓兵屯田積粟謹候一作設𤇺燧飾練一作精飾戈矛來則懲而禦之去則備而守之此又古之善經也去嵗亢陽天下不稔利在保境不可窮兵使內郡黔黎各安其業擇其宰牧輕其徭賦事無過舉爵不以私愛人之財節其浮侈一作役惜人之力不廣臺榭察地利天時以趨耕獲命秋獮冬狩以教戰陳則數年之後有勇知方帑藏山積金革犀利然後整六軍絶大漠雷擊萬里風掃二庭斬蹛林之首一作酋懸藁街之邸使百蠻震怖五兵藏戢則上合天時下順人事理內以及外綏近以來逺以惠中國以盡四方臣少慕文儒不習軍旅竒正之術多愧前良獻替是司輕陳瞽議言西蕃疏臣聞兵者凶器不獲已而用之今西蕃莫不順軌縱鼠竊狗盜有戍卒鎮兵足宣式遏之威非無赫斯之怒此師之出未見其名又聞安不忘危理必資備自近及逺强幹弱枝是以漢實關中徙諸豪族今關輔户口積久逋逃承前先虛見猶未實屬北虜犯塞西戎駭邉凡在丁壯征行略盡豈宜更擇驍勇逺資荒服及一萬人行詣六千餘里咸給遞䭾並供熟食道次州縣將何以供秦隴之西人户漸少凉州以北沙磧悠然遣彼居人如何得濟又萬人賞賜費用極多萬里資糧破損尤廣縱令必剋其獲幾何儻稽天誅無乃其損請令計議所得較其多少即知利害况用者必費獲者未量何要此師行頓空畿甸且上古之時大同之化不獨子子不獨親親何隔華夷務均安靜洎王道謝古帝德慙淳猶尚綏懷不崇征伐有占風覘雨之客無越海逾山之師其後漢武膺圖志恢土宇西通絶域北擊胸奴雖獲竒珍多斬首級而中國疲耗殆至危亡是以俗號升平君稱明盛者咸指唐堯之代不歸漢武之年其要功不成者復焉足比議惟陛下圖之書籍請不賜吐蕃書籍疏𤣥宗于休烈開元中臣聞戎狄國之冦也經籍國之典也戎之生心不可以無備典有恆制不可以假人傳曰裔或作戎不謀夏夷不亂華所以革其非心在于有備無患昔者東平王入朝求史記諸子漢帝不與蓋以史記多兵謀諸子雜詭術夫以東平漢之懿戚尚不欲示征戰之書今西戎國之冦讐豈可貽經典之事且臣聞吐蕃之性慓悍果决敏情恃一作特鋭喜學不回若達於書必能知戰深於詩則能一無能字知武夫有師千之試深於禮則知月令有廢興之兵深於傳則知用師多詭詐之計深於文唐䇿有選字則知往來有書檄之制何異借冦兵而資盜糧也臣聞魯秉周禮齊不加兵吳獲乘車楚屢奔命一以守典存國一以喪車一作法危邦可取鑒也且公主下嫁從人逺適異國合務一作合慕新唐書作當用夷禮返求良書愚臣料之恐非公主本意也慮有奔北之類勸教於中若陛下慮失蕃情以備國信必不得已請去春秋新唐書有失春秋三字當周道一作德既衰諸侯强盛禮樂自出戰伐交興情僞於是乎生變詐於是乎起則有以臣召君之事取威定霸之名若與此書國之患也傳曰于奚請曲縣繁纓仲尼云惜也不如多與之邑惟名與器不可假人狄固貪婪貴貨易土正可錫之錦綺厚以玊帛何必率從其求新唐書作無足所求以資其智臣忝列位職刋校祕籍一作忝叨列位職刋祕籍實痛經典棄在夷狄一作戎狄昧死上聞伏一無伏字惟陛下深察一作皆舊唐書吐蕃傳請置官買書疏羅衮臣聞竊謂堯舜所以成其聖者稽古之力也故書曰若稽古帝堯又曰若稽古帝舜是則為國之要在乎順考古道而已古事之效布在群籍兹歷代所以盛藏書之府不可一日而闕也臣伏念祕閣四部三館圖書亂離已來散失都盡一為墜闕二十餘年陛下追蹤往聖勞神故實嵗下明詔旁求四海或遣使搜訪或購以官爵亦已久矣然而一編一簡未聞奏御加以時玩武事不急文化若非别降聖謨無因可致臣今伏請陛下出內庫財於都下置官買書不限經史之集列聖實録古今傳記公私著述凡可取者一皆市之部帙俱全則價有差等至於零落雜小每卷不過百錢率不費千緡可獲萬卷儻或稍優其直則逺近趨利之人必當捨難得之貨載天下之書聚于京師矣不惟充足書林以備宣索今三朝實録未修無所依約便期因此遂有所得斯又朝廷至切之務也文苑英華卷六百九十四
