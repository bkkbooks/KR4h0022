body:
  text: 文苑英華卷五百十八宋李昉等編祭祀三封君諸侯大夫門十九道封君祭判三道諸侯祭判一道大夫祭判五道三命判四道家廟失祭判一道牢祭有違判五道封君祭判乙祖是始封君祭以不毛所司將為失禮不伏對封植之規盛自三代享祭之設編諸五禮故存欲其貴梁竦發勞人之言没憂其祀若敖興餒而之歎乙祖幸攀日月視列山川堂構不貽於謀孫廟食遂虧於厥祖乃云可薦孰致其嚴洪業不享其牲牷明懐誰歆其黍稷所司重從周之訓紏以常刑愚者昧反魯之言尚多紛訟彼不愛禮奚能捨諸須寘恒辜雅符通議同前禮經三百列爵五等食采地以居榮封茅土以建號代不絶祀人其捨諸乙以孫謀瞻言祖德精意以享展如在之儀利用建侯思一作乃不復之始詢諸家祭酌彼周官薦羞之容無聞於肥腯不毛之事有異於粢盛且物貴緣情猶言禮不下庶而乙非妄作何妨儉而合禮既能師古奚事驚愚所司告言頗為漏畧大易自宜窒訟春秋寧貸有詞同前張鼎百王率由禮建方社六服咸若寄切維城列玉瑞以推尊錫圭田以表德緩分四色爵配五等開國稱孤彼既光於祖業列筵設奠此何昧於家聲言念庀牲空慙掩豆雖展敬於如在果見嗤於不毛葬以大夫禮既隔於問子爵為侯氏祭豈及於謀孫親牽之用頗乖受脤之名應缺自須聞義能徙何不以欲從人諸侯祭判私廟三室將置新主家老毁檐主人訟之所由以非禮免之對閻伯與毁廟遷主告終稱嗣父昭子穆將順從時之典易檐改塗恐墜思先之戚儀雖仍舊禮則謀新初致孝以觀德終因心而崇敬嵗聿云暮祭則有倫守宗祏之威儀率由殷奠考新宫之成式䖍奉外除所謂斯人未明古道訟彼家老自貽不臧大夫祭判有五品祭寢不祭廟饌用索牛御史劾於寢則已陋於饌則已泰訴云禮令無違對禮有九命聞之典秩爵惟五品存乎令制以禄饗親追崇孝敬之道以賢致位周旋名器之間從事於斯無宜失墜執禮以動何所遅廻然則吾從大夫之后祭中寢而非爽奉守先王之典用太牢而為過今則無廟予欲何之索而致牲古亦詳矣憲臣按法操持一作柄特深訴者執詞情理可據同前劉昇同國政通班書崇明祀朝則齒爵載分於羔雁祭必毛牲取類於豺獺惟彼五品薦于四時籩豆聿脩履濡霜而或惕寢門是祭因掃地而致誠克恭行葦之酌或備采蘋之奠雖夫子立言且云寧儉而聖人行禮必貴從宜恭已習常情稱偪下因心逹孝事則由𠂻屬避馬申威出漢臺而有問索牛是劾撫周禮而猶疑饌取於豐祭從於薄過如不及吾恐失之必存著甲之令一作命請恕先庚之罰同前斐士淹命分九等以庸制爵禮有五經莫重於祭先王所以致理孝子為能饗親乃如之人兹率厥典敬無忘於如在道有孚於不黷黍稷惟馨籩豆有楚哀樂相半必覩僾然之容軒裳已登非復傷哉之歎且禮或豐殺法從沿革無廟於寢在今令而則然求牲而饌徵古訓而奚失嗟夫御史所劾恐傷曽孫是宜同前張鼎廟者曰貌死者曰歸神人異業敬則如在牲牷必備祭而勿黷秩有五品榮加三命誠乃錫類孝能尊先春露既濡増怵惕之感秋霜已降發悽慘之心雖欲饗親孰為知禮祭於寢也自合刲羊祀諸廟焉方聞用犢庖丁展事雖則無全鄒人將入如何不問令無立廟理歸於寢祭設庶人之位薦以大夫之牲索而用之非其古也蘋繁可重豈煩介葛之犧黍稷非馨寧展蒸嘗之禮精意以饗神其吐諸禮雖徵於曲臺罪自招於石室欲加之罪其無辭乎同前人生最靈魂變為物儀陳祭禮祀分物類品第有差等威是列秩牽朱綬雖登命於大夫廟闕丹楹未為能於孝子祭寢非約用牛是泰儉以偪下已聞晏子之節禮而僣上更知管仲之罪蘭臺陔履雖陳膳栢署彈違竟持霜古訓是則今令未裁且祭寢祭廟既有秩而分求牛索牛豈無故而殺劾而是誡誠窒惕而有孚訴者非辜終屨校而無咎三命判乙仕登三命舉以特牲祀以少牢人吿其僣加於舉禮也對孝自天經禮為人紀事有動於神理迹無昧於生成乙則大夫位登右職庶極四時之享以符三命之貴飲食讌樂特牲備舉珪璧嚴奠少牢是加用誠信以敷心資豐潔而致薦是實一作寳其訓何糾其違徵之於前固不可罰同前顔真卿侑食以樂執恭展禮以辨等威以明貴賤乙以筮仕䇿名清朝從大夫之後既登三命循先人之祭有事十倫已而鏗鏘具舉和平不爽苾芬承祀胡考之寜舉特且叶於禮經加牢永虧於祀典人吿其僣罔知攸伏一作徒同前盧先之易陳殷薦書列禋宗於昭考祀作樂崇德况春氷風泮河濱有獺祭之魚秋葉霜凋山林有豺祭之獸㣲物尚爾一作具生靈一作爾靈伊何且國有十倫仕登三命尊卑式序威儀孔昭車服以庸祀享寧僣矧惟舉禮無乃用心凡舉特牲者克從其祀少牢者實符於班失或歸於訟人禮不黷於君子為之過矣其在兹乎同前馬㧥聖人成能設位待仕君子脩業考行入官等威有倫名器不假一作紊乙爵登寵命位列周行舉善有存乎禮物敬享無虧於豐殺既感霜露不忘豺獺是以用禴於焉展牲信以大夫之禮能行孝子之志緣祀而加誠不違於舊典或人妄告固未適於時宜雖二簋之可享豈少牢之為僣此其禮歟固無尤矣一作焉家廟失祭判為大夫家廟初成將享之夕牲死人吿其違禮甲稱本牲對宗廟為先是營宫室犧賦為次則備牲牷甲運偶光華一作先舉羽成儀餙必復其始遂見稱家利渉大川爰假有廟一昭一穆佇列蒸嘗經之營之旋終黝堊詳夫典禮崇彼祔儀方有聞於容聲何不務於豐潔且始養為畜卜日曰牲未就質明之期忽斃致齋之夕萬化先徃寧俟刲刳三廟便陳實忘嚴敬用過乎儉誠不在斯事神則難深宜捨此祭器不鬻明君子之雖貧牲斃則埋乃先王之制禮靡尋典訓茍務所懐縱匪若敖之憂終近晏嬰之隘祭則受福義必闕如刑以正邪孽何可逭以本牲而文過豈精意而為心實昧惟馨宜懲彼黷牢祭有違判孟壬具少牢祭仲已遽執畢入賛者吿已有違已云以備失也得禮之中何乃妄吿俱詣博士定博士曰禮和為貴豈在爭乎科賛者不伏對惇宗將禮以祗祀事命滌宿宫存乎饗獻執觚奉爵理必祖於敬恭藉茅設洗事無忘於豐潔惟壬榮班命數羔鴈同行擇日筮尸將行懿祀充牲視物且祭為先列羞鼎於門祊升爼載於階序巾盥在手餚核旅陳配平仲豚肩之陋思由也户堂之禮仲已恪恭所職持畢而來仰觀好雨之星欲理如湯之鼎此乃思無出位舉不失宜賛者有言事同差舛博士科罰理宜當深故椒舉規過須有媿於國僑張湯用法將無慙於虞詡請從寛典無寘急刑同前張綬總目作緩我將我享維羊維牛籩豆牲牢非無升降大夫命士亦有等威經禮孔明宗祀無替永言特牲之饋寔曰宗人之職筮尸筮日以崇賔主之儀東序東房克明兄弟之位况舉鼎告備雖符將禮執畢先入未或愆儀既南靣以當階又尊主而備失其動也中伊糾胡為適明賛者無稽更彰博士同惡周旋既無失墜小言則亦何傷造次曽靡愆違知和豈能為貴惜其禮物博士不利於操刀正以刑書科者乃得其資斧既厚誣於君子亦淺之為丈夫將子甘心無或騰口同前祭者曰薦申其至誠鬼之言歸于以明德欲祠祖禰一作欲祀禰祖必擇牲牷茍爾儀之不脩則其咎而焉徃孟壬三命是服匪懈既無忝於孝孫將有事於皇祖宿尸致祝初設位於廟中執豆陳籩終展禮於堂上相彼祀事居然可觀饎以少牢俾申於孝享用其柔日願接於神明周旋自適於等威終始不忘於齋敬執畢而入信鄒人之知禮卒事無規奚賛者之妄吿徒質疑於博士合書罪於斯人同前李子珣祭惟備物往籍攸先禮以貴和前賢所重茍初事之不曠在疾徐之可容相彼孟壬將有事於牲具瞻言仲已乃無何而畢入誠則恭不失備遽而中規俎豆之事載陳金石之音卒奏夫惟賛者忝預於斯既曰偕行還宜共濟安得縱茲大惑發彼小瑕殊成子之不恭禍徵受脤異陳佗之如忘舋起臨盟以懈怠之見規則聞前史因備失而歸罪且未合宜事貴無違禮崇得中請從博士之議庶叶隨時之理眷言賛者可無詞乎同前張子琳祭禮崇孝祀事孔一作克明既前期筮賔亦將獻諏日於是闢廟門以致孝所敬在供列有司而行事不舉違犯孟王義重五經職惟三命有豐卷之位不請因以用特牲此句疑明周公之典據少牢而乃給然尸祝甚嚴雷通作罍洗具陳剛鬛柔毛則云肥腯簠簋普淖所謂馨香宰人銜命以抽扄見儀禮注扄䤤也仲已遽資於執畢又以舉肉在禮寔曰無違賛者則那毎事奚其不問患既自掇爭乃増羞博士勿謂於貴和賛者終宜於伏罪文苑英華巻五百十八
