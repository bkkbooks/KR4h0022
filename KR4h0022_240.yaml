body:
  text: 文苑英華卷二百四十宋李昉等編酬和一吳均十首周興嗣三首沈約二首任昉一首王僧孺一首庾肩吾一首蕭子雲一首裴子野一首劉孝綽三首王筠二首袁朗一首吕讓一首庾信二首李那一首王胄二首周若冰一首孫萬夀三首庾抱一首酬聞人侍郎别三首吳均悵然心不樂萬里尚類聚作向集作何悠悠凌朝集作湖日憩枉渚薄暮遵江洲君往青山上類聚集本並作居住青門上我發灞陵頭相思自有處明月清風樓類聚作春風明月樓集作風月在南樓二整棹北川湄回首望城邑林踈風至少山髙雲度急共懷萬里心各作千行泣欲見終無緣思君空佇立三舉首川之折離鴻四向飛子憐三湘薛集本薛與薛同莎也此字相類當考我憶五陵薇但使同喜遁何必共輕肥思君美如玉不覺淚沾衣此首英華不載據集本添入酬郭臨蒸類聚作丞吳均聞君立名義我亦倦晨征馬在城上蹀劔自腰中鳴白日遼川暗黃塵隴坻生類聚作驚願君但銜酒新類作深知有素誠和蕭洗馬古意前人賤妾思不堪採桑渭城南帶減連枝繡髮亂鳯凰簮花舞依長薄蛾類聚作鵝飛愛緑潭無由報君德流涕向春蠶酬周參軍前人日暮憂人起倚户長一作匣悵無歡水傳洞庭逺風送雁門寒江南霜雪重相如衣服單沉雲隱喬集作髙樹細雨滅層巒且集作是當對樽酒朱絃永夜彈答桞惲前人清晨發隴西日暮飛狐谷秋月照層嶺寒風掃髙木霧露夜侵衣關山曉催軸君去欲何之參差間原陸一見終無緣懷悲空滿目酬蕭新浦王洗馬三首前人始可結交者文酒滿金壺圍棊帝臺局繫馬秦王浦長劔皆玉具短笛悉銀塗送歸日愁滿留客袂紛吾今成柏山上秋風星散烏二思君出江湄慷慨臨長薄獨對東方酒誰舉指南酌崇蘭白帶飛青鵁紫纓絡一年流淚同萬里相思各胡為舍旃去故人在宛洛三僕本二陵徒英豪一作俊多久要角抵良家兒期門惡年少身紆丈二組手擎尺一詔問子行何去髙帆艤江干今夜杯酒别明朝江水邊莓莓看細雨漠漠視濃煙颯灑八銅箭低昻五會船欲知故人者江南共採蓮悒然心不樂跨馬出城壕觀濤看白鷺望草見青袍青袍行中把蔽草覆平野公子不垂堂紛紛吾一作紛吾故交者肘懸辟邪印屋曜鴛鴦瓦翩翩流水車蕭蕭曳練馬是時君别我青莎沒馬蹄連連文蠶繭鷖鷖伺朝雞今日豫懷友積雪滿東西答吳均三首周興嗣明燈照暗室邊韶對趙一但酌中山酒唯甘江浦橘風動雲入箕雨至月離畢王丹贈不拜後漢王丹贈陳遵以不拜出東觀記是我相知日二驚鳬起北海儀鳯飛上林騫低不同翼歡楚亦殊音曀曀夕雲起落落曉星沉李陵報蘇武但令知我心三昔别襄城村同會長安市誰學萊蕪甑本得王喬履階前養素鶴池中飴赤鯉一往玉壺上兼復見蕭史酬孔通直逖懷蓬居沈約閶闔既洞啓龍樓亦髙闢兩宫集鸞步二闈類聚作闥引通籍伊爾事清途紛吾供一作驚賤役酬謝宣城朓前人王喬飛鳬舄東方金馬門從宦非宦侣避世非避喧揆余發皇鑒短翮屢飛翻晨趨朝建禮晚沐卧郊園賔至下塵榻憂來命緑尊昔賢侔時雨今守馥蘭蓀神交疲夢寐路逺隔思存答劉孝綽任昉閲水既成瀾藏舟遂移壑彼美洛陽子投我懷秋作久敬類誠言吹噓似嘲謔兼稱夏雲盡復陳秋樹索詎慰耋嗟人徒深老夫託秋日愁居答孔主簿王僧孺見類聚首夏雲物善晝暑旦猶清日華隨水泛樹影逐風輕依簾野馬合當户昔邪生物我一無際人鳥不相驚儻過北山北聊訪法髙一作喬卿法真字髙卿見後漢逸民傳和衛尉新喻侯巡城口號庾肩吾維城寄右戚巡警屬勤王南瞻通灞岸北眺指橫芒入漢飛延閣臨雲上建章步逐天津逺城隨秋夜長露槐落金氣風寮上新涼東郊望春酬王建安雋晚逰蕭子雲見類聚金塘緑泉滿上園梨蘂落蛺蝶戀殘花黃鶯對餘蕚芳菲滿郊甸蕙氣生蘭薄子家冠蓋里我館幽棲郭緑桞蔭長溪便橋限清洛相去能幾許一水終踈索答張真威一作成臯裴子野胸奴時未服一作滅連年被甲兵明君思將帥方聽鼓鼙聲吾生委逸翮撫劔起徂征非將一作徒慕辛李聊欲逞良平出車既方軌絶漠且橫行豈伊長纓繫行見黃河清雖令懦夫勇念别猶有情感子盈篇贈握玩以為榮跂豫振凱歌一作旋凱含毫備勒成一作銘酬陸長史倕劉孝綽王粲始一别猶且集作自歎風雲况余屢之逺與子亟離群如何持此念復為今日分分悲宛如昨弦望殊揮霍行舟雖不見行程猶可度度君路應逺期寄新詩返相望且相思勞朝復勞晚集作相望接風煙相思勞嵗晚薄暮閽人進果得承芳信集作訊殷勤覽妙書留連披雅韻洌洲財集作才賦總慈山行集作非旅鎮已切臨睨情遽動思歸引歸歟不可即前途方未極覽諷欲諼誚研尋還慨息來喻朂雕金比質非所任虛薄無時集作舉無用徘徊守故林屏居青門外結宇霸城隂竹庭已南映池牖復東集作西臨喬枝貫簷上垂條拂户隂條開風暫入葉合影還沉帷屏溽早露階霤擾昏禽衡門謝車馬賔席簡衣簮雖愧陽春曲寧無流水琴蕭條聊集作寡屬和寂寞少知音平生竟何託懷抱共君深一朝四美廢方見百憂侵曰余濫官守因之泝廬九水接淺源隂山帶荆門集作臺右從容少職事疲病踈僚友命駕獨尋幽淹留宿廬阜廬阜擅髙名岧岧集作迢陵太清舒雲類紫府標霞同赤城北山輪難進東封馬易驚未若兹山險車騎息逢迎石橫路似絶徑側樹如傾蒙籠乍一啓磊硊無暫平倚巖忽回望援蘿遂上征乍觀秦帝石復憩周王城交峯隱玉流對澗距金楹風傳鳯臺琯雲度洛濵笙紫書時不至丹爐且未成無因追羽翮及爾宴蓬瀛蓬瀛不可託悵然反城郭日斜歸路逺偶憩庵園閣雖異商人勞聊比化城樂影塔圖花樹經臺總香藥月殿曜朱幡風輪和寶鐸園楥即重嶺階基仍巨壑朝湲響甍棟夜水聲帷薄餘景騖登臨方宵盡談謔談謔有名僧惠義似傳燈逺師教逾闡生公道復𢎞乘非汲引法善忘招報能積迷頓已悟為歡得未曽為歡誠已往坐卧猶懷想况復心所親兹地多諧賞惜哉無輕軸更泛輪集作淪湖上可思不可見離念空盈蕩賈生傅南國平子相東阿優逰匡贊罷縱橫辭賦多方才幸同貫無令絶詠歌幽谷雖云阻煩君計吏過答何記室遜劉孝綽逰子倦飄蓬瞻途杳未窮晨征凌迸水暮宿犯頽風出洲分去燕向浦逐歸鴻蘭芽隱陳葉荻苖抽故叢忽憶園間桞猶傷江際楓吾生棄武騎髙視獨餘雄既殫孝王産兼傾卓氏僮罷籍睢陽囿陪謁建章宫紛余似鑿枘方圓殊未工黑貂久自敝黃金屢已空去辭追楚穆還耕偶漢馮巧拙良為異出處嗟莫同若厭蘭臺右見訪灞陵東答張左西前人相思如三月相望非兩宫持此連枝樹暫作背飛鴻若人惠思我摛藻蔚雕蟲仙掌方晞露靈烏正轉風力假排重翮相與北山叢和衛尉新喻侯巡城口號王筠閶闔曖已昏鈎陳杳將暮棲烏城上返晚雀林中度屯衛時巡警凝威肆安步閣道趨文昌禁兵連武庫銅烏迎早風金掌承朝露罘罳分曉色睥睨生秋霧維城任寄隆空想靈均賦伊余方病免丘園保恬素酬張淮南别前人故人杯酒别天清明月亮露下寒葭中風起秋江上衣染潺湲淚棹泛參差浪匕首直千金七寶雕華裝生離何用表賴此持相餉和洗掾登城南坂望京邑袁朗二華連陌塞九隴統金方奧區稱富貴重險擅雄強龍飛灞水上鳯集岐山陽神臯多瑞迹列代有興王我后膺靈命爰求宅兹土宸居法太微建國資天府玄風融黎庶德澤浸區宇醒醉各相扶謳歌從聖主南登少陵岸還望帝城中帝城何鬱鬱佳氣乃蔥蔥金鳯凌綺觀璇題敞蘭宫復道東西合交衢南北通萬國朝前殿群公議宣室鳴珮含早風華蟬曜朝日柏梁宴初罷千鍾歡未畢端拱肅巖廊思賢聽琴瑟逶迤萬雉列隱軫千閭布飛甍夾御溝曲臺臨上路處處歌鍾鳴喧闐車馬度日落長楸間含情兩相顧是月冬之季隂寒晝不開驚風四靣集飛雪千里回狐白登廊廟牛衣出一作棄草萊詎知韓長孺無復重燃灰和入京吕讓俘囚經萬里憔悴度三春髮改河陽鬢衣餘京洛塵鍾儀悲去楚隨會泣留秦既謝平吳利終成失路人奉報寄洛州庾信舟師會孟津甲子陳東鄰雷轅驚戰鼓劔室動金神幕府風雲氣軍門關塞人長旍析鳥羽合甲抱犀鱗星芒一丈焰月暈七重輪黎陽水稍緑官渡桞應春無庸奉天眷驅傳牧南秦繁詞勞簡牘雜俗弊風塵上洛逢都尉商山見逸民留滯終南下唯當一史臣和劉儀同前人止戈興禮樂修文盛典謨壁開金石篆河浮雲霧圖藝香上延閣碑石向鴻都誦書徴博士明經拜大夫壁池寒水落學市舊槐枯髙談變白馬雄辨塞飛狐月落將軍樹風驚御史烏子雲猶汗簡溫舒正削蒲連雲雖有閣終欲想江湖和奉重適陽關李那銜悲向玉關垂泪上瑤臺舞閣懸新網歌梁積故埃紫庭生緑草丹墀染碧苔金扉晝常掩朱簾夜暗開方池含水思芳樹結風哀行雨歸將絶朝雲去不回獨有西陵上松聲薄暮來答賀屬王胄外黃初邸客蜀郡晚琴聲本欲從張耳何曾説馬卿定知逰道日非是弟如行髙文擬雜珮善謔間瑶瓊前書言家室末敘挂簮纓問仁寧伐國揚波豈亂清聞有陽臺客一作客曲常留入愛一作夢情無為嗟獨割空引助庖名酬陸常侍前人相知四十年别離萬餘里君留五湖曲豫去三河涘寒松君後凋溺灰余僅死何言西北雲復覿東南美深交不忘故飛觴敦宴喜贈藻發中情竒音邁流徴追惟中嵗日於斯同憩止思之宛如昨倐焉逾二紀疇昔多朋好一旦埋蒿里無人莫已知有慟傷知已抱臂還相泣巋然吾與子霑襟行自念哀哉亦已矣吾歸在漆園著書試詞理勞息乃殊致存亡寧異軌大路不能遵咄哉情何鄙答江學士協周若冰弱齡愛邱壑與子亟忘歸開襟對泉石携手玩芳菲忽逢朝市變斯樂眇難追氣意酒中改容顔鏡裏衰祁寒傷暮節落景促餘暉野曠蓬常轉林遙鳥倦飛故友輕金玉萬里嗣音徽鄉關不可望客淚徒霑衣和孔侍郎觀太常奏新樂已上見二百十二卷孫萬夀答楊世子前人太華五千仭長河九萬里山川藴玉石人物多君子丞相朝所宗太尉國之紀若人惟傑出濟世承餘祉趍庭遵教義博物兼文史寄聲振宛洛雅論窮名理伊余苦疲病寂寞罕賔逰不言驅駟馬於焉訪一丘縞紵始云贈膠漆乃相投伏枕空長想驂蹇遂無由忽此承來翰華藻殊輝煥雖則濫吹噓可以蠲憂歎懷袖終不滅掌握方留玩和風初應律山鶯已復新芳菲徒自好節物不關人勞歌雖有曲無以報陽春和周記室逰舊京前人大夫愍周廟王子泣殷墟自然心斷絶何關繫慘舒僕本漳濵士舊國亦淪胥紫陌風塵起青氈冠蓋踈臺留子建賦宫落仲將書譙周自題柱商容誰表閭聞君懷古曲同病亦漣如方知周處嘆前后信非虛和樂記室憶江水庾抱遙想觀濤處猶憶採蓮歌無因關塞葉共下洞庭波文苑英華卷二百四十
