body:
  text: 文苑英華卷一百十二宋李昉等編服章二衝牙賦一首古君子佩玉賦一首象環賦二首印賦一首笏賦一首冠賦一首進賢冠賦三首貂蟬冠賦一首彈冠賦一首衝牙賦以君子佩玉由我成聲為韻佩必有節牙惟應聲既熠熠以光動始鏘鏘而韻清馳聲曲折之間突爾乃激方隨步武之際跳然若驚嘉其琢自良工飾於君子冀靜聞而中矩每徐轉而知止乍旁達以散遷忽髙飄而間起比於德寧無故以去身習乎容諒和鳴而入耳是知宫徴交應周旋必聞助清音而靡絶混真質以才分將觀其禮朝於君假抑揚而有耀俟動靜以成文故乃藉此相攻彰夫必佩窅爾同聲服而非礙顧規模之可則宛在其中聽寥亮之無差不離於內則知俯仰寧阻進退皆由引異響而非往配禮容而必周虛徐互振寂寞相求洞晨照而彌徹驚微風而更幽原夫製彼竒形韻兹良玉雖杳杳以將盡竟遲遲而濳續淡以成章靜而應曲重輕莫雜恆宛轉而下垂左右皆調每玲瓏而中觸由是孤光屢進片影彌輕駐幽音而乍默佩逸勢而俄成方將應組綬厠瑶瓊應疾徐而洞徹順激射以鏘鳴故其悄以分音玲然自我當待扣而逾寂匪輕搖而孰可豈不以佩服紛綸威儀衆夥徴衝牙之微音然後知古禮之不墮古君子佩玉賦以思古君子行必鏘玉為韻裴度伊君子兮何師邈淳古而繹思儼然有章相威儀于樂只溫其如玉故切磋而佩之縝密是比貞明所資追琢斯成既殊張氏之印清美可羡寧匹一作止孔侯之龜是用濯自丹水取諸𤣥圃君求美質我則表溫潤於光容臣聽好音我則動淒清於步武結以紳帶綴以環組使感之者在約而思純服之者居今而行古豈比夫詩人無文贈雜佩兮夫君騷人著美紉幽蘭兮之子是以嘉其抱素質一作貴以合真想見白虹之氣思文疑清越之聲發凝輝兮既昭我述鏘雅韻兮必俟君行是以敬慎侯度獨髙人情至若斫以為壺徒玩其質執而為璧徒旌其秩豈若用之有方垂之無必威儀棣棣居則粲然之光進退瑲瑲動則泠然之律是以古之君子物有其章溫恭可象環珮其鏘既覩容而生敬諒播往以傳芳然則貞玉之質非賢無以服用昔賢之珮非玉無以表彰故佩斯敬覩斯莊方今野無遺賢山不藏玉彼華佩兮同昔時以入用彼君子兮思古人以自勗故能振休風播淳俗則今日之佩玉昔賢之髙躅者也象環賦以謙德無事循轉為韻錢起聖有制作一作聖有其制人具爾瞻是環也用之撝謙成乎其規故有典有則全乎其素故匪雕匪刻動法天旋溫如玉色可以觀象見意可以取文昭德終日佩之其儀不忒懿夫員通既固雅麗且殊皓質中徹騰光外敷守其明也處暗室而不昧偕其道也映素服而如無鄙南容之圭貞而猶玷嗤卞氏之璧瑾而不瑜升諸組綬不亦宜乎或有黃雀酬恩鄭商所利其名則一其宜則異皆浮俗之所珍乃老氏之遐棄寧若斯為美也將君子而比義文而不華垂之如墜循環無極參日月之在躬佩服有常於韋弦而戒事固知宣尼之㫖有要有倫於一作能此表禮創物乃將卑服謙身是以成形而不受其彩散璞而不失其真瑩爾情性潔白惟純導爾情性貞明日新捨之則禮容若缺用之則法度是循物既合權古稱其善常虛心以隨運雖匪石而可轉覩妙用之昭宣知前哲之舒卷第二同前韻沈仲佩服之設惟德是瞻夫子之服素而博夫子之德稱而廉式制象以表諸儉豈無玉兮體乎謙謙而伊何服用有則捨寶佩庶以彰其無位制象環實亦明其讓德匪玉兮匪金是雕兮是刻取其焚身之齒奮其截肪之色磨而不磷涅而不黑一作緇相彼缺一作玦矣謂其缺一作玦之有離制此環兮體其環之不極因良工以表器奉聖人以聘國苟炯戒之斯存曷威儀之有忒於是不師爾制一作是爰始我謀疑作謨錯落增色晶明克殊寫金規於顧掩素彩之隨珠崇其五寸之範輝彼十圍之軀貴其文兮我則文而能潔謂其曲也我則曲而不踰既圓體以就滿亦虛中而應無服為身表環為佩器若禮義之相須豈周旋之暫墜將以體象其法理亦以循環乎志意雜章甫以為飾騰組綬以往此下疑闕字以往二字一作以生輝蔚禮經以留規掩水蒼之故事明夫素王立範象豈因循必使動容有則針規合倫得禮容之不選著盛德之日新環之質兮取其終始罔遺象之齒也取其堅白可珍體夫子之歷聘周旋似夫子之從時屈伸象環之制兮其義不淺謙撝之㫖兮因斯而闡道崇受物用能寬而有容理貴適時體如丸而任轉忝明試以效拙敢獻賦而旌善罔遺一作罔極印賦以王道正直執契理人為韻趙良器域中四大得一者王混同區宇端拱巖廊運元功而莫測故神用之無方穴處巢居時尚傳於朴略結繩剡木化始漸於昭彰暨夫扇澆薄事征討智慧出而下有大僞忠信興而上失其道聖人以智周萬物仰觀俯考追淳化於往初發鳥迹而爰造是鑄至堅之金騁至巧之性方圓設象以廽合雕錯得宜而瑩淨其道恆其體正其君者是效故有聞於至孚王者是司故不得一作待於嚴令詳觀其貌且橫且直文繚繞而外轉字連綿而內逼迹處泥而髣佛容因朱而翕赩迫而察之若披彩畫之圖逺而望之若散晴霞之色爾其大小咸準委曲相襲隨時而行仗義而立羣吏則有慮其誕故合之而給天子則不責於人故司契而執借如九命作伯三朝謁帝服冠冕而去來佩印綬而有繼當司存之部領覽職事之巨細未見契字官韻罔不典常作師圖忱之子且契之不明訟之所起契之既用人得而理豈徒中山張氏化墜鵲而初成餘不亭侯感回龜而相似光錫忠義若斯而已亂曰古之善為道者非以明人執其左契欲使還淳故得永全太朴不斁彜倫斯亦為政之機要何止更光於縉紳笏賦王子先昔者聖人之理天下也辨方位垂衣裳制茲手板整乎維綱莫不明有德著才良法天地體隂陽欲其表行見能則外文而內質取其前讓後敬則上圓而下方笏之時義逺矣大矣蕭何列其深規郭璞辨其微㫖請原為用之本特一作將申建造之始採文竹拔象齒爰謀爰相載考載擬華睆功一作切錯英明卓峙煥飛霞綴流晷殊相逸發竒文秀起五嶽備焉四瀆呈止上及君帝下及庶士或魚須而表其章或玉珽以申其美故能朱紫不奪尊卑咸理懿夫植性端平文理中正間瓊辨而雪白對華纓而氷净出入必書俯仰惟敬其在宗廟即搢而請享其在朝廷即端而受命豈不用捨隨時物莫之令雖冠冕之貴黼黻之飾徒有備於朝儀孰與茲而同德冠賦趙良器懿哉聖人之所為觸類而長緣情以施大則察乾坤之用小則稽鳥獸之儀近取諸身既制冠以象德逺取諸物亦模範而開規裝玉彩而晶耀鈿珠華而陸離禮容於是乎克尚首飾於是乎攸宜故柔以虛中剛而徑外惟德是輔惟仁是大綴香簮以半出垂寶纓而雙對珥白筆以孤懸總紺髮而繁㑹若乃九門朝唘千官奉職劒履鏘鏘旌旗翼翼趨玉階以雲聳入金門而電赩於赫朝廷其儀不忒此乃禮容之有則也爾其尊卑異制古今殊情備鶡所以貴勇加蟬所以貴清進賢表文者之號章甫尊儒者之名獬豸觸邪惡佞臣而直指鵕䴊崇飾光近侍以增榮此又威儀之孔明也是以舉之有節施之無妄或用晦而冕旒或蔽聰而黈纊居正而不失其職得位而不愆於上每守分以自安故雖髙而不亢此乃進退之惟當也客有賦之而歎曰夫檢身者禮表容者服服之不稱必近於妖祥禮之或差自階於傾覆故君子履道以逺害小人崇奢而取戮鄭臧聚鷸果貽出境之誅疏受挂門克保永終之祿則知逆理者天之所禍順常者神之所福况乎在位之庶寮可不鑒茲而敬肅進賢冠賦趙良器天道廓兮日月為久聖人作兮衣冠為首彼將照臨萬有此將肅穆羣后是以明王代寶君子學干揔朝廷之要惟進賢之冠寸之七且比夫七德梁之三又取夫三端致美乎威儀棣棣經營乎束帛戔戔知人不易行之為難將欲昭隱逸責聲實脅讒佞為忠貞革貪侈為廉質則以正御下雖居髙匪危以虛制有縱持滿何溢動法道靜得一自代兮經為此名無止兮檢被疑作驗彼天秩徒以賢能有意於賢八字一作有意於此亦有意於賢不言而信不用於權俾荷寵祿者賢一作賢賢而易色榮上林者安一作安安而能遷久要不忘雖弊必加於首嫌疑不涉李下豈正其偏則鶡之果也武重蟬之潔也政先亮當用而為用信𤣥之而又𤣥若因物揆理昜人推遷非德不依智也非禮勿動慎也唯賢必舉義也任用無為順也包四善而世濟其美别九儀而尊固其信夫預明試者稽乎人言為大夫者資乎能賦則流問以體物敢不立言以存務將欲存義終則用之不窮將述功之懋則物無能措詩云服之無斁吾以斯文之為度第二以聖朝崇儒服以旌德為韻于伊躬惟冠之制惟賢是崇冠俟賢而出賢因冠而通成於人有傳古之儀形於國有尊儒之風吾君於是詔司服進良工考前法於無替覿斯義而有融然後得多士以立效實兹冠而允淑君臣克序用彰有道之時冕辨可儔載稽取象之服則知冠以招士亦由工以度木匪工也良材何以辨于山匪冠也羣賢何以求其祿觀夫製作有則威儀孔昭建象於初爰從太古之代更名於後始惟炎漢之朝不繪畫以崇飾在進用以章德上下率而有差禮容行而無忒不可奢致不可儉逼蓋取事疑之大猷亦設官之盛飾上自元后降于公卿用則異數制乃同名五梁三梁表尊卑之序七寸八寸為前後之程惟德是急惟儒是旌協緇布之遺象與皮辨而齊衡且夫作之罔乖服之有以豈同帶鶡者空尚乎猛聚鷸者不稱於己曷若取鑒斯在為工式孚御膳加大官之列使臣薦不疑之謨稽乎其形諒先王之制本乎其義為君子之儒瞻之克以正創之而以聖列士崇德之規蒸人立身之鏡豈徒在首貫髮雍容肅敬而已第三以明時急賢才為韻梁洽製冠有象惟賢表名冠在首而為用政匪實疑作賢而莫成伊進賢之為急乃斯冠之發明古人所尚永代作程豈比夫戴鶡聚鷸瓊辨玉纓彼旌武而貽咎寧比德而同聲念茲在兹侯其禕而已注在前山有木工則度之君為政賢必進之木自工以生態政得人而允釐故君子進退以禮消息候時時既消一作清兮為疑賢是急賢既進兮其政必立總六官而謂何嘉此名而可挹客有聞之而言曰或摽之豸或珥之蟬所謂二者莫如進賢忝從班於聖日願效試於明臺敢預弓旌之召無遺菅蒯之才貂蟬冠賦以製冠取清蟬之義為韻侯冽冠表朝容飾崇工製示徑悍而貂文既緝彰清高而蟬翼斯綴所以發宰一作官臣之盛改武辨之弊配紫綬而增華入黃樞而轉麗突爾將戴翹然可觀糅輕毛而絲絡鬬微縠而花攢引雜錯之光足見乎以文為貴分動搖之影誠誡夫居危如安麗則無挂新而莫彈彩列如星衛女疑何榮於㑹辨用當謁帝齊相堪嗤於濯冠所以類鼠咸收如螳必取示威無假於鶡戴呈巧豈矜於鷸聚影麗華簮光聫垂組乍臨天陛澤鮮而日照如濡時受王言質薄而風搖自舞鄙舊規於却敵笑逺適於章甫貂之貴誰憂換酒於晉臣蟬之清是用加金於漢主故能堅逾鐡柱妙奪玉纓非不足之時狗尾何續從有緌而用蜩甲如生柔而輔曲潔以從輕灼灼而自為首飾炯炯而能使心清至矣哉蟬者食潔居髙貂者內溫外悍盡飾斯在齊光不散發令姿於綴者王何以尊籍舊葉而珥焉金張益煥將進賢而並美與交讓以相資承柱後之名是表禮無違者冠侍中之首欲使人皆見之道光漢冊事含疑秦賜冠乎斯用之以明義彈冠賦以君子之交誠有所感為韻王起岌岌髙冠是加于首將服之以入仕遂彈之而去垢纎埃不染知潔已之為先法服是從明干祿之非久豈比裂之而無用挂之而勿有也當其貢公不仕王陽未榮風起緇布塵飛玉纓積嵗月而無色混風姿而莫呈豈知㸃綴則價重拂拭則光生蓋以斷金之人未逹於清世陸沈之士猶勞其赤誠是故置之而有待褚之而勿營洎夫大漢登庸伊人有所同松茂而柏悅將龍翔而鳳舉於是取章甫而言曰冠者首之飾人之規盛服將朝此為大者結髮從仕曷莫由之吾方䇿名於丹闕委質於彤墀于疑將盡飾以為美豈薄汚而見嗤及解彼珠纓彈于玉指彰久要之必信表從政之有使拂舊彩以增鮮振浮埃而暫起由是發光耀正容止朝廷濟濟具瞻夫哲人巾櫛鏘鏘用表夫君子則知碩量之所包賢人之與交其賤也樂夫伐木其貴也同夫拔茅則爵位相先者以彈冠而是鑒金蘭合契者因彈冠而有感故能致美縉紳不嬰垢氛將總㑹于𤣥髮期入仕于青雲豈比夫晏子濯以入朝是稱賢相屈生彈于新沐方俟明君文苑英華卷一百十二
