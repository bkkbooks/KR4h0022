body:
  text: 文苑英華卷七百二十三宋李昉等編餞送六送渭南劉少府執經赴東都省覲序一首奉送元城主簿兄赴任序一首送開封李少府勉自江南還赴京序一首送弟愐之京序一首送李白之曹南序一首送薛處士業逰廬山序一首送張處士申還舊居序一首送史處士歸滏陽别業序一首送張徴君逰江南序一首前夏干越亭奉餞韋卿使君公赴婺州序一首仲秋奉餞蕭郎中使君赴潤州序一首送張都督赴嘉州序一首送王郎中赴蘄州序一首送李員外入朝序一首送峽州劉使君忠州李使君序一首送賈中允之襄陽序一首送太子僕馬公序一首送趙評事赴東都序一首送談正字之上都序一首送劉協律序一首送紀奉禮之容州序一首送李校書歸江西序一首宴餞崔十二弟校書之容州序一首送藺舍人兼武州長史序一首送藺侍御史還序一首送渭南劉少府執經赴東都省覲序獨孤及彼徇名者遭時多故乘地高勢罕不爭先著集無著字鞭而集無而字務飛速以誇當代獨吾子以文行裕蠱思不出其位奉籝金之所遺羞地芥而不拾其初筮仕集作以筮也典校祕書祕書之職修尉于渭南渭南無粃政嵗二月以紛帨觽燧歸覲于洛白華之戀也和氣用事春物滿眼之子于征五綵其服想成臯花合穀洛水大是吾子拜嘉慶問清高之日歟夫克家而家肥䇿名而名彰居官而官辨孝之大者則貂蟬羔鴈在子外府姑務逺圖何嗟少别到洛陽為我寄聲謝鳴皋故山杼離如之何詩以贈逺奉送元城主簿兄赴任序前人往嵗兄之尉巨鹿二字集作匡德刑成禮義舉粃政杜紊綱緝人曰蒞民如此其逹一作志必大十四年春王正月再命于元城元城地雄人悍土壤賦錯處宋衛中山燕齊趙魏之都會三川輻湊四術轂擊兄方以德舉吏此大都集作邦則千里之迹兆於是矣彼徒勞者其鶱翥之濫觴乎嵗物已春秦山草緑集作日緑亦既撰集作選吉駕言徂東豈不知棠棣之詩廢則和樂之詩集作好缺盍使伯氏仲氏偕詠歌之以贈行邁送開封李少府勉自江南還赴京序前人世或謂邦有道穀或謂全於德者不以徇名降志彼於致命猶數數然孰與李侯兩忘而吻合之張其天機與道出處道長則陳力筮仕績成而退藏於密戰勝江海之上然後乘歸流而返舊京乃知凌雲麗天則切玉利器於夫子為鄧林之一葉耳而精微純粹豈中士所能得其門哉然當今堯親九族契敷五教材之美者工將度之子雖忘機機未忘子庸詎知泥蟠沙卧不為雲霄之鑿柄乎但蘭舟桂楫倐忽鳥逝朔風集作方秋草奈離憂何緣情者莫近於詩二三子盍詠歌以為贈送弟愐之京序蒼龍居玄􅑎之嵗與爾吹塤箎於長安靈臺之下當時爾方青襟余適紈袴各志小學相期大來其後爾以經術薦遂觀藝乎集作光於上國余牢落兩河為病所繫星分雨散十有二載中間暫携手一笑者及今二三年五字集作及今而三昨日逰寓今成疇昔此會綿邈空在集作存夢想豈不欲申橘柚之性詠和樂之什樂未終也别又繼之然君子修誠則物應克已則名彰爾能圭璋特逹甲胄忠信致逸足於千里吾有望焉方務逺圖何嗟少别到秦地有問吾事者為報江湖間心送李白之曹南序曩子之入秦也上方覽子虛之賦喜相如同時由是朝詣公車夕揮宸翰一旦襥被金馬蓬纍而行出入燕宋與白雲為伍然則適來時行也適去時止也彼碌碌者徒見三河之遊倦百鎰之金盡乃議子於得失虧成之間曽不知才全者無虧成志全者無得失進與退於道德乎何有是日也出車桐門特之集作將駕于曹仙藥滿囊道書盈篋異乎莊舄之辭越仲尼之去魯矣送子何所平臺之隅短歌薄酒擊築相和大丈夫各乘風波未始有極哀樂且不足纍上士之心况小别乎請皆賦詩以見交態送薛處士業逰廬山序薛侯敦於詩固於學敏於行時然後言言而寡尤口不言祿祿亦不及識其真者也集作以為永歎而薛侯居之淡如君子哉若人也方以城市鄙於丘壑倦逰不如嘉遁是月也拂纓上之塵西逰廬山山上有峯頂大林下有東林西林化成英華作城非遺愛六寺慧逺道生二公昔嘗眷戀於斯焉履痕屐齒遍滿崖谷神期盻蠁恆若對面之子之往獲心契矣苟藏器於身時行則行大之將來隱顯一致彼安貞者其或有集作為利涉之樞機乎趙補闕驊王侍御定張評事有略各以文為貺記行邁之所以然余亦持片言用代踈麻瑶華之贈送張處士申還舊居序海水不揚波久矣故昆蟲草木得遂本性夔益巢由集作許各安其節天鍾靜於子而博之以文洞集作大壑無底虛舟任觸世皆尚白獨守太玄顧流俗而不言退將修乎初服吾於是見全人之操矣了集作乃知白雲上下蓋無心自出黃鶴飛去當有時而來他年孤舟冀再會於五湖之口送史處士歸滏陽别業序初史侯至是集作自帝丘僕方釃酒於蔣氏之館揖讓堂下由東階升於是一酌而賔禮舉再酌而交態接三酌而威儀幡幡深衷畢見醉裏集作中投分客中忘形吾固知握手難常嘉會可惜其聚也言不浹日而意氣感其散也興未及盡而離憂至則臨觴徙倚孰能不以之黯然窮隂欲臘漳滏氷厚班馬連嘶歸雲無色非詩何以離羣者之志送張徴君逰江南序初貞元二年進賢星明於是夫子與廣陵馬曽俱以玄纁辟焉一命而俯受服赤墀之下子守集作井節不奪歸耕南陽議者稱馬之利用陋子之獨善及以為不然君子之道舒之則雲蒸雨降以救大旱卷之則天倪道機不盈一握姑務忠信以安聖時則歌國風於畎畝是亦為政有民人焉有社禝焉何必薄逰然後稱德至是夏六月以菰菜之興扁舟而東是行也與夫乘桴揚舲者不同日矣津樓望極集作直望江漢在目少别非志士所悲深衷豈短章能見桃源秋至僕當搴其仙實俟子於武陵之南溪首夏干越亭奉餞韋卿使君公赴婺州序劉長卿今年春王正月皇帝居紫宸正殿擇東南諸侯以我公為少光祿自姑蘇行春於東陽愛人也頃公之在吳值欃槍搆戾南犯斗牛集作牛斗波動滄海塵飛金陵公夷險一心忠勇增氣四面皆敵姑蘇獨靜卧甲霜天洗兵寒水竟使浙西士庶不見煙塵公之力也朝廷聞而多之以為姑蘇之人已理東陽之人未化是邦一作拜也宜哉卿月既明仁風載清出入數藩從容九棘在虞秦而皆智豈滕薛而異名頌聲洋洋實此行矣干越便道金華前山梅花過時槐色獨集作猶在白雲芳草盡入詩興公實秉文律將集作特為詞雄逶迤退公知八詠之有繼作矣仲秋奉餞蕭郎中使君赴潤州序前人皇帝臨軒旰食憂濟在人擇良二千石與之共理民有疾苦得以安之吏有侵漁得以去之為風化之本繫黎元之命不其難哉故內外闕官自卿大夫以下多責成元輔唯剖竹分符寄決在禁中又以政貴有成化難數易至於理行超異公論當徴但增秩賜金或移典大郡而已由是我蕭公建隼兹地化行五年漢庭群公方待以右集作美職而竟有南徐之命蓋天子憂逺人而緩徴拜也公才可以濟物德可以化人五行之用備四時之氣足不立法而去弊不示禁而止姦寒者有衣飢者有食百城萬井若百集作衆草之得陽春亦不知其所以然而然也詔書既至公乃向闕北拜腰章遂行南徐之人望公如歸此邦之人去公如失千騎照路出於東郊男女滿野壺漿更奏泣涕以送集作涕泣如雨邀遮以晉或攀我車或維我舟臨風鳴笳慷慨高秋君子是集無此字謂有古人之遺愛矣凡工文者得無詩乎送張都督赴嘉州序于邵伊人之平康由我以專逹否則政弛人何賴焉在昔漢宣永懷至理思與二千石之良者共之貞深一作竟探其元以化天下非道熙陟降理際天地一作人則不可膺是高選尚書左僕射冀國公審才以底用論定而後請將欲更蘇息復整齊且如張公無出其右繄受授則為潛怛彼嘉陽之人所益多矣况學致廣大心自精微議道置法若示諸掌一舉雲翼三十為郎分兵領部義然後取公以之才大時論用少以今之多艱乎謂用大則用之大用小則用之小在我而已抑無懵焉良月撰吉輕舟既具長空青冥未有黃落緹騎百從載旌而前戈矛生風左右如武且犀灘古地熊阜外虞通波萬里并客攸攝其無以易者盍思無邪耶嘗寮為心望此行矣大幕邀餞三軍助較一作教樂只君子如何可忘而後利涉信宿人歸父母其顔渥丹下令如春受教賜知常謀始疑不浹年而國賦足軍實倍啓迪恢逹為諸侯雄送王郎中赴蘄州序大君當寧之七載也日月會於降婁有詔尚書倉部郎中王公恭寬敏惠出典于蘄蘄之上有革車外賦有牙幢華領思與良二千石共理者朝廷久之亦既俞往允茲僉屬曽未浹辰抗手言邁惜此别易合宴公堂期其出郊于以送逺且觀坐彼一方困于無告誰為禁暴聞公知歸邦非人則不寧政無從則奚措今所往者人安之哉公之下車曽是為念以公之素範不敢言利因公之善價無乃近名惟名之崇惟德是纍將善救物繄公冀焉然後導逹其和發萌以慮化行無二當借冦恂理平第一更徴黃霸他日之會賔寮有光悠悠斾旌灔灔春物想青林之漲水見黃石之平磯佳興未孤前期猶邈賦詩追餞者翰林之故事吾何間然送李員外入朝序食租衣稅王者之常賦自至德改元之後兵連天下軍用仰給四方諸侯各有戎事將發內布外而王命急宣不咨皇華無以專逹前十數輩皆課登而旋今尚書户部郎李公中朝駿選次董斯任以西蜀最大南賝多賈委之斯來于以藏事是以數年于茲卒多前功冀公憂國忘家一心同德方錫貢以納貺度於常算故泉榖之分必先此矣逺疑作達于上京然及方鎮遂能入者億計行者接武秦郊不關持此更費冀公之勤其國本也如此李公之逹於時用也如彼使乎誰務將膺對敡挾兩驂以戒途歌四牡而復命北驛開餞中軍宴私滿院香風雜花潛送廣庭張樂妙音交作冀公以請召未許送君先鞭我心如馳不敢留止行復題已赤管俯伏青蒲答天子休命當使臣之始賞者爾送峽州劉使君忠州李使君序國有戎事今兹十年外姦內宄略無寧嵗是以人之思理不教而然者久矣夫非良二千石則無以光昭帝命勤恤人隱自邑居蕩析牧守承弊中和頌聲斯道寖息今皇帝之臨御也嘗垂意於理道夫能官人則能安人為官而擇人俾受夫賴尚書駕部郎中劉公司門員外郎李公分命之拜中朝駿選劉公之舉也以宣慈惠和李公之得也以溫良恭儉咸推大略仁而愛人文學政事家邦必逹矧兹偏隅由我專制苟利於物其可易乎然後理兵期於知禁求瘼在乎不擾澤流愷悌汔可小康豈潁川之姦黨散落濟南之畏如大府而已夀星之會涼秋八月言辭北闕將騖南轅借疑作惜王馬之不留合六官以追餞乃卜勝撰吉咸集于吏部郎元公之居室地逺朝市家藏水木納終峯於宇下道漆園於方外風回景泛匪寒匪燠入室而芝蘭襲人趨庭而珠玉交輝琴言自清座右必誡夫然則行者可以慰逺道居者可以依翰林二公於是撫席而言曰西楚風殊東巴路逈高堂雲雨遇荆門而可見皇州冠蓋别瀟水以長懷多謝故人醑我以酒寵我之作羣公何謂以不腆斯文遂冠于篇首惣南宫之賦者凡四十有六章次之爵里亦當使君之佳傳云送賈中允之襄陽序孔宣父説儒者之行有自立焉有近人焉有交友焉研精六藝較明舊史冠天人之際探得失之源非自立歟仗義而居立信為寶難得易失不謀苟合非近人歟終始之要膠固也患難之失身命也益者損者吾其擇焉非交友歟夫然則道之將行周流四海而無匱者庸可既乎頃年隱廬山之霧去秋舉湘江之帆聞有道而來終有得而去所合必義所依必仁凡諸揖奉惜此言别纍卜勝踐屢邀醉心雖雲蒸霧毒猶勝炎風而踈桐衰栁亦傍秋色時之所感事有攸會切於覲問而速是行者則尚書季父領鎮南之軍伐淮西之叛方除天地之害載戢干戈之威用重望繫人渴日為久與尚書備相知之分憶昨執手于今三年負纍遐荒莫由展禮南北不援我勞如何願即寤寐之勤永奉通明之德送太子僕馬公序嘗讀舊史氏見汲長孺之為人與之並生其時則隨從長者不敢避風雨况今之有人而捨勤乎太子僕馬公骨鯁端莊則如此而布和展惠信而好古煥乎其有文章則汲生之所不及明矣方將摶空直上髙視寥廓秉尚父黃鉞登范睢青雲顧夫蒼生不為負矣屬羣盜未息四郊猶虞春闈無事冬日可愛故自南自北從諸侯逰如竹箭之有筠雖霰雪之奚及未可量也豫固不敏奉以周旋幾合獻酬之禮且陪文酒之事青溪白雲引我歸思槭槭寒水颼颼氷岸道勝獨往高歌以行夫至人逹觀物無不可出則耀金組入則狎蓽蘿蓋與時消息在我舒卷群公悵别則如之何送趙評事赴東都序大盜既滅東郊遂啓前馳龜蒙左夾遼碣過數千里革戎反華彼阻戎之餘承復禹之慶駿奔走滌怨思兼諸匪人因得請命連踵闕下歸甚忘亡一作志忘非是以身田一作由非身筐之貢不待錫而至者已紛組一作紛於長府申命職方郎中滎陽鄭公逹于伊洛以惣其事夫劇不可以專精故資於命介道且求於兼適必託乎至公大理評事天水趙侯當交辟之下膺至公之選罷戎西府受詔東周虛舟出不繫之外景鍾為待叩之用故士君子隨之而不避風雨則文行忠信不其末一作美歟鳳翔尹兼御史大夫高公勤於容禮迫此王命曽是公器與時共之追鋒告行惜别而已行軍司馬侍御史李公玉帳居左金樽敘離群公當筵相顧不足白日陶暑青槐好隂牙幢宴如亦既醉止左右歡甚詩人興全爭論逸價特以餉趙故拜命之辱輒冠于首篇送談正字之上都序皇上御宇之明年布和發號其在野無遺賢將以啓迪理本蓋古先哲王之前大者分命十使周流天下弓旌一舉澗陸其空户部侍郎趙君故得談子於瀟湘矣談子受薦不拜趙君當薦不避朝廷官之不疑君子恱是三者之備公也者而一作其至矣哉况恭懿明允文為在禮發言有章臨事不一作無惑可以入備顧問出咨典謨豈止祖述六藝指歸舊史栖遲龍樓之下寂寞鉛槧之間哉僕孤奉盛明黜佐藩徼不自意而邂逅相遇念一老而得之周旋嘗與語一作話言為我消息日月之會時惟季冬星回于天嵗且更始䁆慘一作驂蕭索長年所悲豈堪伊人告我以去方將背九疑之積阻泛蒼梧以連海經界于分疑廣合于上都謁崇明馳象魏講舊於知已從事於吾黨雲霄之外自此而階遷客者何敘之而已送劉協律序豫廣德年三掌注起居建中初擢修國史討論之際嘗覽周朝作相奕世載德名列於紫微傳於青史者今協律劉侯之先歟協律富有文采挺然秀拔懷長䇿以待時感知己而為用似續以才而不階門户求合以道而不憚風塵士君子之行有足多也零桂雖秋涼風未至江山􅒺邈言出東路帆席悠悠指途南海南海有國之重鎮北方之東西中土之士庶䑸連轂擊合會於其間者日千百焉况中丞元公載緝斯人言愍其旅金節始按休聲洽聞求賢重官方賀封往疑老夫病矣負纍杜門幾煩相問挹我以禮愧無風水之便且有登臨之别行矣自愛吾無間然送紀奉禮之容州序紀氏之子曰文楚資於事母敬以愛兼則百行可知博於好古而功業著則文采可知丈夫於代能有是而無倦加體道以自牧出入中外身無擇行為不逹者未之有也頃屬世故家貧背胡越嶺執㸑以養當車就安人皆知之用是不乏所以長者繼轍來者升堂既榮於親又恱其子甚大慶也夫時有通塞事有從宜親安道存適則為可容州經略之府南據交址北逹蒼梧李郎中受委中朝聮典大郡凡有化理悉為世程紀子嚮風慕義不逺千里釋板輿即輕舸晨餐夕膳不改舊物從一樂土之一樂土誰其間焉郎中之愛子良鈞業擅家寶官登王畿美秀而文芝蘭可襲吾子一見足以滌塵慮慰客逰與諸子之得子亦何以異也行矣自愛時興元大赦之仲春桂林遷客于邵之别序云送李校書歸江西序與子中外表也親之至也異姓莫先暌隔不面老而方合可謂一作為長歎息矣曷期逺會于零桂之間哉大火之交南秋可畏其欻如蒸其華轉鮮昏霾而禽鳥欲絶曦赫而薄鑠無措易練不足以禦流汗並燎不足以敵炎氛一作氣豫遷客也是井其艱子薄逰也何在斯弊况依藉門户本儒家之文行總貫隂陽乃王官之武備聰明精密道不茍合真吾人之益者也以世多故始家廬陵悲鄉國之眇邈想丘園以蕪沒羈旅南土復何言哉季子無金未下妻嫂淮隂寓漂終取王侯無以風雨為晦無以名位自薄乘時體命其乃光乎豫屬湘東之命子有滏西之役非適之適我勞如何雲天茫茫行矣自愛宴餞崔十二弟校書之容州序方伯盧公因牙門之清淨闢前館之爽塏乃命宿設具牢加籩言邀故人以寵行也清河崔子曰真源嘗典校石渠應諸侯之聘踐言勵行積學纍藝一作仁而建中初天下文明懼乎遺逸黜陟十道君舉先在有詔集於京師將以更秩既而容管經略處置使隴西李公從而請焉猗歟真源以受命底祿已利也以從人之求國務也身不可先於國祿不可急於求翻然回車假道于桂盧公執疇昔之好惜今辰之别朝陽初升賔筵始合子夜云艾主賦未晞觥觶交飛而取樂塤箎相協以奏雅盧公意未之盡將命以篇顧謂遷客曰罷論幾何日輟使復何日請子之敘我今夕于子離席而辭曰老者敗者僚者一作也末也憂能傷人思無可者公之所命其得人乎公曰得哉是敢操簡而進發言有素一以論我公之講舊一以樂李公之得賢風煙不殊南北暫間顯允崔子朂哉令聞云送藺舍人兼武州長史序舍人丈以元昆尹京之明月始為西府連辟將展驥足於廣西之地所以懲彼叛亂與人休息君子謂此舉也得於治理失於屈賢譬諸汙池而集鵷鳳矣然則國家多故亭障猶虞不為利遷可以道進所居則化我何在焉况瓌姿偉望約之以禮兄友弟悌必因子心無終食之間違仁矧三州之與四海云爾勉此于邁怡然告别羣鶯尚囀四月猶花長江一望翠幈如畫佳興滿目曷唯宦逰監察御史楊公特進兼鴻臚吳公慰相宴接情言不盡諸公陪歡各以義洽邵野人也實沗中表趨風自允渴日增勤俄然仳離如失羽翼郊坰之送惜也何言送藺侍御史還序河龍疑之塞秋為邊防每嵗徴師郡縣強家之子能控弦帶甲勇為人敵而應召焉行軍司馬侍御史藺公戒茲戎昭來閲軍實威用震罰而不及人爰興六月之師集我三邊之事况長源自清但挹朝海大厦已構尚勞持斧位寵杜詩之選職由韓厥之寄參彼玉帳鎮茲金方亦既勤矣由是正風俗恤人隱刑章無煩一作無頗頒賦惟允上行下效一作交心莫不盡大鴻臚吳公國之良二千石也必先中權之令載勤東道之禮金蘭用譽風味相合樂只君子會于公堂清絃發越洋洋乎盈耳一夕三醉主人曰未也若然者群公陪歡其有間乎秋八月鶗鴂始鳴衆芳皆歇我有歸思整轅而西晴川淅瀝日上旌斾寒野莽蒼風入筯竿况肅殺以時虜騎方下元戎之師且有後命行軍欲久留得乎請言詩以寵餞薦周旋而不墜耳文苑英華卷七百二十三
