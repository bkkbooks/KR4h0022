body:
  text: 文苑英華卷四百二十三宋李昉等編赦書四尊號赦書二寶厯元年四月二十日冊尊號赦文編制門下朕聞奉天地之大統必酌于人心荷宗祖之誠訓必參于國典顧惟眇身守任重器道未能被物德不足蓄身賴于宗工碩老輔導丞弼享祧主詔令作奉鬯熏燎告𤣥履厯正元敷施大號庶方咸若四表穆然皇祖披攘之基列聖焦勞之業恬焉而有泰焉而居晝以度心夜以省已其何德以堪之方將法乾以行健體咸而致和執冲以固高守約以持滿而文武百辟章奏四上以為人心不可以曲讓國典不可以矯違亦用慰于太皇太后皇太后之意屈而後俞諒非獲已豈不以豫非生知欲以徽稱懿號誘掖勸慕之乎將使循名而勉其實力實而應其名乎然則豫方且以為韋弦方且以為針誥㮊于皇極庶無尤違是宜與物同利惟新大澤可大赦天下自寶厯元年四月二十二日昧爽已前大辟罪已下已發覺未發覺已結正未結正繫囚見徒罪無輕重咸赦除之惟故殺人及官典犯贓不在此限應左降官未經量移者宜與量移近處丁憂去任服闋日亦與量移如准前制已合量移有司未注擬者並任纍叙流人未到所在及已到未經量移者並與量移近處僧尼道士移𨽻未經量移者並一作亦與量移近處中外前資見任官頃因延纍未及用才并左降官中有事情可恕名跡素聞者宜委中書門下量加奬用勿使屈滯授田制祿嵗久而弊深留獄要囚期舒而濫廣隱冒啓逃姦之漸倍稱成豪奪之源亟舉舊章猶循宿蠧永言謀始必俟申明在京百司職田散在畿內諸縣舊制配地出子逐畝平攤比量舊制孰為久便宜委京兆府與屯田審計會條疏奏聞如京城諸司捕繫推掬經旬時每季御史巡囚罕能察訪舉劾積成寃滯為弊頗深宜委御史臺重舉用長慶元年七月十八日赦文條件聞奏京畿百姓多屬諸軍諸使或户內一人在軍其父兄子弟不受府縣差役頃者頻有制勑處分如聞尚未遵行宜委京兆府重舉用長慶元年七月十八日赦文條疏聞奏應京城內有私債經十年已上曽出利過本兩倍本主及原保人死亡並無家産者宜令臺府勿為徵理應天下典貼得人莊田園店等便合祗承户稅本主收贖之日不得引令式及言私契組織貧人今煩而政撓積習而弊生欲其適宜須有釐革使人不倦必在變通今年正月七日制勑處分條目中有未經施行者委御史臺令提舉仍條録聞奏宜委百司官長各具條疏當司利病奏聞擇其善者當議改更𢎞文崇文館生及齊郎三衛所用資蔭踰濫頗多澄源清流切在釐革宜委禮部兵部侍郎條疏以久逺可行用者兼每蔭别限年限明作條例聞奏懋官述職禦侮宣威暨于庶僚咸竭乃力峻其爵秩以極封崇內外文武見任及致仕官三品已上賜爵一級四品已下加一階仍賜勳兩轉神䇿六軍金吾威逺皇城將士普恩之外各賜勳兩轉列虞賔之位崇褒聖之𦙍所以闡德教而昭前烈也二王三恪及文宣公各賜物三十匹朕上奉兩宫下臨九有庶幾廣愛之道以行教化之風太皇太后皇太后二等已上親委中書門下約舊例量加優賞二廣分營六師環衛梯航貢奉玉帛會同既勤勞而可嘉亦懷來之所尚神䇿及六軍金吾威逺皇城等諸軍將軍統軍以下各有賜給其將士等長行立仗者并守本軍本營者各賜物有差鴻臚禮賔院應在城內蕃客等並節級有賜物宣贊盛禮潤色鴻徽爰錫寵於崇階亦推恩於任子攝侍中讀寶官門下侍郎平章事竇易直攝中書令讀冊官中書侍郎平章事李程各賜一子出身撰冊文官左僕射平章事李逢吉宜依舊例賜一子出身正員官奉冊奉寶綬官書玉冊官書寶官各加兩階進寶綬進冊中嚴外辨禮儀贊導押冊押寶綬舉舁寶冊官各加一階合入三品者待考足日聼叙合選人减一選其餘應職掌行事官及寫制書官太常修撰儀注禮官并宫內行事官三品已上賜爵一級四品已下加一階仍並賜勳一轉造玉冊并填金字造寶裝官各賜五十匹前王之令政未有遺年前哲之格言實先顧行義存忠厚教被家邦天下百姓九十已上委所在長吏量加存問孝子順孫義夫節婦旌表門閭終身勿事先已旌表者亦量加優恤生甫炳靈出圖表異故能發泄雲雨蓄涵風雷望秩之儀必資蠲潔五嶽四瀆宜委本州府長吏備禮致祭名山大川及自古聖帝明王忠臣烈士令所在以禮致祭亡命山澤挾藏軍器百日不首復罪如初赦書有所不該者所司具作條例聞奏敢以奏前事相告言者以其罪罪之赦書日行五百里布告天下咸使聞知會昌二年四月二十三日上尊號赦文編制門下昔我髙祖太宗始造區夏闢乾坤以覆載竭日月以照臨盛德耿光格于上下昊天有成命我二后受之列聖丕圖克大其緒文綏武靖奕葉連枝逮豫纘修罔敢失墜誠欲追縱在昔貽範將來陶末俗於至和返大朴於已散而道不足以居域中之大文不足以成天下之化恭已南面夙興夕惕遐想理古歉然于懷至於嗣嵗豐穰寰海康靜祅沴滅息華夷大同兹實監祐自天匡救在下諒非已出安敢自多而三台百辟陳忠歷懇加我大號其何以堪謂豫守文宜述先志抑而不行者三請確而不拔者群誠豈貪在已之名始念從人之欲秪應典冊良深惕勵於戲顔子匹夫也猶曰舜何人哉矧有其位行其教化而不思齊其道也尚念交修俾克用乂今維夏長飬之時動植之物莫不自遂思有以導迎和氣生活吾人是用稽犧經之作解法虞書之肆赦推恩宥過思與詔作與物同休可大赦天下自會昌二年四月二十三日昧爽已前大辟罪已下已發覺未發覺已結正未結正繫囚見徒罪無輕重咸赦除之唯犯十惡叛逆已上故殺人及官典犯贓不在此限應左降官恩赦後未經量移者與量移近處丁憂去任服闋日亦與量移如凖前制已合量移有司未注擬者速與處分流人未到所在及已到未經量移者並與量移近處僧尼道士移𨽻未經量移者亦與量移近處中外前資見任官頃因延纍未及用才并左降官中有事情可恕名跡素聞者宜委中書門下量加奬用勿使屈滯俗未臻於富庶念每切於黎元衣食寡充旰昃興嘆百司田疇地有髙低嵗有善惡傷於水潦則低地不稔稍遇亢旱即髙處無苗近聞州縣長吏掩其灾損務求辦集唯於熟苗上加徵將填缺數致使黎元重困惠飬全乖自今後州縣百姓有遭水旱苗稼不收處檢驗不虗更准前後勑文被免不得加徵熟田人户令本配額外重出斛㪷商通百貨士奉公程俾無行旅之虞在去萑蒲之聚應州郡連帶江湖常多冦盜結構群黨潜蓄弓劒殘害平人剽劫財物道途商賈常患不安方今海內無虞所宜普凑委諸道節度防禦使如界內帶江山淮海處切加警備仍差巡檢更於要害處加置軍鎮捉搦擇有機略軍將鎮守逰奕明立賞罰如能設計擒獲賊黨二十人已上并獲贓物推問行劫蹤跡分明者量其功蹟節給優賞仍與遷職如界內有劫殺不能捉獲者亦節級重加懲責仍委出使郎官御史及所在巡檢院切加訪察不得更使因循邉戍禦扞戎夷士卒衣糧最為切事如聞逃亡浸廣營壘多虗又供給公私皆率官健妻拏困乏不免飢寒委本道節度使與監軍使躬親㸃閲據逃死缺闕人數便取軍中少壯有武藝子弟填替不得遣有虗名其見在將士衣糧皆須及時給付正身不得輒有减刻别將支用令其凍餒仍委出使郎官訪察聞奏有違當案覆科貶抑强扶弱實王道所先賦役以均則窮人靡怨度支鹽鐵户部諸色所由茶油鹽商人凖勑例條免户內差役天下州縣豪宿之家皆名屬倉場鹽院以避徭役或有違犯條法州縣不敢追呼以此富屋皆趨幸門貧者偏當使役其中亦有影庇其疑作真僞難分自今已後委本司條疏應屬三司及茶鹽商人各據所在場鹽正額人名牒報本貫州縣凖勑文處分其茶鹽商仍定斤石多少以為限約其有冒名接腳短販零少者不在此限其小鋪所由主人牙郎火夫牛户父兄子弟并在任州縣依例使例所冀勞逸稍均疲人蘇息給事郊廟之服奉繭絲之稅蠶桑是繁封植攸資宜設科條用絶違犯勤課種桑比有勑令每年奏聞如聞都不遵行恣為剪伐列於市肆鬻為柴薪州縣宜禁斷不得輒許更賣犯者科違勑罪理貴便人事存可久苟非托實則昧適時州府兩稅物斛㪷每年各有定額徵科之日皆申省司除上供之外留後留州任於額內方圖給用縱有餘羡亦許州使留備水旱其留使錢物更令諸道分析破用去處所立文帳皆是搆虛文百姓懇田承前已申頃畝及斛㪷單數近年又令其人户稅錢等第懇田水陸頃畝挾縣鄉分析徒為繁弊無益政途今年已後並宜停送州縣攝官假名求食尚懷苟且不恤疲人其闕少官員處並委本州刺史於當州諸縣見任官中量間劇分配公事勾當如官員數少力實不逮處即於前資官中選擇清謹幹用者差攝不得取散試官充職制祿授田著於定制貪猾利已不修舊章應畿內在京百司職田方聞本地多被狡吏及豪强平直隱蔽回換遙指荒間塉薄田地即配與浮客佃食免被豪吏欺隱如或因循不存勾當官吏等必當節級處分使命經行供備夫役既隳額例事頗姦欺須議舉明以全物力江淮兩浙每驛供使水夫價錢舊例約十五千已來使過元額須别供船夫近日相承取索無度從蘇常已南每驛便供四十餘千或界內或四五驛往來須破四五百千宜依往例不得數外妄供如更有違長吏已下節級書罪立政之本所務均平設法之源在絶僥幸京畿諸縣太常樂人及金吾角子皆是富饒之户其數至多今一身屬太常金吾一門書免雜差役今日已後只放正身一人差使其家下並不在影庇限涉歷吏事蓋崇理本自因近制却啓幸門太和九年十二月十八日勑進士初合格並令授諸州府參軍及緊縣簿尉未經兩考不許奏職蓋以科第之人必𢎞理化黎元之弊欲使諳詳非唯可塞幸門實亦用懲澆俗近者諸州長吏漸不遵承雖注縣寮多縻使職苟從知已不顧蒸人流例寢成侵費不少况去年選格更當府充職一人從事兩諸科錢虛占吏曹正員不親本任公事其進士宜至合選年諸道依資奏授州縣官即不在兼職之限武官選用本求才藝近日入仕多門虛僞轉甚就中兵部武選其弊尤深都無本根妄兼甲厯但求遷轉莫可討尋其武選且停見任武官即仰依前守職仍差官量與修甲厯得甲厯定然後許前資赴集輦轂之下諸色人中非吏非商間行逰手惣名趂事潜得容奸自今後有自謀職任私用貨財詭計多端經過朝貴者委御史臺京兆府嚴加察訪捉搦畿甸賦繁園陵至重先事立制冀免虛勞親陵柏栽每嵗添補約力計費役用至多嵗久而不見其功人勞而未除其弊蓋由栽植動土須先奏聞待勑下有司及擇日到縣已過期限豈盡施功空閲數以計傭皆朝種而夕朽自今已後每至嵗首委有司於正月二月三月八月四箇月內擇動土利便之日先下奉陵諸縣分明榜示百姓至時與設法栽植畢月縣司與守𬋩使同㸃檢據數牒報與折本户稅錢髙秩峻級榮蔭子孫蓋寵勞能著存令式近者漸寡廉撲多補名身不獨假蔭近房兼有規求厚利選曹既闕磨勘長吏不聞糾繩此弊公行吏途太濫自今後並須凖格用蔭人數年限不得逾越委吏部及御史臺嚴加覺察據其選授官到本道本州須審磨勘稍疑踰濫及察知冒賣資蔭便收禁牒報有司懋官述職禦侮申威暨于庶僚咸竭乃力峻其爵級以極封崇內外文武見任及致仕官三品已上賜爵一級四品已下加一階仍賜勳兩轉神䇿六軍金吾威逺皇城將士普恩之外各賜勳兩轉位列虞賔胄崇褒聖所以闡德教而昭前烈也二王三恪及文宣公各賜物五十匹二廣拱辰五營列衛明庭執玉航海會朝念申力以賞勞示懷柔而優寵神䇿及六軍金吾威逺皇城等諸軍將軍統軍已下各賜物有差鴻臚禮賔院應在城內蕃客等並節級有賜物光贊典冊發揮鴻名實賴重臣共揚休烈爰推恩以廣愛亦峻級以崇階攝侍中讀寶官中書侍郎平章事李紳攝中書令讀冊官右僕射兼中書侍郎平章事崔拱一作珙是各賜一子出身撰冊文官司空兼門下侍郎平章事李德裕賜一子出身正員官奉寶綬官書玉册官書寶官各加兩階進寶綬進中嚴外辨禮儀贊導押寶冊官各加一階其應職掌行事官三品及寫制官太常修儀注禮官并內行事官三品已上賜爵一級四品已下一階仍并賜勳一轉鐫造寶冊并填金字造寶裝玉冊官各賜物五十假飬老引年旌閭表行冀𢎞忠厚之俗以振節義之風天下百姓年九十以上委所在長吏量加存問孝子順孫義夫節婦旌表門閭終身勿事先已旌表者亦量加優恤降神表峻出寶應圖秩視公侯德穰灾患式崇明祀咸薦吉蠲五嶽四瀆宜委本州長吏備禮致祭名山大川自古聖帝明王忠臣烈士各令所在以禮致祭亡命山澤挾藏軍器百日不首復罪如初赦書有所不該者所司具作條例奏聞敢以赦前事相告言者以其罪罪之赦書日行五百里布告天下咸使聞知主者施行文苑英華卷四百二十三
