body:
  text: 文苑英華巻七百七十二宋李昉等編帝徳上南郊頌一首𤣥圃園講頌一首隋髙祖功徳頌一首拜南郊頌一首南郊頌并序梁簡文帝臣聞惟天為大聖人敬其徳知幾其神聖人契其道故龍官弱言之后合揆於蒼昊鳥紀垂衣之君昭格於上帝莫不巍巍乎穆穆乎渙汗於緑篇氛氲於丹冊者矣我梁皇帝之御天下也乗熛祗之盛曜即璧日一作月之遐照等乾覆之燾養合坤載之靈長四三六五之意一作四三皇六五帝非十堯九舜之明名與功偕業將時並自撥亂反正伐罪吊民馮玉几握金鏡君臨萬國於今二十有二載也緯天維理地軸移澆風於末俗反淳正於區中化不言而先一作尤匪顯教不嚴而已肅流樂復雅逺符雲韶之世墜禮還章非因忠信之薄九垓同軌四海無波儲明變照儀天作兩三衮咸作叶化台光麴糵王風鹽梅帝載塵清世晏蒼兕無藝文類聚有所作用其武功運謐時平類聚作雍鵷鷺咸類聚有并字脩其文徳桃林散甲華山優擬作弢刃玉門罷候紫塞沉鋒屠羊釣壑之士厭洗耳而襲簮佩版築藏巖之逸去慘榖而紆珩組異人俊乂既間出而在官世鏡河仙亦雍容而廊廟蹇蹇同於多士諤諤比乎得人五典三墨既葳蕤於璧水九流八索亦繽紛於石渠畫一之政萬代表於時和三章之律百姓沐於仁夀於是龍光之地日浴之鄉紫舌黄支頭飛鼻飲自西自南無思不服欵闗質子稱臣内向珠樹素禽越火枝之地銀甕卭杖踰沉羽之涘出赤野而連翩度𤣥妙之泱漭於是類聚作由嘉祥被衆瑞登金人澤馬丹甑玉鷄三角九尾四眉類聚作肩六足抽鋪地之九莖發端門之連理參差於郊藪布濩於宫闕類聚作闈府無虚月史弗能記周稱黄鳥之旗夏有𤣥珪之錫無以踰此嘉祥方茲㹅萃道洽世昌國殷民阜鄉知舜讓邑比堯封委粟西畆神絲被澤可謂我化若風民應如草我静如鏡物動猶煙天子猶未明求衣日昃不勌撤膳匪躬詢輿訪道鑾旗徐動棄千里而弗乗寶瑟無虞捐百金而不服廣行四等被慈雨於枯根大闡三朝一作明驚法雷於羣夣曲成萬物去殺愛生幽弊之民與蒼雷而共恱否滯之義同谷風而開杼昆蟲得性跂蠢欣生三驅有緩前之禽九門無餧獸之藥至徳之事如此太平之風如彼乃以恭肅神祗理通孝敬江左以来爽塏未闢爰命將作揆日載營三靈叶響百工咸事宛如神造儼類仙居冲秘隠嶙跨千畝於晉日閒曠麗逺吞七里於漢年五逹四通廓郊彌野南瞻重嶽北眺芒嶺東臨㶚滻西望舊豐紆餘委蛇丘陵起伏澎湃嶤屼山川異態飛梁邃宇洞爥類聚作燭穴類聚作空懸紫殿仙宫霞騫類聚作蹇鳥翥霧映倒梁日光踈鈑玉桃卷葉銀樹抽芳百果千株三珠八柱朝葉與蜜露共鮮晩花與薫風俱落露禽乍聚望比翼之翺翔歸飛時宿聞同心之夜響故以熊熊灼灼炫兩明而仰七曜紛紛沐沐承五煙而帶三靈圓丘閑靜紫壇肅設五精之塲千神之位八堦𢎞麗四維慱敞宛若千仭狀懸流之仙館煥如五彩同瑶山之帝壇石牒神昌之瑞方臻金縷飛光之徵永固是雕是琢鄙茅茨之為倫非珠非玉嗤甘泉之已奢望昔方今獨髙千古沿襲異等質文斯中於是嵗在單閼星次訾陬律中太簇日惟辛卯特有事於南郊甸師清野封人壝宫朱幕夕峙帷宫宿設曉漢斜陰挈壺升漏天子御玉輅動金根八驥揚衡雙龍翼盖雲罕徐廻鳴鐃韻響風承豹尾日映鶡冠萬騎天行千乗雷動石鎧犀衣之士連七萃而雲屯珠旗日羽之兵亘五營而星列鬱鬱阡阡震震填填充溢乎國都彌漫於鄽邑者也若乃廻輿降蹕薦禮帝儀揖大清秩羣望被大裘服山冕恭蒼璧之明祀穆靈壇之禋敬黍稷非馨明徳惟馨日曜彤精天澄翠色百僚師師九官濟濟千神叶福萬億均慶六典斯備三禮必該焚柴吿成罔不欽若翠煙升緑疑同河濵之瑞雲丹燎燭天若帝鄉之羙氣雲門麗舞咸池廣樂已叶九韶之曲復諧六列之奏金匏既動望蜿蟬之遊龍玉磬徐嗚觀參差之舞鳳袿轊駕肩士女填噎接袂為幃連𥚑猶堵皷腹擊轅行歌舞抃然後紆玉輦而謝書生登靈臺而望雲一作大非物欽明羙化跨萬古於茲日廣運愉樂表千載於當今方當廵云云之禮啟亭亭之業封天答睠禮地徴靈南山之夀無極七百之基長固豈不懋哉豈不盛哉菲薄微臣謬與藩服馳心休禮秣馬之願無由徒罄𥚹辭清風之藻多愧敢敷庸理獻頌十章其辭曰元始道一渾徳氛氲遥哉邃古夐矣初分磅礴地載清朗天文大人覩物生民樹君蛇驅龍凖作樂垂衣皇圖炤灼帝篆葳蕤廓寥中代合聖與誰於鑠我后命世天飛𤣥黙馭辯寂照秉真就雲握厯望日臨民謙光履徳義禮稱珎車書同軌天下歸仁期章孔備盛化𢎞道酌衢敬賔欽賢愛老變正疑是珍燭車非寶如海之深如日之杲肅恭明神逖聽前踵配天道尊迎陽義重𤣥酒陶匏燔柴雲聳跨舞論韶籠堯稱拱赫矣郊宫載惟静謐初學記作郊宫載静紫壇新謐肅肅禁圍陰陰仙室六戎列野八鸞照日架殿星羅重宫霧出蒲萄金橘靈夀木難表禁開暑貞檜陵寒山池壯麗階闔彤丹葉垂疊雨花落重巒康哉盛徳羙矣世初學記作時豐三辰炳燿七政永隆初學記作崇五方来洎四隩茲通懸繩度笮駕鹿追風既隆初學記作敷懋化復覩瑞滋金車出野玉露霑墀紫槩神草華平瑞芝長愉汪濊永固雍熈照天漏涘逺肅邇睦惠靡齊民恩彌比屋式光惇史踰斯郁郁皇哉康哉同斯景福𤣥圃園講頌并序竊以寶山峻極駘足未窺惠海遥波輕舟誰泛故以探沙亂一作詩𤣥妙類杵迷形百代同昏千年誰啟皇上託應金輪均符玉鏡俯矜若習續照慈燈鶴禁還春龍泉更曉𤣥水躍祥丹陵寫電功韜火宅徳覆昏衢智惠之光猶初日照忍辱之力如明月珠天成地平遐肅邇穆澤漏無底化行靡外滄河鏡渌碧海調氛停瑞氣於三辰汎祥煙於五節鱗羽被解罹之澤黎元沐至仁之道正化潜通法輪常轉類空鏡之傳虛猶懸河之㵼澗儲君徳彰妙象體眷春瓊視膳閑辰遨遊心法搦管摛章既便姢錦縟清談論辯亦參差玉照夏啟愧徳周誦慙風乃於𤣥圃園栖聚徳心一作懋之英並命陳徐之士樞談永日講道終朝賔從無聲芳香動氣七辯懸流雙因一作林俱啟情遊彼岸理愜祗園靈塔將漏天花乍落于時藏秋仲節麗景妍辰氣冷藝文類聚作含金扉霜浮玉宇聖慈冲邃獨幸勝地朱堂玉砌碧水銀沙鳥弄翅類聚作塢於瓊音樹葳類聚作藏蕤於妙葉液水穿流蓬山冩狀風生月殿日照槐煙綱叨籍殊寵陪奉末塵預入寶樓竊窺妙簡鳬藻喜忭獨營心靈敢作頌云皇儀就日帝道昌雲化隆垂拱徳蔓鴻芬機乗八解道照三墳巍巍蕩蕩萬代一君重離照景玉潤舒華七淨標羙三善稱嘉降茲法雨普洽生牙漣漪義水照曜文花芳園靉靆天宫類寶折論㝠空𤣥機入道宻宇浮清類聚作清幽重闗一作擔相藻日映金根類聚作雲風摇銀一作瑞草肩随接武握寶靈珠皆抽四照並按九衢顧惟多缺徒奉瑛瑜終如燕石更似齊竽隋髙祖功徳頌并序薛道衡太始太素荒茫造化之初天皇地皇杳𡨕書契之外其道絶其跡逺言說一作談所不詣耳目所不追或所逮至於入穴登巢鶉居􅙿飲寜一作不殊於羽族取類於毛羣亦何貴於人靈亦何用其心識羲軒以降爰暨唐虞則乾象而施法度觀人文而化天下然帝王之任一作位可重聖哲之道為尊夏后殷周之國禹湯文武之主功濟生人一作民聲流雅頌然陵替於三五慙徳於干戈秦君閏位用刑名為政本漢執靈圖雜覇道而為法當塗興而三分峙典午末而四海亂九州封域窟穴鯨鯢之羣五都遺黎蹴踏戎馬之足雖𤣥行定嵩洛木運據殽凾未止滄海之流詎息崐山之燎叶千齡之旦暮當萬乗一作葉之一朝者其在大隋乎粤若髙祖文皇帝誕聖降靈則赤光照室韜神晦迹則紫氣騰天龍顔日角之竒玉理珠衡之異著在圖籙彰乎儀表而帝系靈長神基崇峻類邠岐之累徳異豐沛之勃起俯膺歴試納揆賔門位長六卿望髙百辟猶重華之為太尉若文命之任司空蒼歴將盡率土糜沸玉弩驚天金芒照地一作野姦雄結一作挺禍據河洛一作朔而連海岱猾長縱惡杜白馬而塞成臯庸蜀逆命憑銅梁之險鄖黄背誕引金陵之㓂三川已震九鼎將飛髙祖龍躍鳳翔濡足援手應赤伏之符授𤣥弧之籙命百戰一作下百勝之將動九天九地之師平共工而殄蚩尤剪偰窳而戮鑿齒不煩二十八將無假五十一征曾不一作未踰時妖逆咸盡一作殄廓氛霧於區宇出黎元於塗炭天柱傾而還正地維絶而更紐殊方稽顙識牛馬之内向樂師伏地懼鍾石之變聲萬姓所以樂推三靈於是改卜壇塲已備猶𢎞五讓之心億兆難違方從四海之請光臨寶祚展禮郊丘舞六代而降天神陳四珪而饗上帝乾坤交㤗品物咸亨酌前王之令典改號易稱一作徽號因庻萌之子来移創都邑天文上當朱鳥地理下㨿黒龍正位辨方揆景於星日一作日月内官外座取法於辰象懸政教於魏闕朝羣后於明堂除舊布新移風易俗天街之表地脉之餘一作外獯獫孔熾其来自久横行十萬樊噲於是失辭提歩五千李陵所以䧟沒周齊兩盛競結旄頭聘國一作狄后於漠北未足息其侵擾傾珍藏於山東不能止其貪暴炎靈啟祚聖皇馭㝢運天䇿於帷扆播神威於沙朔栁塞一作室氊裘之長皆為臣僕一作𨽻滄一作瀚海蹛林之地盡充池苑三吳百越九江五湖地分南北天隔内外談黄旗紫盖之氣恃龍蟠獸㨿之險恒有僣偽之君妄竊帝王之號時經五代年移三百爰降皇情永懐大道愍彼黎獻獨為匪人今上利建在唐則哲居代地馮宸極天縱神武受服出車一舉平定於是八荒無外五服大同四海為家萬里為宅乃休牛散馬偃武脩文自華夏亂離綿積年代人生一作造戰争之日一作其家習澆偽之風聖人之遺訓莫存先王之舊典咸墜爰命秩宗刋定五禮申勅太常一作太予後漢樂名改正六樂玉帛樽爼之儀節文乃備金石匏革之奏雅俗始分而留心正術垂神或作拱非聽覧早朝晏罷廢寢忘飡憂百姓之未安懼一物之失所行先王之道夜思待旦革百王之弊朝不及夕見一善事喜彰於容止聞一愆犯歎深於在予薄賦輕徭務農重榖倉廪有紅腐之積黎萌無阻饑之慮天性和恕一作𢎞慈仁慈惻隠恩加禽獸胎卵於是獲全仁霑草木牛羊所以勿踐至於憲章重典刑名大辟伸法而屈情决斷於俄頃故能彛倫攸序上下各一作齊肅左右絶謟諛之路縉紳無勢力之門小心翼翼敬事於天地終日乾乾誡慎於無一作元是極陶黎民於徳化致風俗於大康公卿庶尹遐邇岳牧僉以天平地成千載之嘉㑹登封降禪百王之盛典宜其金泥玉檢展禮介丘飛聲騰實常為稱首天子為而不恃成而不居冲㫖凝邈固辭弗許而雖休勿休上徳不徳更乃㓗誠岱岳遜謝愆咎方知六十四卦謙撝之道為尊七十二君吿成之義為小巍巍蕩蕩無得以稱焉而深誠至徳咸逹於穹壤和氣薫風充溢於㝢縣一作宇宙二儀降福百靈薦祉日月星象風雲草樹之祥山川玉石鱗介羽毛之瑞嵗見月彰不可勝紀至於振古所未有圖籍所不載莫不見所未見聞所未聞二句一作目所不見耳所未聞古語稱聖人作萬物覩神靈滋百寶用此其効矣既而逰心姑射脫屣之志已深鑄鼎荆山昇天之駕遂逺凡在黎獻具惟帝臣慕深考妣哀纒弓劍塗山幽峻無復玉帛之禮長陵寂寞空見衣冠之遊若乃降精熛怒飛名帝籙開運握圖創業垂統聖徳也撥亂反正隆一作齊國寜人六合八紘同文共軌神功也𤣥酒陶匏雲和孤竹禋祀上帝尊極配天大孝也偃斾戢戈正禮裁樂納人一作民夀域驅俗淳朴一作福林至政也張四維而臨萬㝢侔三皇而並五帝豈只一作直錙銖周漢么麽魏晉而已雖五行之舞載一作每陳於清廟九歌之徳無紀一作絶於雅樂一作樂府而𤣥功暢洽不局於形器懿業逺大豈盡於揄揚臣生輕多幸命偶興運趨事紫極一作宸驅馳丹陛一辭天闕奄隔鼎湖空有攀龍之心徒懐蓐蟻之意庶馮毫翰敢希賛述昔堙海之禽不增於大地泣河之士非益於洪流盡其心之所存忘其力之所及輙縁斯義不覺斐然乃作頌曰悠哉邃古邈矣季世四海九州萬王千帝三代之後其風逾替爰逮金行不勝其弊戒狄猾夏羣凶縱慝竊號滛名十有餘國怙威逞暴悖禮亂徳五岳塵飛三象霧塞𤣥精啟厯發跡幽方并吞㓂偽獨擅雄疆享一作戴祀二百比祚三一作前王江湖尚阻區域未康勾吳閩越河朔渭涘九縣𤓰分三方鼎峙一作跱狙詐不息干戈競起東夏雖平亂離漠矣五運叶期千齡一作年肇旦赫矣髙祖人靈攸賛聖徳挺生神謀獨斷癉惡彰善夷兇靜難宗伯揆一作撰儀太史練日孤竹之管雲和之瑟展禮上𤣥飛禋太一珪璧朝㑹山川望秩占揆星影移建邦畿下馮赤壤上叶紫㣲布政衢室懸法象魏帝宅天府固本崇基一作威匈河瀚海龍荒狼望種落陸梁時犯亭障皇威逺攝帝徳遐暢稽顙歸誠稱臣内向勾一作吳越提封斗牛星象積有年代自相一作稱君長大風未繳長鯨漏網授鉞天人豁然清蕩戴日戴斗太平太䝉禮教周備一作被車書一作車軌大同復禹之迹成舜之功禮以安上樂以移風憂勞庶績矜育黔首三面解羅萬方引咎納民軌物僉登仁夀聖化隆隆一作平生人一作靈熈阜䖍心恭已奉天事地恊氣横流休風一作徴紹至壇場望幸雲亭虚位推而不居聖道彌粹齊迹姬文登發嗣聖道類漢光傳莊寶命知来藏往𤣥覧幽鏡鼎業靈長洪基隆永一作盛崆峒問道汾射一作祀窅然御辨遐遊一作逝垂雲上仙哀纒率土痛感穹𤣥流澤萬業用教百年尚想睿圖永維聖則道洽幽明仁霑動植爻畫一作象不陳乾坤將息㣲臣作頌用申罔極一作皆隋書本傳拜南郊頌并序王勃㣲臣上稽龍繇下閱龜謀觀天地之至道考皇上之大節武宣七徳未嘗踰息亂之鄉文招九功未嘗出昇平之域並能懸日月而髙視駕雷雨而先鳴或皮幣而踐大階或干戈而躡乾歩至於理定創禮功成作樂振長䇿以叙諸侯設靈機而制羣動猶虞階已㤗不能息洞庭之誅夏載克寜不能罷㑹稽之戮故將體剛柔而立本法震曜而崇威一戎而㝢縣平四罪而華夷服然後皇旗大輅詔殊號於圓丘電轉雲廻奏𤣥符於孝理天下黎人知四海之安樂寰中殊域奉三靈之康㤗徳兼祥風灑道與和氣㳺不言而大寶用貞無事而元功有立捨彼代也其誰與哉若夫應運而生繼天而作皷動千載之下超騰百王之上遂能發軒庭之景曜躡隋運之頽風揖讓而取文明指麾而清幽夏則我皇唐得之矣髙祖以黄旗錫瑞靜雲火之横氛太宗以赤羽登期補星辰之絶縷授瑶圖於斯邑付璿厯於鈞臺人更三聖道昭千古於是俛臨睿極趨四荒於鳳闕之前端委廟堂調萬國於龍軒之下八鸞徐動頓湯文於後塵九駿長驅佇堯舜於中路邦家之具得矣易簡之業存矣猶有朱䝉戾俗違光蓬艾之間青激遺甿假氣陶鈞之内背熊山而搆虐擁狼潭而稽誅竊瀛海之風波弄乾坤之綱紀漢圖西返惟收五郡之名魏律東窮未出三韓之險姦謀蓄於有漸逆節成於不悔長蚊蚋之雷霆附豺狼之羽翼豈知夫至人無外撫天下以為家真數有歸吊羣方而罪已三門遁甲黄公成不戰之師五壘神兵𤣥女下先登之䇿肅牙璋而按律輝旄節而分麾降南宫之元老裂西營之毅卒良將首路偏戎竟野軸轤萬里旌旗四合金緗玉匱司空憑首勝之威鶚視龍趨將軍仗萬全之畧負鼇丘而峻壁㨿黿壑而深溝一皷而亭塞無塵七縱而江山失險伐罪以明而不以衆懐逺人於絶境均惠化於殊隣登若木以照臨折紅桃以延佇然後分州列鎮對明月以收營返斾旋戈部𤣥雲而振旅望神都而獻㨗仰靈社以書功辛亥謁於昭陵癸丑吿于太廟時乗黑帝月旅𤣥枵大唐有國之五十一年皇帝有天下之一十九載也元惡既殄萬宇清矣元勲既輯萬寶成矣以為周郊上帝裁延肅慎之賔漢禮甘泉未拯朝鮮之亂想𤣥功而反側奉先㫖以遲廻思答上靈之心以洽庶黎之望爰考吉日遂靜行宫有司具典乗輿乃出撫𤣥蚪戴翠鳳鼉皷按節鯨鐘䟽響千乗嶽動萬騎林廻星陳而天行雷震而霧合是時未登夫太壇也廼齋帷宫宿帳殿華盖移影鈎陳從蹕千營夕布亘蒼野而煙凝萬幕宵懸背黄闉而霧列既而屏翳清曉飛㢘警旦孫叔奉轡王良聳䇿雲藏星謐宇曠山明旌軒具照簫笳互凝陟名嶽以吿成歷神丘而展事國容象物而動朝章視令而肅宸儀有晬虚徐大帝之庭列侍無譁髣髴華胥之國於是襲衮服戒爼豆端瑞班儼華旒樂懸六代禮備三古奠惟蒼璧藉用白茅鳴孤竹之簫管奏空桑之琴瑟感格以誠不以事動植咸驩敬神以道不以華天人合應然後駐聲名於上邑反文物於仙宫因雷雨而作施法雲天而用響風行電舉未寸景而浹九埏野抃途歌不崇朝而晏六合我之𤣥極建矣我之能事畢矣趨帝寰而振足越皇衢以驤首不其然乎雖睿化無方比神圖而絶唱而小臣不佞撫洪筆而當仁敢作頌曰遼河巨浸碣石危峯城分𤣥莵塞接黄龍憑遐作梗恃險忘恭人殘鬼哭主闇臣㐫有晉不綱戎麾内逐帝隋失御皇輿外鶩九縣塵征三靈霧黷長茲下慢逋我天戮五材無隕千齡有聖武創元基文清寶命波恬四海明宣七政息衆以寜綏荒一作緩死以令飛龍繼跡鳴鳳重光遂均夷夏迭用柔剛戈船泛月劍騎横霜風驅海石電掃辰陽帝師無戰神兵有伐丞相陪麾司空仗鉞危雲旦起長星夜發萬壘爭屠千城自蹷功超薄伐義極兼該殊方底定善陣徐廻歸俘獻㨗課績分材建侯清廟偃伯靈臺考事龜謨凝情鳳扆仰觀俯察享神作祀道則推天功非在已豐隆旦出招摇夕指神壇嶽立齋館雲深鑾旗曉引葆吹晨吟山明野澈日降天臨鏘鏘盛服肅肅珪簮爼豆畢陳笙鏞間撫玉觴分獻金錞暢矩青帝鳴琴朱靈㑹舞上和下恱神歆神聚收驩巨野反斾靈躔思周宇宙樂極寰埏徳因時立頌以詞宣帝之功也臣何餙焉文苑英華巻七百七十二
