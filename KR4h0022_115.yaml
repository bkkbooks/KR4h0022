body:
  text: 文苑英華卷一百十五宋李昉等編寶一六瑞賦一首玉賦一首攻玉賦一首石韞玉賦二首韞玉求價賦一首沽美玉賦一首良玉出櫝賦一首良玉不琢賦一首良玉比君子賦一首六瑞賦以儉故能廣被褐懷玉為韻李子卿昔先王之朝列位也宴以示慈惠享以訓恭儉故六瑞之等差為百僚之形檢將以守官有序而亦在瑕無掩其質不昧特明乎等威其義則深兼管乎褒貶然而圭璧列布方圓為度煥彼憲章請徴其故且五節之制以瑞為恆美王者有逮下之德而鎮圭是增庶存乎可大可久仍契乎不騫不崩追琢斯成伊桓伊信會朝是執惟股惟肱伯置躬以式禮子揖穀以旌能况不闕一於蒲璧固知夫立疑作六瑞之道斯𢎞若乃伯禹塗山千載攸仰率土肆覲普天歸往獻替之道若木從繩朝宗之心猶風召響棣棣之威儀是浹愔愔之德音克廣徴往會之有倫信斯瑞之所奬洎夫道德浸微君臣失義或求車棄禮或舉烽成偽出而非正為丘明所羞召之河陽則文宣興刺九服自失其序四海莫由光被徒以彼狄為好仇豈用我圭為嘉瑞丕休哉否不可終道窮斯達我國家崇儀式禮敦本棄末三起衣荷再徴被褐執玉既翼其左右班瑞仍霑於退闊美其四時展禮百神允懷奉圭以拜亦授鎮之力孰云祈年而階一作諧則知禮之所貴莫先於玉發六瑞於周典冠二牲書作二生於舜録其難致也恥應連城之價不易知焉甘刖三獻之足儻未逢至鑒之所珍誰辨混沙以雌伏者哉玉賦仲之玄眇坤珍之潛思察妙有之嘉生伊靈丘之産玉得天地之純一作淳精超衆寶而惟美比君子而居貞含溫潤之麗色抱清越之竒聲神光照廡髙價連城瑜滅有私而不掩圭美無心而自明爾乃太玄分儀洪纎是質瓊瑶琬琰之殊號結緑懸黎之衆述五色相宣千名競出振鶴羽以益鮮聳雞冠而增煥匪蒸栗之足侔何純漆之能亂乃堅以守正妙以通微洪爐不能易其色厚地不能瘞其輝乍騰虹於白氣或見女於青衣山林孕之而含鬱川瀆育之而漣漪昭靈神之景命啓聖哲之昌期無終設漿而獲偶渭浦投釣而匡時復有逍遙人俗髣佛仙府泛醴流膏崇臺結宇飛華崑閬之岫結影蓬瀛之浦使人主齋戒班垂歎揚磨礱規矩華睆文章琢之為圭下辨君臣之節合之為璧上連日月之光既展禮於天地亦分榮於殿堂垂纓珮兮濟濟登鑾輅兮鏘鏘入管絃而流韻備樽俎而含芳然而運有屈伸時兼否泰當其潛影幽阻抱璞荒外碔砆紛揉砂礫無汰空泥涅而不緇何風雲之難會嗟夫雖天下至寶必俟鑒而後知苟非人而妄進則按劍以興疑故卞和為之瀝泣鄒陽為之銜悲夫物不可以衒賣將韞櫝而藏之攻玉賦以他山之石為韻趙昻有美玉於斯有工人在茲玉待人而成器人捨玉而何之於是施一作用其巧審其思事必堅決心無墜虧再視再度以蒙夫精鑒匪瑕匪穢注在前寧有於吾欺向無質直之性琬琰之姿特達人許清貞自持則大匠不顧天材或遺亦何知入之於火也不變其色投之於泥也不染其緇良工見此闕多惜直以為珽圓而作璧無枉纎毫皆知所適遇今晨之發彩冀入圭璋察往日之屈蒙期分干石於是虹氣玉白雞冠與赤執之以禮故有藉而見文受之必齊非許城而不易若然者疑隱於玉玉無憚於可磨玄黃糅色山水騰波但因時而獲賞敢輕議乎其他人未我知甘無言於見棄賢能相達將不索而謂何况乎玉之寡珉之多夫子有比德之歎卞生為追怨之歌歌曰昔之玉在石石在山山有玉兮隱其間今則石為錯玉為環環亦獻兮君解顔遂與生芻為比與郤桂同攀豈辛勤於道路徒抱泣於荆蠻石韞玉賦以溫潤積中英華發外為韻白行簡髙山穹崇山有石兮玉在其中物不能自珍綿千載而抵飛鵲寶所以為異貫四時而見白虹積苔文而外翳涵氷形而內融煥乎其文既自抱其堅白敦兮在璞將有俟於磨礱嗟夫委質含章藏輝晦迹閟竒文於特達韜善價於今昔棄他山之下未得輝乎滿堂泛渭一作楊水之中誰復知其盈尺混清潤以潛穎託層崖而委積愛而不見雖類懷寶迷邦和而不同終辨我心匪石懿夫石惟縝密玉乃堅貞孕明含粹養素挺英包其蒙詎覩蘂兮之色藏於密誰識詘然之聲徒觀夫明其內晦其外諒可久而可大見其素隱其華若去泰而去奢形委順而可轉心抱忠而無瑕暗然而章同夫珠媚於水光而不耀異乎金在於沙爾其玉方藴藏石未磨磷氣中潛以育德色旁達而示信處於鑿鑿則氷疑作水見文選顔延之詩折而方流依彼巖巖亦山輝而木潤照廡之光尚戢截肪之色空存昧識者但見其落落精鑒者方辨其溫溫石不能言莫遇琢磨之力玉未成器難逢拂拭之恩則知至寶在乎藏真至德惡夫自代刳其心而白不受采實其腹而間不容髮客有愛此堅貞想其清越歎時俗之莫顧惜輝華之潛發儻見彩於一拳庶無虞於再刖第二以淳粹積中英華發外為韻李瑾客有感物而憤激何彼連城之珍尚藴他山之石嗤宋人之謬好嗟卞子之未覿抱昭質而陸沈緘異彩而塵積則知時有興廢道有窮通以彼十德之美處斯一拳之中光未施於照廡氣潛發於如虹知識真者希故處幽自祕莫覩縝密空含精粹良工未遇曷溢目之可觀髙價儻來將無脛而自至其窮也類獨善以自守其出也比兼濟而為利誠宜取貴於人資琢成器也今用晦而明抱素含英慮以俱焚每懼崑岡之火俟乎人用自憐一作為物産之精豈直潤木有所輝山可名惜沖鑿之未臨倦凡目之見忽徒在山而期久獨蒙垢而未發麗質可嘉采實損華居其中誰謂困乎石藏於密非曰匿其瑕是知物變則通否極將泰彼含章而混迹由因中而表外當今庶類歸真萬物化醇地不藏寶山將貢珍豈使永韞光於散地獨埋照於窮塵願鑿石出於竒璞知乎希代之無鄰韞玉求價賦以韞櫝藏諸沽求善賈為韻獨孤授物有可為之感憤彼玉也則良寶而斯韞豈不以識貞或寡至真難鬻白虹之氣莫通玄圃之英久伏精鑒頗期於卞氏無厭匪及於虞叔懷特達之性豈傷於山抱堅剛之姿寧毁於櫝雪澤膏光隂中之陽工成六器色備五方是飾容乘乎車服亦將頒瑞於侯王表其華同貞士之素履韞於密叶至人之退藏誠異乎石處而以居可比夫處實而若虛我則物之貴者彼宜力以求諸惟賢有孚豈名是沽佩諸身可以節君之步執於手可以息君之趨或稱之以琬琰或嘉之以瑾瑜韞櫝如將於慢藏匪瑕之匿連城儻用之善賈何脛之無是知接神祗者必我之由奉朝聘者亦我之求雖含光之未發信入用而則周伊入用也理均乎兼濟其含光也義等乎獨善詎若韞鄭鼠之足嗤寶燕石而莫辨有客感而嘆曰玉也者固可取貴乎天下今不售於人猶獨髙其價垂大賢之盛德非小禮之能捨故有偃蹇當時沈冥委化必使反荆王之深惑審田文之見詐則美玉器而髦士官豈徒埋身而照夜沽美玉賦以懷寶迷時豈曰君子為韻白行簡美矣哉有玉於兹不磷不緇韜而藏則傷乎祕寶懷而匿又慮乎失時是以露瑶華之炯爾就朝市而沽之且以辨玉璞之名且以見至珍之道耀盈尺之燦燦彰合拱之皓皓使思之者覩於貞清仰之者知乎堅好首六瑞以為瑞排衆寶而稱寶然後厥聲載路厥價載聞藴十德以光代先駟馬以薦君亦何必隱映其華韜藏其美行於魯謂迷邦之士入於宋比越鄉之子豈獨用為薦神亦自以為厲已一作一自以為身危一自以為厲已且時見玉而既重玉待時而以諧獻楚之忠誠必賞求秦之價直非乖自可覆之於櫝鬻之於懷間彼琅玕照追師之笥離于衣褐禆天子之階寧令善價不再良辰無幾且逺於簮裾永踈於筐篚夫然則玉工貽誚君子不韙韞藏之則求沽之則吾豈如垂棘之璧不琢之圭亦當出彼巖石鬻此規携是以百爾之行一與之齊未有玉逢價而更惜士於時而自迷然則事有可而必行辭有為而焉説道既危而思隱善求顧一作售求善而無伐故沽玉者遵於賜言待賈者存乎子曰沽哉於斯文而蓋闕良玉出櫝賦以藏輝久矣善賈今來為韻嚴楚封美玉於斯兮韞櫝未揚閟其質韞疑其光寧處幽而遂久將發蒙之可望貞必俟時奚甘其隱伏寶實稀代安得而蓋藏勿謂愛之而不見願使暗然而後章比事詎同乎剖蚌契已可侔乎釣璜其始也不琢而成效珍可喜絢彩旁射寒煙溢起辭礦璞而山輝乍無受緘縢而虹氣未已同被褐之內朗類守墨之中美君方固扄鐍彼孰得而沽諸君儻力提携必同兹而出矣於是至寶將啓良工肯來目力深昧心源獨裁念孤貞之特逹聊徙倚而徘徊將發蒙之是思玉不得不發苟開物以為務櫝不得不開既而真質騰晶孤光盈手貞非受采一作溫明不容垢希成器而入用因比德而見厚荷拂拭於惟新忘沈淪之永久溫其朗潤動有清輝知照廡而識之者異將抵鵲而用之者非用如之何規模之下為環而循理不盡製佩而流韻相借在昔退藏於密何敢稱珍幸今顧盼生光終希善價乃知良玉之比也重出櫝之義也深雖寓言於彼而察人在今欲使出處有節貞方其心無毁櫝之嗟誠非肆志起生芻之詠寧懼陸沉則有報匪瓊玖器慙瑚璉倘雕琢之見嘉庶英華之獨善良玉不琢賦以資質溫潤無假雕刻為韻崔咸惟玉也稟堅白惟琢也散貞姿璞且無瑕可重其良者德斯有比不在於文之故以素為貴也任其自然之資則追琢其章不得以曲肆其巧特達之節不得以無飾而疑懿夫蓄溫潤以生輝見精神於照室發虹氣彰皓質欲磨不可每清貞以自持其美孔嘉在切磋而何必體乎智而其理以密合乎仁而其色斯溫既有求於剖璞寧不憚於焚崑諒成器之罔念固全真之一作而可敦嗤獻斗負一作員來終見碎於亞父鄙成環可佩俾獲罪於叔孫含其章積其潤恥從飾以變質豈匿瑕而為吝將奪價於連城笑如泥於利刃所寶者道不在其沽幸可貴於君子非賈害於匹夫流水之文記其方兮斯有他山之錯施其用兮則無美可同於韞櫝嫌匪生於掩瑜秉不磷不緇之道陋為圭為璧之徒則知玉之美者是吾寶也異宋人越鄉之患司城安得而使攻類晉侯外府之珍虞道固知而可假雖天子賜圭於朝亦琢亦雕諸侯受瑞于國亦磨亦刻所以尚其名一作信尊其德豈徒文被褐之懷飾截肪之色又有一拳可尚三獻未識俟覽一作鑒者而求旃兾善價而不忒良玉比君子賦以精光茲色矩絶寶圖為韻暢瓘白虹為氣太陽為精堅其質孕其明卞子識之而曰至寶他山之石攻而挺英融雪華於潛潤一作映洞氷彩而凝清彼其一作既良玉焜焜煌煌瑩若既兼縝密粲乎其有文章積千金而比價掩十城以騰光將以配君子比皇王豈徒潤林薄藴巒岡而已哉伊何配之溫潤含茲瑕穢已注在前不匿貞心固持性自然也灼而不變質有餘也涅而不緇溫以作德成我邦式天子展四時之儀庶官修五等之職圭以為瑞佩以比德上下有軌尊卑有翼既山水節其文玄蒼差其色四者爰備勞逸是主民也事也右叶於角徴君也物也左諧於宫羽反而規旋而矩其志不散其容斯取况居則設朝則結進退鏘鳴抑揚磬折禮樂之儀著非僻之心絶是則惟身允固惟玉不撤且駭雞之珍驪龍之寶雖赩其豔煥其藻但侈於庶心何補於王道豈若玉之義也深乎博乎詩人以生芻取喻一作興賢則髙矣孔氏以佩環讓德謙莫比夫故藏之瑞府偶一作隅之河圖奉之者生敬執之者不趨幸無棄於照廡得一獻而論都尹文子王問玉價工曰無價五城之都僅可一觀文苑英華卷一百十五
