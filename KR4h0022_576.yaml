body:
  text: 文苑英華卷五百七十七宋李昉等編文官讓官代王尚書讓官表二首為李景諶讓天官尚書表一首讓地官尚書表一首為歐陽通讓夏官尚書表一首為楊執柔讓夏官尚書表一首為歐陽通讓司禮卿表一首為司禮武卿讓官表一首為崔神基讓司賔卿表一首為司刑袁卿讓官表一首為司農李卿讓官表一首為宗楚客讓營繕太監表一首為王遺恕讓殿中少監表一首為第十舅讓殿中監兼仗內間廄表一首讓麟臺少監表一首為田歸道讓殿中監表一首讓成均祭酒表一首自內史再讓成均祭酒表一首讓吏部侍郎表二首代王尚書讓官表闕名臣某言臣聞綆之短者無以汲深馬之疲者無以致遠臣實凡淺素乏器能爰自效官纍蒙驅䇿服勤中外三十餘年始奉將作遽加節制叨尹京觀之任兼副八座之權空勵駑鉛竟無補裨陛下寬其罪戾特見優容尚列周行更升榮級臣以殿中監依前檢校刑部尚書未經數月又集賢待制豈臣才能及此皆是明主曲成感戴殊私不忘寢食誓將竭節以報國恩而去歲已來纍癭沉瘵形神久殆筋力漸微在暇日多朝天未克顧惟所職倍益兢惶地近一作邇宫闈事繁供應統茲六尚之務不可一日缺人以臣之曠所害尤甚雖欲匍匐就列支持守官力所不任難於自勉伏乞矜臣不逮許停此官在臣血誠實惟志願無任懇迫之至第二表臣某言臣聞為臣事君貴於無隱情有所切必以上聞一作言苟易茲道即非盡節臣以衰憊形貌支離自冬徂春心勞力竭竊料旬月之內未能趨拜闕庭殿省務殷實憂廢失昨以所瀝上請乞罷此官天路高深未能允納伏覿墨詔冰炭交懷且人之立身大抵榮祿蓋有欲之而不得未有得之而願辭今臣務總六尚位雄九列往來中禁輝映當朝在臣私門實深慶幸若力能奉職智可效官豈敢罔冒天聽堅為飾讓推之物理況見愚衷又臣疇昔之志每懷勤恪比雖綿惙倍益殷憂小有供擬盡關心慮以茲重困轉覺疲羸伏乞天慈察臣不逮儻獲免所職俯救沉疴生成之恩無以堪比無任懇迫之至為李景諶讓天官尚書表李嶠臣景諶言伏奉恩制以臣為天官尚書寵命載臨震悸交集鞠躬自􅌤屏營無措臣景諶誠惶誠恐頓首頓首死罪死罪臣聞俊乂在官百揆所以時叙名器妄假九流於是咸曠事關隆替義難忝越臣才疏行缺學淺智空十舍無千里之資一經乏三冬之教一作效徒以遭逢昌運始因藉時一作集來幸雨露一作雲雨之曲成遇山川之廣納遂得差肩冕笏比跡流品出入臺省周旋階闥鏘金鳴玉坐榮枯朽擊水摶風顧慙腹背自忝司衡鏡亟易一作積星灰雖智力已窮而清通未效朱紫多紊涇渭莫辨宜其抵罪觸網稍清官謗翻乃假寵增服更垂天奬是用荷恩內訟以榮為憂且夫八座位隆五曹望重典南宮之喉舌象北斗之樞機式資藻鑑奚綜賔實自非孝先亮直彥輔公忠一作恕山濤之簡靜篤素顧談之心精體密何以對揚天哲厭塞人望顧斯政本實總國彛豈臣庸愚所堪尸忝伏願回光寢照返汗收恩察臣由衷之請矜臣陳力之議則朝端允穆天下至公四始輟在梁之譏六爻無負乘之纍矣無任慙懼之至謹詣朝堂奉表以聞其所讓人具如别狀臣景諶誠惶誠恐頓首頓首死罪謹言讓地官尚書表臣某言伏奉制旨以臣為地官尚書無涯之恩忽降霄極非據之惕坐驚魂宇臣某誠惶誠恐頓首頓首死罪死罪臣少無奇志長乏異能短步非疾於驊騮翾飛自同於燕雀逢聖神之再造屬天地之兼容鄭璞齊竽竊混聲價秦冠漢綬叨踐名級步鴛池之清切陟鸞渚之便番出入五臺周旋三閣行膺負璽之任遂服專車之寵萬幾損益蔽於庸陋之心百揆謨猷滯於膏肓之疾爰發皇揆特留宸眷假優閒之秩雖入杏壇參翊亮之謀尚和梅鼎徒延舟楫之舉竟微股肱之效挈瓶之智患在於空虛瞰室之災懼深於盈滿方陳骸骨之情遽荷雲霄之命負乘之責前謗未除忝越之譏後恩仍及還振蜉蝣之羽欲參龍鳳之行赤紱妨賢物知不可素食得位臣亦胡顔况八座樞機五曹要劇上儀七星之象旁理萬邦之教自非元凱之明允忠肅陳韓之敦朴淳深將何以釐正版圖擾安邦國臣之淺狹誠則貪叨朝有典章敢叨疑非望伏乞回乾坤之曲澤收雨露之殊私廣訪訏謨詳求棫朴更引食場之彥俾臨均土之司則受任得才無愆振鷺之美官方有序不失貫魚之次無任慙悚之至謹詣朝堂奉表陳請以聞臣所讓人别狀封進臣某誠惶誠恐頓首頓首謹言為歐陽通讓夏官尚書表臣通言伏奉恩制以臣為夏官尚書非常之恩忽萃庸朽顧匪服而增靦奉如絲而自失臣通中謝臣聞思皇多士必求於俊乂惟帝念功不寄於庸保臣識量凡淺志業空廢乏刀筆之吏能無俎豆之經術徒以積勞為忝久宦成資承日月之末光霑雨露之𢎞貸丈二之組每慙於假竊尺一之制更奬於庸微俯仰慙惶屏營反側夫以天臺峻密帝猷殷曠端揆隆於八座樞衡總於萬幾非夫賢才孰能綜理况周官司馬有甲兵之職漢服珥貂兼喉舌之任歷觀前載此選尤難安可以樗櫟散才瓶筲小器比德陳劔差蹤鄭履豈無慙於謬寵實有懼於妨官今聖歷惟新王化資始天工其代帝難所急伏願特寢過恩旁求實用塞多幸之路開至公之道則巨鱗縱壑朝有得賢之頌惟鵜在梁臣無濫官之責無任慙懼之至謹詣朝闕奉表陳請以聞為楊執柔讓夏官尚書表臣執柔言伏奉恩制以臣為夏官尚書光寵載臨震悸交集臣某誠惶誠恐頓首頓首死罪死罪臣學無所成志不及遠徒以憑托霄漢接南陽之近親感會風雲附西京之外戚遂得叨恩藉幸服冕乘軒將燕雀而同化共鸞鳳而並翼自升榮軒闥接武卿士徒參河海之象竟乏涓塵之效竊位妨賢自甘屏黜循涯揣分敢希超奬而聖造不資天波纍洽仍降非常之澤更申踰等之命豈惟連芳八座上比七星固亦分職五曹專司九法昔虞登百揆命喉舌之官晉簡庶寮崇元凱之秩自時厥後此選尤難自非宿望通才高賢舊德何以别邦國之大典膺腹心之重寄臣尸忝無成實彰於既往朽劣不逮難冀於將來雖輸報有心而勉勵無術寧敢自安時謗屢玷國猷陛下綜理機衡搜擇才俊而至公之道未廣於翹薪則哲之明近謬於庸菲恐人物鮮體衣冠失望伏乞暫回冲鍳俯絶過恩更𢎞尚德之舉不失能官之授則濟濟庶寮自有悅於多士區區庸鄙儻無譏於候人不任慙懼之至謹詣朝堂奉表以聞謹言為歐陽通讓司禮卿第二表臣通言臣受恩怖懼已薦欵誠而還旨綢繆未垂矜亮俯仰局蹐心魂震蕩臣通誠惶誠恐頓首頓首死罪死罪臣學藝雙缺心迹兩蕪顧常接言友朋而信未盈缶陳力官守而智罕挈瓶徒以沐道康衢餐和休歷四方無事逢聖后之垂衣百度已貞得庸夫之高枕幸承寬大遂安忝竊本將榮利求達不以亷隅自修厚祿尊官雅是所溺陳辭抗疏豈為高誠以理苟未安義則不可何者器有劑限物有局量當其才則事或能濟踰其分則力所不堪是以枯木朽株不荷棟梁之任謏聞曲學不為廊廟之資臣妨賢已久竊位非今然自承乏具寮叨榮散職雖云尸忝未甚隳廢至於典司邦禮出納王言徒飭躬而自强終絶臏而無力汝作霖雨既非庸妄所堪臣為股肱必致陰陽之失虧名損實匪顧身疵蠧政傷風將辱朝鍳誠為貪冒豈敢自安伏願回日月之明收雲霄之澤察臣由衷之請矜臣知止之分則周廟之器無懼於盈滿曹人之衣或免於譏刺無任慙懼屏營之至謹詣朝堂奉表以聞臣通誠惶誠恐頓首頓首死罪死罪為司禮武卿讓官表臣重規言伏奉今月十五日制書加臣中大夫兼司禮卿寵命光臨心靈隕一作震越臣重規中謝臣聞量能而官往聖垂範無德而祿昔賢有誡陛下施物之平不私毫髮知人之鑒獨謬庸虛一作瑣但禮秩一作秩宗之職歷選所難苟非得賢於何求化西京置一十二列首貫金吾東漢有三十九人多遷玉鉉妙擇時望將以洽神祇博採列侯所謂重宗廟桓榮之經學始展今恩孫通之禮儀方膺此命在臣無取遠謝古人將何以載𤣥冕之七旒驅素一作赤車之十一作千乘臣之慊慊非欲自保其身臣之慺慺深慮上塵於國伏乞聖恩容納皇澤霑濡深惟得人傍授能者則天官無曠庶績其凝謹封所讓人狀如前不任慙懼屏營之至一作皆唐類表為崔神基讓司賔卿表臣神基伏奉恩制以臣為司賔卿芝渙曲臨奬飾踰分蓬心回蕩冰炭交集臣神基誠惶誠恐頓首頓首死罪死罪臣才實凡庸志無遠大徒以命偶時來餐和飲澤纍叨恩遇浸成榮顯遂得出擁朱軒入陪紫蓋被服圭組周旋階闥自謬司六尚承乏九賔星琯驟移塵露無紀每懷忌滿之誡實負曠官之責寧可以更奉殊徽重叨非據當象河之顯列處惟月之崇班陛下刻象雕金焚山榜道維駒在詠異人並出無容使芳蕙為蓞疑康瓠成寶伏乞天哲改擇人望則尚德之舉無纍於翹薪匪服之譏不塵於列棘無任慙悚之至謹詣朝堂奉表以聞為司刑袁卿讓官表陳子昻臣某言伏奉某月日敕授臣某官祇拜寵章集作光魂宇飛越臣某中謝臣聞王者敬懼愆在典刑天下取集作允平允集作取茲廷尉苟非其人法不虛行臣本庸微名術無紀階緣際會昭遇盛明謬得揚歷簪裾陪奉鴛鷺綢繆榮寵集作祿荏苒年時毫髮之功無聞於官守素餐之責每積於公朝何嘗不悚迫惟憂夙夜祇畏而天恩方被寵命仍加復蒙璽誥之榮驟綰集覩作銀章之貴永言非據稽首知慙伏惟神皇陛下恭已受圖任賢興化方且合符皇極代理天工臣亦何人敢妨賢路伏見某官某乙弱冠登仕早有能名每以清白洗心不為寒溫變節誠使榮加天寵職察雲司必能利用文明哀矜庶獄弼成五教無謝於堯集作虞臣載光三典允諧於周議愚臣昧暗不識大猷請乞以臣所授官讓與某官庶使官允其才名不失實聖朝有得人之盛愚臣無冒貴一作責之譏實在宸集作聖慈鑒非虛謬為司農李卿讓官表臣某言伏奉今月日恩制依舊授臣中大夫守司農卿臣枯骨再生更蒙寵命魂魄兢越不知所圖臣某中謝臣實庸愚本無名節庇身公族竊車冕之餘假翼宗枝濫衣冠之末因循寵秩集作服纍廠榮班素餐之責每深效拙之勤未補橫被逆賊徐敬真以私讐寃架延臣集作架禍誣臣云與叔孝逸交通逆𥪡獄官執法置以極刑臣腰領之誅已甘灰粉泉壤之魄分隔幽明不圖陛下天地之恩再生朽骨日月之照曲被重泉察臣非辜愍臣無罪不牽文法之議特垂赦宥之慈螻蟻微軀復得全活自非陛下克明克聖至德至仁臣之魂魄不保今日臣免死為幸豈敢期榮陛下加臣寵章還臣舊職載集作典司宗伯以睦周親愚臣胡顏敢冒朝典况臣叔孝逸推使未還集作回在於愚臣更深集作須待罪安敢私職一作訟職以玷國章伏乞天恩照臣愚懇不勝感戴生榮之至為宗楚客讓營繕太監表李嶠臣某言臣叨承睿澤冒陳愚懇而九重再達三舍不回鞠躬慙惶莫知啓處臣誠惶誠恐頓首頓首死罪死罪臣自惟寡薄何階榮遇徒以山林舊籍有感聖慈葭莩末戚特延宸奬遂得升朝列位服冕乘軒平視公卿奄同七貴坐登霄漢非因六翮自兼司喉舌副掌樞衡百姓不親徒承在寬之訓萬幾都曠終替責成之舉期獲戾於妨官敢邀榮於賜秩而甘露時雨不遺於溥泛尊官厚祿更集於庸虛仍令入總巨卿出毗藩牧顧非材於樗櫟空愧梓一作杼人方假職於襜帷多慙竹使夫以渚宫作鎮旁兼水陸營室致功上儀星象自非馬延年之勤苦羊叔子之恩惠何以撫兹千里按彼百工陛下義不斷恩遂忘濯龍之誡微臣寵深增懼敢冒濡鵜之譏况今天地開元聖神改物四方拭目而觀化九流褰裳而願仕而則哲之鑒未奬於翹薪至公之心近謬於凡菲將恐開親昵之多幸失衣冠之雅望小人淺見偶識自量匹夫雖微敢守難奪伏乞俯停過謬更擇良能則出門同人更釋于宗之吝側席思彥不乏登壇之寶無任慙懼之至謹重詣朝堂奉表以聞謹言為王遺恕讓殿中少監表臣遺恕言伏奉恩制以臣為殿中少監奉命荒越不知啓處臣某中謝臣行忤神祇身積釁咎偷延苫枲自甘隕越陛下忘其尫陋牽以縶維仰號上昊俯踳下土精誠無感三舍不回志節莫修九泉未即遂復肅膺紫紱權就墨縗俯首官寺􅌤顏朝序自攝職天臺慙簡要之目徙秩京輦乏仁明之政銓管無沞多謝昔賢枹鼓不鳴實愧前烈空尸厚祿坐積時謗不謂天光下濟聖慈曲覽重延殊奬更超顯位司六尚之嚴凝望九重之清切懷恩揆拙既懼且慙但臣下棄情禮上虧答效孝不足稱忠無可紀永惟家國實負君親將何以安其尸忝暴之視聽伏乞暫回冲戀少察懇誠不虧聖朝之鑒無重愚臣之罪則涵育有方官序無替無任哀悚之至謹詣朝堂奉表以聞為第十舅讓殿中監兼仗內間廄表臣某言伏奉恩制以臣為殿中監兼檢校仗內諸間廄逾涯之恩忽降霄極非據之惕坐驚魂宇臣某誠惶誠恐頓首頓首死罪死罪臣本乏才藝素無操植徒因緒業獲齒簪裾屬兩曜重光三靈再造登山捧日始會於風雲涉海窺天遂攀於星漢位非德進榮以恩升出捧鸞鑣驂玉輿之式道入陪鳳扆預金門之通籍扈清切之嚴衛接綢繆之宴私丘山之恩徒謝成貸一作徒慚冒忝絲髮之效竟知無補加以兼烏竊幸假鳳連棲弟兄分侍於閫闈甥舅齊踪於樞祕光榮被於九族寵遇傾於百寮是以常誡滿盈亟慚尸素一作忝叔寶之遇武子雖願輸忠正禮之對公山唯憂曠職常思高明之瞰室每懼平路之傾輈豈謂天道不資聖慈逾厚仍降非常之澤重紆加等之命妨賢受位多慚於鴛鷺之羣匪服叨榮實愧於蜉蝣之羽一作維鵜之刺竊惟先王慎擇不進於凡庸明主虛求務延於才俊伏乞旁羅杞梓更詢棫朴必取尤能秀傑方為御府之臣無使五技輕姿謬處七間之任自然六尚增價七騶無忝納于百揆終無廢事之譏賔于四門必有得人之頌無任慙懼屏營之至謹詣朝堂奉表陳謝以聞謹言讓麟臺少監表臣嶠言伏奉制書以臣為麟臺少監依舊兼修國史仍知鳳閣舍人制閣事仰戴私恩退揆愚陋手足知舞心魂載惕臣嶠誠惶誠恐頓首頓首死罪死罪臣一經莫守五技不成宫墻易窺俎豆無術陽和布德枯朽同榮雷霆發音閉蟄俱起用叨時幸遂歷清階含香握蘭惟塵於兩鳬之署切問近對匪服於雙鸞之沼西垣載筆五字非工東觀屬詞兩班難嗣空抱支離之疾坐招尸素之譏惟此挈瓶有同畫餅豈足以比肩良史參領祕文猶陪二子之行尚忝四郎之末網羅帝籍既佇英才出納王言寧容妄處陛下搜賢擇善責實循名程才畢入於準繩適用不差於輪桷伏願特回鑒揆俯察愚蒙深惟帝難妙簡人才則尚德之舉寧謬於鴛池妨賢之談不起於麟閣無任忝竊慙悚之至謹詣朝堂奉表陳請以聞臣所讓人别狀封進臣嶠誠惶誠恐頓首頓首死罪死罪謹言為田歸道讓殿中監表宋之問臣某言伏奉今月二十二日制除臣殿中監依舊押千騎特降鴻私一作恩超加等數足臨鯨壑未偕聞寵之憂首抃鼇山豈踰承恩之重臣某中謝臣聞欲成大厦必寄於瓌材將適遠途理歸於駿足未有闕公輸之巧輒事揮斤無良樂之能謬令市骨臣藝術無取名檢莫聞叨承任遇遂階通顯再趨一作超武禁誠恪未聞三入文昌涓埃莫效剖符為郡山東無勿剪之謡握節和戎漠北有不賔之虜而制書涵育猥錫褒揚天造曲成更延今授臣知不可清議難容推賢讓能列聖之明範量力審分先覺之讜言當今運屬升平朝多俊又伏乞精求稱職以代不能遂愚臣由衷之詞全聖主一作皇至公之道授受無失臣免妨賢無任悚懼忝竊之極謹詣朝堂奉表陳讓以聞臣所讓人别狀封進謹言讓成均祭酒表李嶠久視元年臣嶠言伏奉恩制以臣為成均祭酒對揚鴻休揣摩褊量奬飾踰分周惶增惕臣誠惶誠恐頓首頓首死罪死罪臣才不應務命實偶時非親非賢奉帷幄之侍無藝無術備鹽梅之臣排金門而上玉堂步鴛閣而遊鸞沼抱支離之沉痼曠密勿之繁機六翮不任但慙於腹背四支已頓空請於骸體一作體骨分辭榮於瑣闥仍藉寵於環林顧非席上之珍敢辱淹中之賞况東序蟻學稱為教化之宮西膠席門實應文章之宿論姬孔之制度談夏商之損益方期遺典墜業有可發明豈伊曲學謏聞所堪尸忝伏望俯停庸瘵改命耆儒則授几肆筵還知入廟之禮褒衣博帶不濡在梁之翼無任忝竊慙惶之至謹詣朝堂奉表陳讓以聞臣所讓人具如别狀臣嶠誠惶誠恐頓首頓首死罪死罪謹言自內史再讓成均祭酒表臣嶠言伏奉今月二十四日制書除臣成均祭酒同鳳閣鸞臺三品餘並如故列星皎日曲垂鑒揆膏雨油雲傍灑渥澤承命如失負恩不勝臣嶠中謝臣本諸生階緣常調幼趨詩禮才學修身長習文章罕能經國徒以淹年曠日積勤纍勞無翼而偶摩霄不材而參構厦往逢人乏濫荷天聽類表作聰預聞政事莫近主益尋而犬馬私疾頗至虛羸螻蟻殘生俯蒙含肓矜其不逮畀以閒司臣獲從容稍似强健復屬皇慈不已聖奬彌勤始接貂蟬更追龍鳳機務填委昏惰戰兢風勞霧氣曉迫宵煎因此疲羸慮成廢類表作瘵曠所以每求清閒輒事陳乞竊望優游散輩沐浴淳源豈晤大類表作聖造弗遺殊榮纍及玷類表作沾代天之列躡教胄之行且祭酒之榮有道之選往年已知不可今者何宜重遊伏乞特寢嚴汗改命長才非敢欲逃身責深恐有紊國經由衷精誠惟聖矜納無任懇迫慙荷之至謹詣朝堂奉表陳讓以聞其所讓人别狀封進讓吏部侍郎表邵說此表唐書邵說傳有之已注異同英華作張說非臣某言臣以殃釁頃遭汚染知臣者或哀其逼切畏忌者或肆其讒誣自授南宮分銓東洛于茲纍月憂懼實深火心水背若墜泉谷何則拜命之始遇山陵附近奉辭之日屬虞祭未終不得入覲天顏少申誠慊此臣所以達曙不寢一作寐終朝疚懷徘徊倣徨莫知死所今情有至切不敢不盡陳其愚衷臣家本儒素代傳名節臣祖長白山人貞一以周朝權統革命潛遁終身臣父殿中侍御史瓊之遇𤣥宗撥亂興邦楊數四纍登甲乙之第再踐準繩之任微臣積釁殃禍所終十六而孤長於母手誓心墳史不出户庭逮至天寶中謬忝詞場擢第適會老母棄背服喪河洛及祿山之至禮制當終臣愚不脫縗麻更踰再歲而賊中言議往往紛然臣懼凶黨不容寓逰洛魏值慶緒奔遁保於相唐書作西城大搜詞人脅為已用以凶威責臣不至以驛騎逼臣遂行與潘炎始陷凶逆遽聞思明欵附燕趙服從欲取黃沙嶺路因此得歸闕下屬思明數萬之衆南鎮趙州送臣於范陽抗疏以聞奏肅宗特降中旨授臣左金吾衛騎曹將軍宣恩命云聞卿遠來可且於思明處憩息留滯未幾忽遇烏承恩事彰由是井陘路絶再陷凶盜而思明朝義負恩之際臣亦纍達欵誠伏蒙肅宗皇帝賜臣敕書云卿志士苦心王臣勵節藝成爼豆跡陷豺狼頃年鄴中䇿馬歸命出於萬死臣節尤彰忠誠若茲不負於國比朝義將敗謀守河陽臣知回紇利於野戰沮破其計及朝義奔走臣得西歸伏死於闕庭獻狀於先聖中使特宣進旨云卿之狀跡多肅宗時事三數日內即授卿官當蒙除臣延王府功曹參軍宣進旨云卿所進狀見今在院及翰林檢勘至其年六月十九日與王胄同時召見先聖謂臣及王胄曰卿所進狀朕一一已令檢卿之誠節可謂著明尋除王胄侍御史除臣殿中侍御史仍遣宣進止中書門下令制詞中盡言其事詞云王胄邵說有文學政事之資飾溫良恭儉之行嘗應推擇薦屬流離失身淹時無路自免然而深知逆順潛竭欵誠當慶緒之難已彰臣節及朝義之敗更沮凶謀言念忠懇何傷㸃汚思申雅器且表至公宜擢憲司式𢎞國體則先聖疇昔之意盡已知之自是再忝柏臺四登郎署宰理京劇倅二祕書一十八年備更任使今復以非次待之不疑斯發自天斷非常情所及且棄瑕録用古昔攸難稽之載籍所傳無幾則齊桓諸侯之主能收管仲太宗非常之聖特任魏徵咸為得人終成大業如臣行藝寡薄知識凡淺有殊管魏之事曾無管魏之才必恐受謗於衣冠不容於輩列速愚臣之禍傷聖主之明其理必然固無疑也古語曰女無好醜入宮見妬士無賢不肖入朝見嫉臣雖掌銓日近切慮見嫉已深伏願哀臣血誠免臣此職四門已穆百度惟貞在于微臣死生感戴無任懇切之至第二表臣某言臣以玷缺懼辱高位一昨瀝肝上請泣血祈天冀達愚衷俯停新命不謂聖慈褒飾宸鑒未回伏讀墨詔載深兢惕臣某中謝臣嘗覽載籍備知古今用人之道其流不一遇艱難之際或有棄瑕偶文明之時固當慎擇如臣頃陷凶逆大節已虧雖昔曾獻欵而罪難自贖今中朝無事八表會同有符帝舜之理日漸時雍之化已明四目特序九流豈臣汚染之餘合受清通之寄縱使陛下憐臣宿志察臣脅從無那取捨羣才易招毁黷亦安可家至户說令盡知愚臣疇昔之血誠哉何則今歲吏曹至難十倍常歲缺員至少從調者多益知唐書作以功優其數尤廣又凖選唐書作平格以判留人十輩之中放其六七彼輩衣糧自遠旅食經時固不甘心必大騰口脫有誣謗上疑聖心事等投杼將何取雪此臣之懼敢不盡言况朝廷冠冕如雲咸稱俊傑或以文行底祿或以政術知名出入中外纍更任使而臣謬司左職實用多慙伏見户部侍郎唐書作郎中蕭定司農卿庾準才優識遠望重一時伏望罷臣别受定等庶光朝選克辨人倫則徐毛裴王復存聖代無任懇願迫切之至文苑英華卷五百七十七
