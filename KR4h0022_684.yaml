body:
  text: 文苑英華卷六百八十五宋李昉等編勸諭上與侯景書一首諫陳寶應書一首與徐僕射書一首報尹義尚書一首與侯景書高澄即齊文襄王蓋聞位為大寶守之未易責成一作仁誠任重終之實難或殺身成名或去食存信比性命於鴻毛方義節一作等節義於熊掌夫然者舉不違一作失德動無過事進不見惡退無謗言先王與司徒契闊夷險孤子相依偏所眷屬繾綣襟一作矜期綢繆素分義貫終始情存嵗寒司徒自少及長從微至著共相成立一作生生非無恩一作非無恩德既爵冠通侯位標上等門容駟馬食一作室饗萬鍾財利潤於鄉黨榮華被於親戚意氣相傾人倫所重感於知巳義在不忘一作忘軀眷為國士者乃立漆身之節饋以壺飱者便致扶輪之效若然尚不能巳况其重於此乎幸以故舊之節一作義欲存一作持子孫相托方為普秦之匹共成劉范之親假使日往月來時移世易門無強蔭家有幼孤猶應加璧不遺分宅相濟無忘先德以恤後人况聞負杖行歌便已狼顧反一作犬噬於名無所成於義無所取不蹈忠臣之迹自陷叛人之地力不足以自強勢不足以自保率烏合之衆為纍卵之危西求救於黑秦南請援於蕭主一作氏以狐疑之心為首鼠之事入秦則秦人不容歸吳則吳人不信當今所觀一作相視未見其可不知終久持此安歸相推本心必不應爾當時不逞之人曲為異端之説遂懷狐鼠一作市虎之疑乃致投杼之感此一作比來舉止英華作正非事巳可見人相疑誤想自覺知合門大小並在一作付司冦意謂李氏未滅猶言少卿可反孤子無狀招禍于天酷罰不能死亡茍存晷漏追慕永逺五內崩裂但禮猶權奪志在忘思私效力命卒成功業前一作近者聊命偏師前驅致討南兖揚州應時尅復即欲乘機長驅懸瓠屬以炎暑欲為後圖且命旋軍待時更舉今寒颷向折白露將團方慿國威一作靈恭行天罰器械精新士馬強盛內外感恩一作靈上下戮力一作齊心三令五申可蹈湯火若使旗鼓相望埃塵相接勢如沃雪事等注螢夫眀者去危就安智者轉禍為福寧使人負我一作我負不使我負人一作人負我當開從善之門使一作決有改迷之路今誠刷英華作制非心蕩意除嫌去惡想猶致疑未便見信若能卷甲來朝韔弓一作垂櫜還闕者當相授豫州刺史以終身世四字一作即使終君之世所部文武並一作更不追攝進得保其祿位退則不喪功名冀有知幾之心當為可信之事今王思政韋法寶等孤軍偏將逺來深入然其性命在君股掌若欲刺之想有餘力若能擒剪肆諸市朝即加寵授永保疆場君門眷屬可以無恙寵妻愛子亦相送還仍為通家共一作卒成親好所不食言有如皎日今遣行人路程可度此月十日應至彼間足得還返若能悔過不忘本朝宜遣腹心之使自來向此靣取委曲使相知信如其遲疑未便分決使來賖緩不赴期會國有常刑以眀君法今今一作君既不能東封函谷南靣稱孤受制於人威名頓盡得地不能自守聚衆不以為強空使身有背叛之名家為惡逆之黨兄弟子姪首足異處一作門垂髮戴白同就塗炭聞者相為酸鼻見者相為寒心覆宗絶嗣自貽伊戚戴天履地之心能無愧乎疑脫成敗二字禍福決之此使善惡向背相任所從脫出自思致延後悔駟馬不追噬臍何及孤子今日不應乃一作方遣此書但見蔡遵道云司徒本無歸西英華作惡之心深有追悔之意聞西兵將至遣遵道向崤中參其多少少則與其同力多則更為之備又云房長史在彼之日司徒嘗欲將一作遣書啓將改過自新求效邉畔已差李龍仁等垂欲發遣聞房巳還一作逺遂復停廢一作發未知遵道此言為實為虛但既有所聞不容不相盡告吉凶之理想自圖之一作皆梁書侯景傳諫陳寶書虞寄東山居士虞寄致書於眀將軍使君節下寄離流世南史作難蓋避唐世氏諱並易以他字後同故漂寓貴鄉將軍待以上賔之禮申以國士之眷意氣相感何日忘之而寄沉痼彌晉愒隂將盡常恐卒填溝壑涓塵莫效陳書南史並作報是以敢布腹心冒陳丹欵願將軍留須臾之慮少思審陳書南史並作察之則瞑目之日所懷畢矣夫安危之兆禍福之機匪獨天時亦由人事失之毫釐差以千里是以眀智之士據重位而不傾執大節而不失豈惑於浮辭哉將軍文武兼資英威不世南史作動俗往因多難仗劍興師援旗誓衆抗威千里豈不以四郊多壘共謀王室匡時報主寧國庇民南史作人乎此所以五尺童子皆願荷戟而隨將軍者也及高祖武皇帝肇基草昧初濟艱難于時天下沸騰民南史作人無定主豺狼當道鯨鯢橫擊海內業業未知所從將軍運洞微之監屢陳書南史無此字折從衡之辨䇿名委質自託宗盟此將軍妙算逺圖發於𠂻誠者也及主上繼業欽眀睿聖選賢與能羣臣輯睦結將軍以維城之重崇將軍以裂土之封豈非宏謨廟略推赤心於物者也屢申文詔欵篤殷勤君臣之分定矣骨肉之恩深矣不意將軍惑於邪説翻然陳書作遽生異計寄所以疾首痛心泣盡繼之以血萬全之䇿竊為將軍惜之寄雖疾侵耄及言無足采千慮一得請陳愚管陳書南史作算願將軍少戢雷霆賖其晷刻使得盡狂瞽之説披肝膽之誠則雖死之日猶生之年也自天厭梁德多難荐臻寰宇分崩英雄互起龍戰虎爭竊號假名鋭精持鋒不可勝紀人人自以為得之然夷凶剪亂拯溺扶危四海樂推三靈眷命揖讓而居南靣者陳氏也豈非歷數有歸陳書南史作在惟天所在當璧應運其事甚眀一也主上承基眀德逺被天網冉張地維重紐夫以王琳之強侯瑱之力進足以搖蕩中原爭衡天下退足以屈強江外雄長偏隅然或命一旅之師或資一士之説琳則瓦解冰泮投身異域瑱則厥角稽顙委命闕廷斯又天假之威而除其患其事甚明二也今將軍以藩戚之重擁東南之衆盡忠奉上戮力勤王豈不勳高竇融寵過吳芮折圭判野南靣稱孤其事甚眀三也且聖朝棄瑕忘過寬厚得人改過自新咸加敘擢至如余孝頎陳書南史作頃潘純陀李孝欽歐陽頠等悉委以心腹任以牙爪胸中豁然曽無纎芥况將軍舋非張繡罪異盧陳書南史作畢諶當何慮於危亡何失於富貴此又其事甚眀四也方今周齊鄰睦境外無虞并兵一向匪朝伊夕非有劉項競逐之機楚趙連從之勢可得雍容髙拱坐論西伯其事甚眀五也且劉將軍狼顧南史作狽一隅亟經摧衄聲虧魄陳書南史作實虧喪膽氣衰沮高瓖向文政留瑜黃子玉此數人者將軍所親信二字南史作知首鼠兩端唯利是視其餘將帥亦可見矣孰能被堅執鋭驅馬深入縶陳書南史作擊馬埋輪奮不顧命以先士卒者乎此又其事甚眀六也且將軍之勢孰如侯景將軍之衆孰如王琳武皇滅侯景於前今上摧王琳於後此乃天時非復人力且兵革巳後民南史作人皆厭亂其孰能棄墳墓捐妻子出萬死不顧之計從將軍於白刃之間乎此又其事甚眀七也歷觀前古鑒之往事子陽季孟傾沒陳書南史作覆相尋餘善右渠英華作餘黨渠魁非危亡繼及天命可畏山川難恃况將軍欲以數郡之地當天下之兵以諸侯之資拒天子之命強弱逆順可得侔乎此又其事甚明八也且非我族類其心必異不愛其親豈能及物留將軍身靡國爵子尚王姬猶且棄天屬而弗顧背明君而孤立危急之下陳書南史作日豈能同憂共患不背將軍者乎至於師老力屈懼誅利賞必有韓智晉陽之謀張陳井陘之勢陳書南史作事此又其事甚明九也且北軍萬里逺鬬鋒不可當將軍自戰其地人多顧後梁安背向為心修扞匹夫之力衆寡不敵將率不侔師以無名而出事以無機而動以此移一作稱兵未知其利夫以漢朝吳楚晉室潁顒連城數十長戟百萬拔本塞源自家圖國其有成功者乎此又其事甚明十也為將軍計者豈陳書南史作莫若不逺而復絶親留氏秦郎快郎隨遣入質釋甲偃兵一遵詔旨且朝廷許以鐡劵之要申以白馬之盟朕不食言誓之宗社寄聞眀者鑒未形智者不冉計英華作計始非此成敗之效將軍勿疑吉凶之機間不容髮方今藩維尚少皇子幼沖凡預宗枝皆蒙寵樹况以將軍之地將軍之才將軍之名將軍之勢而能克修藩服北靣稱臣者乎陳書南史無此二字寧與劉澤同年而語其功業哉豈不身與山河等安名與金石相敝願加三思慮之無忽寄氣力綿微餘隂無幾感恩懷德不覺狂言鈇鉞之誅其甘陳書南史作甘之如薺與徐僕射書尹義尚義尚白漳濵江涘眇若天涯去鴈歸鴻雲飛難寄瞻言鄉國泣珠淚而盈懷窹寐德音仰煙霞而疾首既而暑往寒來愁雲滿塞河冰自結非由漢后之軍草一作苦露恆嚴寧假公超之術霜飄虎渠一作踞距知朔野之寒雪覆龍岑徒憶清江之暖眷言疇昔邈矣遐哉係仰清顔願常豐勝雍容廊廟時宣匡奉之風偃息康莊無廢怡神之道義尚望國窮魂繁憂積嵗雖其未殞豈曰生年日者謬忝後車一作陳非陪逰上國曾觀禮樂見季子之知音經奉侍言嗟鄭僑之博物如軍書愈疾之製碑文妙絶之詞猶貴紙於鄴中尚傳聲於許下逮乎百六之年仍離冉三之酷吉凶禮數綿歷嵗時嘗膽茹辛備同艱險每冀穹蒼有感大國矜憫以禮言歸馭驛俱反何期毳毛湮淪墜灑漳濵之水逸翮摩霄輕託蓬萊之頂信知有幸無幸見生死之殊倫才與不才驗沉浮之異趣昔秦歸趙璧還得連城晉失楚材直亡其寶自國祚中絶行李不通等避世於桃源同晉寓于仙嶺每瞻牛候馬想金陵之聖人今覩皇華知有熊之建國賔堯仕舜猶是八才緯武經文方儔四貴幸甚幸甚昔楊朱岐路悲始末之長離蘇武河梁歎平生之永别雖復音塵可嗣終隔風雲夢想時通無因覯止依依望楚寸隂有待百年將半輕生若是命也如何今車書同軌行李相繼猥荷文移通賜論及輶軒既以復命義尚未被哀矜竊以普楚釋囚共成親好今乃拘彼來一作求此不亦難乎夫以匹夫投分猶須坦蕩况兩國二君那宜細計彼若才如亷樂猶恐不習禁兵茍非其人留之何益然三戰三敗卒成強伯之功七縱七擒終仗天威之力由此言之彼此如耳徐元直西蜀之謀士關雲長劉氏之驍將須歸即遣知叛弗追今之與古何其異趣且二國叶和長江共有如首如尾可以同規或二或猜豈名唇齒是以隔河分歃君子知其不終𠂻甲尋盟春秋貶其行詐伏承聖上欽眀英賢佐輔方知解網之氣用表無偏之化若彼之俘虜猶且蒙歸此之南冦何辭不遣如其茍相猜二信不由𠂻雖篤親鄰義尚何罪不任辛酸之念輕陳萬一之情伏願仁人少存疇昔承間之便希復開言昔張子餘年誠稱吳王之賜微躬邁影實仰含𢎞之澤載筆漣洏罔知所運報尹義尚書徐陵别離二國雲雨十年目懸河陽追銅爵而無逺神遊漳水與金鳳而俱飛北使還辱去冬十月十一日告忽同年一無年字言敘循還巧製欣慰良深河朔年芳雖當淹晚白溝凂凂春流巳清氣陌依依長楊稍合體中何如豈無鄉思弟居一無此字三秦世胄六輔良家文武兼能志懷開逺谷永之筆無慙古人蓋延之功髙視前彥而淹留趙魏亟歷寒暄企一作延望鄉關理多悲切聖朝欽眀纂歷大拯生民戮巨海之奔鯨殱中原之封豕普君之説長安逺於日邉揚雄有言交州在於天際則輸賝王府屈膝閶門川洞酋豪強梁溟海神兵一一作所指率土咸康方當偃伯於靈臺韜戈于武庫變大風於五禮驅蒸民於昌辰物色英聲搜揚俊傑投竿負鼎馳步蒼龍巖穴丘園爭趨金馬而弟留河北義等周邵懷此殊才實可傷嗟吾崦嵫既暮容鬢皤然風氣彌晉砭藥無補追惟疇昔共備行人室家安危賔禮升降懸壼代哭俱歷春冬移館于箕同兹辛苦鳴蜩抱樹亟見藏冰歸鴈銜蘆多經寒食靖言念此如何可忘握玩來書彌其承臉夫以擁腫之木得免因於不才觳觫之牛自保由其無用以余鄙陋未友龔生惟歎吾賢不同蘧瑗耳若推溝拯溺每切皇遺疑翮鱗見機覽一無此字所以降咫尺之書馳輶軒之使心期與國必遂還途寧謂親鄰更成難請言尋雅告所及縲囚便訪鴻臚幸無淹使聞諸司冦或有邉俘前嵗中流是維同惡燕禽一作旗望闕冀馬臨江裁頓雲羅自投天網京觀之塜宜彰武功周醜之門方申明罰而聖朝好生惡殺收雷寢電兵車所獲雖同長萬之來思澤從容無異荀罃之禮方之於弟况擬非倫伊昔梁朝共奉嘉聘張兹大帛處彼高間庭奏歌鍾座延僑肹賔客之致一作敘方於阼階田獵之禽同於君膳正以鄉門阻亂致爾拘留家國隆平義應旋反况復韓宣屢至宰孔頻還翻爾遲回闕之鄰睦弟遂鍾儀之操對此皇華高后左傳作厚之詩一何非類關徐亷樂之况三戰七擒之言此日借子之矛攻子之室彼之使客猶尚不還此於齊都豪門貴戚周行匪例事義相懸豈與太弟同年而語吾本自凡流以復衰老稍近東岱不奢疑擊壤之年唯欣堯俗若耶之復疑長保安卧時思之疑不棄忝亞宗卿非得侵官天扆但當令艽艽在詠濟濟盈朝才冠卿雲智同荀郭文辭富於江海高論泊於雲霄趨走丹墀之間侍奉清規之內弟來欵言至欲附祈聞聨類非宜更其多惑若使良有闕猶希贈鯉之書郵驛方通復行飛鶬之信執筆澘然不知何向文苑英華卷六百八十五
