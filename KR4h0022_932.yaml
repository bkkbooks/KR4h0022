body:
  text: 文苑英華卷九百三十三宋李昉等編婦人上髙安長公主碑一首涼國長公主碑一首章懷太子良娣張氏碑一首鄎國長公主碑一首昭容上官氏碑一首延州豆盧使君萬泉縣主薛氏碑一首高安長公主神道碑蘇頲維開元二年龍集攝提格夏五月哉生明高安長公主薨於長安永平里第享年六十有六嗚呼哀哉丙申上發哀于暉政門設次舉聲輟朝加等遣大鴻臚彭城侯劉知柔持節齎書赴弔京兆尹攝大鴻臚鄧國公張暐司農少卿李琇有司帥屬護喪文武五品巳上會哭書不云敦族至于九以昭于百姓禮不云敘親居其一以統於萬人此所以追有虞而化天下感配陳而慟宸極復以為素旗誄行彤管區風司常罕留執史多紊乃制銀青光祿大夫行紫微侍郎兼知制誥上柱國許國公蘇頲為銘刻石臣頲不敏揚言拜命云長公主諱某字某隴西狄道人髙祖神堯皇帝之曽孫太宗文武聖皇帝之孫髙宗天皇大帝之第二女中宗孝和皇帝之姑疑作妹也太上皇之妹開元神武皇帝之姑也昔軒后修德高陽任而豫之虞姫邁德伯陽沖而用之故先王會昌而王者興前聖受命而聖人作自風偃三代刑清百年揚耿光於祖宗紹期運於神武上以比崇於黃軒至其道次以宗極於玄老施其教慶漸綿瓞恩周行葦重熙而纍盛皇哉而唐哉公主承娣月之華分女皇之耀間和美度婉娩令德有循其禮無擇於言鑒圖取則聞詩服義故可以賦絲緍而開湯沐者也於是曳紅綬賜青圭香滿玉罏綵搖金縷允所謂帝乙歸妹以祉元吉魯侯主婚是稱同姓始封宣城公主下嫁乎王氏駙馬都尉故潁州刺史贈右監門將軍太原王府君諱朂字遂古右監門將軍平舒公之孫歙州司馬之子自周儲洛濵之契秦將頻陽之業門昌帝緒家纍天姻徵平叔之才貌得孟孫之閥閲亦既覯止展也令儀成其肅雍率由俊彩至盥潄􅌨縱笄總衣紳針管刀礪線纊鞶帙若此者敬而持之動必於是則其餘可重也天授中聖后從權革命駙馬非罪攖酷公主復歸于後庭凡九十甲子口不入辛味耳不聆曼音體逾尚柔言靡敵怨運觀心之智察摩頂之神豈寂以幽通將虛而信受有菩薩現前者數四居每竒之中宗禹物不改漢儀初復乃命宗正卿李珍册拜宣城長公主食實封一千户并置府僚比侯王之封齊令丞之秩太皇御極又增五百户改封於高安且重永康之册允符長廣之拜今上握圖又通前加至二千户尚於德先於親也公主頃嵗奉嘗覩髙宗畫像雖光靈在天而見似目瞿感咽于地遂成心疾至使命醫萃止御藥相望孝焉而終仁則何輔嗚呼哀哉富貴乃驕奢之資不期而至吉凶乃盛衰之象不召而成况泰忘約吝生動寵怙權邪醜正知得而不知喪知存而不知亡嘗歷觀之熟矣由是黃金象牙明珠翠羽之飾積於外雕文刻鏤衣紈履絲之巧充於內然後堅車良馬漿酒藿肉吹笙竽學歌舞於其間者殊不知以相強而結禍因自恣而招危魯元所以好過度竇太所以縱踰禮鄂邑所以懟抵罪湖陽所以匿犯法館陶所以求不獲昭平所以免河上二字疑埓開邙阜胤子孰聞田在漢京權臣所奪吁可長嘆息者矣我長公主則不然避榮守靜退藏於密端操正色進寡其亂為皇女焉為皇妹焉為皇姑焉非不貴也能戒盈忌滿智崇禮卑儉德之恭讓德之益主無攸遂不專也勤無告勞不匱也宜於秋犢以助宗人率彼春蠶以從王后則未嘗忽諸猶深悟色空大依禪慧觀我生之進退究人事之終始蓋泡夢之為喻也乃散以檀那離於染著景雲歲請罷賦邑蠲屬官遂沈冥從省曠書上而制為之嗚呼身役意餘道之微者古有女儀嬪則焉或孟母之勸學敬薑之知禮仲妻之辟相惠婦之光夫然出於素俗書之緹史未有居髙益下託體至尊如長主之儔矣故能九師讓能三子聞教自我之出與時偕行知微知彰不諂不黷長曰暐銀青光祿大夫大僕少卿仲曰暉朝請大夫衛尉少卿季曰暕尚舍奉御並欲報罔極欒貌棘心哀以送之龜從筮吉粵其年八月朔十七日葬于咸陽之北原禮也落月過半秋陽浸微清笳凝兮朔風斷丹旐列兮秋雲飛望槐里而西馳去荻園而北顧視牽牛兮像設過飲龍兮徑度闉闍􅌄窱逺嬴女之樓臺松柏隂煙近漢皇之陵墓其詞曰赫赫上帝臨于巨唐卜年萬倍誕睿興王何彼穠矣休其有光亦既從夫車服不繫亦云主婦蘋蘩以祭在貴能約終溫且惠樂只君子曽不永年未亡之人歸於九天心以理遣身以義全光于纍聖受于明命伯娣延暉皇姑襲慶監以損益辭其滿盛我有空言宗于釋門不生不滅兹道存存兊之降靈西反其魂詠清淺兮天之際憶瀟湘兮日已逝登寒山兮見超忽生秋草兮坐蕪沒金為字兮琬為碑永貞芳兮實在斯涼國長公主神道碑前人乾坤既分彖象攸配變則成女終於歸妹惟長公主諱某字某我興家邦天錫宗社昌運及五聖真享鴻名聖期至六神武膺駿命絪緼構極倬彼雲漢的瀝垂春華如桃李順顔承志約禮知節得繭館從蠶之儀採公宫習史之藝載柔湯沐爰賦井田其創也與多於仙源其徙也稱長於涼國故丞相虞公太源溫彥博曽孫曦台揆門閥風流儒雅僉諧是圖歷選伊尚君子至止碩人其頎協時之吉僣典之實雜珮明璫褧衣錦裳熒熒煌煌未詳有芳居回映以虹倚動羣超而翠翔媛成肅雍候守祿位貴則能降降而不驕勞而在勤勤則不匱未嘗有也皇嘉之而謂曰台知以樂變乎風揮五弦之盡美觀萬物之從令欲同聽乃親故特一作恃傳汝公主清揚神潔妙指心間猶白雪之詞冥通則應類青溪之曲多領悟皆賞初榮賜以得後誡盈而散恩過魯元王豈上邑寵逾竇太常疑豈臨山每絶館陶之祈自無昭平之贖粹溫而敏靜好而詳以北渚之愁苦何西方之聖如是大修圓乘深入至空竟而瑶草淪霜桂枝辭月開元十二載八月辛已遇疾薨于京邸永嘉里第享年三十八嗚呼哀哉上徹懸久悼臨次增涕京尹護喪羣司藏事其年仲冬壬午陪葬于橋陵生資敬愛殁效充奉蕭史樓中鳳音何望軒轅臺下龍得仍攀子西華等扶杖而立茹荼以泣赴賔憫默觀者慘容翰林酸嘶又昭乎遺風雖著縑簡垂厥後代諒憑刋刻豐碑詔立睿禮親紆捧戴則奔馳四靈光華則回薄七曜明山可轉况連於鋭􅀢玄圃惟資重錯於琅玕俾銅鏤之湮沉由寶善而飛動禮臣不佞敢作銘曰天其有章銀漢玉潢我則有祥霄明燭光柔祗不忒芳問允塞何彼穠矣其儀是則鳳凰于飛公子同歸琴瑟在御德音莫違何泬寥之素秋兮獨杳杳之玄夜何暗忽之誰忍兮痛明靈之不借清霜晶月楚挽將發流吹結雲秦聲不聞惟聖皇兮固金石噫長主兮森松柏榮以悼之兮長不斁章懷太子良娣張氏神道碑前人惟蘭有香惟玊有璋可吉其夢可勞一作榮其弄故稟離成女祥歸太子之家有震為男業盛天人之邸因以貴者德其全與我唐章懷太子有良娣曰南陽張氏之子也邠王守禮之母也初章懷封于雍良娣選以入後章懷謫于邑良娣隨而邁邠王錫玄社建黃扉良娣坐華茵驅香轂雖逶迤失於偕老而契濶存乎與成始十四奉吾夫逮笄年而轉茂終六十四違吾子當卦數而同極非婉婉淑貞之則含章尚柔之令孰臻於此矣若乃畫堂清兮羅幕薰匱照耀兮結氛氲杲杲之日英英之雲蓋良娣之才之美是效是則潔素罔捐於篋煒彤益照於管嫮顔不兢徽範自持處獨藹如顧儔芬若施于積善覩從梁駟馬之藩貽厥纍仁傳相漢七貂之緒隋上儀同甘泉府别將嚴之曽孫侍御史睦州刺史詳一作祥之孫朝議郎行貴州都督府始安縣令明之女也層構鬱起昌瀾逺激去遷南郭儼西鄂之豐碑來應東朝署西京之戚里不然何謂釐爾女士從以孫子疑袂之良乎及母儀可宗臣軌伊勵師以儉約戒於盈蕩洛濵無校除之事涇上無粲美之物衣錦褧裳寧吾所好擊鐘鼎食唯爾之競俾吾王忠肅恭懿既明且哲志於道者本於教也粵景龍二載孟夏之月遘疾棄飬於京延康第之寢洎雲景光華春雨自葉睦於我則先受九族慈於王則每深十起永其錫類衆悅以人禮物朝遣使臣廷命金紫光祿大夫行鴻臚卿趙承恩銀青光祿大夫尚書左丞元暕持節册贈曰章懷皇太子良娣祔于陵邑禮也嗚呼山疑鶴駕地即烏號太子賓帝之餘髙宗在天之所衣冠道德密近屬於陪乘光表闕塋殊逺嫌於好內又典地司空邠王守禮幼承法度長被暉光九仞之堂咸疑曽氏而逾蹙萬家之域小韓王之不綱所以傍雕翠琰代奏丹墀天子孝理之風已周于品物孝思之德况及於兄弟乃勑禮部尚書蘇頲採詢為言由是稽舊聞討前訓位不之易祿不之重而莫顧者鄭勝疑之足稱也信不負之心義不虛事而竟死者越嬪之可徵也或彰君之隱過或徇已之微直曷如有始有卒知柔知剛艱虞則持操服勤富貴則竭誠循禮夫詮一行者尚紀圖書懼疑三從者豈遺刋刻其銘曰天祚有唐於昭烈光兮土分五色作我藩國兮雷震百里惟皇元子元子伊何匪淑不娣厥娣伊何終溫且惠桂宮甲觀之聲迹竹苑平臺之往昔車已折兮我未召疑鼎其新兮子為王子既王兮我為太殷聖造兮沐嘉會歲不與兮時迅奔華榱壞兮託寢園闉闍崇於上京松柏被於長原子哀哀兮篆碑於是親永永兮殁代如存鄎國長公主神道碑張説臣聞堯有娥英承九族之敦敘舜有霄燭動百里之光耀大聖之後天必縱之積善之家神所慶矣豈惟上帝之女雲漢為靈平王之孫肅雍其德連華前志代有其人皇唐鄎國長公主者睿宗之第七女也母曰崔貴集作國妃構纍聖而成門合濟美而為室藴乾坤之純粹演日月之清明神媛誕靈常言所絶免懷之嵗天奪聖善不食三日哀比成人文母流胎教之慈曽子得生知之孝由是宮闈延矚邦國逺聞及乎至笄耀首油駢疑作軿右馭錫之美地邑以荆山求之令族嬪于薛氏爾其居玩圖史動循集作修法度服其浣濯恭儉之教興鼓其琴瑟禮集作敬讓之風被其行巳也安親惠下之謂仁敬宗好合之謂義降貴接卑之謂禮恕情周物之謂智推心而行罔不該備其禮家也視膳饔餗之均和主饋醴酏之品齊絲竹七音之徽靡纂組九華之褥麗經目所涉罔不精研集作莫不精詣每至三元上賀三日中參進對詳華折旋舒婉故以式瞻貴里儀範通門如千花之泛惠風百卉之涵膏露窈窕之儀克舉繁衍之福大來有男子四女子五瑶碧生階芝蘭滿室也習禮明詩日漸閨庭集作庭闈之訓銀章艾綬地連恩澤之侯自先朝徹扆之辰迄公主成筓之日外除過制內疾集作疚餘哀手寫金字梵經三部躬繡綵線佛像二鋪貝葉真偈現心相於銀鈎蓮花妙容呈意生於玊指孝思惟則道逺乎哉開元繼明恩由已進封鄎國長公主食邑一千二百户田賦廣而彌儉禮秩尊而益恭其後君子晨歌夫人晝哀集作哭未亡為稱生意盡矣撫視遺孤將守柏舟之誓志期剃落永從禁苑之遊朝制斷恩改降鄭氏陵谷可易集作移隨和之德不昧寒暑有遷松竹集作筠之性如一均養七子庥廕二宗汾隂之室忘亡榮陽之黨相慶既而善福虛應寢疾彌留盡國之伎逺方畢至供御府之藥中使相望命之必至不可支也堂邑山林忽焉瘁色平陽歌舞適足愁人開元十三年二月庚午薨于河南縣之修業里春秋三十有七震悼紫庭哀傷朱邸傾家若墜舉國同悲有詔光祿卿孟溫禮監護喪葬京兆尹熊延休副焉窀穸之禮一如涼國長公主故事夏四月恩旨陪葬于橋陵不祔不從古之道也皇上念同氣之致美感閲川之永謝恨棣華之半缺悲瑶草之先化乃命國史昭銘懿迹降恩禮於雲露寫哀詞於金石水非湘渚還起帝子之詞山是洛陽即封天妹之冢銘曰帝系白雲仙源紫氣漲家成國承天作貴赫赫聖祖曰文曰武皇皇睿宗一變萬邦挺生淑媛慈和孝恭清臚如神娥眉無雙邸第立官湯沐建封年集作安及笄總禮施環珮鳴鳳獻祥乘龍擇對帝唐降女天乙歸妹珠玊過庭蘋蘩正內蛟門早閴龍湖忽上無地何載無天何仰金殿書經華絲繡像欲報之德昊天罔極孰是言歸良人永違銀罏煙斷羅幕霜飛懇願毁形託身壞衣不諒人只改嬪他士稟命曰從從夫集作人曰順息媯繩楚懷嬴霜晉反經合權與道同韻燠休二室均歡等潤四海謐清九族和平萬物向榮衆雛未成心戀盛明形隨落英祖載􅀢城歸窆集作窔咸京挽歌敡聲鹵簿凶行哀哀聖情惻惻同生橋山片石千秋令名昭容上官氏碑銘前人天降時雨山川出雲乃生靈媛祚我聖君精微其道煥炳其文三光錯行昭容綱紀百揆繁會昭容條理外圖邦正內諗天子憂在進賢思皇集作求多士忠孝必集作心感天焉報之吉凶有數邱焉禱之如彼九日羿焉報之如彼三良秦焉悼之漢宮選材班氏其特楚史書霸樊妹之力彧穆齊公敘明其德嗟爾彤管是鑒是則延州豆盧使君萬泉縣主薛氏神道碑前人或稱達性命者齊生死之域違憂怖者一修短之數斯蓋無心之倫耳焉足與議於精哉何則雲虹滅彩集作影辭人於是詠謡華秀從風君子為之歎息豈不以對仙麗之景懷變化而遺戀在昭棻集作蘂之節悼零落而遍憤吾見豆盧氏之子於其伉儷有焉縣主諱字姓薛氏河東汾隂人大父駙馬都尉奉宸將軍諱歡集作瓘尚城陽公主考駙馬都尉散騎常侍諱紹尚鎮國太平公主其在昔也夏有車正先封周有薛侯事長其在今也五宗姻於帝室集作里重葉母於王姬河水經天上積星辰之氣霍山鎮地下多珠玉之林縣主幼而敏惠長而洵淑貞孝義烈之傳吉凶賔祭之儀一聞成誦紘綖紃組之制湆芼醖羞之品一見懸解至乃鶴回清泛蠶聚崩雲月韻玖集作玫砧花穠綵樹婦人能事咸臻妙焉大聖天后鍊石補天有王母之神器分茅列土啓弄孫之美邑封田集作猶有禮義引而親天授三年四月內封萬泉縣主天愛下流日新集作親上簡乘龍之舉和鳳為難絡八紘以選門奄千官而求俊夫以龍圖帝寶析步搖之華源虎戟侯門襲燕京集作京燕之雄胄人之信美帝用嘉焉以萬歲登封元年仲春既望歸於豆盧氏六宫送行百僚供事迓以鑾輅遺以翟車環珮冕旒璆然在馭黼藻朱黛爛其盈門詔昏之禮於斯為盛爾乃移其愛敬以事舅姑伸其友恭以諧公妹舉宗洽比如鼓琴瑟每至婚姻會同少長咸集珩璜節步金翠耀首有婉嫕之心無驕矜之色唏盻睞者若遲日之泛漣漪曕詞氣者猶光風之轉蘅薄集作蕙加以引納懷和饋分周賑踈屬自附窮歸忘窘故蘭行彰信於閨門而蕙風滿行於邦國諒惟琬琰之性自美抑亦劬勞之訓致焉中宗孝和皇帝雲回南土龍見東京二儀更闢九族還敘望我兄兮公主贊陶鈞之力曰吾甥也縣主開井邑之賦神龍元年春加實封三百户縣主既通濟門闌奉御又尚司殿省天子巡遊宫觀觴樂池臺我有周親無時不從主家外幸比齊后而聨恩子壻中參與趙王而均禮或醉飽踰度寒燠未平何嘗不御藥在門王人接路當時厚澤莫之尚也景龍四年二月以奉御出為丹延二州刺史保傳下堂隨朱輪集作轓而同去輜軿入郡與皂蓋而齊飛辭宫闕兮集作而嵗闌戀庭闈兮集作而日逺肥泉永歎邪氣攻衷楚祝招而不來秦醫來而不及景雲元年八月二十一日傾逝於延州之廨舍春秋二十有四美玊裭顔明珠晦色平陽舊宇遂無望于歸寧懷縣新文空流漣於永逝有子三人西華南容東里等或齓或岐呱呱而泣天何以罰神其忍之冬十有二月五日歸葬於長安之洪瀆原窀穸營護有命加等器服祖遣率由舊章生之也榮葬之也禮若夫柔嘉好治善之元也肅雍降貴謙之道也山河其德容潤廣也熊羆其祥兆允大也揔衆美於修驕落集作馳嬌暉於小年此所以哀中之又哀也昔袁亡馬氏蔡筆斯奮鄭喪曹姬潘文亦作矧兹內範事華無愧砥望夫之石以表靈邱緝幼婦之辭將傳終古銘曰薛之皇祖胄軒國禹相隂侯周氏其土宇英英白雲鬱彼河汾公門蕃衍銘鼎氛氲則仁則義則戚則勳餘慶介祉誕靈女士中宗之甥鎮國之子皎若集作如霜雪華如桃李舜族爰敘堯封咸秩萬泉開賦三百其室集作邑守盛以儉居滿集作沖不溢亦既鳴鴈宜爾家人讓恭下下撫納親親傾財致客對饁如賔我有邸第前臨黃道我有池塘却望青草漢輦停暮秦簫拂早歲月易忘歡娛難保良人出守將命比徂與子偕往飲别東都望母腸絶辭家淚枯露萎莖草霜酸衆雛魂兮何歸京師集作兆之野葬於何處杜陵之下巖巖雙闕列列行檟勒是徽音永集作以觀來者文苑英華卷九百三十三
