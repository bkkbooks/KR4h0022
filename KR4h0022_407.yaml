body:
  text: 文苑英華卷四百七宋李昉等編京府二萬年縣尹授秦守一萬年縣令制蘇頲黃門楚州刺史上柱國南安縣開國公秦守一才稱幹理迹逰文藝敏而當劇明以燭姦星闥副於求郎河東美其為宰事殷輦轂時佇絃歌既掦百里之風更緝萬年之政可通議大夫行萬年縣令勳封如故主者施行授鄭巖萬年縣令制孫逖門下中大夫行尚書刑部郎中上柱國鄭巖形神俊秀理識通明標幹術於公方飾文詞於吏道纍登華省嘗典劇曹宜遷取則之邑更展撥煩之用可行京兆府萬年縣令授唐慶萬年縣令制元稹勑朝議郎守尚書比部郎中賜緋魚袋唐慶輦轂之下豪黠僄輕擾之則獄市不容緩之則囊橐相聚是以前代惟京令得與御史丞分進道路以其捕逐之急也執事言爾慶頃榷束池鹵生息倍稱布露飴散飴鹽散鹽見周禮於羅落之間而盜賊終不敢進集作近推是為理真吾所求之劇令也無或畏避以艱惸婺可守萬年縣令餘如故授孔戢萬年縣令制白居易勑京邑令缺多擇尚書郎有才理者補之兵部員外郎孔戢自御史府遷夏官之屬凡所蒞職一心奉公在郎署間稱有名實加以文學緣飾吏能俾宰京劇佇有成效可萬年縣令長安縣令授鄭仙客長安縣令制李嶠勑朝散大夫行鼎州長史鄭仙客識量淹通理懷沉正攝官無怠歷職有聲三輔名畿五方雜俗求人之瘼惟帝所難宜遷題坐之風俾試鳴絃之化可檢校長安縣令散官如故授趙升卿長安縣令制蘇頲勑朝議郎守尚書户部郎中上柱國趙升卿識融而逺心密而堅行副其才文參於吏逰刃之美盡中桑林含香之能獨推蘭握市朝所令輦轂惟溱宜拜神京之宰用懲使疑作俠窟之姦可守長安縣令散官勳封如故授徐演長安縣令等制常衮勑朝議郎行尚書工部員外郎賜緋魚袋韋覃朝奉郎行尚書倉部員外郎上柱國賜緋魚袋徐演等器行純備文以彰之尤通政體必本經術直道以進當官而行執憲字人早揚厥職自參俊茂之選各舉彌綸之要遵我風化始於京兆一作邑素稱雄劇今則倉廪空虛戎車未寧兵食屢調稅有倍征之重用過經費之數公私抗一作積弊人户離闕雖難理之任又屬艱虞而制事之宜亦有工拙茍或貞介純白端誠奉公恭敬以仁明察以斷不虐鰥寡不阿貴強以兹撫馭庶有蘇息擇才而授政豈逺哉俾爾化神臯之俗分司𨽻之路考其能否當有遷黜勉思誡勑以副憂勤覃可守萬年縣令散官勳賜如故演可守長安縣令散官勳賜亦如故授楊魯士長安縣令等制崔嘏勑兵部郎中楊魯士等朕方以親人之任重其守宰欲使中外迭處周旋可觀至今於尚書省御史府以時序遷者亦皆推於公議復中念孔門以政事文學列為四科而魯士等各擅其能久而益勵付之劇縣分以名曹必能展剖繁㭊滯之才副題柱含香之美且有後命爾其敬哉授前左司員外郎趙均長安縣令制錢珝勑具官某慎行於家能養其親也慎言於朝能保其身也士大夫有是二者列於周行善用恬和且聞淹恤循於常典安可滯遷屬京縣寓理之難度材云急流亡未復賦斂猶虛以爾所慎之多必當克集其事錫兹銀印耀彼綵衣承寵而將慶問安思報而勉圗為政可依前件河南縣令授鄭璿河南縣令制蘇頲黃門正議大夫行尚書職方郎中上柱國鄭璿士門雅望名教是先吏道通才聲塵自逺嵩邙帝宅周漢王都宜回起草之能佇息鳴桴之聽可知河南縣令散官勳如故主者施行授何士乂河南縣令制白居易勑漢朝郎官出宰百里故集有令字京邑令缺多命尚書郎補焉朝議郎行尚書水部員外郎何士乂慎檢集作交和易介然有常守而勿失可使從政然能佩弦以自導帶星以自勤則緩急勞逸之間必使適宜而㑹理矣以爾思退故吾進之可守河南縣令散官勳如故授盧攸河南縣令等制崔嘏勑前知嘉興監盧攸前知湖南院韋宙等國朝之制自外府正郎至于郡丞半刺不由㑹府之所選授者中外臣僚歲終得以聞薦而有司煆鍊其簿籍參校其資級夏五月各以其名來上惟爾攸等或以文學再登科第或以才人早居賔幕或以利用纍司榷管之繁或以薦延久佐州邦之理嘉乃成績俾其叙遷至于赤縣銅印之榮三川綱轄之任皆吾之慎選也爾其勉之洛陽縣令授崔隱甫洛陽縣令制蘇頲黃門正議大夫行汾州長史崔隱甫抗迹清循在公明察素禀才識早聞簡練故以正而不撓和而不同乃眷有洛是稱中土百里居官四方作則宜副曹攄之選俾旌王渙之能可檢校洛陽縣令散官如故主者施行授徐鍔洛陽縣令制孫逖門下司封郎中徐鍔業繼文儒才優斷割明而不滯幹則有威五等是司已傳名於臺妙四方之㑹宜展用於京劇可河南府洛陽縣令授楊晉洛陽縣令制常衮勑朝議郎守尚書金部郎中楊晉性方行純識敏才達本以經術通於理體和而中禮善不近名仙署回翔士林推重字人京邑多選臺郎風雨所㑹俾分洛師之劇桴鼓不鳴佇繼董宣之政可守洛陽縣令仍賜緋魚袋散官如故授崔咸洛陽縣令制白居易勑度支員外郎崔咸漢以四科辟士求多略不惑強明斷決者任三輔令故今四京令缺亦擇尚書郎有才理者補之而咸在郎署中推為利用加以詞學緣飾吏能操割洛陽必有餘刃然宰大邑如烹小鮮人擾則疲魚撓集作擾則餒寬猛吐茹其監于兹可洛陽縣令西畿縣令授元欽裕櫟陽縣令制蘇頲門下正議大夫行雍州藍田縣令元欽裕從政美才幹時良具山稱多玉已鳴弦於屬城地是雨金將候蹕於馳道使助王欣之辨冝符尹賞之遷可行雍州櫟陽縣令散官如故授韋光業髙陵縣令制勑朝議郎行岐州陳倉縣令韋光業效官敏濟臨事明察嘉其墨綬聲以淡疑於雞祠見漢郊祀志遷以黃圖政佇成於鹿苑見唐地理志可京兆府高陵縣令授樊象藍田縣令制孫逖門下行京兆府司録參軍樊象發跡詞場馳名吏職克勤於位皆著其能掾彼神州既彰人譽宰于近縣俾叶時須可京兆府藍田縣令授栁子華昭應縣令制常衮勑朝議郎前守池州刺史上柱國賜緋魚袋栁子華藻飾以文周通於事剛腸正色奉法無私臨難而忠義侃然處煩而典禮不易頃者守春秋鵲岸之地介東南牛渚之險既明且察吏不敢欺大姓恱從伏戎一作盜賊又作伏賊散落政殊績異風俗一清地雄神臯秩視京縣國朝舊制亦以刺郡入補副豫良選惠此疲人可守京兆府昭應縣令散官勳賜如故授東畿令吉旻西畿令制元稹勑前河南府登封縣令吉旻邦畿之宰任得其人蓋有以乂我黎庶足以張吾京師也自輦轂在鎬瀍洛務輕長令之善康東人者往往移𨽻內史今京兆尹季同以敀有幹蠱之稱流聞于西遂陳換縣之求無替字人之術可守京兆尹渭南縣令授裴寰奉先縣令制前人勑裴寰等尹正務重自掾屬已下至于邦畿之長往往選署以聞從而可之亦委任責成之義也以爾等或理謀居最或保任稱能將委劇曹亦專近邑各懋乃職用酬爾知可依前件授韋珩等西畿令制前人勑河陽節度參議兼監察御史韋珩前懷州武德令李鄂等昔先王眚災肆赦則殊死以降無不宥免而受財集作賄枉法者常罪集作常常罪之以此防吏吏猶有豪奪於人者朕甚憫焉日者覃懷有過籍之賦使吾百姓無聊生於下非珩等為吾發覺則吾終不得聞東人之疾苦矣今美原藍田皆吾甸內之邑爾其為吾飬理生息以惠困窮使天下長人之吏知朕集有明字用廉激貪之意焉珩可守美原令鄂可藍舊令授李置咸陽縣令制白居易勑某官李置近者西戎集作夷犯塞詔諸將出師司計臣俊言置有應辦才可司饋餉故自京府掾假臺郎憲職以命之屬冦遁師旋未展其用况在公族推有器幹今授銅印俾宰咸陽夫庶官之理同歸撫字之任為急西郊咫尺佇爾能聲可京兆府咸陽縣令授徐登醴泉縣令制前人勑徐登京兆尹言登前為涇陽令清廉簡直奉法愛人請補醴泉冉考其績昔子路理蒲仲尼誨曰愛而恕可以容困溫而斷可以抑姦今醴泉人與蒲相類宜用此道往訓養之歲時之間期於報政可醴泉縣令授李友文興平縣令制崔嘏勑前鄂州觀察使殿中供奉李友文等畿甸之內百役是闕授蔣雍濟源縣令制勑夫任事之官親於人者莫切於令長也非其才則百里告病得其人則元元獲安况授其臣在乎所舉獻狀推允用觀爾能雍可河南府濟源縣令餘如故授王沂永寧縣令范傳規安邑縣令制元稹勑前汴宋亳潁等州觀察推官殿中侍御史內供奉賜緋魚袋王沂前宣武軍節度推官監察御史裏行范傳規等比制諸侯吏府罷則歸之有司以第叙常秩近或不時以聞謬異前詔朕申明之以復故典而去歲司徒𢎞以沂等入覲因獻其能越在後庚之前且寵上台之請命汝好爵時豫加恩勉字邦畿無虐黎獻沂可河南府永寧縣令傳規可守陜州安邑縣令餘如故授元壽陸渾縣令制崔嘏勑右補闕元夀縣令親人之任在昔為難况我每念疲氓思於共理爾有利用可為此官宜輟任於諫垣俾足才於宰邑解牛利刃來鹿殊祥勉思三異之能無忽百里之地可授前右補闕孫握長水縣令賜緋制錢珝勑具官某士大夫不能理其身而能理於人未之有也爾嘗以文行進取科名列士一作任華資詎非素志一旦自一作身退朝實多之所謂能理其身固可理於人矣加之朱綬用表積中寧無所操施為善政可依前件文苑英華卷四百七
