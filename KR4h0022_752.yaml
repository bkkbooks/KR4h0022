body:
  text: 文苑英華卷七百五十三宋李昉等編興亡下梁武帝論一首陳武帝論一首陳後主論一首隋髙祖論一首隋煬帝論一首兩漢辨亡論一首梁武帝論朱敬則梁髙祖聰明文思寬厚通博生而神異動多竒怪此天表也永元之初羣賢受命竭懷輔正盡力康衢細隟未開纎塵不動而雄圖英算孤識獨見審長河之將決知崑山之必焚理欲先天未遑後舉呌嘯龍虎合集風雲馳兩函以取荆州連五都疑以震都邑長流逺邁獨決方寸霜風飛掃雲雨霑沐白旄一麾頑童授首乃弔寃魂而謝牛酒昭筐篚而式善人師不疲勞人無怨讟謳歌是逼獄訟攸歸代德立成眷命斯在然躬覽載籍備睹興亡留心求瘼勵精納善雖化未大道時亦小康也若尋其德音討其風俗尚根淺易拔源涸難流禍亂相仍蓋其宜矣且兵號義旗戰稱伐罪勝非已利功豈私成湯有慚德去道近也武無愧容其私厚也昔魏太祖兵鋒無敵神機獨行大戰五十六九州靜七八百姓與能天下慕德猶且翼戴弱主尊奬漢室降及宋髙剪平僞孽安復王家義聲薄天髙誠動日然更懸兵四嶽决勝五湖北靜燕塵西清秦霧宏勳不讓成德見推備物滿庭猶非望故晉帝今日之所事本所甘心義士猶或非之通人尚為薄德况梁取天下又甚於斯南康主盟實稱齊帝奉之以成大順承之而動義兵國步既寧家怨又雪君稱主祭臣復何猜借人之名而不復命者也尋其錫文考其謙讓事同對面理非飾詞寧知悠悠江山相去千里矯情僞迹頓至於斯示人此心豈躬行事欲令節義行於比屋其可得乎夫君人者日月齊其明隂陽資其信江海同其量天地偕其容未有飾智驚愚衒材惑衆較武力於羊侃示腰腹於賀琛商略儒宗取異於章句變置官品無求於典實每事皆欲先入疑作人所唱復須稱贊父作子注君制臣歌受佞無厭進諂不倦浮華道長輕薄路開以天譴為嘉祥用妖怪為休祉聚斂俱極賞罰無章有識為之寒心羣寮曽不先覺若言位是神物何須下殿走乎若言負重願休何勞受贖歸乎若言息人是務何須納叛臣乎若言吞代有時何須中許和乎利器不藏奸夫得志然則侯景之兵我人也仗我器也驅我人揭我器而取雋者豈異術哉由上之失教也君父幽辱宗廟傾危帝子王孫跨州連郡未有晋鄭齊心牟虛合契五侯九伯列海分山牢疑聞申包胥之頓哭秦庭茅夷鴻之幣謁吳國户口徒衆不覩死戰之人寵遇雖多寧有報恩之士江淮無波瀾之阻城闕絶藩籬之固長州杜若一旦凋零稽山竹箭忽然摧折可不甚歟或問曰梁主不以黃屋為尊紫宸為貴離欲絶愛遣色歸空有湯武之憂勞若堯舜之臞臘享國五十若登春臺忽為羇旅叛臣鳴吠逋醜長㦸指闕强弩臨城兵折意窮忿毒而沒善不可恃岐路何歸君子曰梁主之美誠如子言神無與善未敢聞命何者武帝暮年荒誕實甚殫守縣之力不充自縱之資盡丁口之租才足緇衣之費昔夏桀以九州之冨秦皇以六合之尊造瓊室而天下土崩作阿房而寰中瓦解況地比一郡國乃三分外在疑作有征戍之勤內有雕靡之弊加以金剎寶柱爛熳雲霞至於銀榜朱簾的㿨星月神怒人怨禍積患生過往必來何足疑也且夫惡於齊而保於我何補也得一夫而亡一國非智也昔趙納馮亭有長平之禍梁受侯景成永福之災金甌忽傷悔之何及陳武帝論孔子曰夏道不亡商德不作商道不亡周德不作梁自侯景入寇蕭察外奔西鄰責言南風不競篡殺三帝覆沒兩都可謂亡矣但人痛既深天道亦悔是以大命集於有陳也武帝身長七尺垂手過膝蓋姚襄劉備之儔也惟寬以容物明以知人曠蕩不羈雄勇蓋世聲振嶺表功濟日南屬王室不綱大難未已江湖羣盜日尋戈戎是以投袂而呼夕不待旦以梁大寶三年二月㑹王僧辨於白茅灣齊小白之合諸侯以謀王室臧子源之要天地惟討賊臣故戮力盡心有死無二義聲一發其從如雲端居不言神光滿室建牙將指飛龍在天其所志也叛而伐之伏而舍之伐叛刑也柔伏德也德刑既舉人知其心旦為仇讎暮為賔友文公指白水蕭王推赤心不足加也若乃侯瑱賊將也降無季布之疑安都敗師也歸受孟明之任重孝穆之義待之如賔釋歐陽之囚惟賢是用故得羣材畢用衆勇合威蕩遍地之橫流廓溥天之巨祿臠侯景於竹町執王偉於草間爰其息歸瞻烏遂止仍以新不間舊疏不間親髙讓近臣方求别統昔魏推袁紹漢謝項王道貴能伸理不嫌屈及江陵不守喪君有君疆場無虞羣臣輯祖疑作睦足以攄三瞳疑之遺憤歇萬國之夙悲既上宰變圖假立非次晋出子圉秦納貞陽陵谷遷移對之長歎君臣易位但覺悲哉況乃居汜不歸焉用方伯在鄭未納誰曰勤王於是潛謀腹心隂召武旅囚杜陵於别室告文帝於臨時舟乘旦潮旗寢夜月掃重氛於絳闕反宸極於紫微役不浹辰區宇大定加以北挫蕭軌西拒王琳聖德日新元勳漸茂然後繼宋齊之丕業承舜禹之大名升壇而告上𤣥分圭以揖郡后大哉美哉人無間焉但雲雷尚屯邊塵未弭翌日告漸綴衣在庭楚之王孫歎布衣之未返燕之太子踐機橋而不歸悲夫陳後主論長城公器識古人承平嗣主觀其求忠讜之士禁左道之人淫祀妖書鏤薄假物即古明哲何以加焉但強寇臨邊南國斯蹙禮義不舉苛刻日滋鄰好不敦驕傲是務嬖妾五十盡有珥貂之容麗服一千咸取夭桃之色加以貴妃夾坐狎客承筵玉貌綘脣咀嚼宫徴花箋綵筆吟詠烟霞長夜不疲略無醒日於時也隋德甫隆南被江漢厚待間諜羊叔子之傾敵人不伐有喪楚恭王之結鄰好加以賀若謀勇應變如神擒虎雄風臨機若電莫不迎刀自裂聽鼓爭奔斬張悌之守迷降薛瑩之知命紫殿正色不用袁憲之言白刃交前但為無社之計嗟乎龍盤虎踞之地露草霑衣千門雙闕之間風煙歇絶臨江離别之感赴洛嗚咽之悲五百里之俘囚纍纍不絶三百年之王氣寂寂長空一國為一人興前賢以後愚滅其來尚矣或問曰安樂公劉禪歸命侯孫皓溫國公髙緯長城公陳叔寶並稱域中之大據天下之尊或銜璧送降或逃竄就繫必不得已何者為先君子曰客所問者具在方冊請為吾子陳之任自擇焉若乃投井求生橫奔畏死面縳請罪膝行待刑是其謀也馬上唱無愁之歌侍宴索逹摩之曲劉禪不思隴蜀叔寶絶無心肝對賈充以不忠之詞和晉帝以鄰國之詠是其才也縱黃皓嬖岑昏寵髙壤狎江總是任也剝面鑿眼孫皓之刑棄親即讎髙緯之志其餘細故不可殫論聽吾子之懸衡任夫人之明鏡客曰入井下策也隋髙祖論昔孫資隂謀晉宣入輔鄭譯矯制隋文受遺自此而有魏人從斯以遷周鼎蓋天厭亂德神誘其衷若妄指河氷遂成王業誤擊金鼓仍啓霸圖也況體貌竒特儀表絶人周太祖之欽明異其風骨齊憲王之聰察憚以非常韋鼎一見以委誠趙公聞名而進女是以稱劉季之靈怪者不謀同詞說中興之應䜟者往往偶語屬周多世故禍難荐臻始以后父之尊遂受托孤之寄騎虎不下掎角是因不利孺子非唯管叔之言社稷輸人寧止休公之對所以尉遲舉魏從亂如雲王謙據蜀其徒若市遂能驅駕豪傑委任忠良不下廟堂天下大定然後謳歌允集文物滿庭卿雲曉聚長星夜掃拱揖而朝羣后升壇而類上帝紹舜禹之遺躅光漢魏之大名於是流曠蕩之𤣥風浸淳古之膏澤削秋荼之繁令革亡國之哀聲加之以恪勤廣之以質素太陽滿昆蟲之穴湛露垂行葦之苕教人七年亦可以即戎矣俄屬陳朝喪德江海揚波自絶於天結怨于下乃以開皇八年十月承少昊之秋氣動文昌之將星下蜀漢之舟翩翩龍躍集幽并之騎蕭蕭馬鳴一葦而可以橫大江三令而可以陵湯火蔣山苦戰子文之魂魄飛揚建業大崩叔寶之金湯不守既遭岸上之虎非復水中之龍斬伯嚭以謝陳人禮陸機而慰吳士春波暫洗汙俗咸新秋露一零弊化斯改乃下制曰今率土大同含生遂性內外職位遐邇黎人家家自修人人克念使不軌不物蕩然俱盡此乃憂勤之心見於動靜故使六合之中觀如曉日八紘之內若遇新晴況復盡力於人勵精為政躬親以率下因心以感物煙火萬年風雨四時野有擊壤之歌天無垂象之誡𤣥方丹徼煙燧不驚玉檻金河波瀾久息天子登雲臺而訪道實垂拱而無為公卿指日觀以推誠願升中而每竭可謂盡美矣未盡善也然天性既猜素無學術意不及逺政惟目前是以牝雞司晨讒人罔極剖符罕山河之誓同盟多翦黜之悲恩不終於有功罰每深於無罪啓䦧牆之兆借實沈之兵楊素決其波張衡注其隟桞逺草制房陵尚遙穆子授戈豎牛仍在禍非天降釁是人謀是以知隋運之不永矣君子曰昔陸孟知中興之微宣帝始重儒術李通稱漢家之命世祖專信䜟文時好既行其流遂廣故子雲符命尹敏僞言即其類也髙祖少愛不經之談遂好迂誕之說所以王韶順㫖袁充取容賞溢丘山恩深江海豈不弊乎又祥瑞者聖人之應也至若八百集於孟津六王至於陔下周人岐山之北晉衆江漢之南負樂就陳攜手適宋牛馬內向羣盜外奔宗社乂安黎民不散此瑞之上也若乃連珠共軫的礫清漢之涯合璧齊輝光芒黃道之上四時不爽百榖用成家有孝慈人懷禮義此善之應也至如白鹿朱鴈璚露卿雲鳩雀異毛草木殊狀此並沐我皇澤煦我帝春聖人圓城之中天子生成之物豈足表太平之日顯休明之辰而隋主好之意不能盡遂令巧僞相半何其薄哉近石虎之有中原也伏心漢髙自儕光武子女殁於淫昏文物盡於鋒鏑猶得厭六馬駕四轔燃連理之材煮白雉之肉若天道不惑應降以災由斯而談斷可知矣隋之眷眷復何為哉問曰晉克金陵功多者屬吏隋平建業德俊者尤闕豈爭名於朝事必須此將亷恥道盡莫畏簡書乎君子曰曉兵之家因敵變化故有功成請罪之義君命不受之談今者王濬乘風賀若先戰茍有大利何簡細瑕方知責兵士之汙宫闈徴軍司之隱玉帛豈不狹乎始疑范燮後入孟側不前卻克有詞馮異不語時無君子斯焉取斯豈與夫自伐無慚奮髯直出而相類乎又問曰王者初興必有佐命莫不同聲相應同氣相求白雲之鬱慶龍清風之集雕虎不以夷險易志不以逺近隔心千載一時其來尚矣三代以前緬邈無際兩漢之後聲名可尋若乃庇俗匡時體國經野謀出心膂政待股肱但清濟之入濁河波瀾莫辨蚊虻之附驥尾遲速罔知既因論討之餘願示懸衡之末君子曰神人無功逹人無迹張子房𤣥機孤映清識獨流踐若發機應同急箭優遊淡泊神交太虛非諸人所及也至若陳平荀彧賈翊荀攸劉曄郭嘉田豐沮授崔浩張賔等可謂天下之菁英帷幄之至妙中權合變因敗為功爰自秦漢訖於周隋蘭菊相薰惟有此矣加疑蕭何之鎮靜關中冦恂之安輯河內葛亮相蜀張昭輔吳茂𢎞之經理琅琊景略之弼諧永固劉穆之衆務必舉揚遵彥百度惟貞蘇綽共濟艱難髙熲同經草昧雖功有大小運或長短咸非疑股肱之材悉為忠烈之士若乃威以靜國謀以動鄰提鼓出師三軍賈勇置兵境上千里無塵內外兼材惟孔明景略也故崔浩云王猛是符堅之管仲劉裕是德宗之曹瞞孫盛云孔明善輔小國子産之流也斯言中矣隋煬帝論煬帝美姿儀性聰慧少好學善屬文故髙祖獻后特所鍾愛矯情飾迹有曹丕之釣名傾承中使若子楚之仁孝況南平江左北靖塞垣楊素譽其賢桑和說其貌屬青宫失愛紫掖流恩遂映前星乃升明兩衣冠雖偉入朝少四皓之賔公宴雖多言談止七子之客但奸心未露僞跡斯窮沐猴而冠輕薄之材不久況虎為善爪牙之毒㑹施故無道於大漸之晨蒸淫於易簀之夕罕髙宗之諒隂有丹朱之慢遊于時隋德在人羣生樂業二十年之訓聚百萬衆之精彊乘天下之有盈驕海內之無事乃自以土廣三代威振百蠻恃才矜已傲狠明德內懷險躁外示寬平盛衣服以掩姦飾詞令以拒諫更乃荒淫無度法令滋章人力盡於穿築杼軸空於聚斂十室之內思亂者一二焉方始馭八駿建五牛穆天子之白雲更逺瑶池之外秦始皇之觀日方踐石梁之前或以衢路受刑或以滋味被戮死不可無罪而免賞不可有功而要相顧凛然莫知攸止十室之內思亂者五六焉於是斛斯外奔𤣥感內逆兵陷遼水糧斷河黎月暈七重知髦頭之犯畢日光四散覺兆庶之分崩且選妖麗恣朋淫嘉羣嫗之慢言樂少年之醜穢不軌不物無威無儀關梁不通賦役斷絶更乃逆取五年之課以充長夜之娛十室之內思亂者八九焉當此時也小人方興羣盜孔熾大者剽州邑小者劫村閭擾擾四人俱靡息肩之處喧喧九土居為關戰之場天子乃幸維揚泛舳艫驅虎賁之騎唱龍舟之歌以大江為天塹以長淮為地險周章至於戲下猶自未知閻樂入於廡前何不告我昔為天下之重今乃一夫所輕豈不惜哉彼煬帝者聰明多智廣學博聞豈不知蛟龍失雲漁夫足得為害鯨鯢出外疑作水螻蟻可以為災忽乃棄崤函之奧區違河洛之重阻言賊者獲罪敢諫者受刑豈不是色醉其心天奪其鑒竄吳夷以避其地虛宫闕以候聖人蓋為大唐之驅除也君子曰小人之心猶火也火之性必須有所燒小人之心必須有所害當其受寵遇也排忠良庇疑道德辨足以移視聽辭足以結主心導之以淫奢引之以苛刻人困而不恤政荒而不修如螻蟻潰隄防不覺其敗如春風養草木但見其盛事至而未知禍構而方懼素無材略不能以敗求全本自少恩豈能得衆成事進退唯谷無處容身或出奔以圖生或殺主而自解眇觀史䇿遍採興亡開役者多是愛臣害上者無非近習然庸君暗主莫肯逺之復河言哉兩漢辨亡論權德輿言兩漢所以亡者皆曰莾卓豫以為莾卓篡逆汙神器以亂齊民自賈夷滅天下耳目顯然聞知靜徴厥初則亡西京者張禹亡東京者胡廣皆以假道儒術得伸其邪心徼一時大名致位公輔詞氣所發損益繫之而多方善柔保位持祿或陷時君以滋厲階或附凶沴以結禍胎故其蕩覆之機篡奪之兆皆指導之馴致之雖年祀相逺猶手授頤指之然也其為賊害也文粹無也字豈直莽卓之比乎禹以經術為帝師身備漢相特見尊信當主臣之重極儒者之貴永始元延之間天地之眚屢見言事者皆譏切王氏顓政時成帝亦悔懼天變而未有以決駕至禹弟辟左右以問之須其一言以為律度為禹計者亦須集作宜陳大易堅氷之誡誦小雅十月之刺乘其嚮納痛言得失反以罕言命不語怪為詞致成帝不疑之心授王氏寖盛之勢上下恬然奄忽亡國儻帝慮不至是猶當開陳切劘面别廷辨矧當就第宴間之際虛懷訪決之時方且視小男於牀下官子壻於近郡欵欵然用家人匹夫為心以身圖安不恤國患致使羣盜世文粹作弄權迭執魁柄禍稔毒流至於新都不可遏也斯可憤也逮至東都順桓之間國統亡集作三絶胡廣以巨儒柄用位極上台初梁冀席外戚之重貪戾當國既鴆質帝議立嗣君公卿大臣皆以清河王蒜年長有德屬最尊親可以靖人亦既定策冀乃憚其明哲且不利長君私於蠡吾獨異羣議為廣議者亦當中立如石介然不回率趙誡之徒同李杜所守然後文粹無與字三事百爾正詞於朝雖冀之暴恣豈能一旦盡誅漢廷羣公耶反徇一息之安首鼠畏懦竟使清河徒廢蠡吾為梗邦家陵夷漢道日蹙結黨錮之獄成閹寺之禍禍亂循環以至董卓赫赫漢室化為當塗蓋棟橈罪折之所由來久矣彼梅福以孤逺上疏張綱以卑秩埋輪獨何人哉而不是思也噫嘻就利違害榮通醜窮大凡有生之常性也暨乎手持政柄體國存亡則謹之於初決之於始以導善氣以遏亂原若禍胎既萌則死而後已白刃可蹈鴻毛斯輕奈何禹廣於完安之時則務小忠而立細行數數然獻吉筮於露蓍沮立後於探籌及夫安危之際邦家之大則甘心結舌隂拱觀變豈止文粹作正然也方又熾焰焰以燎原決湯湯以襄陵投天下於煙煨擠萬民於昏墊百代之下無所指名雖史贊粗言而不究論本末且出不越境書弒君之惡言僞而辨有兩觀之誅若當春秋之時明禹廣之罪作誡來世可勝既乎向者謀作若西京抑損王氏尊君卑臣則庶乎無哀平之壞東京登庸清河主明臣忠則庶乎無靈獻之亂大漢之祚未易知也或以國之興亡皆有隂隲之數非人謀能亢則但取瞽朦文粹作聲者而相之立土木偶而尊之被以章組列於廊廟斯可矣何堯舜之或咨或吁殷周之或夢或卜憂勤日昃之若是然後為理耶豫因肄右集作古史且嗜春秋褒貶之學心所憤激故辨其所以然秦論上羅衮亡秦者不在胡亥趙髙子嬰亦不在始皇亡秦者李斯也胡亥固亡國器也以秦授之者過也趙髙不幸秦狗之瘈左右者不圖則固噬其主矣子嬰立於已亂四十餘日而亡考其行事不無庸主之材其猶坐四屋之間環火已熾雖有殺火之術欲沒何由哉始皇雖不以仁義死之日天下無事民為擇君但其遺詔不行於斯耳李故有名天下臣主相得六國既平不能於此時推廣使秦修帝王之道固亦失矣及始皇外崩姦臣謀亂反不能於此時制變為存秦之計卒使趙髙得行其謀胡亥極其惡子嬰孤死於蒼黃之地始皇失賢嗣遂暴惡於後世嬴氏之鬼以不食者李斯之故也然則趙髙之際為李斯者義冝奈何奔䝉恬立扶蘇為國討賊以固其社稷可也當是時䝉恬與扶蘇將三十萬之師屯上郡䝉恬之威外震胸奴內信秦國三世積功兄弟忠信尊用於世扶蘇長子直諫而出雖然始皇故知之所以無詔封諸子而獨書與扶蘇欲以為嗣雖天下之人皆知其賢而以為當立故陳勝吳廣作亂乃詐托公子扶蘇以從民望向使李斯以䝉恬之威舉其兵以扶蘇之望令天下而誅一趙髙豈難哉賊臣既誅恬斯乃復相與盡其材輔賢明之主以寬靜天下秦不亡矣不唯不亡且將興斯不務出此耽祿畏害怵譎於傾危之際使秦有殺適立庶淫刑虐法殺君亡國之惡窮天地而不搓者李斯之故也悲夫秦論下或謂衮曰子言秦亡與存秦之計明矣吾聞國之興亡乃有天命設使李不失其計秦果不亡乎衮曰吾雖不言天其實天之道子雖稱天以問我而未識天之說夫所謂天者平無私也故曰皇天無親唯德是輔君人者有德天則贊而興之無德則革而亡之興亡之命在乎天而所以興亡在乎人也商書曰夏王弗克庸德慢神虐民皇天不保監於萬方啓迪有命眷求一德俾作神主此言桀不能常有德不敬神明不恤下民天下不安桀之所為乃廣視萬邦有堪天命者則開而導之以湯有純一之德求使代桀為天地神祗之主也故曰非天私我有商惟天祐於一德二世無德為所以亡之道天是以革而亡之使扶蘇果立則固有德為所以興之道天必贊而興之矣不當奪嬴與劉代夏以商也或曰李斯之失當責其不任職雖曰不忠不智也子加以亡秦之諡不亦重乎衮曰吾豈欲加諸斯也蓋聖人之道不得易焉昔鄭公子殺靈公也謀於子家子家權不足以禦亂懼譛而從之春秋以首惡故書曰鄭公子歸弒其君夷斯其類也子欲易聖人之道乎哉文苑英華卷七百五十三
