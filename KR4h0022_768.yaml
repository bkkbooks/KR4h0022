body:
  text: 文苑英華巻七百六十九宋李昉等編貨食貨泉議一首復漢以粟為賞罰議一首錢貨議一首錢重物輕議一首廢職田議一首邊防與魏徵論突厥議一首㧞四鎭議一首設險議一首貨食貨泉議文粹作請禁私鑄錢議劉秩開元二十二年議曰臣伏奉今月二十一日勑欲不禁鑄錢更令百寮詳議可否者夫錢之興其來尚矣将以平輕重而權本末齊桓得其術而國以霸周景失其道而人用弊考諸載籍國之興衰實繫於是陛下思變古以濟今欲反經以合道而不即改作詢之芻蕘臣雖憃愚敢不薦其聞見古者以珠玉為上幣黄金為中幣刀布文粹作錢布為下幣管仲曰夫三幣握之則非有補於煖也捨之則非有損於飽也先王以守財物以御人事而平天下也是以命之曰衡衡者使物一高一下不得有常故與之在君奪之在君富之在君貧之在君是以人戴君如日月親君如父母用此術也是謂舊唐志作為人主之權今之錢即古之下幣也陛下若捨之任人唐䇿有自鑄二字則上無以御下下無以事上其不可一也夫物賤則傷農錢輕則傷賈故善為國者觀物之貴賤錢之輕重夫物重則錢輕錢輕由乎物多多則作法收之使少少則重重則作法布之使輕輕重之本必由乎是柰何而假於人其不可二也夫鑄錢不雜以鉛鐡則無利雜以鉛鐡則惡惡不重禁之不足以雜心且方今塞其私鑄之路人猶冒死以犯之况啓其源而欲人之從令乎是設䧟穽而誘之入其不可三也夫許人鑄錢無利則人不鑄有利則人去南畆者衆去南畆者衆則草不墾草不墾又隣於寒餒其不可四也夫人富溢則不可以賞勸貧餒則不可以威禁故令法不可以行人之理亂十字唐志㑹要作法令不行人之不理皆由貧富之不齊也若許其鑄錢則貧者必不能為臣恐貧者彌貧而服役於富室富室乘之而㑹要作則益恣昔漢文帝之時呉濞諸侯也富埒天子鄧通大夫也財侔王者此皆鑄錢之所致也必欲許其私鑄是與人利權而捨其柄其不可五也陛下必以錢重而傷本工費而利寡則臣願言其失以効愚計夫錢重者猶人日滋於前而爐不知加於舊又公錢重與銅之價頗等故盗鑄者破重錢以為輕錢錢輕㑹要無此二字禁寛則行錢重唐志㑹要無此二字禁嚴則止止則棄矣此錢之所以少也夫鑄錢用不贍者在乎銅貴㑹要有之由二字銅貴在於採用者衆夫銅以為兵則不如鐡以為噐則不如漆禁之無害陛下何不禁於人禁於人則銅無所用銅無所用則銅益賤賤則錢之用給矣夫銅不布下則盗鑄者無因而鑄無因而鑄則公鑄㑹要作錢不破㑹要叠公錢不破四字人不犯死刑錢又日增必唐志㑹要文粹作未唐策作斯通典作不復利矣是一舉而四美兼也惟陛下熟察之謹議復漢以粟為賞罰議吕温議曰先王賞以飾喜罰以飾怒喜必待功而賞不僣行怒必集作自待罪而罰無輕赦其來尚矣漢氏雜覇道而隳王制昧宏規而狃小利俾人納粟除罪拜爵以罰人則廢法以賞人則廢功以儲蓄則廢本是阻禁作沮勞惠奸而怠棄南畆也何以言之惟名與噐不可假人而班爵於并兼之家析圭於滯積之室使屠沽賤𨽻陵駕英豪茍有懐亷耻之心豈復致患難之死雖月要天地日誓山河而賞不足以勸矣天討有罪刑之集作兹無赦而撓權於殘賊之徒屈法於奸宄之黨使兇人汙集作酷吏言暴無傷茍開必免之門孰懲罔極之惡雖臨以斧鉞驅於鼎鑊而刑不足以威矣且朝縻好爵以粟授受國有常刑以粟出入貪利愛生之夫孰不願空壠畆而貨圭組竭倉廪而救死亡拜爵者坐等封君遂忘其本業免罪者室如懸罄集作磬曷保其生聚賞罰者君集作長人之大柄農嗇者為集作有國之永圖忽而棄焉曽不是念而利乎國儲之蹔實兵食之僅濟其何補歟然而漢承秦弊中國耗弱高惠務厥完輯孝文守以恭儉德未浹於海外威未行於四夷邊候猶聞擊柝戎士不得解甲晁錯是以權宜之對救弊之術偷利於當代幸成於一時雖曰有因而為終貽識者之誚國家體元御極繼天而作勝集作騰軼殷周休有集作紹休唐虞率我烝人登于壽域王一變至於帝帝一變至於皇非大道之謩不聽非聖德之猷不集作非盛德之事不問焉有襲集作習近古之失䇿採庸臣之詭論者哉必患國廪猶虛邊餽未繼莫若興李悝之平糴務充國之屯田練将簡兵以省軍費輕徭薄賦以恱人心東作一興西成再秩則太倉之蓄如京矣塞下之稼如雲矣亦何必虧昭德塞違之道墜信賞必罰之典恐非聖唐經邦軌物之制也謹議錢貨議元稹奉進止當今百姓乏集作之困衆情所知欲減税則國用不充欲依舊則人困轉甚皆由貨輕錢重征税闇加宜令百寮各陳意見以革其弊者臣以為當今百姓之困其弊數十不獨在於錢貨征税之謂也旣聖問言之又以為黎人之重困不在於征集作賦稅之闇加悉在於剥奪之不已錢貨之輕重不在於議論之不當患在於法集作號令之不行今天下稅賦一法也厚薄一概也然而亷能蒞之則生息貪愚蒞之則敗傷盖得人則理之明驗矣集作也豈征稅闇加之謂乎自嶺已南以金銀為貨幣自巴已外以鹽帛為交易黔巫溪峽大抵用水銀硃砂繒帛集作綵巾帽以相市然而前人以之理後人以之擾東郡以之耗西郡以之贏又得人則理之明驗也豈錢重貨輕之謂乎自國家置兩税已來天下之財限為三等集作品一曰上供二曰留使三曰留州皆量出以為入定額以給資然而節将有進獻以市國恩者有賂遺以買私名者有藏鏹滯帛以貽子孫者有高樓廣榭以熾第宅者彼之俸入有常也公私有分也此何從而得之又國家置度支轉運已來一則管鹽以易貨一則受財以經費近制有年進月進之名有正至三節之獻彼之管鹽有常也受財有數也此又何從而得之且百姓國家之百姓也財貨國家之財貨也不足則取之有餘則捨之在我而已又何必授之重柄假之利權狥彼之徼恩成我之怨府哉今陛下初臨億兆首問羣寮誠能禁方集作藩鎭大臣不時之獻貢罷度支轉運别進之名絶賂遺之私節侈靡之俗峻風憲之舉深贓罪之刑精覈考課之條愼選字人之長若此則不減税而人安不改法而人理矣至于古今言錢幣之輕重者熟矣或更大錢或放私鑄或龜或貝或皮或刀或禁埋藏或禁銷毁或禁噐用或禁滯積皆可以救一時之弊也然而或損或益者盖法有行不行之謂也臣不敢逺徵古證竊見元和已來初有公私噐用禁銅之令次有交易錢帛兼行之法近有積錢不得過數之限每更守尹則必有用錢不得加除之牓然而銅器備列於公私錢帛不兼於賣鬻積錢不出於墻垣欺濫偏行於市井亦未聞鞭川粹作罪一夫黜一吏賜集作賞一告訐壞一蓄藏豈法不便於時耶盖行之不至也陛下誠能採古今救弊之方集作法施賞罰必行之令則聖祖神宗之法制何限前賢後智之議論何窮豈特愚臣盗竊古人之見自稱革弊之術哉謹議錢重物輕議右臣伏見中書門下牒奉進止以錢重物輕為病頗甚宜令百寮各隨所見作利害狀類㑹奏聞者臣備位有司謬揔邦計權物變弊職分所當固合經心自思上逹豈宜待問方始啓謀臣伏以作法於人必求適中茍非濟衆是作不臧所以夙夜寘懐重難其術伏奉制㫖旁採庶寮臣實有司敢不知愧旣不早思所見上沃聖聰今乃備數庶官肩隨奏議無乃失有司奉職之體負尸位素飱之責况道謀孔多是用不集盈庭之言自古所知至於業廣即山稅徵榖帛發公府之朽貫禁私室之滯藏使泉流必通物定恒價羣議所共指事皆然但在陛下行之有司遵守利害之説自足可徴若更将廣引古今誕餙詞辯有齊畫餅無益國經恐重空文不敢輕議謹議廢職田議并序李元紘開元十三年時初廢京司職田議者請於關輔置屯田以實倉廪元紘建議曰伏以軍國不同中外異制若人閒無役地棄不墾發閒人以耕棄地省餽運以實軍粮於是乎有屯田其為益多矣今百官所退職田散在諸縣不可舊唐書本傳有處字非聚也百姓所有私田皆力自耕墾不可取也若置屯田即湏公私相換徴㑹要作調發丁夫徴役則業廢於家免庸則賦闕於國内地置屯古所未有得不補失㑹要作若此處置或恐未可謹議邊防與魏徴論突厥議温彦博貞觀十三三字貞觀政要作四字非年頡利初敗而來降者甚衆詔議安邉之術朝士多言突厥恃强擾亂中國為日乆矣今天寔䘮之窮來歸我本非慕義之心因其歸命分其種落浮之河南兖蔡之地蔡政要作豫是散属舊唐書突厥傳作居州縣各使耕織百萬獷卒可得化為百姓則中國有加户之利塞北可常空矣惟中書令温彦博議請凖漢建武時置降匃奴於五原塞下令突厥傳作全其部落得為捍蔽又不離其土俗因而撫之一則實空虛之地二則示無猜之心若遣向河南兖豫則乖物性故非含育之道太宗将從之秘書監魏徴奏曰突厥傳作言突厥自古至今未有如斯之破敗者也此是上天勦絶宗廟神武且其代冦中國百姓寃讐陛下以其降伏不能誅滅即宜遣還河北居其故政要作舊土匃奴逰牧逐草居無常處强必冦盗弱則卑服不顧恩義其天性也秦漢患其若是故發猛將以擊之取取政要作收其河南以為郡縣陛下柰何以内地居之且今降者幾至十萬數年之間孳息自突厥傳作百政要作過倍居我肘腋甫政要作俯邇王畿心腹之疾将為後患尤不可河南處也温彦博奏曰天子之於物也政要作萬物如天地覆載突厥傳作天覆地載有歸我者則必養之今突厥破滅政要作敗之餘歸心降政要作部落歸附陛下不加憐愍棄而不納非天地之道政要作心阻四夷之意臣愚甚謂不可遣處河南亦無所患所謂死而生之亡而存之懐我德惠政要作厚恩終無叛逆魏徴又曰晋代有魏時胡落分居近郡平呉以後郭欽江統勸武帝逐出塞外帝不用欽等言數年之後遂傾河二本作瀍洛前代覆車殷鑒不逺陛下必用彦博之言遣居内地二本作河南所謂養獸自遺患也彦博又曰臣聞聖人之道無所不通古先哲王有教無類突厥餘醜政要作䰟以命歸降二本作我我援䕶之使二本作收居内地我指麾之突厥傳作禀我指麾教以禮法數載之後盡為農人選其酋首政要作長遣居宿衛畏威懐德何患之有且光武有突厥傳作居南單于居突厥傳作於内郡為漢藩翰終乎一代不有叛逆上竟從其議㧞四鎭議崔融議曰北狄之為中國患者乆哉唐虞以上為獯鬻殷周之際曰獫狁西京東國有匈奴冒頓焉當塗典午有烏丸鮮卑焉拓䟦世則蠕蠕猖狂宇文朝則突厥恣睢斯皆名號因時而改種落與運而遷五帝不能臣三王不能制兵連禍結無代不有長䇿逺筭曠古莫聞夫胡者北狄之揔名也其地南接燕趙北窮沙漠東接鮮卑西界吐蕃天性驕傲覘伺便隙鳥飛獸走草轉水移自言天地所生日月所宜南有大漢北有强胡更相馳突至今䧟潰者靡嵗而寧焉漢興髙皇以百萬衆窘于平城之下國人羞之逮至武皇患其如此赫然發憤肆志逺畧建元中使張騫始通西域旣而列四郡㨿兩關以斷匈奴右臂乃復度河湟築令居塞以絶南羗北交於是乘障塞絶亭燧出長城數千里矣于斯時也承文景𤣥黙之後國用富强太倉之粟相因水衡之錢貫朽練兵選将深入窮追傾府庫之財殫士馬之力行人使者嵗月亭障貳師驃騎首尾關河餓虎未摧其國已耗槖駞旣死其人亦殄乃至造皮幣筭緡錢稅舟車𣙜酒酤夫豈不懷深惟長乆之計然而匈奴於是乎孤特逺竄羽檄不行焉始孝武開西域之後為置使者校尉領䕶之宣元哀平其道不替王莾簒位貶易侯王由是西域怨叛與中國隔絶並復從属匈奴歛税重刻諸國不堪命光武中興皆遣使求内属自建武至于延光三絶三通至唐太宗方亊外討復脩孝武舊跡並南山至於葱嶺為府鎭烟火相望焉其在高宗勵精為政不欲廣地務其安人徭戌繁數用度減耗復命有司㧞四鎭其後吐蕃果驕大入西域焉耆以西所有城堡無不降下遂長驅東向踰高昌壁歴車師庭侵常樂縣界斷莫賀延磧以臨我墩煌伏頼主上神鑒通幽冲機測逺下嚴霜之令興時雨之兵乃命右相韋待價為安息道行軍大揔管安西都䕶閻温古為副問罪焉時也先命蘭州刺史行軍司馬宋師将料敵簡徒倍道㨿磧賊逄有備一戰而走我師追躡至于焉耆粮道不繼而止竟亦無功朝廷以畏懦有刑流待價於瓊州棄温古於秦州放棄二罪而諸将咸肅至王孝傑而四鎭復焉今若㧞之是棄已成之功忘乆安之䇿小慈者大慈之賊前事者後亊之師柰何不圖也四鎭無守則狂胡益贍必兵加西域諸蕃氣羸恐不能當長蛇之口西域旣動自然威臨南羗南羗樂禍必以封豕助虐蛇豕交連則河西危河西危則不得救况復邊境守禦之具未整内郡武衛之備未精方湏命将出師興役動衆向之所得今之所失向之所勞今之所逸可不謂然乎而議者但憂其勞費念其逺征曽不知其蹙國減土春秋所譏杜漸防萌安危之計夫南羌者請試言之徃孝武皇帝築令居時羣羗明約與匈奴合兵至十餘萬共圍枹罕遣李息為擊平之是則羌胡同惡有自來矣遽而依西海塩池左右漢遂因山為塞河西地空稍徙民以居之至宣帝時先零種豪言願得度湟水逐人所不田處為畜牧将軍趙充國以為不可後羌因縁前言遂度湟水郡縣不能禁乃遣充國與諸将擊平之是則願牧始言非止於今年耳且漢之匈奴曷若今之黙啜今之勃律孰與漢之南羗頃者若兵稍遲留賊先㨿要害則河西四郡已非國家之有今復安得而㧞之乎何謂非國家之有但莫賀延大磧者伊州在其北沙州在其南延袤向二千里中間水草不生焉每災風横必石飛吼行人晝㸔朽骨以知道路夜視斗柄以辨方隅徃徃遇駞泉時時得馬酒而後度焉盖駞馬死者十四五人畜疲極若北有强冦則難以度磧漢兵難度磧北闕伊西延安及諸蕃無救則疲兵不能自振不能自振則為賊所役属賊吞之又得肥饒之馬馬肥人逸漢復焉得懸軍深入乎有以知通西域之艱難也磧南有沙𤓰丼肅四州並以南山為限山南即吐渾及吐蕃部落賊知漢兵不得度磧必踰南山分路而下磧北賊與突厥通結相合而前則凉州以西勢必危矣故曰非國家之有㧞之非便主上以黙啜逆天置之度外神武不殺上仁好生遂令匍匐請命聳踴知耻中國不聞犬吠之警邊亭不識狼顧之憂聖人之用兵也如此則知啟脩政而有扈奔農脩德而夙沙至禹焚甲而夷人附舜舞戚而苖民來為不虛也賈誼書云賈誼新書作周成王問鬻子曰聖王在上位使人富且夀夫富則可為也夀不在天乎對曰聖王在上位則天下無軍兵之事則人免於一死而得一生矣君積於道吏積於德人無凍餒則免於二死而得二生矣君積於仁吏積於愛則刑罰廢人無天闕之誅則免於三死而得三生矣使人以時而用之以節人無癘疫則免於四死而得四生矣今聖主在上而得四生禀氣流形孰不幸甚然為邦之道安不忘危漢時單于上書願保塞請罷邊備郎中侯應習邊亊以為不可東漢時西羗作亂徴天下兵賦役無已司徒崔烈以為宜棄凉州議郎傅燮厲言曰斬司徒天下乃安凉州天下要衝國家藩衛世宗拓境列置四郡議者以為斷匈奴右臂烈為宰相不念為國思所以弭之之䇿仍欲割棄一方萬里之土若使左袵之虜得居此地土勁甲堅因以為亂此天下之至慮社稷之深憂竟從燮議今宜日愼一日雖休勿休採侯應不可之言納傅燮深慮之議然後風為號令雷為折衝繕甲兵思将帥上與天合德下與地合明中與人合心善戰者不戰一作陣如斯而已矣㧞舊安之四鎭委難制之兩兇求将來之端考已然之驗伏念五六至于再三愚下固陋知其不可伏惟朝廷再三察焉謹議設險議李谿易稱王公設險以守其國夫為國之衛恃於山川丘陵郛郭溝池自古而然也左氏傳司馬侯對晋主以九州之險而不以一姓恃險為殆此欲其夕愓戰慄而進德也説者不知言左氏與大易相反而曰非設險或曰孟子稱地利不如人和夫和不設險以為周備也何以言之昔周室肇基后稷業隆昌發玉璜佐命而寳龜卜七百之祀師逾孟津諸侯不謀而至遂雷響風颮音疱殷墟圯裂乃定鼎郟鄏遷都洛食聿脩祖宗之業非棄德也而無險阻以自固遂使晋文作覇召天子於河陽楚莊問鼎之失足以為鏡矣向使周設秦之險秦法周之德則七百之期可以保强大萬葉之制可以無棟橈也且譬之御者焉闕今猶任商周之德業述商周之仁義然後阻江漢以險使夷狄賔因岳鎭以險使諸侯順慿關梁以險使近甸安張四維以險使百官衆斷刑罰以險使盗賊止求明察以險使奸偽白險之時用大矣哉斯所以來逺鎭邇戢兵解甲而守終膠固也謹議文苑英華巻七百六十九
