body:
  text: 文苑英華卷七百六十四宋李昉等編祭祀先代帝王及先聖先師議一首昊天上帝及五帝異同議一首論配坐議一首功臣配饗議一首禘祫議一首加籩豆增服紀議二首景皇帝配昊天上帝議一首禘祫議一首敬鬼神議一首先代帝王及先聖先師議顯慶二年七月十七日長孫無忌許敬宗同議議曰謹按禮記祭法云聖王之制祭祀也舊唐志作功法施於人則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之又云堯舜禹湯文武皆有勳烈於人及日月星辰人所瞻仰非此族也不在祀典凖此帝王合與日月同例恆加祭饗議在報功爰及隋代並遵斯典其漢高祖祭法無文但以前代迄今多行秦漢故事始皇無道所以棄之漢祖典章法垂於後自隋已上亦在祀例伏惟大唐稽古垂化網羅前典唯此一議一作禮咸秩未申今新禮及令無祭先代帝王之文今請聿遵故實唐志作事修附禮令依舊三年一祭仍以仲春之月祭唐堯于平陽以契配祭虞舜於河東以咎繇配祭夏禹于安邑以伯益配祭殷湯于偃師以伊尹配祭周文王于鄷以太公配祭周武王于鎬以周公召公配祭高祖于長陵以蕭何配又按新禮孔子為先聖顔回為先師又凖貞觀二十一年詔亦以孔子為先聖更添左丘明等二十二人與顔回俱配尼通典作宣父於太學並為先師今據永徽令改用周公為先聖遂黜孔子為先師顔回丘明並為從祀謹按禮記云凡學春官釋奠於其先師鄭𤣥注云官謂詩書禮義通典作禮樂詩書之官也先師者若漢禮有高堂生樂有制氏詩有毛公書有伏生可以為師者又禮記云始立學釋奠于先聖鄭𤣥注云若周公孔子也據禮為定昭然自别聖則非周即孔師則偏善一經漢魏以㑹要作已來取捨各異顔回夫子互作先師周公宣父迭通典作㬰為先聖求其節文遞有得失所以貞觀之末通典作制親降綸言依禮記之明文酌康成之奧說正夫子為先聖加衆儒為先師永垂制於後昆革往代之訛謬而今新令不詳制㫖輒事刋通典作更改遂違明詔但成王幼年周公踐極通典作攝政制禮作樂功比王者所以禹湯文武成王周公為六君子又說明王孝道乃述周公嚴配此即周公㑹要作姬旦鴻業合同王者祀之仲尼生衰周之末拯文喪之弊祖述堯舜憲章文武𢎞聖教於六經闡儒風於千代通典作載故孟軻稱生靈以來一人而已自漢以來㑹要作降奕葉封通典作繼侯崇奉其聖迄於今日胡可降兹上哲貶乎通典㑹要作俯入先師且又丘明之徒見行其學貶為從祀亦無故事今請改令從詔於義為允其周公仍依别禮配享武王謹議此篇自祭唐堯至凖貞觀共八十九字英華元脫去今以舊唐志㑹要添入昊天上帝及五帝異同議議曰依舊唐志作據祠令及新禮並用鄭𤣥六天之議通典㑹要作義圜丘祀昊天上帝南郊祭通典作祠太微感帝明堂祭太微五天帝臣等謹按鄭𤣥此義唯據緯書所說六天皆謂通典作為星象而昊天上帝不屬穹蒼故注月令及周官皆謂圜丘所祭昊天上帝為北辰星曜魄寶又說孝經郊祀后稷以配天及眀堂嚴父以配天皆為太微五帝考其所說乖諸本作舛謬特深按周易云日月麗乎唐志作於㑹要作于天百榖草木麗乎同丄地又云在天成象在地成形足明辰象非天草木非地毛詩傳云元氣廣諸本作昊大則稱昊天據逺視之蒼然六字諸本作逺視蒼蒼則稱蒼天此則天以蒼昊為體不入星辰之例且天地各一是曰兩儀天尚無二焉得有六是以王肅羣儒咸駮此義又檢太史圜丘圖昊天上帝座外别有北辰座與鄭義不同得太史令李淳風等狀稱昊天上帝圖位自在壇上北辰自在第三通典㑹要作二等與北斗並列通典作别為星官內座之首不同鄭𤣥據緯書之唐志通典作所說此乃羲和所掌觀象制圖推步有徴通典作恆相沿唐志通典作緣不謬又按史記天官書等太微宫有五帝者自是五精之神五星所奉以其是人主之象故况之曰帝亦如房心為天王之例文粹作象豈是天乎周禮云兆五帝於四郊又云祀五帝則掌百官之誓戒唯稱五帝皆不言天此自太微之神本非昊天諸本作穹昊之祭又孝經惟云郊祀后稷無别通典作别無圜丘之文王肅等皆以為郊即圜丘圜丘即郊猶王城京師異名同實符合經典其義甚明而今從鄭說分為兩祭圜丘之外别有南郊違棄正經理深未允且校吏部式惟有南郊陪位更不别載圜丘式文既遵王肅祠令仍行鄭義令式相乖理宜改革又孝經云嚴父莫大於配天下文即云周公宗祀文王於明堂以配上帝則是明堂所祠正在配天而以為但祭星官反違明義又按月令孟春之月祈榖於上帝左傳亦云凡祀啓蟄而郊郊而後耕故郊祀后稷以祈農事然則啓蟄郊天自以祈榖謂為感帝之祭事甚不經今請憲章姬孔取王去唐志作考取王鄭四郊迎氣存太微五帝之祀南郊明堂廢緯書六天之義其方丘祭地之外别有神州謂之北郊分地為二既無典據理又不通亦請合為㑹要作於一祀以符古義仍並請循唐志作條附式令永垂後則謹議論配坐議文粹作唐太宗皇帝配天議前人顯慶元年議曰臣等謹尋方册歷考前規宗祀明堂必配上帝而伏犧五代本配五郊所入明堂自緣從祀今以太宗作配理有未安伏見永徽二年七月詔建明堂伏惟陛下天縱孝舊唐志作聖德追奉太宗以唐志文粹作已遵嚴配當時高祖先在明堂禮司致惑竟未遷祀率意定儀遂便著令乃以太宗文皇帝降配五人帝雖復亦在明堂不得對越天帝深乖明詔之意又與先典不同謹按孝經曰二本作云孝莫大於嚴父嚴父莫大於配天昔者周公宗祀文王於明堂以配上帝伏尋詔意義在於斯今所司行令殊為失㫖又尋漢魏晉宋歷代禮儀並無父子同配明堂之儀二本作義惟祭法云周人禘嚳而郊稷祖文王而宗武王鄭𤣥注曰禘郊祖宗謂祭祀以配食也禘謂祭昊天於圜丘郊謂祭上帝於南郊祖宗謂祭五帝五神於明堂也尋鄭𤣥二本作比注乃以祖宗合為一祭又以文武共在明堂連袵配祠唐志作祀良為謬矣故王肅駮曰古者祖有功而宗有德祖宗自是不毁之名非謂配食於明堂者也審如鄭義則孝經當言祖祀文王於明堂不得言宗祀也凡宗者尊也周人既祖其廟又尊其祀孰謂祖於明堂者乎鄭引孝經以解祭法而不曉周公本意殊非仲尼之義㫖也又解宗祀武王云配勾芒之類是謂五神位在堂下武王降位失君叙矣又按六韜云武王伐紂雪深丈餘五車二馬行無轍跡詣營求謁武王怪而問焉太公對曰此必五方之神來受事耳遂以其名召入各以其職令唐志作命焉既而克殷風調雨順豈有生來受職殁則配之降尊敵卑理不然矣故春秋外傳曰禘郊祖宗報五者國之祀典也傳言五者故知各是一事非謂祖宗合祀於明堂也臣謹上考殷周下洎貞觀並無一代兩帝同配於明堂唯南齊蕭氏以武明昆季並於明堂配食事乃不經不二本作未足援據又檢武德時令以元皇帝配於明堂兼配感生帝至貞觀初緣情革禮奉祀高祖配於明堂奉遷代祖專配感帝此則聖朝故事已有遞遷之典取法宗文粹作崇廟古之制焉伏惟太祖景皇帝締構唐志作搆室有周建絶代之丕業啓祚汾晉創歷聖之洪基文粹作歷聖之洪緒德邁發生道符立極又代祖元皇帝潜鱗韞慶屈道事周導濬發之靈源肇光宅之垂裕稱祖清廟萬代不遷請停配祀以符古義伏惟高祖太武皇帝躬受天命奄有神州創改制物文粹作創改舊物體元居正為國始祖抑有舊章昔者文粹作有炎漢高帝當塗太祖皆以受命例並配天請遵故實奉祀高祖於圜丘以配昊天上帝伏惟太宗文皇帝道格上𤣥功清下瀆拯率土之塗炭布大造於生靈唐書作協天造於上靈請准詔書宗祀於明堂以配上帝又請依武德故事並二本作兼配感帝作主斯乃二祖德隆文粹作業永不遷廟兩聖功大各得配天逺協孝經近申詔意臣等叨濫職定彛章敢執禮經昧死陳情疑作請謹議功臣配饗議顔師古貞觀十六年議曰竊以肅恭禋祀經邦彛訓追逺念功歷代鴻典故當立文定制適事從宜垂裕後昆永貽憲則聖皇馭㝢𤣥化醇深錯綜遺文苞括舊藝於穆清廟備孝享於吉蠲股肱良哉豫銘常之配侑爰發明詔俾命率由秩宗致請博謀僚列淺聞寡見無足觀採但禮經殘缺年載遐深傳習各殊執見靡一爾雅說祀禘為大祭公羊義大事謂祫何休所釋又異鄭𤣥然皆一配之文曽無重祀之證是非衆論雖曰踳駮隆殺二端厥趣可覩謹按祫者合食禘乃諦祭禘小於祫理則非疑商書稱從與其大享周禮著祭於大蒸是知小祀不及功臣其事又無可惑魏晉以降莫不通行中間雖經差失梁朝又以矯正有齊立號朝宗河朔周氏命厯卜食咸陽修定禮義皆有慿據同遵此典未嘗釐革今欲更改實謂非宜六經莫見斯文三雍不顯㑹要作揚其跡悠悠之論蔑足云也且夫無豐于昵昔賢著誡黷則不敬祀典明文徒見異端假從臆說煩而非當於義無取又尋古之配祭皆在於冬據其時月益明非禘况乎臣之立功各因所奉享祀之日從主升配禘之為祭自於本室廟未毁者不至太祖之庭君既不來而臣獨當祀列對揚尊極乃非所事豈容山河之誓務乎殷重霜露之感從於簡略論情即理孰曰可安今請祫配功臣禘則不豫㑹要作及依經合義進退為允謹議禘祫議上元三年史𤣥璨議曰按禮三年一祫五年一禘公羊傳云五年而再殷祭兩文雖互其義略同禮記正義引通典㑹要作列鄭𤣥禘祫志云春秋僖公三十三年十二月薨文公二年八月丁卯大事諸本作享下同于太廟公羊傳云大事者何大祫也是三月喪畢新君二年當祫明年春唐志作當禘于羣廟僖公二字唐志作又宣公八年禘僖公也宣公八年皆有禘則後禘去前禘五年以此定之則新君二年祫三年禘自爾以後五年而載諸本作再殷祭則六年當祫八年當禘又昭公十年齊歸薨至十三年喪畢當祫為平丘之㑹冬公如晉通典㑹要作齊至十四年祫十五年禘傳云有事于武宫是也至十八年祫二十年禘二十三年祫二十五年禘昭公二十五年有事于襄公是也如上所云則禘已後隔三年祫祫已後隔二年禘此則有合禮經不違傳義謹議加籩豆增服紀議崔沔開元二十三年議曰伏凖今月十八日恩赦節文宗廟致享務在豐潔禮經沿革必本人情籩豆之薦或未能備物服制之紀或有所未通者謹按太常奏狀陸海所産鮮美之味隨所有者皆充祭用今既須豐理應加數宗廟之奠每座籩豆各加十二者臣竊聞識禮樂之情者能作知禮樂之文者能述述作之義聖賢所重禮樂之本文粹作制古今所崇變而通之所以久也所謂變者變其文也所謂通者通其情也祭祀通典作禮之興肇於太古人所飲食必先嚴獻未有火化茹毛飲血則有毛血之薦未有麴蘖汙樽杯飲則有𤣥酒之奠施及後王禮物漸備作為酒醴伏㑹要作用其犧牲以致馨香以極豐潔故有三牲八簋之盛五齊九獻之殷然以神道至文粹作尚𤣥可存而不能文粹㑹要作可測也祭禮至文粹作上敬可備而不敢通典作可廢也是以毛血腥爓文粹作血腥爓熟𤣥樽犧象靡不畢登於明薦矣然而薦貴於新味不尚䙝雖則備物猶存節制故禮云凡天之所生地之所長苟可薦者莫不咸在備物之情也又曰三牲之爼八簋之實美物備矣昆蟲之異草木之實隂陽之物備矣此節制之文也鉶爼籩豆簠簋樽罍之實皆周人之時饌也其用通於燕饗賔客而周公制禮咸文粹有異字與毛血𤣥酒同薦於先晉中郎盧諶近古之知禮者也著家祭禮觀其所薦皆晉時常食不復純文粹作盡用禮之舊文然則當時飲食不可闕於祀文粹作祠祭明矣是變禮文而通其情也我國家由禮立訓因時制範考圖史於前典稽周漢之舊儀清廟舊時享祀四字諸本作時享禮饌畢陳用周之制也而古式存焉園寢上食時膳具設遵漢法也而珍味極焉職貢來一作助祭致逺物也有新必薦順時令也苑囿之內躬稼所取搜狩之時親發所中莫不割鮮擇美薦而後食盡誠敬也若此至矣復何加焉但當申勑有司祭如神在無或簡怠增朂文粹作朂增䖍誠其進貢珍羞或時物㑹要作及時鮮美考諸祀通典文粹作祠典有所漏略皆詳擇名目編諸甲令因宜而薦以類相從則新鮮肥濃盡在是矣不必加於籩豆之數也至於祭器隨物所宜故太羮古食也盛於㽅㽅古器也和羮時饌也盛於鉶鉶時器也亦有古饌而盛於時器故毛血盛於盤𤣥酒盛於樽未有薦時饌而追用古器者由古質而今文便於事也雖加籩豆十二味足以盡天下美物而措諸清廟有兼倍之名近於侈矣昔魯人丹桓宫之楹又刻其桷春秋書以非禮禦孫諫曰儉德之恭也侈惡之大也先君有恭德而君納諸惡無乃不可乎是不以越禮而享宗廟四字文粹作而崇侈於宗廟也又據漢書藝文志墨家之流出於清廟是以貴儉由此觀之清廟之不尚於奢舊矣太常所請恐未可行又按太常奏狀今酌獻酒爵制度全小僅未通典作無一合執持甚難不可全依古制猶望稍須廣大者文粹作臣竊據禮文有以小為貴者獻以爵貴其小也不可反制諸本作小不及制敬而非禮是有司之失其傳也固可隨失釐正無待其諸本並無其字議而後革然禮失於敬猶奢而寧儉非大過也未知今制何所依凖請兼詳令式據文而行又按太常奏狀外祖父母服請加至大功九月姨舅加至小功五月堂姨舅舅母服諸加至袒免竊聞大道既隱天下為家聖人因之然後制禮禮教之設本於舊唐志作為正家家道正而天下定矣正家之道不可以二唐志作二總一之唐志作定義理歸本宗父以尊崇母以厭降豈忘愛敬宜存倫序是以內有齊斬外皆緦麻尊名所加不過一等此先王不易之道也前聖所志後賢所傳其來久矣昔辛有適伊川見被髮而祭於野者曰不及百年此其戎乎其禮先亡矣往修新唐志㑹要作貞觀修禮時改舊儀唐志㑹要作章漸廣渭陽之恩不遵㑹要作尊洙泗之典及𢎞道之後唐元㑹要作隆乃明皇諱之間國命再移於外族矣禮云徵兆儻或斯見㑹要作因斯見矣天人之際可不誡哉開元初補闕盧履氷嘗進狀論喪服輕重勑令僉議于時羣㑹要作衆議紛拏各安所唐志㑹要作積習太常禮部奏依舊定皇帝唐志㑹要作陛下運稽古之思發獨斷之明至開元八年特降别勑一依古禮事復典故唐志作故實人知方向式固宗盟社稷之福更圖異議竊所未詳願守八年明㫖以為萬代成法謹議同前楊仲昌議曰伏奉去月二十七日勑太常卿韋縚奏稱正月十八日恩赦節文籩豆之薦或未能備物服制之紀或有所未通宜令禮官學士詳具奏令諸馨香之物井㫖新鮮肥濃之味陸海所産皆充祭用每座籩豆各加十二酒爵制度亦令廣大者褊學固陋嘗聞於師猥參廷議之末思答守官之用謹按禮曰夫祭不欲煩煩則黷文粹有祭字亦不欲簡簡則怠又鄭𤣥云人生尚䙝食鬼神則不然神農時雖有黍稷猶未有酒醴及後聖作為醴酪猶存𤣥酒示不忘古春秋曰蘋蘩蕰藻之菜潢汙行潦之水可羞於王公可薦於鬼神又曰大羮不致唐志作和粢食不鑿此明君人者有國奉先敬神嚴享豈肥濃以為尚唐志文粹作上將儉約以表誠則陸海之物鮮肥之類既乖禮云文粹作文之情而變作者之法皆充祭用非所詳也㑹要作宜易曰樽酒簋二用缶納約自牖此明祭存㑹要作尚簡易不在繁奢所以一樽之酒二簋之奠為明祀也抑又聞之夫義以出禮禮以體政違則有紊是稱不經薦肥濃則䙝味有登加籩爵則事非師古與其别行新制寧如謹守舊章又漢家園陵八節上食自兹以降代行其典國初貞觀之後禮法刋定今陵寢見有八節之奠兼朔望常食聖心追逺每物加薦不敢黷於宗廟請施㑹要有行字之於園陵愚忝主司顧非知禮布之執事惟裁擇焉又外祖父母請加至大功九月姨舅齊類加至小功五月堂姨舅舅母並請加至袒免者謹按㑹要作臣聞儀禮曰外親皆緦又曰外祖父母以尊加從母以名加並為小功五月其為舅緦鄭文貞公魏徴已議同從母例加至小功五月訖今之所加豈異前㫖雖文貞賢也而周孔聖也以賢改聖後學何從堂舅堂姨舅母並升為袒免則何以祖述禮經乎如以外祖父母加至大功則豈無加報於外孫乎如以外孫為報服大功則本宗庶孫何同等而相陵乎儻必如是深所不便竊恐內外乖序親踈奪倫情之所沿何所不至理必然也昔子路有姊之喪而不除孔子問之子路對曰吾寡兄弟而不忍也子曰先王制禮行道之人皆不忍也子路聞而遂除之此則聖人因言以立訓援事而抑情是明例也禮不云乎無輕議禮明其蟠於天地並彼日月賢者由之安敢小有損益也况乎喪服之紀先王大猷奉以周旋以匡人道一詞偶措千載是遵涉於異端豈曰𢎞教伏望各依正禮以厚儒風太常所請增加愚見以為不可謹議右二篇舊唐志㑹要通典以服紀不當入祭祀遂並分兩處唯英華總為一議蓋元詔併指二事當仍英華之舊景皇帝配昊天上帝議獨孤及永泰二年謹按禮經王者禘其祖之所自出而以祖配之凡受命始封之君皆為太祖繼太祖唐志㑹要有已字下六廟則以親盡迭毁而太祖之廟雖百代不遷此五帝三王所以尊祖敬宗也故受命於神宗禹也而夏后氏祖顓頊而郊鯀纘禹黜夏湯也而殷人郊𡨕而祖契革命作周武王也而周人郊稷而祖文王則自古必以首封之君配昊天上帝唯漢氏崛起豐沛豐公太公皆無位無功德不可以為祖宗故漢以高皇帝為太祖其先世微故也非足為後代法伏惟太祖景皇帝以柱國之任翼周弼魏肇啓文粹作成王業建封于唐高祖因之遂以為有天下之號天所命也亦猶契之封商后稷之封邰郊禘祖宗之位宜在百代不遷之典郊祀太祖宗祀高祖猶周之祖文王而宗武王也今若以高祖創業當躋其祀是棄三代之令典尊文粹㑹要作遵漢氏文粹作代之末制黜景皇帝之大業同於豐公太公之不祀反古違道斯文粹作失孰甚焉舊唐志作孰莫大焉㑹要作孰將甚焉夫追尊景皇帝廟號太祖高祖太宗所以崇尊㑹要作尊崇之禮也若配天之位既易唐志作異則太祖之號宜廢祀之不修廟亦當毁尊祖報本之道其墜於唐志作于地乎漢制擅議宗廟以大不敬論今武德貞觀之憲章未改國家方將敬祀事以和神人禘郊之間恐非所宜言文粹作臣謹稽禮之舊文參諸夏殷周漢故事配食天帝之制自謹稽至此二十字唐志作謹稽禮文參諸往制請仍舊禮文粹作典謹議禘祫議韓愈貞元十八年右今月十六日勑㫖宜令百寮議限五日內聞奏者將仕郎守國子監四門博士臣韓愈謹獻議曰伏以陛下追孝祖宗肅恭集作敬祀事凡有疑三字集作凡在擬議不敢自專聿求厥中延訪羣下然而禮文繁漫所執各殊自建中之初迄至今嵗屢經禘祫未合適從臣生遭聖明涵泳恩澤雖賤不及議而志切集作在效忠今輒先舉衆議之非然後申明其說一曰獻懿廟之主集作之祖宜永藏之夾室臣以為不可夫祫者合也毁廟之主皆當合食於太祖獻懿二祖即毁廟主也今雖藏於夾室至禘祫之時豈得不食於太廟乎名曰合祭而二祖不得登集作祭焉不可謂之合矣二曰獻懿廟主宜毁之宜瘞之六字集作宜毁而瘞之臣又以為不可謹按禮記云集無云字天子立七廟一壇一墠其毁廟之主皆藏於祧廟雖百代不毁祫則陳於太廟而饗焉自魏晉以降始有毁瘞之議事非經據竟不可施行今國家德厚流光創立九廟以周制推之獻懿二祖猶在壇墠之位况於毁瘞而不禘祫乎三曰獻懿廟主宜各遷於其陵所臣又以為不可二祖之祭於京師列於太廟也二百年矣今一朝遷之豈惟文粹有使字人聽疑惑抑恐二祖之靈眷顧依遲集作違不即饗於下國也四曰獻懿廟主宜附於興聖廟而不禘祫臣又以為不可傳曰祭如在景皇帝雖為太祖於其屬乃獻懿之子孫也今欲正其子東嚮之位廢其父之杭本作子大祭固不可為典矣五曰獻懿二祖宜别立廟於京師臣又以為不可夫禮有所降情有所殺是故去廟為祧去祧為壇去壇為墠去墠為鬼漸而逺之集作之逺其祭益稀昔者魯立煬宫春秋非之以為不常取已毁之廟既藏之主而復築宫以祭之今所議與此正同又雖違禮立廟至於禘祫也合食則禘無所主集作其所廢祭則於義集作禮注作經不通此五說者皆所不可故臣博采前聞求其折中以為殷祖𤣥王周祖后稷太祖之上皆自為帝又其代數已逺不復祭之故太祖得正東嚮之位子孫從昭穆之列禮所稱者蓋以集作自紀一時之宜非傳於後代之法也傳曰子雖齊聖不先父食蓋言子為父屈也景皇帝雖太祖也其於獻懿則子孫也當禘祫之時獻祖宜居東嚮之位景皇帝宜從昭穆之列祖以孫尊孫以祖屈求之神道豈逺人情又常祭甚衆集作頻禘祫集作合祭甚寡則是太祖所屈之祭至少所伸之祭至多比於伸孫之尊廢祖之祭不亦順乎事異殷周禮從而變非所失禮也臣伏以制禮作樂者天子之職也陛下以臣議為有可采粗合天心斷而行之是則為禮如以為猶或可疑乞召臣對靣陳得失庶有發明謹議敬鬼神議李溪古人言敬鬼神之禮有禱祠祭祀皆所以立不刋之典而教人孝悌非謂能為禍福而求益則何以言祈福歟若然者則必知鬼神之所在矣不然則何以知其益耶且書稱帝堯命重黎絶地天通無有降格以言天神不降于地地人不奸于天注云謬矣各有其所自然不擾也左氏傳稱大禹鑄鼎象物使人知神姦莫能逄魑魅魍魎此亦言捍禦僻邪也今據史記列堯先禹後年代甚明若既使重黎能絶地天通則人神已不降格矣夏禹何所加益而鑄鼎耶若禹非妄作實欲知神姦則是重黎不能絶天地之通矣研斯二說將為妄則列之經史以為實則甚相悖今不知鬼神尚在域中耶為前聖所遏絶而不通也有無之間果未可詳辨以為果有耶則宣尼固當語神而不拒子路問事也以為果無耶則丕山蹊隧之逄不列於史策既千里著論亦無復也自此已往或謂之有或謂之無竟無定止有無尚未知而君子敬之豈足求益耶然道固若是矣道斯在豈必徼福而後為哉若徼福而後為則是內懷詐僞曲諂之心非不愧乎屋漏也今江東委巷之禮祠夏禹蜀人則祠先主與武侯祈祝徼福昧亦甚矣且夏之後桀奔南巢蜀之後主面縛於成都苟有神禹先主武侯之靈何不救也豈有未能救其骨肉子孫而愛他人乎推而考之則鬼神未必能專為利害也設令能害盈福謙饗于克誠亦惟德所動吉凶由人而已豈變化所為哉易曰小人不見利不勸不威不懲若以鬼神未能福人而無敬是不見利不勸也未能禍人而無懼是不威不懲也可以君子而同於小人乎是故敬而無失匪有他也禁淫祀勵疏怠匪求益也苟有前聖之典籍在則禱祠祈福亦設教論道而已故君子敬順而勿疑文苑英華卷七百六十四
