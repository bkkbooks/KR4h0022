body:
  text: 文苑英華卷四百六十九宋李昉等編蕃書二吐蕃書勑吐蕃贊普書七首張九齡皇帝問贊普緣國家先代公主既是舅甥以今日公主即為子壻如此重姻何待結約遇事足以相信隨情足以相親不知彼心復同以否近得四鎮節度使表云彼使人與突騎施交通但蘇祿小蕃負恩逆命贊普既是親好即合同嫉頑凶何為却與惡人密相往來又將器物交通賂遺邊鎮守捉防遇是常彼使潜行一皆警集作驚覺夜中格拒人或死傷比及審知亦不揔損所送金銀諸物及偷盜人等並分付悉諾勃藏却將還彼既於贊普親厚豈復以此猜疑自欲坦懷略無所隱縱通異域何慮異一作易心又西南諸蠻元是異類或叛或附恍惚無恆往年被略彼蕃率種歸我緣李知古處置失所又即翻然改圖彼此之間有何定分而彼有來者乃云此先舉兵以蠻為詞未知孰是今既無外當以此思之緣彼州鐡柱前書具報一言不信朕豈厚誣更以相仍便非義也鐡柱書唐九徴所作百姓咸知何不審之徒勞往復至於邊將在逺下人邀切變好為惡誠亦有此非獨相規亦當自誡如此覺察更有何憂萬事之間一無限隔所以細故無不盡言想所知之體至懷也晚春暄極集作極暄贊普及平章事首領并百姓以下並平安好今有少信物别具委曲遣書指不多及二皇帝問吐蕃贊普近竇元禮往事具前書贊普後來亦知彼意朕推心天下皆合太和况於彼蕃復是親婭仍加結約盟誓再三以至道言之此亦仁義不薄也而贊普且猶未信是復何心君長大蕃固不容易所云去年七月雋州將兵抄掠兼有詃誘雋州之外尚隔諸蠻既背吐蕃自行寇抄掠而乃推托於我何為遙信虛詞且西南群蠻别是一物既不定於我亦不專於吐蕃去即不追來亦不拒乃是兩界所有只合任其所歸自十數集作數十年來或叛或附皆所親見豈假縷言往者此蠻背恩侵我邊鄙昆明即雋州之故縣鹽井乃昆明之本城今復舊疆何廢修築而云除却是何道理自邊境備守彼此常事今既和好何有嫌疑至如西自葱嶺已來緣邊諸處或地勢是要或水土是好彼有城鎮亦皆內侵朕豈不解廣求更以自益緣已和好不可細論且八疊山築城置鎮皆如漢界何曽以此為言而彼即生詞未知何意邊城委任當擇忠良無信小人令得間構也夏中已熱贊普及平章事部落百姓等並平安好遣書指不多及三皇帝問贊普自與彼蕃連姻亦已數代又與贊普結約于今五年人使往來集作還未嘗有間朕與集作以兩國通好百姓獲安子孫以集作已來坐受其福疆埸之事行集作幸且無憂此雖境上有兵固是存而不用况集作在彼邊事與此何殊近得來章又論蠻中地界所有本末前書具言贊普不體朕懷乃更傍引逺事若論蠻不屬漢豈復定屬吐蕃邪彼不得所即叛來此不得所即背去如此常事何乃固執復於國家何有朕豈利之至如彼州集作忠鐡柱州圖地記是唐九徴所記之地誠有故事朕豈妄言所修城壁亦依故地若不復舊何謂集作豈為通和蠻中抄掠彼人勘問亦有此事緣其初附法令未行亦有姚雋邊人姦險求利或入蠻同盜亦不可知既與贊普重親朕又君臨大國正欲混同六合豈復侵取一隅再三已論何乃不信顧慙薄德良用咨嗟且如小勃律國歸朝即是國家百姓前遭彼侵伐乃是違約之萌朕以結信既深不顧其小中間遣使曾不形言贊普何獨相尤而不思已惡集作西之事所存既大當共成之近聞莽布支西行復有何故若與突騎施相合謀我磧西未必有成何須同惡若爾者欲先為惡乃以南蠻為詞今料此情亦已有備近令勒兵數萬繼赴安西儻有所傷慎勿為怪也朕心無所負事欲論平但國家之所守者信鬼神之所助者順未有背道求福違約能昌何况兵衆不可當而又天道所不假以此求濟不亦難乎逺道所傳多應不實亦言集作計贊普不合異圖故令人審度集無度字看定何緣也待潘息回日更具委曲今附少物具如别數為路逺不得多附春首尚寒贊普及公主比如宜也平章事及首領已下並平安好今使內常侍竇元禮遣書指不多及四皇帝問贊普得七月一日信所言隂承本奏請不擬與彼和將兵馬大入者至如和與不和事皆由朕自斷何人輒敢奏聞何兵即敢擅入且舅甥二字集作所結親好不是近年文成公主已來亦重疊矣中間或絶或繼終是舊好存焉唯道此有讒臣不知彼專構造亦須自覺豈可推過至如兵馬邊備彼與此同既見彼處加兵豈令此㧾無備矣疑自彼起不可相尤近日築城不出疆界邊頭有要隨事修營何所致疑以此為語如彼頻嵗亦築數城若不惡心何故嚴備固是邊境常事不足為言忽此相尤深所未逹彼蕃必其自守此兵終不妄行所先立盟約更知何用鬼神知意不復多言秋氣已冷贊普及平章事已下並平安好遣書指不多及五皇帝問贊普此使前至之日具知彼意竇元禮集作中禮中間所云亦已備論且親以舅甥之國繼集作申以姻婭之好義非不重心豈合疑頃嵗已來加之盟約此又不信其如之何至如境上蠻夷元是衆物來不可拒去不可追前書已言想所知也而每來信使皆以為辭或云赴界築城或稱將兵抄掠且蠻既背彼伊自築城城在蠻中人即隨地所有侵竊亦是群蠻皆在遐荒豈關處分而歸過於我無乃甚乎邊境小人不識大體此既未免彼亦有之間構既行猜嫌互起朕近已知此贊普亦須察之勿取浮言虧我大信以絶兩國之好甚善甚善所有諸事皆具前書公主所請與人宫及內人品第即當續有處分春晚漸熱贊普及平章事首領百姓並平安好今有少物别具委曲至宜領取遣書指不多及六皇帝問吐蕃贊普朕與彼國既是舊親近年已來又加盟約如此結固仍有猜嫌明知異域之心亦難可保此者所有信使唯知怨此相違自料國家何負於彼至如突騎施蕞爾醜虜頃年恃我為援幸至今日而敢辜恩朕未即誅之待其惡積贊普越界與其婚姻前者以意向道即去尋已告絶朕亦委信以為必然今乃定婚如初黨惡可見又莽布支西出朕具知之今竇元禮往彼問以何故又道别緣他事為此追還其人實將兵向西擬行攻取前後詐妄言與事違驗在目前得不歎恨夫人之所以為貴者以其有信有禮國之所以能强者亦云唯信與義若言不可信義不可親雖在匹夫尚多耻愧何况君長能無情乎彼突騎施人靣獸心偏僻荒逺見利則背與親實難贊普背朕夙恩共彼國集作相厚應非長策可熟思之又比來觀彼事意有殊往日唯任計數以此為能今與突騎施和親密相結託隂有贊助而傍作好人如此潜謀亦非逺計所欲為患不過邊庭且邊鄙一作庭之於中國如毫毛之在身耳以彼戎狄侵我毫毛雖實無多何須有損朕所以殷勤和好欲靜邊人君國之心不能忘也亦與贊普纍代舊親幸無大故不宜輕絶今邊鎮兵馬不可不防彼亦有之與此無别既不先舉自足知心從一作承前所言豈有虛也秋晚稍冷贊普及平章事首領百姓並平安好遣書指不多及七皇帝問吐蕃贊普此亦覺彼事勢有異略加防備仍未益兵今得安西表來莽布支率衆已到今見侵軼軍鎮并踐暴屯苖先知彼有異謀猶自未將至此者且莽布支西出朕先知之前令問其行由得報自緣别事今乃為賊負心如何安西諸軍去此萬里倉卒遇敵何暇奏裁既被交侵必應拒鬭儻有傷損可無相尤軍城鎮守之人不可束手受死事由彼起深所咨嗟且纍代舊親復新有盟約彼既欺負天地違犯鬼神如此用心更知何道一往邊頭所備只緣慮有非常今果如言防乃不錯突騎施異方禽獸不可以人道論之贊普與其越境相親只慮野心難得但試相結久後如何於朕已然義則合絶但為誓約在近親好又深彼雖背恩我豈尤效集作我尤效先令奔問欲盡舊情必定為惡别為之所一昨遣內常侍劉思賢送公主分物并每年國信物見已臨路適㑹表來思賢此行量其在道遲緩今故令劉思賢判官劉明子先行具宣往意秋冷贊普公主及平章事首領百姓等並平安好遣書指不多及敕吐蕃將相書陸贄敕尚覽鑠論莫陵悉繼集作維等至省所陳奏朕具悉之國家與大蕃親則舅甥義則鄰援息人繼好固是恆規朕嗣位君臨思安兆庶常以信讓為事不以爭競為心區域雖殊覆育寧别贊普天資仁德惡殺好生與朕同心重修舊集作和好㑹蕃漢將相告天地神祗約誓事之言至嚴至重大信一立義無改移所請奉天盟書勒於清水碑石審詳事理頗甚乖違往嵗賊臣稱兵竊據城集作宫闕尚結贊志惟嫉惡義在集作切救災頻獻表章請收京邑朕以宗廟社稷悉在上都但平寇戎豈惜酬賞集作奬遂集作嘗許四鎮之地以答收京之功旋屬炎蒸又多疾疫大蕃兵馬便自抽歸既未至集作到京有乖始望奉天盟約豈合更諭朕欲茍狥彼情便令鐫刻則是事非務實信不由𠂻欺天罔神莫大於此凡曰通好貴於推誠將垂百代之名豈顧一時之利但以事之去就須定是非若不辨明便成姑息親鄰之義豈所宜然故遣使臣與卿詳議卿是大蕃輔佐必當集作應智識通明事理昭然不足疑惑儻有他見宜具奏聞審細研窮須歸至當所論先許每年與贊普絹綵一萬匹假者本來立約亦為收京然於舅甥之情此乃甚為小事二國和好即同一家此有所須彼當不吝彼有所要此固合供以有均集作易無蓋是常理贊普若須繒帛朕即隨要支分多少之間豈拘定限假使踰於萬匹亦當集作冀稱彼所求朕之所重者信誠所輕者財利思與率土同臻太和想卿深體至公務存集作全大義安人保境垂美無窮勉思令圖集作猷以副朕意今遣倉部郎中兼侍御史趙聿與來使同往書中意有不盡並令趙聿口宣尚結贊論莽羅等嘗㧾師徒逺來赴難功雖未就義則可嘉其所領將士等朕先許其賜物一萬匹假並已排比訖待卿所商量指定此使却回即發遣往今各賜卿少物至宜領之敕吐蕃宰相尚結贊書敕尚結贊卿天資才術一作傑作輔大蕃識通古今志奉忠信義聲積著逺近集作邇流傳比聞入典樞衡近知還揔戎務二國所定和好首末是卿商量得卿却來深以為慰昨者邊軍狀奏云彼國兵馬踰越封疆朕以畫界立盟先有定分贊普素熟仁義卿又特禀純誠背約侵漁必無此理但敕邊城自備不令輒動干戈若使效尤恐成交惡初疑界首遊奕少有乖宜不謂大發師徒集作兵車漸加侵軼興兵動衆必合有名蕃軍此行未測其故朕自嗣膺寶位即與贊普通和敦以舅甥結其集作為鄰援懲戰爭之弊𢎞禮讓之風彼此大同務安衆庶乃於境上建立壇場契約至明誓詞至重告於皇天后土諸佛百神有渝此盟殃及其國朕敬奉誠約分毫不移集作欺信使交歡嵗時無絶碑文具在可集作足以明徴豈有一事不行一言不守頃令趙聿專往近從彼方集作近方從彼却回兼聞彼蕃使同來至今猶在道路卿所論奏朕並未知待審集作詳事由乃集作然可商議既稱和好理絶相疑未合輕舉甲兵便踰境界盟誓之語忽焉若遺天地明神豈其可罔卿智識明逺朕所深知頃年猶舉義師救此災患今豈不存大信遂棄令名故專遣集作遣專使見卿欲審知來意竚聞還奏以副所懷趙聿及蕃使等計朝夕合集作即到待覽表中意旨集作事意續即商量報卿卿涉遠而來當甚勞頓今賜卿其物至宜領之秋冷卿比平安好將士等並存問之敕尚結贊第三書敕尚結贊蕃使論拱熱等與趙聿同到卿所陳奏朕具悉之誠意勤勤志敦和好上以陳集作敦舅甥之義次以表結集作結鄰援之歡外以彰禮讓之風內以息戰爭之患兼此數美昔賢所難集有非字卿才越等倫識通今古故集作豈能匡輔大國𢎞宣逺圖集作猷施美利於當時傳盛名於不朽眷懷明略歡尚良多然以贊普來書務於叶睦卿之所奏亦貴通和初覽其言實嘉德義及觀其事頗訝乖違以卿賢明朕素信重棄義踰約計必不然未測事由因何至此頃年所定和好言約頗謂分明至如四鎮北庭元不割與蕃國及朱泚悖逆作亂上都卿仗義興師請收京邑遂許四鎮北庭之地將以答報成集作其功旋屬炎蒸蕃軍便退秦晋之約豈可更論事甚分明固無疑惑凡言結好所貴和同通體商量有何不可大蕃若必要四鎮北庭之地即合直以情言彼但說其誠心此亦自有分義豈可集作暇曲徴前事廣起集作說異端仍發師徒集作兵師務張威勢蕃使猶未至此蕃軍早已越疆或稱欲自赴朝或言更定言誓既虧盟約且失禮義言與事違將何取信夫人君集作君人立國必不徒一作偶然惟漢與蕃各受天命勝負固有定分強弱寧由力爭卿欲以衆相侵以威相脅謂天地可罔謂盟誓可渝即當肆意所為何必更論好和儻若守其前約敦以親鄰去就之間固宜有禮遣使來往足得商量張皇師徒集作兵師是何道理和好者禮義之事甲兵者爭奪之由二端懸殊理不竝用今欲以甲兵之勢定和好之辭事必不成縱成集作亦成何益卿識見通敏器宇沉詳如此事宜不言可悉未知來意竟擬集作欲何如且首末論和是卿商議清水㑹盟之日卿又親發誓詞將期去殺好生修文偃武永安兆庶垂法子孫天下稱嗟以為盛美未經數嵗遽有變移非獨見誚於四方亦將集作當取笑於千古以此思度甚欲通和彼雖小似侵漁集作陵朕亦未即交惡故遣某官某乙與卿更審籌量卿若必務和同更無他意即宜便歸本界遣使其述本集作事情所須四鎮北庭朕當自有推讓如或託稱繼好志在别圖集作謀依前縱兵不即歸國唯利是視亦聽彼懷和與不和於茲决定書中事有不盡並令某乙口宣宜令速回竚望來奏所獻方物深表遠誠今賜卿某物至宜領也秋冷比平安好與吐蕃宰相鉢闡布書白居易敕吐蕃宰相沙門鉢闡布論與勃藏至省表及進奉具悉卿器識通明操集作藻行精潔以為真實合性忠信立誠故能輔贊大蕃叶和上國𢎞清净之教思安邊陲廣慈悲一作愍之心令息兵甲既表卿之遠略亦得國之良圖况朕與彼蕃代為甥舅兩推誠信共保始終覽卿奏章逺叶朕意披閲嘉嘆至于再三所議割還安樂奏原等三州事宜已具前書非不周細及省來表似未指明將期事無後艱必在言有先定今信使往來無壅疆埸彼此不侵雖未申以㑹盟亦足稱為和好必欲復修信誓即須重畫封疆雖兩國盟約之言積年未定但三州交割之後尅日可期朕之𠂻情卿之志願俱在於此豈不勉歟又緣自議三州已來此亦未發專使今者贊普來意欲以再審此言故遣信臣往輸集作諭誠意即不假别使更到東軍此使已後應緣盟約之事如其間節目未盡更要商量卿但與鳳翔節度使計㑹此已處分令其奏聞則道路非遙往來甚易頗為便近亦冀速成更待要約之言皆已指定封疆之事保無改移即蕃漢俱遣重臣然後各將成命事關久逺理貴分明想卿通才當稱朕意曩者鄭叔矩路泌因平凉盟㑹沒落蕃中比知叔矩已亡路泌見在念茲存沒每用惻然今既約以通和路泌合令歸國叔矩骸骨亦合送還表明信誠兼亦在此其論與勃藏尋到鳳翔舊例未進表函節度不敢聞奏自取停滯非此稽留昨者方進表函旋令召對今便發遣更不遲回仍令與祠部郎中兼御史中丞徐復及中使劉文璨等同往其餘事宜等已具與贊普書內卿宜審於謀議速副誠懷兼有少信物賜卿具如别録至宜領也冬寒卿比平安好遣書指不多及文苑英華卷四百六十九
