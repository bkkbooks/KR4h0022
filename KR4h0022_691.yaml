body:
  text: 文苑英華巻六百九十二宋李昉等編遷譴中上襄陽楚大夫書一首上李尚書書一首上陳給事書一首與師臯書一首答户部崔侍郎書一首投知己書一首上鹽鐵崔尚書書一首與崔况秀才書一首上襄陽楚大夫書符載天下有特達之道可施於人者二焉大者以位舉德其有自泥途布褐一奮而登於青冥金紫者也次者以財拯困其有自糲飯蓬户一變而致於膏梁廣厦者也載羽毛頺弱未敢辱公扶摇九萬之勢家室空耗今則困矣敢欲以次者為節下之累謂之何哉載聞至誠貴直至敬無飾故以懇質之詞為述情之具伏惟少留意焉幸甚載頃至與友生數人隠居廬山其所學者不獨文章名數而已意根於皇極大中之道用在於佐王治國之術常欲致君於堯舜驅俗於中古此乃小子夙夜孜孜不怠也攻錯未半歸寧蜀道蜀之連帥以載㣲有文彩遮使止住小子亦隳産不應扶持東下意者欲開故山草堂拂舊帙編簡晨昏之暇終竟前志一昨牽滯事故不覺淹乆囊槖之資日竭髙厲之氣日消上無以供養尊長下無以撫字孤稚彷徨燥灼内熱如疾毎延想舊居雲霞在天松桂遶屋肺腹疑作腸一夕而九廽矣夫欲搆大厦者陵雲之基形𢎞敞之勢兆未備者榱桷朽壞而已得不謂班倕惜之乎鑄寳劍者負斷犀之資照含斗之氣所闕者淬拭發硎而已得不謂歐冶惜之乎載伏觀大夫起自堯山宰奮臂逰長安以宏偉之才進乎明君不數十年佩虎符握龍節有盛德勲庸於世真天下特達之士也載亦敢以肺腸之事干之誠能迴公方寸之地為小子生涯庇庥之所移公盈月之俸為小子度世衣食之業使隠不違親男疑道以静片言之下大獲素尚即赫赫巍巍之稱當在寰宇之内不在主客也載聞蒲牢之鐘擊之以莛筯叩者之誤也艅艎之舟投之以秉庾載者之咎也今載欲發大名壯志敢以細言詭數上干髙明乎且常見前賢房大尉書贈張燕公云欲起自燕國公門下矣載亦欲感君之恩望公之顧使異日之談亦起自大夫門下矣詞理如此不合輕義退自思省終用慙愧伏惟溟渤之浪涵容尺波幸甚幸甚不宣載再拜上李實尚書書韓愈月日將仕郎前守四門博士韓愈謹再拜奉書尚書大尹公集無公字閣下愈來京師今十五年所見公卿大臣不可勝數皆能守官奉職無過失而已未見有赤心事上憂國如家如閣下者今年以來不雨者百有餘日種不入土野無青草而盜賊不敢起榖價不敢貴百坊百二十司六軍二十四縣之人皆若閣下親臨其家老奸宿贓銷縮推阻魂亡魄散影㓕跡絶非閣下條理鎮服布宣天子威德其何能及此愈也少從事於文學見其忠於君孝於親者雖在千百年之前猶敬而慕之况親逢閣下得不候於左右以求効其懇懇謹獻所為文兩巻凡十五篇非敢以為文也以為謁見之資也進退惟命愈恐懼再拜上陳給事書白居易正月日鄉貢進士白居易謹遣家童集作僮奉書獻於給事閣下伏以給事門屏間請謁者如林獻書者如雲多則多矣然聽其辭一辭也觀其意一意也何者率不過有望於吹嘘翦拂耳居易則不然今所以不請謁而奉書者但欲貢所誠質所疑而已非如衆士有求於吹嘘翦拂也給事得不獨為之少留意乎大凡自號為進士者無賢不肖皆欲求一第成一名非居易之獨慕耳既慕之所以竊不自揆嘗勤苦學文迨今十年始獲一貢毎見進士集有之字中有一舉而中第者則欲勉狂簡而進焉又見有十舉而不第者則欲引駑鈍而退焉進退之宜固昭昭矣而愚者自惑於取集作起捨何哉夫藴竒挺之才亦不自保其必勝而一上得第者非他也是主司之明也抱瑣細之才亦不自知其妄動而十上下第者亦非他也是主司之明也豈非知人易而自知難耶伏以給事天下文宗當代精鑒故不揆賤集作淺陋敢布腹心居易鄙人也上無朝廷附離之援次無郷曲吹嘘之譽然則孰為而來哉盖所仗者文章耳所望者主司至公耳今禮部髙侍郎為主司則至公矣而居易之文章可進也可退也竊不自知之欲以進退之疑取决於給事給事其能捨之乎居易聞諸神蓍靈龜者無常心茍叩之者不以誠則已若以誠叩之必以信告之無貴賤無大小而不之應也今給事鑒如氷鏡言如蓍龜邦家之大事咸取决於給事豈獨遺其㣲小人乎謹獻雜文二十首詩一百首伏願俯察悃誠不遺小道集作賤小退公之暇賜精鑒之一加焉可與進也乞諸一言小子則磨鉛䇿蹇騁力於進取矣不可進也亦乞諸一言小子則息機歛跡甘心於退藏矣進退之心交争於胸中者有日矣幸一言以决集作弊之旬日之間敢佇報命塵穢聼覽若奪氣褫魄之為者不宣居易謹再拜與師臯書師臯足下自僕再來京師足下守官鄠縣吏職拘絆相見甚希凡半載集作年餘與足下開口而笑者不過三四及僕左降詔下明日而東足下從城西來抵昭國坊已不及矣走馬至滻水纔及一執手憫然而訣言不及他爾來雖手札一二徃來亦不過問道途報健否而已攀集作欝結之志曠然未舒思欲一陳左右者久矣去年六月盗殺左丞相於通衢中迸血髓磔髪肉所不忍道闔朝震慄不知所云僕以為書籍已來未有此事國辱臣死此其時耶茍有所見雖畎畆皁𨽻之臣不當黙黙况在班列而能勝其痛憤耶故武相之氣平明絶僕之書奏日午入兩日之内滿城知之其不與者或誣為偽言或搆以非語且浩浩者不酌時事大小與僕言當否皆曰丞郎給舎諫官御史尚未論請而賛善大夫何反憂國之甚也僕聞此語退而思之賛善大夫誠賤冗耳朝廷有非常事即日獨進封章謂之忠謂之憤亦無愧也集作矣謂之妄謂之狂又敢逃乎且以此獲辜顧何以集作如耳况又不以為罪名乎此足下與崔李元庾輩十餘人為我悒鬱集作悒悒鬱鬱長太息者也然僕始得罪於人也竊知之集作自知矣當其在近職時自惟賤陋非次寵擢夙夜赧集作腆愧思有以稱之性又愚昧不識時之忌諱凡直奏宻啟外有合方便聞於上者稍以歌詩道集作導之意者欲其易入而深戒也不我同者得以為計媒孽之詞一發又安可君臣之間自明白其心乎加以握兵於外者以僕潔慎不受集作愛賂而憎秉權於内者以僕介獨不附已而忌其餘附離之者惡僕獨異又信狺狺吠聲唯恐中傷之不獲以此得罪可不悲乎然而僚友益相重交逰益相信信於近而不信於逺亦不恨哉近者少逺者多多者勝少者不勝又其宜矣師臯僕之是言不發於他人獨發於師臯師臯知我者豈有愧於其間哉茍有愧於師臯固是言不發矣且與師臯始於宣城相識迨於今十七八年可謂故矣又僕之妻即足下從父妹可謂親矣如是故如是親集作親如是故如是人之情又何加焉然僕與足下相知即不止此集作不在此何者夫士夫之集作文人家閨門之内朋友不能知也閨門之外姻族不能知也必待友且姻者然後周知之足下視僕蒞官事擇交友接賔客何如哉又視僕撫骨肉待妻子馭童僕又何如哉少者近者尚不敢不盡其心况大者逺者乎所謂斯言無愧而後發矣亦猶僕之知師臯也師臯孝敬友愛之外可畧而言足下未應舉時當嘗克賢良直言之賦其所對問志磊磊而詞諤諤雖不得第僕始愛之及與獨孤補闕書讓不論事與盧侍郎書請不就職與髙相書諷成致仕之志志益大而言益逺而僕愛重之心繇是加焉近者足下與李𢎞慶友善𢎞慶客長安中貧甚而病亟足下為迎致其母安慰其心自損其集無其字衣食以致集作續其醫藥甘㫖之費有年嵗矣又足下與崔行儉逰行儉非罪下獄足下意其不幸及於流竄勑下之日躬俟於御史府門而行李之具養活之物崔生顧其傍一無闕者其餘奉寡姊親䕶其夫䘮撫孤甥誓畢其婚嫁取貴人子為婦而禮法行於家由甲乙科入官而吏聲聞於邑凡此數者皆可以激揚頺俗表正士林斯僕所以嚮慕勤勤豈敢以骨肉之姻形骸之舊為意哉然足下之羙如此而僕側聞蚩蚩之徒不悦足下者已不少矣但恐道日長而毀日至位益顯而謗益多此公伯寮所以愬仲由季孫所以毀夫子者也昔衛玠有云人之不逮可以情恕非意相加可以理遣故至終身無喜愠色僕雖不敏常佩此言師臯人生未死間千變萬化若不情恕於外理遣於中欲何為哉欲何為哉僕之是行也知之乆矣自度命數亦其宜然凡人情通達則謂由人窮塞而後信命僕則不然十年前以固陋之資瑣劣之藝與敏手利足者齊驅豈合有所獲哉然而求名而得名求祿而得祿人皆以為能僕獨以為命命通則事偶事偶則幸來幸之來尚歸之於命不幸之來也捨命復何歸哉所以上不怨天下不尤人者以集作實如此也又嘗照鏡復集作或觀冩真自相形骨非富貴者必矣以此自决益不復疑故寵辱之來不自驚怪亦足下素所知也今且安時順命用遣日集作嵗月或免罷之後得以自由浩然江湖從此長往死則葬魚鱉之腹生則同鳥獸之群必不能與掊聲攫利者權量其分寸矣足下輩無復見僕之光塵於人寰間也多謝故人勉樹令德粗冩鄙志兼以為别居易頓首答户部崔侍郎書侍郎院長閣下户部牒中奉八月十七日書具承康寧喜與忭㑹并别覩手翰論集作訪叙綢繆何眷好勤勤若此之不替也幸甚幸甚首垂問以鄙况一疊鄙况二字不足云盖黙黙兀兀委順任化而已次垂問以體氣除舊日疾外雖不甚健亦幸無急病矣次垂問以月俸月俸雖不多然量入以為用亦不至凍餒矣又垂問以舍弟渠從事東川近得書亦集作且知無恙矣終垂問以心地此最要者輙梗槩言之頃與閣下在禁中日毎視草之暇匡床接枕言不及他嘗以南宗心要互相誘導别來閑獨隨分增修比於曩時亦似有得得中無得無可寄言來書云粗示可乎斯不可也又知兵部李尚書同在南宫錢蕭二舍人移官閒秩退朝之暇數獲晤言毎語舊遊輙䝉見念此盖君子乆要之心不為榮悴合散增减耳而不佞者又何幸焉然自到潯陽忽已周嵗外物盡遣中心甚虚雖賦命之間則有厚薄而忘懷之理集作後亦無窮通用此道推頺然自足又或杜門隱几塊然自居未形灰心動逾旬月當此之際又不知居在何地身是何人雖鵩鳥集於前枯栁生於肘不能動其集作於心也而况進退榮辱之累耶又思頃者接確論時走常有言薦於執事云心與跡多相戾道與名不兩立茍有志於道者若不幸於外是幸於内猥䝉歎賞猶憶之乎今之身心或近是矣退思此語無省初心求仁得仁乂何不足之有也前月中長兄從宿州來又孤㓜弟姪六七人皆自逺至日有糲食嵗有麤衣饑寒獲同骨肉相保此亦黙黙委順之外益自安也况廬山在前九江在左出門是滄浪水舉頭見香爐峯東西二林時時一往至於瀑水怪石桂風杉月平生所愛者盡在其中此又兀兀任此之外益自適也今日之心誠不待此而後安適况兼之者乎此鄙人所以安又安適又適而不知命之窮老之至也院長公望日重啟沃非遥仰惟勉樹勲名勿以鄙劣為念投知己書杜牧夫子曰不怨天不尤人下學而上達知我者其天乎復曰知我者以春秋罪我者亦以春秋此聖人之操心不顧英華作願世人之是非也柱厲叔事莒敖公莒敖公不知及莒敖公有難柱厲叔死之不知我則已反以死報之盖怨不知之深也豫讓謂襄子曰智伯以國士待我我以國士報之此乃烈士義夫有材集作才下同感其知不顧其生也行無堅明之異材無尺寸之用泛泛然求知於人知則不能有所報不知則怒此乃衆人之心也聖賢義烈之士既不可到小生有異於衆人者審已切也審已之行審已之材皆不出衆人亦不求知於人一作於人知已或有知之者則藏縮退避唯恐知之盖深自度無可以為報効也或有因縁他事不得已求知於人者茍不知未嘗退有懟言怨色形於妻子之前此乃比於衆人唯審已求知也大和二年小生應進士舉當其時先進之士以小生行可與進業可益修喧而舉之争為知己者不啻二十人小生邇來十年江湖間時時以家事一抵京師亊已即返嘗所謂喧而譽之為知己者多已顯貴未嘗一到其門何者自十年來行不益進業不益修中夜忖量自愧於心欲持何説復於知己之前為進拜之資乎黙黙藏縮茍免寒饑為幸耳昨李廵官至忽傳閣下㫖意似知姓名或欲異日必録在門下閣下為世之偉人鉅德小生一獲進謁一陪讌享則亦榮矣况欲異日終置之於榻席之上齒於數子之列乎無攀縁絲髪之因出特達倜儻之知小生自度宜為何才可以塞閣下之求宜為何道可以報閣下之德是以自承命以來審已逾切拊心獨驚忽忽思之而不自知其然也若䝉待之以衆人之地求之以衆人之材責之以衆人之報亦庶幾異日受約束指顧於簿書之間知無不為為不及私亦或能提筆伸紙作詠歌以發盛德止此而已其他望於古人責以不及非小生之所堪任伏恐閣下聽聞之過求取之異敢不特自發明道説其衷一開閣下視聽其他感激發憤懷愧恩德臨紙汗發不知所裁某恐懼再拜上鹽鐵崔尚書書薛逢伏承相公忽承明詔逺赴闕庭天子傾心廟堂虚席沙堤尚在復瞻丞相之車蓮幕重開再理将軍之第伏想華軒擁路賀客盈門喜集鴒原風隨鴈序昨者幸從抵拜獲貢姓名言及曩時期於逺路鉛黄入鏡顧陋質而多宜金石宣聲覺巴歈之寡和因敢專馳狀啟逺謝恩知伏慮方倦将迎未暇披覽實慮奨㧞失在毫釐其啟狀本謹别録上伏望聨竹之際一賜發揮俾風波之路不迷見常稱譽數四心期旦夕必擬提携伏見吾兄當數集㑹時望深賜重言也某頓首與崔况秀才書自今日春榜到縣當日差人持狀到京方乘車騎尋已東去恨結之至空積下情不審自歸淮南尊體何似伏計不乖将息逺想淮山秀潤水木幽竒扇枕之餘謳吟自適甚盛甚盛某龍鍾山縣忽忽過時素秋軫懷華髪棲鬢昔日凌雲之志自覺泥蟠今兹失路之人誰為郷導但飲氷勵節食蘗苦心用省刑名以安疲瘵除此之外非愚所知故人恩憐曾不憫念秋風已戒關路須西雄文誰與儔比一日千里今也其時居安敗名古人所慎某頓首文苑英華巻六百九十二
