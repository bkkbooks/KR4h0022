body:
  text: 文苑英華卷二百一宋李昉等編樂府十巫山髙二十一首江南行二十一首蜀國吟二首白銅鞮歌六首襄陽行一首大堤曲一首襄陽歌一首豫章行二首東武吟二首武陵深行二首紀遼東三首廣陵行一首巫山髙梁元帝巫山髙不窮逈出荆門中灘聲下濺石猿鳴上逐風樹雜山如畫一作盡林暗澗疑空無因謝神女一為出房櫳同前王泰迢遞巫山好一作竦逺天新霽時樹交涼去逺草合影開遲谷深流響咽峽近猿聲悲只言雲雨狀自有神仙期同前范雲巫山髙不極白日隱光輝靄靄朝雲去冥冥暮雨歸巖懸獸無迹林暗鳥疑飛枕席竟誰一作休薦相望日一作空依依同前蕭銓巫山映巫峽髙髙殊未窮猿聲不辨處雨色詎分空懸崖下桂影一作月深澗響松風别有仙雲起時向楚王宫同前虞羲南國多竒山荆巫獨靈異雲雨麗以佳陽臺重怨一作千里思勿言再可一作可再得特美君王意髙唐一斷絶光隂不可遲同前劉繪髙山與巫山參差鬱相望灼爍在雲間氛氲出霞上散雨收夕臺行雲卷晨帳出沒不易期嬋娟似惆悵同前鄭世翼巫山凌太清岧嶤類削成霏霏暮雨合靄靄朝雲生危峯入鳥道深谷寫猿聲别有幽棲客淹留攀桂情同前凌敬巫岫鬱岧嶤髙髙入紫霄白雲間包石玄猿逈挂一作挂迥條懸崖激巨浪脆葉殞驚飊别有陽臺處風雨共飄颻一作飄飄同前李元操荆門對巫峽雲夢邇陽臺燎火如奔電墜石似驚雷天寒秋水急風靜夜猿哀枕席無由薦朝雲徒去來同前盧照鄰巫山望不極望望下朝氛莫辨啼猿樹徒看神女雲驚濤亂水脈驟雨暗岑一作峯文霑衣即此地况復逺思君同前閻復本君不見巫山髙髙半天起絶壁千尋畫相似君不見巫山磕匝翠屏開湘江碧水繞山來緑樹春嬌明月峽紅花朝覆白雲臺臺上朝雲無定所此中窈窕神仙女仙女盈盈仙骨飛清容出沒有光輝欲暮髙唐行雨送今宵定入荆王夢荆王夢裏愛穠華枕席初開紅帳遮可憐欲曉啼猿處説道巫山是妾家同前喬知之巫山十二峯參差互隱見潯陽幾千里周覽忽已遍想像神女姿摘芳共珍薦楚雲何逶迤紅樹日蔥蒨楚雲沒湘源紅樹斷荆門郢路不可見况復夜聞猿同前沈佺期巫山峯十二合沓一作還合隱昭回俯眺琵琶峽平看雲雨臺古槎天外倚瀑水日邊來何忽啼猿夜荆王枕席開同前張九齡巫山與天近煙景常青熒此中楚王夢夢得神女靈神女去已久白雲一作雲雨空冥冥唯有巴猿嘯哀音不可聽同前皇甫冉巫峽見巴東迢迢出半空雲藏神女館雨到楚王宮朝暮泉聲落寒暄樹色同青猿不可聽偏在九秋中同前李端巫山十二峯皆在碧空中迥合雲藏日霏微雨帶風猿聲寒度一作過水樹色暮連空愁向髙堂宿一作唐望清秋見楚東一作宫同前張循之巫山髙不極合沓一作沓沓狀竒新暗谷疑風雨幽巖若鬼神月明三峽曙潮滿二江春為問陽臺客應知入夢人同前李沇抉天心開地脈浮動凌霄拂藍碧襄王端眸望不極似睹瑶姫長歎息巫粧不治獨西望暗泣紅蕉抱雲帳君王妬妾夢荆宫虛把金泥印仙掌江濤迅激如相助十二獰龍怒行雨崑崙謾有通天路九峯正在天低處同前李賀碧叢叢齊一作髙插天巴一作大江翻瀾神曵煙楚魂尋夢風颸然曉風吹一作飛雨生苔錢瑶姬一去一千年丁香卭竹號一作笻竹啼老猿古祠近月蟾桂寒椒花墮一作墜紅濕雲間同前陳陶玉峯青雲一作靈十二枝金母和雲賜瑶姬花宫磊砢楚宮外一作列列仙一作仙客八面星斗垂秀色無雙怨三峽春風幾夢襄王獵青鸞不在懶吹簫班竹題詩寄江妾飄颻散絲巴子天苔裳玉轡紅霞幡歸時白帝掩青瑣瓊枝草草遺湘煙同前羅隱下壓重泉上千仭香雲結夢西風緊縱有精靈得往來狖軛鼯軒亦顛隕嵐光雙雙雷隱隱愁為衣裳恨為鬢暮灑朝行何所之江邊日月情無盡珠零冷露丹墮楓細腰長臉愁滿宫人生對面猶異同况在千巖萬壑中江南行三首梁簡文帝桂楫曉應旋歷岸扣輕舷紫荷釣鯉魚銀筐插矩一作短蓮人歸浦已一作口暗那得久回船二江南有妙妓時則應璿樞月暈蘆灰缺秋還懸炭枯含丹和九轉芳樹應千株何辭天后誚終是列一作到仙都三陽春路時使佳人度桂中水上春併歸長楊拂一作及又作掃地桃花飛清風吹人光照衣景將夕且一無此字擲黃金留上客同前梁武帝衆花雜色滿山林舒芳搖緑垂輕隂連手蹀躞舞春一作輝心舞春心臨嵗腴中心一作人望盡一作無此字獨踟蹰同前沈約棹歌發江潭采蓮度湘南宜須間隱處州浦余自諳羅衣織成帶墜馬碧玉篸且一作但令舟楫渡寧計路一作嵌嵌同前栁惲汀洲採白蘋日落江南春洞庭有歸客瀟湘逢故人故人久不還春華復應晚不道新知樂只言行路逺同前李康成梅花路好使香車度楊栁青青鶯欲啼風光搖蕩緑蘋齊金陵城頭日色低日色低情難極水中鳬鷖雙比翼同前王勃江南弄巫山連楚夢行雨行雲幾相送瑶軒金谷上春時玉童仙一作玉女無見期紫露香煙眇難托青樓明日一作清風明月遙相思遙相思草徒緑為聽雙飛鳯凰曲同前宋之問妾住越城南離居不自堪採花驚曙鳥摘葉餧春蠶懶結茱莄帶愁安玳瑁篸待君一作待臣銷瘦盡日暮緑一作碧江潭同前二首崔皓君家何處住妾住在橫塘停船暫借問或可是同鄉二北一作下渚多風浪蓮舟欲漸稀那能不相待獨自逆潮歸同前二首儲光羲逐流牽藕一作􅀢葉緣岸摘蘆苗為憶一作惜鴛鴦鳥輕輕動畫橈二渌一作緑江深見底髙浪直翻空慣是湖邊住船一作舟輕不畏風同前張朝茈菰葉爛别西灣蓮子花新猶未還妾夢不離江水上人傳郎在鳯凰山同前李叔卿湖上女江南花無雙越女春浣紗風似箭月如弦少年吳兒曉進船郗家子弟謝家郎烏巾白夾紫香囊菱歌思欲絶楚舞斷人腸歌舞未終涕雙隕舊宫坡陀才嶙隱西山暮雨過江來北渚春雲沿海盡渡口水流緩妾歸宵剩遲含情為君再理曲月華照出澄江時同前芮挺章春江可憐事最在美人家鸚鵡能言鳥芙蓉巧笑花馬銜金作埓水抱玉為砂薄晚青絲騎長鞭赴狹斜同前劉慎虛美人何蕩漾湖上風月長玉手欲有贈徘徊雙明璫唱歌一作歌聲隨渌水怨色起青一作朝陽日暮還家望煙雲一作雲波橫洞房同前韓翃長樂花枝雨滴銷江城日暮好相邀春樓不閉葳蕤鎖渌水回通宛轉橋同前李賀江中緑霧起涼波江上疊巘紅嵳峩水風浦雲生老竹渚一作浦暝蒲帆如一幅鱸魚千頭酒百斛酒中倒卧南山緑吳歈越吟未終曲天上團團帖寒玉同前陳標水光春色滿江一作潮天蘋葉風吹荷葉錢香蟻翠旗臨一作卧岸市艷娥紅袖渡江船曉驚白鷺聮翩雪浪蹙青茭瀲灔煙不怕汀洲芳草暮待將秋一作春興拆湖蓮同前羅隱江煙濕雨蛟綃軟漠漠小一作逺山眉黛淺水國多愁又有情夜槽壓酒銀船滿細絲搖栁一作綳絲採怨凝曉空吳王臺榭春夢中鴛鴦鸂鶒喚不起平鋪緑水眠東風西陵路邊月悄悄油壁車輕蘇小小一作輕車嫁蘇小蜀國吟梁簡文帝銅梁指斜谷劍道臨中區通星上分野作國下為都雅歌固一作因良守妙舞自巴歈一作渝陽城嬉樂盛劍騎鬱相趨五婦行難至百兩好遊娛牲祈望帝祀酒醉一作酹蜀侯誅江妃納重聘卓女愛將雛停絃時擊爪息路一作吹治脣朱春一作脫袗湔錦浪回扇避陽烏聞君握道一作節返賤妾下城隅同前盧思道西蜀稱天府由來擅沃饒雲浮玉壘夕日映錦城朝南尋九折路東上七星橋琴心若易解令客豈難要白銅鞮歌三首一作襄陽踏銅蹄梁武帝陌頭征人去閨中女下機含情不能言送别沾羅衣二草樹非一香花葉百種色寄語故人情知我心相憶三龍門一作馬紫金鞍翠眊白玉羈照耀雙闕下知是襄陽兒右三首見郭茂倩樂府今文苑英華合第一第二為一首又增襄陽白銅鞮聖德應乾來兩句為首句按隋書樂志襄陽白銅鞮梁武帝自為三曲又令沈約為三曲古今樂録沈約又作其和云襄陽白銅鞮聖德應乾來合從樂府同前沈約生長宛水上往官一作從事襄陽城一朝遇神武奮翼起先鳴二踶控一作蹀鞚飛塵起左右自生光男兒得富貴何必還故鄉三分手桃李岸望别峴山頭若欲寄書信漢水向東流襄陽行張朝玉盤轉明珠君王無定凖昨見襄陽客剩説襄陽好無盡襄漢水峴山垂漢水東流風北吹只言一世長嬌寵那悟今夕一作朝見别離君渡清羌渚知人獨不語君見木栖林憶我相思深莫作雲間鴻離聲願儔侣尚如匣中劍分形會同處是君婦識君情怨君恨君為此行下床一宿不可保况乃萬里襄陽城襄陽傳近大堤北君到襄陽莫迷惑大堤諸女兒憐錢不憐德大堤曲李賀妾家住橫塘紅紗滿桂香青絲學一作青雲教綰頭上髻明月與作耳邊璫蓮風起江畔春大堤上留北人郎食鯉魚尾與客狌狌一作妾食猩猩脣莫指襄陽道渌浦歸帆少今日菖蒲短一作花明朝楓樹老襄陽歌李白落日欲沒峴山西倒著接㒿一作行客醉歸花下迷襄陽小兒齊拍手攔街爭唱白銅鞮傍人借問笑何事笑殺山翁一作公醉似泥鸕鷀杓鸚鵡杯百年三萬六千日一日須傾三百杯遙看漢水鴨頭緑恰似一作疑是蒲萄新一作初撥醅此江若變作春酒纍一作壘麴便築糟丘臺千金駿馬換少妾笑一作醉坐金一作雕鞍歌落梅車旁側挂一壺酒鳯笙龍管行相催咸陽市上一作中歎黃犬何如月下傾金罍君不見晉朝羊公一片古碑材一作石碑在龜頭駮一作龜龍剝落生莓苔淚亦不能為之墮心亦不能為之哀誰能憂此身後事金鳬銀鴨葬死灰清風眀月不用一錢買玉山自倒非人推舒州杓力士鐺一作黃金爵白玉瓶李白一作酒仙與爾同死生襄陽雲雨今安在江水東流猿夜聲此詩三百四十三卷重出今已削去注異同為一作豫章行沈約燕陸一作陵平而逺易河清且駛一見塵波阻臨途引征思雙劍愛匣同孤鸞悲影異宴言誠易纂浩歌信難嗣卧聞夕鍾急坐閲朝光亟往歡墜壯心來戚滿哀志徂一作殂芳無再馥淪灰定還熾夏臺尚可忘榮辱亦奚事愧微曠士節徒感鄙生餌勞哉納辰和地逺托聲寄同前薛道衡江南逺地接閩甌山東英妙屢經遊前瞻疊嶂千重阻却帶驚湍萬里流楓葉朝飛向京洛文魚夜過歷吳洲君行逺度茱莄嶺妾住長依明月樓樓中愁思不開嚬始復臨窗望早春鴛鴦水上萍初合鳴鶴園中花併新空憶常時角枕處無復前日畫眉人照骨金環誰用許見膽明鏡自生塵蕩子從來好留滯况復關山逺迢遞當學織女嫁牽牛莫作姮娥叛夫壻偏訝思君無限極欲罷欲忘還復憶願作王母三青鳥飛來飛去傳消息豐城雙劍昔曽離經年纍月復相隨不畏將軍成久别只恐封侯心更移東武吟李白好古笑流俗素聞賢逹風方希佐明主長揖辭成功白日在髙天回光燭微躬恭承鳯凰詔歘然一作起雲蘿中清切紫垣迥優遊丹禁通君王賜顔色聲價凌煙虹乘輿擁翠蓋扈從金城東寶馬麗絶景錦衣入新豐依巖望松雪對酒鳴絲桐因學楊子雲獻賦甘泉宮天書美片善清芬播無窮歸來入咸陽談笑皆王公一朝去金馬飄落成飛蓬賔友日踈散玉樽亦已空才力猶可倚不慙世上雄間作東武吟曲盡情未終書此謝知已吾尋黃綺翁一作扁舟尋釣翁同前曹鄴心如山上虎身若倉中鼠惆悵倚市門無人與之語夜宴李將軍欲望心相許何曽聽我言貪謔邯鄲女獨上黃金臺凄涼淚如雨武陵深行劉孝勝劉次莊作孝驎武陵一作溪深不測水安舟復輕暫借一作侣莊生釣還滯鄂君行歡一作棹歌爭復一作後發譟鼓逐前征秦上山川險黔中水復清一作木石并又作木石青林壑秋瀨急猿哀夜月明澄源本千仭回峯忽萬縈昭潭讓無底太華推削成日落野通氣目極悵餘清下流曽不得一作濁長邁寂無聲羞學滄浪水濯足復霑纓同前爰寄生滔滔武陵一何深鳥飛不度獸不敢臨嗟哉武陵兮多毒淫紀遼東二首隋煬帝遼東海北剪長鯨風雲萬里清方當銷鋒散馬牛旋師宴鎬京前歌後舞振軍威飲至解戎衣判不徒行萬里去空道五原歸二秉旄杖節定遼東俘馘振一作變夷風清歌凱捷九都水歸宴雒陽宫策功行賞不淹留全軍藉智謀詎似南宫復道上先封雍齒侯同前王胄遼東淇水事龔行俯拾信神兵欲知振旅旋歸樂為聽凱歌聲千乘元戎才度遼扶濊已氷銷詎似百萬臨江水按轡空回鑣天威電邁舉朝鮮信次即言旋還笑魏家司馬懿迢迢用一年鳴鸞詔蹕返淆潼舍爵及疇庸何必豐沛多相識比屋降堯封廣陵行權德輿廣陵實佳麗隋季此為京八方稱輻輳五達如砥平大斾映空色笳簫發連營層臺出重霄金璧摩皓清交馳流水轂回接浮雲甍青樓旭日映緑野春風晴噴玉光照地嚬娥價傾城燈前互巧笑陌上相逢迎飄飄翠羽薄掩映紅𥜗明蘭麝一作馨逺不散管絃間自清曲士守文墨達人隨性情茫茫竟同盡冉冉將何營且申今日歡莫務身後名肯學諸儒輩書窗誤一生文苑英華卷二百一
