body:
  text: 文苑英華巻三百二十六宋李昉等編花木六果實附櫻桃十首甘橘十首桃李六首梨三首石榴二首棗栗二首柰一首梅一首荔枝三首雜果實五首樹木二十一首藤四首櫻桃奉答南平王康賚朱櫻梁簡文帝倒流映碧叢照類聚作㸃露擎朱實花茂蝶争飛類聚作來枝濃鳥相失已麗金釵𤓰仍美玉盤橘寧異梅似丸不羨萍如日永植平臺垂長與雲桂密徒然奉推甘終似初學記作以愧操筆賦得櫻桃春字韻唐太宗華林滿芳景洛陽偏宜初學記作徧陽春朱顔含逺日翠色影長津喬柯囀嬌鳥低枝映羙人昔作園中實今來席上珍勅賜百官櫻桃王維芙蓉闕下㑹千官紫禁朱櫻出上闌纔是寝園春薦後非闗御苑鳥銜殘歸鞍競帯青絲籠中使頻傾赤玉盤飽食不湏憂集作愁内熱大官還有柘集作蔗漿寒和前崔興宗未央朝謁正逶迤天上櫻桃錫此時朱實初傳九華殿繁花舊雜萬年枝全勝晏子江南橘莫比潘家大谷梨聞道令人好顔色神農本草自應知和詠𪠘署有櫻桃孫逖上林天禁裏芳樹有紅櫻江國今來見君門春意生香從花綬轉色繞珮珠明海鳥銜初實吳姬掃落英切将稀取貴羞與衆同榮為此堪攀折芳蹊處處成酬裴傑秀才新櫻權徳輿新果真瓊液來應宴紫蘭圓疑竊龍頷色已奪鷄冠逺火㣲㣲辨殘星隠隐看茂先知味易一作好曼倩恨偷難忍用烹騂酪從将玩玉盤流年如可駐何必九華丹朝日勅賜百官櫻桃張籍仙果人間都未有今朝忽見下天門捧盤小吏初宣勅當殿羣臣共拜恩日色遥分廊下座露香纔出禁中園毎年重此長集作偏先熟願得千春奉至尊和張員外集作水部勅賜百官櫻桃韓愈漢家舊種明光殿炎帝還書本草經豈似滿朝承雨露共看傳賜出青冥香隨翠籠擎初到集作重色照銀盤寫未停食罷自知無所報空然慚汗仰皇扄與沈楊二舍人閣老同食勅賜櫻桃翫物感㤙成十四韵白居易清曉趨丹禁紅櫻降紫宸驅禽養得熟和葉摘來新圓轉盤傾玉鮮明籠透銀内園題兩字西掖賜三臣熒惑晶華赤醍醐氣味真如珠未穿孔似火不燒人杏俗難為對桃頑詎可倫肉嫌盧橘厚皮笑荔枝皴瓊液酸甜足金丸大小勻偷湏防曼倩惜莫擲安仁手擘纔離核匙抄半是津甘為舌上露暖作腹中春已懼長尸禄仍驚數食珍最慚恩未報飽餵不才身自有扈至京師已後朱櫻之期温庭筠露圓霞赤數千枝銀籠誰家寄所思秦苑飛禽諳熟早杜陵遊客恨來遲空看翠幄成隂日不見紅珠滿樹時盡日徘徊濃影一作廕下秪應重作釣魚期甘橘詠甘子徐陵朱實挺江南苞品擅珍淑上林雜嘉樹江潭間脩竹萬室擬封家千株挺疑荆國緑葉萋以布素榮芬且郁得陳終宴歡良垂雲雨育園橘范雲芳條結寒翠圓實變霜朱徙根楚洲上來覆廣庭隅同前沈約緑葉迎露滋朱苞待霜潤但令入玉柈金衣非所恡橘樹李元操嘉樹出巫隂分根徙上林白花如霰雪朱實似懸金布影臨丹地飛香度玉岑自有陵冬質能守嵗寒心橘李嶠萬里盤根植千株布葉繁既榮潘子賦方重陸生言玉蘤含霜動金衣逐吹翻願辭湘水曲長茂上林園病橘杜甫伊集作羣橘少生意雖多亦奚為惜哉結實小集作少酸澁如棠梨剖之盡蠧蝕集作蟲採掇爽所宜紛然不適口豈止存其皮蕭蕭半死葉怱怱集作未忍别故枝𤣥冬霜雪積况乃廻風吹嘗聞蓬萊殿羅列瀟湘枝此物嵗不稔玉食失光輝㓂盗尚憑陵當君减膳時汝病是天意吾意罪有司憶昔南海使崩集作奔騰獻荔枝百馬死山谷到今耆舊悲揀貢橘書情白居易洞庭貢橘揀宜精太守勤王請自行珠顆形容隨日長瓊漿氣味得霜成登山敢惜駑駘力望闕難伸螻蟻情踈賤無由親跪獻願憑朱實表丹誠奉和揀貢橘周元範離離朱實緑叢中似火燒山處處紅影下寒林沉緑水火摇髙樹照晴空銀章自竭人臣力一作分玉液誰知造化功看取明朝船發後餘香猶尚逐仁風同前張彤凌霜逺渉太湖深雙巻朱旗望橘林樹樹籠烟疑帶火山山照日似懸金行看採掇方盈手暗覺馨香已滿襟揀選封題皆盡力無人不感近臣心橘園李紳江城霧歛輕霜早園橘千株欲變金朱實摘時天路近素英飄處海雲深懼同枳棘愁遷徙每抱馨香委照臨憐爾結根宜一作能自保不隨寒暑換貞心桃李桃李嶠獨有成蹊處紅桃集作穠華發井傍含風如集作山風凝笑臉裛露似集作朝露泫啼妝隠士顔應改仙人路漸長還欣上林苑千嵗奉君王𤣥都觀桃蔣防舊傳天上千年熟今日人間五日香紅軟滿枝湏作意莫交方朔施偷将麥李沈約青玉冠西海碧石彌外區化為中園實其下成路衢在昔良足貴因小邈難逾色潤房陵縹味奪寒水珠摘持歌以獻尚食且踟蹰答元金紫餉朱李王筠穠初學記作李華春發彩結實下成蹊潘生詠金谷魏后沈寒溪逢君重妖麗移翫入崇閨慙無瓊玖報徒用萃幽棲賦得李唐太宗玉衡流桂圃成蹊正可尋鸎啼宻葉外蝶戲脆花心麗景光朝彩輕烟散夕隂暫顧暉章側還眺靈山林同前李嶠潘岳閒居暇一作日王戎戲陌辰蝶遊芳徑馥鶯囀令一作弱枝新葉暗青房晩花明玉井春方知有靈榦持一作特用表真人梨應詔詠梨沈約大谷來既重岷山道又難摧折非所恡但令入玉盤梨後梁宣帝大谷常流稱南荒本足珍緑葉已承露紫實復含津同前李嶠擅美𤣥光側傳芳瀚海中鳯文踈象郡花影麗新豐春暮條應紫秋來葉早紅集作色對瑶池紫甘依大谷紅若令逄漢主還冀識張公石榴石榴梁元帝塗林未應發春暮轉相催然燈宜夜火連珠勝早梅西域移根至南方釀酒來葉翠如新剪花紅似故栽還憶河陽縣映水珊瑚開以下五篇並見初學記同前魏彦深分根金谷裏移植廣庭中新枝含淺緑晩萼散輕紅影入環階水香隨度隙風路逺無由寄徒然初學記作念春閨空棗栗棗梁簡文帝浮華齊水麗垂彩鄭都竒白英紛靡靡紫實摽離離風摇羊角樹日映鷄心枝糓城踰石蜜蓬岳表仙儀已聞安邑美永茂玉門垂詠栗雜言陸玢貨見珍於有漢木取貴於隆周英肇萌於朱夏實方落於素秋委玉盤雜椒糈将象腐初學記作席糅珍羞柰柰禇澐成都貴素質酒泉稱白麗紅紫奪夏藻芬芳掩春蕙映日照新芳叢林抽晩蒂誰為重初學記在種三株終焉競八桂不讓圜丘中粲潔華庭際梅李嶠大庾歛寒光南枝獨早芳雪含朝暝集作紫花色風引去來集作上林单題詩作上春香舞袖集作粧面迴青徑歌塵起畵梁若能遥止渇何假泛瓊漿荔枝鄭谷平昔誰相愛驪山遇貴妃在集作任教生處逺愁見摘來稀曉集作晩奪紅霞色晴欺瘴日威南荒何所戀為爾即㤀歸荔枝樹前人二京曽見畵圖中數本芳菲色不同孤棹今來巴徼外一枝煙雨思無窮夜郎城近含香瘴杜宇巢低起暝風腸斷渝瀘霜霰薄不教葉似灞陵紅南海陪鄭司空遊荔園曹松荔枝時節出旌斿南國名園盡興遊亂結羅紋照襟袖别含瓊露爽咽喉葉中新火欺寒食樹上丹砂勝錦州他日為霖不将去也湏圖畵取風流雜果實野園獻果呈員外楊巨源西園果初熟上客心逾惬凝粉乍辭枝飄紅仍帶葉幽姿㵼瓊實殷彩呈粧頰持此贈佳期清芬羅袖裛詠紅柿子劉禹錫曉連星影出晩帶日光懸本因遺採摘集作掇翻自保天年菱李嶠鉅野韶光暮東平春溜通影摇江浦月香引棹歌風日色翻池上潭花發鏡中五湖多賞樂千里望難窮瓜前人欲識東陵味青門五色瓜龍蹄逺珠履女臂動金花六子方呈瑞三仙實可嘉終期奉絺綌謁帝佇非賒秋日吳中觀共藕趙嘏野艇幾西東清泠映碧空搴衣來水上捧玉出泥中葉亂田田緑蓮餘片片紅激波纔入選就日已生風御潔玲瓏膳人懐㧞擢功梯山謾多品不與世流同樹木詠樹庾信交柯将一作乍百頃擢本或千尋楓子留為式桐孫待作琴殘核移桃種空花植棗林幽居對䝉宻蹊徑轉深沉庭前枯樹孫萬夀當時金谷裏昔日平陵東布葉俱承露開花共待風摇落一如此容華遂不同庭前生意盡井上蠧心空匠者無勞顧擁腫難為功長信宫樹喬知之婀娜當軒樹華胥一作茸倚蘭殿葉映九春華香摇五明扇餘花鳥哢盡新葉蟲蠧一作書遍零落親一作客自知芬芬君不見河邉枯樹劉瑧竒樹臨芳渚半死若龍門疾風摧勁葉沙岸毁盤根将軍猶未坐匠石不曾論無復凌雲契空餘激浪痕可嗟摧折盡詎得上河源登思禅寺上方經脩竹茂林劉長卿上方幽且暮䑓殿隠朦朧集作䝉籠逺磬秋山裏清猿古木中衆溪連竹路諸嶺共松風倘許棲林下甘成白首翁同李郎浄律師院梔子樹包何南國佳人去不廽洛陽才子更湏媒綺琴白雪無情棄羅幌清風到曉開冉冉修篁依戸牖迢迢列宿映樓䑓縱令奔月成仙去且作行雲入夣來古樹張籍古樹枝柯少枯來復幾春露根堪繫馬空腹定藏人蠧節莓苔老燒痕霹靂新若當江浦上行客祭為神石楠樹白居易可憐顔色好隂凉葉剪紅牋花撲霜傘葢低垂金翡翠薰籠亂搭繡衣裳春芽細炷千燈熖夏蘂濃焚百和香見説上林無此樹只教桃栁占年芳移家别樹戎昱千種庭前樹人移樹不移看花愁作别不及未栽時種樹于鵠一樹新栽益四鄰野夫如到舊山春樹成多是人先老垂白看他攀折人漢隂亭樹趙嘏碧樹如煙覆晩波清秋欲盡客重過家園亦有如煙樹鴻鴈不來風雨多路傍樹馬戴古樹何人種清隂减昔時莓苔根半露風雨一作雪節偏危蟲蠧心将穴蟬催葉向衰樵童不湏剪聊起邵公思山中古木盧綸髙林已蕭索夜雨復秋風墜葉鳴荒竹斜根擁斷集作亂蓬半侵山色集作影裏長在水聲中此地何人到雲門去亦通石橋琪樹蔡隐石山上天将近人間路漸遥誰當雲裏見知欲渡仙橋佳人故居琪樹集作桂州經佳人故居李羣玉種樹人何在攀枝空嘆嗟人無重見日樹有毎年花舊院雀集作蕉聲暮半庭春色集作影斜東風不知恨滿地落餘霞重題端正樹温庭筠路傍佳樹碧雲愁曾侍金輿幸驛樓草木榮枯似人事緑隂寂寞漢陵秋據温庭筠集重題端正樹題望苑驛各是一詩今英華題望苑驛已入二百九十八卷而此篇端正樹却誤以望苑驛詩充之今用集本釐正石楠樹胡汾本自清溪石上生移栽此處一作地稱閒情青雲事盡識珍木白屋人多喚俗名重布緑隂滋蘚色深藏好鳥引雛聲余今一日千廻看毎度看來眼益明臨江樹魚𤣥機草色連荒岸烟波入逺樓葉鋪江水面花落釣人頭根老藏龍窟枝低繫客舟瀟瀟風雨夜驚夢復添愁焦桐樹陳標江上烹魚採野樵鸞枝摧折半曽燒未經良匠材雖散待得知音尾已焦若使琢磨徽白玉便來風律軫青瑶還能萬里傳山水三峽泉聲豈寂寥興善寺貝多樹張喬還應毫末長始見拂丹霄得子從西國成隂見昔朝勢隨雙刹直寒出四墻遥帶月啼春鳥連空噪暝蜩逺根穿古井髙頂起凉飈影動懸燈夜聲繁過雨朝静遲松桂老堅任雪霜凋永共終南在應隨刼火燒雙槿樹張文矩緑影競扶踈紅姿相照灼不覺桃李亂一作花更一作亂向春風落藤詠藤李嶠吐葉依松磴野苗長石䑓神農嘗藥罷質子寄書來色映葡萄架花分竹葉杯金隄不見識玉潤幾重開石上藤岑參見集本石上生孤藤弱蔓依石長不逄髙枝引未得凌空上何處可堪托一作堪托身為君長萬丈潭上紫藤李徳裕故鄉春欲盡一嵗芳難再巖樹已青葱吾廬日堪愛幽蹊人未去芳草行應礙遥憶紫藤垂繁英照潭黛和友人許棠題宣平里古藤張蠙見集本欲結千年茂生來便近松迸根通井潤交葉覆庭穠厯代頻更主盤空漸變龍晝風圓影亂宵雨細聲重葢宻勝丹桂層危類逺峰嫩條懸野䑕枯節呌秋蛩翠老霜難蝕皴多蘚乍封幾家遥共翫何寺不堪容客對㤀離榻僧看誤過鐘頃因陪預作終夕遶枝笻文苑英華巻三百二十六
