body:
  text: 文苑英華卷五百八十二宋李昉等編宰相雜謝一雜謝表二卷英華所編失年代今以先後正之為左相宗楚客謝知政事表一首為宋尚書謝加三品表一首為兵部王尚書謝加門下三品表一首代宰相謝加銀青并郡公表一首謝門下侍郎平章事表二首代嚴大夫謝黃門侍郎表一首為盧相公謝除中書侍郎表一首為趙庶子謝平章事表一首為崔相公謝門下侍郎表一首代杜司徒謝平章事表一首代人謝平章事表一首代王相公謝加門下侍郎食邑表一首代崔相公謝加中書侍郎食邑表一首代史館王相公謝加食邑實封表一首代中書孫相公謝登庸表一首代陸相公謝再入表一首代史館王相公謝監修國史鹽鐵使表一首為左相宗楚客謝知政事表武后李嶠長安四年臣某言臣志識無取才藝缺然叨預葭莩遂升班秩彈冠受檄曵組登朝內府尸榮以招官謗中臺揆務愈塵政本聖恩無限天造不資仍屈帝難俾參皇極西雍之羽仍所庶幾東郭之毫敢陳誠請九霄從邈三舍不回嚴命必行靦顏何置方持畫虎且對羣龍遂以挈瓶謬膺和鼎空銜作礪之命豈庶磨鉛之功祗拜寵臨伏增慚惕無任悚戴屏營之至謹奉表陳謝以聞為宋尚書謝一作讓加三品表睿宗蘇頲景雲元年臣某言伏奉制書加臣為銀靑光祿大夫餘如故寵榮俯臨一作寵臨俯逮惶怖交集臣某中謝臣爰自弱齡素無一作微逺操僶俯職事豈期聞達二朝揚歷數載塵冒以兹過聽皆是曠官內省寂寥長懷愧負陛下聖明御極多士如林不以臣不才擢升宰輔每侍帷幄未能昭宣景化頃司衡鏡未能澄汰流品一作品流若臣之咎將何以逃又擢一作採臣於循良之末賞於廉問之間一作舉遂出常規猥班休命臣之涯分頓為忝越比者應踐榮秩各限格文欲使無相奪倫較若畫一臣課效多闕勤勞未著爰屬首秋尚居五品名聞之始階方泛及格限之內考復相懸臣何人斯忽當今授臣縱不能鎮靜流弊安敢不罄其愚直首虧不刋之典坐取非據之榮進退失圖心顔何置况國之程式示於天下凡有虧紊過在大臣臣自違之復將焉用臣年未知命識非半古旋叨厚祿仍受隆寄求國章其己默一作而已默顧身老而必然聖朝有刺於在梁微臣生災於瞰室豈唯簮紱之耻抑亦邦家之羞伏乞天恩曲流成貸矜其至懇知匪飾詞反汗收綸亦一作實臣之幸臣無任切逼之至為兵部王尚書謝加門下三品表𤣥宗張九齡開元十一年臣晙言伏奉今月二十九日制敕授臣兵部尚書同中書門下三品殊常寵榮集作靈妄集疲朽承恩竊喜任重憂深集作惟憂臣誠歡誠恐臣伏以虛受之難魯史誠以量力滿盈之患集作過夏載陳其招損一作損益非臣昔集作階緣試吏際會登朝遂得入拜尚書比天之喉舌出鎮方伯集作出典方鎮為王之爪牙雖忠烈之誠心知所竭而績用之美歲久無聞今陛下不以為愚四字集作不以不能為光為寵置之廟堂之上委集作參以軍國之謀實恐鼎足不任鵜翼為刺退失微臣之守上纍陛下之明是以一集作永夕九飛終朝三省泉谷為懼氷炭在懷道路改觀於將行班位一作列固慙於幸得十四字集作道雖願於將行位固慙於幸得臣已有别狀具所讓人猶蒙曲私未寢嚴命方欲俯僂恭命對揚休光磨鉛效於一割策蹇同於十駕臣誠懼塵台席繆齒國華將何以允答鴻私弼諧大化拜命祗懼罔知所為臣不勝荷懼之至謹奉表陳謝以聞臣誠惶誠恐謹言代宰相謝加銀青并郡公表臣某言伏奉今日制書加臣銀青光祿大夫特封河內郡開國公食邑二千户承命戰兢伏詔惶駭拜抃一作舞無次感涕失容中謝臣纍代宗儒傳經素位所以勉修學藝將業其官而文愧承家識非半古本期代耕之祿稍階載筆之地幸忝近署久侍內朝謬霑雨露之恩頗甄歲月之效獲承大命謝謨訓之規載忝有司無辨論之實既虛職守常懼滿盈無日不思每期負敗當時同列咸一作衆所明知豈意朝廷方正於紀綱天地忽私於微細擢升佐輔望出羣情陳乞靡從曠廢何甚在萬邦之化首處百辟之儀刑出自諸生猥當非據所以風雨愆候年歲不登邊徼一作檄交馳田租減耗凡此數事職臣之由歷觀舊典合貶優秩纍因陛下奏獻封章天威俯臨微誠屢奪雖瀝懇無報期至誠必通上仰於朝庶幾諧願受策於第是所甘心方祈獲免之時更遇非常之賜特承七命之貴超過八階仍叨五等之榮坐封千里雖庭堅謨弼之德山甫將明之才頓遇今恩亦稱踰分况臣道慚先哲識類平人未遂退還已紆聖眷頻繁寵拜實懼宸命一作神明伏乞俯照血誠特回睿㫖夫上有無功之授則下多不勸之嫌涓滴之勞未彰於近掖風塵之議將集於逺方所以撫心疚懷不敢奉詔拜手流汗詎容飾詞無任慙惶之至謝一作讓門下侍郎平章事第一表代宗常衮大厯十二年四月臣衮言伏奉今日恩㫖除臣門下侍郎平章事祗奉失圖進退無據捧詔驚一作兢駭䘖恩戰惶微存懇誠得自陳露臣某誠惶誠恐稽首頓首臣本粗𫝊舊業猥以文藝獲一作辱於職官去歲已前尚忝絲綸之末今年夏首一作首夏遂登鈞石之司舊德名臣當朝宿齒不忝此選獨進非才撫己再思胡顔自處伏以朝廷新有處分重舉典章而上禀睿謀下清庶品或作物通於元本一作元本或作元品猶懼匪服之嫌訪於顓蒙將貽覆餗之責伏乞俯回天鑒更擇時賢則三階有協贊之功兩府無虛一作尸曠之誚無任惶恐之至第二表臣衮言臣退省無堪恐辱所一作寵授是一作所以昧死上言拜手頓首讓于百辟一有卿字士冀回宸鑒以遂至公鴻私復降墨詔未允慙赧惶怖不知所圖臣某誠惶誠恐稽首頓首臣聞左右惟賢國安在相處具瞻一有儀表字之地當賦政一有興化字之源故有開必先𤣥感幽贊軒皇則三台作配虞舜則五臣一作老同遊殷夢帝而得說周降神而生甫用能洽皇王之道致天地之和至於漢興一用人傑爰及江表猶擇一作資偉才當此大任固非常品臣性惟愚拙才無經濟徒以趙宫覩聖逮事先朝潁川扈蹕獲承中顧凡所履歷莫非塵忝出於始望之外不知自至之由豈謂𤣥造曲成大明私照俾佐邦政得參廟謀一作謨竊以當今樞務之重在昔上公之任臣識非通鑒一作𫝊不可以論道文非雅正不足以經邦德不能鎮撫四夷政不能親附百姓况戎車尚駕邊患未寧方欲𢎞濟艱難以崇大化豈齷齪三字一作故非齷齪廉謹所能稱職若不自揣度苟貪寵榮寧止尸官備員期於鼎折棟橈伏乞訪求羣議選用上才使聖朝有則哲之明臣下無虛據一作受之責蹐天局地一作傾血汚地誓將死請如或聖眷俯回實亦天下幸甚無任懇逼屏營之至謹奉表陳乞代嚴大夫謝黃門侍郎表臣武言伏奉今月十日恩制除臣黃門侍郎忽降紫泥擢升黃閣出自非望感恩戰懼臣某中謝臣才乏經綸時逢際會纍更天秩何補聖朝三踐掖垣九除憲府久慙在政一作有慙達政空忝觸邪犀節四持亂繩不理牙璋再建一作馳橫草無功既曠職於神州又尸官於華省屬犬戎猾夏鑾駕省方未殄國讐正當臣辱陛下分麾以討𫝊檄自安空隨冗從之流竟乏橫行之議尚多淹致一作尚淹致命仍更冒榮方扈宸遊遽膺夕拜久缺斯任永難其人本求英儒將備顧問素無學術何以允諧竊汙軒一作詩屏謬塵鎖闥寵榮非望祗荷失圖恩重才微難於捧戴眷深效淺祗益兢惶上答生成唯知死節無任感戴屏營之至一作皆唐類表唐門下侍郎黃門東臺鑾臺同掌二侍中之職帶平章事者固是宰相如禇遂良崔日用皆為黃門侍郎或參綜朝政或參知機務亦宰相之任今嚴武表誤入宰相門殆以此耳為盧相公謝除中書侍郎表貞元十一年正月六日權德輿臣邁言伏奉今月日恩制授一作命除臣中書侍郎同中書門下平章事祗奉詔命循省妄庸感恩量力不知所措中謝臣聞宰相者叙四時之化順萬物之宜用贊裁成使之茂遂而中書密勿庶政本源以奉大猷是為右弼臣實凡輩本無他能家尚儒風獲承緒業因緣忝幸踐履班榮誠不自意忽焉過量台司待罪已涉三年妨賢既久內省一作訟彌切蓋廉謹戒懼人之常分而訏謨教化宜擇全才陛下在宥萬方躬勤百度豈虞賤質再沐睿慈特遷紫薇實玷皇極臣面所陳讓推於至公天鑒未回進退惶灼且使一作假人以器知臣者君猶冀鴻私俯察愚懇害盈之禍敢受微軀覆餗之憂難抑公議無任感恩怖懼之至謹奉表陳謝以聞為趙庶子謝平章事表貞元十二年十一月十一日前人臣宗儒言臣伏奉今日恩制除臣為同中書門下平章事祗荷承命捧讀詔書心魂震驚拜抃失所中謝臣聞燮贊化源參和鼎實上合一德以平六符苟非其人所繫斯重臣本虛薄素無器能徒以文藝獲承代業比肩多士陳力清時纍叨渥恩踐履官序頃歲奉職中禁草議南宫遂忝左曹列於近侍顧常內訟已慮曠官豈惟宸眷特加擢在非據伏自循省不知所安且臣去冬尚守郎吏今才一歲遂備台司苟集作自非全才難塞公議雖鞠躬匪懈心盡事君之誠而宣化賦政恐纍知臣之舉生成難報覆餗足憂伏以面奉德音不敢更有陳讓拜章感涕上答何階無任荷戴惶懼之至謹奉表陳謝以聞為崔相公謝門下侍郎表貞元十四年七月二十七日前人臣損言審已無庸謬膺寵授昨所陳讓逼於懇誠冀全至公豈敢外飾黃閣務重非才實難墨詔復臨捧讀增懼臣聞惟君知臣任之以器惟臣事君量而後入生逢昌運自比可封之人職任集作佐台司難逃竊位之責三年待罪表章不敢纍瀆宸扆雖誓心畢命以竭微衷而折足覆餗其如公議無任感恩惶懼之至謹奉表陳謝以聞代杜司徒謝平章事表劉禹錫臣某言臣伏蒙奬拔超踐鈞衡慮玷大猷昧死陳讓再奉嚴㫖不令固辭恩厚命輕位高責重中謝臣聞天下安危注意將相處論道具瞻之地當總戎作鎮之權雖叶夢而求無聞秉鉞之寄登壇以拜不兼調鼎之榮授受一作命惟難伊昔猶爾况臣庸瑣類表作蒙瞽何以克堪陛下𤣥造曲成大明私照俾掌戎律復參廟謨寵光之命在臣已極毫髮之效於國何施謹當罄竭微誠奉遵至教仗天威以懾不順類表作類敷聖澤以遂羣生上分旰食之憂下塞素餐之責力誠不足心實念兹伏乞皇明俯賜照鑒臣恪居官次遐守藩維不獲伏謝彤庭陳露丹慊一作悃心存闕下同犬馬之戀恩身在淮濆仰雲天而結思一作恨無任懇悃屏營之至代人謝平章事表穆宗白居易長慶二年臣稹言伏奉今月日制書授臣守本官同中書門下平章事者殊常之命非望之恩出自宸衷加於凡陋竦駭震越不知所為臣某誠惶誠恐頓首頓首臣伏惟近例宰相上後合獻表陳謝臣今所獻與衆不同伏惟聖慈特賜留聽臣伏聞𤣥宗即位之初姚元崇為宰相元崇欲救時弊獻事十條未得請問不立相位𤣥宗明聖盡許行之遂致太平實由於此陛下視今日天下何如開元天下微臣自知才用亦逺不逮集作及元崇若又僶俯懷安因循保位不唯恩德是負實亦軍國可憂臣欲候侍集無侍字坐對時便陳當今切事下救時弊上酬君恩臣之誓心為日久矣陛下許行則進不許則退進退之分斷之不疑敢於事前先此陳啓况臣才本庸賤遭遇聖明天心自知不因人進擢居禁署方以密謀恩奬太深讒謗並至雖內省行事無愧於集作所愧心然上黷宸嚴一作聽合當死責豈意憐察曲賜安全螻蟻之生得到今集作自兹日超越流輩授以台衡拔於萬死之中置集作致在九天集作震之上捫心揣已審分量恩陛下猶不以衆人之心待臣臣豈敢以衆人之心事上皇天白日實鑒臣心得獻前言雖死無恨無任感恩懇欵屏營之至謹奉表陳謝以聞臣某誠惶誠恐頓首頓首謹言代王相公謝加門下侍郎食邑表昭宗錢珝臣某言昨蒙恩命授臣某官等者今月日已奉表陳讓跪承批詔未賜允從方就日以傾心若履氷而舉足臣某中謝臣立朝一作身守嗣莫繼前修學古入官敢期高位伏遇尊號皇帝陛下道惟樂育志在紹聞待河清而先靜化源致俗阜而深探理窟當乙夜縱觀之後啓輔臣夢得之休而遽以平衡授兹弱質頗乖庶政莫達大經何施作相之才但纍知臣之鑒厭兵而五兵尚在唯恐人殘祈穀而百穀未升仍憂歲旱尋宜待罪已合避賢陛下愼以退人容於竊位兼回睿眷遽正台階進當浴鳯之榮更懼惟鵜之刺况增封建俾重弼諧臣且自量則為不稱是以陳辭瀝懇冀動天心拜章而方謂可安捧詔而未嘗得請尚希終收渥澤遂寢典彛苟責實而有聞信假寵之非晚狥之公道寤主所圖受爵既多懼君恩之太盛省躬甚拙知官謗之必興負戴聖慈臣某無任感激兢悸之至代崔相公謝加中書侍郎食邑表昭宗前人臣某言伏奉今月某日制書授臣中書侍郎仍進封開國子加食邑二百户者寵踰素分憂集微躬臣某中謝臣聞當可舉而後行則彛倫叙見有功而後進則勞臣勸如或行不可舉進不見功是謂謬恩實維一作難虛授臣學非練達質異溫良致身而敢望坐茵措手而寧期補衮嘗塵侍從且昧論思既無酒誥之能莫並食時之敏忽蒙聖造遽委化權佐運行而不應中台論燮理而未周四序何言睿澤曲被微臣才叨正秩之榮兼進疏封之命戴恩無力臨事知非將投盈篋之書寧用濟川之楫願回𤣥鑒俯徇愚衷致公器之無私在國章而克一作益重光昭一作克光聖德復戒貪夫仰望皇私臣某無任懇悃激切兢悸之至代史館王相公謝加食邑實封表昭宗前人臣某言伏奉今月某日恩制加臣食邑實封若干者充位代天無名益地祗膺茂寵併集百憂中謝臣聞賞以昭其功典以載其事是為重柄用合大經苟功不足昭事非可載濫承休命實纍皇猷臣謬執化權無裨衮職徒見容於君父每受責於神靈頃者陛下薄狩近藩復興否運寬仁屈已神武去邪敢有惑於羣謀實無渝於睿斷寰區之內耳目同驚此非臣齷齪之心所能匡替重圖反國艱若設都仗戎師以經營寄輔臣而鎮撫秦人載聚周廟克成千門既啓於建章萬騎仍隨於司𨽻宸居復正懸法更高又非蒙昧之才所能施展荷𤣥一作景貺而寧參天力奉清光而徒和山呼無補艱難方懷慙懼詎謂聖慈忽被異數仍加賞優而欲舉何功典重而將言何事况乎真食尤曰寵榮輕行於富庶之秋皆期必稱尚屬於艱難之日焉可非宜伏冀聖慈必收殊渥臣某無任仰望逼切懇悃屏營之至代中書孫相公謝登庸表前人乾寧二年臣偓言伏奉今月某日制命授臣中書侍郎同中書門下平章事者渥澤自天怔忪無地臣某中謝臣聞佐天子理隂陽撫四夷遂萬物者宰相之職也然而能經國則可以佐天子達化源即可以理隂陽善柔服可以撫四夷適方圓可以遂萬物今臣才非經國智昧化源不知柔服之謀未達方圓之道使之執政必致曠官伏惟皇帝陛下與天同覆與日合明有言必訪於芻蕘有用必搜於林藪今者初當出狩且欲興戎修至德以弭災動神機以伐叛復亨否運昭告𤣥穹是宜愼擇賢良光輔睿哲臣志雖懋學器異混成但為章句之徒莫應權衡之任陛下明恩委照聖鑑洞開拔於駁正之司置在仰成之地越諸彛典授以洪鈞空驚行潦之流忽載大川之楫遭逢獨異寢寐終疑願回非次之榮且降可行之命立朝在野必有其人省已捫心莫知所措臣某無任感恩荷聖兢懼屏營之至代陸相公謝再入表昭宗前人光化二年臣扆言臣昨蒙恩制除授中書侍郎同中書門下平章事今日面宣聖㫖不令更有陳讓者臣聞虞舜成湯之為君也舉臯陶伊尹之賢處補衮宰衡之任不仁自逺大道甚夷上可致君下可遂物相須之用古策具書獲彼寵靈再當燮理仰成之重內省至難披肝膈之所藏冀封章之可達煩言無取睿眷莫回親奉清光復傾丹懇讓不容於稽首進何務以沃心臣誠憂誠感頓首頓首伏惟尊號皇帝陛下濬哲守文高明立極廣好問則裕之美推任賢勿二之誠思舉直以化人待封比屋念偃兵而屈己欲拜昌言是宜愼擇濟川博求在野並稷契之稱前代若姚宋之贊本朝使竭謨猷以光輔弼臣器殊王佐質謝卿才常念立身但希承嗣未曉必聞之政合居不急之官雖臨事秉心如稱敢期於輕重而自天率性佩弦亦戒於因循頃者徒幸遭逢且乖斟酌既塵公餗果驗素飱旋叨就列之榮每荷匿瑕之道今者忽流霑澤又執洪鈞信夢寢一作寐之難期詎蓍龜之可卜頃雖當軸竊類代庖是非誠畏於人言去就敢違於君命中台不耀先慙箕斗之光元首自明何效股肱之力銜恩匪稱揣分彌憂詞不盡於抽毫淚空知於承睫負戴聖造辭莫能揮臣某無任感激榮抃屏營之至謹言代史館王相公謝監修國史鹽鐡使表昭宗前人乾寧四年臣博言伏奉今月某日制書加授臣門下侍郎監修國史充諸道轉運鹽鐡等使者進當辨色動乏書思寵光忽降於昭回循揣空知於隕越中謝臣聞可衛社稷謂之大臣有利國家是為公輔大臣所以能經濟公輔所以竭訏謨儻昧於斯則同備位臣為儒孤陋守嗣陵遲既無稽古之勤止望易農之仕安敢苟求進達濫買名聲但任顓愚獲逢濬哲聨叨服冕遽至秉鈞而莫貢昌言多隳庶績復致省方之難皆由失職之愆且合自拘敢期策免陛下克固知臣之鑒每推責己之誠雖罷燮調猶當節制捧彤弓而欲去尚抱憂心指金鉉以復留終回宸眷輔相之委近代所無不才何補於股肱有感徒深於骨髓伏遇陛下勃興景祚丕變公朝掃蔽日之浮雲納投水之堅石應機之急當寧不違從諌之明轉圜未速仰觀奮發實在斯須聖政惟新墜章咸舉宜求耆碩共致承平今臣曲被睿慈仍加霈澤黃樞正秩青史專修兼司運漕之權俾集牢籠之利屏躬承命俯首退思固合避賢唯憂致寇保其終始賜以安全陛下且許乞骸不令覆餗徇公為理擇善任人幸非伯石一作安石非之情敢待召平之說且移盛寵别授通材顧叶澄清仍資庶富而近臣遽降一作近遽辭免聖㫖重臨難陳固讓之辭唯勵恪居之志雖多言可畏垂黈纊而有所不聞而內省堪憂補𤣥衮而何能自效臣某無任荷恩榮耀兢載怔忪之至文苑英華卷五百八十二
