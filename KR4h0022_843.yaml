body:
  text: 文苑英華卷八百四十四宋李昉等編封禪大周降禪碑李嶠愚臣觀象銅衡紬文金版變化莫神于開闢崇髙莫大于富貴隂陽密運帝王操輔相之機厯數潛回穹壤授甄陶之業故謂上下同德幽明合契靈祇有命既錫造于雍熙人主推功必申虔乎報謁奉符而勤一作勒是成展乎疑作宷修祀而益厚增髙有道存焉其來尚矣自旦昏交謝文質遞遷朴略洪荒上行于萬八千嵗陵夷因革下傳于七十二家披圖而考其樹風按軌而詳其陳迹莫不祗肅其事神明其道龍駕帝服疆場于鄒魯之埛犧尊象彛藁秸于云亭之上咸就發生之宇以為禮神之宅未有回輿按驛覲中土之神靈刻石泥金崇外方之禋祀名臣于是乎斷其去就良史一作吏非于是乎題其失得然則置表測日陽城當六氣之交際一作傑凝林奠山太室為九封之長神翰降生于廊廡王畿仰矚于峯岫風雷所蓄俯鎮于三河辰緯所躔旁臨于四嶽立崇乾事坤之兆疏就下因髙之位捨此地也疇其尚焉歷千載而撰徽音罕聞先覺超百王而崇軌躅允資元聖我大周之有天下也鼓道德之林藪恢聖神之事業始于閫閾成于家邦輝光燭于兩朝德澤流于八裔登庸納麓一作録則舜有大功錫範陳謨則禹濟元后謳歌而鼎新革故揖讓而改物承天由牝馬而御飛龍自頺沙而臻練疑作鍊石蓋千帝所不能及六籍所不能談若夫兆朕鴻源絪緼寶系載千嗣于改律窮桑連乎夢梓皇天眷命積大寶而為家聖道會昌擁洪爐而作極神基將偃伏搆仙𣲖于昭回同逺太祖無上孝祖髙帝合一作含幾察道盡睿窮神屈帝象而龍潛座台庭而虎變黃星造魏而文握漢圖赤羽興熙疑作姬而武遷商鼎天册金輪聖神皇帝遂荒三極奄有萬方御六辨而髙馳慿九霄而下濟若乃玄通不測之智神用無方之業超因越果名流于貝葉之書應物隨緣迹滿于蓮花之會祕恍忽于言象徴希微于讖籙亦猶寶應慈物推心坐雄帝之朝吉祥哀時屈巳登女皇之位此之謂神力張寰立宇蕩海夷山正八柱之低昻理三光之盈縮乾坤一作象關鑰于廡下品物爐錘于堂一作掌內春生夏長循環奉亭毒之仁暑往寒來奔走赴財成之節此之謂天造左規右制俯察仰觀揆朱鳥于南宫契玄龜于東洛天威四臨而有截王道一家而無外均霜調露正六合之樞機叶軌同文立三川之朝市此之謂建國臨户牖之法座垂星辰之采章嚮明而居端默以聽號令存于寬大規畫出于易簡循名責實而苟且之弊銷極深研幾而變通之理得此之謂立政熖煙灰之墜典寫溪谷之遺音無體無容與天地同節有法有象共隂陽通氣引之而被乎百代橫之而充乎四海此之謂禮樂雷電皆至先王以折獄致刑嵗月履端君子以懸書立法殊井疆而知禁畫衣冠而不犯疏械破杻掩方載而勝殘解網取罘閉圓扉而靜讞此之謂刑典操盾秉翳立于賔主之階縫掖摳衣聚之東西之學辨尊卑于章服觀禮容于爼豆委裘多暇合九德以成歌垂拱無為援五絃而度曲此之謂文教因農隙而講事順天時而鞠旅定功在于歸一作休馬保大由乎止戈然後干苞虎皮箭射貍首鞞鼓不作廟堂懸百勝之威尉候無虞征戍罷三邊之役此之謂武德籍乎千畝所以備粢盛齊于九疑所以嚴禋享苞茅潔乎楚入樽爼隆乎殷奠于穆顯相而公侯駿奔肅雍和鳴而祖考來格此之謂孝理金玉是賤委于嶄巖之山輿馬不珍捐其騕裊之服御髙辛之黃黼垂孝文之皂綈栝柱茅茨未能埓其卑損藜羮糗飯無以儔其菲薄此之謂沖挹任臯夔衡旦之輔酌虞夏商周之書網羅并包商摧擬議衆目張而彛倫敘羣才用而庶績康野無遺賢朝無闕典猶且昧旦勤懇方宵厲惕虛心解顔博愛兼聽防六事察五聲檢身有常視凖繩而為度祗德罔倦刻盤盂而自警遺身主于循物勞巳存乎逸人是以恩澤流通教化洽著龍荒鼠徼覃宇外之雍熙鳳穴麟洲奉寰中之度律逺安邇肅地平天成一作天平地成玉律調年珠囊叶紀棲京坻于隴畝逸馬牛于衢路惸嫠蒙餼班白不提閭閻無犬吠之驚風俗有鶉居之暇原隰驅軺之使採詩聽歌災畬一作緇撮植杖之翁擊壤鼓腹和氣旁薄禎符肹蠁招一角五蹄之仁獸儀九苞六象之仙禽亳墠出其祥麟昆田化其珍物日烏素毛而丹喙天龜玄甲而青純雲蒸霧涌拜九洛之璿圖電激雷奔受三清之寶册若乃山鶼海鰈石銘巖篆之符候月搖風連葉駢柯之祉神靈之所酬酢廣大之所薦成紛綸葳蕤紹至疊見董狐之窮墨罄簡書而未周夷吾之傾辨畢辭談而不盡升平之浹洽也如彼符命之昭彰也若此固可以循類帝之事奉丕天之律聖上方固懷讓德虔守謙光升中之儀推而不蒞也于是王公庶尹牧伯羣寮粵耆艾惇龎之儒洎蠻夷戎狄之長咸進而稱曰陛下欽承元命對越上玄廓天地之宏圖張祖宗之丕業臣妾四極驅馭百靈鼓舞發育經緯彌綸之績宣滲漉沉潛懷柔容保之恩備是以人祇順德遐邇宅心玄符畢臻黃瑞盡出幽贊乎祖考一作考姓之茂烈發明乎施尊之盛儀意者三塗滅氛二室儲貺以望屬車之塵久矣帝者雖倦焉得距而巳乎伏願坦至公之懷捐獨善之意欽若大典疇咨故實上以光七廟之休德下以納羣生之福祐長為稱首豈不美歟帝曰俞哉乃包含藝文考練風俗採儒術徴禮官窺五嵗之典章核四朝之制度叔孫掌事容成諏日以天册萬嵗二年臘月乙亥闢丹掖開紫微撫玄虬按黃道叶紀先路靈威並轂五戎促節旗常一作旌旗畫垂象之文六甲分營壁壘曖太隂之氣雷動海運天回星轉踰鼎觀而南下望圭臺而左薄陸離方攘煥炳聿皇以屆夫嵩陽萬乘停鑣百司就列文物隱地遺光滿于竹一作獨非宫輿徒沸川輕壒埋于石柱天子乃幸齊寢披仙幄靡薜荔之席陟蟺蜎之臺惟夫蠲意澄心所以至誠盡敬于是乎山祗護野風伯清塵玉醴潛滋金砂暗涌神鐘驚曙峯巖傳九乳之音寒律移暄草樹動三陽之色徴祥之報影響不違壬午柴燎祀昊天上帝于南嶽顯祖立極文穆皇帝太祖無上孝明髙皇帝侑神作主天子戴圓冕披大裘登三垓植四邸藉陳蒩秸器用陶匏髙炎四施耀流沙而燭滄海廣樂六變來象物而降天神感霏煙瑞一作潏露之徴延薰風景星之祉大禮既畢應嘉既臻思欲契精爽于髙明剖靈符于峻極甲申御金蹕登玉輿環拱百神導從羣后遂陵桂蕚攀松蹬跨峥嶸而出煙道排列缺而羾天門羽節髙揮上下鳥星之次龜壇下映俯瞰鵬雲之色瓊文祕檢絡之以銀繩寶算休期探之于金䇿交大靈于咫尺受洪釐于億萬然後倘佯煙霄怊悵古昔凝神于九天之上逰目于八紘之表眷觸石之雷雨爰覃作解之恩仰斗杓之運行仍布惟新之令是曰大赦改元為萬嵗登封元年歡洽幽明慶沾動植千齡之統由聖代而連九皇萬嵗之音自神仙而周四海休氣低而翔輦神光起而屬天抃舞相趍以降于行殿丁亥禪祭后土于少室下趾東南顯祖妣立極文穆皇后太祖妣無上孝眀髙皇后侑神作主戈矛山立玉帛星陳登澗沼之毛輯江淮之物禹會之殊方異俗俱執豆籩漢祠之偉獸珍禽悉加壇墠撫空桑之琴瑟㪺鬱鬯之樽罍咸秩衆靈遍祀羣望席以黃琮為鎮書以青石為緘元封之謁款一作款謁方丘儀因東峙建武之推功太折禮視北郊陽烏珥而仙鶴飛紫雲騰而黃霧起靈之來兮如雨瑞之委兮如山于是事畢功𢎞禮周慶洽方欲輯圭璧陳韎任鋪六代之禮文受萬邦之朝賀宏規大業其盛矣哉蓋淳源寖衰叔葉多故神器不還于至道尊名或假于涼德秦嬴極暴企踵于無為之朝漢徹窮奢厚顔于盛德之事人不見義其來自久我后首出帝先遂康天步登封降禪握宇宙之樞衡立顯崇功一作從初定皇王之軌式鴻勳上格于窮昊厚福旁浸于黎元煒煒煌煌亘寰區而宣壯麗巍巍蕩蕩橫山丘而殷聲名固巳轥前聖之規模開含靈之耳目方使炎農抱愧愕睨一作眙于梁甫之阿姚舜欽風延佇于崇髙之路天下之功成矣域中之能事畢矣昔者鳥獸率舞一人賦元首之篇戎夷來賔四子詠中和之樂時僅平而頌作俗未泰而歌興况乎咸五登三逺承文武之烈襲六為七近叶春秋之義神功與二儀並運顯號將七曜俱懸豈可使時邁無詩于皇不作臣嶠謬忝司牧躬陪錯事末光幸煦長傾捧日之心仙石徒攀終愧凌雲之筆敢承明制而為頌云天命上君君臨下土靈祗允懷品物咸覩翕受三六時乘九五于昭文明粵若稽古關鎖一作鑰六氣庭衢八荒殊鄰筐篚絶黨梯航河海晏謐閭閻阜昌琴橫帝扆鼓卧邊場齊衡均度制禮作樂武戢五戎文興四學法宫布政靈臺視朔化偃中和人還太朴湛恩布濩協氣氛氲嘉庾嵗積休符日聞祥開草樹慶動煙雲乾册丹篆河圖紫文欽若元命率由前典道洽升中功成丕顯神策演卦名山除墠翠鳳銜蕤玄龍御辨回鑾左屆弭節中樞萬騎雷動羣方電趨層壇殷薦登鑾山符駐輦星躔交神漢曲雷雨下濟輝光仰燭地户開扉天牢罷獄萬嵗重熙三辰改旭迎隂廣澤報地方畦庭合六舞筵陳兩圭神靈第一作茅瑞臣象天犀牒貫銀縷函封金泥禮具德明神觀瑞浹儲算玉斗賜齡金篋知崇髙之可封悟梁甫之虛躡敷帝道於一藝振天聲於萬葉文苑英華卷八百四十四
