body:
  text: 文苑英華卷三百八十宋李昉等編北省一侍中沈文季加侍中詔沈約門下散騎常侍尚書左僕射西豐縣開國侯新除鎮軍將軍沈文季業宇流正鑑識超凡秉兹恭恪誠著匪躬難起非慮密邇墉圻疑罄力盡勤萬雉增固寵服攸加實為朝典可侍中僕射新除侯如故主者速施行崔慧景加侍中詔門下護軍將軍樂安縣開國子慧景志氣淹通識履詳正誠烈欵盡義簡朕心加榮近侍抑惟廟疑序可加侍中子如故主者速施行王亮王瑩加授詔門下京輔葉貫端副要重政首民經任切朝寄尚書左僕射亮濬哲淵深道風清邈時京疑民譽僉望所歸中領軍南徐州大中正南鄉侯瑩德宇夷曠鑑識凝逺闕協隆內外允諧逆徒從慝躬衛時難氛祲既澄並宜光贊緝熙穆兹景化亮可侍中丹陽尹瑩可侍中尚書左僕射本官中正侯並如故主者速施行臨川王子晉南康侯子恪遷授詔前人門下侍中臨川王子晉志業清敏器尚夷通祕書監右領軍南康縣開國侯子恪理識間悟思懷韻警宜出聞朝政入侍帷幄子晉可左臣疑是民字避唐諱尚書子恪可侍中王侯並如故主者速施行王茂加侍中詔門下居中作衛號望清重任總儲宫朝難其選望蔡縣開國公新除尚書右僕射茂器度淹𢎞志局詳穩契闊艱夷情深恆寄顯命載加允副僉屬可侍中衛將軍領太子詹事開國公如故給鼓吹一部主者施行中書令授張説中書令制蘇頲門下咸有其德委廊廟之元宰知無不為歸掖垣之成務銀青光祿大夫檢校中書令上柱國燕國公張説含和育粹特表人師懸解精通見期王佐立言布唐詔令作希文武之用定䇿勵忠公之典才冠代而不有功至大而若虛自頃𢎞益時政發揮王道萬事必理一心從乂以觀其獨伯起慎於四知常得其貞叔敖謹於三省詔令作者故能深而不竭久而彌芳宣大號於紫宸潤昌圖於清禁我憑柱石爾作鹽梅正名之謂群議斯集可守中書令散官勳封如故主者施行先天二年九月十一日授姚崇兼紫微令制黃門天之紫微地在清禁宰臣為重庶政攸先不有殊才曷云兼寄金紫光祿大夫兵部尚書同紫微黃門三品監修國史上柱國梁國公姚崇河山粹氣禮樂清英德量在寬公心益厚詔令作謹詞必體要行之自逺學以窮微志於可大允兹忠讜光我謀謨聞善若驚欲仁斯至衣冠以為蓍蔡廊廟資其柱石朕之欽者管樂人之傑者蕭張遂能以身許國開物成務邦是用乂朝惟得賢北辰環拱西垣近密俾因題劍之榮式演如絲之命可兼紫微令餘如故主者施行開元元年十月二十日授劉幽求同中書門下三品制前人門下弼諧庶政亮采有邦不遇人傑孰膺王佐金紫光祿大夫守尚書左僕射知軍國大事監修國史上柱國徐國公劉幽求偉量天假宏才代出子産之道四既取諸身咎繇之德九以成其用伊昔遘屯感義詔令作憤謀始洎于開泰防萌釁初景化俟其丹青讒詞變於白黑頃居炎瘴受釐之對莫聞重踐台衡從政之言益啓眷兹密勿方聽訏謨宜兼委於掖垣仍具瞻於禮闥可同中書門下三品餘如故主者施行先天二年九月八日門下侍郎授崔日用黃門侍郎制門下才為於時以宣可大之業精貫於日以定非常之勛古稱王佐今乃人傑大中大夫守兵部侍郎兼知雍州長史修文館學士騎都尉安平縣開國子崔日用果行育德修辭立誠孝則揚親忠於事主堂堂乎貌暢君子之風諤諤其言藴大臣之節故能書讀萬卷文窮四始髙步登朝平心待物日者醜孽未殄嘉謀潛斷臨危不顧見義而作是用底寧實所繄賴師兵戢矣京兆晏如宜緝台階之政式拜掖垣之寵可銀青光祿大夫行黃門侍郎參知機務學士勳封如故主者施行授張庭圭黃門侍郎黃門東西禁掖出納王言精選賢良用存駮正正議大夫行尚書禮部侍郎上柱國兼判尚書左丞張廷圭文儒秀士謇諤忠貞汪洋有大雅之風明敏得至公之操言惟及霤曩嵗嘗聞學則臨池當時莫比自歷遷臺省受理綱轄聲塵益茂問實攸稱俾登青闥之榮式踐丹墀之列可黃門侍郎勳如故主者施行中書侍郎授薛稷中書侍郎制門下慶傳於家者代濟其美才許於國者時無與讓由是密勿為用訏謨所歸銀青光祿大夫行黃門侍郎修文館學士河東縣開國男參知機務薛稷河汾之英廊廟之寶相門前社則名優作誥詞場舊業則譽動飛文公貞性成仁和道勝坦然之量羣物不干其靜穆如之風九流不測其度頃罹多難克仗嘉謀翼戴朕躬保寧王室厥功茂矣朝廷賴焉俾回踐於綸闈以增輝於鼎席可行中書侍郎餘如故主者施行授徐安貞中書侍郎制孫逖門下中樞之要久闕其官仄席而求實難其選中大夫檢校尚書工部侍郎兼集賢院學士上柱國徐安貞清才特逹雅量深沉為德行之宗師是文詞之雄伯頃司水土兼典圖書博綜維精彌綸有敘王言是屬公議攸歸宜增秩於五字俾齊名於三入可守中書侍郎餘如故左右常侍授解琬左散騎常侍制蘇頲門下散騎之列豐貂入侍選於耆艾用均師友金紫光祿大夫致仕上柱國解琬文合騷雅學殫經籍百城分按南憲是繩萬里出師西戎即序頃以剖符從政解印歸休章既拜而遂行禮及傳而則往雖風規莫擬而志力猶茂乞言伊屬寧忘賜杖之榮替否旁求宜副安車之命可行左散騎常侍散官勳如故主者施行授禇無量右散騎常侍制黃門獻納之任虛求是屬列于侍臣莫匪耆舊銀青光祿大夫前散騎常侍上柱國禇無量佩服純行周旋雅道夙侍金華之講屢膺石渠之命故能禮自柔嘉動多忠益頃在艱罰近終喪禮覃思研精華皓不倦直辭讜議清明可觀俾重春卿之儒還居德璉之任可右散騎常侍勳如故主者施行授王晙左散騎常侍制黃門侍臣之任朝廷所重賞善惟速兼才是先銀青光祿大夫并州大都督府長史上柱國王晙志力堅剛風情慷慨傳為書癖成誦在心言應筆精目懸於手受一方之委惣三軍之令士卒感恩以爭效獯戎滅迹而皆逺功其茂矣朕實休之用憑龍豹之韜更踐貂蟬之位可左散騎常侍兼檢校并州大都督府長史勳如故主者施行授李季卿右散騎常侍李􅉼尚書右丞制常衮門下侍從出入贊清禁之事管轄紏正録中臺之書多用儒雅必求公亮正議大夫守尚書吏部侍郎集賢侍制隴西縣開國子賜紫金魚袋李季卿碩量寬𢎞雄詞典麗道素可尚風猷自逺銀青光祿大夫前行尚書右丞兼御史大夫充河北宣慰使襄武縣開國公李􅉼文以禮樂主於忠信雅有學行通於禮體並才望推重聲華茂著端集作竭誠之效早見於艱虞從政之績備彰於事任簡廉無私純白不染守以直道行其至公載馳輶軒善喻中旨歷踐臺閣率由舊章拔選部之滯才留左曹之駮議士林公族歸美攸多或久次懋官已深於滿嵗或外除過禮且聞於踰月宜遷顧問之職俾膺惣典之授季卿可守右散騎常侍餘如故􅉼可尚書右集作左丞散官封如故主者施行授崔昭右散騎常侍制門下散騎以贊𨗳侍從承答顧問前代參用言語政事之臣集作官俾其盡規忠益以穆朝化也今位望逾重選之更精銀青光祿大夫前京兆尹兼御史中丞博陵縣開國子崔昭經之以文敏紀之以憲則直而不肆剛而能容精識知微長材致逺不易於風雨之晦不爭於險易之途常所委遇多在雄劇理平之美居最一時任畿甸集作邦畿千里之重齊趙張三王之政事當其適義合於權檢肅姦豪撫懷孤老資奉軍國從容贍濟翼翼之化刑集作布于四方豫欲左右有人訪求得失服兹舊列俾爾回翔可守右散騎常侍散官封如故授能元皓左散騎常侍制門下聮八貂之貴同二府之品望尊而事不親地近而職非密蓋賢逹之所尚俾勞臣而處休命集作令所以廣其員而盛其選也太子賔客兼光祿卿上柱國河南郡開國公能元皓以忠烈自將以勇謀用師夷險一心精剛百鍊不奪之節貫於風霜殊常之勳銘在鍾鼎杲更任遇休有令聞出入龍樓已先調護之列優遊騎省載升顧問之地可行左散騎常侍餘如故授郭晞左散騎常侍制勑切問之司實參朝議僉諧之命允屬時髦同朔方節度副使特進試殿中監察御史大夫充朔方先鋒兵馬使上柱國太原郡開國公郭晞文武成器公忠亮集作立節年方稚髦理適經通詩禮之方服於廷訓韜鈐之略稟自朝謀以少年之才雄有老成之持重俾張我武克定西疆業其勳以象賢大其門而出將兵嚴既解朝選攸歸舉以令聞允兹近侍可行左散騎常侍散官勳封如故授蔣渙右散騎常侍制門下獻納之重周爰是咨必擇通賢用光近對銀青光祿大夫光祿卿上柱國汝南郡開國公蔣渙德𢎞禮器學貫儒流孝友彰其令名文詞是其餘力合大雅之明哲逹中庸之隱微清方有恆華皓益固直道而處風猷自髙爰藉論思之才用膺侍從之事副豫良選佇爾嘉言可右散騎常侍散官勳封如故授裴向左散騎常侍制元稹勑周文王侍從之臣無可使結襪者我知之矣左右前後無非令人朕以將壯之年臣妾天下司其忽集作忿速其在於持重溫良之士以鑑之乎前陜虢等州都防禦觀察處置等使中散大夫陜州大都督府長史兼御史中丞萬全縣河東有萬泉縣無萬全縣開國子賜紫金魚袋裴向縉紳之徒言其閨門之行僅至於衣無常主兒無常父矣推是為政仁何逺乎是以發自王畿至于陜服多歷年所終無尤違每移孝友之風以懲強暴之俗甘棠之下廉讓興焉豫欲用垂璫夾乘之官以代吾盤盂韋弦之戒不亦可乎守左騎常侍散官封賜如故授孔戣右散騎常侍制白居易勑昔齊桓公心體懈墮則隰朋侍漢武帝衆本雖同疑是親重儒術則劉向從今之常侍是其任集作選矣中吾選者莫匪正人集作稱其任者唯正人乎大中大夫守尚書吏部侍郎上柱國賜紫金魚袋孔戣言行謹直風操端莊肅然禮容清廟之器始自筮仕至集作迄于天官虛舟為心利刃在手全材具美時論多之可使珥貂立于集作吾左右從容侍從以備顧問隰朋劉向豈逺乎哉可右散騎常侍授歸登右散騎常侍制勑近侍之列騎省為貴歷代迄今選任頗重必詢望實而後命之工部侍郎歸登朴忠沉厚心無適莫集作詭詐介圭不飾止水無波淡然自居以致名稱抱此素行歷踐清貫掌議左掖二職冬官嵗時滋深體望益茂可以備顧問應對之選列言語侍從之臣冠貂附蟬立之于右訪諸時論僉以為然可守右散騎常侍授趙真齡右散騎常侍制杜牧勑仲尼曰慎擇邇臣為人之道集作導夫言語應對之選為顧問耳目之官若非善良必致壅害朝散大夫守太子賔客上柱國漢中郡開國公食邑二千户賜紫金魚趙真齡其先君子祗事祖宗出入屏毗餘四十載爾為令嗣克肖素風好學頗專樹善不倦凡曰賢彥無不與遊雲水登臨多聞放志風塵趨競殊不縈心是以長人有慈惠之名處官無纎介之失其為行已斯亦多矣丹墀文陛之內貂羽金蟬之榮超以授之無忝所舉可守右散騎常侍散官勳封賜如故授令狐定右散騎常侍制崔嘏勑前西川節度副使令狐定夫言語侍從之臣朝夕論思獻納必求明誠端厚文而不佻者以備吾之顧問今以定業茂儒素道光縉紳恬於晉取之機鬱有貞方之譽踐歷華貫周旋正途佐台席而籌畫居多登副車而聲猷甚暢從知既久畢志方歸嘉其委質之誠寵以附蟬之貴阮貂換酒潘直逢秋既榮髙閣之居亦有逹人之美勉思清切以遂優遊可依前件授裴廷裕左散騎常侍制錢翊勑具官裴廷裕國之用材在乎稱職况詞臣之任君命所垂苟詳慎之有乖繫事機而實重既聞輿論得以移官以爾學植素深文鋒甚鋭自居侍從亦謂勤勞乃推遊刃之功庶叶匿瑕之道未能降秩且復立朝珥貂猶假於寵光夾乘仍親於左右將存大體以息多言可依前件授李澥右總目作左散騎常侍制薛廷圭勑國家龍朔中有侍極官今之左右常侍也前代崇寵秩比侍中密參帷幄之謀時號清重之選從容獻納允屬名儒今執政言爾具官李澥地實華腴性惟貞介聚學為已修禮藩身清明照物以忘疲淡泊居貞而有守來司綸誥潤色推工去卧雲山含章見譽增重價誠由於合匱固深根頗異夫揠苖久漏搜羅幾為遺逸升之近署官以豐貂宜俟併伸勉從虛佇可守右散騎常侍文苑英華卷三百八十
