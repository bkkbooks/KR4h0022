body:
  text: 文苑英華卷四百八十八宋李昉等編體用才識兼茂明於體用策二道才識兼茂明於體用策策目見四百八十七卷與元稹同獨孤郁對臣聞天發生以雷雨聖人發生以號令天道帝道並行於上羣僚庶物咸遂於下伏惟陛下與天為仁與雷作解臣則蠢動之一物也氣下乃出安知其由比於金石草木物之無心者也扣之或大鳴小鳴終始相生清濁雜作變而成文者以聖人擊考之不得藏其聲也若臣者朴直蠢愚陛下考之而無聲是不如金石草木之無心矣敢不極聞以對伏以陛下發德音訪巖藪招賢士求直言詢可行之謀垂不倦之聽欲使上獲其益下輸其情君臣之間歡然相與此禹所以稱大漢所以稱盛者用此道也臣何足以仰承之臣以為有國不患無賢患不能用賢不患無直言患不能容直言今夫朝廷之大百官之衆非無賢也然陛下黈纊凝旒或未之察羣臣各默默來朝而退雖有賢哲孰能辨之觀易卦乾上坤下否坤上乾下泰乾為君坤為臣君意下降臣誠上達則是天地交泰之時也君意不下降臣誠不上達則是天地不交否之時也若太宗文皇帝每一視朝未嘗不從容問羣臣政之得失下有一毫之善上無不奬上有一毫之失下無不諫或有引入禁內或周旋禁中疾則幸其第沒則臨其喪君臣之道可謂至矣是以無遺才無闕政巍巍蕩蕩與天無窮者上下交泰也秦帝胡亥信用左右左右欲專秦柄乃教胡亥曰陛下富有春秋初即位奈何與公卿廷決事事即有誤示羣臣短也於是胡亥常居禁中羣臣希見者不聞其過天下所以亂者上下不交也伏惟陛下上法天下法地中法太宗每坐朝宣旨使羣臣各有所陳陛下賜之溫顔盡其啓沃言誨疑作語侍從之臣得以奉其職左右有所思以貽來代諫諍之官與聞其政而獻替之使此輩無有所補黜之可也使其稍識大體陛下與之論道講政豈不可一作或裨於萬一也孰敢不輸其情乎茍居位者不與之言獻直言者不與之用又何必搜羅巖穴逺訪不用之人勤求不信之言乎賢者固不來也來者又何言也此體用之要求賢濟理之術盡於是矣惟陛下行之若生人之困於衣食而無戀本之心但兵宿中原如此實曰方面大臣之罪也夫方面大臣宜直播天子之休風保撫其人如赤子而乃傾其脂血剝其生財聚其技慧淫巧以蕩上心天子誠以為物力有餘而不知其情也執事者又未嘗聞以生人艱苦為言而得罪者豈其盡直而不用乎夫王者居於九天之上非臣痛激肝血指明而言亦何由而達也若臣者草木孤賤宜周旋其所以能而言之也今天下困於商稅不均可謂甚矣百姓之忘本十而九矣昔嘗有人有良田千畝柔桑千本居室百堵牛羊千蹄奴婢千指其稅不下七萬錢矣然而不下三四年桑田為墟居室崩壞羊犬奴婢十不餘一而公家之稅曾不稍蠲督責鞭笞死亡而後已於是州伯邑長方以人安賦集攘臂於其間趂辦朝廷用升考績取彼逋責均其所存展轉奔逃又升户口是以賦益重而人益貧不均之甚一也是故欲人之財賦均一而無日蹙之患宜視通邑之盈虛使鄉户坐于田迭相隱核其上下不使貪官贓吏紛動其間則有無輕重可得而均也夫古有四人今轉加七計口而十分之其所以盡悴出賦而衣食其九者農夫蠶婦而已絳衣淺帶以代農者人十之一縵胡之纓短後之服仰衣食縣官者人十之二髠頭壞衣不耕不蠶坐而供養者人十之二審曲面勢以飭五材鬻工而衣食者人十之二乘時射利貿遷有無取倍稱之息而衣食者人十之二遊手倚市以庇妻孥以給衣食者人十之一其餘為農桑之數焉農夫粳核不足而十人者畜馬厭粱粟蠶婦衣不蔽形而十人者咸襲羅紈是以性近儒則入仕近武則從軍善計則貿遷避事則髠削技巧則為工師拙姦則為駔儈非戇愚專一無他腸者孰肯勤體效力為稼穡之苦乎且以田廢而衣食罕者户口所在減而背本之利多不均之甚二也陛下誠能寬農人之征而優樂之杜衆邪之門而困辱之則農桑益而衣食有餘也自兵革以來人多流散版籍廢絶户口蕩析加以憂懼越于異鄉末以僥幸利其茍且寬之則偷於朝夕勤一作動之則從而陷於邪又訛言焉屋室聚為瓦礫田野俱為榛蕪賦稅不均居者日困又為此也伏望陛下勑百姓所在編為土著不即歸之舊鄉繕黃籍生則書之死則去之庶男女之所生户口之多少可得而知也無田者給與公田假種食因其井泉制為民居藝桑麻種蒲蔬育狗彘三年不輸官自初即于三年人猶有之他者所至得以重罪罪之然後人安其生樂其業而無奔亡之患矣安土則敦本敦本則人庶矣稅均則斂輕斂輕則人富矣以此阜俗不盛何為以此濟人何難之有若夫鹽𣙜者經國之所資財用之大寶也然而當今之務若修其業除其弊亦可以無重斂之困也夫鹽𣙜之重弊失於商徒操利權州縣不奉法賈太重而利太煩布帛精粗不中數矣夫以商徒操利權則其利有時而廢州郡不敢誰何是勸農人以逐末也州郡不奉法則各私其人而盜煮者行矣賈太重則貧者不堪矣吏太煩則縻費之者衆矣布帛精粗不中數則女工從損風俗偷薄而上困矣即如此宜罷鹽鐵之官以省費停郡府之政令以一其門禁人為商以反其耕損一作捐其厚賈以利其人速其售而布帛必精以齊其俗以厚其利如此亦可大裨於國大賴於人矣酒酤之人罷之可也夫既往之失不能久於其道將來之虞中道盡也自古帝王未有不勤儉於其初天下歸焉滿假於其終天下離焉陛下以勤儉為恆滿假為戒勤而不已損之又損慎終如初守而勿失天地所以能長且久者以其運行不息也陛下其可息乎可懈乎朝錯所以急繩七國者欲尊天子恐削弱遲而禍大矣主父所以推恩子弟者因其欲而分裂諸侯之易矣今天下一家盡為郡縣無諸侯強大之患無宗室葭莩之親而以推恩為言臣恐未可以令天下也齊桓之時列國相傾管夷吾欲輔霸業恐諸侯先謀而為之備是以修其寓令而兵食足焉使戰者必耕耕者必戰無事則散之隴畝有事則授之甲兵此古人之意可行之驗也夫舜之所以為聖人以其避賢任能也五教契也五穀棄也五刑臯陶也八音夔也虞伯益也水土禹也喉舌龍也共工埀也舜無事焉是以執左契埀衣裳而天下理豈以必躬必親侵于百職然後以為聖乎必也信而顯之作而行之任之而績用不立則有竄三苗於三危流共工于幽州放歡兜于崇山殛鯀于羽山刑罰有可必加矣孰敢用其私乎儒家流者示人以中而為之節訪其所至而導其不至使夫君臣父子各得其正此其所長也然迂者為之則執古以非今凝滯而不變夫責課者所以俯仰百官也然光武用之而非美者責人之效重也伏惟陛下取漢光武之求實勿務速成用漢元帝之崇儒知其凝滯任人而示之所為端拱而不失其勇疑取舍之間於此乎判矣陛下不能用臣言不當問也謂臣不能言其事不當來也既來矣陛下問狀宜直其辭既問矣微臣盡忠宜採其策盡忠者不易一作容持也直者誰欲一作肯為也忠未見盡直必有吝吝構而直不悔不信而忠不追者蓋有之矣由未見其為人也非天之與其剛健地之與其直方內不疑其身外不疑於人憂君而不顧其已濟物而不求其利者孰肯悃悃欵欵出於骨髓發於肝膈如此其切於天下乎夫天下者天下之天下也天下安微臣得保其生不安微臣不保其死是以懷其效以天下為憂不懷其身以天下為念知所以責難於君者宜盡忠言知所以盡忠於已者宜及一作急天下如此况陛下宗廟之重其可忽乎屬之于篇勉之於上是在陛下酌之而已矣謹對同前白居易對臣聞漢文帝時賈誼上疏云可為痛哭者一可為流涕者二可為長太息者三是時漢興四十歲萬方大理四海太和而賈誼非不見之所以過言者以為辭不切志不激則不能回君聽感君心而發憤於至理也是以雖盛時也賈誼過言而無愧雖過言也文帝容之而不非故臣不失忠君不失聖書之史策以為美談然臣觀自兹一文粹作魏晉以來天下之理未曾有髣佛於文帝時者激切之言又未有髣佛於賈誼疏者豈非君之明聖不侔於文帝臣之忠不追集作逮於賈誼乎不然何喪集作哀亂之時愈多而公集公作切直之言愈少也今陛下思禹之昌言而拜之念漢之極諫而徵之病集作廢虛文之無用者奬至言之斥已者詢臣以可行之策示集作諭臣以不倦之意懇惻鬱悼發於至誠真聖王思至理求過言之明旨也斯則陛下之道已𢎞於前代文粹有微字臣之才誠集作試劣文粹作效於古人輒欲過言以裨陛下明德萬分之一也裨之者非敢謂言之必可行也體用之必可明也且欲使後代知陛下踐祚之後有朴直敢言之臣出焉無俾文帝賈誼專美於漢代然後退而俯伏以待罪戾焉臣誠所甘心也謹以過言昧死上對伏惟陛下賜臣之策有思興禮樂之道念救疲氓之方别集作辨懲往戒來之宜審推恩寓令之要至矣哉陛下之念及於此此實萬葉之福也豈惟一代人受其賜而已哉臣聞疲文粹作疾病之作有因緣矣集作焉救療之方有次第矣集作焉臣請為陛下究因緣陳次第而言之臣聞太宗以神武之姿撥天下之亂玄宗以聖文之德致天下之肥當二宗之時利無不興弊無不革逺無不服近無不和貞觀之功既成而大樂作焉雖六代之盡美無不舉也開元之理既定而盛禮興焉雖三王之明備無不講也禮行故上下輯睦樂達故內外和平所以兵偃而萬邦懷仁刑清而兆民自化動植之類咸煦嫗而自遂焉雖成康文景之理無以出於此矣洎天寶以降政教浸微冦既荐興兵亦繼起兵以遏冦冦生於兵兵冦相仍逮五十載賦征由是而重人力由是而罷下無安心雖曰督農桑之課而生業不固上無定費雖曰峻管𣙜之法而歲計不充日剝月朘以至於耗竭其半矣此臣所謂疲病之因緣者也豈不然乎由是觀之蓋人疲由乎稅重稅重由乎軍興軍興由乎冦生冦生由乎政缺然則未修政教而望冦戎之銷未銷冦戎而望兵革之息雖太宗不能也未息兵革而求征徭之省未省征徭而望集作求黎庶之安雖玄宗不能也何則事有所必然雖常人足以致勢有所不可雖聖哲不能為伏惟陛下將欲安黎元集作庶先念省征徭將欲省征徭先念息兵革將欲息兵革先念銷冦戎將欲銷冦戎先念修政教何者若政教修則下無詐偽暴悖之心而冦戎所由銷矣冦戎銷則境無興發攻守之役而兵革所由息矣征徭省則人無流亡轉徙之憂而黎庶所由安矣臣竊觀今天下之冦雖已盡銷伏願陛下不以易銷而自怠今天下之兵雖未盡散伏願陛下不以難散而自疑無自怠之心則政教日肅無自疑之意則誠信日明政教肅則暴亂革心誠信明則獷驁歸命革心則天下將萌之冦不遏而自銷歸命則天下已聚之兵不散而自息然後重斂可以集作日減疲氓可以集作月安富庶可日滋困竭可日補日安則和悅之氣積日富則廉讓之風行因其廉讓而示之以禮則禮易行乘其和悅而鼓之以樂則樂易達矣舉斯方而可以復其盛用斯道而可以濟其難懲既往之失莫先於誠不明而政不修戒將來之虞莫大於冦不銷而兵不革此臣所謂救療之次第者也豈不然乎若文粹作至於齊行寓令之法以霸諸侯漢用推恩之謀以懲七國施之今日臣恐非宜何者且今萬方一統四海一家無鄰國可傾非夷吾用權之時集作秋也雖欲寓令今將何所寓耶今除國建郡置守罷侯無爵土可疏非主父矯弊之日也雖欲推恩恩將何所推耶但陛下期集作嗣貞觀之功𢎞開元之理必能集作將光二宗而福萬葉矣何區區齊漢之法而足為陛下慕哉精究之端倪實在於此矣又蒙陛下賜臣之問有執契埀衣之道委下專上之宜敦儒學而業衰責課實而政失者此皆政化之所急今古之所文粹作所共疑而陛下幸念之臣有以知天下之理興矣夫執契之道垂衣不言者蓋已成之化非謀始之謂也委之於下者言王者之理庀其司分其務而已非謂政無小大悉委之於下也專之於上者言王者之道秉其樞執其要而已非謂事無巨細悉專於上也漢元優遊於儒學而盛業竟衰者非儒之過也學之不得其道也光武責諫於公卿而峻政非美者非考課之纍也責之不得其要也臣請為陛下别白而明之夫垂衣不言者豈不謂無為之道乎臣聞無為而理者其舜也歟舜之理道臣粗知之矣始則懋於修已勞於求賢明察其刑明慎其賞外序百揆內勤萬幾昃食宵衣念其不息之道夫如是豈非大有為者乎終則安於恭已逸於得賢明刑至於文粹作刑明至于無刑明賞至文粹作賞於無賞百職不戒而舉萬事不勞而成端拱凝旒立於無過之地夫如是豈非真無為乎故臣以謂無為者非無所為也必先為而後致無為也集作必先有為而後至於無為也老子曰無為而無所不為蓋謂是矣夫委下而用私專上而無效者此由非所宜委而委之也非所宜專而專之也臣請以君臣之道明之臣聞上下異位文粹作宜君臣殊道蓋大者簡者君道也小者繁者臣道也臣道者百職小而衆萬事細而繁誠非人君一聰所能遍察一明所能周鑒集作覽也故人君之道但擇其人而任之舉其要而執之焉已矣昔九臣各掌其事而唐堯秉其功以帝天下十亂各效其能而周武總其理以王天下三傑各宣其力而漢髙兼其用以取天下三君者不能為一焉但執要任人而已亦猶心之於四肢九竅百體也不能為一焉然而寢食起居言語視聽皆以心為主也故臣以為君得君之道雖專之於上而下自有以展其效矣臣得臣之道雖委之於下而人亦無以用其私矣由此而言光武督責而政未甚美者非他昧君臣之道於小大繁簡之際也元帝優遊而業以浸衰者非他昧無為之道於始終勞逸之間也二途俱失較然可知陛下但舉中而行則無所惑也集作矣臣伏以聖策首章曰上獲其益下輸其誠其末章則又曰興自朕躬無悼後害此誠陛下思酌下言樂聞上失勤勤懇懇慮臣輩有所隱情者也臣敢不再竭狂直以副天心之萬一焉臣聞古先聖王之理也制欲於未萌除害於未兆故靜無敗事動有成功自非聖王則異文粹作昧於是莫不欲逞其集作於始悔追於終政失於前功補於後利害之效可略而言且如軍暴而後戢之兵亂而後遏之善則善矣不若防其微杜其漸使不至於暴亂也官邪而後責之吏姦而後誅之懲則懲矣不若審其才得其人使不至於姦邪也人餒而後食之凍而後衣之惠則惠矣不若輕其徭薄其稅使不至於凍餒也舉一知十不其然乎今陛下初嗣祖宗新臨蒸庶承多虞之運當鼎盛之年此誠制欲於未萌除害於未兆之時也伏願陛下敬惜其時重慎於事既往者且追救於弊後將來者宜早防於事先夫然保邦恆在於未危恭已常居於無逸集作過三五之道夫豈逺哉臣生也幸得為唐人當陛下臨御之時覩陛下升平之始則是臣朝聞而夕死足矣而况充才識之貢承體用之問者乎今所以極千慮昧萬死當盛時獻過言者此誠微臣喜朝聞甘夕死之志也不然何輕肆狂瞽不避斧鑕若此之容易焉伏惟少垂意而覽之則臣生死幸甚謹對文苑英華卷八十八
