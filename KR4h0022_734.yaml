body:
  text: 文苑英華巻七百三十五宋李昉等編雜序一帝範序一首大唐三藏聖教序一首律疏序一首春秋正義序一首臣範序一首黄帝八十一難經序一首山亭興序一首山亭思友人序一首春夜令狐正字田子過敝廬序一首帝範序唐太宗朕聞大德曰生大寶曰位辨其上下樹其君臣所以撫育黎元陶鈞庶類自非克明克哲允武允文皇天眷命歴數在躬安可以濫握靈圖叨臨神器是以翠媯薦陶唐之德𤣥圭錫大禹之功丹字呈祥周開七百之祚素靈表瑞漢啓重華之基由此觀之帝王之業非可以智競不可以力争者矣昔隋季版蕩海内分崩先皇以神武之姿當經綸之㑹斬靈蛇而定王業啓金鏡而握天樞然由五嶽含氣三光戢耀豺狼尚梗風塵未定余以弱冠之年懐慷慨之志思靖大難以濟蒼生躬擐甲胄親當矢石夕對以魚麗之陣朝臨以鶴翼之圍敵無大而不摧兵無堅而不破剪長鯨而清四海掃攙搶而廓八紘既承佑天潢澄清璇極襲重光之永業繼寶籙之隆基戰戰兢兢若臨深而馭朽日慎一日冀善始而令終汝以㓜年偏鍾慈愛義方多闕庭訓有乖擢自維城之居屬以少年之位未辨君臣之禮節不知稼穡之艱難余每思此為憂未嘗不廢寢忘食今自軒昊以降迄于周隋經天緯地之君纂業承基之主興亡治亂其道煥然一作焉所以披鏡前蹤博採史籍聚其要言以為近誡云爾大唐三藏聖教序同前蓋聞二儀有象顯覆載以含生四時無形潛寒暑以化物是以窺天鑒地庸愚皆識其端明陽洞隂一作明隂洞陽賢哲罕窮其數然而天地包乎隂陽而易識者以其有象也隂陽處乎天地而難窮者以其無形也故知象顯可徴雖愚不惑形潛莫覩在智猶迷况乎佛道崇虚乘幽控寂𢎞濟萬品典御十方舉威靈而無上抑神力而無下大之則彌於宇宙細之則攝於毫釐無滅無生歴千刼而不古若隱若顯運百福而長今妙道凝𤣥遵之莫知其際法流湛寂挹之莫測其源故知蠢蠢凡愚區區庸鄙投其㫖趣能無疑惑者哉然則大教之興基乎西土騰漢庭而皎夢照東域而流慈昔者分流一作形分跡之時言未馳而成化當常現常之世民仰德而知遵及乎晦影歸真遷儀越世金容掩色不鏡三千之光麗象開圖空端四八之相於是㣲言廣被拯含類於三途遺訓遐宣導羣生於十地然而眞教難仰莫能一其指歸曲學易遵邪正於焉紛糾所以空有之論或習俗而是非大小之乘乍沿時而隆替有𤣥奘大法師者沙門之領袖也㓜懐貞敏早悟三空之心長契神情先苞四忍之行松風水月未足比其清華仙露明珠詎能方其朗潤故以智通無累神測未形超六塵而迥出隻千古而無對凝心内境悲正法之陵遲栖慮𤣥門慨深文之訛謬思欲分條析理廣彼前聞截偽續眞開兹後學是以翹心净土往逰西域乘危逺邁杖䇿孤征積雪晨飛途間失地驚砂夕起空外迷天萬里山川撥烟霞而進影百重寒暑躡霜露而前蹤誠重勞輕求深願逺一作達周遊西宇十有七年窮歴道邦詢求正教雙林八水味道飱風鹿苑鷲峯瞻竒仰異承至言於先聖受眞教於上賢探賾妙門精窮奥典一乘五律之道馳驟於心田八藏三篋之文波濤於口海爰自所歴之國總將三藏要文凡六百五十七部譯布中夏宣揚勝業引慈雲於西極灑一作注法雨於東垂聖教缺而復全蒼生罪而還福濕火雲一作宅之乾燄共㧞迷途朗愛水之昬波同臻彼岸是知惡因業墜善以縁昇昇墜之端惟人所託譬夫桂生髙嶺雲霞一作露方得泫其花蓮出渌波飛塵不能汙其葉非蓮性自㓗而桂質本貞良由所附者髙則㣲物不能累所慿者㓗一作净則濁類不能沾夫以卉木無知猶資善而成善况乎人倫有識不縁慶而求慶方冀兹經流施將日月而無窮斯福遐敷與乾坤而可久一作永大一作皆石本律疏序長孫無忌議曰夫三才肇位萬象元分禀氣含靈人為稱首莫不慿黎元而樹司宰因政教而施刑法其有情恣庸愚識沉愆戻大則亂其區斷小則暌其品式不立制度則未之前聞故曰以刑止刑以殺止殺刑罰不可弛於國笞箠不得廢於家時遇澆淳用有衆寡於是結繩啓路盈坎流源輕刑明威大禮崇敬易曰天垂象聖人則之觀雷電而制威刑覩秋霜而有肅殺懲其已犯而防其未然平其徽纆而存乎博愛蓋聖王不獲已而用之古者大刑用甲兵其次用斧鉞中刑用刀鋸其次用鑽鑿薄刑用鞭扑其所由來亦以尚矣昔白龍白雲則伏羲軒轅之代西火西水則炎帝共工之年爽鳩筮賔於少皥金正䇿一作榮名於顓頊咸有天秩典司刑一作刑司憲大道之化擊壤無違迨乎唐虞化行事簡之代議刑以定其罪畵象以愧其心所有條貫良多簡畧年代浸逺不可得而詳焉堯舜時理官則謂之為士而臯陶為之其法畧存而往往概見則風俗通所云臯陶謨虞造律是也律者銓法也易曰理財正辭禁民為非曰義故銓量輕重依義制律尚書之大傳曰丕天之大律注云奉天之法法亦律也謂之為律昔者聖人制作謂之為經傳師所說則謂之為傳此則丘明子夏於春秋禮經作傳是也近代以來兼經注而明之則謂之為義疏疏之為字本以疏闕疏逺立名又廣雅云疏者識也案疏訓識則書疏記識之道存焉史記云後主所是疏為令前主所是疏為律漢書云削牘為疏故云疏也昔者三王始用肉刑赭衣難嗣皇風更逺朴散淳離傷肌犯骨尚書大傳云夏刑三千條周禮司刑掌五刑其屬二千五百穆王度時制法五刑之屬三千周衰刑重戰國異制魏文侯師於李悝集諸國刑典造法經六篇一盜法二賦法三囚法四捕請法五雜法六具法商鞅傳授改法經為律漢相蕭何更加李悝所造户興廐三篇謂之九章之律魏因漢律為一十八篇改漢具律為刑名第一晉命賈充等増損漢魏為二十篇於魏刑名律中分為法例律宋齊梁及後魏因而不改爰至北齊併刑名法律為名例後周復為刑名隋因北齊更為例唐由於隋相承不改名者五刑之罪名例者五刑之體例名訓為命例訓為比命諸篇之刑名比諸篇之法例但名因罪立事由犯生命名即刑應比例即事表故以名例為首篇第者訓居訓次則次第之義可得言矣一者太極之氣承三為一黄鍾之數所生焉名冠十二篇之首故云名例第一大唐皇帝以上聖凝圖英聲嗣武潤春雲於品物緩秋官於黎庶今之典憲前聖規模章程靡失鴻纎備舉而刑憲之司報行殊異大理當其死坐刑部處以流刑一州斷以徒一年一縣將為杖罸不有解釋觸塗暌誤皇帝彛憲在懐納隍興軫德禮為政教之本刑罰為政教之用猶昏曉陽和相須而成者也是以降綸言於台鉉揮折簡於髦彦爰造律疏大明典式逺則皇王妙㫖近則蕭賈遺文縁波討源自枝窮葉甄表寛大裁成簡久譬權衡之知輕重規矩之得方員邁彼三章同符畫一者矣春秋正義序孔頴達夫春秋者記人君動作之務是左氏一作史所職之書王者統三才而宅九有順四時而理萬物四時序則玉燭調於上三才協則寳命昌於下故可以享國永年令聞長世然則有為之務可不慎歟國之大事在祀與戎祀則必盡其敬戎則不加無罪盟㑹協於禮興動慎一作順其節失則貶其惡得則褒其善此春秋之大㫖為皇王之明鑒也若夫五始之目彰於帝軒六經之道光於禮記然則此書之發其來尚矣但年紀綿邈無得而言暨乎周室東遷王綱不振楚子北伐神器將移鄭伯敗王於前晉侯請隧於後竊僭名號者何國不然專行征伐者諸侯皆是下陵上替内叛外侵九域騷然三綱遂絶夫子内藴一作韞大聖逢時若此欲垂之以法則無位正之以武則無兵賞之以利則無財說之以道則不用虚嘆銜書之鳳乃似䘮家之狗既不救於已往亦一作冀垂訓於後昆因魯史之有得失據周經以正褒貶則一無則字一字所嘉有同華衮之贈一言所黜無異蕭斧之誅所謂不怒而人威不賞而自一作人勸實永世而作則歴百王而不朽者也至於秦滅典籍鴻猷遂寢漢德既興儒風不絶一作泯其前漢傳左氏者有張蒼賈誼尹咸劉歆後漢有鄭衆賈逵服䖍許惠卿一有之等二字各為詁訓然雜取公羊穀梁以釋左氏此乃以冠雙屨將絲綜麻方鑿圓枘其可入乎晉世杜元凱又為左氏集解專取丘明之傳以釋孔氏之經所謂子應乎母以膠投漆雖欲勿合其可離乎今校先儒優劣杜為甲矣故晉宋傳授以至于今其為義疏者則有沈文何休蘇寛劉炫然沈氏於義例粗可於經傳極疎蘇氏則全不體本文唯傍一作旁攻賈服使後進之學一作後之學者鑽仰無成劉炫於數君之内實為翹楚然聦慧辨博固亦罕儔而探賾鈎深未能致逺其經注易者必具飾以文辭其理致難者乃不入其根節又意在矜伐性好非毁規杜氏之失凡一百五十餘條習杜義而攻杜氏猶蠧生於木而還食其木甚非其理一作非其理也雖規杜過義又淺近所謂捕鳴蟬於前不知黄雀於一作在其後按僖公三十三年經云晉人敗狄于箕杜注云郤缺稱人時一作者未為卿劉炫規云晉侯稱人與殽戰同案殽戰在塟晉文公之前可得云背殯一作䘮用師一作兵以㣲一作賤者告箕戰在塟晉文公之後非有一作非是背殯一作䘮用師一作兵何得云與殽戰同此則一年之經數行而已曽不省覽一作勘省上下妄規得失又襄公二十一年傳云邾庶其以漆閭丘來奔公以一作以公姑姊妻之杜注云蓋寡者二人劉炫規云是襄公之姑成公之姊只一人而巳按成公二年成公之子公衡為質及宋逃歸按家語本命云男子十六而化生公衡已能迯歸則十六七矣兒年一作公衡之年如此則於時成公三十三四矣計至襄公二十一年成公七十餘矣何得有姊而妻庶其此等皆其事歴然猶尚妄說况其餘錯亂良可悲矣然比諸義疏猶有可觀今奉勅刪定據以為本其有疎漏以沈氏補焉若兩義俱違則特申短見雖課率庸鄙仍不敢自專謹與朝散一作請大夫守國子博士臣谷那律故四門博士臣楊士勛四門博士臣朱長才等對共參定至十六年又奉勅與前脩疏人及朝請一作散大夫行太常一作學博士上騎都尉臣馬嘉運朝散大夫行太學博士上騎都尉臣王德韶給事郎守四門博士上騎都尉臣蘇德融登仕郎守太學助教雲騎都尉一無都字臣隨德素等對勅使趙𢎞智覆更詳審為之正義凡三十六巻冀貽諸學者以裨萬一焉臣範序天后蓋聞惟天著象品物同於照臨惟地含章羣生等於亭育顧以庸昧忝位坤元思齊厚載之仁式罄普覃之惠廼内廼外思養之志靡殊惟子惟臣慈誘之情無隔願申丹懇上翊紫機爰洎衆僚聿匡𤣥化伏以天皇明逾睿哲志切旁求簮裾緫川岳之靈珩佩聚星辰之秀羣英蒞職衆彦分司足以廣扇淳風長隆寶祚但母之於子慈愛特存雖復已積忠良猶且更垂勸勵昔文伯既達仍加喻軸之言孟軻已賢更益斷機之誨良以情隆撫字心欲助成比者太子及王已選脩身之訓羣公列辟未敷忠告之規近以暇辰遊心文府聊因煒管用寫虚襟故綴序所聞以為臣範一部想周朝之十亂爰著十章思殷室之兩臣分為兩巻所以發揮元行鎔範身心為事上之軌模作人臣之繩凖若乃遐想綿載眇鑒前脩莫不元首居尊股肱宣力資棟梁而成大厦慿舟檝以濟巨川唱和相依同功共體然則君親既立忠孝形焉奉國奉家率由之道寧二事君事父資敬之途斯一臣主之義其至矣哉休戚是均可不深鑒夫麗容雖麗猶待鏡以端形明德雖明終假言而藥石今故以兹所撰普錫具僚誠非筆削之公貴用裨道之益何則正言斯重𤣥珠比而尚輕選語為珍蒼璧喻而非寳是知贈人以賄者唯申即日之歡贈人以言者能致終身之福若使佩兹箴戒同彼韋弦脩已必顧其規立行每觀其則自然榮隨歲積慶與時新家將國而共安下與上而俱㤗察㣲之士宜所三思庶照鄙識敬終髙德凡諸章目列之後云黄帝八十一難經序王勃黄帝八十一難經是醫經之秘錄也昔者岐伯以授黄帝黄帝歴九師以授伊尹伊尹以授湯湯歷六師以授太公太公授文王文王歴九師以授醫和醫和歷六師以授秦越人秦越人始定立章句歴九師以授華佗華佗歴六師以授黄公黄公以授曹夫子夫子諱元字真道自云京兆人也蓋授黄公之術洞明醫道至能遥望氣色徹視腑臟洗腸刳胷之術往往行焉浮沉人間莫有知者勃養於慈父之手每承過庭之訓曰人子不知醫古人以為不孝因竊求良師隂訪其道以大唐龍朔元年歲次庚申冬至後甲子予遇夫子於長安撫勃曰無欲也勃再拜稽首遂歸心焉雖父伯兄弟不能知也蓋授周易章句及黄帝素問難經乃知三才六甲之事明堂玉匱之數十五月而畢將别謂勃曰隂陽之道不可妄宣也針石之道不可妄傳也無猖狂以自彰當隂沉以自深也勃受命伏習五年于兹矣有升堂覩奥之心焉近復鑚仰太虚導引元氣覺滓穢都絶精明相保方欲坐守神仙棄置流俗噫蒼生可以救耶斯文可以存耶昔太上有立德其次有立功其次有立言非以狥名也將以濟人也謹錄師訓編附聖經庶將來君子有以得其用心也山亭興序前人仁者樂山智者樂水即云深山大澤龍蛇為得性之塲廣漢巨川珠貝足有殊之地豈徒茂林脩竹王右軍山隂之蘭亭流水長堤石季倫河陽之梓澤下官天性任眞直言淳朴拙容陋質眇少之丈夫蹇歩窮途坎壈之君子文史足用不讀非道之書氣調不覊未被可人之目潁川人物有荀家兄弟之風漢代英竒守陳氏門宗之德樂天知命一十九年負笈從師二千餘里有𢎞農公者日下無雙風流第一仁崖知宇照臨明日月之輝廣度冲襟磊落壓乾坤之氣王夷甫之瑶林瓊樹直出風塵嵇叔夜之龍章鳳姿混同人野雄談逸辯吐滿腹之精神逹學竒才抱填胷之文籍簮裾見屈輕脫履於西陽山水來逰重横琴於南澗百年竒表開壯志於髙明千里心期得神交於下走山人對興即是桃花之源隱士相逢不異菖蒲之澗黄精野饌赤石神脂玉案金盤徵石髓於蛟龍之窟山樽野酌求玉液於蓬萊之峯溪横燕尾巖竪龍頭鍜野老之眞珠掛幽人之明鏡山腰半折溜王烈之香膏洞口横開滴嚴遵之芳乳藤牽赤絮南方之物産可知粉漬青田外域之謡風在即人髙調逺地爽氣清抱玊策而登髙出瓊林而更逺漢家二百所之都郭宫殿平㸔秦樹四十郡之封畿山河坐見班孟堅騁兩京雄筆以為天地之奥區張平子奮一代宏才以為帝王之神麗珠城隱隱䦨干象北斗之宫清渭澄澄滉漾即天河之水長松茂栢鑽宇宙而頓風雲大壑横溪吐江河而懸日月鳳凰神岳起烟霧而當軒鸚鵡春泉雜風花而滿谷望平原䕃藂薄山情放曠即滄浪之水清野氣蕭條即崆峒之人智摇頭坐唱頓足起舞風塵灑落直上天池九萬里邱墟雄壯傍吞少華五千仭裁二儀為輿蓋倚八荒為户牖榮者吾不知其榮美者吾不知其美下官以詞峯直上振筆札而前驅髙明以翰苑横開列文章於後殿情興未巳即令樽中酒空彩筆未窮湏使山中兎盡山亭思友人序前人髙興之後中宵起觀舉目四望風寒月清鄰人張氏有山亭焉洞壑横分竒峯直上欝然有造化之功矣嗟乎大丈夫荷帝王之雨露對清平之日月文章可以經緯天地器局可以蓄洩江河七星可以氣衝八風可以調合獨行萬里覺天地之崆峒髙枕百年見生靈之齷齪雖俗人不識下士徒輕顧視天下亦可以敝疑寰中之一半矣惜乎此山有月此地無人清風入琴黄雲對酒雖形骸眞性得禮樂於身中而宇宙神交巻烟霞於物表至若開闢翰苑掃蕩文塲得宫商之正律受山川之傑氣雖陸平原曹子建足可以車載斗量謝靈運潘安仁足可以膝行肘歩思飛情逸風雲坐宅於筆端興洽神清日月自安於調下云爾春夜令狐正字田子過敝廬序宋之問田二官考室潁陽令狐九閒居渭涘徵君太守世業相親洛邑秦京道遊非逺春山採藥揖二子之髙蹤夜月廻車入故人之窮巷闢書幌巻琴帷綠竹一藂清風三尺幽吟所托逰仙招隱之詩嘉話伊何丹丘白雲之事榮枯未薦飽我以老氏之言舉白無譁醉余以壺丘之說池塘潤於時雨衣巾漸於和氣蘭欲芳而逼人林將曙而催鳥嗟乎語黙恒理聚散何常請揮翰冩心用旌厥事使嵩髙洞裏記兹夕之當歌太白巖中念今宵之秉燭共編四韻貽諸好事云文苑英華巻七百三十五
