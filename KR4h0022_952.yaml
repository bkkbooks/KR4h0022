body:
  text: 文苑英華卷九百五十三宋李昉等編職官十五陳汝州利貞墓志一首鄭舒州甫墓志一首崔永州敏墓志一首鄧貴州墓志一首凌和州凖墓志一首栁桞州宗元墓志一首汝州刺史陳公墓志銘穆貟唐貞元五年秋七月汝州防禦使汝州刺史兼御史大夫東都畿汝州都防禦左軍兵馬靜戎郡王陳公疽發首己酉命牙門將鮮于侍進奉書告辭元戎尚書安平公以受恩忘死非其死為恨又命嘗同百戰之將王進達等十數人以忠藎王事為别又命嗣子少英以孝敬繼夫人為誡庚戍歸于私第辛亥薨八月孤少英與家老故吏及龜筮謀得宅兆于州東石樓山之陽辛酉葬公諱利貞范陽人祿山之亂始自平盧越海歸國纍建戎效從太尉臨淮王光弼軍于河南寇攻睢陽垂陷大尉常遣心腹爪牙之師郝廷玉合諸侯之衆趨之公輒以輕騎赴如林之旅入其腹出其背如颷如星庭玉竒公之才謂已不逮拔於行間以其子妻之繩于臨淮列為重將其後庭玉入備宿衛出鎮河隴公實從之凡十遷大將軍太常卿太子賔客特進開府靜戎郡王至御史中丞隴右都知兵馬使其所置者皆如釋宋之事希烈之亂詔以哥舒曜為汝洛節制俾公之前隊佐之事疑作軍次汝墳不終日城拔又以次襄郟寇軍大至公以馬步五百當强寇萬人立為竒兵橫擊其右凶黨退却一作衄數月不前襄下城守拒有備由此效也希烈自統二字一作空又作自會豺狼之衆至而圍合矢石雨下晝夜不息外築甬道與城相屬公登陴捍敵身均士卒勞則先之逸則後之凡不櫛不沐非以我事當見戎帥不下城者七十餘日戎帥蒼黃自拔亂不能遏叛將庭芝謀害之者數四隂為之制使不得發俄而朱泚以關中僣逆凡幽薊河隴之卒嘗𨽻於泚千里之外應之公與庭芝所統皆泚之舊也庭芝果以其衆作亂公之麾下亦帶甲而從之中宵難作公仗劒當轅門而立呼曰如有過此門者當殺我而後過由是其衆定而庭芝逸故有専城之拜其為州也奉上以不違撫下以不擾是以廉使盡其政疲人安其理春秋五十有八前後歷官二十二封爵四從戎許國垂四十年不須臾忘忠敬之心不一日蹈汙染之跡起鼓鞞之下登諸侯亞相與茂勳寵祿相與終始可不謂之大丈夫之致乎安平公出涕之外餘有復慟疑作後有餘慟將吏等遑遑相弔往往如在前夫人早夭後夫人隴西辛氏實大原節度相國金城王之女髽首頮血以庀喪具長子少英幼子壬癸永懷陵谷見託為銘其詞曰蒼蒼平原鬱鬱髙墳下有泉户永閉虎臣豈伊虎臣亦曰賢守勒銘貞石示千古後舒州刺史鄭公墓志銘前人有唐循吏故舒州刺史滎陽鄭府君諱甫字某享年五十有四歷官一十有二以貞元六年冬十月辛丑卒于東都崇讓里第十一月諸孤家老得請於元龜奉府君之喪歸祔于祖實鄭州榮澤縣廣武原庚寅下其先吏足徴也十代祖曄元魏建威將軍南陽公魏氏定五姓冠百族曄以官婚人物甲子時選厥後歷周隋洎皇朝凡六葉至於曾祖仁愷密亳二州刺史祖慈眀銀青光祿大夫濠州刺史考令璡銀青光祿大夫國子祭酒重名貴仕照燭相續府君少以門資奉爼豆于太廟調習書判趨等擢祕書省校書郎歷京兆府藍田尉大理評事二宗山陵詔求多士以集大務攝京兆府户曹參軍畢事改授大理司直遷監察御史實佐時宰充營田使判官轉殿中侍御史罷授尚書祠部員外郎兼侍御史充宣歙青苖稅户使朝于京師拜和州刺史廉使今居守公奏課第一錫命屢降凡兩加特階一賜金印紫綬且以借留之典副之後遷舒州刺史而厯陽之積疑作績纍載之美布於下車之初乃至訟不煩於聽令不費於言賦調事理吏勸人逸初祭酒府君殞於鎬惟王事世故洎龜筮之不叶未遑還葬至是纍疏陳乞優詔曰俞解印遄歸遘癘于道哀哉夫人清河崔氏故中書令趙國公圓之子也以地之貴天之淑致善乎府君之家不幸早世殯于所次俟夫異日遷而合焉有子九人長男曰適左衛率府倉曹參軍次曰奉方志于學未齓有女二曰闕長適范陽盧士深妻未笄者四其執喪致毁長過於禮幼如成人兄子前鄉貢進士權導諸孤之請見訪為志嗚乎今方夏之內靡攻伐之患蒸嘗所匱在於富而教之府君之生蓋明主歎息之所求也其殁也豈獨舒人和人之相弔歟迹其二府已然之理可使太史公班孟堅之徒從而紀之以及於後今也遺愛故事結于人之深者止於輟舂墮淚日月至而逝焉然則銘之於墓亦其次也銘曰生貴行道道貴及物茍有可稱其誰不沒猗歟府君政及生人自我煦育二邦如春不知者命溘至孔殛託體山河與之終極朝散大夫永州刺史崔公墓志銘栁宗元維元和五年九月十五日壬子永州刺史崔公薨于位享年六十八己未殯于路寢庚寅遷神于舟以某年某月日歸葬于某縣某原祔于祖考吏部侍郎贈户部尚書府君之墓尚書諱猗𤣥宗南巡內禪聖嗣府君以謀畫定命起一旅以復天下厥功載焉尚書之先曰貴鄉丞贈太常少卿府君諱子美太常之先曰揚州江陽集作都丞府君諱道禎行髙位卑華冠士族公諱敏字某承世德之清源浚之以蠲潔以端其志采羣言之枝葉植之以茂實以修集作循其能始由右千牛備身佐環衛更盩厔三原藍田尉仍有大故三從集作徙同位繼受許州臨潁汝州龍興令推以直道二邑齊風哥舒曜尹河南黥集作鯨寇猾驁黎人播越表公為河南尉糗糧芻茭戎備畢給版圖田洫民事時乂遷揚州録事參軍實吳越集作楚之大都會也政令煩拏貢奉叢沓一日不葺鐫譙四至公為之優游有裕長史司徒杜公與之揖讓夷集作異於賔僚入為太子司議郎拜歸州刺史嵓險湍悍人類鳥獸古號難理公克有聲遷永州刺史朝散大夫惟是南楚風浮俗鬼户為胥徒家有禳􅠹大者虐鰥孤以盜邦賦驅愚䝉以神訛言悖于政經莫有禁禦公於是修整部吏黜侵凌牟漁者數百人以付信于下而征貢用集擒戮妖師毁焄蒿淫昏者千餘室以舉正羣枉而田閭克和寬以容物直以率下邦人方安其理縉紳猶鬱其望體魄遽降哀何有窮嗚呼公前夫人徐州參軍滎陽鄭巨女有子曰義和早夭後夫人萬年尉范陽盧彤女嘉淑之德繼聞宗族有子曰貽哲貽儉克承于家洎公之兄子曰勵曰禮誠願志于墓無忘公之德銘曰孰為德門清河濬源垂芳著慶集作逺哉沄沄又作其流沄沄自葉流根世有顯懿揚其清芬炳煥集作煥炳增華昭于後昆惟魴與鯉舊史孰集作是尊孰為茂功尚書清風藹其有融勃焉而興披草從龍布令諸夏敷和六戎赫矣太陽克升于中孰為惠政公嗣餘慶形于謡詠小程其功大遂其性黠吏是省妖風以正于邦于家集作于邑于邦又作施于邑邦克揚休命孰為遺愛公去昭代邦人斯痗始焉是賴今也何載集作戴孰葬我公于洛之㑹何以銘之徽音不昧試大理司直兼貴州刺史鄧君墓志銘前人君諱某字某南陽人漢司徒禹之世也曽祖倚皇建州浦城集作連州普城非令祖少立皇滄州司馬考雍皇右集作左武衛兵曹參軍惟君敏給以御下廉忠以承上幹蠱之稱洽於諸侯謹言之跡彰于所蒞故自始仕以至沒世未嘗無聞焉初以試太常寺奉禮郎更職於劒南湖南江西前後連帥咸器其能以柄於事於劒南則停擬閲實以循蜀本作修官刑盡哀敬之情致淑問之頌寬猛之適克合於中於湖南則外按屬城內専平凖蒞草音礦人錫石之地參鳬氏鼓鑄之功溢山告祥國用益贍吏無並緣以巧法人無怨讟以苦役人集作凡處斯職莫能加焉於江西則旁輯傳置下繩支郡俾無有異政以一於詔條財賦之重待君而理無何雍州經略使路公恕奏署試大理評事兼貴州刺史參帷幕之任董龜虎之威夷俗敬愛革面受事朝廷將以武定南服命安南大校御史中丞趙良金為雍州復以君兼招討判官録其異能奏加司直升招討副使兼統橫蠻疑作蠻集作廉貴三州事龍茸之下直道有立獷悍之內義威必行賦增而不擾法一而無憾然以憂栗間於多虞卒成耳目之塞道致齒牙之猾元和五年五月二十一日疾卒於公館年五十五眀年某月日返葬於潭州某原夫人隴西李氏大理評事練之女年三十三貞元十六年終于郴州有子四人曰贄曰某贄十三年矣哀禮具焉京兆尹𢎞農公始由湖南為江西再以君為從事知之最厚痛君之能不施於劇任惜君之志見屈於羣疑且以志授宗元使備其闕古者觀其所使而知在上之德今也觀其所使集注作以而知在下之誠嗚呼可無辭乎銘曰曼姓之裔司徒隆漢惟君是承有植有集作其幹始屬奉常出參藩翰議讞西蜀平其狴犴巡視南楚總兹條貫貿遷化居貨殖攸贊改煎鎔範貢輸增算既飭財賦亦専傳館去牧荒陬肅其聽斷敓􅔯以息暴戾斯逭行非選事進不避難始賴其寧終聞見憚疾與憂積忠集作志是隨魄散年極中身葬兹髙岸才耶命耶君子興歎和州刺史四字集作連州員外司馬凌君權厝志前人年月日尚書都官員外郎和州刺史連州司馬富春凌君諱準卒于桂陽佛寺先是六月告于州刺史博陵崔君曰余嘗學黃帝書切脉視病今余肝伏以澀腎浮以代將不臘而死審矣凡余之學孔氏為忠孝禮信而事固蜀本作故大謬卒不能有示乎世者命也臣道無以眀乎國子道無以成乎家下之得罪于人以謪從集作徙醜地上之得罰于天以降被罪疾余無以禦也敢以鬼事為纍又告為老氏者某曰余生於辰今之遇集作寓戊辰戍衝也吾命與脉叶其死矣乎吾罪大懼不克歸柩於吾鄉是州之南有大岡不食吾甚樂焉子其以是葬及是咸如其言云孤夷仲求仲以其先人之善余也勤以志為請嗚呼君字宗一以孝弟聞于其鄉杭州刺史常召君以訓于下讀書為文章著漢後春秋二十餘萬言又著六經解圍人文集未就有謀略尚節氣賙人之急出貨力猶棄粃稗年二十以書干丞相丞相以聞試其文日萬言擢為崇文館校書郎又以金吾兵曹為邠寧節度掌書記涇之亂以謀畫佐元戎常有大功纍加大理評事御史賜緋魚袋換節度判官轉殿中丞集作此字侍御史府喪罷職後遷侍御史為浙東廉訪使判官撫循罷人桉驗汙吏吏人敬愛厥績以𢡟粹然而光聲聞于上召以為翰林學士德宗崩邇臣議祕三日乃下遺詔君獨抗危詞以語同列王伾畫其不可者十六七乃以旦日發喪六師萬姓安其分遂入尚書乃以文章侍從由本官參度支調發出納姦利衰止以連纍出和州降連州居母喪不得歸而二弟繼死不食哭泣遂喪其眀以沒蓋君之行事如此其報應如此夫人髙氏在越孤四人南仲殷仲在夫人所未至執友河東桞宗元哀君有道而不白於天下離愍逢尤夭其生且又同過故哭以為志其詞哀焉銘曰噫凌君生不淑學孔氏揚棻集作芬郁好謨謀富天祿讎禁書贊推轂觀靈龜獲貞卜從集作徒東越翊眀牧罷人蘇汙吏覆升侍從躬啓沃匡危疑興大福吏尚書徒𨽻肅佐經邦才用足道之躓身則辱烏江垂九疑麓仍禍凶遘兹酷能知命無怨毒罪不泯死猶僇何以葬南嶺曲魂有靈故鄉復封茲壤歸骨肉為之銘志陵谷桞州刺史桞君墓志銘韓愈子厚諱宗元七世祖慶為拓拔魏侍中封濟隂侯曽伯祖奭為唐宰相與禇遂良韓瑗俱得罪武后死髙集注作中非宗朝文粹作時皇考諱鎮以事母棄太常博士求為縣令江南其後以不能媚權貴失御史權貴人死乃復拜侍御史號為剛直所游皆當世名人子厚少精敏無不通達逮其父時雖少年已自成人能取進士第嶄然見頭角衆謂桞氏有子矣其後以博學宏詞授集賢殿正字集作授校書郎藍田尉俊傑廉悍議論證據今古出入經史文粹作㫖百子踔厲風發率常屈其座人名聲大振一時皆慕與之交諸公要人爭欲令出我門下交口薦譽之貞元十九年由藍田尉拜監察御史順宗即位拜禮部員外郎遇用事者得罪集作文粹作十九年拜監察御史王叔文韋執誼用事拜尚書禮部員外郎且將大用遇叔文等敗例出為刺史未至又例貶文粹有永字州司馬居間益自刻苦務記覽為詞章泛濫佇蓄為深博無涯涘而自肆於山水文粹有之字間元和中嘗例召至京師又偕出為刺史而子厚得桞州既至嘆曰是豈不足為政耶因其土俗為設教禁州人順賴其俗以男女質錢約不時贖子本相侔則集注作許沒為奴婢子厚與設方計悉令贖歸其尤貧力不能者令書其傭足相當則使歸其質觀察使下其法於他州比一嵗免而歸者且千人衡湘以南為進士者皆以子厚為師其絰承子厚口講指畫為文詞者悉有法度可觀其召至京師而復為刺史也中山劉夢得禹錫亦以集無此字在遣文粹作譴中當詣播州子厚泣曰播州非人所居而夢得親在堂吾不忍夢得之窮無辭以白其大人且萬無母子俱往理請於朝將拜疏願以桞易播雖重得死罪不恨遇有以夢得事白上者夢得於是改刺文粹無此字連州嗚呼士窮乃見節義今夫平居里巷相慕悅酒食游戲相徴文粹作逭逐詡詡强笑語以相取下握手出肺肝相示指天日泣涕誓生死不相背負真若可信一旦臨小利害僅如毛髮比反眼若不相識落陷穽不一引手救而集無此字反擠之又下石焉者皆是也此宜市井狡獪所不忍為而其人自視以為得計聞子厚之風亦可以少愧矣子厚前時少年勇於為人不自貴重顧籍謂功業可立就故坐廢既退又無相知有氣力得位者集有推挽字故卒死集作厄於窮裔才不為世用而集粹無而字道不行於時也使子厚在臺省時文粹有亦字自持其身已能如司馬刺史時亦自不斥斥時有人力能文粹作解舉之且必復用不窮然子厚斥不久窮不極雖有出於人其文學詞意集作章必不能自力以致必傳於後文粹作不能自以力傳於後如今無疑也雖使子厚得所願為將相於一時以彼易此孰得孰失必有能辨之者子厚以元和十四年十一月八日集粹作十月五日卒年四十七以十五年七月十日歸葬集作于萬年縣先人墓側子厚有子男二人長曰周六始四嵗季曰周七子厚卒乃生女集有子字二人皆幼其得歸葬也費集作資皆出於文粹無此字觀察使河東裴君行立行立有節槩重然諾與子厚結交子厚亦為之盡竟賴其力葬子厚於萬年之墓者舅弟盧遵遵涿文粹作可人性謹順學問不厭自子厚之斥遵從而家焉逮其死不去既往葬子厚又將經紀其家庶幾有始終者銘曰是惟子厚之室既固既安以利其嗣人文苑英華卷九百五十三
