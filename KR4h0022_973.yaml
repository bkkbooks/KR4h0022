body:
  text: 文苑英華卷九百七十四宋李昉等編行狀四司徒兼侍中北平郡王贈太傅馬燧行狀一首贈絳州刺史馬府君彚行狀一首司徒兼侍中上柱國北平郡王贈太傅馬公行狀權德輿曽祖君才皇右武侯大將軍南陽郡公祖珉皇左集作右鈐衛倉曹參軍纍贈尚書右僕射父季龍皇大同軍使嵐州刺史幽州經略副使纍贈司空汝州郟城縣臨汝鄉石臺里馬燧字珣唐書作洵美年七十太傅英朗特逹剛中方正體苞五常致其用以贊皇極國有二柄壯其猷以合神武終始盛烈為唐宗公原夫代有勳德延耀儲祉王佐之業至公而光年十四從師講學因輟卷喟然曰大丈夫當建功立名以康濟天下豈能矻矻為章句儒耶讀左氏春秋孫吳兵法與歷代君臣大本成敗大較忠賢功用竒正方略會其歸趣如指諸掌十九丁內艱泣血三年以孝聞天寶末安祿山擁幽陵之師南向以光祿卿賈循為留後公以書干循勸諸逆將向潤容牛庭玠等然後傳檄仗順可覆而取之循疑留不决竟及於禍踰月間行至恆山時河朔披集作擾攘物情恟懼方以裦衣長裾遊談感激因其謀而扶義建節者衆矣寶應中陳鄭節度李凉公抱玉移鎮上黨雅知公才表為晋州趙城尉時王師既破史朝義乃復河洛有回鶻可汗之助因肆暴而歸以功自負其強難屈節將使上介致餼皆懼不敢行公官方解巾忽病不讓徑詣其壘申明要約氣盛詞直衆皆擾集作優從可汗乃授以旗幟委之供辦且曰有犯禁者公其董之於是藩部肅然莫不畏服後有酋長求賂於公者立斬十餘人可汗大駭疾驅出境安人禁暴之略兆於斯矣河北副元帥僕固懷恩居將相之重恃父子之勇可汗又其子壻也藉以為援將有異圖公密覘其情靖集作立請為之備初僞范陽節度李懷仙與相衛恆定等四帥相繼來降懷恩結為黨助奏復其職至是擁衆據汾上子瑒圍太原相衛餽運以相掎角至安陽說其帥曰懷恩憯刻以逞欲其子輕佻而好勝人人自為計坐待帳下之變耳深陳利病勸喻激切繇是感公言至涕泣改圖因約懷仙等三人奉章獻欵既回鶻北歸懷恩與瑒繼死公之明識逺略皆此類也本使尋奏改左武衛兵曹參軍歷太子通事舍人著作郎以至祕書少監兼殿中侍御史轉營田節度二判官永泰中拜鄭州刺史兼侍御史至是頒六條撫四方分憂於上施惠於下時兵食方調杼軸其空乃闢其田畝均其户版每嵗一稅百姓便之生齒益息庶物蕃阜大厯中改懷州刺史其夏大旱公以救災沴莫若修教化掩骼埋胔蠲苛恤隱使皆得其欲而無窮人端居潔誠默以心禱至七月穭禾滿野庸亡者襁負而至朝廷以汧陽被邊宜得人式之守拜隴州刺史兼御史中丞公乃訓州師修器備郡城之西有路與蕃境相直凡二百餘步上連峻峯公乃躬自行視塞其蹊隧功堅力省疆埸以寧又置譙門於厄狹之地中制扄鐍上施干櫓積歲之患旬日而安連帥憚公威望日盛羈留幕府因以受代家居京師者久之先皇帝召見竒其才授商州刺史兼御史中丞未旬月屬河陽三城逐其師擇可以撫寧之者特拜左散騎常侍兼御史大夫充河陽三城使是歲大厯十年也夏五月汴宋兵馬使李靈耀以濮陽叛俄據浚郊國家始務靖人特屈常憲因以節度留後授之而又結魏師以略東郡不利六月詔公與淮西節度李忠臣夾攻之時寇鋒寖盛忠臣每合皆北將棄師以免者數矣公嘗激以壯志或紿之吉夢忠臣既慚且憤引師復還先是請忠臣軍汴南公軍汴北每與虜角所向無前敗之於滎澤乂破之於西梁固至是靈耀以其勇悍者八千人號為餓狼營盡鋭來拒公引戲下决戰遂勝入郛時魏之救兵二萬距大梁三千里所疑是許公又合諸侯之師用竒設伏以敢死士三千人鼓譟先登大敗之魏將軍單騎遁去靈耀以其徒宵潰翌日餘黨以城內八千人降於公公悉讓忠臣推而不處閉壘移疾退於坂橋其士吏鹵獲悉以家財購而復之大梁之人至今知感履險則忠以盡敵成功則讓以保身此又將帥之明哲也十二年三月詔復魏博之地諸侯班師公乃歸鎮河陽秋雨暴至河流决溢軍吏等具楫櫂請公登舟以避公曰城中凡數十萬户吾實主之而苟以一家求安所不忍為既而人皆感泣水不為患十四年閏五月皇帝即位深燭理本以太原王業所起國之北門非勳德爛然者不能鎮定特拜工部尚書兼御史大夫太原尹北都留守充河東莭度觀察等使於是修班制正事典險其走集訓其輿師講車徒戰陳之法教金鼓聲氣之節分畫之下變化如神自是烽候罷警丐奴不敢南向而牧矣建中二年夏六月來朝京師加兵部尚書封豳國公初魏博席伯父之勢而得專地既踰年與東平常山復為從約七月魏以兵三萬圍邢州攻臨洺昭義節度上請公為援朝廷許之十月公會昭義之師與神䇿行營兵馬使故太尉西平王於漳州先是魏以浚郊之敗讋公威望至是以節度之師專征伐之任兵刃完利部校訓齊軍聲大振士氣益勵魏人又分鋭騎合恆定李惟嶽之衆萬人集作於臨洺南雙岡下樹柵以自固公自晨至晦急擊大潰殺其將楊朝光時臨洺之圍濠集作楊壘四匝復與招義鼓行而集作軍前腹背受敵颷塵翳景士皆决死凡百餘合公自據西濠口扼其喉以襲鼓之凶徒斃踣亂相蹂蹈收其車重兵械各數十萬魏人棄集作委營而遁邢圍迎潰上嘉其功拜尚書右僕射先是公與軍吏約曰苟戮力成功者當竭産以賞至是悉索家錢與車服臧獲等闕上下視其功之薄厚散於軍中約五十萬且曰苟可以夷患難勉師人赤誠之外無非長物故盡其私積賈其餘勇士皆歔欷感激集作勵爭以效命報焉優詔褒異命史臣書之且詔有司以量入之賦如其數以復於公其毁家佐軍經費集作賞厚下皆此類也三年正月魏人又乞師於東平恆山衆且四萬壁於洹水公曰不備不虞不可以師且以河陽三城常所訓定上請為助有詔從之乃建三橋夾河為壘乘變出竒如環無端初則䘖枚以趨敵因乘其未備後則剃草以滅火使計不得用然後分鋭士颷馳以犯之而後從之獲首給者殆半餘皆走林溺水僵尸相屬腥穢川陸公愀然曰是皆平原人也彼但暴服之耳亦既就死集作斃忍其委骨肉如是耶使得以族屬收瘞既而聞者聞作生知感繇是洛博二州僞署刺史各以其地來降鄴魏之間以咫尺之書招下二十餘城朱滔誘其鄰帥復來助寇四月公有魏城之捷五月詔同門下平章事仍封北平郡王時諸軍連捷師留且久或有集作已復其侵地則怠於攻取公具以上聞有詔朔方節度李懷光應援征討六月朱滔以漁陽之甲三萬至于城下初諸侯有議班師者公曰彼三戰三北假息孤城且宿兵十萬聞援強而退縱敵生患何以復命於朝廷耶既而郡帥相勵皆百其勇七月加魏州大都督府長府仍充魏博澶相四州節度招討等使四年二月又敗之於成集作城安魏軍退於館陶深壁以自固以十月盜臣竊發鑾輅狩于近郊公忠憤闕逼集作迫密圖方略懷光統朔方之旅乘歸心以赴難公齧臂伏泣以大節感動之時朱滔招連北虜邊鄙日聳公謂諸將曰夙駕整旅以扈屬車人臣之分也集作爾儻北都不守即兩河三川搖矣豈行師捍患之義也耶乃還太原遣行軍司馬王權統鋭騎五千與監軍使者赴在所集作行在又令男彚與大將等男各一人赴焉軍食祿賜器備服用一以條奏獻於行宫公初旋師也以晋陽大鹵用武之地北蕃東夏且有外虞而都城之東平坦受敵乃股引汾晋三川漲為平湖能順地泐以導水勢守陴者歲减其役濵河者日厚其生而又廣堤濬池密樹如織金湯自固板幹不勤其明智善利之及人也如此公自出車纍歲功捷相繼而軍中衣食多出寇境河東之人省調給饋運之勞歲减其賦封內相賀因中貴人以聞願刻金石詔從其請公避名不伐懇疏方止其勞謙之詞邦人誦之此所以尊而光晦而彰者也公常揣摩諸侯開導勸善能通其變以誘其衷盡益友之直諒啓純臣之志略因所以建大順立大勳者有焉興元元年二月李懷光貪天犯上衡連逆泚脅其人以河中叛公威聲素振壤地相接支郡屬城降者繼至秋七月皇帝既平大盜乃清宫廟加河東保寧奉誠等軍行營副元帥有詔許公與諸軍同討河中九月既望師及于綘僞刺史王克同棄城而遁餘黨來降分狥下縣進軍寶鼎斬其將條唐書作徐伯文先是懷光之師勇於豨突至是獲甲首千數凶徒奪氣矣貞元元年六月公以軍國大要非表章所盡釋位來朝親稟睿略乃屈指成算請三旬芻粟以平之秋七月與河中節度使今侍中咸寧王及同華邠寧之師次于長春宫公以單騎傳于城下召大將徐廷光西向受命且以君恩喻之曰兵興以來逾三十年而朔方之師最為忠力今乘時自效若建瓴水豈甘心嗇禍終汙鋒刃耶開陳逆順聲涕交感又曰跬步之內矢石所及若决為匪人亦在今日因披襟直前當之廷光俯伏拜泣莫敢仰視抗詞未畢堅壁洞開公徑入撫安奉宣皇澤於是城中周呼曰吾等復為王人矣八月公與咸寧合軍而東至于焦離堡降其將尉圭乃次河中陳于城下懷光傅首其衆請命是舉也不勞師獻功如其平素集作素焉就加侍中歸鎮北都三年二月來朝京師冦戎既清乞罷藩鎮六年拜司徒兼侍中詔有司具儀法冊命禮賜備厚昭德報功人臣榮之屯師河中也靈武節度杜希全獻體要八章上因著君臣針以賜之公奉表陳賀上又賜公宸扆台衡銘各一首公令男暢詣闕謝恩並請揭而書之於起義堂之側詔下優答其略曰卿有訏謨濟代之誠保衡輔朕之志情之所尚遂飾以詞比夫盤盂自銘亦兾輔佐同德遂許刻石兼賜題額寵渥之盛冠耀當時五年九月嘗與故太尉西平王同對於别殿上曰卿二人與朕休戚是同各賜圖形麟閣并御製文命皇太子書於閣壁至於君使臣臣事君選賢與能之盛盡忠作憲之績煥乎天文與日月並明矣九年十月公以足疾久闕朝請因至中書奉表起居召對拜舞手悮至地上驚遽自起以接之公慙惶局蹐感甚以泣上曰元首股肱本為同體卿之疾痛何異朕身乃遣中使梁懷幹扶掖下殿十一年二月以年及懸車再表讓侍中優詔敦奬終不得請八月十七日薨于安邑里私第皇帝震悼不視朝四日先是詔宰臣詣宅問疾御醫禁方旁午於途疾劇遺表指陳邉事純誠至公言不及私薨之明日詔贈太傅又詔文武百寮就宅弔哭京兆尹護喪萬年令為副司農卿嗣吳王巘充吊祭使鴻臚少卿王權為副賻贈絹二千匹布五百端米粟二千石二十七日命太常卿裴郁副使少府少監路恕備禮持節册命上所以待大臣之禮備矣惟公始以文史參佐至于牧守師集作將帥功業見乎變德刑焯於時所以順天時從君命布皇澤宣國威能竭忠力而為藩衛理軍如家馭下以誠拊循厚而士勵法禁眀而衆整誓師鞠旅皆樂為用料敵制勝如在彀中此戰之所由克也凡再分兵符而三破劇賊開相府十四年以上公居中者九年至於盡沃心之言當注意之重密啓詭詞人莫得而知之昔舜之官人也卨作司徒龍作納言惟公居之周之命將也方叔元老申伯于藩惟公嗣之加以馮異之推功趙奢之饗士子囊之城郢文子之不屬其子惟公備之故藏時為饎追逺盛公侯之禮會朝鳴玉拜後聫卿士之榮公之展孝也公之教忠也凡自府辟多為國華登中朝以潤王度分外閫而貞師律公之知人也公之舉善也洪範之乂用三德嚮用五福惜公不踰期頥其他則無不及也德輿自右集作左補闕三歲而為右史掖垣之屬備承功烈褒奬之禮獲奉命書來今先逺有期祖載將及易其名者敢告有司謹狀貞元十一年十月十六日宣德郎守起居舍人知制誥雲騎尉權德輿謹上尚書考功夫建侯行師先王之所以懲不恪也考行尊名先王之所以勸人臣也謹按故司徒兼侍中上柱國北平郡王贈太傅馬公勤勞王家功德茂盛其謀猷合於君其忠利加於人也用登公相以殿邦國今體魄則降日月有時敢録實行請徴諡法謹狀集作上贈絳州刺史馬府君行狀韓愈君諱彚字某其先為嬴姓當周之衰處晋為趙氏晋亡而趙氏為諸侯其後益大與齊楚韓魏燕六國俱稱王其引子趙奢當趙時破秦軍閼與有功號馬服君子孫由是以馬為氏梁有安州刺史侍中贈太尉岫岫生喬卿任襄州主簿國亂去官不仕喬卿生君才隋末為葪集作蒯令燕王藝師之以有幽都之衆武德初朝京師拜武侯大將軍封南陽郡公卒葬大梁新里趙郡李華刻碑頌之君才生珉為左鈐衛倉曹參軍事贈尚書左僕射生季龍為嵐州刺史贈司空清河崔元翰銘其德於碑在新里司空生燧為司徒侍中北平王贈太傅諡莊武武之勳勞在䇿書君其長子也少舉明經司徒公作藩太原授河南府參軍建中四年司徒公使將武人子弟才力之士三百人朝行在扞衛獻御服用物弓甲煮器幄幕奔走危難上嘉集作喜非其勤超拜太常丞賜章服遷少府少監太僕少卿司徒公之薨也刺臂出血書佛經千餘言期以報德廬墓側植松柏終喪又拜太僕少卿疾病一年貞元十八年七月七蜀本作十二十五日終于家凡年四十有五其弟少府監暢上印綬求追贈贈絳州刺史布帛百匹君在家行孝友待賔客朋友有信義其官守集作官舍恭慎舉職其朝獻奉父命不避難其居喪有過人行初司徒公娶河南元氏封潁川郡夫人贈許國夫人許國薨少府始孩顧託以其姪為繼室是為陳國夫人陳國集作夫人無子愛君與少府如已生其薨也君與少府喪之猶實生已親負土封其墓夫人滎陽鄭氏王屋縣令况之女有賢行侍君疾逾年不下堂食菜飲水藥物必自擇將進輒先嘗方書本草恆置左右子男二人赦前左衛倉曹參軍􅤬右清道率府胄曹參軍女子二人在室雖皆幼侍疾居喪如成人愈既世通家詳聞其世系事業今葬有期日從少府請掇其大者為行狀乞立言之君子而圖其不朽焉文苑英華卷九百七十四
