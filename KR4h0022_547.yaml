body:
  text: 文苑英華卷五百四十八宋李昉等編易卜疾病占相妖言巫夣門二十三道易卜易道判六道北斗龜判一道釁龜判一道居蔡判一道家貧致墨判一道𤣥衣判一道讀衛生經判一道死生付天判一道疾病疾病判一道卧大夫簀判一道折指判一道占相妖言占相判一道妖言判一道巫巫恒判一道巫祠秦中判一道夣夣氷下人語判一道夣殿上有禾判一道夣處女皷琴判一道易卜易道判甲居重澤介疾有喜遂存乎辭或告其妄干他事初不量甲云剛德閑邪何往不利對乾坤既列易行其中六九斯重爻見乎外有同功而異位亦原始而要終惟彼甲也乃居重澤當周公之述聖義存乎詞及尼父之窮微意筌於象然則上下合應利殊攸適剛柔立體位或非居是以同心暫間遄當介疾之失和光使終一作和兊終從聿成勿藥之喜以干事而告未曰知章以量力而言何哉懵識况乎形自然之變含不測之神古皓首而難明今丹筆而爰一作奚定舍而勿問愚謂合冝同前甲惕號暮夜有戎勿恤中軍按逗撓爲咎將議明罰甲訴初往不勝今得中道對三才孕育六位時成藏往闡幽鈎深致逺用明失得之報是興易簡之能甲亦何爲形諸卦兆居悔吝之地處動静之中乍行乍藏或進或退初往不勝故惕懼而號呼終歸得中則有戎而勿恤實元亨之利往乃爻象之情言中宜按論憑何議擬括囊已是无咎逗撓寧宜有刑同前丁即次得童僕乙於處得資斧在旅之時所得各别未知孰是對聖人作易窮理盡性君子明道體微知章發揮於剛柔而生爻觀變於隂陽而立卦用存悔吝之介式崇簡易之源既致逺以鈎深亦仰觀而俯察相惟丁乙俱形卦兆匪以䝉而養正諒在旅而多虞異乎先笑後號豈曰大來小往得諸童僕知爾躬以無尤獲其資斧識我心之不快考即次而知是驗於處而覺非稽周家之文休咎斯在閲旅人之卦得失可明請探六畫之㫖以取一言而蔽同前乙入於幽谷三嵗不覿郡吏詰之稱澤無水以致命遂志對易之爲書觧類成象因涸澤之爲體致幽谷之深潛君子是以養䝉晦明致命遂志豈隕穫於所遇將考槃而自得金車欲駕來尚虛徐朱紱方亨猶多臲卼龍蟠所以致用蠖屈豈不求伸十年反常志或斯在三嵗不覿吏亦何非苟用一作罔有違可以無詰同前丙虞吉有他不燕或謂繫心於一云義及豚魚志不可變對行克有孚義形於色可爲已干櫓將措身波流敢昧斯言不知其可丙學乎前訓從事於兹知通幽洞微設卦觀象敬慎不敗利用爲恒動協中庸德均上善獲此專吉莫知其他同夏翟之姿難儔耿介比寒松之節但覩青冥非無所守其不可變語稱近義敢匪聞諸易著盈缶死而後已豈荀息之受托終不食言何周勃之爲臣取於木訥所以繫心於一存忠篤而不䘮執志無二賤華羙之外揚及於豚魚應彼鳴鶴或者所謂於何其臻且誰譽誰毁寧當盡好所以所安寔宜必察誠知言者不中無問吉人寡辭同前丙之宋得坤乾丁告違禁丙不伏對丙德行純懿道術通明齒迹堯封鬷邁宋國探微研奥鈎深致逺思尚長之薄遊每敷損益同孔丘之志事載演坤乾丁性直狹中竒疑能劉疑善類膚受之讒愬異皮裏之春秋發言盈庭誰執其咎今動作非妄隄防未渝心儻偶於木人罪庻寛於艾􅔖北斗龜判得甲畜北斗龜財物歸之遂至萬千或告違禁詞云名在八龜對財無苟得義不厭取若奉業以往積而無一作向傷或非道以行動且爲害於稽爾甲爰契我龜已見負圗不獨七星之號空嗟入夢詎終千載之期是諸侯之寳念彼當畜非宗伯之屬其誰敢私豈伊匪人妄致諸櫝迹罔厠於主守家用保於神靈徵以從長占八九之數窮於旣厭收千萬之盈兹乃多藏且不預於官事靡當知禁亦可畏於人言必曰職我之由守而勿失名可覆視余無爾刑釁龜判甲釁龜不辨名物將罪之云且釁而後辨對有龜之德徴神爲用禀靈千嵗遊質於芳蓮納錫九江彰名於禮物取其象事知變占事知來然以寓莊周之談時聞曳尾挂豫且之網寧知刳骨緬懐於甲時惟卜人將言釁龜以考其象理宜别諸名物定乎吉凶俾春夏以宜左右必順有紊於制實惟伊何欲寘戾焉事可訊者何則取十朋而分睨弇乃先釁以爲尤參五行以觀兆數雖後辨而未失覆其兩端願言一問居蔡判得甲居蔡曰一作目寳人告以爲僭不可入官訴云僂句不余欺是以寳之對魯道浸微守臣䘮職眷兹臧氏代稱冡卿方搆禍於家門始有誣於内子問則以黙察而愈欺理異斬關之爲跡同據邑之請三年一兆旣徒稽於大蔡始僭終吉彼何幸於纎人故帝舜格言惟先蔽志宣尼垂範數而爲黷則知禍福無門通塞無數焉有性命之理存乎卜祝之間若廢興之道適然是善惡之徴一貫人與僭而不入因君子之明刑家貧致墨判易人家貧致墨以自給科惰農對藏徃知來道髙三聖内貞外悔名重九經所以大决狐疑先定人志焉得捨其三易紊彼六官賜帛無聞仰滑稽而慙妙致墨多中知僂句之不欺覺筮短而龜長遽變常而易業雖百錢取給有慕君平而四體不勤孰爲夫子智有所逹鑽祀骨而觀貞神則何施抵凝脂而獲戾且以業爲兼善才貴多能端䇿拂龜罪不加於詹尹收罟解網刑請寛於易人𤣥衣判季冬命𤣥衣督䕶貞來嵗之慶菙人作而揚火以非青純而不致墨執法告闕於太常訴云主巾笥者之過對道月戒期周乎四海一作象卜年貽慶稽彼十朋菙人職在巫咸用方心而考吉材均季主負一作均圗背而知來拂此𤣥衣異夫青純有殊命寳何能致墨執法以簮筆彈珠且問九江之錫主司以巾笥藏骨莫辨千年所留旣虧玉兆之獻須抵金科之罰徒爲薄訴誰之過歟讀衛生經判甲讀衛生經而知吉凶乙告違勅法司科擅卜禁刑對圗緯垂文龜蓍著象聖人操洞微之柄逹者究索隱之端故知盡性窮理惟賢與聖是以魏稱管輅晉有景純卦成而洞曉吉凶繇發而潛知倚伏此皆竒才出於天骨逺識符於自然爰逮凡人不甘一作干其議所以時忌惑衆勅設禁刑甲雖沉思緯象遊精數術名止齊於庻品道豈同於古人冒違勅之明文自貽伊戚挂繩非之峻筆何所逃刑然慮或告不真法湏更審請窮兩造方定片言死生付天判得丙請與丁卜丁云死生付天不付君也遂不卜或非之對白居易聖人建易雖用稽疑君子樂天固宜知命苟吉凶之罔僭何中否之足詢丁執心不回出言有中爾考前知之兆誠足决疑吾從一作我徴昆命之文必先蔽志以爲禍福由已休咎則繫於慎行生死付天脩短乃存乎隂隲當脫身於木鴈寧問命於蓍龜言旣中倫理亦窮性况詹尹釋䇿有問焉知鬬㢘立言不疑何卜不從握粟是謂忘筌疾病疾病判得甲爲郡守賜告養病而出界歸家法司科罪甲不伏對四嶽咨命九土司牧功共理於伏熊期得賢於建隼淮陽卧理聞汲黯之政譽渤海行歌羙龔公之化洽甲官忝列郡未著能名庭無致仕之蘭院少延年之菊漳濵卧疾雖比於古人潁川流譽何靦顔於今吏膏肓所及知藥石之無施肝膽俱披果祈求而有遂賜告養疾宜輟務於公庭出境而行何慢官於私第斷非斥吏欽漢相之髙風才不逮人招施禄之遄謗予告賜告義理懸殊應爲不爲自貽諸咎不敬之罰曷所逃刑卧大夫簀判甲寢卧大夫簀執燭者請易竟不改而卒對喜怒不時患生腠理營衛失度疾起膏肓是以長卿文園空傳封禪之草劉楨漳浦亟聞埋玉之悲人誰不亡道貴從正身苟正矣哀亦何傷且衛臣不禄猶陳尸諫楚尹屬纊城郢爲謀春秋書之用旌厥善况銀燭晶晃以流照華簀輝煥以潛鋪旣不率於典常法宜加於僭擬必因國君之賜有孚曽氏之詢過也非文童子何識折指判甲縁木損折枝指謂三疾數足官不許事對甲禀氣陶形偶華胥之代輕軀弱質謝都盧之人不能鑿井耕田翻乃奔林縁木損其枝指盖是懸疣雖折一枝幸祛數外之累即圗三疾便爲非分之求理不可依宜從告免占相妖言占相判甲告乙左手有文直逹中指丁爲占若過横節貴不可論乙遂挑徹血流彈壁乃作公字對命理多途幽明罕測甲惟愚品丁也狂夫慿仲子之有文相士行之當貴虛論骨象謬定吉凶豈識李固之龜文莫辨條侯之縱理聖人不相抑有前聞鄙夫何爲則預於此妖言判王遇於鄉閭妖言村人告事對王遇禀性不臧立身非謹官雖登於一命慮猶闕於三緘不忍口闕坐彰言玷妖詞妄作雖未惑於平人正罪應論事可繩於峻典定刑名於木吏應入流條量减贖於金科合從徒坐巫巫恒判巫恒堂贈鄉人反接置於廣桞對惟彼巫恒志探幽賾以爲堦儺有禮堂贈無方式從招梗之義自得禳禬之術鄉人悟不知之毁迷獨見之明恃衆生威率情含怒同舞陽之從代鎮已能反接異季布之適朱家翻爲置桞處之刑典豈待邦成請從片折之詞以白違行之訟巫祠秦中判南山有巫每祠秦中輙用王禮所由不禁御史詰之詞云恐爲厲也對神祠所置祭享有由苟非國章無列祀典是以分巫覡之職審鬼神之狀恐伯有之爲厲矜胡亥之乏祀小大從時輕重不越明無夭昏之患幽得慿依之方生旣殊於庻人死何廢於王禮謂執憲之徒詰宜所由之不禁夣夣氷下人語判得甲爲人作媒云夣立氷上與氷下人語當仲春成婚乙告甲誑惑對甲以判合爲資行媒是務瞻言匪斧有類因針爰求六夣之徴告以三星之㑹微波可託豈脉脉於輕氷仙漢難攀尚盈盈於一水將同竹鳯之驗有符芻狗之言乙以至人所無告其狂惑必人同趙壹術等周宣王濬懸刀不聞加罪孔丘曳杖未蹈深愆夣殿上有禾判乙夣太極殿上有禾三穗跳而取之得中穗其友賀云中台之象人告其妖對執古以道格人其經捨而或踰動則奚軌乙位居堯岳名列漢藩擁百姓一作成之寄乘六龍之吉朱門雄雄虛受冠盖翠樓奕奕傍注煙霄同唐叔之得禾身居大殿異張華之博物忽踐中台覺後成空頼功曹之來賀失而復得允蔡茂之髙班夫何妖哉古則有矣告人無識其若是乎夣處女皷琴判乙封侯嘗夣見處女皷琴而歌曰美人熒熒顔若苕之華後遂納國人姓爲内子御史劾其僭訴一作舞云夣應也對國以定封邑惟利建社稷是衛邦畿以藩乙將度以土圭設其苑序式遵厥度宜立其家鳯凰之兆未期桃李之妖將至剛柔自應精爽潛通吉以有祥將一作符表神來之兆庻乎無亂理齊藏往之感位在通侯夢兹處女横角枕而就寢見皷琴而作歌熒熒之詞聞彼魂交之日夭夭之質覩兹形開之時六夣之驗若存八徴之候如㑹納爲内子誠類小君稱僭欲繩未通平典文苑英華卷五百四十八
