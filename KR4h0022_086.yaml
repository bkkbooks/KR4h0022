body:
  text: 文苑英華巻八十六宋李昉等編符瑞三温洛賦一首河出榮光賦一首梓潼神鼎賦一首丹甑賦二首仁夀鏡賦一首西王母獻白玉琯賦一首白玉琯賦一首紫玉見南山賦一首咸陽獲寳符賦一首昆田化為金賦一首温洛賦以上天何言因物表聖為韻鄭宗哲惟上天降厥瑞瑞著于用疑惟君人臨厥聖聖通于天由盛徳之應矣化清洛之温然當短至之時景為凛烈及暄變之際應在淪漣散彼皇明受茲靈貺奚獨禀於和氣乃潜感於深浪遂使清氷不戒於洲渚之曲白露罷凝於蒹葭之上狎而翫信温温以異流廹而觀亦滔滔以難量爾其發自山谷㑹於河濵其外也皎兮如鏡其中也煦然如春夏蟲不疑失輕氷於曲渚秋鴻欲去戀微暖於通津豈止𤣥覽不昧呈祥有因測彼淺深窮兹浩渺方將表瑞氣於澄潔豈獨激巨浪於昏曉揭厲之軰謂祁寒初失於波中游泳之徒疑薰風逺志疑於天表若夫徳至則應天且不言就其深則酌之不竭變其性乃即之也温狀真宰為爐於其底意鄒子吹律於其凉疑彼火井之熒煌湯泉之滃欝徒及時於四氣寧善利於萬物徳之感其感良多水之瑞其瑞惟何方將吹籟之共凜忽猶鼓槖之相和霽日初懸似陽燧之藏深瀨紅霞不散若隂火之在空波方今地不藏寳天惟瑞聖兹水也有時而温由一人之徳盛河出榮光賦吕温麗乎天者曰漢紀乎地者惟河居上善以利物順朝宗而致和時否則為災而獨昏墊運至則呈瑞以叶謳歌豈徒列四瀆以居貴與百川而随波者乎當其布徳惟新儲慶兹始濁色既變榮光乃起乍若燭龍噴熖上騰鍾嶺之雲又似陽烏㢠廻翔下落咸池之水増華一代振曜千祀信能陵晏海而比崇蔑浴曰而専美時則纎埃不驚和風充盈大野初霽圓靈始清皎且潔兮孤明不雜煥其炳兮五色斯呈祥煙歛彩瑞日韜晶掩輕雲而旁屬拂薰風而上征百辟具瞻孰云其相照一人乃眷自合於皇明庻品昭蘓衆幽光被大哉有國之慶赫矣為君之瑞曈曨𤣥黄熠爚丹翠洞鑒龍宫之人朗見馬圖之字昔在温洛致美化於陶唐復効靈於我皇先後叶徳今古和光比屋觀其自化遐荒望以來王詎比流景集壇獨作郊天之應赤光照室空稱誕帝之祥而已哉客有目觀榮河心傾聖日儻餘光而見及庻幽谷之可出梓潼神鼎賦以靈瑞珍寳出為韻盧庾於戱徳包生植者不能動彼天之道瑞及飛走者未能感無一疑之寳故知瑞之大者下及無心之金石徳之深者上合不言之𤣥造我國家髙選物理光天順人膺景命闡坤珍由是函谷闗旁靈符出而啓聖梓潼郡内寳鼎光乎取新此鼎者聖人之大寳有國之神器量則𢎞深體乃殊異嶷如斷山之􅍶一作崇崒屹若巨鰲之贔屭峙其足者可以象三徳虚其心者將以含萬類不汲而滿不燃而沸内烹餁以養賢上歊雲而作瑞應火木之卦既調鹽梅鏤山川之容且禦魑魅是鼎也豈徒靈感亦有􅍁識不假彫鐫宛然文字實彼天之所錫表吾石之至異揭五百代之昌符成六萬年之寳位與夫遷鼎郟鄏卜代三十卜年七百者不可同日而議宜書于冊于帝之庭以合明應以昭神靈士有聞而嘆曰昔黃帝作寳鼎三秦帝奠神鼎一周之衰也沉泗水而隐藏漢之盛也在汾隂而見出未有能來疑作表聖夀之無疆應人文以純一作終吉竊亦欲負鼎于明主啓心而獻術若能使我徴于有商豈見遺于今日丹甑賦以國有豐年為韻薛邕神物昭見聖人是則五位時序兮萬邦以寧百祥薦臻兮一人之徳鼓茲靈器呈我王國有物有憑匪雕匪刻察其狀而𤣥妙相其儀而不忒諒幽賛而克一作曲成矧徽猶之允塞是知竒制可久嘉名不朽類君子之心以虚而受同至人之徳終善且有既應盛而自滿不假於盤瓶亦詎炊而自熟何勞於薪槱擬神鼎之有用掩欹噐而無咎豈以塵見范丹之空賂為紀國之醜者矣且夫清明在躬符瑞由衷誠之必感感而遂通獻白環於重華克明濬哲錫𤣥圭於文命告厥成功此唐堯之表貺盖王母之欽風曷若自然挺出為瑞斯崇其應不昧其用無窮莫因埏埴寧埃磨礱以彰我君聖以報我年豐而已哉客有賦而歌曰𤣥徳日用兮象帝之先丹甑時見兮神物光妍中含虚兮體道上應規兮法天染人無所施其彩飾陶人無所効其貞堅以享以孝兮可以饋疑作饙饎多稌多黍兮屢兹豐年第二同前韻史翽皇矣上帝臨下有則𤣥徳升聞榮問充塞三光明而品物昭報四氣序而黎人不忒雖休勿休惟静惟黙偉夫自然之丹甑方作瑞于明徳應皇運而無疆報時豐於有國其業可大其功可久既申命以自天類有孚而盈缶循環外映爰假象以為名濩落内虚信當無而入有明夫既耨既穫表此不稂不莠將有開而必先固茲器之可守天應靈貺人期至豐不汲而滿將寳鼎而齊列不炊而沸與温泉而比崇異鈞陶之有作符造化之為功千倉以之而發詠萬姓無嗟乎屢空且夫人為國本食乃人天朝有代耕之秩野多擊壤之賢豈不以休徴畢至瑞應無邊正色斯呈以明於聖感天資可尚是表其豐年影亭亭於瑞日光泛泛於祥煙九功咸序八政攸先超三皇而軼五帝尚何足夫比肩仁夀鏡賦并序天寳初有獻書闕下者言巴蜀之間有石鏡見於巖之半仁夀之字昭然可觀僕深竒之因而為賦主上恢大寳闡鴻休仁風揚而𤣥徳布夀星暉而皇化流故得靈仙啓瑞石鏡涵秋無徃不形鑒乃侔於止水有來而應道可喻於虚舟懿夫化自天鈞質非鎔造亭午克疑射靈朝曙早來洞穴之九仙對商山之四皓炳崐岫之龍燭倒風壇之竹掃光能照乘不遺象罔之珠跡在幽巖為啟崆峒之道動如秋水之澄皎如寒雪之凝駐清夜之圓月挂長河之片氷其形不由於拂拭其勢豈假於鉤繩君則無心惟徳之斯感山非自爾喜神之有凴左猨吟右虎嘯萬籟相聒羣容必召雖復晉有金飾之美魏有銀華之妙何如庸魅而野鹿羞窺愛舞而山雞自照昔之冩刑一作形仁壽見膽咸陽倚玳瑁而稱麗挂珊瑚而益光名傳嵗月事著縑緗咸播美於前古孰歸功於我皇鏡為之鑒與明徳之合符石類於金惟聖躬之初應可以示後世之千葉可以軌前王之萬乘記事之簡以光良史之書頌美之詞更動詩人之興法天法地之謂仁不騫不崩之謂壽惟仁也故能昭泰惟壽也故能長乆萬人咸識鄙石室之仙經六體自然輕漢園之卧栁我大君猶抑而不納謙而不有小人無益於補天庶斯文之不朽西王母獻白玉琯賦以聖道昭格神物呈祥為韻髙郢君有徳兮必體道以傳芳物有靈兮必順時以呈祥君感物而徳著物應君以名彰於皇有虞道光先聖既受終於納麓乃禋宗而齊政光被人神澤周遐夐故得靈祥効祉西母來朝霓裳璀璨羽服飄颻駕鸞鶴兮御松喬陵碧落兮戾丹霄宴瑶池於旭日賔魏闕而崇朝其始至也天地氤氲彤庭赫其奕奕其既覿也堦墀皓􅀈素琯爛其昭昭巳而森列䕫龍張皇金石仙侣齒於臣位靈物陳其賔席真質貞明神光激射可使青𤨏失翠丹墀罷赤舞獸見而㢠廻眸儀鳯觀而委翮信希代之名寳旌有虞之光格若乃虚心守白圓質懐貞功髙律吕用等權衡價奪崑山之價聲如嶰谷之聲則随一作趙之璧楚之珩杯遇殷而入用玦因魏而來呈雖見稱於中古固難可而與京是知琯之為物信其直而不屈琯之既神乃歴代而可珍始與時而沿革竟随物而沉淪否不可終得之於道既逄奚景之賞寧從卞和之抱人亦如斯堅貞羙好願同和而見用以窺天而不寳白玉琯賦以神人來獻以和八音為韻王起玉琯絶倫受之於神希夷感化皎潔含真既比徳而為美亦諧音而可珍肇自夐絶發兹璘玢匪剖石於和氏乃成噐於羽人伊昔帝鄉所傳王室未獻虹彩潜射蜺旌並建鸞鶴映之以生光烟霞奏之以適願同鈞天之樂靈境獨聞在層城之宫人寰共逺既而舜徳有感王母來過獻之皎皎捧之峨峨重華遂得其符瑞百靈永謝其琢磨儻比以為笙知鳯吹之不逺如秉之為笛曷龍吟之足多豈徒嘒嘒於兹竹碌碌於随和若乃觀其戾止察其所以質非干疑作竽籟韻含宫徴圓其表而合規虚其中而通理光連素手雖提握之不㤀色映丹唇在吹嘘而成美其捨也無聲之樂其獲也無疆之祉虚而不屈老氏之籥乍同磨而不磷戎人之環孰比况乎知白自守無瑕可猜色迷瓊樹影雜瑶䑓懐清越之音不扣一作求於扣感馨香之徳不召而來固仙侣之所執非玉人之取材則知素琯之祥𤣥理可察將使律合於六音諧於八傳真人之逸韻資聖王之大戛宜乎藏九重之深為百代之欽騰輝爛爛和俗愔愔使伶倫之筩自慙叶律俾女史之管空媿垂箴無以窺天之心而㤀至徳之音紫玉見南山賦以由徳通祥至如影響為韻李覲南山之陽何珍不藏昭皇家之至徳發紫玉之禎祥熒熒兮千嵓動色烱烱兮萬壑生光映于林謂羣鳯之集上據于石辨衆珉之居旁固己聞於徃牒遂荐臻于我皇稽夫所自無脛而至毎隠曜而不欺曷招携之可致所以瑞於有道將委質而式孚出非其時則韜光而自棄南眺穹崇玉見于中貞姿豈琢勁質非礱逺而望焉與彩雲而揺曵即而察也雜嘉氣之葱蘢對白璧而即異配𤣥珪而攸同故瑞無應而不至事有感而遂通通人莫測孰知其色由是王者憑之而致理君子觀之而比徳明琬琰之在兹豈瑕瑜之有匿原乎玉之處幽儉徳是脩徳表玉而應瑞玉用徳而降休盖真宰之潜運知神功之所由不然安得揖至寳於潜谷闡皇風於大猷而已哉若乃外徹中朗泠然如響佩服之處雖貴乎山𤣥抵鵲之時㒺懐於土壤大矣哉瑞無常居因化所如惟徳是依彼自彰於符契不貪為寳我何待而沽諸故客有觀光而歌曰歸太素兮逺蠻屏有瑞玉兮見霄嶺浮紫氣於雲際混清輝於水影庻南山之不騫期我皇之惟永咸陽獲寳符賦君生人者在乎寳位守寳位者在乎靈符鎮四海而攸重臨萬方而作孚時或遘迍暫淪精於甸邑道將昭泰旋應徳於皇衢日者兇師犯順賊臣附進随黄鉞以外遷與翠華而西幸茍遇運之云否將随時而匿影忽影脱於金繩遂沉埋於土梗既而冦盡天府駕旋京師衣冠再朝於紫殿文物重布於丹墀聖上愍兹符之闕遺恒寤寐以求之結精誠而仰望契幽昧以思惟皇心退脩已聞於其政神器大集又叶於其期其形欲呈其氣先覿何五色之可愛與三光而相射光凝渭濵之苑宜玉樹之青青媚貫王都之川狀銀河之奕奕載求載索甸人斯獲捧之而片月下來懐處而長虹上格臨宸扆同舜徳之文明照堦墀叶堯心之光宅玉鈕惟舊芝埿尚新螭文外發鳥篆中陳題為天子之寳實撫逺方之人彼之近縣俯接城闉我唐既斬蕃將於橋上漢氏亦拜單于於渭濵不然者曷不呈於異境而見於他辰者也當其大君出令布蠻夷之政匪我無以重其成命逺人底寧執玉帛於庭匪我無以闡其威靈足知寳符之復光我昭代唐雖舊邦其命惟再頌聲作于外喜氣溢于内藏之王府將神鼎以俱崇列彼帝庭與寳圭而相對盛矣哉我唐之景祚信三皇之作配昆田化為金賦以祭祀明潔神化之金為韻地有百瑞美者惟金其見寡其應深故因神而呈足表至誠之道從物以化更彰肅祭之心其祭惟何首山之事其祭則那我皇所致始馨香以享徳終潔敬而展意向清漢以式瞻庻嘉祥於一至於是乎神報以福帝受以釐昆田之上金化于兹考出地之形時則亡也觀從革之狀維其有之原其始也未辨厥名莫知其價紛雜乎珍異昭彰乎晝夜呈祥於水雖得神而生入息於時亦待神而化及其變也倐忽而成爛然而明初比粟而散㸃竟如螢以亂呈昔混丹沙南面之䖍誠始荅今輝瑶草西方之正色遂生山下熒煌田間昭晰向曙而野花齊媚入暝而天星共列祥風拂而逾麗瑞露濡而更潔至若随車表舜還雨來秦或因初以出或從本而陳未有遷移以禮變化從神以彼瑞為兹瑞易前珍為後珍則知寳非神而不見其祥神非寳而莫臨其祭訪古而昆田宛在閲史而清風不替别有泥沙乆沉光影常翳顧兹神之所開亦化形而表帝文苑英華巻八十六
