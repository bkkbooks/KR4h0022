body:
  text: 文苑英華卷五百五十四宋李昉等編尊號一朝集使等上尊號表二首宰相等上尊號表五首代百官請上尊號表二首元和南省請上尊號表三首朝集使等上尊號表李嶠臣某等言臣等聞正覺既隠而苦海横流象教不興而業風亂起則有至人應運元聖撫期援手而拯其沉淪推心而救其焚爇四生不慧必將有以宅其縁六度未康必將有以振其緒慈氏越古金輪聖神皇帝陛下業隆四諦徳懋三空道成於祗刼之初迹逺於梵天之外而深惻末教俯哀流俗𢎞善推之畧下濟蒼生屈無上之尊降臨丹扆神功暢於明一至徳覃於吹萬三千國土咸登福夀之庭百億天人並出塵勞之境能紹七佛之鴻業躡三身之正位雖多寳之證明法教出見空虚釋迦之愍䕶凡愚來逰穢濁未足以仰參神變逺嫓仁慈臣等宿植有因生平多幸聖朝難遇類蓂葉之希逢法主儻來似曇花之一出屬千齡之大慶欣萬刼之禎符是用下方謳歌旁稽䜟籙攀玉署鵷鴻之議雜金園龍象之謀拜手闕庭虔奉徽號呌帝閽而延佇徒罄丹誠仰天路而遲回不流𤣥霈朝野失望衣冠沮色竊惟聖人忘已以百姓為心菩薩救時共衆生合體是故屈伸進退因其志而不違變化感通順其來一作求而不隔伏乞暫回聖慮俯鑒愚誠𢎞至公之大道畧鳴謙之小節特命有司勉膺殊典使尊名嘉號與法日而俱懸寳筭靈基比恒沙而不極臣等得預陪下列攀奉末光長登正法之筵永樹來生之果豈不幸矣豈不大矣無任誠懇之至謹詣闕固請以聞同前蔣欽緒朝集使魏州刺史臣欽緒等二百四十六人言臣聞三統稱皇五徳號帝道實為大義不可名且以明覆載之尊協神人之望稽衆允廸萬邦咸休伏惟陛下道合乾坤明並日月敷廣運之徳懋昭格之功充塞六合光被二儀陛下之聖理也禮展園廟孝感禎祥陛下之神應一作文理非也經天緯地制禮作樂陛下之文徳也柔逺能邇戡難定亂陛下之武成也殫百王之能事創千古之絶禮幽明感慶華裔帥信伯益所謂乃聖乃神乃武乃文者也今大號雖稱神武未備聖文臣等忝官州郡幸因朝集不勝至願望上尊號開元聖文神武皇帝謹於朝堂昧死上表代宰相上疑作賀尊號表崔融臣某言臣聞形噐以陳萬物有名之謂母尊卑既位兩儀合徳之謂皇非母則不能慈愛域中非皇則不能導化天下歴考前政詳窺舊牒金匱玉版帝王之迹易推鐵軸銅渾天地之情可驗不知誰子氣母握其靈機厥初生人維皇一作皇建啓其光宅然則儀神配永至聖者所以降天符建極施尊至神者所以塞人望禮存知貴事叶强為天命則休應畢臻人心則休應允集不可得而避也不可得而違也其唯聖人乎其唯神用乎伏見某日制書以天授聖圗羣臣上尊號曰聖母神皇昭備典冊肅應景命大赦天下賜酺五日含生之類禀識之儔顒顒如欣欣如洎鳥獸率舞與草樹咸樂中謝臣聞以凡測聖者理絶於名言以管窺天者事迷於逺近雖帝其何力自聞田父之歌而事有不談終獲樵夫之笑亦安敢梗槩而無述哉粤若稽古聖母神皇隂陽和而叡徳生日月合而冲靈降其在家也御娀氏之瑶臺其正位也綰漢皇之玉璽維皇髙祖肇創王業惟太宗克成帝功惟髙宗發揮二聖之耿光惟陛下對越三后之明命顯承遺託敬守前基𢎞濟艱難躬親政事情深社稷義切園陵其至公有如此者七月而葬三年免䘮乃顧明辟載懐髙蹈陛下致還君之羙徳盛於謙尊皇帝竭為子之孝一作方誠深於覆育八紘無外六合一家其冲讓有如此者蒐八代之禮講三王之樂定齊斬之數革靡曼之音草章程垂勸誠除指斥之坐議故誤之條百官以理萬民以察其制作有如此者慎終追逺因心罔極崇七廟廣三雍仁不遺於一物教必行於百姓有虞舜大孝之徳焉訓甲兵誓將帥南北清晏東西輯睦有軒皇戰伐之功焉定都邑殊徽號居三統之政處六合之中有周成一作武非隆平之業焉錦繡羅縠彫文刻鏤人君之美色也而陛下澣濯之服大帛之衣珍羞圓方滋味重累人君之甘㫖也而陛下藜藿之羮粢糲之飯黄金白玉青珠紫貝人君之驕也而陛下所寳唯賢所重唯糓上林禁苑層臺累榭人君之麗也而陛下宫垣不葺廊宇莫脩置拾遺補闕之官則前疑後丞仰天俯地孰云尚也創通賢招諫之匭則聽聲之皷告善之旌疇以懿茲夫然後一作故不登而髙不行而逺天降以瑞地升以符日月光風雨潤慶雲出神泉湧鳳凰翔於庭麒麟臻於囿雲集霧散日至月書固不可得而言也陛下猶固守冲挹深惟惕厲以𤣥黙為神澹泊為徳回聖慮運全謨采衢室之舊儀酌明臺之故事因人之欲不日而成於是靈命孔彰𤣥心摠集山開秘篆洛出祥圗每纓冕同觀軒墀共謁則有㬢車五色對玉匣而如遲雲盖三層伴瓊緘而不去豈非顯見神物覺寤黎蒸者歟可以昭報昊穹可以對揚宗社明至徳表至功隂陽不測之謂神應變不窮之謂聖洋洋乎發育萬物蕩蕩乎人無能名尊號之來豈徒然而已也聖母神皇乃不得已而從之命有司膺大禮秩羣望懐百神配諸侯於四瀆一作海視上公於五鎮百姓有辠一作辜思與天下滌之一人有慶思與天下覃之垂動鑰之深恩降合錢之普澤凡百在宥不知手之舞之足之蹈之者也豈使女媧神化仍參泰古之皇太姒徽音獨擅隆周之母而已㣲臣早霑揚歴亟奉恩榮慙擁腫之曲材荷生成之大徳山濤者渾金之器魏國擢之以尚書伊尹者餙玉之姿殷朝待之於右相在臣駑暗逺謝賢明徼逢振拭擢登左右陛下不以臣不肖復使臣待罪元戎顧無平虜之能未答破羌之寄恭聞瑞典載沐鴻私幸屬皇羲之代欣承帝魁之美冕旒端拱既不獲接景前行玉帛來朝又不獲趨風後位横行萬里限中國以長城悚踴一隅望東朝於西域不任悦豫一作欣悦翹勤一作動之至謹遣某官奉表稱賀以聞垂拱四年韋待價以文昌右相安息道行軍大總管宰相等上尊號表裴光庭臣光庭等言臣聞惟天為大聖人合其徳知㣲其神至人契其道徳應者天錫其命道尊者帝受其名伏惟陛下克享天心誕承丕命仁育萬類道光四表功業見乎變禎符一作符命應乎時徃者國歩多艱克清内難皇天眷祐受命文宗允叶聖謨肇脩人紀不易日月再造乾坤此陛下之神武也若乃欽明上古允恭克讓綴學設教定禮創厯章施五采克諧八音緝熈之教成肅雍之徳備此陛下之聖文也若郊祀天地文之經也敬事神祗文之徳也柔逺能邇文之化也登封告成文之表也非大聖則不能合其典謨非至神則不能制其通變故功成者不可不表徳至者不可不崇是以百辟顒望三靈乃眷將謂鴻名尚闕大典未敷臣等昧死上尊號為開元聖文神武皇帝陛下將以首出千古表正萬邦伏願守神器之至公遺鳴謙之小節徽名不可以深拒大典不可以固違則乃謂韶盡美矣又盡善也凡在含生不勝大慶臣等區區敢以固請第二表臣光庭等言臣伏以聖徳廣運神功莫大昭升于上敷聞在下是用稽古歴考元符敢備鴻名以光帝冊陛下烝烝大孝翼翼小心冲讓推誠未允群請臣等愚蔽罔知所圖臣聞聖者與天地合其徳日月齊其明智無不通物無不照其徳合其名稱盖聖人之摠名非王者之私受昔周尊后稷推以配天所以美其聖矣及思齊文王人樂其徳所以稱其聖矣及下武繼文能受其命亦稱其聖矣是以列聖相承受天之祜豈直前聖有紀而後聖無名陛下聖無不通神無不妙克受文命大定武功稽之於古則如彼考之於今則如此豈可鴻名大寳未有所崇盖天授者不可違人欲者從其願伏乞暫回𤣥鑒俯察丹誠使文徳武功鬱為稱首朝聞其道夕死是甘區區以固請無任悚踴之至第三表臣光庭等言臣等竊因輿頌上奉鴻名丹懇備陳𤣥鑒猶邈是故退省方策進輸真類表作直誠伏惟陛下少回天意則海内幸甚臣聞天下者列帝之公器聖號者先王之至名故業崇則器尊道在則名應理徴不假義與無私今天之祚唐光乎類表作重光累聖天則有命聖可無名今若違而不居請而不類表作末允豈所謂畏天命以欲從人一作以從人欲之㫖哉伏惟聖以知時神以妙物文經造化武定邦家書云乃聖乃神乃武乃文光昭帝圖莫斯類表作與為大不稽古之明義豈在今之能名臣等虔率舊章奉將𤣥命非敢虚美以咎疑其詞伏願上察天心下省人聽使百靈遂望萬古式瞻則朝聞其道夕死無恨臣等不勝懇廹之至代宰相請上尊號第二表白居易臣某等言今月二十四日臣等已陳表章請上尊號愚誠懇切聖鑒未回蹐地跼天不勝大願臣某等誠惶誠恐頓首頓首臣聞大道者無求於物物尊而不辭至公者非欲其名名生而不讓不譲故與天合徳不辭故率土歸心斯所謂應乎天集有而字順乎人者也伏惟皇帝陛下嗣興一徳統牧萬方致時俗於集作之和平納生靈於福集作冨夀金革已偃銷七十載之厲階此句一作鋪七百載之鴻基玉燭方調啓一千年之聖運天人合應書軌混同而鴻名未加盛典猶缺華夷失望史冊無光此誠君上之謙然亦臣下之罪也今臣所以上啓集作稽天意下酌人情再黷皇明重陳丹慊臣謹按書曰惟睿作聖四字集作思作睿睿作聖又曰乃聖乃神乃武乃文又經曰明王之以孝理天下凡此五者歴觀列辟雖甚盛徳莫能兼之伏以陛下自臨大位及茲二年無巾車汗馬之勞而坐平鎮冀無亾弓遺鏃之費而立定幽燕仁和一薰獷驁盡化不可謂睿文乎削平天下震曜八荒北虜求婚以禀命西戎乞盟而納款威靈所集作四及奔走來賔可不謂神武乎陛下以萬乗之尊四海之富供養長樂道光化成推而致集作置之可塞天地可不謂孝徳乎故臣等敢冒死稽首上尊號曰睿文神武孝徳皇帝伏惟陛下畧撝謙之小節𢎞祖宗之大猷惟十二集作一聖在天豈忘繼其志以億兆人為子寧忍阻其心特回宸衷俯受徽號在𤣥功不為主宰於盛徳有所形容煥乎大哉垂裕無極此實天下之幸集作甚字非獨臣之幸也臣等無任誠願懇禱之至代百官請上尊號第二表崔融臣等言一昨仰稽舊章䖍上尊號至誠猶鬱冲㫖未回孤遐邇之心缺神祗之望群臣百辟相顧罔然中謝臣聞古先王者祗奉天命遭時為法因事制宜不必相沿各有所立化而裁之存乎變推而行之存乎通故庖犧是生創天下之法則周成既作改人間之制度况煌煌大寳穆穆中興至道已邁於胥庭鴻名尚襲於漢代臣子之地悚廹不安又謝伏惟陛下紹開聖圗光復丕緒繼文之體行湯之政撫綏兆庶清蕩二兇舊物不失能收夏衆老吏垂涕復見漢官補三皇之缺文緝五帝之漏目享太廟祀明堂禁網踈闊凡事簡易道徳海浸符瑞山承百蠻向風萬人樂業固以萌祗開闢彈壓徃初自可去故而取新何必同條而共貫循季末之常躅忽殊尤之盛儀乎臣等顒顒不勝致懇又謝臣聞天為上帝九名所以示崇髙佛為法王十號所以稱具足陛下安得狥小節遺至公推而不居猶以為厚臣等敢昧死謹再拜重上尊號曰應天皇帝伏乞順萬國之歡心答三靈之睠命不違誠請昭備典冊使百代垂景光而作程飛英聲而不朽豈不美歟豈不盛歟臣等幸逢興運夙參朝列累獻非常之祈願奉惟新之慶所冀日回三舎天移二山愚有不奪期有必遂無任悃欵屏營之至謹詣朝堂奉表固請以聞代百官請上尊號第三表吕温臣某等言臣等自管窺天以凡揆聖虔奉徽號罄陳至誠而再降謙光未廻宸睠慙跼一作局罔據彷徨失圖臣等誠感誠懼頓首頓首臣聞强名曰道莫體混元之功推大于天類表作惟大則天豈報生成之徳徒以定物視聽示人津涯俾其㑹歸有所則象伏惟皇帝陛下克廣睿圖紹休聖緒順考古訓茂宣重光亭毒以佐天和震曜以除人害性與道合身為化先神行六幽風集作威動九服求珠赤水觀妙用於無方檢玉名山告成功而有日豈可過損盛徳不昭鴻休棄臣子瀝血之誠阻華夷傾首之望當仁必受乃曰至公與物無私寧嫌在已安卑者地山嶽之峻豈慙好謙者天日月之光何讓道貴𫝊繼禮從冝稱邦家之舊典不可以廢天人之合應不可以違臣等謬服官常親承至化一披肝膽二黷宸嚴隕越為期俯伏俟命類表作以俟實望陛下随時立教以欲從人㳺神於不宰之鄉屈已於有名之域潤色大寳發揮皇猷古今一時天下幸甚無任懇廹屏營之至謹奉表陳請以聞元和南省請上尊號表類表臣聞皇階類表作陛肇典必本其丕烈明號允屬將御其成功所以開天地命厯之符合人靈慶感之運臣等輙敢上稽天鑒下採人謡以今月十九日瀝懇陳辭冀孚睿聽九重尊秘萬有顒顒誠未動天心如履薄類表作未動天心懼如履薄臣誠惶誠恐頓首頓首伏惟睿聖文武皇帝陛下一徳繼統上符十天六龍時乗下壓羣嶽張寳圗以光帝載懸玉鏡以澈神靈休明㑹期則百神冝衛清净子物而萬邦式孚今類表無今字夫隂本於刑陽稱其徳以刑而類表作則右武以徳而類表作則尚文盖將導人君無為之初類表作物定天道有成之始今陛下宣威紀功示人以武也業古垂統示人以文也纂炎唐十一之盛陋宗周八百之期序庶徴於域中推賜履於閫外宇宙至廣每驚符瑞之繁動植殊輕奚答生成之造昔之述夏禹美宣王雖外軼其聲而中未盡善孰若陛下慮及類表作深一物精入萬樞發揮盛祉啓廸鴻業自彼元和至於兹嵗掃群妖清巨祲率黎崇類表作元非之不恪剗節類表作美枿之方圗或身暴都市或首懸藁街天英神斷不疾而速雖堯伏四罪殷征三年揆之於今彼有慙徳固當仰應名實丕陟鴻徽闢乾位於象帝類表作𤣥象之文飭宸耀於禀氣之類豈可抱冲謙之㣲類表作小事曠祖宗之大猷臣等不勝由衷大願願上尊號曰元和聖文神武法天應道皇帝伏願納天人之貺采臣庶之誠昭示至公允塞羣議無任悃廹慺慺之至第三表第二表闕臣聞古先哲王垂衣御極何嘗不取鑒祖則作為盛猷伏觀列聖以來必崇明號既以表域中之大亦以示天下之公苟或冲讓未行撝謙不發則無以焜煌前烈威畧外區臣等所以披誠上陳冀垂明聽墨詔批答天心尚違臣庻顒顒不知所措臣等誠惶誠恐頓首頓首伏聞類表作惟開元天寳之盛也典章大備劔㦸已銷表徳顯功累上尊稱盖天人之符契不得已而從之陛下禀上聖之姿造中興之運踐臨土宇類表作方夏䖍奉宗祧恢復兩河廓清四海象天為類表作之大並日之中丕業巍乎已成鴻名鬱而未稱臣等所以采前古之議酌當今之詮類表有非字敢悦懌乎天顔類表有所字冀光昭乎史冊百辟卿士皆以為冝萬方黎元固不可忽陛下損之於其成類表作甚盛之代棄類表作斥之於泰寧之時尚以河隍未收闗隴設備而欲更施利澤方啓舊章執謙徳而彌仰類表作抑崇髙議神功而無以彰灼億兆延頸靈祗顧懐率土之人皆知不可况天地之意祖宗之靈乎臣等命偶昌期職叨類表作居樞近雖㣲誠不足以上感而懇願終冀於必從伏乞深惟訓謨特降宸慮允華夷之至望回日月之殊輝誕受鴻名光膺大慶紹五帝三皇之絶典光九廟萬國之丕休人神交感孰不為允無任懇欵兢惶之至第四表臣仰稽舊章䖍上尊號懇誠三瀝冲㫖未回朝野顒然類表作若罔知攸措臣等誠惶誠恐頓首頓首臣聞帝王御極作人司牧徳盛者爰加顯號功髙者必建鴻名是用叶天地之符塞人祗之望榮非為已義實狥公爰在累聖必從衆欲矧陛下踐寳祚握瑶圖懸日月而照九圍皷雷霆而清八極故得吳蜀電滅齊蔡砥平攄祖宗之宿憤救黎元於焚溺今者威加四海澤浸八荒文軌罔不同華夷罔不服政刑罔不舉符瑞罔不臻闢類表作開再造之宏規致中興之昌運而典冊類表作大典猶鬱徽號未崇何以副萬國之心何以答三靈之貺臣等謬居樞近累黷宸嚴望九重之俯從為千載之榮遇雖則祈天之奏伏蒲而未感所冀回日之誠傾藿而必遂臣等不勝懇欵屏營之至文苑英華卷五百五十四
