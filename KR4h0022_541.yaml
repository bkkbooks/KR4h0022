body:
  text: 文苑英華卷五百四十二宋李昉等編軍令門下十九道知謀判一道以囚為前鋒判一道棄子判一道愛子為賊所執判一道擅發兵判一道矯節用兵判一道軍副别屯斬人判一道司馬斬嬖判一道死政判一道輕過罰甲判一道恤士判一道勇壯踰羽林亭判一道立功流例判一道背侍從征判一道復矢判一道武用文士判一道夜進軍判一道邉將無勇判一道犯專殺判一道知謀判甲為邉將私布渠答仍減防兵御史糾其傷財惰職詞云既禦邉寇復息邉人輒欲論功不敢當罪對敦陳整旅必務成師正合奇勝亦資制敵茍取強於技擊豈見責於軍旅惟甲推轂總戎請纓為將仲升投筆方期燕頷之封馮緄發笥且得蛇文之兆於是間途伺敵減戍恤人渠答爰施踐更斯遣賦晉臣之一鼓俾困蒺藜削漢卒之伍符佇歌枤杜虜塵坐清於艽野公問寧候於瓜期誠可論功孰宜書罪且如器械為費用不假於千金士卒獲休功乃逾於三捷止戈若稱惰職棄甲何所論刑執簡是苛失言斯甚雖疾惡為事叔孫誠得於指楹而見善則遷子夏自宜於投杖舍而勿問斯則為然以囚為前鋒判甲受律討不庭以囚為前鋒薄威去備人告失軍容云先者之法對古之用兵抑為制勝或以柔逺或以伐謀逸乃楚囚其來報也無扞樵採亦我誘焉果而稱師特緼權決不薄之險隘不邀之未濟而壯士曲踊於幕庭將軍下矢而鳴鼓豈止血刃當觀繫俘亦有藏地勢之間用人謀之運右廣初駕左輪朱殷犯圍蹈鋒申厥誠果襟甲靣縳釁鼓縲囚列之前伍以待後殿而薄威去備敦陳振旅使戈旌霜指耀征壘而衝喉劔氣風趨駭轅門而籍骨於惟勝敵亦為竒兵何失軍容更成餘議棄子判受命攻城在城中曰將誅孺子報云必與我餐之或以其不義對受命啓行有死無二雖因義以制令寧以權而滅親斷布重城先期賈勇析骸懸釡冀以論功食子自同於樂羊純臣多慙於石碏與其廢禮傷愛豈若徇節忘恩既覆醢以稱仁何請羮而遺我告為虧義誰復間言情則不經古亦有素愛子為賊所執判乙有愛子為賊所執因以登樓就乙求貨乙既不許而促兵進討所由攻之并子亦死御史劾棄子嗇財不可為訓不伏對君惠於臣父愛其子蓋稟天性豈直物情事或不可義將何若乙以忝列藎臣合輸貞節言念幼子痛自闕於防間欽奉大邦懼乃撓於法制若執人以求貨皆罄室以全生則因循而來虜掠何算欲求茍免之道恐貽嫁禍之愆所以促兵冀其盡敵雖喪克家之子終成輔國之臣大義滅親且類橋玄之操深仁濟物奚取卜商之慈劾以嗇財將何沮勸擅發兵判甲奉使副討罪擅發兵殺康國王執事加賞或非之對臨變有謀始聞勝敵興師一作擅兵無律終以臧凶甲受命以行觀釁而動輶軒始發將逺使於四方臨衝載馳遂收功於萬里殊傳介之密旨因取樓蘭若陳湯之矯制更夷康國况今偃革息馬綏戎糾華奚貪一夕之勳遂侈一作多三軍之事雖掠美以自滿終嗇禍而難封執事念彼武功以為勇爵或人思我王度方循政典茍示化以徇物無忘經以敗常將為後圖是亦為政矯節用兵判矯節使邉逄諸國有難遂以兵革平之議不加賞對受命以出惟德之恭見可而行亦仁之勇矯節何者從兹使乎夙駕載馳異將軍之授律飲氷言邁逄邦國之交讐同楚君之用兵且聞觀釁殊羽父之能請因見出師爰發干戈以祈爾爵克寧邉鄙肇敏戎功事貴一作實從宜賞期當物必也不虞或至拒寇爰來滅虜地之煙氛息漢庭之烽堠專則可也賞宜及之如或胡塵自飛我疆不聳空勤逺略終匪臧謀茍免戾而已多何議功之敢望進退二理庶乎一隅軍副别屯斬人判丁為軍副在别屯輒以法斬人主將奏誅之訴云專軍别將不在部曲於法不合罪對天討有罪成師以出注意於將稟命不威丁任既干城寵亦受脤非以惠敵期於伐謀履武人之貞居元戎之副執訊獲醜義非喪律有虔秉鉞誅在明刑議七德以不傷爰九伐而何害主將不能命之以徇分謗生人方欲糾之以違篤責軍簿奉車都尉雖謂專而請誅龍驤將軍固違令以告捷况斬之以法乃非徇私副在别屯異於擅殺欲加之罪無以為詞司馬斬嬖判甲與戎戰司馬曰所遇有隘毁車以為行甲所嬖校尉不肯司馬斬之以徇軍正奏其專殺對受命以出一鼓作氣惟師在和七戰皆獲觀釁而動者謂之軍志相時設教者是謂武經甲維理戎興兹薄伐司馬決勝以先啓行彼徒我車懼其侵軼鑿門受脤陳其教令既遇隘而難進請為行而制敵校尉不肯斬之奚傷違其毁車有類荀吳之嬖是稱亂命以戮晉卿之僕奏以專殺斯則不然死政判死政之老求廪食乙以其無所歸供以間粟對功立於時身有寵祿政死於國家備哀榮至若羽林孤兒且不遺於漢主膠庠飬老猶見恤於周人雖廪食或求而間粟是用法所當得昔嘗稅於關門無若我何今慮擠於溝壑既受一夫之粟何慙七子之居惟乙所供理亦為當輕過罰甲判士門使輕過移甲兵按察使糾之對制刑閲實勿替前一作明典詰罪理軍必條隱令將輕過而恱使同寄令而宥人雖疆場無虞而蜂蠆有毒欲觀攻取必資甲兵謫以分金嘗聞管氏入兹束矢復起齊邦師古可權士門之良圖維允倚法以削按察之糾謬何深理貴平反寧聞伐善恤士判得甲為將卒有患癰甲吮之卒母哭而訴甲將殺其子請罪之甲不伏對總戎之寄爰比善於穰苴受甲之徒忽方疾一作病於荀偃均其挾纊始勉三軍惠以吮膿方憂七發佇盡佳兵之力坐興慈母之哀非輟哭於敬薑實先悲於蹇叔以父觀子固旋踵而無期諭一作論將綏兵乃推誠而有及預起三傷之慟雖欲防明深詳七萃之謀寧宜見罪勇壯踰羽林亭判丁為羽林將超踰羽林亭樓或止之辭曰試辨手搏也而已仰斷對天生蒸民稟氣各異國徴武士以壯為先惟丁力冠圉人勇過延夀因材官以效職列羽林而為將恆拔距以習戲樂彼從戎乍超樓而自矜聊為試辨各適其適亦謂合宜有能不能奚為見正立功流例判執戟董元於閻敬下立功流例七百人並跳蕩功敘録咸依元格酬勳賜階準元軍司削階不入五品對董元藝極穿犀官參戴鶡言思報國即此臨營冒矢前驅爭為跳蕩交鋒直進詎肯遷延忽逢蛺蝶之兵遽一作遂掃螳蜋之卒摧凶殺敵已立殊功凖格疇庸例升榮級前關已蒙褒錫後送獨被稽留既申橫草何能倚樹但今將一作時執戟雖切披陳曩日橫戈且知優劣既言功薄明即效殊懸登執鴈之階慮動續貂之刺背侍從征判王靜母年八十身充侍丁弟順名預軍團點從征鎮靜棄母投募陷陳有功順戀母背征據法應罪縣令以靜闕養以順棄軍俱追勘當各科其罪靜云情存徇國順云意在懷親既並有詞令不能斷對效命捐軀式標於盡節冬溫夏凊載竭於因心靜母西日沉榆氣息奄奄順弟南風吹棘兄弟怡怡咸承大被之恩並藉髙堂之慶靜之充侍須崇扇枕之方順乃從征宜著橫戈之績豈期兵交白刃侍丁為報國之臣饌躍頳鱗征客作安親之子或移忠入孝或徇國違家忠孝不可俱全國家終無暫闕投筆以去狀既不合論辜一作功戀母而還法亦無煩置罪銅章既難推劾玉律須有哀矜請俱釋於九章庶並從於三宥復矢判劉説家有喪登車轂用箭復魂人告越禮對精氣為物聚極則散逰魂為變死而有招歸地歸天人皆共盡在師在旅禮則從宜若道屬多虞時因喪律勤王徇國載居鋒鏑之中委骨捐軀但非歌哭之處既覩亂麻之積爰崇復矢之儀亦同蕢尚在途畫宫受吊仲尼於館脫驂有請雖流千載之聲並是一時之事眷斯劉説有異邾人稱是家喪胡申戰禮罕遵升屋翻比登車驗古有殊論今莫可科其越禮雅合彛章武用文士判得軍帥選將多用文儒之士兵部詰其無武藝帥云取其謀也對白居易亡身死藝集作忘身死節誠重武夫制敵伐謀則先儒士將䇿籌而可尚奚騎射而集作之足稱軍帥明以知兵精於選將以為彎弧學劒用無出於一夫説禮敦詩道可𢎞於七德功宜保大理貴從長若王師之有征以謀則可茍戎略之無取雖藝何為况晉謀中軍選於義府漢求上將舉在儒流豈惟我武惟揚誠亦斯文不墜元戎舉將集作德未爽能軍兵部執言恐為辱國夜進軍判得乙為軍帥昧夜進軍諸將不發郤罪之辭云不見月章對前人表旗示信戎政貴明在九章而或乖雖三令而惟反乙是稱戎帥未逹軍容奉明罰之詞無聞月捷用潛師之計方事宵征徒欲董以爪牙曽不明其耳目况將經武必在昭文夜號未申招集作有虞固冝不進月章莫舉毁櫝自可當辜訴非失辭責乃過聽集作當罪邊將無勇判得乙為邉將虜至若涉無人之地監軍責其無勇略辭云內無糗糧外無掎角對前人封疆貴安伍候尚警茍不固吾圉則速即爾刑乙登彼將壇鎮於邊壘誠可戒嚴趨集作走集罔有敵於我師何乃啓納寇戎若無人於吾地是昧安邊之略信貽失律之凶權勇蔑聞罪戾誰執如或寇強師老食絶城孤期盡敵而還且勤於堅守茍知難而退猶愈於覆亡宜矜掎角之辭難議建牙之罪犯專殺判得丁將在别屯士卒有犯每專殺戮御史舉劾訴稱曽受棨戟之賜對將非處右莫敢示威或在别屯則宜專命丁位雖佐理分以戎行執專征之權錫弓於周典操司殺之柄受棨於漢儀既有令而必行信無瑕而可戮實握兵之能政奚執簡之舉違如或稟命於連營畏子不敢今則分部而賜戟無我有尤冝崇魏絳之威勿議秦彭之罪文苑英華卷五百四十二
