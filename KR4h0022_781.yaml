body:
  text: 文苑英華卷七百八十二宋李昉等編佛像中道像附繡地藏菩薩讃一首畫釋迦牟尼佛讃一首繡藥師佛觀音菩薩讃一首繡西方阿彌陀佛讃一首繡救苦觀世音菩薩讃一首繡藥師琉璃光佛讃一首畫元始天尊釋迦牟尼佛讃一首逹摩總目作磨大師法門義讃一首天台和尚法門義讃一首二宗禪師讃一首能秀二祖讃一首志公讃一首唐大通和尚法門義讃一首唐鶴林和尚法門義讃一首畫救苦觀世音菩薩讃一首畫藥師琉璃光佛讃一首畫西方變讃一首畫釋迦如來讃一首繡阿彌陀佛讃一首觀世音菩薩等身繡像讃一首佛頂尊勝陀羅尼幢讃一首藥師如來繡像讃一首繡地藏菩薩讃并序穆員今年天之不祐我也甚矣春三月謫我以次妹安國寺律師之喪夏四月繼以伯姊楊氏夫人之酷季妹前監察御史裴氏妻泣曰人皆有姊妹而我獨亡所以發於骨髓者深宜格于神明之聽先是太夫人嘗為安國繡地藏菩薩逮卒哭而就是夜季妹夢伯姊謂之曰嘗知是像追護于我是用鬻衣充直緘淚僝工亦逮卒哭而就嗚呼萬聖一致乎慈悲莫大於救苦苦有生死之異聖者亦隨之一作人而殊如周之六官分天地四時之職蓋同歸於理而各有典司若乃拔三塗證六道紓有生追往之慟則菩薩超羣聖焉時貞元六年孟秋初七日也將以謹功二字一作請聖功之始既月而日之且系之以讃惟我素履景福崇嗟爾至聖𤣥感通有赫大士願力同五綵萬縷相好備一心十指聖靈萃振幽冥兮如髣佛畫釋迦牟尼佛讃并序貞元八年九月二十八日員傷神之慟至是朞外姑故河南令裴君夫人鄭氏雅有天性之愛加人一等而疾視之勤喪戚之甚則又加焉至哉母之於子也想其方娠想其既育想其乳抱想其稚戲想其習教想其有行生十九年而夭嵗一周矣無一日不同其十九年之見其遺跡見其同類見其所從見其所嗜則哀與之新訴於神明而不聞禱之寤寐而莫覩索於太虛而無像追之往事而日逺乃求大聖之㫖裂素㸃絢丹青睟容願以已之深慈託於佛之巨力且曰吾子之生也以至仁為性積善為行二者之報同期於福今也夭而不深慈託福施不在於生不在於後宜在於既往矧聖者以巍巍赫赫從而振之然則是像也金蓮之品安知非爾往生乎讃曰生如花兮夭如花先笑後號鍾我家喪有殺兮悼無涯哀慈母兮晝夜哭嵗一朞兮聲相續懇𤣥聖兮降冥福繡藥師佛觀世音菩薩讃萬聖本願同歸乎慈一致乎至有若東方藥師琉璃光佛洎大悲觀世音菩薩其威神德力最著於羣生倬然於人間者也我季妹是用圖厥晬容永以成功其發念也淚逐聲盡福隨響至其成功也靈以指集慶將縷延如其經文則曰火不焚水不溺鬼不災祅不厲矧乃無妄之疾有生之害何從而來哉且聖功𤣥化隂隲潜護宜於自然動亨元吉彼解焚拯溺禳災祓厲之功又安得而施之讃曰伊聖力漙如天吾何願夀百年繡西方阿彌陀佛讃并序唐故監察御史河東裴府君捐館舍二十五月而祥一有直字貞元乙亥嵗仲秋再句有七日其孀員季妹也號曰吾觀天道日昃月虧幾何而追吾觀四時寒來暑往往來如奔吾觀萬物秋落春榮榮落相續吾觀人事禍福倚伏則維其常何天道人事四時萬物同歸於復其運如環而逝者棄于川流日逺未亡之酷終于此生恭聞西方之教有三塗報應之事大聖拯護之功是用發念髣佛有無之間躬現是像嗚呼若聖功則亦無幽冥之苦蓋魂氣無不之也其返於太初乎苟冇三塗則聖者之力唯誠是據宜乎罪消一念福積萬指可思量耶讃曰嚴哉有赫自爾誠晬容巨力於是并能使往生生彼國餘及未亡無終極繡救苦觀世音菩薩讃并序惟元精之和惟𤣥聖之功惟善之報惟人之心順之則宜感之斯契蓋善積而福㑹心至而靈應類夫有開必先之義存乎恍惚杳冥之間天不言神無像發於寤寐者其昭昭歟我裴氏弱妹疇昔之夜夢老僧意夫聖者祈太夫人之福懇懇焉聖者復之曰當繡若繪救苦觀世音菩薩且視其形則如是一作誓覺而念之誠矣未果越句朔嗣夢如初是用心宜聖功指集晬容圓光具發朝日瞳朧嵗八旬有六日我慈親生之辰也願於是畢工於是終聖於是興福於是始同氣不類神明我遺禎夢靡臻斯文敢闕讃曰猗經文兮頌聖德非知知兮焉識識我夢願兮未符巨力如四維虛空兮夫何有極繡藥師琉璃光佛讃并序東方藥師琉璃光佛事具本經今我季妹裴氏嚴是像也誠而禱之其嚴之何裂素㸃絢攢針緝縷以五采章成三十二相八十種好意夫十二上願從之其祝之何况我太夫人福如上願而夀如縷數夫以大聖之力加千積善而赴十精誠宜乎其至也如歸其答也如響其久大無極而不可思量也如東方虛空抑經之有偈所以啓迪誓願發揚聖德者也苟以至誠為用員敢讓於文乎讃曰上天報應為福為極有赫大聖與天坰力而我景行與聖同德存存如山念念如川大聖拯一作祐護同符自然十二願我之事億萬縷我之年畫元始天尊釋迦牟尼佛讃并序聖人之教有三儒之先師曰孝者德之本教之所由生又曰立身揚名以顯父母孝之終也若乃崇樹景福追護既往有無上無邊之力非智智識識之功則道釋二宗其用一致記曰君子有終身之憂忌日之謂也嵗孟秋晦我王母太原郡夫人棄養之辰我公霜露永懷發是上願謂夙夜種德以無忝為念裕蠱垂範立家開國不足以為顯鼎鼐之豐蘋蘩之潔不足以為饗蓼莪罔極石窖啓封不足以為報且曰元始天尊大道之原也釋迦牟尼佛萬聖之祖也以五綵繪圖二睟容及此辰而就眷命小子贊揚聖功其詞曰嚴哉煥乎觀者回向有類夫朝日初升圓月始望又若二聖現于空中髣佛乎不知其像我公孝思福應如響於乎聖力巍巍蕩蕩達磨大師文粹作和尚法門義讃僧皎然我師西來一作方傳于真訣大輪當路小乘亡轍冥冥世人初見日月權迹有歸光雲不滅天台和尚法門義讃我立三觀即假而真如何果外强欲明因萬像之性空江月輪以此江月還名法身二宗禪師讃裁玊為璧一體殊稱二聖淵淵果名同證安贊天后寂佐𤣥宗卷道就迹與時從容邈邈安公行越常致髙天無言九有咸庇大海無心百川同味不授心印但以無言應世而物無不化曈曈大照有跡可覩不異六宗無慙七祖禪岡一傾人天何怙能秀二祖讃二公之心如月如日四方無雲當空而出三乘同軌萬法斯一南北分宗亦言之失志一作志公讃大動之地我安其中髙景無氣靈鶴在空出生死厄隨物有終婺形駭俗借繢開䝉常携刀尺精意誰通唐大通和尚法門義讃觀净之筌斯言不住四色蓮花白花為喻應知離相或未圓通吾師惠心雲開天空唐鶴林和尚法門義讃真見之體知而不知性猶無主禪何有支我本圓寂湛而不移聿來化人慈力所為畫救苦觀世音菩薩讃并序繪工匠意通幽若菩薩出現湛兮凝心于內怡然示相于表非法王妙用何哉誰其主之即湖州刺史諫議大夫樊公夫人范陽縣君盧氏所造也初夫人有恤𦙍之兆嘗念觀音夢雲初懷育月方誕命曰是女且不正名蓋取宜子之意也公以積德樹仁膺其錫羡雖菩薩大慈不昧亦江漢間氣所以鍾詩云維嶽降神生甫及申斯蓋申甫之儔乎於戲至誠既敷上願斯答乃於寶勝殿內按經圖變祗於壁上觀世之門不捨毫端禮分身之國詞曰聖人之體兮有而無迹至人之心兮用而常寂公之小君兮惠性造微我之大士兮慈心莫違保幼子兮永貞無悔覿真儀兮常明不昧慈為雨兮惠為風灑芳襟兮襲輕珮畫藥師琉璃光佛讃并序佛以大慈療生死巨療示藥師名以大智證圓明妙身受琉璃稱無私之鑒湛乎不動誠懇之至感而遂通湖州刺史諌議大夫樊公夫人范陽縣君盧氏得之矣頃因懷妊默念于心先徴佩印之祥載見懸弧之至遂圖此變以答佛慈光射金扉日月不聞於天上影朧珠綴煙霄自出於壁間東方如來瞻仰長世輒揚盛美有愧諛才詞曰藥師之仁隨心至兮十二上願慈不遺兮琉璃之身為我示兮八十種好相畢備兮繪像報德公夫人兮初祝𦙍子果克禋兮早見才童邁人倫兮將成大器應甫申兮如來惠父長可親兮貽厥孫謀夀萬春兮畫西方變讃權德輿惟西方有極樂國以首楞嚴為理其應溥其用神大抵攝萬緣羣動會於虛寂其次則感通信誓為釐為福局於世論者多置為他方之教惟孝子信士仰為冥助則像設之綵繪之用申罔極之報今兹西方變即故户部員外郎贈給事中范公之孤曰傳正傳質奉為先妣博陵崔夫人既練所畫也惟夫人以淑明柔順光配户部自哭之後訓二孤之暇每讀誦大乘微言密詣精理今傳正等又能將順先㫖發於孝思於精廬素壁合朱緑金翠之飾天人法相靡不嚴靜以夫人之福履孝子之至誠若乘念以游如經之㫖當趺坐於芙蕖上品之中生滅流妄於是昭息豫嘗心奉其教故得贊其所以然畫釋迦如來讃并序釋迦大聖以無礙應身演一切法後之人跡文字以為像設誠明以在中而福祉隨之伯舅武進縣丞府君守儒門言行之訓安貞下位其道未光貞元三年捐館舍太夫人從子于鍾陵承訃發哀茹鮮終之痛且痛不得當哭泣之位躬即逺之事朞喪之禮有加等又曰悲哀鍾于情而不足以為冥助也乃稽諸釋氏說以為幽贊交感之際不相逺也是用徼集作徼景福以作繪事煥以金碧穆然尊嚴瞻仰之際如至佛剎况孝悌通于集作乎神明聖功演乎無方小子德輿謹繫以贊五色相宣兮聖質昭明福祥下照兮保佑冥冥繡阿彌陀佛讃并序十二因緣之中生死循環憂悲藴聚非天人大聖以利刃斷之慈航濟之則淪胥顚覆集作沒之不給矣集作溺不起矣惟阿彌陀佛化行西方其號極樂有生之乘念感化則游於斯今兹功德者清信女士隴西李氏為亡夫襄陵尉滎陽鄭君再期之為也女士歸鄭一周星而孀凡事舅姑以孝從娣姒以敬佐夫以義拊下以仁隱約終嵗集作窶至于晝哭衛風碩人柏舟之詩實兼痛焉初鄭君族人于晉因以筮仕成命甫臨集作行祿未及而大病女士方侍姑于吳承訃加慟𢎞誓徼福薦于冥冥紉針綴縷叶用五采青蓮白毫髣佛頻申彼二大士列侍左右晬容交光炳耀煌煌發於心成於手阿鞞跋致其逺乎哉鄭固善士妻又吾伯舅之女子子也得周知之因以讃曰西方大聖乘念則至寫彼相好導兹智氣冥助無方以成鄭志觀世音菩薩等身繡像讃并序獨孤及元年建寅月前相州安陽縣令何昌系以是月甲子當受生之辰痛欲報而罔極哀見在之無住顧非大雄之慈法雲之悲則莫能救拯集作沒振我無明苦果敷祐我𢎞誓願力乃彰施五色以刺繡成文寫菩薩之真相等觀音之全身於是乎諦觀慈集作睟容瞻仰聖位知海潮之梵音不逺蓮華之法塵集作座可識將令功德池水灌溉其三業菩提根牙發生於一雨至哉安陽之樹善也𢎞矣欲廣其善利以偈讃曰集作云法雲垂䕃光破黑業五眼周視四魔怖懾以色觀空於相見法永殖兹集作慈緣河集作恆沙億劫佛頂尊勝陀羅尼幢讃并序道無形相不集作心離文字非言無以導引故諸法生於假名非智無以調伏故大音傳於密教茫茫五濁客塵覆之根識相緣生滅相隨世王有為之牢獄二乘求慧而著空十住集作地見性而不集作了弗非微我智印侯誰司南故集作敦如來以大悲自定之慧力㧾持無畏之祕藏雲覆世界雷震羣有净除我垢令入法性設宗集作字根本假文以筌意也足聲齒舌因音以見法也以十四意集作音攝一切智雖入無漏而不捨有為即色以證空也奉之者惡趣固可使關集作闋閉黑業必為之清净况勝緣乎初太保韓國苖公以兩朝秉鈞所積廩賜顧令集作命宗子家老曰喪祭之餘以庀功德於是我相國頴川公將演成公𢎞恩廣慧四字集作𢎞誓之果也是以樹因此幢韓公生代天工德本植焉殁無鬼責惠牙滋焉而頴川公猶興哀於絶絃之地將乞靈於無我之法庶集作度俾法兩兩公身田故琢堅集作貞石以刋微言仰之讃之如揭日月嗚呼集作烏戲墨㸃之界有極鐵圍之山有壞唯梵音與法印等虛空而無窮則公之前際疇可彌度婺本作𢎞度其詞曰六趣輪轉根塵相刃死生變化如嚮如勝集作如響如瞬何用拯溺㧾持祕印道罔不在𢎞之者人乃繼集作經靈幢公子是集作之因讃持大力啓迪迷津天魔遁形地獄開門拔箭解縛如日破昏韓公善根與石長存藥師如來繡像讃并序吕溫藥師如來像者余妻蘭陵蕭氏之所繡也貞元二十年余奉德宗皇帝之命西使吐蕃辭髙堂而出萬死介單車而馳不測國故遽至戎情猜閉坎險一遇星霜再周夫人盥饋之餘膏鉛不御日亂蓬首坐銷蕣華異域無期良時自晚始怨冬釭之久而紅芳已闌方苦夏景之長而碧樹將落書委塵篋跡淪苔階漸昧音容孰知存沒黷龜不告因夢難徵觸慮成端沿情多緒黃昏望絶見偶語而生疑清旭意新聞疾行而誤喜循環何極刻舟靡集作匪尋浩隔理求窅非計得聞西集作東方有金界極樂藥師集無此二字大雄散琉璃之寶光照河集作恆沙之國土能度羣品集有衆生出諸幽厄一念必應萬感皆通是用濬發慧根妙求真相集作像斷鳴機躬織之素染懿筐手績集作繢之絲盡瘁莊嚴彰施綵繡纒苦心於香縷注精意於針鋒指下而露洗集作染青蓮思盡而雲開白日集作月然後練時潔室華設珍供夕炬傳照晨爐續煙齊獻至誠泣敷懇願遂得慈舟密濟覺路潛引當道場發念之日是荒裔來歸之辰幽贊一作感冥符一何昭焯乃知織回文之錦無補離憂登望歸之臺空為廢目與夫心諧妙理手結勝因進則有濟渡之功退不離清净為本從長擇善豈同日而言哉余感其志效爰用贊敘雖在妻子亦無愧詞藏諸閨門永以傳信讃曰地萬里兮天一極往無由兮來不得解脫願兮慈悲力五色繡兮黃金飾澄氛昏兮圓相開湛水月兮蓮花臺慈眼眷兮矌心回死别離兮生歸來海為田兮劫為灰身念念兮蜀本作身身念念無窮哉文苑英華卷七百八十二
