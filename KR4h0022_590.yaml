body:
  text: 文苑英華卷五百九十一宋李昉等編謝親屬加官此卷英華所編失年代先後今正之為魏王武承嗣謝男授官表一首為王華暢謝兄官表一首為桓彥範謝男授官表一首為并州長史張仁亶謝賜長男官表一首謝弟詵除給事中自求改職表一首謝兄除太常丞表一首為李晉公謝賜兄章服表一首謝兄除補闕表一首為許卿謝堂弟叔冀授青州節度使表一首為崔僕射謝許弟寬宣慰表一首代郭令公謝男尚公主表一首為崔僕射謝弟除給事中表一首為郭令公謝一子三品官表一首代李僕射謝男賜緋魚袋表一首謝妻封𢎞農郡夫人表一首謝兄授太子僕表一首謝兄授祕書省著作郎表一首代尹僕射謝男宥授安州刺史表一首代杜司徒謝男授官表一首代杜司徒謝妻封邑表一首謝兄除官表一首為族兄瑗謝守度支尚書表一首代户部孫相公謝授兄太常卿表一首為魏王武承嗣謝男授官表李嶠臣某言伏奉恩制除臣息尚舍直長史某為左監門衛長史榮隨恩集歡與懼并臣攀軫日車附流星漢才無天質藝以地高陛下每降皇情特垂聖蔭先親後疏之澤自葉流根謀孫翼子之慈愛人及息遂復推恩家室假職幼童參九等之班榮掌重門之禁衛賞延之命寧待於勳庸敦敘之風但緣於骨肉雖東平之子能趨拜咸錫印章齊國之地可割分悉侯支庶豈足以方斯嘉惠匹此殊渥奉絲綸而仰德叩木石而論心受生於天但知榮荷暴骨於地何階酬答無任悚戴慙懼之至謹詣朝堂奉表陳謝以聞為王華暢謝兄官表臣某言臣兄某前某官某月日特蒙恩詔擢授武州司馬未及赴職即八月改除亳州司馬再三榮命叨荷恩私在臣宗門實為慶幸臣兄自歸解巾從仕三十餘年五為縣宰三遷州佐政皆通顯職實蕃勤直道在公有始終之節平心應物無造次之愆在於周行頗蒙推澤近屬虺冦構術惑亂豫州詿誤平人自貽梟滅陛下憫荆河之俗遭此無辜弔海濆之人使同昭慶以為奉揚皇化者必藉其才撫御窮人者亦資有德臣兄同濫承天奬遷移武州在於天恩實為超擢今者未及赴任復蒙改授毫州重疊承恩翻同貶降朝廷體例實以為先臣兄弟叨榮濫竊非據臣兄既授不合冒聞但以始者承恩越蒙抽擢今有何過遂同左遷區區懇誠輒敢祈訴伏願皇恩有裕降昭奬之恩兄果竭忠獲展才之地小臣死日猶生之年臣無任為桓彥範謝男授官表吳少微臣某言伏奉某月日恩勑以臣男某為某官臣實多幸偶遭皇運鳴玉以相建土而王大錫崇榮斯亦極矣先臣老母復荷渥一作湛恩追亡寵存光被窀穸自妻及弟雙綬一作紱六珈闔門振耀惶懼一作愧未已今臣子某識惟髻辨一作年方髫齓服臣之榮為祿已甚更承天秩將何以一作克堪殊澤荐臨斯厚臣寵一作闔門光寵敢不祗承拜命之休無任悚荷之至為并州長史張仁亶謝賜長男官表富嘉謨臣某言伏奉二月十四日勑賜臣絹一百匹又奉其月二十六日勑除臣男之輔尚舍直長史麗澤之來匪月而降受賞轉級惟臣及子寵渥所分臣無與二夙夜惶悸萬殞增惕然旌節所統緣邊千里禦寇既廣兵賦自殷受任非據屢移年祀未能司大事而靜外處疑汔小康而蠲內役而崇班厚貺載在臣門將何以祗拜殊渥光顯休命此微臣所以有死無報也南望闕庭以榮受疑作為懼無任悾款之至謹附表陳謝以聞謝弟詵除給事中自求改職表蘇頲臣某言伏奉今月二十四日勑以臣弟左司郎中臣詵為給事中嘉命猥臻一作臨惶怖相視榮以為戚一作戚茫然失圖臣某中謝臣兄弟一作弟兄數人獲承纍代之庇自幼而長惟愚與直臣一作弟某臣詵初一尉耳竊願從微守分豈思養拙邀榮而乾道曲臨一一作臣門特幸前恩罔謝後忝仍及生臣者父母寵臣者聖明非臣等殞首流腸少酬萬分之一臣某中謝臣自叨清切頗歷星霜乏鍾會五字之敏多王濛四年之任竟未能陳一策進一賢雕蟲粗辦其所為濡翼久知其非據下慙先臣戒盈之訓上負聖主則哲之明常甘屏黜以待髦俊豈悟臣詵復私成造比臣則行有餘力選衆則曾無足言遂使聨事掖垣同趨階一作超軒陛或紊公式必招私議臣知不可物謂臣何一作其宜安有兄弟妄庸並居東西要近臣懷靦愧非敢身謀事或乖一作虧違實塵皇揆伏乞鑒臣自下之審察臣由𠂻之請一作至臣弟詵殊榮既拜奉綸紱一作紼而難回臣頲薄技何成顧瓶筲而易竭指於十手臣假遑寧不如一腋臣將焉用所冀移臣職守允臣陳乞一作請抑朝章之是移匪等列一作臣等之攸宜慺慺款誠昧死期達無任悚荷屏營之至一作極謹詣肅章門外奉表以聞又臣先臣某往忠社稷陛下特賜茅土遂臣所讓因授臣第四弟乂右補闕亦希别從選序不敢同在近侍臣之感恩不識為喻輕黷旒冕懼深冰淵謝兄除總目作授太常丞表臣某言伏奉今月日恩制除臣兄某太常丞跪發詔書光駭閭里寵盈益懼喜極而悲闔門感恩垂淚相賀中謝臣自登兩府倐至三旬天地之間未禆塵露雲雨之施已遍公私撫心載驚顧影增惕伏以臣兄列官清憲專於察視臣又承弼皇樞課其條職茍愆綱紀責在凖繩所以請移别官冀循常序聖慈曲被命數有加獲陪卿士之行更列大夫之後遇深賤質誠合懇辭恩及長兄不敢多讓誓將死節上答生成為李晉公謝賜兄章服表見六百二十九卷以表作狀苑咸謝兄除補闕表臣某言伏奉恩旨臣兄前長安縣尉某特授左補闕內供奉賜紫金魚袋踰涯之澤忽降於重霄非次之榮猥延於同氣自天有命闔室相歡臣某中謝臣兄比因寇孽迹江湖臣侍奉皇輿委身巴蜀艱虞萬里兄弟一方分成吳越之人久切支離之思陛下克清禍難再闢寰區臣兄幸遇休明得歸鄉陌雖骨肉之愛重喜如初而班秩已停久嗟失職臣昨因對奏遂竭懇誠情至所陳言將無隱陛下道𢎞孝理念廣睦親載懷遂物之仁爰軫在原之急皇慈曲被朝奬仍加擢同補衮之司錫以腰章之寵况臣官參秩禮任在司言身上列於紫垣兄遽升於青瑣故得連枝捧日方並侍於軒墀比影朝天復惣華於朱紫一門受賜舉族增榮斯實眷自宸衷恩加望外臣比承顧使本不因人今又沐殊私特延慈旨投軀有地報德無階非臣灰粉所能答效惟當昆弟相朂以孝資忠螻蟻之負細塵誓將裨補烏鵲之銜微毳志願填河將九死而猶生豈百年之足謝云此篇元誤入五百八十八卷公卿雜謝門今移入於此為許卿謝堂弟叔冀授青州節度使表于邵臣某言伏闕恩制除臣堂弟叔冀青州刺史兼御史大夫闕州節度使不次之恩特出聖鑒大來之慶闕若驚啓處無措臣某誠歡誠喜頓首頓首臣聞闕將將之道也保大定功將兵之道也然後賞罰之柄懸于日月伏惟光天文武大聖孝感皇帝陛下睿謨廣運玄功莫測保天命以立極伏人心而戡難遂使妖不得為災謀不得及伐動皆殱潰以靖神人如叔冀者曷為力也徒以逺奉威靈獲全私懇雖堅守薄節轉戰微功而寵寄雄州榮兼獨坐為叔冀之非望實舉宗之所懼今復割海岱之衆創立節度之權超將中軍兼領仍舊受委斯重其憂轉深屬餘孽未除誅剪指日策勳飲至責其總戎勉勵之心伯仲之分以此思效不遑居寧臣緬惟代業竊又自愧臣之父河西節度使先臣某叔冀之父平盧節度使先臣某皆中朝舊勳式遏寇虐東西故事人或賴焉而叔冀何功實膺克荷非臣所感時論皆榮追懷父子之軍信兼國家之報載競載躍無以克堪臣雖偶中外義形骨肉事濟時康死復何恨無任感恩競躍之至謹詣某門奉表陳謝以聞為崔僕射謝許弟寬宣慰表臣寧言中使馬承倩至奉傳德音特自宸眷矜臣束身逺鎮兄弟别離許令弟寬與臣相見義切君父恩連骨肉神魂驚駭不知所之一生有涯萬死難報臣某中謝臣實最小衆所鍾憐臣在劍門強逾二紀形影相吊未嘗棄離忽遇聖朝委臣方靣在寬何有纍踐班榮職綰通曹貴通三獨功慙汗馬業謝屠龍禁掖禮闈踰津越分每一念至刻心如焚縱脂分戰場血染邊草未之云報降此無圖上感推心下排飛謗惟此之際臣知所安但以蕃寇外虞蒼黃後命飲至清廟或未剋期所冀暫來不失宣撫臣之願也每羡聨行獨憐回鴈長思共易不著新衣無任感戴慙惶之至為崔僕射謝弟除給事中表臣某言伏見某月日恩制除臣弟審給事中寵命自天驚魂無地永惟非據靦靣何深臣某載兢載躍頓首頓首臣家本東周代傳素業衣冠祖襲豈望繁華至於伯仲雖聞詩禮但欲官常一作從詎知生遇聖明日加重寄擢臣偏將之下録臣久戍之勤待罪西南時逾一紀分憂障塞心係兩蕃䇿無類於燒牛功有慙於求犬長懷尸素之責重貽門户之羞今則恩聨兄弟澤及中外在審何者纍踐通班未聞三諫之勤仍添八年之寵將何以曲承顧問接武名儒分陪掖下之榮專掌殿中之事在盈知缺居寵思危臨深履薄莫之為喻伏以王居渙汗方鎮途遙逺有所聞推疑作摧謝無及空慙為人之擇不遂免冠之讓臣無任喜躍屏營之至代郭令公謝男尚公主表蘇頌臣某言伏奉某月日恩制授臣男曖試殿中監駙馬都尉尚升平公主聖慈曲被焜耀私門揣分慙恩以榮以懼臣本寒素類表作單緒愧類表作素非閥閲幼男弱稚類表作植又乏義方陛下以臣僃位台司服勤王室時收賤族許以國姻宗黨生光室家同慶門開魯館地列沁園事出非常榮加望外恩深義重何以克堪糜軀粉骨不知所報無任感戴受恩之至為郭公謝一子三品官表邵説臣某言伏奉二月二十一日恩制勑賜臣一子三品之官并階鴻私曲臨魂守飛越臣某中謝臣聞祿位之設以待勳賢茍非其人必貽伊咎臣之弱子未有令聞方且勵以義方教之詩禮遽承殊澤將授崇班非唯有黷朝章名器難假實亦懼招官謗顛沛為憂寤寐兢惶罔知攸處况臣榮登上相任重總戎子弟數人盡居右職過亢之誡切在於心既懷棟橈之災寧忘屋漏之愧乞停寵命俯遂愚𠂻庶幼童無冒進之嫌微臣有知足之誼無任感懼屏營之至代李僕射謝男賜緋魚袋表令狐楚臣某言臣得進奏院狀報今月七日聖慈召臣男公敏令對見其日中使馬承倩奉宣進止賜緋魚袋欽承失圖啓處無地臣某中謝臣才非動衆勇不兼人仰一作抑緣枝葉獲展筋力荷天百祿幸據於周詩遺子一經誠慙於漢史男公敏義方未教容止無儀伏蒙陛下召入清禁之中立於丹墀之下逺憂顛沛伏用兢惶特受宸恩榮綰朱紱八字類表作豈意明命曲臨榮光下燭小觽猶佩忽帶金章褐衣才解便綰朱紱生成之功不次浸潤之澤無涯重若戴山輝如衣錦胸奴未滅方忍恥於愚臣童子何知復受恩於聖主六姻交賀百衆同歡空竭節於邊陲豈酬仁於覆載銘膚鏤骨不敢隕墜所守有限不獲陳謝臣無任感戴屏營之至謝妻封𢎞農郡夫人表代宗常衮臣某言伏奉恩命賜臣妻楊氏邑號封𢎞農郡夫人伏以古者卿大夫之妻咸曰命婦亦曰一作云內子但有稱謂皆無封邑其後雖有石窖延鄊陳留風俗傳漢與項氏戰厄於延鄉有翟丹免其難故改延鄉為封丘縣以封翟母英華誤作延卿類表闕二字之錫亦無夫人之號唯漢魏戚里晉宋外家平原清河疏郡以馭貴建昌髙密啓邑以睦親猶止於郡縣君而已近代著令國朝相襲階至二品妻封夫人上比鵲巢逺齊翟茀禮秩兼盛等威稍逾其或襄贊類表作襄勸勳臣光華戚屬以兹而授尚可相循臣以凡賤謬承委遇尸職已久愧心匪寧仰酬國恩分寸未展內省家事慈渥過豐又蒙曲私霑及主饋特封嘉號載錫徽章中壼慶其秩髙外姻賀其禮盛儀參貴列寵極私門自顧何功叨榮至此頓逾涯分退益兢惶無任荷戴屏營之至謹奉表陳謝以聞謝兄授太子僕表臣某言伏奉五月十七日恩制授臣兄依前祕書省著作郎太子僕特恩曲降殊私一作渥下霑踴躍宛轉兢惶震越臣某誠歡誠懼頓首頓首臣自承録用已積嵗時內省微效未申涓瀝虛受祿俸有靦官榮在公無益於已多罪一作已寬臣罪及私之幸又奬臣兄伏以頃冒朝章兄合坐罪一作同坐伏蒙慈貸仍進常班庇一作卑賤孤門已墜復立蒸嘗獲主將廢更存寵被幽明感涕橫集一作戴感天日求之古今一作今古無臣此例雖肝膽塗地未塞前責而糞土餘生尋加後命臣授方鎮一作靣兼錫崇階兄拜宫僚又參髙秩慶聨鴈序澤及翾一作環飛承命若驚何功至此愧心踧踖赧汗流離非望驟遷罔知所措殘骸萬死難以上酬無任感荷兢抃之至謹遣散將某官某奉表陳謝以聞謝兄授祕書省著作郎表臣某言伏奉閏五月二十四日恩制授臣兄太常丞祕書省著作郎臣待罪兢灼啓處不遑寵命荐臨驚抃失次臣某誠喜誠懼頓首頓首臣上負國恩自抵邦憲聖慈矜宥屈法全生猶許自新特虧令典一作時令典郡惶怖隕越夙夜載馳雖荷殊渥尚憂嚴命臣兄今一作合從連坐伏待貶官不謂玄造曲成鴻私下覆在憂惕之際特受寵榮當譴斥之時忽承遷轉品秩下降清望有加復齒周行獲陪班列向非親紆聽斷俯燭幽微則骨肉分竄於殊方簪裾永絶於昭代豈望更霑人次再沐朝奉罪重丘山恩過天地感戴慙赧俯伏驚惶臣竊自思惟無所上報庶將懲改前過克勵殘骸苦節誓心冀申萬一無任感恩惶一作喜懼之至代伊僕射謝男宥授安州刺史表吕溫臣慎言伏奉某月日勑集作制書授臣男宥安州刺史兼侍御史充武昌軍兵馬留後仍賜紫金魚袋者雷驚里巷日照閨門寵命自天戰局無地臣誠懼誠感頓首頓首臣聞惟君任臣固無虛授知子者父敢私不才臣頃者伏以聖政惟新時清無事遂絶指縱之望求申戀主之誠陛下以臣統兵集作所統嵗深周涉集作旋艱險長三軍之子弟積百戰之瘡痍將有去留念其情義理資感勵事貴便安爰勑臣男試總戎務臣雖訓之以義教之以忠而鈍拙集作朽鈍有涯策磨靡及童兒集作子代斫每懷傷手之憂小子集作兒在邊曾無折屐之喜將何遽膺寵數集作命荐沐恩光真授竹符就加金組且祁午之為軍尉父已懸車陸抗之將父兵子非綵服豈比臣身居端右男領方州鳴玉會朝朱轓行縣集作樂焜耀中外超冠集作冠超古今名數之樂何加集作如人臣之事斯極千載至公之運獨被殊私萬物咸遂之辰先蒙曲澤瀝肝呈膽莫盡微誠毁族滅身滅集作殞寧足上報臣無任感恩隕越之至謹奉表陳謝以聞代杜司徒謝男授官表劉禹錫臣某言伏奉今月一日制授臣長男師損祕書省著作郎次男式方太常寺主簿又得進奏官裴遘狀報伏承聖恩特降中使送官告到臣宅分付師損者寵渥非常授任不次驚躍無措靦懼失容臣某中謝臣繆分重寄獲守外藩受恩既深無績可紀男師損等器惟凡品教闕義方早沐睿慈已階官次每懷塵忝常誡滿盈豈謂鴻霈曲覃大明私照寬臣尸素之責念臣葵藿之誠命下延恩集作下延胤息叨踐班級天書出禁中貴臨門榮冠等夷慶流宗族况著作乃撰論之地唯史才是居太常實禮樂之司非儒者勿履顧兹庸謬集作昧忽此超升內省慙惶若墜氷谷伏以聖朝立制建官惟賢名實無乖輪轅盡適微臣父子獨為幸人非據踰涯自中徂外虛受丘山之賜實增負乘之憂進退倣徨不知所履集作據無任戰荷屏營之至代杜司徒謝妻封邑表王仲周臣佑言伏奉恩制封臣小男母李氏密國夫人臣某中謝伏以禮經明文婦人本無爵命秦漢以降優賢以寵閨門固無繆及有紊彛典臣小男母李氏本非主饋若貴云因子臣男尚自賤微禮有從夫臣妻又早逝殁豈伊末品忽被殊私此蓋陛下念臣齒髮漸衰賔祭無主俾立家而有裕遂開國以疏封詩美鵲巢懼無德而自處禮榮翟茀恐負乘以貽災瞻上天而以懼以慙顧中閫而載榮載躍不任荷懼屏營之至謝兄除官表歸冕臣某臣伏奉某月日恩制授臣兄前湖南觀察判官侍御史內供奉賜緋魚袋國子監博士雨露殊私忽霑微賤儒雅盛職光寵衰門承命震驚感恩踴躍臣聞聖王勸學庠序為本故堯命后夔典樂以教胄子周立師氏以教三德漢制博士以教五經歷考校學之官蓋今博士之任用人之選非賢莫居臣兄幸遇昌時守臣先訓孤貧好學以傳家業而聖代推恩遂及兄弟位登五品光賁一門感鶺鴒之詩增友悌之愛齒羔鴈之序愧荀陳之才况臣受任方隅莫申涓效寵榮荐及灰粉難酬誓期殺身以酬萬一無任感恩隕越之至為族兄瑗謝守度支尚書表王渭臣某言伏見詔書以臣族兄瑗守度支尚書三元告慶萬國朝宗榮命與璧月相輝厚澤與金雲並潤顧其踈薄寧不震驚臣某中謝臣聞坳堂之水必膠於置杯曲木為資無階於刻桷何則適用之風斯替其效靡成失材之道既彰厥功寧著相彼庶物尚或其然矧伊名器理難冒居一作叨冒微臣自料浮淺業藝何甄德匪潤身學慙為已文辭小道曾無沉鬱之才刀筆淺能非有精明之舉特以夙因多幸簉奉承華猶見録其疲駘且弗遺其菅蒯髙榮好爵疊委屨疑作屢縻入掌便繁傍參侍從事然積步竟慙一割竊妨賢路深希退託降階之念空誓丹愚昭著之恩更彰綸紱差肩六尚方駕八元內省輶輕義無祗冒伏惟陛下明兼七曜照及九幽寧在微臣近虧則哲特願褰兹旒纊察是芻蕘回此如繪矜其匪石則失應之善永息得人之美載揚物議允諧朝經式序不勝代户部孫相公謝授兄太常卿表錢珝臣某言伏奉今月某日勑命授臣親兄太常卿檢校右僕射者霑澤下臨私室相慶臣某誠歡誠荷頓首頓首臣兄某抱公藏器據德有鄰為善而不欲近名從政而但思利物自臣遽升台輔獲導化源雖向國去私戒臣常切而入門避事逺謗每深出趨垂拱之朝退務掩關之樂陛下禮行舟楫念及塤箎慰其友愛之懷進以優崇之秩伏以九卿之位歷代所尊舜以三禮命伯夷漢以奉常加稷嗣倚古則重得人始光用典之難敢言兄氏方懷慚惕忽荷皇私而階峻銀青寵兼端揆喜溢在原之屬恩加電疑作當軸之臣既激弼諧且𢎞名教股肱作輔莫成鎮撫之功手足相須但有胼胝之誓臣無任文苑英華卷五百九十一
