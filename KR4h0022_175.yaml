body:
  text: 文苑英華巻一百七十五宋李昉等編應制八殿五首樓十三首閣一首亭十首園十首幸宅三十一首殿奉和冬至日乾元殿受朝牛𢎞恭已臨萬㝢宸居御八埏作貢菁茅集來朝圭幣初學記作連司儀三接盛掌禮九賔䖍重欄映如璧複殿繞非煙侍宴瑶泉殿江緫見初學記水亭通枍詣石路接堂皇野花不識采旅竹本無行雀驚疑欲曙蟬噪似含凉何言金殿側亟奉瑤池觴臨芳殿侍宴前人鍾箭且徘徊堂皇薦羽杯橋平疑水落石迥見山開林前暝色静花處近香來西嵫傷撫夕北閣濫㳺陪儀鸞殿早秋唐太宗寒驚薊門葉秋發小山枝松隂背日轉竹影避風移提壺菊花岸髙興芙蓉池欲知凉氣早巢空燕不歸奉和儀鸞殿早秋應制許敬宗睿想追嘉豫臨軒御早秋斜暉麗粉壁清吹肅朱樓髙閣凝隂晩雕窓艷曲流小臣參廣宴大造諒難酬樓登北顧樓梁武帝歇駕止行警廻輿蹔㳺識清道尋丘壑緩歩肆登陟鴈行上差池羊腸轉相逼歴覽窮天歩曬瞩盡地域南城連地險北顧臨水側深潭下無底髙岸長不測舊㠘石若搆新洲花似一作如織奉和同前梁簡文帝舂陵佳氣地濟水鳯凰初學記作皇宫况此徐方域川岳邁周灃皇情慶歴覽㳺陟擬崆峒聊驅式道候無勞襄野童霧崖開早日晴天歇晩虹去㠶入雲裏遙星出海中此詩三百十一巻重出今已削去初春登樓即目觀作述懐唐太宗慿軒俯蘭閣眺矚散靈襟綺峰含翠霧照日蘂紅林鏤丹露錦岫殘素雪斑岑拂浪堤垂栁嬌花鳥續吟連甍豈一栱衆榦如千尋明非獨材力終藉棟梁深彌懐矜樂志更懼戒盈心愧制勞居逸方規十産金奉和同前應制許敬宗旭旦臨重壁天暮極中京春暉發芳甸佳氣滿層城去鳥随㸔沒來雲逐望生歌裏非烟颺琴上凱風清文波浮鏤檻集作桷摛景焕彫楹璇璣體寛政隆棟象端衡創規雖有作凝拱遂無營沐恩空改鬢將何謝夏夏與厦同成春日登陜州城樓俯眺原野回舟碧綴煙霞宻翠斑紅芳菲花栁即目川岫聊以命篇唐太宗碧原開霧隰綺嶺峻霞城煙峯髙下翠日浪淺深明斑紅装蘂樹圓青壓溜荆跡巖勞傅想窺野訪華疑作莘情巨川何以濟舟檝佇時英奉和同前應制許敬宗挹河澂緑字御溝映朱宫辰旂翻麗景星䍐曳雕虹學嚬齊栁嫩集作嫩葉妍笑發春叢錦鱗文碧浪繡羽絢青空眷念三階静遐想二南風登蒲州逍遙樓唐𤣥宗長榆息烽火髙栁静風塵卜征廵九洛展豫出三秦昔是潜龍地今為上里辰時平承道泰聊賞遇年春黄河分地絡飛觀接天津一覽遺芳翰千載肅如神奉和同前應制蘇頲在昔堯舜禹遺塵成典謨聖皇東廵狩况乃經此都樓觀分迤邐河山㡬縈紆緬懐祖宗業相繼文武圖恃德既無險觀風諒有孚豈如汾水上簫鼔事㳺娛首夏花萼樓觀羣臣宴寧王山亭廽樓下又申之以賞樂賦詩有序不録唐𤣥宗今年通閏月入夏展春輝樓上風花媚一作晩城隅賞宴一作宴賞歸九歌揚政要六舞散朝衣天喜時相合人和一作知非事不違禮中推意厚樂處感心㣲别賞陽䑓樂前句暮雨飛奉和花萼樓下宴羣臣應制張説萬心翹樂宴三舍緩昌時山接夏雲險䑓留春日遲節移芳未歇興隔賞仍追醉後傳嘉惠樓前舞聖慈皇恩與時合天意若人期故發前旬雨新垂湛露詞奉和御製登鴛鴦樓即目應制孫逖玉輦下離宫瓊樓上半空方廵五年狩更闢四門聦井邑觀秦野山河念禹功停鑾留睿作軒檻起南風奉和聖製御春明樓臨右相園亭賦樂賢詩應制王維複道通長樂青門臨上集作上垣路遙聞鳯吹喧闇識龍輿度褰旒明四目伏檻紆三顧小苑接侯家飛甍映宫樹商山原上碧滻水林端素銀漢下天章瓊筵承湛露將非富人寵信以平戎故從來簡帝心詎得廻天歩奉和登𤣥武樓觀射即事言懐賜孟涉應制崔元翰寧嵗常有備殊方靡不賓禁營列武衛帝座彰威神講事一臨幸加恩徧撫廵城髙鳯樓聳塲迥獸侯新飲羽連百中控弦踰六鈞揀材盡爪士受任皆信臣光賞文藻麗便繁心旅疑作膂親復如觀太清昭爛垂芳辰閣聖恩顧問獨逰月燈閣直書其事應制釋廣宣禪居河畔無多地来往尋春物正華磴道上盤千畆竹欄干低數萬人家簷前施飯来飛鳥林下行香踏落花自解刹那知佛性不勞更喻㡬塵沙亭幸棃園亭觀打毬應制武平一令節重遨遊分鑣戱彩毬驔驂廻上苑躞蹀繞通溝影就紅塵沒光随赭汗流賞䦨清景暮歌舞樂時休同前沈佺期今春芳苑逰接武上瓊樓宛轉縈香騎飄颻拂畫毬俯身仰未落廻轡逐傍流秪為㸔花鳥時時悮失籌同前集作棃園亭子侍宴應制崔湜年光陌上發香輦禁中逰草緑鴛鴦殿花明翡翠樓寳集作天杯承露酌仙管雜風流今日陪歡豫皇恩不可酬望春亭侍逰應制杜審言帝出明光殿天臨太液池堯樽随歩輦舜樂繞行麾萬夀禎祥獻三春景物滋小臣同酌海歌頌答無為宿羽亭侍宴應制前人歩輦千門外離宫二月開風光新栁報宴賞百花催碧水搖雲集作空閣青山繞吹䑓聖情留晩興歌管送餘盃百一作落此詩一百六十九巻侍宴門重出今削去注異同爲一夏日仙蕚亭應制宋之問髙嶺逼星河乗輿此日過野含時雨潤山雜夏雲多睿藻光巖穴宸襟洽薜蘿悠然小天下歸路滿笙歌奉和幸神臯亭應制前人清蹕諠皇道乗輿䧏紫宸霜戈駐晩集作曉日雲管發陽春䑓古全疑集作知漢林餘半識秦宴酣詩布澤節改令行仁昔恃山河險今依道德淳多慙獻嘉頌空累屬車塵侍宴蘘荷亭張説廽鑾青岳觀帳殿紫煙峯仙路迎三島雲衢駐兩集作六龍園林㸔化塔壇墠識餘封山外聞簫管還如天上逢晦日承恩讌永穆公主亭子賦得流字前人堂邑山林羙朝恩晦日逰園林含淑氣竹樹遶春流舞席千花妓集作騎非歌船五綵樓羣歡與王澤嵗嵗滿皇州同望幸新亭賜錢公宴李憕感夣通𤣥化覃恩䧏紫宸賜錢開漢府分帛醉堯人地隔朝宗慶亭臨卜洛新行㸔廣雲雨二月次東廵園同二相已下羣臣樂逰園宴一作宴樂逰園唐𤣥宗巽集作撰日巖廊暇需雲宴樂初萬方朝玉帛千品㑹簮裾地入南山近城分北斗餘池塘垂栁宻原野雜集作隰野花踈帟幕看逾暗歌鐘聴自虚興闌歸騎轉還奏弼違書自唐𤣥宗詩至趙冬曦共九首並見張説集奉和恩賜樂逰園宴應制張說漢苑佳逰地軒庭近侍臣共持榮幸日來賞艷陽春饌玉頒王篚摐金下帝鈞池䑓草色徧宫觀栁條新花綬光連榻朱顔暢飲醇聖朝多樂事天意毎随人同前宋璟侍飲終酺㑹承恩續勝㳺戴天惟慶幸選地即殊尤北面集作向祗雙闕南臨賞一丘曲江新溜緩集作暖上苑雜花稠亹亹韶絃屢戔戔賁帛周醉歸填畛陌榮耀接軒裘同前蘇頲樂逰光地選酺飲慶天從座宻千官盛塲開百戱容緑塍際山盡緹幕倚雲重髙下花齊發周廽栁遍濃奪睛紛劍履喧聽雜歌鐘日曉銜恩散堯人併可封同前崔沔五日酺初畢千年樂未央復承天所賜終宴國之陽地勝春逾好恩深樂更張落花飛廣座垂栁拂瑤集作行觴庻尹陪三史集作吏諸侯具萬方酒酣同抃躍歌舞詠時康同前張九齡實筐延錫集作後又作厚命供帳叙羣公形勝宜春接威儀集作儀文建禮同晞陽人似露觧愠物從風朝慶千齡始年華二月中輝光變草木和氣發絲桐嵗嵗長無事徒知樂九功同前胡皓五酺終宴樂集作集三錫又歡娱仙阜崇髙異神州眺覽殊南山臨皓雪北闕對明珠宰座鵷鴻滿倡集作昌庭駟馬趨綺羅含草樹絲竹吐郊衢銜杯不能罷歌舞樂唐虞同前王翰未極人心暢何如帝道明仍嫌酺宴促復寵樂逰行陸海披珍蔵天河望斗城四闗清靄合數處白雲生飪餗調元氣歌鐘溢雅聲空慙堯舜力至德杳難名同前崔商春日照長安皇恩寵庶官合錢乗罷宴集作承罷飲賜帛復集作宴帛賜追歡供帳慿高列城池入望寛花催相國飲鳥和樂人彈北闕雲中見南山樹杪看樂逰冝締賞舞詠惜將闌同前趙冬曦爽塏三秦地芳華二月初酺承奠璧罷宴是合錢餘栁翠垂堪結桃紅巻欲舒從容㑹鵷鷺延曼戱龍魚喜氣流雲物歡聲浹集作來里閭望恩將報厚集作聖恩將厚意請述記言書幸宅奉和聖製幸韋嗣立山莊侍宴應制李嶠南洛師臣契東巖王佐居幽情遺紱冕宸眷屬樵漁制下峒山蹕恩廽㶚水輿松門駐旌蓋薜幄引簮裾石磴平黄陸烟樓半紫虚雲霞仙路近琴酒俗塵疎喬木千齡外懸泉百丈餘崖深經鍊藥穴古舊藏書樹宿摶風鳥池逰縱壑魚寧知天子貴尚憶武侯廬同前李乂見集本樞掖調梅暇林園藝槿初入朝榮劍履退食偶琴書地隐東巖室天廽北斗車旌門臨􅌄窱輦道屬扶疎雲䍐明丹谷霜笳徹紫虚水疑投石處磎似釣璜餘帝澤頒巵酒人歡頌里閭一承黄竹詠長奉白茅居同前沈佺期台階好赤松别業對青峯茅室成一作承三顧花源接九重龍旂榮秀木鳯輦拂疎笻逕狹千官擁溪長萬騎容水塘開禹瞻疑山閣獻堯鍾皇鑒清居逺天文睿奬濃巖泉他日夣漁釣往年逢共榮丞相府偏䧏逸人封同前武平一三光廻斗極萬騎肅鈎陳地若逰汾水畋疑歴渭濱圓塘水冩鏡遙樹雪成春絃奏魚聴曲機忘鳥狎人築巖思感夣磻石想垂綸落景搖紅壁層隂結翠筠素風紛可尚𤣥澤藹無垠薄暮清笳動天文煥紫宸同前趙彦昭賢候唯題里儒門但署鄉何如表巖洞宸翰發輝光地在兹山曲家隣郃水陽六龍駐旌䍐四牡耀旂常北斗臨台座東山入廟堂天髙羽翼近主聖股肱良野竹池亭氣村花澗谷香縱然懐豹隐空愧躡鵷行賢候集作賢族同前徐彦伯鼎臣休澣隙方外結遐心别業青霞境孤潭碧樹林毎持東野策遙弄北溪琴帝幸紆時豫台園賞嵗隂移鑾明月沼張爼白雲岑御酒瑤觥落仙壇竹徑深三光懸聖藻五等冠朝簮自愧承恩盛咸言􅍦在今同前劉憲東山有謝安枉道䧏鳴鑾緹騎紛初日霓旌度曉寒雲蹕巖間下虹橋澗底盤幽棲俄以届聖矚宛餘歡巖懸飛溜直岸轉緑潭寛桂華堯酒泛松響舜琴彈明主恩斯極賢臣節更殫不才叨侍從詠德以濡翰同前崔湜丞相登前府尚書啓舊林式閭明主睿榮族聖嬪心川狹旌門抵巖髙蔽帳臨閒牎慿栁暗小徑入松深雲巻千峯色泉和萬籟吟蘭迎天女珮竹礙侍臣簮宸翰三光燭朝榮四海欽還嗟絶機叟白首漢川隂同前張説寒灰飛玉琯湯井駐金輿既得方明相還尋大隗居懸流集作泉珠貫下列嶂錦屏舒騎逺林逾宻笳煩集作䌓谷自虚門旗塹複磴殿幕裹通渠舞鳯随公主雕龍賦婕妤地幽天賞洽酒樂御筵初菲才叨侍從連藻媿應徐同前蘇頲摐金寒野霽歩玉曉山幽帝幄期松子臣廬問葛侯百工徴往夣七聖扈來逰斗柄乗時轉台階捧日留樹重巖籟合泉迸水光浮石徑喧朝履璜溪擁釣舟恩如犯星夜歡比濟河秋不學堯年隐空令徴集作傲許由上又製七言絶句侍臣皆和李嶠萬騎千官擁帝車八龍三鳥訪仙家鳯凰原上窺青璧鸚鵡杯中弄紫霞同前劉憲非吏非隐晋尚書一丘一壑降乗輿天藻縁情兩曜合山卮獻夀萬年餘同前趙彦昭廊廟心存巖壑中鸞輿矚在㶚城東逍遙自有蒙荘子漢主徒言河上公同前武平一鳴鑾奕奕下重樓羽蓋逍遙向一丘漢日惟聞白衣寵唐年更覩赤松逰同前崔湜竹徑桃源本出塵松軒茅棟别驚新御蹕何湏林下駐山公不是俗中人同前沈佺期集無東山朝日翠屏開北闕晴空綵仗來喜遇天文七曜動少㣲今夜近三台同前李乂曲榭廻廊遶澗幽飛泉噴水溢池流祗應感發明王夣遂得邀迎聖帝逰同前張説見集本西京上相出扶陽東郊别業好池塘自非仁智符天賞安能日月共廻光同前蘇頲樹色參差隐翠㣲泉流百丈向空飛傳聞此處投竿地遂使兹辰扈蹕歸奉和幸禮部尚書竇希玠宅應制劉憲北斗樞機任西京肺腑親疇昔王門下今兹制幸辰恩光山水被聖化管絃新遶座薰紅葉當軒暗緑筠摘荷纔早夏聴鳥尚餘春行漏今徒晩風煙起觀津同前李乂家住千門側亭臨二水傍貴逰開北地宸眷幸西鄉曵履迎中谷鳴絲出後堂浦疑觀萬象集作物峰似駐三光草向瓊筵樂花承綉扆香聖情思舊重集作里留飲賦雕章同前沈佺期北闕垂旒暇南宫聴履廻天臨翔鳯轉恩向濯龍開蘭氣承仙帳榴花引御杯水從金穴吐雲是玉衣來池影搖歌席林香散舞䑓不知行漏晩清蹕尚徘徊同前蘇頲尚書列侯第外戚近臣家飛棟臨青綺廻輿轉翠華日交當户樹泉漾滿池花圓頂圖嵩石方流擁魏沙豫逰今聴履侍從昔鳴笳自有天文䧏無勞訪海查奉和幸上官昭容院山亭獻詩四首鄭愔地軸樓居逺天台闕路賖何如逰帝宅即此對仙家座拂金壺電池搖玉酒霞無勞秦漢隔别訪武陵花二堯茨姑射近漢苑建章連十五蓂知月三千桃記年鸞歌随鳯吹鶴舞向鵾絃更覔瓊妃伴來過玉女泉三宫掖賢才重山林髙尚難不言辭輦地更有結廬歡池棟清温燠巖牎起沍寒幽亭有仙桂聖主萬年㸔四槎流天上轉茅宇禁中開河鵲填橋至山熊避檻來庭花采菉蓐巖石歩莓苔願奉羅圖泰長開錦翰裁過大哥宅探得歌字唐𤣥宗附見張説集魯衞情先重親賢愛轉多冕旒豐暇日乗景暫經過戚里申髙宴平䑓奏雅歌復尋為善樂方念保山河奉和過寧王宅應制張説見集本進酒忘憂觀簫韶喜降尋帝堯敦睦禮王季友兄心竹苑龍鳴笛梧宫鳯遶林大風將小雅一字重千金同玉真公主過大哥山池唐𤣥宗附見張説集地有昭一作招賢處人傳樂善名鶩池臨九逹龍岫對重城桂月先秋冷蘋風向曉清鳯樓遙可見髣髴玉簫聲奉和同玉真公主過大哥山池應制張説見集本緑竹初成苑丹砂欲化金乗龍與驂鳯歌吹滿山林爽氣凝波逈寒光映浦深忘憂投此觀為樂賞同心文苑英華巻一百七十五
