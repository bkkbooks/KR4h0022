body:
  text: 文苑英華卷一百七十五宋李昉等編應制八殿五首樓十三首閣一首亭十首園十首幸宅三十一首殿奉和冬至日乾元殿受朝牛𢎞恭已臨萬㝢宸居御八埏作貢菁茅集來朝圭幣初學記作連司儀三接盛掌禮九賔䖍重欄映如璧復殿繞非煙侍宴瑶泉殿江總見初學記水亭通枍詣石路接堂皇野花不識采旅竹本無行雀驚疑欲曙蟬噪似含凉何言金殿側亟奉瑤池觴臨芳殿侍宴前人鍾箭且徘徊堂皇薦羽杯橋平疑水落石迥見山開林前暝色靜花處近香來西嵫傷撫夕北閣濫遊陪儀鸞殿早秋唐太宗寒驚薊門葉秋發小山枝松隂背日轉竹影避風移提壺菊花岸髙興芙蓉池欲知凉氣早巢空燕不歸奉和儀鸞殿早秋應制許敬宗睿想追嘉豫臨軒御早秋斜暉麗粉壁清吹肅朱樓髙閣凝隂晚雕窗艷曲流小臣參廣宴大造諒難酬樓登北顧樓梁武帝歇駕止行警回輿暫遊識清道尋丘壑緩步肆登陟鴈行上差池羊腸轉相逼歷覽窮天步曬矚盡地域南城連地險北顧臨水側深潭下無底髙岸長不測舊㠘石若搆新洲花似一作如織奉和同前梁簡文帝舂陵佳氣地濟水鳯凰初學記作皇宫况此徐方域川嶽邁周灃皇情慶歷覽遊陟擬崆峒聊驅式道候無勞襄野童霧崖開早日晴天歇晚虹去帆入雲裏遙星出海中此詩三百十一卷重出今已削去初春登樓即目觀作述懷唐太宗慿軒俯蘭閣眺矚散靈襟綺峰含翠霧照日蘂紅林鏤丹露錦岫殘素雪斑岑拂浪堤垂栁嬌花鳥續吟連甍豈一栱衆幹如千尋明非獨材力終藉棟梁深彌懷矜樂志更懼戒盈心愧制勞居逸方規十産金奉和同前應制許敬宗旭旦臨重壁天暮極中京春暉發芳甸佳氣滿層城去鳥隨看沒來雲逐望生歌裏非烟揚琴上凱風清文波浮鏤檻集作桷摛景焕雕楹璇璣體寬政隆棟象端衡創規雖有作凝拱遂無營沐恩空改鬢將何謝夏夏與厦同成春日登陜州城樓俯眺原野回舟碧綴煙霞密翠斑紅芳菲花栁即目川岫聊以命篇唐太宗碧原開霧隰綺嶺峻霞城煙峯髙下翠日浪淺深明斑紅裝蘂樹圓青壓溜荆跡巖勞傅想窺野訪華疑作莘情巨川何以濟舟楫佇時英奉和同前應制許敬宗挹河澄緑字御溝映朱宫辰旗翻麗景星罕曳雕虹學嚬齊栁嫩集作嫩葉妍笑發春叢錦鱗文碧浪繡羽絢青空眷念三階靜遐想二南風登蒲州逍遙樓唐𤣥宗長榆息烽火髙栁靜風塵卜征巡九洛展豫出三秦昔是潜龍地今為上里辰時平承道泰聊賞遇年春黃河分地絡飛觀接天津一覽遺芳翰千載肅如神奉和同前應制蘇頲在昔堯舜禹遺塵成典謨聖皇東巡狩况乃經此都樓觀分迤邐河山幾縈紆緬懷祖宗業相繼文武圖恃德既無險觀風諒有孚豈如汾水上簫鼓事遊娛首夏花萼樓觀羣臣宴寧王山亭廽樓下又申之以賞樂賦詩有序不録唐𤣥宗今年通閏月入夏展春輝樓上風花媚一作晚城隅賞宴一作宴賞歸九歌揚政要六舞散朝衣天喜時相合人和一作知非事不違禮中推意厚樂處感心微别賞陽臺樂前句暮雨飛奉和花萼樓下宴羣臣應制張說萬心翹樂宴三舍緩昌時山接夏雲險臺留春日遲節移芳未歇興隔賞仍追醉後傳嘉惠樓前舞聖慈皇恩與時合天意若人期故發前旬雨新垂湛露詞奉和御製登鴛鴦樓即目應制孫逖玉輦下離宫瓊樓上半空方巡五年狩更闢四門聰井邑觀秦野山河念禹功停鑾留睿作軒檻起南風奉和聖製御春明樓臨右相園亭賦樂賢詩應制王維復道通長樂青門臨上集作上垣路遙聞鳯吹喧暗識龍輿度褰旒明四目伏檻紆三顧小苑接侯家飛甍映宫樹商山原上碧滻水林端素銀漢下天章瓊筵承湛露將非富人寵信以平戎故從來簡帝心詎得回天步奉和登𤣥武樓觀射即事言懷賜孟涉應制崔元翰寧嵗常有備殊方靡不賓禁營列武衛帝座彰威神講事一臨幸加恩遍撫巡城髙鳯樓聳場迥獸侯新飲羽連百中控弦踰六鈞揀材盡爪士受任皆信臣光賞文藻麗便繁心旅疑作膂親復如觀太清昭爛垂芳辰閣聖恩顧問獨逰月燈閣直書其事應制釋廣宣禪居河畔無多地來往尋春物正華磴道上盤千畝竹欄干低數萬人家簷前施飯來飛鳥林下行香踏落花自解剎那知佛性不勞更喻幾塵沙亭幸梨園亭觀打毬應制武平一令節重遨遊分鑣戲彩毬驔驂回上苑躞蹀繞通溝影就紅塵沒光隨赭汗流賞䦨清景暮歌舞樂時休同前沈佺期今春芳苑逰接武上瓊樓宛轉縈香騎飄颻拂畫毬俯身仰未落回轡逐傍流秪為看花鳥時時悮失籌同前集作梨園亭子侍宴應制崔湜年光陌上發香輦禁中逰草緑鴛鴦殿花明翡翠樓寶集作天杯承露酌仙管雜風流今日陪歡豫皇恩不可酬望春亭侍逰應制杜審言帝出明光殿天臨太液池堯樽隨步輦舜樂繞行麾萬夀禎祥獻三春景物滋小臣同酌海歌頌答無為宿羽亭侍宴應制前人步輦千門外離宫二月開風光新栁報宴賞百花催碧水搖雲集作空閣青山繞吹臺聖情留晚興歌管送餘杯百一作落此詩一百六十九卷侍宴門重出今削去注異同為一夏日仙蕚亭應制宋之問髙嶺逼星河乘輿此日過野含時雨潤山雜夏雲多睿藻光巖穴宸襟洽薜蘿悠然小天下歸路滿笙歌奉和幸神臯亭應制前人清蹕喧皇道乘輿降紫宸霜戈駐晚集作曉日雲管發陽春臺古全疑集作知漢林餘半識秦宴酣詩布澤節改令行仁昔恃山河險今依道德淳多慙獻嘉頌空纍屬車塵侍宴蘘荷亭張說廽鑾青嶽觀帳殿紫煙峯仙路迎三島雲衢駐兩集作六龍園林看化塔壇墠識餘封山外聞簫管還如天上逢晦日承恩宴永穆公主亭子賦得流字前人堂邑山林美朝恩晦日逰園林含淑氣竹樹繞春流舞席千花妓集作騎非歌船五綵樓羣歡與王澤嵗嵗滿皇州同望幸新亭賜錢公宴李憕感夢通𤣥化覃恩降紫宸賜錢開漢府分帛醉堯人地隔朝宗慶亭臨卜洛新行看廣雲雨二月次東巡園同二相已下羣臣樂逰園宴一作宴樂逰園唐𤣥宗巽集作撰日巖廊暇需雲宴樂初萬方朝玉帛千品㑹簮裾地入南山近城分北斗餘池塘垂栁密原野雜集作隰野花踈帟幕看逾暗歌鐘聽自虛興闌歸騎轉還奏弼違書自唐𤣥宗詩至趙冬曦共九首並見張說集奉和恩賜樂逰園宴應制張說漢苑佳逰地軒庭近侍臣共持榮幸日來賞艷陽春饌玉頒王篚摐金下帝鈞池臺草色遍宫觀栁條新花綬光連榻朱顔暢飲醇聖朝多樂事天意每隨人同前宋璟侍飲終酺㑹承恩續勝遊戴天惟慶幸選地即殊尤北面集作向祗雙闕南臨賞一丘曲江新溜緩集作暖上苑雜花稠亹亹韶絃屢戔戔賁帛周醉歸填畛陌榮耀接軒裘同前蘇頲樂逰光地選酺飲慶天從座密千官盛場開百戲容緑塍際山盡緹幕倚雲重髙下花齊發周廽栁遍濃奪睛紛劍履喧聽雜歌鐘日曉銜恩散堯人併可封同前崔沔五日酺初畢千年樂未央復承天所賜終宴國之陽地勝春逾好恩深樂更張落花飛廣座垂栁拂瑤集作行觴庶尹陪三史集作吏諸侯具萬方酒酣同抃躍歌舞詠時康同前張九齡實筐延錫集作後又作厚命供帳叙羣公形勝宜春接威儀集作儀文建禮同晞陽人似露解愠物從風朝慶千齡始年華二月中輝光變草木和氣發絲桐嵗嵗長無事徒知樂九功同前胡皓五酺終宴樂集作集三錫又歡娛仙阜崇髙異神州眺覽殊南山臨皓雪北闕對明珠宰座鵷鴻滿倡集作昌庭駟馬趨綺羅含草樹絲竹吐郊衢銜杯不能罷歌舞樂唐虞同前王翰未極人心暢何如帝道明仍嫌酺宴促復寵樂逰行陸海披珍藏天河望斗城四關清靄合數處白雲生飪餗調元氣歌鐘溢雅聲空慙堯舜力至德杳難名同前崔商春日照長安皇恩寵庶官合錢乘罷宴集作承罷飲賜帛復集作宴帛賜追歡供帳慿高列城池入望寬花催相國飲鳥和樂人彈北闕雲中見南山樹杪看樂逰冝締賞舞詠惜將闌同前趙冬曦爽塏三秦地芳華二月初酺承奠璧罷宴是合錢餘栁翠垂堪結桃紅卷欲舒從容㑹鵷鷺延曼戲龍魚喜氣流雲物歡聲浹集作來里閭望恩將報厚集作聖恩將厚意請述記言書幸宅奉和聖製幸韋嗣立山莊侍宴應制李嶠南洛師臣契東巖王佐居幽情遺紱冕宸眷屬樵漁制下峒山蹕恩廽灞水輿松門駐旌蓋薜幄引簮裾石磴平黃陸烟樓半紫虛雲霞仙路近琴酒俗塵疏喬木千齡外懸泉百丈餘崖深經鍊藥穴古舊藏書樹宿摶風鳥池逰縱壑魚寧知天子貴尚憶武侯廬同前李乂見集本樞掖調梅暇林園藝槿初入朝榮劍履退食偶琴書地隱東巖室天廽北斗車旌門臨􅌄窱輦道屬扶疏雲罕明丹谷霜笳徹紫虛水疑投石處磎似釣璜餘帝澤頒巵酒人歡頌里閭一承黃竹詠長奉白茅居同前沈佺期台階好赤松别業對青峯茅室成一作承三顧花源接九重龍旗榮秀木鳯輦拂疏笻徑狹千官擁溪長萬騎容水塘開禹瞻疑山閣獻堯鍾皇鑒清居逺天文睿奬濃巖泉他日夢漁釣往年逢共榮丞相府偏降逸人封同前武平一三光回斗極萬騎肅鈎陳地若逰汾水畋疑歷渭濱圓塘水寫鏡遙樹雪成春絃奏魚聽曲機忘鳥狎人築巖思感夢磻石想垂綸落景搖紅壁層隂結翠筠素風紛可尚𤣥澤藹無垠薄暮清笳動天文煥紫宸同前趙彥昭賢候唯題里儒門但署鄉何如表巖洞宸翰發輝光地在兹山曲家鄰郃水陽六龍駐旌罕四牡耀旗常北斗臨台座東山入廟堂天髙羽翼近主聖股肱良野竹池亭氣村花澗谷香縱然懷豹隱空愧躡鵷行賢候集作賢族同前徐彥伯鼎臣休浣隙方外結遐心别業青霞境孤潭碧樹林每持東野策遙弄北溪琴帝幸紆時豫台園賞嵗隂移鑾明月沼張爼白雲岑御酒瑤觥落仙壇竹徑深三光懸聖藻五等冠朝簮自愧承恩盛咸言􅍦在今同前劉憲東山有謝安枉道降鳴鑾緹騎紛初日霓旌度曉寒雲蹕巖間下虹橋澗底盤幽棲俄以届聖矚宛餘歡巖懸飛溜直岸轉緑潭寬桂華堯酒泛松響舜琴彈明主恩斯極賢臣節更殫不才叨侍從詠德以濡翰同前崔湜丞相登前府尚書啓舊林式閭明主睿榮族聖嬪心川狹旌門抵巖髙蔽帳臨閒窗慿栁暗小徑入松深雲卷千峯色泉和萬籟吟蘭迎天女珮竹礙侍臣簮宸翰三光燭朝榮四海欽還嗟絶機叟白首漢川隂同前張說寒灰飛玉琯湯井駐金輿既得方明相還尋大隗居懸流集作泉珠貫下列嶂錦屏舒騎逺林逾密笳煩集作繁谷自虛門旗塹復磴殿幕裹通渠舞鳯隨公主雕龍賦婕妤地幽天賞洽酒樂御筵初菲才叨侍從連藻愧應徐同前蘇頲摐金寒野霽步玉曉山幽帝幄期松子臣廬問葛侯百工徴往夢七聖扈來逰斗柄乘時轉台階捧日留樹重巖籟合泉迸水光浮石徑喧朝履璜溪擁釣舟恩如犯星夜歡比濟河秋不學堯年隱空令徴集作傲許由上又製七言絶句侍臣皆和李嶠萬騎千官擁帝車八龍三鳥訪仙家鳯凰原上窺青璧鸚鵡杯中弄紫霞同前劉憲非吏非隱晋尚書一丘一壑降乘輿天藻緣情兩曜合山卮獻夀萬年餘同前趙彥昭廊廟心存巖壑中鸞輿矚在灞城東逍遙自有蒙莊子漢主徒言河上公同前武平一鳴鑾奕奕下重樓羽蓋逍遙向一丘漢日惟聞白衣寵唐年更覩赤松逰同前崔湜竹徑桃源本出塵松軒茅棟别驚新御蹕何須林下駐山公不是俗中人同前沈佺期集無東山朝日翠屏開北闕晴空綵仗來喜遇天文七曜動少微今夜近三台同前李乂曲榭回廊繞澗幽飛泉噴水溢池流祗應感發明王夢遂得邀迎聖帝逰同前張說見集本西京上相出扶陽東郊别業好池塘自非仁智符天賞安能日月共回光同前蘇頲樹色參差隱翠微泉流百丈向空飛傳聞此處投竿地遂使兹辰扈蹕歸奉和幸禮部尚書竇希玠宅應制劉憲北斗樞機任西京肺腑親疇昔王門下今兹制幸辰恩光山水被聖化管絃新繞座薰紅葉當軒暗緑筠摘荷才早夏聽鳥尚餘春行漏今徒晚風煙起觀津同前李乂家住千門側亭臨二水傍貴逰開北地宸眷幸西鄉曵履迎中谷鳴絲出後堂浦疑觀萬象集作物峰似駐三光草向瓊筵樂花承繡扆香聖情思舊重集作里留飲賦雕章同前沈佺期北闕垂旒暇南宫聽履回天臨翔鳯轉恩向濯龍開蘭氣承仙帳榴花引御杯水從金穴吐雲是玉衣來池影搖歌席林香散舞臺不知行漏晚清蹕尚徘徊同前蘇頲尚書列侯第外戚近臣家飛棟臨青綺回輿轉翠華日交當户樹泉漾滿池花圓頂圖嵩石方流擁魏沙豫逰今聽履侍從昔鳴笳自有天文降無勞訪海查奉和幸上官昭容院山亭獻詩四首鄭愔地軸樓居逺天台闕路賖何如逰帝宅即此對仙家座拂金壺電池搖玉酒霞無勞秦漢隔别訪武陵花二堯茨姑射近漢苑建章連十五蓂知月三千桃記年鸞歌隨鳯吹鶴舞向鵾絃更覔瓊妃伴來過玉女泉三宫掖賢才重山林髙尚難不言辭輦地更有結廬歡池棟清溫燠巖窗起沍寒幽亭有仙桂聖主萬年看四槎流天上轉茅宇禁中開河鵲填橋至山熊避檻來庭花采菉蓐巖石步莓苔願奉羅圖泰長開錦翰裁過大哥宅探得歌字唐𤣥宗附見張說集魯衛情先重親賢愛轉多冕旒豐暇日乘景暫經過戚里申髙宴平臺奏雅歌復尋為善樂方念保山河奉和過寧王宅應制張說見集本進酒忘憂觀簫韶喜降尋帝堯敦睦禮王季友兄心竹苑龍鳴笛梧宫鳯繞林大風將小雅一字重千金同玉真公主過大哥山池唐𤣥宗附見張說集地有昭一作招賢處人傳樂善名鶩池臨九逹龍岫對重城桂月先秋冷蘋風向曉清鳯樓遙可見髣佛玉簫聲奉和同玉真公主過大哥山池應制張說見集本緑竹初成苑丹砂欲化金乘龍與驂鳯歌吹滿山林爽氣凝波逈寒光映浦深忘憂投此觀為樂賞同心文苑英華卷一百七十五
