body:
  text: 文苑英華卷九百九十宋李昉等編交舊十三重祭外舅司徒文一首祭薛郎中文一首祭吕商州文一首祭楊郎中文一首祭張書紀文一首重祭外舅司徒公文此篇非交舊已移入九百九十一卷親族門為裴懿無私祭薛郎中衮文李商隱伏惟靈佐商宣業朝薛傳規門峥層構堂嶪崇基玉生藍岫芝産銅池梧髙駐鳳蓮馥停龜有美令人載稱清邵訓在詩書樂惟名教王謝標格曹劉才調清如濯熱之風明若觀朝之燎靈臺委鑒虛空融和秋水望濶春臺上多鄉孰掉鞅文林勵戈硯橫河漢紙落煙波澤宫貍首棘場楊葉箭去星慙弓回月怯兩書上第五辟名公馬卿賦雪陳琳愈風平臺竹苑淮山桂叢營分細栁幕染芙蓉顯備臺僚榮徙集作從憲秩冠峩鐵徑衣明繡密霜下端簡風生落筆夜庭烏回天秋隼疾帝念允職任于諌垣依違絶想從容敢言攀檻而空留迹在削藁而不見書存女史護衣太官供食伏奏多可分曹著績帳暖錦麗闈明粉白既題柱以如田一作曲非亦償金而類直漢榮出牧晉議州兵亷袴歌送劉錢贈行濟南之誅巨猾揚州之試諸生虎去江靜珠來岸明神豈好謙天寧秩禮蠧華國之名品喪士林之模楷使為善者奪氣求仁者解體已不駐於卿雲竟何窺於洑濟長洲樹古茂苑山春橘稅既集茶征是親鷁渡霅而去逺鵠下亭而唳頻翟虜氛興殷楹夢起帳入飛鵩牀驚鬭蟻鄭玄知數阮瞻無鬼終自膏肓傳於骨髓嗚呼哀哉丹霄萬里建木千尋坦坦清路幢幢集作瞳翠隂三襲臺回九重禁深中懸流扆下集華簮無非東箭盡是南金或扶傾作棟或望旱為霖顯允明公宜膺百福夜暗神昧天長景促青女變霜羲和納旭悄隋掌以銷璣慨周間之喪騄永惟清族本富才人有弟則陸無兄不荀原鴒奕奕沼鴈馴馴珩竒動楚璧貴傾秦永矣彼蒼胡然人事但續椿夀徒髙鶴位摧壓光價掩淪聲味潁不濁而殄灌宗淮未絶而傾王氏某甲因承中外集作某甲因中外獲奉恩知通孔李道德之舊兼盧集作盧劉姻戚之私鑄顔有契全趙為期靜龍門之風水剷羊腸之嶮巇空欲銘恩何酬樹德庇孤根於髙援許加姻於弱植將歡宋子俄放湘南綬黃楚徼鬚白昭潭歸止未卜棄豫是甘許靖之悲方極王粲之憂不堪猶如重言將敦故約玉無改行金不如諾朂大義於幽沉軫遐心於漂泊使者尚在凶書已來鴈足空逺魚腸不回淚和峽雨哭振巴雷孰澆枯鮒誰爇寒灰今則言去郴江當移澧浦稍脫疑網猶罹罪罟念深慟以無期豈沉寃之可吐嗚呼哀哉執紼路阻佳城望賖凌空乏翼上漢無槎或期他日或反中華認楊公之石馬撫周苞之辟邪况良冶規存遺經業在臧孫有後魏萬必大敢期陋質終託餘光韋平之貂續無望秦晉之婚姻豈忘絮酒無幾生芻是將辭多失次涕數無行翼桂旌之不逺降蘭珮之餘芳嗚呼哀哉尚饗祭吕商州文前人惟靈族光釣渭慶顯歌齊竹分東箭玉奪南圭逶迤霄路睥睨雲梯淺牙洞鼠短刃分犀古聖堂奧前賢町畦湔腸效藥刮膜留箆彈琴而放臣見釋賣賦而妬后還閨既步京國亦薦鄉里與田蘇遊有太叔美鄴都才運洛陽年齒何晏神仙張良女子禮闈之擅譽也如彼册府之傳名兮若此囊成內殿之惟書貴皇都之紙中臺南省諌署戎藩才難價重政舉人存蓮池易曉蘭圃多暄涵波獨躍弄影孤翻王粲樓中嘗經暇日揚雄宅裏幾弔遺魂參差遘憫萋菲成寃漢廷毁誼楚國讒原建禮門內明光殿外直金既肆於猜疑魏被竟從於沙汰蒙犯霜露支離埃􅝙厲山遙鬱於朝嵐溠水傍奔其素瀨猶懷毒草過農井以低窺尚憶神珠向隋臺而猶集作獨酬渚宫二尹相府中郎將申蠖屈復駕鴛行朱幡意氣皂蓋輝光訓説則馬季長之居南郡風流則殷仲文之守東陽劉寵一錢鄧攸五鼓遂解郡符來登書府儒林文囿瑶山瓊圃鉛槧朝閲藝籤夜數瓜當鄭灼之心錐在蘇秦之股是從佐理于彼東周雷喧洛𣲖電掣集作雲納嵩丘玉泉嘉月金谷清秋陳思王之羅襪郭有道之仙舟不無賦詠聊以優遊漢入嶢關晉分隂地籍賢太守之政有古諸侯之貴載揚筆陳復清劍氣長卿消渴士安風痺逝川幾歎於不回朝露俄聞於溘至嗚呼昔也風塵投分平生少年雕龍競巧倚馬爭妍開襟隋岸促膝伊川月中乃共誇科桂池裏亦相矜幕蓮劉樗屢擲畢甕多眠終以世路紛綸物情推斥撫事傷年減歡加戚路泣楊子絲悲墨翟縱風至而音來竟月同而地隔逮余亷部及子頒條華樽旨酒綺席嘉殽各懸章綬俱失簞瓢雖論金而契在終照玉而顔凋子牟之思魏闕望之之憶漢朝誠知舌在不覺魂銷書斷三湘哀聞五嶺天涯地末髙秋落景重疊憂端縱橫淚綆漏虬夜促隙駒朝騁怨藻繪之亡脽惜陽春之亂郢言念令季記余屬城鴒原鴈序昔日歡情蠻圻瘴嶠今朝哭聲愍支體遽亡於手足况兄弟不如其集作於友生嗚呼厚夜依臺窮泉訪路已已金骨嗟嗟玉樹莫和哀挽空陳薄具銜萬里之遐誠託千辭之寄喻異時松楸枯朽羊虎傾頽草宿苔厚門平闕集作關摧尚期越禮用寫余哀靈今不昧倘或來哉祭長安楊郎中文前人年月日謹以云云之奠祭于宗尹郎中之靈昔莊南華之言物故則曰若巨室之偃歸人陶貞白之語玄機則曰雖頑仙不如才鬼邈矣髙論皭然深旨有感斯文屬在之子黃河九曲泰華三峯陽集作潼亭之右隂晉之東泱漭佳氣肹蠁孤風生民之秀惟子之宗既懼四知亦畏三惑昔佐赤符實毗皇極坦蕩王道昭宣帝則丹青不朽琬琰是刻狀日具東侔辰在北子之伯仲不忝前人粉飾賢路抑揚薦紳雲間日下國華席珍排龍掩陸突鶴摧荀卓爾風標朗然流品妍若春輝烈如冬凛燕石知愧齊竽自審咸指路以光銷盡登門而聲寢難售者價重難知者聲清披沙揀金由是不愧鳥散花落于今有情劉儒十行孫𢎞三道直路猶絃蠧政如掃筆海驚波詞園鞠草文場不寫於中心册苑空留於祕寶晉千里國漢第一功建幢油碧啓幕蓮紅賔髙王擇韻合人同固不能加減陳椽亦可以喜怒桓公衣蕭含香省蘭臺柏赤管朝操青縑夜襞佐計相則生聚有經贊一集作地是官而集作則孤終叶籍於惟荔浦言念金昆毁冠裂集作褫帶雪泣星奔宅裏之荆枝半謝嶺頭之梅萼集作葉空繁陟岡望兄詩客之情何極歸縣見姊騷人之恨猶存乃擢戎曹遂荒京令將換清切以扶明聖不知者夀難言者命未謁季良集作梁之醫已革曽參之病嗚呼平生世路繾綣交期孫金盧米百賦千詩桂林崑嶠一片一枝終以浮沉因兼險夷對臯壤之搖落成老大之傷悲尚冀他年或陶良夜酒筵琴席燈闈月榭俱開愁别之襟並息分岐之駕短景未果集作短願未果良辰不借竟鬱結於深衷倐淹淪於大化况南康解榻早降清光會稽繼組昨辱餘芳情集作積分逾極銜哀更長三十年之間難追往事五十里之外正恨殊鄉地濶山深川寒樹古杳杳玄夜荒荒集作茫茫宿莽生金認石埋玉恨土寄奠緘詞呼風涕雨噫戲噫戲宗尹之魂來否祭張書記文前人維會昌元年嵗次辛酉四月辛丑朔二十日庚申隴西公滎陽鄭某隴西李某安定張某昌黎韓某樊南李某謹以清酌之奠致祭于故朔方書記張五審禮之靈嗚呼古有不重千金殊輕尺璧或號百夫之防或作萬人之敵爭雄角秀殊途異迹念閲水於千齡若衝飈之一息吁嗟審禮寧或免之瞭眸巨鼻方口疏髭始自渚宫來遊帝里論極懸河文酬段綺體物稱最登髙擅美良時不來躁進為恥門巷蓬蒿荒涼如此藩溷筆硯寂寥而已梁多文士漢有賢王猶市駿骨首驚夜光長裾既曵健筆誰當職髙蓮幕官帶藝香青袍若草白簡如霜東閣朝暖西園夜涼震起集作豈殺公諶惟故吏渭濵回流馬之運峴首奉詞曹之諱松筠不改琴樽有寄三遙方營一畝之地多文為富無事當貴亦解客嘲還答賔戲回翔逸軌傲睨重霄將期晚節更峻清標懸蛇結舋鬬蟻成妖回生乏祖洲之草續斷無弱水之膠陳尸重來而何望楚魂一散而難招嗚呼神道甚微天理難究桂蠧蘭敗龜年鶴夀在長短而且然於妍醜而何有某等早承餘眷晚獲聨姻或感極外家延自出之念或恩深猶子多引進之仁或敬屬丈人之行或情兼內妹之親有美吾姨慶靈攸屬尊公則師長庶僚夫人則儀刑六族門髙再世之侯家享萬鍾之祿經過欵狎出入遊陪映人玉潤覆水蓮開春歸别墅月滿髙臺嵇山傾倒謝雪徘徊惜景而持繩欲繫邀歡而秉燭相催中歎乖離今多至止仲叔辭辟而方反梅福罷官而未幾一則歸從回鴈之峰一則至自跕鳶之水方將為笛裁竹緣筝斬梓驅羿射鴻招何釣鯉豁契濶於屯夷極平生之宴喜良覿雖屢深懷未從三靈莫效一夢俄終露先寒而隕葉漏未盡而聞鐘今則列樹開封揲著得吉綘旐前引桐棺後出隱軫原野凄涼雲月集作日將歸宿莽之庭欲閉青松之室殷勤舊集作賢偶兾望諸孤未歸下國且寓皇都江逺惟哭天髙大集作旦呼必有餘慶非無後圖嗚呼哀哉壺有芳醪俎多肥羜呌噪不聞精靈何處鬱憤徒極含辭莫敘兾有鑒於酸嘶庶無乖於􅀈集作酣飫文苑英華卷九百九十
