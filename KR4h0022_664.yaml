body:
  text: 文苑英華卷六百六十五宋李昉等編雜啓上答趙王啓一首上門下裴相公啓一首上白相公啓一首上宰相啓一首上虢州崔相公啓一首上崔相公罷相啓一首上前鄭滑周尚書啓一首上前易定盧尚書啓一首上中書李舍人啓一首為崔從事寄尚書彭城公啓一首上兵部相公啓一首上時相啓一首上河東公啓三首端午日上所知劍并衣服啓二首闕答趙王啓庾信某啓仰承張幕全韓連營上地澠池置陳解鄧禹之圍函谷開關削王元之印鋒旗朝上刁斗夜鳴彌雄壯士之心足起橫行之志況復才人出娉還得賢夫塞外有夫人之城軍中有女子之氣都尉青旗即時春色將軍大樹已復花開雲氣浮壘流星泛枕細舞長歌橫簫直笛當乎一作干此時青雲之上信不學無術本分泥沉忽逄天造搜揚仄陋今者遂總憲司預聞刋鼎獻嵗刑書既應懸法上春木鐸方須徇人但年髮已秋性靈久竭嘉石肺石無以測量舌端鼻端惟知繁擁乖展一月遂涉兩年俯首東瞻山河千里風塵未盡霜露沾衣仰願珍宜以為身寶謹啓上門下裴相公啓劉禹錫某啓嚮集作曩者淮右逋誅即戎嵗久天子齋戒以命元臣登壇之日上略前定從九天而下縱以神兵分六符之光拂集作掃其長彗授鉞於西皓之半䇿勳於北陸之初功成偃節復執大柄君臣相遇播於樂章山河啓封載在盟府上方注意人益具瞻因魚水之叶符極夔龍之事業時屬四始恩覃萬方致君及物其德兩大古先俊賢所未備者我從容而保之殆非人事抑有幽贊夫異同之論我以獨見剖之文武之道我以全材統之崇髙之位我以大功居之造物之權我以虛心運之然持盈之術古所難也實在隂施拯集作及物厚其德基以左右功庸而百祿是荷人所欣戴久而愈集作逾宜昔袁太尉不忍錮人而楚獄衰息一言之慶而子孫丕承以今日將明之材行前修博施之義筆端膚寸澤及九垠猶夫疾耕必有滯穗某頃墮集作墜危厄常受厚恩誼盟於心要之自效常懼廢死荒服永孤願言敢因賀箋一寄丹懇顧非竒理不足以縈於沖襟然利於行者固在乎常談而卓詭孤特之言未必利於行也伏惟以愚言與賢者參之謹啓上白相公啓杜牧某啓伏惟相公上佐聖主獨專魁柄封殖艮善修整紀綱練羣臣謹百職考功績核名實大張公室盡閉私門盛德大功直筆實光於簡册清節細行祝史不愧於神明天下望之為凖繩朝廷倚之為依據畢公克勤小物周公煥發大猷丙吉陋按吏於公庭袁安不錮人於聖代衛將軍有常揖之客張子孺無謝恩之人吉甫率由舊章魏相能明故事房杜不以求備取人不以已長格物姚梁公先有司修舊法下位各得言其志百司各得盡其材求於古人之賢皆集相公之德如以尺量刀解粉布墨畫小大銖黍丸角尖缺各盡其分皆當其任是以庶人不議鄉校無言天下欣欣若更生者自此黃髮之老待哺之子不見兵戈不離抱撫清廟之祭四夷來助蒼生之願百志皆成顒顒萬方實懸斯望某逺守僻左無因起居但採風謡亦能歌詠無任攀戀激切之至謹啓上宰相啓薛逢伏以玉燭開年金儀應厯軒律風暖羲輪馭遲草木以之萌芽禽魚以之翔沫伏以相公化𢎞動植道洽雍熙吹噓必自於幽深暄潤不遺於枯枿如某兀如枯木性若寒灰沐和風而莫振柯條應陽管而才知動息伏惟相公模於心匠待以天成鼓鑄賢愚區分貴賤動用隂陽之炭開張天地之爐量其小者則為盎為盂舉其重者則成鍾成鼎茍圓方式序幽陋不遺及兹發生俾遂春氣生死甚幸上虢州崔相公啓相公河嶽鍾靈芝蘭藴德頃因直道常中佞人阻絶九重播遷萬里無非中正發言而天地鑒知不負神明冒險而靈祗附助所以恬和自得寢膳長安雖經夷貊之長途不爍江山之沴氣皇天眷祐於焉有徴伏惟相公道濟中興仁歸厚德即當重開鑑冶再設權衡俾器用各適圓方錙銖不失輕重天下幸甚逄此時或因陶鑄得敘宗彛佇從長養之時復覩升平之代自相公歸官虢略尋欲附狀起居伏以革吏卑微不敢輕肆塵黷昨者從孫薛誠過此令候方便咨逹姓名瑣瑣形骸或希記憶謹啓上崔相公罷相啓某聞川梁壅而舟楫施禾黍登而霖雨霽天地常數古今共然伏惟相公理逹卷舒用明進退調隂陽以成嵗受功於天執謙讓以歸仁𢎞道於已所謂進退惟正卷舒適時某每念庸虛常蒙匠化當幽滯之求振拔則且願持權在卑懇之望廕庥復稍思稅駕從古難者於今見之雖范蠡登舟子房避世方之髙躅何足比肩慺慺懇誠伏望深鑒上前鄭滑周尚書啓尚書筆綜文經機參武緯虛已應物推誠濟時澄明而識內融操剸而鋒不露在文宗時以詞藻參近密峭若孤峰在武宗時以韜略鎮藩維殷然巨防謂往無不利用皆適時今者急詔徴還開襟待見必當付以舟楫委之陶甄空濟兆人鎔範庶物天下幸甚此時或希匠化獲備圓方資天地之太和沐唐虞之至化生死幸甚上前易定盧尚書啓尚書文從心匠武自天機西南貞右界之師東北振中山之旅莫不皆爭死節願答深仁乃者訓撫二州折衝四境飲成德盧龍之帥盡醉禮容啖天雄橫海之師被充文教故得人知爼豆俗廢干戈嚴城夜開外戶不閉遂使常山蛇陳翻成干戚之文易水劍歌遽變鹿鳴之奏雖去病不師吳起世祖常合伏波方之變通曽何比數佇見翺翔溫樹刷蕩天池代著中興風還太古此時或將歌詠獲偶一作贊雍熙心醉堯樽神迷舜樂百生幸甚上中書李舍人啓某啓某聞枝枯幹悴助莖葉者煙蘿棟橈梁欹能扶持者匠石是以茂盛自豐於莖葉孤危全賴於扶持若不為枝梧則立見傾弛某因緣恩顧輒吐肺肝伏惟念以風波必垂拯濟生死幸甚某家望陵遲眇然孤藐飄流勤苦垂三十年分分自登粒粒自啄取第不因於故舊蒙知皆自於雋賢每用飲水清心閉門守道南宫試藝三篇徒獻於九重東觀讐書七稔才登於一邑同時流輩盡列班行獨此後時有慙先逹得不沉吟俯首局促哀鳴某自守一官倐爾兩考惟將勤儉用免悔尤刻意撫綏才成條貫曹無宿案獄罕係囚孤弱者貸之以恩豪強者繩之以法置公𪠘草三千束粟三百石小有供須了無率配洎徴三稅不鞭一胥公署無喧雀羅可設縣南峽口羣盜所居白晝劫人赤丸殺吏某自到縣百計方圓峽南闕北各置一鋪仍選有身手健兩處共置十人給與園場兼之杵臼往來應援旦夕隄防自此已還盜賊弭息其餘恢張𪠘宇搜抉姦欺澄清鎮軍檢轄僚吏乃至招携户目復使人夫利物之由不可具數昨者秋收自京回縣舍人靣喚詢諸所圖上戴恩知莫能比喻某比者依投仁宇首尾三年茍非同聲未嘗接武輒將勤苦勉自進修豈假再言素應詳熟尚想樽前即席月下談詩偏於才雋之場曲借吹噓之便其奈驚湍暗激利觜潛傷清要班資寂寥擬議自料於家必孝於國必忠於事必勤於身必正刑於兄弟至於家邦亦何必貴擬齊桓富侔盜跖復念誓志不識古人盟府䇿勳用為已事至於亭嶂山川之險易儲蓄一作軍儲經費之有無戈鋌利便之短長戎狄土風之好尚莫不心摩意揣慮計神籌言從智符事與機會陳思王之自試不獨古人班定逺之束書焉知來者既蒙憂軫得以咨謀伏惟念以迷方指其捷路生死幸甚今所期者國庠博士赤縣子男儻蒙歷試諸艱便作秦隴刺史不妨緣階取貴因效建功事列樽彛名光史册生死幸甚所謂射已之鵠無信旁人茍能自審行藏不致甚費恩力伏望憫其孤立曲賜重言俾枯荑再生於青楊朽骨重肥於白日誓當觸槐全盾結草抗回生為厮養之臣死作掃除之鬼生死幸甚如或責其狂妄校以尊卑躁僣之辜生死惟命伏惟俯垂仁恕幸甚不備謹啓為崔從事寄尚書彭城公啓李商隱福啓福聞雀辭楊館常懷資篋之恩燕别張巢永結雕梁之戀推誠況物某有類焉始者尚書晞髮丹山騰身紫府曉趨清禁則瓊樹一枝夜直黃闈則金釭二等人寰莫見塵路難逢而某志在諱窮勇於永益輒干皂𨽻自露菲葑寶肆回腸只期和氏醫門投足永念倉公果蒙愍彼顓愚溢為題品勾萌始逹依周囿以揚翹滴瀝才分託靈光而振響遙輕集作輕軒短羽驟化窮鱗每欲陶冶肺肝耕耘筆硯粗調宫徴以謝陽秋而義有多塗情非一概辭煩轉野意密彌賖雖途逭如韓遂之書反覆類集作若葛洪之紙終無髣佛可得端倪去嵗洛陽獲陪良宴頻趨絳帳纍坐青氊況聞懇拒台階請從藩屏舉郤超之幕畫數阮瑀之軍書懸以嘉招刑於善謔何言違阻復賀光隂潼水千波巴山萬嶂接漏天之露雨隔嶓冡之煙霜皓月圓時樹有何依之鵲悲風起處巖無不斷之猿煎嚮義之初心集作孤軫懷仁之徑氣竊惟秦鏡當察衛桃一昨伏承擁節浚郊建牙隨岸將求捧幣申好裂裳就塗接枚叟之餘光奉鄒生之末座又伏慮旋登殷夢俄奉周畋徴詔已行拜塵無及徘徊失措鬱悒誰聊必也華榻長懸簡書無廢即割任安之席堪哂無圖負田叔之鈴可嗟非據伏惟慎安寢膳勉護興居早秉信圭速調大鼎至於禱祝實倍等倫半菽思貯於神倉一勺願投於靈海道之云逺更開殷浩之函書不盡言重灑楊朱之淚攀戀感激不知所裁伏惟俯賜監照謹啓上兵部相公啓商隱啓伏奉指命令書元和中太清宫寄張相公舊詩上石者昨一日書訖伏以賦曠代之清詞宜當時之重德昔以道均契稷始染江毫今因慶襲韋平仍鐫宋石依於檜井陷彼椒牆扶持固在於神明悠久必同於天地況惟陋質集作菲陋早預生徒仰夫子之文章曽無具體辱郎君之謙下尚遣濡翰空塵寡和之音素乏入神之妙恩長感集格鈍慙深但恐涕洟終班琬琰下情無任戰汗之至上時相啓商隱啓暮春之初甘澤仍降既聞沾足又欲開晴實關燮和克致豐阜繁隂初合則傅説為霖媚景將開則趙衰呈日獲依恩養定見升平絶路左之喘牛用驚丙吉無廄中之惡馬以役任安偃仰興居惟有歌詠瞻仰集作望闈闥不勝肺肝謹啓上河東公啓三首商隱啓兩日前於張評事處伏覩手筆兼評事傳指意於樂籍中賜一人以備紉補某悼傷已來光隂未幾梧桐半死才有述哀靈光猶存且兼多病眷言息胤不暇提携或小於叔夜之男或幼於伯喈之女檢庾信茍娘之啓常有酸辛詠陶潛通子之詩每嗟漂泊所賴因依德宇馳驟府庭方思效命旌旄不敢載懷鄉土錦茵象榻石館金臺入則陪奉光塵出則揣麾鉛鈍兼之早嵗志在玄門及到此都更敦夙契自安衰薄微得端倪至於南國妖姬叢臺妙妓雖有涉於篇什實不接於風流況張懿仙本自無雙曽來獨立既從上將又託英僚汲縣勒銘方依崔瑗漢庭曵履猶憶鄭崇寧復河裏飛星雲間墜集作墮月窺西家之宋玉恨東舍之王昌誠出恩私非所宜稱伏惟克從至願賜寢前言使國人盡保展禽酒肆不疑阮籍則恩憂之理何以加焉干冒尊嚴伏用惶灼謹啓二商隱啓某聞周朝貝葉列妙引於王褒梁日枳園灑芳詞於沈約必資乎鴻筆麗藻刻乎真金翠珉然後可以充足人天發揮龍象茍其曖昧即匪莊嚴爰託亨塗夙聞妙喻雖從幕府常在道場猶恨出俗情微破邪工少二百日斷酒有謝蕭綱十一年長齋多慙王奐仰戀東閣未歸西林近者財俸有餘津梁是念適依勝絶微復經營伏以妙法蓮華經者諸經中王最尊最勝始自童幼常所護持或公幹漳濵有時疾疹或謝安海上此日風波恍惚之間感驗非少今年於此州長平山慧義精舍經藏院特創石壁五間金字勒上件經七卷既成勝果思託其音伏惟尚書有夫子之文章備如來之行願不逢惠逺已飛廬嶽之書未見簡栖便制頭陀之頌是敢右繞三匝仰希一言庶使鵝殿增輝龍宫發色流傳沙界震動風輪報恩於蓮目果脣奪美於江毫蔡絹伏希道念得降神鋒瞻望旌幢携持砧斧曝身布髮以俟還辭無任懇迫之至謹啓三商隱啓伏奉榮示伏蒙仁恩撰金字法華經記一首正冠薦笏跪捧伏讀聽儀鳳之簫管秪恐曲終對仙客之棊枰仍憂路盡欣榮羡慕造次失常昨者爰託翠珉將翻具夾方資護念粗翼標題換骨惟望於一丸剜身止求於半偈豈謂尚書載持夢筆仰拂文星入不二法門住第一義諦儒童菩薩始作仲尼金粟如來方為摩詰鋪舒於無上藻輝於至真而又以七喻之微較五常之典吻然合契永矣同塗既令弟子言詩又與聲聞受集作授記一佛出世萬人所望不知孱微何以負荷便當刻之鳥篆置彼龍宮此則吹之以宋玉之風照之以謝莊之月彼則傳之於赤髭疏主示之於白足禪師然後負帚趨門前芻入廄以鈴奴為勸集作歡友與車御為良朋冀必從公以謝嘉命過此而往不知所圖下情無任距躍感激歡喜信受之至謹啓文苑英華卷六百六十五
