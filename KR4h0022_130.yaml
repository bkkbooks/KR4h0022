body:
  text: 文苑英華巻一百三十宋李昉等編哀傷二弔軹道賦一首登臨河城賦一首驪山傷古賦一首過舊園賦一首傷徃賦一首山陽城賦一首三良塜賦一首項王亭賦一首弔軹道賦并序王昌齡軹道秦故亭名也今在京師東北十五里署於路曰秦王子嬰降漢髙祖之地豈不傷哉余披榛徃而訪之則莽蒼如也夫如集作以戰國之弊天下創夷又困於秦使無所訴罪在于政而戮乎嬰嗚呼殺降不祥項氏之不仁也遂作賦以弔云長林之墟荒草無垠躊躇訪古隱嶙如存耆老曰此秦之軹亭也莫不隕泣而傷魂我聞中原板蕩厯数更造來為都邑去為郊道化育人寰盛德攸保其集作如有隨覆車之遺跡躡咸陽以崩倒陳炯戒而罔懷終㓕裂以蕩掃今者行旅有悲凉之色將未識聖人之大寳聽之哉不義而一作不非強其弊必速徒以金城千里介集作鐵馬萬軸九國既夷上慢下黷東遊莫返白帝先哭是以沙丘閟禍制出趙氏扶蘇賜死大事去矣海内洶焉雷駭颷起自非集作昔蹂先王而隳道德亦無能而及此五星夜聚漢瑞秦亡白馬素車降於道旁非子嬰之罪也而殺身於項王悲夫以暴易亂莫知其極且聞追懷集作師追而覇楚無乃弛義而爭國東城引劒亦其宜哉至於集作如后稷貽周三聖九賢合於集作化洽成康千有餘年猶復慎終如始爰作顧命宣文武之重光訓艱難於執政乃尸天主遂誥諸侯髙奭内軸齊魯外輈此周之所以磐石相維數革龜謀孰與夫離擯子弟甘心賊臣身死國㓕如火燎薪設使雍州為輿伊傅為輪當朽索之不馭豈龍虎之能馴不其然乎賈生聞之於是讓東陵故侯曰昔王子有殷墟之歌大夫有周廟之作子秦人也豈無情哉集作夫豈無情邵平乃太息久之且為歌曰道不虛行兮史鰌没位吾寧范伯之徒歟感夷齊而多愧麟鳳逺去龍則死之河水洋洋兮先師莫歸徃者不可諫來者吾誰欺始退身以進道曷颺言而受非彼蕭相國知予乎布衣登臨河城賦并序蕭頴士亡舅孝廉元君才髙位下一命屈臨河尉尋遭風瘵集作疹有加無瘳憂悒迄逾一紀故不復仕而風標俊傑文史清雋一作藻則君所著别傳詳矣舅於子有教授集作道之恩隻詞片字皆資訓誘既而射策桂林校書芸閣首為知已名稱二句本集作道為知已遇名為海内稱舅氏之力也天寳元年秋八月奉使求遺書於人間越來月届于臨河集作河干之舊邑覧物増懷泫然有賦羊曇是日獨吟零落之篇周翼終身寧亡吐哺之愛詞曰登孤城兮見河水之漫漫城有隍兮水有瀾歘翻覆兮無端俯崇墉兮心集作辛酸心斷絶兮河水之干借如韓伯見殷浩傳懷恩羊曇念昔追北渚之曩餞歎西剡之忽覿曽一顧而不忘集作曽一顧兮不可忘况仁深與密戚也惟佩觽之弱歲荷哲舅之矜憐枉月旦之殊品超等夷而獨偏一作賢過雖小而必誡善無㣲而不悛一作遷集作甄備潤身之黼藻聞染集作洒翰之蹄筌豈期文嗣作者價叅時賢謬崑墟而比玉濫蓬島而懷鉛匪舅德其焉爾諒師資乎在焉痛才髙而位下悲道悠而運促甫一命於兹集作河城蹇無媒兮窘束傃層颷而墜羽凌永路而傾軸悼晉豎之行深哀秦良之莫贖昔自公而暇豫陪作賦於兹樓懐一紀以如昨愴今晨而集作之獨逰俯蕭條之邑里對零落之徂秋舊舘悽其在目長川逝而不留徒臨風而揮涕孰知夫四望可以銷憂者也集作而可銷憂者哉驪山傷古賦郗昻天生蒸民而樹之君夫為國者當建宗社廣敷聲教尊其威靈儼其容貎其惠也逺浹其仁也普淖言靜而可以底綏言動而無所屈撓令四海惟精惟一俾萬人是則是傚安有臨伐木而棄其斧將渉水而投其棹童子猶知其不可况天下之龍豹初虎視八荒鯨吞六國攻必取戰必克所徃而梟一作鏖其渠帥所敵而斷其銜勒起翦之功逞蘇張之詐塞招星紀之南伐天街之北賞尉繚以為忠讜誅文信以為殘賊將大寳而康寧謂神仙之可得一何壯哉及其浮江沉璧登山紀石徴茅濛為却粒之符遣徐市為求真之客殚人力為馳道鑄兵刃為金狄方欲肆其暴露方欲窮其轍迹鬱興閭左之徭大起阿房之役亦所以坑其儒士亦所以燎其經籍聞祖龍而匪寤逄巨魚而必射不知望夷之兆未覩沙丘之厄又何謬歟天降圖録言勦其辜惡貫已盈禍胎必膴載鮑之氣俄徹夣神之應聿徂意靡察於妖子尚勞師以備胡人且愍於䝉將我獨憐此扶蘇廢至尊之丕烈任姦邪之逆謀不必作謨將欲稱始帝而歴萬代卒宗㓕而身屠王禄盡矣誰定其危天之所壞人不能支既同信於望夷安肯從於悖一作李斯生且替其遺命死徒華其葬為嗚呼驪山之隧其庸幾年上周五里劉向傳始皇墳周四五里下錮三泉罄珠璣之布濩盡金石之雕鐫匠人勞而不償反生埋於鬼埏狐穴而塵積牧豎焚而火連嗟㧞山之壯氣成拱木之寒煙享祀輟矣疇相恤焉百二之襟帶莫守數仭之丘墳巍然何德之衰絶伯翳之餘業何力之競為劉炎之着鞭枝葉將落本必先顛苕折巢覆胡能卵全是知不有廢也後王安得而處旃過舊園賦并序梁肅余行年十八歲當上元辛丑盗入洛陽三河間大塗炭因竄身東下旅於呉越轉徙阨難之中者垂二十年上嗣位歲應詔詣京師其一作明年夏除東宫校書郎遂請告歸覲于江南八月過崤澠次于新安東南十數里舊居在焉時歲滋逺荆榛蕪翳喬木蒼然三徑莫辨訪隣老而已盡眄庭柯以霑衣情之所鍾可勝歎耶夫懷舊之志在昔所不免聖如尼父逹若莊叟且有歸歟之歎悵然之思予蓬艾存乎胷中喜懼形於一作于膝下寓江海之遐阻念歸來而不得思潘園板輿之樂陶野巾車之逰願言莫展一食三歎至是當秋日蕭索征途浩𣺌棟宇摧落曽不得乎少留心之憂傷又加於他日一等遂作賦紀事以過舊園命篇其詞曰白露既戒夫清秋爰駕言而東邁漫征路之悠悠且予發乎新安歴函闗之舊丘灌藂森以相屬披一徑而可求闃里巷之罕人辨原田而莫由堂除既缺棟宇亦折樹蔽户而梢梢水衝隄而活活駭獸羣起頺墉四達識舊井於庭隅弔重蘿於木末既循省而顧慕愈辛酸而慘怛何纒廹而求所安激予哀而不可遏也昔予生之三歲值勍虜之衝奔徙穹廬於華縣䝉郊廟於氛昏皇逰蜀川帝出朔原尸逐纔血烏丸又屯俄四逆之薦凶扇熛炭而爇黎元予既幼捨此居業慮性命之所存始竄跡於許都又逃刃於夷門沿汴水之湯湯棹淮波之翻翻荷聞詩之前訓廹馳役而不敢言截淛河以徑度趣諸越而休止在長洲與蘭陵亦一閏而三徙嫋嫋兮秋風湛湛兮春江傷吾心其何已皇八葉之御極亦既安此寰中浮窳繽其來歸真獨鬱猶未通洎大厯之二七六龍忽其上升赫元聖之統天敷太和於黎蒸建皇極以成化啓公車以選能予筮遇觀之六四一作繇易云觀國之光利用賔于王聿投迹於雲羅謬試言於内殿俾典校乎承華聆聖賢之休風仰墳籍之長圃與世道而逰息實人倫之憲矩史正直以終始蘧巻舒於黙語展甘黜而不去莊頤神以遐舉諒修已之異宜各𢎞道而得所矧㣲生之庸拙胡可嫚夫一作乎出處𦕈江湖之漂蕩廢田里於草莽苟將愜乎予思孰辨夫懷安之與懷土伊吾土之所安廼陋狹而在斯實舊德之師儉庶後昆以易持髙祖父趙王府記室宜春公洎曽王父侍御史府君已降三世居陸渾有田不過百畆開元中為大水所壞始徙於函闗始也桑柘接連蔬果芳滋彼茅軒與甕牖亦寒燠之攸宜羌百歲而負一作員居曽未幾而亂離二十載而一來紛蕪穢而莫治駐周覧而未已又旋指于江湄曽是追感於平生孰不悲傷而涕洟抑聞夫仲長之園面流水而覧平原遭世緒之溷濁竟初懷之罕存又聞夫郭泰之德不違親貞不絶俗當罻羅之周布竟淳白而不辱何天宇之交泰蹇予生之孱獨退無庇跡之所進靡代耕之禄慨捨此而不留徒仰髙於前躅日晼晩而命駕恨盤桓以出谷慮將歸之或迷吾斯志夫喬木亂曰所居而安易之序兮歴聘懷歸孔之慮兮粤予庸昩道莫著兮曩離舊邦紛世故兮林井殘泥禽亦去兮墜廢居業忸而懼兮遲歸有時藻一作保吾素乎疑作兮凢一作皆集本傷徃賦并序劉禹錫人之所以取貴於飛走者情也而誕者以遺情為智豈至言耶予授室九年而鰥痛若人之夭閼弗遂也作賦以傷之冀夫覧者有以増伉儷之重云歎獨處之悒悒一作邑邑兮憤伊人之我遺情可殺而猶毒境當歡而覆一作復悲人或朝歎而暮息夫何越月而踰時太極運乎三辰轉寒暑而下馳有歸於無兮盛復于衰猶昩爽之必暮又安得而怨咨我今怨夫若人兮曽旭旦而潜暉飄零日及日及木槿也晋成公綏潘尼有賦之蕚倐忽蜉蝣之衣川走下而不還露迎陽而易晞思已甚兮難絶見無期兮永思我行其野農民桑者舉案來饁亦在林下我觀于途禆販之夫同荷均挈荆釵布襦羽毛之蕃鱗介之㣲和鳴灌藂雙泳漣漪薨薨者一作伊蠱蠢蠢伊豸逰空穴深兩兩相比何動類之萬殊必雄雌而與俱物莫失儷以孤處我方踽踽而焉如我復虛室目凄凉兮心伊鬱心伊鬱兮將語誰坐匡牀兮撫嬰兒何所丐沐兮何從仰飴襦袴在身兮昔圍差跌一作蹉鞶囊附臂兮餘馥葳蕤誠天性之潜感顧童心兮如疑嘵然有難繼之慕莫然减好弄之姿指遺袿兮能認愬空帷兮欲歸我入寢宫痛人亡兮物改其容寳瑟僵一作偃兮絃柱絶瑶臺傾兮鏡奩空寒爐委灰虛幌多風隙駟一作駒晨轉牕蟾夜通歩摇昏兮網拈翡翠芳褥掩兮塵化蚷蛩閱刀尺之餘澤見巾箱之故封翫服儼兮猶具繁華謝兮焉從想翩翻一作僊於是非求窸窣與㝠蒙信竒術之可致嗟此生兮不逄徒注視以寂聽恍神疲而目窮還抱影以獨出紛百哀而攻中系曰龍門風霜苦别鶴哀鳴夜銜羽呉江波浪深雌劒一去無遺音悲之來兮憒予心洶如行波洊浸滛悵一作浩又作既縁情而莫極思執禮以自箴已焉哉冉冉生死悠悠古今乗彼一氣兮聚散相尋或鼔而興或罷而沉以無涯之情愛悼不駐之光隂諒自迷其有分徒終怨於匪忱彼蒙莊兮何人予一作子獨累歎而長吟凢一作皆集本山陽城賦并序山陽故城遺趾數雉四百之運終於此墟裔孫作賦蓋閔漢也詞曰我止行車霄涕于山陽之墟是何蒼莽與慘悴舂陵之氣兮焉如踣昌運於四百辭至尊而伍匹夫有利器而倒持兮曽何芒刃之足舒懿王迹之聿基暨絶一作坤維之再敷邈汜陽與鄗上怳虵變而龍攄痛人亡而事替終此地焉忽諸嗟乎積是為治積非成虐文景之欲處身以約播其德芽迄武乃穫桓靈之欲從心於昏爇其祅焰逮獻而焚彼伊周不世兮姦雄乗釁而騰振物象摧以易位被虛號而陽尊終勢殚而事去胡竊揖讓以為文嗚呼維神器之至重兮如山之不騫使人得譬乎逐鹿因一作固健歩者所先諒人事之云耳孰云當塗之兆也自天亂曰一作日久矣莫可追升彼墟兮噫嘻躅一作獨遺武兮貽後王之元龜三良塜賦并序魯文六年秦伯任好卒以子車氏之三子奄息仲行鍼虎為殉皆秦之良也國人哀之為之賦黄鳥君子曰秦穆之不為盟主也宜哉先王違世猶貽之法而况奪之善人乎是以知秦之不復東征也秋季月吾西逰汧渭出於岐雍之間於古道傍得三良塜心甚哀之涕泗者久之而去詞曰昨宿岐城曉渉渭東霜凌雪結飛沙亂蓬中野躊躇届此古墟野人曰即車氏之塜方驅駕班如久而咤曰吾嘗讀舊史矣古者秦氏大於穆公出師則寧東夏用賢則覇西戎大邦服其禮小邦畏其雄謀已集戰亦武不能勤王不為盟主者何居以㓕天之良䘮人之特百夫仰系一朝而踣可哀也哉宛其三子遭時迍邅主已即世身皆靡全指㝠芒而為期撫昭世而坐捐方惴惴以臨穴且哀哀而號天從有言於寒原莾蕩千里廻眺無垠一作恨上刺衰德下傷幽魂挂驂壠樹脫劒山門掇野芳以為薦汲行潦而充罇矧今情之猶悲諒古恨之潜吞死而不作吾誰與言代事浩溔人壽爾夭言念君子中心悄悄哀生人之長慟一作勤赴永夕之莫曉歸去來兮不可留且悲吟於黄鳥項王亭賦并序李徳裕丙辰嵗孟夏余税駕烏江晨登荒亭曠然逺覽因觀太尉清河公刻石美項氏之材歎其屈於天命且曰漢祖困阨之時生計非蕭張所出余以為不然矣自古聰明神武之主未嘗不應天順人以定大業項氏縱火咸陽失秦中之固遷主炎裔傷義士之心違天違人霸圖隳矣漢皆反是故能成功據秦遺業東制區宇雖數敗於外常有關中為舊主縞素以義動天下雖項氏猶存而王業基矣若乃蠖屈鴻門龍潛天漢始降志於一人終申威於四海則蕭張之計不亦逺乎余嘗論之漢祖猶龍項氏如虎龍雖困而其變不測虎雖雄而其力易摧一神一鷙宜乎夐絶然艤舟不渡留騅報徳亦可謂知命矣自湯武以干戈創業後之英雄莫髙項氏感其伏劍此地因作賦以弔之登彼髙原徘徊始曙尚識艤舟之岸焉知繫馬之樹望牛渚而蒼然歎烏江而不渡想山川之未改嗟人世之何遽思項氏之入關按秦圖而割據恃八千之剽疾棄百二之險固咸陽不留王業已去將衣錦於舊國遂揚旌而東顧雖未至於隂陵誰不知其失路恥沐猴之醜詆乃烹韓而泄怒謂天命之我欺何霸王之不寤嗟乎楚聲既合漢圍已布歌數闋而甚悲酒盈樽而不御當其盛也天下侯伯自我而宰制及其衰也帳中美人寄命而無處季數遯而不亡羽一敗而終仆豈非獨任於威力不由於智慮追昔四隤之下風煙將暮大咤雷奮重瞳電注叱漢千騎如獵狐謝亭長而依然愧父兄兮不顧既伏劍而已矣彼羣帥兮猶懼雖霸業之無成亦終古而獨步周視陳迹𬗟然如素聽喬木之悲風感髙秋之𤣥露因獻弔於兹亭庶神靈之可遇文苑英華巻一百三十
