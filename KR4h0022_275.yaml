body:
  text: 文苑英華卷二百七十五宋李昉等編送行十顧况五首耿緯十一首司空曙十八首冷朝陽一首李益三首李端十七首暢當一首王建八首楊凝六首白蘋洲送客顧况莫信梅花發由來漫報春不才充野客扶病送朝臣闕下搖清珮洲邉採白蘋臨流不痛飲鷗鳥也欺人送韋秀才赴舉前人鄱陽中酒地楚老獨醒年芳桂君應折沉灰我不燃洛橋浮逆水關樹接非集作飛煙唯有殘生夢猶能到日邉送使君前人天中洛陽道海上使君歸拂霧趨金殿焚香入璅闈山亭傾别酒野服間朝衣他日思朱鷺知從小苑飛送大理張卿前人春色依依傷解携月卿今夜泊隋堤白沙洲上江蘺長緑樹村邉謝豹啼遷客此集作本來無倚仗故人相去隔雲泥越禽唯有南枝分目送孤鴻飛向西送李侍郎從宣城取洞庭路往吳興前人世間唯有情難説今夜應無不醉人若向洞庭山下過闕聖姑神奉送蔣尚書兼御史大夫東都留守耿緯副相威名重春卿禮樂崇賜圭仍拜下分命遂居東髙斾翻秋日清鐃引細風蟬稀金谷樹草遍德陽宫教用儒門儉兵依武庫雄誰云千載後周召獨為公送王祕書歸江東前人回首望知音逶遲桑柘林人歸海郡逺路入雨天深萬木經秋葉孤舟向暮心唯餘江畔草應見白頭吟送郭秀才赴舉前人鄉賦鹿鳴篇君為貢士先新經夢筆夜才比棄繻年海雨沾隋栁江潮赴楚船相看南去鴈一作岸去離恨倍澘然送姚校書因歸河中前人十年相見少一宿又還鄉去住人惆悵東西路渺茫古陂無茂草髙樹有殘陽委棄收餘稻凋疏採後桑月輪生舜廟河水入關牆明過閭閻里光輝藝閣香送胡校書秩滿歸河中前人古樹汾陽集作隂道悠悠東去長位卑仍解印身去集作老又得還鄉河水平秋岸關門向夕陽音書須數寄莫學晉嵇康送王閏前人相送臨漢水愴然望故關江蕪連夢澤楚雪入商山語我他年舊看君此日還因將自悲淚一灑别離間渭上送李藏器移家東都前人求名須有援學道又無緣故國三千里新春五十年移家還作客避地莫知賢東洛今何處風流去渺然又見二百十八卷送郭正字歸郢上前人濟江篇已上書府俸猶貧積雪商山道全家楚塞人大堤逢落日廣漢望通津却到漁潭上驚鷗那肯親送蜀客還前人萬峯深積翠路向此中難欲暮多羇思因髙莫逺看卓家人寂寞揚子業荒殘唯見岷江水悠悠帶月寒送海州盧録事前人之官逢計吏風土問如何海口潮陽近青州春氣多郊原鵬影到樓閣蜃雲和損益關從事期聽勞者歌送友人遊江南前人逺别悠悠白髮新江潭何處是通津潮聲偏懼初來客海味唯甘久住人漠漠煙光前浦晚青青草色故原一作定山春汀洲更有南回鴈亂起聨翩北向秦送夔州班使君司空曙魚國一作蜀國蠶叢魚鳬皆蜀事又有魚復地屬益州故兩存之巴庸落麾幢漢守過曉檣爭市隘夜鼓祭神多雲白當山雨風清滿峽波夷陵舊人吏猶誦兩岐歌送郎士元使君赴郢州前人使君持節去雲水滿前程楚寺多連竹江橋集作檣逺映城登樓向月望賽廟傍山行若動思鄉詠應貽謝步集作外兵賊平後送人北歸前人世亂同南去時清獨北還他鄉生白髮舊國見青山曉月過殘雪繁星宿故關寒禽與衰草處處伴愁顔送人遊嶺南前人萬里南遊客交州見栁條逢迎人易合時日酒能銷浪曉浮青雀風溫解黑貂囊金如未足莫恨故鄉遙送曹桐椅前人青春三十餘衆藝盡無如中散詩傳畫一作話將軍扇賣書楚田晴下鴈江日暖遊集作多魚惆悵空相送歡遊自此踈送盧諶集作堪前人羈貧不易去此日始集作已西東旅舍秋林葉集作夜行人塞草風酒醒餘恨在野餞暫遊同莫使禰生刺空留懷袖中送史澤之長沙前人謝朓懷西府單車觸火雲野蕉集作樵依戍客廟竹映湘君夢渚巴山斷長沙楚路分一杯從别後風月不相聞送龎判官赴黔中前人天逺風雲異西南見一方亂山來蜀道諸水出辰陽堆案青油暮看碁畫角長諭集作論文誰可製記室有何郎送夏侯審赴寧國前人青旗連白浪曉日渡南津山疉陵陽地舟多集作移建業人煙霞髙占寺楓竹暗停神如接元暉集江丞獨見親送菊潭王明府前人學成洙泗客皓髮著儒衣一與逰人别仍聞帶印歸林多宛地古雲盡漢山稀莫愛潯陽隱嫌官計亦非送永陽崔明府前人古國羣舒地前當桐柏關煙綿江上雨稠疉楚南山沙館行帆息楓洲一作舟候吏還乘藍若有暇精舍在林間送髙勝重謁曹王前人江水詩選作上青楓岸隂隂萬里春朝醉郢城酒暮見洞庭人興比乘舟訪思懷倒屣親想君登舊榭重喜掃芳塵送樂平苗明府前人天際山多處東安邑更深緑田通竹里白浪隔楓林詩有江僧和門唯越客尋應將放魚化一境表吾心送史申之峽州前人峽口巴江水無風浪亦翻蒹葭新有鴈雲雨不離猿江客思鄉逺愁人賴酒昏檀郎好聨句莫滯謝家門送王使君赴太原拜節度副使前人新從劉太尉結束向并州絡腦青絲騎盤囊錦帶鈎出關逢將校下嶺擁干集作戈矛雪閉黃雲泠山傳畫角秋劒鋒將破虜函道罷登樓豈作書生老當封萬户侯送盧徹之太原謁馬尚書前人榆落雕飛關塞秋黃雲畫角見并州翩翩羽騎雙旌後上客親集作新隨郭細侯送鄭錫曙曽事此君季父前人漢陽雲樹情無極蜀國風煙思不堪莫怪别君偏有淚十年曽事晉征南送鄭佶歸洛陽前人蒼蒼楚色水雲間一醉春風送爾還何處鄉心最堪羡汝南初見洛陽山送唐六赴舉冷朝陽秋色生邉思送君西入關草衰空大野葉落露青山故國煙霞外新安道路間碧霄知己遇一作在香桂月中攀送同落第者東歸李益東門有行客落日滿前山聖代誰知者滄洲今獨還片雲歸海暮流水背城間豫亦依嵩頴一作嶺松花深閉關送栁判官赴振武前人邉庭漢儀重旌甲事雲中虜地山川壯單于鼓角雄關寒塞榆落月白胡天風君逐嫖姚將麒麟有戰功送客還幽州見二百九十九卷送耿拾遺使江南括圖書李端驅傳草連天涼風滿樹蟬將過夫子宅亦問孝廉船漢史收三篋周書採百篇别來將有淚不是怨流年送古之竒之涇西集作赴安西幕前人疇昔十年兄相逢五校迎今宵舉杯酒隴月見軍城候火經隂絶邉人接曉行殷勤送書記強虜幾年集作時平送客往集作赴湘江前人識君年已老孤棹向瀟湘素髮臨髙境清晨入逺鄉三山分夏口五兩映涔陽更逐巴東集作江客南行淚幾行送友人遊蜀前人嘉陵天氣好百里見雙流帆影緣巴寺鐘聲出漢州緑原春草晚青木暮猿愁正集作本是風流地遊人易白頭送從舅成都丞廣南歸蜀前人巴宇天邉水秦人去是歸棧長山雨響溪亂火田稀俗富行應樂官雄祿豈微魏舒終有淚還濕寧家衣送友人遊蜀前人江上花開盡南行見杪集作少見春鳥聲愁集作悲古木雲影入通津返景斜連草回潮暗動蘋謝公今在郡應喜得詩人送張少府赴夏縣前人雖為州縣職還欲抱琴過樹古聞風早山枯見雪多雞聲連絳市馬色傍黃河太守新臨郡還逢五袴歌送袁稠遊淮南前人江淮衰草遍十里見長亭客去逢搖落鴻飛向集作入杳冥空城寒雨細沈院曉燈青欲去行人起徘徊恨酒醒送何兆下第還蜀前人重河集作江不可涉孤客莫晨裝古集作髙木莎城小殘霞集作星棧道長裊猿楓子落過一作送雨荔枝香勸爾成都住文翁有學堂一作舊房送張芬歸江東寄栁中庸前人久是天涯客偏傷木落時如何故國見更欲異鄉期鳥暮東西急陂一作波寒上下遲空將滿眼淚千里怨相思送樂平苗明府前人本自求彭澤誰云道里賒山從古壁斷江向弋陽斜暮色隨楓樹隂雲暗集作落荻花諸侯舊調鼎應重宰臣家送衛雄下第歸同州前人不才先下第詞客却空還邉地行人少平蕪盡日間一蟬波裏樹衆火隴頭關羡得居茅屋書窗見晚山集作一蟬波樹裏衆火隴雲間羡汝歸茅屋書窗見逺山送雍邱任少府前人藂車餞才子路走許東偏逺水同春色繁花勝雪天鳥行侵楚色集作邑樹影向殷田莫學生鄉思梅真正少年送義興元少府前人逢君惠連第初命便光輝已得羣公祖微集作終妨太傅譏路長人返顧草盡燕回飛本是江南客還同衣錦歸送新城戴叔倫明府前人遙想隋堤路春天楚國情白雲當海斷青草隔淮生鴈起斜還直潮回逺更平萊蕪不可到一醉送君行送成都韋丞還蜀前人蜀門雲樹合髙棧有猿愁驅傳加新命之官向舊遊晨裝逢酒雨夜夢見刀州逺别長相憶當年莫滯晉送夏侯審遊蜀前人西望煙綿樹愁君上蜀時同林息商客隔棧見罛師石滑羊腸險山空杜宇悲琴心正幽怨莫奏鳳凰詩奉送杜中丞赴洪州暢當詔出鳳凰宫新恩連帥雄江湖經戰陳草木待仁風豪右貪一作弱須威愛紆繁德簡通多慙君子顧攀餞路塵中送嚴大夫赴桂州王建嶺頭分界候一半屬湘潭水驛門旗出山巒洞主參辟邪犀角重解酒荔枝甘莫歎京華逺安南更有南送李集作吳郎中赴忠州前人西臺復南省清白上天知家每因貧集作窮散官多為直移遙裝集作搖鞭過驛近買藥出城遲朝達留詩集作憑人别親情伴酒悲故園愁去後白髮想回時何處忠州界山頭立集作卓望旗送李評事使蜀前人勸酒不依巡明朝萬里人轉江雲棧細近驛板橋新石冷啼猿一作猿啼影松昏戲鹿一作鹿戲塵少年為客好况是益州春送鄭權尚書南海前人七郡雙旌貴人皆不憶回戍頭龍腦鋪關口象牙堆勑設薰爐出蠻辭呪節開市喧山賊破金賤海船來白㲲家家織紅蕉處處栽已將身報國莫起望鄉臺送唐大夫罷節歸山前人年少平戎老學仙表求骸骨乞生全不堪腰下懸金印已向雲西寄玉田旄節抱歸官路上公卿送到國門前人間雞犬同時去遙聽仙歌集作笙歌隔水煙送魏州李相公前人百代公勳一日成三年五度換雙旌間來不對人論戰難處長先自請行旗下可聞誅敗將陳頭多是用降兵當朝面受新恩去算料妖星未敢生送史將軍安西迎舊使靈櫬前人漢家都護邉頭沒駕將麻衣萬里迎隂地背行山下火風天錯到磧西城單于送葬還垂淚部曲招魂亦道名却入杜陵秋巷裏路人來去讀銘旌送司空神童前人杏花壇上受書時不廢中庭趂蝶飛暗寫兩經收部帙初年七嵗著衫衣秋堂白髮先生别古巷青襟舊伴歸獨向鳳城持薦表萬人叢裏有光輝送别楊凝樽酒郵亭暮雲帆驛使歸野鴻寒不起川雨凍難飛吳會家移遍轘轅夢去稀姓楊皆足淚非是強沾衣送客東歸前人君向古營州春風戰地愁草青蒙别路栁亜拂孤樓人意傷難醉鶯啼咽不流芳菲只合樂離思返如秋送客歸湖南前人湖南樹葉盡了了見潭州雨散今為别雪飛何處遊情來翻似醉淚迸不成流那向蕭條路緣湘黃竹愁送客往鄜州前人新參將略事西一作營平錦帶騂弓結束輕曉上關城吟夜角暗驅羌馬發支兵回中地逺風常急鄜畔年多草自生近喜扶陽係戎相從來衛霍笑長纓送友人歸淮南前人畫舸照河堤暄風草色齊竹凝絲直網蝶去燕遺泥郡向髙齋近人從别路迷非關御溝上今日各東西送客往夏州前人憐君此去過居延古塞黃雲共渺然沙濶獨尋邉馬迹路迷遙指戍人煙夜投孤店愁吟笛朝望行塵喜控弦聞有故人今從騎何須著論更言錢文苑英華卷二百七十五
