body:
  text: 文苑英華卷七百一宋李昉等編文集三孔補闕集序一首洛州張司馬集序一首尚書崔孝公集序一首揚州功曹蕭君集序一首楊騎曹集序一首工部侍郎李公集序一首文編序一首殿中侍御史蕭君文章集録序一首孔補闕集序張說唐㑹稽孔季詡集作翊字季和識真之士也弱冠制舉授校書郎轉國子主簿年三十一卒於左補闕祖紹安中書舍人考楨絳州刺史季和清規素業有奕代之訓依仁游藝真聖者之後永昌之始接跡集作踐書坊有廣漢陳子昻巨鹿魏知古髙陽許望信都杜澄昌樂谷倚廣陵馬懷素東萊王無競河南元希聲臨淄李伯魚譙國桓彥範僉謂季和神清韻逺析理探微衛叔寶之比也嗚呼人斯云亡世閲多故十年之外零落將盡而後來集作死者皆首華金步鳴玉負璽丹池揮翰紫宸何嘗不拜職之日歎在劉王喬臨壇之時恨無謝益夀者矣頃見許州之子風裁可觀潘子之門有尼夏侯之學傳建集作者五卷以示豫稱從弟四人皆良器愴相如之遺草幸公業之不亡自集作因叙曩意存之篇首云爾洛州張司馬集序夫言者志之所之文者物之相雜然則心不可藴故發揮以形容辭不可陋故錯綜以潤色萬象集作物鼓舞入有名之地五音繁雜集作㑹出無聲之境非窮神體妙其孰能與乎洛州司馬張公名希元中山人也族髙辰象氣壯河山神作銅鈎天開金印孝友內植禮樂外滋勵行閨庭鄉人謂之曽子飛名都邑諸儒號曰聖童下帷覃思穿牀集作墻嗜古蓬山藝觀之書群玉懸金之記魯宫藏篆沒冡遺編無不日覽萬言暗識三篋博學吞九流之要處盈若虛雄辨敵四海之鋒退藏於密漢王問䇿知帝者之師楚子聞名實諸侯之選故得雄飛白簡鷹揚丹筆卷䄡帷於天郡設鈎距於皇州集作都若乃抗埋輪之章執驚馬之議旌賢有通德之教疾惡存署背之文繼軌前途遇物成興理關刑政咸歸故事之臺義涉針規盡入名臣之奏加以許與氣類交遊豪傑仕遘夷險身更否泰昔嘗攝戎幽昜謫居邛嶲亭臯漫漫興去國之悲旗鼓洶洶助從軍之樂時復江鶯遷樹集作谷隴鷹出雲夢上京之臺沼想故山之風月發言而宫商應搖筆而綺繡飛逸勢標起集作孤標寄集作竒情新拔靈仙變化星漢昭回感激精微混韶武於金奏天然壯麗綷雲霞於玉樓當代名流翕然崇集作宗尚自大夫之頌成室太史之賦京都魏則十龍儒雅晋則三陽張載字孟陽弟協字景陽亢字季陽並有才藻屬綴英華誤作楊藻綴朝分南北運迄周隋文人才子重世間出豈止周流集作柟榴體物陳琳得以示人鷦鷯寄辭阮籍稱其王佐故以開國籍鱗次乎史傳之首入文場羽儀乎天下之半公增繁榮葉桂林之一枝彌廣源流集作𣲖非荆江之九𣲖宗門多士斯為盛與且如承家舊德之基賔王歷官之序玉琯銅渾之數黃公𤣥女之符英華作冠落猿殪兕英華作哭非之巧顧鵲回鸞之妙詳諸别傳可略言焉某室邇蘭芬族聮棣蕚荷千里之嘉奬接四友之良遊謹撰令引式題前集七子賦詩期取類於鄭志一家垂範庶齊衡於孔藂來日新文請諸集作侯君子起儀鳯之後景龍以集作之前凡若干卷列之如目贈禮部尚書孝公崔沔集序李華文章本乎作者而哀樂繫乎時本乎作者六經之志也繫乎時者樂文武而哀幽厲也立身揚名有國有家化人成俗安危存亡於是乎觀之宣于志者曰言飾而成之曰文有德之文信無德之文詐臯陶之歌史克之頌信也子朝之告宰嚭之詞詐也而士君子耻之夫子之文章偃商傳焉偃商歿而孔伋孟軻作蓋六經之遺也屈平宋玉哀而傷靡而不逺六經之道遁矣論及後世力足者不能知之知之者力或不足則文義浸以微矣文顧行行顧文此其與於古歟帝唐文行大一無大字臣太子賔客贈禮部尚書博陵孝公崔氏諱沔字若唐書作善冲安平公愷之少子也世為德表門為上族振發純英滋漸名訓大包淑和髙厲遐清行先乎孝藝裕乎文資孝可以股肱王室揆文可以弼成邦教進士登第舉賢良方正對策第一召見拜校書郎歷陸渾主簿朝廷以公直躬正詞擢左補闕以公嫉邪忿佞除殿中侍御史文端武淑遷起居舍人學該典禮拜尚書祠部貟外郎議事惟允遷給事中立言成訓改中書舍人辭乞就飬授虞部郎中節髙天下擢御史中丞剛亦不吐降著作郎道冠儒林遷祕書少監動為人範除左庶子冝均大政拜中書侍郎望尊地逼出為魏州刺史人惟求舊入拜一作為左散騎常侍二東宫居守集賢院學士祕書監太子賔客兼懷州刺史罷州復職副守薨于位時開元二十四年冬仲月旬有七日春秋六十七贈禮部尚書海內冠帶涕哀宗師公為御史緩一作紏輸誠之囚一作岡持國屬之罪為給事中拒貴幸怙恩之詔削大臣忤㫖之刑為中丞數發太倉减上林禽鳥之給以賑艱食陜東之人仆而復起宦官犯法執以按劾權寵屏息朝章大行推舉時賢一作權貢舉時得陸尚書景融李揚州瑱宋上黨遙宋兵部鼎等僉為國器在中書詔命之出上考天時下從人心異於斯者必替其否在魏州屬雨水敗稼乃弛禁便人先行後聞活者萬計公自為常侍賔客恆任介正德播天下而不容於朝置之散地竟孤其道時乎初公與元兄御史渾齊名弱冠遊京師縉紳儒學之士皆曰崔氏伯仲必至台司既而御史君夭沒公終于一作於副守則向之所屬適為人慟悲哉公之侍疾也孝逹于神祗居憂也哀貫乎天地喪期有數而茹蔬終身慈不貸姦貞不肆直道勝而齊物德全而及人博厚崇髙篤實有耀儔於古烈蓋魯衛之君子歟在魏州車駕東巡關外諸侯公為上第由是分掌選署仕進之族知勸焉親友一作交鄰里饑者待公而炊寒者待公而裘蒸嘗之奠待公而後具故祿廪雖厚家未嘗足開元中天下富穰車服過制公菲飲食卑宫室濯衣浣冠俾人瞻我而化其不化者亦慙乎心矣見天下之善如不及從而佐之見天下之不善如探湯從而誨之則卒蹈於中庸翻然於不迪巳過半矣中朝議政或疑羣謀未允公援六經伸百氏覆於時事事舉其中天下莫不諷誦焉文集經亂離多散逸今其存者二十九卷長子成甫進士擢第校書郎陜縣尉知名當時不幸早世嗣子祐甫論撰先志一卷為第三十卷傳祖禰之美合於禮經見公文章知公行事則人倫之叙治亂之源備矣豈唯化物諧聲為文章而巳乎奉詔修道德經疏藏于三閣行乎天下反魏晋之浮誕合𤣥言於世教其於道也至乎哉祐甫純孝而文直清而和希公門者謂公存焉明發不寐泣次遺文以華北州鄰壤婚姻之舊嘗趨公門備閲家編祐甫代華為校書郎華以是味公之道也熟詞則不敏有古之直焉一作皆唐文粹揚州功曹蕭頴士文集序開元天寶間詞人以德行著於時者曰河南元君德秀字紫芝其行事一無此三字趙郡李華為墓一無墓字碣巳書之矣一無此四字以文學著於時者曰蘭陵蕭君頴士字茂挺梁一有國字鄱陽忠烈王之後曽祖某官大父某官考諱某莒縣丞咸有德不至尊位一作咸有位不至尊君七嵗能誦數經背碑覆局十嵗以文章知名十五譽髙一作滿天下十九進士擢第歷金壇尉揚一作桂州參軍祕書正字河南參軍辭官避地江左永王修書請君君遁逃不與相見淮南節度使三字一作連帥表君為功曹參軍一作揚州功曹相國諸道租庸使第五琦請君為介君以先世寄殯嵩條一作濮因之遷祔終事至汝南而歿嗚呼春秋若干天下儒林為之憔悴君為金壇尉也㑹官不成為揚州參軍也丁家艱一作難去官為正字也親故請君著書未終篇御史中丞二字一作府以君為慢官離局奏謫罷職為河南參軍也寮屬多嫉君才名上司以吏道一作事責君君拂衣渡江遇天下多一作有故其高節深識皎皎如此君以為六州之俊一作君謂六經之後有屈原宋玉文甚雄壯而不能經厥後有賈誼文詞最一作詳正近於理體枚乘司馬相如亦瓌麗才士然而不近風雅揚雄用意頗深班彪識理張衡宏曠曹植豐贍王粲超逸嵇康標舉此外皆金相玉質所尚或殊不能備舉左思詩賦有雅頌遺風于寶著論近一有乎字王化根源此後敻絶無聞焉一作此外皆敻絶無聞近日陳拾遺子昻文體最正以此而言見君之述作矣五字一作君述作君以文章制度為已任時人咸以此許之不幸歿於旅次文集若干卷一作有文十卷行於代一作世其篇目雖存章句遺落一作逸古所謂有其義而無其詞者也一有是字後之為文者取以為法焉今海內至廣人民至衆求君之比不可復得難乎哉君有一子二字作子一人曰存為蘇州常熟縣主簿雅有父一作家風知名於代一作世以華平生最深見託為叙力疾直書云爾一作皆唐文粹楊騎曹集序開元天寶之間海內和平君子得從容於學以是詞人材碩者衆然將相屢非其人化流于苟進成俗故體道者寡矣夫子門人德行言語政事文學四者無人兼之雖德尊於藝亦難乎備也後之學者希慕先賢其著也亦名髙天下行修言道以文吾見其人矣𢎞農楊君諱極字齊物隋觀德王之後祖正基魯王府咨議父珣永平令得進士舉邦族高之君幼孤事繼母以孝聞讀書務盡其義為文務申其志義盡則君子之道𢎞矣志申則君子之言信矣舉進士時刑部侍郎樂安孫公逖以文章之冠為考功員外郎精試羣材君以南陽張茂之京兆杜鴻漸琅邪顔真卿蘭陵蕭頴士河東桞芳天水趙驊頓丘李琚趙郡李崿李卿南陽張階唐登科記有李㐾李欣張錯無李卿張階常山閻防范陽張南容髙平郗昻等連年高第華亦與焉既而丁艱禮足哀餘名教稱之外調補太子正字歷右驍衛騎曹參軍求道於𢎞正禪師百千人中獨受心要與清和張茂之房安禹巨鹿魏幼卿為禪惠之交河南元德秀陸據崔器范陽盧治疑作冶為道義之交大官薦賢使臣請介莫不推君為首以方外為意不之受也識者讜議以論道許之質純氣和動必由道談笑中雅名理入𤣥所著文章多入𤣥中雅之才者也不幸嬰風疾逝于京洛享年五十八向道之流聞之涕洟君及張房既沒而狂胡起逆殘虐天下神祐善人安靜其終始乎終始之理至矣遊方之內為哀遊方之外為道或固然歟永泰二年余旅疾延陵故人之孤更來候余君子孤年十餘一身奉親孝敬和敏有先人風與余鄰居炊汲相望候余小間捧君之集十卷詩賦贊序頌記策凡一百七十五篇咨余為序視之愴然且名之曰德元字之曰長宗昔許衛尉與徐孝穆徐陵字孝穆英華誤改孝為荐友善衛尉孤善心年在童孺奉孝穆箋曲盡孝穆憐之延譽當時况德元在羇旅之中集先人文拜乎床下求宣往烈余於孝穆之感不其倍乎乃如其篇第因舉其行事以德元幼孤不知先父之執故為備陳之工部侍郎李公集序賈至易曰觀乎天文以察時變觀乎人文以化成天下然則唐虞賡歌殷周雅頌美文之盛也厥後四夷交侵諸侯征伐文王之道將墜地於是仲尼刪詩述昜作春秋而叙帝王之書三代文章炳然可觀洎騷人怨靡楊馬詭麗班張崔蔡曹王潘陸揚波扇颷大變風雅宋齊梁隋蕩而不返昔延陵聽樂知諸侯之興亡覽數代述作固足驗夫理亂之源也皇唐紹周繼漢頌聲大作神龍中興朝稱多士濟濟儒術煥乎文章則我李公傑立當代於戲斯文將喪久矣習鄭衛者難與言咸頀之節被氈裘者難與議周公之服而公當頺靡之中振洋洋之聲可謂深見堯舜之道宣尼之㫖鮮哉希矣觀作者之意得易之變知書之逹究詩之微極春秋之褒貶可謂孔門之弟洙泗遺徒失其韻俗揚波扇颷餔糟啜醨時有婉麗之什浮艷之句皆牽於詔㫖迫於時事然亦音尓作言近而興深語細而諷大罔有不含六經之奧義覽者其知夫子之牆乎至先大夫與公有皮鮑之知公嗣子吏部侍郎季卿與至有聲譽之好德業度量弱嵗聞之於趨庭公文學編簡中年得之於吏部所見異辭所傳異文敢不序焉夫具游夏之文學不備顔子之德行許郭之機覽未聞班張之贊述而公文與行協識與才并是故大名震於當代德慶流於後葉不其偉歟文編序元結天寶十二年漫叟以進士獲薦名在禮部㑹有司考校舊文作文編納于有司當時叟方年少集作少年在顯名跡切耻時人諂邪以取進姦亂以致身徑欲填陷穽於方正之路推他回反時人於禮讓之庭不能得之故優遊於林壑怏悢上於亮下於讓於當世是以所為之文可戒可勸可安可順侍郎楊公見文編歎曰以上第汚元子耳有司得元子是賴叟少師友仲集作中行公公時為國子司業公聞之諭叟曰於戲吾常恐直道絶而不續不虞陽集作揚公於子相續如縷明年有司於都堂䇿問群士叟竟在在集作辱於上第爾來十五年矣更經喪亂所望全活豈欲跡參集作忝戎旅苟在冠冕觸踐機危以為榮利蓋辭謝不免未能逃命故所為之文多退讓者多激發者多嗟恨者多傷閔者其意必欲勸之忠孝誘以仁惠急於公直守其節分如此非救時勸俗之所須者歟叟在此州今五年矣地偏事簡得以文史自娛乃次第近作合於舊編凡二百三首分為十卷復命曰文編示門人弟子集作子弟可傳之於筐篋耳叟之命稱則著于自釋云不録時大厯三年丁未中也殿中侍御史蕭集作府字君文章集録序獨孤及詩者志之所之也七字集作足志者言足言者文情動於中而形於聲文之微也粲于歌頌暢于事業文之著也君子修其詞立其誠生以比興𢎞道歿以述作垂裕此之謂不朽侍御諱立南蘭陵人也御史中丞汝州刺史府君之仲子奕世純厚集作嘏及公始大襁褓克岐十五而立神靜氣和才與道并孝悌忠信以為已任行有餘力故幼而學文嘗謂揚馬言大而迂屈宋詞侈而怨沿其流者或文質交喪雅盛相奪盍為之中道乎故夫子之文章深其致婉其㫖直而不野麗而不艷天寶元年詔徴賢良方正以備多士公時年十七射策甲科盛名翕然震怛集作喧京邑論者知逺大之跡自此始也既而荏苒宦途遭遇世故歷佐戎幕周旋江海攸徂之邦必聞其政嘉謨成績藏在諸侯之策既言中其倫亦動與古㑹由是自廷尉評拜監察御史轉殿中丞丞集作侍御史觀其逐逐利往冥冥翰飛方將乘驚風以騁騖視青雲如咫尺天道何善而無報與其才而不與其夀成其器而不成其志命矣夫斯才也而有斯年也公之元兄尚書庫部員外郎兼侍御史曰某與公俱以文學政事為臺閣領袖丹穴之雙鳯才舉棠棣之一花先落天倫之慟可勝既耶以公瑰姿璞集作瑋度利器淑德與東流皆逝今則已矣可以藏遺芳以示後嗣者其唯夙昔麗藻平生翰墨乎於是茹痛開緘收集作收血散帙緝其遺札得詩賦贊論表啓序頌銘誄志記凡若干篇編為五卷以為集録庶幾弔賈生者省集作賦鵬集之日問相如者知封禪集作禪草猶存云爾文苑英華卷七百一
