body:
  text: 文苑英華巻四百二十六宋李昉等編赦書七禋祀赦書三貞元九年冬至大禮大赦制陸贄門下朕以寡徳屬當大統皇天眷祐俾主兆人懼不克承夙夜祗畏緬慕前烈致于昇平予心浩然罔知攸濟小大之務曷嘗不勤芻蕘之人亦莫不敬慮每存於致理忠恒在於恤人中宵屢興終食累嘆一事乖弛詔令作當惄焉疚懷一夫罹殃惻若傷體思於海内同臻太和息其戰争保其生業降心從衆實匪有詔令作靡有集作有其辭克已利人誠無所恡然以視聼有極思慮難周况乎長自深宫安於近習損益之理寧免過差幽逺之情固多未達由是兢兢砥礪悔往修來燭理所患於不明推心庶幾於無負日慎一日于今十有五年矣上靈降鑒多士叶誠五稼屢豊四鄙不憂方鎮輯睦干戈底寧邉壘繕完殊方欵附協天地會昌之運實宗社無疆之休慶既荷於𤣥功禮有昭於大報矧惟霜露之感未切孝思禋燎之儀每勤精意將申誠敬其在躬親是與公卿大夫䖍奉犧牲恭奠珪璧陳其文物薦其馨香類秩集作秩記於太壇朝享于清廟率職來助萬邦攸同備物致嚴百禮具舉誠慕獲展神人允諧明發永懷慶感斯集純嘏所錫豈惟朕躬思俾普天均承惠澤可大赦天下自貞元九年十一月十日昧爽已前云云其見於官司辨對者亦並集作便與免官人犯贓不可令其却上已後闕以為累左降官及流人并量移云云竄謫遐裔冀速霑恩比者凖制量移所司皆待申牒屡加盤覆累涉嵗年既甚淹遲且不均一宜令吏部刑部審細檢勘本流貶及量移勑㫖比類元犯事狀輕重兩月内與處分内外文武云云從我巡狩涉於艱難録其忠勞宜有優異應從奉天扈從至興元府文武官將士等普恩之外三品已上賜爵云云兵興已來垂四十載稅額集作既煩重人已集作多困窮因之以流離加之以凍餒為人父母實切哀傷誠由徳化未敷集作孚耗斁猶廣每欲蠲復使集作與之小休迫於軍儲有意未就姑示勤恤减其田租惠貸非多良深憫愧天下百姓貞元十年地租斛㪷應合度支收管者宜並三分减收一分如當管無屬度支斛㪷即减放合送上都十分之一其所放斛㪷錢物並委巡院官與觀察經畧等使計會審勘定數分明榜示百姓仍具申奏去年以來所有貸糧種子並存百姓腹内者一切放免富國集作裕安人在於薄斂必不得已簡則易從自頃削去煩苛定為兩稅既無他撓集作擾頗便於時朕推誠御人所貴在集作存信保此成法期於不踰凢百有司所宜遵守儻求取無節則因縁起集作啓姦獲利失人殊乖朕意諸司諸使及諸州府除兩稅外别有科配悉宜禁絶近年以來因和市和糴欠負百姓錢物並即填還已後官司應有市糴者各須先付價直不得賒集作先取抑配因兹斂怨擾人水旱為灾古人集作今不免茍有豊蓄集作備則無凶年間屬多虞里閭凋耗如務求於日給不遑慮於嵗儲一穀不成人則艱食害至而救其傷已多俾無餒殍之憂將在備之而已宜委諸州府長吏每年以當管廻殘餘羡錢物糓賤時收糴各隨便近貯納年終具有無多少報中書門下兼申考功以為考課升降如有替代各分明交領凖前申報若遇灾異集作旱不稔即量事給與集作賑給百姓輙有集作輙如將充諸色用者以枉法贓罪之其勸課百姓自置義倉仍凖貞元元年十一月十一日制處分立人之道惟孝與忠孝莫大於榮親忠必先於竭節惟爾師長鄉集作卿校洎乎方岳列藩保乂皇家交修庶績竭節之效既昭乃誠榮親之恩宜洽國典應内外文武清望職事官并節度觀察都防禦團練等使父在未有官量授檢校五品官母在未有邑號者各封集作授邑號云云佐運之臣納忠之輔功既存於社稷慶宜及於子孫故周錫土田漢傳帶礪膺集作疇其爵邑與國始終固以明報徳之恩勸為臣之節詔令作義其或年代未逺利澤猶存祠宇已變於荒墟𦙍嗣不編于集作於仕籍思其人猶愛其樹况奠享乏主而不加省録者乎興滅國繼絶代所以禮先賢也修宗廟敬祀事所以教追孝也化俗歸厚此其大綱集作端應九廟配享功臣及武徳以來將相名節特髙有封爵廢絶祀廟無主者宜許以子孫一人紹封以時享祀自今以來集作後應有家廟子孫但傳襲封爵者並許享祔于集作享於廟其有毁賣私廟及買之者各以犯教義論自古聖帝明王忠臣烈士各令所在長吏以禮致祭書叙明目達聦垂拱而理詩稱濟濟多士文王以寧捨已從人故能通天下之志棄瑕録用故能盡天下之才昔在太宗勤求理道納諫如響任賢勿疑致裕於太平垂範於永代朕獲承鴻緒追慕集作纂聖猷書之座隅恒自儆勵朝夕翹想度聞嘉謀集作言夢寐勞集作興懷思得良士凡厥在位所宜共成集作宜共輔成諸司官有陳便宜者各盡所見條䟽封進事有寃滯政有闕遺悉當極言無或隱避詔勑不便於時所司執奏以聞天下有藴徳懷才隠居不仕委所在觀察使表荐當以禮邀致諸色人中有賢良方正能直言極諫或博通墳典達於教化或詳練故事長於著述或精習律令曉暢法理或該明吏術可委理人或識洞韜畧堪任將帥委所在州府長史及䑓省常叅官詳録行能舉奏仍牒報吏部其所舉人並限來年七月内到京朕當親試應縁大禮職掌行事並與加恩主者施行長慶元年正月三日南郊改元赦文編制門下朕聞自昔盛王之所以合天地諧神人莫過乎誠敬致其誠展其敬莫重於祭祭之大者莫大於郊廟故必躬行而心奉之然後百靈助慶萬國䝉福此帝王之孝也我國家祖宗功徳立極配天日月所照雨露咸被孝思善繼聖敬允升郊丘嵗奉於嚴禋宗廟時修其明薦朕以冲昧自獲纉承仰荷睠命懼不克享幸天多祐俾嵗大穰河朔底寧邉封靖謐及此元日至于上辛式遵典禮有事郊廟當祗見之夕感慕増懷洎大報之辰誠敬彌勵因體元而紀號用敷化以覃恩可大赦天下改元和十六年為長慶元年自長慶元年正月三日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒咸赦除之惟故殺人在十惡内者及官典犯贓不在免限左降官量移近處已經量移者更與量移如復資者即任便赴選集丁憂去任服闋日亦與量移如有親故在上都任於所司陳狀便與處分不必更待本州府申請如凖前制已合量移有司未註擬者並任累叙并别勑因責授刺史已下降資正員官亦與進改亡官失爵放歸不齒者量加收叙流人未到所在及已到者與量移近處已量移者并放還僧尼道士移𨽻者亦與量移近處并得罪人已亡歿家口未放歸者一切放歸如有情愿住者亦任左降官及流人先有官者如已亡歿各還本所詔令作官自今日已前所有痕累禁錮及反逆縁坐等一切並與洗滌其左降官及流人如所坐之罪本因犯贓到任及所配處未經二年者不在量移其天徳軍流人滿十年即放廻其糧賜委防禦使便别召人充補營田驅使朕自君臨萬㝢常思子惠羣生每念困窮猶勞杼軸宜加恩於寰海用蠲賦於齊甿天下百姓今年夏稅每貫放一百五十文底貢之宜本於任土阜財之道亦在便人天下州縣應徵科兩稅𣙜酒錢内舊額須納見錢數者並任百姓隨所有疋叚及斛㪷依當處時價詔令作佔送納不得邀索見錢度支鹽鐵户部應納茶稅及諸色見錢兼糴鹽價中舊額須得詔令作納見錢數者亦與納時估疋段及斛㪷其輕貸即充上供雜物當處支用如情願納見錢者亦任穩便永為常式京城坊市聚貨之地若物無集處即弊生其中宜委度支鹽鐵使於上都任商人納榷糴諸道監令在城疋叚各有所入即免物價賤於外州仍委所司具條䟽聞奏其公私便換錢物先已禁斷宜委京兆府及御史䑓切加覺察理財正辭弊必除於既往蠲逋已責禁方絶於將來應度支鹽鐵户部三司所管諸官吏所由人户等欠負元和十三年已前諸色錢物斛㪷等各委本司盡理勘實如是貨疑作貿易估招人已隱欺即凖條處分如縁收貯年深盤覆欠折水火沉爇保累剥徵并縁用兵之時所在貯備雜物凖擬軍需及賊平之後不堪上供勒令廻變因有損折如此之類除檢責家産及攤徵元保外如實無可納空掛簿書連年囚禁者宜令各具色目聞奏並與踈理其諸軍諸使應有欠負亦凖此處分天下兩稅外不得雜詔令作别有差率刺史若詔令作如違越委觀察使舉奏觀察使或有事乖格勑刺史不得接受已有前勑宜重申明仍委御史䑓嚴加訪察不得妄稱供應及軍府褊迫捍禦疆陲必先財力使其節用方可實軍訪聞邊上諸鎮比縁使臣所到或私申饋潜耗資儲假此為辭因而積弊將令完緝功在立程應京西京北邊上諸軍州鎮自今已後如有中使及郎官御史奉使到所管並不得與人事比部令勾諸司錢粮詔令無粮字糓載在格令其事訛謬嵗月已深宜令中書門下精擇比部郎官修舉典制勾諸司錢糓仍立時限具條䟽聞奏山河之固險易不常疆理之間廢興從便今干戈已戢寰宇大同壤制之宜所資垂久應諸道諸州及諸縣宜委中書門下審商詔令無商字量制置其州縣兼委觀察使刺史量閒劇利便可併省者具事宜聞奏河北諸道管内自艱難以來久無刑法各隨所在徵歛不時色目至多都無藝極宜委本道觀察使勘實㨿桑産及先各徵配量輕重團定兩稅務令均濟其刺史已下俸料仍據州縣户口徵科多少并職田禄粟作等第河南諸州府例條䟽分拆聞奏如聞河南北州縣凋殘户口未復官員備設曹局至聞或非其才徒費其禄其縣州官各據都邑大小量公事多少留置餘並權停仍先於久經假攝才行彰著人内選擇委觀察使訪察勘實各具前後歴攝勞考約前衘資序便與正授如先無官者以假攝年深課績尤異各具事績聞奏委中書門下類例如資序或未相當且令權知兩考候有政能即與正授其見在正官多是流外逺不任公事切宜揀擇堪留者全給課科使其盡心合减省者並勒停罷仍㨿已得資常選之内與减兩選未得資者任以前衘便放選集仍名衘申牒有司自今已後委吏部切加揀擇量才比擬所冀惠政及於疲人應諸道管内百姓或因水旱兵荒流離死絶見在桑産如無近親承佃各委州縣切加檢實㨿桑地數具本户姓名申本道觀察使於官徤中取無庒園有人丁者量氣力可及據多少給付便於公驗任充永業不得令有力職掌人妄為請射其官徤仍量借貸種粮分畨上下各任營農放三年差詔令作租稅年限滿後據桑地凖例團定合當下畨營農者停給月粮其衣物賜及雜賞給並如舊應天下典人庒田園店便合祗承户稅本主贖日不得更引令式云依私契徵理以組織貧人天下𣙜酒錢有已分配百姓處又别置酒店官酤及諸色𣙜率宜切禁斷應亡官失爵及放還流人如有先莊田不經沒官被人請射作詔令作本主及子孫到並委州縣却還務令安業州主牧宰職在親人其有徭賦不均流庸未復刑罰不中教化未行必當分命使臣大明黜陟三代致理皆重學官兩漢用人盖先經術天下諸色人中有能精通一經堪為師法者委國子祭酒訪擇具以名聞將加試用稱成康之盛則舉措刑讃文景之德亦言斷獄况自文祖太宗皇帝親録囚徒躬省寃滯法官所選豈易其人其大理寺官屬比來吏部所授多非其才宜令精選詔令作擇有志行詞學兼詳明法律注擬其有課績特殊堪在朝奨者䑓省官有闕宜先選擇部符共理按部分憂繁於生人所任最切近日刺史或一嵗再遷或累年尚滯勞者不勸否者不懲自今郡守勤詔令作恪奉詔條清亷可紀者四考與轉其有殊績及久歴外郡者或就加章綬或擢列朝行庶使中外有倫逺邇無異其刺史有闕委中書門下選擇當時進擬不得稽遲其江淮諸道縣户一萬已上稅錢五萬貫已上皆謂之大縣所擇縣令宜凖元和二年赦節文處分其去年二月五日赦書中所薦縣令兼取散試官及白身并見任官者不學而製其弊固甚未操而割所傷則多豈有白身及散試官未經試吏堪任縣令永言及此殊匪朕懷又見任官更求舉荐亦長僥競不可施行其散試官及白身並見任官令吏部並停注擬自今已後所舉縣令更不得舉薦此色將致乎理必在官循其方將盡其才必在吏久於政先朝深知積弊首舉具員近日因循又不遵守遂令躁競者不安其位唯望速遷自今已後宜委中書門下所有除授並依元和二年具員勑處分其諸道年終亦宜凖承前勒停如刺史於留州數内妄有减削非法破用者委觀察使風聞按舉必當重加科貶以誡列職如刺史不承制勑不得稱有公事請赴本使其録事叅軍亦不得擅離本州將欲化人必先興學茍昇名於俊造宜甄異於鄉閭各委刺史縣令招延儒學明加訓誘名登科第即免征徭天下所置常平義倉凖元和元年正月赦書節文處置未便者委刺史各具事由條件聞奏有司更與商量處分郵傳所置令式有文近年以來多有逾越遂使馬蓄損耗供億勞煩宜凖元和二年赦節文處分天下諸州府縣官吏應行鞭捶本罪不致死者或假以責情致令殞斃宜委御史䑓及出使郎官御史等切加訪察聞奏天下諸道或閉糴禁錢自為條約自今已後切宜禁斷仍委鹽鐵巡院勾當其内外文武及致仕官三品已上賜爵一級四品已下各加一階陪位白身人賜勲兩轉故尚父汾陽王賜大師晟賜大尉秀實各與一子八品官顔真卿杲卿張巡許逺南霽雲各與一子出身武德以來功臣子孫量加奬用中書門下又節度帶平章事者各與一子八品正員官祖父母及父母並與官封父歿母存者與邑號已贈已封者更與追贈及邑號禮儀使大禮使度支鹽鐵使京兆尹各與一子出身文武常叅官并致仕官及諸道節度觀察經畧等使及神䇿等諸軍使父見存者量與致仕官母存者與邑號父母亡殁與贈官及邑號東都留守及諸道節度觀察經畧等使神䇿金吾六軍將軍威逺鎮國軍等使各與一子出身陜州奉天興元功臣更賜勲爵有差身歿未經追贈者並與追贈應元大禮移仗宿衛御樓立仗將士普恩之外賜勲爵有差仍凖舊例賜錢物二十萬四千九百六十端疋貫大禮職掌行事官吏及留守等吏賜勲爵及加階升壇殿行事官更特加一階應在城内蕃客等賜物有差常叅官及刺史有停替及病假觧官及終制未授官者委中書門下量才進擬其有情愿授致仕官者亦聼天下諸色人中有賢良方正能忠言極諫博通墳典達於教化軍謀宏逺堪任將帥政術詳明可以理人者委有司各舉所知限今年十月到上都天下百姓髙年者賜米及綿絹有差其元和十五年二月五日赦節文中有未處置者有司速舉施行庶令大信洽于天下百司之職布在舊章特舉正經必歸理本宜令尚書省應掌閑幕士御士醫工獸醫門僕藥僮御書手楷書手典書流外署等各賜勲兩轉通氣炳靈是資嶽凟禦灾捍患爰想聖賢將達明誠式崇祀典其五嶽四凟宜委本州府長吏備禮致祭當極豊㓗以副如在之誠名山大川及自古聖帝明王忠臣烈士各令所在以禮致祭亡命山澤挾藏軍器百日不首復罪如初赦書有所不該者所司具作條例奏敢以赦前事相告言者以其罪罪之赦書日行五百里布告天下咸使聞知主者施行文苑英華巻四百二十六
