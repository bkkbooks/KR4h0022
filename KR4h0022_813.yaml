body:
  text: 文苑英華卷八百十四宋李昉等編祠廟上滑州修堯祠記一首鳯翔府扶風縣文宣王新廟記一首袁州文宣王廟記一首改修吳延陵季子廟記一首諸葛武侯廟記一首斥鼻亭神記一首滑州修堯祠記白敏中白馬津西南五十里曰堯祠衮龍騰文劒佩有光德音不遐精魄如在然而祠廟僻逺藻薦亦稀荒榛不除茂草斯鞠司空隴西公即戎之二嵗勤恤人隱期於俗阜夏四月宿麥方登油雲未施公愀然殷憂思降甘澤因曰古先皇王孰神於堯盍將禱焉期有所應乃率寮屬將校質明而往鍾磬畢陳牲牢在筵翊精肅容䖍禱移時祝拜之際肸蠁如答未及回車重隂已周密雨輕灑槁苖特起逮夕及晨自葉流根寮屬將校相率稱賀曰天災滑民仍嵗不登道殣流離十年于兹公能以誠明動神祗膏澤發枯朽免積逋於餓隸變旱歉為豐稔固當大崇廟貌以旌厥美於是飾粉壁張羅帷欒櫨四周丹紺交輝肅肅靜密神之所依是宜播公之美揚神之祉刻於金石而為之記時大一作寶厯二年七月二日建立鳯翔府扶風縣文宣王新廟記程浩天地吾知至廣也以其無所不覆載日月吾知至明也以其無所不照臨江海吾知至大也以其無所不容納料廣以寸管測明一作景非以尺圭航大以一葦廣不能逃其數明不能私其質大不能亡其險韙一作偉哉夫子生後於天地而知始亡先於天地而知終一作後天地而生知天地之始先天地而沒知天地之終非日非月光之所及者逺不江不海潤之所浸者博三代禮樂吾一有知字其損益百王憲章吾一有知字其消息君臣以位父子以親家國以肥鬼神以享道未可詮於無一作其有物釋未可證於無生一以貫之者一無此字我先師夫子見之矣矣字一作夫子聖人也帝之聖者曰堯王之聖者曰禹師之聖者曰夫子堯之德有時而息禹之功有時而窮夫子之道久而彌彰一作芳逺而彌光用之而一作者昌捨之而一作者亡昔否於宗一無宗字周今泰於皇一無皇字唐不然者何耀一作被衮而裳垂旒以一作而王者哉扶風古縣也在京之西環渭而一作之北望標關輔之首雄壓劇秦之大有尉曰袁辨者學稽漢室名振伊鼎跡泯味道力餘功文一作學吞漢臺賢負伊鼎文則變雅行乃矩物其為政也剛而能斷柔而能吐其理身也靜爾深谷淡然澄江紆大君之明命注賢相之清選三十六字一作其為政也剛以斷其理身也柔而立回大君之清問動賢相之精選寅奉聖㫖廓新祠堂一作夤奉詔旨廊新祠宇殿宇一作廊廡岑立宫墻島峙一作趾睟尊儀一作睟先師於兩楹羅禮貌一作羅亞聖於十哲砌蘭有主院柏分行徂庭自肅入室知一作加敬陳牲牢而在旅一作如在間一作旅籩豆而無算天下大軍之後一有也字時弊而沒禮域中小康之前一有也字俗偷而迷歸懿文一作尚儒以戢兵尚德以一作設義而銷戰使人從善逺惡而不自知大哉袁氏之子其用心也至矣邑宰李公政事一作才思練逹德音一作政事和理風聲樹而一作於丕變氓頌樂而不支縣丞主簿尉等琅玕王畿黍稷公器覽容色窺相公之明鏡整鬐鬛趣相公之龍門雲霄坐馳鳴躍可俟浩客一無此字自帝輦一作鄉聿來一作薄逰鳯翔入境而醉聞佳政歸歟而食一作告歸而餐味尤績前尉許摯一作贄起豫能事春秋之徒如何勿書時大厯二年某月日記一作皆唐文粹袁州文宣王廟記蕭定於戲太朴既往淳風不扇天將以夫子為木鐸而大賚于生人天縱夫子以聖德而誕敷于文教不然者則禮樂墜於地憲章弛而不張忠信薄於家人其被髮左祍矣周德既衰諸侯擅命非堯舜其能以天下讓於聖人道在先天其能違天命要于冨貴故夫子屈身以行道而道濟天下邁德以立訓而訓被家邦向使夫子為有土之君南靣而治則大道洽于羣物一作動而况於人乎大化行於蠻貊而况於華夏乎夫天運之陵夷下民之昏墊若虞泉之不可晝也故夫子鬱厄於當時生人之未富一作窮世數之相變若長江之不可竭也故夫子道行乎千載觀乎有國有家者微夫子之教其何以行之哉夫子之教也修身以及家自家以形國而治道備矣是以治萬人如治其身治天下猶治其家使君君臣臣父父子子之道燦然明白若日月之照臨光于上下一作下土以一作矣是故用其大者治大用其小者治小不用而能治者未之有也且三代之主皆聖君也而猶社稷與世數存沒祀典將子孫廢興則其餘皆可得而知矣夫子官為司寇道冠百王歷萬古而彌尊與四時而並運生徒滿天下祠宇充郡國與生人終始將天地盈虛非天下之至聖孰能與於此者乎稽夫兩楹坐奠惟夫子疇昔之夜夢尊為人君惟聖主御厯之辰應之則開元叶明王之符夫子播人君之化矣大厯元祀定自尚書左司郎中試祕書少監兼此州刺史祗膺典禮式展誠敬入夫子之庭廡美聖德之形容髙堂巋然垣墉半落爼豆斯在榱桷全崩靈像頽容門人虛位乃謀及寮吏撰日增修府寮從胄子一作曹吏從龜從筮從是之曰大同敢徴良匠祗敬蕆事改造夫子及四科之像兼畫六十二子之容江鄉土卑垣墉多隙以板易竹以粉代圬廊廡庭除罔不畢葺籩豆簠簋罔不畢陳入其室若聞講誦之音升其堂如聆金石之響冀夫袁江之上將𢎞洙泗之風袁山之人能傳鄒魯之學儒行充於比屋中庸化而為俗矣非恆一作日能之也冀能者賡之述而不作識者可爾時大厯二年協洽嵗律中無射之月兼刺史蕭定記處州孔子廟記見八百四十六卷韓愈陳留郡文宣王廟記見八百四十六卷陳兼改修吳延陵季子廟記蕭定有吳之興也泰伯讓以得之有吳之衰也季子讓以失之為讓之情同而興衰之體異何哉泰伯之讓讓以賢也故周有天下而吳建國焉季子之讓賢以讓也當周德之衰而吳喪邦焉或曰非所讓而讓之使宗祀泯絶而不血食豈曰能賢斯可為知存而不知亡者矣夫治亂時也興亡運也故至一疊至字而不可却終一作往字而不可留黃河既濁阿膠無以正其色鹽池斯鹹弊􅓕一作箄不能匡其味與夫當濁亂之世召力勝之戎讓與爭孰賢乎易曰知幾其神則季子之見可謂知幾矣季子之明可謂知進退存亡而不失其正矣至於聽樂辨列國之興亡審賢知世數之存沒挂劒示不言之信避國保無欲之貞故有吳之祀寂寥而延州一作陵之饗如在𤣥風可想至德興歎美之詞哲人其萎表墓著嗚呼之篆向微德仁兩至則夫子不復虛一無此字歎焉詳其精義格一作被物鈎深致逺之㫖烏可䆒其津涯而窺其墻仭哉是知讓之為德在於生靈不獨其子孫明矣國有祀典人懷永思定忝列藩條欽崇懿範于以加敬嚴乎閟宫别閨壼之內外正衆神之序位舊以泰伯之廟在於蘇臺而制季子之祠像設東面非由典禮諒無取焉必也正名於是乎在祈報旁一作獻奠贄幣具一作宜列于軒廂春秋禮薦爼豆當陳於正寢俾觀像者識賢人之遺風可律審度者知經德之禮秩無差末學陋詞不足頌其休烈寒來暑往敢用同於記年時一有大唐二字大厯十四年嵗在巳未八月戊戌朔二十七日甲子正議大夫使持節潤州諸軍事守潤州刺史上柱國賜紫金魚袋新拜尚書户部侍郎蘭陵蕭定字梅臣記諸葛武侯廟記吕溫天厭漢德俾絶其紐羣生墜塗四海飛水武侯命世實念太集作皇極魏姦吳輕去聲未獲我心集作心膂葺集作胥宇南陽堅卧不起集作待主三顧稍晚羣雄初定必也篲掃是資鼎立變化消息謀成掌中戰龍𤣥黃再得雲雨於是右揭如天之府左提用武之國因山分力與水合勢蟠亘萬里張為龍形蜀本有亦欲二字首吞咸鎬尾束河洛翼乎中夏飛躍天衢然後魚驅勾吳東入晏海大勳未集天奪其魄至誠無忘炳在日月烈氣不散長為風雷英雄痛心六百年矣於戲以武侯之才知己託國集作付托土雖狹國以勤儉富民雖寡兵以節制强魏武既沒晉宣非敵而戎馬集作車荐駕不復中原或曰竒謀非長則斬將覆軍無虛舉矣或曰餽糧不繼則築室反耕有成算矣嘗試念之頗賾其原夫民無恆集無此字歸德以為歸撫則思虐則忘其思也不可使忘其忘也不可使思當其集無此字漢道方休哀平無政集作罪王莽乃欲憑戚寵造符命脅之以威動之以神使人忘漢終不可得也及其集無此字髙光舊德與世衰逺桓靈流毒在人骨髓武侯乃欲開興圖振絶緒六字集作開張季世興振絶緒論集作諭之以本臨之以忠使人思漢卒亦不可得也向使武侯奉先主之命告天下曰我之舉也匪私劉氏惟活元元曹氏利汝乎吾事之曹氏害汝乎吾除之俾虐魏逼從之民聳誠感動然後經武觀釁長驅義聲咸洛不足定矣奈何當至公之運而强人以私此猶力爭彼未心服勤而靡獲不亦宜乎一作哉乃知務開濟之業者未能審時定勢大順人心而克觀厥成吾不信也惜其才有餘而見未至述于遺廟以俟通識唐貞元十四年七月集有二字十五日東平吕溫記斥鼻亭神記栁宗元鼻亭神象祠也不知何自始立因而勿除完而恆新相傳且千嵗元和九蜀本作元年河東薛公由刑部郎中刺道州除穢革邪敷和于下州之罷人去亂即治變呻為謡若痿而趨集作起若矇而瞭騰踴相視歡愛克順既底于理公乃考民風披地圖得是祠駭曰象之道以為子則傲以為弟則賊君有鼻而天子之吏實代之理以惡德而專世祀殆非吾人之意哉命亟去之於是撤其屋墟其地沉其主於江公又懼楚俗之尚鬼而難諭也乃遍告于人曰吾聞鬼神不歆非類又曰淫祀無福凡天子命刺史于下非以專土疆督貨賄而已蓋將教孝悌去竒邪俾斯人惇忠睦友祗肅信讓以順于道吾之斥是祠也以明教也茍離于正雖千載之違一作逺吾得而更之况今兹乎茍為集作有不善雖異代之鬼吾得而攘之况斯人乎州人集作民既諭相與歌曰我有耉老公燠其肌我有病癃公起其羸髫童之嚚公實智之鰥寡集作孤孔艱公實遂之孰尊惡德逺矣自古孰羡淫昏俾我斯瞽千載之冥公闢其户我子洎孫延世有慕宗元時謫永州邇公之邦聞其歌詩以為古道罕用賴公而存斥一祠而二教興焉明罰行于鬼神愷悌達於蠻夷不唯止集作禁淫祀出非類而已願為記以刻山石俾知教之首溫陵黃伯光曰栁子厚斥鼻亭神記詞極嚴正至王陽明復象祠記其意又何其溫厚也蓋子厚疾象惡之深而陽明闡帝舜之大二作可互相發云文苑英華卷八百十四
