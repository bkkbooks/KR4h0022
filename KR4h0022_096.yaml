body:
  text: 文苑英華卷九十六宋李昉等編人事七麗色賦一首美人賦一首哀節婦賦一首息夫人不言賦一首陶母截髮賦一首漢武帝重見李夫人賦二首招李夫人魂賦一首勾踐進西施賦一首麗色賦富嘉譽客有鴻盤京劇者財力雄倬志圖豐茂繡轂生塵金羈照路清江可涉緑淇始度拾蘂嵗滋摘芳奇樹錦席夜陳苕華嬌春瑶臺吐鏡翠樓初映俄而世姝即國容進疑自持兮動盼目爛爛兮昭振金為叉兮十二行錦為履兮五文章聲珊珊兮佩明德一作璫意洋洋兮若有亡一作聲珊珊兮意洋洋若有得兮若有忘蹁躚兮延佇招吾人兮曲房凝釭吐暉兮明燭流注願言始勤兮四座相顧時峩峩而載笑惟見光氣之交騖夜如何其夜遲遲美人至止兮皎素絲秉明心兮無他期夜如何其夜已半美人至止兮青玉案之死矢兮無凋換既而河漢欲傾琴瑟且鳴餘弄未盡歌含韻情一作清歌含韻歌曰涉緑水兮採紅蓮水漫漫兮花田田舟容與兮白日暮桂水浮兮不可度憐彩翠於幽渚悵妖妍於早露於是覽物遷迹徘徊不懌起哀情於碧湍指盛年於光隙擊節一作輟榜浩嘆解珮嘉客是時也揚雄始壯相如未病復有鄒枚籍籍荀令咸娛座客嬉妙情灑豪翰動和聲使夫燕姬趙女衛艷陳娥東門相送上宫經過碧雲合兮金閨暮紅埃起兮綵騎多價奪十城之美聲曼獨立之歌况復坐絃酌而對瑶草當盛明而謂何美人賦上玄宗吕向帝初馳六飛之不測奄四海一作溟而作君曜明威嶷崇勳固盡善與盡美又焉得而稱云時屯既康聖躬之豫樂以和操色以怡慮豈曰帝則實惟君舉庸克推腹心增耳目燕趙鄭衛楚越巴漢之邦士農工啇皂𨽻輿臺之族不鄙褊陋不隔賤卑工技者密聞淑貌者遽知上心由是震蕩中使載以交馳周若雲布迅如飈發以日繫時以時繫月得雋相次為樂不歇闐紫微環帝座蕖華灼爍栁容婀娜輕羅隨風長縠舒蒙霧隔膚紅柔姿靡質妖艷嬌逸絶衆挺出嬛然容冶霍若明媚曼睩騰光以橫波修蛾濯色以總翠齒編貝鬢含雲顔綽約以氷雪氣芬郁而蘭薰腰珮激而成響首飾曜而騰文或纎麗婉以似羸或穠盛態而多肌有沉靜見節有語笑呈姿思若老成體類嬰兒真天子所御者非庶人當有之洎懷春暮睇晴晷列筵於林方舟於水自任縱誕相與攀倚鳥間關而共嬌花散亂而增美吹碧葉嚼紅蘂左右相視遊嬉未已見頽景之迫濛汜擕密親召近臣陳金罍與瑶席朗月垂光而射人列星奪彩長河滅津然後絲竹發越金石鏗鈜守則異器動則和鳴妙舞謂何尚以輕善歌取何矜以清齊列捷獵按次屏營間一作冏直往以曵緒歘轉入而旋縈低視候節紆體遺聲遏行雲結遺風衆工相錯迭美不同夕以闌樂亦闋醉以蕩情樂以忘節帝曰今日為娛前代固無當以共悅可得而説衆皆蹁躚離席遷延咸齊首互舉酒歌千春稱萬嵗一作夀因進曰妾家賤族陋目褊心陛下衣綺縠與羅紈飾珠翠與碧金燕私陳乎笙鼓和樂象乎瑟琴何恩渥以增極而悅愈之備深顧薄軀之無穀空負惠以難任有美一人激憤含嚬凛若秋霜肅然寒筠一作雲乃徐進而前止遂抗詞而外陳曰衆妾靣諛不可侍君之側指適背意委曲順色故毁妍而成鄙自崇謬而破直妾共處情歌五字一作妾異爾情敢對以臆若彼之來違所親離厥夫别昆弟棄舅姑戚族愧羞鄰里嗟呼一作吁氣哽咽以填塞涕流離以霑濡心絶瑶臺之表目斷層城之隅人知君命乃天不可讎尚懼盜有移國水或覆舟伊自古之亡主莫不耽此嫚遊借為元龜鑒在宗周衆以為喜妾以為憂于一作乃時天顔回移聖心感通竟夜罷寢須明導衷俾革一作華進伎樂者為薦士之官徵艷色者為聘賢之使闕下駿奔王庭麇至野無遺材山無逸人賁然偕道與物恆春若此之淑美豈同夫玉顔絳唇巧笑工嚬惑有國之君臣者哉哀節婦賦并序李華武康尉薄自牧嘗謂余曰僕有賢女適江隂尉鄒待徵徵亦良士僕志之矣鄒子孤立時無古人誰復知之余常記其言及江左之亂待徵解印竄匿其妻為盜所驅將辱之妻密以待徵官告託付村媪尋待徵付焉而後就死嗚呼自喪亂以來士女以貞烈殆斃者衆余不盡知之若薄氏者與其父遊聞其聲義動於江南又焉得不賦之命曰哀節婦賦云爾昔嵗羣盜並起橫行海浙江隂萬户化為凝血無蘭不焚無玉不折峩峩薄媛淵然明節自牧之子待徵之妻玉德蘭姿女之英兮鄒也避禍伏於榛莾婉如之嬪執為囚虜匐匍泥沙極望無覩出授官之告託垂白之姥姥感夫人爰達鄒君兵解求尸宛在江濆哀風起為連波病氣結為孤雲鳬鴈為之哀鳴日月為之蒙昏端表移景而恆直徑芳貫霜而獨存知子莫若父誠哉長者言息夫人不言賦以此人不言其義安在為韻白敏中有一人兮甚美事二夫兮深耻不咄咄以怨人常默默而傷已何窈窕兮若彼而寂寞兮如此舌雖在而口不言身未亡而心已死始其喪主失身去故從新初為息侯之婦今為楚國之嬪標二八之佳麗冠三千之等倫豈君恩之不至顧我恨之有因觸類無言似峽口為雲之女含情不語如山頭化石之人守而不改邈矣而心有所在行之實難確乎而性有所安指逝波於舊寵比浮雲於新歡得不佇蕙思於心曲祕玉聲於舌端於是語笑已而得意莫其處喧譁而不亂挺節操以自持翠羽常低多值斂眉之日瓠犀難見少逄啓齒之時然則動冝三省情順九思似慎樞機暗合吉人之象類含鋒刃潛符靜女之詩嗟夫秦家之女兮在德何有賈氏之妻兮其言亦苟誰令喋喋駐五馬而誚使君之愚焉用嘻嘻獲一雉而忘大夫之醜彼則爾此則否外結舌而內結腸先鉗心而後鉗口既而再離生育幾變寒暄想蘼蕪之不見厭芣苡之空繁勢異絲蘿徒新婚而非偶華如桃李雖結子而無言及夫雲夢初春一作春遊章華夜侍永忘一顧之念難奪三緘之志起居有節惟聞珮玉之聲應對無詞不吐如蘭之氣君王於是崇其意重其義命女史以書之為楚宫之故事陶母截髮賦以賔至情極無惜傷毁為韻浩虛舟陶家客至兮方此居貧母氏心耻兮思無饌賔斷鬢髮以將貿庶珍羞而具陳欲明理內之心不求盡飾庶使趨庭之子得以親仁原夫蘭客方來蕙心斯至顧巾槖而無取俯柸盤而內愧啜菽飲水念雞黍而何求捨已從人雖髮膚而可棄於是搔首心亂低眉恨生畏東閭之恩薄歸北堂而計成拂撮凝睇抽簪注情解髮而鳳髻花折發匣而金刀刃鳴喜乃有餘慙無所極窺在握而錯落撫垂領而綢直鋒鋩不礙翻似雪之孤光倭墮徐分散如雲之翠色已而展轉增思低徊向隅玄鬢垂顱而散亂青絲委簟而盤紆象櫛重理蘭膏舊濡傷翠鳯之全棄駭盤龍之半無觀夫擢乃無遺斂之斯積凝光而粉黛難染盈握而腥羶是易將成特逹之意欲厚非常之客賔筵既備空思一飯以無慙匣鏡重窺豈念同心而可惜及乎宴罷空館間成曉粧纚換新髻叉迷舊行誠伐木之可親疏而是愧苟如圭之足慕斷亦何傷重義者情莫違厚慈者身可毁語其決同勉虞之一戰思其仁逾訓孟之三徙昔咸曰陶氏所以成大名母賢如此漢武帝重見李夫人賦以求諸異術再見真形為韻陳山甫昔漢武帝喪李夫人歎妍婉兮不返悲繐帳兮空陳於是詔祕籙之方士致平生之幻身來其迹於虛無一作空虛初驚有像察其儀之婉麗已訝如真時也齋心月殿屬目蘭室佛髣煙光飄颻蕙質修蛾再覩不俟返魂之香逝水潛回詎假長生之術原夫恍惚之際從容視諸想車塵於霧眇疑珮響於風餘峩峩兮稍辨雲鬢冉冉兮漸識綃裾洛水之靈非匹巫山之夢不如所謂神仙之事變化之異過隙之光已無傾國之容再媚悲睿旨於凝聽悼皇情於􅌓睇恍兮有望知感召之多方倐爾員來訝生死之殊致當其椒風向夕蕙露盈庭謂已從於雲雨終不間於幽冥寂寞瑶階永謝虛無之迹凄涼月幌猶分似是之形若往還留心迷目眩誠君恩之再造異術足徴豈風燭之重燃真形可見固可以辨其妄輟其求去清懷之惑志釋玄思之殷憂擾擾紛紛意真靈之如在薰歇燼滅竟荒塵之不留其來也形之如寄其往也生之若浮於是望斷驚鴻悲深解珮向窈窕而乍失顧容華而不昧由是而言可以知生之不再第二以神仙異術變化通靈為韻康僚漢武帝諸宫此夫人兮恩意難同悲艷質以長逝恨深情之莫通夢想徒勞寧及九泉之下神仙有術能生一夕之中帝乃暫釋幽懷將觀異變儼宸儀於玉座張翠幄於蘭殿清風拂户疑髣佛以徐來皎月臨軒尚朦朧而未見且其駐視潛聽虔思效靈燎金爐之馥馥燦銀燭以熒熒寂寞而求瞥爾而風生綺席從容以俟俄然而影在花屏於時漸出形儀暗聞珠翠初半靣以呈姿忽全身而表異盈盈不笑如羞久别之容眷眷無言莫問平生之事是則嬋娟可玩隱映難親不有如有非真似真既揚翹而掩袂亦流盼以凝神翡翠簾前悵望三千之女芙蓉帳裏分明二八之人况乎麗服逾春美顔多暇揚襜如之羅綺飄藹若之蘭麝非因不死之藥豈便長生何用返魂之香自從神化及夫弄花態以遺妍望君王兮不前復認吹笙之侣終疑獻果之仙目眄眄以徒極心搖搖而詎傳迷甚化宫周穆之遊固爾地非巫峽楚襄之夢應然已而頓解前思詳窺舊質爰將託方士展神術謂傾城之且驗豈同輦之無日殊不知事本憑虛功難責實夜如何其夜已闌悵飄然而復失招李夫人魂賦以所思逝魂傷春榮落為韻謝觀李夫人月墜香焚花沉九原繁華委地零落何言有少翁兮術通神鬼為漢帝兮夜致精魂於是詔未央之宫備通靈之所五位之壇雜立九奏之音克序珠籠翠幰龍師虎旅銀燭之煌煌次列金管之愔愔慢舉帝乃坐中寢御纎幃森羽衛儼天師佩符籙以威重拂香花而步遲左止簫韶之奏右啓甲乙之旗搢霜圭而斂色執紅旌而盡思立北斗星文之下當中壇月午之時萬籟寂寥發清音於漢殿九天空濶寫招魂於楚詞詞曰白玉潔兮紅蘭芳忽玉折兮蘭已傷魂兮勿復逰他方盍歸來兮慰我皇又曰彩雲裾兮流霞袂倐而來兮忽而逝魂兮勿復遊四裔歸來兮膺萬嵗已而愴恨沾巾凄涼侍臣窸窣而房櫳變色熒煌而户牖生春如花如扇開覩恍惚之中韋非煙非霧卷見希夷之外人珠璫瓊珮鬒髮絳唇髣佛平生之貌依稀歌舞之身顧步嬋娟回翔綽約似發言而尚默若將前而復却於時斜漢將傾繁奏爰作琳琅璀璨綺羅回薄風凄雨切忽消散於杳冥鳯去鸞歸空珠翠之寥落自是妖妄日恣虛無念作侮萬乘為脫屣陋百載之浮榮幸河海之無事賴干戈之暫平不然少翁此夕豈宜一拜於文成勾踐進西施賦以紅顔艷色返以昏哉為韻徐寅惑人之心兮惟巧惟僭破人之國兮以妖以艷當勾踐之密謀進西施而果驗昔者二國相吞陵卑恃尊殊不知卑則自亡而固存尊則謂明而返昏烏喙年年誓啄夫差之肉稽山日日拜聽范蠡之言言曰伍員之賢東吳之德伯嚭之佞東吳之賊德之盛兮越可憂賊之興兮吳可殛臣以夙夜而計機謀偶得欲狂敵國之君須中傾城之色待其聲色內伐君臣外惑自然紂妲己以亡宗晉驪姬而亂國今苧蘿之山越水之灣恐是神仙之化忽生桃李之顔波淺丹臉鴉深緑鬟顰翠黛兮慘難效浣輕紗兮妖且間楊栁羞弱芙蓉愧殷可以變栁惠於貞莊之際悅荆王於魂夢之間臣請進焉王今何以王乃豁若而喜矍然而起曰此蓋神假卿之奇畫天雪越之前耻乃命寶馬騰龍香車輾風迎織女於銀漢聘姮娥於月宫炫耀雲外喧闐洞中粧成而瑞玉凝彩服麗而朝霞剪紅昨日猶賤今晨不同寧期大國之君流恩下及堪恨鄰家之婦謂妾常窮曉别越溪暮歸吳苑越慮計失吳嫌進晚歌一聲兮君魄醉笑百媚兮君心卷坐令佞口因珠翠以興言立遣謀臣棄洪濤而不返勾踐乃走電驅雷星馳箭催投醪而士卒皆醉嘗膽而胸襟洞開虎噬骨碎山崩卵摧楚腰衛鬢化為鬼鳯閣龍樓燒作灰於是命屠蘇之酒上姑蘇之臺伊霸業以何去俄英風而聿來於戲殺忠賢而受佳麗欲不敗而難哉文苑英華卷九十六
