body:
  text: 文苑英華卷一百十三宋李昉等編服章三衣錦褧衣賦一首西域獻吉光裘賦一首狐白裘賦一首千金裘賦一首授衣賦三首履賦一首豹舄賦三首衣錦褧衣賦以君子之道暗然日章為韻李程君子製服兮損益以時秉衣錦之特麗必尚褧以相資欲曵婁以成飾故威儀而可持異彼佩環有以文為貴者同夫絺綌必特表而出之察其所以亦將有㫖願無伐善俾其藴美衛詩既作且賦於碩人之篇匪服是加則嗤乎彼其一作己之子異狐裘而羔袖比緑衣而黃裏䝉纎縞而不隔籠渥彩之可擬倣佛兮若豹姿之藏霧隱映兮似珠光之透水徒有美於爛然孰可詳其蔚矣故服之無斁終然允臧當褒一作斐然而入用懼學製以見傷知我者謂我隱蔽文章不知我者謂我顛倒衣裳曽不念順之則理灼疑作的然而亡自類韜光不耀孰云欲蓋而彰比乎繪事後素勿矜為寶不有外者何以混其色不有內者何以蓄其藻雅符含章之德不愆盡飾之道服玩疑美矣人亦冝然等誠明之道合同出處之義全亦由猶由通用潔矩之士窮而不濫藴貞明體恬淡昔有喻於讒口何以自明今不衣而夜行寧惟逮暗是知大象既分先質後文德為道用靜為躁君不衒昭質退藏於密匪同龎服之竒自契黃中之吉彼無褐空念於卒嵗此一作比成章不俟兮終日未若賦衣錦之褧衣為終身之自律西域獻吉光裘賦以水火驗之稱異為韻獨孤授邈矣外區實生珍異彼靈獸之則獲製良裘之斯至聖王之所未覩獻令之所莫備叶朝宗則來自金方應中國而色當土位意者以烈風之靡興溟海之清澄德動天而遐方內向氣入翼而貢獻足徴方啓襲以進語如執輕之不勝颯然舜風翠雲之光可奮籠夫堯日青鳳之煥徒稱故其背崑崙踰弱水重九譯越萬里豈殊俗之所貴信希代之為美直千金者更輕稱狐白者非擬雖沈以天沼無易暵其之性燎以京薪二字見西京賦獨異焚如之理斯乃動聽驚視孰知其然者矣夫物有難測必思之而不厭事有詭常亦推之而可驗何異績鼠毛以為布引龍鬚以成絲浣於火而自若弦於弓而有之况能禦寒凉以效用衣一作因裼襲以呈姿司服以登備皇儀而飾朝禮至尊爰御光紫極而耀丹墀遂使越人捧翟以求退王母取環而請辭羣公乃拜手而稱曰休哉聖君之緝熙且天地不愛其寶豈戎夷敢愛其私乎將念委裘之有實防侈服之生禍表微於君子小人酌義於夏山殷火俾萬物之咸格其德風之在我於是天子曰俞彼則獻其琛曷若獻其可狐白裘賦以珍裘非一腋為韻陶翰邈哉瑞獸生乎青丘資挾溫以流潤得頤素而成裘故鎮毫錯毳匪剛斯柔象羣哲以濟美較一作軼千年而取優配華玩於車服曜珍竒於貴游殷祀典以崇賁飾一作昭禮容而克修暨夫秋沉金氣冬舉𤣥律進卿相之門登王侯之室寒祛溫薦恩纒好密任藏用以卷舒委凉暄以升黜將綌衣以遞御與紈扇而更出苟人事之宜然諒廢興之共一嘉其全真定色育精含徽千金振價衆服騰輝朝臨皓雪且狀乎寒披鶴氅曉安朱架又象乎髙懸玉衣雖質文之可别蓋貴賤而同歸故崇侈者取貴而尚戒奢者含貞以非矧乎從損而益工兼素腋德之攸親豈惟物新晏嬰相齊以推弊孟嘗獻秦而獲珍貞休利乎蕃藩蕃通用玦悔吝生乎妄人儻茲道之無替遮遺芳於後塵千金裘賦雍陶良冶之子兮不墜舊規製珍裘兮巧意無遺非一狐之成此直千金而在茲蓋以表盛服之麗者舉髙價而美之儻以負芻如當市骨之日如將貰酒偏冝買笑之時如疑其選擇亦求粹白資衆毛取羣腋極貍製之狀殊豹飾之跡俾裼襲之有加欲曵婁而無斁紉針既就振領提裳一作生光乍掩孔雀全欺鷫鸘有斯而死不於市衣此而坐不垂堂何必獻武帝之時人來西域受平公之處鳥下東方宜乎在笥見珍滿籯非貴將示美以爰御豈救寒而乃衣時彰節用乃三十年而尚存俗竟疑奢妍乃十萬軍之所費觀其皓練漸潔輕埃莫霑中幣之酬猶少外飾之態俄添日影遙臨豈見犬羊之易雪華傍射自冝狐貉之兼爾乃取而諷論其衆亦猶多士補於衮職羣材搆於時棟豈比夫告弊於黑貂誇煥於青鳳然則乖惡衣之義生侈服之心既傷三德之數徒稱千鎰之金所以披鶴氅於王恭獨標耿潔焚雉頭於晉帝用戒奢淫况乎衣褐可以備卒嵗挾纊足以禦寒夜何勞寶劒侔資豈要驪珠同價委此䝉茸之資被乎勤儉之化使狗盜之人盡息其偷詐授衣賦以霜降此時女工云就為韻李子卿九月肅霜山靜風落天髙氣凉蟋蟀入兮堂户近鴻鴈飛兮天路長欲備嵗之無衣無褐始禦冬而載𤣥載黃命婦女事為公子裳若乃田畯入室居人在巷警殺氣之秋殞切嚴霜其夜降物藏于時人感于是雖懷有稔而及節亦念無衣而在此績我絲麻具爾紈綺將備服之纁素豈徒事夫紅紫則知王者之德聖人之思禮法在矣古今以之事陳王業功當天時澤及周王之道歌得豳人之詩既而滌場穹窒熏鼠乘其農間以入室處爰邀載績之功始命縫裳之女摻摻柔腕札札鳴杼天寒夜靜既閲西鄰之光月明更深齊度南軒之杵夫如是事合其制禮亦有序物嚮政方人知義所將前規不昧故斯事必舉資爾績而卒嵗是裳授余衣而窮冬可禦方今四隩既宅九州攸同人悅物茂時和年豐男勤耕於稼穡女務績於蠶工雖悅當今之化亦由行古之風於是彼其一作己之子各稱其服此生之物咸得其羣念彼及此務穡勸分雖非後作抑有前云豈上帝之思疑我實下人之戴君客有聞而歌曰天之髙兮無不覆君之大兮無不祐生人殖物既庶且富爾在疑于時爾茅于晝霜始降兮女工就嵗時窮兮寒衣授第二同前韻張何惟改嵗之𢎞典爰授衣於肅霜稽月令之前制得豳詩之首章夫其損益從時取其觀古人象𤣥黃既績可以為公子裳促機上之寒杼發桑間之懿筐零露既漙申一作肅霜夕降聚於燎火無資於借人勸其功傭俾率於同巷爾其孰質素黜華靡翔疑葛履之儉嗇笑麻衣之浮侈裂素之潔既無取於流黃我朱孔陽復何為乎惡紫裘狐狸一作苟狸製之可識諒羔羊之在此且德惟稱服道在隨時惜光隂之暮矣恐絺綌之凄其㑹斯蠶績取彼狐狸既申之以雜佩又組之以素絲信物之美者惟君子冝之借如輕裘被服之客纎手縫裳之女晝剪綺紈夜調砧杵微芳發素袖舉絲兮衣兮爰笑爰語莫不遵向晦以宴息樂盛隂之室處於戲聖實作則皇惟降衷禮章度數服制卑崇鑒羔袖之非類慎鷸冠之不衷一作中豈可凜疑作褎然充耳不念女工俾僣亂以陵上興怨言於大東而已是以帶裳表儉黻冕昭文襲緇衣之改造追補衮之清芬故能宜象服集疑𤣥纁將菲薄以為寶豈浮奢之足云有守道固窮至圗未就卒嵗無褐憂心如疚四時迭運竊獨悲此凜秋萬物有託子何為乎巗岫空負悲哉之感徒為哿矣之富儻有彈冠之期不念一作忘綈袍之舊第三以霜風轉厲逰子未歸為韻周存二儀斡化兮四運環周大火中而退暑白露絃而成秋𤣥鳥去巢望雲海以幽蟄旅雁違漠指烟江而遨遊農事云就婦功聿修感蟲鳴之促織念客恨之衣裘慮之云誰彼姝者子㺯機杼以成績秉刀尺以循理揣其修短運纎手以俱營善乃規模敏惠心而獨揆爾其上下有序度量有常咸循故以取制豈崇異而違方隨貴賤以合則處𤣥素而有章伊四人之所授必九月之降霜彼美衣工獻華服之楚楚彼都人士被狐裘之黃黃清霜既降商飇亦厲衰草萎庭墜葉流砌氣蕭瑟以增冷天泬寥而澄霽雖人將入室知所以戒寒而時或無衣則何以卒嵗是乃背豳風者無備遵月令者有繼也若乃白日向昏愁雲四展歸鳥時聚斷蓬孤轉風生虛室之寒服念輕裘之善則晏平仲悔纍年之未易桓謂冲也或作趙非將軍授新衣而不遣也爰有别江山之墨客遊他鄉而未歸驚嵗序之云暮恨籌謀之尚違矧夫搖落秋聲凄切霜氣巡階除而不樂撫心曲而誰謂且士有知己而我獨無人皆授衣而我獨未因感時而增歎聊作歌以自慰歌曰愁疑作秋霜落兮嵗已終秋雁吟兮悲逺空短褐不完兮憂思充庭樹蕭蕭兮冷暮風履賦趙良器朝廷兮赫曦冠劒兮逶迤惟斯履之所用得禮容之威儀綴珠綦以崇飾遵玉趾而更移其始造也佳人運思女工妙選爰斯功之始畢出閒庭之試踐眇輕步以相矜指竒文而爭衒若乃相國承寵尚書見榮歷彤階而曵響上玉殿而規行出羣標竒則簷前燕落入朝表異則雲際鳬驚運蓍絲以示儉躡瓜田而見明時行則行時止則止潔其容色固其表裏偶簮裾未以為榮踐泥沙而以為恥其義翼翼其貌雍雍曵踵則輪軌不斷接武則塵迹相重其取進也每迎前以啓路其守謙也常處下而翹容其受用也既虛中以待物其順人也亦應時而曲從是以加其絲飾廣其文繡所以表威儀光領袖宗廟祭祀非履不行揖讓周旋捨履何就易履者禮也吾謂斯文之不謬豹舄賦以兩遍用四聲為韻錢起麗哉豹舄文彩彬彬豹則雕虎齊價舄與君子同身故得飛聲入楚見賜留秦曩者胡為隱霧而不下今復何幸對雪而迎賔蓋因虞者之獲成於匠者之手苟當時以為用雖殺身而何有于以理疑之美且無度既居下以禦濕亦迎前而唘路花映香塵光生玉步借使登朝廷列臺閣規矩不改㑹同自若投其迹必陟鴛鷺之行取其文不改犬羊之鞟詩人歌其事春秋美其名捨則止用則行逗逈一作向齊飛遙分鄴令之術入朝曵響近雜尚書之聲彼糾糾葛屨珊珊珠履一則固窮一則僭起制度首出憲章俱美嘗試談論其兹舄而已士或覽之而言曰象以齒而焚龜以骨而斃况之豹也憑巖穴以逞欲以爪牙而自衛而有用於人竟以皮而戾一朝寢處成此新偉夫斑文散煥毳毛䝉密映鶴氅以迎一作凝暉臨翠被以曜質於斯時也不可談悉亦有刻意未參卑秩東郭之曵履長穿王生之結襪何日思蔚然而一變歌豹舄以自畢第二同前韻前人豹可為兮鬱矣其文材賈害兮用之楚君用之則那為舄几几雖工興其飾亦天鍾厥美奢以則之衆目所視異哉惟雜爾巧有詭其制也青葱掩其真赤繶慙其麗動容而彩射金屋舉趾而聲傳玉砌諒服玩之惟竒知侈靡之無藝徴夫至理也匪威儀不忒匪古訓是則甚葛屨之失禮同鷸冠之敗德何役智以宣驕乃自躬而刑國噫先王立極念兹在兹服有常度行無越思何爾舄之豹飾雜珠綺與文狸若昭其泰一作奉無乃簡彛是舄也君子歎之觀乎異狀斑然後疑周蹙霞起煥爾文質當其踐履知我者謂我惡居下流不知我者謂我親承玉趾則知物有所歸天之冥數惟豹作舄殺身思遇惜其有美而來亦以禦寒之故雖雨雪而盈尺俾陽和而在步不然者寧踐於斯路客有感而言其文也何麗其用也何薄當卑步武之間徒異犬羊之鞟飾被已慙於翡翠為裘更羡於狐貉别南山之霧以奉進趨同鄴縣之鳬願翔寥廓第三同前韻謝良輔惟茲舄兮稱珍受異質而彬彬其文也合變於君子其用也見美於詩人伊昔大匠未知含章可久棲止隱霧或羣或友且申威以肅殺寧畏險而鋌走豈知獻狀於獠者之身入用於屨人之手敏手既至光華增媚兩美必合一朝成器信常功之嘉猷為盡飾之美利苟賞善之在我甘殺身而不懟曲直裁成威儀可覿若向也獸而今也舄諸侯所重楚子之翠被有光王者攸宜周官之赤繶無斁左之右之乍合乍離每唯命以進退將有翼於威儀擇地而行豈慮泥塗之辱有道則至尚懷文彩之竒故尚書之曵履聲則有音中郎之倒屣義亦為美雖惜疑足以同方豈能文而可紀則知隨時應物順人合度克通夫莫往莫來實怪於規行矩步滯阜鄉之自惜飛鄴縣之可慕願賔上國之階墀兾吾君之一顧夫材俟時而進用時俟一作須材以求素彼微獸之有章亦飾躬而制作慕公孫之几几恥滑稽以交錯幸參鵷鸞之行無雜犬羊之鞟若然者則荷夫天衢之亨對斯文而不作文苑英華卷一百十三
