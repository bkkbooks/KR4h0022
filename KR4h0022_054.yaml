body:
  text: 文苑英華卷五十四宋李昉等編禋祀一南郊賦一首進三大禮賦表朝獻太清宫賦朝享太廟賦有事於南郊賦南郊賦徐彦伯維帝唐八十有五載鴻徽鑠於縣㝢騰陽精握機矩還攝提以産氣配神明而作主倬四后之在天伊萬物之胥覩左日壑右星圃吹烈火於炎丘覿堅氷於委羽莫不匍匐我聲教駿奔我珪組納大荒之管鑰伏堪輿之扄户兹可以孩黔羸扶盤古苞混茫而首出亦奚云於三五哉於穆我皇纂戎而昌青氣摇社白雲入房與天地合契與日月齊光杖太一敺羣剛共工戮兮河嶽正旬始㓕一作三苖格兮星辰張輯稽古之禮物懸象外之舊章雖配天復禹繼一作那嗣興湯者不其恧歟肇允神聖浸發葆命芬徳馨香崇庸祗敬吟蓼蕭以㳺渥合枲一作台桑而藴正關石龢鈞飛沉翔泳擇明居之全法撰蒼渠之闕令則太階平而玉衡正也庶績洪凝賡歌浩作隂隲于下有孚顒若恢負勝之圖賁昭功之籥是以𤣥龜逰乎湍瀬丹鳥吟于觀閣芝房菌蠢而玉英景雲璀璨而金蕚雙觡共觝一作抵之獸躑躅苑山一稃二米之穎紛拏畎壑邦誦中龢甿歌小毖嵗合作噩日交長至遘朔旦之明期擇純陽之正地欲陳大旅展時事告紫宙之成功定皇天之寳位蜃鷩司典鳲鳩蕆職崇泰壇考星翼畫八卦以通道錯五行而辨域對越精祗森羅正直木巽火而殷薦豫乗雷以罔極載師清野土訓掃㕓繚垣虹合參途電聨籠組帷以艾景覆皇邸以慶煙宫伯糾其禁内饔烹其鱻周廬攢搆以戢孴列纛抗莖而翩綿繩繩都人濟濟多士九牧之守百蠻之子莫不絜一作挈鴈提羔攢驂一作酸噎軌紛鴻溶以騰逗叛遹皇而佁儗或駢肩而側足候吾君之戾止若葵藿之傾離光同江河之赴溟水也然後啟端門警仙蹕雙鳳矯首六龍齊膝青斾罥雲紅旌彗日鏘玉鸞之鳴轙按金雞之廣術傳畫角以啾嘈曳朱旗一作羊以駢坒蒲必切見吴都賦呵風伯令戒道制𤣥𡨕使司律此靈祗所以保綏皇天所以宥宻於是闢龍次幸蜺幬鶉鳥司㐮熊羆奉收皇帝乃彰畫黻襲大裘端玉珽肅珠旒翼翼穆穆遂臻于圜丘躬孝享擁神休設天宗之六席援長發之二球盥以明水薦以香羞陳蒼璧而咸事藉白茅而闡幽絜騂旄之泔淡酌𤣥瓉之觩䚧盛哉神疑作坤言后亞献極順天而見邸乳祥開曽沙業薦赫禮數於彤壼布徽音於紫縣率先於金簿之蠶謹覆以瑶筐之鷰皇后介禮恭兹亞奠凝億兆之歡心注穹蒼之景盻紫微開兮天香滿神之來兮軒星纂候黄鐘兮雪飛調大吕兮風暖戞雲和之寳瑟吟孤竹之清管石麟夭矯團翠煙而上征𬎼鳳沕霍迓鴻釐之無筭瑞氣蜿蜒於藪甸祥光熠爚於旄䍐三觶終獻萬祗呈醺昇羽節導靈羣凝肆夏以青晷颺登歌而咽雲徽鸞鷖之颯沓致戩榖之絪緼禮畢功成天旋日轉宸儀允穆后庸胥展引大火之流旂迴夷庚之翠輦倪三蠻見甘泉賦之崇構御六氣之遥辨覽太元之神䇿張集靈之瑞典草木亨兮雷雨􅗈霈湛恩灑兮雲霄霮䨴夀觴霞舉兮絲竹龢筐篚岳立兮駢嵳峩天子方合符於大庭之國錯事以梁父之阿岱崱嶷兮清嶂汶泓澄兮紫波屯千轂以霆轉整萬轡而星羅則述易象者獻風行之繇談比興者奏時邁之歌蕩蕩乎巍巍乎無得而名言矣遂作頌曰煌煌靈臺告成功兮我君孝享亞坤宫兮純嘏布濩延皇穹兮惟策代表靄升中兮享夀千億傳無窮兮進三大禮賦表天寳十三載杜甫臣甫言臣生長陛下淳樸之俗行四十載矣與麋鹿同羣而處浪跡於陛下豐草長林實自弱冠之年矣豈九州牧伯不嵗貢豪傑於外豈陛下明詔不側席思賢於中哉臣之愚頑静無所處以此知分沈埋盛時不敢依違不敢激訴一有黙字以漁樵之樂自遣而已頃者賣藥都市寄食友朋竊慕堯翁擊壌之謳適遇國家郊廟之禮不覺手足蹈舞形於篇章潄吮甘液游泳和氣聲韻寖廣卷軸斯存抑亦古詩之流希乎述者之意然詞理野質終不足以拂天聽之崇髙配史籍以永乆恐倐先狗馬遺恨九原謹稽首投延恩匭獻上納三字一作獻納上表進明主朝獻太清宫朝享太廟有事于南郊等三賦以聞臣甫誠惶誠恐頓首頓首謹言朝獻太清宫賦冬十有一月天子既納處士之議承漢繼周革弊用古勒崇揚休明年孟陬將攄大禮以相籍越彛倫而莫儔歴良辰而戒吉分祀事而孔修營室主夫宗廟乗輿備乎冕裘甲子王以昧爽春寒薄而清浮虚閶闔逗蚩尤張猛馬出騰虬捎熒惑堕汀火反旄頭風伯扶道雷公挾舟一作輈通天台之雙闕警溟漲之十洲浩刼礨砢萬山一作仙颼飀歘臻於一作乎長樂之舎嵬入乎崑崙之丘太一奉引庖犧在一作左右堯歩舜趨禹馳湯驟鬱曾一作閟宫之嵂崒拆元氣以經構斷紫雲而扞一作竦牆撫流沙而承霤紛隳珠而䧟一作隐碧㸌波錦而浪繡森青㝠而欲雨赩色一作光炯而初晝於是翠𬎼俄的藻藉舒就祝融擲火以焚香溪女捧壺一作盤而盥潄羣有司之望幸辨名物之難究瓊漿自間於粢盛羽客先来于介胄爍皇祖之儲祉敬雲孫而及此詔軒轅使合符敕王喬以視履積昭感於嗣續匪正辭於祝史君一作若肸蠁之有慿肅風飇而乍起揚流蘇於浮柱金英霏而披靡擬雜佩於曾巔孔一作芝盖欹以颯纚中漎漎以迴復外蕭蕭而未已上穆然注道為身覺天傾耳陳僣號於五代復戰國於千祀曰嗚呼昔蒼生纒孟徳之禍為仲逹所愚鑿齒其俗窫窳其孤赤烏髙飛不肯止其屋黄龍哮吼不肯負其圖伊神器臬兀而小人呴喻厯紀大破瘡痍未蘇尚攫拏於吴蜀又顛躓於西胡縱羣䧺之發憤誰一統於亨衢在拓䟦與宇文豈風塵之不雜一作殊比聦廆及堅特渾貔豹而齊驅愁隂鬼嘯落日梟呼各擁兵甲俱稱國都且耕且戰何有何無維累聖之徽典恭淑慎以允緝兹火土之相生非符䜟之備及煬帝終暴叔寳初襲編簡尚新義旗爰入既清國難方覩家給竊以為數子自誣敢貞乎五行攸執而觀者潜悟或喜至於泣矧鱗介一有以字之鳴虡一作簴昆蚑以一有之字振蟄感而遂通罔不具集仡神光而􅛦閜一作閍羅詭異以戢孴地軸傾而融曳洞宫儼以嶷岌九天之雲下垂四海之水皆立鳳鳥威遲而不去鯨魚屈矯以相吸掃太始之含靈卷殊形而可挹則有虹蜺為鈎帶者入自於東揭莽蒼履崆峒素髪漠漠至精濃濃條弛張於巨細覬披寫於心胸蓋脩竿無隙而仄席已容裂手中之黒簿睨堂下之金鍾得非擬斯人於夀域明返樸於𤣥蹤忽翳日而翻萬象却浮雲一作空而留六龍咸讋跖而壮兹應終蒼黄而昧所從上猶色若不足處之彌恭天師張道陵一有等字洎左𤣥君者一有前字千二百官吏謁而進曰今王巨唐帝之苖裔坤之紀綱土配君服宫尊臣商起數一作數起得統特立中央且大樂在懸黄鍾冠八音之首太昊斯啓青陸獻千春之祥曠哉勤力耳目冝乎大帶斧裳故風后孔甲充其佐山稽岐伯翼其傍至於易制取法足以朝登五帝夕宿三皇信周武之多幸存一作好漢祖之自强且近朝之濫吹仍改卜乎祠堂初降素車終勤恤其後有客白馬固漂淪不忘伊庶人得議實邦家之光臣道陵等試本之於青簡探之以縹囊列聖有差夫子聞斯於老氏好問自乆宰我同科於季康敢一作取撥亂反正乃止一作此其所長萬神開八駿迴旗掩月車畜雷騫七曜燭九垓能事頴脱清光大來或曰今太平之人莫不優㳺以自得况是蹴魏踏晉批周抉隋之後興乎更始者也一作哉凡一作皆集本朝享太廟賦初髙祖太宗之櫛風沐雨勞身焦思用黄鉞白旄者五年而天下始一歴三朝而戮力今庶績之大備上方采厖俗之謡稽正統之類盖王者盛事臣聞之於里曰昔武徳已前黔黎蕭條無復生意遭鯨鯢之蕩汨荒嵗月而沸渭衮服紛紛朝廷多閏者仍亘乎晉魏臣竊以自赤精之衰歇曠千載而無真人及黄圖之經綸息五行而歸厚地則知至數不可以久缺凡材不可以長寄故髙下相形而尊卑心一作各又作必異惟神斷繫之於是本先帝取之以義壬辰既格於道祖乗輿即以是日致齋於九室所以昭達孝之誠所以明繼天之質具禮有素六官咸秩大輅毎出或黎元不知豐年即一作則多而筐筥甚實既而太尉叅乗司僕扈蹕望重闉以肅恭順法駕之徐疾公卿淳古士卒精一黕一作黙宗廟之逾深抵職司之所宻宿翠華於外戸曙黄屋於通術氣凄凄於前旒光靡靡而嘉栗階有賓阼帳有甲乙升降之際見玉柱生芝擊拊之初覺鈞天合律筍􅒶仡以碣磍干戚宛而婆娑鞉鼓塤篪為之主鐘磬竽瑟以之和雲門咸池取之至空桑孤竹貴之多八音循一作脩通既比乎旭日昇而氛埃滅萬舞陵亂又似乎春風壮而江海波鳥不敢飛而𤣥甲􅝧嵺以岳峙象不敢去而鳴佩剡􅀈一作爚以星羅已而上乾豆以登歌美休成之既饗璧玉儲精以稠疊門欄洞豁一作洞壑又作洞豁而森爽黒帝歸寒而激昻蒼靈戒曉而来往熈事莽而充塞羣心麌以振蕩桐花未吐孫枝之鸞鳳相鮮雲氣何多宫井之蛟龍亂上若夫生𢎞佐命之道死配貴神之列則殷劉房魏之勲是可以中摩伊吕上冠䕫卨代天之工為人之傑丹青滿地松竹髙節自唐興以来若此時哲皆朝有數四名垂卓絶向不遇撥亂返正之王君臣父子之别音别分之别奕葉文武之䧺注意生靈之切雖前輩之溫良寛大豪俊果决曽何以措其筋力與韜鈐載其刀筆與喉舌使祭則與食則血若斯之盛而已爾迺直于主索于祊警幽全之物散純道之情一作精蓋我后常用惟時克貞膋以蕭合酌以茅明嘏以慈告祝以孝成故天意張皇不能殘一作殄其瑞神姧妥帖不敢秘其精而無一作撫絶軌享鴻名者一有矣字于以奏永安于以奏王夏福穣穣於絳闕芳菲菲於玉斚舜祠宗廟以玉斚沛枯骨而破聾盲施殀胎而逮鰥寡園陵動色躍在藻之泉魚弓劍皆鳴汗鑄金之風馬霜露堪吸禎祥可把曾宫歔欷隂事儼雅薄清輝於鼎湖之山静餘響於蒼梧之野上窅然漠漠惕然兢兢紛益所慕若不自勝瞰牙旗而獨立吟翠駮而未乗五老侍祠而情一作精駭千官逖聽而思凝於是二丞相進曰陛下應道而作惟天與能澆訛散淳朴登尚猶日慎業業孝思烝烝恐一物之失所懼先王之咎徵如此之勤恤匪懈是百姓何以報夫元首在臣等何以充其股肱且如周宣之教親不暇漢武之滛祀相仍諸侯敢於迫脅方士奮其威稜一則以㣲弱内侮三字一作言勸内一則以輕舉虚一作飛馮又非陛下之一無之字恢廓緒業其𤨏細亦曷足稱丞相退上跼天蹐地授綏登車伊澒一作鴻洞槍櫐皆一作先出為儲胥本枝根株乎萬代睿想經緯乎六虚甲午一有方字有事於采一作綵壇紺席宿夫行所如初凡一作皆集本有事于南郊賦蓋主上兆於南郊聿懐多福者舊矣今兹練時日就陽位之美又所以厚祖考通神明而已職在宗伯首崇禋祀先是春官修一作條頌祗之書獻祭天之紀令泰龜而不昧俟萬事之將履掌次銳一作閲氊邸之則封人考壝宫之㫖司門轉致乎牲牢之繫小胥専逹乎懸位之使二之日朝廟之禮既畢天子蒼然視於無形澹然若有所聽又齋心於宿設將旰食而匪寜旌門坡陁以前騖彀騎反覆以相經頡一作頓曽城之軋軋軼萬方一作户之熒熒馳道端而如砥浴日上而如萍掣一作製翠旄於華蓋之角彗黄屋於鈎陳之星神仙戍削以落羽魑魅一作魍魉幽憂以固扄戰岐慄華擺渭掉涇地囬囬而風淅淅天泱泱而氣清清一作青青甲胄乗陵轉迅雷於荆門巫峽玉帛清逈霽夕雨於瀟湘洞庭於是乗輿霈然乃作一有翳字夫鸞鳳將至以冲融寥廓不可乎彌度聲明通於純粹溟涬為之垠堮駟蒼螭而蜿蜒若無骨以柔順奔烏獲之黝蟉徒有勢於殺縛朱輪竟野而杳冥金鋄范萬切見西京賦成隂以結絡吹堪輿以軒輊槍寒暑以前却中營宻擁乎太陽宸眷眇臨乎長薄熊羆彌周禮小祝彌兵用此彌字耳以相䑛虎豹髙跳以虚攫上方將降帷宫之綝縭屏玉車犬以蠼畧二字見甘泉賦人門行馬以拱乎合沓之壇一作塲皮弁大裘始進於穹崇之幕衝牙鏗鏘以將暮一作集周衞轇轕而咸若月窟黒而扶桑寒田燭稠而曉河一作星落肅定位以告絜藹嚴上而清超雲菡蓞以張盖春葳𬎼以建杓簮裾斐斐罇爼蕭蕭方面曲折周旋寂寥必本於天王宫與夜明祭法王官祭日夜明祭月相射動而之地山林與川谷俱標於是乎官有御事有職所以敬鬼神所以勤稼穡所以報本返始所以度長立極𤣥酒明水之上越席䟽布之側必取先於稲秫麴糵之勤必取著於紛純紋一作文繡之飾惟三牲八簋豐備以相沿而蒼璧黄琮實歸乎正色先王之丕業繼紀一作起信可以永其昭配羣望之徧祭在斯示有以明其翼戴由是播其聲音一有以字陳一有列從二字乎節奏以進退韶夏濩武采之於訓謨鍾石陶匏具之於梗概變萬形於動植聽宫徵於砰礚英華發外非因乎筍簴之髙和順積中不在乎雷鼓之大既而臠骨胿罥柴燎窟塊擘砉一作砉擘赫葩一作􅀢斜晦潰雷一作電纒風升雪颯星碎拂勿侹濙一作濚𣺌溟芊淬一作蓯淬聖慮岑寂𤣥黄増霈蒼生顒昻毛髮清籟雷公河伯或􅛖騃以脩聳霜女江妃乍紛綸而晻曖執紱秉翟朱干玉戚鼓瑟吹笙金支翠旌神光倐歛祀事虚明於是涾湤乎渙汗紆餘乎經營浸朱崖而灑朔漠淗一作洶暘谷而濡若英耆艾涕而童子儛叢棘折一作拆而狴牢傾是率土之濱覃酺醵以涵泳豈一作非奉郊之縣獨宴慰以縱横𤣥澤淡泞乎無極殷薦綢繆乎至精稽古之時屢應符而合契聖人有作不逆寡以䧺二字一作而推成爾乃孤卿侯伯羣儒三老儼而絶皮軒趨帳殿稽首曰臣聞燧人氏已徃法度難知文質未變太昊氏繼天而王根啓閉於厥初以木傳子攄一作據終始而可見洎虞夏殷周茲煥炳而葱舊秦失之於狼貪蠶食漢綴之以蛇㫁龍戰中莽茫一叠茫字夫何以一無以字從聖蓄縮曾不下眷伏惟道祖視生靈之磔一作􅀈裂醜害馬之蹄齧呵五精之息肩考正氣之無轍協夫詒孫以降使之造命更挈一作㓗累聖昭洗中祚觸蹶氣慘黷乎脂夜之妖勢廻薄乎龍蛇之孽伏惟陛下勃然憤激之際天關一作闕不敢旅拒鬼神以一作為之嗚咽髙衢騰塵長劍吼血尊卑配宇縣刷挿紫極之將頺拾清芬於已缺鑪之以仁義鍛之以賢哲聨祖宗之耿光卷夷狄之彯撇蓋九五之後人人自以遭唐虞四十年來家家自以為稷卨王綱近古而不軌天聼貞觀以髙掲蠢爾差僣粲然優劣冝其課宻於空積忽㣲刋定於興廢繼絶而後覩數統從首八音六律而惟新日起筭外一字千金而不滅上曰吁昊天有成命惟五聖以受我其夙夜匪遑定一無定字實用素樸以守于嗟乎麟鳳胡為乎郊藪乃上帝之降鍳及兹𤣥元之垂裕乎後夫聖以百年為鶉􅙿口豆切道以萬物為芻狗今何以一有此字茫茫臨乎八極眇眇託乎羣后端策拂龜於周漢之餘緩歩濶視於魏晉之首斯上古成法蓋其人已朽不足道也於是天子黙然而徐思終將固之又固之意不在抑殊方之貢亦不必廣無用之祠金馬碧雞非理人之術珊瑚翡翠此一物何疑奉郊廟以為寳増怵愓而一作以孜孜况大庭氏之時六龍飛御而一作之歸凡一作皆集本文苑英華卷五十四
