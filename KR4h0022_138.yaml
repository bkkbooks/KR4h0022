body:
  text: 文苑英華卷一百三十八宋李昉等編鳥獸八鶴處雞羣賦一首木雞賦一首反舌無聲賦一首燕巢賦一首秋燕辭巢賦一首鳥擇木賦一首射雉解顔賦一首斆雞鳴度關賦一首鶴歸華表賦一首紙鳶賦二首鶴處雞羣賦皇甫湜羣雞兮喧卑獨鶴兮超特何躁靜之殊致顧仙凡之異德今乃同處斯為失職持軒昂之貌棲耻鑿垣抱清逈之心餓羞爭食恐沈於衆何德之孤志在廓寥迹依泥塗戀祥雲於紫蓋憶仙馭於清都處衆而將齊一鶚離羣而每羡雙鳬孰曰其微易散兹乃實繁有徒在識家而競入悲得食而相呼憂心悄悄愠于羣小憩霓裳於永夜鮮玉羽於清曉思大湖之澡刷念秋漢之清矯涅而不緇素以為表寂寞清唳依違馴擾同李陵之入蕃誰為同志似屈原之在楚衆人皆醉或振羽以將鳴或峩冠而瞪視囂囂煩耳紛紛撲地安知警露之質豈識凌雲之意獨立不懼誠則莫之與京碩大無朋所謂拔乎其萃何憂乎彼衆我寡而患乎去同即異慘淡無色低徊不平困眼前之擾擾哀足下之營營動必以誠鄙度關之詐戒之在鬬非擅場之名誰恤大以捨小念彼濁而此清和而不同卑以自牧動憂違衆居常慎獨彼雖距似金形似木終羞與噲等為伍孰慮夫下交之瀆是冝翔金穴集芝田冀松喬於碧落侣鸞鳯於紫煙而忽齒陋質於階下溷愚衆於君前惆悵非所昻藏自賢顧彼雞矣相羣若是多多益辨兩兩而比自謂鳥中之賢且具天下之美與之逰息甚可嗤鄙每戒比之匪人常耻獨為君子時乎有在物不終否爾惡能凂我哉吾當一舉千里木雞賦以致此無敵故能先鳴為韻浩虛舟惟昔有人心至術精得雞之情情可馴而無小無大術既盡而不飛不鳴對勍敵以自持堅如挺植登廣場而莫顧混若削成初其教以自然誘之不懼希漸染而能化將枯稿而是喻質殊朴斫用明不競之由狀匪雕鎪蓋取無情之故然則飲啄必異嬉逰每殊佇栖心而自若期顧敵而如無日就月將功盡而稍同顛枿不震不竦性成而漸若朽株已而芥羽詎設一作玄羽詎翔雕籠莫閉卓然之至全變兀若之姿已致首圓脛直輪桷之狀俱呈嘴利距銛枳枸之鋩並利是以縱逸情絶端良氣全臆離披而踵附眸眩曜而節穿驚被文而錦翼蔚矣迷搴木而花冠爛然虛憍者懷不才之虞安能自恃賈勇者有攻堅之懼莫敢爭先故能進異激昻處同虛寂郢工誤起乎心匠郈氏徒驚乎目擊淡然無撓子綦之質方儔確爾不回周勃之強未敵之一作其喻斯在其由可徴馴致已忘一作忌乎力制積習潛通乎性能是則語南國者未足與議鬬東郊者無德而稱士有特力自持端然不倚塊其形而與木無二灰其心而顧雞若是彼靜勝之深誠冀一鳴而在此反舌無聲賦以氣感聲盡取以候時為韻張仲素彼衆禽兮終嵗嚶嚶此反舌兮語默有程蓋時止而則止故能鳴而不鳴青春始分則關關而爰語朱夏將半乃寂寂而無聲有以見天地之候有以知禽鳥之情爾乃觀其所來察其所以或羣或友爰飛爰止啄朱櫻而潛下嫋緑楊而暗起先秋而默耻競響於蜩螳擇木而逰契不言於桃李於是靜觀其妙先徵其比閟兹百囀誡煩辭於躁人默若三緘象欲訥於君子徒觀其行藏以時喧靜惟允其鳴也有節其默也可準初疑管弦之並奏鏗爾曲終又似環珮之齊鳴詘然聲盡是以理契中寂道符間淡陰陽爭而止聲春夏交而知感哂城烏之夜噪向曙仍啼歎野鶴之秋鳴在陰常慘原夫生乃依巢來而作候靜集林薄間棲苑囿飛而無懼知皇家仁解網羅應不愆期答聖君信及鳥獸懿夫遏其音調其羽結舌何異消聲可取鶯能囀鸞善舞鳯鏘鏘而聲樂鴈嗷嗷而音苦在和鳴而則多於敬授而何補曷若動適其宜靜得其時伴玄燕之辭巢秋而俱去陪黃鳥之遷木春以為期豈比夫嘻嘻者聞妖於亳社交交者見刺於秦詩斯則𡨕契陰隲逈殊品彚標羽族以稱竒載月令而為貴配鳴鳩之拂羽僃嵗候於三百六旬嫓鶡鳥之吞聲應天時於二十四氣至矣哉隨時之智從宜之義抑斯禽之謂燕巢賦以平入空極為韻樊晦鳯凰集於梧桐鷦鷯巢於枳棘俱順時以適理盡攝生以自得豈如雕梁棋燕葺髙巢以安息既開珧户逐仙羽以長生或在玉筵疑作玉筐文選安陸王碑筐文注有娀氏取燕覆以玉馴主人而含識質有稟於玄造妙無方兮何極頡頑金屋差池翠宫銜泥繞棟度勢巡空憐綺忩之華影愛羅幌之春風得地相賀分飛就功廣狹殊軌規模不同散彩彬斑攢文潗㵫疊輕蘂而矜暖布重泥而訝濕迹似連珠形如聚粒霽光分曉出虛竇以雙飛微隂合暝舞低簷而並入我室既真虛白自生逼之不懼撫之不驚故鳥鵲可循而窺也龜麟協瑞於太平余所以觸物而作興唯燕雀之一鳴秋燕辭巢賦以秋冷去急為韻侯喜漢落葉兮火星西流落葉一作案户續漢禮儀志曰仲秋之月縣道皆案户比民白露降兮萬物知秋嘉此燕之有感將辭巢兮命儔命儔兮焉求應節兮周逰去此集彼正為良謀經北户以一息度南軒而久留久留伊何我翼新整雖華屋之可戀怯髙巢之夜冷得不上下其音翩翻其影射疑白日之淹留候令辰之光景乘秋而發且有便於風髙養羽既成亦可知其路永况夫將適之所必能安據縱眷乎此巢可居固難以久而不去克有攸往足觀來譽殺氣澄秋睛光滿曙當是美景此焉鶱翥遂乃橫絶階墀逺謀原隰事必謀始翔而不集空長而矯翼彌髙日暮而連飛轉急同發者或有不進後來者莫能相及巢兮徒有思其所葺鳥擇木賦以君子之德翔而後集為韻鳥之擇木者不在乎得髙枝在乎得所履或凌雲之幹而不可集或在庭之柯而必可止依惟賢之主人逺挾彈之公子若夫鳴而後集翔必有疑如智者之千慮叶君子之三思山有不材豈謂心乎愛矣林多獨秀寧同主則擇之孰謂無心依於有德豈惟葉之萃一作翠幹之直必在無驚弦之憂傾巢之逼惟喬之下想遊女之求思避惡之隂同志士之不息若乃翼隨雲展身以風翔觀平林之漠漠見絶嶺之蒼蒼豈爰止兮失正誠所集兮向方容足之柯乃處隱身之葉是藏故有繞樹之烏鵲棲桐之鳯凰是知擇善而從何常之有既無巢幕之誚詎貽髙墉之咎道惟空際諒有開而必先棲或林端乃觀影而從後未安其所豈樂其羣傍青冥而頡頏白日出幽谷而翺翔碧雲水隔山而猶逺煙拂樹而漸分將欲巢林杪渡江濆如蕭何之擇漢主虞卿之謁趙君原其羽族所棲惟巢是葺雖衆樹之相蔽唯一枝而可給處必擇地食無不粒飛乃從冝固難妄集若然則禽之有靈也不可以愚智相期不可以飛走見遺集灌既知有以始巢當復何時是也一作以良木可期儻主人之見納俟我於庭乎而一有已字射雉解顔賦以藝極神驚愁顔變喜為韻浩虛舟昔賈氏兮其容似鄙伊室家兮中心莫喜將非匹以為念懼無能而是恥自初笄之嵗終日低眉因獲雉之辰有時見齒原夫他室是託芳華正春謂妖容之可恃顧陋質以難親自西自東每棲棲而反目不言不笑常脈脈以凝神爾乃釋憾無方從權有計因如臯以肆望逞若神之絶藝執弓挾矢期應手以無遺果志愜心冀回眸之一睇以一作已而健馬蹄疾中原草平想媞媞之未恱聆戛戛之初鳴花顔惝恍以徐駭錦翼翩翻而忽驚遲回而滿月將發眄睞而橫波以青由是執轡情專馳神望極星走白羽綺張丹臆陋容蹙縮以興憤慢臉㛹娟而改色彩毛迸落初莞爾以難持飛鏃洞穿遂嫣然而不息及夫廣陌將暮征途既還鳴弰徑挺以風響澡翰毰毸而血殷盼么麼之凡姿於焉改貌散低回之鬱志由是開顔向使恨蓄兩心功虧一箭終悄兮而莫釋寧嘻其之可見委絲蘿之弱性沒齒而難忘慘桃李之穠華終天而不變是知陋不足耻藝誠可優嘉五善之殊妙解三年之積愁然後知一笑之難得豈止千金而是酬斆雞鳴度關賦宋言雞伺晨而風雨不渝人懷詐而關防可圖效長鳴於頃刻排大難於斯須近取諸身俾羣情而莫測出於余口將五德以無殊昔者田文久為秦質東歸齊國之日夜及函關之際顧追騎以將臨念國門之尚閉君臣相視方懷纍卵之危豪俠同謀未有脫身之計下客無名潛來獻誠君禍方垂於虎口臣愚請斆於雞鳴於是鷹揚負氣鶚立含情逈夜遙天未變沉沉之色攢肩鼓臂因為喔喔之聲審聽真如遙聞酷似髙穿紫塞之上深入黃河之裏一鳴而守吏先驚三唱而行人盡起回瞻滿座皆默默以無言散入荒村漸膠膠而不已想夫計即成欺人皆不疑重門似洞以俱闢駟馬如龍而莫追雖師曠之聰誠難辨矣縱冶長之慧未必知之於是考智謀察能否君於士兮誠重士於君兮亦厚念秦關之百二難逞狼心笑齊客之三千不如雞口既而美播強鄰名聞上賔暫解咽喉之急永為心膂之臣想季路之危冠相侔未可任秦皇之利觜欲學無因豈非志在酬恩居然造響清濁如一髙低不爽迷翰音之類應若同聲闢反拒之門易於覆掌始知戰國之多才是招賢之道廣鶴歸華表賦以去家千歲今始一歸為韻昔丁令威登仙紫微念故鄉之久别化靈禽之疑一歸翻瑤臺而遂下見華表而堪依凄涼而舊迹猶存徘徊有戀寂寞而故人誰在悵望難飛原夫托玉羽以潛逰歷丹霄而暫憩閟聞天之逸響駐凌雲之逺勢疑疑思慮於木末俯閭閻於煙際光隂可惜歡娛有誤於當年丘壠相望凋落徒悲於晚嵗既而人事難尋俄成古今野徑榛亂煙虛疑作墟草深岐路之黃埃不已桑榆之白日空沉眷戀無窮誰識孤髙之貌悲傷莫測空聞嘹唳之音至若似帶煙霞情深恨賖遲回而修趾不動眄睞而圓吭暫斜松檟蕭蕭遍是幽魂之宅蓬茅歷歷今為誰氏之家少别層城長思故里似有求而不見若將飛而未起住仙界之長日痛人寰之逝水念當時之親識安問存亡窮纍代之子孫莫言終始極目晴煙凝思悄然别離而塵事不一倐忽而芳春且千那求飲啄自惡腥膻歸處而雲空慘淡望中而封樹連延笑彼乘軒不離乎金闕喜兹警露逈降於遼天已而卓爾無群超然將翥思杳杳之空際戀亭亭之髙處回朱頂以長望疊霜毛而永慮蓄恨無窮忽矯身而飛去通首未見一字官韻紙鳶賦唐宋代有遊童樂事求工飾素紙以成鳥象飛鳶之戾空翻兮將度振沙之鷺杳兮空光漸陸之鴻抑之則有限縱之則無窮動息乎絲綸之際行藏乎掌握之中其翰非逸其羽乃疾弄輕影昻素質侔瑞鵲之臨河學靈烏之就日詭狀萬殊竒姿匪一衝激吹而頻驚入增前漢增城之增塵而乍失及夫晚際蕭寥近日迢遙出虛景逼長霄艷艷裔裔亭亭迢迢如片雪之初下似殘雲之欲銷何裕如之囂囂紛擕兹而玩玩其上同綺翼之遷喬其下若馴騶疑之就喚虞羅獲免弦繳莫憚野鵠來一作未遷而伴飛都人相視而指看歎乎升沈得勢真假相亂殊不慙鸚鵡之被籠蒼鷹之受絆六鷁尚退于宋都大鵬猶沈於海畔彼無識而無知亦曷足以見嗤但仰牽運不能自為無仙鶴九臯之響乏晨雞五德之竒零落倐忽悠揚暫時偕鴛鴦之侣入鳯凰之池向若勞力高風莫吹安有望於寥廓必不出於籓籬且紙之所尚事有攸往供筆陳之樂起詞華之賞故莫載於鳯文而反圖於鴟像因人而進爭路而長固不濟於時須欲屏之兮何爽第二楊譽相彼鳶矣亦飛戾天問何能爾風之力焉余因稽於造物知不得於自然原其始也謀及小童徵諸哲匠蔡倫造紙公輸獻狀理纎篾以體成刷丹青而神王殷然而髠彼羽翼邈爾而引夫圓吭膺繫纎縷趾續長繩俯劇驂之七逹挂髙臺之九層形全而和似鬭雞之養紀渻目大不覩若異鵲之在雕陵因所好而毛羽思有遇而鶱騰鄙宋都之退鷁慕溟海之摶鵬於是扇以扶搖縱諸寥廓絢練倐閃翕赫忽霍瞬息而上千里咄嗟而逰大漠翔鶤仰而不逮况青鳥之與黃雀彼都人士瞻佇城隅初指中疑作沖天之鶴逺言拂日之烏望有塵埃謂翻形而載斾聽無音響疑避影以銜蘆始回翔於元氣終出入於高衢所以羽翮既成雲霄自致期上騰以奮激何中路之顛墜力不培風勢將控地感魚龍之失水義蚊虻之附驥比畫虎之非真與芻狗之同棄寧待時而畜力信因人以成事于嗟鳶兮適時與我兮相期知我者使我飛浮不知我者謂我拘留啄腐鼠兮非所好嘯第疑作茅棟兮增至愁才與不才且異能鳴之鴈適人之適將同可狎之鷗我於風兮有待風於我兮何求幸接飛亷之便因從汗漫之遊當一舉而萬里焉比夫榆枋之與鷽鳩者哉文苑英華卷一百三十八
