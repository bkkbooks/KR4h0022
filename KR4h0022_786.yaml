body:
  text: 文苑英華卷七百八十七宋李昉等編山川終南山義谷銘一首玉帳山銘一首吹臺山銘一首望美人山銘一首至仁山銘一首明月山銘一首行雨山銘一首可汗山銘一首玉華宮山銘一首惡溪銘一首仙掌銘一首仙都山銘一首江州南湖堤銘一首狠石銘一首傅巖銘一首汴河銘一首馬當山銘一首終南山義谷銘并序庾信周保定二年嵗次壬午七月已已朔大冡宰晉國公命鑿石關一作開之谷下南山之材維公匡濟彞倫𢎞敷庶績燮理餘暇披閲山經以為終南敦一作博物日月虧蔽杶幹栝柏椅桐梓漆年代藴積于何不有乃謀山澤之官兼引一作列衡虞之匠東出藍田則控灞乘滻西連子午則據涇浮渭𣲖别入溪流分九谷銅梁西一作四柱石關一作闕雙啓青綺春門溝渠交映緑槐秋市舟楫相通蓄之則為屯雲泄之則為行雨青牛文梓白鶴貞松運以置一作冥宮崇斯雲屋千櫨抗殿龍首干雲萬頃踈苗蟬鳴再熟川后讓德山靈景從豈知運石甘一作舟泉才通櫟陽之殿穿渠穀水直繞金墉之城將事未勞為功實重國富人殷方傳千載因一作立功立事敢勒山阿銘曰寥廓上浮崢嶸下鎮直立一作立壁千丈峯橫萬仞桂月危懸風泉虛韻乘輿嶺阪舉鍤雲根八溪分注九谷通源北㴠桐一作銅井南浮石門撲或作模象大狀一作橫鴻大河規一作銀繩百堵交一作膠葛九成徘徊千柱桂棟凌波柏梁乘雨疏川剪一作奠谷落實摧柯事均刋木功侔鑿河一作皆初學記玉帳山銘一作東宮玉帳山銘玉帳寥廓崑山抵鵲總葉成帷連雲一作枝起幕玉䇿難移一作玉蘂難徙金花不落隱士彈琴仙人看博巖留舊鼎雲上一作竈聚新荆煮石初爛燒丹欲成桑田屢變一作盡海水頻盈一作傾長聞鳳曲永聽簫聲一作皆藝文類聚吹臺山銘江寧吹嶺惟山出筠秦簫下鳳此岫為真青槐避日朱草司一作伺晨石名新婦樓學仙人中字玉成南君姓秦一作吳中字王城南姓秦比花依樹登榭要春舞能留容一作客聲便度新雕梁數振一作逺無復輕塵望美人山銘一作後堂望美人山銘髙唐礙石一作雨洛浦無舟一作州何處相望山邊一樓峯因五婦石是三侯嶮踰地肺危陵天柱禁苑斜通仙人常一作恆聚樹裏聞歌枝中見舞恰對粧臺諸窗晝一作併開斜看已識直一作試喚便回豈同織女非秋不來一作皆藝文類聚至仁山銘峯橫鶴嶺水學龍津瑞雲一片仙童兩人三秋雲薄九日寒新真花暫落畫樹常春橫石臨砌飛簷枕嶺壁繞藤苗窗銜竹影菊落秋潭桐踈寒井仁者可樂將由愛靜明月山銘竹亭標嶽四面臨虛山危簷迥葉落窗踈看椽有笛對樹無風風生石洞雲出山根霜朝唳鶴秋夜鳴猿堤梁似堰野路疑村船橫埭下樹夾津門寧殊華蓋詎識桃源行雨山銘一作梁東宮行雨山銘山名行雨地異陽臺佳人無數神女看一作羞來翠幔朝開新粧旦起樹入牀頭一作前花來鏡裏草緑一作色衫同花紅面似開年寒盡正月遊春俱除錦帔併脫紅輪天彩劇藕蝶粉生或作多塵橫藤礙路弱一作垂桞低人誰言洛浦一箇河神一作皆藝文類聚可汗山銘謝偃維貞觀十三年嵗在已亥二月甲戌朔八日辛巳聖唐大使右武衛大將軍慕容寶節度副使朝散大夫任雅相等肅奉明詔冊授大單于真珠毗伽可汗嫡嗣為肆葉護可汗安懷率土廓裁宇外曩者隋歷既終九域淪覆天資聖明光啓有唐而頡利背恩虐我邊域是以輕賫電發直掩虜庭驅縱驍雄奔放忠烈百弩俱彀萬鋒齊舉鞭電鼓霓動天維於上拔山蹴嶽移地軸於下雲騎騰蕩則川野晝昏風旗揚曵則辰離黯色擒谷蠡於谷口曾未崇朝斬日逐於轅門景不移晷龍庭桞塞之外煙滅雲銷瀚海天山之前波澄霧卷上以震皇威於萬葉下以安億兆於千齡雖有靈祗贊我有唐亦所以恢崇今單于地是以萬里齊契四海同規始驗秦防徒營漢城虛築在德非險皇哉唐哉勒石紀功騰聲不朽詞曰振天威兮橫朔方星劒騰兮虹旗揚窮絶漠兮越幽荒邦單于兮冊名王歷千載兮聲彌光玉華宫山銘髙宗天皇大帝順請峒山鐫芳金石道光軒駕聲流姬迹矧此崇嚴介通帝宅峻侔銅柱祥韜金碧飲渭南通鳴岐西格炎生肇授彤署初融髙明叶宇一作序卜揆裁宫鳳標銜露鳥跂捫空丹溪繚繞旋一作堤樹玲瓏徑分餘雲嶺界斜虹流花縟景清籟嘶風波移控鯉雲飛御鶴沉沉松嶝萋萋蘭幄霧宿重巒寒生洞壑峯髙鳥路月對林垂交藤散緑懸鏡成規鵷歸繞蕣鳳下標椅崖依注蘚池涵卷葹廣運堯心式昭夏諺端靈養白申歌祕殿菌閣流霜椒臺凝霰玉榮則賞瑶池肆宴福夀無疆華封斯薦惡溪銘李陽氷天作巨塹險于東南岌丘口闞呀蒼山黑潭殷雲填填怒虎甝甝一道白日四時青嵐鳥不敢飛猿不得下舟入聳棹行子來馬知雄守雌為天下蹊老子作溪烜赫如此人將畏之水德至柔狎侮而死畏而死寧敢放彼仙掌銘并序獨孤及隂陽開闢集本文粹作闔元氣變化泄為百川凝為崇山山川之作與天地並疑有真宰而未知尸其功者有若巨靈贔屓攘臂其間左排首陽右拓太華絶地軸使中裂折山脊為兩道然後導河而東俾無有害留此巨跡于峯之顚後代揭厲於𤣥蹤者聆其風而駭之或謂詼詭不經存而不議反以為學者拘文粹作揔其一域則惑於餘方曾不知創宇宙作萬象月而日之星而辰之使輪轉環繞箭馳風疾可駭於俗有甚於此者徒觀其隂隲無朕未嘗駭焉而巨靈特以有跡駭世世果惑矣天地有觀一作官隂陽有藏煆錬六氣作為萬形形有不遂其性氣有不達於物則造物者取元精之和合而散之財而成之如埏埴爐錘之為瓶為缶為鈎為棘規者矩者大者細者然則黃河華嶽之在六合猶陶冶之有瓶缶鈎棘也巨靈之居也二字集作於自然七字文粹作於其自然蓋萬化之一工也天機冥動而聖功啓元集作至精密感而外物應故有無跡之跡介于石焉可以見神行無方妙用不測彼管窺者方循跡而求之揣其所至於巨細之境則道斯逺矣夫以手執大象力持化權指揮太極蹴踏集作踏皓氣立乎無間行乎無窮則捩文粹作據長河如措杯擘太華若破塊不足駭也世人方以禹鑿龍門而導西河為神竒可不為文粹作謂大哀乎峩靈掌纖指如畫隱磷磅礴上揮太清逺而視之如欲捫青天以文粹作而掬皓露攀扶桑而捧白日不去不來若飛若動非至神曷以生此唐興百三十有八載余尉于華隂華人以為紀山弇嵫勒之罘頌嶧山銘燕然舊典也𤣥聖巨跡豈帝者巡省代國之不若歟其古之闕文以俟知言歟仰之嘆之琢玉集本文粹作石為志其詞曰天作髙山設險四方至精未分川壅而傷帝命巨靈經啓地脉乃眷斯顧髙掌逺跖砉如剖竹騞若裂帛川開山破天動地坼黃河太華自此而闢神返虛極跡掛石壁跡豈我名神非我靈變化翕忽希夷杳冥道本不生化亦無形天何言哉山川以寧斷鼇補天世未覩焉夸父文粹作娥愚公莫知其蹤屹彼靈掌懸諸巃嵸介二大都亭亭髙聳霞赩煙噴雲抱花捧百神依憑萬峯朝拱長於上古以閲羣動下視衆山蜉蝣蠛蠓彼邦人士永揖遺烈瞻之在前如揭日月三川有竭此掌不滅仙都山銘韋翃亭亭仙都峻極維嵩屹立溟石削成制與浙同東發地直方磨霄穹崇靈沼一作昭在上祥雲積中圭植千仭柱寧四封目視不及翰飛靡窮群追一作阜奔走列仙㑹同黃帝攸訪碧嶺一作巔是冲丹室傍起金溪下融日臨霞附月映綃䝉壤絶棲塵木無寓叢居幽不昧守一而雄萬夀報響九成來空嘉名來一作乃復展禮斯洪其山嘗更名獨峯洎開元中里人聞呼萬嵗及有匏竹之音郡守上聞因復仙都之號自從不間嵗而圭璧投焉籙一作冷作懲止年祈感通莫髙匪兹造物之功江州南湖堤銘并序李翺長慶二年十二月江州刺史李君濬之截南陂築堤三千五百尺髙若干尺廣若干尺以通四鄰集作鄉之路畜水為湖人得其嬴正月既畢事舒州刺史李翺集作歌以紀之辭曰天地作物功或不周賢人相之智與神侔漭漭南陂冬乾夏滮九江瀑漲集作漲潮潮潛集作潛潛逆流東南百民城市所繇水積既深大波其彪集作䬌匹尤切亦有舟航覆溺之憂擔擁疊路車軔其輈童嬰涕墮老婦號愁歷古逮兹孰為氓籌濬之之蜀本作斯來養民如身乃築長堤拒江之瀕厚其錢傭以飽饑集作餓人南北東西百里鬬臻莫不用力金鎚響振集作唇音真驚也虓歡相厲不督而勤堤既成止岡聫突起堅若石城障集作璋為瀦水蒲莞菱芡鴻鶬鱣鯉唯其所取或食或祀長堤坦坦植之楊槐架豁飛圯以便去來除險作利非賢不能歌示江人式恱汝懷狠石銘皇甫湜狠石蒼蒼驪山之傍集作旁鑱朴礲頑集本文粹作嶷然四方昔秦皇帝謀之不臧也七十萬人兹焉遑遑二本作皇皇發石北一本作此山言礎於或作于墳若有憑依屹住中逵淫刑蹴迫人力無施故老相傳以狠名之自或作惟昔太古不封不樹有葛於集作于溝有薪于二本作於野後聖有作緣情不忍為之棺槨其在唐虞則維寂木噫嘻暴秦虐用其人墳而象山下錮三泉窮珍㧾竒力瘁財疸驅逐二本作驅而前如刈草菅天毒其衷神憤或作亢其凶謫戍一呼九州風從白梃荆棘集作棘荆漢書作棘矜指麾崤潼險阻不闔干戈倒鋒尸露于劫隧燔于童蓬顆無依不十年中禹葬㑹稽不改其行聖德洋洋厥饗久長至于漢劉釋之而或作靣言中如可欲猶隙南山矧私其身以盡其人刻詞狠石炯戒千春傅巖銘并序吕溫昔殷髙宗恭默思道至誠動天天將報之以說為瑞王在于鎬集作寢是降神夢中審形旁求實得於此曾不待敷奏以言明試以功脫刑人之衣被公衮之服五字集作被公衮授受之際君不疑臣不慙大哉邈乎殷之所以興也若非武丁之心同乎天地傅說之德通乎神明何感動欣合如此其易厥後唯文王以兆用太公自漁父而登國師白旄一麾光定天下抑其鄰歟由兹而遷莫不先顯後幽右賢蜀本作資左德勒以漢秩束于周行使特逹自致之士無聞焉吁可歎也夫以天驥之才而造父馭之則必翼輕軒凌髙衢風翔電邁一作發一日千里若制非其人服非其車忘權奇務牽束挫盛氣頓逸足使遵乎尋常之躅則終嵗疾驅望駑駘而不一作莫及矣遇與不遇又何疑之集作疑哉一作歎哉嗚呼見賢非難知之難知之非難用之難用之非難特達難君人者苟以特達為心假無殷宗之夢必自得說不然則雖使咎䕫稷契盡入其庭亦葉公之見龍反疑懼矣况氤氲之中乎恍惚之際乎貞元九年豫自鎬徂洛息駕於虞虢之間外墟瞰原髣佛其地逺跡雖昧清風若存想說命三篇幾墮集作墜秦火百代之後德音如何乃作銘曰赫赫湯德如日集作火不滅滔滔商祚如海不竭發祥播氣世祚集作作聖哲國誕武丁野生傅說說始胥靡武丁即祚集作阼是德通神交忽夢如悟一作寤若帝導我期於皓素有無之間邂逅相遇宵衣而起爰得其人貌符心冥如舊君臣飛龍在天山川出雲感激自致其間無因捨築傅巖脫鱗鵬升蜀本作程作霖時和奮楫川程金在吾礪木從吾繩君何言哉殷道中興元凱攀堯微舜曷階阿衡干湯抱鼎徘徊會合之際厥惟難哉何如夢中天授神開惟賢是登道貴特達匪次勿用才其壅遏髙宗得說乃在恍惚揭銘摛光萬古不沒汴河銘并序皮日休夫垂後以德者當時逸而後時美垂後以功者當時勞而後時利若然者守道之主唯恐德不美後時逸於已民也夸力之主唯恐功不及當時勞於已民也故天下也不逸不足守不勞不可去致其利害生於賢愚之主自古然也則隋之疏淇汴鑿太行在隋之民不勝其害也在唐之民不勝其利也今自九河外復有淇汴北通涿鹿一作郡之漁商南運江都之轉輸其為利也博哉不勞一夫之荷畚一卒之鑿險而先功巍巍得非天假暴隋成我大利哉尚恐國家有淇汴之役因獻纖誡是謂汴河銘惟河瀰瀰循禹之軌厥有暴隋鑿通淮集作津泗晝泣疲民夜哭溺鬼似赭川流如松貫地龍舟未故江都已弒陳跡空存遊波不止在隋則害在唐則利嗚呼聖王守此而已馬當山銘陸龜䝉言天下之險者在山曰太行在水曰呂梁合二險而為一吾又聞乎馬當彼之為險也屹乎集作于下同大江之旁怪石憑怒跳波發狂日黯風助摧牙折檣血和蛟涎骨橫魚吭幸而脫死神魂飛揚殊不知堅輪蹄者夷乎太行仗忠信者通乎呂梁便舟楫者行乎馬當合是三險而為一未敵小人方寸之包藏外若韋順古本作韋脂中如劒鋩蹈藉必死鈎𠢐必傷在古已極於今益彰集作昌敬篆巖石俾民勿忘文苑英華卷七百八十七
