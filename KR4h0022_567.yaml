body:
  text: 文苑英華卷五百六十八宋李昉等編賀捷三賀梟戮叛將楊惠琳表一首賀収劔門表一首代李侍郎賀收成都表一首賀破賊表一首賀捉獲劉闢等表一首代李尚書賀生擒李錡表一首賀収蔡州表一首賀誅吳元濟表一首賀平淄青表一首爲宰相賀殺賊表一首賀汴州誅李介表一首賀平党項表一首賀生擒衡州草賊鄧裴表一首爲滎陽公賀幽州破奚冦表一首賀梟戮叛將楊惠琳表憲宗楊於陵元和元年臣某言臣得當道進奏官高振報夏州叛將楊惠琳庸賊匹夫兇頑習性慿依壁壘竊弄干戈陷我邉鄙之人將流蜂蠆之毒伏惟陛下道包覆育一作載威貫風雷乃命戎人恭行討罸文告纔布已見其携離天誅未加倐從於梟戮革車不頓餽餉靡勞宸筭不遺於指蹤王師盖本於無戰雖巴庸醜類樂禍一隅顧其巢幕之危因同破竹之勢妖氛坐掃仁夀可期臣職忝藩條任分師旅逺承慶捷倍萬恒情無任踴躍之至賀収劔門表憲宗臣某言伏見正月二十九日制書以劉闢擢於非次授任節旄不立朝章擅有侵軼詔命左右神策行營節度使髙崇文領馬歩將士嚴礪李庸等計㑹討伐臣又得上都進奏院官髙振報嚴礪下告捷官嚴公貺奏正月二十二一作三日収復劔門破賊五千斬偽授劔州刺史武徳昭訖又夏州叛將楊惠琳援絶城孤勢窮力屈王師進襲計已尅平凡在逺邇不勝慶幸某中賀伏惟皇帝陛下誕敷𤣥徳廣被文明寰海乂寜戎夷欵附蕞爾狂狡敢縱姦兇藉方伯任用之資乗軍城變故之際阻兵拒命肆虐讐鄰陛下志在安人尚爲含垢頃令申諭許以自新誠宜改過感恩迷而知一作非復而乃恣情干紀長惡不悛既慝稔而禍盈俾人怨而神怒今戎臣授律睿畧遐宣廹脅者知有所歸忠義者得以自効因利乗勝掎角攻驅固無遺鏃之勞佇見輿尸之變臣忝職藩服授任偏師憤激之誠倍百常品無任踴躍之至代李侍郎賀収成都表憲宗吕温元和元年臣某言伏見高崇文奏以九月二十二日官軍入城都府逆賊劉闢走出見勒兵追捕者臣聞夏震秋落乃觀成物之功善陣有征方見勝殘之理然則殺之所以生之也動之所以綏之也氣和則嵗功早就徳盛則廟筭先期無遺鏃而巨盜集作魁窮奔不血刄而全蜀底定奔走夷裔皷舞生靈騰瑞氣而躍祥風披慶雲集作霄而捧白日中賀伏以陛下纂臨宸極惟新庶政拓跡開統之始作法定制之初而賊闢敢犯天威首干大紀恃嶮與逺窮兇極暴雖禍滛助順誠天道之必然而致勝舉全皆聖謨之自出諸軍既集鋒鏑争先陛下以爲方暑用兵觸冐害氣與勦人而欲速寜全衆以集作而功遲遂令緩螻蟻之誅抑貔貅之鋭休養磨礪以須秋期由是感恩而思奮者萬心如一又高崇文疾惡太甚殺傷小一作少過陛下推弔伐之義𢎞覆燾之慈狂冦集作冦逆是誅吾人何罪遂令逐北者生致爲上脅從者獲則捨集作免之且諭鴻私仍加宴慰由是飲澤而向化者十室而九加以聖慈曲被大信有孚當挾纊之時賜戰士悉出内府開食黮集作椹之路賞降者曽不踰辰遂使昏迷革心義勇増氣江山自㧞雷雨長驅渠魁假息而逃威士衆順風而捨仗市不易肆巷無驚犬人䝉骨肉户解倒懸旌旗𨗳長飬之風金皷動發生之氣然後知至仁能殺睿略無方大典用彰神武可畏全苞形器集作氣之内有罪必誅旁行天地之間無思不服臣謬膺重寄親奉昌期坐觀氛授之清目覩鯨鯢之戮手舞足蹈倍萬恒情無任慶抃之至賀破賊表憲宗張仲素元和元年臣某言得度支使李巽與臣委曲報劔南行營官軍大破逆賊劉闢事冝伏承自六月十日後鹿頭城下石碑谷口前後殺獲已僅三萬餘人今月六日又於鹿頭城下殺賊二百餘人兼奪得一栅東川節度使高崇文便於城下頓軍又西川賊於鹿頭城投降都虞候郝同羙説賊城精兵不下數百人其餘一二千悉是子弟鹿頭城内人心亦甚危懼計即投降又官軍出戰賊衆大敗殺傷欲盡者伏以逆賊劉闢愚狡狂童稔蓄兇慝脇帶州邑依阻城池背誕皇恩自貽赤族陛下曲垂𢎞貸念彼逺人此賊敢肆拒張恃茲薄戍望其悛革又已稽誅一興貔虎之師果盡螳蜋之衛今則神人共怒覆載不容王師皷行窮冦席卷傾枳棘之巢待擒妖鳥決潢汙之水以捕涸鱗掦斾整戈指期剪滅此實聖徳遐被神武昭宣岷蜀清寜當候旬日凡在臣子孰不歡心某忝荷鴻私謬承朝寄無任慶快之至賀捉獲劉闢等表憲宗臣某言得進奏官報狀伏承九月某日髙崇文差馬使酈定進於彭州界捉到劉闢盧文若并家口等有詔罪劉闢及生擒外餘一切不問西川減放兩税并割西川六州與東川者臣聞鬼方不賔髙宗用討防風後至夏禹行誅自古聖帝明王將欲上平泰階下齊萬國未有不先正刑罰後致雍熈者也闢搆亂阻兵違天背順聚茲蜴蜮固彼幽遐謂天可逃無罪不肆陛下㫁於睿略興此神兵冦壘妖鋒颷馳電掃顧茲劇賊尚敢退藏同惡相携偷生逭孽灌莽雖深豈綱羅之能避武夫多力已梟獍而同擒萬里喧傳兆人鼓舞刑當磔裂罪合誅夷肆市陳原纔攄衆怒自陛下握乾御厯授籙纂圗玉燭載和金鏡愈朗至於夏州俶擾蜀郡亂常春斬惠琳冬擒劉闢神速之效從古所無復霽整旅之威降納汙之詔滔天作逆唯罪一身念兩川徭役之勤爰矜賦税割六州版圗之屬以定封疆日月發一作䴡其貞暉山澤通其喜氣凡在兹土孰不歡康臣謬沭殊私叨承重寄手舞足蹈倍萬恒情無任慶抃之至代李尚書賀生擒李錡表憲宗吕溫元和元年臣某言臣得某官某乙狀報伏承今月十二集作十三日夜浙西將士張子良將相率効順生擒李錡者天討有罪國無稽誅夷夏同歡飛沉咸躍臣某中賀臣聞炎氣方蒸伏隂不能藏其沴必疑戰發泄以彰正陽之功至化方融大姦無所集作以隱其慝必陵犯誅夷以耀聖人之武沴不盡消生徳不遂姦不盡發聖功不成盖自然之明徴而必至之恒理伏惟皇帝陛下光膺駿命恢纂鴻休仁育群生義征不譓無與讓而誕修文德不得已而有此武功日者周嵗之間大刑再舉朔陲叛將獻首於九廟之庭益部兇渠伏鑕於萬人之目被髪左袵且猶知懼肖形含氣孰不革心賊錡身齒人倫家承國集作宗籍三朝任遇五族光輝而獨藏禍謀宻聚姦黨梟琳之才旗尚在忽已發狂戮闢之刃血未乾敢兹拒命陛下重難戎事深愍逺人先示招諭後加討伐方伯嚴兵有司調食經略纔下形勢已張果得義勇叶心鬼神假手大斾迴指長㦸合圍兵火之氣天運金鼓之聲海動集作震曾不終夜遂擒兀兇巷有居人市無改肆㴞天之逆踰月而平去嵗西征則善陣不戰今兹東伐則善師不陣有以見睿略天縱神武日新聖道久而投刄皆虚徳澤深而用力彌寡從此氛集作災窮沴盡俗變風移百蠻成冠帶之鄉五兵爲耒耜之器溥天同軌比屋可封古今一時堯舜何逺臣謬膺重寄時荷殊恩載集作再逄河海之清三覩鯨鯢之戮志深除惡義切同休歡抃之誠倍萬恒品無任手舞足蹈屏營之至謹奉表陳賀以聞賀収蔡州表憲宗劉禹錫元和十二年臣某言伏見詔書以唐州節度使李愬生擒逆賊吳元濟獻俘文武百僚於興安門列班稱賀者天威逺被元惡就誅一方既平萬國咸慶中賀伏惟睿聖文武皇帝陛下徳超䆳古道合上𤣥臨御已来天人協賛削平吳蜀掃蕩塞垣車書大同夷狄来貢蕞爾元濟敢懐野心輙聚犬羊茍偷時月陛下聖謩獨運睿感潜通天助神兵人生勇氣既擒兇逆爰集作遂正刑書伏三紀之逋誅成九衢之壯觀宗社昭告華夷式瞻行弔伐而在禮無違烜一作振威聲而何城不克楚氛改色淮水安流漢上疲人盡霑雨露汝南遺老重覩昇平凡在具臣孰不欣抃臣久辭朝列忝守遐藩不獲稱慶闕庭陳露丹悃集作慊仰瞻宸極倍萬群情無任屏營之至賀誅吳元濟表憲宗元稹元和十一年臣某言某月得當道節度使牒呈本州稱逆賊吳元濟已就誅斬訖臣某中謝臣聞拯遺甿於溝瀆非聖不能掃餘沴以雪霜非天不可日者神棄申蔡蓄爲汙瀦五十年間三后貽顧𦕈爾元濟繼爲兇妖謂君命可逃以父死爲利陛下凝茲睿筭取彼兇殘不越殷宗之期遂勦淮夷之命威動區宇道光祖宗凡在生成孰不歡抃臣忝官藩翰不獲率舞闕庭瞻望徘徊無任踴躍屏營之至賀平淄青表憲宗白居易元和十四年臣某言伏見二月二十二日制書逆賊李師道已就梟戮者皇靈有截睿筭無遺妖氛廓清遐邇慶幸臣某誠歡誠喜頓首臣聞亂常干紀天殛神誅李師道包藏禍心暴露逆節罪滿惡稔衆叛親離未勞師徒自取擒戮伏惟皇帝陛下文經天地武定華夷凡是猖狂無不誅剪兩河清晏四海㑹同清平之風實自茲集作沃始臣名叅共理職忝分憂抃舞歡呼倍萬恒品官守有限不獲稱慶闕庭無任慶快踴躍之至爲宰相賀殺賊表穆宗臣某等言伏承某道逆賊某年某月某日已被某殺戮訖皇靈震耀兇孽梟夷率土普天歡呼鼓舞臣某等誠喜誠抃頓首頓首臣聞亂臣賊子阻兵干紀者明則有天討幽則有鬼誅遲速之間罔不殱殄伏惟文武孝徳皇帝陛下君臨八表子育群生合天覆地載之徳順春生秋殺之令宿冦遺孽闇然銷亡四海九州廓然清晏逆賊某乙一介賤𨽻兩河叛人包藏禍心竊弄㐫噐戕害主帥䖍劉一作剽掠善良幕燕鼎魚偷活頃刻所謂顛木之餘枿痤疽之遺種重斧欲加而先折鍼石未攻而自潰不有弔伐孰知徳威不有妖氛孰知神筭則天下之耳將来集無此四字之心有以知順逆存亡其猶影響者也臣伏以某乙既已斬首某乙將何保身若不乞降即應生縛輔之或在車即相依皮既不存毛將安附况我乗破竹彼繼覆車止戈之期翹足何待無任喜慶抃躍之至賀汴州誅李介表元稹長慶二年臣某言臣伏見逆賊李介已就誅夷韓充入汴州訖一方既定率土無虞凡在臣僚實增歡抃臣某中賀伏以汴州扼吳楚之津梁據咽喉之要地將驕卒悍易動難安急攻則越軼集作逸是憂緩取則遷延慮集作易變自非陛下盡排群議獨斷宸衷外委將臣中集作由敷睿筭風行號令天助機謀則何以斬此鯨鯢破茲梟獍臣摧兇志切受國恩深仰荷威靈倍萬常品限以符守不獲稱賀闕庭無任踴躍屏營之至賀平党項表宣宗杜牧臣某言伏奉二月二十七日敕党項剪除北邉寜静華夏同慶道路歡呼臣某誠慶誠抃頓首頓首伏以上天有震耀殺戮王者有攻討誅夷是以不暫費者不久寜不一勞者不永逸伏以自古處夷狄於中華未有不爲患者春秋時長狄攻魯北戎病齊破衛陵燕侵秦撓晋西漢趙充國納先零於内地東朝馬文泉置當煎於三輔自後熾大侵亂關中戰争十年騷擾四海陵逼京邑發掘園陵段熲不生終不能滅後至曹公因匈奴衰弱分爲五部處在汾晋散而居之元海傑然首亂華夏中原䘮沒凡數百年國朝貞觀之初突厥破滅太宗惑彦博之利口忽文貞之成筭處其降衆置於河南不數十年果殘燕趙興師命將輸榖饋財天下騷然始能殄滅是知古今夷狄處在中土未有不爲亂者伏以党羗雜種本在河外生西北之勁俗禀天地之戾氣爲西戎所蹙舉種来降國家納之置於内地爰受冠帶兼伏征徭角觡既成觝觸是務天寳至徳之際北燕偏重中原一掀大厯建中之時逆胡餘波巨盜再起党羗因此亦恣猖狂兎伏鳥飛爲戎虜之耳目狼心梟響作郊畿之殘賊比以回鶻未殄吐蕃正強且須羈縻未可重撅於是邉疆日駭種類嵗繁每至勁弓折膠湩馬免乳以魁健之質張忿鷙之兇刼饋榖以焚舟殺軺車而閉道衆虺盤結羣犬吽牙依據深山出沒險逕近在宇下游於彀中艱難以来不能剷削伏惟聖敬文思和武光孝皇帝皇天縱聖赫日資明威極風庭謀先造化潜運睿筭獨決神機箕宿禡牙狼星歛角戊日禱馬太白揚眉按鎻而邉事無遺聚米而兵刑盡見披其要地擣以竒兵獸窮搏人鹿急走險囊封赤白雜沓繼来雉走檄書逺近同至蘇辛李蔡傅鄭甘陳十萬齊呼四面同入行軍猶枕席之上敗虜於阻險之中或以利戈舂喉或以長矛挾脅僵屍積疊千山之草木盡腥霆電轟喧萬里之威靈大震詩曰不弔昊天亂靡有定此言中國不振蠻夷入伐下人號天以告亂也復曰宣王薄伐小雅中興是知武功不成文徳不洽臯陶無遺之戒史佚非類之言若不殄除何爲家國自此兵爲農器革作軒車泥紫金於常山沈殘戎於青海天覆盡得禹畫無遺統華夏爲一家用夷狄爲四守萬物由道百度皆貞逺超三代之風使無一人之虐臣僻左小郡一作守非樸􅈪散材空過流年徒生聖代尚能爲詩見志作歌極情上詠神功庶垂後代不獲稱慶闕庭無任踴躍屏營之至謹奉表陳賀以聞賀生擒衡州草賊鄧裴表臣某等言伏見湖南都團練使奏生擒衡州草賊鄧裴及徒黨等伏以湖湘早耗百姓饑荒遂有姦兇敢圗嘯聚今承擒滅已盡根株臣等誠歡誠忭頓首頓首臣聞三代之英兩漢之盛姦宄亂常之類挺兇搆逆之黨乗間即有過隙便生伏以聖敬文思和武光孝皇帝陛下威極風霆徳滋雨露正開夀域盡納群生永戢干戈將臻富庶逆賊鄧裴蕞爾小孽敢因艱食漸誘饑人剥亂鄉閭陵驚郡邑徒堅黨合事鉅冦牢或據深山或閉官道遂使湖嶺之外人不聊生慎由指揮義徒總齊武士仰慿睿筭逺仗皇威不經嵗時盡剪豺虺党羗一作項已寜於朔北妖黨復殄於巴西今擒鄧裴一清湖嶺用夷狄爲四守統華夏爲一家言念秋毫無非帝力臣等備位台鼎日奉聖謀無任慶抃歡呼之至爲滎陽公賀幽州破奚冦表臣某言臣得本道進奏官某狀報某月日幽州節度使張仲武奏破奚北部落及諸山奚除舊奚王匿耶所管外殺戮首領丁壯老㓜并殺獲牛羊焚燒車帳器械等計二十萬刺史以下面皮一百具耳二百隻奚車五百乗羊一萬口牛一千五百頭者天聲逺疊廟畧遐宣白虜獲於寜臺赤夷俘於燕路臣某中賀臣竊窺舊史逖聽前朝有天子憂邉清宵輟寐將軍出塞白首言歸至乃或勝或奔一彼一此竟困塞郊之柝那停絶漠之烽猶欲叙烈旂常告功祧廟用其蹔勝謂曰難能况幽朔巨都全燕重地荐臻奚冦猾亂華人田讓之䕶集作獲鮮卑莫能深入祭肜之軍遼水唯遣相攻近嵗以来爲患滋甚走單于偵邏之路懐駒支漏泄之姦張仲武重感國㤙習知邉事同三師而𨽻楚侔五餌以間戎乗其囂惰之時俄得剪除之便燕犀宻掛冀馬潜羈超距投石者動過千群㦸手科頭者畧踰萬計坎三鼓而河流自却聲六校而屋瓦皆飛自使馬懼䘮林兎忙迷穴無舟掬指有地僵屍未驚紫陌之烏前軍己蹙不唳淮山之鶴後隊仍窮遂分袁尚之頭顱仍裂蚩尤之肩髀穹廬落燼同甲掦灰山積雲屯大収其車乗角羸耳濕盡獲其牛羊栁水載澄桑河無事爰施疑吉語入解皇威此皆皇帝陛下功格上𤣥運膺下武授兹成筭于彼當仁震肅九圍歡呼萬國昔艱難云始胡塵首起於盧龍今開泰有期漢將先清於涿鹿人謀允若靈貺昭然固已上慶祖宗下光編䇿籙圗洪範競三古之殊猷玉檢金泥有百神之靈祐臣雖當防遏不介邉陲空增氣於懦夫實叨榮於下將日圍千里天盖九重奉一月之捷書唯知抃蹈獻萬年之夀酒尚隔班行念風水於遐藩寄夣寐於宣室無任望闕結戀之至文苑英華卷五百六十八
