body:
  text: 文苑英華卷五百五十九宋李昉等編賀赦二為建安王賀赦表一首為益州刺史賀赦表一首賀廣德二年大赦表一首賀永泰改元大赦表一首為譙郡唐太守賀赦表一首代路冀公賀改元赦表一首賀平賊赦表一首賀南郊大赦表一首賀貞元大赦表一首代韋中丞賀元和大赦表一首代杜司徒賀大赦表一首禮部賀册皇太子禮畢赦表一首賀册太子赦表一首為監軍賀赦表一首為鄭尚書賀登極赦表中書門下賀赦表一首賀德音表二首為建安王武攸宜為同州刺史賀赦表武后富嘉謨臣某言今月七日奉十月二十三日制書大赦天下日者關輔之地鑾輅曠逰山川望幸積有年嵗是以西土耆老東首纍祈濬城隍修宫室考舊邦之式稱長安之盛福應旋一作還至嘉穀屢升故奉時無違乘輿乃降六龍大動群方咸悅蓋三光增曜而漢祚隆萬户加嚴而髙居壯紫宸端拱朝諸侯而垂統鴻霈一作寢流恩申三宥而作典浹洽遐邇孰不抃躍臣寄重軍州地連肺腑載覃天恩不勝悅豫無任踴躍之至謹奉表陳賀以聞謹言為益州刺史賀赦表中宗閭丘均臣某言臣伏奉二月二十二日制書大赦天下恭惟大賚踴躍無地臣聞德至於天禎符幽感業齊於聖神物昭光伏惟應天皇帝陛下纂復睿謨祗定天保英茂開聰聖之體文章煥皇王之列一作烈道疑作天祿錫胤卜食延休順天翊聖皇后垂耀軒轅命兆沙麓明章教訓以致其功隂祗助宣於陽靈坤德承順於乾道是故貺流椒掖慶發瑶筵祥裔五靈一作祥矞五雲絳丹黃而振色禕䄖六服合黼藻而融文皇歡載紆滂澤時降洗滌逋穢洽潤資生闕宥闕死之愆榮加命婦之爵凡在區宇孰不載欣臣忝二方嶽化理蔑聞參一物而霑恩齒同列以稱慶無任下情蹈舞之至云云賀廣德二年大赦表代宗元結臣某言臣伏奉某月日赦某月日宣示百姓訖伏惟皇帝陛下以慈惠馭兆庶以謙讓化天下凡所赦宥皆允人望凡所敦勸皆合大經生識之類不勝大幸臣方領陛下州縣守陛下符節不得稱慶下位蹈舞闕庭不任歡戀之至謹遣某官奉表陳賀以聞賀永泰改元大赦表代宗臣某言某月日恩赦到州宣示百姓訖百姓貧弱者多勞苦日久忽蒙惠澤更相喜賀歡呼抃躍不自禁止伏惟皇帝陛下增修典禮𢎞正紀度勞謙慈惠與人更新此實興王之盛烈明聖之至德戴履天地誰不慶幸臣方鎮守州縣不得蹈舞闕庭無任歡欣之極集作至謹奉表陳賀以聞為譙郡唐太守賀赦表獨孤及臣某言伏奉二月五日制書大赦天下喜氣動天榮光被物鬼集作百神踴躍衆庶悅豫臣某誠歡誠喜頓首頓首臣聞天類表作大道所寶莫先於慈聖人之德無以加孝陛下執大象以御物不得已而用兵假一戎之威為萬物戡難再造區宇以康黎元慈之至也纂服配天不失舊物然後增鴻名以嚴父正榮號以恭已元元本本尊尊親親孝之大也猶慮物有不遂其性政有不阜於俗𢎞肆眚之恩與天下更始滌瑕蕩穢燃幽及微風行物表鏡照海內雷作而萬户蟄振網開而三面鳥飛陽春無私品物何幸臣位忝邦守預沐渥類表作湛恩無任抃躍之至謹奉表陳賀以聞代路冀公賀改元赦表王綽總目作緯臣某言伏奉某月日制書大赦天下改元罪無輕重一皆蕩滌率土生靈孰不歡抃臣聞生植長育天地之大德在宥布和后王之盛典伏惟皇帝陛下以道御時與天合運當文武之際恢中興之功轉黃道而三象昭明鼓洪爐而二儀貞觀方告成於郊廟且降祉於神人而猶旁詢時議中守謙德爰輟盛禮載布湛恩正元氣以紀年惠一作恩人心而垂化緩死申柔服之義念功宥脅從一作制之徒然後用唐虞官人之訓追周漢考績之法節用所以厚下懋賞所以勸勞誠明動天地利澤施四海大易云神武不殺太上稱仁方之聖猷實有慙德臣謬専方鎮獲奉明詔疲劣何幸沐浴皇風欣抃之至倍萬恆情云云賀平賊赦表戴叔倫臣某言伏奉某月日制書大赦天下雪滌痕纍發生枯朽榮光被於草木和氣貫於華夷含生之徒罔不胥悅臣聞氣沴為襖蒙蔽二曜而祥風掃蕩無損日月之光狂逆亂常震驚四海而玄功戡定不虧天地之大伏惟皇帝陛下文武繼聖聰明在躬協堯舜之心崇禹湯之德清廟禮展圓丘敬申猶顧已以求瑕布恩澤以滌一作原過康哉沛乎虞夏之盛典也臣忝職藩條實慙尸曠徒積嵗星蔑聞化理望九重而稱慶齒百辟以霑恩瞻戀闕庭慶快之至賀南郊大赦表德宗吕頌臣某言伏奉去年月日制書禮展郊禋告成上帝一作展功成禮郊丘上帝恩霑動植道洽幽明東風變而四海春聖帝一作人作而萬物覩懷生庶類罔不歡抃中賀伏惟皇帝陛下體元立極撫運受圗御一氣以乘乾飛六龍而出震德合天地明齊日月叶三光之幽贊承八聖之睿謀頃者國步未康王室多難兵纒禍結害及生人塵飛寢園燧燭郊甸陛下乘時順動鑾駕南巡凡在食土之毛圓首之類豈一作莫不號天向闕望氣瞻星遂得猛士雷奔義旗雲合西戎自效北狄爭驅一舉而氛祲掃清暫勞而寰宇大定則知千年降聖天命有歸六合奉尊神器斯在今農郊罷戰邉徼無虞九有一作服偃戈八一作萬方同軌荷皇慈之覆育知聖祚之靈長匪人革心罔不咸率陛下勤禹湯之罪已法堯舜以為心肅恭神明虔奉宗廟損抑徽號憂濟黎元始自迎長之初大申報本之禮册勳旌舊列爵分官宥死緩刑掩骼埋胔粟帛周於耆老一作耋奠酬及於幽寃天覆海渟與人更始釋羸俘於死地俾異域而生還赦枯木之嚴刑蠲執弓一作殳之常賦臣及三軍百姓蠻夷酋長等伏讀制書沐浴玄澤莫不喧呼抃躍蹈舞徘徊絶徼窮荒盡沐生成之造翾飛蠢動俱承雨露之恩臣限以藩守不獲稱慶闕庭無任踴躍慶抃之至一作皆唐類表賀貞元大赦表已見五百五十八卷李吉甫代韋中丞賀元和大赦表憲宗栁宗元臣某言伏奉正月二日制書大赦天下永貞二年冝改為元和元年者太陽既升煦育資始霈澤斯降膏潤無遺臣某誠慶誠賀頓首頓首伏惟皇帝陛下仁化旁流孝理𢎞闡紀元示布和之令肆眚見恤人之心曠然滌瑕得以遷善渙發大號申明舊章農有薄征市無強賈集作價勳勤是録爵秩以集作已班寵寧間於幽明澤必周於夷夏近甸輕榷酤之入逺人忘水旱之災既行慶於官類表作宫寮亦推恩於天屬諸生喜黌孰之廣庶老加絮帛之優量入所以備凶興亷期於變俗爰褒有客尊賢之典惟新載奉素王宗豫之道斯在綸言一降庶政畢行懷生之倫感悅無量臣某守在遐逺親奉詔條踴集作踊躍之誠倍百恆品無任感恩抃舞屏營之至謹奉表陳賀以聞代杜司徒賀大赦表憲宗吕溫臣某言伏奉集作見今月二日制書改元元和大赦天下新雲雷集作雷雨之澤重日月之光仁被幽遐慶覃動植三元經始萬化惟新臣某誠歡誠抃頓首頓首臣聞羲軒馭宇類表作物堯舜為君德莫盛於好生政莫𢎞於在宥然而事資體要理極精微百王所難千載斯遇伏惟皇帝陛下纂臨大寶光硌睿圗當獻嵗之元順陽和集作春之氣朝前殿御正門發德音布慈旨明大孝之本褒至忠之後省役輕集作徭損稅以清疾苦之源蕩纍滌瑕以厚亷耻之俗往典之所未舉前代之所未該莫不悉出宸衷咸歸聖政坐聞仁夀之域行集作佇見雍熙之朝集作期凡在生靈孰不慶幸况臣陳力滋集作嵗久受恩最深而蒲栁餘年犬馬多疾不獲捧觴丹陛蹈詠康衢猶蒙天眷留缺聖慈曲至特降中使俯加慰勉衰憊增氣枯朽生光施重丘山感深骨髓闔門灰粉豈足上報無任喜抃集作懼屏營之至禮部賀册皇太子禮畢赦集作德音表栁宗元臣某等言伏奉今日制書皇太子册禮云畢恩與萬方同其惠澤者盛典斯舉鴻恩遂行凡在率土不勝抃躍臣某等誠喜誠賀頓首頓首伏惟陛下克奉神休以正邦統建天下之本宗廟以安致萬國之貞兆人休賴典册既備慶澤載流既廣愛而推恩亦好生而布德緩刑而囹圄知感進勳而嗣續增榮崇教諭之方忠良是舉嚴贊相集作褒之禮賜與有加旌孝悌以厚於人倫敬鬼神而修其祀事况行禮之日則屏翳收迹太陽宣精用彰出震之休更表重離之耀神化旁暢皇風逺揚自華及夷異俗同慶臣某等謬參著定倍百恆情無任歡慶踴躍之至賀册太子赦表令狐楚臣某言伏奉今月九日制書皇太子册禮云畢恩與萬方同其惠澤者國慶遐宣天波曲被懷生之類咸共欣榮中賀臣聞德教所加一人有慶元良既立萬國以貞伏惟皇帝陛下至化旁流神功廣運以為義莫重於主鬯禮無大於承祧考古揚前星之光順人類表作時𢎞少海之澤誕敷明詔宣告庶萬英華作萬國非雷初動於地中風已行於天下類表作正由是哀矜罪戾甄奬功勳類表作動勤表順孫孝子之門秩名山大川之祝仁無不覆惠無不均草木惟繇鳥獸咸若率土臣子不勝慶抃臣限守藩鎮不獲陪位闕庭踴躍稱慶無任屏營之至為監軍賀赦表臣某言今月四日節度使伏奉制書大赦天下者渙汗大號滂沱鴻恩降自九天被於四海懷生之類無不慶躍中賀臣聞天地之大德本於生成聖人之全功在乎化育伏惟皇帝陛下至明立極大聖統天法貞觀之宏規纂建中之盛業降哀矜於罪戾一物不遺頒寵贈於忠勤萬方皆及事遵儉約道在寬𢎞散作仁風灑為膏澤率土臣下不勝歡喜臣限以監守未獲奔走稱慶闕庭不勝戀結欣戴之至謹遣某官某奉表陳賀以聞為鄭尚書賀登極赦表已見五百五十八卷中書門下賀赦表憲宗令狐楚英華作獨孤及非臣某言伏見今日制書御丹鳳門大赦天下者明照六幽澤流九有臣等誠歡誠喜頓首頓首臣聞覆幬生成乾坤之盛德疆理化育帝王之極功伏惟睿聖文武皇帝陛下受天元符纂聖光宅躬夏禹之勤儉體帝堯之聰明除惡必絶其根耀武威而四凶既殛制政皆循一作修其本振文教而百度惟貞今者東風發春元日獻嵗凝旒視朝於正殿步輦臨御于應門開龎鴻之湛恩孚渙汗之大號萬物瞻覩兆人允懷至若移其放逐解網一作生之仁也弔彼傷殘納隍之義也罷開市之征稅足以𢎞聖人厚下之風褒卿士之祖先足以廣聖人追逺之孝潛蟄一振稿根一作根蒖盡榮普天率土不勝慶幸臣某等謬司樞務虔奉德音喜抃之誠倍百恆品無任慶躍屏營之至賀德音表憲宗臣某等言伏見今月二十八日制書普類表作惠安羣生憂濟庶士每念下農艱苦賑紅粟而流衍知貪賈滯財禁青蚨之飛走千官聳聽萬國欽聞中賀臣聞損有餘補不足太上類表作大帝之教也斂以輕散其重哲王之制也肇自古昔垂為憲章其或法因情遷事與時異則物力甚屈人心用咨是故書載行之惟艱史稱守而勿失伏惟睿聖文武皇帝陛下紹興丕圗光啓鴻業勤恤人隱精知化源以為麥禾雖登農食猶歉布帛大賤女工必傷因發生之時下慈惠之詔清問疾苦昭宣令宜嚴除暴征令已逋責首自京國逹于淮湖三方雖遙如視以宸鑒萬機類表作務誠衆皆經於睿心自然事耕桑者忘四體之勤遊市井者樂一朝之便慶共雲布恩隨風翔率土之內不勝慶類表作欣幸臣等叨逢聖運預類表作皆列班榮攀日月之光無能獻替遇雲雷之澤空荷霑濡捧戴德音不任抃躍屏營之至賀德音表文宗劉禹錫臣某言伏見今月十六日德音布告遐邇天道下濟人情大安中賀伏惟皇帝陛下凝旒思理垂衣擇材以日月無私之光照寰區有截之內貴使下情盡逹寧虞厚貌潛謀一昨李訓鄭注等敢有逆心兼連凶黨陛下睿謀神斷左右協同集作心頃刻之間掃除已定重臣畢力禁旅竭忠氛祲廓清華夷咸悅言念政刑之外或有詿誤之徒再發德音廣宣聖澤當星紀回天之日迎陽和煦物之光懷危疑者如山之安欲告訐集作訴非者望風知懼非同謀者一切不問未結正者三宥從寬含生之倫普天同感臣恪居官次不獲稱賀闕庭臣無任此卷英華所編失年代先後之次序今正之文苑英華卷五百五十九
