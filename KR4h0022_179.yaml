body:
  text: 文苑英華卷一百七十九宋李昉等編應令應教附應令三十七首應教二十四首應令侍遊新亭應令梁簡文帝神襟愍行邁岐路愴徘徊遙瞻十里陌傍望九成臺鳯管流虛谷龍騎藉春荄曉光浮野映朝煙承日回沙文浪中積春隂江上來栁葉帶風轉桃花含雨開聖情藴珠綺札命表英才顧憐碔砆質何以儷瓊瓌餞廬陵內史王修應令前人餞行臨上節開筵命羽觴回池㵼飛棟濃雲垂畫堂疏槐未合影反日暫流光園梅斂新藻階蕙結初芳奉和簡文帝太子應令劉孝威太子天下本元良萬國貞周朝推上嗣漢代慙重明前星涵瑞彩洊雷揚逺聲三善得樂正百行紀司成九流遍已辨七經咸所精博聞強子政髙才陵長卿禮尊逾屈已德盛益卑情仙菊類聚作氣貽鍾相儒道推桓榮延賢博望苑視膳長安城園綺隨金輅浮丘侍玉笙智囊前斂笏端士後垂纓九仙良所重四海更垂纓初學記作誰輕類聚作東傾斑輪同笨乘甲館類聚作觀齊蓬衡奉和六月壬午應令前人玄圃棲金碧虛澗挹一作抱琨瑤築山圖碣岫穿池控一作類海潮雷奔石鯨動水濶牽牛遙乘黿猶怯渡鞭石遂成一作類為橋崖崩下生窟壁峭上干霄噪蛙常􅍦沸遊魚或自跳荒徑橫臨浦空舟斜插橈愁鴟集古樹白鷺隱青苖神一作乍心重丘壑散步一作微懷漁樵石壘元卿徑枝挂許由瓢伊臣本寂寞一作默由來畏市朝為貪山水心所意惟逍遙寄言周伯沆勞君擅縠綃侍宴餞陸倕應令蕭子顯儲皇餞離送廣命傳羽觴侍遊追曲水開宴等清漳新泉已激浪初卉始含芳雨罷葉增緑日斜樹影長餞張惠紹應令劉孝綽鮮雲積上月凍雨晦初陽回風翻類聚作揚集作飄淑氣落景煥集本類聚並作渙新光竹萌始防露桂樾集作梃已含芳瑤階變杜若玉沼發攢蔣聖襟集作襟惜岐路曲宴闢蘭堂侍宴離亭應令前人轘轅東北望江漢西南永羽旗映日移鐃吹臨風警令王愍追送纚集本類聚並作纜舟宴俄頃掩𬒮眺征雲銜杯惜餘景首燕徒有心局步何所集本類聚並作由騁侍宴集賢堂應令前人北閣類聚作閣時既一作見啓西園又已闢官屬引鴻鷺朝行命金璧伊臣獨何取隆恩徒自昔布武登玉墀委坐陪瑤席綢繆參宴笑淹留奉觴醳壺人告漏晚煙霞起將夕反景入池林餘光映泉石侍宴應令庾肩吾副君時暇豫曽城聊近遊清池㵼飛閣疏樹出龍樓北陸氷方壯西園春欲抽類聚作周梅心芳屢動蒲節促難收徒然欣類聚作須並命無以厠應劉侍宴宣猷堂宴湘東王應令前人陳王驂駕反副后西園遊並命登飛閣列樹類聚作坐對芳洲桂岩逢暮序菊水值窮秋竹徑簫聲發蘭門琴曲幽徒奉文成誦空知思若抽從皇太子出玄圃應令前人春光起麗譙屣步陟山椒閣影臨飛蓋鶯鳴入洞簫水還澄故渚樹長合前橋緑荷生綺葉丹藤上細苗顧循慙良藻何用擬瓊瑤侍宴宣猷堂應令前人副君德將聖陳王才掞天歸來宴平樂置酒對林泉爐香雜山氣殿影入池漣豔舞時移節新歌屢上絃聼曲慙回顧思經徒欲眠侍宴餞湘東王應令前人陳王從逰士髙宴入承華並載同連璧雕文類簡一作揀沙落猿時動樹墜雪乍類聚作慙搖花念此離筵促方愁別路賖奉和太子納涼梧下應令前人北圍涼氣早步輦暫逍遙避日交長扇迎風列短簫山帶彈琴曲桐橫棲鳯條懸門開溜水錦石鎮浮橋黑米生蘇葉青花出稻苖無因學仙藻雲氣從飄颻奉和春夜應令前人春牖對芳洲珠簾新上鈎燒香知夜漏刻燭驗更籌天禽下北閣織女入西樓月皎疑非夜林疏似更秋水光懸蕩壁山翠下添流詎假西園宴無勞飛蓋遊暮遊山水應令得磧字前人餘香屬清夜西園恣逰歷入徑轉金輿開橋通畫艗類聚作鷁細藤初上援新流漸涵磧雲峰沒城栁電影開巖壁侍宴餞新安太守蕭幾應令劉孺芝蓋延藻類聚作近薄景畫石寫油雲玄覽多該洽聖思究前聞微密操類聚作探精義優遊妙典墳餞飲參多士言贈賦新文侍宴餞東陽太守蕭子雲應令張纘仲月發初陽輕寒帶春序緑池解餘凍丹霞霄疑新雨良守謁承明仙舟式類聚作戒蘭渚皇儲惜將邁金樽留宴醑征虜亭送新安王應令徐陵鳳吹臨南浦神駕餞東平亭回漳水乘斾轉洛濱笙地凍斑輪響風嚴羽蓋輕燒田雲色暗古樹雪花明岐路一回首流襟動睿情奉和夏日應令庾信珠初學記作朱簾卷嚴日翠幕蔽重陽五月炎蒸氣初學記作氣蒸三時刻漏長麥隨風裏熟梅逐雨中黃開氷帶井水和粉雜生香衫含蕉葉氣扇動竹風涼早菱生軟角初蓮開細房願陪仙鶴舉洛浦聼笙簧侍宴東宫應令于仲文銅樓充震位銀榜集佳賔青宫列紺幰紫陌結朱輪絃調寶瑟曲歌動畫梁塵金巵傾斗酒瓊筵列八珍花驚度翠羽萍散躍赬鱗承恩叨並作扣寂繞陽春侍皇太子宴應令沈君道副君監撫暇禁苑暫停輿初學記作車水落金沙淺雲髙玉葉疏隨厨白羽扇學記作燕逐釣紫鱗魚飽德良無已榮陪終宴餘同前一作和初春宴東堂應令劉端睿賞叶春芳開筵臨畫堂庭梅飄早粉簷栁變初黃八珍羅玉爼九醖湛金觴筝響流飛閣歌塵拂妓行何必西園夜空承明月光奉和悲秋應令王胄秋天擬文學秋水擅莊蒙草濕蒹葭露波卷洞庭風便坐翻桑葉一作莢長坂歇蘭藂簷喧猶有燕波疑作陂靜未來鴻蟬噪一作唱聞疑斷池清映似空劉安悲落木曹植歎征蓬重明豈凝滯無纍在淵沖隨時四序合應物五情同發言形惻隱睿作挺神功下材均朽木何以慕雕蟲此篇前五韻按初學記作蕭慤秋日詩文苑一百五十八卷復云庾信作而此卷乃十韻共題王胄作觀其詞意只是一篇當以此本為正宴樂修堂應令江總見初學記肅城通甲觀承華啓畫堂北宫降恩賞西園度羽觴殊思奉玉裕終宴在金房庭暉連樹彩簷影接雲光仙如伊水駕樂似洞庭張彈絲命琴瑟吹竹動笙簧庸疏濫應阮衰朽惡連章奉和初秋西園應令蕭慤見初學記池亭三伏後林館九秋前清泠間泉石散漫雜風煙蕖開千葉影榴艷百枝燃約嶺停飛斾凌波動畫船奉和初春出逰應令李百藥鳴笳出望苑飛蓋下芝田水光浮落照霞彩淡輕煙栁色臨三月梅花隔二年日斜歸騎動餘興滿山川奉和禁苑餞别應令禇亮大蕃初錫瑞出牧邇皇京暫以緑車重言承朱傳榮舒桃臨逺騎垂柳映京營惠化宣千里威風動百城禁篽芳春初學記作嘉節神襟餞送情金笳催别景玉管切離聲野花開且落山鳥哢還驚微臣夙多幸薄宦奉儲明鈞臺慚作賦伊水濫聞笙懷德良知久酬恩識命輕奉和同太子監守違戀韓王元嘉乾象開層構離明啓少陽卜征從獻吉守器屬元良逖矣凌周頌遙哉掩漢莊好士傾南洛多才盛北陽初學記作場地分丹鷟嶺途間白雲鄉儲誠虔曉夕宸愛積炎涼珠璧連霄漢萬物仰重光同前薛元超儲禁銅扉啓宸行玉車犬遙空懷夀街吏尚隔寢門朝地首瞻龍戟塵外想鸞鑣飛文映仙榜瀝思叶神飈帝念紆蒼陸乾文煥紫霄雲塘橫筆海平圃山海經槐江之山實維帝之平圃振詞條欲應重輪曲鏘洋韻九韶汴水早發應令虞世基夏山朝萬國軒庭會百神成功疇與讓盛德今為鄰區宇屬平一庶類仰陶鈞鑾蹕臨河濟裘冕肅柴禋啓行分七萃備物象三辰祁祁亘原隰濟濟咸搢紳㿩谷升朝景青丘發早春衮衣敷帝則分器敘彛倫臨淄成誦美河間雅樂陳薰風穆已被茂實久逾新奉和長春宫應令虞世南瑤山盛風樂南皮象逸遊何如事巡撫民瘼諒斯求文鶴揚輕蓋蒼龍飾桂舟泛沫縈沙嶼寒澌擁急流路指八仙館途經百尺樓眷言昔遊踐回駕且淹留後車喧鳯吹前旌映采斿龍驂駐六馬飛閣上三休調諧金石奏歡洽羽觴浮天文徒可仰何以厠琳球追從鸞輿夕頓戲下應令前人重輪依紫極前耀奉丹霄天經戀宸扆帝命扈仙鑣乘星開鶴禁帶月下虹橋銀書含曉色金輅轉晨飈霧徹軒雲初學記作營近塵暗斗城遙蓮花分繡蕚竹箭下驚潮撫已慙龍幹承恩集鳯條瑤山盛風樂抽簡薦徒謠春日出苑逰曯唐玄宗三陽麗景早芳辰四序佳園物候新梅花百般障去路垂栁千條暗回津鳥飛直為驚風葉魚沒都由怯岸人唯願聖主南山夀何愁不賞萬年春和同前應令張説禁林艷裔發青陽春望逍遙出畫堂雨洗亭臯千畝緑風吹桃李一園香鶴飛不去隨青管魚躍翻來入綵航睿賞歡承天保定遒文更覩日重光同前賈曾銅龍曉闢問安回金輅春逰博望開渭水清光搖草樹終南佳氣入樓臺招賢已從商山客託乘還徴鄴下才臣在東周􅍦留滯欣逢睿藻日邉來皇太子頻賜存問并索唱和新詩因有陳謝釋廣宣望苑招延後禪扉訪道餘秪言俟文雅何意及庸虛率性多非學緣情偶自書清風聞寺響白日見心初重道逢軒后崇儒過魏儲青宫列芳梓玄圃積瓊琚鄭鼠寧容者齊竽久舍諸空懷受恩感含思幾躊躇應教和晉安王薄晚逐涼北樓回應教庾肩吾向夕紛喧屏迎涼飛觀中樹影臨城日窗含度水風遙天如接岸帆影似陵空陪文慙宋玉徒等侍蘭宫詠朝牀應教前人傳名乃外域入用信中京足欹形已正文斜體自平臨堂對逺客命旅誓初征何如淄館下淹留奉盛明奉和泛舟漢水往萬山應教前人桂棹沙棠船飄揚橫大川映巖沉水底激浪起雲邉回一作回岸髙花發春塘細草懸陪歌乘睿賞接醴侍恩筵誰云李與郭獨得似神仙北園新齋成應教庾信紅粉跂鳥翼山節拱蘭枝畫梁雲氣繞雕窗玉女窺月懸唯反照蓮開長倒垂盤根細壞石行雨暴澆池長藤連格徙髙樹帶巢移鳥聲唯雜曲花風直亂吹白虎題書觀玄熊帖射皮文絃入舞曲月扇掩歌兒玉節調笙管金船代酒巵若論曹子建天人本共知春初賦得池應教張正見遙天收密雨髙閣映奔曦雪盡青山路氷消緑水池春光落雲葉花影發晴枝琴樽奉終宴風月豈云疲從籍田應衡陽王教前人帝京惟赤縣宸居映紫微塗山萬國仰滄海百川歸東作事平秩仲月祀靈威含光開早扇閶闔啓朝扉洛城鐘漏息靈臺雲霧卷森森虎戟前靄靄鸞旗轉屬車猶類聚作逰綘闕風馬類聚作鳥度丹巘帳殿幸金輿旌門擁玉輦玉輦帶飛煙金輿映緑川雨師清逺路風伯靜遙天分渠通沃野激水入類聚作繞公田草發青壇外花飛蒼玉邉蒼玉臨初學記作陳圭璧青壇躬帝籍冒撅乃三吹齊衡均百辟蘭場儼芝駕桂圃芳瑤席山禽詠管絃野獸和鐘初學記作金石鐘石既相和江海復無波梁客簮裾盛陳王文雅多修塗參弱駘喬木閉類聚作問輕蘿幸承溫吹末擊壤自為歌衡陽王秋夜應制前人雎苑涼風入章臺雲氣收螢光連燭動月影帶河流緑綺朱絃泛黃花素蟻浮髙軒揚麗藻即事賦新秋賦得新題梅林輕雨應教前人梅樹耿長虹芳林散輕雨蜀郡隨仙去陽臺帶雲聚飄花更濯枝潤石還侵柱誰初學記作詎得零陵燕隨風時共舞詠雪應衡陽王教前人九冬飄逺雪六出表豐年睢陽生玉樹雲夢起瓊田入窗輕落粉拂栁駛飛綿欲動淮南賦亂下桂花前暮秋望月示學士各釋愁應教徐儀碣石寒光逺闕秋色髙長洲正下葉曲岸已飛濤君王悵晚節延佇謁神臯復屬西園夜輕輦暫遊遨遊遨未云賞蒼梧孤月上枝間影合離波上光來往此夕未央宫應照仙人掌掌髙明轉淨夜深留睿想處處敞髙扄流照滿珠庭重輪入雅曲合璧應祥經燦爛浮珠網參差間玉星山幽有芳桂林靜發新蓂蓂開在帝城分枝共月明斜暉漸西落彌軫闕歸情驂駕且來遊聖藻命舒愁詢芻以蠲痗參妙本難酬良吏稱太閎因時命應劉楚王追緑兕齊后出青丘馳原落雲翼截水曳吞舟無勞子虛吒即事可忘憂賦得微雨諸葛頴微雨間初學記作暗東峰散漫灑長松澗滿新流濁山霑積翠濃風起還吹燕雲來本送龍登年隨玉燭名山定可封奉和望山應教蕭慤仙逰本多趣復此上秋初巖低石倒嶮嶺髙松更疏峰形疑鳥翅塞路似狼居矚望清初學記作情無已詞殫意有餘奉和濟黃河應教前人大蕃連帝室驂駕奉皇猷未明驅羽騎凌晨方畫舟津城度維錦岸栁夾緹油鐃初學記作鍾聲揚别島旗影照滄流早光生劍服朝風起節樓滔滔細波動裔裔輕舷浮回橈避近磧放舳下前洲全疑上天漢不異謁蓬丘望知雲氣合聼識水聲秋從軍何等樂喜從神仙逰奉和晚日楊子江應教栁顧言詰旦金鐃發驂駕出城闉鮮雲臨葆蓋細草藉斑輪千里煙霞色四望江山春梅風吹落蘂酒雨減輕塵日斜歡未畢睿想良非一風生疊浪起霧卷孤帆出掞藻麗繁星髙論光朝日空美鄒枚侣終謝淵雲筆初學記亦載一篇其題目與栁顧言姓名並同詩却云大江都會所長洲有舊名西流控岷蜀東泛邇蓬瀛未覩纖羅動先聼逺濤聲空濛雲色晦浹疊浪花生欲知暮雨歇當觀飛斾輕未詳孰是梅夏應教薛道衡長廊連紫殿細雨應黃梅浮雲半空上清吹隔池來集鳯桐花散勝龜蓮葉開幸逢為善樂頻降濟時才詠寒食鬪雞應秦王教杜淹寒食東郊上雜詠作道揚韝競出籠花冠初照日芥羽正生風願敵知心勇先鳴覺氣雄長翹頻掃陳利爪雜詠作距屢通中飛毛遍緑野灑血積雜詠作散芳藂雖然百戰勝會自不論功奉教追赴九成宫途中口號李嶠委質承仙翰祗命遄遙䇿事偶從梁遊人非背淮客長驅歷川阜迥眺窮原澤鬱鬱桑柘繁油油禾黍積雨餘林氣靜日下山光夕未攀叢桂巖猶倦飄蓬陌行當奉麾蓋慰此勞行役宴龍泓有序不録武三思登臨開勝託眺矚盡良遊嵒崿縈紆上澄潭曲屈流泛蘭清興洽折桂野文遒别後相思處﨑嶇碧澗幽奉和梁王宴龍泓應教宋之問水府淪幽壑星軺下太微鳥驚司僕馭花落侍臣衣芳樹搖春晚晴雲繞坐飛淮王正留客不醉莫言歸奉和夏日逰山應教蔡文恭首夏林壑清薄暮煙霞上連巗聳百仭絶澗臨千丈照灼晚花鮮潺湲夕流響悠然動睿思息駕尋真賞掞彼渦州作懷兹洛濱想竊吹等齊竽何用承恩奬敕借岐王九成宫避暑之作應教王維帝子逺辭丹鳯闕天書遙借翠微宫隔窗雲霧生衣上捲幔山泉入鏡中林下水聲喧笑語巗間樹色隱房櫳仙家未必能勝此何事吹笙向碧空從岐王過楊氏别業應教前人楊子談經處淮王載酒過興闌啼鳥換坐久落花多徑轉回銀燭林開散玉珂嚴城時未啓前路擁笙歌從岐王夜宴衛家山池應教前人座客香貂滿宫娃綺幔張澗花輕粉色山月吐燈光積翠紗窗透集作暗飛泉繡戶涼還將歌舞出歸路莫愁長文苑英華卷一百七十九
