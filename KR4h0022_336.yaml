body:
  text: 文苑英華卷三百三十六宋李昉等編酒獨酌謡一首勸酒二首惜空樽酒一首醉歌十首致酒行一首秦王飲酒一首酒肆行一首四不如酒一首獨酌謡沈煙獨酌謡獨酌謡獨酌獨長謡智者不我顧愚夫余不要不愚復不智誰當余見招所以成獨酌一酌一傾瓢生涯本漫漫神理暫超超再酌矜許史三酌傲松喬頻煩四五酌不覺凌丹霄倐忽集作爾厭五鼎俄然賤九韶彭殤無異葬夷跖可同朝龍蠖非不屈鵬鷃本逍遙寄語號呶侣無乃太塵囂勸酒二首白居易昨與美人對樽酒朱顔如花腰似栁今與美人傾一杯秋風颯颯頭上來年光似水向東去兩鬢不禁白日催東鄰起樓髙百尺璇題照日光相射珠翠無非一作緋衣二八人盤筵何啻三千客鄰家儒者方下帷夜誦古書朝忍饑身年三十未入仕仰望東鄰安可期一朝逸翮乘風勢金榜髙張登上第春闈未了冬登科九萬摶風誰與繼不逾十稔居台衡門前車馬紛縱橫人人仰望在何處造化筆頭雲雨生東鄰髙樓色未改主人一作父云亡息猶在金玉車輿一不存朱門更有何人待墻垣反鎖長安春樓臺漸漸屬西鄰松篁薄暮亦棲鳥一作鳥棲鳴桃李無情還笑人憶昔東鄰宅初構雲甍彩棟皆非舊玳瑁筵前翡翠棲芙蓉池上鴛鴦鬭日往月來凡幾秋一衰一盛一作皆何悠悠但教帝里笙歌在池上年年醉五侯二勸君一盞集作杯君莫辭勸君兩盞集作杯君莫疑勸君三盞集作杯君始知面上今日老昨日心中醉時勝醒時天地迢迢日集作白長久白兔赤烏相趂走身後堆金到集作柱北斗不如生前一樽酒君不見春明門外天欲明喧喧集作喧喧歌哭半死生遊人駐馬出不得白輿紫車爭路行歸去來頭巳白典錢將用沽酒喫惜空樽酒一作將進酒見一百九十二卷李白梁園醉歌集作梁園吟我浮黃河去京闕挂席欲發集作往一作遊波連山天長水濶厭逺涉訪古始及平臺間平臺為客憂思多對酒集作對來遂作梁園歌却憶蓬池阮公詠因吟渌水揚洪波洪波浩蕩迷舊國路逺西歸安可得人生達命豈暇愁宜飲美酒登髙樓平頭奴子搖大扇五月不熱如集作疑清秋素集作玉盤楊梅為君設吳鹽如花皎如雪一作白如雪持鹽把酒但飲之勿作莫學夷齊事髙潔昔人豪貴信陵君今人耕種信陵墳荒城虛集作逺照碧山月古木盡入蒼梧雲梁王賔客集作宫闕今安在枚馬先歸不相待舞影歌聲散渌池空餘汴水流東海沉吟此事淚滿衣黃金買醉未能集作莫言歸連呼五白投一作行六博分曹賭酒看集作酣馳暉或作馳清暉看馳暉歌且謡意方逺東山髙卧還一作時又作忽起來欲濟蒼生未應晚此詩三百四十三卷重出今巳削去注異同為一作湖城東遇孟雲卿復歸劉皓宅宿宴飲散因為醉歌行杜甫疾風吹塵暗河縣行子隔手不相見湖城城東集作南一開眼駐馬偶識雲卿面向非劉皓為地主懶回鞭轡成髙集作城南宴劉侯歎我携客來歎集作歡置酒張燈促華饌且將欵曲終今夕休話集作語艱難尚酣戰照室紅爐簇曙花集作促曙光縈忩素月垂秋集作文練天開地裂長安春集作陌寒盡春一作紫陌寒生洛陽殿豈知驅車復同軌可惜刻漏隨更箭人生㑹合不可常庭樹雞鳴淚如霰集作線蘇端薛復筵簡薛華醉歌前人文章有神交有道端復得之名譽早愛客滿堂盡豪翰集作傑開筵上月集作日思芳草安得健步移逺梅亂插繁花向晴昊千里猶殘舊氷雪百壺且試開懷抱垂老惡聞戰鼓悲急觴為緩憂心搗少年努力縱談笑看我形容巳枯槁座中薛華能集作善醉歌醉歌集作歌辭自作風格老近來海內無集作為長句汝與山東李白好何劉沈謝力未工甫集作才兼鮑昭黎集作愁絶倒諸生頗盡新知樂萬事終傷不自保氣酣日落西風來願吹野水注集作添金杯如澠之酒常快意未集作亦知窮達集作愁安在哉忽憶雨時秋井塌古人白骨生青苔如何不飲令心哀井塌集作竭醉歌行一作醉時歌贈廣文館鄭博士䖍前人諸公衮衮登臺集作華省廣文先生官獨冷甲第紛紛厭粱肉廣文先生飯不足先生有道出羲皇先生有才集作先生有政又作所抱過屈宋德尊一代常坎軻集作壞名垂萬古知何用杜陵野客人更嗤被褐短窄鬢如絲日糴太倉伍升米時赴鄭老同襟期得錢即相覔沽酒不復疑忘形到爾汝痛飲真吾師清夜沉沉動春酌燈集作簷前細雨簷集作燈花落但覺髙歌有集作感鬼神焉知餓死填溝壑相如逸才親滌器子雲識字終投閣先生早賦歸去來石田茅屋荒蒼苔儒術於我何有哉孔丘盜跖俱塵埃不須聞此意慘愴生前相遇且銜杯醉歌行别從姪落第歸前人陸機二十作文賦汝更少年能綴文總角草書又神速世上兒子徒紛紛驊騮作駒已汗血鷙鳥舉翮連青雲詞源倒流三峽水筆陳獨掃千人軍只今年集作生才十六七射策金門期第一舊穿楊葉真自知暫蹶霜蹄未為失偶然擢秀非難取㑹是排風有毛質汝身巳一作即見唾成珠汝伯何由髮如漆春光淡沱待可切秦東亭渚蒲芽白水荇青風吹客衣日杲杲樹攪離思花冥冥酒盡沙頭雙玉瓶衆賔皆集作巳醉我獨醒乃知貧賤别更苦吞聲躑躅涕淚零晦日賀蘭傳楊長史筵醉歌前人樂遊古園萃森爽烟綿碧草萋萋長公子華筵勢最髙秦川對酒平如掌長生木瓢示真率更調鞍馬雄集作狂歡賞青春波浪芙蓉園白日雷霆夾城仗閶闔晴開詄集作映蕩蕩曲江翠幕排銀榜拂水低回舞袖翻緣雲清切歌聲上却憶年年人醉時只今未醉己先悲數莖白髮那拋得百罰深杯亦一作辭不辭聖朝一作巳亦知賤士醜一物但集作自荷皇天慈此身飲罷無歸處獨立蒼茫自詠詩醉行歌贈公安縣顔十少府前人神仙中人不易得顔氏之子才孤標天馬長鳴待駕馭秋鷹整翮當雲霄君不見東吳顧文學君不見西漢杜陵老詩家筆勢君不嫌詞翰升堂為君掃是日風霜凍七澤鳥蠻落照銜赤壁酒酣耳熱忘白頭感君意氣無所惜醉歌行歌主客集作一為辭醉歌歌主客九日宴集醉題郡樓兼呈周殷二判官白居易前年九日在餘杭呼賔命宴虛白堂去年九日到東洛今年九日來吳鄉兩邉蓬鬢一時白三處菊花同色黃一日日知添老態集作病一年年覺惜重陽江南九月未搖落栁青蒲緑粳稻香姑蘇臺榭傍蒼藹太湖山水含清光可憐暇日集作假好天氣集作色公門吏靜風景凉榜舟鞭馬取賔客掃樓拂席排壺觴胡琴錚摐指撥刺吳姬細集作美麗眉眼長笙歌一曲思凝絶金殿再拜光低昂日腳欲下集作落備燈燭風頭漸髙加酒漿觥盞灧翻菡蓞朵集作葉舞鬟擺落茱萸房半酣憑檻起西望集作顧七堰八門六十坊逺近髙低寺間出東西南北橋相望水道脉分棹鱗次里閭碁布城册方人煙樹色無隙罅十里一片青茫茫自問有何才與政髙㕔大館居中央銅魚乃今澤國節刺史自古吳都王郊無戎馬郡無事門有棨㦸腰一作金有章盛時儻來合慚愧壯志集作嵗忽去還感傷從事醒歸應不可使君醉倒亦何妨請君停杯聽此集作我語此語真實非虛狂五旬巳過不為夭七十為期蓋是常須知菊酒登髙㑹從此無多二十場池陽醉歌贈匡廬處士姚巖傑顧雲九華太守行春罷一作暇髙絳紅筵壓花榭四面繁英拂檻開帖雪團霞墜枝亞空中熖若燒藍天萬里滑靜無纎煙絃索緊快管聲脆急曲碎拍聲相連主人憐才多傾興許客酣歌露真性春耐香濃枝盞粘一醉有時三日病黿潭鱗粉解不去鴉嶺蘂花澆不醒肺枯似著爐鞴煽腦熱如遭鎚鑿釘蒙溪先生梁公孫忽然示我十軸文展開一卷讀一首四顧特地無涯垠又開一軸讀一帙酒病豁若風驅雲文鋒斡破造化窟心刃掘出興亡根經疾史恙萬片恨墨炙筆針如有神呵叱潘陸鄙瑣屑提挈揚孟歸孔門時時說及開元理家風颯颯吹人耳吳競纂出升平源十事分明鋪在紙裔孫才業今如此誰人為奏明天子鑾駕何當獵左馮神鷹一擲望千里戲操狂翰涴蠻箋傍人莫笑我率然餘杭醉歌贈吳山人丁仙芝曉幕紅襟燕春城白項烏只來梁上語不向府中趨城頭坎坎鼓聲曙滿庭新種櫻桃樹桃花昨夜撩亂開當軒發色映樓臺十千兊得一作十香滿甕餘杭酒二月春城長命杯酒後留君待明月還將明月送君回致酒行至日長安里中作李賀零落恓惶集作栖遲一杯酒主人奉觴客長夀主父西遊困不歸家人折斷門前栁我集作吾聞馬周昔作新豐客天荒地老無人識空將箋上兩行書直犯龍髯集作顔請恩澤我有迷魂招不得雄雞一聲天下白少年心事當拏雲誰念幽寒坐嗚厄秦王飲酒前人秦王騎虎遊八極劒光照空天自碧羲和敲日玻瓈聲劫灰飛盡今太平集作古平龍頭瀉酒邀酒星金槽琵琶夜棖棖洞庭雨腳來吹笙酒酣喝月使倒行銀雲櫛櫛瑶殿明當門掌事報一更花樓玉鳯聲嬌獰海綃紅文香淺清黃娥集作鵝跌舞千年觥仙人燭樹蠟煙輕青春集作青琴神女也醉眼淚泓泓酒肆行韋應物豪家沽酒長安陌一旦起樓髙百尺碧疏玲瓏含春風銀題綵幟邀上客回瞻丹鳯闕直視樂遊苑四方稱賞名巳髙五陵車馬無近逺晴景悠揚三月天桃花飄爼栁垂筵繁絲急管一時合他壚酒集作鄰肆何寂然主人無厭且專利百斛一釀斯須美集作須㬰一壺費初醲後薄為大偷飲者知名不知味深門潜醖客來稀終嵗醇醲味不移長安酒徒空擾擾路傍過者集作去那得知四不如酒集作琢木曲白居易莫買寶剪刀虛費千金直我有心中愁知君剪不得莫磨解結錐虛勞人氣力我有腸中結知君解不得莫染紅絲線徒誇好顔色我有雙淚珠知君穿不得莫近紅爐火炎氣徒相逼我有兩鬢雪知君銷不得刀不能剪心愁錐不能解腸結線不能穿淚珠火不能銷鬢雪不如飲此神聖杯萬念千憂一時歇文苑英華卷三百三十六
