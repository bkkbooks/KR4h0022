body:
  text: 文苑英華巻二百宋李昉等編樂府九行路難三十一首蜀道難五首行路難四首呉筠洞庭水上一株桐經霜觸浪困嚴風昔時抽心耀白日今旦卧死黄沙中洛陽名士見咨嗟一剪一刻作琶琵白璧規心學明月珊瑚映面作風花帝王見賞不見忘提携把握登建章掩抑摧藏張女彈慇懃促柱楚明光年年月月對君王一作子遥遥夜夜宿未央綵女宫娥一作未央彩女棄鳴箎争見一作先拂拭争一作生光儀茱萸錦衣玉作匣安念昔日枯樹枝不學衡山南嶺桂至今千載猶未知二青𤨏門外安石榴連枝接葉夾御溝金墉城裏一作西合歡樹垂條照彩拂鳳樓遊俠少年遊上路傾心顛倒相戀慕摩頂至足買片言開胸瀝膽取一顧自言家在趙邯鄲翩翩舌杪復劒端青驪白駮的盧馬金覊緑鞍紫絲鞶躞蹀横行不肯進夜夜汗血至長安長安城中諸賢一作貴臣争貴文士一作儒者席上珍復聞梁王好學問輕棄劍客如埃塵吾丘夀王始得意司馬相如適被申大才大辯尚如此何况我軰輕薄人三君不見西陵田縱横十字成陌阡君不見東郊道荒凉蕪沒起寒煙盡是昔日帝王處歌姬舞女達天曙今日翩翩一作翩妍少年子不知華盛落前去吐心吐意一作氣許他人今且一作旦廻惑生猶豫山中桂樹自有枝心中方寸自相知何言歳月忽相一作若馳君之意念一作情意與我離還君玉纛一作玳瑁金雀釵不忍見此使一作便心危四君不見上林苑中客氷羅霧縠象牙席盡是得意忘言者探腸見膽無所惜白酒甜鹽甘如乳緑觴皎鏡華如碧少年持名不肯嘗安知白駒如過隙愽山鑪中百和香鬱金蘇合及都梁逶迤好氣佳容貌經過青𤨏歴紫房已入中山馮后帳復上皇帝班姬床班姬失寵顔不開奉箒供養長信臺日暮耿耿不能寐秋風切切四靣來玉階行路生細草金爐香炭變成灰得意失意湏臾頃非君方寸逆所裁同前王筠千門皆閉夜何央百憂俱集斷人腸探揣箱中取刀尺拂拭機上斷流黄情人逐情雖可恨復畏道逺一作傷畏邊逺乏衣裳已繩一蠒催衣縷復搗百和裛衣香猶憶去時腰大小不知今日身短長裲襠雙心共一袜帕複兩邊作八撮襻帶雖安不忍繫一作縫開孔裁穿猶未達胷前却月兩相連本照君心不照天願君分明得此意勿復流蕩不如先含悲含怨判不死封情忍思待明年同前二首費昶君不見長安客舎門倡家小女名桃根貧窮夜紡無燈燭何言一朝奉至尊至尊離宫百餘處千門萬户不知曙唯聞啞啞城上烏玉蘭金井牽轆轤丹梁翠柱飛流蘇香薪桂火炊雕胡當年翻覆無常定薄命為女心已麄一作必已麄一作何必麄此篇英華作呉筠而二樂府别添第二首却以此篇為費昶今從之二君不見人生百年如流電心中塪壈君不見我昔初入椒房時詎减班姬與飛燕朝踏一作踰金梯上鳳樓暮入一作下瓊鈎息鸞殿栢臺晝夜香錦帳自飄颺笙歌棗下曲一作膝上吹琵琶陌上桑過叨一作䝉恩所賜餘光曲沾被既逢隂后不自專復值程姬有所避黄河千年始一清微軀再逢永無義一作議蛾眉偃月徒自妍傅粉施朱欲誰為不如天泉一作淵水中鳬一作鳥雙去雙歸長比翅同前盧照隣君不見長安城北渭橋邊枯木横槎臥古田昔日含紅復含紫長時留霧亦留煙春景春風花似雪香車玉轝恒闐咽若箇遊童一作人不競攀若箇倡家不來折倡家寶祙蛟龍帔公子銀鞍千萬騎黄鸎一一向花嬌一作黄鶯一向青鳥一作兩兩三三将子戲千尺長條百尺枝月桂星一作丹桂青榆相蔽虧珊瑚葉上鴛鴦鳥鳳凰巢裏鶵鵷兒巢傾枝折飛鳳一作鳳歸去條枯葉落任風一作狂風吹一朝顦顇一作零落無人問萬古摧殘君詎知人生貴賤無終始倐忽湏臾難乆恃誰家能駐西山日誰家能堰東流水漢家陵樹滿秦川行來行去盡哀憐自昔公卿二千石咸擬榮華一萬年不見朱唇将玉一作白貌唯聞青一作素棘與黄泉金貂有時換美一作湏換酒玉塵但摇莫計錢寄言坐客神仙署一生一死交情處蒼龍闕下君不留一作來白鶴山頭一作前我應去雲間海山一作上邈難期赤心㑹合在何時但願堯年一百萬長作巢由也不辭同前一作從軍中行路難二首駱賔王君不見封狐雄虺自成羣慿深負固結妖氛玉璽分兵徴惡少金壇授律勸一作受律動将軍将軍擁旄宣廟畧戰士横戈一作行靜夷落長驅一息背銅梁直指三危逾一作危登又作巴逾劔閣閣道巖嶤起一作迢遥上戍樓劍門遥裔俯靈丘仰關九折無平路江水雙源有急流征役無期返他鄉年歲一作歲華晩杳杳丘陵出蒼蒼林薄逺途危紫葢峯路澁青泥坂去去指哀牢行行入不毛絶壁千重險連山四望髙中外分區㝢夷夏殊風土交趾枕南荒昆彌臨北户川原饒毒霧谿谷多滛雨行潦四時流崩查千歲古漂梗飛蓬不暫一作自安捫蘿引葛度一作陟危巒昔時聞道從軍樂今日方知行路難滄江緑水東流駛炎洲丹徼南中地南中南斗映星河秦川一作關秦塞阻煙波三春邊地風光少五月瀘中瘴癘多朝驅疲斥堠夕息倦誰何一作樵歌向月彎繁弱連星轉太阿重義輕生懷一顧東伐西征凡幾度夜夜朝朝斑鬢新年年歲歲戎衣故㶚城隅滇池水天涯望轉積地際行無已徒覺炎凉節物非不知關山千萬里棄置多重陳重陳多苦辛且悦清笳梅柳曲詎憶芳園桃李人絳節朱一作紅旗分白羽丹心白刃酬明主但令一被一作枝君王知一作識誰憚三邊征戰苦行路難行路難岐路幾千端無復歸雲憑短翰空餘望日想長安二同心常伯軍中作君不見玉關塞色闇邊庭銅鞮雜虜冦長城天子按劔征餘虜将軍受脈事横行七徳龍韜開玉帳千重一作里龜壘動一作龜鼓疊金鉦隂山苦霧埋髙壘交河孤月照連營連營去去無窮極擁斾遥遥過絶國陣雲朝結晦天山寒沙夕漲迷踈勒龍鱗水上開魚貫馬首山前振鵬一作鵰翼長驅萬里讋祁連分麾三令一作命武功宣百發烏號遥碎柳七尺龍文廻照蓮春來秋去移灰琯蘭閨柳市芳塵斷鴈門迢遞尺書稀鴛被相思雙帶緩行路難誓令氛祲靜臯蘭但使封侯龍頟貴頗一作詎随中婦鳳樓寒同前王烈晏客滿長路路長一作難良足哀白日持角弓射人而取財千金誰家子紛紛死黄埃見者不敢言言者不敢廻家人各望歸豈知長不來同前三首李白金罇美酒斗十千玉盤珍羞直萬錢停盃投筯不能食㧞劍四顧心茫然欲度黄河氷塞川将登太行雪暗天閑來垂釣坐溪上忽復乗舟夢日邊行路難行路難多岐路道一作今安在長風破浪㑹有時直掛雲帆濟滄海二大道如青天我獨不得出羞逐長安社中兒赤鷄白狗賭棃栗彈劔作歌奏苦聲曳裾王門不稱情淮隂市井笑韓信漢朝公卿一作侯忌賈生君不見昔時燕家重郭隗擁篲折節無嫌猜劇辛樂毅感恩分輸肝割一作剖膽効俊一作英才昭王白骨縈蔓草誰人更掃黄金臺行路難歸去來三有耳莫洗潁川水有口莫食首陽蕨含光混世貴無名何用孤髙比明一作雲月吾觀自古賢達人功成不退皆殞身子胥既棄呉江上屈平終沉一作投湘水濵陸機英才一作雄才豈自保李斯税駕苦不早華亭唳鶴詎可聞上蔡蒼鷹何足道君不見呉中張翰稱達生秋風忽憶江東行且樂生前一盃酒何湏身後千載名同前崔顥君不見建章宫中金明枝萬萬長條拂地垂二月三月花如霰九重幽深君不見艶彩朝含四寶宫春風旦一作香風吹入朝雲殿漢家宫女春未䦨愛此芳香朝暮㸔㸔去㸔來心不忘攀折将安鏡臺上雙雙素手剪不成兩兩紅粧笑相向建章昨夜起春風一花飛落長信宫長信麗人見花泣憶此珎樹何嗟及我昔初在昭陽時朝攀暮折登玉墀只言歲歲長相對不寤今朝遥相思同前王昌齡雙絲作綆繫銀瓶百尺寒泉轆轤上懸絲一絶不可望似妾傾心在君掌人生意氣好遷捐只重狂花不重賢宴罷調竽奏離鶴廻嬌轉盼泣君前君不見眼前事豈保湏臾心勿異西山日下兩足稀側有浮雲無所寄但願莫忘前者言剉骨黄塵亦相媿行路難勸酒莫辭頻美酒千鍾猶可盡心中片恨何可論一聞漢主思故劍使妾長嗟萬古魂同前李頎漢家名臣楊徳祖四代五公享茅土父兄子弟綰銀黄躍馬鳴珂朝建章火浣單衣繡方領茱萸錦帶玉盤囊賔客填街復滿堂一作坐片言出口生輝光世人逐勢爭奔走瀝膽隳肝唯恐後當時一顧登青雲自謂生死長随君一朝謝病還鄉里窮巷蒼苔一作茫絶知已秋風落葉閉重門昨日論交竟誰是薄俗嗟之一作嗟難重陳深山麋鹿可為一作下為隣魯連所以蹈滄海古徃今一作佳今來稱逹人同前賀蘭進明君不見門前柳榮耀幾一作暫時蕭索乆君不見陌上花狂風吹去落誰家誰家新一作思婦見之歎蓬首不梳心歴亂盛年夫婿長别離歲暮相逢色凋換此詩元題髙適集無之郭茂倩樂府井適集却别載適第二首今既附入而以此篇從樂府為賀蘭作君不見富家翁舊一作昔時貧賤誰比數一朝金多結豪貴百一作萬事勝人徤如虎子孫生一作成長滿眼前妻解一作能管絃妾能舞自矜一朝忽一作見如此却笑傍人獨愁苦東隣少年安所如席門窮巷出無車有才不肯學干謁何用長年一作年年空讀書二長安少年不少錢能騎駿馬鳴金鞭五侯相逢大道邊美人絃歌爭留連黄一作千金如斗不敢惜片言如山莫棄捐安知顦顇讀書者暮宿虚一作靈臺私自憐同前一作連環歌韋應物荆山之白玉兮良工雕琢雙環連月蝕中央鏡心穿故人贈妾初相結思在環中尋不絶人情厚薄苦湏臾昔似連環今似玦連環可碎不可離如何物在人自移上客勿遽歡聽妾歌路難傍人見環環可憐不知中有長恨端同前孟雲卿君不見髙山萬仭連蒼旻天長地乆成埃塵君不見長松百尺多勁節狂風暴雨終摧折古今何世無聖賢五愛伯陽真乃天金堂玉闕疑朝羣仙拍手東海成桑田海中之水慎勿枯烏鳶啄蚌傷明珠行路難艱險莫踟蹰同前馮著男兒轗軻徒搔首入市脱衣且沽酒行路難權門慎勿干平人爭路相催殘春秋四氣相一作更廻換人事何湏再三歎君不見雀為蛤鷹為鳩東海成田谷為岸負薪客歸去來龜反顧鶴徘徊黄河岸上負薪一無此二字起塵埃相逢未相識何用强相猜行路難故山應不改茅舎漢中在白酒杯中聊一歌蒼蠅蒼蠅奈爾何同前顧集作此詩凡三叚皆冠以君不見今英華止載前篇以集本附入顧况君不見古人一作來燒水銀變作北邙山上塵藕絲掛在虚空中一作桂山在虚空一作桂身在虚空欲落不落愁殺人睢水英雄多血刄建章宫闕成煨燼淮王身死桂樹折一作枝徐福一作市一去音書絶行路難行路難生死皆由天秦皇漢武遭下脱汝獨何人學神仙君不見擔雪塞井徒用力炊砂作飯豈堪喫一生肝膽向人盡相識不如不相識冬青樹上掛凌霄歲晏花凋樹不凋凡物各自有根本種禾終不生豆苗行路難行路難何處是平道中心無事當富貴今日覺君顔色好君不見少年頭上如雲髪少壮如雲老如雪豈知灌頂有醍醐能使清凉頭不熱吕梁之水挂飛流黿鼉蛟蜃不敢遊少年恃險若平地獨倚長劍凌清秋行路難行路難昔少年今已老前朝竹帛事皆空日暮牛羊古城草同前釋寶月君不見孤鴈關外發酸嘶度陽越空城客子心腸斷幽閨思婦氣欲絶凝霜夜下拂羅衣浮雲中斷開明月夜夜遥遥徒相思年年望望情不歇取我匣中青銅鏡倩人為君除白髪行路難行路難夜聞西城漢使度使我流淚憶長安同前薛能何處力堪殫人心嶮萬端藏山難測度暗水自波瀾對靣如千里回腸似七盤已經呉坂困欲向鴈門難南北誠一作成湏泣髙深不可干無因善行止車轍得平安同前五首貫休君不見山髙海深人不測古徃今來轉青碧淺近輕浮莫與交地卑只解生荆棘誰道黄金如糞土張耳陳餘斷消息行路難行路難君自㸔二不㑹當時一作初作天地剛有多般愚與智到頭還用真宰心何如上下皆清氣大道𡨕𡨕不知處那堪頓得羲和轡義不義兮仁不仁擬學長生更容易負薪一作心為爐復為火縁木求魚應且止君不見燒金煉石古帝王鬼火熒熒白楊裏三君不見道傍廢井生古木本是驕奢貴人屋幾度美人照影來素綆銀瓶濯纎玉雲飛雨散今如此繡闥雕甍作荒谷沸渭笙歌君莫誇不應長是西家哭休説遺編行者幾至竟終湏合天理敗他成此亦何功蘇張終作多言鬼行路難行路難不在羊腸裏四九有茫茫共堯日浪死虚生亦非一清淨𤣥音竟不聞花眼酒腸暗如漆或偶因片言隻字登第光二親又不能獻可替否航要津口譚羲軒與周孔履行不及屠沽人行路難行路難日暮途逺空悲歎五君不見道傍樹有寄生枝青青鬱鬱同榮衰無情之物尚如此為人不及還堪悲父歸墳兮未期一作朝夕已分黄金爭田宅髙堂老母頭似雪心作數枝一作支淚長滴我聞忽如負芒刺不獨為君空嘆息古人尺布猶可縫潯陽義夫一作丈令人憶寄言世上為人子孝義團圓莫如此若如此不遄死兮更何俟蜀道難梁簡文帝巫山七百里巴水三廻曲笛聲下復髙猨鳴一作啼斷還續同前劉孝威玉壘髙無極銅梁不可攀雙流亦一作迸又作逆巇道九坂澁陽關鄧侯束馬度一作去王生歛轡還歛轡懼身尤叱馭奉王猷若恡一作恠千金重誰為萬里侯戲馬吞珠界揚舲濯錦流沉犀厭恠水掘鏡表靈丘隅山一作嵎山金碧有光輝遷豪車馬尚一作正輕肥彌想王褒擁節反一作去更憶相如乗傳歸君平子雲閴一作寂不嗣江漢英靈信已衰一作巳信稀此一詩英華與藝文類聚同惟郭茂倩樂府拆前五言八句為一篇後七言六句為一篇又無中間六句而劉次荘樂府止有前八句今注異同為一作同前隂鏗王尊奉漢朝靈關不憚遥髙岷長有雪隂棧屢經燒輪摧九折路騎阻七星橋蜀道難如此功名詎可要同前張文琮梁山鎮地險積石阻雲端深谷下寥廓層巖上鬱盤飛梁架絶嶺棧道接危巒攬轡獨長息方知斯路難同前李白噫吁􅐵危乎髙哉蜀道之難難於上青天蠶叢及魚鳬開國何茫然爾來四萬八千歲不一作乃與秦塞通人煙西當太白有鳥道可以横絶峨嵋巔地崩山摧壮士死然後天梯石棧相鈎連上有六龍廻日之髙標一作上有横河斷海之浮雲下有逆折衝波之流川一作下有逆折衝波之回川黄鶴之飛尚不得過猿猱欲度愁攀縁青泥何盤盤百歩九折縈巖巒捫參歴井仰脅息以手撫心一作膺坐長歎問君西遊何當一作時還畏途巉巖不可攀但見悲烏號古木雄飛呼雌遶林間又聞子規啼月落一作夜月愁空山蜀道之難難於上青天使人聽此凋朱顔連峯去天不盈尺一作連峯入煙幾千尺枯松倒挂倚絶壁飛湍瀑流爭喧豗峻崖轉石萬壑雷其嶮也如此嗟爾遠道之人胡為乎來哉劔閣崢嶸而崔嵬一夫當關萬夫莫開所守或匪人一作親化為狼與豺朝避猛虎夕避長蛇磨牙吮血殺人如麻錦城雖云樂不如早還家蜀道之難難於上青天側身西望長咨一作令人嗟文苑英華巻二百
