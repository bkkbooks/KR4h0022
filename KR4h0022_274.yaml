body:
  text: 文苑英華巻二百七十四宋李昉等編送行九崔峒十七首吉萬一首朱灣一首朱放二首苗發一首于良史二首林珝一首劉復一首陳存一首鄭嚴一首徐嶷一首于鵠三首李逺一首李渉一首李季蘭一首釋清江一首釋靈一五首釋法震五首釋皎然十五首秋晚送丹徒許明府赴上國因寄江南故人崔峒秋暮之彭澤籬花逺近逢君書前日至别後此時重寒夜江邉月晴天海上峯還知南地客招隠住新豐送薛仲方歸揚州前人佳句應無敵貞心不有猜一作暫囘慚為丈人行怯見後生才泛舸貪斜月浮橈值早梅綠楊新過雨芳草待君来送韋員外還京前人十年離亂後此去若為情春晚香山綠人稀豫一作頴水清野陂㸔獨樹闗路逐殘鸎前殿朝明主應憐白髪生潤州送友人前人見君還此地灑淚向江邉國士勞相問家書無處傳荒城胡一作閑馬跡塞木戍人煙一路堪愁思孤舟何渺然送張芬東歸前人喧喧五衢上鞍馬自驅馳落日臨阡陌貧交欲别離早知時事異豈與世人随握手將何贈君心我獨知送蘇遊上饒前人愛爾無覊束雲山恣意過一身随逺岫孤棹任輕波世事闗情少漁家寄宿多蘆花泊船處江月奈人何送陸明甫之旴𣅿前人陶令之官去窮愁慘别魂白煙横海戍紅葉下淮村澹浪摇山郭平蕪到縣門政成堪吏隠免就府公恩江南廻逢趙曜因送任十一交城主簿前人江上長相憶因髙北望㸔不知携老幼何處渡艱難屈指同人盡傷心故里殘遥憐驅疋馬白首到㣲官送薛良史往越州謁從叔前人辭家年一作日已乆與子分一作仍偏深易得相思一作思鄉淚難為欲别心孤雲随浦口㡬日到山隂遥想蘭亭下清風滿竹林送邱二十二之一作歸蘇州前人積水與寒烟嘉禾路㡬千孤猿啼海島羣鴈起湖田曽寄一作是長沙什常一作嘗聞大雅篇却將封事去知爾愛一作意閑眠贈元秘書前人舊書稍稍出風塵孤客逢秋感此身秦地謬為門下客淮隂徒笑市中人也聞阮籍尋常醉見説陳平不乆貧幸有故人茅屋在更將閑事問情親送韋八少府判官歸東京前人元成世業紫真官文似相如貌勝潘鴻鴈南飛人獨去雲山一别嵗將䦨清淮水急桑林晚古驛霜多柿葉寒瓊樹相思何日見銀鈎數字莫為難送馮八將軍奏事畢歸滑䑓幕府前人王門别後到滄州帝里相逢俱白頭自歎馬卿常帶疾還嗟李廣不封侯棠梨宫裏瞻龍衮細栁營中着虎裘想到滑䑓桑葉落黄河東注杏園秋送王侍御佐婺州一作盖少府新除江南尉問風俗前人不須惆悵一作聞君作尉向江潭吳越風煙到自諳客路尋常經竹逕一作随竹影人家大抵傍山嵐緣溪花木偏宜逺避地衣冠盡在一作向南唯有夜猿啼海樹思鄉北固一作國意難堪一作皆詩選越中送王使君赴江華前人皁盖春風自越溪獨尋芳草桂陽西逺水浮雲随馬去空山弱篠向雲低遥知異政荆門比舊許新詩康樂齊萬里相思在何處九疑殘雪白猿啼送皇甫冉往白田前人江邉盡日雉鳴飛君向白田何日歸楚地蒹葭連海逈隋朝楊栁映堤稀津樓故市無行客山舘空庭閉落暉試問疲人與征戰使君雙淚定沾衣送賀蘭廣赴選前人而今用武爾攻文流軰干時獨卧雲白髪青袍趍會府定應衡鏡却慚君送阮芳謁李觀察求任此君曽浪跡長安以詩讓之吉萬往日長安路歡遊不惜年為貪盧女曲用盡阮郎錢身老方投刺途窮始着鞭猶聞有知已此去不徒然送李司直歸浙東幕兼寄鮑行集作叅軍持節大夫初拜東平郡王朱灣翩翩書記早行聞二十年來願見君今日相逢悲白髪同時㡬許在青雲人從北固山邉集作前去水到西陵集作谿渡口分會集作曽作王門曳裾客為余前謝鮑叅軍送魏校書朱放長恨江南足别離㡬廻相送復相随楊一作栁花撩亂撲流水愁殺人行知不知送温台前人𦕈𦕈天涯君去時浮雲流水自相随人生一世長如客何必今朝是别離送司空曙之蘇州苗發盛門英舊地蟬盡早秋時歸國人皆乆移家君獨遲廣陵經水宿建業有僧期若到西霞寺應㸔江捴碑送孫諭徳罷官一作任往黔州孫公先牧此州因寄家在彼前人中嵗分符典石城兩朝趍陛謁承明闕下昨陳歸老䟽天南今切去鄉情親知握手三囘别几杖扶身萬里行伯道暮年無嗣子欲將家事托門生田家秋日送友于良史蒼茫日初晏遥野雲初收殘雨北山裏夕陽東渡頭子一作藤依漁溓里忝含鑒二切大水中絶小水出也合水入田家流何意君迷駕山林應有秋江上送友人前人㸔爾動行棹未收離别筵千㠶忽見及亂却故人船紛泊鴈羣起逶迤沙漵連長亭十里外應是少人煙送安養閻主簿還竹一作故林林珝分手怨河梁南征歴漢陽江山追宋玉雲雨夢荆王醉裏宜城近歌中郢路長更尋棲枳處猶是念仇香送王倫劉復春江日未曛楚客酣送君翩翩孤黄一作島鶴萬里滄洲雲四方各有志豈得常顧羣山連巴湘逺水已一作與荆吳分清光日修阻尺素安可論相思寄夣寐瑶草空氛氲送劉秀才南歸劉存為别楊栁垂此别千萬里古路入南山春風生㶚水停車落日在罷酒離人起蓬户寄龍沙送歸情詎已送韋員外赴朔方鄭嚴白露邉秋早皇華戎事催已推仙省妙更是幕中才出餞傾朝列深功佇帝䑓坐聞長䇿利終見勒銘廻送李補闕歸朝徐嶷駟馬歸咸秦雙鳬出海門還從清切禁再沐聖明恩禮樂中朝貴文章大雅存江湖多放逸獻替欲誰論送韋判官歸蘇州集作門于鵠桑乾歸路逺聞説亦愁人有雪常經夏無花空到春下營雲外火收一作牧馬月中塵白首從戎客青袍集作衫未離身送唐大夫讓節度使歸山前人年老成功乞罷兵玉階匍匐進旂集作雙旌朱門鴛瓦為仙觀白領狐裘出帝城侍女休梳宫様髻蕃童新改道家名到時浸髪春泉裏猶夢江樓簫管聲别太守前人花裏南樓春夜寒還如王屋上天壇山中不道無明月誰肯集作共相從到曉㸔送友人入蜀李逺蜀客本多愁君今是勝遊碧藏雲外樹紅露詩選作壓驛邉樓杜魄呼名呌巴江學字流不知煙雨夜何處夢刀州送魏簡能東遊李涉獻賦論兵命未通却乘羸馬去一作出闗東㶚陵原上重回首十載長安是一作似夢中送韓葵之江西李季蘭相㸔指楊栁别恨轉依依萬里西江水孤舟何處歸湓城潮不到夏口信應稀唯有漁陽鴈年年来去飛送韋叅軍已見二百七十三巻釋清江送别釋靈一慿髙莫送逺㸔欲斷歸心别恨啼猿苦相思流水深翠雲南澗影丹桂晚山隂若未来雙鵠遼城何更尋送殷判官歸上都前人漾舟雲路客未過夕陽時向背堪遺恨逢迎宿未期水容愁暮急花影動春遲别後王孫草青青入夢思送王頴悟佐歸州集作歸佐緜前人客意天南興已䦨不堪言别向仙官夢摇玉佩随旄一作旌節心到金華憶杏壇荒郊極望歸雲盡瘦馬空嘶落日殘想得故山青靄裏泉聲入夜獨潺潺送陳元初卜居麻源前人欲向麻源隠能尋謝客蹤空山㡬十里幽谷第三重嵒宇寧須葺荷衣不待縫因君見往事為我謝喬松送朱放前人苦見人間世思歸洞裏天縱令山鳥語不廢野人眠送常大夫赴朔方釋法震闗山今不掩軍候鳥先知大漢嫖姚入烏孫部曲随髙旌天外駐寒角月中吹歸到長安第花應再滿枝送褚先生海上尋鍊師前人潮落風吹定天吳避客舟近承三殿㫖欲向五湖遊不厭烏皮几新逢鶴氅裘明珠漂斷岸隂火暎中流華盖芝童引神丹桂女收縣居知縹緲固為識浮邱送人遊越前人不須行借問為爾話閩中海島春冬雨江㠶来去風道由元度宅身寄朗陵公縱别何傷逺如今闗塞通送韓侍御自使幕廵海北前人㣲雨過山夜洗兵繡衣遥拂海風清幕中運䇿心猶苦馬上吟詩巻已成離亭不惜花源醉古道猶㸔蔓草生因説元戎能破敵髙歌一曲隴闗情丹陽浦送客之海前人不到終南向㡬秋移居更欲近滄洲風吹雨色連村暗潮擁菱花出岸浮漠漠望中春自豔寥寥泊處夜堪愁如君豈得空髙枕只益天書遣逺求奉送陸中丞長源詔徴入朝釋皎然詔下酇侯幕徴賢寵大一作上勲才當持漢典道可致堯君藩牧今榮餞詩流此盛文水從吳渚别樹向楚門分宿寺期嘉月㸔山識故雲歸心復一作欲何托惆悵在江濆奉送李中丞道昌入朝前人文憲中司盛恩榮外鎮崇諸侯皆取則八使獨推功詔喜新啣鳳車㸔舊飾熊去思今武子餘教昔文翁清白一作在如江水仁流是國風先徵二千石掃第望司空同盧使君幼平郊外送閻侍御歸䑓前人留餞飛旌駐離亭草色間栢䑓今上客竹使舊朝班日落東西水天寒逺近山古江分楚望殘栁入隋闗戀闕心常積廻軒日不閑芳辰倚門道猶得及春還同顔使君真卿峴山送李法曹陽氷西上獻書時有詔徴赴京前人漢日中郎妙周王太史才雲書捧日去鶴版下天來草見吳宫發花思御苑開羊公昔一作惜風景欲别㡬遲廻送劉法司之越州前人蕭蕭鳴夜角驅馬背城濠雨後寒流急秋來朔吹髙三山期望海八月欲觀濤㡬日西陵路應逢謝法曹送裴邕之上京前人辭山偶世清挾䇿忽西行㠶過随江疾衣粘楚雪輕尚文須獻賦重道莫論兵東觀今多士應髙白馬生送沈秀才之閩中前人越客不成歌春風起綠波嶺重寒不到海近瘴偏多野戍桄榔發人家翡翠過翻疑此中好君問定如何早春送閻主簿遊越兼謁元中丞前人輕舸趣不已東風吹綠蘋欲㸔梅市雪知賞栁家春别意傾吳醥一作醑芳聲動越人山隂三月會内史得嘉賔送李秀才赴婺州前人山開江色上孤賞去應遲渌水延吳榜秋風入楚祠一作詞猿清獨宿處木落逺行時見説東陽守登樓為爾期送嚴明府入闗謁黎京兆前人春日異秋風何為怨别同潮廻芳渚沒花落晝山空旅候聞嘶馬殘陽望斷鴻應思京内史相見直城中送陸判官歸杭州前人芳草潛州路乘軺憶再旋餘花故林下殘月舊池邉峯色雲端寺潮聲海上天明朝富春渚應見謝公船同顔使君清明日遊因送蕭主簿前人誰知賞佳節别意忽相和暮色汀洲遍春情楊栁多髙情戀旌斾極浦宿風波惆悵支山月今宵又雜詠作不再過送李季良北歸前人風吹殘栁絲一作綠孤客𣣔歸時掩抑楚絃絶離披湘葉衰前軍猶轉戰故國杳難期北望應門雪空吟平子詩峴山送裴秀山赴舉前人漢家招秀士峴上送君行萬里見秋色兩河傷逺一作别情王師出西鎬虜㓂避集作寢東平天府登名後廻㸔楚水清送獨孤使君赴岳州前人海上仙山屬使君石橋琪樹此来聞他時畫出白團扇乞取天台一片雲文苑英華巻二百七十四
