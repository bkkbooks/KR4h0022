body:
  text: 文苑英華卷二百七十四宋李昉等編送行九崔洞十七首吉萬一首朱灣一首朱放二首苗發一首于良史二首林珝一首劉復一首陳存一首鄭嚴一首徐嶷一首于鵠三首李逺一首李涉一首李季蘭一首釋清江一首釋靈一五首釋法震五首釋皎然十五首秋晚送丹徒許明府赴上國因寄江南故人崔洞秋暮之彭澤籬花逺近逢君書前日至别後此時重寒夜江邉月晴天海上峯還知南地客招隱住新豐送薛仲方歸揚州前人佳句應無敵貞心不有猜一作暫回慚為丈人行怯見後生才泛舸貪斜月浮橈值早梅緑楊新過雨芳草待君來送韋員外還京前人十年離亂後此去若為情春晚香山緑人稀豫一作頴水清野陂看獨樹關路逐殘鶯前殿朝明主應憐白髮生潤州送友人前人見君還此地灑淚向江邉國士勞相問家書無處傳荒城胡一作間馬迹塞木戍人煙一路堪愁思孤舟何渺然送張芬東歸前人喧喧五衢上鞍馬自驅馳落日臨阡陌貧交欲别離早知時事異豈與世人隨握手將何贈君心我獨知送蘇遊上饒前人愛爾無羈束雲山恣意過一身隨逺岫孤棹任輕波世事關情少漁家寄宿多蘆花泊船處江月奈人何送陸明甫之旴𣅿前人陶令之官去窮愁慘别魂白煙橫海戍紅葉下淮村淡浪搖山郭平蕪到縣門政成堪吏隱免就府公恩江南回逢趙曜因送任十一交城主簿前人江上長相憶因髙北望看不知携老幼何處渡艱難屈指同人盡傷心故里殘遙憐驅匹馬白首到微官送薛良史往越州謁從叔前人辭家年一作日已久與子分一作仍偏深易得相思一作思鄉淚難為欲别心孤雲隨浦口幾日到山隂遙想蘭亭下清風滿竹林送邱二十二之一作歸蘇州前人積水與寒煙嘉禾路幾千孤猿啼海島羣鴈起湖田曽寄一作是長沙什常一作嘗聞大雅篇却將封事去知爾愛一作意間眠贈元祕書前人舊書稍稍出風塵孤客逢秋感此身秦地謬為門下客淮隂徒笑市中人也聞阮籍尋常醉見説陳平不久貧幸有故人茅屋在更將間事問情親送韋八少府判官歸東京前人元成世業紫真官文似相如貌勝潘鴻鴈南飛人獨去雲山一别嵗將闌清淮水急桑林晚古驛霜多柿葉寒瓊樹相思何日見銀鈎數字莫為難送馮八將軍奏事畢歸滑臺幕府前人王門别後到滄州帝里相逢俱白頭自歎馬卿常帶疾還嗟李廣不封侯棠梨宫裏瞻龍衮細栁營中著虎裘想到滑臺桑葉落黃河東注杏園秋送王侍御佐婺州一作蓋少府新除江南尉問風俗前人不須惆悵一作聞君作尉向江潭吳越風煙到自諳客路尋常經竹徑一作隨竹影人家大抵傍山嵐緣溪花木偏宜逺避地衣冠盡在一作向南唯有夜猿啼海樹思鄉北固一作國意難堪一作皆詩選越中送王使君赴江華前人皂蓋春風自越溪獨尋芳草桂陽西逺水浮雲隨馬去空山弱篠向雲低遙知異政荆門比舊許新詩康樂齊萬里相思在何處九疑殘雪白猿啼送皇甫冉往白田前人江邉盡日雉鳴飛君向白田何日歸楚地蒹葭連海逈隋朝楊栁映堤稀津樓故市無行客山館空庭閉落暉試問疲人與征戰使君雙淚定沾衣送賀蘭廣赴選前人而今用武爾攻文流輩干時獨卧雲白髮青袍趍會府定應衡鏡却慚君送阮芳謁李觀察求任此君曽浪迹長安以詩讓之吉萬往日長安路歡遊不惜年為貪盧女曲用盡阮郎錢身老方投刺途窮始著鞭猶聞有知已此去不徒然送李司直歸浙東幕兼寄鮑行集作參軍持節大夫初拜東平郡王朱灣翩翩書記早行聞二十年來願見君今日相逢悲白髮同時幾許在青雲人從北固山邉集作前去水到西陵集作溪渡口分會集作曽作王門曳裾客為余前謝鮑參軍送魏校書朱放長恨江南足别離幾回相送復相隨楊一作栁花撩亂撲流水愁殺人行知不知送溫台前人眇眇天涯君去時浮雲流水自相隨人生一世長如客何必今朝是别離送司空曙之蘇州苗發盛門英舊地蟬盡早秋時歸國人皆久移家君獨遲廣陵經水宿建業有僧期若到西霞寺應看江捴碑送孫諭德罷官一作任往黔州孫公先牧此州因寄家在彼前人中嵗分符典石城兩朝趍陛謁承明闕下昨陳歸老疏天南今切去鄉情親知握手三回别几杖扶身萬里行伯道暮年無嗣子欲將家事托門生田家秋日送友于良史蒼茫日初晏遙野雲初收殘雨北山裏夕陽東渡頭子一作藤依漁溓里忝含鑒二切大水中絶小水出也合水入田家流何意君迷駕山林應有秋江上送友人前人看爾動行棹未收離别筵千帆忽見及亂却故人船紛泊鴈羣起逶迤沙漵連長亭十里外應是少人煙送安養閻主簿還竹一作故林林珝分手怨河梁南征歷漢陽江山追宋玉雲雨夢荆王醉裏宜城近歌中郢路長更尋棲枳處猶是念仇香送王倫劉復春江日未曛楚客酣送君翩翩孤黃一作島鶴萬里滄洲雲四方各有志豈得常顧羣山連巴湘逺水已一作與荆吳分清光日修阻尺素安可論相思寄夢寐瑶草空氛氲送劉秀才南歸劉存為别楊栁垂此别千萬里古路入南山春風生灞水停車落日在罷酒離人起蓬户寄龍沙送歸情詎已送韋員外赴朔方鄭嚴白露邉秋早皇華戎事催已推仙省妙更是幕中才出餞傾朝列深功佇帝臺坐聞長䇿利終見勒銘回送李補闕歸朝徐嶷駟馬歸咸秦雙鳬出海門還從清切禁再沐聖明恩禮樂中朝貴文章大雅存江湖多放逸獻替欲誰論送韋判官歸蘇州集作門于鵠桑乾歸路逺聞説亦愁人有雪常經夏無花空到春下營雲外火收一作牧馬月中塵白首從戎客青袍集作衫未離身送唐大夫讓節度使歸山前人年老成功乞罷兵玉階匍匐進旗集作雙旌朱門鴛瓦為仙觀白領狐裘出帝城侍女休梳宫樣髻蕃童新改道家名到時浸髮春泉裏猶夢江樓簫管聲别太守前人花裏南樓春夜寒還如王屋上天壇山中不道無明月誰肯集作共相從到曉看送友人入蜀李逺蜀客本多愁君今是勝遊碧藏雲外樹紅露詩選作壓驛邉樓杜魄呼名呌巴江學字流不知煙雨夜何處夢刀州送魏簡能東遊李涉獻賦論兵命未通却乘羸馬去一作出關東灞陵原上重回首十載長安是一作似夢中送韓葵之江西李季蘭相看指楊栁别恨轉依依萬里西江水孤舟何處歸湓城潮不到夏口信應稀唯有漁陽鴈年年來去飛送韋參軍已見二百七十三卷釋清江送别釋靈一慿髙莫送逺看欲斷歸心别恨啼猿苦相思流水深翠雲南澗影丹桂晚山隂若未來雙鵠遼城何更尋送殷判官歸上都前人漾舟雲路客未過夕陽時向背堪遺恨逢迎宿未期水容愁暮急花影動春遲别後王孫草青青入夢思送王頴悟佐歸州集作歸佐綿前人客意天南興已闌不堪言别向仙官夢搖玉佩隨旄一作旌節心到金華憶杏壇荒郊極望歸雲盡瘦馬空嘶落日殘想得故山青靄裏泉聲入夜獨潺潺送陳元初卜居麻源前人欲向麻源隱能尋謝客蹤空山幾十里幽谷第三重嵒宇寧須葺荷衣不待縫因君見往事為我謝喬松送朱放前人苦見人間世思歸洞裏天縱令山鳥語不廢野人眠送常大夫赴朔方釋法震關山今不掩軍候鳥先知大漢嫖姚入烏孫部曲隨髙旌天外駐寒角月中吹歸到長安第花應再滿枝送褚先生海上尋鍊師前人潮落風吹定天吳避客舟近承三殿旨欲向五湖遊不厭烏皮几新逢鶴氅裘明珠漂斷岸隂火映中流華蓋芝童引神丹桂女收縣居知縹眇固為識浮邱送人遊越前人不須行借問為爾話閩中海島春冬雨江帆來去風道由元度宅身寄朗陵公縱别何傷逺如今關塞通送韓侍御自使幕巡海北前人微雨過山夜洗兵繡衣遙拂海風清幕中運䇿心猶苦馬上吟詩卷已成離亭不惜花源醉古道猶看蔓草生因説元戎能破敵髙歌一曲隴關情丹陽浦送客之海前人不到終南向幾秋移居更欲近滄洲風吹雨色連村暗潮擁菱花出岸浮漠漠望中春自豔寥寥泊處夜堪愁如君豈得空髙枕只益天書遣逺求奉送陸中丞長源詔徴入朝釋皎然詔下酇侯幕徴賢寵大一作上勳才當持漢典道可致堯君藩牧今榮餞詩流此盛文水從吳渚别樹向楚門分宿寺期嘉月看山識故雲歸心復一作欲何托惆悵在江濆奉送李中丞道昌入朝前人文憲中司盛恩榮外鎮崇諸侯皆取則八使獨推功詔喜新銜鳳車看舊飾熊去思今武子餘教昔文翁清白一作在如江水仁流是國風先徵二千石掃第望司空同盧使君幼平郊外送閻侍御歸臺前人留餞飛旌駐離亭草色間柏臺今上客竹使舊朝班日落東西水天寒逺近山古江分楚望殘栁入隋關戀闕心常積回軒日不間芳辰倚門道猶得及春還同顔使君真卿峴山送李法曹陽氷西上獻書時有詔徴赴京前人漢日中郎妙周王太史才雲書捧日去鶴版下天來草見吳宫發花思御苑開羊公昔一作惜風景欲别幾遲回送劉法司之越州前人蕭蕭鳴夜角驅馬背城濠雨後寒流急秋來朔吹髙三山期望海八月欲觀濤幾日西陵路應逢謝法曹送裴雍之上京前人辭山偶世清挾䇿忽西行帆過隨江疾衣粘楚雪輕尚文須獻賦重道莫論兵東觀今多士應髙白馬生送沈秀才之閩中前人越客不成歌春風起緑波嶺重寒不到海近瘴偏多野戍桄榔發人家翡翠過翻疑此中好君問定如何早春送閻主簿遊越兼謁元中丞前人輕舸趣不已東風吹緑蘋欲看梅市雪知賞栁家春别意傾吳醥一作醑芳聲動越人山隂三月會內史得嘉賔送李秀才赴婺州前人山開江色上孤賞去應遲渌水延吳榜秋風入楚祠一作詞猿清獨宿處木落逺行時見説東陽守登樓為爾期送嚴明府入關謁黎京兆前人春日異秋風何為怨别同潮回芳渚沒花落晝山空旅候聞嘶馬殘陽望斷鴻應思京內史相見直城中送陸判官歸杭州前人芳草潛州路乘軺憶再旋餘花故林下殘月舊池邉峯色雲端寺潮聲海上天明朝富春渚應見謝公船同顔使君清明日遊因送蕭主簿前人誰知賞佳節别意忽相和暮色汀洲遍春情楊栁多髙情戀旌斾極浦宿風波惆悵支山月今宵又雜詠作不再過送李季良北歸前人風吹殘栁絲一作緑孤客𣣔歸時掩抑楚絃絶離披湘葉衰前軍猶轉戰故國杳難期北望應門雪空吟平子詩峴山送裴秀山赴舉前人漢家招秀士峴上送君行萬里見秋色兩河傷逺一作别情王師出西鎬虜寇避集作寢東平天府登名後回看楚水清送獨孤使君赴嶽州前人海上仙山屬使君石橋琪樹此來聞他時畫出白團扇乞取天台一片雲文苑英華卷二百七十四
