body:
  text: 文苑英華卷九百三十一宋李昉等編宦官上內侍髙延福碑一首內給事郎諫議大夫韋公碑一首內侍陳盛忠碑一首內侍省孫常楷碑一首內侍省內侍焦希望碑一首內侍髙君神道碑張説孝足動天義堪變地河中見三州之姓炳彼精誠南亭聞再逄之母彰兹竒事不有隂德曠代誰鄰內侍髙延福者將軍力士之兹父也粵自西雲干呂東明䘖璧以亡王之族處巷伯之官而將軍本系馮亭代家南越未知父母來奉宮闈老而無子曰悲幼而失親曰苦調之悲者笙磬異器而同音貌之苦者秦越别狀而共色從此斷金合要投漆相授承順無違日嚴生乎本性仁慈匪飾天屬由乎自我父子之名既定姓氏之目遂集作因移大將軍之家去鄭而取衛平原侯之室變國而從甄亦猶是也既而內侍以鴻漸登朝苒弱集作蒻朱紱將軍以龍樓得主艷耀金章其訓子也溫室之樹無言車中之馬數對其事親也三牲有養志之樂百行無匪疾之憂至矣哉髙氏之子也以思親之願而展親以欲報之誠而報德神明翕而哀懇荒裔竦而慕義乃有傍求聖善提挈炎州二紀積離萬里遙至音容莫識涕對茫然驗七星於子心認雙環於母臂而後深傷頓感若墜谷而騰集作登天藴怨都除類愈矇而覩日於是盡歡兩媪兼敬三人均養之恩咸不寐於十起反哺之志齊色難於一堂羣公賀虞潭之親天子歎馮勤之母此復然矣內侍事主四朝歷官七政專良恭肅著美綸言溫集作中謙儉讓得名朝列享年六十有四開元十二年終於來庭里明年五月葬于集作於長樂原繼子力士喪孺慕而加等葬罄誠而備物義方之經鬱為稱首孝德之傳今見其人永惟先恩追綴餘烈若夫慈羇旅之稚童仁也約詩禮之尊教義也貴不居而要避權禮也生推心而死有託信也仁為德本義為行先禮為身宅信為意田故仁之報也夀義之報也樂禮之報也安信之報也順履順居安乘樂享夀此四者生人之偉事目牛之深致者矣於戲領集作頂賜冠馳寵勢偃蹇俗上煜爚君傍者豈不思景行髙山慎視前轍如或少選亡禮顛沛違仁瞻言四報咫尺千里揚芳樹淑其不務乎余固春秋之徒也懲不濫而勸不僣義重天綱孝崇仁紀樂諄諄之誠訓善哀哀之克子不著倚相之書將受邱明之耻九原之上集無之字千目集作月深覽俾攀傷知音有以見古史之心也銘曰髙堂樂未散重壤哀己劈寶帳吹靈衣金尊照塵席苦長夜之易泯怨寸景之難惜列集作刻義聲與孝心萬古千齡得此石內給事諫議大夫韋公神道碑于肅衡嶽之峻極于天作鎮五嶺炎海之包括于地委輸百川以崇山之靈漲􅀈海之闊孕育粹氣實生英才厥有韋府君則其人也自豕韋開國積德纍業西漢丞相父子繼為醇儒衣冠相襲傳慶不絶得其姓者見重於時可謂源深𣲖長本大枝茂者矣公諱某京兆人也祖某不仕父楚皇任朝散大夫內給事中武德使判宫闈令事皆奕世載德繼美承家公幼有竒操形神爽邁器宇沈正識者異之髫齓之年參內侍省出入門閣情志專良開元十年解褐授內府局丞典御府之藏列內官之秩勤願慎密肅恭矜莊洵美可觀碩大且儼事因績著官以課遷尋充市舶使至於廣府賝賮納貢寶貝委積上甚嘉之每宣諭諸道曽無寧歲敷敡詔旨人皆説服天寶初拜朝議郎判宫闈令知本局事至五年加朝散大夫內謁者監皇唐六葉道泰時康朝野歡娛禮物備具公以才藝敏悟頻操員職垂青組之榮綰銀艾之寵受宣詔命侍衛軒墀顧盼增輝時望歸美尋加朝議大夫拜內給事中判本官事眷遇愈深品秩優異上方垂衣致理端冕穆清或侍獵長楊扈逰間館隨雕輦而稱警接瓊筵而獻壽排金戺登玉堂請奏密命承傳天憲公之德形於外可得而言公之美暢於中不可得而知也懿夫近臣之職其來尚矣位著天象官分周制蓋以萬乘崇嚴九重深邃出納綸旨陪奉宸居宜有司存委任親重或導從輿輦或典司禁署凡百千數不可殫論若非理識端詳幹略稱最者則不得揮翰內省分曹局司以公之才雅有令問嗚呼蘭蓀方茂秋風敗之以乾元元年七月二十八日終於私第春秋六十有六皇情軫悼僚執零涕悲夫公歷事兩朝效官三紀其奉上也敬其與人也忠其蒞職也勤其立身也信雖伯子好善史遊納忠方之於公彼有慙色夫人宋氏德行溫厚姿容婉婌從夫之貴尋封廣平縣君以至德二年先公而逝乾元二年五月七日合祔於長安縣龍首原禮也嗣子中散大夫守內侍省上柱國賜紫金魚袋守宗次子內侍省內侍伯守堅次子內侍省宫教博士守幹皆克紹前修佩服嚴訓永慕蓼莪之痛長懷創巨之悲揚名顯親頌德褒美昊天罔極孝莫大焉敬述徽猷書於樂石銘曰英英韋公山嶽粹氣植性敏逹存誠忠懿應物之材刜鍾之利踐言履信依仁守義五登秩序三掌職司便蕃省闥密勿軒墀進退容止周旋羽儀壯圖未展遷壑纒悲鳳城之側龍首之陽墳生宿草魂閟連岡逝川兮茫茫隴樹兮蒼蒼勒銘兮貞石千古兮傳芳內侍陳忠盛神道碑裴士淹夫北辰垂象南面居尊紫禁一作殿崇嚴彤庭奧密靜言近侍允屬能賢其誰見稱則有我陳府君矣公諱忠盛字懷泰頴川許昌人也其先出自帝舜至遏父為周陶正受封于陳子孫因以為氏粵若尚書孝德頒賜聞乎題劍太守髙義禮賢為之下榻代襲賢貞門承軒冕因從官京邑今遂家于長安曽祖闕正議大夫內給事祖守節正議大夫內常侍父文叔銀青光祿大夫內常侍或肅或乂克寬克仁好古而探墳籍懋官而紆青紫公幼懷端慤夙著嘉聞飾一作肅躬以筮仕服勤以成業先天歲解褐補內侍省掖庭局監尋轉內僕丞內僕令秩滿遷內侍伯內謁者監加朝散大夫恪居官次夙夜惟寅爰被丹霄之澤載延朱紱之慶典新樂之絲桐名與公偕勤亦至矣騁髙衢而方逺何景命而不融以天寶十三年五月二日遘疾薨於輔興里之私第春秋六十有五惟公黃中多可素履居貞宅心知訓執事有恪至若怡神以全道體命以適時義以拯物禮以從政故能奉絲言而無失馳驛騎而有光俄拜內給事內常侍尋除朝議大夫守內侍秩序斯崇恩華轉茂位益髙而心益下德逾邁而氣逾和且以幹能尤膺任寄前後奉使者十有三焉至乃夢三清於太極之府是修功德志五樂於無何之鄉式瞻神異崇兹真廟獲彼靈符邁侯甸而訪仙經歷名山而隨羽客然後稽少陽之必舉懷令圖而允臧豈惟藝足侍書材優參乘巷伯刺讒之什史遊忠益之規固可謂無競維人溫恭淑慎者已以其年閏十一月九日葬於長安縣承平鄉之南夫人上谷縣君成氏四德無虧三從罔徙一作失先天十四年正月二十九日後君而亡以乾元三年五月七日合葬于舊阡一作塋禮也長子仙鶴昭武校尉左衛豐浩府折衝次子仙鳳振威校尉行右金吾衛左中候仙甫才惟轉達職在春官今上御極釋褐特賜銀章朱紱拜內謁者監仙賢仙管等太邱父子荀氏弟兄事國以忠奉先惟孝感寒泉而增慕卜幽宅而罔艱懼遷陵谷式揚碑版銘曰帝舜洪胄胡公令名三恪惟甫八代至成本仁祖義國史家聲椒聊之實莫我與京其一懿範彌昌宏材益振果行育德履信思順執心有恆改過不吝政符省括理必遊刃其二陟遐自邇休有烈光翻飛省闥翊侍巖廊導宣國命輝耀銀鐺丹誠每竭朱紱斯皇其三乘遽周流奚往非適瑞徵桃塞藥獻梁益新廟真容名山靈迹爰典樂正奚稽市籍其四昊穹不憗殱我惟賢四星猶列一德空傳慘風雲於故里樹松檟於新阡載刋乎貞石永賁於幽泉其五內寺省內常寺孫常楷神道碑于邵易之繫云君子之道或出或處其出也為國藎臣銘勳彛鼎其處也保家燕居谷神齊物蓋卷舒在我不違其正而已今得之於孫常侍歟公姓孫氏諱常楷京兆涇陽人也有魁岸之姿有沈毅之略年甫羈貫而筮仕焉委質四朝咸著聲績在玄宗朝拔乎羣萃之中始受賞九層之構兆於此矣在肅宗朝特見寵遇其時襄陽易帥滑臺命將屬安羯史盜作亂之後兩軍未戢王命或壅以公有奉使專對之才俾受節鉞將我詔旨襄峴響風河滑朝宗皆公之力也在代宗朝僕固懷恩擁衆汾上仍以姦子作亂外邑北窺大鹵之地南侵蒲坂之封蟻聚鴟張關輔震駭公以單車之使仗節直進誕敷威德隂携黨與元惡奔潰狡童折首猶以餘衆嘯聚朔陲公乃通和獯戎俾發義師與郭汾陽等諸軍犄角姦凶敗績萬國底寧斯又公之勞也前此急宣藩維會計大務必能盡瘁以奉投艱明明三后稱嘆多矣事今上也每侍帷幄且曰求舊嘉謀讜詞入陳出祕扈避狄也著奔問之勤從省方也有執羈之效逮法駕還宮特加褒奬斯又公之忠也其後晦明生疾屢在長告是能閉朱門蔽華屋不屑塵事隱几頥神維清淨為師維友愛是篤物我俱喪不知老之將至云爾本其族姓則春秋時在衛世卿三國時有吳稱帝晉魏而下代生明哲至大父孝亷擢第烈考庭玊右金吾衛中候贈兖州刺史或髙上不仕或大用靡臻第其揚歷則四進散官正遷近職釋褐內侍伯遷文林郎內謁者監賜緋魚袋轉朝議郎內給事上柱國特加朝散大夫更名常楷擢授內常侍修功德夫積善之家其後必大故長兄嘉賔黃州别駕贈大理少卿仲兄知古故開府儀同三司魏國公公與開府宣力王家首冠貂璫腰垂銀艾便蕃禁闥炳耀聨華四紀於兹亦云盛矣貞元五年七月二十三日卒于廣化里之私第享年六十一明年十二月五日葬于涇陽縣髙平原先塋之側次亡兄之兆蓋不違親而得族葬之制也夫人魏郡邵氏祔焉用周公之典也初開府當肅宗朝以直諫忤旨配流費州及代宗踐祚公屢建勳代密勿之際陳懇友于即日詔追仍復官爵既至矣特上封章請割衣食之費闕於涇陽縣卜爽塏之地建立伽藍上報皇慈覆幬之恩次展天屬怙恃之功優詔嘉許錫名曰寶應衆善計費維憶繄公定是職君子曰開府創之公能就之豈非忠於國孝於家嗚呼吾見夫二公報主之心昭矣顯親之道終矣異時嵗或大侵人有菜色公常設粥以食餓殍斯不曰仁乎公植性慈惠尤深象教靡茹葷血務施緇徒斯不曰善乎故歸全之日恍如先知乃召羣子載授理命尸坐自若奄然而終談者以為報施明徵矣有子良斌朝議郎前行原王府録事參軍上柱國賜緋魚袋克奉前修雅有令問進可事國退可幹家先公而亡矣猶子正議大夫行彭王府咨議系朝議大夫內侍省內給事上柱國充慶州監軍榮義朝議郎行內典引上柱國僧法律等奉引進之恩深泣血之感窀穸哀送必處必信以邵嘗備史官見託銘述蓋春秋褒善之義敢不承之銘曰兵諫雖忠不可以訓賦詩對心一作而亦奚足徇猗哉孫公不緇不磷以道而退以禮而進托實去華履剛能順策名四后克昭忠藎宣諭反側以安觀釁悖叛是殘乃和獫狁乃復天倫忠焉孝焉家邦必聞移病歸體從吾所尚道心中接塵世祿積喪之歸真不嬰無妄高平之原于以卜葬後人與歸觀銘是諒內侍省內侍焦希望神道碑吳通徵春秋以立功於時謂之不朽釋氏以不住於相至乎無生善時者勳業存離相者往來一以是居世其至人之藴耶維夫事上以忠修身以道竭節於盛明之代遺情於寵祿之間通乎大觀與物始終建先修之所為順理之期光昭前聞有若左神威軍中護軍焦公兼柱國公名希望字舊史稱周武王剋殷紂封神農之後於焦至武王孫康王生子曰文手中有畫如焦字之數又以封焉爰初啓土實居陜服衆國入于焦因從平陽遂命為氏其間允文允武或哲或謀代不乏賢可得而略厥後成以官族寓籍于京兆府之涇陽公之系緒今縣人也曽祖諱躍太宗撥亂常從征遼拜絳州鳳庭府果毅都尉祖諱法滿克踐儒行纍遷至朝散大夫絳州司馬皇考諱孝景佩服仁義不交世祿積德之慶鍾美於公公凝靈純粹秉志剛實耿介不羣風標自逺清襟朗察萬象無所隱其情見性圓明衆辨不得礙其正以言則窮其奧得聖人之心以行則用其中合君子之度年及弱冠選侍彤闈貞松之姿既呈於徑寸層臺之峻亦資於覆簣守內府局同正丞以陜府元從授承務郎敬恭朝夕恪守官次忠信以奉上之道禮義以周身之方莊而能和敏而有勇故可以恭武可以佐文方圓適器無入而不自得今皇帝之在春宮每加信任洎正宸極爰奬真純於是朱紱斯皇銀章有耀公夙荷榮渥茂兹寵光便蕃左右密勿軒陛事君不二志守職惟一心口無擇言身無悔行見義能勇盡力忘勞其衛主也有匪躬之節鑾輿既復上懿其誠除給事同正賜金印紫綬益見親重乃命監射生軍事貞元五年詔以射生軍為神威軍加內常侍同正兼謁者監賜上柱國餘如故公訓整戎務練達武經舉傑雋懋勳賞贍財用協師徒我車既堅我馬斯服至若郊廟之事文衛之儀材官彀騎林植鱗次若離若合者固足以耀皇威而振國容矣十二年制加中護軍纍遷內侍省內侍同正兼內常侍公受委愈重執心愈恭守直無隱盡忠在公理軍如家正身率下上所甚信咸感悅之爰廣舊軍肇建新宇叶比衆志允成厥列布之以署爰峻壁周講藝有館公食有堂既庶既繁兮樂且康為輪為奐兮耀華章廽六龍之日馭降萬乘之天光以永代垂則威宣上方者也至乃公離諸見性符道源以明誠𢎞大覺之因以清靜修有為之事動靜無閡喧寂一如不牽外緣不滯禪想以之則貞固幹事仁者悅其仁義者服其義嘗事上則忠信行巳以蒞職謂無上法寶諸佛之心自達摩東來實為教祖公了見真性玄契度門乃於軍士建立精舍上以奉國下以利人皇上御大明以燭幽發惠日以垂照廣一乘之妙旨輔萬物之自然及公上奏乃賜額曰真元達摩傳法之院表正知也每從容而嘆曰性無生滅物有始終本乎天者為昭明親乎地者為委順是以遺生死外形骸感冬夜之詩歸於其室備嵗時之制允叶前經信所謂知命不憂達生之情者矣乃建先修塔於涇陽縣之東南焦劉渡之西公之故夫人李氏浮圖域中龜謀協從鷹集作雁影連屬支提鬱起像法恆存吾將老焉可以無纍經言諸相常寂公之志歟嗣子朝榮等克稟趨庭之訓無虧立身之道以是有後人咸曰休哉惟公之內誠既率乎天至公之玄達載光乎法器宜乎承睿眷協師貞紀嘉績茂休聲保黃中之元吉惕塵外之髙情既得瑕邱之地先開張禹之塋仁之報兮夀未極檟可材兮躬所植表全美於真珉俾後生而作則銘曰萬物藝藝孰見其真修心踐言實惟哲人猗歟護軍與道為鄰率性居正資忠事君澄心止水勵節貞筠行有枝葉道無緇磷其動以直克廣厥勳及新營宇載肅鈎陳衆服其誠上嘉其勤朝章允集睿眷逾殷處貴尚謙秉志惟純清虛應物恬曠怡神法本無生有非吾身靜觀其復視喪猶塵委順于何涇川之津鴈塔先啓區中了人爰植爰修以躬以親洪流不竭法夀長春表石垂芳千年日新文苑英華卷九百三十一
