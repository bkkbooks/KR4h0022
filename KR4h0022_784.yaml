body:
  text: 文苑英華卷七百八十五宋李昉等編紀德太尉房公德銘一首四皓銘一首世德銘一首塔廟上畫像附大愛剎寺剎下銘一首秦州天水部麥積山佛龕銘一首周故內供奉學士懷州河內縣尉陳公石人銘一首燕然軍人畫像銘一首皇誕日畫像銘一首唐故悼王石塔銘一首唐故寶應寺上座內道場臨壇大律銘師多寶塔銘一首唐丞相太尉房公德銘李華玄宗季年逆將持兵天賜房公言正其傾羣凶害直事乃不行虜起幽陵連覆二京帝慈蒸人避狄西蜀爰命監國文粹作撫理兵北朔登賢為輔讓子以續公賫册書亦捧瑞玉聖人神聖天地咸若子孝臣忠元元踴躍命帥中軍謀殲羿浞人或有言志屈道行公曰不可屈則佞生柄不在公衆昏曀明退師儲宫出守函谷入為尚書正色諤諤又刺汾澮遽臨彭濮何負而東何負而西公受挫抑邦人悽悽帝懷明德悲文粹作俾我不迷徴拜秋官僉曰休哉薨殂閬中國瘁人哀喬嶽隕躓輔星昏霾天子洟涕追崇上台巖巖岱宗瞻其峻極赫赫房公尊其盛德昔撫宜春列邦是式建銘江濵以慰南國四皓銘天靜地一默成四時人妙其用三靈推移遁蛻秦禍出扶漢危道不可屈南山採芝抱和全默一作飽和全終皆享期頥山下水濵四墳纍纍悚慕玄風徘徊古祠世德銘權德輿肅肅我祖玄鳥自天天乙革夏武丁相賢手文命子開國于權肇荒南荆瓜瓞綿綿爰暨周衰征伐下顓凌暴紛紛遇楚而顚嬴吞四方我邦用遷乃宅隴坻乃封甘泉漢魏之際德業集作守相相繼或仁或哲亦夷亦惠圖諜葳蕤十有三世伊川其戎晉化為東九州輻裂苻有關中明明安丘濡迹匪躬二紀清夷明謨之功元魏以降苴茅繼封宜昌鄜域仍世儀同洸洸平涼䇿勳于隋乃破公祏尅其枚回運偶聖時土田載開仗節建旄自東徂西才子六人承家鍾慶百里同休南宫並命自時厥後德輝愈盛不享大官世名文行我曾王父弱嵗觀光聲䡍太學名登奉常偉節三虎聫華並芳翰苑春生士林鳯集作風翔逮至王父保和居易人文獨步天爵自貴展禽下位賈生不試至今德聲尚聳清議郁郁世範先子承之大節明義人倫宗師行極忠孝道冥希夷卷舒無方焯耀當時曰豫無狀齓嵗而孤不知義方藐爾蠢愚亦既羈丱甫習詩書以直為師與時寖疏琅琅清風皎皎士則及兹頑童是玷是辱聿修之誡大懼不克夙夜以思敢銘世德塔廟大愛敬寺剎下銘梁簡文帝夫波若真空導大一作羣生於假域涅槃有岸引未度於無邊應此十千現兹權實隨方攝受孰能𢎞濟皇帝照盡神原心凝寂境深慈降迹下答蚳蝝握鏡斷鼇經綸世祖一作阻故能天地貞觀日月重光業曠四𢎞功侔十力惠雲旦聚浸澤灑於遐外法炬夜明揚光燭於梵頂因心孝愛道契神明昭事誠享曰隆哀敬金車答瑞追德慶於虞年甘露登祀比嘉祥於漢日既而理局舜圖事終典思所以功超域外道邁寰中廣樹大緣增隆勝善事等淨名齊方便於圓極迹均妙掌襲兩寶於冥因乃於鍾山竹澗奉為皇考太祖文皇帝造大愛敬寺焉惟茲神嶽勢負龍形均太華之四成狀彭門之雙起曲澗推移激水精之浪清風窈蕩散雲母之行顯帶皇邑標地德之慶雲彌望帝躔矚神居之敞麗昔鴈泉之願真如所隲鷲形之嶽大聖攸居創此伽藍同符往迹以普通三年嵗次壬寅二月癸亥朔八月庚午建七層靈塔百旬既聳千龕乃設漸山啓基踰於禁國土金剎長表邁於意樂世界朱幡轉曜寶鈴韻響聞聲者入道見形者除纍仙衣梵帶去鴈塔而來遊天香風笙辭鶴城而下集靈祗叶贊有識歸依四將五龍翹勤翼衛八臂三目頂帶護持雖復劫盡恆沙衣消巨石儼如常位妙相長存作銘曰朕哉睿聖至矣炎精功昭鳯紀德契雲名冥符七覺爰極四生儀形懋典道駿有聲皇心閔睇理篤天誠八萬神構二四雲并懸梁浮柱沓起飛楹日輪下蓋承露上擎玉函藴色珠髮韜明花一作光窟炎聚石影光輕天下欽仰幽願一作顯贊成法舟斯濟惠海方清淨界無毁金地永貞秦州天水郡麥積崖一作山佛龕銘并序庾信麥積崖者乃隴底之名山河西之靈嶽髙峯尋雲深谷無量方之鷲島迹遁三一作二禪譬彼鶴鳴虛飛六甲鳥道乍窮羊腸或斷雲如鵬翼忽已垂天樹若桂華翻能拂日是以飛錫遙來渡杯逺至疏山鑿洞鬱為淨土拜燈王於石室乃假馭風禮花首於山龕方資控鶴大都督李允信者籍以宿植深悟法門乃於壁之南崖梯雲鑿道奉為亡父造七佛龕似刻浮檀如攻水玉從容滿月照曜青蓮影現須彌香聞忉利如斯塵野還開説法之堂猶彼香山更對安居之佛昔者如來追福有報恩之經菩薩去家有思親之供敢緣斯義乃作銘曰一作云鎮地鬱盤基乾峻極石關十上銅梁九息百仭崖橫千尋松植一作直隂兔假道陽烏飛一作回翼載疏山穿龕架嶺糾紛星漢回旋光景壁纍經文龕重佛影雕輪月殿刻鏡花堂橫鐫石壁暗鑿山梁雷乘法鼓樹積天香嗽泉珉谷吹塵石牀集靈真館藏仙册府芝洞秋房一作分檀林春乳水谷銀沙山樓石柱異嶺共雲同峯别雨冀城餘俗河西舊風水聲幽咽山勢崆洞法雲常住慧日無窮方域芥盡不變天宫周故內供奉學士懷州河內縣尉陳公集作君石人銘陳子昻君諱該字彥表綿州顯武人也其先自頴川遷蜀一有上字矣曾祖某祖某考永貴皆養髙不仕君少好學能屬文上元元年州貢進士對䇿髙第釋褐授將仕郎其明年制勑天下大儒司屬少卿楊守納薦君應詞殫集作彈文律對䇿髙第勑授茂州石泉縣主簿開耀元年制舉太子舍人司議郎太府少卿元知讓應制薦君於朝堂對䇿髙第勑授隆州蒼溪縣主簿垂拱四年又應制學綜古今對䇿髙第勑授懷州河內縣尉凡歷所職皆以清廉仁愛著聞有周革命天授二集作三年恩勑自河內追入閣供奉居未期年不幸遇疾於神都積善坊考終厥命時年六十三歸葬於豆圖集作圌山之陽原禮也嗚呼哀哉古人有云飾顔夷之行不逢青雲之士而聲名磨滅者有之矣嗚呼我陳君敦懿玄默浩集作潔清溫良馴道執恕集作志好古博學集作好學博古恂恂焉行髙職卑不改其操學優祿薄不怨於天四舉有道三歷下位晏如也非諄諄淑人其誰能涅此集無此字而不渝哉夫知命可謂君子矣好學可謂為文矣丹書不藏於勳府青史不昭於方册於戲一絶故老之口孰知夫子之賢哉吾與君族人也能服美其德尚矣昔子雲稱李元常璿敘令伯皆歿而不朽後世集作代稱之斯非若人之徒歟吾豈默而無述其銘曰誾誾君子好斯文兮縟藻盤章潛卿雲兮棲遲下位允升聞兮金署玉堂見吾君兮鸞階鴻漸期紫氛兮鐘鳴漏盡竟蘭焚兮儒行墨節將何云兮恭承遺言立石人兮金刻丹書記嵗辰兮青龍甲午銘兹墳兮燕然軍人畫像銘并序龍集丙戍有唐制胸奴五十六載蓋署其君長以郡縣畜之荒服賴寧古所莫記是嵗也金微集作徽非州都督僕固始傑集作桀驁惑亂其人天子命左豹韜衛將軍劉敬周集作同發河西騎士自居延海入以討之特勑左補闕喬知之攝侍御史護其軍事夏五月師舍于同城方絶大漠以臨瀚海君子曰兵者凶器仁者惡之醜虜猖狂厥自招咎今至尊不得已而順伐帝集作嘗聞西方之聖有能仁者凶殘集作吉之業各報以直則使元惡授首羣氓不孤兵無血刃荒戎底定豈不在於大雄乎諸將部校僉曰允哉將軍乃飭躬率士卒因古祠廟圖畫形容有古之彌勒像耶集作也天人備容丹素畢彩蓋以昭乎景福也乃作頌曰盱江本作銘曰耀天兵兮征荒服絶雲漢集作漢兮出玄極白羽斾集作飾兮青雲旗簫鼓鳴兮士馬悲願左右兮浮屠道備丹青兮妙天寶功既畢兮業既成神之來兮福冥冥皇誕日畫像銘并序蘇頲蓋聞上聖膺期流虹演慶大仙昭事滿月開祥故能因時叶符感通福應伏惟太上皇提衡御極握鏡臨人萬宇宅心百蠻翹首緬懷姑射乃傳政於繼名寂想耆闍用崇因而詮妙既而炎曦戒律序屬長羸大電繞樞辰推載誕顧猗蘭之不逺攀寶樹以先低則有敬範真容虔資願力泊功德成就莊嚴圓滿近披金縷徹珠頂以凝華傍映水精寫瓊毫而洞色有緣起念無疆薦祉格于上下普逮飛沉咸啓方便之門轉躋仁夀之域敢為銘曰惟皇誕睿承於宥密惟佛生天同於夢日爰規法相是獻福田脣含妙果步起芳蓮仙宫所出曠劫方傳大唐故悼王石塔銘并序唐開元五年嵗在丁已四月庚午朔二十一日庚寅故悼王薨於上陽之中禁年曰二嵗而未及周嗚呼哀哉王即開元神武皇帝第九之愛子也以某月二十七日景申葬於萬安山之東南嶺壙唯五尺棺不三寸壘石塔一丈于其上不雕不礱從省薄也其銘曰南有萬安兮北有洛城城可望兮天之京嗚呼悼王寧不戀兮嗚呼悼王寧不見兮倚素塔兮陵翠微空不礙兮雲則飛嗚呼悼王兮其何一作來歸唐故寶應寺上座內道場臨壇大律師多寶塔銘并序權德輿京師東門二里所多寶塔者沙門靈湊等為先大師薦祉盡敬之地也大師諱圓敬姓陳氏河南陸渾人報年六十四經夏四十四以貞元八年春正月厭代入滅於保夀寺越十有五日遷窆于龍首北原距兹塔西北十餘步初大師入道依本縣思逺寺微公通法蓮經寶應二年制度編僧籍於東京長夀寺受具於白馬寺本一作奉律師口雲無德義言不信解以為遵道途而歸集作抵都邑涉門閾而躋堂皇故尸羅毗尼以攝妄想五部四分是為扄鍵然後因定發惠登最上乘優婆鞠一作掬多由是道也敷暢微妙攘除癡冥如一燈傳照一雨潤物𢎞我法者可勝道哉代宗朝徴入內道場纍詔受興善安國寶慶等寺綱首又充僧録尋授寶夀寺上座賜律院以居授瑜伽灌頂密契之法講楞伽經起信論譯虛空藏經鑒義潤文世典羣書靡不該貫無非宴座道埸沃天心以了義照佛日於中禁鬱為龍象大拯斯人將滅之夕備申告誡中夜纍足如期順化其智惠歟其解脫歟法子苾芻縗服成列仰護念慈衷之旨捨蓮華多寶之義厥後十五年而功用成丹素觚稜石輪火齊施於外聖像真言多羅祗夜函於內又以見湊公成就付囑而為上首况不出户庭持經萬遍願力斯滿嚴飾斯崇勒銘于兹以示塵劫銘曰三生不駐如電如瀑七情格攻如蠆如蝮彼上人者為世導師乃精毗尼以攝羣疑𢎞道日大化緣斯畢建兹嚴事如地湧出國門之東萬宇來同斯為寶所獨集作燭耀無窮溫陵黃伯光曰此卷及後卷中塔銘皆僧墓志也英華編入銘中殊不類愚意當刪出别為一卷附諸墓志之後今姑仍舊識之以諗覽者焉文苑英華卷七百八十五
