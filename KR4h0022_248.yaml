body:
  text: 文苑英華卷二百四十八宋李昉等編寄贈二盧思道二首楊素十七首王胄二首虞世基一首陳子良一首孫萬夀一首陳政一首王績二首郭元振一首蘇味道二首贈劉儀同西聘盧思道開卭昔柔逺賔越盡招攜豈若馳天一作天王使玉節撫遺黎五詞疑作祠臨渭北雙嶺帶崤西故關看金馬餘壇聽寶雞垂絲被栁陌落錦覆桃蹊分袪俄易慘離思實一作忽難齎極野雲峯合遙嶂日輪低塵暗前旌沒風長後騎嘶灞陵行可望函谷久無泥須君勞旋罷春草共萋萋贈李若前人初發清漳浦春草正萋萋今留素滻曲夏木已成蹊塵起星橋外日落寶壇西庭空野煙合巢深夕羽迷短歌雖製素長吟當執圭寄語當窗婦非關惜馬蹄贈薛播州十四首楊素在昔天地閉品物屬屯蒙和平替王道哀怨結人風麟傷世已季龍戰道將窮亂海飛羣水一作亂流飛海若貫日引長虹干戈異革命揖讓非至公二兩河定寶鼎八水域神州函關絶無路京洛化為邱漳淦連爾沼涇渭余别流生郊滿戎馬涉路起風牛班荆疑莫遇贈縞竟無由三五緯連珠聚千載濁河清金亡潛虎質閏盡自蛙聲聖期依旦暮天祿啓炎精霧生三日重星飛五老輕禋宗答上帝改物創羣生四道昏雖已朗政故猶未新刳舟洹水濟一作溟水際結網大川濵出逰迎釣叟入夢訪幽人植林雖各樹開榮豈異春相逢一時泰共幸百年身五有帛賁邱園生芻自幽谷塵芳金馬路瀾清鳳池澳零露既垂光清風復流穆傾蓋如舊知彈冠豈新沐利心金各斷芬言蘭共馥六自余歷端揆緝熙恧時彥及爾陪帷幄出納先天眷髙調發清音縟藻流餘絢或如彼金玉嵗暮無凋變余松待爾心爾筠留我箭七荏苒積嵗時契闊同逰處閶闔既趨朝承明還宴語上林陪羽獵甘泉待清暑迎風含暑氣飛雨凄寒序相顧惜寸隂留情共延佇八滔滔彼江漢實為南國紀作牧求明德若人應斯美髙卧未褰帷飛聲已千里還望白雲天日暮秋風起峴山君儻逰淚落應無已九漢隂政已成嶺表人猶蠧借寇北方新還珠揔如故楚人結去思越俗歌來暮陽烏尚歸飛别鶴還回顧君見南枝巢應思北風路十北風吹故林秋聲不可聽鴈飛窮海寒鶴唳霜臯淨含毫心未傳聞音路猶敻唯有孤城月徘徊獨臨映吊影余自憐安知我疲病十一養病願歸間居榮在知足棲遲茂陵下優遊滄海曲古人情可見今人一作我遵路一作故躅荒居接野窮心物俱非俗桂樹方叢生山幽竟何欲十二所欲棲一枝稟分豐疑諸已園樹避鳴蟬山梁遇時雉野隂冒叢灌幽氣含蘭芷悲哉暮秋别一作晨霞既悲哉春一作暮草復萋矣鳴琴久不聞屬聽空流水十三秋水魚逰日春樹鳥鳴時濠梁莫共往幽谷有相思千里悲無駕一見杳難期山河散瓊蘂庭樹下丹滋物華不相待遲暮有餘悲十四銜悲向南浦寒色黯沉沉風起洞庭險煙生雲夢深獨飛時慕侣寡和乍孤音木落悲時暮時暮感離心離心多苦調詎假雍門琴贈薛內史楊素耿耿不能寐京洛久離羣橫琴還獨坐停杯遂待君待君春草歇獨坐秋風發朝朝唯落花夜夜空明月明月徒流光落花空自芳别離望南浦相思在漢陽漢陽隔隴岑南浦達桂林山川雖未逺無由得寄音山齋獨坐贈薛內史二首前人居山四望阻風雲竟朝夕深溪橫古樹空巖卧幽石日出逺一作孤岫明鳥散空林寂蘭庭動幽氣竹室生虛白落花入户飛細草當階積桂酒徒盈樽故人不在席薄暮山之幽臨風望羽客二巖壑清澄景景清巖壑深白雲飛暮色緑水激清音澗户散餘彩山窗凝宿隂花草共榮映樹石相陵臨獨坐對陳榻無客有鳴琴寂寂幽山裏誰知無悶心為寒牀婦贈夫歸王胄月淨閨偏冷更深夜轉長霜紈猶掩扇霧縠未飄香解帶慙連理引被愧鴛鴦誰能未相識還為守空牀言反江陽寓目灞涘贈易州陸司馬王胄逰人賣藥罷徐步反江干行吟一作凝眸灞陵岸回首望長安晨華照城闕參差復鬱盤千門含日麗萬雉映霞丹雲開承露掌吹動相風竿逰童輕薄少鮮服鵕鸃冠花開傅粉晏塵起副車韓屢投雙飛劍曾操兩色丸桂玉要逰女彈珠落矯翰信美非吾樂何事久盤桓欲勒一作動南征一作登詠還謡北上難眷言思故友德疑逺路漫漫燕陲望楚服天際與雲端棹發吳濤上荆歌易水寒十年阻風月萬里别金蘭心期竟何許懷抱日摧殘容華冉冉謝衣帶朝朝寬盛憲寧延夀劉琨自少歡宿昔均取捨同波豈異瀾贈言不盡意擲筆起長嘆秋日贈王中舍虞世基秦關望吳苑渭涘去江濆天漢星躔絶山川地角分百年變朝市千里異風雲雙鴛難可贈别鶴不相聞忽值從逰士玳簮光素履歡言恱鄭郊雪泣悲燕市契闊論談笑殷勤訪生死思君在一方無由同四美尺素乃云披投瓊慰九離雲開縟錦散霞照緑楊一作緹披相思歎河廣相望阻天垂贈言芳杜若握手一作以代萱枝伊昔風期早金蘭信為寶去來金馬門留連鬬雞道鷲嶺訪三禪商山追四皓勝地俱逰息披文遞論討虛薄忝官聮喬木遂同遷濯纓奔博望闊一作飛步入崇賢髙軒照流水長劍聳秋蓮南風忽不競東海遂成田喧喧狹斜路隱隱平陵樹鳳闕愛疑西臨星橋耿南注五方多異俗四海皆行路士衡嗟苦辛德璉傷流寓鞏洛重行行寓目盡傷情太行臨北絳函谷拒西京雀書圖久滅龍文鼎遂輕凌雲餘構盡濛汜曲池傾一作平徘徊殊未極惆悵空雲纓伊川忽會面留連展言宴東西一背飛翻然成異縣哀哉人道促痛矣嗟埋玉徐生顧影琴裴子飄鳳燭權欵作摧茲激水意頓此浮雲足棄置忽疑作勿重陳難終唯此曲漢陽趙元淑後漢趙一字元叔漢陽人今作淑恐非薛縣雍門周清文寧解鬢妙曲反增愁翳翳神逾伏凛凛嵗方遒雙崤飛暗雨八水凍寒流蘭枯芳草歇槐古憶前秋江干不可望徒此歎離憂讃德上越國公楊素陳子良君侯稱上宰命世挺才英本超騏驥足復藴風雲情攄藻掞錦綺育德潤瑶瓊已踵四知舉非無三傑名濟世同舟楫匡政本阿衡雍容入青璅肅穆侍丹楹桂宫擅鳴珮槐路獨飛纓髙門羅虎戟綺閣麗雕甍金樽酌湛湛歌扇掩盈盈胸奴軼燕薊𤇺火照幽并天子命薄伐受脤事專征七德播雄略十萬騁行兵鴈行蔽虜甸魚貫出長城交河方飲馬瀚海盛揚旌拔劍倚天外象犀耀日精彎弧穿伏石揮戈斬大鯨鼓鼙朝作氣刁斗夜便鳴六郡多壯士三邉豈足平嶺雲朝合陳山月夜臨營胡塵暗馬色芳樹動笳聲關雲未盡散塞霧常自生川長蔓草緑峰回雜花明小人愧王氏雕文慙馬卿濫此叨書記何以謝過榮髙山徒仰止終是恨才輕逺戍江南寄京邑親友孫萬夀賈誼長沙國屈原隋書本傳作平湘水濵江一作東南瘴癘地從來多逐臣粵余非巧官少小一作䇿少拙謀身欲飛無假翼思鳴不值晨誰言隋書作如何載筆士翻作負戈人飄颻如木偶棄置同芻狗失路乃西浮非狂亦東走晚嵗出函關方春度京口石城臨虎據天津望牛斗牛斗盛妖氛梟獍已成羣郗超初入幕王粲始從軍褁糧楚山際被甲吳江濆吳江亦浩蕩楚山何紏紛驚波上濺日喬木下臨雲繫越恆資辨喻蜀幾飛文魯連唯救患唐彬不競勤晉書唐彬知孫皓將至遲留以示不競今隋書作吾彥不爭勳按吾彥乃降將本傳無不爭功事未詳羇逰嵗月久歸思常搔首非關不樹萱豈為無杯酒數載辭鄉縣三秋别親友壯志後風雲衰鬢先蒲桞心緒亂如絲空懷疇昔時昔時逰帝里弱嵗逢知已旅食南館中飛蓋西園裏河間本好書東平唯愛士英辨接天人歡娛承帝子隋書作清言洞名理鳳池時寓直麟閣嘗逰止勝地盛賔僚麗景相攜招舟泛昆明水騎指渭津橋祓除臨灞岸供帳出東郊宜城醖始熟陽翟曲新調繞樹鳥啼夜雊麥雉飛朝細塵梁下落長袖掌中嬌留連三雅至隋書作歡娛三樂至懷抱百憂銷夢想獨非隋書作猶知昨尋思久寂寥一朝牽世網萬里逐波潮回輪常自轉懸旌不堪搖山川想隋書作登髙視襟帶鄉關白雲外回首望孤城愁人益不平華亭宵鶴唳函隋書作幽谷早鶯鳴斷絶心難續惝恍魂屢驚羣紀通家契隋書作好鄒魯故鄉情儻隋書作若值南飛鴈時希隋書作能訪死生贈竇蔡二記室入蜀陳政崑山積良寶大厦構衆材馬卿委官去鄒子背淮來風流信多美朝夕豫平臺逸翮獨不羣清才復遒上六輔昔雄名二江今振響漢書嚮響通用英華雖外發磨琢終內朗四海奮羽儀清風久播馳沉鬱材難厠青山翻易阻回首望煙霞誰知慕儔侣飄然不繫舟為情自可求若奉西園夜浩想北園愁無因逐萍藻從爾泛清流贈梁公王績我欲圖世樂斯樂難可常位大招譏嫌祿極生禍殃聖莫若周公忠豈踰霍光成王已興誚宣帝如負芒一作恆如芒范蠡何智哉單舟戒輕裝踈廣豈不懷䇿杖還故鄉朱門雖足恱赤族亦可傷履霜成堅氷知足勝不祥我今窮家子自言此見長功成皆能退自古集作在昔誰滅亡薛記室收過莊見尋率題古意以贈王績伊昔逢集作遭喪亂歷數適集作閏當餘豺狼塞衢路桑梓成邱墟吾集作余及爾皆亡東西各異居爾為背風鳥背集作培我為涸轍魚逮承雲雷後欣逢天地初東川集作州聊下釣南畝試揮鋤資稅幸不及伏臘常有儲散誕時須酒蕭條頻向書朽木不可雕短翮將焉攄故人有深契過我蓬蒿廬曳𥚑集作履出門迎握手登前除相看非舊顔一作顔匆若非對接集作匆若形骸踈追道集作悼宿昔事切切心相於憶我少年時攜手逰東渠梅李夾兩岸花枝何扶踈同志亦不多西莊有姚徐嘗愛陶淵明酌醴焚枯魚嘗學公孫𢎞䇿杖牧羣豬追念甫如昨奄忽成空虛人生詎能幾嵗嵗集作蹇迫常不舒賴有北山僧教我以真如使我視聽遺自覺塵纍祛何事須筌蹄今已得兔魚舊逰儻多暇同此釋紛拿寄劉校書郭元振俗吏三年何足論每將榮辱在朝昏才微易向風塵老身賤難酬知巳恩御苑殘鶯啼落日黃山黃山山名也一作荒非細雨濕歸軒回望漢家丞相府昨來誰得掃重門贈封御史入臺蘇味道故事推三獨茲辰對兩闈女鴉共鳴舞屈草接芳菲盛府題青橐殊章動繡衣風連臺閣起霜就簡書飛凛凛當朝色行行滿路威唯當擊隼去復覩落鴻集作路鵬歸在廣州聞崔馬二御史並拜臺郎前人振鷺齊飛日遷鶯逺集作達聽聞明光共待漏清覽各披雲喜得廊廟舉嗟為臺閣分故林懷柏恱新握集作幄阻蘭薰冠去神羊影車連瑞雉羣逺從南斗外遙仰列星文文苑英華卷二百四十八
