body:
  text: 文苑英華卷五百八十四宋李昉等編藩鎮謝官一藩鎮謝官表四卷英華所編失年代先後今正之為西川崔僕射謝却赴劒南表一首為䕫州柏都督謝上表一首為崔鄴公謝除鳯翔節度使表一首謝除浙西節度使表一首代郭子儀謝副元帥河中節度使表一首代郭子儀謝兼河東節度使表一首為陳大夫謝上淮南節鎮表一首湖南觀察使謝上表一首為荆南節度使謝恩表一首為鄭儋尚書謝河東節度使表一首為裴相公謝淮西節度使表一首為馬揔尚書謝除彰義軍節度使表一首河南節度使謝上表一首謝除宣歙觀察使表一首為昭義王大夫謝知節度觀察等留後表一首為安平公謝除兖海觀察使表一首為西川崔僕射謝却赴劍南表闕名臣某言自中使馬承倩送臣却至所部漢州回監軍中使孟遊仙等續發北面拜天南旋舊鎮望九門而彌逺顧三蜀而何情如丹之心具列前表庶明臣子之分以期君父之知臣某中謝臣四度興師每冬獻捷願將邊事親達宸聰比恐三軍阻臣行計潜裝密辦亦既經年上都贏糧傍路支費事皆前定誓衆遂行日望京關一作闕天威咫尺豈知時乖運末屬彼外虞徵發之期指縱又切進退難處倣徨以還有心未明有口猶閉若撻之耻空思於堯舜戀主之誠倍慙於犬馬臣知衙一作從事官王所傅遙自經驅使積有嵗時言行為一作惟一惟一作為臣腹心當今切務具如别狀悉令密啓逺達由衷伏乞聖慈俯回神鑒仍賜容納許以畢辭天下幸甚天下幸甚其有不載文墨更令附口奏聞皆是刳心所陳豈為億一作臆中之說倘可裨補雖死猶生區區赤實敢希萬一臣以今月某日却至成都乞整齊戎事即赴行營兩藩動靜續冀聞奏衆星微象長拱北辰勺水細流盡朝東海惟臣不及飲恨何言無任感戀屏營之至謹奉表陳謝以聞為夔州集作府柏都督謝上表臣某言伏奉今月某日制授臣某官臣祗拜休命內顧隕越䇿駑馬之力冒纍踐之寵自數勛力萬無一稱再三怵惕汗流至踵謹以某月日到任上訖臣某誠戰誠懼頓首頓首死罪死罪伏惟陛下以君父任使之義掩臣子不逮之過就其小效復分深憂察臣劒南區區恐失臣節如彼加臣頻煩階級鎮守要衝如此勉勵疲鈍仗揚陛下之聖德愛惜陛下之百姓先之以簡易間之以樂業均之以賦斂終之以惇勸然後畢禁將士之暴𢎞洽主客之宜示以刑典難犯之科寬以困窮計無所出哀今之人庶古之道內救惸獨外攘師寇上報君父曲盡庸拙之分下循臣子勤補失墜之日灰粉骸骨以備守官伏惟恩慈胡忍容易愚臣之願也明主之望也限以所領未遑言集作謁對無任兢灼之至謹遣某官奉表馳集作陳謝以聞為崔鄴公謝除鳯翔節度使表臣某言伏奉去月二十八日恩制加臣鳯翔尹仍充本府及秦隴等州節度觀察使伏以才淺過深者敗公之本力微任重者職禍之由况鳯翔天京四方取則使增廉問千里準繩茍非其人是速官謗前已再三懇讓實冀陛下矜臣不逮察臣無能忝侍朝廷獲遂陳請豈意堯曦下屬舜澤旁流荐降殊恩不許固讓恭承寵命感懼交懷臣某中謝伏惟陛下德耀三光勳崇萬古彛倫式序庶績其凝臣本愚才素之籌略謬膺任使纍踐殊班顧無毫髮之功叨預丘山之寄今鳯翔近甸秦隴雄藩北有党項之虞西有羌渾之患或阻絶我道路或侵軼我封疆王師出征則鳥散山谷官軍罷討則雨集郊圻臣雖不才庶竭孱懦必將勸分務穡訓卒厲兵勦除凶殘式遏寇虐使黎元無俶擾之患里閭無暴殄之災下傾百慮之愚上補萬分之一臣無任謝除浙西節度使表肅宗顔真卿臣真卿言伏奉六月九日恩制以臣為升州刺史充浙西節度使兼江寧軍使聖德含𢎞不遺簮履捨其罪戾假以麾幢感戴恩榮死生知報臣某中謝臣以為全吳舊國分閫重權煮東海以自資塹西河而作固九州天險之地六代帝王之都是以魏文興嗟甘從南北之限苻堅恃衆集作怙侈爰喪百萬之師豈不以形勝是先腹心斯切親賢重寄鎮遏攸難矧在庸微寧堪及此是以拜命之日以榮為憂制書以今月四日至饒州臣以今日發赴本道取都統節度觀察使李坦處分訖即赴升州即當繕修甲兵撫循將士觀察要害以備不虞假陛下英武之威遵陛下聖集作平明之理一心戮力上答天慈伏惟陛下察臣愚衷集作忠則死且不朽無任感戴屏營之至代郭子儀謝副元帥河中節度使表代宗邵說廣德元年臣某言伏奉今月日制授臣河東副元帥河中節度使寄深匡輔任切安危寵命遄臨憂惶如灼臣某中謝臣智術凡淺才略無聞承日月之光偶風雲之會自奉先帝狥以驅馳被甲即戎載罹寒暑比慿朝算克振天聲雖毫髮之功曾無足紀竟不能掃蕩妖孽使八方攸同謬踐中樞仍叨上將分茅錫土榮貫一時慺慺之誠竊自增愧今又猥蒙驅䇿出鎮河中授臣以連帥之權委臣以専征之務雖才輕方邵而任比桓文此陛下除奸之時乃微臣死難之日竊觀自古忠義之士莫不扶危救禍憂國忘家雖在暮年猶思報主則廉頗強飯馬援據鞍以臣方之有甚前哲軍國重事不敢固辭誓竭股肱之力以副腹心之寄倘皇猷獲展寇難克平殞身戎行實無所恨無任感恩代郭子儀謝兼河東節度使表前人臣某言今月日伏奉恩制授臣使持節都督雲州一作中下同諸軍事兼雲州太守充河東節度度支營田大使大同軍使管內採訪使祗拜休命內揣薄才委任専崇周章失據一作周張靡據臣某中謝臣聞邊之安危係於所用事之成敗諒在先謀故寸璧必求良工尺錦亦資善製况夫謀無智勇備列戎旃自守封疆頗淹嵗序肅將朝算一作命剪滅凶徒此乃天功匪惟臣力陛下不遺犬馬念以驅馳收其分寸之勞加以丘山之賞禮因位重恩與日深長恐顛危不克負荷所以非有疑陳讓乞停范陽而手詔曲一作榮垂不蒙允許退就私室竊愧明時素餐之詩自臣攸作今又更承奬命兼以河東邊境相連三千餘里𤇺燧列警斥􅕤須明雖則居安一作安寧終資有備以臣獨制謂必無失然以能處一事身任一官猶擇其人且懼曠職况臣旁綰三節控帶數藩智有所不周心有所不及兵權倘失奔駟寧追實慮授受乖宜簡書是畏望特矜臣不逮察臣愚謏更選良能付以旄鉞則樵夫絶議官序有倫臣無任為陳大夫謝上淮南節鎮表代宗劉太真大厯八年臣某言今月二十日中使輔懷恩送告身至伏見一作奉恩制特加臣銀青光祿大夫揚州大都督長史充淮南節度使仍封潁川縣開國子一作男食邑五百户者臣以駑駘賤質葵藿愚誠謬荷深一作殊恩頻膺重寄一作移日月私照雨露曲霑負戴不任兢惶失措臣某中謝臣自逺辭天闕恭守海隅思陛下臨御之勤竊罄愚衷蹇拙之分所恨智慮不及績用無一作罕成豈望陛下知懇欵之不渝將纎毫而見擢特超階序俾易旌旄錫以開國之封授以臨戎之節由江南一作浙之逺鎮踐淮表之名藩且地在要衝職名一作居分閫副兹統理豈易其人臣亦何功忽當此任仰膺休命難叨覆載之榮伏省微躬實積負乘之懼臣即以今月二十五日發赴揚州其浙東使事已差觀察使殿中侍御史盧翰權知留後無任感戴戰越之至一作皆唐類表湖南觀察使謝上表王仲舒臣某言臣以某月日到本部上訖榮如夢中不敢自信臣某誠歡誠懼頓首頓首臣頃備位省官孤特無與自堅內志不近權門逞憾者以陰計中臣伺其顛沛而臣位從懼進身自危安陛下之保臣也陛下開張至道以福羣生長人之吏必以嵗久課其能否定其差等一作著令特疑作時無幸人獨臣領常州一年超居近地陛下之私臣也臣當此時不能稱揚隱晦以納聖聰一作聰聽論列竒計以靖封略使下有勝臣而未用者邊有戰聚而偷生者是臣負陛下之知也况今方隅之任得其人則聖慮安失其才則衆情苦斯位不細惟賢者宜之臣前官已曠後恩逾重公議難逭隕越是憂謹當日奉皇慈下求利病鎮浮惰之俗杜奸邪之萌冀其小康上簡天府臣之心也敢有二事不勝感恩戀闕之至一作皆唐類表為荆南節度使謝恩表臣某言中使某至奉三月二十五日敕除臣江陵尹兼御史大夫荆南節度觀察處置等使者如綸炳然中天而下伏讀惶駭不知所裁臣某誠歡誠恐頓首頓首臣既無老謀又無壯事塵玷重位前後六年將陛下覆幬之仁煦嫗羣物所至之上方獲小安如日照臨人共知見敢盜以為己功况文昌六星將帥為首非全才碩德類表作畫未嘗茍居陛下睿慮神行雄威電斷將付斯任尤精其人過量之榮臣獨虛受類表作臣實虛授若在夢寐不敢自期即以今日祗命上道臣團練判官太子舍人兼侍御史楊洽類表作暢怡久更吏塗兼練戎事謹差専領留務待李衡交割不勝感恩欣躍之至謹奉表陳謝以聞為鄭儋尚書謝河東節度使表德宗令狐楚貞元十六年臣某言衙官竇及回伏奉十月二十九日詔書授臣朝散大夫檢校工部尚書兼御史大夫太原尹北都留守充河東節度度支營田觀察處置等使勳賜如故者寵章明命忽降自天捧受兢惶不知所措臣某中謝性禀一作本愚懦才惟薄劣居常勵已進匪因人心無所營宦不期達伏蒙陛下旁羅俊乂登用賢良擢臣於博士之中授臣以良史之任其後驟升郎署猥在朝行塵忝日深光耀隆一作輝已極徒思報效未有因緣旋屬邊上選能軍中乏使特蒙宸眷遣佐兵符空知狥公無以稱職望帝城而積戀倐已四年處戎幕而懷憂若臨千仞本使李說暫嬰疾苦奄從薨逝伏以天威逺被廟略克成將士等盡忠義之心竭恭敬之力保完府庫鎮定城池奸宄不生三軍如一軍一作監使李輔光器能周敏智識通明與臣同心祗奉王事豈意殊常渥澤忽出於宸中不次榮名併加於朽一作賤質仰承雨露使一作便在雲霄局影兢魂心驚股戰進非所據懼不自勝臣伏以太原守在北門地方千里豐沛故壤陶唐遺人合求勳賢膺此委用如臣山東弱植海內散材非郤縠禮樂之資無翁歸文武之用將何以佩六官之印綬平三府之憲章節御一作制萬人典司百事天庭高邈陳讓無由感恩而涕下霑襟一作𫀆忍愧而汗流浹背謹以三日上訖敷陳一作演天意叶暢軍情綸言一宣列校相慶臣誓當恭承睿算䖍奉聖慈以安人和衆為心用報國忘家為志冀伸分寸上答聖明所守有限不獲陳謝臣無任感戴屏營之至一作皆唐類表為裴相公謝淮西節度使表馮宿元和十二年臣度言伏奉去年七月二十七一作五日制書除臣門下侍郎同中書門下平章事充淮西節度觀察處置等使蔡州刺史并淮西宣慰處置等使緣逆賊吳元濟尚拒王師遂於郾城縣權為理所臣篤勵羣帥潜設多方傾其重兵頓在洄曲今月十七日唐鄧節度使李訴乘虛直進生致元凶臣與賈柵三營諸軍便降洄曲三萬餘衆積年逋寇翌日殄除淮右千里通行無礙臣以二十五日領所部兵馬及歸順將士至蔡州上訖豺豕舊穴迎風而迅掃鴟梟故林應節而黃落瞀瞀者咸觀堯日皤皤者重識漢儀臣以不才猥當重寄力一作下排茍且之議上贊聖明之心不敢偷安廟堂遂期親臨疆埸陛下初猶未一作不許微臣亟請是行睿㫖丁寧寵光照耀臣中心自警畢命無憾若不成事必當死綏伏願神道惡盈罪人斯得而今而後方保餘生就天地削平之功貽策書不朽之美是使懦夫增氣獷俗刳心方偃武以修文故暫勞而永逸臣謹敷揚帝澤宣布國章滌其瑕疵衣以襦袴俾斯汚俗咸若新邦底寧但以才一作某乏折衝任兼中外摩頂至踵諒無非其渥恩知臣者君庶不辱於𤣥鑒無任感激欣喜之至其承薦人自代具於别狀為馬揔尚書謝除彰義軍節度使表憲宗前人臣某言臣今月某日中使某至伏奉九日制書除臣工部尚書兼御史大夫充彰義軍節度觀察處置等使并賜官告一通旌節一副及手詔等雨露恩覃霑霈易及丘山施重負乘難勝臣某中謝伏惟睿聖文武皇帝陛下文教暢三台武功加四海蕞爾淮寇久稽靈誅蓋懷捨服之心不以䖍劉為事既已統之上將撫以中台臣實妄庸獲充二職誠無禆補亦備阽危頃來靣辭密奉天㫖以為此道必付微臣蒼黃受恩僶俯從事幸擒元惡曾未踰時果復聖言遽承寵命彩章五色䖍奉璽書賞罰二權猥操兵柄鴻私薦及蚉力何堪即以今月上訖臣伏聞師之所處荆棘生焉今管內數州凋殘極矣遍郊骸胔比屋瘡痍謹當扇以皇風施之帝澤俾汙俗遷善頑人嚮方知無不為敢竭微志事有未便即當上聞徒以跡逺闕庭戀深皂棧鑿門授鉞空愧于兹執贄奉璋未知何日臣無任河陽節度使謝上表憲宗令狐楚元和十三年臣某言伏奉前月二十七日詔㫖授臣朝議郎使持節懷州諸軍事守懷州刺史御史大夫充河陽三城懷州節度使寵任非常怔營失次已再奉表陳謝訖臣某中謝臣器質庸懦材能駑下文詞小技不足飾身軍旅大權未嘗措意頃者叨居近密親事聖明選擢一作拔皆出於宸𠂻遭逢似一作自又作偶協於昌運進每憂國退常樂天曽不知操舟者忌臣及津執轡者畏臣先路雖皎皎下燭見一心之無瑕而營營謗興扇十手以相指去秋方半已出嚴扃今夏正中又離禁掖伏惟睿聖文武皇帝陛下恩深君父德厚乾坤憫棄席之思軫遺簮之念微臣自臨關輔恭守章程非官辦而政成幸人安而事集既無罪悔亦望歸還豈意便升疆場一作壇場超授鈇鉞再麾飄颻而出守十乘隱轔以啓行荷委寄而誠深若離違之稍逺就日積戀瞻天靡遑拂儒冠以自驚對朝服而增歎一作欷以今月十四日到本鎮上訖伏以郡稱河內山倚太行古為雄藩今號要地但緣瘡痍未復杼軸已空力欲輯綏曷由振舉謹當拊循羸卒字育疲氓橫征擅賦誓不為一作行峻法嚴科議不用與之休息使得便安以此執心期於報德前臨河一作濟瀆羡朝宗而指期仰觀衆星俟一作思拱辰而何日所守有限不獲詣闕辭讓無任感激一作恩攀戀涕咽之至一作皆唐類表謝除宣歙觀察使表穆宗前人元和十五年臣某言伏奉今月日制書授臣宣州刺史兼御史大夫充宣歙池等州觀察處置等使者命自類表作出九重恩加一介兢惶感惕無地自容臣某中謝臣本以凡才從來孤立謬居要地常積憂危頃者陛下嚴奉園陵孝思弓劒微臣職當營護理合勵精而昧於隄防誤有任使既招牒訴合抵憲章豈意類表作謂陛下恩過生成念深簮履寬朝廷之典制委藩鎮之賦輿飛魂再還戰汗交集誓當飲氷食蘗鏤骨銘肌冀申絲髮之效上報乾坤之德不勝感恩惶恐屏營之至為昭義王大夫謝知節度觀察等留後表前人臣某言中使第五守進至奉宣敕㫖擢臣知節度觀察等留後臣即以今月十八日上訖非常之命降自宸𠂻不次之恩猥加賤質奉戴兢惕罔知所圖臣某中謝臣內顧孱庸素無器業量力揣分委質戎行身居將列朝絶親援不識公卿之第粗聞宰輔之名雖學孫吳未知七德之要嘗師顔閔不究六經之㫖愚惟守直訥未近仁逺瞻等夷每愧劣薄茍求寡過之地竊慕事君之道束髮筮仕逢盛時以自怡執心許國遇暗室而增懼臣之愚素敢忘恩榮頃以陪臣獲隨覲見比辭瑶陛瞻覩天顏遂因頒慶竊膺寵錫自謂生足榮矣死無恨矣豈意聖慈煥發睿奬曲成拔自轅門寄之藩閫洎天心特達因屈朝章而人望乖踈必速官謗內念惶灼浩無津涯且上黨重鎮赤狄遺人師旅荐興風俗難理猛則生怨寬不知恩鄰接強暴地當關塞加之以仍嵗災沴不足以兩稅徵科軍政稍乖壓覆是懼臣雖竭股肱之力瀝肝膽之誠不知何以上答乾坤少裨塵露云云為安平公謝除兖海觀察使表李商隱臣某言今月某日中使王仕岌至奉宣恩㫖改授臣某官并賜臣前件告身一通者寵命天臨恩光春煦兢惶無措抃蹈失容臣某中謝臣幸逢昭代本自諸生文以飾身學實為已寧韞玉而待賈竊運甓以私勞春闈再中於明經天官一升於判第階級甚薄際會則多藝閣讎書藍田集作山作史中間因依知已契濶從軍其後超屬憲司驟登郎署埋輪而出高懸集作慙八使之威起草以居逺謝三臺之妙每含香而自歎常襆被而待命一作行伏惟皇帝陛下陶鈞庶彚亭毒萬方憂心同堯好諫若禹東掖垣內封章何有於日聞青瑣門前列位徒參於夕拜擺波濤而鯤鱗才變望煙霄而鸞翮初高誓將竭誠非敢仰望然虛受難處忝據非安忽擁隼旟竟辭龍闕猶賴雲日未逺闕城不遙䖍奉國章粗免官謗豈意便升亞相之重集作班秩復委大藩之廉問魚箋帝語象軸神工拜受而若捧千鈞伏讀而如聽九奏誠雖深於負荷戀實切於違離况曲阜遺封導河舊壤列九州之數帶五嶽之雄古為詩書俎豆之鄉今兼魚鹽兵革之地訓整合資於武幹拊循宜屬於柔良豈伊孱微堪此委寄謹當氷霜勵志金石貫誠駑馬奮十駕之勤鉛刀淬一割之用即以今月二日雪泣西拜星馳東下京城思入雖有類於陳咸關外耻居安敢同於楊僕無任瞻天戀闕之至謹附中使某奉表陳謝以聞文苑英華卷五百八十四
