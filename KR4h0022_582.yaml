body:
  text: 文苑英華卷五百八十三宋李昉等編宰相雜謝二為宰相謝至尊為蒼生祈福表一首為李右相謝上上考表一首為宰相謝賜竹扇表一首為趙公謝賜金石凌表一首為盧相公謝恩并謝罷官養疾表一首代賈相公謝賜馬及銀器錦綵等表一首代武相公謝槍旗器甲鞍馬表一首代武相公謝借飛龍馬表一首代鄭相公謝賜戟表一首代集賢崔相公謝賜官誥表三首代宰相謝宣示白野鵲表一首代宰相謝宣示白雀白鸚鵒表一首代宰相謝賜布帛表一首代宰相謝降朱書御札表一首代史館王相公謝令樞密使宣諭姦邪表一首為宰相謝至尊為蒼生祈福表玄宗孫逖臣等伏見太常寺祝王璵奏陛下自臨御以來未嘗不四更已後夙興盥潄為蒼生祈福每遣公卿方士巡祭川嶽祝文虔誠御札親署曾無一字自為聖躬伏請自今以後聖心徇物俯垂矜允下情獲展品物同歡伏以虞后浚明但聞恭已周王旰食亦謂憂人未有精意妙門勤祈道寶勞聖躬於夙夜移景福於蒼生遂以為常久而無倦肇自開闢未嘗覩聞雖覆燾之恩豈求報於芻狗而生成之類願效祝於封人天聽不違民心載恱况在臣等特荷殊私莫測神功空慙帝力無任欣慶之至謹奉表陳謝以聞為李右相謝上上考表臣今日伏奉恩旨垂賜上上考并辭捧讀兢惶戰汗交集臣謬以庸薄久塵樞近承奉明命述宣聖謨罪戾猶多涓埃何補豈悟天心善誘宸眷殊常垂翦拂於德音踰涯越分降恩私於考績超等邁倫雖承含垢之慈終多覆餗之懼無任慙悚之至為宰相謝賜竹扇表高力士至奉宣恩制各賜臣等竹扇及聖贊賴疑作賚以器用俯矜於煩暑博以文章更垂於光拂殊私備及自昔未聞臣等經生謬膺大任雖罄心勵節徒有慕於修篁而淺謝疑作識薄材何足當於睿藻外榮天錫內愧御題善誘之恩則深負乘之責彌懼何以對越休命奉揚玄風捧對兢惶罔知攸措不勝感戴之至謹奉表陳謝以聞為趙公謝賜金石凌表權德輿臣憬言伏奉恩敕賜臣金石凌并方及服法并金花銀合一又賜臣蘇膏方及眼赤有瘡方其方皇太子書者鴻私榮貺特發天心受恩拜賜慙怖交集中謝臣聞台司之任茂遂羣生而攝衛乖宜自貽病疾理身未暇賦政何堪豈謂上簡宸衷下矜賤質御方靈藥稠疊寵光劑和至精減聖躬所服翰墨玄妙降皇儲之書仰光輝而陋目增明承渥澤而沉疴自愈致金石之固通性命之和保持誨諭曲盡慈旨蠲其煩滯授以康寧省已何功害盈知懼伏惟陛下宣布大和則時無疵癘懋建大中則物以阜安生及昌期自登壽域况臣劣薄待罪樞衡感平施而已深荷殊榮而難報雖隂陽不測犬馬之疾頓瘳而日月無私螢燭之光何補生成覆露皆稟睿慈竭力致命豈申愚效無任感恩惶懼之至謹奉表陳謝以聞為盧相公謝恩并請罷官養疾表德宗高郢臣邁言今月十四日以在假百日進狀上聞某日中使某奉宣進止令臣在家將養損日朝參者力疾受恩慙懼交集中謝臣病滿百日法當罷免恩自九天優以賜告伏念手足餘疾運用未平風毒常作療除多久臣今若卧叨厚祿坐待全療豈惟日月易淹實亦恩私過幸且台輔為任周行所瞻臣匪服以居既貽官謗沉疴不退又廢公法夙夜循省心愧靡寧雖宸慈曲臨有所不忍而王道平施則惟無私臣既內懷尸曠之慙外迫支體之慮竊恐所攻非一望損彌逺徒闕遵常之典增延憫下之仁如蒙特恩俯遂微懇得從解紱専一就醫則冀形魂兩安物議皆息全度之澤於此為深無任感恩之至謹奉表陳謝以聞代賈相公謝賜馬及銀器錦綵等表權德輿臣耽言今日中使某奉宣進止以臣所進關內隴右圖録十卷特賜馬一匹并銀瓶盤等若干事錦綵等若干匹者承命抃舞震驚失圖伏以聖朝覆幬無私聲教逺被雖夏書禹貢周制職方重譯所通未若今日臣以末學舊奉昌期常好地理之書頗知河湟之事明徵舊史博考傳集作前聞夙夜以思嵗時遂久紀諸文字繢以丹青上塵聖聰庶備方志豈謂睿慈𢎞奬寵賚特深出珍華於內府下駔駿於天廄恩榮所及煥麗相輝循顧庸虛曲承蕃錫負乘匪服併切於今無任瞻恩荷戴之至謹奉表陳謝以聞貞元十四年九月代武相公謝槍旗器甲鞍馬表吕溫臣元衡言今日中使某乙至臣宅奉宣聖旨賜臣槍旗器甲鞍馬并錦綵等禮殊其數物備其容肅以將威燠以昭寵雲澤濡體天光照門抃駭失圖兢惶罔據臣某誠荷誠感頓首頓首臣才無可取進不因人陛下憐其小心知其盡節特紆宸眷謬委台司匡補之益無聞將明之效靡著方俟嚴譴集作蒙忽被殊恩寄重西南任兼中外封開大郡秩正黃樞登壇於六符之階被衮為三軍之帥今古盛典盡在兹日人臣寵貴併集作舉集微躬豈臣孱庸所克負荷非臣隕越所能上報重錦名馬玄甲朱旗王事靡盬儼有行色天顏咫尺忽當逺離感戀倣徨拜受涕泣集作咽折衝分閫愧非式遏之才榮耀一作曜自天猥辱専征之賜無任感恩激切之至謹奉表陳謝以聞代武相公謝借飛龍馬表臣元衡言伏蒙聖慈借飛龍馬若干匹至京兆府界首者臣謬處台司將明薄集作無效自忝方任恩禮特加奬諭綢繆寵錫輝煥寒衣病藥悉出聖慈匹馬一人咸經御選逺覽圖史近徵耳目如臣蒙幸未見其倫實有何功敢當斯遇盡節竭誠在臣子之本分殺身致命報君親之常道竟將何力上答殊私空保丹誠以致灰粉王程靡處天駟言旋仰服皂之有期恨違顏之方始精魂自越顧步莫留權竒之姿向雲闕以驤首集作獨去悃欵之戀與星影而共馳瞻望天庭罔知所措無任感戴倣徨之至謹奉表陳謝以聞代鄭相公謝賜戟表見六百一十八卷代集賢崔相公謝賜官誥表錢珝臣某言伏蒙聖慈賜臣某階某官食邑若干户官誥一通者臣某中謝臣伏以周官所建冡宰是先進階陛之名增井賦以數重在彛典合為渥恩冒寵以來偷安而處不能退讓方懼滿盈詎謂陛下每顧舊章必加優禮雅誥既垂於綸綍侍臣忽降於宫闈五彩相鮮且成文於潤飾萬鈞比重幾無力以捧持聚族咸觀省躬何稱遭遇莫酬於君父寶藏空戒於子孫竊視權衡惟思砥礪臣某無任感恩荷聖激切惶越之至同前臣某言今月某日賜臣某官誥一通者臣某中謝臣敢謂皇慈仍加霈澤固讓而丹誠莫遂退思而玄造寧酬今者特降近臣一作異恩遽臨私室琅函乍啓捧持空耀於微躬寶軸載觀燦爛仍驚於衆目榮光併集舒卷不遑難勝黼黻之文何補燮調之任唯當千慮以荷一作濟萬幾見可而進之謀知無不為之力用裨至理庶奉休期仰戴聖慈臣某無任省已感恩之至同前臣某言臣先蒙恩命授集賢殿大學士今月某日中使至忽承霈澤降自重霄再披五色之文若戴千鈞之重臣某中謝伏惟尊號皇帝陛下求衣待旦側席視朝方致理於雍熙每仰成於輔相臣自慚竊位唯懼曠官未獲避賢何堪假寵爰驚瑣質更被鴻私提玉鉉於中台已憂公餗總石渠之祕署兼及一作集羣才當文德之盛朝實名儒之大任今者遽頒雅誥益示皇慈兼命王人且臨私第琅函乍啓光凝紫府之煙寶軸潛舒潤帶金盤之露空知焜耀無報睿明臣某無任荷聖感恩兢懼之至代宰相謝宣示白野鵲表臣某等言今月某日高品張師道至奉宣聖旨示臣等涇州所進白野鵲者臣聞白為正色鵲實靈禽在五行而賦稟金精於衆鳥而有殊羽族臣某中謝伏惟尊號皇帝陛下應上天之道必順五行遂萬物之情非徒衆鳥宜獲降祥之類以昭致理之心是以素翼流光丹眸耀衆俄呈瑞質能弄好音應圖牒以自來詎網羅之所得諸侯入獻史氏明書寧同集樹之烏堪並紀年之雀方開景運實契禎符臣某等謬贊皇猷竊觀神貺無任賀聖歡抃之至代宰相謝宣示白雀白鸚鵒表臣某等言今月某日高品張徒一作從羽至奉宣聖旨示臣某物者至化無私殊祥畢萃既光史策允叶元符臣某中謝伏以西方主白金氣應秋故靈禽頻見於塞垣玄貺實昭於人事遂使載飛之類皆呈受彩之姿以物窺天知天感聖犬戎柔服必無犯於西方禾黍豐登將有成於金象一作氣假慈毛羽降彼藩隅既來獻於帝居獲同觀於公府何能翼戴徒荷休明臣等無任舞詠聳抃之至代宰相謝賜布帛表臣某言今月某日中使某至奉宣聖旨賜臣布一千匹絹二千匹者臣某誠哀誠感頓首頓首臣災集衰門禍貽諸父執禮既循於經典成喪將服於冠裳何言臣子之情必軫君親之念近效承命飛星忽降於重霄寵數有章束帛載頒於內府哀榮曲被跪受難勝上感聖慈臣無任涕泣惶越之至代宰相謝降朱書御札表臣某言今月某日中使某至奉宣聖旨頒示御札以貶黜張道古事更令申誥中外者聖旨昭垂羣情胥恱臣某中謝臣伏念元和中一作年吏部侍郎韓愈因陳佛骨遂拜封章以為前古奉佛帝王年代尤促憲宗以人臣去就乖忤非輕震怒所臨遂竄荒裔憲宗英主韓愈名臣典記可行事無不順今張道古狂愚一作瞽所獻斥犯非常凡曰在庭皆知難恕深𢎞睿哲且欲含容雖匿瑕之道則然於犯上之名斯重臣等請行譴逐陛下尚顧物情宸翰所臨皇言曲被盡賀為君之盛咸知六德之能捧戴聖慈如親丹扆臣某等無任銘篆兢越榮感之至代史館王相公謝令樞密使宣諭姦邪表前人臣某等言臣嘗讀漢史竊見上官桀桑𢎞羊皆惡霍光之忠於王室也欲奪其權遂詐為燕王上書言光將有非常之變而昭帝知其詭詐欲害賢良顯發怒言保明元輔識者以為漢昭之聰睿逺過周成臣等每閲其書實感其事以為後代不復有之今月某日獲延英奏事親奉聖言且以陛下深懼艱屯欲清教化寤亂階於前事窮蠧本於小人既以一作已誅鋤方期屏絶而常有技術賤微之輩班行險躁之徒潛結詭謀輒投邪隙且相援引遂有譛傷間諜滋深根株甚巨而聖心不動睿鑒有融盡辨讒諛靡容交亂致臣於不疑之地知彼有禍人之心且赫揚於斯必令懲革覲於左右永杜姦邪臣等且懼且驚載思載感還至公府未知所安樞密使某等又至中書備傳睿旨伏知是李遂劉達等共謀推薦李潔秉政因此大惑天聽君臣之所難聞乾坤之所共棄有李遂之奏肆志巧言而陛下不以為疑祗以為恕凡所布諭必盡洪纎某等復宣陛下之言不惟保任臣等兼欲擊斷此輩彰明我心臣等稟命而思激情以泣自有邦國誰一作詎無君臣今此讒邪忍施陷穽密構於一夫之口何術可知潛行於萬乘之前何人敢辨雖陛下察之不惑隱之不言有此釁端加於輔相臣之寤寐將至驚狂一旦親奉堯言俾行漢律使罪人斯得餘才一作除讒自安復使微臣必無他慮食駃騠者未足為德喻媒糵者未足為辭李遂輩擠臣於不測之溪陛下賜臣以援溺之手誣臣以難明之罪陛下諭臣以必信之言彼昭帝之時漢家方盛霍光之辨且有詐書今李遂得於艱否一作苦之朝進傾危之計宸聰之外孰可得聞一作明則臣等塗汙一浸江漢難濯殁為野土誰為呌閽不有睿明焉知昭釋感入骨髓誓諸神祗千拜首以何為一剖心而始足惟當竭誠啓沃戮力弼諧盡毁家紓難之謀繼圖國忘身之策尚疑丹悃未答皇私荷聖感恩臣等無任抃蹈兢栗涕泣屏營之至文苑英華卷五百八十三
