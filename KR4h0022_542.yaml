body:
  text: 文苑英華卷五百四十三宋李昉等編衣冠扇食官酒器炭藁瓦門十八道衣冠扇禁楚製判一道並冠兩梁判一道執蒲葵扇判一道食官甲為食官判一道庖人進炙判一道酒酒正以水入王酒判一道公酒後時判一道造五齊三酒非九穀判一道盜酒判一道器告家有九龍鼎判一道有五熟釡判一道甕負判一道村人借罐判一道鏇樹為杯碗判一道磑分利不平判一道炭藁瓦二月不供宫人炭判一道貯藁判一道造瓦判一道衣冠扇禁楚製判乙禁楚製漢書云叔孫通降漢王憎之乃變其服短衣楚製對衣裳楚楚須辨於彩章雨雪瀌瀌以虞其燥濕瞻言乙也所習伊何異子臧之不𠂻載時人之將誠同陳咸之所衣為大國之榮觀製豈變常事仍師古魯之縫掖君子嘉其蔑儒楚之復陶當時不以為罪庶窮閲實之典爰置不辜之刑並冠兩梁判丙為大官令丁為博士並冠兩梁御史奏違法丙云視省進膳丁云崇儒不伏仰正斷對車服以庸辨冕有辨必章彩而象位具文物以昭德丁丙各從王事端委清時遵儒師以奉職率饔人以敬禮至於玉膳將進躬視丹墀之側縹緗一作裘方展危坐青襟之前雖匪官聫乃同其服進賢遂戴有類於漢臣委貌未得且謬於殷道以兩梁之製觸鐵柱之威巧詞俱飾文過斯在請詳典式以議科條執蒲葵扇判乙常執蒲葵扇於盛暑人多效之或告妖衆對服玩垂則嵗時交進韞狐白以禦冬裂紈素而清暑由是五明開製道在思賢七華擅竒思歸錫寵委方圎以呈質順行藏以適時登用有期著號無算乙行均山仰時聞景慕執殊方竹非承漢帝之私即好蒲葵式徇謝安之義事符懷舊迹逐移風類折巾於林宗寧俟題於逸少將以妖衆孰謂欽賢宜從三宥之書無陷五詞之罰食官甲為食官判甲為食官凖赦合入五品所司不許對君有充庖臣實司味是掌公餗以供王舉甲周均仲咡位涉膳夫漢類髙祛秩登食監鼎爼斯設刀匕是供屬澤􅑙紫書榮頒朱組黃香之秩咸以云增潘嶽之階獨當不進所司陋其烹飪黜役乘軒昔笥餌立誠既加都尉壺餐著節亦拜大夫以愚所窺合霑錫命庖人進炙判乙當庖人進炙有髮繞之將科罪訴云當有讎事對相彼庖人政司口實式調玉饌以薦金門屠蒯之德莫如陳政之讐已作執鸞刀而袒割蟬翼必裁揚獸炭之赫曦鴻毛罔燎以此而科情則可知况乎鼠穢蜜一作梅中巳申寃於吳日髮生肉內豈獲譴於唐年請推讎人以雪庖者酒酒正以水入王酒判甲為酒正以水和酒入於王之酒府法司劾其矯濫訴稱時供六飲以為涼不伏科對五齊分名陳乎式法六飲成薦差以時序明其有則誡以無彛率由典常俾克永世是以用光朝覲湛露興詩取備蒸嘗質明行事資以王度入于天府茍或不愆亦何專一惟其酒正職在漿人非作偽以心勞實陳力以就列相時後動迹匪踰間飾古而行事乃從禮四運其易六飲攸供佇以稱涼爰資受和俯銀床之露井始汲香泉泛玉斚之流霞旋開聖酒若三軍之盡醉即見投醪分八樽之立儀斯成薦飲炎光在候正有叶於頒氷清虛坐井序將捐於溽暑官無留事責乃非宜未覩旌功奚為蔽善將同矯濫何至寃誣法司自且不明酒正誠非忤典公酒後時判甲為公酒後時為主司所詰辭曰酒材不足對酒以成禮國之大經祭祀賔客咸賴其用甲惟賤伍掌我斯職不率其度旋聞後時水泉必香無傳清苦火齊不作幾空賢聖主司方詰甲乃有詞酒材不供鼎書難議明庶折獄君子攸存噬嗑論刑恐貽遇毒造五齊三酒非九穀判所司造五齊三酒憲司以非九穀罪云嵗無餘對和其神人亦在酒醴能善乃事則惟司存故陶器必良既麴蘖以云備六物式序必黍稷而非馨今者周官列職徒聞於五齊憲府舉非或虧於九穀尚負罍耻忽貽神羞既無餘之起訴何有詞之能代盜酒判卓媪翁伯並業卓嘗遭盜竊飲傾釀翁教以多養猛犬卓家酒滯而翁賔客猥售獨收其利媪告伯方便取人財對媪翁接開巵酒當壚不逄漢髙之過何能大售頻遇畢公之竊頗煩小盜教其養犬蓋以防人聞夜吠而雖懲在春醪而頗滯素蟻空泛鄴中之賢者莫傾盧鵲斯喧高陽之酒徒那至但非抑壓教有緣由獨收當曰非宜方便殆成無狀宜科誣謗以置刑名器告家有九龍鼎判是賢告耳孫家有九龍鼎歷代寶之恐非人臣所宜蓄對天子建德是班宗彛諸侯立家爰受分器業盛鼎鼐功昭篆刻若使世濟不泯長子承主宗之規胙土云亡耳孫何克復之有况光涵一作滔沒泗氣溢歊汾煥彼龍文昭其象物何速戾於懷璧盍歸休於國寶是賢所告謂得其宜有五熟釡判封君有五熟釡而銘其口鄰人告違曰嘗有所賜對書功旗常然後克類分命彛器則惟其賢知三賜之有恆故百代之令典曕言彼乙齒我封君開國承家方列土之貴玄衮赤舄見諸侯之禮嘉孔生之居衛三命益恭韙鍾氏之仕曹五熟云錫車服必班乎國命釡銘何恤於人言出話不然覺善鄰之滕口有孚勿問驗所錫之徴人必也正名此焉無咎甕負判甲甕負彼乙蕩倒甕甲索陪乙不伏對惟彼負徒行者固宜矜避至於顛仆蕩者非其一作或非故為甲且有詞愧林宗之妙賞乙為無狀殊叔寶之情言謹守既謝於挈瓶敝漏方憂於射鮒欲令陪價須盡事由必其廣陌修衢往來不接故為搪揬是有常刑儻若狹路重闤風塵暗起誤而擊觸毁亦可矜刑故則罪合宜加捨誤則陪何足算但官之議事貴在量情言蕩非故犯之名稱負乃小人之事勒陪半價將謂合宜村人借罐判村人借鄰家罐未出門打破人索陪云未離本處凖令合比附對變古易俗因物造器稽六文之文蓋取諸益司百工之事無或不良惟彼村人幸參比屋既借權而攸要非抱甕而為勞出門未觀於同人繘井先驚於敝漏雖罔離厥所而譴自巳招異管寧之深仁愧林宗之妙賞且官之議事貴在量情忝曰村鄰得來得往詳其故誤有重有輕向若狹肆通闤修街隘路咽綺城之歌舞暗紫陌之煙塵物雖見蕩夫何足咎况屬荆扉寂寞蓬徑蕭踈破由彼已孰當毁櫝事匪因人爰煩投杼勒酬半價良謂合宜蕩物容據減條損器何援比例輒云不伏深覺詞遊鏇樹為杯碗判得甲鏇榆樹為杯碗出賣鄉官責其遊手惰業對士農工商孟堅陳十志之本水火金木箕子載五行之數悠悠羣動各有定業明明財利為謀不同惟甲肖形運乎天巧既勤事於賈豎且效功於匠伯加以是揆是度掎漢社之星榆乃刳乃鏟揮匠人之風斫杯非承露未立雲表碗殊鍊藥空候淮南徇錐刀之小利捐耕桑之大業若斬伐愆時未符周禮如雕偽不作自陶魯政夫除害興利禁末勸農罔或奢巧實防器玩器不涉於無用賣有濟於時須雖慙敦本之俗難加惰業之罪幸殊遊手宜寬祝靣磑分利不平判吳丙王丁共有磑納課分利丙云有賸丁云擲日知分所得無賸對吳丙王丁均期叶契雞鳴求利不憚孟軻之譏馬磨自資更殊許靖之操市道難固財交易竭競斯升斗顔寧厚於指囷徇彼錐刀魄無慙於碎璧或陳其有賸許以無厭或掠以浮雲稱斯擲日日有修短關諸至期利有盈虛定乎宜分理應各得何假相尤然質劑既未研詳刑名豈能懸斷更尋枝𣲖方悉根源炭藁瓦二月不供宫人炭判鈎盾二月不供宫人炭請處分對弄田之所鈎盾是同牽絲效官掌炭成務形雖比漆燒則如珠入侍女之熏爐香焚百和處仙人之丹竈巧液千金變寒作暄轉冷成熱投其鑄冶可以方其造化驗其燥濕可以測其隂陽充百郡之時須為萬邦之日用二月不供三章有犯違令抵罪依條請科貯藁判所司貯藁以三千圍為積苫覆無芘防脂切籬合科何罪對秩馬所資唯草是用徴科百里輸納六間黃白無差短長合度貯積之法令條有文數越三千理則多僻從疑作縱勤苫覆終闕芘籬施功不同處事彌爽犯既非謬辜不免科造瓦判甲雇乙造瓦口五分畢計其全乙不伏對工商異等埏埴殊制故有質兹土化均質日中乙也徇業求傭偶鑿坯而取給甲則溺情豐屋冀如雪一作雲以自潤雖載㺯牀瓦故無取於舉全約無陶穴亦何驚於敝漏且全毁興訟雇買異儀雇則不可計全買則合徴成算乙之不伏誠則有詞甲之無良訟宜從記文苑英華卷五百四十三
