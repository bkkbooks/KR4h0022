body:
  text: 文苑英華巻九百八十七宋李昉等編交舊十祭崔使君簡文一首祭崔使君神柩歸上都文一首祭崔使君敏文一首為崔侍御祭穆員外文一首祭李栁州文一首祭太常裴少卿文一首祭薛中丞文一首祭虞部張員外文一首祭亡友栁子厚文一首祭張給事徹文一首祭竇司業文一首祭馬僕射惣文一首祭栁州栁員外文一首祭集有姊夫二字崔使君簡文栁宗元某年月日某謹以清酌庶羞之奠祭于永州刺史博陵崔君集作公之靈天之生人或哲或愚君取其英爰輝集作耀于初譽動京師集作邑施於方隅密勿書奏元侯是俞蜀㓂内侮禍連𦍑髳君出顯畫披攘其徒南平劒門西獲戎俘超受刑曹留守集作揔南都移刺連部下民其蘇道不可常病惑中途悍石是餌元精以渝雷謗爰興按驗増誣始雖進律終以論辜溟海浩浩而君是踰崇集作嵩山茫茫而君是居厥弟抗憤呌于天集作康衢天子憫焉訊以文書御史既斥連帥是除期復中壤遽淪别區䘮還大浸又溺二孤痛毒荐仍振古所無何適讀作謫于天降此剪屠柩不及歸寓葬荒墟將葺將就誓還里閭嗚呼君之子姓惟自我出母儀既虧父訓又失㷀㷀相視撫悼増恤咸兾其才以大家室惟昔與今集作君年殊志匹書諮夕討期正文律實契師友豈伊親暱集作昵誰謂斯人變易成疾良志莫踐乖離永訣集作訖嗚呼永山之西湘水之東殯紖以出斧屋爰封神非久留息駕于中書石為誌世德斯崇拜首以酌出涕無窮集作手㪺以酌涕出焉窮祭崔使君神柩歸上都文前人嘻乎崔公之柩嘻乎崔公楚之南其土不可以室或坋而頹或埆而崒隂流一作沉泄漏瀐没渝溢碩鼠大蟻傍穿側出虧踈脆薄久乃自室不如君之郷式堅且密嘻乎崔公楚之南其鬼不可與友躁戾佻險睒眒欺苟脞賤暗曶輕囂一作嚚妄走不思已類好事羣醜不如君之郷式和且偶日月甚良子姓甚勤具是舟轝寧君之神去爾夷方返爾故隣奕奕其歸宜樂且忻君死而還我生而留永矣殊世曷從之遊酧觴于座與涕俱流祭崔使君敏文前人夫産崑崙者難為玉植鄧林者難為木公以令望顯于華族藝邃六書學該七錄耽此黄老恬於寵辱入補黒衣出参甸服紀綱淮海政令維肅宰制岳濵周於仁育儲闈典議直清攸屬久次推能二州繼牧至于是邦率由舊俗和易勿亟優游自足既有小集作少吏亦勤集作勤于庶獄妖誣殄除淫祠剪覆出令三嵗人無怨讟進律未行歸神何速某咸以罪戾謫兹炎方公垂恵和枯稿以光鳴鸞適野泛鷁沿湘廣筵命樂華燭飛觴髙歌屢舞終以無荒紛慮斯屏憂懐暫忘良時不再斯樂難常今其奈何顧慕増集作感傷嗚呼哀哉室有迭去川無息流追懐曩晨恍若夢遊奠撤集作徹中寢魂遷葉集作乗舟邦人永思匍匐隠憂况我懐德心焉若抽潔誠可鑒蘋藻非羞為崔侍御祭穆員外文韓愈維年月日故人博陵崔愬謹以清酌之奠祭于亡友穆六端公之靈於乎建中之初予居於嵩携扶北奔集注作歸避盜来攻晨及洛師相遇一時顧我無集作如故睠然顧之子有令聞我来自山之子畯明我鈍而頑道實集作既云異誰從知我我思其厚不知其可集注作不可而可於後八年君從杜侯我時在洛亦應其招留守無事多君子寮罔有疑忌惟其嬉遊草生之春鳥鳴之朝我轡在手君揚其鑣君居其集注作復我室我既来即或以咏集作嘯歌或以偃側誨余以義我復集註作復我以誠終日以蜀本作與語無非德聲主人信讒有惑其下殺人無罪誣以成過入救不從反以為禍赫赫有聞王命三司察我于獄相從係縲直一作曲生何蜀本作可樂曲死何蜀本作可悲上懐王人蜀本作主人内閔杭本作關其私進退之難君集作居處之宜既釋于囚我来徐州道之悠悠思君為憂我如京師君居父䘮哭泣而拜言辭不通我歸自西君反吉服晤言無他往復其昔不日而違使集作重又作禆我心惻自後聞君母䘮是丁痛毒之懐六年以并集注作經孰云孝子而殞厥靈今我之至入門失集作哭聲酒肉在前君胡不飡升君之牀集作堂不與我言嗚呼死矣何日来還祭李栁州文前人維元和元年嵗次景戌二月乙未朔二十四日戊午將仕郎守江陵府法曹参軍韓愈謹以清酌庶羞之奠敬祭于故栁州李使君員外二集作三兄之靈古語有之白頭如新傾盖若舊顧意氣之何如何集作曷日時之足究當貞元之癸未一作酉非惕皇威而左授伏荒炎之下邑嗟名頹而位仆歴貴部而西邁邇清光於集註作而暫覯言莫集作若交而情無由既不賈而奚售哀窮遐集作荒之無圖㧝集作拏百憂以集註作而自副辱問訊之綢繆常集作恒飽饑而愈疚接雄詞於章句窺逸跡於篆籀苞黄甘而致貽一作辭獲筆紙之雙貿投義魚之短韻愧韜瑕而舉秀俟新命於衡陽費薪芻於館侯空大亭以見處憩水木之幽茂逞英心於縱博沃煩腸於集註作以清酌航北湖之空明覷鱗介之驚透宴州樓之豁逹衆管啾集作秋非而並奏得恩恵於新知脱寃集作窮愁於往陋輟行謀於俄頃見秋月之三彀逮天書之下降猶低廻以宿留念暌離之在期謂此㑹之難又援集作授縞紵以託心示兹誠之不謬儻後日之北遷約窮歡於一晝雖椽奉之酸寒要㧞貧而為富何人生之難信指集作捐斯言而莫就始訝信而一作於暫疎遂承集作成凶於不救見銘旌之低昻尚遲疑於别袖憶交酬而迭舞奠單杯而哭柩美夫君之為政不撓一作僥志於讒搆遭唇舌之紛羅獨凌晨而孤雊彼憸人之浮言雖百年一作輩其何詬洞往古而髙觀固邪正之相冦幸竊覩其始終敢不明白而蔽覆神乎来哉辭以為侑尚饗祭太常裴少卿文前人維元和九一作元非年給事中李逢吉給事中孟簡吏部侍郎張惟素吏部侍郎張賈比部郎中史館修撰韓愈等謹以庶羞清酌之奠致祭于太常裴二十一兄之靈朝廷之重莫過乎禮雖經䇿具存而精通盖寡自郊丘故事宗廟時宜大君之所旁求丞相之所卒問羣儒拱手宗祝醉心兄皆指陳根源斟酌通變罔不允符天㫖克協神休至于公卿冠婚士庶䘮祭疑皆響答問必實歸從我者定集作足為軌儀異我者無逃指笑動為時法言比集作必古經獨立一朝髙示千古而又驅馳朋執僶俛宗親擔石之儲常空於私室方丈之食每盛于賔筵贈必固辭求無不應孰云具美而不永年愈等早接逰從實欽道義致誠薄奠以訣終天嗚呼哀哉尚饗祭薛中丞文同李逢吉孟簡等前人維元和九一作元非年嵗次甲午閏八月乙已朔十五日已未某官某乙等謹以清酌庶羞之奠祭于亡友故御史中丞贈刑部侍郎薛公之靈公之懿德茂行可以勵俗清文敏識足以發身宗族稱其孝慈友朋歸其信義累升科第亟踐班行左掖南臺共傳故事詩人墨客争諷新篇羽儀朝廷輝映中外長途方騁大限俄窮聖上軫不憗之悲具寮興云亡之歎况某等忘言斯久知我俱深青春之遊白首相失来陳薄奠詎盡哀誠嗚呼哀哉尚饗祭虞部張員外季友文前人維元和十年月日中書舍人王涯考功郎中知制誥韓愈禮部侍郎崔羣京兆尹許季同考功員外郎庾承宣河中節度判官殿中侍御史邢册等謹以清酌庶羞之奠敬祭于亡友張十三員外之靈嗚呼往在貞元俱從賔薦司我明試時維邦彦各以文售幸皆少年羣遊旅宿其歡甚焉出言無尤有獲同喜他年諸人莫有能比倐忽逮今二十餘嵗存皆衰白半亦辭世外纒公事内廹家私中宵興歎無復昔時如何今日集註作於今又失夫子懿德柔聲永絶心耳廬親之墓終䘮乃歸佯集作陽瘖避職妻子不知分司憲臺風紀由振遂遷司虞以播華問不能老夀孰究其因託嗣於宗天維不仁酒食備設靈其降止論德叙情以視諸誄哀哉尚饗祭亡友栁子厚文前人維元和十五年嵗次庚子五月壬寅朔五日景午韓愈謹以清酌庶羞之奠敬祭于亡友栁君集本唐文粹無君字子厚之靈嗟嗟子厚而至然耶自古莫不然我又何嗟人之生世如夢一覺其間利害竟亦何校當其夢時有樂有悲及其既覺豈足追惟凡物之生不願為杭本作謂材犧罇青黄乃木之災子之中棄天脱􅎗覊玉佩瓊琚大放厥詞富貴無能磨滅誰紀子之自著表表愈偉不善為斵血指汗顔巧匠旁觀縮手袖間子之文章而不用世乃令吾徒掌帝之制子之視人自以無前一斥不復羣飛刺天嗟嗟子厚今有今亡一作今也則亡臨絶之音一何琅琅徧告諸友而二本作以寄厥子不鄙謂余亦託以死凡今之交觀勢厚薄余豈可保能承子託非我知子子實命我猶有鬼神寧集註作予文粹作弗敢遺墮念子永歸無復来期設祭棺前矢心以辭嗚呼哀哉尚饗祭張給事徹文前人維年月日兵部侍郎韓愈謹以清酌之奠祭于故殿中侍御史贈給事中張君之靈惟君之先以儒名家逮君皇考再振厥華郷舉集作貢進秀有司第之從事元戎謹職以治遂拜郎官以職王憲不長其年飛不盡翰乃生給事松貞玉剛幹父之業纂文有光屢辟侯府亦佐梁師前人是似耋吏嗟咨御史闕人奪之於朝大厦之構斧斤未操府遷幽都頑悖未孚繄君之賴乃奏乞留乃遷殿中朱衣象服集作板是惟義之趨豈利之踐虺犲發舋闔府屠割集作剥償其恨犯君獨髙脱露刃成林弓矢攘攘千萬為徒噪讙為狂君獨叱之上不負汝為此不祥將死無所雖愚無知慚屈變色秉集作君義不辱殺身就德天子嘉之贈官近侍歸於一死萬古是記我之從女為君之配君於其家行實髙世無所於集作掩葬與集註作輿魂東歸誄以贈之莫知我哀嗚呼哀哉尚饗祭竇司業牟文前人維年月日兵部待郎韓愈謹以清酌庶羞之奠祭于故國子司業竇君二兄之靈惟君文行夙成有聲江東魁然厚重長者之風一舉於郷遂收厥功屢佐大邦袁本作侯以調兵戎詔曰予虞汝為郎中乃令洛陽嵗且四終維刑之慎掌正𨽻僮命守髙平命副集作制儒宫朱衣銀魚象服以崇錫榮考妣孝道上窮官不滿能亦云逹通逾七望八年孰非公蜀本作踰七八年孰非望公非在君無憾我意不充君之昆弟三以詞雄刺史郎官集作中四繼三同於士大夫可謂顯融我之獲見實自童䝉既受誘勸集作既愛既勸在麻之蓬自視鶵望君飛鴻四十餘年事半如夢集作四十年餘事如夢中分宰河洛愧立並躬俱苦集作官於學以纖臨洪惠詩不酧報德以空死生莫接孰明余集作我衷於祭告情文以自攻嗚呼哀哉尚饗祭馬僕射總文前人維年月日吏部侍郎韓愈謹以清酌庶羞之奠敬祭于故僕射馬公十二兄之靈惟公𢎞大温恭全然德備天故生之其必有意將明將昌實艱初試佐戎滑臺斥由尹寺適彼甌閩􅑶危瓦䟦躓一作踕顛而不踒乃得其地于泉于䖍始執郡符遂殿交州抗節畨禺去其螟蠧蠻越大蘇擢亞秋官朝得碩士人謂其崇我勢方起東征淮蔡相臣是使公兼邦憲以副經紀殲彼大魁厥勲孰似蜀本作以丞相歸治留長蔡師茫茫黍稷昔實棘茨鳩鳴雀乳不見梟鴟惟蔡及許舊為血仇命公并侯耕借之牛束其弓矢禮讓優優始誅鄆戎厥疆集作墟腥臊公往滌之兹惟樂郊惟東有猘惟西有虺顛覆朋鄰我餘有㡬嵂崒中居斬其眷尾岱定河安惟公之韙帝念厥功還公于朝昇蜀本作陟于地官且長百寮度彼四方孰樂可據顧瞻衡鈞蜀本作鈎衡將舉以付惟公積勤以疾以憂及其歸時當謝之秋賀問李邴本作門未歸弔廬已萃未燕于堂已哭于次昔我及公實同危事且死且生誓莫捐棄歸来握手曽不三四曽不濡翰酬酢文字曽不醉飽以勸酒胾奠以叙哀其何能致嗚呼哀哉尚饗祭栁州栁員外文崔羣惟靈天資秀異才稱雋傑早著嘉名逺播芳烈惣六藝之要妙踐九流之治切鏌鎁鋒利浮雲可决騏驥逸歩飛塵可絶閉匣不用伏櫪何施才命罕并今古同悲五嶺三湘寒暑潜推樂道忘憂襟靈甚夷掞藻揮毫騫翔是期柰何終否神也我欺嗚呼鵰飛半空羊角中戾彼蒼難詰善人斯逝羣宿受交分行敦情契遺文在箧贈言猶佩撫孤追往泫然流涕孑孑丹旐翩翩素帷鵩弔是月龜從有時路出長阡將赴京師㫖酒一觴哭君江湄往矣子厚魂期来斯尚饗文苑英華巻九百八十七
