body:
  text: 文苑英華巻三百七宋李昉等編悲悼七第宅五十九首入元襄王第蕭子範伏軾窺東苑收淚上類聚作下玉橋昔時方轂處於今共寂寥夾一作竹池猶褭褭仙樹類聚作榭尚迢迢一同西靡栢徒思芳樹蕭和蕭子範入元襄王第王筠昔入睢陽苑連歩披風雲今逰故䑓處囬望閴無聞皓壁留餘篆蕙圃有遺芬行人皆隕涕何獨孟嘗君行經范僕射舊宅何遜旅葵應蔓井荒藤已上扉寂寞空郊暮無復車馬歸㶑灔故池水蒼茫落日暉閴寂今如此行路類聚竹客盡沾衣過康王第宅舊色初學記作舊邑劉孝威初學記作儀入梁逄故苑波薛見餘宫尚識招賢閣猶懐愛士風靈光一超逺衡舘復朦朧洞門餘舊色甘裳留昔叢送禽悲不去過客慕難窮池竹徒如在林堂曖已空逺樓隔樹出迴澗隠崖通芳流小山桂塵起大王風疊押風字具物咸如此是地感余衷空想靈一作陵前劍徒悲壠上桐一作童奉和東宫經過故妃舊殿江緫故殿看看冷空階歩歩悲猶憶窺忩處還如觧珮時苔生無意早鷰入到宫類聚作有言遲苦令歸就月照見不須疑南還一作行尋草市宅前人紅顔辭鞏洛白首入轘轅乗春行一作還故里徐歩採芳蓀徑毁悲求仲三輔决録蒋詡舍中竹下開三徑惟羊仲求仲與之逰林殘憶巨源見桐猶識井看桞尚知門花落空難遍鸎啼静易喧無人訪語黙何處叙寒温百年共一作獨如此傷心誰一作豈復論一作藝文類聚過故宅元行恭頺城百戰後荒宅四隣通将軍樹已折歩兵途轉窮吹䑓有山鳥歌庭聒夜一作野蟲草深斜逕滅水盡曲池空滿中送一作林中滿明月是處来春風唯餘一故一作廢井尚夹兩株桐冬日過友集作故人任處士書齋見三百十七巻駱賔王過史正議宅宋之問舊交此零落雪泣訪遺塵劍杭傳好事池臺傷故人國香蘭已歇里樹橘猶新不見吴中隐空餘江海濵過庾信宅張説集本見蘭城追宋玉舊宅偶辭人筆涌江山氣文驕雲雨神包胥非救楚隨㑹返留秦獨有東陽守来嗟古樹春陳拾遺故宅杜甫拾遺昔日集作平昔居大屋尚脩椽悠揚荒山日摧窣集作慘澹故國煙位下曷足傷所貴者聖賢有才繼騷雅哲匠不比肩公生揚馬後名與日月懸同逰英俊人多秉輔佐權彦昭超玉價中宗時趙彦昭因權幸得相郭振起通泉到今素壁滑灑翰銀鈎連盛事㑹一時此堂豈千年終古立忠義感遇有遺篇過故斛斯校書荘没後方受一官公名融前人此老已云没隣人嘆未休竟無宣室召徒有茂陵求妻子寄他食園林非昔逰堂空繐紼在淅淅野風秋謝公宅李白青山日将暝寂寞謝公宅竹裏無人聲池中有虚白集作月荒庭衰草遍廢井蒼苔積惟有清風閑時時起泉石長沙過賈誼宅劉長卿三年謫宦此棲遲萬古唯留楚國悲秋草獨集作漸尋人去後寒林空見日斜時漢文有道恩猶薄湘水無情弔豈知寂寞江上正摇落集作寂寞江山摇落處憐君何事到天涯過裴舍人故居前人慘慘寒天獨閉集作掩扄紛紛黄葉落空庭孤墳何處倚山木百口無家汎集作學水萍籬花猶及重陽發隣笛那堪落日聽書幌無人長不巻秋来芳草自為螢客自江南話過亡友朱司議故宅包佶交臂多相共風流憶此人海翻移里巷書蠧積埃塵奉佛棲禪久辭官上䟽頻故来分半宅唯是舊交親題清源寺王右丞宅陳集作塵跡耿緯儒墨兼宗道雲泉舊結廬孟城今寂寞輞水自紆餘内學銷多累西園集作林易故居深房春竹老細雨夜鍾踈塵跡流金地遺文在石渠不知登座客誰得蔡邕書過湖上觀王右丞遺文司空曙舊日相知盡深居獨一身閉門空集作唯有雪看竹永無人每許前山隠曽憐陋巷貧題詩今尚在暫為拂留集作流塵㐮陽過孟浩然舊居陳羽㐮陽城郭春風起漢水東流去不還孟子死来江樹老煙霞猶在鹿門山從事淮南府過亡友楊校書舊㕔感念悄集作愀然因書十韻權徳輿故人隨化往倐忽今六霜及我就拘限清風留此堂松竹愈映欝集作蔚芝蘭自銷亡絶絃罷流水聞笛同山陽預如氷玉姿粲若鸞鳳章欲翥摧勁翮先秋落貞芳正平賦鸚鵡文考頌靈光二子古不弔夫君今何傷黄壚既杳杳𤣥化亦茫茫豈必限集作恨宿草含淚洒衣裳尋李逸人舊居于鵠舊隠松林下衝泉入兩崖琴書隨子弟鷄犬在隣家茅屋長黄菌槿籬生白花幽墳無處訪恐是入煙霞愴故人舊居釋䕶國惆悵至日暮寒鴉青樹林破階苔色厚殘壁雨痕深命與時不遇福為禍所侵空餘竹徑在今一作令我嘆人吟秋日題陳宗儒圃亭悽然感舊楊巨源曽隨何水部待月東亭宿今日重凭欄清風空在竹前山依舊碧閑草經秋緑時物方宛然蛛絲一何速經趙處士居楊衡雲居避世客髮白習儒經有地水空緑無人山自青廢梁悲逝水卧木思荒庭向夕霏煙歛徒看處士星余夙慕陶公淵明為人往嵗渭上閑居常効陶體詩十六首今逰廬山經柴桑過栗里思其人訪其宅不能黙黙又題此詩白居易垢塵不汚玉靈龜集作鳯不啄羶嗚呼陶靖節生彼晉宋間心實有所守口終不能言永惟孤竹子披衣首陽山夷齊各一身窮餓未能集作為難先生有五男與之同饑寒腸中食不充身上衣不完連徴竟不起斯可謂真賢我生君之後相去五百年每讀五桞傳日想心拳拳昔常詠遺風著為十六篇今来訪故宅叅集作森若君在前不慕罇有酒不慕琴無絃慕君遺名集作榮利老死在邱集作在此園柴桑古村落栗里舊山川不見籬下菊但餘墟中煙子孫雖無聞族氏猶未遷毎逢姓陶人使我心悽然同諸客題于家公主舊宅前人平陽舊宅少人逰應是逰人到即愁布一作春榖鳥啼桃李院絡絲蟲怨鳳凰楼䑓傾滑石猶殘砌簾動真珠不滿鈎聞道至今簫史在鬢鬚一作髭雪白向韶集作明州過孟浩然舊居朱慶餘命合終山水才非不稱時塜邉空有樹身後更一作獨無兒散盡詩篇本長存道徳碑平生誰見重應只是王維廢宅前人古巷棘門誰舊宅早曽聞説屬官家更無新燕来巢屋唯有閑人去㸔花荒廐欲摧塵滿櫪小池初涸草侵沙榮華事歇多如此立馬踟蹰對日斜過侯王故第于武陵過此一酸辛行人淚有痕獨殘新碧樹猶擁舊朱門歌歇雲應詩選作初散簷空燕尚存不知彈鋏客何處感深詩選作新㤙過魏文貞公宅杜牧蟪蛄寧與雪霜欺賢士難教俗士知可憐貞觀太平後天且不留封德彛經集作題倪處士舊居許渾儒翁九十餘舊向此村集作山居生寄一壺酒死留千巻書欄摧新竹少池淺故蓮踈但有小孫集作子在帶經還荷鋤經故李拾遺郊集作給事舊居前人歸作儒翁出致君北集作故山誰復有移一作遺文漢庭使氣摧張禹譙國懐憂送范雲楓葉暗時迷舊宅茅花落處認荒墳朱絲一作弦一奏沉湘曲集作怨風起寒波一作陂日欲曛逰朱陂故太保杜公池亭前人杜陵池榭倚城東孤島廻汀路不窮高岫乍疑三峡近逺波初似五湖通楸梧葉暗瀟瀟雨菱荇花香淡淡風還有昔時集作年巢燕在飛来飛去畫堂空集作中題江令公舊宅前人身沒南朝宅已荒邑人猶賞舊風光芹根生葉石池淺桐樹落花春井香帶暖山蜂巢畫閣欲隂溪燕集書堂閒愁此地更南望潮滿䑓城春草長過湖州李郎中舊宅集作傷湖州李郎中前人政成身沒共興衰鄉路兵戈旅櫬廻城上暮雲凝鼔角海邉春草閉池䑓經年未𦵏佳人散昨日因齋故吏来南北相逢皆掩淚集作欲過洞庭還倚棹白蘋洲上一集作暖有花開經杜甫舊宅殷陶浣花溪裏花多處為憶先生在蜀時萬古只應留舊宅千金無復換新詩沙棚一作崩水檻鷗飛盡樹壓村橋馬過遲山月不知人事變夜来江上與誰期過伊僕射舊宅李商隠朱邸方酧力戰功華筵俄歎逝波窮廻廊簾斷燕飛出小閣塵凝人語空幽砌集作淚欲乾殘菊露餘香猶入敗荷風何能更渉龍江去獨立寒沙集作流弔楚宫鴻臚寺有開元中錫宴堂楼䑓池沼雅為勝絶荒凉遺趾僅有存者偶成四十韻温庭筠明皇昔御極神聖垂耿光沉機發雷電逸躅陵堯湯西覃積石山北至窮髮鄉四㓙有獬豸一臂無螳螂嬋娟得神艶郁烈聞國香紫縧鳴羯鼔玉管吹霓裳禄山未封侯林甫才為郎昭融廓日月妥帖安紀綱羣生到夀域百辟趨明堂四海正夷宴一塵不飛揚天子自猶豫侍臣宜樂康軋然閶闔開赤日生扶桑玉砌露盤紆金臺漏丁當劔珮相撃觸左右隨凄鏘𤣥珠十二旒紅粉三千行盻盻生羽翼叱一作咄嗟廻雪霜神霞陵雲閣春水驪山陽盤鬬九子棕甌擎五雲漿雙瓊京兆博七鼔邯鄲倡毰毸碧鷄鬬籠葱翠雉塲仗官繡蔽膝寳馬金鏤錫椒塗隔鸚鵡柘彈驚鴛鴦倚歟華國臣鬢髮俱蒼蒼錫宴得幽致車從真煒煌畫鷁照魚鼈鳴騶亂鶖鶬颭灔蕩碧波炫煌迷横曠縈盈舞廻雪宛轉歌遶梁豔帶畫銀絡寳梳金鈿筐沈真類漢相醉倒疑楚狂一旦紫微東胡星森耀芒憑陵逐鯨鯢唐突驅犬羊縱火三月赤戰塵千里黄殽亟與府寺從此俱荒凉兹地乃蔓草故墓摧壊墻枯池接㫁岸唧唧啼寒螀敗荷塌作泥死竹森如搶逰人問老吏相對聊感傷豈不見麋鹿然後堪廻腸幸今遇太平令節稱羽觴誰知曲江塲嵗嵗棲鸞凰經故秘書崔監揚州南塘舊居前人昔年曽識謝宣城集作范安成松竹風姿鶴性情唯向舊山留月色偶逢秋澗似琴聲集作西掖曙河横浦響北山秋月照江聲乗舟覔吏經輿縣為酒求官得歩兵玉柄寂寥譚客散却尋池閣淚縱横集作千頃水流通故墅至今留得謝公名過賀監舊宅集作秘書省賀監知章草題詩筆力遒健風尚高逺拂塵尋玩因有此作前人越溪漁客賀知章任逹憐才愛酒狂鸂鶒葦花隨釣艇蛤蜊菰葉夣横塘㡬年凉月拘華省一宿秋風憶故鄉榮路脱身終自得福庭回首莫相忘出羣集作籠鸞鶴辭集作歸遼海落筆龍蛇滿壊墻李白死来無醉客可憐神彩吊殘陽宿杜城亡友李羽處士故墅一作里前人桞不成絲草帯煙海槎東去鶴歸天愁腸㫁處風集作春何限病眼開時月正圓花若有情還悵望水因無事莫潺湲終知此恨難消遣集作消難盡辜負南華第二篇經陸補闕故居集作過姚監故居方干不敢要君徴亦起致君全得似唐虞讜言昨歎離天聼新塚今聞入縣圖琴鎖壊忩風自觸鶴歸喬木日集作月難呼學詩弟子何人在檢㸃猶逢諫草無經郭汾陽宅趙嘏門前不改舊山河破虜曽輕馬伏波今日獨經歌舞地古槐踈影夕陽多重經巴邱追感開成初陪故員外從翁詩酒逰泛作李羣玉昔年高接李膺歡日泛仙舟醉碧瀾詩句亂隨青草發酒腸俱逐洞庭寛浮生聚散雲相似往事㣲茫夣一般今日片㠶城下過集作去秋風回首淚䦨干經故宅有感周繇身没南荒雨露賖朱門空鎖舊繁華池塘鑿就方通水桃杏栽成未見花異代圖書蔵㡬箧傾城羅綺散誰家昔年埏埴生靈地今日生人為嘆嗟襄州漢陽王故宅皮日休碑字依稀廟已荒猶聞耆舊憶賢王園林一半為他主山水虚言是故鄉㦸户野蒿生翠瓦舞樓栖鴿汙雕梁柱天功業縁何事不得終身似霍光陳先軰故居前人杉桂交隂一里餘逢人渾似洞天居千株橘樹唯沽酒十頃蓮塘不買魚藜杖閑来侵徑竹角巾端坐滿樓書襄陽無限煙霞地難覔幽竒似此殊過陶潜故宅崔塗陶令昔居此弄琴遺世榮詩選作情田園三畆緑軒冕一銖輕衰桞自無主白雲猶可耕不隨陵谷變應秪詩選作有是高名經廢宅杜荀鶴人生當貴盛脩徳可延之不慮有今日争教無破時蘚斑題字壁花發帶巢枝何况高集作嵩原上荒墳與折碑經宣城元員外山居張喬無人襲仙隠石室閉空山避燒猿猶到隨雲鶴不還澗荒巖影在橋㫁樹隂閑但有黄河賦長留在世間經九華山費徴君故居故一作山前人草堂蕪没後来往問樵翁㫁石荒林外孤墳晩照中数溪分大野九子立寒空煙壁曽行處青雲路不通經隠巖懐舊逰前人夜久村落静徘徊楊桞津青山猶有路明月已無人夣寐空前事星霜倦此身常期結茅處来往躡遺塵費徴君舊居張蠙浮世抛身外棲蹤入九華遺篇補樂府舊籍𨽻仙家池静龜昇樹庭荒鶴隠花古来天子命還少到煙霞傷侠一作侯第羅鄴世間榮辱半相和昨日權門今雀羅萬古明君方納諫九江遷客更應多碧池草熟人偷釣畫㦸春閑鶯亂過幾許樂僮無主後不離隣巷教笙歌傷平泉荘前人生前㡬到此池䑓尋歎投荒去不回若遣春風觧人意此枝盡合向南開河中經故翰林張舍人所居羅隠行塵不是昔時塵謾向朱門憶侍臣一榻已無開眼處九泉應有愛才人文餘吐鳳當集作他年詔樹想栖鸞舊日春從此深恩更集作恩深轉難報夕陽衰草獨集作淚沾巾瓊華觀經故友所居前人槐花漠漠向人黄此地追逰跡已荒清論不知蒙集作荘叟逹死交空歎趙岐亡集作忙病来未忍言閑事老去唯應集作知覔醉鄉日暮街東䇿羸馬一聲横笛似山陽清溪江令公宅前人鸞牋象管夜深時曽賦陳宫第一詩讌罷風流人不見廢来蹤跡草應知集作何宜鶯憐勝事啼空谷集作巷蝶戀餘香舞好枝還有往年金甃井牧童樵叟等閒窺岐王宅唐彦謙朱邸平䑓隔禁闈貴逰陳跡尚依稀雲低雍畤祈年去雨細長楊從獵歸申白賔朋傳道義應劉文彩寄音徽承平舊物唯君一作名盡猶冩雕鞍伴六飛文苑英華巻三百七
