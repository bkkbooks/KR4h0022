body:
  text: 文苑英華巻六百七十四宋李昉等編刑法部下諫刑書二首申宗人寃獄書一首救李邕書一首諫刑書武后陳子昻將仕郎守麟臺正字臣陳子昻謹頓首冐死詣闕上疏臣本蜀之匹夫官不望逹陛下過意擢臣草莽之下昇在麟臺之間集作閣光寵自天卓若日月微臣固陋將何克負然臣聞忠臣事君有死無二懐佞不諫罪莫大焉况在明聖之朝當不諱之日方復鉗口下列俛仰偷榮非臣之始願也不勝愚惑輙奏狂昧之說伏惟陛下少加察焉臣聞古之御天下者其政有三王者化之用仁義也覇者威之任權智也强國脅之務刑罰也是以化之不足然後威之威之不變然後刑之故至於刑則非王者之所貴矣凡集作况欲光宅天下追功上皇専任刑殺以為威斷可謂策之失者也伏覩陛下聖徳聰明逰心太古將制靜宇宙保乂黎人發號施令出於誠慊天下蒼生莫不想望聖風冀見神化道徳為政將待於陛下矣且臣聞之聖人出必有驅除蓋天人之符應休命也日者東南微孽敢謀亂常陛下順天行誅罪惡咸服豈非天意欲彰陛下神武之功哉而執事者不察天心以為人意惡其首亂唱禍法合誅屠將息姦源窮其黨與遂使陛下大開詔獄重設嚴刑冀以懲創于天下逆黨親屬及其交游有跡渉嫌疑詞相逮引莫不窮捕考劾枝蔓集作葉蟠拏大或流血小禦魑魅至有姦人熒惑乗險相誣紏告疑似冀圖爵賞呌于闕下者日有數矣于時朝廷惶惶莫有固志海内傾聽以相驚恐頼陛下仁慈憫斯危懼賜以恩詔許其大功巳上一切勿論時人獲泰謂生再造臣愚集作愚臣竊亦欣然賀陛下聖明得天下之機也不謂議者異見又執前圖比者刑獄紛紛復起陛下不深思天意以順休期尚以督察為理威刑為務使前者之詔不信於人愚臣昧焉竊恐非三皇五帝伐罪弔人之意臣竊觀當今天下百姓思安乆矣曩屬北胡侵塞西戎冦邉兵革相圖集作屠向歴十載闗河自北轉輸幽燕秦蜀之西馳騖湟海當時天下疲極矣重以大兵之後屢遭凶年流離飢殍集作餓死䘮略半幸頼陛下以至聖之徳撫寧兆人邉境獲安中國無事隂陽大順年榖累登天下父子始得相養矣故揚州搆禍始有五旬而海内晏然纎塵不動豈非天下蒸庶厭凶亂哉臣以此卜之知百姓思安乆矣今陛下不務𤣥默以救疲人而反任威刑以失其望欲察察為政肅理寰區愚臣暗昧竊有大惑且臣聞刑者政之末節也先王以禁暴整亂不得巳而用之今天下幸安萬物思泰陛下乃以末節之法察理乎人臣愚以為非適變隨時之義也頃年巳來伏見諸方告宻囚累百千計大抵所告皆以揚州為名及其窮竟百無一實陛下仁慈又屈法容之傍訴他事亦為推劾遂使姦惡之黨决意相讐睚眦之嫌即稱有宻一人被訟百人滿獄使者推捕冠蓋如市或謂陛下愛一人而害百人天下喁喁莫知寧所臣聞自古聖人不有外患必有内憂理之然也臣不敢以逺古言之請借隋而况臣聞長老言隋之末代天下猶平煬帝不恭窮黷威武厭居皇極自總元戎以百萬之師觀兵遼海天下始騷然矣遂使楊𤣥感挾不臣之勢有大盗之心欲因人謀以竊皇業乃稱兵中夏將據洛陽哮闞之勢傾宇宙矣然亂未逾月而首足異處何者天下之弊未至土崩蒸人之心猶望樂業煬帝不悟暗忽人機自以為元惡既誅天下無巨猾也皇極之任可以刑罰理之遂使兵部尚書樊子蓋専行屠戮大窮黨與海内豪士無不罹殃遂至殺人如麻流血成澤天下靡然始思為亂矣於是蕭銑朱粲起於荆南李宻竇建徳亂於河北四海雲摇遂並起而隋族亡矣豈不哀哉長老至今談之委曲如是臣竊以此上觀三代夏殷周興亡下及集下逮秦漢魏晉理亂莫不皆以毒刑而致敗壊也夫大獄一起不能無濫何者刀筆之吏寡識大方斷獄能者多在急刻文深網宻則共稱至公爰及人主亦謂其奉法於是利在殺人罕能平恕故獄吏相誡以殺為詞非憎於人也而利在已故上以希人主之㫖下以圖榮身之利徇利既多則不能無濫濫及良善則淫刑逞矣夫人情莫不自愛其身陛下以此察之豈能無濫也寃人吁嗟感傷和氣悖亂羣生癘疫水旱隨之則有凶年人既失業則禍亂之心怵焉而生矣頃來亢陽愆候宻雲而不雨農夫釋耒瞻望嗷嗷豈不由陛下之有聖徳而不降澤於一有天字下人也儻旱遂過春廢於時種今年稼穡必有損矣陛下何不敬承天意以澤恤人臣聞古者明王重慎刑罰蓋懼此也書不云乎與其殺不辜寧失不經陛下奈何以堂堂之聖猶務彊覇之威哉愚臣竊為陛下不取也且愚人安則樂生危則思變故事有招禍而法有起姦儻大獄未休支黨日廣天下疑惑相恐無辜人情之變不可不察昔漢武帝時巫蠱獄起江充行詐惑亂京師致令太子奔走兵交宫闕無辜被害者以千萬數當此之時劉氏宗廟幾傾覆矣頼武帝得壺闗三老上書廓然感悟夷江充三族餘獄不論天下以一作少安耳臣每讀漢書至此未嘗不為戾太子流涕也古人云前事之不忘後事之師伏願陛下念之臣不避湯鑊之罪以螻蟻之命輕觸宸嚴臣非不惡死而貪生也誠恐負陛下恩遇臣不敢以微命蔽塞聰明亦非敢欲陛下頓息刑罰望在恤刑耳乞與三事大夫圖其可否徃者不可諫來者猶可追無以臣微而忽其奏天下幸甚臣子昻誠惶誠恐死罪死罪二承務郎守右衛曹㕘軍臣陳子昻謹頓首昧死上言臣聞昔者聖人務理天下者美在太平太平之美者在於刑措臣伏見陛下務太平之理而未美太平之功賤臣頑微竊惑下列臣前䝉天恩召見恩制賜臣曰既遇非常之主何不進非常之策臣草木微品天恩降休伏刻肌骨不敢忘捨今陛下創三皇之業務三皇之理大統已集神化光明雖伏羲神農昔有天下誠未足比臣敢不竭節以効愚忠臣聞自古聖王謂之大聖者皆云尚徳崇禮貴仁賤刑刑措不用謂之聖徳不稱嚴刑猛制用獄為禮者也故周有天下八百餘歲而唯頌成康漢有天下四百餘歲而獨稱文景皆由幾致刑措者也何則刑者政之末節非太平之資臣竊考之於天天貴生成驗之於人人愛生育旁稽於聖聖務勝殘皆不云以刑為徳者然則聖王養天下者固當上務順天下務順集作濟人不天不人不可謂理故曰唯天為大唯堯則之又曰唯天地萬物父母唯人萬物之靈亶聰明作元后元后作民父母然則為民父母固當貴於徳養不可務於刑殺臣伏惟陛下聖徳至大矣應天受命有三皇之功順人正位有三皇之業拜圖廵洛有三皇之符尊名顯號有三皇之冊明堂神一作又構萬象宣威風雨順時百榖昌熟可謂足為萬代之規也今天下百姓抱孫弄子鼔腹以望太平之政矣陛下為天地父母固將務徳以順養之登于太和以協皇極今陛下之政雖盡善矣然太平之理猶屈於獄官何以言之太平之朝務上下樂化不宜亂臣賊子日犯天誅比者大獄增多逆徒滋廣愚臣頑昧初謂皆實乃去月十五日陛下特察詔囚李珍等無罪明魏真宰有功一有又字召見髙正臣又重推元萬頃百僚慶恱皆賀集作荷聖明臣乃知亦有無罪之人挂於疎網者陛下務在寛典獄官務在急刑以傷陛下之仁以誣太平之政臣竊私恨之頼陛下又獨决天斷寛蕩羣刑死囚張楚金郭正一弓彭祖王令基等以凶惡之罪特䝉全活朽骨更肉萬死再生天地神祗實用同慶何以知之臣伏見去年集無此字八月以來天苦霖雨自陛下赦李珍等罪天朗氣清又九月十八日明堂享㑹慶雲抱日五彩紛郁龍章竟天萬品咸觀宇宙同慶又其月二十一日恩勑免楚金等死初有風雨變為景雲司刑官屬皆所共見臣聞隂慘者刑也陽舒者徳也慶雲者佳集作喜氣也臣伏考之洪範驗之六經聖人法天天亦助聖休咎之應必不虚來陛下法天垂仁天助陛下仁化獄吏急法則慘而隂雨陛下赦罪則舒而陽和君臣歡娛則嘉集作喜而見慶雲天意如此陛下豈可不承順之夫刑者怒也不可以承喜氣今又隂雨臣恐過在獄官况陛下明堂之理本以崇徳配天之業不以務刑今垂拱法宫且猶議殺布政衢室而未措刑賤臣頑愚尚疑未可况巍巍大聖光宅天下哉今者繫獄囚徒多極法者道路之議或是或非陛下何不悉召見之自詰其罪罪真實者顯示明刑罪有濫者嚴誅獄吏使天下咸服人知政刑以清太平之治用登仁夀之域豈非至徳克明哉昔鄧太后以天降旱親决洛陽囚徒良史書之而以為徳况陛下大聖億萬超於鄧后者乎夫獄吏不可信多弄國權自古敗亡聖王所誡陛下萬代之業千載之名固不可使竹帛書之有虧於此也伏願熟察以美太平之風賤臣不勝愚懇忠憤之至輙投諫匭昧死上聞申宗人寃獄書武后臣聞古人言為國忠臣者必集作半死集有而字為國諫臣者必死然而至忠之臣不避死以諫主至聖之主不惡直以廢忠臣幸逢陛下至聖大明好忠愛直每正言直諫特見優容今陛下丕集作方御寳圖以臨陽舘崇闡𤣥化寧濟蒼生固臣真心潔意願陛下至徳與三皇比矣然臣伏見陛下有至聖之徳左右無至忠之臣猶使上下不通内外壅隔臣竊懼之恐後代或以為聖朝無至忠之臣故臣敢冐萬死越職上奏伏乞天恩寛臣喘息畢盡忠言臣聞上有聖君下無枉臣昔舜誅四凶堯不罪舜周公誅管蔡成王不罪周公霍光誅燕王昭帝不罪子孟何者此數公皆為國討賊為君殄讎假雖擅權猶不可罪况奉君命而執法者乎臣伏見宗人嘉言有至忠之誠抱徇公之節執法不撓為國殄讎頃者逆子賊臣隂構禍難潜圖宻計將危社稷當時逆節初露朝野震驚頼陛下神武之威天機電斷得奉聖决恭順天誅不顧軀命不避彊禦唯法是守唯惡是讎幸能察罪明辜窮姦極黨使伏法者自首情實天衢得以清泰萬國得以歡寧誠是陛下神斷之明抑亦盡忠之效陛下所以自監察御史擢拜為鳳閣舎人者豈不以表其臣節報其竭誠使天下之人知其忠懇者也當此之時忠必見信行必見明自謂専一事君無二也今乃遭誣罔之罪被構架之詞䧟見疑之辜困無驗之告集作詰幽窮詔獄吏不見明肝血赤心無所控告母年八十老病在牀抱疾喘息朝不保夕今日身幽獄户死生斷絶朝䝉國榮夕為孤囚臣竊痛之頃者至忠而今日受賂辜負聖主憂及慈親誠足痛恨臣比者固知不免此禍不能度徳量力貪榮冒集作昧進以訟受服誰能免尤向使辭寵讓榮陳力就列雷同衆輩勤恪在公與全軀保妻子之臣恭默聖代臣固知今日未招此患何者古人云盗憎主人被堯誅者不能無怨頃來執法誅罪多是國之權豪父讎子怨豈可勝道親黨隂結同惡相從假使為脯肉為葅醢集作假使肝為脯肉為醢宗誅族滅肝腦塗地彼凶讎者集作也未足以快其心况䝉國寵榮位顯朝列凶讎切齒怨讟何窮臣竊恐今日之辜巳是讎怨者相結構矣陛下至聖明察豈不為之照鑒集作降照哉儻萬一讎誣濫罪使凶嚚者得計忠正者見辜為賊報讎豈不枉苦夫孤直者衆邪之所憎至公者羣惡之所疾寡不敵衆孤不勝羣共集作羣一作構誣成罪聖不能救自古所有非止於今古者吳起事楚抑削庶族以尊楚君楚國既彊吳起䝉戮商鞅事秦専討庶孽以明秦法秦國既覇商鞅極刑晁錯事漢諸侯威彊七國驕侈集作奢將陵王室錯削弱其勢以尊漢景帝不悟惑姦臣之說遂族滅晁氏以此三臣豈不盡忠願保其君然而身死族滅為讎者所快皆當代不覺而後代傷之聖主明君可不為之痛傷耶臣以嘉言雖無三子之智竊恐獲罪或與之同伏惟陛下仁慈矜憐憫察且臣聞漢高祖謀楚與陳平金四萬斤及其為帝不問金之出入何者立大功者不責小疵有大忠者不求小過所謂聖主之至道者也陛下豁逹大度至聖寛仁超於漢髙祖固巳逺矣齷齪小吏何足為陛下深責哉伏願天恩矜愚赦罪念功補過乞其終養老母獲盡餘年豈非聖主之恩仁君之惠有禮有訓善始善終哉臣於嘉言親非骨肉同姓相善臣知其忠然非是丘園之賢道徳之茂大雅明哲能保其身假使獲罪於天身首異處蓋如一螻蟻耳亦何足可稱然臣念其曾一日承恩䝉聖主任集作驅使而不以赤誠取信今乃負罪見疑臣實痛之恐累聖主之明傷其老母之夀身汙明法為後代所悲臣知其忠豈能無惜所以敢冒萬死乞見矜憐臣若言非至忠茍有僥倖請受誅斬伏表惶恐魂魄飛揚救李邕書見六百一十八巻表門孔璋文苑英華巻六百七十四
