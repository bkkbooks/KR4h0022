body:
  text: 文苑英華卷八百四十九宋李昉等編道二益州至真觀主黎君碑一首江州冲陽觀碑一首衢州開元觀碑一首益州至真觀主黎君碑盧照鄰若夫三清上列瑶關控日月之圖八洞深居貝闕吐山河之鎮雖復扶桑大帝傳赤字於東華安寶神君受青符於南極猶未能發揮不宰復歸無物之功開鑿妙門言謝有為之業其馮馮翼翼百姓存焉而不知杳杳冥冥萬族死之而無愠獨為衆化之宗者其為元始天尊乎暨乎蹩蹩疑作蹩躠為仁跛跛疑作跂踶為義鴻臚傳小儒之具緘縢為大盜之術堯禹生而天下火馳姬孔出而羣方鼎沸則有氤氲祖帝發皓鬢於東周兆朕皇輿飛紫雲於西道鳯交開景返徐甲之營魂龍光照天杜宣尼之神氣得一吹萬有大造於蒼生把十蹈五樹靈基於寶祚能使秦皇東指見赤舄而長懷漢帝北逰望青煙而下拜於是靈山水府俱為練玉之場甲第離宫多入空歌之地青牛道士按錦節於中都白鹿仙人列瑶壇於八表乃劔門西拒卭關南望星橋對斗像銀漢之秋橫月硤縈城疑兔輪之曉落武騎遷升之路冠蓋雲飛文翁講肄之堂英靈霧聚巖開􅌲桂藴金碧之祥光澗吐夭桃積神仙之粹氣至真觀者隋開皇二年之所立也尋屬煬帝驕淫蜀主奢僣冕旒多事有慙七聖之逰几杖不朝未遑八仙之術紫臺一作蓋初構霜露霑衣碧洞新開蓬萊變海仙居制度與雲雷而共屯象帝威儀將市朝而猶梗皇家纂戎牝谷乘大道而驅除盤根賴鄉擁真人之閥閲髙祖以汾陽如雪當金闕之上仙太宗以峒山順風屬瑶景之下視武皇帝凝旒紫閣懸鏡丹臺運璇極而正乾坤坐闓陽而調風雨變銅渾於九洛鱗羽登歌鳴玉鑾於四清煙霞變色焚符破璽更聞繩燧之初剖斗折衡重覩人倫之制銀書紀岱登日觀以論功玉牒封梁下雲邱而校美千齡胎化中疑以駕羽之期萬嵗巖者獻以華封之壽耕田鑿井者不知自然鼓腹擊壤者不知帝力嗚呼豈非道風幽贊之效與乃回輿詔蹕親幸譙若奉䇿老君為太上皇帝仍令天下諸州各置觀一所於是碧樓三襲上接虹霓絳闕九成下交星兩疑作雨乘雲御氣日夕於關山薦璧投金嵗時於嶽瀆此觀地當極一作樞要任切會昌南鄰覆錦之城西逼吞珠之界使星連注皇華結轍既而緑地榛蕪朱宫版蕩非夫位膺金䇿名載瓊軒為紫帝之羣賔列黃庭之上格孰能居此一無此二字棟梁平圃丹雘長樓大開流電之庭廣制明霞之宇觀主三洞法師姓黎諱某廣漢雒人也金天命秩即有天地之官火正分司實掌羲和之任夏殷之際代為伯相或食邑於魯或書社於衛故魯之黎城衛之黎陽即其地也魏晉之交或立功於吳剖符於蜀在吳者其後封於壽春黎將故城有黎氏之墓石文石關之一作文字在焉在蜀苻堅時秦為蜀郡太守北齊時練山為益州刺史故子孫因家於蜀法師練山之六代孫也祖宗父泉一有州字並為州郡都主簿平正七職之任蜀文公之好智固讓朝恩秦子敕之多才終從郡辟禮儀體式鄉校取式於公曹獄訟章程府主責成於平正時無留事復聞坐嘯之談野有讓耕重聽行歌之樂𤣥珠結慶剖江漢之圓流紫胞貽祉動岷精之垂曜豫章七歲非復常材朝陽五色豈云凡鳥初登小學笑孔墨之神勞一見𤣥書以彭􅔶為己任玉笈雲囊之術龍緘鳯藴之圖莫不吞楚夢於胸中指魯城於掌上臨長水而飲犢不就堯徵卧巨澤而牧羊徒勞漢使冥邱聳駕左肘符觀化之辰諄壑停裝橫目傳栖真之地貞觀之末有昭慶大法師魁岸堂堂威儀肅肅列疑作裂圓冠而楚疑作焚俗制橫大陂一作帳而抗山谷聲若坻頺辨均濤發仲尼河目飛電驚人子貢斗脣連環動坐昻昻不雜如獨鶴之映羣鳥一作雞矯矯無雙狀真龍之對芻狗于時三蜀耆老咸相謂曰興大道者其在兹乎初襲羽裙且蒞貞陽小觀才麾玉柄已馳天下大名尋而廣漢士人固請法師為靈集觀主去長桑之故苑臨隱坌莊子作弅之斯疑作新邱經之營之既雕斯斫銀臺中天而孤出珠樹匝地而叢生同赤城之建標有黃房之貞構觀中先有天尊真人石像大小萬餘區年代寖深儀範凋缺沉沉寶座積萬古之塵埃邈邈瓊顔被千齡之苔蘚法師睹斯而流涕曰不圖先聖尊容零落於此是重胘即路無胈音鉢永哀櫛沐幾於四時栖遑周於百舍誓將崇輯事畢然後寢食為期鄉曲爭持錢帛競施珍寶費餘巨萬役不崇朝還開紫翠之容更表圓明之色行益州刺史駙馬都尉喬居主壻懿親勳門盛族任髙方面寄功西南法師道叶半千神凝正一而至真福地荒凉日久不有上德其誰振之又表請師為至真觀主法師升堂慷慨吐納𤣥科攝齊寮亮分明紫訣詞鋒雲鬱觸劔石以飛揚義壑泉奔橫玉輪而浩蕩入其門者披煙霧於九天聞其音者聽咸韶於三月由是户外之履魚貫江水堂下之賔鴈行關塞黃老之學復於今矣則有王孫之黨都公之論名亞春陵氣髙韓魏鸘裘玉劒散圓庭以陸離驥子銀鞍委山衢而沛艾法師以兹衆施即於天宫後起大講堂并造長廊二十餘丈琳堂鬱其峙起星闈忽以環周仰呌窱以嶙峋下峥嶸以廣朗隂娥假道窺玉女於南軒陽鳥回轡紹疑青禽於北閣又於觀內鑄銅鐘一口重七十斤立石壇三級周回一百步懸黍璣於碧落明月流光建瓊乳於𤣥都飛霜蓄韻壇開錦砌類江浦之澄霞庭列瑶階疑昆邱之積雪每至三辰法會八景一作境非真逰霓裳蕩耀魄之華羽蓋轉風雲之路通天亘景兼造化之全模帶鳥䘖虹連飛動之奇勢可謂德光而功濟道勝而名揚者也前長史范陽公一代羽儀門傾四海前長史譙國公兩朝肺腑威動百城並屈銀黃俱伸交素法師雍容坐鎮嘯傲行藏雖郭先生之禮峻晉侯蒙莊子之身輕梁相不能尚也若夫言出於口龍驥所不能追行成於心王公所不能及悲懷絢疑作徇物風雨晦而愈勤苦節橫秋氷霜急而逾固户居環堵而嵗計有餘道周稊禆而日用無竭又於學射靈山别立仙居一所即至真之珠庭也栽松蒔柏與月樹而交輪刻角雕甍共星樓而接翼蒼郊却倚猶太行之北登錦肆前通似灞陵之南望華表千年之鶴未見成都津亭八月之龍時歸鄉里法師出家入道三十餘年弟子所得襯施不可稱量盡入修營咸供衆用見諸疾苦便開五色之囊遇彼饑寒輒有千金之費巾拂之外餘無所留凡所經過洪濟多矣法師又於咸亨二年正月十八日寢疾之際聞空中有聲曰天上今欲相煩為玉京觀主法師辭以至真功德未就固請不得一無得字行少選之間所疾便愈左右侍者無不同聞自是逺近道俗咸共驚嗟曰天下疑作上知余不肖將棄余矣上座監齊某等並流回左映䇿地景於丹田浩氣中升養天倪於紫室雖復同班玉籍並列仙宫一作官每屈宗師之道仍修弟子之敬亦猶被衣齧缺同德而相尊雲將鴻濛比肩而相下大弟子並仙庭十哲道家童師閉門錬火陪嘯父之髙煙卜肆驅筠記壺公之逺御咸用輯瓊臺之墜典正騫樹之頺風散在人間敷揚道教可謂庚桑嵔􅐑莊子作畏􅐑致大穰以匡時范相鴟夷行計然而濟俗僉曰吾師也整莊子作萬物而不以為戾莊子作義利萬代而不以為仁逍遙乎有無之表仿偟乎塵垢之外東郭順子無擇存而不論伯昏瞀人禦寇論而不議豈使為山九仞道不列於珠庭築館三休功未書於瑶版下官迷方看博邀赤斧於萬一作㝢山失路乘槎問君平於蜀郡汾陽處子目擊而言忘漢隂丈人德全而機謝是用搜竒井絡題片石於靈邱觀藝協晨見乘雲之飛將蒼蒼中野同銷地媪之魂眇眇太初獨昧天師之化其詞曰象帝之先其誰之子徒觀其妙莫究其始果而勿代為而不恃強為之名謂之道紀其一太朴云季孝慈已彰邈邈帝祖繩繩帝鄉曰神曰聖為龍為光千年受籙萬古稱王其二於鑠帝唐丕承天秩道風吹萬𤣥猷配一五載乘雲三山禮一薦璧延士投金訪術其三地分輿井城連劒闕錦瀨開霞嵋峯吐月白雲舒卷青山回沒藝一作菌閣香飛桃源花發其四紫宸髙映丹宫洞開巖舒金碧地起樓臺鶴飛龍度鸞歌鳯回星雨交接風煙去來其五寶龜涵影玉顔乃眷神劔九光華冠萬變一作絢日軒朝敞雲歌夕轉紫樹瓊鍾𤣥壇竹院其六偉與上士昭哉至人笙簧道德粉澤人倫汾陽處子箕山外臣遂荒白屋奄有𤣥津其七玉扄將墜金階無主草滋紅壁苔凝繡柱式佇賢才崇其雘疑作彠矩福庭霞煥仙徒霧聚其八縹眇四真雍容十哲俱升紫宇並邀清節松子排烟焦君卧雪辨雲懸㝢神逰朝徹其九玉壘庭坤珠鄉勝踐鐘鼎紛靄江山悠緬薛縣池平來州水淺懸日月於鼇極播天人於鳯椽其十唐江州冲陽觀碑李湜夫大易究天地之心老經逰道德之奧非先非後無始無終不行而至不疾而速跨億齡而超萬祀不以為長馳寸晷而迫分陰寧云是促寒暑乘之而斡運四時行矣動植禀之以資生萬物成矣若乃注元精而懸斗極皇運以興陶正氣以立乾維帝圖爰起故軒后以道登于雲天唐后以德遜於尊位其餘法寶歷揔璿衡皆以冲妙宰域中𤣥通御天下逮秦皇慢德漢武驕真幸集靈之宫逰祈年之館心非至懇意屬無厭徒健羡於一時竟貽嗤於萬代眷言魏晉咸璅璅焉迄至陳隋並區區者是知道之昌也無為之化若斯道之喪也有纍之求若此然則否終則泰窮變乃通得之一朝必復昌運我大唐之御極也應盤古而開混沌法太一而掃攙搶降靈元始之前提象太初之外乾坤翕闢飛龍之德在天河洛經通神馬之圖出地髙祖神堯皇帝鑣宫授籙推亡懷負勝之圖太宗文武聖皇帝豐户收祥馭朽握瑶光之運髙宗天皇大帝撫大鈞而司左契執大象而御中樞籠徽於七十二君飛英於萬八千歲中宗孝和皇帝小心恭孝大度寬仁上奉宗祧下安黎庶睿宗大聖真皇帝神功不宰聖謨廣運以由庚而安壽域以洪範而享昌年開元神武皇帝變代重光創業垂統撥亂反正應天順人知微知彰朝北辰而刋玉惟精惟一會九牧而鑄金惟幾也能使遐邇肅清惟神也能使幽明暢謐濛汜扺於𤾉谷同文同軌大板際於氷邱一尉一候其公卿也則伊周贊翼其牧守也則邵杜綏懷文以化成虞庠有籝金之業法惟刑措夏臺鮮辨璧之疑爾其南畝澄清有如京如坻之積東山舉逸無在薖在軸之幽大樂舉而音律諧大禮備而威儀整民一作俗知和樂人識訓章加以九苞六象之禽止庭巢閣雙觡五蹄之獸入囿馴郊慶雲舒玉葉之隂甘露灑金莖之潤海貝積而江珠滿山車至而澤馬來其餘絶瑞殊尤應圖合諜者不可勝紀焉由是赤駱青旗坐明庭而頒國政金繩玉版封日觀而紀天符曷以臻兹蓋皇上得玉真之要道也故能範圍三大陶冶六虛侯其偉文選作褘而眄其美矣冲陽觀者梁普通二年刺史邵陵王奏置奉詔造焉其觀當置之際山頂常有雙鶴栖託每天氣清朗日色晴明西飛雲衢東至廬嶽其居也乃爽塏之層阜博敞之奧區南眺平原北臨激水松子之峯非逺王喬之嶺猶存左對崇巖右瞻穹岫排雲掩日背隂向陽狀若幃屏圖經之數載矣以其仙鶴冲翥居處向陽二美可嘉故有冲陽之稱矣其地也上躔景緯牛斗寓其精下料山澤廬江嶮其鎮徒觀其一作夫數峯朵壑而浪水瀼階風被邃一作灑庭雲葉鏤楶瑶林寶蘂髣佛三珠之麗邃宇崇堂依稀七寶之飾真容式備道氣殊髙少華金童捧金疑爐而入侍太清玉女持真訣而來儀鑿沼營壇宛在風塵之外藥堂經藏蕭然松石之間此實𤣥聖之殊庭列仙之逰館也逮于垂拱四年冬遂為野火所侵回祿揚光軒廊發焰昆山之火燎及芝田麋氏之災煙侵桂棟致令𤣥門殆毁仙構俄傾迄至開元之初猶闕真君之院爰有北嶽先生洞𤣥蘇慕道等凝真牝谷養素清溪長往之迹逾髙幽貞之志彌逺多端濟物寡欲探微痛此荒蕪乘兹捨施衣布之外衾被罔留撫遺迹而興工想金摹而崇葺日役攸勸風匠是慿洞關疑作闢妙門式圖真彚炳乎丹鋪翠幌奐若秋水春臺鏤度𤣥關重裝昔像影升𤣥籥更飾仙儀鳯憩龍盤宛然功備把十蹈五鈎繩極妙能事斯畢不其然矣刺史趙郡李訥弓傳虎石將軍橫北塞之勳構襲龍門司𨽻擅東都之望愷悌君子名教中人詞場則蘭桂叢生學海則蓬壺對出聲流宸扆道暢黎蒸風符三月之春人荷二天之福别駕趙郡李承𦙍即州將之族父也長史京兆韋公𦙍司馬滎陽潘公綬並題輿九派展驥二梁雅譽邁沂土之歌美政完荆南之價化宣千里無勞庾亮之書功贊六條自得應詹之佐司軍功參軍長孫子尚司倉參軍姚令珣員外司倉參軍江克勵司兵參軍孫司弼司法參軍張延祚參軍陳德直嚴幹等八音繼響以同舉五色聨暉而異趣鳯藻揚日鶯遷弄春梁竦深恥屈為州縣王彬博綜甫就典兵徐稚枉器於功曹楊球屈聲於從事豫章擢七年之秀鷦鵬即六月之圖縣令黃撝主簿周暉尉宋不羇孫匪逸等並椅桐梓杞珠貝球琅禮樂専門詩書領藝家邦共理忠孝相資博通應時恭勤揆務嚴明既斷擲伏如神割滯豈異於解牛繩僣不殊於逐鳥鄉人楊公定周仁珙等茂族髙門魁岸豪傑或掛冠而從三樂或結轡而騁九衢咸捨淨財以追冥祐具題爵里勒在碑隂所冀證福今生銷災往劫某傾疑作頃因祗役齊沐朝真躬謁崇祠覩茲勝躅悠然長想悵矣髙風此際綱維道明祈請雖幼懷輕舉竊好神仙未逢太上之家不遇麻姑之席自惟庸鄙輕讃𤣥功何敢述其天倪但俱書其甲子昭宣不朽而為頌曰大哉元氣邈矣真圖寧窮妙象罔究鴻爐道氣方振澆風未敷發揮𤣥録何賢墨儒其一睢盱莫測肹蠁難名蟬蛻滓濁神逰太清沉尸載起枯骸更生韜光祕訣養正真經其二變相疑作朴從雕驅淳入詐質文互起昏明遞謝燧火御圖觀龍演卦詭類千品殊形萬化其三於戲主唐異聖冲光化吞邃古聲超上皇六幽允塞三靈再昌御九登運得一乘陽其四禀集作亶惟皇猷光宅天休張我𤣥籥清我道流雙童晚憩四子晨逰山棲白鶴關度青牛其五至人有為重爻是考藝閣三襲琳鑒七寶海聖澄真天神御昊含潄靈液規模𤣥老其六一人有慶萬姓攸資仰稽真宰式練精思往焚仙桂今植靈芝惟其嗣美賴我尊師其七王命良臣作牧江曲英英佐二濟濟寮屬中和演化威恩動俗衆妙所歸羣生是屬其八廬峰之右吳江之南仙居隱隱邃宇耽耽道原巨濟洞穴難探荃微思拙文何以堪其九衢州開元觀碑顧况玉太上也謂之三清淵神靈也謂之三洞洞之法金􅨅玉珮之書玉馬之劵回車畢道夫一作天誥也負石填河師誓也得之者上騰九天失之者下釁十祖故曰萬劫祕而五千文行蕭武好佛法道士桃攪釋藏徒聊順帝旨強說為大教佛經故論者短之多稱道家唯有老子兩卷井蛙不知尾閭也大哉玉皇上極金闕青童紫微扶桑之君仲侯左靈東華之君人雖位在上清而猶臣妾玉皇太上已下如陪臣焉凡三十六天三十六洞地道下通華陽林屋傍通龍邱九巖其土神秀厥生道奧徐先生名含真中書侍郎闕貞之族子也傳八景之真文掘疑作握九光之靈符𨽻乎此觀初棟宇壇墠惟彼瓦礫鬱為草莽先生之功林堂象設始吐光彩蕭寥同映養屯茹氣蹈火吞刀之士不可呼而來夫道可不遇一作遏文復何昌銘曰天地未生聖人未作隂陽坱圠日月磅礴道隱乎先氣流形博乃播羣法靈神沃若奔景無天回元豁落其一帝作玉府以般靈居四輔之目三清之書不得其人曠劫祕諸臣拜稽顙以度一作處寶魄之明浩輿其二况往嘗盜開靈書罰露天誥免冠自懲慮不塞咎戾夫其文以自贖蓋欲鋪簡神明非為道士所發自貞元辛未嵗九月哉生明余窮愁幽憤思以自適吟咏道篇以攄煩襟時長安尉杜陵史鎬在焉為余搦管揮灑後漢神仙之士王次仲者善為此書余今日見史侯如漢世矣文苑英華卷八百四十九
