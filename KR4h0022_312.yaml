body:
  text: 文苑英華巻三百十二宋李昉等編居處二樓七十一首登瀛州南城樓寄逺沈佺期層城起麗譙憑覽出重霄兹地多形勢中天宛寂寥四榮摩鸛鶴百拱厲風飈北盡集作際燕王舘東餘秦帝橋晴光七郡滿春色兩河遥傲睨集作傲倪非吾土躊躇適逺囂離居欲有贈春草寄長謡江樓夕望崔湜試陟江樓望悠悠去國情楚山霞外斷漢水月中平公子留遺邑夫人有舊城蒼蒼煙霧裏何處是咸京江樓有懷前人子牟懷魏闕元凱滯襄城冠葢仍為闕池臺尚識名山光晴後緑江色晩來清為問東流水何時到玉京春日登樓野望薛稷憑軒聊一望春色幾分非野外煙初合樓前花正飛嬌鸎弄新響斜日散餘暉誰忍孤遊客言念獨依依登城樓望西山作張九齡城樓枕南浦日夕顧西山宛宛鸞鶴處髙髙煙霧間仙井今猶在洪崖久不還金編莫集作惟我授羽駕亦誰攀簷際千峯逺雲中一鳥閒縱觀窮水國遊思遍人寰勿復塵埃事歸來且閉闗登荆州城樓作前人天宇何其曠江城坐自拘層樓百餘尺迢遞在西隅暇日時登眺荒郊臨故都纍纍見陳迹寂寂想雄圖古往山川在今來郡邑殊北疆雖入鄭東距豈防吳幾代傳荆國當時敵郟郛上流空有處中土復何虞枕席夷三峽闗梁豁五湖承平無異境守隘莫論夫自罷金門籍來參竹使符端居向陵集作林藪微景集作尚在桑榆直似王陵戅非如寗武愚今兹對南浦乗鴈與雙鳬秋晩登樓南江入始興郡路前人潦收沙衍出霜降天宇晶伏檻一長眺津塗多逺情思來江山外望盡煙雲生滔滔不自辨役役且何成我來颯衰鬢孰云飄華纓櫪馬苦踡跼籠禽念遐征嵗隂生集作況晼晩日久集作夕空屛營物生貴得性身累由近名内顧覺今是追歎何時平登郡城南樓作前人閉閤幸無事登樓聊永日雲霞千里開洲渚萬形出澹澹澄江漫飛飛度鳥疾邑人半艫艦津樹多楓橘感别時已屢憑眺情非一逺懐不我同孤興與誰悉平生本單緖邂逅承優秩謬忝為邦寄多慙理人術駑駘雖自勉倉廩素非實陳力儻無效謝病從芝术登河北城樓王維井邑傅巖上客亭雲霧間髙城眺落日極浦暎蒼山岸火孤舟宿漁家夕鳥還寂寥天地暮心與廣川閒和使君五郎西樓望逺思歸前人髙樓望所思極目情未畢枕上見千里忩中窺萬室悠悠長路人暖暖逺郊日惆悵極浦外迢遞孤煙出能賦屬上才思歸同下秩故鄉不可見雲水空如一登萬嵗樓孟浩然萬嵗樓頭望故鄉獨憐鄉思更茫茫天寒鴈度堪垂淚月落烏啼欲斷腸曲引古堤臨凍浦斜分遠岸近枯楊今朝偶見同袍友却喜家書寄一行岳陽樓已見二百五十巻與杭州薛司户登梓亭樓作前人水樓一登眺半出青林髙奕一作帝幕英寮敞芳筵下客叨山藏伯禹穴城壓伍胥濤今口觀溟漲垂綸學釣鰲夜登孔伯昭南樓時沈太清朱昂在座孟浩然誰家無風月此地有琴樽山水㑹稽郡詩書孔氏門再來值秋杪髙閤閒無喧華燭罷燃蠟清絃方奏鵾沈生隠侯𦙍朱子買臣孫好我意不淺登兹共集作同話言泗上馮使君南樓作祖詠井邑連淮泗南樓向晩過望灘沙鷺起尋岸浴童歌近海雲偏出兼秋雨更多明晨擬回棹鄉思恨風波揚子江樓孫逖揚子何年邑雄雄作闕闗江連二妃渚雲近八公山驛道青楓外人煙緑嶼間晩來潮正滿數處落㠶還登岳陽樓望洞庭杜甫昔聞洞庭水今上岳陽樓呉楚東南坼乾坤日夜浮親朋無一字老病有孤舟戎馬闗山北憑軒涕泗流登兖州城樓前人東郡趨庭日南樓縱目初浮雲連海岱平野入青徐孤嶂秦碑在荒城魯殿餘從來多古意臨眺獨躊躇題新津北橋樓得郊字前人極望春城上開筵近鳥巢白花簷外朶青柳檻前梢池水觀為政厨煙覺逺庖西川供醉客集作客眼唯是集作有此江郊與夏十二登岳陽樓李白樓觀岳陽近川逈洞庭開鴈别秋江去集作鴈引愁心去山銜好月來雲間連下榻天上接行杯醉後凉風起吹人舞袖囬登錦城散花樓前人日照錦城頭朝光散花樓金牎夾繡户珠箔懸瓊鈎飛梯緑集作縁雲中極目散我愁集作憂暮雨向三峽春江繞雙流今来一登望如上九天遊魯中都東樓醉後前人昨日東樓醉集作城飲還應集作歸來倒接䍦阿誰扶上馬不省下樓時自廣平乗醉走馬六十里至邯鄲登城樓覽古書懐前人醉騎白花馬西走邯鄲城揚鞭動柳色冩鞚春風生入郭登髙樓山川與雲平雄都半古冡一作深宫翳緑草萬事傷人情相如障華巔猛氣折秦嬴兩虎不可鬭亷公終負荆提携袴中兒杵臼及程嬰立孤獻集作孰白刃必死耀丹誠平原三千客談笑盡雄集作豪英毛君能頴脫二國且同盟皆為黄泉土使我涕縱横磊磊石子崗蕭蕭白楊聲諸賢集作賢豪没此地碑版有殘銘太古共今時由來同集作互衰榮傷哉何足道感激仰虚集作抑空名趙俗愛長劔文儒少逢迎閒從博徒集作陵遊帳飲雪中集作朝酲歌酣易水動皷振叢臺傾日落把燭歸陵晨向燕京方陳五餌策一使邊塵清夕霽杜陵登樓寄韋繇前人浮霽集作陽滅陽集作霽景萬物生秋容登樓送逺目伏檻觀羣峯原野曠超緬闗河紛錯重清暉映水竹翠色明雲松蹈海寄遐想還山迷舊蹤徒然廹秋暮集作晩未果諧心胸採菊竟誰舉集作桂宁立遊蘭集作折麻恨莫從思君逹永夜長樂聞踈鍾題潼闗樓崔顥客行逢雨霽歇馬上津樓山勢雄三輔闗門扼九州川從陜路去河遶華隂流向晩登臨處風煙萬里愁題沈侯八詠樓前人梁日東陽守為樓望越中緑窻明月在青史古人空江靜聞山狖川長數塞鴻登樓白雲晩流恨此遺風登黄鶴樓前人昔人已乗白雲去茲地空遺黄鶴樓黄鶴一去不復返白雲千載空悠悠晴川歴歴漢陽樹春草青青鸚鵡洲日暮鄉闗何處是煙波江上使人愁萬嵗樓王昌齡江上巍巍萬嵗樓不知經歴幾千秋年年喜見山長在日日悲㸔水獨流猿狖何曾離暮嶺鸕鷀空自泛寒洲誰堪登望雲煙裏向晩茫茫發旅愁芙蓉樓送辛漸長前人丹陽城東秋海深丹陽城北楚雲隂髙樓送客不知醉寂寂寒江明月心宿杜判官江樓郎士元適楚豈吾願思歸秋向深故人江樓月永夜千里心落葉攪鄉夢啼鳥驚越吟寥寥更何有斷續空城碪登無錫北樓前人秋興因危堞歸心過逺山風霜征鴈早江海旅人還驛樹寒仍宻漁舟晩更閒仲宣何所賦秪歎在荆蠻同溫司徒登萬嵗樓皇甫冉髙樓獨上思依依極浦遥山涵詩選作合翠微江客不堪頻北望塞鴻何事獨詩選作復南飛維陽古渡寒煙積𤓰歩空洲逺樹稀聞道王師猶轉戰誰能談笑解重圍獨上集作獨立維陽集作聊陽烏程水樓留别皇甫曾悠然千里去惜此一罇同客散髙樓上㠶飛細雨中川程隨逺水楚思望清風共說前期疑易滄波處處通登鸛雀樓張當迥臨飛鳥上髙謝詩選作出世人間天勢圍平野河流入斷山同前王之渙白日依山盡黄河入一作徹海流欲窮千里目更上一層樓㑹稽郡樓雪霽張繼江城昨夜雪如花郢客登樓齊望華夏禹壇前仍聚玉西施浦上更飛沙簾櫳向晩寒風度睥睨初晴落景斜數處微明銷不盡湖山清映越人家登丹陽樓前人寒臯那可望旅客又初還迢遞髙䄛上蕭踈凉野間暮晴依逺水秋興屬連山浮客時相見霜凋朱翠顔郢城西樓吟郎士元連山盡塞水縈廻山上戍門臨水開朱欄直下一百丈日暖遊鱗自相向昔人愛險閉層城今人復愛閑江清沙洲楓岸無求客草緑花開山鳥鳴馮翊西樓前人城上西樓倚暮天樓巾歸望正悽然近郭亂山横古渡野莊喬木帶新煙北風吹鴈聲能苦逺客辭家月再圓陶令好文常對酒相招一和白雲篇晩登江樓有懐李嘉祐獨坐南樓佳興新青山緑水共為隣爽氣遥分隔浦岫斜光偏照渡江人心閑鷗鳥時相近事簡漁竿私自親秪憶帝京不可到秋琴一弄欲沾巾同孫構免官後登薊樓懐歸張説昔在五一作平陵時年少心亦壯嘗矜有奇骨必是封侯相東走到榮州投身事邊將一朝去鄉國十載履亭障部曲皆武夫功成不相譲猶希虜塵動更取林胡帳去年大將軍一負樂生謗北别傷士卒南邊死炎瘴濩落悲無成行登薊邱上長安三千里日夕西南方疑寒沙榆塞没秋水灣河漲策馬從此辭雲山保閑放奉陪渾侍中五日登白鶴樓盧綸南樓倚玉梯朱檻與雲齊顧盼臨霄漢譚諧息皷鼙洪河斜更直野雨急仍低今日陪罇爼還應醉似泥集作唯當醉作泥九日奉陪渾侍中宴白鶴樓見二百五十巻寵盛前篇作盛襲九日奉陪令公登白鶴樓詠菊盧綸瓊罇有仙菊可以獻留侯願比三花秀非同百卉秋金英分蘂細玉露結房稠黄雀知恩在銜飛亦上樓九日同司直九叔崔侍御宴雜詠作登寳鷄南樓把蘂雜詠作菊歎將老上樓悲未還短長新白髮稠疊舊青山霜氣清襟袖琴聲引醉閑竹林惟七友何幸亦登攀九日奉陪渾侍中登白鶴樓前人碧霄孤鶴發清音上宰因添望闕心睥睨三層連歩障茱茰一朶映華簪紅霞似綺河如帶白露團珠菊散金此日相從何所問儼然冠劒擁成林登郡樓寄京師諸季淮南子弟韋應物初集作始罷永陽守復卧潯陽樓懸檻飄岑一作寒雨危堞浸集作寖江流逮集作及兹聞鴈夜重憶别離秋徒有盈虧隔集作罇酒百端鎮自憂集作鎮此百端憂重陽登滁州城樓憶前嵗九日歸灃城上赴崔都水并集作及諸弟子讌集悽然懐舊韋應物今日重九讌去嵗在京師聊囬出雀歩一赴郊園期佳節始云邁周辰已逮集作及茲秋山滿清景富貴集作賞屬乖離凋殘集作散民里濶摧翳衆木衰樓中一長嘯惻愴起凉颸重陽鄂城樓送屈突司直劉長卿登髙復送逺惆悵洞庭秋風景集作水同前作千古雲山滿上游蒼蒼來暮雨淼淼逐寒流今日闗中事蕭何共爾憂登僊仁樓訓子壻李穆前人臨風敞麗譙落日聽吹鐃歸路空回首新章已在腰非才受官謗無政作人謡儉嵗安三户餘年寄六條春蕪生楚國古樹過隋朝頼有東牀客池塘晩寂寥九日題蔡國公主樓前人主第人何在重陽客蹔尋水餘龍鏡色雲罷鳳簫音暗牖藏昏旦蒼苔換古今晴山巻幔出秋草閉門深籬菊仍新吐庭槐尚舊隂年年畫梁燕來去獨集作豈無心和顔集作樊使君登潤州城樓前人山城迢遞敞髙樓露冕吹鐃居上頭春草連天隨北望夕陽浮水共集作向東流江田漠漠全呉地野樹蒼蒼故蔣州王粲曾為南郡客别來無處更銷憂同裴録事樓上望釋皎然退食髙樓上湖山向晩晴桐花落萬井月影出重城水竹涼風起簾幃暑氣清蕭蕭獨無事因見蒞人情九日陪顔使君真卿登水樓前人重陽荆楚尚髙㑹此難陪偶見登龍客同遊戱馬臺風文尚水疊雲態擁歌廻持菊煩相問捫襟愧不才登潤州芙蓉樓崔峒上古人何在東流水不歸往來潮有信朝暮事成非煙樹臨沙靜雲㠶入海稀郡樓多逸興良牧謝元暉同崔邠登鸛雀樓李益鸛雀樓前集作南百尺檣汀洲雲集作寒樹共茫茫漢家簫皷空流水魏國山河滿集作半夕陽事去千年猶恨促集作速愁來一日即為集作知長風塵并在思鄉望集作風煙併是思歸望逺目非春亦自傷登寜州城樓楊巨源宋玉本悲秋今朝更上樓清波城下去此意重悠悠晩菊臨杯思寒山滿郡愁故闗非内地一為漢家羞同薛侍御登黎陽縣樓眺黄河楊巨源倚檻恣流目髙城臨大川九回紆白浪一半在青天氣肅晴空外光飜曉日邊開襟值佳景懐抱更悠然道州城北樓觀李花作吕温夜疑闗山月曉似沙場雪曾使西域來幽情坐超越將念浩無際欲言亡所說豈是感懐抱人自憐孤節道州秋夜南樓即事前人誰令獨坐愁昔日此南樓雲去舜祠閉月明瀟水流猿聲何處曉楓葉滿山秋不照匣中鏡少年㸔白頭登咸陽北寺樓張籍髙秋原上寺下馬一登臨渭水西來直集作急秦山南向集作去深舊宫人不見集作住荒碣路難尋日暮凉風起蕭條多逺心登法雄寺東樓前人汾河舊宇今為寺猶有當時歌舞樓四十年來車馬客古槐深巷暮蟬愁重到江州感舊遊題郡樓十一韻白居易掌綸知是忝剖竹信為榮才薄官仍重恩深責尚輕昔徵從典午今出自承明鳳詔休揮翰漁歌欲濯纓還乗小艛艇却到古湓城醉客臨江待禪僧出郭迎青山滿眼在白髮半頭生又校三年老何曾一事成重過蕭寺宿再上庾樓行雲水新秋思閭閻舊日情郡民猶認得司馬詠詩聲江樓望歸時避難越地一作在越中白居易滿眼雲水色月明樓上人旅愁春入越鄉夢夜歸秦道路遥荒服田園隔虜塵悠悠滄海畔十載避黄巾晩登天雲寺南樓贈常禪師已見二百二十二巻白居易庾樓晩望前人獨憑朱檻立陵晨山色初明水色新竹霧曉籠銜嶺月蘋風煖送過江春子城隂處猶殘雪衙皷聲前未有塵三百年來庾樓上曾經多少望鄉人題岳陽樓前人岳陽城下水漫漫獨上危樓凭曲欄春岸緑時連夢澤夕陽集作波紅處近長安猿攀樹立啼何苦鴈㸃湖飛渡亦難此地惟堪畫圖障華堂張與貴人㸔易州登龍興寺望郡北髙峯賈島郡北最髙峯巉巖絶雲路朝來上樓望稍覺得幽趣朦朧碧烟裏羣嶺若相附何時一登陟萬物皆下顧夏夜登南樓前人水岸閒一作寒非樓帶月躋夏林初見岳陽溪一㸃新螢報秋信不知何處是菩提杪秋登江樓周賀平楚起寒色長沙猶未還世情何處澹湘水向人閑空翠隠髙鳥夕陽歸逺山孤雲萬餘里惆悵洞庭間文苑英華巻三百十二
