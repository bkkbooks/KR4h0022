body:
  text: 文苑英華卷八百三十九宋李昉等編太子哀册文隋元德太子哀册文一首唐懿德太子哀册文一首節愍太子哀册文一首惠莊太子哀册文一首惠文太子哀册文一首惠宣太子哀册文一首恭懿太子哀册文一首昭靖太子哀册文一首隋元德太子哀册文虞世南隋書元德太子傳作虞世基維大業二年七月癸丑朔二十三日乙亥皇太子薨于行宫粵三年二月庚辰朔六日乙酉將遷座于莊陵禮也蜃綍宵戴鶴關曉闢肅文物以具陳儼賔從其如昔皇帝悼離方之云晦嗟震宫之虧象顧守器以長懷思視膳一作臨登餕而興想先逺戒日占謀允從庭彛撤祖階戺收重抗銘旌以啓露動軒一作徐轜於振容揆行授一作度名纍德彰諡爰詔史册式遵典志俾濬哲之徽猷播長久乎天地其詞曰宸基峻極帝緒會昌體元襲聖儀國一作耀重光氣秀春陸神華少陽居周軼誦處漢韜莊有縱生知誕膺惟睿性道觽日幾深綺嵗降迹大成俯情多藝樹親建國命懿作藩威蕤先路舄奕渠門庸服有紀分器惟尊風髙楚服一作殿雅盛梁園睿后膺儲天人叶順本茂條逺基崇禮一作體峻改王參墟奄有唐晉在貴能謙居沖益慎封畿千里閶闔九重神州王化禁旅軍容瞻言偃草髙視折衝帷扆清祕親賢允屬從一作泛景鳳瀾飛華螭玉揮翰泉涌敷言藻縟式是便蕃一作煩思謀啓沃恭一作共惟積德豐衍繁祉粵自天孫光升元子緑車建事翠纓奉記一作祀肅穆滿容儀形讓齒禮樂交暢愛敬兼資優遊道一作養德恭已承凝一作儀非南山聘隱東序尊師有粹神儀深穆其度顯顯觀德溫溫審喻炯戒齋針流連玉一作王賦入監出撫日就月將沖情玉裕令問金相冝綏景福永祚元良神理冥寞天道難究仁不必夀善或愆祜遽瑶山之頽壤忽桂宫之毁構痛結幽明悲纒宇宙慟皇情之深憫摧具寮其如疚嗚呼哀哉回環氣朔荏苒居諸霑零露於瑶圃下申或作嚴霜於玉除夜漏盡兮空階曙曉月懸兮帷殿虛嗚呼哀哉將寧甫竁長違望苑渡渭涘於造舟遵長平之修坂藐鶴駕而不追顧龍驂一作樓而日逺嗚呼哀哉永隔存沒長分古今去榮華於人世即潛隧之幽深羅一作霏夕煙而稍起慘落景而將沉聽哀梚之悽楚雜灌木之悲吟紛徒御而流袂覩一作欷纓辨以霑襟嗚呼哀哉九地黃泉千秋白日雖金石之能久終天壤乎長畢敢圖芳於篆素永飛聲而謄實嗚呼哀哉唐懿德太子哀册文李嶠維神龍二年嵗次景午夏四月甲戌朔二十三日景申懿德太子梓宫啓自洛邑將陪窆于乾陵禮也廞衣夕陳祖奠朝設蜃輅俄軫龍旗按莭皇帝嗟蟻庭之寢籥愔鳳渚之韜簧撫萬乘而懷國本綏六姻而悼乾將情無輟哀禮有加數刻純懿乎金版播聲芳於玉裕其詞曰靈命將興元符是膺皇基茂立帝武丕承祥集畫堂慶流朱邸棘矢延祝桐圭備禮實惟天族載挺人英川寶嶽秀虹輝電精舞象得玄珮觽聞道刻舟敏遽牽衣慧早幾神暗體理識𡨕資心韜鍾律情含蔡蓍曰仁曰孝非訓非師寬惠深博溫良肅祗苞舉六爻一作文網羅羣籍詩接楚彥賦延梁客淮國傳騷雲夢一作臺對易樂善起輩多才掩昔乃崇匡衛實屏實藩乃列朝請為鴻為鵷揚聲北路振彩西園儀表姬戚光輝舜門恭事閫闈歡迎黨族怡色玉潤溫詞蘭馥中外克諧親踈允睦恆德有裕間言無讟榮深出幸寵茂留中婉孌羣辟綢繆二宫陪輿澤厚賜一作錫馬恩隆西蜀欽義南山向風禮縟天孫望髙元嗣重海闕象前星虛位方輟頒彛行膺主器奄喪門軸俄催隙駟嗚呼哀哉鳳下朝陽龍收暝光瓊田滅彩桂苑淪芳國軫傾翰朝悲壞梁惟靈徵之寂寂怨天道之茫茫嗚呼哀哉玄聖登期恩榮下賁爰命典册式昭名諡諡鬯雖崇粢盛不蒞闔壤同戚具寮增欷嗚呼哀哉築思臺兮竟不旋還作室兮復何年訪來人兮傷對日瞻去鶴兮感升天惜明離之虛繇悵鳳樂之徒懸對銀榜之留月泣銅樓之送煙嗚呼哀哉司兆獻占掌圖辦域梚鐸初警帷㡆既飭引文衛之逶迤度繁笳之悽惻纒永慕於青府結餘酸於紫極嗚呼哀哉辭交風之近甸出避雨之層巒望八水而遙集懷三川而顧歎麥枯兮夏旱花落兮春殘林野晦而天無色煙雲愁而景欲寒嗚呼哀哉梚駕昭途即宫下土執斧供事揚麾按部藏日兮山門埋鐙兮地户痛平生兮冥寞哀倐忽兮今古視不見兮呼不聞天無曉兮夜無分同變化兮光隂盡配陽秋合菊蘭芬嗚呼哀哉一作皆唐大詔令節愍太子哀册文李乂維景雲元年十月朔日莭愍太子梓宫啓自鄠杜粵某日將陪窆于定陵禮也蜃衛初列鳳仙將逺閲少海而不流赴窮泉而莫返皇帝懷副君之大義降猶子之深慈飾忠烈於逝者備哀榮以送之漢幄虛侍周墻肅事思臺空築幽埏永閟金相兮玉裕揆行兮旌能峻節兮無泯芳聲兮有恆其詞曰素雲流祉白水貞祥祀及百代威加萬方勃焉家國赫矣皇王帝子攸􅑙乾男以將邁德誕靈懷文抱質漢臺占雨秦宫唐大詔令作京近日敏對不羣能言罕匹藝該百遍詔令作變詞含六律朝霞自舉夜月嘗遊醴薦推穆書成重鄒典戎仙衛作牧神州是謂元子光膺孟侯少陽正位太學知道春誦夏絃尊師敬老榮承玉玉寵殷瑜珮三善不忘四章旋逮過闕則下入廟斯趨曰仁與孝終始不渝聖敬日躋溫文嵗廣望髙周副才優魏兩用事有倫出言無黨政成中外聲溢天壤邪臣作蠱匹夫知惋不顧身尤詔令作遊將夷國難忠義斯仗謀猷是斷獲戾宫朝歸魂霄漢白駒過隙蒼蠅止藩水逝西沼霜雕北園鶴闕誰馭鳩里徒寃瞑目於此傷心誰論嗚呼哀哉去日淪暉前星墜彩形神溘謝德音如在物是人非年移運改聖明延鑒徽章有待有待伊何慶逢開闢延鑒伊何恩隆典册即鳴鳳之岡嶺啓占鳥之隊宅人辭中壘之桑鳥思平陵之柏地如伊水山連紀市嗟委化於仙期欲問安於神理五營成列萬國咸酸梚鐸朝唱旌麾曉寒指牽牛以南渡乘飲龍而北傃顧青舍兮非春掩玄扉兮大暮昔之來矣銀榜銅樓今之往矣曠野荒邱冉冉兮辰促蒼蒼兮道悠惟聲華與純懿比金石而恆留嗚呼哀哉惠莊太子哀册文張九齡維開元十二年嵗次甲子十一月丁巳朔二十四日庚辰司徒申王薨于行在所册諡惠莊太子旋殯于寢粵閩十二月二十七日壬午將陪葬于橋陵之柏城禮也黼幕宵布羽纛宿設西序啓攢南首成列皇帝深天倫之感崇后儲之禮擬容衛於青宫申孔懷於朱邸爰命史氏稽於唐大詔令作於稽令則無俾直書不彰遺德其詞曰昊天有命先后受之分王子弟藩衛京師克荷成憲罔不集作弗肅祗懿哉明哲誕惟神粹宣慈日聞孝友天至道則吻合迹無自異性實生知學兼時習易微書逺詩言禮立德必有鄰善如不及貴而能慎量固難挹方伯出鎮邵南取斯司徒入掌鄭武其宜義之所在政乃克施物留遺愛事著成規西夏息人東征叶卜韡韡同軒二本作輦皇皇改服疾道中路凶傳左轂寧不愸遺奄鍾斯酷嗚呼哀哉昔在沖妙具惟兄弟四國並封五王均體逰必連騎居則同邸各承愛於含飴俱受經於置醴既荏苒而云邁屬殷憂之將啓實定禍於蕭墻遂繼明於雲陛雖隔深宫之衛常洽家人之禮曷殂謝以痛心感平生而流涕嗚呼哀哉爰擇茂典將集作追崇上嗣表先聖之元良申友于之褒異紛鹵簿以徒設儼文物而空備彼神儀之如在乃羣悲之所萃周禮從祔漢塋是陪先逺日而撰集作選吉會同盟以送哀夜漏盡兮暗室啓庭燎殘兮晚梚催按三校而徐進將一去而不回嗚呼哀哉背朱門兮遲遲馳詔令作駟白驥兮騤騤野蒼茫而助慘風蕭飈而增悲翩翩兮素蓋寂寂兮畫帷遵舊途而何有覽陳迹以如疑面都邑兮不入侍陵寢兮有期惟光儀之永閟與昭代而長辭嗚呼哀哉潛清暉於幽穸昭鴻名於美迹將在皇儲之史豈伊諸侯之策播遺芬集作芳於蘭桂傳不朽於金石諒紀言之在兹嘉德音之無斁嗚呼哀哉惠文太子哀册文蘇頲維開元十四年嵗次唐大詔令作太嵗庚寅四月己酉朔十九日丁卯太子太傅岐王薨于洛册諡惠文太子殯于正寢之西階仲夏景申將祔于橋陵禮也曉風北清魄月西照列鐸梚以嚴鼓出軒除而滅燎皇帝戚深天倫或作三倫寵異天人追遣奠於將逺慟哀懷其若新人以貞位文以光諡爰詔司存乃甄遺懿其詞曰重玄之門唐系居尊五色之土岐封效古瑶圖正位兄一弟二寶蕚承庇帝三王四常急難兮特詢以事竟扶翼兮能竭其志其志伊何程才則多武之以靖文之以和勇超東牟思奪東阿是曰且爾曷云其他覃訏守成忠肅鍾美克順克比為臣為子河書聚學沛易窮理毫使露濡賦令雲起出咨嶽政入慎邦紀魯衛則侔武桓斯擬傳于元嗣欽若端士往錫朱旗來朝紫微家人輯穆藩后增暉井旨不同而不膳珍華不共而不衣楚謀或隱梁籍寧違屬巡岱以封還侍升天而慶歸猗那兮揚名於后懿詔令作於錦兮修業可久富貴兮于何不有暗忽兮曽莫之夀嗚呼哀哉宵欲分漏革傳于奏天初辨時憲詔令作慮切乎思駿馬連􅘠而交使近臣駢命而挾醫望君土兮何遲遲俯櫺檻兮猶若期至不至兮歘長辭悲莫悲兮惟此悲外皆罷惙兮內獨漣洏豈吾季之在哉崇后儲以諡之孝依橋嶽仁本京闕疇能忍兹靈輴稍發清道徐按整承華之鹵闕陽之宫觀樹隂隂於國門橋耿耿於天漢盈舊戀闕回復蓄新哀以聚散煢然嗣王若不勝喪慘天地之何心怨關山之已長夫儉為之德謙固其則存沒是膺惠文是徵存也髙臺深池之不競歿也備物重器之不矜嗚呼哀哉典册之有慿惠文之有稱故奉先皇之松柏成太子之園陵嗚呼哀哉惠宣太子哀册文韓休維開元二十二年嵗次甲戌七月庚申朔十日己巳司徒薛王薨于洛册諡惠宣太子翌日殯于正殿之西階粵八月二日庚寅將陪葬于橋陵禮也涼隂戒秋白露凝夜傃哀梚於郊道儼虛容於池榭皇帝痛棣華之既凋矚蘭坂而增欷撫徹奠以無及恨潛泉之永閟光乎典册升彼儲嗣爰命史臣揚言其懿其詞曰於昭帝系濬發玄裔逮堯升唐自薛而王粵有成德遂荒東國大啓土宇聿崇典則夫其秉靈在初迪哲惟睿惇敏秀鑠淳龎淑慎謀謨以成蹈道而順或作進文英獨越武烈惟振百辟式瞻五宗或作崇詔令作常以訓惟兹大賢克懋天敘為藩為屏是輔是弼保釐我邦家左右我王室沛獻演易楚元説詩藝無不綜學罔有遺分以寶玉建其旌旗出𢎞聲政入贊雍熙咨爾公族是惟敦睦王曰命弟寵其車服俾侯于京怡怡弟兄穆以家人之禮崇其藩后之榮曷常不樂彼同輿却東平之歸奏詢其異政欽少詔令作比海之能名將以天倫之愛可以昭于詔令作於載籍友于之道可以貫於神明冝其善有其慶禍無其胎享此眉夀祐其多才胡勿藥以為疾逮彌旬而成災躬為禱兮無不至誠以請兮無不備走羣祀以纍祈徵上醫而畢洎蒼黃而晦明未隔暗忽而古今斯異嗚呼哀哉神理無昧人寰已非想河樂其猶在望淮仙而不歸悲由中而自切情限禮而相違帳丙舍而詔令作之云逺飾承華以增暉嗚呼哀哉靈龜肇吉服馬先路悼津門之永違遵河橋以直度笳哀洛陽之道旐靡咸京之樹換憂歡於今昔變風景於新故嗚呼哀哉夫行以諡尊恩由禮盛申備物以增飾緬貞徽而獨映俾重為善之名以彰有後之慶嗚呼哀哉庭榭戚以驚秋川波咽而不流厯神臯兮望國寢背華宇兮歸山邱厯詔令作流塵滿兮虛榭暗緑苔生兮行徑幽惟盛德與鴻烈亦天長而地久悠嗚呼哀哉恭懿太子哀册文李揆維上元元年太嵗庚子六月己未朔二十六日甲申皇帝舊唐書本傳并詔令並無帝字第十二子待莭鳳翔等四鎮唐書作州莭度觀察大使興王紹薨于中京之中二作作內邸殯于詔令作於寢之西階粵八月丁亥册贈皇太子廟號恭懿冬十有一月庚寅詔葬于長安之髙陽原禮也燕隊開封龍輴二本作輼進轍陳祖藏而就位儼塗芻而唐書作以成列皇帝哀玉林之閟景憫璿蕚而罹唐書作之惟霜曕蜃唐書作龍綍而增思懷鴈池而永傷考諡惟古褒崇有式爰詔史臣恭宣懿德其詞曰惟天作唐纍葉重光中興景運唐書作宸景再紹乾綱本枝建國盤石疏疆克開聖唐書作寵胤實曰賢王驪源孕彩日幹騰芳深仁廣孝藴藝含章秀發孩笑二本書作童年惠彰髫唐書作齓齒蹈禮知方尊賢唐書作承尊叶旨對日流辨占封二本作風繼美魯衛後塵間平絶軌胡孽初搆王師未班爰從襁褓載厯險艱愛借二本作備中掖名崇懿藩居常稟訓動不違顔禮及佩觽朝加分器祚土延壤二本作渥登壇受師玉詔令作璇軾金箱四字唐書作玉質金聲文經武緯樂善為寶崇儒是貴濬哲外朗溫文內深閲書成誦觀樂表音五經在口六律諧心才優藝洽詔令作給絶古超今蛇豕猶梗寰區未泰二本作乂滌慮祈真焚香演偈食去葷血心從唐書作依定慧庶福邦家俾清凶穢霜唐書作霧露嬰疾聰明害神沉疴始遘彌曠盈旬正唐書作止慮無擾發言有倫在膏方函問膳逾勤雲物告徴星辰變象楚藥無救秦醫莫仗靈儀沓而上賔徽音邈其長往違舊邸於青社即幽陵於黃壤嗚呼哀哉魂氣奪兮去何之精靈在兮孝有思痛唐書作念君親之永隔託夢寐而來辭延桂宫而震二本作宸悼貫椒壼而纒悲旌遺芳於碣館賁新命於儲闈嗚呼哀哉先逺戒候占龜獻吉指鶉野而西臨背鳳城而右出天慘慘而苦霧山蒼蒼而翳日揚薤梚之哀悽盼松挺之簫瑟罷詔令作羅烏伏以禮峻撩黃腸而思密望馳道而長辭赴幽途而永畢嗚呼哀哉生為寵王兮宸愛所鍾歿追上嗣兮朝典斯崇升玉笙於洞府閟唐書作閲非銀棨於泉宫金石誰固兮人生有終簡册猶二本作攸記兮德音無窮敢直詞以唐書作於篆美庶永代而承風嗚呼哀哉昭靖太子哀册文蕭昕維大厯八年嵗次癸丑五月乙亥朔十七日辛卯開府儀同三司元帥鄭王薨旋殯于內侍省二十七日甲午册諡曰昭靖太子洎十年嵗在乙卯十二月庚申朔二十六日乙酉遷窆于萬年縣細柳之北原乃詔京兆尹黎幹監護喪事展飾終之儀禮也嗚呼哀哉窮隂肅冽殺景凝沍蜃輅方巾龍驂在御設庭燎以終夕啓攢塗而即路皇帝悼賢王之不淑念愛子之云亡齊彭殤以理遺顧形影而神傷録舊功一作勳於藩邸議新諡於太常眷承家於七鬯追嗣位於元良爰命侍臣式纂遺芳其詞曰維昔啓土膺兹册命賜爵為王建封于鄭梁國寵異魯邦禮盛明哲在躬溫良成性國步艱難遘兹師旅克生才藝允是文武乃拜元戎俾殱醜虜職思靖亂功期禦侮守師律以殿邦振威聲而先舉問安內豎視膳寢門隨肩明兩順色晨昏光輝棣蕚友愛鴒原率禮不違人無間言招賢南楚愛客西園宗子維城王室以藩樂善未終沉疴斯起羣望並走衆醫咸理有加無瘳蘭銷玉毁馳光度隟逝川閲水軫皇慈之羣化嗟國人之罷市嗚呼哀哉疇庸未紀度德則優崇以徽號闡其謀猷善則可旌禮無不酬吉凶同域神理難求列前星之儲位昭甲觀之虛一作靈慶選一作撰日月以有時備塗芻以將命卜竁從吉辨方正堇原霜苦松阡雪映起寢廟之崇嚴制園陵之尊敬一作盛嗚呼哀哉輼車發軔緹綺前旌祖載奠徹簫笳哀鳴梚出離宫路回直城羽儀以列徒馭不驚越素滻以東指背黃山而北征聮岡走以回抱逺樹靡而低傾對驪宫以立表依細栁以開塋閟重扄於穸壤悲執紼於桓楹川沓呇以暝色野梢梢一作稍稍以寒聲仰清芬之不泯實昭晰於鴻名嗚呼哀哉文苑英華卷八百三十九
