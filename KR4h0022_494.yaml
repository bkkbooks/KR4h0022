body:
  text: 文苑英華卷四百九十四宋李昉等編帝王歷代帝王為理一道納諌一道去諂佞一道睦親一道養老一道御功臣之術一道辨興亡之由一道王澤流人心感一道君不行臣事一道人之困窮由君之奢欲一道歷代帝王為理見四百八吳師道納諌上封章廣視聽白居易問國家立諌諍之官開啓沃之路久矣而謇諤者未盡其節謀猷者未竭其誠思欲取天下之耳目裨我視聽盡天下之心智為我思謀政之壅蔽者決於中令之滅絶者通於外上無違德下無隱情何為何方得至於此又問先王立訓唯諌是從然則厯代君臣有賢有否至若獻替之際是非之間或集作若君過臣規固宜有言必納如上得下失豈可從諌如流以是訓人其義安在自此至卷終並於白居易集凖備制科七十五門中摘取九篇其問答皆白居易擬作對對臣聞天子之耳不能自聰合天下之耳聽之而後聰也天子之目不能自明合天下之目視之而後明也天子之心不能自聖合天下之心思之而後聖也若天子唯以兩耳聽之兩目視之一心思之則十步之外不能聞也百步之外不能見也殿廷之間不能知也而况四海之大萬幾之重集作萬樞之繁者乎聖人知其然故立諌諍諷議之官開獻替啓沃之道俾乎補察遺闕輔佐聰明猶懼其未也於是設敢諌之鼓建進善之旌立誹謗之木工商得以流議士庶得以傳言然後過日聞而德日新矣是以古之聖王由此塗出焉臣又聞不棄死馬之骨然後良驥可得至也不棄狂夫之言然後嘉謀可得聞也茍臣管見之中有可取者陛下取而行之茍臣芻言之中有可採者陛下採而用之則聞之者必曰如某之言如某之見猶且不棄况愈於某之徒歟則天下謀猷之士得不比肩而至乎天下謇諤之臣得不繼踵而來乎故覽其謀猷則天下之利病如懸之集作於握中矣納其謇諤則朝廷之得失如措諸掌內矣所謂用天下之耳聽之則無不聰也用天下之目視之則無不明也用天下之心思謀之則無不聖神也聖神啓於上聰明逹於下如此則何壅塞之有耶何滅絶之有耶臣又嘗觀歷代之人君有愚有賢舉事非盡失也人臣者有能有否出言非盡得也然則先王勤勤懇懇勸從諌戒自用者又何哉豈不以自古以來君雖有得未有拒諫而理者也况其有失乎臣雖有失未有從諌而亂者也况其有得乎勤懇勸戒之義在於此矣伏惟陛下鑑之去諂佞從讜直問天地無私賢愚間生焉理亂有時邪正迭用焉然則理代豈遂無愚邪者耶將有而不任耶亂代豈遂無賢正者耶將有而不用耶思決所疑其徵何驗集作可徵其驗又問歷代之君無不知用賢則理用愚則亂從諌興從佞亡也而取舍之際紛然自迷故誅放者多非小人寵用者鮮有君子至使衰亡危亂歷代相仍集作望豈臣之邪正惑其心乎將已之愛惡昏其鑒乎昏惑之由必有其故對對臣聞昏明不並興邪正不兩廢蓋賢者進則愚者退矣曲者用則直者隱矣亦猶晝夜相代寒暑相推必然之理也然則興盛之代非無小人小人之道消不能見而為亂也昏衰之代非無君子君子之道消不能出而為理也故殷紂之末三仁在朝虞舜之初四凶在位雖仁在朝不能用之所以喪天下速於旋踵也雖凶在位卒能去之所以理天下易於覆掌也用舍興亡之驗唯明主能察焉然則歷代之主莫不知邦以賢盛以愚衰君以諌安以佞危然則猶前車覆而後車不誡者何也蓋常人之情恱其從命遜志者惡其違已守道者又君子難進而易退况惡之乎小人易進而難退况恱之乎是則常主之待君子也必敬而疏其遇小人也必輕而狎狎則恩易下及疏則情難上通是以面從者日親動則假虎威而自負也骨鯁者日疏言則犯龍鱗而必死也故政令日以壞邦家日以傾斯所以變盛為衰轉安為危者矣是以明王知君子之守道也雖違於已引而進之知小人之徇惑也雖從於命推而逺之知讜言之為良藥也雖逆於耳恕而容之知佞言之為美疢也雖遜於心忍而絶之故政令日以和邦家日以理斯所以變衰為盛轉危為安者矣盛衰安危之效唯明主能鑒焉問睦親選左用對對臣聞南面而理天下自人道始也人道之始始於親親故堯之教也睦九族而平百姓文王之教也刑寡妻而御邦家斯可謂教之源理之本也今陛下誠欲推其恩廣其愛使惠洽九族化流萬人則宜乎先親後疏自近及逺者也然則置其師傅間之以教訓選其賢能授之以官政或出為牧守或入為公卿如此則雖無三代封建之官而有三代翼戴之實也使棣華之詠協於內麟趾之風著於外所謂枝葉茂而本根可庇骨肉厚而家國自肥則天下之人相從而化矣故曰未有九族睦而萬人叛者也未有九族離而萬人和者也蓋先王所以布六順而化百姓敷五教而協萬邦者由此道素行故也問養老在使之夀富貴對對臣聞昔者西伯善養老而天下歸之集作心善養者非家至户見衣而食之也蓋能為其立田里之制以安其業樹畜養之産以厚其生使生有所養老有所終死有所送也近代之主以為老者非帛不暖非肉不飽而時頒其布帛肉粟之賜則為養老之道盡於是矣臣以為此小惠也非大德也何則賜之以布帛仁則仁矣不若勸其桑麻之業使天下五十者可以衣帛矣賜之肉粟惠則惠矣不若教其雞豚之畜使天下七十者可以食肉矣然後牧以仁賢慎其刑罰雖不與之年而老者得以夀矣不奪其力不擾其時雖不與之財而老者得以富矣使幼者事長少者敬老雖不與之爵而老者得以貴矣此三代盛王所以不遺年而興孝者用此道也問御功臣之術對對臣聞明王之御功臣也量其功而限之以爵審其罪而糾之以法限之以爵故爵加而知榮矣糾之以法故法行而知恩矣恩榮並加畏愛相濟下無二志上無疑心此明王所以念功勞而全君臣之道也若不限之以爵則無厭之心生矣雖極人臣之位而不知榮也若不糾之以法則不忌之心起矣雖竭人主之寵而不知恩也恩榮不知畏愛不立而望奉上之心盡念功之道全或恐難矣故傳曰報者倦矣施者未厭此由爵無限而法不行使之然也惟陛下察之辨興亡之由由善惡之積問萬姓親怨之由百王興亡之漸將獨繫於人乎抑亦繫於君乎對對臣觀前代邦之興由得人也邦之亡由失人也得其人失其人非一朝一夕之故其所由來者漸矣天地不能頓為寒暑必漸於春秋人君不能頓為興亡必漸於善惡善不積不能勃然而興惡不積不能忽焉而亡善與惡始繫於君也興與亡終繫於人也何則君苟有善人必知之知之又知之其心歸之歸之又歸之則載舟之水由是積焉君茍有不善二字集作惡人亦知之知之又知之其心去之去之又去之則覆舟之水由是積焉故曰至高而危者君也至愚而不可欺者人也聖人知其然故法上天不息之道以修已法下地不動之德以安人修已者慎於中也栗然如履薄氷安人者敬其下也凛然如馭朽索猶懼其未也加以樂人之樂人亦樂其樂憂人之憂人亦憂其憂憂樂同於人敬慎著於已如是而不興反是而不亡者自生人以來未之有也臣愚以為百王興亡之漸在於此矣問王澤流人心感在恕已及物對夫欲使王澤旁流人心大感則在陛下恕已及物而已夫恕已及物者無他以心度心以身觀身推其所為以及天下者也故已欲安則念人之重擾也已欲夀則念人之嘉生也已欲逸則念人之憚勞也已欲富則念人之惡貧也已欲溫飽則念人之凍餒也已欲聲色則念人之怨曠也今陛下念其重擾則煩暴之吏退矣念其嘉生則苛酷之吏黜矣念其憚勞則土木之役息矣念其惡貧則服御之費省矣念其凍餒則布帛禾麥之稅輕矣念其怨曠則妓樂嬪嬙之數減矣推而廣之念一知十蓋聖人之道也始則恕已以及人終則念人而反已故恕之又恕之則澤不得不流矣念之又念之則人心不得不感矣澤流心感而天下不太平者未之有也問君不行臣事委任宰相對臣聞建官施令者君所執也率職知事者臣所奉也臣行君道則政専君行臣道則事亂専與亂其弊一也然則臣道者百職至衆萬事至繁誠非一人方寸所能盡也故王者但操其要擇其人而已將在乎分務於羣司各令督責考課受成於宰相不以勞倦自嬰然後謹殿最而賞罰焉審幽明而黜陟焉則萬樞之要畢矣故失君道者雖多夕惕若厲之慮而彞倫未必敘也行臣事者雖多日昃不食之勤而庶績未必凝也得其要逸而有終非其宜勞而無功故也臣又聞坐而論道三公之任也作而行之卿大夫之職也故陳平不知錢穀丙吉不問死傷者此有司之職非宰相之任也夫以宰相尚不可侵有司之職况人君可侵宰相之任乎可侵百執事之事乎臣又聞宰相之任者上代天工下執人柄羣職由之而理亂庶政由之而弛張君之心膂待宰相而啓沃君之耳目待宰相而聰明設其位不可一日無其人得其人不可一日無其寵疑則勿用用則勿疏然後能欣合其心馴致其道蓋先王所以端拱凝旒而天下大理者無他焉委務於有司也仰成於宰相也人之困窮由君之奢欲問近古以來君天下者皆患人之困而不知困之由皆欲人之安而不得安之術今欲轉勞為逸用富易貧究困之由矯其失於既往求安之術致其利於將來審而行之以康天下對對臣聞近古以來君天下者皆患人之困而不知困之由皆欲人之安而不得安之術臣雖狂瞽然粗知之臣竊觀前代人庶之貧困者由官吏之縱欲也官吏之縱欲者由君上之不能節儉也何則天下之人億兆也君者一而已矣以億兆之人奉其一君則君之居處雖極土木之工殫金玉之飾君之衣食雖窮海陸之珍處文彩之華君之耳目雖慆鄭衛之音厭燕趙之色君之心體雖倦畋漁之樂疲轍迹之遊猶未至擾於人傷於物何者以至多奉至少故也然則一縱一放而弊及於人者又何哉蓋以君之命行於左右左右頒於方鎮方鎮布於州牧州牧逹於縣宰縣宰逹於鄉吏鄉吏傳於村胥然後至於人焉自君至人等級若是所求既衆所費滋多則君取其一而臣已取其百矣所謂上開一源下生百端者也豈直若是而已哉蓋君好則臣為上行則下效故上茍好奢則天下貪暴之吏將肆心焉上苟好利則天下聚斂之臣將置力焉雷動風行日引月長上益其侈下成其私其費盡出於人人亦何堪其弊此又為害十倍於前也夫如是則君之躁靜為人勞逸之本君之奢儉為人貧冨之源故一節其情而下有以獲其福一肆其欲而下有以罹其殃一出善言則天下之心同其喜一違善道則天下之心共其憂蓋百姓之殃不在乎鬼神百姓之福不在乎天地在乎君之躁靜奢儉而已矣是以聖王之修身化下也宫室有制服食有度聲色有節畋遊有時不徇已情不窮已欲不殫人力不耗人財夫然故誠發乎心德形乎身政加乎人化逹乎天下以此禁吏則貪欲之吏不得不亷矣以此牧人則貧困之人不得不安矣困之由安之術以臣所見其在兹乎文苑英華卷四百九十四
