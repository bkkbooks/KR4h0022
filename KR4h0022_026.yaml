body:
  text: 文苑英華卷二十六宋李昉等編地類二土風賦一首塵賦一首隟塵賦三首泥賦一首土風賦并序班固曰人含五常貴于萬彚剛柔緩急音聲不同繫水土之風氣則謂之風其好惡取捨動靜不恆隨君上之情欲聖唐四三皇而六五帝一六合而光宅覽職方圖山川盡見嵗七月木鐸徇于路命州里舉賢良於我睢陽古之大郡也唯君子能通天下之志也其詞曰吳季札挺生江國自南徂北聽羣樂之存亡觀諸夏之臧慝乃言夫大雅小雅周南召南陳俗夸而奢其國無主韓地薄而險其人不堪燕都渤碣秦負汧隴俠客憑陵世家淫勇顓頊之居衛也桑間濮上務耽聲色太公之存齊也冠帶衣履唯勤組織洙泗之間既當疑作富財力觜畢之下彌重獵弋兾州則紂之餘烈易為讐寇合浦則蠻之獷俗相尚戰鬪吳南有豫章之基燒銅山而煮鹽海楚東有雲夢之區鞭火耕而驅水耨豈若睢陽城臨氐房其地平促其人溫良昔者舜漁雷澤堯作成一作平陽天乙都亳沛公潜梁故地多君子而風有先王富禮樂盛文章魚鹽委積士馬精强亦有顔邑野人居宋而生孔子漆園傲吏隱周而號蒙莊韋氏以占星著族楚宫以揆日居方宓子賤聼訟築臺坐空囹圄巫馬期勸農作宰克正封疆亦有髙辛故郡下邑軍場蔡走定陶之國晉入涉疑作沙隨之鄉與夷出盟於瓦屋郤缺來㑹於承筐聊采綴而為賦叙菁華而未央言其國之始祖微子封於斯土先膺宗周之錫命招納暴殷之餘户宅陶唐火正之監就彭城鐵官之估於是孟諸為澤芒山為圃日尋干戈雲列郡疑作羣伍起臺十仞作室百堵按弓甲飛樓櫓橫釣臺伐金鼓討曹滅衛侵鄫掠魯㑹盟於鴻口之亭繳射於龍逰之浦及其楚國圍急澤門役苦外則睅目而歌內則析骸而哺妖星去國所移者三怪石隕空視之則五其後漢分元弟出食於梁景當作文帝則錫茅而建社文當作景帝則肅桂而稱觴由是綵艇盡樓鋪鴈池以千里蘭軒竹閣澄猿巖而四起徵廄馬於邉徼選宫人於街市千乘出車百金練士煌煌煒煒而軍容備矣南面稱霸而朝天子若乃秦名碭郡禹作豫州城池競於春色車騎溢於川流惠連則詠南山以作賦長卿則背西蜀而來逰入瓜亭而避暑臨榖孰而迎秋吊仙人於蒙邑祠閼伯於商丘想華門之瘈狗歎梁野之妖牛並忘歸於此地充近侍而淹留别有忠臣壯士貞夫孝子五侯競立三王俱死英靈遰見商榷未已雖埋骨於黃塵俱列名於青史當今奄有萬國承平百年化被則如春露之沾草文同則若夜星之拱天惟茲都之宏壯比列土而居先屬城有師何代無賢伊昔全盛莫之與競食客駢闐諸侯聘命旌斾互出臺殿交映忽瓜剖而豆分若烟收而雨竟已矣哉中則傾兮滿則缺隂靈起兮陽精滅始看春樹歇芳菲已見秋源漲沙雪自昔雄材與壯氣莫不埋恨而吞咽七十里之城郭仍在一千年之綺羅都絶京兆杜公久逰關東臨少昊之秋月過梁王之舊宫食水土問人風執官曹而正直抱身鏡而清通識寶者不遺於草澤懷材者喜遇於良工但能任土而作貢則我梁國之不空塵賦并序謝偃余執性介直動多違忤茲讀老子至和光同塵竊有慕焉因而賦之伊大噫之煽物氣無擊而不揚惟茲陳疑之宜昧何動息之順常若乃寄形大飇託質厚地倐爾而往忽焉而至乍徘徊以上騰或飄颻而下墜起彼集此不失厥位一作類居無不安涉無不利似逹人之權理任逍遙以自肆若夫隂風發陳雲屯鼉鼓震紅旗翻千乘動萬騎奔中原以之黯色白日為之晝昏其興也勃其息也漸或聚或散乍舒乍斂細不可拾輕不可掩蒙籠篋笥羃䍥茵簟隨時不競應物不違值細雨而暫息逢輕風而復飛靃靃靡靡氛氛霏霏將晨軒而並出與暮蓋而同歸任動靜而無纍似識變而知機若夫拂珠履生羅襪積菱鏡而鸞沉下雕梁而歌發散瓊臺而類粉布玉階而似雪蒙鳯輦於銅衢翳龍媒於金埓有動必發無空不遍出入青瑣逰揚紫殿流細影於回裾亂浮香於舉扇隱洞房而難覩因隟光而可見既洋溢若浮煙又散漫如流霰至如化衣京洛錬石仙家色侔雨壤影雜飄沙逐奔踶而起亂隨驚輪而飛斜近則昏阡蔽陌逺則晦景韜霞疑竊食於顔子先甘餌於𤣥蛇惟紛吾之孤介驟萍流而蓬徙既守遇疑作愚以用直每受訕而招毁屢空范丹之甑時卧李恂之被未齊物於莊生庶同塵於老氏隟塵賦以不依光末難見微質為韻蔣防惟隟有輝惟塵是依微眀散亂若動如飛殊向晦以宴息類趨明而識機不逐大車寧發詩人之嘆無昏廣陌詎緇逰子之衣觀乎杲杲初陽沉沉暗室纎光乍進爰委其質忽煙涵而霧貫每延風而寫日透綺帳而偏眀暖丹楹而乍失不重乎金屋不貴乎華堂隨明則著在映而彰代皆擇其居我則不辭於處隙代皆異其志我則不厭乎和光似有情而聚散若任理以行藏漠漠如流翳白駒之逸影濛濛不息起清唱於雕梁惟深惟微于閨于闥來不可止去不可遏語其志也流形似競於分隂語其微也弱質已侔於毫末豈不以循其隟襲其輝洞幽房之曭朗籠踈牖之霏微道或未行歎浮沉之異路時而後動任韜晦以同歸散漫回環空濛蒨練謂醯雞之乍覩疑野馬之潜見不爭鄰女之光不雜寒階之霰故知委范甑者志有所未安感孔顔者時有所未歡處沉冥而匪異辨疑似而愈難曷若因孤光而有託附影流而為觀者哉所謂暗而能彰虛而能受望彈冠而自必騰清路而何不幸承命於光塵賦斯文而藉手第二同前韻楊宏真隟有塵兮則惟其常日緣隟兮亦孔之彰何在隂而滅彩能委質以和光藹若成規任隟中之小大紛然無緒隨日際以悠揚觀夫熠熠孤光霏霏素質盡方圓之所至滿虛眀而不溢不灑不掃宜靜以探微或煦或吹則動而逾密何羃䍥以可久混空濛而為一一㸃凝輝異出同歸豈開簾而霰入疑向牖之蟲飛其虛其徐有若無兮漠漠不皎不昧散而聚兮微微既不足以凝榭又何虞於化衣想夫向晦長存匪陽不見的爾東去忽焉西轉嗟栁絮之從風訝雪花之見晛翔而不息安即為難挂髙棟而將晚留空隅而助寒疑琢玉成環環中屑墜若窺壺入洞洞裏雲殘美纎姿而無隱雖小道而可觀原夫自託於空而隟能善誘無求於日而隟以虛受察之昭精攬之盈手同白駒之滅沒非野馬之紛蹂逺窺濁水斯自異於浮沉仰觀歌梁必坐分於妍不美其含華有耀委照無違想剝廬之斯衆知舊館之猶稀安寢之堂就餘光而若在偷光之壁尋微燭以相依何異暗室無欺眀誠未逹伊若質之隱見在無私之與奪儻髙鑒以吹噓願飛翔一作揚於天末第三同前韻趙蕃日入空隟塵生夜光嘉的的以初引見冥冥而自彰乍拂圓輝積纎形而散亂時搖輕吹翻弱質以悠揚洎夫託彼耀靈起茲虛室恆紛空而色碎每燭幽而景密仰孤光之未及猶在暗而效質由是亭亭旁照羃羃斜飛必炯爾以賦象終飄然而相依故所以臨素壁隱清輝若下歌梁方凝姿而漠漠如驚陳榻幾引耀以霏霏是故當皎皛以自飛引虛光而將扇振遺芳而交集流細影而倐遍散乎幽處非厚地而不揚透彼無間庶髙天而可見爾其晶眀下射杳靄中攢景熠熠以將盡視規規而尚殘及皛輝之餘斜分稍易當冥濛之際仰望誠難至若窈窕孤懸熒煌相蹂靜對幽闥閒臨虛牖窮隱見而不讓隨方圓而可久若然者則混而同貫自得審於浮沉浩以相鮮孰可辨於妍不是以杳如有待紛若無機穿棟宇以光小拂簾櫳而色微片影方呈似鑿幽人之室輕文靡定如緇逰子之衣故其餘照乍沉纎埃旁逹既在隂而不昧將耀質而難奪亦何必越茫洋散空濶願依大厦之內永寄流光之末泥賦并序鄭惟忠語曰等級懸隔有似雲泥然雲髙則髙矣如其不義猶為夫子所輕故曰於我如浮雲泥卑則卑矣苟不可棄且見莊生所重故曰曳尾於塗中吾少也嘗覽左太冲詩曰賤者雖自賤重之若千鈞感斯言之有徵故為泥賦嘉鴻爐之造化物無象而不甄惟茲泥之為質諒稟之於自然雖體潤性柔而名卑質賤不同塵以苟出必感澤而斯見信厚地之所生匪膏雨而不變同賢良之韞櫝候聖明而方薦若乃花水行落莢雨將餘交衢蓄潦曲浦含汙一作淤望之疑實即之也虛動而為有靜而為無苟具形之所跖必觸類而圖諸託龜文而成印寫鳥跡以為書蹤發追風之馬轍閉流水之車於是陶鈞賦象刻削成器固應用之無方任良工之所肄順規矩而畫一循制度而無二裁無不成擬無不類以土為質以水為位位去質沉復歸乎地彼木偶之漂泊萍流之自恣推移兮莫識其始終泛濫兮莫知其所至若乃藴凋草於閒館含芳樹於禁闈不緇白玉之彩徒混眀珠之輝帶晴牛而暫落逐春燕而還飛何茲物之無識亦應命以知機本乎形而入用乃委質以合所塗城則踈勒解圍封關則崤函致阻及其見棄形晦跡淪無勞切玉之劒自落成風之斤體伊泥之應變時可同乎人志類明鏡之受物若洪鐘之虛已既懸絶於白雲徒隱淪於緑水伊吾人之菲賤竊亦有感於斯矣文苑英華卷二十六
