body:
  text: 文苑英華卷四百十一宋李昉等編郡牧二諸州刺史授竇𢎞餘加官依前台州刺史蘇莊除鄧州刺史等制杜牧勑朝散大夫使持節台州諸軍事守台州刺史上柱國竇𢎞餘朝議郎前使持節處州諸軍事守處州刺史上柱國賜緋魚袋蘇莊等南郡盜作而一作時蕭育拜河南政美而寇恂留為人擇官因重而撫集作因撫重之考於兩漢行古道也𢎞餘廉使上言父老有請其為政也長育多方惠訓不倦凡設教令皆有科㫖莊任南康悉心為理謹身律下節用愛人南陽古都近者小擾臨海越俗尤惜良吏就加起拜各協所宜仕至二千石可庇人矣無異文律不自貴重副疲羸之望者須念終始坐狂愚之罪者勿理深汚各膺寵祿無忝分寄𢎞餘可檢校太子右庶子餘如故莊可使持節鄧州諸軍事守鄧州刺史散官勳賜如故授李暨絳州刺史魏中庸亳州刺史曹慶威逺營使等制杜牧勑中散大夫使持節亳州諸軍事守亳州刺史充本州團練鎮遏使雲騎尉賜紫金魚袋李暨等昔貞觀末遣孫伏伽等二十二人各以六條巡察郡縣以能進者止二十八人獲死者七人流竄黜免僅千百輩以太宗皇帝上聖憂勤之切百執事奉法公謹之心守臣為奸如此之衆况今黜陟久廢仕進多門緬思疲人每渴良吏牧守之念豫常軫懷暨實文士出典兵郡不薄為吏愛我百姓盜賊奸宄寢而不作鰥寡孤獨皆有所養中庸再分符竹聞立善政凡為理者皆髙仰之今用已效之才各委共理之任簿書刀筆俗吏云集作事耳慈惠教化君子宜之二者較然爾欲何取慶乃身帶兩綬兵分禁營得佩牛刀立於交㦸嵗有鄉里之譽克肖友悌之風百里長人在王畿內各思答效無忝寵榮可依前件授薛淙登集作鄧州任如愚信州虞藏玘卬州等刺史制勑朝議郎前使持節坊州諸軍事守坊州刺史薛淙等仲尼對魯哀公曰人道之大莫先為政漢宣帝曰與我共理者其唯良二千石乎念先師賢帝之言思疲人良吏之選夙興夜寢不忘於此淙以文科入仕命守邊郡屬當伐叛兵於其郊處劇不煩事叢皆辦如愚進以門子屢為長吏其為政化可差古人藏玘與逢閲官簿而頗多言理名而亦著紹元嘗聞謹慎可宰百里已所不欲勿施於人無忘格言副我憂寄可依前件授鄭液除通州刺史李象集作蒙除陳州刺史等制勑朝議郎守太原府晉陽縣令上柱國鄭液等今之郡守為人師帥宣上教化者也以液久在官途嘗宰大邑聞其為理人歌舞之以象執殳前驅豫之雄也光祿護塞居延視胡虜不敢窺士爭為死各委分寄實曰遷升通州雜以華夷淮陽兩有兵賦爾其往哉今用誡爾為天子之守臣作百姓之長吏言於仕進可曰顯榮夫君子之道先有諸已後求於人茍能律身始可檢下勉詳詔令用謹理行從規始以門子入進恭謹無尤自州佐而升在朝班列五尚以集作而職於三服亦為良遇無忝官常可依前件授王晏實齊州吳本初巴州陳珽集作侹下同渝州刺史等制勑正議大夫前使持節淄州諸軍事守淄州刺史上柱國大原縣開國男食邑三百戶賜紫金魚袋王晏實等俟善政而後用或懵集作蔑無所聞滯序進之常途則怨生於下古今政柄患斯二者晏實本初珽等三人入仕年多亦嘗為郡聞無悔咎集作吝是熟詔條濟南跨河有兵有賦巴渝夷俗慷慨豪健形於樂曲爾其往哉古人有言曰豫茍為善誰敢不勉身率以正孰敢不正欲謹理行在於廉平𢎞宗清慎有餘王屬咸為美秩銖以文學嘗佐賢侯作掾京兆亦曰美仕皆有官業慎無自薄可依前件授郭瓊渠州郭宗元興州等刺史王雅康建陵臺令等制前人勑太中大夫前使持節文州諸軍事守文州刺史兼侍御史充本州鎮遏使上柱國郭瓊等潾山順政僻處山谷罕知文律易為欺奪瓊與宗元守郡宰邑聞無悔吝爾其往哉仲尼曰正身而人正欲善而人善撫我疲俗宜遵格言茍或不臧貽爾之戚雅康入仕嘗在班列青宮贊導陵邑守奉若非謹慎不膺斯任可依前件授吳從蓬州賈師由瓊州蕭蕃羅州刺史等制前人勑中散大夫前使持節栁州諸軍事守桞州刺史上柱國賜紫金魚袋吳從等地逺京邑俗雜蠻夷不知文律易為欺奪朝廷選置多無名人小則抑鬱不伸大則聚以為寇蓬緣巴徼其風忿徑瓊處海外在兩漢時往往小反羅居百越溪洞深阻咨爾三吏比者為郡亦報有功勿以荒服侮我疲人或異詔條必置厥辟稍當叙進優以上佐茍有聞見無忘裨助可依前件授李褒刺史等制錢翊勑李褒等醫一郡之疾苦既藉良能理四方之滯寃必資明慎二者生人之本也深詔執事精其選求以爾褒瞳洎荆或清識雅裁為時雋才或檢操修身纍居繩凖所至必留其風範當官克勵於霜標而承休前理蜀川頗聞嘉績是可以分我符竹光于省闈虢略巴梁地清俗富刑曹粉署務劇望髙逺副分憂勉思伏念褒可虢州刺史韋瞳崔荆並可刑部員外郎承休可果州刺史授傅德昭羅州刺史裴昶維州刺史趙贄崖州刺史等制勑具官傅德昭等建隼在旟畫熊當軾以物彰貴出守者兼而得之故用武以來惟功是賞厚為寵報多在勤勞以德昭淬礪雄鋩利若太阿之劍以昶展張徑力强於繁弱之弓以贄馳騁茂駿比於渥窪之馬而皆藏勳有籍秉節無尤既當行賞之倫宜受分憂之命勉為善政無病逺人可依前件授劉玉新州刺史劉潜南五州防遏使髙州刺史制勑具官劉玉等傳曰夫舉無他唯善所在吾閲二帥臣舉知之狀善則可甄而天下諸侯咸當共奬王室有以忠而告我我必信而與之以玉勇望明堂用苞武庫訓士則專於齊一理人必去其煩苛嘗涖南康且留遺愛以潜好謀不惑任智能通仍懷恤隱之心頗慕狥公之節因以牧養必致惠利是以復委詔條兼資禦遏或進寵移之秩或臨舊理之邦以玉之勇主於任以潜之智立於事則吾南極之地又何憂乎黎庶哉可依前件授成希戭忠州王進誠嚴州刺史等制前人勑具官成希戭等泝峽而上踰嶺而出其人多處險而錯居處險難制錯居難齊非嘗試其才素習其俗未可為其理也希戭以敏知變而不矜雄勇之材嘗試於忠人皆便之統帥上言乃命真守師長之秩諸侯所榮進誠自戎入華久處遐徼之地習南方之俗思還其居勳師舉之刻印而當吾委寄咸被寵光處險錯居各懋為理可依前件授陵州謝曈兼御史中丞前舒州司馬倪徽端州刺史制劉崇望勑某官謝曈等欽惟漢宣帝以英主御無事之朝尚思良二千石以之共理伊豫冲昧適丁艱難每以一麾假人既重且慎每聞謝曈以勇誅暴而去害以義利物而移風儻願得之於一年宜用試之於千里聞爾倪徽久從進宦皆著任能委以方州冀為良牧吁含哺鼓腹是安人之謀留犢懸魚乃潔已之操惟一二之事皆古之賢刺史所行以為爾資庶洽豫意有以憲承寵官攝之任貂璫遷刺史之班豫於疲黎無所愛惜吁往哉可授鄭璩等諸州刺史制薛廷圭勑具官某等揔六尚於瑶墀分一麾於劍閣時之妙選我有人焉以肱代濟科名業傳儒素弱齡勤苦壯嵗邅回本推讓以待時竟漂零而從宦凌雲之稱徒見譽於公卿栖棘之悲且未伸於霄漢以璩聮芳鼎族歷試宦途使星屢應於旁求卿月再當其茂簡朕方將左蜀坐委信臣言爾有材可使共理亦聞操剸雅適變通俞其奏章是乃良牧惟兹殿省及爾郡符勉承刈楚之恩各勵業官之志眷言郡政在去煩苛俾我逺人再蘇皇化在璩之此行也得不勉歟可依前件授李充等諸州刺史制勑具官聞爾充公相令子敦書業文有德守行科第好爵公論許爾如拾地芥而孝於事親志在祿養束書投筆甘從下僚縉紳之倫服爾異行逼之名器其心確然且曰親念其兄官未逹采蘭負米願悅晨昏而允祁節著勤王功髙捍患心如皎日節貫秋霜屢委郡符猶同畫餅忠臣孝子朕不敢忘勸善奬功於是乎在海隅之郡各狥乃心嘉我逺人今得良牧勉於從政豈俟訓詞各敬乃官無忝休命可依前件授梁思謙龍州刺史竹文晟成州刺史等制前人勑成紀要衝江油奧壤皆為重地今實優賢擇其守臣必有所謂以爾具官梁思謙等負通變之材藴縱橫之術見可而進頗習於武經聞善若驚暗合於儒者或從奏薦或恤滯淹戀我者移其一麾致之近地阻兵者換其五馬惠彼疲人各俾分憂勉思布政清賢繼踵惠化洽聞茍奉成規是為良牧惠兹􅑏獨往歌袴襦文晟思謙服我明訓無忘勤恪戒於煩苛黜陟幽明典憲斯在五兵五教仍以假之可依前件授朱謙等諸州刺史制勑朱謙等以謙一心許國四面受敵忠勇既完心城甚固而陽言從征戍亟效勤勞淹留屢變於瓜時辛苦未歸於汶上惟鋌言罷百里承之一麾亦聞政聲可使共理朕每思逹聰明目以臨御寰瀛仗豫有土之臣為我求人之瘼樂得良牧惠兹遐方並俞奏章各委頒瑞惟爾謙等欽豫訓詞罔難􅑏婺罔冒貨賄務遵典憲阜安逺人天聽甚卑愆則有辟可依前件授翟州刺史張績等加官制勑鄜之連帥以金紫光祿大夫前翟州刺史張績閩之守臣以銀青光祿大夫前新州刺史虞戀來告我且言績等求瘼分憂居其所部訓戎蒞俗政有可觀欲人聳求理之心請我行陟明之典兹為急務聞斯行諸邦教夏卿國之崇秩爰詔執事分而授之咨爾二臣膺我並命循名責實得不勉之可依前件授王宗夔宗韜卭漢二州張無息蜀州刺史等制勑廣漢上腴臨卭古郡眷求牧守允屬忠勞具官王宗夔等或鶚立轅門或鷹揚玉帳負偃革銷金之術藴經文緯武之機贊我藎臣鎮于全蜀既練軍志仍通政經干將溢匣而有聲騏驥追風而絶跡今俾爾分吾憂寄養我黔黎爾宜拔薤推心掛魚潔已勿為重斂戒在䖍刑務復憲章無取禍亂允祁奚之內舉撫文翁之舊封敬服訓詞勤恤人隱而無息亦佩專城之印往俞連帥之求無忘酌泉勉務為政黜陟之典朕不敢私惟爾三臣礪乃一志與我共理期乎有聞敬之戒之自求多福可依前件授尚汝貞涪州刺史朱塘恩州刺史婺州刺史蔣瓌檢校僕射等制李磎勑朕思報功臣以郡事念逺人以司牧惟是二者寤寐疚懷具官尚汝貞在先皇帝時扈鸞駕功髙建隼旟布政非時見代可為愍然具官朱塘將兵之材號為嚴肅勞績聲著罷免嵗深惟涪與恩逺郡之沃饒者也資人以優爾亦資爾以救人且以𤣥武之尊夏官之長各從官叙以寵崇之具官蔣瓌婺人言有政化懇乞增秩端右之命以狥其請各堅爾志無或變渝可依前件授康君立等諸州刺史制勑康君立等夫文吏以儒術自進而牧人養物固其所也而論者猶或嘉之而爾等各以軍功逹於郡政可謂難矣然武有七德而安人和衆在焉得非皆逹其義耶深惟勸能之方遂允為真之請可依前件授朱誕等諸州刺史制勑朱誕等並干鏌竒鋒崆峒徑氣或忠臣薦逹播於文武之間或軍功著明迥出輩流之右升遷委任無所偏頗各竭爾才以稱吾意可依前件文苑英華卷四百十一
