body:
  text: 文苑英華卷八百七十五宋李昉等編臺攀龍臺碑一首攀龍臺碑李嶠粵若太極始搆氤氲含五氣之精元貽既分鼓舞立三才之位由太朴而觀成象自流形而臻物備因乾坤之變化相后辟之經綸則知肇創雲雷非一聖之事奄荒區夏由浸昌一作崇之業是以岐酆受命武王戢商野之戈譙亳開基文后遷漢宫之鼎若乃提六合之樞紐扣二儀之鐍鑰日月既出方利闕於通三風雲未知一作和尚勞謙於初九蓄宏圗於緣鶴用伊尹事鵠鶴通用之邸垂慶緒於斷鰲之運屈伸應物而無纍於時進退隨方而不違於道非聖人之睿智其孰能與於此乎大周無上孝眀髙帝諱某字某太原文水人也其先出自周平王少子有文在其手曰武因以姓氏居沛之竹邑晉尚書僕射開府儀同三司薛候陔其後也六代祖洽仕魏封於晉陽食采文水子孫因家焉夫其受氏中古開階上業軒轅以青龍進駕配永循機少昊以𤣥鳥名官修方正度髙辛之首戴干盾后棄之躬勤稼穡或四妃分孕隨肩執天下之圖或三聖連衡踵武司域中之契宗支繼眀而襲嘉帝載重熙而纍洽雖七百休祚暫遷於質文而九王尊名復光於歷數自非慶鍾長發神應逺期人鬼贊其謀猷乾坤扶其統緒豈能出入百代周旋萬朞至道淳風未昏而已旦洪爐大寶既舊而還新家纂迎日之符門傳配天之業環三辰於斗極不足比其崇髙灌四瀆於滄溟未能儔其深逺若夫振氓育德屈道不王舄奕於昭穆之間頡頏於公卿之位蓋詳諸惇史可得而略髙祖成皇帝宏才碩量經文緯武曽祖章敬皇帝達學通儒金聲玉振大父昭安皇帝心冥道德志挾九區顯考文穆皇帝理㑹幾神名髙四海帝即文穆之第四子也母文穆皇后嘗祈晉祠於水濵得文石一枚大如燕卵上有紫文成日月兩字異而吞之其夕夢日入寢門光耀滿室巳而懷孕遂産帝焉及載誕之宵夢人稱唐叔虞者謂后曰余受命于帝保護聖子驚寤而帝已生眀日紫氣氛氲覆冒其城一無此字上俄而化為五色髣佛若文繡之衣左右親賔莫不駭異及長龍顔方靣身長八尺背有黑字象北斗之形昔者禱于郊禖拾卵而興王業遊乎溫洛吞珠而立帝期疑譙宫誕而青氣發祥猗殿生而丹㬢授彩亦有御蘭感夢皇天之命伯鯈剪葉開封上帝之名太叔咸躋未然之兆竝獲將來之應猶不能比蹤神貺埓美聖符况乃龍顔武肩帝王世紀文王龍顔虎肩有含良春秋元命苞文王四乳是謂含良之骨法載鈴懷斗似髙密禹之字也出世紀之容狀是故生而聖知幼而聰達敏給於論天之始狥齊於對日之初甫及勝衣究緹緗之頥疑作賾逮乎束髮殫鞶帨之巧淳深孝悌之性暗發天機𢎞裕仁慈之風匪因師習太后嘗被重疾不愈經時帝扶侍起居品嘗藥物僅踰蒼舒稱象之嵗未及子建誦詩之年履不正絇衣不解帶及丁荼蓼號慕嘔血七日無水漿之膳三年罷鹽酪之滋扶杖而行殆至毁滅雖孝文之服勤纍載髙宗之諒隂三祀無以加也常有大節罕營小方志立功名而不求茍得心重氣俠而動循常憲道德深富規模𢎞逺曠心將江海齊逸宏量與宇宙同寬是以單父通人識其殊異之表大梁竒士許以霸王之略文穆皇帝一作后則哲之鍳恆易其難惟幾之神每前其用嘗從容謂諸子曰吾家纍仁千祀積德重葉餘慶所及宜在子孫今觀汝曹悉王佐才也然草創經綸之際聖賢馳䳱之秋騰嘯而馭風雲叱咤而成功業其在士彠耳以如天之聖用知子之眀隱括所在錙銖不繆豈如趙邦謀嗣唯驗於藏寶楚國擇才更憑於埋璧及文穆之棄代也帝廬于墓塋負土成墳手植松柏喪紀之節復如居穆后之哀有芝草生于廬前羣鳥一作雀數萬銜土集于墳上山中舊多猛獸行李艱阻至是皆逃竄絶迹時人以為純孝之感焉隋髙祖雅聞帝名屢加辟召友人同郡叔孫賀博通之士也隂陽術數無所不該謂帝曰公狀貌非常但玉埋未發耳終居人上勿為事先帝亦知隋統將終乃稱疾不應漢王諒以戚藩之重作牧太原乃親率官僚造門致禮深加敦諭逼令進發帝不得巳起應眀敡至仁夀宫屬隋文帝寢疾有敕館于內史省以須後命帝髙名宿望傾動當朝承風仰流揖拜無地衣冠如宗海之赴士庶均在田之覩司空觀王雄左僕射楊素吏部尚書牛𢎞兵部尚書栁述咸與抗禮延登首席中郎之下迎王粲計吏之長揖桓逢千載風流復存斯舉帝風儀偉麗占對詳眀朝端改容左右屬目雄等素欽才辨欲探閫奧爭出異同互興名理而洪鍾有虛受之量眀鏡體不疲之德詞同炙輠應若扣機立定雌黃既堪羸疑后前膝坐離堅白足使田巴杜口觀王既特相欽慕牛𢎞亦深加敬異竝虛心降節投分申交而楊素負才恥已不若雖外示接引而內懷猜忌乃私謂觀玉牛𢎞曰吾觀武氏風骨實有英雄之度今太平無事安用此人不如除之王等不答而桞述又潜遣相工視帝知之深不自安㑹隋文帝崩因移病出外素等以為僞迹從此欲構禍端賴觀王牛𢎞營護得免漢髙以英威冠代取忌范曽漢書作增劉主以倜儻出羣見疑曹操比方前事有若合符帝既脫網羅深自隱匿雖室家追訪猶見碭山之雲而㕓里去還下一作不就丹陵之日辭杜城之弋獵罷雷澤之魚釣獨覽前志長懷古人有行髙於時有行濟於物輒慷慨擊節殷勤留想便欲冥道契於一朝託神交於千載塤箎唱和自多跗蕚之觀疑風景逰遨無乏林泉之興嵗將晏也龍蟠鳳戢者久之大業七年煬帝徴天下精兵㑹於涿鹿將親授節鉞以伐遼左旌旗亘於千里轉運盈於萬軸閭閻失業郡縣不安帝謂諸兄曰夷狄不賔肇於上古自當置之度外耳未有紆萬乘而讐小忿擾羣生而赴非急夫兵猶火也不戢自焚禍亂之萌從此始矣既而六師魚潰九野鴻飛竟兆天亡之徴卒成土崩之勢帝於是慨然有志方思濡足乃討論兵法商確將率上自黃帝下訖有隋考其謀略機權稽其成敗得失竝列名氏為之讃論殫魚鈴武韜之術究𤣥女黃公之符勒成一家凡三十卷名曰古今典要制髙秦肆事軼魯門可以刻祕牒而升一作升廟堂可以藏名山而懸日月聖人之心情可見矣天下之能事備矣于時兵戈屢擾饑饉荐臻英傑懷逐鹿之心氓黎有瞻烏之懼期謝公之出處以卜興衰待韓王之從就而論勝負與能之託時議攸歸長吏猜焉數令相覘帝自惟人望懼發禍機欲混迹而同塵且韜光而向晦乃出應期命為河北道總管府騎司參軍智周變通道兼語默戢大鵬之舉遂集榆枋降應龍之神還遊塪穽楊𤣥感之作亂也後主方重討遼東𤣥感進圍洛陽官兵頻戰不利城中大駭議欲出降時帝在東都懼其失計遽往見留守樊子蓋為陳用兵形勢制敵權宜論𤣥感必敗之徴說都城可守之䇿子蓋大悅拜而從之爾後軍謀一皆咨禀卒擒𤣥感帝之力焉後主歸自遼陽子蓋方之行所邀帝同發擬相推薦帝知後主猜忌不願多取功名深自謙撝發言懇到子蓋心悟嘆息而罷於是沉疑作泛以軍功奏授正議大夫遷晉陽公宫留守司鎧參軍無忌之克敵讓封仲連之立功辭位比我休德曽何足云帝既博通羣書兼善衆術拂龜端䇿未勞詢於詹尹推歷考度無假訪於山稽大業十二年後主幸江都宫帝私謂諸兄曰此行也不復還矣繇是鄉里宗族勸帝起義帝每自推算知時命未符又念叔孫賀之言故抑而不許初李密為楊𤣥感謀主𤣥感不能從及聞帝與樊子蓋運籌所揣皆如密意乃歎曰天下竒才也遂遣書招帝帝笑而不從諸兄素聞密名勸帝帝曰密雖有才氣未能經逺欲圗功業終恐無成㑹唐髙祖安撫太原便留鎮守帝觀之曰雄傑簡易聰明神武此可與從事矣投刺往謁焉賈文和之揣君酈食其之觀將翔而後集可謂明也髙祖亦虛心結契握手推誠周文之得姜牙載以騑服成湯之逢伊尹告之宗廟便應爪牙之任即承心膂之託髙陽賊歷山飛來寇帝從髙祖擊之弧彎六鈞箭穿七札隨手必陷當皆靡亂神兵掩擊醜虜大殱熊山之破赤眉不比其捷犬邑之摧青犢未儔其㒞光武大破青犢十餘萬於野王孫之射犬髙祖嗟嘆賞賜甚多軍師凱旋便過帝宅樂飲經宿恩情逾重其後數過輒宿遂以為常帝嘗夜行聞有稱唐公為天子者登遣尋索了無其人又夢從髙祖乘馬登天俱以手捫日月於是具以狀白并獻所撰兵書髙祖大歡益以自負置其書於箱篋後皆按以從事聞程昱之夢即以為名聽張良之言皆納其策所謂天授豈但人謀髙祖將舉義兵令帝領徒於城內義旗建授中郎將兼司鎧參軍陪斬木之經始奉披荆之締構異中涓之受職同别校之分麾從破吕州進授右光祿師至霍邑隋將宋老生發兵拒險軍不得進羣下多請引還者髙祖將從之帝直入切諌髙祖乃止决機於龍鬪之日定䇿於狐疑之辰笑禆諶之請車同子房之借箸實建王業事符天啓霍邑定拜夀陽縣開國公食邑一千户屠城斬邑既憑帷幄之謀開國承家即啓山河之賦京師平遷光祿大夫賜宅一區錢三百萬綵五千假一作匹灌嬰之頻從征伐始拜大夫去病之纍著勳庸方開甲第釋干戈而論爼豆起桴鼓而立君臣式是儀禮允歸通博義寧元年拜禮部侍郎餘如故儀刑斯在命服有輝肅事南宫雖懋於春典司言東掖更資於夕拜遷黃門侍郎餘竝如故職參持蓋位連負璽茂先之博覽圗籍譽滿玉堂務伯之提正綱維名髙瑣闥録前後功效改封義原郡開國公增邑一千户賜良馬二百匹粟萬一無此字二千石爰膺嘉賞遂啓大邦解漢皇之驂寧比其惠分吳主之粟未齊其寵武德元年拜內史令帝纍讓不受改授納言又固辭乃授上柱國金紫光祿大夫散騎常侍同中書門下三品兼檢校并鉞將軍賜田三百頃奴婢三百人綵物二萬假黃金五百斤别食實封五百户金章紫綬玉鼎黃扉柱國齊元相之班將軍比命卿之服膺上賞而平軍國坐中樞而議文武恩榮兼被時輩莫儔三年拜工部尚書餘並如故差肩八座配象七星以百揆之樞衡參萬機之損益德績兼備聲望日隆于時軍旅猶殷憲章未洽帝盡心翼亮推誠匡輔入有造膝之謀外𢎞匪躬之義興復乎九疇之叙彌綸乎百度之闕頽綱所以克振令典於是畢修髙祖之禮絶羣彥進封膺唐書作應一本作晉國公加實封八百户餘竝如故髙祖又謂帝曰朕在并州之日恆往卿家今欲使卿一門三公用微答主人之意也是日封帝長兄司農卿士稜為宣城郡公次兄行臺左丞相士逸為六安郡公舊唐書作安陸縣公竝食邑一千户歡比連席之舊契均同舍之遊酬德踰於二錢報恩過於一笥闔門受邑寧唯吳漢之子孫舉宗畢侯豈直蕭何之兄弟爾後髙祖行幸常令帝總留臺事兼知南北牙兵馬判六曹尚書相國之處秦中蓋資鎮撫令君之住許下仍參籌畫具瞻惟允是謂國鈞時帝先缺中闈髙祖親為求偶謂帝曰隋納言遂寧公楊達才為英傑地則膏腴今有女賢眀可以輔德秦晉之匹不能加也於是特降綸言俾成姻對髙祖自為帝婚主遣桂陽公主專知女家降六禮於璿樞指三星於金冗魯夫人一作大夫之嫁女卿士送迎張公子之取妻乘輿供帳作儷於鳳凰之兆相從於孔雀之樓伐柯則歡其食魚流行則美其巢鵲是配琴瑟爰宜室家欽若有行即孝眀髙皇后妃也始同媯水之聘終啓塗山之業永言好合若有神靈之契焉憬彼塗泥實惟淮海襟帶全楚咽喉徑越雖孫權故業久黜霸圗而劉濞餘祅一作妖仍多反氣杜伏威初行僣逆輔公祏繼以亂亡泉藪未懲萑蒲猶在帝思俾乂遂紆時哲以本官權檢校楊州大都督府長史賜錦袍寶帶一具爾乃撫之以誠恕經之以權略鈎距暗施既問羊而知馬網羅潜設亦因魚而得鴻降北海之渠未踰期月盡一作勦南山之盜詎假旬時然後商旅安行農桑野次化被三吳之俗威行百越之境輶軒符節之使復下於蠻陬齒革羽毛之琛還輸於王國矣始髙祖之餞帝也期以半年及江湖既平帝將入覲父老數百人詣闕上表乞更留一年頴川之還借寇恂臨淮之重祈侯霸儔功語德彼獨何人璽書褒焉復留鎮撫九年太宗以儲宫統事乃徴帝入朝寵賜頻繁事以殊禮荆河奧壤密邇瀍洛自昔股肱之郡由來戰爭之場飛水初澄雖免鯨吞之患藂祠未翦尚有狐鳴之妖受委共康非賢勿授使持節豫息舒道等四州諸軍事豫州都督賜黃金二百斤朱轓首途吏人抃舞而交謁皂蓋臨府盜賊驚惶而請命傾巢咸附闔境肅然棄㦸捐矛既如張霸之政術含哺鼓腹更似岑熙之歌詠利州都督義安郡王孝常稱亂劍南扇動夷落孝常誅死餘黨分竄劫掠未息朝廷患之太宗博訪羣寮咸以為非帝不可貞觀元年拜利隆始靜西龍等六州諸軍事利州都督郡惟遐徼地實偏陬尋蜀帝新開之途經漢主舊燒之棧渝人賨旅獸駭禽驚帝招輯叛亡撫循老弱賑其匱乏開其降首百城櫜弓而不用羣盜束手而來歸𢎞以善貸之恩赦其既然之罪未移弦望郡境乂安制書褒揚增邑五百户賜珍物服玩黃次公政稱長者裂壤開封杜伯侯動無間然賜書增秩五年改授荆峽灃朗嶽果松等七州諸軍事荆州大都督眷兹上流實惟舊楚接荆臺之跨跱連渚宫之形勝一都之㑹昔號難治帝仁化久覃威名先著褰帷而十部咸肅閉閣而萬殊皆理寬力役之事急農桑之業狴圄空而京坻實姦回息而禮義興市不倚門田多讓畔蒸人罷訟詠河上之甘棠遊女無思歌漢濵之喬木流化實同於二陜宣風寧止於六條先是微屬亢陽頗傷時稼帝乃親往長沙寺迎阿育王像而祈焉俄而油雲勃興大雨洪澍倐忽而四境滂霈須臾而千里霑洽申䖍未踰於晷刻降福遄同於影響一州歎駭稱有神眀是知元符未臻且列於公侯之位帝道潜契實冥於天地之德昔者姬文事紂行化始自於江池晉武平吳樹勳實由於荆土誠作霸之基址乃興王之窟宅况復風煙氣色樓臺邇翔鳳之川邑里光輝阡陌通卧龍之境爰紆不世之主將建非常之業於是乎百物呈瑞三靈降休遊殷朝之白狼止酆尹之丹爵含牙之獸遁迹於殊鄰同穎之禾垂苖於近甸惠愛之德著矣皇王之迹兆矣然後白氣流而聖人感黃河清而聖人生奄有六宫遂荒三象化千乘而為萬國撫四海而成一家起藩屏之㑹昌致寰瀛之景福大矣哉九年唐髙祖崩帝奉諱號慟因以成疾太宗遣名醫診療道路相望醫以病候將深勸令進藥帝因舉聲大哭嘔血而崩敬想忠義之風𬗟惟臣主之分求諸古昔未之聞也時年五十九遺令歸葬文水因山為墳穿足容棺斂以時服灞陵之不藏金寶紀市之無變㕓肆惟聖達節千載同風於是具僚失圗闔境哀慟農商號於野士女哭於衢三月停竽瑟之音冉期深考妣之慕寧止東城故老安歌對陳氏之祠復見南峴吏人垂涕望羊公之碣太宗聞帝崩狀嗟悼久之一作良久曰可謂忠孝之士乃命史官書之追贈禮部尚書配食太上皇廟贈物八百假米粟八百石官造靈輿送達故鄉仍委本州大都督英國公李績監護喪事緣喪所須竝令官給遣郎中一人馳驛吊祭諡曰忠孝公禮也天皇大帝嗣膺乾厯光闡帝猷思盛德而有懷念元功而載佇永徽元年改贈使持節都督并汾慈嵐四州諸軍事并州大都督餘竝如故聖上肇開隂耀正位坤元永徽六年又下制贈司空如故顯慶元年又贈司徒改封周國公食邑四千户咸亨元年贈太尉兼太子太師太原郡王食邑五千户以文水三百户充奉陵邑置令丞已下官夫源流廣而津𣲖長枝葉繁而本根茂况立德之祀奄百代而全昌謀孫之基冠千齡而首出與夫東漢外戚西京異姓不同年而語矣文眀元年皇帝臨朝追崇為魏王食邑一千户永昌元年羣臣以名號不稱抗表固請於是上尊號曰忠孝太皇及鍾石變聲謳歌有奉皇帝欽受終之茂躅御惟新之景命改正朔而營宗廟定郊丘而立社稷聿尊故實光啓鴻名乃奉册尊大皇為孝眀髙皇帝陵曰昊陵廟曰太祖推大功而增大號奉先之義存焉享皇極而配皇天敬始之誠備矣仍以為千人起邑名未光於寢園萬户陪陵班僅齊於令長恩廣崇陽之稱更增奉眀之秩聖歷二年乃下制改昊陵署為攀龍臺加置官屬佐吏灤水將九河齊濬橋山與四嶽爭髙然後肅敬之儀旁絶於恆數尊崇之志上申於罔極蓋天子之孝也庸小人之可談乎初晉陽懿公既受田於文水有紫氣發於其地上衝太微占者以為當有聖人興於此邦至是而天下宗周符於所占矣帝神氣和雅天姿英邁率爾坦易而無廢務儼然威容實可親呢俾好賢而樂善博識而多聞遊談者空慕其風鑽仰者不知其度若乃觀文察理覩奧鈎深推六畫而見三才覆四營而窮萬象斯乃皇風之所以際天人也敦本抑末納祜蠲邪探祕術於九門致成功於六府斯乃大帝之所以慈氓庶也語竒正縱橫之術論帝王仁義之兵教貙武熊羆作舟車器械斯乃軒后之所以張武功也溫良濬哲惇懿文眀觀象乎藻火之衣聽言於宫商之律斯乃媯水之所以昭文德也聲為律而身為度勤於國而匱於家沐雨而櫛風卑宫而菲食斯乃夏王之所以求諸已也引罪讓德持尊下卑虛襟於藥石之言屈體於芻蕘之議斯乃商后之所以聽於人也不傲不逸多藝多才求賢審官興法立度通刑政之要達禮樂之情斯乃周公之所以勤王事也宫牆罕測性道難聞筆削所裁羣賢無措言之地憲章所綴百代成不刋之式斯乃孔宣父之所以正人倫也兼列聖之純懿總百王之事業時運未集東臯輟鴻鶴之心天衢既亨北面就人臣之禮似文命之匡虞歷都君之輔唐政終能與時俯仰隨運汙隆居位恆屈其身蒞官必行其道是以參謀帷幄則消薄蝕而殞攙搶助理鹽梅則成雍熙而作舟楫名裕於八能之士德髙於五聖之臣及錫瑞分圭牧州典郡其人變而衆化其政賢而郡美入稱來晚謳歌迎節傳之車出有去思號泣擁襜帷之路豈唯南征而北怨固亦西泣而東悲仁覃於雞犬之鄉澤浸於蟻螻之冗用能摛光表之盛業啓格天之洪緒存膺顯位彤弓開九命之尊歿享大名紫籙登萬乘之貴豈非天道人事祐賢福善之徴歟皇帝念過隙之不留哀終天之罕報欽致孝之前轍一作執仰增名之舊式以為廟堂作頌公業才播於朱絲簡書䇿勳德音不傳於翠琰將謀相質之事更𢎞顯達之躅載紆中旨爰命下臣考泗水之遺風求弇山之故事奉天經而揚詞藻圗帝範而懸金石將使神功睿業配圓象而照臨茂烈崇徽共方儀而永久跪承大命而為頌曰厥初剖判肇有君臣體國經野司天屬人三微遞襲五運相因惟德是輔惟乾罔親其一謙莊斯崇荒侈則替金鏡易失玉儀難繼於皇聖周獨與神契受籙千祀重光百世其二軒謝摯立辛遷稷升岐山光啓鄷水丕承淳耀中缺靈符更興三才奄有八景時乘其三方隆慶基誕生睿德齊聖剛毅欽眀柔克行為天經語成帝則文冠楊史學窮儒墨其四僶俯三聘觀光九重未交劉徹先揖袁逢路險難進才髙不容言辭吠犬退保潜龍其五人忌英雄物疵孤直隨運出處與時消息遂汨泥沙爰栖枳棘擇木候主摶風舉翼其六披荆晉野借箸汾圻霍邑通路秦關啓扉䇿無遺兆慮必先機漢主分食蕭王解衣其七裂壤疇庸升朝致績勳刻彛鼎任司衡石玉鉉調梅金壇秉戚職備文武道光帷帟其八恩洎同胞禮加內主魚貫納幣鴈行分土外館施襟中臺曵組榮被親戚慶隆今古其九三事出牧九卿為守憂一作患人急才屈道資祐淮水卧汲頴川借寇龔遂買牛宋均浮獸其十荆吳異俗梁豫殊鄉德績均被椒蘭共芳歌迎來軸泣送歸艎朝禮斯懋宸心孔臧其十一堯得聖臣納諸大麓舜讓才子止其枚卜况我皇眀兼而韞櫝徒屈時命罔終天祿其十二戢耀南紀遷神北維二分齊德三馬同基漢曲圗像江沱立祠存流美化歿有餘思其十三欽若大君奄荒天位率由禮樂仰尊名器禋郊展儀升壇立諡祗敬巳洽孝思無匱其十四衣冠軫慕園寢加隆裸擇殷士歌留沛童弇山垂裕濟水銘功流德音乎翠琰配貞觀於𤣥穹其十五文苑英華卷八百七十五
