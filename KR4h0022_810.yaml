body:
  text: 文苑英華卷八百十一宋李昉等編城萬勝岡新城記一首東安鎮新築羅城記一首杭州羅城記一首歙州重築新城記一首萬勝岡新城記集作録沈亞之元和九年蔡之帥死其子元濟以其土叛逸掠陳汝之間冬縱兵臨夀春屠馬塘走其守令狐通焚霍丘淮南郡邑大駭民人卷席而居上聞之怒謫其守明年春詔執金吾李將軍馳傳出守之既至收其壞卒聚夀春城使人勞井閭而市貨耕桑之業始復民人莫知復為戰矣八月乙巳乃集無乃字夜引兵南出霍丘百四十里又折而西四十里營於萬勝岡築新城初將度曰吾士卒萍合之衆也易散而難役吾以築壘令之必苦難使寇聞之必襲吾思欲其自用乃召諸將謂曰吾旦日望氣其狀有寇謹備之令諸軍分營連居環回之間十有餘里各視營之所向宜為數堵之垣以禦暴矢耳諸將素竒將軍言歸而亟曉其卒故所命立就將軍與監軍使出周視之集作還以集作至武寧大稱築者之能勞以酒帛語寵其將因曰既已幸周繚之善也他將恥其功之不類乃復興即日而垣周將軍監軍使出具牛酒為勞因士卒之樂又令曰山澤之地其土瘠漓今時方秋浸潦用事謂衆之功難為也顧其集作為垣今日而周明日而壞吾為諸君惜之誠能致其厚則土藏去聲氣色脈力相輔雖霖潦不為患矣築者皆悅復爭為厚及竟將軍監軍使出視之復勞曰嗟乎諸君之能衆士之功也既周且厚始為集作謂其垣今則城矣因自吟曰城乎城乎使其增數仭其集作而飾之寇雖蚩尤寧敢犯我乎遂歸諸將相謂曰乃者將軍之詞得無意其髙耶吾黨亦集作魁字醜其卑矣復增其築於是新城遂具明日果寇來望見皆愕然因至新城傍具集作俱張喉髙言指城上曰為我曹敬謝將軍訖辭而去諸將盡伏寇亦以王覽集作賢董重質營其側拒之十一月戊辰將軍將卒萬餘西渡澗渠上史蔟岡與賊陳自平明至日中進退相延不得合及日側將軍乃謀曰彼必乘暮伺吾還兵擊我必矣於是引兵急切履寇進退數里集作急攻寇寇延退數里乃以精兵分伏其兩隅復自進集作延退間拔其羸老先復令軍中曰皆坐賊之後見官幟有引渡者以為兵怠俱還遂大呼疾馳東下於是伏兵皆奮斷其後賊大潰殺傷千餘生得數十人官卒死者亦數百人是時李時亮為先鋒將使百騎逰擊左右獨五人環馳如轂至賊麾下斬其將王覽集作賢繼轡轉鬬而歸十一年夏髙霞宇敗於隨集作隋唐既謫盡發其卒屬陳秋捕得寇兵盡罷南境之備俱東備矣九月使偏將軍李曜領步卒數百人從險道夜行集無行字銜枚入寇境西過九女原百餘里屠其堡衆三十餘壘又使義營諸將西北境集作傍安陽山破其土附屯戍之衆數十百人招其降民男女萬户得其將二人用之久之朝之卿士以為將軍怠於戰或發其語而客亦有來誥集作語於將軍曰始天下髙將軍之義以將軍兵臨三州之寇謂一舉而取何為久不稱其獲與將軍曰子之望吾非也夫鋤深根者必利其鍤乃吾之部多吳楚耕販之人習於沮澤之上彼魚鳥之性其生也集作矣恇恇如偷見其遊翔之羣非不多也及撫掌而駭之即爭為潰矣而寇亦素難吾名常以精卒待我今驅是於欹谷之間與寇決鬬譬由畜彘之禦窮狼寧有所抗蓋居之嚴城以固其意令旦暮從壁上望見寇騎號呼奔突之狀以熟其目然吾又常喻以風雲勝敗之語集作語之二字以壯所恃如目熟而恃壯及其可用吾伺其利而擊之期於必勝此吾所效也十一年冬詔書促戰十月乙未上遣中貴人來臨視將軍於是圖其陳於帳中令諸將各識其序旦暮擊鼓教士卒為分合圓方之勢備畫所用將軍出客有難之者集作日自建中於今淮夷三叛其間矣雖蒙赦令然未嘗斯須忘戰故介兵人傳其兵父訓之子兄教之弟非戰事不語是寇以將軍名聞天下故集作固不敢犯自將軍西出疆屯兵於萬勝城以控其要濠水而東連次江淮之間郡邑之人耕桑自力展集作輸轉相屬曽不為寇虞此將軍之功也以強計毅誠招其轉禍之人繼來如繩此將軍之用也今將軍不以此為百全之基驅貊越之人身自蒙堅而與必死之寇決命頃刻即萬有一不如集作知將軍之指東土之固將安仰哉對曰此吾以熟於計久矣然吾昔嘗仕於河塞十有餘年集作公字若僂之忘伸也前行始入覲不意蒙寵於過悮使率師振旅吾之力唯其所屈集作指已死效夫馬隨羇而引者也羇之使馳則為之馳羇緩則步安有擇塗陸而避僵蹶哉如有從集作縱之不前銜之不止徒見撻賤之棄焉得延頸踠足以待御且聖上旦暮待績於吾中貴繼至亦吾蒙羇之日也何敢自引於便而已矣遂以十一月庚辰夜漏過四十刻引兵西渡上史蔟收集作牧之下矚賊壘分練集作銖皆察及日中大風從西集作西猛起折幹回幟將軍謂中貴人曰今日之候非其利也願屯兵堡史蔟以伺之中貴人曰某受命視公戰不視公守將軍不得已乃陳中軍為前武寧軍次之左右輔皆親兵戰凡十合會廬宣之軍居間聞戰聲自驚潰失次且遁時賊軍方苦中軍武寧之殺傷幾欲引去及聞廬宣之軍驚潰即分精兵數百徑突所潰以擊之而將軍復與中軍武寧深逐賊而集作西行數十里因與廬宣之軍相棄廬宣之軍先遁去卒無所傷至暮中軍力鬬遂死其將曹惟直張忠信楊渾等及卒死者數百人武寧死者亦數百人還軍新城雖無功者亦勞之以故士卒無戰苦畏叛之患時亞之客夀春得詳其語而書之以備史聽東安鎮新築羅城記羅隱天下自懿考僖皇之後綱領不振龎勛王郢抵􅠅古觸字於前仙芝君長踐踏於後所以齊寇攘臂一噪四海瓦解自爾枝牽蔓引可口而咬其或一壘之不謹一板之不嚴則刳剔之不暇雖十室之邑三户之鄉必壁塹以備之籬落以抗之况大藩之襟帶吾土之繫倚者乎杭之别部舊有八郡之目其始以破山倚旌八將之功所致也而東安主領者今副戎杜君君尋其擒逆朗於京口破從實於毗陵天子寵之拜常州刺史遂付其兵於子弟焉撫於內者曰建思禦於外者曰建徽經度於季孟之間者曰建孚相一作泊君解印而歸淮叛淝偷連壓封部元帥大丞相彭城王始授君以板築之要濠塹之廣袤地里之橫亘皆取則於大丞相一之日鳩其民人相其險易惟帥有令惟汝克從二之日度其資糧卜其力用經之營之厥畫惟稟三之日命其將曰可球汝當從役于杭必能識大丞相意善匠吾事勿令不如丞相指揮曰侔汝工一作王曰溫汝率鐸令等二十一將翼侔以進曰􅀈洎儼汝督防遏備禦二都之士卒以介於侔之左右曰勳汝司吾儲廪謹吾出入城者若有墜惟汝之咎起大順辛亥年秋七月壬戍訖于明年夏四月庚寅蟠東矗西岡連城周一作離連坎周植乎二千五百步隆者就之窪者盈之民不毁擔時不妨務夏五月甲辰司徒犒羣帥于城下若畚者皆與焉不三四年楊行密持淮南節以稱盜豕突猘衝擾我疆境而東安郡尤為其所忌行密藏一作減安仁義之精鋭分田頵陶雅之敢勇以攻東安城樓櫓翔空矢石交迸翊日我軍憑其城斃賊將于城外者數四溝塞塹堙悉以一作其等色自是羣寇不復有圖朔一作南之意是知人非城則無以為捍城非人則無以自固不有城也人何以安不有將也城何以堅于時紫溪一作綏又作湲竄保城火建寧不守靜江無將奔我而活者四鎮之生聚焉噫天下之無事也吾鄉則有河間凌淮一作凖宗一濮陽吳降已下南汝袁不約還朴以文學進天下之有事也吾鄉則君建至于子弟伯仲及諸將佐以武藝稱豈文武之柄倚伏而然後疑作復江山稟受與時消息者乎隱亦嘗以先師之道千名貢府進取未半一作牢九鼎羮沸文既不用武非所習今則老矣髙謝三君杜君以鐫勒見徴不敢堅讓乾寧五年六月二十一日記杭州羅城記大凡藩籬之設者所以規其內溝洫之限者所以虞其外華夏之制其揆一焉故魯之祝丘齊之小穀猶以多事不時而城况在州郡之內乎自大寇犯闕天下兵革而江左尤所繁併余始以郡之子城嵗月滋久基址老爛狹而且卑每至點閲士馬不足回轉遂與諸郡聚議崇建雉堞夾以南北矗然而峙帑藏得以牢固軍士得以帳幕是所謂固吾圉以是年上奏天子嘉以拙政優詔奬飾以為牧人之道其盡此乎俄而孫儒叛蔡渡江侵我西鄙以剪以逐蹶于宛陵徑弩之次泛舟之助我有力焉後始念子城之謀未足以為百姓計東眄巨浸輳閩夷之舟櫓北倚郭邑通商旅之寶貨茍或侮劫之不意攘偷之無狀則向者吾皇優詔適足以自榮由是復與十三都經緯羅郭上上下下如響而應爰自秋七月丁巳訖于冬十有一月某日由北郭以分其勢左右而翼合于冷水源綿亘若干里其高若千丈其厚得之半民庶之負販童耄之緩急燕越之車蓋及吾境者俾無他慮千百年後知我者以此城罪我者亦以此城茍得之於人而損之已者吾無愧與一作歟某年月日記歙州重築新城記楊夔天祐丁卯嵗月直辛亥有星自積水流入于輿鬼知天者曰輿鬼之宿是為鶉首於辰在未之衡日丑為星紀則牛斗之分也據兹星祥秦之鄣郡漢之丹陽其有水為沴乎厥應當在戊辰之丁巳明年夏四月辛丑宣歙睦雨周一甲子平地水丈餘四日而後止新安郡之新城繼為暴水所汨雉堞咸圯都帥太尉潯陽公周視其壞色沮神戚一作蹙將捐去而莫修則功存之可祕也將徴役以完舊則民勩之可憚也逮于兩月不遑發命又念強敵未殄方礪鏃伺間豈可惜費重力慢蓄輕守以速寇心乎秋八月乃頒役於五邑先降簡于邑令且誡其程功無使隱民厄於豪族擅諸利俾率怨于下以益上者二字一作吾匪德也邑令承命躬自閲籍功之延促事之繁簡由窶向豐罔有弗均於是五邑之民不再命而麏至於新一作所城之下凡板幹畚築之用皆未令而具初公巡壘觀設一作毁審賾厥由且歎其雖新水之異以害兹城亦始構之踈以稔其失也烏有於泛沙流石之上而能為永永之基哉乃命指揮使劉贇徐璋三城使朱環及節級等各畫分而督役遂諭以城之舊址浮而斯濫今當發深一仞抉去砂石實以精壤重加鎮築然後廣其宿基增諸石一作鹵版必使堅永侔于鐡壁役或務棘棘則民瘃築或務戚戚則民疲弗棘弗戚繫爾曹寬猛之有中也無以苛忍相矜無以遄速為代諸侯受教夙夜胥朂勉于恪勤以勵厥躬故執畚者繩繩操斧者詵詵輦壤輸財蟻列子臻笑語欣欣一作聽聽爭先有期自旭及晡役未嘗懈逺而望之則疊巘層巒屹如天設迫而視之則崇岡連阜捷若神化回合叢倚崖束山抱建邦則險此焉是覯自八月庚子興役暨十月之壬寅而役罷工者函斧築者閣鍤太尉潯陽公建斾而巡諸乃曰城之完屋之新實麗實堅非諸邑之奉公焉得民不擾而力齊乎非諸校之盡節焉得役不煩而功速乎所以見二三子之忠勤以佑吾政也自公之臨是邦也法明而兵徑刑審而罰中故民樂其化安其土及徴庸而屬邑之民父誨其子兄教之弟以公之問俗也未嘗有猾吏之擾以公之撫封也未嘗有外寇之虞以公之治戎也葵藿之禁無敢有觸者以公之奬善也鱗介之美無敢有侵一作侜者故十五餘年綽綽焉如鱗之潛遇其淵廣雍雍焉若禽之棲獲其蒙翳絶釣網之慮無畢一作羅弋之患詩所謂愷悌君子民之父母見于我公矣今水壞城壘重興畚築茍或進退不副公之用是謂姦慈父之命其為悖戾神豈爾容哉故民不俟令而爭集不勞促而自課非恩信之昭感何以逮乎此哉一作勞於戲事有竒績有異不克稱頌以流于裔秉筆者之過也閿鄉楊夔自勝辨力學以暨於髮落齒墮屬兹喪亂洎在民伍獲承公殊衆之遇每歎其有志無時許將其促鱗弱介逰泳於豐沼無以酬奬之意敢撰重築新城記以獻時嵗在降婁周正之月十一日記文苑英華卷八百十一
