body:
  text: 文苑英華卷三百二十一宋李昉等編花木一牡丹二十七首桃花十五首杏花八首紫薇花三首牡丹李益紫蘂藂開未到家却教遊客賞繁華始知年少求名處滿眼空中别有花題所賃宅牡丹王建賃宅得花饒初開恐是妖霞集作粉光深紫膩肉色退紅嬌且願風留著唯愁日炙燋雜詠作銷可憐零落蘃收取作香燒賞牡丹前人此花名價别開艷益皇都香逼苓菱疑死紅燒躑躅枯軟光籠細脈妖色暖鮮膚滿蕊攢黃粉含稜縷絳蘇好和薰御服堪畫入宫圖晚態愁新婦殘粧望病夫教人知箇數留客賞斯須一夜輕風起千金買亦無戲題牡丹韓愈幸自同開俱隱約何須相倚鬭輕盈陵晨併作新粧面對客偏含不語情雙燕無機來拂略集作還拂掠遊蜂多思正經營長年是事皆拋盡集作棄今日欄邊暫眼明唐郎中宅與諸公同飲酒看牡丹劉禹錫今日花前飲甘心醉數杯但愁花有語不為老人開以上三篇並見集本渾侍中牡丹徑尺千餘朵人間有此花今朝見顔色更不向諸家賞牡丹前人庭前芍藥妖無格池上芙蓉淨少情唯有牡丹真國色花開時節動京城惜牡丹花二首白居易惆悵階前紅牡丹晚來唯有兩花集作枝殘明朝風起應吹盡夜惜衰紅把火看二寂寞萎紅低向雨離披破艷散隨風晴天集作明落地猶惆悵何況飄零泥土中牡丹李商隱錦帷集作幃下同初卷衛夫人典略云夫子見南子南子在錦帷之中繡被猶堆越鄂君垂手亂翻雕玉珮細腰頻舞集作招腰爭舞欎金裙石家蠟燭何曽剪荀令香爐可待薰我是夢中傳彩筆欲書花片集作葉寄朝雲同前絶代祗西子衆芳唯牡丹月中虛有桂天上謾誇蘭夜濯金波滿朝傾玉露殘性應輕菡萏根本是琅玕奪目霞千片陵風綺一端稍宜經一作霑宿雨遍覺耐春寒見説開元嵗初令植御欄貴妃嬌欲比侍女妒羞看巧類鴛機織光攢射月團漸移公子第還種杏花壇豪士傾囊買貧儒假乘觀葉藏梧際鳯枝動鏡中鸞似笑賔初至如愁酒欲闌詩人忘芍藥釋子愧栴檀酷烈宜名夀姿容想姓潘素光翻鷺羽丹焰赩雞冠燕拂驚還語蜂貪困未安儻令紅臉笑兼解翠眉攢少長呈連蕚嬌矜寄合歡息肩移九軌無脛到千官日耀香房拆風披蘂粉乾好酬青玉案稱貯碧氷盤璧要連城與珠堪十斛判更思初甲拆那得異泥蟠騷詠應遺恨農經秪粗刋魯般雕不得延夀筆將殫醉客同攀折佳人惜犯干始知來苑囿全勝在林巒泥滓當澆灑庭除又綽寬若將桃李並方覺效嚬難牡丹二首溫庭筠輕隂隔翠幃宿雨泣晴暉醉後佳期在歌餘舊意非蝶繁輕粉住蜂重抱香歸莫惜薰爐夜因風到舞衣二水漾晴紅壓疊波曉來金粉覆庭莎裁成艷思偏應巧分得春光最數多欲綻似含雙靨笑正繁疑有一聲歌華堂客散簾垂地想憑欄干斂翠蛾同前四首薛能異色稟陶甄常疑主者偏衆芳殊不類一笑獨奢妍顆拆羞含懶藂虛隱陷圓亞心堆勝被美色艷於蓮品格如寒食精光似少年種堪收子子價合易賢賢􅒯秀應無妒竒香稱有仙深隂宜映幕富貴助開筵蜀水爭能染巫山未可憐數難忘次第立困戀傍邊逐日愁風雨和星祝夜天且從留盡賞離此便歸田二乾符二年再作前人萬朵照初筵狂遊憶少年曉光如曲水顔色似西川白向庚辛受朱從造化研衆開成伴侣相笑極神仙見熖寧勞火聞香不帶煙自髙輕月桂非耦賤池蓮影接雕盤動藂遭惡草偏招歡憂事阻就卧覺情牽四面宜綈錦當頭稱管絃泊來鶯定憶紛擾蝶何顛蘇息承朝露滋榮仰霽天壓欄多盡好敵國貴宜然未落須迷醉因兹任病纒人誰知極物空負感麟篇三去年零落暮春時淚濕紅箋怨别離一作詩常恐便同一作如巫峽散因何重有武陵期傳情每向馨香得不語還應彼此知只欲欄邊安枕席夜深間共説相思四牡丹愁為牡丹飢自惜多情欲瘦羸濃艷冷香初蓋後好風乾雨正開時吟蜂遍坐無間蘂醉客曽偷有折枝京國别來誰占玩此花光景屬吾詩同前二首韓琮桃時杏日不爭濃葉帳隂成始放紅曉艷逺分金掌露暮香深惹玉堂風名移蘭杜千年後貴擅笙歌百醉中如夢如仙忽零落暮霞何處緑屛空二詠未開者殘花何處藏盡在牡丹房嫩蘂包金粉重葩結繡囊雲凝巫峽夢簾閉景陽粧應恨年華促遲遲待日長觀江南牡丹張璸北地花開南地風寄恨還與客心同群芳盡怯千般態幾醉能銷一畨去聲紅舉世秪將華勝實真禪元喻色為空近年明主思王道不許新栽滿六宮僧院牡丹陳標琉璃地上開紅艷碧落天頭散曉霞應是向西無地種不然爭肯重蓮花牡丹羅鄴落盡春紅始見誰詠作著花花時比屋事豪奢買栽池館恐無地看到子孫能幾家門倚長衢攢繡轂雜詠作軛幄籠輕日護香霞歌鍾滿座爭觀賞肯信流年鬢有華同前二首前人似共東風别有因絳羅髙捲不勝春若教解語應傾國任是無情亦動人芍藥與君為近侍芙蓉何處避芳塵可憐韓令功成後辜負穠華過此身二虛白堂前相傳云白傅手植在錢塘欲詢往事奈無言六十年來此託根香暖幾飄袁虎扇格髙長對孔融尊曽憂世亂隂難合且喜春殘色尚存莫背欄干便相笑與君俱受主人恩牡丹裴説數朵欲傾城集作色堪驚安同桃李榮未嘗貧處見不似地中生此物疑無價當春獨有名遊蜂與蝴蝶來往似多情裴給事宅白牡丹盧綸長安豪貴惜春殘爭玩街西詩選作爭賞新開紫牡丹别有玉盤承露冷無人起就月中看白牡丹王貞白榖雨洗纎素裁為白牡丹異香開玉合輕粉泥銀盤時貯露華濕宵傾月魄寒家人淡粧罷無語倚朱欄桃花奉和詠龍門桃花蕭慤舊聞開露井今見植龍門樹少知非塞花髙異小園論時應未發故欲影歸軒抵言輕初學記作經摘罷猶勝逐風翻詠桃唐太宗禁苑春暉麗花溪綺樹裝綴條深淺色點露參差光向日分千笑迎風共一香如何仙嶺側獨秀隱遙芳望人家桃花賀知章山源夜雨度仙家朝發東園桃李花桃花紅兮李花白照灼城隔復南陌南陌青樓十二重春風桃李誰為容棄置千金輕不顧踟蹰五馬謝相逢徒言南國容華晚逺疑嘆西家飄落逺的皪長春明光殿氛氲半入披香苑苑裏珍木元自竒黃金作葉白銀枝千年萬嵗不凋落還將桃李更相宜桃李從來露井傍成蹊結影矜艷陽莫道春光不可樹會持仙實薦君王廨中見桃花南枝已開北枝未發因寄杜副端劉長卿何意同根本開花每後時應緣去日逺獨自發春遲結實恩難忘去聲集作望無言恨豈知年光不可待空美向南枝入百丈澗見桃花晚開前人百丈深澗裏過時花欲妍應緣地勢下遂使春風偏晚桃花白居易一樹紅桃亞拂池竹遮松蔭晚開時非因斜日無由見不是間人豈得知寒地生材遺較易貧家養女嫁常遲春風集作深欲落誰憐惜自待郎來折一枝大林寺桃花前人人間四月芳菲盡山寺桃花始盛開長恨春歸無覓處不知轉入此中來華陽觀桃花時招李六拾遺飲見二百三十七卷前人玄都觀栽桃十韻章孝標驅使鬼神功攢栽萬樹紅薰香丹鳯闕粧點紫瓊宫寶帳重遮日妖金遍纍空色燃燒藥火影舞步虛風粉撲青牛過枝驚白鶴沖拜星春錦上服食晚霞中碁局隂長合簫聲祕不通艷陽迷俗客幽邃失壺公根柢終盤石桑麻自轉蓬求師飽靈藥他日訪遼東金谷園桃李許渾花在舞樓空年年依舊紅淚光停曉露愁態倚春風開處妾先死落時君亦終東流兩三集作三兩片應到一作在夜泉中桃花薛能香色是天種千年豈易逢開齊全未落繁極欲相重冷濕朝如淡晴乾晚更濃風光新社燕時節舊春鴻籬落欹臨竹亭臺盡間松亂緣堪羡蟻深入不如蜂有影宜暄照無言自冶容洞連非俗世蹊盡接仙蹤子熟河應變根盤土已封西王潛愛惜東朔恣偷從醉席眠英好題詩戀境慵芳菲聊一望何必是臨卭敷水小桃盛開因題溫庭筠敷水小橋東姢姢一作涓涓照露叢所嗟非勝地堪恨是春風二月艷陽節一枝惆悵紅定知留不住吹落路塵中反生桃花發因題前人病眼逢春四壁空夜來山雪破東風未知王母千年熟且共劉郎一笑同已落又開橫晚翠似無如有帶朝紅僧虔蠟炬髙三尺莫惜連宵照露叢小桃鄭谷和煙和雨遮敷水映竹映村連灞橋一作陵撩弄春風奈寒冷到頭贏得杏花嬌一作憎桃花羅隱暖觸衣襟漠漠香間梅遮栁不勝芳數枝艷拂文君酒半里紅欹宋玉墻盡日無人疑怨望有時經雨乍凄涼舊山山下還如此回首東風一斷腸杏花古苑杏花張籍廢苑杏花在行人愁過一作到時獨開新塹底半露舊燒枝晚色連荒轍低隂覆折碑濛濛集作茫茫古陵路集作下春盡又誰知杏園花下贈劉郎中白居易怪君把酒偏惆悵曽是貞元花下人自别花來多少事東風二十四回春酬白樂天杏花園劉禹錫二十餘年作逐臣歸來還見曲江春遊人莫笑白頭醉老醉花間能一作有幾人同前元稹劉郎不用間惆悵且作花間共醉人算得貞元舊朝士幾員同見太和春右三篇又見第二百四十五卷前已削去而存于此同白侍郎杏園贈劉郎中張籍一去瀟湘頭已集作欲白今朝始見杏園雜詠作苑春從來遷客應無數重到花前有幾人杏園溫庭筠紅花初綻雪花繁重疊髙低滿小園正見盛時猶悵望豈堪開處已繽翻情為世纍詩千首醉是吾鄉酒一樽杳杳艷歌春日午出墻何處隔朱門同前李商隱上國昔相值亭亭如欲言異鄉今暫賞脈脈豈無恩拔少風多力墻髙月有痕為含無限思集作意遂到不勝繁仙子玉京路主集作佳人金谷園幾時醉碧落誰伴過黃昏鏡拂鉛華膩爐藏桂燼溫終應催竹葉先擬詠桃根莫學啼成血從教夢寄魂吳王採香徑失路入煙村同前鄭谷不學梅欺一作欹雪輕紅照碧池小桃新謝後雙燕恰集作却來時香屬登龍客集作室煙籠宿蝶枝臨軒須貌音貌取風雨易離披紫薇郡齋有紫薇雙本自朱明接于徂暑其花芳馥數旬猶茂庭宇之內􅒯無其倫豫嘉其美而能久因詩紀述楊於陵晏朝受明命維夏走天衢逮茲三伏侯息駕萬里途省躬既局蹐結思多煩紆簿領幸無事宴休誰與娛內齋有嘉樹雙植分庭隅緑葉下成幄紫花紛若鋪摛霞晚舒艷凝露朝垂珠炎沴晝方鑠幽姿間且都夭桃固難匹芍藥寧為徒懿此時節久詎同光景驅陶甄試一致品彚乃散殊濯質非受彩無心那奪朱粵豫負羈縶留賞益踟蹰通夕靡云倦西南山月孤奉和侍郎二丈四字集作抑州楊侍郎玩郡齋紫薇花十四韻前人幾年丹霄上出入金華省暫别萬年枝看花桂陽嶺南方足竒樹公府成佳境緑隂交廣除明艷透蕭屛雨餘人吏散燕語簾櫳靜懿此含晚芳翛然忘簿領紫茸垂組綬金縷攢鋒頴露溽暗傳香風輕徐就影苒弱多意思從容占時一作光景得地在侯家移根近仙井開樽好凝睇倚瑟仍回頸遊蜂駐綵冠舞鶴迷煙頂興生紅藥後愛與甘棠並不學夭桃姿浮勞在俄頃臨發崇讓宅紫薇李商隱一樹濃姿獨看來秋庭暮雨類輕埃不先搖落應有待已欲别離休更開桃綬含情依露井栁綿相憶隔章臺天涯地角同榮謝豈要移根上苑栽文苑英華卷三百二十一
