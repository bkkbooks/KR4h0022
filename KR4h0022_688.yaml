body:
  text: 文苑英華巻六百八十九宋李昉等編薦舉上銓選附答張九齡書一首與權侍郎書一首答栁福州書一首與兵部李侍郎書一首為人求薦書一首與祠部陸貟外書一首與汝州盧郎中論侯喜書一首與鄭伯儀書一首薦所知於徐州張僕射書一首代書書一首答張九齡書姚元崇見張九齡集忽辱牋翰喜慰攸集退惟自張集作循省文粹作退惟自省慙懼亦深實智力之所不逮也宜朝廷之所見責也僕本凡近之才素非經濟之具叨承過聴謬膺朝委自少及長從微至著唯以直道為業匪以曲路期通歴官三朝年逾一紀凡所稱薦罕避嫌疑實有祁奚之舉非無許允之對則天之世已被流言行之有恒乆而自辨近䝉奬擢倍勵駑庸毎以推賢進士為務欲使公卿大夫稱職豈陽鱎之或用及觧狐之可為而悠悠之徒未是張集作足矜察嗷嗷之口欲以中傷上恃天聰俯伏神道既不得奉身而退但知信心而前然顧無隠匿文粹作慝亦死為明分矣猥惟不敏敬承厥休持當座銘永為身寳元崇頓首與權侍郎書栁冕冕白昔仲弓問為政子曰先有司有司之政在於舉士是以三代尚徳尊其教化故其人賢西漢尚儒明其理亂故其人智後漢尚章句師其傳習故其人守名節魏晉尚姓羙其文粹無此三字氏族故其人矜伐隋氏尚吏道貴其官位故其人寡㢘恥唐承隋法不改其理此天集有下字所以待聖主正之何者進士以詩賦取人不先理道明經以墨義考試不本儒意選文粹有人字以書判殿最不尊人物故吏道之理天下天下奔競而無亷恥者以教之者末也閣下豈不謂然乎自頃有司試明經奏請毎經問義十道五道全寫疏五道全寫注其有明聖人之道盡六經之意集有義字而不能誦疏與注一切棄之恐清識之士無由而進腐儒之生文粹作腐生豎子比肩登第不亦失乎閣下因從容啓明主稍革其弊奏為二等其有明六經之義合先王之道者以為第一二字文粹作上等其有精於誦注者與精於誦疏者以為次等不登此二科者以為下等不亦善乎且明六經之義合先王之道君子之儒教之本也明六經之注與六經之疏小人之儒教之末也今者先章句之儒文粹作學後君子之儒以求清識之士不亦難乎是以天下至大任人至衆而人物殄瘁亷恥不興者亦在取士之道未盡其術也誠能革其弊尊其本舉君子之儒先於理文粹作履行者俾之入仕即清識君子也俾之立集作位朝即王公大人也一年得一二十人十年得一二百人三十年得五百人即海内人物不以集作亦盛乎昔唐虞之盛也十六族而已周之興也十亂而已漢之王也三傑而已太宗之聖也十八學士而已豈多乎哉今海内人物顒然思理推而廣之以風天下即天下之士靡然而至矣是則由於有司以化天下天下之士得無亷恥乎冕頓首六月十四日答栁福州書權徳輿來問見愛慇慇甚厚疏以先師對仲弓先有司之説又曰由於有司以風天下誠哉大君子之言理道也今之取士在於禮部吏部吏部集本文粹並不疊此二字按資格以擬官奏郎官以考别失權衡重輕之本無乃甚乎至於禮部求才猶似為仁由已然亦沿於時風豈能自振嘗讀劉秩祭酒上疏云太學設官職在造士士不知方時無賢才臣之罪也毎讀至此心常慕之當時置於國庠似在散地而方以乏賢内訟慨然上奏此君子之心也君子之言也况以䝉劣辱當儀曹為時求人豈敢容易然再嵗計偕多有親故故進士初牓有之帖落有之䇿落有之及第亦有之不以私害公不以名廢實不敢自愛不訪於人兩漢設科本於射䇿故公孫𢎞董仲舒之倫痛言理道近者祖習綺靡過於雕蟲俗謂之甲賦律詩儷偶對属况十數年間至大官右職教化所繫其若是乎是以二集作半年以來參考對䇿不訪名物不徴隐奥求通理而已求辨惑而已習常而力不足者則不能囘復於此故或得其人庻他時有通識懿文可以持重不遷者而不盡在於齷齪集本文粹並在齷齪科第也明經問義有幸中所記者則書不停綴令文粹有釋字通其義則牆面木偶然遂列上第末如之何頃者參伍其問令書釋意義則於䟽注之内文粹作中茍刪撮㫖要有數句而通者昧其理而未盡有數紙而黜者雖未盡善庻稍得之至於來問明六經之義合先王之道而不在於注䟽者雖今吏部三字文粹作令學究一經之科毎嵗一人猶慮其不能至也且明經者仕進之多數也注䟽者猶可以質驗也不者儻有司率情下上其手文粹作才既失其末又不得其本則蕩然矣無乃然乎古人云强勉行道則徳日起而大有功中庸有困而行之勉强而行之鄙雖不敏敢㤀勉之之道邪大凡常情為近習所勝役役集本文粹並作沒沒於聞見汲汲於進取茍避患安時俾躬處休以至老死自為得計豈復有揣摩古今風俗整齊教化根本原始要終長轡逺馭如閣下吐論之若是者耶此鄙人所以喟然三復而不知其止文粹作已也來問又言三代兩漢至近古所尚不同豈古化夐逺之不可復耶復因縁漸靡而操執者不之思耶鄙人頑固謹俟餘論因自發舒慙怍無量徳輿再拜八月十一日與集作上兵部李侍郎書韓愈十二月九日將仕郎守江陵府法曹參軍韓愈謹上書侍郎閣下愈少鄙鈍於時事都不通曉家貧不足以自活應舉覔官凡二十年矣薄命不幸動遭讒謗進寸退尺卒無所成性本好文學因困厄悲愁無所告語遂得窮究於經傳史記百家之説沉潜乎訓義反復乎句讀礱磨乎事業而奮發乎文章凡自唐虞以來編簡所存大之為河海髙之為太山明之為日月幽之為鬼神纎之為珠璣華實變之為雷霆風雨竒辭奥㫖靡不通逹惟是鄙鈍不通曉於時事也集無也字學成而道益窮年老而身一作智益困私自憐悼悔其初心髪秃齒豁不見知已夫牛角之歌辭鄙而義拙堂下之言不書於傳記齊桓舉以相國叔向携手以上然則非言之難為集作其聴而識之者難遇也伏以閣下内仁外義行髙而徳鉅尚賢而與能哀窮而悼屈自江而西既化而行矣今者入守内職為朝廷大臣當天子新即位汲汲於理化之日出言舉事宜集作計必施設既有聴之之明又有振之之力寗戚之歌鬷明之言不發於左右則後而失其時矣謹獻舊文一巻扶樹教道有所明白南行詩一巻舒憂娛悲雜以瓌恠之言時俗之好所以諷於口而聴於耳也如賜覽觀亦有可採干瀆尊嚴伏增惶恐愈再拜為人求薦書某聞木在山馬在肆過之而不顧者雖日累千萬人未為不才與下乗也及至匠石過之而不睨伯樂遇之而不顧然後知其非棟梁之材超逸之足也以某在公之宇下非一日而又辱居姻婭之後是生于匠石之園長于伯樂之廐者也於是而不得知假有見知者雖千萬人亦何足云爾集作耳今幸賴天子毎嵗詔公卿大夫貢士若某等比咸得以薦聞是以冐進其説以累於執事亦不自量已也然執事其知某何如哉六字杭本作其如某何哉昔人有鬻馬不售於市者知伯樂之善相也從而求之伯樂一顧焉一作馬價增一無增字三倍某與其事頗相類是故終始言之耳某再拜與祠部陸員外薦士書執事好賢樂善孜孜以薦進良士明白是非為已任方今天下一人而已愈之獲幸於左右其足跡接於門牆之間升乎作于堂而望乎集作于室者亦將一年于今矣念慮所及輙欲不自疑外竭其愚而道其志况在執事之所孜孜為已任者得不少助而張之乎誠不自識其言之可採與否其事則小人之事君子盡心之道也天下之事不可遽數又執事之志或有待而為未敢一二言也今但言其最近而切者耳執事之與集有同字司貢士者相知識集作誠深矣彼之所望於執事執事之所以待乎彼者可謂至而無間疑矣彼之職在乎得人執事之志在乎進賢如得其人而授之所謂兩得其求順乎其必從也執事之知人其亦愽矣夫子之言曰舉爾所知然則愈之知者亦可以言矣集作亦一言也文章之尤者有侯喜者侯雲長者喜之家在開元中衣冠而朝者兄弟五六人及喜之父仕不逹棄官而歸喜率兄弟操耒耜而耕蜀本有于野二字地薄而賦多不足以養其親則以其耕之事集本作暇讀書而為文以干於有位者而取足焉喜之文章學西漢集作京而為也舉進士十五六年矣雲長之文執事所自知其為人淳重方實可任以事其文與喜相上下有劉述古者其文長於為詩文麗而思深當今舉於禮部者其詩無與為比而又工於應主司之試其為人温良誠信無邪妄詐佞集作邪佞詐妄之心強志而婉容和平而有立其趨事静以敏著羙名而負屈稱者其日集有已字久矣有韋羣玊者京兆之從子其文有可取者其進而未止者也其為人賢而有材一作行志剛而氣和樂於薦賢為善其在家無子弟之過居京兆之側遇事輙争不從其令而從其義求子弟之賢而能業其家者羣玊是也凢此四子皆可以當執事首薦而極論者主司疑焉則以辨之問焉則以告之未知焉則慇懃而語集作論之期乎有成而後已集作止可也有沈杞者張苰一作𢎞者尉遲紛者李紳者張後餘者李翊者或文或行皆出羣之才也凢此數子與之足以收人望得才集作材實主司疑焉則與集作以解之問焉則以對之廣求焉則以告之可也徃者陸相公司貢士考文章甚詳愈時集作亦字幸在其中而未知陸丞相集無此二字之得人也其後一二年所與及第者皆赫然有聲原其所以亦由梁補闕肅王郎中礎佐之梁舉八人無有失者其餘則王皆與謀焉陸相之考文章甚詳也待梁與王如此不疑也梁與王舉人如此之當也至今以為羙談自後主司不能信人人亦無足信者故蔑然集本注作蔑蔑無聞今執事之與司貢士者有相信之資集有與字謀行之道惜乎其不可失也方今在朝廷者多以遊宴娛樂為事而獨執事眇然髙舉有深思長慮為國家樹根本之道宜乎小子之以此言聞於左右也愈恐懼一作惶恐再拜與汝州盧郎中論侯喜書進士侯喜古其人為文甚古立意甚堅行止取捨有士君子之操家貧親老無援於朝左舉塲十餘年竟無知遇愈嘗慕其才而恨其屈與之還徃嵗月已多嘗欲薦之於主司言之於上位名卑官賤其路無由觀其所為文未嘗不掩巻而歎去年愈從調選本欲携持同行適遇其人自有家事集作難迍邅坎軻又廢一年及春末自京還恠其久無集作絶消息五月初至此自言為閣下所知辭氣激揚面有矜色曰侯喜死不恨矣喜辭親入闗羇旅道路見王公大人數百未嘗有如盧公之知我也比者分將委棄泥塗老死草野今胷中之氣勃勃然復有仕進之路矣愈感其言賀之以酒謂之曰盧公天下之賢刺史也未嘗有所推引盖難其人而重其事今子欎為選首其言死不恨固宜也古所謂知己者正如此耳身在貧賤為天下不知獨見遇於大賢乃可貴耳若自有名聲又託形勢此乃集有為字市道之事又何足貴乎子之遇知於盧公真所為知己者也士之修身立節而竟不遇知己前古以來不可勝數或日接膝而不相知或異世而相慕以其遭逢之難故曰士為知己者死不其然乎不其然乎閣下既已知侯生而愈復以侯生言於閣下者非為生謀也感知己之難遇大閣下之徳而憐侯生之心故因其行而獻於左右焉謹狀與鄭伯儀集作義書歐陽詹居方足下胡妳物故仁孝多感悲慟如何逺助悽惻秋凉體與神康僕素寡悰暢遐亦可悉華下來人伯儀居華山之隂也承今冬以前明經赴調罷舉進士何顛且不沛遊集作逝而能復與居方哉夫非有必行則諫有以集作必拒處情懐歡古人所難集有難字僕於居方亦不易之今流既從川華既歸根輙分間布白致以牋素居方忖覽知及蘧瑗四十九年之已徃陶潜今是昨非之悟焉漁者所務唯魚不必在梁在笱弋者所務唯禽不必在矰在繳國家設尊官厚禄為人民也為社稷焉集作也在求其人非與人求在得其人非與人得唯道徳膺厥求唯賢能膺厥徳賢能事事而後見道徳誠誠而後信茍須事事茍須誠誠則必委以務命以職從而覈之四海之大億兆之衆不可逢而安集作委命之是用啓稍異之聞集作問始集作殆致其我樂而自耀者讀徃載究前言則曰明經属以詞賦以事則曰進士中夫程度者取政事最輕小者命以始又中人二字集作令公侯子孫卿大夫子弟能力役供給者曰千牛進馬三衛齊郎限以年月終亦試之其有成則陟陟不已乃尊乃厚其有敗則黜黜不已乃戮乃亡取之於諸科暫殊用之於諸科則一良未即以進士賢而明經不賢也但以選才如選材焉以規則失之於方以矩則失之於圓彼方圓畢至然後擇其利用者實之器三字集作寳之中方則善於圓中圓則善於方器器集作木材也者在堅貞而可久集有人字才也者在徳行而有恒不可久不有恒雖售之於今必不售之於後蚩蚩之人貴此賤彼是不深逹國家選士之意見近而迷逺者居方寧斯人之徒歟况目覩進士出身十年二十年而終於一命者有之明經諸色入仕須㬰而踐公集作卿相者有之忠與孝相生君與父相随於家羙則於國良為閨門重則為朝廷尚此古今聖賢絶慮萬不失一之得也僕沗居方交㳺自貞元之初于今十有三祀孰孰熟通用得居方之為人甘㫖可求則已在尊長之前矣衣食可讓則已在兄弟之邊矣急難當行則必在交遊之先禮義當徃則無在時賢之後晨昏無方之性愛弟友于之情長長之敬下下之眷與朋友之信接物之道居方無不盡則於家於閨門至矣於國於朝廷詎少哉嘗清宵月下寒序火邊或醉或醒接以餘論君子欲其暗然而章惡自衒自媒沽名者二年間見居方求試於詞塲僕恨恨如失才不集無不字如居方地不集無不字如居方方於所得詎止乎得然諸科中升乎一科矣將宜存一梁一笱一矰一繳之義事事誠誠之㫖中規中矩之求委恒久循黜陟俟乎暗然之來也况近聞宗懿之中景行居方彌篤焉上以居方逹慈於下下待居方申愛乎上居貧孀孤逺集作逹官集作宦棺襯悉居方竭力已可行咨乎可及饑飽不異魂體皆歸年纔弱冠行跡如此豈徒生哉借如居方束帛到門而有未起居方以藝自謁雖從家命亦已非矣悲哉更逐齊人之後耶僕竊以為知人曩得居方將集作以為居方也洎昨視所行則非居方今聆嘉聞又知居方矣如其知如其知竟復元和以叶愚念得之以道為姜為傅不得以道為囘為憲明時之令人豈不善歟面叙不周此亦何云薦所知於徐州張僕射書李翺翺再拜齊桓公不疑於其臣管夷吾信而覇天下攘戎狄匡周室亡國存荆楚服諸侯無文粹作莫不至焉竪刁易牙信而齊國亂身亡不𦵏五公子争立兄弟相及者數世桓公之信於其臣一道也所信者得其人三字集作賢則徳格于天地功及於後代不得其人則不能免其身文粹作得其死知人文粹作其知人不易也豈惟覇者為然雖聖人亦不能免焉帝堯之時賢不肖皆立於朝堯能知舜於是乎驩兠放共工流集作放驩兠流共工殛鯀竄三苖舉禹稷臯陶二十有二人加諸上位故堯崩三載四海遏密八音後代之人皆謂之帝堯焉向使堯不能知舜而遂尊驩兠共工之黨於朝禹稷臯陶之下二十有二人不能用則堯將不得為齊桓公爾集作矣豈復得曰大哉堯之為君也唯天為大唯堯則之蕩蕩乎民無能名焉者哉春秋曰夏滅項孰滅之盖齊滅之曷為不言齊滅之為桓公諱也春秋為賢者諱此滅人之國何賢之爾君子之惡惡也嫉始英華作妬非善善也樂終桓公嘗有繼絶存亡之功故君子為之諱也繼絶存亡賢者之事也管夷吾用所以能繼絶世存亡國焉耳蜀本有矣字竪刁易牙用則不能也向使桓公始不用管夷吾未有集作用竪刁易牙争權不𦵏而亂齊國則幽厲之諸侯也始用賢而終身諱其惡君子之樂用賢也如此始不用賢以及其終而幸後世之掩其過也則㣲矣然則居上位流徳澤於百姓者何所勞乎勞於擇賢得其人口集作力措諸上使天下皆化之焉而已矣兹文粹作今天子之大臣有土地千里者孰有如執事之好賢不倦者乎盖得其人亦多矣其所可求而不可取者則有人焉隴西李觀竒士也伏聞執事知其賢將用之未及而觀病死昌黎韓愈得古文之遺風明於理亂根本之所由伏聞執事又知其賢將用之未及而愈為宣武軍節度使之所留集作用觀愈者集作皆豪傑之士也如此人不時出觀自古天下亦有數十文粹作百年無如其人者焉執事皆得而知之皆不得而用之翺實為執事惜焉豈唯翺一人而已後之讀前載者亦必多為執事惜之矣兹有平昌孟郊貞士也伏聞執事舊知之郊為五言詩自前漢李都尉蘓屬國及建安諸子南朝二謝郊能兼其體而有之李觀薦郊於梁肅補闕書曰郊之五言詩其有髙處在古無上其有平處下顧兩謝韓愈送郊詩曰作詩三百首杳然集作黙咸池音彼二子皆知言也集作者豈欺天下之人哉郊窮餓不得安養其親周天下無所遇作詩曰食薺腸亦苦強歌聲無歡出門則集作即有礙誰謂天地寛其窮也甚矣復集作又有張籍李景儉者皆竒士集作才也未聞執事集作閣下知之凢賢人竒士自以所負不茍合於世是以雖見之難得而知也見而不能知其賢如勿見而已矣知其賢而不能用如勿知其賢而已矣用集有而字不能盡其才如勿用而已矣能盡其材而容讒人之所間者如勿盡其材而已矣故見賢而能知知而能用用而能盡其材而不容讒人之所間者天下一人而已矣兹有二人焉皆來其一人賢士也其一人常常人也待之禮貌不加崇集作隆焉則賢者行而常常人日來矣况其待常常之人禮貌加厚則善人何求而來哉孔子曰吾未見好徳如好色者聖人不好色而好徳者也雖好色而不如好徳者次也徳與色均好之又其次也雖好徳而不如好色者下也最甚不好徳而好色者窮矣有人告曰某所有女國色者也天下之人必將極其力而求之而無所愛矣有人告曰某所有人國士也天下之人則不能一徃而先焉是豈非不好徳而好色者乎賢者則宜有以别於天下之人矣孔子述易定禮樂刪詩叙書作春秋聖人也奮乎百世之上其一作使所化之者非其道則夷狄人也而孔子之廟存焉雖賢者亦不能日徃拜之以其益於人者寡矣故無益於人雖孔子之廟尚不能朝夕而事焉况天下之人乎有待於人而不能得文粹作禮善人良士則不如無待也嗚呼人之降年不可與期郊將為他人之所得而大有立功於世與其短命而死皆不可知也二者卒有一於郊之身他日為執事惜之不可既矣執事終不得而用之矣雖恨之亦無可柰何矣翺窮賤人也直詞無讓非所宜至于此者也為道之存焉耳不直則不足以伸道也非好多言者也翺再拜代書書白居易廬山自陶謝洎十八賢已還儒風綿綿相續不絶貞元初有符載楊衡軰隐焉亦出為聞集作文人今之集作其讀書屬文結草廬於巖谷間者猶一二十人即其中秀出者有彭城人劉軻軻開卷慕孟軻為人軻秉筆慕揚雄司馬遷為文故著翼孟三卷豢龍子十巻雜文百餘篇而聖人之㫖作者之風雖未臻極徃徃而得余佐潯陽郡三年軻毎著文輙來示余余知軻志不息異日必能跨符楊而攀陶謝軻一旦盡齎所著書及所為文訪余告行欲舉進士余方淪落江海不足以發軻事業又羸病無心力不能徧致書於臺省故人因援紙引筆冩胷中事授軻且曰子到長安持此札為余謝集作謁集賢庾三十二補闕翰林杜十四拾遺金部元八員外監察牛二侍御秘書蕭正字藍田楊主簿兄弟彼七八君子皆余文友以余愚直常信其言茍于今不我欺則子之道庻㡬光明矣又欲使平生故人知我形體已悴志氣已憊獨好善喜才之心未死去矣持此代書三月十三日樂天白文苑英華卷六百八十九
