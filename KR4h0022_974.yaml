body:
  text: 文苑英華卷九百七十五宋李昉等編行狀五祕書少監陳京行狀一首假太尉逸事狀一首右散騎常侍宜城伯栁公行狀一首祕書少監陳公行狀栁宗元五代祖叔明陳宜都王曽祖某皇㑹稽郡司馬祖某皇晉陵郡司功參軍父兼右補闕翰林學士贈祕書少監某州某縣某鄉某里陳京年若干狀公姓陳氏自潁川來𨽻京兆萬年胄貴里諱京既冠字曰慶復舉進士為太子正字咸陽尉太常博士左補闕尚書膳部考功貟外郎司封郎中給事中祕書少監自考功已集作以來凡四命為集賢學士德宗登遐公病疴輿曵就位備哀敬之節由是滋甚遂以所居官致仕貞元二十一年四月二十五日終于安邑里妻黨之室無子伯兄前監察御史璫仲兄前大理評事萇以公文行之大者告于嘗吏于公者使辭而陳之大厯中公始來京師中書常舍人衮楊舍人炎讀其文驚以相視曰子雲之徒也常以兄之子妻公由是名聞逰太原太原尹喜曰重客至矣授館致餼厚以泉布獻焉公曰非是為也某嘗為北都賦未就願即而就焉其宫室城郭之大河山之富關閈之壯與其土疆之所出風俗之所安王業之所由興苟得聞而覩之足矣若曰受大利是以利來非集作蓋異前志也吾不能敢辭遂逆大河踰北山倣徉而歸賦成果傳天下為咸陽尉留府廷主文章决大事得其道為博士舉疵禮修墜典合于大中者衆焉涇人作難公徒行以出奔聞官守段忠烈之死上議罷朝七日宰相曰不可方居行宫無以安天下公進曰是非宰相之言天子褒大節哀大臣天下所以安也况其特異者乎上用之其勞勤侍從謀議可否時之所賴者大巡狩告集作住所至上行罪已之道焉曰凡我執事之臣無所任罪豫惟不謹於理而有是也將復前之為相者公曰天子加惠羣臣而引慝焉德之厚也而為相者復無以大警于後且示天下率其黨爭之上變於色在列者咸恟而退公大呼曰趙需等勿退遂進而盡其辭焉不果復上迎訪太后聞集作問數歲外頗怠其禮公密疏發之天子感悅焉初禮部試士有與親戚者則附于考功莫不隂授其旨意而為進退者及公則否卓然有有司之道不可犯也太廟闕東向之禮且久矣公自為博士補闕尚書郎給事中凡二十年動集作勤以為請殷祭之不墜繄公之忠懇是賴故宜有赤紱銀魚之報焉昭陵山峻而髙寢宫在其上內官懲其上下之勤挽汲之難也謁于上請更之上下其議宰相承而諷之召官屬使如其請公曰斯太宗之志也其儉足以為法其嚴足以有奉吾敢顧其私容而贊集作替之也奏議不可上又下其議凡是公者六七人其餘皆曰更之便上獨斷焉曰京議得矣從之在集賢奏祕書官六員𨽻殿內而刋校益理納資為胥而仕者罷之求遺書凡增繕者乃作藝文新志制為之名曰貞元御府羣書新録始御府有食本錢月權其贏以為膳有餘則學士與校理官頒分之學士當受三倍由公而殺其二書史之始至入禮幣錢六十緡亦皆分焉公悉致之官以理府署作書閣廣羣官之堂不取於將作少府而用大足居門下簡武官議典禮上以為能益器之與信臣議且致相位遇公有感疾使視之疾甚不能知人遂不用鄭吏部髙太常為相而以祕書命公所以示優之也公有文草集作章若干卷深茂古老慕司馬相如揚雄之詞而其詁訓多尚書爾雅之說紀事朴實不苟悅於人世得以傳藁其學自聖人之書以至百家諸子之言推黃炎之事涉歷代洎國朝之故實鈎引貫穿舉大包小若太倉之蓄崇山之載浩浩乎不可知也豈揚子所謂仲尼駕說者耶夫其忠烈之褒也相府之有誡也太廟之東向也昭陵之不更其故也官守之不奪也立言之不可誣也利之不苟就也害之不苟去也其忠類朱雲其孝類潁考叔其亷類公儀休而又文學以輔之五字文集作以之學以輔之而天子以為之知既得其道又得其時而不為公卿者病也故議者咸惜其始而哀其終焉公之喪凡五十四日而夫人又歿毁也夫人之父曰偕司農卿祖曰某贈太子太保宗元故集賢史也得公之遺事於其家書而授公之友以志公之墓謹狀貞元八年集作永貞元年是八月五日尚書禮部員外郎栁宗元狀段太尉逸事狀栁宗元太尉始為涇州刺史時汾陽王以副元帥居蒲王子晞為尚書領行營節度使寓軍邠州縱士卒無賴邠人偷嗜暴惡者率以貨竄名軍伍中則肆志吏不得問日羣行丐取於市不嗛輒奮擊折人手足推釜鬲甕盎盈集作棄道上袒集作把臂徐去至撞殺孕婦人邠寧節度使白孝德以王故戚不敢言太尉自州以狀白府願計事至則曰天子以生人分集作付公理公見人被暴害因恬然且大亂若何孝德曰願奉教太尉曰某為涇州甚適少事今不忍人無暴寇集作冦暴死以亂天子邉事公誠以都虞候命某者能為公已亂使公之人不得害孝德曰幸甚如太尉請既署一月晞軍士十七人入市取酒以刃刺酒翁壞釀器酒流集作留溝中太尉列卒取十七人皆斷頭注槊上植市門外晞一營大譟盡甲孝德震恐召太尉曰將奈何太尉曰無傷也請辭于軍孝德使數十人從太尉太尉盡辭去解佩刀選老躄者一人持馬至晞門下甲者出太尉笑且入焉曰殺一老卒何甲也吾戴吾頭來矣甲者諤因諭曰尚書固負若屬耶元帥固負若屬耶奈何欲以亂敗郭氏為白尚書出聽我言晞出見太尉太尉曰副元帥勳塞天地當務一有為字始終今尚書恣卒為暴且亂亂天子邊欲誰歸罪罪且及副元帥今邠人惡子弟以貨竄名軍籍中殺害人如是不止幾日不大亂大亂由尚書出人皆曰尚書倚副元帥不戢士然則郭氏功名其與存者幾何言未畢晞冉拜曰公幸教晞以道恩甚大願舉集作奉軍以從顧叱左右曰皆解甲散還火伍中敢譁者死太尉曰吾未晡食請假設草具既食曰吾疾作願留宿門下命持馬者去旦日來遂卧軍中晞不解衣戒候擊柝衛太尉且俱至孝德所謝不能請改過邠州由是無禍先是太尉在涇州為營田官涇大將焦令諶取人田自占數十頃給與農曰且熟歸我半是歲大旱野無草農以告諶諶曰我知入數而已不知旱也督責益急農且飢死無以償即告太尉太尉判狀辭甚巽使人來集作永諭諶諶盛怒召農者曰我畏段某耶何敢言我取判鋪背上以大杖擊二十垂死輿來庭中太尉大泣曰乃我困汝即自取水洗去血裂裳衣瘡手注善藥旦夕自哺農者然後食取騎馬賣市穀代償勿使知淮西寓軍帥尹少榮剛直士也入見諶大罵曰汝誠人耶涇州野如赭人且飢死而必得穀又用杖擊無罪者段公仁信大人也而汝不知敬今段公惟一馬賤賣市穀入汝汝又取不恥凡為人傲天災犯大人擊無罪者又取仁者穀使王人出無馬汝將何以視天地尚不愧奴𨽻耶諶雖暴抗然聞言則大愧流汗不能食曰吾終不可以見段公一昔集作夕同自恨死及太尉自涇州以司農徴戒其族過岐朱泚幸致貨幣慎勿納及過泚固致大綾三百兩集作匹太尉壻韋晤堅拒不得命至都太尉怒曰果不用吾言晤謝曰處賤無以拒也太尉曰然終不以在吾第以如司農治事堂棲之梁木上泚反太尉終吏以告泚泚取視之其故封識具存段太尉逸事如右元和九年某月日守永州司馬員外置同正員栁宗元謹上史館今之稱太尉大節者集作出入二字以為武人一時奮不慮死以取名天下不知太尉之所立如是宗元嘗出入岐周邠斄間過真定北上馬嶺歷亭鄣堡戍竊好問老校退卒能言其事太尉為人喣喣集作姁姁常低首拱手促集作行步言氣卑弱未嘗以色待物人視之儒者也遇不可必逹志决非偶然者會州刺史崔公來言行信集作信行直備太尉遺事覆校無疑或恐尚逸墜未集大史氏敢以狀私於執事謹狀故銀青光祿大夫右散騎常侍輕車都尉宜城縣開國伯栁公行狀栁宗元曽祖善才皇荆王侍讀祖尚素皇潤州曲河縣令父慶休皇渤海郡渤海縣丞贈蔡州刺史工部尚書汝州梁縣梁城鄉思義里栁渾年七十四狀公字惟深其先河東人晋永嘉年有濟南太守卓者去其土代仕江左公實後之栁氏自黃帝后稷降於周魯以字命族因地受氏載在左氏內外傳及太史公書自卓至公十有一代為士林盛族著于南朝歷代史及栁氏家諜惟公質貌魁傑度量宏大𢎞和博逹而遇節必立恢曠放弛而應機能斷其居室奉養撫字之誠儀于宗戚而內行著其蒞政柔仁端直之德洽于府寺而外美彰焉凡為學略章句之煩亂採托奧㫖以知道為宗凡為文去藻飾之華靡汪洋自肆以適已為用自始學至于大成耽嗜文集注意鑽礪倦不知遊息威不待夏楚儒言經蜀本作雅㫖夙有聞知年十餘歲有稱神巫來告曰若相法當天且賤幸而為釋可以緩而死耳位祿非若事也公諸父素加撫愛尤所信異遽命奪去其業從巫之言也公不然之二字集作可且曰夫性命之理聖人所罕言搢紳者集有所字不道巫何為而能言之耶集作盡之也且令從之而生去聖人之教而為異術不若速死之愈也於是為學甚篤其在童幼固不惑於譎怪集作怪譎矣開元中舉汝州進士計偕百數公為之冠禮部侍郎韋陟異而目之一舉上第調授宋州單父尉操斷舉措通乎細大潔亷檢守形於造次加雲騎尉秩滿江南西道連帥聞其名辟至公府以信州都邑人罹凶害靡弊殘耗假守永豐令公於是用重典以威奸暴鋪大和以惠鰥嫠驅除物害消去人隱吏無招權乾沒之患政無犯令尨戎集作茸之蠧宰制聼斷漸於無訟集作訟息耕夫復於疆封集作封疆商旅交於關市既庶而富亷耻興焉既富而教庠孰列焉里閈大變克有能稱遂表為洪州豐城令到職如永豐之政而仁厚加焉授衢州司馬夫器宏者恥效以圭撮之任足逸者難局以尋常之地公遂滅跡藏用遁隱于武寧山羣公交書諸侯走幣皆謝絶不就方將究賢人之業窮君子之儒味道腴以代膏粱動德耀集作德耀而輕紱冕遺榮飬素恬淡如也朝右籍甚有聲徴拜御史公曰君命也安敢逃乎即日裝束上道公常好大體不為細故家之迫速集作束非其志也以疾辭授右補闕不隱忠以固位不形直以干集作于名除殿中侍御史賜緋魚袋赴江西與租庸使議復𣙜鐡及常平倉便宜制置得以專任蜀本作征和鈞關石之緒出納平準之宜國利人逸得其要術集作道遷侍御史充江南西道都團練判官時屬支郡不知連帥之職公請出巡盡征之地大詰姧謬所至風動其有非常之政裕于人者必舉其課績歸之使府而集無而字又以文采殷勤歌詠之俾其風謡誦聲聞于他部逹于京師而後已改祠部貟外郎轉司勳郎中餘如故就拜袁州刺史公於是酌古良牧之政宜於今者宗而奉之考諸理國之說稱於人者承而守之均利器用以致其富昭明物則以教之禮示優裕之德以周惠利緩九賦推廣厚之心以固和慈保萬人明其制量臨長羣吏示之法禁考中備敗無不得其極理行髙第朝廷休之召拜諫議大夫充浙江東西道黜陟使將舉其能政端于外邦也公則修虞書之考績舉漢代之課第處事詳諦無依違故縱之敗奉法端審無隱忌峭刻之文時分部所繫於公尤重陵江並海竟吳越之域皆所蒞焉復命稱職加朝散大夫又拜左庶子集賢殿學士奉翊儲后修其宫政統理文籍紀于祕府拜尚書左丞直而多容簡而有制去苛削之文而吏皆率法務宏大之道而政不失中加銀青光祿大夫遷為右散騎常侍涇卒之亂公以變起卒遽盡室奔匿于終南山賊徒訪公所在追以相印既及公而問焉公變名氏以紿之捐家屬以委之賊遂執公愛子榜箠訊問折其右肱而公不之顧即步入窮谷披草徑踰蓁集作秦嶺由褒駱朝于行宫上嘉其誠節不時召見公頓首流涕纍陳計畫賊平䇿勳賜輕車都尉封宜城縣開國伯拜尚書兵部侍郎初公名載字元輿至是奏請改命以滌僞署之汙是嵗盜據淮滸方議討戮宰相以大理評事李元平者有名以為才堪攘冦拜為汝州羣臣望聲狥利者皆曰德舉公獨慷慨言於朝曰是夫喋喋衒玉而賈名者也王衍誤天下殷浩敗中軍華而不實異代同德往且見獲何冦之攘時人不之信也未幾盜襲汝州以元平歸凡百莫不嗟服焉俄以本官同中書門下平章事登庸翊聖集作登翊聖皇匡弼大政造膝盡規諫之志當事無矜大之容援下情于上以酌天心順嘉譽于外用彰君德故一有致字績用茂著而人罕知之然其彰布於外敷聞在下者十有一二焉貞元初上以甸服長人天下理本於是親擇郎吏分宰於京師外部未幾而人謡大和擊壤之頌歸於帝力上召丞相告之左僕射平章蜀本有重字事張延賞忭蹈稱慶公俯伏不賀且曰甸服之政固宜慎重然則此屑屑者特京兆尹之職耳陛下當擇臣輩以輔聖德臣當選京兆以承大化京兆當求令長以親細事夫然後宜捨此而致理可謂愛人矣然非王政之大倫也不知所賀上深然之漢惠悅曹參之言絳侯慙曲逆之對考之前志我無負焉既而西戎乘間入邑詐以請盟侍中北平王璲建議許之自公卿已集作以下莫有異慮公獨陳謀獻畫言戎之詐固不可許竟留中不下而前議遂行於是册命上將涖盟諸戎果縱兵逼好大毆掠而去上召對前殿嘉嘆者久之時諫臣有廷爭陷於訕上者上未之善也公從容候間陳古以諷所以示寬裕之德招讜正之言詞旨切直意氣勤懇動合聖謨卒見納用無何工人有以埋乘輿服器得罪於左右者有司以盜易御物請論如法制初可之公不奉詔因抗疏曰跡其罪狀未甚指明方春殺人懼集作恐傷和氣上覽之大悅即原其罪刑官慎恤之事正於邦典聖君含育之德彰于天下論者難之時上相與光祿卿裴腆不協候公休沐以御酒或闕隂請貶之制命既行公堅執不下請訊支計之吏校其供入之實原本定罪窮理辨刑而腆竟獲宥克復本職白志貞有羈靮之勤獻利集作謀屢中上嘉其功效特寵異之方議大用公以為胥徒雜類出自微賤負乘致冦盜之招也纍疏以聞而止公竭誠盡忠憂勞庶務有耄忘之疾懇逼集作迫陳讓除右散騎常侍罷知政事貞元五年二月五日薨於昌化里終於散地故褒贈不及惟公致君之志孜孜焉不有怠也立誠之節侃侃焉無所屈也故處心積慮博蹇之道表于朝端弼違釋回朴忠之誠沃於帝念內有敢言之勇進當不諱之明用能直道自逹而無罪悔者也公纍更重任祿秩之厚布于宗姻無一㕓之土以處其子孫無一畝之宫以聚其族屬待祿而飽傭室而安終身坦蕩而細故不入其逹生知足落落如此夫其孝恭慈仁義行也集作子恭父慈善行也拊循致理能政也直亷潔靜儉德也拒疑獨斷明識也其冒危以扞牧圉大節也犯顔以陳訏謨至忠也有一於此尚宜旌褒矧兹備體烏集作焉可以已固當飾以榮號章示後來而故吏遺孤淪寓遐壤久稽尋典罪在宗屬敢用評隲舊行敷贊遺風若乃揚孔氏褒貶之文舉周公懲勸之法徴於誄諡則有司存謹狀貞元十五年三集作正月日故銀青光祿大夫右散騎常侍輕車都尉宜城縣開國伯柳公孫將仕郎守集賢殿正字宗元謹上後有尚書考功狀英華元編在八百四十一卷諡議門文苑英華卷九百七十五
