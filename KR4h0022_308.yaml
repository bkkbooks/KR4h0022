body:
  text: 文苑英華卷三百八宋李昉等編悲悼八懷古四十八首郢城懷古李百藥客心悲暮序登墉瞰平陸林澤窅芊眠山川鬱重復霸功文粹作王君資設險名都距江澳方城次北門溟海窮南服長䇿挫吳豕雄圗競周鹿萬乘重沮漳九鼎輕伊穀大搜雲夢掩壯觀章華築人世更盛衰吉凶良倚伏遽見鄰交斷仍覩賢臣逐南風忽不競西師日侵蹙運圯屬驅除時屯恣敲朴莫救夷陵火無復秦庭哭鄢郢遂邱墟風塵俄慘黷狐兔竟文粹作時逰踐霜露日沾沐釣渚曲文粹作故池平神臺層宇覆陳雲埋夏首窮隂慘荒谷悵矣舟壑遷悲哉年代倐雖異三春望終傷千里目金陵懷古唐堯臣晉末英雄起神器淪荒服胡月蝕中原白日升㿩谷金陵實形勝關山固重復巨壑隍北壖長江塹西隩鑿山擬嵩華穿地象伊穀草昧席羅圖華路戴黃屋一時因地險五世享天祿禮樂何煌煌文章紛郁郁多士春林秀作頌清風穆出入三百年朝事幾翻覆攙搶如雲勃鯨鯢旋自曝倦聞金鼎移驟覩靈龜卜吁嗟王氣盡坐悲天運倐天道何茫茫善淫乃相復行路偏疑衣半逐疑亡大梁族日隱汀洲上艫􅑳登川陸月迥吳山樹風聞楚江鵠因依蘭蕙聚採襭不盈掬峴山懷古陳子昂秣馬臨荒甸登高覽舊都猶悲墮淚碣尚想卧龍圖城邑遙分楚山川半入吳邱陵徒自出賢聖幾凋枯野樹蒼煙斷津樓晚氣孤誰知萬里客懷古正踟蹰白帝城懷古前人日落滄江晚停橈問土風城臨巴子國臺沒漢王宫荒服仍周甸深山尚禹功嵓懸青壁斷地險碧流通古樹生雲際孤帆出霧中川途去無限客思坐何窮洛川懷古劉希夷萋萋春風緑悲歌牧征馬行見白頭翁坐泣青竹下感歎前問之贈余辛苦詞嵗月移今古山河更盛衰晉家都洛濵朝廷多近臣詞賦歸潘嶽繁華稱季倫紫一作梓澤春草菲河陽亂花飛緑珠不可奪白首同所歸高樓倏冥滅茂林久摧折昔時歌舞臺今成狐兔穴人事互消亡世路多悲傷北邙是吾宅東嶽為我鄉君看北邙道髑髏縈蔓草闕碑塋或半存荆棘斂幽魂揮涕棄之去不忍聞此言巫山懷古前人巫山幽隂地神女艷陽年襄王伺容色落日望悠然歸來高堂夜金釭焰青煙頽想卧瑶席夢魂何翩翩搖落殊未已榮華倏徂遷愁思瀟湘浦悲涼雲夢田猿啼秋風夜鴈飛明月天巴歌不可聼聽此益潺湲蜀城懷古前人蜀土繞水竹吳天積風霜窮覽通表裏氣色何蒼蒼舊國有年代青樓思艷粧古人無嵗月白骨冥邱荒寂歷彈琴地幽流讀書堂玄龜埋卜室米鳳滅詞場陳圖一一在柏樹雙雙行鬼神清漢廟烏雀參秦倉歎世已多感懷心益自傷一作歎逝日已多感懷心自傷賴蒙靈邱境時當一作釣明月光商洛山行懷古張九齡園綺直秦末嘉遁此山阿陳迹向千古荒途始一過碩人久淪謝喬木自森羅故事昔常覽遺風今豈訛泌泉空活活樵叟獨皤皤是處清輝滿從中幽興多常懷赤松意復憶紫芝歌避世辭軒冕逢時解薜蘿盛明今在運吾道竟如何廣武懷古楊浚河水城下流登城望彌愜海雲飛不斷岸草緑相接龍門無舊場武牢有遺堞扼喉兵易守捫指計何捷天奪項氏謀卒成漢家業鄉山遙可見西顧淚盈睫再登河陽城懷古朱延客逰倦旅思憩駕陟崇墉元凱標竒迹安仁擅美蹤逺近濁河流出沒青山峯佇想空不極懷古悵無從瞿唐懷古杜甫西南萬壑注勍敵兩崖開地與山根裂江從月窟來削成當白帝空曲隱陽臺疏鑿功雖美陶鈞力大哉登廣武楚漢古城集作登廣武古戰場懷古李白秦鹿奔野草逐之若飛蓬項王氣蓋世紫電明雙瞳呼吸八千人橫行起江東赤精斬白蛇叱吒入關中兩龍不並躍五緯與天同楚滅無英圖漢興有成功按劍清八極歸酣歌大風伊昔臨廣武連兵決雌雄分我一杯羮太皇乃爾集作汝翁戰爭有古迹壁壘頽層穹猛虎嘯洞壑飢鷹獵集作鳴秋空翔雲列曉陳殺氣赫長虹撥亂屬豪聖俗儒安可通沈湎呼竪子狂言非至公拊掌黃河曲嗤嗤阮嗣宗月夜金陵懷古前人蒼蒼金陵月空懸帝王州天文列宿在霸業大江流緑水絶馳道青松摧古邱臺傾鳷鵲觀宫沒鳳凰樓别殿悲清暑芳園罷樂逰一聞歌玉樹蕭颯集作瑟後庭秋一作千古不勝愁秋夜獨坐懷古前人少集作小隱慕安石逺逰學子平天書訪江海雲卧豈一作起咸京入侍瑶池宴出陪玉輦行誇胡新賦作諌獵短書成但奉紫霄顧非邀青史名莊周空説劍墨翟耻論兵拙薄遂踈絶歸間事耦耕顧無蒼生望空愛紫芝榮牢集作寥落暝霞色微茫舊壑情秋山緑蘿月今夕為誰明此詩集以懷故山為題語亦相應今英華作懷古故入此門恐誤登敬亭山南望懷古贈竇主簿前人敬亭一回首目盡天南端仙者五六人多集作常聞此逰盤溪深集作流琴高水石聳麻姑壇白龍降陵陽黃鶴呼子安羽化騎日月雲行翼鵾集作鵷鸞下視宇宙間四溟空集作皆波瀾決絶目下事從之復何難百年集作嵗落半途前期浩漫漫強食不成味清晨起長嘆願隨子明去煉火燒金丹鄴中間氣集作城懷古孟雲卿朝間氣集作欲發淇水南將盡北燕路魏家舊城闕寂寞無人住伊昔天地閉曹瞞一作公獨守一作中據羣臣將北靣白日忽西暮三臺竟寂寞一作寥萬代良難固一作萬事難長固雄豪一作圖安在哉衰草沾霜露崔嵬長河北尚應想劉墓古樹藏乖龍一作龍蛇荒茅伏秋兔永懷故池館數子連章句逸興驅山河雄辭變雲霧我行覩遺迹精爽如可一作相遇斗酒將酬君悲風白楊樹出蕭關懷古陶翰驅馬擊長劍行旅至蕭邉悠然五原上永眺關河前北虜三十萬此中常控弦秦城亘宇宙漢帝理戎旃刁斗鳴不息羽書日夜傳五軍計莫就三䇿議空全大漠橫萬里蕭條絶人煙孤山常瀚海白日照祁連愴矣苦塞奏懷哉式微篇更悲秦城月夜夜出胡天南楚懷古劉長卿南國久蕪漫我來一作生空欎陶君看章華宫處處生黃蒿但見陵與谷豈知賢與豪精魂託古木寶玉捐江臯倚棹下晴景回舟隨晚濤碧雲暮寥落湖上秋集作青天高往事那堪問此心徒自勞獨餘湘水上千載聞離騷春草宫懷古前人君王不可見芳草舊宫春猶帶羅裙色青青向楚人金陵懷古司空曙輦路江楓盡詩選作暗宫潮野草春傷心庾開府老作北朝臣湘中懷古戴叔倫昔人從逝水有客弔秋風何意千年隔論心一日同楚亭方作亂漢律正酹功倏忽桑田變讒言亦已空京口懷古前人大江橫萬里古渡渺千秋浩浩波聲險蒼蒼天色愁三方歸漢鼎一水限吳州霸國今何在清泉長自流湘州懷古釋清江瀟湘連泪羅復對九疑河浪勢屈原冢竹聲漁父歌地荒征騎少天暖谷禽多脈脈東流去古今同奈何蕪城懷古李端風吹城上樹草沒城邉路城上明月時精靈夜來去金陵懷古劉禹錫潮滿臺城渚日斜征虜亭芳洲新草緑幕府舊煙青興廢由人事山川空地形後庭花一曲幽怨不堪聼西塞山懷古前人西晉樓船下益州金陵王氣漠一作黯然收千尋鐵鎖沉江底一片降幡出石頭人世幾回傷往事一作荒苑至今生茂草山形一作古城依舊枕寒流今逄四海為家日故壘蕭蕭蘆荻秋一作而今四海歸皇化兩岸蕭蕭蘆荻秋一作皆唐宋類詩荆門道懷古前人南國山川舊帝畿宋臺梁館尚依稀馬嘶古樹行人歇麥秀空城野雉飛風吹葉落填宫井火入荒墳化寶衣徒使詞臣庾開府咸陽終日苦思歸西江懷古杜牧上吞巴漢控瀟湘怒似連山靜鏡光魏帝縫囊真戲劇符堅投箠更荒唐千秋釣艇集作舸歌明月萬里沙鷗弄夕陽范蠡清塵何寂寞好風唯屬往來商汴口集作河懷古前人錦纜龍舟隋煬帝平臺復道漢梁王逰人還集作間起前朝念折桞孤吟斷殺腸姑蘇懷古許渾宫館餘基輟棹過黍苖無限獨悲歌荒臺麋鹿爭新草空苑鳬鷗占淺莎江上集作吳岫雨來虛檻冷海邉風起集作楚江風急逺帆多可憐國破忠臣死日月東流生白波金陵懷古于濆館娃宫畔顧國變生嬌妬勾踐膽未嘗夫差心已誤吳亡甘已矣越勝今何處當時二國君一種邉江墓金谷懷古前人黃金嬌石崇與晉爭國力更欲住人間一日買不得行為忠信住身是文章宅四者俱不聞空傳墮樓一作墜樓客楚江懷古三首蒼葭又玄集作蒼山馬戴露氣寒光集微陽下楚邱猿啼洞庭樹人在木蘭舟廣澤生明月蒼葭夾亂流雲中君不降竟夕自悲秋二驚鳥去無際寒蛩鳴我傍蘆洲生早霧蘭隰下微霜列宿分窮野空流注大荒看山候明月聊自整雲裝三野風吹蕙帶驟雨滴蘭橈屈宋魂𡨕寞江山思寂寥隂霓侵晚一作反景海樹入回潮欲折寒芳薦明神拒可招釣臺懷古劉駕澄流可濯纓嚴子伹垂綸孤坐九層石逺笑清渭濵潛龍飛上天四海豈無雲清氣不零雨安使澆詩選作洗埃塵我來吟高風髣佛見斯人江月尚皎皎江石亦磷磷如何臺下路明日又迷津建鄴懷古楊乘故城故壘滿江濆盡是干戈舊苦辛君見即須知帝里一作力生來便作太平人秣陵懷古李羣玉野花黃葉舊吳宫六代豪花一作華燭散風龍虎勢衰佳氣歇鳳凰名在故臺空市朝遷變秋蕪緑墳壠高低落照紅霸業鼎圖人去盡獨來惆悵水雲中汴河懷古二首皮日休萬艘龍舸緑絲間載到揚州盡不還應是天教開汴水一千餘里地無山二盡道隋亡為此河至今千里賴通波若無水殿龍舟事共禹論功不較多金陵懷古崔塗葦聲蕭颯水天秋吟對金陵古渡頭千載是非輸蝶夢一樽風雨屬漁舟若無仙分應須老幸有青山即合休何必登臨更惆悵比來人世只如浮青山集作山歸比來人世集作本來身世南海石門戍懷古陳陶漢家征百越落疑地喪貔貅大野朱旗沒長江赤血流鬼神尋覆族宫廟變荒邱唯有朝臺月千年照戍樓塗山懷古前人落拓書劍晚清秋鷹正籠塗山間來上敬愛如登龍覽古覺神王翛然天地空東南更何有一醉先生風惟昔放勳世隂晦徹一作亂成洪皇圖化魚鱉天道漂無蹤帝乃命舟楫掇芳儒素中高陳九州力百道驅歸東舊物復光明洪爐再埏鎔經門不私子足知一作示天下公亮曰疑那並生唐虞禪華蟲茲山朝萬國一賦寰海同十載有區宇秋毫皆帝功垂衣不驕德子桀如何聾握髮聞禮賢葺茆見卑宫凡夫色難事神聖安能一作龍恭道隱三千年遺芳播笙鏞當時執圭處佳氣仍童童海嶼儼清廟天人盛祗供玄恩及花木丹讖名崆洞異代草澤臣何由樹勳庸堯階未曽識誰信平生忠恨不當際會預為執鞭僮勞歌下山去懷德心無窮春日秦國懷古周朴荒郊一望欲消魂涇水縈紆傍逺村牛馬放多春草盡原田耕破古碑存雲和積雪蒼山晚煙伴殘陽緑樹昏數里黃沙行客路一作路客不堪回首思秦原望中懷古前人齊心樓上望浮雲萬古千秋空姓名堯水永消天際去姬風一變世間平高蹤盡共天一作煙霞在大道長將白日明一作日月從此安然寰海內後來無復謾相傾謝公亭懷古張喬謝家煙徑長莓一作蒼苔牢落虛櫩一作欄竹上開流水不將山色去間雲時帶角聲來六朝舊迹遺詩在三楚空江有鴈回逹理始應惆悵盡因僧清話憶天台咸陽懷古韋莊城邉人倚夕陽樓城上雲凝萬古愁山色不知秦苑廢水聲空傍漢宫流李斯不向倉中死徐福應無物外逰莫怪楚吟偏斷骨野煙蹤迹似東周金陵懷古王貞白恃險不種德興亡歎數窮石城幾換主天塹謾連空御路疊民冢臺基聚牧童折碑猶有字多記晉英雄文苑英華卷三百八
