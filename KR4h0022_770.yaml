body:
  text: 文苑英華卷七百七十一宋李昉等編連珠梁宣帝二首沈約二首吳均二首劉孝儀為人作二首庾信擬作四十四首蘇頲為人作二首喻對喻古之治一篇冶家子言一篇奔蜂對一篇招野龍對一篇連珠連珠二首梁宣帝嘗一作常聞盈虛之道雖修平而必陂損益為用一作之由在至象而無蠲是以謂地之厚而東南缺惟天為大而西北懸嘗一作常聞山有藏玉則草木常榮林有猛獸則藂枝莫採是以漢儀重見皇王之迹有真周禮猶存龜蒙之田無改同前二首沈約臣聞烈風雖震不斷蔓草之根朽壤誠微遂霣崇山之峭是以一夫不經一作住威於赫怒千乘或一作必致忘於巧笑臣聞鳴籟受響非有志於要風涓流長邁寧厝心於歸海是以萬竅怒號不叩而咸應平川是納用卑而為宰同前二首吳均蓋聞豔麗居身而以娥眉入妬貞華照物而以絶等見猜是以班姬辭寵非無妖冶之色楊子寂寞豈乏炫曜之文蓋聞義夫投節未必識君烈士赴危豈一作非期要利是以墨子縈帶不蒙肉食之謀申胥泣血非有執圭之位為人作連珠二首一作探物作豔體連珠劉孝儀妾聞洛妃髙髻不資於草澤玄妻長髮無藉於金鈿故雲名由於自美蟬稱得於天然是以梁妻獨其妖豔衛姬專其可憐妾聞芳性染一作深情雖欲忘而不歇薰芬動慮事逾久而更思是以津亭掩馥秪結秦婦之恨爵臺餘妬追生魏妾之悲擬連珠四十四首庾信蓋聞經天緯地之才拔山超海之力戰陳勇於風飈謀謨出乎胸臆斬長鯨之鱗截飛虎之翼是以一怒而諸侯懼安居而天下息蓋聞蕭曹贊務雄略所資魯衛前驅威風所假是以黃池之會可以爭長諸侯鴻溝之盟可以中分天下蓋聞解封豕之結塞長蛇之源必須製裳千里歃血轅門是以開百里之圍用陳平之一䇿盟千乘之國須季路之一言蓋聞得賢斯在不藉揮鋒股肱良哉無論應變是以屈倪左傳作屈完疑避諱而改參乘諸侯解方城之圍干木為臣天下無西河之戰蓋聞邯鄲已危徒思馬服薊城去矣空用荆軻是以竹杖扶危不能正武擔之石蘆灰縮水不能救宣房之河蓋聞穴蟻衝泉未知逺慮玄禽巢幕何能支久是以大厦既焚不可灑之以淚長河一決不可障之以手蓋聞膏脣喋喋市井營營或以如簧自進或以狙詐相傾是以子貢使乎五都交亂張儀見用六國縱橫蓋聞謀猷是習權變須長時增齊竈或卧燕墻是以井陘之兵如鴻毛之遇火長平之卒若秋草之中霜蓋聞彼黍離離大夫有喪亂之感麥秀漸漸君子有去國之悲是以建章低昻不得猶瞻灞岸德陽淪沒非復能臨偃師蓋聞市朝遷貨山川悠逺是以狐兔所處由來建始之宫荆棘參天昔日長洲之苑蓋聞天方薦瘥喪亂𢎞多空思説劍徒聞枕一作憶投戈是以劉琨之英略莫知自免祖逖之慷慨裁能渡河蓋聞榖林長逺蒼梧不從唯桐惟葛無樹無封是以隋珠日月無益驪山之火雀臺絃管空望西陵之松蓋聞雷驚獸駭電激風驅陵厯開塞枕跨江湖是以城形月偃陳氣雲鋪非緑林之散卒即驪山之叛徒蓋聞死别長城生離函谷遼東寡婦之悲代郡孀妻之哭是以流慟所感還崩杞梁之城灑淚所沾終變湘陵之竹蓋聞三世用兵既非貽厥陰謀纍葉必以凶終是以李都尉之風霜上蘭山而箭盡陸平原之意氣登河橋而路窮蓋聞營魂不反磷火宵飛時遭獵夜之兵或斃空亭之鬼是以射聲營之風雨時有寃魂廣莫郡之陰寒偏多夜哭蓋聞江黃戎馬之徼鄢郢風飈之格乍有去而不歸或無期而逺客是以章華之下必有思子之臺雲夢之傍應多望夫之石蓋聞無怨生離恩情中絶空思出水之蓮無復回風之雪是以樓中對酒而緑珠前去疑帳裏悲歌而虞姬永别蓋聞樹彼司牧既懸百姓之命及乎厭世復傾天下之心是以一馬之奔無一毛而不動一舟之覆無一物而不沉蓋聞嚴霜之零無所不肅長林之斃無所不摽是以楚塹既填遊魚無託吳宫已火歸燕何巢蓋聞名髙八俊傷於閹竪之黨智周三傑斃於婦女之計是以洪澤之蛟遂挫長飢之虎平臯之蟻能摧失水之龍蓋聞吳艘蜀艇不能無水而浮以紅間緑此句疑不能無弦而射是以籠樊之鶴寧有六翮之期骯髒一作航上之馬無復千金之價蓋聞性靈屈折鬱抑不揚乍感無情或傷非類是以嗟怨之水特結憤泉感哀之雲偏含愁氣蓋聞遷移白羽流徙房陵離家析里悽恨撫膺是以吳起之去西河澘然出涕荆軻之别燕市悲不自勝蓋聞廉將軍之客館翟廷尉之髙門盈虛倐忽貴賤何論是以平生故人灌夫不去門下賔客任安獨存蓋聞執圭事楚慱士留秦晉陽思歸之客臨淄羇旅之臣是以親友會同不妨懷撫悽愴山河離異不妨風月關人蓋聞五十之年壯情久歇憂能傷人故其哀矣是以譬之交讓實半死而言生如彼梧桐雖殘生而猶死蓋聞秋之為氣惆悵自憐耿恭之悲踈勒班超之念酒泉是以韓非客秦避讒無路信陵在趙思歸有年蓋聞懸鶉百結知命不憂十日一炊無時何耻是以素王之業乃東門之貧民孤竹之君實西山之餓士蓋聞胸中無學猶手中無錢今之學也未見能賢是以扶風之髙鳳無故棄麥中牟之寧越徒勞不眠蓋聞十室之邑忠信在焉五步之內芬芳可録是以日南枮蚌猶含明月之珠龍門死樹尚抱咸池之曲蓋聞百尺之髙纍於九碁之上千鈞之重懸於一木之枝是以截虎尾而非險傷龍鱗而未危蓋聞居蘭處鮑在其所習白羽素絲隨其所染是以金性雖質處劍即凶水德雖平經風即險蓋聞豫章七年斃於豐草芳蘭九畹淪於幽谷是以欲求其真晉陽有自埋之蒿若賞其聲吳亭有已枯之竹蓋聞明鏡蒸食未為得所干將補履尤可傷嗟是以氣足凌雲不應止為一作官武騎才堪王佐不應直放長沙蓋聞勢之所歸威之所假必能繫風捕影暴虎馮河是以輕則鴻毛沉水重則磐石陵波蓋聞意氣難干非資扛鼎風神自勇無待翹關是以曹劌登壇汶陽之田遽反相如睨柱連城之璧更還蓋聞卷葹一作施不死誰必有心甘蕉自長故知無節是以螺蚌得路恐異驪淵雀鼠同歸應非丹穴蓋聞北邙之髙魏君不能削榖洛之鬭周王不能改是以愚公何德遂荷鍤而移山精衛何禽欲銜石一作枝而塞海蓋聞君子無其道則不能有其財忘其貧則不能耻其食是以顔回瓢飲賢慶封之玉杯子思銀珮美虞公之垂棘蓋聞水之激也實濁其源木之蠧也將拔其根是以延年之家預論掃墓羊舌之族先知滅門蓋聞磨礪脣吻脂膏齒牙陵風扇毒向影吹沙是以敬而逺之豺有五子吁可畏也鬼有一車蓋聞虛舟不忤令德無虞忠信為琴瑟仁義為庖厨是以從莊生則萬物自細歸老氏則衆有皆無蓋聞三關頓足長城垂翅既羇既旅非才非智是以烏江艤楫知無路可歸白鴈抱書定無家可寄為人作連珠二首蘇頲夫情有理會不可以理遣行有義得不可以義愆定其情者則理無滯寶其行者則義有全故韓馮之妻死哀吟於松上石崇之妓生效命於樓前夫恩至深而必報言至信而罔遺繫於我者深不可奪牽於彼者信不可欺故操刀而割豈為他人所汚書扇而殞竟還夫氏之尸喻對喻古之治盧碩軒昊之代君為心兆民為百骸堯舜之代君為目兆民為物三代之時君為醫兆民為疾五伯之治君為工兆民為材二漢之時君為隄兆民為水夫心治則百骸從視明則衆物露醫善診則疾不彌漸工善度則木無棄材故委心乃無為軒昊之治自治也不言而人化任目必有待堯舜之治求治也敦序九族平章百姓醫不全則生死危三代之治存乎仁各以所尚救弊工不審則曲直乖五伯之治資於智選賢舉能逮斯已降民為水矣政為隄矣漢武好攻討宣帝任刑名隄之不完水漂邑矣哀平之後寢乎曹馬乃成壞衰焉干紀亂常皆其臣佐􅐵民不可使為水水而隄之困矣然則軒昊誠堯舜朋三代仁五伯智二漢法禁人之叛也禁之以致君為敵兆民有寇讐焉冶家子言陸龜蒙武王既伐蜀本作勝殷懸紂首有泣於白旗之下者有司責之其人曰吾冶家孫也數十年間載易其鎔範矣今又將易之不知其所業故泣吾祖始鑄田器嵗東作必大售殷賦重秉耒耜者一發不敢起吾父易之為工器屬宫室臺榭侈其售益倍民凋力窮土木中輟吾易之為兵器會諸侯伐殷師蜀本作軍旅戰陳興其售又倍前也今周用鉞斬獨夫四海將奉文理吾之業必壞吾亡無日矣武王聞之懼於是苞干戈勸農事冶家子復祖之舊奔蜂對晉悼公見奔蜂屬土于墉負桑蟲而置之若有言者不勝其疑也即召師曠以詰其事曠對曰奔蜂無子負蟲而祝之祝之不怠故其形隨之而化也公駭其説曠因從而理之曰伊蜂也欲蟲肖已之速是故祝之誠夫誠之感物雖千品萬形之殊未有不從而應之者也誠之不逹感之不應雖體質外均而其心化為他類矣臣願以人事明之在昔堯欲天下之治祝舜以禪之舜恐天下未治祝禹以傳之傳之誠故三姓之天下化為一家之治也是則堯舜非不能化其子蓋將傳其祝於至公也是臣又敢以晉國事直啓王心冀王之速悟日者曲沃桓叔恤民務德有國之人被其祝無幾而化之雖晨風鬱林魚龍趨潭不是過也逮乎獻公納士蒍之讒逐羣公子伐麗戎而嬖其女使太子將東山之師尨涼玦離顯以義絶讒言卒行見新城之酷二公子繼踵而奔亡當是時懼獻公之毒不啻狼虎之磨牙也此則父化為虎狼矣既而使兵伐蒲又加兵於屈視其子之居不啻寇戎之所聚也此則子化為寇戎矣文公在外十九年賢士五人為之輔公蚤夜而祝之故異體化為一身也及夫齊桓妻以宗女一作支楚成待以諸侯送之於秦卒以得立此則化於他國不能化於父子聞諸獻公未嘗誠而祝之也是知善祝而他類化者奔蜂也不祝而已子離者獻公也君子謂公之智不如蜂蜂猶能蕃其類今君先有晉國宜乎上保宗廟之基下近疑作延百代之資擇其可化而化之無俾奔蜂逞術於君王悼公曰小問而大獲孤之幸也孤其念焉乃立其彪為太子而使田蘇為傅招野龍對昔豢龍氏求龍之嗜欲幸而中焉得二龍而飲食之龍之於人固異類以其若已之性也席其宫沼百川四溟之不足遊甘其飲食洪流大鯨之不足味施施然擾擾然二字蜀本作擾於其愛弗去一旦值野龍奮然而招之曰爾奚為者茫洋乎天地之間寒而蟄㿩而升能無勞乎誠能從吾君而晏安乎野龍矯首而笑之曰若何齪齪乎之如是耶賦吾之形冠角而被鱗賦吾之德泉潛而天飛賦吾之靈噓雲而乘風賦吾之職仰驕而澤枯觀乎無極之外息乎大荒之墟窮端晲而盡變化其樂不至耶今爾苟容於蹄涔之間惟泥沙之是拘惟蛭蚓之與徒牽乎嗜好以希飲食之間是同吾之形異吾之樂者也狎其一作於人啖其利者扼其喉胾其肉可以立待吾方哀而援之一作哀之援之以手一作首又何誘吾納之陷穽耶而不免矣野龍行未幾果為夏后氏之醢文苑英華卷七百七十一
