body:
  text: 文苑英華巻八百五十六宋李昉等編釋七唐河南龍門天竺寺碑一首陳州龍興寺碑一首荆州玉泉寺大通禪師碑一首元識闍梨盧墓碑一首唐河南龍門天竺寺碑蘇頲形噐分有宰匠名言立有導師上聖卓然大仙之㫖也定融於惠惠無不眀眀證于覺覺無不定虚一作若其照然觀我動以權而應物智周斯大功利斯逺繼善者循乎業欲仁者適乎變業乃至於無相變復存於有作使因城之廣刹土之嚴其來尚矣天竺寺者天竺王子避位出家三藏法師寳思惟之立也夫所宗謂道道崇可讓位况生於佛國所慕惟法法住可濟時况行於人代其吳季子安世髙之事魯仲尼康僧㑹之徒歟不然何以諦俗歸真秉彛𢎞教之極也故哲於東震發自南離藏戒珠却商寳陵海漲而絶雲島矣屬䑦􅑳傾其伍兩餘星拆其三翼法師於呀呷渺瀰之際覩觀世音像一軀隨而載之凢七夕觀音則聖極於既堕迦葉以神刑於既沒海可以化為之迹變入諸身若是乎海本如故則荆䧟莫致𤓰歩浮盃遂往孰喻乘桴於中道捨筏於彼岸邪至則冕旒賛歎京師翕習意吉之而仍得目摩睠之更生與之紉觧徴而張絶緒也始憇西眀寺譯金光眀楞迦文殊師利呪藏廣博嚴净陀羅尼浴像功徳大寳積等經七部顧而言曰機輪未兆礙之殊域志成已信乘之坦塗今㣲言載歇宻藏咸啟吾其往矣况求法不二觧空第一竟起西閤之群必擇東林之衆常謂洛京關塞山㫁川流枕城池於正陽當日月於亭午脉脉中㵼逶迤左薄黄道映以為界翠瓶臨而見空天下地勢之寄也故寳塔曽􅐻鏡龕延袤御梯慿下敷座因髙具次八四方成萬億皆黙而許之感遂通者法師乃亂流東濟止彼香山又於山北見龍泉二所洞澈深淺則鋪丹孕碧噀珠連而上跳廽夐經復則小雨微風㸃拆瓊而傍散積礫摇動光輝自然琉璃混成毛髮可數法師樂之爰創方丈隣於咫尺堅持願力善誘檀心皆撤無之歡豫盡布金之湏逹更于其側造浮圖精舍焉飛觀遥峙仙莖崛起逺而趣之虚空縹渺於其間近而察之岑壑青熒于表裏羗難得而名也景雲嵗辛亥月建已日辛夘制以法師所造寺賜名曰天竺惟皇建極與天比崇教設而風靡化行而日用法師不忘本而遂初乎殿中侍御史趙國李畬字玉田育粹含采妙機強學佑其垂成憲以從事法師即於東山之偏建丈六石龕匪泐而攻載追而琢四衆圍繞萬人唱和疑隴埏之朝隤狀羅浮之暗徙則圓熖石乳凝隂水精香封韞玉花麗交纓諒殊特也若乃立三㑹開八關撞鴻鐘伐靈鼓引清梵稱神呪向之䨇泉氛氲五色雲止烟絶星流火變亟福應而神滋焉每熈春載陽具物和暢此都人士則填城隘陌自北而南遺光相渉群聽相接震聞乎數十里外無不舉袂隂峯楊橈沸水潔誠而往脩禮而去爾其倚紅樹慿丹檻清泠窈窕聲聞下上披光若㓕人得至天其崇信也如彼其安閑也如此禪期樂净道詎越于身心觀其惡囂事已冥於世界寺之梵衆徳無量無轉不退輪永於斯也沙門圓實宻行精苦辨才酬對以尸臣之命功藏於宫大夫之靈徳譔乎廟矧夫清凉有地常所住持忉利為天宛其相似文殊以之演說耆城因而廽向者復何如哉雕而頌之可也俾宣偈曰洛之表兮伊之東山有香兮泉道蒙攅櫨疊栱兮飛在空錯石雕珉兮生梵宫乘豁險兮開素波望參差兮圖綵虹維妙力兮歸大雄天竺之子心定惠輪轉聖王道光濟山之曲泉之涯兮特勝縁與𢎞誓永安居而悟寂混群物而同契陳州龍興寺碑張說觀夫廣大無相者虚空也四輪倚之而住精微無體者佛性也萬法因之以生聖人有以見三界成壌皆有為殻故剖之以戒觜聖人有以見六趣輪廽是無眀綱故决之以定刄爍寳光之慧炬沛善利之慈舟返迷路率於中道徛横流登於彼岸以見乎真實之要緫攝一乘以言乎天地之間曲成萬物大矣哉道心包舉等大虚而無際法教流通彌曠刼而常在則有乘如來方便出應化門用大事集作土因縁䖏帝王位俾庻類咸若謂之光宅天下令衆生脩善名為荘嚴佛國龍興寺者皇帝即位之嵗漙天之所置也唐祚中微周徳更盛歴載十六姦臣擅命伯眀氏有盗國之心一闡提有害聖之迹皇上操北斗起東朝排閶闔運扶摇張目而叱之殷乎若震雷發地歘虩翕響以克彼二㓙赫然若太陽昇天晞熈仰象以復我萬邦返元后傳國之璽受光武登壇之玉尊祖繼宗郊天祀地之禮既泊循舊布新改物班瑞之典又被乃考出世之法鼓大雄之事入無功用之品住不思議之力一光所燭庻兆為之清净一音所宣大千為之振動雲蒸風靡不崇朝而壌之踊闕天下矣陳州者上古太皡之墟近世集作代淮陽之地置守則列為郡封王則建為國本其風俗豪侈靡麗舊矣翿東門之下接袂成帷觴宛丘之上炫服成市信豫章疑之郊一都㑹也刺史南陽韓府君名琦其為邦也勝殘去殺聖主之得賢臣别駕彭城郡王名𢎞集作隆業其從政也能肅而恭髙陽之有才子長史南陽張齊賢儒林之選也司馬河南雲盈公族之良也士曹從事八人録事叅軍于璆為稱首六屬官人二十五人宛丘縣令崔脩以為稱首或以藝榮或以門進髙車一轍羙利同人禮舉刑清於是乎在因邦甸積稔之蓄偶日月正旦之初欽若王言建立靈寺上畧其趾下務其終百工不勸而亟庻役不徴而㑹經始如雲成之不日夫其帯四郭五衢之陌踞重墉闤闠之端福地砥平長垣雲矗髙門有閎大厦斯飛連廊曲閣交軒對霤木磨而不彫圡塗而不餙壯無僣侈以約費為功儉無偪陋以净居為寳法王宫殿居花界進作近寳花之城菩薩伽藍住金燈之地亦猶是也上座處元寺主真度維那守慎等戒珠如月獨㓗麒麟之行法寳如山普聞師子之吼克諧善衆底定神居甘露飽而滿盈集作盈滿天香醉而圍繞于時陳項之老褒衣而慱帯皤皤然相造而諏曰乆矣吾黨之惑也倥伺顓蒙情實横放我悉愛僕集作恙愛我業聦眀不開日有忘其生生月無覺其滅滅一息之福集作漏可勝言哉如集作而令舉足至於道塲申臂及于净土晝則目禪誦之事夜則耳鍾梵之音何悟是生晩臻斯樂豈不思天子之至仁乎惻下人之昏墊邁集作遹上聖之昭軌假有相之途詣無生之理洒冥澤於已滅葉元根於未始百靈之所歸依萬宇之所欣喜非獨陳而已矣葢神闢天聖開地世之祖也纂帝寳基皇統孝之主也殄璚狂破魔孽威無外也廣正典紹度門德無大也通幽洞眀兼麤該精滂洋而行混䕶厥成一收功而四善舉一推心而群願立咨如是則龍興之化曷有量哉夫業可大而蕪没焉不貽於後事可尊而苞藴焉不述於世臣子之罪也敢其圖之然言語之不到者心識心識之不到者真如二乘聞之而不見十地見之而未了而我云何能知能說竊比六時之鳥十寶之樹是出乎和雅音聲是讃乎微妙功徳記其在處長者之金園銘其事因育王之石柱其辭曰聖帝集作皇在上於昭于天唐雖舊邦其命維新龍興反正集作返正滅三暴臣少康非擬於舜為隣皇王蒸哉其一於廓元教生人户牖神化洒心小大稽首掌擎萬域潜移仁夀三代之前盖未曽有最上乘哉其二泱泱陳服韓候道之奕奕寳坊邦人造之天龍䕶持聖賢熈熈受福維其帝心則怡正理興哉其三荆州玉泉寺大通禪師碑譔夫惣四大者成乎身矣立萬法集本文粹作始者主乎心矣身是虗哉即身見空始同妙用心非實也觀心若幻乃等真如名數入焉妙本乖言說出焉真宗隐故如來有意傳要道力持至德萬刼而遥付法印一念而頓受佛身誰其𢎞之大通寳禪師其人也禪師尊稱大通諱神秀本姓李陳留尉氏人也心洞九漏懸觧先覺身長八尺秀眉大耳應王伯之象合賢聖之度少為諸生遊問江表老莊元㫖書易大義三乘經綸四分律儀說通訓詁音叅吳晉爛乎如襲孔翠玲然如振金玉既而獨鍳潜發多傷傍弛文粹作多間旁施逮知天命之年自㧞人間之世企聞蘄州有忍禪師禪門之法徹也自菩提達磨天竺東來以法傳慧可慧可傳僧璨僧璨傳道信道信傳𢎞忍繼名重跡相承五光乃不逺遐阻飜飛謁詣虚受與沃心懸㑹髙悟與真乘同徹盡捐二本作盡指妄識湛見本心住寂滅境行無是處有師而成即燃燈佛所無言可二本作依而說是空王法門服勤六年不捨晝夜大師嘆曰東山之法盡在秀矣命之洗足引之並坐於是涕辭而去退藏於宻儀鳯中始立玉泉名在僧録寺東七里地坦山雄目之曰此正楞伽孤峯度門蘭若䕃松藉草吾將老焉雲從龍風從虎大道出賢人覩岐陽之地就去城都華隂之山學如來市未云多也後進得以拂三有超四禪昇堂七十味道三千不是過也爾其開法大畧則專二本作惠念以息想極力以攝心其入也品均凡聖其利二本作到也行無前後趣定之前萬縁盡閉發惠二本作慧之後一切皆如持奉楞伽逓為心要過以往未之或知乆視年中禪師春秋髙矣詔請而來趺坐覲君肩輿上殿屈萬乘而稽首洒九重而宴居傳聖道者不北面有盛德者無臣禮遂推為兩京法主三帝國師仰佛日之再中慶優曇之一現然處都邑婉其祕㫖每帝王分座后妃臨席鴛鴦四匝龍象三遶時熾炭待礦故對黙而心降時診飢投味故告約而義領一雨漙霑於衆縁萬籟各分二本作吹於本分非夫安住無畏應變無方者孰能焉文粹作至爾乎聖敬日崇朝恩代積當陽初㑹之所置寺曰度門尉氏先人之宅置寺曰報恩軾閭名鄉表德非儗局猒諠輦長懐虚壑累乞還山既聽中駐乆矣衰憊無他患苦魄集作魂散神全形遺力謝神龍二年二月二十八日夜中顧令扶坐文粹作命坐泊如化滅禪師武徳八年乙酉受具于天宫至是年丙午闕終於此寺盖僧臘八十矣生於隋末百有餘年二本作岁未嘗自言故人莫審其數也三界火心四部氷背榱崩梁壊雷動雨泣凢諸寳身生是金口故其喪也如執親焉詔使弔喪二本作哀侯王歸贈二本作賜三月二日冊謚大通展餙終之義禮也時厥五日假安闕塞緩反二本作及葬之期懐也宸駕臨决文粹作訣至午橋王公悲送至伊水羽儀陳設至山龕仲秋既望還詔乃下帝諾先許㝠遂宿心太常卿鼔吹導引城門郎監䕶二本作䕶監喪葬是日天子出龍門泫金櫬登髙停蹕目盡廽輿自伊及江挾二本作扶道哀候幡花百軰香雲千里維十月哉生魄眀即舊居後岡安神起塔國錢嚴餙賜逾百萬鉅鍾是先帝所鑄群經是後皇所賜金牓御題華幡内造塔寺尊重逺稱標絶初禪師形觧東洛相見南荆白霧積晦於禪山素蓮寄生於坐樹則䨇林變色泗水逆流至人違代同符異感百日卒哭也在龍華寺設大㑹八千人度二文粹有十字七人二祥練縞也咸就西眀道塲數如前㑹萬廽菩薩乞施後宫寳衣盈箱珎價敵國與寵貴二本舉寵作親費侑供廵香其廣福博因存沒如此日月逾邁榮樂二本作落相推鳴二本作於戯法子永戀宗極痛慈舟之遽失恨湧二本作洞塔之遲開石城之嘆也不孤廬山之碑焉可作竊比夫子貢之論夫子也生於天地不知天地之髙厚飲於江海不知江海之廣深强名無跡以慰其心銘曰額珠内隐匪指莫効心鏡外塵匪磨莫照海藏安靜風識牽樂不入度門孰探法要倬焉禪伯獨立天下功收宻㫖二本作詣觧却名價二本作假誦二本作詣無所得觧亦都捨月影空如現如悞二本作於悞者無量衆善二本作善爾為父為師露清熱惱光射昏疑冀將住世萬夀無期奈何過隙一朝去之嗟我法門二本作門人憂心㫁續進憶瞻仰退思付囑盡不離定空非滅覺念兹在兹敢告無學元識闍梨廬墓碑夫孝者法象乎天地感通乎鬼神故愛敬之中又有真報哀戚之外更追冥福元識禪師其人也厥姓桑氏其先長樂人洪尚書洪之後也曽祖梁州刺史諱千秋祖貴郷縣令諱信考文林郎諱爽自前代無違徳基於累仁是生逹者禪師智周萬物而理證本無願度四生而見滅諸有以為空不離色體念子之慈業不忘縁起思親之孝乃於萬山北陌滎陽東原葬先考文林府君先妣太原王氏負土成墳結廬其域置義井取施無求報鑄洪鍾取聞而悟道脩古寺造尊容取覩相生信若夫信生攝攝生靜靜生定定生慧於生滅處得常住心於虚空中立一切法其定慧之門乎禪師昔宴坐界山群虎自擾今經行宰樹四衆依德至人凝寂雖罕見全象識者餘論亦時存一隅篆羙豐石寄詞短偈云爾邈矣上徳行宻道髙哀哀父母生我劬勞禪心䕶念神之遊遨若河雖廣曽不容舠甘井既渫利物無竭不増不滅不流不滯仁靜而鍳知動而悅華鍾既鏗雄雄法聲如來如去如滅如生不有奚得不為胡成寶地嚴餙金光晃耀善惡無門惟人所召境因見集作心起理慿思照孝集作慤哉一心混成衆妙文苑英華巻八百五十六
