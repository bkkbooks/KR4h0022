body:
  text: 文苑英華卷五百四十五宋李昉等編關門道路門三十一道關門棄符繻判一道作刻出關判二道越關判三道謁者私度關判一道恩賜綾錦出關判一道宫門誤不下鍵判三道向街開門判一道新作南門判一道道路廬樹判二道道路判一道徑踰判一道科木作道判一道穿墻出水判一道開溝向街判一道染甕灑塵判一道街內燒灰判一道造橋判一道縣令不修橋判三道私雇船渡人判四道不修橋判一道關門棄符繻判岐州參軍郭丹充計吏在路遺棄符繻及至大震關贈令五千文而府吏胡有捉丹越度告令取受隴州依狀結罪二人不伏對漢陽故國隴岑舊境若一作眷彼郭丹效官兹邑同元淑之計吏比孫楚之參卿而重關設險是稱襟帶因辨馬而方來候鳴雞而載入符繻且棄雖有異於終軍道德斯留亦何慚於柱史從兹經度未失事宜若論尹喜之辜誰執伯陽之罪胡有妄告欲一作合抵刑書在於二人何所推鞫作刻出關判寧成抵罪得脫乃作刻出關漢書作解脫詐刻傳出關未知科何罪對寧成刻薄為吏威酷成章吞舟之魚翻聞不漏觸隅之鳥遽見無逃不能戮辱自明羈遲取效而乃背叛西土蓄積南山刻傳既曰詐欺踰關豈為誣罔請置周侯之罰仍從漢相之科同前鄭自新錫以忠貞庶諧輕典嗟乎漢吏眷彼寧成不見德音唯聞刻薄乳虎之怒士卒所驚貪狼之名區宇攸震擅南方之利益志在徇私叛西土之寵章心懷背國刻傳既稱虛假論辜深是乖違請置金科方形玉律越關判越度關府欲科罪稱告急切不暇請公文對張欽敬恭維我王設險以守是立關禁防諸來遊彼何人斯干國之紀異驅傳之高節非買符之逹人去必乘星學雞鳴而夜度行惟渴日談馬邑而朝迷此則匿姦於心詐偽難恕縱急切以文過豈刑章之可逃速歸爾尤無惑朝憲同前封玠王者署一作置避諱關是為巨防所以察出入驗符繻故終軍入秦棄之以擊節臧文相魯廢之而受嫌彼何人斯輒此踰越稱急切之利往冀刑章而免科當今烽堠無虞蠻貊請職荒徼不聞於擊柝私室寧容於度關請科罔上之人用杜慿虛之説同前于孺卿因固作關設險居國豈伊征算是隔夷夏踰則歸法理惟其常越何人斯初聞有告棄繻抗志無似終軍之遊辭謀遂行且殊蘧瑗一作伯避諱之出彼則請給寧異公文足可坐視更籌候雞鳴而容度豈謂意陵霄漢學鳬飛而影移行雖有由越侵無狀置之於理其誰不然謁者私度關判汾陽縣竟戎幼學弱冠應舉西入關遂委過所至京不應作對退從小選補謁者戎情思罷歸請過所專一曹司以無來文不給對竟戎地接汾河業膺洙泗道標強學擅英妙於州一作鄉閭年在弱冠慕明􅤬一作經於鄉國籋雲行地載馳千里之路警露聞天爰振九臯之響遷亭記柱馬生之壯志可追函谷棄繻終軍一作子之雄心尚在雖言髙方朔而調下孫𢎞便抑大成將從小選入仕有吏曹之耻出關無使者之榮名宦以調役生悲田園以歸來興嘆昔時過所以委於中途今日行文須慿於下署無宜部傳不可買符事在𢎞通理難退抑恩賜綾錦出關判安息國莫賀逺來入朝頻蒙賜綾錦等還將自隨關司以物皆違樣不放過對劉穆之莫賀就日輸琛占風削袵既踰蔥嶺便集藳街頻承湛露之恩幾荷油雲之施至若綾開翥鶴映睢浦以成文錦縟翔鴛艷江波而濯色近九重之厚錫充萬里之輕齎關司以寄重咽喉任光襟帶物皆違樣既生非馬之疑事乃出蕃須既鳴雞之失既緣恩賜有異常途勘責不虛固難留滯宫門誤不下鍵判安上門應閉主者誤不下鍵對吕令問門闥洞開國都以赫禁鑰一作錮下同崇設王府則有兹率厥典欽乃攸司重城建扄安上題榜當天衢以南豁臨帝庭而北峙上以發皇明之壯觀下乃備他盜之非常瞻彼主司或殊善閉闔而不鑰已彰慢藏開而不鍵誰測深意但人同於失雖有類於茅茹法貴在寬尚未方於莧陸若謂一時有誤須稽錯失之由必當外户不扄寧纍升中之化請捨小過無傷大猷幸未深於滅耳庶無勞於噬臍同前姚震職司其居官以物辨茍失其道孰云其憂杲杲重城上列雲霞之氣昭昭洞闔傍連紫翠之宫所以崇邃髙深隔閾中外所以伺一作可非執異服驚讋非良鐘鼓司時自可密而善閉煙光滅景翻乃虛而不關扄鍵空施隄防靡寄且此之職守用備非常故而不嚴誰曰其誤宜致繩愆之責以懲慢官之罰同前王維設險守國金城九重迎賔逺方朱門四闢將以晝通阡陌宵禁姦非眷彼閽人實司是職當使秦王宫裏不失狐白之裘漢后廏中唯通赭馬之迹而乃不施金鍵空下鐡關將謂堯人可封固無狗盜之侣王者無外有輕魚鑰之心過自慢生陷兹詿誤而抱關為事空欲望於侯嬴或犯門有人將何禦於臧紇固當無疑必置嚴科向街開門判于門告張第向街開門第云祖父有勳蔭對王諲東海于門髙容駟馬南陽張第榮珥七貂通德未孚薄言斯露或以霞扉晝敞臨大道之青樓畫栱雲構接長楊之綺陌有同樹塞不逺人境車馬之客相闐冠蓋之賔坐合若也人惟白屋奢僣之辜何逭必其地是朱門公侯之家始復有勳有蔭既未審於髙卑應闔應開誠可窮其新舊敬申三覆然定五刑新作南門判甲新南門或人糾不時訴稱以新易舊對楊成象門戶攸設姦慝是禁以開以閉在昏在晨當啓塞之從時實終始而合制若位崇列國名大諸侯因農隙而度功既日至而斯畢且魯門所作丘明書以不時長府匪仍宣聖議其有改蠢兹甲者興事不臧雖善閉之典聿修而從時之宜或紊糾之則可稱易奚為道路廬樹判啇子行飲食失節生疾抑云廬氏井樹不修對李融先王作則以廣利制命以居人故官立井樹旅有施舍相彼廬氏實曰職司在故事之允修於從政乎何有既而日暮途逺商子載馳轅端莫向馬首靡託既傷行旅之感加之暴露之憂寒溫失時以干六物飲食不節是生百病且國生納幣咎在晉卿江氏失布盜由楚相玉毁於櫝罪有所在同前栁潤之四人有業天下同歸理在營生方先潤屋貨賄山積是往來於五都珍竒海輸乃森羅於九市眷言商子實職貿遷一作貨資襲弦髙之風為絳侯之事經途所亘多跋涉之勞飲宿乖宜爽隂陽之候野廬所掌井樹是修何得曠於主司致有損於行李遂使銀牀罷汲無郝子之投錢碧樹摧榮聞茅生之危坐盍歸司敗以正刑書懲其已犯之愆永息將來之弊道路判乙主路三十里置作館州按其違古制詞云險陸相半對趙良玉國有郊鄙道有室廬是崇委積以待羈旅眷夫惟乙則曰司存掌彼康衢順帝之則修其候館虧古之制公家之事為之式可舊章不率誰敢允從且十里有廬五十里有館典經攸著龜玉是司徒以險陸為詞其如專擅之罪徑踰判乙有畝種田苦徑踰者訴廬氏不禁對國勸勤農户分田畝三時克務九穀斯登乙有良疇頗為膏壤我疆我理式辨於溝塍是藨是蓘以薅蒿音其荼蓼觀黍稷之薿薿見麻麥之芃芃佇成庾億之詠冀貯畝鍾之積推耕讓畔異間田之莫爭越陌度阡爽野廬而不禁乃徑踰而是苦實網漏而將踈蹊田奪牛昔聞太甚議獄詰鼠合則持平宜稽廷尉之法用正野廬之罪科木作道判當路多石所由科木作道科擅賦役對繕理通衢必遵時令蓋藏多暇農人務間既刋木以為工亦隨方而適用於是取材深谷興役平人將肆力於夷塗必希心於公道馳騖由其克濟行李於是知歸何所虧違論其罪坐必情惟害物據法須峻刑名若功可利人撫狀猶宜奬應縣為斷結理未融平請更下推使其無訟穿墻出水判甲孟穿牆為水竇流其惡於街衢坊人論告對甲孟池遙汾澮居此閭閻喧上陌之風塵亂中衢之車馬攸繁湫隘未適間居仰甲第而多慙顧衡扉而自惡鄰光近接亦重於丘墳竇孔傍流忽染於泥滓遂使浮雲之騎坐惜連乾道路之人行嗟揭厲流惡既侵於五府議刑還抵於三章牒送有司用懲其失開溝向街判丁開溝向街流惡水縣令責情杖六十訴違法既有文不合責情並仰依法正斷對惟丁門接通衢美非仁里異汾澮而流惡成閭閻之致沼遂使軒車曉一作晚度將墜於曳輪銅墨風行有聞於箠令雖禮律之目彼此或殊小大之情得失斯在而法有恆禁政貴移風故議事之刑則符令典妄情之訴期於自息染甕灑塵判丙傾染甕惡街衢縣令笞丙云便灑軌塵於事無廢對孫欽望閭閈撲地咽綺城之歌吹軒車沸曉度紫陌之煙埃攸更湫隘或資灑掃丙也業在門居向惟街道傾兹染甕殊漢隂之息機灑以香街異汾水之流惡黃圖作宰當旌卧疾之奇玄覽滌除令察軌塵之穢將加箠令允符鞭作灑濘之愆已聞揭厲無良之刺難漏刑名令既有科自成美錦之製丙期無訟難雪素絲之泣街內燒灰判余月望日西市商人街內燒灰曝布署令梅登一作澄以其犯禁決三十致死家人訴濫刑對令狐紹先赤帝司節朱明肇位月一作日當既望時屬正陽理通幽化之急須長明生之氣商人徇利小子鬻賈同長房之居産不得神仙類弦髙之聚財寧宜犒士遂焚灰上路曝布長衢既觸隂科且犯陽禁躔次有纍於干紀草木不滋於殖豐梅澄所守薄有笞刑精氣為物頽齡俄謝論辜不知於內外定罪須慿於繩墨家人雖訴須審而行一作如何造橋判河陽欲造石梁以費廣請造舟計風烏燕海亦用鬻巨萬州使相爭不定對孫崇古河陽地即帝畿境惟天邑石季倫之别業吹樓雲斷潘河陽之古縣春樹花開波石沿洄沓崑崙之水車馬闐咽俟黿鼉之構虹梁鵲柱既暫勞而永逸風烏海燕但有損而無成爰叩兩端且多職競將申一部希效管窺宜興鞭石之功無取接舟之議縣令不修橋判長安萬年縣坐去嵗霖雨不修城內橋被推按訴云各有司存不伏科罪對天開紫極地列鎬京渭水即飲龍之津橫橋得牽牛之象而二縣稱劇兩城攸壯望雙闕而如雲對九途一作逺而若厲頻年淫雨中逵泥濘石梁隳構鐡鎖不修馬惜連乾遲回於欲渡人嗟揭厲歎息於無良既愆十月之期須明三典之坐然則據地雖從縣管修橋乃合監營職司自可為憂有詞無宜濫罰飭五材而入用選百工以就程俾令蜿蟺如虹佇見闌干若斗請凖此狀各牒所由同前崔翹顧兔離星商羊應雨浸厚地而沮洳灑長天而蕭索凝雲不動履雙闕而朝躋行潦坐流匝四溟而夜下遂使鵲橋牢落虹影欹傾石杠成而鐵鎖暗移舊枝壞而新查亂墜兩城之內是曰帝居作漕自合修營赤縣元非管屬輒被推按乃涉濫刑至於司存事資懲罰牒問由緒方正科條同前趙和中京帝宅上洛星橋宫城俯臨九重密邇康莊或斷一切停留架海黿鼉誰看往迹填河烏鵲不見新營冠蓋相喧遏紅塵而不度車徒競擁駐白日而移隂修構既在科須差遣誠歸正典事合屬於將作不可責以親人訴者有詞請停推劾私雇船渡人判洛水中橋破絶往來渡縣令楊忠以為時屬嚴寒未可修造遂私雇船舫於津所渡人百姓杜威等連狀舉忠將為幹濟廉使以忠懦弱不舉職事以邀名欲科不伏對上洛飛湍中橋施構參差危柱若星影之全開斷絶浮梁似虹光之半起望九衢之車馬未見川流瞻兩岸之風煙更疑波委楊忠宣風帝輦作宰神州以修造之辰當沍寒之節私雇船舫公然來往論惠雖是恤人語事便非濟物且雨畢理道水涸成梁莫不率由舊章抑亦編諸甲令故違憲法自置刑科廉使以懦弱繩愆正符厥理杜威以幹濟連狀未識其宜同前圭㕓勝壤鼎邑名都八逹開衢傍連鶴嶠九重危堞近枕龜津鐵鎖長橋衣冠不絶金錢廣埒車馬相望楊忠擢以茂材宰斯京縣屬虹梁落構翠瀲驚波滯商賈於平川阻騑驂於上路將以日躔南陸氣叶冬郊當此沍寒難於修葺役徒未集且叶愛人船舫有私何乖高事杜威藴德載述風猷廉使繩違遽投霜翰究其所以蓋取義於隨時觀其所由亦何煩於褒貶同前李孝言曲洛圭㕓交風鼎邑途開九逹城控八關積溜澄雲王子吹笙之浦驚湍落日馮夷剖蚌之川衣冠之所往來商賈於焉交集所以亘兹星柱架此虹橋疑海上之浮黿似天津之飛鵲誠合因人啓塞隨事修營豈可使曲一作直岸全崩危梁中絶驚波渺渺却停流水之車急浪悠悠翻擁桃花之騎楊忠蒞斯劇縣輒樹私恩不遵十月之規有損二周之化造舟之義自有公營浮航之機詎宜私雇道橋有闕懦弱可知請依直指之科置以曲從之坐同前崔釋三川朝市六合樞機冠蓋如雲擁金錢之馬埒軒車若水赴鐡鎖之虹橋遐邇所資往來為要不謂波湍溜激柱朽梁推捉烏鵲填河空餘處所驅黿鼉駕海尚有規模自合修營豈宜停廢楊忠位光銅墨境控圭㕓仙舸橫流異林宗之共泛漁船逗浦非仲卿之來逰縱徇私情恐乖公理雖當冬月况屬間時造橋用功冀暫勞而永逸渡船費力但有損而無成官橋自可官修何關縣長私船輒為私雇便纍宰君郡人褒揚將何稱首廉察附請即可甘心以狀告知庶無喧訴不修橋判得丁為刺史見冬涉水者哀之下車以濟之觀察使青其不順時修橋以徼小惠丁云恤下對津橋不修何以為政車服有命安可假人丁職是榮集作崇班體非威重輕漢臣之寵失位於髙車徇鄭相之名濟人於大水志雖恤下道未集作昧叶中與其熊軾涉川小惠未遍曷若虹橋通路大道甚夷啓塞既闕於日修揭厲徒哀其冬涉事關失政情近沽名宜科十月不成庶辨二天無政文苑英華卷五百四十五
