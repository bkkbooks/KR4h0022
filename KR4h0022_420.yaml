body:
  text: 文苑英華卷四百二十宋李昉等編赦書一登極赦書睿宗受禪制蘇頲門下天下神器非上聖無以運其機域中大業非元良無以固其本欽若靈命寅奉神宗屈已順人用安四海承祧主鬯實貞萬國頃者家臻大憫在疚惟憂梟獍滿衢豺狼塞路武職戎政必任凶族國要時權咸升逆黨社稷之守但望苞桑忠義之懷誰期艾棘階禍稔惡伺隙乘間煩言碎辭所不勝述皇太子隆基正氣凝姿端命育德自家刑國英徽日甚移孝為忠雄謨電發北軍馳入掃欃槍於紫微南宮反正開日月於黃道平亂寧國翼戴朕躬一旅不勞功逾復禹七德咸舉事邈興周聲應吹銅望當歸璧令司空讀册侍中授璽實由立義豈曰尚親承華肇開元嗣以建方流樂風之緒宜申洊雷之澤朕爰初踐極喜氣呈祥天人叶心象緯昭貺官名有紀年號用慿可大赦天下睿宗受禪制唐大詔令作即位赦內制門下朕聞自古帝王光膺圖籙則尊尊親親之義著于典謨諒在至公蓋非獲已我大唐乘時撫運纍聖重光當四海之樂推受三靈之眷命大行皇帝奄棄宇縣痛結仇讐朕志掃巨逆保寧嗣主今皇帝哀煢在疚託于朕躬勤懇再三願成兹意朕以不德偎承丕緒念今追昔載感于懷若涉大川罔知攸濟思荷宗祧之業屬此惟新式揚渙汗之恩與之更始可大赦天下開元皇帝受禪制門下繼明嗣德王者所以承天尊祖奉先聖人所以崇孝闕上之禮著乎重華月朔之祠襲乎文命猗歟作頌發流濬哲之祥清廟升歌思表配天之業歷選前載可得而言我國家首出開元繼文膺統七代觀德至道洽於生人三后在天垂裕光於後嗣太上皇帝道超寰表功軼帝先名言不測於乾行仁智不知於日用纍讓神器非以黃屋為尊俯膺大寶蓋為蒼生屈志黎人於變淳化斯登載懷脫屣疇咨菲薄竭讓德之志天眷莫廽陳拜一作邦非首之誠中襟逾邈遂以寡昧祗踐宸居循顧紹庭載深寅畏爰撰初吉躬展肅雍虔肆獻之儀申大號之典神保之饗斯洽介福之道攸宣億兆同歡人祗同慶恭承聖訓申兹霈澤可大赦天下大中十三年十月九日嗣登寶位赦編制門下朕聞龍之騰天漢也則必乘風雲鼓雷電以震詔令作霈非六合君之踐大寶也則必敷仁惠煥號令以煦萬方是以地不間於幽遐事罔論於輕重洪聖興而皇渥溥德音振而庶類蘇故愆咎咸除枯沉盡起斯皆前代令典國朝成規委轡諒戒於惠姦凝命詔令作旒始懷於布澤肆詔令作顧豫寡德嗣纘丕圖夙夜乾兢若俯泉谷永惟我髙祖太宗之艱難締構又惟我列聖之慈儉統承思所以克紹休明𢎞濟億兆剗氓俗之弊清理化之原肇祥導和應天順物致歡心於率土知恭已以臨人爰申在宥之恩用洽惟新之慶可大赦天下自大中十三年十月九日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不免者咸赦除之惟犯十惡叛逆及故殺人官典犯贓及持杖行劫並不在此限其故殺人者已傷未死已死更生意欲殺傷偶得免者並同已殺人法處分又刑獄之內官吏用情推斷不平因成寃獄無問有贓無贓不在原免之限在降官量移近經量移者更與量移其合復資者五品以上中書門下即與處分六品以下仍依常例選集丁憂去任及在憂制受貶者服闋日亦與量移如有親故在上都任經所司陳狀便與處分不必更待本州府申請其别勑因責受降資正官及曽因忤纍停免未經引用者並與進一作追改流入配𨽻及别勑安置不問道俗及已到未到者並與量移近處先已再經量移者仍並放還流貶人中從元勑云雖逢恩赦不在量移之限或長流及充百姓終身勿齒者並與中書門下量與收敘處分及量移近處如已亡殁家口欲還及須歸葬者聽隨所在一無此字便如緣葬事幼弱飢窮不能自濟者委所在長吏量給棺櫬優恤發遣坐纍嵗深加刑已衆纍經赦令允未該恩用𢎞開網之仁俾釋向隅之戚應元和末惡黨前後處斷人數已多自今已後宜一切不問先有勑令追捕未獲者亦更不復追獲應先關連上件配流人并家口等縱元勑云長流充百姓雖逢恩赦不在量移及放還限者並與量移近處如到流所經六載仍並放還如已亡殁家口欲還並準前流人等例處分天德五城流人負罪素重元勑未經十載不得放還今屬鴻恩頒令沾及宜減三年如年已滿便放還如情願便住者亦聽在降官及流人先有官者如有亡殁各還本官亡官失爵痕纍禁錮者並從洗滌唯自今年八月九日已後坐事流貶並不該此新恩之限營奉園陵所資發未備慮其科率困撓黎元應緣山陵制及喪儀禮物宜委中書門下及諸官之長講求故實必誠必信務遵遺旨用副朕懷所緣山陵用度近已出內庫及户部錢物克給應緣人夫功價宜各速令所司以不折估匹假兼見錢分數支給不得令侵屈百姓山陵未畢情禮有異其降誕進奉宜且權停志方思於遂物心匪樂於從禽止備搜畋所宜節減諸道進鷹鷂每年共許進二百聨仍選擇堪處進奉餘悉放免貢獻無藝物力難充華靡不除時風豈厚諸道節度觀察使除大例合貢獻外不得别有進奉雕文刻鏤及異色綾錦難得寶貨一皆禁絶京畿賦役頗繁河洛凋瘵亦甚欲其綜疑息當在蠲除京兆府今年秋青苗錢宜每貫量放五百文所放錢如是府司占留色目即委户部準舊例據數支填不得令有虛折其大中七年已前百姓積欠兩稅斛斗及青苗𣙜酒并稅草職田􅀈麨棘等徵收不得空繫簿書亦並放免如在官典所由腹內不在此限河南府今年秋青苖錢宜每貫量放三百文如是府司占額錢數亦委户部準例支填應人積欠府司及度支户部鹽鐵諸司大中七年已前諸色錢物斛斗銀錫草等如身已逃亡及身在貧窮家業蕩盡頻經校料終無可徵納者宜並放免如在主掌人吏所由腹內者不在此限逋負年多徵攤力竭咸令已責庶可惠貧度支户部鹽鐵三司應收管在城及在府州并諸色場鹽大中七年已前欠負諸色錢物斛斗等除官典所由請領官錢和糴市及在場官招商所由腹內外其餘人户所欠錢物如身家已亡殁或在貧窮家業蕩盡無可徵納并逃竄捕捉未獲囚繫妻男攤徵保人等如此之類虛挂簿書中無填納之日宜并放免如聞後赦令蠲免放欠負所司不及時處分元係簿書徒有蠲免之名却為分外攪擾今所放錢物宜各令本司差辦事官典據年額人户姓名所欠錢物色目檢勘便下文帳不得更起條樣勘逐所徵可放生事擾人仍令所在場鹽院及州縣於要略分明懸榜示人户俾令知悉仍仰所司各限月日處分訖具所放錢物單數分折聞奏災沴流行黎氓困窘免其租稅漸冀輯寧諸道州府有遭水損甚處其今年各納苖稅錢等委長吏酌量蠲放如大中十二年已前欠負兩稅米在百姓腹內徵收不上者亦宜特放其實遭災沴處仍具折聞奏聞抱器逢時諒恩展用卑棲疏迹能不懷嗟如聞中外官僚或有滯屈雖限以員闕致此因循而念其考歷孰非勤舊宜可中書門下各量才分漸與選改廣我四聰在於多士才𢎞景化思拜昌言諸色人若上封事極言時政得失有官司者官吏長收狀聞奏無祿位者任自投匭進狀當必親覽須務體國公言不得用情謗訕每想候封嵗思於荒稔莫非玉土物合通其有無諸道州府閉糴禁錢頗為弊事前後赦勑纍有條具尚恐因循依前壅塞宜委出使郎官御史切加察訪如有違越即具奏聞叛徒相扇既已翦除屬類潛逃宜從寬宥湖南江西嶺南宣歙等處去年所遭狂冦擾亂尚恐軍人百姓至今未安如先有為患一作惡者關連親族或逃竄尚未復歸今一切不問仍各委本道長吏分明曉諭切加招誘安存勿令疑懼如百姓曽經被賊俘劫錢物官與收獲得者仰分明勘認本主給還勿使曖昧欺隱仍具分折聞奏如聞京城內富饒之徒不守公法厚利放債損陷飢貧前後纍有勑文約勒非不丁寧無良者都不遵守致貧乏之人日受其弊宜令京兆府準寶歷三年四月二十日及開成二年八月二日勑文切加提舉曉諭嚴切約勒處分凶險之輩情狀難容如聞將吏傭保奴僕之徒或因愆過發遣之後輒生怨謗捃拾本使及郎主細微之事意在僥求苟無所得便成恐脅或暗投無主文字或擅進文狀此若不絶交害平人自今已後宜凖律文及大中二年九月十日及大中六年八月二日勑便於當處焚燒所由不得收領及與聞奏其擅進文狀宜勘責重加科誠如所由固違勑文不焚燒所投文書尚敢將出當與告訴者同罪其容修文狀挾姦蠧者委臺府及諸軍諸使切加訪察如有此色便捉獲送府縣推問須令痛懲天下州郡於所公用之餘收糴年谷自備水旱以救疲人賑絶及時免待奏請探聞惠物頗謂通規今年正月一日赦文但令不别置倉盧煩别差官吏主當所以令寄常平義倉任自分别支用如聞所在州郡未能盡諭詔旨衮入常平義倉縱遇年豐不務糴斂謬為廢閣切在舉明令所在州郡細詳今年正月一日赦條處分其刺史去任日仍委本道觀察使便以在任日所收貯斛斗多少支數以為考課言念士子祿以代耕選人例迫飢寒逺赴調集頻年被駐情實可矜宜令吏部準今年正月一日赦文處分廣敬坤儀當舉推恩之典垂仁盤石在霑霈澤之榮太皇太后及元昭皇太后第二等以上親委中書門下量才敘用大長公主嗣王各與一子出身九廟子孫陪位者普恩之外各加兩階無官者各賜勳兩轉仍據使主封後與一人出身委宗正司卿檢詳圖譜一房最沉翳者充數具名奏聞宗子中有行義可稱才幹足用者亦委搜採一作擇具名銜事狀送中書門下量才敘用內外文武見在及致仕官三品已上賜爵一級四品以下加一階仍賜勳兩轉應入三品欠一考未足者考足日聽敘致仕官量與改轉依前致仕弼諧萬物鎮靖四方洎于文武具寮咸宣忠力並稟義方之訓宜推錫賚之恩追飾寵光式彰孝理中書門下及諸道節度使帶平章事祖父母亡殁未經追贈者並與追贈已經追贈者更與改贈東郡留守諸州府長官在京及分司常參官神䇿衛金吾六軍統軍將軍四衛十二衛將軍威逺營鎮國軍等使父母亡殁未經追贈者並與追贈品秩已崇請回贈祖父母者亦聽父在無官者量與致仕官父殁母存量與已有邑號者量與進改竭力扶危捨生取義不旌後嗣曷表遺忠故尚父汾陽王贈太師晟贈太尉秀實子孫中各與一人正員官張巡許逺南霽雲顔真卿杲卿子孫中各與一人出身祗奉典册誠禮無違宜被優恩以酬厥效即位日攝太尉奏詞中書令讀册侍中進寶承旨宣制奏外辦禮畢各與一子正員七品官奉寶書綬讀册及書玉册官各特加一階書寶押寶授舉升寶册官溥恩之外加兩階合選人減一選其餘應職掌人行事及寫制令太常條選儀注等官三品已上更賜爵一級四品加階仍賜勳兩轉中書門下儀制官內侍省內教各特加一階鐫造玉册並填金字造寶裝寶册人等各賜物五十假承顧命撰制册文及寫制官並已有升其餘自八月九日至十三日諸寫制誥官各加二階大明宮留守及緣國慶告郊廟太清宮行事官三品已上賜爵一級四品以下加一階應緣崇册太皇太后及追諡元昭皇后册禮職掌行事官及鐫造册寶填金字人等節級賜物周詩歌白馬之客魯國闡素王之風尚德崇儒宜旌胄裔二王三恪文宣王子孫各與一子出身藩邸臣寮誠勤久著各加優奬用示恩榮鄆王府官今年八月九日已前在任者五品以上並與進改六品以下所司非時與分流外畨考已足未足並放入流內侍省及鄆王府官三品已上賜爵一級四品已下加一階五品以下賜勳兩轉八月九日至十三日北內當上及從駕者四品以下溥恩之外賜爵一級五品以下更加一階自身更賜勳兩轉神䇿六軍金吾威逺皇城將士三品以上賜爵一級四品以下加一階仍並賜勳兩轉馳奉章奏分居職役册勳進級甄彼勤勞諸道進奏官及緣國慶奏表到京者溥恩之外各加一階仍賜勳兩轉翰林侍詔并諸色直長及供奉人等三品以上賜爵一級四品以下加一階無階者賜勳兩轉飛龍間廄宮苑典引掌扇內園總監栽接少府將作中尚書武德軍器內外弓箭庫等諸使下白身及無品直司定額長者雜匠巧兒黃衣長上監門直長雜仗二衛七色引執駕細引執扇角手拿彍騎武士天文觀生歷生漏生典鼓工人樂人主膳主酪典食手宰手掌間幕士駕士御醫工獸醫門僕藥童御書手流外行署等賜勳兩轉宿陳仗衛師旅有勞委質蕃方偏禆著郊咸加奬賚庶給恩榮應赴御樓立仗神䇿六軍金吾威逺及皇城等將士宜準舊制量賜錢帛其神䇿軍應在畿內鎮將亦各賜物有差應諸道將校三品以上賜一級四品以下加一階無階賜勳兩轉逺人慕義上國貢獻將表懷柔俾霑寵錫鴻臚禮賔院蕃客等各賜物有差禮經重於問年宜加廪餼王化存於勸善用激里閭天下耆老八十已上者各賜絹兩匹粟二石九十以上各賜絹三匹粟米五石並以上供錢常平義倉粟充給仍令令長親致縣庭宣詔頒賜不得委人吏致有欺隱其九十以上者仍加板授孝子順孫義夫節婦旌表門閭終身勿事先有旌表者凖耆老例優賜除弊安人由於制命寢而不用致理良難大中以來頻有赦令有司廢閣多不遵行宜委中書門下檢尋提舉有便於人者次第施行或有事理未盡不便於人者仍委中書門下及所在長吏條具聞奏其法詳斷刑獄今年正月一日赦書已有條具處分仍本司切加提舉遵守施行不得輒有隳紊峻極靈長效祥興利俾申祀典以逹明誠五嶽四瀆名山大川各委本道長吏以禮致祭亡命山澤挾藏軍器百日不首服罪如初赦書有所不該載者所司明作條具聞奏敢以赦前事相告言者以其罪罪之赦書日行五百里布告遐邇咸使聞知主者施行文苑英華卷四百二十
