body:
  text: 文苑英華巻四百二十宋李昉等編赦書一登極赦書睿宗受禪制蘇頲門下天下神器非上聖無以運其機域中大業非元良無以固其本欽若靈命寅奉神宗屈已順人用安四海承祧主鬯實貞萬國頃者家臻大憫在疚惟憂梟獍滿衢豺狼塞路武職戎政必任㐫族國要時權咸升逆黨社稷之守但望苞桑忠義之懷誰期艾棘階禍稔惡伺隙乗間煩言碎辭所不勝述皇太子隆基正氣凝姿端命毓徳自家刑國英徽日甚移孝為忠雄謨電發北軍馳入掃欃槍於紫微南宮反正開日月於黃道平亂寧國翼戴朕躬一旅不勞功逾復禹七徳咸舉事邈興周聲應吹銅望當歸璧令司空讀冊侍中授璽實由立義豈曰尚親承華肇開元嗣以建方流樂風之緒宜申洊雷之澤朕爰初踐極喜氣呈祥天人叶心象緯昭貺官名有紀年號用慿可大赦天下睿宗受禪制唐大詔令作即位赦内制門下朕聞自古帝王光膺圖籙則尊尊親親之義著于典謨諒在至公盖非獲已我大唐乗時撫運累聖重光當四海之樂推受三靈之眷命大行皇帝奄棄㝢縣痛結仇讐朕志掃巨逆保寧嗣主今皇帝哀㷀在疚託于朕躬勤懇再三願成兹意朕以不徳偎承丕緒念今追昔載感于懐若渉大川罔知攸濟思荷宗祧之業屬此惟新式揚渙汗之恩與之更始可大赦天下開元皇帝受禪制門下繼明嗣徳王者所以承天尊祖奉先聖人所以崇孝闕上之禮著乎重華月朔之祠襲乎文命猗歟作頌發流濬哲之祥清廟升歌思表配天之業歴選前載可得而言我國家首出開元繼文膺統七代觀徳至道洽於生人三后在天垂裕光於後嗣太上皇帝道超寰表功軼帝先名言不測於乾行仁智不知於日用累譲神器非以黃屋為尊俯膺大寳盖為蒼生屈志黎人於變淳化斯登載懐脱屣疇咨菲薄竭譲徳之志天眷莫廽陳拜一作邦非首之誠中襟逾邈遂以寡昧祗踐宸居循顧紹庭載深寅畏爰撰初吉躬展肅雍䖍肆獻之儀申大號之典神保之饗斯洽介福之道攸宣億兆同歡人祗同慶恭承聖訓申兹霈澤可大赦天下大中十三年十月九日嗣登寳位赦編制門下朕聞龍之騰天漢也則必乗風雲鼓雷電以震詔令作霈非六合君之踐大寳也則必敷仁惠煥號令以煦萬方是以地不間於幽遐事罔論於輕重洪聖興而皇渥溥徳音振而庶類蘇故愆咎咸除枯沉盡起斯皆前代令典國朝成規委轡諒戒於惠奸凝命詔令作旒始懐於布澤肆詔令作顧予寡徳嗣纉丕圖夙夜乾兢若俯泉谷永惟我髙祖太宗之艱難締構又惟我列聖之慈儉統承思所以克紹休明𢎞濟億兆剗甿俗之弊清理化之原肇祥導和應天順物致驩心於率土知恭已以臨人爰申在宥之恩用洽惟新之慶可大赦天下自大中十三年十月九日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不免者咸赦除之惟犯十惡叛逆及故殺人官典犯賍及持杖行刼並不在此限其故殺人者已傷未死已死更生意欲殺傷偶得免者並同已殺人法處分又刑獄之内官吏用情推斷不平因成寃獄無問有賍無賍不在原免之限在降官量移近經量移者更與量移其合復資者五品以上中書門下即與處分六品以下仍依常例選集丁憂去任及在憂制受貶者服闋日亦與量移如有親故在上都任經所司陳狀便與處分不必更待本州府申請其别勑因責受降資正官及曽因忤累停免未經引用者並與進一作追改流入配𨽻及别勑安置不問道俗及已到未到者並與量移近處先已再經量移者仍並放還流貶人中從元勑云雖逢恩赦不在量移之限或長流及充百姓終身勿齒者並與中書門下量與收叙處分及量移近處如已亡殁家口欲還及須歸塟者聽隨所在一無此字便如縁塟事幼弱饑窮不能自濟者委所在長吏量給棺櫬優恤發遣坐累嵗深加刑已衆累經赦令允未該恩用𢎞開網之仁俾釋向隅之戚應元和末惡黨前後處斷人數已多自今已後宜一切不問先有勑令追捕未獲者亦更不復追獲應先闗連上件配流人并家口等縱元勑云長流充百姓雖逢恩赦不在量移及放還限者並與量移近處如到流所經六載仍並放還如已亡殁家口欲還並准前流人等例處分天徳五城流人負罪素重元勑未經十載不得放還今屬鴻恩頒令沾及宜減三年如年已滿便放還如情愿便住者亦聽在降官及流人先有官者如有亡殁各還本官亡官失爵痕累禁錮者並從洗滌唯自今年八月九日已後坐事流貶並不該此新恩之限營奉園陵所資發未備慮其科率困撓黎元應縁山陵制及䘮儀禮物宜委中書門下及諸官之長講求故實必誠必信務遵遺㫖用副朕懐所縁山陵用度近已出内庫及户部錢物克給應縁人夫功價宜各速令所司以不折估匹叚兼見錢分數支給不得令侵屈百姓山陵未畢情禮有異其降誕進奉宜且權停志方思於遂物心匪樂於從禽止備蒐畋所宜節減諸道進鷹鷂每年共許進二百聨仍選擇堪處進奉餘悉放免貢獻無藝物力難充華靡不除時風豈厚諸道節度觀察使除大例合貢獻外不得别有進奉雕文刻鏤及異色綾錦難得寳貨一皆禁絶京畿賦役頗繁河洛凋瘵亦甚欲其綜疑息當在蠲除京兆府今年秋青苗錢宜每貫量放五百文所放錢如是府司占留色目即委户部准舊例㨿數支填不得令有虚折其大中七年已前百姓積欠兩税斛㪷及青苗𣙜酒并税草職田􅀈麨棘等徵收不得空繫簿書亦並放免如在官典所由腹内不在此限河南府今年秋青苖錢宜每貫量放三百文如是府司占額錢數亦委户部准例支填應人積欠府司及度支户部鹽鉄諸司大中七年已前諸色錢物斛㪷銀錫草等如身已迯亡及身在貧窮家業蕩盡頻經校料終無可徵納者宜並放免如在主掌人吏所由腹内者不在此限逋負年多徵攤力竭咸令已責庶可惠貧度支户部鹽鉄三司應收管在城及在府州并諸色塲鹽大中七年已前欠負諸色錢物斛㪷等除官典所由請領官錢和糴市及在塲官招商所由腹内外其餘人户所欠錢物如身家已亡殁或在貧窮家業蕩盡無可徵納并迯竄捕捉未獲囚繫妻男攤徵保人等如此之類虚掛簿書中無填納之日宜并放免如聞後赦令蠲免放欠負所司不及時處分元係簿書徒有蠲免之名却為分外攪擾今所放錢物宜各令本司差辦事官典㨿年額人户姓名所欠錢物色目檢勘便下文帳不得更起條様勘逐所徵可放生事擾人仍令所在塲塩院及州縣於要畧分明懸榜示人户俾令知悉仍仰所司各限月日處分訖具所放錢物單數分折聞奏災沴流行黎甿困窘免其租税漸冀輯寧諸道州府有遭水損甚處其今年各納苖税錢等委長吏酌量蠲放如大中十二年已前欠負兩税米在百姓腹内徵收不上者亦宜特放其實遭災沴處仍具折聞奏聞抱器逢時諒恩展用卑棲䟽迹能不懷嗟如聞中外官僚或有滯屈雖限以員闕致此因循而念其考歴孰非勤舊宜可中書門下各量才分漸與選改廣我四聰在於多士才𢎞景化思拜昌言諸色人若上封事極言時政得失有官司者官吏長收狀聞奏無禄位者任自投匭進狀當必親覧須務體國公言不得用情謗訕每想候封嵗思於荒稔莫非玉土物合通其有無諸道州府閉糴禁錢頗為弊事前後赦勑累有條具尚恐因循依前壅塞宜委出使郎官御史切加察訪如有違越即具奏聞叛徒相扇既已翦除屬類潜逃宜從寛宥湖南江西嶺南宣歙等處去年所遭狂冦擾亂尚恐軍人百姓至今未安如先有為患一作惡者闗連親族或迯竄尚未復歸今一切不問仍各委本道長吏分明曉諭切加招誘安存勿令疑懼如百姓曽經被賊俘刼錢物官與收獲得者仰分明勘認本主給還勿使曖昧欺隐仍具分折聞奏如聞京城内富饒之徒不守公法厚利放債損陷飢貧前後累有勑文約勒非不丁寧無良者都不遵守致貧乏之人日受其弊宜令京兆府准寳歴三年四月二十日及開成二年八月二日勑文切加提舉曉諭嚴切約勒處分㐫險之軰情狀難容如聞將吏傭保奴僕之徒或因愆過發遣之後輙生怨謗捃拾本使及郎主細微之事意在僥求苟無所得便成恐脅或闇投無主文字或擅進文狀此若不絶交害平人自今已後宜凖律文及大中二年九月十日及大中六年八月二日勑便於當處焚燒所由不得收領及與聞奏其擅進文狀宜勘責重加科誠如所由固違勑文不焚燒所投文書尚敢將出當與告訴者同罪其容修文狀挾奸蠧者委臺府及諸軍諸使切加訪察如有此色便捉獲送府縣推問須令痛懲天下州郡於所公用之餘收糴年谷自備水旱以救疲人賑絶及時免待奏請探聞惠物頗謂通規今年正月一日赦文但令不别置倉盧煩别差官吏主當所以令寄常平義倉任自分别支用如聞所在州郡未能盡諭詔㫖衮入常平義倉縱遇年豐不務糴歛謬為廢閣切在舉明令所在州郡細詳今年正月一日赦條處分其刺史去任日仍委本道觀察使便以在任日所收貯斛㪷多少支數以為考課言念士子禄以代耕選人例廹饑寒逺赴調集頻年被駐情實可矜宜令吏部准今年正月一日赦文處分廣敬坤儀當舉推恩之典垂仁盤石在霑霈澤之榮太皇太后及元昭皇太后第二等以上親委中書門下量才叙用大長公主嗣王各與一子出身九廟子孫陪位者普恩之外各加兩階無官者各賜勲兩轉仍據使主封後與一人出身委宗正司卿檢詳圖譜一房最沉翳者充數具名奏聞宗子中有行義可稱才幹足用者亦委搜採一作擇具名衘事狀送中書門下量才叙用内外文武見在及致仕官三品已上賜爵一級四品以下加一階仍賜勲兩轉應入三品欠一考未足者考足日聽叙致仕官量與改轉依前致仕弼諧萬物鎮靖四方洎于文武具寮咸宣忠力並禀義方之訓宜推錫賚之恩追飾寵光式彰孝理中書門下及諸道節度使帶平章事祖父母亡殁未經追贈者並與追贈已經追贈者更與改贈東郡留守諸州府長官在京及分司常叅官神䇿衞金吾六軍統軍將軍四衞十二衞將軍威逺營鎮國軍等使父母亡殁未經追贈者並與追贈品秩已崇請廻贈祖父母者亦聽父在無官者量與致仕官父殁母存量與已有邑號者量與進改竭力扶危捨生取義不旌後嗣曷表遺忠故尚父汾陽王贈太師晟贈太尉秀實子孫中各與一人正員官張廵許逺南霽雲顔真卿杲卿子孫中各與一人出身祗奉典冊誠禮無違宜被優恩以酧厥効即位日攝太尉奏詞中書令讀冊侍中進寳承㫖宣制奏外辦禮畢各與一子正員七品官奉寳書綬讀冊及書玉冊官各特加一階書寳押寳授舉昇寳冊官溥恩之外加兩階合選人减一選其餘應職掌人行事及冩制令太常條選儀注等官三品已上更賜爵一級四品加階仍賜勲兩轉中書門下儀制官内侍省内教各特加一階鐫造玉冊並填金字造寳裝寳冊人等各賜物五十叚承顧命撰制冊文及冩制官並已有昇其餘自八月九日至十三日諸冩制誥官各加二階大明宮留守及縁國慶告郊廟太清宮行事官三品已上賜爵一級四品以下加一階應縁崇冊太皇太后及追謚元昭皇后冊禮職掌行事官及鐫造冊寳填金字人等節級賜物周詩歌白馬之客魯國闡素王之風尚徳崇儒宜旌胄裔二王三恪文宣王子孫各與一子出身藩邸臣寮誠勤乆著各加優奬用示恩榮鄆王府官今年八月九日已前在任者五品以上並與進改六品以下所司非時與分流外畨考已足未足並放入流内侍省及鄆王府官三品已上賜爵一級四品已下加一階五品以下賜勲兩轉八月九日至十三日北内當上及從駕者四品以下溥恩之外賜爵一級五品以下更加一階自身更賜勲兩轉神䇿六軍金吾威逺皇城將士三品以上賜爵一級四品以下加一階仍並賜勲兩轉馳奉章奏分居職役冊勲進級甄彼勤勞諸道進奏官及縁國慶奏表到京者溥恩之外各加一階仍賜勲兩轉翰林侍詔并諸色直長及供奉人等三品以上賜爵一級四品以下加一階無階者賜勲兩轉飛龍閑厩宮苑典引掌扇内園總監栽接少府將作中尚書武徳軍器内外弓箭庫等諸使下白身及無品直司定額長者雜匠巧兒黃衣長上監門直長雜仗二衞七色引執駕細引執扇角手挐彍騎武士天文觀生歴生漏生典鼓工人樂人主膳主酪典食手宰手掌閑幕士駕士御醫工獸醫門僕藥童御書手流外行署等賜勲兩轉宿陳仗衛師旅有勞委質蕃方偏禆著郊咸加奬賚庶給恩榮應赴御樓立仗神䇿六軍金吾威逺及皇城等將士宜准舊制量賜錢帛其神䇿軍應在畿内鎮將亦各賜物有差應諸道將校三品以上賜一級四品以下加一階無階賜勲兩轉逺人慕義上國貢獻將表懷柔俾霑寵錫鴻臚禮賔院蕃客等各賜物有差禮經重於問年宜加廪餼王化存於勸善用激里閭天下耆老八十已上者各賜絹兩疋粟二石九十以上各賜絹三疋粟米五石並以上供錢常平義倉粟充給仍令令長親致縣庭宣詔頒賜不得委人吏致有欺隐其九十以上者仍加板授孝子順孫義夫節婦旌表門閭終身勿事先有旌表者凖耆老例優賜除弊安人由於制命寢而不用致理良難大中以來頻有赦令有司廢閣多不遵行宜委中書門下檢尋提舉有便於人者次第施行或有事理未盡不便於人者仍委中書門下及所在長吏條具聞奏其法詳斷刑獄今年正月一日赦書已有條具處分仍本司切加提舉遵守施行不得輙有隳紊峻極靈長効祥興利俾申祀典以逹明誠五嶽四瀆名山大川各委本道長吏以禮致祭亡命山澤挾藏軍器百日不首服罪如初赦書有所不該載者所司明作條具聞奏敢以赦前事相告言者以其罪罪之赦書日行五百里布告遐邇咸使聞知主者施行文苑英華巻四百二十
