body:
  text: 文苑英華卷七百三十六宋李昉等編雜序二續書序一首四分律宗記序一首揚州看競渡序一首神龍厯序一首忠州江亭喜重遇吳參軍見牛司倉序一首喜遇冀侍御崔司議二使序一首衡嶽十八髙僧序一首開元大衍厯序一首續書序王勃敘曰書以記言其來尚矣越在三代左史職之百官以理萬人以察揚于王庭用實大焉茍非可以燮理情性平章邦國敷彛倫而敘要道察時變而經王猷樹皇極之綱維資生靈之視聽皆可略也昔者仲尼之述書也將以究事業之通而正性命之理故曰吾欲托之空言不如附之行事道德仁義於是乎明刑政禮樂於是乎出非先王之德行不敢傳非先王之法言不敢道紀千數百歲斷自唐虞迄于周漢風一無此字流所存百篇而已以此見聖人言約理舉神明不勞一作營而體時務之撰矣故能法象天地同符易簡借前箸於筌蹄驅後主於軌物密而顯宏而奧久而彌新用而不竭非古之聰明聖智玄覽博達孰能為此哉孔安國曰帝王之制坦然明白可舉而行嗟乎其言甚大可使南面稱聖人之後矣自時以降史述陵遲人自為家標指失中陳事亂而無當制理參而不一由是大典散而人文乖是非繁而取舍謬與夫古先哲人制述之意不其疏乎我先君文中子實秉睿懿生於隋末覩後作之違方憂異端之害正乃喟然曰宣尼既沒文不在兹乎遂約大義刪舊章續詩為三百六十篇考偽亂而修元經正禮樂以旌後王之失𫐠易讚以申先師之旨經始漢魏迄于有晉擇其典物宜於教者續書為百二十篇而廣大悉備嗟乎賢聖之述豈多為哉噫亦足垂訓作則冒天下之道如斯而已矣當時門人百千數董薛之徒並受其義遭代喪亂未行于時歷年永久稍見殘缺貞觀中太原府君考諸六經之目則亡其小序其有録而無篇者又十六焉嗚呼兹不可復見矣家君欽若丕烈圖終休緒乃例六經次禮樂敘中説明易讚永惟保守前訓大克敷遺後人勃兄弟五六冠者童子六七祗祗怡怡講問伏漸之日久矣躬奉成訓家傳異聞猶恐不得門而入才之不逮至逺也是用厲精激憤宵吟晝詠庶幾乎學而知之者其修身慎行恐辱先也豈聲祿是殉前人之不繼是懼聞疑者承命為百二十篇作序而兼當補修其闕爰考衆籍共參奧旨泉源浩然岡識攸濟嗚呼小子何敢以當之也其盡心力乎始自總章二年泊乎咸亨五年刋寫文就定成百二十篇勒成二十五卷昔者文中子曰漢魏之禮樂未足稱其書不可廢也尚有近古之對議存焉制詔册則幾乎典誥矣後之達晤者將有得於斯文乎于時龍集閹茂勉踵前修在大唐御天下之五十七祀也四分律宗記序前人昔在調御利見迦維光宅淨都撫臨法界仰揚垢路之業以疆理情田闡導毗尼之藏以隄防性海二邊雲徹方知實相之尊十剎風行乃識真如之貴將使龍象緇服維明克允鶖鷺玄明有耻且格五篇垂範豈同訓夏之科七聚分宗寧比歌虞之制功存離欲道在降魔仙苑創基因善果以調物提河滅迹慿淨戒以為師誠拯溺之舟航而禦黠之銜䇿者矣故能莊嚴百福粉繪三身摧憍慢山拔生死樹覆簣菩薩之道濫觴正覺之源除惑箭而斷愛枝銷恚刀而解疑網自銀棺掩耀金杖殊珍五師煙騰四分雲譎波離睿旨明而更明飲光妙迹盛而愈盛其後卑摩覃思猶沉赤水之輝惠逺研精尚玷玄巖之彩遂使瓊編浩汗利涉迷於要津瑶軸紛綸登髙暗於飛陛熟習者博而寡用志學者勞而少功七衆所以遲回八部由其大息丕應冥發睿感潛融爰挺異才式扶象訓有西京太原寺索律師俗姓范氏其先南陽人也殷霸洪胤周藩茂族八鸞與四牡競馳紫繪與青蝸疊照六軍卿胄績著於鐘彛三傳儒門業流於訓詁律師沖襟霞映峻局霜凄筠抱顯於髫齡蘭芬凝於丱齒由是粳粃禮樂錙銖名教以堯舜為塵勞以周孔為桎梏爰依白法遂托玄徒探鷲嶺之微言得龍宫之祕藏咸亨之祀椒房諒隂捨槐里而構菴一作芳園因金穴而開銀地伽藍肇建號曰太原明陽一作湯所及咸收時望自價隆康會譽重摩騰竺法猷之苦節支道林之逺致將何以發明禪宇光應綸言律師乃以道衆羽儀釋門棟幹粵自𢎞濟來逰太原經行德人於斯為盛既而懼六和之紊緒悼三聚之乖宗稽法令之遺文討惠猷之舊業網羅一作網維近護吞含覺明原始要終探賾索隱芟夷􅤞贅剪截駢枝收絶代之精微詰往聖之紕繆葭灰屢變槐燧驟遷聞遮持犯之異同廢立止作之輕重故以該象牙之扇窮貝葉之圖鑽研刋削五載而就名曰開四分律宗記凡十卷三十七萬六百三十言律師又以為仲尼述易申妙典於繫辭元凱談經託餘文於釋例爰因多暇更輯舊章牢籠祕密之宗發揮沉鬱之旨名曰開四分律宗拾遺鈔凡十卷四十萬餘言所以禆助三明抑揚四諦𢎞八正之道成一家之言庶使衆善雷奔羣疑霧斂照歡戚之兩鏡蕩欣憂之二瓶慿此戒田方躋定境豈直功周沙甸道制鐵圍而已哉弟子才非玄度識劣真長本乏凌雲之詞虛荷彌天之眷揄揚盛烈顧孫綽而多慚歸依勝侣仰郤愔而自勵輒牽庸陋輕序德音豈比夫公理昌言資繆實之引太沖作賦假士安之談蓋所謂觀博而識班聞樂而竊抃者矣故曰四分律宗記序揚州看競渡序駱賔王夏口江干駕言臨眺于時桂舟始泛蘭棹初逰鼓吹沸於二字集作咽江山綺羅蔽於集無於字雲日便姢舞袖向淥水而集作以全低飄揚歌聲得集作聽清風而更逺是以臨集作眼波笑臉艷出浦之輕蓮映渚蛾一作娥眉麗穿波之半月服集作靚粧舊飾此日增竒絃管相催兹辰特妙能使洛川回雪獨美集作猶賦陳思巫嶺行雲專稱宋玉凡諸同好請各賦詩云爾神龍厯序李嶠昔者龍負河圖八卦列明時之象龜呈洛字九疇開協紀之文青巖啓而六甲飛黃壤堙而五行缺故知乾策逺坤符靈祕法效用常邀乎聖期研幾測深必貫於神道皇軒於是乎合而不死帝皡於是乎推而致福自重黎並命叔仲分官理八節而調四時部三元而齊七政權衡度律在虞夏而兼修正朔隂陽及殷周而備舉既而王風版蕩戰國縱橫瞽史忘三家之言疇人失二字之業履端闕而歸餘壞攝提差而孟陬殄廢時亂日非直羲和湎淫亡甲喪子豈唯商辛暴虐漢興草創肇謀紀綱而方士異詞天官橫議張蒼從甲乙之術未叶變通鄧平用丁丑之元旋聞疏濶當塗圮隔典午陵遲戎狄升僭偽之壇宇縣乏神祇之主三辰九野壓析景而分躔二象七衡孰當期而合度建元髙而不競沿木火而無譏興百代之闕文復千齡之大統匪我昌運疇能離此國家草昧區夏權輿品物萬方同會獄訟之往河南五緯運謀神靈之入東井然玄圭受命紫籙登樞白一作回玉斗而察璿璣把珠囊而膺厯數勤於水土大禹之平滌山川禮乎方圓髙辛之迎送日月應天神龍皇帝大橫纂極元良繼體乃神乃聖三王接袂而扶轂允武允文五伯連衡而擁篲於是乎東明捧日西掖占風南震雄王之㕓北清驕子之落粟同水火人類胥庭犴圄徒旋干戈不用上庠講道而宣化比屋耕田而鑿井功成理定之業協律登歌疇德瑞聖之符陳郊謁廟萬官咸事百度已康猶且存省闕遺徵求典故以為欽若厯象哲后之恭天事神敬授人時明君之勸農闢土自麟德創紀四十餘年雖斗憲未移而渾儀漸變蔡伯喈所謂術無恆是洛下閎所謂厯後當差昔太初肇規便易髙皇之制元和新造旋移孝武之法因時通變厥有前聞爰命典司更從刋正金紫光祿大夫行祕書監駙馬都尉上柱國楊慎交鐘鼎貴逰山河寶氣赤泉疏社軒裳接于五公朱輪贈言翰墨連於七子資玉環之舊德擁金埓之新慶簫吹鳳管朝升烏鵲之樓漸疑閲龍章暮下麒麟之閣臨西山典籍之府揔束壁文章之事九源百氏之説盡入胸襟六家三統之書咸歸掌握永言董率實佇詳明左散騎常侍兼修國史上柱國陳留縣開國公栁沖望重簮纓才髙瑚璉家風推其直道帝範藉其謨明吐白鳳而草玄言垂紫貂而步黃閣參司國典時望允諧副掌天書朝寄斯在鎮國一作軍大將軍右驍衛將軍知太史局事迦行志中散大夫守禮部侍郎上騎都尉嚴善思正議大夫行太史令上護軍傅志忠等或禮閣一作閣兵鈐以賢才而入用或天門地理緣道術而見知皆學富偃韋藝超甘石窮神盡智之妙暗落銅凡測逺窮髙之方懸裁玉表朝請大夫行太史局令瞿曇悉達朝請郎行司歷徐保文承議一作奉郎行司歷南宫説等或善分天部或工言算法稽長短之效無煩於驗讖被圖察休咎之徵非假於登臺上庫凡此衆哲各承朝委悉達等則專司課務據核其真志忠等則監共討論用裨其闕雖異禮而各術並用心而合契於是精研六位遍考十端立東西之定儀一作定東西之令儀採南北之遺事會數於天九地十起元於子二丑三追日暮之行按星分之度以推四時之發生以步三元之盈縮然後分至啓閉無愆於玉衡弦望躔離必應於銅史才窺幽室已見飛灰雜候清臺仍看合璧追論古法師驗前章八十一寸為日分徒言精密六百八年為歲紀終非允當歷祀之所紕繆異端之所穿鑿莫不裁之繩凖格以銓衡究天道之精微開日官之軌憲容成再出不能添纍黍之功壽王重生無以議分毫之失豈比夫時乖兩閏始載鄒人之語亥有二首方聞絳老之年序臨安寧歲次強圉皇帝撫天下之三載也珍圖改御寶厯初調授以丹鳳之官頒以玄鳥之署候耕耘之節非藉杏花亶昏夕之期詎須蓂葉參幽明而制術邁古今而垂範玉儀既正金鏡逾明知聖祉之無疆識懷生之永泰元符允合可以觀天地之心能事畢甄可以為帝王之式盛矣美矣無得而稱紀次勒成名曰大唐神龍厯云爾忠州江亭喜重遇吳參軍見牛司倉序陳子昂日月交分春秋代謝昔歲居單閼適言别於兹都今龍集昭陽復相逢於此地山川未改容貌俱非敘名宦而猶嗟問鄉關而不樂雲天遂解琴酒還開新交與舊識俱歡林壑共煙霞對賞江亭回瞰羅雜樹於階基山榭遙臨列羣峯於户牖爾其丹藤緑篠俯映長筵翠渚洪瀾交流合坐神融興洽望直情髙覺清溪之仙洞不遙見滄海之神山乍出既而行舟有限嗟此會之難留别日無幾嘆分岐之易逺徘徊北渚惆悵南津江陵之道路方賖巴徼之雲山漸異嗟乎離言可贈所願保於千金别曲何謡各請陳於五際喜遇冀侍御崔司議二使序前人余獨坐一隅孤憤五蠧雖身在江海而心馳魏闕歲時仲春幽卧未起忽聞二星入井四牡臨亭邀使者之車乃故人之駕隱几一笑把臂入林既聞朝廷之樂復此琴樽之事山林幽寂集作疾鐘鼎舊逰語默談集作談通用詠今復一得况北堂夜永西軒月微巴山有望别之嗟洛陽無寄載之客江關離會三千餘里名位寵辱一百年中歡娛如何日月其邁不為目前之賞以增别後之思蟋蟀笑人夫子何嘆衡嶽十八髙僧序盧藏用夫理存於業理契則業忘心宅於形心寂則形勝豈不以體會機化通同我人馳無役有而吻合出生入死而無際古之懸解者懷挾海嶽提挈天地掌擲千界身沒一絲前際後際其非動無去無來而常樂豈支離其德孟浪其言哉蓋同體大非而物不能自物也則有詠疑作泳其洪波志其小行指玄源以驤首和疑作扣幽鍵而少留亦能押闔形神度越兹數則衡嶽思海之列可得而稱矣衡嶽寺者梁天監三年立本名善思一作果暨陳改為大明有隋號為衡嶽則衡山之心也二十八宿上飛翼軫之晶三十六都下蟠吳楚之紀赮駮舒蔚燦爛炳煥以萬殊松標玉聳清蒼璀錯以億尺水碧嚴霜而育粹雲一作露芝佇秀以孕直幽岫滅氣絶頂無迹逰其質者一作也則蘧廬清明挹其靜者則營魄淵淡信神明之所棲遲也故異人接踵於此焉逰靈迹葳蕤道風綿邈自鷲巖西閟象教東流勝躅雖多宗玄或替至於仗智慧劍壞煩惱軍理以意傳階惟神遇者未有斯美之盛也然而年代攸邈故老或遺真詮緬微後生何述有沙門惠日俗姓慶氏濮陽人也息心達道利見觀方自北徂南爰憩兹嶽入空寂舍覺今昔常然到清涼池知我人非逺備聞衆異祗覿前修而山間朴略簡編無次遂覃思翰墨博采遺風事無虛美務存托實自思大師凡一十八人著之于傳藏用早逰斯道頗涉藝文承日公之恩奬聞衆真之故事心存目想若見斯人倘兹理或存亦旦暮之期也遂懷鉛秉翰序其傳焉開元大衍厯序張説特進集賢院學士修國史上柱國燕國公臣張集無張字説言厯者先王以明時授人敬天育物者也辰極恆居斗運不息晦朔相催而變月寒暑往來而成歲日月右轉集作進周天之度啓星辰左旋正時之氣合積餘分而置集作致閏配甲子而設蔀鳳鳥為司疇人受職分分而加之者百圖集作鈞必過毫毫而減之者千里必差何則古法存而其人異也不有集作見大聖孰集作誰能起之伏惟開元神武皇帝陛下欽崇天道眘徽月令受命再新改制創厯十有三祀詔沙門一行上本軒頊夏殷周魯五王一侯之遺式下集太初至于麟德二十三家之衆義比其異同課其疏密或前疑而後定或始會而終乖振古未探之象必發揮於神算大鈞不測之氣盡覼縷於天聰乃更審日晷集作晷度之短長覆星間之廣狹繩九道之朓朒糾五精之進退參大衍天地之數綜八卦六爻之序一轍於文王也覆文粹作核春秋交蝕之辰研九疇五紀之奧同符文粹作同文集作有同於孔子也杼軸萬象優遊四載奏章集作草朝竟一公夕落臣説奉詔金門成書䇿府先有理厯陳景善算趙升首尾參玄之言接承轉籌之意因而緝合編次勒成一部名曰開元大衍厯經七章一卷長厯三卷厯議十卷立成法十二卷天竺九執厯一卷九執厯名出西域集本文粹無天竺九以上十七字今古厯書二十四卷略例奏章一卷凡五十二卷唐會要作經章十卷長厯五卷厯議十卷立成法天竺九執厯二卷古今厯書二十四卷略例奏章一卷凡五十二卷唐藝文志作大衍厯一卷又厯議十卷厯立成十五卷厯草二十四卷七政長厯三卷心機算術括一卷二書與英華互有異同當考所以貫三才周萬物窮數術先鬼神稱制曰者即聖人顧訪之旨標謹按者是厯家進對之詞非軒后至聖不啓履端之業非容成詣極不就歸餘之經據其圖也七政之天心不逺守其術也千歲之日月可知蓋中黃之寶符大文粹作太紫之神器者也謹以十六年八月端午赤光照室之夜皇雄成紀之辰當一元之出符獻萬壽之新厯伏望藏之書殿録於記言掌之大史頒於司集作日厯制曰可文苑英華卷七百三十六
