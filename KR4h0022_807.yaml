body:
  text: 文苑英華卷八百八宋李昉等編公署下嘉興監記一首淮南都梁山倉記一首彭州新置唐昌縣建德草市歇馬亭鎮并天王院記一首烏程縣新建廨宇記一首嘉興監記正德利用阜財足食國之本也天寶末天下兵起乾元初上司奏議宜以鹽鐵之職總以社稷之臣幹乎山海之利以冨人也淮海閩駱其監十焉嘉興為首朝廷以是蠲貸恆賦實乎大內大臣奉法為事選人拔其賢幹升于憲署以宣原隰光華之寵趨其署者如好鳥之栖茂林相國劉公嘗以大監小州不相若也故其職員不忝乎爵秩其刀布必倍于租入渤海高君日倫世以勳烈緩步闊視胸襟洞開中有方略不循進級故一廷評于兹二紀傾酒定交擲金市義不餌不仁之粟前使張侍郎滂王尚書緯總其卜式𢎞羊之計遂有采山煮海之役十年六監興課特優至是未朞從百萬至三百萬鹽一作監人賈人各得其所故端介之節風彩自高繼夫漕運波委陸溢此天下之利器也可示人乎夫以步光莫耶切玊如泥刜鍾無聲不以一割均其銛鈍君子以知人則哲無德不酬鴻飛九霄驥騁千里前祕書省著作佐郎顧况美使臣之得人貞元十七年歲在辛巳正月朔記淮南都梁山倉記沈亞之汴水别河而東合于淮淮水東米帛之輸關中者集有也字由此㑹入其所交販往來人賈豪商故物多逰利鹽鐵之臣亦置署集作署致其間因擇官分曹以權集作𣙜庶貨而部貢之吏盡令鹽鐵諸官校違集作遺之疾徐用賞罰大梁彭城控兩河皆屯兵居率集無此字卒食出官田而畎畝頗夾河與之俱東仰澤河流言其水溫而泥多肥比涇水四月農事作則爭為之𣲖决而就所事視其源綿綿不䏸通橋葉矣天子以為兩地兵食所急不甚阻其欲舟艫曝滯相望其間歲以為常而木又多敗裂自四月至七月舟傭食盡不得前元和九年隴西李稼為鹽鐵官掌署淮口集作掌淮口唍病其涸滯思欲以為救集有而字乃與楊子留使議之曰自閩越已西北郡所貢輳挽皆出于是而以炎天纍月集有之字久滯于咫尺之地篙工諸傭盡其所儲不能賑十年之食只益奸偷耳集有幾字或有終嵗而不得返其家者今誠得十數集作敖之倉列于所便以造出入之集無之字計無憂也正月河冰始泮吾盡發所蓄而西六月之前虛廩以待東之至者如此則役者逸而弊何從生哉議定即以狀自得遂其便于是稼度泗土卑濕無堪地遂創庾于淮南都梁山十二年詔以誅蔡之師食窘促令鹽鐵所挽皆趨郾城下是時下淮南倉發舂其工人曰五字集作發舂吏計舂其工人舂材必櫟若榆吏欲令工就山林剪市之稼曰夫集作地火方焚曰將燋萬家當頃刻之間雖得弊穢之器奮濁汙之波百夫汲而揚之立足滅患如曰不然我欲利其器待我成枯集作柘下同桂之杓致滂沱之流操以救之彼言而後謀則燃灰尚不可望而况所全者今縣軍十萬旦暮不賑其為急也間不容釐而集作今待汝訪山求材然後用何異乎枯杓滂流之語耶其倉材所剪之餘大可以為臼小可以為杵長可以為杵之梁薄可以為䏶樞夾峙促命裁之即日而舂成百具其餘米與吏分辦之先以家奴就役次及羣集無此字郡吏各有差所舂凡二十八萬石不涉旬俱得浮淮而西矣十三年夏泗水大災淮溢壞城邑民人逃水西㟠夜多掠奪更相驚恐呼號而鹽鐵貨帛十餘萬乃囊之于布緘用吏名載與渡貨帛無餘尺及集作了內倉中不能盈一敖其餘皆廕仕家之急時余過泗上得其事故與悉論善濟之方而著之以明其績彭州新置唐昌縣建德草市歇馬亭鎮并天王院等記陳溪聖上以南夷不䖍邉塵坌起候旦授執政意俾擇要郡以良能而收之遂命御史中丞渤海吳公行曽一作魯持節出刺雅安公松筠植心金石勵志雅安實邉之衝東入嶮隘應援由此公至止一顧屹如巨防當危疑之秋瞬息無事郡人以考秩將滿預懷去思接武陳誠願借綏撫丞相隴西公以公功業昭著飛章上聞請充節度參謀兼諸軍行營副都知司馬使東路行營都知兵馬使仍兼知黎州及巡邉制署一作置公遂于大渡河創置一橋亘五百尺自干戈未寧士馬旁午饋運往復商旅經過曽無覆溺之憂永絶滯流之患至今行者見必歸恩一作思異跡竒謀繁難具紀由是復升于犍為雅之南千里縣道𤇺堡相躅早夕一作早多軍食跂俟于犍為公智出事先機生料外風波助意舟楫如飛是得闔境無虞諸軍飫飽實公之功也復由是天子以彭門名郡而償其重勳公軔車之日即究風俗民之憂苦己眀其重輕事之興廢已熟其利病從便革弊幽顯愜心郡內既肅施及支邑以唐昌縣中界接導江郫城東西綿逺不啻兩舍雖有村落僻在荒塘昔置郵亭廢毁將久遂使行役者野食而泉飲貿易者星往而燭歸􅐁􅜙公行投告無所深溝雨漲古陌橋摧跬步難踰艱苦寧述况輸役責限徴斂有程而欲罪其稽逋者乎公惻然凝想即日計成遂陳于連帥于其心而置草市因其鄉名便以建德為號自此四來者旋踵而迓迎中望者舉目而知歸老幼攜挈倐忽而至萬家歡笑其事修營不旬日而告就今則百貨咸集蠢類莫遺旗亭旅舍翼張鱗次榆楊相接桑麻漸繁如此牧人可謂移風易俗矣昔武候以蜀脞脆故令鄰邑翊日而市意在習其筋力而俟之征徭又每及上春以蠢為名因定日而有知所往公亦約之以期而候之其日商旅贊貨至者數萬珍纎之玩悉有受用之具畢陳想人之心豈待詢問而知其歡悅也復以路由諸部一作郡疊跡輪蹄徘徊一息無稅駕之所遂以俸錢建長亭崇軒邃室外廄內厨帷簿精新器物充足則往來者非止晝食而卜夜可矣人既繁㑹俗已豐饒又置一鎮抽武士三十人而禦之亦立𪠘署早暮巡警盜將竄跡人遂高眠不感晨雞無聞夜犬皆云康泰不可比儔又兹地㑹昌之前有佛寺數所因廢而未興鄉閭求福無處禮敬像設之儀莫識鍾磬之聲不聞僻野深郊轉為聾俗復置靈巖報恩院修北方天王及侍從竒工妙飾相好無雙高墉環合門廡揭立又度僧住持行道無有虛日斯人也非只豐足而永逃夭札之患得不紀其盛跡而埀於無窮者哉且人之憂樂俗之凋弊豈繫於時而實俟於哲人上才也噫公之為政以己之欲而思人欲以己之惡而思人惡是以連牧三郡而皆勳績絶倫若非秉心端莊求理無替則奚能動逺邇瞻聽而候疑者乎且昔之此民往復百里飢不得續食寒不得易衣今之出户而所闕皆足市之功其可量乎昔之此民村防遙逺蕭索人稀盜賊織路行者恐畏今之出户歌笑自若醉飽羣歸鎮之功其可量乎昔之此民首罪無所求福奚門今之出府有依歸之僧覩莊嚴之像院之功其可量乎昔之行者戴星乘軺亭午未憩館榖何投飢旅寧濟今之朱門大啓來往如歸乏馬疲人頓忘其弊館舍之功其可量乎公創一意而庶類皆安推深誠而萬人咸福是知𤣥造之㫖不獨幸蜀之三郡即應重委大柄為國之元臣使天下皆幸也溪早歲謬以文字為公之知偶因薄逰獲覩盛制輿人頌美異口同詞直叙見聞敢愧蕪淺咸通十年五月十五日記烏程縣修建廨宇記楊䕫叔孫昭子聘于晉晉受邾人之訴執昭子置于箕使吏藩之昭子不以拘為意止之舍有壞必葺去之如始至故春秋賢之今有受九重之命母百里之民凋瘵者繫之以綏訛弊者藉之以移既休于公館覩其隳摧圮漏忍而不治者無乃取譏于君子乎丹陽余公以再命尹于烏程降車之朞月察訟决獄之暇周視縣署其門傾其㕔欹其墻圮其廡偃頽簷側楹倒移疑作侈相倚風雨罔一作闕庇寒暑是窘公歎曰建之者何人壞之者何心既叨守邑其敢不力自懋以圖嗣修乎然屬天未悔亂兵火猶熾專城而居者其可無備乎故我郡儲甲數萬以戒不虞而軍須軍餼僉賦于縣務繁力匱久莫克舉公乃宵分而寐五鼓而興行忖坐維不遑所安近越于時方克僝功于是節冗費之用鳩贖辟之金僦力于農休徴功以厚償聽斷之餘策杖以巡慰其勞者朂其惰者設茗及飱日自省視由是工操其斧如蟻集羶傭運其材如水赴泜財以儉而藴故其用給人以悅而使故其功倍不期年而衆宇鼎新矣有若換大門中門修大㕔小㕔東閣西閣新押司録事院建人吏祇候房砌縣之外城几百餘雉創宅之間一作周垣近一百堵修衆寮之宅五造㕔庫之橋六疏西亭之汙池制公𪠘之什物一作器有遺罔不增構其尤赫赫者如每歲徴賦主胥類于㕔之西廡以其輸賦駢凑逋逸是虞乃編筠接軒權間隔之訖賦則毁去厥費頗夥公乃增廡之一楹構木為欄以限其內外俾永絶妄耗此以見公謀之經久也縣之西北隅舊有帳院蓋鄉吏團集里書之所歲月綿逺崩陊文爾切小􅀈也無幾每遇霖潦則束席就燥以避其霑濕亦有時矣加以往來者御奔走泥淖之患舉邑是病無戶而革公于是歷揆其損以籌完葺正傾支摧增新易壞類夫重構復建修廊以逹于都門雨有依暑有庇從役者不知其勞矣此以見公情之恤下也公帑摧敗上冗下濕周垣雖設腐不為固易所以刺慢蓄而誘盜也公乃擇堅以革枯選宏而化陋厚厥墉嚴厥闕此以見公志之防間也縣之圜扉頽垝莫治彼犯大辟得繫者豺狼野心脫走是勝茍閈閎不謹墻垣不慎是遺肉于虎吻也或有縶墮事幽徴責一作徴眚蓋俾其懷過而省非也豈使敵于見善毒于昵枕哉而糞壤狼藉穢不可邇彼罪無輕重俱執于此不其酷歟公乃剗積弊滌宿汙明壞牖墟毁墉席以潔其榻食以茹其餒茍獲戾而入如宴于此以見公之處心愛物也先是縣之秋曹尉蘇許公頲釋褐之官也公始至兼戎曹務遇上已節郡有角擑之戲郡守出觀則司戎者職其事因乘小艇往來以檢馭不整郡治之南溪波浩洋許公馭楫以涉而舟覆焉衆皆駭惋謂不可援俄聞空中有言曰無損蘇公忽有幹流以出其舟而許公存焉彼同溺者俱不為水困俗旌其地為蘇公潭大厯中縣令李晤則故國紳之先也相國誕于縣署幼弄之歲墜于縣之東池逾數刻忽若有物翼出于池靣相國略不為苦二者皆縣之故事而圖經不載公乃檄請于邑人太學博士丘光庭編緝遺墜其或善未書能未記者罔不畢録此以見公興廢而繼絶也几此數事豈前政之未知乎抑知而不為乎非公勤于理敏于用視公猶私曉夕匪懈何以及此哉始公之臨承授政之後人稔于易衆務煩猥綱在而目紊公乃肅之以整嚴之以恪遏強字弱優老恤匱旌别枉直屏空奸慝不逾月而法令如一勸賞分明清靜簡當內外祗肅鞭撲閣于庭爭訟息于野宣尼所謂慢則糾之以猛猛則濟之以寬猛寬相濟者余公得之矣前是公才再稔而報代鄉之老肆之長咸賴撫導數百人列狀墻立于郡庭以乞留太守隴西公以代其任者特敕之命不可有滯然私器其能頗自憾不偶良吏以共育尫瘠公遂退寓于德清蜀邑駕水軒釀春一作香醪治蔬圃修釣艇以吟醉自逸明年冬為縣者以譴停其任杖媒依勢求代用者檄纍于兒上隴西公至而弗視且曰烏有民病方急而擯良醫乎遂飛簡以召公洎其至隴西公提印以授曰子之前治邑其及物之澤被于㕓野未得盡子之術貽吾中悔今還舊邑其為我撫其疲遏其酋俾民獲蘇無替初心公三讓而后及縣張弦易調新其戶牖剔蠧抉弊刮垢磨頑不次不序咸復舊貫凡利于民濟于公事無巨細必自我始丙辰春公將受代吏民等以為受其教庇而忘諸載祀俾後之人不得詳其俶落是食其㫖廋其處也于是列其狀謁言于宏農楊䕫䕫學于春秋固當以紀功書績為務公前任日崇修先聖之祠為文讚功刻石于縣岸今復紀此功績蓋欲慰縣人久久之䖍思也况公以民吏之勤請不可拒絶兼凡所革易創製皆力殆心罄而后克濟且慮夫什器後之人不同乎慎惜也恐其傾陊後之人不同乎繕治也茍沮衆情何以鏡將來耶由是採石鐫勒之費莫不悉自於清俸益以見慎而有立也嗣厥理者可不懋乎乾寧丙辰春七月文苑英華卷八百八
