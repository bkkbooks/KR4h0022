body:
  text: 文苑英華卷二百八十七宋李昉等編留别二崔國輔一首王昌齡七首髙適二首劉長卿十三首李頎一首包何一首李嘉祐二首錢起二首郎士元三首皇甫冉一首顧况二首耿湋三首李端一首盧綸三首嚴維一首戴叔倫七首權德輿二首朱放二首劉復一首陳存一首鮑溶一首清水西别李參崔國輔人録尚書事家臨御路傍鑿池通渭水避暑借明光淑媛妻封邑軒車子拜郎寵榮因掖裏勢極必相亡留别武陵袁丞王昌齡皇恩暫遷謫待罪逄知己從此武陵溪集作溪去孤舟二十里桃花遺古岸金澗流春水誰識馬將軍忠貞抱生死留别岑參兄弟前人江城建業樓山盡滄海頭副職守兹縣東南棹孤舟長安故人宅秣馬經前秋便以風雪暮還為縱飲留貂蟬七葉貴鴻鵠萬里遊何必念鐘鼎所在烹一作亨肥牛為君嘯一曲且莫彈箜篌徒見枯者艷誰言直如鈎岑家雙瓊樹騰光難為儔誰言青門悲俯期吳山幽日西石門嶠月吐金陵洲追隨探一作採靈怪豈不驕王侯東京府縣諸公與綦毋潛李頎相送至白馬寺前人勒集作鞍馬上東門徘徊入孤舟賢豪相追送即棹千里流赤集作逺岸落日在空波微煙收官集作宦薄亡機括醉來即淹留月明見古寺林外登高樓南風開長廊夏夜如涼秋江月照吳縣西歸夢中遊留别伊闕張少府郭大都尉前人仙客就一醉主人空金罍江湖青山底欲去仍徘徊郭侯未相識䇿馬伊川來把手相勸勉不應老塵埃孟陽蓬山舊仙館留清才日晚歡取别風長雲遂開幸隨板輿逺負譴何憂哉唯有忠信者音書報雲雷嶽陽别李十七越賔前人相逄楚水寒舟在洞庭驛具陳江波事不異淪棄迹杉上秋雨聲悲切蒹葭夕彈琴收餘響來送千里客平明孤帆心歲晚濟代䇿時在身未充瀟湘不盈盡疑湖小洲渚聫淡淡煙景碧魚鱉自有性龜龍無能易譴黜同所安風土任所適閉門觀元化携手遺損益山中别龎十前人幽娟松篠徑月出寒蟬鳴散髮卧其下誰知孤隱情吟時白集作碧雲合酌罷集作釣處玄潭清瓊樹方杳靄鳳兮保其貞緱氏尉沈興宗置酒南溪留贈前人林色與溪古深篁引幽翠山樽在漁舟棹月清已醉始窮清源口壑絶人境異春泉滴空崖萌草坼隂地久之風榛疑寂逺聞樵聲至海鴈時獨飛永然滄洲意古時青𡨕客滅迹淪一尉吾子躊躇心豈其紛埃事緱岑信所尅濟北余乃遂齊物可任今息肩理猶未卷舒形性表脫略賢哲議仲月期角巾飯僧嵩陽寺留别鄭三韋九兼洛下諸公高適憶昨相逄論久要顧公哂我輕高調羇旅須同白社遊詩書已得詩選作比作青雲料蹇步蹉跎竟不成年過四十尚躬耕長歌達士集作者杯中物大詩選作冷笑前人身後名幸逄明盛多招隱高山大澤徴求盡此時也集作茍得辭漁樵青袍裹身荷聖朝犂牛詩選作牛犂釣竿不復見縣人邑吏來相邀逺路鳴蟬秋興發華堂美酒離憂銷不知何日更携手應念兹辰去去遙詩選作去折腰集作尚折腰平臺夜遇李景參有别己見二百十八卷前人赴新安别梁侍御劉長卿新安君莫問此路水雲深江海無行迹孤舟何處尋青山空向淚白日豈知心縱有餘生在終傷老疾侵案覆後赴睦州贈苖侍御前人地逺心難達天高謗易成羊腸留覆轍虎口脫餘生直氏偷金枉于家決獄明一言知已重片義殺身輕日下人誰憶天涯客獨行年光銷蹇步秋氣入衰情建德知何在長江問去程孤舟百口淚萬里一猿聲落日看鄉路空山向郡城豈令寃氣積千古在長平赴宣州使院夜宴寂上人房留辭前蘇州韋使君前人白雲乖始願滄海有微波戀舊常趨府臨危欲負戈春歸花殿暗寒傍竹房多可耐機心息其如羽檄何湖南使還留辭辛大夫前人王師勞近甸兵食仰諸侯天子無南顧元勳在上遊大才生間氣盛業拯橫流風景隨搖筆山川入運籌羽觴交餞席旄節對歸舟鶯識春深恨猿知日去愁别離花寂寂南北水悠悠唯有家將國終身共所憂江州留别薛六桞八二員外前人江海逄君少東南别處長獨行風嫋嫋相去水茫茫白首辭同舍青山背故鄉離心與潮信每日到潯陽曲阿對月别岑况徐説前人金陵巳蕪沒函谷復煙塵猶見南朝月還隨上國人白雲心自逺滄海意相親何事須成别汀洲欲暮春長沙桓王墓下别李紓張南史前人長沙千載後春草獨萋萋流水朝空集作將暮行人東復西碑苔幾字滅山木萬株齊惟有年芳在集作佇立傷今古相看惜解擕此詩三百六卷重出今已削去雨中過員稷巴陵山居贈别前人憐君洞庭上白髮向人垂積雨悲幽獨長江對别離牛羊歸故道猿鳥聚寒枝明發遙相望雲山不可知别陳留諸公前人戀此東道主能令西上遲徘徊暮郊别惆悵秋風時上國邈千里夷門難再期行人望落日歸馬嘶空陂不愧寶刀贈唯懷瓊樹枝音塵儻未接夢寐徒相思留别嚴士元見二百七十卷前人赴南邑集作中留題别褚七少府湖上亭見三百十五卷前人潁川留别司倉李萬前人故人早負干將器誰言未展平生意想君疇昔高步時豈集作肯料如今折腰事且知投刃皆若虗日揮案牘常有餘槐暗公門趨小吏荷香陂水膾鱸魚客裏相逄欵話一作語深如何岐路剩沾襟白雲西上催歸念潁水東流是别心落日征驂隨去塵含情揮手背城闉已恨良時空此别不堪秋草傷集作更愁人昔昔鹽薛道衡垂桞覆金堤蘼蕪葉復一作正齊水溢芙蓉沼花飛桃李蹊採桑秦氏女織錦竇家妻關山别宕子風月守空閨恆斂千金笑長垂雙一作白玉啼盤龍隨鏡隱彩一作舞鳯逐幃一作雲低飛一作驚魂同夜一作野鵲倦寢憶晨雞暗牖懸蛛網空梁落燕泥前年過代北今歲往遼西一去無消息一作還意那能惜馬蹄右此篇文苑英華題作劉長卿别宕子怨長卿集𥘉無此篇而郭茂倩樂府及洪邁容齋續筆並以為薛道衡昔昔鹽按通鑑隋煬帝誅道衡曰更能作空梁落燕泥否英華殆因韋榖編唐才調集作劉長卿詩而誤也其間八字異同已注一作邁又云玄怪録載籧篨三娘工唱阿鵲鹽又有突厥鹽黃帝鹽白鴿鹽神雀鹽踈勒鹽滿座鹽歸國鹽唐詩媚賴吳娘唱是鹽更奏新聲刮骨鹽然則歌詩謂之鹽者如行吟曲引之類今南嶽朝獻神樂曲有皇帝鹽而俗傳以為皇帝炎長沙志從而書之蓋不可考也然邁既謂才調集有趙嘏廣道衡燕泥一詩不應以趙為劉長卿云愚意此詩但當以綱目為證則其為薛道衡之作無疑矣留别王盧二拾遺李頎此别不可道此心當報誰春風灞水上飲馬桃花時誤作好文士只今遊宦遲留書下期疑客我故有山期婺州留别鄧使君包何西掖馳名久東陽出守時江山婺女分風月隱侯詩别恨雙溪急留歡五馬遲回舟映沙嶼未逺剩相思常州韋郎中泛舟見餞李嘉祐主人慿軾貴送客泛舟稀逼岸隨芳草回橈背落暉映花雙節駐臨水伯勞飛醉與羣公狎春塘露冕歸留别毗陵諸公前人久作涔一作崟陽令丹墀忽再還凄涼辭國澤離亂到鄉山北固潮聲滿南滁草色間知心從此别相憶鬢毛斑晚歸藍田酬中書常舍人贈别錢起卑栖却得性每與白雲歸徇祿仍懷橘看山免采薇暮禽先去馬新月待開扉霄漢時回首知音青瑣闈鑾駕避狄歲寄别韓雲卿前人白髮壯心死愁看國步移關河慘無色親愛忽驚離影絶龍分劔聲哀鳥戀枝茫茫海雲外相憶不相知留别鄭礒郎士元暮蟬不可聽落葉豈堪聞是日悲秋客那能此路分荒城背流水逺鴈入寒雲陶令東籬菊餘花可贈君别房士清前人世路還相見偏堪淚滿衣那能郢門别獨向鄴城歸平楚看蓬轉連山望鳥飛蒼蒼歲隂暮况復惜馳暉咸陽西樓别竇審前人西樓迥起寒原上霽日遙分萬井間小苑城隅連渭水離宫曙色近京關亭臯寂寞傷孤客雲雪蕭條滿衆山時命如今猶未偶辭君擬欲拂衣還潤州南郭郡留别皇甫冉縈回楓葉岸留滯木蘭橈吳岫新經雨江天正落潮故人勞見愛行子自無聊君疑作若問前程事孤雲入剡遙贈别崔十三長官顧况真玉燒不熱寶劔拗不折欲别崔俠心崔俠心如鐡復知金剛鎖無有功不徹仍於直道中行事不詆訐崔俠兩兄弟垂範繼芳烈相識三十年致書字不滅我來宣城郡飲水仰清潔藹藹北阜松峩峩南山雪顧生歸山去知作幾年别别江南前人江城吹曉角愁殺逺行人漢將猶防虜吳官欲向秦布帆輕白浪錦帶入紅塵將底求名宦平生但任真贈别安邑韓少府耿湋子真能未往集作自往江海意何如門掩踈塵吏心間説道集作閲道書故城集作古城寒欲雪逺客暮無車杳杳思前路誰堪千里餘别解明府前人間人州縣厭賤士友朋譏朔雪逄𥘉下秦關獨暮霏集作暮歸寒蕪上原淺殘燒過風微一路何相慰唯君能致歸集作政稀邠州留别前人終歲山川路生涯竟幾何艱難為客慣貧賤受恩多暮角飄長韻寒流起細波懸愁茂陵宅春色又相過歸山與酒徒别李端野客本無意此來非有求煩君徴藥送未遜集作未免憶山愁紅燭侵明月青娥促白頭童心久已盡豈為豔歌留春日書情贈别司空曙己見二百五十五卷盧綸落第後歸山下舊居留别劉起居昆季前人寂寞過朝昏沉憂豈易論有時空卜命無事可酬恩寄食依鄰里成家望子孫風塵知世路衰賤到君門醉裏因多感愁中欲強言花林逄廢井戰地識荒園悵别臨清野悲春上古原鳥歸山外樹人過水邉村潘嶽方稱老嵇康太厭喧誰堪將落羽回首仰飛翻將赴京留别令公前人沙鶴驚野雨𥘉收集作驚鳴野雨收大河雲集作風物颯然秋力微恩重諒難報不是行人不解愁留别鄒紹劉長卿嚴維中年從一尉自歎此身非道在集作薄甘微祿時難恥息機晨趨夲郡府晝掩故山扉待得集作見干戈畢何妨更採薇留别道州李使君圻戴叔倫瀧路下丹徼郵童揮畫橈山回千騎隱雲詩選作雪斷兩鄉遙漁滬擁寒溜畬田落逺燒維舟更相憶惆悵坐空詩選作通宵將遊東都留别包諫議前人衰容慙墨綬素舸逐秋風雲雨恩難報江湖意已終縣當仙洞口路出故園東唯有新離恨長留夢寐中灞岸别友前人車馬去遲遲離言未盡時看花一醉别會靣幾年期樵路商山館漁洲楚帝祠南登回首處猶得望京師江南别一作汝南逄董校書已見二百十八卷前人臨川從事還别崔法曹前人謬官辭獲免濫獄會平反逺與故人别龍鍾望所言隂天寒不雨古木夜多猿老病北歸去餘年學灌園海上别薛舟前人行旅悲搖落風波厭别離客程秋草逺心事故人知暮鳥翻江岸征徒起路岐自應無定所還似欲相隨婺州路别録事前人府中相見少江上獨行遙會日起離恨新年别舊寮春雲猶伴雪寒渚未通潮回首羣山暝思君轉寂寥酬别蔡十二見贈權德輿伊人茂天爵恬淡卧郊園傲世方隱几説經久顓門浩歌曳柴車詎羡丹轂尊嚴霜被鶉衣不知狐白溫遊心羲文際愛我相討論潢河忽朝宗傳騎令載奔峥嶸歲隂晚愀愴離念繁别館絲桐清寒郊煙雨昏中飲見逸氣縱談窮化元佇看分車起聖代待乞言餘干贈别張二十二侍御前人蕪城陌上春風别干越亭邉歲暮逄驅車又愴南北路返照寒江千萬峰毗陵留别朱放别離非一處此處最傷情白髮將春草相隨日日生别李季蘭前人古岸新花開一枝岸傍花下有分離莫將羅袖拂花落便是行人腸斷時出三城留别幕中三判官劉復翔禽記高柯倦客念主人恩義有所加四海同一身況皆曠代姿翰音及良辰陳規佐武略高枕據要津嘗疑作常願投素誠今果得所申金罍列四座廣厦無炎氛留連徂暑中觀望歷數旬河山險以固士卒勇且仁飾裝告來歸相送越城闉愧無青玉案緘佩永不泯楚州贈别周願侍御陳存漂泊楚水來捨舟坐高館途窮在中路孤征慕前伴風雨一留宿關山去欲懶淮南木葉飛夜聞廣陵散留别杜員外式方鮑溶東風吹旅懷鄉夢無夜無慙嘆集作見君子堂貧思上歸途海嶽泛念深涓塵復何須婆娑不材木屈曲無弦弧惻惻奉離樽承歡獨向隅時當鳯來日孰用雞鳴夫回首九仙門皇家在玉壺慙非海人别淚下不成珠文苑英華卷二百八十七
