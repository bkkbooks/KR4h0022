body:
  text: 文苑英華卷六十八宋李昉等編治道二山公啓事賦一首都堂試才賦一首射宫試貢士賦一首進善旌賦六首烏巢大理寺獄户賦一首山公啓事賦以平上去入為韻李子卿天官所以管轄多士藻鑒時英奉帝俞者實在於德為右司者必資於明於是懸鏡之照主衡之平照之無私也自分妍之與醜平之有凖也不失重之與輕賢以此逹政以此成伊晉室之妙智得山公之令名淵矣深量直哉惟清當為政之時九流式序及沒世之後千古流聲原夫啓事之端得賢之上振淹滯於管庫升仄陋於草莽人則荐歸士無長往朝必舉賢羅幽人之貞吉官必有能見君子之道長退李胤而聖主僉謀薦羊祐而國人所仰碔砆懸識自有卞和之鑒騏驎不遺無慙伯樂之賞由是大張明試廣示勸助惟才者不悔其來無德者亦得其去王戎簡要何所能名裴楷清通於兹寡譽九原可作思文子之與歸千載儻文望叔夜之何處當今有司明遺政緝隱逸吉人時薦多士歲入髙衢以騁若積水之奮鱗幽谷必登比初雷之啓蟄實薰蕕之有間固青紫而可拾客有希山公之密啓庶場苖之維縶都堂試才賦以四聲為韻閭伯璵原夫六官分職理化之紀綱八座設位國成之周行屬天下有道羣才向方今兹觀德足用舊章天子開司會之府求俊選之良昭其能則平施其祿思其濫則大為之防既作鏡於前典乃懸衡於髙堂信入仕之覆簣為登科之履霜名實斯别謀猷以昌分雁行於廣厦引魚貫於長廊明試以言率由厥道彼興邦之所急庶用賢而為寶上之化下也猶風下之應上也如草惟德助理惟才輔政啓甲乙之科修文學之令卦列在隂之象詩著食場之詠固藏器以俟時亦進思而體命徒觀其來頌來歌以引以翼因考覆而升降隨臧否以黜陟叩兩端而不疑守大中以立極將採梢雲之幹必表凌霜之色人未易知道亦難測儻棄瑕而録用希萬國以不息射宫試貢士賦以試之射宫考藝觀德為韻失名古者先擇藝之科盡得賢之意以諸侯益祿之選用男子懸弧之事禮容斯作皆專正鵠之能藝實不同故有射宫之試於是英髦畢集弓矢皆持望其審固定以妍媸驗體正心平之方取其類者設周旋進退之度用以觀之苟三侯之不失在五善而奚疑當其立德有容凝神多暇弦開而滿月初生箭發而飛星共借推髙於衆人之上所謂簡能定凖於百中之先斯為善射始則干時上國貢藝澤宫念登科之有望冀合矢而成功藴破的之心每期於度內致穿楊之用終在於彀中是故節以采繁之詩尊于在公之道謂得失之可驗故否臧而盡考為仁在我助祭之事固宜有慶於君益地之期可保今也時所推公人皆獻藝思呈妍於揖讓之表願騁志於操張之際動而有節君子之爭不為發必循聲長者之容是繼必以藴才思妙用古為難則當追軒后弦木之功於斯取驗法仲由執弓之道庶或可觀然後以射為規以仁為則兾大道必公於取希有司不愆其職夫如是則天下藴藝之徒莫不望君門而效德進善旌賦以設之通衢俾人進善為韻李逢吉皇唐之與伊唐也濬哲文思異代同時咸進善以欽若又建旌以求之不進善焉何以延側陋之士不彰别也何以嘉讜正之詞是宜式創宏模聿陳令典綴析羽以藻耀植修竿之偃蹇相其地以崇樹所宜因其人以康莊是踐即之者有以翊聖瞻之者於焉遷善忠謇之徒鳯馳雲趨畢效臣節同膺帝俞猶金礪而君臣合契類土圭而形影相符􅒯立岧亭而克同國柄直行徑挺而自陟天衢由是悉索草茅罔資介儐髙懸垂逮下之德仰視知不言之信咸䇿足以員來思捐軀而自徇同於舞羽至諴之感必臻異彼弨弓非禮之招不進大哉求仁其必有因懿此標表本乎咨詢制其事者上惟允恭之帝集其下者衆皆可封之人是必隨謗木以用舍與諌鼓為等倫若夫容衛繁多制度奇詭玄蛇始務其厭勝翠鳯式崇乎侈靡熊虎之示勇則那日月之比崇徒爾寧有裨於啓沃且無取於率俾偉夫有臺有宫胡為乎途中所以闡於聖聰使無不通爰樹爰揭豈惟乎人恱所以遵彼雋傑使皆就列然後朝廷邁德嗣於羲軒得賢方於稷卨躬好問之裕有知人之哲固以日奏於嘉言矧斯旌之攸設第二同前韻陳諷惟哲王儲精庶務示人降𠂻冀一善之咸覩俾羣情而大同抗以髙旌式觀於五逹萃兹多士以聞乎四聰是用去疵厲而達幽仄和上下而宣德風邦有道而無隱善如流而必通原夫創自堯心變昭漢列參夫析羽之制有類干旄之設名既匪於司常用有殊於掌節多通達之要會集寰海之賢哲每聞致主之言時得興邦之説足以見王臣之謇謇聖德之孜孜示人有作虛已無私旌非善而罔進國非賢而不釐遵道員來懋德音而親問擇隂斯止備獻體以陳詞敷一德而見答俾兆人而賴之徒美夫因事立名教人示信略孤表以遙集掩羣才而得雋無勞負笈而來豈必繫轅而進於以光啓帝道輝映天衢陋燕昭之尊隗小齊景之招虞正以居中表𢎞道之在我直而端本知立德之不孤於是野絶遺賢朝無闕典仰崇標而勸義臨廣術而來善豈比夫周聆木鐸之謡漢尚石渠之選方今酌憲前古肇康有人將葑菲而並采俾弓旌而是陳故野無逃名之士朝有俾象之臣舉善陟明振遺芳於虞帝率心敗德矯覆轍於嬴秦然則庶績交修遐邇率俾儻片善之可録庶無疑於室邇第三同前韻栁道倫帝堯有君人之大德恢理國之令圖將啓納善之懷於四方之士乃立進善之旌於五逹之衢所以訪政化之本招賢俊之徒告善貟來故進而無妄聞善必納信言而有孚類諌鼓所陳同謗木之設彼思聞過而遷善此俾明善而就列善既陳而一人有慶旌既立而萬姓咸悅寧同旟旐之翩翩奚貴干旄之孑孑九達之上大逵之中直影而晴分瑞日孤懸而晝引祥風置之則上德下布就之則下情上通既至者固當授之以祿將來者不假招之以弓初孰為此自陶唐氏制乃有常張而不弛嶷然而孤標獨立逈爾而中立無倚示華夏則綏之斯來化要荒而罔不率俾厥旌既陳盛德日新使樂善之儔得因旌以進知建旌之意固惟善是親可以光被區宇統和天人比垂衣於百代異舞干於七旬繇是廣達四聰必徵片善咸望雲而就日若風行而草偃求其善理知百僚之師師采其善言得王臣之謇謇今大君聰明文思庶政無遺善以求人固以逹於政矣旌可進善亦在推而廣之士有敦詩書懷忠信學頗師於鄒魯君幸逢於堯舜比潛鱗而待躍同弱羽之思振欣逢進善之時庶以善言而進第四同前韻陳左流總目作九流彼旌孑孑兮五達之中進善為名兮求善為功狀岧亭以戴日勢聳擢以凌空王者所以開讜諌之路作耳目之聰故帝堯設之道由此達洎我唐建也化乃斯通觀其逈立長衢孤標數仞麗晴天以獨出抗髙閣而爭峻體惟能正俾止惡而來觀影則不虧使言善而思進莫非明主求臣願聞所陳期乎啓沃之佐想夫股肱之人由是標格寰中萬姓瞻之以為凖髙居物外九重隔之以為梟疑作臬至乃不傾不危持堅孤絶非虹霓之光欲拖豈日月之明能揭故邦無道則我斯廢邦有道則我斯設彼書謗之木安可與齊承露之盤何能並列吾君庶政允釐獻納是思多聞得賢之頌每詠補衮之詩猶恐化理未洽俊乂尚遺而彼士則可招矣在斯旌故宜立之且夫為干者其利淺為旌者其功鮮曷若當天下之用進海內之善搜揚不倦道已盛於方今正直長存事足昭於古典况登於睿鑑旌之通衢人則是仰物豈能踰謂善建者手不可拔豈有力者負之能趨是知昔之設旌也其美如彼今之設旌也其美如此君若好善士皆可俾士有願歌乎聖德庶無慙於末技第五同前韻竇從直邈矣帝德至哉聖謨廢置殊時古今合符孑孑之狀可觀將從五達孜孜之道斯表克協三無是以聳彼群彥致之康衢願揚美以歸厚思獻忠而效孚故得繼以此信言由是進明揚既達且自殊於表閭謇諤必陳豈可同夫先俊觀其悠揚廣衝旖旎從風諒賢愚以咸覿固朝野而必同式委垂而下俯埃壒乍直指而上映晴空過之而凛然生敬仰止而卓爾在中苟厥志之有立當其誠以遂通俾其不進不止豈徒自西自東已哉俟爾貞烈自疑非虛設既異詩人之干旄匪同叔孫之綿蕞匪善奚取惟賢是謁彼謗木焉得而比矣諌鼓胡可而儔之苟匡救之惟徵我無爾詐而旌别之有制爾無我欺則賢既樂只人將率俾不獨翻曉日以搖搖獵輕風而靡靡至仁斯被至化為淳何必改舊然後為新矯前王之令德酌古典之攸遵雖謨訓以克備尚芻蕘之是詢萬國欽風岩廊盡英髦之士百蠻向化版築無屠釣之人故知至德在於求賢救世資乎擇善則設旌之道也為皇王之盛典第六同前韻范傳正為君者莫大乎求賢審賢者莫先於進善不立表以取則何朂人於自勉故我后纂唐德酌堯典爰揭旌以建標若懸鑑而攸選其制惟新難乎所陳置於朝懼來而有阻樹於野慮獻之無因於是施之五達之陌以招四逺之人乃析羽上插綴旄傍委映旭日之曈曈隨長風而靡靡孤標逈出中立無倚將舉事以舉言在率土而率俾儀神都聳康衢或斂衽以下過或峨冠以來趨善或可聞豈持之而有怍德苟未進敢欺之而自誣旌因名而助順士修業以求進小人斯逺實曰不怒而威君子必臻可謂不言而信瞻之者其行勵仰之者其心慎非表善之為崇亦懲惡而能峻故得有善者不擁無媒者自通所以導人之志達帝之聰豈比夫舞干兩階徒有格苖之用樊纓七就何旌進善之功亭亭不撓奕奕斯設招一善而百善知歸納一人而萬人胥悅諒厥裁之為美與恆用而有别施之行馬豈得耀於朱門授乃元戎何貴偶夫全節藏器以待時與斯而若期惟事匪細惟賢是司儻片善可録至公不疑願佇立於旌下幸因兹而進之烏巢大理寺獄户賦以昔開元中刑措至此為韻韓鎡皇帝恩霑庶類道格玄功化覃於萬國之間苛慝不作烏巢於圜扉之內囹圄知空載飛載止以雌以雄寂寂無猜於牖下翩翩不去於林中足驗時清可知刑措亷恥必格寬仁有裕垣深不阻於歸飛籥動何驚於反哺蒼鷹莫擊寧懷獄吏之憂踈網無加豈有虞人之懼夫刀鋸勿用狴牢洞開顧藂棘而未下拂青槐而乍回拾卵無聞於貪吏焚巢自絶於然灰表異而居飲和而至翻然用刑之處閴是無人之地中臺柏老顧栖息而難安念室扃間每飛鳴而自遂實由吾君信孚禽鳥澤及黎元共履安平之路咸知仁育之恩向日寧憂於闔户知風不憚於襲門定國徒美於祥明何施善政冶長不罹於縲絏豈見銜寃自然罔遇殘傷免於彈射曾無滅趾之士不有抱關之客既生既育八九子以均安不識不知四三皇於往昔是知政惟惠愛不尚威刑止夏臺而自逸陋楚幕之不寧永夜風凄或徘徊於月樹逾冬候暖欣寂寞於訟庭彼三足徒稱夫盛事素容虛美於祥經懿夫昭德塞違柔逺能邇大無用於兵革細罔行於鞭箠每夕宿而來斯寧夜啼而去彼昔周稱訟息漢號刑清曾何足而致此文苑英華卷六十八
