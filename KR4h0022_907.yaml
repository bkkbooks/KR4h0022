body:
  text: 文苑英華卷九百八宋李昉等編職官十六諸將軍五右武衛將軍栁嘉泰碑一首左武衛將軍白道生碑一首雲麾將軍郭千里碑一首雲麾將軍李楷洛碑一首右武衛將軍栁公神道碑郭訥公諱嘉泰字元亨其先魯展氏自司空無駭至于展禽食邑柳下遂因采錫姓魯為楚滅遷於晉之解縣今為河東解人也洎衛之莊漢之祉褒之講論六義琮之黃金一笥赫奕勳業代有其人夫乾之垂象也上將躔於五緯坤之導河也中條控於一曲以育粹應德嶽以降神生賢賢可以為王爪牙德可以為國禦侮孰任其所事則公庶幾焉曽祖則隋左衛騎曹參軍皇贈蒲州長史堙厄卑位有才無時李葉蕩而困於先號聖人作而光於後命祖奭皇中書令河東公厚德載庶物直心尹天下齊七政於璣衡致一人於仁壽雖子孺之周密方進之通眀不是過也父爽皇贈朝散大夫鄜州司空遜而守忠敏以承德故有臺之樂未寵於皇庭而斯皇之榮遂飾於泉壤三代繼業盛達公承纍行之慶靈稟中和之粹氣粵自羈貫逮乎成人矗其堤防森是矛戟直節以成果勇溫德而著令儀其行已也恭其親師也謹其從政也恪其取友也義奉長者之深闕不越中庸讀夫子之微言取其大略公幼丁太夫人艱襁褓之內若有所失景雲元年先帝在藩以公女兄為妃則申王之舅以外戚解褐授左金吾衛中侯則知傅昭儀之淑德載誕恭王李夫人之麗容是榮協律公循道執一體正無二不以怙寵而倨貴不以茍榮而屑禮無何丁鄜州府君艱一粥之食杖而能起無時之號泣以繼血先帝龍飛公猶在疾制令起復疑為左領軍衛左郎將賜緋魚袋腰絰外除心喪內毁朝廷韙之開元二年申王以伯舅重奏公為本府左帳內典軍九年又遷右衛率前郎將十年又轉剡王府咨議十三年加遊騎將軍守左衛中郎十八年定逺將軍守左清道率或參桂巖之文雅或握蘭騎之兵權肅宫道則荀埋疑之清和翊周廬則衛綰之醇謹二十七年又加眀威將軍守右武衛將軍上柱國賜紫金魚袋任同許褚職惟萬嵗戎旅孔循禁衛斯整煥彼章綬崇其寵榮故一心事君凡遷徙官位不矯訐以沽譽不介獨以轢羣所蒞必聞所適必當來有其惠去有其恩無潘嶽之一除免子文之三黜縉紳之士以為美談以其年七月遇疾彌留有加無間御醫驛路中使在門猶能正不溷邪故巫覡莫進殁必合度故手足全歸以八月四日終於長安開化里之私第春秋六十有一遺誡薄葬眀主驚悼久之詔使就第贈物三百段粟百石葬者量借手力縵幕威儀簫鼓飾終之典斯為盛矣以十二月二日歸窆於萬洪固之原禮也羽儀道路觀霍葬之紛紛龍虎罔原見勝城之鬱鬱公萬頃旁注千尋直上碩量瑰材敏識井節家人莫見其喜愠時輩但美其風流其存也子罕之不貪其殁也國僑之遺愛故欒棘斬焉謂之善居也金革不避謂之從權也貴而不滿謂之鳴謙也仕而守節謂之公器也疾而得正謂之知禮也終而薄殮謂之達道也詩曰人之云亡邦國殄瘁其此之謂乎夫人王氏琅琊郡君晝哭之外庀喪字孤嗣子祐良等遑遑焉過禮之孝也哀哉碑篆盡假於余柔翰徒施實慙於墨妙貞石既刻有愧於色絲其詞曰將軍本胄出自周後羽父諸族展禽食柳自兹保姓才與時偶涉河居東賢哲代有鼎氣潛育河精隂受降生將軍百夫之首眀鑑思瑩洪鍾待扣三紀典兵一心事后賢妃之季名王之舅梁苑寵崇漢家恩厚朱軒繡軸金印紫綬渥窪籋雲清平衝斗位才上將年未中壽遇疾徹懸全歸啓手杜陵東柏秦原柏阜旌轉城隅煙凝谷口屬屬孤胤哀哀孀婦松檟淺深岡巒左右通溝刻石天長地久嗚呼將軍殁而不朽左武衛將軍白公神道碑于益淳維之地上載斗極其氣徑悍其人驍雄間生將才恢我王略其革去故俗鼎從新風建功惟忠戡難以武常袵戈革每襟邊陲服士連華重代襲祉啓迪後嗣光照前人可得而言也公諱道生其先呼韓之宗谷蠡之胤代居南部早入中原漢興論封特命弓髙之秩周臣赴會爰書潞子之班祖廣琛雲麾將軍左羽林大將軍心膂北軍爪牙中壘徼道以肅期門有嚴父崇禮忠武將軍左金吾衛翊府中郎將職副緹騎名雄鶡冠驚於誰何勤以夙夜公誕自朔漠習于干戈太公之符如已神授孫子之要動皆暗合心傾奉國膽略禦邊鎮在疆場統其蕃部尋為寧朔州刺史兼部落主恩附獷俗威除冦攘軍門罷扄虜騎逺遁開元中信安郡王禕以宗室之賢受登壇之寄每有討伐命公先鋒冦必能嘗險不避難馘黠虜之首繫林胡之俘仍授河湟大破戎醜數實過當議功居多一自捍邊三十餘載終于左衛大將軍春秋六十夫積善疇慶嗣續不忘辛氏繼封耿門多將求之於代公實有焉其子朔方先鋒使同節度副使開府儀同三司試太子詹事左武衛大將軍上柱國南陽郡王元光乃勇絶倫而忠能力九伐之際常為戰鋒勞旋䇿勳議績當最封開八國秩亞三司皇上寵乃茂功義崇追逺恩光照於幽穸厚澤降于豐泉贈公太子賔客夫人康氏為越國太夫人喪事官供有加常等以永泰元年三月二十四日遷窆於萬年縣鳯棲原禮也雙旐同引千車會送更刋貞石式建豐碑同武庫之間樵蘇永禁比祁連之象丘壠長存銘曰地在玄門代為良將名重關西氣雄塞上繼秉金鉞載居玉帳戰必為鋒居當保障粵有令子時髙茂勳援戈揮日杖劔決雲東平冦孽西掃妖氛志由忠立名以勇聞刻兹貞石以表孤墳雲麾將軍郭公神道碑楊炎山之西出將地之右主兵故前有辛李之雄後稱周郭之盛四族者貔武其人風雲其氣出入千載蕃落憂之皇唐一宇宙之初數邊蕃之罪太白上而天兵利隂精盛而神將出於是郭氏之室世並五侯丹華轂者三十人分采地者三千户劔騎鼎食氣蓋關山開閣而珠履成行宴享而山玄滿座中興之俊鴻臚間出始以一劔而震清海一侮作漢年未三十名冠雲臺位為國之長城身主人之大命銘旗羽葆小韓侯之故事龍斾青社增召伯之舊封則祖宗之盛未始聞也鴻臚即世關隴不震天其永思戡定之代故盛業集于金吾金吾名千里即鴻臚之孫出於荆藍之中長於松柏之下虎頭駢脅曲踊雷聲猿臂過挾輈之材鷹揚表下韝之志始以將門子往還隴上開元中西討石國負羽先登特拜遊擊將軍折衝都尉駕龍媒於殷路舞雙劔於前席二十六載詔公與中使劉玄復開蔥嶺以功勝敵不能軍班師授左武衛將軍特賜衣甲一副超才也後五載有苑門之後走射雕之羣拜左衛將軍嶺巖人陳既成列而破石城天險不待戰而降纍遷左金吾衛大將軍驟兼玉門軍使未行而遇疾嗟呼病生刮骨志屈噉肝纍喉白刃之中垂翅青雲之上以天寶十一載二月薨于武威之第春秋若干夫人𢎞農郡君楊氏綘郡長史之孫臨洮軍使雲之女河華茂氣齊薑盛族知疑作和于鳴鳯而外姻致駕宜爾幹母而君子好逑始於龍劔雙飛中而雲虹獨感春秋若干有子一人曰某果毅都尉山西將種塞下雄兒周郎之豪勇冠軍終子之精魂先返年二十一先公而夭郭氏本自周王之穆其在昔也漢有司徒司空魏有車騎驃騎或竹馬垂信或金玉疑作冗稱豪世后佐漢以補天賢王築館而為道其在今也一門三戟六乘七侯伊吾反昭於前鴻臚特坐於長河萬里敵國四方每賔祭往來搜除大閲望帶裳者知宗廟之盛執金鼓者成父子之軍世德後來公其濟美則勳配祀典中乏主祭之名哀及路人內無朝哭之位此窈窕之數孰可問哉猶子子鸞善達禮以繼門族樂主辨以濟險艱荀令君為不亡趙將軍其有子以十三載某月葬我公于武威東原非緩也實卜年龍蟠天井岡伏山形閟星象於玄宫起風煙於松闕將軍鼓吹回過細柳之營天子輅車出祖茂陵之道銘曰壯哉強魂凜然風雨一劔刳鯨空拳搏虎錫以翿鼓觼􅀈鞗瑲騂騎佩組革彼莊薑䄖翟珩璜言念君子乃心無忘精返太白魂歸故鄉雙墳巍然流水湯湯秦雲如牛澗石如羊二龍於此父子同岡雲麾將軍李府君神道碑前人斗極之下曰幽都其氣角立其風精悍常山之下曰涿野其鎮碣石其神蚩尤海嶽回抱府君出焉雲龍感召府君感焉惟天永保唐運故府君來朝克生保臣輔寧大業坐中台者二子銘鼎鼐者六朝當國宣九合之勳升堂有八元之族府君諱楷洛先族漢校尉之裔也世居其疑北遂食堅昆之地實主崆洞之人大為王侯小為侯伯其精薄日月其動破山川厥後東遷復為鮮卑之右府君英眀淳渾神踴天飛威嚴生介胃之容魁岸本山河之狀雙舞長劔左盤雕戈虎嘯于窮溟雲從於大澤有沉謀以忠一作惠中國有長技以服諸戎天子聞而思之密命竒士要之信誓君子曰井谷不可以遊龜龍儀垤不可以栽松柏淮隂去楚百里絶虞尚父從周樂生歸燕此必精合於王霸魄見於祥符宜乎萬方而趨一言而感矣是年冬府君與帳下騎士言曰吾乃祖本漢將辱於單于之庭而今千年大恥壯士當建功大國上駕真龍曷有遇風雨而泥蟠無卷舒以蜿變由是奮躍遼海翻飛上京其來也戎羯生憂其至也幽燕罷警上御前殿庭列千官鍾石畢陳君臣相賀始問其姓因賜以家族特拜玉鈐衛將軍先賜以大弓文馬又拜左奉宸內供奉升玉堂飱沆瀣矣帝曰余欲成幽都殪死市乃命府君為朔方討擊大總管於是雲麾鐵騎川動地踴左飲青海北登狼山帝曰余欲宅嵎夷破鴨緑擊靺鞨俘林胡乃命府君兼幽州經略使於是間榆關橫障塞三以竒伏五以勝歸帝曰余欲軍北方之野乃命府君為清軍於是敵也無氣𦦨之作士也無踴躍之勞帝曰欲護坰牧使於是慿列走隊法掩亭院神螭水瑞孔阜充碩帝曰余欲書日月之常教熊羆之旅咨爾職典彼朔方復命府君為節度副使於是鎮之以德宣之以威師和年豐罔或不若帝曰余欲配鈎陳之位養死事之孤乃命府君為左羽林將軍於是蓬頭射聲上貫牛斗帝曰余欲屠石堡疇其代謀僉曰府君乃命佐中權發大號於是玄黃灑血玉石俱摧載闕中兩蕃不庭有詔府君尋盟舊國單車從漢二憾來同敵人變心懼我為患乘主客之勢合貔貅之凶甲興于門車結其外府君復為死地井為國羞仰而騰駒若與神遇橫跳出於虎口伏念歎於龍顔的盧之師惡可喻也吐蕃之冦河源衝下慿矣矢石交作府君以精騎一旅濟河之一作而南萬火燎乎他山三軍出其間道驚冦四潰重圍自解加竈之竒孰云多也初府君將赴征西謂所親曰余往必尅敵殆不能歸及班師獻捷殁於中路眀達人之委順君子之終鄧公之勇曷其智也至若秉季布之然諾法穰苴之政教動於軍志舉合吏能竒謀絶於揣摩故事留於風俗神對厯象精缺晦眀勤道不形進而人莫見也為政以德寵而久彌尊也始自天后之末至於聖皇之朝前後録功凡二十四命食邑二千七百户封薊郡開國公又加雲麾將軍參定國者兩軍拖侯服者四紀會兵車者百勝出帳下者千人國有事未嘗不動勞無私可謂知禮故得大命三錫重侯纍封輅車山玄藏于大室壯圖未極沉疾生勞臨合浦之秋伏波將老望河源之道征虜不歸某年某月日薨于靈州懷定縣之師次享年六十有七追贈營州都督賻物三百匹米粟三百石以眀年某月日詔葬于富平縣檀山原禮也夫人某郡都鴻臚卿某之女異氣祥合髙門鬱興卜鄰也鍾鼎再懸受祿也夔龍在席元子太尉臨淮郡王兼侍中光弼河圖鈎合上感神精磅礡于隂陽之和同符於元命之紀次子將作監光彥氣含精徑仁服孝慈列侯于千石之家從事于四方之志少子太保光進命匹忠義縱橫知名天之辰象物之粹靈乾元中大尉以東諸侯三會于河再以駀髳濟于淮海天子美齊桓之志系凡蔣之盟以府君炳德丕赫積流仁慶追考功績發于簡書諡曰忠纍有褒贈號韓國夫人於是建廟堂命宗祝室有山龍之服饗有金石之和昭宣令圖煥然銘篆以炎掌史之官也奉命為詞徘徊大名頌耿弇有終有慶慷慨觀德美張仲為子為臣銘曰茫茫上天下降狼星崆洞之野焜耀其形於赫巨唐風雨是經矧伊本邦曷不來庭煌煌府君為國之翰從順干戎威讐勦亂隂剛萃靈㝅碣精悍志不可玩綿綿塞草天地疑之下北拒狼山野無敵馬殊勳大績玉劔玄社天空武庫海折崑崙在昔遺慶魯之臧孫曰聖在天勤于至道既命太尉亦崇太保一門四龍三作元老赫赫元老氣合清貞白髮垂冕髙堂有親帝命韓國祚于夫人亦詔薊邱下寵眀神左鑿貞石垂于將來矧我洪勛上懸雲臺彼邱之頺此澤之堆悠悠令息萬古不回文苑英華卷九百八
