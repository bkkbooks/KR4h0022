body:
  text: 文苑英華卷九百九十二宋李昉等編親族二祭兄文四首祭弟文五首姨弟附祭符離六兄文白居易維貞元十七年某月某日從祖弟居易等祭于符離主簿六兄之靈嗚呼聖人集無人字忘情愚不及情情所鍾者惟居易與兄豈不以親莫愛於兄弟别莫痛於生死集作死生斯親也而有斯别也孰能不哀集作苦從中來而失聲去年春居易南遊兄亦東適黟歙之間欣然一覿相顧笑語相勉行役中路遽别情甚感激孰知此别為生死隔矧兄遇疾于路路無藥石歸全于家家無金帛環堵之室不容弔客稚齒之子未知哀戚自古孔懷之痛亦莫我之與劇古人有言神福仁天祐集作福敬又曰惡有餘殃善有餘慶惟兄道源乎太和德根乎至性以孝友肥其身以仁信羶其行而位不登於再命年不及於知命何報施之我欺俾吾兄之不幸嗚呼已焉哉既卜逺日既定集作宅新阡春草之中盡集作宅為墓田濉水南岸符離東偏其地則邇其别終天惟弟姪與家人儼拜哭於車前魂兮有知鍳斯文歆斯筵知居易之心㷀㷀然祭烏江十五兄文時在宣城前人維貞元年十七年七月七日從祖弟居易謹以清酌庶羞之奠敬祭于故烏江縣主簿十五兄之靈易云積善之家必有餘慶書曰非天天人人中自集無此字絶命則冉牛論語作冉伯牛名耕斯疾顔回不幸何繆盩集作舛之若斯諒聖賢而集作之同病惟兄之生生而不辰孩失其怙幼喪所親房無兄弟藐然一身自强自立以至成人蓋以孤子靡託友愛彌敦自居易與兄及高九行簡雖從祖之昆弟甚同氣之天倫故雖百里信宿之别曷嘗不惻然而悲辛矧終天之永訣知後期之無因徒撫膺而隕涕諒沉痛之難伸追思乎早歲離阻各悲零俜中年集㑹共喜長成同參選於東都俱署吏於西京居則共被而寢出則聫騎而行友于四人同年成名優游笑傲怡怡弟兄雖不敢集作比字侔八龍三虎亦自謂當家一時之榮及兄辭滿淮南薄逰江東居易亦以行邁忽逆旅而相逄或歌或酒宴衎從容何朝不遊何夕不同常以兄仁信根於心孝弟積於躬謂至行之有益集作答必景福之集作以來從嗚呼位始及一命祿未過數鍾年又不得四十而歿於道路集作途之中鬱壯志而不展結幽憤於無窮况舊業東洛先塋北邙三千里外身殁陵陽有妹出嫁無男主喪悠悠孤旐未辨還鄉宣城郭集作之西荒草道傍旅殯於此行路悲凉秋風蕭蕭白日無光聚今晨之弟姪對前日之杯觴稽首再拜魂兮來享進三奠而退一慟孰不神酸而骨傷哀哉伏惟尚饗祭浮梁大兄文時在九江前人維元和十二年歲次丁酉閠五月十日已亥居易等謹以清酌庶羞之奠再拜跪奠大哥于座前伏惟哥孝友慈惠和易謙恭發自修身施於為政行成門內信及眀寮亷幹露於官方溫重形於酒德冀資福履保受康寧不謂才及中年始登下位辭家不集作未踰數日寢疾未及兩旬皇天無知降此凶酷交遊行路尚為興歎骨肉親愛豈可勝哀舉聲一號心骨俱碎今屬日時叶吉窀穸有期下邽南原永祔松檟居易負憂繫職身不自由伏枕之初既闕在左右執紼之際又不獲躬親痛恨所鍾倍百常理嗚呼追思曩昔同氣四人泉壤九重􅀈奴早逝巴蜀萬里行簡未歸㷀然一身漂棄在此自哥至此集作屯形影相依死灰之心重有生意豈料避弓之日毛羽摧頺垂白之年手足斷落誰無兄弟孰不死生酌痛量悲莫如今日宅相癡小居易無男撫視之間過於猶子其餘情理非此能伸惟集作伏冀慈靈俯鍳悲懇哀纒痛結言不成文嗚呼哀哉伏惟尚饗為李兵曹祭兄濠州刺史文李商隱年月日伏惟靈天枝挺秀帝系傳芳材髙杞梓價集作位重圭璋蘭芷斯茂先以馨香干鏌將用不挫鋒鋩始備千牛俄仕諸衛逸意方超絶足猶繫爰佐郡僚亦掾神京邑惟二宅曹實五兵地峻流急官間政清嵩少曉霽伊洛秋明侣能吟之謝客伴作賦之賈生遂擢堯厨仍調湯膳位列集作字大朝名參內殿朱紱輝華銀龜舊粲漢有宗正委之親賢二彼惟月人寧我先外夷求騁集作永騁非天子憂邊皇華始賦紫綬俄懸雄其出塞之任假以中臺之權不拜無慙於蘇武去節寧類集作疑於王焉銜鬚誓死嚙雪獲全帝仗使者吾無愧旃既還中華止同屬國蒼蠅難備集作祛貝錦方織好丹非素㸃白為集作成黑遭時不知非豫有惑既先忌於絳灌遂不容於欒郤竟陵山水鍾離控扼名貴隼旟時瞻熊軾人以功遷吾由謗得其明若神其惠如春先除㸃吏且活疲民汙萊盡闢邑室重新草祥木瑞獸去鳥馴方俟徵還俄嬰美疢積微而桓侯竟晚逹命而徐公待盡恍恍空驚遲遲未信誰知泉路之高低孰測夜臺之逺近永惟良配亦實女師庶姜猶效君子是宜異室無怨同穴有期河魴著詠皎日裁詩嗚呼哀哉龜筮叶從日時斯卜將去芳郊言辭華屋草樹縈帶川源回復白髮孤弟臨棺慟哭失慈撫於終身宛聲容之在目心摧則氷炭交集血下而綆縻相續萬古永訣百身何贖酒滿未御殽乾未臨已矣伯氏來慰哀心為人作祭弟文張說維景龍三年集作元年按通鑑目録景龍四年庚戌七月改元年景雲當考歲次庚戌正月癸丑朔通鑑目録作壬子朔五日丁已從兄兵部尚書某以清酌少牢之奠致祭於故將軍弟之靈欽若貽宴俾降戬榖神作集作拆玉衣天開集作門非金屋綿系溢竉諸宗橫福覩交泰之二儀承殷序集作序殷之九族引同本於條幹合分流於昭穆義有感而意深恩無方而情篤况且山慕喬頂林晞霧水深仁逺慶俟子而集作能復何縱才之有餘而輔德之不足舉朝野而皆痛在親密集作密愛而尤酷嗚呼哀哉永懷令弟言念生平蘭薰集作萃雪艷玉潤珠清禮樂懸解文章挺生三篋暗記千門畫成風流望美月旦馳集作傾聲掌北軍之師律首東觀之詞英偉壯夫之獻頌善仁者之論兵眷新豐而臨幸繞湯井而連營那奉車之暴逝忽復綏而凶行軫天悲於宸振聚國集作國娶族於華京惠連詩夢子敬琴情儻昭昭之不泯知親親之素誠嗚呼哀哉尚饗同前維年月日兄某致祭亡弟尚書之靈天其集作實喪豫不憗遺善家殞玉樹國墜寶臣嗚呼執柔何痛之甚嗟豫與爾夙遭憫凶哀惸相鞠殆及長成性實岐集作岐實頴德表宣慈居盡友悌之心言必忠貞之事綿綿我族俟子而大奉祖德之令圖荷朝戚之渥惠白首相對紫綬相紆爾既秉國均集作鈞既敷朝典出牧千里入宰六官余聞爾言常戒過寵余嘉爾行在貴能畢清淨溫恭每希於上士飲食車馬不越於平人每思與爾歸印東都懸車故里揚名講德居常侍終當謂老夫沒於汝手不圖令弟殯疑作殯自我先及爾纒疴屬余伏枕不見數日長悲九泉嗚呼刋述未成平生已盡髮膚猶在魂魄焉知聞爾屬纊之辰託余身後之事薄葬之禮還從爾心字孤之情不待遺意所恨在疾不視於喪不臨沉綿苦懷纒迫斯甚余嬴老矣傷心幾何人琴兩亡命也命也祭亡弟故左羽林軍兵曹參軍文孫逖余年有五爾實以生四十餘載而為兄弟撫髫並育接袵相成奈何棄豫長隔幽明爾之德器寬仁溫厚天道何欺不假爾夀爾之緣飾文學政事天道何欺不假爾位未至中秋才過強仕奄忽如斯嗟何及矣豫兼右職爾位中司兩京為别數稔于兹頃雖一見倐已三時㑹合嘗少悠悠我思近有東訊駕言西上顧日望期心存目想當乘疾置以軾徂兩方欲再馳豈圖長往醫不及侯藥不及嘗壯年殞命暴疾罹殃無一言以告訣有萬恨於冥茫長號永痛裂膈抽腸爾逄疑天威余限王事倉卒之辰急難靡寄遣奠之日奔臨莫遂痛緒彌深哀端益至今也來斯驟移時律目絶遺象心摧虗室顧天倫之有戚若具體之喪一諒修短之同歸在先後而相恤撫遺孤而流慟氣腷臆而內圮伊物情之共傷豈余心之忍此蓬也未立穆兮仍稚以吾視之何但猶子神本不滅爾則有知精爽如在知今心期同蔬永絶采藻空施銜酸沃酹哀不能支祭小弟文白居易維元和八年嵗次癸已二月某朔二十五日仲兄居易季兄行簡以清酌之奠致祭于亡弟金剛奴嗚呼川水一逝不復再還手足一斷無因再連惟吾與汝其苦亦然黃壚白日相見無緣每一念至腸熱骨酸如以兩火刺灼心肝况爾之生生也不天苗而不秀九歲夭焉昔權殯爾睢南古原今改葬爾集作子渭北新阡俯集作拊先塋之北次就卑位於東偏冀神魂之不孤庶窀穸之承安嗚呼自汝捨吾集作我歸于下泉日來月往二十二年吾等罪逆不孝殃罰所延一别爾後再罹凶艱灰心垢面泣淚漣漣松檟之下其生尚殘昔爾孤於地下今吾孤於人間與其偷生而孤苦不若就死而團圓欲自决而毁滅又傷孝於歸全進退不可中心煩寃仰天一號痛苦萬端嗚呼爾魂在几爾骨在棺吾親奠酹蜀本作酌於爾床前苟神理之有知豈不聞吾此言尚饗祭楊判官八弟文唐次維年月日姨兄開州刺史唐某以清酌庶羞之奠敬祭于楊判官八弟之靈平生懿密重以嘉姻四海之內惟君一人發自總角逮于知命遨遊宴寢一歌一詠周流俯仰得君輝映野寺孤亭松門竹徑接茵援手和神善性霜鶴唳天玉音在聽空室間齊枯棊爛柯自非偉生受勝相磨坐隱終日負進亦多歷歷笑言其情若何歡事勝遊皆隨逝波事均榮戚心冥貴賤骨肉為交肝膽相見嗚呼哀哉婉豫幼妹爰居爾室既結其䄜載和琴瑟何年齡之脆促乃貞美之先失悼手足之零落又吾人之凋殁以君之才以君之藝合蹈豐福合居上第行與命違道將時背遏此仁厚天胡不惠博雅裴君鎮此南土大昭俊髦鵷鴻作侣曽未纍月中兹炎毒百藥無驗頺齡愈促悵悵旅魂淵淵鰥目目雖瞑而有恨魂强招而可復加有傷怛况惟我親涕淚橫隨遍乎衣巾想容色兮如在覽毫翰兮猶新嗚呼哀哉神理昭然幽途可覿悲心自攢痛淚血瀝何疇日之歡愜變今辰之空閴歸葬猶緩俟君冡嫡魂兮歸來安此幽宅嗚呼哀哉尚饗文苑英華卷九百九十二
