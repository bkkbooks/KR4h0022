body:
  text: 文苑英華巻四百五十六宋李昉等編制書九節鎮五授孫範青州節度使制蔣伸門下作朝廷之巨屏寔利建侯委兵旅之大權必先謀帥况地雄北海境接東蔡任貢鹽絺俗尚經傳一作術所付至重擢才惟難守大府卿孫範文學傳家清貞勵已以詞律振跡用吏理揚名周旋臺閣之間浹洽休嘉之稱連分符竹出撫蒸黎所至皆號為循良秉心不爽於誠信洎徴還朝籍服在大僚物情與能公論彌暢俾列象河之位仍司長府之殷出納有程帑藏無耗念此勤效爰議疇勞乃眷全齊名髙中域州寔分於伯禹化則起於太公具五方之人成一都之㑹其所撫制必俟通明夫務穡勸分之謂勤秣馬訓兵之謂備保大定功之謂徳救患睦隣之謂仁率彼三軍行茲四美藩垣東夏羽一作承衞中邦勤脩武經静致俗阜先副朝奬用答予知既超鄭黙之官又進周昌之秩皆謂殊寵佇聞休聲可檢校左散騎常侍青州節度使授王宰河陽節度使李拭河東節度使制前人門下盟津雄屏大鹵名都上控三川旁聮七邑風俗近陪於卜洛山河舊壯於列京茍非謀叶理戎惠能及物則何以並膺閫寄服我朝章河東節度兼諸道行營招討党項使王宰業貫韜鈐家傳帶礪備五才為戰器講七徳為武經氣本沉雄望髙宿將河陽節度檢校禮部尚書李拭學深堂奥慶襲軒裳以言行為樞機以禮義為干櫓才推通變時號正人咸早分武符頗識兵要頃緫師一作戎旅共平壺闗既𢎞偃伯之功並著勤王之節嘗疇顯効乆殿參墟歴渉清途動聞直道爰自大府出戍淛河載申攬轡之能果稱宣風之美用稽懿績乃踐齋壇朕以雜虜犯邉天兵在野盡䕶諸將屬於長材而宰以㣲恙所嬰全師難進虜成逋冦始務更張宜擁斾於中軍復建旄於善地又以晉陽作鎮戎索所鄰撫其四封必資碩望而拭臨人著術整衆有方克樹休聲允膺茂選俾改轅於東夏盛推轂於北門爾其肅彼戎行條其吏職内安凋弊逺贍征徭勉副虚懷佇振紀一作貞律不移鄭武之位再居陳寵之班𢡟乃有終式承丕命授幽州留後張允伸充節度使制前人門下統制方隅昭宣威略茍非績効之茂孰當委寄之權故開幕任青登壇拜信建置斯重古今為常幽州節度留後檢校左散騎常侍張允伸性禀誠明才推倜儻端已每存於忠孝嗜學早習乎天人偘然器能冠於戎籍自維城遥領留務在躬惟專報國之心以洽奉公之道節度既换儉恪彌勤况遼陽甲兵之雄幽都控馭之逺假機謀以董雜俗資刑賞以靖朔隣由是錫鈇鉞之正名授喉舌之顯秩升以亞相示之殊榮於戯施令在嚴失之者則虐為仁由惠過之者則非所宜政不建苛法不隳制講武備以禦冦舉化條而育人服吾寵光佇爾休問可檢校工部尚書幽州節度使授田牟靈州節度使制門下秦築城以備虜未若選將為長城漢設䇿以禦戎吾知得人為上䇿况朔野之北全凉以東兵臨五城地逺千里非疇勞無以分爵土非用武何以示恩威副吾勤求允屬雄傑檢校金疑部尚書金吾衞大將軍田牟才度間生智能兼聳家承弓冶業擅韜鈐而又掲厲儒流詳閑吏術不戰而𤇺煙自息言兵而勝負已知洎早服官榮常叅羽衛流五原之懿績播三鎮之威聲風猷藹然令望斯著如一作知爾弟兄之孝友化於閨門祖父之忠貞書於竹帛是用擢在環列為予警廵覿其形容益見誠意朕以党羗未㓕邉障是憂藉汝通明與我安撫所宜勵清亷於虜俗宣惠澤於戎人恢紀律貴乎齊刑理蠻夷惡其生事藩垣北地控帶長河仍加毛玠之榮不改趙堯之秩可檢校吏部尚書靈州節度使授鄭光河中節度使鄭朗汴州節度使制前人門下蒲津重鎮式居闗輔之榮梁苑故都上應房心之野若非徳繼周舅才超漢臣誰當重難允彼僉議銀青光禄大夫檢校兵部尚書兼左金吾衞大將軍鄭光風宇冲曠襟懷坦夷常推陰識之心早慕竇嬰之美浙江道觀察使檢校工部尚書鄭朗氣韻黄鍾文含大雅退食著羔羊之節進身無茅茹之連或業擅宏圖名髙懿績鎮青方而謳謡未息㧾緹騎而績効已宣或誠由亊彰行與言契踐三署而風猷暗襲亷四方而惠愛相輝而皆並立本朝藹然時傑品乃才用副吾深憂錫瑞分珪以示恩寵嗚呼國家自天寳之後中原宿兵元和已來信義方洽近者或任非所付官不敬常蒞事者以依阿為雅尚之名將軍者以姑息為茍安之計爾宜改轍而理貞師以嚴吏姦必除法弊當革是以再題陳寵之劒不易趙堯之印授彼戎律榮登將壇勉揚休聲罔忝厥命授李丕鄜州節度使制崔珝門下天垂星而分將帥北極是尊地列嶽以體藩垣四方乃定自古王者因而法之旁求俊髦應彼形象前振武節度檢校刑部尚書李丕天資壯勇代習韜鈐追奔而不務前矛疑處已而常慙背北一作常思背水頃者壺闗不順方事阻兵爾能蹈白刃而來推赤心向國洎累更符竹咸布謳謡陟其所明以邉事首遂著平戎之効遥張破虜之威致使黄河隂山冦盗皆息朕以燒羗作梗朔塞成榛禍結兵連兩經春夏是用輟爾代北委之雕陰作吾金湯翼衞邦甸所宜以克伐一作伐謀為上䇿以無戰為竒功禁暴安人克靖烽馹秋曹貳憲再飾旌旄往惟欽哉順我休命授栁仲郢東川節度使制門下擁旄作鎮授任分憂訓師旅以恢武經厚風俗以闡文敎膺茲重寄允屬勲臣正議大夫守河南尹栁仲郢清嚴􅊩職禮樂承家動惟執中居必慎獨禀端慤之正氣抱通濟之𢎞才早踐華資備揚懿業㑹府著彌綸之美諌垣留謇諤之規洎領郡符亦茂休績出入十載尹正兩京堅貞不囬沉毅有斷歴試斯乆聲猷必能克終令圖副我專委是用付以戎律登茲將壇乃眷左綿實為右屏控壓夷落保衛皇都非慈惠慱施不可以乂安黎庶非威懷並舉不可以綏靖封疆所宜膏潤一方澄清八郡簡條章以檢郡吏齊法令以肅三軍大宗伯大司憲兼而寵之以表殊奬勉承新命無怠前脩授紇干泉嶺南節度使制沈詢門下周禮將軍以六官叅選漢庭拜郡守公卿迭處出入中外發揮聲績選用之重古今所難銀青光禄大夫行尚書工部侍郎紇干泉惟爾元和中以文章徳行升為甲科貞規藹然雅有公器火化而方知玉性嵗寒而益見松心洎振拂朝纓抑揚官閥章羽儀於省署煥詞藻於綸闈朕以瀕江之西悍俗難理輟爾禁掖委之藩條果能宣愷悌之風著循良之迹南臺起部無展爾庸所宜將我舊章化彼南服於戯朕垂衣裳以臨四海因性分以撫羣生必欲叶軌而同文不敢重近而輕逺况駱越故地蠻夷錯居尤須謹亷以察封部青綬繋趙堯之印皂䄡分鮑永之兵同升將壇式表予意爾其往哉勉移風俗不挹於貪泉無使珠璣獨還於合浦可授白敏中邠寧節度使制門下昔孫𢎞以儒學進詔令作脩身寵兼裂土鄧禹以勲庸著効儀比三司是皆内外同規古今所重再揚新命允屬元臣特進守司空兼門下侍郎同中書門下平章事充山南平夏招討都統處置使十二字詔令作充招討山南平夏党項兵馬都統制置等使并南北兩路供軍使白敏中才智可以賛元功誠明可以匡大務事君惟恐不盡守道惟恐不遜詔令作孤而能以無心為待物之心以無用為當官之用朕君臨之歳首付台衡六更星霜勤節如一自羌戎犯塞師旅屯邉招懷莫應攻伐無狀爰用命爾往其鎮之果能潜移梟獍之心坐終豺狼之首始自夏半及于秦正大建功勞克寧烽馹終此誠意非卿而誰今封部既清是用休爾之討伐馬牛皆散是用罷爾之統臨不移論道之榮更帖持衡之貴纂乃舊事對予勤懷可守司空同中書門下平章事充邠寧節度觀察使大中五年十月授康季榮徐州節度使鄭㳙昭義節度使制前人門下彭城重鎮西楚故都壺闗奥區上黨雄寄一則控長淮之津要一則衞洛邑之封疆撫制稱難才謀是急爰得二帥乃建戎麾前四鎮北庭涇原節度使康季榮方面信臣軍旅良將氣振金皷義激風雲慕耿恭拜井之誠有王剪請田之計武寧軍節度使鄭㳙杞梓宏材珪璋秀質明能燭物利可剸犀挺翁歸文武之能繼叔度循良之美或藝習韜鈐性惟忠義擅威聲於百戰布雄名於五營作鎮邉方克彰勲業一作閥或早踐華資夙揚休問騰芳猷於詞囿振官業於吏途累膺寄任必流政聲並用推馭衆才藴幹時績効既宣奬擢是命建髙牙於徐土移大斾於邢郊用展良能務從委著爾其分蒞茲土敬敷國恩嚴號令於三軍信賞罰於百吏使轅門推戴閭井謳歌再膺九揆之榮更峻六卿之命仍兼亞相式寵中權無㬱前功勉收壯節授杜琮淮南節度使制門下星以斗牛鎮臨吳楚有重江複闗之奥寔通都大邑之雄控制上游儀刑羣后自非台衡舊徳廊廟宏材則何以膺茲山疑嶽之求副彼經邦之寄髙選中外無踰碩臣劒南西川節度使杜琮間氣孕賢相門襲慶韓安之國器𢎞茂元凱之武庫深嚴禮樂文身守而勿失政刑體要用之則行夙振英聲一作猷荐登相一作髙位廟堂之上有所不為縉紳之間共稱其道象賢祖徳嗣美前修體平陽之縝宻暢黄瓊之練逹自持瑞節作鎮靈闗盛有建明衆推理行故疆盡復嚴道益清夷洛威懷軍儲流衍徳政有同於冬日邉封不犯於秋毫朕以禹貢九州淮海為大阜貟八郡井賦甚殷分閫權雄列鎮罕比通彼漕運京師頼之自江已南近間歳歉黎氓稍困流庸是虞思得慈惠之師以行惻隱之徳黄霸在位朕無憂焉汝為司空兼持邦憲慎乃出令以臨其人務遵訓誡勉𢎞休績授白敏中西川節度使制門下寅亮天工既稱星琯葺寧戎塞頗茂功庸信出入之有勞顧優崇而宜及况梁岷巨鎮全蜀奥區有彭僕之富饒帶巴陜之險要非圖舊徳難洽新恩邠寧節度使白敏中嶽降英靈時推才傑周旋文雅城府寛𢎞乆侍禁闈備流聲績及居鈞軸頗茂芳猷朕起滯淹網羅賢彦外野無孤鴻之嚮歸軒有連茹之征揚於王庭欝矣皇士莫匪爾績動契予𠂻洎羗冦慿陵殿茲西土戎醜歛路柵堡相望既收功於郇邠宜移斾於井落於戯勿以地逺而怠於躬親無以位髙而忽於㣲細朂思後効無替前勞懋哉懋哉服我成命授李景讓襄州節度使制門下漢制郡守有善政者増秩賜金周官諸侯有聲名者加地進律前代令典我將因之天平軍節度使李景讓早以文學徳行列于四科中含柔善一作嘉表以堅白直比汲黯孝如曽參素懷澹然清節可貴峻風規於臺閣流愷悌於方州居為國禎出作藩柄朕惟憲宗親除狡宂手復全齊付任在予不敢祗授一作守以爾事親既孝於我必忠俾之鎮臨果茂聲績是用載新社土改築齋壇不可使萃羙於東方所宜遷仁於南國况荆衡舊服江漢上游天作城池地連襟帶昔曹王以法繩封部歳久則弊除于頔以兵東征徭人流而賦在不有思惠安能理之勉圖官守式佇閒問可授韋損鄆州節度使制門下登壇仗鉞訓整為先攬轡登車澄清是切膺一方之寄任兼二事之重難不有宏才孰允茲選銀青光禄大夫守刑部尚書韋損禀天之粹體道之和接物如冬日之温操心若寒松之勁導詞源而不竭泛學海而莫窮乆服大僚早揚休聞累更中外迭處清崇善政克著於藩方雅量見推於朝右朕以天平巨鎮慎擇帥臣割㨿魯衛之方控帶山河之壯臨制綿遠戎旅驍雄非仁惠無以蘇疲人非威信無以正師律以爾才周物務識洞事先斷自余懷得之長理爾其推誠撫士布徳安人容易則惠姦苛察則撓政害於事者必去無顧慮以妨公利於俗者必行勿因循而不决當竭乃力副我知人昇崇班於五兵啓元戎之十乗服茲寵渥勉恢令圖授盧鈞大原節度使制門下陶唐古郡晉國全服掌北門之管籥控朔塞之河山貔虎唐諱虎前後皆作武後人不知悮改作虎連營氐羗萬落用鎮興王之地必求易一作髙俗之才果獲碩臣允膺謀帥銀青光禄夫夫檢校司空兼太子少師盧鈞玉山當晝水鑑澄秋揣摩政經淬勵心術藴賢人之大業蹈君子之中庸進取不争於險夷操尚無移一作易於風雨歴踐華貫早揚淑聲便蕃大僚始終一致屢委戎寄亟間獻功畨禺清紹於隱之江漢愛侔於叔子壼闗所復汙俗惟新解亂繩而有條遷惡子而從化洎佩囊天府授鉞夷門克樹風猷荐舉方䇿今以塞垣未静虜族多虞莫善綏懷愈生疑貳道路既聞於漁奪兇殘頗見其鴟張尚念前勞猶寛肆伐爰擇待時之器式觀禦衆之能輟於朝端俾之鎮府爾其賞罰無私徳刑公用以清静之方闡吾聲教以愷悌之義宣我化條理必成於恩威政無庸於煩紊一作殺擊又作殺伐勉一作繄爾令典副予知人於戯北虜熾周南仲有往城之績西𦍑擾漢營平陳保勝之方疇其嗣之必有能者寵秩既光於論道恩榮仍亞於台庭以壯戎㫋勉服休命授李業鄭滑節度使契苾通振武節度使制前人門下鎮臨白馬介趙魏之封陲地控黒山振羗渾之衝要儔茲並命允屬長才前河東節度使李業宗室誠臣幹時良傑傳山西之將略襲隴右之家聲右金吾衛大將軍契苾通早擅英姿常推壯志挺鶚立鷹揚之操知玉鈐金匱之書或建斾雄藩功宣保塞或馳軺異俗績茂和戎咸竭噐能載光任使穆揮謙於大樹藴風望於長城以爾威足靖邉故委以疆塲之事政能檢下故授以統馭之權於戯整旅訓戎觀風蒞俗仗誠明以懷獷悍布惠化以卹疲羸將務息人無或生事明典刑以謹侯度示恩信以洽戎心用叶睦鄰宜籌經逺换騎省八貂之貴仍地卿六職之榮勉恢壯猷無忝登壇之寄授畢諴邠寧節度使制門下太公經武首述文韜春秋謀帥亦啓義府大暢弛張之道必求通變之才况乎撫易動之羗戎扞難集之闗郡安邉禦侮斷付能臣權知刑部侍郎畢諴端慤知善一作善端和性文學致身氣則沉詳思有髙妙早馳榮問亟踐清途該洽憲章抑揚臺閣聿來禁署益茂芳猷孔光之温樹不言王褒之洞簫曽諷憲慮必振於逺大抗志不避於重難擢於文昌以酬職効強明不滯朕心器之固可以式是師干授之能節况地雄秦塞境壓邠郊壯南牧於盛秋作西陲之巨屏是宜平其險難一作險其走集繕彼甲兵征疑作貞律臨戎推誠馭衆逺明邉務贍闕軍儲一作旅非厚衣食之恩養闕之勇稱於無事之日常為有備之謀連營茍示於嚴莊種落自當於柔服布我大信深仗親規於戲竇嬰賜金不為廊廡之有營平積粟免煩餽輓之勞减費惠人於斯為急節宣柄任稱朕意焉貴視漢貂榮兼趙印茲為寵數以耀啓行可授韋慤鄂岳節度使制門下王者建諸侯以鎮撫方域立將帥以藩屏皇家受任惟難選命斯重而况控三江之律疑庶㧾六郡之賦輿必得兼能乃膺成奬前鄭滑觀察使韋慤紳冕令才人倫粹器業光經濟道茂温恭藴冐雪之貞姿挺發硎之利刃自馳聲詞苑耀價儒林雅範蘭馨詞雄綺麗踐更華貫揚歴顯途懿効彰明布于臺閣自職司誥命叅貳春官業彌振於訓詞道愈光於得士及再遷㑹府休聞尤彰由是嘉乃良才俾升節制流美化於洪河之曲布威聲於白馬之津宜舉寵光用酬休績乃眷夏口實曰雄藩通波逺接於荆衡作鎮式臨於漢沔由是再新戎斾改築齋壇福一作興滑䑓之詠歌慰鄂渚之黎庶爾其以信義為理本以賞罰為政柄法亞夫訓旅之術以肅轅門採龔遂理人之方以清郡國崇秩兼寵無易舊恩勉乃令圖勿替前志授李彦佐鄜坊節度使制門下撫千里者必仗於誠信統三軍者固資於良帥况地雄鄜畤壤接王畿㧾貔武精鋭之師制牛羊一作制稽胡雜種之俗聿求上將以鎮近郊守太子少傳李彦佐夙負雄明早通軍志生知忠義旁閲詩書計擬六竒功髙百勝聚米而山川可料變幟而壁壘盡傾奮亷藺之明謀蓄闗張之妙用頃者常膺奬任累踐藩垣信洽戎夷愛深師旅有馭衆安人之効著在邉方有亷平貞慎之規騰一作布於朝論自避榮私室物論尤歸朕以彫陰重藩羗渾小擾蓋由乖於撫馭遂失和寧思得長才往圖鎮理爾其敷我恩信戢其猖狂静彼戎疆用資壯略一作志嗚呼亷頗一作營平雖老尚請臨戎李牧居邉未嘗生事遐觀前舉勉副徽猷榮加五教之尊仍帖三一作栢臺之貴服茲休命無忝寵光授崔珙鳯翔節度使制門下乃眷岐陽襟汧擁漢古稱右輔以扶助王圻今為别京以屏翰戎落載煩元老往撫舊邦實資經國之謀髙副安邉之寄守太子少保崔珙禀粹嶽靈挺生國戚門容駟馬族盛八龍胷襟洞開智略輻赴早以茂業踐于持一作台衡宣力致君有犯無隱怙疑叔敖之喜愠體伯玉之巻懷一作舒洎服休天朝保釐洛邑誠明之道華皓不踰能全素履之真雅得大臣之體方叔之猷克壯師尹之望攸歸朕以保塞禦戎深圖良筭餽軍艱食常在勞懷由是渇王商之儀形佇營平之籌畫伏蒲之奏前席忘疲既符咨嶽之求宜舉齋壇之典自閫以外爾實專之斷守疑宏才庶集吾事勉敷恩信務洽華夷且慰恩一作志思善圖政柄峻槐庭之禮命寵茅社之侯封服我徽章敬茲有土授韋博淄青節度使制門下乃眷營丘表于東海富強號千乗之國繁雜聚四方之人假上將之威權壯中軍之垣翰將疇閫寄必在信臣守尉衛卿韋博文苑騰芳儒林擢秀襟靈曠逺風度詳閑周通爰表於器能強濟式彰於事任早以重價踐遷清途諌垣流謇諤之名通邑擅神明之譽頃自移曹九棘緩歩八塼冲澹安身巻舒惟道應茲圖任允叶僉諧懿彼全齊實為右壤禹貢别九州之盛海濱綜五郡之雄昔周命太師漢封韓信啓土用申於帶礪分茅克懋於藩維選任之隆古今攸重於戲平仲盡規之節夷吾當路之方經堂阜而徽猷可循指牛山而忠讜如在餘波未冺遺愛斯存禮節既洽於里閭風謡尚傳於古老為政之暇無忘諮詢盛鐵馬於師壇帖金貂於騎省祗膺成命勉服寵光授裴休汴州二字一作宣武軍節度使制前人門下將相大臣中外迭任入奉股肱之寄出為藩翰之雄無爽具瞻式彰注意金紫光禄大夫守中書侍郎兼户部尚書同中書門下平章事充集賢殿大學士上柱國河東縣開國子食邑五百户裴休氣禀嶽靈夣叶巖瑞威鳯孤翔於玉囿仙鶴獨歩於芝田學精典墳文緯邦國自彤庭對一作發䇿諌列升班粉署擅貳卿之榮綸闈廽五字之妙洎司饋運整葺牢籠䇿畫每得於親聞功庸必見於一作其顯効章呈軌範歴試無差是用付以權衡宜承任委咨之遠略炳然大綸四后恊心萬邦繫爾今百度有截庶績其凝前時屢以疾辭猶煩卧理豈無優賢之道因遂由𠂻之意乃眷梁苑實為重藩荒大東於周疆接小沛於一作之貢壤富庶將及悍勇無譁仁化已洽於一方清風漸扇於全境閉一作開闗自固懸瞂不鳴可仗台臣寘之静理爾其踐厥位暢厥庸侯服旣増相印不解輔弼莫繋於遠邇聲容暫間於朝昏敬哉戒哉服我重命可檢校户部尚書同中書門下平章事使持節汴州諸軍事行汴州刺史充宣武軍節度副大使知節度事汴宋亳等州觀察處置兼毫州大清宫等使散官勲封如故主者施行大中十年六月七日一作皆唐大詔令授李玭鳯翔節度使制門下秦之舊都漢為右地扼戎疆之要害作上國之藩籬旁聨封畿前抗巴蜀其所受任必擇忠良刑部尚書兼宗正卿李玭生王侯之大家傳帯礪之盛業夙負才術顯於官名周旋令圖佩服義教信以自立誠而致明北海著輯睦之規南方流愷悌之化潔清知已寛猛恊中連委翰垣載髙理行朕心所屬物議與能洎擢處月卿掌我天旅不忝維城之寄副予同姓之求今以昆夷來朝願納故壤將復河湟之境必資整訓之方遂結疆塲付爾汧隴於戲惟昔乃祖曽顯是邦勿隳貽謀光膺分閫兼尹正察亷之重帖文昌憲府之崇勉副家聲以酬殊奬文苑英華巻四百五十六
