body:
  text: 文苑英華巻四百三十五宋李昉等編徳音二賑恤徳音上賑貸詔令作給京畿百姓徳音玉堂遺範門下王者布徳行惠必順天時發廪賑乏葢循舊典朕君臨㝢縣念切黎元思欲咸致其安各阜其業事闗恤下政在便人予無愛焉斯為大本而甸服之内比年豐穰一嵗不登遂至艱食豈非轂下賦役經制猶繁物力所資凋耗已甚靖言於此愧歎良深今春陽發生田事具飭苟廹於歉乏不能自存而耕植損詔令作頓虧秋成何望所宜特加恩賚詔令作惠蠲彼徴求庶農桑之及時俟詔令作候麰麥之方稔式當和煦之候載示憂勤之心我其永懐俾厚生殖京畿百姓宜共賑給粟三十萬石内八萬石以京兆府常平義倉粟充其餘以詔令作用太倉粟充支給比者田榖致損蒭藁隨之今已過時益難濟辦其并職田草共一百一十五萬束並宜放免又有常賦錢榖蠲放之餘貧弊者多慮難輸入欲令寛息湏有憂矜其京兆府欠去年兩税青苖等錢二萬一千八百貫欠秋租雜斛斗及職田粟五萬三千三百石並宜放免元和六年春賑貸京畿百姓義倉粟二十四萬石亦宜放免朕誠意靡達黎人未康憂積於詔令作于衷寤寐增惕爰自去嵗以迄於今存救之恩屢降明詔乃眷長吏職惟親人爾其檢詔令作極慮撫綏指陳利病將我惠澤被于鰥孤叶於便宜無使勞擾故兹示諭當悉朕懐元和七年賑貸京畿徳音門下朕聞王者之牧黎元也愛之如子視之如傷苟或風雨不時稼穡不稔則必除煩就簡惜力重勞以圖便安以阜生業况邦畿之内百役所從雖勤恤之令亟行而供億之制猶廣重以經夏炎暵自秋霖霪唐書作㴻南畝虧播殖之功西成失豐唐書作農登之望内乏口食外牽王徭豈惟轉徙唐書作輪非之虞慮有餓唐書作餧殍之患斯盖理道猶鬱和氣未通永言于兹良所咎歎宜加惠貸式示誠懐京兆府每年所配折糶粟二十五萬石宜放如百姓有粟情愿折納者時估外特加優饒今春所貸義倉粟方属嵗飢容至豐熟嵗送納元和五年以前諸色逋租並放百官職田其數甚廣今縁水潦諸處道路不通宜令所在貯納度支支用令百官據數於太倉請受遭水旱處所損便與除破不得檢覆朕以為理之本在乎安人咨爾尹京宰邑之官實惟親人阜俗之寄必當詢其疾苦奉我詔條當恤隠為心無怠於事罔或狥利於尅唐書作剥不吐剛而茹柔使閭井咸安鰥惸獲濟各勉忠効宜悉朕懐元和六年十月戊寅遣使賑恤天下遭水百姓勅編制勅王者欽若天道惠綏下人修已以導其和平推心以恤乎詔令作其災患康時濟理何莫由斯朕以薄徳託于人上勵精庶政思致雍熈而誠不動天政或多闕陰氣作沴暴風荐臻自江淮而及于荆襄歴陳宋而施于河朔其間郡邑連有水災城郭多傷公私為害損害一作壊廬舍浸敗田苖或親戚漂淪或資産沉溺為之父母所不忍聞興言疚懐良深愧憫夙夜祗畏悼于厥心用是寢不獲安食而忘味特加賑恤庶洽幽明宜令中書舍人奚陟往江陵府及襄郢復隨鄂申光蔡等州左庶子姚齊梧往陳許宋亳潁徐泗濠等州秘書少監常詔今作雷咸往恒冀徳棣深趙等州京兆尹常武往揚楚廬滁潤蘇常等州宣慰應諸州百姓因水漂蕩家業淹損田苖交至乏絶不能自存者委宣撫使量與賑給沉溺死者各加賜物仍並以所在官中兩税錢物地税米充給其溺死人所在官為收歛埋瘞用申惻隠以慰幽魂其田苖所損亦委宣撫使與觀察使刺史約所損多少速具聞奏於戯一夫不獲一物失所刑罰不中賦歛不均皆可以損詔令作傷陰陽之和致水旱之沴其州縣應有繫囚及獄訟久未决者委所在長吏即與疏理務從寛簡使絶滯寃貪官暴吏倚法害公特加懲肅用明典憲災傷之後切在撫綏咨爾方鎮之臣洎于州縣守宰咸知悉乃心力設法救人以恤㐫災以補傷敗庶令安集式副憂勤宣布朕懐使各知悉貞元八年八月賑恤遭水災百姓勅勅惠下䘏人先王之政典視年制用有國之恒䂓故有出公粟以賑困窮弛嵗征以寛物力救患之道何莫由兹頃以諸道水災遣使宣慰中心是屬夕惕彌勤省覽條奏載懐憫惻用加救恤以濟吾人應諸道遭水漂蕩家業淹損田苖乏絶户宜共賜米三十萬石所司各據州府乏絶户多少速分配每道合給米數聞奏並以度支見貯米充度支即與本道節度觀察使計費各隨便近支付委本使差清幹官請受分送合賑給州縣仍令縣令及本曹官同付人户務從簡便無至重擾速分給訖具狀聞奏其州府水損田苖及五六分者今年税米及諸色官田租子並减放一半損七分以上一切全放其所减放米如是支用數内應令度支及本道以諸色錢物充填並委度支條件聞奏其兩税錢所司準舊例處分朕撫臨兆庶思致和平理化未臻良增寅一作愧畏方鎮守宰職在親人所宜分憂以救艱食必躬必信副朕意焉貞元八年十二月分命使臣賑恤水旱百姓勅詔令作遣使賑恤江淮勅同前勅王者立國本於安人暨海隅蒼生不忘𢎞覆天下至廣咸務和寜其或郡國罹災存恤至詔令作為重發廪蠲賦時惟舊章獻嵗布和前聖高躅朕膺眷命纘承洪緒居兆人之上五載于兹推大信以撫萬邦體至仁以蕃庶類夕惕惟厲憂深納隍豈布理猶鬱上𤣥未感精祲相盪隂陽或愆近者江淮之間水旱作沴緜亘郡邑自夏徂秋雖誠禱神祗無愛圭璧而災流下土虧我生成逋亡靡依凋瘵斯甚疲俗艱食時予之辜當宁疚懐宵衣興歎憫兹求瘼臨遣使臣分命廵行特加存恤往救災患冀安流庸俾免其田租或賑以公廪隨便亟給惠此困窮其元和三年諸道應遭水旱所損州府合放兩税錢米等損四分以詔令作已下者宜凖式處分損四分以上者並準元和元年六月十八日勅文放免仍委中書門下即於朝班中擇人分道存撫其有單貧之户轉徙未安便於常平義倉所貯斛斗量事賑貸務令存濟副朕憂軫嗚呼方岳長吏職居親人永言分憂亦惟善政敬哉有土咸悉予懐元和四年正月亢旱撫恤百姓徳音勅承天理物莫尚於愛人謝譴彌災必先於咎已朕臨御萬國逮今五年亦常勵精罔敢暇逸誠雖勤而未妥於事澤雖布而未浹于人呉蜀建功闗輔屢稔羣生咸若荒服㑹同將何以答昊穹之顧懐承宗社之眷祐固宜示以災𤯝警予增修自去冬以來時雪微降及此春暮積為愆陽宿麥不滋首種未入東作慮違於農候西成何望於嵗儲為人父母甚可憂憫况江淮之間歉饉相屬物力疲耗人心無聊雖存救之術已行而凋傷之弊猶切是用輟食而歎中夜以興得非刑獄之寃滯未申貨財之聚歛未息忠鯁之言未盡達不急之務未盡除有一于兹即傷和氣居高莫喻愧悼是懐爰命禱祠豈答神祗之望空勤惕厲豈為恤隠之方莫若側身推誠循政務實法乾坤易簡之理贊天地茂育之仁將以塞違庶孚于道属陽和之序品彚敷榮俯念繫絏俾從寛减其京城内見禁囚徒犯死罪非殺人降從流流已下罪逓降一等鹽鐵使下諸鹽院舊招商所由欠貞元二年四月已前鹽税錢及永貞元年變法後新鹽利經貨詔令作輕貨折估錢共二十八萬七千七百五十六貫文並宜放免除此錢外諸色所由人户及保人有積欠錢物或資産蕩盡未免禁身或身已死亡繫其妻子雖始於冐没而終可哀矜宜委鹽鐵轉運使即據狀事䟽理具可徴可放免數聞奏度支京西京北諸院𣙜鹽使并畿内在城諸色所由人户欠負從貞元十一年以後至貞元十五年終主保逃亡攤徴保人并保人又逃亡及身在貧窮非家業見存姦猾延引者所欠錢物斛斗柴草等項亦宜放免亦委度支續具合放數聞奏諸道兩税外據𣙜率比來創制勅處分非不丁寜如聞或未遵行尚有此弊永言奉法事豈當然申勅長吏明加禁斷如刺史承使牒擅於界内𣙜率者先加懲責仍委御史臺及出使郎官御史察訪聞奏夫制事立程必根源本未有上敦節儉而下有困窮上好豐盈而下獲安輯顧財用之所出念耕織之為勞自中原宿兵調賦尤廣更修無名之貢獻必有無藝之徴求或稱出於羡餘或稱不破正税相因慕效寢以成風革弊立防何切於此其諸道進獻除降誕端午冬至元正任以土貢脩其慶賀其餘雜進除㫖條所供及犬馬鷹隼時新滋味之外一切勒停如違越者所進物送納在藏庫仍委御史臺具名聞奏如諸道停進奉後尚務因循或有聚歛亦委出使郎官御史察訪聞奏政理之本在於簡約由内及外以示率先昨者六宫内人量已放出猶慮内廐之馬其數稍多委飛龍使等詔令作即條流减省續具聞奏嶺南黔中福建等道百姓雖處遐俗莫匪吾人多罹掠奪之虞豈無親愛之戀以兹興念良用憫然應縁公私買賣奴婢宜令所在長吏切加捉搦并審細勘責委知非良人百姓然許交闗有違犯者凖法條處分朕理國濟人以義為利務於當者必舉詢其弊者必除其在卿士叶心方岳宣力勉脩爾職以惠黎元慎守彛章咸悉朕意元和四年三月三日賑恤百姓徳音一作賑貸諸道詔勅王者本憂人之心有順時之令故及新生之候必𢎞利澤之規以此惠人期於阜俗今三陽布和萬物遂性惟人之窮之者或不能自存朕所以愍然省憂議所賑救如聞京畿之内縁舊榖已盡宿麥未登尚不足於食糧豈有餘於播種矧其耕植固在及時念彼徴求尤資寛貸京兆府宜以常平義倉粟二十四萬石貸借百姓其諸道州府有乏少糧種處亦委所在官長用常平倉米借貸淮南浙西宣歙等三道元和四年賑貸米並宜詔令作且停徴容至豐年然後填納編户之徴既有藝極字氓之要當恤有無苟徴歛之不時則困弊之無日近縁諸州送使錢物回充上供合送使者使司又立程限所以每至嵗首給用無資不免量抽夏税新陳未接營辦尤難委觀察使宜以供軍錢方圖措便輙不得量抽百姓夏種夏貢詔令作貢賦有差先乎任土用幣殊等實在便人近日所徴布帛並先定物様一例作中估受納精粗不等退換者多轉將詔令作易貨賣皆致損折其諸道留使留州錢數内絹帛等但有可用處隨其高下約中估物價優饒與納則私無棄物官靡逋財其所納見錢仍許五分之中量徴二分餘三分兼納實估疋叚錢以準貨本約重輕制之不均遂權百物由是競為蓄聚漸爽流通粟帛轉錢農桑益廢若無釐革其弊難堪公私交易十貫錢已上即湏兼用疋叚委度支鹽鐵使及京兆尹即具作分數條流聞奏茶商等公私便換見錢亦詔令作並湏禁斷自定兩税以來刺史以户口增减為其殿最故有折户以張虚數或分産以繫户名兼招引浮寄用為增益至於税額一無所加徒使人心易摇土著者寡觀察使嚴加訪察必令詣實朕嗣守丕圖于兹七稔每念萬方所奉唯在一人百姓未康豈安終食故所以賑贍優貸思致乂安方鎮牧守誠宜遵奉如有違越委御史臺及出使郎官御史訪察以聞宣示中外明悉朕意元和六年二月二十八日文苑英華巻四百三十五
