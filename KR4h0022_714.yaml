body:
  text: 文苑英華卷七百十五宋李昉等編詩序一夏日諸公見尋訪詩序一首入蜀紀行詩序一首登祕書省閣詩序一首崇文館宴集詩序一首李舍人山亭詩序一首送徐録事詩序一首送并州旻上人詩序一首晦日藥園詩序一首羣官尋楊隱居詩序一首宴皇甫兵曹宅詩序一首送東海孫尉詩序一首樂府雜詩序一首宴梓州南亭詩序一首七日綿州泛舟詩序一首楊明府過訪詩序一首宴鳳泉石翁神祠詩序一首初春於圭峰送益府竇參軍宴詩序一首洪崖子鸞鳥詩序一首送工部尚書弟赴定州詩序一首送毛明府詩序一首㑹諸友詩序一首夏日諸公見尋訪詩序王勃天地不仁造化無力授僕以幽憂孤憤之性禀僕以耿介不平之氣頓忘山嶽坎坷於唐堯之朝傲想煙霞憔悴於聖明之代情可知矣賴乎神交勝友得山澤之虯龍隱路幽居降雲霄之鸞鳳楊公沈公行之者仁義禮知用之者乾元亨利𤣥經苦而白鳳翔素牒開而紫麟降金門待詔謁天子於朝廷石室尋真訪下官一作客於丘壑幽人待士非無北壁之書隱士迎賔自有西山之饌席門蓬巷佇髙士之來游叢桂幽蘭喜王孫之相對山南花囿澗北松林黃雀至而清風生白鶴飛而蒼雲起停琴緑水仲長統之歡娛置酒青山郭子期之賔客足可銀鈎人探一字四韻成篇入蜀紀行詩序總章二年五月癸卯余自長安觀景物於蜀遂出褒斜之隘道抵岷峨之絶徑超𤣥溪厯翠阜逮彌月而臻焉若乃採江山之俊勢觀天地之竒作丹壑爭流青峰雜起陵濤鼓怒以伏注天壁嵯峨而橫立亦宇宙之絶者也雖莊周詫吕梁之險韓侯怯孟門之峻曽何足云蓋登培塿者起衡霍之心游涓澮者發江湖之思况乎躬覽勝事足踐靈區煙霞為朝夕之資風月得林泉之助嗟乎山川之感召多矣余能無情哉爰成文律用宣行唱編為三十首投諸好事焉登祕書省閣詩序楊盈川若夫麒麟鳳凰之署三臺四部之經周王羣玉之山漢帝蓬萊之室觀星文而考南北大象入於機衡披帝册而質龍神負圖出於河洛司先王之載籍掌制書之典謨劉向沉研楊雄寂寞之士於茲翰墨馬融該博傅毅文章之才此焉游處莫不出言斯善有道則尊黼黻其德行圭璋其事業心同匪石逹人千載之交手握靈珠文士一都之㑹陶泓集作隂寡務油素多閒命蘭芷之君子坐藝香之祕閣徒觀其重欄四絶閣道三休紅梁紫柱金鋪玉磶平看日月唐都之物候可知坐望山川裴秀之輿圖在即虹霓為之回帶寒暑由其隔濶豈直崑崙十二瀛海千尋西州有百尺之樓東國有千秋之觀于時五行金王八月秋分風生閶闔之門日在中衡之道煙雲悽慘白露下而四郊空林野蒼茫青天髙而九州逈登山臨水無非宋玉之詞髙閣連雲有似安仁之興列芳饌命雕觴扼腕抵掌劇談戲笑假使神仙可得自茂松喬富貴在天終輕許史間之以博奕申之以詠歌陶陶然樂在其中矣登髙而賦羣公陳力於大夫聞善若驚下走自强於𤣥晏輕為引序綴在辭章崇文館宴集詩序天下之器也神立二者所以經其化聖人之寶也大建儲者所以贊其庸易所謂照於四方禮所謂貞於萬國皇家以中樞北極清都有天子之宫儲后以大火前星蒼震有乾男之位因心也孝常問安於寢門行已也恭每不絶於馳道有父子君臣之道焉有夏干冬羽之事焉於是發德音降明詔封紫泥於璽禁傳墨令於銀書齒于成均所以明其長幼通于博望所以昭其賔客東方曼倩之文史即預禖祠甪里先生之羽翼仍參獻夀為賔者四友等黃龍之簡才論奏者八人同赤烏之下士莫不縉紳舊德縫掖名儒衣簮拜髙闕之門驂駕陪直城之路琢磨其道玉質而金相黼黻其詞雲蒸而電激琴書暇景風月名辰周旋揖讓觀禮儀之溢目合異離堅聞辨論之盈耳八珍方饌寒溫取適於四時一獻雕觴賔主交歡於百拜爾其清垣繚繞丹禁逶迤魚鑰則環鎖晨開雀窗則銅樓旦闢周廬綺合廨署星分左輔右弼之宫此焉攸集先馬後車之任於是乎在顧循庸菲濫沐恩榮屬多士之後塵預羣公之末坐聽笙竽於北里退思齊國之音覿瓌寶於東山自恥燕臺之石千年有屬咸蹈舞於時康四坐勿喧請謳歌於帝力小子狂簡題其序云李舍人山亭詩序永嘉有髙陽公山亭者今為李舍人别墅也廊宇重復樓臺左右煙霞棲梁棟之間竹樹在洲汀一作汀洲之外龜山對出背東武而飛來鶴阜相臨向東吳而不進青溪數曲赤巖千文寥廓兮恍惚似蓬嶺之難行深邃兮眇然若桃源之失路信可謂赤縣幽棲黃圖勝景從來八子闢髙陽之邑居今日四郊逢舍人之置驛故知樊家失業遂作庾公之園習氏不游終成濮隂之地其人也凝脂㸃漆瓊樹瑶林學富文史言成凖的葭莩為漢帝之親凡蔣是周公之裔田孟嘗之待客照飯無疑孔文舉之邀歡樽中自溢三冬事隙五日歸休奏金石而滿堂召琳琅而觸目心焉而醉德焉而飽大隱朝市本無車馬之喧不出户庭坐得雲霄之致於是乎百年無幾萬事徒勞唯談笑可以遣平生唯文詞可以陳心賞既因良㑹咸請賦詩雖向之所歡已為陳迹俾千載之下感於斯文送徐録事詩序徐學士風流倩倩容貌堂堂汝南則顔子更生洛下則神人重出書有萬覽之者實符於鄭𤣥州有九游之者頗類於班固懷岐嶓之舊迹想江漢之遺風粵在於永淳元年孟夏四月始以內率府録事出攝蒼溪縣主簿同彼漆園之莊周聊居賤職異乎安定之梁竦不憚勞人騑驂而欲行紛紜而戒道是日也鶴鳴于野龍升于天詩成流火之文易占清風之卦聖主以叶時同律義在於省方皇儲以守器承祧任隆於監國留臺務靜博望時閒於是久敬之善交平生之故友臨御溝而帳飲就離亭而出宿居成别易坐覺悲來平原二客追子髙而已逺河上諸公餞林宗而有慕兩鄉風月萬里江山修路為下泣之思長天非寄愁之所何以劇疑作處我戒之必軾何以贈行上路不拜孫子荆傾國之送豈若是乎潘安仁金谷之篇盡於思一作斯矣送并州旻上人詩序楊盈川三元日月不能改弦望之期四序炎凉不能移變通之運况乎人生天地嶽鎮東西良時美景始雲蒸而電激臨水登山忽風流而雨𣪚道之常也復何言哉是旻上人天骨多竒神情獨王法門梁棟豈非龍象之雄晉國英靈即是河汾之寶道尊德貴所以名稱並聞盡性窮神所以身心不動遍觀天下暫游城闕劉真長之逺致雅契髙風習鑿齒之宏才深期上德芝蘭一面暫悅新知垂棘連城將游舊府雞山法衆餞行於素滻之濵麟閣良朋祖送於青門之外是日也河山雨氣原野秋隂風烟凄而禁籞寒草木落而城隍晚雲中振錫有如鴻鵠之飛水上乘杯更似神仙之别左石為之魂動金石由其色變恆山岱嶽看寶鼎於風雲帝里神州對長安於白日兩鄉綿邈何當惠逺之游千里相思空有關山之望羣賢僉議咸可賦詩題其爵里編之簡牘晦日藥園詩序天下皆知禮之為貴用周旋揖讓之儀天下皆知樂之為盛節金石絲簧之變是則忠信之薄飾容貌於矜莊風俗之微陶性靈於歌舞殊不知逹人君子遺形骸於得喪之機心照神交混榮辱於是非之境非若諸公者大夫之相知也以為煙霞可賞嵗月難留遂欲極千載之交歡窮百年之樂事莫不如圭如璋令聞令望濟濟鏘鏘同㑹於文場者也于時丁丑之年孟春之晦嵗隂入於星紀斗柄臨于析木衣冠雜沓出城闕而盤游車馬駢闐俯河濵而帳飲乃有神州福地上藥中園左太沖所云當衢向術潘安仁以為面郊後市九莖仙草搖八卦之祥風四照靈葩泫三危之寶露豈直帝神農旋赤鞭而驅毒崔文子擁朱幡以救人山圖採之而得道姮娥竊之而奔月若斯而已哉加以回溪潄石茂林修竹淡風日之逶迤妙山泉之體勢然後芳杜若藉芝蘭髙論參𤣥飛觴舉白凡我良友同聲相應心冥寵辱推富貴於皇天事一窮通任運隨於大命若使適情知足則玉帛子女為伐性之源逹變通機則尊官厚祿非保全之地所以列坐羲皇之代安歌帝堯之力陽光稍晚髙興未䦨請諸文㑹之游共紀當年之事凡厥衆作列之於後羣官尋楊隱居詩序若夫太華千仞長河萬里則吾土之山澤壯於域中西漢十輪東京四代則吾宗之人物盛於天下乃有渾金璞玉鳳戢龍蟠方圓作其輿蓋日月為其扄牖天光下燭懸少微之一星地氣上騰發大雲之五色以其不貪為寶均珠玉以咳唾以無事為貴比旗常於糞土諸侯不敢以交游相得三府不敢以辟命相期與夫形在江海心游魏闕跡混朝市名為大隱可得同年而語哉天子巡於下都望於中嶽軒皇駐蹕將尋大塊之居堯帝省方終全潁陽之節羣賢以公私有暇休沐多閒忽乎將行指林壑而非逺莞爾而笑覽煙霞而在矚登坱圠踐莓苔阮籍之見蘇門止聞鸞嘯盧敖之逢髙士詎識鳶肩憶桑海而無時問桃源之易失寒山四絶烟霧蒼蒼古樹千年藤蘿漠漠誅茅作室挂席為門石隱磷而環階水潺湲而匝砌乃相與旁求勝境遍窺靈跡論其八洞實唯明月之宫相其五山即是交風之地仙臺可望石室猶存極人生之勝踐得林野之竒趣杯浮若聖已茂松喬清論凝神坐驚河漢游仙可致無勞郭璞之言招隱成文敢嗣劉安之作宴皇甫兵曹宅詩序皇甫君冠冕於安定李校書羽儀於隴西岑正字明目於漢南石宫坊指疑作抵掌於河朔髙侯邦之司直下走齊之濫吹若夫風雲龍虎水火隂陽隔千里而應之莫不潜契於同聲矣聖明千載區宇一家掩八紘以得之莫不髙㑹於中京矣是日也河圖適至海鯨初死五嶽四瀆漢皇帝崇其望祀一日三朝周天子展其莊敬君臣慶色朝野歡心𤣥晏先生開甲第而留賔二三君子赴龍門而廣宴隂雲已墨肅氣彌髙霜寒萬里之園氷納千金之水面郊後市即為潘嶽之居纍代通家咸言李膺之客百年何計相知在於我心四海何求為樂止於名教抽毫進牘皆請賦詩日暮途逺聊裁序引送東海孫尉詩序東川孫尉文章動俗符彩射人官裁下士宣大夫之三德運偶上皇作東南之一尉庸才擾擾流俗喧喧談逺近為等差敘中外為優劣殊不知三元合朔九州同軌蓬瀛可訪還疑上苑之中日月不占更似靈臺之下彼其之子未為後時凡我友朋無勞疑别徒以士之相見人之相知必欲軒蓋逢迎朝游夕處亦常烟波阻絶風流雨散去矣孫侯逺離隔矣但當晨看旅雁君逢繫帛之書夕望牽牛余候乘槎之客未能免俗何莫賦詩綴集衆篇列之如左樂府雜詩序盧照鄰聞夫歌以詠言庭堅有歌虞之曲頌以紀德奚斯有頌魯之篇四始六義存亡播矣八音九闋哀樂生焉是以叔譽聞詩驗同盟之成敗延陵聽樂知列國之典彞王澤竭而頌聲寢伯功衰而詩道缺秦皇滅學星琯千年漢武崇文市朝八變通儒作相徴博士於諸侯中使驅車訪遺編於四海發詔東觀縫掖成隂獻書南宫懷鉛踵武王風國詠共驪翰而升沉里頌途歌隨質文而沿革以少卿長别起髙唱於河梁平子多愁寄遙情於壠坂南浦動關山之役作者悲離東京興黨錮之誅詞人哀怨其後鼓吹樂府新聲起於鄴中山水風雲逸韻生於江左言古興者多以西漢為崇議今文者或用東朝為美落梅芳樹共體千篇隴水巫山殊名一意亦猶負日於珍狐之下沉螢於燭龍之前辛勤逐影更似悲狂罕見鑿空曽未先覺潘陸顔謝蹈迷津而不歸任沈江劉來亂轍而彌逺其有發揮新題孤飛百代之前開鑿古人獨步九流之上自我作古粵在茲乎樂府者侍御史賈君之所作也君升堂入室踐龜字以長驅藏翼蓄鱗展龍圖以髙視林宗一見許以王佐之才士季相看知有公卿之量南國蛟龍之耀下觸詞鋒東家科斗之書來游筆海朝陽弄翮即踐中京太行垂耳先鳴上路當赤縣之樞鑰作髙臺之羽儀動息無格於溫仁顛沛安由乎正義玉墀伏奏謹依汲直之聞銅術埋輪先定雍門之罪霜臺有暇文律動於京師繡服無私錦字飛於天下九成宫者信天子之殊庭羣仙之一都也五城既逺得崑閬於神京三山已沉見蓬萊於右輔紫樓金閣雕石壁而鏤羣峰碧甃銅池俯銀津而橫衆壑離宫地險丹澗四周徼道天回翠屏千仞衛尉寢䝉茸之署將軍無刁斗之警中巖罷燠飛霜為之夏凝大谷生寒層淮以之秋沍天子萬乘驅鳳輦於西郊羣公百僚扈龍軒而北輔春秋絡驛冠蓋滿於青山寒暑推移旌節喧於黃首夕宿雞神之野朝登鳳女之臺青鳥時飛白雲無極千年啓聖邈同汾水之陽七日期仙願類緱山之曲經過者徒知其美揄揚者未歌其事恭聞首唱遂屬洛陽之才俯視前修將麗長安之道平恩公當朝舊相一顧增榮親行翰墨之林光標唱和之道於是懷文之士莫不嚮風靡然動麟閣之雕章發鴻都之寶思雲飛綺札代郡接於蒼梧泉湧華篇岷波連於碣石萬殊斯應千里不違同晨風之鴪北林似秋水之歸東壑洋洋盈耳豈徒懸魯之音郁郁文哉非復從周之說故可論諸典故被以笙鏞爰有中山郎徐令雅好著書時稱博物探亡篇於古壁徴逸簡於道人撰而集之命余為序時禠巾三蜀歸卧一丘𣪚髮書林狂歌學市雖江湖廓朗賔廡蕭條綺季留侯神交倣佛遂復驅逼幽憂之疾經緯朝廷之言凡一百一篇分為上下兩卷俾夫舞雩周道知小雅之歡娛擊壤堯年識太平之歌詠云爾宴梓州南亭詩序梓州城池亭者長史張公聽訟之别所也徒觀其巖嶂重復川流灌注雲窗綺閣負繡堞之逶迤澗户山樓帶金隍之繚繞信巴蜀之竒制也時鳳扆多閒上得和平之政鯷瀛有截下無交爭之人以公寄切上僚故久無州將連四千石之重任總十萬井之雄班職逾劇而道彌髙位逾崇而德彌廣市獄無事時狎鳥於城隅邦國不空旦觀魚於濠上賔階月上橫連蜷之桂枝野院風歸動葳蕤之萱草則有明珠愛客置芳酒於十旬羽服神交契仙游於五日圓潭寫鏡光浮落日之津雜樹開帷彩綴飛煙之路藤蘿杳藹挂疏隂以送秋鳬雁參差結流音而將夕百年之歡不再千里之賀何常下客悽惶暫停歸轡髙人賞玩豈輟斯文咸請賦詩六韻成章云爾七日綿州泛舟詩序諸公迹寓市朝心游江海訪竒交於千里惜良辰於寸隂常恐辜負琴書荒凉山水於是脫屣人事鳴棹川隅言追挂犢之才用卜牽牛之賞邊生經笥送炎氣以濯纓郝氏書囊臨秋光而曝背似遇緱山之客還疑星漢之游願駐景於髙天想乘霓於縮地繁絲亂響凉酎時斟戲翔羽於平沙釣潜鯉於曲浦乘流則逝不覺忘歸咸可賦詩探韻成作楊明府過訪詩序夫清風動駕謁阮籍於山陽素雪乘舟訪戴逵於江路猶名髙好事迹標良史未有鶯臨綺月筵開許郭之談花聚繁星門杠荀陳之馭泛煙光於紫㶑翻露色於丹滋亭臯一望平蕪千里萋萋芳草童兒牧馬之場亹亹朝川野老休牛之塔釣臺隱隱先生之桑梓可知茨嶺巖巖隱士之風流尚在豈使臨卭樽酒歌舞無聲彭澤琴書田園寢詠其詩不録宴鳳泉石翁神祠詩序夫圯上黃公靈期已逺湘中𤣥乙化跡難徴况乎神理巋然近帶青溪之路瓌資可望俯控丹巖之下豫以歸骸空谷言隔市朝濯髮長川載罹寒暑心灰兩寂長無具爾之歡形木雙枯將有終焉之志不悟喬鶯始囀喈喈於鶺鴒野蕚初開韡韡於棠棣命壺觴而引宴即沐新蘭尋澗户以安歌仍攀野桂萋萋春草王孫游兮不歸秩秩斯干幽人去而忘返鼓我舞我修袖滿於中巖神之聽之多祜興於觸石爰有嘉命咸遣賦詩請題四韻列之如右初春於圭峯集作邪嶺送益府竇參軍宴詩序駱賔王分首三秦集作春非送歸集作君千里青天集作山白日非舊國之春秋玉斚金樽集作翠斚金樽是他鄉之杯酒况復圭峯南望切登髙之情渭水北流動臨川之歎于時寒光將歇春景未華殘雪飄花猶開六出輕氷涵鏡未解三川晨風軫孫楚之情岐路下楊朱之淚雖載言載笑賞風月於離前而一詠一吟寄心期於别後詩言志也可不云乎洪崖子鸞鳥詩序陳子昂鸞鳥篇者晉人洪崖子之所作也洪崖子遁我𤣥魁賁其默行矯迹汾水習隱洛陽乘白驢衣羽褐游朝市之際雜縉紳之間時人或將襲其青牛師薊子訓之陳迹也常以翠鸞時棲明王之瑞君子獨立矯世之方於是和墨淡情灑翰縟意寄孤興於露月沉浮標於山海乃集瑶圖洗玉池翩翩然又以自得也時尚輦奉御梁國喬侃聞其風而悅之乃刻羽引集作剪商霏集作飛毫掞牘扣歸昌之律叶朝陽之音率諸君子屬而和之者十有五子集無子字余始未集作末知夫洪崖也喬子慕義命余序之凡若干首送工部尚書弟赴定州詩序張說宵旰天子送冬卿之詩也河朔愆嵗恆陽俟英華作侯非牧借威六官導俗千里俾乎列城遷仰止之化鄰境䝉波及之澤不然者豈一小郡而勞大賢哉尚書河東侯朝廷之舊宰也操法度於掌握運陶鈞於方寸是將敷皇惠寒谷挾纊而知暄暢君恩疲人飲德而自飽蘇其槁瘁樂我陽和亢宗殿國亦望於此于時春帶餘寒野銜殘雪太官重味御酒百壺供帳臨岐假絲竹以留宴傾城出餞㑹文章以寵行三台厚常寮之意八座深聨事之矚既而離人遽起班馬爭嘶尋太行之逺集作連山想邯鄲之長陌雖仰瞻鴻雁來往易於前期而相對桑榆遲暮難於逺别送歸之地歡恨集作悵如何應制華篇凡若干首鶱翔鸞鳳欲挂千金之木紏合虬集作蛟龍附藏羣玉之府置之懷袖以慰遐心云爾送毛明府詩序昔之謂良宰者講道議行訓俗式人出自郎官遷登郡守不以才限流品位紆寵賄集作賂聖厯之際任賢稽古毛明府執德不回發言無擇雍容文雅罷曲池集作江之曵裾樽酒絃歌即平鄉之製錦甲朝辭洛宴别嘉賔孟夏涉河路踐芳草眷彼燕趙頃罹戎羯金革毒三北之師杼軸醜二東之賦毛公將勝苛居簡止濁除濫集作徐清不下堂而為理有入境而先歎朋知坐間弦望何時盡賦金谷之詩逺送邯鄲之陌愛而不見同夫樹萱㑹諸友詩序谷子者昔與說聫務蓬山出入三載事志相得情深友于尋屬吾人秩集作秋遷迫吏畿劇愛而不見春也再集作載華今說復謝書坊補他職窮猿之意不集作無擇深林喜且把袂舊筵解帶餘日卧玩文墨笑談平生茲歡豈多後面方永沉沉春雨人亦淹留文苑英華卷七百十五
