body:
  text: 文苑英華巻一百六十二宋李昉等編地部四海十五首江三十八首潮八首海早岀廵行矚望山海王筠王生臨廣隰潘子望洪河同軫懷歸思俱興年逝歌闕二子承臉淚滂沱剖符瀛海外結綬層山阿因心留惻憫恕已息煩苛繕築循時隟興動藉民和髙門惟壯麗脩雉亦駢羅層樓已閱幾二字疑複道亦經過昧旦清隂上風氣入纎蘿雲起垂天翼水動連山波奔濤延瀾汗積翠逺嵯峨鄉關屢回曲還顧杳蹉跎曽㣲肅肅羽望路空如何望海隋煬帝碧海雖欣矚金臺空有聞逺水翻如岸遥山倒似雲斷濤還共合連浪或時分馴鷗舊可狎卉木足為羣方知小姑射誰復與臨汾季秋觀海前人孟軻叙逰聖枚乗說瘉疾逖聽乃前聞臨深驗兹日浮天逈無岸合虛初學記作含靈固非一委輸百谷歸朝宗萬川溢汾空初學記作城碧霧晴連洲彩雲宻欣同夫子觀深愧𤣥虛筆奉和望海虞茂清蹕臨溟漲巨海望滔滔十洲雲霧逺三山波浪髙長瀾疑浴日連島類奔濤神逰藐汾射睿藻冠風騷縱然雖觀海何以效㳙毫望海祖孝徴登髙臨巨壑不知千萬里雲島相接連風濤無極已時看逺鴻度但類聚作乍見驚鷗起不假送将歸自然傷客子海李嶠習坎䟽丹壑朝宗合紫㣲三山巨鰲湧萬里大鵬飛樓冩春雲色珠含明月輝㑹因添霧露方逐衆川歸景龍四年春祠海宋之問肅事祠春溟宵齋洗䝉慮鷄鳴見日出鷺下驚濤騖地濶八荒近天廻百川澍筵端接空曲目外唯雰霧暖氣物象來周逰晦明互致牲匪𤣥享禋滌期靈煦的的波際禽沄沄島間樹安期今何在方丈蔑尋路仙事與世隔冥搜徒已屢四明背羣山遺老莫辨處撫中良自慨弱齡忝恩遇三入文史林兩拜神仙署雖歎出關逺始知臨海趣賞來空自多理勝孰能喻留楫竟何待徙倚忽云暮嵗暮海上作孟浩然仲尼既已歿予亦浮于海又見斗柄廻始知新嵗改虛舟任所適垂釣非有待為問乗槎人滄浪復誰在和賀蘭判官望北海作高適聖代務平典輶軒推上才迢遥溟海際曠望滄波開四牡未皇息三山安在哉巨鼇不可釣髙浪何崔嵬湛湛朝百谷茫茫連九垓挹流納廣大觀異増遲廻日出見魚目月圓知蚌胎跡非想像到心以精靈猜逺色帶孤嶼虛聲涵殷雷風行越裳貢水遏天呉災攬轡隼将擊忘機鷗復來縁情韻騷雅獨立遺塵埃吏道竟吾用翰林仍忝陪長鳴謝知已所媿非龍媒西陵口觀海薛據漸河一作長江漫湯湯近海勢彌廣在昔胚渾凝融為百川長地形失端倪天色潜滉瀁東南際萬重一作里極目自一作逺無象山影乍沉浮湖波忽來往孤帆或不見棹歌猶想像日暮長風起客心空振蕩浦口雲未收潭中月初上林嶼幾邅廻亭臯時偃仰嵗晏訪蓬瀛真逰非外奨海上作宋務光曠哉潮汐池大哉乾坤力浩浩去無際沄沄深不測崩騰歙衆流泱􅐯環中國鱗介錯殊品氛霞饒翠色天波混莫分島樹遥難識漢主探靈怪秦皇恣逰陟搜竒大壑東竦望成山北方術徒相誤蓬萊安可得吾君略仙道至化孚淳黙驚浪晏窮溟飛航通絶域馬韓底厥貢龍伯倄其職粤我遘休明匪躬朝正直敢輸鷹隼摯以問豺狼忒海路行已殫輶軒未皇息勞歌𤣥月暮旅睇滄海極魏闕渺雲端馳心附歸翼越中問海客劉眘虛風雨滄洲暮一帆今始歸自云發南海萬里速如飛初謂落何處永将無所依冥茫漸西見山色越中㣲誰念去時逺人經此路稀泊舟悲且泣使我亦沾衣浮海焉用説憶鄉難乆違縱為魯連子山路有柴扉望海周繇蒼茫空泛日四顧絶人煙半浸中華岸旁通異域船島間應有國波外恐無天欲作乗槎客翻愁去隔年蒲門戍觀海作陳陶廓落溟漲曉蒲門欝蒼蒼登樓禮東君旭日生扶桑毫釐見蓬瀛含吐金銀光草木露未晞蜃樓氣若藏欲逰蟠桃國慮渉魑魅鄉徐市惑秦朝何人在巖廊惜哉千童子葬骨於眇茫恭聞槎客言東池接天潢即此聘牛女曰祈長夀方靈津水清淺余亦慕脩航南海曹松傾騰界漢沃諸蠻立望何如畫此看無地不同方覺逺共天無别始知寛文魮隔霧朝含磬老蚌凌波夜吐丹萬状千形皆得意長鯨獨自轉身難江渡浙江劉孝綽季秋弦望後輕寒朝夕殊商人泣紈扇客子夣羅襦憂方自難遣况復阻川隅日暮愁隂合繞樹噪寒烏濛漠江煙上蒼茫沙嶼蕪觧䌫辭東越接舳騖西徂懸帆似馳驥飛棹若驚鳬言歸逰俠窟方從冠蓋衢泛永康江沈約長枝萌紫葉清源泛緑苔山光浮水至春色犯寒來臨睍信永矣望美曖悠哉寄言幽閨夣羅袖勿空裁渡新安江貽京邑逰好前人眷言訪舟客兹川信可珍洞徹隨深淺皎鏡無冬春千仭冩喬樹百丈見逰鱗滄浪有時濁清濟涸無津豈若乗斯去俯映石磷磷紛吾隔囂滓寧假濯衣巾願以潺湲水霑君纓上塵濟浙江任昉昧旦乗輕風江湖忽來往或為歸波送乍逐飜江上近岸無暇目逺峯更興想緑樹懸宿根丹崖頺乆壤奉和汎江庾信春江下白帝畫舸向黄牛錦䌫廻沙磧蘭橈避荻洲濕花隨水泛空巢逐樹流建平船柹下荆門戰艦浮岸社多喬木山城足廻樓日落江風静龍吟逈上㳺夏日臨江隋煬帝夏簟初學記作潭䕃脩竹髙崖坐長楓日落滄江静雲散逺山空鷺飛林外白蓮開水上紅逍遥有餘興悵望情不終入桞江薛道衡仗節遵嚴㑹揚舲泝急流征塗非白馬水勢類黄牛跳波鳴石磧濺沫擁沙洲岸廹初學記作廻槎倒轉灘長船却浮縁崖頻斷挽挂壁屢移鉤還憶青絲騎東方來上頭初渡江虞世基歛䇿暫廻首掩涕望江濵無復東南氣空隨西北雲渡漢江李百藥東流既瀰瀰南紀信滔滔水激沉碑岸波駭弄珠臯含星映淺石浮蓋下奔濤溜濶霞光近川長曉氣髙檣烏轉輕翼戯鳥落風毛客心既多緒長歌且代勞王師渡漢水經襄陽前人導漾䟽源逺歸海㑹流長延波接荆夣通望邇沮漳髙岸沉碑影曲溆麗珠光雲昏翠島沒水廣素濤揚閲川已多歎遐睇幾増傷臨溪猶駐馬望峴欲霑裳喬木下寒葉亭林落曉霜山公不可遇誰與訪髙陽九江口南濟北接蘄春南與潯陽岸蘇味道江路一悠哉滔滔九派來逺潭昏似霧前浦沸成雷鱗介多潜育漁商幾泝洄風摇蜀柹下日照楚萍開近潄湓城曲斜吹蠡澤隈錫龜猶入貢浮獸罷為災津吏揮橈疾郵僮整傳催歸心誰可問為視落潮廻夜渡呉松江懷古宋之問宿帆震澤口曉渡松江濆棹發魚龍氣舟衝鴻鴈羣寒潮頓覺滿暗浦稍将分氣赤海生日光清湖起雲水郷盡天衞歎息為呉君謀士伏劔死至今悲所聞漢江前人嶺外音書斷經冬復歴春近卿情更怯不敢問來人夜渡江姚元崇夜渚帶浮煙蒼茫晦逺天舟輕不覺動䌫急始知牽聴草遥尋岸聞香暗識蓮唯看孤帆影常似客心懸春江晩景張九齡江林皆秀發雲日復相鮮征路那逄此春心益眇然興來祗自得佳處莫能傳薄暮津亭下餘花滿客船初入湘江集作中有喜前人征鞍窮郢路歸棹入湘流望鳥唯貪疾聞猿亦罷愁兩邉楓作岸數處橘為洲却記從來意翻疑夣裏遊湘中作前人湘流繞南嶽絶目轉青青懐禄未云已瞻途屢所經煙嶼宜春望林猿莫夜聽永路日多緒孤舟天復𡨕浮波從此去嗟嗟勞我形漢江臨泛王維楚塞三湘接荆門九派通江流天地外山色有無中郡邑浮前浦波瀾動逺空襄陽好風日留醉與山公凌朝浮江旅思韋承慶天晴上初日春水送孤舟山逺疑無樹潮平似不流岸花榮且落江鳥沒還浮覊望傷千里長歌遣四愁江上逄春張均離憂耿未和春慮忽蹉跎擇木猿知去尋泥鷰獨過驚花翻霽日垂桞拂煙波激意屢怡賞無如鄉念何和李侍御渡松滋江孟浩然南紀西江濶皇華御史雄截流寧假檝挂席自生風寮宷争攀鷁魚龍亦避騘坐聞白雪唱飜入棹歌中横江詞四首李白横江西望阻西秦漢水東流揚子津白浪如山那可渡狂風愁殺峭帆人二海神東過惡風廻浪打天門石壁開浙江八月何如此濤似連山噴雪來三人言横江好儂道横江惡猛風吹倒天門山集作一風三日吹倒山白浪髙於瓦官閣四日集作月暈天風霧不開海鯨東蹙百川廻驚波一起三山動公無渡河歸去來江上琴興常建江上調玉琴一絃清一心泠泠七絃遍萬木澄幽隂能使江月白又令江水深始知梧桐枝可以徽黄金此詩二百二十二巻重出今已削去注異同為一作與鮮于庻子泛漢江岑參急管更湏吹金盃莫遣遲酒光紅琥珀江色碧琉璃日影浮歸棹蘆花罥釣絲山公醉不醉問取葛疆知江上愁思二首陳羽江上翁開門開門向衰草只知愁子孫不覺生涯老二江上草莖枯莖枯葉復焦那堪芳意盡夜夜沒寒潮江頭張籍晩步隨江逺來帆過眼頻試尋新住客少見故鄉人廻首憐歸翼長吟任此身應同南浦鴈更見嶺頭春九江北岸遇風雨白居易黄梅縣邉黄梅雨白頭浪裏白頭翁九江濶處不見岸五月将盡多惡風人間穏路應無限何事抛身來此中此詩二百九十三巻重出今已削去漢江杜牧溶溶漾漾白鷗飛緑浄春深好染衣南去北來人自老夕陽長送釣船歸嘉陵江薛逢備問嘉陵江水湄百川東去爾西之但教清淺源流在天路朝宗㑹有期江岸即事温庭筠水容侵古岸峯影度青蘋廟竹唯聞鳥江帆不見人雀聲花外暝客思桞邉春别恨轉難盡年年集作行行汀草新江邉趙嘏終日勞車馬江邉欵竹扉殘花春浪濶小酒故人稀戍鼓客帆逺津雲夕照㣲何由兄與弟俱及暮春歸江際鄭谷杳杳漁舟破暝煙踈踈蘆葦舊江天那堪流落逄摇落可得澘然是偶然萬頃白波迷宿鷺一林黄葉送寒蟬兵車未息年華促早晩閒吟向滻川濟浙江陳陶適越一輕艘凌兢截鷺濤曙光金海近晴雪玉峯髙静㓂思投筆傷時欲釣鼇壮心殊未展登渉漫勞勞此詩二百九十五巻重出今已削去注異同為一作桂江曹松未識佳人尋桂水水雲先觧傍壺觴笋林次第添斑竹鶵鳥參差䕶錦囊南中有錦囊鳥乳洞此時連越井石樓何日到仙鄉如飛似堕皆青壁畫手不強元化強潮賦得觀潮類聚作濤滿任昉雲容雜浪起楚水漫呉流漸㸔遥樹沒稍見碧天浮漁人迷舊浦海鳥失前洲不測滄溟曠輕鮮幸自㳺上虞鄉亭觀濤津渚學潘安仁河陽縣詩劉孝綽昔余筮賓始衣冠仕洛陽無貲徒有任一命忝為郎再踐神仙側三入崇賢傍東朝禮髦俊虛薄厠才良遊談侍名理搦管創文章引籍陪下膳横經叅上庠誰謂服事淺契濶變炎凉一朝謬為吏結綬去承光烹鮮徒可習治民終未長化鷄仰季智馴雉推仲康魯恭字也此城隣夏穴橚矗茂筠篁孝碑黄絹語神濤白鷺翔遨遊佳可望釋事上川梁秋江凍雨絶反景照移塘纎羅殊未動駭水忽如湯乍出連山合時如髙蓋張漂沙黄沫聚礐石素波揚榜人不敢唱舟子詎能航離家復臨水眷然思故鄉中來不可絶奕奕苦人腸泝洄若無阻謝病反清漳乗潮至漁浦作陶翰艤棹乗早潮潮來如風雨樟亭忽已隠界峯莫及覩崩騰心為失浩蕩目無主風停浪始開漾漾入漁浦雲景共澄霽江山相吞吐偉哉造化靈此事從終古流沫誠足誡商歌調易苦頗因忠信全客念猶栩栩樟亭觀濤宋昱濤來勢轉雄獵獵架長風雷震雲霓裏山飛霜雪中激流高失岸吹澇上侵空翕闢乾坤異盈虛日月同艅艎從陸起州浦隔阡通跳沫噴巖翠飜波帶景紅怒湍初抵北却浪浚疑作復歸東寂聽堪増勇晴㸔自發䝉伍生傳或謬枚叟說難工來信應無己申威亦匪窮衝騰如决勝廻合似相攻委質任平視誰能涯始終㸔潮前人浙江悠悠海西曲一日波濤兩飜覆錢塘郭裏㸔潮人直到白頭㸔不足觀濤二首朱慶餘不知來逺近但見白峨峨風雨飜前駐魚龍逆上波聲長勢未盡曉去夕還過要路横天塹其如造化何二木落霜飛天地清空江百里見潮生鮮飇出海魚龍氣晴雪噴山雷鼔聲雲日半隂川漸滿客帆皆過浪難平髙樓曉望無窮意丹葉黄花繞郡城潮集作錢塘江潮羅隠怒聲洶洶勢悠悠羅刹江邉地欲浮漫道往來存大信也知飜覆向平流狂抛巨浸疑傾底猛過西陵似有頭至竟朝昏誰主掌好騎赬鯉問陽侯文苑英華巻一百六十二
