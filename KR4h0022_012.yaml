body:
  text: 文苑英華卷十二宋李昉等編天象十二五色卿雲賦二首白雲無心賦二首白雲照春海一首白雲起封中賦一首山川出雲賦一首雲從龍賦一首夏雲賦一首富貴如浮雲賦一首五色卿雲賦以題為韻李惲惟皇建極兮憲章前古於穆文明兮保乂寰宇御時得一兮臨人以五法天無私兮承天之祜至矣哉衆兆融朗山川出雲叶千年之休裕垂五色之氤氲蕭索離披狀虹輝之貫日徘徊搖曵疑鼎氣之歊汾散作霞彩聚成錦文匪騰華於觸石信呈瑞於明君其靜也専其動也直既無散漫亦時消息逺而可視髙未能逼乘輕吹之霏微映朝陽而翕赩稟造化之元氣挺自然之竒色英倐倐也秪可以理求紛溶溶兮固難乎智測若霧非霧有始有極轉空不待於扶搖動日豈資於羽翼有道斯見無德匪呈庶物皆覩應天之卿體鵠振而超越候龍吟而化成則需為大矣可謂乎元亨利貞第二同前韻於穆聖唐建其皇極通三微而昊穹降祉禔萬福兮隂陽不測答禧祥於一人見彩雲之五色其為狀也乃從龍以分氣其為勢也若摶鵬之垂翼薈蔚非觸石而興縹眇盈畫工之飾葱翠炯晃蕭索氛氲回合斐亹散聚繽紛轉光風則動而愈出衝霽日則燦然皆分古之函關紫氣帝鄉白雲豈比澄鮮流慶作瑞吾君夫德施者帝王之所崇雲行者天地之所溥惟帝德之動天諒卿雲之飛吐光浮碧落奪虹彩於太虛影下清潭照錦色於曲浦將以發揮明時騰邁前古雖建官惟賢列爵惟五降及品彚莫不是覩緬彼瑞牒詢夫物名則有甘露降黃河清狐九尾而來擾草三秀而敷榮若以匹敵莫之與京式昭聖理承應天卿是乃感夀以呈休應君以來附苟非至道則未期遇故漢主之祠后土也寶鼎見兮其色同昭軒轅之誅蚩尤也華蓋蒙兮一疑形乃拊佳衆聖於往昔亦效祉而斯覩式贊其羭左傳羭美也恭命述賦白雲無心賦以山川出雲天實為之為韻韋執中英英白雲合莫為質義則難究覽之不一觀其發雖有類於知機稽其理乃無心而自出蓋𤣥造之潜運而神功之隂隲時止時行或徐或疾結自元氣生乎羣山將離兮孰制而合既往兮孰召而還非欲恢𢎞自覆乎大荒之際焉知酌損不踰於膚寸之間徒見其紆餘上漢繚繞飛天形不常而屢易居靡定而頻遷謂變通之不倦將有志於必然斯乃生有於無假虛為實勢乍分於逐火色暫渝於帶日油油裔裔雖在空而可觀杳杳冥冥考攸往而無必觸石蒼野揚埃白泉不恆厥所有開必先搖揚縈空滅煙光於逺嶠輪囷委地雜波景於遙川氤氤氲氲或聚或分其散也氣其興也雲忽羡溢以洪舒若練之曵乍縈紆而交錯如絲之棼所謂化於無象著於無為匪知咎於進退惟契道而推移夕隨重隂則黯以霮䨴晝混陽景則焕然赫曦歘上騰而蓊蔚俄疊影以參差既有遇而必變則無心兮可知然則隂陽不測天實為之不然者雷何慿而隱隱雨何施而祁祁雖思慮而不假何卷舒以應時儻帝鄉之可陟何自致兮在茲第二同前韻觸石起於膚寸散逺天以逶迤既輪囷而合道淡搖曵以無為綴廣莫以霜淨凝太虛以纓垂出處靡恆同至人之無著卷舒罔究類君子之不羈翹玉葉以繚繞耀金柯而陸離其兆無質其形罕一匪潤礎以上升或從龍而逈出入房呈貺偶作瑞於殷王登封效祥諒無情於漢室影遙連於逺水光俯接於平川幾徘徊以暫散倐迤邐而相連分至必書驗其物而有則荆棘不别表茲性之無偏勢出塞以繽紛色瑩空以氤氲被漫漫之精氣成英英之白雲抱翠石以流彩入清池而寫文或假勢於重嶺或隔閡於孤山挺竒峯於天末亘橫陳於巖間順細雨以低舉隨輕風而往還哂魚鱗之覆地輕鵬翼以垂天誠莫察其所感亦安知其所然五色競彰我則匪黃匪黑五方皆遍我則何後何先至矣哉信潔白之無心實敷華之不實雲之容兮或明或暗雲之體兮乍徐乍疾唐堯沉璧而受釐軒后紀官而修吉異哉近逺相追紆餘葳蕤出蒼梧以漠漠入帝鄉以遲遲愧作凌雲之賦思歌出谷之詩儻賢良以見舉庶微才以應之白雲照春海賦以鮮碧空鏡春海為韻姜公輔白雲溶溶搖曵乎春海之中紛紜層漢皎潔長空細影參差匝微明於日域輕文燐亂分炯晃於仙宫始而乾門闢陽光積乃縹眇以從龍遂輕盈而拂石出窮巒以髙翥跨橫海而逺托故海映雲而自春雲照海而生白或杲杲以積素或沉沉以凝碧圓虛乍啓均瑞色而周流蜃氣初收與清光而激射雲信無心而舒卷海寧有志於潮汐彼則澄源紀地此乃泛跡流天影觸浪以時動形隨風而屢遷入洪波而並曜對緑水而相鮮時惟孤嶼氷朗長汀雲净辨宫闕於三山揔妍華於一鏡臨瓊樹而昭晰覆瑶臺而縈映鳥頡頏以追飛魚從容以涵泳莫不各得其適咸悅乎性登夫爽塏望茲雲海雲則連錦霞以離披海則蓄玫瑰之翠彩色莫尚乎潔白嵗何芳於首春惟春色也嘉夫藻麗惟雲白也賞以清真可臨流於是日縱觀美於斯辰彼美之子顧曰無倫揚桂楫棹青蘋心遙遙於極浦望逺逺乎通津雲兮片玉之人白雲起封中賦以皇漢施德介丘告成為韻高孚客有遭逢漢昌從武帝而登岱覩白雲之效祥曰此蓋非常不飄不揚初起封中方郁郁以呈象稍浮山上乍英英而有光原初出之義也告成我皇我皇德以靜人威以平難廓清諸夏光啓大漢俗既和兮考時巡禮既備兮登日觀惟天輔聖無雨則其明徴惟嶽通𤣥出雲所以幽贊不然者山有四嶽胡獨興於此地有四極胡不普而施觀耀質以流彩若無心而有知無心者何隨車而動息有知者何表聖之功德帝穆清以修祠雲故清其容帝貞白以為心雲故白其色豈徒然也君為萬國所仰嶽乃衆雲所届其垂思儲精登封俯拜亦庶乎明神斯答景福攸介故夫是雲也乘元氣而出冠靈壇而浮不漠漠以四散直亭亭於上頭祥光內朗瑞色旁流既表慶於茲日復增華於介丘此可以見其無疆之休者也且夫刻石者所以紀號泥金者所以昭告必𤣥德之已升乃兹山之可造若齊桓僣侈秦帝驕暴縱傾國以修封豈嘉祥之云報美矣哉晝日斯清瑞雲孔明絪緼蕭索下應一人之感髣佛影響旁聞萬嵗之聲彼入房彰於殷帝浮河表於周成豈可與兹而名哉山川出雲賦以維嶽降神生甫及申為韻李曾天地為大不能獨生山川通氣然後化成故雲者氣也感時而先出雨者施也慿雲而後行亦由將有邦家神必生其賢智獲其輔佐化乃洽於文明且觸石爰分凌空可覩雜峯巒而勢逸竒狀掩山川而氣騰雄怒變而可大隨風散以飛揚用而有成從龍作為霖雨因知雲之將出合君臣之道賢之將來為帝王之輔所以神致命於開周嶽降神而生甫者矣天不我欺雲出以時濟旱災而有望播膏澤而無私則臣既在茲君當以維黃彩有豐年之驗青光表舉賢之期豈獨郁郁紛紛合嘉氣以成慶朝朝暮暮向陽臺而有思其為體也且多其為狀也難及舒則杳冥而無際卷則涓液而並入况至帝鄉而散城邑隨蓋狀以徐轉對陳影而遙集君無謂輕虛而不真君無謂悠揚而不親有以通天地而為化有以合隂陽之至神與道興滅隨時屈伸為君重隂覆萬人於炎暑為君載雨滌四海之埃塵蔽虧窮巷繞山扉以升降回旋翠幄拂仙家而綿邈應賢為瑞願浮色於洛川改容非煙冀騰光於崑嶽雲從龍賦以聖主得賢臣為韻張隨山川之氣曰雲寂爾虛無倐爾韜映雖無心而既出終有感而叶慶鱗蟲之長曰龍道符於神德合於聖時變化而無極在隂陽而應令是知雲為佐龍為主龍無雲不可以陟煙霄雲無龍不可以降時雨始靄靄於山澤俄騤騤於天宇有若魚水相須君臣夾輔而已原夫或躍在泉道契𤣥默未始出岫時有通塞及夫順天地之功贊生成之德吟空山而奮揚其狀觸幽石而蓊勃其色然後蹈乎寥廓自彼南北何往而不濟何施而不得潤萬物豈待崇朝控千里才踰瞬息故曰氣感則應有開必先臣良而聖主垂拱雲起而飛龍在天以類相從罕聞不合惟后作乂孰曰非賢是以殷丁得其傅說吉甫佐於周宣品物咸泰寰海晏然則雲龍之義明矣君臣之道一焉于以辨物理于以通人倫運有智兮事有因如羽翼之相假同股肱之相親則當今得賢共理豈不冠前代之君臣夏雲賦劉元淑崇山作鎮峩峩秀絶暑氣潜蒸夏雲孤泄其稍進也間古木以深沉其上升也鏤太陽而明滅其質散漫其光氛氲抱翠石而留影入明水以寫文粲粲爛爛摩太虛而歷漢郁郁紛紛從皓景而橫汾美其任運髙下與時消息似大道之無心同逹人之有識時康則應伴雨足於一旬主聖乃浮變歌聲於五色俄頃萬里不資天地之功膚寸九霄豈假隂陽之力爾乃含精飄揚逐吹低舉周遊散適不常其所出塞邐迤暮為隂山之陳入夢嬋娟朝是陽臺之女别有孤陋沉淪文章日新既作凌雲之賦未為天子之臣富貴如浮雲賦以不義而得有如浮雲為韻鄭磻隱義重所守雲輕不居苟崇髙而非據等飄薄之無餘比赫赫之榮不因於道德似悠悠之質且寄於空虛推在天之所自諒於我其焉如昔宣父以飲水為娛枕肱方息原憲在左顔生侍側感落落以抱影見英英之改色眀徴瞰室之誡窮彼吉凶遙憐出岫之容齊乎失得且曰得之不處生也若浮放於利而安仰止於天而不留將以輕列爵動諸侯雖南國佳人漫學如蟬之鬢西園危檻空齊似蜃之樓察彼載浮異茲長守髙冠始加而已失雅歌式遵而非久像往來之車蓋圓影難追映躞蹀之馬蹄嘉名何有誠以善惡不昧卷舒有時由得之而濫矣果飄然兮已而暴則不居異郁郁紛紛之狀求而非道同朝朝暮暮之姿然則觸石而起者如苟得之易從風而滅者非能散之義顧炎炎之色鼎食皆虛仰片片之多烟空如寄倐忽時變悠揚日曛垂一言於百代揖萬國之孤雲月榭風臺空復散其蕭索藻扃黼帳皆不駐於氤氲可以定聖哲之窮逹審是非於得否山川之氣俄失髙明之象速朽至乎哉如雲之喻傳於二三子之口文苑英華卷十二
