body:
  text: 文苑英華巻三百八十六宋李昉等編南省二吏部尚書授裴遵慶吏部尚書制常衮門下尚書萬事之本選部五曹之右以掌邦典以掄官材漢魏以來多用宿儒髙徳葢重其任也金紫光禄大夫守太子少傅集賢待制上柱國河東郡開國公裴遵慶周慎禮節敬讓素居集作周慎敬讓道素自居博學而識前言懿文而敦集作知大體迺者匡弼王室克和庶政訓𨗳儲宫用𢎞三善日新之羙嵗晩彌彰自陶融於元和不嬰拂於俗務名臣令望清議攸歸處以銓覈用澄流品抑華取實無俾滯才可吏部尚書㪚官勲封如故主者施行授劉晏吏部尚書制常衮門下獻善宣羙職在納言錄賢任能必歸冡宰若萬事之本舉得其要一時之才選當其實則致理之體昭然可見矣簡求碩徳俾之典崇金紫光禄大夫檢校户部尚書兼御史大夫東都河南江淮山東等道轉運常平鑄錢鹽䥫等使上柱國彭城郡開國公劉晏時傑國楨髙才博學超詣精理澹然素懐禮法之綱紀人倫之模表甞處台弼以𢎞訓範載其清静濟我艱難自勞于外又竭心力茍利於國不憚其煩領錢榖轉輸之重資國家經費之本務其省約加以躬親小大之政必關於慮出入農里止舎鄉亭先訪便安以之均節一作以均徭役事積而不亂理簡而易從故得井賦田租萬億及秭方舟而下以給中都水旱不歉人懐其恵可謂盡瘁事國勤勞王家也思有褒進屢申退讓然以官人之任朝選無踰藉其叅領用鎮風俗所揔群務一以咨之中外兼濟固有餘力可吏部尚書餘如故主者施行授蕭俛除吏部尚書制白居易勅古者君使臣以禮臣事君以忠季代以集作已還鮮由兹道先皇帝常創於是故在位十五載凡觧相印者殆二十人多寵為大僚或付以兵柄矧予小子宜有加焉而輔弼之臣嘗經一日造吾膝沃吾心則思與之始終厚申㤙禮不唯勸能者感來者且不敢失墜先志也尚書右僕射蕭俛忠肅孝謹佐吾為理以勤事國以疾退身本末初終不失其道既免舊唐書作罷樞務以為右揆唐書作俾居端揆朕欲加㤙超等復吾前言而俛繼上讓章至於三四敦諭頗集作煩切陳乞彌堅是用改集作正命為選部尚書而猶冠六卿統百職尚可以表吾寵重亦所以成爾謙光爾宜欽厥始集作止慎厥終無忝我褒揚之命可吏部尚書授鄭絪吏部尚書制白居易勅天官太宰秩序常尊自昔迄今冠諸卿首非位望崇盛者不可以處之而朕即位以來凢命故相領者三矣迨此而四可不重乎東都留守防禦使檢校刑部尚書兼御史大夫榮陽縣開國公鄭絪有丙吉之寛裕子産之恭恵合而為用藩輔四朝故事遺愛留於官次國之都府半在東周委以保釐人安吏肅重煩耆徳入領冡卿昔魏用崔琰毛玠典吏曹一時之士以亷節自勵國朝以一有來字宋璟李義掌選部亦能遏絶謁託集作訛偽振張紀綱官無古今得人則理吾言及此欲爾繼之可依前件授髙元裕除吏部尚書制杜牧勅昔有虞氏貴徳尚齒言於四代其道最優今吾卿老富有道徳以大冡宰表率群僚顧予敢専得於僉議前山東道節度管内觀察處置等使銀青光禄大夫檢校吏部尚書使持節襄州諸軍事兼㐮州刺史御史大夫上柱國渤海縣開國男食邑三百户髙元裕始以御史諌官在長慶寳歴之際匡拂時病磨切貴近㒺有顧慮知無不為復以諌議舎人在太和末詞摧兇魁坐以左官繼為中丞京兆公卿藩服朕始在位徴歸朝廷爰自尚書裂分茅土為政以徳行已唯仁言集作信而履之服而樂之餘三十年道益昭著夫中外之任迭有重輕今者干戈藴藏戎狄信順將欲詳考典禮開張教化使吾丞相以降有所咨稟非爾元裕其誰膺之至於官業豈勞倚任祗聽出納無忘教誡可授吏部尚書㪚官勲封如故授劉崇望吏部尚書制錢珝勅朕常考易象否泰之説詩人雨雪之作知君子消長之際繋王者政理之端矧乃大宥已行衆累皆滌非其罪者敬以命之具官劉崇望吉徳在躬明誠格物辭倡寡和自合正聲昭兆龜名見左傳先知宜居前列朕初繼大統方求國禎侍從之臣論思在爾代言之下𢎞道良多察其寛裕之資授以弼諧之任恢張大禮一作體師法碩人以掩細過為所能以觀故事為所樂頃因讒慝偶惑聽聞害賢曽寘於典章尚徳敢忘於覺寤顧直書之史冊何損於明還暫免之冠緌且復其所流澤而余心未足經邦而卿位乃虚來整軒裳再提衡鏡山公宻啓更廣規模楚客騷離一作辭休勞諷諭勉居㑹府以率六卿可依前件授孔緯吏部尚書加食邑等制薛廷珪勅朕乆為姦倖蔽我聦明其心懵然是非倒置一旦開悟洞决疑迷寰區冀寜邪正兹别明發不寐思予藎臣雖已命官未滿延属亟加寵澤式示優崇新授具官孔緯直道致君至誠醫國先帝以爾輔弼予冲人業履之勤一作勲名明備於前制唯朕不明不敏俾爾堙厄于外者有年矣言念至此心焉震驚茍不驟加寵榮仍復徽數即何以示予補過之心也天官太宰首冠六卿徃執銓衡暫煩藻鏡殊恩縟禮並復舊章逖聽履聲佇還衮職惟爾元老體予虚懐可吏部尚書仍復持危啓運保乂功臣開府儀同三司上柱國魯國公食邑四千户實封二百户兵部尚書授張仁愿兵部尚書制蘇頲黄門名遂身退則聞告老優賢尚齒不忘求舊鎮國大將軍行右衛大將軍上柱國韓國公致仕仍給全祿及品予課朔望朝叅張仁愿有將相之才樹忠公之績入稱三傑帷幄所以運籌出揔六師塞垣由其卧鼓懸利器而御物自中於桑林推素心以得士更成於李徑故能居室而應在邦必聞洎餋疾歸休辭榮及禮用旌渭濵之兆空想潁陽之問乞言繄頼寵徳攸宜佇増題劔之榮更遂揮金之樂可光禄大夫行兵部尚書餘如故主者施行授李林甫兵部尚書制孫逖門下緝熈九法董正六師必在具曕以𢎞兼領金紫光祿大夫户部尚書同中書門下平章事上柱國成紀縣開國男李林甫宗盟有慶王國生才明徳為章懿文成範事君之節貫忠貞於四時應物之誠調恵和於一氣爰立作相以期於理不仁斯逺丕績用彰而詰禁制軍安人和衆是為邦政深期汝諧俾謀猷於七兵仍啓沃於三事可兵部尚書餘如故授李絳檢校右僕射兼兵部尚書制元禛勅中大夫守御史大夫賜紫金魚袋李絳昔先皇帝誨予小子曰堯時有神草在廷屈軼指佞汝知之乎夫邪正在人焉有異物朕有臣李絳猶漢之汲黯也我百嵗後爾其用之為神羊屈軼斯可矣予小子銘鏤丕訓夙夜求思是用致理之初闕付授邦憲且欲集有為吾二字丞相以降皆卑下之集無此六字以示優遇朕亦嘗命安其歩武無為屑屑之儀而絳屢以疾辭不寜其職又焉敢以勞偪集作倦之故煩先皇帝舊臣昔晉僕射何季元病足求免猶命坐家視事張子儒拜大司馬仍令兼錄一作領尚書則卧理不獨専在於郡符端右可以旁綏於戎政由古道也爾其處議持平勉居喉舌慎所觀聽為人司南可檢校尚書右僕射兼兵部尚書㪚官勲封如故授陸扆兵部尚書制錢珝勅周之九法歴代用焉進賢興功以分厥職故夏官之重髙位乆虚則有嘗秉化權方臨邦教惟人之命我不敢私俾正衣冠用光表著具官陸扆貌先恭肅氣實清明言欲訥於否臧徳有容於醉飽中出而静可謂逹於樂乎外作而文所以深於禮也頃以宏博奉吾論思繼令祖之典謨去邪辭之枝葉洎當大用且属多虞執政雖新犯顔已急我則有違蹇叔爾詎不如王陵剖竹遂行伏蒲未足還好爵而來惟辨色掩閑門而退乃韜光考之中庸有以自得徃次六卿之首無輕一等之遷進賢興功必在敦故可依前件授劉崇望兵部尚書制薛廷珪勅台衡舊徳纓冕碩生朝昏常寘於我心事業無忘於汝礪矧朕出潛之日實操顧命之書乃眷滋深公望惟允宜膺重任以副旁求具官劉崇望昔以文詞事先帝為翰林主人旋以藥石沃朕心號中興宰相歴試宏業一作用周旋大寮人無間言動不過則云罷鈞軸亟移光隂室既生白舟惟任觸浩然正氣充塞乎天地之間卓爾神光瑩徹乎星辰之表琴樽遂性名教檢身家事㢕肥物情重贍一作崇重靖言素履頗厚時風大道之行斯文未䘮將論舊徳允属僉諧爰増光禄之勲徃曵尚書之履敬佩休寵克當厥官無或牢謙尚欲髙卧可光禄大夫守兵部尚書户部尚書授畢構户部尚書制蘇頲黄門司徒之官實掌邦教常伯之位先求國華銀青光禄大夫河南尹上柱國魏郡開國公畢構逹識宏才調髙學贍器無不綜含清明以見微言有可觀負忠讜以居直百郡仰其成績三䑓推其故事頃者任殷河尹聲滿洛師姦豪懼秋霜之威孤老懐冬日之愛故可辨于五物書以萬人誰其釐之俾爾作則可守户部尚書㪚官勲如故主者施行授裴寛户部尚書制孫逖門下敬敷五教保息萬人缺官而擇副相惟允通議大夫檢校御史大夫上柱國賜紫金魚袋裴寛器識髙明風規端肅塞諤之用累鷙鳥而莫當操割之能斷犀革而何有亟登䑓閣甞擁旌旄禮樂為從政之文徳刑是戢兵之武雖地卿所掌實佇通才而天憲惟艱尚資兼領宜曵尚書之履仍紆大夫之紳可守户部尚書兼御史大夫㪚官勲賜如故刑部尚書授豆盧欽望秋官尚書制李嶠鸞䑓天作機衡實惟北斗朕之喉舌其在南宫揆徳而居非才莫可新除司府卿上柱國苪國公豆盧欽望踐仁履義抱質含文出蒞藩臬具聞威恵入為朝諌一作棟多所𢎞益立身必由於清謹處職無廢於忠勤外府國泉雖藉幹用中䑓天憲更資明允宜膺尚徳之舉令踐詰姦之位可銀青光禄大夫守秋官尚書勲封如故主者施行授李乂刑部尚書制蘇頲黄門王命司冦汝作士師允廸政刑旁求望實銀青光禄大夫行紫微侍郎一作舍人兼檢校刑部尚書兼知制誥昭文舘學士上柱國中山郡開國公李乂恒碣之寳衣冠之華業揔四科才抱九徳為邦理要洞入精微當代詞雄居成凖的忠義得在公之體清脩禀行已之用紫泥掌誥雖宻王言黄沙定罪是懸人命眷兹欽恤尤頼柬孚俾廽迹於西垣宜正名於北斗可刑部尚書學士㪚官勲封如故主者施行授裴敦復刑部尚書制孫逖門下六卿分職朝選猶難三典佐王邦寄尤重朝議大夫守河南尹攝御史大夫持節江南東道宣撫招討處置使上柱國賜紫金魚袋裴敦復深沉偉量磊落宏才識無不通爼豆兼於軍旅行有餘力文學資於政事頃者廵撫江徼肅清姦宄大叔之謀既能止盗穣苴之法亦在安人功實簡心賞宜超等委之刑柄俾踐白雲之司錫以身章更增金印之秩可銀青光禄大夫守刑部尚書勲賜如故授李巨憲部尚書制賈至門下褒賢䇿勲國之大典允文允武人之所頼陳留太守嗣虢王巨此下疑脱誤杖劍闕閫掌一作専征東夏俾鎮遏冦之職以寵維城之固可守憲部尚書授房琯刑部尚書制賈至門下蠻夷猾夏舜命繇作士楙功邁徳黎民懐之周官大司冦亦以五刑糾萬民之命邦典定諸侯之獄明徳慎罰先王至理前漢州刺史房琯既明且哲貞静尚寛有文行可濟於時有直言能匡其國獻可替否翼亮先朝今㓂賊初滅蒼生凋弊議獄緩死刑期無刑是用採人望於舊臣舉國楨於元老俾掌二典以弼五教庶不仁者逺姦宄道消尚徳優賢仍加八命可特進刑部尚書封如故授崔璪刑部尚書蘇滌左丞崔璵兵部侍郎等制杜牧勅喉舌百官之本綱轄天下之要戎政國之大事三人為衆一舉得之惟君知臣予不敢譲正議大夫尚書左丞上柱國賜紫金魚袋崔璪徳可標凖言成文章揚歴中外道益光顯左省駁議不畏彊禦分憂陜服尹兹東郊政既安人化能被俗擢任藻鑑旋職牢籠材皆適宜官無逋事分鎮股肱之郡遂成功實之臣陟處綱曹副以中憲毎非集作師蘧瑗常慕史魚抨彈之勇正當時病翰林學士承㫖銀青光禄大夫行尚書兵部侍郎知制誥武功縣開國男食邑三百户蘇滌行冠人倫爵髙天秩仁義禮樂之是務克伐怨欲之不行翺翔禁闈出入諷議汲黯為郡嘗聞卧理下恵去國皆以直道洎宣室思賈甘泉召雄造膝盡忠代言稽古近以微恙懇請自便君子之道進退可觀正議大夫前權知尚書户部侍郎上柱國博陵縣開國子食邑五百户賜紫金魚袋崔璵上知自得不器難名既擅髙文兼通博學掌言綸閣典貢春闈詞同三代之風士掇一時之秀振舉職業宣昭令名詩曰濟濟多士文王以寜禮曰官備天子為樂咨爾璪等實瑞清時予為爾之徳鄰爾膺予之慎選典刑不忘於哀敬提綱惟在于公勤舉司馬法勿踵近習各膺重位企佇上酧宜於夙夜無孤官業璪可守刑部尚書㪚官勲賜如故滌可尚書左丞㪚官封如故璵可權尚書兵部侍郎㪚官勲封賜如故文苑英華巻三百八十六
