body:
  text: 文苑英華卷七百三十二宋李昉等編餞送十五送徐從事北遊序一首送辛殆庶下第遊南鄭序一首送獨孤申叔侍從往河東序一首送內弟盧遵遊桂州序一首送從兄稱罷選歸江淮詩序一首送從弟謀歸江陵序一首送僧浩初序一首送濬上人歸淮南覲省序一首送琛上人南遊序一首送元皓師序一首送賈山人南遊序一首送元十八山人南遊序一首送班孝亷擢第歸東川覲省序一首送嚴公貺下第歸興化覲省序一首送蔡秀才下第歸覲序一首送徐從事北遊序栁宗元讀詩禮春秋莫能言說其容貌充充然而聲名不聞傳於世豈天下廣大多儒而使然歟將使晦其說諱其讀不使世得聞傳其名歟抑處於逺仕於逺不與通都大邑豪傑角其伎而至於是歟不然無顯者為之唱集作倡以振動其心集作聲歟今之世不能多儒可以蓋生者觀生亦非晦諱其說讀者然則餘二者為之决矣生北遊必至通都大邑通都大邑必有顯者由是其果聞傳於世歟茍聞傳必得位得位而以詩禮春秋之道施於事及於物思不負孔子之筆舌能如是然後可以為儒儒豈集無此字可以說讀為哉此篇誤編在七百十一卷今移入此送辛殆庶下第遊南鄭序朝廷用文字求士每嵗布衣束帶偕計吏而造有司者僅半孔徒之數春官上大夫擢甲乙而升司徒者於孔氏髙第亦冉倍焉僕在京師凡九年於今其間得意者二百有六十人其果以文克者十不能一二嘗從俊造之後頗涉藝文之事四貢鄉里而後獲焉方之於釣者絲綸不屬鈎喙甚直嗜蜀本作懷有美餌者蜀本無者字而觖望獲魚之暮則善取者皆指而笑之今辛生固窮而未逹遲久而不試褒衣之徒視子而捧腹者蓋不乏焉四字蜀本作蓋不之知焉辛生來集作南依蠻楚專志於學為文無謬悠迂誣之談煆鍊剪截動可觀采故相國齊公接禮加等常為右客且佐其䇿名之願遂笈典墳集作墳典袖文章比來王都笑揖羣伍文昌下大夫上士之列見而器異爭為鼓譽由是為聞人戰術藝之場莫與爭鋒然而遷延三北躑躅不振豈其直鈎而釣懷美餌而羡魚者耶若辛生者有司抑之則已不然身都甲乙之籍其果以文克歟今則囊如懸磬傭室寓食方將適千里求仁人被冒畏景陟降棧道吾欲抑而不歎其若心胸何然吾聞焚舟而克手劒而盟者皆敗北之餘也子之厄困而往霸心勇氣無乃發於是行乎成拜賜之信刷壓境之耻無乃果於是舉乎往愼所履如志遄返自固植以遂子之欲姑使談者謂我言而中不猶愈乎送獨孤申叔侍從蜀本作親往河東序河東古吾土也家世遷徙莫能就緒聞其間有大河條山氣蓋關左文士往往仿佯臨望坐得勝槩焉吾固翹翹褰裳奮懷舊都日以滋甚獨孤生周人也往而先我且又愛慕文雅甚逹經要才與身長上聲志益强力挾是而東夫豈徒往乎溫凊奉引蜀本作親之隟必有美製儻飛以示我我將昜觀而待所不敢忽古之序者期以申導志義不為富厚而今也反是生至於晋出吾斯文於筆硯之伍其有評我太簡者愼勿以知文許之送內弟盧遵遊桂州序外氏之世德存乎古史揚乎人言其敦大朴厚尤異乎他族由遵而上五世為大儒兄弟三人咸為帝者師其風之流者皆好學而質重遵余弟子蜀本無子字也廣而不肆巽而不懾孝敬忠信之道拳拳然未嘗去乎其中蓋由其中出者也浸潤以詩易動搖以文采以余棄於南服來從余居五年矣未嘗見其行有悖乎義言有異乎行者則余之棄也適纍斯人焉以愛余而慰其憂思故不為京師遊以取名當世以桂之邇也而中丞之道光大多容賢者故洋洋焉樂附而趨以出其中之有夫如是則宜其集無其字奮翼鱗乘風波以遊乎無倪往哉其漸乎是行也送從兄稱罷選歸江淮詩序伯氏自淮陽從調抵於京師冬十月牒計不至攝袵而退顧謂宗元曰昔吾祖士師生於衰周與道同波為世儀表故直道而仕三黜不去孔氏稱之遺佚而不怨厄窮而不憫孟子贊之今吾遑遑末路寡偶希合進不知嚮退不知守所不敢折其志戚其心遵祖訓也然而闕滫瀡之養乏庾釜之畜逼迸無成東轅淮湖雖欲脫細故於胸中味道腴於舌端勉修厥志懼不恆久子當慰我窮局之懷袪我行役之憤博之以文發於詠歌吾非子之望將誰望焉宗元冉拜曰夫聞善不慕與聾聵同見善不敬與昏瞽同知善不言與嚚瘖同則聞之先逹久矣矧吾兄有柔懦之茂質恢曠之𢎞量敢無敬乎有述祖之美談安道之貞節敢無慕乎覩徽容而敬聞嘉話而慕敢無言乎言不稱德文不盡志適為纍而已矣於是賦而序之繼其聲者列於左凡五十七首遂命從姪立序集無序字編為後序終焉送從弟謀歸江陵序吾與謀由髙祖王父而異謀少吾二嵗往時在長安居相邇也與謀皆甚少獨見謀在衆少言好經書心異之其後吾為京兆從事謀來舉進士復相得益知謀盛為文辭通外家書一冉不勝懼祿養之緩棄去為廣州從事復佐雍州連得薦舉至御史後以智免歸家江陵有宅一區環之以桑有僮指三百有田五百畝樹之穀藝之麻養有牲出有車無求於人日率諸弟具滑井豐柔視寒燠之宜其隟則讀書講古人所謂集作為求其道之至者以相勵也過永州為吾留信次具道其所為者凡士人居家孝悌恭儉為吏祗肅出則信入則厚足其家不以非道進其身不以茍得時退則退尊老無井臼之勞安和而益夀兄弟衎衎以相友不謀食而食給不謀道而道顯則謀之去進士為從事於逺始也吾疑焉今也吾是焉别九嵗而㑹於此視其貌益偉問其業益習叩其志益堅於呼吾宗不振久矣識者曰今之世稍有人焉若謀之出處庸非所謂人歟或問管仲孔子曰人也謀雖不識於管仲其集有於字為道無悖亦可以有是名也抑又聞聖人之道學焉而必至謀之業良矣而又增焉志專矣而又若不足焉孔子之門不道管晏則謀之為人也其可度哉吾不智觸罪擯越楚間六年築室茨草為圃乎湘之西穿池可以漁種黍可以酒井終為永州民又恨徒費祿食而無所答下愧農夫上慙王官追計往時咎過日夜反覆無一食而安於口平於心若是者豈不以少好名譽嗜味得毒而至於是耶用是愈賢謀之去進士為從事以足其家終始孝悌今雖集有欲字羡之豈復可得謀在南方有令名其所為日聞於人吾恐謀不幸又為吾之所悔者將已之而不能得可若何然謀以信厚少言畜集作蓄其志以周於事雖履吾跡將不至乎吾之禍三字蜀本作吾之所悔者則謀何悔之有茍能是雖至於大富貴又何栗耶振吾宗者其惟望乎爾送僧浩初序儒者韓退之與余善嘗病余嗜浮圖言訾余與浮圖遊近隴西李生礎自東都來退之又寓書罪余且曰見送元生序不斥浮圖浮圖誠有不可斥者往往與易論語合誠樂之其於性情昭集作奭一作然不與孔子異道退之好儒未能過楊子楊子之書於莊墨申韓亦一作皆有取焉浮圖者反不及莊墨申韓之怪僻險賊耶曰以其夷也果不信道而斥焉以夷則將友惡來盜跖而殘一作賊季札由余乎非所謂去名求實者矣吾之所取者與易論語合雖聖人復生不可得而斥也退之所罪者其跡也曰髠而緇無夫婦父子不為耕農蠶桑而活乎今集作人若是雖吾亦不樂也退之忿其外而遺其中是知石而不知韞玉也吾之所以嗜浮圖之言以此與其人遊者非不能通其言也且凡為其道者不愛官不爭能樂山水而嗜閒安者為多吾病世之逐逐然唯印組為務以相軋也則舍是其焉從吾之好與浮圖遊以此今浩初閒其性安其情讀其書通易論語唯山水之樂有文而文之又父子咸為其道以養而居泊焉而無求則其賢於為莊墨申韓之言而逐逐然唯印組為務以相軋者其亦逺矣李生礎與浩初又善今之往也以吾言示之因北人寓退之視何如也送濬上人歸淮南覲省序金仙氏之道蓋本於孝敬而後積以衆德歸於空無其敷演教戒於中國者離為異門曰禪曰法曰律以誘掖迷濁世同集作用宗奉其有修整觀行尊嚴法容以儀範於後學者以為持律之宗焉上人窮討祕義發明上乘奉威儀三千雖造次必備嘗以此道宣於江湖之人江湖之人悅其風而受其賜攀慈航望彼岸者蓋千百計天子聞之徴至闕下御大明祕殿以問焉導揚本教頗甚稱㫖京師士衆方且翹然仰大雲之澤以植德本而上人不勝顧復之恩退懷省侍之禮懇迫上乞還集無此字遂無以奪由是杖錫東顧振衣晨征右司員外郎劉公深明世典通逹釋教與上人為方外遊始榮其至今惜其去於是合郎署之友詩以貺之退使孺子執簡而序之因繫其辭曰上人專於律行恆久彌固其儀刑後學者歟誨于生靈觸類蒙福其積衆德者歟覲于髙堂視逺如邇其本孝敬者歟若然者是將心歸空無捨筏登地固何從而識一作議之乎古之贈禮必以輕先重故鄭商之犒先乘韋魯侯之贈後吳鼎今餞詩之重皆衆集作後吳鼎也故乘韋之比得序而先之且曰由禮而不敢讓焉送琛上人南遊序佛之跡去乎世久矣其留而存者佛之言也言之著者為經翼而成之者為論其流而來者百不能一焉然而其道則備矣法之至莫尚乎般若道集作經之大莫極乎集作於涅槃世之上士將欲由是以入者非取乎經論則悖矣而今之言禪者有流蕩舛誤迭相師川妄取空語而脫略方便顚倒真實以陷乎已而又陷乎人又有能言體而不及用者不知二者之不可斯須離也離之外矣是世之所大患也吾琛則不然觀經得般若之義讀論悅三觀之理晝夜服習而身行之有來求者則為講說從而化者皆知佛之為大法之為廣菩薩大士之為雄修而行之者蜀本作者之為空蕩而無之者蜀本作者之為礙夫然則與夫增上慢者異矣異乎是而免斯名者吾無有也將以廣其道而被於逺故好遊自京師而來又南出乎桂林未知其極也吾病世之傲逸者嗜乎彼而不求乎此故為之言送元皓師序中山劉禹錫明信人也不知人之實未嘗言言未嘗不讎元皓師居武陵有年數矣與劉遊久且昵持其詩與引而來余視之申申其言勤勤其思其為知而言也信矣余觀近世之為釋者或不知其道則去孝以為逹遺蜀本作遣情以貴虛今元皓衣粗而食菲病心而墨貌以其先人之葬未返其土無他集無他字族屬以移其哀行求仁者以冀終其心勤而為逸逺而為近斯蓋釋之知道者歟釋之書有大報恩七篇咸言由孝而極業世之蕩誕慢訑者雖為其道而好違其書於元皓師吾見其不違且與儒合也元皓陶氏子其上為通侯為髙士為儒流集作儒先蜀本作儒先生資集作見其儒故不敢忘孝跡其髙故為釋承其侯故能與逹者遊其來而從吾也觀其為人益見劉之明且信故又與之言重蜀本有叙字其事送賈山人南遊序傳所謂學以為已者是果有其人乎吾長京師三十三年遊鄉黨入太學取禮部吏部科校集賢祕書出入去來凡所與言無非學者蓋不啻百數然而莫知所謂學而為已者及見逐於尚書居永州刺栁州所見學者益稀少常以為今之世無是决也居數月長樂賈景集作宣伯來與之言邃於經書博取諸史羣子昔之為文章者畢一作必貫統言未嘗詖行未嘗怪其居室愔然不欲出門其見人侃蜀本作侃侃而肅召之仕怏然不喜導之還中國視其意夷夏若均莫取其是非曰姑為道而已爾若然者其實為已乎非已乎使吾取乎今之世賈君果其人乎其足也則居其匱也則行行不茍之居不苟容以是之於今世其果逃於匱乎吾名逐祿貶言見疵於世余集無余字奈賈君何於其之也即其舟與之酒侑之以歌歌曰充乎已之居或躓其塗匱乎已之虛或盈其廬孰匱孰充為泰為窮君子烏乎取以寧其躬若君者之於道而已爾世孰知其從容者耶送元十八山人南遊序太史公嘗言世之學孔氏者則黜老子學老子者則黜孔氏道不同不相為謀余觀老子亦孔氏之異流也不得以相抗又况楊墨申商刑名縱橫之說其迭相訾毁抵牾而不合者可勝言耶然皆有以佐世太史公沒其後有釋氏固學者之所怪駭舛逆其尤者也今有河南元生者其人閎曠而質直物無以挫其志其為學恢博而貫統數無以躓其道悉取向之所以異者通而同之搜擇融液與道大適咸伸其所長而黜其竒邪要之與孔子同道皆有以㑹其趨而其器足以守之其氣足以行之不以是道求合於世常有意乎古之守雌存雄者及至是邦以余道窮多憂而嘗好斯文留三旬有六日陳其大方勤以為諭余始得其為人今又將去余而南歷營道觀九疑下灕水窮南越以臨大海則吾未知其還也黃鵠一去青冥無極安得不馮豐隆訴飛亷以寄聲於寥廓耶送班孝亷擢第歸東川覲省序隴西辛殆庶猥稱吾文冝叙事晨持縑素以班孝亷之行為請且曰夫人殆所謂吉士也願而信質而禮言不黷慢行不進越其先兩漢間繼修文儒世其家業其風流後𦙍英華作裔避諱耽學篤志之士往往出於其門今夫人研精典墳不告劬勩屬者舉鄉里登春官獲居其甲焉家於蜀之東道其嚴君以客卿之位贊是方嶽為大夫良今將拜慶寧覲光耀族屬是其可歌也道出於南鄭外王父以將相之重九命赤社為諸侯師今又將征集作亟駕省謁從容燕喜是又可歌也故我與河南獨孤申叔趙郡李行純行敏等若干人皆歌之矣若乃序者固吾子宜之栁子曰吾嘗讀王命論及漢書嘉其立言彼生彪固之胄歟相國馮翊王公功在社稷德在生人其門子遊文章之府者吾嘗與之齒彼生嚴氏之出歟承世家之儒風沭外族之休光彼生專聖人之書而趨君子之林宜矣哉遂如辛氏之談濡翰於素因寓於辭曰為我謝子之舅氏珠玉將至得無修容乎送嚴公貺下第歸與化覲省詩序嚴氏之子有公貺者退自有司踵門而告栁子曰吾獻藝不售於儀曹之司集無司字賈貨不中度敢逃其咎詰朝將行願聞所以去我者其可乎哉余諭之曰吾子以冲退之志端其趣嚮以淬礪之誠修其文雅行當承教戒於獨立之下濬發清源激揚洪音沛哉鏗鏗乎充於集作于四體之不暇吾何敢去子恭唯相國馮翊公有大勳力盈於旗常極人臣之尊分天子之憂殿邦坤隅柄是文武若子者生有黼繢梁肉之美不知耕農之勤勞物役之艱難趨其庭有魏絳之金石焉候其門有亞夫之􅙶㦸焉中人處之不能無傲而子之伯仲皆脫略貴美服勤儒素退託於布衣韋帶之任如少習然故繼登上科以及於子是可舉嚴氏之教誦乎他門使有矜式也而吾子又引慝內訟撝謙如此其何患乎賈之不售而自薄哉於是文行之逹者若髙陽齊據者偕賦命余序引余朴不曉文故書嚴子之嘉言編於其集作右簡竊褒貶興國本作字之義以贈送蔡秀才下第歸覲序僕之始貢於京師蓍者卦之曰是所謂望而未覩隱而未見曭乎逺而有榮者也今兹嵗在鶉首若合於夀星其果合也集作乎僕時悒然遲之謂其誕慢怪迂是將不然然而僅置於懷耳未克决而忘之也後果依違遷就四進而獲卒如其言云噫彼莫莫者其有宰於人乎不然何應其集作其應前定若是之彰集作章明也今蔡君馳聲耀譽聞於公卿戰藝之徒推為先登而五就鄉舉往則見罷意者前定之期殆未及歟故君子之居易俟命樂天不憂者果於自是也君其勵文學焉丈人牧人南邦君展覲承顔婆娑愈樂之暇則充其經笥茂是文苑時焉逃哉遲速之事則瞽史之任吾不及知文苑英華卷七百三十二
