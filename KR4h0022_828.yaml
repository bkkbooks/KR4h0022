body:
  text: 文苑英華卷八百二十九宋李昉等編宴遊七池下閩城開新池記一首小池記一首竹養竹記一首植竹記一首􅜩竹記一首山石附東山記一首慧山寺家山記一首太湖石記一首池下閩城開新池記沈亞之閩城吻海而𣲖江輔山以居先時無安沼平地為遊舟娛席之地而姹花嫋竹散生擲華故酒笑酣視之晨而佳思莫極矣及高平公牧察之餘疑作余乃經度隙空之所因卑汙壍而岸之浦嶼環廻之勢所造必勝羣山左右寫影浮秀者輳空而入十一月辛卯新池成明日軍副亞之疾間公延䕶軍及羣從事絃工吹師裾袖之曹逰池而酒既坐謂軍副亞之曰吾疏汙隙以就此而海波朝夕盈來之候逓輪足給必集作以為我狀而石之以期乎不朽軍副者亞之不敢讓遂執巵俯船祭酒於其流因祝且詞曰水能濁清首冠五行波流已大有神為宰環塘盈瑩集作縈縈為公藻鏡新流泱泱與地興祥集作詳嘉鯉鮐魴于水息昌嚵鮞嘘虺即水與死翡翠鵁鶄浴涘眠晴辛蒲翦翦扇荷擎擎時未云來勞思乃馨柘槿紺竹滲縮醉集作醖沃延榮接姿以水為禄輔佑堙隍吐孕百福惟我公之明之通之智之忠保夀考兮與池之無窮軍副者亞之詞既復再拜跪巵奉夀于公前公大喜還列就坐以酒以歌入而起小池記楊䕫𢎞農子始卜居于前溪得地數畝構草堂竹齋植修篁竹齋之前有地周三十步因命僕執鍤穴為池焉逗前溪餘𣲖以漲之流或時涸則汲井以滿環池樹菊及諸菜果可以左右爼机者暇則散襟曳笻脩吟自怡或從風微瀾或因雨暗溢則江湖之思滿目矣𢎞農子性潔不喜淆雜故一卉一木爽静在眼前池之上未嘗許片葉寸梗頃刻浮泛以是耕僮頗厭其役客有知者誚其勤懇跬步之地何所禆哉廣不袤丈深不逾雉竭其水不足以澤生物窮其深不足以安龜鱉無蒲藻以潛其魚無波瀾以方其舟孜孜矻矻虚耗僮力言未訖𢎞農子舉頥而荅曰爾以此小而無用乎以其潔而魚鱉不宅乎以其狹而舟艥非便乎吾豈不欲深及于淵以滋液畦圃耶豈不欲周植其蒲以繁育魚蝦耶豈不欲廣導其流以乗風沿泝耶吾恐一作欲利于生植其一作則見乎疏决無窮矣聚夫鱗甲則動夫竭澤之魚一作愚矣凑其舟艥則起夫濟涉之争矣矧夫植其物則有薋菉以盗其澤者叢其藻則有虺蜮以附其伏者利其濟則有重載以掇其溺者嘻水之利也衆矣其害也亦深矣故吾所以獨㓗此沼亦以鏡其心也将欲撓之而愈明揚之而不波决之而不流俾吾性終始對此而不渝豈效夫瀦其水以豢鱗蓄介為艬一作嚵潛之備亦曰池而已矣竹養竹記白居易竹似賢何哉竹本固固以樹徳君子見其本則思善建不㧞者竹性直直以立身君子見其性則思中立不倚者竹心空空以體道君子見其心則思應用虚受者竹節貞貞以立志君子見其節則思砥礪名行夷險一致者夫如是故君子人多樹之為庭實焉貞元十九年春居易以㧞萃選及第授校書郎始于長安求假居處得長樂里故關相公文粹集本作國私第之東亭而處之明日履文粹作屨及于亭之東南隅見叢竹于斯枝葉殄瘁無聲無色詢于關氏之老則曰此相國之手植者自相國捐舘他人假居由是筐篚者斬焉篲箒者刈焉刑餘之材長無尋焉數無百焉又有凡草木雜生其中苯䔿薈蔚文粹菶茸薈欝有無竹之心焉居易惜其嘗經長者之手而見賤俗人之目翦棄若是本性猶存乃芟翳薈除糞壤疏其間封其下不終日而畢于是日出有清隂風來有清聲依依然欣欣然若有情於感遇也嗟乎竹植物也於人何有哉以其有似于賢而人猶愛惜之封植之况其真賢者乎然則竹之于草木猶賢人于衆庶嗚呼竹不能自異惟人異之賢不能自異惟用賢者異之故作養竹記書于亭之壁以貽其後之居斯者亦欲以聞于今之用賢者云植竹記劉嚴夫秋八月劉氏徙竹凡百餘本列于室之東西軒泉之南北隅克全其根不傷其性載舊土而植新地煙翠靄靄寒聲蕭然適有問曰樹椅桐可以代琴瑟植樝棃可以代甘實茍愛其堅貞豈無松桂也何不雜列其間也答曰君子比徳于竹焉原夫勁本堅節不受霜雪剛也緑葉萋萋翠筠浮浮柔也虚心而直無所隠蔽忠也不孤根以挺聳必相依以林秀義也雖春陽氣王終不與衆木鬬榮謙也四時一貫榮衰不殊恒也垂蕡實以遲鳳樂賢也嵗擢筍以成幹進徳也及乎将用則裂為簡牘于是寫詩書彖象之命留示百代微則聖哲之道墜地而不聞矣故後人又何所宗歟至若鏃而箭之插羽而飛可以征不庭可以除民害此文武之兼用也又劃而破之為篾席敷之于宗廟可以展孝敬截而穴之為箎為簫為笙為簧吹之成虞韶可以和神人此禮樂之並行也夫此數徳可以配君子故巖夫列之于庭不植他木欲令獨擅其羙且無以雜之乎竊懼來者之未諭故書曰劉氏植竹記􅜩音果割也竹記劉寛夫左史院邇一作近宸居之正地值日華之東偏俗塵不飛人意自逺閟䆳幽閴似次一作非是官曹有竹一叢翠接階所其虚中㓗外之操隂一作䕃座祛煩之能紫微郎髙公嘗賦之固以備盡然而嵗月滋久蔓衍浸滛大小相依髙下叢茂俾日光不透隂氣常凝暝色為之早來陽春為之减煦四序不正一庭常昏蚊䖟曹飛雀鷃自遂披圖散帙觀覽不快二年冬侍軒之暇載筆之餘偶步庭除病其蔽翳因命斤斧將治其蕪沉吟即時乃用申誡且謂其徒曰礪爾器用端爾瞻視謹爾操執慎爾區分有其質微而葉環苯䔿者去之從風而不能自正者去之大而倚者去之聚而曲者去之竅而不能備笙簧之用者去之挺而不能棲鸞鳳者去之其有群居不亂獨立自持振風發屋不為之傾大旱乾物不為之瘁堅可以配松柏勁可以凌雪霜宻可以泊晴煙疎可以漏霄月嬋姢可玩勁挺不廻者爾其保之既而芟剪成一作畢功繁蕪立盡去者存者邪正乃分不浹旬扶疎一林歴歴可見有清風澡慮之效無蔽二字一作噭日萌奸之機檀欒風生韻合宫徴君子是以知竹箭之羙尚科别之功即其他不俟言而詳矣或以斯為小可以伸之因記一時之妙廣一作筆而述之山石附東山記韋夏卿自江之南號為水鄉日月掩藹陂湖蕩漾㳺有魚鱉翔有鳬鴈涉之或風波之懼望之多煙雲之思自朱方逹於震澤三百里而遥惟毗陵地髙林麓相望丘陵塠阜隠嶙蟬聨雖有崖㟧之形終無峻極之状封域之内罕一作穿名山焉有唐良二千石獨孤公之蒞是邦也人安俗阜三一作二稔於兹文為宗師政號清浄有仁智山水之樂有風流遐曠之懐如獨鶴唳天孤雲出岫想見其人也公嘗言謝公東山亦非名岳茍林巒興逺丘壑意深則一拳之多數仞為廣矣由是於近郊傳舎之東得崇丘浚壑之地密林修竹森蔚其間白雲丹霞照耀其上使登臨者能賞逰覽者忘歸我是以東山定一作之號始於中峰之頂建茅茨焉出雲木之髙標視湖山如屏障城市非逺幽聞鳥聲軒車每來静見水色復有南池西舘宛如方丈瀛洲秋有一作發芰荷春生蘋藻晨光炯曜夕月澄虚信可以曠髙士之襟懐發詩人之歌詠也自公之往清風寂寥野獸恒㳺山禽每萃不轉之石斯固勿伐之木惟喬而繼守數公實皆朝彦雖下車必理或周月而遷志在葺修時則未暇貞元八年余出守是邦迨今四載政成訟簡民用小康永懐前賢屢陟兹阜芟薈蘙而松桂出夷坎窞而溪谷通不改池臺唯雜風月東山之賞實中興哉於是加置四亭合為五一作四所瞰野望山者位正背林面水者勢髙籩斚區陳賔寮有位琴碁間作簫管時聞從我之逰者咸遇其勝也嘗以水通舟檝陸阻車徒端徑術於通津翦樛蕪於廻野凡五六里抵於亭之南植山松以作門樹官栁以界道蟠麾旄於原上騁騏驥於途中又有塞門壠坂之意也懿乎創物垂名俾傳來者登山臨水每想古人亦何謝石門林泉峴首風景而已矣為文斵石於彼山阿時貞元十一年嵗在乙亥九月九日記慧山寺家山記李濬金陵之屬郡毗陵南無錫縣有佛寺曰慧山乃濬家山也貞元元和中先丞相太尉文肅公心寜色養家寓是縣因肄業於慧山始年十五六至丙戍嵗擢第歸寜為朱方强㽞之文肅公窺畏常警切於旦夕之間李庶人以反狀聞嘗召公草不順章檄公語以君臣父子忠孝誠節别白自古道理者約千餘言言既勁勇庶人畏敬又逼以狂卒圍以兵刃促公下筆振叱數四髪皆見怒狀庶人因令閉之於别所命許縱成之是夜張子良裴行立共義公忠赤果相與易圗庶人兵敗公以忠節聞於天下新帥李公元素欲具事表於朝廷公三讓之遂退歸慧山寺僧房猶孜孜勤經史洎十年手寫書籍前後約五百軸寺山之泉獨稱竒能發諸茗顔色滋味公僻居含飲雖崇貴未甞輒自優奉惟輦載慧山泉數千里不問其費耗公文學官業功徳濬謹纂敘制詔章表堂状類例其間不敢輙以文飾表至敬也為上下卷今藏史閣我家之盛甞二為相三為史官髙祖中書令謚文憲儀鳳中為中書令如意中為鸞臺副相即濬髙祖叔先公丞相贈太尉謚文肅㑹昌中為左僕射門下相儀鳳在相監修國史㑹昌在相監修國史乾符四年濬自秘書省校書郎為丞相榮陽公獨狀奏入直史舘㑹已亥嵗春有事白相府乞假東出函谷關數千里夏五月癸卯過家出覩舊刻石詩題别無碑版叙録懼年祀寖逺不得布聞於人謹以史筆條敘於寺之正殿内時乾符六年夏五月十六日甲辰書太湖石記白居易集無古之逹人皆有所嗜𤣥晏先生嗜書嵇中散嗜琴靖節先生嗜酒今丞相竒章公嗜石石無文無聲無臭無味與三物不同而公嗜之何也衆皆恠之我獨知之昔故友李生名約有云茍適吾意其用則多誠哉是言適意而己公之所嗜可知之矣公為文粹作以司徒保釐河洛治家無珍産琴身無長物惟東城置第南郭營一墅精葺宫宇慎擇賔客道文粹作性不茍合居常寡徒㳺息之時與石為伍石有族聚太湖為甲羅浮天竺之徒次焉今公之所嗜者甲也先是公之寮吏多鎮守江湖知公之心惟石是好乃鈎深致逺獻瑰納竒四五年間纍纍而至公於此物獨不㢘讓東第南墅列而置之富哉石乎厥状非一有盤抝秀出如靈丘鮮雲者有端儼挺立如真官神人者有縝潤削成如珪瓚者有㢘稜銳劌如劍㦸者又有如虬如鳯若跧若動将翔将踴如鬼如獸若行若驟将攫将鬭者風烈雨晦之夕洞穴開􅥾若斂雲歕雷嶷嶷然有可望而畏之者煙霽景麗之旦巖㟧霮䨴若拂嵐撲黛靄靄然有可狎而玩之者昏曉之交名状不可撮要而言則三山五岳百洞千壑覼縷簇縮盡在其中百仞一拳千里一瞬坐而得之此所以為公適意之用也常與公逼觀熟察相顧而言豈造物者有意於其間乎将胚渾凝結偶然而成功乎然而自一成不變已來不知㡬千萬年或委海隅或淪湖底髙者僅數仞重者殆千鈞一旦不鞭而來無脛而至争竒騁恠為公眼中之物公又待之如賔友親之如賢哲重之如寳玉愛之如兒孫不知精意有所召也文粹作耶将尤物有所歸耶孰不為而來耶必有以也石有大小其數四等以甲乙丙丁品之每品有上中下各刻於石之隂曰牛氏石甲之上丙之中乙之下噫是石也百千載後散在天壌之内轉徙隠見誰復知之欲使将來與我同好者覩斯石覽斯文知公之嗜石之自㑹昌二年五月癸文粹作丁丑日記文苑英華卷八百二十九
