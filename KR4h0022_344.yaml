body:
  text: 文苑英華卷三百四十四宋李昉等編獸馬十首牛二首犀一首虎一首豹一首羸駿篇喬知之噴玉長鳴西北來自言當代是龍媒萬里鐡關行入貢九重金闕一作門為君開蹀躞朝馳過上苑䟃𧽼瞑走發章臺玉勒金鞍荷裝飾路傍觀者無窮極小山桂樹比權竒上林桃花况顔色忽聞天將出龍沙漢主持將駕鼓車去去山川勞日夜遙遙關塞斷煙霞山川關塞十年征汗血流離赴月營肌膚銷逺道膂力盡長城長城日夕苦風霜中有連年百戰場搖珂齒勒金羈盡爭鋒足頓鐡菱傷垂耳罷輕齎棄置在寒溪大宛蒲海北滇壑舊一作雋巖西沙平留緩步路逺暗頻嘶從來力盡君須棄何必尋途我已迷嵗嵗年年奔逺道朝朝暮暮催疲老扣冰晨飲黃河源拂雪夜食天山草楚水檀溪征戰事吳塞烏江辛苦地持來報主不辭勞宿昔立功非重利丹心素節本無求長鳴向君君不留秪應漫一作澶漫歸田里萬里低昻任生死君王儻若不見遺白骨千金猶可市沙苑行杜甫君不見左輔白沙如白集作白如水繚以周墻百餘里龍媒昔是渥窪生汗血今稱獻於此苑中騋牝三千匹豐草青青寒不死食之豪健西城無每嵗攻一作收駒冠邉鄙王有虎臣司苑門入門天廄皆雲屯驌驦一骨獨當御春秋二時歸至尊至尊內外馬盈億伏櫪在坰空大存逸羣絶足信殊傑倜儻權竒難具論纍纍塠阜藏奔突往往坡陀縱超越角壯翻騰麋鹿遊浮深簸蕩黿鼉窟泉出巨魚長比人丹砂作尾黃金鱗豈知異物同精氣雖未成龍亦有神老集作瘦馬行前人東郊老集作瘦馬使我傷骨骼硉兀如堵墻絆之欲動轉欹側此豈有意仍騰驤細看六印帶官字衆道三軍遺路傍皮乾剝落雜泥滓毛暗蕭條連雪霜去嵗奔波逐餘寇驊騮不慣不得將士卒多騎內廄馬惆悵恐是病乘黃當時厯塊誤一蹶委棄非汝能周防見人慘淡苦集作苦哀訴失主錯莫集作漢無精集作晶光天寒逺放鴈為伴集作侣日暮未集作不收烏啄瘡誰家且養願終惠更試明年春草長李鄠縣丈人胡馬行前人丈人駿馬名胡騮前年避賊集作胡過金牛回鞭却走見天子朝飲漢水暮靈州自矜胡騮竒絶代乘出千人萬人愛一聞説盡急難材轉益愁向駑駘輩頭上鋭耳批秋竹腳下高蹄削寒玉始知神龍一作龍神别有種不比集作似俗馬空多肉洛陽大道時再清纍日喜得俱東行鳯臆麟鬚集作龍髻未易識側身注目長風生駿馬歌集作驄馬行高都護驄馬行右二詩合入此卷歌行門而英華誤編在二百九卷樂府門今不重録驅馬篇戴皓神哉彼泰山五嶽專其名隆高貫雲霓嵯峨出泰清流六二候間此句疑高置十二亭上有涌醴泉玉石揚華英東北望吳野西望觀日精王者已歸天效厥元功成舞馬篇薛曜星精龍種競騰驤雙眼黃金紫艷光一朝逄遇升平代伏阜御圖事帝王我皇盛德苞六羽俗泰時和虞石拊昔聞九伐有餘名山海經夏后啓舞九代馬伐疑是代字今日百獸先來舞鈎陳周衛儼旌眊鍾鏄陶匏聲殷地承雲嘈噆駭日靈調露鏗鈜動天駟若麟螭躡景追風忽見知咀銜拉鐡並權竒被服雕章何陸離紫玉鳴珂臨寶鐙青絲綵絡帶金羈隨歌鼓而電一作霓非驚逐九劔而飈馳態聚􅘠普胡切馬蝶迹還急驕凝驟不移光敵白日下氣擁緑煙垂婉轉盤珊殊未已懸空步驟紅塵起驚鳬翔鷺不堪儔矯鳯回鸞那足擬蘅垂桂裊香氛氲長鳴汗血盡浮雲不辭辛苦來東道秪為簫韶朝夕聞閶闔間一作門玉臺側承恩煦兮生光色鸞鏘鏘車翼翼偹國容兮為戎飾充雲翹兮天子庭荷日用兮情無極吉良乘兮一千嵗神是一作芝得兮天地期大易占云南山夀䟃𧽼共樂聖明時望雲騅馬歌并序元稹德宗皇帝以八馬幸蜀七馬道斃唯望雲騅來往不頓貞元中老死天廄臣稹作歌以記之憶昔先皇幸蜀時八馬入谷七馬疲肉綻筋攣四蹄脫七馬死盡無馬騎天子蒙塵天雨泣巉巖道路淋漓濕峥嶸白草眇難期􅢽洞黃泉安可入白草􅢽洞並駱谷中地名古諺云􅢽洞入黃泉朱泚圍兵抽未盡懷光冦騎追行及嬪娥相顧倚樹啼鵷鷺無聲仰天泣圉人不疑進望雲騅衫色一作袍衫憔悴衆馬欺上前噴吼如有意耳尖卓立節踠竒君王試遣回胸臆撮骨鋸牙駢兩肋蹄懸四距脛顆方胯竦三山尾扶直圉人畏誚仍相感此馬無良空有力頻頻齧掣轡難施往往跳趫騎集作鞍不得色沮聲悲仰天訴天不遣言君未識亞身受取白玉鞍集作羈開口銜將紫金勒君王自此方敢騎似遇良臣久悽惻龍騰魚鱉咸震集作踔然驚驥眄驢騾少顔色七聖心迷運方厄五丁力盡路猶窄駱駝山上斧刃堆望秦嶺下錐頭石五六百里真符縣八十四盤青山驛掣開流電有輝光突過浮雲無朕迹地平隘集作險盡施黃屋九九屬車十二纛齊映前導引騅頭嚴震迎號抱騅足路傍垂白天寶民望騅禮拜見騅哭皆云集作言元宗當時無此馬不免騎騾來幸蜀雄雄猛將李令公收城殺賊豺狼空天旋地轉日再中天子却坐明光宫朝廷無事忘征戰校獵朝回暮毬宴御馬齊登擬用槽廄中號乘輿之副曰擬用槽君王自試宣徽殿圉人還進望雲騅性強步濶無方便分鬃擺𬒮集分騣作擺杖頭太髙擘肘回顱集作頭項難轉人人共惡難回跋潛遣飛龍減芻秣金集作銀鞍繡韂不復施空盡兹引切天年御槽活當時鄙諺已有云集作言莫倚功能集作高浪開濶登山縱似望雲騅平地須饒紅兒驋集作撥長安三月花垂草果下翩翩紫騮好千官暖熱李令間百馬生獰望雲老望雲騅爾之種類世世竒當時項王乘爾祖分配英雄集作豪稱霸主爾身今日逄聖人從幸巴渝歸入秦功成事遂身退天之道何必隨羣逐隊到死踏紅塵望雲騅用與不用各有時爾勿悲瘦馬行李端城傍牧馬驅未過一馬徘徊起還卧眼中有淚皮有瘡骨毛焦瘦令人傷朝朝放在兒童手誰覺舉頭看故鄉往時漢地相馳逐如雨如風過平陸豈意今朝驅不前蚊蚋滿身泥上腹路人識是名馬衰一作兒疇昔三軍不得騎玉勒金鞍既已過追奔獲獸有誰知終身櫪上食君草遂與駑駘一時老使伯長鳴隴上風猶期一戰安西道放牛歌陸龜蒙見集本江草秋窮似秋半十角吳牛放江岸鄰肩抵尾乍依偎橫去斜奔忽分散荒陂斷塹無端入背上時時孤鳥立日暮相將帶雨歸田家煙火微茫濕官牛白居易官牛官牛駕官車滻水岸邉驅集作般載沙一石沙幾斤重朝駕集作載暮載將何用載向五門官道西緑槐隂下填集作鋪沙堤昨來新拜右丞相恐畏泥深集作恐怕泥塗汙馬蹄右丞相馬蹄踏沙雖淨潔牛領牽車欲流血右丞相但能濟人理國調隂陽官牛領穿亦無妨馴犀貞元丙子嵗南海獻馴犀詔納苑中至十三年冬大寒馴犀死白居易馴犀馴犀通天犀軀貌駭人角駭雞海蠻聞有明天子驅犀乘傳來萬里一朝得謁大明宫歡呼拜舞自論功五年馴養始堪獻六譯語言方得通上嘉人獸俱來逺蠻館四方犀入苑秣以瑤芻鎖以金故鄉迢遞君門深海鳥不知鐘鼓樂池魚空結江湖心馴犀生處南方熱秋無白露冬無雪一入上林三四年又逢今嵗苦寒月飲氷臥霰苦踡局角骨凍傷鱗甲縮馴犀死蠻童集作兒啼向闕再拜顔色低奏乞生歸本國去恐身凍死似馴犀君不見建中初馴象生還故集作放林邑建中元年詔盡出苑內馴象放歸南方君不見貞元末馴犀凍死蠻兒泣所嗟建中異貞元象生犀死何足言南陽小將張彥硤口鎮稅人場射虎歌韋莊海內昔年狎太平橫目穰穰何崢嶸天生天殺豈天怒忍使朝朝餵猛虎關東驛路多丘荒行人最忌稅人場張彥雄特制殘暴見之叱起如叱羊鳴弦霹靂越幽阻往往依林猶旅拒草際旋看委錦茵腰間不更一作見抽白羽老叨已斃衆雛恐童稚揶揄皆自勇忠良效順勢亦然一劒猜狂敢輕動有文有武方為國不是英雄伏不得試徵張彥作將軍幾箇將軍願策勳臘日觀咸寧王部曲娑勒擒豹歌盧綸山頭曈曈日將出山下獵圍照初日前林有獸未識名將軍促騎無人聲潛形踠伏草不動雙雕轉旋羣鴉鳴隂方質子才三十譯語受詞蕃語揖捨鞍解甲疾如風人忽虎蹲獸人立歘然扼顙批其頥瓜牙委地涎淋漓既蘇復吼拗仍怒果叶英謀生致之拖自深叢目如電萬夫失容千馬戰傳呼賀拜聲相連殺氣騰陵隂滿川始知縛虎如縛鼠販虜降羌皆目覩一作在眼前祝爾嘉詞爾無苦獻爾將隨犀象舞苑中流水禁中山期爾攫摶開天顏非熊之兆度無極願紀雄名傳百蠻文苑英華卷三百四十四
