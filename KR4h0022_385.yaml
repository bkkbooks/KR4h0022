body:
  text: 文苑英華卷三百八十五宋李昉等編南省一左右僕射授蕭重俅一作惠休下同左僕射詔沈約門下尚書萬事之本隆替是寄總司頓闕宜速有人征虜將軍吳興大守建安縣開國子蕭重俅才學一作具淹通識裁詳允內著嘉庸外敷美政入副朝端僉議斯在可守尚書左僕射餘如故主者施行南史蕭惠休為僕射重俅恐誤授王亮左僕射詔門下朝端任重刑政一作禮斯出自非民望時宗莫諧兹舉通直散騎常侍吏部尚書領太子左衛率王亮器識夷逺風鍳清奧贊務釐朝庶績惟允宜崇名器以副具瞻可尚書左僕射主者速施行授劉幽求左僕射制蘇頲門下尚書佐理四方取則端揆成務百工是師非允具曕孰康庶績封州流人劉幽求風雲𤣥感川嶽粹靈學綜九流文窮三變義以臨事精能貫日忠以成謀用若投水茂勳立艱難之際嘉話盈啓沃之初存讜直以不回舊唐書作顧又作諛為姦邪之所忌釁萌頗露譛端潜後篇作發元宰見逐讒人孔多既誅唐書作殄羣凶方宣大化期問政於經始載登賢於夢卜可依舊金紫光祿大夫守尚書左僕射知軍國大唐書無大字事監修國史上柱國徐公仍依舊還實封七百户并賜錦衣一襲主者施行此篇四百四十八卷重出今已削去授李林甫右僕射制孫逖門下端揆之職官之師長宰輔之位朕之股肱有能兼領必在時傑光祿大夫吏部尚書兼集賢殿學士上柱國李林甫國之懿屬一作文有濟時之明略自委三事于兹九年大猷是經庶績惟叙使夫人登福夀俗致和平垂拱而化以臻于道蓋天之贊我亦時乃之休况矜慎有恆終始如一外無滿盈之色內秉謙卑之誠嵗寒彌堅夕惕彌厲褒德之義又何與之宜兼三綬之榮俾在百僚之首可尚書左僕射兼右相吏部尚書餘如故授李忠臣右僕射制常衮敕文昌所以法成象端右所以長庶寮秦漢則內掌武事魏晉或外綏戎政今之垣翰重任勤勞有功歷踐六卿始終一德必訪羣議然後當盛選淮西節度觀察處置等使開府儀同三司檢校工部尚書兼安州蔡州刺史御史大夫上柱國西平郡王李忠臣忠厚純茂信而可親寬肅靜深通而必正備五才之用有百勝之全往者冦蘖亂常關洛多故爰奮其旅以先啓行大城名都所麾必克元凶巨猾傳首相望定齊休士有建威之得雋破趙㑹食亦淮隂之用竒漢東汝南専制千里總三軍之號令兼八使之澄清約已撫人守集作道公遵職訓師以禮載寧於戎閫尤賦從薄繼入於王府四封不聳一紀于兹况忠衛之勳邦家是賴陜郊巡幸憂國存誠能釋位以勤王亦見危而致命疾風逾徑何日忘之申伯于藩自當褒勸韓侯入覲宜有寵光式是南宫俾崇禮秩可檢校尚書右僕射知省事餘並如故授崔圓左僕射制門下左右丞相師長庶官無人則缺詔德而授以其久次是有轉遷特進檢校尚書左僕射知省事兼楊州大都督長史御史大夫充淮南節度觀察處置等使上柱國崔圓山東偉才忠厚成性文髙大雅學富全經直道而行匪躬之故謀參經史節貫嚴凝嘗决議於廟堂早書勳於王府外綏戎政久鎮名都苦心恤人精力勤職圗艱思昜適要除煩敦風化而少長有禮齊法令而軍戎知禁正身不渝奉上彌恪有大賂南金之貢有浮泗逹河之漕事多𢎞濟人不疲勞淮海晏然朕實毗倚寵章所以褒善大任所以寄賢俾升禮秩無替成命可檢尚書左僕射餘並如故主者施行授令狐彰右僕射制敕中臺萬事之㑹端右庶僚之式所以總詳參二恢演協宣勳德兼崇則殊在師長之重勤勞於外則不親損益之煩凡命此官必書於冊極兹朝選用屬時賢滑亳等州節度使開府儀同三司檢校工部尚書持節滑州諸軍事兼滑州刺史御史大夫上柱國霍國公令狐彰腹心純臣忠允明亮有張仲孝友之行有吉甫文武之才秉其直方資以簡厚早擅韜略尤工墨妙艱危致命出入勤王中興之勳羣帥難尚雖驃騎之北至髙闕淮隂之東下井陘積事度長抗衡集作行異代自受任千里疆于兩河靖安軍戎肇正封域𢎞布風教宣明憲章優禮意於文吏洽仁化於氓俗息馬論道讓其保塞之勞愛人省刑守我中朝之典載修職貢以奉京師頃者復彼河流省其役費除歷年之所病匪踰月而成功開濟良謀東藩是賴不忘利國益見深衷豫嘉乃休朝有明勸念齊侯之勞賜同申伯之封賞厚其禮秩允答奉公可檢校尚書右僕射餘並如故授田神功右僕射制門下萬事之本歸於司㑹百僚之師屬我端右所以綜詳名實參二紀綱詔德選勞於是乎在開府儀同三司檢校兵部尚書使持節汴州諸軍事兼汴州刺史御史大夫充汴宋等州節度使上柱國信都郡王田神功忠敬孝友寬厚深集作沉毅經之以詩書緯之以韜略言能顧行勇必體仁信義不愆於風雨知謀自叶於蓍蔡早膺戎寄式是師貞有决勝合變之竒有明賞必罰之當精貫白日氣陵髙秋馭集作友盧龍之軍萬夫觀政集作萬里橫海討淮夷之叛一戰平吳統制濟河懋昭聲績往以犬戎內􅀢華夏多虞入勤服勞扈逰能力忠衛社稷勳書甲令建牙移鎮在浚之郊守龜䝉鳬繹之險當曺宋齊魯之㑹牧人馭衆憂國奉公宣文教以布朝章訓武經以明軍法修職貢之禮率先閫外通轉輸之利益贍關中疆宇不聳田萊加闢風俗澄一河南晏然夫以勳業之崇而等威未峻報功優異集作賢豈允僉屬固宜副文昌之長總周官之任仍兼連率益重方隅可檢校尚書右僕射兼充本道觀察處置使餘並如故主者施行授韓臯左僕射制元稹敕夫一邑之政而猶資老者之智用壯者之决况朝廷之大得不以耆年重望居表正之地儀刑於集作以儀刑百辟乎惟爾金紫光祿大夫檢校尚書右僕射兼吏部尚書韓臯始以直言事代宗皇帝司諌諍復以文章政術事德宗皇帝為舍人中丞京兆尹在順宗憲宗時出領藩方入備卿長逮豫小子歷事五君勤亦至矣而又處權近之際未嘗以恩幸自寵於一時當趨嚮之間終不以薄厚見窺於衆目豈所謂徐公之行已有常而詩人之風雨不改耶日者銓核羣才兼勞揆務頗煩倫擬有異優崇罷去職勞正名端右集作揆俾絶積薪之嘆且明尚齒之心凡百庶寮無忘咨禀可尚書左僕射餘並如故左右丞授劉知柔尚書右丞制蘇頲門下天臺管轄爰正紀綱人望僉宜方膺授受銀青光祿大夫行尚書户部侍郎上柱國彭城縣開國伯劉知柔時行推美舊德歸髙明暢襟情一作懷閒華風表蹈典墳之芳潤總詞賦之笙簧慮常密於在公迹自勤於為政萬人登數已聞書版之精六官揆才更俟彈珠之妙可行尚書右丞散官勳如故主者施行授源乾曜等尚書右丞等制黃門一轄之重百官取則茍非其人何以成務正議大夫行尚書户部侍郎上柱國安陽縣開國男兼御史中丞源乾曜清深密靜有彌綸之識正議大夫行紫微舍人上柱國倪若水剛正明斷有精核之才並果行育德以文飭吏事間逹舊章發揮大禮南臺執簡動中規模西掖揮毫舉成倫要必能主其禁令肅此綱維宜膺郗詵之寵更叶楊喬之拜乾曜可尚書左丞勳封如故若水可尚書右丞散官勳如故主者施行授陸景融尚書右丞等制孫逖門下紀綱中省贊二六卿稱職惟難任賢斯在榮陽郡太守陸景融等夙昭時望見重人倫修德行為本源用文章一作詞為潤飭清心雅道獨運虛舟敏識英才髙標利器著名滋久更事亦多天臺缺官廷議僉屬宜膺求舊之舉俾叶往諧之命可依前件授張紹貞尚書右丞制門下朝議大夫守益州大都督府長史持節劒南節度度支營田副大使知節度事兼採訪處置使攝御史中丞上柱國張紹貞中積溫惠外形嚴肅通才應物妙理為心亟踐方州咸推課最爰施密命且寄専征而紀綱一臺彌綸百事缺官斯久選衆尤難宜輟南轅用升右轄可尚書右丞散官勳如故授宋鼎尚書右丞等制門下紀綱一臺爰資右轄彌綸五教必擇亞卿通議大夫尚書刑部侍郎借紫金魚袋宋鼎雅操貞規為律人之器朝議大夫中守尚書工部侍郎上輕車都尉郭虛已通才敏識有成務之能並文行相資公忠自逹履周行而有裕在歷官而必聞柯葉不移芳馨可久宜允副於朝選俾遞遷於省闥鼎可守尚書右丞虛已可尚書户部侍郎散官各如故授崔翹尚書右丞制門下司㑹之府尤重於紀綱舉能而官必慎於名器太中大夫守河南一作東郡太守本道採訪處置使上柱國崔翹文儒纘業忠闕為狥公之節歷官滋久更事亦多南省缺員中朝選舊宜取才於攬轡更馳名於握管可守尚書右丞散官如故授徐浩尚書左丞制賈至勑中書舍人徐浩精潔惠和敏而好學有凌雲之詞賦兼臨池之翰墨祗勤直道厥德允修右掖司言已光綸綍南宫掌轄仍佇紀綱可兼尚書左丞授崔倫尚書左丞制常衮門下蘇武張騫使胸奴十餘嵗不失節而歸漢武不過典屬國騫拜中大夫而已朕每以勞大賞薄而流嘆也頃以昆夷之俗繼好勤誠不忘綏懷喻我文告乃命太中大夫前守太子右庶子兼御史中丞上護軍賜紫金魚袋崔倫宣明威惠撫柔西海言忠事直舉無二信臨大節而不奪匪謀身而茍免終能復命亦既序成使乎四方可謂專逹况躬服謨訓暢於詞律在天寶中已踐郎位選部草議至今稱之顧其階歷當處要重之地加之集作以盡悴服勤所宜超進總典綱紀歸於臺轄以倫才理精密練逹朝章俾參柄用佇明政本仍加榮級以勸勞臣可銀青光祿大夫行尚書左丞勳如故授張重光尚書左丞制門下國朝多以六卿之二出領三輔入必稍遷或復舊職不然則以左右轄處之中外迭居從其班列銀青光祿大夫前華州刺史兼御史大夫充鎮國軍及潼關防禦等使上柱國清河縣開國候張重光明道若昧大方無隅循一作修禮以節事體信以逹順罔有擇行在於厥躬其學既精其德亦厚可以質正大議和恆雅俗服在通列鬱其休聲周歷五曺之副建明萬事之本剖符關輔參化京師亦既政成且聞河潤紀綱臺務圗任舊人職無不綜佇有條理可行尚書左丞散官勳封如故主者施行授席豫尚書右丞等制徐安貞門下朝散大夫使持節鄭州諸軍事守鄭州刺史上柱國席豫等早升清禁備經推擇或政成大郡或績佇中朝可以秉於樞轄正之僕御副於內府亞以尹京各恭乃職允兹休命可依前件授庾承宣尚書右丞制白居易敕朝議大夫守尚書刑部侍郎驍騎尉庾承宣昔我太宗文皇帝嘗謂尚書丞百職綱維事一失中則天下有受其弊者因命戴胄魏徴及杜正倫劉洎輩繼領是職分居左右職集作官修事理人到於今稱之故吾前命崔從持左綱今命承宣操右轄衆口籍籍頗稱集作為得人况承宣端諒勤敏周知典故必能為我紐有條之綱抳妄動之輪坐曺得出入郎官立朝得奏彈御史决㑹政要扶樹理本無俾戴魏劉杜專美於貞觀中可守尚書右丞散官勳如故授孔戣尚書左丞制敕漢詔丞相嵗貢集作舉質直忠厚遜讓者蓋所以急賢雋扶政教厚風俗也然則退藏踈賤之士茍有一善尚搜而揚之况任久位崇才全望重而不致於急官要職者將何集作安可以紀綱庶政而羽儀朝廷焉正議大夫守右散騎常侍上柱國賜紫金魚袋孔戣自千年來歷中臺左曺國庠卿寺洎藩守近侍之職各於其任皆有可稱矧又貞白端莊淡然自立進無矜滿之色居無墮替之容求之周行不可多得若戣者宜當扶政教厚風俗之選也尚書丞掌决百事樞轄六曹晉魏以還右减集作卑於左惟有立者可以糾吏惟無瑕者可以律人無以易戣往恭乃一作爾位可尚書左丞散官勳賜並如故授周敬復尚書右丞制楊紹復敕百事根本在文昌官綱轄不修則庶政墮矣是以選擢之際常難其人不有精才孰膺兹選一作任江南西道都團練使觀察處置等使檢校右散騎常侍周敬復以精逺之詞早登科籍以深奧之學遂列顯名振風績於南宫奮華輝於翰苑聲猷一作由實著名以事髙厥德允修在公不倦俾贊丞於都座庶警䇿於周行振舉朝倫有望於爾可尚書右丞授崔蠡尚書左丞制崔瑕敕提六聫之紀綱總一臺之樞要自非才識兼茂夙標峻整則何以統攝羣吏肅清衆官前天平軍節度使崔蠡軒裳積慶文學藻身黃鍾涵待扣之音青萍蓄善割之利早分列宿獨膺題柱之榮入踐禁闈共許演綸之美纍居重任亟换名藩貢籍銓衡必登於藻鑑觀風馭衆益顯其長才廉車扇愷悌之仁將席藴韜鈐之略情惟戀闕志在推賢詞必由衷事多餘美顧我任才之意當爾受代之辰言念前勞載加新命爾其瑩秦臺以分美惡操漢律以檢尤違必俟端標用分曲影可依前件文苑英華卷三百八十五
