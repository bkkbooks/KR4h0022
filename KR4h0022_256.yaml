body:
  text: 文苑英華巻二百五十六宋李昉等編寄贈十崔峒十首奚賈一首沈如筠一首張南史五首權德輿六首劉方平三首于良史三首戎昱六首于鵠五首梁鍾一首朱長文一首李季蘭二首釋清江五首揚州選䝉相公賞判雪後呈上崔峒自得山公許休耕海上田漸看長史傳欲棄釣魚船窮巷殷憂日蕪城雨雪天此時瞻相府心事比旌懸初拜命酬邱丹見贈已見二百四十四巻前人寄上禮部李侍郎前人吴楚相逢處江湖共泛時任風舟去逺待月酒行遲白髮常同歎青雲本要期貴来君却少秋至老堪悲玉珮明朝盛蒼苔陋巷滋追尋恨無路唯有夣相思客舍書懐寄趙中丞前人東楚復西秦浮雲類此身闗山勞筞蹇僮僕慣投人孤客来千里全家託四鄰生涯難自料中夜見情親客舍有懐因呈諸在事前人讀書常苦節待詔豈辭貧暮雪猶驅馬晡飡又寄人愁来占吉夢老去惜良辰延首平津閣家山日已春書懐寄楊郭李王判官前人慣作雲林客因成懶慢人吏欺從政緩一作拙妻笑理家貧李郭應時望王楊入幕頻從容丞相閣知憶故園春書情寄上蘇州韋使君兼呈吳縣李明府前人數年湖上謝浮名竹杖紗巾遂性情雲外有時逢寺宿日西無事傍江行陶潜縣裏看花發庾亮樓中對月明誰念獻書来萬里君王深在九重城贈同官李明府前人訟堂寂寂對烟霞五栁門前聚曉鵶流水聲中視公事寒山影裏見人家觀風競美新為政計日還知舊觸邪可惜陶潜無限酒不逢籬菊正開花知舊又𤣥集作應更限酒又之一集作限興贈竇十九時公車待詔長安前人靈䑓暮宿意多違木落花開羡客歸江海㡬時傳錦字風塵不覺化緇衣山陽㑹裏同人少㶚曲濃時故老稀幸得漢皇容直諫憐君未遇覺人非處州見鄭表新詩因以寄贈前人梅花嶺裏見新詩感激情深過楚詞平子四愁今莫比休文八詠自同時萍鄉露冕真堪惜鳯沼鳴珂已訝遲才子風流難定見湖南春草但相思嚴陵灘下寄常建奚賈日入溪水静偶真此亦難乃知滄洲人成道因釣竿漾檝坐㣲月振衣生早寒紛吾成獨徃自速躭考槃已息漢隂誚且同濠上觀曠然心無涯空問容膝安寄張徵古沈如筠寂歴逺山意㣲暝半空碧緑蘿無冬春綵烟竟朝夕張子海内竒乆為巖中客聖君當夣想安得老松石寄中書李舍人張南史昨夜凄斷處對月與臨風鶴病三江上蘭衰百草中題詩隨謝客飲酒寄黄翁早嵗心相待還因貴賤同早春書事奉寄中書舍人李前人儒服山東士衡門洛下居風塵逰上路簡冊委空廬戎馬生郊日賢人避地初竄身初浩蕩投跡豈躊踷翠羽憐窮鳥瓊枝顧散樗還令親道術倒欲混樵漁敝緼袍多補飛蓬鬢少梳誦詩陪賈誼酌酒伴應璩鶴膝兵家備鳬茨儉嵗儲泊舟依野水開逕接園蔬暫閲新山澤長懐故里閭思賢乗朗月覽古到荒墟在竹慙充箭為蘭幸免鋤那堪聞相府更遣詣公車蹇足終難進嚬眉竟未舒事從因病止生寄負恩餘不見神仙乆無由鄙恡祛帝庭張禮樂天閣綉簮裾日色浮青璅香烟近玉除神清王子敬氣逐馬相如銅漏時常靜金門歩轉徐唯㸔五字表不記八行書宿昔投知已周旋謝起予祗應髙位隔詎是故情䟽為報周多士湏憐楚子虗一身從棄置四節苦居諸柳發三條陌花飛六輔渠靈盤浸沆瀣龍首映儲胥北海樽留客西江水救魚長安同日逺不敢詠歸歟宣城雪後還望郡中寄孟侍御前人臘後年華變闗西驛騎遥塞鴻連暮雪江栁動寒條山水還鄣郡圗書入漢朝髙樓非别處故使百憂銷春日道中寄孟侍御前人春来遊子傍歸路時有白雲遮獨行水流亂赴石潭響花開不知山樹名誰家魚網求鮮食㡬處人烟事火耕昨日已嘗村酒熟一杯思與孟嘉傾江北春望贈皇甫補闕前人閒園柳緑井桃紅野逕荒墟左右通清逈獨連江水北芳菲更似洛城東時看雨歇人歸岫每覺潮来樹起風聞道金門堪濟世何湏身與海鷗同璩授京兆府叅軍戱書以示兼呈獨孤郎權德輿見爾府中趨初官足慰吾老牛還䑛犢凢鳥亦將雛喜至飜成感癡来或欲殊因慙玉潤客應笑此非夫國子栁博士兼領太常博士輙申賀贈前人博士本秦官求財帖職難臨風曲䑓静對月碧池寒講學分隂重齋祠曉漏殘朝衣辨色處雙綬更宜看户部王曹長楊考功崔刑部二院長並同鍾陵使府之舊因以寄贈又陪郎署喜甚常寮因書所懐且叙前好集作所知前人怱驚西江侣共作南宫郎宿昔芝蘭室今兹鴛鷺行子猷美風味左右推公器含毫白雪飛出匣青萍利子雲常集作嘗燕居作賦似相如閒成考課奏别貢院能集作賢良書子玉諒真實持刑慎丹筆秋天鴻鵠姿晩嵗松筠質伊余誠薄才何幸復趨陪偶来塵右掖空此憶中臺時節東流駛悲歡追徃事待月登庾樓排雲上蕭寺盍簮蓮府讌落㡌龍沙醉極浦送風㠶靈山眺烟翠觧頥通善謔喻指窮精義搦管或飛章分曹時按吏雨散與蓬飄秦吳兩寂寥方期全擁腫豈望躡扶摇夜直分三署晨趨共九霄外庭時接武廣陌更連鑣北極星辰拱南薰氣序調欣隨衆君子竝立聖明朝晩渡揚子江却寄江南親友前人反照滿寒流輕舟任摇漾支頥見千里烟景非一状逺岫有無中片㠶風水上天青去鳥滅浦廻寒沙漲樹晩疊秋嵐江空飜宿浪胷中千萬慮對此一清曠回首碧雲深佳人不可望祗命赴京途次淮口因書所懐却寄使府群公前人弱植素寡偶趨時非所任感㤙再登龍求友皆斷金彪炳覩竒彩凄鏘聞雅音適欣佳期接遽歎離思侵靡靡遵逺道忡忡勞寸心難成獨酌謡空奏伐木吟泬寥清冬時蕭索白晝隂交懽諒如昨滯念紛在今因風試矯翼倦飛㑹歸林向晩清淮駛回首楚雲深早發杭州泛富春江寄陸三十六集作一公祐集作佐前人候曉起徒馭春江多好風白波連青雲蕩漾晨光中四望浩無際沉憂將此同未離奔走途但恐成悲翁俯見觸餌鱗仰目凌霄鴻纓塵日已厚心累何時空區區此人世所向皆樊籠唯應杯中物醒醉為窮通故人𤣥圃姿瓊樹紛青葱終當此山北集作去共結蘭桂叢寄隴右嚴判官劉方平副相西征重蒼生屬望辰還同周薄伐不取漢和親虜陣摧枯易王師决勝頻高旗臨鼔角太白静風塵赤狄争歸化青𦍑已請臣遥傳閫外羙盛選幕中賔玉劍光初發氷壺色自真忠貞期報主章服豈榮身邊草含風緑征鴻過月新胡笳長出塞隴水半歸秦絶漠多来徃連年厭苦辛路經西漢雪家擲後園春誰念烟雲裏深居汝潁濵一叢黄菊地九日白衣人松葉踈開嶺桃花宻映津縑書若有寄為訪許由隣寄嚴八判官前人洛陽新月動秋砧翰海沙塲天半隂出塞能全仲叔策安親更切老莱心漢家宫裏風雲晩羌笛聲中雨雪深懐袖未傳三嵗字相思空作隴頭吟秋夜寄皇甫冉鄭豐前人洛陽清夜白雲歸城裏長河别一作列宿稀秋後見飛千里鴈月中鳴搗萬家衣長憐西雍青門道乆别東吳黄鵠磯借問客書何所寄用心不啻兩鄉違閑居寄薛華于良史隠几讀黄巻閒居耳目清僻居人事少多病道心生雨洗山林濕鴉鳴池舘晴晩来因廢巻行藥至西城冬日野望寄李賛府前人地儉𤣥集作險朝陽滿天邊宿霧収風兼殘雪起河帶斷氷流北闕馳心極南圖尚旅逰登臨思不已何處得銷愁宿藍田山口奉寄沈員外前人山暝飛群鳥川長泛四隣烟歸河畔草月照渡頭人朋友懐東道鄉闗戀北辰去留無所適岐路獨迷津贈宜陽張使君戎昱暫作宜陽客深知太守賢政移千里俗人戴兩重天舊郭多新室閒坡盡闢田倘令黄覇在今日恥同年再赴桂州先寄集作上李大夫前人玷玉甘長棄朱門喜再逰過因讒後重㤙合死前酬飬驥湏憐瘦栽松莫厭秋今朝兩行淚一半血和流上桂州李大夫前人今日辭門舘情將衆别殊感深翻有淚仁過曲憐愚曉鏡傷秋鬢晴寒切病軀烟波萬里濶宇宙一身孤倚馬才寜有登龍意豈無唯於方寸内暗貯報恩珠桂州西山登髙上陸大夫前人登髙上山上髙處更堪愁野菊他鄉酒蘆花滿眼秋風烟連楚郡兄弟愛荆州早晩朝天去親隨定逺侯上湖南崔中丞前人山上青松陌上塵雲泥豈合得相親舉世盡嫌良馬瘦唯君不厭類詩作不棄卧龍貧千金未必能移性一諾從來擬殺身莫道書生無感激寸心還是報恩人贈岑郎中前人童年未觧讀書時誦得郎中数首詩四海烟塵猶隔濶十年魂夣每相思雖欣披霧逢迎疾已恨趨風拜識遲天下無人鑒詩句不尋詩伯更尋誰贈李太守于鵠㡬年為郡守家似布衣貧沽酒迎幽客無金與近臣𢷬茶書院静講易藥堂春歸闕功成後隨車有野人山中寄襄陽樊司空集作僕射前人却憶東溪日同年竝學集作事魯儒僧房閒共宿酒肆醉相扶天畔雙旌貴山中病客孤無媒還有計春糓種桑榆寄中山韋証前人懶成身似病因醉卧多時送客出溪少讀書終巻遲幽窓聞墜葉集作露晴集作秋景見逰絲早晩来収藥門前有紫芝途中寄楊陟集作渉前人蕭蕭蘆荻晩一作葉一逕入荒陂日色雲收一作輕處蛙聲雨歇時前村見来乆羸馬自行遲聞作王門客應寒白接䍦此詩二百八十巻重出今已削去注異同為一作醉後寄山中友人前人昨日山家春酒濃野人相勸乆從容獨憶卸冠眠細草不知誰送出深松却忘醉後逢亷度不省歸時見魯㳟知已尚嫌身酩酊路人應恐笑龍鍾贈李中華梁鍾莫向嵩山去神仙多誤人不如朝魏闕天子重賢臣春眺揚州西上岡寄徐員外朱長文蕪城西眺極滄流漠漠春烟間樹樓𤓰歩早朝吞建業蒜山晴雪照揚州隋家故事不能問鶴在仙池期我逰寄韓校書十七兄李季蘭無事烏城縣蹉跎嵗月餘不知芸閣吏寂寞意何如逺水浮仙棹寒星伴使車因過大雷岸莫忘八行書得閻伯鈞書前人情来對鏡懶梳頭暮雨蕭蕭庭樹秋莫恠欄干垂玉筯只縁惆悵對銀鈎喜嚴侍御蜀還贈嚴秘書釋清江徃年分首一作手出咸秦木落花開秋又春江客不曽知蜀路旅魂何處訪情人當時望月思文友今日迎騘見近臣多羡二龍同漢代繡衣芸閣共榮親此詩二百五十五巻重出用字多誤無可取今已削去月夜有懐黄端公兼簡朱孫二判官前人月照踈林驚鵲飛覉人此夜共無依青門旅寓身空老白首頭陁力漸㣲屢向曲池陪逸少㡬回戎幕接元暉四科弟子稱文學五馬諸侯是繡衣江鴈徃来曽不定野雲摇曵本無機修行未盡身將盡欲向東山掩舊扉早發陕州途中贈嚴秘書前人此身雖不繫憂道亦勞生萬里江湖夣千山雨雪行人家依舊壘關路閉層城未盡一作絶交河虜猶屯細栁兵一作營艱難嗟逺客一作道棲託頼深情貧病一作苦吾將一作何有精修許一作謝少卿早春書情寄河南崔少府前人春日春風至陽和似不均病身一作安空益老愁一作衰鬢不知春宇宙成遺物光隂促幻身客逰傷末路心事向行一作何人道薄猶懐土一作玉時難欲厭貧㣲才如可寄赤縣有鄉親右二詩二百五十五巻重出竝已削去注異同為一作登樓望月寄鳯翔李少尹前人陌上凉風槐葉凋夕陽清露濕寒條登樓望月楚山上月到樓南山獨遥心送秦人超鳳闕目隨陽鴈極烟霄軒車不重無名客此地誰能訪寂寥文苑英華巻二百五十六
