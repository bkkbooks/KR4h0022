body:
  text: 文苑英華卷四十五宋李昉等編邑居一登長城賦一首雲中古城賦二首北斗城賦一首新築峨和城賦一首華山為城賦一首函谷關賦一首潼關賦一首武關賦一首登長城賦徐彥伯班孟堅輟編史閣掌記戎幕坐燕阜之陽覽秦城之作喟然而嘆曰傅翼下鞲視人則偷鯨吞我寶鼎蠶食我諸侯鞭撻我上國動搖我中州所以二世而殞職此之由乎當其席卷之初攻必勝戰必克因利乘便追亡逐北自以為功勤三王威懾萬國重鈇鑕干戈於仁義輕詩書禮樂於殘賊然後馳海若以為梁斷陽紆以為藪犀象有形而採掇珠玉無脛而奔走朝則貪墨比肩野則庶人鉗口負關河千里之壯言帝王一家之有神告籙圖亡秦者胡實懵蕭牆之嬖濫行髙闕之誅鑿臨洮之西徼穿負海之東隅猛將虎視焉存一作此焉綱紀謫戍勃興鈎繩亂起連連塢壁岌岌亭壘飛芻而挽粟者十有二年塹山而堙谷者三千餘里黔首之死亡無日白骨之悲哀不已猶欲張伯翳之絶𦙍馳棠梨疑作撑犁之驕子曾不知失全者易傾逆用者無成陳涉以閭左奔亡之師項梁以全吳趫悍之兵夢驂徵其敗德斬蛇驗其鴻名板築未艾君臣顛沛六郡沙漠五原旌斾運歷金火地分中外因虐主之淫愎成後王之要害則知作之者勞而居之者泰嵗次單閼我行窮髮眇默雞田幽隂馬窟土色紫而關回川氣黃而塞沒調噪鼓於海風咽愁笳於隴月試危坐以側聽孰不銷魂而斷骨哉况復日入青波堅氷峩峩危蓬殞蒂森木靜柯羣峰雪滿聮峴霜多龍北卧而銜燭鴈南飛以度河載馳載驟彼亭之候唯見元洲無春隂壑罷晝鷙隼爭擊哀猱直透饑鹿夜咆乳虎晨鬬蟄熊䑛掌寒龜縮殼悲壯圖之夭遏憫勞生之艱遘昔者韓信猜叛李陵拘執望極燕臺山橫馬邑戰雲愁聚衝颷晦急莫不陵地脉以扣心望天街以隕泣亦有王昭直送蔡琰未還路盡南國亭臨北蠻貯漢月於衣裦裛胡霜於髻鬟雖寵盈氊幄而魂斷蕭關至若趙王遷逐馬融幽放去家離土踰沙歷障夢蠨蛸之戶側坐蠮螉之塞上桃李夕兮有所思綺羅春兮遙相望登毁垣以劈摽坐頽隅以惆悵是以衛青開幕張遼闢土校尉嫖姚將軍捕虜剃垣鋪障鋤亭伐鼓斬元於鐵防之門流血於金河之浦張虎牙以泄憤虬蝟鬚以蓄怒及夫中郎殉節博望踰邊取劒仆地尋河際天幽海上而萬里竄胡中而幾年銀車荐出玉節仍旋南向國以樂只北違沙以莞然嗚呼長城之設載逾九百古往今來巋然陳迹窮海戰士孤亭戍客登峻墉陟一作躡窮石嗟故里而不見感殊方以殞魄者亦何可勝道哉嗟我羈淪南庭苦辛心一作長懷壯士永慕忠臣經百戰之戎俗對三邊之鬼燐徐樂則燕北書生開偉詞而喻漢賈誼則洛陽才子飛雄論以過秦嵗峥嶸而將暮實慷慨於窮塵雲中古城賦吕令問正北曰並有唐作京密近戎狄張皇甲兵尹也總居守之任將也當節制之名故卒乘輯睦而王都肅清於是斷武誼按亭燧電轉前旌風飄橫吹楊葉箭的蓮花劒騎下代郡而出鴈門抵平城而入胡地挾纊稱暖投醪必醉則知撫之者誠難用之者不易是時隂閉羣山寒凋衆木川平塞迥氷飲霜宿慷慨乎大荒徜徉乎遊目區脫潛遁屠耆懾逐訴古城之謂何傳魏家之所築伊昔晉京版蕩海縣沸騰不有所命將何以興王師赫怒爰整其旅霧集雲屯龍驤鳳舉棄萬里之沙漠傍五原之風土肇為此都實惟太祖夫其規典章辨封疆池桑乾之水苑秦城之牆百堵齊矗九衢相望歌臺舞榭月殿雲堂開儒士於璧沼貯美人於玉房翕習沸渭熒熒煌煌取威定霸於是乎在施令作法罔或不臧武破六州之內文宅三川之陽何其壯也既而年代倐忽市朝遷徙干戈鼙鼓之雄綺羅絲竹之美孰不煙散雨絶沙埋灰委樹名歡而詎存鳥稱樂而俱死危堞既覆髙墉復夷寥落殘徑依稀舊墀榛棘蔓而未合苔蘚分疑乎相滋伏熊鬬贙騰麕聚麋常鳴悍鷩乍嘯愁鴟不可勝紀但令人悲胡風起兮馬嘶急漢月生兮鴈飛入可憐久戍人懷歸空佇立有客志逺才雄秉義由𠂻負詩書禮樂之用藴蕭曹魏邴之風虜庭髙枕河源鑿空霜犯鬢而先白塵染顔而少紅三為都護五掌元戎益封而廣國事利而業崇獨見凌雲而作賦誰言坐樹而論功者哉第二張嵩開元十有四年冬孟月張子出玉塞秉金鉞撫循邊心窺按窮髮走汗漫之廣漠陟崢嶸之髙闕徒觀其風馬哀鳴霜鴻苦聲塵昏白日雲繞丹旌虜障萬里戍沙四平乘蒙恬之古築得拓跋之遺城伊昔晉人失政亡彼金鏡海水朝飛欃槍夕映鵝呈而二京繼覆馬渡而五胡交盛慨逐鹿而爭雄空瞻烏而莫定於是魏祖發大號鼓洪爐天授宏略神輸祕圖北清獯獫南振荆吳繇是一太隂以建極則廣莫而論都遂徵板幹庀徒卒鏟嶕嶢剞崛屼一作剖嵒屼因方山以列榭按長城以為窟既雲和而星繁亦丘連而嶽突月觀霞閣左社右鄽𤣥沼泓汯湧其後白樓􅏭㠗興其前開士子之詞館列先王之藉田靈臺山立璧水池圓雙闕萬仞九衢四達羽旄林森堂殿轇葛當其士馬精彊都畿浩穰始摧燕而滅夏終服宋而平梁故能出入百祀聮延七主擊魯衛之諸侯廓秦齊之土宇禮興樂盛修文耀武講六代之憲章布三陽之風雨亦云已矣哉俄而髙祖受命崇儒重才南巡主疑鼎之邑北去軒轅之臺鵬搏海運鳳舉天回嗤紇真之鳥死憶新野之花開自朝河洛地空沙漠代祀推移風雲蕭索溫室樹古瀛洲水涸城未哭而先崩梁無歌而自落魏家美人聞姓元新聲巧妙今古傳昔日流音遍華夏可憐埋骨委山樊城闕摧殘猶可惜荒郊處處生荆棘寒飈動地胡馬嘶若個征夫不沾臆人生榮耀當及時白髮須臾亂如絲君不見魏都行樂處只今空有野風吹乃載歌曰雲中古城鬱嵯峨塞上行吟麥秀歌感時傷古今如此報主懷恩奈老何北斗城賦以池塘生春草為韻崔損昔炎漢之開國宅咸秦而設規闡都邑之壯麗紛制作而多儀像蓬島以疏嶽擬天河而鑿池館倚南山㨖雲霞而上出城侔北斗仰星漢而曾披何爽鳩之代謝驗驪騵之運虧是以作之者不處居之者不為祚我神唐丹青焜煌峻址雲矗層譙錦章羃赬壤以疊形凝皓粉以飛光門結黃金之石檐施白璧之璫堞盤紆於曲檻池徑復於圓塘城勢逶迤若台岑之隱映樓形宛轉似崑崙之相望接千門之宫闕通八達之康莊既而鸞駕西巡嚴扃晨啓羽衛咸集聲明克陳登睥睨以清夜聽畢逋而候春儼雄㦸以耀武振鵷行而拱辰夕沈煙雲之色曉流車馬之塵引祥昭之爛漫吐佳氣而輪囷於是嵗發青道池隍煦早堞霧縈林岸風柔草暖懸竇以彌藹飾崇隅之增好映春水之澄澄納朝陽之杲杲惟壯勢之崢嶸達洪規而鎮京望浮雲之黑水對翔鳳之丹楹配宗子之永固等皇家之不傾俯賔庭而贊義終自惡其輕生新築峨和城賦以逺夷歸化邊候肅清為韻陳諷元侯以制敵之雄略期方隅之永清得奔衝之故地創備守之新城四合分形見岡巒之表裏百堵定制變勝負之虛盈崒雲屯而霞起忽虎踞而龍行倚蒼壁以中絶玷第四十七卷長春宫賦作粘赬壤而外明將伐謀伐力制敵投兵馭亭嶂於振䇿摧氐羌於矯衡是知地利攸歸兵家大福我有巨防師無遺鏃神謀洞啓而機張天險載興而板築于以巒披岡削嶺門崖谷此兩句一作披岡削嶺門崖塹谷雉堞霜皓麗譙雲矗連山上捧鬬士以之增威峭壁初嚴戎王於焉慟哭矧夫勢雄形固師嚴令肅數萬落於屈指睇連營於寸目何暫費於經營永無虞於敗覆故能功圖彀內智出謀先髙厚不愆乎一作于上命規模必合於中權俾夫登陴荷㦸憑墉控弦虜魄暗褫漢烽不然仰峻隅而已僨望懸門而不前懼摧鋒於百勝敢踏伏於三邊者哉是知奇功不作俾殊俗而向化善守以威即死士而知歸不然者戎輕無常獸困猶鬬安能使干戈掃跡烽柝寢候仰新壘以投戈覆故巢而罷冦是知威服德綏不獨逺夷彼或不讋我則成城以耀武彼能懷惠我則蹈道以貞師庶扄鐍而惟永顧咽㗋而在兹彼周城朔方漢得赤坂無制勝之明術徒疲人以勤逺豈比夫修武備清文苑將鳳沼以酬勳佇靈臺之伯偃華山為城賦以因形設險坤德所為為韻失名地控强秦路惟分陜有太華之作固若崇墉之生險絶壑中抱重巒外掩倚雲漢而匝野屏開跨金方而當空黛染千尋壁立萬雉雲屯龍盤日月虎視乾坤大河自北而東呀為濬洫窮谷從中而斷豁若重門誠百二之光宅見九五之天尊偉夫襟帶皇都咽㗋上國磅礴乎崤函之外隱軫乎豐鎬之側所以羅羣象吞八極展萬祀而成在衆心冠三秦而位居一德况乎天地初霽雲霞四披紅塵滅影碧落標奇宿霧市之氣尚疑煙闕聳蓮峰之色不讓文陴顧萬夫之莫向信六國而奚為岌岌神才言言天設連岸抱九州之路壯氣折諸侯之節蕭蕭歸馬想飲窟之初還隱隱輕雷訝鳴鼓之不歇天包地束鳥過雲輕萬仞垂峭千峰入𡨕髣佛虹霓盡識旌旗之色依稀星月皆分孤矢之形疑其發跡混茫孕兹重阻假巨靈拔山之力衛王者登龍之所不然安得不費一錢不勤一旅削成而千里共峻作鎮而一人可禦是宜堯為君而舜為臣道為主而德為鄰與天地之人共守使海內之士咸賔夫如是則東夷之與北狄雖欲窺而何因函谷關賦閻伯璵函谷天險𢎞農邦鎮南據二虢北荒三晉洞開一軌壁立千仞徑薦雙合梯苔孤峻世濁先封道康後順逺秦塞近崤陵幽泉或作邃脉脉斷峰稜稜增陴霧杳聚柝煙凝髙卑異級坻崿相承靡届靡究不騫不崩實隄防之樞轄為造化之緘縢齊之以權衡危不可得約之以符璽信而有徵昏主既廢聖人以興慎終於始欲罷不能觀夫憧憧往來驂駐成霧據于石東西十里臨其深前後咫步建瓴百二之國扼㗋三七之路幅員既長城小而固恃元化之隂隲望彛倫之攸序於是敕用傳禁棄繻商君本魏之公子柱史乃周之臣符知結草之可守故習坎以無虞原夫阻河稱深因山為衛背宇宙之衝連阡陌之勢萬方納欵百工獻藝四旁磔攘諸侯之政典一丸成功陪臣之邪說直指天符變稊夷之末橫分地維弛旗旒之贅聿修綱紀以遏醜戾或懸門而不發殊勇夫之重閉懷德維寧將鎮其細既皇漢之辟國實扄鐍於新安固之胡易捨之則難復襟帶於故道徒赬壤而未乾善孟子之禁暴惡臧孫之謬官存古訓以是式庶斯文之不刋潼關賦張翌惟皇王之建國分中外於上京憑山河以作固閾夷狄而騰聲誠曰咽㗋吞八荒而則大是稱巖險控萬國以來平周有掌貨之節禮無關門之征巨防宵扃倚洪波而作鎮重扉擊柝連太華而為城創中代之新號變函谷之舊名柱史老𥅆擁仙雲而西邁終軍童子建使節而東行文仲不仁廢六關而興誚王元有說封一丸而永清若用備不虞取諸繫象作邦畿之襟帶杜奸宄之來往長墉矗兮雲屯曾樓赫以霞敞登臨者有知其地雄踰越者無漏於天網亦有孟嘗奔走長宵未曙何白馬之不談學雞鳴而乃去逢尉臣之一失或愚者之千慮至如楚漢爭雄沛公先入旗鼓照耀兵戈翕習南面則三傑齊驅東井則五星俱集實靈命之所應亦人謀而是及王道廓而已清帝業巍乎乃立窮四塞之艱阻成百王之都邑故知建功定霸期乎此關武侯矜於固險婁敬說乎河山視前烈之軌躅覽陳跡而躋攀既登髙而能賦希駟馬而言還武關賦以海內無事重關不修為韻王啓路入商山中橫武關穿重門於固護屹峭壁以孱顔昔在危時屯千夫而莫守今當聖日置一卒以常閒觀乎地勢爭雄山形互對西連蜀漢之險北接崤函之塞鎖百二都綿幾千載世亂則厄限區宇時清則通流外內當其六國連謀關防日修則斯地也雲屯貔虎雪耀戈矛張儀出以行詐懷王入而竟留縱下客之雞鳴將開莫可任公孫之馬白欲度無由及乎塵起九州波搖四海秦鹿失而襟帶難保漢龍興而山河遽改豈料禦衝之所此日全平未知擊柝之徒當時安在所謂以兵而備者莫之能守以道而居者莫得而踰千里之金城湯池終為漢有二世之土崩魚爛自是秦無今則要害何虞平隆已久雖設險以猶在顧戒嚴而則不蕭條古壘豈臧文之廢來寂寞空扉似楊侯之移後蓋以文修武偃國泰時雍濬四溟而作塹廓八極以為墉遂使鼙鼓無喧一水之寒聲决决旌旗常卷一作偃千載之暮色重重嗟呼昔為洪樞今成隙地信無外以斯見實善間之攸致儒有經其所感其事乃曰今朝西去豈無隨老氏之人他日東還誰是識終童之吏文苑英華卷四十五
