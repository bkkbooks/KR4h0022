body:
  text: 文苑英華卷五百九十九宋李昉等編請聽政中書門下請聽政表三首勸釋服聽政表三首勸聽政表三首宰臣等請聽政表七首禮部為文武百官請聽政表二首中書門下請聽政表于邵臣某言臣及文武百寮上乞奉遵遺詔俯埀聽政迨于再三尚阻羣請所天未覆何地自容伏自焦惶罔知攸處臣以因心之感是陛下私戚顧命之重是先帝至公未有因私戚而忘至公居大寳而懷小節者也且漢文昔王之賢者豈欲埀訓作則自虧其道而後嗣忘其孝思盖所以埀時制禮從權體國千載不易直道而行曾參閔損俯就者家也周康漢景抑就者國也安以一家之行而隳萬國之務乎今陛下禮以自拘闕為全孝臣謂從而觀志存其中則明遺制不可狥禮而忽萬務不可一日而矌臣又聞之子事父以無違臣事君以替否臣陪陛下霑承末命臣言未感丼受不忠陛下固辭豈得稱孝特乞受憑儿之顧託損蓼莪之哀思以時闡皇綱創帝範副人之所望恱億兆之心寧止宗社焉依實將教缺速及披肝屢啓冀獲哀從無任崩迫彷徨之至第二表臣等欽承顧命遵守舊章冐陳至理上喧霄極冀廽三舍以幸萬方而呼天未聞觸地無厝庶僚何恃而不恐率土何仰而不憂至如仙駕在天𤣥猷未遠窮崩之慕臣子之極同况陛下新離供養纒哀風樹誠不宜屢黷嚴纊仰傷聖心臣等備位台衡與國休戚所顧者小節所全者大體是用頻煩干奏隕越為期臣某中謝竊以三漢成規備乎六册六宗遺範列在史官歴羣聖無以易其儀貫百王無以更斯制則知聖人達節而俯就王者屈已以狥時故周發誓師當未葬之日康王作誥繼憑几之辰夫大孝在於述先執禮懲乎發疑作廢命所以伯魚止慟禀趨庭之規孝景抑情循易月之制弛張期乎得中壓降在於適時今中夏雖寧而外郊猶警幸屬千年嗣聖九有惟新顧循問豎之初迨今宅憂之日已交朏魄不决外虞普天率土任重事殷一日暫曠萬務所擁况翌日之詔手澤猶存敢忘導揚以塞恩顧且小大之理須禀聖規聽斷之期已違先㫖庶政羣情惟上帝之降命屬陛下以黎元宜以闡皇綱創帝範副靈祗之望悦兆庶之心焉得極蓼莪之哀忽宗社之重伏惟陛下仰思無改之道俯戒在予之責抑損至情覧决庶務存萬代之固遺一介之善率繇大道克允至公天下幸甚天下幸甚第三表臣某言稱情立制禮經美人道之文屈已從冝前史稱我王之孝故魏文腷臆以莅事晉襄縗絰而從師誠有由然非不懷也伏惟皇帝陛下屬當聖業纒思遺弓至性出於自然孝情禀於天質雖考妣之慟被於含齒而皇王之道寧有常心天下之志宜通太陽之照難闕况百度惟始萬目未張遂呌帝閽期抑舜慕雖封章累至而閶闔不開九服失圖羣司沮色豈悟至誠不昧有感必通今日中使某至伏蒙昭廻天鍳允納窮款皇風廣被神詔沛然觀象於天同伏羲之始畫奉先思孝狹武丁之不言厭極二字疑愛於祖宗體前行之覆育周漢所以繼理政術魏晉由是經綸理道實足埀風萬古作範百王豁億兆惶惑之心示人祗聞奏之路百榖荷膏雨之澤羣生覩天地之初以悲以歡載號載懼云云勸釋服聽政表臣某等言再奉恩勑一作旨聖心永慕未忍割哀過大祥則素衣練冠衘恤聽政當外除則降從禫服以終䘮紀者羣臣等重於荒廹之中頻奉不忍之詔精䰟飛越兢惶失圖臣某等中謝伏惟皇帝陛下孝心自天孝道逾禮宅憂之日痛感人神顧命之文興言不忍微臣等前後五表昧死上陳雖皇恩抑從而猶至十日自鼎湖昇馭俯及祥除其間唯見羣臣禮展哀感又伏聞杖不能起哭不絶聲常膳頓减至於一溢一作併一以王者之尊過子臯之毁然臣等伏以三年之䘮古稱云達禮者前王之舊制也三日而聽政二十七日而釋服者先皇之遺令一作命也今陛下不勝罔極之痛欲遂因心之哀遠追前古之禮近廢無違之義愚臣荒塞莫知死所且梓宫未遷於陵隧聖慮方切於哀號一作迷雖釋服從一作臨朝慰撫臣子猶恐天顔慘戚率土不安羣臣未通庶事皆闕今方以練冠為易月之服􅎭制終諒闇之䘮羣臣進見莫勝憂戚又安敢議及時政下延兆庶者哉遐邇幽明同知不可伏乞聖情深思園陵興作之務仰順先聖殷憂之説上尊祖宗傳襲之典精釋服之注俯從有司衘哀永懷豈有時日萬人之命懸在聖躬今臣等昧死請不奉詔上冐宸嚴心䰟兢悸言辭失序無任憂國切一作荒廹之至第二表臣等至哀至切昧死上表乞奉遺詔順時釋服日月有期而精誠未達率土臣子未類表作莫知所從况在朝行伏待斧鑕臣等伏以昔漢文帝初制易月之禮以為帝王者不可因喪而廢政若君上重服則率土何心爰建此儀以重後葉自爾至今殆千載矣豈無哲王皆所尊奉聖朝奄有四海撫寧萬邦重光睿圖孝理天下臣不敢備引前古以煩聖聽英華作德非乞畧陳𤣥宗先帝即位故事耆老當日所聞見者皆以日易月依禮外除有司繼存儀注尚在臣敢罔冐伏受嚴刑且先王制禮禫服止於兩月為日正當兩日今詔㫖降從禫服類表作服以終䘮臣雖固類表作愚陋不達禮本今服禫三載實所未聞况君者天也豈有天意慘愴萬物得遂其性父懷隱痛赤子得安其心哉陛下若固違羣言未奉遺詔非唯臣子哀懼實恐蠻貊不安非陽和發生之道聖人順物之義愚臣等心之所切抵冐國章形神悚越文理繁穢頻黷旒扆庶感天心雖死之日將無所恨無任荒悚之至第三表臣某等言伏聞事有至公不敢避責確守臣節不敢逃刑天心未從有死無二臣伏以大行皇帝憑几顧命俾二十七日而釋服者盖以天下事重軫慮于懷陛下至孝一作情至純深必多損毁竊恐因創巨之痛忘艱難之業累聖鴻緒萬邦赤子或一事不得其所豈非重服傷生之患哉所以當大漸之辰託殷憂之命盖縁社稷之遠計須抑陛下之至情遺旨若此猶未忍割哀况一作向無制命則如何上請且攅宫尚臨於前殿陵寢方興於復英華作厚非土朝野縞素殆將三旬雖聽政俯在於天心而庶務未親其萬一今又􅎭服終制普告四方典章文物何所設施一作將何所設且西戎北狄頃歲未賔凉秋氣髙每伺邉隙今若聞國有大故䘮又未除姦謀或生事則非遠一作遠慮雖皇威遐振應時掃除然思患之道一作前必戒不虞善師不陣盖在此也今陛下若御常服决大務不逾月之内天聲被於八極凡厥夷貊聳聽皇猷自然大者畏威小者懷德稽顙率賦疆場無虞告成之功上薦於帝則先皇帝之遺旨一作命行矣天子之大孝備矣羣下之所願遂矣萬國之兆庶安矣陛下不思此事之利害忍違臣子之誠心此臣等所以兢惶無措哀廹失圖叩心三請上冒天憲死而利國臣不敢辭臣之丹心天地明察無任兢廹之至勸聽政表陳諫臣某言伏以大行皇帝導揚天命付陛下以宗社託陛下以殷憂俾抑情以順人節哀以聽政伏惟皇帝陛下哀思至孝與天罔極不忍遵奉䘮過乎哀羣臣上陳未蒙降允荒廹之至不知所措伏以上天降禍率土號慕哭泣之哀䘮紀之節凡在臣子所冝同哀一作懷豈合此時再三陳請但四郊尚有師旅萬國未登和平衆事從宜兆人思理當通變之日非慕已疑之時陛下臨之浹辰則雍熈可覩廢之一日則憂慮或生所以遺旨殷勤俾三日而聽政非欲抑陛下至哀之情盖為社稷萬人之計不得不爾也臣聞周稱成康漢稱文景咸為至理之主百王則而象之然成王有顧命康王翌日而踐祚文帝著遺令景帝釋服而視朝夫豈無私懷為至公抑也伏惟陛下省當時安危之理順普天延企之望睿謀光於八葉成天子不匱英華作遺之孝答先聖乃眷之情一作懷凢在生靈孰不悲戴臣等時逢繼聖位忝通班犬馬之心不勝哀懇第二表臣某言臣聞先王立禮所以安邦國一作國家定社稷也帝王䘮制之義古今損益不同盖時有安危禮有沿革當萬邦無事可以諒闇屬百度思理固當節哀時殊事異不得不然至於罔極之情一作懷孝思一作因心之感皆由率天性隱痛深焉或不在䘮服之輕重臨朝之遲速也臣謹案孝經云事天明事地察德教加於百姓刑於四海盖天子之孝也又禮中庸曰武王周公其達孝乎夫孝者善繼人之志善述人之事者也臣等伏考前典保寧家邦嚴薦胙一作薦嚴社疑於九廟流慶祚於萬葉此所謂繼先皇之志也哀痛既徃經營將來致干戈於不用登兆庶於壽域此所謂述先皇之事也陛下儻忘此二者未忍哀情固違百辟之誠請不咨前王之故實其若天地宗廟何其若萬方四海何臣等位忝班行同國所戚不任哀迫之至第三表臣某等言昔袁盎以漢文孝過於曽參臣今伏以聖情之慟過於漢文遠矣凡在羣下孰不歸仁臣等荒迫之中竊有所感伏以大行皇帝深惟天下之重慿几顧命俾陛下三日而聽政今顒顒萬國企聞王言已七日矣而衘哀永慕未忍抑從尚一作豈可謂奉先皇之旨行天子之孝乎大行皇帝封植萬邦傳之陛下屬艱難之運當金革之辰庶務權冝懸於晷刻如或一夫不獲一事不理雖陛下心同大舜跡齊武丁豈可謂負荷祖業永和一作安兆庶之望也一作乎臣等荒愚未見其可所以前後三表血誠上請祗冒宸扆戰越伏深無任憂戚一作感之至宰臣等請聽政表林逢臣等聞王者之孝不可與士庶同萬機不可以逡廵曠典策所載古今必然伏惟皇帝陛下出震纉圖體乾御極荷祖宗之丕烈啓運祚於雍熈自大故已來孝思罔極天地以之慘戚臣庶以之震駭而節文有變遺旨無違伏乞稍抑哀懷俯親庶政冀使生靈獲泰日月重明臣忝列台司謬叅樞務無任懇悃之至第二表臣某言伏以萬機事繁不可乆曠今則披瀝血誠乞親庶政聖情哀塞未允愚衷夙夜兢憂是再陳啓伏惟皇帝誕受欽明夙誠疑睿哲道光王室運屬承天而孝感因心悲摧過毁一自國故殆逾半旬誠四海哀號如䘮考妣而萬靈顒若未覩乾坤伏冀思繼體之大猷棄執哀之小節行帝王代天之法薄曽閔匹夫之情特抑哀懷俯躬朝政宗廟之業永遂和寧社稷之靈知其允答况事非為已道本狥公一作人仰惟聖慈俯塞羣望臣等叨逢景運獲列樞衡昧死竭愚布露丹懇伏紙隕越庶重天鑒第三表此篇栁宗元集中誤収作第二表晏元獻公云是林逢作决非宗元臣伏奉大行皇帝知陛下至性自天恐陛下執哀過毁上惟九廟之重下念萬務之殷故遺詔丁寧俾遵舊典今百辟卿士顒然在廷瞻望清光已七日矣固陳誠請猶未允從内外憂惶莫知所出臣聞大孝之本繼志為難酌禮之情尚栁集作得中為貴是以哀迷期數哭泣有常俯而就之聖人所重知難繼也君子不為伏願少抑哀情栁集作懷仰尊理命以副神祗之望以安億兆之心光祖業於無窮流德教於千古柳集作化於天下凡在臣子孰不悲戴不任哀懇誠切之至第四表此篇亦誤入栁宗元集作禮部為文武百寮請聽政第三表按表文云兩河之冦盜雖除百姓之瘡痍未合乃是穆宗敬宗時事宗元元和十五年卒誤収何疑臣某等言伏以萬機事栁集作至重遺旨難違再獻表章上塵旒扆精誠徒竭天意未廻内外遑遑人神企望臣聞王者之孝異於匹夫禮不相沿道資適變向栁集作當承平之代故殷帝宅憂而不言遇有事之時則周王未葬而誓衆况今戎車猶駕邊候多虞兩河之冦盗雖栁集作難非除百姓之瘡痍未合亂者思理危者求安天下嗷嗷正在今日誠宜抑其至性以副羣心成先帝之大功繼中興之盛業豈可寢苫啜泣庶政闕然九廟之靈何報萬方之望何塞臣等職參樞近誠切邦家若陛下未忍臨軒尚持前志臣等有死而已不敢奉詔不勝哀迫懇切之至第五表臣聞樹之元后以牧蒸人猶日月之照臨不可以少曠如天地之覆育不可以暫虧故歴代明王取鍳於此必屈已以狥物遂抑哀而從冝期為彛章行於徃古聖心哀迫未體至公羣臣憂疑罔知所措伏惟皇帝陛下温恭允塞邁德文明承二百年之丕圖當十三聖之大業生靈所屬負荷不輕豈宜直疑貌棘心蹈小節而自遂寳符神器委大計而未臨且萬機事殷九有望切運當克構政在惟新顒顒蒼生日有所冀伏乞皇帝以安黎庶為念以保社稷為心對越上𤣥克揚顧命俯從人願用答天休臣之慺慺實在於此况萬國將至七月匪遥須務山陵以申孝敬在於營奉不可曠違抑有前規固無徇已伏惟特膺順變允叶情文抑至性而副羣誠畧小善而章大道則天下幸甚宇内和寧臣等生忝明時位當樞軸敬同羣品重啓宸嚴悃愊之誠至於死請云云第六表臣等昧死上表以陳備竭肝膈聖情超遠未蒙聽覧臣等中謝臣等謬膺爕贊猥奉恩私未廻日月之光是負股肱之寄豈臣心不忠無能感寤今者萬機之曠四海同憂顒顒衆心不安寢食以陛下聽政之期未尅執䘮之志尚堅臣等當伏閤呌一作扣閽殞身碎首所期宸鑒下察微誠不勝迫切之至第七表臣等言今月日已後累陳七表請御萬方忽蒙宣旨尚未聽許臣等驚怖不知所裁敢徵前言以奉萬一伏惟漢朝諸帝文稱明聖而著易月之典以為後代之法光武已降迄于我唐繼有睿哲之君不無明聖之主豈皆乏殷宗之孝豈盡無陛下之心但以所守者祖考之丕圖所臨者生靈之重事不敢狥其已以屈萬姓不欲申其志以盖百王具在典謨莫得逾越况元和已前十一聖矣皆以孝理化於萬國迭承次守無議改縗大行皇帝恭承昌緒亦遵前訓當陛下舊規或墜忠言莫從遠棄漢文之風烈近乖先帝之遺躅獨狥一時之至性臣恐掩祖宗之舊儀不足以流範越大行之性度不足以揚名夫䘮以敬為上哀亦次之著在禮經陛下之所鑒也伏惟以社稷為心以邦國為念以奉山陵為至敬以安社稷為至勤薄曽閔之菲名纂堯舜之盛業副中外之丹欵濟蒼生之血誠臣等慺慺不寕寢食况臣等備任宰衡時逢昌運答先朝之眷遇承陛下之文明伏乞俯察愚心允兹羣望期於得請昧死上陳今樞務之目曠廢已乆朝野心惑人祗望切安可盤桓更延時日伏乞更賜允許以慰上下億兆之誠立俟聖諭晷刻是望無任禮部為文武百官集作寮請聽政表柳宗元臣某等言臣聞大道必體於至公大孝無集作莫髙於善繼上觀列聖旁考前王罔不俯就禮文仰承大事嚴奉宗社集作廟慰安黎元然後德教惟新邦家永固伏惟皇帝陛下寢苫泣血號慕無時貫於集作于神明動于天地未臨庶政猶狥至誠凡在人臣孰不哀懼伏以集作惟先聖遺旨俾陛下抑哀而聽政本朝乏人使臣等竭忠而集作以奉上非敢懼死輙布懇辭期於必從以慰寰宇且王業至重軍國方殷一日萬機一作萬機之事不可暫闕伏願追遵顧命蹈履成規恢王者華夷之望順上帝乃眷之懷臣等不勝哀迫誠懇之至第二表臣某等言臣聞聖凡殊途邦家異禮故王者捨已從物用身許天雖居達䘮猶以事奪伏以大行皇帝道成鑄鼎仙等馭龍萬姓長號九有顒望陛下以聰明睿聖嗣守寳圖爰及宅憂迨兹累日而孝思罔極尚輟乃讙之言庶政未釐頗闕如絲之命臣等嘗覧載籍粗知䘮紀若成周顧命歴代猶遵西漢遺詔前王所奉我國家以孝理天下文明應期上類表作亦用此法胥以傳授蓋事歸至當則不可不遵禮貴從宜則不得不守理固然也臣等是敢集作以上陳愚懇輕黷宸嚴冀遂血誠俯親國政而陛下執䘮逾切聽理未聞億兆嗷嗷不知所訴臣以為天子之孝在於保安社稷司牧蒸黎功超百王慶流萬代亦何必守臣下之小節蔑皇王之大猷固阻羣情務成謙德伏願以遺詔為念奪在疚之懷就臨軒之制天下幸甚幸甚不勝哀惶懇迫之至文苑英華卷五百九十九
