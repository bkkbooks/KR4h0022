body:
  text: 文苑英華卷三百一十三宋李昉等編居處三樓三十二首臺三十七首樓江樓春望于武陵樓上長江路舟車盡不間鳥聲非故國春色是他山一望雲復水幾重河與關愁心隨落日萬里各西還題安州浮雲寺樓寄湖州張郎中杜牧去夏疏雨餘同倚朱欄語當時樓下水今日到何處恨如春草多事與孤鴻去楚岸柳無窮集作何窮别愁紛若絮此詩二百六十一卷重出今已削去登池州九峯樓寄張祜前人百感中集作裏來不自由角聲孤起夕陽樓碧山終日思無盡芳草何年恨即休睫在眼前長不見道非身外欲集作更何求誰人得似張公子千首詩輕萬户侯此詩二百六十卷重出今已削去過勤政樓前人千秋令集作佳節名空在承露絲囊世已無惟有此苔偏得集作稱意年年因雨灑集作上金鋪江樓夜别許渾離别奈情何江樓凝艷歌蕙蘭秋露重蘆葦夜風多深怨寄情瑟逺愁生翠蛾酒酣相顧起明月棹寒波登尉他樓前人劉項持兵鹿未窮自乘黃屋島夷中南來作尉任囂力北向稱臣陸賈功簫鼓尚陳今世廟旌旗猶鎮昔時宫越人未必知虞舜一奏薰絃萬古風題韶州驛樓集作韶州韶陽樓夜宴前人待月江集作西樓捲翠羅玉杯瑶瑟近星河簷前碧樹窮秋密忩外青山薄暮一作霧多鴝鵒未知狂客舞集作醉鷓鴣先讓美人歌使君不集作莫惜通宵醉集作斂刀筆初從馬伏波咸陽城西集作東樓晚眺前人一上髙城萬里愁蒹葭楊柳似汀洲溪雲初起日沉閣山雨欲來風滿樓鳥下緑蕪秦苑夕蟬鳴黃葉漢宫秋行人莫問前朝一作當時事渭水寒聲晝夜流和崔夫人新廣北樓登眺前人北望髙樓夏亦寒山重水濶接長安修梁暗換丹楹少疏牖全開彩檻寬風卷浮雲披睥睨露凉明月墜一作墮闌干庾公戀闕懷鄉處目送歸帆下逺灘北樓李商隱春物豈相干人生只强歡花猶曾斂夕酒竟不知寒異域東風濕中華上象寬此樓堪北望輕命俯集作倚危欄夕陽樓在滎陽蕭侍郎守滎陽日作前人花明柳暗曉天愁上盡重城更上樓欲問孤鴻向何處不知身世自悠悠酬牛秀才登樓見示薛逢旅館再經秋心煩懶上樓年光同過隙人事且隨流骨肉憑書問鄉關託夢遊所嗟山郡酒傾盡只添憂嘉州驛樓晚望姚鵠樓壓寒江上開簾對翠微斜陽諸嶺暮古渡一僧歸忩逈雲衢起汀遙鳥背飛誰言坐多倦目極自忘歸楚州宴花樓趙嘏門外煙橫載酒船謝公攜客醉華筵尋花偶坐將軍樹飲酒方重刺史天幾曲艷歌春色裏斷行髙鴈暮雲邉分明聽得與人語願及行春更一年登安陸西樓前人樓上華筵日日開眼前人事秪堪哀征車自入紅塵去逺水長穿緑樹來雲雨暗更歌舞伴山川不盡别離杯無由併寫春風恨欲下鄖城首重回鸛雀樓晴望馬戴堯女樓西望人懷太古時海帆通禹穴山木閉虞祠鳥道殘虹挂龍潭返照移行雲如可馭萬里赴心期同蕭山陳明府集作官長縣樓登望方干坐看南北與西東逺近無非禮義中一縣繁花香送雨五株垂柳緑牽風晝潮背海集作郭喧還靜驛路穿林斷復通仲叔受恩多感戀徘徊却惜集作怕酒壺空長沙陪裴大夫登北樓李羣玉巖嶂隨髙步琴樽奉勝遊金風吹緑簟湖集作湘水入朱樓朗抱雲開月髙情鶴見秋登臨多暇日非為賦消憂江樓閒望懷關內親知集作關中親故李羣玉搖落江天欲盡秋逺鴻髙送一行愁音書寂絶秦雲外身世蹉跎楚水頭年貌暗隨黃葉去時情深付碧波流風淒日泠湘光集作江湖晚駐目寒空獨倚樓漢陽太白樓前人江上晴樓雲靄間滿簾江水滿忩山青楓緑草將愁去逺入吳雲暝不還題樟亭驛樓喻坦之危檻倚山城風帆檻外行日生滄海赤潮落浙江清秋晚遙峯出沙乾細草平西陵烟樹色長見伍員情題河中鸛雀樓張喬髙樓懷古動悲歌鸛雀今無野燕過樹隔五陵秋色早水連三晉夕陽多漁人遺火成寒燒牧笛吹風起夜波十載重來值搖落天涯歸計欲如何江樓作前人憑檻見天涯非秋亦可悲晚天帆去疾春雪燕來遲山水分鄉縣干戈足别離南人廢耕織早晚罷王師渭陽樓閒望鄭谷千里二華見皇州望盡凝嵐即此樓細雨不藏秦樹色夕陽空照渭河流前車寧見後車覆今日難忘昔集作昨日憂擾擾塵中猶集作殊未已可能疏傅獨能休陪郢州張員外宴白雪樓許棠髙情日日閒多宴雪樓間灑檻江上雨當筵天際山帶帆分浪色駐樂話朝班豈料羇遊者樽前得解顔雨後從陶郎中登庾樓王真白島邉漁艇聚天畔鳥行分此景堪誰畫文翁請綴文豫章江樓望西山有懷陳陶水護星壇列太虛煙霓十八上仙一作真居時人未識遼東鶴吾祖曾傳寶鼎書終日章江催白鬢何年丹竈見紅蕖桃花谷口春深淺欲訪先生赤鯉魚鳳州北樓羅鄴城上層樓北望時間雲逺水自相宜人人盡道堪圖畫枉遣山翁醉習池慈恩寺東樓曹松寺樓凉出竹非與曲江賖野水流穿苑疑秦山壘入巴風容離衆業一作葉岸角積虛沙此地鐘聲近令人思海涯早登新安縣樓羅隱關城樹色齊往事未全迷塞路真人氣封門壯士泥草濃延蝶舞花密教鶯啼若以鳴為德鸞凰不及雞登夏州城樓前人寒聲獵獵戍旗風獨倚危樓集作欄悵望中萬里山河唐地土千年魂魄晉英雄離心不忍聽邉馬往事應須問塞鴻好脫儒冠從校尉一枝長㦸六鈞弓登宛陵條風樓寄竇常侍前人亂離時節懶登臨試借條風半日吟只有逺集作逺見晚山含暖律不知髙閣動歸心溪喧晚棹千聲浪雲護寒郊數丈隂自笑疏慵似麋鹿也教臺上費黃金臺登琴臺梁簡文帝蕪階踐昔徑復想鳴琴遊音容萬春罷髙名千載留弱枝生古樹舊石染一作浸初學記作深新流由來遞相嘆逝川終不收此詩一百七十四卷重出今已削去注異同為一作過建章故臺庾肩吾魯國觀遺殿韓城想舊臺仲宣原隰滿子建悲風來夏蓮猶反植秋忩尚左一作不開圖雲仍溜集作泄雨書石集作畫水即生苔及君觀類聚作歡四望知余念集作詠七哀宫殿石類聚作名登臺祖孫登獨有相思意聊敞鳳凰臺蓮披集作枝香稍上月明光正來離鵠類聚作鶴將雲散飛花似雪回遙思竹林友前忩夜夜開相如琴臺盧照鄰聞有雍容地千年無四鄰園院風煙古池臺松檟春雲疑作賦客月似聽琴人寂寂啼鳥處空傷遊子神登越王臺宋之問江上越王臺登髙望幾回南溟天外合比户日邉開地濕煙常起山晴雨半來冬花掃盧橘夏果摘楊梅跡類虞翻枉人非賈誼才歸心不可見集作可度白髮重相催登裴秀才迪小臺王維端居不出户滿日空雲山落日鳥邉下秋原人外閒遙知逺林際不見此簷間好客多乘月應一作膺門莫上關登九思集作里臺是楚樊姬墓張說楚國所以霸樊姬有力焉不懷沈尹祿誰諳集作進叔敖賢萬化茫無在孤墳獨巋然北分陽臺陌南識郢城阡漠漠渚宫樹蒼蒼雲夢田登髙形勝出訪古令名傳自我來符守因君樹蕙荃詩書將變俗絺纊忽彌天集作年志闌三折後愁值二毛前佇立帝京路遙心寄此篇登古陽雲臺張九齡庭樹日衰颯風霜未云已駕言遣憂思乘興求相似楚國茲故都蘭臺有餘址傳聞襄王世仍立巫山祀方此全盛時豈無嬋娟子色荒神女至魂蕩宫觀裏蔓草今如積朝雲為誰起陪王司馬登薛公逍遙臺前人嘗聞薛公淚非直雍門琴竄逐留餘跡悲凉見此心府中因暇豫江上幸招尋人事已成古風流獨至今閒情多感歎清景暫登臨無復甘棠在空餘蔓草深晴光送逺目勝氣入幽襟水去朝滄海春來換碧林賦懷湘浦弔碑想漢川沉曾是陪遊日徒為梁甫吟琴臺杜甫茂陵多病後尚愛卓文君酒肆人間世琴臺日暮雲野花留寶靨蔓草見羅裙歸鳳求凰意寥寥不復聞鳳凰臺山峻人不至髙頂前人亭亭鳳凰臺北對西康州西伯今寂寞鳳聲亦悠悠山峻路絶蹤石林氣髙浮安得萬丈梯為君居集作上上頭恐有無母雛饑寒日啾集作啁啾我能剖心出飲啄慰孤愁心以當竹實炯然忘外求血以當醴泉豈徒比清流所重王者瑞敢辭微命休坐看綵翮舉集作長縱意八極周自天銜圖䜟集作瑞圖飛下十二樓圖以獻集作奉至尊議以垂鴻猷再光中興業一洗蒼生憂深衷正為此羣盜何淹留登單父陶少府半月臺李白陶公有逸興不與常人俱築臺像半月逈出髙城隅置酒望白雲髙飈飛落梧集作髙飈起寒梧秋山入逺海桑柘羅平蕪水色緑且清集作明令人思鏡湖終當過江去愛此暫踟蹰陵歊臺前人曠望登古臺臺髙極人目疊嶂列遙集作逺空雜花間平陸閒雲入忩牖野翠生松竹欲覽碑上文苔侵豈堪讀登金陵鳳凰臺前人鳳凰臺上鳳凰遊鳯去臺空江自流吳時集作宫花草埋幽徑晉代集作國衣冠成古丘三山半落青天外二水中分白鷺洲總為集作盡道浮雲能蔽日長安不見使人愁蘇臺覽古前人舊苑荒臺楊柳新採菱歌唱不勝春只今惟有西江月曾照吳王宫裏人秋日登吳公臺上寺逺眺寺即陳將吳明徹戰地集作場劉長卿古臺搖落後秋入望鄉心野寺來人少寒峯隔水深夕陽依舊壘寒磬滿空林惆悵南集作前朝事長江獨至今嚴陵釣臺送李康成赴江東使劉長卿潺湲子陵瀨髣佛如在目七里人已非千年水空緑新安江上孤帆逺應逐楓林萬餘轉古臺落日自蕭條寒水無波更清淺臺上漁竿不復持却令猿鳥向人悲灘聲山翠至今在遲爾行舟晚泊時登戲馬臺作儲光羲君不見宋公杖鉞誅燕后英雄踴躍爭趍走小㑹衣冠吕梁壑大徵甲卒碻磝口天開神武樹元勳九日茱茰饗六軍泛泛樓船遊極浦搖搖歌吹動浮雲居人滿目市朝變霸業猶存齊楚甸泗水南流桐柏川沂山北走琅瑘縣滄海沉沉晨霧開彭城烈烈秋風來少年自言未得意日暮蕭條登古集作此臺題嚴陵釣臺張繼舊隱人如在清風亦似秋客星沉夜壑釣石俯春流鳥向喬枝聚魚依淺瀨遊古來芳餌下誰是不吞鈎阮公嘯臺包融荒臺森荆杞蒙蘢無上路傳是古人跡阮公長嘯處至今清風在時時動林樹逝者昔已逺升攀想遺趣靜然荒榛間久之若有晤靈光未歇滅千載知仰慕仙女臺釋皎然寂寞舊桑田誰家女得仙應無雞犬在空有子孫傳古木花猶發荒臺月尚懸暮來雲一片一作行雲低不散疑是却歸年和邢端公登臺春望句句有春字之什釋皎然春日繡衣輕春臺别有情春煙間草色春鳥隔花聲春樹亂無次春山遙得名春風正飄蕩春甕莫須傾嚴公釣臺顧况靈芝産遐方威鳳家重霄嚴生何耿潔託志肩夷巢漢后雖則貴子陵不知髙糠粃當世道長揖䕫龍朝掃門彼何人升降不同朝捨舟遂長往山谷多清飈辭魏博田尚書出境後感恩戀德因登藂臺楊巨源薦書及龍鍾此事鏤心骨親知殊浪浪疑作恨恨徒御方咄咄賔朋愴别傔僕請行藂臺邯鄲郭臺上見新月離恨始分明原闕二字更超忽懷仁淚空盡感事情又發他時屣履聲曉日照丹闕題嚴光釣臺歐陽詹弭棹歷塵跡悄然關我情伊無昔時節豈有今時名辭貴不辭賤是心誰復行欽哉此溪曲永獨古風清集作英風聲經嚴陵釣臺貽同舟者三字集作行侣許渾故人天下定歸釣獨悠悠集作碧巖幽舊跡隨臺古髙名寄水流鳥喧羣木晚蟬吟集作急衆山秋更待新安月憑君暫駐舟陵歊臺前人宋祖髙臺集作陵歊樂未回三千歌舞宿層臺湘潭雲盡暮山出巴蜀雪消春水來行殿有基荒薺合寢園無主野棠開百年應集作便作萬年計巖上集作畔古碑空緑苔青陵臺李商隱青陵臺畔日光斜萬古貞魂倚暮霞莫許韓憑為蛺蝶等閒飛上别枝花姑蘇臺曹鄴吳宫酒未銷又宴姑蘇臺美人和淚去半夜閶門開相對正歌舞笑中聞鼓鼙星散九重門血流十二街一去成萬古臺盡人不回時聞野田中拾得黃金叉登盧氏臺溫庭筠勝地當通邑前山有故居臺高秋盡出林斷野無餘白露鳴蛩急天時疑作晴天度鴈踈由來放懷地非獨在吾廬燕臺二首聶夷中燕臺纍黃金上欲招儒雅貴得賢士來更下於隗者自然樂毅徒趨風走天下何必馳鳳書旁求向林野二燕臺髙百尺燕滅臺亦平一種是亡國猶得禮賢名何似章華畔空餘禾黍生題賈島吟詩臺張喬吟魂不復遊臺亦似荒丘一徑草中出長江天外流暝烟寒鳥集殘月夜蟲愁願得生禾黍鋤平恨即休姑蘇臺劉駕勾踐飲膽日吳酒香滿杯笙歌入海雲聲自姑蘇來西施舞初罷侍兒整金叉衆女不敢妒自比泉下泥越鼓聲騰騰吳天滿塵埃難將甬東地更學㑹稽棲霸跡一朝盡草中棠梨開陵歊臺羅鄴髙臺今古一作日竟一作境長閒因想興亡百疑一作自慘顔四海已歸新雨露六朝空認舊江山槎翹獨鳥汀洲一作沙汀畔風亞荒榛雨雪間一作風過雪浪間好是輪蹄來往便誰人不向此躋攀望仙臺前人千金壘土望三山望一作雲鶴無蹤羽衛還若說神仙求便得茂陵何事隔一作在人間姑蘇臺羅隱讓髙泰伯開基日賢見延陵復命時未㑹子孫因底事解崇臺榭為西施文苑英華卷三百一十三
