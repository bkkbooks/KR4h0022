body:
  text: 文苑英華巻七百四十五宋李昉等編臣道樞宻論一首材之大小論一首四維論一首辯迹論一首明贄論一首三不欺先後論一首近代節士論一首舊臣論一首謀議論一首三惑論一首誠節論一首樞宻舊唐書作機論并序徐彦伯時公卿士庶舊唐書作王公卿士多以言語不慎宻為酷吏所䧟彦伯乃著論以誡於代其詞曰書曰唯口起羞惟甲胄起戎又云齊乃位度乃口易曰慎言語節飲食又云出其言善千里應之出其言不善千里違之禮亦云川文粹作曰可言也不可行也君子不言也可行也不可言也君子不行也嗚呼先聖知言之為大也知言之為急也精㣲以勸之典謨以告之禮經以防之守名教者何可不循舊唐書作脩其詁訓而服其糟粕乎故曰言語者君子之樞機也動唐書作發則物應文類作樞機發則物應物應則得失之兆見也得之者江海比隣失之者肝膽楚越然後知否泰榮辱繫於言乎夫言者徳之柄也行之主也心之志也唐書作志之端也身之文也既可以濟身亦可以覆身故中庸鏤其心右階銘其背南容三復於白圭殷唐書作箕子九疇於洪範良有以也是以掎摭瑕玷詳黜唐書作叅詳躁競審無恒以階亂將不宻以致危利生於口森然覆邦之說道不由衷變彼如簧之刺可不懼之哉其有識暗邪正思慮微形唐書作慮微形朕破金湯之籥伐唐書作封禍亂之根用呫囁為雄辯唐書作用詁讘為全計以號呶唐書作詉為令徳至若梧宮問答荆齊所以奔命韓魏加肘知伯所以危殘蔡侯䋲息媯也亟招甲兵之罰鄭曼圍宋唐書作圖宋卿也而受鼎鑊之誅史遷輕議終下蠶室張紘詭說更齒龍淵川粹作泉凡此過言其流匪一或穢猶糞土或動成刀劔或苟且其心或脂膏其體唐書作吻挾邪作蠱守之而不懈往輙破的去之而彌逺亦何異寒唐書作韓臯聚音龍也羣吠得死為幸何脩名之立乎雖復伯玉沮顔追謝於元凱蔣濟遺恨失譽於王陵犀首没齒於季章曹瞞齚舌於劉主當何及哉孔子曰予欲無言又云終身為善一言敗之惜也老子亦云多言數窮又云聦明深察而近於死者議人者也何聖人之深思偉慮杜漸防萌之至乎夫不可言而言者曰狂可言而不言者曰隠鉗舌拱黙曷通彼此之懐括囊而處孰啓謨明之訓則上言者下聴也下言者上用也睿喆之言猶天地也人覆燾而生焉大雅之言猶鍾皷也人考擊而樂焉作以龜鏡周唐書作姬公之言也出為金石孔唐書作曽子之言也存其家邦國僑之言也立而不朽臧生之言也是謂徳音詣川文粹作諧我宗極滿于天下貽厥後昆殷宗甘之於酒醴孫卿喻之以琴瑟闕里重於四時郢都輕其千乘豈不韙哉豈不休哉但懋績遠大唐書作懋探大猷川粹作茂績逺世克念丕訓審思而應精慮而動謀其心以後發定唐書作擇其交以後談不趦趄唐書作蹙趨川粹作戚趨於非黨不屏營於詭遇非先王之至徳不敢行非先王之法言不敢道翦其纍纍唐書作諜諜之緒撲其炎炎之勢自然介爾景福保兹終吉唐書作錫茲純嘏則悔吝何由而生怨惡何由而至哉孔子曰終日行不遺已患終日言不遺已憂如此廼可以言也戒之哉戒之哉材之大小論已見三百六十三巻李華四維論柳宗元管子以禮義廉耻為四維吾疑非管子之言也彼所謂廉者曰不蔽惡也世人之命廉者曰不苟得也彼所謂耻者曰不從枉也世人之命耻者曰羞為非也然則二者果義歟非歟吾見其有二維未見其所以為四也夫不蔽惡者豈不以蔽惡為不義而去之乎夫不苟得者豈不以苟得為不義而不為乎雖不從枉與羞為非皆然集有也字然則亷與耻義之小節也不得與義抗而為維聖人之所以立天下曰仁曰義仁主恩義主斷恩者親之斷者宜之而理道畢矣蹈之斯為道得之斯為徳履之斯為禮誠之斯為信皆由其所之而異名今管氏所以為維者殆非聖人之所立乎又曰一維絶則傾二維絶則危三維絶則覆四維絶則㓕若義之絶則廉與耻其果存乎廉與耻存則義果絶乎人既蔽惡矣苟得而文粹無而字從枉矣為非而無羞矣則義果存乎使管子庸人也則為此言管子而少知理道則四維者非管子之言也辯迹論劉禹錫客有能通本朝之雅故者曰時之汙隆集作崇視輔臣之用房與杜迹何觀焉建官取士之制地征口賦之令禮樂刑法之章因隋而已矣二公奚施為余愀然曰三王之道猶夫循環非必變焉審所當救而已隋之過豈制置名數之間耶顧名與事乖耳因之何害焉夫上材之道非務所舉必的然可使户曉為迹也吾觀梁公之迹章章如縣㝢集作寓川文粹作萬矣曷然哉請借一以明之史不云乎初太宗怒渾戎之横于塞也度諸將不足以必取當宁而嘆曰得李靖為師快哉靖時告老且病矣梁公虛其心以起之靖忘老與病一舉虜其君郡縣其地而還夫非伐國之難能也起靖之難能也靖非不克之為慮居功之為慮也古之為將度柄輕不足以遂事重則嫌生焉是以有辭第以見志有多産以取信有子質以㓕貳有嬖監以虞謗其多患也如是若靖者名既成位既崇重失畏偪其患又甚焉微梁公之能盡才能捍患能去忌能照私彼姑藉舊勞居素貴足矣惡乎起哉夫豈感空言而起耶心相見久矣夫豈􅎖小信而要耶道相籠久矣其後李敬𤣥擅能失材臣而敗随之林甫自便進蕃將而亂随之由是而言固相萬矣子方規規然窺上材以户曉之迹此吾之所以不取也若杜萊公者在相位日淺將史失其傳然以梁公之鑒裁自天䇿府遂以王佐材許之則是又能以道籠房公者矣房之許與迹孰甚焉客無以應而作劉子曰觀書者當觀其志慕賢者當慕其心循迹而求雖博寡要信矣明贄論古之人動必有以將意故執贄之道自天子逹焉夫芬芳在上臭逹於下而温粹無擇有似乎聖人者鬯也故用於天子清越而瑕不自揜潔白而物莫能汙内堅剛而外温潤有似乎君子者玉也故用乎諸侯執之不鳴刑之不嘷似死義者乳必能跪似知禮者羔也故卿執焉在人之上而有先後行列者鴈也故大夫執焉耿介而一志雉也故士執焉視其所執而知其任是故食愈重而志愈卑位彌尊而道彌廣耿介之志唯士得以行之何也務細而所試者寡齒卑而所蔽者衆言未足以動聴故必激發以取異行未足以應遠故必砥礪以沽聞借令由士為大夫捨雉而執鴈其志也随之顧集作故耿介之名不施於大夫矣況其上乎然則為士也不思雉之介為卿也能思羔之禮歟今夫或者不明分集作介推理而觀之則曰此居下而嗜直者是必得志而稔其訐矣彼當介而務𢎞者是必處高而肥其徳矣曾不知訐當其分集作介則地易而自遷𢎞非其所則志遂而無制矣於戱責士以卿大夫之善猶喻君以士之行耳予以執贄之道得其分集作介苟推分集作介明矣求刑罰之僣濫得乎三不欺先後論吕温昔宓子賤為單父也人不忍欺之國僑為鄭也人不能欺之西門豹為鄴也人不敢欺之此皆為政不同同歸于理作幹事之稱首貽牧人之經範汪洋古今輝焯圖史窮理而語固有優劣擇善而行豈無先後請試論之子賤仕衰亂之魯而邑偪強齊仗義為城池倚仁為干櫓當鯨吞之大敵鳩狼顧之遺黎渙離形檢妙用心術惠訓不倦乃無得而稱視民如傷而不有其愛感而動之隂陽運於無言誠而明之日月懸於方寸是則不求不欺於人而人不忍欺矣子産攝晉楚之間而靖恭爾位集作次役智利物􅎖躬勵俗守之以信行之以禮告之以慈惠臨之以明察如鏡洞照如衡誠懸是則求人不欺而人亦不能欺矣西門豹當戰國之際集作初而克脩茂績身為集作有紀律言有典章剛包其柔威克厥愛權之以法制董之以刑罰火烈人望霜清物心是則責人不欺而人固不敢欺矣夫不忍欺者至誠潜感是曰上徳堯舜之吏也不能欺者明智旁達是曰有政三王之吏也不敢欺者嚴威允濟是曰能刑五霸之吏也誠不足至於智智不足至於威大小之間朗然可見然而事在折衷理資漸致徳宜全舉道貴兼通必也脩誠而棄智誠未至而致理或虧任智而廢威智未周而暴亂將起不若兼集作總而行之迭收其効一之日二之日刑明威立使人畏而不敢欺三之日四之日智達政成使人敬而不能欺五之日六之日志孚誠格使人感而不忍欺以寛濟猛同二氣之集作而和平自邇陟遐比三才之集作而具羙苟非全徳大噐其孰能至於此乎若不暇㑹其源流統其宗極而姑文粹作始定優劣直論先後則堯舜之吏與王霸不同年而語矣近代節士論李徳裕客又謂余曰近世將相既已聞之矣敢問士君子身在下位而義激衰世者有其人乎余曰焉得無之丁生魏生是也昔蓋寛饒多仇少與在位及貴戚人與為怨唯諫議大夫鄭昌愍傷寛饒忠直憂國為文吏所詆挫上書曰山有猛獸藜藿為之不採國有忠臣姦邪為之不起寛饒上無許史之属下無金張之託職在司察直道而行鄭昌可謂好是正直矣梅福南昌一尉耳與王章無薦引集作寵之私無遊宴之好當王鳯之世權歸外戚上書曰鳶鵲遭害則仁鳥増逝愚者䝉戮則智士逺退折直士之節結諫臣之舌羣臣皆知其非然不敢獨集夲作能爭天下以言為戒最國家之大患也梅福可謂不畏強禦矣余頃嵗待罪廟堂六年竊位而言責之官執憲之臣屢集作属薦丁生稱其有清直之操亦有毁之者曰體羸多病必不能舉職余惑是說未及升之於朝而一旦觸羣邪犯衆怒為一孤臣獨夫正言無避亦鄭昌梅福之比也昔貫高竟能以不死白王而高祖賢其然諾戴就不忍以臣謗其君而薛安感其壯節周燕寧恨於不食陸績豈辭於禁錮世歴千祀有此幾人魏生為酷吏所逼終不詘服辭義雅正有古人之風亦貫高戴就之儔也嗚呼田叔孟舒皆位顯於朝而魏生以輿疾逺竄溘盡道途疑其幽魂必上訴於天矣或曰自古名節之士鮮受厚福豈天意於善人薄耶余曰非也夫名節者非危亂不顯非險難不彰免鈇鑕全性命者尚十無一二集作二三況福祿乎若使不受困辱不嬰楚毒父母妻子怡然安樂則天下之人盡為之矣何貴於名節者哉舊臣論或問先王論道之臣事後王乎曰不改先王之道則事之改先王之道則去之以事堯之心事舜禹者其咎繇益稷乎以事武王之心事成王者其周召乎以事漢高之心事惠帝者其蕭曹乎曹叅尚不易蕭何之規況高祖之道昔區區楚國醴酒不設穆生先去且穆生豈為已乎蓋傷廢先王之道不忍見後王之靣其不去者焉得免胥靡之恨哉魏晉以蜀本作已降居相位者皆靦靣愧心而已又有攘臂於其間者掎摭先王之道以諱舊過改張先王之道以媚新君棄先王之故老以掩其羞用先王之罪人以恊其志若天地間無神明則已儻有神明鬼得而誅之矣謀議論欲知謀議之用捨身名之榮辱觀其立論何如集作可知也切於時機明於利害人主易曉當世可行其謀必用而終有後咎晁錯主父偃是也何者切時機明利害皆怨誹所由生主享其利而自罹其害謀濶意中言高㫖遠其道可法其術則疏必有高名而不用於世賈山王陽是也謀既集作議不行故能無患智足應變道可與權言雖切於人情意常篤於禮義謀不盡用而身無近憂賈誼是也故當漢文之世亦無高位余門客崔權其世叔即宋廣平之維私也崔世叔名犯廟諱又嘗預燕公代公之戎幕故知三丞相才業甚備曰廣平好言政事燕公好言文學至於經國逺慮意鮮及之與代公言初若渉川未知所止寥廓廣大莫見津涯味之既深恩集作思意愈宻代公嘗為西北邊將帥論四夷思慮必精逺則崔生集無生字之言信有徴矣凡侍坐於君子聞其言可以知其才術逺近用此道也三惑論王炙轂子曰漢史載楊秉能三不惑歴代以為羙也然三惑之中利病各異論曰夫惑於酒者敗賢能損道徳廢家業顛狂致疾生於身軀夭折壽考故湏誡於過度也且阮籍劉伶陶潜畢卓皆惑於酒悉無所成至於得溺酒名而已夫惑色者壊禮樂損門風傷殘形骸耗蠧金帛怨雖不歛於夷夏政且有妨於霸王齊桓内寵如夫人者六姬外嬖豎貂疑作豹左傳寺人貂雍巫即易牙也衞靈同斛浴者三人内愛南子外滛彌瑕之類是也夫惑於財者小則亡身破家大則辱先㓕國聚鹿臺之錢積巨橋之粟掊一作擭胎拾卵惟利是求盗璧攫金刑戮不懼而又必厚於已而薄於人則義不及於宗親恩不加於左右如此必不得人心而失衆情孟子曰推恩足以保四海不推恩不足以保妻子故君視臣如手足則臣視君如腹心書曰撫我則后虐我則讐斯之謂也苟專利矣則嘉言令猷弗得聞矣過謬錯誤莫得知矣近侍者倳刅以懐憾疎逺者聚謀釁待舋憾舋一發身首分離傳曰象有齒以焚其軀賄故也又曰疋夫無罪懐璧其罪則三惑之甚其在兹乎昔漢高祖使隋何說黥布歸漢布既謁漢王倨慢布悔來欲自殺及就舍供帳與高皇無異布乃大恱燕丹之奉荆卿也子女玩好恣其所欲然後渡易水不以為寒刺秦王視死如歸夫黥布荆軻雄傑之士也猶以服饌聲色變以移志况今將帥士伍乃中才之士乎若不結之以信義厚之以恩賞彼安肯效命死節為貪鄙恡嗇之主哉故士有言曰爾之財賄尚惜我之性命詎可輕捐古語云使人造舟車猶豐酒食冀彼竭機功疑作巧則舟無毁溺之患車免顛覆之憂今驅䇿賢能駕御英傑餙甘言以誘掖矯禮貎以卑和欲其盡赤誠竭計䇿其用飴蜜以誇賺嬰兒曽不知聦明之士見其肝膽鏡其詐偽亦持虛以待虛設詐以禦詐國士遇我我以國士報之衆人遇我我以衆人報之項羽刓印賢豪叛去曹公慢易天下鼎分是知三惑之中酒者致疑之可矣色者放之可矣財者下愚之醜行也致疑放逐刑戮所宜加投畀豺虎投畀有昊以謝乎衆矣誠節論炙轂子曰漢史著誠節立名之士謂其能執一不回死義不顧雖湯鼎之威霜刃之刑不能脇之故節義彰明顯於後世存無一作則愧於英俊没無一作則果一作畏於神靈蕩蕩然偃於暗室之中堂堂然行於日月之下卓為人傑乃有節有義之士也夫能如此者亦賢哲之一體客曰誠如是無乃滯於變通而能成功則拙疑杖節死義可矣既不能杖節死義又不能變通成功此謂之偷生無耻之夫昔李陵降匃奴又要成功致老母伏誅妻子棄市斯始規變通而終為負義且臨患難履顛危雖商賈小人屠沽賤品猶能相拯於窮蹙尚乃任情於依託矧乎頂章甫冠拖縫掖衣口誦先聖之文胸懐徳義之典目曰儒士而無慷慨之心不有風雲之操亦何以見分明之男子磊落之丈夫昔如敬通不脩亷隅杜篤請求無厭班固謟竇以作威馬融黨梁而黷貨丁儀貪婪而乞賄路粹哺啜而無耻皆文儒之所賤貞介之所羞夫士無信不可以立身無義不可以立名無節不可以成功無忠不可以成事四者不懐則情同犬豕行比豺狼安足以齒於人倫哉客曰先生斯論不亦傷於嫉惡太甚乎對曰嫉惡不甚則好善不篤若見惡不能去則邪佞之人羣臻知善不能用則賢良之士引去苟懐誠節安得不嫉謟諛今公卿席客蔑馮諼毛遂之忠誠侯伯幙賔肆李園祖珽之欺詐或受賂賣主奉越以事吳或首䑕兩端觀成而望敗窮其操心姦宄蘧蒢戚施與夫誠節之士執一不回死義不顧者亦何遼廓論未已客曰若乎先王之論誠亦富茂迺歛衽而退文苑英華巻七百四十五
