body:
  text: 文苑英華卷八百二十一宋李昉等編釋氏五幢尊勝幢記一首如信大師功德幢記一首方丈西軒附廬山東林寺觀音方丈記一首西軒記一首僧大智禪伯碑隂記一首信州南巖草衣禪師宴坐記一首東都龍興寺鎮國般舟道場均上人功德記一首嵩嶽圭禪師影堂記一首幢尊勝幢記穆員我生同氣者七人先五後二兄姊弟妹半之不弔天降割于我今年春夏次妹安國寺大德尼伯姊前烏程令𢎞農楊夫人逾月繼酷先是兩兄郴州刺史贊前右補闕貶連州司馬質從官於逺員洎弟妹前監察御史賞前監察御史河東裴某妻痛支體一斷終天不續乃相與鬻衣尾直揭兹靈幢願得輕風微塵洎日月度影之所及也深兹至念慘與之怛一作俱然則巍巍永永斯乎一作期受風土日月相無極焉是幢也實表安國之塔伯姊之隧貞元六年秋七月七日前侍御史穆員記如信大師功德幢記白居易有唐東都臨壇開法大師長慶四年二月十三日終于聖善寺華嚴院春秋七十有五夏臘五十二是月二十二日移窆于龍門山之南岡寶厯元年某月某日遷葬于奉先寺附其先師塔廟穴之上不封不樹不廟不碑不勞人不傷財唯立佛頂尊勝陀羅尼一幢髙若干尺圍若干尺六隅七層上覆下承佛儀在上經呪在中記讚在下皆師所囑纍集作果而門人奉遺志也師姓康號如信襄城人始成童受蓮華經於釋巖既具戒學四分律於釋晤後傳六祖心要於本院先師淨心名楞伽俱舍百法經根論披閲集作經根論枝又作經論披閲罔不通焉繇是禪與律交修定與慧相養蓄為道粹揭為僧豪自建中訖長慶凡九遷大寺居十輔大德位涖法㑹主僧盟者二十二年勤宣佛命卒復祖業若貴賤若賢愚若中小大乘人逰我門繞我座禮我足如羽附鳳如水㑹海於戲非夫動為儀言為法心為道場者則安能使化緣法衆悅隨欣戴一至於是耶同學大德繼居大集作夲是院者曰智如弟子上首者曰嚴隱暨歸靖一作精藏周常賁懷嵩圓恕圓昭獨本作照貞操等若干人聚謀幢事琢刻既成將師治集作理命請蘇州刺史白居易為記記既訖因書二四句偈以讚云師之度世以定以慧為醫藥師救療一切師之闍維不塔不祠作功德幢與衆共之方丈廬山東林寺觀音方丈記釋元楚觀音於諸先覺猶孔門之有亞聖其悲智應用鴻纎毫億剎常如視諸掌是以郢川屈殳因伯兄宗厚上人為空王入室弟子手足相愛嘗得聞斯語遂捨二十萬於新殿東南造觀音方文一間四一作兩厦西嚮峻棟嵒嵒間出廊廡又以香泥像普門功德克類端莊天飾梵儀如語如默危冠百寶風容動搖式繄拳拳靈貺斯在俾愚菲薄旌置堅貞愚無文苟欲贊其播植善稼於斯而已矣噫兹寺也自晉于唐五百餘載以土木有壞因而造一作去之者數也真風未弭因而復之者時也由是前九江太守給事中博陵公奉詔指撝之舊龍象三十人經營建立之方三四年基構宏壯特新前降一作際遂得爐峰增色圖牒再張車蓋貴遊結轍林下逢迎相賀輝動巖軒挹虎溪之波瀾清麈尾之風韻閲繹故事飽飫前生從容吟嘯而去若是則安知來者之無柴桑乎往者之無鴈門乎矧馨香庭實千花雪明重修白社期在旦夕矣愚江干宿一作暮齒常夢寐舊岑力抒肺腸逺謝泉石亦厚公之惠也以唐十六葉聖宣皇帝大中六年壬申春二月十五日江夏僧元楚記西軒記栁宗元永貞中余名在黨人不容於尚書省出為邵州道貶永州司馬至則無以為居居文粹作寓龍興寺西序之下余知釋氏之道且久固所願也然余所庇之屋甚隱蔽其户北面集粹作向居昧昧也寺之居於是州為髙西序之西屬當大江之流江之外山谷林麓甚衆於是鑿西墉以為戶戶之外為軒以臨羣木之杪無所不矚不徙席不運几而得大觀夫室向者之室也席與几向者之處也向也昧而今也顯豈異物耶因悟夫佛之道可以轉惑見為真智即羣迷為正覺捨大暗為光明夫性豈異物耶孰能為余鑿大昏之墉闢靈照之戶廣應物之軒者吾將與為徒遂書為二其一志諸戶外其一以貽選上人焉僧大智禪伯碑隂記楊伯成夫道非言言以明道也空非相相以泯空也禪師彌天宜符曠劫傳中出等等騰一作勝非非適來時也適去順也上自宸扆下達蒸黎才仰青蓮之光旋驚白林之㑹中書侍郎嚴公探祕藏決詞江洋洋兮文宗昭昭乎靈迹某殊昧先覺忝在後塵糾合羣公激揚衆美豈翰墨以云朽將金石以齊固所為一作謂非六經曷以明夫子也非四偈曷以曉真如也凡捨淨財者人具顯爵里于時嵗在辛已五月庚戌朔十八日丁卯皇唐開元十七年傳中一作傳印信州南巖草衣禪師宴坐記權德輿信州南巖有清淨宴坐之地而禪師在焉師所由來莫得而詳初州人析薪者遇之于中野文粹作野中其形塊然與草木俱咨於州長乃延就兹地三十年矣州人不知其所以然也遂以草衣號焉足不蹈地口不嘗味日無晝夜時無寒暑寂默之境一繩牀而已萬有囂然此心不動其內則以三世五藴皆從妄作然後以無有法諦觀十二因緣於正智中得真常真我方寸之地湛然虛無身及智慧二俱清淨微言軟語有時而聞涉其境之逺近隨其根之上下如雨潤萬物風行空中履其門皆獲趣入若非斡𤣥機於無際窮實相之源底則四時攻於外百疾生於內矣古所謂遺物離人而立於獨者禪師得之嗚呼世人感集作惑物以逰心心遷於物則利害生焉吉凶形焉牽攣羈集作料鞿鎖蕩而不復至人則返靜於動復性於情夭夀仁鄙之殊由此作也斯蓋世諦之一說耳於禪師之道其猶稊稗耶建中二年豫以使役道于上饒時左司郎崔公出為郡佐探禪師之味也熟為豫詳言之拂拭纓塵攜手接足洗我以善得於儀形且以為楞嚴之妙旨毗耶之密用皆在是矣又焉知此地之宴坐不為他方之說法乎故粗書聞見以志于石東都龍興寺鎮國般舟一作共下同道場均上人功德記穆員按經文我以神力供養不如以身供養故曰若能然手指乃至足指者是名第一之施蓋菩薩之行也今我上人以兩臂為爐爇香千度用芬苾蕭膋之義以簡萬望夫以百福莊嚴之重千度焚燒之苦與夫一指之功不為多乎又刺體之血以嚴經像若素為塗若繪為綵若寫為墨凡成就阿彌陀佛一軀觀音勢至二善二菩薩各二事經千卷經一有稱字以皮為紙以血為墨書寫經戒亦菩薩之行也曷若加之圖像三十二相八十種好盡取諸身乎上人姓王氏東周河南人七嵗喪所恃十一喪所怙童䝉孤子無兄弟之親自毁其生用集封樹已而嘆立身揚名無逮既往乃發大𢎞誓以報罔極大厯五年始居龍興寺鎮國般舟道場爾來足不踰閾者垂三十載其為業也形不住心夜不息晝外不舍百刻之一中不遷萬化之二勞其形與天健精其志與日新蹈極樂於自闕之操前後以一月有一旬有九一作五日為一息者不記百數其願以本尊本以願為願其病以衆生之病我為病我生未已我病曷祛我病未祛我願曷已然則大慈大悲之誓竟我願云竟無邊生生之苦盡我病焉盡我生有滅我願與生生俱生我形或勞我心與極樂無極巍巍乎可思量哉員太夫人河東郡太夫人性合真如業通禪寂嘗謂學者千萬達者二三茍未至於心離有無迹超生滅則苦行為難為至誠格諸天念嚮羣聖亦足使見聞聳善逺邇歸心况乎蚩蚩回向之徒聞道甚稀睹相且衆則上人所以持本教濟衆生與夫禪門諸祖迭為舟梁可無愧矣又懼夫物之尤者見異於類行之殊者或疑於常申命小子以紀精一作積苦之能所以題之於此貞元十年五月二十五日前侍御史河南穆員記嵩嶽圭禪師影堂記許籌籌僅童知佛業儒雜老莊德慕𤣥空一作究靡極營儒身及進士第一年尉告成明年逰是嶽謁律德唯珙上人引將布覽至圭大師影堂珙公曰子嘗識圭公覺疑衍否曰未云圭公覺道靈威莫可周名獨有嶽神為大師移植松柏於東巖事碑塔所不書圭公之誠一作誡杜從祅也且佛說羣經事又焉可徇圭公謙勝哉珙欲頌之患辭不文子進士也矧僅童知佛尚一有書字信圭公謙勝乎籌唯藏惑偶得嵩陽居士喻應真與洛陽處士陳惟復書言嶽神為圭公植樹事甚備曰大師法諱元圭俗姓李氏伊闕縣人也太宗朝甲辰嵗生髙宗代癸亥嵗具戒𤣥宗帝丙辰嵗化滅歷年七十三始𨽻閒居寺習律安少林味禪後廬龎塢將化謂其徒仁素曰吾始志閒居寺東嶺我滅爾必塔吾骸于兹開元十一一作二年素力允師之志喻陳二髙士曰大師嘗寂定結廬戔山巖一作卜廬於嶽之龎塢時嶽神輕步謁大師大師覺精神不世謂曰仁者胡來而復何往一作善來仁者胡為而至神曰師寧識我耶大師曰吾觀佛與衆生等吾一目之豈分别識一無此字耶神曰我斯一作此嶽神也能以怪一作生死痛害一無此五字生死於人師安得一目我哉大師曰汝能生於人一無此五字吾本不生汝焉能死吾視身與空等視吾與汝等汝能壞空與汝乎茍能壞空及壞汝闕則不生不滅也汝尚不能若一作如是又焉能生死吾也一作邪神稽首禮曰我亦聰明正直於餘神而謂是神一無此四字豈一作詎知師有廣大過空之智辨也一作乎願授以正戒梯拔世間一作令我度世大師曰神一作汝既乞戒即既戒也所以者何戒外無戒又何戒哉神曰此理也非濟岸梯杭之事七字一作我聞茫昧止求師戒我身為門弟子大師辭不獲即為張座焚香秉爐正几曰付汝五戒汝一作若能奉持即應曰能不能即曰否神曰敬奉戒一作謹受教大師曰汝能不淫乎神曰亦娶也大師曰非為一作謂下同此也謂無羅欲也神曰能大師曰汝能不盜乎神曰何乏我也焉有盜取哉大師曰非為此也謂嚮取二字一作嚮而福淫不供而禍善也神曰能大師曰汝能不殺乎神曰正柄在居一作實司其柄焉曰不殺大師曰非為此也謂有濫誤混疑一作疑混也神曰能大師曰汝能不妄乎神曰我本正直焉能有妄乎大師曰非為此也謂先後不合天心也神曰能大師曰汝能不遭酒敗乎神曰力一無力字能大師曰如上是為佛戒也又言以有心奉持而無心拘縶以有心為物而無心想身如能是則先天地生不為精後天地死不為老跳身為帝王不為崇髙命子為輔相不為富貴一無此十八字終日變化而不為動畢竟一作盡寂默而不為休悟此則雖娶非妻也雖嚮一作鄉非取也雖柄非權也雖作非故也雖醉非惛也若能無心與萬物則羅欲不為淫福淫禍善不為盜濫誤混疑一作疑混不為殺先後違天不為妄惛荒顛倒不為醉是為一作謂無心也無心則無戒無戒則無心無衆生則無我無我則無汝十一字一作并無佛無衆生無汝及無我無汝孰能一作為戒哉神又曰我神通亞佛大師曰汝神通十句五能五不能佛神通二字作則一十句七能三不能神竦然避席跪唘曰可得聞乎大師曰汝能拔一作戾上帝東天行而西七曜乎神曰不能又一作師曰汝能奪地祗融五嶽而結四海乎神曰不能大師曰是為一作謂五不能也佛能空一切相皆滅萬法一作成萬法智而不能即滅定業佛能知羣有性窮億劫事而不能化導無緣佛能度無量有情而不能盡衆生界英華無此十八字止作遷抑自然是為三不能也定業亦不能一無此字牢久無緣亦謂一期衆生界本無增減十三字英華作自然亦不能彌極恆一作亘無一人能主有法有法無主是謂一作為無法無法有一作無主是為一作謂無心如我悟一作解佛亦無神通也但能以無心通逹一切法爾嶽神頓首作禮曰我誠淺昧未聞空義大師指我戒我我當化矣十字一作師所授戒我當奉行更何業因何拘塵界一無此八字我一作今願報慈德效我所能大師曰吾觀身無物觀物一作法無常法窟一無此二字塊然更有何欲神曰師必命我為世間事展我小神功使已發心初發心未發心不信心必信心五等人目我神蹤知有佛有神有能有不能有自然有非自然者也一無此字大師曰無為是無為是神曰佛亦使神護法師寧隳叛佛耶須請告我四字一作須隨意垂誨大師意不獲遂三字一作不得已而言曰東嶽一作巖寺之障也莽然無樹北岫有之而能能字一作皆非屏擁汝能神力移北樹於東嶺乎神曰謹奉一作已聞命矣又陳我假昏夜風雷擺搖震運十二字一作然昏夜願間必有喧動師無駭即作禮辭去大師門送且觀之見儀衛逶迤如王者象象字一作之狀又復碧烟紅霞紫風皓氣錯散四逺十四字一作嵐靄煙霞紛紜間錯幢幡鉞一作環珮凌髙寢空四字一作凌空隱沒焉其夕果有迅一作暴風吼雷奔雲震電大壯棟宇岌嶪將圯定僧瞻動牙捉仆叫十八字一作棟宇搖動宿鳥聲喧大師安一作謂衆曰無怖無怖神與我相契矣啓一作詰旦和霽則北巖松檜一作栝盡移東嶺森然行植焉而一無此字大師謂其徒曰吾歿有塔我者有碑我者無紀是事十四字一作吾歿後無令外知若為口實人將祅我也籌得開元中喻陳二居士狀一有將字師之行因珙公請為影堂記遂群而書之此篇英華自結廬而下多脫誤今以景德傳燈録增入其異同注為一作文苑英華卷八百二十一
