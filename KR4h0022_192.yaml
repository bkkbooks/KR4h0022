body:
  text: 文苑英華卷一百九十二宋李昉等編樂府一樂府共六十卷以藝文類聚初學記文粹諸人文集并郭茂倩劉次莊樂府參校注下同者為一作京洛篇二首帝王所居篇一首帝京篇十一首煌煌京洛篇二首新城安樂宫三首凌雲臺二首長安道十六首洛陽十七首京洛篇梁簡文帝南遊偃師縣斜上灞陵東回瞻龍首堞遙望德陽宫重門逺照曜天閣復穹㝫城旁疑復道樹裏識松風黃河入洛水丹泉繞射熊夜輪懸素魄朝天一作光蕩碧空秋霜曉驅鴈春雨暮成虹咸一作曲陽曲陽侯漢外戚王根也造甲第髙安還禁中劉蒼歸作相竇憲出臨戎此時車馬合兹晨冠蓋通誰知兩京盛歡宴遂無窮同前李巨仁京洛類神仙藹藹却雲烟漸臺臨太液玉樹並甘泉車喧平樂外騎擁濯龍前競結蕭朱綬爭攀李郭船獨悲韓長孺死灰猶未燃帝王所居篇張正見崤函雄帝宅宛雒壯皇居紫微臨復道丹水亘通渠沉沉飛雨殿藹藹承明廬兩宫分槩日雙闕並凌虛休氣充青瑣榮光入綺疏霞明仁夀鏡日照凌雲書鳴鸞背鳷鵲詔蹕幸儲胥長楊飛玉輦御宿陟金輿柳葉緹飄騎槐花影翻車薄暮歸平樂歌鐘滿玉除帝京篇並作十首唐太宗秦川雄帝宅函谷壯皇居綺殿千尋起離宫百雉餘連甍遙接漢飛觀逈凌虛日月隱層闕風煙出綺疏二巖廊罷機務崇文聊駐輦玉匣啓龍圖金繩披鳥一作鳳篆韋編斷方續縹帙舒還卷對此乃忘憂一作淹留欹案觀墳典三移步出詞林停輿欣武宴雕弓寫明月駿馬疑流電驚鴈落虛弦啼猿悲急箭閲賞誠多美於兹乃忘倦四鳴笳臨樂館眺聽歡芳節急管韻朱絃清歌凝白雪彩鳳肅來儀𤣥鶴紛成列去兹鄭衛聲雅音方可悅五芳辰開一作追逸趣禁苑信多竒橋形通漢上峯勢接雲危煙霞交隱映花鳥自參差何如肆轍跡萬里賞瑶池六飛蓋去芳園蘭橈遊翠渚梁一作萍間日影亂荷處香風舉桂楫滿中川絃歌振長嶼豈獨汾河曲方為歡宴所七落日一作日落雙闕昏回輿九重暮長烟引一作散初碧皎月澄輕素褰幌玩琴書開軒引雲霧斜漢耿層閣清風搖玉樹八歡樂難再逢芳晨真一作良可惜玉酒泛一作溢雲罍蘭肴陳綺席千鍾合堯禹百獸諧金石得志重寸隂忘懷輕尺璧九建章歡賞夕二八盡妖妍羅綺昭陽殿芬芳玳瑁筵珮移星正動扇掩月初圓無勞上𤣥圃即此對神仙十以兹遊觀極悠然獨長想披卷覽前蹤撫躬尋既往望古茅茨約瞻今蘭殿廣人道惡髙危虛心誡盈蕩奉天竭誠敬臨民思惠養納善察忠諫明科慎刑賞五六誠難繼四三非易仰廣待淳化敷方嗣云亭響同前駱賓王山河千里國城闕九重門不睹皇居壯安知天子尊皇居帝里崤函谷鶉野龍山侯甸服五緯連影集星躔八水分流橫地軸秦塞重關一百二漢家離宫三十六桂殿隂岑對玉樓椒房窈窕連金屋三條九陌鳳一作麗城隈萬户千門平旦開復道斜通鳷鵲觀交衢直指鳳凰臺劍履南宫入簪纓北闕來聲明冠寰宇文物象昭回鈎陳肅蘭戺璧沼浮槐市銅羽應風回金莖承露起校文天祿閣習戰昆明水朱邸接一作抗平臺黃扉通戚里平臺戚里帶崇墉炊一作灼金饌玉待鳴鐘小堂綺帳三千户大道青樓十二重寶蓋雕鞍金絡馬蘭忩繡柱玉盤龍繡一作綺柱璇題粉壁映鏘金鳴玉王侯盛王侯貴人多近臣朝遊北里暮南鄰陸賈分金將燕喜陳遵投轄正留賔趙李經過密蕭朱交結親丹鳯朱城白日暮青牛紺幰紅塵度俠客珠彈垂楊道倡婦銀鈎採桑路倡家桃李自芬一作芳菲京華遊俠事一作盛輕肥延年女弟雙鳳入羅敷使君千騎歸同心結縷帶連理織成衣春朝桂樽樽百味秋夜蘭燈燈九微翠幌珠簾不獨映清歌寶瑟自相依且論三萬六千是寧知四十九年非古來名一作榮利若浮雲人生倚仗信離一作難分始見田竇相移代我聞衛霍有功勳未厭金陵氣先開石槨文朱門無復張公子灞亭誰畏李將軍相顧百齡皆有待居然萬物咸應改桂枝芳氣已銷亡柏梁髙宴今何在春去春來若自馳爭名爭利徒爾為久留郎署終難遇空掃相門誰見知當時一作莫矜一旦擅豪華自古千載長驕奢倐忽摶風生羽翼須臾失浪委泥沙黃雀徒巢桂青門遂種瓜黃金銷鑠素絲變一貴一賤交情見紅顔宿昔白頭新脫粟布衣輕故人故人有湮淪新知無意氣灰死韓安國羅傷翟廷尉已矣哉歸去來馬卿辭蜀多文藻楊雄仕漢乏良媒三冬自矜成足用十年不調幾邅回汲黯薪逾積孫𢎞閣未開誰惜長沙傅一作賦獨負洛陽才煌煌京洛行張正見千門儼西漢萬户擅東京凌雲霞上起鳷鵲月中生風塵暮不息簫管夜恆鳴唯一作誰當賣藥樹不入長安城同前戴皓欲知佳麗地為君陳帝京由來稱俠窟爭利復爭名鑄銅門外馬刻石水中鯨黑龍過飲渭丹鳳俯臨城羣公邀一作惡郭解天子問黃瓊詔幸平陽第騎指伏波營五侯同拜爵七貴各垂纓衣風飄颻起車塵暗浪生舞見淮南法歌聞齊后聲揮金留客坐饌玉待鐘鳴獨有文園客一作令偏嗟武騎輕新城安樂宫梁簡文帝遙看雲霧裏一作中刻一作列桷映丹虹珠簾通曉日金華拂夜風欲知歌管處來過安樂宫同前隂鏗新宫實壯哉雲裏望樓臺迢遞翔鵾仰聫一作連翩賀燕一作雀來重簷寒露一作霧宿返景一作返井又作丹井夏蓮開砌石披新錦花梁畫早梅欲知安樂盛歌管雜塵埃同前陳子良春色照蘭宫秦女旦忩中柳葉來眉上桃花落臉紅拂塵開扇匣卷帳却薰籠衫薄偏憎日裙輕更畏風凌雲臺謝舉綺甍懸桂棟隱映傍一作月旁又作曖槁柯勢髙凌玉井臨逈度金波易覺凉風至早飛秋葉一作鴈過髙臺相思曲望遠騷人歌幸矚一作屬此迢遰知承寒露多一作雲霧多同前王褒髙臺懸百尺中央殊未窮北臨酸棗寺西眺明光宫城旁抵雙府林裏對相風書題鹿盧榜觀寫飛亷銅忩開神女電梁映美人虹虞捐濫失寵鄭瞀特懷忠莊生垂翠釣昭儀拒一作抵鬬熊馳輪有盈闕人道亦汗隆還念西陵舞非復鄴城中長安道梁簡文帝神臯開隴右陸海實西秦推輪抵赤縣一作金槌抵長樂復道向宜春落花依度幰垂柳拂行人金張與一作及許史夜夜尚留賔同前梁元帝西接長楸道南望小平津飛甍臨綺翼輕軒影畫輪雕鞍承赭汗槐路起紅塵燕姬雜趙女淹留重上春同前庾肩吾桂宫延復道黃山開廣路逺聽平陵鐘遙識新豐樹合殿生光彩離宫起煙霧日落歌吹還塵飛車馬度同前蕭賁前登灞陵岸還瞻渭水流城形類北斗橋勢似牽牛飛軒駕良駟寶劍雜輕裘經過狹斜里一作裏日暮興一作與又作直淹留同前徐陵輦道乘雙闕豪雄被五都橫橋象天漢法駕應坤圖韓康賣良藥董偃鬻明珠喧喧擁車騎非但執金吾同前陳晤長安開繡陌三條向綺門張敞車單馬韓嫣乘副軒寵深來借殿功多競買園將軍夜夜返絃歌著曙喧同前顧野王鳳樓臨廣路仙掌入煙霞章臺京兆馬逸陌富平車東門疏廣餞北闕董賢家渭橋縱觀罷安能訪狹斜同前阮卓長安馳道上鐘鼓一作鳴宫寺開殘雲銷鳳闕宿霧斂章臺騎轉金吾度車鳴丞相來藹藹東都晚羣公騶御回同前江總翠蓋乘輕霧一作露金羈照落暉五侯新拜罷七貴早朝歸轟轟紫陌上藹藹紅塵飛日暮延年一作平客風花拂舞衣同前沈佺期秦地平如掌層城入一作出雲漢樓閣九衢春車馬千門旦緑槐開復合紅塵聚還散日晚鬬雞還一作回經過狹斜看同前崔皓長安甲第髙入雲誰家居住霍將軍日晚朝回擁賔從路旁拜揖何紛紛莫言炙手手可熱須臾火盡灰亦滅莫言貧賤即可欺人生富貴自有時一朝天子賜顔色世上悠悠應始知同前皇甫冉長安九城路戚里五豪家結束趨平樂聫翩抵狹斜髙樓臨積水復道出繁花唯有相如宅蓬門度歲華同前韋應物漢家宫殿含雲烟兩宫十里相連一作聫延晨霞出沒弄丹闕春雨霏微似甘泉一作春雨依微自甘泉甘泉一作春雨依微春尚早長安貴遊愛芳草寶馬橫來下建章香車却轉避馳道貴遊誰最貴衛霍世難比何能䝉主恩幸遇邊塵起歸來甲第拱皇居朱門峩峩臨九衢中有流蘇合歡之寶帳一百二十鳳凰羅列銜明珠下有金一作錦鋪翠被之燦爛博山吐香五雲散麗人綺閣情飄颻頭上鴛叉雙翠翹低鬟曵袖回春雪聚黛一聲愁碧霄山珍海錯棄藩籬烹犢炮羔如折葵既請列侯封部曲還將金印授廬兒歡榮若此何所苦所一作但苦白日西南馳此詩三百四十二卷重出今已削去注異同為一作同前白居易花枝缺處青樓開艷歌一曲酒一杯美人勸我急行樂自古朱顔不再來君不見外州客長安道一回來一回老同前薛能汲汲復營營東西連兩京關繻古若在山嶽纍應成各自有身事不相知姓名交馳兼一作喧衆類分散入重城此去應集作此路去無盡萬方人旋一作始生空餘片言苦來往覔劉禎同前王貞白曉鼓人已行暮鼓人未息梯航萬國來爭先貢金帛不問賢與愚但論官與職如何貧書生只獻安邊䇿洛陽道梁簡文帝洛陽佳麗所大道滿春光遊童初一作時挾彈蠶妾始提筐金鞍照一作被龍馬羅袖一作袂拂春桑玉車爭晚入潘果溢髙廂同前庾肩吾徼道臨河曲層城傍漢作洛川金門才出柳銅井半含泉日起罘罳外車回雙闕前潘生時未返遙心從眷然同前岑敬之喧喧洛川一作水濵鬱鬱小平津路傍桃李節陌上採桑春聚車看衛玠連手望安仁復有能留客莫愁嬌態新同前張正見層城啔旦扉上洛滿春輝柳影緣溝合槐花夾路飛蘇合彈珠罷黃間負翳歸紅塵暮不息相看連騎稀同前陳瑄洛陽九逵上一作衢上羅綺四時春路傍避驄馬車中看玉人鎮西歌艷曲臨淄逢麗神欲知雙璧價潘夏正連茵同前車􅀈洛陽道八達洛陽城九重重關如隱起雙闕似芙蓉王孫重行樂公子好遊從别有傾人處佳麗夜相逢同前二首徐陵緑柳三春暗紅塵百戲多東門向金馬南陌接銅駝華軒翼葆吹飛蓋響鳴珂潘郎車欲滿無奈擲如何二洛陽馳道上春日起塵埃濯龍望如水一作霧河橋渡似雷聞珂知馬蹀傍幔見甍開相看不得語密意眼中來同前王瑳洛陽夜漏盡九重平旦開日照蒼龍闕煙繞鳳凰臺浮雲翻似蓋流水到成雷曹王鬬雞返潘仁載果來同前二首江總德陽穿洛水伊闕邇河橋仙舟李膺棹小馬王戎鑣杏堂歌吹合槐路風塵饒緑珠銜淚舞孫秀强相邀二小平臨四逹一作路四逹長楸聽五鐘玉節迎司𨽻錦車歸濯龍絃歌聲不息環珮響相從花障蕩舟笑日映下山蓬同前沈佺期九門開路邑雙闕對河橋白日青春道軒裳半夏朝乘羊稚子看拾翠美人嬌行樂歸恆晚香塵撲地遙同前白玉誰家郎回車度天津看花東陌上驚動洛陽人同前馮著洛陽宫中花柳春洛陽道上無人行皮裘氊帳不相識萬户千門閉春色春色深君王一去何時尋春色深春雨灑周南一望堪淚下蓬萊殿中寢胡人鳷鵲臺前放胡馬聞君欲入西秦一作秦西行君行不用過天津天津橋上多胡塵洛陽道上愁殺人同前任翻幢幢洛陽道塵下生春草行者豈無家無人在家老雞鳴前結束爭去恐不早百年路傍盡白日車中曉求富江海狹取貴山嶽小二端立在途奔走無由了同前王貞白喧喧洛陽路奔走爭先步唯恐著鞭遲誰能更回顧覆車雖在前潤屋何曽懼賢哉只二疏東門掛冠去同前于武陵浮世若浮雲千回故復新旋添青草塜更有白頭人歲暮客將老雪晴山欲春行行車與馬不盡洛陽塵文苑英華卷一百九十二
