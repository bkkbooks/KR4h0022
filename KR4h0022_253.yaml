body:
  text: 文苑英華卷二百五十三宋李昉等編寄贈七劉眘虛三首張光朝一首邱為一首張謂四首岑參五首包佶四首包何一首李嘉祐六首錢起七首賈至四首張繼二首皇甫曽三首郎士元四首皇甫冉二首寄閻防防時在終南山豐德寺讀書劉眘虛青冥南山口文粹作清瞑南山色君與緇錫鄰深路入古寺亂花隨暮春紛紛對寂寞往往落衣巾松色空照水經聲時有人曉心復南望山逺情獨親應以修往業亦惟立此身深林度空夜烟月資清真莫欲文粹作歎文明日彌年從隱淪暮秋揚子江寄孟浩然前人木葉紛紛下東日凝烟霜山林相曉暮天海深清滄一作蒼暝色况復久秋聲亦何長孤舟兼微月獨夜仍越鄊寒笛對京口故人在襄陽詠思勞今夕江漢遙相望寄江滔求孟六遺文前人南望襄陽路思君情轉親偏知漢水廣應與孟家鄰在日貪為善昨來聞更貧相如有遺草一為問家人荻塘西莊贈房元垂張光朝門在荻塘西塘髙何聫聮往來分地利逺近無間田水國信汙下霖霪即成川苗稼盡湮沒兹鄉獨豐年家肥待親懿人樂思管絃日晏始能起盥潄看厨烟醖酒寒正熟養魚長食鮮黃昏鍾未鳴偃息早已眠何意久城市寂寞邱中緣俯仰在顔色區區人事間憶昔炎漢時乃知綺季賢靜默不能仕養老終南山湖中寄王侍御邱為日日湖水上好登湖上樓終年不向郭過午始梳頭嘗亦一作自愛杯酒得無相獻酬小僮能鱠鯉少妾事蓮舟每有南海一作浦信仍期後月遊方春轉搖蕩孤嶼每淹留驄馬真傲吏翛然無所求晨趨玉階下心許滄江流少别如昨日何言經數秋應知方外事獨往非悠悠寄李侍御張謂柱下聞周史書中慰越吟近看三嵗字遙見百年心價以吹噓長恩從顧盼深不栽桃李樹何日得成隂寄崔灃州前人共襆臺郎被俱褰郡守帷罰金殊往日鳴玉幸同時五馬來何晚雙魚贈已遲江頭望鄊月無夜不相思贈喬林此詩見三百四十卷杜侍御送貢物戲贈前人銅柱朱崖道路難伏波橫海舊登壇越人自貢珊瑚樹漢使何勞獬豸冠疲馬山中愁日晚孤舟江上畏春寒由來此貨稱難得多恐君王不忍看寄左省杜拾遺甫岑參聮步趨丹陛分曺限紫微曉隨天仗入夕集作暮惹御香歸白髮悲花落青雲羡鳥飛聖朝無闕事自覺諫書稀高宫集作冠谷口贈集作招鄭鄠前人谷中來相訪空齊不見君澗花燃暮雨潭樹暖春雲門徑稀人跡簷峯下鹿羣衣裳與枕席山靄緑氛氲江夜宿龍吼灘臨眺思峨眉隱者兼寄幕中諸公前人官舍臨江口灘聲已慣聞水烟晴吐月山火夜燒雲且欲尋方士無心戀使君思鄉那可住况復久離羣客舍悲秋雨懷兩省舊逰呈幕中諸公前人三度為郎便白頭一從出守五經秋莫言聖主長不用其那蒼生應未休人間嵗月如流水客裏秋風今又起不知心事向誰論江上蟬聲空滿耳西蜀旅舍春歎寄朝中故人呈狄評事前人春與人相乖栁青頭轉白平生未得意攬鏡私自惜四海猶未安一身無所適自從兵戈動遂覺天地窄功業悲後時光隂難一作歎虛擲却為文章纍幸有開濟策何負當途人無心矜窘厄回瞻後來者皆欲相轥轢起草思南宫竒言憶西掖時危任舒卷身退知損益窮巷草轉深閉門日將夕橋西暮雨黑籬外春江碧昨者始識君相看俱是客聲華同道術世業通往昔早須歸天階不得安孔席吾先稅歸鞅舊國如咫尺對酒贈故人包佶扶起籬披菊霜輕喜重開醉中驚老去笑裏覺愁來月送人無盡風吹浪不回感時將有寄詩思澀難裁近獲風疸集作痺之疾題寄所懷前人病夫將已矣無可答君恩衾枕同羇客圗書委外孫久來從吏道常欲奉空門疾走機先息歌行力漸煩無醫能却老有變是遊魂鳥宿還依伴蓬飄莫問根宿行齊指馬觀境制心猿唯借南榮地清晨暫負暄發襄陽後却寄公安人前人揮涕集作淚送回人將書報所親晚年多疾病中路有風塵王粲頻徵楚君恩許入秦還同星火去馬上别江春同李吏部伏日口號呈元庶子路中丞前人火炎逢六月金伏過三庚幾度衣裳汗一作浣誰家枕簟清頒氷無下位裁扇有髙名吏部還開甕殷勤二客情雜録作卿寄楊侍御前人一官何幸得同時十載無媒獨見遺今日不論腰下組請君看取鬢邊絲贈王八衢州李嘉祐丹地偏相逐清江若有期腰金才子貴剖竹老人遲桂楫間迎客茶甌對說詩渚田分邑里山樹掛罘罳心靜無華髮人和似古時别君逺山去幽獨更應悲晚發咸陽寄同院遺𥙷前人征戰初休草又衰咸陽晚眺淚堪垂去路全無千里客秋田不見五陵兒秦家故事隨流水漢代高墳對石碑回首青山獨不語羡君談笑萬年枝暮春宜陽郡齊愁坐忽聞枉劉七侍御新詩因以酬贈集作答前人子規夜夜啼櫧葉逺道春來一作逢春半是愁芳草伴人還易老落花隨水亦東流山臨睥睨恆多雨地接瀟湘畏及秋唯羡君為周柱史手持黃紙到滄洲晚發江寧道中呈嚴維前人惆悵垂集作遙江路蕭條落日過蟬鳴獨樹急鴉向古城多轉曲隨青嶂因髙見白波潘生秋徑草嚴子意如何仲夏江隂官舍寄裴長官集作明府前人萬室江邊次孤城對海安朝霞晴作雨濕氣夜集作晚生寒苔色侵衣桁潮痕上井欄題詩寄集作招茂宰思爾欲辭官贈衛南長官赴任前人吏曹難茂宰主意念疲人更事文犀節還過白馬津雲間辭北闕樹裏出西秦為報陶明府裁書莫厭頻闕下贈閻舍人錢起二月黃鸚集作鸝飛上林春城紫禁晚隂隂集作陌曉沉沉長樂鍾聲花外盡龍池栁色雨中深陽和不散窮途恨霄漢長集作常懸捧日心獻賦十年猶未遇羞將白髮對華簮晚秋寄王中丞袁員外集作秋夜寄袁中丞王員外前人一夕盈千念方知别者勞衰容難㑹靣魂夢暫集作想同袍片月臨城早晴河度鴈髙應憐蔣生徑秋露滿蓬蒿獻嵗初歸舊居酬皇甫侍郎見寄前人欲知愚谷好久别與春還鶯暖初歸樹雲晴却戀山石田耕種少野客性情間裘仲應難見殘陽且掩關秋夜寄張韋二主簿前人凉夜褰簾好輕風過月初碧空河漢集作江色淺紅葉落集作露聲虛道阻集作隔天難問機忘世久集作易踈不知雙翠鳳棲棘復何如寄郢州郎使君士元前人龍節知無事江城不掩扉詩傳過客逺書到故人稀坐嘯看潮起行風集作春送鴈歸望舒三五夜思盡謝元暉東臯早春寄元校書前人祿微賴學稼嵗起歸衡茅窮途戀明主耕桑迹集作亦近郊夜來霽山雪陽氣動林稍萌蕙暖初吐春鳩鳴欲集作始巢蓬萊頻入夢知子與集作憶貧交雜言山中寄時校書前人蓬萊紫氣一作之子溫如玉唯豫知爾陽春曲别來幾日芳蓀緑百花滿眼不見君青山一望心集作觴斷續自蜀奉冊命往朔方途中呈韋左相文部房尚書門下崔侍郎賈至胡羯亂中夏鸞輿忽南巡衣冠陷戎寇狼狽隨風塵豳公秉大節臨難不顧身激昂白刃前濺血下沾巾尚書抱忠義歷險披荆榛扈從出劒門登翼岷江濵時望挹侍郎公才標搢紳亭亭崑山玉皎皎無緇磷顧惟乏經濟扞牧陪從臣永願雪㑹稽仗劒清咸秦太皇時內禪神器付嗣君新命集舊邦至德被逺人捧冊自南服奉誥趨北軍覲謁心載馳違離難重陳策馬出蜀山畏途上緣雲飲啄叢箐間栖息虎一作餓豹群﨑嶇凌危棧惴栗驚心神峭壁上嶔岑大江下沄沄皇風扇八極異類懷深仁元凶誘熟一作黠虜肘腋生妖氛明主信英武威聲赫殊鄰誓師自朔方旗幟何繽紛鐵騎照白日旄頭拂秋旻將來一作俟蕩滄溟寧止蹴崑崙古來有迍難否泰長相因夏康纘禹績一作少康纘夏服代祖復漢勳于役各勤王馳驅拱紫宸豈惟太公望往昔逢周文誰謂三傑才功業獨殊倫感此慰行邁無為歌苦辛巴陵早春寄荆州崔司馬吏部閻功曹舍人前人謫君瀟湘渚再見洞庭秋極目連江漢西南浸斗牛滔滔蕩雲夢淡淡搖巴邱曠如臨渤澥窅疑造瀛洲君山麗中波蒼翠長夜浮帝豫去永久楚詞尚悲愁我同長沙行時事加百憂登髙望舊國胡馬滿東周宛葉遍蓬蒿樊鄧無良疇獨攀青楓樹淚灑滄江流故人西掖寮同扈岐陽搜差池盡三㸃蹭蹬各南州相去雖地近不得從之逰耿耿雲陽臺迢迢王粲樓跂子暮霞裏誰謂無輕舟間居秋懷寄陽翟陸贊府封邱髙少府前人今日霖雨霽颯然髙館凉秋風吹二毛烈士加慨慷憶昔皇運初衆賢值龍驤解巾佐幕府脫劍升明堂郁郁被慶雲昭昭翼太陽鯨魚縱大壑鸑鷟鳴髙岡信矣草創時太階速賢良一言頓遭逢片善䝉恩光我生屬聖明感激切自彊﨑嶇郡邑權連蹇翰墨場天朝富英髦多士如圭璋盛才溢下位蹇步徒猖狂閉門對群書几案在我旁枕席想逺遊聊欲浮滄浪八月白露降𤣥蟬號枯桑艤舟臨清川迢遰愁思一作海長我有同懷材疑各在天一方離披不相見浩蕩隔兩鄉平生霞外期宿昔共行藏豈無蓬萊樹嵗晏空蒼蒼巴陵寄李二户部張十四禮部前人江南芳草初幕幕愁殺江南獨愁客秦中楊栁也應春轉憶秦中相憶人萬里鶯花不相見登高一望淚霑巾㑹稽秋晚奉呈于太守張繼寂寂訟庭幽森森㦸户秋山光隱危堞湖色上髙樓禹穴探書罷天台作賦遊雲浮將越客嵗晚共淹留陸沉詩上禮部楊侍郎前人調與時人背心將靜者論終年在一作帝城裏不識五侯門奉寄中書王舍人皇甫曽腰金載筆謁承明至道安禪得此生西掖幾年綸綍貴東山遙夜薜蘿情風傳漏刻星河曙月上梧桐雨露清聖主好文誰為薦閉門空賦子虛成寄劉員外前人南憶新安郡千山帶夕陽斷猿知夜久秋草助江長鬢髮應成素青松獨見蒼愛才稱漢主題柱待回鄉一作劉郎寄張衆甫前人悲風還舊浦雲嶺隔東田伏臘同雞黍柴門閉雪天孤村明夜火稚子候歸船靜者心將憶離心畏度年寄鄭員外郎士元暮蟬不可聼落葉詎堪聞自是悲秋客那能岐一作此路分荒城背流水逺鴈入寒雲陶令東籬菊餘芳可贈君寄李舒一作送張南史前人雨餘深巷靜獨酌送殘春車馬雖嫌僻鶯花不厭一作棄貧蟲絲粘户網鼠跡印床塵聞道山隂㑹集作借問山陽㑹如今有幾人此詩二百七十二卷重出今已削去注異同為一作贈萬生下第還吳前人直道多不偶美才應息機灞陵春欲暮雲海獨言歸為客成白首入門嗟布衣蓴羮若可憶暫出掩柴扉寄李袁州桑落酒兼六言贈人疑前人色比瓊漿猶嫩香同甘露仍春十年提携一斗逺寄瀟湘故人使至夀州淮路寄劉判官皇甫冉榛草荒凉村落空驅馳卒歲亦何功蒹葭曙色蒼蒼逺蟋蟀秋聲處處同鄊路遙知淮浦外故人多在楚雲東日夕煙波那可道夀陽西去水無窮寄集作贈韋司直前人聞君感嘆二毛初舊友相依萬里餘烽戍有時驚暫定甲兵無處可安居客來吳地星霜久家在平陵音信踈昨夜春風還入户登山臨水復一作意何如文苑英華卷二百五十三
