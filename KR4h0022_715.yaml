body:
  text: 文苑英華巻七百十六宋李昉等編詩序二雲母泉詩序一首登頭陁寺東樓詩序一首泛沔州城南郎官湖詩序一首顧著作宣平里賦詩序一首晩春崔中丞林亭㑹集詩序一首賀蘇常二孫使君隣郡詩序一首周公瑾墓下詩序一首游雲門寺詩序一首鄂州何大夫創製夏亭詩序一首甘子堂各賦一物詩序一首韋賔客宅宴集詩序一首秦徴君校書與劉隨州唱和詩序一首蕭侍御喜陸太祝自信州移居洪州玉芝觀詩序一首崔衛二公同任渭南縣尉日宿天長寺唱和詩序一首暮春陪諸公游龍沙熊氏清風亭詩序一首吳尊師華原露仙館詩序一首雲母泉詩序李華洞庭湖西𤣥石山俗謂之墨山山南有佛寺寺倚松嶺松嶺下有雲母泉泉出石中引流分渠周遍庭宇發源如乳湩末派如淳漿烹茶浙蒸灌園潄濯集作齒皆用之大浸不盈大旱不耗自墨山西北至石門東南去東陵廣輪二十里盡生雲母牆階道路燦燦一作烟烟如列星井泉溪澗色皆純白鄉人多夀考無癖痼疥搔之疾華深樂之潁川陳公天寳中與華同為諫官公性與道合忽於權利方挂冠投簮顧華以名山之契乾元初公貶清江丞移武陵丞華貶杭州司功恩復左補闕上元中俱奉詔徴公自清江至武陵道路多虞詔一作制書不至華泝江而西次於岳陽江山延望日夕相見二字一作相顧屬思與髙賢共飲雲母之泉躬耕墨山之下敢違朝命以徇私欲秋風寒露洞庭微波一聞猿聲不覺涕下况支離多病年齒一作甫始衰願藥餌一作餌藥扶夀以究無生之學事乖志負火爇予心寄懐此篇亦以書予一作公之志也次有古詩兹不具載一作皆唐文粹登頭陁寺東樓詩序侍御韋公延安威清江漢舅氏員外象名髙天下賔主相持疑賢乎哉王師雷行北舉幽朔太尉公分麾下之旅付帷幄之賔與前相張洪州夾攻海㓂方收東越夏首地當郵置吉語日聞喜氣填塞於江湖生人鼔舞於王澤頭陁古寺簡棲遺文境勝可以澡濯心靈詞髙可以繼聲金石二大夫㑹臺寺之賢㩦京華之舊十有餘人燦如瓊華輝動江甸渉金地登朱樓吾無住心酒亦隨盡一作净將以斗擻煩襟觀身齊物日照元氣天清太空無有逺近皆如掌内辨衡巫於㸃黛指洞庭於片白古今横前江下茂樹方黒春雲一色曰屈平宋玉其文宏而靡則知楚都物象有以佐之舅氏謂華老於文徳忘其𤨏劣使為諸公敘事不敢煩也詞逹而巳矣泛沔州城南郎官湖詩序李白乾元嵗秋八月白遷於夜郎遇故人尚書郎張謂出使夏口沔州牧杜公漢陽宰王公觴于江城之南湖樂天下之再平也方夜永月朗集作方夜水月如練清光可掇張公以殊有勝槩四望超然乃顧白曰此湖古來賢豪游者非一而枉踐佳境寂寥無聞夫子可為我標之嘉名以傳不朽白因舉酒酧水號之曰郎官湖亦由鄭圃之有僕射陂也席上文士輔翼岑静以為知音集作言乃命賦詩紀事刻石湖側將與大别山共相磨滅焉顧著作宣平里賦詩序劉太真宣平里環堵之宅嘉木垂隂疎篁孕清友生顧君寓之所也前相國宜城伯夏官卿博陵公陳蓬州藏用上人賢顧君而訪之鄙夫與焉披襟嘯風境邈神王孰炎暑焉知市朝吾君則超然如在天壇華頂之上意喬松可得而友也乃賦六言詩以紀㑹既明日屬文之士翕然而和之八音鏗其盈耳環堵爛而溢目舉國傳覧以為盛觀太真獲因首唱不敢遺繼之美晩春崔中丞林亭㑹集詩序梁肅徳充則體和道勝則境静集作勝抑常理也前左馮翊崔公意遺富貴跡叶幽曠與浩氣為徒故不導引而夀以善閉為亊故無江湖集作海而閒春池始平芳草如織乃啟虛館延羣賢鳴琴濁酒以侑談笑搴英翫華以賞景物脩竹滿座集作嶼以環合紫藤垂旒集作地以縈結地有滄州之趣鳥無城郭之音信上智之髙居人間之方外者也于時衆君子飽公之和惜日不足顧相謂曰夫飬正在我敘位在時今朝庭虛老更之席以待園綺公實舊徳行將論道不暇焉可晦而息乎蓋詩可以興可以羣盍歌詠之以志斯㑹且用祝公以君子萬年受茲介福焉爾賀蘇常二孫使君鄰郡詩序古之厚風俗美教化必播於歌詠垂於無窮故風有二南之什傳稱兄弟之政其事尚矣二孫鄰郡詩者前道州刺史李萼賀晉陵吳郡伯仲二守之作也二公脩懿文之烈成變魯之政地無夾河之阻人有同舟集作風之樂抑近古未之有也故道州詩而美之屬而和之者凡三十有七章溢集作流於道路蓋云盛矣初伯氏用雅度碩畫掌柱下史集作方書出擁麾幢四領江郡仲氏以茂學逹才由尚書郎貳京兆守上饒興元貞元間偕以治行聞天子器之於是仲百吳苑之寄伯受晉陵之命自庱丑極切又恥陵切亭以東禦兒以北面五湖負大江列城十二縣環地二千里政教集作理同和風雨同節禮讓同俗熈熈然有太平之風每嵗土膏將起場功集作滌場向畢二公各約車輿集作以將命者十數人循行邑里勞之斯耕喻之斯藏民樂其教且飽其和然後用籩豆􅊦集作醆斚展友愛於交集作郊壤之次綽綽怡怡有裕有集作且歡二邦之人於斯觀徳可謂之榮矣本夫集作乎詩人之志有四焉美其徳美其位美其政美其鄰信可以編諸唐雅昭示後學豈止於塗歌里誦遐邇悦慕而巳肅嘗辱二公之眷謹序篇首庻采詩者得之陳於太師以知其風周公瑾墓下詩序昔趙文子觀九原有歸歟之歎謝靈運適集作遊朱方興墓下之作或懐徳異世或感舊一時而清詞雅義終古不歇十三年春予與友人歐陽仲山旅游於吳里巷之間有墳巋然問於人則曰吳將軍周公瑾之墓也予嘗覧前志壮公瑾之業歴于集作於遺墟想公瑾之神息駕而弔徘徊不能去昔漢綱既解當塗方熾利兵南浮江漢失險公瑾嘗用寡制衆挫强為弱燎火一舉樓船灰飛遂乃張吳之臂壮蜀之趾以魏祖之雄武披攘躑躅救死不暇袁彦伯賛是功曰三光三分宇宙蹔隔富哉言乎於是時彌逺而氣集作名益振世逾往而聲不滅有由然矣詩人之作感於物動於中六字集作感於物象發於詠歌形於事業事之博者其辭盛志之大者其感深故仲山有過墓之什廓然其慮粲乎其文可以窺磐桓居貞之道梁父閒吟之意凡有和者當繋於斯文集作乎游雲門寺詩序上徳與集作以汗漫為友無江海而閒其次則仁智相從有山水為樂故合志同方賢者有柴桑之隠游道同趣吾徒為雲門之㑹其造適一也先㑹一日沙門釋去諠命我友相與探玉笥上㑹稽然後泝若耶過鳳林而南意欲脱人世之覊鞅窮林泉之遐奥於是捨舟清瀾反策閒原遞杳藹而歴嶇􅀈入深翠以泛迴環遂至於集無於字雲門觀其羣山叠秀集作翠秦望拔起五峰巉巉列壑沉沉上摩碧落旁湧金界其下則百泉㑹流蓄為澄潭涵虛鏡徹鳴集作激瀬玉潄泠泠之聲與地籟唱和不待笙磬而五音迭作眺聽之集無之字不足則凝思宴息怳焉疑諸天樓觀列在咫尺集作歩庭衢之中别有日月既而動歩真境坐聆法音合漆園一指之論詣净名無住之本萬累集作慮如洗百骸坐空視松喬為弱䘮輕世界於棗葉蓋道由境深理自外奨故也昔之逺公紀廬山謝客題石門道流勝賞今古一貫曷可不賦貽雲山羞乃各為詩以志斯㑹同乎道者有隴西李公受髙陽齊霞舉約㑹未至亦請同賦此篇用廣夫游衍之致云坐聆文粹作静聆之論文粹作之諭鄂州何大夫創製夏亭詩序符載豐城有神劍非司空無以發沉塞楊光彩為天下之重寳江夏有善地非亞相無以起雄峙作亭榭為天下之至勝虛極必盈晦極必明開物之務繋於賢者此自然之理也先是郡中寺曰頭陁名與碑並登臨鍾萃大雲氣色下配礫石公政教既備游心佛寺慨此頽落乃沛然而張之聳阿閣矗長檻嚴像設熾臺塔凡所相好皆鼎新也方務剪伐用探勝㑹一時景歟疑值甘心罙入意謂粹絶余將獲之廼縁後殿穿窈窕出乎蒼莽之巔果有實境待我而啟萬古不偶今為知音通塞之際若有感也觀乎經營之初也鏟嵽崲堙坎斬榛楛掘株枿翳薈掃盡天形嶷然山川雲氣一朝噴泄公智動於内形象於外口疏手指煥然成亭侈儉無過因歸於中當於是延賔介洎郡之士君子相與開襟而登之殊解乎疑淩泱漭駕峥嶸壓夏口撑大别開井閈於砌下擁城闉於宇後倚檻凝立在青㝠中連山積水悠悠渺渺長想一去周流物表何如宇宙於此為細繇是言之因知公宏邁可以拔幽陋材智可以陶品彚應用不測與造物者為徒乎崇崇夏籍南峴何羊祜之事齊芳永久夫詩者比興而詠志也凡我登覧盛美惰傲無述豈文士之意乎况主人唱首韻鏗金石得不搜思上承獻酬請咸繼大夫之後賦六韻之作耳甘子堂各賦一物詩序甘子堂近取嘉木以名之也戊寅嵗常侍李公陋舊制畫新制茲堂一搆官舍増氣槩巍然也堂中廣數筵環軒有六閣閣有雅琴古籍繪圖篆𨽻砌下有短松弱栁蘭荃芳杜名花百品羅植左石自春陽至於沍寒之際未嘗不鋪霞叠雪照爛庭廡新花驟發不留故態佐以壺酒與賔娛之其興宴當髙㑹雖登山臨水不敵也或月滿清夜簾帷沉沉洞開羣扉歛袵端坐此際有以見公萬累去百靈集氣衝寥廓與古為徒豈獨馳心政術區區於鍾陵之氓而巳矣是知此堂也外可以延風景内可以輔性靈改作之思符規中律因請以所覩一物賦三韻極書當時之美使將來君子知李公有深㫖焉韋賔客宅宴集詩序權徳輿集無太子賔客韋兄飄華纓佩金龜為清時大僚有年數矣始以博士奉朝請周厯臺閣出分藩符入作卿長乃領内府又賔東朝拜章乞告優詔得請致仕就第燕閒自頥中外族屬嘗僚貴仕以觴酒祝延發禮脩賀者多矣以兄始登朝行實自禮寺蕃祉吉禄此為推輪於是衆君子學通行脩嘗踐此任者與今之引經㨿古屈職在列者同聲撰日復脩茲㑹乃有夏官小司馬左右曹侍臣書殿東觀柱下史南宫郎九旋十疑而鄙夫忝焉入門而右勝槩迎歩聳檻於賔位羅松篁於石徑清冬之時寒翠溢目則熈春聳卉炤灼駘蕩又可知也軒蓋上下壺觴交錯聆主人之言則同惇史聽衆賔之論如在曲臺徜徉乎禮文博約乎法義樂在名教慶茲夀寵中飲霑醉抗音擊節乃相謂曰季倫金谷實有歌詩元亮斜川亦疏爵里况今賀得謝之美賦必類之詞愛景美禄遺簮投轄盛集之若是者有幾安可沒而不書猥微菲薄因附官業今裴辛吕三君子皆講學稱職而司勳滿嵗復留再帖郎位猶四命焉前此者柱史之超拜浹日矣鄙夫之忝茲一紀矣二左曹東觀二十年矣陳君二十年馮君二十年張君十八年今云二十年間中言也小司馬向三十年矣而主人逾四十年矣其余折中定議損益於儀法多矣兵部二十八年主人四十五年向逾舉全數也外有平陽長樂三疑作二連帥違集作韋君抑疑作栁君絳郴和三郡守裴君李君前蘇州韋君信州陸君守之介劉君六邑之長姜君合中外厯是者十九人因廣斯文且為禮官之籍秦徴君校書與劉隨州唱和詩序前人集無儒有秦公緒者當天寳理平之母疑作世興麗則鼓盛多疑於當時遭多故道進身退越部山水佐其清機圓冠野服倐然自放宅遐心於事外得佳句於物表不知華纓丹轂之為貴者幾四十年方帥時賢軾閭懸榻昔鄭公通徳有鄉門之號秦君麗句創里亭之名慕風騷者多所嚮仰貞元中天下無事大君好文公緒舊游多在顯列伯喈文舉之徒争為薦首而夀陽大夫公之章先聞故有書府典校之拜時動静不滯於一方矣七年春始與予遇於南徐白頭初命色無愠忤知名嵗久故其相得甚歡因謂予曰今業六義以著稱者必當唱酬徃復亦所以極其思慮較其勝敗而文疑作义以時之聞人序而申之悉索笈中得數十編皆文場之重名强敵且見校以故敵故二字疑隨州劉君長卿贈荅之巻惜其長往謂予宜敘戯夫彼漢東守嘗自以為五言長去聲城而公緒用偏伍竒師攻堅擊衆雖老益壮未嘗頓鋒詞或約而㫖深類乍近而致逺若珩珮之清越相激類組繡之𤣥黄相發竒采逸響争為前驅至於室家離合之義朋友切磋之道詠言其傷折之以正凡若干首各見于詞云蕭侍御喜陸太祝自信州移居洪州玉芝觀詩序太祝陸君鴻漸以詞藝卓異為當時文人凡所至之邦必千騎郊勞五漿先饋嘗考一畆之宫於上饒時江西上介殿中蕭侍御公瑜權領是邦相得歡甚㑹連帥大司憲李公入覲于王蕭君領㢘察留府太祝亦不逺而至聲同而應隨故也先是嘗舍于道觀因復居之竹齋虚白湖水在下春物萌動時鳥變聲支頥𣪚髪心目相適蕭君悦其所以然也既展賔主之貺又歌詩以將之其詞清越鏗若金璧得詩人之辯麗見君子之交好詩既成而太祝有酬和之作復徃之盛粲然可觀客有前法集作决曹掾崔君茂實文場之舊以六義為巳任攘臂拔筆而為和者惟三賢師友風騷迭為强敵志之所之發為英聲其於竒正相生質文相發若笙磬合奏組繪集作續交映君子曰侍御唱之太祝酬之法曹和之是三篇也不可以不紀况合𣪚出處之未始有極耶以鄙人嘗學於是俾冠以序其或繼而和者用先成為次序云崔衛二公文粹作崔吏部衛兵部同任渭南縣尉日宿天長寺上方唱和詩序易之同人曰文明以健中正而應故道同於内而氣相求情發於中而聲成文以觀以羣以比以興清河崔處仁河東衛從周於是有清秋仁詞往復十七韻之作初二賢皆以秀造分校秘府𢎞文之書貞元初同為渭南尉聯曹結綬相親集作視莫逆處仁自府庭旋歸税駕於斯國門勝槩康莊在下馳車徒而走聲利者此為咽喉外煩埃壒中孕閒曠晝懸清光夕湛虚明上方之鐘磬深夜之月露眺聽寂寞情靈感發投者報者無非瓊瑶如金絲應集作相和孔翠翔集盡在是矣厥後同為左右補闕從周以夲官入為翰林學士處仁累以尚書郎知制誥既而處仁西垣即真從周復以外郎掌誥洎處仁遷小宗伯而從周即真俄掌貢舉實為之代元和三年秋處仁為吏部侍郎從周為兵部侍郎重九休澣聨鑣道舊永懐曩篇二紀于茲慮屋壁之郗壊詩人之磨㓕不若刻勒片石之為堅且久也惟二賢大雅閎逹人倫龜玉更為王陽迭為田蘇便蕃清近烜赫章大其於為霖為礪四方之屬耳目久矣然則志氣之所舒英華之所攄其濫觴於此乎徳輿與二君子同為諫官同掌書命相繼典貢士分曹居中臺其間交代迭處不可具舉敢叨益者之數實悦同心之言追琢既具序夫本末亦二君子之志也暮春陪諸公游龍沙熊氏清風亭詩序前人暮春三月時物具舉先師逹賢或風于舞雩或詠集作褉于蘭亭所以暢情靈滌勞苦使神王道勝㝠夫天倪吾徒束支體於府署以簿書為拳梏有日矣故因休沐之暇考近郊之勝郭北五里有古龍沙龍沙北下有州人秀才熊氏清風亭蓋故容州牧戴㓜公前蒼部郎蕭元植賢熊氏之業之文尚茲境之幽曠合資以構集作營之創名以識之五年矣初入環堵中有琴書披篁躋石忽至茲城集作池鄱章二江分派於趾下匡廬羣峰極目於枕上或澄波净緑相與無際或孤煙歸雲明㓕變化耳目所及異乎人寰志士得之為道機詩人得之為佳句而主人生於是習於是其脩身學文固加於人一等矣况其志勵於螢雪之下業成於薪水之餘則甲科令名如在指顧是㑹也有御史府楊君薛君環列崔君校理魏君皆以文發身或再戰再克予與皇甫君不繇是進亦陪其歡虚中曠然取樂名教而主人趨隅拜下敬恭得禮請酌古道徧徴歌詩因曰自十數年間佐是府者騰陵杳冥離㑹靡常衆君子用牽乎時未始有極然異日之適非今日之適也至若心同於内跡脗於外交臂瞪視吾喪我於此亭者一生幾何是不可以不紀乃次詩于屋壁各疏爵里以為清風亭故事云吳尊師華原露仙館詩序世人於逆旅弱喪之中而村疑執膠固唯仙師吳君超然懸解於是有華原露仙之作本於道生終於物㝠蓋順一氣之聚𣪚隨百昌以化生為疙為贅為决為潰委和歸根泊然大觀至於谷神隠景之道又何可究耶衆君子用徴聲詩師亦繼和是皆遺形逹生之言也或曰若師之道可以坐忘矣惡用言説渉於名迹耶子曰道徳上下經與内外雜篇豈非老莊之言耶終日而盡道師之心也彼方以生死為一貫又何有於名迹哉又曰既言之可矣惡用詩之矣師又泛然而和之斯皆𤣥同而不囿於物者也於是或者退而鄙夫書之以冠於羣篇云文苑英華巻七百十六
