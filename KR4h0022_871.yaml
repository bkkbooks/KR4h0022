body:
  text: 文苑英華卷八百七十二宋李昉等編紀功二平淮西碑二首平淮西碑韓愈天以唐克肖其德聖子神孫繼承集作繼繼承承於千萬年警新唐書藩鎮傳作敬戒不怠全付所覆四海九州罔有內外悉主悉臣髙祖太宗既除既治髙宗中睿休養生息至于玄宗受報收功極熾而豐物衆地大孽芽其間肅宗代宗德祖順考以勤以容大慝適去稂莠不集作已薅相臣將臣文恬武嬉習熟見聞以為當然睿聖文武皇帝既受羣臣朝集本唐書有乃字考圗數貢曰嗚呼天既付豫令二本作天既全付豫有家今傳次在豫豫不能事事其何以見乎二本作于郊廟羣臣震懾走職二本集作奔走率職眀年平夏又眀年平蜀西川又眀年平江東又眀年平澤潞遂定易定致魏博貝衛澶相無不從志皇帝曰不可究集注作窮武豫其少息九年蔡將死蔡人立其子元濟以請不許遂燒武陽犯葉襄集有等字城以動東都放兵四劫皇帝厯問于朝一二二本有外字臣皆曰蔡帥之不廷授於二本作于今五十年傳三姓四將其樹本堅兵利卒頑不與他等因撫而有順且無事大官臆決唱聲萬口和附并集注作併為一談牢不可破皇帝曰維天維祖宗所以付任豫者庶其在此豫何敢不力况一二臣同不為無助曰光顔汝為陳許帥維是河東魏博邵陽三軍之在行者汝皆將之曰重胤汝故有河陽懷今益以汝維是朔方義成陕益鳳翔延慶二字唐書作䐚延寧慶七軍之在行者汝皆將之曰𢎞汝以卒萬二千屬而子公武集集本無集字往討之曰文通汝守壽維是宣武淮南宣歙淮西四軍二字唐書作徐泗五軍之行于壽者汝皆將之曰道古汝其觀察鄂嶽曰訴汝帥唐鄧隨各以其兵進戰曰度汝長御史其往視師曰度惟汝集注有與字豫同汝遂相豫以賞罰用命不用命曰𢎞汝其以節集注有度字都統討唐書作諸軍曰守謙汝出入左右惟汝二本作汝惟近臣其往撫師曰度汝其往飲食二字唐書作衣服飲食集止作衣食豫士無寒無飢以既厥事遂生蔡人賜汝節斧通天御帶衛率二本作卒三百凡兹廷臣汝擇自從惟其賢能無憚大吏庚申豫其臨門送汝曰御史豫閔士大夫戰甚苦自今以往非郊廟祠祀其無用樂顔胤武合攻其北大戰十六得柵城縣二十三降人卒四萬道古攻其東南八戰降集有卒字萬三千冉入申破其外城文通戰其東十餘遇降萬二千訴入其西得賊將輒釋不殺用其䇿戰皆二本作比有功十二年八月丞相度至師都統𢎞責戰益急顔胤武集有合字戰益用命元濟盡并其衆回二本作洄曲以備十月壬申訴用所得賊將自文城因天大雪走走字二本作疾馳百二十里用夜半到蔡破其門取元濟以獻盡得其屬人卒辛巳丞相度入蔡以皇帝命赦其人淮西平大饗賚功師還之日因以其食賜蔡人凡蔡卒三萬五千其不樂為兵願二本有歸字為農者十九悉縱之斬元濟集有於字京師册功𢎞加侍中訴為右僕射帥山南東道顔胤皆加司空公武以散騎常侍帥鄜坊丹延道古進大夫文通加散騎常侍丞相度朝京師道唐書作進封晉國公進階金紫光祿大夫以舊官相而以其副總為工部尚書領蔡任既還奏羣臣請紀聖功被之金石皇帝以命臣愈臣愈冉拜稽首而獻文曰唐承天命遂臣萬邦二本作方孰居近土襲盜以狂往在玄宗崇極而圯河北悍驕河南附起四聖不宥屢興師征有不能尅益戍以兵夫耕不食婦織不裳輸之以車為卒賜糧外多失朝曠不嶽狩百𨽻怠官事亡其舊帝時繼位顧曕咨嗟惟汝文武孰恤豫家既斬蜀吳旋取山東魏將首義六州降從淮蔡不順自以為強提兵呌歡欲事故常始集作乃命討之遂連姦鄰隂遣刺客來賊相臣方戰未利內驚京師羣公集作臣上言莫若惠來帝為不聞與臣為謀及集注作乃相同德以訖天誅乃敕顔胤訴武古通咸統於𢎞各走爾二本作各奏汝功三方分攻五萬其師大軍唐書作兵北乘厥數倍之嘗集作常兵時曲軍士蠢蠢既剪凌雲蔡卒大窘勝集作剪又注作遂之邵陵郾城來降自夏入秋復集作復屯相望兵頓不礪二本作勵告功不時帝哀征夫命相往釐士飽而歌馬騰於槽試之新城賊遇敗逃盡抽其有聚以防我西師躍入道無留者額額蔡城其疆千里既入而有莫不順俟帝有恩言相度來宣誅止其魁釋其唐書作于下人蔡之卒夫投甲呼舞蔡之婦女迎門笑語蔡人告飢船粟往哺蔡人告寒詔賜二本作賜以繒布始時蔡人禁不往來今相從戲里門夜開始時蔡人進戰退戮今眠蜀本作旴而起左飱集作餐右粥為之擇人以牧餘憊選吏賜牛教而不稅蔡人有言始迷不知今乃大覺羞前之為蔡人有言天豫明聖不順族誅順保性命汝不吾信視此蔡方孰為不順往斧其吭凡叛有數聲勢相倚吾強不支汝弱奚恃其告而長及汝父兄二本作而父而兄奔走來偕集作偕來同我太平淮蔡為亂天子伐之既伐而飢天子活之始議伐蔡卿士莫隨既伐四年大小並疑不赦不疑由天子明凡此蔡功惟斷乃成既定淮蔡四夷畢來遂開眀堂坐以治之同前段文昌夫五兵之設本以助文德而成教化故聖人不專任之其有桀驁暴邪干紀作孽道德不服則兵以威之文誥一作告不諭則兵以靜之在禁暴除害而巳自黃帝堯舜不無能誅至湯武受命武功寖盛其本之以仁義行之以吊伐惟帝與王率由兹道於戲創業之君勞而後定守文之主安而忘戰故三代之衰功在五伯未有中葉之後冉安生靈前古所無歸于聖代我唐運之興也髙祖太宗以仁義之兵除暴隋之亂戎功祖武百代丕承玄宗嘗亦內剪姦邪外清夷狄所以繼文之代協帝之眀既而禍起於微亂生於理由是髖髀之衆結固於兩河斤斧不用綿厯于五紀肅宗代宗一無此二字親剪大憝且務生育德宗順宗觀于天象察於人事以理運未至沴氣猶凝運啓升平以俟後聖惟我后握樞出震端扆嚮眀考上玄之心思祖宗之意掃滌區宇光啓帝圗不以萬乘為尊四海為富遵大禹櫛風之志有光武一夜之勤以為景擒七國而漢民安成剪三監而周化洽焉有患難未去而德教可興日者李一作惠琳恃近狄之固劉闢憑坤維之險李錡保長江之衝從史資太行之阻四凶相挺一作扇繼為亂常三數年間盡膏鈇鑕太尉茂昭以中山之地盡室來朝司空𢎞正以全魏之邦舉宗向闕義風所激莫不歸心况彭城從折簡之召一作名非橫海展執圭之覲向之談虞虢之存亡議輔車之形勢莫不刳心斷臂繼踵為忠既而麟見於巴賨之間河清於鄘衛之際固本根一作固同本之貺昭聖祚之符廓清寰海兆於此矣而長淮右地連山四起控接一作扼吳楚密邇轘轅有上帝濯龍之池同冀方多馬之國戈鋌雪照駔駿雲屯二姓三凶憑阻作孽嵗在甲午吳少誠積禍而斃餘殃聚於逆嗣氛祲淮濆我后方吊人省寃墾災除穢猶命使者持節往申寵賻以昭柔服之義示含𢎞之仁元濟劫衆拒境滔天肆逆剽葉縣燒舞陽侵襄城伊洛之間騷然震恐乃詢廷議咸願假以墨絰授以兵符天子泉一作淵唐諱默以思霆馳以斷獨發宸慮不詢衆謀漢宣從屯田之議晉武決平吳之計至聖不惑羣疑自消於是會鳬藻之師得鷹揚之帥以忠武二字一作中軍帥李光顔往者平朔邉靜庸蜀雙矛電激孤劍颷馳亦猶馮異之總軍鋒子顔之將突騎才氣雄武可掃攙搶總魏博河陽郃陽凡三軍自臨頴而前以河陽軍帥烏重胤當從史內一作詘非邪謀外阻兵勢精誠奮發密一作獨應王師故得虜魏豹於軍中縛吕布於麾下識慮中正可革梟音益以汝海之地總朔方義成陕虢劍南西川鳳翔延州寧慶凡七軍由襄陽而進宣武帥韓𢎞請以子公武領精卒一萬二一作三千時集洄曲欒書作帥針為戎右充國討虜印統支軍是能從帥之命成父之志又以壽春守李文通夙精戎韜纍習軍旅明於守備可保金湯總宣武淮南宣歙浙西徐泗凡五軍厄固始之險以鄂嶽都團練使李道古以先曹王臯有任城之武昔征凶渠嘗取安陸授以戎柄嗣其家聲乘五關之隘以唐鄧隨帥李訴溫敏能斷靜深有謀昔趙孟慕成季之勳復能霸晉亞夫紹絳侯之武亦克擒吳想其英徽必有以似一作嗣山南東道荆南凡兩軍自文成而東乃命御史中丞裴度布挾纊之恩奉如絲之命以諭羣帥以撫輿師且以古之會兵必謀元帥令歸於一勢不欲分命宣武軍帥韓𢎞為諸道行營都統假陸遜之鉞拜韓信之壇指縱一作蹤畫竒正之機發號申嚴凝之令然後有司馬之法成一無成字節制之師而寒暑再罹賊巢未下又命內掌樞密之臣梁守謙肅將天威盡護諸將懸白日於千里推赤心於萬人由是甘寧奮升城之勇君文勵擊郾一作堰非之志焚上蔡以剪其翼拔郾城以扼其吭以軒后攻蚩尤之城一作亂殷宗伐鬼方之罪周公誅淮夷之叛雖以聖討逆皆三年後定百辟之義且謂久勞將決其機以安海內復命丞相裴度擁一作持淮蔡之節撫將帥之臣分鄧禹之旄斾盛竇憲之幕府四牡業業于藩于宣先是光顔重胤公武戎旅同心壘垣齊列常一作長非蛇之勢首尾相從胡騎之雄紛紜縱擊逐餘孽如鳥雀獵殘寇似狐狸干矛如林二字一作杖行次于洄曲丞相之來也羣帥之志氣逾厲統制之號令益眀勢如雷霆功在漏刻賊乃悉其精騎以備洄曲之師唐隨帥李訴新總傷痍之軍稍勵奔北之氣城孤援絶地逼勢危而能養貔虎唐諱之威未嘗矍視屈鷙鳥之勢不使露形是以收文成柵而降吳秀琳下興橋而擒李祐果敢多略衆以留之或謂蓄患不利吾軍訴誠眀在躬秉信不撓爰命釋縛授之親兵祐感慨之心出於九一作萬死縱橫之計果效六竒粵十月既望隂凝雪飛天地盡閉訴乃遣其將史旻仇良輔留鎮文城備其侵軼命李祐領突騎三千以為鄉導自領中權一作軍三千與監軍使李誠義繼進又遣其將田進城領馬步三千以殿其後雲郊一作郊雲晦冥寒可墮指一夕卷斾凌晨斬一作破關鋪敦淮濆仍執醜虜雖魏軍得田疇為導潛出盧龍鄧艾得田章先登長驅綿竹用竒制勝與古為儔四紀逋誅一朝蕩定攄宗廟之宿憤致黎庶之大一作乂安周漢以還莫斯為盛帝命䇿勳進𢎞為侍中光顔重胤並為司空訴為左僕射帥山南東道公武加散騎常侍節制鄜坊丹延道古進御史大夫文通加散騎常侍王師獲金爵之賞環境蒙優復之恩掩骼埋胔除瑕宥罪躋羣生於夀域還比户於可封東西南北無思不服丞相旋請來朝後加金紫光祿大夫封晉國公乃眷淮濆蒸人生殖俾擇循吏撫其疾傷以宣慰副使刑部侍郎馬總領淮蔡之任天子議功雲臺追美將帥俾刻金石以揚休勳而百辟僉謀羣帥克讓推義士之志敢貪天功徴賢臣之言實在君德於是縉紳之士暨侯服之臣上獻鴻名式昭徽册然後光輝千古聲名百蠻詔命掌文之臣文昌勒銘淮浦庶乎閲周雅者美宣王之中興觀劍銘者戒蜀川之恃險銘曰天有肅殺萬物以成雷風為令霜雪為刑君有武節四海以寧陳之原野阻以甲兵在昔聖王格寧邦國武以禁暴刑以助德牧除害馬農去蟊賊茍非戎功孰靜羣慝眀眀我后神算精微九重獨運千里不違宵衣旰食再安中宇始剪朔漠旋梟蜀虜丹徒鏦濞白門縳布服兹四罪豈勞一旅淮夷怙亂四十餘年長蛇未剪環境一作寰宇騷然逮于孽章逆志滔天懷柔匪及告諭罔悛帝念生人乃申薄伐飛將鷹揚前鋒電發齋壇命信靈旗指越我武惟揚祅氛一作妖氣未滅集于洄曲決戰摧凶豹備一作略臨晉維留沓中桓桓襄帥竒謀成功一作應變無窮浮罌暗渡束馬潛攻合以長圍絶其飛走布冗弋一作德滅妖升城獲醜商不易一作改肆農安其畝洄曲殘兵投戈束手帝嘉羣帥賞不踰時畫社啓封圭組陸離洎于蠻貊服我英威刻之金石作戒淮夷文苑英華卷八百七十二
