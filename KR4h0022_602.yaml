body:
  text: 文苑英華卷六百三宋李昉等編請致仕一致仕表二卷英華所編失年代先後今正之為閻大將軍乞致仕表一首代人乞致仕表一首為太僕卿劉𢎞基請致仕表一首盧岐州請致仕表一首代劉幽州請致仕表一首為殿中監趙元楷請致仕表一首為工部尚書叚綸請致仕表一首為姚大夫請致仕歸侍表一首為温給事請致仕歸侍表一首為王左相請致仕表一首為閻大將軍乞致仕表後周庾信臣某言臣聞禮云大夫七十致仕於朝傳家於子膳則貳珍衣稱時制臣自出身奉國四十餘年遭遇風雲從微至著太祖文皇帝扶危濟難奄有關河臣實無堪中㳙從事自洛食風塵河梁旗皷華隂有白馬之兵河曲有黄沙之陣臣雖用命不能竒策功薄賞厚因人成事恩澤年表常以愧心仰逢周朝以揖讓登庸謳歌受命主貴臣遷頻煩榮寵三槐以鑄鼎象物知其神姦五等以桓珪餙瑞守其宫室臣以何德兼而有之况復水土之職王梁以應䜟受徵兵戈之王韓信以登壇獨拜語其連類臣又何人當今四海未寧三方鼎峙陛下勞心之日羣公展効之秋而臣甲子既多耄年又及無恭賔客之事謬逹諸侯之班尸禄素餐乆紊彛典負乘致冦徒煩有司加以寒暑乖違節宣失序風水交侵菁華已竭雖復廉頗强飯馬援據鞍求欲報恩何能為役榮啓期之樂適足自貽燭之武之言無能為也特乞解所居官言從初服事符骸骨之請非謀几杖之賜若臣北陵移病東臯歸老山河茅社一反司勳公侯珪璧還封典瑞則朝無冐位之人臣免妨賢之責虞氏養老敢希東序之榮周朝如荼豈望西郊之禮但瞻仰天威方違咫尺徘徊城闕私増悽戀不任知止之情云云代人乞致仕表前人臣遡言臣聞一葉將隕寧待於風露百川皆到自竭者潢汚臣輙感之以悲以咽臣某中謝臣仲春之末舊患漸加雙足頗蹇四支不利扶歩有邯鄲之失勉視無離婁之明安可率此留務溷兹恒典陛下恩周曲成未忍捐棄微臣困至於亟轉不堪勝臣所以自咎自傷淚繼之血臣某中謝臣特承先緒進不因人陛下憫臣無用舉直而宥戅自奉圖太極宣綍中書陛下收臣於一心任臣以獨掌九年冀登宰輔八歳載踐宗伯出擁干旄入叅衡鏡或雲臺之上微臣預疇咨之旨或日觀之下詔臣操刋勒之文美而暢之臣實尤忝明憲不敢以纎負𤣥造竟微於滴助闕日月闕其如氷炭交集誠懐伏以前陪政事親荷德音謂臣等經侍軒墀子孫尚延保䕶臣荷螻蟻歘戴一作欵載非丘山臣宜生亦盡命死且陳力竊不知終而不知止朝列三數與臣同儕臣未六十推臣則㓜獨臣彌當一作留頓顇病不俟年盈量窮涯滿而招損逾時每乖於勿藥永日猶繫於苞桑覽分必然貪榮所忌伏乞免臣見職退畢餘生察臣榮不可支矜臣分不能强廼臣之幸也豈悟仁夀之闥有此一時承明之廬無縁再謁心神已弊晷刻増悲叨睿鑒則多士莫先違聖顔則小臣何逺惟冀三條啓道一作路萬乘廵京恱西怨之羣黎逮東封之從者危魂倘駐枯骨如存是臣之愜非臣所望臣又聞驅奔効駕先輟於羸駘翔集賀成近遺於鎩翮彼常知暮而况臣哉聞未遑請臣之懇戀至於隳官臣合書罪無任戰慄戀結之至為太僕卿新舊唐書作衛尉卿劉𢎞基請致仕表太宗上官儀臣某言臣輕生多幸早逢昌運締構之初得効駑蹇誠欵雖竭功績靡伸沐浴恩光謬叨榮級歴居近要出納隆顯顧循庸菲踰溢涯分思展塵露以酬洪造鏤骨銘肌無忘夙夜但犬馬之齒甲子已多風雨之疾惛眊日甚雖年非致事而力不當官簿領沉迷端緒紕繆乆尸厚禄靦懼在躬内省愆尤外慙物議乞解見職退就衡門朽質餘生獲從藥療冀蒙渥澤未歸泉壤難預朝請瞻望闕庭葵藿微心方希臨照不任悃欵之至伏願天慈特垂矜許輕塵聽覽愈増震越云云盧岐州請致仕表臣某言竊以日月迅驅歎留侯之過隙桑榆易晏嗟趙孟之愒隂是以杖國之儀曩籍之通訓夜行之誡先逹之明範臣三河素品一藝罕稱斂袵衡泌之間優㳺農仕之際特以雲雷肇構龍德在田遂得混吹齊庭薄遊梁苑昧昔賢之先覺慶生涯之嘉㑹屬大横固祉奬澤荐臻同菅蒯之靡遺喻袵席而無改叨竊非據綿歴歳時智能之効寂寥何紀伐檀以兹興刺濡翼由是致譏况乎時迫耄期識用衰耗仲宣體弱遽與年並修齡疾甚亦隨衰及范緌在餙深驚蒲栁之秋葆鬢承冠逾慙仁夀之鏡空貽謗毁坐紊官曹虛受之來履薄未均危懼知止之分餘生實所庶幾披瀝丹愚諒非矯餙伏願大明委照曲遂今請退影閑扉待終初服倘弊帷未掩岱宗少駐擊壤高其自逸高枕歡其有餘望瑤池之還駕候仙閭之歸躅臣筮仕聖朝位非才授曽微㳙滴少答鴻私收請骸骨心顔靦怍微臣限兹外任不獲拜奉闕庭犬馬之戀徘徊何已代劉幽州請致仕表臣某言臣海沂陋品業尚罕稱斂袵衡泌之間角巾人疑作山野之際夙安環堵之室罔知榮進之階屬天步方難覇圖資始遂偶飛龍之㑹預忝汗馬之期既而慶集私門恩被昆弟歴職内外備蒙選擢承乏三朝于兹三十餘載竟微塵髮之効空負亭育之私加以鍾漏已殫齒歴云暮杖國之年斯及夜行之懼載深若勉兹衰遲乆玷刺舉既取紊於官曹抑貽誚於通識當今天地休明賢能方軌豈可以策駑懐禄茹怍昧榮是以量力陳辭料能冩實天鑒凝逺特希憫照昔廣德休老方開漢室之恩陽元請骸空表晉朝之惠微臣竊景前懿敢祈今澤反初服於東臯沐薫風於窮巷倘高舂少駐弊盖未陳庶乎瑤池之曲延望白雲之宴仙閭之阿載奉翠華之謁犬馬之志實百恒心臨表鯁戀辭意懇結云云為殿中監趙元楷請致仕表上官儀臣某言臣聞高年致政前徵之彛凖仲秋授杖緜載之通規正以制逮乎桑榆愒隂於鍾漏臣顧惟菲陋輪轅無所瞻言賔實高謝等夷筮仕之初不期通顯干禄所望抑在代耕初以生涯多幸屬奉昌數仁被草木德洎昆蚑奬餙曲流豐恩傍洽言揚德舉内視缺然比彦叅賢載離滋永至於姬駿長驅奉𤣥池之廣晏姒龍避疑作逺騖陪樂野之宣逰塵露罕稱榮異空甚捫躬靦怍罔歴心顔既而二膳在辰懸輿甫及光華云徂聖造方深蒲柳行秋朽材知止勝西羌而側一作測勇惟東都而自收伏請禠帶彤闈歸骸素里挹清風於國讓追盛範於陽元効釣璜於渭濵類飛星於河渚是知疲驂解馭辭金根而不歸袵席幃幄去青蒲而方逺望軒屏而徘徊仰煙霄而鯁戀無任感愧之至為工部尚書叚綸請致仕表許敬宗臣綸言臣質輕散木運忝連姻濫叨右戚之榮曲荷睦親之禮攀鱗切漢顧毛羽而多慙雕朽成姿撫簮纓而自失在梁之誚甲子徒深大造之恩㳙塵靡報常懐戰灼夙夜無忘况以蒲栁易衰犬馬將暮沉痾歳積惛耄日侵雖復年未杖鄉而疾乖陳力愒隂理務沉迷簿領之書伏枕當官敢斁彛倫之序乆尸寵禄事等曠官内省愆尤何顔在職冐乞骸骨退就廬田庶得休閒微加攝餌則皇天有施生之惠庸臣免偷安之責倘蒙恩許負岳為輕但頓憊在躬方違旦夕仰軒檻而増戀望霄極以長懐伏紙陳誠心靈戰越不任悲愴之至為姚大夫請致仕歸侍表盧藏用臣某言臣聞孝於親者然後可以忠於君理於家者然後可以移於國臣實妄庸叨奉明聖職在樞要切寄股肱恩非始圖榮絶流軰臣之殞身無以上答然臣老母今年八十有一起居漸廢齒髮日衰飲食朝晡非臣不膳寢興侍奉非臣不歡臣欲僶俛國朝則顧復無報臣欲歸養私第則聖澤不貲實類羝羊羸角方同狼䟦其尾去歳陳乞初沐聖恩旋承後命不垂允納良由臣孝道衰廢至誠無感扣心泣血夙夜無寧臣自受北征緜歴旬月慈母銜泣朝夕倚閭寢膳不時重増羸耗臣子之道何以為心陛下聖澤逺覃中外無事彛倫攸叙俊乂盈朝臣之短才無所裨補伏願少垂矜察俯遂私恩許臣告歸之請終臣犬馬之養然後糜軀粉骨上答天造奮身虜庭効命戎幙臣之萬死不敢為恨無任愚懇之至為温給事請致仕歸侍表武后崔融臣某言臣以凡薄幸承基蔭一霑官侣三十餘年為子未能報鞠育之恩為臣未能答生成之惠公私靦冐夙夜驚惶乆欲退奉家園以避賢路直以犬馬識戀木石感恩猶希罄竭未即陳呌今臣母虞國夫人妾盧氏行年八十志力衰謝體氣虛羸先苦痃癖近微風痃委卧床枕緜歴歳時扶人不行加帛不煖比者西京有宅老母在堂臣以留司之餘尚接和缺半自忝膺皇睠袛命神都子奉局而莫從母倚閭而空切加以門衰祚薄長兄早世昏定晨省唯臣一身但臣之所以奉檄載馳釋巾從務貪榮徇禄唯迫於甘旨淺知薄能豈期於聞逹伏惟皇太后陛下天地容納雲雨霑被禄疑作録臣勳舊賜臣丘山臣雖小人豈忘大德然以聖人在上孝理天下整齊風俗砥礪名教臣縱不才其如禮法何臣雖無識其若朝庭何無任丹血勤懇之誠謹冐死詣闕請罷官歸養奉表以聞方違軒扆伏紙惶戀云云為王左相請致仕表李嶠臣及善言臣愚欵頻薦心隨言盡而睿旨彌隆禮以恩酬固辭則成命有廢勉進則私情不堪惟此憂惶坐交氷炭臣及善中謝臣志均駑馬知眷戀於軒櫪生比瘣木懼零落於風霜思十駕之驅馳迫四時之代序辭稻梁之惠寧是宿心乞桑榆之年但縁量力昔者主父未逹常健羡於陳鼎孔某遭難每慇勤於執鞭或排擯於中朝乍栖遲於列國况臣叨恩竊幸非待營求尸禄効官不假才藝獲當年之榮貴無曩世之艱虞豈應輕物傲時薄優游之寵官陳辭抗䟽循耿介之名節直以頺齡向盡衰疹踰加二首六身甲子催其歳月百骸九竅寒温煎其骨髓無仙童之却老有災䜿之侵年志力昏沉精神耗竭心已迷於方寸目乆暗於𤣥黄鳩杖扶危且猶不逮鵷池養望孰云非罪竊畏衆多之口顧思庸短之累昔之少壯猶不如人今也耄期詎堪經國是用披肝蹐地拜手祈天方登月制之辰庶免夜行之咎言非餙請理實誠陳陛下厚眷殊私尚留陪於簮屨老臣餘喘微息終絶望於軒墀空荷不貲之恩實無自强之地伏望俯矜疲劣微賜含容免其折鼎之憂假以懸車之樂倘殘骸未殯尚齒不遺猶望爼豆几筵接虞庠之庶老歳時朔望陪周行之末班更得拜奉宫闈瞻覩日月則生涯兼足死將不朽伏蝸廬而獻欵仰龍闕而翹魂心往形留授簡増欷無任拙疾衰老戀慕屏營之誠謹遣息清廟臺主簿温重詣朝堂奉表陳情以聞文苑英華卷六百三
