body:
  text: 文苑英華巻三百二十九宋李昉等編禽獸二蟲附百舌五首鸚鵡七首鴛鴦四首鸂鶒二首孔雀二首鷺鷥四首雞雉二首鷓鴣五首鳬二首鷗一首鵝鴨二首燕十七首雀四首子規二首雜題五首蝶三首蜂一首螢十一首百舌詠百舌劉孝綽山人惜春暮旭旦坐花林復值懐春鳥枝間弄好音遷喬聲迥出赴谷響幽深乍聽長而短時聞絶復尋孤鳴若無對百囀似羣吟昔聞屢歡昔今聽忽悲今聞聽非殊異遲暮獨傷心聼百舌劉氏徐悱妻庭樹旦新晴臨鏡出雕楹風吹桃李氣過傳春鳥聲净冩山陽笛全作洛濵笙注意留觀類聚作歡留聼誤令粧不成在長安聽百舌韋鼎萬里風烟異一鳥忽相驚那能對逺客還作故鄉聲聽百舌鳥李孝貞烟銷上路静漏盡禁門通好鳥從西苑流響入南宫間闗既多緒變轉復無窮調驚時斷絶音繁有異同飲啄歸承露飛鳴上别風未避王孫弹寧畏虎賁弓石渠皆學府麟閣悉文雄不恡一作恠青泥印時尋白社中汝濆秋事同仙州王長史翰聞百舌鳥祖詠秋天聞好鳥驚起出簾帷却念殊芳月能鳴已後時遷喬誠可早出谷此何遲顧影慙無對懐羣増所思凄凉嵗欲晩蕭索燕将辭留聼未終曲彌令心獨悲髙飛憑力致巧囀任天姿返覆和而静間闗斷若遺花繁上苑路霜落汝川湄且長凌風翮乗春自有期鸚鵡同蔡孚起居詠鸚鵡胡皓鸚鵡殊姿致鸞凰得比肩嘗尋金殿裏毎話玉堦前賈誼才方逹揚雄老未遷能言既有地何惜未聞天詠鸚鵡裴説常貴西山鳥銜恩在玉堂語傳明主意衣一作翅拂美人香緩歩尋珠網髙飛上畵梁長安頻道樂何日從君王同前李義府牽弋辭重海觸網去層巒戢羽雕籠際延思彩霧端慕侣朝聲切離羣夜影寒能言殊可貴相助憶長安同前杜甫鸚鵡含愁思聰明憶别離翠衿渾短盡紅觜謾多知未有開籠日空殘舊宿枝世人憐復損何用羽毛竒初出金門尋王侍郎不遇詠壁上鸚鵡李白落羽辭金殿一作闕孤鳴託集作吒繡衣能言終見棄還向隴山飛鸚鵡白居易隴西鸚鵡到江東養得經年觜漸紅常恐思歸先剪翅每因餧食暫開籠人憐巧語情雖重鳥憶髙飛意不同應似朱門歌舞妓深藏牢閉在房中同前呉英秀莫把金籠閉鸚鵡箇箇聰明觧人語忽然更向君前言三十六宫愁幾許鴛鴦和友人鴛鴦之什三首崔珏翠鬛紅毛舞夕暉水禽情似此禽稀暫分烟島猶廻首只渡寒塘亦並一作共飛映霧乍迷金殿瓦逐梭齊上一作還似玉人機採蓮無限蘭橈女笑指中流羡爾歸二寂寂春塘烟晩時一作曉時兩心如影共依依溪頭日暖眠沙稳渡口風寒浴浪稀翡翠莫誇饒彩飾鸊鵜湏羨好毛衣蘭深芷宻無人見相逐相呼何處歸三舞鶴翔鸞俱别離可憐生死兩相隨紅絲毳落眠沙處白雪花成蹙浪時琴上只聞交頸語窗前空展共飛詩如何相見長相對肯羡人間多所思鴛鴦羅鄴江雲一作紅閒碧静霽烟開錦翅雙雙一作輕飛去又廻一種鳥憐一作連名字好秪縁人恨别離來暖依牛渚江莎媚夕宿龍池禁漏催相對若教秦女見便應携一作同上鳯凰䑓鸂䳵鸂䳵杜甫故使籠寛織湏知動損毛看雲莫悵望失水任呼號六翮曽經剪孤飛只未髙且無鷹隼慮留滯莫辭勞同前唐彦謙一宿南塘煙雨時好風摇動緑波㣲驚離曉岸衝花去暖下春汀照影飛華屋撚絃弹鼓舞綺窗含筆澹毛衣畵屏見後長廻首争得雕籠莫放歸孔雀西川使宅有韋太尉集作令公時孔雀存焉暇日因與諸公同翫座中兼故府賔御集作妓興歎集作嗟者久之因賦是集作此詩用廣其意武元衡荀令昔居此故巢留越禽動摇金翠尾飛舞玉池一作墀又作堦隂一作碧梧音上客撤瑶瑟美人傷蕙心㑹因南國使歸放海雲深孔雀薛能偶有功名正俗才靈禽何事降瑶䑓天仙黼黻毛應是宫后屏幃尾忽開曽處嶂中真霧隠毎過庭下似春來佳人為我和衫柏遣作傞傞一作婆娑送一盃鷺鷥鷺鷥張祜深窺思不窮掲趾淺沙中一㸃山光净孤飛潭影空暗棲松葉露雙一作輕下蓼花風好似滄波侣垂絲趣亦同同前鄭谷閒立春塘一作秧煙澹澹静眠寒葦雨颼颼漁翁歸後沙汀晩集作汀洲晩飛下雜詠作上灘頭更自由同前裴説秋江清淺時魚過亦頻窺却為分明極翻成集作令所得遲浴偎紅日色棲壓碧蘆枝㑹共鵷同侣翺翔應可期同前羅隠斜陽澹澹栁隂隂風褭寒絲映水深不要雜詠作莫謾向人誇潔白也知長雜詠作常有羡魚心鷄雉山鷄温庭筠石集作萬壑動晴景山禽凌翠㣲繡翎翻草去紅觜啄花歸巢暖碧雲色影孤清鏡輝不知春樹畔何處又分飛雉李嶠白雉振朝聲飛來表太平楚郊疑鳯出陳寳若雞鳴童子懐仁至中郎作賦成兾君看飲啄耿介獨含情鷓鴣鷓鴣啼韋應物可憐鷓鴣飛飛向樹南枝南枝日照暖北枝霜露滋露滋不堪栖使我夜常啼願逄雲中鶴銜我向寥廓願作城上烏一年生九雛何不舊巢住枝弱不得一若作去何意道苦辛客子常畏人九子坂一作坡聞鷓鴣李羣玉落照蒼茫秋草明鷓鴣啼處逺人行正穿屈曲﨑嶇路又聼鈎輈格磔聲曽泊桂江深岸雨亦於梅嶺阻歸程此時為爾腸千斷定是今宵白髪生鷓鴣鄭谷暖戲烟蕪錦翼齊品流應得近山鷄雨昏青草湖邊過花落黄陵廟裏啼行客集作遊子乍聞征袖濕歌集作佳人纔唱翠眉低相呼相喚湘江濶集作相應湘天逺苦竹叢深春日西同前韋莊南禽無侣似相依錦翅雙雙傍馬飛孤竹廟前啼暮雨汨羅祠類詩作江畔弔殘暉秦人只觧歌為曲越女空能畵作衣懊惱澤家鷓鴣之音澤類詩作渾非有恨非類詩作知年年長憶鳯城歸放鷓鴣羅鄴好傍青山與碧溪刺桐毛竹一作羽待雙棲花時遷客傷離别莫向相思樹上啼鳬賦得汎汎水中鳬江總歸鳬沸卉同亂下方塘中出沒時銜藻飛鳴忽颺風浮深或不息戲廣若乗空春鸚徒有賦還笑在金籠鳬李嶠颯沓睢陽涘浮游漢渚隈錢飛出井見鶴引入琴哀李陵賦单題詩作降将貽詩罷王喬曳舄來何當歸太液翔集動成雷鷗詠白鷗何遜可憐雙白鷗朝共水上遊何言異棲息雌雌雌通用住雄不留孤飛出溆浦類聚作浦溆獨宿下滄洲東西從此去影響絶無由鵝鴨題鵝李商隠眠沙卧水自成羣曲岸斜集作殘陽極浦雲那得集作觧将心憐孔翠集作雀羈雌長共故雄分花鴨杜甫花鴨無泥滓堦前毎緩行羽毛知獨立黒白太分明不覺羣心妒休牽衆眼驚稻梁霑汝在作意莫先鳴鷰詠新鷰梁昭明太子類聚作梁簡文帝新禽應節歸俱向吹樓飛入簾驚釧響來窗疑類聚作礙舞衣詠鷰呉均一鷰海上來一鷰髙堂息一朝相逢遇依然舊相識問爾類聚作余來何遲山川幾紆直答言海路長風多類聚作駛飛無力詠簷鷰庾肩吾雙鷰集蘭閨雙飛髙復低向戸宜新箔登巢識故泥依櫩本相賀近幕願同栖和晉安王詠鷰可憐幕上鷰差池弄羽衣夜夜同巢宿朝朝相背飛銜泥瞻樂善相賀奉音徽秋蟬行寂寞戀此未辭歸啣泥雙燕蕭詮啣泥金屋外表瑞玉筐中學飛疑漢妾巢幕憚呉宫爪截還猶短窠成常不空一作巢成新尚空詎並零陵石飛舞逐春風賦得戲燕俱宿虞世基大厦初構與雲齊歸燕雙入正啣泥欲繞歌梁向舞閣偶為仙履徃蘭閨千里争飛㑹難並聊向呉宫比翼栖燕李嶠天女伺辰至𤣥衣澹碧空差池沐時雨頡頏舞春風相賀雕楹側雙飛翠幕中勿单題詩作忽驚留爪去猶兾識呉宫呉地記呉地人剪燕爪留之以記更來燕巢軍幕宋之問非闗憐翠幕不是厭朱樓故來呈燕頷報道欲封侯春燕徐璧雙燕今朝至何時發海濵窺人向簷語一作窺簷向人語如道故鄉春詠燕張九齡海燕何㣲眇乗春亦暫來豈知泥滓賤秪見玉堂開繡戸時雙入雕梁集作華軒日幾廻無心與物競鷹隼莫相猜燕啣泥馮渚雙燕碌碌飛入屋屋中老人喜燕歸徘徊繞我床頭飛去年為爾逐黄雀雨多屋漏泥土落爾莫厭老翁茅屋低梁頭作窠梁下棲爾不見東家黄􅙿鳴嘖嘖虵盤瓦溝䑕穿壁豪家大屋爾莫居驕兒少婦探爾雛井旁瀉水泥自足啣泥上屋隨爾欲同前韋應物啣泥燕聲嘍嘍尾涏涏秋去何所歸春還復相見豈不觧决絶髙飛碧雲裏何為地上啣泥滓啣泥雖賤意有營杏梁朝日巢欲成不見百鳥畏人林野宿飜遭羅網俎其肉未若啣泥入華屋燕啣泥百鳥之智莫與齊賦得早燕送别李益碧草漫一作縵如線来去集作去來雙飛燕長門未有春先入班姬殿梁空繞復一作不息簷寒窺欲遍今至隨紅蘂集作萼昔還悲素扇一别與秋鴻差池詎相見詠燕示劉叟劉叟有愛子背叟逃走一作去叟甚悲念之叟少年時亦嘗如是作燕詩以喻之白居易梁上有雙燕翩翩雄與雌啣泥兩椽間一巢生四兒四兒日夜長索食聲孜孜青蟲不易捕黄口無飽期觜爪雖欲敝心力不知疲須臾十来徃猶恐巢中飢辛勤三十日母瘦雛漸肥喃喃教言語一一刷毛衣一旦羽翼成引上庭樹枝舉翅不廻頭集作顧隨風四散飛雌雄空中鳴聲盡呼不歸却入空巢裏啁啾終夜悲燕燕爾勿悲爾當反自思思爾為雛日髙飛背母時當時父母念今日爾應知洞房燕張祜清曉洞房開佳人喜燕来乍疑釵上動輕似掌中廻暗語臨集作通窗户深窺傍鏡臺粧成集作新粧正含思莫拂畫梁埃燕鄭谷年去年來來去忙春寒煙暝度瀟湘低飛緑岸和梅雨散集作亂入紅樓揀一作擇杏梁閒几硯中窺水淺落花徑裏得泥香千言萬語無人㑹又逐流鸎過短墻巢燕胡汾燕來巢我簷我屋非髙大所貴兒童善保爾無殃禍莫巢孀婦家孀婦怨孤坐妒爾長雙飛打爾危巢破雀詠雀沈趨體類詩作肌薄少滋腴色淺非丹翠不懼越王羞寧懐秦后珥傍簷葺寒草循場啄餘穂且欣大厦成焉湏鴻鵠志同前李嶠大厦初成日嘉賔集杏梁啣書表周瑞入幕應王祥暮宿空集作江城裏朝遊漣水傍願齊鴻鵠志希逐鳯凰翔義崔行和朱評事賈島𤣥鳥雌雄俱春雷驚蟄餘口銜黄河泥室宜集作空即翔天隅一夕背集作皆暮歸嘵嘵遺衆雛雙雀抱仁義哺之㤀勞劬集作哺食勞劬劬衆雛既儷飛集作雛既邐迤飛雲間聲相呼燕雀雖㣲類集作燕感雀深恩感愧誠集作雀媿揚不殊賢禽難自彰幸䝉主人書簷雀楊發弱羽怯孤飛投簷幸所依銜環唯報德賀厦本知歸紅觜休争顧丹心自識機從來攀鳯足生死戀光輝子規攝山聽子規顧况棲霞山中子規鳥口中血出啼不了山僧夜後初入來一作定聞似不聞山月曉山中聽子規前人野人愛向山中宿况在葛洪丹井西庭前有箇長松樹夜半子規來上啼子規前人杜宇寃亡積有時年年啼血動人悲若教恨魄皆能化何樹何山看子規聞子規杜荀鶴楚天空濶月沉淪蜀魄聲聲似告人啼得血流無用處不如緘口過殘春子規思陳陶春山杜䳌來幾日夜啼南家復北家野人聼此坐惆悵恐畏踏落東園花聞子規羅鄴蜀魄千年尚怨誰聲聲啼血向花枝滿山明月東風夜正是愁人不寐時雜題望栖鳥劉孝威夕鳥亂参差單雄雜寡雌聫翩歸葉裏出沒噪林垂争栖時易樹驚飛忽度枝􅢖無繋書重亦有含櫻疲以兹憔悴力重逢輕薄兒珠丸蘇合弹金繳青絲縻豈意翩翾羽遂免更羸危入懐欣得地依林竊願知病鴟韓愈屋東惡水溝有鴟墜集作墮鳴悲青泥掩兩翅拍拍不得離羣童呌相召瓦礫争先之計校生平事殺却理亦宜奪攘不愧恥飽滿盤天嬉晴日占光景髙風送集作恣追隨遂集作疑陵鸞鳯羣肯顧鴻鵠集作鵠鴈卑今者運命窮遭逄巧丸兒中汝要害處汝能不得施於吾乃何有不忍乗其危救集作丐汝将死命浴以清水池朝飡輟魚肉暝宿防狐狸自知無以致䝉徳久猶疑飽入深竹叢饑來傍集作上堦基諒無責報心固以聼所為昨日有氣力飛跳㺯籓籬今辰忽徑去曽不報我知徼倖非汝福天衢汝休窺京城事弹射豎子豈集作不易欺勿諱泥坑辱泥坑乃良規題戴勝賈島星㸃花冠道士衣紫陽宫女化身飛能傳上界春消息若到蓬山莫放歸啄木兒朱餘慶丁丁向晩急還稀啄遍類詩作盡庭槐未肯歸終日與類詩作為君除蠧害莫嫌集作嗔無事不頻飛越鳥鄭谷背霜南鴈不到處倚棹北人初聼時梅雨滿江春草歇一聲聲在荔枝枝蝶詠花蝶温子昇素蝶向林飛紅花逐風散花蝶俱不息紅素還相亂芬芬共襲予葳蕤徒可翫可慰行客心遽動離君疑作居嘆蝶羅隠漢王刀筆精冩爾逼天生舞巧何妨急飛髙所恨輕野田黄雀慮山館主人情此物那堪作荘周夢不成同前李商隠飛來繡戸隂穿過畵樓深重傅秦䑓粉輕塗漢殿金相兼唯栁絮所得是花心可要陵孤客邀為子夜吟蜂蜂李商隠小集作沙苑華池爛漫通後門前檻思無窮宓妃腰細纔勝露趙后身輕欲倚風紅壁寂寥崖蜜盡碧簷集作簾迢遞霧巢空青陵粉蝶休離恨長定一作是相逢二月中螢詠螢梁簡文帝本将秋草并類聚作並今與夕風輕騰空類星霣拂樹若花生屏疑神火照簾似夜珠明逄君拾光彩不怯此身輕月中飛螢紀少瑜逺度時依幕斜來如畏窗向月光還盡臨池影更雙詠螢沈旋火中變腐草明滅靡恒調雨墜弗虧光陽昇反奪照泊樹類奔星集草疑餘燎望之如可灼攬之徒有耀照帙秋螢楊縉秋窗餘照盡入暗早螢來忽聚還同色恒然詎落灰飛影黄金散依帷縹帙開含明終不息夜月空徘徊詠螢于季子卉草誠幽賤枯朽絶因依忽逄惜疑羽翼不覺生光輝直念恩華重長嗟報効㣲方思助日月為許願曽二字疑飛同前李嘉祐映水光難定凌虗體自輕夜風吹不滅秋露洗還明向燭仍藏熖投書更有情猶将流亂影來此傍簷楹詠秋螢虞世南的厯流光小飄颻弱翅輕恐畏無人識獨自暗中明螢火杜甫幸因腐草出敢近太陽飛未足臨書巻時能㸃客衣隨風隔幔小帯雨傍林㣲十月清霜重飄零何處歸螢羅隠空集作秋庭夜未央㸃的集作㸃㸃度危集作西墻抱影何卑集作㣲細乗時忽發揚不思因腐草便擬倚孤光若道通文翰集作能通照車公業豈長同前唐彦謙日下蕪城莾蒼中濕螢撩亂起衰叢寒烟陳后長門閉夜雨隋家舊苑空星散欲陵前檻月影低如試北窗風羇人此夕方愁緒心似寒灰首似蓬同前周繇熠熠與姢姢池塘竹樹邉亂飛同曳火成聚却無烟㣲雨􅎈不滅輕風吹欲燃舊曽書案上頻把作囊懸文苑英華巻三百二十九
