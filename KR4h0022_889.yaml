body:
  text: 文苑英華卷八百九十宋李昉等編王爵一此下三卷英華所編失作者先後今正之周上柱國齊王憲碑一首唐義陽王李琮碑一首周上柱國齊王憲神道碑庾信昔者軒皇受姓十有四人周室先封十有五國自爾承基纂胄保姓受氏雖復千年一聖終是百世同宗故知昔之東京既稱大一作炎漢再受今之周歷即是鄷都中興公諱憲字毗賀突恆州武川人也晉太康之世一作始據有黃龍魏孝昌之初奄荒玄莵太祖以百二諸侯三分天下函谷先登鴻溝大定功業如此人臣以終公含章天挺命世誕生降太一之神下文昌之宿珠角擅竒山庭表德儀範清冷風神軒舉聳動廊廟光華城闕未逾齠齓已議論天下事人或曰是謂弱木一枝十二字一作天下衣裘裳先能問曰是問謂若木一枝旁蔭數國長河一直自然千里風飈欲逺光景將升後魏二年封涪城縣開國公時年五嵗也虹霓滿野是廢當途之髙鸑鷟鳴岐實始維新之命國家光宅受圖欽明秉歷大風初卷長沙始封周元年進爵安城郡公食邑二千户仍授使持節驃騎大將軍開府儀同三司開府同於馬駿秩擬六卿驃騎等於劉蒼位髙三事宗子維城彼多慙色武城二年授使持節大將軍都督益夀寧周書作益寧巴瀘等二十四州諸軍事益州刺史改封齊國公食邑萬户公時年十有六王武子以上將開府未滿立年荀中郎為十用都督才踰弱冠方之於公已為老矣加復營邱負海齊桓公受脤之城岷山導江漢武帝求仙之地自非名陵孤竹聲振沉黎豈得南至穆陵西登積石幸無白虎之患寧待黃龍之盟卭筰畏威微盧仰德生為立廟刻石頌功成都有文翁之祀非謂生前漢陽有諸葛之碑止論身後比之今日豈可同年而語哉保定四年與大司馬蜀國公圍金墉城師臨洛浦則廣武營奔兵上邙山則河橋路斷八川風俗五方名利鐵市銅街風飛塵起天和元年徴還行雍牧公以日月之明威神其政漆沮既從荆岐即乂少陽用事路不喘牛仲秋以殷民無驚水二年拜大司馬仍理一作釐小冡宰營室殿軍器太監天官以邦國為基是司六典夏官以兵戈為主專謀七德是以器械填委既包吳漢之功宫殿峥嶸彌狀蕭何之法時以白露涼風務間農隙督兵三萬出自宜陽拔伏龍之城平姚萇之壘馬陵削樹魏將路窮平隂聽烏齊師其遁天子冡弟禮絶群公仁義所往事資道德建德元年進爵為王仍拜大冡宰姫旦封於曲阜不廢居中劉交國於彭陽無妨常從豈直周召二南並居師傅晉鄭兩國俱為卿士而已哉胸奴突於武川爟火通於灞上公述職巡御治兵朔方馬邑星飛一作回龍城月動撓留犂出漢書胸奴傳一作桃非之酒經略不前失煙支之山下馬而去東鄰逆命反道敗德囚箕子於寒庫罵文王於玉門天子將有孟津之師召公獨議公報以誕應天命克成厥勳昔者秦昭起師於蜀直問張儀晉武用兵於吳惟謀羊祐於是中軍無帥僉曰有歸五年拜上柱國元戎東討給王鐡騎二萬先襲太原一作并州斗建麾兵天離轉戰虎嘯風騰雲飛電掩林胡棗栗詎得充飢晉陽荻蒿何能拒防又加王精兵六萬長圍晉州然後六軍星陳萬騎雷動中權始及前茅已戰自爾即為前鋒橫行入鄴觀彼車絓槐本馬驚旋濘積甲髙昆陽之城尸封塞富平之水莫不如彼建瓴同斯破竹一朝指揮六合大定是用光昭下武翼亮中都足以攄祖宗之宿憤解生民之怨黷疑作讎方當待彼石閭部斯玉鼓經緯天地光華日月既而赤烏夾日黃熊入寢實沉無祀桑林不祭宣政元年六月二十八日薨春秋三十有四季友之亡魯可知矣齊喪子雅薑其危哉公器一作墻宇淹曠風神透逺璣鏡照林山河容納置鐏待酌懸鍾聽扣聲動天下光照四鄰武皇帝以介弟懿親特垂愛友而密謀竒䇿加禮敬焉常謂左右曰孔子云自吾有回門人日親其齊王之謂也用之作宰則萬方協和用之撫軍則四表懾伏豈直臯繇為士國無不仁隨會為卿民無群盜愛玩書籍敦崇禮樂一作典管絃入耳則溪谷俱調文雅沿心則煙霞並韻養由百發落鴈吟猿應奉五行綈緗縹帙雍容舉止抑揚談論當世以為楷模搢紳以為軌範則少有壯志頗校兵書玄水降靈穀城授䇿飛風長柳月角星眉莫不吟誦在心撰成於手所著兵法凡有五卷六韜九法一作地不用吳起舊書三令五申無勞孫武先誡可謂有忠孝焉有壯武焉不自驕矜兼疑作謙光下物宋人獻玉不貪為寶百成子髙守仁為富不謂以信致欺為善非樂天年不享嗚呼哀哉以某年月日葬于石安縣洪瀆川之里原隰悽愴埋於盛德幾年邱陵搖落藴於才良永矣乃為銘曰悠哉朔方逖矣窮隂山連鳥道一作羽地盡龜林重黎業大伯翳功深胄其積德必有君臨大祖撥亂喪君有君一作有功實君功非回地軸䇿動天文猶臨赤水尚復黃雲諸侯八百天下三分公之挺生實惟天假翠微臣疑作神降文昌星下照于四國充于兩社左傳作問于兩社舟楫江河棟梁華夏水通詞鋒風飛文雅純深之性地一作義極天經忠貞之道事感百靈君親惟一臣子惟寧忠泉出井孝笋生庭乃宰天官為國之輔是居上將為天之柱乃聖乃神惟文惟武䇿髙開闢威移雲雨九宫神略三術謨明天離轉陳月德廽兵黎陽水駭官渡山驚冀州既載東原底平溟波欲運弱木將危中峰嶽斷半海鵬垂鳳沉丹穴龍亡黑陂臨淄廢市東武山移千齡萬古英聲在斯唐贈陳州刺史義陽王神道碑張説昔髙祖之起唐侯革隋命太宗之威四海正萬邦作藩帝家用建王國二十一族堯之昭也十有一宗文之穆也王諱琮字某文帝之孫紀王之子龍種異品鳳毛秀色仁義天啓德威日就學無不探藝無不究故齊王之胤以爵推恩周公之子以才分政惣角封義陽郡王弱冠拜歸州刺史又守檀州又撫沂州若敖之舊荆人是懲單于之衝胡馬自逺淮沂其乂邦國不空遭王運中微投於南海書稱大去憫失土之諸侯禮不逃誅議無辜之王子某年月日遘六道酷吏薨于桂林之野春秋五十神龍之初興廢繼絶追贈陳州刺史王生不得志殁受遺榮信乎才之短長不如命之豐約德之輕重不如藝之厚薄古集作有矣季子豫州刺史行休髫齓羈旅集作孤託身炎厲藐是餘慶巋然獨存泣血上請迎喪逺裔開元四年二月至桂州王同氣三人往偕遇禍殯殮無主封樹缺如嵗月茫茫盡為野草闕鄰母而失處訪樵童而莫識議者以為不可復得冝招魂而改葬行休拊心蒼昊誓不徒還乃掃亭館設地席潔齋懇惻覬乎幽報遂頻夜髣佛集作象曲示其端夢唐書無此字王乘舟舟分為兩既而適野見東洲中斷因忽悟焉隂隱微明率此類也又靈堂鎖莖一夕自屈管上有三指四迹一竒二並其旁鐡生文理布列成卦衆駭其異使善易者張法蓍之曰屈者於文為尸出指者於義為指縱一竒二並三殯近闕集作闊若引渦上集作山揆之可以察先王之心矣考夢協卜定處刻辰以某月二十八日於桂城東洲發見神柩舉體咸備而一節闕焉行休甚痛惋若身集作自毁裂其夜又夢王告在南洛州唐洛書作南洲厥明直舊殯而南十有九步沙洲痕下掘而得之安合如故他日北郭之外又集無又字併收二叔父焉於是乎驗蓍之有徵也孑孑三旐連軸歸飛遙遙百越經途瞻歎零桂人士集無士字以為美談夫至孝潛通精魄昭應虛無之見推步而有窈冥之體尋求而致雖前志所詳未有幽感反覆若斯之昭晰矣以某年月日陪葬於昭陵柏城妃汝南周氏祔焉禮也妃考曰駙馬都尉梁郡襄公妣曰臨川大長公主宗周玄胄大君自出左右圖史循環法度邦有好逑室無集作先非偕老以王之故薨于掖宫初永昌之難王下河南獄妃録司農寺唯有崔集作方氏女集無女字屝屨布衣往來供饋徒行悴色傷動人倫中外咨嗟目為勤孝王之集無之字二子配在嶲州及六道使之用刑也長曰行逺以冠就戮次曰行芳以童當捨芳啼號抱行逺乞代兄命既不見聽固求同盡西南傷之稱為死悌君子謂勤孝者仁之厚也死悌者友之難也感神者誠之至也此三者有以見義陽之義方賢妃之內訓繼體之崇德夫如是淳美上歸乎本朝盛烈延耀乎邦族安可闕而不飾碑版無文而已哉銘曰髙邱白雲維堯大理函谷紫氣維周柱史百代福流千齡運起冨有海內貴為天子聖帝才子於穆紀王賢王祚胤倬哉義陽慎徽九德九德有常允釐三郡三郡以康明夷于飛州崖之下梁木其壞桂林之野不識阡陌無存松檟于以求之人莫知者哀哀孝子眷眷靈夢語妙常閣文微甄仲南洛占從東洲億中舊穸移偏新棺改贈既克返葬亦附山陵卜去其吉神心允慿人非地是迹謝名稱青青松柏不顯不承文苑英華卷八百九十
