body:
  text: 文苑英華卷八百九十宋李昉等編王爵一此下三卷英華所編失作者先後今正之周上柱國齊王憲碑一首唐義陽王李琮碑一首周上柱國齊王憲神道碑庾信昔者軒皇受姓十有四人周室先封十有五國自爾承基纂胄保姓受氏雖復千年一聖終是百世同宗故知昔之東京旣稱大一作炎漢再受今之周歷即是鄷都中興公諱憲字毗賀突恒州武川人也晋太康之世一作始㨿有黄龍魏孝昌之初奄荒𤣥莵太祖以百二諸侯三分天下凾谷先登鴻溝大定功業如此人臣以終公含章天挺命世誕生降太一之神下文昌之宿珠角擅竒山庭表德儀範清冷風神軒舉聳動廊廟光華城闕未逾齠齓已議論天下事人或曰是謂弱木一枝十二字一作天下衣裘裳先能問曰是問謂若木一枝旁䕃數國長河一直自然千里風飈欲逺光景將昇後魏二年封涪城縣開國公時年五嵗也虹蜺滿野是廢當途之髙鸑鷟鳴岐實始維新之命國家光宅受圖欽明秉歴大風初巻長沙始封周元年進爵安城郡公食邑二千户仍授使持節驃騎大将軍開府儀同三司開府同於馬駿秩擬六卿驃騎等於劉蒼位髙三事宗子維城彼多慙色武城二年授使持節大将軍都督益夀寕周書作益寕巴瀘等二十四州諸軍事益州刺史改封齊國公食邑萬户公時年十有六王武子以上将開府未滿立年荀中郎為十用都督才踰弱冠方之於公已為老矣加復營邱負海齊桓公受脤之城岷山導江漢武帝求仙之地自非名陵孤竹聲振沉黎豈得南至穆陵西登積石幸無白虎之患寕待黄龍之盟卭筰畏威㣲盧仰德生為立廟刻石頌功成都有文翁之祀非謂生前漢陽有諸葛之碑止論身後比之今日豈可同年而語哉保定四年與大司馬蜀國公圍金墉城師臨洛浦則廣武营奔兵上邙山則河橋路㫁八川風俗五方名利鐵市銅街風飛塵起天和元年徴還行雍牧公以日月之明威神其政漆沮旣從荆岐即乂少陽用事路不喘牛仲秋以殷民無驚水二年拜大司馬仍理一作厘小冡宰营室殿軍噐太監天官以邦國為基是司六典夏官以兵戈為主專謀七德是以噐械填委旣包吳漢之功宫殿峥嵘彌状蕭何之法時以白露凉風務閑農隙督兵三萬出自宜陽㧞伏龍之城平姚萇之壘馬陵削樹魏将路窮平隂聴烏齊師其遁天子冡弟禮絕群公仁義所徃事資道德建德元年進爵為王仍拜大冡宰姫旦封於曲阜不廢居中劉交國於彭陽無妨常從豈直周召二南並居師傅晋鄭两國俱為卿士而已哉匈奴突於武川爟火通於灞上公述職廵御治兵朔方馬邑星飛一作廻龍城月動撓留犂出漢書匈奴傳一作桃非之酒經略不前失煙支之山下馬而去東隣逆命反道敗德囚箕子於寒庫罵文王於玉門天子將有孟津之師召公獨議公報以誕應天命克成厥勲昔者秦昭起師於蜀直問張儀晋武用兵於吳惟謀羊祐於是中軍無帥僉曰有歸五年拜上柱國元戎東討給王鐡騎二萬先襲太原一作并州斗建麾兵天離轉戰虎嘯風騰雲飛電掩林胡棗栗詎得充饑晋陽荻蒿何能拒防又加王精兵六萬長圍晋州然後六軍星陳萬騎雷動中權始及前茅已戰自爾即為前鋒横行入鄴觀彼車絓槐本馬驚旋濘積甲髙昆陽之城尸封塞富平之水莫不如彼建瓴同斯破竹一朝指揮六合大定是用光昭下武翼亮中都足以攄祖宗之宿憤觧生民之怨黷疑作讎方當待彼石閭部斯玉鼓經緯天地光華日月旣而赤烏夾日黄熊入寢實沉無祀桑林不祭宣政元年六月二十八日薨春秋三十有四季友之亡魯可知矣齊䘮子雅姜其危哉公噐一作墻宇淹曠風神透逺璣鏡照林山河容納置鐏待酌懸鍾聴扣聲動天下光照四鄰武皇帝以介弟懿親特垂愛友而宻謀竒䇿加禮敬焉常謂左右曰孔子云自吾有囬門人日親其齊王之謂也用之作宰則萬方恊和用之撫軍則四表懾伏豈直臯繇為士國無不仁隨㑹為卿民無群盗愛翫書籍敦崇禮樂一作典管絃入耳則溪谷俱調文雅沿心則煙霞並韻養由百發落鴈吟猨應奉五行綈緗縹帙雍容舉止抑揚談論當世以為楷模搢紳以為軌範則少有壮志頗校兵書𤣥水降靈糓城授䇿飛風長柳月角星眉莫不吟誦在心撰成於手所著兵法凡有五巻六韜九法一作地不用吳起舊書三令五申無勞孫武先誡可謂有忠孝焉有壯武焉不自驕矜兼疑作謙光下物宋人獻玉不貪為寶百成子髙守仁為富不謂以信致欺為善非樂天年不享嗚呼哀哉以某年月日塟于石安縣洪瀆川之里原隰悽愴埋於盛德㡬年邱陵摇落藴於才良永矣乃為銘曰悠哉朔方逖矣窮隂山連鳥道一作羽地盡龜林重黎業大伯翳功深胄其積德必有君臨大祖撥亂䘮君有君一作有功實君功非廻地軸䇿動天文猶臨赤水尚復黄雲諸侯八百天下三分公之挺生寔惟天假翠㣲臣疑作神降文昌星下照于四國充于两社左傳作問于两社舟檝江河棟梁華夏水通詞鋒風飛文雅純深之性地一作義極天經忠貞之道事感百靈君親惟一臣子惟寕忠泉出井孝笋生庭乃宰天官為國之輔是居上將為天之柱乃聖乃神惟文惟武䇿髙開闢威移雲雨九宫神畧三術謨明天離轉陣月德廽兵黎陽水駭官渡山驚冀州旣載東原底平溟波欲運弱木將危中峰岳㫁半海鵬垂鳳沉丹穴龍亡黒陂臨淄廢市東武山移千齡萬古英聲在斯唐贈陳州刺史義陽王神道碑張說昔髙祖之起唐侯革隋命太宗之威四海正萬邦作藩帝家用建王國二十一族堯之昭也十有一宗文之穆也王諱琮字某文帝之孫紀王之子龍種異品鳳毛秀色仁義天啓德威日就學無不探藝無不䆒故齊王之𦙍以爵推恩周公之子以才分政惣角封義陽郡王弱冠拜歸州刺史又守檀州又撫沂州若敖之舊荆人是懲單于之衝胡馬自逺淮沂其乂邦國不空遭王運中㣲投於南海書稱大去憫失土之諸侯禮不迯誅議無辜之王子某年月日遘六道酷吏薨于桂林之野春秋五十神龍之初興廢繼絶追贈陳州刺史王生不得志殁受遺榮信乎才之短長不如命之豊約德之輕重不如藝之厚薄古集作有矣季子豫州刺史行休髫齓覊旅集作孤託身炎厲藐是餘慶巋然獨存泣血上請迎䘮逺裔開元四年二月至桂州王同氣三人徃偕遇禍殯殮無主封樹缺如嵗月茫茫盡為野草闕鄰母而失處訪樵童而莫識議者以為不可復得冝招䰟而改塟行休拊心蒼昊誓不徒還乃掃亭舘設地席潔齋懇惻覬乎幽報遂頻夜髣髴集作象曲示其端夣唐書無此字王乗舟舟分為两旣而適野見東洲中㫁因忽悟焉隂隱㣲明率此類也又靈堂鎻莖一夕自屈管上有三指四迹一竒二並其旁鐡生文理布列成卦衆駭其異使善易者張法蓍之曰屈者於文為尸出指者於義為指縱一竒二並三殯近闕集作闊若引渦上集作山揆之可以察先王之心矣考夣恊卜定處刻辰以某月二十八日於桂城東洲發見神柩舉體咸備而一節闕焉行休甚痛惋若身集作自毁裂其夜又夣王告在南洛州唐洛書作南洲厥明直舊殯而南十有九歩沙洲痕下掘而得之安合如故他日北郭之外又集無又字併收二叔父焉於是乎驗蓍之有徵也孑孑三旐連軸歸飛遥遥百越經途瞻歎零桂人士集無士字以為羙談夫至孝潜通精魄昭應虛無之見推歩而有窈冥之體尋求而致雖前誌所詳未有幽感反覆若斯之昭晰矣以某年月日陪塟於昭陵栢城妃汝南周氏祔焉禮也妃考曰駙馬都尉梁郡襄公妣曰臨川大長公主宗周𤣥胄大君自出左右圖史循環法度邦有好逑室無集作先非偕老以王之故薨于掖宫初永昌之難王下河南獄妃録司農寺唯有崔集作方氏女集無女字屝屨布衣徃來供饋徒行顇色傷動人倫中外咨嗟目爲勤孝王之集無之字二子配在嶲州及六道使之用刑也長曰行逺以冠就戮次曰行芳以童當捨芳啼號抱行逺乞代兄命旣不見聴固求同盡西南傷之稱為死悌君子謂勤孝者仁之厚也死悌者友之難也感神者誠之至也此三者有以見義陽之義方賢妃之内訓繼體之崇德夫如是淳羙上歸乎本朝盛烈延耀乎邦族安可闕而不餙碑版無文而已哉銘曰髙邱白雲維堯大理凾谷紫氣維周柱史百代福流千齡運起冨有海内貴為天子聖帝才子於穆紀王賢王祚𦙍倬哉義陽慎徽九德九德有常允釐三郡三郡以康明夷于飛州崖之下梁木其壊桂林之野不識阡陌無存松檟于以求之人莫知者哀哀孝子眷眷靈夣語妙常閤文㣲甄仲南洛占從東洲億中舊穸移偏新棺改贈旣克返𦵏亦附山陵卜去其吉神心允慿人非地是迹謝名稱青青松栢不顯不承文苑英華巻八百九十
