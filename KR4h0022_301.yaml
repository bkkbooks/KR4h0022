body:
  text: 文苑英華卷三百一宋李昉等編悲悼一僧附追述三十七首沈約十首陳子昂七首張説五首杜甫八首高適四首僧靈一三首悼亡見三百二卷沈約懷舊九首傷王融前人元長秉竒調弱冠慕前蹤眷言懷祖武一簣望成峯塗艱行易跌命舛志難逄折風落迅羽流恨滿青松傷謝朓前人吏部信才傑文風振竒響調與金石諧思遂風雲上豈言凌霜質忽隨人事往尺璧爾何寃一日類聚作旦同丘壤傷庾杲之前人右率馥時譽秀出冠朋僚聳茲千仞氣振此百尋條藴藉含文雅散朗溢風飈楸檟今已合容範尚昭昭傷王諶前人長史體間任坦蕩無外求持身非詭遇應物有虛舟心從朋好盡形為歡宴留歡宴未終畢零落委山丘傷虞炎前人東南既擅美洛陽復稱才携手同歡宴比迹共逰類聚作追陪事隨短秀落言歸長夜臺傷李圭之前人少府懷貞節忘軀欣類聚作濟所奉吏道勤不息繁文長自擁既闕優孟歌身沒誰為寵傷韋景猷前人韋叟識前載博物備戎華稅驂止營校淪迹委泥沙始知庸聼局方悟大音賖傷劉渢前人處和無近纍天然有勝質蕭瑟負高情耿介懷秋實義貴良為重蘭摧非所恤一罷平生言寧知携手日傷胡諧之前人豫州懷風範綽然標雅度處約志不渝接廣情無忤頡頏事刀筆紛綸遞朱素美志同山河浮年迫朝露薊丘覽古贈盧居士藏用七首并序陳子昻丁酉嵗吾北征出自薊門歷觀燕之舊都其城池霸業迹已蕪昧矣乃慨然仰歎憶昔樂生鄒子羣賢之遊盛矣因登薊丘集作樓作七詩以志之寄終南盧居士亦有軒轅之遺迹也軒轅臺前人北登薊丘望求古軒轅臺應龍已不見牧馬空集作生黃埃尚想廣成子遺迹白雲隈燕王前人南登碣石館遙望黃金臺丘陵盡喬木昭王安在哉霸圖悵已矣驅馬復歸來樂生前人王蕩已淪昧戰國競貪兵樂生何感激仗義下齊城雄圖竟中夭遺歎寄阿衡燕太子前人秦王日無道太子怨亦深一聞田光義匕首贈千金其事雖不立千載為傷心田光先生前人自古皆有死循義良獨稀奈何燕丹集作太子尚使田公集作光疑伏劍誠已矣感我涕霑衣鄒衍前人大運淪三代天人罕有窺鄒生何遼集作寥廓謾説九瀛垂興亡已千載今也則無推郭隗前人逢時獨為貴歷代非無才隗君亦何幸遂起黃金臺五君詠逹志美類刺義感異哀事顔氏之心也凝焉張説齊公魏元忠前人齊公生人表回天聞鶴唳清論早揣摩玄心晚超詣入相廊廟靜出軍沙漠霽見深吕祿憂舉後陳平計甘心除君惡足以報先帝許公蘇瓌前人許公信國禎克美具瞻情百事資朝問三章廣世程處高心本有臨節自為名朱户傳新戟青松拱舊塋凄涼丞相府餘慶在元成趙公李嶠前人李公實神敏才華乃天授睦親何用心處貴不忘舊故事遵臺閣新詩冠宇宙在人忠所奉惡我誠將宥南浦去無集作莫歸嗟嗟蔑孫秀代公郭元振前人代公舉鵬翼懸飛摩海霧志康天地屯適與雲雷遇興喪一言決安危萬心注大勳書王府舛命淪江路勢傾北夏門哀靡東平樹耿公趙彥昭前人耿公山嶽靈才傑心亦妙鷙鳥峻標立哀玉扣清調叶贊休明啓恩華日月照何意瑤臺雪風吹落江徼湘流下潯陽灑淚一投弔八哀詩並序杜甫傷時盜賊未息興起王公李公嘆舊懷賢終於張相國八公前後存沒遂不詮次焉贈司空王公思禮前人司空出東夷童稚刷徑翮追隨燕薊兒頴鋭一作脫物不隔服事哥舒翰意無流沙磧未甚拔行間犬戎大充斥短小精悍姿屹然強寇敵貫穿百萬衆出入由咫尺馬鞍懸將首甲外控鳴鏑洗劍青海水刻銘天山石九曲非外蕃其王轉深壁飛兔不近駕鷙鳥資遠擊晚學集作曉逹兵家流飽聞春秋癖胸襟日沉靜肅肅自有適潼關初潰散萬乘猶辟易偏禆無所施元帥見手格太子入朔方至尊狩梁益胡馬纒伊洛中原氣甚逆肅宗登寶位塞望勢敦迫公時徒步至請罪將厚責際會清河公房太尉間道傳玉册天王拜跪畢讜議果氷釋翠華卷飛雪一作飛雪中熊虎亘阡陌屯兵鳳凰山帳殿涇渭闢金城賊咽喉詔鎮雄所扼禁暴靜一作清無雙爽氣春淅瀝巷有從公歌野多青青麥及夫哭廟後復領太原役恐懼祿位高悵望王土窄不得見清時嗚呼就窀穸永繫五湖舟悲甚田橫客千秋汾晉間事與雲水白昔觀文苑傳豈述亷頗迹集作藺績嗟嗟鄧大夫士卒終倒戟故司徒李公光弼前人司徒天寶末北收晉陽甲胡騎攻吾城愁寂意不愜人安若泰山薊北斷右脅朔方氣乃蘇黎首見帝業二宫泣西郊九廟起頺壓未散河陽卒思明偽臣妾復自碣石來火焚乾坤獵高視笑祿山公又獻大捷集作大獻捷異王册崇勳小敵信所怯擁兵鎮河汴千里初妥帖青蠅紛營營風雨秋一葉內省未入朝死淚終映睫大屋去高楝長城掃遺堞平生白羽扇零落蛟龍匣雅望與英姿惻愴槐里接三軍晦光彩烈士痛稠疊直筆在史臣將來洗箱篋吾思哭孤冢南紀阻歸楫扶顛永蕭條未濟失利涉疲苶竟何人灑淚集作涕巴東峽贈左僕射鄭國公嚴公武前人鄭公瑚璉器華嶽金天晶昔在童子日已聞老成名嶷若集作然大賢後復見秀骨清開口取將相小心事友生閲書百氏集作紙盡落筆四座驚歷職匪父任嫉邪常力爭漢儀尚整肅胡騎忽縱橫飛傳自河隴逢人問公卿不知萬乘集作乘輿出雪涕風悲鳴受詞劍閣道謁帝蕭關城寂寞雲臺仗飄颻沙塞旌江山少使者笳鼓凝皇情壯士血相視忠臣氣不平密論貞觀體揮發岐陽征感激動四極聫翩收二京西郊牛酒再九廟集作原廟丹青明匡汲俄寵辱衛霍竟哀榮四登會府地三掌華陽兵京兆空桞色尚書無履聲羣烏自朝夕白馬休橫行諸葛蜀人愛文翁儒化成公來雪山重公去雪山輕記室得何遜韜鈐延子荆四郊失壁壘虛館開逢迎堂上指圖畫軍中吹玉笙豈無成都酒憂國祗細傾時觀錦水釣問俗終相并意待犬戎滅人藏紅粟盈以茲報主願庶獲集作或禆世程炯炯一心在沈沈二竪嬰顔回竟短折賈誼徒忠貞飛旐出江漢孤舟轉荆衡虛無馬融笛悵望龍驤塋空餘老賔客身上愧簮纓贈太子太師汝陽郡王璡前人汝陽讓帝子眉宇真天人虬鬚似太宗色映塞外一作寒夜春往者開元中主恩視遇頻出入獨非時禮異見羣臣愛其謹潔極倍此骨肉親從容聼朝後或在風雪晨思欲集作忽思格猛獸苑囿騰清塵羽旗動若一萬馬肅侁侁詔王來射鴈拜命已挺身箭出集作發飛鞚內上又一作入廽翠麟翻然紫塞翮下拂明月輪胡人雖獲多天笑不為新王每中一物手自與金銀袖中諫獵書扣馬久上陳竟無銜橛虞聖慈一作聰矧多仁官免供給費水有在藻鱗匪惟帝老大皆是王忠勤晚年務置醴門引申白賔道大容無能永懷侍芳茵好學尚貞烈義形必沾巾揮翰綺繡揚篇什若有神川廣不可泝墓久狐兔鄰宛彼漢中郡王弟漢中郡王瑀文雅見天倫何以開我悲泛舟俱遠津溫溫昔風味少壯已書紳舊逰易磨滅衰謝多一作增酸辛贈祕書監江夏李公雍前人長嘯宇宙間高才日淪替古人不可見前輩復誰繼憶昔李公存詞林有根柢聲華當健筆灑落富清製風流散金石追琢山嶽鋭情窮造化理學貫天人際干謁走其門碑版照四裔各滿深望還森然起凡例蕭蕭白楊路洞徹寶珠惠龍宫塔廟湧浩劫浮雲衛宗儒爼豆事故吏去思訃眄睞已皆虛跋涉曽不泥向來映當時豈獨勸後世豐屋珊瑚鈎麒麟織成罽紫騮隨劒几義取無虛嵗分宅脫驂間感激懷未濟衆歸賙給美擺落多藏穢獨步四十年風聼九臯唳嗚呼江夏姿竟掩宣尼袂往者武后朝引用多寵嬖否臧太常議靣折二張勢衰俗凛生風排蕩秋旻霽忠貞負怨集作寃恨宫闕深旒綴放逐早聫翩低垂困炎厲日斜鵩鳥入魂斷蒼梧帝榮集作䇿枯走不暇星駕無安稅幾分漢庭竹夙擁文侯篲終悲洛陽獄事近小臣斃禍階初負謗易力何深嚌伊昔臨淄亭酒酣託末契重敘東都别朝隂改軒砌論文到崔蘇指盡流水逝近伏盈川雄楊公炯未甘特進麗李公嶠是非張相國張公説相扼一危脆爭名古豈然關鍵歘不閉例及吾家詩曠懷掃氛翳慷慨嗣真作和李大夫咨嗟玉山桂鍾律儼高懸鯤鯨噴迢遰坡陀青州血蕪沒汶陽痊哀贈竟集作晚蕭條恩波延揭厲子孫在集作存如線舊客舟凝滯君臣尚論兵將帥接燕薊朗詠六公篇公有張相等五王泊狄相六公詩憂來豁蒙蔽關鍵集作揵廣運邇用故祕書少監武功蘇公源明前人武功少也孤徒步客徐兖讀書東嶽中十載考墳典時下萊蕪郭忍飢浮雲巘負米晚為身每食臉必泫夜字照爇薪垢衣生一作帶碧蘚庶以勤苦志報茲劬勞願學蔚醇儒姿文包舊史善灑落辭幽人歸來潛京輦射君東堂䇿宗匠集精選制題集作命題墨未乾休聲集作乙科已大闡文章日自負掾吏亦纍踐晨趨閶闔內足踏夙昔趼一麾出守還黃屋朔風卷不暇陪八駿虜庭悲所遣平生滿樽酒斷此朋知展憂憤病二秋有恨石可轉肅宗復社稷得無逆順辨范曄宋書范曄坐謀反誅將死顧念其兒英華作范雲恐非顧其兒李斯憶黃犬祕書茂松色集作意再扈集作載從祠壇墠前後百卷文枕藉皆禁臠篆刻集作制作揚雄流溟漲本末淺青熒芙蓉劍犀兕豈獨剸反為後輩褻豫實苦懷緬煌煌齋房芝事絶集作終萬手搴垂之俟來者正始貞集作徴勸勉不要懸黃金胡為投乳贙結交三十年集作載吾與誰遊衍熒陽復冥漠罪罟已橫罥鄭詩在後嗚呼子逝日始泰即終蹇長安米萬錢凋喪盡餘喘戰伐何當解歸帆阻清沔尚纒漳水疾永負蒿里餞故著作郎貶台州司戶滎陽鄭公虔前人鶢鶋至魯門不識鐘鼓響孔翠望赤霄愁思雕籠飬滎陽冠衆儒早聞名公賞地崇士大夫况乃氣精集作凊爽往者公初在疾蘇許公位尊望重素未相識早愛才名躬自哀問後結忘年之契逺近慕之天然生知姿學立逰夏上神農或闕漏黃石愧師長藥纂西極名兵流指諸掌公所著薈蕞等諸書之外有選胡本草七卷貫穿無遺恨薈蕞何枝癢圭臬星經奧蟲篆丹青廣子雲窺未遍方朔諧太枉神翰顧不一體變鍾兼兩文傳天下口大字猶在榜昔獻書晝圖新詩亦俱往滄洲動玉陛集作階宫集作寡鶴設一響三絶自御題四方尤所仰嗜酒益踈放彈琴視天壤形骸實土木親近唯几杖未曽記一作寄官曹突集作陶兀倚書幌晚就藝香閣胡塵昏坱莾反覆歸聖朝點染無滌蕩老蒙台州掾遐泛集作泛泛浙江槳履穿四明雪飢拾楢溪橡空聞紫芝歌不見杏壇丈天長眺東南秋色餘魍魎别離慘至今斑白徒懷曩春深泰山秀葉墜清渭朗劇談王侯門野稅林下鞅操紙終夕酣時物集遐想詞場竟踈濶平昔濫吹奬百年見存沒牢落吾安放蕭條阮咸在出處同世網他日訪江樓含悽述飄蕩著作與今祕書監鄭君審篇翰齊價謫居江陵故有阮咸江樓之句故右僕射相國曲江張公九齡前人相國生南紀金璞無留礦仙鶴下人間獨立霜毛整矯然江海一作漢思復與雲路永寂寞想土階未遑集作嘗等箕潁上君白玉堂倚君金華省碣石嵗峥嶸天地日蛙黽退食吟大庭何心記榛梗骨驚畏曩哲鬚變負人境雖蒙換蟬冠右地恧多幸敢忘二疏歸痛迫蘇耽井金紫集作紫綬映莫年荆州謝所領庾公興不淺黃霸鎮每靜賔客引調同諷詠在務屏詩罷地有餘篇終語清省一陽發隂管淑氣含公鼎乃知君子心用才文章境散帙起翠螭倚薄巫廬並綺麗元暉擁箋誄任昉騁自成一家則未闕隻字警千秋滄海南名繫朱鳥影歸與集作老守故林戀闕常集作悄延頸波濤良史筆蕪絶大庾嶺向時禮數隔製集作制作難上請再續徐孺碑猶思理煙艇三君詠並序高適見文粹開元中適逰於魏郡郡北有故太師魏公舊館里中有故尚書郭公遺業邑外有故太守狄公生祠焉覩物增懷遂為三君詠魏鄭公徴前人鄭公經綸日隋氏風塵昏濟代取高位逢時敢直言道光先帝業義激舊君恩寂寞卧龍處英靈千載魂郭代公元振前人代公實英邁津涯浩難識擁兵抗矯徴仗節歸有德縱橫負才智顧眄安社稷流落勿重陳懷哉為悽惻狄梁公仁傑前人梁公乃貞固勳烈垂竹帛昌言太后朝潛運儲君文粹作皇䇿待賢開相府共理登方伯至今青霄文粹作雲人猶是門下客安公僧靈一彌天稱聖哲象法初繄賴𢎞道識行藏匡時知進退秦王輕與舉習生重酬對學文古篆中義顯新經內法服應華夏金言流海岱四方浮雲間更陪龍華會林公前人文公信高逸久向山林住時將孫許逰豈以形骸遇幸辭天子詔復覽名臣疏西晉尚虛無南朝久淪誤因談老莊意乃盡逍遙趣誰謂竹林賢風流相比附逺公前人逺公逢道安一朝棄儒服真機久消歇世教空拘束誓入羅浮中遂棲廬山曲禪經初纂定佛語新明目鉢帽紀疑朝宗簮裾翻拜伏東林多隱士為我辭榮祿文苑英華卷三百一
