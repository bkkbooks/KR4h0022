body:
  text: 文苑英華卷四百四十八宋李昉等編制書一命相一房琯文部尚書同平章事制賈至勑憲部侍郎房琯清識雅量工文茂學秉忠義之規靡憚艱險挺松筠之操寧移嵗寒宜承題劍之榮式允濟川之望可文部尚書同中書門下平章事天寶十五載七月十四日封郭元振為代國公制太平內制門下大臣立事夷險不易良相升朝安危所繫兵部尚書同中書門下三品郭元振偉才生代宏量匡時經綸文武今之王佐出入將相古之人傑夙侍帷幄疇咨廟堂思致堯舜以期管樂朕往在儲闈洎登寶位每觀其聞義感激願别忠邪立誠慷慨密陳𢎞益爾其至矣朕實嘉之頃者梟獍興謀干戈作釁太上皇命朕討除元振又馳奉宸極始則賚豫為弼終則寧朕問安可謂格于皇天貫于白日元惡既剪品物維新昌言是圖朕豈忘舊冝開井邑永誓山河可封代國公食實封四百户張說拜中書令制門下殷命百工傅膺審象漢推三傑良屬運籌不有斯人孰賚豫弼尚書左丞張說居正合道體真理精朕昔在承華首延翰望談經之際欽若讜言撝翰之間潤色鴻業屢陳匡益見嫉姦回頃雖抗跡踈逺而載懷飢渴今群凶己服大猷伊始永言亮采光朕側席之期俾咨啓沃成朕濟川之望宜發疑作登鼎鉉式綜絲綸姚元之拜相制同前門下王佐之重師兵之任勞求屏翰膺此具瞻同州刺史姚元之宏略冠時偉才生代識精鍳逺正辭强學有忠臣之操得賢相之風纍踐台陛匡益斯在頃居藩郡循良是屬載懷一德分命六官訏謨允歸文武兼濟式慿帷幄之算宜副韜鈐之委劉幽永拜左僕射知軍國事制已入三百八十五卷同前盧懷慎拜相制同前門下宰輔之任謨猷是屬不有大才孰康景化黃門侍郎盧懷慎貞良敦朴孝悌仁厚度量深於江海堅清邁於氷雪事皆體大詎觀非聖之書心必在公雅契惟賢之典故能危言正色直道匪躬比之微管而求得說冝寵鎖闈參乎鼎座可同紫微黃門平章事開元元年十二月源乾曜拜相制同前門下軒夢三相舜舉八元必佇人傑以宣邦政尚書左丞上柱國安陽縣開國男源乾曜博文強學逹識周才貞白可以勵時道義可以𢎞物虛懷同於抱月懸鏡不疲利器比於成風刜鐘無滯固可充左曹之駮議翊中臺詔令作禁之謀猷用參金鉉之司兼踐玉壼之制詔令作副可黃門侍郎同紫微黃門平章事勳封如故開元四年十一月宋璟蘇頲拜相制詔令作宋璟兼黃門監蘇頲平章事制同前門下詔令作黃門虞廷稱盛任於䕫龍周邦以寧屬於閎散是知出納惟允必藉英竒啓沃有光實資茂彥銀青光祿大夫守刑部尚書上柱國廣平郡開國公宋璟宇量凝峻執心徑直銀青光祿大夫行紫微侍郎兼知制誥上柱國許國公蘇頲風檢詳密藻思清華或掌憲南宫持平邦典或揮翰西掖匡輔政途咸竭奉上之心俱盡匪躬之節九流俟其澄序衆務資其弼諧冝委銓衡兼侍帷幄璟可守吏部尚書兼黃門監頲可同紫微黃門平章事散官勳封並各如故開元四年閠十二月張說拜相制詔令作張說同三品制門下乾坤以隂陽化成后王以輔相興理詔令作弼所以寅亮天工詔令作極緝熙帝圖非夫大賢孰寄斯任天平軍節度大使右羽林將軍兼并州長史攝御史大夫燕國公兼修國史張說挺其公才生我王國體文武之道則出將入相盡忠貞之節亦前疑後丞諒可以𢎞此大猷揔其邦政允釐庶績保乂皇家可守兵部尚書同中書門下三品勳封修國史如故仍即馳驛赴京開元九年九月張說拜中書令王晙拜相制詔令作張說中書令王晙同三品制同前門下周稱內史以司號令漢曰尚書是主喉舌用平邦典以佐王教兵部尚書兼中書令張說履道體正經邦詔令作德立言吏部尚書王晙忠肅剛簡博聞宏識並才包王佐望重時英內訓五品外清九服嘉謨必盡庶績允釐詔令作康冝參五臣之命以正三台之象說可中書令晙可兵部尚書同中書門下三品開元十一年四月陳希烈拜相制同前門下仲虺相湯言宣雅誥子魚相魏任揔中兵將代天工允慿時傑光祿大夫門下侍郎同中書門下平章事集賢院𢎞文館學士崇𤣥武館大學士太清太微宫使上柱國臨頴縣開國侯陳希烈逸量𢎞逹英才卓邁既服直而成範亦忠賢詔令作亦賢忠而炳德學該流略義惟守於經門文麗風騷言必銓於理要自黃樞二職侍講金華紫府𢎞真參謀玉鉉嵗月逾久而其道彌光人師有屬於在三王度式歌於畫一疇咨既允亮采惟熙冝正貂蟬之榮用兼喉舌之寄可行左相兼兵部尚書餘如故天寶六載三月韋見素拜相制同前門下緝熙帝載必候大賢砥礪公才允膺殊奬銀青光祿大夫行尚書吏部侍郎上柱國彭城郡開國公韋見素風度宏逺操履貞固懷至公之節守難奪之誠學冨典墳每思經濟之義文雄縉紳豈獨雕蟲之英荐居東挺顧問有光纍拜南宫銓衡式序清素之業惠澤彌彰爾惟不矜朕志先定信可發揮邦政翊贊台陛詔令作階將𢎞夢卜之感俾協蒼生詔令作黎元之望可守武部尚書同中書門下平章事集賢院學士知門下省事散官勳封如故天寶十三載八月除韋嗣立鳯閣侍郎平章事制同前鸞臺鳯池清切鸞渚便藩詔令作繁出納兩闈允資一德中散大夫天官侍郎韋嗣立當朝人傑詔令作望奕代相門道周性全才髙識逺誠以待物寬而容衆往司綸翰五字見推洎處提衡九流式序懷宗廟之掌有社稷之能冝竭忠賢翊宣政化可守鳯閣侍郎同鳳閣鸞臺平章事散官如故主者施行長安四年正月除唐休璟左庶子同鳯閣鸞臺三品制同前鸞臺獻替儲闈管綜王職聿求多士必在正人夏官尚書同鳯閣鸞臺三品上柱國酒泉縣開國公唐休璟業履清醇恭肅忠亮言必從行學以知道居八座之重握四嶽之要出將入相允文允武謀猷是屬𢎞益以深頃以暮年固辭退位就間去劇優賢尚齒巨源請老仍參翼贊之榮叔子養德選預國朝之議冝輟五曹之務俾同三令之班可金紫光祿大夫行太子左庶子依舊同鳯閣鸞臺三品勳封如故主者施行除裴耀卿黃門侍郎張九齡中書侍郎同平章事制徐安貞勑詔令作門下風雲之感必生王佐廊廟之任爰在柱臣中大夫守京兆尹護軍借紫金魚袋裴耀卿含元精之休體度𢎞逺正議大夫前檢校中書侍郎集賢院學士仍副知院事上柱國賜金紫魚袋曲江縣開國男張九齡挺生人之秀器識通明並風望素髙人倫是仰可以叶彼寅亮當兹啓沃幹時待士既資鼎實之和為國急賢寧惟金革之事耀卿可黃門侍郎同中書門下平章事𢎞文館學士散官勳如故張九齡可起復中書侍郎同中書門下平章事兼修國史餘如故主者施行開元二十一年十二月除韓休黃門侍郎平章事制張九齡勑思致雍熙聿求元輔久勞夢寐延彼周行太中大夫守尚書右丞上柱國韓休藴道𢎞深秉德經逺清裁可以範物素行可以律人一自登朝備聞體國志存公亮誠著始終而羽翼朕躬金玉王度人望是在朝選無踰宜拜命於郎闈俾兼和於鼎實可守黃門侍郎同中書門下平章事開元二十一年三月李吉甫拜相制玉堂遺範門下昔周宣王思𢎞文武之道則以申甫代天工漢宣帝思繼祖宗之風則以邴魏執邦政是以克從一作紹前烈俱稱中興朕以眇身託于人上亦思所以續一作纘列聖之緒致太階之平懷柔四夷親附百姓將成莫大之業遂獲非常之才授之鈞衡俾作舟楫銀青光祿大夫行中書舍人翰林學士上柱國李吉甫符彩外發清明內融體仁而溫抱義而峻識洞精賾知皇王致理之由學該古今窮天人相與之際自擢於綸閣列在禁闈鼓三變之文潤色王度揔五才之用參贊廟謨化俗思邁於成康致君願及於堯舜當注意之所向每罄心而必陳深中不回獨立無懼經綸常見其道逹激切每一作多至於涕零王綱以張蜀寇斯殄左右密勿實由嘉言降神而生輔朕為理調三光以序六氣遂物情而熙帝猷是為中樞司我大本命爾俞往其惟朂哉於戲宰相之任安危所繫百辟為憲萬邦所瞻與其明察以為光不若嚴重而有制與其將順於其美不若匡救於纎違審涇渭以序人倫謹繩墨以正天下交泰之運其若斯乎敬聽朕言以踐乃職可守中書侍郎同中書門下平章事散官勳如故主者施行元和二年正月一作唐大詔令裴垍拜相制白居易門下朕聞后德惟臣良臣惟聖在太宗時實有房杜贊貞觀之業在𤣥宗時則集作實有姚宋輔開元之化咸克祐我烈祖格于皇天朕祗奉丕圖𢡟繼前烈思欲貞百度和萬邦建中于人垂拱而治永惟房宋之化寤寐求思至誠感通上帝眷祐果賚良弼輔豫一人正議大夫行尚書户部侍郎上柱國賜紫金魚袋裴垍器得天爵文為國華行有根源言集作詞無枝葉忠敬恭順輔之以誠心方潔貞廉輔之以通識玉立不倚扣之集作金和有聲洎潤色集作洎內掌綸言密恭樞務嚴重得大臣之體溫雅秉君子之文每獻納之時動有直氣當顧訪之際言無隱情逺圖是經大事能斷匡豫不逮時乃之功及領地官且司邦賦㑹計務劇出納事殷投利刃而皆虛委紛絲而必理歷試兹集作已久全才益彰冝登中樞以允僉望夫宰輔者下執邦柄上代天工為國蓍龜注人耳目爾尚降乃德以親百姓廣乃志以序九流匡朕心而集作以清化源從人欲以致和氣豫欲宣力汝為股肱豫欲詢謀汝為心膂豫違望于一作於汝弼勿謂不從汝言逆于朕心必求諸道獨立勿懼直躬而行明聽斯言敬慎厥集作乃位嗚集作烏呼罔俾房宋專美于前可守中書侍郎同中書門下平章事散官勳賜如故主者施行元和六年十一月李絳拜相制玉堂遺範門下司重柄者允屬于長才熙大猷者固資於端士朕纘鴻緒撫有萬方夙夜祗勤懼逺於道故注意宰輔勞懷夢想誠以得失之效邦家所繫疇若僉論簡豫深衷必惟其人是舉成命朝議郎守尚書戶部侍郎驍騎尉賜紫金魚袋李絳質秀圭玉文含彩彰抱器挺生居貞特立有史魚秉直之操勵山甫匪懈之誠忠孝兩全學識兼茂清標可以範雅俗正氣可以肅群倫頃自周行俾恭密命動由於詔令作必以義知無不為蹇蹇懷匡濟之心孜孜陳逺大之略言無隱避居則靜專貫于初終其道一致地卿之二爰委典司理財先示於簡亷利物每懲其聚斂經通立制器用彌光臺閣之間鬱有公望是冝權衡百度宰理庶工允副具瞻宰我樞密於戲豫欲驅人俗以躋冨壽感人心而致和平爾尚修明憲章宣布德澤必寬詔令作廣大其志無皎察為公恆其道以秉彛裕其體以臨下各任以職無忘陳平之言苟便於人勿憚蕭何之請敬茲寵擢其懋式哉可朝議大夫守中書侍郎同中書門下平章事勳賜如故主者施行元和六年十一月張𢎞靖拜相制門下虞以為盛猶咨五臣殷之用興亦賴三后朕勵精恭已十載于兹常以國鈞委之公輔務熙庶績敢怠旁求思欲左右有人在廣股肱之任歷選列辟洎于藩維冀獲賢能俾匡正道爰兹所命允屬至懷河中晋絳慈隰等州節度支營田觀察處置等使正議大夫檢校禮部尚書兼河中尹御史大夫上柱國開平縣開國子食邑五百户賜紫金魚袋張𢎞靖德緻詔令作禀精微器含冲用溫恭諒實明允克誠素推君子之風雅有大臣之體藴積稽古之學發揮經緯之文嘗司朕言動叶謨訓歷踐清貫具揚淑聲爰統方州載膺節制奉法遵制存詔令作首公無私人無不懷績用丕茂豫欲正百工之理成太平之階若臨巨川以重舟楫是用命爾列于中台每念臣鄰之規以貞棟崇之吉少翁積慶嗣德漢廷文子勤身繼匡晋室爾惟朝夕納誨以翊朕躬是資衮職之勤式重緇衣之美仍帥司寇之屬俾靖臯陶之刑懋宣厥猷往踐于位可守刑部尚書平章事散官勳如故元和六年六月韋貫之拜相制門下弼成大化參叙彛倫克廣元首之明其服股肱之任朕所以不自暇逸務求賢能式重舟楫之才以𢎞經濟之道疇若豫志僉諧乃公中大夫守尚書右丞上輕車都尉賜紫金魚袋韋貫之清明在躬禮樂之器藴圭璋特逹之德茂亷正慱雅之規靜而知微動必有守凡踐列位備聞嘉猷當官而行臨事能斷道可鎮於風俗望彌積於朝倫詔令作論是冝和靖隂陽紀綱邦國命作心膂列于台階夫能慮四方揆百事愛利萬物辨論群材示公忘私時乃之職而况圖靖藩服繫在廟謀爾惟順下以訓人奉上以宣力因衆功而致用熙詔令作象非衆志以為心朝夕獻可否之誠經綸底文武之績祗膺厥命勿懈于時可守尚書右丞平章事散官勳如故元和九年十二月張𢎞靖拜相制門下贊天地之化阜成萬物正邦國之紀康于群生夢寐旁求精誠上逹况乎明誠以久嘉猷日聞股肱之任耳目所注具官𢎞靖實天生德惟嶽降神端方靜深信厚溫密質抱荆山之璞光含魏國之寶錯爾素履穆然清風出備爪牙總近關之紀律入膺喉舌練中臺之法制從容宰輔密勿鼎司誠惟在公慮必經國濟川舟楫人望具瞻和羮鹽梅朕志先定冝登右弼之任用正中台之耀纂乃祖考光于家邦於戲天工人代豫違汝翼必當悉乃力同乃心役天下之才以貞百度通天下之志以佐萬幾唯直道是行唯讜言是進內懷親附拯黎元之方困外思鎮撫偃兵甲於將興勿罔養以崇名無逡循而避事對揚成命時乃之休可守中書門下平章事李逢吉拜相制門下朕觀古先哲王興化致理未嘗不選建良弼熙寧庶工俾之敷陳大猷左右乃辟者也朝議郎守中書舍人權知禮部貢舉輕車都尉賜緋魚袋李逢吉疏通而守於經制質厚而輔以文章貞恆自居和易待物體賢人之志業茂端士之風規履歷班行發揮事任厥心匪懈所至有聲自彌綸粉闈駮正瑣闥且司言於右掖嘗納訓於東儲誠明一貫聞望旁洽俾司貢士彌著嘉聞方今外興不得己之師內有不獲安之俗恆忘食於將旰務求衣於未明冀清原野之誅用止干戈之役登爾匡輔代豫憂勤爾冝宣至化於吾人告嘉猷於厥后銷弭氛祲導迎和平事有不舉其中政或未孚於下爾惟啓沃無乃靣從可朝議大夫守門下侍郎平章事賜紫金魚袋元和十一年二月王涯拜相制門下上宰參職所以法三台之耀中樞議政在乎遂萬邦之冝朕獲承鴻休思建皇極冀沃心而納誨恆注意以求賢通議大夫尚書工部侍郎知制誥翰林學士上柱國清源縣開國男食邑三百户賜紫金魚袋王涯動直靜專踐方居易挺嵗寒之徑質抱夙夜之端誠言唯守中慮每經逺屬者禁垣揮翰五字日宣選部持衡九流風動荐居肘腋之地歷試股肱之才進嘗伏於青蒲出不泄其溫樹牟融得大臣之節毛玠有古人之風詢廟算以生知論兵鈐而暗合方今戎馬尚駕郊壘猶多必俟清明以消氛沴是用宥詔令作付以機密陟于崇髙爾其發號令以端其四方陳便冝以寬于百姓行臺閣之故事𢎞朝廷之大體秉德以立狥公不回俾豫一人垂拱而理敬聽朕命茂哉詔令作戒茂哉可守中書侍郎平章事元和十一年十二月裴度拜相制門下輔相之任重作於股肱經濟之才難注人或作任之耳目苟非慮周一作研物表識洞事先則何以出納中樞平章大政詢于時論僉曰汝諧朝議郎守御史中丞兼尚書刑部侍郎飛騎賜紫金魚袋裴度徑直循道清通一作明秉彛文融菁華行茂枝葉居然廊廟之器出于領袖之門西掖司言南臺執憲常懷逺一作常陳明略屢告嘉猷實宣力以狥公况一作能外身而憂國霜雪無改雷風有恆朕欲旋觀其能用試於事俾歷戎閫載馳使軒王澤渙汗以遐宣軍情密勿而上逹將議抽擢因罹震驚崇道德之藩籬士有致命資忠信之甲胄兵無容刃人具瞻爾天方賚豫昆命于龜爰立作相爾其展四體堅一心廣其道以用賢厚其風以易俗五兵未戢爾惟保定武功百姓未康爾惟勤恤人隱臨事必斷當官而行齊台階於底平補衮職之有闕光膺慎選其戒之哉可朝議大夫守中書侍郎同中書門下平章事勳賜如故元和十年六月一作皆唐大詔崔羣拜相制同前門下成萬方之化通天下之志緝熙帝載昭暢𤣥猷在于股肱之臣共凝理本旁求時彥以叙彛倫朝散大夫守尚書户部侍郎上護軍賜紫金魚袋崔羣粹密由道端莊保和本清明之上才體博厚之重德學貫通儒之業詞含大雅之風居敬有恆循性能斷自然宥三字一作自承我密命職參內庭髙文煥若一作發於綸言敏識詳逹於國典伏奏無撓直躬不回勤勞八年始終一致春闈取士必後其浮華地官理才能制其輕重儉惟一作以約己忠惟事君才適而用深望積而實著風猷己洽於人聽忠勤一作已屬方注於朕心乃膺一作爰咨審象之誠以副具瞻之地况奸凶叛逆尚駕戎車未明求衣思戢干櫓爾冝酌古今之見舉刑政之中守一作艱厥位以代天工陳其謨以明皇極敬茲重命往踐台階可守中書侍郎同中書門下平章事散官勳賜如故元和十二年七月一作皆唐大詔令文苑英華卷四百四十八
