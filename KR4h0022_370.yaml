body:
  text: 文苑英華巻三百七十宋李昉等編紀述一辯三傑一首張中丞傳後叙一首夏平一首旌故平廬軍節士文一首辯三傑或謂客曰談者以太尉西平王武畧天授神機獨運剪大憝威不庭安社稷於綴旒返鸞駕於夷庚功格上下為唐元老可與夫漢三傑並􅕽矣客曰盖聞殊途同歸在乎立事而已又聞有能不能斯則所趣異也夫鄼侯鎮關中三秦之地給餉道數年之儲功加萬代實亦茂矣留侯持重寳以㗖秦将燒棧道而媚覇主壁固陵而諸侯麕至封雍齒而吾属胥説勸遷都從擊代竒謀秘策變化無窮可謂盛矣然俱無戰功與太尉不侔矣淮隂侯浮甖而虜魏豹㧞幟而禽趙歇斬陳餘破夏説殺龍且睢水之上襲田廣歴下之軍謀無不臧戰無不克故漢祖所謂連百萬之衆戰必勝攻必取吾不如韓信盛矣哉斯可與太尉同風矣吾子獨不聞太尉之事歟聖上龍興也太陽煦於殊垠𤣥澤慘於中夏而腥羶之戎倔強巴漢昏迷之将叛換燕趙乃授公偏師俾公專逹西南則却地千里東北則獻俘億計至若挫魏勝觧趙圍斬顔良於萬人之中伏孟獲於七縱之際皆公之任也暨賊泚竊發六龍避狄關畿有鹿駭之鑾藩鎮懐狼顧之虞公乃誓師徒行在如火之烈如􅀈之疾不交鋒而十萬虜之奔北宵潰矣於是保長安嘯聚不出有詔與李懐光掎角相應収復舊都懐光怙亂要功阻兵西上内懷反側之釁外萌結連之端賊既合謀人皆異志公幸脫虎口誓夷國讐乃㨿渭橋之倉守新豊之路逐懷光於舊宛降叛将於臨陣軍聲大振師克在和一舉而羣盗剪滅再戰而巨猾授首京師無秋毫之犯黎庻感春陽之晞安翠華於九重正朝綱於百事梟獍畏威而悛惡蛇豕慕義而革心海内晏如名一無此字傳不朽之勲徳崇功茂如此之大也若然者必勝之戰則同乎淮隂宜矣所立之功則無乃太尉優乎何者淮隂以數萬之衆紿一作破弱齊襲歴下孰與太尉數千之卒逐懐光屯渭上乎淮隂虜魏趙新立之王孰與太尉破燕朔相濟之㓂乎淮隂會垓下而諸侯叶力孰與太尉収天邑而孤軍獨進乎淮隂潰已窮之項羽孰與太尉㓕方熾之朱泚乎由是揚㩁而言功實不侔矣或曰鄙人冥頑議事狹近第聞輿誦疇分三傑固不知蕭張則如彼淮隂又如此可謂太尉兼蕭張之謨謀邁淮隂之勲業逺矣冝其戴元后庇羣生揚洪休膺戩福元后三接極賞九命功莫大而不伐徳彌尊而益恭焜燿當世闕文萬祀矣故記曰天降時雨山川出雲嗜慾将至有開必先詩曰維嶽降神生甫及申維周之翰其太尉之謂乎張中丞傳後叙韓愈元和二年四月十三日夜愈與吳郡張籍閱家中舊書得李翰所為張廵傳翰以文章自名為傳頗詳宻然尚恨有闕者不為許逺立傳又不載雷萬春事首尾逺雖材若不及廵者開門納廵位夲在上授之柄而處其下無所疑忌竟與巡俱守死成功名城䧟而虜與廵死先後異耳兩家子弟材智下不能通知二父志以為廵死而逺就虜疑畏死而辭服於賊逺誠畏死何苦守尺寸之土食其所愛之肉以與賊抗而不降乎當其圍守時外無蚍蜉蟻子之援所欲忠者國與主耳而賊語以國亡主滅悟之逺見救援不至而賊來益衆必以其言為信外無待而猶死守人相食且盡雖愚人亦能數日而知死處矣逺之不畏死亦明矣烏有城壊而其徒俱死獨蒙媿耻求活雖至愚者不忍為嗚呼而謂逺之賢而為之耶説者又謂逺與廵分城而守之城䧟自逺所分始以此詬逺又與兒童之見無異人之将死其臟腑必有先受其病者引䋲而絶之其絶必有處觀者見其然從而尤之其亦不逹於理矣小人之好議論不樂成人之羙如是哉如廵逺之所成就如此卓卓猶不得免其他則又何説當二公之初守也寜能知人之卒不救棄城而逆遁苟此不能守雖避之他處何益及其無救而且窮也将其創殘餓羸之餘雖欲去必不逹二公之賢其講之精矣守一城捍天下以千百就盡之卒戰百萬日滋之師蔽遮江淮沮遏其勢天下之不亡其誰之功也當是時棄城而圖存者不可一二數擅強兵坐而觀者相環也不追議此而責二公以死守亦見其自此於逆亂設淫辭而助之攻也愈常從事於汴徐二府屢道於兩府文粹作州間親祭於其所謂雙廟者其老者集作人徃徃説廵逺時事云南霽雲之乞救於賀蘭也賀蘭嫉廵逺之聲威功績出已上不肯出師救愛霽雲之勇且壮不聽其語強留之具食與樂延霽雲坐霽雲慷慨語曰雲來時睢陽之人不食月餘日矣雲雖欲獨食義不忍雖食且不下咽因㧞所佩刀斷一指血淋漓以示賀蘭一座大驚皆感激為雲泣下雲知賀蘭終無為雲出師意即馳去将出城抽矢射佛寺浮圖矢著其上甎半箭曰吾歸破賊必滅賀蘭此矢所以志也愈貞元中過泗洲船上人猶指以相語城䧟賊以刃脅降廵廵不屈即牽去将斬之又降霽雲雲未應廵呼雲曰南八男兒死耳不可為不義屈雲笑曰欲将以有為也公有言雲敢不死即不屈張籍曰有于嵩者少依於廵及廵起事嵩嘗在圍中籍大厯中於和州烏江縣見嵩嵩年六十餘矣以廵初嘗集無此字得臨渙縣尉好學無所不讀籍時尚少集作小粗問廵逺事不能細也云廵長七尺餘鬚髯若神嘗見嵩讀漢書謂嵩曰何為久讀此嵩曰未熟也巡曰吾於書讀不過三遍終身不忘集有也字因誦嵩所讀書盡巻不錯一字嵩驚以為巡偶熟此巻因亂抽他帙以試無不盡然嵩又取架上諸書試以問廵廵應口誦無疑嵩從廵又亦不見廵常讀書也為文章操紙筆立書未嘗有草初守睢陽時士卒僅萬人城中居人亦且數萬廵因一見問姓名其後無不識者廵怒鬚髯輙張及城䧟賊縳廵等數十人坐且将戮廵起旋其衆見廵起或起或泣曰汝勿怖死命也衆泣不能仰視廵就戮時顔色不亂揚揚集作陽陽如平常逺寛厚長者貌如其心與廵同年生月日後於廵呼廵為兄死時年四十九嵩貞元初一作中死於亳宋間或傳嵩有田在亳宋間武人奪而有之嵩将詣州訟理為其所殺嵩無子張籍云夏平沈亞之夏之為郡南走雍千五十里渉流沙北集作以阻河地當朔方集作古名其郡曰朔方其四時之辰夭暑而延冬其人􅐧其風烈其氣威而厲易憤而難平夫其難平之状在陽為悖在隂為狼悖為不平者在上暴横而為一有之字也在下殘寃而為一有之字也狼為不平者在上蔽惑而為也在下憤激而為也元和之初夏之節度韓将軍入覲其甥楊惠琳為之後以兵叛天子命将軍演伐集作代之既至盡殺其属将曲者直之無别罪併俘其家姊弟妻子以其善貌者擇而入其餘均償麾下騎士皆得肆辱汚明年拜右衛李将軍愿為尚書出代演為政至其城察民氣色不得平乃留意於察果得之因集作即令曰天子愍不辜乆而命四方為政執事觀察之夫揚恵琳叛脅其良人良人以骨肉妻子故不能得已集作止又不能即死制已在人今皆以是罪戮之矣其姊弟妻子當免者不冝復蓄汚且又皆良人子等類耳寧幸如此集作是乎今盡籍出之無得隠吏更察敢有如是者斬於是尚書愿廼以畜馬為則訓得所虜者相當其直其人皆死志積寃憤既出則豁其所蓄道路呼聲四逸有感憤不勝于心者則仰而號俯而躍退而變為喜而舞謡其徳其聲雜調齊感如是連日改旬而後已是則脩其化三字集作條理其政如此其氣復能而狼集作為悖耶夏之属土廣長幾千里皆流沙属民皆雜虜虜之多者曰党項相聚為落於野曰部落其所業無農桑事畜馬牛羊槖駞廣徳年中其部落先党項與其類意能氣不等因聚黨為兵相伐強者有其馬牛羊槖駞其後支属更酬殺轉轉六七十年莫能禁道路殺掠以為常嘗與華夷貿易馬牛羊槖馳者貿已輙以壮騎從間道伺險擊奪華民華民脫死者幾希矣愿乃二字集作尚書公既按察部落盡知其猾大者死小者盟又令曰今盟已敢有叛者㓕之其后有人貨得一馬厚價善色駭而逸亡其所就月餘奔歴數帳異逐之又至一帳帳之老乃相與執而詣公居請曰有馬逸來莫知其所由自後更嵗故亡馬者得復之是則脩三字集作是則整頓其蔽如此其氣復能而悖集作為狼耶夫政二字集作夫政之不明則平不得施於氣色笑集作笑色語矣集無此字法不清則平不得信乎井閭市貨矣五字集作市貨理化昔者周公之為政處于相則天下平處于東則一方平今夏北一方也得其平如此豈在位者而知周公之道耶乃籍所以于篇以明善理云爾十二字一作亞之乃得籍為平之所故以著于篇旌故平盧軍節士文沈亞之郭􅚅郭航夲不同族皆家平盧軍􅚅父珍岑天寳七年及第以集無此七字舉進士與權臯著作同上第天寳末燕人叛雖以戮自是而齊趙之間頗聞其強矣􅚅既壮能習先人所業復舉進士時權相國為禮部尚書書其所立欲擢之及聞家居非地即罷選歸而亦為師古所辟􅚅與故渤海人高洙集作鈢唐書作沐下同為等伍師古死師道代之復用洙􅚅為從事有項常山帥卒其卒請嗣帥未得命師道亦遣甲卒數千二字集作萬人北渡河屯平集作太原以為顧望洙􅚅相與議語謂燕蔡之侯初封欲令師道先集作之先為朝省以樹大効集作功乃説曰傭有操鋤為人治稼者能勒糓㓕集作勤糓㓕糧歲得均穡至于傭子既專地自入其伍益相辦助或謂之語曰田人百畆成而餉之直幾半足以飽三冬之復集作腹至於所取非任頼主人土廣且寛之則曰可苟設一旦篤其不奉亦奪矣是属固不殍乎集作矣非此借言於家人尚爾况傭於天子乎今河北之傭方責其專田君侯寧可以假非於不理者誠能此時因經圖以畫集作盡入其地親謁闕下則君侯之功莫可與等保餉世世惟文粹作雖孱孫亦終不奪豈不幸集作偉哉夫舉食於人當渇飢之望也一飯千金未足者不能千集作十金及飫而進於前雖海陸備􅀢顧與糠籺齒尚何所愧願君侯省之無為人從集作後事将行左右者更沮之曰猛虎所以使狗集作物畏而不敢犯者以其能威自居也故盤林横谷奮晴以拏怒棹尾以倚嘯猒噉集作食於羆豕麏麚之肉及棄其所長而欲弭目集作耳委首以待餒是知命懸於執者之手雖麀集作塵兒得以狎而搏如欲申歩於咫尺安得自遂也今公舍自食而就待餒其後亦能無恨乎孰為公計其事於是師道果得集作大悔遂殺高洙而􅚅以能善人左右者聞集作開之故得無殺幽於蔡之鄙縣使人守其門親属通徃來輙籍署更十餘歲當元和九年蔡帥少陽死其子元濟欲以其父之地請於天子天子怒發兵圍之既急師道亦悖仍集作乃隂為之助明年秋師道兵萬餘東㓂彭城入蕭豊沛且敗而還因艱四境出􅚅乃為練繒書緘之絮帑如顆遣航持詣彭城請其帥願得上奏将行執航手曰努力慎勿洩書不吾名盖假齊人劉諒耳非見帥無得言吾書者航至彭城航宗人運為武寧虞侯都使始航欲舍人之會運将兵出定豊未還航直詣賔府見郭行餘因曰航母之姉子劉諒有帛書奏記陳叛集有兵字者山川曲折之状願見将軍行餘得之喜銳川文粹作恱起告其帥航見帥獨謂帥曰書郭􅚅為之畏洩故假劉諒劉諒者師道所信之吏也遂發書書詞云願以兵三千人出滄州用戈船浮海入蔡淄之上此恃海不備所處皆罪人謪吏無所與堅遂與上奏於是天子遣告彭城帥知之帥以為非􅚅書疑師道為之以相詿誤故航歸不得書報獨告以信語航不敢復故道道回逺凡數千里乃及􅚅所處未見􅚅且為師道所召既行與􅚅兄子會於道因竊謂曰今者航無状受召豈前事之露耶且露航獨死終無所敗無憂也􅚅聞之幾自引死航夲莱人常以氣感聞於平盧軍及師道欲叛盡縻絡敢士故航在召集作名中初航不知其召之所以也意為集作謂知前謀竟憂死明年元濟誅又明年師道反詔遣大梁楚彭城蔡許滑魏之師合而四入於是彭城軍下魚臺入金鄉楚軍圍海取其二縣大梁軍攻考城得之滑蔡許共㧞斗門至臨濮魏軍渡楊流占東阿再戰渉商屯鄆西六十里兵最近賊賊益敗故師道遣右将軍劉晤将握前後兵三十萬人出當魏魏兵日急晤亦為師道所篤及集作乃歸軒師道盡以鄆城降得拜為滑帥在十四年二月乙亥也高洙以前著跡追為尚書盖言寵之􅚅得以入集作外郎為滑從事詔令行餘為記室行餘與􅚅會於河關之間􅚅謂行餘曰􅚅前者使航馳帛奏至彭城聞其還不聞其問今已死矣君知其請乎行餘曰請者云何􅚅猶能盡語章中之詞矣行餘曰果然嗚呼航竟死矣莫有聞者嗟乎十四年余與李褒劉濛宿白馬津俱聞之於郭記室明日復皆如濟北濟北之人盡能言􅚅之節故悉以論著将請于史氏云文苑英華巻三百七十
