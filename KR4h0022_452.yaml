body:
  text: 文苑英華卷四百五十二宋李昉等編制書五節鎮一授崔希逸左散騎常侍兼河西節度副大使制大平內制門下位恭顧問必擇正人道重威懷實資良帥朝散大夫使持節陜州諸軍士守陜州刺史上護軍水陸轉運使崔希逸雅稱瓌偉一作偉度常聞大節沉略有制精識必斷鎮臨湟塞守在羌戎且利安邉兼資用武宜其謀此令德式叶逺圖俾聮寵於軒墀往綏靖於河隴可守左散騎常侍持節河西節度經略支度營田九姓長行轉運等副大使知節度涼州事赤水使隴右河西採訪處置使仍賜紫金魚袋散官勳如故授李尚隱户部尚書益州長史劒南節度採訪使制門下司徒之職事殷九賦連率之任寄重十州兼而統之其在能者銀青光祿大夫守大子詹事上柱國髙邑縣開國子李尚隱長才致用直道為謀大任亟登晚節彌厲臨事克斷不敢於煩苛去邪勿疑無避於強禦必能內均土壤外撫華戎保息萬人俾修夏官之典澄清三屬仍㧾使臣之務可守户部尚書兼益州大都督府長史持節劒南節度營田副大使兼節度採訪處置使散官勳封如故授烏重胤河陽節度使制門下鎮衛甸服控臨河津當五達之要衝主三軍之號令自頃選任多用勳勤必為忠良乃稱奬擢昭儀軍節度右廂都押衙兼馬軍都知兵馬使同州節度副使銀青光祿大夫檢校太子賔客兼潞州大都督府左司馬御史中丞上柱國張掖郡開國公烏重胤稟潔白之性抱堅貞之資任湮不緇凌寒益茂承家得孫吳之術許國慕辛李之風固已業擅戎韜聲滿軍府乃者山東整旅河右致誅守臣習非浸以成過事君不信撫衆無恩言多隱欺政務苛刻孤我委遇自虧功名士心咸忿其驕矜人力頗怨其凋盡雖趣召而有命蓋羣情之不容惟爾迹在轅門屬當此際一言秉禮百姓一作衆無譁居常表持重一作正之難臨事見知幾之勇况地當師次營壓膚塵人情素悅而易從軍令既明而自戢眷兹諒實可委蕃垣必能同士伍之衣食知黎元之病苦繼前政之風躅為將來之表儀是用拜之壇場授以旌鉞命副相之崇秩牧覃懷之舊封式佇嘉猷用報明奬夫行髙則名著事舉則功存立政在初為人疑作仁由已無或墜替欽承寵光可使持節懷州刺史御史大夫充河陽三城懷州節度營田等使散官勳並如故主者施行授鄭涯義武軍節度使制玉堂遺範門下鮮虞一作于舊國上谷雄藩㧾中山之甲兵接薊門之封壤眷求良帥允屬碩臣銀青光祿大夫守太子賔客分司東都上柱國滎陽縣開國男食邑三百户鄭涯𢎞廓宏才易簡正性雅一作偉量溟廣貞標嶽孤通鈐匱之竒書負圭璋之雅器自發揚術業歷踐清途懿聞淑聲推為茂德日者常一作嘗膺奬任屢鎮方隅惠愛洽於轅門謳歌溢於閻井洎謫居遐激旅處洛師惕厲日聞屯夷一貫是命載圖來效復議寵遷於戲選將之難古今為重而况易水之上尤藉謀猷爰求惟舊之賢式重作藩之寄爾其勉思鎮馭益念訓齊惟克已可以愛人唯推恩可以撫衆壞帳豈專於仁祖晉謝尚宋仁祖褰帷宜嗣於賈琮俾外秩於春卿更增榮於亞相往承休命無忝新恩可檢校禮部尚書使持節定州諸軍事兼定州刺史御史大夫充義武軍節度易定等州觀察處置北平軍等使散官勳封如故主者施行大中九年九月十四日一作皆大中制誥授劉悟滑州節度使制門下王者驅大順以道至和不能無狡冦天將廓沴氣以息暴亂則必有忠臣非處迷何以明其徑節非嘉奬何以表其尤功况討罰之初詔命斯著髙懸寵爵獲則當之淄青都知兵馬使金紫光祿大夫試殿中監察御史上柱國劉悟忠孝一作勳之後義勇為心久淪迹而未伸每蓄謀以思奮屬姦凶負阻將帥徂征宣威已震於河山肆逆猶固其巢窟遂能潛通密欵先事指期決䇿於萬衆之中挺身於重城之內感深而信誓若一氣直而神明為徒梟彼渠魁殱厥醜類乃飛章以馳獻繄大慶之遐聞臨軒載懷是舉斯命眷彼雄鎮惟兹滑臺有二郡察俗之殷其人徑而剛有三軍制節之重其士毅以肅俾膺分閫式委觀風超升題劒之名所以崇其望兼假弄印之任所以峻其威疏封廣載其土田真養爰優其户賦仍加厚賜用示深恩髙門大啓於通衢别墅榮分於沃野凡是賞典稱乎國章於戲在昔天寶季年羯胡首難惟悟之祖職居平虜能戮賊臣竟通朝命賜名以旌其忠授鉞以仗其材今悟又能除妖可謂濟美勉持忠孝以保家邦可檢校工部尚書使持節滑州諸軍事云云授田興魏府節度使制門下經邦制理先務於安人乘義秉忠一作秉義納忠良存乎體國有其堅持正性動合衆心材當與能善可垂勸則宜荷推轂之寄為分閫之臣建侯貞節宣我利澤魏慱光軍步射都知兵馬使同州節度副使僉校祕書少監御史中丞沂國公田興深明有融忠孝是力介若金石通乎弛張效用思齊於昔賢潔誠期報於君父生此王國迹淪戎藩逢時乃彰會節有立日者元臣即代胤子幼年小人任事以作威諸將屏息而增懼政理兹紊刑章亟乖羣情危疑幾至顛越朕用憂憫方圖輯寧而興任在轅門心惟大體義勇斯奮姦凶伏辜士心所歸不令而肅征鎮安固厥庸茂焉既而保貴胄之家將致上國全故帥之績永復中軍表章屢陳情懇備至以勳則特異以義則可觀周旋令圖蓋有餘裕朕髙懸爵命以待能賢嘉爾殊勞允宜懋賞晉軍謀帥郤縠嘗學於詩書漢將議功竇融實冠於名節魏郊巨鎮河上奧區仗鉞可以宣國威觀風可以率彛典習俗至於丕變疲氓徯而一作於汔康佇光䇿書用寄心膂榮級俾登於七命顯秩超踐於六卿仍兼副相之雄以重元戎之寄服兹休命其懋戒哉可銀青光祿大夫檢校工部尚書兼御史大夫充魏慱等州節度觀察處置支度營田等使授范希朝神䇿軍三字一作京西行營節度使制玉堂遺範門下古之命將帥修封疆在於整軍非以耀武故繕理亭障訓齊車徒以申國威以固王略非誠節昭一作茂著無以分統六師非勳績彰明無以并護諸將副茲重任實在忠賢特進檢校右僕射右金吾衛大將軍充右街使成紀男范希朝有貞臣之節有良將之風識逹武經學綜兵要臨事能斷好謀而成嘗領元戎鎮于朔野控河上一作中之塞拒漢南之庭修其政刑諭以威德士吏向化一作慕裔夷綏懷入覲京師䇿勳王府泊司警衛禁旅增嚴直道彌彰嘉庸益茂固可以總統北落節制西陲成魏絳和戎之勳振朝錯備邉之䇿俾異俗率化穡人成功師乘以和𤇺候無警懋建一作昭丕績時乃之休可開府儀同三司檢校左僕射兼右神䇿軍京西諸城鎮行營兵馬節度使封如故一作皆唐大詔令授韓𢎞宣武軍節度使制門下統制大刑㧾率羣帥功庸既獻于社爵服宜加於朝翼宣帝猷出納王命持綱以揆百度贊道以釐庶工時惟宥密昔所華重寵我元輔昭其茂勳淮西諸軍行營兵馬都統宣武軍節度副大使知節度事管內支度營田汴宋亳頴等州觀察處置等使金紫光祿大夫守司徒同中書門下平章事使持節汴州諸軍事守汴州刺史上柱國頴川郡開國公食邑三百户韓𢎞天育間氣時推上材靜蓄滄波不測之深動發迅雷殷然之勢竭彼肝膈參豫股肱殿于中邦式是四表自淮濆俶擾將校徂征而原燎方揚妖氣不斂爰命巖廊之傑董兹貔武之師薦其忠誠勵彼勇節參掌廟算指授神機䇿畫得於慮深威略宣於致逺俾趨重地遂援堅城彀中全謀果立竒績既殄凶醜宜疇厥庸載加常伯之崇以正宰司之位詔爵增邑懋兹休勳爾其敬之服我成命可守司徒兼侍中使持節汴州諸軍事兼汴州刺史充宣武軍節度副大使知節度事管內支度營田汴宋亳頴州等觀察處置等使許國公食邑三千户散官勳賜如故主者施行授張𢎞靖太原節度使制門下授鐵鉞之賜其惟爪牙掌管籥之司允歸心腹况乎天兵作鎮王業成都全晉山河陶唐風俗外以威懷七狄內以承衛二京操節度戎師之權兼澄清列郡之寄訓齊五校表率一方歷選元僚無逾上相中書令張𢎞靖髙蓋若慶大圭含章和順在中莊敬發外翼翼有致君之道兢兢懷許國之忠言觀器能早授方任風謡果洽於分陜膏潤實彰於近關洎登為鼎臣輔我衮職出納萬務清明一心𢎞宣逺猷慎守成式夢帝所賴疑伊人是瞻朕以龍山之前卒疑作辛乘殷會鴈塞之上稽胡雜居求明略以拊循資盛名而鎮定是用輟於鈞軸授以節旄崇髙超列於天官密勿遙參於台席敬聽後命載揚先聲在負元初乃考成肅公弼諧德宗以敷景化肆豫嗣位推爾業官匪惟勤勞于我邦兹亦光輝于爾室於戲入而惟輔出而為藩行思永圖勿替舊服可檢校吏部尚書平章事云云授裴度彰義軍節度使制令狐楚門下輔弼之臣軍國是賴興化致理則秉鈞以居取威成一作定功則分閫而出所以同君臣之體而一中外之任焉屬者問罪汝南致誅淮右蓋欲刷其汙俗弔彼頑人雖棄一作挈地求生者實繁有徒而嬰城執迷者未革一作剪其志一作類何獸困而猶鬬豈鳥窮之無歸歟由是遙聽鼓鼙沂輟樞軸授以成算一作更張琴瑟煩我台席董兹戎旃朝議大夫守中書侍郎同中書門下平章事飛騎尉賜紫金魚袋裴度為時降生協朕夢卜精辨宣力堅明納忠當軸而才謀老成運籌而智略前定司其樞務備知四方之事付以兵要必得萬人之心是用禱于一作於上玄擇一作練此吉日帶丞相之印綬所以尊其名賜諸侯之斧鉞所以重其命爾宜大布清問恢壯徽猷感勵連營蕩平多壘召懷孤疾字育夷傷况淮西一軍素效忠節過海赴難史䇿上一作書勳建中初攻破襄陽擒滅崇義此一作比者脅於凶逆歸命無由每念前勞常思安撫所以內輟佐輔為之師帥實欲保全慰喻使各得其宜爾往欽哉無越我丕訓可守門下侍郎同中書門下平章事使持節蔡州諸軍事兼蔡州刺史充彰義軍節度管內度支營田使一作事申光蔡等州觀察處置等使仍充淮西宣慰處置使散官勳如故一作皆唐大詔令授崔𢎞禮天平軍節度使制玉堂遺範門下節制師戎一作旅考一作亷察風俗誠藩方之倚任實朝廷之注意至於簡拔常所重難况齊魯分疆河朔接境遏冦虞而固封守宣德教而按州部付之專柄思得全才是用輟近輔之循良撫東平之凋瘵式孚成命所為至公正議大夫云云崔𢎞禮文學發身擴之以襟度忠信為主輔之以誠明纍分郡符亦㧾戎鎮理行第一奏課連最來必畏晚去常見思挹長者之聲光得大臣之體要屬樂陵未靖戎事方殷上宰憂勞舊恙纒迫念茲易置期在惠安當使恩威並行剛柔適用率之以義則無不化齊之以禮則罔不服恢武略以經務清吏職而約法必有餘地以康吾人大將鼓旗諸侯弓矢文昌顯秩憲府雄班參以命之寵茲俞往承我休德勿替前修可檢校户部尚書使持節鄆州諸軍事兼鄆州刺史御史大夫充天平軍節度鄆曹濮等觀察處置使散官勳如故授李訴山南東道節度使制詔令作李訴移鎮加官階爵邑制玉堂遺範門下伐叛除凶必俟乎竒略進封超位允答於殊庸况四紀逋誅三州竊據積妖遺育縱亂一作逆挻災纍年徂征一舉主致論功既當一作歸於異等議賞豈待於踰時唐隨鄧等州節度觀察處置等使通議大夫檢校左散騎常侍使持節鄧州諸軍事兼鄧州刺史御史大夫賜金紫魚袋李訴宗臣之胤王國克生毅勇蓄深溫良煦外禮樂戰攻一無攻字之器默識其源詩書義理一無理字之府洞窺其室雖早升朝序而末展將材頃以懸瓠滔天宿兵既久方城壓境易帥頗頻永懷韜略之家必有弓裘之嗣將一作分執金鼓載持干旄果副眷求克揚威令緝傷夷之後振怯為雄制密邇之間保危成固推忠厚以感物本信惠而知人一其鬬心厲厥一作彼死力乘虛徑襲負雪兼行風驅如合於百神雷發一作震若出於九地堅城立潰狡豎坐擒遺氓安堵以知歸餘黨釋甲而請命古之良將其孰過焉已申獻捷之儀當舉䇿勳之典爰擇一作授名部俾恢重藩自洛而遙惟襄為大綿亘楚服橫臨漢津揔八郡以澄清秉三軍之節制式因加地往繼沉碑特遷左揆之尊崇茲一作以崇天秩仍假南臺之長峻彼一作用峻霜威表以勳階賜之茅社一作土户豐真食門貴延恩洽此寵榮從于茂烈於戲天鑒非逺一作眛不庭者必誅王爵無私有功者是享揚名濟美惟孝著於家聲鍾鼎山河惟忠光于國籍凡曰臣子得無企歟可銀青光祿大夫檢校尚書左僕射使持節襄州諸軍事兼一作守襄州刺史御史大夫充山南道節度管內度支營田襄鄧唐隨復郢均房等州觀察處置等使仍賜上柱國封梁國公食邑三千户并賜食實封五一作三百户與一子五品正員官主者施行一作皆唐大詔令授李光顔忠武軍節度使制門下授鈇鉞之寄當兵車之會力鋤凶險志殄冦讎星霜固難奪之誠始終見師貞之節嘉猷益茂力集休勳宜崇寵光肆于時夏考諸前志斯為大經忠武軍節度使李光顔崆洞秀氣為時生才謙和不流簡厚能斷本忠信以經武閲詩書以理戎首職北垣聲雄大鹵受命既平於朔野懸車亦剪其巴庸已積功勞銘在鍾釡朕以淮濆負固歷紀稽誅自授兵符獨運明略分營先得其地險吞敵屢挫於賊鋒嘗下名城拔其趙幟制勝之術動合鬼神百戰表於忘軀一心注於報國歲月滋久堅誠不回當凶妖就執之初是潰黨乞降之際單騎以入其柵壘免胄而弔其傷殘納之不疑乃見全德今欃槍已滅申蔡無虞寢興以思用息戎馬則報功顯秩位宜重於三公馭貴殊勳賦亦開於千乘陟論道之優禮奬述職之崇名爾其敬之無替舊服可檢校司空使持節許州諸軍事兼許州刺史御史大夫依前充忠武軍節度管內度支營田陳許等州觀察處置等使仍賜上柱國封武威郡開國公食邑二千户散官勳如故主者施行授裴休荆南節度使制門下王者分職設官所以理天下外建州牧侯伯內置公卿大夫故野無遺賢朝無闕政俾率土絶愁嘆之音接畛有富庶之泰當是選也豈可易乎具官裴休巖廊重德文學宗師才為代生智尚物表發言所以興家國修已可以伏華夷自奮藻儒林射䇿藝圃廽處顔冉之列疊升朝董之科濟代之心已彰於事業奉君之志皆推於友朋抗疏七人之官正色三署之內縉紳多士慕髙韻以指南貝錦巧詞自退身於有北遂金玉王度丹青憲章三領亷車一剖符竹皆著去思之稱共興一作歌來慕之謡宏圖豈滯於割雞令問果還於振鷺委茲文柄任之春闈大呈公鑒之明傋傳德疑作得人之美板籍繁務管榷劇權成富國之竒謀施安邉之大略先皇帝夢想髦彥勵精理道採以公論付以化權致百度之惟貞覺三台之益重羌戎擾叛調發時雨之師農畝廢荒申明作霖之旨凡所經濟知無不為四鎮入境而獲安三軍推誠而俱感整疑盡臣節何愧古人朕以全楚奧區荆衡重地湊舟車之都會控湖嶺之要衝藉爾分憂施吾惠澤蘇彼疲瘵勿倦殷繁玉帳兵符既榮冠於今日文場武庫當繼蹤於昔賢一作時祗服典章無替徽烈可檢校尚書右僕射兼江陵尹御史大夫充荆南節度觀察處置等使散官勳封如故主者施行文苑英華卷四百五十二
