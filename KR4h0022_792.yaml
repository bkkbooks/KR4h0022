body:
  text: 文苑英華巻七百九十三宋李昉等編傳陳子昻别傳一首田司馬傳一首陸文學自傳一首圬者王承福傳一首毛頴傳一首革華傳一首陳子昻别傳盧藏用陳子昻字伯玉梓州射洪縣人也本居頴州四世祖方慶得墨翟祕書隱於武東山子孫因家焉世為豪族父元敬瑰偉倜儻年二陳子昻集作三十以豪俠聞屬鄉人阻饑一朝散萬鍾之粟而不求報於是逺近歸之若龜魚之赴淵也以明經擢第授文林郎因䆒覽墳籍居家園以求其志餌地骨錬雲膏四十餘年嗣子子昻奇傑過人姿狀嶽立始以豪家子馳俠使氣至年十七八未知書嘗從博徒入卿學慨然立志因謝絶門客專精墳典數年之間經史百家罔不該覽尤善屬文雅有相如子雲之風骨初為詩幽人王適見而驚曰此子必為文宗矣年二十一始東入咸京遊太學歴抵郡公都邑靡然屬目矣由是為逺近所籍甚以進士對䇿髙第屬唐髙宗大帝崩于洛陽宫靈駕將西歸子昻乃獻書閣下時皇上以太后居攝覽其書而壯之召見問狀子昻貎寢寡援然言王覇大畧君臣之際甚慷慨焉上壯其言而未深知也乃勑曰梓州人陳子昻地籍英靈文稱偉曄拜麟臺正字時洛中傳冩鬻其書市肆閭巷吟諷相屬乃至轉相貿鬻飛馳逺邇秩滿隨常牒補右衞胄曹上數召見問政事言多切直書奏輙罷之以繼母憂解官服闋拜右拾遺子昻闕晩愛黃老之言尤躭味易象往往精詣在職黙然不樂私有掛冠之意屬契丹以營州叛建安郡王攸冝親㧾戎律臺閣英妙皆署軍麾特勑子昻參謀帷幕軍次漁陽前軍王孝傑等相次䧟沒三軍震慴子昻進諌曰主上應天順人百蠻向化契丹小醜敢謀亂常天意將空東北之隅以資中國也大王以元老懿親威畧邁世受律廟堂弔人問罪精甲百萬以臨薊門運海陵之倉馳隴山之馬積南方之甲發西山之雄傾天下以事一隅此猶舉太山而壓卵建瓴破竹之勢也然而張𤣥遇王孝傑等不謹師律授首虜庭由此長冦威而殆戰士夫冦威長則難以爭鋒戰士殆則無以制變今敗軍之後天下側耳草野傾聽國政今大王冲謙退讓法度不申每事同前何以統衆前如兒戱豈徒為賊所輕亦生天下奸雄之心聖人威制六合故用聲爾非能家至户到然後可服况兵貴先聲今發半天下之兵以屬王安危成敗在百日之内何可輕以為尋常大王若聽愚計即可行若不聽必無功矣須共成功報國可欲送身誤國耶伏乞審聽請盡至忠之言凡軍須先比量智愚衆寡勇怯强弱部校將率士卒之勢然後可合戰求利以長攻短今皆同前不量力又不簡練暗驅烏合敗後怯兵欲討賊何由取勝僕一愚夫猶言不可况奸賊勝氣十倍未可當也且統衆禦奸須有法制親信若單獨一身則朱亥金鎚有竊發之勢不可不畏人有負琬琰之寳行於途必被刼賊何者為寳重人愛之今大王位重又㧾半天下兵豈直琬琰而已天下利器不可一失一失即後有聖智之力難為功也故願大王於此决䇿非小讓兒戱可了若此不用忠言則至時機已失機與時一失不可冄得願大王熟察大王誠能聽愚計乞分麾下萬人以為前驅則王之功可立也建安方求鬬士以子昂素是書生謝而不納子昻體弱多疾感激忠義嘗欲奮身以答國士自以官在近侍又叅預軍謀不可見危而惜身茍容他日又進諌言甚切至建安謝絶之乃署以軍曹子昻知不合因箝黙下列一作吏但兼掌書記而已因登薊北樓感昔樂生燕昭之亊賦詩數首乃泫然流涕而歌曰前不見古人後不見來者念天地之悠悠獨愴然而涕下時人莫知之也及軍罷以父老表乞罷職歸侍天子優之聽帶官取給而歸遂於射洪西山構茅宇數十間種樹採藥以為飬嘗恨國史蕪雜乃自漢孝武之後以迄于唐為後史記綱紀粗立筆削未終鍾文林府君憂其事廢子昻性至孝哀號柴毁氣息不逮屬本縣令叚簡貪暴殘忍聞其家有財乃附㑹文法將欲害之子昻荒懼使家人納錢二十萬而簡意未塞陳集作已數輿曵就吏子昻素羸疾又哀毁杖不能起外廹苛政自度力氣恐不能全因命蓍自筮卦成仰而號曰天命不佑吾其死矣於是遂絶年四十二子昻有天下大名而不以矜人剛斷强毅而未嘗忤物好施輕財而不求報性不飲酒至於契情㑹理兀然而醉工為文而不好作其立言措意在王覇大畧而已時人不之知也尤重交友之分意氣一合雖曰白刄不可奪也友人趙真固鳯閣舍人陸餘慶殿中侍御史畢構監察御史王無競亳州長史房融右史崔泰之處士太原郭襲徵道人史懐一皆篤嵗寒之交與藏用遊㝡乆飽於其論故其事可得而述也其文章散落多得之於人口今所存者十巻嘗著江上丈人論將磅礴機化而與造物者遊遭家難亡之荆州倉曹槐里馬擇曰擇昔從父友王適獲陳君忻然忘我㓜齡矣榆闗之役君籌其謀戎安累年不接晤語聖歴初君歸寧舊山有挂冠之志予懐役南遊遘茲歡甚幽林清泉醉歌絃詠用覽所記倐徧岷峨予旋未㡬陳君將化悲夫言絶道冥杳然若䘮之幾延陵心許而彼已亡天䘮斯文我恨何及君故人范陽盧藏用集其遺文為序傳識者稱其實録嗚呼陳君為不亡矣遂為賛曰岷山導江回薄萬里浩瀚鴻溶東注滄海靈光氛氲上薄紫雲其瑰寳所育則生異人於戯才可兼濟屈而不伸行通神明困於庸竪子曰道之將䘮也命矣夫田司馬傳于卲司馬姓田氏名某字某其先盖自齊諸田之裔逺代仕漢徙家於秦世一作今為京兆茂陵人也生而岐嶷七嵗能誦詩遂通諸經齒太學數嵗不上第因左常侍王倕授職西河之地乃喟然而嘆謂同舍生曰大丈夫立身致位不在於此徒索長安米耳遂投刺王公見而奇之數日酬對以為必可用也遂表隨軍要籍從事耳目甚有禆補居無何公罷將軍下勢禄乃不及亦無愠色御史大夫哥舒翰兼統五原雅知其人得之甚喜表清勝府别將非其好也人皆嘆屈獨不以介意驟改永平府左果毅長松府折衝雖從列叙亦不出牙幢之内矣天寳中士馬殷富國用仰給哥舒公得黷武於河隴之間横行青海河收九曲西拓蕃境數千里置亭候郡邑創鄯城郡於河源軍又𨽻臨蕃縣由是選舉能吏以充員位者見善如不及臨蕃介在大一作天府尤難其人所被斟酌者蓋百餘軰人人自以為得令而哥舒公决䇿取之招輯新附承上接下罔有不悦其聲洋洋播於逺近㑹安禄山以范陽叛潼闗失守有詔御史中丞郭英乂專制隴右未及下車表渭州隴西縣令實資舊跡撫我凋甿曽未浹年風俗大變郭公嘗按部至邑見其治理褒歎乆之不以禮物為隔時一作特為公道見合下榻宴慰累日方還今閬州刺史馬雄參謀軍事亦幕之良也時有序述滿嵗鳯翔尹李鼎復兼隴右以秦渭臨洮餉饋不繼發漢陽之賦以資之遂舉知長道縣事仍表請起拜清要固辭不獲隨牒員來在公之勤嵗寒不易嘉聲美政益震於曩時自是日慎一日謙而致讓者至於數四時特進鴻臚卿兼刺史太原王公勞於取人逸於用人前後褒貶無有不當田公雖讓徳有餘而王公渴日不足遂舉攝司馬仍知縣事聊以為喻且俟後命書曰靡不有初鮮克有終田公有焉詩曰惟其有之是以似之王公有焉故人歌之曰二公更事闔境之庇二公其休誰其為嗣君子聞之曰漢陽之郊政有經矣昔有巫宓卓魯亦由今之視昔雲霄之望豈徒然哉邵忝春秋之徒實採輿人之誦執簡以徃為之傳云陸文學自傳陸子名羽字鴻漸不知何許人也或云字羽名鴻漸未知孰是有仲宣孟陽之貎陋而有相如子雲之口吃而為人才辯為性𥚹躁多自用意朋友規諌豁然不惑凡與人宴處意有所適一作擇不言而去人或疑之謂生多瞋又與人為信縱氷雪千里虎狼當道而不諐也上元初結廬於茗溪之湄閉闗讀書不雜非類名僧高士談讌永日常扁舟往來山寺隨身唯紗巾藤鞵短褐犢鼻往往獨行野中誦佛經吟古詩杖擊林木手㺯流水夷猶徘徊自曙逹暮至日黒興盡號泣而歸故楚人相謂陸子蓋今之接輿也始三嵗一作載惸露育於竟陵太師積公之禪自九嵗學屬文積公示以佛書出世之業子答曰終鮮兄弟無復後嗣染衣削髮號為釋氏使儒者聞之得稱為孝乎羽將授孔聖之文公曰善哉子為孝殊不知西方染削之道其名大矣公執釋典不屈子執儒典不屈公因矯憐撫愛歴試賤務掃寺地㓗僧厠踐泥汚牆負瓦施屋牧牛一百二十蹄竟陵西湖無紙學書以竹畫牛背為字他日於學者得張衡南都賦不識其字但於牧所倣青衿小兒危坐展巻口動而已公知之恐漸漬外典去道日曠又束於寺中令芟剪卉莽以門人之伯主焉或時心記文字懵然若有所遺灰心木立過日不作主者以為慵墮鞭之因歎云恐嵗月往矣不知其書嗚咽不自勝主者以為蓄怒又鞭其背折其楚乃釋因倦所役捨主者而去巻衣詣伶黨著謔談三篇以身為伶正㺯木人假吏藏珠之戯公追之曰念爾道䘮惜哉吾本師有言我弟子十二時中許一時外學令降伏外道也以吾門人衆多令從爾所欲可捐樂工書天寳中郢人酺於滄浪邑吏召子為伶正之師時河南尹李公齊物黜守見異提手撫背親授詩集於是漢沔之俗亦異焉後負書於火門山鄒夫子别墅屬禮部郎中崔公國輔出竟陵因與之遊處凡三年贈白驢烏幇一作犁下同牛一頭文槐書凾一枚白驢幇牛襄陽太守李憕一云澄一云棖見遺文槐凾故盧黄門侍郎所與此物皆已之所惜也宜野人乗蓄故特以相贈洎至徳初泰一作秦人過江子亦過江與呉興釋皎然為緇素忘年之交少好屬文多所諷諭見人為善若已有之見人不善若已羞之忠言逆耳無所廻避繇是俗人多忌之自祿山亂中原為四悲詩劉展窺江淮作天之未明賦皆見感激當時行哭涕泗著君臣契三巻源觧三十巻江表四姓譜八巻南北人物志十巻呉興歴官記三巻湖州刺史記一巻茶經三巻占夣上中下三巻並貯於褐布囊上元年辛丑嵗子陽秋二十有九日圬者王承福傳韓愈圬之為伎賤且勞者也有業之其色若自得者聽其言約而盡問之王其姓承福其名世為京兆長安農夫天寳之亂發人為兵持弓矢十三年有官勲棄之來歸䘮其土田手鏝衣食餘三十年舍於市之主人而歸其屋食之當焉視時屋食之貴賤而上下其圬之傭以償之有餘則以與道路之廢疾餓者焉又曰粟稼而生者也若布與帛必蠶績而後成者也其他所以飬生之具皆待人力而後完獨本有者字也吾皆頼之然人不可徧為宜乎各致其能以相生也故君者理我所以出令二字蜀本作生者也而百官者承君之化者也任有大小集作大小唯其所能若器皿焉食焉而怠其亊必有天殃故吾不敢一日捨鏝以嬉夫鏝易能可力焉又誠有功取其直雖勞無愧吾心安焉夫力易强而有功也心難强而有智也用力者使於人用心者使人亦其宜也吾特集作故擇其易為而無愧者取焉嘻吾操鏝以入貴富之家有年矣有一至者焉又往過之則為墟矣有再至三至者焉而往過之則為墟矣問之其鄰或曰噫刑戮也或曰身既死而其子孫不能有也或集有則字曰死而歸之官也吾以是觀之非所謂食焉而怠其事而得天殃者耶非強心以智而不足不擇其才之稱否而冐之者耶非多行可愧知其不可而强為之者耶十字蜀本作知其不可能而強為之者耶將貴富難守薄功而厚饗蜀本有之字者耶抑豐悴有時一去一來不可常者耶吾之心憫焉是故擇其力之可能者行焉樂富貴而悲貧賤我豈異於人哉又曰功大者其所以自奉也博妻與子皆飬於我者也吾能薄而功小不有之可也又吾所謂勞力者集有也字若立吾家而力不足則心又勞也一身而二任焉雖聖者不可能也愈始聞而惑之又從而思之蓋賢者也蓋所謂獨善其身者也然吾有譏焉謂其自為也過多其為人也過少其學楊朱之道者耶楊朱之道不肯拔我一毫而利天下而夫人以有家為勞心不肯一動其心以蓄其妻子其肯勞其心以為人者哉雖然其賢於世之患不得之而患失之者以濟其生之欲貪邪而亡集作忘道以䘮其身者其亦逺矣又其言有可以警余者故余為之傳而自鑒焉毛頴傳毛頴者中山人也其先明眎佐禹理集本文粹作治東方土閣本作土飬萬物有功因封於卯地死為十二神嘗曰吾子孫神明之後不可與物同當吐而生已而果然明眎八世孫䨲世傳當殷時居山得神仙之術能匿光使物竊姮娥騎蟾蜍入月其後代遂隱不仕或文粹無此字云居東郭者號東郭曰㕙狡而善走與韓盧爭能盧不及盧怒與宋鵲集作㹱謀而殺之醢其家秦始皇時使二本無此字䝉將軍恬南伐楚次中山將大獵以懼楚召左庶長與軍尉以連山筮之得天與人文之兆筮者賀曰今日之獲不角不牙衣褐之徒缺口而長鬚八竅而趺居獨取其髦簡牘是資天下其同書秦其遂兼諸侯乎遂獵圍毛氏之族拔其毫載頴而歸獻俘于章臺宫聚其族而加束縛焉秦皇帝使恬賜之湯沐而封諸管城號曰管城子日見親寵任事頴為人强記而便敏自結繩之代以及秦事無不纂録隂陽卜筮占相醫方族氏山經地志字書圖畫九流百家天人之書乃至一字文粹作及浮圖老子外國之説皆所詳悉又通於當代之務官府簿書市井貨錢註記唯上所使自秦始皇及太子扶蘇胡亥丞相李斯中車府令髙下及國人無不愛重又善集作喜隨人意正直邪曲巧拙一隨其人雖後見廢棄終黙不洩惟不喜武士然見請亦時往累遷文粹作拜中書令與上益狎上嘗呼為中書君上親决事以衡石自程雖宮人不得立左右獨頴與執燭者常侍上休方蜀本作乃罷頴與絳人陳𤣥𢎞農陶泓及㑹稽楮先生友善相推致其出處必偕上召頴三人者不待詔輙俱往上未嘗恠焉後因進見上將有任使拂拭之因免冠謝上見其髮秃又所摹畫不能稱上意上嘻笑曰中書君老而秃不任吾用吾嘗謂君中書文粹有君字而今不中書耶對曰臣所謂盡心者也文粹作焉因不待召歸封邑終于管城其子孫甚多散處中國夷狄皆冒管城唯居中山者能繼父祖業太史公曰毛氏有兩族其一姬姓文王之子封於毛所謂魯衞毛𣆀者也戰國時有毛公毛遂獨中山之族不知其本所出子孫最為蕃昌春秋之成見絶於孔子而非其罪及䝉將軍拔中山之毫始皇封之管城世遂有名而姬姓之毛無聞頴始以俘見卒見卒字一作幸任使秦之滅諸侯頴與文粹作亦有功賞不酬勞以老見踈秦其集作真少恩哉下邳侯革華傳下邳侯革華者其先隴西人也三十六代祖守犍為黄帝時以力見文粹無此字召拜大司農以其闢土有功又知稼穡艱難遷輕車都尉子孫相繼至周武王時徙桃林冠冕遂絶其後人思其濟世之才因復其位而加任使焉華父犨生五年襲先祖爵仕至上輕車都尉華母居長樂有乳哺之恩越王勾踐時嘗侍宴姑蘇臺詩所謂有覺徳行者也犨因引重一字集作引輕車使至大行山力不任事遂死於轘轅下蜀本有主字上嗟悼命太宰中屠公執刀而集作以觧之其枝集作支派分離散在他處革華長子也上念其父劬勞而死於王事封華為下邳侯詔將作大匠治之華集有為字性堅勁崛强難以直御匠以其膏潤之然後去其豪族而加裁割焉㑹大原人金十奴與新鄭人􅀈斯生相逢薦華於五木大夫是後稍稍得成其名上嘉之遂釋褐賜墨綬焉華嘗曰吾辛勤乆今方成名得處在集無在字上左右足矣及獻之果然華為人善履道别威儀進止集作退趨蹌一隨人意上將駕出遊畋獵馳騁毬擊集作擊毬射御及交賔接賢禮神祭祀未嘗不召華俱文粹作皆往伏事上乆之因病文粹作忽開口論議泄露密集作上㫖上由是踈之詔將作大匠治之又命其友金十奴等令補過之尋獻於上上雖納之然亦不甚見重有泥塗賤處方召使之餘並不得預焉頃之上見其顔色顦顇哀憊失度上咨嗟曰下邳侯老而憊不任吾事集作用今棄於市朝不復召子矣遂棄之而終華無子文粹作息其繼者族人矣太史公曰華之先皮姓五字集作華氏之先出於皮姓軒轅時蒼頡觀鳥跡制文字以其始於皮而聲於革故從革焉初華集作革自胡而來趙武靈王時集作為趙武靈王見重是後子孫盛于中國漢書功臣表有煮棗侯革朱者即其後也文苑英華巻七百九十三
