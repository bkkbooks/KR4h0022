body:
  text: 文苑英華卷九百八十五宋李昉等編交舊八祭劉僕射文一首祭顔太師文二首祭袁給事文一首祭鳳翔張相公文一首祭李相公文一首祭福建鄭大夫文一首祭楊郎中文一首為留守鄭侍郎祭劉僕射文穆貟維年月日某官謹遣某乙敢用少牢之奠致祭于故尚書左僕射彭城公之靈巨唐中否八葉嗣興天為生公為公啓運公受天所授事與時并實為酇侯立我王國于時方夏之內痍傷未平兵餘於人賦倍於産公施以損益權其重輕自我竭心為國強力嵗歉靡瘠師興忘勞羣帥不虔怙兵自擅典章靡及職貢莫修律我清明徵令如饗疑作響凡所辟選府傾時賢若金我礪若玉我琢爾材我器爾用我功至今會計之司食貨之政法公之法其事集吏公之吏其利興守公之成揚公之盛孰云公歿吾謂公存嗚呼何日不夕何榮不落何亢不悔何髙不危終沒裔夷凡伯稱嘆皇明昭滌丹旐言旋澤及九原魂歸萬里大名備禮返葬故丘哀哀遺孤銜恤靡至毁鄰於滅必復是徴某昔官南宫嘗參末吏玉音如在哀挽長違祗命禁省不敢離局禮闋執事悲儲永懷敢以精誠寄於祖奠神逺聽邇庶乎降歆嗚呼哀哉尚饗為淮西宣慰使鄭右丞祭顔太師文前人維年月日某使某官某奉敕以清酌庶羞之奠致祭于故太師贈司徒魯公之靈嗚呼天有晦明人亦理亂當其厄運則有盜臣至乃憑寵肆凶竊權搆逆蛇吞虎噬擇肉中州天子思所以解將燎之焚拯方割之墊遵開景命銷遏亂源惟公道冠四朝位先百辟望安社稷名動神祗期以日照天臨風清雨滌受命以出視途疑如歸嗚呼肇有君父孰如堯舜臣惟共鯀子亦朱均稟沴而生雖聖勿化父不能得之於子君不能得之於臣矧夫禍亂之興蓋乘中否天之方稔公若之何獨立虜庭卒致君命激昻大義潛革羣心全道為全夭年非夭期頤非夀得死為終惟彼凶殘殲我明哲罪均僭逆怒發天人否閉未通鬱翳兹久上帝厭亂忠臣應期坐使鯨鯢化為葅醢庸非精爽逹于明神幽贊元勳昭蘇宿憤詔旌大節追册上公寵以飾終禮惟加等某肅將密命敷布皇猷慰拊痍傷勞勉忠義拜乎天闕躬承德音命以觴牢備兹爼豆發於聖旨斯謂馨香公其降靈歆我明德尚饗為留守賈尚書祭顔太師文前人維年月日某官某謹以清酌少牢之奠敢昭告于故太師贈司徒顔公之靈天寶季年幽都首亂生人流血中夏擾攘公守在一麾援絶千里居鯨之腹而刳其腸履虎之尾而拊其背率先大義以集中興歷事四君匪躬一致全德邁俗正詞興邦堯朝孔門兩造其極羿浞間釁東南不開帝謂師臣豫厭征伐往以至化勝其凶殘于時公請老未獲蓋三年矣曽不俟駕豈公安車惟物之生善惡有性豺狼犬馬罔克相遷天能生之而不能化况彼元惡逆成膏肓針藥靡攻仁智何及奉命所在顧身如遺奈何明神孤我積善帝念忠烈國思典刑棟折將壓哲萎安放嗚呼哀哉昔者仰揖重名遐跂明德邈焉當代如望古今敬今疑髙風感歎大節卓爾不朽凛然如生巨猾殲夷幽魂昭奉靈車歸路千里同悲永惟忠勳宜在祀典况臨紼紖敢廢蘋蘩嗚呼哀哉尚饗為留守崔尚書祭袁給事文前人維年月日某官某謹遣某官某以清酌少牢之奠敬祭于故給事中汝南公袁三丈之靈昔我烈祖洎公先哲同力王室惟歡世家俾為塤箎且秩昭穆殆兹小子恭事丈人於惟丈人義切師友間氣全德稟之自然資元精之餘和邁生人之𢎞致遵周孔之軌躅行天下之直道是用萃厥孝友發于文儒播乎循良峙以謇諤出納帝命時惟掖垣政之或虧期不奉詔義之所激挺不顧身寤天聼於未聞反大號於已出吐羣公之所茹垂聖朝之直聲雖霖雨舟楫之用未躋于位而股肱耳目之任獨冠于時其生也公相讓德有臧文竊位之歎其歿也縉紳相弔有國僑將壓之懼惟昔遘癘萬心禱天天之愛人宜有所錫如何大運不即一作即逺我謀君子於是乎始疑明神而信定命輤車何所從先公居前有伊川萬古流美某離次是懼臨穴莫從百身靡追一慟何及哀填意竭式寄蘋蘩嗚呼哀哉尚饗為留守鄭侍郎祭鳳翔張相公文前人維年月日某遣某官某敢以豭牢之奠昭告于故相國贈太子太傅張公之靈嗚呼天之不可問也信矣災不避聖禍不擇賢在昔禹湯實逢水旱今我堯舜厥有羿浞公如季路終以結纓蓋君以避狄為仁臣以死難為義不朽是貴全身曷榮嗚呼哀哉公性本生知學成全德迹踐教極心遊聖源始以耕雍終以咎稷取其餘事猶為龔黃用其末學亦謂方召若昊天之將喪斯民也則不當生德於公錫公於主既執其柄載行其道方俾我后格于皇天一夫不獲引以為咎而奪我靈府移於四支使魚爛自中原燎斯及主辱臣死誠不在公守位以終是為不沒明明元首始喪股肱凡百縉紳靡所冠冕伏念平昔交如弟兄同則塤箎相和異則韋絃迭佩公頃自郎署往蒞東西秦楚相望音容不隔逮於晚嵗又忝倅戎時迫登賢事止中道恩加前好名在舊賔今寵贈表榮詔葬旌烈官司是縶弔哭無從泣遣行人哀將菲薄孰云觴豆可盡平生嗚呼哀哉尚饗為留守鄭侍郎祭李相公文前人維年月日某官某謹遣某官某以清酌少牢之奠敢昭告于故相國尚書左僕射贈司空李公之靈惟靈天鍾地資生備五福昔者玄宗之代天下治平時重文儒禮侔齒爵公始之鴻漸蔚為羽儀從容主文在帝左右既而皇家中否寶厯嗣興明明肅宗康難致理天地交泰聖賢相逢其所以濟川救旱和羮作醴稽視説命事符古文嗚呼才之用捨繫乎時道之行否存乎命圭組遺纍江湖為家興協騷人我無其怨詠歌堯舜二紀忘年皇唐建中天子纘服維新庶績先禮舊臣授公成均以舉政本爰降徴命典司春官先是昆夷不庭嵗為邉患亦既欵塞願歸聖理帝曰春秋之義許之不一而足和之五利斯在歷選列辟繄公簡心資王商之盛容將魏綘之故事公感恩自奮暮齒一作嵗方剛寵兹肩舁遵彼絶域俄屬賊臣間舋罕畢在邦公昭格外夷俾為內援嗚呼風沙勤瘁共薄頽齡王事畢矣我勞盡矣僅履吾土亦終天命原夫始終實盡善美湛恩縟禮論者宜之至若史氏立言訓辭作誥祕在天府式為國經世有五姓冠于百族有如姬薑取貴春秋擢秀天人惟公而已有司備物返葬故丘觀者哀榮况承眷舊敢憑奠酌以降明靈尚饗祭福建鄭大夫文前人維年月日故吏某官某敢薦薄奠于故福建都團練觀察處置使福州刺史兼御史大夫鄭公之靈伏惟自天降靈為國之楨溥博閎達昭融粹精中和植本體禮歌榮應物以順逢時中清爰自筮仕之初及乎懸車之期惟天命是信惟聖言是思德合明神心為元龜動享黃裳之吉不稽洪範之疑論交審其始其結也不解用才要其終其報也不欺仲山吐茹吉甫文武四國羽儀蒸乂父母憶昔髙門照灼寰宇榮冠一時名列三虎我公南遷返旐東土仲也壯齡相從萬古季兮不幸昔陷于虜忽如嚴霜殞落繁柯倏爾成空天乎謂何某嘗以斯文忝膺辟吏載筆如昨攀車何洎我有甘棠東城桃李悠悠清溪永代流美願託遺孤以奉恩紀黍稷非馨微誠所至嗚呼哀哉尚饗祭楊郎中文許孟容維貞元十九年嵗次癸未四月壬午朔二十二日癸卯給事中許孟容吏部郎中李傭一作備司封郎中韋成季屯田員外郎穆員右補闕張惟素京兆府司録薛丹等潔牢醴庶羞以祭于兵部郎中楊君之靈大鈞生生隂隲者誰殲惡輔善胡顛倒之擬聖草玄子雲位卑中庸殆庶回夭不時吾友懋功粹靈天資文為國華行作人師不至公相不登期頤嗚呼昊穹報施云欺交以利合滔滔其衆直義許心惟君伯仲金石非固韋弦迭用柯葉四時古之所共昔也三虎季奪天縱今也二龍叔間丘慟甲乙論辨聲聞我求桂枝崑玉郤氏無儔典校蓬山佐賢戎州渚宫峴首人賴嘉猷瑶墀記言方册潤色列宿有耀彌綸皇極鼎臣専征在浚之郊輟我綱轄俾參鞬槖元侯歸全符節自朝戎有伏莽變生中宵呀呀獲噬鄽里流血正直之形豺狼不嘻歸來間燕望在清切琴史方娛簪裳靡屑抒懷摛藻致逺詞絶文昌貴郎莫最司戎惟是利器簡于宸衷求賢得人天下至公鴻鵠不翦麒麟在馭九霄咫尺萬里跬步躡景摶風遏之中路天若可問余徴其故先哲嗣仁藩翰藎臣南國之紀洞庭之濵呌呼在聆淚血在巾擲裂酸楚悽心動神賔階寂寥繐帳參差露濕芳樹風悽曲池劍光塵昏履迹苔滋幽琴戞而無聲玉斚盈而不持惟古今之俱盡悟彭殤之一期留景餐霞兮昔人謂誰隙駒舟壑兮逹者不悲齊修短於一致必後先之匪移平生理言造次在兹本懸解之逹觀吁坦懷而暫夷哀挽徐出泉臺永閟觴豆匪馨塗芻有位蒼山霧羃表滻波駛紛帷輤之依遲杳精魂之髣佛匍匐友好伶俜孀稚玉樹春凋文星晝墜士歎梁木朝嗟國瑞三月徒來百身無異緘惋痛於胸抱孰哀詞之可既尚饗文苑英華卷九百八十五
