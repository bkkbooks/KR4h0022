body:
  text: 文苑英華巻一百八十三宋李昉等編省試四風光草際浮五首春風扇㣲和九首風不鳴條六首景風扇物一首清風戒寒二首冬至日祥風應候一首八風從律一首春風扇㣲和一首河出榮光二首洛出書四首秋霽望廬山瀑布一首涇渭揚清濁一首春水緑波一首四水合流一首海水不揚波一首空水共澄鮮一首曲池潔寒流一首寒流聚細文一首奉詔漲曲江池一首昆明池石織女一首濟川用舟楫一首天際識孤舟一首風光草際浮裴杞澹蕩和風至芊綿碧草長徐吹遥撲翠半偃乍浮光葉似翻宵露藂疑扇夕陽逶迤明曲渚照耀滿廻塘白芷生還暮崇蘭泛更香誰知攬結處含思向餘芳同前張復元纎纎春草長遲日度風光靃靡含新彩霏㣲籠逺芳殊姿媚原野佳色滿池塘最好垂清露偏宜帶艶陽淺深浮嫩緑輕麗拂餘香好助鸎遷勢乗時冀便翔同前陳璀春風泛瑶草九日遍神州已向花間積還來葉上浮曉光縁圃麗芳氣滿街流澹蕩依朱蕚䬙颺帯玉溝向空㸔轉媚臨水見彌幽况被崇蘭色王孫正可遊同前呉祕草色春沙裏風光曉正幽輕明摇不散郁昱麗仍浮吹緩苖難轉暉閒葉本柔碧疑烟彩入紅是日華流耐可披襟對誰應滿掬収恭聞掇芳客為此尚淹留同前陳祜秀發王孫草春生君子風光摇低偃處影散艶陽中稍稍移蘋末㣲㣲轉蕙叢浮烟傾緑野逺色澹晴空泛彩池塘媚含芳景氣融清暉誰不挹幾許賞心同春風扇㣲和陳九流喜見陽和至遥知橐籥功遲遲散南陌褭褭逐東風暗入芳一作畦園裏潜吹草木中蘭蓀纔有緑桃杏未成紅已覺寒光盡還㸔淑氣通由來榮與悴今日發應同同前張彚木徳生和氣㣲㣲入曙風暗催南向葉漸翥北歸鴻澹蕩侵氷谷悠揚轉蕙藂拂塵廻廣路泛籟過遥空暖上煙光際雲移律候中扶摇如可借從此戾蒼穹同前范傳正曖曖當遲日㣲微扇好風吹摇新葉上光動淺花中澹蕩凝清晝氤氲暖碧空稍㸔生緑水已覺散芳藂徙倚情偏適徘徊賞未窮妍華不可狀竟夕氣融融同前陳通方習習和風扇悠悠淑氣微陽升知候改律應喜春歸池栁晴初折林鸎暖欲飛川原浮彩翠臺舘動光輝泛豔摇丹闕揚芳入粉闈發生當有分枯朽幸因依同前栁道倫青陽初入律淑氣應春風始辨梅花裏俄分栁色中依㣲開夕一作曉照澹蕩媚晴空拂水生蘋末經巖觸桂藂稍抽蘭葉紫㣲吐杏花紅願逐仁風布將禆生植功同前崔立之時令忽已變年光俄又春高低惠風入逺近芳氣新靡靡纔偃草冷冷不動塵温和乍扇物煦嫗偏感人去出桂林漫來過蕙圃頻晨輝正澹蕩披拂長相親同前郭遵㣲風飄淑氣散漫及兹晨習習何處至熈熈與春親曖空㸔早辨映日度逾頻高拂非煙雜低隨衆卉新霽天輕有靄綺陌盡無塵還似登臺意元和欲煦人同前豆盧榮春晴生縹緲軟吹和初遍池影動􅔿淪山容發葱蒨遲遲入綺閣習習流芳甸樹杪颺鸎啼堦前落花片韶光恐閒放旭日宜遊宴文客拂塵衣仁風願廻扇同前邵偃㣲風扇和氣韶景共芳晨始見郊原緑旋過御苑春三條開廣陌八水汎通津烟動花間葉香流馬上人逶迤雲彩曙嘹唳鳥聲頻為報東堂客明朝桂樹新風不鳴條盧肇習習和風至過條不自鳴暗通青律起集作煖逺望白蘋生拂樹花仍落經林鳥自一作詎驚幾牽蘿蔓動潜惹栁絲輕入谷迷松響一作幽澗迷松韻開一作閑䆫失竹聲薫絃方在御萬國仰皇情同前姚鵠吾君理化清上瑞報昇平曉吹何曽息柔條自不鳴花香知暗度栁色覺潜生只見低垂勢那聞擊觸聲大王初漙暢少女正輕盈幸遇無私力幽芳願發榮同前黄頗類詩作舒元輿五緯類詩作習習起祥颷無聲瑞聖朝稍開含露蘂類詩作露蕚纔轉惹煙條宻葉應潜變類詩作潜長低枝幾暗摇林間鸎欲囀花下蝶㣲飄初滿縁堤草因生逐水苖太平無一事天外奏虞韶類詩作雲韶同前左牢類詩作章孝標旭日懸清景㣲風在緑條入松聲不發過栁影空摇長養應潜變一作遍扶踈每暗飄有林時嫋嫋無樹漸蕭蕭誤逐青烟散輕和樹色饒豐年知有待歌詠美唐堯同前王甚夷聖日祥風起韶暉助發生䝉䝉遥野色褭褭細條輕荏弱㸔漸動怡和吹不鳴枝含餘露濕林霽曉烟平縹緲春光媚悠揚景氣晴康哉帝堯代寰宇共澄清同前金厚載寂寂曙風生遲遲散野輕露華摇有滴林葉裊無聲暗剪藂芳發空傳谷鳥鳴悠揚韶景静淡蕩霽煙横逺水波瀾息荒郊草樹榮吾君垂至化萬類共澄清景風扇物張聿何處青蘋末呈祥起逺空曉來摇草樹輕度净塵䝉類詩作輕去動溟濛水上微波動林前媚景通寥天鳴萬籟蘭徑長幽藂漸颺摶扶勢應從橐籥中類詩作籥功開襟若有日願覩大王風清風戒寒前人蕭颯清風至悠然發思端入林翻别葉繞樹敗紅蘭曉拂輕霜度宵分逺籟攅稍依簾隙静遍覺座隅寒乍逐驚蓬振偏催急漏殘遥知洞庭水此夕起波瀾同前穆寂風清物候殘蕭灑報將寒掃得天衢静吹來眼界寛條鳴方有異蟲思亂無端就樹收鮮膩衝池起澁瀾過山嵐可掬度月色宜㸔華實從兹始何嗟嵗序殫冬至日祥風應候前人節逢清景空占氣二儀中獨善登䑓日先知應候風呈祥光舜化表慶感堯聦既一作况與乗時叶還將入律同㣲㣲萬井遍習習九門通更繞爐烟起殷勤報嵗功八風從律蔣防製律窺元化因聲感八風還從萬籟起更與五音同習習爐烟類詩作蘆灰上冷冷玉管中氣隨時物好響徹霽天空自得隂陽順能令惠澤通願吹寒谷裏從此逹前䝉春風扇㣲和公乗億咸通宏詞麗日催遲景和風扇早春暖浮丹鳯闕韶媚黒龍津澹蕩迎仙仗霏㣲送盡輪緑摇宫栁散紅待禁花新舞席潜廻雪歌筵暗起塵幸當陽候律一願及佳辰河出榮光張良器引𣲖崑山峻朝宗海路長千齡逢聖主五色瑞榮光隠映浮中國晶明助太陽坤維連浩漫天漢接㣲茫丹闕清氛裏凾闗紫氣旁位尊常守伯道㤗每呈祥習坎靈逾久居卑徳有常龍門如可渉忠信是舟梁同前失名符命自陶唐吾君應㑹昌千年清德水九折滿榮光極岸浮佳氣㣲波照夕陽澄輝明貝闕散彩入龍堂近帯闗雲紫遥連日道黄馮夷矜海若漢武貴宣房漸没孤槎影仍呈一葦杭撫躬悲未濟作頌喜時康洛出書蕭昕海内昔凋瘵天綱斯浡潏龜靈啓聖圖龍馬負書出大哉明德盛逺矣彛倫秩地敷作乂功人免為魚恤既彰千國理豈止百川溢永頼至于今疇庸未云畢同前郭邕德合天貺呈龍飛聖人作光宅被寰區圖書薦河洛象登四氣順文闢九疇錯氤氲瑞彩浮左右靈儀廓微造功不宰神行利攸慱一見皇家慶方知禹功薄同前張欽敬浮空九洛水瑞聖千年質竒象八卦分圖書九疇出含㣲卜筮逺抱數隂陽宻中得天地心傍探鬼神吉昔聞夏禹代今獻唐堯日謬此叙彛倫寰宇賀清謐同前叔孫元觀清洛含温溜𤣥龜薦寶書波開緑字出瑞應紫宸居物著羣靈首文成列卦初美珍翔閣鳯慶邁躍舟魚俾姒惟何逺休皇復在諸東都主人意歌頌望乗輿秋霽望廬山瀑布夏侯楚常思瀑布幽晴眺喜逢秋一帯連青嶂千尋倒碧流濕雲應悞鶴飜浪定驚鷗星浦虹初下爐峯煙未収巖高時褭褭天浄起悠悠儻見朝宗日還須濟巨舟涇渭揚清濁吕牧涇渭横秦野逶迤近帝城二渠通作潤萬户映皆清明晦看殊色潺湲聽一聲岸虚深草掩波動曉烟輕御獵思投釣漁歌好濯纓合流知禹力同共到滄瀛春水渌波朱休芳時淑氣和春水澹烟波滉瀁滋蘭杜淪漣長芰荷晩光扶翠㶑潭影瀉清莎歸鴈追飛盡纎鱗游泳多朝宗終到海潤下每盈科願假中流便從茲發棹歌四水合流李沛禹鑿山川地因通四水流縈廻過鳯闕㑹合出皇州天影長波裏寒聲占疑渡頭入河無書夜歸海有謙柔順物宜投石逢時可載舟羡魚猶未已臨水欲垂鈎海水不揚波失名明朝崇大道寰海免波揚既合千年聖能安百谷王天心隨澤廣水徳共靈長不撓魚彌樂無瀾葦可杭化流霑率土恩寖及殊方豈只朝宗國惟聞有越裳空水共澄鮮前人悠然四望通渺渺水無窮海鶴飛天際煙林出鏡中雲霄澄逺碧霞起澹微紅落日浮光滿遥山翠色同樵聲喧竹嶼棹唱入蓮藂逺客舟中興煩襟暫一空曲池潔寒流崔立之閒尋欹岸歩因向曲池㸔透底何澄澈廻流乍屈盤稍隨高樹古逈與逺天寒月入鏡華轉星臨珠影攅纎鱗時蔽石轉吹或生瀾願假㳙微效來濡拙筆端寒流聚細文失名曉野方閒眺横溪賞亂流寒文趨浦急圓折逐煙浮不似飄踈雨非闗浴逺鷗觀魚鱗共細間石影疑稠獵獵風冷夕潺潺瀬響秋仙槎如共泛天漢適淹留奉詔集作試漲曲江池鄭谷乾符丙申嵗春王澤尚通津恩波此日新深宜一夜雨逺集作宛似五湖春泛灎翹振鷺澄清躍紫鱗翠低孤集作葉低臨嶼栁香失半汀蘋鳯輦尋佳境龍舟命近臣桂華如入手願作從遊人昆明池石織女童翰卿又云司馬復一片昆池石千秋織女名象星何皎皎依水更盈盈苔作輕裾色波為促杼聲岸雲連鬢濕沙月對眉生有臉蓮同笑無心鳥不驚還如朝鏡裏形影兩分明濟川用舟檝胡權渺渺水連天歸程想幾千孤舟辭曲岸輕檝濟長川逈指波濤雪廻瞻島嶼煙心迷滄海上目斷白雲邊泛濫雖無定維持且自專還如聖明代理國用英賢天際識孤一作認歸舟薛能斜日滿江樓天涯照背流同人在何處逺目認孤舟㠶省當時席歌聞舊日謳人浮津濟晩棹泛泬寥秋晴闊欣全見歸遲恠久逰離居意無限貪此望難休文苑英華巻一百八十三
