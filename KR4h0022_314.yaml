body:
  text: 文苑英華卷三百十四宋李昉等編居處四閣四十首堂二十三首閣登州中新閣庾信跨虛陵倒景連雲拒少陽璇極龍鱗上雕甍鵬翅張千尋文杏照十里木蘭香開忩對髙掌平坐望河梁歌響開天樂鍾聲徹建章賦用王延夀書須韋仲將龍來隨畫壁鳳起逐吹簧石作芙蓉影池如明鏡光花梁反披葉蓮井倒垂房徒然思燕賀無以預鵾翔登宇文內史入重陽閣前人北原風雨散南宫容衛踈待詔還金馬儒林歸石渠徒懸仁夀鏡空聚茂陵書竹淚垂秋筍蓮衣落故蕖顧成始移廟陽陵正徙居舊蘭憔悴長殘花爛漫舒别有昭陽殿長悲故婕妤登禪定寺閣宋之問梵宇出三天登茲望八川開襟坐霄漢揮手拍雲煙函谷青山外昆明落日邉東京楊柳陌少别已經年使過襄陽登鳳林寺山閣前人香閣臨清漢丹梯隱翠微林篁天際密人世谷中違苔石銜仙洞蓮舟泊釣磯山雲浮棟起江雨入庭飛信美隨南國嚴程限北歸幽情不可再留步惜芳菲和崔侍御日用遊開化寺閣吳少微左憲多才雄故人尤鷙鶚護贈單于使休軺太原郭館次厭煩歊清懷尋寂寞西緣十里餘北上開花閣初入雲樹間冥蒙未昭廓漸出欄榥外萬里秋景焯嵗晏風落山天寒水歸壑覽物頌幽果至乘動玄鑰但敷利解言永用忘昏著嶽州九日宴道觀西閣張説搖落長年歎蹉跎逺宦心北風嘶代馬南浦宿陽禽住此黃花酌酣餘白首吟涼雲霾楚望濛雨蔽荆岑登眺思晴景誰將卷濁隂釣歌出江霧樵唱入山林魚以佳一作嘉名採木為美材侵大道由中悟逍遙匪外尋參佐多君子詞筆妙賞一作賞達音留題一作淹留洞庭觀望古意何深一作佳嵗時雜詠登總持寺閣張九齡香閣起崔嵬髙髙沙版開攀躋千仭上紛詭萬形來草間商君陌雲重漢后臺山從幽谷斷川向斗城回林裏春容變天邉客思催登臨信為美懷逺獨悠哉晚憩王少府東閣前人披軒肆流覽雲壑見深重空水秋彌淨林煙晚更濃座隅分洞浦簷際列羣峯窈窕生幽意參差多異容還慚大隱迹空想列仙蹤賴此升攀處蕭條得所從宿雲門寺閣孫逖香閣東山下煙花象外幽燃燈千嶂夕卷幔五湖秋畫壁飛鴻鴈紗忩宿斗牛更疑天路近夢與白雲遊西閣曝背集作日杜甫凛冽倦玄冬負暄嗜飛閣羲和流德澤顓頊愧倚薄毛髮具自私集作和肌膚潛沃若太陽信深仁衰氣歘有託欹傾煩注眼容易收病腳瀏漓木梢猿集作流離木杪翩翻集作仙山巔鶴明知苦聚散哀樂亦已昨集作日已作即事會賦詩人生忽如錯集作昨古來遭喪亂賢聖盡蕭索胡為將暮年憂世心力弱飛仙閣前人出集作土門山行窄微徑緣集作徑微上秋毫棧雲欄干峻梯石結構牢萬壑欹疏林積隂帶奔濤寒日外淡泊長風中怒號歇鞍在地底始覺所歷髙往來雜坐卧人馬同疲勞浮生有分定飢飽豈可逃歎息謂妻子我亦集作何隨汝曺龍門閣前人清江下龍門絶壁無尺上長風駕髙集作白浪浩浩自太古危途中縈盤集作縈盤道仰望垂線縷滑石欹誰鑿浮梁裊相拄目眩隕雜花頭風吹過集作過飛雨百年不敢料一墜那得取飽聞集作知經瞿唐足見度大庾終身歷艱險恐懼從此數登瓦官寺閣李賔晨登瓦官閣極眺金陵城鍾山對北户淮水入南榮漫漫雨花落嘈嘈天樂鳴兩廊振法鼓四角吹集作吟風筝杳出霄漢上仰攀日月行山空霸氣滅地古寒隂生寥廓雲海晚蒼茫宫觀平門餘閶闔字樓識鳳凰名雷作百川集作山動神扶萬拱傾靈光一向集作何足貴長此鎮吳京登巴陵開元寺西閣贈衡嶽僧方外前人衡嶽有開士五峯秀真骨見君萬里心海水照秋月大臣南溟去問道皆請謁酒以集作明非甘露言清涼潤肌髮湖海落天鏡香閣陵銀闕登眺餐惠風新花期啓發同皇甫冉登玄閣李嘉祐髙閣朱欄不厭遊蒹葭白水繞長洲孤雲獨鳥川光暮萬井千山海氣秋清梵林中人轉靜夕陽城上角偏愁誰堪逺作秦吳别離恨歸心雙淚流題鮑行軍小閣嚴維宇下無留事經營意獨新文房已得地相閣是推輪席上招賔急山隂對雪頻虛明先旦暮啓閉異冬春談笑兵家法逢迎幕府賔還將負暄處時借在隂人晚霽登王六東閣前人試上江樓望初逢山雨晴連空青嶂合向晚白雲生俊美要殊觀蕭條見逺情情來不可極日暮水流清登景雲寺閣張亢宗胡馬飲河洛我家從此遷今來獨垂淚三十六峯前晚霽登汝南大雲閣賈彥璋禪宫新雨歇香閣晚登臨邑樹晴光起川苖佳氣深水包城下岸雲細郢中岑自歎牽卑日聊開望逺心宿香山閣前人暝望香山閣梯雲宿半空軒忩閉潮海枕席拂煙虹朱網防棲鴿紗燈護夕蟲一聞雞唱曉已見日曈曈登聖善寺閣禇朝陽飛閣青雲裏先秋獨早涼天花散窗近月桂拂簷香華嶽三峯小黃河一帶長空聞指歸路煙處是垂楊和嚴長秋日登太原龍興寺閣野望歐陽詹百丈化城樓君登最上頭九霄坰棧路八到視并州煙火遺堯庶山河啓聖猷短垣齊介嶺片白指汾流清鐸中天籟哀鳴下界秋境間知道勝心逺見名浮豈念乘肥馬方應駕大牛自憐蓬逐吹不得與良遊和太原鄭中丞登龍興寺閣前人青忩朱户半天開極目凝神望幾回晉國頽墉生草樹皇家瑞氣在樓臺千條水入黃河去萬點山從紫塞來獨恨侍遊違長者不知髙意是誰陪登天宫閣白居易午時乘興出薄暮未能還髙上煙中閣平看雪後山委形羣動裏任性一生間洛下多間客其中我最間題宣州開元寺水閣杜牧六朝文物草連空天淡雲間今古同鳥去鳥來山色裏人歌人哭水聲中深秋簾幕千家雨落日樓臺一笛風惆悵無因逢范蠡參差煙樹五湖東天河閣到啼猿閣即事顧非熊萬壑褒中路何曾不駕虛濕雲和棧起燋枿帶餘畬疑作畬餘巖狖牽垂果湍禽接迸魚每逢維艇處塢裏有人居題天雲寺西閣薛能閣臨偏險寺當山獨坐西城笑滿顔四野有歌行路樂五營無戰射堂間鼙和調角秋空外砧辦征衣落照間方擬殺身酬聖主敢於髙處戀鄉關題開元寺閣前人一閣見一郡亂流仍亂山未能終日住尤愛暫時間唱棹吳門去啼林杜宇還髙僧不可羡西景掩揖疑關秋宿青龍禪閣李洞前山不可望暮色漸沉圭日轉須彌北蟾來渤澥西風林亂僧話霜枮疑欠猿啼閣外千家夢分明見裏迷湖閣李羣玉楚色籠秋草秋光洗洞庭夕霏生水寺初月落集作盡雲汀棹響來空濶漁歌去集作發杳𡨕欲浮欄下艇一到斗牛星題宣州開元寺閣張喬誰家煙徑長莓苔金碧虛欄竹上開流水逺分山色斷清猿時帶角聲來六朝明月唯詩在三楚空山有鴈回達理始應盡疑惆悵僧間應得話天台回鑾閣寫望前人古閣上空半寥寥千里心多年為客路盡日倚欄吟微疑壓秦川重深來虜塞心疑回鑾今不見煙霧杳沉沉滕王閣寫望前人創來人世殊幾度繞汀盧一作盧疊浪有時有間雲無日無早涼先燕去返照後帆孤未得榮歸計菱歌滿舊湖登寶歷寺閣陳陶金碧髙層世界空憑霓長嘯八蠻風橫軒水壯蛟龍府倚棟星開牛斗宫三楚故墟殘景北六朝荒苑斷山東不堪懷古勞悲笑安得鵬摶皓氣中和西江一作江南李助副使早登開元寺閣前人虛豁登寶閣三休極層構獨立天地間煙雲滿襟袖鼇荒初落日劔野呈綺繡愁檻祝融微隂軒九江湊拂簷皇姑舍錯落白榆秀倚砌天竺祠蛟龍蟠古甃翛然觀六合一指齊宇宙書劔忽若闕青雲日方晝南朝空蒼莾楚澤稀耕耨萬事溺頽波一航安可涭疑徒云寄麟泣六五終難就資斧念徐生湖光隱圭竇早聞羣黃鶴飄舉此江岫陵谷空藹然人樵已雛􅑹燕宫豸冠客憑覽發清奏珠玉難嗣音摐轅愧孤陋夏月題逺公北閣羅鄴危閣壓山岡晴空疑鳥行勝搜花界盡響益梵音長有月堪先到無風亦自涼人煙紛繞繞諸疑樹共蒼蒼榻戀髙樓語甌憐晝茗香此身間未得驅馬入殘陽登瓦官寺閣羅隱下盤空迹上雲浮偶逐僧行步步愁暫憩已知須用意漸危爭忍不回頭煙中樹老重江晚鐸外風輕四境秋懶指臺城更東望鵲飛龍闕盡荒邱揚州集作廣陵開元寺閣上作前人滿檻山川漾落暉檻前前事去如飛雲中雞犬劉安過月裏笙歌煬帝歸江蹙海門帆散去地吞淮口樹相依紅樓翠幕知多少長向東風有是非滕王閣春日晚晀曹松陵春帝子閣偶眺日移西浪勢平花塢帆隂上桞堤凝嵐藏宿翼疊鼓碎歸蹄只此長吟詠因髙思不迷題昭州山寺常寂上人水閣前人常寂常居常寂裏年年月月是空空階前未放巖根斷屋下長教海眼通本為入來尋佛窟不期行處踏龍宫他時憶著堪圖畫一朵雲山二水中堂疏圃堂庾肩吾北宫多暇豫時駕總鸞鑣路靜繁莈撒輪移羽蓋飄臨空坐飛觀回首望浮橋風長曙鍾近地逈初學記作逺洛城遙疏林不礙目初學記作日涸浦暫通潮徒然等賔從並作愧羣僚文翁講堂盧照鄰錦里淹中館岷山稷下亭空梁無燕雀古壁有丹青槐落猶疑市苔深不辨銘良哉二千石江漢表遺靈酬楊比部員外暮宿琴堂朝躋書閣率爾見贈之作王維舊簡拂塵看鳴琴俟集作候月彈桃源迷漢姓松樹有秦官空谷歸人少青山背日寒羡君棲隱處遙望白雲端草堂杜甫昔我去草堂蠻夷塞城都今我歸草堂此集作成都適一作此無虞請陳初亂時反覆乃須臾集作斯須大將赴朝廷羣小起異圖中宵斬白馬盟歃氣已粗西取卭南兵北斷劒閣隅布衣數十人亦擁專城居其勢不兩大始聞藩漢殊西卒却倒戈集作倒干戈賊臣互相誅焉知肘腋禍自及梟獍徒義士猶集作皆痛憤紀綱亂相踰一國實三公萬人集作民欲為魚唱和作威福孰肯辨無辜眼前列杻械背後吹笙竽談笑行殺戮血流集作濺血滿長衢到今用越地風雨聞號呼鬼集作人妾與鬼馬色悲充爾娛國家法令在此又足驚吁賤子且奔走三年望東吳弧矢暗江海難為遊五湖不忍竟捨此復來剃榛蕪入門四松在步屧集作堞萬竹踈舊犬喜我歸低徊入衣裾鄰舍喜我歸酤酒提葫蘆集作携榼壺大官知集作喜我來遣騎問所須城郭知集作喜我來賔客隘集作溢村墟天下方集作尚未寧健兒勝腐儒飄颻集作飄飄塵埃集作風塵際何地置老夫於時是疣贅骨髓幸未枯飲啄愧殘生食薇不敢餘終南山雙峯草堂作岑參歐路集作迹歸山田偃息集作息心謝時輩晝還草堂卧但以集作與雙峯對興來恣佳遊事愜符勝槩著書髙忩下日夕見城內曩為世人誤遂負平生愛久與林壑辭及來杉松大偶茲精廬近屢得集作數預名僧會有時逐樵漁集作漁樵盡日不冠帶崖口上新月石門破蒼藹色向羣木深花搖一潭碎緬懷鄭生谷頗憶嚴子瀨勝事猶可追斯人邈千載裴六書堂王昌齡間堂閉空音一作隂竹林但清響忩下長嘯客區中無遺想經綸精微言兼濟當獨往過橫山顧山人草堂劉長卿秪見山相掩誰言路尚通人來千嶂外犬吠百花中細草香帶雨垂楊間自風却尋樵徑去惆悵緑溪東題王十九茅屋李嘉祐滿庭多種藥人里作山家終日能留客凌寒亦對花海鷗過竹嶼門桞拂江沙知爾卑棲意題詩美白華題武陵草堂楊浚草堂列仙樓上在青山頂户外窺數峯階前對雙井雨來花盡濕風度松初冷登棧行不疲入溪語彌靜本能去塵服兼欲事金鼎正直心所存諂諛長自省適知幽遁趣已覺煩慮屛更愛雲林間吾將卧南潁題鄭拾遺草堂韋應物借地建集作結茅棟橫竹挂朝衣秋園雨中緑幽居塵事違隂集作涼井夕蟲亂髙林霜果稀子有白雲意構此想巖扉湖南草堂讀書招李少府釋皎然削去僧中事南池便隱居為憐松子夀還卜道家書藥院常無客茶樽獨對余有時招送吏來飯野中蔬過趙居士擬置草堂處所王建休師竹林北空可兩三間雖愛獨居好終來相伴間猶嫌近前樹為好看南山的有深耕處春初須早還錢侍郎使君以題廬山草堂詩見示因以戲集作酬之之見二百五十八卷題别遺愛草堂兼呈李十使君李十亦嘗隱廬山白鹿洞前人曾住爐峯下書堂對藥臺斬新蘿徑合依舊竹忩開砌水親看決池荷手自栽五年方暫至一宿又須回縱未長歸得猶勝不到來君家白鹿洞聞道亦生苔冬夜宴河東李相公堂命笙歌送酒見二百十六卷劉禹錫後梁宣明二帝碑堂下作玉馬朝周從此辭園陵寂寞對豐碑千行宰樹荆州道暮雨蕭蕭聞子規尋隱者常九山人東溪草堂朱灣尋集作窮得仙源訪隱淪漸來深處漸無塵初行竹裏唯通馬直到花間始見人四面雲山誰作主數家煙火自為鄰路傍樵客何須問朝市如今不是秦李常侍書堂釋無可結構因墳籍簷前竹未生塗鉛忩日早閲槧幌風輕息架蛩驚客垂燈雨過城已應窮古史師律孰齊名和厲元侍御題户部相公廬山草堂劉得仁白雲居創畢詔入鳳池年林長雙峯樹潭分並寺泉石溪盤鶴外嶽室閉猿前柱史題詩後松門更肅然草堂趙嘏練江橫在草堂前楊柳洲西載酒船兩見梨花歸不得每逢雲鳥即依然斜陽映閣山當寺微緑含風月滿川同羣故人攀桂盡把詩吟向寂寥天老圃堂薛能邵平瓜地接吾廬榖雨乾時偶自鋤昨夜春風欺不在就牀吹落讀殘書題友人草堂張喬空山卜隱初生計亦無餘三畝水邉竹一牀琴畔書深林收晚果絶頂拾秋蔬堅話長如此何年獻子虛王先輩草堂陸龜蒙松徑雲隈到靜堂杏花臨澗水流香身從亂後全家隱日校人間一倍長金緑疑作籙漸加新品秩玉皇偏賜羽衣裳何如聖代彈冠出方朔曾為漢侍郎文苑英華卷三百十四
