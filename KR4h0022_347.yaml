body:
  text: 文苑英華卷三百四十七宋李昉等編服用鏡五首劔六首刀子三首屏二首枕二首靈臺家兄古鏡歌薛逢一尺圓潭深墨色篆文如絲人不識耕夫云住赫連城赫連城下親耕得鏡上磨瑩一月餘日中漸見菱花舒金膏洗拭鉎澀盡黑雲吐出新蟾蜍人言此是千年物百鬼聞之形暗栗玉匣曽經龍照來豈宜更鑒農夫質有時霹靂半夜驚忩中飛電如晦明盤龍鱗脹玉匣溢牙爪觸風時有聲耕夫不解珍靈異翻懼赫連神作祟十千賣與靈臺兄百丈靈湫坐中至溢匣水色如玉傾兒童不敢窺泓澄寒光照人近不得坐愁雷電湫中生吾兄吾兄須愛惜將來慎勿虛拋擲興雲致雨會有時莫遣紅粧穢靈迹百錬鏡白居易百錬鏡一本疊此三字鎔範非常規日辰置處靈且寄集作處所靈且祗非江心波上舟中鑄五月五日日午時瓊粉金膏磨瑩已化為一片秋潭水鏡成將獻蓬萊宫揚州長史手自封人間臣妾不敢照背有九五飛天龍人人呼為天子鏡我有一言聞太宗太宗常以人為鏡鑒集作覽古鑒今不鑒容四海安危居掌內百王理亂懸心中乃知天子别有鏡不是揚州百錬銅摩鏡篇劉禹錫流塵翳明鏡嵗久看如漆門前負局生為我一摩拂萍開緑池滿暈盡金波溢白日照空心圓光走幽室山神妖氣沮野獸集作魁真形出却思未摩時瓦礫來唐突昏鏡詞前人鏡之工列十鏡于賈奩發奩而視其一皎如其九霧如或曰良苦之不侔甚矣工解頥謝曰非不能盡良也蓋賈之意唯售是念今夫來市者必厯鑒集作覽周睞求與已冝彼皎者不能隱芒杪之瑕非美容不合是用什一其數也余感之作昏鏡之詞詞曰昏鏡非美金漠然喪其晶陋容多自欺謂若他鏡明瑕疵既不見妍態隨意生一日四五照自言美傾城飭帶以紋繡裝匣以瓊瑛秦宫豈不重非適乃為輕古鏡篇陳陶一作濤紫皇玉鏡蟾蜍字墮地千年光不死發匣身沉古井寒懸臺日照愁成水海户山忩幾梳綰菱花開落何人見野老曽耕疑太白星辰孤夜哭秋天片下國青銅旋磨滅回鸞萬影成枯骨會待摶風雨沉寥長恐莓苔蝕明月寶劔篇李嶠吳山開越溪涸三金合冶成寶鍔淬緑水鑒紅雲五采焰起光氛氲背上銘為萬年字胸中點作七星文龜甲參差白蛇色轆轤宛轉黃金飾文犀中斷寧方利駿馬羣騑未擬直風霜凛凛匣上清精氣遙遙斗間明避災朝穿晉帝屋逃亂夜入楚王城一朝運偶逄大􅋖虎吼龍鳴騰上天東皇提升紫微座西王佩下赤城田承平久息干戈事僥幸得充文武備除災辟患冝君王益夀延齡後天地古劔歌郭元振君不見昆吾鐵冶飛炎煙紅光紫氣俱赫然良工煆錬經文粹作凡幾年鑄得寶劔名龍泉龍泉顏色如霜雪良工咨嗟歎竒絶琉璃玉匣吐蓮花錯􅍢金環生明月正逄天下無風塵幸得周防君子身精光黯黯青蛇色文章片片緑龜鱗非直結交遊俠子亦常文粹作曽親近英雄人何言中路遭棄捐零落漂淪古獄邉雖復沉埋無所用猶能夜夜氣衝天仗劔行萬齊融昨夜星宫動紫微今年天子用武威登車一呼風雷動遙振隂山撼巍巍胡驕子當見旄頭蝕應死願騎單馬仗天威挼取長繩縛虜歸仗劔遙叱路傍子胸奴頭血濺君衣春坊正字劔子歌李賀先輩匣中三尺水曽入吳江集作潭斬龍子隙月斜明刮露寒練帶平鋪吹不起蛟螭老皮集作蛟胎皮老蒺藜刺鸊鵜淬花白鷴尾真集作直是荆軻一片心莫教一作分明照見春坊字挼絲團金懸䍡􅝹神光欲截藍田玉提出西方白帝驚嗷嗷鬼姥集作母秋郊哭鴉九劔白居易歐冶子死千年後精靈暗授張鴉九鴉九鑄劔吳山中天與日時神借功金鐵騰光集作精火翻熖踊躍求為莫耶劔劔成未試十餘年有客持金買一觀誰知閉匣長思用三尺青蛇不肯蟠客有心兮劔無口客代劔言報集作告鴉九君勿矜我玉可切君勿誇我鍾可刜不如持我決浮雲無令漫漫蔽白日為君使無私之光及萬物蟄蟲昭蘇萌芽出古劔行韋應物千年土中兩刃鐵土蝕不入金星滅沉沉青劔鱗甲滿蛟龍無足蛇尾斷忽欲動時中有靈豪士得之敵國寶仇家有集作舉意半夜鳴小兒女子不敢集作可近龍蛇變化此中隱夏雲奔走雷闐闐恐成霹靂飛上天難綰刀子歌盧綸黃金鞘裏青蘆葉麗若剪成銛且捷集作翣輕氷薄玉狀不分一尺寒光堪決雲吹毛可試不可觸似有蟲鎪缺裂文淬之幾墜前池水焉知不是蛟龍子割雞刺虎皆苦空願應君心遂君指并州難綰竟何人每成此物如有神割飛二刀子歌前人我家有剪刀人云鬼國鐵裁羅裁綺無純時用來三年一股折南中匠人淳用鋼再令盤屈隨手傷改煆割飛二刀子色迎霽雪鋒含霜兩條神物秋氷薄刃淬初蟾鞘金稍越戟吳鈎不足誇斬犀切玉應懷怍日試曽磨漢水邉掌中恄慓聲冷然神驚魄悸却收得刃頭已吐微微煙刀乎刀乎何燁燁魑魅須藏怪須懾若非良工變爾形只向裁縫委箱篋寇季膺古刀歌韋應物古刀寒鋒青摵摵少年結交平陵客求之時一作年代不可知千痕萬冗如星離重疊泥沙更剝落縱橫鱗甲相參差古物有靈知所適貂裘拂之橫廣席隂森白日掩雲虹錯落池光動金碧知君寶此誇絶代求之不得心常愛厭見今時繞指柔片鋒拆刃猶堪佩髙山成谷滄海填英豪埋沒誰所捐吳鈎斷焉不知處幾度煙塵今獨全夜光投人人不畏知君獨識精靈器酬恩結思心自知死生好惡不相棄白虎司秋金氣清髙天寥落雲峥嶸月肅風凄古堂淨精芒切切如有聲何不跨蓬萊斬長鯨世人所好殊遼闊千金買鉛徒一割素屏謡白居易素屏素屏孰為乎不文不飾不丹不青當世豈無李陽氷之篆文張旭之筆迹邉鸞之花鳥張藻之松石吾不令加一點一畫於其上欲爾保真而全白吾於香爐峯下置草堂二屏倚在東西墻夜如明月入我室曉如白雲圍我牀我心久養浩然氣亦欲與汝表裏相輝光爾不見當今侯家主三字集作甲第與王宫織成步障銀屏風綴珠陷鈿貼雲母五金七寶相玲瓏貴豪待此方悅目晏然寢卧乎其中素屏素屏物各有所冝用各有所施爾今木為骨兮紙為面捨我草堂欲何之屏風曲李賀蝶棲石竹銀交關水凝鴨緑琉璃錢周廽六曲抱銀集作膏蘭解集作將鬟鏡上擲金蟬沉香水集作火暖茱萸煙酒餘集作觥綰帶新承歡月風吹露屏外寒城上烏啼楚女眠花石長枕歌答章居士釋皎然楚山有石郢人琢琢成長枕知是玉全疑氷片睡恐銷間發花叢驚不足贈豫比之金琅玕瓊花爛爛浮席端吾師遣吾不執寶今日感君因執看試叩鏗然應清律纎塵不留蠅敢拂萬物皆因造化資如何獨負清貞質南山有雲鵠在空長松為我生涼風髙支抱詠樂其中行住四儀皆道意不覺小乘西竺一作曲士唯將此物安坐隅取次間眠有禪味桃花石枕歌贈康疑從事前人卞山幽石産竒璞荆人至死採不著何人琢枕持贈君片片桃花開未落劔工見兮可為劔玉工辨兮知非石至寶由來鑒者稀今君獨鑒應欲惜何辭售與韋疑天真幸得提携親玉人河中棄置君不顧天生秀色徒璘玢四座喧喧爭自悗巧過造化稱一絶莫言昨日因錯磨看取從來無玷缺六月江南暑未闌一尺花氷試枕看髙忩正午風颯變室中不減春天寒主人所重重枕德文章外飾徒相惑更有堅真不易心與君天下為士則文苑英華卷三百四十七
