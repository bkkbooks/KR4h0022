body:
  text: 文苑英華巻三百四十七宋李昉等編服用鏡五首劔六首刀子三首屏二首枕二首靈䑓家兄古鏡歌薛逢一尺圓潭深墨色篆文如絲人不識耕夫云住赫連城赫連城下親耕得鏡上磨瑩一月餘日中漸見菱花舒金膏洗拭鉎澁盡黒雲吐出新蟾蜍人言此是千年物百鬼聞之形暗慄玉匣曽經龍照來豈宜更鍳農夫質有時霹靂半夜驚忩中飛電如晦明盤龍鱗脹玉匣溢牙爪觸風時有聲耕夫不觧珍靈異翻懼赫連神作祟十千賣與靈䑓兄百丈靈湫坐中至溢匣水色如玉傾児童不敢窺泓澄寒光照人近不得坐愁雷電湫中生吾兄吾兄湏愛惜將來慎勿虛抛擲興雲致雨㑹有時莫遣紅粧穢靈跡百錬鏡白居易百錬鏡一本疊此三字鎔範非常規日辰置處靈且寄集作處所靈且祗非江心波上舟中鑄五月五日日午時瓊粉金膏磨瑩已化為一片秋潭水鏡成將獻蓬萊宫揚州長史手自封人間臣妾不敢照背有九五飛天龍人人呼為天子鏡我有一言聞太宗太宗常以人為鏡鍳集作覧古鍳今不鍳容四海安危居掌内百王理亂懸心中乃知天子别有鏡不是揚州百錬銅摩鏡篇劉禹錫流塵翳明鏡嵗久㸔如漆門前負局生為我一摩拂萍開緑池滿暈盡金波溢白日照空心圓光走幽室山神妖氣沮野獸集作魁真形出却思未摩時瓦礫來唐突昏鏡詞前人鏡之工列十鏡于賈奩發奩而視其一皎如其九霧如或曰良苦之不侔甚矣工觧頥謝曰非不能盡良也盖賈之意唯售是念今夫來市者必厯鍳集作覧周睞求與已冝彼皎者不能隠芒杪之瑕非美容不合是用什一其数也余感之作昏鏡之詞詞曰昏鏡非美金漠然䘮其晶陋容多自欺謂若他鏡明瑕疵既不見妍態隨意生一日四五照自言羙傾城飭帶以紋繡装匣以瓊瑛秦宫豈不重非適乃為輕古鏡篇陳陶一作濤紫皇玉鏡蟾蜍字堕地千年光不死發匣身沉古井寒懸䑓日照愁成水海户山忩㡬梳綰菱花開落何人見野老曽耕疑太白星辰孤夜哭秋天片下國青銅旋磨滅廻鸞萬影成枯骨㑹待摶風雨沉寥長恐莓苔蝕明月寳劔篇李嶠呉山開越溪涸三金合冶成寳鍔淬緑水鍳紅雲五采燄起光氛氲背上銘為萬年字胷中㸃作七星文龜甲參差白蛇色轆轤宛轉黄金飾文犀中斷寕方利駿馬羣騑未擬直風霜凛凛匣上清精氣遥遥斗間明避災朝穿晉帝屋逃亂夜入楚王城一朝運偶逄大􅋖虎吼龍鳴騰上天東皇提昇紫㣲座西王佩下赤城田承平乆息干戈事僥倖得充文武備除災辟患冝君王益夀延齡後天地古劔歌郭元振君不見昆吾鐵冶飛炎煙紅光紫氣俱赫然良工鍜錬經文粹作凡㡬年鑄得寳劔名龍泉龍泉顏色如霜雪良工咨嗟歎竒絶瑠璃玉匣吐蓮花錯􅍢金環生明月正逄天下無風塵幸得周防君子身精光黯黯青蛇色文章片片緑龜鱗非直結交游俠子亦常文粹作曽親近英雄人何言中路遭棄捐零落漂淪古獄邉雖復沉埋無所用猶能夜夜氣衝天仗劔行萬齊融昨夜星宫動紫㣲今年天子用武威登車一呼風雷動遥振隂山撼巍巍胡驕子當見旄頭蝕應死願騎单馬仗天威挼取長繩縛虜歸仗劔遥叱路傍子匈奴頭血濺君衣春坊正字劔子歌李賀先軰匣中三尺水曽入呉江集作潭斬龍子隙月斜明刮露寒練帯平鋪吹不起蛟螭老皮集作蛟胎皮老蒺藜刺鸊鵜淬花白鷴尾真集作直是荆軻一片心莫教一作分明照見春坊字挼絲團金懸䍡􅝹神光欲截藍田玉提出西方白帝驚嗷嗷鬼姥集作母秋郊哭鵶九劔白居易歐冶子死千年後精靈暗授張鵶九鵶九鑄劔呉山中天與日時神借功金鐵騰光集作精火翻熖踊躍求為莫耶劔劔成未試十餘年有客持金買一觀誰知閉匣長思用三尺青蛇不肯蟠客有心兮劔無口客代劔言報集作告鵶九君勿矜我玉可切君勿誇我鍾可刜不如持我決浮雲無令漫漫蔽白日為君使無私之光及萬物蟄蟲昭蘇萌芽出古劔行韋應物千年土中两刄鐵土蝕不入金星滅沉沉青劔鱗甲滿蛟龍無足蛇尾斷忽欲動時中有靈豪士得之敵國寳仇家有集作舉意半夜鳴小児女子不敢集作可近龍蛇變化此中隠夏雲奔走雷闐闐恐成霹靂飛上天難綰刀子歌盧綸黄金鞘裏青蘆葉䴡若剪成銛且㨗集作翣輕氷薄玉状不分一尺寒光堪决雲吹毛可試不可觸似有蟲鎪缺裂文淬之幾墜前池水焉知不是蛟龍子割鷄刺虎皆苦空願應君心遂君指并州難綰竟何人毎成此物如有神割飛二刀子歌前人我家有剪刀人云鬼國鐵裁羅裁綺無純時用來三年一股折南中匠人淳用鋼再令盤屈随手傷改鍜割飛二刀子色迎霽雪鋒含霜两條神物秋氷薄刃淬初蟾鞘金稍越㦸呉鈎不足誇斬犀切玉應懐怍日試曽磨漢水邉掌中恄慓聲冷然神驚魄悸却收得刄頭已吐㣲㣲煙刀乎刀乎何燁燁魑魅湏藏恠湏懾若非良工變爾形只向裁縫委箱篋㓂季膺古刀歌韋應物古刀寒鋒青摵摵少年結交平陵客求之時一作年代不可知千痕萬宂如星離重疊泥沙更剥落縱横鱗甲相參差古物有靈知所適貂裘拂之横廣席隂森白日掩雲虹錯落池光動金碧知君寳此誇絶代求之不得心常愛厭見今時繞指柔片鋒拆刃猶堪佩髙山成谷滄海填英豪埋沒誰所捐呉鈎斷焉不知處幾度煙塵今獨全夜光投人人不畏知君獨識精靈器酧恩結思心自知死生好惡不相棄白虎司秋金氣清髙天寥落雲峥嶸月肅風凄古堂净精芒切切如有聲何不跨蓬萊斬長鯨世人所好殊遼闊千金買鉛徒一割素屏謡白居易素屏素屏孰為乎不文不飾不丹不青當世豈無李陽氷之篆文張旭之筆跡邉鸞之花鳥張藻之松石吾不令加一㸃一畫於其上欲爾保真而全白吾於香爐峯下置草堂二屏倚在東西墻夜如明月入我室曉如白雲圍我牀我心乆養浩然氣亦欲與汝表裏相輝光爾不見當今侯家主三字集作甲第與王宫織成歩障銀屏風綴珠䧟鈿貼雲母五金七寳相玲瓏貴豪待此方悦目晏然寢卧乎其中素屏素屏物各有所冝用各有所施爾今木為骨兮紙為面捨我草堂欲何之屏風曲李賀蝶棲石竹銀交闗水凝鴨緑瑠璃錢周廽六曲抱銀集作膏蘭觧集作將鬟鏡上擲金蟬沉香水集作火暖茱萸煙酒餘集作觥綰帯新承歡月風吹露屏外寒城上烏啼楚女眠花石長枕歌荅章居士釋皎然楚山有石郢人琢琢成長枕知是玉全疑氷片睡恐銷間發花叢驚不足贈予比之金琅玕瓊花爛爛浮席端吾師遣吾不執寳今日感君因執㸔試叩鏗然應清律纎塵不留蝇敢拂萬物皆因造化資如何獨負清貞質南山有雲鵠在空長松為我生凉風髙支抱詠樂其中行住四儀皆道意不覺小乘西竺一作曲士唯將此物安坐隅取次閒眠有禪味桃花石枕歌贈康疑從事前人卞山幽石産竒璞荆人至死採不着何人琢枕持贈君片片桃花開未落劔工見兮可為劔玉工辨兮知非石至寳由來鍳者稀今君獨鍳應欲惜何辭售與韋疑天真幸得提携親玉人河中棄置君不顧天生秀色徒璘玢四座喧喧争自悗巧過造化稱一絶莫言昨日因錯磨㸔取從來無玷缺六月江南暑未䦨一尺花氷試枕㸔髙忩正午風颯變室中不减春天寒主人所重重枕徳文章外飾徒相惑更有堅真不易心與君天下為士則文苑英華巻三百四十七
