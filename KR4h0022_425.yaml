body:
  text: 文苑英華卷四百二十五宋李昉等編赦書六禋祀赦書二天寶三載親祭九宫壇大赦制孫逖門下九宫之祀百代莫修豈日給之不暇將明靈之有待朕當扆君臨握圖纘業每聼政中昃疇咨讜言觀書乙夜以求故實勵精為理三紀于兹上荷宗廟延祥克開厥後下賴股肱叶德以致雍熙而麟鳳龜龍近遊郊藪蠻夷戎狄逺輸賝賮乘時年一作來之休運恢皇王之逺圖是以圓丘方澤之儀升中告類之禮靡一作無典不舉靡神不懷恭惟九宫明祀尚闕載深兢愓用建靈壇爰以元辰親執奠獻叶青陽一作春發生之慶祈黔庶吉祐之福今至誠式展大禮云僃瑞景和風神心如答則無疆之祉豈獨在豫非常之澤宜覃率土可大赦天下自天寶三載十二月二十五日昧爽已前大辟罪已下罪無輕重咸赦除之其十惡死罪造僞頭首謀殺攻劫及官典犯贓不在免限朕惟善政實在飬人作法務從於寬簡任事必量於齒力比者成童之嵗即掛輕徭既冠之年當便正役憫其勞苦用軫豫懷自從以後天下百姓以十八已上為中男二十三已上成丁又任土作貢先標程式或非所有不免貿遷事既非宜理難經久并應徵課稅及支遣諸色物或期程之間遲速一作違非便並委所司與朝集使商量取便穩處奏置聞實録載赦文云每嵗庸調八月徵收農功未畢恐難濟辦自今已後延至九月三十日為限諸軍行人逺為邉捍修短之分雖有定期役從而終良深軫念其有陳亡及在軍亡歿骸骨未還鄉貫者宜令節度使給棺櫬遞歸又防邉禦冦實為艱勞貧户單丁固兹疑存飬更令差遣去住難堪自今已後應差行人家無兼丁不在取限自古聖人皆以孝理五常之本百行莫先移於國而為忠事於長而為順永言要道實在𢎞人自今已後令天下家藏孝經一本精勤誦習鄉學之中倍增教授郡縣官長明申勸課百姓間有孝行過人鄉閭欽伏者所由長官具以名薦其有父兄見在别籍異居虧敗名教莫斯為甚特宜禁絶勿使更然并親殁之後亦不得令有分析郡縣切勒令在惟行自今已後如有不友不恭傷財破産者宜配磧西用清風教朕惟熙庶績慱訪逸人豈唯振拔滯淹以期於大用亦欲褒崇高尚將敦於薄俗虛佇之懷兼在於此其有髙蹈一作道不仕遁跡丘園逺近知聞未經薦舉者委所在長官以禮徵送又崇德追逺式閭封墓用旌前烈以叶大猷自古聖帝明王名臣烈士陵墓有頺毁者宜令所𬋩一作掌量事修葺仍明立標記禁止樵採天下侍老百嵗已上賜帛五假粟三石八十已上帛三假粟二石仍於郡縣長官存問給付亞獻太子諱宜賜物二千匹終獻慶王琮一千匹正衣夾侍各五百匹親王各三百匹新封建郡王及國公各一百匹賢妃三百匹長公主各三百匹公主各二百匹嗣郡王各一百匹中書門下三品竭心翊戴𢎞益實多各與一子官如先已授官量與一人轉內外文武官三品已上賜爵一級四品已下各加一階一品賜物七十匹三品已上六十匹五品已上四十匹六品已下二十假諸節度使各賜物一百匹三京留守及二王後各八十匹採訪使各六十匹諸蕃客共賜二千匹其唐元功臣締構之初竭其忠欵録功念舊情所不忘普恩之外更賜一作加一階其身歿者各贈一官皇親五等已上及九廟子孫諸親三等已上未有出身者並放出身其前資者選日稍優與處分見任者更賜勳兩轉應天下賜酺三日赦書有所未該者所司類例聞奏宣布中外咸使知聞主者施行一作皆唐大詔令天寶六載南郊赦內制門下昭事昊穹必惟禋祀蓋順帝則而成政也肅雍清廟必惟嚴享一作必嚴大享蓋繼先志一作蓋叶先心而為孝也則纍聖之德在人元陽之氣在候所以達明靈之景貺迪皇王之大一作徽猷者矣朕夕惕宵衣奉天纘業勉思政道惟懷永圖賴百一作列辟庶官匡豫不逮聲朔及逺車書靡殊加以乾符坤珍日來月至感福應之尤盛懼明祠之未殷且資父事天因一作自親設教洽情以達禮廣敬以推尊時享之誠寧宜異數日舉之饋豈忘事生是用革故鼎新禮物對越上靈聿追嚴配既而崇牙宿設明德惟馨敬爾臣工駿奔執豆陟降至止一作陟丘止樂樂遍禮成精意上升神休下答宜廣維祺之福以覃作解之恩天寶十載南郊赦門下皇天眷命必順於五行哲后御時實遵於三統考古之道何莫由斯朕欽若上靈一作𤣥嗣守丕業察璿衡以齊政念稼穡以勸人日慎一日四十載于兹矣何嘗不夙夜懼畏憂勞在懷思共黎元臻夫至理幸以刑清俗阜天成地平萬方底寧群物咸遂雖慙大化且謂小康此皆至道儲祉宗社敷祐豈豫薄德一作凉德而克致焉然則上稽厯象傍採輿議爰以土德承漢火行是慿大易之辭用紹前王之烈禎祥纍應正閏攸分不改舊章惟新景命一作違屬獻嵗初吉乘時布和是用展禮一作祀崇禋竭誠昭布一作報庶叶發生之序載覃雷雨之祥一作澤一作皆唐大詔令景龍三年十一月二十三日拜南郊制內制門下朕聞展禮禘祖昊穹著其成命就陰即陽經一作墳典明其大節故豺獺有祭下不隔於微品犧牲畢陳上以先一作老於嚴配軒皇用事則雍旁正祠漢帝潔齊則城南七里用一作固能使敬而不黷求而不匱祈穀則九載可登焚柴則三載無闕是知上靈大德不私於亭毒之仁正直聰明有感於馨香之荐瞻高欲語無易兹道我高祖神堯皇帝開階立隧一作極配永循機太宗文武聖皇帝仗金策而清四方運璇機而齊七政髙宗天皇大帝與乾坤合其德與日月合其明則天大聖皇后建補天立極之功受河圖洛書之統五精歸運四葉重光朕䖍順樂推欽承眷命紹宏基於纍聖日慎斯兢執大象於群生夙興如勵逺人殊俗占風而起一作集蠻邸美瑞休符繫月而揮一作輝史筆故得三邉靜柝五兵銷刃寰宇大寧人神式序而德慙被物誠謝動天水旱尚臻陰陽猶舛永以憂懼一作易無忘鑒寐然則事天事地莫盛乎禋祀弗躬弗親孰申乎誠敬朕自臨四海于今五年幸承祧社之靈未展郊丘之謁方今朔風候律南至一作晷登辰乘上日而恭饗奉髙禋而肅事揚宗祖之休命酌壇場之令典百神受職三才合契備殷薦之容行昭報之禮豈惟靈光所燭但驗其徵方兾後先不違實受其福至若五刑之屬十惡為重自頃恩赦罕聞該及朕以眇身膺乎大寶下人不足每切如子之傷上帝所臨敢逃在豫之責閒居三月未弭厥愆靜念終朝載增寅畏侑神伊始與物惟新用𢎞曠蕩之恩以答高明之貺可大赦天下云云一作皆唐大詔令祠后土制內制門下朕聞大事在祀禮極于郊丘大德曰生道存乎赦宥故至誠斯感允接神明之休盛典聿修必敷雷雨之施古先帝代躬祀后土所以崇兼載之功配博臨之義有虞氏之合禘遍于山川成周氏之從祀逮于林澤西漢汾陰之睢東洛翠媯之禪雖制無休備而道有可觀曹馬以還𢾗百餘制無載蓋設儀而不服或誠信而未孚有其廢祀莫之能舉我國家受命也承百王之季啓三統之元髙祖神堯皇帝膺録授圖繼天立極太宗文武皇帝弔人伐罪南征北怨是用拯生靈於塗炭登物態於休和高宗天皇大帝維睿作聖垂衣而理大聖天后受闕托從權當寧化治中宗孝和皇帝允恭克讓守文御㝢能致刑措於變時雍朕以眇身恭荷丕構常恐政理乖中風雨愆期惕慮周於萬方疚懷深於一物幸乾坤交泰宗社降靈氣無疵癘之災物遂生成之性呼韓慕化侍子趨庭月支請職名王入貢大荒同軌瀛海無波俯循凉德載懷寅畏故以嵗首肅事禋宗爰撰令辰親祀方澤採黃圖之舊制定纍朝之前基神地取則於禮經宥密同規於詩頌三祖登配群望畢從咸池之舞在列合鍾之管斯陳祥風入候當乎八變之殷瑞日揚暉屬乎三獻之始臣工助而胥悅兆庶觀以相趨精誠克申感慶交集頃緣郊籍已肆眚灾貸宥之道未應頻降但精享云闕既曠代而方修福釐所被思寰宇之同休疑宜因大典式暢洪恩可大赦天下貞元元年冬至郊祀大赦天下制陸贄門下君天下者受命于天地繼業於祖宗致其誠心惟敬與孝違敬莫大於廢祀虧孝莫大集作甚於黷神朕以眇身屬承大統縱欲敗度浸生厲階兵連禍深變起都邑六師播蕩九服震驚郊廟園陵陷於凶逆神人乏主將逮周星列聖大集作之業幾墜于集作於地違敬虧孝罪由朕躬撫臨萬邦甚用自愧側身思咎庶補將來股肱元臣比義叶德爪牙衆集作將士戮力同心誅集作除大憝而京邑廓清翦逋冦而關河底定兹朕再與王公卿尹洎億兆之人備其威容修其禮物薦誠清廟展敬圓丘陳謝罪愆告情集作憤雪耻感慕慙惕若無所容上帝顧懷再新景命豈伊匪集作菲德獨荷鴻休思與普天誕膺多福可大赦天下自貞元元年十一月十一日昧爽已前云云李希烈僣逆不道誠所難容朕憫念蒼生務息征討頻降集作有詔令許其自新若能歸降依前待之以不死淮西管內將士官吏百姓等一切原宥與之如初先有官封亦皆復舊如能特建功效集作業者當别超擢若家口親屬在諸道者長吏撫綏各使安存其歸順百姓仍委節度觀察刺史給空間地任便安居優復終身務令全集作存濟大事平已四字集作待事平之後聼歸本貫云云自頃凶渠唱亂逆將附姦保據國都慿陵甸服朕出次郊邑再遷巴梁險阻艱難靡不經歷暴亂之後乃彰烈士之功憂危之中方見直臣之節録勳進善其可弭忘應奉天興元元年元從立功集作扈從功臣并收京城將士食實封者各隨文武與一子官餘並加兩階仍賜勳兩轉其文武百寮應扈從到興元府者五品已上賜爵一級六品已下各加一階云云自建中四年已來有身死王事義烈著明未經褒贈者本道即具名銜事蹟聞奏諸道有解退官健州府長吏功務安存仍量以空間田地給付集作授免其差役任自營生社稷之勳以輔興王業統帥之任以總制戎麾集作威職弼諧集作參衮職者其德崇授旌集作髮節者其功大方鎮乃國之垣翰禁衛實豫之爪牙尹京實賴於集作其肅清主計尤資於辦集所頒慶澤宜越常倫司徒兼中書令晟宜與一子五品正員官并四品階諸道副元帥各與一子五品正員官都統與一子六品正員官中書門下平章事充節度使各與一子七品正員官節度使及神䇿兵馬司六軍充節軍金吾六軍大將軍判度支侍郎各與一子八品正員官都團練都防禦等使京兆河南尹金吾六軍將軍殿前射生兵馬使各與一子九品正員官多難已來三十餘載克平禍亂屬在戎臣或節著艱難或勳高戰伐受任雖專於惣師成功亦賴於群材𢡟賞推恩宜加𦙍嗣諸大將功業崇高者各與一子官本使即詳定録名集作具狀條録聞奏副元帥都統兼節度使下每道共三十人節度使下每道共一十人都團練都防禦使下每道各十八人如大將子孫之中有藝業優長性行純確者本道使具狀聞薦仍量事資集作支給令赴上都朕當隨材授官以充侍衛庶使功臣之後與國無窮故尚父子儀先朝元勳再復京邑贈太尉秀實以死為集作衛國節冠古今宜各與子孫一人五品正員官自至德已後節度使大將忠烈績效著明其後淪替集作翳者所司即條録聞奏與子孫一人正員官諸色人中應在賊中集作廷潜奉神主頃已甄賞宜更優崇云云江淮轉運使檢校左僕射同平章事韓滉勵精勤職夙夜在公漕挽資儲千里相繼事無愆素人不告勞拯于凶灾厥有成績可進封晉國公關畿之內連嵗興戎荐屬天灾稼穡不稔穀糴翔貴蒸黎困窮倉廪空虛莫之賑贍每一興念惻然痛心宜令度支取江西湖南見運到襄州米一十五萬石設法搬赴上都以救百姓荒饉如山路險阻車挽集作乘難通仍召貧人令其搬運便以米充腳價務於全活流庸庶事優饒副朕勤恤立國之道始於親親所以厚骨肉之恩𢎞集詔令並作明教化之本况荐經艱故宗族漂淪敦穆之情有加常日大長公主長公主公主各與一子七品官嗣王郡主縣主各與一子官出身如宗子中有德行才能者宗正卿具以名聞當别奬任致理之本在乎審官審官之由資乎選士將務選士之道必精飬士之方魏晉已還澆風未革國庠鄉校唯尚浮華選部禮闈不稽實行學非為已官必狥人法具非精弊將安救宜令百寮詳思所宜各修議狀送中書門下參校得失擇善而行有虞建官三載考績在漢為吏或長子孫蓋以吏久於官則人情不茍官久於事則理化有成日者制度廢隳考課乖舛淹速靡凖升降無名欲令庶僚何所懲勸自今已後刺史縣令未經三考不得改移集作易自餘非在職績效殊尤亦不得越次遷轉刺史停替須待魚書內外五品已上及常參官在任年考已深者即量其才效與改中外迭處以觀其能夫明目逹聰務廣聞見或慮懷才抱器之士輸忠納諫一作說之倫地處幽遐無由自達永言於此夢想不忘應諸色人有長䇿濟時忠規匡主者任具陳所見詣所居之州委刺史略與討論觀其㫖趣但有禆理道不涉私情便與附驛遞進朕當親覽自立兩稅經今六載或初定之時已有偏併或户口减耗舊額猶存輕重不均流亡轉甚集作衆委度支郎折衷條理以恤困窮古者雖有水旱人無菜色皆由儲蓄不匱勸導有方前代所置義倉國初亦循集作修其制備灾救乏甚便於人宜即凖貞觀故事天下所墾見田上自王公下及百姓每豐稔之嵗秋夏兩時州縣長官以理勸課據頃畝多少隨所種粟豆稻麥逐便貯納以為義倉如年穀不成即量取賑給官司但為其法勸諭不得收作用度四字集作收管各集作仍委本道逐便宜處置聞奏敦本厚生如資播殖當今所切莫甚於斯自今後百姓有墾闢田疇加於常嵗者所加之地不得輒更徵租稅其刺史令長考課亦以本界墾田多少為殿最今年蝗蟲損甚集作田州府開春之後量給種子以便集作便就農功天下應荒間地集作田有肥沃集作饒堪置屯田處委當管審細檢行以諸色人及百姓情願者使之營田如部署精當收獲𢾗多本道使刺史特加褒升屯官等節級優賞如是逃田地本主復業即集作並却給還輦穀之下四方會同供應既多難為凖定急賦煩役人何以堪宜令京兆尹與度支計會長安萬年兩縣每季各先貯備錢五千貫文於縣庫收納定清翰官專知應緣卒須别索及雜供擬并工匠等縣令與專知官先須給付價錢季冬集作終之後申度支勘會應關和市和顧並須先給價錢兩稅外一物已上不得科配百姓御史臺朝廷紀綱尚書省理化根本百度得失繫乎其人自頃制勑施集作頒行所司多不遵守主詔令作王臣奉職豈所宜然委御史臺左右丞切紏稽違無壅朕命云云文苑英華卷四百二十五
