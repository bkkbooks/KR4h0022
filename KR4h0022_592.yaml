body:
  text: 文苑英華卷五百九十三宋李昉等編謝春冬衣祿廩附謝賜春衣及牙尺表一首為武中丞謝春衣表一首寒食謝新火及春衣表一首謝勑書賜春衣并尺表一首謝春衣并端午衣物表一首謝春衣表二首謝冬衣表十二首謝勑書兼賜冬衣表一首謝加賜防閣品子課及全祿表一首為第五舅謝加賜防閣品子課及全祿表一首謝恩賜粟表一首謝恩放先貸斛表一首蘇州謝賑賜表一首謝賜春衣及牙尺表吕頌臣某言中使至伏奉某月日勑書及所部將吏僧道百姓等伏蒙聖恩慰勞并賜臣手詔及春衣兩副金縷牙尺一面大將衣若干者天眷遐臨恩波荐及跪承寵賞以懼以慙臣某中謝伏惟陛下德配二儀恩覃九有雖雲雨之施在物無遺而渥澤所加於臣為幸誠以任叨藩鎮才本庸虛威略不足以暢皇風政術不足以禆朝政顧慙曠職常用疚懷今又特降寵臣俯延殊奬頒以尺度承春令之溥臨賜以衣裳荷天慈之逺覆榮均將校慶被蒸黎歡心積於萬靈喜氣盈於五嶺臣往塵近掖負敗已彰洎守炎陬恩禮彌厚實懼無功之賜敢安逾分之榮仰戴鴻私捐軀寧報無任感恩瀝懇之至為武中丞謝春衣表劉禹錫臣某言中使某奉宣聖旨賜臣春衣一副王人臨第御府降衣忭舞失容捧戴無措臣某中謝伏以律當春暮慶洽時雍萬物被薰風之和九天垂湛露之澤臣受任非次速尤是虞方懷匪服之憂更荷解衣之賜恩加盡飾拖朱紫而集作以為榮受非以庸顧形影而知集作增愧丹誠徒罄玄造難酬無任踊躍感恩之至寒食謝新火及春衣表武元衡臣某言中使至奉宣進止賜臣新火及春衣等熒煌自天纎麗同降束帶斂祍盡飾之道已加捧炬迥回光照臨之榮荐及臣某中謝臣以薄才濫居臺憲曠官尸祿驟涉嵗年陛下未責前過尚容舊職忝陪班列兢惕每多載冒簮纓慙惶益甚今時惟清明律中姑洗當改燧火既荷惟新之恩未去緼袍更沐衣輕之賜猥霑鄙陋曲被幽微臣雖至愚豈不知愧伏以先皇之德未報陛下之澤又深揣分循涯過叨奬遇將仰申禆補俯效涓埃惟當以火燭心焚灼不忘於盡瘁以衣勵已曵婁常誓於糜軀嫉惡觸邪進賢惟善有死莫二知無不為伏冀聖慈鑒臣丹慊一作悃無任踴躍屏營之至謝勑書賜春衣并尺表令狐楚臣某言去二月日中使某至伏奉勑書手詔并賜臣春衣一副牙尺一條宸翰葳𬎼寵錫稠疊捧受榮忭如將不勝臣聞衣裳在笥與必有道刀尺為器用惟其人臣魯國小儒漢庭下士因緣霈澤汙染官牒顔嘗忍愧心不容憂陛下仁發於中惠周於外矜臣以濕暑之患賜之葛衣念臣無忖度之能降其寶尺輕新有楚廣狹不踰被服而炎蒸坐銷秉持而長短立辨揆才量力將何補於分寸運肘延頸實有塵於領袖當期畢命無以酬恩臣無任謝春衣并端午衣物表臣某言今月日中使周某至奉宣口勑賜臣春衣一副并端午衣一副銀枕一口百索一軸纍受寵光載懷兢懼自揣涯分若臨氷淵唐諱臣某中謝臣以昧於知人交通元載合從牽纍伏待刑章豈謂俯回宸翰特有殊賜罪當禠帶忽頒御府之衣憂可傷生重延長命之縷更加珍器曲被深恩徒懷推食之仁立遣疑作豈逭素餐之責施均雷雨荷重丘山雖畢命以自期終粉身而無恨臣無任謝春衣表臣某言中使某至伏奉勑書手詔兼賜臣及大將軍等春衣一副金縷牙尺一條拜奉天書光生萬里即受殊賜喜溢三軍臣某中謝臣素以庸虛特承聖奬寄深分閫恩重丘山祗奉朝章布宣皇澤藩夷即敘懸道廓清將士無戰伐之勞四時沾衣服之賜况榮頒尺度禮叶典經敢懷寸進之心空積違顔之戀臣無任同前劉禹錫臣某言中使陳日華至伏奉聖旨慰勞臣及將佐官吏僧道耆老集作夀百姓等并賜臣墨詔及春衣兩副大將衣四副王人捧詔御府降衣寵光不隔於遐藩慶賜猥霑於禆將臣某中謝臣素乏器能謬膺驅使每慙效薄常懼食浮陛下覃以至仁均其厚施宰元和而布澤順時律以頒衣出自禁中賁于臣下執領繪而抃舞失次被纎柔而顧眄增輝舉體動容既安且吉在身不稱恐招鵜翼之譏居任集作位無功叨受鶴紋之賜下延將校同荷生成謝賜冬衣表陳子昻臣某言中使某至伏奉某月日勑書慰問將士官吏僧道耆老等并賜臣手詔及冬衣兩副大將等衣一十五副者天慈逺致聖澤傍流海隅臣庶忭舞相慶臣某中謝伏惟陛下道宏文武任切藩維逺念戎旅之勤亟頒時節之賜臣以謬膺寄理載涉炎涼效績無聞徒負嵗時一作負敗將及恩私每降慙懼不寧今又俯浹宸慈曲延寵賚當戒寒之初候沐挾纊之殊榮佳氣集於城池喜容生於草木三軍叶慶萬井相歡况臣荷寵逾涯忝恩滋甚營燭無禆於景矅畎澮徒願於朝宗竦踴遐方感戀俱切無任感恩荷懼屏營之至同前吕頌臣某言中使至伏奉勑書手詔并賜臣冬衣一副大將衣兩副九霄垂露忽降天文萬里飛軺更頒盛服臣某中謝臣凡庸淺劣才不逮人謬荷國恩猥居方鎮自宣風撫俗猶未周星朝章已布於蠻夷聖澤載覃於逺道將士等干戈久戢嵗月空深曽無橫草之功纍受賜衣之慶伏以陽和生植不隔薰蕕日月照臨寧分逺邇喜溢要荒之外榮均將校之中蚊蚋力微丘山難荷無任感戴兢惶屏營之至二臣某言中使至伏奉某月日勑書慰問將士官吏僧道并賜臣手詔及冬衣兩副大將衣五十副者清禁絲綸特臨逺鎮中天雨露忽灑炎州感戴殊私抃躍無據臣某中謝臣頃踐臺司已招負敗洎分戎閫又寡威謀陛下黈纊闕遺含宏尸素恩深全宥德邁生成地偏而頒賜每臨節換而授衣先及王人宣勞降自煙霄宸翰昭融如瞻日月綢繆睿眷咫尺天顔三軍激踴躍之誠五嶺溢謳歌之響皇慈溥洽顧品物而均榮寵渥謬加在微臣而均懼非勤勞以受賜徒局蹐以祗恩灰壤為期豈云上報感恩荷懼屏營之至同前皇甫冉臣某言中使某至伏奉勑書手詔賜臣及兵馬使都虞候冬衣各一副拜受綸言跪承珍服荷同山嶽懼比氷淵唐諱臣某中謝臣功微草芥寄重藩條每懷尸祿之羞實負曠官之耻豈謂天文回照不隔於遐方御府頒衣更蒙於陋質傍沾偏將曲被殊私挾纊既及于三軍酬恩將期於萬死無任二臣某言伏奉聖恩賜臣冬衣四襲跪捧驚喜抃躍交馳臣某中謝臣功效微薄任遇寵榮使降專人衣裁御府寵光既極恩已及於解衣雨露既濡德又承於挾纊實亦發輝陋質煥赫私門未知此生何以仰報謹當訓勵師旅式遏邊陲用宣力於百身酬鴻私於一顧無任云云三臣某言某月日中使某至伏奉勑書手詔並賜臣冬衣一襲者清風早至白露初凝方思挾纊之溫忽報頒裘之禮跪拜受服形魂愓然臣某中謝臣學非博古才不動衆幸逢開泰列在方隅天髙地厚未知所答而時雨露洗太陽昭燭王人捧詔每降於上天御府賜衣不遺於下土既甚輕暖加之麗密束帶而立周旋有光驚寒沍之難侵賀威靈之曲被無任感恩同前權德輿臣某言九月二十日中夜孟國瑶至伏奉某月十七日勑書手詔慰諭臣及將佐僧道百姓等并賜臣冬衣兩副大將冬衣共四副者詔旨曲臨慶賜旁集凡在禆校一其歡愈臣某誠歡誠喜頓首頓首臣自違奉闕庭保釐河洛異戎師式遏之任非封部底貢之勤坐叨名器所謂尸素月日云邁寒暑迭來再及授衣之辰每蒙挾纊之澤被服輕暖章施賤陋彼已不稱於臣則多雖竭捐軀之誠豈逃濡翼之刺撫躬愧畏上答何階無任慙懼感戴之至謹奉表陳謝以聞臣某誠惶誠恐頓首頓首謹言此篇舊誤編在六百三十三卷狀門今移入于此同前令狐楚臣某言某月日中使至伏奉勑書手詔等捧戴拜賜榮感兢惕軍城歡抃海曲光輝臣某中謝伏惟尊號皇帝陛下至仁育物玄德統乾恩被生靈惠周遐邇臣猥蒙寄任謬領方隅寒暑驟移庶績罔紀王人忽降慈旨曲臨涉遐逺之道途敷殊常之渥澤詔書既啓仰觀垂露之華珍服俯臨實懼維鵜之刺慶同戎府榮及閨門况節戒玄冬戀深丹闕授衣感自天之錫盡力堅粉骨之誠屬垂溥天和布代化萬方昭泰四海無虞空知報效之勞願同犬馬未展涓埃之績何答丘山寢興靡遑慙懼交集無任受恩悃懇之至同前劉禹錫臣某言德音爰錫降自煙霄黔黎沐賜共承睿渥臣某中謝伏惟皇帝陛下誕敷文教丕變時雍遐邇克清翔泳咸若臣繆膺寵任每愧素餐荷海嶽之私無毫釐之績式用衣裳在笥之戒惟愧輕暖被身載詠維鵜在梁之詩罔知死節之所誓當訓勵士伍寧輯閭里盡瘁竭心以酬天造臣與大將等無任感戴屛營之至同前臣某言恭承御封捧授恩錫喜懼交集精魂若飛臣某中謝臣夙荷寵榮纍仗旄鉞西戎未殄無式遏之勞東郡已安有息偃之逸髙秋空度永夕知慙陛下亭育深慈生成大德三軍挾纊俯聽綸言九月授衣載馳天使臣被服既畢感戴難勝誓當罄節苦心死生立效敢以微軀陋質麗靡自安臣所守有限不獲奔走丹墀犬馬微誠伏增竊戀臣無任同前為杜相公臣某言中使王國清至伏奉聖旨慰勞臣及將佐官吏僧道耆夀百姓等并賜臣墨詔及冬衣兩副大將衣四副者大明昭回逺燭下土殊錫稠疊延及偏禆慶忭失圖捧戴相賀臣某中謝臣謬承委寄獲守藩條灰琯屢移塵露無補陛下至仁天覆玄化風薰頒以兼衣賁兹瑣質降自天府光于轅門緘縢既開覩綵章之盛飾蹈舞而服發溫燠於祁寒愧塵補衮之名更荷解衣之賜恩波下浹將校同霑共戴殊榮咸思竭節生成是荷雨露難酬臣無任云云同前符載臣某言中使某至伏奉詔旨并賜臣及將士冬衣等來自九天頒于下土手捧目視霞開雪凝是何眇爾之賤質膺此爛然之盛服臣某中謝臣久在藩條無禆政術每懼素餐之責以成負乘之羞陛下含貸優容天覆地載伏念微臣之羸老且憂將校之寒沍賜之以衣服寵之以光榮俱無汗馬之勞已有維鵜之刺雖君父德大不求於所酬而臣子感深自期于必死無任感恩懇激之至謹奉表以聞謝勑書兼賜冬衣表獨孤及臣某言伏奉某月日勑書慰問將士等跪承寵錫仰荷天慈忭躍周章不知所措臣某中謝陛下體仁恤逺崇德念功恩浹勳賢禮優方國臣行能無取志略非長徒以嘗謬台司遂叨藩守誠寬覆餗之罪更切致冦之憂豈謂宸眷不遺天波荐及奬飾加於尸素恩意逮於庸微嶺嶂萬里迥回日月之私照偏禆一介沐乾坤之厚施緇黃載躍班白相歡騰喜氣於城壘舞祥風於旌斾臣曠官已久無補休明戀闕滋深又移寒燠纍忝逾涯之賜敢安非據之榮丘山至重灰壤寧報無任感恩戀主屏營之至謝加賜防閣品子課及全祿表李嶠臣某言伏奉恩旨加賜臣防閣品子課及全祿並以特進全給身若在京仍朝朔望者臣自叨榮職無補分毫抱疾沉疴有踰年嵗蒙賜臣骸骨得守丘園方從麋鹿之遊分隔鵷鴻之侣不謂皇私廣被天造曲成回日月之光更臨幽側降雲霄之澤俯潤凋枯嵗時頒廪藏之儲朔望接縉紳之禮無績無效虛忝於恩榮非才非賢謬霑於祿秩仁慈出於分外寵渥生於望表丘山厚澤猥及下流草木輕生何階上答臣苦腰腳軟弱不獲躬詣闕庭拜謝無任慙悚喜荷之至謹因晉守奏事奉表陳謝以聞為第五舅謝加賜防閣品子課及全祿表臣某言伏奉恩旨加賜臣防閣品子課及祿并全給身若在京仍朝朔望者臣運偶時來久叨匪服鍾鳴漏盡得保懸車逢舜歷之雍熙遂堯人之耕鑿乾坤含養之德尚貸光隂雨露霑霈之恩不遺枯朽特降綸旨優加祿秩更沭天慈許朝朔望大賜造於平分之外收無能於委棄之餘荷澤蒙榮空深於忭躍殘生餘喘豈期於答效無任慙悚喜荷之至謹附中使某官某奉表陳謝以聞謝恩賜粟表劉禹錫臣某言伏奉今月一日制書以臣當州連年歉旱特放開成元年夏青苖錢并賜斛斗六萬碩仰長吏逐急濟用不得非時量有抽斂集有於字百姓者恩降九天澤周萬姓優詔才下羣情頓安某誠歡誠喜頓首頓首伏以災沴流行隂陽常數物力既竭人心匪遑輒敢奏聞本求賑貸皇恩廣被玄造曲成既免在田之征仍頒發廪之賜臣謹宣赦文節目彰示兆人鼓舞歡謡自中徂外臣初到所部便遇儉時今蒙聖慈特有賑恤主恩及物已為夀域之人衆意感天必有豐年之應臣恪居官業不獲拜舞闕庭臣無任謝恩放先貸斛斗表臣某言臣奉五月二十九日勑牒據度支所奏諸道節度觀察使及州府借便省司錢物斛斗等數內當州欠三萬六千二十三貫石並放免者殊私忽降逋債滌除藩集作一方永安遐邇咸恱臣某誠歡誠喜頓首頓首伏以關輔之間頻年歉旱田租既須矜放公用交不支持承前長吏例有借便以救一時之急皆成積欠之名既未支填常懷憂懼聖恩周洽洞見物情爰命有司使之條奏去其舊弊衆已獲安嚴立新規人知所措臣恪居官次不獲拜舞闕庭臣無任忭躍屏營之至蘇州謝賑賜表臣某言伏奉去年二月十五日勑蘇州宜集作宣賜米一十二萬碩委刺史據戶均給者恩降九天澤流萬姓伏以臣當州去年災沴尤甚水潦雖退流庸尚多臣前月到任奉宣聖旨闔境老幼無不涕零詢訪里閭備知凋瘵方具事實便知奏論聖慈憂人照燭幽逺特有賑恤救其災荒蒼生荷再造之恩儉嵗同有年之慶臣忝為長吏倍萬恆情謹奉表謝以聞文苑英華卷五百九十三
