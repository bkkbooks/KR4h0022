body:
  text: 文苑英華巻八百六十三宋李昉等編釋十四魏州開元寺新建三門樓碑一首蘇州枝硎山報恩寺大和尚碑一首虎邱西寺經藏碑一首蘇州乾元寺碑一首魏州開元寺新建三門樓碑封演先王立清廟修百祀所以展嚴禋祈景福今釋門之有塔寺亦像教之崇建福焉或謂之仁祠或謂之精舍或謂之伽藍或謂之招提名雖不同其實一也河朔之州魏為大魏之招提開元為大開元者在中宗時草創則曰中興在𤣥宗時革故則曰開元道無常名隨時而巳矣寳應初嵗王師北伐奮其威武或以火攻秉秆翕其延燒積薪吁其可撲由是寺門夷蕩鞠為灰燼緇佀徃來莫庇風雨耆老興嘆衣冠疚心共甘沒齒不覩興復洎開一作相國田公之在魏也勤四封之人而撫之閲三軍之實而補之戎務之閑詮于一作泉僧曰彼道場勝地麗譙餘趾堙替厯稔未之克修吾儕闔廬猶設鍵閉矧乎尊像之所在福田之所植䑓觀有素其可闕乎始吾之來有意于此惟是緝綏緝申儆以供禦上事故未遑也今原野墾府庫實毗庶安居徒逸而締構不備豈吾心哉即持俸錢逺度山木匠伯獻藝役夫僝功時大軍之後良材一罄龍門上㳺下栰仍阻公乃使河中府以營建之㫖咨于台臣精誠内馳萬里潜契山不吝寳貞松大來炎涼未再水濵如積驚和嶠之千丈恧慶氏之百車操繩墨運斤斧者得以功成而不溷亦由材之備矣既立三門鎮之層樓又像雙闕校之連閣甍宇若畫棟桴干雲犖投蓋而靡及嬴抱闗而方啓上可以廻眺百里覧川原林麓之富下可以俯瞰萬室察舟車士馬之殷崇崇乎信一時之壯觀而全魏之卓絶也初樓之經始僧徒皆盛以為舊制巳廣後難及也迨樓之集事僧徒皆喜以為有加于前無不及焉其中長老或涕而言曰此寺自神龍至於寳應五十有七年而遇焚毁自寳應以至於兹十有三年而復舊物非夫上天悔禍諸佛䕶念則前功㡬乎冺絶大功不能為謀尚何見斵礱之制丹雘之制煙聚霧合聲馳響應若斯之神速者巳是知田公之勇於信施極於脩葺非人力也如來付囑大臣有㫖哉公頃曾入寺䖍恭作禮有舍利兩粒降於其瓶光明圓浄瑩徹心目蓋舍利者非常之瑞雖一粒二粒乃至多粒供養功徳以金身等遂于寺内起塔二所而分葬焉入塔之辰見祥雲靈鶴徘徊其上百千人俱嘆未曾有得不謂道心純至而𡨕佑薦委耶公又以此寺經典舊多殘缺哀彼學徒訪問無所乃寫一切經兩本并造二樓以貯之三四五佛初中後善龍宫所不備矣耳所未聞莊嚴圓滿巻帙充足其闡化之功方有如此公體資海岳徳邁人天深了因果髙謝繫縳復於此寺度㓜子一人俾脩浄葉以傳法印妙莊故事禳祛前軌既厯多刼公能繼之其樹善之規有如此噫建三門惠也製雙塔誠也繕羣經智也度㓜子慈也有一於此且長享百禄慶流後裔况能偹兹四者加以氣懾貔豹心雄鐵石一為蒼生之父母一為天子之股肱受登壇之寄畫雲䑓之像未云多也公令弟御史大夫兼貝州刺史北平郡王廷琳雅量冲逺天姿頴出内安黎庶紹龔黄之名外鎮封疆宏魯衛之政公愛子左散騎常侍兼御史中丞悦駕部郎中兼御史中丞綰從子太子賓客兼御史中丞昻等皆才傑而妙噐周而敏卓然自立克茂家聲如龍如虎森森翼翼豈必觀懿氏之兆而後識其昌聽卜偃之説而乃知其大論者以開元天寳以來北平士望腰金拖紫者多矣未有如公弼諧帝室惣統方面侯王將相萃於一門數十年間光華照灼雖方召衛霍輯寧周漢垂名竹素曷以過之寺主僧法敬昻疑作即公所度之子也㓜而聰達閑於禮訓求封君之錫土慕大子之踰城上座僧志髙都維那僧道圓及諸徒衆等並精通妙法堅持宻行名稱普門威儀無缺逺則澄釋繼踵近則福寂比肩莫不飲公之徽猷承公之令範懼瓊琚之匪報思鼎鼐之有銘聿相與轉石山足立碑門右以無忘我田公之茂績其詞曰碣石巉巖滄浪沖融藴茲間氣生我田公道可濟時材任理戎擁旄仗鉞作藩於東八座爰渉三台累踐人臣寵榮今古或鮮祗率常命式敷彛典殊勲載崇真門日闡三門峩峩舊址巳傾刋木萬里匪公誰成雙塔嶷嶷先現是呈運甓千夫匪公是營無量法寳允資流布有梵有室所聞必具無量眷屬允資佛䕶若女若男遇縁則度儉徳凛如清心澹如傾家以施内不留儲恢我佛乗壯我禪居永綏福夀其樂只且蘇州支硎山報恩寺大和尚碑釋皎然我先大師曰佛嘉言孔願大造人天張無生極宗懸衡於羣教之表自第一義諦皆我之蘧一也况儒墨名法道家之流哉教之斯行資乎哲匠今大師即其人也大師諱道遵字宗達呉興張氏之子崇勲茂徳世為呉中右族大師夙負殊操潔士稱之榮曜不足關其心聲塵未曾觸其性其年二十詣天竺威大師首宗毗尼依佛教也常愀然而嘆曰孔老之學不明三世昭昭之業何異夫適郢而求𡨕山哉先大師則不然觀萬像無根我獨以無生一心覆疑山之峻知四流妄有我獨以不動二字停倒海之波室是逺而悟者天隔昔在漢明永平之際大教洋溢霈然而東與生靈滌心觀天地更始正士自摩騰以降持法有如關中者秉律有如南山者海内髦士亟歸乎哉如凱風徴陽嘉禾先發北齊惠文大師傳龍樹智論一性之教即我釋迦如來九世祖師文殊所乗也惠文傳南嶽南嶽傳天台始授一心三觀之㫖以十身佛刹㣲塵數修多羅如懸帝綱不出正念無遺即中蓋如來一斯教之扃鐍也天下一作天下也𢎞經士窺我宗者不得其門而入天台去世界傳章安章安傳縉雲縉雲傳東陽東陽傳左溪左溪傳自龍樹巳還至天台四祖事具諌議大夫杜正論教記今大師則親承左溪一受心宗方造其極物有凋折而苦節不衰時有晦明而至行不變法華三昧淵乎我衷嘗從容謂門人曰堯舜之民不必獨義教之至也教若不至民何咎焉吾恐大教未周羣機未發陥諸子於邪見之網吾徒得無過乎乃欲廣寫法華經置道塲闢經院以燭繼景楊大雄慈聲蓋平生之願與一之日發其心二之日規其趾作不逾序厥功成焉居山之福地於戱羣峰合沓以就我當大藏而孤峙疑天作以待一作得用此持經之境也及以清晝山空杉吹不動真念凝乎寂寞經聲在乎窅𡨕此持經之心也大厯元祀州將韋公元甫兵部尚書劉公晏侍御史王公圓開州刺史陸公向殿中侍御史陸公迅大理評事張公象境誘真心共獲殊勝乃相與飛表奏聞詔書特下署名曰法華道塲焯哉盛乎經王之惠日昇于天乎自江以東揔一十七所皆因大師之首置也舉精行大徳二十七人常持法華報主恩也大師以無縁慈眼極一觀四生多溺空見乃鑄廬舎那及毘盧遮那像眀智身不有法體非無將顯古佛證經之由乃起多寳妙塔開浄土當生之葉遂作彌陀色身法華一經駭聲得記方等四部得嘉一作喜廣教盡收一作狀無垢浄光蓋是如來極開方便跡雖有作功乃無為接人天機使知有殊常之福又冩天台一教溢乎道塲真詮昭昭與清景不極大師有言佛法夀命其性常任乎不存我法安寄於是置莊二所世田為義俟嘉榖以登身由是修期聖禾不絶非夫大師平等之施孰能于事理䨇全哉物役我慈日用不足門人有懈廢者接彼退機諸法華𤣥義天台止觀四分鈔文臨壇度人授心揚律願盈乎石室之籌天寳年於靈巖道塲行法華三昧忽觀大眀上燭天界我身正身儼在光中異日問天台然公公曰智慧光眀從心流出非精志之所致耶又於本寺入法華道塲忽覩此身在空中坐先證者知是大師滌垢之相不然則萬法有無礙之用哉其年春秋七十一僧臘四十六以興元元年七月二十九日告終于支山本寺嗚呼象法梁壞苦流增波無數人天從今何怙初當寺蓋公輪公一夜同夣大殿忽崩得非法匠將亡之應示疾之日驕陽乆焉嘉苖若燎辭世之夕風號雨暴天地慘黷亦我法陵遲之變也傳教門人靈輪法盛道欣可入如來之室豈唯宣父之室哉俾厥鴻猷張而未弛奉教門人猶子靈源等髙志警㧞徳隣先賢精細行以檢儀敷大乘以基性雖後學夙聆徳聲曷云不騫貽諸樂石銘曰泓澄呉江静㡬于道清氣蓄焉誕我僧寳洸洸大師與道為蕃義天無孛慈釭不昏巋然支山繄公所履建塔闢院夷荒而趾乃基靈峰靈峰崇崇乃啓秘藏秘藏彤彤天色在下日輪當中真經無言至象非象冥理徹性不昧不朗三觀一心如懸帝網雪山嵳峩有時而裂香樹偃蹇有時而折世相若斯師何示滅示滅何之天泣人悲髙邱漠漠細雨霏霏陵履西去相逢是誰見海未乾疑山尚阻囂囂魔民爰得其所寂寥空留法語入室數子皆宏我經安公如月逺公如星恭恭秩秩釋氏儀形影塔亭亭長在寒樹天上花落人間日暮猶飄苦雲與我為喻虎丘西寺經藏碑顧况闔閭之𦵏海浦一作湧疑也水銀為溟渤黄金為鳬鴈精氣為白虎是名虎丘東晉王珣王珉捨山造寺生公忍死待西國經來之所也山中塔廟叔父有功叔諱七覺字惟舊容相端静神龍初八嵗剃度萬言一覽闕際天人嘗以唵􅀈一作部林萬法之毋法從數起乃讀外書小餘大餘以為證據維摩所謂通達善道法華所謂通達大智况受經於叔父根鈍智短曾不得乎少分一作多至徳三年示終本山付囑門人澹交曰此山法事莫不圓對而經藏猶闕澹交僧瑤俗性何廬江次宗其胄奉佛不敢廢師之命自至徳貞元龍在戊寅紹建方畢瞿曇教迹不捨有表不一作示住無表般若用中壇攝其六一作四譬如無根安得有華故覺華長者得定光如來授記鹿仙長者得釋迦如來授記寳手菩薩者空王如來授記皆因造藏而得作佛從虛空藏流出一切藏一切藏流出四大藏四大藏一億大藏四億小藏圍繞湧出狀如蓮花灌於四藏流出十二藏從十二藏分為三藏一聲聞藏二菩薩藏三真如性海藏海水可量虛空不可量虛空可量菩薩摩訶薩成就衆生變化隨感不可量菩薩摩訶薩修行地位有分劑故故可量諸佛真如性海無分劑故故不可量攘於三藏流出八萬四千藏修多羅藏摩訶藏為上首於是有法藏寳藏甚深微宻藏妙花光雲等藏無盡在色究竟天衆生衆生福薄不得瞻暏謨呼羅摩海鹹首羅大自在神天樹雲音日輪速疾執金剛神浄光光香雲最上光嚴身衆神清浄華髻栴檀樹光足行神雷音幢相雨花妙眼道塲神浄花普照無等光燄主空神永斷迷惑普逰浄空主方神示現宮殿樂勝莊嚴主晝神普得浄光諸根嘗喜平等䕶音寂静海音主夜神其摩竭提國有金剛藏中有摩尼瑶王變現自在兩無盡瑶嚴好花是諸菩薩演説如來廣大境界慈目瑶髻發生喜樂可愛樂正念天王十方海中一切瑶玉吐雲彌覆流出教綱其佛號法水覺空如來嚴持噐杖夜乂王力懷髙山夜乂王毘樓博乂燄口海光龍王等甚可怖畏鳩槃茶王美目端嚴鳩槃茶王日光天子月光天子星宿王天子威徳光明天子各各恒沙恒沙眷屬相與掌䕶其南海楞伽山下娑竭羅龍宫其光明藏大地刼浄諸方等諸經納於龍宫其善部州大藏六萬巻中六千巻小藏四千巻大悉地有空有不空廣略平等譬如萬法出一座中千輪百疏又於一塵流出一有又字如帝釋宫殿因陀羅網一珠映八十億珠法界義中法身法性百佛世界細一毛端扸一毛端成㣲塵數世界一一世界法身演無量百千萬億諸佛法藏是身為陀羅尼藏湧法海藏衆法瑶藏舍乘敷藏花頂衆藏宻耶䕶藏言頓顯也此皆奢摩他毘鉢舎那定惠之力觀見如來等藏藏依識攝有舎一作含藏理發一作法於心而形於藏内外俱朗不其然乎斯文淳一作純一非敢戱論光佛相好賛佛功徳從佛知見中來頌曰雪一作靈山紺宫等虛空耶叔父付囑澹交續耶妙華光雲香普薰耶娑碣所措摩醢䕶耶喝刺呼嚧歸命䕶耶蘇州乾元寺碑五蘊十二入十八界此上三科能包萬法因緣生為有無自性為空有融一則一作即中道義雖石船渡海蚊背負山不為希有事僧法珣與和合衆法藏等造乾元寺者晉髙士戴逵子顒之宅也乾元初節度使鄭昊之奏立觀察使李涵李道昌皆有力大臣求無上道以心無所願無邉受者實得施者實與雖空不敢有為有滅無為無滅無為有為之體有為無為之用無生無滅無相無名無相法無言語説法以無言語説故有相大乗有觀法門無相大乗無觀法門於有所得有相大乗義於法無所得無相大乗義無所得無所得俱真一乗之義事也為妙因果譬如種子依地而生又如大也能荷群有虛空之體大於天地天地有盡虛空無盡如來之體大於虛空光明虛覺圓寂萬徳故於無住本建乎諸法不動直際恒沙煩惱莫不斷除魚吞鈎虎落穽蛾拂火此衆生自取其毒道本平坦樹本清涼佛在摩竭提國城等正覺諸弟子栖乎茂林藉彼祥草厥後因時設教猶著弊衣行次乞食及性忉利省摩耶夫人優填王鑄金刻木始用膠漆泥布佛有象自此始也與佛在時功徳無異於是給孤長者造祗洹精人末由底迦造龍宫精舎竺乾法蘭造洛陽白舎寺佛圖澄造鄴中九百七十三寺釋道安造襄陽一十五寺逺法師造廬山東林西林寺度法師造攝山栖霞寺杯渡法師造南陵隠静寺傳大士造東陽雙林寺思大師造衡陽南岳寺智者大師造天台國清玉泉寺三十五寺略也涅槃無前無後無般若無新舊法珣上不重舊徳下不輕新學一作法珣上人重舊徳不輕新學門人清瑛清况於經藏中抄佛心訖疑永示無極文曰倬哉迷廬宏亘大千百億日月藕系貫穿蛟背負文飛登梵天塵勞為海般若為船截生死流是曰希有大哉乾元寳則不朽和衆雲臻珣為稱首佛告善來寳坊崇哉法雨洒埃慈雲徘徊文苑英華巻八百六十三
