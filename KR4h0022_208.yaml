body:
  text: 文苑英華卷二百八宋李昉等編樂府十七陌上桑三首採桑八首折楊栁十六首梅花落十首殿前生桂樹一首芳樹十一首採蓮十六首採菊一首採菱三首青青河畔草二首陌上桑吳均嫋嫋陌上桑䕃陌復垂塘長條映白日細葉影一作隱鸝黃蠶飢妾復思拭淚且提筐故人去如一作寧知此離恨煎人腸同前王筠人傳陌上桑未曉已含光重重相䕃映軟弱一作軟軟自芬芳秋胡始倚一作停馬羅敷未滿筐春蠶朝已老一作伏安得久倣徨同前李白遊女緗綺衣春還事蠶作五馬如花飛青絲結金絡不知誰家子調笑來相謔妾本秦羅敷玉顔艷名都緑條映素手採桑向城隅使君且不顧况復論秋胡寒螿愛碧草鳴鳳棲青梧託心自有處但怪旁人愚徒勞一作令白日暮高駕空踟蹰採桑梁簡文帝春色映空來先發水一作院邉梅細萍重疊長新花歷亂開連理傍淇水一作連珂往淇上接幰至藂臺藂臺可憐妾當窗望飛蝶忌跌行衫領尉斗成裙攝一作裭攝又作裾攝下牀著珠珮捉鏡安花鑷薄晚畏蠶飢競採春桑葉寄語採桑伴訝今春日短枝髙手不及葉細籠難滿年年一作年少將使君歷亂遣相聞欲知琴裏意還贈錦中文何當照梁日還作入山雲重門皆已閉方知客留袂可憐黃金絡復似青絲繫必也為人持誰令畏夫壻同前傅縡羅敷試採桑出入城南旁裙裾一作綺裾映珠珥絲籠一作繩提玉筐度身攀葉聚聳腕及枝長空勞使君問自有侍中郎同前張正見春樓曙鳥驚蠶妾候初晴迎風金珥落白日玉叉明徙顧移籠影攀鈎動釧聲葉髙知手弱枝軟覺身輕人多羞借問年少却逄迎恐疑夫壻逺聊復答専城同前劉邈倡妾一作女不勝愁結束下青樓逐伴西城路相携南陌頭葉盡時移樹枝髙乍易鈎絲繩挂一作提且脫金籠寫仍一作復收蠶飢日欲暮誰一作詎為使君留同前沈君攸南陌落光移蠶妾畏桑萎逐便牽低葉爭多避小枝摘駛籠行滿攀髙腕欲疲看金怯舉意求心自可知同前劉希夷楊栁送行人青青入西秦秦家採桑女樓上不勝春盈盈灞池一作水曲步步春芳緑紅臉曜明珠絳唇含白玉回首渭橋東遙憐樹色同青絲映日落一作嬌落日緗綺弄春風携籠長歎息逶遲一作迤戀春色看花若有情倚樹疑無力薄暮思悠悠使君南陌頭相逄不相識歸去夢青樓同前李彥逺一作暉採桑畏日高不待春眠足攀條有餘態那矜一作憐貌如玉千金豈不贈五馬空躑躅何以變真性幽篁雪中緑同前江遵為報踟蹰陌上郎蠶飢日晚妾心忙本來若愛黃金好不肯携籠自採桑折楊栁梁簡文帝楊栁亂如絲攀折上春時葉密鳥飛礙風輕花落遲城髙短簫發林空畫角悲曲中别無一作無别意併為一作是一相思同前梁孝元帝巫山一作山髙巫峽長垂栁復垂楊同心且一作宜同折故人懷故鄉山似蓮花艷流如明月光寒夜猿聲徹逰子淚沾裳同前徐陵嫋嫋河堤樹依依魏主營江陵有舊曲洛下作新聲妾對長楊苑君登髙栁城春還應共見蕩子太無情同前岑敬之將軍始見知細桞繞營垂懸絲拂城轉飛絮上宫吹塞門交度葉谷口暗橫枝曲城攀折處惟言怨别離同前王瑳塞外無春色上林桞已黃枝影侵宫暗葉彩亂星光陌頭藏戲鳥樓上掩新粧攀折思為贈心期别路長同前江總萬里音書絶千條楊桞結不誤一作悟倡園花遙同故里一作天嶺雪春心自浩蕩春樹聊攀折共此依依情無奈年年别同前楊炯邉地迷一作遙無極征夫去不還秋容雕翠羽别淚損紅顔望斷流星驛心馳明月關藁砧何處在楊桞自堪攀同前盧照鄰倡樓啓曙扉園桞正依依鶯一作鳥啼知嵗隔條變識春歸露葉凝愁黛一作啼臉風花落一作亂舞衣攀折將安一作聊將寄軍中音一作書信稀同前沈佺期玉窗朝日映羅帳春風吹拭淚攀楊栁長條匝地垂白花飛歷亂黃鳥度參差妾自肝腸斷旁人那得知同前鄭愔青栁映紅顔黃雲蔽紫關傳聞邉信出枝葉為君攀舞腰愁欲斷春心望不還風花亂成雪羅綺淚斑斑同前喬知之可憐濯濯春楊桞攀折將來就纎手妾容與此同盛衰何必君恩能獨久同前張九齡纎纎折楊栁持取寄情人一枝何足貴憐是故園春遲景那能久流芳不及新更愁征戍客容鬢老邉塵同前魚𤣥機朝朝送别泣花鈿折盡春風楊桞烟願得西山無樹木免教人作淚懸懸同前三首王貞白枝枝交影鎖長門嫩色曾沾雨露恩鳳輦不來春欲盡空留鶯語到黃昏二水殿年年占早芳柔條風裏御爐香如今萬乘多巡狩輦路無隂緑草長三嫩葉初齊不耐寒和寒時拂玉欄干征人去日曾攀折泣雨傷春翠黛殘梅花落吳均終冬十二月寒風西北吹獨有梅花落飄蕩不依枝流連逐霜彩散漫下氷澌何當與春日共映芙蓉池同前二首徐陵臘月正月早驚春衆花未發梅花新可憐芬芳臨玉臺朝攀晚折還復開長安年少一作年小多輕薄兩兩常唱梅花落滿酌金杯一作巵催玉柱落梅樹下宜歌舞金谷萬株連綺甍梅花密處藏嬌鶯桃李佳人欲相照摘葉牽花來並笑楊栁條青樓上輕梅花色白雪中明橫笛短簫悽復切一作咽誰知柏梁聲不絶二對户一株梅新花屢發材一作落故栽燕拾還蓮井風吹上鏡臺倡家愁思妾樓上獨徘徊啼看竹葉錦笑一作篸罷未能一作成裁同前陳後主春一作金砌落芳梅飄飄上鳳臺拂粧疑粉散逐溜似萍開映日花光動迎風香氣來佳人早插髻試立且徘徊同前張正見芳梅映雲一作雪野發早覺寒侵落逺香風急飛多花徑深周人歎初摽魏帝指前林邉城少灌木折此自悲吟同前二首江總摽一作縹色動風香羅生枝已長妖姬墮馬鬢未插江南璫轉袖花紛落春衣共有芳一作光羞作秋胡婦獨採江一作城南桑二胡地少春來三年驚落梅偏疑粉蝶散乍似雪花開可憐香氣歇可惜風相摧金鏡且莫顧玉笛幸徘徊同前楊炯窗外一株梅寒花五出開影隨朝日逺香逐便風來泣對銅鈎幛愁看玉鏡臺行人斷消息春恨幾徘徊同前盧照鄰梅院一作嶺花初發天山雪未開處處疑花滿花邉似雪回因風入舞袖雜粉向粧臺胸奴幾萬里春至不知來同前劉方平新嵗梅芳盡一作芳梅樹繁花一作苞四面同春風吹漸落一夜幾枝空少婦今如此長城恨不窮莫將遼海雪來此後庭中殿前生桂樹陳陶仙娥玉宫秋夜明桂枝拂檻參差瓊香風下天漏丁丁牛渚翠梁橫淺清羽帳不眠恨吹笙棲鳥暗驚仙子落步月鬃雲墮金雀蕙樓凉簟翠波空銀縷香寒鳳凰薄東海即為郎斟酌綺疏長懸七星杓芳樹梁元帝芬芳君子樹交柯御宿園桂影含秋色一作隨秋月桃花一作色染春源落英逐風聚輕香帶蘂翻藂枝臨北閣灌木隱南軒交讓良宜重成蹊何用言同前沈約發蕚九華隈開跗塞路一作露塞側氛氲非一香參差多異色宿昔寒颷舉摧殘不可識霜雪交橫至對之長歎息同前費昶幸被夕風吹屢得朝光照枝低一作偃疑欲舞花開似含笑長夜路悠悠所思不可召行人早旋返賤妾猶年一作年猶少同前顧野王上林通建章雜樹遍林芳日影桃蹊色風吹梅徑香幽山桂葉落馳道栁條長折榮遺路逺用表莫相忘同前張正見竒樹舒春苑流芳入綺錢合歡分四照同心彰一作影萬年香浮佳氣裏葉映彩雲前欲識揚雄賦金一作含玉滿甘泉同前丘遲芳葉復莫莫一作漠漠嘉實復離離發景傍雲屋凝暉一作輝覆華池輕蜂掇浮頴弱鳥隱深枝一朝容色茂千春長不移同前盧照鄰芳樹本多竒年華復在斯結翠成新幄開紅滿故一作舊枝風歸花歷亂日度影參差容色朝朝落思君君不知同前徐彥伯玉花珍簟上金縷一作鏤畫屏開曉月憐筝柱春風憶鏡臺筝柱春風吹曉月芳樹落花朝暝歇藁砧刀頭未有時攀條拭淚坐相思同前符子圭芳樹宜三月曈曈艷綺年香交珠箔氣隂占緑庭烟小葉風吹長繁花露濯鮮遂令穠李兒折取簮花鈿同前李叔卿春看玫瑰樹西鄰即宋家門深重暗葉墻近度飛花影拂桃隂淺香傳李徑斜靚粧愁日暮流涕向窗紗同前羅隱細蕚一作蘂慢逐風暖香閒破鼻青帝固有心時時漏天意一作動人意去年髙枝猶壓地今年低枝已憔悴吾所以見造化之權變通之理春夏作頭秋冬為尾循環反覆無終已一作反復無窮已人生長短同一軌若使威可以制力可以止則秦皇不肯斂手下沙丘孟賁不合低頭入蒿里伊人强猛猶如此顧我勞生何足恃但願我開素袍傾緑蟻陶陶兀兀大醉於清宵一作青冥白晝間任他上是天下是地採蓮梁簡文帝採蓮歸緑水好沾衣桂舟蘭橈浮江花一作碧水江花玉面兩相似蓮踈藕折香風起香風起白日低採蓮曲使君迷同前二首吳均採蓮渚窈窕舞佳人遊戲五湖採蓮歸發花田葉芳襲衣為君艷一作濃歌世所希世所希有如玉江南弄採蓮曲二作採菱曲菱歌女解珮戲江陽江陽稚女珠腕繩金翠低眉一作搖首紅顔興桂棹容與歌採菱歌採菱心未移一作怡翳羅袖望所思同前李康成採蓮去月沒春江曙翠叉一作鈿紅袖水中央青荷蓮子雜衣香雲起風生歸路長歸路長那得久各回船兩搖手同前王勃採蓮歸緑水芙蓉衣秋風起浪鳬鴈飛桂棹蘭橈下長浦羅裙玉腕搖輕櫓葉嶼花潭極望平江謳越吹相思苦相思苦佳期不可駐塞外征夫猶未還江南採蓮今已暮今已暮採蓮花渠今那必盡倡家官道城南把桑葉何如江上採蓮花蓮花復蓮花花葉何重疊葉翠本羞眉花紅强如頰佳人不在茲一作茲期悵望别離時牽花憐共蒂折藕愛連絲故情無一作何處所新物徒華滋不惜西津交珮解還羞北海鴈書遲採蓮歌有節採蓮夜未歇正逄浩蕩江上風一有又值徘徊江上月徘徊蓮浦夜相逄吳姬越女何丰茸共問寒光千里外征客關山路一作更幾重同前閻朝隱採蓮女採蓮舟春日春江碧水流蓮花一作衣承玉釧蓮刺罥銀鈎薄暮斂容歌一曲氛氲香氣滿汀洲同前鄭愔錦䋏沙棠艦羅帶石榴裙緑縹采荷芰清江日稍曛魚鳥爭唼喋花木相芬氛不覺芳洲暮棹歌處處聞同前徐元之越艷荆姝慣採蓮蘭橈畫楫滿長川秋來江水澄如練映水紅粧如可見此時蓮浦珠翠光此日荷風羅綺香纎手周遊不暫息紅英爛漫殊未極夕鳥棲林人欲稀長歌哀怨採蓮歸同前張敬徽逰女泛江晴蓮紅水復清競多愁日暮爭疾畏船傾波動疑叉落風生覺袖輕相看未盡意歸浦棹歌聲同前賀知章稽山罷霧鬱嵳峩鏡水無風也自波莫言春度芳菲盡别有中流採芰荷同前李白若邪溪邉一作傍採蓮女笑隔荷花共人語日照紅一作新粧水底明風飄羅一作香袖空中舉岸上誰家逰冶郎三三五五映垂楊紫騮嘶入落花去對此踟蹰空斷腸同前儲光羲淺渚荷一作荇花繁深塘菱一作潭菱葉踈獨往方自獲一作得耻邀淇上姝廣江無阡陌一作街陌大澤絶方隅浪中海童語流下鮫人居春荻一作鴈時隱舟新荷一作萍復滿湖采采乘日暮不思賢與愚同前李頎越溪女越溪蓮齊菡蓞雙嬋姢嬉遊向何處採摘且同船浩唱發容與清波生漪漣時逄島嶼泊幾伴鴛鴦眠襟袖既盈溢馨香亦相傳薄暮歸去來苧蘿生碧烟同前張朝朝出沙頭日正紅晚來雲起半江中賴逄鄰女曽相識並著蓮舟不畏風同前楊衡凝鮮霧渚夕陽艷緑波風魚逰乍散藻露重稍欹紅楚客傷暮節吳娃泣敗藂促令芳本固寧望雪霜中同前方干採蓮女兒避殘熱隔夜相期侵早發指剝春葱腕似雪畫橈輕撥蒲根月蘭舟遲速有輸贏先到河灣賭何物才到河灣分首去散在花間不知處採菊梁簡文帝日精麗草散秋株洛陽小婦絶妍姝相喚提筐採菊珠朝起露濕沾羅襦東方千騎從驪駒更不下山逄故夫採菱女費昶妾家五湖口采菱五湖側玉靣不關粧一作翠雙眉本青色日斜天欲暮風生浪未息宛在水中央空作兩相憶同前劉禹錫白馬湖秋日紫光菱如錦綵鴛鴦翔一作白馬湖平秋日光紫菱如錦綵鴛翔蕩舟逰女滿中央採菱不顧馬上郎爭多逐勝紛相向時轉蘭橈破輕浪長鬟弱袂動參差叉影釧紋一作文浮蕩漾笑語哇咬顧晚暉蓼花緑一作緣岸扣船一作舷歸歸來共到市橋步野蔓繫船萍惹一作滿衣家家竹樓臨廣陌下有連檣多估客携觴薦芰夜經過醉踏大堤相應歌屈平祠下沅江水月照寒波白烟起一曲南音此地聞長安北望三千里同前白日期何去青春只自矜艷歌呈幾曲江畔採新菱望浦思同濟輕舟喜共乘翠一作葉將眉比色聲與調相應蕩漾微波散清泠逺水澄更看池際影若對玉壺氷青青河畔草何遜春蘭已應好折花望逺道秋夜苦復長抱枕向空牀吹臺下促節不言於此别歌筵掩團扇何時一相見絃絶猶依軫葉落裁下枝即此雖云别方我未成離同前沈約漠漠牀上塵心中憶故人故人不可憶中夜長歎息歎息想容儀不言長别離别離稍已久空牀寄杯酒文苑英華卷二百八
