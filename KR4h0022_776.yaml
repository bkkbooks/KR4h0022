body:
  text: 文苑英華卷七百七十七宋李昉等編宫闕上九成宫頌一首宫闕上九成宫頌一首并序王勃臣聞在天垂曜璿宫列乾象之墟在地班形珠闕鎮坤靈之野洎夫三精軿運即寥廓而為宫九聖旋游遍洪荒而可宅則有瑶房玊室崑山分大帝之庭金屋銀臺滄海濯𤣥元之宇豈非神明其道騁仙轡於無垠浩蕩其居示清都於不宰若夫扄牖六合奔走八神占日月而揆山川駕隂陽而法天地非聖人其孰能與於此乎至若文開遁甲仇峯成蒼后之躔樂奏鈞天峒嶺駐黃軒之駕業融環堵下姑射而尋真道濟巖廊望衡山而展事斯則三階遍下唯臨布政之宫六位時乘未闕巡方之館其後兩龍齊鶩抗瓊闥而同嬉八駿髙驤指瑶池而結興殷風不競砂丘雄别館之娛秦道無章雲閣徇殊庭之賞於是功虧大壯頌闕祈招豐屋同忘危輈繼及遂使來年此句疑侯跡名山為縱觀之場並海遵河沃野盡行宫之地皇天震怒於上蒼黎氓慟哭于下土其有斟酌千古文明一代蒿官不陋茨山可仰靳成東嶽唐帝復衢室之尊用饗西岐天子合鈞臺之運得其道也一作者蓋有存焉國家梯一作張霄架極罄域裁基纂髙丘白雲之𦙍鬱函都紫氣之兆宸扉既闢一宇宙而來王聖籙潜躋二乾坤而作帝髙祖天旗夜立制黃鳥而先驅太宗日馭晨飛驂緑蟠而首出雖立極承祧之業進燭前文而重光纍洽之符歸功下武陛下承靈太一踵睿登三星虹沓祉電一作雷虬發慶丹書碧篆神符煥河洛之文王斗珠衡天骨挺皇王之表用能捨桐圭而瑄匕鬯肅玊籍而揖宗祧寫藹九天騰景萬里御風雷七曜於上博臨之功顯用山川六府而下輔相之冝得𤣥宫密運敷造化於靈襟黃屋神凝創經綸於寶思鳯闈宵靜隂靈宣玊閫之華鶴禁朝趨離象峻銅樓之景川分帝子控鯤壑而疏源嶽動天孫擁熊山而列鎮其化成也如彼其强幹也如此猶乃停旒正室嚴纊中軒玉階匪泰金門為險佇虹旃於月澗嶽瀆生光飛鶴槧於煙臯江湖動色桃溪逸彥塞丹井而歸風松磴遺英斬𤣥關而奉制位兼河海九卿參巨濟之功道合星辰三事鬱經天之象朱轓緝化泣故老於中溪墨綬宣風繞春童於上陌王化之基一作之期已洽天工之代有序建銅儀而測曜象一作寶緯齊懸按璿璣而書雲禎氛一作氣疊舉祥唈十二紫鵷調夏谷之音大禮三千頳蛇應黃鐘之曲蠶功順令業著於青裳蜃磨迎春恩周於黛耜黃砂靜讞爽鳩興頓足之悲丹石銷寃神獬輟推鋒之計詠時和於帝壤動植咸歡歌道泰於華封昆蟲自樂星墟列將輝玉節而長驅天䇿神兵下金壇而决勝橫麾赤岅葱山成不戰之郊命作㑹繳青丘桃野見其亡之兆煙馳火徼勵珠産而移琛雪鶩氷洲駕瑶溪而納賮乾坤徑復載遵赤縣之封曦望環周未出黃圖之域故夫含吐萬物至功也制平八表大業也一隂一陽神通也乃文乃武聖圖也用能使天不愛寶地不藏珍日月五行風雲四序龍章鳯彩鳥奕於郊墟黃鉉紫玉磊砢於坰囿集風雲於翠箑浴甘露於朱英澤馬飛鏕山輿結轍殊徽狎至祥書竭東郭之毫纍譯同歸朝册盡南山之竹然後瑶壇備物陳帝服而展皇儀后室疇庸登太山而小天下功𢎞事畢狹廣宙而三遷風舉雲搖厯神都而一憩考遺基於汶上稽故典於淹中光總章之瑞紀嗣乾封之寶厯大矣哉升中作睿握四海而為尊則大斯模肇三宫而配永憑大室而髙視靈壇八百坐明堂而恭已諸侯一萬時既貞矣襄城一作域非辭訪道之逰功既成矣𤣥圃頓尋仙之駕由是南宫奏議和𤣥禁而成章西土謳歌指皇輿而佇眷咸以珍臺靚穆陽靈開避暑之宫清序鈞調景福制追凉之殿然則髙棟深宇威神之大節也順氣發生巡逰之大功也况乎石城金室一作屋編輿井鬼一作近論輿思之區珠藪瑶池宛在秦豳之境應雷軿而出豫蒼帝其時面炎馭而思和朱明不逺雖塗吟野忭黎元欣望幸之符而屈已從人天子下勞謙之詔候離局而從宴尚惕三危清近縣而移鑾猶詳再駕以為三十六所帝劉非舜禹之心四十二宫全趙異成康之厯詠荆臺而夕厲思蒲坂而晨凝方奉後天之期俯順觀風之請萬靈禔祉三辰合慶姬文考筮容成奏日千旌鳯轉儼鏤象而星陳萬騎龍嘶伐靈鼉而曉應靜帷宫於緑野肅帳殿於黃街奔欃槍而走陸梁陳浮靈而候明月前驅雷竦下列缺於騰鞭後乘雷驚起豐隆於驟轂瓊戈晝按太陽疲轉日之鋒玉劍宵翻懸象睹衝一作衛星之氣天旋霧散嶽運川回林兵護野方臣疑作方神班固東都賦山靈護野屬御方神兼頌第十七再用啓路黃麾紫蓋雜精氣而西浮雲動神行背封巒而右指吐霧馳風以臻夫九成宫禮也爾時峯橫地乳景戴天糜分閬井而圖基䕃秦星而耀址靈墟寶藏代興汧雍之間峻阜長岑疊鎮岐梁之域丹溪碧洞吐納虹霓偃一作灌柏叢篁騰遷雨霧獲秦餘於故兆地擬林光訪周舊於遺風山連水滸前趨劒棧玉壘千尋傍望斗城金墉萬仭架隂丘而北走境瞰鄜祠分沓鄣而西馳塗交隴坂仙都密爾猶連上苑之扄靈宫巋然直透崇岡之曲即礄基於澗道利在斯干固拱木於虞衡規同匪日彌峯跨谷層城萬轉厯險乘危回廊四注山祗畫石出徼道而終年風伯贏糧半長途而中宿架千樓而致極疑作㮹極揚雄甘泉賦㮹北極之嶟嶟爛若神扶羅萬戶而窺天巍如化立離堂早照皎日籠光於綺寮合殿宵深歸雲納影於重廡珉房砥室畫拱相望緑岫紅巖雕櫳間出𤣥熊蚺䗊俯棟宇一作相而危心青鳥歸飛仰靈軒而墜翼轉飛檐於秀㠋上出重冥䕃反宇於回溪下臨無地紅葩紫的垂倒井而披文金鎖銀鋪接重扄而炫色儼鉤陳於漢陌太階非逺設陛㦸於煙莊仙梯可陟華璫璧散掛明月於崇朝密網珠連落奔星於已曙丹梁一作梁發秀彩沓虹文皓璧凝鮮光涵蜃氣銅龍對霤接飛泉而瀑流一作灑鐵鳯連甍傃還颷而佇立雖南纒統序北室開榮一作北屋開辰凛徑氣於叢楹起凄風於洞穴一作間踆烏失轡出澗戶而無光金兔低輪下山扉而變色隂庭阻夏祝融無竊據之因邃屋乘一作乖春顓頊定忘歸之䇿飛亷扣響赴北闕而神寒屏翳收津局南端而股戰蒼蒼八桂白露為霜落落千松𤣥隂昧景金人列陛來危砌而思裘玉女窺窗伏增巒而請纊陽秋代駕不凋仙圃之華天一作增地為爐未解幽陵之凍至若氣清乾步景霽山維栖翠藹於崇榮列朱霞於復榭瓊枝纍道移綴文㮰碧樹周阿光搖鏤檻靜簾帷而洞啓穆羽相和肅坻堮而天臨纎塵不動宸儀有晬蓬萊與城闕俱榮羣后多歡蘿薜共簮裾合賞巖花落砌綴龍扆而成文嶂葉交軒拂鸞旗而追影爐峯轉藹香傳玉几之風石瀨鳴湍響入銅壺之水乃有稜一作陵陽駕鶴奉丹墀而稱臣子晉吟鸞下青蒲而謁帝箕精失耀傅說恭命於東廂昴宿低芒庭堅奉職於西序三臺九署雲端極目霓裳風髻闕下相尋張良卧疾攀赤松而有地綺季來朝歌紫芝而忘返若夫功成旰食道濟宵衣漢宫追聽覽之餘堯殿得巡來之隙霞登月憩光睿幸於彤闈玉振金聲藻宸章於翠掖洛陽才子承閒盡宣室之談蜀郡詞人還奏動甘泉之賦復有軒庭十四出桂閫而乘茵永巷三千望椒塗而奉幣翊鸞臺之廣宴扈鴛砌之仙逰羅綺芳兮四面春環珮鳴兮九重暮風閨夕敞携少女於歌筵月幌宵朧下姮娥於舞席𤣥房娭宴雲姬辭豹尾之歡紺幄承顔星媛入魚鱗之戲若乃屯營櫛比對閣道而斜趨廨寺棊分混文昌而外屬周朝瑞鸑聲參叶律之宫陳寶鳴雞響雜司晨之序名都廣㑹閭閻萬室帝籞仙垣亭臯千里山村野孰家連菌草之園谷飲川居戶有桃符之水故夫恩加草樹囿原澤而無私道被翔行苑山川而不禁每至旻天戒序髙風嘯律虞官獻秋獮之儀司馬奉梁騶之典將軍布卒略𤣥灞而東馳都尉關營統擬作繞張衡西京賦繞黃山而欵牛首黃山而北睇於是逄䝉列階蚩尤並轂材官發射期門走仭杖𤣥麾而直指鶚視千羣奮朱鬛而橫行龍驤萬計曾旗廣斾出宇宙而三驅疊鼓鳴鐘連一作運雷霆而一呼前旌逐日夸父斷洪河之流後騎趨山共伯挾崑崙之柱近陵吐焰縟奔電於長鋒灌莾生塵隕飛霜於徑鏃合戈鋌而照地猛兕知窮振罟網而籠天騰龍失據崩林磔石毛羣無挺險之資䕃澤風山羽族落垂雲之影長圍􅞃蹀得駿馬於秦坰大輅徜一作翔徉載飛熊於渭浦然後還師振旅考事陳功皮軒按節牙璋復路視餘生於大野誓廣校於長陬腥膻一作班腥於嶻㠔之墟有蠟於長楊之館命奔烽而舉釂火照甘泉總輕騎而行庖雲驚上路聲兼萬籥歌鍾空廣樂之庭禮被三雍玉帛盡塗山之㑹龍胎鳳卵入禹膳而調芳石乳瓊漿委堯樽而湛色恩霑一作露下帛宴液仙宫雖大夫思濯鷁之歡而天子可回鸞之奏然後拜釐清廟考德齊宫用𤣥功而不有宅太虛而無迹動崇易簡規萬祀而化黃金道貫幽明徴百靈而響丹甑得𤣥珠於舜海尚驚氷危朗天鏡於堯儀猶勤日晏䖍恭上帝東朝懸待諌之旌清問下人南面聽登聞之鼓則有郊童俟蹕敢讓天師野老排閽唯歌帝力風行比屋忠臣收折檻之謀化溢康衢良使息埋輪之請設神規而動俗庶績其凝握元符而發祉殊方合應華胥已泰濟羣生於不死之庭閭閻可觀致仙厯於無窮之境蕩蕩乎發育萬物而顯諸仁洋洋乎包舉六氣而藏諸用均兩儀而得一耻三皇而不四者矣臣勃東臯賤節北阜幽姿常叨召見之恩驟玷明敡之列書生謁相望闕推輪下客逰梁榮參賜帛終童立志空投函谷之繻馬令同時未給尚書之筆雖𤣥機妙鍵已寂兆於忘言而詠德陳功請追聲於匪頌其詞曰九門浩蕩三山超忽帝坐金房仙成玉闕浮丹麗紫栖霞冠月真匠難徴虛談易越其一旋窺鳳紀極睇龍墳曾巢化沒上棟爻一作支分茅宫蔽雨松殿來雲猶迷匪陋尚缺斯文其二道倫明一風遷繼五禮讃三宫詩歌百堵黃圖未洽紫庭無輔局促墉垣逡巡度矩其三盛衰環襲冲盈舛鶩璿宇夏關瑶扄殷樹奢窮地絡毒流天步相曰一作日遄奔尋雲速仆其四災延六國運逼三川分雄競侈禮僣圗全飛甍月徑列廡霞阡乾溪敗楚碣石亡燕其五阿房秦構文軒五里建章漢立仙闥萬扈疑作戺詭代齊徑一作涇疑違天縱已望夷有舋甘泉不祀其六宛郊嗣籙譙鄉警衆蜀跨梁岷吳吞楚夢相宜裁軌崇楹纍棟雲闕同華泉臺罕共其七晉圖給疑作終否朝疑作胡風肆極霧黷丹圍塵埋紫域皇階不守帝庭無色帳殿相臨氊墻間飾其八南承有宋北洎亡隋功慙戶牖守在城池樓船水覘車陳山窺吳庭再毁代鼎三移其九火德初融江陽裘疑旅奄收淮船遂朝吳渚象措疑驕秦龍舟壞楚雄圗乃溢傾宫不處其十海嶽呈華風雷寫慶剪諸戎首光我靈命紫氣雲蒸黃星月映􅞂商為業遵唐啓聖其十一景閟丹繩祥抽翠籙格天垂範模神鶩躅朱極重光黃離繼旭道清金鏡時和玉燭其十二澄規鳳閫育訓鸞闈桐宫宿列桂邸霞飛台精變道嶽耀裁幾朝盈振鷺境北馴翬其十三武韜弓矢文經步驟爽鳩議獄龍師掌奏玉帛華夷提封宇宙譯書嵗欵祥圗月凑其十四帝功得一乾元用九鏤玉天齊塗金社首神京四邑明堂八牖燮而可大為而不有其十五曾宫望幸幸封佇恱伺隟披圗乘時徒疑轍赤駵俟駕蒼虬按節月車宵移星闈曉列其十六方神護野嶽將清塗回麾嶠路逗蹕山樞千靈電驚萬辟風趨鈞臺有問峒岫無虞其十七五城分秀雙巒抗影畫栱彌峯雕甍亘嶺煙閨夜謐雲房晝靜竹殿栖寒松軒祕景其十八紫庭晨御彤闈早闢天子凝旒辟公奉璧薜蘿齊致簮裾混迹仙鶴隨輪靈鳬墜舄其十九風扄濬敞震廊藻邃玉綱星開金鋪月墜山樓獸矯雲臺鳥次復鄣披丹回流轉翠其二十仇夷聖宅姑射神心樂翔丹鳳使引青禽羲壇葉暗禹洞花深沼分瑶水花跨珠林其二十一順時宣節分戎講將星騎朝飛雲露夕張寶雞獲祉非熊入貺駕掩岐搜禮髙奏疑作秦望其二十二酆庭未逺塗山有戮襄野迷軒清都宥穆罕夷乾步徒豐帝屋光總大猶允歸天祿其二十三命宫垂訓靈臺韻雅功映寰中頌流天下皇圖已泰鴻筆難假帝有力焉惡疑非能者其二十四文苑英華卷七百七十七
