body:
  text: 文苑英華卷六百四十四宋李昉等編陳請請亡母邑號狀一首請公除狀三首論清舜廟狀一首處州請隨例行香狀一首請施行六典開元禮狀一首奏新羅請廣利方狀一首請孫守亮代男行營事狀一首為南承嗣請從軍狀一首請行軍司馬及少尹狀一首奏請不敘録將士狀一首奏請東都灑掃狀一首間廄使奏判官改名狀一首請立前節度使李德裕德政碑文狀為長安馬明府亡母請邑號狀宋之問臣亡母在於一作屬在外戚夙忝末姻不蔭慶雲早先朝露臣髮膚遺體是亡母所生金紫通班乃聖朝所賜臣每服一輕妙嘗一甘鮮何曽不逺愧劬勞近慚榮寵又見同列有太君拜邑命婦入朝臣早孤偏不勝感羡母因子貴幸者何多祿不及親臣獨含恨眀年某月改葬有期私門大事莫踰于此臣內寡材術謬忝朝恩外無愆尤夙承母訓郡縣之號翻及臣妻哀榮之禮不霑臣母臣生不侍養歿未追榮若懼不敢祈恩偷生以安厚祿儻歸泉壤何對慈顔臣死罪死罪臣凖某年月日制令加一階伏乞回臣此階追贈亡母又臣身死之後合有鼓駕出郊在臣何顔存歿叨僣亦許臣亡母用臣威儀臣身當以籧篨存榮死足所祈越禮罪實干誅伏惟陛下孝理寰瀛仁及草木皇室之戚軒冕盛于前朝太后之親恩澤踰于曩日臣幸遇非常之主敢祈不次之恩伏乞陛下少念葭莩垂哀犬馬回臣休寵以慰營魂則今日以前報恩於亡母自茲以後盡命於聖朝無任慊懇悲慕之極謹進狀陳請以聞為政事請公除狀蘇頲臣等聞喪禮俯就所貴從冝古先哲王莫非孝子則知服紀漸變以至於除既除之後無不從吉祔即吉祭示不可踰頃者正自山陵奉安宗廟終服變禮今則其時執而不行將何用禮伏惟皇帝陛下孝思罔極首冠禮經然以神器至公理循故實今尚未臨正殿猶御慘衣夫以安上理人莫善於禮今若順情廢禮何以正人群下顒然不知所措臣等謬陪樞密輒敢陳祈伏乞以禮制情式遵常典無任悚迫之至二臣等伏奉墨制固違羣情一作請未許公除臣等茫然罔知攸措臣聞孝者貴合道禮者貴從宜合道始可行孝從宜始可逹禮况先皇遺旨行孝者共遵國朝舊章逹禮者同守非宜將焉用禮違命豈得稱孝伏以至尊之制與凡庶不同故易月更除以時漸降山陵既畢謂之反虞宗廟當祔無不從吉今若除不易月降不以時豈得虞而不祔尚居喪服所以先儒執禮適變而除王者從權將除必降伏惟聖懷永慕雖增罔極故事不逺孰可虧違臣等至愚期於死請三臣等愚昧頗觀禮典數百年來漢晉間事主天地者不以私廢公行喪紀者故以日易月貞觀之後三宗遺訓著在實録垂之不朽匪臣等敢率下情屢希上逹伏以聖懷罔極孝思永慕失人祗之大願持曽閔之小節使祖宗之禮家國成規陛下因而違之臣等固知其不可皇極神器天下至公曠時不親衆務皆闕阻群情非順也顒顒億庶仰望天光徂夏及秋旬有四月陛下何以承顧託何以撫黎元臣等惶然不知忌諱敢昧死陳請冀垂昭納明日望於别次視事以寧臣子荒迫之心論清舜廟狀右臣謹按地圖舜陵在九嶷之山舜廟在太陽之溪舜陵古老已失太陽溪今不知處秦漢以來置廟山下年代寖逺祠宇不存每有詔書令州縣致祭奠酬荒野恭命而已豈有盛德大業百王師表沒投集作於荒裔陵廟皆無臣謹遵舊制於州西山上已立廟訖特望集作乞天恩許蠲免近廟三五集作一兩家令歲時掃集作拂灑以集作示為恆式豈獨表聖人至德及於萬代實欲彰陛下玄澤被於無窮謹録奏聞勑依處州請隨例行香狀齊映右準式文臣當州不在行香之數伏以聖朝𢎞孝御下崇德追先憑法力于傳香表永懷於率土下垂甲令旁感物情臣州稍以遐逺比于列郡遂漏恩私俱成亭育之中獨隔情禮之外况語桂廣則道里猶近並接衢婺則州望悉同推於等夷倍切誠懇又垂白之老一命之士或生於開元天寶或逮事肅宗代宗從頂至足生成是賴五月六月思慕彌深方當感切之辰難抑衆庶之意臣又以國家榮建寺觀繼度緇黃所種田疇已為優厚食時受供皆荷殊恩忌辰修齋當兹别給如蒙聖澤許同鄰州應緣香燈所需皆率官吏取足於刺史以至末班輕減俸錢敬修法事庶使山越遺老咸覩漢儀海郡具僚率由唐典無任至誠至懇之至代鄭相公請刪定施行六典開元禮狀吕溫右臣聞化人成俗莫大於禮樂垂統建中必資於制度然而忠敬有弊質文異數群儒之得失蜂起歷代之沿革絲棼或榮古而漏今名實交喪或違經而便事本末相忘或煩雜集作褻以為詳或闊略而集作以為要未聞折𠂻以叶通方國家與天惟新改物視聼太宗拯焚溺之餘粗立統紀玄宗承富庶之後方暇論思爰勑宰臣將眀睿旨集儒賢於别殿考古訓於祕文以論材審官之法作大唐六典三十卷以導集作道德齊禮之力作開元新禮一百五十卷網羅遺逸芟剪竒邪亘百代以旁通立一王之定制草奏三復祗令宣示中外星周六紀未有明詔施行遂使祭喪冠婚家猶異禮等威名分官靡成規不時裁正貽弊方逺伏惟睿聖文武皇帝陛下恢纂鴻業升于大猷雷霆奮有截之威日月廓無私之照三叛就戮四夷來賔牛馬放集作散於農郊兵革藏於武庫嚴禋上帝祗受鴻名惟懷永圖不自滿假昧爽聽政子夜觀書處成功而弗休率集作求至理若不及每懷經始則知貞觀之難言念持盈思復開元之盛臣謬沗密集作樞務兼掌圖籍無能輔弼集作匡補已負於恩私有所建集作發明豈先於典禮伏見前件開元禮六典等聖集作先朝所制鬱而未用奉揚遺美允屬欽明然或損益之間討論未盡或弛張之間宜稱不同將貽永代之規必俟集作候不刋之妙臣請於常參官內選學藝優深理識通逺集作敏者三五人就集賢院各盡異同量加刪定然後敢塵集作冀紓睿覽特降德音明下有司著為恆式使公私共守貴賤遵行苟有愆違必正刑憲如此則職官有制將興濟濟之詩風俗大同坐致熙熙之詠見可而獻知無不為輒瀆宸嚴伏增隕越謹狀代淮南杜司徒奏集作論新羅請廣利方狀劉禹錫淮南節度觀察處置等使勑賜貞元廣利方五卷右臣得新羅賀正使抃集作朴如言狀稱請前件方狀一部將歸本國者伏以纂集神效出自聖𠂻藥必易求疾無隱狀搜方脈之祕要拯生靈之夭瘥坐此華胥咸躋仁夀遂令絶域逖聼風聲美茲豐功爰有誠請以其久稱藩附素混車書航海獻琛既以通於華禮釋疴蠲疾集作癘豈獨隔於內集作外區正當四海為家冀覩十全之效臣即欲寫付未敢自專謹録奏聞請孫守亮代男行營事狀代郭子儀于邵右臣前日靣奉進旨前件男領兵馬赴靈州伏以朔方軍幕宿將頗多任以兵權合先勳舊非獨藉其時望亦以厭伏衆心男晞年才成立素不更事雖薄間騎射而未有智謀軍政弛張或非詳練昨緣逆徒在近畿甸多虞令統先軍以當大敵倉皇之際不可固避畢力捐軀幸摧堅陳此天威所及非童子有成欲速赴邊陲實恐未堪專任右廂兵馬使開府孫守亮出身入仕皆在軍行將校畏威士卒懷惠智能料敵勇可摧凶使與渾日進同行必冀免貽聖慮又男晞自幼及長首末隨臣常在私庭未曽逺行深願容其浣濯許以旬月休間他日更有任使敢不奔波道路臣位崇寄重效淺恩深常恐委任失人以速官謗知子者父敢不上陳伏乞天慈俯哀誠請為南承嗣請從軍狀栁宗元故某官贈某官某乙男某官某乙右臣亡父至德之歲死節睢陽陛下每降鴻恩必加褒寵臣自七歲即忝班榮垂五十年常居祿秩再守遐郡績用無成終貽官謗甘就嚴譴無以負荷先志報效殊私以慚以懼隕越無地伏見某月日敕以王承宗負恩干紀命將徂征雷霆所加殘集作殄滅在近臣竊不自揆思竭忠誠願以集作預一卒之任以答百生之幸庶得摧集作推鋒觸刃摩壘搴旗冀獲盡於微誠儻不墜於遺烈踴躍之至夙夜靡集作不寧敢希皇明俯鑒丹懇臣聞周官考藝國子置車甲之司漢道推恩孤兒備羽林之用千秋思奮於事越仲孺期死於奔吳義激君親名高竹帛臣雖無似有慕昔人雖身塗草野死而不朽披肝瀝血昧死上陳無任懇迫憤激集作忠憤之至謹録奏聞伏候敕旨請行軍司馬及少尹狀為人作令狐楚右臣適蒙恩奬獲守方隅力小任大常憂敗纍伏以行軍司馬相副之職知府少尹共理之官未得其人久空此位每均平征賦繕理邉陲實藉通材以分重寄伏惟陛下察臣心之墾欵知軍務之殷繁選於中外為此别二陛下所用即臣所知茍獲同心庶無闕事謹遣某官奉狀奏請為滎陽公奏請不敘録將士狀李商隱使當道將士及管內昭賀等州軍士共二千一百二十六人凖去年五月五日制敘勳階使司去今年四月二十五日具將士姓名及甲授年月日申省訖右臣當道將士等逺當戎寄式控遐陬乘解愠之和寧親矢石望拱辰之列實隔煙波近者朝廷奄靖北方惟荒東道當隂山之哭虜靡效纎埃及天井之摧凶不橫寸草徒以皇帝陛下非煙結彩集作蔭滚露流光向明才及於鳳樓布澤逺霑於蠻徼固合同承國慶共稟朝榮伏以當管近無豐年亦經小水海上有分屯之卒雍南有未返之師歉冗食於居人困裹糧於戎士臣初叨亷問方切拊循雖拾級升階各思受寵而濡毫執簡無以為資仰慮後期敢忘積懼伏見比者諸道有物力未足者聖恩洪貸許且權未敘録竊緣往例冒此上陳伏冀天慈曲垂矜許臣與將士等無任感激冒昧戰越之至為楊贊善奏請東都灑掃狀右臣先臣贈太保其塋在河南縣界臣自終喪紀便參朝倫三年贊道於宫庭千里違離於墳墓竊惟令式合許芟除追逺興情敢希榮於陸曄報恩未死寧自誓於羲之伏乞聖慈特從一作鑒集作允丹懇為間廄使奏判官韓勵改名狀右前件官名與再從叔故媯州參軍自勵向下一字同伏以韓自勵頃因官遊殁於幽朔羈孤未返親黨莫知近始言歸因之合族雖為子之道則慎更明於已孤而諸父之集作具來固難舉諱於其側伏請改名融謹録奏聞伏聼敕旨請立前節度使李德裕德政碑文狀張次宗右伏以勳著王室者則銘於景鍾功及生人者則刋於樂石故扶風存必拜之地峴山有墮一作墜淚之思固有舊章蓋無虗美竊以李某纘慶相門服膺儒業得卻縠詩書之學兼祭遵儒雅之風自授任坤方鎮安全蜀亭戍多警災旱相仍外有定戎一作鎮定之功則城柵相望內有繕完之備則器甲維新強寇將罷其東漁鄰敵自止其南牧况今令一作收行屬郡威肅連營來暮之謡已彰於昔歲去思之美無謝於古人今合境同詞諸郡獻狀雖黃霸入用寵方盛於登賢而鄧侯不留情猶深於愛樹臣謬當交代備聞政能願嗟卧輒之情特允紀功之請無任云云文苑英華卷六百四十四
