body:
  text: 文苑英華巻七百六十八宋李昉等編刑法嗣濮王犯贓請免死議一首将軍王去榮殺人議一首復讐議三首斷屠議一首功臣恕死議一首刑議一首嗣濮王犯贓請免死議裴子餘議曰死者不可復生刑者不可復續故聖人但訊於羣臣仰採爰書俯窺刑鼎應議之科有八議親之意特深犯死之條有二犯贓之刑非重廣骨肉之禮則德盛而教尊崇錐刀之禁則化衰而情莫疑謹按國子司南之嗣爵重阜陵當膠東之榮位齊列無聞樂善有墜昭害疑但以刑故宥過議人不捨武帝忍受於漢親抵罪可矜高祖約法於秦暴則知原情輕重與事淺深哀死者之衘寃不以親而廢法憫生靈之無識不以法而䧟人盗為因官犯罪專殺以盗之此正盗而為輕因殺而非重進雖傷於貪穢退非負於幽寃豈惟乾坤感氣雨露所偏然而睦彼親親湏明惻隠謹議将軍王去榮殺人議并序崔噐右件官打殺本部富平縣令杜徽恩㫖以其能放抛石免死奪官自身配陜郡効力中書舎人賈至等未即行下奏請奉進勑㫖議者臣等伏以法者天地之大典帝王守之猶不敢專也若王去榮者乃敢擅殺是臣下之權過於人主開元已前無者尊朝廷也當今疑為天下主愛無親踈得一去榮而失萬姓何利之有又八議名例都無此名十惡科條乃居其一殺本部縣令而陛下寛之王法不行人倫道屈臣等奉詔不知所從夫國以法勝有恩無威慈母不能使其子養由基射穿七札楚王以為辱國林慮公主男犯法漢君不為減罪賤技則去榮何有受法則林慮可徴晉文棄原取信以信大於原也今陜雖要郡不急於法則海内無處不尅疑况陜郡乎無法也賈至等皆朝之忠良見尅在近此句疑謹議復讐議并序陳子昻臣伏見同州下邽人徐元慶者父爽為縣吏趙師韞所殺卒能手刄父讐束身歸罪議曰先王立禮所以進人也明罰所以齊政也夫枕干讐敵人子之義誅罪禁亂王政之綱然則無義不可以訓人亂綱不可以明法故聖人修禮理内飭法防外使夫守法者不以禮廢刑居禮者不以法傷義然後能暴亂不作亷耻以川文粹作悉興天下所以直道而行也竊見同州下邽人徐元慶先時父為縣令趙師韞所殺元慶潜為集作鬻身傭保為其父報讐手刄師韞束身歸罪雖古烈者新唐書作士亦何以多新唐書作加誠足以激清名教旁感忍辱義士之靡者也然按之國章殺人者死則國家之畫一集作一之法也法之不二新唐書作法不可二元慶宜伏辜又按禮經父讐不同天亦國家勸人之教者也教之不茍元慶不宜誅臣聞昔者刑之所生本以遏亂仁之所利盖以崇德今元慶報父之讐意非亂也行子之道義能仁也仁而無利與亂同誅是曰能刑未可以訓元慶之可宥顯於此矣然邪由正生理必亂作昔禮防至宻其弊不勝先王所以明刑本實由此今倘義元慶之節廢國之刑将為後圖政必多難則元慶之罪不可廢也何者人必有子子必有親親親相讐其亂誰救聖人作始必圖其終非一朝一夕之故所以全其政也故曰信人之義其政不行且夫以私意而害公法仁者不為以公法而狥私義王道不設元慶之所以仁高振古義伏當時新唐書作義動天下以其能忘生而狥集作及於德也今若釋元慶之罪以利其生是奪其德而虧其利非所謂殺身成仁全死無生之節也如臣等所見謂宜正國之法新唐書作典寘之以刑然後旌其閭墓嘉其徽烈可使天下直道而行編之於令永為國典同前柳宗元臣伏見天后時有同州下邽人徐元慶文粹作君先下同者父爽為縣吏趙師韞所殺卒得手刃父讐束身歸罪當時諫臣陳子昻建議誅之而旌其閭且請編之於令永為國典臣竊獨過之臣聞禮之大本盖以防亂也若曰無為賊虐凡為子者殺無赦刑之大本亦以防亂也若曰無為賊虐凡為理者殺無赦其本則合其用則異旌與誅莫得而並焉新唐書作不得並也誅其可旌兹謂濫黷刑甚矣旌其可誅兹謂僣壊禮甚矣果以是示于天下傳於後代趨義者不知所嚮違害者不知所立以是為典可乎盖聖人之制窮理以定賞罰本情以正褒貶統於一而已矣向使刺讞其誠偽考正其曲直原始而求其端則刑禮之用判然離矣何者若元慶之父不䧟於公罪師韞之誅獨以其私怨奮其吏氣虐于非辜州牧不知罪刑官不知問上下蒙冐籲號不聞而元慶能以戴天為大耻枕戈為得禮處心積慮以衝讐人之胷介然自克即死文粹作死而無憾是守禮而行義也執事者宜有慚色将謝之而不暇而又何誅焉其或元慶之父不免於死師韞之誅不愆於法是非死於吏也是死於法也法其可讐乎讐天子之法而戕奉法之吏是悖驁而陵上也執而誅之所以正邦典而又何旌焉且其議曰人必有子子必有親親親相讐其亂誰救是惑於禮也甚矣禮之所謂讐者盖以寃抑沉痛而號無告也非謂抵罪觸法䧟於大戮而曰彼殺之我乃殺之不議曲直暴寡脅弱而已其非經背聖不亦甚哉周禮調人掌司萬人之讐凡殺人而義者令勿讐讐之則死有反殺者邦國交讐之又安得親親相讐也春秋公羊傳曰父不受誅子復讐可也父受誅子復讐此推刄之道復讐不除害今若取此以斷兩下相殺則合於禮矣且夫不忘讐孝也不愛死義也元慶能不越於禮服孝死義是必逹理而聞道者也夫逹理聞道之人豈以其王法為敵讐者哉議者反以為戮黷刑壊禮其不可以為典明矣請下臣議附于文粹有法字令文粹有如字斷斯獄者不宜以前議從事謹議必逹理夫逹理二理字浙本文粹並作禮同前韓愈元和六年九月七日富平縣人梁恱為父報仇殺人四字舊唐志作殺仇人秦果自投於縣請罪勅云復仇舊唐志作報仇殺人自舊唐志作固有彛典以其申寃請罪視死如歸自詣公門發其天性志在狥節本無求生舊唐志有之心二字寧失不經特從減死舊唐志有之法二字宜决杖一百配流循州由是有此議右伏奉今月五日勑復仇㨿禮經則義不同天徴法令則殺人者死禮法二事皆王教之大端有此異同必資論辨宜令都省集議聞奏者朝議郎行尚書職方員外郎上騎都尉韓愈議曰伏以子復父文粹無父字仇見於春秋見於禮記又見舊唐書有於字周官又見舊唐志有於字諸子文粹作信史不可勝數未有非而罪之者也最宜詳於律而律無其條非闕文也盖以為不許復仇則傷孝子之心而乖先王之訓許復仇則人将倚法專殺無以禁止其端矣夫律雖本於聖人然執而行之者有司也經之所明者制有司者也丁寧其義於經而深沒其文於律者其意将文粹作特使法吏一斷於法而經術之士得引經而新唐書作以議也周官曰凡殺人而義者令勿讐讐之則死義新唐書有者字宜也明殺人而不得其宜者子得復讐也此百姓之相讐者也公羊傳曰父不受誅子復仇可也不受誅者罪不當誅也誅者上施於下之辭非百姓之相殺也又周官曰凡報集本新唐書作執仇讐者書於士殺之無罪言将復仇必先言於官則無罪也今陛下垂意典章思立定制惜有司之守憐孝子之心示不自專訪議羣下臣愚以為復仇之名雖同而其事各異或百姓相仇如周官所稱可議於今者或為官吏所誅如公羊所稱不可行文粹作議於今者又周官所稱将復仇先告於士則無罪者若孤稚羸弱抱㣲志而伺敵人之便恐不能自言於官未可以為斷於今也然則殺之與赦不可一例宜定其制曰凡有復父仇者事發具其亊因下二字文粹作申尚書省集議奏聞酌其宜而處之則經律文粹新唐書無律字無失其㫖矣謹議斷屠議崔融議曰春生秋殺天之常道冬狩夏苗國之大事豺祭獸獺祭魚自然之理也一乾豆二賔客不易之義也上自天子下至庶人莫不揮其鸞刀烹之鶴鼎所以充庖厨故能幽明感通人祗輯睦萬㑹要作百王千帝殊塗同歸今若通典作者禁屠宰斷弋獵三驅莫行一切不許便通典作将恐違聖人之逹訓紊明王之善經一不可也且如江南諸州乃以魚為命河西諸國以肉為齋一朝禁止百姓勞弊富者未革貧者難堪二不可也加有㑹要作又貧賤之流刲割為事家業倘失性命不全雖復日戮一人終慮未能揔絶但益恐嚇惟長奸欺外有斷屠之名内誠皷刀者衆勢利依倚請託紛紛三不可也雖好生惡殺是人之小心通典作是君子之小恩而考古㑹今非國諸本有家字之大體但使順月令奉天經造次合禮儀從容中刑典自然人得其性物遂其生何必改革方為盡善伏惟聖主採擇謹議功臣恕死議吕温昔衛蒯瞶以竊國之詐盟其陪臣服冕乘軒三死無與近代惑者為因口號一作因為口實於是乎有功臣恕死之典考諸古訓其異端歟稽諸時事其亂本歟何者有國之柄莫大乎刑賞人生有欲不可以不制天討有罪不可以不刑盖刑者聖王所一作持以佐道德而齊天下者也功濟乎物不可以不賞賞勸乎功不可以不信盖信者聖人所以一號令而惇天下者也然則恕死之典棄信而廢刑何以言之夫立功者自八元十亂之後非盡能賢或有起屠販壟畆行陣之間乘帝王應天順人之勢用力無幾遂貪天功超騰風雲各得變化率勞怙寵崛强自負僣冒無厭見利忘義是宜崇威峻法大為之防而反丹書鐡劵許以不死其功大者可以五作亂而十犯上孰不以暴為無傷乎且人君之言如渙汗不反旣與之要天地誓山河卒倉忽反一旦失馭有黥韓之罪神怒人怨不得已而誅是棄信也若恣行兇險隳突憲綱或姦鋒将發釁逼宗社乃念斯言之玷忍而不誅是廢刑也向者纔得其塵涓之勞集作効螢燭之助而信棄刑廢将焉用之使賢而有功驚寵懼滿自居無過之地何恕死為使愚而有功小人不幸集作知又告以無死是增驕而啓奸適所謂賞之一有以字禍也雖恕之死其能免乎夫其賢如太公忠如伊尹惟君知臣可以勿貳而遽宥以罪死是疑其不終非所以待之以誠而盡君子之心也若乃猾如狗盗庸如黥徒未有罪而先恕之死是不許其慕生亷耻自固名節非所以道之以德而勸小人之善也以為明君之處勞臣也安之以爵禄拘集作䕶之以紀律名之以好惡聳之以禍福使得遷善逺罪保勲全名剖符傳慶與國終始恩斯勤斯是亦極矣柰何撓權亂法以罪寵人墜信賞必罰之典虧昭德塞違之道恐非哲王經邦軌物之制也謹議刑議楊䕫議曰刑可以立乎堯舜不能去不亦深乎曰貳於法而行之茍違之者是不由砥終而紊之則孰若嚴刑而使知畏姑以一宇言之立其墻垣崇其閈閎猶有穴而入者而况於不設乎漢輕其法穽民於禍矣之而不是子更此句疑嗚呼致金於路坐拾者以盗不文苑英華巻七百六十八
