body:
  text: 文苑英華卷四百一宋李昉等編環衛一諸衛上將軍授張奉國上將軍皇城留守制元稹勑環太微諸星有上將次將之例所以拱衛宸極誰何不若句豫置上將軍以禦侮率是道也前皇城留守張奉國謙能養勇明以資忠卑飛翕翼於未擊之前痛心疾首於見危之際常一作能擒狡猾克定妖氛行賞計功屢升榮級朕愛其忠厚難以外遷稍移婁胃之間不失爪牙之任為吾守禁勉爾干城可檢校兵部尚書兼左衛上將依前充皇城使授李演左衛上將軍制白居易勑王者法鈎陳設環列非勳勤之將信近之臣則何以久張爪牙轉置肘腋者也具官李演常從德宗皇帝南搜于梁籍名功臣謂之定難洎出分戎律入拱宸居內外周旋不懈于位交戟之下周廬肅然今之轉遷示益親信移領左廣仍參夏卿夫八屯之警巡七萃之勤墮集作惰爾為其正盡得察之宜惜前勞無隳乃績集作力可依前件授韓公武右驍衛上將軍制勑朝散大夫檢校左散騎常侍兼右金吾衛將軍御史大夫上柱國賜紫金魚袋韓公武我元老之令子也孝於家忠於國故出則秉旄鉞入為執金吾寵任益崇謙敬彌著而勤於夙夜疾癘所侵上陳表章乞就頤飬夫環列之衛集作衛之列心膂之臣雖親信之寄則同而勞逸之間或異宜輟繁重俾從便安可檢校左散騎常侍兼右驍衛將軍御史大夫散官勳如故授左衛上將軍滿存特進檢校司徒仍復長城郡開國公食邑三千户制錢珝勑昔孟明視荀林父之為將也獲罪于二君或敗以見囚或歸而請死彼秦穆晉景之為君卒能宥而復用朕雖涼德寧昧於諸侯之霸者哉具官滿存頃列將壇頗懷臣節且聞禁暴斯有功能一作斯甚有經未嘗敢驕一作驕矜欲保勳績而爾之前事人亦公言幸無爭歃之盟但逼自焚之勢洎乎連坐得以惟輕懼罪而不懈於心補過而願陳其力是用徴為環尹兼復疏封載加論道之名俾重棄瑕之典庶乎有位知我念功可授寧逺軍節度使蓋寓左武衛上將軍制前人勑環衛之設貴同命卿有以大將軍之名加其秩者賞典彌重具官蓋寓凡天下統帥將佐勤勞每至賞勳鮮當仗鉞吾以克用事君有偉節匡國有大功而寓預謀必忠推誠必順致我藩后光于册書是以特越舊章授之師律頗能謙讓復願改張得不表以寵休陟居戎列仍遂再三之請俾圗始卒之心直舉訓辭是為嘉善可授右威衛上將軍契苾璋威衛上將軍制薛廷圭勑具官契苾璋尚齒酬勞固聞於戎典念功求舊式勸於後生朕嘗因坐朝周視百辟有峩冠擔圭華髮承辨鷹揚鶚立於墀廡之上者一旦便殿詢于宰臣且曰衛將軍璋也夙號良將實著軍功嘗擁節旄兼聞善政自處之環衛委以腹心闢彼汙萊盡作文王之囿化其士卒皆為君子之營而耆艾服勤班資不稱積薪之歎達我聽聞俾升上將之尊不假三師之貴吾於爾輩無吝優恩勉服軒裳共致寧謐可左右衛大將軍授嗣鄭王希言右衛大將軍制蘇頲門下銀青光祿大夫僕卿貟外置同正員上柱國嗣鄭王希言才推近屬行稟中和用沈厚以為謀體直方而成器頻升列棘之位嘗踐執金之秩歷官斯久更事逾深必在親賢用膺心膂宜領右軍之寄仍直大將之任可雲麾將軍守右衛大將軍勳封如故金吾衛大將軍授烏薄利左金吾衛大將軍制李嶠鸞臺冠軍大將軍行右豹韜衛將軍員外置檢校源頭州督良鄉縣開國男烏薄利族茂蕃庭位參朝佐懷恩慕化守義全忠宜錫殊榮以旌美烈可左金吾衛大將軍主者施行授河內髙平王重規等大將軍制鸞臺昔程李二將分領東西之宅周邵兩藩並行南北之化兼此重務允歸賢戚右金吾衛大將軍兼檢校洛州長史上柱國河內郡王懿宗司屬卿兼檢校并州長史上柱國髙平王重規並麟趾英髦犬牙良翰承朱紱之寵命奉玈一作銅又作彤弓之征伐勳藏天府名入史圖或誰何警巡忘晝夜之倦或敦敘宴翼協親疏之理題輿河輔而桴鼓希聞别乘汾陽一作坰而狴牢不葺勤誠著於文武美績宣於內外爪牙任切都輦寄深求賢審官不踰伯叔之國叶心共理佇觀兄弟之政懿宗可左金吾衛大將軍依舊檢校洛州長史重規可右金吾衛大將軍依舊檢校并州長史勳封并如故主者施行授李延昌左金吾衛大將軍制蘇頲黃門兵戈之容是憑於師律輿馬之飾允屬於徼巡自匪周才孰當兹任衛尉卿兼檢校左金吾衛大將軍上柱國李延昌倜儻為用堅剛立誠學優典墳言綜韜略賈勇聞義則輕於九死好謀盡忠則隱如一敵自膺刺姦之寵雅叶彈違之務正名不拜何以光於執金教戰或忘何以勵其投石宜踐迹於中尉俾疇能於亞夫可右雲麾將軍守左金吾衛大將軍勳封如故仍充朔方後軍大總管授王斛斯兼左金吾衛大將軍制孫逖門下左羽林大將軍兼范陽大都督府長史充范陽節度經略度支營田副大使王斛斯推誠勵節好勇能謀政必有經舉無遺策久鎮幽朔勤修訓練既摧凶以制勝亦懋賞以疇庸而環衛之職金吾尤重宜承後一作優命以寵中權可守左金吾衛大將軍兼范陽大都督府長史餘如故驍衛大將軍授郭虔瓘右驍衛大將軍等制蘇頲黃門有功必賞勸所以教人立志為邦作程者也雲麾將軍檢校右驍衛將軍兼北庭都護瀚海軍經略使全山道副大揔管招慰營田等使上柱國太原縣開國公郭虔瓘宣威將軍守右驍衛羽翊府中郎將檢校伊川刺史兼伊吾軍使借紫金魚袋上柱國介休縣開國公郭知運等負將帥之才展熊羆之效義烈忠壯以詢其謀一作以詢其誠智謀勇敢不愆其策頃者邉一作某庭之際孤城獨守戎羯困乏歲時圍逼矢石交下金湯自堅護甘漢之所歷懷范羌而莫至獨能宣我王命殫其士力不顧左殷仍於右斷厥功至矣朕甚嘉之宜登絶席之任方盛題坐之禮虔瓘可冠軍大將軍右驍衛大將軍知運可雲麾將軍右驍衛將軍餘各如故仍各賜衣一副并金帶主者施行授張直方左驍衛大將軍制杜牧勑朕據南面之尊制一代之命先謹集作講百官之法後行集作理四方之政若有罪不問是倒持大阿有頑不磨是廢去砥石則拱視天下何以為理雲麾將軍起復檢校刑部尚書兼右羽林軍統軍御史大夫張直方席其先人任為邊將披誠向闕執玉來朝近臣勞郊大匠理第典兵於禁門之內立侍於交戟之中校其寵榮無與等比而乃每輕法檢恣為遨蕩擅去宿衛潛逰異縣有司問狀持舌不言以至再三姑引愆闕古人有云語人必於其倫觀過各於其黨念其生自戎族素不鐫琢既觸法網亦可矜容加膝墜泉豫常自慎小懲大誡爾宜知恩不失將軍之榮仍存兼官之重足得湔洗以俟甄升可銀青光祿大夫檢校刑部尚書兼左驍衛大將軍御史大夫授前左千牛衛大將軍李鎔右驍衛大將軍右千牛將軍江繼美加兼檢校右散騎常侍制錢珝勑具官李鎔等大將軍之設有以揔勳翊折衝之屬者有以司禁衛門籍之法者非嚴謹恭願不可輒居以鎔處交戟之門有勳可庇嚴而能謹蓋稟於家以繼美當􅔷珠之名有勇可使恭而且願復秉於心咸以美材俾遷上列兼秩之寵勸善並行可授劉思謙驍衛大將軍李瓘金吾將軍等制薛廷圭勑具官劉思謙等大將軍齊之三公執金吾漢之中尉或分黃麾坐正殿之前或佩橫刀立天子之側親近寵貴莫之與京以思謙等昔在艱難不渝風雨克保臣節能知武經而瓘祖考勳名功格上下副朕基構克勤班行清修自持儒雅有守朕言念後生遘諸多艱朝施勞於旄鉞莫置位於公侯獨爾寂寥未聞熏灼自待之意何其偉歟賞延之典兹用歉鬱屬有虗位先求舊人俾升喉舌之官以申帶礪之旨爾其服我寵光為吾心腹侍衛巡警勉於在公佇聞恪居領軍大將軍授杜叔良左領軍衛大將軍制元稹勑十二衛大將軍典掌禁旅張皇六師猶藩垣之捧宸極也為任不細是以出則授以弧矢靖烽燧於邊庭入則委以爪牙領貔貅於魏闕中外遞用僉謂恩榮前朔方靈鹽定逺等城節度副大使知節度事觀察處置押蕃落等使元從奉天定難功臣開府儀同三司檢校工部尚書兼靈州大都督府長史大夫上柱國安定郡王食邑三千户杜叔良將門之子不墜弓裘頗閲詩書素明韜略頃以五原近寇禦侮才難遂俾驅攘實資毅勇星霜屢換節制斯勤雖不立奇功而無忘慎固尚多毗倚乃命徼巡勉服新恩以彰前效可驃騎大將軍行左領軍衛大將軍元從功臣勳封如故授前左武衛將軍李儔左領軍衛大將軍前右監門衛大將軍江繼美左領軍衛大將軍制錢珝勑具官李儔等王者之居率先警衛將軍之令必勝戒嚴儔與繼美皆以綘服青綬常立於西序矣在列甚謹其勤亦多戎容頗稱於抱材家食且聞其處困故以左右領軍之命並而進之兼罷秩巳來為日斯久咸從遷陟用舉滯淹可千牛大將軍授前威勇軍節度都指揮使楊承襲左千牛衛大將軍制勑拊瑟琴者其聲不諧尚或改而張之况軍旅大事利害可論姑務變通且期寧謐具官楊承襲素以材力聞于朝廷皆屬興師乃思致勇而時惟黷武未足經邦每念殘人遂能屈已既從休息何必訓齊爾其罷彼戎機來歸環衛職親任重假寵甚多無懷逆命之謀宜奉徴還之召况參宿衛亦在促裝可授牟崇厚右千牛大將軍等制勑具官牟崇厚等罷行部者入則率執刀之屬以居其官去宿衛者出則勸賣劍之人以成其政中外迭用典故甚明崇厚嘗分吾憂知其理之急善有聞也漢謨能率爾職戒有備之嚴勤可稱也家食皆久賦祿甚宜勿墮疑作惰勿踰疑作偷以期無咎可羽林大將軍授周仁軌左羽林大將軍制蘇頲門下周禮命卿六師成務漢圖拜將三傑推才光祿大夫行光祿卿兼檢校并州大都督府長史上柱國汝南郡開國公周仁軌執心剛強臨事果決衛青奉法必讓其功師丹守正每聞其直彼汾之間近胡之備吏人仰化戎虜憚威羽翼任隆爪牙寄重宜光絶席用應題坐可鎮軍大將軍行左羽林衛大將軍兼檢校并州大都督府長史勳封如故主者施行授薛訥若右羽林軍大將軍制黃門出師禦寇功成於告捷振旅休兵禮備於刑賞攝左羽林軍將軍借紫金魚袋薛訥勳閥良將邦家老臣讀太公之立言受穰苴之為法德業中邃墻仞罕窺智謀宏逺泉源不竭須佇公孫之績頗蠲孟明之罪遂能長驅隴上深入湟中殱厥犬戎殘其蠆毒野無遺孽朝有茂勳宜應設壇之寵俾光期門之寄可右羽林大將軍上柱國河東郡開國公仍賜物三百假銀五百兩錢二百貫主者施行授髙仙芝右羽林軍大將軍制門下四鎮經略副使前右羽林軍大將軍員外置同正員密雲縣開國男賜紫金魚袋上柱國高仙芝素稱驍悍兼聞智略久在戎場夙推武用才有所適禮則從權宜復官資更為邊扞可起復右羽林軍大將軍貟外置同正員授王士則右羽林大將軍制白居易勑羽林所設上法星文軍衛之中號為雄重稱兹選任不易其人左驍衛將軍王士則勳戚之家義方之子發身學劔餘力知書早踐班榮纍參環列職近而身彌檢慎任久而心益恭勤卑以自居勞而無伐况一備禁衛四為偏將滯於久次宜有超遷集作升俾領上將仍升集作遷右廣統良家之騎士訓期門之材官寵任不輕無墮於事可右羽林大將軍授前驍衛大將軍劉崇文左羽林大將軍知軍事等制錢珝勑具官劉崇文等漢家揔率禁軍有北軍南軍之號今羽林領軍之職蓋近之矣崇文廷美常以赳赳之材對濟濟之列稱夫環衛立在西階今復命之俾無遺者勉揚威烈勿怠警巡桂林屬城頗參戎俗以若納久當官次多達物情分我逺夏資其惠政入居出守各慎所為懸法甚明賞善斯至可文苑英華卷四百一
