body:
  text: 文苑英華卷四百六十八宋李昉等編蕃書一回鶻書與回鶻可汗書陸贄皇帝兄敬問可汗弟兩國同集作和好積有嵗年申之以婚姻約之以兄弟誠信至重情義至深頃因集作屬賊臣背恩構成嫌釁天不長惡尋已誅夷集作尋正典刑使我弟兄恩好如舊周皓及踏本啜黑達達等至得弟來書省覽久之良以為慰弟天資雄傑智識通明集作性禀聰明親仁善鄰敦信明義罷戰爭之患𢎞禮讓之風保合太和用寧區宇集作域惟茲盛美何以加焉朕之素懷與弟叶契為君之道本務愛人同日月之照臨體天地之覆育其集作期於廣被彼此何殊况纍代以來繼敦姻戚與弟俱承先業所宜遵奉令圖集作猷自茲以還集作來情契彌固垂之百代永永無窮緬想至誠當集作必同此意所附踏本啜奏請降公主姻不失舊頗叶通規待弟表到即依所請宣示百寮擇日發遣緣諸軍兵馬收京破賊頻立功勳賞給數多府藏集作庫虛竭其馬價物且付十二萬匹至來年三月更發遣一艤餘並續續支付弟宜悉也安西北庭使人集作艤次入奏今並知歸本道至彼宜差人送過令其速達弟所寄馬並到深愧厚意與回鶻可汗書白居易皇帝敬問回鶻可汗夏熱想比佳適可汗有雄武之姿英果之略統制諸部君長一方纂承前修繼守舊好故得邑落蕃盛士馬精強連挫西戎永藩中夏况嚮風之義每勤於朝聘事大之敬常見於表章動皆由𠂻言必合禮朕所以深嘉忠欵遐想風規至於寢興不忘歎矚勉𢎞令德用副誠懷達覽將軍等至省表其馬數共六千五百匹據所到印納馬都二萬匹都計馬價絹五十萬匹緣近嵗已來或有水旱軍國之用不免闕供令今數內且方圓支二十五萬匹分付達覽將軍便令歸國仍遣中使送至界首雖都數未得盡足然來使且免稽留貴副所須當悉此意頃者所約馬數蓋欲事可久長何者付絹少則彼意不充納馬多則此力致困集作歉馬數漸廣則缺價漸多以斯商量宜有定約彼此為便理甚昭然况與可汗禮在往來義存終始親鄰既通於纍代恩好益厚於往時所以萬里推誠期於一言見信逺思明智固體朕心其東都太原置寺已令人勾當事緣功德理合精嚴又有彼國師僧不必更勞人檢校其見撚拓勿施鄢集作塢達干等今並放歸所令帝德將軍安慶雲供養師僧請住外宅又令骨都祿將軍充檢校功德使其安悉立請隨􅀈次放歸本國者並依來奏想宜知悉今賜少物具如别録內外宰相及判官摩尼師等並各有賜物至宜凖數分付內外宰相官吏師僧等並存問之遣書指不多及賜回鶻可汗勑書李德裕勑我國家統臨萬㝢列塞在隂山之南先可汗揔率本部建牙於大漠之北各安土宇二百餘年此天所以限隔中集作內外不可逾越近聞為紇扢斯所敗加以饑荒國邑為墟尸僵道路今可汗稍收離散漸近邊城將務集作議逺圖先示集作合先文誥故茲命使宜聽朕言可汗纍代已來赤集作推誠嚮國往者中原有難助剪群凶列聖念功每加優寵寧國咸安二公主降嫁龍庭爰及先朝復以今公主繼好又以土無絲纊嵗遺縑繒恩禮轉深諸蕃榮羡久保誠信兩絶猜嫌但以國家舊章蕃漢殊壤稍踰經制豈朕所安去嵗嗢吺集作沒斯特勒已至近界邊將憤激便請驅除朕每念其無主可歸宜令安撫今可汗既立彼又降附便合率領漸復舊疆漂寓塞垣殊非良計又得宰相頡干伽思等表借振武一城權與公主可汗集作可汗公主居住中國之制與外蕃不同須守前代規模祖宗法度昔漢朝單于乖亂呼韓欵塞宣帝送單于出朔方雞鹿漢胸奴傳作雞鹿塞在朔方郡集作祿恐非塞唯賑以米粟國初太宗皇帝令集作命李思摩建牙於漠南遺跡並存事皆可驗未有深入漢界借以一城與羌集作退渾党項微小雜種同為百姓實亦屈可汗之尊貴亂中國之舊規若以未復本蕃或欲别遷善地求大國聲援戢諸部交爭亦須率思歸之人且於漠南駐集作住正朕當許公主朝覲親問事宜儻須應接必無所吝冀令彼國從此輯寧豈不謂去危就安轉禍為集作成福朕緣公主將可汗丹集作忠誠來告深感于衷制置之間須存逺大故遣右金吾衛大將軍兼御史大夫王㑹副使宗正少卿兼御史中丞李師偃馳往喻懷爰定所居更申誓約神明是質豈可食言可汗宜保一心自求多福賜太和公主書勑姑逺嫁絶域二十餘年跋履險難集作艱離此故土集作備罹屯苦朕每念於此良用惘然恭惟太皇太后春秋已髙慈愛頗集作深厚比者望姑朝謁再叙悲歡倐已嵗暮寂無音耗想姑見舊國之城邑能不銷魂望漢將之旌旗集作麾必嘗集作當流涕今朔方既至霰雪已零絶塞蕭條固難久處旃墻罽幕何以禦集作御冬肉飯酪漿且非適口朕俯臨萬㝢子育群生一物未安終食三歎况姑纍年漂泊何日忘懷想姑髙明必自懸鑒姑承宗廟之餘慶為王室之懿親先朝割愛降婚義寧家國謂回鶻必能禦侮安靜塞垣使邊人子孫不見兵革昔射雕者不敢西向畏軒轅之臺今回鶻所為甚不循理蕃渾是朕之百姓牛羊亦國家集作之所有昔集作因依漢地遂致蕃孽集作茲回鶻託以私讎恣為侵掠每馬首南向姑得不畏髙祖太宗之威靈欲侵擾邊疆豈集作姑得不思太皇太后之慈愛為其國母足得指揮若回鶻不能禀命則是棄絶姻好今日之集作已後不得以姑為詞若將恃我為親禀姑教令則須便自戢斂以繼舊歡想姑以朕此書諭彼將相令其知分不更集作更不狥非塞外祁寒且無絲纊朕每御裘服則思彼未授衣豈可以回鶻譸張遂忘親愛今寄冬衣若干事具如别録賜回鶻嗢吺集作沒斯特勒等詔前人敕回鶻嗢吺斯特勒哪頡啜特勒曳于伽思於解亦阿思於解亦何集作阿耽于集作迓思莫賀達干宰相伊難未集作朱密伽諦略咄將軍三字集作摩咄將諦略等天德軍遞多覽所奉四字集作所奏表至再三省覽憂屬良深彼蕃自忠義毗伽可汗已來代為親鄰連降愛主恩禮特異古今莫及朕臨馭集作君臨萬國撫育殊方茍有未安則宜上來集作告况特勒等乃祖乃父歸誠纍朝昨遣嗣澤王溶吊册先可汗回始聞卿國中喪亂諸部乖離救患恤鄰敢集作豈忘令典方圖集作思鎮撫已命使臣今又知堅昆等五族深入凌虐可汗被害公主及新回鶻集作可汗播越他所未歸城邑特勒等力不能制思存逺圖想率遁逃萬里歸命又知欲奉公主朝覲忠謀不從已逾沙集作大漠之南同欵五原之塞發此單使布其赤心言念艱危惻然軫歎料卿等皆英酋貴族羈寓沙場懷土之情如何可處豈非欲討除外寇匡復本蕃抱此至忠託于集作於大援但緣未知止集作指的難便聽從又慮邊境守臣見卿忽至或懷疑阻不副朕心故遣鴻臚卿張賈馳往安慰集作撫朕既奬卿忠欵報以信集作至誠雖隔塞垣已如相見卿須深明朕意盡吐所懷一一言於使臣令其速且還奏佇聞誠願續有指揮必當副彼急難固不惜於事力勉於謀度用保忠勳秋熱卿及部下諸官并右集作左相阿波兀等部落黑車子達怛等平安好遣書指不多及突厥書敕突厥苾伽可汗書張九齡見集本敕突厥苾伽可汗比數有信知彼平安良足慰也自為父子情與年深中間往來親緣義合雖云異域何殊一家邊境之人更無他慮甚善甚善此是兒可汗能為承順副朕之所親厚人間恩好無以過之長保此心終享福祿子孫萬代豈獨在今比秋氣漸冷卿及平章事首領部落並平安好遣書指不多及敕突厥可汗書敕兒登里突厥可汗天不福善禍鍾彼國苾伽可汗傾逝聞以集作之惻然有二十年聞結為父子及此痛悼何異所生又聞可汗繼立蕃落並得寧靜良深悲慰且知無他朕與可汗先人情重骨肉亦既與朕為子可汗即合為孫以孫比兒似踈少許今修先父之業復繼往時之好此情更重只可從親若以為孫漸成踈遠故欲可汗今者還且為兒義結既深當熟思此意人情終始固亦可知葬事所須並依來請即與吊祭使將往必令及期言念宿昔深懷感愴春初猶冷可汗及平章事并首領部落並得如宜遣書指不多及敕突厥登利可汗書敕突厥登利可汗日月流邁將逼葬期想崩慕之心何可堪處朕以父子之義情與年深及聞宅兆良以追悼前歌利施頡斤至所請葬料事事不違所以然者將答忠孝故喪紀之數禮物有加道之所存地亦何逺今又遣從叔金吾大將軍佺持節吊祭兼營護葬事佺宗室之長信行所推欲逺集無逺字達其情必重其使以將厚意更敦前約且以為保忠信者可以示子孫息兵革者可以訓疆場故遣建碑立廟貽範紀功因命史官正辭朕亦親為篆寫以固終始想體至懷春中尚寒可汗及平章事部落並平安好遣書指不多及敕突厥可汗書四首敕兒突厥可汗書與先可汗結為父子及兒紹續情義日深至於國計亦欲無别兒去年東討雖有先言然兩蕃既歸國家亦即不合侵伐朕既與兒無間終不以此為懷契丹及奚諸蕃窮者土地不足以放牧羊馬不足以貪求遠勞師徒兼冒鋒鏑勝不為武不勝亦危以此言之當務其大者突騎施本非貴種出自黑姓唯任姦數誑誘群胡十數年閒又承國家庇䕃因其荒遠遂得茍存近日已來敢茲背德又知兒意亦欲破之前與先可汗舉哀其使不肯就哭當時辭拒彼使具知兒若揔兵西行朕即出師相應安西瀚海近已加兵欲以滅之復何難也儻事捷之日羊馬土地揔以與兒子女玉帛别行集作有優賞信是長策可熟思之與兒親情故言及此耳今有少信物至宜領取春初尚寒兒及平章事首領百姓已下並平安好遣書指不多及二敕兒可汗比來和市常有限約承前馬數不過數千去嵗以兒初立欲相優賞特勒欲谷前至納馬倍多故揔與留著已給物市買中間蘇農賀勒兼領堅昆馬來朕以一年再市舊無此法歌解骨支去日丁寧示意又移建集作健逹干後到亦以理報知不遣重來須存信約遂乃不依處分驅馬直來無禮無信是何道理朕緣兒義重深為含容論其無知豈能不怪計兒忠孝必無非理未委此等何故也集作而然念其逺來磧路艱苦勒令却退去似不親集作相親令覲都賜蘇農賀勒下及堅昆使下揔二萬匹絹任其市易想兒知之其馬今並勒令却去至彼之日以理告示也夏未甚熱兒及平章事部落百姓並平安好遣書指不多及三敕兒突厥可汗道路既逺使命復稀近日已來音信斷絶朕每多懸念想所知之與兒情義既深庶事無間父子之國直往直來何異一家真無外集作别也蘇農賀勒處刺逹干等去嵗將馬其數倍多又有諸蕃馬來亦是兒所發遣往者先可汗在日每年納馬不過三四千馬既無多物亦易辦此度所納前後一萬四千緣兒初立可汗朕又結為父子恩義相及不可却回所以揔留計物五千萬匹兼屬國家大禮並放天下租庸用度無窮非獨和市緣此馬價通容稍遲處刺達干未還不是故為留滯念昔此意當復寬心今見續續市易不久望了即當發遣回日非賖在此還如當家去住亦何異也此後一作度將馬來納必不可多還如先可汗時約有定凖來交易發遣易為事須久長不是限隔今故令內侍趙惠琮往并有少信物别具委曲至宜領取秋氣漸冷兒及平章事首領百姓並平安好遣書指不多及四敕突厥兒可汗內侍趙惠琮從彼還一一口具深慰逺懷兒表中猶言前年退馬多兼云蘇農賀勒處羅達干三年在此與兒更無間外庶事一家所以趙惠琮去時皆以實報今者來表尚未體悉且去年所將馬來前後數倍常嵗至於好惡未必皆以兒知其中老弱病患及驅格全小不堪駕馭如何揔留所以略簡多少仍是十退一二是於兒處大為存情何故來章尚嫌多退必若求集作留售惡馬亦恐諸蕃笑人兒既君長北蕃復與朕為父子須存分義使遠近知之勿信下人專由利動蘇農賀處羅達干等續續市買甚有次第雖校遲少許物並好於往時不久當回亦勿怪也所欲遣使來者既為父子之國來往乃是尋常須知平安復申朝覲佇聞來使用慰朕心冬中極寒兒及平章事首領百姓並平安好所有委曲皆使至口具遣書指不多及党項書賜党項敕書敕自爾祖歸欵國家依附邊塞為我赤子編於黔黎牛馬蕃孶集作滋種落殷盛不侵不叛效信效誠集作頗效信誠比聞邊將不守朝章失於綏緝因緣徴斂害及無辜念爾遠人莫知控告特命朕之愛子實總元戎所冀羣師聽命而不敢自專諸部懷寃而有所披訴奉我憲令以保和寧如聞莫顧恩私遂懷憑恃攘奪不避於官物驅掠罔憚於平人擅舉集作興甲兵恣行攻劫豈有朝廷內地輒此鴟張道路阻艱商旅殆絶朕使欲詔命諸鎮悉力勦除深意玉石難分善惡同斃今再為條制各使得宜却令節將集作相指揮許其處斷如事有寃濫政乖公平並遣巡院奏聞朝庭必與集作為申理如或不知恩貸猶敢猖狂國有典章必難容捨故茲宣示當體朕懷文苑英華卷四百六十八
