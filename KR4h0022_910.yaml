body:
  text: 文苑英華卷九百十一宋李昉等編職官十九都督一周河州都督普屯威碑一首唐并州都督尉遲恭碑一首周上柱國宿國公河州都督普屯威神道碑銘并序庾信公諱威字某河南洛陽人也舊姓辛隴西人基若水之源纂商邱之胄邑于大亳實定其居封于小辛乃成其姓是以山川被髮辛有得見事之機八封占爻辛廖有知人之鑒佐治以東都上將魏帝解衣武賢以西國功臣漢王推轂祖大汗武川太守考生河州四面總管大都督隴右貴臣河西鼎族公侯踵武嶽牧連鑣並得聲振長榆名雄高柳公秉靈山嶽誕載星辰結髮嶷然齠年成德澄波萬頃建標千仞鋒穎既高光芒已逺青襟學劒既為人主所稱童子論兵即在中軍之策永熙元年入仕䝉授直蕩都督太祖文皇帝雪舊君之恥連西伯之功始裂鴻溝初登函谷公擢衣沐髮杖劒轅門撤洗足而相迎下賔階而顧問自此即居帳內仍為直寢授寧逺將軍羽林監白土縣開國伯邑五百户大統元年從迎大駕進爵為侯增邑三百户加冠軍將軍散騎常侍轉大都督公善於用兵長於撫御自攻洛陽定𢎞農戰河橋平沙苑冒刃衝鋒前無橫陳况以弦木六鈞函􅙈七屬門多懸胄箭必中鞍山積器械谷糧牛馬軍吏計功司勳賞策授使持節銀青光祿大夫進爵為公增邑八百户昔者受律赤符韓信當千里治兵白帝張飛擬萬人皆此於今日公之謂也五年授使持節都督揚州諸軍事揚州刺史浮於一作于江海達于淮泗篠簜既敷瑶琨即序十三年授車騎大將軍儀同三司尋遷驃騎大將軍開府仍賜姓普屯即為官族入陪武帳出揔戎韜置府於陽關張􅏧於瀚海故得上書於漢即用同宗爭長於周還無異姓十六年授鄜州諸軍事鄜州刺史公穎煩兩牧風政神明虎去西河梟移東郡河湄瑞氣特表亷平鄜祀神光偏明正直及乎魏終天祿周受惟新明命已遷彜倫或革周元年改授大將軍抱罕郡開國公增邑一千户軍中受詔非論北伐之功大將登壇無待東歸之策置陳太平開隂晉之道連兵廣武納滎陽之城校戰丹山移營白壁莫不勇冠三軍名凌五將保定四年授寧州揔管掌其北門既為鄭國所委捍其西鄙無懼秦亭之逼是以築平綱之城衛人拱手戍滎波之澤梁氏寒心朝廷與公有內外之親令公從戚里之貴乃以魏文帝女為公夫人遂得長門之左别開公主之園濯龍之傍便有王姬之館五年被徵入京拜少本傳作小司馬期於司武以公為魏絳佐於中軍以公為荀首豈直謂之鶉火稱之縉雲而已哉其年被使領兵出西凉州奉迎突厥皇后紀制疑衍裂繻來卿為君逆稱族而行尊君命也天和元年授柱國拜大司寇楚之柱國方之南火軒之司寇譬以西雲總授於公能官人也建德二年授少傅四年授河州總管都督七州諸軍事即為河州大中正公之桑梓本於此地再為連率頻仍衣錦襄城龍種更及池臺桂陽仙人還歸鄉里故老親賔酣歌相慶安車駟馬天下榮之宣政元年授上柱國更加少傅配於上相即陪𤣥扈之圖居於京師實有圯橋之策改封宿國公食邑并前五千五百户射鴻舊圃舞鶴餘城既浮酸棗之河聊對淇園之竹來朝建章則天子降席出遊戚里則羣公下階是以行滿天地名聞四海方當光輔五軍參謀七政天厲弗戒薨於所居春秋六十有九柳莊告殯傾社稷之臣鄭僑云亡得諸侯之禮詔贈某官諡某公禮也以今開皇元年七月某日反葬於河州金城郡之苑川鄉山行隴底地入塞原望積石以緣河臨崆峒而下坂𤣥甲黃腸﨑嶇亭鄣及云奠徹方勞榆沈若夫樹反壤也封夏屋焉終須穎川之碑乃見華隂之碣世子儀同永達孝性有聞居喪得禮嗟海變而田成懼山飛而地絶勤石墓田仍銘云爾少典之孫𤣥王之子貫於月金承於水降及於周公侯復始風俗氣候山川表裏河連積石山帶崆峒秦亭北上漢使西通金行氣壯地勢人雄稜稜高節凛凛踈風祖考藩屏濁河清渭兩地謨明雙流光貴水無别色雲無異氣為吏為民惟懷惟畏公之嗣世實秉英靈降神中嶽回文列星鸞翔鳳顧珠角山庭臣深義本子極天經洛城戰陳河橋旗鼓箭飲石梁劒燃銅柱並麗六麋俱抽雙虎玉門開羣陽關置府再為上台兩為少傅模範帝師經綸國步允襲峻德欽明審諭不吝車茵誰言溫樹天道茫昧年齡倐忽上將星開功臣鼎沒九原陵阜三河甲卒地險龜林營危馬窟西州永别北闕長辭山張虛蓋野祭空帷陵原地逈松路風悲銘於碣石勒以貞龜唐并州都督鄂國公尉遲恭碑許敬宗蓋聞嶽靈昭􅀈協其神者申甫緯象騰斌含其精者伊傅用調芳玉鉉增耀金符譬八柱之承天猶四溟之載地是以邠郊創厯冥契非酈一作熊之兆沛野開基鬱㑹攀鱗之傑莫不凝徽簡策篆勳戈鼎此裂一無此字河西而濟美期礪嶽以疇庸若乃經啓睿圖彌綸聖業扈兵師於丹水夷餌石之祅渠振文策於烏江掃拔山之巨祲抑揚七佐鎔鑄五臣致我后於勛華軼前修於樊灌名高絶代其在忠武公乎公諱恭字敬德河南洛人唐書作翔州善陽人也原夫玉派靈長控昌源於弱水瓊基峻逺峙層構於軒臺叶粹氣以擒賊威橫朔野奄崆峒而擅武跡跨中原亦猶江馬南浮圖基巨麗溟鯤北運激勢扶搖是故軒冕傳華半神州而交蔚忠良秀美曄帝里而馳芬與夫由余去危斥剪敦而作霸日磾受顧光珥貂而纍華考諸聲實固不同年而語也曽祖本貞後魏中郎將冠軍將軍漁陽郡開國公贈中外六州諸軍事一作使諡曰懋道粹黃中寄侔丹化襲徽章於圭瑞飛茂績於鐘鏞大父益都北齊左兵郎中遷金紫光祿大夫入周濟州諸軍事濟州刺史雕鎪杞梓黼藻人倫用匪齊鈎亟深微管之寄價符趙璧愈擅入秦之美考伽隋授儀同三司衛王記室皇朝追封常寧安公贈汾州刺史幽州都督材緯三端揚鑣武庫位階一命頓轡文房下調悲於季葉飾壤昭於昌運故知壯氣猶生貫千秋其尚想名臣不作瞻九原而增悼再縟部符之贈式冠封墳之典公鄧林抽穎崑嶠疏源非假七齡早鬱凌霜之幹爰滋九潤先孕聨雲之寶瞻言廣術企列㦸於髫初屬相傾義俯回戈於度內雄姿岐嶷覆簣裁規沉勇潛貞涌泉韞量飾躬由禮檢性依仁匪衛祓於齊挑函翹誠於孟荀言泉河㵼應千里而無違俠氣飈騰輕百金而有裕加以鈐符𤣥祕劒術精微偃月疏營右澤左陵之勢浮雲鴈陳鵝張鶴列之竒莫不夙契靈臺暗窮神奧由是譽光日下聲蓋秦中而翠虬驤霧必先階於尺木紫燕追風初發蹤於步武爰膺執㦸之選以效棄觚之節䝉授元師都督拜朝散大夫轉議正大夫加銀青光祿大夫大業十二年也未展雄飛載羈下列何意乎九苞呈瑞儷彩司晨一角效祥儔蹤警夜俄而運鍾旒冕疑政弛永疑衣大浸襄陵長虹貫日公乃行吟梁父希管晏以思齊屈跡淮隂俟蕭張而佐命皇家補傾極振頺綱提劒風驅援旗電掃劉武周不稽天氣實暗人謀怒窮轍以抗威臨焦原而自逸公見縻昏僞迫以驅馳取譬辛毗甫依袁而免戾同夫馬援聊寄隗以偷全尚鞠醜徒據其危堞太宗俯離鳳邸親御龍韜軍次介休將屠僞邑早欽英略深嘉義勇飛箭以述皇威投金以申同德公鑒窮無象識照先機虛一作雪西楚之如狼陋張角之吠犬遽歸真主期乎定人擢授秦府統軍于時帝道維新王途多故瑞雞之野式靜雲雷獻蜃之川未均霜露蕞爾凶狡久肆回邪載動神兵龔行天罰救楚妙算雖獨運於冲襟授律宏規固思慿於猛將乃以公為行軍總管遵彼前矛一作旌旄追奔若順海乘兹破竹潰敵如決河積甲齊山中嶽由其咸定封尸築觀王城於是乂安飲至鎬京策勳居最所賜金帛蓋以千箱其後六統偏師五為總管北殱猾夏南廓滔天戮鯨鯢於洙泗溺驂䮽於漳滏所向風靡賞鉞彛班時外難初康內釁方兆春坊階亂構禍深於戾園李屏窮凶為蠧尤於傲象公早參帷幕思固宗祧驟起聖懷纍明大義九年六月二凶伏辜雖天道禍淫蓋賴君之算也擢拜左衛大將軍兼太子左衛率貞觀元年授右武大將軍屯兵數萬咸令統領職歷二官兼司七校龍飛靜拆揔禁旅於瑶山馬珥臨戎肅嚴兵於錡禁於是威馳銀榜寵峻金吾拜上柱國吳國公食邑三千户實封一千三百户若遷疑黼曰疑疏峰奄衡巫而廓鎮雷導風一作服驅區遇功㵼江漢以咸池餘礫涵輝明珠韜媚是稱奧壤獨擅雄州佇寄惟良以敷景化連帥之重僉曰爾諧貞觀四年授襄均鄧淅唐五州都督襄州刺史班朝驚俗載屏丹帷虛犴遷繞寧因赭服布中和而驛化浹旁潤以馳威惠澤潛通吐浪由其絶渚仁風普暢嘯谷所以浮江弛風牘於東臯歲儲京庾契成麟於西序家知禮讓道彼湘沅俗均鄒魯里稱冠蓋既洽氓謡地接股肱佇求人瘼八年授光祿大夫行同州刺史封建功臣改封鄂國公冊拜宣州刺史昔炎周裂壤榮陽茂十邑之庸有晉疇榮壯武峻重封之典校其優劣詎可扶輪纍遷靈鄜夏三州都督懋兹宏德函牧大藩控十角於星街信覃𤣥塞揔百城於天塹義偃朱方端委之風裭危冠而變俗氊裘之長棄嗚鏑以歸仁泪乎紫封流渥朱輪徒傳莫不情深借冦戀切留黃可謂柔逺以德人稱遺愛者矣既而俯鑒忘筌景文成之茂躅深惟滿器躐太𫝊之高蹤漏促銅儀循良夜之不怠體安玉杖諒坦路之難追奏擬青規辭榮絳闕特回天眷賜一作肆其誠請於是冊拜開府儀同三司禮秩加等已而從容廊廟怡暢邱園架巘圖蓮疏池㵼箭後堂歌吹通逸響於南鄰别業林泉接芳隂於西第加以陶風元穆勳胄兼之里遂高陽門承通德故能聨姻瑶府結慶璿枝榮亞元吉寵班右威清樓聳構遙通婺女之津黃閣凝扉近接天孫之館長筵綺合韋珠與謝玉交輝廣廡雲浮籥共摐金遞奏庭烏效祉燮曜槐端隟駿流年俄潛闕嗟乎巨川既濟奄遷舟於夜壑高臺遽傾倐摧梁於夢奠粵以顯慶三年十一月二十六日遘疾薨於長安之私第春秋七十有四皇上情切宗臣痛深國老舉哀别次罷朝者纍辰昔平仲云亡趨輪軫慟宣尼告逝述誄申哀未足方此撤懸喻斯輟祭追贈司徒詞曰飾終之典實屬於勳賢追逺之恩光歸於令望故開府儀同三司上柱國鄂國公敬德志局標舉基宇沉奧忠義之節歷夷險而不渝仁勇之風雖造次而必踐乃誠申於伯府茂績展於行陳西漢元勳韓彭非重東京闕將吳鄧為輕著恭肅於軒陛馳聲猷於藩嶽方隆朝寄之榮便追止足之分闡雄林而兼濟植高操而孤往道映千古舉光百辟與善俄褰殱良奄洎永言遺烈震動于心宜崇禮命式旌幽壤可賜疑作贈司徒使持節都督并蔚嵐代等四州諸軍事并州刺史餘官封竝如故所司備禮冊命給班劔四十人及羽葆鼓吹贈絹一千五百段米粟一千五百石陪葬昭陵葬事所須並宜官給并賜東園祕器儀仗鼓吹送至墓所仍送還宅并為立碑仍令鴻臚卿琅琊郡開國公蕭嗣業監護光祿少卿殷令名為副使務從優厚稱朕意焉又下諡詔曰名以實稱事光於前典諡為表禮縟厚於尊言故博聞强立少傅擅文成之美行剛服逺冠軍膺景植之賜故開府儀同三司上柱國鄂國公贈司徒并州都督敬德襟宇宏邵機神祕逺氣茂英果情馳義烈闡雄圖而贊業標峻節以擬功道叶宗臣望隆時宰愛升九命之寵宜享三尊之位福謙從說悼往增酸奉上危身誠許國之貞操安人和衆亦經邦之懿範祥式兹典錫以大名可諡忠武仍遣使持節備禮告柩以顯慶四年歲次己未四月丁未朔十四日庚申陪葬于昭陵禮也惟公資和清粹禀鋭雷霆勇冠六軍不失獨夫之色志澄四海期於萬里之外登范車而繹慮撫陳室以栖情蒼璧內融負青冥其非逺白圭外審體黃裳而愈固藝或微而咸綜枝雖末而旁該象弭初彎先穿卧石魚文且擊遂引飛泉擅扛鼎而推雄掩䝉輪而效捷觀其事親孝事君忠居身節與士信識通其變逺鑒窮於未形智括其神臨事期乎不測非外物之攸奬咸冝體以自然運屬艱虞披荆而扶帝業功宣草昧借箸以沃神襟載扈升陑爰參誓牧掩孫吳而高視􅞂韓白以長驅是以捨代偃齊似青邱之吞夢澤推堅衄鋭猶黃間之穿魯縞祥符捧日亮堯景而增輝道契從風燮虞薰而演化故能丹書誓策青社疏榮位兆銜諸疑資五申而統律寄深錫壤按十部以宣風年暨抽簪禮優執酳懸輿勝躅昭茂寵於安車納駟高門峻朝章於行馬斯所謂道烈可紀令終有俶者歟有子右領軍將軍寶林鳳羽摛姿龍媒騁逸丞相之子道懋傳經王公之孫望高倒屣掩八屯而效職副九列以騰芳履孝揚名克隆華閥顯親穆譽爰樹豐碑紀德盧山載表茂陵之域題貞畢陌式分京兆之阡庶令過客披文立名可則故懷斯惠望拜知歸其銘曰商周龍躍尹望鷹揚風雲冝感鱗翮曽驤於赫皇祚禔禎㑹昌錫兹元弼勳烈推光茂德初誕英徽早暢狼宿摛精龜文協貺棄繻關下受符圯上祕策金韜騰猷玉帳貞心孤邵猛氣橫飛長戈叄捷雄㦸雙揮蛟分承影鴈落忘歸韜竒佇睿屈跡乘機釁起射天妖凝鬬日明一光啓半千秀出道契披捧功宣授律冀北先馳圖南載逸受脤揚威專征耀武馬陵削樹鳶方鑄柱雲卷鳴祠風謳嘯雨靜祲破竹銷氛玉弩戎衣式定河帶同盟望高四履寵峻千兵裂壤扮邑分麾抑營綱羅方邵躡跡良平出建隼旟入參鳳輦名班贄玉賁光儀鉉朱户吟笳青門樹冕金裝甫散璇霜遽踐昔恭丹扆載奉薰琴今陪𤣥禭空悲穀林紛紛禮褥杳杳光沉閽桐永閟宰樹方深信瞻言史策逺振徽音文苑英華卷九百十一
