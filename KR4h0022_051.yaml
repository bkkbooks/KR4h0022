body:
  text: 文苑英華卷五十一宋李昉等編宫室五登春臺賦三首燕昭王築黃金臺賦三首傷望思臺賦一首望思臺賦二首登春臺賦以晴眺春野氣和感深為韻陸贄春發生以煦物臺居髙而處明俯而望焉舒郁郁之和氣登可樂也暢怡怡之逺情觸類斯感衆芳俱榮風出谷以天霽雲歸山而景晴俯視平臯傍臨逺嶠窮漢苑以周覽匝秦城而回眺林巒彩翠浮佳氣於遙天宫觀參差麗飛甍於夕照望莫若兮望逺感何深兮感春登其臺則歷階而至極應乎律故隂慘而陽伸令行斯順澤布惟均視雖微而必審思何逺而不親懿夫情之誘人人罔或捨時之感物物莫能假臺有春而必望春何情而不寫條風始至散灼灼之紅桃榖雨初收潤萋萋之緑野天何言哉生衆彚人有靈兮感元氣既望春而可樂亦升髙而足貴賞同沂水聊舞雩以詠歌登異觀臺寧覩蠟而增欷周望既極含情則多媚遲日之未下憂輕風之屢過目眇眇以心逺野悠悠而氣和可以樂芳時之景物壯皇室之山河豈比夫羈士登樓而作賦碩人在軸而為歌者哉春無物而不滋臺無逺而不覽豈老氏之或論伊潘生之所感稽其趣時之規逺創意之義深春非臺而何樂臺非春而罔尋故望春者惟臺是履登臺者惟春是臨繄在物之可用必從時之所任儻自下而可託庶升髙而至今同前題同韻苖秀惟窮愁之伊鬱嗟大塊之勞生登春臺而寫望獨觀化以娛情熙熙然不知吾之喪我悠悠爾方悟象之難名矧夫見千門之景霽逢六合之風清夫何化者之自化使夫成者之自成樂以忘歸嘆盤逰之楚后極而起恨痛傷心於屈平然則春之為氣可以感人臺之為髙可以觀徼揔山川以窮覽極宇宙而遐眺俯瞻魏闕散嘉氣之氤氲延望天門登大明之皛耀于時也三農伊始百卉皆春天地相近雷雲解屯欣大皥之在震嘉勾芒之御辰以斯觀乎天倪乃無所不至以是觀乎王化亦何逺不均稽乎登臺之意也寓興實繁忘情蓋寡獨有役於耳目匪安排於原野爭徇物以矜能建升髙而自下庸詎知淡乎無為道之所貴起乎纍土采老氏之玄言歌彼載陽識詩人之所謂方發生之道逹屬陽和之布氣登臺謂何雅興逾多玩韶景而則麗聆微風而轉和雖黃鳥之可悅無同人而則那時來何歡物至而感思千里之遐騁登九層以流覽褰裳未濟徒有望於江湖藻鑒髙懸且欲呈其肝膽故其取類也逺寓興也深庶鑒登髙之賦無遺入㸑之音同前題同韻張𪷟逹萬類者莫尚於和氣鬱萬類者莫極於幽情故登臺而豁望得寓目於春榮髙臨乎雙闕逈出乎重城洞千門而拂曙披九陌於初晴雲當軒而氣潤風溢檻而光清隂始分而土膏起陽已動而泉脈生縹眇九層之端希微四達之眺春馭興而搖裔興牽春而窈窕鶬鶊來於東野鴻鴈去於南津愛煙霞而改舊嘉草樹而含新思欣欣於麗景情艷艷於韶春雖懵隂陽之義且知天地之仁我國家道洽一作合衆靈化涵諸夏吹律豈勞于鄒衍操音寧藉於子野德被荒遐而有截澤周品物而無假因夀域以同歸奚樂郊而獨寫是知氣之所感者情情之所和者氣氣苟逹而內愜情必洽而外慰等彼純綿之溫若享太牢之味固在極於羡溢寧止臻於髣佛不然者太昊之令何榮老氏之言安貴而已也春臺髙兮勢峩峩鶯亂囀兮傳伐柯聊登陟兮一過攬春心兮未和春臺曉兮光淡淡花競落兮如菼菼逺慿臨兮一覽嫋春心兮多感感因外而重遣和自中而再尋任三陽之榮悴齊萬化以浮沉風何知於虎嘯雲何識於龍吟猶春臺之蹈泰與聖政之同深燕昭王築黃金臺賦張式燕昭以齊魏黷武楚趙専征地僻援寡城孤勢輕體未遑於安席心每寄於懸旌外矜嚴以示懼中慷慨而不平欲羅天下之彥總海內之英爰築臺於國以尊隗為名知夫喬林之木可選他山之石可轉將在物之非珍謂求覽之不顯苟白駒之可縶信黃金之可賤且設而為已則以奢設以為人則為善岌然既就赫矣斯存象徘徊於前殿色晃朗於朝暾人所貴惟金我以為土時以士為賤我以為尊誠列辟之未制掩前經之所論昔銅雀創於鄴都陽臺起於荆國聳髙麗之殊觀備珍竒而盡飭徒竭用而殫人自矜豪而逞力洎夫遺情繐帳徒愴淫心結夢巫山空資穢德豈同夫慮成經始所寶惟賢初假物以求士終得魚而忘筌不然者鳥將棲於茂樹魚自躍於深淵臣亦效誠於大國人逺誰仕於弱燕所謂興亡必繫於賢哲勝負寧由於衆寡庶斯焉而取斯誠大者而逺者及夫劇辛不召而至樂毅無媒而萃咸委質而納忠願長途而騁驥然則賢為強國之器臺實招賢之餌空悲霸業之雄不覩濫觴之自異乎哉歷萬古而共觀信諸侯之一致後之士寧無郭隗之才後之君但守燕昭之位是以千乘雖貴一士雖微必禮之而後為用必求之而後能歸不可誘之以利不可劫之以威因酌古以道意惜臺平而事非同前題以殊禮釣士克昌其功為韻獨孤綬戰國之分裂寰區境削兵抑者不惟燕乎昭王乃卑身以勤德懷霸業之逺圖伊取士之或異及成功而莫殊抗珍臺而臨碣石廓賢路而走幽都表之以髙居尊之以厚禮曷云成土木之弊適以備股肱之體於是雲竦山峭穹崇䆗窱架坱圠以上馳飭金寶以內照泛易水之浮景蔭尾星之垂耀是為層構臨而時傑臻亦猶甘餌懸而巨鱗釣展禮於此感之在彼降其尊以奉其卑豐於物而薄於已臨燕薊之衆目傾齊趙之竒士士之得可霸其將四海有焉士之失且亡豈直千金而已然則作為臺館實耗財力始若勦人終能肥國宋歌澤門以歸怨燕尊郭隗而耀德苟順動而若斯尚何求而匪克義積道光聲馳風揚羣材並用墜業乃昌屈於一人以釣士則開霸而圖王侈於一臺以釣國則兼大而稱強誠異虜其臣而必弊瓊其室而是亡且惟臺則沒矣代如何其綿邈千載蒼茫一作芒一時孰為來者曽莫嗣之國是其興鑒黃金之豈吝賢如可得下白屋而寧辭故九九之術不棄齊桓以成功善善之道克廣燕昭以垂風用能首五霸冠七雄抑未有為國而失士可攄盛烈於無窮同前題韓徹伊君有燕國隘朔邉當昭王旁求致理遇郭隗自舉推賢乃曰人思爾得禮由我先既築髙臺所損者寧辭百鎰斯為下士效死者何啻三千苟柱石之來助冀土宇之獲全原夫纍土足階披沙何損勢迢迢而逈出價洋洋而彌逺寧同戲馬興誘勸以立基有異思仙得富強而為本爾乃經營是設積思方成欹危既差於九仞委棄自多於一籯潛思潤屋之謀寶不足貴逺得利國之術賢豈能輕所以士因臺而取重臺因金而播名振一時之德美傳萬古而風清是則厥狀足徵斯義可考孤峻上符於臣節崔嵬下瞰於王道將昭千乘繼文侯忠良為心未敢一言得季布誠信為寶所謂南金置而非重北方倚而自強來側陋以畢至歷磴道而可常乍激天風還如擲地之響斜臨都邑更同懸一作縣市之光想夫典刑有凖聲教可則若周室之稱靈似殷鼎而在德穹崇可仰權謀實自於一夫綱紀更張威刑遂加於四國豈比夫銅雀美於魏日章華侈於楚時顧凌雲之小者何積瑶而方之今與燕非匹惟唐接踵康衢絶扣角之詠仄席無築臺之寵顧斯賦之至微安敢為重傷望思臺賦陸贄桃野之右蒼茫古源草木春慘風煙晝昏攬豫轡以躊躇見立表而斯存乃漢武戾嗣勦命地也然後築臺以慰遺魂吁自古有死胡可勝論苟失理以橫斃雖千祀而猶寃當武帝之季年德不勝而耄及浮誕之士疊至詭怪之巫繼集忠見疑而莫售讒因隙而競入忘嗜欲之生疾意巫詛而是因將搜蠱以滌災縱庸瑣之姦臣嫌何微而莫售寃雖毒而奚伸搆儲后以挂殃引具寮與齊人旋激怒而誅充竟奔湖而滅身異哉漢后因姦邪之是誘俾冡嗣而罹咎彼傷魂之冥冥故築臺其何有嗟爾戾嗣盍入明以見志遽興戈而自棄諒君父之是叛雖竄身其焉置嗚呼一失其理孝慈兩墜不其傷哉夫邪不自生釁亦有托信其讒興御疑則妖作恣鬼神之愆變實人事之紛錯故子不語於怪亂道亦貴乎淡泊蓋為此也水滔滔而不歸日杳杳而西馳時經往兮莫追人共盡兮臺隳榛焉莽焉俾永代而傷悲望思臺賦陳山甫漢武帝以惑亂生聽衛太子以危疑出奔始誤讒諛之巧長遺覆育之恩髙臺有揭悔過無門峩峩九層已斷興哀之目眇眇千里不歸幽憤之魂嗟乎望以窮髙思以及逺為父之慈靡及恨而莫失為子之道既乖慙而勿反當其版築初設土工聿修旁窺日轉下視雲浮所以取其逺無不鑒近無不周導宸衷於曠望表玄思之殷憂豈比夫柏梁為耳目之玩通天窮汗漫之逰流盼無涯增懷永久意來思之可待念追悔而終不事殊子伋空引決以自傷迹異申生諒為孝而何有悲夫見危致命有去無歸誠一朝之忿斯極豈三年之恩可違於是跨層髙之杳杳屬逺思之依依俯洊雷之音常思出震仰列星之象猶戀重暉豈知登臺有悼往之心陟岵無懷歸之歎曉光東上含萬恨而意深暮色西沉向四隅而望斷徒勞乎積財厚地纍土長空想迢遙於玄圃悲寂寞於青宫鑒失聰明將後悔而何及臺髙雲漢自貽咎於無窮原夫義絶君親禍由臣僕致兩傷於疑忌在一言之所黷是臺也可以申鑒於後王豈徒處髙而縱目望思臺賦蔣凝路入湖邑臺名望思幾里而雲瞻纍土千春而草沒餘基仙掌一峯逺指江充之事黃河九曲旁吞武帝之悲昔者漢祚方隆皇綱失理因巫蠱之事作有讒邪之禍起宫中既得其桐人臣下皆疑於太子龍樓獲謗方儲副以難明鳳閣無恩遂出奔而至死保傅徒爾園陵在哉千秋感悟萬乘傷摧齊誅子糾以無道晉殺申生而可哀於是慿大野築髙臺目極心存知繼體之何在天長地久庶招魂之一來緬彼沉冤登兹極望英靈無髣佛精魂丘隴有蕭條情狀見舜井以咨嗟念嬴博而惻愴煙昏日慘全非望月之中鶴唳猿驚不在通天之上嵽嵲峥嶸何禆死生非唯滅天性􅊣人情抑亦傷國體敗家聲臨百尺以凝眸終天曷覩向九重而含恨何世能平雖然事出妖訛姦生結搆宜北闕之聼君命奚東宫之有私鬭子臧在側斯人比鄭叔何殊商洛非遙此事亦芝翁不救往昔于今陵髙谷深逰鹿而征人舉首悲君而逋客傷心曰子曰臣可念兹而誡勵為君為父宜到此以沉吟且王者為域中之大太子是天下之本何周公之不法而秦相之可損吾欲碑戾園望苑使有家有國鑒此臺而不逺文苑英華卷五十一
