body:
  text: 文苑英華卷八百六十二宋李昉等編釋十三揚州龍興寺律師二字一作經律碑一首潤州鶴林寺故徑山大師碑一首東京大敬愛寺大證禪師碑一首楊州龍興寺經律院和尚碑李華菩薩調伏身心具一切智調伏心者為定慧調伏身者為律議假煩惱而後有身心有身心而後開知見權衡並用何莫由之如來於鹿野苑中為五俱輪始開此法持律第一有優波離如來謂戒為性源因定見性定為慧本因慧得常不依科教無所成實乃宣告四輩攝護身心命以優波長老集毗尼藏以優波無緣此土摩訶迦葉啓迪當來而付囑之興禪同祖數世去聖滋逺枝剖條分令學者所宗四分為盛此間有數息諸觀以攝亂意是蓋禪那之濫觴也夫沙門奉律猶世間行禮若傋中和易直之心而無升降周旋之節於為義非為義非為半人恭惟世間皆歸佛性體無分别俱會一乘勝妙法蠡爰傾海水明徹寶器方貯醍醐禪律二門如左名翼和尚執持戒律兼修定慧恩制落染為人式瞻六十年矣和尚法號懷仁其人也惟天寶十載十月十四日晨起盥潄繩床跏趺心奉西方既曛就滅於龍興寺春秋八十三僧夏六十緇素弟子北拒泗沂南踰嶺徼望哭者千族會葬者萬人其上首曰越州開元寺僧曇一福州開元寺僧宣一常州興寧寺僧義宣杭州談山寺僧惠鸞東京敬愛寺僧璿光潤州栖霞寺僧法瑜僧乾印潤州天鄉寺僧法雲揚州崇福寺僧明幽延光寺僧靈一龍興寺僧惠逺等天下甘露正味調柔人中象王利根成熟音樂樹下長流福慧之泉雪山峯頂仰見清涼之日金剛決定煩惱無餘優曇開敷香潔盈滿罔不成實樂説辨才得法華三昧衆所知識物之依怙法施之恩重群居之感深哀奉色身經始靈塔于某原像教也幽公自幼及哀所親侍靜言玄梵俯托斯文試言之曰先陀婆者分於一名摩醯目者夾於三點衆法歸善群緣體無道豈逺人宏之在我外離諸相猶行邪道內度四生方為靈覺至若調牛良田唯待天雨渡馱巨海何護持囊喻夫靈藥毒草同在林中甘泉淤泥共生地下疇能了達惟我宗師和尚大原郭氏厥後遷於淮在孩抱之嵗誓齒道門親慈所鍾志不可奪因瑶臺成律師受具戒律文有往誓所疑時賢或誤一言曲分於象表精理自得於環中聲振京師如晞日月諸寺固請綱領乃默而東歸既還揚都府允羣願常誦金剛般若波羅蜜經如意輪陀羅尼般若佛心我得此心衆生亦如謂天台止觀色疑作是一切經義東山法門是一切佛乘色空兩亡定慧雙照不可得而稱也寒不加服暑不攝齊食不求飽居不易坐四方施捨歸於大衆一身有無均于最下朝廷之士銜命往復路出惟揚終嵗百數不踐門閾以為大羞仰承一聁如洗飢渴和尚與人子言依於孝與人臣言依於忠與上人言依於敬佛教儒行合而為一慮學者流誤故親教經論延來者聽受故大起僧坊將警羣迷故廣圖菩薩因地善護諸命故曲濟衆生壽量以文字度人故工於翰墨法皆佛法兼採儒流以我慢為防故自負衣鉢以規範為任故綱正緇林發揮道宗故上紆睿禮以感慕遺迹故不逺他邦以龍象參議故再至京國以軌度端明故研精律部黃門侍郎盧藏用才髙名重罕有推挹一見和尚慕味循環不能離坐退而嘆曰宇宙之內信有當人黃門於院內置經藏嚴以香燈天地無疆象法常在太子少保陸象先吏部尚書畢構少府監陸餘慶吏部尚書崔日用祕書監賀知章禮部尚書裴寬中書侍郎嚴挺之河南尹崔希逸太守房琯中書侍郎平章事崔渙禮部尚書李澄詞人汜水尉王昌齡等所瞻奉願同灑掃建塔之地廣狹如素髙卑得中周臨四衢平覩千里門人環侍列相薦以名香空曠寂寥以哀以慰夫子門人輕重諸侯之國如來弟子皆為釋梵之師敬悅其風以偈銘曰佛境無二佛心皆一隨其根源乃起禪律持戒外奬觀空內謐是藏私耶衆僧祕密昏醉億萬求醒者稀如來戒定與爾為歸性空因戒垢重初微彼上人者深乎道機真空不生妙果無得開明戒定洗去怨賊衣染利波鼻聞簷蔔白月正圓如何昏黑昏黑既巳四輩號咷不見金櫬空圖白毫月明江濶月落山髙回野孤塔羣心鬱陶訓迪真子森然朗達阿難苾芻迦葉菩薩仙髮承足諸天奉鉢智火遽燃獨留緇褐月苦淮甸風悲楚川千株茂樹百道春泉佛日長晦浮圖巋然哀哀龍象大芘群緣潤州鶴林寺故徑山大師碑銘前人道行無迹妙極無象謂體性空而本源清淨謂諸見滅而覺照圓明我天人師示第一義師無可説之法義為不二之門其定也風輪駐機其慧也日宫開照其用也春泉利物三者備體誰後誰先入無量而不動開法華而涌一作踊出湛兮以有無觀聽而莫測寥焉以逺近思惟而不窮知一作智德皆空為真實際大悲恆寂遍撫群迷月入百川之中佛匝千花之上修而證者玄同妙有應而起者旁作化身先大師適來此土化身歟適去他方補處歟不可得而知也自如來現滅四魔橫恣人天無怙寄命崩崖勝大敵者那羅延身銷一作消大毒者伽陀妙藥拔陷扶墜而生大師大師延陵馬氏諱玄素字道清崇髙紹興於法位一作外胄一作徑緒不繫於人間慈母方娠厭患葷肉長至之日誕彌仁尊生有異祥乳育安靜既齓稽首父母求歸法門即日獲請出依精舍如意年中剃度𨽻江寧長夀寺即進具巳戒光還照定水澄源鵝王之不受泥塵香象之頓除羈鎖未之比也身長七尺體無凡骨眉毛際臉口若方丹目不顧盼聲侔扣玉入南牛頭山事威大師撞鐘大鳴入海同味迦葉以頭陀第一大師亦斗藪塵勞聞一知十未嘗請益觀法無本觀心不生喻金剛之最堅比獅子之無畏圓月照海髙深盡明慧風吹雲宇宙皆淨威大師摩頂謂曰東南正法待汝興行命於别位開導來學於是騶虞馴擾表仁之至也衆禽獻果明化之均也接足右繞百千人俱大師悉以菩薩呼之教習大乘戒妄調伏自性還源無漸而可隨無頓而可入摩尼照物一切如之吾當默然無法可説或有信願雙極懇求心要于我渴仰施汝醍醐問禪定耶吾無修問智慧耶吾無得道惟心證不在言通懷一作壞帝釋輪終為世論自淨而巳無求色聲既悟者小無微塵大無三界當悟者內珠雖隱猶作來因藥草萬殊根莖等潤貌和言寡飢至飽歸或有聞尊稱而遷善現色身而獨得我無示一作爾念道溥慈圓食不問鹹酸口不言寒暑身同池水飽蚊蚋之飢渴道離人我順衆生之往來貴賤怨一作寃親是法平等故饋甘味而不辭同於糗糒奉上服而不拒齊於弊褐俾夫家有道侶府無爭人開元中本寺僧法密請至京口潤州刺史韋銑灑掃鶴林斯一作茲焉供養有屠者恣刃一作忍積骸如山刺史韋銑聞大師尊名來仰真範忽自感悟懴伏一作悔求哀大師受之又白言和尚大悲當應我供大師衲衣跏趺未嘗出户公侯稽首不為動搖至是如其懇求一作乞欣然降詣夫盜隱其罪虎慈其子仁與不仁皆同佛性無生無滅無去無來今濁流一澄清水立現諸佛所度我亦度之天寶中揚州僧希玄密請至廣陵便風馳帆白光引棹楚人相慶佛日度江梁宋齊魯傾都來會津塞途盈人無立位解衣投施積若丘陵皆委於所在行無住捨禮部尚書李憕時為揚州牧齋心跪謁為衆唱首望慈月者誰不清涼傳百億明燈照四維上下塵沙之數皆超佛乘二州以貪法之心移牒踰月均吾喜捨成爾堅牢無非道場還至本處天寶十一載十一月十一日中夜坐滅嗚呼菩提位中六十一夏父母之生八十五年起哀位者可思量否至有浮江而奠望寺而哭十里花雨四天香雲幢幡蓋網光蔽日月以其月二十一日四衆等號捧金一作全身建塔于黃鶴山西原像法也州伯邑宰執喪師之禮率衆申哀江湖震悼曩於寺內移居髙松互偃涅槃之夕倚桐雙枯虎狼哀號聲破山谷人祗􅉃動天地晦暝一作冥及發引登原風雨如掃慈烏覆野靈鶴徊翔一無而字有情無情德至皆感初達摩祖師傳法三世至信大師信門人達者曰融大師居牛頭山得自然智慧信大師就而證之且曰七佛教戒諸三昧門語有差别義無差别群生根器各各不同唯最上乘攝而歸一涼風既至百實皆成汝能揔持吾亦隨喜由是無上覺路分為此宗融大師講法則金蓮冬敷頓錫而靈泉滿一作湧溢東夷西域得闕足者赴會聽焉融授巖大師巖授方大師方授持大師持授威大師凡七世矣真乘妙緣靈祥嘉應僉具傳録布於人世門人法鏡吳中上首是也門人法欽徑山長老是也觀音普門文殊佛性惟二菩薩重光道源門人法勵法海親奉微言感延霜露繕崇龕座開構軒楹時惟海公求一作永報師訓廬孔氏之墓起淨明之塔世異人同泫然長慕僧慧一作此字端等蔭旃檀樹皆得身香菩薩戒弟子故吏部侍郎齊浣故刑部尚書張均故江東採訪使潤州刺史劉日正故廣州都督梁升卿故採訪使潤州刺史徐嶠故採訪使常州刺史劉同升故潤州刺史韋昭禮一作理故給事中韓賞故御史中丞李丹故涇陽縣令萬齊融禮部員外郎崔令欽道流人望莫盛于此弟子嘗聞道於涇山猶樂正子春之于大夫也洗心瞻仰天漢彌髙鏡公門人悟甚深者大理評事楊詣過去聖賢諸功德藏志之所至無不聞知魯史從告况乎傳信其文曰濁金清境在爾銷練磨之瑩之功至乃現膏漬炷然光明外遍陽升律應草木皆變啓迪瘖瞽惟吾大師息言成教捨法興悲辰極不動風波自移境因一作由心寂道與人隨杳然玄默湛入無餘性本無一作非垢云何淨除身心冥寂太極淪胥內光無盡萬境同如甘露正味琉璃妙器遍施大千無同無異度未度者化周緣備道樹忽枯涅槃時至我無生滅隨世因緣吉祥殿上應化諸天寂寂靈塔滔滔逝川恆沙劫壞智月常圓東京大敬愛寺大證禪寺碑王縉醴泉湧而蠲疾寶炬然而破暗蓮花無染而獨淨夜光不繫而自得其惟上智乎夫上智之身曲隨世界上智之心密逰聖境或宿植德本大乘願復來或意生人間用宏開示非慧見孰能知之大德號曇真姓邉陳留開封人也厥初為孩稟知特異亦既有識用晦如愚家有耕桑未嘗問鄉有學校未嘗顧則曰處豐屋何如方丈馳良馬何如振錫圭組耀世不如被褐金玉滿堂不如虛白食珍者豈觀飯來香積聽樂者豈聞梵唱云何戰既勝矣出門絶迹潛嵩少間専於讀誦年至二十遂適太原受聲聞戒習根本律性甚聰敏博涉經論時同學者仰之為師久而嘆曰大聖要道存解脫不入其門非佛之子乃損落枝葉澄清泉源詣長老大照醒迷解縳開心如毛頭掃意塵於色界從此日益喻師能知於四威儀之中無一剎那有怠不住以至於大寂無作以至於恆用我正無所虛空未為廣我照能遍日月未為明震雷破山聞不聞等烈風拔樹見在一作不見見等是身無主興四大假合方寸無生於一切離相猶以為未出心景彌勒深入大照既沒又尋廣德大師一見而拱手再見而分座問之於了答之以默俱詣等妙忽合自他梵衲之行楞伽之心密契久矣廣德又謝學徒嗷嗷相顧靡依來求於我嗣續前後皆以寶歸出宅諸子俾稱所乘渡河三獸自止於分天寶季年祿山作逆陷我洛陽亂兵蜂螫大德淡然獨在本處天龍潛衛於左右豺狼仰瞻而讃嘆施財獻供終朝盈門於善惡等以慈於苦厄久以忍言説不得無畏故也動靜皆如自在故也度一作廣衆無邉大願力也依報無量邁種福也夫修行之有宗旨如水木之有本源始自達摩傳付慧可可傳僧璨璨傳道信信傳𢎞忍忍傳大通大通傳大照大照傳廣德廣德傳大師一一授手一一摩頂相承如嫡密付法印惟聖智所澄非思議能測也大德既捨眷屬竊為沙彌身不顧名志在成道聲稱寖逺歸向如林天寶八年緇侣領袖舉以上聞乃蒙正度初𨽻東都衛國寺旋為敬愛寺請充大德遷彼與住此有緣非無因地離人天之會法如雲門之施衆有塵勞之悟寺盈河潤之福今學與其進當學起其信善誘不倦得賢則喜利往者導之以鍵覩奧者辨之以正在定者戒於貪悟所覺者使之以視一作逺逺一作視彼來學如菴摩勒果冀其出世如優曇鉢花齊我者稀故我貴矣寶應二年正月十四日趺坐如生薪盡火滅年六十夏十四哀纒門人悲及塵衆樹為之變色獸為之失聲棟折航沉佛土蕭索其年九月葬於嵩嶽寺之北阜大厯二年有司奏諡上聞惻然乃賜號曰大證禪師縉嘗官登封因學於大照又與廣德素為知友大德弟子正順即十哲之一也視縉猶父心用感焉以諸因緣為之強述銘曰上德不德興慈連悲現於獨界俯為人師以我無思破彼塵思爾方厭俗我則隨時由多分别妄知垢淨根不緣塵象豈染鏡法不可著空即是病無得之得絶聖而聖文字非文字言語非言語云何以解脫云何而語汝隨宜説方便究竟非我與舍利依嵩山寂寥松柏所文苑英華卷八百六十二
