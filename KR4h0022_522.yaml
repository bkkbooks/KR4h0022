body:
  text: 文苑英華巻五百二十三宋李昉等編田農門二十二道萊田不應稅判十道初稅畆判七道履畆判五道萊田不應稅判勸農使稱萊田舊不應稅州縣令有徴納為例各自不同或計畆數均收或隨上下加減百姓紛訴使司科均收以不應為從重科加减以非法均賦歛州訴恐年飢無以給貸且使司法例不平不伏處斷對張環國征九賦農辨三壌用先疇之畎畆則有磽肥輸當年之井税寜均沃瘠是以農扈率職夫家受田一本下有疃田二字較其菑畬底以藨蓘故我疆我理爰滋翼翼之苗如梁如茨卒穫芃芃之稼藝或若此稅其可知今者倬彼萊田是稱荒隴畆方兼以三百始受一夫穫寧取於十千空勤四體雖則休於間嵗易在他年徒寒耕而熱耘終費廣而收薄永言州縣是曰司存土則異宜畆何均稅必以年湏賑乏事欲隨時加減於上下之間徴納於權宜之際則謀始立化斯焉可作慢官沮法訟者奚為且使以勸農為名人以足食為本民唐諱苟可利賦亦何傷責以不應或將得罪處其非法良恐未然湏從刑政之科難枉使司之例同前皇家剗華歸素抑末敦本式稽堯典授時之政克修載歌豳頌祈年之禮尤洽是以野無曠土國絶遊人紅粟相因華黍興詠猶復二星分出四牡載馳察俗觀風勤分務穡至如分地之利易田之宜擇乎令典酌於故實若秋苗有穫則可據地而徴儻春萊不芟焉得計畆令納苟貽碩䑕之謗湏寘鳥一作鷞鳩之典若上田不易自有常規妄為加减誠為非法並從鳯舉之按冝正隼旟之罪同前栁同度地制邑徹田為糧必均三壌之宜以成九賦之則是以政令惟簡乃黎庻時蘇法物苟紛必謗讟日浸昔魯備齊難作丘甲之法晉為秦擒起爰田之制俱錐刀之末開䘮亂之始今三時不害四人成功疆理多兩穗之收倉廪必九年之蓄惟彼州縣誠非紀綱既無恤人之心豈曰奉公之理省徭慎役未挂於愚心貪財徇名已間於拙見昔興税畆嘗聞尼父之嫌今欲萊田有類哀公之志非愛人以治國何深思而淺謀使乎察彼衷情允兹上訴下停厚斂寃者爰申寘官嚴刑罪人斯得既有雅見實曰良圖同前樊光期國鳸為農俾人作畆是刈是穫必在有苗不菑不畬何以望嵗故剡耒斵耜自春徂秋與疑作雨公及私既庭且碩然後論彼薄税取於豐年仍聞寡婦之歌寧有匹夫之怨若斯土靡藝大田其荒稼穡之功不加於此寢訛之地或在其中而欲徴諸我箱問彼嘉榖非苗取實慙於老農棄木求華違此通論州縣以廣地為務入粟是功用藏於人何必改舊使司以惠言及物凖度從人誚彼均收黜於加減罪雖一致法欲重科然不伐有詞且稱從責隨時之義庻叶論刑同前張調賛王理制國用稽諸縣籍抑有彛典故命敷土聿興五服之規用師頒田式均三易之賦歴選列辟率由舊章國家大賚四瀛咸則三壌榖出不過籍所以豐財萊田不致征實惟饒衍麟書是紀象魏攸懸浹日使觀先庚以令何彼咨岳猶大禁之因循孰謂法雷亦小東而杼軸既徴求之無藝翻給貸之是憂皮之不存毛將焉傅百姓不足九式何施外䑓則驅鷄善嚴使司則害馬已去雅符中典無勞薄言同前張寂我田既臧農夫是慶畆碩則播嵗成厥功如茨如梁或祈於稷稼不稂不莠載嘉於曽田彼之荒萊僻在窮野芟夷未絶耒耜何施便加税畆之徴豈厚生人之道且漳河冨鄴涇水利秦人既有臧國亦云幸當今百姓為心六府脩教命勸分之使崇務本之農漢苑空閒已許蕭何之請魯田厚斂見譲哀公之昏人若屢空君孰與足州縣以政刑不用輿訟是招使司以公職務平天心必稱雖假詞於給貸終失得於當官請寘明刑以鍳多士同前劃為九州咸則三壌或溝洫創制或阡陌從宜肇允萊田無聞税畆今欲務耕興利盡地勤農驅役冗食之人示以不毛之罰則可規堰瀦一作肥瘠而辨等視舄鹵以分疆必遵桀貊之中是行什一之税惟此州縣沮為藎臣不率古猷獨師襟抱而上下加減謂叶裒多之義據畆均收欲見無偏之跡曽不知定其可墾則奚適非宜捨彼所餘則仁將何遠欲救兹弊圖以拯人異李悝之上熟同冉求之急賦將恐事非適變狙怒惑於朝三日用不知馬力盡於劔百輶軒髙責何所迯威外䑓薄訴終思憲罰同前林諤倬彼甫田爰分沃塉定其差等故九州攸同處有勞逸誠萬人是繫周官掌事征税畢均皇明燭幽逺邇咸勸德音天發直指風行既有察於農功將不遺於屋粟翦萊非季路之政就蕪興元亮之詞責郡縣之勞煩慰黎甿之薄訴借如計畆數以均收隨上下而加減盖議事以制示得便宜重戒年飢頗符日用苟殊乾没獲戾何堪使司雖欲科懲愚謂傷於嚴刻且萊田不税實師古之通方倉庾流衍乃自公之上務繡衣匪同楚失應副九重州縣請宥漢章賞其一切同前任璆宇宙為家實惟天府疆理為畆成賦中邦而九州同風萬國共貫莫不開廬井而平賦税凖沃瘠以明勞逸則人狎於野穡而成功是以晋置爰田既易種於差美周任稍地復出布於不毛相彼萊田是稱餘地舊不應税今則有徴事將利國法焉循古雖紛若人訟而畧陳地宜何者彼田若焚薙草溝塍相錯稼穡屢登亦可計畆數以均收隨上下而加減必孟春月陳新未事即不應而可坐處非法而奚疑况州阻饑饉薄言給貸於均地一作輸之法事舉其中軫憂人之道斂從其薄勸農便國待子而行即寘徽纆未為允當同前楚冕一作樊冕夏闢山川周疆井邑四人得業萬國作孚欲令應陽和以蕆事候秋霜而畢力故除彼公田人耕百畆用資國賦家茂九農是知居瘠即勞處沃便逸必耕奥壌以易萊田祈南畆之有年望西成而必穫誰謂田其蕪矣似陶令之歸來税輙均收疑魯卿之厚斂使司以愛人治國人富則國殷州縣以反裘負薪裘敗則毛落既未閑於大體徒輕擬於小東縱訴將備年饑終合請裁天㫖使科非法未失清通初税畆判所司初税畆怨者實多僉議罪其變法中尉云匪躬之故兩執不同對王之賁飭力長財任農勸業利則已乆税宜在均或乘弊以斂輕或因虚而斂重邦都以入未息夫家之征倉廪是資仍鞭什一之税籌兹變法初欲贍官亦猶搜粟都尉冀立阜時之策司農中丞用成強國之筭雖將實於邦府恐多奪於吾人人其不足國也何有徴之以古則魯公之制難循用之於今則有若之言可尚出其過籍非禮誠深言人匪躬過之已甚同前趙栖簡大道既行農不易畆中孚斯及國有常税各修九賦之職寧奪三農之勤惟彼所司於何妄作隳周公之垂法行魯宣之弊政榖出不過籍己舉丘明之凡法廼變於人寧規商鞅之律甿則骨怨誰任其辜主上情殷納隍慮一物之乖所見夫栖畆分五榖之荐登德澤既滂和氣充塞誠可減從輕賦湏允下人之喜一作善遂行厚斂虚慿中尉之詞事則匪躬罪當諸己則屨校滅趾滋咎未深而剥牀以膚取㐫斯在同前孔齊參賦政任人取之有節體天立制惟變能通猗歟主司厥初税畆稽諸魯䇿用採憲章雖怨咨之談實多横議而損益之政或在權宜然則擇利而行何常之有舉以非法斯其病諸較其短長於是乎在同前尹深源先王制禮將使田賦有經中古從權亦由國用不足履畆而税侵農實多小東作詩見刺於譚后大桀為論甫聞於魯臣既繁杪嵗之征同起祁寒之怨徒欲附上焉能服人且己効忠未為干典當採議於中尉諒無嫌於所司同前高璠周官立法唯聞薄斂魯用不供爰行大桀皇家布聖敬之明徳貴因循之令典乃脩弛賦之道不足宜陽之計什一而税億兆以庸何彼所司率由非政不能和彼三事申物土之宜而乃鳩于庻甿成取怨之道豈自貉之為制其於蠆而不若臨財無苟其曰是乎於義或妄未為能也惟此中尉曽無内省若利彼社稷則死生而以之斁我彛倫在憲章而莫捨益之為助空望於十朋孚則未終且成乎一握獲夷不同於入腹出否幸從於顚趾同前張秀明什一而税周道如砥二吾不足魯政斯壞國家隣善以化寳榖而理上下皆給不學筭車移人邕和大來惟知手舞足蹈嗟爾加税昧我大猷曽不慕於若堯坐貽陷於大桀將謂浚我有司何取於匪躬寧有盜臣中尉且多於尸禄儻能率法抑有前聞若苟而為斯亦奚問同前杜梃郊賦有籍邦政是敷制乎上地無越三人之倫居彼中田常許兩家之共始成薄賦乃曰恤人周末無年魯初有制憂税畆者作自哀公對盍徹乎聞諸有若所以人多怨讟國起侵伐動干戈而税繁供軍旅而儲廣抑為末也寧一作未是本歟當今薰風阜財協氣登榖兵則不動人其以寧斯足解愠之時奚為變法之税中尉推過罔失臣儀與人頌康當歸帝美兩執㫁矣一言在兹履畆判丙為諸侯履畆擇其最好者取之百姓上訴御史糾違法云非入已對常日進政在利人法難變古苟非慎舉事則不經伊丙列侯無聞嘉績未明盡地之力獨聞履畆之税且以小惠誅一作殊怨莫見安人之理藴利生孽先聞入己之嫌重税既同於魯侯盍徹明棄於周典憲䑓糾謬實可凖繩分土煩言益為文過敢告司敗冝寘薄刑同前盧術凉以作法弊尚或貪謀之不臧事將奚適丙桐珪荷寵茅土分榮既稱孤之是崇在養人之為政不有如傷之視遽興厚斂之文且井屋既殊收税有數人或不足君何取諸苟縱欲之斯行紅粟多積豈堪命之能久黔首何安敢請焚書將以和衆遂命持斧以問剖符縱非入己之科湏當擅賦之責同前崔恁公田有洫私家有封人或不康君孰與足丙分茅賜爵剪葉稱孤奪力役於夫家怠政教於公府徒使我疆我理空對汙萊爾宅爾田惟瞻磽确不勤東作但履西成急下民之見糧既同蟊賊務公家之厚斂寧有盜臣豈漢文施令之心乃魯宣救弊之術子行而法則有周公之典我愛其禮請遵尼父之言未可加刑宜從削地同前朱濟俾侯胙土分茅一作刺撫封視彼黔黎均其毛澤今者制田非夫厚斂殘人履畆尚徇於魯宣盍徹蔑聞於有若且農之有畔榖不過籍小桀之規是舉大侵之禮謂何此而浚我以生無乃形人之力既貪膏壌取溢京坻獨阻南勲盡其東畆雖非入己巳是盜臣無罔繡衣請從褫帯同前傅昇卿制邑居民務農肥國均夫家之閭井永保士房疑徴載師之逺近將安地著惟丙職登牧伯位列諸侯茂穡勸分須聞露冕之化霑體塗足當務曝髪之勞而乃不問公私無論沃瘠取其翼翼之稼擇彼芃芃之田同魯公之無恩榖梁是議類季孫之苟賦尼父有言將刺大東何殊小桀嗟狐裘之非當宜豸冠之是糾何者倉惟國廪食則人天雖欲國實於倉其若人勤於食務知逺者不亦悦乎文苑英華巻五百二十三
