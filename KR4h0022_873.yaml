body:
  text: 文苑英華卷八百七十四宋李昉等編遺愛河西節度使杜公碑一首義武軍節度使張公遺愛碑一首髙陵令劉君遺愛碑一首河西節度使杜公碑楊炎周有召伯樹王風之始漢得留侯稱佐命之傑功赫於帝典名鏤於河圗維唐之受命大殪戎於西周皇帝感黷武之風思二南之化詢求卿士惠澤窮荒乃命兵部侍郎杜公名鴻漸自河登車主盟西塞公英眀博達淳粹先覺碩德漢庭之老中興佐命之勛體合一氣精合五老伊昔皇運中否河海風塵天子方僞逰北門之野公負霸王之略感社稷之危𬗟懷風雲以身許國隱括王道旁觀歷象謂宇宙不可終閉兆庶不可無君龍吟空山雲起大澤追昌言以排世難告天命以成帝業日月盡一作晝蝕載之髙懸鯨鯤躍波戮而為醢史一作吏也秦疑作奏嚮天之樂儒也觀嗣夏之書故登朝為夔龍纂戎為方召至於是邦也清其心而妙其用厚其惠而感其和與物也氣之陽春含靈也工之槖籥以為儣俗不足以勸賞故先悅以茂功貪人不可以害羣故問罪以去奸訛言不可以疑衆故畢詞以為戮於是八藩以之匍匐三師以之投褒疑羣盜以之出奔巫人以之伏死古之作者不貴成功貴以德不憚濟世憚先仁樂生下齊眀道者謂其強孫武講軍事上者知其固西門禱河眀刑者恨其暴子玉佐楚治兵者慮其剛而公形體兼才智周乎萬籟之變嚮合乎四㑹之中是神降歟詩云愷悌君子民之父母其來也邱陵如無其去也風雨可懷故吏兼侍御史唐朝英洎邑老其州長吏陳奉先等以炎耳目馨香託之篆刻庶乎覩斯文者有襄南之慕頌遺美者深潁上之風銘曰彧彧杜公蚪蟠于奧人美其華我覩其操王用謨畫大邦以造三錫輅車纂戎之號威肅惠時眀神所勞何彼塞翁靡人仁報徘徊頌石永代作好唐故義武軍節度使營田易定等州觀察處置使開府儀同三司檢校司空同中書門下平章事符陽郡王贈太師貞武張公遺愛碑銘并序權德輿維唐十二葉皇帝纂太統建大中始初清眀敷佑下土稽四征六服之理閲先正宗臣之籍流慶斯復遺風可懷繇是博陵上谷列侯二千石元僚司武從事亞旅上其故府太師貞武公功德請銘于碑以示厥後乃詔小司徒臣德輿因地域之名物酌軍師之憲令舉而叙之云公諱孝字達忠其先燕人八代祖竒北齊右北平太守封右北平王齊季喪亂實開邉隙代有長枝軼於外區曽王父靖乙失活部落節度使王父遜部落刺史父謐早襲先職來朝上京星環北極輸君長之贄幣鵬變南溟發邉關之導譯拜開府儀同三司他日以公之勤纍贈至户部尚書公雄姿正志沉毅英達傳兵符於百勝襲王爵於丸代年未弱冠入侍眀庭才為異倫射必命中以日磾之信愛受秦仲之車服自他有耀至是來歸時𤣥宗御天下四十餘載習文事而去武備人不知戰恬於已然幽陵首禍榖洛恇駭公跡染汙俗心堅本朝豈求生以害仁將蹈難以眀義史羯繼亂猶居劫中質其所恃無路自奮問道旁午密陳嘉猷俄而成德軍節度李寶臣錫姓撫封同信臣之任就義若渴推心於公綜其都軍以壯支郡乃策崇勳纍居大官凡軍師之禁令攻守之竒正成德之重必咨於公鄰帥猖蹶皇赫問罪公出自上谷覘于具邱寇徒六萬將犯中冀乘轅外嚮方陳而前公以駟介千數颷馳急擊突入其阻夾攻其堅敵人力屈昏夜引去遷御史中丞封符陽郡王尋拜易州刺史加太子賔客以軍之輯睦移於郡以郡之班制叶於軍文理武毅交修四暢師貞人和為列郡表儀初公與寶臣感慨於少年之場周旋於多難之際迎導善氣切劘良規若驂有靳如熱斯濯異時自代前定於公且曰輿師之心也勳力之冠也俄然寢疾瘖不能言猶以手指北瞪然注目既而惡子阻命隂交匪人因喪以干紀專地而圗禍公驟諌不入飛章上陳請以州兵首遏亂略優詔拜工部尚書兼御史大夫恆州刺史成德軍節度使一人注意四履專征紏合諸侯連收城縣敗之於束鹿走之於常山以至斬首且無遺䇿轉兵部尚書易州刺史易定滄等州節度觀察使錫軍號曰義武時三分恆陽之地録功有差而羣帥奓心或懷􅔵望太行而東疆場日駭且有從約皆為假王公居其腹心守正持重玉立於磷緇之際雞鳴於風雨之中靜柯徑草在我而已彼朱滔者以燕啖公夸大煽結譸張指斥公乃出和門以蒞衆援皎日以誓心義利之間死生不惑且曰縣官之所以賦軍宿兵下尺一之詔者在排難捍一作扞患而已吾徒之所以乘堅驅良佩丈二之組者在畢力致命而已碎首塗地吾無悔焉一心事君四面受敵俄屬京師急變鑾輅時巡時太師西平王以禁兵自魏來援于我於是與公决策赴行在所公素約以伯仲又申之婚姻分鋭師選良將授以赴蹈使居顔行斷金之契匪石不轉定山東為巳任坐制羣疑清轂下為前籌行戡大憝赤誠相照血涕交頥西平繇是建大勳立大烈而公亦靜深以制動貞厲以伐謀使其徒集作從散約而無亡矢遺鏃之費者公之功也前此拜尚書左僕射至是同中書門下平章事貞元元年就加司空凡受律行師十有一嵗永寧諸侯减黜不端動有節制人斯愛戴贍助其供養賻補其禮喪拊循接禮勞徠安輯輔以正德而不怵於邪濟以守忠而不回於利章灼卓異有初有終其居凉國太夫人憂也手植松檟倚廬於墓感致瑞祉詔旌其門終身之哀加人一等不遺故舊皆以器使戲下多善吏庭中無留事雖古人之威懷無以過焉春秋六十二以七年三月感疾薨于位德宗皇帝不視朝三日册贈太傅詔郎吏吊祠法贈有加其後纍贈太師易曰貞武追封上谷郡王易之大有曰信以發志禮之中庸曰誠之不可掩惟公推本於是暗然而彰德宇𢎞大色容厲肅長才經武奇表出倫喬枝戞雲以直上雄劍發匣而耀頴始以天寶十載受詔即戎授范陽郡洪源府右果毅破九姓突厥改上黨郡漳源府折衝乾元初轉左領軍衛翊府左郎將實鎮飛狐之地寶應中拜左武衛大將軍加金印紫綬歷左金吾大將軍兼太僕卿殿中監以至于專席賔護剖符建牙載居六官乃進左揆燮和鼎飪平理水土真食大封異姓而王積功伐以崇厚履信順而光大壯武之後逺繼公台富平之門時推德器豈徒然哉嗣子今司徒同中書門下平章事延德郡王茂昭以全才休績保大宣力戴翼天子撫征諸侯常以工部尚書建旟博陵以刑部尚書循方伯之職特詔所理郡為大都督府經歷左僕射司空丞居代官南北軍衛爪牙上將同氣分職寵冒一時侯王則銀黃相映子弟乃金埓對起流光貽訓其信矣乎二十年延德王以介圭四牡來朝京師德宗沃心嘉歎宴喜蕃錫如韓侯申伯故事順宗繼眀崇德報功及居台宰進掌邦教敦喻還鎮涕洟就途今皇帝以道御天下燭眀理本間嵗再入覲為守臣龜龍乞留京師以奉朝請堅若金石激以肺肝服勤王家丕赫宸眷感念勳節顧懷義方直以鄭武公桓公漢韋平父子古先懿鑠舉集公門二邦幼艾千夫長百夫長沐浴風烈怵愓慕思是儀古式以永耀斯不朽之事也拜君命之辱而傳信焉銘曰天秉日星亦有風霆君用文德亦資武力太師矯矯生我王國時或艱屯師惟壯直大蹇朋來其心不回好謀而成義路乃開博陵上谷地直㭊木既夷狡童則理長轂威謀抗厲命賜渥縟回回盜泉曒曒嘉玉凡我所履與之豐福士皆賈餘人以仰足雕戈衮章裕此一方追錫吊祠禮優職喪司徒襲慶道叶仁聖三朝戴君皆受四命覲禮煌煌嘉猷洋洋湛露彤弓威儀有光甘棠蔽芾邵伯所憩緇衣改為鄭國之詩仍代洪集作休烈邦人戴之永言置懷乃刻斯碑髙陵令劉君遺愛碑劉禹錫縣內之大夫鮮有遺愛在其去者蓋邑居多豪政出權道非有卓然異績結于人心浹于骨髓安能久而愈思大和四年髙陵人李仕集作上清等六十三人思集作具前令劉君之德詣縣請金石刻之縣以狀申于府府以狀考于眀法吏吏上言謹按天寶詔書凡以政績將立碑者其具所紀之文上尚書考功有司考其詞宜有紀者乃奏眀年八月庚午詔曰可令書其章眀有以結人心者揭于道周云涇水東行注白渠釃而為三以沃關中故秦人常得善嵗按水部式决泄有時畎澮有度居上遊者不得擁泉而顓其膄每嵗少尹一人行視之以誅不式兵興以還寢失根本涇陽人果擁而顓之公取全流浸原為畦私開四竇澤不及下涇田獨肥他邑為枯地方集作力既移地征如初人或赴訴泣迎尹馬而上涇之膄皆權幸家縈勢足以破理訴者覆得罪繇是咋舌不敢言吞寃含忍家視孫子長慶三年髙陵令劉君勵精闕治視人之瘼如煙集作熛疽在身不忘决去乃修故事考闕文暨前後詔條又以新意請更水道入于我里請杜闕使無棄流請遵田令使無越制别白纎集作􅏽悉列上闕掾吏依違不决居三嵗距寶厯元年端士鄭覃為京闕九月始具以聞事下丞相御史御史屬元谷實司察闕詔書詣渠上盡得利病還奏青規中上以谷奉使有闕俾太常撰日京兆下其符司録姚康士曹掾李紹實闕縣主簿談孺直實董之冬十月百衆雲奔憤與喜并口闕力集作手運不屑鼕集注作鼛鼓揆功什七八而涇陽人以奇計賂術士上言白渠下髙祖故墅在焉子孫當恭敬不宜以畚鍤近阡陌上聞命京兆立止絶君馳詣府控告具發其以賂致前事又謁丞相請以顙血汙車茵丞相彭原公斂容謝曰眀府真愛人陛下視元元無所吝苐未周知情僞耳即入言上前翌日果有詔許訖役仲冬新渠成涉季冬二日新堰成駛流渾渾如脉宣氣蒿荒漚冒迎耜集作是斯釋集作什什開塞分寸皆如詔條有秋之期投鍤前定孺直告已事君率其寮躬勞徠之蒸徒歡呼奮襏襫而舞咸曰吞恨六十年眀府雪之擲姦犯豪卒就施為嗚呼成功之難也如是請名渠曰劉公而名堰曰彭城按服引而東千闕百步其廣四尋而深半之兩涯夾植杞桞萬本下垂根以作固上生材以備用仍嵗旱沴而渠下田獨有秋渠成之眀年涇陽三原二邑中又擁其衝為七堰以柝集作折水闕使下流不厚君詣京兆索言之府命從事蘇特至水闕撤不當擁者繇是邑人享其長利生子以劉名之君闕師字行輿彭城人武德名臣刑部尚書德威之五代孫闕厯中詩人商之猶子少好文學亦以書書字集作籌畫干東闕侯遂參幕府歷尹劇縣皆以能事見陟卒不時而遷既闕于髙陵轉昭應令俄兼檢校水曹外郎充渠堰副使闕朱衣銀章計相愛其能表為檢校屯田郎中兼侍御史闕池監集作幹池鹽于蒲錫紫衣金章嵗餘以課就加中中字一作司勳正郎執法理人為循吏理財為能臣一出於清白故也先是髙陵人䝉被惠風而惜其捨去發于胸懷播為聲詩今采其旨而變其詞志于石文曰噫涇水之逶迤溉我公兮及我私水無心兮人多僻錮上遊兮乾我澤時逢理兮官得材墨綬紫兮劉君來能愛人兮恤其隱心既公兮言既盡縣申府兮府聞天積憤刷兮沉疴痊劃新渠兮百畝流行龍蛇兮止膏油遵水式兮復田制無荒區兮有良嵗嗟劉君兮去翺翔遺我福兮牽我腸紀成功兮鐫美石求信詞兮昭懿績文苑英華卷八百七十四
