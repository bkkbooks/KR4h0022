body:
  text: 文苑英華巻四百四十一宋李昉等編徳音八雜徳音二建中四年徳音一作建中四年伐西河叛帥勞慰本道百姓勑編制勑朕嗣守鴻緒一作大業于一作於今五年承祖宗之休烈受明靈之耿命曷嘗不損已求瘼視人如傷思省徭賦以阜一作康邦俗納羣生於夀域躋大化於昇平而徳固虚薄志不昭感叛人未附戎馬方殷在予之責鑒寐多懼自兩河背誕兇逆相囡殺害非辜盗竊城邑摇蕩我邊鄙荐食我黎元勞我師徒費我征賦累更時嵗未克底寧朕子育萬人務康暴亂棄其細故待以初誠申之以大信示之以好惡将冀迷乃知復困則思通亦欲先徳後刑有征無戰不勞師旅以及和平而包藏禍心自搆扇亂一作自相搆侮慢朝㫖偷盗甲兵去順效逆曽無悛志謂天可罔謂責可逃緩之則為患日深逼之則矯窮困抗挾藏姦一作詐慝詭毒萬端陷誤忠良申雪無路朕為人父母實為痛心豈可忍此姦回為之覆燾是以大整師旅肅將天誅載清㝢縣以息黎庶事不得已而至於斯頃以軍興飛輓相次供億之費餽餉之勤屢擾農啇或擅其利州縣征賦重及疲人朕期一作心於止戈日冀蠲復先志未就後慮繼之微責既加名目猶廣百姓私養岡以自贍惟是夙夜不遑安寧豈不知耕織之艱難轉輸之勞苦毎一念至載深憂旰儻上𤣥垂鑒烈祖降靈慿將帥之設謀股肱之戮力俾我一戎永清四海則頒賦名目當日悉停兩稅定數亦各減放以便萬姓咸與昭蘇各委節度觀察使及刺史縣令所在郡一作部邑明加曉諭使悉一作知子意朕欝于大道逺邇未寧必藉一作假人力以靖多難宜宣布中外咸使聞知七月十一日放免諸道先停放將士資糧徳音編制見唐大詔令勑興理化者務積於人長國家者以義為利故歛之欲薄而使之以時然後億兆歡心逺邇欣戴政平俗阜必本於兹朕服承天命撫臨區夏憂矜在慮宵旰忘勞苟可以助化寧人便時益下事無大小皆盡其心比以中夏甫寧頗勤經費遂收諸道停減将士糧斛用叶權宜言念疫甿重兹供億頃雖疏理轉送猶勞睠彼東南良深矜歎夫崇儉可以足用節事可以豐財所當約已菲躬量宜濟務豈資厚取方給軍須思息遺黎俾蠲徭賦其貞元二年三年已前所收諸道停減放歸營農将士軍資糧斛錢米等縁送納向畢任依前勑收管其貞元四年已徴到及在路者即依前送其在百姓腹内者並宜令放免其貞元五年已畢每年合收一百七萬八百八十八貫石宜並放免仍委毎道觀察使具當管毎州都放錢數聞奏並各下本州曉示百姓令知其悉於戲人惟邦本本固邦寜百姓苟豐君孰不足式敷簡恵俾革煩擾庶其安逸各務農桑布告遐邇明知朕意貞元四年十月㑹昌元年彗星見避正殿徳音内制門下天道運行二氣交感著明不息罔有僣差苟或變見是為至誡朕以寡徳祖宗眷祐撫臨四海茂育群生夙夜祗慄思臻和洽年穀幸豐方期冨庶而徳有所未至信有所未孚妖星謫見既一作旬望未咸天乖常象咎徴昭然觀占次舍寝興愧惕雖罪已之詞常申謝譴而在予之責更示深衷是用側已修身以答天意冀有感召導迎休祥自此未御正殿宰臣與群官有司一作群有司之官且於延英聴命慎刑審獄理滯申恩冀絶寃結以通和氣其天下見禁囚徒京城内宜委宰臣一人於尚書省詳覆如情状寃屈䟽理訖且録聞奏諸州府各委長吏親自覆問不得信任官吏令有寃誣不急之務或慮勞力且令休罷亦示一作是恤人應京城及諸州内府及公廨寺觀如非要切所有營繕並勒權停救患備災為政之本言念黎庶彌切憂勤應今年諸道水災蝗虫諸州縣或有存恤未及處並委所在長吏與鹽鐵度支延院同訪問聞奏或恐明年又有水旱蝗虫其近江州縣今正當農隙各委本道加築隄防及勸課百姓種植五豆以備災患其常平義倉先有收貯未足處切令校料不得信任所由欺隱永思天誡用警畋遊克已省躬損之又損其臘日京兆府及諸司進食並宜權停於戯譴告之徴幽微𤣥逺上天垂耀鑒一作烱誡彰明思獲銷禳深用兢勵遐思殷宗之道修徳以勝妖𬗟懐宋景之賢發言而退舎将欲推誠以御物化災而為祥庶或感通以遂福應宣示中外宜諒至懐主者施行十一月十五日太和六年徳音一作水災令百官早言事及優恤人户詔門下朕聞王者之理天下一物失所興納隍之咎一夫不獲歎時予之辜雖饑疫㐫荒國家代有而隂陽祲沴儆戒朕躬自諸道水旱害人疾疫相繼宵旰罪已興寝疚懐屡降詔書俾副勤恤發廪蠲賦救患賑貧亦為至矣今長史申奏札瘥猶甚盖教化未感於庶蒸一作蒸人精誠未格於天地法令之或爽官吏之或舊唐書作為非百姓寖寃稅役多弊奸贓未去農業失時有一于兹皆傷和氣並委内外文武常參官一一條流各具所見聞奏必當親覽無憚直言其諸道應有災荒處其疫死一作疾疫之家有一門盡殁者仰官給㐫具隨事瘞藏如有一家口累因疫死一半者其長吏量事即與本户稅錢三分中减一分死一半已上者與减本户稅錢一半其疫疾未定處並委長吏差官廵撫量給藥醫詢問救療之術各加拯濟事具一作畢條流奏來其有一家長大者皆死所餘孩稚拾貳至襁褓者不能自活必至殀殤委長吏勸其近親収飬仍官中給兩月米糧五字一作給糧兩月亦具都數聞奏江淮諸道既有㐫荒賦入上供悉多蠲减國用常限或慮不充其度支鹽鐵户部及百司除諸軍衣糧布帛及宗廟祭享切急所須并常科用外所有舊例市賣貯備雜物一事已上並仰權停待嵗熟時豐别舉處分於戯朕自臨御于今七年兢兢乾乾不敢自逸而冲昧寡德未能燮調暵旱水災或罹於藩郡夭亡疾苦或横一作害於生人悼於厥心省已自責其州府長吏各奉詔條勉加拯恤凡在中外冝體朕懐主者施行五月二十八日太和八年疾愈徳音内制門下朕祗若天命纉承睿圖正統紀以清庶方序彜倫以貞百度慄慄寅畏于茲九年雖儉已飭躬推誠育物懼有未至不遑晏寜屬節氣交時疾恙嬰體列聖垂佑涉旬復初既上慶於兩宫冝覃恩於兆姓庶與寰宇同茲福祥自太和八年二月九日昧爽巳前天下應犯死罪降從流流徒等已下罪逓减一等唯官典犯贓及諸色所由破用官錢故殺十惡等罪不在此限左降官流人縁近有三字亦作宜凖去年八月九日勑宜即與處分為政之要必在去煩厚下之恩莫先已責應度支户部鹽鐵積欠錢物或囚繫多年資産巳盡或本身淪没展轉難徴簿書之中虚有名數囹圄之下常積滯寃言念于斯所當矜恤其度支户部鹽鐵應有懸欠各委本司具其可徴可放數條流聞奏不得容有姦濫在京諸司諸使食利錢其元舉人已納利計數五倍已上者本利並放其有人户逃死攤徴保人其保人納利計兩倍已上者其本利亦並放免其納利未滿此數者待納利數足徴本停利其諸色私債止於一倍不得利上生利仍委本縣各為詳理處分京邑之中本無𣙜酤屬真元用兵已一作之後費用積廣始定店户等第令其納𣙜况萬户一作方所聚私釀至多禁令既不可施𣙜利自無所入徒立顆額殊非恵人其長安兩縣見徴納𣙜錢一萬五千一十一無此字貫八百文若先次者並放免其𣙜酒錢起今日已後亦宜並停比者滄冦干紀稽誅數年諸道興師累獻戎㨗時方討叛難議釋縲免死戍邊已為一作有恩貸今滄州一道久被朝章念其懐土之心必有向隅之歎俾之遂性用洽優恩其諸道所送滄州将健配流及邊鎮營田役使者共一千三百五十九人並委本道節度觀察使據見在人放歸本管如有已效軍職及自有生業不願去者亦任便住董昌齡自至邕州累平溪洞兵威所向首惡皆擒然每念蒼生無非赤子况在荒徼尤當撫循其溪洞如有未歸附者向後非因侵擾更不用進討仍加存撫使各懐安其所獲黄洞百姓並分配側近州縣令自營生不得沒為奴婢将充賞給如元是奴婢者即任充賞南海蕃舶本以慕化而來固在接以恩仁使其感恱如聞比年長吏多務徴求嗟怨之聲達於殊俗况朕方寳勤儉豈受一作愛遐琛深慮逺人未安率稅猶重思有矜恤以示綏懐其嶺南福建及楊州蕃客宜委節度觀察使常加存問除舶脚收市進奉外任其來往通流自為交易不得重加率稅天下諸州府如有寃滯未伸宜委御史臺及出使郎官察訪聞奏於戯朕百靈所祐獲遂痊和䖍奉神休敢㤀昭報其五岳四瀆天下名山大川各委所在長吏致祭仍加豐㓗以副精誠朕以寡徳上奉丕構宗社流慶𤣥穹叶靈微恙愆和旋就康復渥澤恩及於人瘼儆戒先自於朕躬俾我華夷共歡冨夀中外臣庶宜體予懐主者施行二月九日一作皆唐大詔令䟽理囚徒量移左降官等徳音編制門下朕聞惟天為大惟堯則之施及文王昭事上帝朕遐思古訓順考前文仰止於皇王之間規範於堯文之際始如徒渉而望超溟渤中若䇿蹇而求躡雲霄思逮於三希之則至由是力於恭已銳以濟人九載於茲一致不怠然而徳未甚腆信未甚孚雖懐汔可之詩敢企康哉之詠尚頼社稷降祐祖宗垂休兵革向寜朝野斯乂自頃誕施渥澤冀獲霶流猶慮莫及昭蘓愈多乏困今則夏田豐稔倍於常時不足之憂暫免興慮又以西成未保蟲蝗是慮一作虞永惟恵䘏之宜庶叶銷禳之要苟能利於百姓頼於四方可使稼穡有年邊疆無事則惟恐不及豈憚於必行是用更理闕遺再新提舉一陽斯始爰開蕩滌之恩晏隂将成式繼矜蠲之令副我誠切在爾司存應京畿及天下見禁囚徒暑毒之時要令䟽理牢獄之内慮有滯寃宜令臺府及諸軍司并所在州縣長吏據見禁囚徒流限徳音到後七日内親詳罪名䟽理訖聞奏不得更延引時日除非巨蠧有碍去年赦條外餘並節級逓减一等從輕處分左降官及諸色流人近雖累有赦令皆以沾恩欲其悔過自新豈恡頻施霈澤經去年赦條已得量移者更與量移合復資者准則例處分其去年十一月十日後至今年五月以前續有左降官及流人亦便與量移如今放還者所司速與處分内人久在深宫常膺役使不惟勤勞可憫固亦親愛是思宜令揀選宫人五百人放出各歸其家屬俾無離怨用叶推恩見在宫人尚令揀放諸節進奉宜有指揮應諸親及公郡主等毎年端午及延慶并嬪妃生日所進人一作女口自今已後宜並停進鷹鷂之設本資畋遊朕端居穆清不好馳騁所宜改放以遂物情左右神䇿軍各放二十聨伍坊放三十九聮飛龍放一十九聮其左右神䇿軍毎年進鷹鷂放一作於數内停减春秋二社兩進九月十五日各停進鷹二聮共停一十四聮應租庄宅使司産業庄磑店鋪所欠租斛斗草及舎課地頭等錢所由人户貧窮無以一作可徴納年嵗既逺虚繫簿書縁咸通七年赦條不該今宜從大中三年至大中十三年已前並令放免京兆府奏雲陽等一十二縣百姓論去年宿種麥苖下子後旋被蝗虫食損今年盡不滋生雖京畿之間去冬蠲放不少但以疲人懇訴須務哀矜已令府司差官廵檢如有損處即時特與减放令府司具合放數指實聞奏戍役辛勤道途綿厯将還鄉土在贍供須安南邕州已奏放回北軍其餘頓逓經過本州縣界並須如法先自備辦摐排比切不得臨時差配百姓及借索擾人仍録前後徳音赦條於鄉村分明榜示不得違越仍委所在長吏嚴立條置專加覺察枷禁所施在防奸蠧舉便欠負未渉重條如開府縣禁人或録私債及有銅身監逐無計營生須有條流俾其存濟自今已前應百姓舉欠人債如無物産抵當及身無職任請受一作奉所在州縣及諸軍司須寛與期限切不得禁銅校料令其失業又輙不得許利上生利及回利作本重重徴收如有違越勘實奏聞去年徳音條流事件極多貴其普及生靈惠沾寰宇尚聞所赦令在未盡施行今重舉明俾無留滯宜令天下長吏差清强判官專勾當切更分明檢舉一一據事節施行訖奏聞如更因循必行朝典其所差判官仍速具名銜分析聞奏好生之徳宜及禽魚宇一作卵育之時須加條制舊勑毎年起三月一日至五月末不許採捕水虫禽鳥雖有舊勑一作勑禁尚恐因循宜令臺府并諸軍司每及時禁之月更嚴提撕勿使違犯儉徳之修聖賢所重近日俗多澆靡時尚矜誇朕常慕素風斯遵儉制去年赦文之内已曽明有指揮所宜克副朕心用誡奢僣東川每年進蜜浸荔枝道路遥逺勞費至多自今已後令宜停進布告中外稱朕意焉主者施行咸通八年五月十八日一作皆唐大詔令䟽理京城諸司及諸州軍府囚徒徳音編制勑慎恤刑獄大易格言語曰如得其情哀矜而勿喜而獄吏苛刻務在舞文守臣因循罕聞親一作視事以此械繫之輩溢於狴岸逮一作追捕之徒繁於簡牘實傷和氣用一作因致沴氛况時屬熇蒸化先茂育並赦罪戾式順生成應天下所禁繫罪人非一作除十惡五逆及故意殺人造作一作合造毒藥持仗行刼開發墳墓外餘宜並䟽理什放如或信任人吏多有生情繫留續察訪得知本道觀察使判官州府本曹官必加懲譴以誡慢易勑到十日内䟽理分析聞奏咸通十二年五月十六日一作皆舊唐書文苑英華巻四百四十一
