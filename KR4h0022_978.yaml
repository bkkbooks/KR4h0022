body:
  text: 文苑英華卷九百七十九宋李昉等編交舊二為建安王祭苗君文一首祭黃州髙府君文一首祭韋府君文一首祭率府孫録事文一首祭孫府君文一首祭崔侍郎文一首為河內王祭陸兾州文一首為吏部侍郎祭故人文一首祭李侍郎文一首為王司馬祭甄都督文一首祭清河房公文一首為建安王祭苗君文陳子昻維某年月日朔方道大總管建安郡王攸宜以酒饌之奠祭故壯武將軍左王齡衛中候左三軍營主苗君之靈君忠勇兼資戎麾夙濟烏丸作逆赤羽從軍方且任君先鋒仍馳後徑刈鮮卑之壘摧踏頓之師執馘獻俘歸受國賞何圖大勳未立隨命先凋永懷咨嗟情用兼慟故命酒奠告爾殤魂君其有靈歆兹薄酹嗚呼哀哉尚饗祭黃州髙府君文前人維年月日朔孫女夫某等謹以清酌庶羞之奠敢昭告于故黃州高府君之靈惟府君含德元亨保和光大才堪濟世而運屬承平器允登台而命鍾流集作淪落有瑚璉之寶無廊廟之資豈圖大位不濟幽靈永昧尊儀潜翳三十餘年𤣥殯既開黃腸已古今青烏改卜丹旐來歸窀穸即期幽明永訣某奉事門䦨興言追慕實增感咽竊惟精意以享黍稷非馨敢陳薄酹以獻明靈嗚呼哀哉伏惟尚饗祭韋府君文前人維年月日左拾遺陳子昻謹以少牢清酌之奠致祭故人臨海韋一有府字君之靈惟君孝友自天忠義由已有經世之略懷軌物之量甘心苦節風雨不改常欲窮則獨善其身達則兼濟天下感激遐詠邈然青雲何期良䇿未從大運奄忽嗚呼哀哉昔君夢奠之時值余置在叢棘獄户咫尺邈若山河話言空存白馬不弔逮天網既開而宿草成列言笑無由夢寐不接永言感慟何時可忘今旌旐言歸關河方逺興言永訣今古長辭鄧攸無子天道何知洛陽舊陌拱木猶存京兆新阡孤松已植已矣韋生云何及矣大運之往賢聖同塵嗚呼哀哉伏惟尚饗祭率府孫録事文前人維年月日朔某等云云古人歎息者恨有志不遂如吾子良圖方逺集作興青雲自致何天道之微昧而仁德之攸孤忽中年而顛沛從夭運而長徂惟君仁孝自天忠義由已誠不謝於昔人實有髙於烈士然而人知信而必果有不識於中庸君不慙而集作於貞純乃洗心於名理元常既沒墨妙不傳君之逸翰曠代同仙蜀本作侣豈圖此妙未極中道而息懷衆寶而未攄永幽泉而掩魄嗚呼哀哉平生知已疇昔周旋我之于君交之百年相視而笑宛然昨日交臂而悲今焉已失人代如此天道固集作罔然所恨君者枉夭當年嗣子孤藐貧寠聨翩無父何恃有母惸焉嗚呼孫子山濤尚在嵇紹不孤君其知我無恨泉途嗚呼哀哉伏惟尚饗祭孫府君文前人維年月日子昻謹以牲酒之奠致祭故延俊府折衝燕然集有平字孫府君之靈惟君少馳英武早效成功聲雄塞上名重關中憺稜威於敵國存大節於家風既揮金而退老方餌玉集作藥於仙童何昊天之不弔隨大化之云集作以長終白馬故人青烏送往素車永訣黃壚誰賞醑集作絮酒盈觴魂兮尚饗祭崔侍郎文張說維神龍三年月朔日兵部郎中員外曹良史等謹以清酌少牢之奠敬祭故侍郎崔公之靈位以行成名以才起天臨明代是生君子長㦸髙門層堂峻址孝友仁愛衣冠標軌清通正直省闥集作閣條理束帶立朝惟國之俊抑揚吐納金聲玉振器不滯方神無留韻厚奉外不為假坦率內不違真泛交而容博好施而能均欲人規已恕已及人故者不遺其故親者無失其親歷否泰能全其節故令名不離其身方齊六相助明三辰何孤我德何負兹神摶空隕羽中駕摧輪昔時寮列今為弔賔凡二三子夙承惠集作逰眷聨務七兵嵗陽三變分與時積事由更練謇謇公庭申申私宴慟音徽之永掩懷儀範之不見戢容止於綴足潜眉目於䝉面哀哉奈何零涕集作涕零如霰緬惟初疾以迄將亡意氣精爽乾乾自強顧瞻賔客勉勉矜莊几不側辨衾無解裳話言靜密憂公不忘猶看駿馬尚聽名倡靡神不禱靡藥不嘗倐然信宿魂歸渺茫歲初置酒春中酹觴何吉凶之共域同歌哭於此堂自古及今人誰不沒豈嘆生死所嗟倉卒修途未半壯志先伐㷀子齔年遺孕集作𦙍數月在親親與懷舊孰不傷心而痛骨靈集作虛奠易收深悲難歇尚饗為河內王祭陸冀州文前人維萬歲通天元年月朔日神兵道大總管河北道按撫使右金吾大將軍河內郡王以少牢之奠致祭故兾州刺史陸君之靈戎羯不道侵軼幽都凶渠電滅餘燎星鋪鳴弓抰集作怏栁飲馬長蘆攬集同惡難起無虞梟獍為依集作旅鯨鯤有族裳旗來兵剡弧集作荻弦木泮渙吞噬睢盱觸逐亂舞梯衡集作衡潜攻版築鑿齒爭厲熊蟠未熟踰坦自潰守陴皆哭髙扁集作扄已陷連櫨集作樓復焚人類剃草城隨壞雲僵尸暴骨藉藉紛紛嗟嗟使君死節無吝政覺成俗兵機不振搆此集作狡此猖狂難以德鎮城為讐保身膏虜刃明明上帝仁覆憫下赫赫神兵驅馳在野朝告夕赴集作起如何不及將守非堅為冦是急救兵適來涉血猶濕三軍雷歎百戍雨泣天子命我董戎冀方旌旗介胄千里相望既掃氛濁言巡戰場輯睦人吏撫寧孤孀徘徊城府悽愴甘棠禮重王事哀深國殤魂兮有感歆此嘉嘗尚饗為吏部侍郎祭故人文張九齡維開元十年嵗次壬戌二月癸酉朔十七日已丑吏部侍郎某謹以清酌脯醢之奠致祭于故某公之靈聞夫仁必夀考所謂神道善亦慶延以為信然今夫子之不福而聖謨之是愆孝友純固禮讓周旋行所以直業所以專誠公才而天假故官政以日宣節使是式朝宿既至十部稱賢一人思媚鳯凰于彼雲霄以兾胡然明靈殱我良懿嗚呼哀哉夫子之逝平生之懷襟抱素合逰處嘗偕清風對禁文石同儕自茲兩掖殆將一紀展轉清貫仳離君子曷其愛而甫云覯止正司空之掃第屬荆州之罷市欻交臂而相失殷痛心其何已今卜兆有日祖載在廷颯然象設寞爾音形驅白馬而何見瞻素車而已扄德音不忘應甘棠之勿剪交情乃見伊黍稷之非馨嗚呼哀哉尚饗祭李侍郎集作常侍文前人維年月朔日中散大夫洪州都督張九齡謹遣倉曹恭軍李某以醢脯之奠敬祭于故宋國公之靈惟公世載賢傑天資忠厚外圭組而雖華內水鏡而無垢善常不伐明能自晦省中之樹訪猶不言車前之馬數而後對淑慎自已屯集作否亨有時孰能違集作速非命公此來思結忠主之戀深去國之悲六􅍚斯起五福云欺生涯溘盡精魄何之嗚呼哀哉追惟曩昔升降雲霄榮華侍從暐曄光昭日歟月歟有榮有凋丹旐孑孑白驥蕭蕭同官之感俾余魂銷靈之來歸茲焉旅次瞻望無覩悲辛自至頃密爾而寄音今寞然而結欷南北于逺幽明永異何以叙情寄之奠饋尚饗為王司馬祭甄都督文前人維開元五年嵗次丁已九月丁酉朔十四日庚戌某官謹以清酌少牢之奠敬祭于廣州都督甄公之靈惟公禀氣異人為國良臣資忠取義奮翼躍鱗富貴自取聲名益震故能北擁旄於𤣥朔南仗節於朱垠行部無幾卧理斯屬棠隂在聽薤歌成曲下流是仰長塗反促始望雨而隨車遽驚風而轉燭嗚呼哀哉甫茲嵗首彤檐載輝今也秋季丹旐言歸嗟集作既寒來而暑往將物改而人非駟馬不馭雙燕空飛對平生之氣象詠夙昔之音徽燕越兮地眇湖山兮路微奠肴觴而集作之在席感徒御以霑衣嗚呼哀哉尚饗祭故相國清河房公文杜甫維唐廣德元年嵗次癸卯九月辛丑朔二十二日壬戌京兆杜甫謹以集作敬醴酒茶藕蓴鯽之奠奉祭故相國清河房公之靈曰嗚呼純朴既散聖人又歿苟非大賢孰奉天秩唐始受命羣公間出君臣和同德教充溢魏杜行之夫何畫一婁宋繼之不墜故實百餘年間見有輔弼及公入相紀綱已失將帥干紀烟塵犯闕王風寢頓神器圯裂關輔蕭條乘輿播越太子即位揖讓倉卒小臣用權尊貴倐忽公實匡救忘餐奮發纍抗直詞空聞泣血時遭侵沴國有征伐車駕還京朝廷就列盜本乘弊誅終不滅髙義沉埋赤心蕩析貶官厭路讒口一作言到骨致君之誠在困彌切天道濶逺元精茫昧偶生賢逹不必際㑹明明我公可去一作云時代賈誼慟哭雖多顛沛仲尼旅人自有遺愛二聖崩日長號荒外後事所委不在卧內因循寢疾憔悴無悔夭閼蜀本作死夭泉途激揚風槩天柱既折安仰翊戴地維則一作既絶安放挾集作夾載豈無羣念我心忉忉不見君子逝水滔滔泄涕寒谷吞聲賊濠有車爰送有紼爰操撫墳日落集作晚掛劔秋髙我公誡子無作爾勞斂以素帛付諸蓬蒿身沒集作痊萬里家無一毫數子哀過他人鬱陶水漿不入日月其滔州府救喪一二而已自古所歎罕聞知已曩者書札望公再起往集作今來禮數為能集作態至此先帝松柏故鄉枌梓靈之忠孝氣則依倚拾遺補闕視君所履公之集作初罷印人實切齒甫也備位此官蓋薄劣耳見時危急敢愛生死君何不聞刑欲加矣伏奏無成終身愧耻乾坤慘慘豺虎紛紛蒼生破碎諸將功勳城邑自守鼙鼓相聞山東雖定灞上多軍憂恨展轉痛傷氛集作氤氲𤣥黃集作堂非非色白赤集作黑非不分培塿滿地崑崙無羣致祭者酒陳情者文何當旅櫬得出江雲嗚呼哀哉尚饗文苑英華卷九百七十九
