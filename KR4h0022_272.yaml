body:
  text: 文苑英華卷二百七十二宋李昉等編送行七皇甫曽四首張繼五首韓翊十五首郎士元十七首皇甫冉十三首韋應物八首送杜中丞還京皇甫曽罷戰回龍節朝天見鳳池寒生五湖道春及萬年枝召化多遺愛胡清已畏知懷恩偏間氣集作多感别墮淚向旌麾以下四篇並見集本送李中丞歸本道前人上將宜分閫一作還專席雙旌復去秦關河三晉路賔從五原人碣石山通海滮池集作滹沱雪度春二句一作孤戍雲連海沙洲雪度春酬恩看玉劒何處有煙塵此詩二百九十七卷重出今已削去注異同為一作送元侍御充使湖南前人雲夢南行盡三湘萬里流山川重分首徒御亦悲秋白簡勞王事清猿助客愁離羣復多病嵗晚憶滄洲送韓司直前人遊吳還適越來往任風波復送王孫去其如芳草何岸明殘雪在潮滿夕陽多季子留遺廟停舟試一過送鄒判官往陳留張繼齊宋傷心地一作分巡地頻年此用兵女停襄邑杼農廢汶陽耕國使一作使者乘軺去諸侯一作藩擁節迎深仁荷一作佩或作闕賴子薄賦恤黎氓火燎原猶熱波一作風搖海未平應將否泰理一問魯諸生送竇十九判官使江南前人遊宦淹星紀裁詩鍊土風今看乘傳去那與問津同南郡迎一作過徐子臨川謁謝公思歸一惆悵于越古亭中江上送客遊廬山前人楚客自相送霑裳春水邉晚來風信好併發上江船花映新林岸雲開瀑布泉愜心應在此佳句向誰傳奉送王相公赴幽州前人黃閣開幃幄丹墀拜一作傳冕旒位髙湯左相權總漢諸侯不改周南化仍分趙北憂雙旌過易水千騎入幽州塞草連天暮邉風動地愁無因隨一作陪逺道結束佩吳鈎一作皆中興間氣集送張中丞歸使幕前人獨愛主人歸當朝似者稀玉壺分御酒金殿賜春衣拂席流鶯醉鳴鞭駿馬肥滿臺簪白筆捧手戀清輝送李侍御赴徐州行營韓翊少年兼柱史東至舊徐州逺屬平津閣前驅博望侯向營淮月滿吹角楚天秋客夢依依處雲山對白樓送崔遇歸淄青幕府前人平陵車馬客海上見旌旗舊驛千山下殘花一路時春衣過水冷暮雨出關遲莫道青州客迢迢在夢思送監軍李判官前人上客佩吳集作雙鈎東城喜再遊舊從張博望新事鄭長秋踏水過集作回金勒邉一作看風試錦裘知君不久住漢將掃旄頭送元詵還江東一作送太常元博士歸潤州前人過一作渡江秋色在詩興與歸心客路隨一作緣楓岸家人掃橘林潮聲當晝起山翠近南深集作沈幾日華陽洞寒花引獨一作獨自尋送贊府郭歸淮南前人駿馬淮南客歸時引望新江聲六合暮楚色萬家春白紵歌西曲黃苞寄北人不知心賞後早晚見行塵送孫秀才歸江東前人過淮芳草歇千里又東歸野水吳山出家林越鳥飛荷香隨去棹梅雨㸃行衣無數滄江客如君達者稀送故人歸魯前人魯作多歸興故人含别情雨餘衫袖冷風急馬蹄輕秋草靈光殿寒雲曲阜城知君拜親後少婦下機迎故人含又𤣥集作居人愴是此詩二百八十四卷重出今已削去送李中丞赴商州前人五馬渭橋東連嘶背曉風當年紫髯將他日黑頭公不異金吾寵兼齊玉將雄開營春雪下吹曲暮山空香麝松隂裏寒猿黛色中郡齊多賞事好與故人同送管城李少府前人懷祿兼就養更憐趨府心晴山東里近春水北門深新綬映芳草舊家看逺林還乘鄭小駟躞蹀縣城隂送客還江東前人還家不落春風後數日應沽越人酒池畔花深鬪鴨欄橋邉雨洗藏鴉栁遙憐內舍著新衣復喜鄰家醉落暉把手間歌香橘下空山一望鷓鴣飛送冷朝陽還上元前人青絲䋏音昨索也引木蘭船名遂身歸拜慶年落日澄江烏榜外秋風踈栁白門前橋通小市家林近山帶平湖野寺連别後依依寒夢裏共君携手在東田送髙别駕歸汴州前人信陵門下識君偏駿馬輕裘正少年春雨送歸千里外東風留醉百花前身隨玉帳心應愜官佐銅符勢又全久客未知何計是參差去借汶陽田送王光輔歸青州兼寄朱侍御前人幾通集作回又作封奏事建章宫聖主偏知漢將功身著賜衣趨闕下口銜天詔出關東蟬聲驛路秋山裡草色河橋落照中逺憶故人滄海别當年好耀五花驄送康洗馬歸滑州前人腰佩雕弓漢射聲東歸銜命見雙旌青絲玉勒康侯馬孟集作白水金堤滑伯城臘雪夜看宜縱飲寒蕪晝獵不妨行懷君又隔千山外别後春風百草生送客之江寧見三百四十一卷送裴補闕入河南集作東幕郎士元皎然青瑣客何事動行軒苦節酬知已清吟去掖垣秋城臨海樹寒月一作日上營門鄒魯詩書地應無鼙鼓喧送彭偃房由赴朝因寄錢大郎中李十七舍人前人衰病已經年西峯望楚天風光欺鬢髮秋色換山川寂寞浮雲外支離漢水邉平生故人逺君去話澘然送奚賈歸吳前人東南富春渚曽是謝公遊今日奚生去新安江正秋間氣集作流水容清過客霜集作楓葉泮行舟想對蘭集作想青亭下聞猿應自愁送長沙韋明府之任前人秋入長沙縣蕭條旅宦心烟波連桂水官舍映楓林雲日楚天集作山暮沙汀白露深遙知訟庭集作堂裏佳政在鳴琴送洪州李别駕之官前人南去秋江逺孤舟興自多能將流水引更入洞庭波夏口帆初上潯陽鴈正過知音在霄漢佐郡豈蹉跎送孫顧前人悠然富春客憶與暮潮歸擢第人多羡如君獨步稀亂流江渡淺逺色海山微若訪新安路嚴陵有釣磯送張南史已見二百五十三卷前人送李遂之越前人未習風波事初為東越遊露霑湖草曉月照海山秋梅市門何處蘭亭水尚流西陵待潮信落日滿孤舟送鄭正則徐州行營前人從軍非隴頭帥在古徐州氣徑三河卒功全萬户侯元戎閫外略才子幄中籌莫聼關山曲還生塞上愁送韋湛判官前人髙閣晴江上重陽古戍間聊因送歸客更此望鄉關惜别心能醉經秋鬢自斑臨流興不盡惆悵水雲間送錢拾遺歸兼寄劉校書前人墟落嵗隂暮桑榆烟景昏蟬聲靜空館雨色隔秋原歸客不可望悠然林外村一作藍上終當報藝閣携手醉柴門送郴縣裴明府之任兼充宣慰前人白蘋楚水三湘逺芳草春城二月初連雁北飛看欲盡孤舟南去意何如渡江野老思求瘼候館郴人憶下車别後天涯何所寄故交唯有袖中書送李敖湖南書記前人憐君才與阮家同掌記能資亞相雄入楚豈忘看淚竹泊舟應自愛江楓誠知客夢烟波裏肯厭猿鳴夜雨中莫信衡陽書不到年年秋鴈過巴東送麴司直前人曙色滄滄兼曙雲朔風烟鴈不堪聞貧交此别無他贈唯有青山逺送君送别前人穆陵關上秋雲起安陸城邊逺行子薄暮寒蟬三兩聲回頭故鄉千萬里送陸員外赴漳州前人含香臺上柏集作客剖竹海邉州驛使集作楚驛多歸信閩溪足亂流今朝永嘉路重見謝公遊關侯祠送髙員外還荆南集作州前人將軍禀天資義勇貫一作冠今昔走馬百戰場一劒萬人敵誰為感恩義集作者竟作集作是思歸客流落荆巫一作巫峽間徘徊故鄉隔離筵對祠宇灑酒暮天碧去去勿復言銜悲向陳集作塵跡送王相公之集作赴幽州皇甫冉自昔蕭曹任難兼衛霍功勤勞無逺近旌節屢西東不選三河卒還令萬里通鴈行緣古塞馬鬛起長風集作御間分善馬武庫出彤弓遮虜關山靜防秋鼓角雄徒思一攀送羸老集作病蓽門中獨孤中丞宅筵陪餞韋使君赴升州前人中司龍節貴上客虎符新地控吳襟帶才光間氣集作髙漢縉紳泛舟應度臘入境便行春何處歌來暮長江建業人送李録事一作裴員外赴饒州北人南去雪紛紛鴈呌河洲不可聞積水長天隨逺客孤舟一作荒林又作荒城極浦足寒雲山從建業千峯逺一作起江到潯陽九𣲖分借問督郵才弱冠府中年少不如君送裴員外赴江南一作西前人分務江南逺留歡幕下榮楓林縈間氣集作違集本作緣楚塞水驛到湓城岸草知春晚沙禽好夜驚風帆幾日到間氣集作度泊處處暮潮平送元晟還於潛山所居已見二百七十一卷前人送竇十九赴京氷結楊栁津從吳去入秦徒云還上國誰為作中人驛樹同霜霰漁舟伴苦辛相如求一謁詞賦逺隨身宿嚴維宅送包七前人江湖同避地分手自依依盡室今為客經秋空念歸嵗儲無别墅寒服羡鄰機草色村橋晚蟬聲江樹稀夜凉宜共醉時難惜相違何事隨陽侣汀洲忽背飛歸陽羡兼送劉八長卿前人湖上孤帆别江南謫宦歸前程愁更逺臨水淚霑衣雲夢春山遍瀟湘過客稀武陵招我隱嵗晚向柴扉送韋判官赴閩中前人孤棹閩中客雙旌海上軍路人從北少嶺水向南分野鶴驚一作傷秋别林猿忌夜聞漢家崇亞相知汝逺邀勳送權驊前人淮海風濤起江關憂思長同悲鵲繞樹猶作鴈隨陽山曉雲和雪汀寒月照霜由來濯纓處漁父愛滄浪送顧中史中字詩選作長往新安前人由來山水客復道向新安半是乘潮便全非行路難晨裝一作秋林月在夜飲渚沙寒詩選作野飲浦沙寒嚴子千年後誰人釣舊灘送王司直前人西塞雲山逺東風道路長人心勝潮水相送過潯陽送錢塘路少府赴制舉前人公車待詔詣一作赴長安客裏新正阻舊歡遲日未能銷野雪晴花偏自犯江寒東溟道路通秦塞北闕威儀覩漢官時許郤詵能對䇿恩榮請向一枝看一作皆詩選送崔叔清遊越韋應物忘兹適越意愛我郡齊幽野情豈好謁詩興一相留集作逺楚水帶寒樹閶門望去舟方伯憐文士無為成滯遊送崔肅懿前人秋風集作氣入疏户離人起晨朝山郡多風雨西樓更蕭條嗟豫淮海老送子關河遙同來不同去沈憂能復銷重送邱二十二還臨平山居前人嵗中欣集作始再覩方來又解携才留野艇語已憶故山棲幽澗人夜汲深林鳥長啼還持郡齊酒慰子霜露悽送豆盧䇿秀才前人嵗交氷未泮地卑海氣昏子有京師遊始發吳閶門新黃含逺林微緑生陳根詩人感時節行道當憂煩古來濩落者俱不事田園文如金石韻豈乏知音言方辭郡齊榻為酌離亭樽無為倦羇旅一去髙飛翻送雷監赴闕庭前人才大無不備出入為時須雄藩旌理行祕府擢文儒詔書忽已至焉得久踟蹰方舟赴朝謁觀者盈路衢廣筵列衆賔送爵無停迂攀餞誠愴恨賀榮且歡娛長陪柏梁宴日向丹墀趨時方重右職蹉跎獨海隅送李侍御益赴幽州幕前人二十揮篇翰三十窮典墳辟書五府至名為四海聞始從車騎幕今赴嫖姚軍契濶晚相遇卒䠞集作戚遽離羣悠悠行子逺眇眇川途分登髙望燕代日夕生夏雲司徒擁精甲誓將除國氛儒生幸持斧可以佐功勳無言羽書急坐闕相思文餞雍聿之潞州謁李中丞前人鬱鬱兩相遇出門草青青酒酣拔劒舞慷慨送子一作君行驅馬涉大河日暮懷洛京前登大行路志士亦未平薄遊五府都髙步振英聲主人才且賢重士百金輕絲竹促飛觴夜宴逹晨星娛樂易淹暮諒在執髙情送邱員外丹還山前人長棲白雲表暫訪髙齊宿還辭郡邑喧歸泛松江渌結茅一作臨隱蒼嶺伐薪響深谷同是山中人不知往來躅靈芝非庭草遼鶴委池鶩終當署里門一表髙陽族文苑英華卷二百七十二
