body:
  text: 文苑英華卷九百六十四宋李昉等編婦人二彭城公夫人爾朱氏墓志一首東平夫人李氏墓志一首李參軍妻張氏墓志一首館陶郭公姬薛氏墓志一首高明府妻宇文氏墓志一首崔主簿妻劉氏墓志一首節慜太子妃楊氏墓志一首彭城公夫人爾朱氏墓志銘庾信夫人爾朱氏河南洛陽人也若夫隂山表裏衝北斗之機衡瀚海彌綸直西街之畢昴四時銜火燭龍開照地之光六月搏風大鵬運垂天之翼由是奄有京縣遂荒中土車書禮樂三王之損益可知將相公侯百代之山河不殞祖敞隋儀同三司金紫光祿大夫岐同金申信臨徐七州總管兵集作藩部尚書金集作邊城郡開國公天列尚書之星地標光祿之塞出身萬里知吕岱之元勳専命一方識劉𢎞之重寄父休最隋左千牛備身朝散大夫齊王府司馬襲封爵金集作邊城公大夫稱伐諸侯胙土淮仙致雨仍攀桂樹之山楚客臨風更入芙蓉之水夫人玉臺貞氣金河仙集作靈液蔡中即之女子早聽色絲謝太傅之閨門先揚麗則彭城公發源殷伯承家漢相山川氣候彰白武於臯陶象緯休徵下蒼龍於曼倩三星照夜佇稽鳴鴈之期七日秉秋坐薦飛皇之兆夫人年甫十八遂歸於我巫山南眺逢暮雨於瑤姬華嶽西臨降明星於玉女動合詩禮言成軌則晨昏展敬事極於移天蘋藻挈誠義申於中饋女郎砧石響明月而思秋風織婦集作女機牀聽寒蛩而催絡緯用曹大家之明訓執宋伯姬之貞節加以心依八覺理會三空遊智刃於檀林泛仙舟於法海幾神獨照點言象而無施空有兼忘束筌蹄而不用人生天地壽非金石銀臺竊藥想奔月而何年金殿一作玉釡集作金釡煎香思反魂而無日以某年月日終于平康集作原里之私第越上元三年十月二十日合葬于城南之畢原禮也齊侯寢側杜氏階前對文王之畢原用周公之合葬偃松千古長無寡鶴之悲文梓百尋還見雙鴛之集其銘曰合葬非古周公所存死生千載棺槨雙魂野曠風急天寒日昏煙霾杳嶂霧失遙村紀黃絹之碑表對青松之墓門伯母東平郡夫人李氏墓志銘前人夫人姓李氏隴西狄道人也自涼武昭王以後一門三公為四海著族國史家諜詳之矣祖充穎後周大將軍消州刺史流江郡公考玄明皇朝上儀同闕濟三州刺史成紀縣男出入三朝剖符分竹秦隴河濟之地人到于今稱之天下士大夫知與不知莫不想望其風采夫人生而純深幼而恭敬長而敦睦成而和惠年及初笄甫歸於我執箕帚奉舅姑人不間於其娣姒妾媵之言閨門之內穆如也故宗黨推其令問鄉閭以為美談東平公守清白之基逢太平之日辟命交至聲聞於天制集作詔徵尚書郎遷御史中丞出為棣曹恆常四州刺史夫人輔佐君子聿修內政平旦纚笄則有君臣之嚴沃盥饋食則有父子之敬報友而行則有兄弟之道受期必誡則有朋友之信其婦德也如此歷職中外聲名籍甚和其琴瑟正其邦家者夫人與有力焉蓋嘗喟然而言曰古者卿之內子為大帶命婦成祭服社而獻功可不朂哉可不朂哉由是服浣濯之衣躬紡績之事筐筥錡釡之器所以執其勞蘋蘩藴藻之菜所以明其德非夫博文達禮貞婉聽從者孰能與於此乎及公乞骸告老退歸初服夫人年踰耳順視聽不衰每獻嵗發春日南長至羣從子弟稱觴上夀者動至數十百集無此字未嘗不勸一作歡言善誘借以溫顔侃侃焉誾誾焉有孟母之風焉有敬薑之誨焉維永淳元年秋八月旁死魄寢疾彌留終於華隂之望仙里享年八十有一冬十一月一日景辰遷窆於永豐鄉之平原從先兆也東平公撫存懷舊用痛悼于厥心逺近咸集宗親畢會生榮死哀其此之謂矣是日也皇太子監守長安炯忝為詹事司直不獲就展集作展哀喪次陪奉靈輀敢薦李顒之文庶同潘嶽之誄嗚呼哀哉乃為銘曰髙嶽之上浮雲翔兮函谷之外真氣揚兮建功北漠討西羌兮受封南鄭家素昌兮於赫祖考為龍光兮牧州典郡佩銀黃兮降生淑質秉禎祥兮苕華菊茂蘭若芳兮我有懿德如圭璋兮求之卜筮鳴鳯凰兮君子至止玉環鏘兮室家好合琴瑟張兮執其麻枲供衣裳兮羞其饋食澄酒漿兮諸姑伯娣穆溫良兮姨姒叔妹歡未央兮公之出門牧守四方兮夫人之化德洋洋兮公之告老返維桑兮閨門之內道彌彰兮正月上日南至長兮子孫歡慶各稱觴兮宋公集作云孟母魯季薑兮匪怒伊教由舊章兮方期高舉登紫房兮誰謂不宜集作冥默掩玄堂兮肅肅松檟鬱成行兮沈沈厚夕集作穸終不暘兮袁州參軍李府君妻張氏墓志銘陳子昂夫人諱某清河郡東武城人集有也字昔軒轅錫胤􅓡矢崇威畏其神者三百年得其姓者十四族金貂七葉漢天子之忠臣鼎足三公晉武皇之名相孤卿玉帛世有其庸曾祖某北齊大常卿徐兖二州刺史天人之禮位掌於秩宗侯伯之尊寵優於露冕祖某隋汾隂壽春陽城三縣令襲公侯之瑞屈銅墨之班士元非百里之才太丘有三台之望父某唐户部侍郎復亳建三州刺史尚書北斗始贊於南宫方嶽專城終榮於獨坐夫人即刺史集作使君之第若干女也稟柔成性藴粹含章承禮訓於公宫集作庭習威儀於壼則夫其窈窕之秀燕婉集作婉孌又作婉􅟠之姿貞節峻於寒松韶儀麗於溫玉鉛華不御飾環佩之容浣濯是衣勤黼黻之彩自作嬪於君子主中饋於家人三千之禮不違九十之儀無慝至乃恭於奉上順於接下仁孝以承宗祀慈惠以睦閨門則雍雍蹌蹌必由其道矣嗚呼府君不造遘此閔凶中年不淑集作圖早世而殞青松摧折哀斷女蘿之心丹節集作桂孤高終守柏舟之誓而府君食先人之德無厚生之財夫人徇黔婁之貞闕丹臺之産孀居永日一本作嵗蓬首終年處貧素而彌堅保幽芳而不昧始府君之逝有四子焉少遭罔極之哀未奉過庭之訓夫人保持名教終始禮經既朂之以義方又申之以逺大皆能率由慈訓克荷家集作嘉聲箕裘之業載隆燕翼之謀不隕非夫淑明賢德集作懿聖善溫良崇婦道之深規𢎞母儀之至範孰能昭宣令聞若此集作斯之盛哉彼蒼不忱殱我眉壽春秋若干載初元年月日遘疾終于洛州某里之私第嗚呼哀哉夫人令儀有穆惠問無喧敦雅志于詩書婉娩集作嫺情于琴瑟若乃姆師酒食之儀女工纂組之繁莫不總制清衷𢎞宣懿則茂蘋蘩之雅韻集作訓叶沼沚之芳猷雖古稱敬薑詩云淑女論容比德殆無以過穠華不居松扄永閟嗣子某等悲摧欒棘思結寒泉永惟同穴之儀仰遵歸祔之典以大周天授三集作二年二月日朔祔于集作於袁州府君之舊塋禮也合葬非古奉周公之儀墓而為墳宗仲尼之訓嗚呼鴛鴦之樹眇泣於松楸鼓吹之山緬然於丘隴原陵何代銘志無文有哀黃鳥之詩遂勒青烏之兆銘曰詩云淑女君子好逑集作求非懿哉令德嘉儀聿修溫容玉映峻節松楸妙心彤史潔志玄猷昭宣壼則惠穆蘋洲共伯早逝貞薑獨留焭居蓬首哀深柏舟彼蒼不愸此夜長幽懷南風之吹棘相集作想北山以同丘青春兮白日獨昭昭以悠悠館陶郭公姬薛氏墓志銘前人姬人姓薛氏東明國王金氏之胤也昔金王有愛子别食於薛因為姓焉世不集無此字與金氏為姻其髙曾皆金王貴臣大人也父承集作永沖有唐高宗時與金仁旴本作仙問歸國帝疇厥庸拜左武衛將軍姬人幼有玉色發於穠華若彩雲朝升微月宵映也故家人美之少號仙集作人字子聞嬴臺有孔雀鳯凰之事瑶情悅之年十五大將軍薨遂剪髮出家將川本無將字學金仙之道而見寶手菩薩靚集作靜心六年青蓮不至乃謠曰化雲心兮思淑貞洞寂滅兮不見人瑤草芳兮思氛氲集作芬蒀將奈何兮青春遂返初服而歸我郭公郭公豪蕩而好奇者也雜佩以迎之寶琴集作瑟以友之其相得如青鳥翡翠之婉孌矣華繁絶集作艷歇樂極哀集作悲來以長壽二年太歲癸巳二月十七日遇疾卒三字集作遇暴疾而卒於通泉縣之官舍嗚呼哀哉郭公恍然猶若未亡也寶珠以含之錦衾而舉之故園集作國是途遙言歸未逮留殯於縣之惠普寺之南園不亡貞也銘曰高丘之白雲兮願一見之何期哀淑人之永逝滅集作感紺園之春時願作青鳥長比翼魂魄來兮集作歸來遊故園陳州苑丘縣令髙府君夫人河南宇文氏墓志銘前人夫人諱某河南郡人也昔吾君夏后氏之子霸有幽都皇運北興鼎國旴本作圖南起開寶符而帝天下撫璿璣而主中國則後周之受命武帝之雲孫夫人四代祖也曾祖某失周子之封亡山陽之國雖在集作存天子之胤已是集作類咸陽布衣植德早夭祖某隋朝官資至集無此二字灃州灃陽縣令父某龍州司法皆承家席寵世有令名夫人賁穠華襲繁祉崇徽蕙穆秀色苕榮自于幼年有令儀也十四適于髙府君夫其溫慈惠和忠信肅穆集作信肅修穆行有法度動有禮經嚴恪以理家人僴集作􅈺瑟以和君子則以集作巳含乎光大矣若乃宗廟哀敬仁孝也娣姒祗和謙順也蠲潔酒食婦儀也黼黻玄黃女工也𢎞此四德而務六親鞶帨以文之雜佩以發之猗可以作範母儀昭宣壼則矣至於訓子以睦教女以順愛下以慈與人以讓外以贊府君之德內以光中饋之政皆日聞其進不見其退也嗚呼仁而不壽生而集作也永終永淳元年某月遇疾終於集作于苑丘縣之官舍時年二十七嗚呼哀哉髙府君尋以公集無此字事罷職山塋未卜旌旐來歸府君思北海之魂留東園而殯日月遂往九嵗于茲府君乃集作方崇樹先塋增封舊域以大集無此字周天授三集作二是年太歲辛卯二月癸卯啓殯于集作於東園遷祔於洛州某原禮也哀哉夫人雅有髙行終而不忘以為厚葬非禮也是以珠玉不飾磚瓦是藏髙府君聿遵其志率以薄葬於戲非古之明德淑女金玉其光孰可集無此字以躋之吾忝門閭之賓覩其家道矣雍穆懿鑠實有清風故敘之而未充德也銘曰夭夭桃李有花兮灼灼淑人宜家兮修睦婦道不譁兮窈窕嬪儀孔嘉兮何榮采之方茂兮而云落兮吁嗟集作而云亡兮咨嗟司屬主簿博陵崔訥妻劉氏墓志銘張説夫人劉氏其先彭城人也隋毗陵郡通守字集無此字豫將之曾孫唐滁州刺史德祖之孫汾陽集作州刺史延嗣之女子集作也昔武子處秦厥初命集作令氏元王國楚是為昌族盛德之門龍驥接彩世祿之胄龜虎聨華夫人璇室載蘭蕙林層秀喈喈黃鳥豔豔清月集作明明詩説禮集作聞詩聞禮竊比諸生茂行淵心實稱士母集作女是及鳯飛啓繇夫婦盡琴瑟之和雞鳴咸纚舅姑移橋集作喬梓之敬友愛洽乎姒媦任恤周乎姻戚豈惟禮備澄羃工深機杼固以能循法度宜其室家矣年若干以大定元年七月某日寢寐集作疾而卒粵二十九日某辰假葬於某里夫國喪賢嬪家亡淑媛母氏垂白殞集作殯奮所懷稚子始孩剪集作翦焉無恃集作倚嗚呼天道輔仁人道與順眷茲七德不遐三壽何哉報應之理豈神食所集作其言修短之期將事歸於命外姻畢萃纍歎不足夫人即吾姨也今薄撰素履永刋幽石國史之外有美存焉其銘曰崔實齊胄劉亦漢宗崇其顯媾望乃偶集作偶族雙閫闈是穆饋奠斯恭貞歌浮漢孝室洄集作洞江圭璋其節桃李其容宜享偕老胡寧鞠凶朝槿飛陌春蘿墜松夫傷子慕去此何從百歲之後魂兮合封節慜太子妃楊氏墓志前人開元十有七集作五年二月癸未中宗節慜太子妃楊氏薨於京師太平里第之內寢越五月景申詔葬於新豐之細栁原黃陵不從古之道也嗚呼哀哉妃氏之先代居河華赤泉啓國清白傳家東都之公胄西晉之后族髙祖士達隋開府納言天授中以孝明髙后集作氏非之父追封鄭王贈太尉曾祖緘隋符璽郎抗節王充朝廷旌載集作聖朝旌義贈靈州刺史祖全節左內率贈魏州刺史考知慶千牛豹韜二將軍若夫軒冕王官同許史之繁漢婚姻帝室比薑姞之宜周是故二華降靈五河飛譽拜玉册於文廟儷金璽於青宫入參視膳之儀出友元真之樂禮陪璽館祭服始於北郊詩贊鵲巢王化終於南國豈知言集作諫違鬭水神往邙集作郎山七日之望不歸千秋之言何及於是視身知苦幽探白馬之偈覺心等空坐證青蓮之葉久以橋集作喬木無怙柏舟早誓棣華集作萼先落聖善相依䦱門正家稱未亡而全禮高堂終養不勝哀而遂絶此又禮外之禮孝中之孝者也初上在東宫時妃有女弟選為良媛生忠王卜者曰不宜養爰自襁褓命妃舉字集作之及開元正位良媛為嬪而卒妃之視忠王也隱襯之訓誨之竭從母之仁慈倍猶子之珍愛忠王之託妃也敬愛焉聽順焉生盡因心之樂沒過如母之戚且夫慈懋鞠育孝思顧復仁叶恩親愛備恭睦成天下之百行致生人之五福斯蓋皇極之端國風之首者矣湖陽王當小宗之祭集無此二字非元妃之喪故喪挾兩集作二孤而祭殷二國何必鼓吹山上遙傳慈母之名石闕廟中獨立少姨之像史官承詔勒銘沈碧詞曰太華北足長河東肘總粹隂靈妃德儲后嗚美玉佩炯光金鈕貴嬪長姨寵王從母永訣上賔死孝哀親顧懷孺子忍别天人昔貞萬國今撫百神泉燈我夜宫樹他春陵集作陸非麥秀兮漸漸隴月生兮纎纎霸岸集作玄灞去兮無還日青門絶兮不集作無可曕石獸澀集作古兮緑苔黏宿草殘兮白露霑園寢閉兮脂粉膩不知何人兮開鏡奩文苑英華卷九百六十四
