body:
  text: 文苑英華巻三百三十宋李昉等編禽獸三蟲魚蟬二十二首促織二首蜘蛛一首馬三十三首猿三首獺一首魚四首龜一首蟬詠蟬褚澐避雀喬類聚作芳枝裏飛空華殿曲天寒響屢嘶日暮聲逾速類聚作促繁吟如欲盡長韻還相續飲露非表清輕身易知足後堂聽蟬蕭子範試逐微風逺聊隨夏葉繁輕飛避楚雀飲露入吳園流音繞藂藿餘響切髙軒借問邊城客傷情寧可言同陸廷尉驚早蟬沈君攸日暮野風生林蟬候節鳴望枝疑數處尋空定一聲地幽吟不斷葉動噪羣驚獨有河陽令偏嫌秋翅輕賦得新題寒樹晩蟬踈張正見寒蟬噪楊栁應朔吹類聚作朔吹犯梧桐葉迥飛難住枝殘影共空聲踈飲露後唱絶小園類聚作斷絃中還因摇落處寂寞盡秋風賦得秋蟬喝栁應衡陽王教前人秋氣爽遥天園栁集集作裊驚蟬競噪長枝裏争飛落葉前風髙知響急樹近覺聲連長楊流唱盡詎識蔡邕絃在獄詠蟬駱賔王西陸蟬聲唱南冠客思侵那堪𤣥鬢影來對白頭吟露重飛難進風多響易沉無人信髙潔誰為表清心集作予心始聞夏蟬韋應物徂夏暑未晏鳴蟬集作蝉鳴景已曛一聼知何處髙樹但侵雲響悲遇衰齒節謝屬離羣還憶郊園日獨向此集作澗中聞新蟬耿湋今朝蟬忽鳴遷客若為情便覺一年謝能令萬感生㣲風方滿樹落日類詩作葉稍沉城為問同懐者凄凉聼幾聲新蟬酬劉夣得見寄白居易開緘思浩然閒集作獨詠晩風前人貎非昨集作前日蟬聲似去年槐花新雨地栁影欲秋天聼罷無他計相思又一篇聞蟬寄賈島姚合秋來吟更苦集作未秋吟更苦半咽半隨風禪客嫌心集作心應亂遊人願耳集作耳願聾雨晴髙樹裏日晩古城中逺思應難盡誰當與我同客中聞早蟬于武陵江頭一聲起芳嵗已難留聼此髙林上遥知故國秋應催風落葉似勸客囘舟不是新蟬苦年年自可愁病蟬賈島病蟬飛不得向我掌中行折翼猶能薄酸吟尚極清露華凝在腹塵㸃誤侵睛黄雀兼鳶鳥俱懐害爾情風蟬前人風蟬旦夕鳴伴葉送新聲故里客歸盡水邉身獨行噪軒髙樹合驚枕暮山横聼處無人見塵埃滿甑生早蟬薛能不見上庭樹日髙聲忽吟他人豈無耳逺客自闗心暫落還因雨横飛亦向林分明去年意從此漸聞砧聼蟬趙嘏噪蟬聲亂日初曛絃管樓中永不聞争詩選作獨奈愁人數莖鬢詩選作髮故園秋隔五湖雲蟬雍陶髙樹蟬聲入晩雲不唯愁我亦愁君何時各得身類詩作心無事毎到聞時似不聞蟬張喬先秋蟬一悲長是客行時曽感去年者又鳴何處枝細聼殘韻在廻望舊聲遲斷續誰家樹凉風送别離蟬許棠造化全㣲物偏宜應侯名初離何處樹又發去年聲騷屑隨風逺悠揚類葉輕報秋凉漸至嘶夜思偏清黙守疑相答㣲摇似欲行繁音人已厭朽殻蟻猶争朝士嚴冠飾宫嬪逞鬢名亂依西月噪多引北歸情篠露凝潜吸蛛絲迸忽縈此時吟立久萬緒一時生蟬集作聼新蝉寄張晝方干細聲頻斷續審聼亦難分髣髴應移處從容却不聞蘭棲朝咽露樹隠暝吟雲若集作莫遣鄉愁起吾懐只是集作似君蟬羅鄴纔入新秋百感生就中蟬噪最堪驚能催時節凋雙鬢愁到類詩作對江山聼一聲不傍管絃拘醉態偏依楊栁撓類詩作引離情故園聞處猶惆悵况是經年萬里行蟬羅隠天地工夫一不遺與君聲調借君緌風栖露飽今如此應㤀當年滓濁時夜蟬唐彦謙翠竹髙梧夾後溪勁風危露雨凄凄那知北牖殘燈暗又送西樓片月低清夜更長應未已逺煙尋斷莫頻嘶羇人此夕如三嵗不整寒衾待曙鷄促織杜甫促織甚㣲細哀聲何動人草根吟不稳床下夜相親久客得無淚放集作故妻難及晨悲絲集作絃與急管感激異天真同前張喬念爾無機自有情迎寒辛苦弄梭聲椒房金屋何曾織偏向貧家壁下鳴蜘蛛孟郊萬類皆有性各各禀天和蠶身為爾集作與汝身爾身何大訛蠶身不為已爾心集作身不為他蠶絲為衣裳爾絲為網羅濟物既無功害物日已多百蟲雖有集作切恨其将奈爾何馬西齋行馬梁簡文帝晨風白金絡桃花紫玉珂影斜鞭照耀塵起足蹉跎任俠稱六輔輕薄出三河風吹鳯凰袖日映織成靴逺江艫舳少遥山煙霧多雲開瑪瑙華類聚作葉水浄琉璃波廣路拂青栁囬堂繞碧莎不効孫呉術寧湏趙李過繫馬前人青驪流赭汗緑駬懸花蹄未垂青鞙尾猶掛紫障泥蹀足靽中憤摇頭櫪上嘶紫闗如未息直去取榆溪賦詠登山馬梁武帝登山馬逕小逕小馬終通汗赭疑沾勒衣香不逐風何殊隴頭望遙識祁連東後園看騎馬同前良馬出蘭池連翩驅桂枝鳴珂隨跼駛輕塵逐影移香來知驟近汗歛覺風吹遥望黄金絡懸識幽并兒賦得馬劉删獨飲臨寒窟離羣思北風陳王欲觀儛御史自隨驄邊聲隕客淚果下益桃紅恒持沛艾影觧向平陵東賦得邊馬有歸心沈烱窮秋邊馬肥向寒甚思歸連鑣渡蒲海束舌下金徽已却魚麗陣将摧鶴翼圍彌憶長楸道金鞍類聚作鞭背落暉登山馬梁簡文帝登山馬間樹玉勒黄金装草合宜韀短影轉見鞭長何殊八公岫蹔上淮南王詠馬楊師道寳馬權竒出未央彫鞍照曜紫金装春草初生馳上苑秋風欲動戲長楊鳴珂屢度章䑓側細蹀輕向濯龍傍徒令漢将連年去宛城今已馘初學記作獻名王病馬杜甫乗汝集作爾亦已久天寒闗塞深塵中老盡力嵗晩病傷心毛骨豈殊衆馴良猶至今物㣲意不淺感激集作動一沉吟英華題杜甫病馬詩一首縂目同第一篇致此自僻逺又非珠玉装如何有竒怪毎夜吐光芒虎氣必騰上龍身寕久藏風塵若未息持汝奉明王按本集乃蕃劒詩玩詞意亦然其病馬只是一首當時誤編羽林騎韓翃駿馬牽來御栁中鳴鞭欲過渭橋東紅蹄亂踏春城雪花頷頻嘶上苑風觀調馬前人鴛鴦赭白齒新齊晩日花中散碧蹄玊勒乍囘初噴沫金鞭欲下不成嘶奉和劉祭酒傷白馬此馬勅賜寕王轉贈祭酒嚴維沛艾如龍馬來從上苑中棣華恩見賜伯舅禮仍崇鏡㸃黄金眼花開白雪騣性柔君子徳足逸大王風色照鳴珂净聲連噴玉雄食場恩未盡過隙命旋終練影依雲沒銀鞍向月空仍聞樂府唱猶念代勞功詠老馬沈烱昔日從戎陣流汗幾東西一日馳千里三丈㧞深溪渡水頻傷骨翻霜屢損蹄勿言年齒暮尋途尚不迷詠飲馬唐太宗駿骨飲長涇奔流洒絡纓細紋連噴聚亂荇繞蹄縈水光鞍上側馬影溜集作流中横翻似天池裏騰波龍種生詠飲馬應詔楊師道清晨控龍馬㺯影出花林躞蹀依春澗聫翩渡碧潯苔流染絲絡水潔冩雕簮一御瑶池駕詎憶長城隂䝉裴相公集作司空賜馬謹以詩謝張籍緑耳新駒已有集作駿得名司空自選集作逺自寄書生逺集作乍離華廐移蹄澁初到貧家舉眼驚毎見閒人多被集作來借問唯集作多尋古寺獨騎行思量幾夜集作長思嵗旦沙堤上得從鳴珂倚集作傍火城酬張秘書因寄馬贈詩裴度滿城馳逐皆求馬古寺閒行獨與君代歩本慚非逸足縁情何幸枉髙文若逄佳䴡從集作湏將換莫共駑駘角出羣飛控着鞭能顧我當時王粲亦從軍和前李絳髙才名價欲凌雲上駟光華逺贈君念舊露垂丞相簡感知星動客卿文縱横逸氣寧稱力馳騁長途定出羣伏櫪莫令空度嵗黄金結束取功勲同前集作和張十八秘書得裴司空馬韓愈司空逺寄養初成彩集作毛色桃花眼鏡明落日已曽交轡語春風還擬並鞍行長令奴僕知饑渇湏着賢艮待性情旦夕公歸申集作伸拜謝免勞騎去雜詠作去騎逐雙旌同前張賈閣下從容舊客卿寄來駿馬賞髙情司空詩云古寺閒行獨與君任追煙景騎仍醉知有文章倚便成歩歩自憐春日影蕭蕭猶起朔風聲湏知上宰吹嘘意送入天門上路行同前元稹丞相功髙厭武名牽将戰馬寄儒生四蹄荀距藏雖盡六尺鬚頭見尚驚减粟偷兒憎未飽騎驢詩客罵先行勸君還却司空着莫遣衙叅傍子城同前白居易齒齊臕足毛頭膩秘閣張家集作郎叱撥駒洗了頷花翻假錦走時蹄汗逹真珠青衫乍見曽驚否紅粟難賒得飽無丞相寄來應有意遣君騎去上雲衢同前集作裴相公大學士見示答張秘書謝馬詩并羣公屬和因命追作劉禹錫草𤣥門户少塵埃丞相并州寄馬來初自塞垣啣苜蓿忽行幽徑破莓苔尋花緩轡威遲去帯酒垂鞭躞蹀廻不與王侯與詞客知輕富貴重清才駑驥吟韓愈駑駘誠齷齪市者何其稠力小苦易制價㣲良易酬渇飲一斗水饑食一束芻嘶鳴當大路志氣若有餘騏驥生絶域自矜無匹儔牽驅集作驅牽入市門行者不為留借問價幾何黄金比崇集作嵩丘借問行幾何咫尺視九州饑食玉山禾渇飲醴泉流問誰能為御曠世不可求唯昔穆天子乗之極遐遊王良執其轡造父夾集作挾其輈因言天外事恍惚使人愁駑駘謂騏驥餓死余爾羞有能必見用有徳必見收孰云時與命通塞皆自由騏驥不敢言徘徊但垂頭人皆劣騏驥共以駑駘優喟予獨興嘆才命不同謀寄詩同心子為我商聲謳答韓十八駑驥吟歐陽詹故人舒其憤昨示駑驥篇駑以集作取易售陳驥以難知言委曲感既深咨嗟詞亦殷伊情有逺瀾余志遜其源室在周孔堂道通堯舜門調雅聲寡同途遐勢難翻顧兹萬恨來假彼二物云賤貴而貴賤世人良共然巴集作芭蕉一葉妖茙葵一花妍畢集作異無才實資手植堦墀前楩柟十圍瑰松栢百尺堅罔念梁棟功野長丘墟邊傷哉昌黎韓焉得不迍邅上帝夲厚生大君方建元寳一作實将庇羣甿庶此規崇軒班爾圖永安掄擇期精専君看廣厦中豈有樹庭集作庭前萱有小白馬乗馭多時奉使東行至稠桑驛溘然而斃足可驚傷不能㤀情題二十韻白居易能驟復能馳翩翩白馬兒毛寒一團雪騣薄萬條絲皂盖春行日驪駒曉從時雙旌前獨歩五馬内偏騎芳草承蹄葉垂楊拂頂枝跨将迎好客惜不換妖姬慢控遊蕭寺閒驅醉習池睡來乗作夢興發倚成詩鞭為馴難下鞍縁稳不離北歸還共到東使亦相隨赭白何曽變𤣥黄豈得知嘶風覺聲急踏雪怪行遲昨夜猶芻秣今朝尚縶維卧槽應不起顧主遂長辭塵滅駸駸跡霜㽞皎皎姿度闗形未改過隙影難追念倍燕求駿情深項别騅銀收鈎臆帯金卸絡頭羈何處埋竒骨誰家覓敝帷稠桑驛門外吟罷涕雙垂病馬五首曹唐騄駬一作緑耳何年到渥洼到一作别病來顔色半塵沙四蹄不鑿金一作銀砧裂雙眼慵開玉筯斜墮月兎毛乾觳觫一作輕觳䔩失雲龍骨瘦查牙一作牙槎平原好放無人放嘶向秋風苜蓿花二壠上沙葱葉正齊騰黄猶自跼羸蹄尾蟠夜雨紅絲脆頭掉秋風白練低力憊未思金絡腦影寒空望錦障泥階前莫怪垂雙淚不遇孫陽不敢嘶又𤣥集作堦前莫錯雙垂耳不遇孫陽不用嘶三唐宋類詩指此篇為曹松作不剪焦毛鬛半飜何人别集作識是古龍孫風吹一作雪侵病骨無驕氣土蝕驄花見卧痕未噴斷一作得噴雲歸漢苑曽追輕一作已曽飛練過呉門一朝千里心猶在争一作誰肯潜忘一作施秣飼恩一作皆唐宋詩類四空被秋風吹病毛無因濯浪刷洪濤卧来摠怪龍蹄跙瘦盡誰驚虎口髙追電有心猶欵段逢人相骨强嘶號欲將鬃鬛重裁剪乞借新成利鉸刀五病久無人着意看玉華彩疑作毛色欲凋殘飲驚白露泉花冷喫怕清風豆葉寒長襜敢辭紅錦重舊韁寕畏紫絲蟠王艮若許相擡䇿千里追風也不難馬陳凝未明龍骨駿幸得到神州自有千金價寧㤀伯樂酬雖知殊欵叚莫敢比驊騮若遇追風便當軒一舉頭浴馬喻鳧觧控復收鞭長津動細漣空蹄沉緑玊濶臆浸連錢沫漩橋聲下纒盤栁影邊常聞禀龍性固與白波便八駿圖羅隠穆滿當年物外程電腰風脚一何輕如今縱有驊騮在不得長鞭不肯行猿詠夜猿啼蕭詮桂月影才通猿啼迥入風隔巖還嘯侣臨潭自響空掛藤疑取飲吟枝似避弓别有三聲淚霑裳竟不窮放猿許渾慇懃觧金鏁别雜詠作昨夜雨凄凄山淺憶巫峽水寒思建溪毎尋紅樹宿深向類詩作入白雲啼好去長江路類詩作好覓來時路又作好覓南歸路煙蘿更莫類詩作莫自雜詠作莫共迷巴江夜猿馬戴日飲巴江水還啼巴岸邉秋聲巫雨斷夜影楚雲連雪滴青楓樹山空明月天誰知泊帆者聼此不能眠獺有獺吟劉禹錫有獺得嘉魚自謂天見憐先祭不敢食捧鱗望青𤣥人立寒沙上心専眼悁悁集作短看肩漁翁以為妖舉塊投其咽呼兒貫魚歸與獺同烹煎闗闗黄金鶚大翅摇江煙下見盈尋魚投身擘洪漣攫挐隠嶙去哺雛林岳巔鴟鳥欲伺隙遥噪莫敢前長居青雲路弹射無由縁何地無江湖何水無鮪鱣天意不宰割菲祭徒䖍䖍空餘知禮重載在淹中篇魚賦得魚躍水花生張正見漾色桃花水相望濯錦流躍浦疑珠出依池似鏡浮凌波銜落蘂觸餌避沉鈎方遊蓮葉外詎初學記作恒入武王舟賦得蓮下遊魚阮卓春色映澄陂涵泳且相隨未上龍門路聊戲芙蓉池觸浪蓮香動乗流葉影披相㤀自有樂荘恵豈能知魚岑徳潤劒影侵波合珠光帯水新蓮東自可戱安用上龍津放魚竇鞏黄金雜録作金錢贖得免刀痕聞道禽魚亦報雜詠作感恩好去長江千萬里不湏辛苦上龍門龜詠龜趙宗儒有靈堪作初學記作託夣無心觧自謀不能蓍下伏强從蓮上浮初學記作遊負圖非所兾支牀空見留儻䝉一曳尾當為屢回頭文苑英華巻三百三十
