body:
  text: 文苑英華卷一百五宋李昉等編器用四八月五日花蕚樓賜百官明鏡賦一首金鏡賦一首千秋鏡賦一首太原進鐵鏡賦一首鏡花賦一首古鏡賦一首照寶鏡賦一首山雞舞鏡賦二首屈刀為鏡賦一首八月五日花蕚樓賜百官明鏡賦趙自勵天下之美風猷崇五日重千秋歡心達於四海聖澤均於九州是日也天子以載誕昔辰同漢武猗蘭之殿登髙撫政則聖文花蕚之樓皇帝乃御龍衮拱洪休申景命於萬方㝢縣賜明鏡於百辟公侯偉其爛矣生光炯爾明發色洞秋水精涵夜月均曲池之引照或淺或深比太陽之圓明不盈不闕咨爾千品朂爾萬官欽哉明主之錫訓爾為臣之難手平者必正體靜者必安水清則鑒徹表直則影端居燥濕而不變是之謂可久無小大而虛受是之謂內寬可以勵心者堅白可以接翼者鵷鸞擬兹鏡之在匣則何憂乎考槃於是羣公卿士警扈仙蹕寵賚自天恩深此日執明鏡者無所私其照對明鏡者無所隱其質並陳力以效能各呈才而獻術莫不再拜稽首奉承天子之休備有德於咸一金鏡賦并序崔膺鏡之鑒也雲不能蔽風不能搖涵虛待物物莫之撓有同君子執恆德不惑於變故志而賦焉太隂之精流為金英隱耀山谷待人啓明在鏡未辨因和疑作扣得聲良工懷擇銷鍊專誠我非工不能成器工非我無以發名於是考斗建候天清波上飛焰日中鑄成磨洗既畢澄瑩秋日玉匣初開寒光飛出仰映晴空天地洞通萬象在中虛涵不窮湛為寒潭搖為飛電任在公以無心有妍媸而自見鬼無遁靈怪無隱形潛應變蝕氣運青冥向陽烏而燧發照金波而水泠或青春曉霽挂於廣庭照耀承霤皓景延晝乍見紅顔之外透忽驚粉壁而中漏待物以虛無大不受烟蘿遙列於階前青翠倒寫於堂後或夜懸髙閣或逺臨澄江色合天而為一規分月而成雙𤣥蟾躍影於藻井姮娥飛艷於前窗有時深房倚在暗壁隔簾帷之重掩誘雲山而入隟方髙臨以思𤣥見寥天之凝碧若乃窮隂歲暮風沙號怒雲掩七曜而光絶波揚百川而影滅宇宙晦蒙我獨皎潔羣物蕩搖不撓澄徹時清則動日月而揚輝天昏則與氛霧而逈别人皆持此以飾容余將鑒之以明節千秋鏡賦以鵲飛如向月龍盤似映池為韻張彚伊惟仲秋日在端午我皇帝出震蘭殿誕膺紫微祥光夜合佳氣晨飛聖人作而萬物覩固先天而天不違是以禮容之盛六葉交映或體天以設軌或因時而布令乃啓新節獻金鏡刑于四海加于百姓虛以受物則萬象必涵金以平心而九流惟正當其時也天宫戚里公侯卿士各薦其明用申知己雖大小而殊致必規圓而相似且夫考工垂典匠人有作或鑄或鎔是磨是削刻以為龍鏤以成鵲初臨玉扆透鸞景而將飛末樹金墀拂菱花而不著徒觀其用之則滿捨之則虛固無私於物類非取鑒以焉如爾其提握見重光芒未歇若清潭之無比類瑶池之有月加以題古字隱盤龍無藏菲薄無漏纎濃映空而天地且霽照逺而山河更重豈獨淋漓玳瑁之床澄徹芙蓉之帳熒熒綺疏之下皎皎青樓之上有美人兮無良媒飾娥眉而相向者也所以吾君欽崇萬化錫賚百官其表不枉其形必端詩所謂我心匪鑒豈不戒於遊盤别有照象無疲含光未知方有期於見膽竊自比於臨池儻先容之可致庶斯焉而取斯太原進鐵鏡賦以清光含衆象為韻喬琳晉人用鐵兮從革無方其或五金同鑄百鍊為鋼雕鐫而雲龍動色磨瑩而氷雪生光爛成形於寶鏡期將達於明王故有徹侯君疑守方物底貢擇使而天驥共飛登車而海月相送妍媸之鑒已久肝膽願呈者衆鏡之既明星衢是亨列照而三光共霽凝輝而四海俱清應人無疲知道不虛受處已不厚見心乎砥平若乃宇宙清朗提擕偃仰旁窺而山澤入懷俯視而雲霄在掌雖因時而委照不候物以呈象圓規可轉處順之物攸先徑質無虧持盈之道彌長墨客因進而歌曰金之精兮衆寶所參鏡之明兮羣象所含清至瑩兮氛埃不雜明至察兮醜類相慙幸忝秦臺之一鑒與飛鵲而圖南鏡花賦何據金鏡精寶兮珠秀華臺插珊瑚之樹鈎垂菡萏之花映若無質循則有體洞碧空其何際湛清潭其絶底鸞舞翮於曈曨龍怒鱗於清泚淮南王懸而玩之東方朔見而稱曰此瑾瑜之榮碝磩之英負隂而內景氷徹面陽而外景花明惚兮恍其中有象杳兮冥其中有精爾乃遇妖閒之佚女淘疑清爽之芳時爭捧鴛匣臨乎鳳墀既翻輪而隱耀又飛花以生姿如玉之明如雪之皎度翠壁以星落薄乘鹿而霜皛拂髙凌深緣隟入奧乍滅沒而在空遂迷失其所造徒美夫不根不蒂扈扈煌煌若漢臯靈媛解仙佩洛川神女獻明璫似珠水梁簡文鏡銘水淨珠明之皎皎日月之相望芒角璀錯罔兩搖揚至用在無兮摶之不得極虛為有兮應而不藏淮南王曰㫖哉大夫之體物也古鏡賦以明達古今鑒無善惡為韻此鏡何代良工鑄成四規是徹百鍊彌輕裁氷比麗止水侔清時開寶匣以厭山精時既荷於提挈敢有疲於將迎所以圖象必盡運疑態必呈天地不藏毫髮不形恱孤鸞之舞影怨垂淚之表情曉挂玉堂將助晴陽之照夜流金鵲不讓太隂之明夫其月曙開奩窗昏啓闥目短自見因君以達髮亂未理待我將豁曩者久積氛霧半沾沙土蟾埋影澀痕深翳聚其性不耗其器不窳何造化之寄物歷春秋之萬古幸得懷鉛再治負局斯臨盤龍發彩𤣥生隂篋笥見賞緇塵不侵鑒窮髙逺光燭湮沉舉棄物於未發喜昔人之遺音未見今字官韻何異荆山辨玉豐城識劒蓂莢虧而轉麗乎疑氷鋪而不陷近日而陽燧無焰向人而𤣥髮奪鑒若乃秦樓對月魏乘臨珠共照而車中轉麗雙明而臺上不孤持衡在人銓署重其進退元龜不逺掌握通於有無夫其創物斯妙成規作典蓋視有同異而鑒無深淺秦得金以龍興夏亡玉而國翦喻無不至作戒示於後昆湛而不流比水通於上善國工是作端形是託將審已於寸心察衆人之所惡照寶鏡賦以殊寶潜翳照之必呈為韻王起先賢鍊金鏡之英照懷寶之精寶之産兮逾祕鏡之瑩兮至明藏諸土中雖沉埋而為恨引於地表終錯落而皆呈將竭工巧灼爍堅貞以通幽為用以利物為情豈惟雕盤龍而耀彩鏤飛鵲而增榮若乃金玉方潜珠璣未出或山藪而埋照或土石而混質連城之價蔑聞照乘之光遂失雖卞和之欲獻我色猶深雖隨侯之見求我藏猶密然後玉匣啓銀華溢用物而不將不迎隨人而無固無必乃夜入榛蕪傍求瑾瑜氷彩前射月華正孤將善價而無隱與佳氣而相符在樓臺之中我用無展當藍田之下厥道斯殊遂使的皪珠色朗然合契皎潔瓊華洞然無翳時映山𤣥之氣乍透菱花之際璞由是而成琢金因之而作礪是知鏡能融朗寶莫沉潜彼照膽而必徹此藏器而無淹集琬琰之資鸞形乍合騰磨礱之色虹氣斯占固其涵清明之質體虛無之道滿堂由是而獲珍厚地詎聞乎藏寶豈比夫魏宫之所施秦臺之所持鍳鉛華之小者曷懷異而求之况有處幽沉戢光耀愧無不琢之質復仰無私之照山雞舞鏡賦以麗容可珍照之則舞為韻皇甫湜有珍禽兮在南土金碧其容質蔽蔽二字疑其毛羽玩夫色必自鑒以呈形愛其儀故乃見而屢舞從裔壤貢丹墀未識僛僛之狀徒觀采采之姿是詢孺子爰發此思知照水而自窺尚且心乎愛矣俾對鏡而言舞不勞歌以送之於是爛出雕籠鶯成綺翼奇章若繢翠彩如織瞥然影起乍躞蹀以多姿歘爾形分遂蹁躚而可則苞七步之節奏備八佾之程式俄俯仰乍逡巡透雪彩而姿逸洞銀華而色新錦臆雙呈因疑其若合花毛兩向未知其孰親一作真視月中兔形自隱窺臺上鵲影慙陳駭目自遺百戲忘餐奚顧八珍對百鍊而流睇翻五色而交麗異巴渝而折旋類夏采而行綴搖金距知非善鬬所為轉朱身庶與來儀相契方激昂而匪懈將偃仰而增鋭誰云不節之儀式表能勤之繼映朱光而影耀射金景而私照兩邉而分寸不差一體而纎毫必肖類鳳因簫感哂鶴為琴召豈假為冠於漢然仰我威容不同似木於齊方稱乎觀妙宜其鸞回於綺殿雪落於青瑣雖自好而則然必假鑒而獲可變態盡其妍不曲折擬諸形容幸無私於一照庶餘光而可從第二同前韻趙殷輅雞開美錦鏡隱蟠龍雞則彪炳兮五雲之狀鏡則清澄兮止水之容是得比形鼓舞偶影相從䠥􅍷初臨向月輪而回眸婉婉翩翾將顧映菱花而疊足重重質貌既異威儀可覩進退雅符於節奏曲折冥契於規矩投身宛轉若赴簫韶之音矯翼連軒似合桑林之舞形其動矣影亦隨之類塤篪之並得同律吕之相追故人之視焉知分形之有别禽之恱也謂一體之無疑不馳心於緑水自結念於丹墀豈比夫在仙都而思曉入雅頌而興詩者哉徒觀夫雞不倦臨鏡無疲照覩其形而屢舞謂其侣而相召寧知大樂之同和自合無聲之要妙且鑒物兮在我故欲照兮無可無不可其稟氣也合德諒兹舞而有典兮有則傃日而鳴遇隂而息雞之在鏡類鸞翔之入雲空鏡之納雞若朝霞之映潭色原其始也徘徊山谷綿歷星辰每念栖於丹闕兹獲貢於虞人由是辭荒徼入函秦優游青禁顧盼紫宸則昔之在山也雖藴姿而誰語今之舞鏡也方呈質以效珍孰與夫翻飛青崖之側照一作昭彰幽洞之濱五德備兮其容不細衆彩煥兮厥狀逾麗幸朗鑒之斯臨奠疑獻奇於魏帝屈刀為鏡賦以神仙異術變化無方為韻崔護惟刀鏡之異名共堅剛以為質懿靈仙之手澤得微妙之心術銛鋒始拔乍盤屈以規圓明鑒俄成駭拂拭而光溢則知道藝之祕變化之神實希夷而有德寧積習而可臻瞥然而電影初散煥爾而菱花已新用不假物力非因人可以矯而揉可以引而伸歘應手以從革爛含光而足珍霜刃既摧氷光乃見自金鐶而耀彩入寶匣而增絢道髙欒氏鄙噴酒而雨飛術邁壺公輕投杖而龍變諒成形於顧指豈勤力於鑄錬在剸剖之則遺將妍媸而必辨仙術斯逺人情匪量雖五金徑質百鍊純鋼或卷舒而在意信𤣥妙之無方利用無虧同切玉於周后明輝既就齊照膽於秦王軼前志而稱奇著幽經以標異始挈而雄鋩若失屢照而清光不匱覩神迹之昭彰識靈訣之奧祕是將手以為炭心以為爐既可引而可屈亦何有而何無考乎誠與𤣥而契稽乎理為道之俱异哉術亦無詐將本之於神化法不可傳徒仰之於列仙雖改其狀不淪其堅初徑挺以繩直終青熒而月圓昔也為刀則犀兕之可斷今也作鏡知鑒照之無偏儻或收於一割與鸞影而鶯遷文苑英華卷一百五
