body:
  text: 文苑英華卷四百七十一宋李昉等編蕃書四驃國書與驃國王雍羌書白居易勑驃國王雍羌卿性懷集作𢎞毅勇代濟忠貞集作貞良訓撫師徒鎮寧封部欽承王化思奉朝章得睦鄰之善謀秉事大之明義又令愛子逺赴闕庭萬里納忠一心稟命誠信彌著忠嘉集作嘉相益深今授卿檢校太常卿并卿男舒難陀那及元祐摩訶思那等三集作二人亦各授官告往至宜領之此所以表卿勳勤申朕恩禮敬受官爵集作新命永為外臣勉𢎞令圖以副遐矚今有少信物具如别録想宜知悉也冬寒卿比平和集作安官吏百姓等並存問之遣書指不多及新羅書勑新羅王金興光書三首張九齡勑新羅王開府儀同三司使持節大都督雞林州諸軍事上柱國金興光賀正使金竭丹等至兼得所進物省表具知海路艱阻朝賀不闕嵗益忠謹日以嗟稱所謂君子為邦動必由禮頃者渤海靺羯集作鞨不識恩信自集作負恃荒逺且爾逋誅卿疾惡之情常以奮厲故去年遣中使何行成與金思蘭同往欲以叶謀比聞此賊困窮偷生海曲惟以抄竊作梗道路卿當隨近伺隙掩襲取之竒功若有所成重賞更何所愛一作惜適欲多有寄附實恐集作慮此賊抄奪不可不防豈資窮冦待蕩滅之後終無所惜昨金志兼等到頓緣事物集作緒未及還期忽嬰疹疾遽令救療而不幸殂逝相次數人言念殊鄉載深軫悼想卿聞此良亦增懷然死者生之常固其命也固當理遣無以纍情秋初尚熱卿及首領百姓以下並平安好今有答信物及别寄少信物並付金信忠往至冝領取遣書指不多及二勑雞林州大都督新羅王金興光賀正謝恩兩使繼至再省來表深具雅懷卿位總一方道踰萬里純誠見於章奏執禮存乎使臣雖隔滄溟亦如會面集作面會卿既能副朕虛已朕亦保卿一心眷言集作言念懇誠每以嗟尚况文章禮樂粲焉可觀德義簮𥚑浸以成俗自非才包時傑義集作志合本朝豈得物土異冝而風流一變乃比卿於魯衛豈復同於蕃服朕之此懷想所知也賀正使金義質及祖榮相次永逝念其逺勞情以傷憫雖有寵贈猶不能忘想卿乍聞當甚軫悼近又得思蘭表稱知卿欲於淇江置戍既當渤海衝要又與祿山相望仍有逺圖固是長策且蕞爾渤海人已逋誅重勞師徒未能撲滅卿每嫉惡深用嘉之警寇安邉有何不可處置訖因使以聞今有少物答卿厚意至宜領取春暮已暄卿及首領百姓並平安好遣書指不多及三勑雞林州大都督新羅王金興光比嵗使來朝貢相繼雖隔滄海無異諸華禮樂衣冠亦在此矣皆是卿率心忠義能此恭勤朕每嘉之常優等數想卿在逺應體至懷頃者彼遣集作處使來纍有物故水土不習飲食異宜奄忽為災遂至不救言念逝者此其命乎想卿乍聞應以傷悼所有集作以表奏皆依來請夏初漸熱卿及吏人並平安好今有少物並付來使至宜領取遣書指不多及與新羅王金重熙書勑新羅王金重熙金獻章及僧沖虛等至省表兼進獻及進功德并陳謝者具悉卿一方貴族纍葉雄材秉集作伏忠孝以立身資信義而為國代承爵命日慕華風師旅叶和邉疆寧泰况又時修職貢嵗奉表章進獻精珍忠勤並至功德成就恭敬彌彰載覽謝陳益用嘉歎滄波萬里雖隔於海隅丹悃一心每馳於闕下以兹歎賞集作嘉尚常屬寢興勉𢎞始終用副朕意今遣金獻章等歸國并有少信物具在集作如别録卿母及妃并副王宰相以下各有賜物至宜領之冬寒卿比平安好卿母比得如宜官吏僧道將十百姓等各家存問遣書指不多及渤海書勑渤海王大武藝書四首張九齡勑忽汗州刺史渤海郡王大武藝卿於昆弟之間自相忿閲門藝窮而歸我安得不從集作容然處之西垂集作陲為卿之故亦云不失頗謂得所何則卿地雖海曲常習華風至如兄友弟悌豈待訓習骨肉情深自所不忍門藝縱有過惡亦合容其改修卿遂請取東歸擬肆屠戮朕教天下以孝友豈復忍聞此事誠是惜卿名行豈是保護逃亡卿不知國恩遂爾背朕集作德卿所恃者逺非能有他朕比年含容優恤中土所未命將事亦有時卿能悔過輸誠轉禍為福言則已集作似順意尚執迷請殺門藝然後歸國是何言也觀卿表狀亦有忠誠可熟思之不容易耳今使內使往宣諭朕意一一並須口述使人李盡彥朕亦親有處分皆所知之秋冷卿及衙官首領百姓並平安好并遣崔尋挹同往遣書指不多及二勑渤海郡王忽汗州都督大武藝不識逆順之端不知存亡之兆而能有國者未之聞也卿往年背德已為禍階近能悔過不失臣節迷非復善即又可嘉集作迷復非逺善又何加朕記人之長忘人之短况又歸服載用嘉歎永祚東土不亦宜乎所令大茂集作戊慶等入朝並已處分各加官賞想具知之所請替人亦令還彼又近得卿表云突厥遣使求合擬打兩蕃奚及契丹今既內屬而突厥私恨欲讎此蕃卿但不從何妨有使擬行執縛義所不然此是人情况為君道然則知卿忠赤動必以聞永保此誠慶流未已春晚卿及衙官百姓並平安好遣書指不多及三勑渤海郡王忽汗州都督大武藝多蒙國所送水手及承前沒落人等來表卿輸誠無所不盡長能保此永作邉捍自求多福無以加也漸冷卿及衙官百姓已下並平安好遣書指不多及四勑忽汗州刺史渤海郡王大武藝卿往者誤計幾於禍成而失道未遙聞義能徙何其智也朕棄人之過收物之誠表卿洗心良以慰意卿既盡誠節永固東藩子孫百代復何憂也所集作近使至具知欵曲兼請宿衛及替亦已依行大郎雅等先犯國章竄逐南鄙亦皆捨罪仍放歸藩卿可知之皆朕意也夏初漸熱卿及首領百姓等並平安好遣書指不多及與渤海王大彛震書封敖勑渤海王大彛震王子大昌輝等自省表陳賀并進奉事具悉卿代襲忠貞器資仁厚遵禮義而封部和樂持法度而渤海晏寧逺慕華風聿修誠節梯航萬里任土之貢獻俱來夙夜一心朝天之禮儀克備龍庭必會鯷域何遙言念嘉猷豈忘寤歎勉𢎞教義常奉恩榮今因王子大昌輝等回國賜卿官告及信物至宜領之妃及副王長史平章事等各有賜物具如别録奚書勑投降奚等書張九齡勑新來投降奚等汝本小蕃不自存立頃年依我稍得安全而常持兩端遽即背叛忘恩負義豈是人心今者聞汝復歸亦應知過仍緣困蹙未免嫌疑汝若誠能洗心求以寄命便令處置汝等當須一一聽從即捨往愆更收來效官賞諸事皆如舊日各宜自勉勿不知恩比嚴寒汝等部落百姓並平安好遣書指不多及勑奚都督李歸圖集作國下同書二首前人勑李歸圖近得李首圭表稱奚衙官褥集作耨雲轍構異謀擕間部落兼藏突厥仍欲圖卿知卿忠義一心紏逖無隱臨危制變果獲罪人此雖天誘其𠂻亦是卿誠效克著聞已誅翦是自滅亡朕於諸蕃含養過厚忝預人類亦合知恩但百姓無識易為驚擾安危動靜處之在人以卿才能自應率伏念加威惠勿使猜嫌既去亂群當已寧帖所設官賞惟待有功茍能盡節何憂不賞宜各集作各宜勉勵以副朕懷秋涼卿及將士百姓四字集作衙官以下並平安好遣書指不多及二勑奚都督右金吾衛大將軍歸誠王李歸圖朕比聞突厥欲滅卿兩蕃先勑守圭嚴為防護今聞涅禮已破凶徒仍慮其收合餘燼復來掩襲卿可與涅禮相為腹背但突厥不盡後患終深卿可伺其歸師乘其喪氣與諸將計會計逐集作逐要追襲時不可失宜自思之秋深極冷卿及衙官將士並平安好遣書指不多及契丹書勑契丹王據垺可突于書勑契丹王據垺及衙官可突于蜀活刺史鬱健等順道則吉惟智能圖逆莭則凶豈愚所覺卿頃年背誕禍實自貽集作實養禍貽今而知之亦猶未晚固是轉災而為福因敗而成功去百死之危保萬全之計則昔者之去何其悖也今兹復來又何智也皆是卿素有籌略本於忠誠率先種人拔於死地自爾之後更有何憂朕於諸蕃未嘗負約况於卿等更有舊恩聞卿此來豁然慰意一則兵革都息二則君臣如初百姓之間不失耕種豐草美水蓄牧隨之更無外虞且知上䇿人生自奉誰不求安保此永年一無他慮在卿所見不集作何假朕言部落初歸應須安置可與守圭審定務依蕃部所欲相次集作相其沃饒之所適彼寒暑之便無令下人有所不愜也冬末極寒集作寒甚想卿及衙官軍吏刺史以下及諸部落百姓平安好遣書指不多及勑契丹都督涅禮書勑契丹都督涅禮往者屈突于凶惡無心憂矜百姓背叛於我將日自防丁壯不得耕耘牛馬不得生養及依附突厥而課稅又多部落吁嗟卿所見也李過析集作拆下同因衆人之忿誅頑凶之徒諸部落酋豪相率歸我已令人隨事賞錫集作賜亦云且得安寧過析封王豈直賞功而已亦為百姓衆意賴其撫存不知近日以集作已來若為非理亦聞殺害無罪捧打又多衆情不安遂致非命然卿彼之蕃法多無義於君長自昔如此朕亦知之然是卿蕃王有惡輕殺為此王者不亦難乎但恐卿今為王後人亦常不自保誰願作王卿雖蕃人是當圡豪傑亦須防慮後事豈取快志目前過析既亡卿初知都督百姓諸處復又安寧以否八字集作諸處分復得安寧以否守圭先擬往彼亦即令便就處置卿應有官賞即有處分夏中甚熱卿及首領百姓並平安好今賜卿錦衣一副并鈿帶二字集作腰帶恐非七事至宜領取遣書指不多及勑契丹知兵馬李過析書勑契丹知兵馬中郎李過析等卿比在蕃中已知才略一此行事十倍所聞既立殊勳又成大節何其壯也可突于狡算翻覆人靣獸心事其君長不忠不義處其種落無信無恩專持兩端隨事向背而屈烈集作列愚蔽與之同惡卿此集作此觀變實為逺圖誅元凶而存一蕃行權宜而合正道所全者大所慮實深今諸部帖然皆卿之力也且頃者携叛聞集作又甚﨑嶇羊馬不保於孳生田疇不安於耕種寄命山谷併力干戈總由頑凶致此勞苦向若無卿此舉信彼所行以疲弊之殘人當驍雄之巨衆彼則朝夕奔命此方嵗月攻守而衆寡不敵殱滅有期賴卿先見之明遽用轉禍之計以救萬人之命以成萬代之名豈獨大功真為上智今將疇其井賦異姓封王以旌厥庸且有後命在彼初有變故乍應驚擾百姓既知所當安帖卿可與張守圭量事處置務逐便宜今既一家愛同赤子惟其所欲隨事撫存春初尚寒及衙官刺史縣令並百姓以下並平安好遣書指不多及與契丹王鶻戍書二首封敖勑契丹王鶻戍大首領未荷得等至省所朝賀及進馬具悉卿英雄挺出忠信生知威令可固於封疆誠素必彰於禮義情深向闕志切輸忠萬里趨風表堅明之節操元辰稱賀見罄盡之忠勤想屬再三寧忘寤寐將綏多福勉守令圖今賜卿少物至宜領之妃以下及男等并兵馬使屯刺史梅落逹磨縣令等各有賜物具如别録末荷各賜官告想宜知悉春寒卿比平安好否兵馬使以下並各存問之遣書指不多及二勑契丹王鶻戍某至自所進馬事具悉卿才雄沙漠氣徑燕山忠良自稟於生知毅勇豈資於時習禮備正朔誠懸表章職貢聿修逺致右牽之獻威儀就列常嘉左衽之風節及元正慶均多福永遵令善無替前勞相屬之懷寤興為念今賜卿少物至且領之突騎施書勑突騎施毗伽可汗書張九齡勑突騎施毗伽可汗天地有正位鬼神有正主敢此違犯必有禍殃不信朕言仁誠看取可汗雖為君長實在幽荒陰陰集作隂陽之氣偏僻如此縱欲自大其如天何往年可汗初有册立以我國家常為勢援諸蕃聞此不敢動搖是我有大惠於可汗行德音集作陰德於彼國自爾以後二十餘年情義相親結為父子可汗身自不覺豈不是集作知彼之大援而戎俗少義見利生心故關集作闕俟斤入朝行至北庭有隙因此計議即起異心何羯逹所言既是彼人自告蹤迹已露然始行誅邉頭事宜未是全失朕猶以擅殺彼使兼為罪責北庭破劉渙之家仍傳首於彼可汗縱有怨望亦合宜有奏論朕若不依舉兵未晚而乃揔無來狀即起凶謀侵我西州犯我四􅀢連年纍月馬死人亡於群胡已聞怨嗟於國家豈能大損中間使歌德都耽及安胡數半泥臨河來此求和朕亦信受故遣使相逐具宣往意其後審觀形勢各集作全是詐欺故密勑半道令回豈是元心有負自爾之後侵犯不絶可汗有何兵衆遂此慿陵諸國聞此豈不得計約算已西諸國未敵我一兩大州可汗亦應先知何煩遂爾為惡况西州集作安西北庭將士皆是鐡石為心可汗具詞不煩更道此則承前輕舉彼自無義却以我為失無乃重其過乎可汗向若有禮以理論奏關集作闕俊月下羊馬數雖稍多欲為補答亦何足難惟費一州庸朝酬還則已大多而乃無義為酬集作讎暴我邉鎮孤城小堡倉卒見危大率而言其數非少彼若計索馬價我亦須得此物忝是有識之類可不自解思量又可汗正為寇敗闕伊難如從我界過蔥嶺捕獲并物奏來所有蕃書具言物數朕皆送還替普其中一物不留可汗亦以此為詞謂言朕留此物且蕃中貧薄所見不廣銀瓶香子將作珍竒墨集作黑毯赤麋集作􅀢亦為好物我中國雖在貧下固不以此為貴可汗宜識此意勿妄生詞且闕伊難如越界可汗復邉頭作梗如此不促更促何人適是邊軍明其用命觀可汗求和之意似集作此非未有真心只擬引誘國家乘便取利如此等事何用言集作為之我國家守信如天終不欺於物謂天無信物應自集作自無知然於四時終不差也可汗若遂能為惡朕當别有處分三二年內試看若少二字集作若為必其自省前非更思舊恩朕既棄捨大過父子如初可汗更有何處百姓皆得安樂一任可汗自料朕亦不復多言一一在使者口具秋中漸冷可汗及公主衙官纛官首領百姓並平安好遣書指不多及護密書勑護密國王書二首勑護密國王真檀集作檀下同朕知卿忠赤能保國境所以前加禮命用叶蕃情卿感此殊恩盡力外禦聞有凶寇能申逺績以義動衆雖弱必強豈獨人心亦有神助甚用嘉歎不可忘也冬末甚冷卿及首領以下四字集作將士比並何如遣書指不多及二勑護密國王真檀發匐積惡自取滅亡想所具知不復煩述卿比集作此者雖受册立緣此未得還蕃彼既伏辜固無隔閡卿宣揚國命慰撫逺人保我西垂集作陲長守誠節突騎施凶逆慮其寇抄集作掠卿宜善計勿令不覺其來已西商胡比遭發匐劫掠道路遂斷逺近吁嗟卿既還國必須防禁蕃中事意逺路難聞可量彼權宜便與王斛斯計會夏末甚熱卿及首領百姓已下並平安好遣書指不多及諸國書勑識匿國王書勑識匿國王鳥訥沒莫賀咄卿比與護密相為唇齒而發富凶狡劫殺商胡罪不容誅走投異域朕知其惡積改立真檀遽聞却來還占本國卿等讎嫉頑暴相率誅之纍嵗逋逃一朝翦滅永言忠義深所嗟稱今授卿將軍賜物二百匹錦袍金鈿帶七事以下亦節級有衣物集作已下節級亦有衣物各宜領取夏末甚熱卿及首領百姓等並平安好遣書指不多及勑渤集作勃下同律國王書勑渤律國王蘇沒謹忙得王斛斯表卿所與斛斯書知卿忠赤輸誠國家外賊相誘執志無二又聞被賊侵寇頗亦艱虞能自支持且得退散并有殺獲甚用嘉之卿兄麻來兮及首領以集作已下各量與官賞具如别勑今賜卿物三百匹銀胡瓶盤四字集作銀盂瓶銀盤各一衣一副并金鈿帶七事至宜領取夏中甚熱卿及首領以下並平安好遣書指不多及勑諸國王葉護城使等書勑諸國王葉護城使等突騎施不道連年作寇使我邉鎮常以為虞諸處攻圍所在堅守能伺其隙各有誅夷此卿等赤誠臨事效節使枖集作妖不勝德氛祲自消遙料凶謀還慮再下且賊衆烏合疲於重來勞則心離久必有隙卿等常須有豫以逸待之一二年間竒功甚集作可立富貴之舉彼賊是資亮忠集作烈之懷此心可度今各賜卿衣一副聊慰勤誠所有勤集作勳勞今已集作已令敘定當續有處分想亦知之比春暄卿及首領將士百姓等並平安好遣書指不多及勑罽賔國王書勑罽賔國王得四鎮節度使王斛斯所翻卿表具知好意然事在絶域不可預圖卿若誠心任彼量度事遂之日必有重賞且朕每於逺國未嘗有所食言想亦知之一作想若誠心勿致疑也秋初尚熱卿及首領以下並平安好遣書指不多及勑日本國王書勑日本國王主明樂美御德彼禮義之國神靈所扶滄溟往來未嘗為患不知去嵗何負幽明丹墀真人廣城集作成下同等入朝東歸初出江口雲霧斗暗所向迷方俄遭惡風諸船漂集作飄蕩其後一船在越州界即真人廣城尋已發歸計當至國一船漂入南海即朝臣名代艱虞備至性命僅存名代未發之間又得廣州表奏朝臣廣城等漂集作飄至林邑國既在異域集作國言語不通並被劫掠或殺或賣言念災患所不忍聞然林邑諸國比常朝貢朕已勑安南都護令宣勑告示見在者令其送來待至之日當存撫發遣又一船不知所在永用疚懷或已逹本集作彼蕃有來人可具奏此等災變良不可測卿等忠信則爾何負神明而使彼行人罹其凶害想卿聞此當用驚嗟然天壤悠悠各有命也冬中甚冷集作中冬甚寒卿及首領百姓並平安好今朝臣名代還一一令口具遣書指不多及文苑英華卷四百七十一
