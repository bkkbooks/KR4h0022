body:
  text: 文苑英華卷三百九十五宋李昉等編憲臺三殿中侍御史授鄭溥殿中侍御史等制蘇頲勑奉議郎行監察御史鄭溥等志藴公忠才兼學行守文法以明練循憲章以清直神羊共觸常聞避馬之雄夕鳥明飛疑作夕烏明飛俾叶遷鶯之舉可依前件授敬昭道殿中侍御史等制賈至總目作蘇頲勑朝議郎行監察御史敬昭道等見素為質懷清守道學以潤身文能比事自乘驄曉謁縶一作繫隼秋飛或出禀王綸或入持天憲傳一作銜使者之命往則有功按罪人之贓居而不撓因其績用採以聲華宜叶歲遷允符時議可依前件授第五琦殿中侍御史等制門下監察御史第五琦南海長史楚璆等吏才貞固公心諒直可以佐軍師歷試艱難必聞其政南越留務西憲準繩是擇髦傑用康厥任俾膺寵命欽乃攸司第五琦可殿中侍御史楚璆可守南海長史兼衛尉少卿餘如故授高岑殿中侍御史制勑京兆府長史髙岑修詞立誠好古博雅䇿名早從於吏道當劇亟聞其政聲人而多艱脫豺狼之肆虐士也有節逃戎寇之逆命貞心峻操無忝前修宜超柱史之列用闕一作激忠臣之志岑可行殿中侍御史授盧虛舟殿中侍御史等制勑大理司直盧虛舟間邪存誠遁世頥養持操有清廉之譽在公推幹蠱之才大理評事權臯臨難思義守死善道見危必履其臣節在困能變於人謀憲簡繩違紀綱斯屬宜擇髦士俾肅周行虛舟可殿中侍御史臯可監察御史授董晉殿中侍御史制勑汾州司馬董晉恪愼勵精詳於吏事飲氷將命克有成績凖繩之地舉直任能俾彰善於使車宜即真於憲簡可殿中侍御史授李常殿中侍御史制常衮勑朝散大夫行河南府陸渾縣令李常等堅白持操通明效官彰吏跡於神州著公方於近縣秉憲之職惟方是與俾諧僉議用肅具寮可依前件授蓋又元殿中侍御史制勑監察御史蓋又元直清勵行𢎞濟知名擢在憲司綽然有裕董其軍賦成績可嘉宜增執簡之威仍佐登壇之律可殿中侍御史授王延休殿中侍御史制勑朝議郎行監察御史東都留臺王延休雅有文行精於吏術自膺察視克舉風憲績勞當選一作遷奬善惟先一作允俾新執法之寵式光彛序之進可行殿中侍御史依前東都留臺散官如故授王翼殿中侍御史等制徐安貞勑朝議一作請郎行監察御史王翼五從弟朝請郎行監察御史級等咸以貞固爰司察視驟聞舉直亦既懲姦歲月增深升遷有序並可殿中侍御史授崔楚臣兼殿中侍御史制白居易勑成德軍節度押衙銀青光祿大夫檢校太子賔客兼監察御史崔楚臣材膺爪士職在牙旗每祇命以奉辭必竭誠而得禮既加詳敏亦念恭勤式示寵名宜遷憲秩可殿中侍御史餘如故授裴廙殿中侍御史制勑具官裴廙貞觀初張行成為殿中侍御史糾劾巡察明集作時以為能朕思𢎞貞觀之風故選御史府官亦先其精敏剛正者以爾廙動循道理語必信直勵其志節有類行成因授厥官無忝吾舉可殿中侍御史授李穜韋澚裴達殿中侍御史等制崔嘏勑左拾遺李穜等御史府有三院凡所選用其器得以專達必取其剛廉徑健才行兼至者則可奏而授之今穜朴重有文直而不訐司我諫納𢎞益仍多以澚洎達咸用詞學器識纍參賔畫研朱益丹瑩玉無玷皆可以修明憲職振凛一作起霜標屈軼有靈獬豸不懼惟此二物爾其師之可依前件授鄭韜殿中侍御史制勑監察御史鄭韜御史府三院轉遷雖曰彛制至於用舍進退亦繫於一時之事迹以韜立志甚賢居官稱職霜簡在手風標竦身其長吏言請用遷陟班我殿內升為近臣屈軼神羊無怠前志可依前件授蔡京趙滂等御史等制勑監察御史蔡京中武軍節度副使趙滂桂管副使鄭魯洎陳許觀察判官薛䝉等朝廷之選御史雖委其長吏得以專舉然亦詳求物議然後取舍無私憲丞上言滂與魯洎䝉皆業於儒術傳以吏道其剛明徑果可委以繫斷其溫敏莊肅可資其檢繩而皆久滯藩方未升朝序吾且循其聲跡頗契符言是用擢自賔筵置於憲席而京再覆大獄吏不敢欺滿歲當遷吾何所吝京可殿中滂可殿中魯洎䝉並可監察授牛希逸殿中侍御史李珽監察御史制薛廷圭勑具官牛希逸等我以憲章法理之任付于歸昌俾嗣復家聲振舉職業逖聽風采佇整頺隳今以爾希逸珽一作逸等列狀來上且言文行修飾操履端潔可使簮白筆以書法冠豸冠而觸邪俾欺暗之人視爾如秦鏡醜正之士畏爾如堯羊升之明庭聳我昌運樂聞爾志允叶人情即俞所陳式旌懋選噫澄清之始糾正為先爾宜輔助歸昌提振綱紀無或碌碌以謝前修則驗爾修飾端潔之道矣而闕疑是人名隱鱗戢翼負志求伸既得其時佇觀所尚而今而後可不勉之可依前件監察御史授馮嘉賔左臺監察御史制李嶠勑通直郎行瀛州河間縣丞馮嘉賔砥礪名節恭勤職務幹能兼備清直有聞黃綬隨班未展才用繡衣蒞事方觀舉察可行左肅政臺監察御史散官如故授鄭繇監察御史制蘇頲勑通直郎行右拾遺鄭繇心堅而靜體密而和文章掞發學思該敏諫臣讜議久列瑶墀御史直繩宜遷石室可行左御史臺監察御史散官如故授蔣冽等監察御史制孫逖勑朝議一作通直郎行大理評事蔣冽等修身有裕從事惟明標麗則於文場效公清於吏道方期逺致必藉兼才宜膺刈楚之求俾叶持繩之寄可依前件授姚閎監察御史等制勑朝議郎前行同州司法參軍關內道採訪度支使上輕車都尉蕭縣開國男姚閎等砥名勵節博藝多能或嘗佐台臣以清關輔或頃諧宫職見美朝端度才而升舉善以勸俾同官於察視宜並拜於丞郎可依前件授邢巨監察御史制勑前守監察御史邢巨器能通敏詞藻清新久著令名兼稱利用終喪有禮既及於一有外字除執憲須才宜居於舊一有府字可監察御史授崔炎監察御史制常衮勑權知綘州綘縣令崔炎愼學潤身工文飭吏錯薪刈楚竹箭有筠蒞事咸許於宓生遺風尚傳於綘老公才可擢朝聽用章宜甄避蝗之美式踐栖烏之列可監察御史授源咸悌監察御史制勑陜西運使判官朝議郎試祕書省祕書郎攝監察御史賜緋魚袋源咸悌爰資素行早履清途假其執簡之名佐彼泛舟之役且聞集事亦既書勞滿歲即真俾光使局可行監察御史餘如故授梁褒監察御史制勑朝議郎試大理司直兼監察御史知河東節度上都留後梁褒業繼儒門才優吏術潔已以進貞心不渝職佐上軍榮參清憲在公益愼於事尤精宜分察視之員更勵風霜之操可行監察御史散官如故授楊護監察御史制勑守左拾遺楊護服于古訓文以彰之靜專向方恆久其道近參侍從之列不忘忠讜之言俾執清憲佇揚厥職可守監察御史授皇甫翼等監察御史制韓休勑朝議郎行河南縣尉皇甫翼朝議郎行長安縣尉韋紹朝議郎行醴泉縣尉張季瑀等備聞清操雅有深識進乃安卑退非求譽察其才行副是名實任之舉直可以觸邪並可監察御史授鄭虛心監察御史制勑左拾遺內供奉鄭虛心茂其德業藴是辨詞識通於政理行著於公直清可勵物正以繩違褐衣召見既司諫省之職繡服承榮俾奉憲闈之任可監察御史授陳山慶監察御史制王敬從總目作敬滋勑宣議一作德郎行大理評事攝監察御史河西節度採訪處置使判官陳山慶植性方雅從事公勤評刑有欽恤之名攝職著軍州之效任惟執憲寄以佐邊此焉擇才佇聞成績可監察御史授李珝監察御史制元稹勑前監察御史裏行李珝比制多以詳練法理者行於御史府中集無中字或滿歲即真或不時署位亦試可之義也以爾珝文學周敏操行端方執喪有聞俯以就制復爾故秩勉修乃誠可監察御史餘如故授張徹宋申錫等監察御史制白居易勑舊制副丞相缺中執憲得出入御史缺則於內外史集作官中考核其實封奏其名以補之今御史中丞僧孺奏具官張徹具官宋申錫皆方直强白可中御史章下丞相府丞相亦曰可朕其從之並可監察御史授庾敬休監察御史等制勑渭南縣尉庾敬休等咸文行清茂士之秀者宜從吏列擢在朝行各隨才用分命以職司諫執憲佇有可稱授牛僧孺監察御史制勑河南縣尉牛僧孺志行修飾詞學優長頃對䇿于庭其言甚直纍從吏職頗為滯淹訪諸時論宜當朝選俾升憲府以觀其才可監察御史授蕭鄴李𤣥監察御史制崔嘏勑御史府居朝廷之中傑出他署蓋以圭表百吏糾繩四方故選其屬者必在堅明徑峭臨事而不撓不獨取謹厚溫文修整咨度而已爾等皆以詞華升于俊秀從事賢侯之府馳聲館閣一作學館之中籌畫居多操持甚固是宜持此霜簡峻其風標使避馬之謡不獨美於桓典埋輪之志無所愧於張綱勉服寵榮無忘職業可依前件文苑英華卷三百九十五
