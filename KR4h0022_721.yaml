body:
  text: 文苑英華卷七百二十二宋李昉等編餞送五薦福寺後院送新嶼尉洛郊序一首送李審秀才歸湖南序一首重送李審却赴廣州序一首送標和尚歸南嶽便赴上都序一首送虔上人歸會稽覲省便遊天台山序一首送魏七秀才赴廣州序一首夏夜對雨送李玕擢第還鄭州序一首崔中丞城南池送徐侍郎歸亰序一首送成都成少尹赴蜀序一首送吏部杜郎中兵部楊郎中入蜀序一首送賀若員外巡按畢歸朝序一首送韋員外充副元帥判官之東都序一首送頴州李使君赴任序一首送澤州李使君赴任序一首送餘杭薛郡守入朝序一首送孫侍御赴鳳翔幕府序一首送王判官赴福州序一首送洪州李别駕還任序一首送韋評事赴河南召募畢還亰序一首送宇文協律赴江西序一首送韋司直還福州序一首送廣陵許户曹充召募判官赴淮南序一首送六合林明府清白名聞上都赴選序一首送陳留張二十七少府鄖東都赴選序一首薦福寺後院送辛嶼尉洛郊序任華一昨渭北節度工部尚書臧公表薦辛嶼尉洛郊蓋知嶼事親以孝聞與朋友以信聞於吏道以幹聞不然非所聞也秋七月將之官乃胥命於此寺後庭蓋所以破臨岐之妄想銷操𬒮之煩惱也僧院少客蒼苔滿地終南曉晴洗然黛色日暮飲罷鐘聲傍出一作山贈言曰子之叔父以清白著稱歷踐臺省官至二千石子其刻已自勵無墜叔父之風操𬒮操疑作摻下同韓集舉正云晉人草書參作噪送李審秀才歸湖南序前人平西原之嵗隴西李審自湘東來才甚清氣甚和節甚竒心甚高僕是以恨相知晚也秋九月又言歸於湘東衆君子出餞于北郭碧峯巉巉出於柏稍有如虎牙夾天而立加以白日欲落挂在巖半橫照灘水月帶微明一作一帶微月操袂于兹揮袂于兹恨無昆山片玉以相贈贈君桂林之一枝審再拜白幸甚重送李審却赴廣州序前人吁嗟乎蒼梧之片雲或隨風而東或隨風而西片雲既如是孤客亦如是昨日李生言歸湘東今日李生將赴南海昨日今日豈有二李生乎亦猶前日蘇秦與今日蘇秦不殊耳所以然者何耶蓋乘流則進見幾而作明有志於四方非凝滯於一途其中或有不得已之事亦不怪有也昔孔子嘗為東西南北之人張儀亦為燕趙齊楚之客其已乎滄波逺天混和暮色孤舟一去曷日而旋歸哉送標和尚歸南嶽便赴上都序前人南嶽有大比丘其名曰道標性聰惠一作慧通用頴悟通於禪門精於律儀善於説法該於儒術是以禪師伯之律師仰之法師宗之儒流服之自登戒壇凡四十餘夏致弟子彌漫於江嶺間不下萬二千人不然安得前後連率新舊嶽牧莫不嚮風稽首焉屬我中司隴西公方崇東流之法化南越之俗是以惠然杖錫而公待一作得之禮敬甚厚前隴西公曰維摩經不云乎法無往來常不住故金剛經不云乎應無所住而生其心每念雙林樹下將歸乎湘東郡又憶王舍城中當詣於漢北闕公難違其意悵然久之乃命幕中樂安任華為之序序云彼上人者甚為稀有方以般若為舟而浮于洞庭以大乘為車而遊于亰師皇帝深信釋氏必將延入內殿問以祕藏豈唯將相得歸依之地王侯發回向之心而已乎王疑曰如吾言焉送虔上人歸會稽覲省便遊天台山序前人國書所載名山如天台者鮮矣故老萊遊于斯應真遊于斯虔上人亦遊于斯老萊崇於孝者也應真崇於道者也二公之美上人兼而有焉上人緇侣之澄肇詞場之沈謝讀盡貝葉能了於空淨如蓮花不著於水不然安得衆君子禮敬若是焉言歸膝下則孝名為戒將遊物外而朗詠長川豈徒蔭長松以隱身承瀑布以洗足是將探掇靈藥搜訪仙經歸獻北堂永同西母也鏡湖秋月當見色空稽山片雲能引詩興剡溪白鳥知爾無機雲門踈鐘訝君來暮豈不謂然耶今朝贈别桂林花洞庭白煙濕袈裟虔上人與君各在天一涯送魏七秀才赴廣州序前人此邦詞客往來亦云多矣其有論詩則為詩人對酒則為酒徒如魏秀才元稹者不可多得况爾兄殿中侍御史萬成吾友將為逺别豈同他人江亭暮天勿辭一醉醉後解纜則月照滄海猿啼碧山其奈爾何夏夜對雨餞李玕擢第還鄭州序前人今年東都秀才登第者凡十數人隴西李玕為之稱首且宗伯方以拔淹滯愍勤舊為務而玕則年甫二十餘豈張公意耶其如考舊文則上等試文䇿又上等欲以年少棄可乎不可也朝廷由是翕然謂張公之用心也周選才也當不膠柱於一途耳夏五月李玕將歸于鄭我中司李公惜明晨東郊之别成此夜西園之會桐葉滴其踈雨竹枝鳴其夕風夜酒既醉俾我小為之序崔中丞城南池送徐侍郎歸集作還亰序獨孤及侍郎昔為河南督郵河陽令其解龜也東人思其遺美今出入夷險歷二十餘集無此字載而一來廰樹未老佐吏半在公位望章綬輝光城邑觀者榮之而東都主人亦以籩豆盞斚徴會修好之不暇凡萃止十有五日而去去之日主人歎瞻仰集作之佇莫及也故又釃酒于此池池上有雙彩艫與竹齋對布賔主位于樽之左右而蘭臺金閨建禮承明之英十有八人序列其次池外有闕塞雙嶺遙作外户嵩高逶迤數峯當忩伊洛春樹若刺繡布錦仙桃火燃顧我則笑於是遊眺之不足則舉白以相勸而狂歌送之唱棹鳴桹簫鼓陳乎其間醉中疑三江五湖去人不逺謂千慮萬事無非妄作况少别可以興愴乎但駟馬行塵明日將逺登而無賦謂樽酒何宜歌而詩之且以見追攀者之心也二字集作志送成都成少尹赴蜀序前人嵗次乙已定襄郡王英又出鎮庸蜀謀亞尹僉曰左司郎成公可溫良而文貞固能幹力足以參大略弼成庶務既條奏詔曰俞往公亦集無亦字朝受命而夕撰日卜十一月癸已出車吉尚書諸曹郎四十有二人歎軒騎將逺故相與載籩豆盞斚封羊鱠魴修飲餞于肅明觀以為好飲中客有賦蜀道難者公曰士感遇則忘軀臣受命則忘家姑務忠信夷險一致患已不稱于位於行邁乎何有言訖抗手建節即路且以㤋集作紛恱刀礪侍輕軒而西凡強學以修業積行以取位赴知己不為名適四方不違親卿大夫之孝也吾子其無忘可移之忠將咨度是務使岷峨其人苛慝不作天聽自民誰謂蜀逺别細故也豈蠆芥乎凡今會同非詩無以導居者之志送吏部杜郎中兵部楊郎中入蜀序前人二公罷東西之集無之字曹草奏啓事之劇而參軍西南時人或譏朝廷易其大難其細及以為不然方今天子命將帥以守四方丞相秉鉞為唐南仲擇佐命介宜先才者賢者事孰大焉彼採薇出車以遣役勞勤我則異於是受王命者不言勤赴知己者不愴離今日斗酒姑展交好遂以道吾子集無子字四方之志亦使滿座歌二公乎送賀若員外巡按畢歸朝序今年春上以富人侯為丞相百揆時敘九州賦錯方欲齊職貢之法崇底慎之典使六府修九序成尚書吏部郎中集無中字賀若公貞明直躬特逹公器才足以懋功蕆事政足以𢎞道救物故俾繡衣持斧巡撫江介分王命也公電發神機霜淬智刃其始至也問謠俗省疾苦命司書視年數之上下削邦縣之版圖實其衆寡以差井賦然後勞來安集宣皇恩而煦之飢者如得食寒者如得纊使苞茅之貢必敘而杼軸之詩不作冬十一月命羣吏致事言旋于京師且將捧府檄於南陔侍版輿以西上禮也夫其由自家以刑國資事親以事君奉慈訓不廢陳力將君命不違色養忠孝之大者况姦宄已殄集作以弭干戈將戢朝廷方以律令章程責成三府然操六轡驟四駱周爰咨詢以成天下之務在是行乎翰飛方騁瞻望何及唯獻熟集作酬東閣弼成大猷使蒸人粒海水靜農夫高枕及亦預焉凡拜首集作執手于路岐者請偕賦鴻鴈取之子于征劬勞于野爰及矜人哀此鰥寡以為善頌送韋員外充副元帥判官之東都序前人太尉臨淮王之秉旄淮沂也天子命公為介洎臨淮薨而相公集作國太原公繼授兵符盡護東夏諸將亦表公參成周軍事如初命故事官至左右掖垣不驅傳不就辟十二字集作登掖垣者不驅傳居諌臣者不就辟將使其能必易其秩故自左補闕為尚書郎元年仲春始以使節赴洛陽經大盜虔劉之餘頑民雖遷汙俗未返三軍之心注於帥帥下帥字集作師非之耳目屬於參佐以公貞諒文敏能恤大事且成宣之後也故以部從事咨焉夫民殘則訛訛則流禁流莫若以德兵不戢則玩玩則暴禁暴莫若以信建信與德以為幕中之畫繄吾子是冀將賀不暇别於何有我飲餞者姑以詩代路車乘馬送頴州李使君赴任序公之為頴州也朝廷以不失人為明頴人以得父母為幸公獨以去色養為戚故執事者難之其為公謀者則曰受命忘家公也愛親讓祿私也君子不以私廢公不以孝棄忠况國家方親親賢賢而當頴人傒師長之日可以此時急聞禮而緩君命乎公曰諾然後明日朱兩轓而東竭力致身之誠於是乎全矣方當輯寧疲人𥜗而袴之宜其大王事而小行役豈徂暑之熱逺道之思與前期之難足攪胸臆賦詩朂别于以特贈送澤州李使君兼侍御史充澤潞陳鄭節度副使赴本道序今嵗皇帝擇可以守四方之臣分命大司徒涼公作藩汧集作岐陽平秩西夏涼公季弟曰抱真敬事好學仁勇忠信凡仁則不偷勇則不撓忠則能宣集無宣字力信則人任焉故天子器之方倚以胥附使宅高平綏厥有衆董次將之任且以柱後惠文冠冠之詔下之日軍府胥恱蓋蕭何守關中舉宗詣軍而涼公荷方邵英華有南字非之寄亦以愛弟居東旅于行間忠之大者夫髙平上黨之地趙魏燕代潞之咽喉太行恆山為之襟帶公居有專城之任行有亞旅之職其略足以固其封疆其惠足以柔其民人朂哉夫子進吾往也伯兮仲兮執兵之要謹身以肥家自家以刑國高平之政可以未行而窺矣彼瞻望佇立壯夫耻之非歌詩莫足以贈送餘杭薛郡守入朝序有大道者遺小成之迹抱宏略者非曲士所見公嘗以匪躬之故三入承明時議用舟楫期公者七載矣而猶建隼河壖洗幘江島興貝錦之歎詠跋胡之詩豈不以名至盛德至廣而厦材多節夷道若纇英華作頽非乎今天子受宣室之釐忽思賈誼以謗書之篋先示樂羊且搜玄珠俾詣丹闕則巨鱗方縱未可料也雖欲抱黃老作子非之術與赤松子遊公器所歸難乎免於圭組矣夏五月弭棹睢溪脂車而西火雲成峯郊草如織誰謂秦逺跋豫望之有以見升青集作赤霄捧白日在此行也謂攀四牡者各賦南山有臺之四章取樂只君子德音是茂以為志集有之爾二字送孫侍御赴鳳翔幕府序右扶風之地跨枕隴蜀扼秦西門帝命司徒為方叔開府之日搜賢自二於是孫侯以監察御史領司徒掾夫子卿族也用文學纘緒而弟兄皆材伯曰宿以秋官即辟丞相府仲曰絳拾遺君前及余為寮夫子則以貞幹肅恪之能入主方書出佐戎政花蕚灼於三臺時人榮之二月丙午乘傳詣部人謂扶風於是乎有三幸獲白額而南山有採藜藿者一幸也先是司徒於南山擒賊帥髙玉今夫操兵者如虎而司徒仁而愛人二幸也其府君則賢其幕府多士而孫侯懿之以文德三幸也恪於德以臨事度於集作其義以從政力於忠以成績吾子勉之其蔑不濟矣士為知己者用豈干榮乎請居者歌之持貺行邁送王判官赴福州序松梓楩柟茂於深山不能逃匠石之顧賢士君子晦於言迹不能使人不已知其勢然也之子言忠信行篤敬以文雅麗則括而羽之而世皆觀頥我獨儉德吾固知長風六翮必有時而去及御史大夫李公之命介也辟書四下果以嗣宗為首嵗二月載驟四駱脂車而東閩中者左溟海右百越嶺外峭峻風俗剽悍嵗比飢饉民方札瘥非威非懷莫可綏也議者其謂君臣戎幕以義佐師律以禮報國士以直道罷人以德使安危懸於指掌勝負決於談笑則咨謀之道𢎞矣豈椎髻殊俗覆車畏途足為志士之怵惕哉凡我出祖者亦既偕賦送洪州李别駕還任序獨孤及别駕者集作以嘗宰三縣佐四郡未始不以廉直為己任亦未始以廉直衒已名仕有餘力則寄傲於琴趣逺是以曲高意精是以聲全得於心而形於手故非外奬所及當其操絃如操政焉時人知其琴不知其政善而無伐光而不耀故也今也來思集作斯上台解榻卿大夫士從之如不及時因觀操縵之妙可以見從政之道是行也吾子其懋修乃德恪警爾位夫亦將抑與不暇求於何有繼楊二字集作唯湯郢音明旦將逺廬峰湓水大江間之風景可同而聽不可共由是衆君子賦詩以壯别且曰備折楊黃集作皇華之韻用抒他年之相思送韋評事赴河南召幕畢還京序前人自唐蒙司馬相如開牂牱漢書作牂牁鑿零山於是西南夷君長始受漢印及國家綏以大道振以長䇿滇越卬𤏡世亦皆為外臣蠢兹六蠻獨抗王旅天子方將開外户掃絶漠故授相國衛公鉞俾出作方叔入為吉甫且募如貔之介士將剪長蛇之速飛由是分命我廷尉評事韋公實佐其任公以止戈諭之採薇歌之使政有典則人知義所故燕齊少年韓魏徑卒召募如景附赴敵如焱馳自春至於是月受命羽檄之下凡萬八千計然後頒賜算級將朝于京師夫勤王集事之謂忠周爰咨詢之謂智復命而不愆集作潛非于素之謂信姑樹三德載馳六轡行當以柱下之書贊募中之畫是役也冥冥羽翰非瞻望所及矣請俱集作偕賦以知魏風送宇文協律赴江西序前人復周正之年天子以潤州刺史張公林集作休為豫章牧集作太守豫章之人既庶且富部從事縣大夫缺而不補先以檄徴協律於會稽時人皆賀豫章之得賢協律之遭遇君子則曰夫子刃有集作之餘地不啻切玉割集作刲小鮮而用其鋩無乃不可乎夫子曰不然蓋其不患秩卑而患已素餐不患國士之不我遇患遇之而不答苟有用我者吾其為執射乎於是舉帆西陵是日于邁然後知大夫之感義而不私集作思其身也于越集作于或非長路江皋暮春沉吟秦山悽愴鏡水豈不知今日斗酒明旦不共顧懷安敗名無勇也怨别傷逺非丈夫也苟將申其道而成其務則萬里咫尺少别何有二三子其詠歌之以代雜珮送韋司直還福州序前人逺别非難行路難行路非難相逢難始者與吾子會于撫以吾一日長乎子子嘗敦弟兄之好而不吾先自雲搖雨散凡四悲秋而一會面亦既道舊别又繼之斯亦可以愴矣然君子患德之不建集作逮不患人之不我知吾子克慎厥身以荷先大夫之覆露賁然將命為邦司直被服文行而鏃礪之揚其家聲吾唯子之望豈行邁與聚散足貽志士之欣戚乎是别也祗以歌詠貺吾子而已送廣陵許户曹充召募判官赴淮南序前人冉駹不庭三年矣王師戒嚴將問罪荒服於是上將分職慎選乃僚以許公有持斧舊名斷犀餘地故授以戎政俾發卒于東夫三河之人豪全齊之人武荆吳之人悍籍其餘勇可以盡敵信以致之繄公是賴然則諭王命敦師律度程以料民徴騎以濟衆歌事以遣役輯謀以定功在是行乎高天晚秋殺氣動地靡靡岐路悠悠斾旌送離如之何賦小戎以為好送六合林明府清白名聞上都赴選序前人今之為邑者祗事趣辦而已矣之子獨以公廉不苛聞於朝廷夫公則能廉集作力廉則不苛集作苟不苛則無害六合之人飽是三德故家肥人讓而名隨之集有冝字其黜陟考績集作幽明之日首冠英華作守官非賢能之選也宜哉上方勤恤人隱渴良吏如不及之子令問將與位偕行當見函洛春物迎馬首於千里之外勿謂蕪城衰草足愴逺别二三子何以持贈其歌詩乎送陳留張二十七少府鄖東都赴選序前人每嵗孟冬集作春大冡宰懸象魏之法以官民材天下髦士於是乎雲屯詞峯角立智刃今子投𬒮而起將鼓行乎其間以嚴樂之材力利商周之衆寡集無此十二字其於湛盧發硎批郤如玉繁弱在手捨拔則獲者吾惟子之望當知君子廣其業逹其道則榮譽貴仕可得而捨區區秋風瑣瑣岐路又足為志士之感哉十六字集作嫋嫋秋風悠悠逺道足為志士之感哉雜珮可以申永懷樽酒可以慰别緒其贈言之分顧謂集作調座者志之文苑英華卷七百二十二
