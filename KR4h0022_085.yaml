body:
  text: 文苑英華卷八十五宋李昉等編符瑞二日抱戴賦一首月重輪賦一首赤龍據桉賦一首潞河逐鹿賦一首嘉禾合穗賦一首黃龍見賦一首童謡賦一首漳河赤鯉賦一首黃龍再見賦一首九日紫氣賦一首李樹連理賦一首神蓍立賦一首金橋賦一首寢堂紫氣賦一首日抱戴賦并序潘炎景龍元年四月二十四日皇帝初臨上黨日抱戴皇天告符微臣頌之蓋古詩之流也賦曰日麗于天是曰太陽經千里臨八方符一人之元聖曜五色之重光祚我休徴莫先懸象表至聖之無二呈繼照於明兩陽光杲耀抱黃道而再中喜氣氤氲戴赤霄而直上聖有感天無私八紘占其瑞色六合仰其重離終古不虧得天長久豈止大章之步非齊夸父之走惟抱也同衆星之拱北辰惟戴也比萬邦之奉元后則知天為父日為兄同符叶慶以應文明我皇首出而御極光被無垠而太平月重輪賦并序抱戴之秋八月十有四日夜月重輪瑞之大者天意若曰將俾吾君姊事之賦曰我皇初列唐侯潜蟠藩國英武方斷文明表德穆然思道順帝之則既而動三合奔百神廓太清而萬里耀朗月以重輪時屬髙秋瑞彰元后光泛皎潔之斜漢色映䦨干之北斗金波耀景非懸闞澤之名璧彩揚輝不入士衡之手理殊吳夢符炳漢謡淨桂花於日道環水鏡於丹霄臺榭氷潔郊原霜縞月之揚光天不愛道一盈一缺則惟其常彩溢重輪告于天表大人占之夏啓以兆亦所以類星珠表金鏡兩曜齊美一人之慶於萬斯年受天之命赤龍據桉賦并序景龍二年夏四月十七日帝在㕔事假寐白鶴觀道士宋大辨等三十人同見赤龍據桉至矣哉神妙無方不可得而稱也𤣥天之龍兮見而在田我后之龍兮飛以御天據聖人之大寶與列祖而同𤣥髙出而潜躍以自試來定天寶居然假寐合而成體散而成章若窺於牖若施於堂且據桉而向明負扆以當陽日月在身有祗天之嘉夢風雨合氣瑞應圖龍必待風雨游乎青氣之中將振翼而雄驤羣居愕視聖作物覩赫然龍光真我明王折劵表異亦惟前聞曠然振古卓有吾君王人之瑞比之龍首髙居而逺望以臨乎九有天子之威比之龍鱗皇之可畏以肅乎萬人徒稱其象未覩其真恭惟我后近取諸身於昭巨唐其命惟新永據九五斯焉萬春潞河逐鹿賦并序景龍二年八月帝逐鹿於潞河惟河也深三丈闊倍之鹿迫而入水因鞭而逐之水不及韉應弦獲鹿後騎入者溺焉賦曰大君于田兮巷無居人四鍭如樹兮六轡既均定俞騎而百靈奔命騰雨師而四野清塵鳥獸駭殫川原飛伏事非定霸不求陳寶之雞位在至尊故取中原之鹿驚而决驟鳴不擇一作指音將投身以赴水非順命而前禽駭浪溢湧揮鞭電爍烏號滿月而方開驥足撇波而距躍乘流既濟赫怒中止斃駭鹿之一發振驚弦而未已洞胸絶系左角右掎雖復驅兩􅜏而獲五豵發小豝而殪大兕皆平陸之常事曽何足以踰此誰謂河廣一馬馳之大人將興靈感若茲諒神明之所輔何後乘之可追從此繼天而作主元元日用而不知嘉禾合穗賦并序景龍二年秋八月屬縣長子有嘉禾合穗瑞不虛月侯其偉東京賦作褘而乃賦曰天祚明德兮降之嘉生案彼靈篇兮莫之與京脉震土膏且分苖於南畝駟臨天漢爰合穗以西成當元后之歷試表休徴於太平不莠不稂實堅實皂引薰風於和氣承湛露於蒼昊生非百里驗管仲之虛詞出異崑山自我皇之所寶在瑞圖之右為曠代之祥唐叔得之而合穎周成得之以充箱雙米一稃稱之表異孤莖六穗頌以非常今也尤盛居然允臧轉風而屢騰佳氣就日而交見祥光獨天不生託厚載於富媪非聖不感效元符於我皇我皇得之熾而昌風之起兮雲之揚嘉禾之瑞未可量天子億載臨萬方黃龍見賦并序景龍二年秋九月五日黃龍見於上黨伏牛山之南岡留久之彰聖人之德也賦曰龍之來兮乘其陽躍於泉兮臨髙岡龍之至兮歸有德符於黃兮土之色精曜曜光雄雄上不在天兮接于物下不在田兮蟠于空列四靈智稱其首居五位色表其中將衒甲以無比與負舟而不同明皇家之王氣符厯數於聖躬飛煙噴霧若動若顧聲雖虩虩非同三尺之劔色乃煌煌下映五花之樹誠帝王之嘉兆寧朝夕之可遇何蛇蟥之足言諒騰黃之匪喻同翠龜之薦緑圖彰大人兮告元符覽史墨之言未之聞也驗登殷之祀不其然乎童謡賦并序景龍二年九月後常有童謡云羊頭山作朝堂郡南六十里有羊頭山今興唐宫即當之矣賦曰熒惑之星兮列天文降為童謡兮告聖君發自鳩車之嵗稱為竹馬之羣其言伊何克明寶位惟山之北正應天邸之居曰興朝堂更彰天子之置大人占之而自負黎庶聞之而屬意天人合慶厯運其昌同康衢聞於翼善比歸亳順於成湯言且表微諒人神之應事惟在昔殊飛走之祥豈比卯金稱為劉氏赤伏徴於漢光且游童之謳謡羌見偉於疇昔千古所記百王不易豈徒采於茅茨空用書於竹帛天贊我皇時髙列辟惟一人之有應振六合之光宅漳河赤鯉賦并序景龍三年春二月帝巡屬縣至於襄垣漳水有赤鯉躍聖帝之瑞也賦曰魚在在藻兮躍於中流吾君戾止兮樂我王游惟赤鯉之呈祥殊白鱗之入舟非竹箭之危湍無聞㸃額同君明之望幸匪為吞鈎豈其為祥必河之鯉用表皇族克繁帝祉雖云水物宜紫鼉緑鰲之同身是曰元符亦赤鴈丹烏之可比赬鱗耀彩碧水無波非應瓠巴之清角何言寧戚之髙歌周文之時躍於沼漢宣之代舞於河且合符於圖諜宜入頌於猗那豈徒鏤甲葺鱗四字出吳都賦下沿上泝皆為儔匹文鰩是喻吐尚父之兵鈐傳逺人之尺素事稱嘉瑞匪琴髙之所乘詩有樂胥似相如之獻賦黃龍再見賦并序景龍三年六月十五日黃龍再見於牛山天意汲汲於聖人賦曰龍之見也春分而登于天龍之潜也秋分而入于川假崇山而再見應元聖而通𤣥蜿蜒孤蟠雲霧四發目中精耀光飛列缺之火頷下珠懸色奪蟾蜍之月方將游彼池囿豈徒止于郊野非同上天之五蛇有異渡江之一馬孫權象之而置於軍中魏帝範之而在于殿下永言於此我皇是宜秦王之夢立乎鄜畤漢后之時見于成紀彼皆一至此則重光采色炫耀文明焜煌錯甲鏤鱗既以來乎字按龍魚河圖曰黃龍從洛水出詣虞舜鱗甲成字分官紀號可以表其祥超紫鳯於丹穴越青鸞於女牀龍德相成而無悔天家久久而蕃昌九日紫氣賦并序景龍三年九月九日帝與羣官壺口山升髙時有紫氣光彩照日賦曰吾王不遊人何以休望壺口之千里值重陽之九秋山對翠屏動暉光之赫赫雲成紫蓋扶晚日之油油宛轉浮空輪囷不散應一人之盛德為萬嵗之榮觀氤氲瑞色無孤峯斷陳之嵯峨搖曳晴空雜玉葉金枝之燦爛亦何異出蒼梧入大梁為漢武之蓋升軒轅之堂忽兮改容形難為狀紛紛郁郁用表靈貺遷用芒碭之間非比崑崙之上豈徒合而膚寸垂以飄扇河汾水兮天之眷紫氣凝兮人罕見位當用九果符九日之祥運極通三永御三雲之殿李樹連理賦并序帝在上黨延唐寺有李樹連理上親視焉賦曰惟彼嘉樹列星之精擢本扶踈當元光之降誕盤根連理應我后之文明天之發祥豈無他木必曰兹樹是光皇族所以並修幹連髙枝青房表異朱仲稱竒察以休徴不假終軍之識同於樹德寧為簡主之知族茂宗榮盤根合理花之發也霰每亂於青春實之繁兮珠更深於寒水豈徒生於靈井植彼東園自感義以相待但成蹊而不言此乃興聖主之符表天家之姓一人親覩六合稱慶至若鍾山之實玉井之仙或正冠而垂訓或投贈以成篇比德於我彼何有焉臣炎作賦天子萬年神蓍立賦并序景龍三年九月十七日上使韓從禮蓍筮卦未成蓍自立從禮曰大人之瑞也賦曰惟彼神蓍生而有知用知一作之不測明以稽疑擢九尺之纎幹伏千年之寶龜德圓而神兮無幽不及其生三百兮其用五十惟聖人之觀象乃神動而鬼入列八卦以效變翹孤莖而孑立數彰得一命乃自天同大橫之有夏表或躍而在田其察也深其功也大稱美名於神物齊妙用於神蔡是曰元后兹為筮從氣受隂陽夜分而彩露兼涵幽贊天地朝覆而輕雲數重蓍而有靈立定天保可謂神助用光天造功深莫善仲尼且許以鈎深屈於不知太公徒言乎腐草蓍之立兮發其祥吾君得之尊以光明乎太極演彼歸藏因卜祝之符瑞應天人之㑹昌金橋賦并序金橋在上黨南二里常有童謡云聖人執節渡金橋景龍三年十月二十五日帝經此橋之京師賦曰沔彼流水兮清且漣漪度木為梁兮斯焉在斯成金橋之巨麗得鐵鎖之宏規當其受以金模觀其曲面經始也則大火朝流成功焉乃天根夕見彰于聖德發彼謳歌千人唱萬人和丹雘蜿蜒倚晴空之螮蝀瑰材櫛比超渡海之黿鼉人且告符功惟用壯非填鵲之可比法牽牛而為狀鶴鳴處干鴈覆晴川異東明繫水而投步三國志夫餘國傳注云東明走以弓擊水魚鱉浮為橋匪秦帝驅山而著鞭惟彼童謡兮言猶在耳大人應運兮奉天而起乘彼橋以徑度按周道以如砥於是提三尺乘六龍懷萬邦入九重寢堂紫氣賦并序景龍三年十月二十五日帝還京後州內所居寢堂上有紫氣七日不散賦曰於穆聖王先天不違謳歌既洽朝覲攸歸往京邑而經千里自潞郊而乘六飛洪惟此邦初九之地翬飛鳥企謂尚諸侯之宫虎踞龍驤忽成天子之氣方凝紫色是謂非煙乍蕭索乎空外更霏微乎日邊若動非虛似浮有實覆彩鴛之瓦髣佛升堂繞文杏之梁氤氲入室是作興王之兆克符來復之日逺而望之乃散亂浮空近而觀之則希微無質欲見峯巖之上先形藩邸之間異張華之寶氣衝斗殊尹喜之真人度關若乃廣野之宫闕化成漲海之樓臺迥回映諒隂陽之盡美非福應之攸盛惟紫氣之來集實皇家之大慶休哉聖君有天下之成命文苑英華卷八十五
