body:
  text: 文苑英華卷一百六十六宋李昉等編地部八池雜題七首溪九首遊泛二十八首雜題二十一首池雜題題夀安王主簿池館蘇頲洛邑通馳道韓郊在屬城館將花雨映潭與竹聲清賢俊鸞栖棘賔遊馬佩蘅願言隨狎鳥從此濯吾纓和伊集作尹諫議史館山池作王維雲館接天居霓裳侍玉除春池百子外芳樹萬年餘洞有仙人籙山藏太史書君恩深漢帝且莫上空一作雲虛野居池上有月前人悠然雲間月復此照池塘泫露蒼茫濕沉波淡灔光應門當未曙歌吹滿昭陽逺近徒傷目清輝靄自長雨後宿劉司馬池上賈島藍溪秋漱玉此地漲清澄蘆葦聲兼雨菱荷香繞燈岸頭秦古道亭靣漢荒陵靜想泉根本幽崖落幾層盧氏池上遇雨贈同逰溫庭筠簟翻涼氣集溪上潤殘碁萍皺風來後荷喧雨到時寂寥間望久飄灑獨歸遲無限松江恨勞君解釣絲習池晨起皮日休清曙蕭森載酒來涼風相引繞亭臺數聲翡翠背人去一畨芙蓉含日開茭葉深深埋釣艇魚兒漾漾逐流杯竹屏風下登山屐十宿髙陽忘却回官池秋夕羅隱池邉月影間婆娑池上醉來成短歌芙蕖抵死怨珠露蟋蟀苦口嫌金波往事向人言不得舊遊臨老恨空多松膠作酒蘭為棹十載煙塵奈爾何溪入少密溪沈佺期雲峯苔壁繞溪斜江路香風夾岸花樹密不言通鳥道雞鳴始覺有人家人家更在深巖口澗水周流宅前後逰魚瞥瞥雙釣童伐木丁丁一樵叟自言避喧非避秦薜衣耕鑿帝堯人相留且待雞黍熟夕卧深山蘿月春過清溪水作王維言入黃花川每逐清溪水隨山將萬轉趣途無百里聲喧亂石中色淨深松裏演漾泛菱荇澄澄映葭葦我心素已間清川淡如此請留盤石上垂釣將已矣姑熟溪李白愛此溪水間乘流興無極漾楫怕鷗驚垂竿待魚食波翻曉霞影岸疊春山色何處浣紗人紅顔未相識清溪行前人清溪清我心水色異諸水借問新安江見底何如此人行明鏡中鳥度屏風裏向曉猩猩啼空悲逺遊子同前前人輕舟去何疾已到雲林境起坐魚鳥間動搖山水影巖中響自合疑作答溪裏言彌靜無事令人幽停橈向餘景雲母溪劉長卿雲母映溪水溪流知幾春深藏武陵客時過洞庭人白髮慙皎鏡清光媚奫淪寥寥古松下嵗晚挂頭巾白雲溪吳鞏山徑入修篁深林蔽日光夏雲生嶂逺瀑水引溪長秀迹逄皆勝清芬坐轉涼回看玉樽夕歸路賞前忘晚次宣溪韓愈韶州南去接宣溪雲水蒼茫日向西客淚數行元集作先自落鷓鴣休傍耳邉啼宿黑竈溪張籍夜到碧溪裏無人秋月明逢幽便移宿取伴亦探行花下紅泉色雲西乳鶴聲明朝記歸處石上自書名遊泛泛長溪任昉殖祿聚歸糧逺隱謝羈靮絶物甘離羣長懷忍去國長溪永東舍震區窮水域道遇垂綸叟聊長問津惑弭楫申九言無為纍牽纆長泛滄浪水從明至曛黑落日泛舟東溪前人黝黝桑柘繁芃芃麻麥盛交柯溪易隂反景澄餘映吾生雖有待樂天庶知命不學梁甫吟唯識滄浪詠田荒我有役秩滿余謝病偶遊龍門北溪忽懷驪山别業因以言志示弟淑奉呈諸大寮韋嗣立幽谷杜陵邉風煙别幾年偶來伊水曲溪嶂覺依然傍浦憐芳樹尋崖愛緑泉嶺雲隨馬足山鳥向人前地合心俱靜言因理自玄短材叨重寄尸祿愧妨賢每挹挂冠侶思從初服旋稻粱仍欲報嵗月坐空捐助嶽無纎塊輸溟謝末涓還悟北轅失方求南澗田奉酬龍門北溪作張説石澗泉虛落松崖路曲回聞君北溪下想像南山隈近念鼎湖别遙思雲障陪不知竒覯往空覩斯文來嵗後寒初變春前芳未開黃蕤裊岸柳紫莟集作蕚拆村梅盡室兹遊玩盈門幾樂哉嗟留洛陽陌夢詣建章臺野有巢由性朝非元凱才布懷欽逺迹幽意日塵埃同前崔泰之關塞臨秋水驪山枕灞川俱臨隱路側同在帝城邊謝公兼出處携妓玩林泉鳴騶噴梅雪飛蓋曵松煙聞琴幽谷裏看奕古巖前落日低帷帳歸雲繞管絃叨榮慙北闕微尚愛東田寂寞灰心盡蕭條塵事牽朝思登嶄絶夜夢弄潺湲宿懷南澗意况覩北溪篇同前崔日知夙齡秉微尚中年忽有鄰以兹山水癖遂得狎通人逮我咸京道聞君别業新巖前窺石鏡河畔踏芳茵既憐伊浦緑復憶灞池春連詞謝家子同歡冀野賔趣間魚共樂情洽鳥來馴詎念昔遊者祗命獨留秦蕭條潁陽戀沖漠漢隂真無由陪勝躅空此玩書筠同前魏奉古有美朝為貴幽尋地自偏踐臨伊水汭想望灞池邉是遇皆新賞兹遊若舊年藤蘿隱路接楊桞拂集作御溝聮道愜神情王機忘俗理捐遂初誠已重兼濟實為賢迹是東山上心仍北闕前顧慙經拾紫多謝賦思玄未躡中林步空承華藻傳陽春和已寡扣寂竟徒然泛鏡湖南溪宋之問乘興入幽棲舟行日向低巖花候冬發谷鳥作春啼沓嶂開天小叢篁夾路迷猶聞可憐處更在若耶溪耒陽溪夜行張九齡乘夕棹歸舟緣源路轉幽月明看嶺樹風靜聽溪流嵐氣船間入霜華衣上浮猿聲雖此夜不是别家愁東溪玩月王維月從斷山口遙吐柴門端萬木分空霽流隂中夜攢光連虛象白氣與風露寒谷靜秋泉響巖深青靄殘清澄入幽夢破影抱空巒恍惚琴窗裏松溪曉思難秋浦清溪雪夜對酒客有唱山鷓鴣者已見一百五十五卷李白秋浦與同生集作周剛宴清溪玉鏡潭前人康樂上官去永嘉遊石門江中集作亭非有孤嶼千載迹猶存我來憩秋浦三入桃波集作陂源千峯照積雪萬壑盡啼猿興與謝公合文因周子論掃崖去落葉帶月開酒樽溪當大樓南溪水正南奔回作玉鏡潭澄明洗心魂此中得佳境可以絶囂喧清夜方歸來酣歌出平原别後經此地為余謝蘭蓀春泛若耶溪綦母潛幽意無斷絶此去隨所偶好風吹行舟落花文粹作花路入溪口際夜轉西壑隔山望南斗潭煙飛溶溶林月低向後生事且彌漫願為持竿叟上已日越中與鮑侍御泛舟若耶溪劉長卿蘭橈萬轉望汀沙集作傍汀葭應接集作隔雲峯到若耶舊浦逺來移渡口垂楊深處有人家永和春色千年在曲水鄉心萬里賖君見魚船時借問前洲幾路入煙花奉陪鄭中丞自宣州解印與諸姪宴餘干後溪前人迹逺親魚鳥功成厭鼓鼙林中阮生集池上謝公題户牖垂藤合藩籬插槿齊夕陽山向背春草水東西看竹誰家好尋花幾路迷何勞問秦漢更入武陵溪答秦徴君除少府春日見集苕溪酬梁耿别後見寄六言前人晴川落日𥘉低一作清川永路何極惆悵一作落日孤舟解携鳥向平蕪一作浮萍逺近人隨流水東西白雲千里萬里明月前溪後溪獨恨長沙謫去江潭春草萋萋泛若耶溪丘為結廬若耶裏左右若耶水無日不釣魚有時向城市溪中流水急渡口水流寬每得樵風便往來殊不難一川草長緑四時那得辨短褐衣妻兒餘糧及雞犬日暮鳥雀希稚子呼牛歸住處無鄰里柴門獨掩扉溪行即事釋靈一近夜山更碧入林溪轉清不知伏牛路潭洞何縱橫曲岸煙已合平湖月未生孤舟屢失道但聽秋泉聲雨後欲往天目山問元駱二公溪路前人昨夜雲生天井東春山一雨幾回風林花併逐溪流下欲上龍池通不通奉陪顔使君修韻海畢東溪泛舟餞諸文士釋皎然諸侯崇魯學羔鴈日成羣外史刋新韻中郎定古文菁華兼百氏雅素備三墳國語思開物王言欲致君研精業已就歡宴惜應分獨望西山去將身寄白雲西溪獨泛前人道情何所寄素舸漫流間真性憐髙鶴無名羡野山輕寒苦竹秀入靜片雲間泛泛誰為侶唯應共月還若溪春興前人春生若溪水雨後漫流通芳草行無盡春源去不窮野煙迷極浦斜日起微風數處乘流望依稀似剡中遊溪待月前人溪色思泛月沿洄欲未歸殘燈逢水店踈磬憶山扉夜浦魚驚少空林鵲繞稀可中才望見撩亂搗寒衣奉陪侍中遊石笋溪十二韻盧綸朝日照靈山中溪浩紛錯圖書無舊記鯀禹應新鑿雙壁㵼天河一峯吐蓮蕚潭心亂雪卷巖腹繁珠落彩蛤攢錦囊芳蘿嫋花索猿羣曝陽嶺龍穴腥隂壑靜得漁者言間聞洞仙博欹松倚朱幰廣石屯油幕國泰事留侯山春縱康樂間關殊狀鳥爛漫無名藥欲驗少君方還吟大隱作旌幢不可駐古塞新沙漠霅溪逺望張籍霅水碧悠悠西亭古岸頭夕光生逺岫斜照逐回流此地動歸思逢君方倦遊吳興耆舊盡空見白蘋洲和韓吏部泛南溪賈島溪裏晚從池岸出石泉秋急夜深聞木蘭船共山人上月映渡頭零落雲泛溪項斯溪船泛數里便覺少炎暉動水花連影逢人鳥背飛深猶見白石涼好換生衣未得多詩句終須隔宿歸藍溪夜坐張喬藍水警塵夢夜吟開草堂月臨山靄薄松滴露花香詩外真風逺人間靜興長明朝訪禪侶更上翠微房雜題入峭峽陳子昻肅徒歌伐木騖或作驚楫漾輕舟靡迤隨波水潺湲泝淺流煙沙分兩岸露或作霧島夾雙洲古樹連雲密交峯入浪浮巖潭相映媚溪谷屢環周路回光踰逼山深興轉幽麕鼯寒思晚猿鳥暮聲秋誓息蘭臺䇿將從桂樹遊因書謝親愛千歲覔蓬丘白湖守後溪宿雲門常建落日山水清亂流鳴淙淙舊浦雨抽節新花水對窗溪中日已沒歸鳥多為雙杉松引直路出谷臨前湖洲渚晚色靜又觀花與蒲入溪復登嶺草淺寒流速圓月明髙峯春山因獨宿松隂澄初夜曙色分逺目日出城南隅青青媚川陸亂花覆東郭碧氣銷長林四郊一清影千里歸寸心前瞻王程促却戀雲門深畢竟有餘興到家彈玉琴若耶溪逄孔九綦母潛相逄此溪曲勝託在煙霞潭影竹裏動巖隂簷外一作際斜人言上皇代犬吠武陵家借問淹留日春風滿若耶此詩二百一十八卷重出今已削去酬綦母校書夢若耶溪見贈儲光羲校文在仙掖每有滄洲心况此北窗下夢遊青溪隂春看湖口漫夜入回塘深往往纜垂葛出舟望前林山人松下飯釣客蘆中吟小隱何足貴長年固可尋還車首東道惠言若南金以我採薇意傳之天姥岑留題李明府霅溪水堂前人寥寥此堂上幽意獨難論落日無王事青山在縣門雲峰向髙枕漁釣入前軒竹動踈簾影苔生雙履䀶荷香隨坐卧湖色映晨昏虛牖間生白鳴琴靜對言暮禽飛下上春水帶清渾逺岸誰家桞流煙何處村謫居投瘴癘離思過湘沅從此扁舟去誰堪江浦猿尋東溪還湖中作劉眘虛出山更回首日暮清溪深東嶺新别處數猿呌空林昔遊有初迹此路還獨尋幽興方在往歸懷復為吟雲峯勞前意湖水成逺心望望已超越坐鳴舟中琴潁陽東溪懷古崔曙靈溪氛霧歇皎鏡清心顔空色下映水秋聲多在山世人又踈曠萬物皆自間白鷺寒更浴孤雲晴未還昔時讓王者此地閉柴關無以躡髙步凄涼岑壑間太白東溪張老舍即事寄舍弟姪等岑參渭上秋雨過北風暮騷騷天晴諸山出太白峯最髙主人東溪老兩耳生長毫逺近知百嵗子孫皆二毛中庭井欄上一架獼猴桃石泉飯香粳酒甕開新槽愛兹田中趣始悟世上勞我行有勝事書此寄爾曹弋陽溪中望仙人城顧况何草乏靈姿無山不孤絶我行雖云蹇偶勝聊換節上界浮中流光響洞明滅曉禽曝霜羽寒魚依石髮自有無還心隔波望松雪靜林精舍即梁武隱所有鐘磬並古物釋靈一靜林溪路逺蕭帝有遺蹤水擊羅浮磬山鳴于闐鐘燈傳三際火樹老萬株松無復雲霞色空聞昔卧龍同李洗馬入餘不溪經辛將軍故城釋皎然慘慘寒城望將軍下世時髙墉暮草遍大樹野風悲壁壘今猶在勳庸近可思蒼然古溪上川逝共凄其剡溪行却寄别新者朱放潺湲寒溪上自此成離别回首望歸人移舟逄暮雪頻行識草樹漸老傷年髮唯有白雲心為向東山月越溪村居戴叔倫年來晚客寄禪扉多話貧居在翠微黃雀數聲催桞變清溪一路踏花歸空林野寺經過少落日深山伴侶稀負米到家春未盡風蘿間掃釣魚磯清溪路中寄常于二侍御崔備偏郡隔雲岑溪回路更深少留攀桂樹畏渴望梅林野笋資公膳山花慰客心别來無信至可謂井瓶沉將移耶溪舊居留呈嚴長史陳祕書秦系雞犬漁舟裏長謡任興行即今邀客醉已被逺山迎書笈將非重荷衣著甚輕謝安無箇事忽起為蒼生假攝池州留别東溪隱居朱灣一官仍是假豈願數離羣愁鬢看如雪浮名認是雲暫辭南國隱莫勒北山文今夜松溪月還應夢見君溪行逄雨與桞中庸孚端日落衆星分蕭蕭暮雨繁那堪兩處宿共聽一聲猿贈同溪客張籍幽居得相近煙景亦寥寥共伐臨溪樹同為過水橋自教仙鶴舞分採紫芝苖更愛南峯好尋君恐路遙芙蓉溪送前資州裴使君歸京寧拜户部裴侍郎薛逢桑柘林枯􅘹麥乾欲分離袂百憂攢臨溪莫話前途逺舉酒須歌後會難薄宦未甘霜髮改夾衣猶耐水風寒遙知阮巷歸寧日幾院兒童候馬看宿裴氏溪居懷厲玄先輩馬戴樹下孤石坐草間微有霜同人不同此零鳥自南翔迢遞夜山色青泠泉月光西風耿離抱江海遙相望霅溪晚泊寄裴庶子羅隱溪風如扇雨如絲間步間吟桞惲詩杯酒踈狂如曩日野花狼籍似當時道窮漫有依劉感才急應無借寇期滿眼雲山莫相笑與君俱是受深知文苑英華卷一百六十六
