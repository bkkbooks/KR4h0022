body:
  text: 文苑英華卷九十二宋李昉等編人事三思慎賦一首韋弦賦一首京兆試慎所好賦一首三復白圭賦一首駟不及舌賦二首思慎賦并序劉知幾國史云知幾著思慎賦以刺時且以見志鳳閣侍郎蘇味道李嶠見之相顧而歎曰陸機豪士所不及也當今防身要道盡在此矣賦形天地一作且夫肖形天地受氣隂陽生樂死哀進榮退辱此人倫之大分也然歷觀自古以迄于今其有才位見稱功名取貴非命者衆克全者寡大則覆宗絶祀堙沒無遺小則繫獄下室僅而獲免速者敗不旋踵寬者憂在子孫至若保令名以沒齒傳貽厥於後胤求之歷代得十一於千百某嘗迹其行事略而論之至如望夷篡奪鴻溝戰爭包燕蓋之異志踐恭顯之邪迹或干紀亂常或窺窬僥幸此而獲罪固其宜也爭二城而相殺期五鼎以就烹獻魚炙以交鈹舞雞鳴而伏鑕或幸災樂禍或甘死徇生求而得之又何怨也降兹以外有異於是莫不重七尺於太山吝一毛於尺璧徒惡其死而不知救死之有方但惜其生而未識衛生之有術何者地居流俗之境身當名利之路皆物之相物我之自我當仁不讓思倍萬以孤標唯利是視願半千而秀出行髙於人衆必非之官大於國主必惡之而名譽娛其耳光榮炫其目口甘腴豢嗤鈎吻之腐腸身安棟宇誡垂堂之折足自謂長無六疾永固百齡巋然可與金石齊堅松喬比夀者矣殊不知關張以傲誕為將桑霍以滿盈居職朝錯削國以獻忠伯宗匡朝而好直處父則純剛立性張溫則太明為識見之者為之寒心聞之者為之變色亦猶卧於積薪之上而不知火之將燃巢於折苕之末而不悟風之巳至既而惡稔釁盈道窮數極黃沙在縶懷上蔡而無追白刃臨頸揮廣陵而長歎猶以為禍出不虞災非素漸以兹自卜奚其謬歟假有舉一反三粗分菽麥知豐屋之不誡悟覆車之足尤而皆宴安鴆毒遲疑猶豫交戰未勝而禍機先發不杜之於欲萌方悔之於既兆用使茂先將戮顧諍子而多慙安仁巳收負慈親而永訣嗚呼自古所以多殺身亡族者職由於此也因斯而言則知禍福無門唯人自召自貽伊戚匪降于天而謂之不幸未之聞也昔夫子有云仁逺乎哉我欲仁斯仁至矣竊以仁為百行之首大聖其猶病諸然必以中才之人企勉而行猶或可及况其慎者蓋不過慎言語節飲食知止足避嫌疑若斯而巳矣非有朝聞夕死去食存信之難也違之則為凶人蹈之則成吉士其為𢎞益多矣而世人罕能修身二字一作日旴使厲巳自求多福方更越禮過度坐致覆亡此宣尼所以譏鮑莊子之智一作志不如葵而孫叔敖譬以螳螂伺蟬不知黃雀在後余早遊墳素晚仕流俗觀古今之人物極矣見吉凶之成敗衆矣夫貴不如賤動不如靜嘗聞其語而未信其事及身更之方覺斯言之徴矣加以守愚養拙怯進勇退每思才輕任重之誡智小謀大之憂觀止足於居常絶覬覦於不次是以度身而衣量腹而食進受代耕之祿退居負郭之田庶幾全父母之髮膚保先人之丘墓一生之願於斯足矣但才非上智習以性成猶恐覩芳餌而貪生處鮑肆而神化苟或靜退之心日弛則馳競之欲日增顛沛以之嗟何及矣常思列銘几杖取配韋弦刻心骨而不忘傳諷誦而無斁蓋語曰明鏡可以覽形往古可以知今是用尋往哲之事驗古人之得失寄彼形言存諸炯誡列之座右題其賦云吾嘗終日不食三省吾身覺昨非而今是庶捨舊而謀新原夫天地之大德曰生聖人之大寶曰位生也者賢愚定其美惡位也者朝市總其名利七情由其不等百行以之咸異儻無心以自謀良局途其必躓何者得不思失雄獨忘雌耽人爵以健羡窮代路之險巇是則平衡而登九折直轡而踐三危干戈生於肘腋胡越起於籓籬假使履獸尾而不嘻探龍頷以獲竒省僥幸以適願非仁者之所為也借如幽室鑿坯窮居負郭二頃樵採一㕓耕穫困沉名於抱關志充詘於懸箔俄拔迹於羊豕倐摶飛於燕雀金紫照其陸離銀黃煥其沃若彼滿盈之難守伊榮茂之易落朝結駟而乘軒暮齒劒而膏鑊方思上蔡之犬追念華亭之鶴奚一身而足怪乃九族其惟索爾其寂莫疑作寞無事殷憂不平耻當年而功不立疾沒世而名不成懷書訪道學古言兵擅雲間之美譽馳日下之休聲夫鐸穴由於足響膏爍起於多明趙國從而蘇裂齊城下而酈烹吹律誅一作殊謂京房於西漢獻寶刖於南荆遂懷沙於楚塞因説難於秦庭李仕登朝而就戮嵇道超代而逢刑苟才智之為患雖語默而同傾若乃猛將出師謀臣獻䇿鱗翼攀附風雲感激開黃閣與朱門樹髙幡及長戟恃龍蛇之恩舊望鳥兔之盡獲思擅寵於邦家誓傳名於竹帛蜀既平而艾檻吳巳霸而胥溺黜淮隂以斃韓遷杜郵而死白彼功成而不退俄寵謝而招隙何追憶於布衣翻興思於下澤各入門而自媚徒吊閭其何益亦有爵非才舉榮因寵遷吮癰求愛舐痔逢憐朝承恩而袖斷夜託夢而衣穿嗤弦直之死道喜邪徑之敗田氣噓霜而吸露力轉日而回天自謂方江湖而共永比嵩岱而齊堅一朝失據萬古凄然至於申侯逼迫而辭楚盧綰披猖以去燕彼丁傅之崇貴將梅茹之威權疇一姓其或在覆五宗而不全次有迹鄙衡門情娛俠窟出入田竇往來平勃歌無魚以自謀獻文蛇而請謁疑卧薪之可久謂巢葦之恆安烈火灼其潛燎衡風歘其上摶曹門傾而夭鄧賈室壞而夷潘班坐刑於黨竇殷取戮於臣桓顧噬臍而不及知觸籓一作拾之為難夫化赤漸乎鄰丹為黔資於邇墨生於麻者既革其操染於藍者亦變其色交非鮑叔遊異田蘇忘臭肆之不惡持甘醴以為娛餘推誠而禆一作狎耳蕭結契而連朱始刎頸以交約終反噬而相屠王綢繆於魏諷石嫌疑一作慊疑於州吁孫秀與趙倫齊貫石顯將牢梁並驅汙無禮以自及蹈不義而同誅别有直若史魚正如伯厚飾智驚物露才不偶持瑾瑜而指瑕鑒水鏡而求垢彼獨潔之為雅固羣醉之所醜况乃誹謗朝廷擯斥朋友方縉紳以豚犢延冠蓋以雞狗符結怨於晉台彭肆言於蜀后禰悲號於座上庾嘲謔於行後揆榮辱之在身猶樞機之發口儻一言其靡慎奚四大之能守然則禮無微而不驚疑作警怨無小而不讎察關張之同敗審韋弦之所由豈直君子不可罔而小人獨可仇倜儻英跱昻藏逺邁覩厮𨽻其如萍觀輿臺其若芥本無猜於螻蟻寧有忌於蜂蠆安知鵝炙輟授七尺由其喪亡羊羮匪均三軍以之覆敗苟有怨其必復諒無所而不誡於是考兹出處稽彼行藏咸知進而不知退知存而不知亡惑多言之必敗迷暴貴之不祥彼有足而罕衛行立身而靡防猶乘車之去軌若涉海之無航既百慮而一致故異術而同喪唯夫明達髙人賢良志士知滿損而謙益驗弱生而強死無為福先無為禍始節其飲食謹其容止聚而能散為而不恃潔其心而穢其迹濁其表而易其裏範暗室而整冠循覆車而易軌以道德為介胄忠貞為劒履愛髮膚而不傷保家室以不耻若乃詢木鴈於園吏訪光塵於柱史萬石守慎以全榮二疏既滿而辭仕袁不及於憎愛栁忘情於愠喜漢先主之立誡莫尚中庸衛大夫之所羞獨為君子余雖不佞嘗從事於斯矣重曰夫含靈稟質異品殊倫生何如而弗貴命何如而弗珍鴈含枚一作枝以避繳狐聼氷而涉津葵傾心以衛足櫟不材而謝斤彼草樹之無識唯禽獸之不仁猶稱能以逺害尚假智以全真矧百行之君子乃三才之令人何自輕於養性何自忽於周身儻狂歌之可採伊輿誦之可詢敢刋銘以勒座遂援翰而書紳韋弦賦以君子佩之用規性情為韻趙魏君子迹著明文有韋弦之淑慎在躁靜以區分于以誡德在我于以表正事君稟剛以宣其志守柔以播其勳一作薰動靜有恆得樞機於要道佩服無斁合規矩於典墳昔董安于事趙簡子虛心固節收目反視由一國之具瞻在四德之為美誠孜孜於不怠諒勤勤於所履觀其弦之徑姿可以勵其攸止式摽其道於焉克巳所謂惕禍以垂休故以善終而令始且其天道何常順之無悔察是非之倚伏節行藏於進退守而取則在剛柔以為針動必可觀比玉劒之為佩鄴令乃曰躁用乖於正性故安卑以從時靜既恭於五德故不暴以為師命韋帶之間緩體君子之舒遲惟器可象惟賢則之佩蘭則殊於楚客象環有慕於宣尼信建物之表意實善人之所資故知欲不可縱儉以足用德或可移中以成規識君子之容止見淑人之表儀周旋之中寧假於宫徴內外相制亦合乎塤箎大哉景行剛柔異性緩之於韋用和急之於弦表正既守道而恆佩因履端而不競懿夫式彰茂德分章一作意表情禮節既備敬慎孔明參衣冠而搌一作振序列簮紱以齊榮猗二子之垂誡與千古之揚名京兆試慎所好賦以重譯獻珍信非寶也為韻君子嚴其墻仭戒以心胸知耽味之易入俾回邪而不容其慎德也白圭是聞其三復其好賢也緇衣必薦其九重自然契巳坦蕩清心肅雍玩喪志而何有欲敗度兮何從昔如王者三朝逺人重譯執贄山委獻琛雲積豈不知納寶庫為子孫之藏映玉墀嘉戎夷之績蓋以難得之貨有損不貪之寶無斁獲狼而荒服不臻却馬而漢王受益嗤虞公受一作愛玉之敗美晉帝焚裘之迹匪騁欲而適願將去奢而無怨滿堂足戒黃金寧慎其四知連城不求白璧何勞於三獻所愛者禮所懷者仁君由之而乂國士用之以防身衣服有常非敢玩於千襲飲食不瀆一作溽禮記其飲食不溽寧專美於八珍其受一作愛才也必擇能而得俊其慕友也亦資忠而履信將辭直而不違知言甘而有吝是窒其欲無忽於微五色足耽審之則朱紫不奪八音可樂慢之則鄭雅同歸思禁邪而制放慮今是而昨非上則宣風下同一作如偃草將還淳而復朴在耽德而味道搜田失度則念虞人之針慈儉或虧必思老氏之寶至矣哉好之者儒以多聞為潤屋立義為分社孝既慕於參乎學願從於回也孜孜屑屑束修問寡如此人所以銘座而弗忘書紳而不捨三復白圭賦以立身慎言思是用則為韻張仲素賢哉南容詠白圭於雅什奉明義以為誡徴莠辭於口給諒同符於素履將辨志而貞立玷生在玉伊良工之可磨言出於躬縱駟馬之不及是知詩之為喻言以昭信想研精於奧旨知祗疑作底滯於遺韻詠難疑作歎彰其不足反覆明乎克慎身之是省况開卷而念兹心苟無瑕異獻璞之往吝允矣君子宜其念兹懲諸嘉玉觀爾靈龜尚鮮華之彩慕特達之詞知在涅而不昧同居暗以無欺重明哲以作則故沉吟於四時疑作詩既切磋以求友將造次而解頥得之自中殊學者之四失復而無斁類夫子之繹思一作類文子之三思是謨是訓一作尋之繹之是效是則諒修己以為物可自家而刑國既引之以改過復重之以比德香藝自雜於卷舒青蠅寧間乎白黑彼以圭為瑞此以誡為珍苟因文而假物非貴玉而賤珉然則懷璧者耻慢藏而成玷事君者畏不密而失身夫其列於雅頌備法語之為用垂于後昆庶厥道之長存汗簡之文可考絶編之義再敦且非守句之末學有異斷章而賦言豈不以賢智之心慎樞機之所啓瑾瑜之質懼毫髮以成痕懿夫志士仁人明不自是執一善以無失故三復而樂只若或志於斯行秉善價而誰毁駟不及舌賦以是故先聖豫欲無言為韻陳忠師甚哉言之出口也電激風趨過乎馳驅掉三寸以發越應千里於須臾逝不可追空勞於駟馬行而無蹤豈繫於九衢故君子念彼尤悔本乎虛無苟出話之不復將起羞而是虞且舌之鼓也有時而馳騖類扣虛之莫獲同捕影之難遇蕭蕭之響徒繫於下風逐逐之音巳疲於中路信樞機之爰發隨小大而作故儻善守於輔車何遽煩乎騏馵遲速相懸奔走徒然言出於身所謂往而不反馬竭其力猶歎瞻之在前雖欲適逺邇課後先如流之巧以失若滅之態何宣嗟夫以駸駸之足追言言之速豈能之而不欲蓋窒喋喋之喧喻駿駿之奔在誡之而不言肇自微眇倐爾騰翻疾既甚於過隟患必防於屬垣斯事也罔念則狂克念則聖誤片言之既往知逸足之難競自然有蹻之造勿謂載翕其居此不矜於哿矣彼何患於班如不然者其出彌逺其來愈一作適疏是以慕宿諾於季路悔聼言於宰豫至哉詩惡翩翩書懲靡靡方慿響於無際豈絶塵之可弭易象又著夫寡詞禮經亦防其苟訾未若古人之深誡饘於是兮粥於是第二以樞機一發榮辱之本為韻陳仲卿言如流兮唯舌是出咎將至兮徒駟之疾既力竭而罔逮則厲階而非一孰云不進諒金鑠以難追尚謂莫捫苟星奔而愈失由是知所大者吾將誡之雖欲加於鞭䇿誠有謬於毫釐不且息焉想喋喋而自逺非敢後也因駸駸而罔追爾其逝矣將興班如忽越彼懸蹄之莫馳伊利口之斯發猶在耳而旋失須臾若過隟而終煩滅沒淡淡如掉俄出有而入無薄薄陟遐想勞筋而苦節豈獨囂然未殄倐爾既徂徴其如駕之捷防其不密之樞如沸如騰訝以疑作巳成於枝葉靡瞻靡顧信空騁於道途原夫貴以寡尤取之不辱慮一出而匪賤故再驅而是朂苟如簧之靡定是見瘁躬若捕影之無由寧勞蹀足是知聽之則咎鼓之或非靡不忘於可復固必在於知機雖齊景之則多爰思滅迹儻張儀之尚在詎可塞違至哉立彼教言先乎根本𢎞影響之靡誡懼衆多之招損崩騰未蹀侔逐日而自勤反覆雖柔見如電之將逺是知孔甘者辱若訥者榮期自虞於速禍故必遣於遄征君子所以存勸誡立度程雖奔走而致逺吾知夫莫疾於聲文苑英華卷九十二
