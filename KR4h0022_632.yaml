body:
  text: 文苑英華卷六百三十三宋李昉等編謝恩六謝賜衣服狀五首謝賜春衣狀六首謝賜冬衣狀七首謝賜馬狀八首謝集作賀侍講遍賜衣物狀張九齡右高力士至宣稱陛下親講讀毛詩遍賜侍講陳希列三品兼賜衣物等伏以睿思𤣥通超然物表俯臨天下必樹風化既𢎞儒教考核詩人爰託師資親行講讀章句初畢賞賜集作錫有加明主深恩集作用心誰集作孰不知勸臣謬承任遇實愧經通聖業彌深微誠何補方思斆學以助皇明集作明時無任悅豫之至謝賜衣服及絹狀右中使某至特䝉恩曲賜逺别之什又中使某宣口勑賜衣一副并絹一百匹者但柱礎雖下感致於青雲陽燧則微昭應於白日在臣孤賤亦荷寵光伏惟陛下御札龍躍八體比之未雄天文鳯章五色對之猶淺况束帛荐至衣服仍臻施重丘山恩深江海實為九族遍有光華匪唯賤陋獨稱榮慶不任云云謝賜衣物狀右高力士宣勑賜臣衣及器物等臣九齡不孝苟存企及禮制天恩以忝樞近賜問再臨衣服珍器殊常寵錫臣有何力可以叨濫渥澤至深誠效已竭唯有微命不知所圖無任感戴惶悚之至為盧監被盜衣物謝賜御衣物狀蘇頲內常侍趙元亨奉宣恩㫖以臣被竊盜失物賜臣衣一副臣素以慢藏闕於周備令尹為過尚不可逃太丘有言復不能覺使臣知政未息盜於萑蒲加臣匪服遂增耀於樗櫟顧深愆咎翻荷恩慈捧戴循環再三惶懼無任下情之至謝恩賜衣服狀白居易右今日守謙奉宣聖㫖以臣初入院特賜衣服者臣自入禁司才經旬月未申集作陳薄效纍受殊私况前件衣服等獻自逺方降從御府既鮮華而駭目亦輕暖而便身臣實何人堪此榮賜必擬祕藏篋笥傳示孫子何則顧陋質而懷慙貌非稱服撫微軀而荷寵力不勝衣因物感恩無任愧懼謹奉狀謝恩賜春衣狀崔行先右中使某至伏奉勑書手詔宣慰臣及將士等兼賜臣春衣等鴻恩濡澤忽降轅門霧縠氷紈猥加介胄臣等謬膺委使徒展寸誠曽無逐獸之功每懼伐檀之刺捧受祗栗不知所裁仰戴恩光將何上答彌憂不稱其服益用內愧於心無任云云二右中使某至伏奉勑書手詔宣慰臣及將吏等又賜前件春衣臣等駑駘賤品介胄匹夫未彰塵露之功游及雲雷之澤喜抃兢惕恍然失圖捧戴恩私不知所據以御府紈素耀晴景於三春天宫蘭麝襲回風於十步豈土水之質被服所宜雖灰粉其身上答何極無任云云同前于邵右今月某日中使某至伏奉勑書手詔慰諭臣及三軍等并賜臣及大將春衣者捧戴抃躍實增慙懼臣功效微淺寵遇日深霜露適濡恩已承於挾纊清明才度賜又及於解衣仰服用於公家罷裁縫於私室已頒分大將訖各盡殪戎之力用申報國之誠同前常衮右今月五日監軍某乙差行營十將某乙送正月十二日書詔并賜臣衣三副軍將二人衣二副跪伏捧承惶悚隕越臣素以愚懦昧於吏能虛受寵私豈堪任使謬承條察吏法非明忝司訓練戎行不肅今之曠職獨有微臣宜懲冒榮以勵分鎮豈謂特回聖眷俯示天書曲降宸慈載加墨詔下頒春服逺被時恩奬飾逾涯兢惶失次載光師旅仍錫偏禆誓以捐軀期於上報無任慶抃悚踴之至謝賜春衣牙尺狀二首為人作令狐楚右中使某至伏奉詔書宣賜前件物臣伏以衣服者身之文章尺寸者王之律度被於四體不衷則災考以二分無差為貴伏惟皇帝陛下陶蒸萬類軌物兆人每及新春皆頒上賞其或才堪國用智代天工福至而驚名成猶懼循省涯分比數藝能臣實無任纍承斯寵曳紫光於腰下稱佩黃金操素質於掌中如持白璧窺看耀日舉止生風誠聖主全覆育之仁顧微臣無秉持之力䝉恩過厚忍愧逾深終申一寸之功用答九重之賜欣榮感惕不勝自任云云二右中使駱元榮至伏奉勑書手詔慰問臣等并賜臣春衣二副牙尺一枝軍將衣二十副者臣伏以行慶于下惟德所廣受賞于上無功則難臣實何人叨居重任履氷非懼食檗為甘今者伏䝉陛下推漢后解衣之恩寵錫春服稽有虞審度之典榮頒象尺樂官考正無纍黍之差女御裁縫有奪朱之麗而况端平皎潔無慙七寶輕盈綷􅀈不謝六銖此臣所以捧觀而似覩鈞衡服拜而如生羽翼謹便分散諸將傳示衆人感戴欣抃歡與臣同一作感戴欣歡與臣同日所守有限不獲拜謝無任欣躍一作抃之至謝賜冬衣表權德輿此表移在五百九十三卷表門今存其目謝賜冬衣狀三首為人作令狐楚右中使宋文璨至伏奉勑書手詔慰問臣及將士等并宣恩㫖賜臣等前件冬衣者臣伏以爪牙之寄才實甚難衣裳之賜恩為至厚臣之氣質無所任用誠不足以膺重寄而䝉厚恩今陛下陶以大和蓋其多闕及戒寒之月屬授衣之時喻一作倫比賢能頒宣慈惠跪聽清問欽承寵章宛是蠶綿爛如獸錦長皆被土貴實兼金分列校不辨鮮華在微臣最為重疊自承天澤不憚風威仰戴恩光有千鈞之重俯循功績無一縷之微空知竭誠難以勝德謹並捧受分給訖所守有限不獲陳謝無任感慶屛營之至二右中使某至伏奉勑書手詔慰問臣及將士兼宣恩㫖賜臣等前件冬衣者伏以綸綍之言出於天澤衣裳之受必以王功臣職在總戎任當平冦效無絲髮非聖主而豈容施若丘山在愚臣而將壓今者司寒肇至命服載新降自九霄來經千里錯鳥章於襟帶奮龍文於素箋兼并縟麗備極環竒木石之姿過䝉鮮飾氷霜之氣頓減嚴凝曳婁而賤質生光憤悱而懦心增勇終期薄效用答深恩謹凖勑受兼分給諸將訖所守有限不獲陳謝無任感戴之至三右中使吳千金至伏奉勑書手詔慰問臣及將士等并宣恩㫖賜臣冬衣兩副及諸將衣二十副者臣守國之藩荷天之寵名聲績用未有可稱伏惟皇帝陛下仁育四方澤均羣動當𤣥律開冬之候念祁寒用事之初書詔交飛衣裘疊至墨盡龍蛇之妙綾兼龜鶴之竒服玩而衰殘有光拊循而孱懦增氣自臣而下萬口一聲臣並凖勑分配訖不勝歡抃愧戀之至為滎陽公謝賜冬衣狀李商隱右中使某至奉宣恩㫖賜臣冬衣一副大將衣四副兼賜臣手詔一通者八行帝語窅降於重宵一襲天衣俯回於窮節臣當時凖詔給散訖臣叨䝉重寄適控遐陬地雖五鎮之衝氣得四時之正每𤣥冥應律顓頊司辰當二日之鑿氷則殊豳英華作幽野及兩楹之飛雪無異朔山重以賨布少溫蠻綿乏暖方求麗密以禦嚴凝豈望司服頒衣貴臣傳詔綾裁飛鵠絮集作素裛仙蠶白分椒壁之光紫奪蘭牙之色已均下將仍逮連營晏子狐裘故弊何一作舊飾故彰於國儉王恭鶴􅌁風流不自於君恩被服有輝負戴無力謹當上宣殊渥下拊多寒均大裙於琅琊變無𥜗於蜀郡粗令康泰以塞貪叨臣與大將等無任望闕感恩抃舞屏營之至為濮陽公涇源謝冬衣狀右某月日中使某至奉宣聖㫖賜臣及大將兼諸鎮防秋兵馬等前件勑書手詔并冬衣者臣並已凖詔㫖宣示給散訖恩極解衣榮加降繭戴山未重負日非暄臣謬領藩垣適當戎狄唯憑廟算粗展集作振軍威絶漠集作塞獵回幸無警急高烽火過但報平安直以地勢多隂川形稍背三伏常聞於屏箑九秋尋訝於垂繒代馬暫嘶隴山無葉燕鴻未過涇水先氷是以每降王臣仍迂御筆緘封垂露寵錫禦冬非玉女裁成即仙人織出徒驚在笥莫匪集作覩因針始顧孱微深懼不勝冠帶旋䝉被服便如能執干戈遍逮軍前歷霑麾下逹喜氣而陳根復秀動歡聲而蟄户潜開華楚成行曳婁塞路其山南宣歙三道大將等雖久居炎燠不慣嚴凝亦既更衣皆忘易地賈餘勇而例思盡敵感鴻私而咸願殺身各限征行不獲陳謝臣與大將等無任瞻天戀闕感恩屏營之至謝賜冬衣狀二首張次宗右伏以𤣥律戒時祁寒應候玉人傳詔御府頒衣伏惟皇帝陛下盛德御天至仁育物每念藩方之任屢加寵錫之恩臣績效未施塵忝兹久捧溫密之詔喜若朝天被輕纎之衣暖同就日况撫寒之問下及師人錫服之榮遍周戎校喜氣乍傳於封部陽和先及於荆衡爭馳戀闕之誠各勵酬恩之至云云二右中使劉泰伸至伏奉勑書手詔宣慰臣及將吏僧道百姓等并賜臣手詔及冬衣兩副大將衣十副者清風戒寒𤣥律將至未及嚴凝之候已霑輕暖之衣承寵命而載慙啓緘封而增感伏惟皇帝陛下至德御時深仁育物光武十行之詔每覩憂勤魏后五時之衣未為寵錫况臣叨榮漸久受賜彌多寒暄之節候驟移新舊之光華相委被服悉頒於御府裁縫僅度於私家挾纊之恩已周於列校維鵜之刺尤愧於微躬無任云云謝賜馬狀張九齡右今日高力士奉宣聖㫖賜臣紫騮馬一匹伏以恩覃不次寵遇非常有忝股肱之臣頻奉渥窪之賜况郊壇展禮尚未奠於九宫而雨露深恩反有叨於三接雖鳴珂噴玉朝天永代於臣勞而任重才微久歲寧酬於聖造荷負無力答效何階云云謝借馬狀孔戣右中使至奉宣進止將前件馬送臣至京兆路界祗承寵光載兢載惕微臣猥以庸瑣謬分憂寄拜命之日已受賜於龍媒遵路之時復假榮於天驥恩私稠疊渥澤殊常豈謂聖意不遺獨懷軫念輟驊騮於內廄騁逸步於長衢驅馳忘勞服習如志誓當夙駕奔走所部冀安夷獠以免聖憂無任感恩懇欵之至謝借飛龍馬二匹狀鄭絪右中使某至奉勑㫖借臣前件馬至京兆府界者王人在門天驥臨路寵光荐及行色增輝上感恩私何階答效自臣叨承戎寄纍軫皇慈念輸力於外藩降逸才於內廄分憂未酬於聖主代勞已及於微臣雖駑鈍莫施而疲羸頓解再馳猶勤於逺道三接已及於帝畿即以某日至京兆府界回瞻魏闕目斷白雲祗事正程指期丹激無任感戀之至謝借馬狀于邵右今日中使某至以臣朝奏闕廷特借前件馬拜受殊深不任驚懼伏以詔傳中貴馬出內間恩光自降於九重前疑作剪飾不關於衆口無功無效以懼以慙遂躡權竒方遺欵假瞻天心喜已馳捧日之誠向闕身輕更遇奔星之足仰丘山而轉重知報效以何階謝賜馬狀常兖右中使某奉宣恩㫖賜臣前件馬臣竊位台司已招官謗未申薄效遽沐殊私捧荷驚惶心魂震越上慙慈眷下愧周行素無逺致疑作致逺之資益懼負乘之咎無任感戴之至為趙相公謝馬狀齊映中使某至奉宣進止賜臣馬一匹并鞍轡者臣官叨上司日荷厚俸固其乘馬足展驅馳宸眷過深聖慈猶軫猥出上駟特賚微臣豈徒體合鑄金法相皆備而乃足符歷塊驥德是稱仍束以銀鞍絡以金轡顧自微賤何可服乘拜命驚惶不勝戰汗當攬轡之際思六合於如琴執鞭之辰度三代之得䇿空懷夙夜寧效涓塵無任感激之至為假相公謝借飛龍馬狀白居易伏以出從內廄行及中途假飛龍之駿駒代跛鱉之蹇步執鞭拜命借馬喻身取其戀主之心以表為臣之節恩深易感情懇難陳竦踴之誠倍百羣品為中丞滎陽公謝借飛龍馬送至府界狀李商隱右中使某奉宣恩㫖以臣赴任特借飛龍馬一集作兩匹并鞭轡等送至京兆府界者臣謬奉恩榮出叨亷問豈期蹇步深軫皇慈特命內臣俾騰上駟梁懸蜀鐙几覆吳鞍每多曳練之疑不假著鞭之力倐踰秦甸將復周間照地回光瞻天送影長亭欲别未期東道而來雙闕儻嘶願附北風之思無任感恩戀闕雪涕屏營之至文苑英華卷六百三十三
