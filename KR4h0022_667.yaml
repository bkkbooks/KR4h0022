body:
  text: 文苑英華卷六百六十八宋李昉等編宰相中與崔中書圓書一首上鄭相公書一首代竇中丞與襄陽于相公書一首與蕭相公書一首與常相公書一首與元相公書一首賀外舅崔相公書一首與崔中書圓書蕭頴士違奉纍月一作載伏增馳結首冬漸寒伏惟相公尊體動止康裕敬想表妹珍儀外甥休慰時事孔棘出於慮外京邑傾淪主上遷播率土臣子銜涕痛心相公應期降德康濟危難保翊聖躬乂安社稷勳踰曩昔道貫前修海隅蒼生孰不幸甚況在舊一作親故榮庇特深某自中州隔越一作圯携流播漢隂遂至江左淮南節度使召掌書記兼補此官羈窘之辰幸忝俸祿然任翰墨罕參籌議徒懷所見莫獲申述竊惟二京未復祅氛方熾靈武太原雖稱官軍甚盛而兩河南北無月不遭冦禍頃者濮陽東平中都郾城相繼失守靈昌潁川皆纍戰之餘今未解圍上蔡汝南近又奔潰虢王之鎮河南亦有政刑而百城饑乏兵力未振河北自六月不聞克捷井陘路亦云未通河東絳郡復傳先陷淮南山北境內賊壘户寡人貧徴促幣竭衆心危懼莫有固志則兵食所資獨江南兩道耳楚越之地衆山積阻江湖浩漫樂興永嘉南通嶺表北至吳㑹皆境瀕巨海自古平日常備不虞中原或擾無不盜賊為患固宜察其要害增以兵力擢文武良才以鎮捍之先奉七月十五日敕盛王當牧淮海纍遣迎候尚承在蜀今副大使李中丞華胄茂德平時良守清靜臨人貪暴斂跡雖古龔黃邵杜之化無以先之然與今時經略頗不甚稱所蒞謹守科條愛惜府庫江淮三十餘郡僅徴兵二萬己謂之勞人將卒不用統攝軍士未嘗訓練淮左江東三十餘郡無一良二千石豈惟不才乃皆中人以下之不逮其間敗衄略難勝述比者吳郡晉陵江東海陵諸界已有草竊屯聚保於洲島剽掠村浦為害日深若朝廷不時遣賢王即就鎮求選博通宏略之士以輔佐之特許不計階次超拔才雄以居將守倘一朝勍冦南侵陵蹈淮涘衝要缺繕完之備甲兵無抗擊之利江海餘孽因而嘯聚則長江之南亦從此而大潰矣復何觀舋虜庭指日清蕩哉某雖不敏嘗覽舊史見古今成敗之䇿江山一作山川險易之勢多矣忝職幕賔一作中言不見録長宵嘆息不覺飲淚方思虞詡之任朝歌見疑守將古今一也幸他日風塵早辱惠愛今雖卑賤禮數懸絶仰惟無大故則不棄之義或當未賜踈擲耳銜憤萬里逺陳短見亦惟相公留聼無忽尚書房公門下崔公往不自意並承盛德一顧之末然若非相公為小人貧賤之交不敢輒申狂簡輕冒抵觸書不云乎三后叶心同底于道亦何必人人别疏哉在相公言之耳親弟某乙久在巡內或垂記識自多故以來信問阻絶酸心痛骨未期一見時惟以小人承舊愛之故惠提奬之私非所敢望如或以公乘使江淮獲一親集死生骨肉不勝幸甚未由拜賀無任下情謹因賀赦使附狀不宣蕭某頓首上鄭相公書歐陽詹將仕郎守國子監四門助教歐陽詹謹齊沐緘書再拜遣𨽻子弟獻於相公中衢之車下庶及乎閣下當今主上聖明文粹作哲宰輔賢明可行已行可止已止其或未行未止非不知也非不念也未可行而未可止也詹愚蒙欲陳所知集作見則在知之之後念之之內矣不敢復言文粹作亦何敢言今斯有言自言而已人有百行修萬事精內叩潜鳴外聼無聲非不願用而人不用非不願旌而人不旌雖和平之代至老至死者相公以為有之乎詹將十有十百有百千有千也何以苦知自近之耳詹常讀論語得孔子曰古之學者為已今之學者為人傷時之學者不由所學矜所學也詹雖不敏傷竊如之况禀羔羊鴻鴈之性未資訓導而敬順和合乎教者十或四五潔身畏人直文粹作負拙自守始亦以孝弟忠信約禮從義人生合爾博文逰藝行義修詞人生固然殊不以有為而為也幸屬昭代以此官人敬趨條目遂希銓擇五試於禮部方售鄉貢進士四舉集作試於吏部始授四門助教夫人百行庶幾萬事留心不仕則已仕則冀就髙衢逺途展其素蓄垂名於後代播美於當時非徒利斗粟希片帛救寒暑給朝夕也所以利斗粟希片帛者不以文粹作能無之其將百行庶幾萬事留心之流别行也三字集粹作有所分别詹非斯人之徒歟其慕彼人之徒歟企夫髙衢逺途也噫四門助教限以四考格以五選十年方易一官也自兹循資歷級然得太學助教其考選年數又如太學若如之則三十年矣三十年間未離助教之官人夀百嵗七十者稀詹今四十年有加矣更三十年於此是一生不覩髙衢逺途矣况先三十年孰知存亡哉其或素蓄當在重泉之下矣忖已方人所以知百行修萬事精內叩潜鳴外聼無聲非不願用而人不用非不願旌而人不旌雖和平之代至老至死者十有十百有百千有千也嗚呼今之髙懸爵祿廣設名位實待乎德行與乎能事也德行也者孝悌也忠信也不可於公堂斯須而得試也須漸乎父母昆弟之言洽乎州閭鄉曲之譽詹逺人也父母昆弟居萬里之外州閭鄉曲在三江之南孝弟之言無由漸朝廷之耳忠信之譽莫得洽闕下之聞也能事也者秉持也應奉也不可虛處無任而而得呈也須形乎政令裁制集作製之庸著乎伎集作技藝使才之致詹冗官也政令裁制集作製一月兩衙之謂伎集作技藝使才二奠陪行音航而已秉持之庸不可形考課之目應奉之致是亦絶著選能之見也縱有顔閔之德遊夏之學宰我之政事夫子之文章其於是也但父母昆弟自相知州閭鄉曲自相許於海隅嶺徼其奈拳拳之身何夫大田斯穫而有遺秉則滯穗也萬秉稀一萬穗稀一詹豈遂當其一乎是集作且天地也命之翅必與之羽翮副其巨細使得飛也命之足必與之蹄跖稱其短長使得行也若命之翅而不與之羽翮與之而巨細不相副飛則墜若命之足而不與之蹄跖與之而短長不相稱行則文粹作必顛命適遺之墜與適遺之顛則如無命無與也其庸愚不知造物之㫖者視之則不足集作之怪其賢明深探理源者其謂天地何且邦國也勸人以德行用錫之爵祿必契其分量使得行道也聳人以能事用錫之名位必權其輕重使得榮身也若勸以德行不錫爵祿錫之而分量不相契道則屈若聳以能事而不錫之名位錫之而輕重不相權身則辱勸適遺之屈聳適遺之辱則如無勸無聳也其庸愚不知政化之㫖者視之則不足集作之怪其賢明深探理源者其謂邦國何集如此英華作其謂天地何邦國也恐非詹代居閩越自閩至於吳則絶同鄉之人矣自吳至於楚則絶同方之人矣過宋由鄭踰周到秦朝無一命之親路無回眸之舊猶孤根寄不食之田也人人耕耨所不及家家溉灌所不霑其擢乃條枝成乃華實者上天至仁之膏澤厚地無私之陽春乎相公為上天之霖雨佐厚地之發生也何以處詹焉夫舉善不遺於微陋用能必盡其材器真宰相之任也自唐及虞有其人自夏及商有其人自周及秦有其人自漢而降集作還無代無有洎國朝歷歷可數也相公能以詹為手下濫觴乎似善斯升真善以至似能斯拔真能以來古人行此天下歸仁也相公行之哉今則猶古算度途逺蒼黃造次詹惶恐再拜代竇中丞與襄陽于相公書吕溫某經術無取丘園自屏所期全拙豈敢近名二十五丈泛愛博容不遺孤陋申以通家之好遇以國士之禮分漸入堂集作室契辱忘年猥䝉集作賜吹噓謬假鱗翼遂得價重江左集作右名聞天朝起家拾遺再命柱史時丁變故命偶屯艱孤鱗方困於蹄涔窮鳥思集作再歸於仁德果䝉奏領列郡擢倅三軍不汝瑕疵見容於嵗月同我休戚每形於話言身計皆奉良規家事悉資全力然後表逹宸聼推致周行南宫劇曹踐不終嵗憲府雄秩拔於常倫內顧庸虛敢云自致魏賢子夏宣尼之道彌彰集作尊漢用淮隂相國之言始重徒以才負知己名懸古人致逺之效莫彰貽羞之責斯及敢不砥礪微分激昂前途以明主集作君今日之恩資大賢積時之譽庶乎有立少答所知豈敢以尺素為榮而負平生之論伏惟有以鑒察郡榻諸生戎旃故吏推奬恩重生成感深瞻望門闌未獲拜謝銘戴兢愓莫知所裁拳拳下情紙筆難具某再拜與蕭相公書于邵相公閣下某以抱舋遐荒殘魂未絶偷度時刻倐忽四年伏以宗社未安凶逆猶在才無取入死雖莫由天地之中甘為棄物豈意當此之日逢相公安撫之時狂夫之言猶有一得芻蕘見納庸可庶乎伏惟相公秉鈞戡難道冠伊吕方期除天地之害更造生靈之本故詔書曰則如親臨又曰其代豫言大哉倚賴斯可畏也安得因循故轍返顧於身乎奉相公之憂深入骨髓矣聖上纘序鴻業於今六年將求升平初若不及以無賢相左右虧我聖道近二三年有執事者蔽主之耳目結囊容身內懷姦忌外擅威柄衣冠為之側足道路不敢偶語衆叛人離遂有今日相公所自見知既不能誅𢎞羊以謝天下則今之所急者皆在相公彀中耳况居儲后之姻重受台廷之寄國敝身敝國安身安既須以形迹逺嫌又須以直道見節為相公之福深以為難是即疏家知止馬氏不侯至今髙人借以為誡斯為上矣如或急於救世雖不獲已道德刑政仁義干戈任權重輕惟精惟一斯為次矣此外滔滔者皆是非愚所知今大盜未誅群冦更起其可處置者惟兩江半淮三蜀五嶺而已其中最切者請舉尤以明之每道皆有客軍本在同心平難側聞將校謀勝監軍爭長節度斂手金多者雖敗即安無金者讒入則退戰勝攻取未之前聞為今之計莫若監軍一切且停客軍權屬節使申明本管無得相干然後慎選良將文武兼偹委之鎮撫希在萬一餘則歷在相公目前不敢煩於簡翰負纍憂危年垂七十沉痾積疹四十餘年自到炎方幸未及死豈合以國家大務言逹相府乎實以故韋吏部有忘言疑作年之分嘗約以相公今日之望每恨生死契闊不盡曩時之期拳拳之心皎如白日良友雖殁情豈忘乎伏䝉每賜書問亦承念及微命恃此不恐輒冒威嚴其是與非不在小子又自悲者平生志業身退毁隨紛紛世情鮮不乘便浮石沉木自古而然煢煢萬里誰能一作為識察敢託相公門䦨之舊輒書當時得罪之由再煩視聼具如别狀因宋侍御上垂詳覽又嘗內省自卜者審既已衰暮又昧時用前年病熱逺視不審去夏罹瘴近聼不聞疲憊之餘難於尸素伏乞曲賜恩波放歸田里傳家就木不夭天年九原之下期以贖責甚大惠也如以歸田聞奏無端即乞以檢校閒官為請許令隨便養病免死殊俗又大惠也伏念斗筲之器須當承乏之用任過其量自合速辜然於其中有可恕者且獲戾之始實謗為一作為謗深不䝉鞫問至今為纍若不然者豈三人同罪而一身受罰將鎮列曹㑹府袁髙遷牧名藩由此而言痕纍未盡每一念至驚危貫心豈無知人誰為言者今之所祈恕者屬鴻恩宥過掩瑕滌穢亡官失爵猶䝉收叙况身佐州端秩猶五品乞從反褐以贖前愆免入量移再罹降黜餘生願畢瞑目如歸甚幸又事有失於知退而終可言者竊以聖上建元立極之初每事驅䇿雖無塵露之效頗傳潤色之美有冊皇太后尊號聖神文武尊號皇儲宜建之制皆泥金檢玉著之國史其餘則北蕃西戎詔䇿文誥無大無小何密何踈侯王將相出入中外數年之間事無虛日皆承特㫖俾以發揮聲猷一作教所浹必由是也豈唯叨竊之幸實為不朽之幸矣昔隋文帝謂楊素牛𢎞曰薛道衡老矣宜使朱門列㦸薛公謝恩且辭無功隋文詔曰自吾有寶位國家大事皆爾宣行豈非大功也薛公乃受賜愚雖才不逮薛而焯叙盛明過於薛逺矣願以簮履之念得遂丘園之請追前奬拔一作後雖死猶生伏願相公深納焉沉迷鄙敗不知忌諱馳魂愓慮退不自安死罪死罪與常相公書相公閣下自蒼生允望帝載緝熙大小仲父四方風動既絶橫議且無多聞幸甚幸甚邵復何幸又當此時之則然命乃未偶通塞之分併在去年則相公首薦之恩鄙夫膺受之美徒拭人目孰知其心是以區區子牟不敢忘闕而又自惜昔嘗陪相公鄉里之舉時應神州甲乙之選其餘馳逸足揮徑翮修容哦哦來以干進者蓋千百數在公堂預鹿鳴之宴猶不可得况㑹府鶯遷之地者乎相公當時傑然於一作襄然居天下第一愚實不佞忝從斯列六子登科又厠其數凡我連茹世論以榮皆因依相公用白粉黛是乃降神惟嶽有開必先右掖司言中均典翰出入承盼從容十年啓沃之由自此而始則知輔弼之道在天非人嗚呼同時之人零落向盡彭楊李賀冥寞何之今相公宰平天下而鄙夫拘束邊外獨不得一親顔色更露腹心則漢庭於相公何厚哉是以內省可知命焉是以垂頭塌翼不敢思奮况家事未畢立錐無地男可從官女可許笄耳順之年馳復思滿名位日退沉痾嵗深君臣之道天人之際心雖如丹誰表赤實此皆鄙夫與相公今日之事也豈無他人在我同志而已况相公無失其親無失其故二江之上獨立無親一麾以還未之有故舉目生憤傷如之何未知相公何以留念悲趙武之視䕃感伍員之逆施拳拳之心欲罷不忍伏願體道垂統加餐保和乘風雲之感㑹行宰相之能事無寶斯位無愛斯權無念同升於朝無念若撻於市咸有一德不其盛歟方將伊臯比崇管樂論霸寧展禽三黜無怨在胡廣七登何補鄙老也有知美善不識忌諱逺塵視聼忠告尺書然非盡言之具庶咨道一作導意之本所不爾者謂之何哉前漢州司田樊登兄弟舊逰三十載矣相公席硯昔與之同言念無一作撫塵今也祗召甚大惠也因是我利攸往六字一作因是利往得無謝焉邵頓首與元相公書某月日通直郎殿中侍御史內供奉于邵頓首相公閣下昨外甥右威衛録事恭軍宇文寶至奉傳慰誨不忘疵賤仍及家私造化之地禮物云隔一言一盼盡為曲貸既出望外不知所酬懷仁荷德載兢載懼伏惟相公膺斯一作期夾輔閉心保乂尹正天下易哉為君虞友五臣黃師六相匡救之分心豈異乎自經艱難常處僻陋外乏長䇿內罹百殃悲生於纍心亦盡矣頃者羈齒隴上迫諸冦戎分為係虜永絶殊俗豈意朝廷勤為官之選相公垂推己之美席硯存愛風塵念舊不以䝉鄙才無可觀曽微浹年再忝持憲振拔泥滯復為人知恩深提携物無所棄進慙其往之誡退纍則哲之明倣徨失圖罔知攸效又自悲者天倫之變禍橫相次家途淪胥素業無託他鄉異縣至於流離力未集事死一作死事又無補泣血仰天復何可言所以乘流則逝尸祿茍活國步未泰斯何底寧願言掃門不可遂得伏惟相公濟代推功渴日行道方將草創天下經綸時變大啓區宇再垂衣裳頥神滌慮正在今日無以外物虧損遂為咎也御衡持政前計不迷思廟堂之當安全蒼生之始望小人之幸日月以冀然後但見鴻鵠拂摩青冥不知其極也謹附監察御史蘇端啓事以干罪貽煩黷伏增惶汗賀外甥崔相國書伏惟大方全德自中發外藴為志氣掩為事業然則阜庶生物操持化權結於衆心為日固久且大賢之出處天下之否泰也故詔下之日人人相慶又早嵗獲覩皇極綜論𤣥德志孤雲賦凄風詩伏讀纍日備見精慮之所至言理亂者多推世運於必然殊不知弛張變化存乎其人而已自古賢哲之徒或志尚不展鬱湮當世長嘆痛哭於是乎作伏惟以嘗所感慨申於盛明使三辰光潤萬方軌道實在指顧豈逃彀中且於西漢公輔言之蕭曹以清靜熙帝載良平以謨明贊王業至宣帝時魏相通故事邴吉知大體斯皆章章可言者也洎夫張蒼之律歷孫𢎞之文章韋賢之好學平當之有耻然亦號為賢相抑其文粹作又次焉至若匡張孔馬服儒衣冠被阿諛之譏不勝其任最下則陶青劉舍莊翟趙周之徒皆齷齪備位故身名偕泯夫此數子者豈不粗知君臣之道古今之變哉病於無所發明保持祿位而已有時無功可不謂大哀乎又古人有立德立功立言之訓顧惟多幸獲覽炳然之文又備承餘論有以見大君子之遣辭發慮𢎞裕溥博者矣惟德與功實在今日洗天下之耳目復萬物之全性在大人踐而行之守而終之而己不宣某再拜文苑英華卷六百六十八
