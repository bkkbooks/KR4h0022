body:
  text: 文苑英華卷六百九十五宋李昉等編直諫諫髙祖拜舞人安叱奴為散騎常侍疏一首論時政疏四首論治道疏一首唐太宗於寢殿側置太子院諫疏一首初授監察御史論奉親享廟襲封樂工等疏一首請崇節儉及制諸王疏一首諌髙祖拜舞人安叱奴為散騎常侍疏李綱臣舊唐書有謹字按周禮均工樂胥文粹作官不預文粹作厠於仕伍雖復才如子野妙等師襄皆身終子繼不易其業故魏武使禰衡擊鼓衡先解朝服露體而擊之云不敢以先王法服為伶人之衣唯唐書作雖齊髙緯封曹妙達為王授安馬駒為開府既招物議大斁彛倫有國有家者以為殷鑒方今新定天下開太平之基文粹作業起義功臣行賞未遍髙才碩學猶滯草萊而先令舞人文粹作胡授文粹作致位五品鳴玉曵組趨馳廊廡唐書作廟故非創業垂統貽則唐書作厥子孫之道也伏惟陛下聽察之前篇作臣忝周行不敢不奏文粹無此八字此篇六百二十卷重出前已削去論時政疏四首魏徵其一曰貞觀十一年先是帝作飛山宫徴上疏諫臣觀自古受圖膺運繼體守文控御英傑南面臨下皆欲配厚英華作厚仁德於天地齊髙明於日月本枝百代傳祚無窮然而克終者鮮敗亡相繼其故何哉所以求之失其道也殷鑒不逺可得而言昔在有隋統一寰宇甲兵強盛三十餘年風行萬里威動新唐書作憺殊俗一旦舉而棄之盡為他人所舊唐書政要作之有彼焬帝豈惡天下之治安不欲社稷之長久故行桀虐以就滅亡哉蓋恃其富強不虞後患驅天下以從政要作縱欲罄新唐書作役萬物以自奉採域中之子女求逺方之竒異宫宇政要作苑是飾臺榭是崇徭役無時干戈不戢外恃威重內多新唐書作行隘舊唐書作險忌讒邪者必遂舊唐要安作受其福忠正者莫保其生上下相蒙君臣道隔人不堪命率土分崩遂以四海之尊殞於匹夫之手子孫殄滅為天下之笑深可政要作可不痛矣舊唐書政要作哉聖哲乘機拯其危溺八柱傾而復正四維絶而更張逺肅邇安不踰於期月勝殘去殺無待於百年今宫觀臺榭盡居之矣珍竒異物盡收之矣姬薑淑媛盡侍於側矣四海九州盡為臣妾矣若能鑒彼之所以亡念我之所以得日慎一日雖休勿休焚鹿臺之寶衣毀阿房之廣殿懼危亡於峻宇思安處於卑宫則神化潛通無為而理政要作治德之上也若成功不毀即仍其舊除其不急損之又損雜茅茨於桂棟參玊砌於土階悅以使人不竭其力常念居之者逸作之者勞億兆悅以子來群生仰而遂性德之次也若惟聖罔念不慎厥終忘締構之艱難謂天命之可恃忽採椽之恭儉追雕牆之侈靡政要作美麗因其基以崇舊唐書政要作廣之增其舊而飾之觸類而長不思止足人不見德而勞役是聞斯為下矣譬如舊唐書政要作之負薪救火揚湯止沸以暴舊唐書政要作亂易亂新唐書作暴與亂同道莫可則也後嗣何觀夫事無可觀則人怒神怨則災害必生災害既生則禍亂必作禍亂既作而能以身名令終政要作全者鮮矣順天革命之後將隆政典作基七百之祚貽厥孫謨舊唐書作謀傳之萬世難得易失可不念哉其二曰政要是日又上疏臣聞求木之長者必固其根本欲流之逺者必浚其泉源思國之安者必積其德義源不深而望新唐書有豈字流之逺根不固而新唐書有何字求木之長德不厚而望新唐書作思國之治雖在下愚知其不可而况於明哲乎人君當神器之重居域中之大將崇極天之峻永保無疆之休不念舊唐書有於字居安思危戒奢舊唐書作貪以儉德不處其厚情不勝其欲斯亦伐根以求木茂塞源而欲流長者也凡百元首俱成舊唐書政要作成景命莫不殷憂而道著功成而德衰有善始者實繁能克終者蓋寡豈其取之易而守之難乎昔取之而有餘今守之而不足何也夫在殷憂必竭誠以待下既得其志則縱情以傲物竭誠則胡越為一體傲物則骨肉為行路雖置舊唐書作董政要作重之以嚴刑振之以威怒終茍免而不懷仁貌恭而不心服怨不在大可畏惟人載舟覆舟所宜深慎奔車朽索其可忽乎君人者誠能見可欲則思知足以自戒將有作則思知止以安人念髙危則思謙沖以舊唐政要作而自牧懼滿溢則思江海以舊唐書政要作而下百川樂盤逰則思三驅以為度憂舊唐書政要作怒懈怠則思慎始而敬終慮壅舊唐書作蔽則思虛心以納下想讒邪則思正身以詘舊唐書政要作黜惡恩所加則思無因喜以謬賞罰所及則思無因怒而濫刑總此十思𢎞兹九德簡能而任之擇善而從之則智者盡其謨舊唐書作謀勇者竭其力仁者播其惠信者效其忠文武爭馳在君舊唐書作君臣無事可以盡豫逰之樂可以養松喬之壽鳴琴垂拱不言而化何必勞神苦思代下司職役聰明之耳目虧無為之大道哉其三曰貞觀十一年五月壬申帝幸洛陽次昭仁宫多所譴責徴退上疏臣聞書曰明德慎罰惟刑之恤哉禮云為上易事為下易知則刑不煩矣上多疑則百姓惑下難知則君長勞矣夫上易事下易知君長不勞百姓不惑故君有一德臣無二心上播忠厚之誠下竭股肱之力然後太平之基不墜康哉之詠斯隆舊唐書政要作安當今道被華夷功髙宇宙無思不服無逺不臻然言尚於簡久舊唐書政要作大志在於明察刑賞之用有所未盡矣夫刑賞之本在乎揚舊唐書政要作勸善而懲惡帝王之所以與天下為畫一不以親踈貴賤而輕重者也今之刑賞未必盡然或屈伸在乎好惡輕重由乎喜怒遇喜則矜其情於法中逢怒則求其罪於事新唐書作律外所好則鑽皮出其毛羽所惡則洗垢求其瘢痕瘢痕可求則刑斯濫矣羽毛可出則賞斯謬矣刑濫則小人道長賞濫舊唐書作政要作謬則君子道消小人之惡不懲則君子之善不勸而望治安刑措非所聞也且夫暇豫清談皆敦尚於孔老威怒所至則政要作咸取新唐書作專法於申韓直道而行非無三詘舊唐書政要作黜危人自安蓋亦多矣故道德之旨未𢎞新唐書作鍥刻薄之風尚扇舊唐書政要作已扇新唐書作降夫上風政要作刻薄既扇則下生百端人競趨時憲章不一稽之王度實虧君道昔州犂上下其手楚國之法遂差新唐書作以蔽張湯輕重其心漢朝之刑以弊新唐書作謬以人臣之頗僻猶莫能申其欺罔政要作枉屈况人君之髙下將何以措其手足以睿聖之聰明無幽微而不燭豈神有所不達智有所不通哉安其所安不以恤刑為念樂其所樂遂忘先笑之變禍福相倚吉凶同域唯人所召安可不思頃者責罰稍多威怒微厲或以供帳舊唐書作給不贍或以營作差遣或以物不稱心舊唐書英華並無此二句或以人不從欲皆非致理舊唐書政要作治之所急實乃政要作為驕奢之攸漸是知責不與驕期而驕自至富不與奢期而奢自來非徒語也且我之所基舊唐書政要作代實在有隋隋氏亂亡之源聖明之所臨照以隋氏之府藏譬今日之資儲以隋氏之甲兵况當今之士馬以隋氏之户口校今時之百姓度長比舊唐書政要作計大新唐書作挈長度大曾何等級然隋氏以富強而喪敗動之也我以貧寡而安寧靜之也靜之則安動之則亂人皆知之非隱而難見也非微而難察也然鮮蹈平易之途多遵覆車之轍何哉在安不思危治不念亂存不慮亡之所致也昔隋氏之未亂自謂必無亂隋氏之未亡自謂必不亡所以甲兵屢新唐書作亟動徭役不息至于將加舊唐書作身將政要作將憂戮辱竟未悟其滅亡之所由也可不哀哉夫鑒形之美惡必就於止水鑒國新唐書作政之安危必取於亡國故詩曰殷鑒不逺在夏后之世又曰伐柯伐柯其則不逺臣願當今之動靜必思隋氏以為鑒則存亡治亂可得而知若能思其所以危則安矣思其所以亂則治矣思其所以亡則存矣存亡之所在節嗜欲以從人省畋逰之費用二字諸本作娛息靡麗之作罷不急之務慎偏聽之怒近忠厚逺便佞杜悅耳之邪説甘舊唐書作聽苦口之忠言去易進之人賤難得之貨採堯舜之誹謗追禹湯之罪已惜十家之産順百姓之心近取諸身恕以待物思勞謙以受益不自滿以招損有動則庶類以和出言則千里斯應超上德於前載樹風聲於後昆政要有此字聖哲之宏規帝王之盛業能事斯畢在乎慎守而已夫守之則易取新唐書作得之實難既能得其所以難豈不能保其所以易其或保之不固則驕奢淫佚動之也慎終如始可不勉歟易曰君子安不忘危存不忘亡治不忘亂是以身安而國家可保誠哉斯言不可以不深察也伏惟陛下欲善之志不減於昔時聞過必改少虧於曩日若能以當今之無事行疇昔之恭儉則盡善美固無得而稱焉其四曰臣聞為國之基必資於德禮君之舊唐書作子所保唯在於誠信誠信立則下無二心德禮行唐書政要作形則逺人斯格然則德禮誠信國之大政要作紀綱在於父子君臣不可斯須而廢也故孔子曰君使臣以禮臣事君以忠又曰自古皆有死人無信不立文子曰同言而信信在言前同令而行誠在令外然則言而不行言不信也令而不從令無誠也不信之言無新唐書作不誠之令為上則敗德舊唐書作國為下則危身雖在顛沛之中君子所不為也自王道休明十有新唐書作綿十餘載威加海外萬國來庭倉廩日新唐書作愈積土地日新唐書作益廣然道德未益厚新唐書作不日博仁義未益博新唐書作不日厚者何哉由乎待下之情未盡於誠信雖有善始之勤未覩克終之美故也其所由來者漸非一朝一夕之故昔貞觀之始乃聞善若驚既舊唐書作暨五六年間猶悅以從諫自兹厥後漸惡直言雖或勉強時有所容非復曩時之豁如也謇諤之士稍避龍鱗便佞之徒肆其巧辨謂同心者為朋黨謂告訐者為至公謂強直者為擅權謂忠讜者為誹謗謂之為朋黨雖終信而可疑謂之為至公雖矯偽而可怪舊唐書作無咎強直者畏擅權之議忠讜者慮誹謗之尤至於竊金舊唐書政要作斧生疑投杼致惑衆舊唐書政要作正人不得盡其言大臣莫能與之爭熒惑視聽鬱閼大猷一作道妨化損德其在兹乎舊唐書政要作無甚斯者故孔子之惡利口之覆邦家蓋為此也且君子小人貌同心異君子掩人之惡揚人之善臨難不舊唐書政要作無茍免殺身以成仁小人不恥不仁不畏不義惟利之所在危人以自安夫茍在危人則何所不至今將求致治必委之於君子事有得失或議舊唐書政要作訪之於小人其得君子也則敬而踈遇小人也必輕而狎狎則言無不盡踈則情不上舊唐書政要作或下通是則毀譽在於小人刑罰新唐書作督責加於君子實興喪所在亦安危所繫安可以不慎哉夫中智之人豈無小慧然才非經國慮不及逺雖竭力盡誠猶未免於傾敗况內懷姦利承順顔旨其為禍患不亦深乎故孔子曰君子或有不仁者焉未見小人而仁者然則君子不能無小惡惡不積無妨於正道小人或時有小善善不積不足以立忠今謂之善人矣復慮其時有不信何異夫立直木而疑其影之不直乎雖竭精神勞思慮其不可得亦已明矣夫君能盡禮臣能政要作得竭忠必有在乎舊唐書作於內外無私上下相信上不信則無以使下下不信則無以事上信之為道政要作義大矣哉故自天祐之吉無不利昔齊桓公問於管仲曰吾欲酒腐於爵肉腐於爼得無害於霸乎管仲曰此極非其善者然不無害於霸也公曰如何政要作如何而害霸乎曰不能知人害霸也知而不能用害霸也用而不能任害霸也任而不能信害霸也既信而又使小人參之害霸也晉中行穆伯攻鼓經年而不能下魏簡倫曰鼓之嗇夫簡倫知之請無疲士大夫而鼓可得穆伯不應左右曰不折一戟不傷一卒而鼓可得君奚為不取穆伯曰簡倫之為人也佞而不仁若使簡倫下之吾不可以不賞若賞之是賞佞人也佞人得志是使晉國之士捨仁而為佞雖得鼓將何用之夫穆伯列國大夫管仲霸者之佐猶能慎於信任逺避佞人也如此况乎為四海之大君應政要作􅈾千齡之上聖而可使巍巍之盛德復將有所間然乎若欲令君子小人是非不雜必懷之以德待之以信厲之以義節之以禮然後善善而惡惡審罰而明賞則小人絶其邪佞君子自強不息無為而化何逺之有善善而不能進惡惡而不能去罰不及於有罪賞不加於有功則危亡之期或未可保永錫祚胤將何望哉論治道疏臣聞君為元首臣作股肱齊契同心合而成體已成不備為未成人一作體或未備不成為人然則首雖尊髙必資手足以成體君雖明哲必資股肱以致理一有故字禮云民以君為心君以民為體心莊則體舒心肅則容敬書云元首明哉股肱良哉萬事康哉元首叢脞哉股肱惰哉萬事墮哉然則委棄股肱獨任胸臆具體成理非所聞也夫君臣相遇自古為難以石投水千載一合以卵投石無時不有其能開至公之道申天下之用內盡心膂外竭股肱和若鹽梅固同金石者非唯髙位厚秩在於禮之而已昔周文逰於鳯凰之墟襪係解顧左右莫可使結者乃自結之豈周文王之朝盡為俊乂聖明之代獨無君子哉但知與不知耳一作但禮與不禮知耳是以伊尹有莘之媵臣韓信項氏之亡命殷湯致禮定王業於南巢漢祖登壇成帝統一作功於垓下若夏桀不棄於伊尹項王垂恩於韓信寧肯敗已成之國為滅亡之虜乎又微子骨肉也受茅土於宋箕子良臣也陳洪範於周仲尼稱其仁莫有非之者禮記稱魯穆公問於子思曰為舊君反服古禮歟子思曰古之君子進人以禮退人以禮故有舊君反服之禮今之君子進人若將加諸膝退人若將墜諸淵毋為戎首不亦善乎又何反服之禮一無此二字之有齊景公問於晏子曰忠臣之事君如之何三字一作如何晏子曰有難不死出亡不送公曰列地以封之疏爵而待之有難不死出亡不送何也英華無此二字止作何謂晏子曰言而見用終身無難臣何死焉諫而見從終身不亡臣何送焉若言而不見用有難而死是妄死也諫而不見從出亡而送是詐忠也春秋左氏傳曰崔杼殺齊莊公晏子立於崔氏之門外其人曰死乎曰獨吾君也乎哉吾死也曰行乎吾罪也乎哉吾亡也故君為社稷死則死之為社稷亡則亡之若為己死而為己亡非其親昵誰敢任之門啓而入枕尸股而哭之興三踊而出孟子曰君視臣如手足臣視君如腹心君視臣如犬馬臣視君如國人君視臣如土芥臣視君如冦讎雖臣之事君無有二志至於去就之節尚緣恩於厚薄然則為人上一作君者安可以無禮於下哉竊觀在朝群臣當樞機之寄者或地鄰齊晉或業預經綸並立事立功皆一時之選處之衡軸為任重矣任之雖重信之未篤信之不篤則人或自疑人或自疑則心懷茍且心懷苟且則節義不立節義不立則名教不興名教不興而可與固二字一作立太平之基保七百之祚未之有也又國家重惜功臣不念舊惡方之前聖一無所間然但寬於大事急於小罪臨時責怒未免愛憎之心不可以為政君嚴其禁臣或犯之况上啓其源下必有甚川壅而潰其傷必多欲使凡百黎元何所措其手足此所謂君開一源下生百端百端之變無不動亂者一作無不亂禮曰愛而知其惡憎而知其善若憎而不知其善則為善者必懼愛而不知其惡則為惡者實繁詩曰君子如怒亂庶遄沮然則古人一無此字之震怒將以懲惡當一無此字今之威罰所謂長姦此非堯舜之心非禹湯之事書云撫我則后虐我則讎孫卿子曰君舟也民水也水所一作可以載舟亦所以覆舟孔子曰魚失水而死水失魚則猶為水也故堯戰戰栗栗日慎一日安可不深思之乎安可不熟慮之乎夫委大臣以大體責小臣以小事為國之常也為治之道也今委之以職則重大臣而輕小臣至於有事則信小臣而疑大臣信其所輕疑其所重將以致理一作將求致治其可得乎又政貴有恆不求屢易今或責小臣以大體或責大臣以小事小臣乘非其一作所據大臣孰得其所一作失其所守大臣或以小過獲罪小臣或以大體受罰職非其位罰非其罪欲其無私求其盡力不亦難乎小臣不可委以大事大臣不可責以小罪任以大官求其細過刀筆之吏順旨承風舞文弄法曲成其罪自陳也則以為心不伏辜不信也則以為所犯皆實進退惟谷莫能自明則茍免其禍大臣茍免通鑑作茍求免禍則譎一作讒詐萌生譎詐萌生則矯偽成俗矯偽成俗則不可以臻至理矣夫上之不信於下必以為下無可信若必下無可信則上亦有可疑矣禮云上人疑則百姓惑下難知則君長勞上下相疑則不可以言理矣夫以一介庸夫結為交友以身相許死且不踰一作渝况君臣契合實同魚水若君為堯舜則已為稷契豈有遇一事則變志見小利則易心哉此雖下之立忠未能明著亦由上懷不信待之過薄之所致也此豈君使臣以禮臣事君以忠乎以陛下之聖明以當今之功業誠能博求時俊上下同心則三皇可追而四五帝可俯而六夏殷周漢夫何足數焉一作皆貞觀政要唐太宗於寢殿側置太子院諫疏禇遂良臣聞周兩一作世問安三至必退漢儲視膳五日乃來前賢作法規模𢎞逺禮曰男子十年出就外傅出宿於外學書計也然則古之達者豈無慈心減兹私愛欲會要作思使成立凡人尚猶如此况君之太一作世子乎自當春誦夏弦親近師傅知人間之庶事識君臣之大道使翹足延首皆聆善聲若獻歲之有陽春玄天之有日月𢎞化懿德乃作元良伏惟陛下道育三才功􅊶九敘一作有新樹太子莫不欣躍一作欣欣既已廢昏立明雖稱天下瞻望而教成之道實深乖闕不離膝下常居宫內保傅之説無暢經籍之談蔑如且朋友不可以深交深交必有怨父子不可以滯愛滯愛或生愆伏願逺覽殷周近尊漢魏不可頓革事須階漸恆計旬日半遣還宫專學藝以潤身布芳聲於天下則微臣雖死猶曰生年一作皆舊唐書本傳初除監察御史論奉親享廟襲封樂工等疏馬周微臣每讀經史見前賢一作賢者忠孝之事臣雖小人竊希天道未嘗不廢卷長想思履其迹臣以不天一作幸早失父母犬馬之養已無所施一有顧字來事之可為者唯忠義而已是以徒步二千里而一有自字歸于陛下陛下不以臣愚瞽過垂齒録竊自顧瞻無階答謝輒以微軀丹欵惟陛下所擇臣伏見大安宫在宫城之西而其牆宇門闕之制方之紫極尚一無上字為卑小臣伏以東宫皇太子之宅猶處城中大安乃至尊所居反在城外雖太上皇逰心道素志在一作存清儉陛下重違慈旨愛惜人力而蕃夷朝見及四方觀聽有不足者臣願營築雉堞修起門觀一作樓務從髙顯以稱萬國之望則大孝昭乎天下矣臣又伏見或作覩明勑以二月二日幸九成宫臣竊惟太上皇春秋已髙陛下宜朝夕視膳而晨昏起居今所幸宫去宫三百餘里鑾輿動􅀈嚴蹕俄經句日非可以旦暮至也儻太上皇情或思感而欲即見陛下者將何以逮一作赴之且車駕今行本為避暑或作且車駕今兹為避暑行也然則太上皇尚留熱所而陛下自逐涼處溫凊之道臣竊未安然勑書既出業已成就願示速反之期以開衆惑臣又見詔書令宗室功臣悉就蕃國一作勳賢作鎮蕃部貽厥子孫嗣守其政非有大故無或絀一作黜免臣竊惟陛下封植之者誠愛之重之欲其胤嗣一作胤裔或作裔緒承守而與國無疆也臣以為必如詔旨者陛下宜思所以安存之富貴之何必使二字一作然則何用代官也何則以堯舜之父猶有朱均之子儻在一作有孩童嗣職萬一驕愚則兆庶被其殃而家國蒙其患一作受其敗正欲絶之也一無也字則子文之治猶在也一無也字正欲存之也一無也字則欒黶之惡已彰也一無也字與其毒害於見存之百姓則寧使割恩於已亡之一臣明矣然則向所謂愛之者乃適所以傷之也臣謂宜賦以茅土疇其户邑必有才行隨器方授則雖其翰翮非強亦可以獲免尤纍昔漢光武不任功臣以吏事所以終全其代者良得其術也願陛下深思其宜一作事使得奉大恩而子孫終其福祿也臣又聞聖人之化天下莫不以孝為本一作基故曰孝莫大於嚴父嚴父莫大於配天又曰國之大事在祀與戎孔子亦云吾不與祭如不祭是聖人之重祭祀也如此伏惟陛下踐阼以來宗廟之享未曾親事伏緣聖情獨以鑾輿一出勞費利多所以忍其孝思以便百姓遂使一代之史不書皇帝入廟之事將何以貽厥孫謨一作謀垂則來葉臣知大孝誠不在爼豆之間然則聖人之訓人固有屈已以從物一作時特願聖恩一作慈顧省愚欵十五字或作必以已先之示不忘本也臣又聞致化之道在於求賢審官為政之基唐䇿作立政之原必自一作在於揚清激濁故孔子曰唯名與器不可以假人是言慎舉之為重也臣伏見王長通白明達本自樂工輿皂雜類韋槃提斛斯正則更無他材獨解調馬縱使術踰儕輩一作等夷能有可取一作伎能有取止賜金帛以富其家豈宜列預士流超受髙爵遂使朝會之位萬國來庭騶子倡人鳴玉曵組一作履與夫朝賀君子比肩而立同坐而食臣竊恥之然成一作朝命既往縱不可追謂宜不可一無可字使在朝班預於仕伍一作位也此篇英華誤作請崇節儉及制諸王疏非是節儉諸王疏今以新唐書及文粹增入于後請崇節儉及制諸王疏臣歷觀前代自夏殷及漢氏之有天下傳祚相繼多者八百餘年少者四五百年皆為積德纍業恩結於人心豈無辟王賴前哲以免自魏晉以還降及周隋多者不過五六十年少者才二三十年而亡良由創業之君不務廣恩化當時僅能自守後無遺德可思故傳嗣之主政教少衰一夫大呼而天下土崩矣今陛下雖以大功定天下而積德日淺固當思隆一作崇禹湯文武之道廣施德化使恩有餘地為子孫立萬代之基一作階豈欲但令政教無失以持常年而已然自古明王聖主雖因人設教寬猛隨時而大要惟以節儉於身恩加於人二者是一作為務故其下愛之如父母仰之如日月敬之如神明畏之如雷霆此其所以卜祚遐長而禍亂不作也今百姓乘喪亂之後比於隋時才十分之一而供官徭役道路相繼兄去弟還首尾不絶逺者往來五六千里春秋冬夏略無休時陛下雖每有恩詔令其減省而有司作既不廢自然須人徒行文書役之如故臣每訪問四五年來百姓頗有嗟怨之言以為陛下不存養之昔唐堯茅茨土階夏禹惡衣菲食如此之事臣知不可復行於今漢文帝惜百金之費輟露臺之役集上書囊以為殿帷所幸慎夫人衣不曵地至景帝以錦繡纂組妨害女工一作紅特詔除之所以百姓安樂一作乂樂後至孝武帝雖窮奢極侈而承文景遺德故人心不動新唐書作搖向使髙祖之後即有武帝天下必不能全此於時代差近事迹可見今京師及益州諸處營造供奉器物并諸王妃公主服飾議者皆不以為儉臣聞昧旦丕顯後世猶怠作法於理一作治其弊猶亂陛下少處人間知百姓辛苦前代成敗目所親見尚猶如此而况皇太子生長深宫不更一作歷外事即萬嵗之後固聖慮所當憂也臣竊尋往代以一作已來成敗之事但有黎庶怨叛聚為盜賊其國無不即滅一作滅亡人主雖改悔未有重能安全者凡修政教當修之於可修之時若事變一起而後悔之則無益也故人主每見前代之亡則知其政教之所由喪而皆不知其身之失是知殷紂笑夏桀之亡而幽厲亦笑殷紂之滅隋焬帝大業之初又笑齊魏之失國今之視焬帝亦猶焬帝之視齊魏也故京房謂漢元帝云臣恐後之視今亦猶今之視古此言不可不誡也往者貞觀之初率土霜儉一匹絹才得一斗米而天下帖然百姓知陛下甚愛憐之故人人自安曾無謗讟自五六年來頻嵗豐稔一匹絹得粟十餘石而百姓皆以陛下不憂憐之咸有怨言又新唐書作何則今所營為者頗多不急之務故也自古以來國之興亡不由積畜多少唯在百姓苦樂且以近事驗之隋家貯洛口倉而李密因之東都積布帛而世一作王下同充據之西京府庫亦為國家之用至今未盡向使洛口東都無粟帛則世充李密未能必聚大衆但貯積者固是有國之常事要當人有餘力而後收之豈一作若人勞而強斂之更以資冦積之無益也然儉以息人貞觀之初陛下已躬一作躬已為之故今行之不難也為之一日則天下知之式歌且舞矣若人既勞矣而用之不息儻新唐書作萬一中國被水旱之災邉方有風塵之患狂狡因之以竊發則有不可測之事非徒聖躬旰食晏寢而已古語云動人以行不以言應天以實不以文以陛下之明誠欲勵精為政不煩逺采一作求上古之術但及貞觀之初則天下幸甚昔賈誼為一作謂漢文帝云可慟新唐書作痛哭及長太息者言當韓信王楚彭越王梁英布王淮南之時使文帝即天子位必不能安又言賴諸王年少傅相制之長大之後必生禍亂厯代以來皆以誼言為是臣竊觀今諸將功臣陛下所與定天下者皆仰稟成規備鷹犬之用無威略振主如韓彭之徒難駕馭者而諸王年並幼少縱其長大當陛下之日必無他心然即萬代之後不可不慮自漢晉以來亂天下者何嘗不是新唐書作在諸王皆為新唐書作由樹置失宜不預一作先為節制以至於滅亡人主豈不知其然但溺於私愛故使前車既覆而後車不改轍也今天下百姓極新唐書作尚少諸王甚多寵遇之恩有過厚者臣之愚慮一作見不唯慮其恃恩驕矜也昔魏武帝寵樹陳思王及文帝即位防守禁閉有司獄囚以先帝加恩太多故嗣主疑而畏之也此則武帝寵陳思適所以苦之也且帝子何患不富貴身食大國封戶不少好衣美食衣食之外更何所須而每年别加優賜曾無紀極俚語曰貧不學儉富不學奢言自然也今陛下以大聖創業豈惟處置見在子弟而已當制長久之法使萬世遵唐書作奉行之文苑英華卷六百九十五
