body:
  text: 文苑英華巻四百七十二宋李昉等編鐵劵文賜李納田悦王武俊等鐵劵文陸贄維興元元年嵗次甲子正月癸酉朔二日甲戌皇帝若曰咨爾某官某乙嗚呼君者所以撫人失於所撫則叛下者所以奉上乖集作失於所奉則刑詔令集作為尤各當其理德用不擾各違詔令作者違集作各乖其分亂於是生朕德薄化淺昧於君道罔知省已姑務責人是以徴師徂征連嵗靡息惟爾亦以誠志之不逹反側於集作于厥衷阻衆興戎結壘固守集作結釁拒守豈非上失集有於字所撫而下乖乖集作失於所奉歟書曰萬方有罪罪在朕躬我實不徳兆人何咎俾廢其生業離其室家䧟於集作于困窮死於鋒刃集作戰陣老疾廢養孤㷀靡依結怨蒼旻感傷和氣朕為人父母得不愧于心哉晨興以思夕惕以懼集作悼自其詔令作予嗣位迄今六載天將悔禍朕方覺寤爾亦知衆心之厭亂思所以保安叶于朕懐若應詔令作有若符契非天地合徳人神合謀將茂育羣生詔令作將止役好生則何以臻此朕是用詔令作以上順天意俯從人心滌爾疵瑕復爾爵位坦然靡阻君臣如初功載詔令作書鼎彛名藏玉府子孫代代為國勲臣河山帯礪傳祚無絶朕方布大信承天子人若食其言何以享國於戯其祗若明命詔令作其敬聼朕命用保無疆之休賜安西管内黄姓纛官鐵劵文維貞元二年嵗次景寅八月丁巳朔三日己未皇帝若曰咨爾四鎮節度管内黄姓纛官驃騎大將軍行左金吾衛大將軍員外置同正員兼試大常卿頓啜䕶波集作沈支惟乃祖乃父率集作代服聲教勤勞王家勲書鼎彛族詔令作名列于藩集作蕃下同籍爾克紹祖先之烈而重之以忠貞嗣守職官祗若朝集作教化率其種落保我邉集作疆陲丹誠向化集作風萬里如近是用稽諸令典錫以券誓集作風若金之堅永代無變子孫繼襲作我藩臣爾其欽承勿集作無替休命賜陳敬瑄太尉鐵劵文樂明龜維中和三年嵗次癸卯十月甲午朔十六日己酉皇帝賜功臣劔南西州節度副大使管内觀察處置統押近界諸蠻及西山八國雲南安撫制置指揮諸道兵馬供軍等使開府儀同三司太尉兼中書令成都尹上柱國頴川郡食邑三千户食實封四百户陳敬瑄鐡劵曰烹巨鼇者鼎大於滄海斬長鯨者劍倚於青天既立異勲勉一作克膺殊寵李晟免其十死子儀成其九功鏤以金鏞賜一作錫其鐵劵後來繼者豈在他人嵗寒知松柏之心國難見忠貞之節五山鎮地一柱擎天氣壓乾坤量含宇宙自居環衛出擁旌幢論清政而水鏡無光吐赤誠而朝霞失色手持玉節身鎮錦城扶乾綱則一作而萬國安一作齊心紐坤維則一作而百蠻遶指三川飲一作欽化一境歸仁朕以稅駕褒斜省方卭蜀匍匐而來迎鳯輦驅馳而速建龍宮百辟來朝萬方入貢夏禹塗山之㑹未盛於斯漢髙沛國之歡無以過此戮阡能卭州首望阡能疾如剪草除秀昇涪州叛校韓秀昇易若焚巢不譲武侯之勲無愧文翁之化海東獻欵雲南披誠九榖豊登三農務一作茂盛濟贍軍國拯接朝廷一作寮内竭家財外罄公帑千官感惠一國推功今則巨猾奔逃神州克復將歸上國即别成都致朕身安由卿忠藎一作力前封公爵後賜郡王詢於衆情未愜羣望今賜卿鐵劵赦其十死望㤗山而立誓指黄河以為盟山無盡時河無竭日君君臣臣父父子子永逺貴一作皆唐大詔令賜許國公韓建鐵券文崔㳙維光化元年嵗次戊午九月戊辰朔八日乙亥皇帝若曰咨爾宣力興復功臣鎮國匡國等軍節度管内觀察處置修葺宮闕同州長春宫等使開府儀同三司守太傅兼中書令興德尹使持節同州諸軍事兼同州刺史上柱國許國公食邑四千户食實封一百户韓建朕以前代功臣實重信賞至有刻於詔令作于晣鼐紀在旂常埀帯礪之言保金石之誓勲贒所付宜茂明恩况卿秉謙蹈和持重守正屬朕前嵗廵狩而乃躬親奉迎季孫之道在事君周勃之心唯安國畢力扈駕衛我出車詔令作居克奉行朝更無遺事可謂忠於社稷光映簡書旋以歸復京都葺修宮闕載𢎞舊制皆叶規程睠是殊庸實用嘉曯雖迭增崇數而未足酬功宜申誓劵之文以示旌勲之典矧夫黄河不竭青山匪窮比此賞延錫于苗裔使卿永荷禄位長受寵滎對銘鏤以同堅煥聲徽而轉美卿恕九死子孫恕二死或犯常刑所司不可加責禮命甚重徃惟欽承宜付史館頒示天下青詞季冬薦獻太清宮青詞白居易維元和二年嵗次丁亥十二月甲寅朔二十六日己卯嗣皇帝臣稽首大聖祖高上大道金闕𤣥元天皇大帝伏以今年司天臺奏正月三日祀上帝于南郊佳氣充塞四方温潤祥風㣲起廬州申連理李樹一株彰義軍節度使奏集作進白鳥一鄭滑觀察使奏瑞麥五科司天臺奏六月五日夜鎮星見河陽節度使申一作進白雀一荆南節度使申連理李樹一本山南西道觀察使申嘉𤓰一枚司天臺奏六月十三日夜老人星見河南府申芝草兩莖司天臺奏冬至日佳氣充塞瑞雪祈寒者臣嗣承丕圖肅恭寅畏祖宗垂慶嘉瑞荐臻䖍奉禎祥伏深祗惕今時惟𤣥律節及季冬仰薦明誠敬率恒典謹遣攝太尉司徒平章事杜佑薦獻以聞謹詞上元青詞吳融維光化四年嵗次辛酉正月乙酉朔十五日己亥皇帝臣稽首大聖祖高上大道金闕𤣥元天皇大帝伏以時當獻嵗節及上元爰命香火道人烟霞志士按科儀於金闕陳齋醮於道塲伏願大鼔真風潜垂道蔭俾從反正永保無虞四海九州干戈偃戢東臯南畝皆獲豐登冀與兆人同臻介福謹詞下元金籙道塲青詞張𤣥晏維乾寜二年嵗次丙辰十月戊申朔十二日己未嗣皇帝臣稽首大聖祖上大道金闕𤣥元天皇大帝伏以強名曰道逈出氤氲之表惟天為大是生恍惚之中融和氣以陶蒸藹真風而煦育况黄廷碧落集列聖之威儀絳闕丹臺聚羣仙之歩武爰啟祈恩之路寔開請福之門敢用真誠陳於下㑹今雖物無疵癘年獲豊登逺人不倦於梯航絶塞靡虞於烽燧而鯨鯢作慝蛇豕為祅塗炭黎元黷亂紀律宮朝載罹於焚毁簮𥚑仍廹於覉離敢不寤寐思愆曉夕引咎由是廣延真侶重叩𤣥闗幣帛交陳香燈僃設伏願堅覆露之德暢亭毒之恩使氛祲盡消萬彚咸㤗復安宗社大定寰區及臣眇身同霑𢎞造謹詞太清宮祈雪青詞封敖維年月日嗣皇帝臣稽首大聖祖高上大道金闕𤣥元天皇大帝伏以百榖實生靈之本萬姓為國家之基言念老農常思薄德今時雪罕降宿麥是憂同雲未施嘉榖何望臣祗應疑作膺景運亭育兆人德不動天言徒罪已粢盛慮闕於明薦災沴恐及於生靈誠竭齋莊禮䖍夙夜伏惟𤣥功不宰至道無言垂福祐於群生假膏濡之德澤謹遣尚書兵部侍郎高元裕啟告以聞謹詞祈雨青詞維年月日嗣皇帝臣稽首大聖祖高上大道金闕𤣥元天皇大帝臣猥奉顧託獲臨宇宙四海之寜晏萬物之生成必繫厥躬敢忘其道是用䖍恭大業寅畏上𤣥勵無怠無荒之憂勤期一風一雨之調順茍或愆候常多愧心今三伏之時五稼方茂稍渴膏潤未為愆陽而憂勞所牽念慮已及恭持丹懇上瀆𤣥功冀𢎞清净之源漙施霑濡之澤粢盛必遂煩燠可消將展敬於精誠俟降靈於霶霈謹遣吏部侍郎韋湛啟告以聞謹詞歎文為太平公主五郎病愈設齋歎佛文宋之問至矣哉釋迦之本願也念起於大悲業成於廣濟代俗以積迷為用有感斯通衆生以諸病作身至誠能愈我鎮國太平公主娥靈襲彩女曜聨英戒環佩於中閨邑山河於外舘位彌高而跡彌下保是洪猷身日貴而心日微由乎夙植全其忠孝頌羙於家邦宜爾子孫理歸於福壽第五子某官某才光性與慧發生知山桂含芳而逼人階蘭吐秀而驚俗頃以寒暄稍改保攝微乖留卧玳瑁之牀陪待鳯凰之宇公主上祈妙福蒙降慈恩漢賜黄金還依膝下隋珍明月再入掌中今者上報慈恩大張名供於是披甲第闢梵筵幢蓋乗空而下來龍象接武而爰集廻供絶陁之國求饌香積之宮麵為丘而蔽庭酪為沼而環砌龍王獻水噴車馬之埃塵天女㪚花綴山林之草樹無邉之施下飽於三塗普救之心傍寛於六趣伏願以斯妙福上薦聖朝應天皇帝長保金圖永臨璿極九族既睦祛其有漏之縁萬人以安不捨無生之見順天皇后慶垂椒掖德盛蘭宮國風流洽於鵲巢坤儀光賛於龍扆皇太子業躋聖敬本固元良諸王公主等擢秀本枝崇榮湯沭三槐九棘庶職群寮咸維赤縣之圖共翼青雲之紀備該空有遍燭幽明俱超觧脫之津永㧞輪回之地上元日歎道文白居易道本無象功成強名生一氣之先為萬物之母吹煦寒暑陰陽節而嵗功成輔相乾坤上下交而生物遂故能阜蕃動植啟廸雍熈邦家保安夷夏咸若今以時因集作殷獻嵗節及上元女道士某等奉為皇帝焚香行道敬修功德伏願聲聞紫極丕降𤣥休大庇群生永康四海流光垂慶億萬斯年立春日玉晨觀歎道文夫道本無為雖强名而不離乎清凈功歸不宰運陰陽而必致乎生成今四嵗環周三光燭耀勾萌盡逹閉蟄皆驚和風競發於年華𤣥造豈知其日用女道士等奉為皇帝稽首齋戒焚香莊嚴伏惟冥鑒照臨神功保衛精誠上感至道潜通高明廣被於無窮福祐庻垂於有感南山比壽将聖祚而齊隆東海量恩與天波而長濶旁沾動植漙救幽陰咸保乂寜永綏多福憲宗忌日玉晨觀歎道文清净無為之謂道是非有作之謂名道知其源名亦歸正由是群生遂性咸臻妙有之功四氣順時自契不言之信洪鑪假喻大塊無形載厚地以繁滋覆高天而悠乆伏以今月二十七日憲宗皇帝忌女道士等齋戒精修焚香䖍懇伏願追縱𤣥運息駕黄庭保聖祚於無疆降神功於有感日月所照福祐同霑慶陽節按唐㑹要武宗六月十一日生名慶陽節英華作德陽恐非玉晨觀歎道文莫高者天莫大者道天以不言而信道以不言而功𤣥闗潜契於虚無祕籙廣傳於妙有由是自我聖祖逹吾神孫㣲言載流真教不墜膏濡動植亭育生靈豈獨練氣谷神保元恬淡而已伏惟仁聖文武至神大孝皇帝陛下生知至道宿應上𤣥紹列聖之皇圖冠羣仙於紫府光承景運溥濟含靈凝旒而道用冲深端拱而𤣥風淡泊伏以今月十一日皇帝降誕之辰女道士等焚香行道敬修功德伏惟聖壽山固皇恩海深將四序而周行與三光而長燭天覆地載何得而名道䕶神扶臻乎無極玉晨觀祈雨歎道文獨孤霖茂多稼者唯雨司甘澤者在天永惟法道之言宜叶憂人之㫖今屬旱苖方瘁膏潤不霑女道士某等奉為皇帝依教發誠循儀啟願冀由衷懇仰逹上𤣥遂使觸石未周遽聞泛灑隨風而逺俄覩霶𩃱大田既詠於豐年庻品咸康於樂業同前蓋聞天下者君𢎞道在聖天既不違於有作道當㝠助於無為今屬夏景將臨春陽已亢女道士某等奉為皇帝䖍脩法事恭啟至誠庶將憫雨之心冀觧憂人之念伏願油雲㪚布膏澤逺流來觀離畢之祥已覩斯倉之兆覃此餘慶洽于可封七月十一日玉晨觀别修功德歎道文前人若乃喻指未通昧三光於黄道齊心不動披衆妙於𤣥闗嵗計方悟其有餘物理孰知其大庇今屬金行御氣張宿司辰告朔是先迎秋方始女道士某等奉為皇帝鋪陳法要啟廸真筌伏願雨潤大田雲垂多稼書稱舞羽詩詠戢戈凡當比屋之封盡沐薰絃之樂九月一日玉晨觀别修功德歎道文前人原夫襄城迷徃明牧童之可求函谷知來顯至人之所得固以窅㝠執有恍惚非無獨見且乖多岐復爽道之逺也庸可量哉今屬鴻鴈賔秋餼羊司朔女道士某等奉為皇帝存誠香火冥懇雲天希用專精黙諧禱望伏願災消中夏稔稼穡以盈箱兵息南溟鑄戈鋋而益柱然後五行皆序四維畢張歌我舜風復此周道文苑英華巻四百七十二
