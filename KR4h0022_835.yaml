body:
  text: 文苑英華卷八百三十六宋李昉等編哀冊文下中宗孝和皇帝哀冊文一首睿宗大聖真皇帝哀冊文一首𤣥宗大明皇帝哀冊文一首肅宗大宣孝皇帝哀冊文一首代宗睿文皇帝哀冊文一首順宗至德大聖大安孝皇帝哀冊文一首僖宗皇帝哀冊文一首中宗孝和皇帝哀冊文徐彥伯維景龍四年嵗次庚戌六月辛已朔二日壬午大行應天神龍皇帝崩于神龍殿殯于太極殿之西階粵景雲元年十一月二日乙酉將遷座于定陵禮也畫攢毁帟雕輼肅軔縞紼霜回丹旗雪引御穸文粹作窆臺之妙文粹大詔令作眇默背天閣之崇峻皇帝瞻在原之墜響感聯蕚之凋隂禮奠收兮泣遺迹同氣訣兮悲聖心爰命下臣式揚鴻懿咨睿烈於金牒刻明獻於玉宇其詞曰少典之子重𤣥文粹作華之孫珠聮寶系海浸昌源鳳鳥鳴國蛟龍文粹作龍蛇守門於鑠皇朕赫應成命青靄南浮彤雲北映掃刷中㝢光亨纍聖欽若應天纘戎文粹作成非前慶身佩星斗掌提曦鏡克明克睿文粹作類允武允文就之如日望之如雲聲中律吕辭含文粹作合典墳道懋登庸榮膺繼體位擁清闕業移朱邸春誦夏絃冬詩秋禮復子明辟固天攸啓鵬舉提象鸞飛作乾蘿圗已御芝璽仍傳拱默當寧賡歌撫絃堯親更睦媯德愈羶萬寶阜成四門光闢宵衣若厲道風猶尺文粹作厄野接翹車殿橫儒席留連縞宴婉奕辭容潤洽泉草文粹作魚恩周卉毳鞮譯驚輪要荒走幣削觚反朴寬刑薄稅俗富京坻人忘疵癘帝圖廣運天意難誣徛􅀈祥籙張皇瑞符仙芝抱砌神􅛋搖厨龜負綈檢麟御斗樞孝思罔極崇文粹作宗庸克賽親幸國揚式陳昭配翠輦容與霓幬暗曖蒼璧森羅明祗肅對𤣥精備典洪範盈疇將踈華蓋遙封岱丘猒紫宙之厄僻追白雲之豫遊時若慕於喪妣道空在詔令作存於委裘嗚呼哀哉惟幾在辰穆文粹作枚卜違吉仍几虛座綴衣𤣥文粹作空室景沴攝提悲纒昱詔令作翌日羣臣奉於末命天下悲乎晏出嗚呼哀哉宗伯蒞典同軌赴辰龜謀入文粹作人非兆犀鞟移輴唱二本作喝苦棁於香掖咽酸笳於曙旻彤階皛皛兮露驚月玉座微微兮花掩塵嗚呼哀哉列綺城之哀仗引滋橋之渡幰朔颷急兮御道寒愁日晦兮雲郊晚駐石馬之新塗下金天之舊坂見踈杏之源長覺深松之路逺嗚呼哀哉伊昔睿哲光謀夀宫猗那我后復幸方中委冠劔於泉穸保明靈於昊穹山有移兮海有變道無闕兮聲無窮嗚呼哀哉睿宗大聖真此葬時初諡文粹作𤣥真大聖乃天寶十三載加諡皇帝哀冊文蘇頲維開元四年大嵗文粹作嵗次丙辰六月乙已朔二十日甲子大行睿宗大聖真皇帝崩于百福殿旋殯于太極殿之西階粵十月朔某日將遷座于橋陵禮也素帟褰周青壺警節儼無聲以虛衛陳有象而成列哀子開元神武皇帝諱追攀引䌇唐大詔令作索眇劈司常悽庶物其涕迸感衆靈而影翔文粹作彰潤文粹作眷兹鴻業欽若要道爰制近臣敢揚大寶其詞曰髙祖興唐垂其耿光睿宗誕慶紹我明命明命伊何重熙纍盛耿光伊何翊善傳聖在昔分瑞爰初割二本作剖符宅殷令典居相宏圖宣哲觀藝祗庸服儒踐其成式納以嘉謨否歷終泰傾維更紐豫從代王子事周母退象藏密冲襟釋奠不為震驚自得謙受擁乃政復亨而運開文粹作權乃復亨塞而自開固推皇帝仍陟元后鳴牝搆孽紛虹肆災颷馳神武電掃姦回三讓天下再登神極順夫氓心忘我帝力鞮譯修貢親賢任職樂英已敷禮緯重飾文粹作繹宗廟率祀郊丘肇禋養而迎夏芟以祈春靜默沿道和平返淳智周翔泳功濟陶鈞知子惟明從吾所尚陋伊祁之奠詔令作翼緒追齧缺而將喪帝允執乎厥中皇可二本作遂崇於太上始受圖而觀察終脫屣以清曠齊必間館朝而别宫問安順色資孝𢎞風理極兼愛二本作受言承至公豈綴衣而慿几忽成鼎而號弓嗚呼哀哉夢年罕驗顧命是屬付神器其得所安靈心其何欲增摧絶以孺慕竟厭時以去俗萬邦赴而同軌六遂陳而帥屬外羣悲於縞素中不瘞於珠玉蜃輅迎轉龍㡛戒徂寒生紫殿曉發清都笳挽遲遲而徒靡斾旌戀戀以威紆除櫟陽之御路指橋嶽之幽途禮既獻而三徹神方寧而九虞逺奉逰冠文粹作逺逰道冠近嚴歸蹕因髙而渭川盡見慿下而秦京稍出積耘草以橫霜攢悲松以翳日嗚呼哀哉粵羲軒之建子姒兮令問傳其不已猗簡冊之尊聖真兮鴻名冠而方始然後景雲靄華露滋楊至德殷永思此天子之孝也臣何足以知之嗚呼哀哉𤣥宗大明皇帝哀冊文王縉維寶應元年嵗次壬寅建已月五日𤣥宗至道大聖大明孝皇帝崩于神龍殿旋殯于太極殿之西階粵以寶應二年三月甲辰朔十一日將遷座于泰陵禮也象物已設仙馭將飛空聞脫屣無復求衣孝孫皇帝親臨遣奠意延晷刻向池綍而涕流想山園而心惻九天兮無所一往兮何極感貽美於孫謀俾述事於祖德其詞曰天猒隋亂中原無主人歸唐德上帝是輔以聖易暴興文繼武義冠殷湯威包漢祖仰膺歷數光宅區㝢文粹作宇通用惟皇得一承帝文粹作乾嗣五赫哉厥初萬物斯覩景龍之際乾儀反坤不利王室將開禍門吕危劉氏趙啄皇孫我獨杖劔神斯文粹詔令作期武賁上排閶闔俯掃軒轅不驚宗廟大造黎元為而不有禮備尊尊乃奉睿宗爰受寶命問安視文粹作侍膳純孝至敬維城之年佐潞之政一蓍獻兆百靈翼聖躍馬絶二本作截流水不敢競潜龍變海池亦告二本作呈慶有開必先興王之盛誥曰皇帝余倦于勤往纘丕績二本作業以順兆人辭之不可其命維新體乾之大法土之均臨之以日生之以春寒暑彰信動植知仁九族既睦四門既賔天通之聖電一作雷斷之神求賢奠簴就列縉紳讜言是聽庶政必親刑措兵弭二本作戢威加德馴戎狄讋竄塞不驚塵琛賮爭入來自無垠駕鼓斥駿焚裘棄珍風雨時若京坻相因師於上古思與還淳然後制禮節焉作樂和焉東二本作北祠后土南郊上𤣥齊祭陵廟位號山川教戰講武祈農籍田冕旒問俗旌旗幸邊文物蔽地英聲動天鳳巢麟擾甘露醴泉九尾三脊朱草飛煙繽紛效祉每嵗且千道德洋溢乾坤交泰成功如何登封於岱太平如何是時無外才藝餘美帝王之最樂究天人乙夜慙對文齊日月秋風靡逮推歷正元調律平害札動雲落弦開葉碎揮琴弄二本作陋虞教歌輕沛良辰可賞聽政方退鍾鼓屢陳君臣髙㑹巍巍蕩蕩四十餘載巡省順動西南奧區命子出震繼明握圗長驅猛士纍剪封狐不失舊物言旋上都離宫就養夀酒多娛習道久矣神仙逺乎嗚呼哀哉湖上鑄鼎海中祈藥忽乘紫氣長逰碧落千門萬户告二本作若無天兮寥廓八逹九衢雖有人兮寂寞淚為雨於宸扆文粹作極哭成雷於郊郭遺轍迹而徒攀葬衣冠而何託同軌畢至初陵已開震鳳輦於仙仗降龍輴於帝臺儼二本作擬將行兮肅穆似有顧文粹作覩兮徘徊過春城兮如送望暮山兮謂來嗚呼哀哉夀元肇吉先天不違接橋山之往二本作大隧營金阜之𤣥扉擁馳道兮皆往獨宫車兮不歸原夜文粹有兮字藏晝終天文粹有兮字戢輝文始建文粹作逺極武餘英威𤣥二本作立德不朽至道惟微雖隂陽之與變化侔神聖二本作德聖兮安可希超前古以作則遺後代以垂衣嗚呼哀哉肅宗大宣孝皇帝哀冊文裴士淹維寶應元年嵗次壬寅四月庚戌朔十八日丁卯大行文明武德大聖大宣孝皇帝崩于長生殿旋殯于兩儀殿之西階粵二年三月二十七日庚午將遷座于建陵禮也燭列瑶宫一作燭映宫河低象闕簷擁霄霧庭微曙月森鷺翿以成行儼輼輬一作龍輼而將發哀子嗣皇帝諱充窮感慕劈摽傷摧奠𤣥扆而增肅瞻白雲而不回雨泗噎兮千官泣天仗搖兮萬國陪懿業方永神暉潜翳乃詔有司騰芳後裔其詞曰髙丘演慶𤣥牝開祥寶歷一作系攸重靈源自長文昭武穆纍聖重光七葉增睿一作濬時惟我皇天帝褰裳全真養正窅然姑射欽哉有命謂禹知子踵堯傳聖伊昔休應虹流電驚猗蘭養德叢桂疏榮徇齊純孝𢎞裕欽明光含玉理秀發珠衡辨一作辨日多悟朝雲更輕尊師樂業問寢揚名三善克舉萬邦以貞叶契斷金觀書群玉性與兼愛道存濡足詢事考言登庸一作應圖受籙運符提象輝同倡燭景星耀芒大風成曲戎羯緣間書稱猾夏轉斾秦川連兵朔野水靈潜衛山祗鬷嘏順時徙邑聿來岐下用剪修蛇匪勤戎馬輯寧黎庶保乂宗社赫矣天府於皇樂都瑶壇饗帝璧沼崇儒進善求瘼明刑恤辜丹巖藏銑緑浦捐珠容成啓路王母獻圖功宣祀夏道洽歌虞物莫疵癘人用昭蘇櫟陽先惠棣華增睦冠帶麟洲賔延鳥服招諫懸鼓誓師推轂禮備樂和逺安邇肅恩猶覆燾義涵亭毒露臺愛費茅宇蠲奢北薦舂寶南牧一作收若華卿雲聳蓋潏露垂葩畝秀同頴階榮指邪滌慮髙居凝神下濟逺探仙訣深入真諦穆穆頌聲溫溫愷悌榮鍾三古牢籠八裔才生之亹爰集良已之文莫繼佇襄野而來巡怨祁宫而興沴嗚呼哀哉序分𢎞璧庭臨綴衣如天落構象日徂輝棄璇㝢而奚速啓金縢而遂違鳥冊龍圖之瑞青邱丹浦之威瞻脫屣兮如在痛攀髯兮不歸巖岫晦兮愁雲積郊原空兮落景微嗚呼哀哉環􅌡縞素鞮譯凝慕龜謀協吉象耕遐赴珠玉重而不藏襲稱一作衣廉而有數靜鈎陳于塋所閉閶闔于應一作象路靡營南紀之㕓空望西陵之樹嗚呼哀哉蒼旻浩然緹律亟遷既深悲於寒霰俄隕涕於韶煙背鳳城而紆鬱援一作振蜃紼而聮翩息輿駕于懸圃聞鍾磬於廣川神理𡨕其造物皇情邈以終天嗚呼哀哉三光猶變九丹非術蛩隧蒼茫鮒隅蕭瑟度清渭而徐轉指井泉而半出薤曲嘶管以臨風松門倚巖而蔽日嗚呼哀哉式􅏡永命戒兹羣后至德神功天長地久邁千祀之騰茂居百王之冠首俾下武而欽承彰典謨而不朽嗚呼哀哉一作皆唐大詔令代宗睿文皇帝哀冊文崔祐甫維大歷十四年嵗次已未夏五月二十二日寶應元聖文武皇帝崩于大明宫蓬萊殿遷座于大內二十六日丙寅殯于太極殿之西階有司即南郊定儀上尊諡曰睿文孝武皇帝其年十月丁酉朔四日庚子將遷幸於一作于元陵禮也東方啓明繁霜猶落風物凄於宫樹號啼隘於殷幕哀子嗣皇帝諱襲縗戚若泣血漣如感備物之如在索明靈於太虛聆哀挽之急莭懼靈駕之將引捧玉斚之歔欷望龍輴而不忍恭惟大孝終揚盛一作於揚名爰命司籍光昭德聲其詞曰於休我皇長發其祥咎繇翊舜德種四方𤣥元去周闡流道光土實受命其牙則黃炎漢之後南北披壤天厭衆閠掃隋興唐有唐不曄帝命不叶豐融葳蕤盛于八葉其盛伊何聰明徇齊誕實匍匐聖敬日躋無幽不洞無逺不稽孝友濬哲聲逹羣黎天寶季嵗竟天長彗蛇騰犬瘈以螫以噬皇輿南巡帝出朔裔君父命我爰㧾六師驅駕熊羆左右蠻夷逆徒蟻聚言割其旗一鼓氷碎日未改時席卷酆邑風清洛師天開地廓萬物斯覩安輿自蜀復于中土龍躍岐山正于九五帝子之孝軼邁千古子則戴親孫能敬祖乃登儲位問安三至一有元良儀形克類繼文纂緒道格𤣥穹大明方中萬㝢發蒙豈無桀驁化而為忠豈無羿浞如燎遇蓬刑清政修􅜯邇懷柔王度如玉德音海流四靈皆擾三春洊羞方輯羣瑞登于介邱華封祝堯使聖人夀猒代何速奄捐九有天裂其髙地傾其厚嗷嗷萬姓泣慕元首創巨痛深寧丁我后嗚呼哀哉肅肅正殿自炎徂凉漏滴盡兮夏日永燭華凝兮秋夜長階有苔兮委積庭有草兮藝黃嗚呼哀哉七月之期同軌畢至市疑野筮壞疑因山開隧捨清禁而不留指平原而出次嘉德兮啓闈承天兮敞扉抵廟門兮駐嚴蹕順孝心兮傷永違嗚呼哀哉出朱雀兮度青門恨六龍之若奔傾萬邦而㑹九族送吾皇兮歸夀原風颼飀而簫鼓慘日曀昧兮郊野昏植柏兮青青彌岡兮亘􅠌俯杳杳兮重壤想森森之萬靈偶嬪嫁兮像閽寺捧厥衣兮拱下庭嗟備物之皆列奉𤣥堂兮永寧嗚呼哀哉仙馭兮何之九虞兮有期揔千官兮萬騎返城闕兮如疑功髙舜典美冠周詩於萬億載昭昭有詞嗚呼哀哉順宗至德大聖大安孝皇帝哀冊文趙宗儒維元和元年嵗次丙戌正月一日丙寅朔十九日甲申大行太上皇崩于興慶宫之咸寧殿旋殯于大內太極殿之西階粵以其年七月壬申朔十一日壬午將遷座于豐陵禮也龍輼將進魚帷已拂庭引廞儀衢陳備物哀子嗣皇帝諱孝思罔極昭感人神痛天儀之永閟攀德音而靡聞盡哀誠於祖奠徹永慕於皓旻欽惟宸範冝光典冊乃詔魯臣纘揚聖績其詞曰太陽麗天朗曜清懸元后統位至化光被洪惟我唐紹興哲王德宣風土法化乾綱為政本仁寶系攸長積習和氣變為禎祥矩範相纘巍巍煌煌十葉丕慶膺兹駿命禀乎聰明生知孝敬秉文成訓惟睿作聖祚歷攸歸天保斯定厥初錫壤啓彼維城及升上嗣萬邦以貞道邁儲訓業茂繼明揔于至妙御乎至精天休廣運播茲清問緯武經文金鏗玉振不絶馳道有過兹慎莫見於微曷窺其朕六律諧度四時齊信庠筵齒胄望苑招賢學閫奧海詞峯峻天深工八體尤洞三𤣥秉志樂善鋭思討研敬老尊道優游文囿至賾必精微言咸究不習而知莫非天授建中季祀邦都盜起皇輿出狩幸於郊壘逆祲晝霾衝發如燬扈蹕之辰從曰撫軍每躬誓衆能感師人竟掃凶孽於昭大勳惟謀靜難惟孝安親出震一作鎮非御圖如運璿樞慮𢎞拯物情窮一作殷泣辜深仁降感至澤旁敷洋溢汪濊格于天區寬刑恤隱省賦蠲逋斥絶竒貢歸還戎一作戌俘出中宫之音妓愍戎塞之勤夫有命焚鴆永光典謨𤣥風大扇庶類闕愈疾瘵皆愈荑蕤發枯理臻至道我得𤣥珠垂裳負扆懷兹寅畏美利天下雲行雨施人自遷善時稱不諱覆育之恩無不茂遂含靈逢幸澡濯聖政泰元降祉媪神薦慶猛戲一作獸皆仁翾昆遂性憬夷慕化向風翹聽八表無闕一時之盛方播金石流于舞詠爰降冲志稱乎倦勤褰裳釋位思保怡神惟聖禪聖光于君臨傳萬葉之丕籍浹四海之歡心付託之際人祗感深棄代昌期興運本枝遇乾坤之交泰見堯舜之同時尊名崇於聖夀至道體於希夷嗣皇帝闕德永裔垂則資敬問安乾乾翼翼一人事親化行邦國冲舉何早栖靈物表聖慕極於充窮人悲集於荼蓼嗚呼哀哉葆翿儼陳招搖初轉背紫禁而歸夀陵出青門而臨下一作上苑金鼓聲兮二儀震煙雲慘而百里逺寶馬局一作局或作蹢步於逶遲縞士揚音於楚挽嗚呼哀哉瞻彼重峯中起靈宫衆山朝衛鬱鬱崇崇積凝巖之崇靄聚浩野之悲風睇長天而怨不極指流水而恨無窮嗚呼哀哉萬方臣子心崩以摧㑹七月之畢至望九疑而增哀攀龍髯而何及泣鸞輅之空回嗚呼哀哉崇兹嚴寢邈矣終天獸方護闕鳥亦耘田閉虛一作靈儀於宸宇響夜漏於青川嗚呼哀哉五雲之上六龍以一作已飛難攀真駕空覩遊衣寥廓一生曷其一作期有歸惟英謨與睿範傳萬代之洪徽嗚呼哀哉一作皆唐大詔令僖宗皇帝哀冊文樂朋龜唐㑹要作孔緯維文德元年嵗次戊申十月乙丑朔二十七日辛卯僖宗皇帝將遷于靖陵禮也羽衛既整笳簫畢陳感切羣品哀慟八神孝弟嗣皇帝臣國體情重天倫痛深範規唐大詔令作規範鴻烈想像徽音舉觴奠以頓首援哀冊以寫心詞曰天寶生聖聖必為君銀河色變玉清氣分祥圖煥炳瑞景絪緼重瞳舜目八彩堯雲克明克類乃武乃文是超東户宜繼南薰乃平萬方乃登四海墜典必舉舊章無改威儀穆穆多士藹藹聲冠令王化冥真宰東漸漲溟西被流沙徒施尉候匪間幽遐書文車軌範為一家貫胸魋髻慕我諸華既洽無為益彰在宥踈網雖設吞舟是漏微火不防燎原孰救四極鰲傾兩曜麟鬬爞爞湯旱湯湯堯水火鑠金流陵移山徙咨嗟所疑作祈祝隘溢啚史莫咎人謀難窮天理漢后三七冥運則然秦都百二巨防虛傳風排月陳彗掩星躔亶去岐山蒲遊崑嶽于槖于囊為猿為鶴書藏稽穴琴捐洞壑沉吟往事追想前作爰乘天駟爰幸井絡澄徹錦江峥嶸劔閣皇天震怒列藩㑹盟妖氣一蕩駭浪徐清遂復中夏言歸上京兒童躍舞父老歡迎寢殿未安僞詔令作為孽為害紏率姦人隱藏無賴洋洋漢源耀耀芝蓋爰警爰蹕乃朝乃㑹僣逆既顛鑾輅言旋魯戈回日媧石補天方覩萬物方永億年遽云厭代俄乃上仙嗚呼哀哉帝鄉兮莫追天路兮何之龍馭飄兮弓劔在雀臺暮兮歌管悲嗚呼哀哉顧惟幼冲祗紹明聖捧秦民之誓詞䖍霸陵之遺令載深號咽敢云稱詠望松闕兮杳冥撫棣蕚兮精誠念烏兔之奔邁仰牛斗之縱橫播芳塵於簡冊託凄恨於銘詔令作旒旌嗚呼哀哉文苑英華卷八百三十六
