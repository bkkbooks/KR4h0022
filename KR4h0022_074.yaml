body:
  text: 文苑英華卷七十四宋李昉等編樂四君臣相遇樂賦一首獻凱樂賦一首霓裳羽衣曲賦三首功成作樂賦一首作樂崇德賦一首律和聲賦一首奉制試樂為御賦一首大合樂賦一首君臣相遇樂賦并序韶以聖作物覩聞忘味為韻潘炎繼天者君也戴天者臣也下之事上作股肱耳目上之任下敷心腹腎腸甚矣哉君之難臣之不易也今聖上髙九皇之道賢臣合一德之義風雲玄感魚水冥符作樂崇德於是乎在詩有六義請賦歌之曰於赫我皇受天明命平六府和八政天合德日躋聖神生甫而山出雲在玉衡而照金鏡考金石以和樂美鹽梅之克正超百王之至理冠六代之尤盛至矣哉鴻鈞之代何物不樂仰乾坤之德知樂之所由興觀君臣之和知樂之所由作在宇宙而皆滿鼓隂陽而合漠且宫為君商為臣其德斯漙疑作溥羽為物徵為事其宜咸若諧宰相之燮理象天子之經略可以頌猗那可以美於鑠正南面陳黼黻于以紀聲眀于以展文物進旅退旅撞鐘考鼓四方皆聞萬物咸覩事無事明主之衣已垂為無為大臣之衮何補雲干吕而風入律進成規兮退成矩無不幬也象乎三天無不載也均乎九土小仲尼之在齊狹季札之觀魯惟太平之和樂按前史之未聞不殊東户之代何謝南風之薰逺無攜而邇不逼夔為臣而堯為君肅雍和鳴越詩人之作發揚蹈厲薄武王之勳節有序聲成文豈徒以諧鼓舞蓋所以調氤氲允所謂奏大音兮當聖朝合六英兮和九韶陳威儀之穆穆表至德之昭昭奏之以人奚異洞庭之響莫匪爾極何必康衢之謡一屈一伸下兢上讓或右文而左武或先吁而後唱端拱者上帝之君賡歌者濟時之相天化優洽淳風溥暢元元本本形難為狀山弇州之北邈矣可逰汾水之陽杳然自喪所以表大道之理豈徒知皇帝之貴徐則文足昭疾則武足畏俯仰之際見旒扆之情綴兆之間知鼎鼐之味不聞於柏皇栗陸何有於殷周漢魏敢獻幽蘭之曲希從拔茅之彚獻凱樂賦以獻兹大功陳樂于祖為韻髙郢愷樂象功曲一作功成斯獻既宣威而是奏亦飾喜而攸建播師律於六律寰海用寧揚軍聲於五聲華夷知勸原夫飲至云畢告捷在兹陳簨簴之列歌杕杜之詩天地同和盡樂止戈之武生靈咸若俱歡反斾之師觀其鐘鼓克諧羽旄繁會伊德音所發實神功是賴粗而厲彰乎樂在其中感而通俾夫聲聞於外回一作行八風以柔服叶七德而保大鏗鏘既薦乎成文條暢有符於交泰若乃昭聲教定武功肅軍容於清廟和樂節於皇風奏在偃旗之時寧惟三捷獻於歸馬之日何愧一戎於是洪稜奮盛禮陳感怒聲而色作駭壯觀而氣振且流歡於逺邇乃昭慶於神人輝德是資克戒熊羆之士審音斯取不忘將帥之臣則知伐叛既在乎師獻功必資于樂綴兆若習於部伍進退如分其犄角矧乎侁侁之功斯立鏘鏘之韻相符始理心而啓聖終盈耳以為娛彼周伐玁狁漢征單于皆窮欲而黷武故人殘而力無未若我配盛德永維圖將使自東自西聆至音而斯為盛矣盡善盡美欣玄德而不亦樂乎既而一人有作萬物皆覩掩軒后之咸池陋周王之大武播丕績於宫徵獻盛樂于宗祖客有擊拊而歌聖功願比身於率舞霓裳羽衣曲賦任用韻沈郎儒有恱聲教以自朂覩至樂於實録如玄宗之聖代制霓裳之麗曲豈惟象德以飾喜將以變風而易俗原夫鼎湖道洽薰絃思深惡繁聲以惑志思雅樂以理心調乎琴瑟之間無非故曲奏自雲韶之下盡是凡音乃制神仙之妙響是知鄭衛之難侵與鈞天之濳契冀瑤池之可尋時也廷臣並觀樂器斯設絃匏由是而居次簫管因之而在列假宫商之具舉成曲度之妙絶變虛徐之歌態始訝遏雲振飄颻之舞容忽驚回雪既應絃而合雅亦投袂而赴節已而樂自宸慮備于太常首瓊殿之法曲改梨園之樂章配八佾以稱美旌九功而無荒盡文物之全盛致衆庶之歡康是知和平有因雅正無比既容與而在目復周旋而盈耳融融然節奏合度傞傞然周旋有旨逸調奏兮既徹嘉名播兮未巳今皇帝奕葉繼代明德是資開元之聖運復啓羽衣之餘響寧遺觀兩階之舞干既柔殊俗覩二清之仙樂復播眀時下臣就列以貢賦喜聞韶而在兹第二失名霓裳綽約兮羽衣蹁躚髙舞妙曲兮似於群仙長袖若緩而若急雅音或斷而或連想奏禁城之裏如聞玉皇之前迎拍動容縹眇而羅衣曳霧含霜吐曲響亮而德音徹天止有餘態動無遺妍昔開元皇帝以海內清平天下豐足思紫府瑶池之樂制霓裳羽衣之曲夭夭而花一作仙貌呈妍冉冉而雲鬟垂緑金石鏗鏘而不雜絲竹要妙而相續觀夫降輦路臨廣場被羽衣披霓裳始逶迤而並進終宛轉以成行舞隨節以袖急歌和氣而韻長退若遊龍之乍婉進如驚鴻之欲翔趨合規矩步中圓方想其奏也示安寧尚敦朴眀樂之雅正辨樂之清濁雅聲發乎宫商清音發乎徴角似到蓬萊之殿見舞仙童如升太一之宫忽聞帝樂爾乃若止若行或竦或傾進退合度俯仰隨一作應聲聽之而雅正斯在聞之而姦邪不生天地為之交泰日月為之貞明今我皇紹唐堯之業繼聖祖之德制禮作樂而和兆人端拱垂衣而朝萬國於是陳廣樂宴群臣鄭衛之聲是逺神仙之曲是親雅音奏而合律妙樂作而入神變態而波回風轉顧步而雲飛霞新已矣哉想曲罷而舞歇當皇州而正春第三陳嘏我玄宗心崇至道化叶無為制神仙之妙曲作歌舞之新規被以衣裳盡法上清之物序其行綴乃從中禁而施原夫采金石之清音象蓬壺之勝槩俾樂工以交泰儼彩童而相對漓灑合節初聞六律之和搖曳動容宛似群仙之態爾其絳節回互霞袂飄揚或眄盼以不動或輕盈而欲翔八風韻肅清音思長引洞雲於丹墀之下颯天風於紫殿之旁懿乎樂洽人和曲含仙意雜絃管之繁節淡君臣之玄思清凄滿聽無非沖漠之音颯沓盈庭盡是雲霄之事吾君所以凝清慮慕玄風無更舊曲用纂成功既心將道合乃樂與仙同恱康平於有截延聖夀於無窮美矣哉調則沖虛音惟雅正于以臻逍遙之境于以暢恬和之性遂使俗以廉平人無紛競見天地之欣合致朝廷之清淨小臣抃而歌曰聖功成兮至樂修大道叶兮皇風流願揣侔於竹帛贊玄化於鴻休功成作樂賦李子卿夫九功不成八音不會所以功成作樂乃知樂之為大上帝以亭育道周故鈞天殷勤軒轅以創業功成故雲門砰礚不才狂智之士敢議聖唐之樂我髙祖神堯皇帝厯數在躬鈞樞初握撥亂返正戮諸夏之鯨鯢枯楊生荑掃中原之霜雹太宗以電擊肅慎洗白刃於遼水髙宗以風行營丘揚青煙於太嶽二宗一祖功髙道邈我開元神武皇帝夷內難纂前緒皇綱弛而更張帝典墜而還舉從萬人之後疑欲安一物之失所頃年祀后土夜吐神光中嵗燎皇天晝聞山語曠綿古而未覿非軒頊而誰與宜樂功成當崇簨簴貞觀草創已模五莖六英開元增修更叶黃鍾大吕命夔典事大制宫懸鳴絲則文動奏金則武宣羽毛含其春露干戚耀其秋天慶雲既同於舜日大風無異於漢年於是八音具舉六樂斯備工無奪倫守不假器伏羲之瑟琴有序女媧之笙簧畢萃乘逸韻於伯牙得遺音於師摰窮搏拊之深術盡戛擊之幽致動角則寒谷花眀叩商則春林葉墜聲無誤曲周郎之顧何施調有雅音季子之聽應異初舞而魚躍龍騰終曲而鶴翔鳳至誠可以克諧神人交暢天地者矣且述者彰於有聖作者表於有功徴乎正始繫彼國風聲邪則道澆俗弊調雅則人和年豐當今八風通六律同其音正其氣雄文昭德而那對武盡美而未工聆響皆清比無聲而無臭聞風自恱何自西而自東誠宜播在金石永永無窮有龎眉垂白之老擊壤而歌曰功成作樂兮帝力則那樂正崇德兮雅頌則多雲門之典兮大吕之歌金石節奏兮絲竹駢羅天地已正兮神人以和兩階舞羽兮三邉止戈擊壤鼓腹兮不識其他客有獻成功之頌九重深兮其若何作樂崇德賦以王者順動殷薦趨時為韻失名我皇以合天為德神化為勳鄙銘功於彛器思播德於樂文由是播大章大夏表克長克君美韶者舜慙濩惟殷未足方其至美而且讓其樂云於是俗泰時康近服逺信聲諧六律事從百順樂府爰闢宫懸始震樹干羽而駢羅列鏞鼓而充牣八佾之疾徐無失九成之洪殺克慎惉滯不生子諒咸進洋洋玄化流於管磬之中泱泱大風發於絲竹之韻觀夫崇德之祭也郊上帝祀方祇配祖列位崇壇奉犧六代眀備千官肅祗殷薦咸若嘉肴孔時聲音上聞同韶之盡美戩穀下降知神之格思于時曙色初分祥風微扇肅肅嚴配隂隂嘉薦聲眀動于皇天文物驚於赤縣至矣哉德不崇無以表金石之娛樂不作無以表天地之符樂作而萬方草偃德表而八裔風趨昔先代之薦也或中和罔紀鏗鏘罔假徒載考而載擊非大者而逺者孰若奮至聖之光薦眀德之香陋咸池於堯帝笑舞象於周王秦穆之鈞天逺設軒皇之廣樂空張一作章聖上猶兢自持非禮勿動鄭衛斯斥溺音是恐客有聞至德之音知我皇之所以垂拱律和聲賦以見象聲律以和萬方為韻歐陽詹詠聲周兮律聲遍人心厚兮國風變伊在堯之既聞我得夔而又見哀思慮始安和道性宗伯官也擇人乎有才正始化焉選音於無象綴咸池之雅韻去桑間之末響圖風普以雨周算天長而地廣律則以宫擊徵詠則從濁揚清且懲流而反正常誡險以歸平若近若逺非幽非眀類無臭等無聲俟信矣惟時與四時之德合一作洽純如並奏二字一作合莫彌六合以文成善詠者身應聲者律會髙低以齊舉偕疾徐而並出迹不得尋功如何述為災為眚曽莫奉於淫君調陽序隂屢見資乎聖日故得之者體員御方失之者亡禋絶祀比屋可戮桀紂罔測其所由率土可封堯舜固知其所以不然者移風之言曷謂易俗之訓則那我所以清六管順賡歌載唱載吹匪塤篪之獨叶一張一弛豈琴瑟之空和八紘有截四海無波物阜人蕃雖已歸乎一作之至德鳳來獸舞蓋於斯而靡他其理微其用逺論有助也侔大君之得一考無情焉同八風之吹萬可謂我詠斯暢我律斯臧發揚六義一作氣孕育群方處植者以之而茂實含識者於焉而夀昌彼離連與栗陸復何道而稱皇凡一作皆集本奉制試樂為御賦以和樂行道之本為韻元稹臣伏奉庚寅之詔曰天子以樂為御其義則那臣以為引重任者無御不可播盛德者非樂而何蟠乎地而極乎天周流既超于馬力發乎邇而應乎逺馳聲亦倍於鑾和喻之為至此實居多大道既夷則舞行象成於倒載小戎或駕則琴音決勝於驟歌故聖王取彼歡然方諸沃若制其節奏戒乎行作聽祈招之什冀絶迹於覆車賦盤逰之詞俾慮危於朽索是以南薰馳而虞德盛北里騁而殷道惡控海內當並騖於勛華執人柄豈爭功於良樂斯御也動無險阻發自和平周旋罔害歡愛則行止之而優遊靈府推之而浹洽寰瀛非勞轅軛但布莖英陋乎足迹運以精誠爾或馳驅難期於無災無害我之步驟乃在於大鳴小鳴故曰得禽而詭遇不如率獸以仁聲且跋涉者疲於山川滌蕩者格乎穹昊慕六律而百蠻群至錫有功而諸侯軌道豈出户庭非専擊考乘六氣之變哂六轡之徒施鼓八風而行知八駿之非寶於是屏造父命后夔或無聲而至矣或先進以導之豈獨周域中而利其銜䇿亦將肥天下而浹乎骨肌若此則宇宙蓋猶乎一馬牽制盡在於四維雖質文更變而公共操持莫不得之者昌失之者損俗化清而鞭朴廢和順積而車書混故臣稹前跪而言曰引重任者御為之先播盛德者樂為之本伏惟皇帝陛下推是心而居其奧臣徒欲貢所聞而安敢窺其閫大合樂賦以王者之政備于樂聲為韻失名樂者制也所以道天和全人性故作之以崇德審之以知政王者敬其事而闡其道順其時而行其令逮夫季春屆期乃命有司且曰群萌達矣播樂安之重以國經不可闕躬理必以時訂一作將齊度於節奏被選樂於聲詩撰乃吉日總於樂師是用資於誨爾亦無忝於命夔由是司儀辨等庶工守位備絃管之聲陳匏竹之器柷敔邐迤而就列簨簴嶙峋而居次克展禮容而告樂備天子於是率九卿暨三事必虔心而有待俾陪扈而斯致既親覩於宫懸又何假以庭試若乃曲度是并不可殫名雜以韶濩間以英莖追宣尼之前聞是能忘味念師乙之舊説各辨遺聲考彼廢興存乎清濁安以樂且知治世之音哀以思不雜異方之樂類飛聲於垂仁等潤物於流渥足使魏文侯之卧聽已悟前非吳季子之備觀難施先覺既盡美矣又何加乎諒從律而罔惑將克諧而不渝必在聽和知其樂也泄泄是惟反朴變其風也于于具舉不患乎聲希統同寧貴於和寡奚必饗鈞天之靈貺而有殊焉想洞庭之異音更思古者誠夫天祚我皇恩歷遐昌掩邃古之嘉樂軼三代之盛王竊賀聲眀之巨麗敢聨雅頌之遺章文苑英華卷七十四
