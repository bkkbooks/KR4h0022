body:
  text: 文苑英華卷八百四十宋李昉等編諡議上此下二卷英華所編失年代先後今正之德宗諡議一首敬宗諡議一首宣宗諡議一首懿宗先太后諡議一首駁工部尚書宋慶禮諡議一首駁大師燕國公張説諡議一首御史中丞盧奕諡議一首涼州大都督郭知運諡議三首故太保丞相贈太師苖晉卿諡議一首江陵尹御史大夫吕諲諡議三首駁司徒楊綰諡議二首常州刺史獨孤及諡議一首贈司空李揆諡議一首德宗諡議許孟容皇莫大夫羲軒帝莫加于唐虞姒氏商鎬亦續憲度咸紀名諡以揚昭光徽儒臣之議所以莭一惠也發揮茂耀如揭日月伏惟大行皇帝文思濬哲天縱神授大明繼聖大孝尊親服道稽古洗心藏密巍巍易簡赫赫功造嚴祖宗而上下昭􅖍仁億兆而飛沉表靈始者蘇寇殘魂戎旌未偃方由雍邸出揔虞師刷讐耻而戴君父起雍城而升少海元良有開歷數誕膺同殷宗而心在諒隂位一作立漢制而禮從權令然後諏咨對越端拱而理時丁祲沴盜起泚闕宸算獨復雲雷駿奔浹旬底定鯨燎殱洗反已哀痛大猷彌尊版泉威武止殺弔人之志也金方朔陲獫狁昆夷趑趄獷悍不敢不率丹穴南裔扶桑東極自古未化占風而至鏡照廣及無思不服之德也大本逹道是為中和鼓而舞之名我至樂以變繁淫以貞神人奉聖順聖元侯繼獻九成八佾聖作明述垂衣脫劔欣合猗那之奏也觀文化成匠物研精四始六義動經風雅洪音巨麗焜耀皎繹立言垂訓丹書玄鳥之作也蠲痾保全夀天之門方疏溥錫目之廣利札瘥不聞長養推仁施齊天地如保赤子之誠也教由德禮人乃耻格古作訓夏我針政刑載𢎞哀敬用息刀鋸利見大人修本愧心之旨也躬信厚而偷薄以革體清明而貪叨以懲納匪躬之直無毁校防川之誤推輔理之功有輻湊並進之勤泥金方草仙鼎忽成汗漫無從希夷永閟哀同軌之將會仰鴻名之可易鋪衍至迹錫乎無窮謹按經義參諸諡法曰物妙無方之謂神保大定功之謂武尊仁安義之謂孝經天緯地之謂文大行皇帝變化無窮樞衡在握神莫過焉金湯善師豺豕擾馴武莫盛焉闕焯王度煥乎黼藻文莫逾焉考墳史而徴德實請上尊諡曰神武孝文皇帝廟號德宗謹議敬宗諡議賈餗議曰定尊號考列聖終古之重事有司冝用大者逺者上質百王之明烈下開千載之成法參天人之意極臣下之誠酌而舉之以正大諡故稱天以誄大莫加焉微臣得議公莫至焉所謂大者逺者蓋揔夫一朝之治化四海之惠澤夷夏之率職元元之受賜皇明而疑臨之逺近睿斷所繫之巨小何如耳其他茍不足以升降盛德者固得略而不論伏惟大行皇帝以英睿之資紹膺丕歷啓皇輝於磐石浴聖德於少海每欽承册命天下感悅既即尊位孝思踰顯列聖之道率禮一作履不違禮行乎郊禋敬逹乎宗廟富四海以致養榮兩宫以問安推恩廣愛纍霈鴻渥發號施惠洽於百靈而又天資嚴正睿德沉毅時海內承憲宗穆宗威靈德澤之厚朝野無事生人休息初臨大寶委政宰庭春秋至富而逺蓄剛辨既閲庶務四聰益逹英斷自己任賢不疑故卒能光啓誠明載安天下橫議或熾聖𠂻愈堅忠勳內外叶贊雄略於是舉兵食之大計示經營乎四方而不庭之藩首自夷殄礪忠奮節視師一作待沖於朝承風嚮化􅜯邇聳動夫不怒而威不戰而勝王者之武也推是大旨引而伸之則未形之用可見矣惜乎號未光乎天地澤未浸乎四海而變生非慮遐抱天關生靈之惋憤其可既乎七月將至同軌既集臣謹上稽國典傍考物情約以經義合諸諡法表功莭惠庶叶大中書曰惟􅌖作聖夫以濬哲之材繼聖明之業而祖宗成式修舉罔墜禮百神而親九族尊儒術而容諫諍鋪鴻闡號聖德彰明非睿而何諡法威強獻德曰武制勝朝堂之上而威稜逺馭不俟車甲非武而何昔漢昭帝之所以為昭知臣而諡法亦曰明德有功曰昭大行皇帝初雖謙讓然終任其剛斷以顯明德非昭而何夫愍者臣下追惋之誠所深切者也諡法在國逢難曰愍聖朝既討讐戡亂明告四方有司所宜率億兆之心極君親之義薦誠隆一作旌感非愍而何諡法慈惠愛親叶時肇享皆曰孝孚愛敬於率土刑家邦之孝理躬親嚴配之典奔走職來之助廣慈至德非孝而何傳曰臨之以莊則敬又記曰莊敬則嚴威擬盛烈之形容參歷古之訓典謹上尊諡曰睿武昭愍孝皇帝廟號曰敬宗謹議宣宗諡議蘇滌議曰伏以皇天平分盛王全用施雷雨之廣澤則庶物生成務恩威之至仁則四海亭育遂使含靈受泰觸類知懷美諡大名固當稱謂伏惟大行皇帝爰自盤維膺兹九五行越今古仁被黔黎孝惟生知略不代出以天下為己任視宇內於掌中坐朝而不問風霜彌亂而不吝府帑動惟師古慮必歸周聞善若驚去疾務盡前王之美事列聖之令典必擴而行之加以講信修睦任賢興能思念勳庸則發凌煙之彩繪敦序友于則置雍和之宴錫俯閲才彥則命法官諫官之次對愛憫生育則禁三月五月之採捕一物之不得其宜納隍在慮四方之稍有未泰降食為心命將則千里坐知指縱詔令作蹤則三邉克定是以人並為闕物得自安加以西平羌戎南殄蠻寇三州七關之地坦然無虞四鎮際海之毗晏然自靜然後賑廪恤人蠲農命使逺無不肅邇無不安姦宄戢心權豪屏息京輦絶桴鼓之響邉陲無𤇺爟之虞可謂超三躋五度契踰繩者矣故有識曰佇其云亭齊人已臻於仁夀不享堯運不升軒雲豈獨唐俗有喪考之悲杞人懷崩天之怨而已謹按諡法敬祀享禮曰聖闢土斥境曰武聰明睿知曰獻經天緯地曰文慈惠愛親曰孝先皇帝肅祗禋祀非禮不行得不謂之聖乎收復舊疆誅鋤梗驁得不謂之武乎好文樂賢興善不倦得不謂之獻乎虔奉天道鋭意典法得不謂之文乎五十而慕問安不懈得不謂之孝乎謹上尊諡曰聖武獻文孝皇帝廟號宣宗謹議懿宗先太后諡議杜宣猷議曰臣聞慶都誕堯唐風稱盛塗山育啓夏道克昌坤德既刑於邦家帝籙方傳於悠久况母儀夙著壼教自髙夢日昭其休祥俔天表其鴻慶晦耀未兆逢時乃彰殊榮不在於生前縟禮必行於身後詳觀國史逖聽皇王步驟以來其道一貫伏惟先太后應二儀而作合齊兩耀而降祥派流弄印之榮道叶握圖之聖柔明初進慈儉用光蘋蘩遵助祭之儀紘綖展親蠶之禮四德之姿始耀六宫之望攸歸服浣濯而自修抑華侈而不御大行皇帝道資內助禮冠中闈越辭輦之遵聞體釐􅑙之盛則二河之族難並五麓之慶方遙進賢才而益恭辭進封而奪志一作辭封拜而難奪是子一人而不享其福母四海而不居其尊行成楷模言著針誡名器尚虛於椒掖輝華俄缺於桂輪全德則崇備物猶爽當海晏河清之日屬賔天上漢之朝一作期故劔軫皇情之深新阡赴丹禁之慟於是痛環珮之絶響感詩禮之無聞爰詔近臣俾詠明淑神算一作筆是添句用寫悲情豈八字之能倫與三光而齊朗歎纒綿悽愴之痛陋無存悼亡之詞天文照臨哀榮兼極其後必大倚伏有徵皇上繼明之初遽思顧復遂發宫女副以內臣恭告薦之誠度陵寢之制實遵近禮即兆為山改馬鬛之形就鮒隅之式璇宫對立蘭殿煥開想像如覆於玉衣肹蠁疑遊於金屋上仙之日都人不簮於奈花追榮之辰國風空賦於荇菜昔處虞嬪之列今當文母之崇體內範而素深因子貴而昭慶秦原松檟佳氣久凝漢后禕䄖盛禮俄及道光前古德冠後宫發睿感於賜衣軫孝思於遺鏡遂揚翟黻一作䒥之禮以慰昭靈之慈謹按易曰元者善之長諡法曰宣慈惠和曰元又曰明德有功曰昭伏以先太后待年之初已標仁懿之則儷極之後益彰柔煦之風得不謂宣慈惠和乎輔佐昌期聿倄隂教克生聖嗣光啓中興得不謂明德有功乎請上尊諡曰元昭皇太后謹議一作皆唐大詔令駁工部尚書宋慶禮諡議張九齡開元中通會典要作開元七年太常博士張升諡贈工部尚書宋通典作宗慶禮曰専議云太剛則折至察無徒有事東北所亡萬計所謂害於家凶於國諡法曰二本作案諡法好功自是曰専禮部貟外郎張九齡駁之議二本無此字曰營州鎮彼戎夷扼喉斷舌二本作臂逆則制其死命順則為其生通典作主人是稱樂都其來尚矣尋罷海運克廣嵗儲邊亭晏然河朔無擾與夫興師之費轉輸之勞較其優劣孰為利害而云所亡萬計一何謬哉安有踐其迹以制實貶其諡以徇虛採會要作乘慮始之二本作以謗聲忘經逺之權利義非得所孰謂其可請以所議更下太常庶表行之迹可尋而易名之典不墜也謹議後諡曰敬駁太師燕國公張説諡議太常寺諡為文貞伯成駮之楊伯成議曰諡者德之表行之迹將以激礪風俗檢束名教固無虛譽通典作稱是尊要會作存實録準張説罷相制云不書二本作肅細微之人頗采周慎之旨又致仕制云行虧半古防闕周身未免瓜李之嫌而喧會要作喧衆多之口且玉之有瑕尚可磨也人之斯玷焉可逭焉通典作焉得逭諸諡曰文貞何成沮勸請下太常更據行事定議謹議御史中丞盧奕諡議獨孤及時任太常博士盧奕剛毅而舊唐書會要集本並作朴忠直方而清勵精吏事所居可紀天寶十四載洛陽覆沒于時東都集作周舊唐書會要作京人士狼狽鹿駭猛虎唐會集作武磨牙而爭其肉居位者皆欲保性命而完妻子或競先䇿蹇集本文粹作先䇿髙足爭脫羿彀或不耻茍活甘飲盜泉奕獨正身守位蹈諸本無此字義不去以全死莭誓之諸本無此字不辱勢窘力屈以朝服就執猶慷慨舊唐書有感憤二字數賊梟獍之罪觀者股栗奕不變其色西向而辭舊唐書作西北面辭君會要作西南辭君然會要作而後受害雖古烈士方之者鮮矣或曰洛陽之存亡操兵者實任其咎非執法吏所能抗師敗將奔去之可也委身寇讐以死誰懟及以為不然勇者禦而忠者必守社稷是衛則死生以之會要作一委而去之是智免也忠於舊唐書文粹作於忠何有蓋舊唐書作昔荀息殺身於晉不食其言也仲由結纓於衛舊唐書有食焉二字不避其難也玄冥文粹作石正勤其官而水死守位而忘軀也伯姬待保姆而火死先禮而後身也彼四人者死之日皆於事無補夫豈愛死而賈禍也以為死輕於義故蹈義諸本作而字捐生古人書之使事君者勸然則祿山之亂大於里丕集作克孔悝會要二唐書有奕字廉察之任切於玄𡨕之官分命所繫不啻保姆逆黨兵威烈舊唐書作甚于諸本作於水火于斯時也能與執干戈者同其戮力挽之不來推之不去豈不以師可虧免不可茍身可殺莭不可奪故全其持舊唐書作特操於白刃之下孰與夫文粹無夫懷安偷生者同其風哉謹按諡法圗國忘死舊唐書作身下同曰貞秉德遵業曰烈奕執憲戎馬之間志藩王室可謂圗國矣舊唐書會要集本並無矣字下三字同國危不能拯集作救而繼之以死可謂忘死矣歷官十一任言必正事必果而清莭不撓去之若始至可謂秉德矣先集有時字非黃門以直道佐時奕嗣之以忠純可謂遵業矣請諡曰貞烈謹議故左武衛大將軍持莭隴右莭度經略大使兼鴻臚卿御史中丞贈涼州都督太原郡開國公郭知運諡議議曰郭知運驍勇有謀善文粹有於字用兵起行間為唐上將當時唐興百餘載矣天下充富太倉有二十年之蓄玄宗修集本文粹作循漢武故事方鋭意拓土知運適與時會遂扶作無此字乘天威奮其材力獨二本作敢與虜確故能破默啜可汗以靜文粹作靖北庭敗吐蕃誅康待賔隴坻文粹作底以西烽火為息尉薦麾下吏士任必以材往往超倫績用茂著王君㲋二本作英非以果勇代處分閫之寄牛仙客出將入相以清幹信謹稱斯又奬拔之明也當時議者謂知運與郭處瓘王駿薛訥並為中興名將至今隴上將士思之或有起祠宇於故城遺壘尸而祀之者上元中肅宗加太公望武成王之號知運列於配食之位則其勳伐事業宜有以美稱易其名者謹按諡法服叛懷逺曰威易曰厥孚威如繫辭曰弧矢之利以威天下虞書曰董之用威傳曰非威非懷何以示德則威者聖人所以佐仁義以濟天下者也施於名號可以表將帥之德請諡知運曰威謹議駁議郭知運崔厦時任左員外郎附見獨孤集議曰郭知運承恩詔葬向五十會要有餘字年今請易名竊恐非禮謹按禮記會要作經云禮時為大又曰過時不通典會要有及字為禮也昔衛公叔文子卒將葬其子成請諡於君曰日月有時將葬矣請通典會要有所以二字易其名者蓋時不可踰也通典會要有今字莭度既通典有卒字名不浮行數紀之集有間字前門生故吏已合謀諡今乃申請竊將有為而作莭度嗣子英乂頃屬多故屢制方隅朝庭䇿勳位表端揆附從者竊不中之禮會無妄之求况莭度當開元集有之字初賵贈特加碑志踰等集作並建皆出恩命追悼之遇文粹作過亦已當矣今又鹵莾外於典章追送往之闕遺啓將來之冒昧况今裂土者接畛專征者百輩若率而行之誰曰無請不唯有司疲於簡牘抑恐名器等於草芥雖欲曲全竊將不可又禮經云已孤暴貴不為父作諡若莭度合諡而不以其時則嗣子廢先君之德若不合諡而茍遂其志則先君因嗣子而見尊以僕射而言集有之字恐貽越禮之讓以國家而言集有之字又殊旌善之體請下太常重議謹議重議郭知運獨孤及議曰禮時為大順次之將葬易名時也有故文粹作古字闕禮追逺請諡順也假如諸侯五月而葬魯惠公之薨也有宋師二本有太子少葬有闕六字至隱公元年十月而文粹作已改葬不以踰時而文粹無而字廢禮又公叔戍請諡適當葬前謹按禮經二字通典會要作三百禮經三千威儀曽不言已葬則不可追諡况帝王殊途不相沿襲會要作禮新禮會要作制則死必有諡不云日月有時今請易名者五家無非葬後苖太師一年矣吕諲四年矣盧奕五年矣顔杲集作真非卿八年矣並荷褒寵無異同之論獨知運以其子不幸遂以過時見抑茍必以已葬未葬為莭則八年與五十年其緩會要作後一也而與奪殊制無乃不可乎議云已孤暴貴不為父作諡此謂其父無位而子居大官會要作貴位不當以已通典作子之貴加榮於父也禮不云乎父為士子為大夫葬以士耳集作禮若知運者處方面之通典要會作重字寄位列九卿茂勳崇名與衛霍侔飾終之禮冝嘉於他將一等豈待因依嗣子然後作諡今之専征通典作征鎮者通典會要有卒多起屠販皂𨽻之中九字雖逢風雲化為侯王其其字通典會要作而其間有祖父爵位與知運齒者鮮矣通典會要作與知運等當請諡者有幾奈何通典作何乃懼名器等於草芥以是殺通典會要作廢禮竊謂近誣乾元已文粹作以來纍有詔追贈百官祖父內外文武具寮之先悉蒙恩錫或音徽久沫或墓木已拱受大名貴位於九原者以萬數未嘗以沒代逺近為限夫贈諡一也贈者一時之寵諡者不刋之令今以嵗久而廢易名是王澤浹於天下而獨隔於一人也當開元二年吐蕃以舉國之師入五原塞擊柝之聲聞於秦集作咸雍知運與郭處瓘等討平之以張王室當時微知運則汧隴之西左袵是懼今朝廷方將命師四字集作出將以征不服討不庭宜褒寵之以勸握兵者安可以葬久而廢大典况夫諡法者蓋考其言行事業之邪正必以字褒貶之使生者聞美諡而慕覩惡諡而懼不待賞罰而賢不肖皆勸是一字之諡賢於三千之刑本非為沒者之子孫以為哀榮寵贈之具􅖍令知運無子且未嘗立勳茍位至上將則諡不可廢豈以其子之存亡以集無以字為請諡之可否竊稽會要作考彼載籍徵諸舊章易名之禮請如前議謹議故太保丞相贈太師苖晉卿集作韓國苖公諡議前人太師稟天純懿為唐股肱兩朝當國庶績惟允論道賦政送往事居叶恭東彛動罔違德惠和以懋其事明哲以保其身昔嘗懸衡九流剖竹四部刀尺之下無滯用襦袴之內無貧人洛陽居守東夏輯睦天寶之季文粹作年二京為戎皇輿西狩億兆左袵太師踐危機不易心處橫潰不忘國奮身拔迹於豺狼之口道不汙而莭不奪忠之大者至德乾元之文粹無之字集作中天下多故皇綱未張肅宗修集作循漢宣故事用刑名繩下而太師以曹參為師持清靜守職勵翼王度將順事典人亦寧一厥猷茂焉能知人能官人慎選乃僚言刈其楚二本有至有二字拔羣萃而取公器不五六年比肩衮職者集無者字光映册集作䇿府當代榮之漢史稱胡廣與故吏陳蕃並為三司太師有焉夫九德咸事寬為之首百工惟時哲則能惠集作能哲則惠宜其享天眉夀為國元老古者生以行觀其志沒以諡易其名字之美惡視行之大小後代或三字以表德真惠文子是也或二字以彰善鄼文終侯留文成侯是也蓋其迹集作績大名盛則禮優諡崇太師德冠縉紳位侔周邵將加誄諡之制冝以鄼留為凖謹按戴大禮體和居中曰懿文資有成曰獻稽千載之令典合二名以配德請諡曰懿獻謹議丞相故江陵尹兼御史大夫吕諲諡議前人吕諲任職從政聽敏肅給能以才知潤飾吏道至德中與三司同鞫大獄獨引律文附會經義而平反之當時卒用中典諲參其論在台司齪齪雖無匪躬之能然平章法度守而勿失齊為荆州一年有成號令明具賦斂均一物有制而事有倫大抵以威信為主戮陳希昂按申太芝之姦而三楚之人恱服厥功懋文粹集本作茂焉自至德已集作以來荷推轂受脤之寄處方面者數十輩而將不驕卒不墮政修人和如諲者蓋鮮矣集無矣字豈不以人散久矣而兵未戢挹濁流者難候清整棼絲者難為功文粹作工諲當此時能以慈惠易其疾苦且訓練三軍如臂使指合境無拔葵啖棗之盜而楚人到于今猶歌詠之其識集作才略必有過人者雖欲文粹無欲字勿褒之其可乎按諡法威德克就曰肅禁暴威也愛人德也考禮議名而擬諸其集無其字形容請諡曰肅謹議駁議吕諲嚴郢附見獨孤集議曰伏以故相國江陵尹兼御史大夫贈吏部尚書吕公諲昔事先朝纍當大任至德之初天步艱難公首披荆棘扈蹕靈武忘軀進忠一日三接先朝察匪躬之莭納沃心之議爰立作相弼諧神人其嘉謀嘉猷獻可替否之迹入則造膝出則跪辭溫樹不言難可得而知也至有爛焉明白欲蓋而彰者請區而載之乾元收復之際兩都衣冠多繫於三司詔獄御史中丞崔良器議事失入時宰苗太師崔趙公等雖廷諍之然未堅決公有犯無隱引經正辭上是其言刑為之省所全活者蓋數百人明主收霜集作雷電之威聖朝行寬大之典者繄公之力也古者進賢受上賞書不云乎咎繇曰都在知人公踐台衡專以推賢任人為務故相國房公琯故吏部郎韋公陟入登右集作左職皆公之由今相國黃門侍郎杜公之蒞江陵也公薦在方面之任今相國中書侍郎元公之在杜克也公咨以幕府之政曽未數嵗而二相接武於上台天地交泰聖賢相得庶績咸熙五典克從者兹集本文粹作資公之舉善也則子皮之舉子産鮑叔之舉管仲蕭何之舉曹參武侯之舉蔣琬方之前人我有餘地其在荆南也戢兵和衆令行禁止理績為天下最雖古之羊杜無得而踰今太常議荆南之政詳矣而曰在台司齪齪無匪躬之能者乃一作及扶瑖掩瑜通典會要集本作德之論非中適集作適中通典會要作中道之言也國家故事宰臣之諡皆有二字以彰善旌德焉夫以吕公文能無害武能禁暴貞則幹事忠則利人盛烈宏規不可備舉傳敘八元之德曰忠肅恭懿若以美諡擬於形容請諡吕公曰忠肅謹議重議吕諲獨孤及議曰吕諲任宰相日淺當時會肅宗躬親萬機文粹作務集作方庶政羣臣畏威奉職而已雖有謨謀於巖廊之上莫由有知之者及其荆門之政為仁由己略見於事其恩惠被於物集有其字風謡存乎人故人得而稱之議名之際敢不闕其所疑而録其尤文粹有者字著者有司之職也其閲實訟集作詔獄在未執政之前前議集壘議字之詳矣敢辱再告至若推進名賢集作公使登大任既同溫室之樹且行狀所不載孔子曰君子於其所不知蓋闕如也故不書今奉符令必用會要作加二字且以忠配肅謹按舊議凡歿者之故吏得以狀請諡於尚書省而考行定諡則有司存通典會要有朝字廷辨可否冝在衆議今駁議撰諡異同之説並故吏専之伏恐亂庖人尸祝之違公器不私之戒且非唐虞師錫僉曰之道昔周道衰孔子作春秋以繩當代而亂臣賊子懼諡法亦春秋之微旨也在懲惡勸善不在哀榮在議美惡不在字多文王伐崇周公殺三監誅淮夷晉重耳一戰而霸諸侯武公盛矣而皆諡曰文以冀缺之恪德臨事寧俞之忠於其國隨會之納諫不忘其師言身不失其友其文德豈不優乎而並諡曰武固知書法者必稱其大而略其細故言文不言武言武不言文三代已下朴散禮壞乃有二字之諡二字諡非古也其源生于通典會要作於衰周施及戰國之君漢興蕭何張良霍去病霍光俱以文武大略佐漢文粹有時字致太平其事業不一謂一名通典會作文不足以紀其善於是乎有文終文成景桓宣成之諡雖瀆禮甚矣然猶褒不失人唐興參用周漢之制謂魏徵以王道佐時近文直言極諫愛君而忘身近貞二德並優廢一不集本文粹作莫可故曰文貞公謂蕭瑀端直鯁亮近貞性多猜二近褊言褊則失其謇正稱貞則遺其宏狹非一言所能名故曰貞褊公其餘舉凡推類大抵凖此皆有為新唐書壘為字之也若迹無殊途事歸一貫則直以一字目之故杜如晦諡成封德彛諡明王圭諡懿陳叔逹諡忠溫彥慱諡恭岑文本諡憲韋巨源諡昭唐體璟諡忠魏知古諡忠崔日用諡昭其流不可悉數此並當時赫赫以功名居宰相位者諡不過一字不聞其子孫佐吏有以字少稱屈者由此言之二字不必為褒一字不必為貶若褒貶果在字數則是堯舜禹湯文武成康不如周威烈王靜慎集通典會要並作慎靜史作慎靚王也齊桓晉文不如趙武靈王魏安釐秦莊襄楚考集作孝非烈也杜如晦王圭已下或成或明或懿或憲不如蕭瑀之貞褊也歷考古訓及貞觀以來制度似皆不然今奉所議云國家故事宰相必以二字集為有字諡未知所集無所字出何品式請式具諲當以三字集作回示謹當以為按據若忠者臣事君之常道苟靖恭乎位誰則非忠非有炳然之異則不以為諡至若議獄緩死任賢舉善德之美者然肅者威德克就之名足以表之矣月令曰孟秋天地始肅詩曰曷不肅雍又曰肅肅王命仲山甫將之肅嚴也敬也忠之屬也天地不肅則嵗不成宗廟不肅則禮不立軍旅不肅則人不服肅之時義大矣哉以諲之從政也威能間邪德可濟衆故以肅易名而忠在其中矣亦猶隨會寧俞之不稱文豈必因而重之然後為美魏晉文巳集作以來以賈詡之籌算賈逵之忠壯張既之政能程昱通典會要作普非之知勇顧雍之密重王渾之器量劉惔之鑒裁庾翼之志通典作智略彼八君子者方之平東冝無慙德死之日並諡曰肅當代不以為貶何嘗徴一字二字為之升降乎謹上稽前典下據甲令參之禮經而究其行通典會要作往事請依前諡曰肅謹議駁司徒楊綰諡議太常諡文貞端駁之蘇端議曰古者美惡無私褒貶必當將以嘉善而退惡為列辟之明典也可不慎歟今謹詳前諡文貞者稽法考事恐非光允時論發揚來訓矣夫道德博聞曰文清白守莭曰貞且元載與司徒友敬殊深推為長者首舉清要人莫與京及司徒寵望漸髙載畏其逼又知載隳壞紀綱心二於君既懼其疑因而踈間通典作因踈簡有口皆知載惡而獨曽無一言或有發載之惡證告未明抱誠坐法者司徒時居上列奏逹非難不能因此披𠂻正詞全志士之命露凶狡之私而乃晏安自泰優遊過日使元載禍大滅身竟勞聖上防伺之憲豈守莭不隱耶豈懷道無毒耶非謂文貞明矣洎元載將謀不忠罔聰蔽聖嗇恩於下招怨於上使北塞人勞有過時之戍西郊虜入無吊災之惠礠邢忠通典會要作堅義之士將死復生梁宋傷夷之人或寒或餒搜訪旌恤中外所急載皆絶之使王澤不及於下為行路所嗟而楊公當聖上維新之時居天下得賢之望誠宜不俟終日造次速言乃寂寥啓悟噤閉謨猷貪食萬錢之賜虛承一心之顧使防河之人家聞採緑會要作篆之嘆近甸諸邑多與圻父之憂豈慈惠愛人乎既曰不慈不惠何以謂之文有隱有毒何以謂之貞矣古者諸侯有國卿大夫有家上以報祖宗下以處子孫之義也楊公歷處厚俸人謂儒宗曽不立家又無私廟寧使人老一作孝非闕敬祖之禮位極亡祭祀二本作禰之宫凡在衣冠誰不歎恨又乖大義一作憲是克就愍仁接禮之義矣曰文與貞曷可以議聖人立諡有公無私四字通典作盡公而無私之謂也所以周宣不敢私於父諡曰厲漢宣不敢私於祖諡曰戾百王明制歷聖通則昔公叔文子有死衛之莭修班制之勤社稷不辱方居此諡爰及太宗初魏公徵有匡救公直之忠中宗末蘇瓌有保安不奪之莭所以諸賢甚衆諡文貞者不過數公至於燕公張説先朝辭翰之臣四字二本作輸能名莭昭著省司尚謂不可至今人故稱之猶會要作由是言之焉可比德請牒太常更詳他諡以守彛章庶乎青史之筆不乖於周漢黃泉之魂免慙於蘇魏謹議代太常答蘇端駁楊綰諡議梁肅諡曰有國之典存以位敘其德沒以諡易其名名之小大視德之美惡蓋書其著而略其微要其終而明其義故曰諡以尊名莭以一惠恥名之浮於行也楊文貞體淳素之質協時中之德爰自下列至于宰司秉心不渝動必由道與夫立功立事開物濟衆不同日語矣而清儉厲俗明哲保身曰文與貞在我惟允秉公議者其誰曰不然今奉符謂公與元載交遊嘗為載薦引載之咎惡悉歸于公斯乃昧於觀行定諡之義且非君子成人之美也請區而集作以評之昔荀爽為董卓所舉致位三公及卓斁亂漢政可謂甚矣而漢史曽不以卓之過纍於慈明晏子陳氏俱事齊侯陳志邪而晏志正春秋亦不以陳之惡延於平仲是知道不必合事不必同則載之於公其事可見况當載秉鈞而公不參大政載以時望慕我我則靜而守中因踈為簡適見清莭又有發載之惡皆漏泄致辭患自掇也庸可救乎及夫載覆其餗公膺大任任職月集作日淺屢以疾辭位且不安安可以寂寥啓悟而責之乎昔季文子相三君無食粟之馬衣帛之妾君子以為忠楊公以大名厚位出入三朝無宅一區無馬一駟志於清白交不諂瀆可不謂貞乎掌訓誥秉集作持銓衡處成均二宗伯潤色王度無替厥美加以敏而好學見善如不及可不謂文乎謹按諡法稱貞之例有三清白守節曰貞大憲克就曰貞憂國忘死曰貞文之義有六經天緯地曰文道德博聞曰文愍人集作忠信接禮曰文不耻下問曰文慈惠愛人曰文修德來逺曰文名既不備事亦殊貫又安可以二王三恪私廟家祭之闕併責於一名哉若具美果在一名則士文伯孔文子且無經緯天地之文孟武伯寧武子又非克定禍亂之武若以廢禮不稱其名則臧孫辰縱逆祀不得諡文管夷吾臺門反玷不得諡敬是知議名之道録文粹作取其所長則捨其所短志其大行則遺其小莭使善惡決於一字褒貶垂於將來蓋先王制諡之方也若綜核名實於公論宜取坦然明白彰於􅜯邇者今或乘人之意肆誣謗之辭所謂抉瑖刺集作次骨之説非正議也且聖二本有人字無全能才不必備以鄭公徵立言正色耻君不如堯舜其節大矣而昧於知人許公瓌固執遺二本作條詔廷沮邪計其志明矣終不能守故春秋為賢者諱過傳稱不以一眚掩大德語曰無求備於一人蓋二公所以為文貞也若曰百行所歸九德咸事如周公之文宣父之德八字集作周公之文宣王之宣文粹集作周公之文宣然後擬議則千古莫嗣而諡典絶矣安在一二蘇魏足為定制乎謹上參典禮近考故事楊公之名請如前議云爾後諡為文簡常州刺史獨孤及諡議權德輿議曰獨孤及剛方直清根於性術其修身蒞官確然文粹作乎處中立言遣辭有古風格辨論裁正昭德塞違濬波瀾而去流蕩得菁華而無枝葉其摳衣入室之徒皆足以掌贊書而秉方册則及之為文可以集本文粹無以字徴矣其為博士時有上議景皇帝不宜為太祖者詔下為庶官及舉夏殷周漢之故事尊祖配天之大旨以為景皇文粹作帝字始封于唐天所命也於是定儀文粹作議為一代典法新平長公主之子裴倣文粹作傲非尚永清公主欲以他族文粹作宗主婚及時相禮上陳不可竟得以裴僕射遵慶為主當時稱之定吕諲盧奕郭知運之諡用禮文憲度得褒貶之正凡在集本文粹作斯是往復詞旨堅明其理舒州屬嵗飢旱鄰郡庸亡什四已上而舒人生聚悅安不知凶年優詔褒異就錫文粹作賜金紫其初在濠其後在常皆因俗為理人用愛戴雖不得居公卿長帥之任然其秦常議論三郡績用亦足以列於文苑附於循吏按諡法曰博聞多能曰憲獻二本作薦可替否曰憲及酌三王四代之典訓作為文章以輔教化是為博聞位參中外必以稱職聞是為多能定宗廟之饗為薦可正婚姻之主為替否有司稽美行而易其名者請諡及曰憲謹議文粹作諡贈司空李揆諡議議曰李揆端莊粹溫潔廉淑慎用文章術學資適逢時奮其英華以取貴逹如良庖投刃無復肯綮歷諫曹左史司王言二春官以至于平章大政在帝左右必以文誼藩身奉法遵職官曹無秕政姻族無幸人束帶山立敷陳前老儼然而溫有碩儒大臣之度或起或廢其道甚夷昔觀射父能作訓詞以行事於諸侯左史倚相能通訓典以敘百物揆實有之建中中西戎乞盟以舊齒宿望將命殊俗結華夷之信董衣裳之會已事廽車嵗當興元匪躬靡盬至河地而歿追錫司空恩禮有加按諡法曰率事以信曰恭不懈于位曰恭揆果行求巳致位台司歷官陟􅑙十有八次周旋敬慎以揚職業不曰率事以信乎及逾懸車之年奉絶域之使受命文粹作詔即路視險若夷貞厲盡瘁沒集本文粹作復是於在轂不曰不懈于位乎昔韋玄成翟方進以經明為漢相而皆諡曰恭迹揆所履節以一惠勤官死事炳然昭明有司易言請以恭諡謹議文苑英華卷八百四十
