body:
  text: 文苑英華巻八十一宋李昉等編雜伎一拔河賦一首漢武帝後庭鞦韆賦一首内人馬伎賦一首長竿賦一首季秋朝宴觀内人馬伎賦一首千秋節勤政樓觀舞馬賦一首勤政樓花竿賦一首内人蹋毬賦一首氣毬賦一首拔河賦薛勝皇帝大誇逺人以八方平泰百戯繁㑹令壯士千人分為二隊名拔河於内實耀武於外伊有司兮晝爾于麻宵爾于紉成巨索兮髙輪囷大合拱兮長千尺爾其東西之首也派别脈分以挂人胷腋各引而向以牽乎彊敵載立長旌居中作程茍過差於所誌知勝負之攸平於是勇士畢登囂聲振騰大魁離立麾之以肱初拗怒而彊項卒畏威而伏膺皆陳力而就列同㧞茅之相仍瞋目贔屭壯心慿陵執金吾袒紫衣以親鼓柱下史持白簡以監繩敗無隐惡彊無蔽能咸若吞敵於胷中慘與􅉃同莫蠆疑作蔕芥又似㧞山於肘後匪勞凌兢然後一鼓作氣再鼔作力三鼓兮其繩則直小不東兮大不東允執厥中鼉皷蓬蓬詩作逄逄士力未窮身挺㧞而不動衣簾襜以從風闘甚城危急逾國蹙履䧟地而滅趾汗流殊而可掬隂血作而顔若渥丹張脈僨而體如癭木可以揮落日而横天閫觸不周而動地軸孰云遇敵遷延相持蓄縮而已左兮莫徃右兮莫來秦皇鞭石而東向屹不可推巨靈蹋山而西峙嶷乎難摧繩㩧仆而將斷猶匍匐而不廻大夫以上停眙而㤀食將軍已下虓闞而成雷千人抃萬人咍呀奔走坌塵埃超㧞山兮力不竭信大國之壯觀哉嗟夫虚聲奚為决勝在塲實勇奚為交争乃傷彼壯士之始至信其鋒之莫當洎標紛以校力突繩度而就強懦絶倒而臆仰壯乗勢而頭搶紛縱横以披靡齊㧞剌而陸梁天子啓玉齒以璀璨散金錢而瑩煌勝者皆曰予王之爪牙承王之寵光將曰㧞百城以賈勇豈乃牽一隊而為剛於是匈奴失筯再拜稱觴曰君雄若此臣國其亡漢武帝後庭鞦韆賦并序髙無際臣無際才非馬融位叨麟閣屬秘書監博陵崔公畫鞦韆障而得一觀皓齒蛾眉徧於後庭鞦韆之觀樂焉考古之文苑惟鞦韆賦未有作况鞦韆者千秋也漢武祈千秋之夀故後宫多鞦韆之樂今因覩斯畫而善前名臣雖不敏謹述漢武後庭鞦韆賦以歌之詞曰大哉漢武兮尊一人域中無事兮天下皆春豐比黍稌兮欲東巡風雨時若兮輝光日新百寮良哉六官疑作宫清謐外無金革之警内馭玉帛之逸王母呈益地之圖素女授延齡之術河皷效職於永巷洛神負書而入室當是時也初度禖鷰之辰未届親蠶之日闘春服競新裳臨鏡臺耀殿堂態越千金之態香殊百和之香下珠樓巡玉砌並伍徐出藂三連袂照緑池而嬌多歩晴天而影細妍兮雅佳兮麗争攀桃李之花競説間以紅綈藂嬌亂立以推進一態嬋娟而上躋乍龍伸而蠖屈將欲上而復低擢纎手以星曵騰弱質而雲齊一去一來闘舞空之花蝶雙上雙下亂晴野之虹蜺徑如風㨗如電倐忽顧眄萬人皆見香裾颯以牽空珠汗集而光面時進時退以遊以遨類七縱而七捨期必髙而讓髙取其至樂靡辭其體勞徒觀其天仙歩虚飛鳥頡頏飛鳥不離於羽族天仙不舉而自上漢皇由是闢昭陽臨未央歌虞舜誡幽王知所以失知所以昌察六宫之閒曠耗五綵之衣裳念一朝之罷織想十月之寒霜俾游者有禮乃輟而不荒豈茲賞之為樂盖欲習夫采桑必令動也無害何必勞而有妨詔宫掖慕共姜克勤筐篚之事繼羙葛覃之章則知漢武之徳與堯舜而齊芳於昭聖王兮穆穆兮皇皇内人馬伎賦以文彩節奏發揚蹈厲為韻李濯皇帝順時觀武乗暇㑹羣百蠻在庭如蟻慕於羶附千官翊聖類星拱之垂文於是時也嚴霜剪木晴空滅雲都人士女雜沓繽紛或側肩以馳見或奔躍以樂聞衆觀迭改羣心如待於是渥洼神驥齊逸足以翩翩宫禁名姝耀雜粧之彩彩莫不游纓寳校玉珂金玦挾刃明霜衣金被鐵搴旗命伍抽戈按節侔三邊之挑戰壯六軍之校閲翹趾金鞍之上電去而都閑委身玉鐙之旁風驚而詭譎人矜綽約之貌馬走流離之血始争鋒於校塲遽寫鞚於金埒若乃楊葉既指琱弓斯彀百歩應的七札皆透天顔微怡雷皷訇奏由羿忸於手拙幽并慙於伎陋於是羌髳夷羯一作夷戎氊裘窮髪心目愕眙形神隕越屈膝天庭稽首魏闕荷臣子之忻戴咨譯人以啓發曰天臨有唐撫綏萬方文徳廣洽武義大揚且柔婦之克妙矧驍夫之可量於是王公卿士手舞足蹈歌湛露之既浹詠天保之攸報乃言曰斯伎也義同七徳名冠六藝惟便習之至精在教理之發厲是知物無不學學無不濟我皇豈不曰非婦人之職任盖欲以激君子之磨鋭季秋朝宴觀内人馬伎賦同前韻敬括夫何至徳之極兮越五帝而作君羌柔逺以服外廓㝢縣而同文若乃寅奉上天疇咨亮采道備淳白朝無闕殆由是脩樂以省風慮未善而將改髙樓隐映廣塲肅潔冠劔惟序奉天子之風儀笙鏞以和得先王之制節夀觴既已雅樂斯闋然後罷朝宴百寮與耆耋於是旁分美人下徹金奏玉勒齊習琱弓並彀鴻鶱龍翥却濩疑作􅩯畧以驍騰左旋右抽突絢練而馳闘沛艾多狀蹁躚不歇香汗與桂條争薫麗色比桃花競發應繁鼓以頓挫歴層䑓而超越何登降之趫悍乍㢠廻旋以抑揚寳釵耀目羅衣沐香乍倐忽以變態亦終然而允臧徒觀其匪疾匪徐以舞以蹈濳中規而六轡沃若動合節而萬人鼓譟日既逮昏聖心攸憇斯帝王所以因壯觀而戒逸遂居安而若厲豈淫樂以惑人見終朝於鄭衛千秋節勤政樓下觀舞馬賦以態有餘姸貌無停趣為韻錢起惟大唐之握乾符聲諧六律化廣三無能使乘黄服皁龍馬負圖必將登髙率舞豈獨載馳載驅嵗八月也一聖之生千秋之首舉天慶丹陵之㑹率土獻南山之壽上乃御層軒臨九有張葛天氏之樂醉陶唐氏之酒感百獸之來儀即八駿之孔阜於是陳金石儼簪裾廣塲天近彩仗晴初有騢有驈有驔有魚雲聚日下花明露餘帝曰司僕舞我騏馵可以敷張皇樂可以啓迪歡趣須㬰金皷奏玉管傳忽兮龍踞愕爾鴻翩頓纓而電落朱鬛驤首而星流白顛動容合雅度曲遺姸盡庶能於意外期一顧於君前噴玉生風呈竒變態雖燕王市駿骨貳師馳絶塞豈比夫舞皇衢娛聖代表吾君之善貸向使垂耳長坂翹足逺坰天驥之才莫用鹽車之役不停安得播天樂輝皇靈服御惟允簫韶是聴則知絶羣稱徳殊藝逸貌足之舞之莫匪聖人之教則陳力者願驅策而是効長竿賦梁渉伊酺醵之可觀有格澤大人賦建格澤之脩竿注格澤氣也胡各反澤大各反之脩竿勢百常以莖擢文五彩而花攅可負以致逺又行之匪艱故得一人之慶而為萬國之歡獨歩華塲偏臨廣術當太階以影正對重樓而首出岌岌兮髙柱承天亭亭兮若木拂日有羙人兮來從紫闈為都盧兮衣錦褧衣凝靚粧以如玉聳輕身兮若飛倐龍盤而婉轉遂花落而霏㣲朝雲乍興神女之初降曉月將落姮娥之未歸於是伐皷雷響鳴金星合從正殿以獨歩廵廣塲而未匝勢欲傾掉力將彈壓天地為之振動樓䑓為之岌嶪臨人自正兮有異從繩處險而安兮匪同履氷豈有象於鴻漸終無教於猱升聞北風其凉我則懐將恐將懼見南山之夀我則喜不騫不崩則知蹲㑹稽者其言矯在浚郊者其利少曷若揚王庭越木杪為域中之大見天下之小哂伏波之銅柱遥居海裔陵漢武之金莖揭出雲表惟我皇而念茲遂角觝而存之非為作竒伎庻堯之謗木可為非為作無益庻舜之舞干可持使遷喬者仰止守直者方斯臨下則正而不譎在上則髙而不危夫是跨越古今標格寰宇聞之者鳬趨雀躍見之者足蹈手舞非測日之表可儔非凌雲之梯足數將揭焉以山立或拊之而林聚故知斯竿無親惟力是隣雖盛徳之在木必先容而假人欲為柱兮承彼大厦願為檝兮當彼要津既呈材以効質樂我王於萬春勤政樓花竿賦王邕皇上朝萬國宴千官當獻嵗之令節御髙樓而賜歡應和風奏以天樂耀長伎出乎花竿偉夫如山之重如繩之直挺其質以百尋繢其文以五色將烜赫以誇衆候鏗鏘而取則髙居乃在乎帝庭發跡乃因乎人力於是玉顔直上金管相催顧影而忽升河漢低首而下指樓䑓整花鈿以容與轉羅袖而徘徊晴空乍臨若虚仙之踴出片雲時映若仙女之飛來矧夫曲終示危乗危中矩八方勞觀億計如堵載之者強項超羣登之者纎腰廻舞猶盡巧於繁節且獻能於聖主廣場合勢則袵舉成帷衆伎驚心則汗流漂雨或有趫材告捷角力争先鳴鼉鼔以動地仰花竿而拂天初騰陵以電激倐縹緲而風旋或暫留以頭挂又却倚而肩連躡足皆安象髙梧之鳯集随形便躍奮喬木之鶯遷然後贔屭用壯廻還變狀度岌岌之雲梯繞森森之仙㐲通衢為之翕習太蔟為之條暢人自能藝信咫尺於重霄竿則有材惟飭磨於大匠是日也悦豫重疑情喧闐鎬京角觝慙妙巴歈寢聲賞含嘉用潤澤寰瀛觀斯樂之為最孰不稱於美名内人蹋毬賦以仁疑玉毬仰術為韻毬猶求也展轉馳逐兮將求人而得人一作仁毬上有嬪毬以行於道嬪以立於身出紅樓而色妙對白日而顔一作影新曠古未作于今始陳俾衆伎而皆掩擅竒能而絶倫於是揚袂疊足一作色徘徊躑躅雖進退而有據常兢兢而自朂毬體兮似珠人顔兮似玉下則雷風之宛轉上則神仙之結束無習斜流恒為正遊毬不離足足不離毬弄金盤而神仙欲下舞寳劔則夷狄來投方知吾君偃武之日脩神仙之術但欲揚其善教豈徒悦其淑質謂艶色兮可輕使宫女兮程功而出疑履地兮不履其地疑騰虚兮還踐其實當是時也華庭縱賞萬人瞻仰洛神遇而恥乗流飛鷰逢而慙在掌幾㸔制而動息幾度紛而來徃倐而復歸於雲霄何㣲妙之惚恍氣毬賦以圓實之形可貴為韻仲無頗氣之為毬合而成質俾騰躍而攸利在吹嘘而取實盡心規矩初因方以致圓假手彌縫終使滿而不溢茍投足之有便知入門而無必時也廣場春霽寒食景妍交争競逐馳突喧闐或畧地以丸走乍陵空以月圓可轉之功混成之㑹雖無侣而是匹諒有皮之足貴傅毛非取奚資蔚矣之文實腹可嘉且養浩然之氣觀夫渾兮無覆塊若有形方勞擊觸曾匪遑寧其升木也許子之瓢始挂其墜地也魏王之瓠斯零懼欲擠于溝壑將不出於户庭智不待乎扄鎻妙乃存乎苞裹堅彊祈致雖吐納之在君藴蓄為功信盈虚而自我念脩完之是急如穿鑿之㤀一作不可勿一作㤀懐棄擲委質操持捨之則藏豈凝滯之興誚蘓而復上猶輕舉之可思彼跳丸之與蹴鞠又何足以加之文苑英華巻八十一
