body:
  text: 文苑英華卷一百二十四宋李昉等編畋漁春搜賦一首皇帝冬狩一箭射雙兔賦一首聖人苑中射落飛鴈賦一首三驅賦一首畋獲非熊賦一首開三面網賦一首弋不射宿賦一首吕望釣玉璜賦一首任公子釣魚賦一首獨繭綸賦一首釣盈舟魚賦一首春搜賦以畋狩得時獻禽合禮為韻常衮上方究心政理愓慮逰畋順時而行仁育之恩克洽酌古取則春搜之義攸先所以示軍容於有衆發號令於初年時惟仲春景則清晝列武卒於天仗選龍媒於御廄野有鳴鹿爾則食君之蘋巷無居人我亦從王于狩其儀可覿其理可究春者蠢也象其動以宣威搜者求焉薄於求而在宥固將明其校閲非取樂於馳驟想熊羆之士必在於求賢驅貔豹之師寧惟於逐獸夫其將陳於野先訓於國執鐃備卒伍戰陳之教執鐲盡進退疾徐之則六軍之節制可觀三畋之禮文斯得而原其初也勑司馬致髙旗行火弊出周禮剃畬災彎良弓而發彼破修眥以斃之擇可取而克成舊事捨將孕而用表深慈雖四海久清禮且崇於國典三冬尚隙役無奪於農時然後算其獲否以行賞勸皆賈藝以求功必極忠而上獻若然者豈徒倒逸材之獸落翰飛之禽大發以彰其武力小殺以宜疑其道心事且載於周禮迹寧誡於虞針夫如是子雲無以諷其羽獵相如未足言其上林於是天族疑作旋景從颷軼電雜皮冠且進虞人之守斯存綵仗前驅天子之圍不合有司乃申誓人之詞具表貉之禮獻禽以報其生植充豆以遵其孝悌君子謂是搜焉足觀國家之大體皇帝冬狩一箭射雙兔賦以題上六字為韻路季登大矣哉我唐之盛兮七葉重光襲文明以為德表武烈而稱皇於是行冬令稽舊章當清風之戒節建疑作逮玄律一作暉之司方時因展狩禮備肅將信不差於王道豈取樂於禽荒者哉若乃整鈎陳嚴羽衛星旄燭野雲旗拂曀周長揚而為阹屬甘泉以為綴騁六龍而電發顧雙兔而颷逝性毚狡而不恭足輕迅而靡制爰從聖射乃觀神藝鑾鑣却轉引柘月而隨圓金鏃斜飛疊霜毫而俱斃既絶系而逹臆子虛賦洞胸逹腋絶乎心繫注中心絶系也繫讀曰系亦洞胸而裂眥岐陽之美不獨稱於周王上林之雄未可論於漢帝觀夫歲聿暮時既冬採吉日詠車攻或備鮮於乾豆或薦芬於祖宗匪合圍而縱獲諒閲武而觀農且箭協陽爻兔唯隂獸柔而不犯信爾類之可全強以多猜信我網之不漏伊省括而一發紛應弦而雙仆所以章聖武於無窮表靈誅於薄狩至如馳騕裊跨深密追捷蹤騰徑質飄勇氣於蒼昊抗稜威於白日激流電而指顧躡奔星而迅疾疊穿兮彼兔則雙舍拔兮我矢惟一足使百蠻膽喪萬人股栗遐哉邈乎不可談悉彼更嬴出戰國策之絶藝蒲且之妙術曽何足以擬議焉於是殺氣肅英風扇信合美於三驅實挺竒於一箭然後回雕輦御金殿或畀台階或歸鼎膳乃知我皇之盛德眇萬古之罕所聞見者也聖人苑中射落飛鴈賦以題為韻次用陸贄於穆我皇受天明命與乾坤而合德配唐虞而齊盛成功斯著射中九霄之禽文教已宣道應千年之聖想彼禽矣雍雍可珍配玉帛於前禮齊山木於至人棲必擇處翔無失倫候律南徂洞庭之芳草猶碧順時北向上林之繁花已春苟應弦以啓聖同殺身以成仁爾乃雲收逺天水落上苑風蕭蕭而徑夕日杳杳而低晚於是聖人恱年豐修武功有直斯矢有弨其弓因肅殺之候遊苑囿之中彼鴈于飛斜當禁掖帶輕雲之徴一作微素映遙天之晴碧雖逄蒙之絶藝莫敢措心固離婁之明眸其才能覿我弓斯張我矢斯射算分數之逺近則舍拔而應鏑質毛紛其已墜弦聲振猶未釋聞之者足蹈手舞覩之者目駭心愓彼貫心稱妙穿葉無怍一則三年而後發一則百步以為約豈如料必中於飛動騁絶伎於寥廓鴈以逺而矢發矢既中而鴈落異哉莫髙者天戾天者飛彼摶空之逸翰尚無所違矧荒服之逆命曷不咸歸則知皇聖有作夷夏無間鄙楚莊之戲猿笑晉平之失鷃固將威九垓而清八荒豈直落翔雲之一三驅賦以搜畋以時網去三面為韻裴度古之畋獵自天子逹諸侯秋則獮春則搜非有情於殺戮固無取於盤逰蓋以除時稼之所害示軍容之克修故王者有三驅之禮也職此之由夫生殺之柄主之於天生誠有之殺亦宜然是乃張我武出于畋植靈旗以凖的應晉鼓以周旋兵作於後獸馳於前背主而去者以其逆而必殺委質而來者以其順而必全是知從禽之中有古義焉何乎哉三驅之義我則有以且以驅為名至三而止驅者以無合圍之道三者以有知足之理蓋以明上帝之心見聖人之旨初其擇吉日戒師期既逐獸以禮亦使人以時不知追軍詎設左右之翼有異捕鹿寧分掎角之師夫堯舜而來殷周以往皆順時而行令非害物以示養無違者不殺知有異於焚林犯德者取之固無間於漏網故知樹德務滋除惡務去所以欲萬國之畏威使四方之即敘柔者來服則必解其罻羅挺而背走則必烹於鼎爼若然者必沮其疆梁而銷其旅拒也逮乎大漢逰盤是恣馳騁一作駃是耽崇苑囿而大開里寧止百取庖厨之饜飫畋豈惟三不然者何以子雲有長楊之諷相如有亡是之談我國家修古典斥遊宴狩不奪於三時網唯留於一面大田多稼聊會獵於長苖四海無虞徒因搜而教戰美矣哉三驅之禮因兹而又見畋獲非熊賦以有開必先是膺明盛為韻頻喻畋者所以講武賢者所以輔弼能順時以𢎞閲逄命世之間出得賢於搜狩之場效獲乎霸王之術且以展時巡之明義昭至化之隂隲將入林之有期寧即鹿而無必哉是以賦車攻練吉日駕駟牡之既間儼七騶以齊蹕於是列卒滿路張罟竟天傾藪刮野搜林蕩川小殷湯之教祝同周文之獵賢治國之規必聞獻可從禽之樂寧假獻豜如斯則沃心之期乎説啓乃入夢之知夫兆先觀夫獵車未貫大綏將弭得賢之繇既符非熊之姿宛是馬足不極皮軒遽回解雲羅之周布廣天仗以全開用割鮮之能我則曽事於屠釣誇染輪之味我則將和於鹽梅且夫博採為聖旁求斯盛寧知校獵之逰更展弓旌之命白駒皎皎無煩空谷之維束帛戔戔不待中園之聘薄狩有隟畋逰有恆一作懲陳虞針以炯戒得吕望以光膺馳騖乎道德之囿故逸飛之遺走將賢能之是擇在麇鹿而何有十旬失位悲夫洛汭之歌三品充庖詎比渭濵之叟此威容兮我武既成彼非熊兮惟時之英來儀則邁種靡怨佐理則日月宣明盛哉三驅之致用也永代垂聲開三面網賦以仁聖之道開此三面為韻湯既有殷聖德日新敬畋逰必因於無事取禽獸不為乎資身於是設無私之網當去殺之辰加一日而雖期於用開三靣而蓋取諸仁乃言曰遂爾之性啓豫有聖悲羅者之所重傷詔虞人悉除其令恢恢雖設不為四校之防蕩蕩無疑必遂三驅之命是用施諸大麓祝以嘉辭舉數隅而罔煩曲取當直道而豈假周維故得獸安狂顧鳥釋危疑弗慮弗圖自樂已生者足矣若亡若存不用吾命者縶之當夫搜狩有常稼苖是寶將遂乎驅逐豈煩乎窮討所以釋從禽之利以絶一源解竟野之罟欲窮諸道遂得行無所阻物不懷猜念群生而東西必遂嘉衆路而逺近咸開弱羽飛空未見觸絲之患徴一作微行走地曽無繫足之哀故曰聖道克美深仁及此雖有畋獵而無荒雖有罝罟而必弛所以冠百王而不怍歷萬祀而無慙正其德而惟守一用其網而必去三芳隨事一作業逺化與恩覃則里革斷罟之心庶修遺美西乙放麛之感足繼清談今天子意在搜田志清郊甸庖羲之網屢設成湯之心未變已焉哉誰能述三代之所興庶可垂永於南面弋不射宿賦以君子仁及飛鳥為韻王起禽之生兮擇其翔集弋鳥疑作為縶兮修其決拾飛則騁伎或雕爼是求宿必表仁亦良弓用戢無欺其處暗必濟其不及豈憚殺而為心將好生而是急當其白日既曛皎月才分斂翮爭萃來巢有羣同在籠之無見雖驚弦而不聞豈不知剪其羽飾旌旗之靡靡裂其肉成炮炙之紛紛詩燔炙芬芬蓋以忘機為心方同海上之子俯窺見害奚恃太平之君四鏃既藏六鈞遂弨廣韻等少切物則咸若德用不擾三驅之禮未𢎞五豝之仁為小蒲且希伎自貫于青雲硩蔟設官爰射乎妖鳥豈以窺城上之烏棲殞月中之鵲繞至道在兹懷仁有歸恩同於解網戒比於合圍且以順行而搜一作捷寧恨於風毛雨血當夕而殞奚思於不鳴不飛諒身剪而知懼實羽族之有依我思古人聿求夫子蓄矍相之藝不發於非時當山梁之求必資乎順理從禽之禮斯得夜獵之夫多耻物既全諸直藝亦藏諸身則知率是道也在博施於仁吕望釣玉璜賦以道濟天下神符告休為韻昔太公之未遇也隱於渭之濵釣於渭之津坐磻石而不易其操垂直鈎而不撓其神波萬重而我心惟一歲三周而吾道方申既而寒潭曉霽莫不遺乎巨細兀忘形而有待引經綸而不替期隂隲以旁行忽冥符而下濟於是拔深泉激細疑漣振錦鱗而雲霞煥若獲玉璜而篆籕昭然皎皎霜淨亭亭月懸表蒼兕之期功鄰造化騰白虹之氣理契先天所以耀川靈所以誇漁者徘徊自適憤惋俱寫臨清流而素彩熒煌昭白日而祥光上下公乃起川隅懷寶符顒昻志氣振奮泥塗捧抵鵲之容彌彰潔白入非熊之兆寧掩瑕瑜衆皆釣其名我則釣其道衆皆釣其魚我則釣其寶故知神全者不辭於貧賤志大者不歎於枯稿皤皤兮白髮湜湜兮清流其來也釣於周所謂運一作抗良謀擁神休豈芳餌而能獲匪嘉魚而足求異和氏之功疵瑕受戮賤詹何之術溪澗空投然則道感其誠德亦有報天以我為忠告客有悅其性者莫不望兹川而髙蹈任公子釣魚賦并序昔任公子釣魚經年不獲及其獲也衆人饜之公孫𢎞十上不遇及其遇也帝王任之固知餌大則魚大功髙則祿厚魚也人也何酷似乎感其義以作賦曰千載崇崇我聞任公獨坐會稽之上垂釣東海之中海之廣兮混然飛流魚之大兮邈矣難儔所謂之魚三千餘里何以為餌五十其牛其釣兮星霜已周日居月諸兮吞此大鈎吞鈎之時其勢回互覺巨一作長絙之緊急驚白波以鼓怒攪大海簸髙濤嶪三山憚群鰲及夫道盡途殫繩窮勢蹙突兀出水蹉跎望陸一岸山橫半天雲矗巨鱗既已傾海水亦以清吞舟之害平若乃飛鑾疑刀以撞突泉為膏兮嶽為骨剝鱗上之重錦抉眼中之明月由河之北逹於東溟萬民饜飫三年羶腥向時兮刻意臨川勞神有年舟人不顧漁子悠然坐石滑兮積苔蘚蒼葭變兮老雲煙今日兮投竿瞬息以肉為食豫且氣懾詹何失色契我心者臧丈人適我願者龍伯國釣道既爾人亦如此孫𢎞未遇買臣家貧海上牧豕江邉負薪常以雲霄自致燕雀時人受侮不少守志彌真終逄挺拔俱為漢臣典郡則還鄉衣錦作相而開閣迎賔則知餌大者魚大道肥者祿肥獲大雖喜雖晚何悲魚之與人殊途而同歸獨繭綸賦以心專慮寧方盡釣道為韻李君房維絲伊緍體道之要繭之緒可以為垂釣之綸綸之微可以精用釣之妙綿聨輕竿之上荏弱深泉之徼裊長風而若絶度晴空而引耀剖蚌為餌寧取乎五十之牛懸縷為綸奚期夫三百之釣觀夫其釣不釣玄之又玄在河之涘期道為筌且夫綸細如忽魚潛在泉振而不絶則其動也直深一作心而能致是其靜也專隨驚波而乍緊逐潛流而曳引時髣佛而如見忽漂搖而將盡其細雖爾其用彌深三尋豈勞於人手百丈乍發於泉心神之凝不覺魚之得綸之細亦隨釣而沉美茲綸之裊裊浮長川之浩浩疑空外之逰絲罥波中之弱藻斯綸也異園客之功斯釣也得詹何之道釣術既臧唯道能方其竿不撓其餌非芳中之者功多於金鎖引之者道叶於玉璜信可以投於濮水信可以泛彼滄浪必釣乎深先定乎慮得象以契於忘筌得魚斯謂之冥助魚既得兮心亦冥收纎縷兮旋回汀將大釣於方國冀滄流之大寧釣盈舟魚賦以心無所望故能取之為韻周針詹何以迹繫魚舟心逰水府樂垂釣以放志存大川而為主是故傍遙汀依極浦下纎鈎疑而任運念紅鱗而必取原夫綸抽獨繭鈎屈芒針綴香餌半粒裊荆篠列子荆篠為竿數尋泛萬頃之濶投百丈之深不爭之以手而爭之以心蓋以釣於魚也無情魚於釣也奚懼期不中而有中信難遇而終遇自得釣深之旨誰明引重之故觀其躍濤戲瀨掉尾揚鰭視吾釣為非釣觸吾絲為非絲果審之以無物遂吞之而不疑所以入其口挂其頤據洪津而曽不暫驚靜宜尅也恐巨力而難乎連制動必隨之欲舉未舉相去幾所牽之默計於輕重縱之潛知其出處且以弱制強者道之𢎞以剛鬬柔者死之徴不然則焉得綸甚微而不斷魚至大而不勝勢窮則龜龍莫之衛護氣作乃波瀾為之沸騰我體正而方逸爾力盡而何能此逹守柔彼休用壯沉釣才出於水靣斃質已充於舟上圖大且異於任公識時固同於吕望設使專情待物切有於無則手也從操於釣餌魚也終樂於江湖吾當不躁不撓不馳不趨垂竿於仁義之域鼓楫於道德之衢然後憐一作歌玉兔惜金烏當盡釣於人間之盛事豈獨盈舟而已乎文苑英華卷一百二十四
