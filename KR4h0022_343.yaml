body:
  text: 文苑英華巻三百四十三宋李昉等編樓䑓宫閣樓四首䑓三首宫三首閣二首園二首亭五首經行封丘作一首發閬中歌一首金陵歌一首梁園歌一首襄陽歌一首長安歌一首鄴城引一首鴻門行一首顧渚行一首武源行一首過荆門歌一首陪侍郎叔華登樓歌集作宣州謝眺樓餞别校書叔雲李白棄我去者昨日之日不復留亂我心者今日之日足繁集作多繁憂長風萬里送秋鴈對此可以酧集作酣髙樓蔡氏集作蓬萊文章建安骨中間小謝又清發俱懐逸興壮思飛欲上青雲集作天覽明月抽刀斷水水更流舉杯銷愁愁復集作更愁男兒集作人生在世不稱意明朝舉棹還滄洲集作散髪弄扁舟越王樓歌杜甫綿州州府何磊落顯慶年中越王作孤城西北起髙樓碧瓦朱甍照城郭樓下長江百丈青山頭落日半輪明君王舊跡今人賞轉見千秋萬古情江樓曲李賀樓前流水江陵道鯉魚風起芙蓉老曉釵催一作催鬢語南風抽㠶歸來一日功鼉吟浦口飛梅一作遇飛雨竿頭酒旗換青紵簫騷浪白雲差池一作參差黄粉油集作紬衫寄郎主新槽酒一作曲聲苦一作善無力南湖一頃菱花白眼前便有千里愁小玉開屏見山色上官昭容書樓歌貞元十四年友人崔仁亮於東都買得研神記一巻有昭容列名書縫處因用感歎而作是歌吕温漢家媫妤唐昭容工詩能賦千載同自言才藝是天真不服文夫勝婦人歌䦨舞罷閒無事縱恣優㳺一作柔弄文字玉樓寳架中天居緘竒祕異萬巻餘水精編帙緑鈿軸雲母𢷬紙黄金書風飄一作吹花露清旭時綺忩髙掛紅銷帷香囊盛煙繡結絡翠羽拂案碧集作青琉璃吟披嘯巻紛無已皎皎淵機破一作碎妍理詞縈綵翰紫鸞廽思耿寥天碧雲起碧雲起心悠哉境深轉苦坐自催金梯珠一作玉履聲一斷瑶瑎日夜生青苔青苔閟九闗曽比群玉山神仙杳何許遺逸滿人間君不見洛陽南市賣書肆有人買得研神記紙上香多蠧不成昭容題處猶分明令人惆悵難為情春䑓引寒食集畢録事宅作陳子昻感陽春兮生碧草之油油懐宇宙以傷逺登髙䑓而冩憂遲美人兮不見恐青嵗之遂集作還遒從畢公以酣飲寄林塘而一留綵芳蓀於北渚憶桂樹於南洲何雲木之英麗而池舘之崇幽星䑓秀士月旦諸子嘉一作喜青鳥之辰迎火龍之始挾寳書與瑶琴芳蕙華而蘭靡乃掩白蘏藉緑芷酒既醉樂未巳擊青鍾歌渌水怨青春之萎絶贈瑶䑓之旖旎願一見而道集作尊意結衆芳之綢繆曷余情之蕩漾集作瀁獨青雲以増愁悵三山之飛鶴憶海上之白鷗且曰群仙去兮青春頺嵗華歇兮黄鳥哀富貴榮樂㡬時兮朱宫碧堂生青苔白雲兮歸來姑蘇䑓釋皎然古䑓不見秋草凄却憶呉王全盛時千年月照秋草上呉王在時㡬廻望至今月出君不還世人空對姑蘇山山中精靈安可覩轍跡人蹤麋鹿聚嬋娟西子傾國容化作寒陵一堆土司天䑓白居易司天䑓仰觀俯察天人際羲和死來職事廢官不求賢空取藝昔聞西漢元成間下陵上替集作上陵下替謫見天北辰㣲暗少光色四星煌煌如火赤耀芒動角射三台半見集作上台半㓕中台坼是時非無太史官眼見心知不敢言明朝趨入明光殿唯奏慶雲夀星見天文時變兩如斯九重天子不得知不得知安用䑓髙百尺為連昌宫詞元稹連昌宫中滿宫竹嵗乆無人森似束又有墻頭千葉桃風動落花紅簌簌宫邉老翁為余泣少年選進集作進食因曽入上皇正在望仙樓太真同凭欄干立樓上樓前盡珠翠炫轉熒煌照天地歸來如夣復如痴何暇備言宫裏事初過寒食一百六店舍無煙宫樹緑夜半月髙絃索鳴賀老琵琶定塲屋力士傳呼覔念奴念奴潜伴諸郎宿湏臾覔得又連催特勅衘中許燃燭春嬌滿眼一作眠睡紅銷掠削雲鬟旋装束飛上九天歌一聲二十五郎吹管逐逡廵大遍梁州徹色色龜茲轟緑續李謩擪笛傍宫墻偷得新飜數般曲平明大駕發行宫萬人皷舞在途集作途路中百官隊仗避岐薛楊氏諸姨車鬬風明年十月東都破御路獨一作猶存禄山過驅令供頓不敢藏萬姓無言集作聲淚潜墮兩京定後六七年却尋家舍行宫前莊園燒盡有枯井行宫門閉文粹作闥樹宛然爾後相傳六皇帝不到離宫門乆閉徃來年少説長安元武樓成花蕚廢去年勅使因破竹偶值門開暫相逐荆榛櫛比塞池塘狐兎驕癡縁樹木舞榭欹傾基尚在集作存文窻窈窕紗猶緑塵埋粉壁舊花鈿鳥啄風筝碎珠玉上皇偏愛臨砌花依然御榻臨階斜蛇出鷰巢盤闘拱菌生香案正當衙寝殿相連端正樓太真梳洗樓上頭晨光未出簾影黒至今反挂珊瑚鈎指似集作向旁人因慟哭却出宫門淚相續自從此後還閉門夜夜狐狸上門屋我聞此語心骨悲太平誰致亂者誰翁言野父何分别眼見耳聞為君説姚崇宋璟作相公勸諌上皇言語切爕理隂陽禾黍豐調和中外無兵戎長官清强集作平太守好㨂選皆言由相公開元欲集作之末姚宋死朝廷漸漸由妃子禄山宫裏養為集作兒虢國門前閙如市弄權宰相不記名憶得依稀集作依稀憶得楊與李廟謀集作謨顛倒四海摇五十年來作瘡痏今皇神聖丞相明詔書纔下呉蜀平官軍又取淮西賊此賊亦除天下寕年年耕種宫前道今年不遣子孫耕老翁此意深望幸努力廟謀休用兵驪宫髙白居易髙髙驪山上有宫朱樓紫殿三四重遲遲兮春日玉甃暖兮温泉溢嫋嫋兮秋風山蟬鳴兮宫樹紅翠華不來嵗月乆墻有衣兮瓦有松吾君在位已五載何不一幸乎其中西去都城㡬多地吾君不來集作有深意一人出兮不容易六宫從兮百司偹八十一車千萬騎朝有宴飫暮有賜中人之産數百家未足充君一日費吾君修已人不知不自逸兮不自嬉吾君愛人人不識不傷財兮不奪集作傷力驪宫髙兮髙入雲君之來兮為一身君之不來兮為萬民集作人滕王閣歌王勃滕王髙閣臨江渚珮玉鳴鸞罷歌舞畫棟朝飛南浦雲珠簾暮捲西山雨閒雲潭影日悠悠物換星移度㡬秋閣中帝子今何在檻外長江空自流兩朱閣白居易兩朱閣南北相對起借問何人家貞元雙帝子帝子吹簫雙得仙五雲飄颻迎集作飛上天第宅亭䑓不將去化為佛寺在人間粧閤集作閣妓樓何寂静桞似舞腰池似鏡花落黄昏悄悄時不聞皷集作歌吹聞鍾磬寺門勑牓金字書尼院佛庭寛有餘青苔明月多閑地比屋齊集作疲人無一作何處居憶時平陽宅初置呑併平人㡬家地仙去雙雙作梵宫漸恐人家集作間盡為寺南園李賀方領蕙帯折角巾杜若已老蘭芷集作苕春南山削秀藍玉合小雨歸去飛長集作凉雲熟杏暖香梨葉老草銷集作梢又註作滿竹柵鏁池根集作痕注作漘鄭公鄉老開酒盎坐泛楚奏集作酒吟招䰟金谷園歌韋應物石氏滅金谷園中水流絶當時豪右争驕侈錦為歩障四十里東風吹花雪滿川紫氛集作氣凝閣朝景妍洛陽陌上人廽首絲竹飄颻入青天晋武平呉恣懽醼餘風靡靡朝廷變嗣世衰㣲誰肯憂二十四友日日空追逰追逰詎可足共惜年華促禍端一發埋恨長百草無情春自緑勞勞送亭歌亭在江寕南十五里古送别之所一名臨凔觀李白金陵勞勞送客堂蔓草離離生道傍古情不盡東流水此日悲風愁白楊我乗素舸同康樂朗詠清川飛夜霜昔聞牛渚吟五章今來何謝袁家郎苦竹寒聲動秋月獨宿空簾歸夣長此日集作此地宿東溪李十五山亭王季友上山下山入山谷溪中落日留我宿松石依依當主人主人不在意亦足名花出地兩重階絶頂平天一小齋本意由來是山水何用相逢語一作話舊懐奉和禮部李尚書酬楊著作竹亭歌權徳輿直城朱戸相邐連九逵丹轂聲闐闐春官自有花源賞終日南山當目前晨摇玉珮趨温室暮入竹蹊集作溪疑洞天煙銷雨過㸔不足晴翠鮮颷逗深谷獨謡一曲泛流霞閑對千竿連净緑縈廽疏鑿隨勝地石磴巖扉光景異虛齋寂寂清籟吟幽澗紛紛雜英墜家承麟趾貴劔有龍泉賜上奉明時事無事人間方外興偏多能以簮纓狎薜蘿嘗通内學青蓮偈更奏新聲白雪歌風入松雲歸棟鴻飛滅處猶目送蝶舞閒時忽成夣集作夣忽成蘭䑓有客叙交情返照中林曵履迎集作聲直為君恩集作思催造膝東方辨色謁承明蕭常待癭栢亭歌盧綸栢之異者山中靈好人截斷為君亭雲翻浪巻不可識鳥獸成形花倒植莓苔舊㸃色尚青霹靂殘痕節猶黒金貂主人漢三老構此窮年下朝早心規目製不暫疲匠者受詞無一詞清晨拂匣菱生鏡落日凭欄星滿池攅薨闘拱無斤跡根癭聯懸同素壁數層亂冩雲裏峰萬片争呈雪中石重簾不動自飄香似到􅌡洲白雪集作玉堂水精如意方同集作全色雲母屏風遂掩光四堦綿綿被纎草草上依㣲衆山道松間汲井煙翠寒洞裏圍碁天景好愚儒敢欲賀成功鸞鳯栖翔固不同應念廢材今接地一枝思寄戸庭中白沙亭逄呉叟歌韋應物龍池宫裏上皇時羅衫寳帯香一作春風吹滿朝豪士今已盡欲話舊逰人不知白沙亭上逄一作遭呉叟愛客脱衣且沽酒問之執㦸亦先朝零落艱難却負樵親觀文物蒙雨露見我昔年侍丹霄冬狩春祠無一事歡逰洽醼多頒賜嘗陪夕月行宫齋毎返温泉㶚陵醉星嵗再周十二辰爾來不語今為君盛時忽去良可恨一身集作生坎壈何足云經行髙適封丘作我本漁樵孟諸野一生自是悠悠者乍可狂歌草澤中寜堪作吏風塵下只言小邑無所為公門百事皆有期拜迎官長心欲破集作碎鞭撻黎庻令人悲歸集作悲來向家問妻子舉家盡笑集作道今如此生事湏依集作應湏南畆田世情付與東流水夣想舊山安在哉為衘君命日集作且遲廽乃知梅福徒為爾却集作轉憶陶潜歸去來發閬中歌杜甫前有毒蛇後猛虎溪行盡日無村塢江風蕭蕭雲拂地山木慘慘天欲雨女病妻憂歸意速秋花錦石誰復數别家三月一書來集作得書避地何時免愁苦金陵歌送别范宣李白石頭巉巖如虎踞陵波欲過滄洲集作江去鍾山龍盤走勢來秀色横分厯陽樹四十餘帝三百秋功名事跡隨東流白馬小兒集注作金鞍誰家子泰清之嵗來闗囚集注作吹唇虎嘯鳯凰樓金陵昔時集作日何壮哉席巻英豪天下來冠盖散為煙霧盡金輿玉座一作輦成寒灰扣劔悲吟空咄嗟梁陳白骨亂如麻天子龍沉景陽井誰歌玉樹後庭花此事傷一作北地悲心不能道城集作目下離離長春草送爾長江萬里心他年來訪南山皓梁園吟見三百三十六巻李白襄陽歌見二百一巻李白長安道見一百九十二巻韋應物鄴城引張鼎君不見漢家失綂三靈變魏武争雄六龍戰盪海呑江制中國廽天運斗應南面隠隠都城紫陌開迢迢分野黄星見流年不駐漳河水明月俄終鄴國宴文章猶入管絃新帷座空銷狐兎塵可惜望陵歌舞處松風四靣暮愁人鴻門行袁瓘少年買意氣百金不辭費學劔西入秦結交北逰魏秦魏多報人與代亦殊倫由來不相識皆是暗相親寳馬青絲轡狐裘貂䑕服一作皮晨過劇孟逰暮投咸陽宿然諾本云云諸侯莫不聞猶思百戰術更逐李將軍始從㶚陵下遥遥度朔野北風聞楚歌南庭見胡馬胡馬秋正肥相邀夜合圍戰酣烽火滅路斷救兵稀白刄縱横逼黄塵飛不息虜騎血灑衣單于淚霑臆獻凱雲䑓中自言塞上雄將軍行失勢部曲遂無功新人不如舊新一作舊人不相救萬里長飄飄十年計不就棄置難重論驅馬度鴻門行㸔楚漢事不覺風塵昏寳劔中夜撫悲歌聊獨舞此曲不可終曲終淚如雨顧渚行寄裴方舟釋皎然我有雲泉隣渚山山中茶事頗相闗鶗鴂鳴時芳草死山家漸欲収茶子伯勞飛日芳草滋山僧又是採茶時由來慣採無近逺隂嶺長兮陽崖淺大寒山下葉未生小寒山中葉初巻二山名吳姹携籠上翠㣲蒙蒙香刺罥春衣迷山乍被落花亂度水時驚啼鳥飛家園不逺乗露摘歸時露綵猶滴瀝初看抽出欺玉英更取煎來勝金液昨夜西風雨色過朝尋新茗復如何女宫露澁青芽老堯市人稀紫筍多紫筍青芽誰得識日暮探疑作採之長太息清冷真人待子元仙傳清冷真人裴君與道人真子元為友貯此芳香思何極武源行前人昔年群盗阻江東呉山動摇楚澤空齊人示戴二字疑蜂蠆毒羙稷化為荆棘叢匃匃四顧多窑宂浮雲白波不妨同萬人死地當虎口一旦生涯懸皷中昨日將軍狥死節悉何生昏二字疑䧟成血胷中豹畧張陣雲握内蛇矛揮白雪長州南去接孤城居人散盡皷謲疑驚三春不見芳草色四面惟聞刁斗聲此時狂㓂紛如市君當要衝固深壘縱横計出皆獲全士卒身先毎輕死掃平氛祲望呉門人閑嵗羙桑柘繁比屋全生受君賜連營罷戰頂君恩如何弃置功未録通籍無名滯江曲灞亭不重李將軍漢爵猶輕蘇屬國荒營寂寂隠山椒春意空驚故栁條野戰攻城只如此即今誰是霍嫖姚過荆門歌李紳荆江水闊煙波轉荆門路遶山葱蒨㠶勢侵雲㓕又明山呈疑作程背日昏黄見青青麥壠啼飛鴉寂寞野逕棠梨花行行驅馬萬里逺漸入煙嵐危棧賖林中有鳥飛幽谷月上千巖一聲哭腸斷思歸不可聞人言恨魄來巴蜀我聴此鳥祝我魂死勿學此聲衘寃縱為羽族莫栖息直上青雲呼帝閽此時山月如衘鏡巖岫參差互輝映皎㓗深㸔入澗泉分明細見樵人逕隂森鬼廟當郵亭鷄豚日宰聞羶腥愚夫禍福自迷惑魍魎慿何通百靈月低山曉問行客已酧椒漿拜荒陌惆悵忠貞徒自持誰祭山頭望夫石文苑英華巻三百四十三
