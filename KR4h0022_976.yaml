body:
  text: 文苑英華卷九百七十七宋李昉等編行狀七工部尚書致仕崔淙行狀一首左金吾大將軍栁晟行狀一首浙江西道觀察使崔郾行狀一首吏部侍郎沈傳師行狀一首銀青光祿大夫守工部尚書致仕上柱國中山郡開國公食邑二千户贈陜州大都督博陵崔公行狀吕溫曽祖諱承福皇朝大中大夫廣越二府都督祖諱先意皇朝朝議大夫鄧州刺史父諱巘皇朝朝議大夫鄭州長史贈左散騎常侍狀斧藻天理立為人極敬終端本彼所以將就誠明褒殁勸存此所以砥礪名教然而以道行已晦而彌光大君子之行也以法考行直而無黨賢有司之職也且曰獻狀則唯所知公清莊而和博厚而敏岐嶷而夙茂羇貫集作丱而老成性約情充靜專動直出入孝悌周旋忠信始以眀經上第調佐夏陽次以詞麗甲科超尉王屋事迫於官而舉言迫於事而揚欲藏智而䝉稚來求不近名而聲華見逼故相左僕射張公時尹洛京首得才實洎鎮荆蜀致於幕庭再兼理官專領記室捷集作健筆良畫二邦有聞旋遘內艱毁瘠僅立善居得禮族黨稱之免喪之歲天子南狩太尉西平王大會兵車將圖匡復公首膺辟任濬發義心琴未成聲履及於路感激而將星芒怒謀謨而兵祲廓清翠華既還優典斯及拜殿中侍御史時有寵臣為京兆者政以暴聞吏有寃弊公表陳枉直伏閣待旦言忠主悟事寢風生以繩違稱職轉侍御史以求瘼慎選為華原令大兵之後旱歲為虐公勞徠不倦弛張以宜復流庸於潤屋闢曠土為多稼俄改歙州刺史地雜歐駱號為難理下車而簡其約束期月而明其信誓然後破散溪衆剪鋤山豪既去害羣之姧遂寧挺集作挻險之俗徴拜長安縣令威聲先路不肅而理鋩刃餘地所投皆虛擢同州刺史國歉於豐量賑為糴號里倉者三百所而凶年備矣戒以暴骸諭之速朽成薄葬者九百家而奢俗懲矣郡人有豪奪鄉惸隂持吏夫朋構訟集作紛獄纍政患之集作所患公斷以尋斧破其囊橐人樂其殺而法制行焉郡城自禦冦之餘復隍殆盡朝貢所經夷夏何仰公悅使襁負大興版築下不知役而扁固立焉其餘則去思有碑詳在篆述可覆視也朝議陟明遷於陜服封介晋楚寄分函洛而戒備不修兵庫虛閉公乃鳩工以利器閲實以練卒金革中度義勇知方既而有淮西之役晨令暮具凛然而可觀矣河出城下造舟為梁經費僝集作始匪工敗决相繼公乃沉石而雙固中沚省艦而三分巨流集作渠水與意會勢若天成既而有奔濤之沴智勝功顯終然而無害矣其餘則三降璽書就加爵秩是明徴也移疾入覲二職冬官歸載不過圖書留府盈乎粟帛豐公約私於是乎在至既陳乞以尚書致仕集作政室不交要路之賔口不言當代之事就隂委順談者多之公自解巾至於撤樂思不踰矩動無集作不越思以忠貞為仕模以勤儉為家訓身居侯邸清節如初男降王姬素風愈厲羈孤聚室人各忘其亡布褐分庭士不知其貴體溫柔而事至能斷性坦易而物莫得窺集作能窺當官不務於名聲所去必遺其功利氓謡尚在時論可徵已踰書葬之期請舉易名之典謹狀元和三年四月日故銀青光祿大夫守工部尚書致仕贈陜州大都督博陵崔公從彌集作外生甥朝議郎司封貟外郎上騎都尉賜緋魚袋吕溫謹上尚書考功夫立身之道始於君親中於其人終於其身若府君者居喪有聞臨難有功善其始也勤於官業惠於鰥寡敬其中也家事以理年至而退謹其終也率是三懿光于前訓以咨諡法無愧至公謹狀銀青光祿大夫檢校户部尚書左金吾大將軍兼御史大夫上柱國河南縣開國公食邑二千户贈紫金魚袋太子少保栁公行狀沈亞之曽祖該皇任陵州録事參軍贈陵州刺史祖岑皇贈祕書監父潭皇太僕卿駙馬都尉贈司空狀公諱晟其先河東人也肅宗時詔取儒賢配主其父以門業集作葉中選拜太僕卿尚和政公主主及太僕繼喪而公年始十二孝聞宫姻既去喪代宗憐之召飬宫中令與皇太集無太字子諸王俱受學故公得通籍中禁詔以吳大瓘為之師又以大瓘子通𤣥通微互為助教令十日考學績責集無此字勸所進乾元初除尚舍奉御得歸故邸又詔吳大瓘通𤣥通微令就舍授學廣德中加檢校太常卿賜佩金魚及德宗即位以公故奉銅輦將欲加賜遷官集作宫非未幾而屬車西狩矣公徒走會難奉天因泣奏曰臣願得尺詔持而入東都購其豪人以為效德宗嘉集作竒其忠賜詔如奏公於是傭裝入賊軍中見賊僞右將軍郭常左將軍張光晟公大說曰隂潦之災魚鱉遊其墀壇即陽光赫眀是輩不知枯挂之地者公等寧能從其挂哉乃出詔示常等皆奉詔伏興集作與誓約所歸未及期會樞籍宦官朱既昌隂以公之狀飛告泚遂為泚捕繫定死矣泚詰二將詞不伏即徙於外獄稍寬之有頃賊兵纍敗守吏益怠公因其共繫者十餘人謀相與脫其錮髠而走之奉天德宗為之撫背流涕明日乘集作宸輿幸漢中公奉轡至南梁還拜原王府長史貞元六年改嘉王府長史其後集作歲餘翰林舍人吳通𤣥謫死公為疏陳雪冉進不得命公之季止公曰上方怒寧可為也公不聽公章卒三貢於是德宗寤之謂公見義不回賜書寵勞竟雪通𤣥改灃州别駕十一年入為少將作永貞初遷大將作加朝請大夫起崇陵功以檢校左散騎常侍居使內作封河東縣開國子食邑五百户又加銀青光祿大夫起豐陵功贈上柱國元和初西蜀叛發岐隴邠涇朔方太原及山東六郡之卒皆屬長武軍詔以髙崇文討之既誅三蜀大困而漢中最險狹益不能賑輸所奉中朝以公集作器用當濟遂拜工部尚書兼御史大夫持節帥漢中始詔諸征蜀卒各還故部而獨以漢中卒三千人移戍梓州其卒以為始去父母鄉里既勞而歸及境乃不得見其閭亦以公集無此字功自賴今則徙之謂若謫耳皆蜂集作鋒奮食所引刃援弓迫中貴人時公行未及郡聞之遂疾驅倍走往其所先勞之苦辛集作卒是勞已乃問曰君等何以而成功乎俱曰某等伐闢耳又問曰闢何以而得伐俱曰驕不受指於天子公曰君等既知闢以不受指而得伐又親滅之而得功反不受指耶今不受指即受滅也集作矣士卒皆免胄匍匐遂行所徙歲餘復入為大將作使胸奴先是戎相出視國使必自據偃以相辱傲公知之乃先謂曰聞若等常以去信為強亡禮自大禮信不為誠不仁也何足奉吾國乎於是單于諸王貴人聞之愕然失恃皆莫能辭見則改容跪伏遂致天子之命約信成禮而歸拜金吾右將軍始得居公爵益封千五百户加為大金吾九年加户部尚書以大金吾為左將軍元和十三年三月九日殁享年六十九上聞之一日廢聽奏詔令集作命從官臨弔之賜賻粟帛贈太子少保強辨多學謙下好問因危以致其節見義不顧其私輸公之急某從寮其門得備前行謹以所聞所見實録於斯謹狀元和十四年七月十七日狀銀青光祿大夫檢校禮部尚書兼御史大夫充浙江西道都團練觀察處置等使上柱國清河郡開國公食邑二千户贈吏部尚書崔公行狀杜牧曽祖綜皇任醴泉縣令祖佶皇任太子中允贈右散騎常侍父倕皇任檢校吏部侍郎集作郎中兼御史中丞袁州刺史贈太師公諱郾字廣略風儀秀偉神深氣集作氣深厚即之如鑑望之如春既冠識者知不容於風塵矣貞元十二年進士集無二字中第十六年平判入等授集賢殿校書郎陜虢觀察使崔公琮願公為賔而不樂之挈辭載幣使者數返公徐為之起且曰不關上聞攝職可也受署為觀察巡官後轉京兆府鄠縣尉遷監察御史殿中侍御史刑部貟外郎丁邠國太夫人憂杖而能起人有聞焉服除拜吏部貟外郎判南曹事千人百族必應進而進公親自挾格肖法必留戾程必黜每懸榜舉牘富室權家汗而仰視不敢出口宿吏逡巡縛手係舌願措一奸不能得之凡二年遷左司郎中加朝散大夫旋拜諌議大夫兼知匭使穆宗皇帝春秋富盛稍以畋遊聲色為事公晨朝正殿揮同列進而言曰十一聖之功德四海之大萬國之衆之治之亂唐書本傳作治其亂懸於陛下自山以集作已東百城千里昨日得之今日失之西望戎壘距宗廟十舍百姓憔悴蓄積無有願陛下稍親政事天下幸甚誠至氣直天子為之動容斂神慰而謝之遷給事中敬宗皇帝始即位旁求師臣今相國竒章公上言曰非公不可遂以本官充翰林侍講學士命服紫金旋拜中書舍人仍兼舊職侍帝郊天加銀青光祿大夫髙承簡罷鄭滑節度使滑人仰集作叩闕乞為承簡樹德政集作政德碑內官進曰翰林故事職由掌詔學士上曰承簡功臣𦙍也治吾咽喉地克有善政罷而請紀入人深矣吾以師臣之辭且寵異焉居數月魏博節度使史憲誠拜章請集作謂字為故帥田季安樹神道碑內官執請亦如前辭上曰魏北燕趙南控成臯天下形勢集作勝地也吾以師臣之辭且慰安焉居數月陳許節度使王沛拜章乞為亡父樹神道碑內官執請亦如前辭上曰許昌天下精兵處也俗忠風厚沛能撫之吾視如臂吾以師臣之辭而彰其忠孝焉是三者皆御札命公令刻其辭恩禮親重無與為比歷歲願出守本官辭懇而禮部缺侍郎上曰公可也遂以命之二年選士七十餘人大抵後浮華先行實轉兵部侍郎今上即位四年公亟請於丞相閣曰願得一方疲人而治之除陜虢觀察使兼御史大夫先是陜之官人必月尅俸錢五千助輸貢于京師者歲至八十萬公曰官人不能贍私安能恤民吾不能獨治安可自豐即以常給兼使雜費下至于鹽酤膏薪之品十去其九可得八十萬歲為代之官人感悅隨至短長不忍為欺萬國西走陜實其衝復有江淮梁徐許蔡之戍兵北出朔方上郡回中汧隴間踐更往來不虛一時民之供億吏須必應生活之具至于瓶缶集作缶筯是常碎於四方之手公曰此猶束炬以焚民也於是節宴賞截浮費凡金漆陶木絲枲之用悉為具之可饗數千人民一不知復有詔㫖支稅粟輸太倉者歲數萬斛如斂民也逺逺近近就積佛寺終輸於河復籍集作藉民而載之民之巨牛大車半頓于路前政咸知計不能出公曰管仲曰粟行五百里民有饑色斯言粟重物也不可推遷民受其弊况今迂直之計有不翅五百里乎公乃大索有無親執籌而計之北臨黃河樹倉四十間穴倉為槽下㴻集作注于丹因隙償集作賞非直不敗時務自壯者斛幼者斗負挈囊裹委倉而去不知有輸他境之民越逸奔走駢軫爭鬪願為陜民政成化行上國下國更口贊頌凡二年改鄂嶽安黃蘄申等州觀察使囊山帶江三十餘城繚繞數千里洞庭百越巴蜀荆漢而會注焉五十餘年比集作北非有蔡盜於是安鎖三關鄂練萬卒皆傖楚善戰浸有戰風稱為難治有往自集作自往矣公始臨之簡服伍旅修理械用親之以文齊之以武大創廳事以張威容造䝉衝小艦上下千里武士用命盡得羣盜公曰劫於水者以盡殺為習雖值童耉而無捨焉比附他盜刑不可等於是一死之內必纍加之盜相誡曰公之未去勿觸其境然後黜并奸冒用公法也升陟亷能用公舉也撫護窮約用公惠也豪商大賈不得輕役不得隱田父子兄弟不得同販於是闔境之內有餘不足自公而均復建立儒宫置博士設生徒廪餼必具頑惰必遷敬讓之風人知家習八年秋江水漲溢公曰安得長堤而禦之言訖兵集作軍士齊民雲鍤雨杵一揮立就令行恩結有如此者千里之內如視堂廡雖僻左下里歲臘男子必以雞黍賀饋女子能以簮瑱相問遺富樂歡康肩於古治凡五年遷浙西觀察使加禮部尚書公曰三吳者國用半在焉因髙為旱因下為水者六歲矣經賦兵役不減於民上田沃土多歸豪強荀悅所謂公家之惠優於三代豪強之酷甚於亡秦今其是也於是料民等第籍地沃瘠集作塉均其征賦一其徭役經費宴賞約事裁節民有宿逋不可减於上供者必代而輸之誠禱山川歲獲大稔復曰衣冠者民之主也自艱難已來軍士得以氣加之商賈得以財侮之不能自奮者多栖於吾集作吳土遂立延賔館以待之苟有一善必接盡禮因訪里閭必集作益知民之疾苦隨以理之才逾期嵗而吳民復振開成元年十月二十日薨于治所多士相弔曰使公相天子貞觀開元之俗可期而見也豈公不幸實生民之不幸也主上痛悼輟朝一日贈吏部尚書公生知集作得靈和自干名立朝為公卿為侯伯未嘗須臾間汲汲牽率欲顯名於合道而仁義忠信明知恭儉鬱積發溢自然相隨不立結約集作約結而善人自親不設溝壘而不肖自逺不志於榮逹而官位自及公內外閥閲源流集作派清顯拔於甲族而復甲焉親昆仲六人皆至逹官公與伯兄季弟五司禮闈再入吏部自國朝以來未之有也上至公相方伯下及再命一命幕府陪吏之屬遍滿內外皆公門生公俯首益恭如孤臣客卿愓愓而多畏也自為重鎮苞苴金幣之貨不至權門親戚舊故周給衣食畢其婚喪悉出俸錢不以家為在家怡然未嘗訓勉子弟自化皆為名人居室卑庳不設步廊賔至值雨則張蓋躡屐而就于外位初鎮于陜或束挺經月不鞭一人至於驛馬令五歲幸全則為代之著為定制曰致一物於必窮之地君子不為其為仁愛而臻於此及遷鎮鄂渚嚴峻刑法至於誅戮未嘗貰一等後一客或問於公曰陜鄂之政不一俱臻於理何也公曰陜土瘠民勞吾撫之不暇尚恐其驚鄂之土沃民剽雜以夷狄非用威刑莫能致理政貴知變蓋謂此也聞者服焉嗚呼公之德行材器真哲人君子沒而不朽者也易名定諡為國常典敢書光集作先烈逹於執事附于史氏云爾謹狀尚書吏部侍郎贈吏部尚書沈公行狀前人曽祖某皇任泉州司户參軍祖某皇任婺州武義縣主簿贈屯田貟外郎父濟皇任尚書禮部貟外郎贈太子少保公諱傳師字子言明春秋能文工集作攻書未弱集無此字冠知名我烈祖司徒岐公與公先少保友善一見公喜曰沈氏有子吾無恨矣因以馮氏表生女妻之貞元末舉進士許公孟容為給事中權文公為禮部侍郎時稱權許進士中否二公未嘗不相聞於其間者今其年禮部畢事文公詣許曰亦有遺恨曰為誰曰沈某一人耳許曰誰家子某不之知文公因具言先少保名字許曰若如是我故人子後數日徑詣公且責不相見公謝曰聞於丈人或拔致中第是纍丈人公舉遺其集作違某孤進故不敢自逹許曰至集無此字如公者可使我急賢詣公不可使公因舊造我眀年中第文公門生七十人時人比公為顔子聫中制䇿科授太子校書郎鄠縣尉直史館左拾遺左補闕史館修撰翰林學士歷尚書司門郎中二字集作貟外郎司勳兵部郎中中書舍人命服朱紫時穆宗皇帝親任學士時事機祕多考决在內必取其長循為宰相公之密補𢎞多同列每欲面陳拜章皆互來告公必取規議用為進退歲久當為其長者凡再公皆逡巡不就上欲面授之公奏曰學士院長參議大政出為宰相臣自知必不能為凡宰相之任非能盡知天下物情苟為之必致敗撓况今百姓甚困燕趙適亂臣以死不敢當願得治人一土集作方為陛下長飬之因出稱病集作疾特降中使劉泰倫起之公稱益篤故相國李公德裕與公同列友善亦欲公之起詞說甚切公終不出因詔以本官兼史職出歸綸閣久處密近思效用於外歷集作懇請於丞相不已由是出為湖南觀察使兼御史大夫凡三集作二歲轉為此下諸疑本並同疑有脫逸按舊唐書沈傳書出為湖南入為尚書右丞出為洪州轉宣州人困事繁惡易滋長官人調授少得防寬逺二字集作寃疏通蹊徑人情物理無不曲盡吏欲為欺於此照驗之端必眀於彼民有未伸於彼開張之路必在於此亹亹循環皆極根本為集作尤重刑罰杖十五至于死者每有一犯必具獄斷刑之後遍示幕府吏雖十人有一人以為小未可者必再詳䆒經費遊宴約事裁節歲有水旱不可减於常貢者必為代之江西宣州聮歲水災所貸萬計公善飬性情自居方伯生殺之任喜怒好惡是四者閉覆渾然雖終歲伺之不見毫髮故黠吏欲賊公之所向髙下其事終不可得每處一事未嘗不從容盡理故所至之處富庶歡康理行第一每去任人吏泣送出境不絶自宣城入為吏部侍郎二年考核集作覆搜舉品第倫比時稱精能宰物之望屬於僉議公每願用所長復治集作理於外及薨於位知與不知莫不相弔上悼惜輟朝一日贈吏部尚書與公先少保俱掌國史撰憲宗實録未竟出鎮湖南詔以隨之成於理所時論榮之公生得靈粹沛然而仁自幼及長未嘗須臾間汲汲牽率欲及於道溫良恭儉明智忠信內積外溢自然相隨自布衣至於逹官凡所交友皆當時名公奬美所長復救所不及三十年間無有携問者公常居中雖有重名每苦於飢寒兩求亷鎮時宰許之皆先要公曰欲用某為從事可乎公必拒之至有怒者公曰誠如此願息所請故三集作一鎮幕府皆取孤進之士未嘗有吏一人因權執入嘗擇邸吏尹倫倫戅滯闕事寮佐多言集作憲之因請易之公曰某出京師面誡倫曰止可闕事不可多事是倫適能如此受不虛矣故三集作二鎮號為富饒凡十年間權勢貴幸之風不及於公耳苞苴寶玉之賂亦不至於權門雖有怒者亦不敢以言議公公然一作前後侵公其為守道自得皆如此類在家無杖笞呵責家人自化兄弟生姓雖絶服者入門飲食衣服指使其奴婢無二等親戚故舊周給所得皆出俸錢不以家為於京師開集作問化里致疑作置第價錢三百萬訖三一作二鎮牽率滿之及在牀之日周身之飾易以任器京師仕一作士人雜然言議以為非今日之有指為異事嗚呼公之德行可以稱古之集無之字君子矣牧分實通家義惟集作推先執復以孱昧集作耿叨在賔席幼熟懿行長奉指教撇集作泣涕撰記以備闕以附于史氏云爾謹狀文苑英華卷九百七十七
