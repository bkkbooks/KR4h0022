body:
  text: 文苑英華巻四百三十二宋李昉等編赦書十三立太子赦書詔沈約門下朕夙纘璿祚君臨四方夕惕寅畏若寘淵谷思所以光闡洪基克隆鼎命王公卿士咸以為樹元立嫡有邦所先守器傳統於斯為重是用俾茲㓜䝉體乾作貳永固宗祀以貞萬國元良之寄非獨在余宜令嘉慶被之億兆可大赦天下賜民為父後者爵一級主者速施行冊太子禮畢赦文玉堂遺範門下朕丕承寶圖撫有方夏夙夜寅畏不敢遑一作荒寜永惟祖宗之洪業歴考皇王之令典思所以垂統立極事神保人推明至公安固大本尊廟祧而主匕鬯嚴社稷而奉粢盛俾開春闈乃命元子斯古人之通誼也皇太子寜清净一作明體仁莊敬好禮服典謨之誼一君親之誠允諧詢謀用建儲貳爰以吉日冊于明庭鼓鐘載和文物大備盛禮云畢慶感良深是宜布澤申恩自中達外厥有前躅舉而行之可大赦天下自元和四年十月十八日昧爽已前天下應犯死罪非殺人者降從流流罪已下逓减一等左降官未經量移者與量移文武常叅官及諸州府長官子為父後者賜勲兩轉應縁冊禮行事官賜階及勲爵有差鄧王府官量與進改夫輔翼元良教諭成徳使目覩正事耳聞正言形于施為漸于心術非齊莊忠慤之士不在兹選工部侍郎歸登給事中吕元膺並踐履端方行義修潔通於經訓而得其要達於教化而蹈其中侍講承華師範磐石訪乃公議副于精求並可充皇太子諸王侍讀登宜加一階元膺宜賜紫金魚袋天下孝子順孫先旌表門閭者委所管州縣各加存恤五嶽四瀆名山大川委所在長吏量加祭祀一作皆唐大詔令冊太子禮畢赦文崔羣門下王者司牧黎元紹膺統緒必建儲貳以貞家邦故春秋垂冡祀之文易象著震方之位朕屬承景運嗣守丕圖稽前王之令謨奉列聖之彛訓上以嚴宗祧之顧下以繫億兆之心無疆之休用崇主鬯祗荷成憲敢怠于懐皇太子恒忠孝温文率義由禮寛粹莊重自誠而明慶靈所積姿器夙茂能辨南陽之牘允符東海之貴承華載啟命以居之撰吉展儀神人允洽舉是典冊授之軒墀百辟在庭四方來賀以言承序所感則深永惟國詔令作固本為慶滋大宜𢎞欽恤之令亦覃命賜之恩與衆共之無逺不被可大赦天下自元和七年十月七日昧爽已前天下應犯死罪非殺人者逓減一等左降官流人並與量移如因流貶所亡殁及得罪之人並任歸葬文武常叅官及諸州府長官子為父後者賜勲兩轉應縁冊皇太子行事官加階賜勲爵有差文武常叅官及陪位官并宗子諸親賜勲一轉遂王府量與進官春闈毓徳肇錫嘉名磐石聯華義深敦序澶王寛宜改名惲深王察宜改名悰洋王寰改名忻絳王寮改名悟建王宻改名恪夫習近遷性聖賢所慎詳觀古昔輔正元良必惟其人朝夕講訓然後明君臣父子之道通禮樂教化之情自非學究宗源行可師範則無以膺兹茂選式是儀刑其皇太子及諸王侍讀宜委中書門下精擇二人具名奏聞天下孝子順孫先旌表門閭者及高年廢疾者委所管州縣各加存恤五嶽四瀆名山大川委所在長吏量加祭祀布告遐邇咸使聞知太和七年八月七日冊皇太子徳音編制門下帝者承天地貞邦國法明離之象固鴻基一作業之本必命元子以備儲闈斯皇王之令謨古今之丕典朕祗受眷佑䖍奉寶圖欽若彛章光修聖緒皇太子永㓜禀仁智生知孝愛體温文以立徳資敏哲以保躬寛俗有常貞慎無怠爰膺盛禮俾奉青宫嚴宗廟主鬯之儀遵朝夕視膳之節冊命云畢感悦良深問安既慶於寢門布澤宜覃於天下可大赦天下自太和七年八月七日昧爽已前天下應犯死罪降從流流已下罪逓減一等惟官典犯贓及故殺人刼獄奪囚持杖强刼者不在此限左降官流人並與量移如應流貶及諸色得罪人所在亡殁並任歸葬宗周之盛實在於維城二漢之隆亦由於磐石自開元以後累聖子孫皆長於深宫罔知稼穡曾不得習詩書以備禮樂交氣類以叙人倫雖有間平之才莫施衛魯之政永言淪廢深軫朕懐諸王等宜以今年以後相次出閤具授𦂳望已上州刺史上佐觀其才能續有序用人倫所先婚禮為重笄年許嫁則有明文其十六宅諸府縣主一作亦宜擇選良偶以時出適仍委吏部於諸色選人中取情愿者揀選具名奏聞亦當别加優奬令久於其道政乃可成方鎮刺史三考已下不得輙議替换如理有異等委中書門下訪察就加寵奬如灼然可録者别與甄升其或政理有乖害及百姓者即不在滿三考限易譏豐屋傳美卑宫彫刻磨礱先賢所戒近者官纔陞於郎署位始至於都府一作符莫不高其門閥一作閈閎廣以池榭非惟僣侈踰制實亦耗蠧傷百姓財其百官第宅已造成者並許仍舊今已後如更有創立新宅及屋宇高大者並委御史臺彈紏必嚴加黜責御史臺所置六察分紏百司比來因循鮮能舉職起今已後諸司如有身名偽濫隠盗官錢及違法等他時發覺者本察御史並當貶斥考課之法前王所重盖以綜覈吏理勵精政途名實苟違將何勸激宜準故事置内外知考使兼令中書舍人給事中各一人監考百姓困窮弊由奸吏政苟不擾人皆自安其司農寺供宫内及諸司厨冬藏菜並委本寺自供其菜價仍委京兆府納每年時價支付更不得配京兆府和市其諸陵守當失宜委京兆府以價直送陵司令自雇召並不得差配百姓寒食杏仁雞子月進土蘇白麥樹栽選塲棘針修橋梁木等便於本户税錢内尅折不得更令和市天下諸州府應納義倉及諸色斛斗除凖式每斗二合耗外切宜禁斷仍委度支塩鐵分廵院及出使郎官御史切加訪察如聞今嵗所在豐稔其義倉斛斗先有借用處委户部勾當並湏及時填足文武常叅官及諸州府長官子為父後者賜勲兩轉縁冊太子攝太尉稱賀攝侍中承㫖宣制進中嚴外辦中書令讀冊授冊各賜爵一級其行事職掌官其就禮漢代用人皆由儒術故能風俗深厚教化興行近日苟尚浮華莫修經藝先聖之道理詔令無理字堙鬱不傳况進士之科尤要釐革雖鄉舉里選不可復行然務實抑華必有良術既當甚弊思有改張今寰宇乂寜干戈已戢皇太子方從師傳授六經一二年之後當令齒胄國庠以興墜典宜令國子監於諸道搜訪名儒置五經博士各一人其公卿士族子弟明年已後不先入國學習業不在應明經進士之限其進士舉宜先試帖經并畧問大義取經義精通者次試議論各一首文理高者便與及第其所試詩賦並停其試帖經官便以國子監學官充禮部不得别更奏請𢎞文兩館生齋郎並依令式試畢仍差都省郎官一作中兩人覆試湏責保任不得輙許代替苟渉情故必加罪責卿大夫者羣下舊唐書作下人之所視逺方之所倣若非恭儉克已廉貞化人而望其服從固不可得况朕不寶珠玉不御纎華逮于六宫皆務儉薄卿大夫得不叶朕此心一作志率先兆人比年所頒制度皆約國家令式去其甚者稍為一作謂得中士大夫苟自便身安於習俗因循未革以至于今百官士族起今年十月冬服裘已後其衣服輿馬並宜準太和六年六月十七日勅處如固違制度九品以上量唐書作重加黜陟其布衣五年不得舉選百姓軍人各委州府長吏漸施教化使自遵行不要便為禁制令其驚擾惠養疲人本於亷吏阜其生殖在絶貪求其諸道方鎮刺史等有聚歛貨財潛行饋遺者御史臺糾察以聞仍委度支鹽鐵分廵院同為訪察不得容放一作蔽親人之官切在守長及書寶引冊寶舁舉冊寶禮儀使禮官等三品以上賜爵一級四品已下加一階撰冊文官特加一階仍並賜物有差導引官各加一階造冊寶填金字裝寶人賜勲兩轉行事流外及禮生等各賜勲一轉文武官常叅官及陪位官并宗子諸親各賜勲一轉魯王府官未經進改者量與進改其皇太子侍讀宜委中書門下精擇二人具名奏聞天下孝子順孫先旌表門閭者及年高廢疾者委所管州縣各加存恤五嶽四瀆名山大川委所在長吏量加祭祀布告遐邇咸使聞知一作皆唐大詔令寶應元年皇太子監國頒天下赦文門下天下之本屬於一作于元良四方之民資其繼照是有傳歸之義必膺監撫之重克廣前烈與人守邦非君父之獨親俾生靈以一作之同戴朕號慕弓劒寢居縗絰頃以疾苦未能康寜殘寇猶虞中原多壘軍國大務理湏叅决乃眷匕鬯共承宗祧皇太子豫天縱聰明日躋徳業中興丕構已有大功問安寢門知九國之夢制勝戎閫高五官之才時方艱難禮在諒隂且以庶政委之元子宜令權知一無知字監國又以上天降寶獻自楚州神明告厯數之符金璧定妖灾之氣總集瑞命祗承鴻休因以體元叶于五紀其元年宜改為寶應元年建巳月改為正月其餘月並依常數仍依舊以正月一日為嵗首受兹福應佇以升平因日月之重光布雲雷之一作雲雨渥澤可大赦天下見禁囚徒罪無輕重并已發覺未發覺已結正未結正四月十五日昧爽已前一切放免左降官已量移者宜即更與量移近處流人一切放回有司更不得輙有類例條件其楚州刺史并出寶縣官及進寶官等量與進改隨進寶官與傔等各量與一官宣布中外咸知朕意主者施行一作皆唐大詔令籍田赦書見四百六十二巻張九齡文苑英華巻四百三十二
