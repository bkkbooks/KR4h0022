body:
  text: 文苑英華巻一百九十七宋李昉等編樂府六塞上十七首塞下十八首出塞二十八首塞外一首入塞二首塞上曲二首失名紅顔歲嵗老金微沙磧年年臥鐡衣白草城中春不入黄花戍上鴈長飛二孤城夕對戍樓閒廻合青𡨕萬仭山明鏡不湏生白髪風沙自解老紅顔同前二首一作塞下曲李白五月天山雪無花祗有寒笛中聞折柳春色未曽㸔曉戰随金皷宵眠抱玉鞍願将腰下劔直為斬樓蘭二烽火動沙漠連照甘泉雲漢皇按劔起還召李将軍兵一作殺氣天上合威聲隴底聞横行負勇氣一戰靜妖氛同前二首王昌齡秦時明月漢時關萬里長征人未還但使龍城飛将在不教胡馬度隂山二騮馬新誇白玉鞍戰罷沙塲月色寒城頭鐡皷聲猶振匣裏金刀血未乾同前薛竒童驕虜初南下烟塵暗國中獨召李将軍夜開甘泉宫一身許明主萬里總元戎霜中臥不煖半夜聞邊風明天早飛雪荒徼多轉蓬濕雲覆水重秋氣連海空金鞍誰家子上馬鳴角弓自是幽并客非論愛立功同前髙適東出盧龍塞集作間浩然客思孤亭候列萬里漢兵猶備胡邊塵漲一作滿北溟虜騎一作塞馬正南驅轉戰豈長策和親非遠圖惟昔李将軍按節出皇一作臨此都揔戎掃大漠一戰擒單于常懷感激心願效縱横謨倚劔欲誰語關山集作河空欝紆同前耿湋慣習干戈事鞍馬初從少小在邊城身微乆屬千夫長地逺仍親五郡兄懶説疆場曽大獲且悲年鬢老長征塞鴻過盡殘陽裏樓上凄凄暮角聲同前司空曙寒柳接胡桑軍門下大荒幕營隨日魄兵氣長星芒横吹催春酒重裘隔夜霜氷開不防虜青草滿遼陽同前戎昱慘慘寒日沒北風巻蓬根将軍領疲兵却入古塞門廻首指隂山殺氣成黄雲二樓上畫角哀即知兵心苦試問左右人無言淚如雨何意休明時終年事鼙皷集本有戎昱塞上曲二首題目同而詩異今附于此其一漢将歸來虜塞空旌旗初入玉關東高蹄戰馬三千疋落日平原秋草中其一胡風掠地遶連山葉落孤城未下關山頭烽子齊聲呌知是将軍夜獵還同前杜荀鶴旌旗獵獵漢将軍閒出廵邊帝命新沙塞旋收饒帳幕犬戎時殺少煙塵氷河夜度一作渡偷來馬雪嶺晴分獵去人獨作書生疑不穏軟弓輕劔也隨身同前張蠙邊事多更變天心亦為憂胡兵來作冦漢将也封侯夜燒衝星赤塞塵翳日愁無門展微略空上望西樓同前王貞白歲歲但防虜西征早晩休匈奴不繫頸漢将但封侯夕照低烽火寒笳咽戍樓燕然山上字男兒見湏羞同前裴説極目望空濶馬羸程又賖月生方見樹風定始無沙楚水辭魚窟燕山到鴈家如斯名利役争不老天涯同前常建翩翩雲中使來問大平卒百戰苦不歸刀頭望明月寒雲随陣落寒日傍城沒城下有寡妻哀聲哭枯骨塞下曲李白塞虜乗秋下天兵出漢家将軍分虎竹戰士泣一作臥龍沙邊月随弓影胡霜拂劔花玉關殊未入少婦莫長嗟同前三首王昌齡邊城一作頭何慘慘已𦵏霍将軍士卒皆來弔燕南代北聞功門一作勲多被黜兵馬亦尋分更遣黄龍戍唯當哭塞雲二蟬鳴空桑麻八月蕭關道出塞入塞雲處處黄蘆草從來幽并客皆共塵沙老莫作遊俠人矜誇紫騮好三奉詔甘泉宫揔徴天下兵朝廷備禮出郡國豫郊迎紛紛幾萬人去者無全生臣願節宫廏分以賜邊城同前陶翰文粹作王季友進軍飛狐北窮冦兵勢變日落沙塵昏背河更一戰駿一作騂馬黄金勒琱弓白羽箭射殺左賢王歸奏未央殿欲言塞下事天子不召見東出咸陽門哀淚如霰線一作哀哀淚如霰同前髙適結束浮雲駿翩翩出從戎且憑天子怒復倚将軍雄萬皷雷殷地千旗火生風日輪駐霜戈月魄勒琱弓青海陣雲匝黒山兵氣中萬里不惜死一陣得成功畫圖麒麟閣入朝明光宫大笑向文士一經何足窮古人昧此道徃徃成老翁二君不見芳樹枝春花落盡蜂不窺君不見梁上泥秋風始髙燕不棲蕩子從軍事征戰蛾眉嬋娟守空閨獨宿自然堪下淚况復時聞烏夜啼同前郎士元寶刀塞上兒身經百戰曽百勝壮心竟來嫖姚知白草山頭日初沒黄沙戍下悲歌發一作城下歌聲發蕭條夜靜邊風吹獨倚營門望秋月同前李益蕃門一作州部落能結束朝馳暮獵南河曲一作朝暮馳獵黄河曲燕聲一斷塞鴻飛牧馬羣嘶邊草緑秦築長城城已摧漢武北上單于臺古來征戰虜不盡今日還復天兵來黄河東流流九折沙塲埋恨何時絶蔡琰沒去造胡笳蘇武歸來持漢節為報如今都護雄匈奴且莫下雲中請書塞北隂山石願比燕然車騎功同前張籍秋塞雪初下将軍逺出師分營長記火放馬不收旗月冷邊帳濕沙昏夜探遲征人皆白首誰見滅胡時同前李賀胡角引北風薊門白於水天含青海道城頭見一作月千里露下旗濛濛寒金鳴夜刻蕃甲鏁蛇鱗馬嘶青塜白秋靜見旄頭沙逺席覊愁帳比天應盡黄河一作河聲出塞流同前姚合磧露黄雲下凝寒鼓不鳴戰湏移死地軍諱殺降兵卭馬秋遮虜蒸沙夜築城舊鄉歸不得都尉負功名同前馬戴旌旗倒北風霜霰逐南鴻夜救龍城急朝焚虜帳空骨銷金鏃在鬢改玉關中却想羲軒代無人尚戰功二廣漠雲凝慘日斜飛霰生燒山搜猛獸伏道擊廻兵風折旗竿曲沙埋樹杪平雲飛日一夕集作黄雲飛旦夕偏奏苦寒聲同前張喬勒兵遼水邊風急捲旌先絶塞隂無草平沙去盡天下營㸔斗建傳號信狼煙聖代垂青史當書破虜年同前張祐萬里配長征連年慣野營入羣來揀馬抛伴去擒生箭挿雕翎闊弓盤鵲角輕問㸔行近逺西去受降城同前陳陶邊頭能走馬猿臂李将軍射虎羣胡伏開弓絶塞聞海山諳向背攻守别風雲只為坑降罪輕車未轉勲二望胡關下戰雜虜䘮全師鳥啄豺狼将沙埋日月旗牛羊奔赤狄部落散燕耆都護凌晨出銘功瘞死屍出塞劉孝標薊門秋氣清飛将出長城絶漠衝風急交河夜月明䧟敵摐金鼓摧鋒揚斾旌去去無終極日暮動邊聲同前王褒飛蓬似征客千里自長驅塞禽唯有鴈關樹但生榆背山看故壘繫馬識餘蒲始皇縈蒲繫馬在淄州名蒲臺還因麾下騎來送月支圖同前竇威匈奴屢不平漢将欲縱横㸔雲方結陣却月始連營潜軍渡馬邑揚斾掩龍城㑹勒燕然石方傳車騎名同前二首楊素漠南胡未空漢将復臨戎飛狐出塞北碣石指遼東冠軍臨瀚海長平翼大風横虎落陣氣抱龍繞城虹横行萬里外轉戰百夫雄兵寝星芒落戰解月輪空嚴譙息夜斗騂角罷鳴弓北風嘶朔馬胡霜切塞鴻休明大道暨幽荒日用同方就長安邸來謁建章宫二漢虜未和親憂國不憂身握手河梁上窮涯北海濵據鞍獨懷古忼慨感良臣歴覽多舊迹風日慘愁人荒塞窮千里孤城絶四隣樹寒偏易古草衰恒不春交河明月夜隂山苦霧辰鴈飛南入漢水流西咽秦風霜乆行役河朔備艱辛薄暮邊聲起空飛胡騎塵同前二首薛道衡髙秋白露團上将出長安塵沙塞下暗風月隴頭寒轉蓬隨馬足飛霜落劔端凝雲迷代郡流水凍桑乾烽㣲桔槹逺橋峻轆轤難從軍多惡少召募盡材官伏波一作堤時臥皷疑兵乍觧鞍龍一作柳城擒冒頓長坂納呼韓受降今更築燕然已重刋還嗤傅介子辛苦刺樓蘭二邊庭烽火警挿羽夜徴兵少昊騰金氣文昌動将星長驅鞮汗北直指夫人城絶漠三秋暮窮隂萬里生寒夜哀笳曲霜天斷鴈聲旌旗連下鹿一作連旗下鹿塞疊皷向龍庭妖雲墜虜陣暈月遶胡營左賢能頓顙單于已繫纓絏馬登𤣥闕鈎鯤臨北溟當知霍驃騎髙第起西京同前二首和楊素虞世基窮秋塞草腓塞外胡塵飛徴兵廣武至候騎隂山歸廟堂千里策将軍百戰威轅門臨玉帳大斾指金徽摧朽無勍敵應變有先機銜枚壓曉陣巻甲解朝圍瀚海波瀾静王庭氛霧晞皷鼙嚴朔氣原野曀寒暉勲庸震邊塞歌吹入京畿待拜長安坂鳴騶入禮闈二上将三畧逺元戎九命尊緬懷古人節思酬明主恩山西多虜氣塞北有遊魂揚枹度隴坡勒騎上平原誓将絶沙漠悠然去玉門輕齎不遑舎驚䇿騖戎軒凛凛邊風急蕭蕭征馬煩雪暗天山道氷塞交河源霧烽黯無色霜旗凍不翻耿介倚長劔日落風塵昏同前楊烱塞外欲紛紛雌雄猶未分明堂占氣色華葢辨星文二月河魁将三千太一軍丈夫皆有志㑹是立功勲同前張柬之俠客重恩光􅍡馬飾金装暫聞傳羽檄馳突救邊荒歙野山川動囂天旌斾揚呉鈎明似月楚劔利如霜電斷衝胡塞風飛出洛陽轉戰磨笄俗横行載一作戴斗鄉手擒郅支長靣縳谷蠡王将軍占太白少婦怨流黄騕褭青絲騎娉婷紅粉粧三春鶯度曲八月鴈成行誰堪坐愁思羅袂拂空床同前喬備沙塲三萬里猛将五千兵旌斷氷溪戍笳吹鐡關城隂雲暮下雪寒日晝無晶直為懷思苦誰知邊塞情同前王之奐黄河逺上白雲間一片孤城萬仭山羌笛何湏怨楊柳春光不度玉門關同前王維居延門外獵天驕白草連山野火燒暮雲空磧時駐一作驅馬秋日平原好射鵰䕶羗校尉朝乗障破虜将軍夜渡遼玉靶角弓珠勒馬漢家将賜霍嫖姚同前五首杜甫戚戚去故里悠悠赴交河公行有程期亡命嬰祻羅君已富土境開邊一何多棄絶父母恩吞聲行負戈二出門日巳逺不受徒旅欺骨肉恩豈斷男兒死無時走馬脱轡頭手中挑青絲㨗下萬仭岡俯身試搴旗三迢迢萬餘里領我赴三軍軍中異苦樂主将寕盡聞隔河見胡騎倐忽數百羣我始為奴僕幾時樹功勲四挽弓當挽强用箭當用長射人先射馬擒冦先擒王殺人亦有限列國自有疆茍能制侵凌豈在多殺傷五從軍十年餘能無分寸功衆人貴茍得欲語羞雷同中原有爭鬬况在狄與戎丈夫四方志安可辭固窮同前三首一作後出塞男兒生世間及壮當封侯戰伐有功業焉能守舊丘召募赴薊門軍動不可留千金買馬鞭一作鞍百金装刀頭閭里送我行親戚擁道周斑白居上列酒酣進庶羞少年别有贈含笑看呉鈎二古人重守邊今人重髙勲豈知英雄主出師亘一作直長雲六合已有家四夷且孤軍遂使貔虎一作武士奮身勇所聞㧞劔擊大荒日暮收胡羣誓開𤣥𡨕北持以奉吾君三獻凱日繼踵兩蕃靜無虞漁陽豪俠地擊皷吹笙竽雲帆轉遼海粳稻來東呉越羅與楚練照耀輿臺軀主将位益崇氣驕凌上都邊人不敢議議者死路衢同前于鵠行人朝走馬直走薊城旁薊城通漠北萬里别呉鄉海上一烽火沙中百戰塲軍書發上郡春色度河陽裊裊漢宫柳青青胡地桑琵琶出塞曲横笛斷君腸同前三首㣲雲将出軍一作㣲雪将軍出吹笳天未明觀兵登古戍斬将對雙旌分陣瞻山勢潜軍制馬鳴如今新史上已有滅胡名二葱嶺秋塵起全一作收軍取月支山川引行陣蕃漢列旌旗轉戰疲兵少孤城外救遲邊人聖明代不見偃戈時三單于驕愛獵放火到軍城乗一作待月調新馬一作弩防秋置逺營空山朱㦸影寒磧鐡衣聲逢著降胡説沙隂有伏兵同前劉灣文釋作劉濟将軍在重圍音信絶不通羽書如星流飛入甘泉宫倚是并州兒少年心膽雄一朝隨召募百戰争王公去年桑乾北今年桑乾東死是征人死功是将軍功汗馬牧秋月疲人臥霜風仍聞左賢王更欲圍一作圖雲中同前劉駕胡風不開花四氣多作雪北人尚凍死况我本南越古來邊塞地廵狩無遺轍九土耕不盡武皇猶戰一作征伐中天有髙閣圖畫何時歇坐恐塞上山低於沙上一作中骨塞上鄭愔荒壘三軍夕窮郊萬里平海隂凝獨樹月氣下連營戎斾霜凝重邊裘寒更輕将軍猶轉戰都尉不成名折柳悲春曲吹葭斷夜聲明年漢使返猶築受降城入塞王褒戍乆風塵色勲多意氣豪建章樓闕逈一作近一作廻長安陵樹髙度氷傷馬骨經寒墜節毛行當見天子何假用錢刀同前王貞白玉殿論兵事君王詔出征新除羽林将曽破月支兵慣歴塞垣險能分部落情從今一戰勝不使虜塵生文苑英華巻一百九十七
