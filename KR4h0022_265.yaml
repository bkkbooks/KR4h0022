body:
  text: 文苑英華卷二百六十五宋李昉等編寄贈十九韓琮二首羅鄴四首髙極一首喻坦之三首張喬八首王貞白二首黄韜六首張蠙六首楊䕫一首羅隠十七首王轂一首曹松二首沈顔一首裴說五首唐彦謙六首李山甫一首晩春江晴寄友人韓琮晩日低霞綺晴山逺畫眉春青絶句詩選作青青河畔草不是望鄉時秋晩信州推院親友或責無書即事寄答前人官信安仁拙書非叔夜慵謬馳驄馬傳難附鯉魚封萬里勞何補千年運忝逢不量横草力虚慕入雲蹤潔水空澄鑑持鉛亦礪鋒月寒深夜桂霜凛近秋松憲摘無逃魏寃申得夢馮問貍将挾虎纎蠆敢虞蜂商吹移砧調春華改鏡容歸期方畹積愁思暮山重仙鼠猶驚燕莎雞欲變蛩唯應碧湘浦雲落及芙蓉聞友人入越幕因寄之羅鄴稽嶺春生酒凍銷煙鬟蒨袖恃嬌嬈峰邉聚雪晴香老波上長虹晩影摇正哭阮途歸未得更聞江筆赴嘉招人間榮悴真堪恨坐想征軒鬢未凋途中寄友人前人秋庭悵望别君初折柳分襟十載餘相見或因中夜夢寄來多是隔年書携樽座外花空老垂釣江頭柳漸疎裁得詩憑千里鴈吟來寧不憶吾廬赴職單于留獻所知前人職忝翩翩逐建牙笈隨征騎入胡沙定将千里書憑鴈應看三春雪似花年長有心終報國時清到處便營家逢秋不擬同張翰為憶鱸魚却嘆嗟下第書懐寄友人前人清世誰能辨陸沉相逢休作憶山吟若敎仙桂在平地更有何人肯苦心去國漢妃還似玉亡家石氏豈無金且安懐抱休惆悵琴瑟調髙樽酒深及第後贈試官髙極公子求賢未識真欲将毛遂比常倫當時不及三千客今日如何十九人陳情謹獻中丞喻坦之孤拙竟何營徒希折桂名始終誰肯薦得失自難明貢乏雄文獻歸無瘠土耕滄江長發夢紫陌久慙行意縱求知切才唯懼鍳精五言非琢玉十載看遷鶯進取心甘鈍傷嗟骨每驚塵襟痕積淚客鬢白新莖顧盼身愖敎吹噓羽覺生依門情轉切荷徳力湏傾奨善猶憐貢垂恩必不輕從兹便提絜雲路自生榮寄華隂姚少府前人泰華當公署為官興可知硯和青靄凍簾對白雲垂峻掌光浮日危蓮影入池料於三考内應惜徳音移晩泊富春寄友人前人江鍾寒夕㣲江鳥望巢飛木落山城出潮生海棹歸獨吟霜島月誰寄雪天衣此别三千里闗西信更稀劉補闕自九華山拜官因以寄獻張喬冥鴻夕不羣徵拜動天文地主迎過郡山僧送出雲登車殘月在宿館亂離分若更思林下還湏共致君寄南中友人前人相夢如相見相思去後頻舊時行處斷華髪别來新浪動三湘月煙藏五嶺春又無歸北客書札寄何人寄績溪陳明府前人古邑猿聲裏空城只半存岸移無舊路沙漲别成村鼓角喧京口山江盡汝濆六朝興廢地行子一銷魂寄處士梁燭前人賢哉君子風誦與古人同採藥楚雲裏移家湘水東星霜秋野濶雨雹夜山空早晩相招隠深耕老此中贈進士顧雲前人潮檻煙波别釣津西京同似荻洲貧不知守道歸何日相對無言盡㡬春晴景逺山花外暮疑雲邉疑髙盖水邉蘋與君愁寂無消處賖酒清門送楚人城南寓居寄知已前人花木閒門苔蘚生滻川特去得吟情病來久絶洞庭信年長却思廬岳耕落日獨歸林下宿暮雲多遶水邉行干時退出長如此頻愧相憂道姓名贈友人前人自說安貧歸未能竹邉門掩小池氷典琴賖酒吟過寺送客思鄉上㶚陵待月夜留煙島客憶雲閒話翠㣲僧㡬時獻了相如賦共向嵩山採茯苓二九霄無詔下何事觸青塵宅帶松蘿僻田惟猿鳥親吟看仙掌月期有洞庭人莫問煙霞句懸知見岳神秋日旅懐寄右省鄭拾遺王貞白永夕愁不寐草蟲喧客庭半忩分曉月當枕落殘星鬢髮逰梁白家山近越青知音在諫省苦調有誰聽贈劉凝評事前人棘寺官初罷梁園静掩扉春深顔子巷花映老萊衣談史曽無滯攻書已造㣲即膺新寵命稱慶向庭闈寄鄭縣李侍郎黄滔古縣新煙火東西入客詩静如長暇日貧更似閒時僧借松蘿主人将雨雪期三年一官罷岳石看成碑贈李補闕前人魯史蜀琴旁陶然舉一觴夕陽明島嶼秋水淺池塘世亂憐官替家貧值歳荒前峯亦曽宿知有辟寒方寄敷水盧校書前人諫省垂清論仙曹豈久臨雖專良史業未畏直臣心路入丹霄近家藏華嶽深還如韓吏部誰不望知音贈明州霍員外前人惠化如施雨隣州亦可依正衙無吏近髙㑹覺人稀海日旗邉出沙禽角外歸四明多隠客閒約到巖扉寄獻梓桐山侯侍郎前人漢宫行廟畧簪笏落人間直道三湘水髙情四皓山賜衣僧脫去表奏主批還地得松蘿塢泉通雨雪灣東門添故事南省缺新班時有新命不赴片石秋從露幽忩夜不闗夢餘蟾隠映吟次鳥綿蠻可惜相如作當時事悉閒寄刑部盧員外前人誰識在官意開門樹色間尋幽頻宿寺乞假擬逰山半白侵吟鬢㣲紅見藥顔不知今夜月㡬客得同閒贈曹郎中張蠙所作髙前古封章自曲臺細看明主意終用出人才省印尋僧鎻書樓領鶴開南山有舊友時向白雲來亂中寄友人前人别來難覔信何處避艱危鬢黑無多日塵清是㡬時人情将厭武王澤即興詩若便懐深隠還應聖主知寄友人前人戀道欲何如東西逺索居長疑即見面翻致久無書甸麥深藏雉淮苔淺露魚相思不我㑹明月屢盈虚贈别山友前人從容無限意不獨為離羣年長驚黄葉時清見白雲舊山廽馬見寒瀑别家聞相與存吾道窮通各自分别後寄友生詩選作人前人上馬如飛鳥飄然隔去塵共看今夜月獨作異鄉人就養江田熟移居并賦新襄陽曽卜隠應與孟家隣途次績溪先寄陳明府前人入境風煙好憂人不易傳新居多是客舊隠半成仙山斷雲衝騎溪長柳拂船何當許過縣聞有箧中篇寄當陽袁皓明府楊䕫髙人為縣在南京竹遶琴堂水遶城地古既資携酒興務閑偏長看山情松軒待月僧同坐藥圃尋花鶴伴行百里甚堪留惠愛莫教空說魯恭名投宣武鄭尚書二十韻羅隠漢代簪纓盛梁園雉堞雄物情湏重徳時論在明公族大踰開魏神髙本降嵩世家唯蹇諤官業即清通翰苑論思外綸闈嘯傲中健毫驚綵鳳髙步出㝠鴻履歴雖吾道行藏必聖聰絳霄無繫滯浙水忽西東庾監髙樓月袁郎滿座風四朝存故事兩地有全功去去才湏展行行道益隆避權辭憲署仗節出南宫鴈影相承接龍圖共始終自然湏作礪不必恨臨戎幕下蓮花盛竿頭㺗佩紅騎兒逢郭伋戰疑士得文翁人地應無比簞瓢柰屢空因思一枝桂已作斷根蓬往事應歸㨗勞歌且責躬殷勤信陵館今日自途窮投浙東王大夫二十韻前人越嶺千峯秀淮流一𣲖長暫憑開物手來展濟時方舊跡蘭亭在髙風桂樹香地清無等級天闊任徊翔麈尾譚何勝螭頭筆更狂直曽批鳳詔髙已冠鵷行嘯傲辭民部雍容出帝鄉趙堯推印綬勾踐與封疆水占仙人吹城留御史牀嘉兵鄒潤甫百姓賀知章席煖飛鸚鵡塵輕駐驌驦夜歌珠斷續晴舞雪悠揚化向棠隂布春隨棣蕚芳盛名韜不得雄畧晦彌彰自愧三冬學未窺數仭墻感深唯刻骨時去欲沾裳想望魚燒尾咨嗟鼠齧膓可能因蹇拙便合老滄浪題柱心猶壯移山志未忘深慙百般病今日問醫王投寄韋左一作右丞前人赤璧徵文聘中臺拜郄詵班資叅令僕曹署轄星辰幞被從誰起持綱自此新舉明朝典數封納詔書頻禁樹曽摛藻臺烏舊避塵便應酬倚注何處活窮鱗寄易定公乗億侍郎侍郎有明皇再見阿蠻舞及龍池柳賦時稱魁絶也前人謝舞仍宫柳髙竒世少䨇侍中生不到園令死湏降班秩通烏府尊罍近集作奉碧幢昭王有餘烈試為禱迷邦寄侯博士前人規諫揚雄賦邅廻賈誼官久貧還往少孤立轉遷難清鏡流年急髙槐旅舍寒侏儒亦何有飽食向長安寄大理寺徐郎中前人佐棘竟誰同因思證聖中事雖亡集作忘顯報理合有隂功官緒詵枝老生涯集作生塵范甑空㡬時潘好禮重與話清風證聖中徐有功為大理少卿執法平恕鹿城主簿潘好禮著論以美之也寄蘇拾遺拾遺許公之後今猶居開元中舊第前人前人早歳長楊賦當年諫獵書格髙時輩伏言切宦情疎慷慨傳丹桂艱難保舊居退朝焚諫草能忘集作望馬相如寄剡縣主簿前人金庭養真地珠篆勾稽官境勝堪長往時危喜暫安洞連滄海闊山擁赤城寒他日抛塵土因君擬煉丹感徳叙懐寄上羅鄴王三首集作秋日有酬前人盛集作舊業傳家有寳集作佩刀况集作近聞餘力更揮毫腰間印佩黄金重集作綬黄樞貴卷裏詩裁集作文章白雪髙宴罷嘉賔吟鳳藻獵廽集作歸諸将問龍韜分茅列土集作登壇甲子纔三十猶擬回頭賭錦袍二集作寄酬鄴王羅令公營室東廻䕃赤集作斤丘少年承襲擁清油坐調金鼎尊明主横把琱戈傲列侯書札二王争巧拙篇章七子謝集作避風流西園舊跡今應在衰老無因奉勝逰三脉散源分歴㡬朝縱然官宦只賔集作卑僚正憂末𣲖論滄海忽見髙枝拂絳霄百集作千萬貔貅趨玉帳三千賔客冠集作弭金貂良時難得吾宗少應念衰門京本作寒門久集作更寂寥淮南集作廣陵李僕射借示近詩因有投獻前人朝論國計暮論兵餘力猶隨鳳藻生語繼盤盂抛俗格氣通集作兼河岳帶商聲閑尋綺思千花麗静想髙吟六藝集作義清文柄已持堯典在更堪回首向集作問縁情寄京闕陸郎中昆仲前人柏臺蘭署四周旋賔榻何妨鴈影連纔見玳簪欹細柳便知油幕勝紅蓮家從入洛聲名大跡為依劉事分偏争柰亂離人漸少麥成集作城新賦許誰傳贈湖州集作霅州裴郎中前人貴提金印出咸秦瀟洒江城兩度春一𣲖水清疑見膽數重山翠欲留人望崇早合歸黄閣詩好何妨戀白蘋自是受恩心未足却垂䨇翅羡呉筠寄前宣州竇常侍前人往年西謁謝元暉樽酒留歡醉始歸曲檻柳濃一作垂鶯未老小園花煖集作嫩蝶初飛噴香瑞獸金三尺舞雪佳人玉一圍今日亂離尋不得滿蓑風雨釣漁磯寄徐濟前人往年疎懶共江湖月滿花香記得無霜壓楚蓮秋後折雨催蠻酒夜深沽紅塵偶别一作到迷前事丹桂相輕愧後圖集作徒出得函闗抽得手從來不及阮元瑜贈宣武盧從事前人前年帝里望集作從行塵記得仙家第四人泉煖舊諳龍偃息露寒初見鶴精神歌聽集作聲上榻梁園晩夢遶殘鍾汜水春知有箧中編集集作什在只應從此是經綸贈蒼溪王明府有文在手曰長生王轂執手長生在人皆號地仙水雲真遂性龜鶴足一作定齊年但以酒養氣何言命在天况無婚嫁累應拍尚平肩贈南陵李主簿曹松外邑官同隠寧勞短使趨看雲情自足愛酒逸應無簟席遺棋子衣裳惹印朱仍聞陂水近亦擬棹菰蒲山中寒夜呈進士許棠前人山中集作寒草堂煖寂夜有良朋讀易明集作分髙燭煎茶取折集作拆氷庭垂河半角忩露月㣲稜俱入論心地争無俗者憎書懐寄友人沈顔江湖勞遍尋祗自長愁襟到處慵開口何人可話心登樓得句逺望月抒情深却憶山齋後猿聲相伴吟春早寄華下同人裴説正是花時節思君寢復興市沽終不醉春夢亦無憑岳面懸清雨河心走濁氷東門一條路離恨正相仍贈衡山令前人君吟十二載集作三十載辛苦必能官造化猶難隠生靈豈易謾猿跳髙岳静魚擺大江寛與我為同道相留夜話閑南中縣令前人寂寥雖下邑良宰有清威苦節長如病為官豈肯肥山多村地狹水淺客舟稀上國搜賢急陶公早晩歸寄曹松前人莫見苦吟遲吟遲鬢亦絲鬢斑猶可染詩病却難醫山暝雲横處星稠月側時冥搜不可得一句至公知贈賔貢前人惟君懷至業萬里信悠悠路向東溟出枝來北闕求家無一夜夢㠶掛隔年秋鬢髮争禁得孤舟往復愁秋霽夜吟寄友人唐彦謙槐柳蕭疎溽暑收商金頻伏火西流塵衣歳晩縁身賤雨簟更深滿背秋前事悲凉何足道逺書慵懶未能修唯思待月髙梧下更就東林訪惠休賀李昌時禁苑新命前人玉簡金文直上清禁垣丹地閉嚴扃黄扉議政參元化紫殿稱觴拂夀星萬户千門迷步武非煙非霧隔儀形塵中舊侣無音信知道遼東鶴姓丁又寄前人振鷺翔鸞集禁闈玉堂珠樹瑩風儀不知親到靈和殿張緒何如栁一枝上已日寄韓八已見一百五十七卷寄蒋二十四前人鳥囀蜂飛日漸長旅人情味悔思量禪門淡泊無心地世事生疎欲面墻二月雲煙迷柳色九衢風土帶花香大知髙士禁愁寂試倚䦨干莫斷腸寄懷前人有客傷春復怨離夕陽亭畔草青時淚從紅蠟無由制膓比朱絃恐更危梅向好風唯是笑柳因㣲雨不勝垂䨇溪未去饒歸夢夜夜孤眠枕獨欹赴舉寄别所知李山甫腰劍囊書出户遲壮心吾命兩相疑麻衣盡舉一䨇手桂樹只生三十枝黄祖不憐鸚鵡客志公偏賞麒麟兒叔牙知我應相痛回首天涯寄所思文苑英華卷二百六十五
