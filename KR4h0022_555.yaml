body:
  text: 文苑英華卷五百五十六宋李昉等編封禪勸封禪表二首宰相請封禪表二首賀封禪表二首代赤縣父老勸封禪表一首請許王公百官封太山表一首明堂代宗奉御賀明堂成表一首代百官賀明堂成上禮表一首封禪勸封禪表許敬宗臣某等言臣緬尋三古縱觀百王裁玉牒之靈文酌金繩之雅誥稽諸列辟用考當今徴天意於禎禨類表作禨祥昭昭乎溢目察人心於謡詠洋洋乎盈耳參三才之奧賾驗百神之感通諒可出震登封申明聖政乘春告禪仰答𤣥功而睿㫖謙冲固違僉願狥茲小讓淹斯大典臣等愚思竊所未喻臣某等誠惶誠恐頓首頓首死罪死罪臣聞崇髙不極至哉乾象之尊博厚無涯大矣坤靈之德若乃代兩儀以亭育體覆燾類表作載之無私法四序以平分運隂陽而不測者非聖人孰能與於此乎是以天道㑹昌靈命類表作厯數係於元后帝圖昭格禋禮歸於昊一作穹鴻名列乎三大廣運由乎一體齊明合德抑斯之謂歟粵自生民肇興司牧朱襄昊英之日黃軒葛天之世莫不雷鼗振響節萬舞一作象字於雲門大路脂輪籍千藁於嬴里使夫空桑孤竹仰鈞天而合奏十碑再纍齊厚地以相終斯道既行遂一作常為稱首奉天之務義極於茲伏惟皇帝陛下陶冶生靈雕鎪品彚立四維於草昧再造寰區射九日之流金鬱興精曜德淪垓表功凝帝先於是戶牖三光提封六合不言而化搴炎燧之菁華無為可測類表作則軼堯舜之文軌故已道光紫極慶溢𤣥類表作乾元豈與夫七十二君可齊年而語矣是以圎精朗鑒眷欽明之同德方祗效祉祚至仁之比義馳薰風而驛膏露靈心急於置郵驟澤馬而騖山車神物切於推轂上帝之性類表作情已見天人之際乃交推之一作而不居疇克與一作與為讓臣等中謝臣又聞之太嶽臨雲登其峰而小天下岱宗零雨不崇朝而彌海內信天地之關鍵為人祗之㑹同雖復稽社分區𤣥亭允峙隂崖俯禪猶或多途陽嶠乾封必歸斯境自九皇而發迹歷萬代而無差曩者帝道浸微淳風不競南茅北秬綿百世而寂寥升中告成歷千祀而湮墜使太山靡紀梁甫曠巡復盛一作庶復禮於休明企來蘇於肆覲大夫之樹傾柔荑以望塵仙人之閭聳危峰而佇貺中外禔福幽明㑹徴敬候翠華之旗紀號青類表作正非陽之日實望夙恭儲祉仰副元符召圎冠徵博帶緝無懷之逸憲採夷吾之舊文式道錫鑾錯事介丘之表飛英騰茂展采日觀之前闡絶代之丕業盡天子之能事榮貺類表作鏡融乎往初尊號類表作名洽乎區有則懷生之類冠帶之倫甘夕死於朝聞傾朝野而相賀接萬齡於旦暮亦何樂以如之臣等預在普天咸蒙大造呌帝閽而引領佇神儀之改容昧死干陳期於獲命不任悾款之至謹詣闕奉表以聞同前上官儀臣某等言臣聞乾元惟大播四序而無言坤儀益厚寧萬象而復一作得一至於號均三大體覆載以曲成聖表千齡順剛柔以藏用是以可久可大永固皇王之緒貞觀一作一貞明獨照陶鈞之上故可登封泰嶽類帝以尊天降禪肅然禋宗以厚地伏惟陛下膺圗紹一作受籙儀天纂鏡受昭華而光寶位正璣衡而握金符銷伏鼇而綴上𤣥剪應龍而清下瀆於是靈臺偃伯暢轂埋輪刑政肅一作席清削秋荼之繁蕪一作舞雅頌一作光先烈激圎海之漪瀾就月幽覃則燭龍開景薰風逺暢則蟠木增華沒羽浮金之章昭載筆於仙室韋韝卉袵一作服之首襲長纓於蘭錡九疇式序七德攸宣發神化之一作於丹青敷禮義之粉澤既而睿德潛通至誠冥召禎圖載啓神物發揮雙觡呈班馴擾於君囿九芝獻彩燭耀於帝池太史標祥鏡流千里卿雲表貺凝華五色江茅鄗黍嵗時鱗萃東鰈西鶼日月波屬鴻符巨慶疇可詳言誠乃岱郊佇遂云坰望蹕臣某等誠惶誠恐死罪死罪永言遐載𬗟鏡前徽王迹一作籍之所葳蕤帝圖之所凝逺龍官結繩之后鳥紀垂衣之君治定功成俱備升中之禮塵清海晏咸申謁欵之誠異世同符千載一揆諒以增髙益厚式酬靈眷陛下德一作道光宙始文一作德煥震初席蘿而因一作固萬物典裒而濟下元一作天下鎔範生靈張四維於地絡締構函夏建八柱於𤣥樞宏規絶跡功無與二駕三五而遙集超八九而騰驤加以璇厯啓徴一作微躔南至於朔旦金鼓問罪削左袵於交河固可恭柴燎之展采穆靈壇之禋敬焉得狥小節於冲挹忘至公之鴻典絶三神之歡拒萬方之志雖復翹心天路未留三舍之感延佇帝閣一作閽逾邈一作邈若九霄之望伏惟一作願陛下紆瑶池之渺轡屈姑射之凝神酌令典於中樽遵時邁於嬴里採公卿之嘉議覽搢紳之讜辭逸記重甄頽章再紐詔雨師以先路命風伯以清塵六飛案軌九旗齊列榮光承幰非煙翼衡輯瑞而嘉肆覲瘞玉而恭儲祉一作禮非方使日觀增華仙閭改飾神光宵映若流照於舂陵雲色晝開似凝暉於豐谷表咸池於翠㞯一作奏咸韶於翠池萬嵗叶其殷薦席藁一作祖非秸於紫壇八神歆其明祀籠千古之偉觀孕七百之丕業臣等命與時偕濯景昌運優遊渠閣之內怊悵南風之絃棲息蓬山之阿弋釣先皇之道至於朝猷國紀頗踐奧隅陛下推而不居竊所未喻鬱云梁之典缺懷庭之儀沮神主之欲漏貪天之議伏願杲其日出照其一無其字傾陽之心一作正油然作雲降其一無其字離畢之澤庶使飛英騰茂祕玉檢而遐𫝊手舞足蹈扈翠華於喬嶽云云一作皆唐類表宰相請封禪表蔣欽緒侍中臣乾曜中書令臣說等言臣聞自古受天命居大寶者必登嵩髙之嶽行封禪之事所以展誠敬報神祗三五迄今未之闕也是以髙宗因文武之業盛岱亭之禮方册所記虞夏同風聖移三朝年經五紀封崇之典缺而未備㑹要作修山川望幸屬在今日陛下靖多難遵諸本作繼先朝天所啓也承天統臨萬邦天所命也焉得㑹要作可不陟東嶽禪㑹要作封云亭報上𤣥之靈恩紹髙宗之鴻烈則天地之意宗廟之心將何以克厭哉且陛下即位以來十有四載創九廟禮二郊大舜之孝敬也叙㑹要作敦九族友兄弟文王之慈惠也卑宮室菲飲食夏禹之恭儉也道稽古德日新帝堯之文思也憐黔首惠蒼生成湯之深仁也化𤣥漠風大和軒皇之至理也至如日月星辰類表作雲山河草木羽毛鱗介窮㑹要作嘉祥極瑞蓋以荐至而為常衆諸本作繁多而不録正以天平地成人和嵗稔可以報於神明矣鴻生碩儒上章奏而請封禪者前後千百㑹要作數聖情撝挹天鑒未回臣等仰考聖㑹要作神心傍採衆望封巒一作髙展禮時不可抑陛下縱不欲以成功告天豈不以天休報德臣等昧死上請以聞再請封禪表臣乾曜說等言臣等考天人之際稽億兆之姓以為理定功成登封告禪鴻名盛則屬在聖明陛下讓德冲深未允羣請神祗觖望臣等懼焉且今四海和平百蠻率職莫不含道德之甘實嗅仁義之馨香一作惟聲是以上帝聿懷名山望幸珍符荐委一作委至年穀屢登開闢已來未之有也臣聞自古受命而封禪者七十二君安有殊風絶業以方今一作相方也然猶躡梁甫登太山飛英聲騰茂實而陛下功德之美符瑞之富固以孕虞夏含一作凌殷周有何退讓逡巡於大禮哉夫昭報天地至敬也嚴配祖宗大孝也厚福蒼生博惠也發策紀號丕業也陛下安可以闕哉天地之符彰矣祖宗之靈著矣蒼生之望勤矣禮樂之文備矣陛下安可以辭哉故臣等願因神祗之叶贊順華夏之懇誠早稽舊章特降明詔庶及仲春農桑之隙以展巡狩肆覲之儀則天下幸甚一作皆唐類表賀封禪表蘇頲臣頲等言伏以升中禮旋降禪云一作於非始五玉既輯萬方胥賴臣等中賀臣聞封太山禪梁甫天下之壯觀王者之丕業伏惟開元神武皇帝陛下以天覆之大地容之厚車書不及而來王日月所臨而奉朔周年七百未可語於期運漢里三萬曽何校於提封大和浹區㝢榮貺彌川陸將辭上帝之休靡抗鴻儒之議式考南至之度爰備東巡之禮列戎夷之君長聚華夏之玉帛惠化潜扇納人歡以錫符淳風外流奉天符以行事遂登日觀拜雲封泥瑞芝檢珍玉導以六穗之禾犧以雙觡之獸茅黍畢陳鶼鰈咸在六宗起典則百神之禮具羣臣一作后充庭則肆覲之儀洽乃藏祕冊昭尊名山稱嵗以效祥乘溫以儲祉而叶同之令再造於黔黎增廣之仁更張於品物歸功當格於藝祖致美永延於岱宗斯所謂皇哉唐哉唐哉皇哉者也臣等不勝大慶謹奉表稱賀以聞臣頲等無任同前崔融臣某等言伏奉某日詔書有某年月日有事於中嶽恭聞大禮不勝欣抃臣聞巡狩者何觀人風而協時月封禪者何增天髙而益地厚然則聖帝臨下必有玉帛萬國之事焉明王在上必有柴望百神之禮焉伏惟天皇御寶位膺璿厯宅皓氣以開元鼓淳風以成化宗文祖武之業天祚彌光制禮作樂之功皇猷載逺四方無事不聞犬吠於中國六合同歸唯睹鴈行於道路恩周動植德洞淪冥東魚西鳥不召而自至𤣥秬黃牟應圖而合牒嵩維中嶽洛陽下都三臺崛起五衢相映風雨交㑹實惟天地之中威靈肅然固是神明所伏可以光昭纍聖可以謁欵上𤣥展時邁於仙宫叶嵗巡於福地象天之道備法駕而非遙望君之來因名山而有日臣等飲一作欵和昌運冒寵崇班用雖徴於犬馬情諒兼於鳥獸三呼在聽欣承漢后之儀羣議不行竊鄙晉皇之德限以官守不獲稱賀一作慶軒墀無任悚踴之至謹附某奉表申賀以聞代赤縣父老勸封禪表陳子昂臣某等聞帝功既大必昭告於上𤣥元首一作命攸尊必升封於厚載故七十二主能恢萬代之規三五六經以為百王之典伏惟陛下膺集作應天受命握紀登樞包括乾坤之靈亭毒神明之化故能開天寶闡地珍溫洛所以升圗榮河由其薦籙羣神既贊衆瑞交馳謳歌於是大歸禮樂以致咸備陛下仰順天意允答神休垂顯號以居宸建明堂而理物百僚惟允萬國咸寧然則嵩嶽神宗望玉鑾而來禪天中仙族佇金駕以崇封實大禮一作德之昌期膺告成之茂典况神都為八方之極太室居五嶽之尊陛下垂統紫微大昌皇運報功崇德允協神心應天順人雅符靈望皇圖聖業實在於茲臣等叨預堯封久忘帝力竊聞聖人封禪天下所以㑹昌山嶽成功皇夀由其配永臣等既為陛下赤子又為萬姓慈親實願上報天功下順人望勒成嵩嶽大顯尊名不勝慶幸之至請許王公百官封太山表張說臣說等言臣聞聖人者與天地合其德故珍符休命不可得而辭鴻名盛典不可得而讓陛下功格上𤣥後篇作天澤流厚載三五之盛莫能比崇登封告成理叶幽贊故符瑞必臻天意也書軌大同人事也菽粟屢登和平也刑罰不用至理也今陛下稽天意以固辭違人事以久讓是和平而不崇昭報至理而闕薦祖宗億兆之姓集作情猶知不可况上帝臨照神集作祖宗顧諟後篇作托其可止乎願納王公卿士列嶽縉紳之衆望回命有司速定大典臣等不勝懇禱敢昧死再拜集作陳上言此篇又載六百卷今已削去明堂代家一作宗奉御賀明堂成表崔融臣某言臣聞昭昭一作明明上天五座列降神之府赫赫中國几筵開布政之宫自軒皇肇制帝堯嗣作歷虞夏而惟新在殷周而克壯斯在尊祖配帝從時統天節寒暑而吹律順隂陽以班令降及有漢頗採前章雖年惟屢豐而日不暇給過此以往寂寥無聲伏惟天冊金輪聖神皇帝陛下興復舊邦光啓新邑萬物睹而聖人作百寶用而神靈滋逺肅邇安功成道洽泥金刻玉紀修中嶽之儀乘鑾駕龍更葺正陽之禮乾䇿坤䇿具一作是禀宸聰左個右個親承睿式朴略淹中莫能言其制度﨑嶇汶上疇克一作以效其規模土事不文木事不鏤九柱自立豈藉琅瑘之飛二石潛開寧煩榖城之採版築星奔而化造斧斤風動而神助聖有通於上帝産無費於中人由是日抱紅輝雲叢紫靄霜毛下翥電翼羣飛夕見神光似對莊嚴之國晝聞仙響疑過數一作妓非樂之天匪日而成衝霄特起仰浮圎笠俯鎮方輿金鸑鷟而將飛玉驪龍而若動三辰引曜相望於復道之間六氣氤氲旁魄於重檐之半可以發大教陳盛容㑹百神朝萬國比二儀而永固齊四序而偕行允所謂穆穆皇皇巍巍蕩蕩者矣微臣攀光日月荷䕃天休接五尚之隆班霑九清之下列方圓罕任叨重寄之一作於程材輪桷無施濫殊私一作恩於構厦仰之不逮雖謝於鵾翔成輒相歡竊同於燕賀手舞足蹈倍百恆情無任悚躍之至謹奉表稱賀以聞代百官賀明堂成上禮表臣某以下文武官若干人等上言臣等聞上帝居髙懸太微之府先王建國闡宗祀之堂不有聖人誰其經始伏惟天册金輪聖神皇帝陛下尊祖揚禰嚴禋之德再光統天順時布政之道尤急親紆睿思躬運𤣥模故能上合乾象下當坤䇿柱將扶而已立石未鑿而懸開丹鷟踶甍似鳴岐而逺至蒼蚪繞棟疑出河而欲飛神光熠爚一作耀於向晚仙樂清泠而方晝月惟孟夏時屬正陽張文物於闕庭震聲名於㝢縣聖皇戾止諸侯在列穆穆焉顒顒焉交喜氣於三靈動歡心於萬類者也臣等進窺朝典既逢嘗麥之辰旋顧野誠輕襲獻芹之禮謹上禮若干輿如别項滋踈鶴鼎一作反味劣鮮庖何以延萐莆之凉契芝英之夀無任對懇之至謹奉表稱賀隨進以聞文苑英華卷五百五十六
