body:
  text: 文苑英華卷九百四十一宋李昉等編職官三此下六卷英華所編失作者先後今正之姚祕監子彥墓志一首嚴庶子損之墓志一首獨孤大理嶼墓志一首蕭郎中存墓志一首仲員外子陵墓志一首權員外自挹墓志一首李司農銘墓志一首祕書監贈禮部尚書姚公墓志獨孤及有唐祕書監永安縣侯姚公諱子彥字伯英其先馮翊蓮勺人也至髙祖僧洪徙家河東祖思聰祕書少監父坦汝州梁縣丞贈祕書監忠諒孝愛寬仁願恭質方氣冲天所授也而力行博學溫故知新錯綜六藝公集作同詞賦初舉進士又舉詞藻皆升甲科尉清逺集作苑獲嘉永寧三縣開元二十九年詔立黃老學親問奧義對䇿者五百餘人與今相國河南元公載及廣平宋少貞等十人以條奏精辨才冠等列授右拾遺內供奉厯左補闕當是二字集作于時天下無金革之虞選多士命百官先文行而後吏事集作名法而柱下方書南宫章奏主張綸翰典司禮樂集作文尤精其選非盛名莫居繇是遷公殿中侍御史禮部員外郎禮部郎中知制誥中書舍人太常少卿天寶十四年奉詔宣慰江東淮南覽觀風俗無何二京陷覆太夫人捐館公外罹憂患內偃惸疾集作內纒惸疾銜憤泣血毁瘠集作右鄰滅性乘輿反正公過集作適外除拜太子左集作右庶子于時迍難始康百揆草創官復其職人亦求舊俄又授公中書舍人禮部侍郎光祿卿左散騎常侍加銀青光祿大夫復知制誥廣德二年授祕書監䇿名事君二十有七年文學一紀羽儀三朝凡六蹈瑣闈三掌訓誥四居禮官一典祕書其遺塵餘跡周遍臺閣言行事業著於天下自䇿名天下五十一字集作以儒行懿德䇿名三朝遺跡故事周遍臺閣資忠體和惟道是居正身奉上中立不倚恐懼戒慎形于隱微故遭值傾否出入夷險而未嘗有悔名與身偕中庸集作德善是依明哲以保故也享夀七十有八大厯二年四月某日薨于位五月某日詔贈禮部尚書知者以為夀冨康寧攸好德考終命洪範謂之嚮用五福而公居四焉以清儉貽厥子孫故所不至者冨焉爾非明德介祉何以享茲有子曰驍曰驥曰驂曰駟曰集作四曰驌號呼集作于昊天痛欲報之罔極也銜恤問禮泣血襄事十月丁酉卜兆北原惟盛德與公器若東川集作川流之無還垂芳如之何刻石集作名墓門其詞曰集作云恂恂祕書藴粹含和服膺孔門行登集作鄰四科遭時之康天下未匡集作光出奮羽翰翺翔慶雲晚遇中興貴德尚齒公秉懿範入作卿士逮事三后出入二紀典禮司書媚于天子居貞保儉與祿終始鬱鬱佳城光烈遺美集作烈烈餘美日月有逝令聞不已不集作無銀青光祿大夫太子左庶子嚴公墓志前人皇唐太子左庶子河內縣子馮翊嚴公諱損之故都督洮州諸軍事洮州刺史協之孫縣太常少卿方約季子中書侍郎挺之愛集作無弟家之慶天之休鍾于公躬故其德備少壯集作仕是昌世遇權臣惡直故官不登三臺晚值多難安貞不競故位不過郡守宫尹前後羽集作左兩衛參四府領二縣典七州再入石渠三登集作升龍樓凡處任十八享年七十六未嘗以利苟合違道從欲用之則行見幾不俟忠信是履集作動靜勞謙有光廣德二年六月二十五日終于襄州集作湯是嵗八月權窆楚山西原冡子曰式官至江陵少尹不幸道夭仲子曰士元由殿中侍御史為尚書虞部員外集作此二字郎少子曰士良祕書省集作領祕書著作郎悉能幹父蠱懿文德取公器他日獨立訓所至也大厯三年嵗次集作王戊申五月二十九日反葬洛陽先塋禮之至也宗人故太常卿向嘗狀公往行貽諸有司謂公外寬內剛亷正篤敬溫而不厲直而不輕集作訐學究源本行有枝葉故其適道求友蒞職任事核其實不居其華初公宰汜水也以莊明慈惠為政汜水之集無此字人不敢欺而户口增倍獄訟衰止御史中丞蕭隱之以狀聞公是以有著作郎之拜其後厯太原上谷弋陽餘杭丹陽雖風俗殊異治效如一不曰才乎公在清池㑹安祿山與當國者交惡公曰難將本矣遂移疾請告姦黨惡之是以有弋陽之貶貶之明年河北為戎不曰智乎涉艱患不辱身踐祿位不狥名居義處順動罔違吉不曰貞乎嗚呼榮問素業與時皆逝可稱也而不可追也今採其實録刻石示後蓋欲報罔極者之志爾集作云其詞曰君子之道容民和集作畜衆公宰二邑二邑無訟與國共理惟二千石公七剖符七著成績乃師國子司成望苑考藝校德以弼三善中和其心正直是踐道亞羽翼名掩春華忠以事君孝施于集作於家粲粲令子鮮侔晨葩若何不弔盛德既喪音徽永沫士友孤望千載九原逰者悽愴大理少卿兼侍御史河南獨孤府君墓志前人府君諱嶼河南洛陽人也漢世祖光武帝第二子沛獻王輔之昭也齊臨川郡王河南道行臺僕射洛川刺史永業府君五代孫國朝明威將軍文慧集作惠府君第二子越州都督浙江東道觀察處置使集無此四字兼御史中丞右集作左金吾大將軍峻府君之季弟也聰明仁恕専直寬信擾而毅溫而厲弱冠筮仕以藝即戎藏器安卑非其志也天寶十四年安祿山反朝廷以淮服集作淝海沂三吳咽喉冝擇良佐以二藩鎮命府君為泗州長史無何換徐集作除濠二州倅戎備參吏職忠毅集作敏肅給所届繄賴御史中丞崔公昭之尹河南也盛選僚佐表府君為太常丞兼殿中侍御史營田判官使罷轉湖州别駕大厯五年崔公受詔持節牧宣歙池三州君復為從事以太子右諭德兼殿中侍御史遷大理少卿兼侍御史方謂冝民冝人祿與夀俱遭命不淑春秋五十九集作五而殁是嵗大歷九年三月二十四日也夫人隴西李氏以柏舟之誓提携諸孤某等奉府君之喪言歸洛陽某月日遷集作此字窆于某原禮也府君少孤奉事兄嫂以友悌稱在家在邦言信行果居官祗事强志能力及其冠法冠佐大府君上以勤恪一作勳略或作勳業周爰成務下以勞謙明誠應物和禮正家敦睦姻族自踈及親必慈必愛而命不我與年未下夀夭夭是㭬集作夭夭其掾嗚呼哀哉初府君之金吾伯兄擁旄江集作浙東也拔崔公於郡吏人之中升為軍司馬推誠委政之分猶晉得韓厥宋得子罕及中丞之開府辟掾府君為首既而府君之喪也中丞哭之慟贈賙給加於人二等由是稚子孀妻得奉喪而西三月而葬禮無違者􅉠布之餘足備祭器君子謂金吾之明哲貽厥兄弟宣州之交情見於死生知巳之道斯其行者鮮矣及敢不直詞書仲父之美於墓石其詞曰叔父懿德承家令儀慧伯集作惠迪哲兄踐修靡違私治於官發跡淮沂及佐皇華亦繡其衣天子命我再參軍機駱馬驒驒集作單所從其誰顯允崔公為諸侯師府君委質咨諏載馳式壯其猷耄未及之隂陽為冦子鵬一作鵬語集作洽非期昔也陟岡哀哀永思今也還真匪公曷依伯兮叔兮今乎巳而他年九原公誰與歸尚書比部郎中蕭府墓志銘元載嗚呼蘭陵蕭君藴賢人之業藏佐世之器大君未盡其力生人未享其福鍾厲遘痾殞靈休時哀哉君諱存字成性梁武帝季子一作弟子鄱陽王恢之裔五世祖唐刑部尚書生雅州都督左衛長史元泰長史生密州莒縣主簿旻主簿生揚州府功曹頴士頴士字茂挺特達聰明叢于上才以詩書禮樂皇帝王霸之術為巳任開元中進士擢第靈鳯神龍煥乎文章髙價風馳撼動八荒是時顒顒昻昻賢雋之士揖涯岸趨問望如百川之委溟海群山之仰嵩岱君即功曹之子也禀乾坤清粹之氣聚而為德義散而為制度行可以輔教才可以拯時大抵根儒術尚名理言喜人之善鋤人之惡其餘九流百氏質文沿革雖千古􅞅絶如以眸子視左右掌也大歷初與昌黎韓愈天水趙贊博陵崔造素友善齊名李大夫栖筠領浙西掇華刈楚遂奏授蘇州常熟主簿顔太師真卿典吳興纂文編韻延納以修術疑之任宰相劉公晏司轉運與能咨畫奏授左金吾衛兵曹參軍明年遷廷尉評建中包諌議佶掌鹽鐵聆風欽舊奏授監察御史明年轉殿中侍御史初御史大夫張滂董戎天子俾君留務于上國主計者張權侵官交關有司君不阿撓庭辨可否哆南箕燭光芒繇是愁憤乞守外職竟罷歸潯陽君有草堂在廬山下紫霄峰晚節學長生得蟬蛻之味每天氣寥朗神有所詣輒駕紫騮携酒壺學業同紫府之客恣逰其下弄泉坐一作改石不記早暮無幾何登黃石巖之絶巔谷颷䬟丁毒腑藏右體麻痺不仁雖藥膳充席疑岐和疊跡不得施其力焉春秋六十二十五年冬十月五日遘疾十六年冬十月五日卒于潯陽湓城之私第遂以是年十一月十二日權窆于承仙之西岡未克葬于臨汝故也嗟纓紱一作晃之沉淪痛環璧之破碎悲豫章之摧拔莫不驚惋􅉃怛嚮風凄欷焉夫人河東裴氏王父璡越州倉曹參軍皇考光輔蘇州吳縣丞資淑和之氣承禮義之訓隂範內則璨然有光有子四人曰敻曰東曰奐曰願咸端素溫良克荷家聲吞茹荼蓼若絶生理今相國齊公杭河南尹張式給事許孟容鄭郢州正則兵部楊郎中馮馮弟吏部郎中凝盧補闕景亮陸殿中禮投分許與期於莫逆衆君子振鱗奮翼日薄霄漢君未中夀獨歸泉壤匣有豪曹厯有飛黃不發不馳埋骨摧鋩可哀也哉相國於君有死生之交情至於葬舊鄉撫稽紹蓋餘力也足以慰其精靈焉載後學小子日逰於藩故遺芳盛烈備得詳悉見託志録銜酸為銘銘曰崇山鬱鬱連西岡青龍白虎為夀堂靈其少安樂且康旄頭不明歸舊鄉尚書司門員外郎仲君墓志權德輿君諱子陵字某其先魯獻公仲子曰山甫入輔於周食菜于樊其後魯有季路衛有叔圉用儒行政事代為家法曽祖𧦬始自彭城徙于蜀都祖襲博究六藝州閭推重考逺清靜寡欲理老莊之言三代曠僚純白不耀君丱嵗好古學與同門生肄業於峨眉山下採托前載可以為文章樞要者紬繹區别凡數十萬言大厯十三年舉進士甲科調補祕書省校書郎厯同官醴泉二縣尉貞元十年舉賢良方正拜大常博士轉主客司門二員外郎十八年六月乙已疾寢殁於靖恭里第享年五十有九君修身慤固為學精力其初典校有詔百執事詳定冕服炳然上奏得禮之中再仕甸內皆參奉常論撰之務后蒼二代曲臺石渠之論乖疑難正者咸折中焉有司請正太祖東嚮之位而祧獻懿二主議者云云君議略曰九聖在天二祖在祧國家卜代及年未始有極宜立定制為萬代程請遷二主於德明興聖廟詞甚切正後以異論紛紛又著通難一篇引經據古諸儒不能屈雖留中未下而知禮者直之為郎三嵗受詔典黔中選補賦祿清平南人恱焉皇皇者華道於故里里中人以為榮觀復命踰年稍進郎位循性詣理恬於聲榮隤然放懷以馮唐顔駟自况修詞甚博推本六經賦詩類事往往有卓異不羈之韻邃於禮服上下古今儀制著五服圖十卷自為一家之言起庸蜀諸生以文義自逹至禮官元士三登於朝講議洽聞不疚不跲與夫慿覆露乘地資而至大僚豐祿者難易殊矣子雲耆老相如多病內外掃之日圖書樽酒而已升東榮而復者假他人之室可悲也夫其婺嗣郢王之藻女宗室公宫稱其賢淑生一子頗幼學而孤卜七月甲申竁於萬年縣之某原某里命也德輿常集作嘗忝知君用深怛化遺孤哀請因直其詞銘曰噫仲君直而文心秉彛學軼群富宏議暢嘉聞中止水外浮雲理冥冥化沄沄刻圖石識幽墳朝議郎行尚書倉部員外郎集賢院待制權府君墓志公諱自挹字某天水人其先殷王武丁之支世系表權氏武丁之裔孫因封命氏楚遷於那處秦徙于汧隴綿代多才繼有勳力四代祖襲慶周開府儀同三司相定冀青殷五州諸軍事冀州刺史齊郡公曽祖武隋開府儀同三司浙豫柱三州刺史潭州㧾管始平郡太守右武衛屯衛二大將軍天水縣開國伯考無悔奉朝請大夫晉州趙城縣令公年十四太學明經上第因喟然曰學不足以究古今之變而干祿者非吾志也遂蒙飬於終南紫閣之下窮覽載籍號為醇儒非其道不合非其人不自厯南和寶鼎二縣尉天寶中河湟之間踐更以禦冦平糴以饋軍皆以御史董之聯辟從事既而幽陵兵興二京震蕩縉紳之士多在劫剠中公艱貞終吉盜不能汚尅復之嵗制授醴泉尉尋攝監察御史充河西隴右宣尉使崔中丞伯陽判官軺車所履人誦其惠嵗中崔復命遷左馮翊表為祠曹且佐州師朝廷以公文而無害特拜監察御史謙以自牧換大理寺丞學該今古加集賢院待制識通理典遷尚書倉部員外郎大厯五年春感風疾請告十有二月終于布政里私第享年七十惟公得大易之含章中庸之居易知前古之善敗稽六學之義類靈龜恬然天爵自貴夫如是則通籍書殿起草中臺於諸生不為不逹而充公之量則未也與故王右丞維今歸尚書從敬為文雅道素之友其餘或不踐其域故知我者希夫人太原王氏監察御史造之孫也鄠縣令侑之女淑行明德輔于公志叢是福履近于期頥公之喪既除二十三年而夫人殁夀九十三時貞元十年十有二月也嗣子某某官次子某某官等皆以舊德蕃祉參居吏員盡厥誠信貞於龜筮以十二年十月祔葬于咸陽縣洪瀆原禮也以德輿諸孫之列習于舊史郯子之學誠慙古人滕公之室敢識幽壤銘曰周隋之間受封於齊代有武功抑抑倉部德音不回藹然儒風考正圖書彌綸憲章其道昭融黃裳之吉大雅方直位則未充惟此令德與彼內則委和而終咸陽古原祔窆雙魂淑聲無窮金紫光祿大夫司農卿邵州長史李公墓志銘前人公諱鉊字某不書州里尊宗室也初景皇之支啓封于蔡繼别為宗厥後多材皇襲濟北郡公孚公之曽祖也隴西郡公津容公之王公也濟北仕至國子司業贈太僕卿隴西仕至慈衛汝邢青五州刺史終永王傳以至烈考憺厯監察御史殿中侍御史尚書倉部員外郎纍贈職方郎中虢州刺史公即虢州府君之第若干子也慿是積厚叢生福祉少以門子入官聯調兩官環列之佐次補伊闕丞是嵗天寶十四載也虢州捐館幽陵兵起茹毒違難南浮江淮既除喪宣州觀察使鄭炅之表為廣德令時劉展阻命東方愁擾閭里制於􅍉蒲守臣化為寓集作寓非公而公之縣鄙連亘山洞盜有陳莊陳五奢者是焉囊槖攻剽相因炅之跳在尋陽牒書密至署為上介俾輯輿師靖綏攘遏人用寧舒後厯揚州太原二紀綱掾府之損益皆所關决執法殿中佐戎北門㑹罷使至京師獻狀居最拜奉天令有命成城績用居多未踰年遷侍御史充宣武軍節度行軍司馬時師帥以睢陽及譙進律開府韓厥之任朝選為難蓋以彌縫左右非公莫可最凡三為尚書郎四兼御史中丞以銀印青綬厯官相常伯之重府遷大梁職尊統師集作帥公皆以師武從之蓄資力以崇威望宣忠勞以𢎞班制居則持重戰則有功無細無大繄公謀是賴雖羊舌職之聰敏肅給鐸遏冦之恭敬信强無以過也貞元二年徴拜右集作左庶子三年復以本官兼御史中丞充入蕃使尋兼御史大夫行次回中察其隂詐奏集作察疏纍陳不可蒞盟之狀時朝議已行謀塞不用既而戎人衷甲急變上聞乘車東轅獨以智免以久次遷衛尉卿秩至集作以金紫乃命大司集作司字農為國之泉首公修職惟直是視無所阿附終用蔽傷左遷郡州長史以十三年十一月寢疾終於集作于所蒞之官舍春秋若干唯公開敏毅直信兼仁勇有政事方略長於理煩逺而不泥文而無害始以通邑行師振其名聲交辟元僚翻飛清朝腰金鳴玉法象河海議者謂藩垣京轂公冝居之終以當官有守寧絀不苟不為利疚於回鬱堙下國以至大病斯可嘆已夫人范陽郡夫人盧氏某官某之孫新安丞某之女華宗淑問光輔閨門無詒離集作罹無攸遂內姻外戚仰其徽風先于集作於公二年而殁長子元亮以武略至御史中丞不幸早亡次子元道以吏才為大理司直兼監察御史參陳許軍事次曰元規進士及第盩厔縣尉次曰元㑹前右金吾衛兵曹參軍元簡江陵府參軍元舉太原府參軍元衡元弼集作元弼元衡元輔等皆幹蠱知方儼然在疚考於象數先逺得吉以十四年某月日奉公夫人之喪祔窆於伊闕縣萬安南原先公之兆域禮也德輿王公族之出也先人於公為中表昆弟羈貫獲見始四十年元道等泣以墓石見託雖文之鄙朴而不敢辭也銘曰抑抑司農系于蔡兮三圭再踐宜方大兮心廣體胖道將泰兮中立不回官左退兮登書問鵩禍所㑹兮撰日焞龜紛祖載兮萬安鮮原風雨晦兮鏤此貞岷隧之內兮文苑英華卷九百四十一
