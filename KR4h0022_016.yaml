body:
  text: 文苑英華卷十六宋李昉等編天象十六金莖賦一首初日照露盤賦二首霜降賦一首秋霜賦一首聚雪為小山賦一首殘雪賦一首雪影透書帷賦一首小雪賦一首金莖賦以日華川上動為韻吕令問惟漢武皇聖謨洋溢英徽振於綿古洪德協於元吉騰休聲馳茂實掩八紘以稱大御六龍而首出雖端拱之無為常鍊竒以永日於是乎訊殊方之士考靈仙之術張皇臺殿恢拓宫室飛廉之觀既成長年之宫已畢乃金莖之仙掌承沆瀣之精華歘聳擢以橫漢屹岧亭而出霞珠盤上開疑天半之懸日丹莖直指若峰蓮之秀花崛然雙立巍乎造天紛爌爌以照野赫奕奕而燭川晴朝有日兮金鏡相射清夜無雲兮銀露自圓屑瓊蘂以充餌吸玉英以延年想王喬之再覩乘羽服以翩􅗁思王母之一至拖霓裳以嬋娟錬液之法斯在化金之術攸傳觀其逈出囂塵孤髙巃嵸錯金盤於龍鳳曵浮光於螮蝀長風激而自清震雷驚而不動亦可以納虛淡之間曠遺代俗之煩揔然而仙在物表君居人上物表者不可以苟求居上者不可以自放虛信神君之語徒蓄長生之望求師入海終貽欒大之誅書帛飯牛卒受文成之誑竟迷情於虛誕亦何補於崩喪則知履道者守國以正直失德者納人於邪妄向使武皇不謬於兹道亦可以冠百王以為尚也初日照露盤賦以雲表清露光發金景為韻鄭絪日初出兮露成文盤既潔兮光乍分凝素彩而泛灔鮮皓氣之絪緼忽炯爾以流景乍揭然而拂雲若乃勢倚金莖色映霞表倒初景以搖揚淡輕煙之縹眇承露華以逾明焜霽色而共曉焕然孤秀赫奕奕於長川爛爾生光照翻翻之髙鳥盤以貞兮露以盈日既明兮天以清焜以相鮮若曙月之臨朝鏡粲然交映類瓊花之雜玉英金景發色玉壷肇明敷皓質以流耀含太陽之至精伊昔漢帝初營求仙是務我皇復立承天有裕乍髣佛於帝臺宛昭彰乎天路首出庶物表一人之大明光發四施照萬方而遐布豈有屑瓊蘂泫珠露冀靈物之來遊望神人之自遇懿夫合以成象麗然增光干浮雲以杲耀激旭日而悠揚仙掌斜分若蓮峰之曙景宸心回想如崑岫之晴霜豈比周穆西遊覲王母於崑嶽重華南狩怨帝子於瀟湘獨能覩雲闕而飲靈漿者乎徒觀夫素色上升清光下發分回彩以照耀焜長空而超越白華映兮光復臨露彩揚兮色彌深既炫晃以如玉乍晶明而散金且孤髙者可擬之以抗志潔朗者亦仰之而為心况地表煙息天維氣整日之麗矣與星明而共融盤實堅然齊聖祚之悠永昔之頌靈液歌浪井曽不如賦露盤之瑞景第二同前韻盧景亮揭金盤而受露擢仙掌而凌雲當朝陽之出海屬寥廓之無氛霽色曈曨金輝晃皛光奕奕於九霄之際色昭昭於衆象之表大明既照夕露方盈金景相映銀華自清髙不可攀駐王喬之羽駕仰不可視奪離朱之目晴彼方丈之金闕洎天台之赤城或煒煌而景耀或焕赫而霞明出人寰之杳眇隔海嶠之峥嶸孰與我之為異摽景光於上京觀其巃嵸雙立岩嶤上騖輕靄不飛纎雲不度九成爛爛搖翠影於樓臺四野熒熒落浮光於草樹斯亦域中之殊觀其惟作器而盛露且夫先王立晦獨覩太陽卷天宇之夜色引帝庭之曙光惟大君之攸俟抑羣后之所望其彩若電其形若月列缺雖伏常煒煒而不收蟾蜍已歸實亭亭而未沒日無私而見照盤既遇而斯發請言露盤之始也林巒掩映崖谷重深自藴於石孰為之金遭漢皇之雅尚會良冶之幽尋忽範鎔而有作爰奉承之是任不然者在塗泥而重棄與瓦礫而湮沉安敢望微耀之輝映初陽之照臨金之為質也光盤之為體也靜從有感而出日諒無心而生景念志士之未偶因逹人之宜作而後騁顧淺陋之凡才寧覬覦於天幸霜降賦以霜降之日豺乃祭獸為韻崔損天地之氣嚴凝為霜候髙秋於玉琯體正色於金方表肅殺而順時戒節協變化而開隂闔陽激清風而增厲淨皓月而浮光驚鴻鴈之嗷嗷落蒹葭之蒼蒼所以從地而升應律而降詠團扇而見託班姬豈恨於長門履堅氷以是階袁安欲驚於陋巷逹重隂而首出啓沍寒以先期隂與律而相感寒與氣而相資百工由是休矣萬物於焉成之原夫日次于氐月窮于戌當青女以紀候從白露以受質洞庭之葉驚波豐山之鐘應律詩人可比庶欲徹於玉壷大國是資亦將慙於凌室凝於地也似和光以同塵凋於木也類去華而取實其進也則有俟於青霄其退也則見晞於旭日若乃林有擊隼野有祭豺翻繽紛之稿葉宿莽蒼之枯荄烈女覩之而壯志羈人對此而感懷皚皚其姿皎皎其彩既無惡於菅蒯亦何情於蘭茝佐昊天之有成恭神功而不宰笳聲乍拂怨楊栁之衰闕劔鍔可封發芙蓉之厲乃國家順乾坤之德法天地之制布澤如春肅物成嵗申其令以敦乎風俗宣其威以殄厥災沴服用有度修典禮而罔差稻熟可羞先寢廟而攸祭名籍籍於憲府法稜稜於司寇却炎蒸而克敘四節淒金石而率舞百獸客有惜嵗星之屢遷傷志業而未就獨沉吟於軒屏望泬寥於宇宙聞萬户之輕砧聽九重之永漏近瞻庭樹空聞槭槭而有聲緬想澗松誰惜青青而獨秀夫如是則可知霜降之候秋霜賦目長空以流思偉繁霜之獨異雖變露而成形不慿雲以自致向朝陽一作晞而既滅逢夜晴而又墜候暖而止乘寒則飛當鷹隼之始擊值鴻鴈之初歸稜稜作氣凛凛生威比齊紈之顔色奪楚劍之光輝及其降池塘被原陸衰衆草落羣木萎南澗之白蘋碎東籬之紫菊梧桐為之失影蕖荷為之銷馥豈直若斯而已徒美其威不妄作動隨物情因其死者而死保其生者而生雕芝蘭而無怨色拂松竹而不傷榮譬大聖行刑必順於時序通賢用法不害於堅貞至若蒲海之居桑河之汭侵戰士之馬蹄封將軍之狐毳沾翠幕而生冷凍朱旗而自脆助隂氛之肅殺壯堅氷之體勢三冬閨閣兮貯相思萬里關山兮苦留滯不私於已觸物而止疑薄霧之初覆似輕塵之未起陵厲自然嚴凝莫擬故能發揮司寇光揚御史明忠臣之無事承君子之所履聚雪為小山賦李子卿皓色旁射兮清虛上騰間階之下兮聚雪崚嶒嘆此雪兮具知其有興有滅故為山也庶期乎不騫不崩始也散而從風類元氣之無象今也結而為阜若胚渾之初凝五嶺髙標三峰逺跖昔則心往斯焉目擊千里之勢存乎袤文萬仭之容見乎盈尺皓曜起乎岑嶂曈曨生乎樹石峽裏則秋月長懸封中則曉雲猶白夫其以近則逺以逺則親玉林不夜瑶草先春照寒景而逾潔拂朝霞而更親嶺上􅀈襂作緱氏之仙鶴巖中綽約寫姑射之神人樵傍壑而踈隱徑臨崖而絶鄰至若霽日生暖融風變朔危容半頽儻遇嵇康之醉片影初墜謂入郤詵之幄因降髙而就卑遂散雕而為朴沍寒始徑猶可持而斫見晛則消不可繫一作擊而握因知夫色不久鮮物無常堅始則有於無有今乃然於自然觀陵谷之推易信人世之徂遷亦何必怪桑田之變海都邑之成川殘雪賦以明月照積雪為韻范榮謝惠連遒文擅名藻思騰聲覩階墀之積雪因體物以興情曰是雪也感沍寒之德陶元化之精玄冬御時固凄其而以降青春换律奚浩然以居貞豈不以其氣徑其質清處慘無昧遇蒙而成若就陽呈妍已遇乎東風所解且居隂寓質望晞夫朝日之明乃春宵尚寒銀漢未沒質瑩庭廡光搖林樾雜凝花於春露亂素影於夜月小山虛映瑶峰盈尺而潛生樛枝乍垂梅花照樹而將發詎比夫瓊蘂難求夜光可照且昧不貪之寶未得卷舒之妙或消或結吾將任其行藏是玩是瞻彼何為乎衒耀當其朔風駛同雲劇既散亂以飛空或繽紛而下隟於是出野而萬頃連縞晞山而千峰合璧既見晛以俱消將飄零而委積隨時之義強守潔而在今潤物之功固呈豐而自昔既而陽氣長隂氣滅將散有以歸無尚葆光而固節已矣哉人道不能無否泰天道豈可無寒熱固可洞消息以從之何必託興於殘雪雪影透書帷賦以光彩輝映披閲古今為韻蔣防皓爾凝素襜如夕張因潔朗以旁徹遂虛明而內彰繇是以洞篇翰鑒毫芒委六出之姿喜乘時而瑞聖就三冬之業期利用之觀光况復素軸增輝輕紗閟彩釋居中之茫昧致藏用之所在霏微兮太素初分晃朗兮窮隂既改映草玄之客類姑射之神仙隱談天之人疑胚渾之真宰凛凛寒色融融暮幃縑緗叢耀簡牒連輝朣朧而微月將入羃䍥而輕風乍霏故得百氏旁窺萬流仰鏡稽古昔資興詠動鉛管而有助含章對鶴書而無非浴淨蓋以啓其幽默不獨事其韜映契莊周之理虛白自生徵大禹之文光隂是競俾夫夕可以忘寐牖可以罷窺焕乎而不藏於密昭然而蓋取諸離清熒兮寒氣方壯髣佛兮晴雲欲披澄筆海之波瀾皆為練色耀書林之杞梓盡作瓊枝是能燭前轍彰往哲時觀謝賦想墀廡之縈盈載覩曹詩歎蜉蝣之掘閲詳夫理同委照處異在隂比燃膏之功益簡助繫日之務逾深必將修詞以進德實勤考古以觀今所謂用晦而彰韜光有曙祛絳紗之閟邃發素王之牖户期潔白以無虧庶研精乎千古小雪賦以寒律變時因風有漸為韻林滋偉茲雪之霏霏應玄冥而不失其期賦象於虹藏之日成形於氷凍之時委地則微庶表三冬之候翻空雖小那無六出之姿當其寒氣初升隂風始變既淅瀝於遙野却飄颻於廣甸邉城一望龍山之淨色猶晞上苑再瞻鳳闕之清光未遍眇若毫端輕飛可觀細細而千巖送冷飄飄而萬户迎寒霏微墀廡之間瑶臺月曉髣佛草茅之上玉樹花攢逈拂隂軒髙翻曉律縈枝分盈尺之象帶甍誤如圭之質微交月影天邉之孤鴈應迷稍助山明松際之浮煙已失細糝長空纎緣綺櫳淨若蘆花之覆水輕同栁絮之因風是則謝氏林亭盡在回眸之內梁王池館無非跬步之中于以明潔白之姿于以表隂凝之漸雖見晛而無滯詎因汚而成染初疑盡閣粧奩之香粉微微又若瓊筵玉筯之凝蘇點點既而纎悉繽紛呈祥是因掩日而難分薄霧開簾而不辨輕塵影入空帷預想映書之子光侵逺水潛思訪戴之人可謂不逺而來自無而有始縈盈於階砌終散漫於林藪安得不燎薰爐命芳酒作小雪之賦繼大夫之後文苑英華卷十六
