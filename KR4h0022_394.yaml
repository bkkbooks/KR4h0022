body:
  text: 文苑英華卷三百九十四宋李昉等編憲臺二御史知雜授崔寛侍御史知雜事制常衮勑朝散大夫守尚書考功郎中長春宫使判官賜紫金魚袋崔寛南臺自兩丞之亞以久於其職者叅領羣務近制或選尚書郎累更執憲著稱一時多以本秩行御史曹事以寛介直方潔秉彛守中學可辨政文皆達理試用有績素知其才近司考課事任猶簡足以兼濟存乎使能佇揚峻風無或廢命可兼侍御史知雜事如故授李㻆侍御史知雜事制勑殿中侍御史内供奉李㻆宗室良才士林雅望懿以文行精於吏術近參清憲益著令名舉兹臺綱屬在公器宜膺俊選佇揚厥職衣以朱紱光兹白簡可侍御史知雜事仍賜緋魚袋授高允恭兼侍御史知雜事制元稹勑御史府不以一職名官盖揔察羣司典掌衆政副其丞者是選尤難而御史丞僧孺首以朝議郎守尚書户部郎中判度支案飛騎尉高允恭聞於予曰允恭始以儒家子能文入官在監察御史時分務東臺無所顧慮為刑部郎中守訓典復以人曹郎佐掌邦計懸石允釐撓之集作而不煩簡而無傲静專動直志行脩明乞以臺郎兼授憲簡雜錯之務一以咨之朕俞其言爾其自勵集作勉無俾僧孺昧於知人可守一作以本官兼侍御史知雜事餘如故授崔琯職方郎中御史知雜事制白居易勑近歳以來副相多缺朝綱國紀咸委中憲而侍御史一人得揔臺事以左右之今御史中丞德裕以中散大夫行尚書吏部員外郎上柱國崔琯守文無害蒞事惟精在郎署中推有才理奏補是職請觀其能因而可之仍加寵秩操執舉錯爾無自輕可守尚書職方郎中兼侍御史知雜事餘散官勲如故授鄭處晦職方員外郎兼侍御史知雜事制杜牧勑朝議郎行尚書職方員外郎上柱國賜緋魚袋鄭處晦御史中丞韋有翼上言曰御史府其屬三十人例以中臺郎官一人稽叅其事以重風憲如曰處晦族清冑貴能文博學人倫義理無不講求朝廷典章飽於聞見乞為副貳以佐紀綱以爾處晦嘗居内庭草具宻命自以疾去于今惜之頗俞其言如我自得有翼為爾之知已予為有翼之德隣上下交舉豈有私愛勉脩職業所報非一可守本官兼侍御史知雜事散官勲賜如故授兵部郎中鄭黄庭兼侍御史知雜事制錢珝勑具官鄭黄庭法者治之具也以人就之則得其所理矣而執法之吏剛失入虐柔失入懦有善執者惟居其中今御史中丞歸昌以賛貳之闕推擇斯難舉爾之書稱善頗至亦聞爾端肅詳慎能理其身移之當官信可陳力夫理之不勝吏實相循處剛與柔期于無失審固在已遵行有章克念居中斯為善執可依前件授禮部員外郎集賢院直學士賜紫金魚袋王摶刑部郎中兼御史知雜事制錢珝勑御史中丞光逢以望執憲縉紳間咸觀其初故選薦府僚審而後定以爾學文惟博藏噐則深正道甚夷有進不競其守則峻其用必通斯可正秋曹郎率白簡吏貳綱紀之服執而整墮矣古皇之庭實生屈軼安得今之服冕不若其古者之為草乎官有舊章爾當明舉可依前件授王摶兵部員外郎兼侍御史知雜事等制李磎勑持紀綱以貳于中司書言動以歸于太史二者亦重矣而躁競者徒利於轉遷囂薄者止貪於清近問以職業則杳如物外遂使南臺無典章可采東觀無注記可求壊法曠官莫斯為甚某官王摶等並以科籍早登朝列而憲署以摶茂族英才嘗雜事於亞相皆言其所藴蓄未盡施設請復兼柱下進省曹以用之丞相以柅大臣令子日禀訓於名父皆言其所聞見妙得規模請引之朕前委直筆以觀之是用同奬擢無所疑焉爾其勵乃氷霜謹乃毫簡勿循徃例以正時風可依前件侍御史授鼎州司兵叅軍崔昇等侍御史制李嶠勑承議郎前行鼎州司兵叅軍崔昇等學可從政文能按章幹局並優清勤咸著丹墀持法既佇良才白簡繩違尤資器識宜膺石室之命俾叅鐵冠之侶可依前件授何彦則侍御史制李㢠秀鸞臺朝議郎行佐肅政臺侍御史上柱國借緋何彦則風標峻逺志懐毅烈學妙一作涉羣言行歸直道營屯河右克贍軍儲校律湟中載清夷落歳寒彌勵終始不渝宜承懋賞之恩允穆増榮之典可朝散大夫左肅政臺侍御史勲如故授慕容珣侍御史制蘇頲門下朝議郎行宻州司馬員外置同正員慕容珣志竭忠讜才充學行方書之􅏷門傳御史直繩必踐廷奏姦人凜然生風不避當道醜正非罪遺賢久一作攸歎長鯨已戮擊隼方秋宜貴寵章復膺清憲可朝散一作議大夫行御史臺侍御史主者施行授禇璆侍御史制勑通直郎監察御史裏行驍騎尉禇璆清識雅致遒文贍學養能見其盤錯臨事杜於脂韋比騖輕軺且持嚴簡逢二庭之寇無乏於餽軍徴萬里之兵有聞於赴敵念勞斯屬懋賞攸憑増遷御史之端式寵侍臣之列可侍御史勲如故授張遊侍御史制勑朝議郎行司農寺丞張遊清方自居專直不撓秋風始擊每勵鷹鸇歳寒後凋斯見松栢國儲在於紅粟王憲持於白簡式寄人天之重更聞臺閣之遷可行侍御史散官如故授游子騫等侍御史制勑營田使游子騫等砥操礪行慎言檢迹清公乃持法之端詞學皆養能之要臨事必果已畏神羊執心不回先聞擊隼宜在鸞階之列用成烏府之遷可依前件主者施行授楊瑒侍御史制勑朝議郎行殿中侍御史楊瑒風度凝整器懐沉宻清心所以激貪明識由其應務頃司王憲深練朝經體文質以㑹理適柔剛以為用必能履繩作則執簡𢎞宜夙從臺閣之遷更寵軒墀之列可行侍御史散官如故授呂周侍御史等制孫逖勑行殿中侍御史呂周等體資一作含忠厚器韞通明能兼餙吏之文更有過人之實並膺明選克振朝綱宜展才於草議俾遷榮於執法可依前件授元巽侍御史制常衮勑朝議郎侍御史内供奉元巽踐行直方秉心純宻懿文經務持法奉公積勞既深令聞斯洽宜從職員之正式光風憲之選可侍御史散官如故授蔣將明侍御史制勑宣議郎殿中侍御史供奉東都留臺蔣將明祗服文儒精詳禮體持素範以行已秉清心而在公執法不違峻風自逺俾遷柱史分領臺綱可守侍御史東都留臺散官如故授崔益侍御史制勅通議大夫侍御史内供奉前諸道營田使判官靈昌郡開國公崔益積德垂裕清才致逺久佐稷農之重仍參邦憲之列事必精當勤而有成宜正臺綱以明朝奬可侍御史散官封如故授孫㑹侍御史制勑朝散大夫侍御史内供奉充福建節度判官知上都留後賜緋魚袋孫㑹聞義執禮直以方外守信敦睦斷無他腸紹儒門之學行工詩人之比興服我清憲介于戎車休有令名動皆成務允是公選正其命秩可行侍御史散官賜如故授杜暹等侍御史制韓休勑朝議郎行殿中侍御史杜暹禮樂之器直方効節通直郎殿中侍御史内供奉馮宗文儒之業堅正在心咸以清公副兹望實風霜既肅臺閣推美持我邦憲載穆時談俾遷周史之能更奉楚冠之任並可侍御史授裴注等侍御史制元稹勑水部員外郎五字集作諸道鹽鐵轉運東都留後兼侍御史裴注等法者古今所以集無以字公共也一日去之則百職盡墜是以秦漢以降御史府莫不用剛果勁正之士以維持紀綱季代集作氏而還埋輪破柱之徒絶不復出朕甚闕焉去歳以來俾集作比命御史丞為宰相盖欲慰薦人之不敢為也爾等或以吏最或以學聞當僧孺慎簡之初遇朝廷渴用之日又安可廻惑顧慮於豪黠而姑以揖讓步趨之際為塞職乎可依前件授李蔚侍御史盧潘殿中侍御史等制杜牧勑將仕郎殿中侍御史李蔚劔南西川節度判官朝議郎檢校尚書禮部員外郎檢校御史上柱國賜緋魚袋盧潘等夫法不立而化行惡不去而善進雖使堯舜在上未之有也故御史之舉職者前代有埋輪都亭之奏國朝亦有戴豸正殿之劾若非端勁知名之士不在斯選蔚以文行進用已著勞効潘以儒雅流聞今膺㧞擢有司列狀詞㫖頗公使吾綱目盡張隄防不壊不在法吏其在他乎朕闢祗宫之門開天下之口企以待理無有厚薄爾等吐茹侮畏之道能不愧於詩人斯塞職矣可不勉之蔚可守侍御史散官如故潘可行殿中侍御史散官勲賜如故授温璋侍御史制崔嘏勑大理丞温璋朝廷用人不獨取名聲暢茂曹唱羣和而命之至於御史府尤藉才能以責官業前時隂率衆吏搆成姦謀焚我帑聚其主事以火事上聞付于理寺而璋於羣疑之中獨出明見比令左驗事則果然此真憲府之任也俾戴豸冠仍加朱紱勉思奉職無忝我用才之意可依前件授盧就等侍御史制勑前義武軍節度判官盧就東川節度判官爾朱杭等侍御史居其府則掌領推按糾繩愆尤立於朝則正其視瞻峻彼風範官號清重才資鯁直㧞而用之不在階級爾就爾杭立身有文能用嘉猷參于將席憲丞上請咸曰得人嗚呼神羊在庭屈軼在砌觸邪指佞二物可師無為畜縮以孤我誠臣之舉可依前件授崔義進侍御史趙光裔鄭祁殿中丞李皎監察等制薛廷珪勑崔義進等吾近以風憲之任委諸名卿中外肅然佇其振舉果於掄選能掇菁英且言澄澹秉彛進退由禮句義進之脩整也無怠句墻岸山立句時情藹然句光裔之峭直也不黨句英華發外句清勁積中句祁之藴蓄也無多謝於前脩句聞善若驚句覆簣不止句皎之砥礪也頗自彊於逺槩皆克荷先訓來為聞人俾之整肅周行懲艾風殺一作教皆可疑觸邪指佞庶有可觀爾當其才朕俞其請各揚厥職懋對天休可依前件文苑英華卷三百九十四
