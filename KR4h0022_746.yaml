body:
  text: 文苑英華卷七百四十七宋李昉等編釋明道論一首梁武帝論一首食貨户口人丁論一首平凖論一首食貨論二首貨殖論一首釋明道論并序傅縡縡篤信佛教從興皇惠朗法師受三論盡通其學時有大心皓法師著無諍論以詆之縡乃為明道論用釋其難其論曰無諍論言此一作比有知一作智三論者雷同詆訶一作訶詆恣言罪狀托一作歷毁諸師非斤宿一作衆學論中道而執遍心語忘懷而競獨勝方與一作學非數論更為讐敵讐敵既構諍鬬大生以此之心而成罪業罪業不止豈不重增生死大苦聚集答曰三論之興為日久矣龍樹創其源除內學之遍見提婆揚其㫖蕩外道之邪執欲使清源流而不擁𤣥風闡而無墜其言曠其意逺其道博其流深斯固龍象之騰驤鯤鵬之摶運蹇乘决羽豈能觖望於其問哉頃代澆薄時無曠士茍習小學以化䝉心漸染英華作丹成俗遂迷正路唯競穿鑿各肆掎托一作營造枝葉英華作彼業非徒繁夲源日翳一師解釋復異一師甲一作更改舊宗乙一作各立新意同學之中取捨一作窹復别如是展轉添糅倍多惣而用之心無的凖擇而行之何者為正豈不渾沌傷竅蝮蛇斷手一作嘉樹弊牙雖復人說非馬家握靈蛇以無當之巵同畫地之餅矣其所一作於失道不亦宜乎攝山之學則不如是守一遵本無改作之過約文申意杜臆斷之情言無預說理非宿搆覩緣則一作爾乃應見敵然後動縱橫絡繹忽恍杳冥或彌綸而不窮或消散而無所煥乎有文章蹤朕不可得深乎不可量即事而非遠凡相酬對隨理詳核而有一作有何嫉詐干犯諸師且諸師始一作所說為是可毁為不可毁若可毁者毁故為衰若不可毁毁自不及法師何獨蔽護不聽毁乎且教有小有大四字一作有大小備在聖誥大乘之文則斥其道一作則指斥小道今𢎞大法寧得不言大乘之意耶斯則褒貶之事從佛一作𢎞放學與奪之辭依經議論可一作何得見佛說而信順在我語而忤逆無諍平等心如是耶且忿恚煩惱凡夫恆性失理之徒率皆有此豈不一作可以三修未愜六師懷恨而藴涅槃妙法永不宣揚但冀其忿憤之心既極恬淡之悟自成耳人靣不同其心以異或有辭意相反有心口相符豈得必謂他人說中道而心偏執已行無諍外不違而內平等讐敵鬪訟豈我事焉罪業聚集鬪諍者所畏耳無諍論言攝山大師誘進化道則不如此即習行於無諍者也導悟之德既往淳一之風已澆競勝之心呵毁之興盛於兹矣吾願息諍以通道讓勝以忘德何必排撥一作怫異家生其恚怒者乎若中道之心行於成實亦能不諍若以遍著之心說於中論不一作亦得有諍固知諍與不諍不一無不字遍在一法答曰攝山大師實無諍矣但法師實未哀其節彼靜守幽谷寂爾無為凡有訓勉莫匪同志從容語默物無間然故使一無使字其意雖深其言甚約今之敷暢地勢不能一作然處王城之隈居聚落之內呼吸顧望之客脣吻縱橫之士奮鋒頴勵羽翼明目張膽被堅執鋭騁異家衍别辭一作解窺何間隙邀冀短長與相酬對𣙜一作桶其輕重豈得默默無言唯唯應命必須掎托同異發摘玼瑕忘身而𢎞道忤俗而通教以此為病蓋一作益知未達若令大師當此之地亦何必默已而為法師所責邪法師又言吾願息諍以通道讓勝以忘德道德之事不止不在諍與不諍讓與不讓也此語真是世一作人間所重法師慕而言之竟未知勝若為可讓也若他人道高則自勝不勞讓矣他人道劣則雖讓而無益矣欲讓之辭將非虛設中道之心無處不可成實三論何事致乖但須息守株之解除膠柱之意是事皆中也來者言諍與不諍不遍在一法何為獨褒無諍邪詎非矛盾無諍論言邪正得失勝負是非必矣非謂所說之法而有定相論勝劣也若異論是非以遍著為失言無是無非消彼得失以此論為勝妙者他論所不及此亦為失也何者凡心所破豈無心於能破則勝負之心不忘寧不在一作存勝者乎斯則務矜我為得棄他人一無人字之失即有取捨大生是非便是諍論答曰言為心使心受言詮和合根塵鼓動風氣故成語也事必由心實如來說至於心告僞以使口口行詐以應心外和而內險言隨而意逆求利飬引聲名入道之人在家之士斯輩非一聖人所以曲成教誡深致防枉一作杜說現在之殃咎叙將來之患害此文明著甚於日月猶在忘愛軀冒峻制陷湯炭甘虀粉必行而不顧也豈能悅無諍之作而回首革音耶若虀道之人宣化之士心知勝也口言勝也心知劣也口言劣也亦無所包藏亦無所忌憚但直心而行之耳他道雖劣聖人之教也已道雖優亦聖人之教也我勝則聖人勝我一作他劣則聖人劣聖人之優劣蓋根緣所宜示一作然於彼於此何所厚薄哉雖復終日按劒通夜擊柝瞑目以爭得失作氣以求勝負勝負在誰處乎有心之與無心徒欲分别虛空耳何意不許我誠一作論說而使我謙退此謂鷦鵬已翔於寥廓而虞者猶窺藪澤而求之嗟乎丈夫當𢎞斯道矣無諍論言無諍之道通於內外子所言須諫一無諫字諍者此用末而救本失本而營末者也今為子言之何則若依外典尋書契之前至淳之世朴質其心行不言之教當於此時民至老死不相往來而各得其所復有何諍乎固知本末不諍是物之貞矣答曰諍與不諍不可遍執本之與末又安可知由未不諍寧知非末於今而諍何驗非本夫居後而望前則為前居前而望後則為後而前後之事猶如彼此彼呼此為彼此呼彼為此一作彼彼此之名的居誰處以此而言一作言之萬事可知也本末前後是非善惡可恆專一作守耶何得自信聰明廢他耳目夫水泡生滅火輪旋轉入牢穽受羈紲生憂畏起煩惱其失何哉不與道相應而起諸見故也相應者則不然無為也無不為也善惡不能偕而未曾離善惡生死不能至亦終然在生死故得永離而任放焉是以聖人念繞枉一作桎之不脫愍黏膠之難離故殷勤教詔一作示備諸便巧希向之徒涉求之一作有類雖鱗角難成象形易失寧得不反覆一作髣佛遐路勉勵短晨且當念已身之善惡莫揣他物而欲分别也一作而言我聰明我知見我計較我思惟以此而言亦為疏矣他人者實難測或可是凡夫貞爾亦可是聖人俯同時俗所宜見果報所應覩安得肆胸襟盡情性而生譏誚乎正應虛已而遊乎世使俯仰於電露之間耳明月在天衆水皆見清風既至羣籟必響吾豈逆物哉不入鮑魚不甘腐鼠吾豈同物哉誰能知我共行斯路浩浩乎堂堂乎豈復見有諍為非無諍為是此則諍者自諍無諍者自無諍吾俱申一無申字取而用之寧勞法師費功夫㸃筆紙但申於無諍弟子疲脣舌消晷漏唯對於明道戲論哉糟粕哉必欲具一作且考真僞暫觀得失無過依賢聖之言檢行藏之理始終研究表裏綜核使浮辭無所用詐道自然消請待後筵以觀其妙矣一作皆陳書本傳梁武帝論所論出於釋氏故全以釋典明之李德裕世人疑梁武建佛剎三百餘所而國破家亡其禍甚酷以為釋氏之力不能拯其顛危余以為不然也釋氏有六波羅密檀波羅密是其一也又曰難捨能捨大者頭目支體其次國城妻子此所謂難捨也余嘗深求此理夲戒其不貪能自微不有其寶必不貪集作操人所寶與老氏之無欲知足司城之不貪為寶其義一也庸夫謂之作福斯為妄矣而梁武所建佛剎未嘗自損一毫或出自有司或厚斂氓俗竭經國之費破生人之産勞役不止杼柚其空閏位偏方不堪其苦集作弊以此邀集作徽福蜀夲作以徼身福不其悖哉此梁武帝所以不免也食貨户口人丁論杜佑昔賢云倉廪實知禮節衣食足知榮辱夫子適衛冉子僕曰美哉庶矣一本作子曰庶矣哉仍有冉子曰三字既庶矣又何加焉曰富之既富矣又何加焉曰教之故知國足則人一作政康家足則教從反是而理者未之有也夫家足不在於逃稅國足不在於重斂若逃稅則不土著而人貧重斂則多飬羸而國貧不其然乎管子曰以正户籍謂之飬羸羸者大賈蓄家也正數之户既避其賦則至浮浪以大賈蓄家之所役屬自取其利也三代以前井田定賦秦革周制漢因秦法魏晉以降名數雖繁亦有良規可一作不救時弊昔東晉之宅江南也慕容符姚迭居中土人無定夲傷理為深遂有庚戌土斷之令則國二字一作財豐俗阜實由於兹其後法制廢弛舊弊復起義熙之際重舉而行已然之效著在前志隋受周禪得户三百六十萬開皇元年平陳又收户五十萬洎于大業二年干戈不用唯十八載有户八百九十萬矣自平陳後又加四百八十餘萬其時承元魏之亂一作西魏喪亂周齊分據暴君慢吏賦重役勤人不堪命多依豪室禁網隳紊姦僞尤滋高熲覩冗俗一作流冗之病建輸籍之法於是定其名輕其數於是一無此二字使人知浮客謂避公稅依強家作佃家也被強家收半夲一作大半之賦為編氓奉公上䝉輕減之征先以一無以字敷其信後行其令蒸庶懷惠奸無所容隋氏資儲遍於天下俗康人阜一作人俗康阜熲之力焉功侔管一作規蕭葛道亞伊吕近代已一作以來未之有也國家貞觀之一無之字中有户三百萬至天寶末百三十餘年才如隋氏之數聖唐之盛邁於西漢約計天下編户合踰元始之間而名籍所少三百餘萬直以選賢授仕一作任多在藝文才與職乖法因事弊隳循名責實之義闕考言詢事之道乖一無此字崇秩之所至美價之所歸不無輕薄之曹浮華之位習程典親簿領謂之淺俗務根夲去枝葉因以迂闊風流相尚奔競相驅職事委於羣胥貨賄行於公府而至此也自建中初天下編氓一百三十萬賴分命黜陟重為按比收入公稅增倍其一作而餘遂令賦有常規人知定制貪冒之吏莫得生奸狡猾之氓皆破一作被其籍誠適時之令典拯弊之良圖而使臣制置各殊或有輕重未一仍屬多故兵革荐興浮冗之輩今則衆矣徴輸之數亦以闕矣舊額既在見人漸難一作艱詳今日之宜酌晉隋故事版圖可增其倍征繕自減其半賦既均一人知稅輕免流離之患益農桑之業安人濟用莫過於斯矣古之理人一作為理也在於周知人數乃均其事役則庶功以興國富家足教敷一作從化被風齊俗和夫然故災沴不生悖亂不起所以周官有比閭族黨州鄉縣遂均輸一無此二字之制維持其政綱紀其人孟冬司徒獻人數於王王拜而受之其敬之守之如此之重也及理道乖方版圖脫漏人如鳥獸飛走莫制家以之乏國以之貧奸宄漸興傾覆不悟斯政之大者遠者將求理平之道非無其夲歟一作皆通典平凖論凖一作糴昔我國家之全盛也約計嵗之恆賦錢榖布帛五千餘萬經費之外常積羡餘遇百姓不足而每有蠲恤自天寶之始邊境多功寵錫既崇給用殊廣出納之賦支計屢空於是言利之臣繼進而道行矣割剝為務岐路多端每嵗所入增數百萬既而隴右有青海之師范陽有天門之役朔方布思之背叛劔南羅鳯之慿陵或全軍不返或連城而陷先之以師旅因之以荐饑凶逆承隟構兵兩京無藩籬之固蓋是人事豈唯天時𬗟惟高祖太宗開國創業作程垂訓薄賦輕徭澤及萬方黎人懷惠是以肅宗中興之績周月而能成之雖神算睿謀舉無遺䇿戎臣介夫能竭其力抑亦纍聖積仁之所及也及一作致夫德厚則感深感深則難搖人心所繫故速戡大難少康平王是也若斂厚則情離情離則易動人心己去故遂為獨夫殷辛胡亥是也今甲兵未息經費尚繁重則人不堪輕則用不足酌古之道一作要適今之宜既弊而思變乃澤涸而復流五字一作澤流而無竭夫欲人之安也在於薄斂斂之薄也在於節用若用之不節寧斂之欲薄其可得乎先在省不急之費定經用之數使下之人知上有優恤之心取非獲已自然樂其輸矣古之取於人也唯食土之毛謂什一而稅役人之力謂一嵗三日未有直斂人之財而得其無怨况取之不簿令之不均乎自燧人氏逮于三王皆通輕重之法以制國用以抑兼并致財足而食豐人安而政洽誠為邦之所急理道之所先豈常才之士而能達也人一作民者瞑也可使由之不可使因之審其衆寡量其優劣饒贍之道自有其術歷觀制作之者固非易遇其人周之興也得太公齊之霸也得管仲魏之富也得李悝秦之強也得啇鞅後周有蘇綽隋氏有高熲此六賢者上以成王業興霸圖次以富國強兵立事可法其漢代桑𢎞羊耿壽昌之輩皆起自賈竪雖夲於求利而一作猶事有成績自兹以降雖無代無人其於經邦正俗興利除害懷濟時之略韞致理之規一作機者蓋不可多見矣農者有國之夲也先使各安其業是以隨其受田稅其所殖焉豈可徴求貨物捨其所有而責其所無者哉天下農人皆當糶鬻豪商富室乘急賤收至於一作旋致罄竭更仍貴糴一作糶往復受弊無有已時欲其安業不可得也故朝錯曰欲人務農在於貴粟貴粟之道在於使人以粟為賞罰如此農人有利一作錢粟有所泄謂官以法取收之也誠如是則天下之田盡闢天下之倉盡盈然後行其軌數度其輕重化以王道扇之和風率循禮義之方皆登仁壽之域斯不難矣往者一作在昔堯湯水旱作沴而人無捐瘠以國有儲蓄若賦斂之數重黎庶之力竭而公府之積無經嵗之用不幸有一二千里水旱蟲霜或一方興師動衆廢於蓻殖者寧免賦闕而用乏人流而國危者哉一作皆通典食貨論柳芳論曰昔開元初宇文融首以稅客户籍外剩田户口色役之䇿行於天下其後天寶間韋堅又以穿廣運潭興漕之利楊愼矜王鉷楊國忠等議財貨之政君子曰融等之敗也豈不哀哉詩云人之多僻無自立辟融等之謂也初𤣥宗以雄武之才再開唐統賢臣左右威至在已姚崇宋璟蘇頲等皆以骨鯁大臣鎮以清靜朝有著定下無覬覦四夷來寇驅之而已百姓富饒稅之而己繼以張嘉貞張說守而勿失自後賦役頓重豪猾兼并強者以才力相君弱者以侵漁失業人逃役者多浮寄於閭里縣收其名謂之客户雜於居人者十一二矣蓋漢魏以來浮户流人之類也是時也天子方欲因士馬之衆賈將帥之勇高視六合慨然有制御夷狄之心然懼士旅之不供流傭之未復思覩竒畫之士以發皇明蓋有日矣而宇文融揣摩上㫖欵開疑謁見天子前席而見之恨得之晚言發融口䇿合主心不出數年之中獨立羣臣之上無德而祿卒以敗亡既而天子方事四夷國用不足多融之能追而悔焉於是楊崇禮又以善計財帛見幸然亷謹自守與人無害故能獲終融死且十餘年始用韋堅及崇禮愼矜皆以計利興功中人主脅權相滅為天下笑而王鉷楊國忠威震海內尤為暴橫人反思融矣大凡數子少者帶數使多者帶二十使判官佐使遍於天下客户倍於往時主司守以取决備員而己四十年間覆族者五葉疑人賈害豈天道毁疑作歟夫先王收人之制既富而聚之以興利也儉則散之以除害也所以裒多益寡稱物平施降及後代亦克用乂禮記曰倉廪實而知榮辱人茍不足而可理者自古及今未之有也觀數子之意欲竭人財乘主之欲殫天下之力以供國竊王者之柄以狥已奪疑作奮其長觜以鼓天下於是權歸掌握利出胸臆呼吸指顧舟車沸渭於萬里之外矣人以豐財為利而融輩竭之矣向之所利者豈不反歟而數子方自以為功無讓坐受富貴斧鉞已在其後而謂身安於泰山及其死之疑葅醢不足以謝天下豈不愚哉於戲以𤣥宗之才業為中興君奸臣一說利動明主堅等窺其餘烈不顧萬死者貪爵祿也蓋國之利器不可以示人同前李德裕人君不以聚貨制用之臣處將相弼諧之任則奸邪無所容矣左右貴幸知所愛之人非宰相之器以此職為發身之捷徑取位之要津皆由此汲引以塞訕謗集作論領其集作此職者竊天子之財以為之賄聚貨者所以得升矣集有貴字操其竒贏乘上之意集作急集集作售於有司以取倍利制用者所以得進矣二集作三司皆有官屬分部以主郡國貴幸得其寶賂多託賈人汙吏處之頗類牧羊而畜豺飬魚而縱獺欲其不侵不暴焉可得也故盜用貨泉多張空簿國用日䠞生人日困揚雄上書言蜀夲作云漢武運帑藏之財填廬漢書作盧山之壑今貨入權門甚於是矣孟獻子有言與其有聚斂之臣寧有盜臣子輿以利國為非揚雄以𣙜酤興歎稱其職者必能集作皆挾商工之術有良賈之才壽昌習分銖之事𢎞羊折秋毫之數小人以為能君子所不忍為也卜式言天久不雨獨烹𢎞羊天乃雨焉有仲尼之鳴鼓將攻卜式之欲烹致雨而反居相位可不為之甚慟集作痛哉貨殖論欲知將相之賢不肖視其貨殖之厚薄彼貨殖厚者可以回天機斡河嶽使左右貴幸役當世奸人如孝子之飬父母矣陰陽不能為其寇寒暑不能成其疾鬼神不能促其數雷霆不能震其邪是以危而不困老而不死縱人世集作生之大欲處將相之極位集作休兄弟光華子孫安樂昔公孫朝穆好酒及色而不慕榮祿鄧析猶謂之真人况兼有榮祿乎後世雖有貶之者如用鈇鉞於糞土施桎梏於朽株無害於其身矣則大易之害盈福謙老氏之多藏厚亡不足信矣昔秦時得金䇿謂之天醉豈天之常醉哉故晉世唯貴於錢神漢台不慙於銅臭謂子文無兼日之積顔氏集作生樂一瓢之飲晏平仲祀不掩豆公儀休愠集作相以拔葵皆為薄命之人矣如向者四賢天與之生則生天與之壽則壽窮逹壽夭皆在彼蒼而望貴幸之知奸人之譽終身不可得矣余有力命賦以致其意庶後之知我者興歎而己文苑英華卷七百四十七
