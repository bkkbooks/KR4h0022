body:
  text: 文苑英華卷九百四十四宋李昉等編職官六李少尹佐墓誌一首嚴司業墓誌一首李中丞史魚墓誌一首劉給事廻墓誌一首梁補闕肅墓誌一首柳府君某墓誌版文一首魏郎中𢎞簡墓誌一首京兆少尹李公墓誌穆員有唐故京兆少尹隴西李府君諱佐字公輔年未充其志位未半其才君知其賢天不躋其用親待其飬命不偕其榮貞元六年年六十有一三月丁已終於長安興仁里閠四月丁未夫人范陽縣君盧氏奉公之䘮逹於洛汭月日壬午弟前監察御史俛承公之䘮于告成從先公居且曰理命初公以疾得謝沉痾累載三事羣公僉謂公仁可長人武可訓戎正可持刑權可調賦其忠肅明敏尤冝尹京前後執事當趙張三王呉公李膺之選輙遲遲其授以俟公之起而公未聞然及時賢聞此㐫訃嗟嘆之聲浹于上下詔贈同州刺史賻以布帛故事公卿薨位有以震悼于上心者則及追贈其或加等申之以賵公以貳尹去職禮優飾終有以見才拔乎萃恩超于時若假之永年以極其遇詎可涯也嗚呼惜哉五代祖禮成隋禮部尚書絳郡公祖元恭皇大理少卿知吏部選事父誦髙名下位陳州宛丘縣公十嵗而孤居䘮有過成人之感太夫人滎陽鄭氏抑之然後復於禮弱冠擢明經調婺州武義縣尉以清白苦節聞故相彭城公辟以從事凡三遷至監察御史領江西之賦又遷中州刺史戎師作亂移公随州其後僣逆以公先奉太夫人在外疑焉折簡趣公公以自脫之計未售辭疾者再元兇使其徒来刼公語以疾愈自祗赴者與逆徒偕先是熟與舅氏克鈞期於境上克鈞日涕泣於襄陽節度使賈公公感而義之為出敢死之士克鈞亦毁家行賂以賈勇竒兵如約公以輕騎脫焉表公為倅者荆南江西鄂岳三府上以鄂岳請命先至除檢校户部郎中兼侍御史充都團練使鑾駕還京公奉章朝奏是時梁汴圯隔漕運不至逆將䟦扈屯于近郊關輔困於兵蝗帑藏索於錫與上以貢賦之入必由江漢擇全才領商於之地以闢南門於是有刺史防禦中丞之命公心周庻政手集庶物明如理身勤如理家俾天収其災地盡其利峻嶺重負至如川流詔加朝議大夫賜金印紫綬封太夫人滎陽太君賜一子官其事刻之金石實吏部侍郎李公為之訟無何授桂管觀察經畧使部内不及朝貢之覊縻州者十八舊例首領賮於官署為刺史一州所貢悉以奉之其或魚肉斯人之甚有来訟者率以遐逺阻險非文法所及置之公於是易之以中土温良之吏越人之男女不為所鬻資産不為所奪恱而戴之相與禀令其移風俗如此者非一累以親老陳乞故有亞尹之拜是則假道無如命何初宛丘之人吏感府君之明惠而矜公之孤藐相與竭於賵予所以送死飬生之異兼焉太君曰昔吾夫之所以為生也今以没而受賵則是死吾夫也畢以辭之公由是奉先公之貽訓太君之清徳常恐失墜三為郡一為帥從公一作仕者二十六年退居無具藥之資没代無䕶終之直室有孀姊妹挈孤甥者數房孀與孤者亡無怙之䘏一女㷀然俛以其弟二子彦主公之後焉嗚呼為冨不仁為仁不冨信矣積善餘慶何其不信哉不然公之所豐者仁義所不絶者遺愛故事風流於後豈物莫兩大而使然耶俛以員兄弟偏公之遇辱命為誌悲而不文銘曰君之生業成官逹尊親揚名天錫純孝古之遺清君之没皆髙堂去白日恨榮飬之不終吐遺言於將絶祔君於先嗣君於後賢哉悌弟之心有以復君之友國子司業嚴公墓誌前人公諱某字某馮翊臨晉人其先有漢太子太傅彭祖為左馮翊子孫家焉十二代祖翰林東漢末復守本郡後四葉至元魏平南將軍郃陽侯稚玉又四葉至皇朝洮州都督君恊恊生魏州司功叅軍贈太常少卿方約公之祖也方約生銀青光禄大夫左庶子贈宋州刺史損之公之禰也自平南至洮世以侯國相襲事名聲稱之府君廸奕葉之祥鍾生知之美用為孝悌用為忠貞用為循良用為道藝出處終始小大由之天寳中以門子經行擢𢎞文生調叅江陵府軍事時所奉之主永王璘隂有呉濞東南之亂致公賔友之禮公迨其將兆而未發也以智勇免之受命南國洎督王賦者或咨公以畫或倚公以辦三遷至大理司直賜銀印赤綬慎選京邑從容臺署厯京兆府户曹掾殿中侍御史虞部員外郎河洛思其理理行發聞拜河南令刑部郎中雅素儒學選國子司業建中宰政怙威朋家構閔公以親累貶潮州司户時㤗道長公議興能推連州刺史換彬州累加朝議大夫封馮翊縣男旌異政也公母弟士良並龔黄之寄盖不勝形影分離之憂及聞士良罷歸公亦陳乞自免願言相視而終老焉既至京師復拜國子司業無何士良出牧公悼别加等忽忽不樂燕居如失貞元八年某月某日歸全于長安新昌里之私第春秋六十有五初公自郴之歸也有從祖姑世父母身没嗣絶旅殯越公卿匍匐發䕶毁家襄事各遷祔于先塋服仁義者歸心焉夫人彭城劉氏右僕射彭城公之女生子男三人先公而没祔先姑于龍門山之北原事具前誌嗣子纂次子筠季子篆皆感過于縗毁疑於滅冬十一月二十有一日奉公歸夫人之室且從先君銘曰嚴氏阡北原上先賢後賢如相望我歸曷歸歸此一作比室我友俟我以琴瑟杳長夜兮無白日侍御史攝御史中丞贈尚書户部侍郎李公墓誌梁肅公諱史魚字某趙郡平棘人也隋下邑令大經𤣥孫皇朝襄州録事叅軍𤣥暉曽孫漣水丞藻之孫青州司法叅軍贈和州刺史萬總之子其先干木藩魏武安覇趙司𨽻盛於東京特書别為集作於西祖載在紀牒于家有光自下邑至於集無于字和州四世無違克生俊徳公天姿俊集作淳邁少負英氣清明博厚虚受特逹行本於孝友業成於文章開元中以多才應詔觧褐授祕書省正字時海内和平士有不由文學而進談者所耻公以盛名冠甲科群軰仰之如鴻鵠軒三字集作鶴鴻鳴軒在霄際矣秩滿調補河南叅軍長安尉監察御史時宰相李林甫當國怙權稍鋤去異巳者公外不附離内不懾憚竟為所隂中貶来陽丞累移至朝邑令下車周月而頌聲作上方銳意武功寵厚邉將拜公殿中侍御史叅安禄山范陽軍事河北首亂公脅在圍中危冠正詞誚集作譙讓元惡勢迫難奪望重見容朝廷雅知公忠遷侍御史充封常清幽州行軍司馬隔于兇盗詔不下逹公與張休獨孤問俗宻結壯俠志圖博浪之舉間遣表章請固河潼之守帝用深嘆吾謀未行㑹虜將能人姓元浩擁師河上集作南公詭請勞撫因以大義諭之能亦知復飜然向順裂賊左臂繄公之力是嵗至徳一年也相國張平原鎬以狀聞復授侍御史攝御史中丞充河南節度叅謀河北招諭使中朝方倚公以重任戎鎮又咨公以成務公謂委身蹈難非節違亂歸政非公叨恩受禄非義僶俛從政吾何以安假公事東至江淮以上元二年七月二十六日遇疾終于揚州官舎春秋五十六藁葬于禪智佛寺之側貞元元年嗣子竦以谷口扈從之勲朝廷推恩追贈公尚書户部侍郎五年嵗次丁巳某月日始歸窆於某鄉某原上距捐舘凡二十有九年不得吉卜且難是以緩夫人河東郡君裴氏河州刺史某之女吏部尚書寛之姪以禮佐君子降年不永春秋若干天寳二載終于洛陽至是祔焉傳稱有明徳若不當世其後必有逹人惟公含章挺生好是正直蹈難全徳終然允臧盖道與其仁神輔其志冝乎其有後也竦以文藝吏事厯中書舎人户部侍郎天子以為才任方鎮加左散騎常侍知鄂州軍州事領都團練觀察使長才厚位而夀不至士友痛之竦弟竚長安尉亦早卒最少曰竢純懿集作孝而文克奉家業咨于從祖父殿中侍御史臯魚爰卜兆域以寧神宅臯魚于公集無公字天倫之間有知己之道泣叙美行俾予誌之其文曰時之晏卿雲爛鸞鳯于飛上清漢吾道行年路方半時之昏沴氣䌓鯨鯢蕩海横中原側身西望不敢言忠莫渝兮計獨存奮辭感激牧東藩雷雨作觧草木蕃一随逝水空逰䰟播清徽集作音與茂烈永延輝兮集作耀垂後昆給事中劉公墓誌前人公姓劉氏諱廻彭城人楚元王交之後也當漢興諸侯王子孫唯楚為盛世為儒宗光耀史牒集作册以至公大父皇朝尚書比部郎中贈徐州刺史府君諱藏噐徐州生烈考右散騎常侍贈工部尚書居巢文公諱子𤣥初文公儒為天下表有才子六人曰貺曰餗繼文公典司國史時議比子長孟堅曰秩曰迅以述作之盛徳行之美追蹤孔門曰彚與公用剛直明毅焯於當時故言卿集作鄉族者舉盛業以明其家公好學善属文天寳中進士登科觧褐拜江都尉轉左金吾兵曹介江南西道採訪使厯大理評事監察御史入為殿中侍御史出為永州刺史未行改户部員外郎尋佐江淮轉運使授著作郎加檢校户部郎中國子司業三領侍御史當是時中夏初定而兵未戢故公所受任以餽運才賦為先而公亦飭躬蒞職所到無不均不安之患大厯初詔擇二千石遂授公吉州刺史三載績成徴拜諌議大夫遷給事中移疾請醫于洛陽享年若干以建中元年七月某日終于某里私第嗣子某泣血孺慕以某月日奉公之䘮權窆于某原惟公貞方端肅居敬行簡和而不同直而不倨博聞集作見强志樂善下人在諌司陳古今以通諷諭言發而王度潜潤事行而天下莫聞及夫給事黄門釐舉典要壺遂之才未展士安之病已深吾道豈窮大運斯止嗚呼始公祭酒秩功曹迅並與故相國房公琯厚善其終也趙郡李公華志焉洎公在廬陵治行尤異則故國崔公祐甫頌焉盖伯仲徳美煥乎金石試為斯文銘曰惟堯之緒在漢開楚導長源兮比部藴仁文公允文集作新闢儒門兮重世掌史遷固慙美立斯言兮惟公才明剛中志行直道發兮累佐使臣一麾牧人遺愛結兮給事于中遭集作遺非命不融神理忽兮丘有夷淵有實舟斯失劔斯没石不滅兮右補闕翰林學士梁君墓誌崔元翰唐右補闕翰林學士皇太子諸王侍讀史舘脩撰梁君諱肅字寛中其先安定人繇漢魏已降至于隋氏世有爵位家貴門盛刑部尚書邯鄲公曰毗君之五代祖以至於唐散大夫右臺侍御史趙王行臺記室冝春公曰敬實公之髙祖朝散大夫右臺侍御史曰愕君之曽祖祖昱終于莫州任丘令父逵止于司禦率府兵曹叅軍事安卑于燕薊避亂于呉越故其世少衰焉君嘗為司禦府君靈表以表其墓自叙其世系甚備公建中初以文詞清麗應制授太子校書請告還呉相國蘭陵蕭公薦之擢授右拾遺脩史以太夫人羸老有沉痼之疾辭不應召其後淮南節度使吏部尚書京兆杜公表為殿中侍御史内供奉管書記之任貞元五年以監察御史徴還臺非其所好於是備諌諍而佐於大君傳經術而授於儲后典文章於近署垂勸戒於東觀授赤紱銀印之錫聞者榮之九年冬十有一月旬有六日寢疾于萬年之永樂里享年四十有一詔贈禮部郎中􅉠以布帛十年春正月二十八日葬于京師之南小趙春之原子徽之𢎞之俱未冠嘗學文矣㓜子未名小字振振夫人京兆韋氏抱之以縗從其輤車哀感行旅嗚呼君之寓于江南十六而先府君殁事祖母以至孝聞在覊旅之中當離亂之際貞固而未嘗忘於道亷讓而未嘗虧於義年十八趙郡李遐叔河南獨孤至之始見其文稱其美由是大名彰于海内四方之諸侯洎使者之至郡更遣招辟而賔禮之其升於朝無激訏以直已無逶迤以曲從不争逐以務進不比周以為黨退則澹然而居於一室傲遺乎萬物貫極乎六籍旁羅乎百氏考太史公之實録又考老莊道家之言皆覩其奥而觀其妙立徳玩詞以為文其所論載諷詠發于春秋恊于謨訓大雅之䟽逹而信頌之寛静形焉博約而深厚優游而廣大具三百之遺有文集三十卷為學者之師式嘗著釋氏止觀統例㡬乎易之繋辭矣前後五嵗職必更於清顯擢必首於俊造殁之日位未及於褒贈之典然而天子憯怛悼痛恩有加焉假之以夀則將有噐使之寄柄用之重是直屈於短夭而無命非不遇也執友博陵崔元翰哀之乃為銘于墓門識其丘隴銘曰懿文徳垂典則以藻身又華國命之短哀何極叔父殿中侍御史府君墓版文栁宗元栁氏之先自皇帝厯周魯其著者無駭以字為展氏禽属夲有氏字以食采為栁姓厥後昌大世家河東嗚呼公諱某字某曽王父朝請大夫徐州長史諱子夏遺貞白之操表儀宗門王父朝散集作請大夫滄州清池令諱從裕垂博俗之道啓佐集作佑後𦙍皇考湖州徳清令諱察躬行孝悌之徳振揚家聲惟公端莊無諂徽柔有裕峻而能容介而能羣其在閨門也動合大和皆由順正愷悌雍睦莫有間言故宗黨歌之其在公門也釋回錯枉造次秉直事不失當舉無秕政故官府誦之用冲退徑盡之志以𢎞正友道信稱於外焉用柔和博愛之道以視遇孤弱仁著於内焉此公脩已之大經也自進士登髙第調受河南府文學秩滿渭北節度使論惟明辟為從事受太常寺恊律郎元戎即世罷職家食無何朔方節度使張獻甫辟署叅謀授大理評事賜緋魚袋改度支判官轉大理司直遷殿中侍御史加度支營田副使此公從政之大畧也既佐戎事實司中府匪頒有制㑹計明白嗚呼分閫委政繄公而成務朝右虚位待公而周事宗門期公而光大姻黨仰公而振耀貞元十二年嵗在甲子正月九日壬寅遇暴疾終于私舘享年五十痛矣夫人呉郡陸氏洎仲弟綜季弟續冢姪某等抱孤即位牽率備禮祗奉裳帷歸于京師以某年月日庚寅安厝于萬年縣之少陵原禮也公有男一人始六年矣在髫知孝呱呱涕洟凡我宗戚撫視増慟嗚呼哀哉初公元兄以純深之行端直之徳名聞於天下官至侍御史持斧登朝憲章肅清常以先公之神未克遷祔不正席不甘味及撰日定期而昊天不弔志奪禮廢公實敬承遺志行有日矣而閔㓙荐及不克終事則我宗族之痛恨其有既乎惟公盡敬孝飬致毁於居憂表正宗姓觀示他族故家集作宗人咸曰孝如方輿公公諱僧習以孝徳聞脩詞以藻徳振文而遵志以為理化之始莫尊乎堯作堯祠頌以為述徳之道不忘始祖作始祖碑以為紀廣大之意叙正直之節不嫌於親作元兄侍御史府君墓誌其餘諷詠比興皆合於古故宗人咸曰文如呉興守呉興守諱惲以文章顯當官貞固確乎不㧞持議端方直而不苛故宗人咸曰正如衞太史太史諱莊率性亷介懐貞抱㓗嗣家風之清白紹遺訓於儒素故宗人咸曰清如魯士師士師諱禽兼備四徳具體而㣲公之謂矣小子常以無兄弟移其睦於朋友少孤移其孝於叔父天將窮我而奪其志故罔極之痛仍集焉朴魯甚騃不能文字敢用書宗人之辭以致其直故質而俚輟哭紀事哀不能文故叙而終焉尚書户部郎中魏府君墓誌前人魏氏世墓于某縣原唐興有聞士諱之逷者與子及孫咸舉進士嗣為儒家綿州涪城尉諱全珤魏州臨黄主簿諱欽慈太常主簿諱緄尚書繕部員外郎兼江陵少尹諱萬成凡五代名髙而不浮於行才具而不得其禄江陵府君益之以閎逹之量經緯之謀故豪士賢大夫痛慕加厚生郎中府君諱𢎞簡字曰裕之以文行知名既冠而徳禮聞於鄉黨既仕而法制立於官政温柔發乎外見而人莫不親直方存乎内乆而人莫不敬由進士䇿賢良連居科首授太子校書厯桂管江西福建宣歙四府為判官副使累授恊律即大理評事三為御史賜緋魚袋在州六年而人樂之亷使崔衍曰吾敢専天下之士獨惠兹人乎遂獻天子拜度支員外郎轉户部郎中邦賦克舉人望愈重年四十七貞元二十年九月三十日不疾而殁震悼之聲遐邇一辭集注作同且曰斯人也而不得為善之利中人其怠乎君嘗三娶而卒無主婦庭無倚廬堂無抱孤有令兄弟以主其䘮有孝女以守其祀故哭於客位弔于殯東者咸加哀焉凡為部從事府䘮而當其位者三州缺而居其守者二皆得其理君之先再世貧不得葬故以禄仕逰於諸侯薄衣食損車馬凡十有餘事卒獲于厥心其族属之無主後者皆位其墓姊姪之無歸從者咸㑹于家由是處約以終其世既斂家宰庀其政視廪唯釡鍾視藏惟束帛無餘積焉十有一月遣車歸于洛師某日祔于墓監察御史桞宗元聞其道而翫其文也乆居又同閈故哀而銘之其辭曰郎中之道惟直是保淳泊坦厚温恭孝友郎中之文惟孝是宣漙暢周流炳蔚紛綸為周賢能為漢賢良始仕讐校篇籍有光仍授使檄訏謨用揚二居郎位征賦以理休聲載起顯命伊始生而不夀孰知其止殁而不嗣孰濟其美有翩其旗爰舉裳帷行道遲遲望墓而歸象物是宜卜筮孔時里人作銘不愧于辭文苑英華卷九百四十四
