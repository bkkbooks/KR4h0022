body:
  text: 文苑英華卷四十一宋李昉等編帝德一述聖賦一首進高祖受命造唐賦表一首高祖受命造唐賦一首述聖賦太宗御製序朕以二九之年屬天下喪亂毒流區夏禍遍郊畿羣雄則蜂駭雲興猛將則風驅霧合年二十有四慷慨京邑電發中元震蕩三川掃清八荒及至壯年獲臨寶位然乃逺夷委質萬國歸心致使朝有進善之臣野無行歌之士節義盈於私室獄訟息於公門一尉侯於東西混車書於南北由是偃組練而敷禮樂放牛馬而逸黎元方欲紀石封山握河沉璧見文選曲水詩序功既成矣世既貞矣信可以優遊暇豫作樂崇德者歟故因兹餘隟乃修苑囿其勝地則有積翠凝碧其川阜則有濯龍平樂若乃南面雙闕北對芒山引洛浦之通波連郟鄏之餘趾藂薄本麗加之以芳節池沼素美瑩之以初陽舞蝶遊絲帶清颷而散影分花交柳映碧浪而成文巨樹千尋結輕煙而聳翠危峰萬仭照落景而開紅雲氣縈巖似遊仙於巫峽霓光染溜類濯錦於成都戲羽間關互飛沉於蒙密遊鱗瀺灂乍出沒於芰荷翔泳之美盡斯仁智之樂僃矣可以遁形匿迹可以養志恬神獨往襄城之中斯可觀也藐然姑射之上何以加兹余每覽巢許之儔松喬之匹未嘗不慨然慕之思可以脫屣長辭拂衣高謝欻復以時運見羈因留連於大任徒有輕舉之志而不達者其天意也豈人事乎臣聞立極著紀之初闢乾開歷之始上所以分垂象曜下所以疆括地里惟大人之有作越百代而孤峙飛五位以龍奮騰九萬而鵬起曩者炎運將終鼎命云絶四溟波駭八維幅裂羽檄交馳邉鋒並爇長星夜掃車雲朝結莫不望壁壘以靡旗對轅門而亂轍故得百城氷潰千里煙滅固靈命之有在乃慷慨而投袂驅八駿以雷擊馭六飛而電逝騰星劒以外倚振雲鋒而高彗既後事而先謀亦先勝而後制兵有臨而必尅功無往而不濟龜䇿叶以符兆人神應而合契諒包頊以駕軒實孕皇而育帝足以光燭千祀足以祚隆萬世於是戢兵偃武銘功紀績採三代之逸經刋八方之遺籍搜隱遁於林藪訪栖遲於巖石然後調玉律以定時測金儀而考厯符洛下之前驗嗣容成之絶迹若夫流惠澤於瀛表被仁風於區外窮八際以來庭踰九譯而浹會莫不奉朔而祠春秋款關而受冠帶參兩曜以齊明混二儀以稱大信一人之致感實萬方之攸賴聖皇以令叶先甲時惟仲春乃整法駕馭華輪六軍雷動萬乘星陳臨濁河以北眷指清洛而東巡乃升雲闕俯天津朝萬國禮百神珍賮咸集要荒畢臻夫其地也據三川以設險慿四闕而作固總奔湊於八方測圭影於中度既定鼎於周業亦克昌於漢祚望嵩巒之邐迤臨崤坂之回互所以仰叶辰象所以俯清天步若夫削靈巖以表闕疏清𣲖而為池極皇居之壯麗窮大厦之宏規抗修廊之窈窕屬輦道而逶迤夕霞臨而錯落晨光照而陸離至如雲觀晨開風亭夜敞回長颷於輕翼凝濃露於仙掌沉落月於璧臺挂奔星於珠網羅紈飄而散馥環珮動而流響垂密葉於綺窗散飛花於翠幌復有天池濛沼以嬉以遊鼓輕枻漾仙舟蔭喬木鏡清流魚鳥陵亂蘋藻沉浮控飛梁以架回列層閣以環洲漬檀欒之修竹映迢遰之危樓風未生而葉動景將昃而光收若夫瑞草竒色祥樹嘉名霏紅曜紫垂緗拖青或玲瓏於玉砌或點綴於金楹交九衢而結影分四照以開榮浥朝露而逾馥帶星風而更輕於是登崇觀以周覽闢層軒而遐矚樹含嶺而共青草帶原而同緑俯八紘而非逺顧千里而為局飛霞斂而復舒輕煙斷而還續既神王以情暢乃遣纍而思足聆群籟之晨響想鳯簫之夜聲窺藂雲之朝散思鶴蓋之後清捐大位而不寶脫萬乘而為輕訪真人於姑射問至理於廣成志眇眇以遐顧心遙遙而上征踐太微之崇閣闢閶闔之天扄拖紅旗於絳闕翼芝蓋於紫庭咀靈一作沖氣而還壽吸玄液以駐齡若夫北瞰太行南臨少室積峰逺而愈翠重巖隱而復出乍鬱律以干霄又岧嶤而槩日松翳空而難辨鳥翔高而易失屬天下之無事聊逍遙以自逸方欲登日觀以摐金覽雲亭而駐蹕於是凝聖情以逺慮思成敗於終古美揖讓於有虞壯成功於大禹耻用兵於中冀鄙窮戰於丹浦每有違於汝弼恆知失而思補乃命促苑囿散積聚改制度易規矩削侈麗於樓臺崇質素於階宇仁好生而必遂德無貰而不輔習嘉禮於玉帛和大樂於鐘鼓上可以降集群瑞下可以安懷率土惟聖作之可觀實萬物而斯覩顧微臣之庸朽濫叨選於詞林恆戒盈以獻賦每規過而進針幸天地之燾載欣日月之照臨豈窺天而識象寧測海而知深徒望雲以考澤空就日而傾心漸九臯而戢翰望天路以掦音美皇運之方永嗟頺齡之遽侵顧鴻恩之未答徒頌德以長吟進高祖受命造唐賦表顧况臣况言臣聞上古滅迹以恢至道其次立名以扶大化臣山谷之人頃為韓滉參謀滉性嫉惡臣性孤直滉先朝露臣復故山陛下拔臣臣况口噤汗出不敢論天下事然自開元天寶已來耳目所接精經茂德略有百人不霑一命非不欲出無益所以不出豈大國無人而黨與之徒未詳菽麥驟居清貫此由權臣上負明主下負蒼生中遏賢路耳是非邪正勢不兩立唐有天下賦斂甚薄刑罰甚寬神人保和鳥獸咸若然而時有反側逋逃之誅得無因乎惟天啓聖無有一物不得其所書曰逺人不服來以文德德猶土也廣厚載物文猶火也光明麗天尅金之象生土之義蓋聞朝出羣龍多士如海出夜光明月所以别好惡而扇華夷未有影不從表聲不從聽聖德惟新頌聲不作臣下之闕也謹進高祖受命造唐賦一篇論皇家大慶歷祚延久恍若光靈促臣上獻伏惟陛下赫赫巍巍與天同功鳯凰巢于阿閣麒麟乳于郊藪臣之願也無任氷谷之怖謹奉表以聞臣况誠惶頓首頓首謹言欲出此下一有知出二字高祖受命造唐賦并序隋文帝滅陳蕩定海內煬昏多罪墜失先業身滅國替幼恭以神人非聖莫可乃命太保蕭造奉皇帝璽綬歸我高祖高祖固讓謳歌獄訟已歸唐矣而薛舉王世充竇建德等陳勝倡禍為漢作階夫鹿臺之積非無財也閭左之戍非無卒也湯以七十里文王以百里而臣諸侯非有土也隋地遍天下二帝之業一朝掃盡可不謂大悲乎吳公子札古之達天命者其歌唐思深哉其有陶唐氏之遺風乎氣蒸芒碭龍躍太原天命也昔司馬相如賦子虛諸侯之事非天子之事漢武聞之猶曰朕獨不得與此人同時班固張衡左太沖所賦兩京三都各務誇大而王者受命則闕而不書蓋賦者古詩之流古者採詩言之無罪今王澤不竭斯文未喪翰墨間作其誰曰不然先王建國始以文經上行下效終以武定強本弱枝四方翕然無凶人矣故明德慎罰文王所以造周也應天順人武王所以克商也書云帝堯欽明文思帝舜濬哲文明斷自唐虞洎乎周漢帝王美稱以文為首我唐文德冝在三代之上微臣賦頌耻居數子之下初論隋氏顛覆次論皇家開統末論告厥成功簡于上帝鋪乎下土播乎無窮固非常才淺慮之所能及意者實以祖宗光靈引耀鼓動之所致也其辭曰在桓靈之道曀兮本小而末大下陵而上替君臣相失南北歷帝天醜隋而命唐纂周漢之鴻裔大哉文王王季其父武王其子父作子述叶天命以應期焬為不道庶官携二魚爛土崩荒沉所致雖曰匹夫之勇一作雖匹夫之勇兮有盜中原之意凶貫既盈果不保於神器江都之禍酷甚望夷之事亡國之君雖綿古而必類王者父天母地非所以苟其身而貪厥位豈有男女疾痛而父母不為之戲欷乎此真主所以乘時而建義也曽不一戰而得行其志湯武應天也其實誓師高祖受禪也其實揖讓猶感思以慟哭乃立代而尊煬仗順而升蓋前經之所曠承土德以播業兮與炎靈而更生維李其根降居真源洎武昭之隴胄掦太祖之周勳典則明融是將貽乎子孫高皇生而豁逹大度徇齊弱而能言神光佳氣兮爛以氛氲中疑白雀兮戴紫雲隱隱曈曈兮始乎太原君子得時有如追奔岷峨導江兮河出崑崙雷砰一作砅電掣浩浩渾渾厥波雖雄為海所吞乾健而坤順兮利配乾而法坤有何姦豪恃險偷存乃建皇極鍾乎厯數革舊鼎新兮式閭封墓走百神以咸秩兮包五嶽而作固過蒲津而川后增流兮次霍邑而山靈告路彼上慘黷兮我寬刑以薄賦陋茅屋乎土階遵朱干與大輅乃有嚴更之署環衛鈎陳文昌武庫玉册韜府兮內八景之真文金盤粲一作槩霞兮承九天之清露元聖有作恢法度也厥祖草昧諸夏宗臣蠻夷酋長從德如歸若王固讓而天下可違乎有社稷焉不可闕祀有蒸人焉不可無主是以木曰威仰火曰熛怒辰戌丑未王我唐土天實若曰四海橫波虔劉札瘥若王盤桓奈天下何義寧二年五月甲子高祖即位木宫曰甲水宫曰子支干相生成字為李雖子卯不舉而以是為戒此臣子所以服泰階也神祗叶從龜筮攸同乃更正朔以刀文為開通告于上下子懋乃德嘉乃丕績若將殞于厥躬草艾渠魁兮罔駕英雄拔萬姓於湯火兮散三光於昊穹此皇王所以職教化也非天下衍不應非聖不作造我巨唐在夏之興弼成九服經啓九道荒厥迹之茫茫在周之興西至流沙東至樂浪重九譯乎越裳在漢之盛大夏身毒月支夜郎辰韓之國畫疑草傍行未若我唐歌其聲舞其容十有二部鏡一作鍾立乎中央唐既有土德樂亦有臣妾易曰殷薦上帝又曰行地無疆提封所經聲教所被窮天下之琛怪截海外之梯航逾蟠桃而跨弱水兮蓋四十萬里鳥飛驥驟兮鱗萃乎艅艎不以三代為境土七雄為富強乎何則漢高提劒學校興於文景周武載戈頌聲作於成康卜代三十延祚四百亦謂之享國久長與夫青牛紺幰白馬朱鬃報千祀於元君兮呼萬年於太行林邑貢能言之鳥大宛奉汗血之馬孰與四白鹿四白狼乎擒建德於武庫兮格魏公於敖倉耕有三十年之畜以備凶荒戰有百萬衆之師以讋戎羌胡驕則馬銜塞草冦虐則龍決天潢又孰與周漢之廣建康莊在歲九天之下九地之上兮合二九為一方凝碧樹於洞房送白雲於帝鄉舞破陳於清廟兮凖文始與西廂迎氣於東郊兮養老於上庠禘祫之禮秬鬯圭瓉兮辟雍明堂襲蛟爐之馥馥疊鼉鼓之鏜鏜羽林孤兒青襟胄子森琳琅以鏘鏘河山巨防百二盤岡渭水貫都兮來天漢之湯湯浞龍宫而梢鬼國延苑囿而峻墉隍䮠一作騉駝騊駼犀象乘黃附翼之馬骨騰肉飛滅沒陸梁鷟出女床鶤雞白鷴孔翠翺一作相翔縮沙磧與江湘休徵四塞兮花萼連芳大容揮絃兮子晉吹簧飛廉馳道兮河鼓服箱雍門韓娥流徵叩商徹歌鐘于未央校羽獵於長楊升平既久兵設不防虜自燕垂陷乎洛陽雲雷遘難金火耀芒上帝之哀下人兮生魂魄而起膏肓楚詞曰帝命巫陽有人在下魂魄離散肅宗龍飛日出鳯翔兮四誅犬羊代宗赫怒兮草被嚴霜復九廟之郊禋三辰忽乎􅀈煌扶已撓之厚棟維既絶之頺綱然一胡作亂四海奔亡父習乎勇母抱其子乘城看戰電掃八荒天下大定朝廷無事帝端拱于穆清呀溟渤以為池兮拓宇宙以為城務子來之經營乃有棟宇之盛碔砆䃤珉刻桷雕楹甲乙於方中兮勢天矯而上征東西兩京嶽立雲峙宫室相望八百餘里雖千數萬名猶未盡也翼翼峨峨重關四塞抵昆明而瞰太液象蓬壺之廣大踐太華而節終南抱周秦之襟帶於是偃師偶人郢匠杇墁之輩工發藻繪情生眄睞式瞻魄駭爰處體忲乃有輿服之飾鏤轂錯衡霓旌羽蓋紋􅖠繡户窅玲瓏以相對明月夜光煥合影乎其內青琴素女間木難選詩珊瑚間木難注碧色珠也一作木闌恐誤之首飾響結緑之腰珮嗟神人之叶和感雨露之雱霈職貢溢入舟車溢載馮夷一作氷夷蓋馮夷别名陽侯既降於英靈木魅山鬼不勞乎祈賽于時太府太倉粟腐繒敗荔枝橘柚魚鹽惟錯之蓊隘幽明黜陟輕重約法之殿最重二百年天下九百餘萬户六千三百萬口徭輕斂寡國富家肥砢硪岌岌硠硠礚礚兮沸渭馺沓訇訇噦噦兮亘地罄天來朝會兮天子於是乎班瑞等威卑其君長降為牧守宸襟恢張以天地之無外一萬二千年為一紀三萬六千年為一代古者登太山七十二君兩漢踵武亭亭云云八百餘年寂寥無聞我唐傳祚已來革隋一封岱二克復三除凶四五將發三門備南正司天北正司地勾測影於北至建相風於南寺太微太一金版玉笥逮夫淹中闕里之類蓋三十萬卷傾古今之文字振古以來未之有也其事始於武德成於貞觀興乎一作於開元天寶之間唐虞夏殷之世不足多也然則天子四海為家六合為都方明參乘昌宇為御三載考績五載一巡狩觀萬國之有無禹會會稽舜遊蒼梧曰徯子后后來其蘇天子於是命有司興農圃廢土木放女謁斥讒夫臣拜手稽首載陳厥謨康哉良哉耻其君不及唐虞文苑英華卷四十一
