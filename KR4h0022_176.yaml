body:
  text: 文苑英華卷一百七十六宋李昉等編應制九昆明池七首興慶池八首隆慶池一首公主林亭四十一首送公主十七首昆明池奉和晦日幸昆明池應制沈佺期法駕乘春轉神池象漢回雙星遺舊石孤月隱殘灰戰鷁逢時去恩魚望幸來岸花緹騎繞堤栁幔城開思逸橫汾唱歡流宴鎬杯微臣雕朽質羞覩豫章材同前宋之問見雜詠春豫靈池會滄波帳殿開舟凌石鯨度查拂斗牛回節晦蓂全落春遲栁暗催象滇一作溟看浴景燒劫辨沉灰鎬飲一作在鎬周文樂汾歌一作橫汾漢武才不愁明月盡自有夜珠來同前李乂玉輅尋春賞金堤重晦逰川通黑水漫池𣲖紫泉流晃朗扶桑出綿聮樹杞周鳥疑填海處人似隔河秋劫盡灰猶識年移石故留汀洲歸棹晚簫鼓雜汾集作行謳同前蘇頲炎厯事邉垂集作陲昆明始鑿池豫逰光後聖征戰罷前規霽色清珍宇年芳入錦陂御杯蘭薦葉仙仗栁交枝二石分河寫雙珠代月移微臣比翔泳恩廣自無涯昆明池侍宴應制沈佺期武帝伐昆明穿池習五兵水同河漢在館有豫章名我后光天德垂衣文教成黷兵非帝念勞物豈皇情春豫過鯨沼雲旗出鳯城靈魚銜寶躍仙女廢機迎栁拂旌門暗蘭依帳殿生還如流水曲日晚棹歌清賜宴昆明池應制張嘉貞靈沼初開漢神池舊俗疑堯昔人徒習武明代此聞韶地脈山川勝天恩雨露饒時光牽利舸春淑覆柔條芳醖酲千日華箋落九霄幸承歡賚重不覺醉歸遙恩制尚書省寮宴昆明池同用堯字蘇頲露渥灑雲霄天官次斗杓昆明四十里空水極晴朝鴈似銜紅葉鯨疑噴海潮翠山來徹底白日去回標泳廣漁􅒎溢浮深妓舫搖飽恩皆醉止合舞共歌堯興慶池興慶池侍宴應制徐彥伯夾道傳呼翊翠虬天回日轉御芳洲清潭曉靄籠仙蹕紅嶼晴花隔綵旒香溢金杯環廣座聲搖妓舸匝中流羣臣相慶嘉魚樂共哂橫汾歌吹秋同前李適拂霧金輿丹斾轉凌晨黼帳碧池開南山倒影從雲落北澗搖花寫溜回急槳爭標排荇渡輕帆截浦觸荷來橫汾宴鎬歡無極歌舞年年聖夀杯同前武平一鑾輿羽駕出城隈帳殿旌門此地開皎潔靈潭圖日月參差畫舫結樓臺波搖岸影隨橈轉風送荷香入酒來願奉聖情歡不極長逰雲漢幾昭回同前劉憲蒼龍闕下天泉池軒駕來逰簫管吹緣堤夏條嬰不散冒水新荷卷復披帳殿疑從畫裏出樓船直在鏡中移自然東海神仙處何用西崑轍迹疲同前集作隆興池侍宴蘇頲降鶴池前回步輦栖鸞樹杪出行宫山光積翠遙相集作疑逼水態含情集作青近若空初云山光逼嶼疑無地水態迎帆若有風特為趙郡李乂范陽盧從願所賞惜存焉但末句又押起風故此用近若空直視天河垂象外俯窺京室畫圖中皇歡未使恩波極日暮樓船更起風同前沈佺期碧水澄潭映逺空紫雲香輦御微風漢家宫闕疑天上秦地山川似鏡中向浦回舟萍已緑分林蔽殿槿初紅古來徒羡橫汾賞今日宸逰聖藻雄同前韋元旦滄池􅐯沆帝城邉殊勝昆明鑿漢年夾岸旌旗疏輦道中流簫鼓振樓船雲峯四起迎宸幄水樹千重入御筵宴樂已深魚藻詠承恩更欲奏甘泉同前李乂神池泛濫水盈科仙蹕紆餘步輦過縱棹洄沿萍溜合開軒眺賞麥風和潭魚在藻欣遊泳谷鳥含櫻入賦歌寄謝乘槎溟海客回頭來此問天河隆慶池侍宴隆慶池張説靈池月滿直城隈黼帳天臨御路開東沼初陽疑吐出南山曉翠若浮來魚龍百戲紛容與鳬鷁雙舟較泝洄願以集作似金堤青草馥長承瑤水白雲杯公主林亭侍宴安樂公主新宅應制宗楚客星橋他日構仙榜此時開馬向鋪錢埒簫聞弄玉臺人疑衛叔美客有一作是馬卿才借問逰天漢誰能帶石回同前趙彥昭雲物中京曉天人外館開飛橋象河漢懸榜學蓬萊北闕臨仙檻南山送夀杯一窺輪奐畢更思棟梁材同前武平一紫漢秦樓敞黃山魯館開簮裾分上席歌舞列平臺馬既如龍至人疑學鳯來幸欣聮棣蕚何以接鄒枚侍宴安樂公主山莊應制李嶠黃金瑞榜絳河隈白玉仙輿紫府來碧樹青岑雲外聳朱樓畫閣水前開龍舟下瞰鮫人室羽節髙臨鳯女臺遽惜歡娛歌吹晚揮戈却使曜靈回同前趙彥昭六龍齊軫御朝曦雙鷁維舟下緑池飛觀仰看雲外聳浮橋直見海中移靈泉巧鑿天孫渚孝笋能抽帝女枝幸願一生同草樹年年嵗嵗樂於斯同前宗楚客玉樓銀榜枕嚴城翠蓋紅旗列禁營日映層巖圖畫色風搖雜樹管絃聲水邉重閣含飛動雲裏孤峰類削成幸覩八龍遊閬苑無勞萬里訪蓬瀛同前盧藏用皇女瓊臺天漢潯星橋月宇構山林飛蘿半拂銀題影瀑布環流玉砌隂菊浦香隨鸚鵡泛簫笙韻逐鳯凰吟瑤池駐蹕恩方久璧月無文興轉深同前蘇頲駸駸羽騎歷城池帝女樓臺向曉披霧灑旌旗雲外出風回巖岫雨中移當軒半落天河水繞徑全低月樹枝簫鼓宸逰陪宴日和鳴雙鳯喜來儀同前蕭至忠西郊窈窕鳯凰臺北渚平明法駕來匝地金聲初度曲周堂玉溜好傳杯灣路分逰畫舟轉岩門相向碧亭開微臣此時承宴樂倣佛疑尋星漢回同前岑羲銀榜重樓出霧開金輿步輦向天來泉聲迥入吹簫曲山勢遙臨萬嵗杯帝女含笑流飛電乾文動色象昭回誠願北極拱堯日微臣抃舞詠康哉同前集作興慶池侍宴應制李乂金輿玉輦背三條水閣山樓望九霄野外初迷七聖道河邉忽覩二靈橋懸氷滴滴依虬箭清吹泠泠雜鳯簫向晚平陽歌舞合前溪更轉木蘭橈同前馬懷素主家臺沼勝平陽帝幸歡娛樂未央掩映雕窗交極浦參差繡户繞回塘泉聲百處傳歌曲樹影千重對舞行聖酒一霑何以報惟欣頌德奉時康同前韋元旦銀河南渚帝城隅帝輦平明出九衢刻鳯蟠螭凌桂邸穿池構石寫蓬壷瓊簫暫下鈞天樂綺綴長懸明月珠仙榜承恩爭既醉方知朝野更歡娛同前李迥秀詰旦重門聞警蹕傳言太主奏山林是日回輿羅百騎此時歡甚賜千金鷺羽鳯簫參樂曲荻園竹徑接帷隂手舞足蹈方無極年年嵗嵗奉薰琴同前李適平陽金榜鳯凰樓沁水銀河鸚鵡洲綵仗遙尋丹壑裏仙輿暫幸緑亭幽前池錦石蓮花艷後嶺香爐桂蘂秋貴主稱觴萬年夀還輕漢武濟汾逰同前薛稷主家園宇一作援極新規帝郊逰豫奉天儀歡宴瑤臺鎬京集賞賜銅山蜀道移曲閣交映金精板飛花亂下珊瑚枝借問今朝八龍駕何如昔日望仙池同前沈佺期皇家貴主好神仙别業初開雲漢邉山出盡如鳴鳯嶺池成不讓飲龍川粧樓翠愰教春住舞閣金鋪借日懸敬從乘輿來此地稱觴獻夀樂鈞天同前劉憲主家别墅帝城隈無勞海上覔蓬萊沓嶂懸流平地起危樓曲閣半天開庭莎作薦舞行出浦樹相障歌棹回此日風光與形勝祗言併伴聖詞來侍宴長寧公主東莊應制李嶠見初學記别業臨青甸鳴鸞降紫霄長筵鵷鷺集仙管鳯凰調樹接南山近煙含北渚遙承恩咸已醉戀賞未還鑣同前崔湜沁園東閣外宸一作鸞駕一逰盤水榭宜時陟山樓向晚看席臨天女貴杯接近臣歡聖藻懸宸象微臣竊仰觀同前李適鳯樓紆睿幸龍舸暢宸襟歌舞平陽第園亭沁水林山花添聖酒澗竹繞薰琴願奉瑤池駕千春侍德音同前鄭愔公門襲漢環主第稱秦玉池架祥鱣序山吹鳴鳯曲拂席蘿薜垂回舟芰荷觸平陽妙舞處日暮清歌續同前劉憲公主林園地清晨降玉輿畫橋飛度水仙閣湧臨虛晴新看蛺蝶夏早摘芙蕖文酒娛逰盛欣叨侍從餘同前李乂紫禁乘雷集作霄動青門訪水嬉貴台鱣序集初學記作上台鱣序慶仙女鳯樓期合宴簮紳滿承恩雨露滋北辰還捧日東館集作觀幸逢時逰長寧公主林亭應制六首有序不録上官昭容玉環騰逺創金埒荷殊榮弗玩珠璣飾仍留仁智情鑿山便作室憑樹即為楹公輸與班爾從此遂韜聲二登山一長望正遇九春初結駟填街術閭閻滿邑居鬭雪梅先吐驚風栁未舒直愁斜日落不畏酒樽虛三霽曉氣清和披襟賞薜蘿玳瑁凝雲色琉璃漾水波跂石聊長笑攀松乍短歌除非物外者誰就此經過四暫爾逰山第淹留惜未歸霞窗明月滿澗戶白雲飛書引藤為架人將薜作衣此真攀玩所臨睨賞光輝五放曠出煙雲蕭條自不羣潄流清意府隱几避囂氛石畫裝苔色風梭織水文山室何為貴唯餘蘭桂薰六策杖臨霞岫危步下霜溪志逐深山靜途隨曲澗迷漸覺心神逸俄看雲霧低莫怪人題樹祗為賞幽棲同公主逰九龍潭武后山忩逰玉女澗戶對瓊峯巖頂翻雙鳯潭心倒九龍酒中浮竹葉杯上瀉芙蓉故念山家賞唯有入風松奉和初春幸太平公主南莊應制李嶠主家山第接雲開天子春逰動地來羽騎參差花外轉霓旌搖揚日邉回還將石溜調琴曲更取峰霞入酒杯鸞輅已辭烏鵲渚簫聲猶繞鳯凰臺同前沈佺期主家山第早春歸御輦春逰繞翠微買地鋪金曽集作新作埓尋河取石舊支機雲間樹色千花滿竹裏泉聲百道飛自有神仙鳴鳯曲併將歌舞報恩暉同前蘇頲主第山門起灞川宸逰風景入初年鳯凰樓下交天仗烏鵲橋頭一作邉敞御筵往往花間逢綵石時時竹裏見紅泉今朝扈蹕平陽館不羡乘槎雲漢邉同前宋之問青門路接鳯凰臺素滻宸逰龍騎來澗草自迎香輦合巖花應待御筵開文移北斗成天象酒近南山作夀杯此日侍臣將石去共歡明主賜一作錫金回同前李乂平陽館外有仙家沁水園中好物華地出東郊回日御城臨南斗度雲車風泉韻繞集作逸幽林竹雨霰飛初學記作光搖雜樹花已慶時來千億夀還言日暮九重賖同前韋嗣立主第巖扃架鵲橋天門閶闔降鸞鑣歷亂旌旗轉雲樹參差臺榭入煙霄林間花雜平陽舞谷裏鶯和弄玉簫已陪沁水追歡日行奉茨山訪道朝同前李雍傳聞銀漢石支機復見金輿出紫微織女橋前烏鵲度仙人樓上鳯凰飛風流入座飄歌扇瀑水侵階濺舞衣今日還同犯牛斗乘槎共逐海潮歸同前邵升沁園嘉麗奪蓬瀛翠壁紅泉繞上京二聖忽從鸞殿幸雙仙正下鳯樓迎花含步輦空間出樹雜帷宫畫裏成無路乘槎窺漢渚徒知訪卜就君平過太平公主山亭侍宴應制張昌宗淮南有小山嬴女隱其間折桂芙蓉浦吹簫明月灣扇掩將雛曲叉承墮馬鬟歡情本無限莫掩洛陽關宴長樂集作安樂公主宅應制宋之問英藩築外館愛主出王宫賔至星槎落仙來月宇空玳梁翻賀燕金埒倚晴虹簫奏秦樓裏書開魯壁中短歌能駐日艷舞欲嬌風聞有淹留處山阿滿桂叢送公主奉和聖製送金城公主適西蕃應制李嶠漢帝撫戎臣絲言命錦輪還將弄機女逺嫁織皮人曲怨關山月粧消道路塵所嗟穠李樹空對小榆春同前崔湜懷戎前䇿備降女舊姻修簫鼓辭家怨旌旃出塞愁尚孩中念切方逺御慈流顧乏謀臣用仍勞聖主憂同前劉憲外館踰河右行營指路岐和親悲逺嫁忍愛泣將離旌斾羌風引軒車漢水隨那堪馬上曲時向管中吹同前張説青海和親日潢星出降時戎王子壻寵漢國舊家慈春野開離宴雲天起别詞空彈馬上曲詎減鳯樓思集作悲同前薛稷天道能殊俗深仁乃戢兵懷荒寄赤子忍愛鞠蒼生月下瓊娥出星分寶婺行關山馬上曲相送不勝情同前閻朝隱甥舅同初學記作重親地君臣厚帝初學記作義鄉還將貴公主嫁與耨檀王鹵簿山川間初學記作琵琶道路長回瞻父母國日出在東方同前蘇頲帝女出天津和戎轉罽輪川經斷腸望地與析支鄰奏曲風嘶馬銜悲月伴人旋知偃兵革長是漢家親同前韋元旦柔逺安夷俗和親重漢年軍容旌節送國命錦車傳琴曲悲千里簫聲戀九天唯應西海月來就掌中圓同前徐堅星漢下天孫車服降殊蕃匣中詞易切馬上曲虛繁關塞移朱額風塵暗錦軒簫聲去日逺萬里望河源同前崔日用聖后經綸逺謀臣計畫多受降追漢䇿築館許戎和俗化烏孫壘春生積石河六龍今出餞雙鶴願為歌同前鄭愔下嫁戎庭逺和親漢禮優笳聲出虜塞簫曲背秦樓貴主悲黃鶴征人怨紫騮皇情眷億兆割念俯懷柔同前李適絳河從逺聘青海赴和親月作臨邉曉花為度隴春主歌悲顧鶴帝䇿重安人獨有瓊簫去悠悠思錦輪同前馬懷素帝子今何去重姻適異方離情愴宸掖别路繞關梁望絶園中栁悲纒陌上桑空餘怨一作願黃鶴西域傳公主歌曰願為黃鶴兮歸故鄉東顧憶回翔同前武平一廣化三邉靜通姻四海安還將膝下愛持副域中歡聖念飛玄藻仙儀下白蘭日斜征蓋沒歸騎動鳴鑾同前徐彥伯鳳扆憐簫曲鸞閨念掌珍羌一作漢庭遙築館漢一作廟䇿重和親星轉銀河夕花移玉一作海樹春聖心悽逺近一作送逺留蹕望征塵同前唐逺哲皇恩眷下人割愛逺和親少女風逰兊姮娥月去秦龍笛迎金榜驪歌送錦輪那堪桃李色移向虜庭春同前沈佺期金榜扶丹掖銀河屬紫閽那堪將鳯女還以嫁烏孫玉就歌中怨珠辭掌上恩西戎非我匹明主至公存文苑英華卷一百七十六
