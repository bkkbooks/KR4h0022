body:
  text: 文苑英華卷三百四十一宋李昉等編送行李白三首杜甫三首釋皎然一首劉禹錫一首白居易一首李賀一首韋應物二首韓翃一首盧綸一首李頎三首鳴臯歌送岑徵君時梁園三尺雪在凊冷池作李白若有人兮思鳴臯阻積雪兮心煩勞洪河凌兢不可以徑度氷龍鱗兮難容舠邈神仙集作邈仙山之峻極兮聞天籟之嘈嘈霜崖皓皎以合沓兮若長風扇海湧滄溟之波濤𤣥猿緑羆舑舕上他甘下吐覽切崟危集作岌咆柯振石駭膽栗魄羣呼而相號峰崢嶸以路絶掛星辰於巖㟼送君之歸兮動鳴臯之新作交鼓吹兮彈絲觴清冷之池閣君不行兮何待若返顧之黃鶴掃梁園之羣英振大雅於東洛巾征軒兮厯阻折尋幽居兮越巘㠋盤白石兮坐素月琴松風兮寂萬壑望不見兮心氛氲蘿𡨕𡨕兮霰紛紛水橫洞以下渌波小聲而集作兮上聞虎嘯谷而生風龍藏溪而吐雲本集作沓𡨕寡鶴清唳饑鼯嚬呻塊獨處此幽默兮愀空山而愁人雞聚族以爭食鳯孤飛而無鄰蝘蜓嘲龍魚目混珍嫫母衣錦西施負薪若使巢由桎梏於軒冕兮亦奚異乎夔龍䠥􅍷於風塵哭何苦而救楚笑何誇兮而却秦吾誠不能學二子沽名矯節以耀世兮固將棄天地而遺身白鷗兮飛來長與君兮相親鳴臯歌奉餞從翁請集作清歸五崖幽集作山居李白昨憶鳴臯夢裏還手弄素月清潭間覺時枕席非碧山側身西望阻秦關麒麟閣上春還早著書却憶伊陽好青松來風吹石道緑蘿飛花覆烟草我家仙翁愛清真才雄草聖凌古人欲卧鳴臯絶世塵鳴臯微茫在何處五崖峽一作溪水橫樵路身被翠雲裘䄂拂紫雲集作煙去去時應過嵩少間相思為折三花樹西嶽雲臺歌送丹丘子李白西嶽峥嶸何壯哉黃河如絲天際來黃河萬里觸山動盤渦谷集作榖轉秦地雷榮光休氣紛五綵千年一清聖人在巨靈咆哮擘兩山洪波噴流射集作箭射流東海二峯却立如欲催翠崖丹谷髙掌開白帝金精運元氣石作蓮花雲作臺閣道窈𡨕人不到集作雲臺閣道連窈𡨕中有不死丹丘生明星玉女備掃灑麻姑搔背指爪輕我皇手把天地户丹丘談天與天語九重出入生光輝東海集作求蓬萊復西歸玉漿儻惠故人飲身騎第一龍上天飛集作騎二茅龍上天飛按初學記華山門列仙傳呼豫先者有仙人持二茅狗來騎之乃龍也送顧八分文學適洪吉州杜甫中郎石經後八分蓋憔悴顧侯運爐錘筆力破餘地昔在開元中韓擇木蔡有鄰同贔屭𤣥宗妙其書是以數子至御扎早流傳揄揚非造次三人並入直恩澤各不二顧於韓蔡內辨眼工小字分日侍諸王鈎深法更祕文學與我遊蕭踈外聲利追隨二十載浩蕩長安醉髙歌卿相宅文翰飛省寺視我揚馬間白首不相棄驊騮入窮巷必脫黃金轡一論朋友難遲暮敢失墜古來事反覆相見橫涕泗嚮者玉珂人誰是青雲器才盡傷形骸集作體病渴汙官位故舊獨依然時危語集作話㒹躓我甘多病老子負憂世志胡為困衣食顔色少稱遂逺作苦辛行順從衆多意舟楫無根蒂蛟鼉好為祟况兼水賊繁特戒風颷駛崩騰戎馬際往往殺長吏子干東諸侯勸勉防縱恣邦以民為本魚饑費香餌請哀創集作瘡痍深告訴皇華使使臣精所擇進德知厯試惻隱誅求情固應賢愚異列集作烈士惡苟得俊傑思自致贈子猛虎行出郊載酸鼻惜别行送向卿進奉端午御衣赴上都杜甫肅宗昔在靈武城指揮猛將收咸京向公泣血灑行殿佐佑卿相乾坤平逆胡𡨕寞墮煙燼卿家兄弟功名振麒麟圖集作閣畫鴻鴈行紫極出入黃金印尚書勳業超千古雄鎮荆州繼吾祖裁縫雲霧成御衣拜跪題封賀端午向卿將命寸心赤青山落日江潮白卿到朝廷說老翁飄集作漂零已是滄浪客惜别行送劉僕射判官前人聞道南行市駿馬不限匹數軍中須襄陽幕府天下異主將儉省憂艱虞祗收壯健勝鐡甲豈因格鬬求龍駒而今西北自反胡麒麟蕩盡一匹無龍媒真種在帝都子孫未落東南隅向非戎事偹征伐君肯辛苦越江湖江湖凡馬多憔悴衣冠往往乘蹇驢梁公富貴於身踈號令明白人安居俸錢時散士子盡府庫不為驕豪虛以茲報主寸心赤氣却西戎廽北狄網羅羣馬籍集作鳥籍馬多氣集作用在驅除出金帛劉侯奉使光推擇滔滔才略滄溟窄杜陵老翁秋繫船扶病相識長沙驛强梳白髮提胡蘆手兼菊花路傍摘九州兵革浩茫茫三歎聚散臨重陽當杯對客忍涕淚集有君子不覺老夫神內傷送顧處士吳與丘司議之女壻即况也釋皎然吳門顧子豫早聞風貌古真誰似君人中黃憲與顔子物表孤髙將片雲性背時人髙且逸平生好古無儔匹醉書在篋稱絶倫神畫開厨怕飛出謝氏檀郎亦可儔道情還似我家流安貧用晦讀書坐不見將名干五侯知君别業長州外欲行去聲秋田修畎澮門前便取觳觫乘腰上還將轆轤佩禪子有情非世情御荈貢餘聊贈行滿道喧喧遇君别爭窺玊潤與氷清送僧仲剬東遊兼寄呈靈徹上人劉禹錫釋子道成神氣間住持曽上清凉山晴空一作清室禮拜見真像金毛玊髻卿雲間西遊長安𨽻僧籍本寺門前曲江碧松間白月照寶書竹下香泉灑瑶席前時學得經綸成奔馳象馬開禪扃高筵談柄一麾拂講下門集作得徒如醉醒舊聞南方多禪一作長老次第來入荆門道荆州本自重諸集作彌天南朝塔廟猶依然宴坐東陽枯樹下經行居止集作此故臺邉忽憶遺民社中客為我衡陽駐飛錫講罷同尋相鶴經閒來共蠟登山屐一旦揚眉望沃州自言王謝許集作與同逰憑將雜擬三十首寄與江南湯慧休送張山人歸嵩陽白居易黃昏慘慘天微雪循集作修行坊西鼓聲絶張生馬瘦衣且單夜叩柴門與我别愧君冒寒來别我為君沽酒張燈火酒酣火暖與君言君何集作何事入關又出關答云前年偶下山四十餘月客長安長安古來名利地空手無金行路難朝逰九城陌肥馬香車欺殺客暮宿五侯門殘茶冷酒愁殺人春明門外高城一作高處直下便是嵩山路幸有雲泉客此身明日辭君且歸去送韋仁實兄弟入關李賀送客飲别酒千觴無赭顔何物最傷心馬首鳴金環野色浩無主秋明空曠間坐來壯膽破新月不能看行槐引西道青稍長攢攢一作青松稍長攢君子送秦水小人巢洛烟韋郎好兄弟疊玉生文翰我在山上舍一畒蒿磽田夜雨呌租吏春聲聞暗關誰解念勞苦蒼突唯南山送禇祕集作校書歸舊山歌韋應物握珠不返泉匣玉不歸山明時重士亦如此忽怪禇生何得還方稱羽獵賦昨集作來拜蘭臺職漢篋亡書已暗傳嵩丘遺簡還能識朝朝待詔青鎖闈中有萬年之樹蓬萊池世人仰望棲此地生獨徘徊意何為故山可往薇可采一自人間星嵗改藏書壁上集作中苔半侵洗藥泉中月還在春風飲餞灞陵原莫厭歸來朝市喧夫君不見東方朔避世從容金馬門送孫徴赴雲中韋應物黃驄少年無雙㦸目視傍人皆辟易百戰曽誇隴上兒一身復坐雲中客寒風動地氣蒼茫橫吹先悲出塞長敲石軍中傳夜火斧氷河畔汲朝漿前鋒直指隂山外虜騎紛紛翦應碎凶疑奴破盡看君歸金印酬功如斗大送客之江寧韓翃春流送客不應賖南過徐州見桞花朱雀橋邉看淮水烏衣巷裏問王家千閭萬井無多事閉户開門向山翠楚雲朝下石頭城江燕雙飛瓦棺寺吳士風流甚可親相逢嘉賞日應新從來此地夸羊酪自有蓴羹定却人此詩二百七十二卷重出前已削去送張郎中還蜀歌盧綸秦家御史漢家郎親專兩印征殊方功成走馬朝天子伏檻論邉若流水曉離仙署趨紫微夜接髙儒讀青史瀘南五將望君還願以天書示百蠻曲棧重江初過雨前旌後騎不同山迎車拜舞多耆老舊卒新營遍青草塞口雲生火候遲煙中鶴唳軍行早黃花川下水交橫逺鴈孤霞蜀國晴卭集作笻竹笋長椒瘴起荔枝花發杜鵑鳴回首岷峨半天黑傳觴接膝何由得空令豪士仰威名無復貧交恃顔色垂楊不動雨紛紛錦帳胡瓶爭送君須臾醉起簫笳發空見紅旌入白雲送陳章甫李頎四月南方大麥黃棗花未落桐隂長青山朝别暮還見嘶馬出門思舊鄉陳侯立身何坦蕩虬鬚虎眉仍大顙腹中貯書一萬卷不肯低頭在草莽東門沽酒飲我曹心輕萬事皆鴻毛醉卧不知白日暮有時空望孤雲髙長河浪頭連天黑一作暗津口停舟渡不得鄭國一作州遊人未及家洛陽行子空歎息聞道故林相識多罷官昨日今如何送康生入京進樂府詩李頎識子十年何不遇只愛歡遊兩京路朝吟左氏嬌女篇夜誦相如美人賦長安春物舊相宜小苑蒲桃花滿枝桞色偏濃九華殿鶯聲醉殺五陵兒曵𥚑此日從何所中貴由來盡相許白夾春衣仙史贈烏皮隱几臺郎與新書樂府唱堪愁御妓應傳鳷鵲樓西上雖因長公主終須一見曲陽侯送山隂姚丞携妓之任兼寄蘇少府李頎東風香草路南客心容與白晳吳王孫青娥桞家女都門數騎出河口片帆舉夜簟眠橘洲春衫傍楓嶼山隂政簡甚從容到罷惟求物外蹤落日花邉剡溪水晴煙竹裏㑹稽峯才子風流蘇伯玉同官曉暮應相逐加餐共愛鱸魚肥醒酒仍憐井蔗熟知君練思本清新季子如今得為鄰他日知尋始寧墅題詩早晚寄西人文苑英華卷三百四十一
