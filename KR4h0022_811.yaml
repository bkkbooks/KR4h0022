body:
  text: 文苑英華卷八百十二宋李昉等編城門楚州修城南門記一首全義縣復北門記一首水門斗門附通愛敬陂水門記一首汴州東西水門記一首新修漕河石斗門記一首橋汾河義橋記一首中渭橋記一首井義井記一首觀風驛新井記一首城門楚州修城南門記鄭吉今上元年春正月楚州新作內城之南門何以言新因舊之去也何以言作更從王制也王制若何曰天子諸侯臺門也何稱內城别於外郛一作交非也春秋傳曰南門者法門也南靣而治者政令之所出也楚大邦也日者草創南雖設譙門卑且陋但闔兩扉為露棚於前振軍旅一作鼓焉露棚不能蔽風雨亟理而亟壞由是刺史兼御史中丞李公新作之公名荀隴西成紀人用文學德行進嘗言於賔客曰走前為戎曹郎白於執政曰太平時天下有府兵今散矣而折衝果毅郎將戍官等輩尚冗食焉艱難後天下有州兵而軍籍多空名庫兵皆刓一作刻腐安不忘危易道也有備無患軍志也晉室尚清言代馬譟河洛天寶怙富庶燕盜腥中原職司一有空字其守言非出位幸相公裁之當時執政雖似不為意他日揖走於列曰泝淮而上一作止達於潁而州兵之益團練者纚聮五郡焉楚最東為名部疆土綿逺帶甲四千人征賦二萬計屯田五千頃凡兵賦食三者相通也公嘗亟言兵願試鋒頴焉召對延英得列以聞可脂轄矣故遂授銅虎符竹使符來此公始下朱轓遽視城洫簡兵甲閲卒伍若不適於意者楚人再無嵗負租逋穀甚多乃去鄉胥之啄害民者斂賦與之緩期人戴其惠征租力人入一無入字矣得善用籌者勾稽公物之出入抉負財且二百萬俾軍吏之敏察者覘公田之稼得將隱謾之穀不翅萬斛掌公財而坐于市占軍籍而蔽其家計其入僅足其廪食牧財而斥其人外廄有征馬雖不滿四千蹄而槀粟脂藥之用圉牧將卒之列繁且耗公曰幸天下無事就有道一作既有急而此悉罷去之月省費三萬藏有墆財矣乃完補卒伍乃犀利甲兵乃飫飽吏士乃恢崇規制掾曹有公膳牙門有常饔胥史有官厨衛卒有給食合而言之曰廪餐錢者三百七十人先是以嵗用不足常自正月迄于仲夏凡曰廩餐錢者皆半之俟斂新賦而后復之或災沴水旱賦不畢入於終嵗不復公曰寧損他費焉有責其盡力而使之歉復耶悉賙之仍筆於檢日用約若今嵗後或不易羊羮之敗其無虞乎由是吏胥醺其德將卒許之死矣士伍寒燠有若賜衣詔以嵗貢征緡賦之嚮者泉輕幣重而賦之以帛而士得其贏今也泉重而幣輕猶賦之以帛官受其利公曰吾心有不安焉盍一作盡賦以緡茍不足即與帛而時其物之價而直之既聞令歡聲動壁壘皆曰有君如此使我蹈水火可也乃新南門巉然而樓增以舊五之二焉劃為雙門出者由左入者由右夾築髙阜類觀闕而非者九一作凡軍壘皆爾命之曰却敵慮壚土之易陂陀也鱗甓而塗固之周施檻楯其駐也建大斾鳴笳鼓以司昏曉焉其戎也卷斾援枹於樓中以謹擊柝以嚴教令以壯都鄙以張軍聲為理若此足塞執政之云兵賦食三者相通試鋒一作筆穎之說矣凡畚築攻木瓴甓塗塈者無慮備於軍伍而州閭人皆來縱觀耳既休役勞工顧謂告曰子學舊史願為我記日月不願黼飾空言曰古者國有史舉事必書舉國有詩王者採之知其國之風自秦郡縣天下史之與詩皆止矣獨有銘功記事文之金石者近於國史國風之類歟然言之不文不能播逺請將俟作者公曰否子焉用辭既不得命乃考三亦無此字實以書往嵗有將作少監李姓陽氷名善籕書尤工為大字瑰碩多力郡邑省寺得其署題者榮而葆之大厯中客於楚因大署州門昔人措之於西偏至是公易之於南門以表揭逺近或曰宏制異蹟公一作若相期於數十年間斯盛事也不可以不識故著之於末仲春貞陵復土羣臣上言請御端門赦天下改元上思慕未許故猶以大中紀年十四年四月二十一日謹記全義縣復北門記栁宗元賢者之興而愚者之廢廢而復之為是習而循之為非恆人且猶知之不足乎列也然而復其事必由乎賢者推是類以從於政其事集無此字可少哉賢莫大於成功愚莫大蜀本作甚於吝且誣桂之中嶺而邑者曰全義衛公城之南越以平盧遵為全義視其城塞北門鑿他雉以出入且二字集作問之其門人曰餘百年矣或曰巫言是不利於令故塞之或曰以賔旅之多有懼竭其餼饋者欲回去聲其塗故塞之遵曰是非誣且吝集作吝且誣歟賢者之作思以利乎人反是罪也余是復之詢于羣吏吏叶厥謀上于大府大府以俞邑人便焉歡舞里閭居者思主其家行者樂出其塗由道二字本作由是道以廢邪用賢棄愚惟集作推以革物而集作宜民之蘇若是而不列殆非孔子之徒歟集作也故為集作為之記云水門斗門附通愛敬陂水門記梁肅嵗在戊辰揚州牧杜公命新作西門所以通水庸致人利也冬十有二月土木之工告畢從事徴其始請刻石以為記云書載濬畎澮距川傳稱為川者决之使導然蓋一作導與政損益政舉則道舉政汙則道汙汙則革革則久賢哲之治也當開元以前京集作荆江岸於揚子海潮內于䢴溝過茱萸灣北至邵伯堰湯湯涣涣無隘滯之患其後江𣲖南徙波不及逺河流寖惡日淤月填若嵗不雨則鞠為泥塗舟楫陸沉困于牛車積臭含敗人中其氣為疾為瘵長民者時興人徒以事開鑿既費纍巨萬或妨奪農功殫財竭力隨導隨塞人不寬息物不滋殖百有餘年矣貞元初公由集作以秋官之二出鎮兹土既下車乃驗圖考地謀新革故一作謀利革害相川源度水勢自江東而西循蜀岡之右得其浸曰句城湖又得其浸曰愛敬陂方圓百里支輔四集盈而不流决而可注圖以上聞帝用嘉允乃召工徒修利舊防節以斗門釃為長源直截城隅以灌河渠水無羡溢道不回迂集作逺於是變濁為清激淺為深潔清淡澄集作泊可灌可鍳然後漕挽以興商旅以通自北自南泰然歡康其夾隄之田旱暵得其溉霖潦得其歸化磽薄為膏腴者不知幾千萬畝野人誦曰膴膴原田自今以始嵗其集有豐年都人誦曰沔彼流水我邦是紀鍾美不知嚮非我公有先物之知移俗之才則曷能運可大之謀蠲纍世之弊繇旬朔之勞致無疆之逸宜乎人之永歎一作詠歎也如此按陂塘本魏廣陵守陳登所設時人愛其功而敬其事故以名之謝文靜晉書作靖成偃又以召公之德為稱有魏以還五百餘載不朽之績及公而三皆在斯邦不其盛歟水門之作將以重成功示長利非登臨游宴之為嘻後之人抑可以知汴州東西水門記并序韓愈貞元十四年正月戊子隴西公命作東西水門越三月辛巳朔水門成三日癸未大合樂設水嬉㑹監軍司馬賔佐寮屬將校熊羆之士肅四方之賔客以落之士女和㑹闐郭溢郛既卒事其從事昌黎韓愈請紀其集無其字成績其詞曰維汴州河水自中注厥初距河為城其不集作弗合者誕置聮鎖于河宵浮晝沉舟不閣本作用潛通然其襟抱虧疏風氣宣泄邑居弗寧訛言屢騰歷載已來孰䆒孰思皇帝御天下十有八載此邦之人遭逢疾威嚚童噭呼劫衆阻兵凛凛栗栗若墜若覆時維隴西公李勉受命作藩爰自洛京單車來臨遂持集作拯其危遂去其疵弗肅弗厲薰為太集作大和神應祥福五榖穰熟既庶而豐人力有餘監軍是咨集作咨司馬是謀乃作水門為邦之郛以固風氣以扞集作閈寇偷黃流渾渾飛閣渠渠因而飾之匪為觀逰天子之武維隴西公是布天子之淳集注云一作天下之文維隴西公是宣河之沄沄源于崑崙天子萬祀公多受祉乃伐山石刻之日月尚俾來者知作者集無者字之所始新修漕河石斗門記穆員分洛為漕斗門在都城東一作門字南中橋之右舊制喉不深口不速其流隨之水斯溢旱斯涸東有斜堰俾其來往終嵗不修輒壞修則水積髙而迤南北北傷則洛亘邙趾南傷則魚逰井鄽不修則漕復于陸且其地與岸皆置薪焉不再閏而一作不一易每嵗繕塞斜堰洎南北堤橋之費相與盈萬其斗門之工不計蓋其弊者也安平公治三川之暇顧念於此之疾未去且曰水之性導無不順一作利壅無不害善為水者唯其所趣使若自然其要在於不與之競而已是用浚斗門之下以量其入庳斜堰之上以歸其餘庶乎饒不為增傷不為減盈萬之費嵗收於公而通海之波率土之運東西交騖合朝宗之義焉中橋之旁有古堰廢石沉于泥沙公乃發而轉之以代置薪之制省於自他山而致者蓋百之一猶懼剛之不勝柔岸化於水乃受規矩俾之追琢如斧斯鋭以分其衝如月斯仰以折其勢積石山鬬中流湯湯南鄰鑿龍永代無愧上濟行邁是為通橋嵗三月興作四月畢事一作事畢人不見始而覩其終垺其功用不足於常嵗之數而不朽之利與皇都洛水垂之無窮焉嗚呼物之至柔者水不得其理者懷山襄陵其次决隄防隤城邑夫唯不爭之力然後勝之天下之理一理也制天下之至强者其唯不爭乎於水也見公之政於政也見公之德異日觀易簡久大之業此非其一隅哉公以為成公之志者實肆其勤命以名氏刻于岸石仍俾末吏謹而書之貞元四年四月丁亥日記橋汾河義橋記崔祐甫絳人有成橋于稷山縣南汾河水上入境稱曰孝子詢之三十喪父母五十猶一作由縗麻故其鄉黨捨氏不名貴之也初兹縣有具舟之役鄰邑有官修之梁自太原西河上黨平陽至于絳逹于雍繇卒迫程賈人射利濟舟為捷渡口如肆孝子川上喟然嘆曰夫來者如斯其可勝紀欲速不逹式或作其在兹乎見義不為非勇也臨難不濟非義也乃願棄家乞諸他郡枯槁藍縷日恆嵗積自河間一作阿關而東陶唐儉風食貨艱難閭里褊小率令逺馳驟邇饋餉耆耋一作耄喻美於編户丁男捨耒而攻木義聲感也汾流湯湯河滸牽射潰一作隤沙徙岸呀呷轉騰畚築於激射之旁根柱於沸渭之下是慮是圖功就其十八九矣其年秋七月天作霪一作淫雨湍悍或作激襄陵噫大水不仁前功蕩矣邑老鄉人涕泗而弔之曰力竭于一作於子天不恤是而已矣顧而不應且有後圖徴詩人之嘉謀參作者之逺慮曵索辮篾縶舟戾舸一作航白露下而謀始止於凌澌杜春氷解而興功止於水潦降一夫一作嘆不可奪志三年其有成功廣可方軌平可轉轂去其飾成在一作成無丹雘取其固勢異虹霓僉義於孝子之功也故曰義橋昔周王以懿戚封建吳札美盛德遺人西臨孟津北對姑射山河風土其肯徒然所以義表専一作顓門功烈鄰境難其一善矧乃兼之由是縣人志之于石一作皆唐文粹中渭橋記喬潭自鳥鼠穴者兹水廣矣依一作稅鳯凰城者兹橋壯矣水朝巨海而不竭橋通大路而居要不然豈自秦至我唐六千甲子而獨一作猶存也稽厥𢎞道一作造率兹帝圻一作畿候天根之見當農務之隙司金司木鳩而積也水工木工速而至也揮刃落雪荷鍤成雲京兆尹紫綬一作紱而董之邑吏墨綬以臨之逺邇子來結構勿亟無小無大咸稱天一作于休經之營之不愆于素丹柱插於坎陷一作窞朱欄赩而電炫一作烻乃虹引成勢猶鵲填就功連橫門抵禁苑南馳終嶺商洛北走滇池鄜畤濟濟有衆憧憧往來車馬載馳而不危水潦起漲而轉固人思啓者吾其能濟赩赩赫赫轟轟闐闐且周穆之駕黿鼉振千祀也東明之聚魚鱉稱一時也孰若我由也一作之而必達憑之而必安若以匹敵夫何逺矣潭遂一作遽因行邁覩兹崇飾將刋石以表跡敢搦札以記事赤奮若嵗流火之月也井義井記邵真義以發衷形外昭施物也井以下汲上導彰濟人也河間公鑿井於城垣之次陽門通莊之右偏署曰義正哉導之深源經以一作之善利庇彼邃宇達于交衢鐵其瓶以永不羸石其甃以給無泥飛輪周散泄竇前注淬一作泙而平之隨用不私主發生以流潤當赫曦以伏炎在搖落而激清抵凝沍而不閉環四序以一其惠俾憧憧者知飲濯所嚮焉蔑燠𤾉之虞濟煩乏之艱昏懵者得以淘蕩瘵痗者由之蠲愈滌汰氛坌沃灑蒸灼淡然不改與地配久化囂闠為閒敞鄰梵宫以一作之清淨修廊對開連樓鬱峙嘯真侣以宴息速嘉客以盥潄一作溉指心而授應日而就彼豐福吉祿繁榮重一作祉崇慶欲不萃於河間之門得乎故北寺司刑上卿也南一作西臺專席中丞也戎府佐政司馬也參二外閫顯榮當朝鶱鶱青冥前視萬里是鑿井為濟川之漸斫輪為秉軸之兆可轉盼而待矣公才蔚量碩質貞氣淳名膺王府心拂塵纍制一作料物以經逺恤人以遂誠回俸節財蕆事彰義將獻祉于大君貢休于元戎歸夀于高堂三事體大公之𢎞誓乃戒司翰者書實刋記揭于井外時大厯六年春三月記一作皆文粹觀風驛新井記崔黃中自荆門至清宫三百里雖水泉味鹹鑿井疏源往往而有中間觀風驛三十里㳙滴不流磽確而瘠長亭短亭三百餘家終日挈瓶入谷而汲暨乎暑氣炎煽天地燒爍金石提綆半路已成溫湯居者既往來一作性命難通行者固不保其往元和六載我司空鄭公節度荆南下車之日緝寧巴徼統正楚風疏導濆溜未暇細務三年政閒事已一作簡因議路室委餼之事饑乏汲引之道訪於幕中寮佐僉曰地形峭峻意功多未即贊公公曰登陸求蓮誠宜不卜然二師鑿井焉有檻一作濫泉愚叟移山素無巨力志之所至神亦或昭茍利於人不計藏鏹支使庾承度宣貞絶俗仗義真一作直副成規終此殊績於是程功蕆事穴其路隅一之日興畚鍤俾應鼛鼓騰沙掊土二之日困于石飛鎚敲火轉石磊硪三之日計功一作工未畢瀸泉仄出泛濫渤潏井上千夫口闞噪喧呼揚灑甘溢一作泉提缶爭先巷無居人語笑道邉嗟乎夫善政養人之術皆日就月將然孜孜而化曷若鄭公興一言土石之役濟萬古生靈之命匠意於衆慮之表見機於不牽之初如此翊君為堯舜之代惠澤必浸於昆蟲贊國為華胥之朝恩波必滋於草木况濟人於聲教之外愛物於象數之中立德已來無出其右易曰改邑不改井以君子清規長存鄭公有焉黃中猥從鄉一作鄉從第得厠賔筵覩事揚嘉猶未盡焉一作善冀後來多士經此樂土知有仁焉時元和七年嵗在壬辰十二月二十三日文苑英華卷八百十二
