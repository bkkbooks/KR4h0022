body:
  text: 文苑英華巻八百八十一宋李昉等編家廟二馬公家廟碑一首相國崔群家廟碑一首代郡開國公王涯家廟碑一首馬公家廟碑李宗閔元和十五年夏六月有詔天平軍節度使檢校禮部尚書兼鄆州刺史御史大夫扶風縣開國伯馬公作三廟於京師秋九月新廟成冬十月有一日命公母弟推攝祭行陞祔之禮旣卒事推率其族人耋老相與言曰馬氏之先以功名顯於周漢之際下魏晉氏族世寢衰今公起自窮身遂爲方伯克有宗廟勤亦至矣願得銘之於石以示後人俾其無忘艱難而世世享祀不絶其亦可乎咸以爲然公名惣字㑹元扶風茂陵人也昔舜伯益掌上下草木鳥獸歴夏殷周世不失職其後造父事穆王有勞賜之趙城氏後七世至叔帶去周適晉事文侯後三世生夙為晉王卿遂專國事後八世與韓魏三分晉地建國稱王後五世趙之公族有名奢者將趙有功封馬服君其子孫因别爲馬氏自奢七世至通爲漢武帝侍中以二千石始自邯鄲徙茂陵於是属方疑作右扶風故號扶風馬氏在三國時多仕於蜀更宋至宇文周連連有人公之五代祖曰士儒爲隋江亳二州刺史亳州生伯達入唐舉進士爲懐河内尉樂黄老長生之說棄官從孫思邈遊隠于茅山河内生頠舉進士又舉八科士於髙宗天后朝爲御史尚書兵部郞属天下羅織熾起以不證皇族罪用失其官已而歎曰吾雖不逢吾子孫冝有達者兵部生光粹五嵗而能詩舉進士爲滎陽令功化甚美縣人傳之滎陽生皇考諱侅年十嵗則受左氏春秋日記萬言後方以經明行髙歴仕諸侯由檢校尚書職方郎中爲吉州刺史治行卓尤升聞于朝進褒州名加賜命服竟以官卒公旣孤追念世業以為五代祖有文才仕隋官不過群吏髙祖父懷至道曽王父有隂德欝積而未發王父皇考惠澤在人而皆存不議於朝殁而祭於寢重祥累慶其不在兹乎乃刻心自修以道迎天之休學明德成名聲四聞於諸侯辟書交至公又言曰古之貧無以祭必求仁者之粟然則不以其道雖日用三牲不如魚菽之為㓗也故在滑與中貴人迕在閩不恊於柳冕以是濵于死而厄窮十年公亦不悔憲宗即位知公之賢追刺泉䖍二州以御史中丞都䕶日南以國子祭酒觀察於桂以徃升御史大夫師于百越徵拜尚書刑部侍郎尋副丞相晉公討淮西淮西平遂代晉公鎮其地加工部尚書治蔡州居一年蔡人和且寜遷于許州而并有殷蔡朝京師留拜禮部尚書華州刺史而為鎮國軍元和十四年齊冦始誅朝廷以其地廣人衆易生摇動折其都府别為一道而分曹濮之田以益之命爲師齊人之不廷于今六十年民窮而無告兵驕而好亂公至則布以誠信示之法式纎悉而不茍寛柔而有威居一年人盡安田益闢三軍百吏上下有節上聞之進封扶風伯加銀靑光禄大夫復追贈王父爲尚書工部郎中祖母韋氏爲扶風郡太夫人封皇考為兵部尚書母鄭氏為榮陽郡太夫人以褒寵之命立三廟備致祭以告成功鳴呼人之冨貴顯榮以祀其先祖世多有之如公之超不失政終始如其志者斯亦難矣得不謂之大孝乎明著後世可以無愧銘曰今皇帝即位六月東藩臣惣使使者上言有司以臣名數謬登禮當廟祠皇帝曰昔我憲考聦明聖武兵衛四出掃定郡邑愛敬忠良為民父母實命汝惣作藩于東始平淮亂遂撫鄆封庇二邦仍世不䖍民痛無告卒驕而頑苞奸窺隙以萬以千汝來尸之莫不順然朕初即位汝適報政疇汝爵邑書于功令惣拜稽首敢亂疑休命皇帝曰咨無汝私蔡人不龔汝則治之齊人不安汝則綏之勤亦至矣而賞何卑命汝爲伯即封於岐惣拜稽首非臣之力陛下先臣實有明德臣䝉其慶幸以守職皇帝曰咨我今有詔追榮爾先以昭爾孝啓爾土宇錫爾宗廟惣拜稽首死無以報乃命季推作廟京師由門及堂不偪不僣礱楹刻桷秩秩施施是卜是擇仲月吉日三廟之主第升于室登降享獻䕫䕫齋慄公猶居外推奉以行克薦誠敬如公在廷神祗安樂福禄來并維公之興盖自諸生維艱維難乃克有成咨如疑作汝後嗣無忘此銘相國崔羣家廟碑牛僧孺憲宗紀元十四年詔右相中書侍郎平章事清河公群立家廟于長安崇業里廟三室粤五月二十二日天子命以羊一豕一助奠太常出博士一人相禮儀即日加贈烈考金部公尚書左僕射極顯親之榮錫教忠也先是丞相清河公諏日卜牲致齋盥洗朝服立於阼階之東司儀告辦宗祝讃事奉贈鄭州刺史府君神主祔於第一室夫人樂平郡太夫人王氏配座室曰皇考廟奉懐州刺史贈太子少師一作今贈司空府君神主祔于第二室夫人魏國太夫人李氏配座室曰王考廟奉今贈太尉府君神主祔於第三室夫人齊國太夫人盧氏晉國太夫人王氏配座室曰考廟始迎嚴嚴卒事競凌俛興舒於愉愉勿勿瞻䖍俯慕肹蠁交格逮闇質明禮旣勿違君子於是觀卿大夫之孝而知周德之所在矣廟第一室曰鄭州公諱湛字湛然以德門淸閥冠當代之疑作以𢎞度茂質儀搢紳以全用具業識文武釋褐常州武進縣主簿累選頴川滎陽二長史動必中禮遷必以庸治官將私皦皦矩矩嵗終上能宰相啓公為壽州刺史未被詔而公捐館為有德者之所哀痛第二室曰懐州公諱朝字守唐書世系表作懿忠即鄭州公第二子也純粹凝秀發爲菁華臨蒞不耀舉適大當蜀天寳羯起虎臣扞難眎得士爲勇弱公以辟三府由試大理寺直攝監察御史四遷檢校倉部郎中兼侍御史知鄭頴兩州節度使觀察留後録刺史事時副元帥梁國公抱玉以全師軍岐下餼饋廪食悉責於公急須草草一呼三索應卒尤翔了辨綽綽移試國子司業兼懐州刺史内殿召問賜金紫龍之以基址大用未㡬改檢校左庶子充河西隴右粮料使是以志將疇謀陟岵以不及致詔恩重此露前能優贈秘書監大夫家風行孝具於貞元中右相司徒滎陽鄭公餘慶神道碑文第三室曰贈太尉公諱積字實方懐州公之嗣子也善一作習史書五言詩爲文而敏政建中牟德宗狩梁漢九州歳貢瑟縮不集上在廵責賦稅急租庸包大夫表公嘗從二府事澄磨割剔以靳靳於當時累請公以秘闕殿中侍御史為判官居廣陵楊子運江南以超行在公號憂國厄晡旦自力蹄馳檝飛職貢填路冦平謝免翛然脫履雖蹤希象外而功行羶灼爲時湏速遂適無容矣三遷檢校金部郞中司自陜以東水陸運㑹其年失仲弟哀踰於禮遂嬰疾不起其後寵章七告身自司徒公冊贈太尉至於初終宻行具於舊相令太常趙郡李公絳神道碑文夫以鄭州之厚仁懐州之器業金部之忠孝三良百行施豈無集元和年清河公竟以全德文武恭忠温直憲宗外綏華戎内接萬幾條網品例踈貫折折不質不要天下瞻信立言者熾疑作識丞相之輔理而知三廟之遺憗逺矣古者道施於仁則鏤於鍾彛書於簡編其或行浮而實未稱者史氏闕逸乃必噫哀於謚誄發輝於文辭寄金石存景行以備紀事者以之補採今清河公禎祥聖代庸跡焯闡推始反本以崇宗祧䂓方豐菲一中於度牲牷豆斚無有缺時春秋禘嘗盡忠盡敬猶以丕烈耿光未克篆籒泣奉家老狀請隴西牛僧孺傳而誄之銘曰昭昭成廟櫨松桷栢斵之磨之謹古不餙二門眈眈瞻東應南周匝壖坦庭植冬陰三室峙扄肅槭嚴深濟濟孝孫以時饗之簋斚豆籩旣具而冝恪恭聲聞如見如疑明德馨香百福已來厥初大風齊太之遺支𦙍茂秩累累而賢榮陽之仁河内之才太尉植行將開以先丹元感靈乃儀鳯凰丞相厥生輔我唐章忠孝懋宣興時太平耀榮祖宗以尊顯親旣祭則禮一作祖以敬如一作加存牲牢具肥祝史賛神宗婦宗工整整平平祉祚之傳若火移薪於萬斯年爰有記云代郡開國公王涯家廟碑文粹作興元節度使王公先廟碑唐制五等有爵服而無山川登于三事得立四廟備物崇祀以交神明敬先報本以輔孝治有國之令典也惟長慶三年前相國王涯集粹作公始卜廟於西京崇業里公時鎮劔南東川上章曰臣涯官秩印綬品俱第三請如式以奉宗廟制曰可是嵗仲冬申命長男孟堅祔其主于三室明年公入爲御史大夫復以十一月躬行蒸祭間嵗公出梁州就拜司空禮崇異數廟加常祀文粹作祀室大和二年増新室旣成祔顯考于宗二本作位告饗由禮觀之者以為世程第一室曰上儀同幽集作豳州别駕府君諱元文粹作光政以闕陵崔氏配第二室曰湖州安吉縣令贈尚書刑部貟外郎府君諱實以妣贈扶風縣太君馬氏配第三室曰朝㪚大夫青州司馬贈戸部侍郎府君諱祚以妣贈武威郡太夫人賈氏配第四室曰温州刺史贈大尉府君諱晃二孝作晃以妣贈魯國太夫人博陵崔氏配初周靈王太子晋遇浮邱公化爲神僊時人號曰王家其後遂以命氏顯於秦者王文粹作日翦三世將秦師子孫分居晉代間東漢有徵君覇覇孫甲亦號徵君徙居祁縣爲著姓故至于今為太原人自漢渉魏益以熾昌凡十葉至後魏度支尚書廣陽侯問廣陽有二子神念神感神念南奔梁神感北仕齊惟儀同府君廣陽侯五代孫也唐興于太原實從義旗佐成王業故有開府儀同之寵惟刑部府君以功臣子理二邑不躋貴仕故有錫羡後大之祥惟戸部府君幼孤以孝聞於鄉曲未冠以文售於文粹作于有司由前進士補延州臨安縣主簿㑹詔徵賢良策在甲科授􅌡州饒陽尉嵗滿遷渭南尉天后在神都而東畿差重遂由渭南轉河陽適逄建萬像神宫甸内吏分董其役因上書切諌繇是名益聞開元初以大理司直馳軺車聮讞大獄閩禺朔漢文粹作漢所至文粹作至止决平早以欒棘傷生晩成劇恙樂就夷曠故不至大官惟大尉府君生於治平時以文學自奮年十有五賁然從秋賦明年春升名于司徒又一年𤣥宗御層樓發德音懸文詞政術科以置髦士府君䇿最髙授太常寺太祝未㡬闕以能通道德南華冲虛三真經進盩厔尉天寳中歴左文粹作右拾遺左補闕禮部司駕二外郎屬幽陵亂華連二本作遣兵南服因佐閩粤改檢校比部郎中行軍司馬時中原甫寧江南爲吉地二千石多用名德乃以府君牧温州朝廷虛公卿以俟髙第及聞永嘉人輟舂罷社薦集作搢紳間以不淑相吊焉雖位負于道而邁德垂矩後之人得以續祚不揚之其儲休啓祐有自云爾生三子皆聦明絶人長曰沼以神童仕至檢校禮部郎中次曰㓗以竒集作某文仕至國子祭酒今代郡公實季子也早在文仕籍射䇿連中咸世其家貞元中德宗聞其名自藍田尉召入禁中視草厥後三典書命再叅内廷憲宗噐之付以國柄翊賛有道雖册免常居大僚今年自梁州請覲上思用舊臣為羽儀遂領太常其公府如故以一心事六君顯官重務靡不揚歴且夫起諸生至三公而心愈卑道益廣出授黃鉞以臨集注作伯諸侯入服華章以謁家廟追崇極大位血食備多室享全榮而奉詔薦嗚呼公侯之孝歟冝書廟噐以視橋公之三鼎其辭曰閟宇神庭䆳淸而嚴上公之儀四室眈眈犧以㓗牲粢以大糦交神尚敬合魄尚氣子姪宗工駿奔奉事副笄侈𬒮儼恪居次孝孫兢兢執爵而升以祼以擩文粹作濯以伏以興水陸具來羶薌畢登列于圜方其氣増増乃初蒸嘗二本作乃禴乃嘗敬而追逺二昭二穆孝以尊本瞻瞻几幄蹜蹜堂閫禮成起慕涕落𤣥衮濡露踐霜誰無永懐不如逹者哀與榮偕逄時奮庸誰不得位不如仁人以道為貴惟公之逹兮名以顯親惟公之仁兮德以澡身六朝之淸臣一代之全人冝其世家翼亮二本作翼翼振振罔不恭肅集作肅祗祗于廟門集作于廟之門文苑英華巻八百八十一
