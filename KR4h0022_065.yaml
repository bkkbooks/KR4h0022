body:
  text: 文苑英華卷六十五宋李昉等編軍旅二立走馬賦一首觀兵部馬射賦一首師貞丈人賦一首善師不陳賦一首有征無戰賦一首王師如時雨賦二首轅門射戟枝賦一首佩刀出飛泉賦一首孫武試教婦人戰賦一首垓下楚歌賦一首立走馬賦喬彞元戎帳外兮何者雄躡絶電踏追風於是千旗已合萬馬既匝槍壘環回轅門洞開紛熒熒以照雪殷嶫嶫以隨雷嚴鼓齊蒼山破一夫唱萬人和寒笳既鳴攢騎無聲左右交入奔騰迸集鴻洞戢孴隂森嶷岌揮鐵騎以突空上金鞍而屹立輪寶刀以直視拔長劍而端揖奔鯨絶海旋巨浪以尚遲餓鶻翻身寫長風而未急於是神仙敞恍鬼怪呼吸擺金甲而作寒噴玉花而半濕膂力既剛雄鋒莫當擲紅旌以顛倒按白刃以熒煌霍穫禾火滅沒離披頡頏引山河之奔走隨簸蕩以低昻訝夫危臬危瓦纍迹從容自適互辟易沸霹靂豁千里以萬里乃左射而右射餘疑掉青絲繫練影呌天閽揮落景雲旗一簸翻古塞而半飛畫戟雙盤寫長風而自冷况復騰勇氣耀紅塵倚精誠而張膽仗忠信以扶身妙能傑出其大絶倫感平生之顧遇睹性命之逡巡既見知於挺特疑作時寧有力於依因得逢堯舜之代以備爪牙之臣恨武揚之尚狹踢髙步而難伸皆曰若更度交河絶大漠藏鐵羽銷金錯橫穿馬邑雷鼓出於地中直上龍城將軍忽如天落引皇風之披靡蕩殺氣以澄廓不離旗斾長隨衛霍鞭八方之戎羯豁萬里而開拓騁輕趫之俊藝突沙塞以取樂壯觀呈肅然清揚大斾入舊營觀兵部馬射賦以藝成而動舉必有功為韻元稹大司馬以馳射而選才衆君子皆注目而觀藝至張侯之所乃執弓而誓誓曰今皇帝製羽舞以敷文德擇材官而奮武衛莫不二字一作兼以超乘者為雄一有不惟二字中鵠者得祭用先才捷志亦和平以多馬為能故以馬為試以得鹿為美故以鹿為正豈獨武人之利實惟君子之爭射者皆曰諾雖五善之未習庶一舉而有成為是馬逸騤騤士勇伾伾蓋一作蓄鋭氣候歌詩初聼采蘋之章共調白羽次逞穿楊之妙忽縱青絲旁瞻突過咸懼發遲曾驥足之展矣翻猿臂而射之揮弓電掣激矢風追方當耦象決裂麗龜􅒂爾摧班示偏工於小者安然飛控一作鞚固無憂於殆而信候蹄而不爽則舍拔之一作而無遺故司射舉旌以效勝曰爾能克備我爵可期賈餘勇者宜乘破竹之勢善量力者當引負薪之辭由是靡不爭先莫為我後一作莫肯為後皆曰措柸於肘十得其九參一作忝明試者亦何嘗而不有破的之術萬不失一凡獻藝者豈自疑於無必衝冠髮怒揚鞭氣逸引滿雷砰騰陵飈疾皆窮百中之妙盡由一孔而出乃知來者之藝蓋由一作亦前人之匹若此則蹲甲壯潘一作飬左傳潘尫之黨與養由基蹲甲而射之揚觶觀孔信一場之獨擅終六轡之未總豈比夫浮雲逈度開月影而彎環如雨橫飛挾星精而搖動雖當至理不忘庸功天子垂衣儼鵷行於北闕夏官司馬閲騎從於南宫貢士之程職司具一作其舉會欵塞五方之俗觀校將一作埒百夫之禦得雋為雄惟能是與星郎草奏上獻拱辰之方天驕解顔喜見射雕之侣客獨顧一作訂之而笑曰此蓋有司之拔萃固非吾君之右汝我有筆陳與詞鋒可以偃干戈而息戎旅司文者聞之而驚曰爾其自勵于爾躬吾將獻爾于王所師貞丈人賦以武有七德師貞丈人為韻獨孤授先王以武不可獨任故受之以師得其人則百蠻風靡失其職則九廟陵夷君於是慎擇其難申命分掌動衆以正臨下以長合人謀兮順天奬慎戰也在知機而萬全慎身也如臨深於百丈夫然出號令拔忠讜樹藩屏疇土壤截方隅以無事威戎狄以稽顙俾其政成者列爵功髙者受賞是知師貞丈人之稱也至若藎臣嘉謀以國利不可動忠不可賊威逺方以慕化訓萬民以勤德使強弱不相陵乃勝殘而可克力牧佐之而不疑軒后居之而不惑此帝者之師也蕭蕭馬鳴悠悠斾旌伐叛則刑立柔逺而德成上乃奉君之職下乃守臣之貞湯武用之而定業伊周法之而作程此王者之師也審官以統衆求賢以自輔必觀釁而後動豈窮兵以極武不害閭閻不敗工賈政得其經事合其矩管仲因之以相齊桓晉文由是而稱盟主此霸者之師也暴而不戢安忍無親徒侈其欲輕用其人處勞則先加於衆居後則樂止其身猶回邪而自保迷大路而不遵州吁處之以國滅子反效之以禍臻此黷武之師也嘗試言曰王心無逸師出以律惟得疑作德其欽惟刑是恤自然道貫三五勳崇四七不假築京觀兮定武功逞淫刑兮數軍實言乎師貞在人其來自久動無悔敗位不虛受追惟古昔厥有臧否是則頗牧之勇敢可以執其手平勃之臨事可以難其後伊吕之行可以欽其順其守不失其攻不有行稱文武之略居成社稷之守神祗以百福休祐子孫以百代不朽蓋由尊嚴之重以禮立訓師律順正動而何咎善師不陳賦以聖朝威服逺人為韻失名明明天子五帝可六政不嚴而諸夏以清師不陳而逺人咸服於是旋大斾罷長轂劍無頓鋒矢無血鏃萬方悅四境肅同夏后之舞羽舞干笑周王之白狼白鹿邊鄙以之不聳神祗於焉介福至矣哉善師不陳之功烈烈而郁郁者也伊昔漢武黷兵于鄰殫天下之賦悉域中之人南浮漲海北歷胡塵然後戎虜稽服甌閩入臣孰與乎兵不交而抱不鼓遂奔走而來賔我帥孔間我后齊聖順魯史之武有七德法周書之農用八政不討逺而逺者自懷不耀兵而兵威克盛信百王之楷範為百代之龜鏡者也自太朴之既散俗易弊而難威蜂蠆或恣其毒螫鴟梟乃縱其翻飛是以有征無戰有守無圍家以文事革武事士以儒衣易鐵衣王者之兵也有征而無戰北方之強也不召而來歸全師以出振旅而返示牛馬之弗服在干戈而載偃鄙楚子之滅弦小文王之侵阮百僚兮率職濟濟羣士兮直言謇謇聲教所被則莫我敢遺疑日月所臨於是乎無逺蕩蕩昭昭不諱之朝忝陶唐之比屋敢公疑作頌美於帝堯有征無戰賦以安人以德不戰而旋為韻陳山甫皇威克宣強敵無全始建牙而耀武終不殺而摧堅授師律以徂征鑿門而出指戎夷而向化掉鞅而旋靜難以仁勝殘以德綏懷未及方資吊伐之謀氛祲潛銷詎假貔貅之力命將必先於制勝數課寧勞於逐北三令著而狼野自清七德彰而梟心已息是知訓戎有律料敵無遺乘地形而動衆順天討以行師播武烈為先登之旅尊英風為遏亂之資利百勝者不其殆矣尚九變者於斯逺而於是指途而邊鄙革心按甲而凶渠授首向威懷而將順將血刃而何有行當盡敵制在於成規武以止戈匪勞於善誘念安人之可待懷闕疑作鬭志而終不當其藴龍韜以啓路馳豹騎以清塵鄙身膏於草野笑血染於車輪所以示專命柔逺人揚分閫之威無逾六月來有苖之類不俟七旬一舉干戈載櫜弓矢惟義是徇惟仁是以有以見解紛之謀有以見知難之旨且夫治兵在於克敵定亂在於圖安苟率人以知化寧黷武以自殘所以不矜其庸功不事乎權變文教被於含育武德彰於宇縣由是而言善用師者不在乎善戰王師如時雨賦以慰恱人心如雨枯旱為韻陳去疾惟唐十二葉盛德如春雖幽無不被而獷有未臣帝曰苟非我武焉能庇人於是考龜策諧咨詢投干戈於苖扈之地拯黎庶於塗炭之辰是師也以勝殘為心以除暴為主得周宣之薄伐非漢皇之黷武爾乃誓六師命吉甫鼓而出兮俯而取始天聲乍發闞若雷霆終聖澤旁流霈如甘雨既殱元惡不問其餘誠與之更始而待之如初簞食壺漿將爭先以邀路緇黃耆艾知弛負以寧居是以足蹈手舞怨釋憤攄洗心靈而沃若類草木之賁如始其聞金鼓之聲疑殺戮之謂及其蒙霑濡之賜衆乃欷歔以相慰曰豈圖汙俗猶軫聖心殷雲雷以作解與枯稿而為隂濟濟蒸徒一以貫乎睿旨顒顒噍類咸得滌其煩襟渥恩既溥幽夏疑作憂爰泄愛離畢之時見覩燎原之熖滅始慿鼓怒信天步之不回終乃發生諒人情之大悅既而新厥政革其謨遂開儒風與文教載櫜越棘與燕弧正皇綱於寒暑變下國之榮枯夫如是莫不沐仁澤以愈愈詠恩波之侃侃方且觀濠梁之魚樂豈復比農夫於歲旱第二同前韻章孝標念黎庶兮罹于毒痡我興師以剪屠如旱歲之稼穡得膏雨之霑濡豈不以垂渥澤潤涸枯草木之心寧慮䁧其乾矣天人之意將同衛討邢乎至乃鋭戈矛齊卒伍誠告虔於上帝祈發生於下土龍旗電掣疑驅蔚矣之雲鼉鼓雷奔似送霈然之雨匪六師之是侵實百姓以為心所謂謀臣如雨猛將如林馳之驅之似得時而將降六伐七伐謂決渠而就深既踴躍而成列象沉隂之欲泄青萍刜而破塊將分白羽麾而散絲不絶奚潤草之芳茂信洗兵之是閲異包茅之貢矣爾職不恭同隂雨以膏之我心則恱不疾不徐箕張翼舒向兵革而自弭喻雱𩃱之有餘多鼓鈞聲知上善之不若密雲不雨想西郊之未如且宣王六月兮非旱之備高宗三年兮適足為費惟鬼方之是懼何人倫之足慰豈比指緑林於一戎養蒼生於百卉知我者信號令如春不知我者疑甘澤隨輪一鼓而風雲作氣再麾而寰宇清塵以此出征為活國不能無戰乃愛人故得戎羯來王淮夷納欵嗟螻蟻之猶聚將刑戮而尚緩今挾泰山壓危卵不得已而用師如救歲之大旱轅門射戟枝賦以一箭解圍人中之俊為韻王起矯矯吕公凛千載之英風立轅門而耀威百夫之特射戟枝而騁伎一矢稱雄所以解紛為智和難成功豈徒用壯於六鈞之妙務能於百步之中當其劉氏興戎袁公結陳既禍拏而莫解亦兵纒而屢振闕疑作鬬貔豹而不寧苦蚌鷸而相徇是用假我手弓救其血刃則萬夫駭目不在於和容二憾革心必資乎中俊闕力未疲徵會於兹排其患難成彼宴私離坐離立左之右之森森兩軍比晉楚𠂻甲之日桓桓二帥同劉項舞劔之時是用出雄戟射小枝既從容而諭旨亦慷慨而興辭乃曰射者所以明其志忠疑其質今欲轉禍為福反凶致吉若嗤同失鵠我藝自忝其疊雙儻妙等麗龜爾心固宜乎如一乃展容耀示英威決拾既佽分銖不違洸洸赳赳如翰如飛莫不佇其密彀釋此重圍彼戟在門揭焉獨見立亭亭之直影引耽耽之英眄刃孤標而霜白末斜指而目眩彎弧弨弓之際勢若月圓鳴鏑於矢之端光如電炫觀之者心惕聞之者膽戰固當靖難於五兵豈獨解顔於一箭彼容色沮我師氣振咸曰將軍勇絶衆藝如神蹲甲非敵措杯不倫今在座隅徒欲釁勇而嗇禍儻居戰陳誰當左馬而右人請懲忿於昔日願釋憾於兹辰盛矣哉斯會也當軍門而人無不協中戟枝而戰無不舍既威加於域中亦藝絶於天下則毁其壁二人之訟息弄其丸兩家之難解此將軍之功實為小者佩刀出飛泉賦以至誠所感靈泉為生為韻失名二師之伐大宛也耀武經闡王靈入絶域討不庭近取諸身拔寶刀之錯落上善若水出山溜而清泠則誠之所至危無不寧挹既思於跋石利遂因於新硎當其大漠之北窮山所次萬流皆涸甘泉斯祕堯人不能以鑿井考叔徒稱其闕地思羣飲而駿奔懷載渴而麏至大兵懸命夸父之拔䇿是憂上將失容曹公之指梅莫致惟石巖巖將破以至誠憂心慘慘將慰以玄感乃拯疑經營陟嶸崢綴流之急貫日之精念爐中煆鍊之利成山下決蒙之情孤環出銛鍔明賴黑壤而暫啓迸玄泉而可驚活活兮有甘井忽開之兆泠泠兮奪醴泉自出之名飛流乍凝乎淬刃濯血又同於洗兵三軍激心始觀切玉之利萬夫駭耳俄聞潄玉之聲咸曰將軍發丹懇勞赤誠俾竭涸流濕枯稿增榮亹亹之流既控清而引濁濟濟之衆咸出死而入生豈一勺為多實一瓢為貴既挹注之有待知福祿之來為刀惟百鍊不挫其鋒鋩泉則九重未存其觱沸此畫地之成川如開流之納泉酌焉不竭瞻之在前何盡心之顒若致滿腹之怡然向使以誠為後以力為先動而有悔鑽之彌堅則佩彼孟勞諒無施於磽瘠拜同踈勒亦何望於潺湲於戲人之有志物莫能禦刀為短兵兮曷用泉居厚地兮不沮中石之箭處危疑而則那駐日之戈於精誠而誰與故能飛名域外獻功王所豈不以至誠如神達之於六府垓下楚歌賦以漢師清歌遂統天下為韻失名昔漢兵未罷師屯垓下物格時變威輕勢寡兩雄較武焉知劉氏昌乎四面聞歌是何楚人多也且其秦以三世漢之五年當重圍而外合聆逸韻以初傳令肅轅門如貫珠而有序聲環戎壘聞彈鋏以相宣將清氛䘲於兹夕寧遏行雲於逺天由是互變新聲復轉餘弄效巴人而四起明漢祚之一統宣於里巷千門而羣犬吠聲靜入房櫳一夜而滿城驚夢爾其本秦人也盡當秦聲爰作郢曲以移楚情將以表升平之道引謳誦之清威楚疑外虞風急而鼓鉦動地曲終回顧月上而旌旗繞城楚王乃起自帳中憮然悲惋腰間之劍斯在麾下之師已散在昔割河渠分理亂東也為楚西也為漢乘時負約情激憤以空深言志增悲意浮遊而不斷但聞迭唱以繼和寧肯側聆而屢歎回首無記疑虞兮奈何汝起楚舞吾將楚歌弱冠舉兵霸世之名則振窮途敗績拔山之力空多固知天命有歸雄圖不遂念繞梁之未閲疑信創業之難致戰征七十空傳海內之名子弟八千誰返江南之地已而楚幕旗偃漢軍角悲雖潰圍之逺遁終漏網以難期便繼遺聲可成功而作樂果符先兆乃獻凱以旋師奏嗚咽之一曲決雌雄於此時孫武試教婦人戰賦以題為韻李銑昔孫武子兵術干吳王曰臣聞國之大君之尊法星象月則乾效坤蓋利德之並用故文武而兼存所以安社稷保子孫恢霸圖慮併吞臣實不敏請嘗試論王曰弧矢之利以討其二雖邦國之無虞必干戈之有備今者革車千乘介馬萬轡外多勍敵敢曠戎事誠願陳五兵之道用一鼓之氣雖寡人之不德知將軍之自試聞女子之難令豈習之而能致不然者則無以表將軍之異武曰唯唯大王之所示乃召內宰出麗嬪下高臺授武臣皇皇兮其令已申肅肅兮其氣益振今日寵不可恃法有所尊疑作遵當秉心以受教勿怙色而驕人於是建主首統諸婦示其左右約其先後唯玉貔之自矜念將軍之何有顧三令而却立哂再麾而掩口當兵法之必誅雖君令之不受既而易將更令整行定伍開天門閉地户審向背分客主角以持兵金以節鼓張竒正以尊疑其進退制方圓而必中規矩武曰彼如桃如李皆如貔如虎可以服楚越攝齊魯惟大王之悉覩豈獨播於虛聲以婦人之講武王曰始也壯卿之術今也信卿之效將遇敵而可敵故難教而可教乃朝羣臣御正殿授以斧鉞使其攻戰王不失王道武不辱武戰疑戮二姬而顔色匪怍制敵國而軍聲大變於是孫子用兵有獨斷之名尤不若吳王有割愛之善文苑英華卷六十五
