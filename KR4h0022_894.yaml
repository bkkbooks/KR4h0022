body:
  text: 文苑英華卷八百九十五宋李昉等編職官三南省尚書右僕射姚貞公碑一首贈左僕射裴倩碑一首吏部尚書蕭灌碑一首户部尚書楊執一碑一首故中散大夫守尚書右僕射上柱國賜紫金魚袋贈太子太保姚公神道碑權德輿公諱南仲字某吳興武康人姚墟媯水根柢峻茂後漢青州刺史恢始違難東徙周華州刺史北絳郡公僧坦以行義道術聞生二才子曰察曰最最仕隋為蜀王友六葉至公曽王父績仕絳州曲沃縣令王父𤣥宋州宋城縣令烈考發天寶中舉秀才十上不合慨然自奮從西平王哥舒翰于隴上積功勞至右領軍衛將軍他日以公之勤贈國子祭酒公抗行厲操清方謙儉以規為軫集作瑱出國語以禮為輿以多文集作學為富以不貪為寶潔如大圭鏗若黃鍾𢎞毅以任重溫良而能斷自射䇿筮仕至于綏吉祿啓手足繇是道也其初應制條對理道授太子校書內史吏部表其才能凡三結黃綬至萬年尉前後考課為府中最擢拜右拾遺久次歷右補闕發文石封皂囊諷議十年彌縫百度大厯中中宫憫冊既卜夀原陳古義以上逹疏近郊之非便即日詔可下其章於宰司特超五階被以命服執事內詔以上賀近臣修職而競勸服薦紳者誦之執簡記者書之辱以本官充理匭使今皇帝嗣位之初慮化不下究以通邑長人導利之源出於蘇州海鹽縣令韓晉公滉時總方任延於幕庭改殿中侍御史興元嵗大路集作輅省方深燭理本柬求畯人徴詣行所洎清宫旋蹕拜左司員外郎紀綱品式練逹明備轉兵部員外郎時武師告成祲沴肅清四征羣帥條上功級材官勇爵差次賞典受命顓逹疇庸式叙遷本司郎中凶旱之後被邉囏食近關蒲晉十餘城之地因其徴令悅以平稅乃董使車贏糧息人拜御史中丞嵗中換給事中正色匪躬清公不苛大朝以肅右集作左曹亦理明年授同州刺史三載考績復以御史中丞領陜府長史陜虢觀察使居五年就加右散騎常侍左輔有離宫公田之劇焉陜服居函關砥柱之衝焉於二千石元侯之選斯近而重賦政廉平馨香流聞以修班制以厚風俗上以靈昌居兩河之郊鄭為支郡是皆要害且今徑兵處也自丞相魏國公政成入弼厥後守臣再物故而魏公之澤寖逺思得寬明忠智之長以輯柔之進公左散騎常侍御史大夫為滑州刺史鄭滑節度使於是握兵符乘單車惠然簡易入布條職恤鰥寡用仁制强禦用明居常以柔克臨事以貞勝士吏悅勸夫家寬息阜俗成師納忠閉邪衆情皆􅋏而公益厲十六年介圭來朝牢讓師帥繇是詔魏公以左僕射居相府命為右僕射公既得請命其軍司盧群以代焉為仁由已是稱方國之表知臣者君乃膺師長之任詔太常具儀法以涖中臺禮官贊引宰政為客諸曹羅拜於堂下郎吏捧牘於階序禮成渥縟秉直者榮之䖍奉朝請恪居官次慥慥然守業修職未嘗以耆碩尊禮自處山甫之匪懈考甫之益恭古人與稽華髮彌固十九年秋七月乙亥感疾薨于宣平里第享年七十五天子廢朝悼歎俾中貴人弔祠追命為太子太保恩之所加可勝言哉惟公粹和而能貞厲恬淡而有儀矩履方持重坦坦光大詩曰愷悌君子求福不回言樂易而不違於道也乂曰靖恭爾位好是正直言遭明君其道行也斯二者君子謂公得之夫人河南縣君元氏魏景穆帝之裔宣州録事參軍光宣集作宗之息女也和易淑柔以肥家道先公而沒十八年矣嗣子太僕寺主簿兖潔清好古誠信得禮與其弟亮茹毒問卜以閏十月已酉奉公之喪與夫人之殯合祔之集作于少陵原黃渠里以儉襄事率循家法雖宗姻四布皆泣而辭之且曰理命也猶懼先人懿實寢而不章刻兹穹石以永終古銘曰黃目鬱器禮神所貴佩玉金龜君子是衛集作宜秩秩姚公其心秉彛抱義戴仁造次無違公之所履中立不倚廉車淑旗所嚮風靡正集作政無吐茹道若砥矢事君愛人斯謂至矣中臺崇崇端右宗公皇明嘉奬陟是師長卓爾道行倐然化往少陵鮮原美檟新阡龜筮告繇集作猶塗芻儼然白驥蕭蕭黃渠潺潺姚公之德兮揭此貞堅尚書度支郎中贈尚書左僕射正平節公裴公神道碑前人王者奉三無私以勞天下則崇德報功加恩飾終與覆載照臨相為用一也惟正平節公以愷悌文敏為二千石尚書郎人浮於食位不配德纂積後之緒業貽克家之燕翼流光裕蠱為世集作代師式乃集作及元和二年夏五月追命告贈為尚書左僕射孝本乎忠榮生乎哀用攄罔極以刻金石云公諱倩字容卿河東聞喜人其先嬴秦同姓因封受氏魏晉已還號為多材八賢方駕百族歸重自魏冀州刺史徽五代至中軍將軍雙虎中軍五代至隋左光祿大夫皇朝贈元州都督忠公仁基忠公生皇銀青光祿大夫禮部尚書定襄金牙兩道節度行軍大總管贈太尉聞喜憲公行儉公之曽祖也憲公生皇光祿大夫侍中兼吏部尚書𢎞文館大學士贈太師正平忠獻公光庭公之王父也忠獻公生皇尚書祠部員外郎贈太子賔客禎公之烈考也公天姿𢎞裕虛受通理臧氏之有後於魯管氏之世集作代祀於齊逺至之器發於岐嶷年十一以相庭推恩授家令寺丞滿嵗選部銓第甲乙補太常寺主簿居先府君喪水漿不入于口孺慕殆於滅性宗門憂其死於孝禮文俯就衣服外除厯華隂馮翊二郡司户參軍轉祕書郎俄丁內艱毁瘠如初禮違難江介就拜洪州司馬改太子司議郎徴為殿中集有丞字侍御史拜度支駕部二員外遷司勳郎中祕書少監厯信饒二州刺史復徴為度支郎中其佐鍾陵也領留府之重居議郎也贊計司之職暨登中臺亞中祕皆兼柱下方書之任自淮而南涉江而西荆衡漢沔湘中夏口半天下奧壤為都府者千數公四顓使車連佩數印督課郡國調其盈虛吏祿兵食之仰給輸將一作般轉漕之回逺法錢牢盆之制田租口賦之差權其輕重商其功利察下人之疾苦廉長吏之善否車不輟鞅有勞於時其始受命也冦劇橫厲三川如燬隂方出師慕義助順代宗焦勞念慮命德宗以雍邸總戎賦輿所㑹征繕不給有詔輟東方軍市之租移用於中都屬受鉞之臣矜功觖望師老專利便文自營公慨然牒書譏切備至嚮之廢格悉用平鐫義夫一作士以之感激王旅以之震躍其理信州也用寬惠誠厚輯柔所部穡事滿野嘉禾集作生同穎年以順成人斯洽和復其庸調四字集作復其庸亡五千室闢其農耕二萬畝交代之日不書于簿集作籍且曰吾以恤隱豈當沽美不伐之善欲蓋而彰方帥表理行第一增秩至正議大夫加金印紫綬其為饒州屬所集作數代者非其人因緣權幸貪猾無狀公以廉平頒詔條以慘怛撫痍傷四封愛戴如熱斯濯其後徴拜也朝廷誅內臣修百度彌綸經費委重有司公以郎吏代故相第五琦專判度支事方冀裁成九賦超贊六職以美利利斯人令望日大天胡不惠以大厯七年秋七月考終命於長安光德里第春秋若干以某年月日歸全于萬年縣神禾原之大墓禮官博士以公處難不謀其身牧人不私一作知其功能固所守以行制度易嘉名以旌往行禮也惟公直而溫簡而文才裕於物器周於用靜若蓍龜動如干鏌秉是貞厲終焉節適著文集十卷湓城集五卷比興屬和聲律鏗然引拔參佐皆一時名士風味集作采資材邁絶羣倫齒位未極為薦紳所痛夫人京兆韋氏扶風太守恆之長女以大宗之家人集作家婦諸侯之內子襟鞶承訓籩豆助祭當室以敬睦親以仁姿操卓淑音徽𢎞大盛德著於母儀惠心通于佛乘五藴不入六姻是憲始封咸寧郡君後三追錫至邠國太夫人有子曰均以御史大夫工部尚書尹正荆門節制上逰就加吏部尚書右僕射元和三年抗章入覲真拜右僕射判度支加秩金紫光祿大夫由河東郡公進封郇國嵗中進左僕射同中書門下平章事撫征漢南臨長諸侯惟郇公直清𢎞重有文武楨幹得時大行為王室輔慮善以動官修其方賦政以惠南國宣威以靖西蜀師長百工阜成中邦兵符將印焜耀章灼樹善程能之績勤身體逺之用居則有猶動則有功率循風訓以復集作履尊大君子曰憲公忠獻公之休烈丕矩再世盛德屈於郎位必復之慶其在是乎初郇公之授律也孝文追贈公絳州刺史其進律也順宗贈公禮部尚書今皇帝永懷義方於是有左揆之命公之積慶郇公之孝思可謂至矣郇以三代論撰皆上台雄文猥以通舊忘其卑鄙辭則不腆庶傳信之無愧焉銘曰河汾之東慶祉所鍾公相葳㽔德耀昭融矯矯節公體仁修集作循性乃貽後昆實禀先正太尉經武太師翼聖施于儲賔執德之柄公用循良惠于二邦公有德澤宣于四方急病尚仁履險乘剛化被煩苦斯焉樂康吉祿方摯夀堂已閟藹此家聲揚于令嗣恩崇鼎鉉績茂師帥中外服勞安危注意便蕃屬任𢎞大名器孝理是覃義方所自九原之中禮盛服充王三錫命禭飾宗工連岡崢嶸介原穹崇陵谷有變令聲無窮贈吏部尚書蕭公神道碑張說仁以度心施物義以由道利貞孝以養志安親慈以教忠有後舉四行之尤善成百代之餘慶蓋得之於蕭府君矣公諱灌字𤣥茂蘭陵人帝髙辛之苖裔也𤣥鳥受命敬敷五德白雲入房網開三面微子封宋樂叔君集作居蕭氏族之始也相國下秦大夫師漢門閥之宗也大齊之集作以肅竹應期踐皇帝之位大梁以刃木集作木刃興運張天地之圖傳寶祚於一家易鴻名於兩漢青蓋入洛重南國之衣冠白馬朝周盛西雍之賔客公即梁宣皇帝之曾𤣥孫明皇帝之孫大父南海王珣入隋封梁國公纂德乾坤承靈睿哲舊邦雖改見夏鼎之時輕新社乃封知晉圭之必大考鈞中書舍人率更令𢎞文崇賢兩館學士學窮祕賾文標宗匠廣博幽深契神無迹溫良恭儉與道為徒是謂啓迪後昆而焜耀前烈者也公總山河之粹氣注日月之末光心根孝友器包禮樂動躡思後故口無擇言照在機前故身無擇行加以啓蓬山之塞路入藏室之𤣥關四科得遊夏之門六藝取鍾陽之雋年十八明經髙第補代王功曹王升儲改通事舍人又換內直監曵裾西苑擅文士之場束帶東朝首正人之列尋以家艱去職王戎死孝時論優之閔子免喪哀心未盡乃不就祥縞不徹兒筵者久之或曰懷其寶迷其國行其志約其親可乎哉公曰吾過矣不得已而外除不擇官而祿仕拜國子監丞以婚姻之故出為甘州司馬徙集嵐三州司馬轉渝州長史其從政也及身以惠下推誠以敬上老吾老以施教幼吾幼以字集作子人執是心也何往不濟故歷佐之郡必辟陋知方戎蛋變俗狼戾馴軌貪叨寡欲迎新者望風而歌來暮送故者計日而戀不足詩云淑人君子正是國人能長人之謂也太夫人在堂有羸老之疾公因吏集作使入計得扶侍還京下巫峽之波上當陽之坂展轉在側殷憂歷時夜集作席不安枕衣不解帶及板輿長稅扶杖不起子春視疾加損徒勤石建執喪悲哀自絶永淳元年八月寓居懷集作穰縣終於苫蓋春秋五十有九集作七先君之服也三年有終公過時不釋聖善之喪也五十不毁公戀親滅性君子曰禮也夫可謂至也集無也字矣夫人京兆韋氏祖雲起兵部尚書父師實秦州都督公卿令族蘭杜齊芬鳯凰飛鳴始正家道珠玉秀色終髙母儀年五十有四長夀元年十月逝於京師布政李奧以二年二月辛卯合葬於少陵原之先塋禮也其孤嵩克戴聖君以宰天下大福再成於身後湛恩廣運於泉路開元十七年仲冬癸丑詔曰中書令嵩父某育粹冲和降靈辰集作神象言入精微之奧迹登賢聖之軌位不充量道足庇人松檟雖幽音徽未集作不沫宜成追逺之慶俾崇冡宰之榮可贈吏部尚書同日詔曰嵩母韋氏門傳一經行包四德才淑冠乎邦族言範光乎母師誕兹寶臣作豫良弼封其石窖俾承土宇之榮表以金章永閟珩璜之飾可贈魏郡夫人於是建宗廟修禮物榮君後命告我前人逺哉心乎闕思集作恩一敬之感會也如是垂裕立訓克家揚名遺愛至矣慎終備矣東武公之子孫共連塋闕南城侯之夫婦同刻碑銘詞曰維蕭係宗出宋之子天命齊厯河圖梁紀纍帝重王雍容文史是生邦俊世濟其美仁義孝慈忠和庸祗文章鳴鳯禮樂元龜揭館枚馬儲闈潘賈人望國華風流儒雅歷佐列郡政成休問行立時法言垂後訓沒而益榮進位冡卿哀感有情事傳無聲墓門松平碑自金生不知千古誰逰九京贈户部尚書河東公楊君神道碑前人若夫孝在揚名忠歸令德事因感激氣概生焉時逢迍難勳業成焉桃李灼灼不自言於蹊徑松柏青青不受令於霜雪窮獨善而無撓達兼濟而弗矜子曰君子哉若人吾斯河東公之謂也公諱執一字某𢎞農華隂人也司徒集作司空按本傳贈司徒觀王雄之曽孫鄆州𢎞農公續之孫潞州胡城公唐宰相世系表作潞州刺史胡城縣男思止之子户部尚書相國執柔之弟觀公侍中恭仁公之伯父也安德公尚書令師道公之叔父也在隋則二代五公在唐則一門三相公台輔積慶禀清明之識河嶽會靈資磊落之氣體剛毅深於城府緼規略長於襟帶戲為軍陳敵國之勢幼成請學兵書長城之望早集年甫十六先君捐館七日絶飲三年泣血縞綅見禮記有制儒家歎其從禮柴棘加等議者憂其死孝清門集作明祖德貴集作勢胄能貧太夫人在堂有致力之養非躬藝黍稷不以供甘㫖非手樹桑麻不以薦絺纊年逾一紀勤不知勞既極安親之心方展事君之節乃濯纓璜渚獻策金門干當代之聖君論天下之成敗秦皇覽奏屏左右而與謀漢帝聞言膝前席而不覺一見拔玉鈐倉曹再見取尚食直長三見置典設郎驟進直詞深觸權嬖為易之兄弟所嫉左授伊川府果毅又上封章帝用嘉納加遊擊將軍右衛郎將歷左清道率換右衛中郎押千騎使總統貔虎集作武便繁肘腋故得叶心五王集作朝勘勦二豎奮飛北洛推戴中宗嗣唐配天不失舊物以匡復勳拜雲麾將軍右鷹揚將軍封𢎞農縣公賞未充庸且有後命贈冠軍大將軍右威衛將軍進河東郡公邑二千户賦四百室畀之鐵劵恕其十死乂錫天馬瑞錦珠盤瑶爵文綾集作綵文五百縑素三千分將士以上腴集作三王之上腴處五等之髙列雕戈紫綬環衛於鈎陳玉瓉黃流侍祠於清廟豈知釁結梁魯政回集作出豔哲里克納惠而為戮萇𢎞集作叔成疑作城周而見咎彼五績之摧頽此三黜之迍躓出為常州刺史以太夫人年集作羸老乞避卑濕特降中㫖轉牧晉州駙馬都尉琅琊王同皎親賢地切休戚圖深安劉之策未遂鍾室之災先及吏扇分集作紛獄公陷關通貶徙沁州刺史不知事仍長在夜魂九逝非北首而無歸晝户重扄異南冠而同縶果能推分榮辱忘懷生死人不堪其憂公不改其操久之盡削官封放還侍母梁山雨雪不隔曽集作曹氏之思王畿風景來就潘園之養尋而大勳不廢天道復反歸既奪之井邑起故時之將軍擢衛尉卿復初封爵巖巖劒閣集作山蜀之險要嗷嗷飛鴈人未安居饑渴仁明輯綏凋弊又授公劒州刺史蔚彼黍苖樂我膏澤內憂逺訃殞絶經集作逾時於是摶膺星奔徒跣求路雨不接乘集作夜夜集作身不解纕因心通禮朝流欽德集作歎有命奪情除汾州刺史知團結兵馬哀訴不允金革無違中國簡稽而有備單于遁逃而逺迹詔徴為凉州都督兼左衛將軍河西諸軍州節度督察元集作伯姓赤水軍等大使公富以農政和以師律彰信蕃部赫怒軍容斷胸奴之臂磧路安而不警張漢家之掖雪山開而無冦遂攝御史中丞璽書勞徠縟賞稠疊乂轉集無此字牧原州未發復授凉州都督改右衛將軍使悉如故尋移許州刺史未到以單于欵關授右衛將軍檢校勝州都督兼處置降户使懷柔以德種落宜之徴還本官又兼原州都督方集作旋屬降户翻叛河朔俶擾邉城聳蹙諸將無功强修連率夏州按察關內羽書日夜俾遷郡牧公按甲待敵確乎不動敵騎畏威竟無來掠向使回避行於一步則攘竊啓於萬端十將耗五集作五耗數年未復既而强公追愧集作捷朝端延賞徴拜右威衛大將軍進檢校右金吾大將軍尋而即真禁衛肅然異於他日也皇上哀庶戮之不辜念邉人之自孽大軍之後荆棘生焉乃命公攝御史大夫為朔方元帥公剛腸嫉惡擒姦摘非集作罪曩將之所彌縫宿吏之所乾集作干沒匿贓散廪一徴百萬矯枉過正衆口囂然改右衛大將軍無何復右金吾大將軍金刀更新靶集作骲鞘仍舊巖廊益峻徼道增清又集無又字改金紫光祿大夫鄜州刺史人寬吏急猶前政也享年六十有五開元十四年正月二日薨于官舍闔境發喪列城望祭古之遺愛何以加焉天子傷之下詔曰故官某夙負名義早著勳庸居內外之職備文武之任忠勤匪懈誠節無渝奄焉徂殁情深悲悼可贈户部尚書歸賵成賁集作喪有加恆數維公以孝敷聞以忠特達以幹述職以能典兵凡領郡十四將軍十二再仗節鉞三執金吾一至九卿二兼獨坐儼有直色集作道侃無媚辭銀艾復乎舊德圭爵傳乎祚膂集作𦙍全志節於夷險與福祿而終始諡曰忠公朝之令典也夫人新城郡夫人獨孤氏左威衛大將軍贈益州都督卿雲之女也婦德母儀中外師範開元四載先公即穸以今十五年六月合葬於咸陽之洪瀆川禮也其孤濯汪等銜恤靡訴託詞疇識感稱代之垂文哀劬勞之罔極銘曰堂堂楊公神密氣雄苦身難集作艱孝正國危忠落彼狡童樹此帝功昔稱關西今也河東觀王之裔珠華玉麗重葉尚主三朝嬪帝韡韡七德詵詵集作侁侁六藝公之亢宗鬱為世濟凉鎮西土朔集作邦臨北隅天子授斧集作鉞將軍剖符青蛇入笥白獸銜珠去持玉節來執金吾轉余士風集作瓜士守于鄜畤明察號神仁恩名子武都右折文昌星死素蓋歸飛黃泉已矣卜葬卷阿哀榮孔多尚書鼓吹太守虞歌碑流雨迹松引風過獨傳集作封茅土長誓山河文苑英華卷八百九十五
