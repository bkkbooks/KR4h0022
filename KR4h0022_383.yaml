body:
  text: 文苑英華巻三百八十三宋李昉等編北省四起居郎授韓休起居郎制蘇頲勑朝議郎左補闕内供奉判尚書主爵員外郎韓休理識清暢襟靈夷雅探學精微属詞婉麗甲科對䇿嘗副求賢左史記言用觀書法可行起居郎㪚官如故授賀知章起居郎制勅朝議郎一作大夫前行户部員外郎賀知章業優詞學時重才行稟精微之髙妙體仁恕以明逹必能書法不隠立言可觀冝廽職於版圗佇擅聲於鉛筆可行起居郎散官如故授楊齊宣起居郎制孫逖勅朝議郎前行左補闕楊齊宣規行介立守道安貞雅致表於文詞清標傳於緒業頃叅諌職考績已深自聞謝病嵗年滋乆雖宰臣立節毎避舉親而公噐湏才終難滯用冝發命於中㫖俾分官於左言可行起居郎散官如故授裴綜起居郎制賈至勅左史記事君舉必書先王之制也晉則董狐書法不隠楚則倚相能讀典墳善惡成敗實由其言慎擇端士求難其人殿中侍御史裴綜緒業清純言行敦敏俾之直筆庶朂厥官可行起居郎授崔瑶等起居郎制崔嘏勅載筆赤墀之下掌禮曲䑓之中注記行而鉛槧是資褒貶當而縉紳知懼顧兹所職豈易其人而擢備宫僚亦為佳選以瑶貞規素履紹克儉之家風以碣秀質清門承定傾之祖徳以瞻雄辭麗藻躡珠履於賔筵以景表退跡安時寄霜華於憲一作省署我之自得爾亦薦聞各膺寵擢之榮自有雲霄之路可依前件起居舍人授太子舍人劉如玉等右史制李嶠鸞䑓朝散大夫行太子舎人劉如玉朝散大夫檢校麟䑓著作佐郎崔融等並言芳蘭芷行温珪璧或譽滿銅樓或名髙石室記言之重選衆尤難宜收博辨之才俾居良史之任並可行右史散官如故授洪子輿起居舎人制蘇頲勅通直郎著作佐郎洪子輿雅淡不羣清貞自逺學探微㫖詞造幽典立心有恒常慕直臣之節書法無隠可稱良史之才俾列軒墀亦光鉛槧可守起居舎人散官如故授崔銑起居舎人制勑朝請郎前試一作守通事舎人崔銑識逺心明懐才藴藝缺碑盡記亡篋不遺實朝序之英髦為士林之俊㧞趨侍西掖洽聞東觀期書法以無隠俾舉能而有聲可守起居舎人散官如故授陳九言等起居舎人制孫逖勑朝議郎守太子舎人攝殿中侍御史朔方節度判官陳九言朝議郎行太常博士兼史館脩撰劉貺等清才雅望敏學工文是周行之俊人有致逺之良具史臣之選公議所一作攸歸宜並拜於軒墀俾分官於左右九言可行起居舎人㪚官如故貺可行起居郎餘如故授孔述睿起居舎人制常衮勑宣議郎試太常博士東都河南江淮南等道轉運使判官孔述睿左右史正用第一流其選殆精於尚書郎也今東觀諸儒皆約注記而脩簡冊事之當否多取正焉以某集作爾聖人之𦙍歴代儒首博通古訓述作可傳出入起居期於秉直可守起居舎人㪚官如故左右補闕授許景先左補闕等制蘇頲勑奉議郎行楊州大都督府兵曹叅軍事許景先詞含風雅有公直一作正之量宣議郎前國子監四門直講馬利學摠典墳禀亨嘉之徳士推令問人假清規致之掖垣用廣賢路景先可行左補闕利徴可岐州扶風縣丞員外置同正員仍直紫微省散官各如故授楊齊宣左補闕制孫逖勅朝議郎前行右拾遺内供奉楊齊宣耿介不羣精明有識傳清白之素業著詞華之令名逹禮云終外除將乆宜承宻命更列近臣可左補闕餘如故授薛兼適左補闕制常衮勅朝請郎前行萬年縣丞薛兼適兄弟致羙士林推重詞清行潔政以幹稱在煩劇而有餘守貞方而不易文章侍從朝夕論思㕘我諍臣以箴朝闕可行左補闕㪚官如故授辛丘度工部員外郎李石可左補闕李仍叔可右補闕等制白居易勅朝散大夫右補闕内供奉飛騎尉辛丘度等朕詔丞相求方畧忠讜之士置於左右而播䓁以石可暨仍叔應自塞詔書言其為人厚實謇直常集作嘗以文行謀畫從容於幕府之間臨事敢言當官能守可使束帶同升諸朝又言立度介潔静專不交勢利宜加推一作擢奨以勸其徒况又集無又字乆次者轉遷後來者登進皆適所用平章可之可依前件授盧文集作士下同玫起居郎劉從周補闕等制前人勅君有舉左史得書之政有闕諌官得補之二職者歴朝之清選也前侍御史盧文玫甞在西川時為從事亂危潜㐲能潔其身前監察御史劉從周頃佐宣城奉公守正集作政端士之操終然不渝時所稱論並宜甄奬况學術詞藻見推於衆並命清貫僉以為宜記事盡規各佇能効文玫可起居郎從周可右補闕授前合州刺史顔蕘禮部郎中殿中侍郎御史李德璘右補闕監察御史鄭渥右補闕等制錢珝勑具官顔蕘等昔太師魯公拘在冦廷渠魁有危一作僣廹之問對以諸侯朝覲之禮奮發直言不屈端凝守正而歿理命之戒家廟為先賢哉鉅人可謂忠而知禮矣今蕘行髙學茂洪緒有承因太師之所為遂以禮曹郎命爾用昭遺徳且勉令脩徳璘合矩中規擅髦彦之稱渥端居慎守積監視之勞擢為諌臣實就近列使吾聞過繋爾當官無或面從以墜其職可依前件左右拾遺授梁升卿等拾遺制蘇頲勅宣徳郎行岐州雍縣尉梁升卿等或敷暢學㫖或該通詞藝爰廣獻書之路用開納諌之門不獨美於雕龍頗思齊於市駿咸宜採擇以申甄奨可依前件授韋啓左拾遺制賈至勅劔門縣令韋啓雅有文詞仍兼政術諌官近宻必擇正人忠讜之言期於無隠可左拾遺授趙闡右拾遺制常衮誥獻再試文學考入第三等處士趙闡或懿文清㧞四科之羙或純孝彰著百行之先或以言精梗槩闕属觀風省俗頓綱求才幽滯靡遺精麤咸紀俾昇榮於中外庶有光於奨擢可右拾遺授郎士元䓁拾遺制勅前渭南縣尉郎士元等有君子之行有詩人之風頃尉於畿亦克用乂匪躬之故無以易焉進思直言入告於内勿使流議壅於上聞懋乃所職其無遺政可依前件授盧告左拾遺等制杜牧勅承奉郎行京兆府長安縣尉直史館盧告等朕觀不理之代無他道也取唯諾之士為耳目之官是以太宗皇帝之理天下也徳為聖人尊為皇帝三日不諌必責侍臣况予寡昧固多遺闕不官才彦安能知之告是吾賢鄉老之令子弟也以甲科成名以家行著稱取自史閣㧞居諌垣夫朕之不徳吏之不平政之失中人之不寜四者之闕悉陳其志此乃漢文帝開諌諍之詔也忠告不倦爾當奉職自用則小予不恡過勉思有犯無事遜言景宣與揚皆有才幹糾䋲大府賛佐兵郡各宜勉力以讐知己可依前件授前起居舎人韋序禮部員外郎前櫟陽縣尉韋溪左拾遺錢珝勅具官韋序等近朝賢相名卿以貞重簡潔益大其門者序則承之故華選陟居昭其嗣也爾復禀粹揚清不洿不屈播在公論使我思聞其或風法名家鉅宗稍替溪則餙身而進志欲與為一羅等疑謨乆為羈滯仍嘉好學俾列近班夫牋奏所司典章誠重而昭嗣之選大不在辭廷諍之臣惟直是舉欲與之志官以道彰華選近班各詳兹訓可依前件授前起居舎人崔居邈庫部員外郎前好畤縣尉充集賢修撰獨孤遲守左拾遺等制前人勅具官崔居邈等郎署之選優諌臣之選重必用門子以清朝倫居邈愿而自求以守名卿之嗣遲學而不倦能從長者之言聞其退居皆已甚乆茍無甄擢何為搜揚可依前件授監察御史李漸左補闕前著作佐郎張道右拾遺制勅具官李漸等朕常推感寤之意闢艱難之途實務塞違用昭致理爾等或奕代之盛風聲有傳强以自圖守若不墜或從學之道外直一無此字固在中慎無闕揣我之情然後舉職從諌則聖吾詎無心於此哉可依前件授長安縣尉直𢎞文館楊賛禹左拾遺鄠縣鄭谷右拾遺制薛廷珪勅具官楊賛禹等以賛禹挺生公族雅有令名檢身如履其春氷操心不愧於屋漏而言行無玷文章可觀連中殊科首冠羣彦捨而不顧去奉良知三年於兹澄澹一致自待之意何其逺歟以谷二雅馳聲甲科得雋亦承遺構自致亨衢求諸軰流兼慎行止朕方求理道允属滯淹聞爾賛禹之規為可以厚風俗而敦教化聞爾谷之詩什徃徃在人口而伸王澤舉賢勸善允得厥中並命諌垣我為公選汝於職業勉自激揚可依前件通事舎人授楊泚通事舎人制李嶠勅朝散大夫行通事舎人員外置同正員楊泚肅承簮笏頗著聲芳趨奉軒墀兼効勤恪宜加恩命俾從優奨可檢校通事舎人散官如故授韋元珪通事舎人制蘇頲門下朝散大夫行太子典膳監韋元珪占對閒詳風規韶茂䴏庖分職已命膏梁之緒鸞墀敷奏佇揚賓客之言可行通事舎人散官如故主者施行授韋振通事舎人制門下朝㪚郎前守通事舍人員外置同正員韋振良玉藴價明珠耀彩宜擢才於金穴俾趨侍於瑶墀可朝散大夫行通事舎人散官如故主者施行授盧惟緫目有雅字等通事舍人制孫逖勅前行潤州丹徒縣主簿盧惟等士族見推人才亦著威儀有則詞令可觀明試以言既閑於敷納為官而擇宜在於軒墀並可通事舍人餘如故授張伯禽等通事舍人制賈至勅太子左一作右賛善大夫張伯禽博雅温良能詳故事左金吾衛兵曺㕘軍張總淑慎徽美可立於朝休有令聞忠而周敏出納朕命僉曰爾諧伯禽可兼試太子僕總可守通事舎人文苑英華巻三百八十三
