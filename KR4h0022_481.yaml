body:
  text: 文苑英華卷四百八十一宋李昉等編方正賢良方正策五道文苑詞標文苑策二道應封神嶽舉對賢良方正策三道神功元年問隆周御厯多士如林揚已露才干時求進寧知媒衒之醜不顧廉恥之規風馳景軼雲集霧委攘袂於選曹盱衡於㑹府吏員仍舊人物實繁優游窘於退飛聲最疲於㸃額量能受職無闕以供料官列位擇才斯衆欲令九流式叙一藝不遺佇聞芳話𢎞兹盛烈且夫署行議年殷姬取人之道門調户選魏晉持衡之術因宜適變何者為先對崔沔對昔者賢良方正之士應務之際沔雖固陋嘗亟聞之莫不修詞立誠難進易退言不茍合道不苟容捨之則藏義然後取安肯負媒衒之醜棄廉恥之規若此之類其可多乎至夫揚已露才干時求進盱衡攘袂以徇速者斯皆小子趨附之徒豈足以厠我周行置於多士屏而勿用夫何疑哉主上欽若庶官明敡沉隱是使群英霧委多士景軼而秉鈞當軸之雋察言觀行之風不能審樞機定名實懲魯儒之虛服辨齊竽之濫吹至令纍最為僞名交戰謬功與實效相參而謂滯才由乎少官無位供乎有德嗟乎事有大謬一至于此明主昧旦丕顯每歎才難而羣士揚於王庭反憂多士君臣之同德其若是乎天子有司談何容易今懿綱一作網遐布淳風殷流家識廉隅人知禮節苟能上尊王制下絶吏姦閉請託之源塞虛詐之路使得懷才見用以道周旋無令椒蘭信芳獨屈樵夫之手騏驥雖駿不貴屠者之門則虛位待人猶持固讓懷寶深藏何患不達九流式叙庶莫逺焉一藝罔遺諒其所也沔又聞人能𢎞道非道𢎞人有濟治之臣無不弊之法往古雖載其陳迹行用實在乎主司觀夫署行議年殷姬令典門調户選魏晉良圖無非致逺之規咸有理亂之兆所以允釐百揆銓綜百一作五官及讒虐官朝則君子在野貪佞竊柄則以貨售才典故雖存而官政以紊然則隨時通變觀象因宜近取諸身一言斯蔽逺求於古兩無適從所以輕進狂言猶冀或逢善聽謹對此篇用治字第二篇用世字武后雖已革命疑未應便用唐諱第二道問屠釣關柝之流鳴雞犬吠之伍集于都邑蓋八萬計然一作象則人無求備物各異宜十哲殊科八能異術咸資對策則絳灌之器或沉必俟公求則許郭之才難遇選賢取士應有良規對對傳曰文以足言言以足志言或可察志隱於漠是知文者言之藻繪志之筌蹄有貞實者或忘藻繪得魚兔者必棄筌蹄則存言捨文合於淳古以言考德必洞精微故書云明試以言蓋用此道也今之對策其試言之流歟昔姬氏既衰先王道喪秦政虐戾亂彼天綱廢古燒書以愚黔首窮兵騁詐時無文焉故絳灌之徒韓彭之佐雄姿雖茂而道法不足向使伊人薄見方策早聞師範當亦略通大體抑揚宏議豈止决勝於境外而不能專議於君前乎故抱朴子曰古之試良將者亦問以策即其義矣國家樹萬世之基遷九流之弊墳索奧業洋溢於時縉紳先生蘊藉無缺安有倜儻之傑瑰瑋之才承明主之渥恩逢生人之大慶而不能抽其祕思效其長策歟然則謀而不行信而不用者抑可知也今之考言取士者必以綺飾為工視學論文者暗於心而必升曉政達幽者失其數而咸退譬千金之璧以微瑕而毀之百丈之材覩小節而棄之亦良可悲矣誠理達而義舉者勿以文害言詞婉而論深者勿以言害意則可以包括羣品網羅衆途察微知彰以文用武矣昔許子將郭林宗徒以布衣之交俯仰之際而能拔竒旌異因言揣心况乎擅英博之姿受明試之寄享厚祿居尊官而不能撫踠足於吳阪指潜璧於荆山至使有公輔之才而無許郭之鑒者斯則卿士之罪也小子何足以知之至如懷一能負一偏彼鳴梭抗履之彚聲律鼎飪之儔事雖易於縑緗功不資於翰墨則方以類聚各有司存謹對第三道問至於衢室總期一作章重屋陽館姬氏明堂之制炎靈汶上之規三雍五室之名宗廟容臺之目蔡雍之論袁凖之談歷代繁省之儀前賢是非之說咸宜詳釋以判羣疑對對我皇帝慈理廣運文思稽古紹興絶典重光大壯合宫雲搆明庭天聳列辟軌儀羣工制度可以即事而見觀象而察今猶逺訪先典曲垂下問者豈不欲揣其敏思徵其博物臣實菲薄何足當之昔哀公問儒而仲尼請更僕况此大體其可率爾言乎雖敢略談之然未臻其極也若夫堯之衢室舜之總期一作章夏之重屋殷之陽館皆所以取象天地昭配陰陽致孝於先布政於下厯運雖改此道不移八窗四達上圓下方度堂以筵度室以几周之制也崑崙茅屋周流璧水漢之圖也明堂辟雍靈臺三雍也太廟青陽總章明堂疑脫𤣥堂二字五室也取其宗祀祖考則曰宗廟取其修飾禮物則曰容臺蔡雍之論所以合異說袁凖之談所以别重事歷代繁省其儀不一先賢是非其書甚衆非斯須之述所能盡非造次之言所能精自我皇創制之前今臣定議之外教明禮備得繁省之中者其姬宗乎詞寡理舉處是非之要者其蔡氏乎謹對重試一道問不其才難于今所歎知人未易自古病諸以貌取言既其不可觀聲考度又或非宜故皇帝清問有司藻核公孫異之於天子朝錯褎然為孝廉賢才訓迪其道𢎞矣多歷年所兹率典常國家謁報上𤣥展禮中嶽降非常之制求希代之寶將以潤色雲封增輝柴燎龍門既陟方縱鱗於巨壑鴻干斯漸忽垂翅於風路良由夢石之木猶參杞梓之行冠玉之姿尚忝琳琅之序更令憲府重托詞林承鳳紼之明威俟龍泉之斷割其何以搴秀長楚審詞衆好辨是與非懲忿窒欲聊爾陳事冀獲嘉謀至若栁莊黜殯用事之差也石建闕馬為字之失也尋其後句末韻或犯於前聲覽以終篇答難不倫於次序一簡之內貧富不侔三道之中妍媸頓别取瑕則頗慙於卞氏擢用則致嫌於葛龔贈孟孫之言膏肓莫愈學嗣宗之默長短何分進退之禮奚宜用捨之方安在又旁求疏議紛披風謡威勢壓於權衡黷貨通於主守不同吾黨無嫌小子之詞翻乃倩人云竭老夫之思始令行而詐起終策出而奸生何方可以靜流競之來何法可以杜訛謬之入佇裨不逮無吝話言對對夫鉛刀均鋒劒之恥也蹇驢齊足驥之恥也朗璞蒙垢玉人之過也鳴絲絶絃伶官之罪也借如承明㫖獻嘉猷而愚智糾紛臧否錯糅斯亦士君子之所恨豈獨為政之憂哉沔實陋才良不足算憑藉休慶謬偕旌拔狂言雖立鄙道未孚蘊雜薰蕕沉蔽玉石重參羣彥之末再承議賢之問進思自勵其何補歟退欲鳴謙豈獲無咎審詞衆好儻或擇善而行辨是與非請思即事而對策曰栁莊黜殯用事之差也石建闕馬為字之失也竊謂議人者貴知其心論道者務存其意心懼未信則援古以自明道隱未光即託文而後顯故事以明心為本字以顯道為公事有小差而心術著矣字有小失而道教存焉斯則夜光之瑕明月之纇固不可得而棄也事與類相反字與義相違證乖而心不可𢎞象毀而道不可見一至於此亦無取云策曰尋其後句末韻或犯於前聲覽以終篇答難不倫於次序竊謂明試以言古之道也徵言以䇿今之制也言有聲韻蓋其浮飾策之次序固非典要切問存於答難次叙豈效謀謨精誠盡於對揚聲韻何尋獻替稽之於古揣之於情末韻或犯於前聲其來久矣答難不倫於次叙為病良深策曰一簡之內貧富不侔三道之中妍媸頓别取瑕則頗慙於卞氏擢用則致嫌於葛龔竊謂萬有一失聖人不免捨過舉能先師是訓道不可以純備才不可以周給斷可知矣是以國家稽通塞之迹列甲乙之科亦不可廢善以取瑕疑於擢用矣䇿曰贈孟孫之言膏肓莫愈學嗣宗之默長短何分進退之禮奚宜用捨之方安在仲尼有言不在其位不謀其政進退之禮用捨之宜允非小人之所及也然則覽古昔之遺事敢不薦其聞乎竊謂日中必熭操刀必割懲奸以察何俟贈言致身於朝不可以默固當參刑禮以定枉直體明智以辨情僞見利不虧其分見死不更其守屬聰明不諱之時居執憲繩違之任何至持疑於果斷逡巡於正色哉策曰旁求疏議紛披風謡威勢壓於權衡黷貨通於主守不同吾黨無嫌小子之詞翻乃倩人云竭老夫之思始令行而詐起終策出而姦生甚矣誠哉不期所以然也今所慮怙威黷貨者其類猶存假手借詞者其人不逺但能察其言象揆而度之精核問試優而柔之則竊寶之名自分濫吹之竽自遁矣其道甚著人焉廋哉策曰何方可以靜流競之來何法可以杜訛謬之入竊謂任良在主𢎞道在人以執事之明遵大君之惠敷明智以考往迹揚清機以鑒羣情則知訛謬不興流競永息俯慙諛議良非話言謹對神嶽舉賢良方正策册問闕袁映未審何年對臣聞天矜于人人必所從此句疑臣謬黷吹萬僻生草莽幸陶無為之風得守忠蹇之節常願拜守宸極敷獻乃誠危言匪躬少答亭育昔仲尼稱鳳鳥不至河不出圖蓋傷衰周之運不見聖明之代也一作明君聖代也臣今輿頌芻言肅祗眷命陪聖蹕於神嶽奉金策於玉宸賡歌泰清咫尺旒扆是天縱聰明而超於孔子不圖幸之至於斯也况周頒禹膳列坐堯衢此優賢之至也愚臣何足以充塞敢不布其腹心竭盡聞見臣伏惟皇穹有成命聖唐受之崇髙配天廣大配地天地合德而陛下大明於其中有以觀髙祖之耿光有以恢太宗之鴻一作丕烈樂成於郊祀而昭升上帝禮備於脽上而敷問后祇於是柴于岱宗望于秩首三光全而五行序八荒協而萬國諧皇靈丕應象物昭格無疆惟休能事畢矣况陰陽燮理則賢相盡規風俗敦厖則良牧宣政百揆時叙庶物咸亨誠已鬱映華胥邁續堯舜豈夷吾所記七十二之凉德而望清光哉而猶恭默思道勵精圖政帝闕峥嶸而下臨天問昭回而盡覩乃賜臣策曰延想無為之理聿修太和之化匪曰能致將與圖之所以謀廣聰明詢於大陋使君子道長俊乂用彰陛下執謙之至也天下幸甚天下幸甚愚臣無得而稱焉制策曰夫原疾而授藥者良醫也因時而救弊者權政也今塞垣猶守府兵云耗閒人輕去冗食難歸者臣聞先王之理布在方策乘時司契其道深乎陛下窺覽萬化之原獨運安危之兆執大象鼓洪爐知微其神惟睿作聖九門嘗藥致蒼生於福夀七政齊衡得𤣥珠於利見雖講信修睦寰區大同而安不忘危故塞垣仍守雖道德齊禮黔庶康濟而寬以厚載故間人或浮臣又聞之兵戈者威不軌而昭文德也兆庶者忘帝功而畏苛政也邊鄙預備誰能去軍參决違方時聞失業惣寰瀛而觀偃伯則三邊之戍役不足多也據天下而覽兆人則萬一之逋逃不足怪也况國家皇極作乂七政有倫增新軍以保釐革浮惰而綏輯何憂乎府兵之耗何有乎冗食不歸雖休勿休惟陛下之聖慮也制策曰膏粱無恥於僥幸蓬蓽未敦於退讓選舉殷凑官員不給效職者或祿仕而養資試言者多浮華而背實當今士食舊德農服先疇結綬登朝咸遵揖讓被褐在野盡歸廉潔臣實覩還淳反素之風不知無恥未敦之事尊謙俯問臣何敢奉欽若帝唐之有天下也久於其德人文化成敦詩書說禮樂濟濟多士開元以寧日者十銓分鏡羣材焯叙觀行考言責名徵實克黜浮薄登延俊秀大革宿一作前弊其命惟新則推讓之風行尸素之源滅其肯養資祿仕以速官謗者使㑹府持衡守而勿失將恐詠彼空谷歎此才難豈有員不給官殷煩乎選士言而背實浮華於舉才臣雖庸愚有以知其不然也制策曰豈風之不臧何草之難偃也澄源正本厥路何由聞乎古者井田有助公私取給諸侯貢士賞罰存焉改轍欲從迷津尚佇者臣聞人無恆德實從上教草順風而靡偃水隨器而方圓陛下神謀𤣥行德如天覆驅今之代歸於夀域深源固本政事惟醇俗既分於土宜人亦同於上好又何取乎井田古制力助前規賞罰於歲貢之士增削於諸侯之地若斯而已哉夫五帝不沿樂三皇不襲禮非故相反蓋取隨時泥以從鈞車難改轍臣誠庸妄不識大體竊願陛下神而化之使人宜之正如當今之代也策曰文質再復忠敬何適於時齊魯一變親賢何近於道也大哉聖問臣敢揚之臣聞之質文再而復正朔三而改殷因於夏周因於殷人疑德齊莊夏尚忠厚殷人質也周人文也文質雖變忠敬咸宜不敬則禮節遂乖不忠則弼諧斯替匡朝闡化適時惟一然則敬自外飾忠由內淳必也奚先請同去食若乃親親而尊尊者其有周公之餘化乎舉賢而尚忠者其有太公之遺風乎孔子曰齊一變至於魯魯一變至於道魯由舊章斯焉殆庶制策曰擇何典而淳俗乘何法而安人何功而天地和平何德而黎元富夀者臣聞諸𤣥元皇帝曰我無欲而人朴大哉至道不可多言伏願陛下克修聖祖恢維化綱崇帝象之風反皇人之始俗已淳矣人斯安矣三事允理六府孔修則地平天成矣輕徭薄賦慎罰措刑則既富且夀矣豈臣庸鯫克堪預焉伏以垂政立範因時變通布陳前載簡在帝聰今乃下問愚鄙徵其辨述豈不欲觀其末學收其微才臣狂妄斐然非相如子雲之流也幸屬千齡大慶五載修封遂得獻頌皇衢參一作驂陪鑾扆慙考言之無取念天奬而何階忠比魏臣空思捧日夢非秦后謬至鈞天局影天庭若臨氷谷謹對詞標文苑科策光宅元年問朕聞北辰端扆佇衆彥以經邦南面居尊俟羣材而緯俗是知九官分職薰風之詠載敷八元匡朝就日之規方逺歷選列辟遐考前修並建明揚之躅式廣旁求之義故康衢扣角授相越於齊班海上牧羊封侯超於漢秩洎乎淳風陵替雅道湮沉仕必因基宦非材進官雖備職位匪得人遂使七輔之材銷聲於巖穴六佐之彥晦跡於丘園寤寐以之載勞虛佇今欲革因循之弊躡稽古之蹤此志雖勤其途未遂為是旌賁爽於前代英傑寡於今晨佇爾昌言朕將親覽對房晉對惟德動天文雲開其五色惟賢濟俗大運符其半千是知廣厦將崇必佇羣材之用巨川方濟良資舟楫之功俾作股肱方之羽翼自風姜御辨之始樹以后王君公雲鳥分司之初承以大夫師長莫不投竿入相捨築稱師五臣光就日之朝八凱翊薰風之代陰陽由其燮理百姓用以平康善佐必藉於賢臣輔國或佇於良佐國家旁求俊乂束帛之禮荐陳物色異人丘園之彥咸萃登壇對楚連城之寶不足稱置館求燕照乘之珍無以貴多士邁隆周之日得人光炎漢之朝猶以為官匪材升仕因基進顯革因循之弊用追稽古之風誠願察彼山苗之詞求夫縱壑之論材或可紀超升於槐棘之班德或可褒擢任於公卿之位開其上賞之路頌以中和之詩則淳于髠之進賢一朝而見七士許子將之舉德少選而收二俊自然詞人濶步才子長鳴公理息昌言之篇節信罷潜夫之作謹對同前皇甫瓊登科記作皇甫伯瓊對珠衡上列聖人居曜魄之尊玉理旁融元后握乾坤之柄膺寶厯而推五勝皇綱居混沌之先懸玉鏡而運三千帝系出氤氲之上莫不闢天關以統業橫地軸而開基象列宿而環北辰制諸侯而嚮南面柱州巢氏之際晦聲迹於龍圖結繩鍊石之餘摛景曜於龜象未有巨川已濟不資舟楫之功大厦已成不假棟梁之力至於逺電流祉既委任於三台就日居尊亦僉謀於四嶽道德為富魏文侯之式廬禮義可尊燕昭王之擁篲孔明佐蜀叶魚水以陳謀仲父相齊假鴻毛以康俗洎嬴暉掩鏡漢道亡珠位以恩升榮非德進挂網羅者則黃鵠髙飛縻爵祿者則青鳬競至自欽明撫運憲章稽古司光鳳紀位映龍名振鷺來儀襲憲飈而鼓舞白駒萃止食苗場以縶繫所以繩凖百王牢籠萬代伏惟聖母皇帝陛下闢陰陽之一氣獨化初皇啓日月之三光混成太極靈祗翕忽出震宫而齊巽圍雲雨氤氲辨天垓而通地圻慕崩沙之靈運符潤石之休期憂在進賢道叶採苓之化恩無不逮德合樛木之風掩媧后以稱尊邁姬任一作旦而立政吹塵一作竽釣璜之侣接武於階墀騎星弄電之夫肩隨於廊廟雖良駿充廄逾懷買骨之謀真龍在堂更佇丹青之玩應休璉之獨坐鳥雀來庭尹叔良之閒居蠨蛸在户傍加策問親覽政途詞麗汾州聲侔沛邑一作聲洋洛邑掩鵬圖而該魏網漆園無控地之詞飛鶴板而徵漢臣九臯有聞天之譽凡曰羣生孰不幸甚臣中庸賤逸下澤幽微忝預明揚謬承推擇馳心日路冀三捨以矜魂纍息天門瞻九重而惕慮謹對文苑英華卷四百八十一
