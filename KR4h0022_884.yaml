body:
  text: 文苑英華巻八百八十五宋李昉等編將相三故相國杜鴻漸神道碑一首冀國公贈太尉裴冕碑一首故相國杜鴻漸神道碑元載皇帝正位建元之二年廵狩至陜郊季冬旋軫鎬京乃春王正月臨前殿延羣臣制詔太常卿衛公鴻漸研機味道圖疑作國翰人師俾時不迷倚以為相史臣載與公同官西掖聮務中樞入則並金門躋玉堂出則偕車輿馳廣路好我不淺德公亦深建于薨殂得入公之室睹公之奥節以危難而固義以顛沛而彰故得復公之道察公之行開而當名品物定辭觀公之辨政消煩觧結逢機立斷試公之與物藥未扣猶陪行止彌留方殆必叅嘗藥禱名者世人之所重終不為天適見公不在居死者有情之至哀贒於貴生益知公之能達古史之云流美而不揚乃廢職書而或畧近亦誣若然者則刋盛德於山阿藏茂勲於王府可也公帝堯之𦙍家于京兆春秋末諸侯耗盡炎黄唐虞之苖裔鮮有存者范宣子猶廣稱世閱盛誇穆叔而經秦渉漢百王千載名公大人駢衡繼武𤣥宗朝叔考暹門下侍郎平章事以清節居東府垂拱中大父愼行荆州長史以文武式南邦開元之際皇考鵬舉安州都督以大名蒞淮浦公杜陵男子遼廓不覊性與道合旁通多可思挹溟海自涯皆返將窺語嘿杳然難䆒輙孩老子聖人皆孩之時人不居下位歷揚州叅軍華縣尉大理評事司直關内度支副使虛已而不疵於物存誠而受汙於俗天寳末將相交隙海内寒心家有襄陵之憂人懐崩角之懼公以為期死不勇必生非任莫肯念亂誰無父母於是始有濟難勤王拯溺定傾之意禄山果慿豺豕凌虐京畿鞏洛成隴荒淆凾為障塞命信臣捽一作率扼二華之險守河渭之隘以挫其鋒分河隴材官㩀南陽當宛葉以遏其勢朔方節度中書令汾陽王發縁邉利兵畧雲中出井陘以制其後汾陽㧞公為戎副倚公以幕畫公議無返顧計不旋踵戒器蒐乗接食饋軍斯須决機閑暇辨劇故佩鐸兇徒未鼔而破恒陽逆守先聲而屈時大兵深入後計在完勑公西歸本軍鎭撫喻告調發兵食保綏華戎㑹哥舒翰亦有内忌二字出師桃林以不計合戰旣而從㪚約觧形離勢沮六軍拆北而莫濟上將授元而不歸强胡犯關長㦸指門𤣥宗西廵巴蜀駐蹕槐里俾肅宗不從詔馬下受辭徵兵朔方東向問罪付以神器之重朂以興復之謀肅宗承命感咽北馳惶怖邠郊無舘榖之犒安定絶薪蒭之餼始誅二守物情尚疑衆纔一旅邉郡猶驚遂踰平凉出蕭關直趣豐安阻河為固公乗疾一有凉出二字西上奏謁於白草頓請借前箸以圖安危靈州四臨兵車之㑹長安新破人心正摇姦豪竊窺雜種圜目衆情一呼而可潰危機視景而斯發北轅未改捨此奚之豐安僻界西垂北臨沙瘼候吏不至疲兵徑度儻軍門晏關廻舟未具倉皇朔裔蹈㩀無所非䇿之上也因條列市租計入幕府文書守便宜山川要害肅宗撫公背曰靈武卽我之關中河内卿亦吾之蕭何㓂恂虜在目中㐫讎不足殄也卽日大駕移幸靈州守則完郛戰有全兵伐鼓舉麾下令風生東極榆谿西洎先零莫不褁飯而趨揭弓而走重足揮汗惟恐居後肅宗雖受傳國之誥平戎之約謙讓未發守持益固願以撫軍討賊賊盡歸報遥稟威畧不正位號公與御史中丞裴冕率呼韓單于羗戎君長校尉部曲塞翁老將頓首勸進封章十上肅宗深自閉絶留中寢答公獨排闥及霤披誠見意哀辭扣玉瀝血洒一作淚地以為命不得廢讎不可玩稽天後時物駭人㪚文武之業墜而莫振非天子之孝也上亦躊躇感動廻慮遷思公乃陳儀撰吉登帝大位於是義徒推轂廻紇横厲蹴踏咸陽網羅關外救楚請命夷㐫滌穢收秦復洛翊帝覇世皆公之力也定䇿之初旣以大功推裴郭疇庸之際竟以常資爲侍郎達者多公之逺名明主善公之能讓披我荆棘在主簿而難忘張良布衣固封留而已足五凉四戰之郊一作國荆州用武之地㑹稽淛河之險二都初定九服猶虞傾側動摇三方尤急東西萬里出入十年仗節擁麾更居迭撫公之在鎭河西無盗邉之警洞庭息三苖之禍海冦不動甄閩順軌得公之効也如彼公之罷守袁晁䧟山越康元燒夷陵犬戎奪酒泉匈奴舒右臂失公之患也如此今上卽位以公先帝大臣明於治亂漢庭儒雅習於制度徃踐常伯登于相府禮崩樂缺自公綴之國綱天憲實公持之爲上從容論天下事甚衆潜跡密啓一作䟽明可否者非一愼深於削弊功隠於詭詞永泰中西南大將暴狠滛虐腹心坐離師衆四潰雖事迫理順而形疑勢拒皇帝憫百姓之不辜哀羣校之罹毒公奉辭授鉞單車詣蜀辨邪正於一言安萬夫之反側始公未至皆鴟張内恐狼顧外視及公申令則饑疑作飽德飲和且舞式歌岷峨旣平䨇流已清衞公告成乃眷以寧帝曰丞相善謀能權蹈難履危勤畧憂邉琱弓弭斾䇿勲勞旋公拜稽首天子萬年公有濟世勘難之才遺物離人之政自深根以寧柢毎乗流而泪波及位極台衡勲高梁益未脫覊𤨏終悲晩暮雖陳乞已屢而優眷愈深來朝之明年首夏初吉以東都河南吳越荆楚保釐之任分鎭之務俾公居中惣統遥領是嵗仲冬月朔羸憊遜位及乎旣望生涯告盡留誡諸子申約道侣罷塗車芻靈之送黜聚僂豚楯之餙捐牢廢禮不封不樹觧綬脫紳稅囊親主疑作土待乆客一作得乆容非而稽變是留歸而隔至從吾所好示祛俗累乃隠几䘮偶知常委蛻恬然而終晏然而逝非合氣於漠得全於天駭形而忘損心具宅而無情死者其孰能至此極也惟公學奥九流技括衆藝忘象遺數逹者知禮存於身而致於用也吉㐫悔吝㪚徽破詭應於化而鮮於物也技闕理悟神對冝其翼宣大政左右明聖位冠羣后聲施來裔載不虞非㩀偶得累公責重憂深心昏意擾公則𢎞我以命起予以道未嘗不體平神清忽在世表以過必告我躬是保實欲依公戮力仰答𤣥造然後乞恩歸印相誓將老今左相齊公與子䨇拜齊公全才稀售懐寳鄙試塵垢粃糠陶鑄名器頡頑委運俯仰隨俗及乎培風撫翼立朝當國則骨鯁魁壘奮揚蹈厲端莊寤主饑渴憂世執邪遵法起墜振廢方知逹觀無早計月固不勝火逢指就而知人拆大木而惟我時稱並用房杜所謂同登管樂式是百辟惠余小子為新非固服我甚忘㪚庱未巻高秋已行唯余與王相顧永傷鄙夫誄德齊公洒翰將愧强名慙蔡篆之以疑其詞曰陽驕必折隂勝亦邪剛柔雜居贒聖之家堂堂衞公含和用中為保自易當難不逢首陽誠拙拄下非工餔糟末位致命危邦自西徂柬足趼頭蓬簡稽衣食賦政理戎經營指揮雲合風從定計翊帝革暴鋤㐫退殊獨㓗進不争功出征入輔計文經武洗蕩三蜀雍容兩府神邁形局思深志違封禪留草東山不歸台光折耀白晝徂暉依仁孔夙履信不暮自天之佑冝無悔怒天之荐瘥時丁耗斁音蠧如魚思渉若廢網罟或嵗大旱孰為霖雨生公則惠䘮公何苦形有必行死無不之誰存封域誰制䘮期平臯漫澶野蔓離披延陵已逹戈者何知冀國公贈太尉裴冕碑前人王者纂大業以拯時難君子合天符以成聖功在殷之傅說周之申甫漢之博陸其類也臨大事一作患首大謀君子正位邦國是憲其道也琰圭火龍𤣥社朱戸其禄也古之人遇其時行其道濟其業受其福嗚呼裴公斯近之矣公諱冕字章甫河東大族著於系譜曽祖灃州刺史諱懐感祖滑州司馬諱陟考長安丞贈司空諱紀自司空而上世累清德公全樸以受其形器混㝠以養其精利隤然大不為累方駕前古其禮容誠敬可陳於蠻貊施一作格於鬼神冝乎吉㐫變幽而偶聖君精義致用而審天道天寳十四載皇上避狄于華陽肅宗偽遊于幽朔公以御史中丞奉詔翼贊元良釋位闕㑹于靈武與侯伯卿士官師亞旅考大德除殘之運唱靈祗億兆之心負金璽玉旒爲人請命于西土維天意羣謀是告而蒼生災害是懐于時冊禮旣畢公乃自左庻子拜中書侍郎平章事從時望也帝曰予欲敎熊羆食猰㺄公於是乎請蒐于岐陽朝于酆宫以干鏚陳師以蠻夷誅暴公定大業運開中興帝曰予欲端百揆詔典司乃命公為尚書左僕射於是乎綱理庻工四方來同左右始終十有三祀初自縣聮屬署監察御史嘗有姦蠧吏公按之時寵權臣之戚也黨其犯而請于公公竟正刑書不爲勢屈時論以公有不可奪之節故肅然由是歴侍御史尚書郎者五其中以直遇坎牧蠻溪者二以時當任兼憲臺鎭梁益各一以勲封冀眞食五百户以秩開府儀同三司大厯一有十字非四年冬十一月今上念伊尹之一德思孔光之再起詔復入相旬有二日兼河南江淮副元帥東都留守是月辛酉薨于長安年六十七翼日冊贈太尉明年二月𦵏于京城南畢原詔京兆尹䕶䘮事贈布八百叚㐫儀𦵏帛具俾出有司昔在天寳之季公嘗為御史大夫王鉷譛毁無何鉷弟銲坐大逆有詔廷辨而兇首詞引及鉷公自下列抗其矯誣朝廷謂之不黨其後程元振僣用威柄有道從虎賁公停車致詰靣折及霤在黜無愠德仁遂行君子謂公誠盡於忠者在於禮外其身故臨難不惑一其守故當事則明磅礴乎死生之間逍遥乎晦明之境公嘗北使殊俗班命氊裘單于君長稽顙屈膝覩王商而知懼從魏絳而來服以言尚其直以動尚其順以成事尚其濟物以進退尚其得中孝弟愛敬格于天地惇信明義通於鬼神帝王得之以奉天時百官得之以脩典憲佐命者二后歴事者三朝皤皤華皓為國元老執璧奉珪一作觴在君之堂生食邑土殁垂惠愛豈禄以為尊者其孤正授辭家老請志于石以代三鼎林鍾之義銘曰元精一作混元降靈建乎人極邈矣冀公順帝之式鴻造覆育大鈞埏植業濟功成保和居直帝念髦碩二登輔翼為時養賢以及萬國昔在上帝降命元老以仗愷元一以蚩作伏尤以明至道唐歴中否亦命我公順人載疑作戴天戡黎代共德謝星隕仁沉海竭大厦梁崩崇山玉拆領䄂前古綱緯來闕憧憧豐碑耿耿鴻烈永傳億祀遺芳不㓕文苑英華巻八百八十五
