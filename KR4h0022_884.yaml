body:
  text: 文苑英華卷八百八十五宋李昉等編將相三故相國杜鴻漸神道碑一首冀國公贈太尉裴冕碑一首故相國杜鴻漸神道碑元載皇帝正位建元之二年巡狩至陜郊季冬旋軫鎬京乃春王正月臨前殿延羣臣制詔太常卿衛公鴻漸研機味道圖疑作國翰人師俾時不迷倚以為相史臣載與公同官西掖聮務中樞入則並金門躋玉堂出則偕車輿馳廣路好我不淺德公亦深建于薨殂得入公之室睹公之奧節以危難而固義以顛沛而彰故得復公之道察公之行開而當名品物定辭觀公之辨政消煩解結逢機立斷試公之與物藥未扣猶陪行止彌留方殆必參嘗藥禱名者世人之所重終不為天適見公不在居死者有情之至哀賢於貴生益知公之能達古史之云流美而不揚乃廢職書而或略近亦誣若然者則刋盛德於山阿藏茂勳於王府可也公帝堯之胤家于京兆春秋末諸侯耗盡炎黃唐虞之苖裔鮮有存者范宣子猶廣稱世閲盛誇穆叔而經秦涉漢百王千載名公大人駢衡繼武玄宗朝叔考暹門下侍郎平章事以清節居東府垂拱中大父愼行荆州長史以文武式南邦開元之際皇考鵬舉安州都督以大名蒞淮浦公杜陵男子遼廓不羈性與道合旁通多可思挹溟海自涯皆返將窺語默杳然難究輒孩老子聖人皆孩之時人不居下位歷揚州參軍華縣尉大理評事司直關內度支副使虛已而不疵於物存誠而受汙於俗天寶末將相交隙海內寒心家有襄陵之憂人懷崩角之懼公以為期死不勇必生非任莫肯念亂誰無父母於是始有濟難勤王拯溺定傾之意祿山果慿豺豕凌虐京畿鞏洛成隴荒淆函為障塞命信臣捽一作率扼二華之險守河渭之隘以挫其鋒分河隴材官據南陽當宛葉以遏其勢朔方節度中書令汾陽王發緣邉利兵略雲中出井陘以制其後汾陽拔公為戎副倚公以幕畫公議無返顧計不旋踵戒器搜乘接食饋軍斯須決機間暇辨劇故佩鐸凶徒未鼓而破恆陽逆守先聲而屈時大兵深入後計在完勑公西歸本軍鎮撫喻告調發兵食保綏華戎會哥舒翰亦有內忌二字出師桃林以不計合戰既而從散約解形離勢沮六軍拆北而莫濟上將授元而不歸強胡犯關長戟指門玄宗西巡巴蜀駐蹕槐里俾肅宗不從詔馬下受辭徵兵朔方東向問罪付以神器之重朂以興復之謀肅宗承命感咽北馳惶怖邠郊無館榖之犒安定絶薪芻之餼始誅二守物情尚疑衆才一旅邉郡猶驚遂踰平涼出蕭關直趣豐安阻河為固公乘疾一有涼出二字西上奏謁於白草頓請借前箸以圖安危靈州四臨兵車之會長安新破人心正搖姦豪竊窺雜種圜目衆情一呼而可潰危機視景而斯發北轅未改捨此奚之豐安僻界西垂北臨沙瘼候吏不至疲兵徑度儻軍門晏關回舟未具倉皇朔裔蹈據無所非䇿之上也因條列市租計入幕府文書守便宜山川要害肅宗撫公背曰靈武即我之關中河內卿亦吾之蕭何寇恂虜在目中凶讎不足殄也即日大駕移幸靈州守則完郛戰有全兵伐鼓舉麾下令風生東極榆溪西洎先零莫不褁飯而趨揭弓而走重足揮汗惟恐居後肅宗雖受傳國之誥平戎之約謙讓未發守持益固願以撫軍討賊賊盡歸報遙稟威略不正位號公與御史中丞裴冕率呼韓單于羌戎君長校尉部曲塞翁老將頓首勸進封章十上肅宗深自閉絶留中寢答公獨排闥及霤披誠見意哀辭扣玉瀝血灑一作淚地以為命不得廢讎不可玩稽天後時物駭人散文武之業墜而莫振非天子之孝也上亦躊躇感動回慮遷思公乃陳儀撰吉登帝大位於是義徒推轂回紇橫厲蹴踏咸陽網羅關外救楚請命夷凶滌穢收秦復洛翊帝霸世皆公之力也定䇿之初既以大功推裴郭疇庸之際竟以常資為侍郎達者多公之逺名明主善公之能讓披我荆棘在主簿而難忘張良布衣固封留而已足五涼四戰之郊一作國荆州用武之地會稽浙河之險二都初定九服猶虞傾側動搖三方尤急東西萬里出入十年仗節擁麾更居迭撫公之在鎮河西無盜邉之警洞庭息三苖之禍海冦不動甄閩順軌得公之效也如彼公之罷守袁朝陷山越康元燒夷陵犬戎奪酒泉胸奴舒右臂失公之患也如此今上即位以公先帝大臣明於治亂漢庭儒雅習於制度往踐常伯登于相府禮崩樂缺自公綴之國綱天憲實公持之為上從容論天下事甚衆潛迹密啓一作疏明可否者非一愼深於削弊功隱於詭詞永泰中西南大將暴狠淫虐腹心坐離師衆四潰雖事迫理順而形疑勢拒皇帝憫百姓之不辜哀羣校之罹毒公奉辭授鉞單車詣蜀辨邪正於一言安萬夫之反側始公未至皆鴟張內恐狼顧外視及公申令則飢疑作飽德飲和且舞式歌岷峨既平雙流已清衛公告成乃眷以寧帝曰丞相善謀能權蹈難履危勤略憂邉雕弓弭斾䇿勳勞旋公拜稽首天子萬年公有濟世勘難之才遺物離人之政自深根以寧柢每乘流而泪波及位極台衡勳高梁益未脫羈瑣終悲晚暮雖陳乞已屢而優眷愈深來朝之明年首夏初吉以東都河南吳越荆楚保釐之任分鎮之務俾公居中惣統遙領是嵗仲冬月朔羸憊遜位及乎既望生涯告盡留誡諸子申約道侣罷塗車芻靈之送黜聚僂豚楯之飾捐牢廢禮不封不樹解綬脫紳稅囊親主疑作土待久客一作得久容非而稽變是留歸而隔至從吾所好示祛俗纍乃隱几喪偶知常委蛻恬然而終晏然而逝非合氣於漠得全於天駭形而忘損心具宅而無情死者其孰能至此極也惟公學奧九流技括衆藝忘象遺數逹者知禮存於身而致於用也吉凶悔吝散徽破詭應於化而鮮於物也技闕理悟神對冝其翼宣大政左右明聖位冠羣后聲施來裔載不虞非據偶得纍公責重憂深心昏意擾公則𢎞我以命起豫以道未嘗不體平神清忽在世表以過必告我躬是保實欲依公戮力仰答玄造然後乞恩歸印相誓將老今左相齊公與子雙拜齊公全才稀售懷寶鄙試塵垢粃粳陶鑄名器頡頑委運俯仰隨俗及乎培風撫翼立朝當國則骨鯁魁壘奮揚蹈厲端莊寤主飢渴憂世執邪遵法起墜振廢方知逹觀無早計月固不勝火逢指就而知人拆大木而惟我時稱並用房杜所謂同登管樂式是百辟惠余小子為新非固服我甚忘散庱未卷高秋已行唯余與王相顧永傷鄙夫誄德齊公灑翰將愧強名慙蔡篆之以疑其詞曰陽驕必折隂勝亦邪剛柔雜居賢聖之家堂堂衛公含和用中為保自易當難不逢首陽誠拙拄下非工餔糟末位致命危邦自西徂柬足趼頭蓬簡稽衣食賦政理戎經營指揮雲合風從定計翊帝革暴鋤凶退殊獨潔進不爭功出征入輔計文經武洗蕩三蜀雍容兩府神邁形局思深志違封禪留草東山不歸台光折耀白晝徂暉依仁孔夙履信不暮自天之佑冝無悔怒天之荐瘥時丁耗斁音蠧如魚思涉若廢網罟或嵗大旱孰為霖雨生公則惠喪公何苦形有必行死無不之誰存封域誰制喪期平臯漫澶野蔓離披延陵已逹戈者何知冀國公贈太尉裴冕碑前人王者纂大業以拯時難君子合天符以成聖功在殷之傅説周之申甫漢之博陸其類也臨大事一作患首大謀君子正位邦國是憲其道也琰圭火龍玄社朱戶其祿也古之人遇其時行其道濟其業受其福嗚呼裴公斯近之矣公諱冕字章甫河東大族著於系譜曽祖灃州刺史諱懷感祖滑州司馬諱陟考長安丞贈司空諱紀自司空而上世纍清德公全朴以受其形器混冥以養其精利隤然大不為纍方駕前古其禮容誠敬可陳於蠻貊施一作格於鬼神冝乎吉凶變幽而偶聖君精義致用而審天道天寶十四載皇上避狄于華陽肅宗偽遊于幽朔公以御史中丞奉詔翼贊元良釋位闕會于靈武與侯伯卿士官師亞旅考大德除殘之運唱靈祗億兆之心負金璽玉旒為人請命于西土維天意羣謀是告而蒼生災害是懷于時册禮既畢公乃自左庶子拜中書侍郎平章事從時望也帝曰豫欲教熊羆食猰㺄公於是乎請搜于岐陽朝于酆宫以干鏚陳師以蠻夷誅暴公定大業運開中興帝曰豫欲端百揆詔典司乃命公為尚書左僕射於是乎綱理庶工四方來同左右始終十有三祀初自縣聮屬署監察御史嘗有姦蠧吏公按之時寵權臣之戚也黨其犯而請于公公竟正刑書不為勢屈時論以公有不可奪之節故肅然由是歷侍御史尚書郎者五其中以直遇坎牧蠻溪者二以時當任兼憲臺鎮梁益各一以勳封冀真食五百户以秩開府儀同三司大厯一有十字非四年冬十一月今上念伊尹之一德思孔光之再起詔復入相旬有二日兼河南江淮副元帥東都留守是月辛酉薨于長安年六十七翼日册贈太尉明年二月葬于京城南畢原詔京兆尹護喪事贈布八百假凶儀葬帛具俾出有司昔在天寶之季公嘗為御史大夫王鉷譛毁無何鉷弟銲坐大逆有詔廷辨而凶首詞引及鉷公自下列抗其矯誣朝廷謂之不黨其後程元振僣用威柄有道從虎賁公停車致詰靣折及霤在黜無愠德仁遂行君子謂公誠盡於忠者在於禮外其身故臨難不惑一其守故當事則明磅礴乎死生之間逍遙乎晦明之境公嘗北使殊俗班命氊裘單于君長稽顙屈膝覩王商而知懼從魏絳而來服以言尚其直以動尚其順以成事尚其濟物以進退尚其得中孝弟愛敬格于天地惇信明義通於鬼神帝王得之以奉天時百官得之以修典憲佐命者二后歷事者三朝皤皤華皓為國元老執璧奉圭一作觴在君之堂生食邑土殁垂惠愛豈祿以為尊者其孤正授辭家老請志于石以代三鼎林鍾之義銘曰元精一作混元降靈建乎人極邈矣冀公順帝之式鴻造覆育大鈞埏植業濟功成保和居直帝念髦碩二登輔翼為時養賢以及萬國昔在上帝降命元老以仗愷元一以蚩作伏尤以明至道唐歷中否亦命我公順人載疑作戴天戡黎代共德謝星隕仁沉海竭大厦梁崩崇山玉拆領袖前古綱緯來闕憧憧豐碑耿耿鴻烈永傳億祀遺芳不滅文苑英華卷八百八十五
