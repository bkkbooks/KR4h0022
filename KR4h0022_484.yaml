body:
  text: 文苑英華卷四百八十四宋李昉等編雅麗文詞雅麗策二道文詞雅麗䇿二道問朕聞至道雖微不言而化皇天隂騭相叶其彛信寒暑而生成施雲雨而沐潤垂範作訓樹君育人時有澆淳教垂繁略成湯既聖禹道云亡桑扈谷風屢動詩人之刺塞門反坫時貽宣父之嫌我國家振彼頺綱開兹盛業朕以不德襲號乘時而皇極之道未敷謨明之軌尚闕思𢎞厥理其義安從至如視聽貌言恆若時若會極歸極作哲作乂一以貫之何方而可夫禮以飾情情疏則禮略樂以通感感至則神和理內為同修外為異同異之用有昧其功人俗未融佇明斯要又四時武德制自何君五行文始本之誰代昭德盛德莫辨所尊昭容禮容未詳所出悉情以對用釋余疑對彭殷賢對臣聞孔子云大道之行三代之英邱未之逮也而有志焉又顔回對孔子云回願得明王聖主而輔相之此二者皆傷不可得而見也况臣生大道淳風之運屬聖主立政之秋不能有所建明以佐大化此微臣夙心愧恥竊有慙焉曰者聖敕頒宣逺覃幽隱振廢滯收介特本州徴臣克賦于王庭陛下溫顔屢賜宴見司饔行食羣事頒氷亦可謂厚德矣自顧性識愚駑智術微淺既蒙清問敢不具素所聞乎臣聞伏羲神農氏往黃帝堯舜氏作莫不體道以育物立德以興化用闡無為之教以𢎞不宰之功齊飲啄於鶉居絶往來於犬吠豈不以我清淨而人自正我無欲而人自朴乎逮乎政及三王君臨萬國亦承奉天地燮贊隂陽順四時之氣理五行之敘總仁義以安庶類先博愛以悅羣生使人遷善逺惡而不知其所以然也觀夫三王之為君也謹其所好惡而已故君好之則人為之上行之則下效之莫不清心以率物正身以御下九女序列於內三公分職於外度數有恆徭役不作其取人賦也薄而役人力也寒其育物也廣而興利也厚故征伐有道大明詠其功什一而稅大田歌其事所以家給人足而理安興矣易曰聖人久於其道而天下化成其斯之謂乎爰及末俗政漸澆偽而禮樂彌煩姦盜滋起桀紂昏亂於上幽厲縱逸於下崇臺榭之峻恐其不髙也廣宫室之居恐其不大也聚淫色之美恐其不多也窮聲音之巧恐其不樂也其斂人財也厚而使人力也衆其害物也博而興利也寡其後興役無常桑柔病而嘆之故其詩曰自西徂東靡所定處蓋言其役之甚也徴發無度下人勞病南山疾而刺之故其詩曰赫赫師尹不平謂何蓋言其政之亂也自兹厥後強凌弱衆暴寡千官樹姦於朝廷百賈窮偽於市邑財用匱竭冦攘不止大東又刺之曰小東大東杼軸其空言小大俱盡也又云東人之子職勞不來西人之子粲粲衣服孰有為人上者不平若此而可久安天下哉此則上失其道政逐多門故天下敗而不之覺乃至所以為夏者轉而為殷也所以為周者轉而為秦也詩云髙岸為谷深谷為陵三代之後於今為庶此史墨所載社稷無常奉君臣無常位自古以言及秦始皇平定六國隋煬帝富有四海不務亷恥唯存戰伐內造阿房繼以驪山之作外征林邑重以遼東之戍鑿馳道則隱以金椎通鴻溝則樹以栁杞役及閭左人不聊生曲泛龍舟聲多哀思傾天下之賦不足以周其事殫帑藏之財不足以盈其欲是以衆怨難犯人自為戰所以陳勝吳廣奮梃以撻之王充李密揚聲以逼之釁起郊壘而禍生左右望夷宫中不免閻樂之難江都城內卒死裴通之手故易曰天之所助者信也人之所助者順也此二君者動為之際不由信順失天人之所助能無及此乎然則合大中之道者如彼失皇極之用者如此古之興敗備在典謨逮隋室道消數鍾百六衣冠禮樂掃地無餘賢人君子稽天並浸此乃大人利見之日聖主驅除之時我太宗志在救焚心存拯溺因兹感激投袂而起車及於平陽之郊劒及於盟津之會既而戡翦多難克清中夏建非常之功定不拔之業洎位登九五富有萬國制禮以示其讓作樂以興其和兼愛以厚其仁節用以崇其義非先王之服不敢服非先王之言不敢道言必本於風雅行務去乎枝葉明刑賞嚴號令賞當其功則勞臣勸勉罰當其罪則姦人畏懼名器不妄假必俟其能爵祿不虛授必先有德是以四海之內靡然向風我太宗以至道之心為天下也所征無不克所向無不成孝弟通於神明易簡合於天地如此則天地德之鬼神佑之使風雨以序災害不作萬國莫不歡心四夷莫不咸賴良由不僭不濫無怠無荒所以享國久長多歷年數陛下稟天然之姿定不伐之略披肝膽以決大計殄宫闈之氛祲除詐偽之昏狡日月載廓一作朗宗社以安深思禍亂之原乃皇天所以開聖人也自南面臨天下九年于兹封堠無警干戈再戢置鼓以招諫設木以待賢故得近臣盡規逺人獻政出宫女則使心不亂屬大旱則引咎自責蓋禹湯之罪已實堯舜之用心書云一人有慶兆民賴之其斯之謂歟深合太宗之宏略逺符貞觀之故事賜愚臣制策云朕以不德襲號乘時而皇極之道未敷謨明之軌尚闕者微臣何以識陛下之深逺而輒欲議之或恐日月有遺照聖智所不及略陳其愚伏惟陛下留聽臣聞書云惟先格王正厥事言災害之起事有不正者也去歲水旱不時咎徵屢作胸奴侵軼邊將氣沮天其或者正訓我也欲令陛下知爵祿之虛授冗散之職多歟樂蕩志歟服失度歟何皇極之不建遂至於此也臣聞省官不如省事省事不如清心誠能克已復禮正身率物表有功而彰明德復古而貴能變禁異服革慢聲逺便佞近忠讜斷斷之士必擢於廟堂九九之術不遺於管庫可謂虛其心而衆象應正其本而萬事理焉書云天既付命正厥德言正德以順天也若舍此道是不知其所從矣制策曰視聽貌言恆若時若會極歸極作哲作乂一以貫之何方而可者臣聞易曰崇髙莫大乎富貴備物致用立成器以為天下利莫大乎聖人古之王者享聖人之資乘大寶之位北辰居正南面而理亦可謂富貴乎當須存至公之行立大中之道覆幬同於天地通明合乎日月志逺邇之化存易簡之功庶徵順序五紀和協百穀用成六畜遂字者無不由焉傳曰皇極其建其斯之謂矣若貌之不恭是謂不肅厥罰雨其極惡若得其道則攸好德以應之言不之從是謂不乂厥罰暘其極憂若得其道則康寧以應之視之不明是謂不哲厥罰燠其極疾若得其道則夀以應之聽之不聰是謂不謀厥罰寒其極貧若得其道則富以應之思之不睿是謂不聖厥罰風其極凶短折若得其道則考終命以應之皇之不極是謂不建厥罰陰其極弱故經曰嚮用五福威用六極斯之謂矣臣聞貌言視聽以心為主故有正心者必有正德正德臨人猶樹直表而望影之曲也得乎大雅云儀刑文王萬邦作孚此之謂矣有邪心者有枉行枉行臨人猶樹曲表而望影之直也得乎孔子云詩三百一言以蔽之曰思無邪蓋戒此也故王者修身以道修道以仁仁也者親親為大義也者尊賢為大是以君子先正身而後及於天下如此則六沴不作五福相生貽厥孫謀永無極矣制策曰夫禮以飾情情疏則禮略樂以通感感至則神和理內為同修外為異同異之用有昧其功人俗未融佇明斯要者臣聞撥亂反正之主繼體守文之君撫馭之道雖殊禮樂之用為急自土鼓簣桴之後始自無聲汙樽抔飲之初彰乎有用既而莫不曲諧九變信合四時是知大樂與天地同和大禮與天地同節移風易俗義切於鐘鼓安上理人事寖乎揖讓既而祀歷三王時更七國經籍道息揚宣榭之煙埃儒生數窮赴秦坑而歇滅逮乎斷蛇立極乘牛設位紀綿蕝之儀鳴鼓舞之節必欲樂宣惉滯禮釋回邪取其不肅而成必在既富而教我唐功髙邃古德邁往聖坐宣室而訪道登明堂以思政六樂為馭利則不爭五禮有經思而無犯思聞同異下訪芻蕘臣聞古之明君之御天下也身坐九重心遍四海禮以導其志樂以防其淫樂以理內為同禮以修外為異禮樂之不悖內外之相親可以感於神明通於天地矣詩云肅雍和鳴先祖是聽夫肅肅敬也雍雍和也既敬且和何事不行其斯之謂矣制策曰四時武德制自何君五行文始本之誰代昭德盛德莫辨所尊昭容禮容未詳所出悉情以對用釋豫疑者臣聞皇王御宇步驟相仍莫不作樂以饗其德立諡以明其行此五帝之常道百王之所不易也且咸池六英韶濩兩聽盡善盡美竊無間然自秦失盛位漢雜霸道文景相襲刑措不用武宣承統華夷再清樂舞居疑功可略言也武德舞者髙祖作之定禍亂也四時舞者孝武作之示和平也五行者大周曲也文始者本舜舞也孝景採武德為昭德以尊太宗也孝宣採昭德為盛德以尊武帝也昭容禮容猶古韶夏紹之於漢祖備之於樂志矣臣材非多士不遊六合之間夢異趙君總覩九天之上啓處無地戰汗不寧况承謏問敢以輕議謹對同前邢巨對臣聞太祖文皇之御天下也廣直言之路開納善之門近臣盡規庶人畢議可謂至矣今皇天眷命陛下紹復先業齊心法宫之中冕旒正殿之上詳延秀異詢及芻蕘若乃敷皇極以作則𢎞禮樂以垂訓彞倫攸序羣德畢舉斯太宗之盛事也豈前王訪九疇之要貞三極之本能望清光哉天文昭回萬物盡覩臣謬以黃綬之末預聞赤墀之議將何以塞厚問揚天休臣聞諸仲尼曰大道之行與三代之英丘未之逮也而有志焉自上皇不歸大道悠久聖人順天地之性究變化之元雖損益以文質或沿襲以忠敬至於飾禮容以昭賁崇樂舞以立象樹君牧人茂時育物其致一也夫務本於道則浮競可以鎮靜習俗於變即純一或以偽遷故輕樂見誚於國風昧禮貽訓於聖典蓋有由焉唐興百有餘歲髙祖以武功定鼎紐天綱於八紘太宗以睿聖握符纂天光於三象蕩亡隋之頺靡𢎞聖唐之簡易盛德大業與三代同風伏惟陛下誕受天休光膺景命粵若昭德殷薦之禮感和通神之教敬事眷聖之徵順時布德之典將以登格皇穹鴻業也啓迪王命大猷也風雨時若休徵也人俗康寧至教也五輝協訓八方順軌堯舜之盛無以加焉成康之道復何足數而猶曰皇道未敷謨明尚闕發天章於聖藻採至言於輿詞陛下之謙讓也愚臣何足以知之制策曰至如視聽貌言恆若時若會極歸極作哲作乂一以貫之何方而可者臣聞王政之端本於性也至化之極歸於理也能盡其性而合乎理則休徵至不盡其性而悖乎理則咎徵至故聖人法天以立性畏天以作則見天道之在五行人事應之彰彰類矣自非統性命之理求天人之端孰能從言以作乂因事以求哲暘順而會其極蒙恆而返其通適於數故雖以五事明宗其極則可以一理貫臣又聞聖心鏡物必採於至妙大道虛象埀契於理先然即繼聖業者其道同遵王度者其化一陛下體周武之盛德訪唐堯之遺事龜圖靈文天光垂象伏願沐時雨於動植散祥風於涵泳則大中之道何以尚兹制策曰夫禮以飾情情疏則禮略樂以通感感至則神和理內為同修外為異同異之用有昧其功人俗未融佇明斯義四時武德制自何君五行文始本之誰代昭德盛德莫辨所尊昭容禮容未詳所出臣聞禮樂其所由來尚矣先王所以美教化厚人倫以致太平也必將考其理求其端故揖讓之教末而安上存乎至簡舞詠之功淺而移風歸乎至易夫辨升降彰采服此禮之所以飾情也登金石翔景瑞此樂之所以通感也故感發於內樂由衷以致和情見乎表禮自外以為異雖清濁之資考性則殊而教化之端在理斯一况今懿綱被遐裔至道冠生靈和理日躋同乎大順非禮樂之化其孰能至此乎夫崇德埀範此同異之用也教齊化密此人俗之融也至如武德之盛武之業也文德之盛順之至也神道設教制四時於炎厯德徽可崇增五行於黌序尊三德於清廟表三容於盛禮聖問昭閟與天道以元亨狂言鄙賤仰天文而知愧謹對文苑英華卷四百八十四
