body:
  text: 文苑英華卷四百二十二宋李昉等編赦書三尊號赦書一開元二十七年册尊號大赦制孫逖門下一作勑古之執大象建皇極者必稽彛訓而受鴻名所以應乎天而順乎人也朕嗣守丕業二十七年受命之初既膺明號尚多祗懼已謂崇髙而公卿宗子緇黃耆艾披誠瀝懇詣闕上言僉以為乃聖乃文祖宗大烈恭惟纘服必在欽承願以休名施于薄德抑而不許凡已十年爰逮于今又陳入請上迫奉先之義下稽從衆之言將存至公不可固拒以今日敬依大號曰開元聖文神武皇帝勉從典册良增感懼惟新之號既不私於朕躬非常之澤宜並一作普覃於率土可大赦天下自開元二十七年二月七日昧爽以前大辟以下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不免者咸赦除之自開元已來諸色逋負䀶纍人等咸從洗滌令許自新所司更不須以此為纍其有别勑停官及亡失爵者放歸不齒之類量加收敘左遷官及諸色流人並稍量移近處朕每念黎氓常恐失所救其困乏所貴一作必在及時比來諸州或有損處所在賑給例逼春農比及奏報又淹時月既無救於懸絶亦何成於惠養自今已後每年至秋收後即宜遣使分道宣慰仍與採訪使及州縣相知巡檢百姓間或有乏絶不自支濟者應須蠲放及賑給便量事處置訖奏聞天下百姓宜放今年地稅州縣官月料往緣錢有濫惡致損於人或徇私者多得罪亦衆所以改支庸調將便公私聞百姓之間加織造若以此勞弊又非得所自今已後宜各以當道所鑄充其月料古者三載考績黜陟幽明允叶大猷以勸天下比來諸道所通善狀但優仕進之輩與為選調之資責實循名或乖古義自今已後諸道使更不須通善狀每至三年朕當自擇使臣觀察風俗有清白政理著聞者當别擢用宗廟致敬必先於所在神人所依無取於非族深惟至理用切因心其應緣太廟五享宜於宗子及嗣王郡王中揀擇有德望者令攝三公行事其異姓官更一作吏不須差一作令攝其草澤間有殊才異行文堪經國為衆所知不求聞達者所在長官以禮徵送皇太子璵男宜並封授官邠王守禮寧王憲各與一子三品官其內外文武三品已上賜爵一級四品以下各加一階長公主及嗣郡王各與一子官郡主縣主各放一子出身二王後及諸方蕃客宜各賜物諸致仕官量與進放依前致仕天下耆老百歲已下版授下州刺史婦人版授郡君賜粟五石綿帛五假九十已上版受上州司馬婦人版授縣君賜粟三石綿帛三假八十已上版授縣令婦人版授鄉君賜粟兩石綿帛二假京城父老宜共賜物三千假道僧等賜物一萬匹天下觀寺六齋日宜轉經讀典懲惡勸善以闡文教赦書有所未該所司類例處分率土之內賜酺五日五嶽四瀆名山大川自古帝王忠臣義士並令州縣致祭其有亡命山澤挾藏軍器百日不首復罪如初宣布中外咸使知聞主者施行文武孝德皇帝册尊號赦書長慶元年元稹門下昔我高祖太宗化隋為唐奄宅區夏包舉四海全付子孫其事何哉彼昏盈而我勞敬也明皇承之能大其業六戎八蠻罔不貢奉由是庶尹弛政庶吏弛刑視人不勤視神一作盜不謹燕冦勃起洞無藩籬六十有七年兵革大熾其事何哉據逸安而易萌漸也逮我聖父勤身披攘斬斷誅除天下略定曽是幽冀賜豫懷來荷賴景靈丕訓不墜環歲之內二方平寧粵豫何功時帝之力而卿大夫猥以大號加于眇身讓于四三益甚其請皇太后始聞其事歡然慰心慈旨下臨臣誠上迫祗受大一作典禮凛乎余懷尚念昔者七十二君莫不升中慶成自以為堯舜莫已若也然而不為堯舜之行者來代無傳焉朕嘗推是為心不欲名浮於實今卿大夫謂我為文武孝德矣其將何道以匡豫豫其業業兢兢日慎一日慕陶堯虞舜之行以自勉思文祖憲考之道以自勤豫苟不思無忘納誨於戲溢美之名既不克讓及一作潤物之澤夫何愛焉可大赦天下一作皆唐大詔令大中二年正月三日册尊號赦書編制門下我國家披皇圖以立極執大象以升中睿父嗣孫詔令作睿嗣神宗重熙纍盛逮豫稽古聖孝紹復中興洗滌宿氛廓開昌運天命不易賜豫元符荷宗社之耿光致寰瀛之小泰干戈載戢風順雨時北狄來賔西戎效職詔令作欵豈豫菲薄汔此肅清皆中外元僚文武多士同心協贊而使之然益用兢慙以戒盈滿而乃纍陳丹懇願上鴻名牢讓不從瀝誠彌切於戲昔賢有云舜何人也我何人也苟或讓之不遂豫亦敢不思齊今百執事謂豫曰聖敬敢忘湯武日躋之詩謂豫曰文思敢忘放勛欽明之典謂豫曰和文敢忘保大之功謂豫曰光孝敢忘繼志之義以是自朂庶無悔焉浮實之名既不獲已乘春之澤當務惟新可大赦天下自大中二年正月三日昧爽已前大辟罪已下已發覺未發覺已結正未結正繫囚見徒罪無輕重咸赦除之惟正犯十惡五逆已上故殺人及官典犯贓不在此限持仗行劫必欲害人苟遇支敵即行殺戮捍逆追捕肆意姦凶不懲此流無以除惡并故殺人者雖以自今已後稍更廣求如有未曽任刺史縣令居然有誠略才術為衆所推者亦任於諸色人中選擇為兩省官周之宗盟實惟封建漢之子弟亦謂犬牙廣盤石之宗增維城之固當今源流逺大枝葉蕃昌王室子孫不合布素宜令本司檢尋譜諜明驗房從貧窮不濟未有身名者每房放一人出身如有父見在朝門蔭可自補身名者即不在此限應諸州府縣等納稅只合先差車牛優長户近者多是權要及豪富之家悉留諸縣輸納致使單貧之人却須雇腳般載從今已後須令有車牛豪富人户送太倉及州府輸納其留縣並須先饒貧下不濟户如有違越節級官吏重加科殿所在逃户見在桑田屋宇等多是暫明東西便被鄰人與所由等計會推云代納稅錢悉將砍伐毁折及欲歸復多已蕩盡因致荒廢遂成間田從今已後如有此色勒鄉村老人與所由并鄰近等同點檢分明分析作狀送縣入案任鄰人及無田産人且為佃事與納稅錢如五年內不來復業者任便租佃人為主逃户不在論理之限其屋宇桑田樹木等佃人逃户未歸五年內不得輒有毁除砍伐如有違犯據根口量事情科責并科所由等不檢校之罪諸道州府應欠開成三年終已前因水旱不熟貸借百姓及軍用欠闕借便度支户部鹽鐵錢物斛斗積欠相承日月既久百姓或無本户長吏纍又改更全無本色可以支填所司徒有徵索之名終無送納之日虛繫簿書宜並放免三公僕射不常除官每至上時須有聚會委以府縣即須擾人宜令度支户部勾當局席便取京兆府本色錢充不得令府司差配百姓吏部去年冬選人如聞多緣文字差錯所司駮放既添員闕亦可矜容若非身名踰濫及欠選欠考并凖格不合收外其餘委吏部與重磨勘量收待殘闕比逺注擬上已重陽曲江宴會自有本色伍伯貫錢費用之間不合欠闕每聞差配百姓不免擾人從今已後宜令京兆府先與度支鹽鐵計料據所用一物已上除以本色錢物外如有欠少即委度支鹽鐵據數均給府縣不得輒配百姓其所市易並須先給付價錢如有妄配百姓買物不給價錢官吏等並凖此同枉法贓例處分仍令御史臺切加察訪天下州府有官吏犯贓皆遞相蒙蔽不肯發明縱有申聞百無一二自今已後管內縣令有犯贓事發州司不舉者連坐録事參軍有贓犯刺史不舉者坐刺史其刺史有贓事發觀察使不舉者連坐亷使則遞相檢轄功過可明各務清亷悉心為政度支鹽鐵户部三司茶綱欠負多年積弊斯久家業蕩盡無可徵索虛繫簿籍勞於囚繫者復委本司各條流理聞奏如先將茶賒賣與人及借貸人錢物若文帖分明的知詣實即與帖州縣徵理如組織平人妄有指射推勘了後重加決責釋氏之教清淨為宗將悟昏迷實資善誘上都除先置寺外每街更各添置寺五所東都除先置寺外更添置寺五所每寺各度五十人每處僧寺三所尼寺二所西川荆南揚州潤州汴州太原河中襄州已上八道除先置寺外更各添置寺二所每處僧置寺一所尼寺一所諸道節度觀察使府除先置寺外更各添置寺一所其所置僧寺各度三十人諸道管內州未置寺處宜各置寺二所僧寺一所尼寺一所每寺各度三十人五臺山置寺五所如有見存寺便令修飾充寺每數度五十人數內置尼寺一所已前添置寺宜並先度僧尼漸漸教化建造寺宇不得遽有勞役其僧尼年幾限約并諸條流凖會昌六年五月五日赦條事例處分道濟生靈功成克伐晦明雖隔禮敬宜加唐功臣墳墓無子孫者不許砍伐委所在長吏差人巡檢爰念農耕是資牛力絶其屠宰須峻科條天下諸州屠牛訪聞近日都不遵守自今已後切宜禁斷內外文武任及致仕官三品已上賜爵一級四品已下加一階仍賜勳兩轉神䇿六軍金吾威逺皇城將士普恩之外各賜勳兩轉道宗魯聖禮洽虞賔式舉舊章以榮一作崇後嗣二王三恪及文宣公各賜物五十匹環衛星陳華夷雲集眷兹勞效俾示恩華神䇿六軍金吾威逺皇城等諸軍將統軍已下各有賜物其將士等長行立仗并守營者各賜物有差鴻臚禮賔院應在城內蕃客等并節級有賜物澤貴流根宜頒祿秩義隆追逺用慰孝思常參官及諸州府長史父母見存未有官封者並量與五品致仕官及階并邑號父母亡歿未經追贈者量與追贈官及邑號攝侍中讀寶官攝中書令讀册官各賜一子出身撰册文賜一子正員官奉寶綬官書玉册官書寶官各加兩階進寶綬進册進中嚴外辨禮儀贊導押册押寶綬舉舁寶册官各加一階其餘應職掌行事官太常修撰儀注禮官并內行事官三品已下賜爵一級四品已下加一階仍並賜勳一轉鐫造玉册官各賜物五十假中書門下儀制官特加一階禮崇飬老道貴旌賢爰示優恩以𢎞教化天下百姓年九十已上委所在長吏量加存問孝子順孫義夫節婦旌表門閭終身勿事先已旌表者亦量加優恤川嶽玄功聖賢幽贊宜因霈澤用薦馨香五嶽四瀆宜委本州長吏備禮致祭名山大川自古聖帝明王忠臣烈士委所在以禮致祭亡命山澤挾藏軍器百日不首復罪如初赦書有所不該者所司具作條例聞奏敢以赦前事相言告者以其罪罪之赦書日行五百里布告天下咸使聞知主者施行元和十四年七月二十三日上一作册尊號赦編制門下朕聞惟人戴后因事必極於推尊惟辟奉天有善必歸於讓德在敷景化以答玄功居有勞謙之思進多滿假之懼緬自遂古何嘗不由是而致理焉朕獲纘睿圖祗膺神器上奉大祭下安群生恭已臨軒兢懷馭朽志欲周於四海念常切於一夫旰食宵興唯恐失墜運屬休泰時丁小康方隅廓清氛祲銷蕩斯乃上荷乾坤之垂祐宗社之降靈下賴卿士之叶心戎臣之宣力端拱嚮道推誠任能豈豫寡昧用集丕績况至化猶鬱勤憂未寧而中外臣僚文武多士纍陳懇疏並進昌言願獻鴻名以增虛美詎衆心而率籲轉切顧眇身而內愧靡安乃操吉辰爰受典册禋告于清廟虔聞于昊天當兹盛儀夕惕增厲於戲朕自御極再加景號在徽章而孔備諒浮實而多慙宜因行慶之辰誕布惟新之澤與物咸遂永孚于休可大赦天下自元和十四年七月十三日昧爽已前大辟罪已下已發覺未發覺已結正未結正繫囚見徒罪無輕重咸赦除之唯故殺人及官典犯贓不在此限左降官量移近處已經量移者更與量移如復資者即任赴選集丁憂去任服闋日亦與量移如有親故在上都任於所司陳狀便與處分不必更待本州申請如凖前制已合量移有司未注擬者並任纍敘并别勑因責授降資正員官所司亦與處分亡官失爵放歸不齒者量加收敘流人移𨽻等並與量移近處僧尼道士移𨽻者得罪人已亡歿家口未放歸者一切放歸如自情願住者亦聽住左降官及流人先有官者如有已亡歿各還本土應反逆緣坐配流在逺處身已亡歿者如有親戚任便歸葬棄瑕宥過既咸達於幽明録善舉才庶無遺於廢滯或中外前資見任官如有因瑕纍未階録用并左降官事情可恕才行足稱者宜委中書門下量加簡拔隨能録用妖凶久阻汚脅所加今既蕩清宜從洗滌其淄青舊𬋩內官吏將士百姓等縱有迹同惡逆挂涉流言事在往時一切不問維新之後仍不得遞相糾告革其弊俗阜彼遺人切在分憂期於共理鄆曹濮淄青沂海等三道百姓久淪冦境皆被殘傷宜委本道觀察使刺史設法綏撫務令安輯勳籍所著常典必行常恐踰時無忘終食撫平淄青諸道立功將士宜委本道速凖前敕條疏聞奏當與甄奬自經討伐鋒刃所交言念傷殘每深憫惻其淄青舊𬋩四面官軍陳亡將士等已有前勑處分收葬量事致祭其是賊徒遺骸委在中野者亦委所在州縣速與掩瘞輦轂之下萬邦所瞻封畿之內百役斯集永言凋瘵是用蠲除其京畿諸縣今年秋稅户青苗及秋冬季𣙜酒錢每貫量收四百文從元和五年已前諸縣百姓欠負錢物草斛斗等共一十三萬五千一百一十三貫石速委京兆府踈理具可枚數聞奏天寶已後戎事方殷兩河宿兵户賦不入軍國費用取資江淮繭絲所收寧免加厚物力有限水旱相因歲月既深凋瘵亦甚眷言及此憫歎良多今上天垂休氛沴清息師旅之後又兹豐穰省事恤人庶乎惠養其淮南浙江東西宣歙江南湖南福建山南山東荆南等九道今年秋稅錢合上供者每貫量放三百文度支其今年秋稅留州留使錢并鄂嶽共十道每貫量放一百文度支元和五年已前諸道州府監院送省除前制放免外諸色久負逋縣錢物等共四百二十八萬八千八百貫石等監院鹽鐵使從貞元五年已後至元和五年已前制踈理量放外應負諸色錢物斛斗共三百三十二萬二千一百五十一貫石等户部從建中三年已後至元和九年已前除前制踈理外諸色欠負錢物共計五十三萬九千四百六十四貫石等並委本司踈理具徵可放數聞奏御史臺及祕書省等三十二司公𪠘及諸色本利錢其主保逃亡者并正舉納利十倍已上攤徵保人納利五倍已上及展轉攤保者本利並宜放免其正舉未至十倍亦委御史條疏聞奏京城內私債本因富饒之家乘人急切終令貧乏之輩陷死逃亡主保既無資産亦竭徒擾公府無益私家應在城內有私債經十年已上本主及原保人死亡又無資産可徵理者並宜放免比來州縣多不定户貧富變易遂成不均前後制勑頻有處分如聞長吏不盡遵行宜委觀察使與刺史縣令商量三年一定必使均平其京兆府亦宜凖此河隴逈逺風沙早零動切煙塵之虞居勞晝夜之警方加拊勉寤寐在懷緣邊諸軍自今已後所給衣賜及軍糧價直宜委支稍加優恤展材效用既竭忠勞行慶覃恩所宜優給內外文武見任及致仕官三品已上賜爵一級四品以下加一階仍賜勳兩轉神䇿六軍金吾威逺皇城諸道將士等普恩之外賜勳三轉諸道將士經淮西淄青兩度立功者更賜勳兩轉詩歌有客王道攸存禮著先師儒風載闡永懷後嗣寧忘加恩二王三恪及文宣公賜物五十匹仁親為寶睦族是先霈澤所行用頒慶賜大長公主長公主嗣王各有賜物宸居所拱禁衛斯嚴寄切爪牙效彰忠勇恩榮素厚寵錫宜周神䇿六軍金吾威逺皇城等諸軍將軍已下各有賜物其將士等長行立仗者并守本營者每人各賜有差四夷來庭萬里觀禮柔逺之義恩不可遺鴻臚禮賔院應在城內蕃客並節級賜物昭受册典永垂鴻休皆惟皇臣克贊盛禮崇階髙爵任子延恩式示寵章以明酬奬讀册官侍中韓𢎞讀寶官户部侍郎平章事皇甫鏄並加一階已至三品者賜爵二級撰册文官中書侍郎平章事崔群與一子正員官奉册寶綬書玉册書寶官加兩階進寶綬進册禮儀贊導押寶綬舉舁寶册官加一階其餘應職掌行事官寫制書官太常修撰儀注禮官并內侍省行事官三品已上賜爵一級四品已上各加一階仍賜勳兩轉鐫造玉册并填金字造寶官等各賜物五十假每懷先正尚想舊勳將以勸忠故兹進録故尚父子儀贈太師晟贈太尉秀實各與子孫中一人八品官張巡許逺南霽雲顏杲卿真卿各與子孫中一人出官陜州元從奉天定難功臣三品已上普恩之外賜爵一級四品已上更賜勳三轉身歿未經追贈者宜與追贈太學崇儒教化根本兩都國子監館宇如有隳壞處宜令本司計料聞奏當與修葺官屬師氏委中書門下及所司精慎選擇用賢納諫常所虛心計科求人抑有古典天下諸色人中有賢良方正能直言極諫博通墳典達於教化軍謀宏逺堪任將帥詳明政術可以理人者委中書門下尚書御史臺及諸司四品以下清望官五品已上清望官諸道觀察使刺史各舉所知仍限來年正月內到上都朕當親自䇿試宗子中如有才行可稱者委宗正寺及所在長吏具以名聞仍委中書門下量才敘用國典舊章墜廢滋久者各委本司條疏奏請當議施行元和元年已來制報處分有未遵行者委御史臺提舉聞奏大明黜陟署在格言所以考官吏之濁清究黎人之利病敷我化理屬于使臣宜委中書門下選黜陟使分巡天下恤其耉老必及於州閭表其行義用敦乎風俗天下百姓年百歲以上各賜米五石絹二匹純綿一色羊酒有差九十以上各賜米三石絹兩匹仍令本縣令就家存問孝子順孫義夫節婦旌表門閭終身勿事先已旌表者量加優恤祀典所載朝章是崇或美利在人或遺風可慕必資申敬乃副豫誠五嶽四瀆宜委本州府長吏備禮致祭名山大川及自古聖帝明王忠臣烈士各令所在以禮致祭亡命山澤挾藏軍器者百日不首復罪如初赦書有所不該者所司具作條例聞奏敢以赦前事相告言者以其罪罪之赦書日行五百里布告天下咸使知聞文苑英華卷四百二十二
