body:
  text: 文苑英華巻七百七宋李昉等編文集九樊南甲集序一首樊南乙集序一首權公集序一首文泉子集序一首笠澤藂書序一首陳先生集序一首陳先生集後序一首湘南應用集序一首舟中録序一首樊南甲集序李商隠樊南生十六能著才集作十論聖論以古文出諸公間後聨為鄆相國華太守所憐居門下時勅定奏記始通今體後又兩為秘省房中官恣展古集往往咽噱於任范徐庾之間有請作文或時得好對切事聲勢物景衷集作哀上浮壯能感動人十年京師寒且餓人或目曰韓文杜詩彭楊章檄樊南窮凍人或知之仲弟聖僕羲叟特善古文居㑹昌中進士為第一二嘗表集無表字以今體規我而未為集作焉能休大中元集作九非年被奏入嶺集作領當去聲表記所為亦多冬如南郡舟中忽復括其所藏火燹息淺反墨汚烏汚反半有墜落因削筆衡山洗硯湘江以類相等色得四百三十三件作二十巻喚曰樊南四六四六之名六博格五四數六甲之取也未足矜十月十二日夜月明序樊南乙集序前人余為桂林從事日嘗使南郡舟中序所為四六作二十編明年正月自南郡歸二月府貶選為盩厔尉與班縣令武公劉官人同見尹尹即留假叅軍事專章奏屬天子事邊康季榮首得七關數月集作日李玭得秦州月餘朱叔明又得長樂州而益丞相亦尋取維州聨為章賀時同僚有京兆韋觀文河南房魯樂安孫朴京兆韋嶠天水趙璜長樂馮顓彭城劉允章是數輩者皆能文字每著一篇則取本去是嵗葬牛太尉天下設祭者百數他日尹言吾太尉之薨有杜司勲之誌與子之奠文二事集有文字為不朽十月尚書范陽公以徐戎凶悍節度闕判官奏入幕故事軍中移易牒刺皆不關决記室判官專掌之其關記室者記室假故余亦叅雜應用明年府薨選為博士在國子監太學始主事講經集作始復欲註書講經申誦古道教太學生三字集作天下學生為文章七月尚書河東公守蜀東川奏為記室十月得見吳郡張黯見代改判上軍時公始陳兵新教作塲集作新練兵作教塲閱數兵實判官務檢舉條理不暇筆硯明年記室請如京師復攝其事自桂林至是所為已五六百篇其間可取者四百而已三年已来䘮失家道平居忽忽不樂始尅意事佛方願打鐘掃地為清凉山行者於文墨意緒濶畧為置大牛集作太平篋塗逭破裂不復條貫十月𢎞農楊本勝始来軍中本勝賢而文尤樂收聚牋刺因懇索其素所有㑹前四六置京師不可取者乃强聨桂林至是所可取者以時以類亦為二十編名之曰三字集作為四六乙此事非平生所專尚應求備卒不足以為名直欲以塞本勝多愛我之意遂書其首是夕是大中七年十一月十日夜火盡燈暗前無鬼鳥一如大中元年十集作十二月十二日夜時是序前四六之夕書罷永明不成寐集作書罷永歎際明而不成寐權公集序楊嗣復唐有天下二百二十載用文章顯於時代有其人然而自成童就傅以及考終命解巾筮仕以及鈞衡師保造次必於文集作是視聽必於文集作是采章集作文采皆正色而無駁雜調韻皆正聲而無竒邪滔滔然如河集作滔滔然如江河文粹作滔滔如河東注不知其極而又處命書綸綍之任專考覈品藻之柄叅化成輔翊之勲初中終全而有之得之於相國文公矣公諱德輿字載之天水人也族望祖宗之逺當官行已之道語在國史銘於壙而碑於途此不敢詳今所載者因縁文業而已早嵗為淮南江西從事掾管記室之任屬詞詣理奏入而報可移文走檄疆事寜解登朝為起居舍人改駕部員外郎換司勲郎中遷中書舍人凡四任九年專掌詔誥大則發德音修典冊灑朝廷之利澤増盛德之形容小則褒才能叙官業區分文粹作分别流品申明誡集作沮勸無誕詞無巧語誠直温潤真王者之言公昔自纂録為制集五十巻託於友人湖南觀察使楊公憑為之序故今不在編次之文粹無之字内其他千名萬狀隨意所屬牢籠今古窮極㣲細周流於親愛情理之間磅礴於勲賢乆大之業不為利疚不以菲廢本乎道以行乎文故能獨歩當時人人心服非以德爵齒挟而致之貞元中奉詔考定賢良草澤之士昇名者文粹作士十七人及為禮部侍郎擢進士第者七十有餘文粹作二鸞鳳杞梓舉集其門登輔相之位者前後凡十人其他征鎮岳牧文昌掖垣之選不可悉數方且繼居重任者猶森然十字文粹作繼居其重任者今猶森然非精識洞鑒其詞而知其人何以臻此耶憲宗皇帝紹開中興始以集作初英明申威提法武功既愈文粹作俞文教是圖元和五年冬執政暴疾既瘖且痺未旬日而公作相憲章儒術潤色王度使和聲順氣發自廊廟而鬯浃於幽遐我之所長時乆文粹作以推戴玉立氷㓗無緇磷遷染之譏以文德自終豈徒然哉嗣復不佞發跡門館儀曹台席皆忝前躅公之元子中書舍人璩不幸短命其嗣憲孫文粹作子憲泣奉文集求鄙詞以冠篇首雖觀於巨海難挹波濤而藉用白茅所資誠敬其五十巻次第具在集目謹序文泉子集序劉蛻於西華主之降也其三月辛夘夜未半野水入廬漬壊簡策既明日燎其書有不可玩其辭者噫當初不敢自明其書十五年矣今水之来㓂余命也已矣故自褐衣以来辛夘以前收其微集作㣲詞屬意古今上下之間者為外内篇焉復收其怨抑頌記嬰於仁義者雜為諸篇焉物不可以終雜故離為十巻離則名之不絶故授之以為文泉泉之時義大矣哉盖覃以九流之文㫖配以不竭之義曰泉崖谷結集作枯珠璣昧則將救之雲雷亢粢盛乾則將救之余豈垂之空文哉自辛夘迄甲午覆研五見切于襄陽之野笠澤藂書序陸龜䝉藂書者藂脞之書也藂脞猶細碎也細而不遺大可知其所容矣乾符六年春卧于笠澤之瀬敗屋數間盖蠧書十餘箧帕集作伯男兒裁三尺許長䃣齒猶未遍教以藥劑象梧子大小外研墨泚筆供紙札而已體中不甚集作堪羸耄時亦隠几强坐内壹欝則外揚為聲音歌詩賦頌銘記傳叙往往雜發不類不次渾而載之得稱為藂書自當去聲諼集作緩憂之一物非敢露世家耳目故凡所諱其中畧無避焉陳先生集序黄滔唐設進士科垂三百年有司之取士也喻之明鏡喻之平衡未嘗不以至公為之主而得䘮之際或失於明鏡或差於平衡何哉俾其負不羈之才藴出人之行殁身末路抱恨泉䑓者多矣嗚呼豈天之否其至公之道耶抑人之自坎其命耶潁川陳先生實斯人之謂歟先生諱黯字希孺父諱贄通經及第娶江夏黄夫人賢而生先生無昆弟姊妹十嵗能詩十三袖詩一通謁清源牧其首篇詠歌河陽花向時豆新愈瘡之如豆牧戯之曰藻才而花貌胡不詠歌先生應聲曰玳瑁應難比班犀定不加天嫌未端正滿靣與裝花繇是聲名大振於州里十七為詞賦作蘇武謁漢武帝陵廟賦便為作者推伏二十為文先生松姿栁態山屹波注語黙有程進退可法早孤亊太夫人彌孝熈熈愉愉承顔侍膳雖隆雲霄之望終確綵衣之戀既而及其子蔚冠太夫人勉之曰付蔚於潘岳之筵俟爾於㕁詵之桂方起於鄉薦求試貢闈已過不惑之年矣及㑹昌乙丑逮咸通乙酉其間以寜家兼在疚之日斷絶往来吳楚之江山辛勤秦雍之槐蟬嗟嘆知已之許與同郡王肱蕭樞同邑林顥漳浦赫連韜福州陳蔇陳發詹雄同時而名價相上下嗚呼斯八賢皆以不羈之才出人之行懇乎進趨恂恂乎鄉黨而無所成豈天之意否其公耶抑人之自坎其命也俾有司失其明鏡差其平衡之如是結寃氣於冥路之中抱永恨於泉䑓之下豈不甚歟先生之文詞不尚竒切於理也意不偶立重師古也其詩篇詞賦牋檄皆精而切故於官試尤工滔即先生之内姪也自丱趨隅洎隨計之嵗先生下世後二十年而忝登科第東歸之日求遺藁其家經兵火也少得其文三十首他處得詩若干首敬俟増而後述天復元年滔叨閩相之辟旋使錢塘與羅郎中隠遇曰咸通初與先生定交於蒲津秋試賦則五老化為流星詩則漢武横汾先生之試官嚴郎中下都之吟諷秋塲五十人之降仰今遺藁可藂願為之序既還不及求増謹以所得之文賦詩牋分為三巻收淚搦管為之前序蔣㝢正郎為之後序正郎負宇内之雄名也用釋泉䑓之恨時天復二年壬戍秋七月十日陳先生集後序羅隠潁川陳先生諱黯字希孺曩者與予聲跡相接於京師各獲譽於進取咸通庚寅嵗膠其道於蒲津秋試之塲自後俱為小宗伯所困不一某疑甲申春告予以婚嫁之牽制東歸青門撡執之後余亦東遊逮大梁時故杭州盧員外潯在幕齎其文軸謂余曰陳君罷而東豈期斯文之終窒乎子東及之為我歸其文而激其来余至維揚及歸其文遵其言相懽月而後别為我謝范陽公龍門之役不復顧矣由是音塵杜絶天復元年四門博士江夏君通家相好于吳越面余論及塲中曩之名士及希孺之表也余不覺愴然懐舊明年黄君以其文章德業為之序以㝢俾予繋述遂得申斯言嗚呼大唐設進士科三百年矣得之者或非常之人失之者或非常之人若陳希孺之才美則非常之人失者矣夫德行莫若敦於親戚文章莫若大於流傳今已備於江夏之筆矣余不克再敬止書交道于是噫湘南應用集序前人隠大中末即在貢籍中命薄地卑自已夘至于庚寅一十二年㸔人變化去年冬河南公按察長沙郡隠因請事筆硯以資甘㫖明年夏隠得衡陽縣主簿時硖州盧侍御自龍城至右司張員外遊曲江廻皆謂隠不宜佐屬邑二字集作作此等邑於戱隠自卜也審江表一白丁耳安有空將巻軸與公相子弟爭名幸而知非得以减過冬十月乞假歸覲阻風於洞庭青草間因思湘南文書十不一二蓋以失落於馬上軍前故也今分為三巻而舉牒祠祭者亦與焉某月二十四日序舟中録序錢珝乙夘嵗冬十一月余以尚書郎得掌誥命庚申嵗夏六月以舍人獲譴佐撫州馳暑道病秋八月自襄陽浮而下舟行無役因解束書視所為辭藁剪剪一作翦翦冗碎可存者得五百四十篇丞相表奏百篇區别編聨為二十巻夫體正而有倫辭約而居要始終明白兹所以為誥也國朝聲名辭臣率能由是而作堂闥秘邃不與漢魏爭髙下而荒學小子以一目視其穴隙間其可見堂奥而得規摹哉以是代天子言誠不知而作也古者黜幽不過考三載之績余冒居六年見考無績用思黜不亦宜乎所編聨不敢以集稱理諸舟中遂曰舟中録是年九月錢珝自序於沔陽之南笠澤藂書序乾符六年春卧于笠澤之瀬集作自乾符六年春卧病于笠澤之濱裁三尺集作裁未三尺文苑英華巻七百七
