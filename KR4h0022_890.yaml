body:
  text: 文苑英華卷八百九十一宋李昉等編王爵二撥川郡王碑一首定襄王郭英乂碑一首常山郡王田緒碑一首撥川郡王神道碑張説珠玉無逺而登輦輅之飾寶也松栝無幽而入殿堂之搆材也物貴其用人亦如之撥川王論弓仁者源出於匹末城吐蕃贊普之王族也曾祖贊祖尊父陵代相蕃國號為東贊戎言謂宰曰論因而氏焉公有由余之深識日磾之先見陋偏荒之韋毳慕上國之衣冠聖厯二年以所統吐渾七千帳歸於我是嵗吐蕃大下公勤兵境上縱諜招之其吐渾以論家世恩又曰仁人東矣從之者七千人朝家大勳授左玉鈐衛將軍封酒泉郡開國公食邑二千户國集作周語曰犬戎樹敦國語作惇守終純固今其俗獷而輕死其法折而不撓故前代無降人中國集作土無童僕自公之集無之字拔身向化首變華風澤潞之間如集作始見我州矣若夫河南沙苑坰牧所利每歲氷合敵騎是虞中軍必謀於元老亞將固選於時傑神龍三年以為朔方軍前鋒遊奕使景雲集作龍二年換右驍衛將軍開元五年兼歸德州都督使皆如故八年遷本衛大將軍改朔方節度副大使公之理兵也堅三甲集作革利五刃偶拳勇齊足力信賞罰分甘苦六轡如手千夫一心接獯獫猶蚊蚋臥沙塞猶集作如袵席猶疑作斿集作荐居露食垂二十年雨畢而成師氷泮而休卒寒氣入於肌骨夜霜入於鬚鬢人不堪其勤公不改其節韓公之建三城也公洗兵諾真之水刷馬草心之山以為外斥而叛徒安堵鄭卿之和默啜也公授館李陵之臺致饔光祿之塞以為內侯而賔至如歸九姓之亂單于也公四月度磧過白柳林收火拔部帳納多真種落彌川滿野懷惠忘亡漠南諸軍韙其計也降户之叛河曲也公千騎奮擊萬衆奔走戡剪略定師旅方旋而延陀􅎤􅎤唐書作􅎤跌復相嘯聚上軍敗於青岡岡字集作剛嶺元帥沒於赤柳澗公越自新堡奔命冦場嬴糧之徒不滿五百凶醜四合衆寡萬倍公殺牛為壘噉敵為餉決命再宿衝潰重固集作圍連兵躡踵千里轉戰全薛公集作合薛訥於河外反知運於冦手朔方諸軍壯其戰矣研磨之奔也邀于集作於黑山口覆其精鋭布思集作市惠之背也追至紅桃帳掩其輜重乳洎之會刜蘭池之狂敵木盤之役闕方渠之逋冦凡前後大戰數十小戰數百算無遺䇿兵有全聲集作勝是以六部逃遁三垂乂寧聲暴露於天下業光華於世集作代載信皇威之所加亦武臣之力也故錦衣寶玉允答戎功甲第良田丕承王命集作丕承錫命帝錫二字集作語其智效纍其集作未甚優寵黃頭黑齒比價齊名積戰多瘡纍勞生疹恩命尚藥馳往診之晉竪已深秦醫無及十一年四月十五日集作四月五日薨于集作於位享年六十有六集無此二字制贈為撥川王稱故國本其志也集作志其本也太常議諡曰忠由舊典昭其行也長子雲忠二字集作盧襲官封繼事業次子舊久特拜郎將十二年四月詔葬於京城之南懷逺人也太常鼓吹介士龍旗虎帳貂集作裘封犛殉馬吉凶之義舉飾終之物備長安令揔徒以護事鴻臚卿士集無士字序賔以觀禮哀榮之道著集作極字矣君臣之義厚矣有命國史立碑表墓吾嘗同寮敢陳集作昧遺烈銘曰黃河接天青海殊壤舉世安裕集作裕拔俗誰敢倬哉論侯利有攸往奮飛橫絶摶空直上以衆欵塞因敵立勳吐渾集作蕃萬户吟嘯成羣精感天地氣合風雲既封酒泉乃為集作位將軍朔方隂塞直秉集作彼獯獫帝命先鋒闞為虓虎上北尸集作山北加電漢南擊鼓數年之間集作十數年間耀國威武我有師旅將軍鞠之我有邉氓將軍育之柳澗亡師一劒復之蘭池叛國三戰覆之武節方壯朝霧集作露不待王爵送終宿恩未改時來世往集作去人亡物在集作人物如在銘勳諡忠以告四海故定襄王郭英乂神道碑元載維永泰元年十有二月甲子開府儀同三司尚書左一作右僕射兼御史大夫劒南節度度支營田觀察使成都尹定襄王薨於靈池兵故也夫懿文德者非謂禮君臣正上下其謂經綸大難乎鑠武功者非謂鞠師旅威中外其謂翼中興乎公名英乂字元武贈伊州刺史旰公之烈祖也隴右節度攝御史中丞贈太子太傅知運公之皇考也産雲赤亭樹勳青海世傳良將載在國史公河嶽之粹將相之器學劒輕短後縵纓讀書重金版玉匱天寶二載方筮仕轅門纍授左武衛大將軍節度涼國公見之曰代吾節制者必此子也其後十年纍代涼公為節度矣祿山之亂中原也二聖偽遊三秦賊據汧岐重鎮非公不可制授公秦州都督兼御史中丞隴右採訪使未幾賊將髙嵩長驅幽燕深入汧隴公外申郊勞內設庭宴饗未屬厭兵已合圍賊黨數千應時剪滅繇是虜鏑不鳴於隴外皇輿始都於雍上至德二年詔公為鳳翔太守轉西平太守加隴右節度兼御史大夫吐蕃之逼西河也諸冦以堅甲乘城我以偏師遇敵勝在於一作不戰利當用竒選驍騎以襲虛張疑兵以應鋭前衝未及於龍島後徑已覆於梟巢邉捷晝至敵圍夜潰進封西河郡公思明之陷成周也南入陳蔡詔公兼御史大夫統淮南節鉞東捍陜虢詔公兼陜州刺史主闕外旄一作旌麾寶應之嵗上乘龍躍之運寵虎臣之績進户部尚書加開府儀同三司仍捴戎一作舊職朝義之走河北也公雷電勇略風摶徑騎驅熊虎一作羆之師開龍蛇之陳一戰而穀水破再戰而邙山拔十年逋冦一作誅萬里如掃朝廷壯之詔領東京留守又兼河南尹俄拜尚書右僕射封定襄王加實封三百户永泰元年兼集賢待制夏五月天子以劒門巨鎮推擇收難歷選朝廷惟公是授即日加成都尹東西兩川節度兼御史大夫僕射如故是時也入承日月之光出擁風雲之氣以孫吳為老生以韓彭為兒戲千里為之震動百蠻為之懾畏秋七月西蕃犯境公戎馬驟捷軍人擅還禆將懼誅乘間謀叛公擐甲擊鼓單車入深引西山之數騎望東川之外救短兵未接追冦橫及雖刃以通中而氣猶激射疆吏乘遽聞乎京師上投袂而驚仍一作彌加悼惜有以見聖主之深仁重武臣之壯節不問輿尸之過爰旌折首之功以大厯三年正月二十七日詔葬于武功之先塋夫人鄭國夫人龎氏禮歸敬仲誠及伯宗生則六珈受寵歿則九原同袝嗣子將作少監嘉珍憤積嘗膽哀纒泣血飾襯蜀門歸魂秦隴一作旬力樹祁連之冡思崇峴上之碣以載職在史臣業專文律琢石旌美俾奮大猷其辭曰否遘天地運鍾雲雷曄曄定襄與時而來躬赴兵難志清國災推轂隴西士卒雲屯擁旄陜東羣冦雷奔五開幕府七鑿凶門以寡擊衆以亡易存六踐柏臺南憲是張再登八座右揆有光同盟錫土異姓封王勳崇業大位重名揚召對蓬萊作鎮梁益秋霜發令春雨流澤望在股肱變生肘腋南圍既合短兵未進單騎驟奔群凶兢振血殷朱輪首碎白刃魂歸萬里悲慟三軍踈松蔽日孤冡參雲身歿寃氣名髙戰勳常山郡王田緒神道碑丘降維天以五星辨經紀維人以五常垂教化奉天者皇王牧民者侯伯故五星失次舍而天綱乖五常悖倫理而人紀壞非夫人神厭禍天地合德俾降英傑以靜邦家則無以正綱紀成教化矣皇唐九葉今上馭厯之五載得佐命戡難之臣曰田公諱緒字某北平盧龍人也系自唐虞盛德載世祚于全齊醇仁酣和衰周鼎遷暴嬴璧返劉項角逐正者得之則齊王橫去國隕身與義終始議郎疇立功逃賞興讓淳澆十數世家于北邉議郎即公之十五代祖也至皇鄭州别駕璟生公大王父安東副都護贈户部尚書有遮敵護塞之勳而生不登貴位加之以齊王之秉節一作義議郎之遺榮濬源茂本故尚書克生太尉承嗣歷檢校户部尚書兼御史大夫魏慱貝相滄德州節度度支一作支度營田觀察處置等使尚書左僕射司空同中書門下平章事兼魏州大都督府長史封鴈門郡王歿贈太保纍贈太傅復魏州大都督公太傅第六子也乘博厚之慶得堅剛之氣君臣之大節理亂之形兆實天賦不言而知侯王之姿見于童孺太傅朗識異而器焉以諸侯之嫡拜京兆府參軍兼五領騎士深得將略嗚弓上馬雄稜挺然無何太尉寢疾以或措置故事不歸於公聖朝載懷輯綏永顧勳績爰命從子俾侯于蕃既履四封乃遷六官一有休字付畀于天威惠在已主恩寵章赫赫煌煌孝未昭而忠隳正不悟而邪及志惟悖德動則無名是以河朔塵飛隴右霧塞青兖既叶幽冀未一作不同見多壘於魏郊發天兵於隴坻曠日持久連年不平履危者若安處禍者皆樂囂然相視孰辨其非公斷天下之疑逹天下之務以為君親可報也世德不可墜也犯是二者生將何為於是欷歔涕流冀其感寤靡有虛日而無正言及京師變生翠華順動人望愈惑堅不可離星疑辰之間戎帥薨謝師人將士退迫公理軍公清望威名衆所欣戴且曰吾先公太傅之冡子也仁而能斷嚴不至殘當去禍就福化危使安敢以死請期乎息肩公雖懇辭人實誠奉於是三軍之禆將一作師列城之守宰及士吏卒伍大和會于旌門之外而聼命焉公乃陳其逆順曉其利病西嚮稽顙如對天顔萬人歡呼式忭且舞受公相誓如履夷逾疑作途曽不崇朝而獻狀行在于時黃屋南巡于邑濮元凶僣盜于鎬京握兵者鱗差失節者踵武公挺身禍敗拔迹危難掃氛祲之未開定危疑於已變乃分遣寮屬結約諸侯回成德向闕之心合昭義勤王之志雖漁陽之徑悍北敵之猖狂公精誠籲天鋭氣蟠地能走馬實於魏壤覆朱滔於貝丘希烈勢孤賊泚援絶訖于收復經啓自公巍巍碩勳孰與公比由是捷書上聞未幾而降優詔拜魏博節度管內支度營田觀察處置等使銀青光祿大夫魏州大都督長史兼御史大夫君臣之契運昭泰之玄符千載一時燭見兹日及六龍駕還九有風清然後議刑賞頒慶賜則公之茂績結于宸𠂻即日加工部尚書節度等使如故上復以麾幢之任賢賢也腹心是託親親也親賢之選簡于帝心賜公姻戚尚嘉誠長公主公主肅宗文明武德皇帝之孫代宗睿文孝武皇帝之子今上之妹玉潤貞質蘭芳粹容德配元臣道光卿族降自九天歸于列藩奬納忠之誠重劻戴之績由此見公之寵畀羣后也昔漢張敖曹窋皆因緣戚屬稱榮主第若公之分茅胙土樹牙推轂上自振古迄于聖朝一人而已尋遷尚書右一作左僕射特封常山郡王食邑三千户明德也改封鴈門真食五百户襲慶也公惠訓封圻按部師律恢皇威以勉嘉師敷渥澤以潤蒸人禮讓興行廪積斯實修整人紀統和天常夷難戴君每為已任朝廷褒是休烈爰咨弼諧以本官就拜同中書門下平章事公既參廟謀又統兵柄方將刳禍胎之未兆措理本於永貞張三光之明調六氣之府致君堯舜身作夔益豈獨鎖結燕趙連衡齊魯嘉言有聞而遽嬰寢疾以貞元十有二年四月十日薨於戎府享年六十有三天子震悼不臨朝者三日列辟相吊邦人大慘即日詔遣尚書職方員外郎房挺申賻襚之恩備君臣之分追是勳伐册贈司空詔書褒寵禮加常典不踰時而命公令子節度副使兼都知兵馬朝散大夫試光祿少卿兼御史大夫季安纂厥戎政式光茂烈雖哀過乎禮而義貴從權寧息魏人藩翰王國稟君之命移孝則忠生而顯榮歿有遺祉薰灼今昔在公一門越以某年十月四日葬我公魏州貴鄉縣金堤鄉吳河原邇先太傅之塋禮也嗚呼公精彩朗徹志氣雄厲性通事表心達化權二十總戎三十作相俾魏慱為順本功以之髙奉家國於正初孝以之大忠孝斯立福夀攸歸向蒼生失望國棟斯折今古之恨何勝言哉公有子三人長曰孝和朝散大夫使持節澶州諸軍事澶州刺史兼御史中丞充本州防禦使少曰季直朝議郎殿中侍御史內供奉銀青光祿大夫檢校工部尚書兼魏州大都督府長史御史大夫充魏慱相貝澶衛等六州節度管內支度營田觀察處置等使季安公之次子也十五授鉞為唐名臣固河山奕葉之封奉貴主慈嚴之訓光闡前烈其不朽歟公左右王家底靜藩閫功勳一作豐功大略書于惇史若乃垂休聲於開國之地申罔極於元侯之恩刋勒豐碑光顯舊壤門人之事也追慕感恩一有顧字直而不文其辭曰三光昏霾兩儀否閉爰資英傑用贊開濟天人合符斯人命世其一塞直盧龍山橫紫蒙元精委輸慶發于公其勳惟茂其德惟崇其二建中季年兩河難作淮圻怙亂燕趙濟惡洶洶鯨奔狺狺獸摶其三翠華順動關右塵飛戎輅載駕苞茅不歸且懷疑顧孰就是非其四時惟我公拔迹艱阻率彼叛徒悉為王旅白日精貫丹誠自許其五婪婪燕冦嗇禍稱兵動搖夏東應援咸京旌旗蔽野獷虜連營其六公仗天威修鄰叶志忠見于時泰生于否十萬姦凶一敗塗地其七帝嘉殊績乃授藩維輯寧有土惠訓成師威令自肅仁風載馳其八乃作宫師一作六官真食茅土窮寵極貴封王尚主恩光顯融獨映今古其九既司右揆爰陟上台皇猷允穆俗阜爰來人望匡弼天胡降災其十册贈司空念深宸扆道則致君人而知子帝命元侯傳封四履其十一髙墳峩峩先隴之旁河掃通氣沙麓連岡殁而可作公其不亡其十二文苑英華卷八百九十一
