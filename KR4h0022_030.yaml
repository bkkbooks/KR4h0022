body:
  text: 文苑英華巻三十宋李昉等編地類六林表吳岫微賦一首大孤山賦一首窻中列逺岫賦一首山呼萬嵗賦二首沃焦山賦二首林表吳岫㣲賦冷朝陽楚江之隂巖壑重深參差逺岫掩映遥林帶殘霞之隠隠含暮景之沉沉聳孤峰之萬仭擢喬木於千尋仰之彌髙倚青冥而直上瞻之彌逺凝黛色而傍臨窻㣲明而可見雲出沒而無心㣲雨新晴陽烏乍曉芊芊芳樹厯厯飛鳥森羅廣澤之間半出重林之表天髙地逺混煙靄而雖㣲虎踞龍盤等衡巫而不小形標逈漢勢壓全吳衆鳥所託羣仙所趨林隔岫而相映岫依林以相扶幽蘭所生知其芳矣仁者所樂不亦悅乎春思感於春林逺情馳於逺岫心悠悠以遐想色遥遥而層構度材任土挺翹楚而敷榮藴玉蔵珍分巘崿而増秀信乾坤之覆載承雨露之繁茂當峻極於長空豈蔽虧於側陋蘭青青兮雨霏霏望鄉路兮呉山㣲折芳懐逺兮送将歸桂枝片玉兮生光輝大孤山賦并序李徳裕余剖符淮甸道出蠡澤属江天清霽千里無波㸃大孤於中流昇旭景一作日於匡阜不因佐官豈遂斯遊謝康樂尤好山水嘗居此地竟闕詞賦其故何哉彼孤嶼亂流非可儔匹因為小賦以寄友朋川瀆巇道人心所惡必有穹石禦其横騖勢莫状於灔澦蘇軾灔澦賦其本此乎抑偶合也氣莫雄於砥柱惟大孤之角立掩二山而傑竪高標九派之衝以捍百川之注耽若虎視􅝦一作蚴如龍㩀靡摇巨浪神明之所扶不倚羣山上𤣥之所固彼邐迤而何多信嶷然而有數念前世之獨立知君子之難遇如介石者袁楊制横流者李杜觀其側秀靈草旁挺竒樹寕憂梓匠之斤豈有樵人之路想江妃之乍逰疑水仙之所一作或駐嗟瀛洲與方丈盖髣髴如煙霧㩀神鰲而臲卼逐風濤而沿泝未若根連坤軸終古而長存迹寄夜川負之而不去雖愚叟之復生焉能移其咫歩忩中列逺岫賦以山逺而見如在諸掌為韵張仲素仁者静而自閒高其居而閉其闗爰開忩以列岫若施障而圗山邈彼黛巘當於其間至若虛牖洞開連峰向晩雲無心而逈出鳥厲翼而孤返初疑鏡裏覺萬象之俱深又似壺中見三山之尚逺洎如雨歇原野風開薄帷天道不窺而自見山光遥麗而増思謝守臨齋以觀詠之不足陶公開巻則知室是逺而若薜蘿之在眼見靈運詩方坐嘯而搘頥杳杳雲峰既自中而翫矣蒼蒼海嶠亦孔昭而見之况復彩翠之容朝昏是變将避俗以無悶殊近知而一作之守見簾光乍入増松雪之㣲眀砌竹旁垂助林巒之葱蒨夫其忩也或飾之以青瑣交之以綺疏想取榮於爾室非助境於吾廬鑿垣而疊嶂遥列寓目而幽襟必舒偶琴酒之樂只冺色空之豁如且彼植木翫芳者有時而改累土為山者有時而殆曷若曲肱隱几事幽功倍垂碧紗而嵐氣共凝巻宿霧而翠屏常在是知事有親而逾失逺而匪疎狥利争先之徒固難知也逃名小隱之士或近沽諸亦何必尋赤城之標究蓮峰之掌彼垂堂而是冒此自牖而可賞山中人兮誠不在於獨往山呼萬歳賦以大君升中維嶽表祥為韻張仲素天作太室巍乎蒼蒼立極正位含精降祥惟漢武之肇祀聞嘉言之孔彰告盈數以不忒鬰希聲之載揚於時五輅既臻千官畢㑹望嶄巖之絶壁升縹緲之華盖排羽衛於山前刻金石於天外諒精誠之至感致天地之交泰於是騰洪音流翠靄始則類乎雷殷終不因於地籟惟天祚聖谷得一而盈惟嶽䧏神聲至三而大夫其登封則千古是追峻極而四方是維瑞載光於漢史徳且詠於周詩動合林徵有異坻頺之震響合靈祀且殊大塊之噫是時也百神受職萬靈獻功霽山霧收山風福穰穰於宇内聲隱隱於封中且啟廸之㣲延洪是表因勒成而響答殊卜祝之占兆憑乎物陋石言之不臧錫自天歎夣齡之尚少懿乎㫚合散乎絪緼邈崇丘之杳靄伊仰止而敷聞掩龜格與鳯降軼神光與慶雲獨得乎數千百祀何慙於七十二君稽彼衆山咨夫四嶽或泥金於杳靄或瘞玉於綿邈封並聞夫再三響未効於清濁方今文物芬郁寰瀛廓澄我后克讓謙勤夙興已効如山之夀式當如日之升所以下臣獻頌望翠華之是登第二以聖徳潜融隂靈效祉為韵韓鎡嶽則降神君惟作聖爰膺萬夀之福以奉一人之慶至誠斯感瑞既發於希聲盈數足徵道方期於永命伊昔漢徳方至神人以寧展升中之盛禮備昭報之天經休徵是格眀徳斯馨帝道昌而言作天心啟而昭靈諒惟恍而惟惚覺非雷而非霆若自觀心數已超於卜祝匪因騰口事全過於夣齡曽異石言方承帝祉人君肅穆以傾聼羣后左右而驚視訝寂寂以無人每洋洋而在耳數惟萬式彰悠久之期呼至三用表丁寧之㫖瞻彼維嵩極天比崇明神是處應感潜通降喜聲於碧嶂遵宻命於𤣥穹慶彼盛時巖嶺且聞於隱隱暢茲和氣人心盡樂於融融天既輔於無親神方降於有徳在肹蠁而昭異禆聲明而莫測孰謂乎不識不知曷昭夫或語或黙懿其發茲大號騰彼𢎞音儆谷神之虛宅振山水之高林周流崖巘散越嶔崟和清風之逺韻凝翠靄之層隂若非報地承天恪慎克孝洋溢乎徳澤布濩乎聲教則何以跡追三五之蹤嵗表十千之效囂然震盪忽爾沉潜儼翠華而将下仰太室而迴瞻至矣哉斯前代之盛事惟我后之能兼沃焦山賦吳融域中公子問於方外先生曰盖聞水之大也下環乎地上浮於空無象無邉夷猶洪濛百派千流皆歸於東何巨溟之深也萬古能容何九州之高也不淪其中先生曰渾沌死乾坤始東西傾川澤委帝乃慮海旁溢俾山中峙復孕以火用銷其水此沃焦之為義真宰之𤣥㫖者也請言其状也巉乎崒乎赫曦乎翕赩乎隂陽熾炭天地開鑪景風鼓吹赤帝規模成於妙有㧞彼虚無處冷能熱雖燔且濡於律則黄鍾取法在易則既濟相符岥𡊇一作陂陁兮壓海萬里鴻洞兮烘天一隅液馮夷軋天吳鱗介既難以潜伏草木安得其芬敷巨靈不能擘畏其爛手愚公不能移憚其焚軀靈漲疑竭大室若枯爾其水之來也浩浩争奔滔滔不住蹴嶽推阜跳天沃霧暘谷無地扶桑失樹雷奔潮走雪飛沫聚吞吐造化浮沉朝暮一歸塘列子渤海東有大壑實無底之谷名曰歸墟初學記作歸塘之積積既久而還盈一尾閭之洩洩不供而旋住苟彼不為煎熬何物當其委輸公子曰夫萬物之是非也當務所見無矜所傳不見五嶽各司一邉蟠地極天吐雲含煙玉石産其下豫章森其巔高高下下綿綿聮聮方面是傳祀典是先故無事則備王者之巡逰焉有事則為國家之闗防焉彼沃焦者存耶亡耶不知夫去中國幾千其説何邇其功豈然先生曰古不可以今論逺不可以近識至於先賢先聖有功有徳或始火化或始粒食或衣裳兆民或棟宇萬國其人豈見其道何極但日用而不知固神化之難測抑又人之為意見頻則不恠聞數則不驚只如踆烏𤣥兎迭代虧盈迅雷烈風無形有聲北冰不泮南雨無晴方諸向月而水出陽燧映日而火生鵠知半夜雞辨五更螟蛉化而蜾蠃負洛鐘鳴而蜀山傾譚如詭妄驗乃彰明儻非目擊皆必力争如沃焦者茫茫靄靄存於物外屹溟漲以獨立無丘陵之相帶何地能勝惟天粗盖堯災是弭禹功是賴但以逺而不見貴以近而不見大何異乎曾參冠百行之首出四科而不載姬旦有再造之功為三監之相害有以見深蔵若虚明道若昧只如高稱日觀靈號天孫魯瞻所重兖鎮攸尊能攻善惡業召精魂何盗跖夀而幸何顔回夭而寃何富慶何貧原靈獸出何遭覉縻之困海鳥來何獲鐘皷之喧觀其倒置孰為司存又如太華隠嶙上五千仞碧蓮若挿髙掌如奮然而設闗太束為城太峻苟一夫可守四塞可鎮終使險易恃而固易憑而令驕易生而荒易徇懼則能安逸則成釁又如嵐浮紫盖秀擢朱陵北渚下壓南箕上承然而聚鬰蒸限嚴凝鴈不可度人何以登其禍聖賢也則帝舜之逰不返昭王之死無憑其殃忠讜也靈均有𦵏魚之痛賈誼有占鵩之徵是非不辨正直何稱徒聞金簡玉書以為貺九向九背而自矜又如幽并之墟畢昴之位岧嶤直上磊落相次然而蔵趙符於上成無恤之不義産燕璧於中假慕容之神噐大虵蜿蜿兩頭何異嘉榖薿薿五穫何利管子恒山有榖四種五穫旁扶䟦扈之黨坐索彤弓之賜胡不懲革而令馴致又如據天地之中央潤河洛之流光岧亭壁立壓疊屏張而能降神表瑞呼嵗呈祥控臨諸夏標凖四方若乃陳蕃竇武一時忠良為國除害其謀乃臧不獲天助翻為賊戕劉聦劉曜恣意焚傷衣冠草莽宫闕荒涼俯折地軸仰絶乾綱漢陽九以遽畢晉南渡而尋亡曽何固䕶自倚青蒼月裏開宫但容童子雲中捻管唯引鳯凰吁其咄哉彼五嶽者長未一分短以盈尺論名則大責實何益封公封王用珪用璧邃宇崇舘朱殷粉白然識者視之何異沐猴而冠牽牛負軛者耶其次則有非方非嶽亦恠亦神崑崙則樹珠田芝蓬萊則闕金臺銀周王迷之於轍迹漢帝感之以禮禋荆山美玉獻不遇君隴山鸚鵡語或䧟人嶰谷有竹慘舒不均嶧陽有桐清濁强分姑射何靈如冰如雪巫陽何感為雨為雲恠山何恠飛來至越慶山何慶湧出於秦若然則逺者近者大者小者如沃焦之功實冠於天下何以名耶至於南面巍巍安尊定卑建邦設都來蠻走夷其為武也有干戚鈇鉞其為文也有爼豆尊彛齊紈越絮暖必如斯周禾温麥飽必以時胎化卵育手捉足馳其奉生也有歌鐘管籥其事死也有棺槨幌帷詒子詒孫固本崇基苟懐襄之不止皆墊溺以何之若然者不惟九土潰而全堕抑亦三光蕩而崩離則堯舜禹湯之道沒不傳矣周孔揚孟之文又安存斯况乃上無灌木誘良工之斤鑿下無靈鰲招巨人之釣索不棲翠羽飾綺被之彩錯不孕眀珠供魏車之照灼不滋金鐵起兵交惡不穴鱷鯨吞舟恣虐吉凶莫知威福寧作誰衒肹蠁誰蔵冥寞所以貞珉翠琰却絶罔録桂湯蘭肴何嘗約畧固不復邀物以白犬白雞媚人以靈草靈藥但超世以崔嵬為普天之銷鑠於是公子愕然如失起而謝曰儵忽之神能鑿人耳目俞盧之術善治人膏肓向者聞衆人之論浩然若渉津之無梁今也聞吾子之論㸌然若披雲霧而覩太陽恨不能凌風雲乗混茫决意極觀勒銘其旁噫有名之祀所在感彰至於山魅射影水弩為創鴟夷鼓怒耕父激揚皆霑沃酹不乏馨香何茲山也横絶於萬代不遇於百王将無時如孔子豈獨行於務光近者泰階未平四郊多壘貳負尚活三苖未死水仙則多䧟齊人米賤欵作賊則半驅妖鬼室散機杼田抛耒耜郎官困採橡於野将卒貧鬻薪於市霧足妖興雲多陣起既走羣望猶懸帝祉豈褒崇之漏彼致災害之如此方今封有功而爵有徳小不遺而大寧弛盖九重深執事者未聞於天子第二以蕩熱翻空此焉銷鑠為韻海之大也吞乎百川百川不停也海将溢焉伊元化之相制屹崇山之暗然不知乎何化疑作代凝結沉潜積熱廣陂陁髙嶻嵲焰止不死煙生莫絶曈曨兮想二氣之爐中烈一作熾沸渭兮疑九州之鼎下爇當長鯨之鼓跳此歘爾以潜銷雖巨鰲之噴躍亦倐然而盡鑠渗若一空呀如四涸得非火井通其腹且孰問其穿鑿當是燭龍蟠其根又誰睹其照灼但耗溟渤自横寥廓莫不屹屹崇崇燖虚燥空向曙而晴霞助赫連宵而隂火相烘如欲以煅鮫室災龍宫雨露既難以澤草木安得而豐遂使乗槎之人莫敢沿洄其側銜石之鳥無因棲息於中是知隂陽之變也本自相形動靜之用也歸於相養苟喬岫之無作則柔祗而必蕩若然者堯之水不止乎九年之多禹之功難均乎四海之廣彼稱神稱仙者有十洲之繁封公封王者有五嶽之尊縹緲而雲霓自鑠峥嶸而日月爭翻徒充覆載莫補乾坤曽未如千仞獨髙衆流皆委非煎熬之不怠則墊溺而何弭所在雖逺厥功難弛有能光祀典於吾唐宜褒崇於此文苑英華巻三十
