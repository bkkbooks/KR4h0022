body:
  text: 文苑英華卷八百二十二宋李昉等編觀荆州大崇福觀記一首天柱山天柱觀記一首修仙都觀記一首新修龍興觀記一首道士劉宏山院壁記一首尊像下泊宫三茅君素像記一首童子黃仙師瞿童記一首觀荆州大崇福觀記陳子昻維大周揖讓受唐有天下十載施化育德揚光顯仁天下咸和中外胥謐仙門法宇澤罔不暨粵若無上太祖孝明闕神明濬哲龍德而隱君子勿用干一作千我諸宫葳蕤春風霡霂時雨謳歌歸之允矣太王王季岐鎬之漸也於戲西伯潛聖而遺其三齡故我太祖始安時處順乘彼白雲以歸帝鄉方城之人嗟咨涕洟靈魄罔遘乃以珠𥜗玉匣閟兹衣冠穀林方崇喬山未掩龍輴梓寢在兹觀者七月焉餘滅化北顔塗塈積逮皇帝順人樂推鳳翔虎變追革顯號宗祀于明堂躍誠疑作試易或躍在淵自試也所歷莫不昭晰一作皓皓寵光也長史𢎞農楊元琰雅量川濬貞節嶽立有倚相墳典之博子囊增名之忠遂稽皇圖徴文獻以為會稽之廟大庭之初其事上矣乃表上遺迹祈飾山階司賔卿于惟謙地官主事魯玄傑咸經沐浴邦憲升官周京亦恢廓徽猷任佐誠請時皇帝方垂拱璇淵之中以思大化故書奏不答道士孟安排者玄稟真骨記上階黃裳羽袂囊中竊感蒼梧遺化長沙舊寢不可以不昭一作明發聖世復重理前狀伏奉闕下至于再三天子乃憫然遷思回慮旌别斯觀錫名曰大一作天非崇福焉時龍集已亥聖厯之二年也翌日又優制褒崇時降銀榜仙書鳳篆飛集王官一作宫天文昭回瑞我鄢郢則有踰岐山越梁境梯衡霍浮瀟湘鬱荆門龎江徼一作激莫不翼戴抃舞澡雪心目者已安排乃喟然嘆曰道惡乎在名惡乎在茅茨文軒未始離也朱宫玄圃未始乖也損之而又損之思乎思無為而無不為知乎知則我何拘於常見哉而不謂熙帝庸也遂經玄都爰伐琴瑟作為仙觀之宫文彩構檻碔砆砌一作扣階櫨栱森鬱以雲合藻井翕赩以天開瑶壇躋于上清銀闕表於中界髙步玄一有記字非雲肅一有綱字非然靈風髣佛紫陽之天一作大非也然後璇題顯曜金格道相朝浮彩雲夕泫清露眇哉邈乎信皇靈之所感發矣蓋金簡玉牒可存而不可知崑崙方壺可聞而不可階也猶且曰一作云道録貴乎真經况皇明帝載昭鑠日月而已乃刋作記以傳罔極天柱山天柱觀記吳筠太史公稱太荒之內名山五千其在中國有五嶽作鎮羅浮栝蒼輩十山為之佐命其餘不可詳載粵天柱之號闕之霍及一作乃此三峰一稱矣蓋以其下擢地紀上承天維中函洞府之謂豈唯藴金碧宅靈仙所貴興雲雨潤萬物也自餘杭郭泝溪十里登陸而南弄潺湲入崢嶸幽徑窈窕才越千步忽巗勢却倚襟領環掩而清宫闢焉於是旁訊有識稽諸實録乃知昔髙士郭文舉創隱于兹以雲林為家遂長往不復元和貫於異類猛獸為之馴擾晉書逸人傳具紀其事可略而言自先生閟景潛升而遺廟斯立暨我唐𢎞道元祀因廣仙迹為天柱之觀有五洞相鄰得其名者為之大滌雖寥邃莫測蓋與林屋華陽密通上帝隂宫耳爰有三泉二軌一濫殊源合流水旱不易擁為曲池縈照軒宇夏寒而辨沙礫冬溫而育萍藻既潄而飲之曲肱而枕之樂在其中矣土無沮洳風木飄厲故棲遲者心暢而夀永盤礴紆鬱氣淳境美虎不搏蛇不螫而况于人乎貞觀初有許一作素先生曰某懷道就間荐徴不起後有道士張整葉法善朱君緒司馬紫微暨齊物夏侯子雲皆為髙流繼踵不絶或逰或居窮年忘返寶應中羣冦蟻聚焚爇城邑蕩然煨燼唯此獨存非神靈扶持曷以臻是州牧相里造縣宰范愔化洽政成不嚴而理遺氓景附復輯其業筠與逸人李玄卿樂土是安捨此奚適恐將來君子靡昭厥由故特志之表此貞石修仙都觀記假文昌平都山最髙頂即漢時王隂二真人蟬蛻之所也峭壁千仞下臨湍波老柏萬株上插一作蔭峰嶺靈花綵羽皆非圖志中所載者昏旦萬狀信非人境貞元十五年余西逰岷蜀停舟江岸振衣虔潔詣諸洞所石嵒靈寶蒼然相次苔龕古書依稀可辨時與道侣數人坐於下須臾天籟不起萬竅風息山光耀一作輝於耳目煙霞拂於襟袖相顧神竦若在紫府一作氛玄圃矣牽於形役不得淹久瞻眺惆悵書名而去爾來已三十四年太和庚戌嵗自淮南移鎮荆門有客由峽中來者皆言當時題紀文字猶在觀宇嵗久臺殿荒毁不三數年必盡摧沒於巗壑矣乃捨一月秩俸俾令修葺子來同力浹旬報就去年冬十一月詔命換麾幢再領全蜀泝三峽歷舊逰依然境物重喜登覽聞泉聲而緩步愛松色而難别遂命筆硯志於巖谷時太和七年正月五日劍南西川節度副大使知節度事管內一作勾觀察處置統押近界諸蠻及西山八國雲南安撫等使金紫光祿大夫檢校尚書左僕射同中書門下平章事兼成都府上柱國鄒平郡開國公食邑三千戶假文昌記新修龍興觀記崔雄兹觀隳圯綿歷嵗時垣墉扉戶傾危隤敗十無一二荒榛蔓草扶踈蔽絶唯天尊殿略存雄仰躅真宗佩受玄籙有年矣昨到郡蒞事三日謁先師廟朝紫薇宫回車抵觀荒涼擁穢不可以前乃命鏟荆棘闢壞門芟夷藴崇剃披蒙塞景移方就一徑及升殿啓伏禮真聖周環步榻僅不容足雖仙像儼羅其為鳥鼠攻毁殘穢不堪具紀於戲有以見淡薄無為之教也我國家老氏之枝葉况又玄宗皇帝金真居于殿內凡曰臣下得不展敬乃亟工度木搆新替壞率皆完葺築壇植柏森列左右不十旬而功就於是虹梁鴛瓦粉繪丹雘煥乎炳奕周匝垣宇真丹臺碧洞神仙之宅恍若上清之靈圃也凡一畚土一酌水率皆微俸薄祿傭功物價靡敢虧於時值然後命道侣分掌啓閉修灑掃撞鍾擊磬以時醮奠而城隅跬步瞰郭倚山下臨巨川東注渤溟青山白日目極煙樹實一郡之勝槩矣將來好事君子得不繼其闕歟大唐咸通二年嵗次辛巳秋七一作九月刻道士劉宏山院壁記李觀新定劉法師大漢之遐裔也老氏間氣性識沖厚體貌魁岸弱齡味道雄莭邁古淮海勝景無不逰覽集作綿歷內藴研精茹术歷載三紀雖形存方內而神汨集無此十八字太素天機不淺積學所運也可與董奉抵掌葛洪拍肩先生以至德三年束身制度配住兹觀巋然端居煙霞排空松桂滿目抗出塵之想秉超世之操無何大厯之初緑林狂寇作禍斯邑居人萬戶冰裂瓦解曝骸骨於郊野注膏血於丘壑桃源化為戰地羽客倐以蓬轉先生乃披霓裳丹訣將適南嶽途經鄱陽先相國第五琦時左遷鄱陽守其人廊廟之柱石帝王之股肱波澄萬頃壁立千仞先生於是植杖而請謁一見而斂袵再見而倒屐忘言相契志集作率意偶合于時先生法集作迹播南楚聲動人羣一作八郡故江西連帥路嗣恭其人寥廓之徑翮銛鋼之利器忠信亞前史文武表前代雖受年不永可與三傑並駕復雅重黃白一作老尊崇虛無始聞先生望風委質先訊集作許以簡禮後聘以車乘一作復躬以迎奉服門人之禮約方外之友如是未幾路公歸朝先生泛若不繫之舟集無此二字亦厭凡境大厯十三一作一年旋此舊迹未盈數嵗陵谷殊狀親戚耆宿淪喪略盡所止堂宇荆棘生焉閴其儀像埃塵磨滅寒葉一作猿墜於灌木山鬼聚於叢薄先生頓一作對非足而四顧攬涕而興嘆惜馳光集作騖於過隙念往事於餘燼乃假村閭丁壯戮力芟剪枝築頽址掃除崩榛構長廡以梓集作柯漆飾危殿以頳素激引玄旨招攜道流先生乃於其觀西南隅獨立髙堂智者與議良工操斧馮山建基鑿石開戶墾磽確以植靈草撥崢嶸以樹修竹苔駁竹徑風吟步虛巖收集作生夏雲林散秋色先生方據梧長一作清嘯煮茗留客且我所貴者隱隱者道道以隱而含耀隱以道而無悶玩是幽處得非仙府不必瀛州方丈乃為絶境先生自然以得真依真以養生蕭灑無事機悟集無此字恬淡曽集無此字無戚容髙談能離堅放意能了空噫嚱集作嘻老莊之微言先生決之如叩鐘人間榮位與多財先生視之如浮雲是以天子不得臣諸侯不得屈或所與遇者其唯縱古之士遁俗之人在乎昔玄宗之有天下得道之統垂五十載億一作黎庶輯睦四夷亦寧自後國家集無此二字多故皇帝旰食二教消弭兵符競趣深慮是法不可振兹二教者三界之根柢羣生之雨露使匹夫取捨亦有損益用之於上其可廢乎竊悲大塊勞我以聲色要我以名利未果握先生之手入先生之堂然不死之術願與共有臨壁抽思以旌善人某年月日記尊像下泊宫三茅君素像記王師簡太上立德立言以𢎞其教生人活國其用不極繇乎恬淡一作漠者則詣真理乘化出入人紀罔窮廣成枉軒皇之尊關令闡玄元之訓冥搜虛極呼吸日月上賔之軒代有其人茅真君伯氏仲氏虔奉玄樞退然若喪脫履萬類騰迹三清學宗其門者綿代不絶時謂朝山之月肩駕擊轂白鶴紫氣必應其晨或者詭説則曰真君長往亦以綰吳越司命籍人寰生死吾不知故闕書且嘗遺一畝之宫于山之陽去而復返其號不泊之一有不字治榛蕪積焉遊者憮然則有東周黍離殷墟麥秀之嘆矧靈仙何處哉我河東廣平公一作我河東公華廉平此藩吏之師法實奉黃老以根政源嘗謂開元承平之代上奉無為以宅清靜一作淨玄門垂祐有國有家者屬焉繇是捨俸入之錢以宏其棟宇置真君之像唯肖其儀形設雲幄於兩楹分玊座而鼎足以嚴其觀雙侍童衛焉以備其教龍虎君君字一作左右端翊焉升其堂塗稽首拜手忽若前後左右旄一作旌節羽衛從諸天行揖其冰容以敬以肅則若美其目口一作美目甚口流涕發論破人昏惑往真之迹將墜復振此教之演翳事而𢎞深其率教者曰興廢繼絶則由乎人蒙福獲祉必感乎至公恆以黃籙法會元辰修畢仍嵗必緝敷紫陽玉真當負扆而頒命列陪位而贊拜罄雜天籟宵列如星奉章上玄昭啓昊帝蓋所以保和封內儲慶皇家門閥之祥我事丘禱至哉賢侯之業也粵元和甲午嵗十二月二日新宫始成無傷物力公之宇內百姓不知有嚴有翼如合造化道士孫智清玄門龜龍以標儀矩受成事指顧而叶焉乃欲章明靈迹延耀丕業請介一作令於戎政者撰而刋之師簡諗于良畫故不敢沒其美云童子黃仙師瞿童記符載朗州桃源桃花觀南嶽黃洞元居焉有弟子姓瞿字伯庭年十四太和未散嗜欲不入傲然懷厭世之志大厯四年庚寅嵗自辰溪來稽首宇下願蔭道域厠役𨽻之末位仙師以慈物軫慮遂許之雖處童一作丱孺給侍甚謹在醜不弄率性恭默每旦暮仙師修朝拜之禮攝齋莊之色焚香捶磬叩頭擎跽如臨君父如是者積二三嵗不衰矣或往往獨行入溪洞中根究深處信宿方返仙師讓之輒云偶造佳地遭遇神聖覩雲一作風氣草木屋宇飲食使人淡然忘情不樂故處因求願偕往仙師曰靈仙之府必在左右然尚幼小謂所至之地不即爾也無何有丹砂之役後領至襄陽市闤闠之下齊人浩擾則瞑目不視神氣醉泥返至逆旅通宵而後醒問其故捧手對曰太朴散壞者久矣今之人圓冠方屨以詐相尚以利相市余所不堪方大駭其説不敢以常僕僕之其後數以前事請仙師亦有意將逝屬暑雨壞道不得果去八年癸丑夏五月甲辰晦正衣服拜訣於戶外自言靈期逼近難可留止請自是往至日月合於鶉首復近於兹地焉仙師少加撫愛未即聽遣室有同學道士朱靈辦者恐童子精神懾懦為妖邪所攻將欲顧丹筆符而禦之瞿不懌且多傲詞云則他辰之相見嵗在降婁矣庭際有大栗樹逺人不過數仞遂背行冉冉從樹旁滅沒化去有聲隆然如風飄雷震衆以為事出言一作無妄怪愕失次馳告鄰落共四圍而索之千崖沉沉漠然無聲洞西行一二里有巨蛇威猛甚盛自道中拖腹橫據勢不得近次至于東隅見右足八指羅印於地上一無此字折弱篠八枝縱橫插植若志冥驗之數餘不復覩先是未潛景之日割芝圃間獲珉石圓一作圍大如五銖錢朗瑩可愛跪而授師曰此秦客棄棊子也幸加祕護後有符契仙師靈辦狀之不昧惜向時之無斷俯然發篋復覩故物其慙愧慕望者可勝言哉後經時曽白晝假寢輒勿罔而至備申摳衣之敬諗其容態但以承事尊上為疲耳至於日者之約無替焉仙師以建中元年自武陵卜居於廬山紫霄峰下古壇石室髙駕皓氣載弱嵗慕道數獲踐履其域話精徴一作微之際得與聞此太息良久自感悟曰神逺人乎哉道逺人乎哉夫瞿氏之子受天之氣生人之世百骸六臟非有乎卓然異色也以一誠之志唯巖洞是慕彼秦人之宅尚得而往况仙師遁栖空山垂二十年根之以渾元守之以太和遺肢體冥耳目息歸於踵神舍于素窈窈冥冥中含至精方將入天地之門遊化初之原磅礴萬物不見其朕豈鸞鶴之馭而滿其道歟門人先往而師資尚淹留塵世天其意者以時人溺於羶腥汨亂正氣多札瘥天昏之患使布隂德太疑作大拯生命符三千之數耶弟子風波一作流之民不能自拔泥淖繼芳金籍徒以區區文字紀其糟粕不亦悲夫然庶示於好事者共為起豫之地耳貞元元年八月二十日符載記文苑英華卷八百二十二
