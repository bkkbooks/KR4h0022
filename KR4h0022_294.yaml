body:
  text: 文苑英華卷二百九十四宋李昉等編行邁六李紳二首姚合一首袁不約一首朱慶餘一首于武陵六首賈島四首釋無可一首劉得仁一首溫庭筠四首方干四首李洞二首杜牧六首許渾六首雍陶二首李商隱三首薛逢一首姚鵠一首項斯一首趙嘏七首馬戴八首顧非熊三首薛能五首李羣玉一首張祜三首過鍾陵余長慶三年除江西觀察使奉詔不之任李紳龍沙江尾抱鍾陵水郭津橋晚景澄江對楚山千里月村連漁浦萬家燈省拋雙斾辭榮寵遽落丹霄起愛憎惆悵舊逰同草露却思恩顧一沾膺初出淝口入淮前人東風五日雪初晴淝口氷開好濯纓野老擁途知意重病夫拋郡喜身輕人心莫厭如弦直淮水長憐似鏡清回首夕嵐山翠逺楚郊煙樹隱襄一作憶層城客行姚合客行無定處多在路岐間馬是賖來貴僮緣借得頑詩書愁觸雨店舍喜逢山舊業嵩山下三年不得還離家袁不約步步逺晨昏悽心出里集作獨出門見烏唯有淚看集作問鴈更傷魂宿酒寧辭集作添愁醉回書諱苦言野人應怪笑不解愛田集作樂丘園嶺南路朱慶餘越嶺向南風景異人人傳說到京城經冬來往不踏雪盡在刺桐花上行南逰于武陵窮秋幾日雨處處生蒼苔舊國寄書後凉天逢鴈來露繁山草濕洲暖水花開去盡同行客一帆猶未回南逰有感前人杜陵無厚業不得駐車輪重到曾逰處多非舊主人東風千里樹西日一洲蘋又渡湘江水湘江水復春西歸前人不繫與舟間悠悠吳楚間羞將新白髮却到舊青山一葉忽離樹幾人同入關長安有家住秋至又西還早春山行前人江草暖初緑鴈行皆北飛異鄉那久客野鳥尚思歸十載過如夢素心應已違行行家漸逺更苦得書稀客中前人楚人歌竹枝逰子淚沾衣異國久為客寒宵頻夢歸一封書未返千樹葉皆飛南過洞庭水更應消息稀夜泊湘江前人北風吹楚樹此地獨先秋何事屈原恨不隨湘水流凉天生半月竟夕伴孤舟一作南行客無成空白頭旅逰賈島此心非一事書札若為傳舊國别多日故人無少年空巢霜葉落踈牖水螢穿留得林僧宿中宵坐默然以下四篇並見集本早行前人早起赴前程鄰雞尚未鳴主人燈下别羸馬暗中行踏石新霜滑穿林宿鳥驚逺山鍾動後曙色漸分明巴興作前人三年未省聞鴻呌臘月何曾見草枯寒暑氣均思白社星辰位正憶皇都蘇卿持節終還漢葛相行師自渡瀘鄉味朔山林果别北歸期掛海帆孤上谷旅逰前人世難那堪恨旅逰龍鍾更是對窮秋故園千里數行淚鄰杵一聲終夜愁月到寒忩空皛晧風翻落葉更颼飀此心不向常人說倚識平津萬户侯竹溪水晚次神灘阻風釋無可驚風山半集作半山起舟子忽停橈岸荻吹先亂灘波落更跳闕今欲暮過島忽明朝若盡平生趣東浮看石橋早行劉得仁萬類半已動此心寧自安月沉平野盡星隱曙空殘馬渡橫流廣人行湛露寒還思猶夢者不信早行難商山早行溫庭筠晨起動征鐸客行悲故鄉雞聲茅店月人跡板橋霜槲葉落山路枳花明驛檣因思杜陵夢鳬鴈滿回塘利州南渡前人淡然空水帶斜暉曲島蒼茫接翠微坡上馬嘶看棹去栁邉人歇待船歸數叢沙草羣鷗散萬頃江田一鷺飛誰解乘舟尋范蠡五湖煙水獨忘機經集作過五丈原前人鐡馬雲鵰共集作鵰久絶塵栁隂高壓漢宫集作營春天清殺氣屯關右夜半妖星照渭濵下國卧龍空寤主中原得集作逐鹿不由人象床錦集作空帳無言語從此譙周是老集作舊臣過分水嶺前人溪水無情似有情入山三日得同行嶺頭便是分流處惜别潺湲一夜聲旅次錢塘方干此地是鄉國堪為終日集作朝夕吟雲藏吳相廟樹引越山禽潮去集作落海人散鍾遲秋寺深我來無舊識誰見寂寥心金州客舍前人卷箔雲集作羣峯暮蕭條未掩關江流嶓冡雨帆集作路入漢隂集作家山落葉欹眠後孤砧倚望間此情偏耐醉難遣酒罍閒東陽道中作前人百花香氣傍行人花底垂鞭日易曛野火不知寒食節穿林轉壑自燒雲蜀中前人逰子去逰多不歸春風酒味勝餘時間來已伴巴兒醉豆蔲花邉唱竹枝河陽道中李洞衝風仍躡凍提轡手頻呵得事應須早愁人不在多雪田平入塞煙郭曲隨河翻憶江濤裏船中睡蓋蓑蕃冦侵逼南陽道中前人雲陽三萬騎南赴疾飛鷹回磧星低鴈孤城月伴僧敲關通漢節傾府守河氷無處論邉事歸溪夜結罾途中作杜牧緑樹南陽道千峯勢逺隨碧溪風慢集作淡態芳樹雨隂姿野渡雲初暖征人袖半垂殘花不一醉行樂是何時泊秦淮前人煙籠寒水月籠沙夜泊秦淮近酒家商女不知亡國恨隔江猶唱後庭花秋浦途中前人蕭蕭山路窮秋雨淅淅江風一片蒲為問寒沙新到鴈來時還在杜陵無汴河阻風絶句前人千里長河初凍時玉琦瑶珮響參差浮生一似氷底水日夜東流人不知春盡途中前人田園不事來逰宦故國誰交爾别離獨倚關亭還把酒一年春盡送春時自宣城赴官上京前人瀟灑江湖十過秋酒杯無日不封侯集作遲留謝公城畔溪驚夢蘇小門前栁拂頭千里雲山何處好幾人襟韻一生休塵冠掛却知間事終把蹉跎訪舊逰南逰泊松江渡許渾漠漠故宫地月凉風露幽雞鳴荒戍曉鴈過古城秋楊栁北歸路蒹葭南渡舟去鄉今已逺更上望京樓洛陽道中前人洛陽多舊迹一日幾堪愁風起林花晚月明陵樹秋興亡不可問自古水東流晚泊七里灘前人天晚日沉沉歸舟繫栁隂江村平見寺山郭逺聞砧樹密猿聲響波澄鴈影深榮華暫時事誰識子陵心晚集作曉發鄞江渡寄韓欣集作崔韓二先輩前人南北信多岐生涯半别離地窮山盡處江泛月集作水寒時霧曉集作霧晚蒹葭重霜晴橘柚垂無勞促回棹千里有歸集作心期曉發天井關寄李師晦前人山在水㴞㴞流年欲二毛湘潭歸夢逺燕趙客程勞露曉紅蘭重雲晴碧樹高逢秋正多感萬里别同袍早發洛中次甘水前人帶月飯行侣西逰關塞長晨雞鳴逺戍宿鴈起寒塘雪集作雲卷四山雪霜集作風凝千樹霜停驂一回首隱隱見嵩陽蜀路倦行因有所感雍陶亂峯碎石金牛路過客應騎鐡馬行白日欲斜催後乘青雲何處問前程飛蠅一一皆先去度鳥雙雙亦逺鳴蹇步不惟傷旅思此中兼見宦途情到蜀後記途中經歷前人劒峯重疊雪雲漫憶昨來時處處難大散嶺頭春足雨褒斜谷裏夏猶寒蜀門去國三千里巴路登山八十盤自到成都燒酒熟不思身更入長安昭州李商隱桂水春猶早昭州日正西虎當官渡集作路鬬猿上驛樓啼繩爛金沙井松乾乳洞梯鄉音呼集作吁可駭仍有酒集作醉如泥商於前人商於朝雨霽歸路有秋光背塢猿收果投巖麝退香建瓴真得勢橫㦸豈能當割地張儀詐謀身綺季長清渠州外月黃葉廟前霜今日看雲意依依入帝鄉東還前人自有仙才自不知十年長夢採華芝秋風動地黃雲暮歸去嵩陽尋舊師曉發姚鵠旅行宜早發况復是南歸月影緣山盡鍾聲隔水微殘星螢共失落葉鳥和飛去去渡南曉村中人出稀曉發昭應項斯行人見雪愁初作帝京逰野店開偏早鄉魂去未收燭殘催卷席手冷怕梳頭是物寒無色湯泉秪自流經無錫縣醉後吟趙嘏客過無名姓扁舟繫栁隂窮秋南國淚殘日故鄉心京洛衣塵在江湖酒病深何須覔陶令乘醉自橫琴東歸道中二首前人平生事行役今日始知非嵗月老將至江湖春未歸傳家有天爵主祭用儒衣何必勞知已無名亦息機二未明喚僮僕江上憶殘春風雨落花夜山川驅馬人星星一鏡髮草草百年身此日念前事滄洲情更親旅次商山前人役役依山水何曾似問津斷崖如避馬芳樹欲留人日夕猿鳥伴古今京路塵一枝甘已失辜負故園春集作惆悵故園春發剡中武德中置嵊州前人正懷有謝俯長流更覽餘封識嵊州樹色老依官舍晚溪聲凉傍客衣秋南巖氣爽橫郛郭天姥雲晴拂寺樓日暮不堪還上馬蓼花風起路悠悠江上絶句詩選作西江晚泊前人茫茫靄靄失西東栁浦桑村處處同戍鼓一聲帆影盡水禽飛起夕陽中度商山晚靜集作净前人和如春暖靜如秋五月商山是勝逰當晝火雲生不得一溪分作萬重流夕發邠寧寄舒從事闕半酬走白馬又𤣥集作飲酬走馬别馬戴半酣走白馬别後鎖邉城日落月未上烏棲人獨行方馳故國戀復愴長年情入夜不能息何當間此生夜下前篇作入湘中已見一百六十四卷前人入夜别前篇作人夜到鳴棹下前篇作孤棹入嘶鴻前篇作鳴鴻行值前篇作行抵客行前人路岐長不盡客恨杳難通蘆葉晚汀雨栁花南浦風亂鍾鳴鳥一作嘶馬急殘日半帆紅却羡漁樵侣間歌溪谷中旅次夏州前人嘶鴻發相國行次夏王臺鎖郡雲隂暮鳴笳燒色來霜繁邉上宿鬢改磧中回悵望湖沙曉驚蓬朔吹催夕次淮口前人天涯孤光盡木末羣鳥還夜久逰子息月明岐路間風生淮水上帆落楚雲間此意竟誰見行行悲故關早登故山作前人雲門夾峭石石路䕃長松谷響猿相應山深水復重餐霞人不見採藥客猶逢獨宿靈潭側時聞嶽頂鍾江行前人吳楚半秋色渡江逢葦花雲深帆影盡一作落風逼鴈一作鳥行斜赤燒開峯翠一作夕照開峯翠寒潮蕩一作漾浦沙余將何住海一作自將何所往孤嶠擬一作海嶠欲營家早發故園前人論别在中夜登車離故鄉曙鍾寒出嶽殘月􅒯凝霜風篠條多折沙雲氣盡黃行逢海西鴈零落不成行經杭州顧非熊郡郭繞江濆人家近白雲晚濤臨檻看夜櫓隔城聞浦轉山初盡虹斜雨未一作半分有誰知我意心緒逐鷗羣秋日陜州道中作前人孤客秋風裏驅車出陜西關河午時路村落一聲雞樹勢標秦逺天形到嶽低誰知我名姓來往自凄凄經河中前人一望蒲城路關河氣象雄樓臺山色裏楊栁水聲中思起懷吳客行斜向磧鴻我來尋古跡唯見舜祠一作遺風分水嶺望寶集作靈峯作薛能勞集作干尋萬仞峯靈寶號何從盛立同吾道貪程阻聖蹤嶺竒應有藥壁峭盡無松那得休於市集作是蹉跎亦卧龍初發嘉州寓題前人勞我是犍為南征又北移唯聞杜䳌夜不見海棠時在暗曾無負含靈合見集作有知州人若愛樹莫損召南詩彭門道中作前人嗚嗚吹角二師營日落身間笑傲行盡覺文章尊萬事却嫌官職剩雙旌終休未擬降低屈遇便還須致太平頻向水樓誰㑹我泗濵浮磬好同聲將赴鎮過太康縣有作前人才入東郊便太康自聽何暮豈龔黃晴村透日桑榆影晚露濕秋禾黍香十萬旌旗移巨鎮二三輗軏負孤莊時人欲識征東將看取攙搶落大荒褒斜道中作前人十驛褒斜到處慵眼前常似接靈蹤江遙放詩選作定入傍來水山豁猶藏向後峯鳥徑惡時應立虎畬田間日自燒松行吟却誚公車使集作役夜發星馳半不逢雲安李羣玉灘惡黃牛吼城孤白帝秋水寒巴字急歌逈竹枝愁樹暗荆王館雲昏蜀客舟瑶姬不可見行雨在高丘旅次石頭岸張祜行行石頭岸身事兩相違舊國日邉逺故人江上稀水聲寒不盡山色暮相依惆悵未成語數行鴉又飛將之衡陽道中作前人萬里南方去孤舟泛自一作自貶身長年無愛物深話少情人醉卧襟長散間書字不真衡陽路猶逺獨與鴈為賔江上旅泊集作江南楚塞南行久秦城北望遙少年花已過衰病栁先雕客淚收回日鄉心寄落潮殷勤問春鴈何處是煙霄文苑英華卷二百九十四
