body:
  text: 文苑英華卷二十八宋李昉等編地類四華山賦二首掌上蓮峯賦一首華山仙掌賦一首仙掌賦二首晨光麗仙掌賦一首巨靈擘太華賦一首謁華山嶽廟賦一首華山賦并序楊敬之臣有意諷賦久不得發偶出東門三百里抵華嶽宿于趾下明日試望其形容則縮然懼紛然樂蹙然憂歊然嬉快然欲追雲將浴乎天河浩然毁衣裳晞髮而悲歌怯欲深藏果欲必行熱若宅爐寒若室氷薰然以和怫然不平三復晦明以搖其精萬態既窮乃還其真形骸以安百鈞去背然後知身之治而見其難焉於是既留無成辭以長歎翛然一人下于崖金玉其聲霜雪其顔傳則有之代無其鄰姑射之神蒙莊云始不敢視然得與言粲然笑曰用若之求周大物用若之智窮無端三四日得無顛倒反側於胸中乎是非操其心而自别者耶雖然喜若之専而教若之聼無多傳嶽之初成二儀氣糊一作凝其間小積焉為丘大積焉為山山之大者曰一作為嶽嶽其數五豫尸其一焉嶽之尊燭日月居乾坤諸山並馳附麗其根渾渾河流從禹以來一作從南而來自北而奔姑射九嵕荆巫梁岷道一有之字之云逺兮徒遙而賔嶽之形物類無儀二字一作不可階其上無齊其傍無依舉之千仞不為崇抑之千仞不為卑天雨初霽三峯相差虹霓出其中來飲河濵一作湄特立無朋似乎賢人守位北面似乎二字作而一為臣望之如雲就之如天仰不見其巔肅何芊芊蟠五百里當諸侯田嶽之作鬼神反覆蛟龍不敢伏若嵗大旱鞭之撲之走之馳之甘雨瀾一作爛漫百川東逝千里而散噫氣蹶不一作然怒乎幽巖漸於聞一作漸于人間其聲瀏瀏嶽之殊巧説不一有可字窮見于一作乎中天挲挲而掌峩峩而蓮起者似人伏者似獸坳者似池窪者似臼欹者似辨呀者似口突者似匱一作距翼者似抱文乎文質乎質動乎動息乎息鳴乎鳴默乎默上上下下千品萬類似是而非似非而是其無一作乃繕人事吾焉一作安得畢議議豫二字作今作帝耳目相其聰眀下矚九州在宥羣生初太易時其人俞俞其主人者始乎容成卒乎神農中間數十君姓氏可稱其徒以飲食為事未有仁義時哉時哉又何一作曷足涖是後敬乎天成乎人者必闢其心假其神與之齡降其人故黃一作軒轅有盛德蚩尤為賊生物不遂帝乃一作軒轅用力大事不可獨治降以后牧三人有心烈火就撲其子之子其孫之孫咸明且仁雖德之衰物其所一作處宜繇夏以降湯發仁以王癸受暴以亡太一作甲戊誦釗不敢有加唯遵一作道其常享國遂長天事著矣莫見乎髙而謂其茫茫豫受帝命億有萬嵗而不敢怠遑臣贊之曰若此古矣祖矣大矣異一作廣矣富矣庶矣駭矣怖矣上古之事粗知之矣而神之言又聞之矣然神起居於上宫室於下一作上如此而一作之久矣其所見何如也曰見若咫尺田千畝矣見若環堵城千雉矣見若杯水池百里矣見若蟻垤臺九層矣醯雞往來周東西矣蠛蠓紛紜一作紛秦速亡矣蜂巢一作窠聫聫起阿房矣俄而復然立建章矣小星奕奕焚咸陽矣纍纍繭栗祖龍藏矣其下千載更改興壞悲愁辛苦循其上矣臣又問云一作曰古有封禪今讀書者云得其傳云一有失其傳三字語言棼一作紛綸於神何如也曰若一有知之乎三字聞聖人撫天下一有哀天下三字既信於天下則因山嶽而質于天不敢多物若秦皇漢武則率海內以奉祭祀圖福其身一作已故廟祠相望壇墠迤邐盛氣臭夸金玉聚薪以燔積灰以一作如封天下怠矣然猶歉歉一作慊慊不足秦由是替一作剃漢由是弱眀天子得賢者在位能者在職廟堂之上垂衣裳而已一有於字封禪存可也亡可也第二并序逹奚珣太華之山削成四面方直者五千餘仞蓋嶽之雄也往因行邁望之不及今來何幸作尉于茲因而賦之以歌厥美華山惟嶽羣嶽之雄天開厥狀神致其功昔與襄山連岡不絶河水長注橫流曲折神元再造拓崖而兩分仙掌常存倚天而迥列其後多厯年所至于夏王窮地絡正乾綱緑甲之功既就玄圭之業有光定我祀典因為舊章同夫三事偉哉煌煌徒觀其倚伏而起削成而峻作秦塞之髙標為豫州之巨鎮其南接楚其北臨晉嶔乎數都之間豈惟直上者五千餘仭逺疑將適近若將騰氤氲緑潤霮䨴青凝發地壁立連天石稜披重霄而自致與元氣而相陵旁望羣山兮盡為幽側猶夫南面兮用資峻極巍巍乎掩夏雲之竒峯蒼蒼然合秋天之正色近壓關輔載樞京國此其所以為嶽者也若乃人寰不逺勝氣常清石含古色泉落秋聲懸一作層巖蔽虧謂乾坤之闔闢洞壑幽邃泛雷雨之滿盈恍恍乎又似龍虎潛伏鬼神含精伊彼崇林望之盡目參灝氣而森秀侔斷山之遙矗仙草殊品靈花異族不以無人而不芳香風麗乎函谷皆負靈造是潤是黷具物靈繁故難詳鞫蕭條世俗髣佛神仙玉女眀祠星壇尚在羊公舊室石榻常穿霧雨迷處雲臺巍然則知大象所存何有於古列真攸萃寧獨於先國家南正司天北正司地人神不擾方嶽定位森森象設之若生憺憺威稜而可畏宗伯制禮巫咸視事殺氣每登騂剛必備蓋所謂敬而無黷厲夫精意此則邦之禮物也受命如響依人而榮攸歆盛德載答嘉生不愆旬時作為雲雨白漿既挹黃玉斯覩隤止如山永康中土此則神之叶贊也初披山嶽非無壯麗或隱峯於羣嶺或結根於荒裔空聞象外之談何貴人間之世而我直兩都之大道當三條之正中偏近日月髙謝紛濛通天之氣成天之功鑾輅常幸聲眀有融能事無爽揚言莫窮舉天下而爭長故難可比而崇掌上蓮峯賦以題為韻吕令問衆山邐迤曽何足仰未若太華崒為之長削成三峯壁立千丈伊昔太虛結而為山伊昔巨靈拓而為掌擘開元象崛起原疑作厚壤當少隂而德合秋成據丁酉而氣涵金爽深沉其色菡蓞其狀雲霞不映而其勢彌雄塵露將禆而其髙靡讓掌形仙跖石容天壯雖造次於自然若鐫磨於意匠晦夕霧而羣峯乍隱煦朝陽而衆壑相向繇是考圖籍髙為四嶽之先眄靈竒勢出九天之上若乃雲搖羽蓋鶴挂飛泉危峯並吐巨掌髙懸異蓬萊之鼇泛海若崑崙之柱承天清露降零小為盤而仰漢陽烏假道疑覆日之孤蓮不但子先之霓裳時見羊公之石榻仍全况乎運啓皇家應河源而降望豈比詩歌周德美嵩甫之生賢者哉既而嵐氣霽媚煙光晚濃林巒一色嵒崿千重想清虛而可覩歎攀陟兮無從歌曰苔至滑兮石無蹤道不可得仙不可逢儻賜一丸生羽翼願輕舉於三峯華山仙掌賦以化作有端遙存麗壯為韻尹樞覽削成之峯見靈掌之狀拓迹崇岫據竒疊嶂迢亭上竦赫奕東向髙蹤可覿猶存二華之間纎指遙臨逺跖重霄之上爾其依峭壁據叢巒排物外撫雲端羽客遐指都人竦觀據開闢之殊致若騰陵而上干惟昔巨靈啓斯太華拓崇崇而喬嶽西靡決浩浩而洪流東下故能遵八川安萬化幹厚土存中夏薑嫄歆於帝武迹可相倫伯禹遵於龍門功亦齊霸厥道可遵厥狀斯存仰摧天漢遙臨國門蓮萼髙生如將搴擷桂枝傍倚狀欲攀援試冥搜於玄造諒遺迹於坤元若乃傍攀冥濛上指寥落右倚岑嶺左臨絶壑紛詭狀之無朕諒神功之有作星壇未沒必俟於捧持石鼓常鳴庸非其拊搏揖之永久斯為不朽嗟列嶽之所無小終南之何有喻天地唯資於一物拯沉溺豈藉於煩手常抗迹於介丘乃遺芳於崇阜依乎泬寥揭彼嶕嶢聳昈昈於千仭擢纎纎於九霄折若華於暮景捧麗日於晴朝既瞻眺之無斁望提携之匪遙共仰瓌姿徒懷壯麗如排霧氛似拂昏曀遐窺巨迹猶存體物之辭迥瞰崇朝暫寫凌雲之勢仙掌賦以指掌極瞻峩然秋碧為韻喻餗行盡煙蘿仙峯隱嶙兮髙掌巍峩無得而踰扼金方之險固不言而信指秦地之山河觀其贔屭削成崟岑逺跖斡開元氣剖破凝碧五千餘仞兮似假扶持百二之都兮如能指畫每勞瞻望徂秦適洛之人誰可攀援駕鶴驂鸞之客勢比捫天形標一拳旁臨而靄靄無際直上而巉巉克全稍謂動搖帶晨光而耀若如同拊擊聞石鼓以轟然可以引羣生麾八極孤標承露之狀想蓄拔山之力霽雨飛盡見毛女同掌上之人嵐岫叢分封蓮峯為握中之色勢孤聳於巖巖形不類於纎纎拆煙霧以斯出控關防而可瞻夕清而丹桂輪低疑將禠佩晝短而六龍駕逸似欲攀髯拏攫難窮規模酷似莓苔剝緑以盈握葛藟駢青而繞指因罅裂以文成偶嵌空而脈起齊大道之悠久挈坤維之綱紀有客西逰時當凜秋始憑軾以遐睇惟攀雲而寫憂吾聞太華中立黃河西流有巨靈兮受天之命擘竒峯兮裂帛斯柔故得一帶東引致洪濤而直注千尋西峙標異迹以長留况乃豫鎮稱雄秦城是仰沉潛之右臂斯見示化之前蹤可賞豈非大壯皇都制遐荒而示諸掌第二以白帝西下黃河北來為韻房元洛造化巍巍表迹西夏蓄巨靈之贔屭擇雄峯以照寫迥抗羣嶽旁臨九野誰謂河廣我則視之於掌中誰謂山髙我則數之於指下駭乎哉當其清濁未判兆朕未彰孰謂真宰廓此殊常奠峻崿之蔥翠分靈掌之玄黃直指無虧受金莖之徑質如山不動合仁義於聖王爾其雲散天澄煙消雨霽旭日暉映隂崖虧蔽狀若拍紅霞之霏微捧青霄之搖曳察其迹也雖見於東峯混其嶽焉是配於秋帝及乎蓐收謝玄冥格日彩寒霜氣白上捫星漢左控虞虢南聳羣嶺北臨廣陌將招泛槎之仙如指迷途之客至其嵐翠朝鬱輕雲夕過桂影依稀而流照松風髣佛而扇和時也靄靄溶溶疑掩氷紈之被蒼蒼羃羃如揮舞袖之羅功洽於人則擘太華扳長河俾安流而不極遹徂東而自北千古獲其永賴兆庶階於夀域同彼補天之功陋其拔山之力然而山匪我開功匪我裁班形今古任質徘徊人之睹也因似而生意靈之契也曷究其從來風物已凄我來自西駭髙掌之隱嶙思元化之端倪願稅駕以攀覽庶登路而見携晨光麗仙掌賦以有如攀青天捧白日為韻潘存實晴天既曙峻嶽凝青仰熙熙之旭將吐見髙髙之掌呈形假彼晶光庶有分於清濁挺茲秀異示無雙於杳冥燠矣而升岧然相射浮艷華之爛爛靡太虛之奕奕寫乾坤之麗色先覺曈曨廓煙霧之餘姿轉見眀白疑參若木似坼芙蕖杲杲之容漸積慘慘之狀不如下映而千巖共曉上照而丹霞共舒影曜人間每當曕曕之早迹居物外長承煦煦之初昭昭以臨峩峩莫匹向空凝彩若月下之對金莖繞指流輝異樓上之呈素質既炫晃之旁逹亦孤標而獨出幸當清淨之晨免敵沉隂之日佳氣或爍朝雲不還發明媚於紫霄之際擎彩翠於碧落之間自彰和朗寧俟躋攀遙揮六龍迥臨萬有初分焜耀訝髣佛以成文俯掬清光信爛漫而入手則知事不自妍理資相鮮因流光德獲照金天想清風旁來宛其穆若視晴景中駐何愧拳然故得無私功博潤色道全當八極洞開之次眀二儀交泰之先豈獨擘洪濛而干造化設形象以配神仙而已哉於是靈蹤長聳日華長捧不然何羣山邐迤而相奉巨靈擘太華賦以神力所作開山導河為韻關圖太華崔嵬伊巨靈兮其壯哉挺髙掌以遐舉擘孤峯而洞開功侔造化勢越風雷劃千仞之巖巒屹從地裂決九河之波浪杳自天來昔者混茫是生磅礴惟神無朕配天有作念彼流之未通顧茲山之可却將以闢迢遞正嶄鑿愜心而再定川原應手而别開林壑靈意將伸雄稜益振蓄怒贔屭注情嶙峋謂釣鼇不足以駭人鞭石不足以騁神指揮而疊嶂知改盼睞而三峯可新然後攘臂效能端身任力捫蒼靄以天半折翠微於月側若百神將萃而潛動二儀欲判而未息嵐光兩向猶連松柏之聲黛影中開已斷雲霞之色豈不以閟形幽默拓迹巍峩致用而扶持天地程功而變化山河分積翠於空中千年軋漢啓通津於指下萬里騰波豁丹崖於天阻呀峭壁而相距勢且異於兩傷力自𢎞於一舉截仙子幽棲之洞壯王者建都之所蓋以神開夀域靈固人寰廓峻極於倐忽標削成而險難超大禹之理水小愚公之移山竹箭波中路竟深於導逹蓮花峯外迹終寄於躋攀是知事冠杳冥理歸玄奧石有時而分裂水有時而疏導信乎宰物者之使然非人情之所到謁華山嶽廟賦姚幹沐蘭湯兮同之子采白蘋於南澗羞府君之眀祀祠肅肅兮山之下神萃萃兮凛千古辛夷楣兮藥殿房載雲旗兮駕虬虎淡閟宫之瀏侐紛進拜於軒宇靈連蜷兮既留豫蹁一作扁蹮而屢舞願馨香而嘉薦豈神祗之或吐精享既周厯勝飛眸東拓巨靈之掌北控長河之流殷其雷也寧示口於贔屭成其物也配祀典於清秋豈徒三峯峻秀四面若削扇萬壑以雲騰飛長天而雨落將有開之必先實明神之攸作則神也無私正直自持禍淫福善幽鑒無遺余總角之年每専精於書圃洎乎既冠之日亦切磋於文詞謂一飛之摩昊胡十上之逰悲聞至誠之必應何功名之太遲豈媚竈而先獲寧守道之後時神乎神乎莫使心疑我后之文思望賢如調飢礪乃鋒刃以俟鹿鳴之時收片玉於宗伯兾神兮無我欺文苑英華卷二十八
