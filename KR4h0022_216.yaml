body:
  text: 文苑英華卷二百十六宋李昉等編人事三宴集五十六首九日陪樊尚書龍山宴集楊衡孟嘉從宴地千乘復登臨緣危陟髙步慿曠寫幽襟黃花玩初馥翠物喜盈斟雲雜組繡色樂和山水音斾搖秋吹急筵卷夕光沉都人瞻騎火猶知隔寺深上已日陪齊相公花樓宴盧綸鍾陵暮春月飛觀延羣英晨霞耀中軒滿席羅金瓊持杯凝逺睇觸物結幽情樹杪參差緑湖光瀲灔明禮卑瞻絳帳思浹厠華纓徒記山隂興雜詠作念念此雜詠作今日乃為榮冬夜宴河中李相公中堂命筝歌送酒劉禹錫琅琅集作朗朗鵾雞絃華堂夜多思簾外雪已深座中人半醉翠娥發清響曲盡有餘意酌我莫憂狂老來無逸氣此詩三百十四卷重出今已削去王少尹宅宴張常侍二十六兄白舍人太監兼呈盧郎中李員外副使一作二副使前人將星夜落使星來三省清晨到外臺事重各銜天子詔禮成同把友集作故人杯卷簾松竹雪初霽滿院池塘春欲回第一林亭迎好客殷勤莫笑集作惜玉山頺此詩一百五十卷重出今已削去同年春宴孟郊少年三十士嘉會良在兹髙歌搖春風醉舞摧花枝意動婉娩集作晼晚景喜凝芳菲時馬迹攢騕裊樂聲韻集作運參差視聽改舊趣物象合集作含新姿紅雨花上滴緑煙栁際垂淹中講精義南皮戲清詞前賢與今人千載為一期明鑒有皎潔澄集作良玉無磷淄永將集作與泥沙别各整霄集作雲漢儀盛氣自中積英名日四馳塞鴻無集作絶儔匹海月難等夷鬱抑忽已盡親朋樂無涯幽蘅發空曲芳杜綿所思浮迹自聚散壯心誰别離願保金石志無令有奪移寒食內宴二首張籍朝光瑞氣滿宮樓綵纛魚龍四面稠廊下御厨分冷食殿前香騎逐飛毬千官盡醉猶髙坐百戲皆呈亦未集作未放休共喜拜恩侵夜出金吾不敢問行由二城闕沉沉向曉寒恩當冷節賜餘歡瑞煙深集作入處開三殿春雨微時引百官寶樹樓前分翠幕綵花廊下映朱集作華欄宮庭戲樂年年别已得三回對御看三原李氏園宴集前人暮春天早熱邑居苦囂煩言從君子樂樂彼李氏園園中有草堂池引涇水泉開户西北望逺見嵳峩山借問主人翁北州佐戎軒僕夫守舊宅為客施華筵髙懷有餘興一作膏壤有餘滋滋竹一作樹芳且鮮傾我所持觴盡日共留連踈拙不偶俗常喜形體間况來幽棲地能不重笑言郡中春宴因贈諸客白居易僕本儒家子待詔金馬門塵忝親近地孤負聖明恩一旦奉優詔萬里牧逺人可憐島夷帥自稱為使君身騎牂牁馬日食巴集作塗江鱗暗淡緋衫故斕斒白髮新是時嵗二月玉厯布春分頒條示皇澤命宴及良辰冉冉趨府吏蚩蚩聚州民有如蟄蟲鳥亦應天地春薰草席鋪座藤枝酒注樽中庭無平地髙下隨所陳蠻鼓聲坎坎巴女舞蹲蹲使君居上頭掩口語衆賔勿笑風俗陋勿欺官府貧蜂窠集作巢與蟻穴隨分有君臣六年寒食洛下宴逰贈馮李二少尹前人豐年寒食節美景洛陽城三尹皆強健七日盡晴明東郊踏青草南園攀紫荆風折海榴艷露墜木蘭英假開春未老宴洽日屢傾珠翠混花影管絃藏水聲佳會不易得良辰亦難并聽吟歌暫輟看舞杯徐行米價賤如土酒味濃如餳此時不盡醉但恐負平生殷勤二曹長各捧一銀瓶集作觥郡樓夜宴留客前人北客勞相訪東樓為一開搴簾待月出把火看潮來艷唱竹枝曲香傳蓮子杯寒天殊未曉歸騎且遲回飲散夜歸贈諸客前人鞍馬夜紛紛香街起暗塵回鞭招醉集作飲妓分火送歸人風月應堪惜杯觴莫厭頻明朝三月盡忍不送殘春與諸同年賀座主侍郎新拜太常同宴蕭尚書亭子座主於蕭下及第得羣字前人寵新卿典禮會盛客徴文不失遷鶯侶因成賀燕羣池塘晴間雪冠蓋暮如雲共仰曾攀處年深桂尚薰東都冬日會諸同年宴鄭家林亭得先字前人盛時陪上第暇日會羣賢桂折應同樹鶯遷各異年賔階紛組綬集作佩妓席儼花鈿促膝齊榮賤差肩次後先助歌林下水銷酒雪中天他日升沉者無忘共此筵宴散前人小宴追涼散平橋步月回笙歌歸院落燈火下樓臺殘暑蟬催盡新秋鴈帶來將何迎睡興臨臥舉殘杯與諸客空腹飲前人隔宿書招客平明飲暖寒麯神寅日合酒聖卯時歡促膝才飛白􅋳顔已渥丹碧籌攢米碗紅袖拂骰盤醉後歌尤易狂來舞何難拋杯語同坐莫作老人看宴周皓大夫光福宅前人何處風光最可憐妓堂階下砌臺前軒車擁路光照地絲管入門聲徹一作沸天緑蕙不香饒桂酒紅櫻無色讓花鈿野人不敢求他事唯借流泉集作泉聲伴醉眠夜宴惜别前人笙歌旖旎曲終頭轉作離聲滿座愁筝怨朱絃從此斷燭啼紅淚為誰流夜長似嵗歡宜盡醉未如泥飲莫休何况雞鳴即須别門前風雨冷修修蘇州郡齋旬假始命宴呈座客示羣寮前人公門日兩衙公假月三旬衙用決簿領旬以會親賔公多及私少勞逸常不均况為劇郡長安得間宴頻下車已三月開筵始今辰初黔軍厨突一拂郡榻塵既備獻酬禮亦具水陸珍萍醅若集作若溪醑水鱠松江鱗侑食樂懸動佐歡妓席陳風流吳地客佳麗江南人歌節點隨袂舞香遺在茵清奏凝未闋􅋳顔氣一作朱顔􅋳已春衆賔勿遽起羣僚且逡巡無輕一日醉用犒九日勤微彼九日勤何以治吾民微此一日醉何以樂吾身軍城夜會姚合軍城夜禁樂飲酒每題詩坐穩吟難盡寒多醉較遲逺鐘驚漏壓微月被燈欺此會誠堪惜天明是别離春日同會崔少卿宅前人詩家會詩客池閣曉初晴鳥盡山中語琴添集作多譜外聲映花相勸酒入洞各題名疏野長集作常如此誰人信在城同諸公會大府韓卿宅前人九寺名卿才思雄邀歡筆下與杯空一作中六街鼓盡塵埃息四座筵開語笑同焰焰蘭釭明狹室丁丁玉漏發深宮唯愁即是雞催曉集作即聽雞唱天門曉吏事相牽西復東陪湖州韓中丞宴朱慶餘老大成名仍足病強聽絲竹亦無歡髙情太守留間坐借與青山盡日看秋日零陵與幕下諸賔逰河夜宴鄭史湘月蘋風乍暢襟燭前江水練千尋新秋宋玉能為賦永夕袁宏好共吟輦下翠娥須強展樽中緑蟻且徐斟汀沙漸有珠凝一作如珠露緩棹蘭橈任夜深夜携酒訪崔正字劉得仁只應藝閣吏知我僻兼愚吟興忘飢凍生涯任有無慘雲埋逺岫隂吹吼寒株忽起圍爐思招携一作携來酒滿壺夏夜會同人前人沉沉清暑夕星斗儼虛空岸幘栖禽下烹茶玉漏中形骸忘細故偃仰泰愚衷自汲泉來潄微開密篠風東齋夜宴酬紹之起居見贈楊發龍門八上不知津唯有君心困益親白社追逰名自逺青袍相映道逾新十年江海魚緘盡一夜笙歌鳳吹頻漸老舊交情更重莫將美一作文酒負良辰長安客舍懷邵陵宴寄永州蕭使君五首曹唐邵陵樓樹集作臺榭碧一作閣樹蔥蘢河漢星集作西流宴未終殘露五更掀海月清笳三會揭天風香薰舞席雲鬟緑光射骰盤蠟燭紅今日却思行樂處兩床絲竹小樓中集作水樓中二粉蝶集作色彤軒盡障西水雲紅樹窣璇題鷓鴣影集作欲絶歌聲定鴝鵒驚初集作𥘉驚舞翅齊坐對玉山難甸線聽唯集作卧聽金石怕低迷東風月下集作夜月三年飲未有集作不省歸時不似泥三木魚銅鑰銷春城夜上紅集作江樓縱飲情竹葉水繁更漏短桐花風軟管絃清百分散打銀船溢十指寬催玉筯輕星斗盡飛賔客醉碧雲猶戀艷歌聲四三年身逐漢公侯賔榻容居最上頭飽聽笙歌陪痛飲熟尋雲樹縱問逰朱門銷閉煙嵐暮鈴集作紫閣清涼水木秋月滿前山風不動更邀詩客醉南樓五不知何路學飛翻虛受賢侯鄭重恩午夜清歌敲玉筯集作樹三年洪飲竭金樽招携每感雙魚逺報答空思集作知一劒存狼藉梨花滿城月當時長醉信陵門灞集作􅀈上宴别許渾山斷水茫茫洛人西路長笙歌留逺棹風雨醉集作寄華堂紅壁耿秋燭翠簾凝曉香何言集作誰堪從此去雲樹滿陵陽潁川從事西湖亭宴餞前人西湖清宴不知回一曲離歌酒一杯城帶夕陽聞鼓角寺臨秋水見樓臺玉堂客醉集作蘭堂客散蟬猶噪桂楫人稀鳥自來獨想征車過鞏洛此中霜菊繞潭開將為南行陪浙江尚書崔公宴海榴堂前人朝宴華堂暮未休幾人偏得謝公留風傳鼓角霜侵戟雲卷笙歌月上樓賔館盡開徐稚榻客帆空望集作戀李膺舟謾誇書劔無知已集作歸處水逺山遙集作長步步愁夏夜宴明月湖薛逢夏夜宴南湖琴觴興不孤月搖天上桂星泛浦中珠助照螢隨舫添盤笋迸厨聖朝思靜默堪守谷中愚醉中看花因思去嵗之任前人去嵗乘軺出上京軍機旦暮促前程狂花野草途中恨春月秋風劔外情愁見瘴煙遮路色厭聞溪水下灘聲不辭醉伴諸年少羞對紅粧白髮生春夜樊川竹亭陪諸同年宴項斯相知皆是舊每恨獨逰頻幸此同芳夕寧辭倒醉身竹光遙映燭萼粉暗飄茵明月分歸騎重來更幾春陪韋中丞宴扈都頭花園趙嘏門下集作外煙橫載酒船謝家集作公携客醉華筵尋花偶坐將軍樹飲水方重刺史天幾曲艷歌春色裏斷集作數行髙鳥暮雲邊分明聽得輿人語願及行春更一年九日陪越州元相宴龜山寺一作亭前人佳晨何處泛花逰丞相筵開水上頭雙影斾搖山雨霽一聲歌裊一作動寺雲秋林花一作光靜帶髙城晚湖一作水色寒分半檻流共賀萬家逢此節可憐風物似一作滿荆州今年新先輩以遏密之際每有一作月宴集必資清談前人天上髙髙月桂叢分明三十一枝風滿懷春色向人動遮路亂花迎馬紅鶴馭回飄雲雨外蘭亭不在管絃中居然自是前賢事何必青樓倚翠空婺州宴留上蕭員外前人雙溪樓影向雲橫歌轉髙雲晚更清獨自下樓騎瘦馬搖鞭重入亂蟬聲集宿姚侍御宅懷永樂宰殷侍御馬戴石田虞芮接種栁白雲隂穴閉神蹤古河流禹鑿深樵人應滿郭仙鳥幾巢林此會偏相語曽同雪夜吟冬日陪同州吳常侍間宴前人中天白雲散集客郡齋時陶性聊飛爵看山忽罷碁雪花凝始霽木葉脫無遺靜裏常多暇招邀愜所思夏日會修行段將軍宅顧非熊愛君書院靜莎覆蘚階濃連穗古藤暗領雛幽鳥重樽前迎逺客林杪見晴峯誰謂朱門內雲山滿座逢廣州陪涼公從叔越臺宴集李羣玉一徑松梢踏石梯步窮身在白雲西日銜赤浪金車沒天拂滄浪翠笠低髙鳥散飛驚大斾長風萬里卷秋鼙玉鈎挂海笙歌合珠履三千半似泥夜宴溫庭筠孔雀眠髙樹櫻桃拂短簷畫明金冉冉筝語玉纖纖細雨無妨燭輕寒不隔簾莫將紅錦段因夢與江淹陪李郎中夜宴方干間世星郎夜宴時丁丁寒漏滴聲稀琵琶絃急集作促千般語鸚鵡杯深四散飛遍請玉容歌白雪髙燒紅燭集作蠟照朱衣人間盛事猶如此爭遣漁翁戀釣磯石門韋明府為置東陽潭石魚集作鯽鱠李羣玉錦鱗銜釣集作餌出清漣暖日江亭動鱠筵疊雪亂飛消筯底散絲繁灑拂刀前太湖浪説朱衣鮒漢浦休誇縮項鯿俊味品流知第一更勞霜橘助芳鮮長沙陪裴大夫夜宴東山夜宴酒成河銀燭熒煌照綺羅四面雨聲籠笑語滿堂香氣泛笙歌泠泠玉漏初三滴灧灧金觴已半􅋳共向柏臺窺雅量澄陂萬頃見天和永州陪鄭太守登舟夜宴席上各賦詩蔣肱江頭朱紱間青襟豈是仙舟一作州不可一作見尋誰敢強登徐稚榻自憐還學謝安吟月凝一作疑蘭棹輕風起妓一作歌勸金罍盡醉斟剪盡蠟紅人未覺歸時城郭曉煙深襄陽間居與友生夜會皮日休大隱悠悠世不知林園幽事遞相期舊絲再上琴調晚壞葉重燒酒暖遲三徑引時寒步月四鄰偷得夜吟詩草玄寂淡無人愛不遇劉歆更語誰與友人對酒吟詩杜荀鶴慿君滿酌酒聽我醉中吟客路如天逺侯門似海深新墳侵古道白髮戀黃金共有人間事須懷濟物心陪湖南李中丞宴隱溪曹松竹林啼鳥不知休羅列飛橋水亂流觸散栁絲回玉勒約開蓮葉上蘭舟酒邊舊侶真何遜雲裏新聲是莫愁若值主人嫌晝短應陪秉燭夜深逰夜飲前人良宵公子宴蘭堂濃麝薰人獸吐香雲帶金龍銜畫燭星羅銀鳳瀉瓊漿滿屏珠樹開春景一曲歌聲繞翠梁席上未知簾幕曉青蛾低語指東方駙馬宅宴罷前人粉墻殘月照宮祠宴闋銀瓶一半欹學語鶯兒飛未穩放身斜墜緑楊枝文苑英華卷二百十六
