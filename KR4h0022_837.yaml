body:
  text: 文苑英華卷八百三十八宋李昉等編后妃哀册文下恭皇后哀册文一首承天皇后哀册文一首貞懿皇后哀册文一首元獻皇太后哀册文一首章敬皇后哀册文一首昭德皇后哀册文一首懿安皇太后哀册文一首恭皇后哀册文韋良嗣維開元二十八年嵗次庚辰月朔日寧皇后元氏薨于西京之第旋窆于某塋天未忘釁相次徂落其明嵗十一月二十四日王薨在殯制册為讓皇帝且有後命追諡妃為恭皇后蓋以王有讓統之實而妃有恭德之美所以考行追崇皆聖皇天倫篤愛有光於古先者也粵天寶元年五月乙巳朔十七日庚申將遷祔于惠陵王薨及葬凡為七月天子之禮也命侍臣敘以書册其詞曰皇矣有熊處于玄宫衣冠所在祗胤無窮以武而興復于土中以文始大元氣比崇禮侔周恪慶漸柔風展我邦媛倫昭有融至靜委和如天克令莫莫中谷夭夭作詠黃繶尊容素紗增映鑒圖閲火隂儀壼政帝寵元昆妃承纍命降家人之禮擬隂安之盛漢書文紀隂安侯髙帝嫂鵲巢化行人倫以正二一作或幾望於終古故守沖而益敬祥開夢兆服媚蘭蓀女延湯邑男受推恩緑車齊軫綵戟盈門各稟柔訓常貽話言天授戩榖無非播諦歸賵事凶毁臺成沴圓月忽蝕朝雲亦霽滅綵韶陽收華邸第嗚呼哀哉魯宫未考漢門處哀帝以讓而追諡后從夫而永陪䄖翬一作翬䄖暫舉璋瓉誰開用小君之備物怨吾王之不來嗚呼哀哉娥輪半上蜃輅將移逗一作追雙旐兮遲遲卷六衣兮披披青門一别兮不駐素滻既濟兮相隨入長陵之松柏顧漢苑兮參差司馬門兮罍罍恭后墳兮在斯嗚呼哀哉承天皇后哀册文楊炎維大厯三年嵗次景午四月乙未朔五日庚子故齊王諡曰承天皇帝妃張氏諡曰恭順皇后天寶末賊臣搆難王從二聖南幸成都自武功定䇿禁中扈先帝於靈武以是年八月薨于行在今上録功追逺詔諡鴻名以大厯三年六月遷座于咸陽禮也雲翿宿懸天雞空嚮一作響建翠鳳以雙引度蒼龍以一作而長往皇帝慟極天倫齊於開館望桂輿之蕭颯撫蘭臺之腸一作傷斷爰詔近臣遺音是纂其詞曰皇國氛氲麗于天文本枝百代連一作聨華千載維王斯會其祥則大祖武之烈宗文之配令德純粹溫恭慈愛和必有莭動而無悔持盈以沖明道若昧金玉是飾鼓鍾于外伊昔慶衍維皇握圗天孫載弄甲觀晨趨善問居講嚴師服儒瓊林秋實寶蕚晴敷皇用錫土苴茅剖符大邦之幹滄海之隅遙分朱邸近植青梧愛鍾嘉惠寵被宸渥從侍寢門觀風太學禮聞齒讓聽辨聲樂歷運中否災鯨搆昏初避夷狄一作帝初避狄聖有昌言王叶羣議天回乘轅適于硭碭之野進于閶闔之門雲趨北河電掃中原方從廟告言守藩垣忽川逝于東海怨夜長于西園嗚呼哀哉志業見於屯蒙勳名留於天壤成宗禋之有聖一作歸悲歡愛之易喪獨精聚而魂逰奉君親以長往展我邦媛德容可仰魯館而家齊風是長翟拜三月軿歸百兩豈鳳吹之有行一作有歸而虹銷之無像嗚呼哀哉帝念伊始晬容生憂傷桂絆之幽蠧望山河之林邱解劔龍一作龍劔而追慟燭鴻徽以𡨕搜駕之輅旗服以冕裘儼千官於天衛一作衢將合祔而從周嗚呼哀哉笳鼓宵陳河山曉發地坱乾一作北兮聲逺天空同兮影沒入幽隧之穹林伏盤原之宫闕嗚呼哀哉考至公與至性見為子兮為臣臨難不忘其社稷感時思致於君親短而非病逝豈同塵惟德名與盛典可觀法以求仁嗚呼哀哉貞懿皇后哀册文常衮維大歷十年嵗次集本文粹作在辛卯十月辛酉朔七日丁卯舊唐書文粹作六日景寅貴妃獨孤氏薨粵明日追諡曰貞懿皇后殯于內殿之西階十三年十月癸酉唐書文粹如此是英華及大詔令作六月十七日癸酉非乃命攝大尉銀青光祿大夫守門下侍郎同中書門下平章事河內郡開國公常衮持莭册命以其月英華唐書文粹如此是惟大詔令作其年十月癸酉朔二十五日丁酉遷座于藏陵禮也素紗列位黼帟周庭輅升玉綴軒缺珠櫺唐書集粹作攎皇帝悼鸞掖以追懷感麟趾唐書作迹而增慟備百禮以殷遣命六宫而哀送宗祝薦告司儀降收爰詔侍臣紀垂鴻休其詞曰祚祉悠久寵靈誕受元魏藩戚周隋帝后五侯迭興七貴居右肇啓皇運光膺文母纘女是因以綱大倫生知隂教育我蒸人瑞雲呈彩瑶星降神聰明睿知婉麗貞仁惟昔天鑒娉唐書文粹作搜求才淑龍德在田葛覃于谷周薑胥宇漢后推轂王業惟艱嬪風已穆繼文傳聖嗣徽克令不曜其光乃終有慶祗奉園寢肅恭靈命越在哀煢聿追孝敬文織絲組朱緑玄黃上供祭服以祀明堂法度有莭不待珩璜萹訓之製自盈縑緗敘我邦族風于天下始於憂勤叶成皇化慈厚諸女寵臨下嫁登進賢才勞謙日夜服繒示儉脫珥唐書文粹作簮申誡訪問後言宴逰夙退內和羣娣動有矜誨外睦諸親泣辭封拜闕翟有期唐書文粹作日親蠶集作躬親俟時忽歸清漢言復方祗萬乘悼懷羣生文粹作臣慕思玉衣追慶金劔唐書文粹作劔疑作紉同儀嗚呼哀哉去昭陽兮窅然乘雲駕兮何在人代宛兮如舊炎涼倐兮已改翠葆森以成列素旗儼而相待言從玉兆之貞永閟瑶華集作池之綵别長秋之西苑過望春而諸本作兮南登招帝子於唐書文粹作于北渚從母后於東陵后之女葉國公主葬城東地卑濕至是從祔東陵云下玉唐書文粹作土清兮動金翠外無像兮中有慿合簫挽而唐書作以攢咽從諸本作結雲雨之詔令作而凄凝吾君感於幽期俯曽亭而望思慘嬪媛載穆象服攸宜鸞輅爰正翬衣在斯藹藹邦媛雍雍母儀先天育德早嵗聞師日月有期山陵甫制六綍齊引八神警衛龍帷儼其載陳驥服騁以偕逝率土雷動殊方雪涕去城闕之遲遲望郊原之翳翳背黃山而北指渡清渭以東轅野色慘以凝幕青詔令作春雲重而垂軒儼騑驂以就駕慘徒御而不喧捨層城之禁掖向新廟之陵園嗚呼哀哉遵周道之合祔美時風之同穴列容衛於山阿若平生之像設擬靈疑金之凄楚泛薤露之清切痛修夜之不陽歎行芳之永絶嗚呼哀哉緬惟在昔嬪德斯臧夫婦以正邦家之光明明淑德誕聖配皇肅威靈之如在欽懿範之不忘嗚呼哀哉章敬皇后哀册文裴士淹維寶應二年嵗次癸卯閠正月乙巳朔五日己酉大行章敬皇后啓自先殯十六日庚申膺册禮于行宫粵三月二十七日庚午將遷祔于建陵禮也素帟遐敞彛樽曉薦風藹椒塗月虛蘭殿哀子嗣皇帝諱悲深玄夜慟切聖慈爰講一作修六服之禮允迪二南之詩示寰區以壼則恭典册以台司鸞斾曵音蜃輅遷轍辭臣奉詔敢揚徽烈其詞曰圓方配德耀魄齊明王化之本國風以清於穆宗盟一作周貽謀先覺太伯崇讓延陵聽樂藴乎純嘏施及繁昌斗維儲慶軒緯流祥入懷夢月滿室騰光蘋藻無替紘綖有章待年祕景率禮含芳象服是宜造舟成詠顧史垂則稱詩以延佇極容衛之文粹作以盡時搖巾袂兮逺訣隔軒檻兮羣悲不復見兮回御輦傷如何兮軫睿慈下蘭臯兮背芷陽旌悠悠兮野蒼蒼帶白花兮掩淚衣玄帉兮斷腸當盛明之唐書文粹作兮共樂忽幽處兮獨傷去故庭而諸兮作日逺即新宫兮夜長襚無文繡之飾器無珠貝之藏蓋自我之立制形諸本作刑有國之大坊詔令作防二字禮記通用唐書文粹作方嗚呼哀哉見送往之空歸歎終焉之如此方土神兮是與非甘泉盡兮疑復似遺音在於玉瑱陳迹留於金戺獻萬夀兮無期存二南之餘美嗚呼哀哉元獻皇太后哀册文蕭昕維寶應二年嵗次癸卯閏正月乙巳朔十六日庚申元獻皇太后啓殯于永昌之陵寢安神于細栁之亭宫粵三月甲辰朔十三日乙卯將遷座于泰陵禮也諡册昭禮容車儼駕皇帝執通喪而在疚遵逺日以戒期悼憫凶之荐及痛皇妣以御悲泣外郊而阻禮將撤奠於有司命宗伯之二職陳明德以為詞其詞曰兩儀判質二曜分形乾剛坤順陽德隂靈嬪風以婉婦道惟聽王教斯立邦家以寧渭水定祥塗山協德式敷隂教用光內則紃組克修蘋蘩是職雜佩相警副笄盡飾族承嵩詔令作蓮嶽德備椒房福履蘭殿祥開畫堂黃花襲慶彤管貽芳薑嫄佐嚳堯母興唐靈婺沉彩仙娥墜魄厚夜無歸重泉永隔義存故劔禮備追册先志克遵爰開故宅坤儀展敬啓迪四聰誕敷六行蘭芳桂郁霜皎氷淨燕集瑶筐鸞回金鏡化光葛虆務先穜稑載靡震驚宵淪朓朒柔明既進隂教惟肅必戒浮華逺登才淑寧觀戲馬嘗往濯龍堯門協慶莘野聮蹤禕禪凝彩璁珩有容志循簡易體備肅雍維德之行令問不已繡輪羽蓋玉階金戺式昭範於人倫竟韜華於地紀六宫揮涕于清禁萬宇銜寃於神理嗚呼哀哉宗祧永固濬哲膺期仁涵動植慶浹華夷捧鏡奩而增欷臨甲觀而纒悲望松楸兮逾逺感霜露兮何追湘川有君漢陵宜祔露衛攸心禮章加數瑞雲呈紫而轉妍廞服變黃而無蠧想層城於北闕背夀原於東路應門寂寂以長閉同軌轔轔而畢赴嗚呼哀哉閟泉闈兮有洫引池紼兮方昭吟古木於靈囿遡悲風於渭橋繁笳凝而凄切輕斾轉而蕭條衣潛覆兮猶在香逺聞兮而不消嗚呼哀哉鳴雞奏而夙興服馬嚴而曉發慘河山之淑氣怨桃李之嘉月雖立極與觀圖繫池光而禋設猗彤管兮有煒贊徽音兮無歇嗚呼哀哉昭德皇后哀册文韓滉維貞元二年嵗次景寅十一月丁亥朔十二日戊戌大行皇后崩于兩儀殿旋殯于西階越期一作三年嵗次丁卯二月景辰朔二十九日甲申大行昭德皇后將遷座于陵臺禮也長秋宵闢靈輼夙備哀笳候曉咽梚增欷容衛儼默祖庭愔邃動長情以自失矧孝思之天至哀子皇太子痛鳳翣之將引哀陵雲之永訣號遣奠以登餕臨凱風以泣血臣滉奉詔式揚懿烈其詞曰坤厚載物乾道由儀成象大矣貞徽纂之芳聞在郡詩在洽之陽俔表天施風𢎞王雅慶發明離靜恭之德斯贊庶方之教聿熙誠軒星之降彩何玉華之遽一作荐萎嗚呼哀哉桂館纒哀椒塗燎寢翬衣卷玉龍杠綢錦內朝遽閟公宫曷稟彤管空貽黃桑罷絍宸𠂻深悼於故劔儲二一作兩痛絶於勺飲惟華宗之逺派實統業一作系於周王猗烈祖之上仙固命氏之靈長沙麓之徽爰契筮華一作儇之慶載洋穆嘉猷於洲涘躋盛德之一作於任薑居內輔以同休飾芳音一作隂化以融光賦樛木以逮下鄙脫簮以自彰夙著當熊之績早膺靈鳳之祥布一德以蕃衍貞萬國以元良章順簡以柔克奚辰蝕而靡常掩圎魄以就晦絶坤維而不張嗚呼哀哉臣妾何恃宫壼安仰湊永巷以晨謁瞻蘭殿以凝想庭寥寥以增曖繐襜襜以不敞激號唱以俱發逹蒼𡨕以振響嗚呼哀哉通靈甫搆天京啓阡夀原春慘新宫晝玄珠𥜗已禭玉座將遷哀嬪負璽泣御收筵鷖輅徐轉鸞旗遵前慟皇情以餘渥下北極以辭天想衣練以崇儉絶傾筐而詠賢嗚呼哀哉瑶齊永閟鞶鑑長委靈仙眇邈母儀在紀媯汭同風塗山繼美配祗薦號騰英流祉惟皇儲之孺慕方銜血以頓毁掩禮經之前蹤逹天下之孝理遵一作尊睿懷之慘怛昭天行之終始垂千古而自揚一作傷豈臣詞之足擬嗚呼哀哉懿安皇太后哀册文封敖維大中二年嵗次戊辰夏五月己未朔二十一日己卯懿安皇太后崩于興慶宫冷井殿旋殯于大內兩儀殿之西階粵十一月丁未朔二十六日壬午遷座于景陵之别寢命大尉具陳祖饋殿廷禮也池紼就列神攢啓封晴霜拂禁曙月彎空叶龜謀之吉兆儼蜃衛於行宫皇帝孝本自天禮期踰節仰遺令之是稟仰宸衷而敢越宵載既備祖庭爰設緬行珮之徂征駐輼輈疑作輬之去轍顧謂簡册克揚休烈臣敖奉詔敢獻文曰大圓清升大方渾凝日正陽德月司隂職人倫既分伉云儷云自氓之畢逹帝之尊有國有家以君以親光光母后列列門胄鼎胤中榮天枝外秀河祥嶽祉蘭香玉美汾陽之孫升平之子有命既集來嬪帝宮奉維城之中饋光戚里之華容赫赫憲皇龍潛未躍貽孫鍾紫極之慶知子奉青宫之樂惟后之明執禮而行恭敬必嚴於父道盥潄將俟乎雞鳴及二聖歸真三光正色日朗黃道月盈霄極中興是贊隂教維則時詠肅雍功推輔翼服浣濯以警其華煥讓封拜以誠乎謙抑蘋藻潔蠲於宗廟葛藟吟諷於宫掖髙禖有慶大電膺祥誕元良而立極纘丕構而圗昌於是養素便殿齋心洞房宸嚴捧負孝道輝光噫馳飈兮未幾迅朝露兮何常人代之推遷莫極仙家之日月猶長婦事三朝母臨五葉禮益上載恩方下接無何祕籙求真闕門悟劫追弓劔之悠逺感霜露之履涉謂十地兮何躋謂丹梯兮可攝金屋不知其長往􅊮管空遺乎舊法嗚呼哀哉薑嫄讓德任氏推名仰符軒耀俯順坤靈容範不邀乎針史婉娩自協乎柔明終厭浮代期歸福庭謝明時於清禁即修夜之玄扄嗚呼哀哉蘭殿靈唐詔令作虛嚴椒房幽寂日下珠簾塵生粉壁禁樹暮兮煙慘宫瓦寒兮霜白瞻象設兮如在捧禕䄖兮成昔嗚呼哀哉車書畢會容衛周陳黃山指路清渭臨津姑射之雲霓自逺鮒隅之簫鼓空聞想𡨕𡨕於寥廓徒望望於逡巡嗚呼哀哉天上無歸人間一别盻三清之縹眇留四德之昭晰詩著隂陽之詠書徴卜筮之説啓叶吉於新阡爽同歸於故穴雖夀宫相望參差陵附之煙而仙路有詔令作何期繾綣瑶池之月嗚呼哀哉文苑英華卷八百三十八
