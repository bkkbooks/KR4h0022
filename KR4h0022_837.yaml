body:
  text: 文苑英華卷八百三十八宋李昉等編后妃哀冊文下恭皇后哀冊文一首承天皇后哀冊文一首貞懿皇后哀冊文一首元獻皇太后哀冊文一首章敬皇后哀冊文一首昭徳皇后哀冊文一首懿安皇太后哀冊文一首恭皇后哀冊文韋良嗣維開元二十八年嵗次庚辰月朔日寧皇后元氏薨于西京之第旋窆于某塋天未忘釁相次徂落其明嵗十一月二十四日王薨在殯制冊為讓皇帝且有後命追諡妃為恭皇后盖以王有讓統之寔而妃有恭徳之美所以考行追崇皆聖皇天倫篤愛有光於古先者也粤天寳元年五月乙巳朔十七日庚申將遷祔于恵陵王薨及葬凡為七月天子之禮也命侍臣叙以書冊其詞曰皇矣有熊處于𤣥宫衣冠所在祗𦙍無窮以武而興復于土中以文始大元氣比崇禮侔周恪慶漸柔風展我邦媛倫昭有融至静委和如天克令莫莫中谷夭夭作詠黄繶尊容素紗増映鍳圖閱火隂儀壼政帝寵元昆妃承累命降家人之禮擬隂安之盛漢書文紀隂安侯髙帝㛐鵲巢化行人倫以正貳一作或幾望於終古故守冲而益敬祥開夢兆服媚蘭蓀女延湯邑男受推恩緑車齊軫綵㦸盈門各禀柔訓常貽話言天授戩榖無非播諦歸賵事㐫毁䑓成沴圓月忽蝕朝雲亦霽滅綵韶陽收華邸第嗚呼哀哉魯宫未考漢門處哀帝以讓而追諡后從夫而永陪䄖翬一作翬䄖蹔舉璋瓉誰開用小君之備物怨吾王之不来嗚呼哀哉娥輪半上蜃輅將移逗一作追䨇旐兮遲遲卷六衣兮披披青門一别兮不駐素滻既濟兮相隨入長陵之松栢顧漢苑兮參差司馬門兮罍罍恭后墳兮在斯嗚呼哀哉承天皇后哀冊文楊炎維大厯三年嵗次景午四月乙未朔五日庚子故齊王諡曰承天皇帝妃張氏諡曰恭順皇后天寳末賊臣搆難王從二聖南幸成都自武功定䇿禁中扈先帝於靈武以是年八月薨于行在今上錄功追逺詔諡鴻名以大厯三年六月遷座于咸陽禮也雲翿宿懸天鷄空嚮一作響建翠鳳以䨇引度蒼龍以一作而長徃皇帝慟極天倫齊於開舘望桂輿之蕭颯撫蘭䑓之腸一作傷斷爰詔近臣遺音是纂其詞曰皇國氛氲麗于天文本枝百代連一作聨華千載維王斯㑹其祥則大祖武之烈宗文之配令徳純粹温恭慈愛和必有莭動而無悔持盈以冲明道若昧金玉是飾皷鍾于外伊昔慶衍維皇握圗天孫載弄甲觀晨趨善問居講嚴師服儒瓊林秋實寳蕚晴敷皇用錫土苴茅剖符大邦之幹滄海之隅遥分朱邸近植青梧愛鍾嘉恵寵被宸渥從侍寢門觀風太學禮聞齒讓聴辨聲樂歴運中否災鯨搆昏初避夷狄一作帝初避狄聖有昌言王叶羣議天廻乗轅適于硭碭之野進于閶闔之門雲趨北河電掃中原方從廟告言守藩垣忽川逝于東海怨夜長于西園嗚呼哀哉志業見於屯蒙勲名留於天壤成宗禋之有聖一作歸悲歡愛之易喪獨精聚而䰟逰奉君親以長徃展我邦媛徳容可仰魯舘而家齊風是長翟拜三月軿歸百兩豈鳳吹之有行一作有歸而虹銷之無像嗚呼哀哉帝念伊始晬容生憂傷桂絆之幽蠧望山河之林邱觧劔龍一作龍劔而追慟燭鴻徽以𡨕捜駕之輅旗服以冕裘儼千官於天衛一作衢將合祔而從周嗚呼哀哉笳皷宵陳河山曉發地坱乾一作北兮聲逺天空同兮影沒入幽隧之穹林伏盤原之宫闕嗚呼哀哉考至公與至性見為子兮為臣臨難不忘其社稷感時思致於君親短而非病逝豈同塵惟徳名與盛典可觀法以求仁嗚呼哀哉貞懿皇后哀冊文常衮維大歴十年嵗次集本文粹作在辛夘十月辛酉朔七日丁夘舊唐書文粹作六日景寅貴妃獨孤氏薨粤明日追諡曰貞懿皇后殯于内殿之西階十三年十月癸酉唐書文粹如此是英華及大詔令作六月十七日癸酉非乃命攝大尉銀青光禄大夫守門下侍郎同中書門下平章事河内郡開國公常衮持莭冊命以其月英華唐書文粹如此是惟大詔令作其年十月癸酉朔二十五日丁酉遷座于藏陵禮也素紗列位黼帟周庭輅升玉綴軒缺珠櫺唐書集粹作攎皇帝悼鸞掖以追懐感麟趾唐書作迹而増慟備百禮以殷遣命六宫而哀送宗祝薦告司儀降收爰詔侍臣紀垂鴻休其詞曰祚祉悠乆寵靈誕受元魏藩戚周隋帝后五侯迭興七貴居右肇啓皇運光膺文母纉女是因以綱大倫生知隂教育我蒸人瑞雲呈彩瑶星降神聦明睿知婉麗貞仁惟昔天鑒娉唐書文粹作捜求才淑龍徳在田葛覃于谷周姜胥宇漢后推轂王業惟艱嬪風已穆繼文傳聖嗣徽克令不曜其光乃終有慶祗奉園寢肅恭靈命越在哀㷀聿追孝敬文織絲組朱緑𤣥黄上供祭服以祀明堂法度有莭不待珩璜萹訓之製自盈縑緗叙我邦族風于天下始於憂勤叶成皇化慈厚諸女寵臨下嫁登進賢才勞謙日夜服繒示儉脫珥唐書文粹作簮申誡訪問後言讌逰夙退内和羣娣動有矜誨外睦諸親泣辭封拜闕翟有期唐書文粹作日親蠶集作躬親俟時忽歸清漢言復方祗萬乗悼懐羣生文粹作臣慕思玉衣追慶金劔唐書文粹作劔疑作紉同儀嗚呼哀哉去昭陽兮窅然乗雲駕兮何在人代宛兮如舊炎凉倐兮已改翠葆森以成列素旗儼而相待言從玉兆之貞永閟瑶華集作池之綵别長秋之西苑過望春而諸本作兮南登招帝子於唐書文粹作于北渚從母后於東陵后之女葉國公主塟城東地卑濕至是從祔東陵云下玉唐書文粹作土清兮動金翠外無像兮中有慿合簫挽而唐書作以攅咽從諸本作結雲雨之詔令作而凄凝吾君感於幽期俯曽亭而望思慘嬪媛載穆象服攸宜鸞輅爰正翬衣在斯藹藹邦媛雍雍母儀先天毓徳早嵗聞師日月有期山陵甫制六綍齊引八神警衛龍帷儼其載陳驥服騁以偕逝率土雷動殊方雪涕去城闕之遲遲望郊原之翳翳背黄山而北指渡清渭以東轅野色慘以凝幕青詔令作春雲重而垂軒儼騑驂以就駕慘徒御而不喧捨層城之禁掖向新廟之陵園嗚呼哀哉遵周道之合祔美時風之同穴列容衛於山阿若平生之像設擬靈疑金之凄楚泛薤露之清切痛脩夜之不陽歎行芳之永絶嗚呼哀哉緬惟在昔嬪徳斯臧夫婦以正邦家之光明明淑徳誕聖配皇肅威靈之如在欽懿範之不忘嗚呼哀哉章敬皇后哀冊文裴士淹維寳應二年嵗次癸夘閠正月乙巳朔五日己酉大行章敬皇后啓自先殯十六日庚申膺冊禮于行宫粤三月二十七日庚午将遷祔于建陵禮也素帟遐敞彛罇曉薦風藹椒塗月虚蘭殿哀子嗣皇帝諱悲深𤣥夜慟切聖慈爰講一作脩六服之禮允廸二南之詩示寰區以壼則恭典冊以台司鸞斾曵音蜃輅遷轍辭臣奉詔敢揚徽烈其詞曰圓方配徳耀魄齊明王化之本國風以清於穆宗盟一作周貽謀先覺太伯崇讓延陵聴樂藴乎純嘏施及繁昌斗維儲慶軒緯流祥入懐梦月滿室騰光蘋藻無替紘綖有章待年祕景率禮含芳象服是宜造舟成詠顧史垂則稱詩以延佇極容衛之文粹作以盡時摇巾袂兮逺訣隔軒檻兮羣悲不復見兮廻御輦傷如何兮軫睿慈下蘭臯兮背芷陽旌悠悠兮野蒼蒼帯白花兮掩淚衣𤣥帉兮斷膓當盛明之唐書文粹作兮共樂忽幽處兮獨傷去故庭而諸兮作日逺即新宫兮夜長襚無文繡之飾噐無珠貝之蔵盖自我之立制形諸本作刑有國之大坊詔令作防二字禮記通用唐書文粹作方嗚呼哀哉見送徃之空歸歎終焉之如此方土神兮是與非甘泉盡兮疑復似遺音在於玉瑱陳迹留於金戺獻萬夀兮無期存二南之餘美嗚呼哀哉元獻皇太后哀冊文蕭昕維寳應二年嵗次癸夘閏正月乙巳朔十六日庚申元獻皇太后啓殯于永昌之陵寢安神于細栁之亭宫粤三月甲辰朔十三日乙夘将遷座于㤗陵禮也諡冊昭禮容車儼駕皇帝執通䘮而在疚遵逺日以戒期悼憫㐫之荐及痛皇妣以御悲泣外郊而阻禮將撤奠於有司命宗伯之貳職陳明徳以為詞其詞曰兩儀判質二曜分形乾剛坤順陽徳隂靈嬪風以婉婦道惟聴王教斯立邦家以寧渭水定祥塗山恊徳式敷隂教用光内則紃組克脩蘋蘩是軄雜佩相警副笄盡飾族承嵩詔令作蓮岳徳備椒房福履蘭殿祥開畫堂黄花襲慶彤管貽芳姜嫄佐嚳堯母興唐靈婺沉彩仙娥墜魄厚夜無歸重泉永隔義存故劔禮備追冊先志克遵爰開故宅坤儀展敬啓廸四聦誕敷六行蘭芳桂郁霜皎氷净鷰集瑶筐鸞廻金鏡化光葛虆務先穜稑載靡震驚宵淪朓朒柔明既進隂教惟肅必戒浮華逺登才淑寧觀戯馬嘗徃濯龍堯門協慶莘野聮蹤禕䄠凝彩璁珩有容志循簡易體備肅雍維徳之行令問不已繡輪羽盖玉階金戺式昭範於人倫竟韜華於地紀六宫揮涕于清禁萬㝢銜寃於神理嗚呼哀哉宗祧永固濬哲膺期仁涵動植慶浹華夷捧鏡奩而増欷臨甲觀而纒悲望松楸兮逾逺感霜露兮何追湘川有君漢陵宜祔露衛攸心禮章加數瑞雲呈紫而轉妍廞服變黄而無蠧想層城於北闕背夀原於東路應門寂寂以長閉同軌轔轔而畢赴嗚呼哀哉閟泉闈兮有洫引池紼兮方昭吟古木於靈囿遡悲風於渭橋繁笳凝而凄切輕斾轉而蕭條衣潜覆兮猶在香逺聞兮而不消嗚呼哀哉鳴鷄奏而夙興服馬嚴而曉發慘河山之淑氣怨桃李之嘉月雖立極與觀圖繋池光而禋設猗彤管兮有煒賛徽音兮無歇嗚呼哀哉昭徳皇后哀冊文韓滉維貞元二年嵗次景寅十一月丁亥朔十二日戊戌大行皇后崩于兩儀殿旋殯于西階越朞一作三年嵗次丁夘二月景辰朔二十九日甲申大行昭徳皇后将遷座于陵䑓禮也長秋宵闢靈輼夙備哀笳候曉咽梚増欷容衛儼黙祖庭愔邃動長情以自失矧孝思之天至哀子皇太子痛鳳翣之將引哀陵雲之永訣號遣奠以登餕臨凱風以泣血臣滉奉詔式揚懿烈其詞曰坤厚載物乾道由儀成象大矣貞徽纂之芳聞在郡詩在洽之陽俔表天施風𢎞王雅慶發明離静恭之徳斯賛庶方之教聿熈誠軒星之降彩何玉華之遽一作荐萎嗚呼哀哉桂舘纒哀椒塗燎寢翬衣卷玉龍杠綢錦内朝遽閟公宫曷禀彤管空貽黄桑罷絍宸𠂻深悼於故劔儲貳一作兩痛絶於勺飲惟華宗之逺派寔統業一作系於周王猗烈祖之上僊固命氏之靈長沙麓之徽爰契筮華一作儇之慶載洋穆嘉猷於洲涘躋盛徳之一作於任姜居内輔以同休飾芳音一作隂化以融光賦樛木以逮下鄙脫簮以自彰夙著當熊之績早膺靈鳳之祥布一徳以蕃衍貞萬國以元良章順簡以柔克奚辰蝕而靡常掩圎魄以就晦絶坤維而不張嗚呼哀哉臣妾何恃宫壼安仰凑永巷以晨謁瞻蘭殿以凝想庭寥寥以増曖繐䄡䄡以不敞激號唱以俱發逹蒼𡨕以振響嗚呼哀哉通靈甫搆天京啓阡夀原春慘新宫晝𤣥珠𥜗已禭玉座將遷哀嬪負璽泣御收筵鷖輅徐轉鸞旗遵前慟皇情以餘渥下北極以辭天想衣練以崇儉絶傾筐而詠賢嗚呼哀哉瑶齊永閟鞶鑑長委靈仙𦕈邈母儀在紀媯汭同風塗山繼美配祗薦號騰英流祉惟皇儲之孺慕方衘血以頓毁掩禮經之前蹤逹天下之孝理遵一作尊睿懐之慘怛昭天行之終始垂千古而自揚一作傷豈臣詞之足擬嗚呼哀哉懿安皇太后哀冊文封敖維大中二年嵗次戊辰夏五月己未朔二十一日己夘懿安皇太后崩于興慶宫冷井殿旋殯于大内兩儀殿之西階粤十一月丁未朔二十六日壬午遷座于景陵之别寢命大尉具陳祖饋殿廷禮也池紼就列神攅啓封晴霜拂禁曙月彎空叶龜謀之吉兆儼蜃衛於行宫皇帝孝本自天禮期踰節仰遺令之是禀仰宸衷而敢越宵載既備祖庭爰設緬行珮之徂征駐輼輈疑作輬之去轍顧謂簡冊克揚休烈臣敖奉詔敢獻文曰大圓清升大方渾凝日正陽徳月司隂職人倫既分伉云儷云自甿之畢逹帝之尊有國有家以君以親光光母后列列門胄鼎𦙍中榮天枝外秀河祥岳祉蘭香玉美汾陽之孫昇平之子有命既集来嬪帝宮奉維城之中饋光戚里之華容赫赫憲皇龍潜未躍貽孫鍾紫極之慶知子奉青宫之樂惟后之明執禮而行恭敬必嚴於父道盥潄將俟乎鷄鳴及二聖歸真三光正色日朗黄道月盈霄極中興是賛隂教維則時詠肅雍功推輔翼服澣濯以警其華煥讓封拜以誠乎謙抑蘋藻㓗蠲於宗廟葛藟吟諷於宫掖髙禖有慶大電膺祥誕元良而立極纉丕構而圗昌於是養素便殿齋心洞房宸嚴捧負孝道輝光噫馳飈兮未幾迅朝露兮何常人代之推遷莫極仙家之日月猶長婦事三朝母臨五葉禮益上載恩方下接無何秘籙求真闕門悟刼追弓劔之悠逺感霜露之履渉謂十地兮何躋謂丹梯兮可攝金屋不知其長徃􅊮管空遺乎舊法嗚呼哀哉姜嫄讓徳任氏推名仰符軒耀俯順坤靈容範不邀乎箴史婉娩自恊乎柔明終厭浮代期歸福庭謝明時於清禁即脩夜之𤣥扄嗚呼哀哉蘭殿靈唐詔令作虚嚴椒房幽寂日下珠簾塵生粉壁禁樹暮兮煙慘宫瓦寒兮霜白瞻象設兮如在捧禕䄖兮成昔嗚呼哀哉車書畢㑹容衛周陳黄山指路清渭臨津姑射之雲霓自逺鮒隅之簫皷空聞想𡨕𡨕於寥廓徒望望於逡廵嗚呼哀哉天上無歸人間一别盻三清之縹緲畱四徳之昭晰詩著隂陽之詠書徴卜筮之說啓叶吉於新阡爽同歸於故穴雖夀宫相望參差陵附之煙而仙路有詔令作何期繾綣瑶池之月嗚呼哀哉文苑英華巻八百三十八
