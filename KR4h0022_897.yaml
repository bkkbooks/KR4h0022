body:
  text: 文苑英華卷八百九十八宋李昉等編職官六故吏部侍郎元希聲碑一首吏部侍郎奚陟碑一首贈工部侍郎張誠碑一首贈户部侍郎崔浮碑一首故吏部侍郎元公希聲神道碑張說良玉吐曜非媚荆人之斫幽蘭懷芳豈珍楚客之奏若夫克抱厥德不揭其明四海順風以𢎞道萬乘渴日而致用見於元公矣公諱希聲字某河南洛陽人也蓋顓頊之裔十三代祖魏昭成帝勳格皇天惠孚庶物駿啓靈命大昌于後故我曽大父隋尚書左丞𢎞尊賢愛人開物成務我大父隋南郡司法義恭禮樂是蹈詩書是好我皇考黃州刺史孝節政以禮成名以德舉奕集作並代集禮以洎于公公含真藴靈幼有成量承顔善對實談集作覃實訏母氏鞠育備于典訓三嵗便善草𨽻書客有聞而謬之者公援毫立就動有楷則故當時目曰神童焉七嵗屬文邈有髙致十四通五經大㫖百家之言先儒未諭一覽氷釋四方儒墨之士由是嚮風矣雅尚一作合冲漠脫落人事鼎鍾黼黻罔汨其志妙於鼓琴尤工幽居緑水之操常抵集作祗傲縱恣不求聞達兄通理以其聲華太髙諭其從事不得已舉進士授相州內黃主簿臨下以簡人用宜之黃州府君薨浹旬不怠朞而不懈至性之酷異類同傷於是昆弟胥命纍棘互勉負畚荷鍤躬自成墳故族稱元氏之孝服闋調補校書郎轉右金吾兵曹萬年主簿公之始至萬年也河洛肇基於天邑崤函分守於懿親鄎國公武攸望按唐書攸望封葉國公攸宜封息國公地在維翰寄深鎮撫以公文吏之美僉為判官凡有箋疏皆自公出朝廷嘉焉徴拜司禮博士則天大聖皇后萬幾之餘屬想經籍思欲撮羣書之要成一家之美廣集文儒以筆以削目為三教珠英蓋一千二百卷公首膺嘉命議者榮之書成克厭帝㫖遷太子文學主客考功二員外賞勤也皇帝纘膺大業擢中書舍人是時天地初復中外多務章奏交馳文誥叠委公操斧則伐懸衡不欺至於獻納多所施用然而不樂處煩屢乞外補上優而不許轉太常少卿無何吏部缺公雖虬蟠不奮欲固其節而鶴鳴有聞終迫其用乃拜吏部侍郎實能考才施以諗所立振幽滯以器所用簡而能通清而不介輪桷畢舉衆論休之天錫不永清羸遘疾春秋四十有六景龍元年某月終于某天子悼焉賻以粟帛含襚之事即以景龍三年某月歸葬于某禮也懿交昵友平生詞賦之客聚泣而評曰公事寡嫂撫孤姪以義聞居閨門接昆弟以禮著黃州之酷昭其行也鄎國之徴表其才也太常之舉見其髙也吏部之僉彰其用也况乎體道之要心無疵瑕包身之防口絶臧否非夫全德具美自天離祉曷能臻此君子患道之不立不患夀之不永公道行矣奚其多傷而已哉有文集三十卷行於世嗣子寄童齓之子嬰兒之慕夫人李氏故亳州刺史某之女今主客郎中顒之從父妹也華首喪天帷堂哭晝藐視孤疚哀感草木託詞于我故人庶以紀百代之盛余與公一遇相得二紀同遊聮光粉闈接袂華禁容範之好宛猶在集作存目宴謔之言未忘於耳追慨疇曩援毫涕集公執交兵部侍郎洛陽張說吏部侍郎范陽盧藏用當代英秀文華冠時而盧兼有臨池之妙故張述銘盧篆石天下稱是碑有二美焉其集無此字詞曰英英白雲瑞彼君輅佻佻公子嘉我王度魏后遺德作華天朝臨氣應變直心遙遙麟閣書仙鳯池墨妙太常國禮少宰邦教公之處之有倫有要玉折其貞金斷其清沒而不朽仁乎令名故朝義郎守尚書吏部侍郎上柱國賜紫金魚袋贈司空奚公神道碑劉禹錫嗚呼有唐清臣尚書吏部侍郎奚公貞元十五年十月甲子薨于位詔贈禮部尚書太常考行諡曰某是嵗臘月丁酉葬于萬年文粹作安縣之某原後三十有四年子為諸侯為大夫門户有煒於是門下生琢石紀德揭于新集作我阡云公諱陟字殷衡二唐書作殷卿其先在夏為車正以功封于薛下古以降為譙郡人或因仕適楚復之秦今為京兆人隋唐之際再世以明經為博士家有賜書曽祖簡亦以文學為太子司議郎大父乾繹仕至光州刺史烈考諱某有道而尚晦終徐州司功參軍贈和州刺史由子貴也天以大運生萬物而以正氣鍾賢人至和來宅其德乃具公實有焉幼而擢陵苕之秀長而成清廟之器羣倫月旦咸以第一流處之文粹無處之二字及從鄉賦洎升名太常果居上第明年詔郡國徴賢良設四科以盡材公居文詞清麗之目授𢎞文館校書郎時德宗新即位聲恆文粹作烜虜庭西戎畏威底貢內附詔諫議大夫崔河圖持節即虜帳以報之使臣欲盛其賔寮以自大遂默表公為介授集作換大理評事除書到門公方為人子不敢辭文粹作許集作訴以逺稱病弗果行歸寧夀春養志盡敬丞相楊炎勇於用才擢公為左拾遺奉安輿而西未幾再集荼蓼居從集無此字後喪將闋是嵗建中四年京師急變黃屋順動狩于巴梁公徒行間道以歸王所既中月而詔授起居郎充翰林學士創巨愈遲病不拜職改太子司議郎從大駕回入尚書為司金元士且參𣙜管之務有頃持愍冊宣恩于薊門將行錫銀朱於文粹作于青蒲上復命稱㫖轉吏部員外郎是曹在南宫為眉目在選士為司命公執直筆閲簿書紛拏盤錯一瞬而剖時文昌缺左右丞都曹差重遂轉左司郎中尋遷中書舍人執事者繫公識精以斟酌大政非獨用文飾也㑹江淮間民被水禍上愍焉特命公宣撫之許以便宜及物赤車所至如東風變枯條其利病復奏咸可轉刑部侍郎時主計臣延齡以險刻貴幸而與京兆尹集作充相惡以危事中之尹集作充坐譴已又逮繫其吏峻繩之事下司冦主奏議者欲文致而甘心焉公侃然持平挫彼嶽嶽君子聞之善其知道不私刑曹既清以餘刃兼領選事居一年授權知吏部侍郎又一年即真是秩言能審官者本朝有裴馬盧李四君子物論以公嫓焉時得病發癰有國醫方直禁中上促遣如第且飭之曰某賢臣也悉術以治之及有司以不起聞上震悼加等公娶琅琊王氏石泉公之曽孫友壻皆一時彥士長子某蚤不祿第二子敬則歷太僕少卿今為濮州刺史兼侍御史中丞錫金紫以連集作課最就加貴秩俾視九卿第三子敬𤣥以詞藝似續登文科歷左補闕今為尚書刑部郎中第四子炅舉進士最小子某咸砥礪纂修宜為名公家子其邁德垂裕之光也乎公少以名器自任及顯達急於推賢視其所舉則在西省薦權丞相由右掖集作史掌訓辭在中銓表楊僕射由地曹集作郎字綜吏部二公後為天下偉人凡執文章權衡以揣量多士一入中禁考策詞三在天官第章句披沙剖璞由我而顯者落落然居多推是風鑒移于大冶則鎔範之內無非祥金嗟呼天不遐其福而孤民望使由庚之什不作於貞元中惜也初公既集作齊字終詔贈大宗伯後以第三子在郎位被霈澤再褒至司空故昔之葬儀用常伯而今之碑制用三公云銘曰仁龍知麟為瑞一辰未若君子瑞于人倫惟唐德宗道類漢宣貴實文粹作督貴繩下風稜言言公丁斯時籍在雋賢從難表節執羈而還帝曰汝器黃流瑟然可為大僚左右化源乃飾王度乃馳輶軒既執刑柄亦操吏集作利權陽和熙熙貯在顔間守法持正嶷如秋山火不侵玉幸臣畏伏鳯鳴祥煙梟噪低跧帝方倚用天不假年公寐無寤其名愈逺門人達者赤舄𤣥衮公居甚卑其德愈尊兩集作爾子朝服駢驅朱輪佳城何在胄貴之里螭首龜趺德輝是紀嗚呼後人下拜于此嶺南觀察推官贈尚書工部侍郎吳郡張公神道碑銘白居易有唐嶺南觀察推官試大理評事吳郡張公大厯三年十闕月八日終于伊川别墅五年八月七日葬于伊闕縣中李原春秋五十五元和十三年詔贈主客員外郎明年贈太常少卿又明年贈尚書工部侍郎夫人吳郡陸氏貞元三集作二年某日終于某所春秋六十六追封嘉興縣太君又封吳郡太夫人嗣子通議大夫守尚書户部侍郎判度支上柱國賜紫金魚袋平叔以長慶二年某月某日立神道碑太原白居易文其碑云公諱誠一作諴字老萊吳郡人父諱無擇和州刺史祖諱孝績袁州司馬由髙曽而上世德世祿載在和州府君碑內此不書公年十八以通經中第及調判入髙等授蘇州長洲尉秩滿丁先府君憂既􅎭又丁先太夫人憂泣血六年哀毁過禮集作制以方寸再亂始一作殆無宦情既除喪退居不調者纍年而親友以大義敦責不得已而復起選授左武衛將軍集作騎曹參軍分司東都屬安祿山陷覆洛京以僞職淫刑脅劫士庶公與同官范陽盧巽潜遁于陸渾山食木實飲泉水者三集作二年迄不為逆命所汙及肅宗嗣位詔河南尹薛伯連搜訪不仕賊庭隱藏山谷者伯連得六人以應詔而公與巽在焉繇是名節聞子朝野君子以為知道優詔褒美特授密縣主簿未周嵗遷宋州碭山縣令時睢陽當大兵後野無草里無人公撫之一年襁負至二年汙萊闢三年衣食足及解印去縣民相率泣而餞之君子以為知政嶺南節度觀察使李勉偉人也既髙公陸渾之節又美碭山之政欲以名職禮命起而大之遂奏授試大理評事充觀察推官及除書簡牒到門即公捐館舍之明日也才如是命如是嗚呼哀哉公常自負其才不後於人自疑其命不偶於世及將去碭山而反伊川也頓駕搦管沉嘆久之因賦詠懷詩云論成方辨命賦罷即歸田竟如其集作是言終于衡茅之下君子以為知命公有三子曰平仲平叔平季夫人陸氏即國子司業集賢殿學士善經之女賢明有法度初公既沒諸子尚幼夫人勤求衣食親執詩書誨集作諷而道之咸為令子又嘗以公遺志擇其子而付之故平叔卒能振才業致名位追爵命揭碑表繼父志揚祖德此誠孝子順孫之道也亦由夫人慈善教誘之德浸漬而成就之不其然乎居易常辱與户部遊而知其家事治見託撰述庶傳信焉銘曰猗嗟碭山以文行保家聲以義節振時名以惠政撫縣民而職不登諸侯卿秩不及廷尉評悲哉猗嗟碭山前有和州名德如彼後有户部才位若此才子之父名父之子賢者兼之可謂具美休哉故湖州長城縣令贈户部侍郎博陵崔府君神道碑前人公諱孚字某古太嶽𦙍也今博陵人也唐虞之際因生為姜姓暨周封齊分類曰崔氏長源逺派大族清門圭組賢俊凖繩一作繩繩濟美斯崔氏所以綿千祀而甲百族也隋散騎常侍諱洽公六代祖也唐冀州武强令諱紹曽祖也監察御史諱預王父也常州江隂令諱育皇考也公幼以門集作䕃字子補太廟齊郎初調授汝州葉縣尉再調改宋州單父尉時天寶末盜起燕薊毒流梁宋屠城殺吏如火燎原單父之民將墜塗炭公感激奮發仗順興兵挫敗賊徒保全鄉原拳勇之士歸之如雲方欲紏合貔虎驅誅蛇豕京觀羣盜金湯一方本道節度使竒之將議上聞會有同事者爭功隂相傾奪公超然脫屣遂以族行東遊江淮安時俟命屬吳王出閣領鎮求才撫人常聞公名試以吏事遂表請為宋城尉事畢集作舉移假漣水令賞緋魚袋縣政修轉常州録事參軍糾察課成浙東採訪使聞之奏授越州餘姚令吏畏人悅嵗未滿浙西採訪使知之奏改湖州長城令長城之理又加於前二邑焉政成秩滿解印罷去優游自得獨善其身興元元年疾殁于宋太和五年遷葬于洛陽享年若干詔贈尚書户部侍郎夫人隴西李氏追封鼓國太集無此字夫人皆從子貴也公為人儀表魁梧氣槩倜儻負不羈之才慕非常之功始發軔於單父志立而功不就終稅駕於長城道行而位不達善慶所積實生司空諱𢎞禮公之幼子也以學發身以文飾吏以幹蠱克家以忠壯許國典十郡領三鎮再釐東土追命上功雖天與之才國與之位亦由公義方之訓輔而成焉大丈夫貯蓄才術樹置功利鎡基富貴焯耀家邦不當其身而得於後父析子荷相去幾何嗚呼崔公何不足之有按國典五品已上墓廟得立碑又按喪葬令凡諸贈官得同正官之制其孫彥防彥佐等奉父命述祖德揭石于墓勒銘于碑銘曰天無全功賢無全福既享天爵難兼世祿矯矯崔公道積厥躬大志長略卷于懷中黃綬遏冦思奮竒功銅印字人躬行古風才髙位下步濶塗窮竟戢羽翮不展心闕天道闕知善積慶鍾昭哉報施其在司空文苑英華卷八百九十八
