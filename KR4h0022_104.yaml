body:
  text: 文苑英華卷一百四宋李昉等編器用三衡賦二首平權衡賦三首衡誠懸賦二首嘉量賦一首度賦一首金柅賦一首衡賦以同律量衡為韻先王之欲齊政立信平施執中天下之利害攸同則非衡無以達其志非衡無以成其功故後代聖人奉之而不墜懸之而無窮逺必照乎庶物近罔欺于厥躬少多之分著彼我之情通廉者不約貪者不豐昭昭有禮殊之義洋洋有和樂之風乃以見權衡之德器用之雄也觀夫製形有象稱物以律萬萬靡差銖銖罔失雖遇寡而必舉亦裒多而不溢儻有賈竪懷虛背實雖手巧而用售終身平而貞吉節在不欺德咸有一用之則竭力於百戰捨之則甘心於三黜其昭明也有景緯之文其重墜也有沉潛之質是以春秋仲而均之以法日夜分而俾之無妄體正居中懷柔抱壯揣千鈞之重不贏其材稱萬物之多莫窮其量夫然則人亦有是豈惟斯平士為之物官為之衡材之云多雖默必重文之不腆雖語必輕非榮辱莫敢怨闕恐莫敢驚挺然誠懸不可欺以輕重確乎不拔孰敢議其屯亨吾當顒顒視聽直心舉措豈能朵頤騰口如羮也第二以儀止泰一無淺觀業為韻搜聖人知疑垂象伊兹衡之可觀材徑挺以繩直星連綿而珠攢惟用也氓庶不能以多少隱惟平也輕重不能以詐偽干故得萬人所以廛里物或紛競可以定黍纍之圭撮利其分毫可以觀低昂之容止執中以告無或不喜則夫衡之為物其用甚大四方正而域中平七政齊而天下泰動而無欲任之故絶私益而無妨疑作方行之固不害然能思無不踐應倉舒刻舟之深淺問無不知表張重度骨之威儀若乃均其神道形其事業聖人因之以平施邊鄙賴之而不怯豈欲決其差謬明其有無小人取之以作則君子見之而交孚則有王臣謇謇宰我疑秩秩洞鑒人才神無隱質諒兹衡之攸嫓故守之而勿失儻陳平之見知宰州縣之如一平權衡賦以晝夜平分鈞銖取則為韻劉禹錫惟天垂象惟聖作程播二氣而是分晷度立五則而在審權衡上穆天時應隂陽之克正下統人極俾凖繩而惟平於是黍纍無差毫釐必究等度量而化通逺邇體平均而勢行宇宙當其夾鍾中律南吕戒候銅渾應節於寒暑玉漏方齊乎宵晝繇是命有司而申令考前王而是遵權輕重以審則中規矩而和鈞事垂文兮風傳乎千古道如砥兮日用於兆人懿夫正以處中平而立矩命其同也有虞之制克彰稱其謹焉宣父之言可取故能用該仁里象合天文既左旋而右折量輕併而重分持平罔虧可謂範於秉鈞之佐位疑作涖見禮記信惟一將有助於執契之君不然則何以懸之而息彼姦詐正之而協於晨夜得平則正我之道兮允執厥中益寡裒多衆所用兮不言而化化之有孚功莫可踰立規程罔慙夫龜鏡揣鈞石寧失乎錙銖匪假垂鈞而其用不匱何勞剖斗而所爭自無方今百度惟貞萬邦承則順時設教兮靡不獲所同律和聲兮允臻其極玉衡正而三階四字一作直而懸衡以平七政齊而庶政不忒矣美君臣之同體猶權衡以合德宰凖繩之在心庶輕重之不惑第二同前韻李宗和王者統四時均五則彼權衡之為凖驗隂陽之不忒鈎深致逺黍纍於焉靡差稱物平施晷度由之斯得惟權也分其重惟衡也取其平明乎國經固懸兹以垂範掌乎天秩如用茲而永貞衡任權以鈞物權資衡以作程故一人體之以清萬國萬國仰之而庶政以成當其玄鳥司分疇人敬授既量諸夕又測其晝盈虛氣等何藉於土圭日夜時分已傳於玉漏莫不同度量以應其兹疑平權衡以叶其候苟順氣以頒節實從時而不謬其功斯博其道式孚諒同君疑於逺近故不失於錙銖俾稱物者守之無易掄材者持之罔逾皇矣我君康哉神化萬方取則自得於均平二氣尚分無愆於晝夜不然者何以佐璿樞之斟酌調元氣以氤氲申乎舊章孰以權衡之大匪無同異所季疑春秋之分齊其重輕等其規矩豈鈞銖之是待在繩凖而有取固將平邦國亦以敘彞倫七政惟齊有符乎應天之運百工咸賴實資乎秉國之鈞宜其平域中而齊律度貞天下而利黎人惟正直可法惟中平可均夫如是則權衡者蓋亦考兹義而是遵第三同前韻陳佑俾民不迷兹器維則行之而萬象正動之而天下直一人不宰命任權者必公百辟以孚在持衡者守德此蓋國之恆凖教以順行雖因時以考正乃假人而後成權之垂知俯下而斯重衡之正乃得一以至貞忠以自勝直哉惟清物無偏以表德器守公而作程動必推移佐璿璣而克正靜無偃仰若太階之既平懿夫衡之誠懸德乃是茂秉中正以不惑在毫釐而何謬衆星分列若歷歷以拱辰一權下臨正亭亭而當書斯斟酌之所以俾名實以相副者也爾其觀象取則其數可陳積而成重銖以和鈞稱物平施則其道無極從時利用乃有命惟新既審度而攸凖夫何患乎不均安則無傾正以順化四時行令必因其隂陽一德奉天諒貞夫日夜是知分寸相生成乎象盈虛有凖觀夫文因黃鍾以起數應玄鳥之司分爾乃七政允修五常斯覩為時德也誠金義而木仁為器法焉乃左旋而右矩既輕重之必審雖細微而待取平之為美曲逆終作漢臣中以見稱伊尹是為殷輔兹乃衡之為道也可大權之為義也斯孚繩從則正德不可誣動不欺於黍纍用有識於分銖若夫求平之至者執中之謂乎衡誠懸賦以無敢欺以輕重為韻張賈衡稱物以致用誠至精以作孚惟衡也表正直之有則惟誠也俾輕重之亦疑踰是將默運乎規矩顯微乎錙銖齊日月於七政協天地於三無且衡之德也權以相扶正之道也禮之為樞行疑得其誠而物無不應禮歸於正而姦不可誣是知大德所感小人是慘舉輕為重彼於信而自虧犯正以邪將畏禮而罔敢衡之用也可大衡之設也無欺既有别於髙下固非差於毫釐懿夫設爾而倚坦然而夷其大不讓其細不遺始執謙而益矣終忌滿而損之必盈縮而得度乃中正而自持𢎞於道深可均於五則遵乎信宜作配於四時原夫衡為器之軌禮為邦之紀宰物者必察其所持為政者必視其所以均則無怨是將施德於人審乃不欺故曰為仁由已彼天下之至精實至人之用情衡持平而固本權應變而定傾俾廉者之中節抑貪夫而不爭虛而受鈞石不能以為重進而就圭撮不足以為輕惟合德之為美故進退而有程我有司以守職操持羣才所奉垂正直之權衡察善敗之輕重此所以振千古之貞範副大君之垂拱者也第二同前韻陳佑衡之誠也義在乎有孚懸之審也法貴其不渝先賢所以𢎞建作智者所以通規模俾人事之在疑凖在權衡之合符端平可以揣金石輕重可以分錙銖逺取諸天既齊七政不私於物亦象三無質因材而斯宣文綴星而可覽臨用詳備而有誠物情詐偽而何敢此良工之度木同藥鏡之照膽故審其思者為衡可持端其事者於物無欺以之忖刻舟爰定其圭撮以之明度量不失其毫釐實同途於執政將一體於有司誠可大而可久必念兹而在兹若乃貿遷有無應用鄽里萬物稟原百貨資始苟執其均平孰不我以稱物則合於聖人有常乃比於君子至哉權衡功與利并成天下之務其利斯博為天下之式其功不輕道在乎至要理歸乎至貞提握之間而萬人取則尋尺之內而九有致平豈不以作者之聖述者之明守而勿失用之必行將度量而並設與規矩而齊名掄材至精多士無擁疑以權衡擬升降以中正為遵奉當平施而不差仰衡誠之義重嘉量賦以金錫無耗然後量之為韻敬括作之嘉量其義惟深嘉者以善為節量者用平其心窮微於子榖之數酌憲於黃鍾之音蓋取諸象爰範于金亦既成止其儀可覿堅外可程虛中受益功格于衡鏡實同乎圭錫以分多少寧患乎不均以立信仁抑行之無斁然美其方能立矩卑莫可踰出入罔吝包含式孚徇公滅私乃為而勿有納新吐故亦用當其無理將神而共契迹與道而相符且器守乎謙人惟厥操人非器罔主器非人奚導不謹則詐偽生端無方則羡溢為耗職是司者胡顔相冒由此言旃不其至然外乎則槩􅝁前漢律歷志作庣乃旁穿既因物以進退亦與時而貿遷施於政而四方仰則毗乎理而百代猶傳誠可美而可尚願斯焉而取焉異乎大小區分髙卑奇偶始增撮而就合卒聚升而成斗隨求而獲進獲退順動而何先何後洎乎職興都尉計起𢎞羊洽平糴而作典布均輸而有方常平由是以實大國因之用強豈比天有斗而酒漿不挹山有谷而牛馬空量然而當春秋分之期為晝夜至之時于以較矣于以用之實萬人之所欲敢望聞於有司度賦髙邁昔在太始原於物初天地草昧建皇王以為宰淳朴自理非賢臣而勿居歷雲官與鳥職接洪範而周書無不較權衡之輕重考度量之盈虛因物以極神託數以明象積分而成寸引尺而為丈列隂偶而陽奇法天三而地兩凖之億萬其如指掌時止則止時行則行隨物而應施不失平其至妙也多少不能以藏數其至微也長短不能以隱情易而無欺簡而無惑節之以禮其儀不忒聖人進退以觀象君子方圓而取則戒百王之規矩為萬代之繩墨欽若伯禹聖哉為王道濟天下爰釐疑大章投足既廣行地無疆彼里之難測用度之可量四時以日月為明萬國以君王作大同衡律而一軌量海內平而天下泰居日中而成市觀異方而畢會在商賈之所資惟尺度而為最夫道以神契物以言筌義無不盡理無不全度之為物也資道以為用度之為道也託物而無偏述斯往矣吾不知所以然金柅賦以貞而能一斯可制動為韻孫汝玉聖人患人情多遷物象不一爰指道樞之要因明金柅之質蓋以金則持堅而有常柅則制動而無匹當全模於大野疑作冶曾因鼓鑄之功及入用於生民克保安貞之吉原易道之所施得器度之攸宜任重而難勝者非剛莫能致其定利轉而不息者非一無以止其隨所以適其所適斯焉取斯在如輊如軒之時自能徑挺處無輗無軏之地物莫稱推美其叶範選疑而見辭取煆鍊而興制雖成形於橐籥不假飾於磨礪常無銷鑠懷可以明確稟安排之理端居退止之旌首於萬化之內而及百度惟貞然以上經之旨難分先儒之見無果一以節驅馳而為事一以當徑路而待我苟在鎔而備物固察其所由如持重以知名則用無不可是則寓質之時惟工所資將永平於軌轍亦致理於麻絲不為事遷可類仁之方也終然靜勝固知道豈逺而夫如是觀六爻之所總皆遵乎不動驗一德之可稱莫與彼爭能我皇由是立心堅固引義依憑躁競者息之於靜域回邪者制之於直繩然則金柅之為器也於今而其道益𢎞文苑英華卷一百四
