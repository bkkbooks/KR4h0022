body:
  text: 文苑英華卷五百五十三宋李昉等編賀登極代張仁亶賀中宗登極表一首賀肅宗登極上玄宗表一首賀登極表八首賀郊禮賀拜南郊表二首賀饗太廟拜南郊表一首賀南郊表一首為郭令公賀南郊大禮表一首為桂府王中丞賀南郊表一首賀登極代張仁亶賀中宗登極表吳少微神龍元年臣仁亶言今月一日春官牒至皇帝陛下去月按新舊唐書正月丙午中宗即位時張仁亶知洛州所上表作去月為是類表作五月非也二十五日光臨寶極誕告萬方億兆羣生抃舞欣一作歡賀一有微臣罔不幸甚六字中賀臣聞皇天愛人則有非常之主聖人受命必復先王之業伏惟皇帝陛下明德動天輯寧國家張乾坤之重位紹文武之耿光日月再貞正朔惟序百神啓祐九服咸若類表作熙天下元元不勝慶戴臣夙仕皇朝被荷恩化荏苒勤役復遇聖朝一作明扶一作枯朽再生慶抃類表作踴躍之情倍萬恆品臣忝官州域未獲馳賀闕庭一無此十一字此篇一本作吕溫代鄭相賀登極表其間異同注為一作吕集亦無此其誤何疑賀肅宗即位上玄宗表顔真卿臣真卿言六月二十七日伏承賊陷潼闕駕幸蜀郡李光弼郭子儀等正圍博陵郡收兵入土門王師既還百姓震恐憂惶危懼若無所歸臣不勝悲憤之深遂遣腳力人張雲子間道上表猶恐不逹又差招討判官信都郡武邑縣主簿李詵集作銑下同相繼間行詵及雲子前後並到靈武郡奉皇帝七月十二敕伏承陛下命皇太子踐祚改元皇帝上陛下尊號曰上皇天帝臣及官吏僧道耆夀百姓等蹈舞抃躍不勝感咽其張雲子回皇帝授臣工部尚書兼御史大夫其李詵回又授臣銀青光祿大夫顧以庸微預叨寵命道路隔絶辭讓無由進退失圖伏增惶懼竊以逆賊安祿山孤負聖恩憑陵宇縣禍盈惡稔尚稽天誅今皇帝撫軍蒼生賈勇豐鎬河洛指期可平伏願陛下垂拱頥神以覩廓清之慶臣官守有限不獲隨例一作到闕庭無任懇款悲戀之至代崔冀公賀登極表于公異臣某言今月五日寅時大理少卿馬炫至未時監軍使判官奚官局丞程仙望至纍承恩命宣慰臣及軍府將吏僧道百姓等半日之間二使連至六辰之內五奉詔書恩旨便蕃顧問稠疊感懼交集競隕失圖中賀臣聞玄穹降災吉凶常數儲后繼立周漢舊儀伏惟陛下承類表作纂八葉之重熙叶千齡之廣運以為四海務重不可以一日而無君九廟禮崇不可以一朝而乏饗是以順先皇三日之詔允羣臣五表之請克遵古訓虔奉國經俯抑聖情以臨寶位大頒眷類表作新命再造寰區海內悲歡天下幸甚臣謬司節制職守方隅不得與萬計連行同參盛禮千官並列稱慶闕庭無任抃躍屏營之至代路尚書賀登極表王緯臣某言臣伏聞陛下以某月日虔奉典册允升寶位凡在羣生孰不感慶中賀臣聞大人繼明品物皆照聖人首出萬國咸寧是以殷宗恭默纘成湯之業漢明聰哲繼光武之緒伏惟陛下並離開耀體乾成德神武著乎撫軍孝敬形于主鬯洎受遺嗣政正位居體以荷大業載緝重光布詔號於華裔慰人神於遏密此所以溥天之下食土之毛喜抃踊躍而不知其止者臣守職藩鎮不獲稱賀瞻望闕庭無任屏營之至代鄭尚書賀登極表令狐楚臣某言伏承皇帝光膺册命踐登寶位率土臣子抃慶滋深中賀臣聞天子之孝以纂承為重聖人之寶以傳授為公伏惟皇帝陛下德合乾符道光天字廓寰區以御厯灑渥澤而飛龍上以代太上之憂勤下以副羣生之欣戴溥傳天旨大洽人心喜氣騰輝晴雲動色黎元率舞將校傳呼即日而萬姓歡康纍旬而四海清謐臣職當統帥寄重方隅慶賀之誠倍萬常品限以所守不獲奔赴闕庭代孔侍郎蕃中賀順宗登極表吕溫臣臬言六月十六集作四日入蕃告哀使右類表作左金吾將軍兼御史中丞田景度至吐蕃列館伏承皇帝陛下以正月二十六日明德奉天纂臨宸極重光升耀百化惟新澤被幽遐慶覃動植中賀臣聞和氣既蒸勾萌具集作必類表作且非達時雨將降柱礎猶知臣從役單車閉留絶域天臨日照而别處幽隂雷動風行而兀為聾瞶伏賴英華作願恐非陛下義敦柔逺禮及窮荒始獲虔奉德音仰霑聖澤具寮就列無階蹈詠之初庶物效靈獨在飛沉之後舛薄鍾命耻玷自躬疚心厚顔罔知攸措今月七日自列集作别館回至河州大夏川即以十二日進發星言夕惕豈敢遑寧瞻望天集作闕庭載深感懼類表作躍無任喜抃屏營之至賀登極表栁宗元臣某言太子中舍嚴公弼至伏奉某月日敕書慰諭伏承陛下以某月日虔奉典册允升寶位凡在羣生孰不慶幸臣某誠歡誠抃頓首頓首臣聞天地泰而聖人出雷雨解而品物榮是以五行迭用木火更其位十葉重光宗廟輔其德殷宗恭默再開集作成湯之業漢文聰明克承髙祖集作帝之緒陛下重離出曜體乾繼統主鬯彰孝恭之美撫軍著神武之功欽承遺訓永保鴻業遏密之中施雨露以被物遐邇之地覩日月之繼明則四維之外八極之表人神胥悅草木皆春煦嫗生成不失覆載况臣謬膺守土集作藩守纍受國恩爰自出身洎乎領鎮沐浴聖澤優遊昌時不獲覩闕庭之禮展臣庶之分戴天荷聖倍萬恆情賀登極表劉禹錫臣某言伏見詔書正月二十六日皇帝陛下嗣登寶位萬國同歡日月繼明乾坤交泰中賀伏惟皇帝陛下欽承顧命惟懷永圖以大孝奉宗祧以至仁蘇品物洞照寰海統和神人聖祚遙集作延長從今無極羣生鼓舞自此大寧臣限守遐藩恪居官次代李相賀登極表王超總目作起臣某言臣伏聞陛下式遵典章正位宸極臣聞大明繼照雖昧者必昭其視震雷發聲雖聵者必逹其聽是以聖人鼓萬物而耳目咸革感人心而天下太平致理興邦率由茲道中賀伏惟陛下紹纍聖之鴻緒冠前王之盛烈祥符荐委景福攸臻纂武繼文重光纍洽自宣猷上嗣育德儲闈仁孝表於域中慈儉彰於天下由是餒者思食瘠者思豐曶爽咸耀於光明枯朽更延於惠澤顒顒億兆咸沐惟新鼓舞而四表歡心運行而二儀貞觀臣夙承朝奬謬列藩條歡抃之誠倍萬恆品第二表臣某言臣聞帝堯之禪虞舜也業歸乎異代漢祖之尊太上也禮徇乎虛名有棄屣而傳七廟之重斯則堯圗非逺漢道未全卓一作倬哉冠鴻名而超古始者孰若今之盛也陛下孝至通三上極於君父德均吹萬下被於生靈大聖所以宣昭庶品由其利見聖作物覩天清地平故雖氷霰傷和之姿人情慢蔽之物宿隂茲解惡氛未除無不仰南至而自銷隨東風而盡變坐見可封之俗更覃無外之恩率一作植土之氓俱霑覆育秉靈之內無不謳吟遐邇歡康昭聾發瞽臣謬忝朝列久總藩條賀南郊賀拜南郊表王晙臣晙言臣聞鴻勳大猷必崇昭饗至德廣運莫先郊禋伏惟陛下紹皇開圗纂聖興業舉昭祀之典尊嚴配之義類表作儀伏以長至陽升用書雲物玄穹有事祐福無窮畿嶽會同卉木咸悅臣獨擐甲朔野履氷一作理兵河外不獲躬陪玉一作大輅預奉圓壇屏營塞垣抃躍何已無任翹翹鳬藻之至同前臣某言臣伏承陛下親拜類表作幸南郊恭禋上帝竭孝誠於殷薦示彛訓於兆人寰海無虞類表作波玄穹啓祐百靈效類表作受職九服駿奔燔燎洞合於神光日月共禎於瑞色乾坤交泰動植歡榮臣限以守職在藩不獲趨陪大禮無任慶躍屏營之至賀饗太廟拜南郊表臣某言臣得度支鹽鐵轉運副使户部侍郎潘孟陽狀報伏承皇帝陛下以來年正月四日謁玄元宮五日饗太廟六日拜南郊制命施行中外慶抃臣某誠歡誠抃頓首頓首臣聞四氣首時履端為貴六經重祭報本是先伏惟皇帝陛下光啓睿圗纂承寶厯功格宇宙德冠勳華以建寅之吉辰備用辛之大禮祗事宮類表作宗廟克禋烈祖之嚴對越天地聿修孝孫之敬萬靈從祀以肹饗與蠁通用四夷率職而駿奔樂奏一作變九成神降百福臣幸逢昌運外守藩條不及侍蒼輅之後塵仰泰壇之盛典心馳魏闕目極漢儀踴躍海隅倍萬恆品賀南郊表令狐楚臣某言伏奉聖旨以來年正月五日朝獻太清宫饗太廟七日有事於南郊冝令所司凖式者敬莫大於朝宗廟嚴莫大於饗郊丘此二帝三王與聖祖神宗之所以總百靈而臨萬國巍乎盛烈也伏惟皇帝陛下光膺大寶茂對上玄盡誠信以奉先極婉愈而致養孝光夷貊悌逹神明方將告成功敷顯號惟天為大俾衆庶咸新如日之升與品物相見六幽傾耳四海翹首凡在臣下不勝慶幸而臣謬貞師律叨守戎藩不得捧豆籩於清廟之中執玉帛于泰壇之下仰觀盛禮伏賀鴻休聳踴轅門無任戀結屏營之至謹遣某官某奉表陳賀以聞為郭令公賀南郊大禮表邵説臣某言伏承今月二日册皇太子六日朝獻太清宮七日享太廟八日有事于南郊者欵謁宮廟尊崇祖禰展郊類表作敬天之禮百神受職𢎞主鬯之義萬國以貞率土之濱孰不欣戴臣限以出鎮闕覩盛事類表作儀仰白日以心馳望赤類表作彤墀而手抃無任歡慶之至為桂府王珙中丞賀南郊表令狐楚臣某言伏奉十一月十日制書南郊大禮畢大赦天下者湛恩龎鴻大號渙汗際天接地孰不慶幸中賀臣聞禘嘗之禮所以仁祖禰也郊祀之儀所以尊天地也五帝之前簣桴土鼓致其敬敬有餘矣而禮不足三王以降金罍玉斚備其禮禮有餘矣而敬不一作未聞秦之增封也覬望神仙漢之郊丘也禳除災害雖無文而咸秩終有廢而莫舉猶可以編在方册垂其鴻名豈若國家參文質于六經之中陛下酌損益於百代之後既文粹作順昊天之承命得黎人之歡心九穀有年四方無事然後因吉土迎長日咸池屢舞文粹作奏太簇登歌萬靈識周旋之位百神知饗獻之節雲欽文粹作散而柴燎髙逹風清而蕭薌逺聞信大報之無私亦玄鑒之不昧臣當時集軍州文粹作將官吏僧道百姓等丁寧宣示訖惟天之意莫遺於細微如日之輝不隔於幽逺頑鈍知感鬼神懷柔何則文粹作者刑莫大於成獄陛下捨之罪無輕重恩莫深於延賞陛下推之澤及存殁行道求志敢於直言者既許以親覽觸綸墨網屏於文粹作在逺方者又移之近郊減來嵗之新稅文粹作租昭其儉也棄七嵗文粹作比年之逋債𢎞諸仁也念勳臣而樹勳者益勸尊有德而不德者知慙賜羸老有粟帛之優禮神祗無牲幣之愛此所謂幽室盡曉枯條遍春雷雨作而蟄蟲昭蘇疾風文粹風雲行而窮文粹作籠鳥飛舞率土臣下文粹作妾不勝大慶况臣蒙被恩澤獲齒生類會守逺郡阻窺盛禮徘徊天外目與心斷無任抃躍戀結之至謹遣突將王清朝等奉表陳賀以聞文苑英華卷五百五十三
