body:
  text: 文苑英華卷六百九十三宋李昉等編遷譴下投知己書一首獻南海崔尚書書一首雜書與徐陵請王琳首書一首遺崔頥書一首與博昌父老書一首答楊賁處士書一首與王式書一首與李翺書一首遷譴下投知己書或云與大理楊卿書劉蛻復何事哉弓矢乎制敵之事今為導衛羽儀金革乎勇衆之器今為節奏和聲射宫蓬蒿幽燕少年恥蹈其下文之用莫過乎當時文之人莫過乎閣下復何事哉漢既治世詩書禮樂皆已逸墜求亡書者故冬官考工開千金之購議帝制者進退贊拜定茅蕝之中而今河洛塜壁圖簡編修登降俯仰不倒步序便蕃之儀莫過乎當時優遊之學莫過乎閣下復何事哉材力既以相譽忠正得以相扶及秦世為之妖言東漢為之黨禁公道畏忌相顧而野死今布衣匹夫得歌王公大人之盛德先進達生得薦布衣匹夫之事業唯其公當舉之不以為疑扶之不以為黨無私之道莫過乎當時譽能之心集作人莫過乎閣下嗚呼茍有其時而無其人雖有舉能之心集作人斯為閣下惜有其人有其時而閣下茍不留意屬念斯為來世弔蛻生二十餘年已過當時之盛棲遲困辱者過集作末遇當時之人書成而嘗樂乎其時出車滿於道路而才髙於蛻忌蛻侵已才下於蛻畏蛻擅名是以深知之者不得終其朝欲振之者又自無其力也謂其書空集作終為來世弔已矣乎不意得與閣下不為異世同乎文字所謂當時之人斯非閣下者乎則其人未死口能言乎能盡集作晝門下見之復用何禮以接之既接之復用何詞以譽之譽之得盡其才接之得盡其禮斯人也讀書業文德集作得有知己居窮守道死且不朽復何事哉獻南海崔尚書書所謂大丈夫豈天使為之哉以其進為天下利退有百世名顯為諸侯師默成萬一作髙非世法而已為退默者為避人得時而退默者為自進為進顯者為必行不得時而進顯者為失志是以雄才盛德不可以不兼其時故無其時不可行也有其時而志未達又不可行也志達而未信於天下又不可行也上位之人有不可故下位之人有踰垣塞牖而自遁者又豈唯退默而已矣集作哉方今天下百姓不敢爭步畝四夷不敢犯守陲自元和已後國家不傷一夫不亡一矢雖有豎子弄兵曾無根一作筯穿皮蠧之患尋已伏誅一作誅伏然而門下不謂無其時乎昔雍丘不能以才達求討吳蜀以自試班超不能守其家儒然後得官校尉夫文一有家之二字不遇清世不免操弓矢而擐甲胄也今則仕由文學著官自清顯尊閣下不謂志未達乎夫南海實管𣙜之地有金珠貝甲修牙文犀之貨非茂德廉名國家常重其人閣下不謂未信於天下乎當其時士亦故不以天下之廣居自隘九字一作不以天下之廣自隘以居其身不以天下之道自負以不知己故賂媒請介則不忍為守媒待介或有所自棄故退默者不得不自進矣閣下以謂時乎未可也嗚呼蛻之生於今二十四年雖天有南無可置其門雖天有東不得開其序伏臘不足於糗糧冬夏常苦於皸濕然而因時著書滿十卷自謂不有得於今必有得於後不有得於人必有得於鬼神今則力疲於天下笑日暮而郵舍閉今閣下進為天下利而又顯為諸侯師之時奈何得有踰垣塞牖之蛻乎故先自棄南嚮再拜不勝懇懇窮泰有時未可知也謹貢舊拔刺書一卷以其最近於情雜歌詩共二卷以其頗有逸事伏惟周賜觀覽無憚僇笑雜書與徐陵請王琳首書朱㻛竊以朝市遷貿時傳骨鯁之風厯運推移間表忠貞之迹故典午將滅徐廣為晉家遺老當途已謝馬孚稱魏室忠臣用能播美北齊書南史有於字前書垂名二本有於字後世梁故建寧公琳洛濵餘胄沂州舊族立功代邸效績中朝當離亂之辰總藩北齊書作方伯之任爾乃輕躬殉主以身許國實追蹤於往彥信踵武於前修而天厭梁德尚思匡救二本作繼雖繼二本作徒藴包胥之念終遘萇𢎞之眚洎王業光啓鼎祚有歸於是逺迹山東寄命河北雖經二本作輕旅臣之嘆猶懷客卿之禮感兹知己志此捐軀至使身沒九原頭行萬北齊書作千里誠復馬革褁尸遂其平生之志原野暴體二本作骨全彼人臣之節然身首異處有足悲者封樹靡立良可愴焉㻛早簉末僚預參下席荷公二字一作降薛君之吐握感君二字一作荷魏公之知遇是用沾二本作霑巾拭袂痛可識之顔回腸疾首切猶生之靣伏惟聖恩博厚明詔爰發赦王經之哭許田橫之葬㻛雖芻賤竊亦有心琳往二本作經蒞壽陽頗存遺愛曾逰江左二本作右非無舊北齊書作餘德比肩東閣之吏繼踵西園之賔願歸元二本無元字彼境還塋二本作修窀穸庶孤墳既築或飛銜土之燕豐碑式樹時留墮淚之民二本作人近故舊王維等已有論牒仰蒙制議不遂所陳昔亷公告逝即肥川而建塋域孫叔南史作叔孫云亡仍芍陂而植楸檟由此言之抑有前二字作其例不使壽春城下惟傳報葛之人滄洲島上獨有悲田之士二本作客昧死陳祈伏待刑憲遺崔頥書隋豫章王見隋書崔頥傳昔漢氏西京梁王建國平臺東苑慕義如林馬卿辭武騎之官枚乘罷𢎞農之守每覽史傳嘗竊怪之何乃脫略官榮栖遲藩邸以今望古方知雅志彼二子者豈徒然哉足下博聞強記鈎深致逺視漢臣之三篋似陟蒙山對梁相之五車若吞雲夢吾兄欽賢重士敬愛忘疲先築郭隗之宫常置穆生之醴今者重開土宇更誓山河地方七百牢籠曲阜城兼七十包舉臨淄大啓南陽方開東閣想得奉飛蓋拽長裾籍玳筵躡珠履歌山桂之偃蹇賦池竹之檀欒其崇貴也如彼其風流也如此幸甚幸甚何樂如之髙視上京有懷德祖才謝天人多慙子建書不盡言寧俟繁辭與博昌父老書駱賔王某月日駱賔王謹致書於集作于博昌父老等承並無恙甚善甚善集作幸善幸善雲雨俄别封集作風壤異鄉春渚青山載勞延想秋天白露幾度光隂古人云别易會難不期集作其然也自解携襟袖將十五年交臂存亡略無半在陸處士集作張學士溘先集作從朝露辟閭公倏掩夜臺故舊集作吏門人多逰蒿里耆年宿德但見松丘嗚呼泉壤殊途幽𡨕永隔人理二字一作生人禮非危促天道奚言感今懷舊不覺涕之無從也况過隙不留藏舟難固追惟逝者浮生幾何哀緣物興淚因情起集作事因情感雖蒙莊一指殆先覺於勞生秦逸三號遽集作詎忘情於怛化啜其泣矣尚何言集作云哉又聞移縣就安樂故城廨宇邑居咸從其地里門阡陌徒有其名荒徑三秋蔓草滋於舊館頽墉四望拱木多於故人嗟乎仙鶴歸來遼東之城郭猶是靈烏代謝漢南之陵谷已非昔吾先君出宰斯邑清芬雖逺遺愛猶存延首城池何心天地雖則山河四望是稱無棣之墟松檟千秋有切維桑之里故每懷宿昔尚想經過于役不遑駕言徒極集作願言徒􅀈今西城有望東戶無為野老清談怡然自得田家濁酒樂以忘憂故可洽賞當年相歡卒歲寧復心集作惠存舊好追思昔逰所恨跂豫望之徑集作經途密邇停中衢而空軫巾下澤而莫因風月虛心形留神往山川在目地邇人遐以此懷勞增其嘆息情不遺舊書何盡言答楊賁處士書獨孤及上德無為其次為而不擾及為邦歲暮集作期而人疲如初集有終字日以貢賦不入獲譴於上官遂以州北不調之琴思解弦更張之義算口徵輸集作賦以代他征意欲因有為以成無為為未著而人已告怨其所以然無德故也夫導政齊刑民猶免而無恥况權道以反經為用去德逾逺使無速謗末由也已所喜幸茍有過吾子知之貽書見讓以直諒相益商也起豫孟孫愛我吾子兼之矣愧辱嘉貺顧無以當之三復白圭欲罷而不能然來書所陳富人出萬今易以千貧人出百今亦數倍富倍優貧倍苦竊詳雅旨事或未然昨者據保簿數百姓并浮寄户共有三萬三千比來應差科者唯有三千五百其餘二萬九千五百户蠶而衣耕而食不持一錢以助王賦詩不云乎或燕燕居息或盡瘁事國在於是矣每嵗三十一萬貫之稅悉鍾於三千五百人之家謂之髙户者嵗出千貫其次九百八百其次七百六百貫以是為差九等最下兼本丁租庸猶輸四五十貫以此人焉得不日困事焉得不日蹙其中尤不勝其任者焉得不襁負而逃若以已困之人已竭之力杼軸不已恐州將不存茍以是為念安敢不夙興夕惕思有以拯之方今為口賦誠非彛典意欲以五萬一千人之力分三千五百家之稅愚謂之可集作可復使多者用此以為裒少者用此以為益損有餘補不足之道實存乎其中富人貧人悉令均減倍優倍苦何從而生竊料動搖不安以遁逃相扇者不過以規避之户與寄客耳此輩浮食偷安以久漏差科惡同均稅賦之名祗思茍免若編户地著者雖驅之使逃亦固不從今已擇吏分官以辨其差等集作等差量分入賦其數懸榜以示之信若信之不明分之或過等差之不均官吏之不仁困而後去誰曰不可乃未及知斂之薄厚辨之濟否望風聆聲遽告勞而逃斯豈為政者之過乎顧禮義之不愆孰能恤叛者之言邪天下無不食王土之臣寧有不輸王賦之民此輩飲國之澤食地之利將薄斂以助逋賦則曰挈妻子而去之是知集作與鳥獸蠻貊無以異矣其來既不可以奉征稅其去亦何足以病州縣違之一邦亦猶是也等不為用又焉能資鄰然計斯人之徒亦未必悉然固或有不去者焉庶幾其所濟猶大但不防之於微拙誠有之奉教省躬集作三省敢不知罪子産鑄刑書作兵左傳作丘賦以救鄭國而獲譏於叔向及才不如子産口算不如兵賦而吾子之言過於叔向之直中心藏之何日忘之簿領拘限莫由詣展未見君子馳誠無極不宣舒州刺史獨孤及頓首與王式書歐陽詹公範足下長史及大人以薄官集大門任溫州長史大人任博羅縣丞豫自能記憶只見驅集作馳載長幼勤勤南北豫雖童稚意甚不居自有安固丞潮陽掾其兄謨任安固縣丞兄愆任潮州司倉豫時已冠似或議事以為地分遐陋進取無門必無逺大若肄業承家則安固潮陽亦幾於不墜矣便懷耕食鑿飲之心焉事親敬長之道睦友與人之義恂恂自勉不意竊鄉曲之譽所疑不忘質所見不忘述時時有德多幸忝儕類之歸加以薄窺墳典集作籍適有章句濮陽仲宣河東千齡滎陽從易濟北有融琅邪次臣吳畨字仲宣薛壽字千齡鄭簡字從易康暐字有融王雲卿字次臣則某鄉曲之人皆有識度為州里所重者皆博雅明達君子公範亦其人焉每論性行量識度評學業酌文詞不以虛薄往往挂於牙齒豫年二十有一公範與羣公則可豫以進士之目而有令豫觀國之心豫以群公所貺之名繹先賢正名之旨進士者豈不言其可以仕進而能禆助政化始自下而升上終自上而利下者也近代亦曰舉人實古今舉賢進能之科也則有若風后力牧膺黃帝之舉舜禹稷契膺唐堯之舉縉雲髙陽膺虞舜之舉伊尹薑牙膺湯武之舉管仲冀缺膺桓文之舉五羖三傑膺嬴劉之舉皆齊聖廣淵明允篤誠立功立事出於人表之流也降自晉宋齊梁則有若陸機鮑照謝眺江淹亦以登庸雖道德器用不及曩臣而詞學風流為一時之秀想當群公之舉集作論豈容易哉度力不任又先與靈源道士虹巖逸人某鄉人也道士蔡明濬逸人羅山甫靈源虹巖其所居山名也有潘湖合錬奉養之契潘湖公範上下所居地名也乞從宿志勤勤懇懇獲與靈源虹巖同居者三十年公範與群公雖不苦以前事相迫而流言時至建中初因當道亷察故相國常公本州將故中書舍人薛公南澗之談西湖之禮常相公為福建觀察使薛舍人典泉州日豫以薄劣見知二公於南澗寺有所剪飭及豫辭歸故于西湖泛舟致餞也丹青目下程凖前期公範與群公激勵轉加豫亦稍信云云之勸時兄弟親屬方以衆情聞於大人大人與群公遂有龍首之會龍首山名豫之别墅在焉特詢可否至於再三群公不悔前言以為可固可必人之於豫皆欲其升髙致逺至其秋大人則有遣從計吏之命當發之日大人及慈親親祭行於東郊公範與群公亦共餕神餘於野席離觴既輟大人誡朂數言言可切骨銘心征車云動慈親嗚咽數聲聲堪斷腸禠魄公範與群公備見備聞也慰上下之望在乎早成名早寧歸余必不惜技能而有所馳墜集作絶墮以深上下之念汲汲搖搖如旌如翹受遣之明年達於長安賃廡六秩禮闈四上頻激昻藏集作頻竭激昻之力纍為簸揚之棄反躬忖已徘徊又疑豈常薛公輕於布素而有佞歟為群公溫良友朋而不忠歟集作為羣公溫良與朋友有不忠與楊朱對岐墨翟觀素徑挺之志半作歸心况以近夢慈親以亂絲繞豫之身萬重又夢大人齧豫臂見血蓋神祗以大人誠切逺警於豫焉絲繞者豈非思念纒綿之象也齧臂者豈非齧指令歸之義也萬重見血者豈非示其甚也公範與豫逰處最甚者且蒲陽讀書接席五年其餘為人公範知之蒲陽去家四百餘里晨昏之思忽至珍異之味忽得亦不以始昨違離便奔馳而去性自天至實非勉為今一辭庭闈而踰半紀以本心每每馳戀若此魂夢昭昭感發如彼日夜之心公範可量竊欲審核良駑托分進退阻故人無新知况不可問因孝使回更願有決斯科也先以才藝取次以德行伸大之事君細之集作以臨人如豫所習可以當之於取乎如豫事親可以移之於君乎如豫理身可以施之於人乎其可也則待命待知庶榮親之道抑溫凊之心如其不可則任材任器息干進集作時之機謝風塵之苦書至與裁裁已遄復家在國在佇為去就豫於為子之道所恨不知也知必無不竭若於為臣之道所恨不知也知必無不為缺生於世區區者所務豈不立名乎有名於國亦名也有名於家亦名也豫何攘臂於其間醜於家而美於國哉豫無此心亦公範知之東風扇和山青水緑野芳且榮林鳥時鳴樽有酒匣有琴公範休暢某再拜與李翺書韓愈使來集作至辱足下書歡愧交集作來并不容於心嗟乎子之書言意皆是也僕雖巧説何能逃其責耶然皆子之愛我多重我厚不酌時人待我之情而以子之待我之意使我望於時人也僕之家本窮空重遇攻劫衣服無所得養生之具無所有家纍僅三十口携此將安所歸托乎捨之入京不可也挈之而行不可也足下將安以為我謀哉此一事耳足下集有誠字謂我入京城集作域有此益乎僕之所有子猶有不知者時人能知我哉持僕所守驅集作執而使奔走伺候公卿間集作門開口論議其安能有以集作所合乎僕在京城八九年無所取資日求於人以度時月當時行之不覺也今而思之如痛定之人思當痛之時不知何能自處也今年加長矣復驅之使就其故地是亦難矣所貴乎京師者得集作豈不以明天子在上賢公卿在下布衣韋帶之士談道義者多乎以僕遑遑於其中能上聞而下達乎其知我者固少知而相愛不相集作忌非忌者又加少內無所資外無所從集作縱終安所為乎嗟乎子之責我誠是也愛我誠多也今天下之人有如子者乎自堯舜以來士有不遇者乎無也子獨安能使我潔清不汙而處其所可樂哉非不願為集作如子之所云者力不足勢不便故也僕於此豈以為大相知乎纍纍隨行役役逐隊飢而食飽而嬉杭本作悲者也其所以止而不去者以其心誠有愛於僕也然所集作其愛於我者尤少不知我者尤多吾豈樂於此乎哉將亦有所病而求息於此乎嗟乎子誠愛我矣子之所責於我者誠是矣然恐子有時不暇責我而悲我不暇悲我而自責且自悲也及之而後知履之而後難耳昔者孔子稱顔回一簞食一瓢飲集有在陋巷三字人不堪其憂回也不改其樂彼人者有聖者集有而字為之依歸而又有簞食瓢飲足以不死其不憂而樂也豈不易哉若僕無所依歸無簞食無瓢飲無所取資則餓而死其不亦難乎子之聞我言亦悲矣嗟乎子亦慎其所之哉違離久乍還侍左右當日歡喜故專使馳此候足下意并以自解愈再拜文苑英華卷六百九十三
