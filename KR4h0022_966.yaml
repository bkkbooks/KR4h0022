body:
  text: 文苑英華卷九百六十七宋李昉等編婦人五穆祕監夫人裴氏玄堂志一首崔少尹夫人盧氏墓志一首崔太常長女墓志一首王妣夫人楊氏墓志一首獨孤氏亡女墓志一首崔相國夫人栁氏墓志一首張司空夫人谷氏墓志一首權贊府夫人張氏墓志一首祕書監穆公夫人一作河東郡太夫人裴氏玄堂志穆員員不夭不死先公棄背迫先王制禮免喪五月太夫人河東郡太夫人以貞元十三年六月二十四日違養又不孝不滅以及龜筮逺期十月二十一日孤子贊洎質員賞奉遷靈座自東都歸義里私第正寢歸于偃師首陽山北原先公之居第三子員伏念常稟慈訓撰述前志當時實聞不忍聞之命俾繼斯文不敢不茹血吐述粗舉大略裴氏自漢魏以還蓋為天下著姓外族之於本宗也若泉有源山有峰披圖按牒可明徵矣五代祖諱鴻琳周易郡太守髙祖諱客兒隋長平丞曽祖諱文行皇朝并州石芝縣丞祖諱玄度絳州絳縣令父諱翔魏州朝城縣令世以懿德令名清風和氣昭穆授受宜于家邦太夫人則朝城府君之季女也淳仁如天博厚如地精識如神中節如時少喪怙恃長於季母諸姑以孝友誠明俾見懿慈有天性之答所至家政輒聞我於未成人之年洎有行君子作配盛德移內則之美盡家人之義居上齊下視人以身主祭祀以心為馨香事賓客以手集中饋先公厄於未濟困於屢空太夫人以樂道為貴肥家為富先公初仕河朔蹈難平原太夫人以勤儉成清白誠義佐名節先公初入崇貴間逢遷黜太夫人居常以天不假易自驚疑作警處否以泰道自安先公直道高義不容於時剝落當年優遊晚暮太夫人始則以不磷不淄何憂何懼為韋弦焉中則以不容何病然後見君子為塤箎焉終則以施於有政是亦為政為琴瑟焉先公孝以立家仁以合族太夫人輔佐之德達於神明員伯姑元夫人高明純至不幸早孀太夫人就養于堂服勤以力視色先意主於無違伯姑嘗顧小子同氣曰自吾歸爾家安爾母也自忘孤寡自忘長老嘻嘻然如未笄之初承歡於父母之前夜夢吾先君則為爾父夜夢吾先夫人則為爾母豈爾父母乃吾宿世之父母乎不然何迷我心靈發於夢寐者三十年如此中外孤幼以先公之祿為待哺待絮者其來如歸太夫人所以衣服飲食之蓋有竭無倦有不足無不均有孤惸老幼之先無親踈厚薄之别若乃甥姪群從之衆賢愚恭狠之差太夫人用不愠不校不欺不伐積為至德以嫗煦之不違直心而曲順其理不越中制而各厚其宜是故寢我無私有常之化者歸我懷我如服天地豈無忮戾之性多言之口不忍以造次幽昧遷焉員三從叔寂感太夫人少長子愛之慈以為生成罔極之重及壯納室則先請於女氏之介曰吾嫂吾母也茍能服事如姑則為某妻不者則否女氏許諾然後贄幣行焉太夫人自痛早孤終鮮兄弟惟周公蓋祔仲尼合葬之事咨於先公曰絳雖故鄉世乏喬木洛汭中土首陽家山今將奉先人於北原卜鄰舅姑吾與公存沒之志也命長子行之本族凋落蒸嘗殆曠鞠孤兄子以涕泣教之使學古入官承家主祭乃至宗從之祀興廢繼絶繄太夫人是賴者非一先公享懸車之榮太夫人受偕老之福河洛安宅京師就養板輿所至宴喜相從旬朔獻壽子孫成列嵗時稱慶冠蓋盈門當時士族以為榮羡晚年學道於聖善寺法疑大師所受方便平等則家政也忍辱慈悲則素行也真如正覺則天性也皆異積舊習彼於德施盡大師之法吾無得焉贊等從事官守世道多故太夫人以為茍不虧先王先公之訓則義在不辱是為無忝未始見責而姑勉之祿俸供養不給于家之經費太夫人每顧念有一飢一寒者則為之不飫不暖其遇窮獨無告不獲其所輒心體以之不康是以甘旨輕鮮之獻未嘗以尊高自異常有汲汲不足之患而不患焉初太夫人之從先公也公方褐衣家無數口太夫人以繁祉元福阜興德門男女為人父母為人大父母為人師者七第二女故安國寺尼常為人師內外孫洎曾孫四十有三食先公洎諸子之祿者五十一政主家主祀者五十一年壽七十四封河東縣君先公故也河東郡太夫人贊故也列郡啓封為妻為母論者以兼命斯貴同時難之然天下公議稱先公位不稱德雅知贊者亦謂贊等命不偶時而太夫人五福百祿之徵蓋上有所不充下有所未極贊質員賞皆自痛欲養欲報各孤其分號天訴天天不我聞伏念昔罹荼毒備承至誠以為殺身無逮揚名有補忍死為重徇情則輕煢獨一作煢煢茍至不敢自滅謹哀纂至德密行之可傳者勒之貞石以永厚地嗚呼蒼天崔少尹夫人盧氏墓志前人嗚呼有唐河南少尹清河崔府君諱徵從先大夫于北邙山平樂原卜年惟三而泉户啓夫人歸歸而復閉閉而終此山矣禮也哀哉夫人諱某字某姓盧氏以府君為大夫封范陽縣君其先自東漢中郎植十有三葉至於烈考皇朝大理司直孝孫代以禮樂婚姻相遺為氏族冠冕縣君泉源發清峻極慿厚孕和藴粹吐芳如春其在弱笄雅有君子之度諸姑從母有若韋太師見素裴尚書寬二夫人稱之曰吾見此女使人思齊不自知其所為長開元季年先舅尚書忠公尊顯于代高明克家思配子之賢慎承我之重縣君以姬薑之盛發聞之美誕集嘉命既而有行先姑隴西夫人才之傳之以政於是資顧復之報以孝舅姑推友于之愛以睦娣姒和琴瑟之樂以諧所從閲詩易之義以修所職婦儀母訓垂五十年不一日違仁不須臾忘禮溫顔和氣物莫之侵朗識清機道與之接雅好黃老且精禪惠嘗謂要本無二教焉有三吾將貫之以一守之以一蓋生知免習而寤寐以之是以寢疾恬然臨終不亂謂生為旅舍殁為歸次而我行邁之得息焉壽六十有一終於洛陽育德里之私第時貞元二年五月二十九日二孤溉泳殿中侍御史陸渾尉恭合祔之禮即命于蓍龜曰仲秋甲申吉先是溉泳執河南府君之喪一號三年既踰月而縣君繼酷雅知溉者以今之宰政與中朝賢卿大夫多溉之逰其顯有時其養可待何昊天壓之之甚而縣君棄之之早蓋以不可知者曰天與命相弔焉員則溉等瀆一作末交之執也見託銘石其銘曰北邙古原起新阡仁賢同穴閉下泉哀哀孝子不終養蒼蒼正色誰問天物之常久有貞石我以德音志神宅千里丘隴不可期白日佳城俟來覿崔太常長女墓志銘前人崔氏長女名某先笄之某年不幸遘癘未幾丁烈考太常卿贈吏部尚書常山公難至哀乘之共迫正氣以貞元七年秋八月己酉夭於東郡冬十月乙巳兄元方哀奉尚書從先相國于北邙山以長女祔于尚書之側嗚嗚女之生也乘髙祖博陵之殊勳曾祖禮部府君之令望先相國之盛業先尚書之重德何四葉垂裕合為禎祥與夫惡疾至性摧之不勝豈天所助不能移定命乎不然者烈祖顯考之德之一有惠也二字恐非純假以溢我我其收之宜施之有年移之他族宜乎起家而居有公卿之位雅人之所歌韓姞者疇離之哉夫內則之美不傳于外禮也辱命於其兄者志卒葬焉銘曰崔之九原實維邙阜孝女祔先與天地久王妣夫人𢎞農楊氏祔葬墓志銘權德輿王妣夫人姓楊氏𢎞農人祖敏皇太僕少卿交州都督金鄉縣公父晏湖州武康縣令夫人始笄歸于王考府君府君名重而祿薄家肥而身約仕至左輔尉中兵紀綱掾所與遊者皆天下雋人賢士大夫集作天人是無攸遂勸以養之道備焉天寶四年先太保真孝公既孤夫人慈仁訓育以文行紹續繇進士第授臨清尉薊縣尉安祿山之亂也以大節聞履險違難崎嶇色養滅迹人事以扁舟為家至德二年夫人棄孝養於杭州富陽縣之行次時四方兵交歲大疫江東尤劇未克歸祔此焉寧神先公號咷崩毁因中風濕痺痛集作痼外除拜御史著作郎皆以疾不祇命大厯丁未德輿丁荼蓼貞元戊辰再集艱棘餘生未泯積慶所鍾因緣踐履叨冒崇大以歲時之不易事物之多故久未遷神心焉若摧言隂陽者利在卯酉元和五年歲直庚寅德輿忝太常卿以明年之吉襄事既具其年猥參宰執集作政禮不克就乃建宗廟以嚴蒸嘗逮今十二嵗在丁酉德輿以校檢吏部尚書理戎漢中拜章上請協用龜策啓先公先太君壽堂于丹徒啓夫人壽宫于富陽德集作得字七月壬寅祔王考府君兆域于東都伊闕縣慈水之陽吉自杭抵洛凡二千五百里水陸安靜誠信無遺天之佑也惟尊靈幽閟周一甲子罪在孱菲宜當誅殛而懿範遺訓流光孕休閨門受祉施于孫子霜露怵惕如惔如酲又德輿之生也後不獲逮事逖聽令聞靡詳萬一故合姓之紀歲棄代之享年皆闕焉刻茲介石以永終古銘曰惟王母之令德淑明柔克閨門延耀以引以翼王父安卑兮其道未光先公大節兮易名章章伊孤孫之蒙騃不獲逮事慶靈流澤兮積纍名器浙河湯湯輤車帷裳伊水之陽祔于幽堂萬有千歲兮徽音不忘獨孤氏亡女墓志銘元和十年歲在乙未冬十月二十一日戊午故祕書少監贈絳州刺史獨孤郁妻天水權氏寢疾終于京師光福里嗚呼吾之女也故哭而識之惟吾門代有懿德至先君太保貞孝公以大節大行為人倫師表故鍾慶于爾而又夭閼其嵗此吾所以不知夫天之所賦也初笄有行未嘗逺父母兄弟考室周里常如歸寧始絳州以褐衣納采其後為侍臣史官更掌中外詔誥皆再命或三命十數年間便藩清近烜赫光大天下公議以宰政待之其後集作於閨門之佐君子供先祀嘻嘻申申有孝有仁乃者吾忝大任絳州居近侍而能婉約勞謙得六姻之和長信宫受册命之歲與母於內朝序位環佩之聲相聞黨族榮之人情禮意纎微矩度言內則者以為折中嚱夫絳州方強仕不淑爾又未練而殁年止三十一天之報施其何哉始稱未亡也懼貽吾憂每斂戚容而為柔色然以沈哀攻中竟不能支悲夫初先舅憲公有重名于時絳州生而孤不得逮事儻冥冥有知將同穴而養于下耶抑智氣在上歸之於合集作冥莫耶吾不知也生子二人女一人長男前歲未成童而夭次曰晦生十年矣至性過人未期再丁荼蓼嗷號罔極晦世父右拾遺朗茹終鮮之痛撫之如不孤貞于龜策得明年六月六日壬寅祔葬于東都壽安縣之某原宜琢墓石以永于後吾老矣豈以文為懼他人不知吾女之茂實故隱痛而銘曰㿩光未晝而湛暗兮植物方華以稿落兮懿吾女之淑令兮祔君子於冥漠已乎已乎吾不知夫神理之有無相國右庶子崔公夫人河東縣君栁氏祔葬墓志銘前人貞元十有一年歲在乙亥三月丁丑故相國安平公夫人河東縣君考終命于京師安仁里蓋春秋若干其孤曰懿伯號侍輤裧以十月庚午返祔於河南某原安平公之舊封禮也夫人姓栁氏代為河汾右族齊周之際中書孝公虬司會景公慶以匪躬厚行為北朝名臣孝公生止戈後周洛州刺史洛州孫皇海州長史憬憬生皇伊陽縣丞璿夫人之祖禰也夫人慿積厚之祉體柔嘉之姿既笄歸于安平公公始以處士納采至于佩相印三十年間內則彰聞嘗以命婦宜家疏封於本郡又以中宫恤禮為位於內朝齋明以助祭慈惠以厚下褕翟五采副笄六珈幽間必聞於法度侈汰不萌于心術盛德發於身而被於族姻不可詳已始用和樂安於隱約終以淑均居于集作於顯尊大君子之家肥道光其助𢎞矣既嬰未亡之痛深惟出世之法受微言於順禪師以蓮華普門為方寸津筏宜其永錫眉壽而為大家今則已矣豫一不知夫命也懿伯為左千牛修身純孝好學居喪得禮長女適𢎞農楊𢎞徵集作微才半歲有共薑柏舟之誓明識令行倫於古人幼女以襟褵來歸共承宗事故於夫人之道得周知之懿伯以陵谷之不可以不識哀請論撰大凡以乾元元年合姓貞元二年受封安平公薨八年而夫人捐館集作歸其銘曰於穆夫人徽柔淑溫儀于法集作德門蹈履內則六姻是式藹然慈仁魚軒煌煌珮玉鏘鏘威儀申申居貧且樂處貴逾約其道可尊不享天集作大年奄歸下泉孰司陶鈞哀此孝嗣煢然無恃訴于集作於蒼旻東周故園宰樹鮮原裳帷翻翻祔于幽穸刻是貞石厥聲長存義武軍節度使支度營田易定觀察處置等使檢校司空同中書門下平章事贈太傅上谷郡王張公夫人谷氏墓志銘前人夫人姓谷氏魏郡昌樂人其先漢大司農永之後故義武軍節度檢校司空同中書門下平章事贈太傅上谷郡王張公之夫人也四代祖那律貞觀中仕至諫議大夫𢎞文館學士曾祖補衮左羽林軍長史祖倚相祕書省正字佐集作佑蘭錡以嚴禁旅詳魯魚以考祕文猶未充其才則延耀於後考崇義天寶末以雄略氣敢從漁陽之師每建奇功亟摧強敵歷左武衛將軍左金吾衛大將軍纍兼太僕殿中追贈特進懿是勳慶聚于夫人天資才明動合圖史早以襟鞶之誡宜于鐘鼎之門百兩以納采三月而助祭克洽中饋至于上公其於佐以純誠規以策畫超冠命婦之道叶贊守臣之勞者有焉建中元年疏附於魏郡三年徙封於鄧國徽音法度列在命書貞元七年太傅薨于集作於理所嗣子今義武軍節度易定等州觀察處置等使工部尚書易州刺史兼御史大夫延德郡王茂昭能業其勤載延其賞克家稟訓宣力撫封六官分職八命作牧虞潭榮養用厚人倫魯侯燕喜方期壽考伯仲有裕稱於北河曳裾於邸第者三持憲於牙門者一貞元十一年以幼子銀青光祿大夫光祿少卿駙馬都尉茂宗既承築館之恩來俟執笄之慶方榮著代俄痛終堂以十二年二月丁卯寢疾殁于萬年縣安仁里享年四十九遺表以車服器用上獻王人就第申弔賜絹三百匹布一百端此又恩禮之有加也尚書以其年冬十月甲戌得吉卜於京師少陵原不祔于太傅行古之道也生極井賦沒有寵賻恩備終始以榮以哀申命司言之臣採其淑行用琢琬琰銘于墓門銘曰鵲巢之德夫人之職輔于上谷啓是鄧國淑愼溫惠徽柔令色克大閨門施于燕翼萬鍾雖及九原俄即賦命有涯孝思罔極衛國夫人李氏墓志銘前人夫人姓李氏趙郡人前相國司空今戶部尚書燕國于公之室也曾祖仲恩皇藍田縣尉祖琳河南府參軍考復司農丞三葉名器卑而婚親族類為山東冠甲外曾王父裴丞相文獻公左右玄宗為時才臣外王父吏部郎中贈刑部尚書綜以文行著於清名舅族多賢與軒冕俱大中外積厚而生夫人興元元年燕公以南宫郎冕而親迎其後歷二千石九卿觀風貞師焯集作輝耀𢎞大三公相印六職地征勤勞輔佐淑慎和樂鵲巢之均一樛木之逮下采蘋之能循法度螽斯之子孫衆多實備有焉晉令公侯夫人銀印青綬佩水蒼玉貞元三年夫人以外命婦封河內縣君十九年以元侯內子進衛國夫人廣大專靜尚柔含德不言而徽音自逺不耀而儀刑可象鍾郝之禮法為而不有姬嬴之地望有而不恃於六親之中薰然以仁煦然如春推心以及物各得其所欲故燕公琴瑟友之鐘鼓樂之克成婦順以贊家道元和十年冬十二月甲辰寢疾薨于安仁里第享年若干不求醫禱以順性命雖知道之君子所難能焉明年春二月庚申祔先姑之塋于興平縣之某原禮也嗣子前太子左贊善大夫正祕書丞方某官季友某官某等永惟免於水火以至冠婚列在朝序率由慈廕自帷堂至于遣奠哀敬有加燕公以德輿於外族為表甥於中臺為同列嗒然之痛俾志斯文公又命方等泣狀往行始終詳實故如其論次繫之以銘銘曰燕公之室𢎞是內則衛國攸宜淑明柔克環珮􅟚然蒸嘗吉蠲家肥族睦二十二年如賓之敬循道之性不慮不圖奄忽大病茂陵蒼蒼宰樹隂堂幽宅於茲兮德耀不忘前京兆府咸陽縣丞權公故夫人清河張氏墓志銘前人夫人姓張氏南陽人曾祖鉉皇正議大夫恆州刺史祖重暉皇朝議大夫衡州刺史贈太常卿考伯禽皇銀青光祿太夫將作少監兼通事舍人奕代以大夫二千石班宣教化而先公贊謁在帝左右兄慿又以衛尉少卿簡王傅世其官故表儀風訓家法延耀夫人承是吉祿生而懿美大厯十二年既笄歸于天水權公公時為馮翊縣尉其後薄登封贊咸陽徊翔於周秦甸圻集無此二字間皆用功次得調滿歲食貧則嘻嘻於衡蓽之下族屬和而家事理抑夫人是賴資性溫重閨門整峻每中外六姻有嘉會喪禮必羞必赴周旋法度女士憲焉而不得鳴珈佩玉𢎞大中饋命也貞元十八年夏四月暴嬰疾癘終于京師新昌里春秋若干秋九月窆于某縣某原從吉筮也支子某等充窮杖集作抆泣捧是圓石以下可不識命從祖兄子銘之其詞曰在漢七貂族之盛兮常山衡陽休有慶兮父兄仍代贊名命兮展彼夫人來合姓兮徽柔靜專家道正兮生也有涯斯大病兮芻靈廣栁掩泉徑兮刻此貞珉彰淑令兮文苑英華卷九百六十七
