body:
  text: 文苑英華卷八百六十五宋李昉等編釋十六杭州大覺寺碑一首湖州法華寺大光太師碑一首東林寺經藏碑一首杭州徑山寺大覺禪師碑銘并序李吉甫如來自滅度之後以心印相付囑凡二十八祖至菩提達摩紹興大教指授後學後之學者始以南北為二宗又自達摩三世傳法于信禪師信傳牛頭融禪師融傳鶴林馬素禪師素傳于徑山山傳國一禪師二宗之外又别門也於戲法不外來本同一性惟佛與佛轉相證知其傳也無文字語言以為說其入也無門階經術以為漸悟如夢覺得本自心誰其語一作悟之國一大師其人矣太師諱法欽俗姓朱氏吳都一作郡崑山人也身長六尺色像第一修眸蓮敷方口如丹嶷焉若峻山清孤泊焉若大風海上故揖道德之器者識天人之師焉春秋二十有八將就賔貢途經丹陽雅聞鶴林馬素之名往申款謁還得超然自詣如來密印一念盡傳王子妙力他人莫識即日剃落是真出家因問以所從素公曰逄徑則止隨汝心也他日逰方至餘杭西山問於樵人曰此天目山之上徑大師感鶴林逄徑之言知雪山成道之所於是䕃松藉草不立茅茨無非道場於此宴坐之久邦人有構室者大師亦因而安處心不住于三界名自聞于十方華隂學徒來者成市矣天寶二祀受具戒于龍泉法崙和尚雖不現身意亦不捨外儀於我性中無非自在大厯初代宗睿武皇帝髙其名而徴之授以肩輿迎於內殿既而幡幢設以疑龍象圖繞萬乘有順風之請兆民渴灑露之仁問我所行終無少法尋制於章敬寺安置自王公逮於士庶其詣者日有千人司徒楊公綰情遊道樞行出人表大師一見於衆二三目之過此默然吾無示說楊公亦退而嘆曰此方外髙士也固當順之不宜羈致尋求歸山詔允其請因賜策曰國一大師仍以所居為徑山寺焉初大師宴居山林人罕接禮及召赴京邑途經郡國譬若優曇一現師子聲聞晞光赴響者轂擊肩摩投衣布金者邱纍陵聚大師隨而檀施皆散之建中初自徑山徙居於龍興寺余杭者為吳東藩濵越西境馳軺軒者數道通濵驛者萬里故中朝御命之士於是往覆外國占風之侣盡此一作此為奔走不踐門閾耻如瘖聾而太師意絶將迎禮無差别我心既等法亦同如貞元八年嵗在壬申十二月二十八夜無疾順化報齡七十九僧臘五十先是一日誡門人令設六齊其徒有未悟者以日暮恐不克集事大師曰若過明日則無所及既而善緣普㑹珍供豐盈大師意若辭訣體無患苦逮中霄跏趺示滅本郡太守王公顔即時表聞上為虛欷以大師𤣥慈默照負荷衆生賜諡曰大覺禪師海內伏膺於道者靡不承問叩心悵惘號慕明年二月八日奉全身于院庭之內遵遺命也建塔安神申門人之意也嗚呼為人尊師凡將五紀居唯一床衣止一衲冬無纊㲲夏不絺綌逺近檀施或一日纍千金悉命歸於常住為十方之奉未嘗受施亦不施人雖物外去來而我心常寂自象教之興數百年矣人之信道者方怖畏於罪垢愛見於莊嚴其餘小慧則以生滅為心垢淨為别捨道由徑傷肌自瘡至人應化醫其病故大師貞立迷妄除其憃𡨕破一切相歸無餘道乳毒既去正味常存衆生妄除法亦如故嘗有設問於一作于大師曰今傳舍有二使郵吏為刲一羊二使既聞一人救一人不救罪福異之乎大師曰救者慈悲不救者解脫惟大師性和言簡罕所論說問者百千對無一二時證了義心依善根未度者道豈逺人應度者吾無雜味日行空界盡欲昏癡珠現鏡中自然明了或居多靈異或事符先覺至若飲毒不害遇疾不醫𤣥鶴代暗植栁為蓋者此昭昭於視聽者不可備紀於我法門皆為妄見今不書一作為尊上乘也弟子實相門人上首傳受祕藏導揚真宗甚乎有若似夫子之言庚桑得老𣆀之道以吉甫連蹇當代歸依釋流俾筌難名強著無蹟其詞曰水無動性風止動滅鏡非塵體塵去鏡徹衆生自性本同諸佛求法妄纒坐禪心沒如來滅後誰證無生大士密授真源湛明道離言說法潤根莖師心是法無法修行我體本空空非實性既除我相亦遣空病誓如乳毒毒去味正天師得之斯為䆒竟何有涅槃適去他方教無生滅道有行藏不見舟筏空流大江蒼蒼遙山成道之所至人應化萬物皆覩報蓋形滅人亡地古刻頌豐碑永存一作全澗户湖州法華寺大光天師碑李紳賢劫千佛生於後世法輪遞轉應現隨相或國王大臣宰官居士降生有地不以色相故如來言以色見我聲音求我為行邪道故不以金色瑞相蓮花化生降胎示報以潜靈聖上人姓唐氏生於邑之安吉母梅氏竒孕而夢協靈祥在娠而不茹葷血既生能言不為戲弄未齓之嵗思求佛乘發念法華三月通貫傳凡疑作梵音于性禀精護念於神契經聲一發而頑鄙革心晝集夜持而七部圓滿從容音響指顧間雅雖捷口利辨者皆隨慕念及登戒之嵗僧儀首冠西逰長安祥氣達於函關瑞相通于帝夢上上以持經為國詣闕請見肅宗皇帝召對禁中上拱而嘆曰昔夢吳僧口念大乘五光隨發音容宛若協我嘉徴因錫名大光以瑞唐姓肅宗元年降誕之辰㑹齊于定國寺因賜上人墨詔許以天下名寺持意往者住持令內臣趙思溫送于千福寺持經道場經日四七而吳音清亮常達一作通聖聽上表異其事令髙力士以宣諭焉後居藍田精舍先期而寺僧夢天童來降稱曰大光經聲達一作通于峯頂師既宴坐自見神手從天而降撫光之心師乃憶先達抱玉大師常志斯言今髙其法音當有神輔夕夢神僧乳見于心命光口飲自是功力顯揚神形不勞尋山探幽偶墜窮谷龍泉莫測淪溺其間心靈了然無所惑亂因以本經多寶塔為誠願持十萬遍恍然出泉若有神捧後詔住資聖寺大師以慈親在吳未答慈力表乞歸養恩未許還猶繫煩惱之念遂生無妄之疾策蹇强力將投于泉驢伏不前羣烏佛頂心既時覺疾乃隨瘳昔如來雙鵲巢頂而定惠堅明大師羣鳥摩首而煩疑解脫乃以寶軸加飾首載法華于千福寺行道日夜事命有詔許還既止烏程崇修寶塔日持法華偈以成往願焉永泰元年浙西亷察使韋元甫表大師為六郡别駕道場將念之音大厯癸丑嵗文忠公顔真卿領郡余先人主邑烏程余生未朞嵗乳病暴作而不啼不覽者七辰師至命乳母洗滌焚香乃朗念法華至功德品遂起席而坐拱而開目師飲以杯水遂命乳哺疾乃隨愈大師視而笑曰汝何願返之速乎因以法師易余幼名已及成童之嵗貞元中余甫弱冠再逰霅上舟泊之次大師以貯于溪側而笑曰戲撫如兒童焉余為州將飲醉於館大師引宿於道場夜分將醒白光滿室朗然如畫覩大師宴坐妙音方闡若聞毫相經音既息光亦隨斂余是嵗西邁辭大師于法筵撫豫頂曰爾得徑山之言我則無以為諭行矣自愛去留有時空王教平等者護念大師以永貞元年十二月黑月既夕示滅于法華寺經之院獸號鳥墜山林驚振異香飄馥二日不息是月告刺史顔防曰去矣人世無牽夢泡大師熙和暢達無入而不自得焉隨機見教經行無閡維摩詰之儔也知機同如藏往察來默而不顯晉寶公之倫也經通梵界瑞降天童靈一作佛相神光昭融顯見曇上人之徒也大哉明德慈悲護世通異相于王者示法輪之寶重昏外識於黎庶懼色相之迷妄是以居若長橋動如浮雲隨鷗自親入獸不亂一衲四十嵗無浣濯而誠香芬馥一飰七十載滋禪悅而膚體溫然余遭大師留駐于世而不覩大師寂滅之日年踰耳順昏寄塵勞無法舸以濟河悲火宅之迷室忝門徒者一作跡忝門者追書梵宫時豫烏臺舊僚天官郎敬君守郡吳興寄言刋石銘曰多寶如來聞經誦塔伴尼闡教以宏正法受持三世以成賢劫或降忉利或生人天金相不顯真如默傳明燈繼熖水月分圓示抱金疑德資于上賢體實戒珠心惟法鏡懷寶不迷含光不竟欵布夷要妙法凝清淨發諭開蒙藏機匿聖瑞協皇夢功致天童聲宣梵界響達宸聰降靈神手捧溺龍宫跡隱三昧心符六通金粟分身普賢馳象譬諭言詞光明顯相仁滋一雨功歸無量法性天髙慈門海曠我昔嬰兒迷蒙疾痼靡曰沉魄返年師駐梵音耳聽神光目覩白馬先鑣迷津莫泝鼓音以息慈雲不浮寶樹摧葉祥泉涸流稠林喪斧苦海沉舟色相歸空法身無際莫測往來誰分顯晦三表闡仁深乎宴諦東林寺經藏碑李肇釋迦者流有十二部經由或作猶儒之詩書易禮樂春秋皆立言垂教之本儒無文字則天下久已大壞三藏之說不行西方聖人之教幾乎息矣若聲聞乘之四諦門緣覺乘之十二因緣門菩薩乘之六波羅密門以至佛乘之一切種智生而知之則已學而知之者向微一作自非斯文是必懵然不自知其術也人主擅萬乘之權富有四海至于生死報應之際常一作恆必瞿然有生之徒奔走之不暇實由斯言之烜赫而致化一作比夫塔廟莊嚴之為像教其用大矣佛有天龍大㑹未嘗不以契經為事佛滅後大迦葉召于羅漢結集法藏阿難傳焉西土以胡文紀之謂之梵書科斗文字之類也著于貝葉謂之梵夾殺青為簡之類也後漢天竺人摩騰始至中國出其文四十二章翻為𨽻書其後稍稍不絶至晉沙門法護遍遊西國逹言語之不通者䆒三十六書之體而還梵書之詁訓音義然後大備雖為道滋廣而難能亦甚蓋以事生六合之外教出五常之後時人無能知者少則誤於文句大則失其宗㫖道安嘗嘆釋經有五失本三不易故信奉之代亦以名臣佐而成之自漢永平至唐開元祖述之士凡一百七十六人有桑門之重譯有居士之覃思有長老之辨論有才人之撰集校其經律論傳記文集刪改之揔五千四十八卷號為實録其中貞觀法師𤣥裝一作述作居多五分其數有其一其為該博首出前輩而厯代精舍能者藏之方之蘭臺祕閣而不繫之官府也五都之市十室之邑必設書寫之肆惟王公達于衆庶靡不求之以至徼福祐防患難嚴之堂室載之舟車此其所以浩瀚於九流也廬山山嶽之神秀而東西林為海內名剎有惠逺道安一作生是之遺風四百餘年鐘磬之音不絶然而三藏經論闕而無補元和四年雲門僧靈徹流竄而歸棲泊此山將去言于亷問武陽韋公公應曰一作之是如響往年公夫人蘭陵蕭氏終有叉梳一作釧珮服之資而於荆州買良田數頃收其租入以奉檀施至是取之增以清白之俸而經營焉爰即洪州諸寺雜理其事雕函飾軸漬蘗磨墨僧謀而吏書一作藏暑往一作兆是而寒就先命度地之宜以圖建置默設規制懸成剞劂一作疑乃結構而浮于江以至于東林施為殿堂用尊祕藏得浮槎大德義彤為之主受持灑掃者七人以備名山之闕而資學者公之素志爾初彤公受具一作葉於廬山浮槎寺嘗討大藏惡其部帙繁亂將理之不可遂發宏誓四十餘夏果得至焉於是搜逺近之逸函墜卷目在辭亡者得之互文合部者兼之斷品獨行者類之本同名異者存之以僞亂真者標之又病前賢編次不以注疏入藏非尊師之意并開元庚午之後洎德宗神武孝文皇帝之季年相繼新譯大凡匕目四千九百餘卷立為别藏著雜録七卷以條貫之合開元崇福舊録揔一萬卷舉藏以志亟隨亟以命軸微塵句偈如在常中然後金口之說流于娑婆者盡在於兹山也五年韋公薨七年博陵崔公以仁和政成憫默舊績由是東林以遺公得請篆刻之盛其成公故家府從事李肇為之文曰多羅之教神道不測迦葉承之布西域兮毗尼之用其法翼翼優波受之垂作則兮阿曇之文演暢宗極苾芻龍象甚竒特兮三者之藏傾如轥墨王公大人為之飾兮韋公之績崔公之德及兹寶藏何崱屴兮崇崇彤一作二公合發願力傳之厯劫千百億兮爐峯之北靈壇之側系之迦陀金石刻兮一作皆續廬山記文苑英華卷八百六十五
