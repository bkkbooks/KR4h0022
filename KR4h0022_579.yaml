body:
  text: 文苑英華卷五百八十宋李昉等編辭官一辭官表二卷英華所編失年代先後今正之為金吾將軍陳令英請免官表一首為宗監請停政事表一首為王起避諱辭灃陽縣令表一首為定王請降王位表二首太陽虧為宰臣乞退表一首辭官歸滑州表一首為董江夏乞退表一首代于京兆請停官侍親表一首為金吾將軍陳令英請免官表武后陳子昻臣某頓首死罪死罪上言臣聞軍政不臧春秋責帥故揚干之亂魏絳致戮所以國有明賞下無濫功臣實集作幸以常才文武兼闕始年類表作年始十八投筆從戎類表作戎行西踰流沙東絶滄海南征北伐無所不至藉集作席寵門緒忝迹軒墀屬高宗崇德深仁孝理天下八字類表作闕經仁義理天下以臣父子集作祖父兄弟一門五人皆仗節盡忠身死王事遂超臣不次授原州都督臣時行年始四集作三十二職兼五印寵集作榮絶一時階緣此恩累忝藩翰持節統郡集作部前後八州皆居塞垣當賊衝要國之重寄莫與為集作臣比臣雖無長策恤戎伏胡然恭守朝章保完免失又屬陛下大聖矜老容愚不以臣駑怯更加寵命授以青紫遣督幽州林胡構凶王師出討士馬雲集軍務星繁糧饋戎集作戈甲以萬集作動以億計臣無田疇鄉導之策又乏杜預度支之才空竭疲駑一作單晝夜不息以勤補拙首尾二集作三年彌縫闕漏幸無愆乏張𤣥遇等不謹師律賊得乘機遂敢長驅燕陲深入趙地集作際臣又無李牧東胡之畧實愧呉起西河之守使凶狡攘奪集作敓􅔯遂擾邊甿論之國憲合刎頸謝罪陛下不以臣之集作為辜更授清邊軍副大總管五月恩制六月到軍一作邊逆虜天亡臣又無效至於軍功戰籍叙勲定勞副職日淺未及精覈一作覆大兵旋斾王師獻功而漢廷將軍未聞辭第雲中太守已論增級今乃竊功謬賞有異集作塞朝章忠誠殉節不昭類表作明國議一作憲而臣由濫其職任過其才實類表作皆由臣身濫其職任過其才上不能允副聖心中不能匡正戎律傍招物議有紊一作失軍容臣罪何逃誰執其咎伏願乞賜骸骨貶歸私第式清朝序永覩師貞不勝待罪惶懼之至為宗監請停政事表武后崔融神功元年臣楚客言臣聞古之聖君慎擇賢佐故軒轅得力牧而為五帝先夏后得咎繇而為三王祖殷之盛也伊尹格于皇天姬之隆也虢叔聞于上帝斯皆應風雲之會依日月之光社稷繫以興衰時政由其輕重粤若大周之有國也天策金輪聖神皇帝提封千里光宅四天道化淳釀神功靜默雖堯年無事久聞童子之謡而漢家用人或取匈奴之笑臣某中謝臣疲驂强策卒無行地之功決羽曾飛終罕冲天之望今臣經術淺短才能朴畧言不足以補世行不足以勵時徒以枝葉微姻葭莩末屬遂得拔擢泥滓騫翥雲霄食君厚祿不能有所輸報受君殊寵不能有所發明茫然政途妨此賢路外慙衆口内愧諸心朝廷亦何異捨陸而泛舟膠柱而調瑟當域中之有道豈天下之無人常深鼎覆之憂每切鼓妖之懼臣之懇懇非欲自保其身臣之區區切慮上塵於國今者契丹大勦黙啜自來六合大同四方向化加以朔旦冬至鼎命惟新五星若連珠二曜如合璧謂宜退不肖進賢良與天同休與人更始又聞管夷吾有言曰德義未明於朝而使居尊位者則良臣不進也功力未見於國而令處重祿者則勞臣不勸也臣有何德而居之臣有何功而處之臣雖至愚敢忘先誡伏乞陛下察匹夫之志思仲父之言坦至公之方𢎞滅私之道羊叔子之辭開府臣事君以忠庾元規之讓中書君使臣以禮博求于衆廣聽于人停臣檢校夏官輟臣平章政事臣得避位清切待罪尚方罄竭丹誠庶幾或濟伏惟陛下容納纖陋鑒揆愚蒙使周勃無浹背之慙虞丘有退身之地則雖死之日猶生之年矣無任悃欵屏營之至謹詣闕奉表陳情以聞云云為王起避諱辭灃陽縣令表前人臣某言臣伏奉恩旨授臣灃陽縣令臣才疎藝薄植此無庸命偶時來遘兹多幸逢上聖之初刼叅太平之末位槐檀驟徙亟逰銓館之門草芥何為忽枉槱薪之紱召見於赤墀之下垂恩於紫霄之上豈徒任好之魄忽上於鈞天固亦闞澤之名遂昇於飛日仰殊私而載惕顧匪服而增慙雖剗跡都畿永無闕庭之望然委心蓬艾長懷雨露之仁幸欣就日之明敢憚乘流之遠但以州縣之號與臣亡父諱同迫切私情不獲遄赴伏乞天慈永錫聖造曲成𢎞以孝理之風愍其心瞿之日使得策名他職陳力異邦則地義天經實奬於名敎糜軀粉骨豈酧於鴻恩一作恩造無任懇迫之至謹昧死陳表以聞為定王武攸暨請降王位表中宗宋之問臣攸暨言臣聞力微任重無德者履之必危功薄賞隆有識者陋其非據臣地因外戚器實中庸顧慙蓬艾之姿謬忝葭莩之末則天大聖皇后敦睦九族崇念六姻曲申猶子之情爰垂降主之澤禮優築館恩洽錫珪㧞自堂姪之流光以親王之位臣嘗再瀝誠懇集作欵己蒙賜等諸昆今陛下隆德嗣興鴻基紹復羣萬物而改旦宅千齡而配永洛讖河圖允叶純深之義雲行雨施載流寛大之恩追奉先慈將覃後命外家諸子降等猶誓於山河主第增榮在臣更超於等數陛下雖渭陽情重沁水恩多凡是封冊王公終亦集作須憲章堯舜以濯龍之戚今乃方於五侯緣駙馬之姻古未封於四履私親越禮聖人之孝理載光冐寵延災微臣之官謗斯久又以班叅禁内秩比侍中自非德邁應璩識侔慶忌將何以對揚顧問規獻文章况臣位以恩升寵非才進無脛而至凡姿簉於珠玉無翼而飛睿澤借其毛羽未貽身譴幸庇容光臣亡兄攸寧循榮增懼以臣叨鳬繹之貴日夕魂兢負鼇抃之恩歲時力盡屬纊之夕再受懇言憂臣愚蒙令臣退讓倘陛下俯遂勤請照集作遠察㝠心納臣揆分之言寘臣獲全之地去兹王號降以公名爰食封邑同諸兄弟賜改散職即望叅朝實冀家福惟新朝典集作章咸序天德更逾於造化神理不責於滿盈臣無任懇欵􅌤懼之至第二表前人臣聞富貴者易象謂之崇高滿盈者至人誡其顛覆臣在非次久冒殊恩所以輟寢思危廢飡懷懼慊欵集作嫌疑之極載陳前表備瀝中誠之訴實非外飾之詞而聖鑒未廻寵章仍舊戴岳之重何憚力疲阽原之隍日憂身墜臣某中謝臣雖學慙敦史而塗聽前言尸位者必會短期冒榮者難為長守豈有外戚尚主異姓封王男皆公侯女食郡縣佩服五等輝耀一門湯沐山河家傳集作喻萬户耕夫織婦凡有幾人役彼有勞之人供臣無億之用集作無德之費縱蒙聖心再集作垂假其如神理不容自先后臨朝攀榮已久聖皇纂極沐澤惟新自古迄今如臣流輩苟進者速禍勇退者獲全且王者所以强幹弱枝為藩佐集作作屏封必李氏無闕漢文集作章㐲乞陛下降河渚之姻感渭陽之族賜臣軀命永守蒸嘗得同昆季之流望捨郡王之號臣以日為歲以榮為憂希廻三舎之光允臣萬死之請無任靦冒之至太陽虧為宰臣乞退表中宗蘇頲臣某等言伏見今月朔旦太陽虧陛下啓輟朝之典有司尊伐社之義臣等伏自㝷繹無任惴恐臣某中謝臣聞官或迷焉疑必犯先王之誅辰弗次舎必貽上公之責此乃邦有常刑聖有明訓頃者論道任重衮章猶缺端揆位隆鼎台是亞所以熙帝之載代天之工調六氣之和法三光之度則大化為本非小才所宜崇替率由咎徵斯屬伏惟應天神龍皇帝陛下光被四海對越二儀人祇宅心俊賢翹首但置之左右以為輔弼自忠言啓沃功臣保乂用作霖雨格于皇天臣何人斯而敢叨擬議臣等智能素薄經術殊陋望不過於掾史名不達於州閭徒以遭逢盛明頗皆履歴叅廟堂之機密為宗族之光寵者十數年于今矣忠肅恭懿遠謝八元之名進善退惡近慙二君之美陳平有言嘗則不稱賈翊延誚居然己得光陰久馳年禮俱逮自應屏黜以清彛序而徘徊聖恩萬一希效僶俛殘歲甲子空多遂超總領之司愈失具瞻之望將何以匡翼庶政儀刑師屬且視事而老才愧千秋之賢待罪安歸憂深萬石之裔久知塵穢寧虞負乘所以素飡加責聚諠於下薄蝕生災見昭於上天之所戒臣不可逃陛下矜而宥之未致于理伏乞收其印綬賜以骸骨則知胡廣罷位抑有前聞徐防免官復自兹始臣竊其幸物誰不宜懇到所祈惶怖交集無任切迫之至辭官歸滑州表李邕開元中臣邕言臣素無藝能積負訕謗衆多之口自可銷金怨讎之心每堪殞首伏惟陛下至明大聖察之纖微盛德在人洗之瑕穢山川納者不擇薰蕕天地覆之是霑雨露且久荷惠渥大抵官榮今臣蒙國恩私及驅疑作軀命事出涯分之外恩加父母之深已逝之魂復歸朽質既安之地尚忝高班雖欲殺身未能報主彌慙持祿有以保名但秋燕將辭必徘徊於大厦老馬雖去終顧步於華軒况臣今兹六十有七光陰荏苒行止一作上下欹危就木之時不知幾日懸車之歲僅有三年即以今日歸州不任違遠涕戀之極謹奉表以聞為董江夏乞退表蕭宗元結臣某言月日敕賜某官某乙至賜臣制書示臣云云者臣伏見詔旨感深驚懼臣豈草木不知天心頃者潼關失守皇輿不安四方之人無所繫命及永王承制出鎮荆南婦人童子忻奉王敎意其然者人未離心臣謂此時可奮臣節王初見臣謂臣可任遂授臣江夏郡太守近日王以寇盜侵迫摠兵東下傍牒郡縣皆言巡撫今諸道節度以為王不奉詔兵臨郡縣疑王之議聞於朝廷臣則王所授官有兵防禦隣郡並邑疑臣順王旬日之間致身無地臣本受王之命為王奉詔王所授臣之官為臣許國忠孝集作正之分臣實未虧蒼黃之中死幾無所不圖今日得達聖聰集作聽臣今集作今臣年將六十老母在堂縱未能奉義捐生則豈忍兩忘忠孝臣少以文學為諸生所多中年至耳順逸在山澤聖明無事甘為外臣無何以鄙僻之故返為人知遂汙官次以至今日臣又頃年貶謫罪未昭洗今所授官復超越班秩罷歸待罪是臣之分今陛下以王室艱難寄臣方靣臣亦已忘身許國誓於皇天伏惟陛下念臣懇至謹因敕使臣某官奉表以聞代于京兆請停官侍親表代宗獨孤及臣某言臣聞審官而用者君上之明也量力而動者人臣之義也然則審官先於責實量力在於知止苟違斯道是必終凶臣以薄劣素空行藝遭逢際會累忝驅馳自受京尹向逾周月上無報國安民之效下乏推賢審己類表作進善之能官謗日深内省知愧伏以去年冬末迄于今日竊聽閭閻頗有流散在于京輦亦多攘奪臣兄枉橫為賊所傷哀苦之中忍恥尤甚雖久令分捕而竟未就擒臣之無能於兹可驗偷安重任夫亦胡顏况臣同氣數人相次淪没閨門之内哭不絶聲應由臣無德而祿召此殃釁興言感慕痛骨摧心又臣老母素多羸瘵近從數載頗益沉綿臣妻先亡無人侍側飲膳衣服臣悉躬親頃任京兆少尹中間又司帑藏雖稱要劇亦有餘閒臣每退朝便道暫視方藥自公言歸早見安否老母以數在左右都忘呻吟及臣典領大府事繁務切雞鳴而出暮夜方歸清晝之時莫見親靣凡所服餌或非調適心有未快類表作愜疾亦轉侵在臣燋灼類表作惶啓處無地專力養則有妨吏職狥公事則闕奉慈顏忠孝兩虧紀綱將廢以天倫哀緒未平之日憂老母方寸已亂之時雖欲自强必不勝任倘漸荒府政小紊朝經類表作章他日噬臍固將何及或當重責已負前恩是敢泣血祈天瀝肝請命特乞免臣所職就養私門非惟有光孝理實亦少裨𤣥化龜蛇賤類上報何階烏鳥微情反哺斯足無任懇願迫切之至謹詣右銀臺門奉表陳乞以聞誠惶誠恐頓首頓首文苑英華卷五百八十
