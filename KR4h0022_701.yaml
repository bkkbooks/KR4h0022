body:
  text: 文苑英華卷七百二宋李昉等編文集四李公中集序一首刑部侍郎孫文公集序一首齊昭公崔府君集序一首獨孤常州集序一首禮部員外郎陶氏集序一首信州刺史劉府君集序一首趙郡李公一作華中集序獨孤及志非言不形言非文不彰是三者相為用亦猶涉川者假舟楫而後濟自典謨缺雅頌寢世文粹作王道陵夷文教集作亦下衰故作者往往先文字後比興其風流蕩而不返乃至有飾其詞而遺其意者則潤色愈工其實愈喪及其大壞也儷偶章句使枝對葉比以八病四聲為梏拲拳拳守之如奉法令聞臯陶史克之作則呷然笑之天下雷同風馳集作驅雲趨文不足言言不足志亦猶木蘭為舟翠羽為楫玩之於陸而無涉川之用痛乎流俗之惑人也久集作舊矣帝唐以文德敷乂集作祐于下民被王風俗稍丕變至則天太后時陳子昻以雅昜鄭學集作園者浸而嚮方天寶中公與蘭陵蕭茂挺長樂賈幼幾勃焉復起用三代文章律度當世集作振中古之風以𢎞文德公之作本乎王道大抵以五經為泉源抒情性以託諷然後有歌詠美教化獻針諌然後有賦頌懸權衡以辨天下公是然後有論議至若記叙編録銘鼎刻石之作必採其行事以正褒貶非夫子之㫖不書故風雅之指歸刑政之根本集作本根忠孝之大倫皆見於詞然後中古之風復形於今集無此十字于時文士馳鶩颷扇波委二十年間學者稍厭抑揚集作折揚黃華而窺咸韶集作池之音者什五六識者謂之文章中興公實啓之公名華字遐叔趙郡人安邑令府君第三子質直而和純固而明曠逹而有節中行而能斷孝敬忠廉根於天機執親之喪哀逹神明而文粹作其任職釐務集作續外若坦蕩而內持正性謙而不犯集作諌不犯顔見義乃勇舉善惟懼不及務去惡如復讐與朋友交然諾著於天下其偉詞麗藻則和氣之餘也學博而識有餘才多而體愈迅每述作則筆端集作鋒風生聽者耳駭開元二十三年舉進士天寶二年舉博學宏詞皆為科首由南和尉擢祕書省校書郎八年歷伊闕尉當斯時唐興百三十餘年天下一家朝廷尚文夫羿工乎中微拙於使人無己譽公才與時并故不近名而名彰時輩歸望如鱗羽之於虬鸞也十一年拜監察御史㑹權臣竊政集無政字柄貪猾當路公入司方書出按二千石持斧所嚮列郡集作郡邑為肅為姦黨所嫉不容於御史府除右補闕祿山之難方命圯族者蔽天聰明勇者不得奮明者不得謀公危行正詞獻納以誠纍陳誅凶渠完封疆之䇿閽犬迎吠故書留不下時繼太夫人在鄴初潼關敗書聞或勸公走蜀詣行在所公曰奈方寸何不若間行問安否然後輦母安輿而逃謀未果為盜所獲二京既復坐謫杭州司功參軍太夫人棄敬養公自傷悼以事君故踐危亂而不能安親既受汚非其疾而貽親之憂及隨牒願終養而遭天不弔由是銜罔極之痛者三故雖除喪抱終身之戚焉謂志已虧文粹作厭息陳力之願焉因屏居江淮間三字集作江南省躬遺名誓心自絶無何詔復授左補闕又加尚書司封員外郎璽書連徴公卿以下傾首延佇至止之日將以司言處公公曰焉有隳節辱志者可以荷君之寵乎遂稱集作移病請告故相國梁公峴之領選江南也表為從事加檢校吏部郎中明年遇風痺徙家於楚州山陽縣五字集作楚州文粹作山陽疾痛貧甚課子弟力農圃贍衣食集作服雅好修無生法以冥寂思慮視爵祿形骸與遺土同唯吳楚之士君子撰家傳修墓版及郡集作都邑頌賢守宰功德者靡不齎貨幣越江湖求文於公得請者以為子孫榮公遇勝集作暇日時復綴録以應其求過是而往不復著書素素字集作少時所著者多散落人間自志學至校書郎己文粹作以前八卷并常山公主志文竇將軍神道碑崔河南生祠碑禮部李侍郎碑安定三孝論哀舊遊詩韓幼深避亂詩序祭王端員外沈起居興宗裴員外騰文别元旦詩并楊騎曹集序王常山碑並因亂失之自志學至失之集本無此八十六字文粹有之名存而篇亡自監察御史已集作以後迄至于今所著述者公長男集作子羔字宗叙編而集之斷自監察御史巳前十卷號為前集其後二十卷頌賦詩碑表叙論志記讚祭文凡一百四十四集作三篇為中集其中陳王業則無疆頌議世道則原卜論質文論主文而譎諌則言醫含元殿賦敦禮教則哀節婦賦靈武二孝讃與外孫女二孩書表賢逹盛德則元魯山碣房太尉頌德銘集作德政碑崔賔客集序平原張公頌梁國李公傅德先生誄權著作墓表集作志李夫人傳盧夫人頌一死一生之間抒其交情則祭蕭功曹劉評事張博士文吟詠情性逹於事變則詠古詩辨卿大夫族姓則盧監察神道碑思舊則三賢論自叙則别相里造范倫序詮集作論佛教心要而會集作合其異同則南泉真禪師左溪郎禪師碑其餘雖比興集作波瀾萬變而未始不根於道德集作典謨故覽公之文知公之質不俟覿容貌聽詞氣而後覩其行集無此五字若使集作假令束帶立於史臣之位具備獻替集無此四字足以潤色王度正一代之訓典集無此六字天而病之國集作時不幸也集作歟然遐叔身甚病而心甚壯文益贍而才不竭則前路逸氣詎可度矣他日繼於此而作者當為後集及常遊公之藩也久故録其述作之所以然著于篇然遐叔至著于篇五十八字集本作公之病也嘗以斯文見託詒某書曰桓談論揚雄當有身後名華亦謂足下一桓談也及於公才宜播其述作之美明於後人故拜命之辱而不讓今著其文德冠於篇首焉字宗序集作字宗緒自應舉至及第五卷經亂離致失自南和尉至校書郎三卷因亂離亦致失自校書郎至伊闕尉監察御史十卷為中集在苕處自補闕至員外郎二十卷正文具如此集其齊平陽志銘在伊闕時集中其常山公主志文竇將軍神道碑洞𤣥生碑安定三孝論祭户部裴員外文崔河南生祠碑禮部李侍郎碑哀舊遊詩韓幼深避亂詩序楊騎曹集序並遺失求不獲自應舉以下集有此一百四十字文粹無之自志學至失之一假八十六字與篇末一百餘字大槩相同或當時初草如此姑從英華兩存之文粹集本則互有去取今注逐假之下刑部侍郎贈右僕射孫文公集序顔真卿古之為文者所以導逹心志發揮性靈本乎詠歌中乎雅頌帝容作而君臣動色王澤竭而風化不行政之興衰實繫於此然而文勝質則繡其鞶帨而血流漂杵質勝文則野於禮樂而木訥不華歷代相因莫能適中故詩人之賦麗以則詞人之賦麗以淫此其效也漢魏巳還雅道微缺梁陳斯降宫體聿興既馳騁於末流遂受嗤於後學是以沈隱侯之論謝康樂也乃云靈均已來此祕未集作未及覩盧黃門之序陳拾遺也而云道喪五百歲而得陳君若激昻頺波雖無害於過正權其中論不亦傷於厚誣何則雅鄭在人理亂由俗桑間濮上胡為乎綿古之時正始皇風奚獨乎凡今之代蓋不然矣其或斌斌彪炳郁郁相宣膺期運以挺生奄寰瀛而首出者其唯僕射孫公乎公諱逖河南鞏人其先自樂安武水寓于涉而徙集作從非焉父嘉之以詞學登科官至宋州司馬公風裁徴明天才傑出學窮百氏不好非聖之書文統三變特深稽古之道故逸氣上濟而髙情四逹羌索隱乎渾元之始表獨立乎集作於常均之外不其盛歟年數歲即好屬文十五時相國齊公崔日用試土火爐賦公雅思遒麗援翰立成齊公駭之約以忘年之契爾後遂有大名故其試言也年未弱冠而三擅甲科吏部侍郎王丘試竹簾賦降階約拜以殊禮待之相國燕公張說覽其策而心醉其序事也則伯樂川記及諸碑記集作志皆卓立千古傳於域中其為詩也必有逸韻佳對冠絶當時布在人口其詞言也則宰相張九齡欲掎托疵瑕沉吟久之不能易一字公之除庶子也苑咸草詔曰西掖掌綸朝推無對議者以為知言凡斯夥多庸可悉數故燕國深賞公才俾與張九齡許景先韋述同遊門庭命子均垍申集作施伯仲之禮江夏李雍自陳州入計繕寫其集齎以詣公託知已之分其為先逹所重也如此公又雅有清鑒典考功時精核進士雖權要不能逼所奬擢者二十七人數年間宏詞判等入甲第一無此字者一十六人授校書郎者九人其餘咸著名當世已而多至顯官明年典舉亦如之故髙集無此字第者必稱孫公而己夫然信可謂人文之宗師國風之哲匠者矣公凡所著詩歌賦序䇿問贊碑志表疏制誥不可勝紀遭二朝之亂多有散落子宿絳成等夙奉過庭之訓咸以文章知名同時臺省乃集作仍編次公文集為二十卷列之於左庶乎好事者傳寫諷誦以垂乎無窮亦何必藏名山而納石室也門生文粹無此二字金紫光祿大夫檢校刑部尚書上柱國魯郡開國公顔真卿昔觀光乎天府實荷公之奬擢見命為序豈究端倪時則永泰元年仲秋之月也至若世系閥閲蓋存諸别傳此不復云齊昭公崔府君集序崔祐甫天以日月經緯為文地以丘陵川澤為文剛柔雜也其施於人也鍾磬竽瑟文其樂九章三贄文其禮典謨詠歌文其言國之大臣業參政本發揮皇王之道必由於文故虞有臯陶洎益稷以嘉言啓迪舜禹以降伊傅周召訓命䇿誥並時而興秦之李斯著事而僻自兹厥後蜀丞相孔明有出師表晉司空茂先有鷦鷯賦皆輔臣之文也財成陶冶於是見焉我族叔父齊昭公諱日用佐命中朝光照千里玉山雲海逈然昭曠德宇道源深入其極弱冠鄉貢進士擢第周歷臺署振耀雄名𤣥宗之在臨淄邸也公常遭逢於路先幾洞鑒式瞻異表還避禮記作辟而拜契合雲龍及唐元夷內難參謀輔翊天推大寶事協經綸入為將相變疑作燮諧戡靜道應元臣其大才明識如是公薨五十載嗣孫起居舍人儒以文事主便蕃禁闥追懷前烈思有以發揚垂裕奉昭公之文集以請焉伏覽碑頌志論章表贊序凡五十餘首詩幾三百篇卓爾孤標氣髙調逺若雅琴度曲衆音無味則我逺柤長岑濟北雕龍之美昭公能纘承矣公嗣子宗學通古訓詞髙典冊才氣聲華邁時獨步仕於開元中為起居郎再為尚書禮部員外郎遷本司郎中時文國禮十年三人終於右司郎中年位不充海內歎息儒即右司之子有瓊瑩之質鸞鳯之章家國之寶也重名清貫三代於兹昭公之後其大矣祐甫先君左僕射與昭公道藝敦睦故贈答詩云棣華襲韡蕚桂樹連芳根又接閈共懷鉛齊生爼賁玉祐甫之生也後不及昭公之當代儒曰叔父當代序故叙焉獨孤常州集序李舟見獨孤集傳曰物生而後有象象而後有滋滋而後有數數成而文見矣始自天地終於草木不能無文也而况於人乎且夫日月星辰天之文也丘陵川瀆地之文也羽毛彪炳鳥獸之文也華葉彩錯草木之文也天無文四時不行矣地無文九州不别矣鳥獸草木之無文則混然而無名而人不能用之矣人無文則禮無以辨其數樂無以成其章有國者無以行其刑政立言者無以存其勸誡文之時用大矣哉在人賢者得其大者禮樂刑政勸誡是也不肖者得其細者或附㑹小說以立異端或言逺二字集作雕斫成言以禆對句或志近物而集作以玩童心或順庸聲以諧俚耳其甚者則矯誣盛德汙衊風教為蠱為盜集作蠧為妖為孽噫文之弊有至是者可無痛乎天后朝集作時廣漢陳子昻獨泝潰波以趣清源自兹作者稍稍而出先大夫嘗因講文謂小子曰吾友蘭陵蕭茂挺趙郡李遐叔長樂賈幼幾洎所知河南獨孤至之皆憲章六藝能探古人述作之㫖賈為𤣥宗巡蜀分命之詔歷歷如西漢時文若使三賢繼司王言或載史筆則典謨訓誥誓命之書可倣佛於將來矣嗚呼三公皆不處此地而連蹇多故惟獨孤至常州刺史享年亦促豈天之未欲振斯文耶小子所不能知也已矣常州諱及有遺文三百篇安定梁肅編為上下帙分二十卷作為後序常州愛士而肅最為所重討論居多故其為文之意肅能言之比葬博陵崔貽孫又為神道碑悉載行事而痛其不登論道之位崔公剛而好直其詞不黨君子謂之知言昔班孟堅美漢得人之盛曰文章則司馬遷相如又曰劉向王褒以文章顯是則四君子者有漢之文雄歟然而遷無鄉曲之譽虧大雅明哲保身之美集作義相如薄於貞操有滌器受金之纍向無威儀遺文以繆而身幾不免褒多為歌頌當時議者以為淫靡不急其他無聞焉大較詞人多陷輕躁否則愞狹迂僻於事放弛其能蹈履中道可為物主者寡矣孰與常州發論措詞皆王霸大略孝悌之至逹於神明善於集作與人交久而敬之當官正色不畏強禦加之以仁惠愛物吏民敬畏集作鄉而文又如是乎其餘則三集作二是君既言之矣今亶録崔氏之作綴於篇末云爾禮部員外郎陶氏集序顧况樂殷上帝上帝臨下俾夫文星驚動民心二南六義在乎章句安樂哀思在乎音響君子入其國觀其樂知其教制氏出漢書徒備乎鏗鏘此言之大傳稱不朽易曰尚詞唐詞臣姓陶氏諱幹冀方思深之裔前漢青後漢謙東晉侃至靖節貞白二先生生人表秀間朝有在方守省署慶鍾於君開元十八年進士上第天寶文明載登宏詞拔萃兩科纍陟太常博士禮部員外喉舌密勿壇場破的無發不中行在六經志在五言尤精賦序朝出暮遍殷如奮鐸聲塞海隅凡諸溺音蔚公之容風山籟靜然華實光于苑圃綦毋著作潜王龍標昌齡則其勍敵登公之門李膺之門也鮑馬二京兆中書謝舍人良弼良輔侍御史李封殿中劉全誠名自公出名著公器神人所怪寧貴不名詳矣大抵文體十年一更有體病而才贍有言紆而事直有文勝而理乖雅艷殊致雲和之源杳以無窮折為萬𣲖嗣子問儒為法官捧先人之集霜露之疾將訴於吾綦母通問之世友撫事編次咨於彛訓稽於故實是有冠篇之述乎哉信州刺史劉府君集序上天文明以配我朝光照四海麗於百榖主文之臣如太皥之於勾芒先甲之士也公姓劉氏名太真天寶中與兄太冲登秀才之科蘭陵蕭茂挺目以丘門游夏官踐御史左史尚書紫微郎祕書監工刑部三侍郎時謂得人翕然趨義恐在其後君既聳善心親人色與人行加人言勝人在位者見君之如此物惡其上自然不容君既施政春煦物雨濡物風動物惠歸物在位者又聞君之如此主恩人望斯未之替竟免其官亮彼褊人不徴細故必獲他咎竊名之黨自此而堅然則於是清響不奮哮嘵有聲或以其言黷朝典賤子西嚮泣拜曰不然日月有蝕五星有孛故能成天之紀唐堯之時亦有才豎故能成堯之大夫國有蠧如樹之有蝎不敢篾焉役文之士懼禍之不暇朝夕度惕苟無深疵不敢言瑕春秋暮矣溫溫生疾竟終餘水之上君門深而不得覲舊邇而不得歸明主方覺而君己歿有文集三十卷遊名山而窺洞壑者略舉竒峯紀勝境至於鬼怪不可紀焉臨終賦詩意不忘本凡古人所詠山水遊仙田家之什脫罻羅走思以自適其可得乎奄忽之辰以况從表兄弟平生相愛手運遺札心存顧託家子諷構厥德不忘前好得而叙之文苑英華卷七百二
