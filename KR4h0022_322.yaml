body:
  text: 文苑英華卷三百二十二宋李昉等編花木二梅花二十首芙蓉花九首蓮荷七首石榴八首海棠七首玫瑰二首玉蘂二首薔薇四首菊花十二首蜀葵四首梅花雪裏覓梅花梁簡文帝絶訝梅花晚爭來雪裏窺下枝低可見髙處逺難知俱羞惜睕露相讓道腰羸定須還剪綵學作兩三枝以下六篇並見初學記梅花吳筠梅性本輕蕩世人相陵賤故作負霜集作雪花欲使綺羅見但願深相知千摧非所戀早梅何遜兔園標物序驚時最是梅御霜當路發映雪擬寒開枝橫却月觀花繞陵風臺朝灑長門泣夕駐臨卭杯應知早飄落故逐上春來和孔中丞雪裏梅花王筠水泉猶未動庭樹已先知翻光同雪舞落素混一作泊氷池今春競時發猶是昔年枝唯有長憔悴對鏡不能窺同蕭左丞詠摘梅花庾肩吾窗梅朝始發庭雪晚初消折花牽短樹攀叢入細條垂氷溜玉手含刺冒春腰逺道終難寄馨香徒自饒梅花庾信常年臘月半已覺梅花闌不信今春晚俱來雪裡看樹動懸氷落枝髙出手寒早知覓不見真悔著衣單在蜀正朝摘梅張說見集本蜀地寒猶暖正朝發早梅偏驚萬里客已復一年來庭梅張九齡芳意何能早孤榮亦自危更憐花帶弱不受歲寒移朔雪那相妒隂風已屬吹馨香雖尚爾飄蕩復誰知和常州崔使君詠後庭梅二首孫逖聞唱梅花落江南春意深更傳千里外來入越人吟弱幹紅粧倚繁香翠羽尋庭中自公日歌舞向芳隂二梅院重門掩遙遙歌吹邊庭深人不見春至曲能傳花落彈碁處看來薦枕前使君停五馬行樂此中偏官舍早梅張謂階下雙梅樹春來畫不成晚時花未一作易落隂處葉難生摘子防人到攀枝畏鳥驚風光先占得桃李莫相輕早梅戎昱一樹寒梅白玉條迥臨村路傍溪橋不知絶句時選作應緣近水花先發疑是經春一作冬雪未銷和薛秀才尋梅花同飲見贈白居易勿驚林下發寒梅便試花前飲冷杯白馬走迎詩客去紅筵鋪待舞人來歌聲怨處微微落酒氣薰時漸漸開若到嵗來集作寒無雨雪猶應醉得兩三回梅杜牧見集本輕盈照野水掩斂下瑶臺妬雪栁相比欺春不逐來偶同佳客見似為凍醪開若在秦樓畔堪為弄玉媒酬崔八早梅有贈兼見示之什李商隱知訪寒梅過野塘久留金勒為回腸謝郎衣袖初翻雪荀令薰爐更換香何處拂胸資蝶粉幾時塗額藉蜂黃維摩一室雖多病要舞集作亦要天花作道場時余在惠祥上人講下故崔落句梵王宫地羅含宅賴許時時聼法來人日梅花病中作李羣玉去年今日湘西寺獨把寒梅愁斷腸今年此日江邊宅卧見瓊枝低壓墻半落半開臨野岸團情團思醉韶光玉麟寂寂飛斜月素艷亭亭帶雜詠作對夕陽已被兒童苦攀折更遭風雨雜詠作雪損馨香洛陽桃李漸撩亂回首行宮春景長江梅鄭谷見集本江梅且緩飛前輩有歌詞莫惜黃金縷難忘白雪枝吟看歸不得醉嗅立如癡和雨和烟折含情寄所思梅前人江國正寒春信穩嶺頭枝上雪飄飄何言落處堪惆悵直是開時也寂寥素艷照樽桃莫比孤香粘袖李須饒離人南去腸應斷片片隨鞭過楚橋梅花羅隱吳王醉處十餘里照野集作夜拂衣今正繁經雨不隨山鳥散倚風疑共路人言愁憐粉艷飄歌席靜愛寒香撲酒樽欲寄所思無好信為君惆悵又黃昏人日新安道中見梅花其年以徐冠停舉前人長途酒醒臘天寒嫩蕊香英撲馬鞍不上夀陽公主面憐君開得却無端芙蓉賦得涉江採芙蓉梁孝元帝見初學記江風當夏清桂楫逐流縈初疑京兆劒復似漢冠名荷香風送逺蓮影向根生葉卷珠難溜花舒紅易輕日暮鳬舟滿歸來度錦城同前孔德紹蓮舟泛錦磧極目眺江干沿流楫渡易逆浪取花難有霧疑川廣無風見水寬朝來採摘倦詎得久盤桓同心芙蓉朱超青山麗朝景𤣥峰朗月類聚作夜光未及清池上紅渠並出房日分雙蒂影風合兩花香魚驚畏蓮折龜上礙荷長雲雨流輕潤草木應嘉祥徒歌江上類聚作涉江曲誰見緝為裳同前灼灼荷花瑞亭亭出水中一莖孤引緑雙影共分紅色奪歌人臉香亂舞衣風名蓮自可念况復兩心同芙蓉辛德源洛神挺凝素文君拂艷紅麗質徒相比鮮姿樂府作彩難兩同光臨照波日香隨出崖風涉江良自逺託意在無窮採芙蓉唐太宗見初學記結伴戲方塘携手上雕航船移分細浪風散闕小注動浮香游鶯無定曲驚鳬有亂行蓮稀釧聲斷水廣棹歌長棲鳥還密樹泛流歸建章秋朝木芙蓉李嘉祐水面芙蓉秋已衰繁條倒是著花時平明露滴垂紅臉似有朝愁集作開暮落悲闕下芙蓉包何見類詩一人理國致升平萬物呈祥助聖明天上河從闕下過江南花向殿前生慶雲垂䕃開難落湛露為珠滿不傾更對樂懸張簨簴歌工欲奏採蓮聲重臺芙蓉李德裕芙蓉含露時秀色波中溢玉女攏集作襲朱裳重重映皓質晨霞耀丹景雜詠作紫片片明秋日蘭澤多衆芳妍姿不相匹蓮荷秋池一株蓮張執恭秋至皆虛落淩波獨吐紅託根方得所未肯即從風重臺蓮李紳緑荷舒卷凉風曉紅蕚開縈紫的重游女漢臯爭笑臉二妃湘浦並愁容自含秋露貞姿潔不曉春妖冶態穠終恐玉京仙子識却持歸種碧池中南池嘉蓮姚合芙蓉池裏一作上葉田田一本雙枝集作花照碧泉濃麗集作淡共妍香各散東西分艷葉相連自知政術無他異縱是禎祥亦偶然四野人聞皆盡喜爭來入郭看嘉蓮永樂殷堯藩明府縣池嘉蓮詠雍陶青蘋白石匝蓮塘水裡蓮開帶瑞光露濕紅芳雙朵重風搖緑帶一枝長同心栀子徒誇艷合穗嘉禾豈解香不獨豐祥先有應更宜花縣對潘郎荷花李商隱都無色可並不奈此香何瑶席乘凉設金羈落曉集作晚過覆集作回衾燈照綺渡襪水沾羅預想秋前集作前秋别離居夢櫂歌和太常杜少卿東都修竹里有嘉蓮溫庭筠春秋罷注真銅龍舊宅嘉蓮照水紅兩處龜巢清露裏一時魚躍翠莖東同心表瑞荀池上半面粉粧樂鏡中應為臨川多麗句故持重艷向西風蓮蘂鄭谷移舟水濺差差緑倚檻風斜集作搖柄柄香多謝浣沙集作溪人莫折雨中留得蓋鴛鴦石榴摘安石榴枝贈劉孝威塗林安石榴也王筠中庭有竒樹當户發華枝素莖表朱實緑葉厠紅蕤既標太冲賦復見安仁詩宗生仁夀殿族代疑作茂河陽湄有美清淮比如玉又如龜退書寫蟲篆進對多好辭我家新置側新置側已鄰居可求不難識相望阻盈盈相思滿胸臆髙枝為君採請寄西飛翼石榴孔紹安可惜庭中樹移根逐漢臣只為來時晚開花不及春玩郡齊海榴宋之問澤國韶光早開簾延霽天野禽宵未囀山蜚書仍眠目兹海榴發列映巖楹前熠爚禦風靜葳蕤含景鮮清晨緑堪佩亭午丹欲然昔忝金閨籍嘗見玉池蓮未若宗族地更逢榮耀全南金雖自貴貿一作質賞詎一作誰能遷撫躬萬里絶豈染一朝妍從祿滯遐郡賞疑作常是惜流年越俗鄙章甫捫心空自憐同和詠樓前海石榴二首孫逖客自新亭郡朝來數物華傳居妓樓好初落海榴花露色珠簾映香風粉壁遮更宜林下雨日晚逐行車二海上移珠木樓前詠所思遙聞下車日正在落花時舊緑香行蓋新紅灑步棊疑作綦從來寒不易終見久逾滋題韋潤州後亭海榴李嘉祐見集本江上年年小雪遲年光獨報海榴知寂寂山城風日暖謝公含笑向南枝韋中丞西㕔海榴皇甫冉海流爭讓候榴花犯雪先開內史家末客朝朝鈴閣下從公步履玩年華題山石榴花白居易見集本一叢千朵壓欄干剪碎紅綃却作團風嫋舞腰香不盡露銷粧臉淚初一作新乾薔薇帶刺攀常懶菡蓞生泥玩亦難不及此花簷戶下任人採弄盡上聲人看海棠左掖海棠詠王維閒灑階邊草輕隨箔外風黃鶯弄不足銜向集作入未央宮海棠前人海邊佳樹生竒彩知是仙山取得栽瓊蕊籍中聞閬苑紫芝圖上見蓬萊淺深芳蕚通宵換委積紅英報晚開寄語春園百花道莫爭顔色泛金杯海棠薛能酷烈復離披𤣥功莫我知青苔特疑長處暮栁間開時常醉遊人插連隂彼叟移晨前清露濕晏後惡風吹香少傳何許妍多盡半遺島蘇漣水脉庭綻粒松枝偶泛因沉硯閒飄欲亂棊繞山生玉壘和郡遍坤維負賞蘄一作慙休飲牽吟分失飢明年應不見留此贈巴兒題磁嶺海棠花溫庭筠幽態竟誰賞嵗華空與期島回香盡處泉照艷濃時蜀彩淡搖栧吳粧低怨思王孫又誰恨惆悵下山遲擢第後入蜀經羅村溪路見海棠盛開偶有題詠鄭谷上國休誇紅杏樹深溪自照緑苔磯一枝低帶流鶯睡數片狂隨集作和舞蝶飛堪恨路長移不得可無人與畫將歸手中已有新春桂多謝烟香更惹集作入衣海棠前人春風用意勻顔色銷得携觴與賦詩艷麗最宜新著雨嬌嬈全在欲開時莫愁粉雜詠作淺黛臨窗懶梁廣丹青㸃筆遲朝醉暮吟看不足羡他蝴蝶宿深枝蜀中賞海棠前人濃淡芳春滿蜀鄉半隨風雨斷鶯一作人腸浣花溪上堪惆悵子美無情為發揚玫瑰奉和中書李舍人昆季詠玫瑰花寄徐郎中盧綸獨鶴寄烟霜雙鸞思晚芳舊隂依謝宅新艷出丘墻蝶起搖輕露鶯銜入夕陽雨朝勝濯錦風夜劇聞香斷燒千重熖孤霞一片光密來驚葉少動處覺枝長布影期髙賞留春為逺芳嘗聞贈瓊玖叨和愧登堂同前司空曙仙吏紫薇郎竒花共玩芳攢星排緑帶照眼發和光暗妒翻階葉遙連直署香透枝蜂繞易礙刺鳥銜妨露濕凝衣粉風吹散蘂黃䝉籠珠樹合煥爛錦屛張留客容看竹思人比愛棠如當一作傳採蘋詠逺思滿瀟湘玉蘂唐昌觀玉蘂武元衡見集本琪樹年年玉蘂新洞宫長閉彩霞春日暮落英鋪地雪獻花無復九天人唐昌觀玉蘂花詠楊巨源晴空素艷照霞門香灑天風不到塵持贈昔聞將白雪蘂珠宫上玉花春門字可疑别本作照霞新薔薇劉侍中宅盤花紫薔薇章孝標真宰偏饒麗景家當春盤出帶根霞從聞一朵朝衣色免踏塵埃看雜花薔薇朱慶餘繞架雜詠作四面垂條密浮隂入夏清緑攢傷手刺紅墮斷腸英粉著蜂鬚膩光凝蝶翅明雨來雜詠作中看亦好况復值初晴朱秀才庭際薔薇方干繡難相似畫難成明媚鮮妍絶比倫露壓盤條方倒地風吹艷色欲燒春斷霞轉影侵西壁濃麝分香入四鄰看取後時歸故里爛花須讓一作庭花應謝錦衣新臨水薔薇李羣玉堪愛集作恨復堪傷無情不久長浪搖千臉淚集作笑風舞一身香集作叢芳後押香字似濯文君錦如啼一作窺漢女粧所思雲雨外何處寄馨香菊花賦得殘菊花唐太宗階蘭凝曙霜岸菊照晨光露濃晞曉笑風徑淺殘香細葉雕輕翠圓花飛碎黃還待初學記作將今嵗色復結後年芳秋菊駱賔王擢秀三秋晚開芳十步中分黃俱笑日含翠共搖風碎影涵流動浮香隔岸通金翹徒可泛玉斚竟誰同東園玩菊白居易少年昨已去芳嵗今又䦨如何寂寞意復此荒凉園園中獨立久日淡風露寒秋蔬盡蕪沒好樹亦凋殘唯有數叢菊新開籬落間携觴聊自集作就酌為爾一流連憶我少小日易為興所牽見酒無時節未飲已欣然近從年長來漸覺取樂難常恐更衰老彊醉集作飲亦無歡顧謂爾菊花後時何獨鮮誠知不為我借爾暫開顔和錢員外早冬玩禁中新菊前人禁署寒氣遲孟冬菊初一作花折新黃間繁緑爛若金照碧仙郎小隱日集作月心似陶彭澤秋憐潭上看日慣籬邊摘今來此地賞野意潜自適金馬門內花玉山峰下客寒芳引清句吟賞集作玩烟景夕賜酒色偏宜握蘭香不敵淒淒百卉死嵗晚氷霜節有此花開時集作唯有此花開殷勤助君惜菊釋無可東籬搖落後密艷被寒催夾雨驚新折經霜忽盡開野香盈客袖禁蘂泛天杯不共春蘭並悠揚逺蝶來菊李商隱暗暗淡淡紫融融冶冶黃陶令籬邊色羅含宅裡香幾時禁重露實是怯斜集作殘陽願泛金鸚鵡升君白玉堂野菊苦竹園南椒塢邊微香冉冉淚涓涓已悲節物同寒鴈忍委芳心與暮蟬細路獨來當此夕清樽相伴省他年紫雲一作微新苑移花處不取霜栽近御筵詠夾徑菊薛能夾徑盡黃英不通人並行幾曽相對綻元是兩行生叢比髙低等香連左右并畔搖風勢斷中夾日華明間隔蛩吟隔交橫蝶亂橫頻應泛桑落摘處近前楹白菊許棠所尚雪霜姿非關落帽期香飄風外别影到月中疑發在林凋後繁類詩作開當露冷時人間稀有此自古乃無詩十日菊鄭谷節去蜂愁蝶不知曉來集作庭還繞折花集作殘枝自緣今日人心别未必秋香一夜衰白菊張蠙秋天木葉乾猶有白花殘舉世稀栽得豪家却畫看片苔相映緑諸卉獨宜寒幾度携佳客登髙欲折難菊羅隱籬落嵗云晏集作暮數枝聊自芳雪裁纎蘂密金折小苞香千載白衣酒一生青女霜春叢莫輕薄彼此有行藏蜀葵黃蜀葵薛能嬌黃新嫩類詩作蘂欲題詩盡日含毫有所思記得玉人初病較類詩作蘂道家裝束厭禳時黃蜀葵崔涯野欄秋景晚踈散兩三枝嫩蘖類詩作碧淺輕態幽香閒淡姿露傾金盞小風引道冠欹獨立悄無語清愁人詎類詩作不知蜀葵陳標眼前無奈蜀葵何淺紫深紅數百窠能共牡丹爭幾許得人輕處秪緣多蜀葵詠前人緑衣去地紅倡倡薰風似舞諸女郎南鄰蕩子婦無賴錦機春夜成文章文苑英華卷三百二十二
