body:
  text: 文苑英華卷二十九宋李昉等編地類五日觀賦二首羣玉山賦一首海門山賦一首土積成山賦一首聚米為山賦二首禹鑿龍門賦一首五丁力士開蜀門賦一首愚公移山賦一首日觀賦以千載之統平上去入為韻丁春澤大厯十年東都試登科録作丁澤日之升也浴海而麗天嶽之峻也切漢而臨邊登髙者以致九霄之上愛景者欲在萬人之先其所惟一其仭惟千伊風靈之有載彼日觀之存焉夫其夜刻未終曙色猶昧彼窮髙之極逺此有進而無退未辨昏明斯分覆載屢聞鳴鴈猶隂沉而不覩忽聽晨雞即曈曨而可愛於是漸出暘谷將離地維巖巒既秀草樹生姿氣則赫視疑作赩人皆仰之其望也如燭其照也無私昔者帝王御宇立極垂統封禪及此成功巡狩應其春仲莫不登茲絶頂遐燭大眀思煦嫗之義窮造化之精以為日象一人之德嶽是三公之名信王侯之設險俾夷狄之來平方今一德無為三光有象動植昭泰神祗肹蠁千嵒瑞色思效祉以爰升萬壑春雲欲入封而空上客有才乏羽儀心思騫翥每積聚螢之志難登望日之處引領終夕含情達曙如疑作知照燭之有期故躊躇而不去重曰日有觀兮絶代獨立登之望兮無逺不及何太陽之至精莫不専於出入第二以斜對杳冥中宵見日為韻泰嶽東南峯開一室傍接天路低臨曉日隂埋玉兔動霄漢之微眀曉報天雞越氛埃之逈出初其暝色葱蘢懸崖倚空獨出清虛之外遙分莽蒼之中隱霧猶白經天漸紅披草樹以燈亂耀波濤而血融及夫林嶺寒消煙雲色變星河寥落以初沒峯巒邐迤而徐見火動山頂輪移水面穿暗隟以飛鏡厯幽窗而走電至若門宇蕭條霜空泬寥晴開曙景暖入殘宵揚晶彩以赩赩散芒角而飄飄露灑文薄風牽影搖觀夫望極天涯生從地表扶弱木之歷歷出窮隂之杳杳萬壑收暝千巖送曉消古砌之晴雪動寒庭之宿鳥遙空冷滑傷寸晷之難留碧嶂岧嶤望孤光而漸小拔地生疾騰空影斜氣亂山燒光分水花絶壁孤危覺靈海之津狹炎輝咫尺信長安之路賒既而背暘谷以徐來泛圓靈之不礙䝉水氣以珠暗露松隂而璧碎霞色收錦天風斂黛披雲闕之斜視豁天門而俯對依簷乍吐威生齊魯之間過嶺逾眀煦及草茅之內由是逺挂寥落髙辭絶溟萬象焜煌而畢照六龍夭矯以無寧安得足踏聳峭手扶青冥陳白書之苦短請陽烏之暫停羣玉山賦以廓功峻登適招外逰為韻喬潭穆王與偓佺之倫為玉山之㑹乃御雲輦張華蓋飛龍騤騤和鸞噦噦警清蹕傳虛籟忽兮超遙漫若天外於是乎徙倚西望逶迤北逰梁弱水跨瀛洲析若木以為珮采琅玕以為羞俾幽荒窮僻有車轍馬跡經銀臺而右轉肆玉車犬以東適停羽儀乎此中觀仙聖之圖籍既而浮莽蕩躋崚神靈儼其髙㑹容衛紛其上騰若光若滅賁然來登觀其亭亭太虛不可彌度石室靈造玉堂天鑿寶牒有融仙經惟錯蕩青簡兮緑字煥瑶緘兮金絡護以虬龍拂之鸞鶴為列真之策府亦太乙之延閣覽之而羣聖㑹同拔之而萬古昭廓且藏書為寶鎮物為雄小石林之岝峉陋玉樹之青葱赫曥曥髙崇崇祕精義乎其中何必登隱坌按莊子篇登隱弅之丘當作弅拜崆峒挹方壺而訪道厯秦望而為功者哉至如窮地之險極天之峻疊素九成攢花萬仞非神轡之六駮孰能倐而驟進或歌之曰彼天子兮塵外鑣登靈臺兮意飄飄吾君得道兮異於是不日求兮自逍遙以石渠為羣玉之處幸校文之見招海門山賦以峭立如門古無易為韻周鉞一作鉞大壑天接雙山闕如作鎮而巍峩對峙象門而中外皆虛坼萬仞於長霄共持神秀納八紘之積水開閉靈居合㳫龍蟠連延壁立懸崖嶄崒而不動駭水喧豗而自急每使盈虧之月向裏升沉能令早暮之潮由茲出入故得周天柱作海門峻軋空碧髙城混元奔疊浪而若容車馬拔跳巒而似列藩垣當晴晝而纎露豁開一作眀大吞江漢值隂霾而濃雲交翳暗鎖乾坤外布雄稜內施巖嶠波聲相切以澎湃山狀並分而竦峭呀吳呻越揔舟楫之隄防發電興雷轄魚龍之衝要岌岌崇崇橫西截東風濤莫犯乎永固天地將齊乎不終况乎據是水德鑿非禹功海若抱關於其側陽侯擊柝乎其中彼岱輿因顓頊漂流太行為愚公遷易一則屹要道而徒在一則滔洪波而何適未若是山也専百靈捍禦表羣聖光宅吐晴虹以為楣森古木以成㦸故能咽喉水府掩映仙都長鯨透而謂呈魚鑰曉日照而疑唘金鋪以嶽而言巡八州而何有以門而一作為視指三海而則無異乎勢壓坤維氣連淮浦作巨浸含𢎞之閫為百谷委輸之户所以知開闢之𤣥功豈止亘億齡而窮萬古土積成山賦以貴其不已成此崇髙為韻彼山之峻兮稟氣而成此山之峻兮積壤所營何人功之彚聚致丘壑之崢嶸始假一抔已見進吾於往終成九仞還宜景行而行當其率性作勞因髙立址將覆簣而可久念極天而有俟道既長而彌専力雖勤而未巳於是資地勢建土功區區而日不暇給矻矻而樂在其中以不拒物為心因成髙大以不讓塵為德遂致穹崇所謂從微而至著有感而必通致峯巒而因人立跡侔造化而與古爭雄故得日就月將天長地久小既資於坎窞大豈遺於培塿匪辭形倦將欲必致於雲霄所兾道成亦以兼容之妍一作奸非不有始有卒乃勤乃勞依依漸長日日增髙以力為謀比大不唯於熊耳將勤喻學成功豈謝於牛毛是謂積小以稱竒裒多而為貴既稠疊於委輸亦縱橫於經緯則聚米者故不足云纍臺者於斯殊未所以塊然凝質崒爾成姿千峯可數五色無遺以此驗巨靈之神誠為怪也以此想愚公之事亦可凄其别有十載施勞三冬率是常負荷以相勉每勤求而自揣所兾必成無虞中毁儻若因我而出雲庶亦降神而在此聚米為山賦以習知山川之險易為韻蔣防至精者米至大者山伊巧心之可化諒措手之非艱始聚之時雖未離乎掌握象成之後若可極於躋攀昔馬援以炎徼未賓雄圖是急爰請兵以薄伐將越險而深入懼君意之未眀陳地形之久習既而辨襟帶分郡邑雖蠻貊千里亦可圍於寸眸岡巒萬重誠不過於數粒方髙髙而仰止異屑屑而俯拾逺近忽其豆分東西俄而玉立寫載既宣規模罔愆雪峯競聳雲嶺交連初疑栖畝之糧尚班于地漸似如坻之庾欲峻于天笑覆簣之難進訝髙陵之遽遷起自纎微有類積塵為嶽終非竒幻那同畫地成川且堅而不動者山之常逺而可識者人之智既分銖於忖度得道路之險詖所謂喻大於微圖難於易事非同於積纍跡豈涉夫詐僞故得户牖不窺要荒可知積廪於增麗因陳而究竒縮地勢於撮土之間孰云見小備山形於握粟之內何慮功虧近可得而立驗逺無勞於坐馳經營若神不愧巨靈之跡融結隨意將符真宰之規至矣哉曲盡人謀詳觀地險非羣玉而玉彩爭光異落星而星芒亂㸃然後師干可試隘􅊣可期不假斗筲之算因成指畫之資念彼愚公誰肯與其進也徴夫良將吾當學以聚之第二以明知險易冦敵成擒為韻獨孤鉉有山負固兮逺不可窺規模之於米兮了然可知象在其中則逺而視近積而能散故髙以就卑所以舉一隅而必狀投一溢而增危峙乃糗糧始覿必盈之積塵其糠粃俄分不讓之為爰將取法非曰作僞初識聚米之夫及為樂山之智同逺近無拔蛇之患殊輕重去壓卵之易善於陳者謂我幄內師謀昧於事者謂我軍前兒戲於是髙卑殊狀巖壑冉闢爰分杵臼之資寫彼丘陵之積持一撮之多謂能作固迷方寸之地已疑見敵操量鼓者早訝於拔山充糜粥者旋驚其茹石若其似朽疑駮如呀欲平防之於十手所指負之於五斗而盈無還三十之車侔於造化酷似五千之仞勢亦崇成且夫廪以筲藏域疑箕斂搜其存峯之實屹作捍邦之險削培塿而敝帚呈功吐嶔岑兮括囊未掩於是太白忽峙玉山宛呈簸持兮隂靈乍泄轉捧兮雲掌俄生偕病馬之岡莫知其逺指亡羊之路不見而眀然以小方大布新除舊有懷狗盜之虞無辭蟻壤之漏爰謀爰度方同數米之人為岡為陵不是傾倉之寇是知進退由已髙下在心克盡崇卑之勢難均筲斗之斟勿謂君前嘗巧事外求音功早登於九仞冦何逃於七擒禹鑿龍門賦以利濟生人功存聖德為韻陳山甫控引河源鑿山為門闢兩崖而龍蟠虎踞飛一帶而電激雷奔所以極疑作拯流離於品物佐含育於乾坤邈矣而髙蹤斯在巍然而詭狀斯存昔夏王披簡援圖盡力溝洫萬方附㑹以恭命百工子來而奉職畚鍤具而勢蹙風雲巖岫分而狀成閫閾波濤有路無非汲引之功鱗介攸居咸被生成之德異夫屹爾崖巘張為閈閎懸流赴勢以中注巨石乘危而下傾拉藂林而山靈叶贊回大壑而水怪奔驚故凝滯者得以流其惡昏墊者得以厚其生當其相地所宜兆人攸利山崢嶸而洞唘水噴薄而俄至湯湯浩浩俱成畎澮之流原隰陂池皆為生植之地道邁前古芳流後塵豈不以開濟之功莫大通流之用如神龍躍新渚魚迷舊津四載之勞終成於舜日九年之患空愧於堯人始也設以規模不資鈐一作鈐閉雲橫結駟之狀浪走髙車之勢廣濫觴之運水無不通禆造化之遺人無不濟茂績崇崇與流無窮豁岧嶤而分逺碧來浩渺而寫晴虹不愧錫圭之命寧慙拓土之功是以羲軒等美唐虞齊盛故當輝爍於帝圖不然何以應千年之聖五丁力士開蜀門賦以蠻國廓開遂通人俗為韻陳山甫伊山為蜀是曰蠻俗惟天俾秦厥生神人拔長蛇而贔屭闢廣岫之嶙峋在昔褒斜未通荒僰異域彼為夷國物産難究封疆罕測秦將欲廣其南冠其北張儀於是度其勢量其力假牛之計斯設饋女之功是克蜀王乃命力士闢髙山貪功叨餮志疑作忘情險難疑作艱捫峯巒於日側抉虺蜮於雲間將以砥嶄崒等躋攀振衣而力抗千嶂攘臂而威陵八蠻俄而白日蕩搖𤣥天忽霍鬼哭神怨風號霧廓怒髮森植雄心震躍灑珠汗以雹散瞪星眸而電落將欲斷煙靄排嵓崿謂巨靈之所拓蹂重林回絶壑疑夏后之所鑿吁可畏哉砰轟若雷虎視五嶽鯨吞九垓徒見其豁若谷嵽若堆橫隱嶙直崔嵬大應心踣髙隨手摧江標峻棧之形呀然地裂闕鬭髙峯之色若天開已而後患方唘前心莫遂喧闐兮乍進秦卒邐迤而全收蜀地道路無阻關梁有備聞五丁死而蠻黨移一徑通而秦人至雖共工之勇將觸也非雄雖項籍之力將拔也寧同曽未若擘秀嶺駭蒼穹今古攸賴華夷是通羽毛讋死以填谷草樹驚摧而墮空遂使鞭石之帝移山之公壯志難奪莫不慕其英風愚公移山賦丘鴻漸止萬物者艮㑹萬靈者人艮為山以設險人體道以通神是知山之大人之心亦大故可以議其利害也昔太行聳峙王屋作固千巖糾紛萬仞回互氷霜蓄而居夏凝結源流聫而飛泉積素爰有諄諄愚叟面茲林麓愴彼居之湫隘懲祁寒之慘毒激老氏之志且欲移山當算亥之年寧憂就木乃言日月無私照也山則蔽之春夏無伏隂也山則藏之傾阻我比屋擁隔我通逵我將拔本塞源使無孑遺得則為功之美否則為身之恥終當貽厥孫謀施於翼子於是協室而一乃心力荷擔而三夫傑起畚斫斯備其功聿修于澗于沼爰始爰謀一之日土墾石鑿二之日崩崖隕崿三之日夷峯彌壑雲林摧以蓋偃火石迸而星落爾其洞突堙塞隂陽以衍交錯飛禽走獸魄禠氣懾而不復巢居穴託王喬偓佺低徊頻蹙而無所驂鸞駕鶴山神操蛇聞之乃壯其功深其計將懼不已先謁于帝命夸娥二子發神威振猛厲始將怒目决眥終欲飇舉電逝遂乃幹碭莽挾崔嵬下拔乎三泉上衝乎九垓突兀雲動磅礴天回遽投雍朔而不復來世人始知愚公之逺大未可測已夸娥之神力何其壯哉儻若不收遺男之助荷疑從智叟之辨則居當困䝉往必遇蹇終為丈夫之淺今者移山之功既已成河兾之地又以平則愚公之道行客有感而歎曰事雖殊致理或相假多岐在於亡羊齊物同於指馬我修詞而忘倦彼移山之不捨吾亦安知夫無成與有成諒歸功於大冶文苑英華卷二十九
