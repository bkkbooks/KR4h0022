body:
  text: 文苑英華卷六百十八宋李昉等編刑法二為百僚請加王慈徴等罪罰表一首百僚賀恩制逆人親屬不為累表一首為將軍程處弼謝放流表二首為蘇宏暉謝罪表二首謝免罪表一首為人謝放父罪表一首請寛宥與張易之徃還人表一首請代父死表一首為百僚請加王慈徴等罪罰表武后李嶠臣某等言伏見逆人王慈徴等並擢自凡庸累承恩奨遂得叨榮秩職此禁戎任切爪牙寄同心膂而忠勤之志莫效於鷹鸇悖逆之愆反同於梟獍向使邪謀不洩隂計遂成将恐變起宫闈禍生肘腋此實靈祇之所切齒臣子之所寒心若但寘以恒科委之常憲何以明大憝之愆咎杜元㐫之覬覦望請汙其宫室轘之都市用遵雷電之象允叶春秋之義則衣冠塞望夷夏甘心無任憤切之誠謹冒死陳請臣某等誠惶誠恐頓首頓首死罪死罪謹言百僚賀恩制逆人親屬不為累表武后前人臣某已下文武官九品以上二千七百五十人等言臣等伏見今月九日恩制縁逆人親屬有能公勤清白者自當隨材擢用不以為瑕宜各坦懐佇收來効臣等仰承恩造伏誦徳音感戴屏營忭舞相屬臣某等誠歡誠喜頓首頓首死罪死罪臣聞父殛子興聖賢忠厚之教身死宗戮季末陵夷之道或罰不及嗣或禍并其族淳朴浸徃惻隠不逮於昆蟲一作蚊法令滋章網羅必及於麛卵天厭淫虐誕興明聖掃百王之餘弊張網羅而更理去貪殘而遂生育品物昭蘇哀獄訟而緩䖍劉寰瀛凱懌刻薄之風盡敦厚之化流猶且締想納隍凝情溝壑在予之㫖固以一作已刑于萬方拯物之心豈直解其三靣日者亂臣干紀巨猾㴞天将傾渤海之流且觸崑山之柱陛下傷澆浞之為變弔管蔡之不臧法雷電之威誅而不怨一作怒用春秋之義斷必以情擢其髪而葬其尸殱其魁而宥其黨漢主三夷之法黜而不行秦皇九族之刑矜而莫用至若𤓰連萍託枝附葉隨或玉石難分或淄澠易混俱削嫌疑之迹豈從寛大之文遷州貶縣纔示於小懲竄海投沙尚班於榮級則是我有大造於羣兇也而聖慈無已天澤踰隆並運四時乃錫造於平分之外不遺萬物尚加惠於曲成之表使枯朽之榦向秋而更榮窮涸之鱗在轍而能躍藏其疾而含其垢責其效而要其功雖魏士之私於外朝獲安反側商人之染於汙俗咸與維新無以匹此含𢎞方斯滌蕩陛下祚始鄷鎬嗣周家之忠信卜於瀍洛承夏鼎之休明三后在天日歆於盛徳四夷為守永慕於高義方當鬼神降福豈止黎庶歸心臣等沐道昌期叨榮顯列觀太平之徳禮聽中和之詩頌雨露之施徒仰於財成天地之仁豈議於酬答無任欣戴踴躍之至謹詣朝堂奉表陳賀以聞臣某等誠歡誠喜頓首頓首死罪死罪謹言為将軍程處弼謝集作辭放流表武后陳子昻糞土臣某言臣以殃舋姪搆㐫逆臣合宗族誅戮以顯國刑不謂天慈哀矜宥從寛典全臣骸骨生竄遐荒窮魂再造以崩以躍臣某中謝臣聞忠臣事君如子事父窮痛之至則呼所親何者君父恩深臣子懇切況臣䝉陛下恩遇如子於母今為子不孝為臣不忠長辭闕庭永殁荒裔悲窮痛恨荼毒誰依即使朽骨埋魂長滅泉壤懇誠莫展幽翳明恩實恐隠慝於君不盡臣節明神誅殛瞑目貽殃輙敢隳裂肝心罄竭誠懇殘喘冒死期少謝恩伏惟聖母神皇陛下哀矜集作憐垂察臣某中謝臣聞犬馬賤畜尚知主恩草木無心猶感徳化臣雖駑猥不足比人負榮懐恩能無感激臣山東孤賤一作子朝無親故性識愚鈍才無可堪非能矯迹立方一作身飾行軌物假借名譽為時吹嘘遂得宿衛階墀忝職郎将勤勞莫紀尸素已多任經十有三年竟無一階升録臣之駑劣於此可見而貪榮冒寵尚不知歸陛下應天受圖恢纂大業又不以臣駑鈍特見褒昇擢任中郎委以心膂在職未幾即校檢将軍纔逾一年又加正授未盈三載貴顯朝端寵渥隆崇莫與臣比臣每刻肌骨曉夜思惟臣以何功謬私天造超羣越輩顯赫明朝應由臣天性專愚志一守直一作志守一直行不負物心不愧神盡忠事君竭力養母所以聖慈幽鑒曲昭懇誠寵任無疑委同親近不然愚臣何取集作以叨此殊私集作恩臣兇險罪深母不終養爰初遘疾以至終亡天慈再三降醫賜藥酒脯珍膳繼踵臣門優問慇懃若同親戚臣之子母何徳於天子貴母榮恩禮重疊臣誠不孝至頑至嚚䝉此恩榮豈無感戴臣愚性為善不願人知非敢自矜用為僥倖皇天后土實見赤心臣徃任郎将之日陛下特以臣貧賜錢集作銀及綵臣以天恩非分矜憫賜臣懐戴之心祈懇宜報遂用於天宫寺寫經造像半為聖主半為老親臣以君親之恩所宜並報報是常理不合人知自爾造成實集作一無知者臣今日獲罪不合上言實以事君之心所宜罄盡善惡有隐恐負赤誠况集作恐臣長没黄泉無見聖日區區之意安可不陳臣每以陛下恩深微臣命淺常願湮宗滅族獲報萬分何圖誠効未申㐫孽先集逆天反道背徳孤恩汙辱門宗虧缺臣節此臣所以椎心泣血仰天號跳長負陛下之恩終無上報之日煩寃屠一作荼毒心肝以糜比者待罪幽囚已合殞身碎首為奉陛下賜書示諭照察臣心所以捧戴偷生假息殘喘令已蒙寛刑集作法兄弟獲全投竄遐荒甘禦魑魅臣之慶頼復何可言所恨亡母棄背即遭此禍几筵塗炭孤魂煢煢存者流離亡者哀痛辛酸幽顕為代所悲應由臣不孝不忠延此禍酷何以靣目下集作将見先臣何以心顔拜辭天闕生死無措永訣於今即以某月日部勒妻子奔波就道即應死滅結草幽泉伏願母母神皇陛下至尊寳神為萬姓加膳天下禔福以祐蒼生壽如集作若南山永永無極不勝戀慕感咽之至為将軍程處弼謝放流表武后前人臣某言臣無教訓家有逆子臣合湮集作汚宗滅族以顯國刑天慈哀矜放従流竄臣為慶賴已是非圖今月日遂䝉天恩以臣所坐流刑特從釋放窮骸朽骨一朝再生踴躍章惶再崩再隕前篇作罔知所措臣某中謝臣山東孤子朝無親故智集作性識愚魯非有材能陛下超羣越輩崇以榮寵昔任郎将十有三年遂無涓埃一階昇録自陛下踐極謬荷恩私冒寵叨榮超絶時輩越従郎将檢校将軍纔逾一年即加正授皆是宸眷非有因人寵渥崇隆前篇作隆崇莫與臣前篇作為比臣之孤賤貴前篇作榮顯知慙臣又㐫殃積罪甘投魑魅孤負陛下之恩永為遐荒之鬼肝腦塗地無以微酧豈謂天造曲矜恩及枯骨收骸溝壑反魄幽泉使魑魅窮魂重生聖日糞土殘命不滅荒陬負集作荷徳戴恩萬死無報不勝感荷再生之慶此篇五百九十卷重出前已削去為副大緫管營集作屯營大將軍蘇𢎞暉謝罪表武后前人臣聞獫狁不恭周王致其大戮将軍失律漢制被其嚴刑未有逆命矯天而逋釁皷之罰亡師沮衆遂寛戴社之誅伏惟天冊金輪皇帝陛下肅恭上帝子育羣生萬國所以宅心百蠻由其屈膝而契丹兇狡敢竊邉陲毒虐生靈暴殄天物皇兵順伐仗仁義以龔行窮寇姦回憑險阻而猶鬭臣等仁虧聖畧知集作智昧詭圖遂以熊羆之師挫於犬羊之旅誠合結纓軍壘抵罪國章陛下以堯舜深仁且緩三苗之伐禹湯罪已不與萬方之辜遂得齒劍餘魂更叅授鉞之任死綏之魄復同挾纊之恩四夷慕義以來甦三軍感恩而忭躍集作踴瘡痍再起俘馘是圖将士同心誓雪孟明之恥殤魂共憤思抗杜回之讐臣等殉義忘生報恩惟死不勝集作任感激慶戴之至同前武后前人臣某言伏奉某月日已前赦書赦臣萬死纔削見任官秩還復本將軍名始慶再生即榮寵命宛轉踴躍感戴慙惶臣某中謝臣聞鑿門受拜集作律本合忘生對敵臨戎殉節惟死此乃國家恒典軍政嚴科臣妄以薄集作庸才謬叨重任不能深圖逺筭馘醜摧㐫以宣廟畧之威永息邉人之患屬以軍前挫衂士卒奔亡臣後繼驅馳戰鬭交合川谷地險客主勢殊歩馬相懸左右受敵决死争命集作决命争死力盡途窮遂以貔貅之師衂於犬羊之衆誠合集作宜刎首謝罪集作國殺身報國集作恩陛下𢎞湯禹之仁務寛大之典愚臣同孟明之侣遂免嚴誅白骨在榮丹慊未冺誓将枕戈嘗膽殄逆梟㐫躬為士卒之先以雪殤魂之憤肝腦塗地少答鴻私不勝荷戴再生榮幸之至謝免罪表武后前人臣某言今月日司刑少卿郭某奉宣勑㫖以臣所犯特從放免伏對恩命魂魄飛揚臣某中謝臣巴蜀㣲賤名教未聞陛下降非常之恩加不次之命拔臣草野謬齒衣冠臣私門宗祖幽顯榮慶豈止㣲臣一身而已臣宜肅恭名節上答聖恩不圖誤識㐫人坐縁逆黨論臣罪累實一作死有餘辜肝腦塗地不足塞責陛下𢎞慈育之典寛在宥之刑矜臣草萊憫臣愚昧特恕萬死賜以再生臣身首獲全已是非分官服具在臣何敢安臣若貪冒寵私靦顔恩造復塵舊職以玷清猷螻蟻微心實慙靣目伏見南集作西有未賔之虜北有逆命之戎尚稽天誅未息邉戍臣請束身塞上奮命賊庭効一卒之力答再生之施庶陛下威命綏動集作服荒夷愚臣罪戾将補萬一若臣獲死鋒鏑為厲犬戎集作羊古人結草實臣懇願不勝大造再生荷戴之至為人謝放父罪表集作為張著作謝父官表武后前人臣某言臣父某守官不謹獲罪自躬犯非清亷法宜不赦實由臣為子不孝使臣集無臣字父陷刑憲天恩不盡集作肅嚴科放全首領臣得父子相見已是非圖豈謂天澤無涯更垂休命臣父子兄弟免罪従榮載惶載殞實慶實躍臣某中謝臣父子凡品守道幽微天恩矜憐集作憫見垂採録叨承恩幸厠列陪臣自得侍奉已來於今十有八載雖藝業無紀勞勣不聞小心恭勤實免愆過明明昊天實昭實察不敢有二不敢有私夙夜兢兢悚集作祇惕若厲所以父母兄弟皆荷恩私叨職謬官並在集作預供奉摩頂至趾豈足上酧愚臣兢兢實慙夙夜集作實慄不意臣父昏集作衰耄恃寵忘公貪潤㣲財取犯朝憲應由集作是臣不忠不孝使集作事父無良亷恥不修幾諌有闕遂使陷於刑法玷國憲章集作有玷國章臣之萬死無補此責刻肌刻骨泣血泣天恨負聖恩以媿朝列臣宜代父䝉罪自殞闕庭不合偷安尚求茍免誠以天波昭洗得更自新以忍垢偷生克躬自勵冀將集作期効萬一補過酬恩灰軀糜骨以甘心願伏惟神皇陛下恩同父母矜照懇誠信臣集作其赤心實有罄竭云云請寛宥與張易之徃還人表中宗張廷珪臣聞國之威柄在於賞罰賞中則人知勸罰中則人知沮二者茍得則四海獲安二者乖宜則萬人無措况陛下始復初業一作先業甫登寳位率土顒然欽佇聖化凡欲興一作舉事亦何容易外有竊議臣請盡言至如張易之兄弟窮罪極逆蒼生苦之良有嵗月憑託城社無所告訴陛下仁聖明斷憂在黎元一朝誅夷孰不慶忭在於親故並合従坐然量宜制法理或未𢎞何者然也臣歴觀自古以來革故即新之際莫不先行誅戮以服衆心此皆素無人望理藉如此今陛下先朝子孫唐徳未改乃天地之眷人祇之望非陛下而誰誠宜布恩施徳以答之崇仁尚寛以理之豈更誅夷以虧至徳况易之兄弟榮盛多時趨附之徒天下大半欲盡殺之則罪不加衆欲少殺之則法難畫一在都城者乍可有數遍四方者未知幾人反側者多不可不察安之之理必在於寛自非至親及於謀首請一原宥令其自新仁風大行在斯一舉臣無任云云請代父死表𤣥宗張不耀開元初臣某言臣聞哀哀父母生我劬勞欲報之恩昊天罔極臣父文成充使不了特寘嚴刑罪小責深不勝寃苦街衢驚歎長㓜咸嗟皇天后土實所鑒照臣聞有理不申枉填溝壑臣子情切骨肉恩深請以㣲軀代父當死乞寛父之殘命展愚臣之孝心伏乞天命俯垂矜察不耀萬死猶荷再生臣父朝無近親孤宦獨立苗疎難植根淺易危無風而自倒不寒而自戰李全交接邪作蠱舞法弄權虐甚周興酷殊來俊枉陷良善以立已功惡貫已盈貪殘事敗不慙顔厚猶事紏繩不懼皇天仍居憲府罪輕責重其枉實深但恨明時虚編咎晦疑伏願陛下採輿人之誦聴左右之言乞不濫無辜庶寃魂重返即臣雖死之日猶生之年不任酷裂之至冒死投匭以聞文苑英華卷六百十八
