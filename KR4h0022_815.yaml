body:
  text: 文苑英華巻八百十六宋李昉等編學校講論附問國學記一首國學新修五經壁本記一首崑山縣學記一首太學張博士講禮記記一首文章太宗飛白書答詔記一首故刑部尚書中山李公詩法記一首移顔魯公詩記一首呉郡詩石記一首香山寺白氏洛中集記一首東林寺建碑記一首學校講論附問國學文粹作庠記舒元輿先王建太學法以教國胄子欲敺人歸義府也故設官區掌嚴大其事明公侯卿大夫必由是出元輿既求售一作善藝於闕下謂今之太學猶古之太學將欲觀焉自以為下士小儒未嘗覩天子庠序欲往時先三日齋沐而後行行及門下脱盖下車循墻而趨請於謁者曰吾欲觀禮於太學將每事問之於子可乎謁者許諾遂前導之初過於朱門門闔沉沉問曰此魯聖人之宫也遂拜之次至于西有髙門門中有厦屋問之曰此論堂也予愧非一作予懼其鴻學方論不敢入導者曰此無人乃虚堂爾予惑一作感之遂入見庭廣數畆盡墾為圃矣心益惑復問導者曰此老圃所宅子安得欺我耶導者曰此積年無儒論故庭得一無得字化為廢地乆為官一作宫於此者圃之非圃所宅也循廊升堂堂中無机榻有苔草没地予立其上悽慘滿眼大不稱嚮之意復為導者引又至一門問之曰此國子舘也入其門其庭其堂如入論堂俄又歴至三館門問之曰廣文也太學也四門也入其門其庭其堂如國子其生徒去聖人之奥如堂舘之蕪嗟乎詩書禮樂國之洪源也濬其源天下可以光潤窒其源天下為之顦顇故唐堯知其如此亦先命廷臣典三禮教胄子誕敷文徳於天下天下之屋皆可封及夏殷時其孟也則必能一無能字濬之其季也則皆自窒之自窒之時天下之屋皆可誅至周室有文武周公勃焉一作興而作復唐虞之道行五六一作七八百年而付仲尼仲尼承之孜孜日夜席之一無之字不暇一作敢暖祖述之憲章之發揮一無揮字於鄒魯恢一無此字張於洙泗上摩躪三光下垂之無窮其徒有入室者升堂者及門者散滿天下雖丁周季而天下姦臣賊子猶解曰周孔之教不敢妄動以此則文之教豈可須臾而一無而字㢮耶至嬴政犯之窒其源源未絶而已自絶於天一有下字矣漢初纔息干戈復濬其源而伏生公孫𢎞倪寛卜式之徒並出維持戰爭之漢二百年間無所失墜皆周公仲尼之力也國家用干戈取天下其道正於漢氏及闢儒官一作宫立素王祠設學官命生徒崇盛舘宇固亦不下漢氏然自㓂生幽陵軍旅之事始勝爼豆故太學之道不得不衰凉今皇帝傳大寳七祀生獻吴濞蜀禪於邸一作郊廟梟夏逆首殛潞子一無子字姦帥㧞魏世家此用兩階之舞可謂至矣今溟澥無揚一無此字波兵器可以䝉之虎皮矣乃大修周公仲尼之道之時也而太學且猶衰凉之若此豈非有司之不供職耶羣公卿士之不留意耶不然何使巍巍國庠寂寞不或作無聞回也賜也説繹一作釋道義之聲雖舘宇雲合鞠為荒圃可謂大國設虚一作虚設以自欺也愚其不敢取一作愚甚不取且懼周公仲尼之道沒墜於泉遂記其所荒之大畧以喻有司一作皆唐文粹國學新修五經壁本記劉禹錫初大厯中名儒張參為國子司業始詳集無詳字定五經書于論堂東西廂之壁辨齊魯之音取其宜考古今之文取其正繇是諸生之師心曲學偏聽臆説咸束之而歸于大同掲掲髙懸積六十嵗文粹作載崩剥汙衊淟一作冺然不鮮今天子尚文章尊典籍於苑囿不加尺椽而成均以治國學上言遽賜千萬時祭酒皥實尸之博士公肅實佐之國庠重嚴過者必式遂以羨贏再新壁書懲前土塗不克以夀乃析堅木負墉而比集作宇之其制如版牘而髙廣其平如粉澤而潔滑皆集作背施隂闗使衆如一附離之際無迹而尋堂皇靚深兩屋集作廉相照申命國子能通法書者分章揆日遜其業而繕寫焉筆削既成讐校既精白黑彬班瞭然飛動以䝉来求煥若星辰以敬来趨肅如神明以疑来質决若蓍蔡由京師而風天下覃及九譯咸知宗師非止服縫掖者一有談字鑽仰而已於是學官陳師正等暨生徒凡四百二十有八人請金石刻且歌之曰我有學宇既傾而成之我有壁經既昧而明之孰規模之孰發揮之祭酒維齊博士維韋俾我學徒絃歌文粹作詠以時切切祁祁不遨不嬉庶乎遒人来采我詩時余為禮部郎凡瞽宗之事得以開决故書之以移史官宜附于藝文志崑山縣學記梁肅學之制與政損益故學二字集作政舉則道舉道汙則政汙崑山吴東集作都鄙之縣先是縣有文宣王廟廟堂之後有學室中年兵饉荐臻堂宇大壊方郡縣多故故未遍繕完其後長民者或因而葺之以民尚未泰故講習之事設而不備大厯九年太原王綱以大理司直兼縣令既而釋奠于廟退而嘆曰夫化民成俗以學為本是而不崇何政之為乃諭三老主吏整序民飾班事大啟室于廟垣之右聚五經於其間以邑人沈嗣宗躬履經學俾為博士於是遐邇學徒或童或冠不召而至如歸市焉公聽治之暇則往敷大猷以聳之博考明徳以翼之優而柔之使自求之掲而厲之使自趨之故民見徳而興行行於鄉黨洽於四境父篤其子兄勉其弟有不被儒服而行莫不耻焉僉曰公主于二字集作之設教矯其末不墜其本易其俗不失其宜也傳曰本立而道生昔崔瑗有南陽文學志王粲有荆州文學志皆表儒訓以著不朽遂繼其流為縣學記俾来者知我邑經藝文教之所以興是嵗龍集乙卯公為縣之明年也太學張博士講禮記記歐陽詹說釋典籍謂之講講之為言耩公項切􅵲也集作韝非下同也如農之耕田疇焉田疇將植而求實雖耕矣必耩分其畦隴嘉穀由是乎生典籍將肄以求明雖習矣必講窮其㫖趣儒術由是乎成我國庠春享先師後更月命太學博士清河張公講禮記成儒術也聖祖三刋經九公通其六精于五而禮記在乎其中禮也者御人之大故首于羣籍而講之束修既行筵肆乃設公就几北坐南靣直講抗牘南座北靣大司成端委居于東小司成率屬列于西國子師長序公侯子孫自其舘太學師長序卿集作郷大夫子孫自其舘四門師長序八方俊造自其舘廣文師長序天下秀彦自其舘其餘法家墨家書筭家輟業以從集作輟肄業以明亦自其舘沒階雲来即席鱗居攒弁如星連襟成帷公先申有禮之本次陳用禮之要正三代損益得失定百家䟽義長短鎔乎作者之意注乎學者之耳河傾于懸風落于天清泠灑蕩幽逺無泥所昧鏡徹於靈臺所疑氷釋於心泉後一日聞于朝百司達官造者半後一日聞于都九城知名造者半皆尋聲得器虚来實歸予職在下庠亦掌有教道不足訓領徒從公惟始洎終覩公之美敬書盛事記諸屋壁并列當時執簡摳衣者于左偏貞元十四年五月二十七日記文章太宗飛白書答詔記權徳輿太宗文皇帝飛白書十二句五十五字集有者字貞觀十六年答左散驃常侍劉洎之詔也吾觀古之令主未嘗不虚已以納諫古之良臣未嘗不匪躬以盡直然後百度貞九有清係此物也初太宗與公卿大臣往復古義以聰明示羣下洎退而上書其大㫖以為動神機縱天辯不若凝旒虚襟以至公慎取捨而已故沃心以納優詔以答嘉其忠故以誠詞渥其禮故以手翰史臣實録具載其事有都官郎中竇泉者博古尚藝貞元初得其書於人間太清宫道士盧元卿又得之於竇氏元卿工為篆隸八分諸書且其家法保而藏之乆矣元和五年夏四月予以太常齋薦于宫師因出以示予予乃整衣冠離次捧視且以見聖唐建巍巍無窮之基在此編也至若縹緲鴻翥一作飛之勢輕濃蟬翼之狀子敬白而不飛子雲飛而不白稽合衆美裁成絶藝集作勢又以見哲王之餘裕書圃之逸品云故刑部尚書中山李公詩法記蘇頲唐開元四年太嵗丙辰二月戊申朔二十六日癸酉銀青光禄大夫刑部尚書昭文舘學士中山公甍于京師宣陽里私第享年六十先五日扈駕自新豐湯井還其日奉制持節復賽於湯所以降雨故也還歴二日自説齋祭滌濯之事願言也一無也字賦詩至其夕賔友皆散因作扈從詩十韻遲明命以示頲詩成而寢奄忽生災此即夫子獲麟之卒章也既殮公子壻右金吾倉曹博陵崔望之自其家取以見遺嗚呼翰墨未燥形神已離舉朝驚嗟之聲不崇朝而達於逺矣公文特稱於世每謂知音則寡同氣相求逮觀此詞何異於理正在心而為詠豈交臂而相失曽未數刻恨不回車擊節而如舊也撫膺一慟不覺涕之漣而痛矣中山長無見日雖子期不聽存者可以絶絃而相如有作殁者竟傳遺草故録如右記其事云移顔魯公詩記鄭薰顔魯公既用貞鯁為元載所忌由刑部尚書貶夷陵郡别駕大厯六年又以前秩轉廬陵郡道出宣州之溧水縣縣之南經古烈士左伯桃墓節槩交感即於墓下作詩一首自題於蒲塘之客舎一作舘詞韻凄激㸃畫嶄壯窮國藝之竒事厥後洎于大中丁丑嵗八十七年矣孤宇夐閴扄縢不固乆為飄曝薪牧所困一挑半剔往往洿缺余作鎮到此有客謂余者一作曰惜之立召工將王少儒領其部匠鑿垣複匣移窞于北望樓之西隅且以為郡居之勝絶鐫石其下俾後之觀者知改置之意無忽大中十二年十一月十九日宣歙池觀察使檢校右散騎常侍兼御史大夫鄭薰記顔公以永泰二年丙午二月貶峽州别駕旬餘改吉州司馬六月次江州之廬山有東西林題名必以秋至吉是年十一月改元大厯故次年丁未十月公遊青原寺題名便稱大厯二年又明年戊申五月移撫州刺史巳酉庚戌皆在官六年辛亥閏三月代到而四月書麻姑壇記猶以撫州繋銜今於文集及石刻攷之是嵗八月次上元縣乃自撫歸京時也上元與溧水實為鄰邑今皆隸昇州當時溧水則隸宣城公題詩烈士墓在六年與此記合然鄭薰唐名臣記謂公由刑部尚書貶夷陵郡大厯六年又以前秩轉廬陵郡道出溧水不應謬誤如此七年九月公復刺湖州八年正月赴上一本以丁丑為丁酉非吳郡詩石記白居易貞元初韋應物為蘇州刺史二字集作牧房孺復為杭州牧皆豪一作碩人也韋嗜詩房嗜酒每與賔友一醉一詠其風流雅韻名播於吴中或目韋房為詩酒仙集有時字予始年十四五旅于二郡以㓜賤不得與游宴尤覺其才調髙而郡守尊以當時心言異日蘇杭茍獲一郡足矣及今自中書舎人間領二州去年脫杭印今年佩蘇印既醉於彼又吟於此酣歌狂什亦往往在人口中則蘇杭之風景韋房之詩酒兼有之矣豈始望集作願及此哉然二郡之物狀人情與曩時不異前後相去三十七年江山是而齒髪非又可嗟矣韋在此州歌詩甚多有郡宴詩云兵衛森畫㦸燕寢凝清香當時最為警䇿今刻此篇于石傳貽將来因以予旬宴一章亦附于後雖雅俗不類各詠一時之志偶書石背且償其初心焉寳厯元年七月二十日蘇州刺史白居易題香山寺白氏洛中集記白氏洛中集者樂天在洛所著書也太和三年春樂天始以太子賔客分司東都及茲十有二年矣其間賦格律詩凡八百首合為十巻今納于龍門香山寺經藏堂夫以狂簡斐然之文而歸依支提法寳藏者於意何我有本願願以今生世俗文字之業狂言綺語之過轉為將来世世讚佛乗之因轉法輪之縁也十方三世諸佛應知噫經堂未滅記石未冺之間乗此願力安知我他生不復游是寺復覩斯文得宿命通省今日事如智大師記靈山於前㑹羊叔子識金環於後身者歟於戲二字一作嘻垂老之年絶筆於此有知我者亦無隠焉大唐開成五年十一月二日中大夫守太子少傅馮翊縣開國侯上柱國賜紫金魚袋白居易樂天記東林寺建碑記張文新北海守李公文人之雄書品之能者也開元十九年作東林寺碑手筆一軸俾模而刋石藏於寺者凡百一十三嵗僧之歴居者不啻大千數未始有議建竪者釋雲臯本謝氏子讀書為文將就鄉賦舉進士遇明師悟寂滅之樂因髠頭就學遂僧于東林且有年矣一旦視碑巻嗟曰逺公之名徳振千古東林之聲籍冠宇内而是詞是翰記其所由然誠天下之妙絶山門之光大儒釋之羙談也宜乎始至而掲諸顯敞俾文士名僧趨嚮之不暇是何巻於塵中踰百載莫石莫刋將焉用僧予僧門一士也一杖一屣一作履足以歴岨嶮一鉢一衲足以了朝夕不著不繋視千萬里若尋丈間遂裹足道途東西南北募縁以成其事㑹河東裴公自中書舎人開廉府于鍾陵敷文行政教之餘得六度三乘之奥聞臯志願亦垂信施因自染翰贊列爵秩名氏于巻末又有以増名迹重為光也臯乃得模而刋於碑㑹昌三年四月磨礱既成遂光遂平鐫之硜硜夬象奎呈如蛇如龍如飛如行一作走如筯玉在漆如𤣥穹列星立之亭亭弗磷弗傾于寺之明余時刺茲郡因減俸緡屋其上且嘉一作票臯建志不茍古人云智過千人謂之英臯之有决補遺事之智有﨑嶇辛苦以成其智之一作智字實過於百一十三年歴居之僧逺矣庸不謂為僧之英乎故記一有之字碑之隂一作皆續廬山記不若元本為是後題觀察使裴刺史張文新等立碑今不録文苑英華卷八百十六
