body:
  text: 文苑英華巻六十九宋李昉等編治道三梓材賦四首公孫𢎞開東閣賦四首公儀休焚機賦一首京兆府試入國知教賦一首梓材賦以理材為器如政之術為韻郤昻匠人度有山之梓相文木之理既因性而是度又從繩而可擬故輪桷適任棟梁資始隂陽之體叶時檃括之形中軌飾其象乃圖之以鳥獸諧其音必均之以宫徵苟可擇於棫樸亦何殫夫杞梓徒觀其破擁腫斵瑰材攅節迸集斜文洞開蜀柿落而雨足交洒郢斤運而風聲飇來伐之丁丁奂蹙狸之班首斵之槖槖碎空穴之青苔巧無匪制庸無所施因心則達觸物能為初㑹方以成矩乍投圓而得規削斵同功凖量成類方資剖劂之力乃作馨香之器厥若選德以序辨官以位誠當正直而無頗亦何患乎綱紀之紊墜小既以此大無不如文公立號以化俗康叔省功以愼儲仁義有常剛柔貴識其虚實寛猛相濟勤苦務知其疾徐教在洽人毖於出令亦猶代大匠斵罕或不傷其性俾夫來者式遵前聖且脩短得䘮亦奚其為政森彼灌木工則度之有倫有要念兹在兹展矣君子如何勿思思不越乃心逸於人也明其采章於木也須其丹􅃮瞻濟濟之榛楛懿彬彬之文質雖非班扁之竒妙敢獻斵輪之良術第二同前韻魏縝昔成王纂位周公輔理命爾康叔尹兹殷土既因命以申勸欲善終而令始述文武之所脩陳藝術之攸起播英聲於典訓揚芬烈於國史則知上之化下如梓之材遵繩墨以運思受鎔模於簡能其度木也佇林衡之畢選其取制也仰倕和之所開於是既勤樸斵惟所云為奚兹服用靡尚精竒信其有益取於無私工必止其淫巧物欲稱其事宜去雕鏤所以昭代俗之反素塗丹雘所以知禮義之攸施擬古呈功勸象制器或因事以立法亦慿質而託類臨時通軌開物以利乃作誥於聖人俾流戒於在位凡教在始而法在初莫不念乎梓匠慎爾攸居苟方圓之失理是風化之蔑如故王者削殷跡述周令汲汲賢良孜孜善政招延俊造以輔明盛偉夫立德垂訓名言在兹凡百斧藻各共乃司勿謂幽昧神其聼之自然片善無遺羣材靡失輪桷兼採棟梁並出實有補於大厦方見用於王室擅高曾之規矩騰雅頌之洋溢闡無疆之淑懿成不朽之政術第三同前韻梁洽立政施教能簡則理為器擇材唯良是視政有孚而可大器自斵而稱羙學古入官斯可已矣故周公設誡取鑒梓材百工飾化以物作萬勢曲成而象開栢之可伐而取諸新甫松之可斷而美於徂徠何備用之徵要信崇功而大哉觀夫良匠掄木知無不為盡力以獻藝因材而合規勤樸斵而去夫濫窳尚儉素而昭於軌儀智者相物後人述器得成風之妙窮運斤之利或經緯乎隂陽亦法象乎天地上棟下宇資丹雘之餘飾從有之無通舟車乎逺致嘉兹義之可分而發昭乎在位是尋是尺其檉其椐每從繩而則正異投刃而皆虚觀梓匠之斵矣吾是知為政之所如材之既度可施於政若意匠以合則必由庚而在詠侯其偉而張衡東京賦侯其偉而念兹在兹政有善人則不欺山有木工則度之材有常質政則匪一每呈器而受用亦相時而陳術夫如是諧利貞保元吉信前賢之濟代豈小人之能悉第四同前韻王澄猗嗟掄材者杍音子木工也必將有以掄者動不妄施材者用之為美塗其丹雘之色契乃斵雕之理成乎器用孰不勤止則知能者軌物其利博哉逹於道必獲乎象酌於事實在乎材材罔不竒戒乎不知應時可重匪飾胡為湏度長而契當作絜大諒方矩而圓規役是司者勉矣厥宜亦猶德必輔人材不假器人失德而奚取器非材而奚利材濫則過於杍人德乖則失乎爾位其有取非輪桷性實散樗以不材而見棄思入用其焉如豈比山有之亦脩短惟凖工度也而削理有餘既罕節而抱直成大厦之厥居者哉夫如是則工以理材為難國以教人為聖聖體材而存道材象道而成政𢎞之在人慎乃出令藏器俟時人罔越思逹乎至極欽哉有司惟試可矣以材校之守而勿失其德秩秩以人觀材以材觀實非獨陳伊周之𢎞義將以翊我唐之政術儻小材之不遺願雕煥於兹日公孫𢎞開東閣賦以風勢聲理暢休實久為韻王昌齡易窮則變變則乃通二氣相感萬物初蒙拆於陽甲化於隂風彼君臣有際㑹屠釣無終窮其未遇也如獸之檻如禽之籠其合德也起阿衡於莘媵獲太師於渭翁覩公孫之發迹知漢帝之尊崇陻厄則異元亨則同火有炎光木有根柢寒者斯附暑者蒙蔽苟得其所亦為大惠動必有獲自然之勢抑折節以下人亦開國而來詣衣布被以薄已㪚金帛以賙濟近乎仁者之心與裘馬而俱敝以光招賢之䇿不失終身之計故能多士爰處僉謀是行拓南蠻之徼增朔方之城大啓侯國載揚天聲與夫嗤嗤以致誚孰若兢兢而立名僣上則差偪下則鄙反坫誰咎豚肩陋矣或儉奢而得中即逹人之至理嗟服勤以抗節在庶幾乎君子璞玉在山白虹在上精靈不隱物理相暢君任下以不疑臣薦賢以答貺失之者䘮得之者王况乎左右股肱舉爾無妄道有興廢人亦焉廋屈之則否伸之則休不正其名亦去其實賔閣既闗擁門自佚使賢醜錯雜而不分登駑駘於招士之室喟然宣父悲之已久儻相府之可依銘盛德於不朽第二同前韻李琚客有海上浴德淄川養蒙業因才進位以經通當漢皇之有道登股肱於此公順天招物德盛聲崇接士於衡門之下起閣於相府之東陽榮納日隂户生風爾其建高規起崇制簷宇深靜垣墻閑衞取木非南澗之才延賔乃北山之滯訪善不日馴道以嵗其選器也則收用而棄瑕其進德也則取材而逺勢故能克遐厥聲休績莫京宴私則布衣韋帶自公惟脫粟菜羮服之而徳以亷恥食之而心以和平豈梁肉夏屋而賔實之名哉則知厚内者德先薄外者事理身正則逺怨心邪則近恥固惡盈而守冲誠見足而知止太常居甲第之日丞相作封侯之始是以作漢名相惠音流暢誠前哲之用心豈後賢之觖望及夫人殁政絶閣廢道休俾馬廄之是宅奚人德之不脩言念於此我心其瘳故知道劣者事微狥名者失實奚量才之逺近寧比跡於勞逸未見久字官韻第三同前韻楊諌君立相以道崇相輔仁而協同庶緝多士允釐百工始於其家且有招賢之義刑于四海大啓尚賢之風猗乎哉漢武照臨之秋孫𢎞輔弼之歳能好善以逮下不恃貴而怙勢子興視夜届賔閤而猶開鸎鳴在春知賢路之不蔽道有行止時有興廢雖盛明則多士乃知人則下事遇風雨而不易將安樂以無替善乎立身誰為之繼夫㧞茅者利其彚征開閣者求其友生茅思同茹友貴同榮故秩秩叙初筵之禮丁丁諧伐木之聲在貴則勿遺乎賤於舊而孰能無情况閣可以備時之燥濕相可以為君之聼視賢是斯來賔是攸止升降出入温柔之始脱粟布被雖逢汲黯之嗤下薦上聞竟遇漢皇之美况親仁而又崇此亦存乎下理動不為妄德風遐暢善固有由仁聲允休豈比夫漢臣崇奢後堂空羅夫妓樂齊相為隘累年不易其狐裘者哉惟其人心酌乎故實德不遐棄敬之終吉然後知掃門者亦孔之醜望塵者未離乎咎當效平津而延賔知可大而可乆第四同前韻韓液千載之下凛然清風才生於代道積厥躬洎一作暨十五而逹為百夫之雄時然後遇否極斯通賤不憂貧牧豕之心在貴而好我招賢之道崇招賢伊何東閣不閉常虚懐以應物每趍風以接袂屈已於士德必不孤應以同聲冥而合契爰符禮以為食不倨賢而恃勢故門多長者之轍奄有輝光座必非常之人亘以年歳豈徒開閣於暇日之中抑亦留心於接應之際道不虚行有聞無聲方積善以志其大匪飾非以外其情故人得盛大之譽館得招賢之名欣其託身之先美其投足之始名以才著髙因下起槐市居尊栢臺是履多士拭目群英傾耳猶尚德以尊賢將興化以致治豈比夫鄭驛迎而為賢陳榻解而稱羙然以匪階而遷任道而暢自家刑國封侯作相不出十年之中獨立羣賢之上欽若前哲惟德之休其儀棣棣其政優優知足則止辭榮而歸順好賢不倦垂範而空留且資以時須賢為代出得之者則政舉失之者則政佚安得不開閣以崇敬袪繁華而摭實誰其嗣之代何不有惟秉鈞與當軸宜欽風而善誘庶斯道之不虧信昭彰而可久公儀休焚機賦以政者為理敦俗為韻張仲素物有資於利用則機之功也可録初離立以待時竟開張而濟俗言念魯相温其如玉覽下妾而獻藝將自家而窒欲克勤克儉誠君子之息機焚如棄如示小人之止足酌其妙也得而言者斯以明貴賤正儒雅龍梭勿用猶懸素壁之隅星石曾支尚在緑窓之下懿其以彼火烈彰兹行危諒舍之而是警非弊之而改為皷鐘于宫覺前言之嘉喻勞薪用㸑嗟彼世以方知惟此政經必兹輔理傷抱布之趨來異斷機之所擬燎枯木以烟散暢清音而風美迢迢之象逺在於天札札一作軋軋之聲不雜於耳且懐柔之理文歸不競何兆庶之淺深在仁知之㳺泳道自絶於瑕玷慶旁作乎龜鏡絲麻不緝而家式致於肥煨燼未除而邦已聞其政是知重為輕根㫖逺道敦息邪嬴於髙位澄細流於上源雖屢空於衣褐實垂裕於子孫京兆府試入國知教賦以觀光上國化洽文明為韻徐寅天闢區宇人尊帝王國將入於封部敎先知於典章不宰成功乃合乾坤之德無私鑒物能齊日月之光多士之操修六經之楷式將欲明其教必在逰於國温柔敦厚出風雅之詠歌比事屬詞本春秋之黜陟協彼典教諧斯禮文廣博而樂章具有精微而易象爰分先王所以總斯御物體彼為君遂使足歴四門親愛之儀已覩身由萬户民從之義皆聞莫不周覽金湯潜量王覇審樂知政以攸類陳詩觀風而相亞是以逢耕讓畔得先人後已之規察鳥安巢驗惡殺好生之化今吾君興帝業赫皇明以謙柔而教蠻貊以樸素而教公卿以節儉而敎百姓以農耕而教五兵自然八方走響六合飛聲豈俟入乎閫閾方能知彼規程其或跋扈未殱陸梁未向可使拜天闕而俯聼趍帝閽而引望俾其退而補過警干羽之舞階進以盡忠報聖明之在上士有負書劍出林巒謁九門而教化斯仰瞻百辟而威儀可觀則知不上泰山豈覺寰區之大不浮東海寧知溟渤之寛敢不廣義路懐忠甲開閶闔以聼聲詩賀仁霑而恩洽文苑英華巻六十九
