body:
  text: 文苑英華卷二百四十六宋李昉等編酬和七劉得仁三首周賀一首溫庭筠二首張祜一首杜牧三首許渾三首雍陶一首薛逢二首李商隱三首姚鵠三首項斯二首趙嘏四首馬戴三首李洞一首薛能二首喻坦之一首季頻六首皮日休三首陸龜蒙三首鄭谷三首羅隱五首春日酬韋先輩雨後見寄劉得仁風散五更雨鳥啼三月春軒忩透初日硯席斷纎塵箇箇峰頭出家家樹色新憐君髙且靜有句寄間人夏日通濟里居酬諸輩見訪二字集作寄訪之什劉得仁君子逺相尋聨鑣到弊林有詩難疾和無酒可徐一作賒斟門列集對作晴峰色堂開古木隂何因駐清聽唯恐日西沉通濟里居酬盧肇見尋不遇前人衡門掩緑苔樹下絶塵埃偶赴髙僧約旋知長者來雲山堪眺望車馬必徘徊問以何為待集作何以為相得慙無酒一杯酬朱慶餘已見二百三十一卷周賀和段少常柯古溫庭筠見集本稱觴慙座客懷刺即門人素尚寧知貴清談不厭貧野梅江上晚堤桞雨中春未報淮南詔何勞問白蘋和友人題壁前人沖尚猶來出範圍肯將經濟一作世作風徽三台位缺嚴陵卧百戰功髙范蠡歸剩欲一名添集作自欲一鳴驚鶴寢不應孤憤學牛衣西州未有看碁暇澗户何因集作由得掩扉酬鄭模一作朴司直見寄張祐故人滄海曲聊復話平生喜是狂奴態羞為老婢聲官途終日薄身事一作計長年輕猶賴書千卷長隨一棹行奉和門下相公送西川相公兼領相印出鎮全蜀詩十八韻杜牧盛業冠伊唐台階翊戴光無私天雨露有截舜衣裳蜀輟新衡鏡池留舊鳳凰同心真石友寫恨蔑一作夢河梁虎騎搖風斾貂冠韻水蒼彤弓隨武庫金印逐文房棧壓嘉陵咽峰橫劔閣長前驅二星去開險五丁忙回首峥嶸盡連天草樹芳丹心懸魏闕往事愴甘棠治化輕諸葛威聲懾夜郎君平教説卦犬子召升堂塞接西川一作山雪橋維萬里檣奪霞江錦爛撲地酒爐香忝逐三千客曾依數仭牆滯頑堪白首集作屋攀附亦周行肉管伶倫曲簫韶清廟章唱髙知寡和小子斐然狂奉和僕射相公聖德和平致茲休運嵗終功就合詠盛明謹呈三相公已見一百六十一卷杜牧酬張祜處士見寄前人七子論詩誰似公曹劉須在指揮中薦衡昔日知文舉乞火何人作蒯通北極樓臺長挂夢西江波浪逺吞空可憐故國三千里虛唱歌詞滿六宫酬杜甫補闕初春雨中泛舟次橫江喜裴郎中相迎見寄許渾江館維舟為庾公暖波微漾集作渌雨濛濛紅橋集作牆迤邐春巖下朱斾聮翩曉樹中桞滴圓紋生細浪梅含香艷吐輕風郢歌莫問青山吏魚在深池鳥在籠和常秀才寄簡歸州鄭使君借猿前人謝守攜猿東路長裊藤穿竹似瀟湘碧山初暝嘯秋月紅樹生寒啼曉霜陌上楚人皆駐馬里中巴客半歸鄉心知欲借南逰侣未到三聲恐斷腸奉酬郭二十三六字集作酬少府先輩奉使延勞集作巡勞見寄兼呈長官之什四字集作裴明府前人載書攜酒集作榼别池籠十幅輕帆處處通謝朓宅深集作荒山翠裏王敦城古月明中江村夜漲浮天水澤國秋生動地風飽食鱸魚歸榜棹集作榜歸揖待君琴酒醉陶公酬祕書王丞見寄雍陶朝下有間思南溝邉水行因來見寥落轉自歎平生白首丈夫氣赤心知已情留詩本相慰却憶苦吟聲奉和僕射相公送東川李支使歸使府夏侯相公薛逢兩地交通布政和上台深喜使星過歡留白日千鍾酒調入青雲一曲歌寒桞翠添微雨重臘梅香綻細枝多平津萬一言卑散莫忘髙松寄女蘿席上酬東川嚴中丞敘舊見贈前人昔記披雲日今逾二十年聲名俱是夢恩舊半歸泉朱紱慙衰齒紅粧慘别筵離歌正凄切休更促危絃酬别令狐八補闕李商隱見集本惜别夏仍半回塗秋已期那修直諫草更賦贈行詩錦段知無報青萍肯見疑人一作吾生有通塞公等繫安危警露鶴辭侣吸風蟬抱枝彈冠如不問又到掃門時和令狐八綯戲題集作和友人戲贈二首前人東望華樓事集作花樓會不同西來雙燕信休通仙人掌冷三霄露玉女窗虛午集作五夜風翠袖自隨回雪駐集作轉獨房尋類外庭空殷勤莫使清香透牢合金魚鎖桂叢二迢遞清一作春門有幾關桞梢樓閣見南山明珠可貫須為珮白璧堪裁且作環子夜休歌團扇掩新正未破剪刀間猿啼鶴望集作怨終年事未抵爐香集作熏爐一夕間奉和祕監從翁夏日陜州河亭晚望姚鵠洪河何處望一境在孤煙極野如藍日長波似鏡年捲簾花影裏倚檻鶴巢邊霞焰侵旌斾灘聲雜管絃鐘微來疊岫帆逺落遙天過客多相指應疑會水仙和陜州參軍李通微首夏書懷呈同寮張裳段羣二先輩前人公門何事更相牽邵伯憂賢任養間滿院落花從覆地半簷初日未開關尋仙鄭谷煙霞逺避暑何亭樹石間獨為髙懷誰繼和掾曹同處桂同攀和工部楊尚書重送約句前人桂枝攀得獻庭闈何似空懷楚客集作橘歸控翮集作好控扶搖早回首人人思看大鵬飛和李中丞醉中期王徴君月夜同逰滻水舊居項斯醉後情俱逺難忘素滻間照花深處月當户舊時山事想同清話歡期一破顔風流還愛竹此夜尚思間酬從叔聽夜泉見寄前人夢罷更開户寒泉聲隔雲共誰尋最逺獨自坐偏聞巖際和風滴溪中泛月分豈知當此夜流念到江濆陪崔璞侍御和崔玭春日有懷趙嘏詩家本多感况值廣陵春暖駐含窗日香餘醉袖塵浮名皆有分一笑最關身自此容依託清才兩故人和令狐補闕春日獨逰西街前人左掖初辭近侍班馬嘶尋得過街間映鞭桞色微遮水隨一作迎步花枝欲礙山暖泛鳥聲來席上醉從詩句落人間此時失意哀吟客更覺風流不可攀廣陵答崔琛前人棹倚隋家舊院墻桞金梅雪撲簷香朱樓映日重重晚碧水含光灧灧長八斗已聞傳姓字一枝何足計行藏聲名官職應前定且把旌麾一作紅旌入醉鄉答友人前人詩家才子酒家仙逰宦曾依積水邊窗户動搖三島樹琴樽安穩五湖船羅浮道士分瓊液錦席佳人艷楚蓮今日相逢朗吟罷滿城砧杵一燈前答光州王使君馬戴信來淮上郡楚岫一作紵入秦雲自顧為儒者何由答使君蛻風蟬乍失阻雨鴈頻聞欲識平生分他時别紀勳酬太原從事楊郎中見寄集作贈别前人君將集作若枉海月珮贈之光我行見知言不淺懷報意非輕反照臨岐思中年未達情河梁人送别秋漢鴈相鳴衰桞搖邊吹寒雲冒古城西逰還獻賦應許託平生酬李景章先輩前人平生詩句忝多同不得陪君奉至公金鏑自宜先中鵠鉛刀甘且學雕蟲鶯啼細桞臨關路燕接飛花繞漢宫九陌芳菲人競賞此時心在别離中和兵部永崇侍郎勾筵茶席李洞落葉濺吟身會棊雲雪一作外人海枯搜不盡天在下長新月上分題遍鍾殘布子勻忘機二髙客絶意任陶鈞郊居答客薛能傍舍蟲聲滿殘秋宿雨村逺勞之子騎先顧野人門敗藥盤空蔓雕藂露暗根相攜語未盡川月照黃昏酬泗州韋中丞甬上日寄贈兼次本韻前人魯儒相悟欲成空學盡文章不見功官自掖垣飄海上鎮從隋岸入山中嘗遭火發瞿曇宅爭得天如老氏弓何意杜陵懷寶客也隨迷路出關東和范祕書宿省中作喻坦之清省宜寒夜仙才稱獨吟鍾來宫轉漏月過閣移隂鶴避燈前靜藝髙幄外深想知因此興暫動憶山心和苑一作范鄼先輩話襄陽逰李頻聽説揚帆曲初從峴首還髙吟入白浪遙坐出青山古木猿啼爽空汀鶴立間秋來南去夢幾夜過商關酬姚覃前人不見又相招何曾許寂寥醉眠春草長間坐夜燈銷淚墮思山切身歸轉海遙年年送别處楊桞少長條九衢春日酬范祕書前人九衢行一匝不敢入他門纍日非無事通宵得盡言命嗟清世蹇春覺閏冬溫反覆吟佳句何酬國士恩黔中酬同院韋判官前人平生同所為相識偶然遲冬著青袍後無歸白社期江流來絶域府地管諸夷聖代都無事從公但賦詩長安僻居酬人前人豈得有詩名徒為老帝京關中秋氣早雨後夜涼生滄海身終泛青門路已行吟君一句意又見故人情答韓中丞容不飲酒前人老大成名仍足病強聽絲竹亦無歡髙情太守容間坐借與青山盡日看江南道中酬茅山廣文南陽博士三首皮日休寒嵐依約認華陽遙想髙人卧草堂半日始齋青䭀飯移時空印白檀香鶴雛入夜歸雲屋乳管逢春落石床誰道夫君無伴侣不離窗下見羲皇以下六篇並見松陵集二住在華陽第八天望君惟欲結良緣堂扄洞裏千秋鴈集作燕厨蓋巖根數井一作斗泉壇上古松疑度世觀中幽鳥恐成仙不知何事迎新嵗烏衲裘中一覺眠三五色香煙惹內文許逺逰燒香煙五色石飴初熟酒微集作初醺將開丹竈那妨集作防鶴欲算棊圖却望雲海氣半生當洞見暴氷初坼隔山聞如何世外無交者許逺逰與王羲之父子為世外之交一卧金壇秪有君依韻和三首集作奉和次韻陸龜蒙一片輕帆佩集作背夕陽望三峰拜七真堂天寒夜潄雲牙淨雪壤集作壞晴梳石髮香自拂煙霞安筆格獨開封檢試砂床莫言洞府能招隱會輾飈輪見玉皇二壺中行坐可攜天何况林間息萬緣組綬任垂三品石珮環從落四公泉丹臺已運隂陽氣集作火碧簡須調集作雕次第仙廣陽集作文王季猶在場中想得雷平春色動玉集作五芝煙草集作甲又芊眠三良常應不動移文金醴從酸亦自醺蓬萊公洛廣休以金醴四升待主簿主簿恨其味酸也桂父舊歌飛絳雪桐孫遺韻倚玄雲春臨桞谷鶯先覺曙醮靈蕪集作蕪香鶴共聞珍重雙雙玉條脫盡憑三島寄羊君酬王駕校書山居忽聞結綬見寄之什鄭谷直應歸諌署方肯别山村勤苦常同業孤單共感恩醉披仙鶴氅吟扣野僧門夢見君髙趣天涼自灌園次韻和禮部盧郎中極江上秋夕寓懷前人望郎到處覺風生蜀郡留連亞相情亂後江山悲庾信夜來煙月屬袁宏夢歸蘭省寒星動吟向莎州宿鷺集作鳥驚未脫白衣頭半白叨陪屬和倍為榮寄前集作前寄左省張起居一百言尋蒙唱酬見譽過實却用舊韻重答前人減瘦經多難憂傷集晚年吟髙風過樹坐久夜涼天旅退慙隨衆孤飛怯向前釣朋蓑叟在藥術衲僧傳鬢秃趨榮路腸焦鄙盜泉品徒誠有隔酬唱意何堅寒地殊知感秋燈最不眠從來甘默爾自此倍怡然蘭為官須握蒲因學更編豫愁搖落後子美笑無氊杜工部贈鄭廣文詩云科名四十年坐客寒無氊酬髙崇節羅隱舊逰雖一夢别緒忽千般敗草湯陵晚衰槐楚寺寒數竒常自愧時薄欲何干猶賴君相勉殷勤貢禹冠廣陵秋日酬進士臧濆見寄前人驛西斜日滿窗前獨憑秋窗集作欄思渺綿集作然數尺斷蓬慙故國一輪清鏡泣流年已知世事真徒爾縱有心期亦偶然集作焉空愧荀家好兄弟鴈來魚去是因緣秋日汴州集作河客舍有酬二字集作酬友人前人梁宋追逰早嵗同偶然為集作違别事皆空年如流水催何急道似危途動即窮醉舞且欣連夜月狂吟還聚一集作上樓風煩君更枉騷人句白鳳靈蛇滿篋集作袖中縣齋秋晚酬友人朱瓉見寄前人中秋節後捧瓊瑰坐讀行吟數月來只歎雕龍方擅價不知頳鯉竟空回千枝白露陶潛桞百尺黃金郭隗臺惆悵報君無玉案水天東望一徘徊酬丘光庭前人正月十一日書札五月十六日到來桞吟秦望咫尺地鯉魚何處間徘徊故人情意未踈索次第序述眉眼開上言二年隔煙水下有數幅真瓊瑰行吟坐讀口不倦瀑泉激射琅玕摧壁池蘭蕙日已老村酒蘸甲時幾杯鶴齡鴻算一作浙不復見雨後蓑笠空莓苔自從黃寇擾中土人心波蕩猶未回道殷合眼拜九列張濬掉舌升三台朝廷濟濟百揆序寧將對面容姦回禍生有基妖有漸翠華西幸蒙塵埃三川梗塞兩河關大明宫殿生蒿萊懦夫早嵗不量力䇿蹇仰北髙崔嵬千門萬户扄鎖密良匠不肯雕散材君今得意尚如此况我麋鹿悠悠哉榮衰貴賤目所覩莫嫌頭白黃金臺文苑英華卷二百四十六
