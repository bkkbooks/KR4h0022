body:
  text: 文苑英華卷二百二十八宋李昉等編道門四送贈道人六十四首贈嵩山焦鍊師李白二室陵青天三花含紫烟中有蓬海客宛疑麻姑仙道在喧莫染跡髙想已遷一作綿時餐金鵝藥一作金蛾蘂屢讀青苔篇八極恣遊憩九垓長周旋下瓢酌潁水舞鶴來伊川還歸空山上獨拂秋霞眠蘿月挂朝鏡松風鳴夜絃潜光隱嵩嶽鍊魄栖雲幄霓衣何飄颻鳯吹轉綿邈願同西王母下顧東方朔紫書儻可傳盟骨誓相學此乃集本全篇文苑元本頗略訪戴天山道士不遇前人犬吠水聲中桃花帶露濃樹深時見鹿溪午不聞鍾野竹分青靄飛泉掛碧峯無人知所去愁倚兩三松奉餞髙尊師如貴道士傳道籙畢歸北海前人道隱不可見靈書藏洞天天集作善師四萬劫歷世遞相傳别杖留青竹行歌躡紫烟離心無逺近長在玉京懸送李青歸集作南字華陽川前人伯陽仙家子容色如青春日月祕靈洞烟霞辭世人化心飬精魄隱几窅天真莫非千年别歸來城郭新送內尋廬山女道士李騰空二首前人君尋騰空子應到碧山家水舂雲母碓風掃石楠花若戀幽居好相邀弄紫霞二多君相門女學道愛神仙素手握集作掬青靄羅衣曵紫烟一往屏風疊乘鸞不著鞭送女道士禇三清遊南嶽前人吳江女道士頭戴蓮花巾霓衣不濕雨特異陽臺神足下逺遊履凌波生素塵尋仙向南嶽應見魏夫人遇冲和先生髙適冲和生何代或謂遊東溟三命謁金殿一言授集作拜銀青自云多方術往往通精集作神靈萬乘親問道六宫無敢聽昔者集作去限霄漢今來覩儀形頭戴雛鳯冠手搖白鶴翎終日飲醇酒不醉復不醒常集作猶憶雞鳴山每誦西升經撫背念别離依然出户庭莫見今如此曽為一客星龍道士問易參同契王昌齡仙人騎白鹿髮短耳何長時余采菖蒲忽見嵩之陽稽首求丹經乃出懷中方披讀了不悟歸家問嵇康嗟余無道骨廢我入太行謁焦鍊師前人中峰青苔壁一㸃雲生時豈意石堂裏得逄焦鍊師爐香净棐一作金按松影閒瑶墀拜受長年藥翩翻西海期送宣尊師醮畢還越劉長卿吹簫江上曉惆悵别茅君踏火能飛雪登山集作吞刀入白雲晨香永日在夜磬滿山聞揮手桐溪路無情水亦分寄許尊師前人獨上雲梯入翠微蒙蒙集作濛濛烟雪映巖扉世人知在中峰裏遙禮青山恨不歸送暨道士還玉清觀李頎仙宫文粹作官有名籍度世吳江濆大道本無我青春長與君中州俄已到至理得而聞明主降黃屋時人看白雲空山何窈窕三秀日氛氲遂此留書客超遙烟駕分寄焦鍊師前人得道凡百嵗燒丹唯一身悠悠孤峰頂日見三花春白鶴翠微裏黃精幽澗濵始無世上一作出世客不及山中人仙境若有夢朝雲如可親何由覩顔色揮手謝風塵謁張果先生前人先生谷神者甲子焉能計自說軒轅師于今數千嵗寓遊城郭裏浪跡希夷際應物雲無心逄時舟不繫霞餐斷火粒野服兼荷製白雲净肌膚青松飬身世韜精殊豹隱鍊質同蟬蛻忽去不知誰偶來寧有契二儀齊夀考六合隨休憩彭聃猶嬰孩松期且微細常問穆天子更憶漢皇帝親屈萬乘尊將一作窮遊四海裔車徒遍草木錦帛招談說八駿空往還三山轉虧蔽吾君感至德𤣥老欣來詣受籙金殿開清齊玉堂閉笙歌迎拜首羽帳崇嚴衛禁栁垂香爐宫花拂仙袂彌慶一作初年寶祚廣致福蒼生惠何必待龍髯鼎成方取濟宿贈廬山白鶴觀劉尊師包佶蒼蒼五老霧中壇杳杳三山洞裏官手護崑崙象牙簡心推霹靂棗枝盤春飛雪粉如毫潤曉潄瓊膏氷齒寒漸恨流年筋力少唯思露冕事星冠送韋司直西行此公深入道門李嘉祐不耻青袍故尤冝白髮新心朝玉皇帝貌似紫陽人湘浦眠銷日桃源醉度春能文兼證道莊叟是前身此詩二百二十八卷重出今已削去送栁道士錢起去世能成道遊仙在集作不定家歸期千嵗鶴行邁五雲車海上春應盡壺中日未斜不知相憶處琪樹幾枝花中書省言懷因酬嵩陽張道士見寄錢起朝花尋暝林對酒傷春心流年依素髮不覺映華簮垂老遇中已集作明代又作知已酬恩看寸隂如何紫芝客集作多慙紫陽客相憶白雲深酬崔侍御期籍道士不至兼見寄皇甫冉一心求妙道幾嵗候真師丹竈歸何處集作在白雲無定期崑崙烟景集作景致絶汗漫往還遲君但焚香坐人間到有時送張道士歸茅山謁李尊師前人向山獨有一人行近洞應逢雙鶴迎常以素書傳弟子還因白石號先生無窮杏樹何年種幾許芝田帶月耕師事少君年嵗久欲隨旄節往層城送李道士顧况人境年虛擲仙源日未斜羡君乘竹杖辭我隱桃花鳥去寧知路雲飛似憶家莫愁客鬢集作髮改自有紫河車送葉尊師歸處州耿緯風馭南行逺長山與夜江羣祅離分野五嶽拜旌幢石髓調金鼎雲漿實玉釭㹞㹞犬聲曉洞府有仙尨送王道士盧綸夢别一仙人霞衣滿鶴身旌幢天路曉桃杏海山春種玉非求稔燒金不為貧自憐頭早白難與葛洪親酬暢當尋嵩丘麻道士見寄前人聞逐樵夫閒看棋忽聞人世是秦時開雲種玉嫌山淺渡海傳書怪鶴遲隂洞石幢微有字古壇松樹半無枝煩君逺示青囊籙願得相從一問師藍溪期蕭道士採藥不至前人春風生百藥幾處木苗香人逺花空發集作落溪深月復長病多知藥性老近憶仙方青節何由見三山桂自芳送道士郤彛素歸內道場前人病老正相仍忽逢張道陵羽衣風淅淅仙境玉稜稜叱我問中夀教人祈上升樓居五雲裏幾與武皇登寄全椒山中道士韋應物今朝郡齊冷忽念山中客澗底束荆薪歸來煮白石欲持一瓢酒逺寄風雨夕落葉遍空山何處尋行跡贈韓道士戴叔倫日暮秋風吹野花上清歸客意無涯桃源寂寂煙雲閉天路悠悠星漢斜還似世人生白髮定知集作自仙骨變黃芽東城南陌頻相見應是壺中一作天别有家送李道士歸山崔洞秋城臨古路城上望君還曠野入寒草獨行隨逺山授人鴻寶內將犬白雲間早晚燒丹罷遙知氷雪寒謁李尊師奚賈萬物還常性唯道貴自然先生容其隱隱几為列仙鍊魄閉瓊户飬毛飛洞天將知逍遙久得道無嵗年送王鍊師赴王屋洞權德輿稔嵗在芝田歸程入洞天白雲亂上國青鳥㑹羣仙自以棊銷日寧資藥駐年相看話離念集作合風馭忽泠然與道者同守庚申前人洞真善救世守夜著集作看仙經俾我外持內當兹申配庚齊心已恬愈澡身自澄明沉沉簾帷下靄靄燈燭清四支動用息一室虛白生收視忘取捨叩齒集神靈伊豫嗜欲寡居常疴恙輕三尸既伏竄九藏乃和平無令耳目勝則使性命傾窅然深夜中若與元氣並釋宗稱定慧儒師著誠明𣲖分示三教理詣無二名吉祥能止止委順則生生視履苟無咎天祐期永貞應物知不勞虛中理自冥豈資金丹術即此駐頺齡送吉州閻使君入道二首戎昱聞道桃源志塵心忽自悲余當從宦日君是去一作棄官時金汞封仙骨靈津咽玉池受傳三籙備起坐五雲隨洞裏花常發人間鬢易衰他年㑹相訪莫作爛柯棊二廬陵太守近隳官月帔初朝玉帝壇風過鬼神迎受籙夜深龍虎衛燒丹水容入境纎埃靜玉液添一作傾瓶潄齒寒莫遣桃花迷客訪千山萬水訪君難題服生柏道士于鵠服柏不飛鍊閒眠閉草堂有泉誰一作唯與潄留火為焚香新雨閒門靜孤松滿院凉仍聞枕中術親授漢淮王題王道者一作贈隱者前人去尋常不在集作長不出一作多不見門似絶人行牀下石苔滿屋頭秋草生學琴寒日集作寒月一作冬日短寫易曉忩明唯到一作有黃昏後溪中聞磬聲此詩二百三十二卷重出今已削去注異同為一作寄續尊師前人得道任髮白亦一作每逢城市遊新經天上取靈集作稀藥洞中收春木帶枯葉新蒲生漫疑作慢流年年望靈鶴長在此山頭終南禇尊師集作題南峯禇道士前人得道終南集作南山久曽教四皓碁閉門醫病鶴倒篋養神龜松際風長在泉中草不衰誰知茅屋裏有路通集作向峨嵋入白芝溪尋黃尊師前人觸烟入溪口茫茫唯柳櫪其中飛碧流十里不通屐出林尚未明細徑懸峭壁把藤借竹勢光猾猿猱跡忽然風景異乃到神仙宅天晴茅屋頭殘雲蒸氣白隔忩梳髮聲久立聞吹幘抱琴出門來不是人間客山院不灑掃四時自虛寂落葉埋長松出地才滿一作數尺曽讀上一作涌清經去住疑作注長年籍願示不死方何山有瓊液使院憶山中道侣兼李七副使約崔備松竹去名嶽衡茅思靜居山君水上印天女月中書舊帙藝香在空奩藥氣餘褐衣寬易攬白髮少難梳病栁傷摧折殘花惜掃除憶巢同仙鳥避網甚跳魚嵇阮慙交絶求羊愧跡踈與君非宦侣何日共樵漁訪羊尊師孫韋花下問童子言師採藥去只在此山中雲深不知處越中贈程先生釋法震紗帽度殘春虛舟寄一身溪邊逢越女花一作洞裏問秦人古塞連山靜隂霞落海新有時城郭去贈與酒家親題萬山許鍊師前人道成人不識流水響空山花暗軒忩外雲隨坐卧間驗圖名已久絶粒事長閒更欲崑崙去羞看綘節還七言贈張道士僧皎然玉京真子名太一因服日華心如日此心不許世人知只向仙宫未曽出送禇道士前人聞說洞庭無上路春遊亂踏五雲芝含桃風擺花狼藉正是仙翁碁散時遇谷口道士司空曙一見林中客閒知州縣勞白雲秋色逺蒼嶺夕陽髙自說名因石誰逢手種桃丹經儻相授何用戀青袍送張鍊師還峨嵋山前人太一天壇天柱西垂蘿為挽石為梯前登靈境青霄絶下視人間白日低松籟集作韻萬聲和管磬丹光五色雜虹一作雲霓春山一入尋無路鳥響煙深集作深林水滿溪送王尊師歸湖州前人烟蕪滿洞青山逺幢節飄空紫鳯飛金闕乍看迎日麗玉簫遙聽隔花微多開石髓供調膳時御霓裳奉易衣莫學遼東華表上千年始欲一回歸送王先生歸南山前人儒中年最老獨有濟南生愛子方傳業無官自偶耕竹通山舍逺雲接玉集作雪田平願作門人去相隨隱姓名尋紀道士偶㑹諸叟李益山隂逢集作尋道士映竹羽衣新侍坐雙童子陪遊五老人水花松下净壇草雪中春見說桃源洞如今猶避秦送吉道士拜官歸舊業李端聞有華陽客儒裳靄紫薇舊山連藥賣孤鶴帶雲歸栁市名猶在桃源夢已稀逺鄉見鷗鳥應愧背船飛送馬尊師前人南入商山松路深石牀溪水晝隂隂雲中採藥隨旄節洞裏耕田映緑林直上煙霞深舉手回經丘壠自傷心武陵花木應長在願與門人更一尋贈太清宫道士王建上清道士未升天南嶽中華作散仙書賣八分通字學丹燒九轉定人年修行近日影如鶴導引多時骨似綿想向諸山尋一作巡禮遍却回還守老君前贈詔徵王屋道士前人玉皇符到下天壇玳瑁頭簮白角冠鶴遣院一作洞中童子飬鹿慿山下老人看道成不怕丹梯峻集作刀梯利髓實常欺石榻寒能斷人間集作世腥血味長生只要一丸丹贈廬山道士楊衡寂寥髙室古松寒松下仙人字委鸞頭垂白髮朝鳴磬手把青芝夜繞壇物像自隨塵外滅真源長向性中看悠悠萬古皆如此秋比松枝春比蘭贈羅浮易鍊師前人海上多仙嶠靈人信長生榮衛氷雪姿咽嚼日月精默書綘符遍晦步斗文成翠髮霞疑肩長金蓋凌風輕曉籟息塵響天雞一作鹿叱幽聲碧樹來户隂丹霞照忩明焚香扣虛寂稽首回太清鸞鷺振羽儀飛翻一作幡拂斾旌左挹玉泉液右搴雲芝英念得參龍駕攀天度赤城登紫霄峯贈黃仙師前人紫霄一作扁不可涉靈峰信穹崇下有瓊樹枝上有翠髮翁雞鳴秋漢側日出紅霞中璨璨真仙子執旄為侍童焚香杳忘言默念合一作思含太空世華徒熠耀虛室自朦朧雲氣瓊瑶圃龜息芝蘭藂玉籙掩不開天窗微微風兹焉悟佳㫖塵境亦幽通浩渺臨廣津永用挹無窮送天台道士孟郊天台山最髙動躡仙城霞何以靜其目掃山除妄花何以潔其生掃泉去泥沙靈境物皆真萬物無一斜月中見心近雲外將俗賒遺身獨得身笑我牽名華送無懷道士遊富春山水前人造化絶一作最髙處富春獨多觀山濃翠的皪水折珠摧殘溪鏡不隱髮樹衣常遇寒風猿虛空飛月狖呌嘯酸信一作即此神仙樂豈為時俗安煮金隂陽火因怪星宿壇花發或未識玉生忽叢攢蓬萊浮蕩漾非道相從難送李尊師元前人口誦碧簡文身是青霞君頭冠兩片月肩披一條雲松骨輕自飛鶴心髙不羣送道友集作送元亮師前人蘭泉滌我襟杉風集作月凄我心茗啜緑净花經誦清柔音何事集作處笑為别淡然愁不侵一作禁送蕭鍊師入四明山前人閒於獨鶴心大於髙一作喬松年回出萬物表髙棲四明巔千尋直裂峰百尺倒㵼泉綘雪為我飯白雲為我田靜言不話俗靈跡一作蹤時步天贈東嶽張錬師劉禹錫東嶽真人張錬師髙情雅淡世間稀堪為列女書青簡久事元君住翠微金縷機中拋錦字玉清壇上著霓衣雲衢不要吹簫伴只擬乘鸞獨自飛文苑英華卷二百二十八
