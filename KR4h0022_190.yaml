body:
  text: 文苑英華卷一百九十宋李昉等編朝省一趨朝四十八首寓直十六首趨朝守東華開門一作守東平中華門開梁簡文帝脂車向馳道總轡息東一作中華落關猶待漏交一作文戟未通車薄雲初啓雨曙色始成霞塹流鋪紫若城風泛橘花弦誦終無取願已自懷嗟一作皆藝文類聚早朝車中聽望何遜詰旦鍾聲罷隱隱禁門通蘧車響北闕鄭履入南宫宿霜間類聚作霧開馳道初日照相風胥徒紛絡繹騮類聚作騶御或西東入朝守開門王褒直城類聚作鳯池通復道嚴駕早凌晨鐵符行警曙銀棨未開闉塹暗城無影晴新路不塵屯兵引盡劔騎吹動班輪徒知仰睿藻抽辭慙類聚作殊未申答王筠早朝守建陽門開江總金兔猶懸魄銅龍欲啓扉三條息行火百雉照初暉御溝槐影出仙掌露光晞奉和從叔光祿愔元日早朝李元操見雜詠銅渾變春節玉律動年灰曖曖成霞旦隱隱禁門開衆靈湊仙府百神朝帝臺葉令雙鳬至梁王駟馬來戈鋋映林闕歌管沸塵埃保章望瑞氣尚書滅火災冠冕多秀士簮裾饒上才誰憐張仲蔚日暮返蒿萊賦得謁帝承明廬江總見初學記霧開仁壽殿雲曉承明廬輪停紺幰引馬度紅塵餘香貂拜黻衮花綬拂玄除謁帝升清漢何殊入紫虛正日臨朝唐太宗見初學記條風開獻節灰律動初陽百蠻奉遐賮萬國朝未央雖無舜禹迹幸欣天地康車軌同八表書文混四方赫奕儼冠蓋紛綸盛服章羽旄飛馳道鐘鼓震巖廊組練暉霞色霜戟照朝光晨宵懷至理終愧撫遐荒奉和正日臨朝魏徴見雜詠百靈侍軒后萬國會塗山豈如今睿哲邁古獨光前聲教溢四海朝宗引百川鏘洋鳴玉珮灼爍耀金蟬淑景輝雕輦髙旌揚翠煙庭實超王會廣樂盛鈞天既欣東户日復詠南風篇願奉光華慶從斯萬億年同前顔師古七政璿衡始三元寶厯新負扆延百辟垂旒御九賔肅肅皆鵷鷺濟濟盛纓初學記作簮紳天涯致重雜詠作重致譯日域獻竒珍同前岑文本見雜詠時雍表昌運日正叶靈符德兼三代禮功包四海圖踰沙紛在列執玉儼相趨清蹕喧輦道張樂駭天衢拂霓九旗映儀鳯八音殊佳氣浮仙掌薰風繞帝裾天文光七政皇恩被九區方陪瘞玉禮珥筆岱山隅同前李百藥化厯昭唐典承天順夏正百靈警朝禁三辰揚斾旌充庭富禮樂高宴齒簮纓獻壽符萬嵗移風韻九成凌晨早朝虞世南萬户宵光曙重簷夕霧收玉花停夜燭金壺送曉籌日暉青瑣殿霞生結綺樓重門應啓路通籍引王侯同潘屯田冬早朝張文琮假寐懷古人夙興瞻曉月通晨禁門啓冠蓋趨朝謁霜靄清九衢霞光照雙闕紛綸文物紀煥爛聲明發腰劒動陸離鳴玉和清越春晚看羣公朝還人馬八韻陳子良遊子惜春暮䇿杖出蒿萊正值康莊晚羣公謁帝回履度南宫至車從北闕來珂影呵疑明月笳聲動落梅迎風采毦轉照日綬花開紅塵掩鶴蓋翠栁拂龍媒綺雲臨舞閣丹霞薄吹臺輕肥寧所羡未若反山隈早朝韋元旦震維方月季宸極衆星尊珮玉朝三陛鳴珂度九門挈壺分早漏伏檻耀初暾北倚蒼龍闕西臨紫鳯垣詞庭草欲奏溫室樹無言鮮翰空為忝長懷聖主恩同前鄭愔瑞闕龍車峻宸庭鳯掖深才良寄天綍趨拜侣朝簮飛舄看來影喧車識駐音重軒輕霧入洞户落花侵聞有題新翰依然想舊林同聲慙卞玉謬此託常金同前徐彥伯夕轉清壺漏晨驚長樂鐘逶迤綸禁客假寐守銅龍豫亦趨三殿肩隨謁九重繁琦疑接曙響華劒此舂容相問苔一作韶光歇彌憐芳意濃願言乘日旰携手即雲從同前集作同韋舍人早朝沈佺期閶闔連雲起巖廊拂霧開玉珂龍影度珠履鴈行來長樂宵鐘盡明光曉奏催一經推集作傳舊德五字選集作擢英才儼若神仙去紛從霄漢回客人朝與夕集作千春奉休厯分禁喜趨陪和崔正諌登秋日早朝前人雞鳴朝謁滿白露集作露白禁門秋爽氣臨旌戟朝光映冕旒河宗來獻寶天子命焚裘獨負池集作津陽議言從建禮遊敬和崔尚書大明朝堂雨後終南山見示之作蘇頲奕奕軒車至清晨朝未央未央在霄極中路視咸陽委曲漢京近周回秦塞長日華動涇渭天翠合岐梁五丈旌旗色百層枌一作松非橑光東連歸馬地南指鬬雞場晴壑照金戺秋雲含璧璫由余窺霸國蕭相奉興王功役隱不見頌聲存復揚權宜珍構絶聖祚寶圖昌在德期巢燧居安法禹湯冡集作象卿才順美多士賦成章價重三臺俊名超百郡良焉知掖垣下陳力自迷方早朝大明宫賈至附見杜集銀燭朝天紫陌長禁城春色曉蒼蒼千條弱栁垂青瑣百囀流鶯繞集作滿建章劒珮聲隨玉墀步衣冠氣集作身染御爐香共沭恩波鳯池裏終朝默默集作朝朝染翰侍君王和前王維附見杜集綘幘雞人報曉籌尚衣方進翠雲裘九重集作天閶闔開宫殿萬國衣冠拜冕旒日色才臨仙掌動香煙欲傍衮龍浮朝罷須裁五色詔珮聲歸向集作到鳯池頭和前杜甫五夜漏聲催曉箭九天集作重春色醉仙桃旌旗日暖龍蛇動宫殿風微燕雀髙朝罷香煙携滿袖詩成珠玉在揮毫欲知世掌絲綸美池上于集作如今有鳯毛和前崔皓一作岑參附見杜集雞鳴紫陌曉集作曙光寒鶯囀皇州春欲集作色闌金闕曙集作瑣曉鐘開萬户玉階仙仗擁千官花明劒珮星初沒集作落栁拂旌旗露未乾别集作獨有鳯凰池上閣集作客陽春一曲和仍集作皆又作應難早朝二首王維皎潔明星高蒼茫逺天曙槐霧鬱不開城鴉鳴稍去始聞高閣聲莫辨更衣處銀燭已成行重集作金門儼騶馭二栁暗百花明春深五鳯城城鴉集作烏睥睨曉宫井轆轤聲方朔金門召集作侍班姬玉輦迎仍聞遣方士東海訪蓬瀛春日直門下省早朝前人騎省直明光雞鳴謁建章遙聞侍中珮暗識令公集作君荀令君坐處三日香香玉漏催集作隨銅史天書問集作拜夕郎旌旗映閶闔歌吹滿昭陽官舍梅初紫宫門栁欲黃願將遲日意同與聖恩長紫微殿退朝口號杜甫見集本户外昭容紫袖垂雙瞻御座引朝儀香飄合殿春風轉花覆千官淑景移晝漏稀聞高閣報天顔有喜近臣知宫中每出歸東省會送夔龍集鳯池喜達行在所三首自京竄至鳯翔前人西憶岐陽信無人遂却回眼穿看集作當落日心死著寒灰茂集作霧樹行相引連山集作蓮峯望忽開所親驚老瘦辛苦賊中來二秋集作愁思胡笳夕凄涼漢苑春生還今日事間道暫時人司𨽻章初覩南陽氣已新喜心翻倒極嗚咽淚集作涕沾巾三死去慿誰報歸來始自憐猶瞻太白雪喜遇武功天影靜千官集作門裏心蘇七校前今朝漢社稷新數中興年早朝日寄所居皇甫曽長安歲後見歸鴻紫禁朝天拜舞同曙色漸分雙闕裏漏聲遙在百花中爐煙乍起開仙仗玉珮成行引上公共荷發生同雨露不應黃葉久從風元日早朝呈故省諸公盧綸萬戟凌霜布森森瑞氣間垂衣當曉日上壽對南山濟濟延多士躚躚舞百蠻小臣無事諌空愧伴鳴環元日朝回中夜書情寄南宫二人前人鳴珮隨鵷鷺登階見冕旒無能禆聖代何事别滄洲間夜貧還醉浮名老漸羞鳯城春欲晚郎吏憶同遊春日早朝應制竇叔向紫殿俯千官春松應合歡御爐香熖暖馳道玉聲寒乳燕翻珠綴祥烏集露盤宫花一萬樹不敢舉頭看元日觀郭將軍早朝釋靈徹欲曙九衢人更多千條香燭照星河今朝始見金吾貴車馬縱橫避玉珂和耿拾遺元日觀早朝司空曙元日爭朝闕奔流若會溟路塵和薄霧騎火接低星門響一作漏促雙魚鑰車喧百子鈴冕旒當翠殿幢戟滿彤庭積一作表嵗方編瑞乘春即省一作宥刑大官一作諸候陳禹玉司厯貢一作獻堯蓂壽酒三聲一作觴退簫韶九奏停太陽開物象霈澤及生靈南陌高山碧一作祥光紫東方逺一作曉氣青自憐楊子賤歸草太玄經一作皆雜詠元日觀朝楊巨源北極長尊報聖期一作仰聖時周家何用問元龜天顔入曙千官拜一作喜元日一作日色迎春萬物知閶闔回臨黃道正衣裳高對碧山垂微臣願獻堯人祝壽酒年年太液池一作皆雜詠送楊凝郎中賀正韓愈天星漢落雞喔咿僕夫起餐車載脂正當窮冬寒未已借問君子定何集作行安之會朝元正無不至受命上宰須及期侍從近臣有虛位公今此去歸何時和庫部盧四兄曹長元日朝回前人天仗宵嚴建羽旄春雲送色曉雞號金爐香動螭頭暗玉珮聲來雉尾高戎服上趨承北極儒冠列侍映東曹太平時節身難遇郎署何須歎二毛春日退朝劉禹錫紫陌夜來雨南山朝下看戟枝迎日動閣影助松寒瑞氣卷綃縠遊光浮集作泛波瀾御溝新栁色處處拂歸鞍田司空入朝張籍西來將相近集作位兼雄不與諸軍覲禮同早變山東知順命新收濟下立殊功朝官序謁趨門外恩使宣集作喧迎滿路中閶闔曉開集作來銅漏靜身當受册大明宫早朝寄白舍人嚴郎中前人鼓聲初動未聞雞羸馬街中踏凍泥燭暗有時衝石柱雪深無處認沙堤常參班裏人猶少待漏房前月欲西鳯闕集作閣星郎雖去逺閣門開日入還齊行簡初授拾遺同早朝入門因示十二韻白居易夜色尚蒼蒼槐隂夾路長聽鐘出長樂傳鼓到新昌宿雨沙堤潤秋風樺燭香馬驕欺地軟人健得天涼待漏排閶闔停珂擁建章爾隨黃閣老吾次紫微郎並入連稱籍齊趨對折方鬬班花接蕚綽立鴈分行近職誠為美微才豈合當綸言難下筆諌紙易盈箱老去何徼幸集作僥幸時來不料量唯求致集作殺身地相誓答恩光和集賢劉學士早朝作前人吟君昨日早朝詩金御爐前喚仗時煙吐白龍頭宛轉扇開青雉尾參差暫留書殿多稱屈合入綸闈即可知從此摩霄去非晚鬢邉集作間未有一莖絲朝謁鄭谷捧日整朝簮千官一片心班趨黃道急殿揖紫宸深威鳯回香扆新鶯囀上林小松含瑞露春翠易成隂武德殿前新栽小松放朝偶作前人寒極放朝天欣聞半夜宣時安逢密雪日晏得髙眠擁褐同休假吟詩賀有年坐來幽興在松亞小窗前入閣前人祕殿臨軒日和鑾返正年兩班文武盛百辟羽儀全霜漏清中禁風旗拂曙天門嚴新契勘仗入乍集作邇承宣玉璣當紅旭金爐縱碧煙對敡稱法吏贊引出宫鈿言動揮毫疾威容報集作執簿專壽山晴靄黛集作靉靆皓氣暖連延禮有鴛鸞集恩無雨露偏小臣叨備位歌詠泰階前寓直寓直中庶坊贈蕭洗馬王筠龍樓實九重薄寒殊復早玉階泫清露銅池結秋潦霜被守宫槐風驚護門草之子摛一集擅文華縱橫富辭藻舒錦慙光麗握珠謝竒寶愧豫非工文何用披懷抱寒夜直坊憶袁三公蕭子雲滴滴雨鳴階愔愔茲夜靜風落宣猷樹寒洞承光屏高帷獨曉垂華燈空夜冏所思不相見方知寒漏永入蘭臺贈王治書僧孺吳均故人楊子雲校書騏驎下寂寞少交遊紛綸富文雅余本隴西使寓居雒陽社相思非不深行人避驄馬冬夜酬魏少傅直史館邢子才年病縱橫至動息不自安兼豆未能飽重裘詎解寒况乃冬之夜霜氣有餘酸風音響北牖月影度南端燈光明且滅燭花新復殘衰顔依候晚壯志與時闌體羸不盡帶髮落強扶冠夜行將欲近夕息故無寬忽有清風贈辭氣婉如蘭先言難一作歎三友次一作末言慙一官麗藻髙鄭衛專學美齊韓審喻雖有屬筆削少能干髙足自無限積風良可摶空想青門易寧見赤松難寄語東山道髙駕尚一作且盤桓中書寓直詠雨簡褚起居上官學士楊師道雲暗蒼龍闕沉沉殊未開窗臨鳯凰沼颯颯雨聲來電影入飛閣風威凌吹臺長簷響奔溜清簟肅浮埃早荷葉稍沒新篁枝半摧茲晨悵多緒懷友自難裁况復重城內日暮獨徘徊玉階良史筆金馬掞天才髙甍通散騎復道架蓬萊思君贈桃李於此冀瓊瓌同徐員外除太子舍人寓直之作郭元振太子擅元良宫臣命偉長除榮辭會府直宿總書坊露濕幽巖桂風吹便坐桑閣連雲一色池帶月重光葉死蘭無氣荷枯水不香遙聞秋興作言是晉中郎春夜寓直鳯閣懷羣公魏知古拜門傳漏晚寓省索居時昔重安仁賦今稱伯玉詩鴛池滿不溢雞樹久逾滋夙夜懷山甫清風詠所思酬薛舍人萬年宫晚景寓直懷友上官儀奕奕九成臺窈窕絶塵埃蒼蒼萬年樹玲瓏下宣霧池色搖晚空巖花斂餘煦清切丹禁靜浩蕩文河注留連窮勝託風期暌善謔東望安仁省西臨子雲閣長嘯披煙霞髙步尋蘭若金狄掩通門雕鞍歸騎喧燕餘對明月荆艷促芳樽别有青山路䇿杖訪王孫和楊舍人詠中書省花樹張文琮初蘂映春叢初學記作華蕚映芳叢參差間早紅因風時落砌雜雨乍浮空影煦初學記作照鳯池水香飄雞樹風豈不愛攀折希君懷袖中直中書省韋承慶清切鳯凰池扶踈雞樹枝唯應集鸞鷺何為宿羈雌大造乾坤闢深恩雨露垂昆蚑既含養駑駘亦驅馳木偶翻為用芝泥忽濫窺九思空自勉五字本無施徒喜逢千載何階答二儀螢光向日盡蚊力負山疲禁宇庭除闊間宵鐘箭移暗花臨户發殘月下簾欹白鬢一作髮隨身改丹心為主披命將時並泰言與行俱危寄謝登巢客堯年復在斯和騫右丞省中暮望楊炯故事間臺閣仙門藹已深舊章窺復道雲􅀈肅重隂玄律葭灰變青陽斗柄臨年光搖樹色春氣繞蘭心風響高窗度流䀶曲岸侵天明總樞轄人鏡辨衣簮日暮南宫靜瑶華振雅音和蘇員外寓直喬知之自昔重為郎伊人練國章三旬登建禮五夜直明光墨草尚書奏衣飄侍御香開簾竹氣靜拂簟蕙風涼曉漏離閶闔鳴鐘出未央從來宿臺上天子貴文強此詩一百九十一卷重出今已削去和杜侍御太清臺宿直旦有懷李嶠貂冠朝彩振烏署曉光分欲嘯遷喬侣先飛擲地文庭虛麥雨潤林靜蕙風薰嵇駕終難仰梁鳬且自羣自考功員外授一作郎中拜給事中沈佺期南省推丹地東曹拜初學記作貴瑣闈惠移雙管筆恩降五時衣出入宜真選遭逄每濫飛器慙公理拙才謝子雲微案牘遺常禮朋僚隔等威上台行揖讓中禁動光暉旭日千門起初春八舍歸贈蘭聞宿昔談樹隱芳菲何幸鹽梅處唯憂對問機省躬知任重寧止冒榮非酬楊給事亷見贈省集作臺中前人子雲推辨慱公禮集作理仲長統字也擅詞雄始自尚書省旋聞給事中言從溫室祕籍向瑣闈通顧我叨集作從郎署慙無草奏工集作章奏功分曹八舍斷解袂五時空宿昔叨集作陪餘論平生賴擊蒙神仙應東掖雲霧限南宫忽枉瓊田贈長歌蘭渚同集作風同蘇員外味玄夏晚寓直省中前人並命登仙閣分宵直禮闈大官供宿膳侍史護朝衣卷幔天河入當階集作開窗初學記作披庭月露微小池殘暑退髙樹早涼歸冠劔無時釋軒車待漏飛明朝題漢柱三署有光輝文苑英華卷一百九十
