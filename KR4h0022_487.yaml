body:
  text: 文苑英華卷四百八十七宋李昉等編體用才識兼茂明於體用策二道才識兼茂明於體用策元和元年四月二十八日問皇帝若曰朕觀古之王者受命君人兢兢業業承天順地靡不思賢能以濟其理求讜直以聞其過故禹拜昌言而嘉猷罔伏漢徵極諫而文學稍進匡時濟俗罔不率繇厥後相循有名無實而又設以科條增求茂異捨斥已之至論登科記作言進詔令作角一本作推無用之虛文指切著明罕稱於代兹朕所以嘆息鬱悼思索其真是用發懇惻之誠咨體用之要庶乎言之可行行之不倦上獲其益下輸其情君臣之間歡然相與子大夫得不勉思朕言而茂集作發非明之我國家光宅四海年將二百十聖𢎞化萬方集作邦懷仁三王之禮靡不講六代之樂罔不舉漏登科記作浸澤于下升中于天周漢已還莫斯為盛自禍階漏壤兵宿中原生人困竭耗其大半農戰非古衣食罕儲念兹疲氓未遂富庶督耕殖文類作食之業而人無戀本之心峻𣙜酤之科而下有重斂之困舉何方而可以復其盛用何道而可以濟其艱既往之失何者宜懲將來之虞何者當戒昔主父懲患於朝錯而用登科記作請推恩夷吾致霸於齊桓而行寓令精求古人之意啓迪未晢文粹作著之懷眷兹洽聞固所詳究又執契之道埀衣不言悉之於下則人用其私專之於上則下無其功漢元優游於儒術集作學盛業竟衰光武責課於公卿峻政非美二途取舍未獲所從余心浩然益所疑惑登科記有今字子大夫熟究其言㫖屬之於篇登科記作著之於篇興自朕躬毋悼後害對元稹對臣方病近古之策不行而陛下言集作幸及之是天下人人之福也微臣其敢忍意而不言乎且臣聞之古者以言賦文粹作試非納豈虛美哉蓋用之也文粹作蓋用其言也是以益贊禹而班師說復王而作命斯皆用言之大略也洎乎漢文帝羞羞文粹作文德不若堯舜始以策求士乃文粹作而天下郡國有賢良之貢入焉塞詔者朝錯而已至武帝時集有然後二字董仲舒出然而卒不能選用文粹作列條對施之文粹作於天下夫用其策不棄其人以其利於時也得其人而棄其策又何為乎若此則徒設試言之科而不得用言之實矣降及魏晉朝成而暮敗文粹作改之不暇又惡足言其策哉我唐列聖君臨策天下之士者多矣異時莫不光揚其名聲寵綏其爵祿文粹作柣然而曾不聞天下之人曰某日天子降某問文粹作策得某士文粹作問某事行某策濟某功抑不知直言之詔屢下而直言之士不出耶亦不知直言之士屢出而直言之策不用耶今陛下肇臨海內務切黎元求斥已之至文粹作正言責文粹作貴著明之確論斯集作實命說代言之盛意也微臣何足以奉之然臣所以上愚對皆以指病陳術而為典要不以舉凡體論而飾文詞事茍便人雖繁必獻言茍諧理雖鄙必書固不足以副陛下懇惻之誠庶可以盡微臣之獻替耳集作體用之目伏願陛下以臣此策委之有司茍或可觀施之天下使天下之人曰惜哉漢文雖以策求士逮我明天子然後能以策濟人則臣始終之願畢矣如或言不適用策不便時則臣有瞽聖欺天之罪將置於典刑陛下固不得而宥之矣亦臣之所甘心伏讀聖策乃見陛下念集作悼禮樂之寖微文粹作久寢恤黎人之重困責復盛濟艱之術酌推恩寓令之宜斯皆當今之急病也微臣敢不别白而書之昔我髙祖武皇帝掇去亂政文粹作掇去禍亂集作撥去亂政我太宗文皇帝鞬櫜干戈被之以仁風潤之以膏露戢天下之役而天下之人安省天下之刑而天下之人夀通天下之志而天下之氣和總天下之衆而天下之衆理理故敬讓之節著和故歡愛之化文類作教行是以革三王之所因兼六代之所舉集作盡美稱至德者舉文皇以代堯舜是集作豈異事哉誠有物集作有誠信以將之也明皇帝即位實號中興方其任姚宋而召集作右賢能也雖禹湯文武之俗不能過文粹作舉焉四十年間刑罰不試人用滋植四海大和於是舉文粹作奉升中告禪之儀則封泰山而秩嵩華舉東巡西狩集作念歲巡時邁之典則宅集作去咸鎬而朝洛陽禮既畢行物亦隨耗天寶之後征戍聿興集作徭戍作興氣盛而微理固然也曩時之乳哺而有之者一朝為兵殱之兵興以來至今為梗兵興則户减户减則地荒地荒則賦重賦重則人貧人貧則逋役逃征之罪多而權宜之法用矣今陛下躬親本務首問羣儒念禮樂之不興歎升平之未復斯誠天下之人將絶復完之日也微臣何幸而對揚之微臣以為將欲興禮樂必先集作在非富黎人將欲富黎人必先集作在非息兵革息兵革之術臣請兩文粹作備言之夫古所謂銷兵革者非謂幅裂其旗章銷鑠其鋒刃而已也蓋誠信著於上則忠孝行於下敬讓立於內則夷狄和於外夷狄和則邊鄙之兵息敬讓立則爭奪之患文粹作志銷爭奪之患文粹作志銷則和順之心作和順之心作而禮樂之道興矣此先王修政戢兵興禮樂富黎人之大略也陛下必欲責臣以詳究之術臣又請指事以明之夫食力之不克雖神農設教天下不能無餒殍之人矣是以文粹作且夫古之不農而食之者四而已矣吏有斷獄之明則食之軍有臨敵之勇則食之工有便人之巧則食之商有通物之智則食之是四者率皆明者勇者巧者智者之事也百天下之人無一二焉茍不能於此者不農則文粹農作耕不得食不織則不得衣人之情衣食迫於中則作業興於外是以游食者恆寡而務本者恆多豈強之哉彼易圖而此難及也今之事則不然吏理無考課之明卒伍廢簡稽之實百貨極淫巧之工列肆盡兼并之賈加以依浮圖者無去華絶俗之貞而有抗役逃刑之寵戎服者無超乘挽強之勇而有橫擊詬吏之驕是以十天下之人九為游食蠢朴愚鈍集作謹不能自遷者而後依於農此又文粹作乃非他彼逸而易安此勞而難處也以惰游之户轉增集作藏富而耕桑之賦愈重曩時之十室共輸集作耕而猶不給者今且數家二字集作聚之於一夫矣雖有慈惠之長仁隱之吏尚不能存若慘集作􅉃斷擊摶之則將轉移於溝瀆集作壑矣今之課吏者以賦斂無逋負為上以臣觀之足陛下之賦者誠所以害陛下之人耳若然則農桑之用集作裕既如彼惰遊之衆又如此耕桑之賦重則戀本之心薄惰遊之户衆則富庶之道乖集作廢此必然之理也今陛下誠能明考課之法减冗食之徒絶雕蟲文粹作鐫不急之功罷商賈兼并之業潔浮圖之行峻簡稽之書薄農桑之徭興耕戰之術則惰游之户盡歸而戀本之心固矣戀本之心固則富庶之道集作教興矣而貞觀開元之盛復矣若此則既往之失由前將來之虞由後在陛下悠久戒之慎之而已文粹作安在陛下慎之而已乎集作陛下悠悠懲之戒之慎之久之而已至於主父偃乘七國并吞之後謀集作將分裂而矯推恩管夷吾當諸侯爭奪文粹作強之時先文粹作申詐力而行寓令皆一時之權術也豈可謂明白四達與日月齊明文粹作並於聖朝哉臣雖賤庸尚不敢陳王道文粹作禹湯言於帝皇之日况權術乎此臣之所甚羞也故不及詳究言之臣伏讀聖策又見陛下以為執契則羣下用情躬親文粹作在下則庶官無黨文粹作當以漢文尚學而衰盛業謂光武課吏職而昧通方以臣思之皆不然也夫委之於下而用其情蓋考績之科廢而清濁之流濫也尚儒術而衰盛業蓋章句之學興而經緯之道集作文喪也課吏職而昧通方蓋苛察之法行而㑹計之期速也臣請條列而言之夫神農之斫耒耜教耕耨所以墾良田而植集作殖嘉穀也然而不能遏稂莠之滋焉其所以遏集作待之者芟夷錢鎛之而已唐堯之闢朝廷宅百揆亦所以殖文粹作殖禹舜而種臯陶也又文集作無而不能遏文粹作辨共工歡兜之逆焉其所以遏之者放棄殛誅之而已神農不以稂莠滋而廢耒耜之用故能存用器文粹作盡是用之方唐堯不以四罪進而奪舜禹之任故能終任賢之道若此則陛下之所任顧何如耳豈可謂任之必不可哉至於考績之課集作科廢章句之學興經緯之道衰集作喪㑹計之期速皆當今之極弊也幸陛下反文粹作問及漢元光武之事臣遽數而集作以終之今國家之所謂興儒術者豈不以有通經文字之科乎其所謂通經者又不出集作過於覆射數字明義者材集作才至於辨析章條是以中第者歲盈百數而通經之士蔑然以是為通經固若是乎至於工文自試者則不過於雕詞鏤句之才搜摘絶離之學茍或出於此者則公卿可坐致郎署可俯求崇樹風聲不由殿最連科者進速纍捷者位髙拱默因循者為清流行法蒞官者為俗吏以是為儒術又若是乎哉其所謂課吏職者豈不以朝廷有遷次進拔之用乎臣竊觀今之備朝選而不由文字者百無一二焉夫施衆網而加一禽尚不能得况張一目以羅萬品而望其飛者走者大者小者盡出乎其間其可得乎哉以此察羣吏羣吏又可察乎茍或不可察又可任之而絶其私乎哉此所以陛下將執契而歎用情念埀衣而懼不理蓋臣所謂課察之道不明也陛下誠能使禮部以兩科求士凡自唐禮六典律令及國家制度之書者用至於九經歷代史能專其一者悉得謂之學士以環貫大義而與道合符者為上第口習文理者次之其詩賦判論以文自試者皆得謂之文士以經緯今古理中是非者為上第藻繢雅麗者次之凡自布衣達于未𨽻集作在朝省者悉得以兩科求士文粹作仕禮部第其髙下歸之吏部而寵秩之若此則儒術之道興而經緯之文盛矣吏部罷書判萬集作身言之選設三式以任人一曰校能之式每歲以朝右崇重者一人與禮部郎校天下羣吏之理最在第一至第三者校定日據其功狀而登進之牧宰字人之官藉之為理者則上賞行焉若此則遷次之道明而遲速之分定矣二曰任賢之式每歲內自僕射至於羣有司之正長外至於廉問節制者各舉稱集作備朝選者一人外自牧守內至于百執事之立於朝者各舉吏郡縣文粹作備吏部集者一人因其所舉而授任之辨其考績而賞罰之不舉賢為不察舉不賢為不精不精與不察之罪同若此保任之法行而賢不肖之位殊矣三曰叙常之式其有業不通於學才不屬集作應於文政不登於最行不知於人則限以停年課資之格而役任之若此則敷集作叙用之典恆而尺寸之才無所棄矣兩科立則羣材遂三式行則庶官當陛下乃執左契以御之總文粹作握樞極以正之委庶官如心目之運支體是集作豈支體運而無效於心目乎察羣材如明鏡之形美惡豈文粹作是美惡形而逃隱於明鑒集作鏡乎然後陛下闢四門使可言之路通明四目以天下之目視達四聰以天下之耳聽不私其言以為好惡集作不私其心以百姓心為心端拱巖廊髙居宸極文粹作深視以冕旒自蔽而秋毫必察以黈纊塞耳而聲響文粹作舉動集作養動必聞則彼漢元章句之儒光武督責之術又惡足為陛下言之哉且臣聞之聖人在上人不夭札若臣者生未及壯戴陛下為君仁夀歡康未始有極何忽自苦墮肝膽而言天下之事乎臣以為國家兵興以來天下之人憯集作慘怛悲愁五十年矣自陛下陟集作即位之後戴白之老莫不泣血而話開元之政臣恐此輩不及見陛下功成理定之化而先飲恨於窮泉此臣之所以汲汲於心者陛下能不憐察其意乎謹對英華及唐文類聚皆云設三式以任人惟稹集作四式其二曰記功之式每歲羣吏之理最在第四者籍而書之蒲歲吏部㑹集而授署之若此者殿最之道存而清濁之流異矣同前韋處厚對臣聞古之道蒞天下皆酌人言用凝庶績伏惟陛下統承丕緒光膺駿命志氣中蘊清明下臨恤黎庶而惠慈方洽梟叛戾而威武已熾猶能慮危於未兆思理於已安聿追孝思纘述前烈愍官吏之無用求斥已之至言微臣才用不足以操事體識不足以經逺祗奉聖問伏用兢惶誠昧死上愚對制策曰朕觀古之王者受命君人兢兢業業承天順地靡不思賢能以濟其理求讜直以聞其過故禹拜昌言而嘉猷罔伏漢徵極諫而文學稍進匡時濟俗罔不率繇厥後相循有名無實而又設以科條增求茂異舍斥已之至言推無用之虛文指切著明罕稱於代兹朕所以歎息鬱悼思索其真是用發懇惻之誠咨體用之要庶乎言之可行行之不倦上獲其益下輸其情君臣之間歡然相與子大夫得不勉思朕言而茂明之臣聞復濟慎懼雖危必樂理安佚肆雖順必憂帝堯之為道也大矣書稱其本曰允恭克讓文王之為德也𢎞矣詩美其功曰小心翼翼圖天下之安者必因一作稱之於勞慮天下之大者必慎之於微任賢誠固思慮誠深百姓雖未富庶四夷雖未賔服天下明知其治也任賢不固思慮不深百姓雖富庶四夷雖賔服天下明知其亂也今陛下鑒前代已往之失求當今未然之理使虛文不設於下至言必聞乎上端視凝聽所委惟賢則上獲其益矣惠爵施祿所理惟直則下輸其情矣顧言而動思利乎安則何慮乎言之不行顧行而動思利乎安則何慮乎行之有倦誠能兢兢於一日二日業業於無小無大茍能此道雖微必昌雖柔必強鳯凰麒麟不足來甘露醴泉不足致三光四時不足序天之髙明也斯不愛其道地之博厚也斯不愛其寶彼之大者猶若是况其細者而難乎制策曰我國家光宅四海年將二百十聖𢎞化萬邦懷仁三王之禮靡不講六代之樂罔不舉漏一作浸澤于下升中于天周漢已還莫斯為盛自禍階漏壤兵宿中原生人困竭耗其大半農戰非古衣食罕儲念兹疲氓遂乖富庶督耕植之業而人無戀本之心峻𣙜酤之科而下有重斂之困舉何方而可以復其盛用何道而可以濟其難者伏以陛下蘊充明德繼荷大業居十聖之全區宇守百代之成禮樂揚髙祖之耿光播太宗之休烈思黷武而弭戢念疲氓之富庶理自順此生危自反此作兵者國之威也威不立則暴不禁君得其術而已舉其要而已凡善用兵者用兵之精次用兵者用兵之形用精者國逸而功倍用形者人勞而威立令行禁止俗富刑清仁足以懷義足以服端居廟堂之上威加四海之外而叛者嘗欲繫其頸而制其命伏其心而笞其背此兵之精也金鼓擊刺追奔逐北攻城掠地斬馘獻俘憂思巖廊之上謀制千里之外而叛者有以畏其威而懲其罰化其心而戢其暴此兵之形也陶然而化其效不形兵貴藏有於無兵之形不可張也騷然而動其政難久人不可終擾兵之精所宜密勝也今陛下既梟叛冦復征違命屈己之至已浹于兆庶恤人之誠已敷于四海乘衆之怒用兵之形則近無轉輸騷擾之勤逺無經費供求之役誠能固守必大畏其力小懷其德矣豈兵宿中原之為虞生人耗竭之為慮臣又聞理國之本富之為先富人之方勸農為大三代以耕籍率天下漢朝以孝悌配力田皆勸之之道夫農寒耕熱耘沾體塗足晝夜之筋力勤焉父兄之手足悴焉而官輸籍督坐非已有夷時郡邑長吏偷容朝夕養聲釣祿非恤人隱此所以耕植之業不勤戀本之心不固有遁於軍旅而邀功賞者有冒於老釋而瀆清濁者有逸於負販而制貧人者有隱於椎剝而干教令者農耕之難也如彼日百其勸常有不務者矣游惰之逸也如此日百其禁常有不息者矣由上之為政知人苦之者勸之必深知人樂之者禁之必至昔賈琮以最于十二州頒之以璽書黃霸以甲于二千石寵之以侯印惟陛下注意於守宰字人之官以田墾闢為最地荒榛人離散為殿即耕植可勸困竭可蘇兵未弭則人不蕃人不蕃則農不勸農不勸則國用虛此𣙜酤所以興也然鹽麴之稅山澤之利法用得其要不在峻其科理不得其吏不猶明其法明其法得其要則上無峻刻之舉下無重斂之困矣陛下制策曰既往之失何者宜懲將來之虞何者當戒臣聞王者之興皆鑒乎前代聖君賢佐之所以興昏主庸君之所以喪景行其興也用得以常理戒慎其喪也用得以常存詩人美殷鑒於有夏賈山諫漢而借喻亡秦備于圖籍著于編冊非臣繁詞所可曲盡自陛下統極舉滯淹已逋責恤刑獄振乏絶德澤所臨戴之不暇微臣未見其失也明將來之戒其在法令刑賞乎四海之廣億兆之衆非家令户告之能也發號出令而已矣伏惟陛下聿求善政大振洪猷人之獻替政之損益燦乎其書灼乎其人始則鼓舞蹈詠不足以充其善終則渴日望歲不足以喻其勞教之本莫大乎復言政之先莫大乎重令誠能復言重令上之克當乎天心下之允協乎人情天人交相為感而災害不生禍亂不作不然日有德音而人不悅日有威罰而人不畏茍不悅矣無與同勸茍不畏矣無與同沮此非法令之可裁也成一時之功者寵乎其功者也思百代之利者榮乎其名者也其名不足以勸者則刑罰存焉是小人之所趨君子之所務今陛下刑賞已足勸懲褒貶又存文史君子竭忠小人輸力舉如鴻毛舍如地芥何理而不成何求而不效陛下之不為非不能也伏以致誅逆黨罪止渠魁原情究惡不及其母此帝王之刑也戎臣饋車致命折冦渥恩必厚爵位必加此王霸之賞也然善有彰雖賤賞也惡有釁雖貴罰也賞一人不足以聳天下之善者其賞不足行刑一人不足以禁天下之暴者其刑不足用今宜賞不違疑作遺微細惟功之所加罰不為暴亂惟罪之所出此天下之人所以皆知賞之可重而罰之可戒制策曰昔主父懲患於朝錯而用推恩夷吾致霸於齊桓而行寓令精古求人之意啓迪未晢之懷眷兹洽聞固所詳究臣聞漢興鑒亡秦孤立之弊蹤周官衆建之法苴茅列土非復異姓其後吳楚強大本根不拔朝錯之策未終七國之兵已發主父念前事之敗露期本朝之強大分封子弟使得推恩諸侯之國星解於上漢廷之威風行於下此所以為謀也齊桓當周季陵夷之運思大彰翊霸之功志圖兼弱力存攻昧思逞其欲是務強兵習之野大國防其謀習之朝小國謹其備其志不可以速得其功不可以立俟用為隱政而行寓令此其所以霸也制策曰執契之道垂衣不言委之於下則人用其私專之於上則下無其效漢元優游於儒學盛業竟衰光武責課於公卿峻政非美二途取舍未獲所從吾心浩然蓋所疑惑子大夫熟究其㫖屬之於篇興自朕躬無悼後害者臣聞契者君之所司也綜其㑹歸則庶務隨而振之職者臣之所司也踐其軌跡則百役通其流矣委之職業也非委其權專其操持也非專其事賞罰好惡之出生殺恩威之柄此非權與操持乎委之於下則上道不行矣提衡舉尺守器執量此非事與職業乎專之於上則下功不成矣不委其操持安所用其私乎不專其職業孰慮無效乎君收其大柄臣職其所守然大柄不得亢於上臣得佐而成之所守不可屬於下君得舉而明之故乾之經曰首出庶物坤之文曰地道無成而代有終乾陽物也坤陰物也陰陽合而泰形焉陰陽離而否形焉君臣之道蓋象乎此漢元優游於儒學而權歸王氏失其所專也光武責吏事於三公而勞神簿書集其所委也一則曠而蕩一則察而隘既非中道不可以範臣所謂陰陽乾坤之說各存其道而交有所感然成其悠久配乎持載如此而已才者綜物以研務識者辨惑而不泥體者撫往以經逺用者臨事而造至神而明之可以輔陶鈞可以贊化育微臣固陋從師之說循名而實不充承問而學不稱進退殞越懼煩刑書謹對文苑英華卷四百八十七
