body:
  text: 文苑英華卷二百三十三宋李昉等編寺院一塔附梁武帝一首陳後主一首江總五首劉孝先一首庾信二首蕭慤一首孔德紹一首徐伯陽一首劉孝孫一首王勃二首盧照鄰二首駱賔王一首沈佺期二首宋之問九首張説四首蘇頲三首張九齡二首蔣渙一作煥一首寇埴一首寇垣一首孫逖二首天安寺疏圃堂梁武帝乘和蕩猶豫此焉聊止息連山去無限長洲望不極參差照光彩左右皆春色暗曖矚逰絲出沒看飛翼其樂信忘返倐一作翛然寧有即同江僕射逰攝山棲霞寺陳後主時宰磻溪心非關狎竹林鷲嶽青松繞雞峯白日沉天迥浮雲細山空明月深摧殘枯樹影零落古藤隂霜月夜鳥去風露寒猿吟自可盡出俗詎是願抽簮逰栖霞寺新雨集作時雨江總霡霂新雨霽清和孟夏肇栖宿緑野中登頓丹霞杪敬仰髙人德抗志塵物表三空豁已悟萬有一何小始從情所寄冥期諒不少荷衣步林泉麥氣涼昏曉乘風西泠泠候月臨皎皎煙崖憩古石雲路排征鳥披徑憐森沉攀條惜杳裊平生忘是非朽謝豈矜矯五淨自此生一作涉六塵庶無擾攝山栖霞寺山房夜坐簡徐祭酒周尚書共逰羣彥前人澡身事殊戒非是學金丹月磴時橫枕雲崖宿解鞍梵宇調心易禪庭數息難石澗水流靜山窗葉去寒君思北闕駕我惜東都冠翻愁夜鍾盡同志不盤桓再逰栖霞寺言志前人淨心抱氷雪暮齒通疑桑榆太息波川迅悲哉人世拘嵗華一作聿皆採穫冬晚共嚴枯濯流濟八水開襟入四衢兹山靈妙合當與天地俱石瀨乍深淺煙岸一作崖遞有無缺碑橫古隧盤木卧荒塗行行備履厯步步憐威紆髙僧迹共逺勝地心相符樵隱各有得丹青獨不渝遺風佇芳桂比德喻生芻寄言長往客悽然傷鄙夫明慶寺前人十五詩書日六十軒冕年名山極厯覽勝地殊留連幽崖聳絶壑初學記作壁洞穴㵼飛泉金河知證果石室乃安禪市朝霑草露淮海作桑田夜梵聞三界朝香徹九天山階步皎月澗户聽涼蟬永初學記作何言望鍾嶺更復切秦川入龍丘巖精舍前人法堂猶集鴈仙竹幾成龍聊承丹桂馥逺視一作睨白雲峯風窗穿石竇月牖拂霜松暗谷留征鳥空林徹夜鍾隂峯未辨色疊樹豈知重溘此哀時命吁嗟世不容無由訪詹尹何去復何從和七名法師秋夜草堂寺禪房月下劉孝先幽人住山北月上一作上月照山東洞户臨松徑虛窗隱竹叢出林避炎影步徑一作回逐涼風平雲斷髙岫長河隔淨空數螢流暗草一鳥宿踈桐興逸煙霄上神間宇宙中還思城闕下何異處樊籠和周趙王逰雲居寺庾信重巒千仭塔危磴九層臺石關還一作常逆上山梁乍斗回階類聚作跗下雲峯出窗前風洞開隔嶺鍾聲應類聚作度中天梵響來平時欣侍從於此暫徘徊奉和同泰寺浮圖前人岧岧陵太一作泰清照殿比東京長影臨雙闕髙層出九城栱積浮雲礙幡搖度鳥驚花一作鳯飛如始落一作邇蓮合似初生輪重對月滿鐸韻擬鸞聲畫水流全住圖雲色半行一作輕煙露晚一作露晚盤猶滴珠火朝更明雖連博望苑還接銀沙城天香下殿桂仙梵入伊笙庶同八界樂一作庶聞八解樂方遣六塵情一作皆藝文類聚和崔侍中從駕經山寺蕭慤鈎陳夜驚徼河漢曉參一作縱橫逰騎騰文一作雲馬前驅轉翠旌野禽喧曙色山樹動秋聲雲表金輪見巖端畫栱明塔疑從地涌蓋似積香成泉髙下溜急松古上枝一作梢平儀容初學記作合多壯思麗藻蔚緣情自嗤非照廡何以繼連城登白馬山護明寺孔德紹名嶽標形勝危峯逺鬱紆成象建環極大壯闡規模曽一作層臺聳靈鷲南一作髙殿邇陽烏暫同逰閬苑還類入仙都三休開碧嶺一作題萬户動一作洞金鋪攝心罄前禮訪道把中衢一作虛遙瞻盡地軸長望極天隅白雲起梁棟丹霞映松櫨露花疑濯錦泉月似沉珠今日桃源客相顧失歸塗逰鍾山開善寺徐伯陽聊追鄴城友屣步出蘭宫法侣殊人世天花異俗中鳥聲不測處松吟未覺風此時超愛網還復洗塵蒙逰靈山寺劉孝孫吾王逰勝地驂駕歷祗園臨風畫角憤曜日采旗翻永懷筌了義寂念啓玄門深溪窮地脈髙嶂接雲根信美諧心賞幽桂一作邃且攀援曳裾欣扈從方悟屏塵喧逰梵宇三學寺王勃杏閣披青磴雕臺控紫岑葉齊山路徑一作徑密花積野壇深蘿幌栖禪影松門聽一作引梵音遽欣陪妙躅延賞一作想滌煩襟觀佛迹寺前人蓮座神容儼一作促松崖聖趾餘年長金迹淺地久石芝一作文踈頽華臨曲磴傾影赴前除共嗟一作悲陵谷逺俄視化城一作成虛石鏡寺盧照鄰古墓芙蓉塔明神松柏煙鸞沉仙集作山鏡底花沒梵輪前銖衣千古佛寶月兩重圓隱隱香臺夜鍾聲徹九天赤谷安禪師塔前人獨坐巖之曲悠然無俗紛酌酒呈丹桂思詩贈白雲煙霞朝晚一作暝聚猿鳥嵗集作四時聞水華鏡秋色山翠含夕曛髙談十二部細核五千文如如數冥昧生生理氛集作氤氲古人有糟粕輪扁情未分且當事芝术從吾所好云和王記室從趙王春日逰陀山寺駱賔王鳥旟陪訪道鷲嶺洽一作狎棲真四禪明靜業三空廣勝因祥河踈疊澗慧日皎重輪葉暗龍舟密花明鹿苑春雕談筌奧旨妙辨漱玄津雅曲終難和徒自奏巴人樂城白鶴寺沈佺期碧海開龍藏青雲起鴈堂湖一作潮聲應法鼓雨氣濕天香樹接前山暗溪承瀑水涼無言誦居逺清淨得空王逰少林寺前人長歌逰寶地徙倚對珠林鴈塔丹青古龍池嵗月深紺園澄夕霽碧砌集作殿下秋隂歸路煙霞逺集作晚山蟬集作風處處吟逰韶州廣果寺宋之問影殿臨丹壑香臺隱翠霞巢飛銜一作含象鳥砌踏雨空花寶鐸搖初霽金池映晚沙莫愁歸路逺門外有三車宿清逺峽山寺前人香岫懸金剎飛泉界石門空山唯習靜中夜寂無喧説法初聞鳥看心欲定猿寥寥隔塵事何異武陵源逰法華寺二首前人薄逰京都日遙羡稽山名分刺江海郡朅來徵素情松路洗心眷象筵敷念誠薄雲解一作界青嶂暾一作皎日騫朱甍苔澗一作潤非深不測竹房間且清感真六象見垂兆二烏一作鳥鳴古今信靈迹中州莫與京林巘永栖業豈伊在一生浮悟雖已久事試去來成觀念幸相續庶幾最後明二髙岫擬耆闍真乘飲妙車空中結樓殿意表出雲霞後果傳三足一作尺前因感一作取六牙宴林薰寶樹水漏溜集作溜滴金沙寒谷梅猶淺溫庭橘未華臺香紅藥亂塔影緑篁遮果漸輪王族緣超梵帝家晨行踏忍草夜誦得靈花江郡將何匹天都亦未加朝來泛舟一作沿泛所應是逐仙查逰雲門寺前人維舟探靜域作禮事尊經投迹一蕭散為心自杳冥龕交大禹穴樓倚少微星沓嶂圍蘭若回溪抱竹庭覺花塗砌白甘露洗山青鴈塔騫金地虹橋轉翠屏人天宵現影神鬼晝潛形理勝常虛寂緣空自感靈入禪從鴿繞説法有龍聽劫纍終期滅塵躬豈暫寧搖搖不安寐待月詠巖扃逰稱心寺前人釋事懷三隱清襟謁四禪江鳴潮未落林曉日初懸寶葉交香雨金沙吐細泉望諧舟客趣思發海人煙顧櫪仍留馬乘杯久棄船未逰龜負嶽且識鳥耘一作耕田理契都無象心冥不計筌安期庶可揖天地得齊年秋晚逰普耀寺前人薄暮曲江頭仁祠暫可留山形無隱霽野色遍呈秋荷覆香泉密藤纒集作緣寶樹幽平生厭塵事遇集作過此忽悠悠題杭州天竺寺前人鷲嶺鬱岧嶤龍宫隱寂寥樓看一作觀滄海日門聽浙江潮桂子月中落天香雲外飄捫蘿登塔逺刳木取泉遙霜序花更發冰溪葉未凋夙齡尚遐異搜對滌煩囂會入天台裏看余渡石橋宿雲門寺前人雲門若邪裏泛鷁路才通夤緣緑篠岸遂得青蓮宫天香衆壑滿夜梵前山空漾漾潭際月飄飄集作飀飀杉上風兹焉多嘉遁數子今莫同鳯歸慨處士鹿化問一作聞仙公樵路鄭州北學井阿巖東永夜豈云寐曙葉忽蔥蘢谷鳥囀尚澀源桃驚未紅再來期春暮當造林端窮庶幾蹤謝客開山投剡中清逺江峽山寺張説流落經荒外逍遙此梵宫雲峯吐日月集作月白石壁淡煙虹集作紅寶塔靈仙湧懸龕造化功天香涵竹氣虛唄引松風簷牖飛花滿集作入廊階集作房廊激水通猿鳴知山靜魚戲見集作辨江空靜默將何貴所貴心境集作鏡同襄州景空寺題融上人蘭若前人髙名出漢隂禪閣跨香岑衆山既集此作皆圍繞長澗集作川復回臨雲峯曉靈集作空變風水夜虛吟碧甃龍池滿蒼松虎徑深舊知清巖意集作青巖憶偏入𡨕窅心何由侣飛錫從此脫朝簮灉湖山寺前人空山寂歷道心生虛谷迢集作超遙野鳥聲禪室從來塵外賞春臺豈是世中情雲間東嶺千重出樹裏南湖一片明若使巢由同一作知此意不將蘿薜易簮纓逰龍山靜勝寺前人每上襄陽樓遙望龍山樹鬱岪吐岡嶺微芒集作蒙在煙霧下車嵗已成飾馬間集作問餘步苦霜衰集作豪野草愛日揚紅集作江煦雲對石上塔風入松下路禪室宴三空仁祠圖集作同六趣兒童供戲集作共嬉謔猿鳥相驚顧南識恆山集作相公臺北望先賢墓世上人何在時聞心不住唯一作但傳無盡塗可使有情悟武簷山寺蘇頲見集本武簷獨蒼然墳山下至泉鱉靈時共盡龍女事同遷松柏銜哀處幡花種福田詎知留鏡石長與法輪圓慈恩寺二月半寓言前人二月韶春半三空霽景初獻來應有受滅盡竟無餘化迹傳官寺歸誠謁梵居一作閭殿堂花覆席觀閣柳垂疏共命枝間鳥長生水上魚問津窺彼岸迷路得真車行密幽關靜談精俗態祛稻麻欣所遇蓬䕪愴焉如不駐秦京陌還題蜀郡輿愛離方自此回望獨躊躇利州北佛龕前一無此字重於去嵗題處作前人重巖戴清美分塔題增集作起曽標蜀守經塗處巴人作禮朝地疑三界出空是六塵銷卧石鋪蒼蘚行江覆緑條嵗年書有記非為學題橋祠紫蓋山塗經玉泉諸山寺張九齡指塗躋楚望策馬傍荆岑稍稍松篁入泠泠澗谷深觀竒逐幽映歷幽集作險一作覽忘嶇一作嶇􅋂上界投佛影中天揚梵音焚香懴在昔禮足誓來今靈異有時集作若有對聖仙真集作其可尋髙僧問逝者絶集作逺俗是初心蘚駮集作剝經行處猿啼宴坐林歸真已寂滅留迹豈堙沉法施自兹廣何云千萬金冬中至玉泉山寺屬窮隂冰閉崖谷無色集作景及仲春行縣復往焉故有此作前人靈境信幽絶芳時重暄妍再來及兹勝一遇非無緣萬木柔可結千花敷欲然松間鳴好鳥竹集作林下流清泉石壁開精舍金光照法筵真空本自寂假有聊相宣復此灰心者仍追巢頂禪簡書雖有畏身世亦俱捐登栖靈寺塔蔣煥一作渙三休尋磴道九折步雲霓瀍澗臨江北郊原極海西沙平瓜步出樹逺緑楊低南指晴天外青峯是會稽題瑩上人院寇埴捨筏求香偈因泉演妙音是明捐俗網何獨一作必在山林繚繞藤軒密逶迤竹徑深為傳同學志兹宇可清心同皇甫兵曹天宫寺浴室新成招友人賞會寇垣溫室觀初就蘭交託勝因共聽無漏法兼濯有為塵水潔三空性香霑四大身清心多苦友頌德慰同人奉和崔司馬逰雲門寺孫逖繫馬青溪樹禪門春氣濃香臺花下出講坐竹間逢覺路山童引經行谷烏從更言窮寂滅回䇿上南峯和崔司馬登稱心山寺前人郡府乘休日王城訪道初覺花迎步履香草藉行車倚閣觀無際尋山盡太虛巖空迷禹迹海靜望秦餘翡翠巢珠網鵾雞間綺疏地靈資淨土水若護真如寶樹誰攀折禪雲自卷舒晴分五湖勢煙合九夷集作疑居生滅分無象窺臨已得魚嘗集作嘗聞寶刀贈今日奉瓊琚文苑英華卷二百三十三
