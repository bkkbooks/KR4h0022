body:
  text: 文苑英華巻四百七十九宋李昉等編寧邦臨難不顧狥節寧邦䇿三道經國文可以經邦國䇿三道長才長才廣度沈迹下僚䇿一道應臨難不顧狥節寧邦科䇿長壽三年第一道問若濟巨川必慿舟楫之勢將興大厦實佇欒櫨之材聖皇提象膺符順天革命變澆風於易簡濟一作躋薄俗於醇醲未明求衣日旰忘食無遺庖一作炰鼎不棄芻蕘聞逆耳之言欣一作怡然啓齒聽犯鱗之說假以温顔緬懐六一作七聖之規勞求五臣之俊至如臨難不顧知無不為獻替帷幄匡過補缺爰自御命之流並應搜揚之旨子大夫博古强學見賢思齊一善或同一作咸周非千載相遇肇自漢魏以及梁陳若斯之人者一無者布在方䇿宜具載一作陳年代各叙徽猷無憚米鹽用旌多識對薛稷對曰后克艱厥后臣克艱厥臣是羣龍無首虚已明庭之上鼷䑕全身深穴神丘之下故有勞於一饋不輟子高之耕待以三旌無過屠羊之肆懐乎朽馭一作懍乎秋駕既識為君之難跼此春氷未見為臣之易然而夣弼降佐風起雲從其天祐之俊乂將至當今制賢以禄制爵以庸設言不違式化厥訓覇王騏驥翼天駟而齊衡社禝元龜升帝寳而負兆猶是幽芳在採雲逸來覊垂倒景之懸光燭重泉之沉隱故逺臣得離山草比獻野芹瞻望天臺數跡對曰帝徳廣運六臣參其業天道大明五帝陳其序猶黼黻之章五色鼎鼐之餁五味五靈之効禎祥五音之和雅樂若乃同義變力古人中求則紀信誑項以免君王經刎頸以紓國九鄉居府王脩從赴難之義二國合圍路中無返言之失漢帝之憚汲黯陳王之畏桞荘社稷之臣於是乎在恪居爾位勤不告勞則蕭公堂堂呉漢紏紏馮豹伏於閣下黄公宿於臺上憂公奉國可以不謂忠乎書誡面從詩詠司直犯顔無隱求福不囬周昌之比漢髙同乎桀紂劉毅之方晉武類彼桓靈申屠剛之軔車鍾離意之排閤史魚是慕直在其中聖人闕議君子謀道張良之翼漢王郭嘉一作隗非之協魏主宋武之得穆之齊高之得禇彦定䇿决勝謀夫孔多蓬矢桑弧有志四海飛旌挿羽道好二同膠柱豈調絃之術飲氷實將命之難陸賈南行責蠻夷之失禮陳湯西討誅單于之暴慢終令趙佗貢職郅支傳首竹帛所載斯其庶乎謹對第二道問自周星攅耀漢日通輝象教聿興苾蒭鬱起眷兹和衆因果為先伊此法門棟梁攸屬我皇光膺天授託降閻浮𢎞八觧之要津啟四禪之幽鍵濟含生於彼岸證圓果於中天紺宇巍巍緇徒翼翼莫不譽髙澄什聲重安逺振三飜於辨囿悟兩諦於談筵飛錫煙蒸乗杯霧委蘭艾因而或揉玉石由是難甄迹雖選於𤣥關名乃編於白屋若欲令沙汰促以金科將恐乖智海之𢎞規匪提河之遺範然則經行之所在釋氏而含容朱紫分區談王化而期切弛一作施張之術去就何從對對曰竊惟善本無生兹縁常寂捨身捨智湼槃之行可觀不動不定般若之名已立尊容聖質剖碧玉而恒傳寳相靈摸鏤紫金而尚在運二儀而廻掌巍乎寳力極萬物之濡足皇矣能仁是以付受有歸鬱興尊記知來之鑒逺明於萬刼祚聖之符大啟於九部始則江漢廣被終以闗河積學由是名僧軰出賢衆肩降道行息於顧澄什而服侣戒梵禪結視安逺而俯孩雖葱嶺伽藍涉流沙而西極白木聚落浮漲海而東馳聖教之興為期為感此句疑但敬重堅固有悲忍之大權循習䕶持有煩惱之深淺物情以之勤切俗慕由是懇到苟求利養或滋貪濁濫名竊服行偽學非魚目叨珍遂入摩尼之寳烏鵲借類便假伽藍之翼謂宜宥而勿罰限其自新巻迹緇林之遊反服白衣之役則慜一作愍愚受智寛令四飛辨是决嫌浮食一變九色揚翰不謬於楚雞六管流聲豈混於齊士庻人無量在釋典而雖𢎞出家有限慿國經而必恪維摩之入諸必疑作心藏尚為居士之身菩薩之惠其神通由特在家之誡未虧平等何妨一作方慎擇謹對第三道問神農王一無王字曰金城千里湯池百步而無粟者不一作弗能守也然則師出以律咸資於糗糧兵雖尚竒必藉於流衍皇周八紘有截四海無虞折衝樽爼之間旅軍袵席之上而吐蕃小醜時擾於沙塲黙啜遺兇偷生於玉塞由是任以精卒寄以邉陲車徒置騎實賴防禦飛芻運粟輓轉之弊一作飛芻􅞮粟轉餽之弊尤深疆理屯田播植之功難就欲使人無憂於半菽嵗有積於如坻强國富甿佇聆良䇿對對曰持人之術地著為本應敵之道糗糧為先故李悝盡地力而創謀本能强魏衛鞅開阡陌而急戰終以覇秦當今三壤既平九税有職倉庾陳積秷秸充仞山川効祉而咸叙陰陽感化而致和狡戎黠羌不討之日乆矣天有星象以分其區地有山河以致其險素野遐曠𤣥國寒凉塞下三春未辨重重之樹河邉九月已落青青之草我后惻隱巖廊之下垂拱袵席之上聖智備天地神武動山岳悠然逺覧白露凉秋建日月朱鳥之旗樹風雨蒼牛之艶疑将帥良猛謀慮深長猶重息人未脩伐鬼而犬羊無檢時驚邉柝定逺侯之功畧還出玉門戍校尉之七營更連金郡麻奴小醜敢懐凌斥之心榆鬼殘袄仍延晷刻之命結山豪而嘯聚驅糓馬而陸梁百萬之師糗糧易盡空虚之地轉餉難集良可追蹤墾草取彼大田脩充國之舊圖採威明之逺筭将軍素勵爰興斷河之術都尉垂強畢盡通溝之利舉農夫而休戰士息轉輸而用耕牛智効其謀勇奮其力資虜金之如粟籍邉馬之如羊賞士犒師選騎舘糓或休垣罷障城㓕途殚然後坐鳳凰之臺驗麒麟之貢王旅凱入豈不休哉清問徒訓疑危言每竭短才杼軸景夕貽憂謹對文可以經邦國策景雲二年問三雄鼎立四海𤓰分魏氏獨跨于中原孫劉割㨿于南土五勝更襲唯受命以當塗四大居尊咸仗義而稱帝二十八宿指躔次於何方三十六郡列封疆於何所醇化懿綱非無寛猛之規愛國治人自有弛張之度皇皇祖考並建鴻名眇眇子孫俱聞失德為功業之厚薄而存亡之後先至如獻納忠規縱横武節既自方於樂毅或見比於張良各有其人詳諸史傳所行事迹咸請縷陳對晁良貞對曰漢代崩離三光分景齊甿盪析九土殊方權備割㨿於岷吳瞞丕纂圖於冀兖火行土德則有攸歸紫色蛙聲豈無兼峙䇿曰二十八宿指躔次於何方三十六郡列封疆於何所至若畢昴為大魏之郊井絡應庸蜀之分星紀直奎吳之野婺女寄虚越之精此其躔次也至若常山鉅鹿孟德之設教㑹稽豫章文臺之建國考廣漢犍為之地實夜郎𤣥德之邦星土之殊於是乎在䇿曰醇化懿綱非無寛猛之規愛國治人自有弛張之度皇皇祖考並建鴻名眇眇子孫俱聞失德為功業之厚薄而存亡之後先者且夫天命不謟帝圖難僣劉既備矣當禪與人此乃事本於元符何止功殊於厚薄祚窮安樂不亦宜哉至於魏主以雄猜之姿虎噬河朔吳王以英威之畧鳳起江南欺孤有言貽譏於石勒令圖發論見稱於陸機蜀滅於前吳亡於後物之理也夫何足疑䇿曰至如獻納忠規縱横武節既自方於樂毅或見比於張良各有其人詳諸史傳所行事迹咸請縷陳者山川出雲賢豪擇木英英文若見比於留侯桓桓孔明自方於昌國聞九錫而殊議節表純臣荷三顧而知恩身歸奥主命畢空噐不其惜哉威餘返旗蓋亦竒矣大者逺者斯焉取斯謹對同前鄭少㣲第二人對漢氏失德魏圖爰啟孫劉建號唇齒相依咸能廓帝緒以定業振皇綱而握紀雖數有五勝運鍾當塗而土無二王終殊覇業然則封疆畫界俯稽於地理瞻星揆景仰煥於天文東井發曜於梁岷傍分屬漢南斗連輝於吳㑹逺接荆衡詳魏土之分野當畢昴之躔次伊洛列山川之郡曹公居四隩之中毗陵在吳華陽惟蜀疆里所得其在兹乎至於開國基行政令咸垂統履順永傳來葉創業興緒克昌後昆終數代而一何倫比雖鴻名休德将崇貽厥之謀而繼代守文頗著聿脩之羙是以堂構始於祖考功業由於厚薄負荷因其子孫存亡以之先後至於忠規動俗武節冠時異代齊名孔明自方於樂毅死而可作文若偶比於張良懐獨見之眀既一謀於匡濟行闇合之䇿終不謝於孫吳謹備諸前庻㡬萬一謹對同前雍惟良對天命靡常地變其宗三雄鼎㨿分割乾坤或利近江海銀銅之凑或邑居河洛桑梓之餘用能仗風雲采松竹開物成務廣運靖人至如仰緯星躔傍分列郡成都應乎井絡建鄴開於斗牛若乃發跡譙墟圖光畢昴竟能一紫宙之意兆黄精之符然而物運弛張得失成敗此關諸天意也諒非人事也豈功業之厚薄何存亡之先後長想前修載述古跡且為人臣者善指事之要專切直之言然則荀氏之比張良沉機已迅葛候之方樂毅希古自高俱能明允克誠興光大化代收其噐人獻其謀觀國以取肅軍容退惡以力扶王室其理甚博厥美惟先畫為九州時更七代徒勤短思有媿縷陳謹對長才廣度沉迹下僚䇿證聖元年問四岳疇庸羲和代掌其任九官命職稷禹不易其能逢化乆以庸一作康時藉功深而成務洎乎嬴劉以降曹馬承流罕為官以擇人直循資而就列或十旬而登三事或一日而致九遷遂開趨競之門莫守代工之美國家網羅羣彦驅駕時英其政洽於至和其人淳於太古今欲削漢魏之遺法復堯禹之逺圖能其事者永守其官稱其職者不遷其任增秩賜爵用申勸善之規金帛璽書載表優賢之義變通之理尚或多端用捨之途佇聞良筭一作䇿對張倚登科記作漪對昔者明王之御天下也奉若天道建邦設都樹之以后王化之以師長用人弗及私昵建官惟在賢才夫難知非獨在於今日故曰知人則哲惟帝難之自生人以來有國之主莫不得賢則治失賢則亂此乃自然之義百王不能易也是知賢人君子國之所急詩曰南山有臺北山有萊樂只君子邦家之基言人君得其賢臣所以成其美化廣其基業也遐觀歷代聖王之求賢哲也義匪一途或精選以取之或降訪以得之有營之經載而始獲有求之不日而便至遲速之理雖異輔弼之職不殊黄帝勞於夣想而感力牧誠之至也唐堯務於疇咨而致䕫龍訪之審也至唐虞之黜陟幽明三考就績夏禹之顧盼空谷之起成名殷宗託夣於傅巖姬文遊心於渭水此六君者可謂勤於求賢而善於用人也故能使元凱就績申甫登朝道濟五臣功宣十亂康良作誦喜起成歌人無險詖之情代有雍熈之樂由庚入詠天保為詩下懐報主之心上荷受天之禄書曰百僚師師百工惟時庻績其凝此之謂也斯並政符大道理合至公委質能臣之一德所以天工可代人爵攸冝慿乆化以濟寰瀛藉深功而安宇宙暨戰國之代王道寖㣲各佇英賢或雜或覇楚襄勞持金之聘燕昭躬擁篲之禮空聞僣號之議未覩升平之業雖桓公之有仲父晉侯之獲趙文委任責成共登覇道唯勤鬬爭之理不務淳和之績而動乖王度舉違帝典故五尺童子耻之不論况所由齷齪何其卑也秦皇不仁虐亂是極儒生塡於坑井詩書㓕於煙火忠貞清白以為徒苦謟佞邪媚謂之至公卒以覆亡為後代誡實由逺賢近佞使之然也漢高祖雖不好儒然亦任用英傑登壇而禮韓信輟洗而迎酈生委蕭曹以股肱寄張陳以社稷至孝武之代儒學漸該採董仲舒之䇿始令郡國貢舉於是賢良方正之士霧委雲集其晁錯公孫𢎞匡衡蕭望之軰並繼踵而至故當文景之代號為得人詩稱濟濟多士文王以寜漢所以寜者亦士之力也光武仗吳鄧以立功任賈㓂以起事㧞竒取異决自於心爰至顯宗中興於兹為盛由此而兩漢之代數百年間陟正黜邪褒善貶惡雖不襲唐虞之法亦去煩芟亂㡬乎大成矣逮獻靈之際姦猾縱横升必以財進不由道於是縉紳㓗白之士疾之若讐乃曰舉秀才不知書察孝亷父别居寒素清白濁如泥高第良将怯如龜至乃懸爵而賣之列價而爭之守正道者以為陸沉由斜徑者謂之智變衣冠為之失序賢哲由是潜藏遂使社稷䘮亡後嗣覆㓕悲夫此伐檀所以興刺黍苖一作麥秀所以勞歌無他故焉賢人不得進也及乎當塗啟運典午開基陳羣制九品之條劉毅興八損之權故曹羲疾其闊逺孫楚以為鬼録遂令權要歸於中正威福去於天朝臧否任情品藻乖次宋齊之季梁隋之末聘士求賢罕聞稽古棟橈鼎折唯見陵夷既同自鄶之譏詎勞更㒒之説聖上覽百王之得失立萬代之規模大開舉爾之科廣陳訓廸之典用與不用賢否各稱其能材與不材輪桷並當其任小人去位疾之猶若冦讎君子盈朝求之恒如不及故得百僚無濫九有昇平不聞濡翼之譏永絶爛頭之誚仲長亡越級之論賈生無調下之悲今欲逺服堯禹之蹤近棄劉曹之法增秩令其永任錫帛許其不遷使官不易能職遵代掌雖優賢之義有所㑹通而隨時之談或恐未可何則太古敦朴務静人希敦朴則易淳務静人希則易理故不勞而功可就今聖明撫運才多俗阜俗阜則事煩才多則理劇必資明哲獨任不以避嫌但使委得其人數遷何妨化理如其用失其理乆任豈廢功虧愚管所窺以為如此大體期於不濫所務在於得賢茍違此途未知其可謹對文苑英華巻四百七十九
