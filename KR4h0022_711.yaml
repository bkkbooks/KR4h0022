body:
  text: 文苑英華卷七百十二宋李昉等編詩集一玉臺新詠集序一首河嶽英靈集序一首篋中集序一首華陽屬和集序一首大唐中興間氣集序一首左補闕安定皇甫公集序一首吳興晝公集序一首右諫議大夫韋君集序一首唐使君盛山唱和集序一首玉臺新詠集序徐陵凌雲槩日由余之所未窺千門萬户張衡之所曽賦周王璧臺之上漢帝金屋之中玉樹以珊瑚作枝珠簾以玳瑁為匣一作押其中有麗人焉其人也五陵豪族充選掖庭四姓良家馳名永巷亦有潁川新市河間觀津本號嬌娥曾名巧笑楚王宫內無不推其細腰衛國佳人俱言訝其纎手閲一作説詩敦禮非直二字一作豈東鄰之自媒婉約風流無一無此字異西施之被教弟兄協律自一作生小學歌少長河陽由來能舞琵琶新曲無待石崇箜篌雜引一作句非因一作關曹植傳鼓瑟於楊家得吹簫於秦女以至寵聞長樂陳后知而不平畫出天仙閼氏覽而遙妒至如東鄰巧笑來侍寢於更衣西子微顰得橫陳於甲帳陪遊馺娑思我切騁纎腰於結風長樂鴛鴦奏新聲於度曲粧明一作鳴蟬之薄鬢照墜一作墮馬之垂鬟反插金鈿橫抽寶樹南都石黛最發雙蛾北地燕支一作胭脂偏開兩靨亦有嶺上仙童分丸魏帝腰中寶鳳授厯軒轅金星與婺女爭華麝月共姮娥競爽驚鸞冶袖時飄韓掾之香飛燕長裾宜結陳王之佩雖非圖畫入甘泉而不分言異神仙戲陽臺而無别真可謂傾國傾城無對無雙者也加以天情開朗逸思雕華妙解文章尤工詩賦琉璃研匣終日隨身翡翠筆牀無時離手清文滿篋非唯芍藥之花新製連篇寧止蒲萄之樹九日登髙時有緣情之作萬年公主非無纍德之辭其佳麗也如彼其才情也如此既而椒宫一作房宛轉柘館隂岑絳劍晨嚴銅鋪晝淨一作銅梁畫靖三星未夕不事懷衾五日猶余疑誰能理曲優遊少託寂寞多間厭長樂之疏鐘勞宫中一作中宫之緩箭輕身無力怯南宫之搗衣生長深宫笑扶風之織錦雖復投壺玊女為歡盡於百嬌爭博齊姬心賞窮於六齒一作箸無怡情於暇景唯屬意於新詩可得代彼萱蘇微蠲愁疾但往世名篇當今巧製分諸一作封麟閣散在鴻都不務一作藉連章無由披覽於是然脂暝寫弄筆一作墨晨書選一作撰録艷歌凡為十卷曽無參於雅頌亦靡濫於風人涇渭之間若斯而巳也麗以金繩裝之寶軸三臺妙札亦龍伸蠖屈之書五色花箋皆河北膠東之紙髙按疑鉛粉仍定魯魚之文辟惡生香聊防羽陵之蠧靈飛六甲髙擅玉函鴻烈仙方長推丹枕至如青牛帳裏餘曲既一作未終朱鳥窗前新粧已竟方當開茲縹帙散此緗編一作縚繩永對玩於書帷長循環於纎手豈如鄧學春秋儒者之功難習竇傳却老金丹之術不成固勝西蜀豪家託情窮於魯殿東臺甲館流詠止於洞簫孌彼諸姬聊同棄日猗與彤管無或譏焉一作皆藝文類聚河嶽英靈集序殷璠序曰梁昭明太子撰文選後相效著述者十餘家咸自稱盡善髙聽之士或未全許且大同至於天寶把筆者近千人除勢要及賄賂者中間灼然可尚者五分無二豈得逢詩輒贊往往盈帙蓋身後立節當無詭隨其應詮揀不精玊石相混致令衆口銷鑠為知音所痛夫文友神清體雅編紀者能審鑒諸體安詳所來方可定其優劣論其取捨至如曹劉詩多直致語少切對或五字並側或十字俱平而逸價終存然挈瓶膚受之流責古人不辨宫商詞句質素恥相師範於是攻乎異端妄為穿鑿理則不足言常有餘都無比興但貴輕艷雖滿篋笥將何用之自蕭氏以還尤增矯飾武德初微波尚在貞觀末標格漸髙景雲中頗通逺調開元十五年聲律風骨始備矣實由主上惡華好朴去偽從真使海內詞人翕然遵古有周風雅再闡今日璠雖不侫竊嘗好事常願刪略羣才贊聖朝之美爰因退迹得遂宿心粵若王維王昌齡儲光羲等三十五人皆河嶽英靈也此集即以河嶽英靈為稱詩一百七十首分為上下卷起甲寅終乙酉論次于序以品藻各冠于篇額如名不副實才不合道縱壓梁竇終無取焉篋中集序元結元結作篋中集或問曰公所集之詩何以訂之對曰風雅不興幾及千嵗集作年溺于時者世無人哉嗚呼有名位不顯年夀不終獨無知音不見稱頌死而巳矣誰云無之近世作者更相沿襲拘限聲病喜尚形似且以流易為辭不知喪於雅正然哉彼則指詠時物會諧絲竹與歌兒舞女生汙惑之聲於私室可矣若令方直之士大雅君子聽而誦之則未見其可矣吳興沈千運獨挺於流俗之中強攘於巳溺之後窮老不惑五十餘年凡所為文皆與時異故朋友後生稍見師效能似類者有五六人於戲自沈公及二三子皆以正直而無祿位皆以忠信而久貧賤皆以仁讓而至喪亡異於是者顯於集夲文粹作榮當世誰為辨士吾欲問之天下兵興於今六嵗人皆務武斯焉誰嗣巳長逝者遺文𣪚失方阻絶者不見近作盡篋中所有總編次之命曰篋中集且欲傳之親故冀其不亡於今凡七人詩二十二首時乾元三年也華陽屬和集序于邵六義詩人之藴雅貫三極而正存象外班九流而化行天下夫然則遊夏登科於孔門獨擅文學雖風流萬古而不易者文乎哉且日新之謂盛德業崇之謂不朽自大劍之南在漢有文翁實長西蜀開設學校為來者宗師順流千載而餘芳不泯厯魏有髙朕晉有張華皆好古博聞能述道事講信修睦傳之無窮是以在綿巴有渝有挾鼓濮率相勸道人無隱焉洎大厯初尚書左僕射冀國崔公登壇受命邊鄙不聳既國用偃武而家將訓文近取諸身旁求是類髙選幕客無非其人彬彬然文質協乎中而英華發乎外矣殿中侍御史滎陽鄭公道同斯應參乎理戎以玊帳之暇而清詞間作盈我懷袖式歌且謡以為離羣索居誰與晤語故自相府及冀公逹於儲公凡所獻酬纘為三卷仍以屬和為集之目夫屬和者唱豫和汝擊發商徴亦取諸伐木相求之義斯蓋鄭君之意也同聲于邵聞而且喜即之寓目曄若春榮遂講我以宣布咨我以序引取彼敝帚無相患焉大唐中興間氣集序髙仲武詩人之所作夲諸心心有所感而形於言言合典謨則列於風雅暨乎梁昭明載述巳往撰集者數家榷集作𣙜其風流正聲最備其餘著録或未至正焉何者英華失於浮遊玊臺陷於淫靡珠英但紀朝士丹陽祗集作止録吳人此由曲學専門何集作無暇兼包衆善使夫大雅君子所以對卷而集作起長歎也唐興一百七十載屬方隅叛渙戎事紛綸業文之人述作中廢粵若肅宗先帝以殷憂啓聖反正中興伏惟皇帝以出震繼明保安區宇國風雅頌蔚然復興所謂文明御時上以化下者也某不揆菲陋輒罄謏聞博訪詞林採察謡俗起自至德元年首終于大厯末年作者數千選者二十六人五言詩一百四十首七言詩附之列為兩卷略敘品彚人倫命曰中興間氣集且夫微言雖絶大制猶存詳略其臧否尚可擬議古之作者因事造端敷𢎞體要立義以全其制因文以寄其心著王政之興衰國風之善否豈其茍悅權右取媚薄俗哉今之所收殆革斯弊但使體狀集作格風雅理致清新期觀者易心聽者竦耳則朝野通取集作載格律兼收自鄶以下非所附𨽻凡百君子幸詳至公二字集作於至理矣左補闕安定皇甫公集序獨孤及五言詩之源生於國風廣於離騷著於李蘇盛於曹劉其所自者逺矣當漢魏間集作之間雖以文粹作已朴𣪚為器作者猶質有餘而文不足以今揆昔則有朱絃踈越大羹遺味之歎厯千餘嵗至沈詹事宋員外集作考功始財成六律文粹作吕彰施五色使言之而中倫歌之而成聲緣情綺靡之功至是乃備雖去雅寖逺其麗有過於古者亦猶路鼗出於土鼓篆籀生於鳥迹也沈宋既歿而崔司勳皓王右丞維復崛起於開元天寶之間得其門而入者當代不過數人補闕其人也補闕諱冉字茂政玄晏先生之後也集夲文粹無也字銀青光祿大夫澤州刺史諱敬德之曽孫朝散大夫饒州樂平縣令諱價之孫中散大夫潭州長集作刺史諱顗之子十嵗能屬文十五而老成右丞相曲江張公深所歎異謂清頴秀拔有江徐之風伯父祕書少監彬尤器之於是令問休暢舉進士第一厯無錫縣集夲文粹無此字尉左金吾兵曹今相國太原公之推轂河南也辟為書記大厯二年遷左拾遺轉左補闕奉使江表因省家至丹陽朝廷虛三署郎位以待君之復不幸短命年方五十四而歿嗚呼惜哉君忠恕廉恪居官可紀孝友恭讓自內形外言必依仁交不茍合得喪喜愠罕見於容故覩君述作知君所尚以景命不永斯文未臻其極也蓋存於遺札者凡三百有五十篇其詩大略以古之比興就今之聲律涵詠風騷憲章顔謝至若麗曲感動逸思奔發則天機獨得非師資所奬每舞雩詠歸或金谷文會曲水修禊南浦愴别新意文粹作聲秀句輒加於常時一等才鍾於情故也君母弟殿中侍御史曽字孝常與君同稟學詩之訓君有誨誘之助焉既而麗藻競爽盛名相亞同乎聲者方之景陽孟陽孝常既除喪懼遺製之墜於地也以豫與茂政前後為諌官故䘖痛編次集夲文粹作集以論撰見託遂著其始終以冠于篇吳興晝公集序于頔詩自風雅道息二百餘年而騷人作其旨愁思其文婉麗亡楚之變風歟至西漢李陵蘇武始全為五言詩體源於國風流於騷故多憂傷離逺之情梁昭明所造文選録古詩十九首亡其姓氏觀其詞蓋東漢之世李蘇之流自建安中王仲宣曹子建鼓其風晉世陸士衡潘安仁揚其波王曹以氣勝潘陸以文尚氣勝者魏祖興武功於二京已覆文尚者晉武圖帝業於五胡肇亂觀其人文興亡之迹人焉廋哉宋髙祖平桓玄定江表文帝繼業五年間江左寧謐魏晉文章鬱然復興康樂侯謝靈運獨步江南俯視潘陸其文炳而麗其氣逸而暢驅風雷於江山變晴昏於洲渚煙雲以之慘淡景氣為其澄霽信江表之文英五言之麗則者也逮乎髙一作濟世宣城守謝玄暉亦得其詞調函於風格不侔康樂矣梁陳已降雖作者不絶而五言之道不勝其情矣有唐吳興間士釋皎然字清晝即康樂之十世孫也得詩人之奧旨傳乃祖之精華江南詩人莫不楷範由於緣情綺靡故詞多芳澤師古典制故律尚清壯其或發明玄理則深契真如人不可得而思議也貞元壬申嵗余分刺吳興之明年集賢殿御書院有命徴其文集余自採而編之得詩五百四十六首分為十卷納於延閣書府上人以余嘗著詩述論前代之詩逸疑託豫集序辭不獲已略志其變上人之植情和順稟質端懿中祕空寂外開方便妙言説於文字了心境於定慧又釋門之慈航智炬也余遊方內者何足以扣玄關謝氏世為詩人豈佛書所謂習氣云右集作左下同諌議大夫韋君集序權德輿洙泗門人登四科者唯稱端木賜卜商可與言詩以其善於取類敏於喻禮然則緣情詠言感物造端發為人文必本王澤貞元十二年夏四月庚辰皇帝御麟德殿命通儒碩生與緇黃上手集作首雜論奧賾互相發明繇是京兆韋君以四門博士召見三玄六學博辨宏大精義具舉宸心乃愈尋獻七百字詩一章詞華彬蔚詔旨優答浹日授祕書郎踰月遷右補闕未半嵗拜右諌議大夫其餘以文發身以直事君言語侍從論思諷議賈生當受釐之問方朔擅不窮之智近臣渥命榮冠一時薦紳競勸巖谷集作穴皆聳初君年十一嘗賦銅雀臺絶句右拾遺李白見而大駭因授以古樂府之學且以瓌竒軼拔為已任至弱冠乃喟然曰四始五際今既逺矣會情靈集作性者因於物象窮比興者在於聲律蓋辨以麗麗以則得於無間合於天倪者其在是乎彼惠休稱謝永嘉如芙蓉出水鍾嶸謂范尚書如流風回雪吾知之矣遂苦心藻慮儷詞比事纎密清巧度越羣倫嘗著天竹寺六十集作十六韻魯郡文忠公序引而和之使畫工圖於仁祠摘句配境偕為勝絶又於江南著卧疾二十韻晉國忠肅公手翰以美之曰卓爾獨立其在我韋生乎其為名臣宗公所稱賞如此又與竟陵陸鴻漸杼山僧皎然為方外之侣沉冥博約為日最久而不名一行不滯一方故其曳羽衣也則曰遺名攝方袍也則曰塵外被集作披儒服也則今之名字著焉周流三教出入無際寄詞詣理必於斯文自貞元五年始以晉公從事至京師逮今十年所著凡三百篇嘗因休沐悉以見示德輿鄙昧不能言詩徒以掖垣之寮辱命為序豈愛之厚而忘其不能歟前此論著别為篇第後此者方紬懷仙章句而不復賦人間之事矣今茲詩集以類相從獻酬屬和因亦編次且以聖誕日麟德殿三教講論詩為首凡十卷云唐使君盛山唱和集序古者采詩成聲以觀風俗士君子以文會友緣情放言言必類而思無邪悼谷風而嘉伐木同其聲氣則有唱和樂在名教而相博約此北海唐君文編盛山集之所由作也初文編以英華籍甚輝動朝右書法草奏為明庭羽儀談者謂翰飛密侍潤色名命如取諸懷之易也八年夏佩盛山印綬朱兩轓而西天子雅知其文采慰勉甚厚且曰第如新涖分我憂歎於是惠而保之四封熙熙比嵗連課為百城表率十九年冬既受代轉遷于夔上方以愷悌紓息之為大人文華國之為細或者藴而決之使目不暇瞬庸詎知嚮時嵗月不來之推轂邪理盛山十二年其屬詩多矣非交修繼和不在此編至於營合道志詠言比事有久敬之義焉暌携寤歎惆悵感發有離羣之思焉班春悲秋行部遲容有記事之敏焉煙雲草木比興形似有寓物之麗焉方言善謔離合變化引而伸之以極其致昔魏文帝稱劉公幹五言詩之善者妙絶一時抱朴子云讀二陸之文恐其卷盡今覽盛山之作有似之凡漢庭公卿左右曹方國二千石軍司馬部從事暨巖棲處士令弟才子稽合屬和二十有三人共若干篇盍簮則七子偕賦發函亦千里善應尊賢下士備見於斯葳蕤照燭雖南金青玉之不若也噫文編所友善者僕多善之周星之間物故殆半梁寬中楊懋功尤為莫逆文友零落如何可言况其雅音已矣多歎三復感念涕洟集於筆端是集也編於德輿嘗有木桃瓊瑶之往復辱求序引所不敢讓者俟夫子徴還道舊之日破涕為笑於斯文也文苑英華卷七百十二
