body:
  text: 文苑英華卷一百五十二宋李昉等編天部二望月二十六首雜題月三十五首星十首望月望江中月梁簡文帝一作梁孝元帝澄江涵月影類聚作皓月水影若浮天風來如可泛流急不成圓秦鏡斷復接和璧碎還聮裂紈依岸草斜桂逐行船即此清江上無俟百枝然望月前人流輝入畫堂初照上梅梁形同七子鏡影類九秋霜桂花那不落團扇與誰粧空聞北忩彈未舉西園觴舟中望月梁朱超見初學記大江濶千里孤舟無四鄰唯餘故樓月逺近必隨人入風先繞暈排霧急移輪若教長似扇堪拂艷歌塵望月庾肩吾桂殿月偏來留光引上才圓隨漢東蚌暈逐淮南灰渡河光不濕移輪徹詎開此夜臨清景還承終宴杯和徐主簿望月前人樓上徘徊月窗中愁思人照雪光偏冷臨花色轉春星流時入暈桂長欲侵輪願以重光曲承君歌扇塵望月愁蕭子範漢河東西隂清光此夜出入帳華珠被斜筵照寶瑟霜慘庭上蘭風鳴簷下橘獨見傷心者孤燈坐幽室望月有所思劉孝綽秋月始纎纎微光垂出類聚作步簷朣朧入牀簟髣佛鑑窗簾簾螢隱光息簾蟲映光織玉羊東北上金虎西南昃長門隔清夜高堂夢容色如何當此時懷情向類聚作滿胸臆江上望月鮑泉客行鈎始懸此夜月將弦川澄光尚動流駛影難圓蒼蒼隨逺色漾漾類聚作漾漾逐漪漣無因轉還帆回首眷吾類聚作前賢舟中望月二首庾信舟子夜離家開舲望月華山明疑有雪岸白不關沙天漢看珠蚌星橋視桂花灰飛重暈闕蓂落獨輪斜二夜光流未曙金波影上疑作尚賒照人非七子含風異九華蓂新半璧疑作壁上桂滿獨輪斜乘舟聊可望無假逐靈槎遼城望月唐太宗玄兔月初明澄輝照遼碣映雲光漸隱隔樹花如綴魄滿桂枝圓輪虧鏡彩缺臨城却影散帶暈重圍結駐蹕俯九都佇觀妖氛滅卧痾喜霽開扉望月簡宫內知友庾抱秋雨移弦望疲痾倦苦辛忽對荆山璧委照越吟人高高侵地鏡皎皎徹天津色麗班姬篋光潤洛川神輪輝池上動桂影隙中新懷賢雖不見或似暫參春疑作辰江中望月盧照鄰江水向涔陽澄澄瀉月光鏡圓珠溜徹弦滿箭波長沉鈎搖兔影浮桂動舟芳延照相思夕千里共霑裳秋山望月酬李騎曹李嶠愁客坐山隈懷抱自悠哉況復高秋夕明月正徘徊亭亭出逈岫皎皎映層臺色帶銀河滿光含玉露開白雲籠影度虛暈抱輪回谷邃涼隂靜山空夜響哀寒催數鴈急風送一螢來獨軫離君恨遙想故人杯和康五望月有懷杜審言明月高秋迥愁人獨夜看暫將弓並曲翻與扇俱團霧濯清輝苦風飄素影寒羅衣一此鑒頓使别情集作離難和洛州司士康士曹庭芝望月有懷沈佺期天使下西樓光含萬象集作里秋臺前疑挂鏡簾集作簷外似懸鈎張尹將眉學班姬取扇儔佳期應借問為報在南集作刀頭秋夜望月姚崇明月有餘鑒羈人殊未安桂寒秋樹晚波入夜池寒灼灼雲枝淨光光草露團所由迷所在長望獨長歎望月張九齡清迥江城月流光萬里同所思如夢裏相望枉庭中皎潔青苔露蕭條黃葉風含情不得語頻使桂華空望月懷逺前人海上生明月天涯共此時人情怨遙夜竟夕起相思滅燭憐光滿披衣覺露滋不堪盈手贈還寢夢佳期雨後望月李白四郊隂靄散開户半蟾生萬里野霜合一條江練橫出時山眼白高後海心明為惜如團扇長吟到五更南樓望月釋皎然夜月家家望亭亭愛此樓纎雲溪上斷踈柳影中秋漸映千峰出遙分萬𣲖流關山誰復見應獨起邊愁龍池寺望月寄韋使君闕别駕集作閻别駕司空曙清光此夜中萬古望應同當野山沉霧低城樹有風花宫紛共邃水府皓相空遙想高樓上唯君對庾公登樓望月寄鳯翔李少尹戴叔倫陌上涼風槐葉凋夕陽清露濕寒條登樓望月楚山迥月到南樓山獨遙心送情人趨鳳闕目隨陽鴈極煙霄軒轅不重無名客此地還能訪寂寥西樓望月一作登城望月張籍城西樓上月復是雪晴時寒食集作夜共來望思鄉獨下遲幽光落水塹淨色在霜枝明日千里去此中還别離望關山月此詩見一百九十八卷陳陶海昌望月前人何處無今夕豈期在海頭賈客不愛月嬋娟間滄洲浩然傷歲華獨望湖邊樓煙島青歷歷藍田白悠悠誰無破鏡期繄我信虛舟誰無桂枝念繄我方摧輈始見彎環春又逢團圓秋莫厭綾扇夕百年多銀鈎金盤誰雕鐫玉窟難寫疑作冥搜重輪運時節三五不自由疑拋雲上鏡欲摟疑天邊毬孀居應寒冷搗藥青冥愁兔子樹下蹲蝦蟆池中遊如何名金波不共水東流天花辟膻腥野雲無邊陬蚌蛤乘大運含珠相對酬夜鵲思南鄉露華清東甌百寶安可覷老龍鎖深湫究究詩自我人究究如情人盜者即仇讐海涯上皎潔九門更清幽亭亭勸金樽疑夜久喘吳牛夷俗皆輕擲北山思全疑遊鴈聲故鄉來客淚墮南洲平生煙霞志讀書覔封侯四海尚白身豈無故鄉羞壈坎何足嘆壯如水中虬獵獵谷底蘭搖搖波上鷗中逾疑喪資斧兩地生繁憂一杯太隂君鷦鷯豈無求明日將片葉三山東南浮雜題月視月虞騫清夜未云疲細類聚作珠簾聊可發冷冷玉殿外映見蛾眉月靡靡露方垂暉暉光稍沒佳人復千里餘影徒揮忽縣中庭看月劉瑗移榻坐庭隂初弦時復臨侍兒能勸酒貴客解彈琴柏葉生髮內桃花出髻心月光移數尺方知夜巳深林下月影集本類聚並作映月劉孝綽明明三五夜集作月垂影當高樹攢柯伴玉蟾裛葉映集本類聚並作彰金兔茲林有夜坐嘯歌無與晤側光聊可書含毫且成賦關山月此詩見一百九十卷王褒詠月贈人前人月色當秋夜斜暉映薄帷上弦如半璧初魄似蛾眉渡雲光忽駛中天影更遲高陽懷許掾對此憶相思薄帷鑒明月張正見長河上月桂澄彩照高樓分簾如碎璧隔幔似垂鈎窗外光恆滿帷中影暫流豈及西園夜長隨飛蓋遊賦得三五明月夜江總三五兔輝成浮隂冷復輕隻輪悲類聚作非戰反團扇少歌聲雲前來往色水上動搖明况復高樓照何嗟攬不盈明月引盧照鄰筮仕無中秩歸耕有外臣人歌小歲酒花舞大唐春草色迷三徑風光動四鄰願得長如此年年物候新朗月行張漸朗月照簾晃清夜有餘姿洞房怨孤枕挾瑟愛前墀萱草已數葉梨花復遍枝去歲草始榮與君新相知今年花未落誰分生别離代情難重論人事好乖移合比月華滿分同月易虧虧月當再圓人别星隕天吾欲竟此曲意深不可傳歎息孤鸞鳥傷心明鏡前月下獨酌此詩見一百九十五卷李白金陵城西樓月下吟前人金陵夜寂涼風發獨上西樓望吳越白雲映水搖秋光集作空城白露如珠滴集作垂珠濕秋月月下長吟久不歸古今相接眼中稀解道澄江淨如練令人却憶謝玄暉把酒問月前人青天有月來幾時我今停杯一問之人攀明月不可得月行却與人相隨皎如飛鏡臨丹闕緑煙滅後集作盡青輝發但見宵從海上來寧知曉向雲間沒白兔搗藥秋復春姮娥孤棲與誰鄰今人不見古時月今月曽經照古人古人今人若流水共看明月皆如此所集作唯願當歌對清酒集作酒時月光長照金樽裏月宫詞楊巨源宫中月明何所似如積如流滿田地迥過前殿曽學眉回照長門慣催淚昭陽昨夜秋風來綺閣金鋪情疑影開藻井浮花共陵亂玉階零露相徘徊稍映明河泛仙馭滿窗猶在更衣處管弦回燭無限情環珮憑欄不能去皎皎蒼蒼千里同穿煙飄葉九門通珠簾欲卷畏成水瑶席初陳驚似空復值君王事歡宴宫女三千一時見飛蓋愁看素暈低稱觴願踏清輝遍江上無雲夜可憐冒沙披浪自嬋娟若共心賞風流夜那比高高太液前溪上月僧皎然秋水月娟娟初生色界天蟾光散浦溆素景動淪漣何事無心見虧盈向夜禪月夜泛舟僧法振西塞長雲盡南湖片月斜漾舟人不見卧高僧詩作悮入武陵花剡山夜月六言朱放月在沃州山上人歸剡縣溪邊漠漠黃花覆水時時白鷺驚船秋庭夜月有懷李澄之遊客三江外單棲百慮違山川憶處近形影夢中歸夜月明虛帳秋風入搗衣從來不慣别况屬鴈南飛和元郎中從八月十一至十五夜玩月五首王建半秋初入中旬夜己向階前守月明從未圓時看却好一分一見傍輪生二亂雲遮却臺東月不許教依次第看莫為詩家先見境被他籠與作艱難三今夜月明勝昨夜新添桂樹近東枝立多地濕舁床坐看過墻西寸寸遲四月似圓來色漸凝玉盆生水欲侵稜夜深盡放家人睡雜詠作佳人醉直到天明不炷燈五合望月時長望月分明不得似今年仰頭五夜風中立從未圓時看到圓一作從未團圓直到圓月夜寄微之憶樂天劉禹錫今宵帝城月一望雪相似遙想洛陽城清光正如此知君當此夕亦望臨集作鏡湖水展轉相憶心明月集作月明千萬里江樓望月白居易嘉陵江曲曲江池明月誰同人别離一宵光景潛相憶兩地隂晴逺不知誰料江邊懷我意正當池畔望君時今朝共語方同悔不解多情先寄詩山中問月前人為問長安月誰教不暫離集作相思必切離昔隨飛蓋處今照入山時借助秋懷曠留連夜卧遲如歸舊鄉國似對好親知松下行為伴溪頭坐有期千嵓將萬壑無處不相隨寒食夜月前人風香露重梨花濕草舍無煙集作燈愁未入南鄰十集作井里歌吹時獨倚柴門月中立宿藍橋題月前人昨夜鳯池頭今夜藍一作溪橋口明月本無心行人自回首新秋松影下半夜鐘聲後清影不宜昏聊將茶代酒宿陽城驛題月前人親故尋回駕妻孥未出關鳯凰池上月送我過南山對琴待月前人竹院新晴夜松窗未卧時共琴為老伴與月有愁期玉軫臨風久金波出霧遲幽音待清景惟是好集作我心知西樓月前人悄悄復悄悄城隅隱林杪山郭燈火稀峽天星漢少年光東流水生計南枝鳥月沒江沉沉西樓殊未曉禁中月前人海上明月出禁中秋夜長東南樓殿白稍稍上宫墻淨落金盤水明浮玉砌霜不比人間見塵土汙清光客中月前人客從江南來來時月上弦悠悠行旅中三見清光圓曉隨殘月行夕與新月宿誰謂月無情千里逺相逐朝發渭水流暮入長安陌不知今夜月又作誰家客客中月于武陵離家凡幾宵一望一寂寥新魄又將滿故鄉應漸遙猶臨彭蠡水逺憶洛陽橋更有乘舟客悽然亦駐橈霜月李商隱初聞征鴈巳無蟬百尺樓臺水接天青女素娥俱耐冷月中霜裏鬬嬋娟月夕前人草下隂蟲葉下集作上霜朱欄迢遞壓湖光兔寒蟾冷桂花白此夜姮娥應斷腸星月夜觀星隋煬帝團團素月淨翛翛夕景清谷泉驚暗石松風動夜聲披衣出荆户躡履步山楹欣覩明堂亮喜見太階平觜參猶可識牛女初學記作女牛尚分明更移斗柄轉夜久天河橫徘徊不能寐參差幾種情奉和御製月夜觀星示百僚諸葛頴􅌄窱神居逺蕭條更漏深薄煙淨遙色高樹宿清隂星月滿茲夜燦爛還相臨連珠欲東上團扇漸西沉澄水含斜漢修樹隱橫參時聞送籌柝屢見繞枝禽聖情寄餘事振玉復鳴金同前袁慶六龍初匿影顧兔始馳光戒井文選刻漏銘徼宫戒井傳宵漏山庭引夕涼宸居多勝託間步出琳堂爛爛星芒動耿耿清河長清初學記作情道移天駟北極轉文昌喬枝猶隱畢絶嶺半侵張仰觀留玉裕文選陸士衡宣猷堂詩天姿玉裕睿作動金相無庸徒扣寂何以繼連章同前蕭琮陽精去南陸大疑作火耀始西流夕風凄謝暑夜氣應新秋重門月己映嚴城漏漸修臨風出纍榭度月蔽層樓靈河隔神女仙轡動星牛玉衡指棟落瑶光對幌留徒知仰閶闔乘槎未有由同前虞世南旦秋炎景暮初弦月彩新清風滌暑氣文露淨囂塵藹霧銷輕縠鮮雲卷夕鱗休光灼前耀瑞彩接重輪緣情摛聖藻並作命徐陳宿草誠渝溢吹噓偶縉紳天文豈易述徒知仰北辰星名辛德源邊祲昏高柳爟光照離宫明堂發三令鈎陳集五戎素羽麾全月牛疑旗引半虹虎落驚氛斂龍城宿霧通繫疑作擊鐘張大樂置酒宴羣公關山無復阻車書方大同詠星董思恭歷厯東井舍昭昭右掖垣雲際龍文出池中鳥色翻流輝下月露墜影入河源方知潁川集别有太丘門同前李嶠蜀郡靈槎轉豐城寶劒集作氣新將軍臨北塞天子入西秦未作三台輔寧為五老臣今宵頴川曲誰識聚賢人江邊星月二首杜甫驟雨清秋夜金波耿玉繩天河元自白江浦向來澄映物連珠斷緣空一鏡升餘光隱更漏况乃露華凝二江月辭風檻集作纜江星别霧船雞鳴還曙色鷺浴自清川歷歷竟誰種悠悠何處圓客愁殊未已他夕始相鮮文苑英華卷一百五十二
