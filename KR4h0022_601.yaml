body:
  text: 文苑英華卷六百二宋李昉等編陳情二自叙附為河南魏尹謝官陳情表一首劉相請女婿潘炎罷元帥判官陳情表一首謝試袐書少監陳情表一首為崔大夫陳情表一首為王户部叔文陳情表一首為崔相陳情表一首為濮陽公陳情表一首自叙表一首出官後自叙表一首為河南魏尹謝官陳情表代宗常衮廣徳元年臣少遊言伏奉恩制除某州刺史尋即有替又蒙恩除臣河南唐書作京兆是尹澤及遐荒榮霑枯朽以驚以惕載忭載歡臣少遊誠歡誠喜頓首頓首臣名無德稱官偶時來政謝有經文慙無害朝恩早竊班命累塵每食皆浮何官不曠四三年内榮至崇高萬一分中効仍微薄踰涯若此招損宜然頃者獲罪于天蹐身無地曲承鴻霈仍佐隼旟省揆責輕寢興憂負豈圖招洗瑕穢發生羽毛不次之恩九霄横落無階之位四裔超豋開散皇明龍銜巨燭捧酬𤣥造鼇戴崇山且河洛軍與疑作興京尹寄切念臣術非鈎鉅識昧平反將何以肅清姦回董正人吏自蒙奬擢願覲天慈限以阻脩未承勑命傳聞尚惑疑作感奔赴終勤以七月一日發自渠州星言即露乆冐炎瘴因成癘痁行役攴離轉加沉瘵隙光是廹草露將危今月四日乘輿至漢中尋問醫藥直省王許佺至奉宣進止促臣行程震威俯臨精魂飛散進退無措屏營失圖即以今日驅策殘骸載馳鳯閣猶冀獲全餘喘袛謁龍顔犬馬之疾乆纒螻蟻之誠愈結無任感戴懇廹之至謹因直省王許佺廻謹奉表陳謝以聞臣少遊誠惶誠恐頓首頓首謹言劉相請女壻潘炎罷元帥判官陳情表代宗王諫臣晏言臣實凡淺謬典樞衡元元未安庶政多闕㳙塵罕録尸素空慙臣女婿元帥判官駕部員外郎知制誥潘炎入侍幃幄又司戎政嫌疑之地顛沛是憂頃者累表陳聞兾炎得歸省闥不謂天聽未逹尚阻愚誠内懐氷炭若墜泉谷臣某誠惶誠恐臣聞統天下者以天下舉直錯枉不私其親故能啓至公之門塞羣邪之路伏惟元聖文武皇帝陛下紹休聖緒惟新寳歴内釐百揆外清四海鵷鸞之士充庭漸階而臣與潘炎俱忝近密兵權國政在臣二人是使惡炎者易為辭嫉臣者易為毁倘炎獲戾臣無以見雪脫臣遇謗炎無以自明此臣所以寤寐兢惶罔知攸止昔霍光為大司馬長女婿度遼將軍范明友次女婿羽林監任勝為東西宫衛尉威勢崇重冠於一時不能抑退卒見傾覆前史所惡書而貶之又劉𢎞為鎮南將軍事時朝廷以其女婿夏侯陟為襄陽太子𢎞表陟親戚舊制不得相監有詔聽從竟免禍敗先賢所尚美而書之臣雖才謝古人智不經逺每憂覆餗大懼妨賢竊惟𤓰李之嫌寧望桑藿之許一作訴今是以瀝肝上請昧死聞天必元帥藉炎諮謀則臣甘引退如或廟堂留臣擇用伏願終許罷炎庶遂劉𢎞之心無成子孟之禍無任懇願廹切之至謝試秘書少監陳情表蕭華臣某言伏奉制書以臣試秘書少監恩出意表榮超望外臣循涯揣分以慙以悚臣華中謝臣素庸懦又乏智謀進不能殺身以自明退不能拂衣以逺禍蒙昧昏虐僶俛歲時每讀李陵之書備見前賢之意以為虛死不如立節成名不如報德常恐溘先犬馬湮没羯胡上負君親之恩下貽妻子之恥何嘗不仰南雲而歎息瞻北闕而銷魂偷生茍安蓋所以誓將骸骨歸死朝廷伏頼陛下察以愚衷每垂保䕶遂得潜通間使逺詣官軍收金州而功不踰時掃餘孽而兵無血刃陛下矜臣一介之節捨臣萬死之罪念臣簮履之舊納臣葵藿之誠許歸故國之田園退守先人之墳墓則在臣之志願榮望畢矣陛下之聖恩於臣深矣豈期皇慈廣被𤣥造曲成㧞臣於泥滓之中致臣於雲霄之上已蒙殊奬遽典雄藩旋沐厚恩復登蓬閣空慙有命竊愧無能將何以發揮儒林潤色鴻業稠叠恩意感戴難勝豈臣隕越所能上報無任悚荷屏營之至為崔大夫陳情表代宗李舟臣某言臣素以庸虛百無所取肅宗委臣方靣擢尹兩京盖以天寳末年禄山干命臣未有職位客遊陳州賊兵過河官吏奔竄臣義集驍勇亟摧賊鋒以閭閻之人當幽薊之卒勢相懸倍不顧死亡臣之輕生實著誠素今者回紇代立求援聖朝陛下大布皇威如其冊禮爰膺將命實受寵光又其道路無虞夏一作虜帳尤近擁旄仗節持憲珥貂衘非常之詔書寵内附之蕃落去獲重貺歸成大勳雖潦倒之人衰朽之士亦宜據鞍増氣叱馭前驅况臣常在軍戎未至遲暮豈不欲保微臣之富貴求陛下之恩私哉其理必至顛沛必至廢闕隱而不露何以事君臣往在宣州曽卒得癇疾三日三夜都不知人自此已來發無時候或輕或重或疾或遲此病所來得於風熱常因冐暑失食及冬衣太温兼食羊肉立即發動若過磧之後更無菜蔬苦寒之地須加狐貂又於藥物不得及時則微臣不得全活且螻蟻之命誠何足言但恐敗事有失前期稽恩廢禮伏願陛下以臣此表徧訪朝臣言若涉虛事近辭避伏願加以斧鑕肆諸市朝且使將來永息欺詐無任哀懇迫切之至為王户部叔文陳情表栁宗元臣某言臣母劉氏今月十三日忽患暗集作音風發動狀候非常今雖似退猶甚虛惙驚惶憂苦不知所圖臣惟一身更無兄弟侍疾嘗藥難闕須臾伏乞聖恩停臣所職今臣見在家扶侍其官吏等並已發遣訖臣以庸微特承顧遇㧞自卑品委以劇司夙夜驚惶惟思答効至誠至懇天睠所知豈慮未効㳙塵遽廹方寸以開塞重輕之務加焦勞皇集作憂惕之懐雖欲狥公無由枉志况忠孝同道臣子一心許國誠切於死生報親忍忘於顧復進退窮蹙昧死上陳候母劉氏疾疢小瘳冀微臣駑蹇再効無任惶懼懇倒哀鳴類表作嗚咽之至為崔相陳情表白居易臣植言臣有情事乆未敢言今輙陳露伏増戰缺臣亡父某官亡妣某氏是臣本生亡伯某官某贈某官臣今承後建中初德宗皇帝念臣亡伯位高無後以猶子之義命臣繼紹仍賜臣名嗣襲雖移孝思則在上荷君命俾集作永承繼絶之宗中奪私恩遂阻劬勞之報歳月曠乆情禮莫申自去年以來累有慶澤凡在朝列再蒙追榮或有陳乞皆許廻授况臣猥當寵擢謬陟台階爵禄之榮實有踰於同軰顯揚之命獨未及於先人飲泣茹悲哀慙兩極臣今請以在身官秩并前後合叙勳封特乞聖慈廻充追贈倘允所請無幸於斯則臣烏鳥之心猶再生而展養犬馬之力誓萬死以酬恩蹐地仰天不勝感咽披陳誠懇煩黷宸嚴無任惶懼激切之至謹奉表陳露以聞為濮陽公陳情表李商隱臣某言臣聞事君以忠者所宜効死食君之禄者亦戒妨賢茍非内慊私誠外憂官謗則安肯固辭武節强委侯集作信圭拒七命賜國之榮捨萬里封侯之䇿必知不可安敢無言臣某中謝臣因縁代業遭逢集作遇聖時竊常集作嘗有志四方不掃一室奉隋武之家事無愧陳辭慕鄧傅之門風不傷清議屬者每憂不試深恥因媒自薦之書朝投象魏殊常之澤暮降芸香其後契濶星霜覊離戎旅從軍王粲徒感所知掌檄陳琳亦常交辟吕元膺東周保釐之日李師古太平畔集作叛渙之時潜入其徒盈於留邸臣此時尚持白簡猶着青袍元膺知臣傳劒論兵本於仁信佩鞬揷羽亦識孤虛俾以發姦假之捕盗幸無容忍以及焚巢旋帶銀章俄分竹使隼旟楚峽出以分憂熊軾鄖城忽然通貴豈意復踰五嶺更授再麾中間叨相青宫忝司緹騎纔通閨籍又處藩條越井朝臺備經艱險貪泉湞水益勵平生是甘馬革之言常懼虎皮之誚及聖造逺流南極許拱北辰黄犢留官胡牀掛柱如生羽翼若出嬰羅誓以歸彼冗員處之散地俄以朝那闕守昆壤須人一去闕庭五罹寒燠處京畿五百里之内控番寇數十州之多提皷燒烽増埤濬洫雖國家逺追集作敦上策不事交争然虵豕難防犬羊易縱茍罷嚴徹警則負約渝盟臣自受命以來為日斯乆未嘗一日不修戰格未嘗一日不數軍儲使士有鬬心人無虛額使之偵候咸亦聞知尚未能率勵驍雄揣磨鋒鏑逺收麻壘直取艾亭成大朝經武之威畢微臣報主之分可書竹帛不辱旂常盖以乆處炎荒備薫瘴毒内搖心力外耗筋骸雖馬援據鞍尚能矍鑠而班超攬鏡不覺蕭衰恐無以早就大功乆當重任自思已熟求退為宜伏惟皇帝陛下道冠百王功高三代照臨若日覆露如天况今國不乏人時稱多士有才畧在臣之右齒髮少臣之年俾代處是邦逓臨斯位以之責効誰曰不然俾前逹後生皆無蔽滯由中及外得以交相成陛下適時之方减微臣固寵之責臣不勝祈恩懇廹之至謹差某官某奉表以聞自叙表李嶠臣嶠言奉今月十七日口勑令臣等各自述行能進者臣以蒙鄙遭逄休歴陛下降非常之遇垂不次之恩擢處崇班超登近侍上感皇明識遇之厚下憂忝冐負乘之責常願肝腦塗地以報所天魂魄歸泉不忘結草至於欲披誠欵曲盡智能竭心本朝輸力明主此臣日夜之所思念胷襟之所蓄積豈敢更為進退茍事亷隅固守撝謙坐餙邉幅臣早遘凶閔素甘賤貧少纒羸疴不任勞苦從仕代饑寒之役狥禄無顯逹之心脩身懼於辱先履道期於逺害見强禦之為患也故處之以謙卑知刻薄之為尤也故行之以仁恕慕退讓不敢從馳競之流戒貪殘不敢為絲髪之犯若乃温良誠信之道忠孝友悌之規莫不仰承聖風俯蹈家訓采太平之名教移中人之志業及其屏私昵忘比周内無術數之機外絶朋附之黨一心奉主介然孤立此臣之所以登朝廷而事明聖全直道而朂身名者也人臣事君有死無二見危則致其命當事則先其勞有罪不敢辭有能不敢隱是以西戎不静充國自衒其謀南越未賔終軍思赴其難臣幸蒙採擇得備驅馳若使餙固陋之心竭駑蹇之用勉之以匪懈將之以至公則雖簿領百端樞衡衆務亦淺深而必効何難易之敢辭哉盖明主程才以建官忠臣量已以受職是故輪轅異適水火殊用當其材則事逸而功倍乖其分則形勞而績虧陛下棄短收長循名責實使得効其薄伎申其末用則臣之淺術可得而言臣曽渉經典篤好文史漸六藝之腴潤馳百家之閫閾至若操觚秉牘紀事屬辭雖竊比老彭誠未擬於先哲而上追班馬敢自强於後進陛下以欽明撫運齊聖握圖冠千齡而首出超百王而高視德澤汪濊典章明密至道共八風俱翔神功與四時並運是以衆庶恱豫符瑞肹蠁九服清夷百蠻職貢而嵩高梁父未循疑作修昭報之壇禮官儒林不輯昇平之頌使鴻名有時而鬰良史靡得而稱臣竊懼焉昔成康之隆頌聲並作武宣之盛文章間起虞德茂而臯繇作歌魯道興而奚斯有述然後功業顯乎代德音昭乎聲若夫保馭中和憲章大雅通諷諭之㫖抒嗟歎之懐此臣子之舊經國家之前式不可闕也臣幸得沭浴恩造扶侍軒墀目覩邕熙心積憤懣思陳愚瞽庶存萬一徒以牽迫賤事卒卒無須臾之閑頓伏尫羸軋軋多沉滯之恩常恐犯霧露填溝壑不獲賛揚上德攄布下情生為負義之人死為孤恩之鬼是用終朝三省逹夜九廻撫心刻意屏營反側倘得叅名芸閣假跡蓬山探石室之秘文覽金版之遺籍聽歌探頌以觀四方之風講藝論詩以崇三代之式第其科目載之簡編大以薦陳郊廟報享成功小以敷布樂章潤色鴻業使宏勳播於金石盛德流乎舞詠光濟於當日澤被於來葉然後退没草澤下入幽泉猶生之年也冐陳愚懇惟我陛下察焉臣嶠誠惶誠恐頓首頓首出官後自叙表德宗齊映臣某言伏以臣之依君猶子之依父若心有憂患口不陳聞則是孤負恩慈自取禍敗臣某中謝臣去八月十九日陛下賜臣蔭官詔云漕運成功擢居東掖者臣俯慙光寵上感聖明粉骨糜軀匪申報効臣昨當都主運之日是上都闕糧之時賊光未平蝗蟲方甚臣於河隂領米分付陜州務相催驅不敢廻避其時王事至切臣官最卑臣心雖守謙恭公事亦多牴牾猶蒙陛下遣叚日暹宣慰於臣處事之難臣有微功實由天庇及臣延英對日不敢一言自陳怒臣者疑臣以張身勢憂臣者料臣必投魑魅今臣貶官自縁親累聖恩猶與上州自然宿怒未平因恐小人承便臣既在逺還固易誣痛則呼天實在今日憂之切者謹陳一端往者張鎰在鳯翔之時奏留都營田副使張信之得罪自為犯贓以臣不與往還於臣便生疑怨一昨秋夏之際張信之多在上都自臣貶黜已來不知今向何處但慮知臣在近又知執政恠臣必恐求媚取容搆虛逞怨倘有罪戾聞於聖聽乞降三司審推則臣萬死無恨方當黜責猶恃恩私仰望天顔實如咫尺無任憂廹恃恩之至文苑英華卷六百二
