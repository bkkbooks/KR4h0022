body:
  text: 文苑英華卷四百二宋李昉等編環衛二左右衛將軍授張玄逸右衛將軍制孫逖門下中大夫守光祿寺卿員外置同正員賜紫金魚袋張玄逸幹蠱於君謙沖自下外姻之旅衆望攸歸置彼周行備聞聲實委之環衛尤切腹心宜易位於多疑卿俾呈能於真將可明威將軍守右衛將軍勳賜如故授吳王祗衛將軍等制門下左衛將軍吳王祗等國之近屬朝之多士或同班警衛有避於天倫或列位周行已淹於歲序各移官命用廣朝恩可依前件授駙馬鄭何右衛將軍制白居易勑周設七萃漢列八屯皆以拱衛王宫肅嚴徼道統兹騎吏其屬親賢具官鄭何擢秀士林挺直公器以貞和陶其性以禮樂文其身善積德門慶連戚里况久踐名職纍著聲猷念舊奬能宜加榮寵環列之尹不易其人俾宣力於爪牙不失親於肺腑可右衛將軍餘如故授王知信左衛將軍並史寰右監門衛將軍等制杜牧勑昭武軍校尉前守右驍衛將軍上柱國賜緋魚袋王知信等古人之為理也不以一眚而掩大功克黃紹子文之宗霍陽繼博陸之後知信列祖具丘之戰可庇十代豈止曽孫寰父伯仲亦效忠懇提潔全魏歸于朝廷今者寵以將軍旌其舊德豈唯獨舉賞延之典亦欲使裂土集作列士諸將自為孫謀彛鎬明誼入仕已久皆無悔咎集作吝故有序遷臨封逺邦蔡毫兵部一作郡分憂佐理無忘謹亷可依前件授王知逺左衛將軍制錢珝勑具官王知逺堯之克明周有懿德推恩而舉其有遺於親戚者乎如得其才匪曰私舉知逺稟訓於父且勵事君在官不違設爵何吝將軍使爾備宿衛尚書使爾進秋官且示兼榮則宜竭力報吾推恩之道無所私於親戚也可授王知道寧州刺史王知勳右衛將軍制薛廷圭勑具官王知道等我有寶臣作鎮邠一作邳土伯氏仲氏鼎峙于列藩乃子乃孫吻合于當代宣彼忠力屏于沖人方將仗之冀靜紛擾開懷以待有請必俞今復上章來陳內舉願以屬郡俾知道分憂推其赤心請知勳入衛言觀爾志式慰我心况聞訓朂甚嚴砥礪甚正既孝以事父必忠以事君忠孝存焉君父一也良二千石與大將軍榮爾閨門列吾禁旅並兼揆路仍亞台司吾於勳賢斯謂臻極唯爾父子享吾恩榮慎圗始終以保富貴可依前件左右金吾將軍授唐先擇左金吾衛將軍等制蘇頲門下右金吾衛將軍唐先擇名公之􅏷理識通明左金吾衛將軍吕休琳良將之才智謀深逺雖東西列衛俱賴其人宗族聮官所宜廽避俾從易位用叶朝恩先擇可左金吾衛將軍休琳可右金吾衛將軍餘如故授蓋嘉運兼金吾衛將軍制孫逖門下右威衛將軍兼北庭都護蓋嘉運百夫稱勇萬里將軍智則有謀忠而能毅頃者狂寇作梗鋭師深入用竒以往決勝而歸式疇其庸言命之賞宜增秩於中尉仍握兵於外域可左金吾衛將軍兼北庭都護餘如故授吳湊左金吾將軍制常衮勑將我南軍秩高中尉以禁戎之重任委舅氏之同心具官吳湊塗山介祉章武雅才言而有宗儉而能廣達禮樂政刑之要存忠信孝友之誠報虞歷年府寺失職素以賢戚之望職司太子之家清心奉公庶務悉理擅美春儲之寀流芳秋實之詠固可以首當褒進大勸官曹俾執金吾用彰貴任可左金吾將軍餘如故授田盛金吾將軍勾當左街事制白居易勑右金吾衛將軍田盛夫仕官至執金吾古今之集作所榮重也而盛生勳德門有文武略居貴介而無佚領誰何而有勞言念徼巡之勤集作功宜乃集作及轉遷之命處左攝事以表用集作使能可依前件授張直方田牟將軍等制崔璵勑統環營於中禁司徼道於右街非節效素彰見義而錙銖爵祿威謀夙著宣力而踐更翰垣則何以為我信臣膺兹寵寄檢校刑部尚書兼左金吾大將軍張直方沉果知機忠烈繼志承許國之義訓有能軍之勇名豹變除習俗之風鷹揚多御衆之術自脫屣幽薊奉職警巡勤固有夙夜之勞謹嚴得誰何之任前天平軍節度使田牟體懷忠厚氣槩雄邁襲台耀之洪伐振家聲於勳籍深識戰器之本亟升勇爵之班馬嶺鴈塞嘗絶煙塵之警西楚東魯每聞輯睦之方而皆早讀父書動合軍志克隆紹續之業備詳竒正之機是宜委以禁戎為之禦侮長期門以絶席擁緹騎而式遏俾之重閉斯謂爾勞題劔弄印仍祗舊服勿替徽問勉承寵光直方可右龍武將軍牟可右金吾將軍授陳班右金吾衛將軍制錢珝勑具官陳班朕求理未濟厥心匪寧實在庶位之間皆欲必獲其所况爾克繼勳藉通知武韜許國之誠忘身靡憚受爵而每期無忝檢身而唯恐有瑕雖秉郡符莫食公廪退居而處沉靜可嘉陟以執金仍兼端右俾承閥閲且耀寵章可依前件授高彥𢎞右金吾衛將軍制勑具官高彥𢎞朕每視朝執金吾率其仗衛陳於陛前退則與大京兆禁暴詰姦以清轂下其職如是非細任也以爾進在周行常為環尹實於巡警素積勤勞比授郡符將觀為政屬其節制有所薦聞方資宣力之臣難奪舉材之請未能出守遂至罷居暫解印於外臺復彈冠於近列勉思有寵善戒不虞可依前件左右驍衛將軍授安金藏右驍衛將軍制蘇頲黃門遊騎將軍行右武衛翊府中郎將員外置同正員直太常寺安金藏家本孝悌身全忠懇往在周朝困於酷吏共誣良善敢謗太皇不任楚毒並加刑憲金藏乃自刺心肺見其誠節因而寤主實賴斯人則𢎞演納肝田光吞舌求之既往未足為喻眷言酬德自可超倫彰其貞固之美拜以誰何之任可驍衛將軍員外置同正貟餘如故主者施行授幽州兵馬使劉悚左驍衛將軍制白居易勑具官劉悚夙負氣槩早習騎射才推燕趙之士學究孫吳之書加以忠厚可當任用况有令弟為吾信臣節著艱貞情鍾友愛夫寵寄於外莫重於藩垣委任在集作於中莫親於禁衛加此一職寵爾二人豈不為榮季出叔處可左驍衛將軍授楊約左驍衛將軍并焦敬復左領軍衛將軍制錢珝勑國家之道文武相須故帶綬簮冠而處將軍之位者必求雄俊之才以對我卿大夫其官楊約智則好謀勇而知禮臨戎之用以律甚明具官焦敬復蒞事多能理煩益辦舉其成效可以在庭俾就衛環式昭奬勸使號令有嚴於宿衛謨明一作威名皆稱於職官副吾雄俊之求以濟相須之道可依前件左右監門衛將軍授元環右監門衛將軍制孫逖勑右監門衛中郎將元環衣冠濟業言行資身地在通姻人稱懿戚徴於舊典洽以新恩宜有命於移官更增榮於賜服可依前件授趙惠琮左監門衛將軍制門下中大夫守內侍上柱國賜紫金魚袋趙惠琮素韞智謀早周慎密一作早標周慎頃令銜命委以臨戎既逾險而深入亦乘危而苦戰遂清狂寇且振邊威不有賞功將何勸善宜列爪牙之任仍膺印綬之榮可雲麾將軍守左監門衛將軍仍兼知內侍省事勳如故授前左威衛將軍安𢎞度右監門衛將軍制錢珝勑具官安𢎞度等吾以大柄付丞相日行於堂上唯文武之士參用其才耳凡觀公舉亦必可之今具列爾名來請吾命將軍佐吏循次而遷且稍疑作稱所能兼授貴秩罔有不信往宜思之可依前件授吳敬存左監門衛將軍張景球虢州司馬兼中丞等制李磎勑吳敬存等各以才能效其忠節或誘諭軍帥捍蜂蟻之師徒或善葺都門壯鳯凰之城闕嘉績既著賞典宜及將軍職於禁旅司馬兼於憲丞可謂寵榮足以耀於流輩矣可依前件左右羽林將軍授楊敬述右羽林將軍制蘇頲黃門瞻彼玄闕衛於丹禁命將擇人制軍為旅雲麾將軍檢校右羽林將軍上柱國楊敬述心堅鐵石器藴圭璋以俊穎之才有溫謙之美附枝中葉則藝極於雕弓咀實含英則詞殫於綵札自五營髙選千廬入侍中而作訓勤以宣威俾寵誰何正其名秩可右羽林軍將軍勳封如故授許輔虔左羽林將軍制黃門國之武士其盛如林朕之賢臣其貞匪石則可以制軍而作訓也雲麾將軍檢校右羽林將軍借緋魚袋上柱國申國公許輔虔方外直內智崇禮卑備聞舊章好讀前史忠於事主信以庇人未嘗不抗節思齊立言致逺頃除蛇豕之孽特建殊勳洎肅熊羆之旅蓋稱重器我之所賴爾實命諧必也正名用監中候可左羽林軍將軍勳封如故授王斛斯右羽林軍將軍制孫逖門下太中大夫守太僕卿員外置同正員上柱國賜紫金魚袋王斛斯智謀宏逺識量沖深位列名卿才優良將頃膺朝寄作捍邊陲惠威有孚羌戎即序念其勤苦既返斾於西城任以腹心宜典兵於北禁可宣威將軍守右羽林軍將軍勳賜如故授彭元昭右羽林軍將軍制門下中大夫使持節都督洮州諸軍事守洮州刺史同隴右節度副使上柱國賜紫金魚袋彭元昭久統邊事咸推武才必也好謀豈唯有勇遞遷中外方表幹能宜典禁兵以膺重寄可右羽林軍將軍授于季友羽林軍將軍制元稹勑具官于季友天子六軍必有材官佽飛超乘挽強之士在焉董之以威待之以信分八舍之衆寡均二廣之勞逸不吳不揚不掉不挫皆將軍之令集作命也是以李大亮上直禁中而文皇甘寢則腹心爪牙之任斯不細矣以爾季友時豫舊姻念往興懷度才思用榮以服色列于藩垣爾其敬恭無替朕命可守右羽林軍將軍知軍事仍賜紫金魚袋授王輔元集作元輔左羽林衛將軍知軍事制白居易勑國家設十二衛猶漢之有南北軍而左右羽林尤稱親重自諸衛而移領者謂之美遷左神武將軍王輔元生勳閥之家通吏理之事佐戎臨郡率著能名可以掌鈎陳而護建章備巡警而嚴羽衛大將軍事假而行之宜勵初終副兹寵任可依前件授前右羽林將軍李彥佐服闋重除本官兼御史中丞知軍事制勑軍有羽林用法星象統之爪士以供宸居具官李彥佐前以忠勞選登戎衛而能訓勇力之士以備時使申誰何之令以奉徼巡夙夜祗嚴不懈于位既終喪紀宜服官常假中執憲之名行上將軍之事勉修舊職用副新恩可依前件授郭簡右衛制置使右羽林將軍制錢珝勑環尹之設皆得以親宿衛時警巡而羽林之名自天垂象有拱宸之貴擇人匪輕具官郭師簡頗負雄材仍懷勇氣堅秉事君之禮深知用武之權載感時艱因思巳立禦冦而隄防甚謹提兵一作臨戎而號令必行善復流亡多謀完葺率先陳力誓不去於京師望幸傾心志有同於父老難能之節臨事始明方資制撫之勤遂假陟遷之寵宜乘激勸更集功庸猶懸受賞之期重在平戎之日可依前件左右武衛將軍授曹王弼左武將軍孫逖門下行左清道率府曹王弼籍慶宗枝升榮官序頗一作頃有公纍終非自作曾是黜官亦云纍載宜叶睦親之道俾遷仍舊之職可左武衛將軍勳如故授郭元升右武衛將軍等制門下將作少匠郭元升忠厚資貞有聞於行守太子家令鄭繼先衣冠濟業不隕其名各在官次頗淹年序宜分職於五校俾增榮於兩宫元升可右武衛將軍守右衛將軍繼先可右武衛率勳如故授裴倩在武衛將軍制門下前守右武衛將軍裴倩韞是忠勇資其智謀久樹邊功備詳戎事疆埸有警方期於效節金革無避宜後一作復於奪禮一作情可起復守右武衛將軍餘如故劉泰清左武衛將軍制元稹勑劉泰清文武並用必推其才久次不遷則有升序以爾踐更吏職星歲頗淹例當酬勞用進常秩奮我武衛以列周廬斯亦信臣之任也其勤厥職式副豫恩可遊擊將軍守左武衛將軍左右龍武將軍授齊遵等左龍武將軍制薛廷圭勑具官齊遵等官之設所以育材勸能也茍不當其選安以假吾所器而滯爾來者今命爾遵謀命爾瑶冠蟬冕橫佩刀為左右龍武將軍所以昭勳庸之嗣而用其無瑕者也浩與齊虔久聞罷免各旌勤瘁且振淹滯並升環衛之嚴俱委腹心之寄用明激勸往服恩榮勉務進修以圗光大可左右神武將軍授姚成節右神武集作䇿下同將軍兼知軍事制白居易勑朝請集作議郎前使持節成州諸軍事守成州刺史充本州守捉使賜紫金魚袋姚成節嘗為天平軍禆將當劉悟之立忠勳也謀成事集爾有助焉雖授一城未足酬奬况聞信厚勤恪宜於爪牙肘腋間居之昔漢文帝以宋昌忠勞擢拜將軍使掌環衛今吾用汝猶前心也環拱之職得不勉歟可致果校尉守右神武將軍知軍事餘如故授前千牛衛將軍徐棨右神武將軍兼知軍事等制錢珝勑具官徐棨等陳力諸吏曵長組於西階之下而參將軍之位者况假地官之秩兼騎省之名仕蓋顯矣惟棨暨岊皆嘗立朝自效之勤所聞甚著使之遷擢乃用舊章道鄰有勞於公亦宜賦祿郡佐漸優之命勉進爾途可左右威衛將軍起復杜賔客右威衛將軍制蘇頲黃門雲麾將軍前檢校左監門衛將軍上柱國杜賔客志惟倜儻才稱果決聞鞞而立特壯三軍之氣奮劔而前將雄萬人之敵頃在艱罰甫懷忠勇金革是任春秋所稱俾適權宜用光戎事可起復右威衛將軍勳如故主者施行授右千牛衛將軍李璠右威衛將軍制錢珝勑具官李璠等朕每據法座命百辟四夷大和會于朝能率其屬建黃麾飛驎之旗立於陛前者有衛將軍之盛職也璠以忠謹之職周旋於藩邸之中以久得遷常為二金吾矣武辨有列乃命陟居疇以壯勇之材率陳扈蹕之力以功可進來立於朝既曉玉鈐俾登環衛尚書之秩光寵並行可授王存禮左威衛將軍制勑具官王存禮等朕於文武之士雖用之有殊而核之不易以材濟用者是所求也以志立功者是所嘉也至於免官去職寄食屛居言念艱難益多愧歎執政能舉我心允同且以爾等負濟用之良才守立身之素志又復免官寄食安得置而不圗各敬所遷以揚厥職可文苑英華卷四百二
