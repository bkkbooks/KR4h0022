body:
  text: 文苑英華卷八百五宋李昉等編􅈦壁記九縣令下許昌縣令新􅈦壁記一首解縣令􅈦記一首廬陵縣令􅈦壁記一首華亭縣令延陵包公壁記一首縣丞盩厔縣􅈦記一首擽陽縣丞小􅈦記一首藍田縣令􅈦壁記一首武功縣丞􅈦壁記一首簿尉上會昌主簿􅈦壁記一首同州澄城功倉户尉􅈦記一首縣令下許昌縣令新廳壁記白居易民非政不乂政非官不舉官非署不立是三者相為用故古君子有雖一日必葺墻屋者以是哉許昌縣居梁鄭陳蔡之間要路由於斯當建中貞元之際大軍聚於斯兵殘其民火焚其邑夫集作大田生荆棘官舍為煨燼乘其弊而為政作事者其難乎去年春叔父自徐州士曹掾選署厥邑令於是約已以清白納人以簡直立事以強毅以清白故官吏不敢侵於民以簡直故訟獄不敢留於庭以強毅故軍鎮不能干于縣繇是居二年民用康政用暇乃曰儲蓄邦之政本命先營囷倉又曰公署吏所寧命次圗廳事取材於土物取工於子來取時於農隙然後豐約量其力廣狹稱其位儉不至陋壯不志驕庇身無燥濕之憂視事有朝夕之利官由是而立政由是而舉民由是而乂建一物而三事成其孰能不韙之哉嗚呼吾家世以清白集作簡垂為貽燕之訓叔父奉而行之不敢失墜小子舉而書之亦無愧辭若其官邑之省署集作置風物之有亡田賦之上下蓋存乎圗牒此略而不書今但記斯廳之時制與叔父作為之所由也先是邑居不修屋壁無紀前賢姓字湮泯無聞而今而後請居厥位者編其年月名氏自叔父始時貞元十九年冬十一月一日記解縣令廳壁記沈亞之國家自誅叛以來於今六十餘年四字集作十年征徭息繁不勝於籍租催之法居間為民起橫縣令不得専以子養之化理之蒲鹽田居解邑下嵗出利流給雍洛二都三十郡其所會貿皆天下豪商猾賈而姦吏踵起則解之為縣益不能等於他縣矣鹽田主官用郎吏其佐二下不出御史操法繩縻十九關於縣令而不敢集作得專但奉府曹侯長之教而已鹽田細吏皆縣民其田園雖業籍於縣而令不得親但以縣民之衆馭之而已若是為令之集作與尤悔者日爭或作生焉茍非智良不能日脫於橫今令者余之從祖也且滿嵗而尤不及豈其厚於智乎而又招亡民還業者數百至於公堂燕集作便館葺飾者凡十餘構工不勞民又何多方也長慶二年余客其地因受命而著記云廬陵縣令廳壁記皇甫湜在易之爻二與四同功其善不同二多譽四多懼四之多懼以近君也今州之近縣當刺史理所其難為與支縣相百宜矣哉廬陵户餘二萬有地三百餘里駢山貫江扼嶺之衝材竹鐡石之贍殖苞篚緯石本文粹集本作韗緝之富聚土沃多稼散粒荆揚故官人率以貪敗今日兩趨州衙退祗承録判將校事之紛錯率相關臨煩言易生凡事難專故愈不理近年百姓創罷徴賦發斷其人益訛文粹有與字處險易以亡匿尤輕犯禁夫以不専之理理益訛之俗承積弊之餘雖使冉季文粹有復字將不能也今清河張君儇為之理適得良二千石俾顓其政而展其材居未再稔最于集本文粹作於一郡張君集本文粹無此字恂恂以奉上煦煦以字民剸煩集本文粹作繁決劇以通敏彈豪糾黠以沉斷清白之操較然絶類便安之謡流而逺聞宜舉其卓卓以敦沮勸縣之故習令將之邑佐發斂盛糧緡具車杭集本文粹作航千里迎拜君以讓却之單艇之集本文粹作航赴官吏皆亷縣之故習令始至取官羡物益備器用團鄉次役以供芻粟君以法喻之一切禁絶則民知耻布其大信推以至誠促嚴吏家以集本文粹作慰懋民户故秋夏之稅先期而集宥過以容不逮奬能以勸不修為魁而萃頑者取一以警百故政刑石本作刑政之簡期月而治以俸錢葬枯而恩浹以家飲救渴集本文粹作溫而澤均集本文粹作周萼合兄弟之拆居者而民以飬麕復老弱之流庸者而疆以實和氣潛通連嵗大穰廷內間間似密與蒲余既堙厄斥置於此始來而𢎞農楊君敬之具為余話君美談既接益久得實其聞仍集本文粹作乃刻山石鑱廳壁盛之以觀永久華亭縣令延陵包公壁記顧况陶氏之隱誥云張李二君勤行仁義異代同德一作祖慶鍾包君鮑靚通靈之士秦有包丘漢有包咸世為學官隨晉南渡今謂延陵人也隋書儒林傳包愷包愈兄弟皆治漢書從子弟千餘人樹碑紀德惟皇六葉鴻臚宣力於王室著作垂名於當代起居祭酒聲隱都野與翰林供奉朝析其流𣲖君辟一作郡非秀才以文字自潰一作附嘗夢入𡨕府浹時而蘇根於修短有開之兆言地下之法峻於人間頗符干寶搜神之事隨難奉天重圍暗解上撫其背而春官亦以賔禮待之及為華亭有闢田增户均賦愛人之政語曰十室之邑百乘之家由也可使治其賦而君實有之舊章壁記記其官敘野史之流也平源之谷水崑山鱸魚蓴菜海錯陸産彼何人而不知今記其異庶有補於化耳縣丞盩厔縣丞廳壁記沈亞之盩厔道巴漢三蜀南極山不盡三十里北阻渭短長之補與南集作山而近其野半為澤麓集無此字故鼠倚穡而居雖善捕伐不能無傷於稼説者以為漢武帝嘗夜出射熊於是而田人輒留執帝從者由此觀之民情阻狠集作限非古為難理時猶逼畏指諫即稍罷然佞臣竟以帝耻不忘遂籍民人田為五柞長楊矣今又徙甌越卒留戍邑中神䇿亦屯兵角居俱稱護甸而三蜀移民遊手其間市閭雜業者多於縣人十九趨農桑業者十五又有太子家田及竹囿皆募其傭藝之由是富民豪農頗輸集作書名買橫緩急以自蔽匿民冒名欺偷浮詐相樛雖賢宰處之而丞與曹或不類亦不集作莫能盡枉直之情也夫丞之職也贊宰之政以條諸曹其有不便於民者丞能得不可今丞也余從祖居之既滿嵗民諍不作如此則宰之所宰丞之所贊可謂知方也已長慶初余思相如進諌之風南歷長楊至於射熊五柞訪其遺迹因退舍是邑遂悉論山川俗里之事題於丞之署云櫟陽縣丞小廳壁記便署所以接賔也櫟陽岐諸陵走左輔蒲太原燕趙魏山東至於胸奴雜虜之道而諸侯使者及戎王聘貢集作遺之臣交馳出是無虗日而邑頗瘠於擾費然而遊宦客子出入往來者則公賔為寡也夕館而晝饌自宰臣簿尉或不能支於給饋而賔去嘗一作尚悒悒不快長慶初有趙魏侯者失理卒亂辱殺之更自立新帥大臣皆進意請討圜其境之侯咸會兵襲戰飛蹄走轡之奏傳呼相追而又降嫁胸奴中故使者益至若是宜謂私賔不能加也而集作然又遣使陳蔡許滑大梁彭城皆發卒戌北河督責米帛於兩江之間使百郡所挽無西入由是天子之使出集無出字入漳關者日數十輩大者乘馬至百小者不下十餘郵馬盡死於道凡往來乘馬畜者無問其誰皆奪之故遊宦客子俱輳道櫟陽中計其衆寡復與公賔之數相高矣是時櫟陽丞當公主降胸奴女集無女字使及迎者之部千人天子使後宫貴御行餞於道事嫁大臣從官衛士亦數千人夕頓田氏遣丞奉供具以能不擾民一縣之吏稱善辦及歸乃計曰夫遊賔四時之來獨憂其為稀耳我且與理一署使其密溫以待之然後以為家之給與賔僕相等是寧有忽賔哉既以集作已賔之來者視其館禮之窮罄雖勇寒猛餒必抱愧自饜於所饗嗟乎隆否之迹由夫履也其構在公堂之右集作左正寢西南隅其形類廂二間覆厦於南陲其就在長慶元年八月甲子也藍田縣丞廳壁記韓愈丞之職所以二令於一邑無所不當問其下主簿尉主簿尉乃有分職丞位高而逼例以嫌不可否事文書行吏抱成案詣丞卷其前鉗以左手右手摘紙尾鴈集作亮鶩行以進平立睨丞曰方從卿韓文舉正云此下文苑有丞字當署丞涉筆舉正云文苑作濡筆占位署唯謹目吏問可不可吏曰得則退不敢略省漫不知何事官雖尊力勢反出主簿尉下諺舉正文苑云作該蜀本作該該轉為劾其訛益甚數慢必曰丞至以相訾謷丞之設集住一作後豈端使然哉慱陵崔斯立種學積文以蓄其有泓涵蜀本作澄演迤日大以肆貞元初挾其能戰藝於京師再進再屈于人元和初以前大理評事言得失黜官再轉而為丞兹邑始至喟然曰官無卑顧材不足塞職既噤不得施集注一作行用又喟然曰丞哉丞哉余不負丞而丞負余則盡拚去牙角一躡故迹破崖岸而為文蜀本作之丞廳故有記壞漏汙不可讀斯立易桷與瓦墁治壁悉書前任人名氏庭有老槐四行南墻巨竹千挺儼立若相持水㶁㶁循除鳴斯立痛掃溉對樹二松日集有吟字哦其間有問者輒對曰余方有公事子姑去考功郎中知制誥韓愈記武功縣丞廳壁記桞宗元商集作殷頌曰邦畿千里周制曰集無日字千里之內甸服榖梁謂之寰內諸侯為王內臣其制甚重今京兆尹理京師部二十有三縣幅員之廣其猶古也縣吏之長曰令其二集無此二字曰丞丞之位正八品下蓋述六職以輔其令也秦漢有丞相令尚書有左右丞御史有中丞至于九卿之列亦皆有丞下以逹天子集作下之縣政有小大其旨同也武功為甸內大縣按其圗古后稷封有斄之地秦作四十一縣斄美陽武功各異至是合焉蓋嘗為稷州已而復縣其土疆沃美高厚有丘陵墳衍之大其植物豐暢茂遂有秬秠藿蜀本作荏菽之宜其人善樹或作術藝其俗有禮讓宜乎其大雅之遺烈焉貞元十五年改邑於南里既成新城凡官署舊記壁壞文逸而未克繼之者後三年而頴川陳南仲居是官邑人宜之號為簡靖因其族子存持地圗以來謁余為記夫以武功疆里之大人徒之多而陳生以簡靖輔其理斯固難矣漢高帝嘗詔天下凡以戰得爵土漢作書七是大夫公乘巳上令丞與抗禮故為吏益難今天子崇武念功與漢初相類分禁旅以守縣道武功為多陳生為丞於是而又職盜賊其為理無敗事吾庸可以廢二字一作度哉為之記云簿尉上會昌主簿廳壁記喬潭會昌行在也新邑作焉主簿糾曹也我公吏焉公名摯字某由祕書正字而拜初蒙泉祕湧於山下隂火潛燃於地中是開湯池以御宿獲靈符之三載有詔留之冠新豐渭南而為畿縣以明年復詔廣之齒萬年長安而為京邑非良才無以杼劇非美誠無以鈞一作釣賢邑改其名官遷其秩宜矣北陸寒苦東郊豫遊萬乘入郛一作郊百同在宇溫泉之宫齊乎下集靈之臺幬乎上物或過求難於抱影事或倚辨急於奔星雖闕而我實綱紀編王侯於尺籍總豪猾於伍符皆此之自闕疑以簡追胥以簿書詰盜皆此之自決縣大夫無能專逹野一作理司冦不獲僅一作堇成咸在公之鈐鍵矣不言而政每遊刃不速而人常應弦申一作爭之以豐一作禮盈甚都一作郁加之以藻麗尤絶非鄭桓公之邁德不存孝孫非少宗伯之允文不有令德一作豫是籲懷兹邑必復康侯進吾往也夫仰東井倉期一作斯天帝山木冬繁其浴日之溫流乎水雲晝積其濯龍之靈液乎矧乃才之甚器之甚遊泳恩波膏沐聖澤將濯軒拖紅顧盻千里豈俟辭蒲而階漸我君子謂是言也潭忝以詞賦見知春官欽惟教忠即簿領之能事敢序施政有門人之直詞乙酉嵗杪志於南軒之東壁誰謂來者不承乎權輿同州澄城縣功倉户尉集作户工倉尉廳壁記杜牧縣之所重其舉秀貢賢也今日自外諸侯之儒者曠不能升一人况尉乎次乃户稅而已史記河渠書曰自徴引洛水至商顔下商顔山名鑿井深者四十餘丈即此地也徴者俗訛為澄耳其地西北山環之縣境籠其趾沙石相礴嵗雨如注他皆淫灔不測徴之土適潤苗則大獲天或旬而不雨民則蒿然四望失矣是以年多薄稔復絶絲麻藍果之多饒固無豪族富室大抵民户高下相差埒然嵗入官賦未嘗期表鞭一人因徴其來由耆老咸曰西四十里即畿郊也至如禁司東西軍禽坊龍廄彩工梓匠善聲巧手之徒第畨上下户互來進取挾公為首緣以一括十民之晨炊夜舂嵗時不敢嘗悉以仰奉父伏子走尚不能當其意往往擊辱而去長吏固不敢援復况其飬秩安祿者耶加以御女官多盤穴其間遞相占附比急熱如手足自丞相御史咸不能與之角逐縣令固無有為也非豪吏真工聮紐相姻戚者率解去是以縣賦益逋徴民幸脫此苦者蓋以西有通澗巨壑義牙交吞小山峭徑馳鞍馬張機置集作置非者不便於此是以絶迹不到兼之土田枯鹵樹植不茂無秀潤氣象咸惡之而不家焉民所以安活輸賦者殆由此儻使徴亦中其苦則墟矣尚安敢比之於他邑乎嗟乎國家設法禁百官持而行之有尺寸害民者率有尺寸之刑今此咸墮地不起反使民以山之澗壑自為防限可不悲哉使民恃嶮而不恃法則劃土者宜乎牆山塹河而自守矣燕趙之盜復何可多怪乎書其四壁俟傳言者覽文苑英華卷八百五
