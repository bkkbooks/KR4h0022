body:
  text: 文苑英華卷八百六十九宋李昉等編德政一德政碑凡二卷英華所編失作者先後之次今正之隴右監牧集作校頌德碑一首河南隱尹張公碑一首淮南莭度使崔圖碑一首魏博莭度使田𢎞正碑一首隴右監牧集作校頌德碑一首張説周禮校人掌王馬之政天子十二間馬六種間為一廄馬二百一十六應乾之䇿也六廄成校五馬集粹作良一駑是謂之設小備校有左右間成十二合月之道也駑馬三良馬之數凡三千四百五十六是謂之大備秦并一海內六萬騎之國馬盡歸之帝家則周制陋矣漢孝武冨一作當文景儉局一作約之積雄衛霍張皇之勢勒兵塞上廄馬有四十萬匹東漢魏晉國馬陵夷不可復逮武帝時矣後魏以二本無此字胡馬入洛蹴踏千里軍陳之容雖壯和鸞之儀亦闕大唐接周隋亂離文粹作罹之後承天下征戰之弊鳩括殘燼文粹有僅字得牝牡三千從赤岸澤徙之隴右始命大僕張萬嵗葺其政焉而奕世載德纂修其緒肇自貞觀成于麟德四十年間馬至七十萬六千二本無此二字匹置八使以董之設四十八監以掌之跨隴西金城平涼天水四郡之地輻員千里猶為隘狹更拆八監布於河曲豐曠之野乃能容之于斯之時天下以一縑易一馬秦漢之盛未始聞也張氏中廢馬官亂職或戎狄外攻或師圉內冦垂拱之後二十餘年潛耗大半所存蓋寡開元神武皇帝登大寶受靈符水瑞感而河龍出星精應而天駟下二年春帝乃簡心膺二本作腑善畜之將卜福祐冝生之長俾領內外間廄使焉即開國霍公文粹作開府霍國公其人也公名毛仲姓王氏開元佐命之元勳東國亡王之後裔四伯輔禹與理集作治水之謨四七興漢在經星之列文粹作裔清明虛受察含氷鑑籌謀先覺慮出蓍龜竭無私之忠而善歸天造輸不懈之力而玄同日用故得騰躍風雲攀附日月䇿功第一承恩莫二庭羅魏絳之鍾鼓第賞堂邑見東方傳二本作京邑非之山林文馬蕃錫於晉侯御衣亟一本作分於韓信庶薑如玉則降榮彤管衆子垂髫則抱拜朱茀二本作弟非聖人之見之二本無之字也必猶爾為之四顧而滿志聖人之不見之二本無之字也乃恤然若無與樂其天下仲尼所謂是必才全而德不形者也夫其處二本作其處身則立無跂疑作跂國語立無跂正也視無還端也聽無聲二本作聳與國語同成也言無逺視也國有憂未嘗二本作不戚國有慶未嘗不怡其御下則明利害之鄉阜財求之務使之趨利而避害懷德而畏威身不離於闕廷令逺行於坰牧亦有不學而暗合於古未更而懸辨其事然其從政必問於遺訓而咨於故實者也若夫春祭馬祖夏祭先牧秋祭馬社冬祭馬步敬其本也日中而出日中而入禁二本作焚非原焚牧除蓐釁廄時其事也潔泉美薦庌涼棧濕翹足而陸交頸相靡宣其性也攻駒教駣講馭臧僕刻之剔之羈之䇿之就其才也不反其性故親人樂藝莭樂如舞之心自生不窮其才故闉集作闔非扼鷙曼竊轡詭銜之態不作爾乃舉其神異則望騊駼騕裊乘黃兹白來儀外廄呈技內櫪朝刷閬風夕洗天潢二本作泉聖皇一馭長夀萬年别其種類則有研蹄繁鬛小頷逺志曰龍曰騋曰戎曰驥差其毛物則有蒼白驪黃騂紫驈皇騅丕馬駓驒駱集作􅶴非駰騢駵雒集作駱鳵集作鶹非駮驓駩騧騏騽騝毫骭馬足狼尾魚目宗廟齊毫戎事齊力田獵齊足罔不畢有元年牧馬二十四萬匹十三年乃四十三萬匹初有牛三萬五千頭是年亦五萬頭初有羊一十萬二千口是年亦二十八萬六千口皇帝東巡狩封岱嶽輦輅既陳羽衛咸備大駕百里塵煙一色其外又有間人萬夫散馬千隊骨必殊貌毛不錯二本作雜羣行如動地止若屯雲百蠻震聳四方抃躍威懷紛紜壯觀揮霍回衡飲至朝廷宴樂上顧謂太僕少卿兼秦州都督監牧都副使張景順曰吾馬幾何其蕃育卿之力也對曰帝之福也仲之令也臣何力之有因具上其狀帝用嘉焉霍光口無伐辭貌無德色朝髦庠齒欽二本作欣以多之於是明威將軍行左二本作右衛郎將南使梁守忠武將軍行右文粹作羽林中郎西使憑嘉秦集作泰右千牛長史北使張知右左驍衛郎將兼鹽州刺史鹽州監牧使張景遵隴州别駕修武縣男東宫監牧使韋衡都使判官果毅齊琛惣監韋績集作續及五使長戶三萬一千人僉曰自開府庇我十三年矣畜有娩息人無乏匱克厭帝心莫匪嘉績日如停西南兩使六頃人夫藁榖計八十萬功二本作工圍石以息人約費其政一也納長戶隱田稅三萬五千石以檢私肥公其政二也減大僕長支乳駱馬錢九千三百貫以窒隟止散其政三也供軍筋膠十萬七千斤以收絹繕工其政四也蒔茼􅀢苜蓿一千二二本作九百頃以茭蓄御集作禦冬其政五也使監官料舊給庫物新秦集作奏非置本牧二本作分其利不喪正錢二萬五千貫以實府宜官其政六也賈死畜貯絹八萬匹往嚴道市僰僮人集作千口以出滯足人其政七也五使集作候非長户數盈三萬墾用給食糧不外資以勤農却挽其政八也敢問監二本作郡牧之事孰能如二本作加於此乎然則稱伐計功前典所貴上以美聖主擇才之得人下以贊忠臣受任之盡莭末以道官屬承風之成事竟以示後代昭前之令聞是四烈者不可廢也既而大君有命舊史書功吟咏二本作詠瓌竒篆刻金石秦汧渺渺尚想非子之風魯野區區猶傳史克之頌誠從此而觀彼夫何足以言哉頌曰皇天考牧兮聖之君四十三萬兮馬為羣塹汧渭兮垣隴坂飛黃皂兮昆啼苑山崆洞兮水鳴咽泉噴玉兮草汗血聚如華兮散如雪性既馴兮才亦絶維國家之大事駕時龍兮祭天地和鑾發兮文物備維帝皇二本作皇帝之七德揔戎馬兮威萬國綵髦翻兮金介直二本作冒有霍公之掌政擇張氏之舊令天王大二本作無大字駕兮仗黃麾大僕驂乘二本無此字兮展輅儀舞月駟兮蹀雲螭神倜儻兮志二本作權竒騏驥溢野兮牛羊日多子孫榮位兮恩寵如何頌皇靈兮篆金二本作石鼓萬斯年兮羣王府此篇集粹所載如堂邑作京邑駵雒作􅀈駱之類皆印本差誤逐項各注非字當從英華元本河南尹張公碑韓信卿惟唐六葉嵗在乙未凶臣肇亂殘毒生靈穀洛之郊七年方平宫廟燔夷府寺為墟隂燔疑作磷轉于原隰麋鹿遊于街陌天子乃命河東郡侯延賞尹於東夏恭惟河東虔稟聖謨清默無為外務徑簡內無宴嬉勸沮以仁休息以和視人猶身視邦猶家一年流亡麏至二年土壤咸闢三年公給人足家有餘積疏逹河渠導塞提一作堤封溝洫化為東川山木流於郡國乃立宗廟乃建一作搆寢殿變丘墟為閭里散災祲為和氣公府若虛戶庭不扄牛馬産畜牧而不羈居守四年遷官罷鎮東人父子孀獨窮老若遊魚之失於淵栖禽之喪于林於是河南洛陽洎甸內二十二邑長守將校及佐吏耆艾三軍之衆相率琢石頌美表揚仁風詞曰惟皇統極繼業嗣聖凶臣無君矯衆犯順都邑殱殘化為邱樊於烈河東受命緝熙守一含光體醇忘機以禮代刑以簡重威政得其恆物遂其生措置典刑士吏自清弭廢鞭笞黎氓不欺芃芃榛楛變為禾黍氛祲蒙蒙散為祥風乃設堤防禁遏溢瀑湍悍安流時無水禍乃疏河渠浸枯決瀦河渠既流山木浮浮煨燼之中再立清廟荆榛之下再閲髙殿人不知役公有盈羡風聲沛然人化四流歸朝執憲惠贊皇猷我有牛馬牧而不羈我有兒童路不拾遺泱泱田疇疇能繼之洪惟敻古淳風揚揚下及有周亦稱二南烈烈河東實嗣其風淮南莭度使尚書左僕射崔公頌德碑銘并序李華在昔召公相武王除人之虐一作除害去虐敷命帝庭一有周公二字佐成王卜洛定宅登頌清廟奉康王會朝豐宫克致太平惟崔公相玄宗保寧聖德鎮安天下輔肅宗掃除凶穢紹享太平事今上振宣明威撫綏淮海惟申伯翊宣王登南郊一作邦是興周室小白率諸侯征楚翟奉王職與崔公叶德同勳皆薑姓也夫議盛德論大功贊大賢舉其殊倫卓然昭明不書其細申大體也故詩陳方叔之烈曰方叔元老克壯其猷乂美韓侯之封曰有倬其道韓侯受命今述崔公亦不名不備官古之制也後魏尚書亮八代至公海內首族人倫德範公少負文學重名且兼宏略敡一作揚于王庭甲科入仕歷京兆倉曹參軍再遷司勳貟外郎丁太夫人憂以毁聞終喪拜刑部貟外郎兼侍御史知劔南莭度留後使逆臣起幽陵陷潼關至尊哀兆人思古公避狄之義於是帝車西南依我心膂拜中書侍郎平章事劍南莭度採訪使玄宗克讓聖子家為唐虞公出納王命至于朔方弼諧二聖孝慈光明自西自東殄殱元惡天討之師岌如山行寇若霜藁鼓燎無餘一作存帝曰爾圖實叶朕志官中書令拜趙國公公拜稽首臣敢上冒以負天明命帝遂其髙俾作少師師訓東宫兼長邦憲居守洛京乃傳濟王又典汾州王德日宣汾州阜安乃統江淮主三軍督萬人加工部尚書時征鎮之司恃勳姦令公獨露奏慝用輟興轉吏部淮南既清軍有餘逸夷難江南萬里康哉六嵗在鎮心馳王幄戀慕之極至於涕洟一作流涕獻章請朝帝恩降久公不候一作俟駕建斾將馳耆耋泣訴吏人遮道即日詣闕乞留者三百餘人公申諭而行至于京師天子大悅曰趙國公先帝元臣嘗為朕師自我不見于今六年有司如朕意待之加尚書左僕射遂淮南之請所部八州人舞手蹈足祕書省少監兼廬州刺史長樂賈深有文有武忠于王室推心馭下嘉績升聞戴公仁明思揚盛德合肥令彭城劉商先後之族臨人惠和老幼一作臨人惠和一州之老幼咸曰我州我邑敷王德澤崔公封內我是以安其仁不銘其德不可謂賢華嘗忝公遊咨以為頌夫五嶽視三公四瀆視諸侯入掌三公之政出踐諸侯之長昔鄭武公為卿士詩人賦緇衣魯僖公為周賢侯史克頌埛一作駉野敢附其風一作前烈以書公不朽故褒大臣則王室尊崇美政則王命行不唯頌公尊天王也今載公朝覲之禮以𢎞大之其文曰思崔公出鎮之崇克忠克孝宣帝之武恢帝之功自蜀自朔至于秦宫出納大命決事于中一作衷思崔公烈烈郁郁以雍以肅乃統淮服洎江之隩一作澳闐闐長轂霞斾霜鏃蠢爾凶毒罔不顛覆思崔公三世元臣德綏生人乃朝于王王顧殊倫且曰東南飲化如春為朕腹心寧其永呻一作吟咏思崔公入覲于王鑾一作鸞聲央央珮玉以鏘一作鎗秉圭奉璋公復于楊四牡其驤公慕彤庭涕濡于裳思崔公廬江州邑孰不垂泣我公之還陽和起蟄乃求樂石樂石爰立刋之頌之介福攸集州人斯及魏博莭度使田𢎞正碑元稹陛下以元年正月壬戌詔臣稹曰朕有臣𢎞正自魏入鎮魏人思之因守臣訴狀其德政乞文於碑集無此二字爾司豫言其文以付臣拜稽首退而奏書於陛下曰始安祿山以玄宗四十三年盜幽州兵劫擊郡縣偷關據京天下掉撓肅宗征之海內甫定而夾河五十餘州或伏集作服或叛更立迭奪廢置征伐覲見集作朝覲賦入之冝皆自為意五紀四宗容受隱忍田承嗣始有魏博相衛貝澶之地承嗣卒以其地傳兄子悅悅傳緒緒傳季安既而季安悍誕淫驕風勃蠱蠧發時集作具喜殺左右漸及於骨肉往往顧妻子曰安用此由是內外惴悸妻元氏因人不忍移置他所餘一月乃卒是嵗先皇帝元和之七年八月也季安子懷諫始十餘嵗衆襲故態名之為副大使而家臣將士則逆虐用事士衆不分伏日夜相告曰田中丞興博大孝敬於軍謹廉讀儒家書好言君臣事儻可依倚為將帥乎聞者皆踴集作躍躍一朝牙旗下衆來捧附興仆地不肻起衆亦不肯去乃大言曰爾輩即欲用吾語能不殺副大使且使吾取天子恩澤洗汝痕穢使干萬衆知君臣父子道從我乎皆曰諾遂殺蔣士則等數十人以興知留後事移懷諫於外明年歸之朝蓋七年之十月四日也乃圖六州之地域籍其人與三軍之生齒自軍司馬巳下至于郡邑吏人集作之廢置盡獻於先帝詔興以工部尚書長魏博相衛貝澶之地仍敕司封郎中知制詔裴度使於興且以錢一百十萬緡賜其軍曲赦管內百姓一年勿復事問耆羸賑乏困褒殛誅之不以法者魏之人相喜曰歸天子乃如是耶興又悉取魏之僣服異器人臣所不當為者斥去之先帝曰興吾六州之善心者田興也使興𢎞吾至正不亦可乎因名曰𢎞正先是魏諸賔猶僕役也將卒無畏避𢎞始求副莭度巳下於朝至則迎迓承奉雖功勳將莫不承者避謁者趨付授咨度始用賔禮先是諸將之外有權者莫不拘劫妻子以為固四方之來聘問者莫不防礙出入以為密士吏工賈限其往來人多懼愁稀復會聚至是皆曠然矣魏之人又相喜曰人之生不當如是耶滑以水害聞於朝請移河於衛之十四里且役衛功三萬餘詔𢎞正議之皆曰壞吾地役吾人以利他邑古無有也𢎞正曰魏於滑信彼此矣朝廷何異焉不時興工以教人讓魏俗丕變先帝多之以右僕射就加焉十三年又加司空以子布之會蔡有勞也是嵗李師道燒河隂驚洛邑隂通元濟詔𢎞正誅之明年破賊五萬於東阿進收鄆之陽谷距其城四十里營焉二月壬戌劉悟斬師道以其首歸於𢎞正正入鄆而十二州之地平以功加司徒平章事復歸於魏其年八月朝覲京師先帝待之有加焉乞留不獲詔加侍中以遣之又明年陛下以成德喪師詔𢎞正入焉初王武俊以戰朱滔功得有趙地傳子孫凡三十九年矣至承宗為盧從史李師道所詿誤先皇帝征而赦之者再受畏戚恧不克來覲而聞陛下天覆海深悉包悉受乃果自信將朝有時未行會病將歿以志付其弟承元聽命於朝陛下語宰相曰𢎞正在魏吾何患焉即日內出五詔詔𢎞正為中書令莭度德棣於鎮且詔父子皆為帥以大其威十一月甲寅成德獻狀曰𢎞正至自魏魏人哭之鎮人歌之奉宣奏陳詔條除去僣異猶魏政也且臣聞之德之至者有二政之大者有三三政一曰仁為惠政二曰法為善政三曰謙為和政二德一曰忠為令德二曰孝為吉德今𢎞正獻魏博六州之地平淄青四代之寇入鎮冀不測之泉可以為忠矣祖考食宗廟父子分土疆兄弟羅軒冕可以為孝矣始初山東鍵閉束縛詠而遊之歌而舞之可以為仁矣始初逼越廢怠而制之舉而用之可以為法矣始初山東傲狠侵取地德以讓之功以助之可以為謙矣謙法仁孝資之以忠不曰德政謂之何哉臣謹奉制以一百九十二字付守臣訴銘之石用申約束銘曰帝命𢎞正豫言是聽理亂有數其數集作通甚明亂則隱約理由亂生既理復亂生於玩輕唐受天命既理集作海內既平髙祖太宗不荒不寧玄宗抑厄其否乃革四十三年奄有丕宅始視燕寇胡雛弄兒雖我寵重彼將胡為所細所忽忽焉而罹四后垂顧山東不夷逮我聖父殷憂儉尅乘其淫驕乃伐乃殛爾視群孽胡為而亡潛集作僣久而大頑昏暴狂爾亦自視胡為而昌畏兹逼側永思悠長曩爾之有既克而有在克而守惟爾惟我而今而後爾雖穹崇無忘辱詬我雖平寧無忘燕寇銘之戒之以永聲臭文苑英華卷八百六十九
