body:
  text: 文苑英華卷六百二十三宋李昉等編雜諫論一雜諌論表凡三卷英華所編失年代次序今正之諫山陵制度過厚表一首論封建表一首論左右丞須得其人表一首諫誥難公卿表一首論太子初立請尊賢學表一首論攝養表一首諫五品已上妻犯姦不沒官表二首請宫中眼花浪見不得輒奏表一首諫東宫物少於魏府長表一首諫欲觀起居紀録表一首諫山陵制度過厚表太宗虞世南貞觀九年臣聞古之聖帝明王所以薄葬者非不欲崇髙光顯珍寶具物以厚其親然審而言之髙墳厚隴珍物畢備此適所以為親之纍非曰孝也是以深思逺慮安於菲薄以為長久萬代之計割其常情以定之耳昔漢成帝造延昌二陵制度甚厚功費甚多諌大夫劉向上書其言深切皆合事理其略曰孝文居霸陵悽愴悲懷謂羣臣曰嗟乎以北山石為槨用紵絮斫陳漆其間豈可動哉張釋之進曰使其中有可欲雖錮南山猶有隙使其中無可欲雖無石槨又何戚焉夫死者無終極而國家有廢興釋之所言為無窮計也孝文寤焉遂以薄葬又漢氏之法人君之在位三分天下貢賦以一分入山陵武帝歷年長久比葬陵中不復容物霍光暗於大體奢侈過度其後至更始之敗赤眉賊入長安破茂陵取物猶不能盡無故聚斂百姓為盜之用甚無謂也魏文帝於首陽東為壽陵作終制其略曰昔堯葬壽陵因山為體無樹無封無立寢殿園邑為棺槨足以藏骨為衣衾足以朽肉吾營此不食之地欲使易代之後不知其處無藏金玉一作銀銅鐵一以瓦器自古及今未有不亡之國是無不掘之墓喪亂以來漢氏諸陵無不發掘乃至玉柙金縷骸骨並盡豈不重痛哉若違詔妄有變改吾為戮尸於地下死而重死不忠不孝使魂而有知將不福汝以為永制藏之宗廟魏文此制可謂逹於事矣向使陛下德止如秦漢之君臣則緘口而已不敢有言伏見聖德髙逺堯舜猶所不逮而俯與秦漢之君同為奢泰捨堯舜殷周之節儉此臣所以戚戚一作尤戚也今為丘隴如此其內雖不藏珍寶亦非一作無益也萬代之後人但見高墳大塜一作墓豈謂無金玉也一作即臣之愚計以為漢之一作文灞陵既因山勢雖不起墳自然高顯今之所卜地勢即平不可不起宜依白虎通所陳周制為三仞之墳其方中制度庶一作事事減少事竟之日刻石於陵側明丘封大小髙下之式明器所須皆以瓦木合於禮文一不得用金銀銅鐵使後一作萬代子孫並皆遵奉一通藏之宗廟豈不美乎且臣下除服用三十六日已依灞陵今為墳隴又以長陵為法恐非所宜伏願深覽古今為長久之慮臣之心赤唯願萬嵗之後神通常安陛下之孝名揚於無窮耳論封建表太宗顔師古臣師古言臣伏聞前年親發聖慮將降明勑博問卿士議欲封建斯誠天機獨悟妙䇿深逺既合事宜實惟治要然而議者不一各執異端或欲追法殷周逺尊上古天下之地盡為封國庶姓羣官皆錫茅社或云承弊之後人稀土曠封建之事並未可行不臻至理兩失其中何者今古異俗文質不同不可空採虛名以乖實效若即廢罷州縣分為列國無功而受封爵庶姓而専臣吏非直於理不合亦自制度難成至於盤石之基實資藩屏皇枝帝子維城是寄伏以漢祖撥亂懲艾前失大啓九國雜行霸道規模𢎞逺歷祚延長近代澆浮不樹宗子雖有王侯之號了一作而無藩輔之實故易為傾動顛而不扶前哲往賢論之已備臣愚以為當今之要莫如量於逺近分置王國均其戶邑强弱相濟畫野分疆不得過大間以州縣雜錯而居互相維持永無傾奪使各守其境而不能為非協力同心則足扶京室陛下然後命分諸子各就封之為置官僚皆一省選用法令之外不得擅作威刑朝貢禮儀具為條式一定此制萬世永久則狂狡絶暴慢之心本朝無怵惕之慮臣輒獻愚管伏聽採擇塵黷非宜退增戰懼惶恐謹言論左右丞須得其人表劉洎貞觀十一年時為治書侍御史臣某言臣聞尚書萬機實為政本伏尋此選授受誠難是以八座比於文昌二丞方於管轄爰至郎曹舊唐書本傳作曹郎上應列宿苟非稱職竊位興譏伏見比來尚書省詔勑稽停文案壅滯臣誠雖庸劣請述其源貞觀之初未有令僕于時省務繁雜倍多於今而左丞戴胄右丞魏徵並曉逹吏方質性平直事應彈舉無所回避陛下又假以恩慈自然肅物百為唐書作司匪懈抑此之由及杜正倫續任右丞頗亦厲下比者綱維不舉並為勳親在位品貞觀政要作器非其任功勢相傾凡在官寮未循公道雖欲自强先懼囂謗所以郎中抑政要作與奪唯事咨稟尚書依違不能唐書作得斷決或憚聞奏故事稽延案雖理窮仍更盤下去無程限來不責遲一經出手便涉年嵗唐書作載或希旨失情或避嫌抑理勾司以案成為事了不究是非尚書用便僻為奉公莫論當否遞相姑息唯務彌縫且選賢授能非才莫舉天工人代焉可妄加至於懿戚元勳但宜優其禮秩或年高耄及或積病智昏既無益於時宜當致之以閒逸久妨賢路殊為不可將救兹宿弊且宜精簡四員致要作尚書左右丞左右司郎中如並得人自然綱維恪唐書作略政要作備舉亦當矯正趨競豈唯息其稽滯而已二字唐書作哉此篇六百九十六卷疏門重出今已削去諫誥難公卿表太宗前人臣某言臣聞帝王之與凡庶聖哲之與庸愚上下相懸擬倫斯絶是知文粹作若乃課舊唐書作以至愚而對至聖以極卑而對極尊徒思自强不可得也陛下降恩旨假慈顔凝旒後篇作神以聽其言虛襟以納其說猶恐羣下未敢對揚况動神機文粹作聰縱天辨飾辭以㭊唐書作拆其理援古以排其議欲令凡庶政要并後篇作蔽何階應答臣聞皇天以無言為貴聖人以不言為德老君稱大辨若訥莊生稱㑹要後篇作云至道無文此皆不欲煩也是以齊侯讀書輪扁竊笑漢皇慕古長孑焉正陳譏文粹作詞此亦不欲勞也且多記則損心多語文粹作言則損氣心氣內損形神外勞初雖不覺後必為纍須為社稷自愛豈為性好自傷乎竊以今日升平皆陛下力行所至欲其文粹作令長久匪由辨博但當忘彼愛憎慎兹取捨每事敦朴無非至公若貞觀之初則可矣至若秦政强辨失人心於自矜魏文宏才虧衆望於虛說此才辨之纍較然可知矣伏願略兹雄辨浩然養氣簡彼緗圖後篇作宏機淡焉怡目唐書作自怡後篇作恬想固萬壽於南山齊百姓於東戶則天下幸甚皇恩斯畢矣文粹後篇作皇恩斯畢天下幸甚此篇六百七十五卷書門重出今已削去論太子初立請尊賢學表後篇作請太子尊賢重道書前人臣某言臣聞郊迎四方孟侯所以成德齒學三讓元良由是作貞斯皆屈主祀後篇作禮之尊申下交之後篇有明字義故得芻言咸薦睿問傍通不出軒庭坐知天壤率由兹道永為鴻基後篇作業者焉至若生乎深宫之中長乎婦人之手未嘗識憂懼無由曉風俗雖復神機不測天縱生知而開物成務終由外奬夫宗彼干籥聽兹謡頌何以辨章庶績甄核彛倫歷考賢聖咸資琢玉是故周儲上哲師望奭而加裕漢嗣政要作兩深仁引園綺而昭德原夫太子宗祧是繫善惡之際興亡斯在不勤乎始合要作苟不勤始將悔於終是以朝錯上書令先通政術賈誼獻䇿務前知禮教竊惟皇太子玉裕挺生金聲夙振明允篤誠之美孝友仁義之方皆挺自天姿非勞審諭是以華夷仰德翔沛希風矣然則寢門視後篇作問膳已表於三朝藝宫論道宜𢎞於四術雖則春秋鼎盛飭躬有漸實恐嵗月易往惰業興譏後篇作志業難成取適宴安言唐書後篇作方從此始臣以愚短幸參侍從恩廣離明輕願聞徹不敢曲陳故事請以聖德言之伏惟陛下誕睿膺圖登庸歷試多才多藝道著於匡時允武允文功成於祀萬方即序九圍清晏尚且雖休勿休日慎一日求異聞於振古勞睿思於當年乙夜觀書事髙漢帝馬上披卷勤過魏后陛下自勵如此而令太子優游棄日不習圖書臣所未諭一也加以暫屏機務即寓雕蟲紆唐書作綜實思於天文則長河韜映摛玉字於仙札則霽唐書作流霞成彩固以錙銖萬代冠冕政要作首冠百王屈宋不足以升堂鍾張何階於入室陛下自好㑹要作好古如此而令太子悠然靜處不尋篇翰臣所未諭二也陛下備該後篇作通衆藝唐書作歷該衆妙獨秀寰中猶晦天聰唐書作聽俯詢凡職聽後篇作視朝之隙引見羣儒㑹要并後篇作官降以溫顔訪以今古故得朝廷是非里閭好惡凡有巨細必關聽覽陛下自行唐書作好後篇作為如此而令太子久入趨侍不接正人臣所未諭三也陛下若謂無益則何事勞神若謂有成則宜申貽厥後蔑而不急未見其可伏願俯惟政要作推睿範訓及儲君授以良書娛之嘉客朝唐書作晨披經史觀成敗於前蹤晚接賔遊訪得失於當代間以書札繼以篇章則日聞其所未聞日見其所未見副德逾後篇作愈光羣生之福也竊以良娣之選遍於中國仰惟聖㫖本求內助防微慎逺之慮固非羣臣所測暨乎微簡人物則與聘納相違監撫二周未延一士愚謂內既如彼外亦宜然者恐招物議將謂陛下重內而輕外也古之太子問安而退所以廣敬於君父異宫而處所以分别於嫌疑令太子一侍天闈動移旬朔師傅以下無由接見假令供奉有隙暫還東宫朝謁政要作拜既疏且政要作但事欣仰規諌之道故所未暇陛下不可以親教宫寀無因唐書作由以進言雖有具寮竟將何補伏願俯循前躅稍抑下流𢎞逺大之規展師友之義則離唐書作儲徽克茂帝圖斯廣凡在黎元孰不慶賴太子溫良恭儉聰明睿哲含靈所悉臣豈不知而淺識勤勤思效愚衷者願滄溟益潤日月增華也云云此篇六百七十七卷重出今已削去論攝養表太宗岑文本臣某言臣聞生者天地之大德人者有生之最靈是以物無大小咸愛其命人無貴賤咸惜其生故聖人𢎞全身之道而能免於憂患賢者著養生之術而能終其壽考嵇康有云導養得理以盡性命上獲千餘嵗下可數百年而皆不精故罕能得之又云夫為稼於湯代偏有一溉之功雖同焦爛必溉者後枯然則一溉之益不可誣矣誠哉斯言實為篤論但養生之術固非一途詳求至理語其大略莫若順陰陽之序節寒溫之中何則人資陰陽以育俟寒溫以成雖禀於五常而連類於萬物在春夏也萬物因而生長人亦宜微受溫暖以豐其肌膚在秋冬也萬物因而收成人亦宜微受寒凉以堅其筋骨是以貧賤之人皆順其性而疾病者少富貴之人多違其真而疾病者多是知春生夏長秋收冬藏此天道之大經也不順則無以為天下紀綱故日月四時之順不可失也仲長統曰百年者人之常壽之上者也順四時節飲食適衣服逺聲色避災患者躋上壽之常道至於吐故納新熊經鴟顧此乃山林之術非廟堂所行養生之要唯斯而已竊惟帝王之位尊貴斯極夏則復殿清暑長廡生寒金罍浮蟻無赫曦之色玉饌含氷有凄凉之氣冬則溫室墐戶曲房掩軒前盈獸炭輕扇可以在握躬御狐白微汗可以沾襟斯皆陰陽交易寒溫過度雖適一時之性實乖四序之宜故荀卿曰喜怒哀樂好惡必得其中所以養神也寒溫盈虛消息必得其中所以養氣也寢興動靜屈伸必得其中所以養體也是知攝生之道必在得宜况陛下憂勤之心勞於內豈可使冬夏之節候虧於外哉伏願降日月之明覽聖賢之旨順陰陽之序節寒溫之中則南山之壽更增於億年北極之尊永固於萬國云云諫五品以上妻犯姦不沒官表太宗褚遂良臣遂良言臣聞大聖文明必垂憲法使聽之者知善聞之者自新謂之中刑而終久無弊糠粃古昔而樹之風聲冠蓋百王光兹至道伏惟陛下心記五車坐談千卷斷決機務必先至理臣昨日伏見勑門下五品已上官人妻及女等有犯罪者並沒為官婢夫犯惡逆始用此刑不然歷代雜刑曽無此凖聖主可以理干臣乞以一理敢煩天聽夫禁穢防姦既張羅網生民干犯必有其事今忽有三公六尚書等官當重寄或有子數人半居文武而此三公六尚書之婦忽犯姦淫披猖衢路沒為官婢其夫既耻其子亦愧更何顔以在列亦無面以當官合門耻辱一時俱弃至於九卿之室十二衛將軍之妻沒為官婢夫豈不愧雖有文武之幹圭璋之質朝廷之所嗤笑儕流之所指㸃自貽伊戚理須屏跡臣恐失諸人倫其從此起是以古者存其大體而略其細微掩其家室而用其才能若沒其女亦為狼狽厥父與兄胡顔自處乞陛下審教化之本詳刑罰之要臣甘從鼎鑊更請一言忽若郡王近親縣主密屬有如此者若為處置若沒為官婢則非復國章若不為愆則同罪異罰臣詳案前載參驗當今輕敢思量實為不可臣荷陛下殊恩擢居近侍披跡庸流位班四品官髙祿厚於臣願足俯仰而無愆過從容而恱聖顔所以敢犯雷電獻心帷扆者夙奉深恩願罄微節昔臣有慕汲黯而願其后為堯舜守兹愚誠欲崇主德雖則畏懼必冀陳聞伏願天明一垂矜察陛下必以為此事難容理須懲肅可更付近臣詳議增加其罪臣未敢出勑手執踟蹰敢冒宸嚴伏待罪憲第二表前人臣遂良言昔人輸寫至誠必通幽顯是以落日回光飛泉上出臣丹心不著空祈聽覽擢臣之髮不足讎愆臣今月五日詣䖍化門進封表論五品以上官人妻及女等有犯罪者沒為官婢既未逹旨下情惶懼臣又再三思量實為不可唯有身犯叛逆天下不容妻女等始合配沒自兹以往曽無比例若犯姦罪身即沒官不敬舅姑則依常律自非中刑不可為教至於一婦沒官其夫及子同宗合門有大羞辱見在朝者皆不可用郡王近親縣主密戚或有如此事並具前表夫帝王作典謂之利用恐其罪而化之不因其罪而利之不驚人心不興物議教民以善不為異罰則三皇以來二百餘帝禁止姦穢皆無此法至於明聖獨用此刑既慙古昔終塵德義然則刑為政教之用政為宗稷之本若再三如此天下依行臣恐政道因兹漸就流壞是以不避嚴誅更敢一請若即班行四方談議臣緘口不言罪合萬死執以陳聞伏候刑憲謹言請宫中眼花浪見不得輒奏表前人臣遂良言昔者聖人之於鬼神也聞之而不獨信知之而不専恃是以顓頊依於鬼神制之以正不懼驚異增修仁德孔子不語怪力亂神伏惟陛下氣蓋區中威移海外擁百萬之陳頓九夷之顙自書史所載未之前聞夫人歡樂則意氣髙悲哀則膽力少自不可信兹訛惑轉移常操而宫中嬪列謂之婦人恇弱周章眼花浪見更相恐懼動一驚百雖有孟賁壯志孔翟精誠終不免聽之心疑聞之意動變異之來具諸前志自須制之以貞正厲之以安靜謂之為吉則變謂之為祥則嘉如臣愚見宜勑宫中眼花不浪見不得報告傍人更相恐動亦不得専輒奏聞如此而不安然臣受死罪謹録前載所見皆為吉慶具别狀以聞諫東宫物少於魏府長表通鑑在貞觀十六年政要作十三年非前人臣遂良言昔聖人制禮尊嫡卑庶謂之儲君道亞睿極其為崇重用物不計泉貨財帛與王者共之庶子體卑不得為例所以塞嫌疑之漸除禍亂之源而先王必本人情然後制法知有國家必有嫡庶然庶子雖愛不得超越嫡子正體特須尊崇如當親者疏當尊者卑一句一作不能明立定分則佞巧之姦乘機而動私恩容分舊唐書作宫公或至亂國伏惟陛下功超邃古道冠百王發號施令為世作法一日萬機未盡其美唐書作武未盡美臣職在諌諍無容靜默伏見東宫料物嵗得四萬假付市貨賣凡直一萬一千貫魏府别州封及廪物一年凡直一萬六千貫此便儲后俸料翻少於諸藩唐書作魏王朝野聞見以為非是唐書作不以為是陛下往年行幸自洛陽還太子於闕首獻食家令無物可用遂內出綾綵貨充鼎實預是宫臣誰不聞見陛下必以為魏府支用見不足人多費廣此理可通然則至於儲君更宜增益臣謹按文帝披輿地圖等儲君戶口諸子租嵗不過二千萬明德馬后為言亦不偏得此方防其嗜欲節其驕恣伏願陛下頗擇漢世𢎞蕩無偏儲君之用微附古者然晉王陛下親自撫養至於成立上聖深慈偏所鍾愛傳曰臣聞愛子教之以義方忠孝恭儉義方之謂國家於東宫略同魏府即日所覩未有殊别語其將來不可不慮若多其室宇唯欲崇髙賜以金貝使其盈積家人多於餘國良馬超於列藩王成童之年已得如此長世以後嗜欲方生嵗增則欣喜微減則失意財多則溢罕有克全寵祿過驕安能自制昔漢竇太后及景帝遂驕恣梁孝王封四十餘城苑方三百里大治宫室復道彌望財巨萬計入警出蹕小不得意發病而死宣帝亦驕恣淮陽憲王幾至放敗輔以退讓之臣僅乃獲免伏願陛下四字唐書作且魏王既新出閣恆存禮制政要作訓唐書作則言提其耳且示節儉自可在後月加嵗增愛子豈慮不足微臣庸暗不知大體所有管見願悉言之特願天明曲垂省覽即日諸王僚佐皆選上才或幹職有餘識見猶闕莫不誘王財賄偏曲聞奏他王皆不得我王獨得之以此自矜以兹為美即日僚佐率多如此愚臣所見特謂不然傳曰上之化下如風之靡草也則衆人萬語不及陛下一言能成就保全唯在陛下留意子弟置嚴師傅諸王之國帝弟歸藩何嘗不德音懇切示其成敗此皆皇唐美制以為稱首諸王尊奉則無愆失然則芻蕘之說更有可觀愚臣千慮或一可採伏願陛下廣加教諭他王皆求請有一王獨足陛下則崇賞之他王皆戲有一王獨愛學陛下則崇賞之他王好獵有一王獨不遊陛下則崇賞之他王皆營作有一王獨靜處陛下則崇賞之上好之則下為之上賞之則下趨之雕琢諸王皆成退素如斯陷敗臣所不聞薰風所扇日馳千里既教唐書作敦之以謙儉又勸之以文學惟忠惟孝因而奬之道德齊禮乃為良器此所謂聖人之教不肅而成者也臣以不才叨居諌職甘從鼎鑊輕敢以聞煩讟之愆伏增戰懼諌欲觀起居紀録表太宗朱子奢貞觀中臣子奢言今月十六日陛下出聖㫖發德音以起居紀録書帝王臧否前代但藏之官人主不見今欲親自觀覽用知得失愚以為聖德在躬舉無過事史官所述義歸盡善陛下獨覽起居於事無失若以此法傳示子孫竊有未喻大唐雖七百之祚天命無改至於曽𤣥已後或非上智但中主庸君飾非護短見時史直辭極陳善惡未必省躬罪已唯當致怨史官但君上尊嚴臣下卑賤有一於此何地逃刑既不能朱雲廷折董狐無隱排霜觸電無顧死亡唯應希風順旨全身逺害悠悠千載何以聞乎所以前代不觀蓋為此也其或有未允謹以奏聞伏待刑憲文苑英華卷六百二十三
