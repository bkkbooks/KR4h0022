body:
  text: 文苑英華卷八十三宋李昉等編飲食鄉飲賦一首形鹽賦一首鹽池賦一首水化為鹽賦一首春盤賦一首茶賦一首蘇合山賦一首醉賦一首中酒賦一首鄉飲賦鄉飲之制本於酒食形於樽爼和其長幼洽其宴語象以隂陽重以賔旅此六體者禮之大序至如髙館初啓長筵初肆衆賔便辟而入門主人稽首而再至則三揖以成禮三讓以就位貴賤不共其班少長各以其次然後肴栗具設酒醴畢備鼙鼓遞奏工歌咸萃以德自持終無至醉夫觀其拜迎拜送則人知其潔敬察其尊賢尚齒則我欲其無競君若好之實曰邦家之慶士能勤之必著鄉曲之行今國家徴孝秀辟賢良則必設鄉飲之禮歌鹿鳴之章故其事可得而詳立賔立主或陛或堂列豆舉爵鼓瑟吹簧動而敬居則莊百拜乃畢用賔於王禮主於敬樂主於同明士茍習於禮樂則可招賁於旌弓庶其緝熙聖迹宣暢皇風豈徒務燕謔而湛樂之是崇形鹽賦以人用調鼎和羮為韻張穎形鹽似虎岐峙山立虎則百獸最威鹽乃萬人取給合二美一作美庶以成體何衆羞之能及厥貢惟錯將蛤蜃以俱來充君之庖與昌歜而齊入麗哉其義可嘉其美可頌魯崇宴賞周公實來殷作和羮傅説登用向若美景初霽竒狀不遙映金盤以皎皎臨象筯而光昭逺則雪山出地近則白虎戲朝瞿瞿其肉威而且猱耽耽其目視而不恌立一作結而成形也白黑相對融而司味也鹹酸必調厥味伊何物不可並水火相濟為君子以成八珍上下協諧具公餗而登五鼎利我者則一作即衆成我者幾何備物象形即賤不干貴皆可適口豈同而不和至如大君式宴樽爼充盈形鹽具矣以為賔榮意者取則國君文足昭德武以彌出周禮不必改作弭前已注兵時之所貴物莫能京故天官敘其職春秋美其名必也見遺一作危則陸沉於懷土如或可用當濟代之和羮儻有禆於家國在吾道之應行鹽池賦以天造靈物資人食為韻閻伯興坤之美兮焉可以測鹽之池漭沆兮劃開於郇瑕之側廓平陸而無際浸長天之一色前對條山照峯巒之嶨苦卓切却鄰安邑對城樓之嶷一作嶪岌其出形鹽也狀雄虎之蹲于長野攫拏兮布護其吐精光也如白日之升暘谷照爛兮熻赩既似乎鏡湖之不逺又似乎渤澥之在即是以我良牧宣風千里褰帷憑軾覩茲池兮荷上天之報覩兹鹽兮恤下人之食意者以為季布鎮乎股肱黃霸藴其輔翊不爾何魚鹽川澤之用饒土潤鹹鹺之利飭天人之繫刺則有典有孚百姓之攸迷而不知不識粲矣郊甸丕哉庾億且觀其皎皛池濵皚峨嶙峋髣佛圭璧依稀碝珉入澤遐窺喜晴天之速曙隔林斜望訝瓊樹之驚春餌之者若茹膏之客捧之者疑獻玉之人况生殊播植動必合時為諸侯之賞愛入嘉賔之賦詩嗟乎其皎皎兮于川之湄一有渙乎二字非其郁郁兮于川之坻有美玉之價沉之而不汙有君子之德涅之而不緇利入桓公之論名留謝氏之詩前押詩字充郡國之珍産實亭育之攸資永言沉鬱必由光拂可取於人况鑒於物懿夫天不祕寶地不藏靈可以和梅羮之調鼎致君於堯舜可以偶腒鱐之入薦效祉於勳名爾河汾之寶信同天造豈若分溝塍之綺錯則萬頃花明匝井田之周環則千里雪皓由斯言旃有美自天幸無委於泥淖將以報於陶甄水化為鹽賦以天之美利變化無窮為韻黎逢翕然乎造化能變而窮且其為水也有上善之稱其化為鹽也有美玉之崇豈其清泠之水動變若神為代之寶致邦之豐伊昔煮海為鹽以稟乎天君以和羔之用商以賈賣而遷是知水化之利可貴哲一作誓匠之謀可研若也代人所貴此貴為美恆濟古今應乎遐邇求之者豈倦乎疲勞功崇者可不由乎此致夫以水同君子有流通之利或涓涓乎而處於藪泉或浩浩乎而遍乎淮泗或在河而則淡或混海而則鹹國有鹽而且榮家有鹽而不匱條山一寶萬邑之滋使印成者將貢於玉闕俾犖確者使我域求之東西負重南北奔馳豈不用有二字疑潤下作鹹在乎一變鼎爼既徹長筵美饌五味廢之而忘餐廣座得之為珍膳况水為柔德能乎神化皎皎如霜依依照夜莫不因水而生遇水而吒恨久處於水泉思工人之一假且天然此物成化特殊匠之所變絶代稱無豈伊水因匠是乃能窮乎變化况乎人得媒寧肯守乎一途或金門獻䇿或積代英儒感物而賦在乎覬覦仰鹽梅之美用思窮逹於髙衢春盤賦以裁紅暈碧巧助春情為韻歐陽詹多事佳人假盤盂而作地疏綺繡以為珍集本作春叢林具秀百卉爭新一本一枝叶陶甄之妙致片花片蘂得造化之窮神日惟上春唐賦雖有第一句用官韻格第二句復協韻今當考時物將革栁依門以半緑草連河而欲碧室有慈孝堂居斑白命聞可續年知暗惜研祕思於金閨同獻夀乎瑶席昭焉新義一作昭然斯義哿矣而明春是敷榮之節盤當饋薦之名始曰春兮受春有未衰之意終為盤也進盤有奉養之誠儻觀表以視中庶無言而見情懿夫繁而不撓類天地之無巧雜且莫同何才智之多功一作工庭前梅白溪一作蹊畔桃紅指掌而幽深幾一作數處分寸則芳菲幾叢呼吸旁臨作一園之朝露依稀拂拭一作依中暫拂成萬樹之春風原其心匠始規神謀創運從衆象以遐覽總羣形而內藴彼有材實我則以短長小大而模彼有文華我則以玄黃赤白而暈故得事隨意製物逐情裁當筵而珍竒競集下手乃芬馨亂開不然者欲玩扶踈期一作須買青山以樹要窺菡萏待疏緑沼而栽將以緩悲豫之思將以逞吾人之才此一作也察其所由稽其所據匪徒為以徒設諒有禆而有助者也凡一作皆集本茶賦顧况稽天地之不平兮蘭何為兮早秀菊何為兮遲榮皇天既孕此靈物兮厚地復糅之而萌惜下國之偏多嗟上林之不生如羅玳筵展瑶席凝藻思開靈液賜名臣留上客谷鶯囀宫女嚬泛濃華潄芳津出恆品先衆珍君門九重聖夀萬春此茶上逹於天子也滋飯蔬之精素攻肉食之羶膩發當暑之清吟滌通宵之昏寐杏樹桃花之深洞竹林草堂之古寺乘槎海上來飛錫雲中至此茶下被於幽人也雅曰不知我者謂我何求可憐翠澗隂中有碧泉流舒鐵如金之鼎越泥似玉之甌輕煙細沫靄然浮爽氣淡煙風雨秋夢裏還錢懷中贈橘雖神祕而焉求搜神記漢孝武時宣城有人武邑山採茗逄一毛人長丈餘引客入山採茗贈懷中橘而去異苑曰陳重母孀居每以茶為薦宅中古塜重兄弟以塜何靈將發掘母固止之獲免夜夢人云居此三百年今者謬蒙恩澤及晨獲錢二十萬蘇合山賦王泠然飲食安樂兮不易明説君子行之兮斯道不闋英髦俊彥兮攢轡結轍華堂洞開兮綺饌齊列雖珍膳芳鮮而蘇山竒絶原其所營妙實難名味兼金房之蜜勢盡美人之情素手淋瀝而象起玄冬涸沍而體成足同夫露結霜凝不異乎水積氷生盤根趾於一器擬崖崿於四明厥狀相類髙深殊致或峻或危其勢參差隱映陸離疑雪岫之坐窺乍輝乍煥其色璀璨灼爍皓旰與玉臺兮相亂縱天台揭起而陵霞太華削成而侵漢雖萬仭之竒特非四座之榮觀豈若茲山爼豆之間裝綵樹而形綺雜紅花而色斑吮其味則峯巒入口玩其象則瓊瑶在顔隨玉箸而必進非固非吝觸皓齒而便消是津是潤儻君子之留賞甘捐軀而自徇醉賦并序皇甫湜昔劉靈文選顔延之五君詠并語林文中子皆作靈晉書本作伶故他書或通用茲因古本戒後人之輕改作酒德頌以折搢紳處士余嘗為沉湎所困因作醉賦寄啁任山君一作寄任山尹君君嗜此物亦以警之爾沉湎于酒有晉之七賢心遊於夢境墮於煙六府漫漫一作漫水四支綿綿一作頽綿逶隨津一作真淳陶和渾鮮遺天地之濶大失膏火之消一作燒煎寂寂寞寞根歸川文粹作歸根復朴居若死灰行猶飄殼車屢墮兮無傷首鎮濡兮不覺機發而動魂交而瞑合文字一作子之醇味一作朴反騷人之獨醒曾不知其耳目尚何懼於雷霆偶四體以合莫一作寓四體之合真歸一元而億一作太寧麴蘖氣一作既散竹桂滋一作兹已百慮森復七情紛始風飄火爇矜誇一作夸跱跂嗟害馬之驟還一作嗟海鳥之聚還顧息肩兮未幾蘇門子聞而笑之曰子之二字一作言於道其一有猶字醯雞歟彼至人者天地根性情虛十字一作彼至仁者分之於天地根性命於虛無披拂衆萬一作拂披聚散脫遺寰區兮猶象人一作形猶大象心冥太初故大患乃二字一作道不失而至道可居也乃今一作今乃假荒惑之具一作物沉耳目之機其解須臾憂患一作恚繁滋中心不可損一作捐外患生之一作外患生于時為疹為毒為狂為醨負責之一作人道隂陽戾違束乎巫醫歐乎有司辱身滅名痿肺淫支狼狽猖一作顛獗為大人一作人大嗤不得盡年玉色先衰曾不如覩二字一作知都無醉時使人困苦一作兮字如斯一作兹凡一作皆集本中酒賦陸龜蒙書編百氏病載千名將有濵於九死諒無敵於餘酲窗間落月枕上殘更意欲問而無問夢將成而不成心悄悄目瞪瞪愛靜中而人且語愁曙後而雞已鳴才遭轥轢適别恩情屈大夫之獨醒應難共語阮校尉之連醉不可同行氣縷支綿神雜色沮前歡一作難已誓於拋擲往事空經乎思慮有馘卓擒靈與伶同之伍我願先登有殛狄放杜之君臣能執御必當拔酒樹平麴封踣仲榼碎堯鍾先刋美掾次削真龍編虎鬚者寧教畔去持蟹螯者不要相逢欲倚還眠將詞又默深窮寂寞之境别有悽涼之域黃昏細雨迷途而不到長亭白晝繁花失意而初歸故國背枕求穩牽幃就黑愁應平子分與渴是相如傳得感物逾嗟懷人有惻謝月鏡共王清去去不乏風流杜蘭香别張碩永永更無消息冠纓不御杯桉空陳徒殱燕燕之髀浸費一作脫猩猩之唇牛心表異熊掌稱珍剪雲夢䔇説文萊之美者有雲夢之䔇音豈採泮宫芹周子之菘向晚庾郎之薤初春加以歐川桂蠧潁谷榆仁雖馳心於萬品且忘味於兹辰莫話三年誰云五斗從齊奴車騎如水任阿寧風姿似栁仙莫得而媒艷何能而有麟毫簾近遮雲母不足驚心琥珀釧將還玉兒未能回首或乃強迎賔友力答箋書落魄不啻壓伊有餘襜褕猶懶整解散固慵梳卞士蔚専諷蝦蟇誠堪竊笑莊周子化為蝴蝶實是憑虛客曰雖鯖鮓能珍微風可折豈比夫榴花竹葉之味酃水之清中山之碧必能醺骨􅋳顔潛銷暗釋况前覆乃後車之驚一作警獨行為衆人之僻不然吾將受教於聖賢敢忘歡伯文苑英華卷八十三
