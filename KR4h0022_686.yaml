body:
  text: 文苑英華卷六百八十七宋李昉等編宗親下答嚴給事書一首與從弟評事書一首與表弟盧復書一首與弟莒書一首交友上與王吳郡僧智書一首復親故書一首與夏縣崔少府書一首答李清河書一首與馮宿書一首宗親下答嚴給事書張九齡自出江都集作郡慰誨纍及情義已積昆弟無踰人生相知可謂厚矣僕方請歸養從此告辭會面無期所懷當盡故復略而言之耳凡為前相所厚者豈必惡人耶僕爰自諸集作書生燕公待以族子頗以文章見許不因勢利而合但推奬之日不量不才引致掖垣有負時議然則初有超拔豈由本心嗷嗷之口曾不是察既不稱其服又加之讒間負乘致冦幾於不免當此時也若無所容以孤特之身處背憎之地自怪既往何幸而全追想寒心恍恍發悸嚴子足下不意而然既而逺出猶有餘舋巧言潛構期僕傾危故使者之來怒於心而色於事一作市賴於自慎且得集作幸且無咎不者吹毛洗垢求其痕疵智集作勢窮力屈特集作將無控告未始作怯事也一作始未情事也有為而然以故春中有書薄言求庇足下猶不諒此意以為汲汲於聲名而乃約以莊生之言博以東山之法曉導精至誠故人之情向户集作之所防有異來旨彼二教者忘情滅識無有纒愛故福至不喜禍至不憂今僕飬親豈復英華作非割離恩愛直措心於此地哉正欲惟疾之憂全身逺害故雖在小小敢不兢兢至如自於身心雖復懵昧幸受教於君子亦聞道於古人豈不能少有所適方復屑屑於毁譽之際也管仲嘗三戰三北而鮑子不以為無勇以其有親足下寧不我知可集作而有此誨且往者不自量力因緣小妓蹩􅍷干進荏苒歷年固以為運屬盛眀朝多君子義能容物而忘其孤陋則不知敝帚之貴末路多艱今專典一州蓋幸遇已甚而平生萬事為寒暑所移雖忝簮纓若墜泉壑者誠耻令名之不副寵章也昔賈誼才偕管晏言則霸王名重漢廷官止梁傅班固猶云未為不遇况僕集有擬作非其倫遇巳過彼顧多慙色豈敢怨而更求歟足下心知當眀義有所在耳尊者慈愛諸下懷寧本鄉不欲隨官重有離别春秋高矣晨昏久違僕豈復規規然徼無妄之福任悔吝之動而逈無所恃單孑獨立萬一蹉跎或逺庭闈朝心不開暮髮盡白行巳五十獨不知命哉是以冒死抗疏乞歸侍親集作藥一則視膳以展下情二則辭滿而無貽憂易曰飛鳥遺之音不宜上宜下蓋取此義亦自卜者審也顧恨上負眀主丘山之恩未有涓塵之答下愧知已提奬之力卒無知集作如言之效又平生不飾小節茍取虛名使吠聲之徒退有後議竟不集作未獲盡展所有之用以塞罔極之讒碌碌而歸不能不耿耿耳古人有從所好者僕亦有心庶承顔之餘放性自適軒冕之事亦云儻來林澤之間聊足散慮縱絶後望亦了一生何必﨑嶇不平齟齬求入然後為得也去矣嚴子勉事聖賢儻存平仲久要之言無惜詩人金玉之問幸甚張九齡白與從弟評事書蕭頴士朝得書為正不佳又前意已決難作移改是以又不報吾素志踈野平時尚不求仕進况今豈徼榮祿哉前赴牒追者蓋為三道重權兾以疇昔厚眷計議獲申惟薦羣才庶其禆益今既一言不見預一士一作生薦不行方復規求一中下郡佐而利其祿秩豈在疑作任意耶况馬墜所傷全未平復方恐便廢自是棄人才既不足採而加此疾苦更不復力強耳韋二十五與弟昨言中丞必須相然始下筆才非樂生不望擁篲志力弊困未堪詣府日日如斯與斷莫定來中丞便至責其違闕乃罪不可料一作􅍘何負使司作此相陷古人有言冠一免豈可復加於首吾計決矣之死始疑作矢靡懼弟無惑焉再申意二十五官無為咄咄見逼也為胸中最傷心力甚弱書數行便不能仰視昔不因子致跌疑交逰早識中丞今海內未靜之秋加之疾患傷損不蒙恩恤過秋羈迫亦知命矣吁何道哉與表弟盧復書李華八月八日外兄李華敬簡盧十五弟則之處秋風漸高路出泗上將詣職役如所料乎往返勞止當與時俱暢也華疹疾無聊賢姊與諸君尋常耳福卿漸減弟勿憂之與弟别來十餘年比聞在代朔之地眀時道舉出身乃能上為寡姊下為孤甥求為鴈門主簿束身戎馬之間始終無過之地此一難也時方艱危動隔生死骨肉妻子寄在河朔一身萬里省姊淮南此二難也喪亂以來時多茍且松貞玉粹亦變頺流唯弟卓然介立寒俗文詞學問守正不移金石之聲泠然在聽此三難也五姓之中盧為峻一作峻茂根源上古歷世著明降及聖唐仁賢不絶外家陵替稍久弟其勉之盧氏有諶翁祭法又世以書聞華恨未見弟為廣訪求也南祖分於何祖帝師今有四房誰各承後弟為華具條流相報也頃撰軍器舅神道碑後其房族由來意欲如軍器之志廣外家之美令萬代聞見不復討譜牒也華質性鈍弱而慕汲黯卜式之直晚嵗思夫子互鄉之見林宗賈淑之後若悟此道仁在其中易乾疑作坤元之説曰含𢎞光大品物咸亨大雅曰既明旦哲德合天德老氏所𢎞夫子即述既自以為戒亦規弟持正也弟正直太過不能容納時人是以相針努力無忽近有鄭五書信否四姊處得消息無匆匆不次華敬簡與弟莒書三兄報汝吾疹疾一定汝憂吾疾今吾將息一一用汝語念汝知之且作判官事中丞叔父小心戒慎不離使司昔田仁任安俱大將軍舍人卧馬廄中無何詔大將軍出征胸奴遣大夫趙禹選大將軍官屬舍人衣服鮮眀二子冠帶憔悴趙禹獨與二子言論於禁中即日召見皆拜二千石汝有二子之實未遇趙公之舉馬廄高眠古今一也又仲尼嘗為委吏歎曰富貴如可求雖執鞭之士吾亦為之魏舒為郎官時屬沙汰乃襆被而出自言曰當自我始大才當大用如時人不識何為歎憤哉先師曰不患無位患所以立汝能自修况事叔父吾之休廢永無榮耀於伯仲之間自非深仁高義長才厚德又焉肯惠於朽壤枯木哉莒省吾意當努力也不次三兄報交友上與王吳郡僧智書徐陵孤子徐陵頓首昔林宗道主時人多慕德之賔無忌雄豪天下盡希風之客况復王家沉默謝氏混玄名貴公門譽華卿子而秦峯阻敻淅水悠長咨訴無因但用窮結比青葽巳戒白露方漙體中何如願闕康勝鄧仲華服衮之年荀令則擁麾之日徒云早逹未可同功今日相方豈不髙視竊承富春頃嵗多難荐臻邑閈皆空黔黎將盡御史舊榻零落不存太傅齊室荒茫無處自神麾所屆襁負斯歸新屋方華故田斯墾府吏間坐長史一作使誦經督郵無事唯慮吹笛東苞海水俱承幕府之威西泊江沱同仰惟良之化政差邉張何其神也孤子無心靦冒茍郤光隂風疾彌留示有餘息恩將公聘窮擯虜庭博望侯極迹於黃河栘中監流滯於滄海自斯以後唯有庸賤本應埋魂趙魏折骨幽并豈意餘年復反鄉國仰屬伊公在亳渭老師周旌賁丘園採拾衡巷遂以哀駘不棄甕盎無遺還顧庸虛未應偕此竊承君侯過被以光輝屢有吹噓之言頻蒙薦延之澤故得周行紫閣升降丹墀點汙清朝豈不荒愧雖復華隂砥柱帶地窮深嵩高維嶽極天為重未可以方斯盛典譬此洪恩年迫桑榆豈期酬報政以川波非逺對奉無因夜夢子長之逰朝覽希道之疏浮雲西北徒懷魏帝之文行雨東南思假飛山之便窮誠巳結荒係逾深方事祈寒願加珍納謹扶力白書迷乏不次孤子徐陵頓首復親故書魏長賢自向者惠書義高志逺謂僕干時非其義自貽悔咎勤勤懇懇誠見故人之心靜言再思無忘寤寐僕雖固陋亦嘗奉教於君子矣以為士之立身其路不一故有負鼎爼以趣世隱屠釣以待時操築傅巖之下取履圯橋之上矣或有釋賃車而匡霸業委挽輅以定王基由斬祛而見禮因射鈎而受相矣或有三黜不移屈身於直道九死不悔甘心於苦節者矣皆奮其泥滓自至於青雲雖事有萬殊而理終一致推其大要歸乎忠者而已矣自頃王室板蕩彛倫攸斁大臣持祿而莫諫小臣畏罪而不言虛痛朝危空受主辱匪躬之故徒聞斯語有犯無隱未見其人梅福所以獻書朱雲所以請劒者也僕之先世傳於儒業一作素訓僕以為子之道厲僕以事君之節今僕之委質有年代矣安可自同於凡庶取笑於兒女哉僕誠不敏願得鋤彼草茅遂兹鳥雀去惡樹善不違先訓自以身沒九泉求仁得仁其誰敢怨但言與不言在我用不用在時若國道方屯時不我與以忠獲罪以信見疑貝錦成章青蠅變色良田敗於邪徑黃金鑠於衆口窮達運也其如命何吾子忠告之言敢不敬承佳惠然則僕之所懷未可一二與俗人道也投筆而巳夫復何言哉與夏縣崔少府書巳見六百七十三卷李嶠答李清河書君白辭間纍月益深勤系秋後尚熱惟兄動靜云云君粗爾推免昨自歷亭路還至臨清展一慟於崔氏舉目酸咽良不可任變故幾何氣序遄革舊館荒毁殘蟬悲鳴夫情生於有情之地古人所以登峴山而淚下聽鄰笛而凄涼誠有以也亡友崔生才高位下盛年夭閼同志遽絶絃之傷有識深埋玉之恨此而可忍孰不可忍其藻綴鮮華姿彩秀舉故已久處一作趨大府呈諸水鏡可略言也所未盡者此君幼無怙恃終鮮兄弟有田一㕓桑竹靡樹孀姊返室諸甥數門移愛敬之慕以奉之假友悌之歡以臨之貧病為感槩之資羇西無學植之半終能抗迹泥滓高步京華交結盡一時之信文章滿談者之口亦為難矣加以重襟期敦賑施良辰美景故或自逺而至一爼一觴繼以繒紵亦無絶於時所以薄俸不資於目前孤遺闕於身後古人稱清吏真不可為者豈徒言哉兄仁及遺簮禮縟追賻千古之下凛然而一作獨高凡百賔寮孰不激節然其懸罄之室所費多端舊業偃師交質他族淹泊已久又頻濟施贖庒之餘颯爾復盡今授衣附及窀穸有期合門嗷嗷靡所控告亡友卒日惠愛在人吏氓追感道路雪泣而簡書是懼贈一作賵禭莫申夫所以惡貪叨而徵貸賄者豈不慿怙作威紊我公道耶今則異於是積東里之仁既將萬化同盡企江西之潤方為萬口所懸適足以重仁恩而敦教義也惟兄實深圖之儻一言辱及羣願獲申豈惟崔氏獨受其賜亦二三朋友所佩服焉幸甚幸甚眀日西上不果拜辭伏惟珍重與集作答馮宿書韓愈垂示僕所闕非情之至僕安得聞此言朋友道缺絶久矣無有相針規磨切之道僕何幸乃復得吾子僕常閔時俗人有耳而不自聞其過凛凛然唯恐已之不自聞也而今而後有望於吾子矣然足下與僕交久僕之所守足下之所熟知在京城時囂囂之徒相訾百倍足下時與僕居朝夕出入起居亦見僕有不善乎然僕退而思之雖無以獲罪於天亦有以獲罪於人者僕在京城一年不一至貴人之門人之所趨僕之所傲與已合者則從之逰不合者雖造吾廬未嘗與之坐此豈徒足致謗而已不戮於人則幸也追思之可為栗戰寒心故至此巳集作以來克巳自下雖不肖人至未嘗敢以貌慢之况時所尚者耶以此自謂庶幾無時患不知猶復云云也聞流言不信其行嗚呼不復有斯人也君子不為小人之恟恂而易其行僕何能委曲從順望抗本作向風承意汲汲然恐不得合猶且不免云云命也集作可字如何然子路聞其過則喜禹聞昌言則下車拜蜀本有而字古人有言曰告我以吾過者吾之師也願足下不憚煩茍有所聞必以相告吾亦有以報子不敢虛也不敢忘也愈冉拜文苑英華卷六百八十七
