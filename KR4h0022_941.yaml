body:
  text: 文苑英華卷九百四十二宋李昉等編職官四李少卿條墓志一首張監察衆甫墓志一首王大夫珙墓志一首盧賔客正已墓志一首李贊善墓志一首常員外墓志一首朝散大夫守司農少卿賜紫金魚袋隴西縣開國男李公墓志銘權德輿公諱條字堅後以字為諱淮安靖王贈司空神通之𤣥孫也鹽州刺史孝鋭司空之昭也𢎞農太原守璟鹽州之穆也太子太傅贈司徒齊物公之禰也尚書左僕射贈司空復公之兄也代以忠厚而膺爵命勳藉吏部皆冠宗室公秉是慶祉生而朗邁𢎞毅疏逹方亷孝悌學以遜志文而無害始以門廕參調三命官至廷尉平集作評明清閲實適其輕重改宣城令滿嵗受代縣人以理狀乞留亷車上聞詔可其奏且加大理司直從人欲也縣鄙之南水泉委匯每暑雨流潦集作淹輒傷大田公乃峻為之防恱使其衆人就安利稼皆登成大厯中鄜坊節度使表為上介遷監察御史殿中侍御史權䇿畫一以咨之成師足食邉備益固使罷除昭陵臺令貴強㳫貪奸冒法禁公職在充奉露章以聞已集作已非為巧言所中坐貶建安尉在途纍疏詞理劘切上覽而直之罪人就誅方議率復屬太夫人棄敬飬貞元初移蘄州長史尋徴還京師執事者鋭意引重公亦啓心獻納㑹一人有漢宣共理之歎拜泉州刺史泉人冝之入為宗正丞時卿長與其二不相能告訐之書紛然交倅集作文欣詔公平之皆得其中自後屬籍疑讞顓其聽斷兩造以明九族以和九年授果州刺史先是理下無𪠘署官司無令書節用量集有度字功經構講聚百堵乃興九章粲然政用樂易人皆輯附居部明年有女道士謝氏白晝上升優詔嘉異州閭咏嘆十一年以課最陟為司農少卿國泉邦用精力區處利病陳聞靡不纎悉十四年宸心憫雨比屋艱食出其陳陳以活元元又百吏之祿廪以粟易幣則輕重相凖而便於人皆自公發之也公稽覽故志通綀程品嘗獻軍國便冝五章推理道以及人事其他奏議皆附經術有蹇蹇周易謇匪躬之操焉渥澤日加方厚其屬任而才命相戾末如之何十五年三月乙已以疾終于勝業里私第享年五十九夫人滎陽鄭氏某官某之孫某官某之女姿操柔明先于公若干年而殁乃者以公之勤追封滎陽縣君其孤曰昌舉進士甲科淑行至性公族稱其有後以其年五月甲寅龜筮襲吉血涕奉喪祔葬于萬年縣某原先公之兆域以德輿獲詳踐履俾篆斯文其銘曰昔有靖王愍䇿司空至公父兄亦命三公公族家代車服以庸允矣司農直方懿恭行惟遜悌仕乃亷忠利刃刜鍾輕翰翔風時方大來命則不融桞車遲遲棘人充充如履厦屋歸全舊封圓石篆銘永識于中監察御史清河張府君墓志銘前人君諱衆甫字子初清河人曽祖尚皇海州司馬祖𢎞藝皇兖州曲阜縣令考隱皇淄州司户參軍早為諸生能以學行自力寬亷而溫朴厚而文易居向晦固窮不變故年過耳順而方脫章甫冠惠文示不苟也初為轉運司所辟解中太常寺太祝轉河南府夀安縣尉罷秩厯年僑居雲陽時以緣情比興疏導心術志之所之輒詣絶境間以羈旅游京師卿大夫聆其風者方以聲韻屬和不暇㑹淮寧軍帥之始至也脊㨂僚佐求仕於朝朝賢多以君為才辟書荐至俄拜監察御史且為從事讜言幕畫舉無違者徴軍實於廣陵因涉江省家道病沉痼不克復命以建中三年三月日至家而終享年六十八夫人汝南周氏先於君殁其孤曰實曰宇年並孩齓未勝縗絰嵗以某月日權祔焉嗚呼貴仕眉夀或與令德不并此昔賢所以為歎姑以景行茂實賁于黃泉銘曰洪範之義享用五福展如之人冝荷百祿嘉言婉婉則罔攸伏既鐵其冠亦朱其服浮休沄沄歸全還真喬木荒墳于嗟乎張君御史大夫王公墓志常衮尊主直人則醜正者售禍權侔才忌則害能者構忤况位抗三府勢傾一時天下之事懸在掌握而剛腸立朝鷙鶚橫秋一作瞬匡拂摩切姦邪是懲至使隂謀協比承間竊發曖昧摧辱加於大臣公諱鉷太原祁人也昔在𤣥宗之盛外攘獯戎內立制度混一天下圖萬世安至于軍旅征伐府庫賜豫聲明羽儀禮文憲則莫不懿鑠震曜龎鴻精備國用荐費闕於經入固宜有卓立大才統集其事公當此時以御史大夫領京兆尹佩帶使印十數焉黜幽陟明考察風俗地征國賦均輸一作衡平凖天子六間上林三官皆總制之未央前殿離宫下苑亦護作焉公以典訓經之文法緯之明察綱之亷平紀之其運也合變隂陽有以鼓其動其密也至精鬼神不能窺其隙銜䇿害郡之黠鈐鍵多門之蠧裁兆物計億事沛有餘力矣動一節搖百支無所竄情矣故威檢轂下風清關右紅粟氷紈露積朽腐星精雪駟外廄填溢廣靈囿之百里奉祈年之萬春漢家水衡少府錢四十萬至是而過之俾我巍巍之朝四海雄冨丕變於太公之力焉入則轉移大謀出則平决群議天子垂拱於旒扆宰臣髙抗於廟堂時佐輔陳希烈忌公有宰相器憂在移奪又楊國忠與公權勢相傾事不兩立㑹有凶人邢宰唐書作幸隂聚姦黨於長安里舍中公以京輔都尉之卒逮捕悉擒詔公與廷尉雜理而希烈洎國忠使法吏以牘背喻風指於凶首引公愛弟銲連坐公具表其狀請自拘於司敗上以罪不相及猶遣使慰厚之而沉猜罔上者密白而下其書舊制大臣不對理陳寃天寶十一年四月十三日奉氂纓盤水北面拜跪而自裁妻子移𨽻宅于荒服嗚呼歷觀憂國愛君之臣忠信未逹而左右所鞫按成其無狀之罪豈勝言也則王章朝錯納忠漢朝衣冠僇於都一作東市家屬徙於合浦古人有言曰刑罰出於身實難自他及之又何害也知我者其天乎公始以茂才異行首於䇿詔凡四佐王官之邑七領憲府之命一至殿省再遷臺郎大司空大司徒各一官族德政燕國公張說已叙於烈祖之碑夫人河東郡夫人薛氏存與其榮殁與其辱南北萬里流離十年飲恨餘生以存宗祀以大厯三年五月終于某所嗣子稱以不天之釁承覆巢之餘遷逐炎海幽寃霜露家未悔禍慈親凶歸生人之難無稱之比永惟先君及難葬故有闕泣血忍死獲終哀誠以大厯五年三月二十一日合祔於中書皇考真宅之次相國許昌公嘗感府辟緬然懷舊改贈移寢周於庀喪有以見京兆知人之明許昌報德之厚衮追叙遺烈亦門生表墓之禮銘曰知者謀始不能知終明者察微昧於數窮任我以事效我以功吉凶悔吝生乎其中無象無端茫茫蒙蒙伏恨黃墟孰問蒼穹小君從祔松柏來同太子賔客盧君墓志銘前人上於大臣存殁優禮若忠厚篤敬勤勞有勳則錫以追命之册延曜耿烈使之昭也大厯五年七月癸酉制故太子賔客盧正已可贈太子少保昔唐虞之際龍作納言咎繇弼刑其在周漢申伯于藩南邦召公宅師東郊四皓輔翼太子公嘗拜蜀郡長史成都尹劔南節度採訪等使大理卿刑部侍郎工部尚書東郡留守太子賔客悉更乎明哲道德有馨香於前世之臣所任也才難不其然歟公之作鎮也𤣥宗自省方復雍以千官六宫南北軍之從留蜀殆二年矣而元元給輸費苦以公往典通義唐安二郡以理平遷通州刺史七州採訪禦使課最遂止輦草詔而命之翼勤則黜幽化源以清則群服庶尹執事之人不欺矣糾逖則攝懷亂略以寧則蠻夷君長異姓侯王從乂矣匡困則資無繇賦既平則鰥寡孤獨廢疾者知所飬矣旌德訓農禮讓大行則三老孝悌鄉嗇夫知所勸矣公之議刑也先帝以天下初定禁網踈闊朝廷郡國廢革舊章於是草具科條制刑録三卷以成後代法程無爽悔無佚罰矣公之居守也自邊騎入洛三川大殘長樂衛尉悉無官守中臺文書盡成灰燼而白晝大都之中剽吏奪金殺人橫道河南尹不能禁公以明恕清汙俗以淳和消沴氣禮新序舊士庶欣欣勤懋郎吏增嚴屯校日引月長四方人大和㑹翼翼之頌復覩于京師矣公之調護也儲后方建迪簡首僚以孝友閒博通明道術而保奉之夫大賢濟時而不獨善大才當事而不辭難凡所任遇皆以國之艱急帝所親信而在厥服也始以經明四佐大邑三厯京椽五遷藩鎮三踐臺郎一處右轄再兼中憲以至于九卿元戎師賔居守小司冦冬官卿公字子寬本諱元裕元裕改名正已查宰相世系表乃以為兄弟二人恐非以聲協上之尊稱時方大用優詔改錫焉曽祖君胄虢州參軍王父貞慶表作貞松髙尚不仕烈考履氷厯左補闕皆純古尚書作純佑秉哲本經輔行德類賢續以之長世公含精於天性之道用晦於先物之智洞於學炳于文慈惠而厚汪汪洵洵未嘗簡彛不校其犯祿及踈逺家無長物在貴居陋樂而不更春秋之饗僅致君胙賔客之位適容宴豆漿藿未厭于家食稂莠不充於馬餼及賜告得謝安車東歸天子老臣優游惠飬早逹𤣥理逮茲逾深追贈之年二月既望疾甚不弛冠帶安坐超然越二十一日甲申薨于東都循善里之私第夀七十有九夫人滎陽郡鄭氏禮義風教鄉族宗焉淡忘物遷靜與真㑹公一其好尚偕其貴夀亦古人之所難并也公薨之前祀八月七日終年六十有五權厝于新安縣龍澗原近先塋也將祔而定壙有伏泉改卜靳塢北里重岡之陽吉六年二月巳酉乃葬是以緩嗣子前祕書郎兼監察御史翰一身主祀泣盡形遺親友所憂言之感涕永惟先公夫人嘗有升堂之拜纂揚風烈非小子而誰銘曰五侯九伯太公征之大輅龍旗桓公受之子子孫孫勿替引之前人光明我公昭之天子作師我公師之懿德顯猷永世則之贊善大夫李君墓志銘前人太上立德我咎繇謀之太極至道我老氏明之施于子孫令聞長世盛衣冠於鄉族傳帶礪于侯社西凉有武昭之諡後魏有姑臧之封祚于我唐親則同姓門閥清顯冠於人倫婚姻所仰齊其大也朝位所推滕其長也君諱某字某其先隴西成紀人也曽祖𤣥道皇朝秦王府十八學士給事中銀青光祿大夫常州刺史祖正基皇太子舍人父犯肅宗廟諱皇膳部郎中淄州刺史文章侍從給事黃門官品第三使符至五軍坊司其啓奏殿柱題其名氏並以博學偉才厯位中外藹然聲問揚于家邦公體元精之和得大雅之正入出孝悌而蒸蒸如也恭儉寡過學如不及起詩禮之廢疾通古今之訓注以五經髙第冠名大學而四方諸儒多所質疑是時也𤣥宗在上天下大同分王宗枝以崇藩屏髙選僚友必極時俊非阮渾純粹鄭袤鑒識徐幹之恬淡寡欲匡衡之射䇿甲科則何以處畏慎之地當敬愛之禮故命公參陜王忠王義王棣王四府藩佐雖天人帝子不出於清禁而井賦田租必㧾於朱邸公守以亷介謹一有于字均節用用或有差終不奉教春秋匪懈夙夜在公行之惟艱不易其操何止攀小山之桂虛望神仙對西園之月空疲宴賞而已開元中御史大夫李商隱按察東都大明黜陟表公清白尤異特拜朝散大夫尋除右衛率府左郎將遷太子右贊善贊三善之德周禮其難將四率之府晉朝所重風流名士文武兼才輝映崇賢肅清屯騎素懷止足亟請歸閒至于暮年終不得謝嗚呼道不可屈身屈何傷以天寶十四載正月十七日終于東京崇政里之私第享年若干永泰元年二月皇帝以肅宗藩僚清節明著家臣秋賽在先志而不忘中尉夜拜嘆流年之已逝又以子烈憲臣光我多士詔贈曹州刺史旌有德也夫人滎陽鄭氏明粹柔閒配于君子孝敬感於冬鯉勤儉彰于夜螢先公而終其引蓋殯有子二人長曰榮終潤州司功次曰挺前監察御史繼夫人滎陽縣鄭氏輔佐之道冝其家人均飬之德愛猶已出一作子有男曰慶前越州參軍從夫啓南城之邑隨子述東征之賦江海悠然往歌來哭以大厯三年五月日葬我濟隂守于偃師縣東姑臧公之塋次蓋二夫人祔焉挺慶等性與純孝幼承訓奬蒸蒸孺慕合葬于防海變山飛銘石不泯詞曰我之始祖自髙丘兮繼有賢王霸凉州兮冕紱班然一作然兖冕班乃公侯兮周之姬姓漢之劉兮卓哉濟隂廣前修兮懷文抱質能剛柔兮羽陵遺簡誦如流兮介幘單衣從梁逰兮儲宫端士侍銅樓兮長水校尉鳴絳騶兮方期告賜得歸休兮誰謂生涯忽若浮兮先朝宫臣聖眷留兮追命藩守詔書優兮穀也嗣子難也收兮合祔黃腸千萬秋兮叔父故禮部員外郎墓志銘前人魯有先大夫其言立於世春秋謂之不朽儒有今世行之後世以成楷則君子之道不患時之不逢患其道之不顯故賢哲所以啓正宗教蓋風於人倫垂之無窮者矣賔客諱無字名某河內溫人也曽祖渠州咸安令諱緒王父杞王司馬諱毅皇考慶王文學諱楚圭咸以清明粹和髙爽顯融經術可以致公卿道德可以居師傅所不至者時之未㑹歟府君即文學之第三子也伯仲叔季嗣世清德鴻藻振古休聲動時每至徴賢良舉秀才一門擅科半於天下既冠進士擢第其年拔萃登科補益州新都尉開元十年舉文藻宏麗遂上陳皇王之盛下借周漢之諭稽以洪範九疇天人之統災變之異髙言體大久而可驗如賈生之論漢也與孫逖同入第二等擢鄠縣尉文融寵幸用事總領計簿地有不書登下之數者按而籍之乃明割利言辭義激切聞列於二府竟還其令忘已忤權風節獨立秩蒲判入等三等自周隋已來選部率以書判取士海內之所稱服者二百年間數人而已又居其最焉復以常資授萬年尉戢鸞之資摶鷙之用得不夭其性而喪其真歟然亦筆無凝牘庭絶留訟昊天之荐禍于我家也廬于外壤負填封樹哀過而陽和變慘感逹而猛獸一作毅來馴常伯卿尹四方髙士麻弔于郊者匪朝夕而間焉莫不竦嘆而希慕也及禮既外除稱疾而不起朝廷方待以議郎博士辭而求邑除潞州上黨令恬淡推誠薰然化矣故老歌詠洋洋至今入拜起居舍人搜遺求實典册大備撰開元注記三十卷藏在太史除屯田員外郎未幾轉禮部時天寶改元符瑞紛委郡國所獻月有千計公卿稱賀日奏闕總裁實難濬發皆麗𤣥宗每賞異因命女史傳寫時省覽焉方將擢居紫垣専統大誥斯文既喪成命中止以天寶三年十二月二十日薨於西京宣賜里之私第享五十有六故事中書舍人非寵終之職上以心許久矣特贈此官朝之殊典也以明年正月權厝于少陵之東至上元廣德之間以長子官在清近加贈工部侍郎太子賔客夫人博陵崔氏徽閒有德明順合禮逮事舅姑嘗佐明祀歸我不永方春即冥開元十七年終于京師年二十五窆于見子陵生長子侍郎御史著不幸早世繼夫人𢎞農縣太君楊氏大厯九年三月乙卯棄背于所封之邑其年七月已酉安厝于細桞原自廟見至于終堂三十九載冝家之懿範教子之明訓睦親之令德並載于巳酉之銘生次子𢎞農縣令曽叔子大理評事普季子渭南縣尉魯永惟纍世來遷僅二百年封域連岡昭穆相對禮不忘本時又協吉以大厯十年十月庚午遷祔于𢎞農太君之塋博陵夫人同合焉夫敵已則不厭以子則咸貴若冡嗣既殘於中年元室不歸於先寢豈成兄之志也所以同異均愛前後相從亦承家之順也孝禮則然詢義惟允君子韙之諸孤不天幼奪嚴訓志以苦立學以慈成克自修潔所承罔墜亦既成人重集大釁思飬于下不欲具生血盡而形遺者顧禮而終事也於戲天德于我叔父以扶濟儒𤣥之道元精委其和太古全其淳德之厚也知至至之可與幾知終終之可與存恬然而虛寂然而通識之逹也五禮之宗六樂之奧致廣大而盡精微極髙明而道中庸儒之博也包括群有陶融象外燭日月之光華連星漢之昭回文之雄也若因親立愛則忠友過乎悌引進極乎慈奉先追孝則怵愓于時感齊明於夙興靖于位而不以善矜儉于家而不以菲廢先哲之休風遐烈未嘗不蹈其域而冥其㑹也若處之於舜代則肩八元以論道升之於孔門則隨四科而鄰聖而位止于上士教淪于衰俗豈非蒼生之不幸耶𤣥風之始絶耶衮積釁少孤恭承憫覆躬誨無倦常至夜分性愚難移猶期日就外傳不得専也諸子不得視也獲漸庶幾實賴慈奬恩未上報禍已先鍾逺慕何申有懷靡及所踐之職昔所彌綸顧瞻廷除出入哀懼微微小子夙夜上慙遷神甫臨省護摧絶哀以傳實不敢假詞銘曰厥初茫茫輔軒致皇至我義信即官于常開國長羅惟右將軍奄受髙陽惟光祿勳卬卬天水諡曰貞道赫赫黃黃魏之元老乃生司徒啓佑周邦踐華却齊建麾幢戲上賜田自溫而遷逮茲十葉松柏芊芊穆處其後昭列其前哀詞具石永世不騫文苑英華卷九百四十二
