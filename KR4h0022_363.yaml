body:
  text: 文苑英華卷三百六十三宋李昉等編辨論一賢之用捨一首君之牧人一首國之興亡一首材之小大一首原道一首原性一首原毁一首原鬼一首賢之用捨李華上之於賢也患不能好之好之也患不能求之求之也患不能知之知之也患不能任之任之也患不能終之終之也患不能同其心而化于道是故士貴夫遇懼夫遇而不盡也君之牧人古之帝者非不欲厚其飬泰其身固揣於變化之原而要之以極亦至矣蓋以為上逸則下困困百衆逸一人一作而逸一人非天意也極非天意亦不忍為也故下逸而上困帝者甘心焉况百姓逸君孰與困書曰元后作民父母父母勞于養子則襁褓之疾弭闕則父母之心泰推是而求之聖人志于儉薄不得不爾也國之興亡為國者同于理身身或不和則藥石之針灸之若夫扶病文粹作疾而不攻疾病則斃扶之者尸也齊隋之亡也以貞于終始為惑苟而無耻為明慢于事職為高賢見義不為為長者繩違用法則附強而潰弱也議于得失則異寡而同衆也尚學希古謂之誕趣便時中文粹作中時謂之工觀其燥濕而輕重之候其成敗而褒貶之肉食之尊以滋味糊其口忍危亡而僥祿利自是而下則曰上司猶如之我於國何有設能憤發則逆為備豫動閡關文粹作動開關束氣沮志衰亦從以文粹作志亦從化幸于生者炎炎而四合死於正者求援而無繼麒麟悲鳴鳳鳥垂翅鴟鼓害翼犬呀毒喙則蛇鴆虎狼之熾文粹作徒其可向耶嗟乎心腹支體一也為病者萬焉雖有岐緩而不請岐緩視之而不救噫齊隋不亡得哉返是而理則王道易易也材之小大此篇七百四十五卷重出今已削去前人攀巢之雛羽翼將成習飛而從其母不幸為烏鳶所震墮于塵轍閥閲一作伐氷之家有侈女焉雕車繡茵過于中陌遇而憐之藏以玉笥粒以紅稻一作薦以白玉之笥粒以清江之稻胡然而然材小為貴養而玩之易為力也充軛一作轅之牛望若山行其生也任重致逺以利天下其死也筋角皮骨皆為器用水旱寒暑之不時艱難驅一作鞭驅竭乏登降重岡踣起塗潦蹄離節坼力氣皆頓病矣目猶睨人盜烏爪其背嘴其肉猶恨啄噉之未逞鴉一作烏鴉而相呼羣犬引其腹一作腸胃狺狺而爭之車馬往復于傍以千萬計不顧也胡然而然材大為纍扶而救之難為功也向若不憚斯須之勞而存之其利固厚矣悲夫材之大也為纍材之小也為貴戾于理悖于道莫甚焉君天下者辨而返之則不世而仁矣原道韓愈博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎已無待於外之謂德仁與義為定名道與德為虛位故道有君子有小人而德有吉有凶老子之小仁義非毁之也其見者小也坐井而觀天曰天小者非天之罪也彼以煦煦為仁孑孑為義其小之也則宜其所謂道道其所道非吾所謂道也其所謂德德其所德非吾所謂德也凡吾所謂道德云者合仁與義言之也天下之公言也老子之所謂道德云者去仁與義言之也一人之私言也周道衰孔子沒火於秦黃老于漢佛于晉宋齊梁魏隋之間其言道德仁義者不入于楊則入于墨不入于墨則入于老不入于老則入于佛入于彼必出于此入者主之出者奴之入者作則附之一作隆出者汙之集者作則噫後之人其欲聞仁義道德之說孰從而聽之老者曰孔子吾師之弟子也佛者曰孔子吾師之弟子也為孔子者習聞其說樂其誕而自小也亦曰吾師亦嘗師之云爾不惟舉之于其口而又筆之于其書噫後之人雖欲聞仁義道德之說其孰從而求之甚矣人之好怪也不求其端不訊其末惟怪之欲聞古之為民者四今之為民者六古之教者處其一今之教者處其三農之家一而食粟之家六工之家一而用器之家六賈之家一而資焉之家六奈之何民不窮且盜也古之時人之害多矣有聖人者立然後教之以相生養之道為之君為之師驅其蟲蛇禽獸而處之中土寒然後為之衣饑然後為之食木處而顛土處而病也然後為之宮室為之工以贍其器用為之賈以通其有無為之醫藥以濟其夭死為之葬埋祭祀以長其恩愛為之禮以次一作節其先後為之樂以宣其湮鬱為之政以率其怠倦為之刑以鋤其強梗相欺也為之符璽斗斛權衡以信之相奪也為之城郭甲兵以守之害至而為之備患生而為之防今其言曰聖人不死大盜不止剖斗折衡而民不爭嗚呼其亦不思而已矣如古之無聖人人之類滅久矣何也無羽毛鱗介以居寒熱也無爪牙以爭集有其字食也是故君者出令者也臣者行君之令而致之民者也民者出粟米麻絲作器皿通貨財以事其上者也君不出令則失其所以為君臣不能行君之令而致之民則失其所以為臣一無此七字民不出粟米絲麻作器皿通貨財以事其上則誅今其法曰必棄而君臣去而父子禁而相生養之道以求其所謂清淨寂滅者嗚呼其亦幸而出于三代之後不見黜于禹湯文武周公孔子也其亦不幸而不出于三代之前不見正于禹湯文武周公孔子也帝之與王其號名集作雖字殊其所以為聖一也夏葛而冬裘渴飲而饑食其事雖殊其所以為智一也今之一作其言曰曷不為太古之無事是亦責冬之裘者曰曷不為葛之之易也責饑之食者曰曷不為飲之之易也傳曰古之欲明明德於天下者先治一作理其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意然則古之所謂正心而誠意者將以有為也今也欲治其心而外國家天下者滅其天常子焉而不父其父臣焉而不君其君民焉而不事其事孔子之作春秋也諸侯用夷禮則夷之夷而進于中國則中國之經曰夷狄之有君不如諸夏之亡也詩曰戎狄是膺荆舒是懲今也舉夷狄之法而加之先王之教之上幾何其不胥而為夷也夫所謂先王之教者何也博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎已無待于外之謂德其文詩書易春秋其法禮樂刑政其民士農工賈其位君臣父子師友賔主昆弟夫婦其服絲麻其居宫室其食粟米蔬果魚肉其為道易明而其為教易行也是故以之為已則順而祥以之為人則愛而公以之為心則和而平以之為天下為國家無所處而不當是故生則得其情死則盡其常郊焉而天神假廟焉而人鬼享曰斯道也何道也曰斯吾所謂道也非向所謂老與佛之道也堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔子傳之孟軻軻之死不得其傳焉荀與楊也擇焉而不精語焉而不詳由周公而上上而為君故其事行由周公而下下而為臣故其說長然則如之何其可也曰不塞不流不止不行人其人火其書廬其居明先王之道以導之鰥寡孤獨廢疾者有養也其亦庶乎其可也原性性也者與生俱生也情也者接于物而生也性之品有三而其所以為性者五情之品有三而其所以為情者七曰何也曰性之品有上中下三上焉者善焉而已矣中焉者可導而上下也下焉者惡焉而已矣其所以為性者五曰仁曰義曰禮曰智曰信上焉者之于五也主于一而行于四中焉者之于五也一不少有焉則少反焉其于四也混下焉者之于五也反于一而悖于四性之于情視其品情之品有上中下三其所以為情者七曰喜曰怒曰哀曰懼曰愛曰惡曰欲上焉者之于七也動而處其中中焉者之于七也有所甚有所亡然而求合其中者也下焉者之于七也亡與甚直情而行者也情之于性視其品故孟子之言性曰人之性善荀子之言性曰人之性惡揚子之言性曰人之性善惡混夫始善而進惡歟始惡而進善歟始也混而今也善惡歟皆舉其中而遺其上下者也得其一而失其二者也叔魚之生也其母視之知其必以賄死楊食我之生也叔向之母聞其號也知必滅其宗越椒之生也子文以為大戚知若敖氏之鬼不食也人之性果善乎后稷之生也其母無災其始匍匐也則岐岐焉嶷嶷然文王之在母也母不憂既生也傳不勤既學也師不煩人之性果惡乎堯之朱舜之均文王之管蔡習非不善也而卒為奸瞽瞍之舜鯀之禹習非不惡也而卒為聖人人之性善惡果混乎故曰三子之言性也舉其中而遺其上下者也得其一而失其二者也曰然則性之上下者集有其字終不可移乎曰上之性就學而愈明下之性畏威而寡罪是故上者可學而下者可制也其品則孔子謂不移也曰今之言性集有情字者異于此何也曰今之言性者雜佛老而言也雜佛老而言者奚言而不異原毁古之君子其責已也重以周其待人也輕以約重以周故不怠輕以約故人樂為善聞古之人有舜者其為人也仁義人也求其所以為舜者責于已曰彼人也豫人也彼能是而我乃不能是早夜以思去其不如舜者就其如舜者聞古之人有周公者其為人也多才與藝人也求其所以為周公者責于已曰彼人也豫人也彼能是而我不能是蚤夜以思去其不如周公者就其如周公者舜大聖人也後世無及焉周公大聖人也後世無及焉是人也乃曰不如舜不如周公吾之病也是不亦責于已者重以周乎其于人也曰彼人也能有是是足為良人矣能善是是足為藝人矣取其一不責其二即其新不究其舊恐恐然惟懼其人之不得為善之利一善易修也一藝易能也其于人也乃曰能有是是亦足矣曰能善是是亦足矣是不亦待于人者輕以約乎今之君子則不然其責人也詳其待已也亷詳故人難于為善亷故自取也少已未有善曰我善是是亦足矣已未有能曰我能是是亦足矣外以欺于人內以欺于心未少有得而止矣是不亦待其身者已亷乎其于人也曰彼雖能是其人不足稱也彼雖善是其用不足稱也舉其一不計其十䆒其舊不圖其新恐恐然惟懼其人之有聞也是不亦責于人者已詳乎夫是之謂不以衆人待其身而以聖人望于人吾未見其尊已也雖然為是者有本有原怠與忌之謂也怠者不能修而忌者畏人修吾嘗試之矣嘗試語于衆曰某良士某良士其應者必其人之與也不然則其所踈逺不與同其利者也不然則其畏也不若是强者必怒于言懦者必怒于色矣又嘗語于衆曰某非良士某非良士其不應者必其人之與也不然則其所踈逺不與同其利者也不然則其畏也不若是強者必悅于言懦者必悅于色矣是故事修而謗興德高而毁來嗚呼士之處此世而望名譽之光道德之行難矣將有作于上者得吾說而存之其國家可幾而理也一作可幾于理也歟原鬼有嘯于梁從而燭之無見也斯鬼乎曰非也鬼無聲有立于堂從而視之無見也斯鬼乎曰非也鬼無形有觸吾躬從而執之無得也斯鬼乎曰非也鬼無聲與形安有氣曰鬼無聲也無形也無氣也果無鬼乎曰有形而無聲者物有之矣土石是也有聲而無形者物有之矣風霆是也有聲與形者物有之矣人獸是也無聲與形者物有之矣鬼神是也曰然則有怪而與民物接者何也曰有是二說集有鬼物有四字漠然無形與聲者鬼之常也民有忤于天有違于民有爽于物逆于倫而感于氣于是乎鬼有托于形有慿于聲以應之而下殃禍焉皆民之為集有之字也其既也又反乎其常曰何謂物曰成于形與聲者土石風霆人獸是也反其無聲與形者鬼神是也不能有形與聲不能無形與聲者物怪是也故其作而接于民也無恆故有動于民而為福亦有動于民而為禍亦有動于民而莫之為禍福適丁民之有是時也作原鬼文苑英華卷三百六十三
