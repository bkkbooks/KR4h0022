body:
  text: 文苑英華卷四十九宋李昉等編宫室三象魏賦二首花萼樓賦五首勤政樓視朔觀雲物賦一首已見第十一卷廣達樓賦一首吹笛樓賦一首象魏賦以象懸國章道崇政理為韻顔真卿曰有唐之建都兮蓋法天而立象濬重門於北極聳雙闕以南敞夾黃道而嶷峙干青雲之直上豈一人之是憑抑萬國之攸仰洎乎青陽戒節玉紀回天萬戶聞漏以傳響百寮執贄而獻年遒人之木鐸既徇天子之金章是懸觀乎渙發大號孚崇聖德澤如春流義若泉塞公卿翼翼而仰化黎庶欣欣而無忒自皇明而播九重由京師而降萬國美哉真盛代之聖明也爾其闕之為用也叶古典布新章積非煙之疊疊羃佳氣之蒼蒼扣峻墉以龍峙屹中天而鳳翔伯玊過而必肅子牟懷而不忘若乃盤礴國門巍峩穹昊覆瑶草於輦路接青槐於馳道亘玉斗而彌永半金城以處好既悅功於子來抑有符於靈造及夫霜天肅一作廓霽曙景涵風對巖廊而隱轔映玉樹以玲瓏既岌岌以嶪嶪亦穹穹而崇崇縱黃金與紫貝孰並美而傳功童子何知謬膺邦政徒欲竭其鄙思諒難酬於嘉命且賦頌之作本乎情性雖杼軸而屢空聊髙歌以焉疑作為詠辭曰巍巍雙闕兮嶽立雲峙政令因斯以綿有兮黎元賴此以獲理敢頌美於一時庶流芳於千祀第二以雙闕似雲浮為韻黎逢王者施令善人為邦法制惟明伊典章而有六象魏攸設信髙闕之以雙故其政坦蕩其教敦龎亦既懸之四方取則及乎瞻也羣心自降觀夫立如建標旁異懸钀俯明庭之若砥夾馳道其如髮將欲朝百蠻之酋帥集九命之簮笏豈徒競崑閬之瑶臺象河宫之貝闕髙齊嵩華勢比恆碣聚北斗之瑞雲挂西山之落月令者政之端春者嵗之始非遒人之徇路陋秦伯之懸市取象則金榜為奢指字則銀鈎可似建中于下無或不美六官有成萬姓允理惟精惟一道深黃帝之書不削不刋義合素王之史客有鄒魯之徒為之頌曰巖巖雙闕上干青雲明于著令煥乎成文萬人承式九有來君彼駟牧與露寢曾何足以稱云夫象者制法之流魏者大名之尤合二美以成德懸千古而為儔四門穆焉少正之誅何有大道行矣仲尼之歎焉求豈唯興禮讓息澆浮而已哉花萼樓賦以花萼樓賦一首并序為韻高蓋開元中歲天子築宫於長安東郛有以眷夫代邸之義舊者中宫起樓臨瞰於外乃以花萼相輝為名蓋所以敦友悌之義也銀榜天題金扉御闕俯盡一國旁分萬里崇崇乎實帝城之壯觀也是時海內賔薦之士咸遊仙署馳神纍日以待問於有司有司盛稱兹樓並命賦之小子庸蔽敢同頌美詞曰惟唐六代盛德被於幽遐彌玄都暨丹穴奄扶海與流沙莫不推福祚之攸永極威靈之所加敦夲既同夫羲軒之日睦親又比乎棠棣之花裂土苴茅以表慶錫圭分瑞以聮華信可以受無窮之祉而保乂我皇家者哉乃命有司濬池隍繕城郭將崇大壯之義載考方中之作繚垣墻以周舊宫設井幹而為新閣既凖既繩以揆以度望馳道而通禁林走建章而抵長樂攢畫栱以交映列綺窗以相薄金鋪搖吹以玲瓏珠綴含煙而錯落飾以粉繪塗之丹雘飛梁回繞於虹光藻井倒垂乎蓮萼信神明之保護亦列仙之憑託於是乘輿乃登夫翠輦而建華旒鈎陳警道兮環衛周命期門使按蹕將有事乎娛遊六龍驤首以啓路八駿騰光而夾輈且肅肅以穆穆幸夫花萼之樓然後層軒四敞聖情周顧遙窺函谷之雲近識昆池之樹緑野物疑作初霽分渭北之川原青門洞開覽山東之貢賦亦以崇友悌之德勸農桑之務豈止唯臨鄠杜之郊空指邯鄲之路而已哉且壯麗難匹光華匪一馮禁夜以孤明隱垂楊而半出赫昈昈以宏敞肅隱隱而靜謐非匠氏之竒工梓人之妙術孰能至於是哉嵗如何其嵗之首花萼樓兮對仙酒願比華封兮祝我聖君千萬壽嵗如何其嵗始正花萼樓兮開御營願同吉甫兮頌我聖君億載聲蓋聖人去有欲反無名深宫皓素髙名疑作居穆清觀羣材之樂業朝諸侯而嚮明即知華夷欣慶冠帶混并均五氣之善叶三光之精嗟乎時難再得嵗不我與迹已混於沈滯心未齊於出處此小子之所以瞻梁棟以自非仰雲霄而失序第二同前韻王諲我唐有國塹炎海而苑絶漠封日域而堤流沙生堯舜而開統誕文景而承家于兹百有二十載開元皇帝御極居藩符五馬之兆在天豈一龍能加愛弟則淮南之仙術名王則臨淄之才華朝有土階之約宫靡瑶臺之奢飾舊館而納景建飛觀而臨霞長公子之自薄塞主人之相誇非徒擬花萼之三字一作於不壯不麗蓋取諸棠棣之華請循其始仍舊而作珍林自生靈池不鑿下池塘之煙霧植夜疑作掖垣之花萼鳬鷖翕習而來止樓臺􅑬嵼而相錯雨日而雲起澄潭霽夕而月懸髙閣歸梁國於上苑通代邸於平樂洞復道而為臨幸矗曾城而作垠堮於是于城之􅑍建此飛樓橫邐迤而十丈上崚嶒而三休仰接天漢俯瞰皇州百鄽之所回合九逵之所夷猶總萬象之多少極二曜之環周為棟宇之殊觀實崇髙之寡仇蓋術疑者之不陋亦帝王之所遊規模制度去奢維素方面曲折匠石所務浮欄鬱律而却偃飛甍參差而前注連磴道而內屬曳軒窗之橫騖龍獸撫柱而相驚虹霓亘薄而齊布塗椒蘭以為馥銜明月而為炷榜題仲將之手頌登文考之賦六合清朗天地靜謐明主垂裳賢臣屈膝龍輿親覽珠旗曉出言羽衛以清帳敕太史之擇日點翠幕而夾道列雲影而竟術萬國爭馳而駢會千官畢扈而咸秩宫闕迢遙其若浮郡國森羅以如一廣宴頒大官之膳鴻霈寬司寇之律獻春之望嚴更羅守月上南山燈連北斗魚啓鑰於樓上龍銜燭於帳口帝城縱觀而駕肩王官望瞻而仰首鼓吹更落琴笙夜久清歌齊升而切漢妙舞連軒而垂手張廣樂以建和示至樂於羣有天子偃伯天下髙臨穆清理國以道與代作程不純儉以愆德不徇奢而害盈建宫而豐其屋則遵求舊作室而節其用則示間情其孝友也署為花萼之號其動疑人也則榜以正本之名何聖人之啓意物與道而相并秦作阿房而窮侈靡漢宫未央以自尊榮由是展禮樂開孰序太學時薦列國奉舉擇仙郎為清選之官闢星臺為明試之所顧無智士之知難而勞能者之虛佇第三同前韻張甫粵若帝業盛惟皇家宅秦都雍枕梁通巴開别館以對赫飾離宫而再華敘溫恭之深愛沐棠棣之榮華當其代邸初構華池方鑿鴻鴈新來潛龍未躍磐石利建維城固作授車東華一作平之門飛蓋西園之樂升降五位周環四託維梓維匠爰謀爰度建彩樓規層閣欒櫨跂翼以攢鬭枝掌杈牙見靈光殿賦而相搏凌兢雲垂嶪岌星錯風恬氣隱雨霽煙廓中坐平望數香街之往來馮檻下觀盡天京之郊郭厲丹鳳陵白鶴浮網玲瓏流光灼爍隂移翠伏影一作搖碧潭之清泠日上金題照錦林之花萼帝曰惟休順豫而遊躋攀初極眺覽還周登萬樂或歌或舞列千品乃公乃侯莫不傾赤縣竭神州士女都集衣冠盡留悉一作同觀聖旨共仰皇猷掩宫扉則聞簫聲之下漢卷珠箔則覩天人之在樓至若此下一有恭惟字乃趣是求室一作立喻政有光於聽覽事無妨於農賦邈以迥出花容玉質綺樹紛映類仙臺之下空天光照臨若秦樓之上日列衆窗以啓扉疏重門而夾室紅塵晝斂則數之疑千緑雲暮屯則望之如一理孝一作孝禮光大敦敬則友撫安戎狄調六合以為家敦睦友于冠百王而為首化猷方行土無不并演湯禹之仁惠灑唐虞之頌聲士庶從而言曰觀其壯則知至尊之攸處察其功則知萬人之是與欽其號則知昆弟之相穆見其儀則知君臣之有序此聖情方在於玄邈豈小人之賦能舉第四同前韻陶舉粵若稽古大哉皇家叶聰明於六聖敦孝友於四遐睦親親以相及樂韡韡以同華漢后龍宫建邸園之水樹梁王鴈沼通禁掖之煙花一有仍字峻隅以立制葺重樓之可嘉嘉其謂何感物而作取諸棠棣目以花萼既揆日而爰謀亦占星而是度奢必去泰儉而匪薄素壁照曜以霜皓丹桂翕赩而霞錯疊欒櫨之夭矯繞軒檻之周流雖麗萼之不足實規模而寡仇秦皇祈年之觀漢武井幹之樓在縱驕而彼得豈興竒而我儔若乃百寮望幸一人流煦君御下而觀風臣登髙而獻賦信布澤而昭德豈徒樂而是務術徑直千鄽閈如一察近逺而皆盡指纎微而匪失前卷珠簾後却疏牖分渭北之川光别終南之峯首千門回霽百陌微明翠幄凝煙暖青軒以靄映紅荷浸水嬌緑浦以縈盈咨謀景暇遊務晨并爰居爰處載笑載語萬人是察九族惟敘猶側聽於輿言或敢揚於君舉第五同前韻敬括大哉神武四三皇而作主赫矣勛華一六合而為家莫不北荒于窮髮西極于流沙故得殊方效祥則黃金紫玉禁苑呈瑞則芝草仙花彼成康與文景又安足以道耶美夫一人有作庶品咸若以為不壯不麗無以彰至尊是用上棟下宇將以信景祿於是建百堵之崇墉起九重之層閣上鬱律兮中窈窕靈煌煌兮神漠漠形直舉而孤標勢將飛而不却俯蘭叢之長坂對旗亭之延郭鑾輿屢降豈寫望於桂巖金榜遄開遂興名於花萼懿哉鴻紛以光寵夫何佳氣之蕭索洎夫氷開御溝春滿皇州青氣始霽旭日初浮皇帝乃被法服登兹樓羅綵仗駐鳴騶開繡戶之銀鎖卷珠簾之玉鈎冠蓋穆然而仰敬睟容端拱而倚旒將欲居北辰而觀萬國嚮南面而朝諸侯豈徒爰居爰處以遨以遊而已哉邈邈陵雲崇崇作固虹梁􅝦蟉而霞赩皓壁皛晃而月素亘以遐路近對東郭之門周以繚垣遙接上林之樹流雲衝牖而中斷飛鳥拂簷而斜度賁育之捷猶愕眙而不能躋揚馬之才斯侍從而為之賦若乃雷雨作解乾坤得一澤布三春歡逢五日陳簮笏之濟濟耀威儀之秩秩皇帝乃臻夫此樓也若其旁倚鳳城却瞻龍首帟幕夥以分布車徒紛以相輮奉常陳百戲之樂大官進千鍾之酒巍巍天子南面上壽德洽蒼生樂乎大有别有失路營營棲遲此情時哉未遇命也難并參嵗賦兮徒延佇懷明君兮變芳序思入仕以盡忠悵良時而誰與儻仙郎之髙鑒冀夫鵷鷺而為侣廣達樓賦以珠簾無隔露為韻李濯聖人定天保據皇圖法乾坤之正位當河洛而建都閟宸居於斗極立象魏於天衢明堂㨖雲可以恭祖考之配土圭測景可以驗盈縮之符蓋將以同光日月比德唐虞以為損之又損不可取則觀象不壯不麗安可威戎耀胡乃截疑作蕆匠石命班輸審曲之官必萃明中之士載驅建崇樓於闕下聳飛閣於城隅諒惟新以朴斫蓋仍舊之規模因子來而悅使豈殫力以為娛材露桐柏階駢碔砆應龍蜿蟺以驤宇猛獸贔屭以乘桴明璫藻耀於懸井朱鳥騫翻於薄櫨璇題景曜銀榜霞鋪及疑麗譙而崛起疊井幹以相扶月透欀壁星懸網珠莫不功侔造化妙盡洪纎雉堞相望而暗連宫闕門闈廣達而俯接閭閻德陽傍倚少室前瞻散春光於玉戶擁佳氣於珠簾桂棟連雲巢儀彩鳳蓂枝濯秀影伴初蟾若乃皇輿戾止羽衛龍趨召西園之花萼奏百里之笙竽湛堯樽而百辟和暢皎舜樂而四海歡愈窮歡浹日宴樂成需下金屋之仙伎出瓊樓之艷姝飛曼唱則衆類斯洽激清聲則煩憂自無皇情穆然聖慮夕惕數路必達四門廣闢撤懸損膳捐金抵璧懼侈心之有萌恐澆俗之未革乃延直史引詞客正八音稽六籍以為深居內視不足以觀政化是用發號施令將欲以省力役慮一物之乖所念九重而斯隔故坐衢室以觀謗登總章而側席乃命遒人以勸農宣木鐸以徇路求大隗之至道示赫胥之太素樂俗安居者皤皤而鼓腹啜菽飲水者熙熙而含哺撫一作播薰風歌湛露開罪洛陽之獄望氣大庭之庫象乎帝先廓我鼎祚巍巍乎應天地之變通蕩蕩乎作皇王之軌度吹笛樓賦以時平故事有吹笛樓為韻鄭瀆路出東門當川原靜處以凝望見櫺檻蕭然而起愁問於垂白荷鋤叟云是明皇吹笛樓龍吟洛水兮韻如在鳳去喬山兮君不留當昔開元之時天下無事鴻恩不間於中土鑾駕常遊於北地姚公宋公之智略動必咨謀寧王薛王之忠貞出皆參侍西則秦京東則洛城八百里之歌鐘斷續五十年之寰海升平于時駐清蹕御丹楹執簫管而宸衷時一作暗悅臨曲欄而睿思俄生莫不湘絃罷彈泗磬休擊楚舞態止齊謳韻寂九天斂霧送芳景於瓊軒萬籟韜音讓嘉名於玉笛既運指而有規乃濡脣而是吹林巒兮髣佛如變寒暑兮須臾可移折楊栁之數聲鴈驚前渚落梅花之一曲鳥散芳枝自從弓劍有遺星霜頻度綺窗蕭索以將毁繡嶺連延而若故竟無六律繼當時紫府之清音空有一條是往日翠華之來路雕簷寂寞兮鏤檻堪依隟駟寧回兮煙鸞莫追三山迢遞在何處萬姓淒涼無見時宫商之杳眇難尋雲消雨散榱桷之傾欹若此月慘風悲苟非德邁三皇化敷九有龍馭雖逝鴻名不朽則斯樓也寂寞空存安得往來霑襟而稽首文苑英華卷四十九
