body:
  text: 文苑英華卷四百四宋李昉等編東宫二左右庶子授王方慶左庶子制李嶠鸞臺升降銅樓輔弼一作弼諧玉裕必求時望以隆國本麟臺監王方慶盛門良緒敏學豐才道業夙彰言行無玷備歷清顯式昭幹具體溫恭之性造次不違守廉退之風終始若一實舊德之明允見通人之老成昔張良以三傑之才始傅儲右史丹資八舍之重方護春宫簡賢任能抑有前事宜膺九德之選用光三善之業可行太子左庶子散官勳如故授姚元之等兼太子庶子制蘇頲勑元儲者萬國之貞端士者一時之選自匪英傑孰當調護銀青光祿大夫守兵部尚書同中書門下三品上柱國梁縣開國公姚元之中散大夫檢校吏部尚書同中書門下三品宋璟等並以賢良方正茂才異等著於天下揚于王庭忠而在公孝以為政見義難奪立誠不回發揮文教博一作錯綜儒術故能生此王國戴于朕躬屬少陽初建承華洞啓使股肱之良宣諭道德雖典厥二柄實務兹官必俟大臣俾兼中庶元之可兼左庶子璟可兼右庶子餘如故授韋杭太子左庶子制黃門銀青光祿大夫行兵部侍郎上柱國韋杭公直有檢清芳無欲自然禮儀飾以文雅臺閣許其精練縉紳推其望實故可以發揮夏籥光踐春華宜從綺季之逰益重王商之拜可行太子左庶子散官勳如故主者施行授崔圭太子左庶子制門下太子左庶子崔圭和氣由𠂻通才應物衣冠貴其雅道筆札資其利用宫坊效職聲實攸歸曽是遞一作爰遷宜從後命可太子左庶子散官勳如故授崔秀太子左庶子制門下古者官宿其業吏不數變將欲觀其始終因以别其能否若用舍非當遲速不倫是開趨競之門豈曰和均之道宗正少卿崔秀等名迹早著朝廷所推各勑一作效一官已經四稔誠器能有用久次當遷宜副僉諧俾膺並命且承平日久從仕者多必憑考績方議進轉但須慎守豈滯其能如或躁求是招其纍速則不達謙而必亨凡今庶僚宜悉朕意可依前件授郭虗已太子左庶子制門下朝議郎守駕部員外郎兼御史中丞朔方節度行軍司馬關內道採訪處置使賜紫金魚袋郭虗已雅才明達和氣清深致逺之資文而飾吏徐雅之用剛且近仁纍踐臺閣頻更任使懋功斯久賞善當遷擢以正人宜拜職於中庶增其寵服俾兼榮於獨坐可朝散大夫守左庶子兼御史中丞餘如故授張謂太子左庶子制常衮勑中散大夫前守潭州刺史本州團練守捉使上柱國河內縣開國子賜紫金魚袋張謂往以鴻筆麗藻列於近侍典謨訓誥多所潤色較然素節鬱有盛名言念華山之巡不忘潁川之從一作舊或作徙俾之領郡亦謂理平而孝悌間博禮容循謹宜在公選首兹正人旌書課第之目參相春坊之重可守太子左庶子散官勳封如故授李廙太子左庶子制門下銀靑光祿大夫前行給事中上柱國隴西縣開國公李廙德崇業廣多識前言究墳典之至精考禮樂之所極時有著述贍而不流其在家邦率由忠儉歷位要重秉兹諒直久以病免淡然自居混冥元和放一作屏絶外務每制度未決質文或差常亦處正大議冠諸宗室儲宫綜事可謂優間豈迫以朝議且頒其祿賜煩於贊相寄在親賢可行太子左庶子散官勳封如故主者施行授楊歸厚太子右庶子制李虞仲勑為宫相者非班位已深名望有素則不可也前東都留守判官朝議郎檢校太子右庶子兼侍御史上柱國賜緋魚袋楊歸厚詞場英華諫省勤舊及典列郡政聲必聞乃者罷符印之勞佐保釐之重賢士君子歎其不遷儲闈屬寮中庶為美爰用分職爾其往哉可守太子右庶子分司東都散官勳賜如故授前沂王傅賜紫殷盈孫可太子右庶子等制錢珝勑具官某等習與性成至哉夏書之訓也故近則相習習則相成國有儲君戒之在習於其附近實屬上僚盈孫學本六經遂達四教出言行事常得指歸是以宫相命之且欲近吾元良利於所習其爾必三字疑聞荷前為博士官竟不就列堅求縣長務供養之資圖樂退居爾能于祿載典而興一作有所嘉焉可依前件太子中允授于復業太子中允制李嶠鸞臺新除朝議大夫守隨州刺史于復業志識端雅藝能詳洽既罷臺閣方驅節傳銅樓俟俊銀榜翹賢漢水觀風且輟彤襜之務瑶山聽樂宜煦黃離之景可守太子中允散官如故主者施行授于光寓太子中允制蘇頲黃門正議大夫行太子左贊善大夫于光寓立言踐行恱禮敦詩為文可觀從吏不忝往登仙閣間練馳聲洎在雄藩清公應務宜以大夫之列更增端士之華可行太子中允散官如故主者施行授李寮太子中允制勑李寮賔于諸侯之府者次于公朝之吏籍其參畫則就加甄擢獻其賢能則入選寮事其長有勞可書升于東朝闕願之請勉奉清秩無曠厥官可依前件太子司議郎授魏慤太子司議郎制勑朝議郎前行洛州録事參軍魏慤措心和暢祗事清審擢選殊尤早從殷劇司州㧾録已提郡吏之綱望苑求賢宜在正人之列可太子司議郎授張肩太子司議郎制勑朝議郎前守渭州司馬上柱國武城縣開國男張肩公清衆知虗白已任政先慈惠理尚仁明每執效官之心必聞奏課之首承華佇雋博望甄才用旌賢相之家宜在正人之列可行太子司議郎散官勳如故授許誠感太子司議郎等制門下朝散大夫行殿中侍御史上柱國許誠感朝議大夫守澤州别駕上柱國嘉興縣開國子姚昌潤等或持邦憲才幹稱多或二藩條公勤克著青宫列侍𤣥閣修文宜拜職於兩司仍佐軍於三蜀誠感可行太子司議郎昌潤可守著作郎仍充劔南節度判官勳封各如故左右諭德授楊禎太子右諭德制黃門大中大夫前試剡王府長史上柱國鄭國公楊禎敬以安仁恭而合禮相門華𦙍夙著清徽王邸元寮復膺高選屬肇開於博望宜審諭於承華可行太子右諭德餘如故主者施行授殷承業太子左諭德等制孫逖門下朝議大夫宗正少卿殷承業行宗正丞王利涉等咸以器能各升班序克勤於事不忝其名九族之司既無取於異姓兩宫之地宜有命於分官承業可太子右諭德利涉可國子監丞授許從之太子右諭德制常衮勑朝議郎試太子司議郎賜緋魚袋許從之學究儒流文推䇿府行能優敏政事通明公勤之效備彰於履歷遲暮之年固資於頥養俾遷階秩仍遂休間可朝散大夫守太子右諭德致仕授王寅太子左諭德制勑關內河東副元帥隨軍要籍朝議郎試祕書省著作郎賜緋魚袋王寅業繼儒門才通吏術嘗踐清秩不渝素檢自參戎府更展文韜進職宫僚用嘉勤績可試太子左諭德餘如故左右贊善授相王男成器太子左贊善大夫制李嶠鸞臺相王男壽春郡王成器育彩桂山承規椒掖韶容霞舉美志月將望苑翹才瑶山佇俊宜參多士之選俾從正人之列可中大夫太子左贊善大夫勳封如故主者施行授王瑀太子左贊善大夫制蘇頲黃門通議大夫行宋王府咨議參軍上柱國王瑀雅清理識尤茂風檢藝能素優名教為樂雍容朱邸已聞諷議之先一作華侍從青宫宜在文儒之列可行太子左贊善散官如故主者施行授蘇徵太子右贊善大夫制黃門正議大夫行綘州司馬上柱國蘇徵名公之訓能遺清白才子馳聲特稱敏贍往從遷貶不詘姦邪遂使揚歷官次滯遺年序宜旌綘郡之康式寵青宫之列可太子右贊善大夫散官如故主者施行授吳升太子左贊善大夫制黃門朝議大夫前守陜王府咨議參軍上柱國吳升悟理明達用心微妙博以才藝精於談吐西園月上亟聞飛蓋之篇東陸春歸宜聽鳴笳之響可守太子左贊善大夫散官勳如故主者施行授甘暉太子贊善大夫等制孫逖勑主客員外郎甘暉前代州長史元嘉福等或逰心淡泊常有慕於幽人或從事劬勞頗知名於邊郡各循班列仍度器能宜序東朝之列俾遷外藩之佐暉可守太子贊善大夫嘉福可守戎州長史散官如故授蕭誠太子左贊善大夫制勑朝議郎恆州司馬隨軍副使幽州節度驅使上柱國借緋魚袋蕭誠早標明敏久著聲名詞翰推工才能適用頃從戎幕嘗募征夫宜遷翊贊之榮仍效撫綏之術可守太子左贊善大夫依前幽州節度驅使仍專檢校管內諸軍新召長逺往來健兒事授韋汭太子贊善大夫等制門下朝散大夫守忠王府咨議參軍韋汭等各有才器備彰名實頃膺朝選久在王門儲二作貞既承於新令慶賞行惠必先於舊僚宜叶典章用增班秩可授師良太子左贊善大夫制常衮勑朝議大夫前舒州别駕直中書師良久直禁垣參典書命既精文理尤達事經常逺其私亦過於慎夙夜有恪歲時積勞顧班列而頗淹在朝章而可舉藩僚之選以序而進一作遷可守太子左贊善大夫依前直中書散官勳封如故授王幹太子左贊善大夫制勑福建節度孔目官朝議郎試左金吾衛長史上柱國賜緋魚袋王幹文林郎壽州録事上柱國郭皎等貞以幹事敏于在公掌戎門之條目精詳著稱董方州之財賦底慎惟勤宜懋乃官以疇其效幹可試太子左贊善大夫餘如故皎可朝議郎行鄂州武昌縣尉勳如故授孫履暉太子左贊善大夫制勑渭亳節度知兵馬使銀青光祿大夫試殿中監孫朝俊父朝議郎行原州司户參軍上柱國孫履暉器韞黃中行敦素尚勤於學藝守以謙光頃踐班資未申才用顧其𦙍嗣積有勳勞宜列宫寮俾光庭訓可試太子右贊善大夫散官勳如故太子洗馬授竇元泰太子洗馬制蘇頲勑昭成皇后四從叔朝議郎行黃州司馬竇元泰觀津之榮纍秩外戚伏波之訓方後昆可勸導宗黨儀刑門族俾登洗馬之秩罔忝濯龍之戒可太子洗馬員外置同正官散官如故仍為長檢校本族子弟事授李思詮太子洗馬等制勑朝散郎守忠王友翰林供奉兼侍諸王等書李思詮等官分望府名著周行咸以其長各施於用藩維樂善已陟於元良僚屬延恩俾遷於列位可依前件太子舍人授蕭嵩太子舍人制黃門朝請大夫殿中侍御史內供奉判尚書司勳員外郎上柱國蕭嵩沈密有才清方不競郎官御史已膺臺閣之求端士正人宜副宫坊之選可行太子舍人散官勳如故主者施行授姚奕太子舍人制黃門中散大夫行鴻臚寺丞上柱國夏縣開國公姚奕循環禮輿祗若謙柄清白為事文章著名宜升景倩之才更拜當時之秩可行太子舍人散官勳封如故主者施行授崔縝太子舍人制勑福建等州節度下都知館驛官朝散郎守大理司直賜緋魚袋崔縝爰資藝文以飾吏事名參使局效著郵亭速置多方一作才急宣應命類能舉賢懋賞分官俾膺儲寀之任仍踐憲臣之列可試太子舍人兼監察御史餘如故授崔宥太子舍人制勑殿中侍御史內供奉宥早循學行纍踐班資尤推吏道之能克展官常之效頃持風憲備洽聲猷眷求闕列彼儲寀冝膺朝選式奬公才可守太子舍人授紀千鈞太子舍人等制勑奉議郎試太子左贊善大夫京兆府推勾官輕車都尉向遊仙奉議郎前行宣州司户參軍京兆推勾官上護軍紀千鈞等各有藝能兼推吏幹通於文法檢以貞亷公勤不偷課效斯著俾遷階秩之寵仍加章服之榮逰仙可朝散大夫守義王府長史勳如故千鈞可太子通事舍人散官勳如故文苑英華卷四百四
