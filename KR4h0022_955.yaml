body:
  text: 文苑英華巻九百五十六宋李昉等編職官十八崔判官汪墓誌一首韋倉曹元誠墓誌一首李長史鋒墓誌一首唐推官欵墓誌一首李司録雍墓誌一首權㕘軍隼墓誌一首蕭兵曹惟眀墓誌一首劒南節度判官崔君墓誌銘常衮故人清河崔汪字巨源舉秀才校文尋佐戎衛遷廷尉評辟荆襄益三府春秋若干大厯四年月日遇疾終于成都官舍以己酉嵗律中南吕庚辰之辰返葬於棲鳯原龜從也惟先徳世勲焯叙前志祖仁堅父綱位不配才佐郡貳邑而已公志經炳文義精格峻敦孝本義篤近周親定交後求忠告善道達則兼濟否則艱貞天寳之難覩萌晦跡族行導漾儉徳全身陶融太和不嬰物累而辟書狎至傳駟旁午不暇棲伏俛而受命竟友於諸侯咨以書奏籌畫之事抗詞中病動不求合老將嚄唶大豪雄張正色檢御革心畏憚從容儒服以静邊荒夷險終始坦然一致初郭英乂鎮蜀政暴及禍公以嘗所辟用雖言之不行終全節守義遂與妻子居巖石之下不復斂袂於是府矣及相國衛公式是南邦旌禮賢士待以坐幄咨訪戎政議者謂翰飛紫霄邈其遠矣志士方展國華中零哀哉盖君子恥食浮於人不患無位故曰孔門不稱其官閥潁川尚慙於鄉長公始以文顯中以道勝終以義全斯亦成名矣何必乗軒服冕方謂之達歟然以有王覇之畧通質文之變不得與公卿大夫髙議明庭欝湮重泉知者悼惜旅櫬南下浮江阻寇夫人河東薛氏故水部郎中㨿之女也公之死眀誓崩戚感動潜舟夜風反柩湍險神眀所䕶川后息波出于萬死之中充此九原之葬可謂貞烈孝婦軌儀壼教嗣子師周十一嵗而孤危身過毁以余先君之舊見託銘述詞曰元和内融懿鑠孔純學滔泉源文欝春雲儉徳處難超然世氛即戎雅歌偃息中軍㕘以天時合於兵機道行則安言廢則危終保風節蜀人髙之英靈沉埋旅櫬流離哀哀孝婦上訴蒼昊金柩巴江歸魂蜀道田横舊曲季布餘􅬉一閉泉扄千秋蔓草范陽郡倉曹㕘軍京兆韋公墓誌銘獨孤及永泰二年五月七日有唐故衢州刺史魯縣子京兆韋璆第三子范陽郡倉曹㕘軍諱元誠葬于少陵原先塋夫人范陽盧氏祔焉從周禮也公少時為坊州㕘軍歴襄州司法試守棗陽縣令真授䝉城令凡五遷至范陽倉曹初安禄山以范陽叛刼脅元元以殺整衆士之因官因居而困窘顛躓堕圍中者數千計兇威所及不死則汙公掾吏也在偽署伍中溷跡徉狂冀以病免盜憎之乃加害焉春秋若干夫陽九厄㑹天地鞠㐫燎火炎炎玉石何訴是嵗天寳十五年也鳴呼人皆筮仕必以㢘平公幹稱於州里人誰無死死則名不辱志不奪不嚥盜哺以易其生生且不茍其事君事親之禮不待史氏而自眀矣在官必聞則居家正身與朋友臨財之節可知矣有子曰彤龍鍾﨑嶇於險阻之中十年不克返葬哀有何極嵗在乙巳冬某月始跋渉大行恒山之路以公之喪葬自某原集作至自某郡是公季弟吏部郎中元曽既得吉卜痛天倫之歡莫之追也願以君之忠於君恪於官友於家之徳之美以播後嗣庶㡬陵岸遷而徳音不磨謬以及為習於禮者故使為誌其辭云天地横隤三象霧集作霾非兮梟獍擇肉鸑鷟懼兮眀夷于飛罹其故兮美玉寧折質不汚兮子子孫孫荷餘裕兮越州長史李公墓誌銘梁肅大厯己未八月癸丑故尚書比部郎中集作員外渤海李公卒享年六十十月某日權窆于某鄉原嗚呼公諱鋒字公穎蓨人也其先自後魏幽州刺史髙城公雄四世至皇朝太常博士善信善信之孫曰文素以文章知名舉秀才歴伊闕尉文素生勝尉于馮翊之白水盖公之父也鳯閣侍郎平章事武功公蘇味道其外祖也公器宇魁異集作梧英風集作風神眀邁中立不囘旁通多可初不以禄仕為意用朋酒自娛游江湖間交必一時之選言必可大之業相國張平原鎬之鎮江西也聞而器之表為恊律郎兼上饒令公用仁愛恤惸獨剛眀肅豪右不及一年上饒之人如熱遇濯亦既報政彭城公劉尚書晏以狀聞詔遷晉陵令為治加上饒一等郡守李公栖筠尤重之待以賔禮時公以發硎之器連宰集作尹二邑征鎮者聆其休風方昭集作招是佇不暇陳宣州少遊表言其能授監察御史㕘宣歙軍事事無苛慝遷殿中侍御史換工部郎中從事部無闕政因條奏至京師當國者偉公之才將寘于朝公辭未復命遂以侍御史旋介本使東遷于㑹稽與公俱東永泰末妖賊殺郡將以叛其帥敗亡賊集作餘黨詐服公以單騎往安其民一旦收隠慝集作匿字三十人殺之以徇三衢之人道路相慶人到于今稱之無何有比部之拜乃兼越州長史既罷歸休于無錫私第道有所不通公淡然自居其志愈厲加以率性孝悌睦親接士財必分人衣無常主和樂扇於閨門信讓達于家邦其進也致身以從政其退也巻懐以自牧其亡也知與不知皆為歎息嚮非懿識全才其風可懐則曷以臻此予忝從公遊也久故録其實以紀之因用表墓誌銘曰才宜處貴徳宜受福允矣比部曷其不淑融融和風集作氣綽綽曠度踈通且仁柔恵有裕登車持斧厥績方茂力命蹔乖隂陽已寇閲川不駐廣厦推構夜臺隂隂何日復晝鄜坊節度推官大理評事唐君墓誌銘權徳輿君諱欵字嘉言北海人曽祖貞休皇比部郎中河南少尹祖詡太子洗馬考試河南府士曹㕘軍代有懿行逺承華構君清方敏厚㓜有立志與伯氏文編講藝脩詞知名於士友間其文華浹洽而長於比興其義行潔脩而篤於友悌貞元初舉進士甲科解巾補宫衛紀綱掾右輔守臣撫封辟士表為支使轉左領軍倉曹眀年復調為左金吾胄曹因喟然曰吾三命不越於環列其道蹇歟滿嵗宴居吟咏情性而已㑹故人彭城劉景通受天子推轂之重鎮于洛郊集作郡辟書既至命書繼下以廷尉評事理軍訟未㡬請急省兄于盛山又東南至于雲安間關巴峡嬰冐霧露俄而景通入覲為冬官司空方欲盛薦君於獻納侍從之列景通既没集作列非左右曹中執法多所引重而枕疾不起悲夫時二十年秋八月壬子其年四十有九昔崔駰管輅官不過長岑令少府丞而當時之翕然扇巧言進取滿志者可勝道哉夭閼紛綸從古所歎初娶馮翊嚴氏興元長帥相國太保公之女不幸早亡繼娶天水權氏華州司士㕘軍集之女予之從祖妹也有眀敏集作識淑行為六姻儀法結䄜周月遭罹柏舟之痛遺𦙍之始集作方娠可哀也哉予與文編周旋於文章道藝二十年矣故辱君之歡亦舊淮湖暌阻京轂㑹合合姓集作地怛化在旬嵗之中寢門屑涕情何有極冬十月庚寅其孤輝既得吉卜窆于萬年縣義善原且虞邱夷谷變不可以不識遂為銘曰一氣沄沄浮休滑湣英華未伸奄忽歸根于嗟乎嘉言于嗟乎九原刻此清芬太原府司録事㕘軍李府君墓誌銘前人君諱雍字某趙郡鄗人曽祖集有為字非萬安皇鄒平郡丞祖頊贈鄭州刺史父日知皇銀青光禄大夫黄門侍郎侍中户工刑三部尚書君承廕庥覆露而資性和厚有詞藻工篆隸起家太子通事舍人轉太常寺主簿年甫成童卓然有立志歴都水監丞長安丞轂下難理號為稱職丁太夫人韋氏憂免喪猶毁不交人事尋詔除太原府録事㕘軍已抱沈瘵以開元十有九年夏五月殁於長安昇道里享年三十五集作四十三噫嘻以侍中公之寛眀正直忠孝於君親書在國籍為景雲賢相宜其子孫昌阜有韋平之慶而義方積善所及不過於丞吏都吏未强仕而夭斯命矣夫人范陽盧氏殿中侍御史敷之女司勲郎中㳺之妹華宗淑行先殁者二嵗有子元之仕至晉州洪洞縣令愷悌之化行於鄉黨命屈其才亦不至大官洪洞之子曰鄧州新野令彬萬年尉彤陳州太康主簿彩太公廟丞彣前眀經咸等以吏以文修集作循守家法君初嘗謂洪洞曰吾家代壤樹在周鄭之郊延陵嬴博豈限故土茍吾啓手足必促擇不食之地而歸全焉故君殁之嵗秋八月權窆於萬年縣龍首原厥後七十有七嵗彬彤等居内憂忍哀襄事因竭誠信脩集作循祖禰之志啓君之竁遷祔于京兆府奉先縣漫泉集作衆鄉保章集作章保里從考集作吉卜也與洪洞君庚申分穴昭穆列次聿脩之義情理無違而彤又狀其祖徳請刻墓石抑予之重表甥也嘉其忠孝而銘之其詞曰伊昔侍中實相睿宗以孝以忠穆然清風乃生良士博物集作約仁義坦坦居易鬱堙下位家有孝孫卜兹鮮原刻勒清芬蔵于墓門叔父故朝散郎華州司士㕘軍府君墓誌銘前人序曰洪範叙三徳五福之道而徳存集作在乎人福繫乎運時未光大則巻而懐之姑以清行厚徳遺諸子孫而已公諱隼字子鷙天水洛陽人十二代祖安邱敬公諱翼為前秦司徒代有勲徳以至四代祖平凉公諱文偉集作誕歴開府儀同三司涪集作洪非常二州刺史曽祖滑州匡城縣令諱崇本王父益州成都縣令集作尉諱無待烈考許州臨頴縣令諱伋初平凉之先三葉開國匡城以降世名文行公纉承茂緒祗服家法有大易之鳴謙中庸之慎獨慥慥其守孳孳其勤中立而不易方夷道而不由徑故克家無玷干禄有聲天寳末州里舉經眀屬幽陵叛渙計偕中止解巾試守河西尉真拜鄢陵丞時東郊不開違難逃禄艱貞潔白終出盜泉朝廷嘉之除楚州寳應丞是嵗太夫人棄孝養刺血寫大乗㣲言毁瘠過禮既除喪為親戚所勉調補宋州宋城縣丞孟尚書某方持郡節深相推重每嵗考課居郡中最大厯中授福昌丞貞元初改華州司士嘗辟彭城劉公蕭國班公之府皆分事任實助經費所至之邦必聞其政所奉之主必加以禮而又學古不怠歌詩必類縁情而不流體要而無害故祕書包公謂公内外脩集作循理心正氣和君子以為知言其道未伸天奪之筭嗚呼貞元九年四月辛亥終于富平從事之館享年六十一夫人陳郡殷氏皇曹州司法麗正殿學士踐猷之孫清河尉宣集作寅之女故給事中杭州刺史亮其兄也今侍御史彬州刺史永其弟也生徳義之門襲猗那之慶自執笄疑作笄主饋逮四十年孝慈柔眀六姻是仰學備箴誦言成禮法公之禄甚薄而家甚肥中外無間言諸孤猶已子閨門之内和樂薰如也既茹未亡之痛䕶奉輤車東旋洛都八月癸丑遘疾厲終于新安之别墅享年若干有男子五人長曰少成仕至桐廬尉次曰少清以經術甲科次曰某曰某皆以文學裕蠱稟公之義方女子五人長適安福尉劉公範次適常州司倉齊暢其次未及笄皆稟夫人之眀訓少成等曽未半嵗再集荼蓼思養於下如不欲生䘖恤忍哀竭其誠信以十月某日得吉卜於新安方山南龍澗原禮也小子􅀈嵗而孤夙承善誘且懼徽音行實之不傳于後與陵谷之有遷也謹用論譔哀而不文銘曰惟叔父秉直清温而文誠而眀六試吏揚令名再從事有淑聲猗夫人懿純徳倬婦行為内則樂申申恭翼翼女有家男述職天不傭降鞠㐫道未行禍已鍾刻金石識丘封徳不泯哀無窮揚州兵曹㕘軍蕭府君墓誌銘前人君諱惟眀字惟眀南蘭陵人曽祖浚皇丹州刺史祖文逺皇睦州别駕考重暉皇金州别駕自丹州已降雖位不過守佐而皆以行義似續君即别駕府君之元子也天寳中舉秀才數以行過乎謙竟不得居甲乙科時茍未至雖巧力無所錯其用否不可久後累為知己所薦自眀州㕘軍事至揚州兵曹掾凡四更集作更四官皆有理効多以名聞薦拜或㕘從事之列向非刄有餘而用無滯疇能及此晩嵗病風家于丹陽葆真樂一作守和樽酒自適輕財重義推誠於朋友之間不飾邊幅以曠逹自任初君與令弟故司封郎中惟則同以儒服㳺京師賢士大夫締交慕義者如嚮郎中以通才歴職而君亦累為名公所薦年位未至相次凋落嗚呼以建中十二年四月某日所疾沉痼終于丹陽私第享年若干以某月日權窆于某所從宜也夫人扶風竇氏婦道柔明子渢澣集作潮汝等年未志學藐然無怙芻挽時集作將行哀以求銘銘集作誌曰南齊之後福祉􅥐臻厥生兵曹洵美且仁如何中路翳魄荆榛刻石窮泉永志聲塵文苑英華巻九百五十六
