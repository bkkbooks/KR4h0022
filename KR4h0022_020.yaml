body:
  text: 文苑英華卷二十宋李昉等編天象二十氣賦二首象賦一首空賦四首光賦一首明賦一首驕陽賦一首氣賦張文若夫氣之為物也寥廓無象中虛自然激混混而為地蔚一作升蒼蒼而稱天其下降也日月星辰著矣其上騰也山河樹木生焉虹樓隱於雲際蜃閣浮於海邊聖人遇之而為主道士餐之而得仙紛蓋松而吐霧擁爐柏而生煙若乃變化千體包含萬類結慶呈祥敷榮表瑞翳春榮而綺靡籠秋壑而枯悴噴朝霞而共丹騰晚靄而孤翠觸途無限遇物相因扶心體而為命運手足而為身九關用而殯魄六腑通而谷神朦朧虎岫暗曖龍津重輝贊於太子五色彰於異人出舂陵而表貺度函關而浮真既霏微以薈蔚復蕭索而輪囷象圓光於淺暈搖碎影於微塵爾其橐籥無窮塤箎異態乍舒乍卷如顯如晦罕養疑懸匏虛驚衆籟或散漫而成羅綺或昭彰而為黼黻昏曉樹而沉沉羃遙峰而靄靄至若噓精吸液含風吐雲拂鮑肆而均臭凝麝幃而共芬和粧臺之豔粉雜舞閣之輕裙泛蘇臯而鬱郁襲桃徑之氛氲有色可見無聲可聞助鶯杯之桂馥添鳳爼之蘭薰肹蠁難名睢盱不測隨致動靜與時消息聚散無定盈虧獨全其纎也入於有象其大也出於無邊慿太虛而作宅終造化而為年隨之不見其後迎之不見其前惟恍惟惚𤣥之又𤣥吾不知其誰氏之子象帝之先第二并序余嘗志於𤣥言每尋莊老莫不虛心竦神鋭精厲志究夫道源孰不因氣而生者其功也大其應也細述之無已遂成賦曰二儀混合兮成天地四氣汗漫兮育萬類離雲騰陵而千峯崔嵬震風飋颶而百卉葱翠宵中星虛則大火西流律應黃鍾而凝隂東萃惟兹氣之浩然胡應物之無匱若乃假名為聲託體而成慿乎動息美惡必呈挫鋭解紛庶同歸乎老氏虛心弱志或契合於莊生逆之為怒順之為貞縱之則逸捨之則盈若也勇冠三軍神雄思鋭善戰善勝徒激憤於項王嘉謀嘉猷望旗靡於曹翽爾其瞻白虹之貫日眺紫氣之衝牛應精誠之所感顯神異之潜周隨時變易物莫能儔則知氣之為用其道飛浮或聚或散處剛處柔能從達人之性偏攻思婦之愁其興也勃其忘也休伊萬古之造化胡六合之因由隂陽以之凖則天地以之通流匪斯文之可測終銘簡於千秋象賦林琨載詳圖籍爰尋古往功闢二儀物標萬象既拆之於混沌亦聞之於惚恍雖處中而可求信居外而能想隂陽式布造化斯分江河草木日月煙雲或育靈而禀氣或照曜而氛氲不因象而可覩豈無聲而得聞仰察天文傍觀地理燦爛星布巍峩嶽峙或守位而不易或鎮方而恆止不因象之所尊豈為君而勝紀至若刻鳳之琴盤龍之鏡開玉軫以交錯寫菱花而輝映聲信美而具出質含虛而轉靜不因象而可識豈充愛而為盛則有大樂鼓吹聖人輿蹕備禮而制乘時而出宛轉國門逶迤天術不因象之為用豈二儀而不失物皆有象象必可觀聽之則易審之則難借如玉京上天貝一作金闕中海其名可識其象安在象以影隨影圖疑象遍居暗莫察因明則見衆象之德唯人是則任以去留委其通塞則有心沈迹淪栖遲一作遑問津無才補國用道藏身潁水尋隱商山訪真欣逄道逺疑應時來賔既無容而可託空以象而為親空賦以平上去入終而復始為韻觀夫物則有名而有竭空則無竭而有名以空自命何縮何盈摶之不得書之不明二儀肇分運寒暑則與時而應百功勤務鑿户牖則用之以貞泰山岌而不以為阻鴻毛至而不以為輕恬淡者體之而為性澆浮者象之而為情情性之别共禀殊呈是知均乎空者既若茲倍乎空者竟如彼卷之潜方寸之內舒之盈宇宙之裏上皇得之而化淳季葉失之而亂起妙一以為稱總萬以歸理詎華說之所精非掞藻之能擬及夫天朗氣髙地平風暢揚飛鴻六翮之逺彰彩雲五色之狀若士九垓以冥期蘭子七劍以寥亮背之而騁捷遂之而攸向同橐籥之罔窮越視聽之餘量况使皓鶴聞天白駒出谷囹圄鞠草洞簫生曲歟是時端拱聖皇坐嘯英牧暫勞求士永介戩祿事無事為無為衢常樽滿路不拾遺蓋有由而致之第二無德而稱者則其稱不朽無形而用者則其用不窮若乃質渾沌氣鴻濛生天地之始匝天地之中不可致詰其名曰空夫空也者迎之不見其首隨之不見其後聽之不聞摶之不有舒之則逺彌六合攬之則不盈一手體無涯以為大物有來而必受徒意其湛爾無營飄然至輕向遙山而似畫對澄浦而同清大而觀之則漭漫兮類元胎之貌審而察之則眇寞兮凝至道之精故老氏曰有物混成先天地生寂兮寥兮孰能為其損益不皎不昧安可議其幽明利萬物有含容之德包二儀有覆載之名草木資空以長茂日月乘空以運行霜鴈雲鵬非空無以矯其翼喬鶯幽鳥非空無以習其聲夫天之無言不能去蒼蒼之象風之無色不能閟蕭蕭之響隂陽者氣猶不免於推遷躔次雖髙亦未離於測想豈若窅兮冥兮吾則不知其靈浩兮蕩兮吾則不知其廣含大化以虛無起神功而惚恍善計者無所用其籌策善觀者無以勞其俯仰故能象帝之先𤣥之又𤣥以無有入無間引微明於纎隟混餘碧於長天隨時小大應物周旋處覆盆而俱暗引測管而同圓入枝間而帶影通野外以含煙或髙深放曠或委曲連綿雖可名而可道終默然而淡然則有閒居至人燕坐開士黜聰明以反聽閉户庭而隱兒既而諦想羣物深觀至理窮未來寂滅之端探過去混元之始見衆生生而不失大化化而無已知有為盡於無形化萬物歸於一指然後色空皆泯驗先覺於輪王物我俱齊得真詮於莊子已矣哉杳杳茫茫地久天長非色非相不存不亡故知大象無形去文質而成體至恆不變混今古以為常然則無施不適應用無方作器以虛中為貴接賢以虛左為良亦有談國大夫嗟已空於杼軸倡樓孤妾怨難守於空牀當今四海㑹同羣方清晏邦國有不空之歌太史絶三空之諌獨有文章遊子書劍沈淪出門以虛舟遇物入室以虛白全真生也數竒每有書空之歎長而樂道猶在屢空之貧惜揚名之未達恨干祿之無津敢作課虛之頌用投虛受之人第三郭遹造化之工稽夫有名之域察以無象之中彼去有而含體乃因無而立空極乾坤之包汗漫何窅眇與沖融且希夷難變而橐籥罔窮神禹莫知其至離婁安覩其終墜露有聲杳然聞皓鶴之唳太虛無礙豈獨發醯雞之蒙則七曜垂文八紘作紀應類示跡變態無已皓氣浹而流英飛霞散而成綺順晝夜以明晦涵混元而古始及夫長風清驟雨霽或暝魄初滿或朝陽不翳千里若鏡合止水而澄鮮四野無塵分逺山之虧蔽理通一貫施極多族忘取捨而惟靜任細大而皆足溟漲㑹百川之宗簫管達五音之目墨客臨而責有賦見平原老氏酌以當無道幾牝谷户牖致有空之用人神終害盈之黷故至人得之於無心公綽置之於不欲欽若聖君赫赫良牧英英巖穴靜一作空而賢舉囹圄空而法平湛虛明而𤣥鑒在虛受而澄清無談天之逸藻慙叩寂以求聲第四張鳴鶴造化不測長空浩然生於未有物莫能先故其走目遐甸幽不可見流聽髙冥漸不可聆既從天而共色又鑒水而同形若乃變化隨時慿乎動止韶容春遍火雲夏起流電奪目殷雷激耳立繞樹之干巖廣長風之萬里驚飇既臨彩虹破隂雨盡天逺雲空澗深百尺樓頭見朝陽之赫奕九重宫裏聞衆鳥之喧林何髙秋之遼逈至窮冬而不極感在物之捐華益窮人之歎息惟長空之愛此終生靈兮動植歌和光以同塵每因空以悟色至人恬淡既將𤣥之又𤣥小智多非豈斯文之果測光賦甘子布原夫陽之化隂之融功斯𤣥理斯妙故沉凝者顯象清貞者流曜惟茲光之焴爚闢重昏以臨照夫其明滅靡定虛無罕測道叶神氣功侔夜力寄方圓以分影逐𤣥黃以變色鑑無隱而不彰狀雖空而可識類至人之虛已同日月於𤣥德若夫丹烏啓旭彤曜麗空藻晨霞而飛綺曛晚靄而生紅發菱花於𤣥鏡轉蕙葉於清風故其稱物咸燭呈形彼景逗幽隙而露纎埃漏踈林而分細影從盈空而不積雖駿奔其如靜至如銀河披曀金颸送清孤圓上魄飛鏡流明沉露文而委净浮氷浪以搖輕雖視之若溢而攬之不盈亦有鳬燈焰吐蘭釭彩發煙奪銀燭輝凌練月破錦幬之宵晦假瓊璧之餘晰况復玉關秋燧紫塞凉烽開暗空於千里徹夜宫之九重代羽書而揭誓疑豈飛驛而齊蹤且夫遇蒙則戢因通則揚乘物無朕適變無方大則彌於橐籥小則細於毫芒寧雨露之不潤匪寒暑之能傷歷衆妙而校德固莫善於斯光想貴和於聃叟感稱葆於蒙莊悟燭無之見獲誡暗投之不臧鏡茲道之用捨乃君子之行藏明賦從入至平為韻田沉夫何明之為用將燭幽以鑒默故日有朝靈月有宵德衆星垂耀於穹昊爝火與螢而不息皆能懷獨見之明破重昏之匿使晨臨者可分於丹素夜視者不謬於南北蓋所謂明明在上以為人極者也至如桂花未魄虞泉斂暝幽室何觀空堂靜聽飛落木於軒砌吟暮蟲於行徑則有銀燭初然蘭膏未罄昭昭耀耀亦何其盛况乎秦宫曉鑒淄川秋水君子思正其莊容粲兮用修其膩理或拂金光之清景愛瑶華之特起或指波瀾之碧池玩澄泉而未已然非大道之道至白之光且日月聞浮雲之蔽燎火有撲滅之常水猶人撓錦以塵障豈夫穆穆天子德昭晰以蕙馥皇皇侯伯心赫烈而椒芳寸心所燭萬物無藏既臨表以識裏仍察隂而辨陽然後禮樂設文武張明珠不混於江浦美玉無韞於山岡幽藪盡拔蒙潜載陽由是觀之則燭龍之遐照離婁之逺望魏乘之所炫蘇績之攸傷安得儔其小大與短長而已哉驕陽賦維皇穹之造物何靈鑒之不昭寂然隂閉倐爾陽驕風行天而啓象水于一作干土而成妖山蛇則四翼呈嵗日烏則三足升朝亭臯背春兮失色草木先秋而欲凋螢飛火井蛙動陽飇嗟乎林之云滌山之方焦旱如何其農為疑是恤雲祁祁而始布日杲杲而行出立嗇夫於丙丁命小童於甲乙春雷無聞奮豫夜月罕當離畢阡陌之多稌不滋堯湯之下人斯疾是則墳封孝婦東海之守非才圍一作圄繫寃圄河南之尹未黜而明明我后罪已彤闈日中而御菲食昧爽而籠繡衣慨祥正兮無潤嗟土膏兮逺晞冠華秉翟郡縣襲舞雩之祭務農嗇用山川申祝鼎之祈出德號兮休力役鋪皇恩兮鑠帝暉於是驗靈圖稽祕録封朽腐宥寃獄損有餘補不足躬籍田以率下遣皇華以問俗借如晉平老矣所好者音古樂俟文侯之睡希聲懵師曠之心德不足而自撫災無何而是侵赤地三年兮罕闢皇天一怒兮何深野無盈尺之潤山無膚寸之隂至如周宣中興視人如子旱魃為虐於藩服羣元輟耕於耒耜饑饉荐臻炎焚未已畢崇奠釂之設不絶郊宫之祀寧莫我聽憂心如圮及夫下邳內史任在責誠鍾亢陽之有悔毒殱殪之無生乾坤不交兮茲焉中否雷霆不動兮何時滿情求下哀於人瘼希通鑒於神明爾其廣漢從事捫衷自省藻灑不時奚能泣整地則水疑淪金穴天則全枯玉井走羣望而何階誓中隅而有請是以孫武止矢誚梁君之射鳥藝文類聚引莊子太平御覽引說苑並載梁君欲射白鴈行者駭之君怒欲射行者公孫龍止矢曰昔先君時大旱不以人祠公曰求雨以為民也言未卒大雨今君以鴈殺人乎當作孫龍止矢誚梁君之射鴈今莊子無此文而劉向新序以龍為襲以先公為齊景公非說苑也臧文抗議非魯國之焚巫齊阻飢而問孔鄭有事而咨屠彼炎亢之為患信古來而有乎昔者商罪貫盈邢為不道周邦祀嵗於龔罰衛雲與致疑於請討矧獯獫兮叛渙伊將驕兮師老方按甲而天誅未回戈而彗掃行看郅支之亂且見呼韓之保將覆油隂竚羞行潦是時也上方受釐宣室訪議雲臺所以仰乾封之兆稱時運之災濁河清兮龍馬出滄海晏兮鯨魚來山聲萬嵗壇勢三陔式行和鑾之節常希法駕之回皇乎備矣侯不邁哉文苑英華卷二十
