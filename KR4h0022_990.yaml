body:
  text: 文苑英華卷九百九十一宋李昉等編親族一為高力士祭父文一首祭二先文一首祭叔父文二首祭姑文一首祭舅文一首為王司馬祭妻父文一首祭外舅房州李使君文一首重祭外舅司徒文一首祭外姑文一首為高力士祭父文張說維開元十七年月日孝子力士敢告于考潘州府軍妣南海太君之靈小子不天夙齡凶閔身嬰冦剽家值虜裂幸供掃灑之餘遂䝉侍從之顧扶戴明聖逼畏艱難大固不敢不密小亦不敢不誠事必記心言無漏口日慎一日將二十年玉辨加首金章在佩先靈納祐明神降鍳阿母逺至於京華妹兄自拔于泥滓咸以官漸榮祿姻通士林慈顔復慶集作顧復於目前同氣展歡於膝下又緣幼育高氏變族移家敬愛盡於二堂溫凊周於一紀不圖無狀招禍永見孤棄聖主恩華曲逮存沒邑封舊郡官贈本邦親感集作恩君澤子承父意致命報天誓有同於皎日竭忠資孝志無忝於幽泉敬惟靈懷慰聞昭遂先逺有日卜兆新塋遙啓尊魂合祔良壤哀迫祖載攀戀須㬰謹以清酌少牢恭陳遣奠盈樽不舉虛饌莫嘗號天叩地殞絶何仰祭二先文閩本作追贈祭文張九齡維開元二十二年歲次乙亥孤子九齡謹遣弟某等謹以清酌脯醢集作醢脯庶羞之奠敢昭告于先考先妣之靈九齡積罪昊天天實降罰嚴廕永逺集作隔慈顔重違欲報劬勞終天何及某夙承教誨幸有所成集作幸而有成忝集作崇國竉靈猥當大任聖上義存延賞追贈所天集作及朝恩優渥跪承摧感伏惟昭亮享慈集作兹是殊錫今謹具贈太常卿廣州都督告身并桂陽郡大夫人告身及玉帶金章紫衣各一副伏惟尚饗祭處士房叔父文李商隱某爰在童蒙最承教誘違訣雖久音㫖長存近者以壇山舊塋忽罹風水夀堂圮壞宰樹凋傾雖崩則不修聞諸前哲集作聖但墮而罔治那俟他人况真隱昭集作貽芳鴻儒著美豈可令趙岐之表墊彼𤣥扄郭泰之碑淪於夜壑載惟瑊頊藐爾孤冲誠呌號之不停顧營辨之無素某等輒考諸蓍筮别卜邱封使羲叟以令日吉時奉移神寢奢無僣縟儉免虧疏是期永閟尊靈長安幽穸眠牛有慶自及於諸孤白馬垂祥豈祈集作均於猶子追懷莫及感切徒深更思平昔之時兼預生徒之列陸公賜杖念榮益以何成殷氏著文愧獻酬而早屈引進之恩方極禍凶之感俄鍾誰言一記之餘又奉再遷之兆哀深永往情極初聞矧宗緒衰微簮纓殆歇五服之內一身有官將使澤底名家翻同單系山東舊族不及寒門靜思肯構之文敢怠成書之託瑊等既幽明無纍年志漸成則當授以詩書諭其婚宦使蒸嘗有奉名教無虧靈其鍳此微誠助夫至願敢有求於必大庶免歎於忽諸迫其哀憂兼之瘵恙曽非遐逺不獲躬親瀝血裁詞叩心寫懇長風破浪敢忘昔日之規南巷齊名永絶今生之望冀因薄奠少降明輝延慕酸傷不能堪處苦痛至深永痛至深為鄭從事妻李氏祭從父文前人有美吾門實系公族絳霄結䕃皇極流輝自嚴君以交辟延榮仲父以立朝衍慶叔父雖禮疏五服而義叶一家馬援於兒姪之間一情無異王華在弟兄之列數從猶親吉人寡辭君子無諍屬者以獻賦不遇投筆從戎鏡水稽山聊屈觀書之望甬東浙右始開傳集作侍劒之名經塗幾千去國數嵗爰因職貢來奉闕庭傳車方馳朝露溘至禍生朽索釁起揚鞭始驚香而不禁俄折臂而無望嗚呼存亡恆集作定理夀夭常期所悲者方次中途所痛者非因美疢稅鞅告痛肩輿數晨既針艾之莫徵果含禭而斯及况乎合室逺在海涯一女方羇二子未丱人生甚痛天道奚言今以國家集作家國載遙干戈未息尚稽歸祔乃議從權定鼎城東永通門外南瞻嵩嶺北望邙山式崇寓殯之封且作藏神之室必也慶延異日時屬通年先溫序之思歸俟臧孫之有後二十一姪女早䝉慈撫久歎違離今又從夫山東食貧洛水將療無及驚悲有加敢因祭酹集作酒醊之馨聊冀精靈之降嗚呼叔父永鍳卑誠祭韓氏老姑文故安定韓尚書太夫人前人猗歟我家世奉𤣥德讓弟受封勤王賜國名芳彛鼎勳盈史册季孟國高秦晉欒集作樂郤恭惟柔範載禀淵塞既作女師乃為嬪則潁水波清梁園月明言從百兩且拜雙旌計集作託侯令弟配國名卿入從述職出輔專征螽斯不妬鳳凰和鳴此時同慶東都集作郡分榮使者責梁公子專魏帝念元昆人思仲氏杖節赴敵斬芻盡瘁無以家為或從王事禮優內子詩美夫人冕紘瑱紞山蕨澗蘋子元罕見冀缺如賔緑衣有感翟茀仍新遽歎夜川遄聞晝哭原阡舊署孟鄰斯卜閒居獻夀作賦之官弓裘望襲菽水承歡福善餘基好謙舊祉復自良人集于之子爰從上蔡去臨易水空報登壇未聞曵履朝父先歸莫之能比趙母上言蓋不得已寒暄結恙燥濕為疵徒虗百祿靡效三醫嗚呼夀夭所賦彭殤不移誰能了悟孰不憂悲何兹逹識乃克先知同易簀以就正如買棺而指期苟有所纍安能及斯道逺轘轅程遙河洛建兆臨塗移舟就壑日慘林嶺風凄灌薄積靄茫茫行煙漠漠某等誠深通舊情協先親始自童子至于成人年將二紀恩冠六姻念升堂之如昨慟幽夜之無晨歌停行路舂輟比鄰雖寓辭之有所終含酸而莫伸壺清愧酹集作酬爼薄羞芹唯餘彤管有美清塵嗚呼哀哉為李郎中祭舅竇端州文前人始虞命集作燕夏暴于𤣥穹功垂刋木德叶堙洪洎帝相之難作誕少康於竇中由屯獲吉因生受封降及後代傳勳繼庸西京則嬰為外戚東漢則融居上公愍陽城之不享始移籍於扶風源逺更清基高自集作足峻有焯明靈藹然休問陋巷不憂坦途方進月逺標儀霞高映論玉寧韞匱錐要處囊宜伸尚屈將集猶翔潜師大易謙尊以光誓安老氏債少易償爰紆銅墨是宰濠梁宓琴時奏潘樹逾芳入贊朝儀言揚事舉圭璧蠻夷辨冕文武吐辭含韻知今博古進揖退揚從規合矩復陶啓位殿省承榮孔門之束帶無忝漢宫之綿蕝難更君子集有之字信讒小人集有之字道長未暇閉關難期稅鞅暫持符竹逺出羅網誰識卑飛因成利往銅梁改秩錦里經時人去而琴臺壞棟文移而石室摧基劉𢎞之重銘葛廟王商之更立嚴祠隴首云歸端溪遽逐角豈觸藩臂終困木海濶天盡山深霧毒許靖他鄉有名無祿馬超正色宜歌反哭何為善之無慿而降災之甚速某欽惟教義夙所依因在昔家世勤王實殷高旌大斾結駟飛輪慶豈遺於自出榮實垂集作萃於外姻一紀已來艱凶遄及嗟宅相以無取懼堂構之不集詎言渭水之乖離竟絶西州之出入嗚呼哀哉違京背闕古陌荒阡松門積靄隴首停集作行煙祖庭是日乞墅何年淚有血而皆墮憤無膺而可填况玕剖郡符璟持使節塞逺城逈河窮路絶顧後瞻前形孤影孑長號出次重拜臨穴酒濃清醴集作酒醴清濃殽羞羅列庶有鍳於斯文冀不同於虗設為王司馬祭妻父文張九齡維年月朔日某乙謹遣集作具少牢清酌之奠敬祭集作于故某公府君之靈惟公聫葉公侯振景天朝昔也時來則地分茅土今也福過則海變桑田豈唯魑魅之憂方為螻蟻之患嗚呼哀哉始更榮盛早睦嘉姻謬入郤公之選當荷戴侯之遇情契闊而彌積義流離而益固公之謫官集作䆠某又犯時永矣去國賁然來思雖窮途之至此幸鄰境之在兹所忌者法豈忘於私聞析聲而密邇畏簡書而間之然猶風煙可冀翰墨無輟心已運於虗舟跡尚濡於涸轍驟寒暑之徂謝紛吉凶之回穴京兆之使忽追廣陵之音遽絶嗚呼哀哉平生多感自傷千里之心已矣長辭徒發九原集作泉之歎計疇昔之光寵痛淪亡於旅竄嘗許恤人之孤况霑愛子之半謹因遣奠閩本作遣尊酬敢昭集作昭告明靈心不可倦德以為馨匪羞是薦惟魂是聽遣行人於信宿空泫目於郊坰嗚呼哀哉尚饗祭外舅房州李使君文符載波澗濬廣根柢深長沃日淮海捎雲豫章氣韻孤髙鴛鴻翺翔高行端簡秉心直方在天寶中族大且光一門六姻鳴玉琅琅作宰藍田政聳民康栖遲半刺亦振芬芳才盛位卑厥聲昭彰遂登侯牧答時之望雨泄雲蒸虬螭騰􅋮清路方騁羽鱗摧傷嗚呼昔公典郡歸江之涘小子旋蜀道途舍此扁舟旋泊弱植殘鄙公辱車馬晤言則喜與能奬善感慨知已意敵周親禮成半子迫切寧覲不遑留止爰方浹旬遽征千里縈紆岩嶂浩蕩雲水惠愛纒綿簡書填委食貧多故淹歷周祀逺侍板輿敬符深㫖嗚呼哀哉歲暮朐䏰䕫州雲安縣之古號積雪皚皚旅館蕭條凶訃亦來望風一號使人甚哀心腸結塞彌旬不開公嘗好古服膺儒藝擅美素琴騰芳草𨽻泊拜靈座清塵四蔽札蠧徽銷空知灑涕嗚呼公用中孚納人于誠人負長者薄塵頌聲道孤無鄰怨抑不平逝景潜晦崇山忽傾孀稚寃號自硤徂荆霜降露濡毒漬中情今則䖍恭歸厝先塋靈有安宅道無弛程泬寥之晨萬象凄清野曠鴻斷天色光明煌煌素車翩翩銘旌出祖荒逵惋慟交并聞諸格言黍稷非馨意有所欽生芻豈輕湛彼樽罍冀降明靈儻精爽之如在庶哀詞之是聽重祭外舅司徒公文李商隱嗚呼哀哉人之生也變而往耶人之逝也變而來耶冥寞之間杳惚之內虗變而有氣氣變而有形形變而有生今將歸生於形歸形於氣漠然其不識浩然其無歸則雖有憂喜悲歡而亦勿能措二字集作用於其間矣苟或以變而之有變而之無若朝昏之相交若春夏之相易則四時見代尚動於情豈百生莫追遂可無恨儻或去此亦孰貴於最靈哉嗚呼公之世胄勳華職官􅤬歷並已託於寄奠備在前文今所以重具酒牢載形翰墨蓋意有所未盡痛有所難忘以公之平生之恩曩昔顧盻屬纊之夕不得聞啓手之言祖庭之時不得在執紼之列終哀且痛其可集作何道耶嗚呼七十之年人誰不及二公之位人誰不登何數月之間不及從心之歲聞天有慟方登論道之司時泰命屯才長運否為善何益彼蒼難知昔澤怪既明告集作吉敖釋桓公之病隂德未報夏侯知邴吉不亡何昔有其傳今無其證豈人言之不當將天道之或欺雖北海懸定薨期長沙前覺灾至偃如巨室去若歸人處順不憂得正之喜在公之德斯盛在物之痛何言矧乎再軫慮居屢垂理命簡子將戰之誓唯止桐棺晏嬰送死之文寧思石槨素車僕馬踈巾弊帷成一代之清規揚百古之休問所謂有始有卒髙明集作朗令終嗚呼往在涇川始受殊遇綢繆之迹豈無他人樽空花朝燈盡夜室忘名器集作品於貴賤去形跡於尊卑語皇王致理之文集作源考聖哲行藏之㫖每有論次必䝉褒稱及移秩農鄉分憂舊許羈牽少暇陪奉多違跡踈意通期賖道密紵衣縞帶雅貺或比於僑吳荆叉布裙高義每符於梁孟今則已矣安可贖乎集作兮嗚呼哀哉千里歸途東門故第數尺素帛一爐香煙耿賔從之云歸儼盤筵而不御小君多恙諸孤善喪升堂輒啼下馬先哭含懷舊極撫事新傷植玉求歸已輕於舊日立集作泣珠報惠寧盡於兹辰况邢氏吾姨蕭門仲妹愛深猶女思切仁兄撫婺緯以增摧闔孀閨而永慟草荄土梗旁助酸辛高烏深魚遙添怨咽嗚呼精神何往形氣安歸苟才能有所未伸勳庸有所未極則其强氣宜有異聞玉骨化於終集作鍾山楸柏實於裘氏驚愚駭俗佇有聞焉嗚呼姜氏懷安之規既聞之矣畢萬名數之慶可稱也哉集作夫篋有遺經匣藏傳劔積兹餘慶必有揚名愚方遁迹邱園遊心墳素前耕後餉併食易衣不忮不求道誠有在自媒自衒病或未能雖吕範以久貧本冶長之無罪昔公愛女今愚病妻內動肝肺外揮血淚得仲尼三尺之喙論意無窮盡文通五色之毫書情莫既嗚呼哀哉公其監之此篇原編入九目九十卷交舊門今移于此祭外姑宇文夫人文陳子昻維年月日朔女夫陳子昻謹以清酌嘉𬞞之奠奉祭于故髙氏河南宇文夫人之靈恭聞夫人有清穆之德皓潔之行淳懿肅恭內外仰則而道集作遣風素範蕙敷蘭滋用能惠心光浮氛氲梁沚崇嚴壼訓芬郁母儀中饋柔嘉娣姒有則豈圖慈顔幽翳於今十年毫木集作汪木已拱尊靈廓然今吉辰叶應幽殯方開容象如在器質已灰改卜有集作禮典宅兆方遷山園既列祖載行焉哀子號咷女也蟬集作嬋媛於集作終天永訣泣血流連子昻謬承嘉惠預叨姻戚生事早暌送終空積竊聞精意以享黍稷非馨敢陳薄酹以獻明靈伏惟夫人明神尚饗文苑英華卷九百九十一
