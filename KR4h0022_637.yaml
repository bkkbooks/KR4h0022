  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0022_WYG_637-1a, image: WYG1339/WYG1339-0037a.png}
body:
  text: 文苑英華卷六百三十八宋李昉等編薦舉上南海舉給事中穆質自代狀一首舉杭州刺史韋臯自代狀一首桂州舉前容管經略使嚴公素自代狀一首舉韋况自代充太子賔客狀一首舉楊憑自代充兵部侍郎狀一首舉崔邠充太常寺卿狀一首舉崔邠充自代禮部尚書狀一首薦道州刺史吕溫狀一首薦昭州刺史張遜狀一首薦劉孟修狀一首奏薛芳充支使狀一首薦李晏韋楚狀二首代人舉蔣係自代狀一首代人舉周敬復自代狀一首南海舉給事中穆質自代狀馬㹅右臣伏見前件官才略過人清貞出衆早居省闥鬱有政聲官叙已髙時望仍重爰自出牧美績尤彰正直不回沉毅能斷伏一作特乞以臣官授之於質則必能鎮靜方域輯和蕃戎臣之才能誠所不逮官謗易召榮福難叨伏希聖慈允茲誠請則君無妄授之義臣無虛受之名不勝懇切愧靦之至舉杭州刺史韋臯自代狀裴晃右臣在福建與韋臯鄰近諳其為政甚得人心逃亡悉歸逺近皆悅頃在京兆以公造出官今領餘杭以治行髙第馮異漢之名將初為赤眉所敗俄又大勝光武降璽書勞曰昔雖垂趐回溪今乃奮翼澠池可謂失之東隅收之桑榆矣臣以為韋臯之功亦馮異之比往雖小失今亦大理陛下既捨其過而使之則必必一作人心激勵其氣有倍匹夫一言相為而死况君臣之義誰不感恩桂州舉前容管經略使嚴公素自代狀李渤右臣伏凖建中元年正月五日制觀察使上後三日舉一人自代者前件官曽任容管經略使行朝廷威恩得蠻夷畏愛可以備方隅之任㹅亷察之權使其處臣之官代臣之職必能獷悍柔服溪洞乂安伏乞聖慈允臣所薦臣某不任誠懇之至舉諫義大夫韋况集本有全銜英華不録自代充太子賔客狀權德輿右伏凖建中元年正月五日制常參官上後三日舉一人以自代者前件官含和抱素晏息道樞循性履方逺跡聲利徴拜諫列乞歸故山實有古風可𢎞集作司教本伏以賔護之任道德所宜不嬰事物時謂清重正職員於三品列商皓於四人豈臣小生忽據尊秩久於塵玷自速愆尤過䝉恩私猶處優禮俯仰慙灼上負聰明賦祿命官必歸耆碩以臣負罪非所克堪推賢讓能朝有恆制大僚厚德慶洽時情謹録奏聞謹奏舉散騎常侍楊慿同前自代充兵部侍郎狀前人右伏凖建中元年正月五日制常參官上後三日舉一人以自代者前件官曠度偉才明誠直道卓爾山立不隨波流自踐朝倫時推公器話言形於風槩聲猷發於事業庶政根本在於南宫臣以庸虛五贊其職慿積望實未階茲選物議時情共知不可輒量力以循分期類能以審官庶允至公以明朝典謹録奏聞謹奏舉吏部侍郎崔邠同前充太常卿狀前人右伏凖建中元年正月五日制常參官上後三日舉一人以自代者前件官才茂識精密靜𢎞逺集作逹久於右掖再履南宫儀曹取士聲實不惑少集作小宰掄材流品皆叙伏以奉常典禮首冠羣卿古今盛選不可虛授以臣愚薄纍奉恩榮前後職官無非濫忝逮今奬命尤懼非宜將可以叶和人神祗肅郊祀跡邠公望當處大僚循分讓能朝有彛典謹録奏聞謹奏舉太常寺卿崔邠同前自代充禮部尚書狀前人右件官器行端茂文學𢎞深自中書舍人歷代禮部吏部二侍郎太常卿皆與臣交代諳其政事伏凖建中元年正月五日制常參官上後三日舉一人以自代者臣頃待罪非據首尾四年無補休明合當譴黜聖慈寬宥猶守本官受恩之日惶駭失次乂䝉特令宰臣奉宣進止奬飾慰喻至于再三謂臣更無罪過恐臣妄有憂懼承命震灼感入肺肝宰臣退免未有斯比實當怵惕之際再沐生成之恩臣以違奏近侍不合申謝慮煩省覽不敢拜章輒因舉代之時特荷非常之澤况宗伯秩禮選任重難以邠代臣實允公望謹録奏聞謹奏代李中丞薦道州刺史吕溫狀溫自作右臣伏以前件官操履有恆吏事精舉處繁簡肅辨獄詳明尤於撫綏實著效績今道州賦稅畢集流亡盡歸䖍奉公程日至清淨委心於理古人不如衡州凋弊纍年常積逋缺實籍財用以安疲黎伏望除衡州刺史臣職當亷察上奉詔條觀善薦能臣合竭節七州之事敢不精詳前件官小心理務夙夜奉公才識出人效績尤著况通州風俗獷猾前後難為緝綏自溫條理已來疲人盡皆蘇息觀其能政堪為表儀臣輒舉所職上達聖聰伏望天恩允臣所請云云薦昭州刺史張遜狀為人作令狐楚右臣伏凖貞元六年十一月八日勑㫖自今已後諸州刺史縣令以肆考如理術尤異實效可稱考滿日委觀察使録事跡以聞特加奬擢者前件官守文惟謹持法甚精清亷有餘貞固無比臣伏見嶺南風俗惰懶苟避征徭易成逋竄張遜憂人若已理郡如家勸課農桑置立保社移風為敦厚之境徴賦無慘急之名周旋六年其道一致臣猥司亷察忝守方隅以所見聞恐須甄録云云薦劉孟修狀為人作令狐楚右件官業傳忠厚雅尚文儒貞白居心公勤守職纍曽試用皆著清亷頃崔漢衡在晉州日奏授殿中侍御史充都防禦判官直道不回正詞無隱賔僚之內裨益甚多知是公才豈一作辭為參佐屢詳疑獄心盡哀矜嘗判劇曹事無留滯臣是以録其勞效奏請改官伏䝉聖恩特授前件官今赴闕下奉詔㫖不敢乞留臣伏以孟修自有幹能誠堪任使所知微分輒敢薦聞干冒宸嚴伏增戰越奏薛芳充支使狀為人作右件官藴蓄公才精勤吏道文章史傳無不該通大厯末則與臣及徐泗節度使張建封同事故馬燧作判官建中三年曽以公事直言不合其意遂被奏受交城縣令及有政績褎然疲羸悉安征賦皆辦臣以其四居畿令兩任法官有學有才堪為賔佐委令推斷無不詳平與之籌畫多所禆益相諳相識二十餘年滯屈最深實希榮奬伏望天恩特賜改官充臣觀察支使薦李晏韋楚狀太和六年白居易朝議大夫前使持節海州諸軍事守海州刺史上柱國李晏右前件官比任海州刺史被本道節度使配諸州稅麥一例加估徴錢晏頻申論集作奏恐損百姓本使稱用軍事切不得已而從之及被人論朝廷勘覆責不聞奏除削官集作替階雖在法則四字集作在法誠合舉行於晏則集作即為獨屈况晏纍為宰牧皆著良能清白公勤頗聞於衆自經停罷已涉三年退居洛陽窮餓至甚身典三郡家無一金據此清亷别堪優奬又建中初李正已與納連及汴河阻絶轉輸不通晏先父洧即正已堂弟為徐州刺史當叛亂之時洧以一郡七城歸國效順棄一家百口任賊誅夷開運路於集作文咽喉斷凶渠於集作之右臂遂使逆謀大挫妖寇竟消從此徐州甬橋至今永為內地如洧之子實可念之臣伏以洧之忠功不可忘晏之吏材不可棄伏希聖念量授一官庶使亷吏忠臣聞之有以集作所激勸薦伊闕山平泉處士韋楚右件人隱居樂道獨行善身斂跡市朝息機名利况家承集作傳簮組兄在班行而楚獨栖山卧雲錬氣絶粒滋味不接於口塵埃不染于心二十餘年不改其樂志齊箕潁節類顔原縉紳之間多有稱歎臣為尹政理合集作合具薦論雖飛鴻入冥自忘飲啄而白駒在谷亦貴縶維儻䝉置彼周行縻之好爵降羔鴈之禮命助鴛路之羽儀足以厚貞退之風遏躁進之俗兹亦盛事有禆聖朝以前件謹具如前臣伏以念功振滯前王之令猷貢士推能長吏之本職其李晏韋楚等並居府界不踐公門臣實諳知輒敢論薦有涉塵黯無任兢惶謹具奏聞伏聽勑㫖代人舉周敬復自代狀杜牧前件官執德以進嚮道而行藹有令名備歷清貫掌綸言於西掖才稱發揮參密命於內庭衆推忠慎自珥貂近侍主籥集作鑰通用東門聲價益重於縉紳磨涅始彰其堅白伏以南省實天下根本兩丞為百司管轄苟非其選必致曠集作敗官今若以臣所任回授敬復庶能肅清臺閣提舉綱紀既曰陟明實不虛受伏乞天恩允臣所請代人舉蔣係自代狀伏凖某年月日勑內外文武常參官上後三日宜舉一人自代者伏以前件官仁義素彰文學早著揚歷臺閣宣昭令名嘗為諫官無所避忌及領藩鎮實惠疲羸頃者不附權臣例遷佐官今逢明代猶典小州伏以封還詔書駁正時事職業實重選擇宜精今若以臣此官回與蔣係既不虛受實曰集作為陟明伏乞聖慈允臣所請文苑英華卷六百三十八
