body:
  text: 文苑英華巻二百九十宋李昉等編行邁二薛稷一首李乂一首崔湜四首杜審言四首宋之問十九首張說九首蘇頲六首冦泚一首韋述一首還京陜西十里作薛稷驅車越陜郊北顧臨大河隔河望鄉邑秋風水増波西登咸陽途日暮憂思多傅巖既紆鬱首山亦嵯峨操築無昔老採薇有遺歌客遊節回換人生能幾何次蘇州李乂洛渚問吳潮吳門想洛橋夕煙楊栁岸春水木蘭橈城邑南樓近星辰北斗遙無因生羽翼輕舉託還飈景雲二年唐書作景龍二年余自門下平章事削階授江州員外司馬尋拜襄州刺史春日赴襄陽途中言志崔湜余夲燕趙人秉心愚且直羣籍備所見孤貞毎自飭狥禄期代耕受任亦量力幸逢休明時朝野兩薦推一朝趨金門十載奉瑤墀入掌遷固筆出參枚馬詞吏部既三踐中書亦五朞進無負鼎說退慙補衮詩常恐嬰悔吝不得少酬私嗷嗷路傍子訥疑謗紛無已上動明主疑下貽大臣恥毫髪顧無累氷壺貎疑自恃天道何期平幽寃終見明始佐廬陵疑郡尋牧襄陽城彤幃荷新寵朱黻䝉舊榮力薄慙任重恩深知命輕飭徒留前路行子悲且慕猶聞長樂鐘尚辨青門樹慈親不忍訣昆弟黙相顧去去勿重陳川長日云暮至桃林塞作前人去國未千里離家已再旬丹心恒戀闕白首更辭親懐璧常貽訓捐金詎得隣抱寃非忤物罹謗豈尤人不濫辭終辨無瑕理竟申黻還中省舊符與外臺新塞上同遷客江潭異逐臣淚垂非属峴腸斷固由秦歳月行遒盡山川難重陳始知亭伯去還是拙謀身襄陽作前人廟堂初解印郡邸忽腰章按節廵河右鳴騶入漢陽城臨南峴出樹繞北津長好學風猶扇誇才俗未忘江山距七澤煙雨接三湘蛟浦荷菱浄魚舟橘柚香醉中求習氏夢裏憶襄王宅壊仍思鳯碑存更憶羊下車慙政美閉閣幸時康多謝征南術于今尚不亡襄城即事前人子牟懐魏闕元凱滯襄城冠葢仍為里池臺尚識名山光晴後緑江色晩來清借問東流水何時到玉京旅寓安南杜審言交趾殊風候寒遲暖復催仲冬山菓熟正月野花開積雨生昏霧輕霜下震雷故鄉踰萬里客思倍從來度石門山前人石門千仭斷迸水落遥空道束懸巖半橋欹絶澗中仰攀人屢息直下騎纔通泥擁奔蛇徑雲霾伏獸叢星躔牛斗北地胍象牙東開塞隨行變高深觸望同江聲連驟雨日氣抱殘虹未改未明律先含白露風堅貞所不憚險澁諒難窮有異登臨賞徒為造化功巖半集作崖半所不憚所集作深經行嵐州前人北地春光晩邉城風氣寒徃來花不發新舊雪仍殘水作琴中聽山疑畫裏看自驚牽逺役難險促征鞍發湘江前人他日林亭非舊遊今春花鳥作邉愁自憐京國人南竄不似湘江水北流黄梅臨江驛見二百九十巻宋之問蚤發大庾嶺前人晨躋大庾險驛鞍馳復息霧露晝未開浩塗不可測嵥起華夷界信為造化力歇鞍問徒旅鄉關在西北出門怨别家登嶺恨辭國自惟朂忠孝斯罪懵所得皇明頗照洗廷議日紛惑兄弟逺淪居妻子成異域羽翮傷已毁童幼憐未識踟蹰戀北顧亭午晞霽色春暖隂梅花瘴回陽烏翼含沙縁澗聚吻草依林植適蠻悲疾首懐鞏淚霑臆感謝鴛鷺朝勤修魑魅職生還儻非逺誓擬酬恩德自洪府舟行直書其事前人仲春辭國門畏塗横萬里越淮乘楚嶂造江泛呉汜嚴程無休隟日夜渉風水昔聞垂堂言將誡千金子問余何竒剥遷竄極炎鄙揆已道徳餘幼聞虚白㫖貴身賤外物抗跡逺塵軌朝遊伊水湄夕卧箕山趾妙年拙自晦皎潔弄文史謬辱紫泥書揮翰青雲裏事徃毎増傷寵來常誓止銘骨懐林丘逆鱗讓金紫安位釁潜構退耕祸猶起栖巖實吾䇿觸藩誠内恥濟濟同時人台庭鳴劔履思以卑自衛兀坐去沉滓迨兹理已極竊位申知己羣議負宿心獲戾光華始黄金忽銷鑠素業悉淪毁浩歎誣平生何獨戀枌梓浦樹浮鬱鬱臯庭覆靡靡百越去魂斷九疑望心死未盡匡阜遊逺欣羅浮美周旋夲師訓佩服無心理異國多靈仙幽探忘年祀敝廬嵩山下空谷茂蘭芷悠悠南溟逺採掇長已矣自湘源至潭州衡山縣前人浮湘㳂迅湍逗浦疑逺盼漸見江勢濶行嗟水流慢赤岸雜雲霞緑竹縁溪澗向背羣山轉應接良景晏沓嶂連夜猿平沙覆陽鴈紛吾望闕客歸橈速已慣中道方泝洄遲念自兹撰頼忻衡陽美持以蠲憂患蚤發韶州前人炎徼行應盡回瞻鄉路遥珠崖天外郡銅柱海南標日夜晴明少冬春霧雨饒身經火山熱顔入瘴江銷觸影含沙怒逄人毒草摇露濃看莽濕風颺集作颶覺船飄直禦魑将魅寧論鴟與鴞虞翻思報國許靖願歸朝緑樹秦京道青雲洛水橋故園常在目魂去不須招發藤州前人朝夕苦遄征孤魂長自驚沉舟依雁泊投舘聽猿鳴石髪縁溪蔓林衣拂地輕雲峰刻不似苔壁畫難成露裛千花氣泉和萬籟聲攀幽紅處歇躋險緑中行戀結芝蘭砌悲纒松栢塋丹心江北死白髪嶺南生魑魅天邉國窮愁海外情勞歌意無限今日為誰明發端州初入西江前人問我將何去清晨泝越溪翠㣲懸宿雨丹壑飲晴霓樹影捎雲密藤輪覆水低潮回出浦駛洲轉望鄉迷人意長懐北車行日向西破顔看鵲喜拭淚聽猿啼骨肉初分愛親朋忽解携路遥魂欲斷身辱理能齊疇日三山意于兹萬緒暌金陵有仙舘即事尋丹梯初宿淮口前人孤舟汴河水去國情無已晩泊投楚鄉明月清淮裏汴河東瀉路窮兹洛陽西顧日増悲夜聞楚歌思欲斷集作欲絶況值集作況復淮南木落時晩泊湘江前人五嶺恓惶客三湘顦顇顔況復秋雨霽表裏見衡山路逐江南轉心依鴈北還唯餘望鄉淚更染竹成斑江南集作鵬南度大庾嶺前人度嶺方辭國停軺一望家魂隨南翥鳥淚盡北枝花山雨初含霽江雲欲變霞但令歸有日不敢恨長沙過蠻洞前人越嶺千重合蠻溪十里斜竹迷樵子徑萍匝釣人家林暗交楓葉園香覆橘花誰憐在荒外孤賞足雲霞下桂江縣黎壁前人放溜覿前溆連山紛上干江回雲壁轉天少霧峰攅吼沬跳急浪合流環峻灘欹離出漩劃繞繚避渦盤舟子怯桂水最云斯路難吾死抱忠信吟嘯自閒安旦别已千載夜愁勞萬端企予見外月委曲破林巒潭曠竹煙盡洲香橘露團豈傲夙所好對之與俱歡思君罷琴酌泣此夜漫漫始安秋日前人桂林風景異秋似洛陽春晩霽江天好分明愁殺人巻雲山􅟲􅟲碎石水磷磷世業事黄老妙年孤隠淪歸歟卧滄海何物貴吾身經梧州前人南國無霜霰連年見物華青林換暗葉紅蘂續開花春去聞山鳥秋來見海槎流芳雖可恱㑹自泣長沙蚤發始興江口至靈長村前人候曉踰閩障乗春望越臺宿雲鵬際落殘月蚌中開薜荔摇青氣桄榔翳碧苔桂香多露裛石響細泉回抱葉𤣥猿嘯銜花翡翠來南中雖可悦北思日悠哉鬒髪俄成素丹心已作灰何當首歸路行剪故園萊下桂江龍目灘二首前人停午出灘險輕舟容曵前峯攅入雲樹崖噴落江泉巨石潜山恠深篁隠洞仙鳥遊溪寂寂猿嘯嶺姢姢揮袂日凡㡬我行途已千暝投蒼梧郡愁枕白雲眠二傳聞峽山好旭日棹前沂雨色摇丹嶂泉聲聒翠㣲兩巖天作帶萬壑樹披衣秋橘迎霜序春藤礙日輝翳潭花似織縁嶺竹成圍寂歴還沙浦葱蘢轉石圻露餘江未熱風落瘴初晞猿飲排虚上禽驚略水飛榜童夷唱合樵女越吟歸良候斯為美邉愁自有違誰憐望鄉國流涕失芳菲入瀧州江前人孤舟泛盈盈江流日縱横夜雜蛟螭寝晨披瘴癘行潭蒸水沬起山熱火雲生猿躩時能嘯鳶飛莫敢鳴海窮南徼盡鄉逺北魂驚泣向文身國悲看鑿齒氓地偏多育蠱風惡好相鯨余夲巖栖客悠哉慕玉京厚恩常願答薄宦不祈成違隠乖求志披荒為近名鏡愁𤣥髪改心負紫芝榮運啓中興立時逢外域清秪應保忠信延促付神明望鄉絶句前篇題作漢江見二百六十二巻宋之問蜀道後期張説客心爭日月來徃預期程秋風不相待先至洛陽城以下九篇並見集本喜度嶺前人東漢興唐厯南河復禹謀寜知瘴癘地生入帝皇州雷雨蘇蟲蟄春陽放鷽鳩洄沿炎海畔登降閩山陬嶺路分中夏川源得上流見花便獨笑看草即忘憂自始居重譯天星已再周鄉關絶歸望親戚不相求棄杖枯還植窮鱗涸更浮道消黄鶴去運啓白駒留江妾晨炊黍津童夜櫂舟盛明良可遇莫後洛城遊至尉氏前人夕次阮公臺嘯歌臨爽塏高名安足頼故物今皆改吾兄昔兹邑遺愛稱良宰桑中雉未飛屋上烏猶在塗逢舊甿吏城有同寮宷望塵逺見迎拂館來欣待兹惠留千室友于存四海始知魯衛間優劣想懸倍過蜀道山我行春三月山中百花開披林入峭蒨攀磴陟崔嵬白雲半峯起清江出峽來誰知高深意緬邈心悠哉再使蜀道前人眇眇葭萌道蒼蒼褒斜谷煙壑爭晦深雲山共重復古來風塵子同眩望鄉目芸閣有儒生軺車倦馳逐青春客岷嶺白露摇江服歳月鎮覉孤山川俄反覆魚遊戀深水鳥遊戀喬木如何别親愛坐去文章國蟋蟀鳴户庭蠨蛸網琴筑下江南䕫州前人天明江霧歇洲浦棹歌來淥水逶迤去青山相向開城臨蜀帝祀雲接楚王臺舊知巫山上遊子共徘徊深渡驛見二百九十七巻襄陽路逢寒食前人去年寒食洞庭波今年寒食襄陽路不辭著處尋山水秪畏還家落春暮廵邉在河北作去年六月西河西今年六月北河北沙場磧路何為爾重義輕生知許國人生在世能㡬時壮年征戰髪如絲㑹待安邉報明主作頌封山也未遲興州山行蘇頲危途曉未分驅馬傍江濆滴滴泫花露㣲㣲出岫雲松梢半吐月蘿翳漸移曛旅客腸應斷吟猿更使聞曉發興州入陳平路前人旌節指巴岷年年行且廵暮來青嶂宿朝去緑江春魚貫梁縁馬猿奔樹息人邑祠猶是漢溪道即名陳舊史饒遷讁恒情厭苦辛寧知報恩者天子一忠臣行且巡行集作按曉發方騫驛前人傳置逺山蹊龍鍾蹴澗泥片隂長作雨㣲照已生霓鬢髪愁氛換心情險路迷方知向蜀老偏識子規啼經三泉路作前人三月松花作春行日漸賖竹妨山鳥路藤蔓野人家透石飛梁下尋雲絶磴斜此中誰與樂揮涕語年華曉濟膠川南入密界前人飲馬膠川上傍膠南趣密林遥鳥飛遲雲去晴山出落暉隠桑柘秋原被花實慘然遊子寒風露将蕭瑟夜發三泉即事前人暗發三泉山窮秋聽騷屑北林夜鳴雨南望曉成雪秪詠北風凉詎知南土熱沙溪忽沸渭石道乍明滅宛若銀磧横復如瑶臺結指程則所戀遇虞不遑歇重纊濡莫解懸旌凍猶揭下奔泥棧榰上覯雲梯設摶頰羸馬頓回眸惴人跌憧憧徃復還心注恩腴切冉冉年将病力困衰怠竭天彭信方隅地勢誠斗絶忝曵尚書履叨兼使臣節京坻有歳饒亭障無邉孽歸奏丹墀左騫能俟來悊度塗山㓂泚小年弄文墨不識戎旅難一朝事鞞鼓䇿馬度塗山塗山横地軸萬里留荒服悠悠征斾逺騑驂一何速流月揮金戈驚風折寒木行聞漢飛将還向臯蘭宿晩度伊水韋述悠悠渉伊水伊水清見石是時春向深兩岸草如積迢逓望洲嶼逶迤亘津陌新樹落踈紅遥原上新碧廻瞻洛陽逺遽有長江隔煙霧猶辨家風塵已為客登陟詩選作渉多異趣徃來見行役雲起蚤已昏鳥飛日将夕光隂逝不借超然慕疇昔逺遊亦何為歸來存竹帛文苑英華巻二百九十
