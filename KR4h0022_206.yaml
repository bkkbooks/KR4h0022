body:
  text: 文苑英華巻二百六宋李昉等編樂府十五飛來雙白鶴三首黄鶴一首烏生八九子一首烏夜啼六首烏啼曲二首烏棲曲篇六首晩棲烏一首雉子斑四首射雉詞一首朱鷺四首鬬雞篇五首鳴雞篇五首東飛百勞歌四首燕三首野田黄雀行四首滄海雀一首雀乳空城中一首空城雀四首飛來雙白鶴一作鵠莊子鵠鶴通用梁孝元帝紫盖學仙成能令吴市傾逐舞随踈節聞琴應别聲集田遥赴影隔霧近相鳴時從洛浦渡飛向遼東城同前吴邁逺可憐雙白鶴一作鵠雙雙絶塵氛連翩弄光景交頸想一作逰青雲逄羅復逄繳雌雄一旦分哀聲流海曲孤呌出江濆豈不慕前侣為爾不及羣歩歩一零淚千里猶待君樂哉新相知悲來生别離持此百年命共逐寸隂移譬如空山草零落心自知同前虞世南飛來雙白鶴奮翼逺凌煙俱棲集紫盖一舉背青田颺影過伊洛流聲入管絃鳴儔一作羣倒景外刷羽閬風前映海疑浮雪拂澗瀉飛泉燕雀寜知去蜉蝣不識還何言别儔侣從此間山川顧歩已相失徘徊反自憐危心猶警露哀響詎聞天無因振六翮輕舉復随仙黄鶴沈佺期黄鶴佐丹鳳不能群白鷴拂雲逰四海弄影到三山遥憶君軒上來下天地間明珠世不重知有報恩環烏生八九子劉孝威城上烏一年一作生子八九雛枝輕巢本狹風多葉早枯氄毛不自暖張翼强相呼金柝嚴兮翠樓肅蜃壁光兮椒泥馥虞機衡網不得施猜鷹鷙隼無由逐永願共棲曽氏冠同瑞周王屋莫啼城上寒猶賢野中宿羽成翮備各西東丁年賦命有窮通不見高飛帝輦側逺託日輪中尚逄王吉箭猶嬰后羿弓豈知變彩救燕質入夣祚昭公流聲表師退集幕示營空靈臺已鑄像流蘇時候風烏夜啼梁簡文帝緑草庭中望明月碧玉堂裏對金鋪鳴絃撥捩發初異挑琴欲吹衆曲殊不疑三足朝含影直言九子夜相呼羞言獨眠枕下淚託道單棲城上烏同前劉孝綽鵾絃且輟弄鶴操暫停揮别有啼烏曲東西各自飛倡人怨獨守蕩子殊未歸忽聞生離唱一作曲中一作長夜泣羅衣同前庾信促柱繁絃非子夜歌聲舞態異前溪御史府中何處宿洛陽城頭那得棲弹琴蜀郡卓家女織錦城頭劉一作秦川竇氏妻詎不自驚長渡洛一作淚落到處一作頭一作道啼烏何處一作恒夜啼同前桂樹懸知逺風竿詎肯低獨憐明月夜孤飛猶未棲虎賁誰見惜御史詎相携雖然一作誰言入絃管終是曲中啼烏棲曲李白姑蘇臺上烏棲時吴王宫裏醉西施吴歌楚舞歡未畢青山猶銜半邉日銀箭金壺漏水多起看秋月墮江波東方漸髙奈爾何同前劉商遶林啞啞驚復棲含烟碧樹高枝齊月明露濕枝亦滑城上女墻西月低愁人出户聴烏啼團團明月墮墻西月中有桂樹日中有伴侣何不上天去一聲啼到曙烏啼曲顧况玉房掣鎖聲翻葉銀箭添泉霜遶一作遶霜堞畢逋撥剌日一作月銜城八九雛飛其母驚此是天上老鵶鳴我聞一作人間老鵶無此聲摇風雜珮耿華燭夜聴羽人弹此曲東方曈曨赤日旭同前贈張評事楊巨源可憐楊葉復楊花雪凈烟深碧玉家烏棲不定枝條弱城頭夜半聲啞啞浮萍流一作摇又作棲蕩門前水任罥芙蓉莫墮沙烏棲曲四首梁簡文帝接翮同發燕孤飛獨向楚值雪已迷羣驚風復失侣二青牛丹轂七香車可憐今夜宿倡家倡家髙樹烏欲棲羅帷翠被向一作任君低三浮雲似帳月成一作如鈎那能夜夜南陌頭一作逰宜城醖酒今夜一作宜城投泊今行熟莫惜停鞍一作停鞍繫馬蹔棲宿四織成屏風金屈膝朱唇玉面燈前出相㸔意思望君憐誰能含羞不向前烏棲篇二首梁元帝幄中清酒瑪瑙鍾裾邉雜珮琥珀龍欲一作虚持寄心一作君心不惜共指三星今何夕二濃黛輕紅㸃花色還欲令人不相識金壺夜永誰一作此夜誰又作夜永詎能多一作過莫恃一作持奢用此一作比懸河晩棲烏梁元帝日暮連翩翼俱向上林棲風多前烏駛雲暗後羣迷路逺聲難徹飛斜行未齊應從故郷返幾過入蘭閨借問倡樓妾何如蕩子啼雉子斑吳均可憐雉子斑羣飛集野甸文章始陸離意氣已驚狷幽并逰俠子直心亦如箭生死一作以死又作死節報君恩誰能孤恩昐同前張正見陳倉雉未飛歛翮依芳甸朱冠色尚淺錦臆毛初變雊麥且専塲排花聊勇戰唯當度弱水不怯如臯箭同前毛處約春物始芳菲春雉正相追澗響連朝雊花光帯錦衣竄跡時移影驚媒或亂飛能使如臯路相追巧笑歸同前江總麥壟新秋來澤雉屢徘徊依花似叶妬拂草乍驚媒三春桃照李二月栁争梅暫往如臯路當令巧笑開射雉詞儲光羲曝暄理新翳迎春射鳴雉原田遥一色臯陸曠千里逺聞咿喔聲時見雙飛起羃䍥踈蒿下毰毸深麥裏顧敵乃忘生争雄方决死仁心貴勇義豈復能傷此超遥下故墟迢逓廻髙畤大夫昔何苦取笑歡妻子朱鷺王僧儒因風弄玉水映日上金堤猶持畏羅繳未得異鳬鷖聞君愛白雉兼同重碧雞未能聲似鳳聊變色如珪願識昆明路乗流飲復棲同前裴憲伯秋來懼寒勁嵗去畏氷堅羣飛向葭下奮羽欲南遷暫戲龍池側時往鳳樓前所歎恩光歇不得乆聮翩同前張正見金堤有朱鷺刷羽望滄瀛周詩振雅曲漢鼓發竒聲時將赤鴈並乍逐彩鸞行别有翻潮處異色不相驚同前蘇子卿玉山一朱鷺容與入王畿欲向天池飲還遶上林飛金堤曬羽翮丹水浴毛衣非貪葭下食懐恩自逺歸鬬雞梁簡文帝歡樂良無已東郊春可逰百花非一色新田多異流龍尾横津漢車箱赴戍樓玉冠初警敵芥羽忽猜儔十日驕既滿九勝勢恒遒脫使田饒見堪能說魯侯同前劉孝威丹雞翠羽張妬敵復一作得専場翅中含芥粉距外耀金芒氣踰上黨列名貴一作愧下韝良祭橋愁魏后食跖忌齊王願賜淮南藥一使雲間翔鬬雞東郊道禇玠春郊鬬雞侣捧敵兩逄迎妬一作詭羣排袖出帯勇向場驚錦毛侵距散芥羽雜塵生還同戰勝罷耿介寄前鳴看鬬雞王褒躞蹀始横行意氣欲相傾妬敵金芒起猜羣芥粉生入場疑挑戰逐退似追兵誰知函谷下人去獨開城寒食鬬雞杜淹寒食東郊上揚韝競出籠花冠初照日芥羽正生風顧敵知心勇先鳴覺氣雄長翹頻掃陣利距屢通中飛毛遍緑野灑血漬芳叢雖然百戰勝㑹自不論功雞鳴髙樹巔梁簡文帝碧玉好名倡夫壻侍中郎桃花全覆井金門半隠堂時欣一來下復比雙鴛鴦雞鳴天尚早東烏定未光晨雞髙樹鳴張正見晨雞振翮鳴迥出擅竒聲蜀郡随金馬天津應玉衡摧冠驗逺石集作古非繫火用江逌事出連營争棲斜掲暮觧翼横飛度試飲淮南藥翻上仙都樹枝低且候潮葉淺還承露枝低觸嚴霜葉淺向朝陽猜羣怯寳劔勇戰出花塲尚損黄金距誰論白玉璫長鳴逄晉帝恃氣遇周王流名說魯國分影入陳倉不復愁符朗猶能感孟嘗賦雞鳴篇岑徳潤鍾響應繁霜晨雞錦臆張簾逈猶侵露枝髙已映光排空下朝掲奮翼上花塲雨晦思君子關開脫孟嘗既得依雲外安用集陳倉雞鳴曲李廓星稀月沒入一作上五更膠膠角角雞初鳴征人牽馬出門立辭妻一作妾欲向長安一作安西行再鳴引頸簷頭下樓一作月中角聲催上馬纔分地色第三鳴旌斾紅塵已出城婦人上城亂招手夫壻不聞遥哭聲長恨雞鳴别時苦不遣雞棲近窓户同前陳陶雞聲春曉上林中一聲驚落蝦蟇宫二聲喚破枕邉夣三聲行人烟海紅平旦慵將百雛語蓬鬆錦繡當陽處媿君飲食長相呼為君晝鳴下髙樹東飛百勞歌梁武帝東飛百勞西飛燕黄姑織女時相見誰家兒女對門居開顔發艶照里閭南窓北牖挂明光羅帷綺帳脂粉香女兒年紀十五六窈窕無雙顔如玉三春已暮花從風空留可憐誰與同同前辛得源合歡芳樹連理枝荆王神女乍相随誰家妖艶蕩輕舟含嬌轉昐一作面騁風流犀枻蘭橈翠羽盖雲羅霧縠蓮花帶女兒年紀十六七玉面新粧映朝日落花從風俄度春空留可憐何處新此詩二百五巻重出今已削去注異同為一作同前張柬之青田白鶴丹山鳳婺女嫦娥兩相送誰家絶世綺帳前艶粉芳脂映寳鈿窈窕玉堂褰翠幕參差繡户懸珠箔絶世三五愛紅粧冶袖長裾蘭麝香春去花枝俄易改可歎年光不相待擬古東飛百勞西飛燕李嶠傳書青鳥迎簫鳳巫嶺荆臺數通夣誰家窈窕住園樓五馬千金照陌頭羅裙玉珮當軒出㸃翠施紅競春日佳人二八盛舞歌羞將百萬呈雙蛾庭前芳樹朝夕改空駐妍華欲誰待鷰鷰于飛江總二月春暉暉雙鷰理毛衣銜花弄靃靡拂葉隠芳菲或在堂間戲多從幕上飛若作仙人履應向日南歸雙燕離沈君攸雙燕雙飛雙情相思容色自故心心不衰雙入幕雙出闈一作帷秋風去春風歸幕上危雙燕離銜羽一别涕泗垂夜夜孤飛誰相知左廻右顧還相慕翩翩桂水不忍度懸目掛心思越路縈鬱摧折意一有終字不洩願作孤鸞鏡中絶一作鏡鸞相對絶同前李白雙燕復雙燕雙飛令人羡玉樓珠閣不獨棲金窓繡户長相見柏梁失火去因入吴王宫吴宫又焚蕩雛盡巢亦空顦顇一身在孀雌憶故雄雙飛難再得傷我寸心中野田黄雀行蕭轂弱軀慙彩飾輕毛非錦文不如一作知鴻鶴一作鵠志非是鳳凰羣作風随濯雨入曲應𤣥雲空城舊侣絶滄海故朋分寧死明珠弹且避鷹將軍同前李白逰莫逐炎洲翠棲莫近吴宫燕吴宫火起焚爾窠炎洲逐翠遭網羅蕭條兩翅蓬蒿下雖一作縱有鷹鸇奈爾一作若何同前儲光羲嘖嘖野田雀不知軀體㣲閒穿踈蒿下一作深蒿裏爭食復争飛窮老一犢一作頽舎棗多桑樹稀無棗亦何一作猶可食無桑何以衣蕭條穹蒼暮相引時來歸斜路豈不㨗渚田豈不肥水漲路且壊惻惻與心違野田雀一作野田黄雀行僧貫休髙樹風多吹爾巢落蒿深一作深蒿葉暖宜爾依泊莫近鶚類蛛網亦惡飲野田之清水食野田之黄粟深花中睡勃土一作𡋯土裏浴如此即全勝啄太倉之榖而穿人之屋滄海雀張率大雀與黄口來自滄海區清晨啄原粒日夕歸一作依野株雖憂鷙鳥擊長懐沸鼎虞况復随時起一作化翻飛不可拘寄言挾彈子莫賤隋侯珠雀乳空城一作井中劉孝威逺去條支國心知漢徳休一作優聊棲丞相府過令黄覇羞挾子須閒地空井共尋求轆轤絲綆絶桔橰金一作冬蘚稠將憐羽翼長誰辭各背逰空城雀李白嗷嗷空城雀身計何戚促本與鷦鷯羣不随鳳凰族提携四黄口飲乳未嘗足食君糠粃餘常恐烏鳶逐一作啄耻渉太行險羞營覆車粟天命有定端守分絶所欲同前劉駕饑啄空城土莫近太倉粟一粒不一作未充腸却入小人一作公子腹且弔城下一作上客豈曽空一作幾曽害爾族不聞莊辛語今日寒蕪緑同前陳陶古城濛濛花覆水昔日住人今住鬼野雀荒臺遺子孫千年飲啄枯桑根不随海燕栢梁去應無玉環銜報恩近村紅粟香壓枝嗷嗷黄口訴朝饑生來未見鳳凰語欲飛常怕蜘蛛絲斷腸四隅天四絶清泉緑蒿無恐疑同前羅隠雀入官倉中所食能損幾所慮往復頻官倉乃害爾魚網不在天鳥網不張水飲啄要自然何必空城裏文苑英華巻二百六
