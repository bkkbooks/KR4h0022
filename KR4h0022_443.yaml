body:
  text: 文苑英華巻四百四十三宋李昉等編冊文二皇太子冊文晉王為皇太子冊文王言㑹最維貞觀十七年嵗次甲辰四月某朔日於戯惟爾并州都督右武侯大将軍晋王治忠肅恭懿宣慈惠和仁孝發於自然信義備於成徳禎祥夙著睿哲日新永言少陽匕鬯是寄疇咨朝列卿士叶從是用命爾為皇太子往欽哉爾其思王道之艱難遵聖人之炯戒勤修六徳勉行三善無或舉非法度忘恭儉而好驕奢無或理乖彛倫逺忠良而近邪侫非履道無以揚名非任賢無以成徳爾身為善國家以安爾身為惡天下以殆睦九族而禮庻僚懐萬姓詔令作邦而憂遐裔兢兢業業無怠無荒克念爾祖宗以寜我社稷可不慎歟冊代王為皇太子文維永徽七年嵗次丁已正月景寅朔六日辛未於戲夫明兩載象道貫三才元良表徳業隆千古是以夏啟作貳光闡髙猷姬誦升儲發揮王道詳求典冊式瞻匕鬯固本垂統允推詔令作歸正緒惟爾代王𢎞猗蘭毓祉喬桂凝華岐嶷表於天姿符彩詔令作瑞彰於神授噐業英逺風鍳昭朗踐嘉義而總深仁捨幼志而標成徳爰資玉裕早振金聲朕䖍奉靈圖肅詔令作肅膺丕業仰惟七廟之隆詔令作重思髙詔令作隆萬葉之慶疇咨列辟欽若前修是用命爾為皇太子往欽哉爾其祗奉憲章率由軌度盡謙恭於齒胄審方俗於迎郊春禮冬詩趨庭靡懈三善六徳朂志無愆絶驕奢之心納忠良之訓播徽猷於外宇申敬奉於中闈允睦周親務殷堯族永隆四術式寕萬類無怠無荒固保我宗基可不慎歟冊平王為皇太子文維唐隆元年嵗次庚戌七月庚戌朔二十日己巳皇帝若曰天有丕命集寳位于朕躬所以奉若天道建兹元嗣其明聽朕言咨爾平王隆基㓜而聦允長而寛博有夙成之量焉夫禮以修外樂以修内者是務於文也春夏學干戈秋冬學羽籥者是兼於武也繫於百姓聞於天下者是由於仁也一日三朝甞藥視膳者是資於孝也爾有文武仁孝之徳以知君臣父子之道朕甚休之間者賊臣構逆窺窬神器則我有唐之祚危若綴旒爾義刑邦家忠衛社稷誅其兇惡以之康濟主匕鬯者非爾而誰是用命爾為皇太子古人有言曰爾身克正罔敢不正人心罔中惟爾之中昭昭臨下不可不畏慎簡乃僚允廸端士恭儉惟徳逺於憸人則萬邦以貞庻答揚我四聖之鴻烈敬之哉冊成王為皇太子文維乾元元年嵗次戊戌十月庚子朔五日甲辰皇帝若曰於戲自昔聖王咸建儲貳蓋将嗣守神器䖍奉宗禋是以禮經著元貞之徳易象載重明之義朕纉服鴻緒丕承前烈爰升主鬯之賢實符當璧之命咨爾太尉唐書作元帥成王俶按新舊唐書立成王俶為皇太子㑹要十月五日冊命改諱務作豫盖用新名道􅊀文武生資睿哲温文彰於日就孝友禀於天成往以兇醜亂華干戈集事是能出陪戎駕入奉廟謀克符丹水之師實剪綠林之盗所謂功定社稷義臨君親今萬邦以貞三善斯屬宜膺上嗣之典俾踐少陽之位是用命爾為皇太子以副朕躬爾其思王業之艱難遵聖人之烱戒非尊賢無以成徳非廣孝無以承親逺斥便佞詢謀正直兢兢業業庶保于大猷然後無忝爾祖宗克寜我邦家往欽哉丕膺景命可不慎歟冊廣陵王為皇太子文維貞元二十一年嵗次乙酉四月庚午朔五日甲申皇帝若曰建儲貳者必賢韓愈順宗實錄及詔令並作歸於冡詔令作上嗣固邦本者允屬於詔令作于元良咨爾元子廣陵王某㓜而實錄詔令作挺岐嶷長標恂淑佩詩禮之明訓禀實錄作宣忠孝之𢎞規居常保謙實錄作居惟保和動必循道識達刑政器􅍭實錄作合溫文愛敬奉於君親仁徳聞於兆實錄作士庶神祗龜筮罔不叶從是用命爾為皇太子於戱惟我烈祖之有天下也功格于上帝祚流于無窮光纉洪緒實録作業逮予十葉䖍恭寅畏日慎一日付爾以承祧之重勵爾以圭鬯之勤以貞萬國之心以揚三善之徳爾其尊師重傅親賢逺佞非禮勿踐詔令作履非義勿行對越天地之耿光丕承祖宗之休烈可不慎歟冊郢王為皇太子文内制維開元三年嵗次乙邜正月甲申朔四日丁亥皇帝若曰於戲書不云乎一人元良萬邦以貞易不云乎黄離元吉得中道也将以守監從撫主噐承祧執經陳東序之容端冕見南郊之禮本枝百代冝哉福祉詔令作祿咨爾郢王嗣謙忠肅恭懿元亨利貞遵在鎬之恵慈禀生譙之祥應學能知道孝乃因心書及春卿懸知詔令作推早秀言窮淑譽逺愧生知當試象之年備成人之敏九𤣥有詔令作賛命百姓與能正位少陽欽惟大典是用命爾為皇太子其在靖恭爾位聿修厥徳詩書禮樂敦悦為本父子君臣威儀罔􅑯寝門問豎必視寒暄望苑招賢用資端直使三靈合契四海係心延我累聖之業積爾重輝之慶必敬必戒無怠無荒往惟欽哉可不慎歟冊忠王為皇太子文内制維開元二十六年嵗次戊寅七月戊寅朔二日己巳皇帝若曰於戯受天命者皇王之業大為國本者儲副之位崇所以上承宗祧下固黎獻咨爾開府儀同三司單于大都護河東河北道行軍元帥朔方軍節度大使兼闗内支度營田鹽池押諸蕃部落等使上柱國忠王璵㓜而夙成長有宏量佩服仁義周旋禮樂忠孝極於君親友愛聞於兄弟正以率下謙以持盈識洞於微智周於物通刑政之大體備詔令作負文武之殊能果於積徳樂於為善凡此數美常試皆能然豈矜自知詔令作知予之明諒曰至公之義况復仰稽天道俯察人心立長則順天所助也議才則賢人之望也是用命爾為皇太子往欽哉爾其敬膺典冊無忘戒慎思創業之艱難詔令作多難知守器之為重作貞萬國允恊重明以揚烈祖之耿光永貽後嗣之成式可不慎歟冊遂王為皇太子文内制一作玉堂遺範維元和七年嵗次壬辰十月庚戌朔十七日壬寅皇帝若曰於戯建立儲嗣崇嚴國本所以承祧守器所以繼文統業欽若前訓時惟典常粤我祖宗克享天禄奄宅九有貽慶億齡肆予一人序承丕構纉武烈祖延鴻本枝受無疆惟休亦無疆惟恤負荷斯重祗勤若勵永懐詞訓當副君臨咨爾遂王恒體乾降靈襲聖生徳教深蘊瑟氣叶吹銅早集大成不屑㓜志溫文得於天縱孝友因於自然符彩昭融器業英逺爰膺錫社實寄維城懿河間之不羣慕東平之最樂自頃離明輟耀震位虚宫地徳可尊人神攸屬式稽令典載煥徽章是用冊爾為皇太子往欽哉有國而家有君而父義兼二極重繫萬邦何好非賢何惡非侫何行非道何敬非刑居上勿驕從諫勿咈懋昭乃徳惟懐永圖用陪貳朕躬以對越詔令作揚休命可不慎歟擬冊皇太子文劉禹錫維某年月日皇帝若曰於戲易云明兩作離大人以繼明照於四方盖所以毓其明徳繼于正體邦本由是固萬方由是寜粤祖宗之闡帝業亦莫不由此而繼于明徳肆予一人緒承大寳纂奉丕構懼有失墜以貽先帝之羞永懐主器以繼明用副予不徳咨爾元子王某襲列聖之姿體健行之質吹銅禀異辨日耀奇早習徳成克敬師保事業可大和順積中天縱溫文生知孝悌洎分錫土望出東平符彩昭彰禮樂文錯固可正位重震為天下之儲君人神叶從徳任相稱仰稽令典光載盛儀是用冊命爾為皇太子往欽哉夫富貴莫大於家天下忠孝莫大於敬君親俟爾一人貞于萬國必咨正事必近正人必杜逸游必樂善道求諫如不及惡侫如探湯懋爾厥修惟懐克和以貳于朕躬無忝祖宗之烈可不慎歟冊徳王為皇太子文薛廷珪維乾寧四年嵗次丁已二月癸卯朔十七日己未皇帝若曰粤夫立愛惟明建善惟長一作則固先王茂一作盛躅有國丕圖承祧仰鏡於前星守器式當乎長子遐瞻載籍𦕈覿洪荒雖歩驟殊一作随時質文異制逮于一作乎傳序罔不率循國家髙視百王同符三代平一區夏一作宇統和人神垂三百年歴十八葉暨朕寡昧祗荷景靈屬天歩艱難岱宗牢落蒸人未乂舊典爰曠庶尹卿士藩輔元僚思正儲闈式固鴻業咨爾長子徳王裕象叶増搆明啓少陽溫文在躬睦友成性博文强識無愧於老成學禮讀書庶資乎師訓廼斬群議爰資舊章是用命爾為皇太子嘻毓問承草重輝望苑永貞萬國明照四方入則有師出則有保無怠三善往崇四術務親正人誡近羣邪淑慎爾徳一作止峻防所攻勉植厥猷罔墜丕訓立秦王為太子詔王言㑹最詔曰儲貳之重式固宗祧一人元良以貞萬國天䇿上将太宗實錄有軍字太尉尚書令陜東道大行臺尚書令益州道行䑓尚書令雍州牧蒲州都督領十二衞大将軍中書令上柱國秦王某噐詔令作氣質冲逺風猷昭茂宏圖夙詔令作昔著美業日隆孝惟徳本周於百行仁為任重加於萬物王迹初基經營締構戡剪多難征討不庭嘉謀獨舉長筭必克敷政大邦宣風奥區功髙四履道邁二南任緫機衡庶績惟允職兼内外彛章載穆遐邇屬意朝野具瞻宜承鼎業允膺守噐可立為皇太子所司具禮以時冊命武徳九年立晉王為皇太子詔詔曰昔者哲王受圖上聖垂範建儲貳詔令作兩以奉宗廟緫監撫以寜邦國既義在於至公亦事兼于權道故以賢而立則王季興周以貴而升則文帝定漢詳諸方冊豈不然乎并州都督右武侯大将軍晉王治地居茂親才惟明哲至性仁孝淑質惠和夙著夣日之祥早流樂善之譽好禮無倦强學不怠今承華虚位率土繫心疇咨文武冝詔令作所欣戴古人云知子莫若父知臣莫若君朕謂此子實乆衆望可以則天作貳可以守噐承祧永固百世以貞萬國冝立某為皇太子可令所司􅊀禮冊命貞觀十一年四月立代王為皇太子詔詔曰􅥐雷揚祉承祧之道爰著重離闡耀守器之方斯存故能撫寜軍國守固詔令作永保邦家詳覧遥詔令作圖𬗟瞻遐冊繼業垂統咸率兹典代王𢎞地居嫡𦙍天縱英徽噐質冲華神鍳韶詔令作昭逺恭謙表志仁孝居心夙彰睿哲之風早通詩書或作禮之業朕以虚薄方啓無疆之祚永傳不朽之基取則前王思隆正緒冝升上嗣養徳東宫可以立為皇太子仍令所司擇日􅊀禮冊命永徽七年正月立平王為皇太子詔門下舜去四㐫而功格天地武有七徳而戡定黎元故知有大勲者一有必字受神明之副詔令作福仗髙義者一有必字為匕鬯之主朕恭臨寳位亭育表區以萬姓之心為心以兆人之命為命惟一作雖承繼之道咸以冡嫡居尊而無私之懐必推功業為首然後可保安社稷永奉宗祧第三子平王隆基孝而克忠義而能勇比以朕居藩邸䖍守國彛貴戚中人都無引接群邪害正凶黨寔繁利口巧言讒說罔極韋為温孫秀一作處朋黨競起晉卿楚客交權其間潜結回邪擠排端善潜貯兵甲将害朕躬隆基宻邇其期先難奮發挺身鞠旅衆應如歸呼吸之間凶渠殄㓕安七廟於幾墮濟羣生一作群臣極於将殞方舜之功過四比武之徳逾七靈祗望在昆弟樂推一人元良萬邦以定為君副者非此而誰可立為皇太子有司擇日備注冊命唐隆元年六月􅏤午一作皆舊唐書𤣥宗紀立忠王為皇太子制孫逖門下大寳曰位實在於詔令作呼丕承萬邦以貞由詔令作必建於明兩朕嗣守鴻業祗嚴永圖恭惟匕鬯之主豈捨人神之望開府儀同三司兼單于大都護河北河東道行軍元帥朔方軍節度大使兼闗内度支營田鹽池押諸藩部落等大使上柱國忠王璵天假聦明生知仁孝君親一致友弟三成温文之徳合於古訓敬愛之風聞於天下嘗亦視其所以察其所安考言有章詢事皆中知子者父允叶於元良以長則順且符於舊典宜膺擇嗣之舉俾受升儲之命可立為皇太子仍取來月内擇日冊命所司准式主者施行開元二十六年六月三日立陳王為皇太子制王言㑹最門下古先哲王之有天下也何嘗不正國本而承天序建儲兩唐書作貳而主重器朕以寡昧祗荷丕圖䖍恭寅畏思固鴻業慎擇令懿曠于旬時而卿士獻謀龜筮告吉以為少陽虚位願舉盛儀列聖垂休俾合予志詔令作俾予合志選賢而立式表無私敬宗皇帝第六男陳王成美天假忠孝日新道徳溫文合雅謙敬和裕唐書作保祐蘊端明之體度尚詩書之辭訓言皆中禮行不違仁是可詔令無可字以順唐書作宜考舊章欽若成命授之匕鬯以奉粢盛冝回朱邸之榮俾踐青宫之重可立為皇太子仍唐書作宜令所司擇日備禮冊命開元四年十月十四日立景王為太子制門下朕聞王者敬承廟祧欽若天命必建元子用寜邦家所以光叶繼明嚴當主鬯朕纉承聖緒寅奉丕圖惟懐國本之安爰在皇儲之重青宫久曠望苑未開則何以式表元良昭宣鴻業稽於往冊用舉彛章長男景王湛孝愛恭和忠敬誠懿慈恵特禀寛仁夙彰言通典謨動合儀矩睦友宗屬遵承傅導克修令聞日茂嘉猷宜踐儲闈以承休命朕以君尊父嚴每推乾道聞詩學禮用首人倫嘉翼翼於誠心都詔令作覩蒸蒸於孝敬古稱知子無議前修禆奉粢盛式昭元嗣冝立為皇太子宜令有司擇日􅊀禮冊命主者施行長慶二年十二月七日立鄧王為皇太子制門下朕聞君天下者序承綂業何嘗不樹建儲貳固安詔令作安固邦家况長子有主噐之義元良真立國之本上以嚴宗社之奉下以順恒久之宜歴考前載率由斯道鄧王寜性與忠敬生知孝友秉寛明之度體寛明之心學師訓謨詞尚經雅動皆中禮慮不違仁稽以舊章允膺上嗣朕獲纉丕緒夙夜恭䖍常懼神明未歆政理多闕曠兹茂典亟渉嵗時今屬方内甫寜品物咸遂監皇王之制詢卿士之謀時瞻大猷莫此為重是用授之匕鬯位以青宫欽惟永圖俾服休命冝冊為皇太子仍令有司擇日備禮冊命主者施行元和四年四月立鄂王為皇太子制内制門下樹之后王所以輯寜黎獻承之副兩一作儲副所以安固宗祧故能崇四術之科為萬國之本長幼君臣之叙齒胄知歸溫文恭敬之風生人攸仰一作郡佳攸居古之制也其在兹乎鄂王嗣謙聦睿夙成端莊特秀三雍禮樂必也生知五官詞藻居然暗合體道為噐非假於學問資靈授徳自符於神解樂華禮葉地義天經立人之道既彰為子之誠亦一作益著今昇平在運中外咸寜将有事於元良固不踰於樂一作三善冝光近日之敏俾則前星之耀冝以來年正月四日備禮冊為皇太子所司准式開元二年十二月十七日一作皆唐大詔令冊皇太子制内制黄門朕聞王者神噐天之大業震百里而崇孟侯照四方而建元子其所由來尚矣我國家參天貳地濟以豐功祖武宗文承於宻命顧循菲徳寅畏鴻名太上皇命朕以位卿大夫補朕之闕僉謂率先自爾稽古惟新國本之大不可以不務皇儲之重不可以不立故宵衣當宁聞義是将朝服升階一作臨軒擇賢而舉皇太子嗣謙生知禮樂性成仁孝字孫之愛則敬不絶馳問䜿之安則恭而至寝觀其言精視牘思敏題鞭固以覈東序之討論契南山之調護今少陽踐位獻嵗發春草樹自樂乾坤交㤗副君之榜已别其宫太史之書更藏於府帝圖斯永人望所歸庻符知子之明豈獨在予之慶用施寛恵光于政理今望苑初開端僚是切天下有髙才懋徳碩學純儒比迹春卿齊名夏綺具以徴辟立遂王為皇太子制玉堂遺範門下承廟祧之尊固邦國之本重其緒業貞以元良斯今古之通制也乃者春宫曠位已渉嵗時一有将恐二字祼獻闕主鬯之儀膠庠虚齒學之道其何以億寜方夏章詔令作彰示教源稽諸往冊用舉彛典遂王宥孝敬忠肅寛明惠和遵保傅之言佩經訓之㫖友于兄弟睦于宗親博愛而恕已以誠慎行而飭躬以禮載觀所履克茂厥猷又克慎厥謀冝升儲闈以對休命朕祗若成憲惟懐永圖法三王垂統之規紹十聖重光之烈致嚴禋配俾奉粢盛式昭上嗣之崇庶協明離之吉冝冊為皇太子改名恒仍令有司擇日備禮冊命主者施行元和七年十月文苑英華巻四百四十三
