body:
  text: 文苑英華卷六百二十八宋李昉等編謝恩一為李卿謝三品狀一首代鄭相公謝賜戟狀一首謝官告狀二首謝賜告身等狀四首為侍郎汝南公華州謝加階狀一首謝譴讓狀一首謝口勑放三司推問狀一首為濮陽公謝罰俸狀一首為李卿謝三品狀一首苑咸伏奉今月恩制特換一作授臣三品恩出非常罔知所措臣以薄劣久忝班榮幸以地籍宗枝遂得位參卿寺常憂踰分參於正名豈臣灰粉所能答效自殊私俯及宿疾頓除既承七命之貴更荷再生之澤才輕遇重以榮以憂又先承聖恩賜臣藥酒自蒙救療日覺痊平但以微虛未堪趨伏拜恩閭巷喜懼難勝馳心闕庭戰荷交集無任惶悚之至代鄭相公謝賜戟狀吕溫門戟十二竿右今日中使某乙至臣私第奉宣聖旨賜臣前件戟者臣伏以國朝之制名器尤慎吏考三十始秩銀青戰勳十二乃號柱國必資具美方賜集作錫殊榮於是有命服以朝加戟于戶將勸勞而責實亦馭貴而崇名上無謬恩下不虛受臣迹非竒致擢自諸生先皇以亷謹賜知密勿踰於一紀陛下以勤憂過聽委遇首於郡僚叨據樞衡亟移星歲雷霆用武曽無犬馬之勞日月垂文豈有螢燭之助徒以侍祠清廟拜舞集作壽鴻名屢逢慶賚集作賴驟假勳秩禮異其數物盛其容新其閈閎賜之棨戟衡門燕雀乍相賀於朱楹武庫龍蛇忽追飛於陋巷焜耀當代寵靈自天聚族知慙殺身匪報無任荷懼屏營之至謹奉狀陳謝以聞此篇五百八十三卷表門重出今已削去謝官告狀白居易新授將仕郎左拾遺翰林學士臣白居易新授朝議郎守尚書庫部員外郎翰林學士雲騎尉臣崔羣右臣等伏奉恩制除前件官今日守謙奉宣進止特加慰諭并賜告身者聖慈曲被寵命猥加俯以拜恩跪而受賜舞蹈離次驚惶失圖伏以郎吏諫官古今所重位當辰集作星象職在針規皆須聞集作問望清方行實端慤然後可以佐彌綸於草奏集作昧能正其詞盡獻納於芻言必直其節茍輕所選實忝厥官臣等學識庸虛才質愚懦自居近職忝冒已深况超擢榮班慙惶交至初授殊常之寵聞實若驚再思難報之恩感而欲泣唯當奮勵駑鈍補拾闕遺中誓赤誠上酬玄造俯伏愧畏集作憂愧若無所容無任感恩兢惕之至謹奉狀陳謝以聞同前新授京兆府戶曹參軍翰林學士臣白居易右伏奉恩制除臣前件官今日守謙奉宣聖旨特加慰諭兼賜告身者俯僂集作傴拜恩怵惕受命戰越局踳驚惶失容蹈舞屏營不知所據臣叨居近職已涉四年自顧庸昧無裨明聖塵忝歲久憂慙日深况於官祿之間豈敢有所選擇但以位卑俸薄家貧親老養闕甘馨之費病乏藥石之資人子之心有所不足昨蒙聖念雖許陳情敢望天慈集作恩遽從所欲况前件官位望雖小俸料則集作稍優臣今得之勝登貴位此皆皇集作聖明俯察玄造曲成念臣為子之心集作誠賜臣及親之祿臣所以撫心知愧因事吐誠烏鳥私情得盡歡於展養犬馬微力誓效死以酬恩榮幸不止於一身感戴實深於萬品無任荷恩抃躍之至謝恩賜告身衣服并借馬狀元稹右泰倫重晏至奉宣恩旨授臣前件官告身衣服匹帛及借馬者忽降天書乍乘雲驥頒衣煥目賁帛盈庭皆非朽陋之才宜受光揚之賜微臣無任抃躍慙惶之至况臣素守集作性本踈愚且集作素無朋黨去年陛下擢於集作自郎吏命掌書詞非因宰相奏論特是聖慈超授感恩深切頻獻封章遂遭分外侵誣不敢保全軀命豈謂恩光轉至睿澤逾深出自宸衷選居近地不試便令入院當日召見天顔口勑授官靣賜章服授令承旨不顧班資近日寵榮無臣比例發言感泣指日誓心茍無死節之誠願受鬼誅之禍伏奉恩旨令臣明日本司赴上舊例便合中謝伏緣先有疏論邉事及幽州事宜兼緣李願入朝並要靣自論奏伏料二十日入假已後南衙機務稍間特乞天恩許臣中謝謹録奏聞伏聽進止集作勑旨為蕭相謝告身狀右中使某乙至奉宣進止賜臣某官告身一通者鳳䘖真誥虬捧天書錦帙金箋霞明一作光日照臣聞髙宗命説乃申納誨之詞大舜相龍爰有堲讒之訓空書簡册未煥縑緗豈集作如臣寵榮而集作豈足為喻慙惶增懼進退難安拜受恩光戰汗交集無任感戴殊私之至又謝官狀此篇移入五百七十四卷表門姑存其目代裴相公謝告身鞍馬狀杜牧右中使某至奉宣聖旨賜臣告身一通馬一匹并鞍轡臣生逢盛代竊位巖廊奉告令之詔書丹霄之雨露猶濕賜集作錫代勞之駿馬內棧之風雲尚隨寶軸煥絲綸之言逸足騁拳竒之態螢光爝火何禆日月之明弱質孤根但荷乾坤之德殺身寧報撫已知慙無任感恩抃躍懇悃之至為侍郎汝南公華州謝加階狀李商隱右臣伏奉今月某日制書加賜臣階朝散大夫者榮從日下恩自天中臣聞周室設官實重大夫之號漢臣異禮則加朝散集作請之名若臣者辨乏談天文非擲地貪叨華顯綿歷光隂當陛下御極之初分陛下憂人之寄金章紫綬已塵求瘼之榮崇級清階更竊升高之望循揣斯久怔忪莫寧唯當勤奉詔條所希粗贖官謗誠深感勵情切違離犬戀主而空深蛟負山而何力無任感恩望闕結戀屏營之至謝譴讓狀李嶠臣特蒙天慈擢在樞近恩私屢及寵命頻加粉骨糜軀雖久誓於心府纎埃滴水竟無補於川嶽是用晨宵載惕啓處增慙素自庸愚加以疾疹心緒遺忘耳目昏沉實恐虛曠天工傾敗鼎餗伏思大臣引咎之義輒露微軀陳力之請豈敢避鞅掌之職就優遊之間臣每思古人竊仰遺事充國則卧而陳策子囊則死不忘忠臣自念妨賢甘從屏退敬竭芻蕘之議庶禆日月之明所以因欲辭違昧冒陳上智愚庸短自速愆尤伏奉綸言俯垂怪責心膽飛越五情無厝局天踳地伏待刑科死罪死罪無任戰懼之至謹詣明福門奉狀陳謝以聞奉謝口勑放三司推問狀杜甫右臣甫智識淺昧向所論事涉近激訐違忤集作忤聖旨即下有司具已舉劾甘從自棄就戮為幸今日巳時中書侍郎平章事張鎬奉宣口勑宜放推問知臣愚蠢集作戅捨臣萬死曲成恩造再賜骸骨臣甫誠頑誠蔽死罪死罪臣比集作以陷身賊庭憤惋成疾實從間道獲靣集作謁龍顔猾逆未除愁痛難過猥厠衮職願少禆補竊見房琯以宰相子少自樹立晚為醇儒有大臣體時論許琯必位至公輔康濟元元陛下果委以樞密衆望甚允觀琯之伏集作深念主憂義形於色况畫一保大其素所蓄積者已而琯性失於簡酷嗜鼓琴董庭蘭今之琴工遊琯門下有日貧病之老依倚為非琯之愛惜人情一至集有於字玷汚臣不自度量歎其功名未垂而志氣銼衄覬望陛下棄細録大所以冒死稱述何思慮未集作始竟闕於再三陛下貸以仁慈憐其懇到不書狷狷之罪集作過復解網羅之急是古之深容直臣勸勉來者之意天下幸甚天下幸甚豈小臣獨蒙全軀就列待罪而已無任先懼後喜之至謹詣閣門進狀奉謝以聞謹進為濮陽公謝罰俸狀李商隱右臣伏凖御史臺牒奉恩旨以臣不先覺察妖賊賀蘭進興等宜罰兩月俸料者伏以霧市微妖潢池小寇有乖先覺上黷宸聰昔漢以捕集作逋盜不嚴猶加黜削晉以發姦無狀亦峻科條豈若皇帝陛下恩極好生德集作仁唯宥過與其漏網止以罰金臣與僚屬等無任戴恩宥罪屏營之至文苑英華卷六百二十八
