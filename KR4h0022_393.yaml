body:
  text: 文苑英華卷三百九十三宋李昉等編憲臺一御史大夫授尹思貞御史大夫制蘇頲門下國之副相位亞中台自非舊唐書作匪邦直孰司天憲銀青光祿大夫將作大匠隋煬帝改匠為監唐初復舊天寶中再為監今尹思貞除命在開元初英華作大匠是矣或以為監非天水郡開國公尹思貞賢良方正碩儒耆德剛不護缺清而畏知簡言易從莊色難犯徴先王之體要敷衽必陳折佞臣之怙權拂衣而謝故以事聞海內名動京師鷹隼是擊豺狼自逺必能條理前弊發揮舊章宜承弄印之榮式允登車之志可御史大夫封勳如故主者施行授宋璟御史大夫制黃門三台副職百寮之師紀綱是任蒞事惟能國子祭酒上柱國廣平郡開國公東都留守宋璟含純粹之德秉清剛之氣學研精以辦政文體要以經逺吉人之寡敷言有訓君子之愼擇行無違正色而自具陽秋立誠而不僣風雨必能靜專動直獻忠納規常聞沃心之任靡憚犯顔之情使其坐以鎮俗毅一作嶷然當朝則不能者退不仁者逺王臣蹇蹇懦夫有立俾光天憲式副人瞻可御史大夫勳封如故主者施行授李傑御史大夫制黃門副相之重羣寮取則爰理其綱錫之以印河南府尹上柱國武威縣開國子李傑直清浩素剛斷精密學究文儒才優經濟物寧滯用若遇盤根人或䝉求似開明鏡心公而惡去聲一本作正惡道正以間邪河南擅聲天下稱最必檢齊霜憲𢎞長風猷俾其立朝用爾敦俗可御史大夫勳封如故仍驛赴京主者施行授敬括御史大夫制常衮門下天子綱紀屬於風憲所以彈肅公卿課第牧守姦詐不息法令將廢豈奉憲者道未明歟眷求忠賢舉我事典金紫光祿大夫行同州刺史兼御史中丞充本州團練使守捉使上柱國平陽縣開國子敬括河汾大儒博達今古清心素行高簡自居粲然文章如振金石職更要重處以公亮不恃祿以私身每依經以制事頃以馮翊近輔化參京師凋殘之餘勞徠所屬自廷尉之列分內一作外史之餘清靜而鎮流庸悉歸閭閻小康理行第一休有聲績副兹厚一作委遇肆豫命爾亞秩台司無以時或多虞法有所貸必訪故實以澄源流直道而行不仁者逺愼乃名位為時行之一作而時揚之可行御史大夫散官勳封如故主者施行加劉栖楚御史大夫制李虞仲敕都輦之下居百郡之首尹正之重俾四方承流苟或枹鼓不驚豪右自息所宜增秩以稱任能朝議郎守京兆尹上柱國賜紫金魚袋劉栖楚長才挺生利用能斷徇公忘已奉上絶私居多急病之心動著必聞之美黃旐之姦不發赭裙之盜靡聞載勤檢馭之方頗精風化之本繫爾才術副豫簡求朕所以惜其聲獻難議遷擢尚留劇任更俟當官就加青綬之秩重委黃圖之理冝崇望實無替威名可以本官兼御史大夫餘如故御史中丞授崔沔御史中丞制蘇頲勑朝請郎守尚書虞部郎中崔沔純至之心求忠出孝精微之用博學多文故能清以激貪靜而鎮躁頃攝官持憲履繩緒墨臨事不詘在公則聞宜正三獨之名以光二丞之秩可守御史中丞知東都留臺司一作事散官如故授李懷讓御史中丞制黃門二彼副相一其三獨不任宏才孰膺高選朝議大夫守給事中上柱國李懷讓直方孤聳清迥特立秪服文儒克修典禮持疏網而不漏常嫉惡以闢邪泛虛舟於自然不近名而過實必能克去煩苛之小節知憲章之大體允符羣議光踐中司可守御史中丞散官勳如故授崔器御史中丞制賈至門下權判文部郎中崔器間邪存誠公而不黨有欒枝貞慎抱史鰌正直歷踐清列名與實偕今豺狼未寧中外多故羣才雜用則哲惟將肅其準繩舉其憲則俾不仁者逺邪佞以悛爾其留心冝專糾正一作逖可守御史中丞餘如故授王敬從御史中丞制孫逖門下肅我具寮謂之秉憲二于次相必也任賢中書舍人上柱國王敬從雅量深逺周才博達修德行于身謀致文詞於國用自居近密頗歷歲時忠公盡於掌綸淑愼形於一作閟於削藁必能執其繩準正彼簡書冝拜三獨之雄且膺八使之選可中散大夫御史中丞仍充京畿採訪處置等使勳如故授蕭諒御史中丞制門下副相之亞朝綱允屬缺官之舉時選攸難鴻臚少卿蕭諒直道有恆澄一作公心不撓果斷之用操利器於筆端通明之識置煩文於度外所歷清要必聞聲實將求獨坐更佇兼才斯正色於準繩俾生風於臺閣可御史中丞充京畿採訪處置等使授蕭隱之御史中丞制門下列彼三獨警于百寮選衆為難舉能斯在中大夫檢校太府少卿東都知糴等使護軍蕭隱之敏行深識貞標雅器性與公清寧欺於暗室才優决斷豈避於盤根自任以長府委之平糴備聞堅正深叶和均將寄朝綱允副人望宜贊二於南憲俾肅清於東都一作路可行御史中丞仍充東京畿採訪處置使兼充和市和糴使散官勳如故授張獻恭御史中丞制常衮敕開府儀同三司行梁州刺史兼御史中丞山南西道節度觀察處置度支營田等使上柱國南陽郡開國公張獻恭正以居業直以輔仁行三復而無玷剛百汰一作鍊而不缺階歷要重發揮刑政分總戎詰禁之柄處導俗宣風之長講求典禮以訓三軍精辦文法以檢羣吏贍助孤老懷和逺夷峴南之輕裘緩帶蜀郡之得賢樂職交修文武儔諸古人而貞方侃然清峻自處端本靜性一作末未嘗及私固可以準繩朝廷課第郡國入正二丞之列俾分三獨之事可行御史中丞散官勳封如故授盧絢裴寬御史中丞制張九齡敕朝議大夫中書舍人內供奉上柱國盧絢朝散大夫檢校尚書左司郎中兼侍御史內供奉知臺事護軍裴寬等動有風規成禮樂之度行為操準是衣冠之則頃登臺閣載光天地可以軌儀三獨端肅百寮繩糾一作凖所歸澄清斯在冝展舉能之效俾申執憲之誠可檢校御史中丞散官勳如故授薛存誠御史中丞制白居易勑庶官之政得人則舉况中執憲準繩之司所以提振紀綱端肅內外蓋一職修者其斯任之謂歟給事中薛存誠選自郎署列于左曹居心靜專言皆讜正章疏駁議多所忠益可以執憲立於朝端况副相方缺臺綱是領糾正百官集作司又作度爾得專之夫直而不絞威而不猛不附上而集作以急下不犯弱而集作以違彊率是而行號為稱職敬服斯命往其懋哉可御史中丞餘如故授柳公綽御史中丞制勑中憲之設糾謬懲違一引其綱百舉其職非清與直不稱厥官諫議大夫柳公綽忠實有恆文以詞學介然端直有古之遺風頃居臺憲纍次郎位持平守正人頗稱之擢首諫司器望益重今副相虗集作缺位中司專席惟有守者可以執憲惟無私者可以間邪詢事審官爾當是選光昭新命振起舊章冝一乃心以揚其職可御史中丞散官勳如故授韋有翼御史中丞制杜牧勑昔貞觀開元之為理也逺隱必見情僞必知天下如一家兆庶如一人無他道也綱目皆振法令必行祖宗在天方册在地人存政舉行之非難集作艱故用正臣委之邦憲朝請大夫守尚書刑部侍郎上柱國賜紫金魚袋韋有翼戴仁而行抱義以處墻仭中集作裏峻壇宇外寬介特守君子之彊文學盡儒者之業周歷華貫擢為諍臣攻豫甚專言事頗切願試左輔移理陜郊馮翊之恐失倪寬頴川之喜得黃霸壺漿迎路繈屬攀車徴為公卿愈見風采恤刑愼罰守法當官巍然立朝為時準直今者跡其率履委之糾繩爾其念惠文彈理之言思立秋受集作授署之㫖三尺律令四海紀綱所宜公共無鄉集作即上意古人有言曰凡為武鼠計於用捨今之倚任佇觀爾能唯君知臣無纍所舉可御史中丞散官勳如故授前兵部侍郎薛昭緯御史中丞制錢珝勑國爵之設公器也君將揭而與之者必問於朝皆曰可與則徇公况御史中丞持天下所共之法等乎庶尹重有加焉乃詔名卿來承俊選具官薛昭緯吾閲元和遺事嘉爾祖執憲之能軌躅可尋風聲自在美延後嗣克奉貽謀爾又歷落開懷精明照物好讓不惑寡過自彊出典誥而理勝辭豐第甲乙而以文兼行且屬多梗使于列藩與諸侯言繫安危事自肺腸而到社稷激意氣而誘公忠選無虛褒一作還無重裝言有清論皆入吾耳盡知乃心宜正衣冠立為繩準將分厥職惟聽兹言夫太剛太柔不折則廢作之可久必在居中爾當率寮屬以講求振綱條而審固與其就名而生事未若審實以業官勉思勤行無害有益可依前件授中書舍人獨孤損御史中丞制薛廷圭勑漢制御史中丞入朝得與尚書令專席而坐示威重於百辟也前代之盛風猷具存國朝用人職業尤重非材優望峻者不中兹選丞相言爾中書舍人獨孤損儒林挺秀卿族騰芳文擅菁英學窮壼奧演之為事業暢之為人文立我明庭號為端士逮於寡昧歷事三朝勞爾班行向踰二紀回翔兩掖尹正神京直聲載揚休問逾暢自掌我誥命垂為典謨煥一作炳然一家之書擬于三代之際器業事望由兹而益隆藴勵琢磨所向而可仗朕言念理本係于臺綱詢謀股肱謂爾宜稱今以爾為御史中丞其為我峻爾風望正言隳頺無憚觸邪勉思舉職佇觀爾志以稱我心授吏部侍郎徐彥若御史中丞制李磎勑御史中丞以獨坐為稱豈特崇貴之而已昔韋仁約是其官僚耳猶以鵰鶚自許不肯押公卿激揚清風振駭良吏况長其屬者可忽慢哉兵戈以來紀綱廢壞永惟提舉未易其人執政上言云具官徐彥若嘗司憲臺甚著聲績而自轉遷稱速憤鬱猶多使之復為必或愈於前日且其祖在天后朝為大理有正直詳評之聲于公積慶因成相門而彥若克嗣其家端莊自立踐歷華貫聲聞藹然俾持準繩無以易者是用輟天官之二再尊任之爾其砥礪厥心無忝所舉可依前件文苑英華卷三百九十三
