body:
  text: 文苑英華巻二百二十一宋李昉等編釋門三五十九首戴叔倫三首權徳輿四首朱放一首于鵠三首戎昱一首鄭常一首崔子向一首劉商一首李渉一首王建一首楊巨源四首楊衡二首韓愈一首陳羽三首劉禹錫十五首孟郊二首白居易十五首送少㣲上人入蜀戴叔倫十方俱是夢集作知不繫一念偶尋山望刹經巴寺持瓶向蜀關亂猿心本定流水性長閒世俗多離别集作恨王城幾日還送道䖍上人逰方前人律儀通外學詩思入禪集作𤣥關煙景隨縁到風姿集作標與道閒貫花留静室呪水度空山誰識浮雲意悠悠天地間送嵩律師頭陁寺前人相傳五部學更有一人成此日靈山去集作此夕分身去何方半座迎麻衣逢雪煖草履集作屣躡雲輕若見中林石應知第四生湖上晩望集作眺呈惠上人權徳輿湖上煙景好鳥飛雲自還幸因居止近日覺性情閒獨酌乍臨水清機常見山此時何所憶法集作净侣話𤣥關送映師歸本寺見集本前人還歸栁寺去逺逺出人群苔甃桐花落山忩桂樹薫引泉通絶澗放鶴入孤雲幸許宗雷到清談不易聞送文暢上人東㳺見集本前人桑門許辯才外學接宗雷䕶法麻衣净翻經貝葉開宗通知不染望想自堪哀載一作或結西方社師逰早晩廻酬靈徹上人以詩代書見寄時在薦福寺坐夏前人蓮花出水地無塵中有南宗了義人已取貝多翻半字還將陽燄喻三身碧雲飛處詞集作詩偏麗白月圓時性本真更喜開緘銷熱惱西方社裏舊相親靈集作雲門寺贈靈一上人朱放所思勞旦集作日夕惆悵去湘東禪客知何在春山㡬處同獨行殘雪裏相見暮雲中請住東林寺彌年事逺公題蘭若僧于鵠一身禪誦苦灑掃古花宫静屋門常閉深蘿月不通懸燈喬木上鳴磬亂幡中附入髙僧傳長稱二逺公樹下禪僧前人乆行多不定樹下是禪房寂寂身無住年年日自長蟲蛇同在澗草木共經霜已見南人説天台有上方題北䑓僧一作寺前人上方唯一室禪坐對金容行道臨孤壁持齋聽逺鐘枯藤離舊樹朽石落危集作髙峯不向雲間一作中見唯集作還應夢裏逄此詩二百二十六巻重出今已削去注異同為一作送亮法師戎昱逹士心無滯他鄉總是家問經翻貝葉論法指蓮花欲契真空義先開智慧牙不知飛錫後何處是恒沙送頭陀赴廬山寺鄭常僧家無住着早晩出東林得道無真相頭陀是苦心持齋山果熟倚錫野雲深溪寺誰相待香花與梵音送惟祥律師自越歸義興崔子向陽羡諸峯頂何曽異剡山雨晴秋到寺木落夜開關縫衲紗燈亮㸔心錫杖閒西方知社散未得與師還送清上人往湖南劉商閒出東林日影斜稻苗深淺映袈裟船到南湖風浪静可憐秋水照蓮花清溪山居送僧李涉失意因休便買山白雲深處寄柴關若逄城邑人相問報道花時也不閒寄舊山僧王建因依老宿發心初半學脩心半讀書雪夜每常同屋集作席卧花時未省兩山居獵人箭底求傷鴈釣户竿頭救活魚一向風塵取煩惱不知衰病日難除和權相公南園閒渉寄廣宣上人楊巨源浩氣抱天和閒園載酒過歩因秋景曠心向晩雲多翠玉思廻鳯𤣥珠肯在鵝問一作湯師登幾地空性柰詩何供奉定法師歸安南前人故鄉南越外萬里白雲峯經論辭天去香花入海逄鷺濤清梵徹蜃閣化城重心到長安陌交州後夜鐘送定師歸蜀法師即詩僧廣宣兄弟前人鳯城初日照紅樓禁寺公卿識惠休詩引棣花霑一雨經分貝葉向雙流孤猿學定前山夕逺鴈傷離幾地秋空性碧雲無處所約公曽許剡溪逰送澹公歸嵩山龍潭寺塟本師前人野煙秋水蒼茫疑逺禪境真機去住閒雙樹為家思舊壑千花成塔禮寒山洞宫曽向龍邊宿雲徑應從鳥外還莫戀本師金骨地空門無處復無關送徹公楊衡白首年空度幽居俗豈知敗蕉依晩日孤鶴立秋墀乆客何由造禪門不可窺會同塵外友齋沐奉威儀同前前人北風吹霜霜月明荷葉枯盡越水清别來幾度龍宫宿雪山童子應相迎廣宣上人頻見過韓愈三十集作百六旬長擾擾不衝風雨即塵埃乆為朝士無裨補空媿髙僧數往來學道窮年何所得吟詩竟日未能廻天寒古寺逰人少紅葉忩前有幾堆送逺上人陳羽十年勞逺别一笑喜相逢又上青山去青山千萬重酬幽居閒上人喜及第後見贈前人九霄心在勞相問四十人間豈足驚風動自然雲出由山髙僧不用笑浮名洛下贈徹公前人天竺沙門洛下逢請為同社笑相容支頥忽望碧雲裏心愛嵩山第幾峯送元曉上人歸稽亭劉禹錫重叠稽亭路山僧歸獨行逺峯斜日影本寺舊鐘聲徒侣問新事煙雲含别情應誇乞食處踏遍鳯凰城以下三十二篇並見集本贈别君素上人前人窮巷唯秋草髙僧獨扣門相歡如舊識問法到無言水與風生浪珠非塵可昏去來皆是道此别不銷魂送深法師逰南岳上人本在集作住資聖寺前人師在白雲鄉名髙集作登善法堂十方傳句偈八部會壇塲飛錫無定所寳書留舊房唯應銜草鴈相送至衡陽送如智法師逰辰州兼寄許評事前人前日過蕭寺㸔師上講筵都人禮白足施者散金錢方便無非教經行不廢禪遥知習居士發論待彌天贈日本僧智藏前人浮盃萬里過滄溟遍禮名山適舊扄集作性靈深夜降龍潭水黒新秋放鶴野田青身無彼我那懐土心會真如不讀經為問中華學道者幾人雄猛得寧馨贈别約法師前人師逄呉興守相伴住禪扄春雨同栽樹秋風對講經廬山曽結社桂水逺揚舲話舊還惆悵天南望栁星送慧則法師歸上都因呈廣宣上人前人昨日東林㸔講時都人乗馬踏瑠璃雪山童子應前世金粟如來是本師一錫言歸九城路三衣曽拂萬年枝休公乆别如相問楚客逢秋心更悲廣宣上人寄在蜀與韋令公唱和詩巻因以令公手札答詩示之前人碧雲佳句乆傳芳曽向成都住草堂振錫常過長者宅披文猶帶令公香一時風景添詩思八部天人一作人天入道塲若許相期同結社吾家本自有柴桑送僧元暠南逰前人寳書翻譯學初成振錫如飛白足輕彭澤因家凡幾世靈山頂會是前生傳燈已寤一作悟無為理濡露猶懐罔極情從此多逢大居士何人不願解珠瓔送宗宻上人歸南山草堂寺因詣河南尹白侍郎前人宿習脩來得慧根多聞第一却忘言自從七祖傳心印不要三乗入便門東泛滄江尋古跡西歸紫閣出塵喧河南白尹大檀越好把真經相對翻送義舟師却還黔南前人黔江秋水浸雲霓獨泛慈航路不迷猨狖窺齋林葉動蛟龍聞呪浪花低如蓮半偈心常悟閔集作問非菊新詩手自携常説摩圍集作國非似靈鷲却將山屐上丹梯送鴻舉逰江南前人禪客學禪兼學文出山初似無心雲從風巻舒來何處繚繞巴江不得去山川古寺好閒居讀盡龍王宫裏書使君灘頭揀石硯白帝城邊尋野蔬忽然登髙心瞥起又欲浮盃信流水煙波浩淼魚鳥情東去三千三百里荆門峽斷無盤渦湘平漢濶清光多廬山霧開見瀑布曲江月净聞漁歌鍾陵八郡一作部多名守半是西方社中友與師相見便談空想得髙齋一作聲獅子吼送元簡上人適越前人孤雲出岫本無依勝境名山即是歸乆向呉門逰好寺還思越水洗塵機浙江濤驚獅子吼稽嶺峯疑靈鷲飛更入天台石橋路垂珠璀璨拂山衣送寳韻上人逰天台前人曲江僧向松江見又到天台見石橋鶴戀故巢雲戀岫此君猶自不逍遥送惟良上人前人髙齋灑寒水是夕山僧至𤣥牝無關鎖瓊書拾文字燈明香滿室月午霜凝地語到不言時世間人自集作盡睡贈髙僧集作文應上人孟郊棲遲青山巔髙静身所便不踐有命地集作草但飲無聲泉齋性空轉寂學情深更専經聞開古葉衣製垂秋蓮厭見俗人羣暫來此安禪集作還却旋送溪上人集作送清逺上人歸楚山舊山寺一作國清上人逰蘇前人波中出呉境霞際登楚岑水寺一别来雲一作風蘿三改隂詩誇碧雲句道證青蓮心應歎集作笑萍汎者不如集作知松隠深郡齋月下集作暇日憶廬山草堂兼寄二林僧社三十韻多叙貶官已來出處之意白居易諫諍知無補遷移分所當不能集作堪匡聖主秪合事空王龍象投新社鵷鸞失故行沉吟辭北闕誘引向西方便住雙林寺仍開一草堂平治行道地集作路安置坐禪牀手板支為枕頭巾閣在墻先生烏几舄居士白衣裳竟歳何曽悶終身不擬忙滅除殘夢想換盡舊心腸世界多煩惱形神乆損傷正從風皷浪轉作日銷霜佛經云生死無休如風皷浪又云煩惱如霜露慧日能銷除吾道尋知止君㤙偶未忘忽䝉頒鳯詔兼謝集作借剖魚章蓮净方依水葵枯重仰陽三車猶夕會五馬已晨裝去似尋前世來如别故鄉眉低出鷲嶺脚重下蛇岡漸望廬山逺彌愁峽路長香爐峯隠隠巴字水茫茫瓢掛留庭樹經收在屋梁春抛紅藥圃夏憶白蓮塘唯一作准擬捐塵事將何答寵光有期追永逺晋宋間逺法師永禪師同隠廬山二林無政繼龔黄南圃秋猶熱西齋夜漸集作暫凉閒吟四句偈静對一爐香身老同丘井心空是道塲覔僧為去伴留俸作歸糧為報山中侣慿㸔竹下房會應歸去在松菊莫教荒對小潭寄逺上人前人小潭澄見底閒客坐開衿一作襟借問不流水何如無念心彼惟清且淺此乃寂而深是義誰能答明朝問道林與僧智如夜話前人懶鈍尤知命幽棲漸得明門閒無謁客室静有禪僧爐向初冬火籠停半夜燈憂勞縁智巧自喜百無能寄山僧前人眼㸔過半百早晩掃巖扉白首誰能住青山自不歸百千萬刼障四十九年非會擬抽身去東風抖擻衣晩春登大雲寺南樓贈常禪師前人花盡頭新白登樓意若何歲時春日少世界苦人多愁醉非因酒吟悲不是歌求師治此病唯勸讀楞伽此詩三百十巻重出今已削去送文暢上人東逰前人得道即無著隨縁西復東貌依年臘老心到夜禪空山宿馴溪虎江行濾水蟲悠悠塵客思春色滿雲中正月十五日夜東林寺學禪偶懐藍田楊六主簿因呈智禪師前人新年三五東林夕星漢迢迢鐘梵遲花縣當君行樂夜松房是我坐禪時忽㸔月滿還相憶始歎春來自不知不覺定中微念起明朝更問鴈門師贈草堂宗宻上人前人吾師道與佛相應念念無為法法能口藏宣傳十二集作五部心傳照耀百千燈盡離文字非中道長住虚空是小乗少有人知菩薩行世間盡是重髙僧春憶二林寺舊逰因寄朗滿晦三上人一别東林三度春每春長似憶情親頭陀會裏為逋客供奉班中作老臣清净乆辭香火伴塵勞難索幻泡身最慙僧社題墻一作名又作橋處十八人名空一作中一人題孤山寺山石榴花示諸僧衆前人山榴花似結紅巾容艶鮮集作新妍占斷春色相故開行道地香塵擬觸坐禪人瞿曇弟子君知否恐是天魔女化身廣宣上人以應制詩見示因以贈之詔許上人居安國寺紅樓院以詩供奉道林談論惠休詩一到人間集作天便作師香積筵承紫泥詔昭陽歌唱碧雲詞紅樓許住請平聲銀鑰翠輦陪行踏玉墀惆悵甘泉曽侍從與君前後不同時蕭相公宅遇自逺禪師有感而贈前人宦途堪笑不勞悲昨日榮華今日衰轉似秋蓬無定處長于一作如春夣幾多時半頭白髪慙蕭相滿眼紅塵問逺師應是世間縁未盡欲抛官去尚遲疑山下留别佛光和尚前人勞師送我下山行此别何人識此情我已七旬師九十當知後會在他集作何生贈别宣上人前人上人處世界清净何所似似彼白蓮花在水不著水真空集作性悟幻泡行潔離塵滓脩道來幾時身心俱到此嗟余牽世網不得長依止離念與碧雲秋來朝夕起秋逰平泉贈韋處士閑禪師前人秋景引閒步山逰不知疲杖藜捨輿馬十里與僧期昔嘗憂六十四體不支持今來已及此猶未苦衰羸心興遇境發身力因行知尋雲到起處愛泉聼滴時南村韋處士西寺閑禪師山頭與澗底閒健且相隨文苑英華巻二百二十一
