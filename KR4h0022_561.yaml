body:
  text: 文苑英華卷五百六十二宋李昉等編賀祥瑞二賀太陽當虧不虧表一首中書門下賀日當蝕不蝕表一首賀歲除日太陽不虧表一首賀洪州慶雲見表一首百寮賀日抱戴慶雲見表一首百竂賀戮逆人王慈徵後慶雲見表一首為涇州李刺史賀慶雲見表一首扶風郡賀慶雲見表一首賀祥雲見表一首為宰相賀平原郡鑄尊容爐上有紫雲等瑞表一首為宰相賀開元觀鑄聖容慶雲見表一首為宰相賀㑹昌山慶雲見表一首為宰相賀賽龍潭有瑞雲表一首為宰相賀中嶽合煉處藥自成兼有瑞雲見表一首為宰相賀太原府聖容樣至有慶雲見表一首中書門下賀慶雲見表一首中書門下賀太原紫雲見表一首為皇太子賀甘露表一首為百官賀斷獄甘露降表一首賀萬年縣甘露表一首為百官賀舒州甘露表一首賀甘露表一首中書門下賀元和殿甘露降表一首賀太陽當虧不虧表代宗大厯十三年獨孤及臣等言伏見今月一日雲物隂晦太陽當虧不虧者臣聞殷太戊宋景公皆修德立言而妖變為福以日月薄蝕勞謙惕厲而災不勝德雲為垂隂若天降衷使其謫故集作收字不見易象曰既憂之咎不長也臣等無任欣戴之至中書門下賀日當蝕不蝕表代宗大厯十三年常衮臣某言伏見徐承嗣奏今月一日法當日蝕時有澍雨者臣聞日之所躔行有虛道至之所會蝕亦無災况聖以合天德以禔福是有幽贊宜於感通伏惟寶應元聖文武皇帝陛下協用五紀順用三極厯象日月統和隂陽一有序行之慶四字恐非乃者疇人推策今朔於辰非正陽之所忌於大明而何損猶能懼而勤政實以應天齊于穆清益用恭默精誠所達𤣥運相符圜規之影始生於海上膚寸之雲忽遍於天下霈然而起豈止終朝莫測應龍之外潜復踆烏之次伐鼓用幣悉罷于有司潤物蕃生普歡於在野及乎睿宿更益清光同道相避則聞昭子疑當作梓慎恐避諱改之對當交而變果徵劉劭之言古今殊祥中外所慶臣等謬陪近侍喜萬恆情無任抃蹈謹表賀嵗除日太陽不虧表臣聞惟德動天其應如響日月交㑹數之常也交而不蝕德所感也伏見有司奏今日午正後七刻太陽初虧未正後三刻復滿者是日也髙天無雲太陽不掩訖于申酉光彩逾明萬㝢同瞻百神協慶中賀伏以聖人者合天地以為德與日月以為明當虧而下虧明足見矣當應而遂應神不欺矣伏惟陛下德本於孝動由於禮勤儉以厚下寬仁以愛人憂庶政而疚懷求衆善如不及行之於下土升聞于上帝無逺不屆感而遂通一人有慶三光薦祉昔唐虞至化而星辰不孛日月不蝕以今方古千載同貺大禮元辰在於明發俯逼惟新之運彌彰不掩之祥人事天心何其允叶潜輝散彩愈曜於朱城麗景臨空轉明於黃道凡在生類同知聖猷無任踴躍之至賀洪州慶雲見表許敬宗臣某等言臣聞靈心不測叶至道以升聞上帝無聲候休明而降祉同夫影響在感斯通相彼天心實交其際伏惟皇帝陛下垂光御極體睿凝圖始自憂勤寧羣飛於海外賜之仁壽拯塗地於寰中揔絶代之英聲實興朝之美政三秦咸泰六府斯歌首冠往初功無取譬德澤共二儀潜運清明與七曜齊光是以邇無不安逺無不服雕題鏤齒之類欵郊甸以相趨氊裘板屋之朋入提封而請吏上騰下漏天平地成嘉一作喜氣內充卿雲以之舒彩盛德外發非煙由其散色竊見守洪州長史張惟善一有悟解二字等稱以六月二十六日於城內見慶雲自旦及申然後方散謹按瑞應圖曰慶雲者太平之應孝經援神契曰德至山林則景一作慶雲出又曰天子孝則慶雲見金枝玉葉若臨軒帝之營蕭索氤氲復入唐臣之詠自非工侔造化道格上𤣥光含六幽恩流四海安能致兹神感式彰靈貺𤣥黃間起朱紫相輝千載合符如斯之盛也雖復駢枝合頴匹此為輕綘雪𤣥霜曾何足喻凡諸率土預在肖形沐浴皇風用源鳬藻况以臣等謬忝衣簮旦夕巖廊親開錫瑞相呼抃躍實百常情不勝恱豫之至百竂賀日抱戴慶雲見表李嶠臣某等言臣聞大人造物亨衢所以貞觀上帝懸象層穹所以照臨合其德而先後不違契其誠而表裏潜應伏惟聖母聖皇陛下仰膺顧託俯順謳歌臨天下之大寶當域中之正氣斟酌律度三神援亭毒之權鼓舞隂陽萬象入則成之契六幽金鏡四時玉燭凱澤將膏雨共流協氣與景風齊暢故能使天地儲祉靈祗降福樞紐薦符勾芒錫壽自呈有命洛書肇出惟宗社之饗德迪神明之祚聖象物昭應休徵煥發每至十二月𤣥珉啓匣緣錯披題遷寶祕於東序視衣纓於北闕必有仙鶴翔集雲烏杲曜祥光入於九重異氣縣於三象雖復鼎來汾水黃雲冠於北山劔在豐城紫氣衝於南斗無以方斯影響近此闕天作符籙動而有徵日官考驗以為帝凖日在朔月時惟孟秋奉鴻休而正位先告辰而解網休日申酉衆姬稱賀申禮既畢昭示聖國芝檢初開扶光未徙即有氤氲傳漢發祥於俯仰之間蕭索浮天舒彩於折旋之際于時睟容當寧嬪儀在列文物充於紫庭暉光察於𤣥象或戴洪琛之威儀非烟非雲奪褘褕之彩色兩宫胥抃六妃式舞欣就望之近臨恱光靈之下濟臣等謹按孝經援神契王者德至於天則日抱戴又黃氣抱日輔臣納忠瑞應圖曰天子德孝則慶雲出又曰天下太平慶雲見陛下宵衣旰食至德通於九𤣥皇帝錫類推恩純孝形於八表惟明求道若金在礪自物觀化如草從風屬千齡之景業承肆眚之鴻霈乾坤合而喜氣生圖籙啓而禎符作既以發揮天德昭寶運之隆平且以光翼端章究靈心之終始自非上下和洽幽明薦成何以微疑是徴造化之神偉合天人之符契昔者𤣥圭受命無聞感召之祥赤土披圖不發昭回之貺故知冥祇職道歷載祀而潜休靈物俟時當聖明而效用事超六籍之外聲髙百王之表卓哉至矣無德而稱臣等謬奉隆知親承大慶朝聞夕死每竊抃於昌期手舞足蹈敢承歡於下列無任鳬藻踴躍之至謹詣闕奉表陳賀以聞百寮賀戮逆人王慈徵後慶雲見表前人臣某等言伏見今月十一日誅反逆王慈徵等乃有慶雲見於申未之間蕭索滿空氛氲蔽日五彩畢備萬人同仰伏以慈徵等並典司戎旅出入禁闈反德亂常背天逆理聖靈感通神祗昭應雖逆節始萌而潜謀必兆窮姦回之密計盡包藏之巨慝並膏斧鑕俱肆朝市五屬明啓嚴刑應於九秋萬㝢恱豫嘉氣呈於三象此實天人合德宗社降休欣紫宸之永固在蒼生而知幸無任嘉慶之至謹拜表稱賀以聞為涇州李刺史賀慶雲見表崔融臣某言伏奉詔書上御武殿有慶雲映日見於辰巳之間肅奉休徵不勝抃躍中賀臣聞諸瑞應圖曰天下太平則慶雲見天子大孝則慶雲見伏惟皇帝陛下早朝宴坐憂勞庶政逺無不肅邇無不懷神感潜通至誠上格凉秋中月滯雨移旬天心合而喜氣騰陽德動而愁隂歇文章郁郁惠日照而成彩花花蓬蓬晴風搖而不散雖復紫雲來漢皇殿白雲入殷帝房校其優劣疇以為喻臣運奉休明榮霑刺舉千年多幸已逢河水之清百辟相歡重偶叢雲之曲不任悚躍之至謹遣某官奉表稱慶以聞扶風郡賀慶雲見表楊談臣某言臣聞休徵所應克昭明盛之期靈貺攸歸必會升平之運伏惟開元天寶聖文神武皇帝陛下發揮真宰撫育道樞致妙用於希夷納蒼生於仁夀故得風雲效祉動植呈祥臣所管內雍州界天柱山頃有𤣥元皇帝古宫考時代而罔知覩寂寞而如在今月十四日辛丑皇妹持盈守法於宫前紫虛觀中齊心伏形為陛下祈福忽有慶雲照耀施五彩於山巔喜氣紛綸散重光於宫上其日從已時至未時官吏僧道瞻顧彌逺陛下纘𤣥元之仙籙授天寶之禎符千古未聞百靈何幸克叶天意必因人心表陛下無疆之福明陛下無疆之壽臣忝守方嶽寄重分憂抃躍之誠倍百恆品謹寫圖奏以聞特望天恩宣示中外以光史策天下幸甚臣等誠歡誠喜頓首頓首賀祥雲見表張九齡臣某等言伏見道門威儀司馬秀表稱今月十日夜陛下親臨同明殿道場為宗廟蒼生祈福有祥雲見伏以聖德以精至動天天意以肹蠁符聖其應集作成甚速豈云𤣥逺集作其應豈逺陛下孝集作聖敬之深勤恤所至靈心如答神道何言自表休期以介景福生人大賴天下幸甚臣等忝居近侍倍百恆情謹奉賀陳賀以聞為宰相賀平原郡鑄尊容爐上有紫雲等瑞表孫逖臣等伏見平原郡奏去月七日鑄尊容爐上有紫雲如蓋髙三尺餘鑄畢方散烟焰中又依稀有一老人鬚眉皓白俯臨鑄上并繞爐行道時聞空中𫝊億萬聲及鑄畢啓模相好圓滿面有自然之金色者聖心通感至道炳靈洪爐未開殊祥纍見蓋呈祥瑞相表異金光烈火之中式瞻仙老無聲之地忽聽神言在前古而未聞不崇朝而荐至稠疊之慶名言所難况肇自京師至于郡國真容所鑄靈應必臻神妙無方用彰于聖壽生靈何幸永覩於昌期臣等忝居近侍倍加欣慶無任抃躍之至謹奉表陳賀以聞為宰相賀開元觀鑄聖容慶雲見表前人臣等伏見開元觀先請今月十八日鑄聖容昨夜先期普天降雨遲明展事萬里無雲及寫之際又有卿雲休氣氤氲扶日道俗咸觀移時不散伏以聖惟不測有感而必通天則無言觸類而成應陛下欽崇至道子育蒼生爰寫尊容將洪介福故得天地合氣神靈布和甘澤而逹曙已晴彩雲而抱日呈瑞鎔範之際殊祥畢集實表聖明之感更彰仁壽之期臣等忝在掖垣不勝大慶無任恱豫之至為宰相賀會昌山慶雲見表臣某等言今日伏退後伏見㑹昌山上有五色雲見紅翠稠疊光彩相鮮爛若藻繪積如山嶽近依湯井俯傍宸居移時不散從臣咸覩伏以雲物變態真仙所憑法駕才上祥光已見豈惟天地合氣以表於和平固已神靈告休用彰於聖壽無任抃躍之至奉表稱賀以聞為宰相賀賽龍潭有瑞雲表臣某言適內謁者監牛仙童至奉宣進旨先為蒼生祈雨今日告賽不坐明日亦修疑不坐者凉秋以來時雨未降陛下憂勤兆庶躬自祈禱甘澤漙洽又陳昭報親紆鳯輦俯詣龍堂御膳撤鮮齊宫致潔亦既纍日方申大祭禮畢之後更祝龍潭才發德音已臻丕應仙童云其時即有青紫雲自潭而起爛漫呈祥絪緼布和勢騰晴空光映秋水即知飛龍之德變化無方聖人之感深微莫測惟兹靈貺實謂殊常臣等特符恩榮倍增欣望宣示朝列兼付史官用垂明徵永昭盛德無任慶抃之至謹奉表陳賀以聞為宰相賀中嶽合煉藥自成兼有瑞雲見表臣某言臣等伏見道士孫太冲奏事奉進止令中使薛履信監臣於中嶽嵩陽觀合煉其竈中著水置炭於竈側對三却回已經數月泥拭既密緘封并全即與縣官等對開門其炭並盡灰又别聚不動人力其藥已成初乃五色發端終則太陽暉於爐際又河南裴敦復所奏并奉勑令右闕李成式往驗並同者臣聞神變無方式昭於幽贊聖心有感必驗於𤣥通陛下至德奉天精誠契道動無不應事若合符故得煉藥之所瑞雲先見丹爐不爇金液自成太陽降精宜假於人工飛亷扇炭諒關於神力殊祥特異曠古未聞靈跡既彰用資於聖壽羣生何幸永覩於昌期况在微臣實倍常品無任抃躍之至謹奉表陳賀以聞為宰相賀太原府聖容樣至有慶雲見表前人臣等伏見太原尹常濟奉今月四日紫極宫玉石聖容樣至北京其時有慶雲垂天自辰至已輪囷紛郁萬姓咸觀者伏以靈物呈祥神仙效靈豈伊天地之和更是壽昌之慶况太原舊國王業所興聖容才及於近郊卿靄已彰於合契氤氲五色變汾水之白雲隱映三清類函關之紫氣上𤣥感通品物同歡况在微臣倍深慶悅無任抃躍之至中書門下賀慶雲見表常衮臣某言伏見太史奏今月十三日降誕之辰有慶雲見自卯及已五色相輝京城士庶無不觀覩者臣聞應天者聖降必有期從龍者雲感而成瑞伏惟寶應元聖文武皇帝陛下啓我昌運本乎大微甲觀畫堂以書有慶赤光紫氣以表祥符每嵗孟冬內朝舉禮萬國稱賀羣臣獻壽紛委靈貺總集良辰今者慶雲表祥史册十月良月逺膺盈數之期後天奉天近叶下元之厯從風蕭索抱日縈回色涵流渚之虹影雜繞樞之電交映榮光曲成轉蓋萬物皆覩羣情共歡無疆之休永永禔福臣奉觴慶賀於萬斯年無任抃躍謹奉表陳賀以聞中書門下賀太原紫雲見表臣等言伏見太原尹北都留守檢校工部尚書薛兼訓奏欣州七聖廟內尊容奉勑移太原府紫微宫安置昨正月二十九日啓告其時有紫雲見兼聞金奏之聲者臣聞廟貌嚴奉所以追孝天地明察則必垂祥伏惟皇帝陛下全聖人之至德合神道之設教受天之命嚴龔奉先明發有懷載感于文武菲食致美必誠於宗廟序五位而周順刑四海而化光兹以聖靈在天緬慕增惕是有象設不忘哀矜永念興王之地如聞樂沛之言逺自方州遷於京邑克配上帝髙居紫微當其撰吉之時爰有奏章之請百神紛委萬靈朝拜雲浮瑞色樂協薰風已含氣於潜龍更和響於翔鳯彰莫大之孝以嗣無疆之厯雖周室之既受多祉漢朝之屢獲嘉應未有祖禰丕祐天人合符若斯之盛也臣無裨政事但慶鴻休不勝抃躍之至謹奉表陳賀以聞為皇太子賀甘露表崔融臣某言某至伏承某月日甘露降於金闕亭肅奉休徴不勝抃躍中賀臣聞五材並用天地合而凝津四序遞來隂陽和而灑潤望之成雪若墜崑崙之山嘗之則甘似降軒轅之國伏惟天皇部元氣平太階正圭表於都畿考銅櫩於宫室薦河圖而升洛範日載一作至祥編過竹苑而憩芝臺宵零瑞液爾其塗塗被物滴滴流膏承以玉杯凌漢宫而擅美獻之瓊爵掩魏殿而稱珍可以致靈仙之寄可以延帝王之壽孝經援神契未足叙其和平春秋運斗樞不能議其清濁臣濫膺國本多慙人望仰宸遊而不及倍戀恆情聞帝澤而先驚慶深常位無任喜抃之至謹遣某官某奉表陳賀以聞為百官賀斷獄甘露降表臣某等文武百官若干人言一昨伏見御史中丞吉頊稱某日承制推法司斷事惡逆者㑹赦不免謀反者㑹赦從流主上以為輕重不當陷入人罪制曰君親無將將而必誅安有忠孝同極而流罪異貫若此者豈欽恤之意耶旋命主司奏上沿革謹按貞觀律唯有十卷其捕亡斷獄兩卷乃是永徽二年長孫無忌等奏加果非庭堅所制百竂䝉瞽一朝開鑿聖鑒𤣥通有如影響自發德音之後每夜觸處有甘露降者臣等中賀臣聞刑罰者人之鞭策號令者國之舟車所以懲惡止姦輔政助化故軒轅之為君也設法而天下安樂陶唐之為帝也察令而天下昭明然則不令而誅不教而殺是虐人也法不勝姦刑不制罪是陷人也有以知懸之象魏布以都鄙是謂禁人為非銘之鍾鼎鑄之金石是謂丕天之責為人上者可不務乎若乃前主所是疏為律後主所是疏為令事有不合於古不務於時則弛而更張矯以歸正正朔三而改文質再而復王禮不相襲帝樂不相沿夫何為乎亦云適時而已惟天册金輪聖神皇帝陛下躬明哲之性秉淑聖之姿順風雨以發生乘雷電以震耀推功天地所以告成太室致孝祖考所以宗祀明堂陳寶鼎於帝庭正土圭於王邑能事畢頌聲興寃積之氣不彰刑殘之尸復育斷獄四百愈鑒寐於淳源科條三千尚劬勞於畫象日者有司奏牘議事不明大聖當樞因一作囚人軫慮但臣之事主猶子之事親父子則身體髮膚君臣則股肱元首出忠入孝義在俱全履霜堅氷法無異罰曲禮垂教子處汙宫之條大傳立文臣從潴室之坐何以才經赦宥頓隔刑書反逆首條而遂生惡逆未坐而猶死下上簮履顛倒衣裳遂使吏生淫巧人無常禁逆節所以時萌凶黨由其或在夫立殺止殺制刑息刑重其死然後生峻其法然後禁禮以齊君子刑以齊小人非惟聞義而輸忠固亦知教而遷善斫雕為朴自然登至道之初墨幪赭衣何必獨上皇之代銓也法也念兹在兹昔者仲尼修春秋亂臣賊子懼梁靖撰七序竊位素食慙况我大君財成上帝制作昭昭焉若日月之代明纍纍焉似星辰之錯行有典有則是彛是訓懷生幸生而有餘羣下瞻仰而不足蕭相國捃托秦法窺天無階杜武庫參定漢章蹐地失措誠可以垂後誠可以逹幽至人無心靈契昭於𤣥極昊天有命神物萃於休期巽風未行甘露頻降亦何止言善而星退躬禱而雲來夫其素液繁灑芳滋豐溢叢駢六氣之英搖動二儀之粹匝園林而並潤溥郡邑而同霑漢宫無假於玉杯魏殿不勞於瓊爵臣等謹按甘露者美露也一名膏露一名天酒其凝如脂其甘如飴蓋神靈之精仁瑞之澤稽命徵云稱諡正名則葦竹受甘露孫氏圖云王者和氣茂則降於草木食之夀援神契云天子刑於四海德洞輪冥則甘露降鶡冠子曰聖人之德上及太清下及太寧中及萬靈則膏露下白虎通云甘露之降則百物無不盛也陛下俯回冲眷親定律文必也正名果符稽命是使孟堅持論談功德而未詳抱朴裁書稱太平而不盡上可以輔聖躬之夀下可以延庶物之和言之動天一至於是臣等庇廕昌運接景清朝常勉志於克家每勤誠於報國恭聞大典伏覽殊臣知拱極之尊子識晞𤾉之慶無任抃躍之至謹詣朝堂奉表稱賀以聞仍請宣付所司頒告遐邇賀萬年縣甘露表臣某言今日中使吳永清宣示臣萬年縣靖恭坊南街栁樹上降甘露者臣聞𤣥元皇帝有言曰天地相合以降甘露伏惟寶應元聖文武皇帝陛下事天明事地察所以受三靈之景貺叶萬國之歡心其在陽不晞被葉增固且泫且潔如脂如飴神明有以告祥蒼翠因而不改則皓元之氣下浹於人軒轅之精不愛其寶裨太平之瑞呈上陌之中况地即萬年時當子月不愆寒沍實表靈長禎符荐臻夀域何遠以之興運在陶唐而則然特用紀元於大漢而無愧伏望宣付史館永播休徵臣謬承雨露之恩愧無㳙滴之至為百官賀舒州甘露表崔元輸臣某等言伏見舒州奏懷寧縣界天柱山東南谷寺降甘露今月五日下尚書省者臣等謹按皇王已來圖牒所載皆以為天地之合神靈之精感中和之茂育彰太清之至理故鶡冠子曰聖人之德上及太清下及太寧中及萬靈則甘露下禮曰天不愛其道地不愛其寶則甘露降伏惟皇帝陛下𤣥化醇茂沐澤汪洋合覆幬持載之功配髙明博厚之德恩加羣物禮及百神可謂同符實如前載又據舒州刺史宇文適所奏云天柱山者柱石之象也表山嶽之靈懷寧縣者寧謐之義也表懷柔之理伏以遠夷懷恩輔臣納忠觀其所言信而有理臣等親聞聖政獲覩殊祥無任賀甘露表武元衡臣某言伏奉今月九日聖恩以元和殿前所降甘露宣示百寮者伏聞聖德至而和風應元氣滋而靈液降不有上瑞曷彰盛時况甘惟㫖味露則仁澤豈無外野故呈祥於禁中不於别殿特表慶於元和光凝棲鳯之林氣浥傳香之樹將使五靈集祉奕葉流芳伏惟陛下先天奉時王道立極不言而風雨咸若無為而禎祥荐至故得蒸雲降液覩陽不晞如脂如飴珠連星綴可以彰聖感可以保豐年漢致金盤魏稱瓊爵方兹冥貺固有慙德臣遇斯鴻造幸偶昌期希代稱符微生畢覩載欣載賀徒竭犬馬之誠舞之詠之共樂華胥之俗無任中書門下賀元和殿甘露降表權德輿臣某等言中使某乙至奉宣進止示臣等元和殿今日甘露降於梧桐丁香樹者謹按孝經援神契曰王者德至天則甘露降孫氏瑞應圖曰王者和氣茂則降於草木伏惟陛下聖德感通殊祥允集當長嬴之月下順人心降穆清之中上昭天意太和隂隲靈液潜滋屑玉綴珠漙集作圑枝泫葉質同雪白味若飴甘灑珍木以相鮮激繁香而合發雖軒丘頒瑞漢史紀年徒習前聞豈如目覩此皆至誠旁及集作協氣旁逹天休合符凡在懷生不勝大慶臣等謬居樞要倍萬歡誠無任欣抃踴躍之至謹奉表陳賀以聞貞元十八年五月十八日文苑英華卷五百六十二
