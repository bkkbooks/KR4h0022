body:
  text: 文苑英華卷四百九十九宋李昉等編平農商工商貨幣一道泉貨一道錢不行一道㕓肆一道四民之業優劣一道衣食之源一道倉廪之實一道息游惰一道平百貨之價一道工商貨幣問夫貿遷化居資貨以通守位聚人理財為用故龜貝贍於夏殷金幣富於周漢頃國弗崇侈而府無盈儲賦不加厚而黎庶彌貧實由貨重物輕以臻斯弊若有單子推權之宜賈生斂散之術其具陳之對丘真孫對臣聞哲王之統俗也陳貨洪範通有無之用取市噬嗑致交易之所至乎九府立其法資幣量其宜盖理本救人而輕重隨代故周景鑄金穆公規其實漢文造幣梁傅議其違雖貫朽費濫而市非物輕粱肉不匱而家非貨重何者淳朴既散澆偽成俗惰農奪其嵗功徇利昧其日用所以負販盈廛分穀布野崇朝思飡則物不得貴爭利因阜則貨不得賤故弋綈雖御國之所先蒸人乃乂邦之攸本故賈誼慷慨陳力農之戒仲舒殷勤明重穀之說今宜思五土之宜勤三時之務教養殖人賞課田畯重遊適之賦輕力穡之役師李悝於魏邦式蔡癸於漢代用能遺穂委畆紅粟露積垂拱巖廊擊壤衢巷詠歌升平豈不盛歟臣學不師古識昧政化勉酬一作充賦枉問敢獻瞽言泉貨問羲農之時市井爰立夏殷以往泉貨無聞太公立九府之法夷吾通萬鍾之蔵輕重良由於出令斂散實在於得時自此以還資幣數改景王寳貨單穆立母子之譏文帝四銖賈生深博禍之歎既而白金易賤赤仄難行小則米石至萬大乃一當五百禁鑄彌重姦錢益多雖復棄市相尋黥罪日報茍非其術為害更深且示以厚利隨以重辟是誘良民陷之坑阱朕矚此流弊情甚傷之故罷均輸之官省塩鐵之利復欲收銅於斷鑄勸百姓於農桑奪商賈之權塞兼并之路而象稱交易書載懋遷厯代相承行之已乆一日變改公私非便且軍國所湏虚一作糜費猶廣尺寸為用分裂亦難益國寧民應有長䇿明言爾志以沃朕心對宋伯宜對臣聞楚王明月之珠寒而不可服魏王照室之寳饑而不可餌然則養羣黎之氣命為萬姓之衣被茍異農桑義難豊渥雖繼天象日之際猶為血飲但立地甄海而還誰不粟食質文空變高深自徙親籍躬桑殊途共致故得時名有道世號無為英聲鼓而未窮茂實飛而詎已方驗稱為寳者不勞氣白如虹謂之天者不假圎而似盖且鑄金為貝信有從来漢改四銖秦行半兩用舍更互廢輕就重之宜損益不常地馬天龍之異復有豫章銅岳蜀道銅山全歸佞倖之爐頓入諸侯之冶所以公私太半偽實相蒙姦佞由此而兼并豪戚因兹而聚斂洛京三鄽之内賈客雲屯齊宫七市之間商人霧塞乃令東漢楚子高閣浮空西蜀彭家連樓跨術雷車電騎多出工巧之家列鼎撞鐘無非貨殖之里賓徒藿肉鮑書不足倫僮僕藜餘張詩莫能序三田為之廢業五稼由此多荒伏惟陛下依乾度立坤功道則光格四天徳乃牢籠九地五羊銜粟時和之義先表䨇雀飛鳴嵗稔之徵已見尚留情天下之命置懐天下之本欲絶彼工商斷兹塩鐵乃還淳之要術非進取之權道何者今東南雖欵西北未平戎馬可馳兵車驟轉假復銅頭鐵額本無敵於黄軒繕甲行師固有勞於蒼帝誠宜立彼田畯闢兹泉府既篤墾草之功還脩上林之務耕疆抗陸織室開扉採彼三條籍兹千畆時行范子擒吳之秘計兼𢎞管相霸齊之逺略隴西馬援監舊鑄之司淮陽汲黯塞姦爐之巧乃復罄杜冶之便宜疏鄭陂之浩淼羽林創其始中郎嗣其末王基進業勞就沮漳鄧艾申權功成陳蔡邱陵滅矣禾粟之饒未虧洛水竭焉資貯之蓄寧減於是脩天陣縱天兵既飲馬於南池遂徵鶼於西海然後收銅勿用沈璧而歸崇士女於耕桑禁綺繡於商賈則堯心舜行併可陵勝火職雲司翻能度越者矣謹對問錢不行對岑文本對去智絶巧聖人之至徳斵彫為樸先王之令圖是以賈多端則貧士多技則匱未有崇兹剞劂競彼奢淫而能匡國安家宣風致化者矣自文明御宇大拯黔黎繼禮樂於將絶反淳風於已散庶績伊凝彛倫攸叙雖復工商異類四民之禁惟宜而錐刀必爭三農之務或失誠宜絶其麗美敦兹質朴刻玉雕金棄之如草芥揮鋤執耒紀之以賢良則稼穡惟興勤體之夫知勸怠惰方革游手之人自除謹對問鄽肆對郭正一對鄽肆之興用存交易山澤之利事屬貿遷是以先王因井而制居往聖觀爻而立義將以致兹百族通彼萬商羅肆巨千廣充上積之貨旗亭五里俯映星繁之珍是使蹀馬迴轅歴闤闠而流溢往商来賈候朝夕以盈途豈唯灼蓍蔡以觀貞旁臨季主之肆泛萍蟻而開宴近對文君之壚詎比夫齊宫七市女閭連閉殷室九君姬屋成列但負販之徒異業趣競刺繡謝其倚門多財歸其善賈由此聶政屠養無辭屈辱平仲有求終甘湫隘故知析毫之子不可責以忘機徇利之夫難以徵其重義况墆翳之侣本異夷齊貨殖之徒率同猗白若通其小利諒無擁於四人處以淳心恐有乖於一物誠可除兹濫賄禁彼邪贏則姦黨自消不待曺叅之令市無二價詎止黄軒之風謹對四民之業優劣問士農工商四民各業廢一不可取譬五材而闕里致言鄙於學稼漆園起論爰稱絶巧豈先聖埀文義有優劣將隨方設教或有文粹作理或變通者哉爾其矢陳用啓前惑對駱賓王對出震登皇垂衣裳而馭籙乘乾踐帝順舒慘以集作而字甿莫不畏九士以開基集作列九土以開疆因四人而安業故農為政本兩漢舉力田之勤財曰聚人九市列維金之利陟龍門而就日入仕弹冠斵蠅翼以成風追工運斧咸用因人成事隨利濟時盖五帝通規三王茂範然則泣麟上聖訓三千以領徒夣蝶幽人摶九萬而濟物欲使丘門志學折文粹作析以問農之言漢渚絶機杼以灌園之巧斯乃變通權教趨舍異集作適宜當今海内乂安天下樂業士食舊徳農服先疇自可孫𢎞獻書以待公車之詔王丹載酒時慰田家之勞謹對衣食之源禮部試第一道貞元十六年問周禮庶人不畜者祭無牲不耕者祭無盛不蠶者不帛不績者不縗皆所以耻不勉抑游惰欲人務衣食之源也然為政之道當因人所利而利之故脩其教不易其俗齊其政不易其宜由是農商工賈咸遂生業若驅彼齊人疆以周索牲盛布帛必由已出無乃物力有限地宜不然而匱神廢禮誰曰非闕且使日中為市懋遷有無者更何事焉對白居易對利用厚生教之本也從宜隨俗政之要也周禮云不畜無牲不田無盛不蠶不帛不績不縗盖勸厚生之道也論語云因人所利而利之盖明從宜之義也夫田畜蠶績四者之所宜者多土人之所務者衆故周禮舉而為條目且使居之者無游情無惰業焉其餘非四者雖不具學則隨其土物生業而勸𨗳之可知矣非謂使物易業土易宜也夫先王酌教本提政要莫先乎任土辨物簡能易從然後立為大中垂之不朽者也若謂其驅天下之人責其所無强其所不能則何異夫求靡集無靡字萍於中陵集作逵植橘柚集無柚字於江北反地利違物性孰甚焉豈直易俗失宜匱神廢禮而已且聖人辨九土之宜别四人之業使各利其利焉各適其適焉猶懼生生之物不均也故日中為市交易而退所以通貨食遷有無而後各得其所矣由是言之則大易致人之利集作制周官勸人之典論語利人之道三科具舉有條而不紊謹對倉廪之實禮部試第五道問紡績之弊出於女工桑麻不甚加而布帛日已賤蠶織者勞焉公議者知之欲乎價平其術安在又倉廪之實生於農畆人有餘則輕之不足則重之故嵗一不登則種植集作倉多竭往年時雨愆候宸慈軫懐遣使賑廪分官賤糶故得餒殍載活麥禾載登思我王度金玉至輕集作矣竊聞耿夀昌常平今古稱便國朝典制亦有斯倉開元之二十四年又於京城大署賤則加價收糴貴則約平出糶所以時無艱食亦無傷農今若官司上聞追葺舊制以時斂散以均貴賤其於羡集作美利不亦多乎對對人者邦之本也衣食者人之所由生也古者聖人在上而下不凍餒者非家衣而户食之盖能為之開衣食之源均財用之節也方今倉廪虚而農夫困布帛賤而女工勞以愚所窺粗知其本何者夫天之數無常故嵗一豐必一儉也衣食之生有限故物有盈即一作則有縮也古人知其必然也故敦儉嗇以足衣務儲蓄以足食是以堯有九年之水湯有七年之旱野無青草人無菜色者無他故盖勤儉儲積之所致耳故曰前事之不忘後事之元龜也當今将欲開美利利天下以厚生生烝人返貞觀之升平復開元之富夀莫善乎實倉廪均豐凶則耿夀昌之常平得其要矣今若升聞率循舊制上自京邑下及郡縣謹豆區以出納督官吏以監臨嵗豐則貴糴以利農嵗歉則賤糶以䘏下若水旱作沴則資為九年之蓄若兵革或動則餽為三軍之糧可以均天時之豐儉權生物之盈縮循而行之實百代不易之道也虞災救弊利物寧邦莫斯甚焉然則布帛之賤者由錢刀之壅也茍粟麥足用泉貨通流則布帛之價輕重平矣抑居易聞短綆不可以汲深曲士不可以語道小子狂簡不知所以裁之莫究微言空慙大集作下問謹對息游惰勸農桑議稅賦復租庸罷緡錢用榖帛前人問一夫不田天下有受其餒者一婦不蠶天下有受其寒者斯則人之性命繫焉國之貧富屬焉方今人多游惰地有遺力守本業者浮而不固逐末作者蕩而㤀歸夫然豈懲戒游惰之失其道耶將敦勸農桑之教不得其本耶此下並於白居易集凖備制科七十五門中摘取二篇其問荅皆居易擬作對對臣伏見今之人舍本業趨末作者非惡本而愛末盖去無利而就有利也夫人之蚩蚩趨利者甚矣茍利之所在雖水火亦蹈焉雖白刃亦冒焉故農桑亦有利也雖曰禁之人亦歸矣而况於勸之乎游惰茍無利也雖曰勸之亦不為矣而况於禁之乎當今游惰者逸而利農桑者勞而傷所以傷者由天下錢刀重而穀帛輕也所以輕者由賦斂失其木也夫賦斂之失其本者量桑地以出租計夫家以出庸租庸者穀帛而已今則穀帛之外又責之以錢錢者桑地不生銅私家不敢鑄業於農者何從得之至乃吏胥追徵官限迫蹙則易其所有以赴公程當豐嵗則賤糶半價不足以充緡錢遇㓙年則息利倍稱不足以償逋債豐㐫既皆若此為農者何所望焉是以商賈大族乗時射利者日以豪富田壟罷人望嵗勤力者日以困貧勞逸既懸利病相誘則農夫之心盡思釋耒而倚市織婦之手皆欲投杼而刺文至使田卒汙萊室如懸磬人力罕施而地利多欝天時虚運而嵗功不成臣嘗反覆思之實由穀帛輕而錢刀重也夫糶甚重集作貴錢甚輕則傷人糶甚賤錢甚重則傷農農傷則生業不専人傷則財用不足故王者平均其貴賤調節其重輕使百貨通流四人交利然後上無乏用而下亦阜安方今天下之錢日以减耗或積於國府或滯於私家若復日月徵求嵗時輸納臣恐穀帛之價轉賤農桑之業轉傷十年已後其弊或甚於今日矣非所謂平均調節之道也今若量夫家之桑地計穀帛之集作為租庸以石斗登降為差以匹丈多少為等但書估價並免税錢則任土之利載興易貨之弊自革弊革則務本者致力利興則趨末者迴心游手於道途市肆者可易業於西成託跡於軍籍釋流者可反躬於東作欲其游集作浮惰其可得乎加以陛下念稼穯之艱難則薄斂而人足食矣念紡績之勤苦則省用而人豐財矣念異貨之敗度則寡欲而人著誠矣念竒器之蕩心則正德而人歸厚矣其興利除害也如彼又脩已化人也如此是必應之如谷響集作響谷順之如風行斯所謂下令於流水之源繫人於苞桑之本者矣欲其游集作浮惰其可得乎謹對平百貨之價陳斂散之法請禁銷錢鑄器問今田疇不加闢而菽粟之估日輕桑麻不加植而布帛之價日賤是以射時利者賤收而日富勤力穡者輕用而日貧夫然豈殖貨斂散之節失其宜耶將布帛輕重之權不得其要耶對臣聞穀帛者生於農也器用者化於工也財物者通於商也錢刀者撡於君也君􅋵其一以節其三三者和鈞非錢不可也夫錢刀重則穀帛輕穀帛輕則農桑困故散錢以斂之則下無棄穀遺帛矣穀帛貴則財物賤財物賤則工商勞故散穀以收之則下無廢財棄物矣斂散得其節輕重便於時則百貨之價自平四人之利咸遂雖有聖智未有易此而能理也方今闗輔之間仍嵗大稔此誠國家散錢斂穀防儉備凶之時也時不可失伏惟陛下惜之臣又見日者二字集作今日人之所以弊者由錢刀重於穀帛也所以重者由銅利貴於錢刀也何者夫官家採銅鑄錢成一錢破數錢之費也私家銷錢為器銷集作破一錢成數錢之利也鑄者有程銷者無限雖則官家逐嵗鑄豈能勝私家之日銷哉集作乎此所以天下之錢日减而日重者也今國家行挾銅之律執鑄器之禁使器無用銅銅既無利則錢不復銷矣此實當今權節重輕之要也文苑英華卷四百九十九
