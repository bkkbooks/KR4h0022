body:
  text: 文苑英華卷三百八十八宋李昉等編南省四兵部侍郎授唐奉一兵部侍郎制李嶠鸞臺參二百揆樞衡九法是司邦政尤切帝難具官唐奉一宇量深明襟懷雅正文場得俊翰苑推工瑣闈一作闥內朝致延譽之美圭符出守樹威恩之績永言禁暴事切安人俾升五戎之府佇諧九流之選可夏官侍郎授裴淮兵部侍郎制蘇頲門下通議大夫行中書舍人上柱國正平縣開國男裴淮敏學聰亮雅詞微婉陽秋具體夙夜在公精義拆於連環規矩同於匪石久典清密見稱忠信簡稽是務軍國是殷宜擢美才俾敡戎政可尚書兵部侍郎勳封如故主者施行授張均兵部侍郎制孫逖門下六官之任夏卿尤重二職之選時望惟屬正議大夫行尚書户部侍郎上柱國燕國公賜紫金魚袋張均才略經通文詞濟美修身自逹擅鴻陸之羽儀蒞事無難有龍泉之斷割纍拜省闥彌彰器用芳蘭可久垂棘重歸宜允副於僉擇俾增修於舊政可行尚書兵部侍郎散官勳封如故授李彭年兵部侍郎制孫逖勑朝議大夫守太僕少卿上柱國趙郡開國公李彭年清和稟識博雅為文堅貞懷匪石之心果斷有刜鐘之利夏卿之亞嵗調方殷缺官而擇至公斯在宜副才難之選將觀試可之能可權判兵部侍郎事散官如故授李恆武部侍郎制賈至門下全蜀奧區梁岷設險時清作鎮恆難其人况中夏未寧上皇南幸益州之政允資忠諒非親非賢何以兼腹心瓜牙之任前襄陽太守李恆貞固簡肅宗枝標秀歷踐中外咸克有聲今巴蜀之地停鑾駐蹕舉爾以文武之才倚爾以維城之固且小司馬之職連率之重兼而處之不曰厚寄懋哉厥德無替朕命可行武部侍郎授桞公綽罷鹽鐵守夏官兵部侍郎制白居易敕具官桞公綽昔先皇帝知爾有材元和以來應用不暇及領𣙜莞漕運之務屬陵寢郊丘之禮財給事傑時乃之功宜有轉移以均勞逸况聞牢籠無遺利課督有常規今詔刑部尚書播代之亦令守而勿失朕將興理化先務根本凡百職事悉歸有司惟兹夏官實掌戎政簡稽調補今方其時司馬二卿佐平邦國是爾本職無忘增修可依前件授盧知猷兵部侍郎制薛廷圭敕參斷時政允屬公卿鎮重周行式資舊老而叔世掄選率尚英華俾我鴻儒碩生軋軋不進汲長孺於焉興嘆燭之武是以有詞思求其人夕惕若厲爰有良輔協吾此心具言爾前尚書右丞盧知猷在和武光孝皇帝朝以文學詞賦擢進士第登宏詞科舊相列藩羔鴈交辟雅有淑問鬱為名儒及我懿考踐祚歷諌省郎署官常兼史職藹然直聲著在筆削先皇帝嘗輟自朝右再委方州饒陽上洛之人于今懷爾之德旋掌誥命亟服寵榮逮豫沖人歷事四帝出入華顯諳練故實子雲之筆札有名周昌之厚重無黨鎮吾風俗繄爾秉持遂用委以五兵贊豫九法服我休命稱兹柬求往惟欽哉無墜成績可兵部侍郎户部侍郎授源乾曜户部侍郎制蘇頲黃門正議大夫行少府監上柱國安陽縣開國男源乾曜思揔事端言思政要外則經通成務內則周密知微其識也清以文守法尚方愛費已稱寶玉之府司徒帥屬更重神仙之闈宜副朝􅀢蒞于邦教可行尚書户部侍郎散官勳封如故主者施行授韋濟户部侍郎制孫逖敕朝散大夫守京兆少尹奉明縣開國男韋濟衣冠吉士文雅清才藴忠信於身謀傳孝友於門德明而克允遇理必通剛則近仁臨事能斷自升華省逮佐神州皆有令名咸歸雅望地官之亞朝選尤難我其試哉無替厥命可試尚書户部侍郎散官封如故授韓滉户部侍郎制孫逖門下周有地官小司徒佐敷五教魏置度支尚書以濟軍國之用政有餘地然可兼之正議大夫行尚書右丞韓滉惟先臣左右烈祖格于皇天濟美之盛中朝所重好學師古潔其清純文不流放言無枝葉素練成式用推至公所更之任事可垂逺久司臺轄嘗亦官人姦吏無竄其情群才各序其一作於位今户版不實地征未均每嵗經費以之匱竭乃者命使以揔領且非典故擇郎以専掌又慮權輕歸於有司期在折衷昔杜元凱之處斯職內以利人外以救邊法可施行者五十餘條以資當時之急委注煩重宜熟計之可行尚書户部侍郎敷判度支散官如故主者施行授牛僧孺户部侍郎制白居易敕户部侍郎周之地官小司徒也掌天下口集作田户之圗生齒之籍二字集衆賦役貨幣之政令以待國用而質嵗成元和以還日益寵重善其職者多登大任中兹選者莫非正人誰其稱之我有邦彥朝議大夫集作朝議郎守御史中丞上柱國賜紫金魚袋牛僧孺自舉賢良踐歷臺閣秉潤色筆提糾繆綱而書命無繁詞決事無留獄受寵有憂色納忠多苦言朕心知之何用不可夫以人曹之重如彼僧孺之賢若此俾居是職不亦宜乎可守尚書户部侍郎散官勳賜如故刑部侍郎授閻伯璵刑部侍郎等制常衮門下古者參用名儒典領大郡或連書課績之最則次補公卿之缺今甄陶政化黜陟幽明若二千石理行第一中朝右職懸以相待俾長吏知勸至公大行銀青光祿大夫婺州刺史本州團練守提使上柱國閻伯璵銀青光祿大夫衢州刺史本州團練守提使樂陵縣開國男田季羔等早以文章侍從潤色綸言朝夕論思處正廷議名髙德厚推重周行歷踐藩部集作郡一其政理本經術以制事參禮法以訓人約已馭物集作儉以約已而下不勞靜以存誠而吏不擾風淳俗泰表率方州懋能入遷美選無易慎平秋典給事黃門副豫簡求以稱厥服伯璵可行尚書刑部侍郎散官勳如故季羔可行尚書給事中散官封如故主者施行授王翊刑部侍郎制常衮門下書曰惟敬五刑以成三德秋官之任也二卿良選其在兹乎充䇿回紇可汗使王翊力行近乎仁率性之謂道學以博物人能變風出入中外茂昭聲實靜而居易受不辭難使乎四方不辱君命斯之謂矣今丕蔽未明柬孚未允命爾作小司寇敬平邦憲在寬可行刑部侍郎授畢諴除刑部侍郎制杜牧敕士師臯陶之恤刑司寇蘇公之用獄既盡哀敬能致治平擢為大僚膺兹慎選出於豫志委以誠臣翰林學士朝散大夫守中書舍人上柱國平隂縣開國男食邑三百户賜紫金魚袋畢諴學臻閫奧文越拘攣常以忠信用為前後爰自郎署擢居內庭謀議有同於夀王竒異輒委於嚴助竭盡心力禆補機要既久嵗序須議遷升今者耕夫服田戎馬不駕欲使凡一手足皆獲措置是故用汝典豫刑罰汝其往哉吾今告汝吾聞孔子曰古之聽獄求所以生之今之聽獄求所以殺之宜念格言深思論要勉服休命以稱朕意可權知尚書刑部侍郎散官勳封賜如故禮部侍郎授楊綰禮部侍郎制賈至門下鯨鯢初懸理化未洽思敦馳騖之俗必𢎞亷退之風太常少卿兼修國史楊綰質稟天和才優大雅理能自暢學不為人自委身於周行孤立於中道喜愠莫形於顔色外物無得而親踈聲聞日髙志致彌逺固足以抑揚雅俗𢎞奬素風宜二職於南宫仍屬詞於東觀俾難進之夫增氣千仕之子知慙斫雕澄源朕志斯在可守禮部侍郎仍修國史餘如故施行授張謂禮部侍郎制常衮敕稱秩元祀春官職馬舉秀興亷國朝兼領非文儒碩茂鑒裁精實重於一時者不在此地中散大夫守太子左庶子上柱國河南縣開國子賜紫金魚袋張謂宏逹有檢和平易容豈道廣而難周亦言滿而無擇博涉羣籍通其源流振起鴻藻正其聲律翰飛北閣煥發司言居部長人不忘惠訓輔相東禁孝友彰明二宗伯之掌禮典諸侯之貢士以爾公望副兹眷求可守尚書禮部侍郎散官勳封賜如故授韋貫之禮部侍郎制白居易敕典郊祀之禮獻賢能之書今小宗伯實二其集作兼二事非直清明正者不足以處之中書舍人韋貫之沉實堅峻文以禮樂行成於內移用於官公直之聲滿於臺閣頃以詞藻選登禁掖秉筆書命時稱得人多集作久積勤勞宜有遷轉可使典禮以和神人可使考文以第俊秀儀曺之選僉議所歸往修乃官無替厥問可禮部侍郎餘如故授鄭薰禮部侍郎制鄭處誨敕儀曺劇任中臺慎擇總百郡之俊造考五禮之異同必求上才以允僉屬中散大夫尚書工部侍郎鄭薰髙陽茂族通德盛門秉莊氏之風規藴名卿之器業文諧騷雅鼓吹前言譽洽縉紳領袖時輩操守必修其謙柄進退常踐於德藩疊中詞科亟升清貫持橐列金章之侍揮毫擅紫闥之工二職冬官克揚休問是用俾司貢籍以振儒風朕以化天下者莫尚於人文序多士者以備乎時選育才之本惟善是從搴拔既尚於幽貞聳勸勿遺於曺緒無求冠玉無採雕蟲當思取實之方必有酌中之道爾其盡慮以率至公可守禮部侍郎工部侍郎授徐彥伯工部侍郎制蘇頲門下太中大夫前守蒲州刺史修文館學士上柱國開平縣開國子徐彥伯素履內融清暉外徹學究精密旁通儒者思含飛動髙視詞人名與時行位因才致河潤九里先美股肱邸留一月初榮侍從考功之任選衆攸稱可守尚書工部侍郎餘如故主者施行授蔣渙工部侍郎制常衮門下夫任賢之急在適於事要當其才難豈限階序况中臺政本司舉舊章六卿二職為今盛選銀青光祿大夫守右散騎常侍上柱國汝南縣開國公蔣渙忠信孝友周而不器得元和之純能以禮節有至靜之妙豈因物遷溢聲華於文藻潤理體於經術中外之職備更要重不失其正行之有恆自分貂蟬之列喻公卿之旨入告嘉猷直而不訐常執德於沖約亦忘情於進趨勤職已久所宜懋能百工惟時命汝典制可行尚書工部侍郎散官勳封如故主者施行文苑英華卷三百八十八
