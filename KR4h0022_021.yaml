body:
  text: 文苑英華卷二十一宋李昉等編嵗時一春思賦一首春賦一首惜餘春賦一首元日觀上公獻夀賦二首春思賦并序王勃咸亨二年余春秋二十有二旅寓巴蜀浮遊嵗序殷憂明時坎壈聖代九隴縣令河東柳太易英達君子也僕從逰焉髙談胸懷頗泄憤悶于時春也風光依然古人云風景未殊舉目有山河之異不其悲乎僕不才耿介之士也竊稟宇宙獨用之心受天地不平之氣雖弱植一介窮途千里未嘗下情於公侯屈色於流俗凛然以金石自匹猶不能忘情於春則知春之所及遠矣春之所感深矣此僕所以撫窮賤而惜光隂懷功名而悲嵗月者也豈徒幽宮狹路陌上桑間而已哉屈平有言目極千里兮傷春心因作春思賦庶幾乎以極春之所至析心之去就云爾析心王勃集作以析心若夫年臨九域韶光四極解宇宙之嚴氣起亭臯之春色况風景兮同序復江山之異國感大運之盈虛見長河之紆直蜀川風候隔秦川今年節物異常年霜前桞葉銜霜翠雪裏梅花犯雪妍霜前雪裏知春早看桞看梅覺春好思萬里之佳期憶三秦之逺道淡蕩春色悠揚懷抱野何樹而無花水何隄而無草於是僕本恨人平生自淪懷書去洛抱劒辭秦惜良會之道邁厭他鄉之苦辛忽逢邊候改遙憶帝鄉春帝鄉迢遞關河裏神臯欲暮風煙起黃山半入上林園玄灞斜分曲江水玉臺金闕紛相望千門萬户遙相似昭陽殿裏報春歸未央臺上看春暉水精却挂駌鴦幔雲母斜開翡翠幃競道西園梅色淺爭知北闕桞隂稀斂態調歌扇廽集作端身正舞衣銀蠶吐絲猶未暖金燕銜泥試學飛妾本幽閨學歌舞寧知漢代多巡撫前年齋祭謁甘泉今嵗笙簫祠后土桃花萬騎喧長薄蘭葉千旗照平浦見原野之秀芳集作方春憶山河之遂古長安路狹繞長安公子春來不厭看杏葉裝金轡蒲萄縷玉鞍聳蓋臨平樂回笳出上蘭上蘭經鄠杜揮鞭日將暮白馬新臨御溝道青牛近出章臺路章臺接建章垂桞復垂楊草開馳馬埓花滿鬬雞場南鄰少婦多妖婉集作婉嬈北里王孫駐行幰乍怪前春節候遲預道今年寒食晚傷紫陌之春度惜青樓之望逺紫陌青樓照月華珠帷黼帳七香車蛾眉畫來應幾樣蟬鬢梳時髻欲斜恨雕鞍之屆晚痛銀箭之更賖行行避葉步步看花自狂夫之蕩子集作因征夫之狂蕩成賤妾之倡家狂夫去去集作一去無窮已賤妾春眠春未起自有蘭閨數十重安知榆塞三千里榆塞連延玉關側雲間沉沉不可識蔥山隱隱集作隱嶙金河北霧裏蒼蒼幾重色集作程黑忽有驛騎出幽并傳道春衣萬里程龍沙春草遍瀚海春雪集作雲生疏勒井泉寒尚竭燕山烽火夜應明語道集作聞道河源路逺逺誰知集作教是夫壻苦行行君子塞外多霜露為想春園集作春臺起煙霧遊絲生集作空罥合歡枝落花自繞相思樹春望年年絶幽閨離緒切春色朝朝麗集作異邊庭羽書至都護新封萬里侯將軍稍定三邊地長斾猶銜掃雲色寶刀尚擁干星氣昨夜祁連驛使還征夫猶住鴈門關集作尚駐玉門關君度山川成白首應知嵗序歇紅顔紅顔一别同集作成胡越夫壻連征恨城闕羌笛唯橫集作橫吹隴路風戎衣直照關山月春色徒盈望春悲殊未歇復聞天子幸關東馳道煙塵萬里紅析羽搖初日繁笳集作弱非思曉風後騎猶分長樂館前旌已映洛陽宫洛陽宫城紛合沓離房别殿花初集作初周匝河陽别舍抵長河丹輪紺幰相經過戚里繁珠翠中閨盛綺羅鳳移金谷舞鶯引石城歌向夕天津洛橋暮爭驅紫燕黃牛度間居伊水國集作園舊宅邙山路武子新布金錢埓季倫欲償珊瑚樹復有西墉春務寡更值南津春望寫入金市而乘羊出一作行銅街而試馬葉抱露集作草犯春而爭密花牽風而亂下錦障縈山羅幃照野司空令尹之博物二陸三張之文雅新年柏葉之樽集有美字上已蘭英之斚斚集作酒醇春來併是春何啻兩違秦一作京春忽逢江外客復憶江南春羅衣乘北渚錦袖出東鄰江邊集作南小婦無形迹特怨狂夫事行役鳳凰山上花無數鸚鵡洲中草如積集作樹非春江淡容與春期無處所春水春魚樂春汀春鴈舉君道玉門關何如金陵渚為問逐春人年光幾處新何年春不至何地不宜春亦有當春逢逺集作新客亦有當春别故人風物雖同候悲歡各異倫歸去來春山恣間放蕙畹蘭臯行可望何為悠悠坐惆悵比來作客住臨卭春風春日自相逢石鏡巖前花屢密玉輪江上葉頻濃髙平灞岸三千里少道梁山一萬重自有春花煎别思無勞春鏡集作日照愁容盛年眇眇辭鄉國長路遙遙不可極形隨朗月驟東西思逐浮雲幾南北春蝶參差命儔侣春鶯綿蠻思羽翼余復何為此方春長歎息會當一舉絶風塵翠蓋朱軒臨上春朝升玉署調天紀夕憩金閨奉帝綸長卿未達終希達曲逆長貧豈剩貧年年送春應未盡一旦一作嵗嵗逢集作宜春自有人春賦李雍肇木德以周仁啓春生而賦質二儀泰而廣運三正合而元吉和氣藹兮充宇光風瀏兮被物豈因時而則舒亦樂道而奚恤我聖君大撫萬國肆覲羣后受天之禧嘉嵗之首文物粲於南宫兵戈森於北斗攬百辟以同心貢千春之遐夀於是明詔有司攄求時令邁惟一之德究吹萬之性勦土木之庶一作共功阜稼穡之勤政畋漁止殺狴牢復命至若固隂往閉蟄户未開蛇盤地蓄燕伏巖猜穴蟻斂翼氷魚鼓鰓蠢蠢宛委戢戢低徊遲擊蒙兮久矣耿獻嵗兮悠哉謂將死而沒代俄一作忽作解而驚雷廓視聼於玄壤脫飛騖於焚萊瞰青陽以書物事白日而登臺觀乎旬時甫田宿昔曽薄驚洪鑄之神用偉元化之工作卷山河之變衰置天地之和樂律何谷而不暄光何容而不灼植也知歸動焉咸若爾乃楊回曲沼李雜芳園條煙濃而曳地花錦縟而當軒玉顔景照羅袂風翻惋良人之愆信省賤妾而銜恩蝶栩栩兮夢感鳥嚶嚶兮思存戞瑶柱以絙瑟引金斚而浮樽俯侯軒而下泣貽韶物而何言借如老軍追北逺使窮河宵驅鳥逝野次星羅氷皚皚而雪下風颯颯而霜過遲日一煦挾纊嘗多遣疇嵗之寒粟襲初節之妍和千巖為之動色萬壑為之流波將回轡而秦望請舉手而豳歌則有第髙公族鼎貴侯家丹樓纒於御道畫閣疑作閣聳於朝霞明珠買妾黃金擲蛙列行逰衍直視驕奢跨浮雲之寶騎頓流水之香車漫平郊而藉草總上苑而觀花飛鞭蹴鞠旋舞琵琶麾戚里之途逺駐長安之日斜豈知夫東門在野北渭需沙散歸間之召父隱養正之薑牙趣下里之潦倒喧樂士之繁華苟炙背而垂釣但開田而種瓜惜餘春賦李白天之何為令北斗而知春兮回指於東方水蕩漾兮碧色蘭葳蕤兮紅芳試登髙兮逺望一作望逺極雲海之微茫魂一去兮目一作欲斷淚流顔一作頰兮成行吟清風兮一作青楓而詠滄浪懷洞庭兮悲瀟湘何余心之縹眇兮與春風而飄揚思飄揚兮無限一作飄揚兮思無限念佳期兮莫展平原萋兮綺色愛芳草兮如剪惜餘春而一作之將闌每為恨而一作兮不淺漢之曲兮江之潭把瑶草兮思何堪想逰女於峴北愁帝子於湘南悵無晤一作恨無極兮心氤氲目眇眇兮憂紛紛披衛情於淇水結楚夢於陽雲春每歸兮花開花已闌兮春改歎長河之流春一作速送馳波於東海春不留兮時已失老衰颯兮情逾疾一作老衰颯而徒疾在又作老衰颯兮情逾在恨不得挂長繩於青天繫此西飛之白日若有人兮情相親去南越一作國兮往西秦見逰絲之橫路網春輝以留人沉吟兮哀歌躑躅兮傷别送行子之將逺看征鴻之稍滅醉愁心於垂楊隨柔條以糾結望夫君兮咨嗟橫危涕一作涕淚兮怨春華遙寄影於明月昔送一作送夫君於天涯凡一作皆文粹元日觀上公獻夀賦以題為韻王起嵗移木德春變銅渾觀上公之獻夀表南面之居尊贊以至誠俾天長而地久陳乎盛禮亦星列而雷奔所以上增景物所以下答湛恩豈徒閲夫濟濟而炫彼元元時也百辟無譁九賔有秩玉帛林會簮裾櫛比聲明叶于載陽天文宜於初吉於是紫殿晝皇輿出仰之如天就之如日獻大君之夀善頌善禱覿元老之儀匪徐匪疾皤皤元老首出朝端仰紫宸而展敬回黃閣而即安振冠劔之翼翼曵環珮之珊珊既進退而有度亦容止而可觀將奉一人之慶而為萬國之歡逺映珠旒旁臨霜仗赫赫在下明明在上奉觴而進持盈有俯僂之容祝夀而旋慶賜被鴻恩之暢應千年而莫厚宅百揆而誰讓祥光郁靄佳氣蔥蘢時剡剡以趨履每兢兢而鞠躬拱北辰之尊不異乎台居列宿獻南山之夀更聞其嶽視三公既而天顔回眷堯酒畢獻乾坤永固上下無怨禮循牆而已退福如茨而咸勸則山呼萬歲徒稱漢日之祥天錫九齡詎比周年之願諒羲軒之道洽實伊容之德建冝乎景祿克受賡歌不朽如岡如陵可大可久亦何待華封之祝然後增堯之夀第二同前韻惟皇御厯也播一德之景光統三正之令日端大裘於正位酌中靈於休吉元老伏稱於丹墀大夫建祚於聖術致君夀日比華封而祝堯獻酒福廷與鈞天而合律于時銅龍啓曙文物斯崇六英鏗鏗而迭奏萬國鏘鏘而會同上方端玉珽儼宸衷布發生之明命暢大化於玄功欲以宣景福於遐邇同介祉於君公夀獻南山率土願歌於周雅位登北極惟仁亦播乎薰風既而舞蹈於丹禁之前再拜奉陶唐之酒趨雲陛以陳詞向爐煙而稽首升降濟濟將宣納祜之晨俯仰愔愔大啓如天之夀進退有則威儀可觀頌百靈於更始贊萬祀於履端傳喜氣而六平以正布春令而五教在寬故知我道化無疆德風吹萬皇猷大啓青陽始建千秋御厯既同傅氏之詞五采綴觴有異邯鄲之獻慶流華夏德配乾坤傳呼而珍符畢集應時而嘉瑞實繁所以麟鳳來祥於聖澤日月揭光於化元士有觀國之光賡歌大貺當元正之令節仰禮容於仙仗佩聲的皪大矣三公之儀瑞氣絪緼邈乎九天之上文苑英華卷二十一
