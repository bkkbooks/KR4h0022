body:
  text: 文苑英華卷八百六十八宋李昉等編釋十九杭州鹽官縣海昌院禪門大師塔碑一首彭州九隴縣再建龍興寺碑一首宣州新興縣寺碑一首魏州故禪大德奬公塔碑一首杭州鹽官縣海昌院禪門大師塔碑盧簡求奧若大師示滅之四月院主僧法昕萃諸門人授簡於簡求曰若之師深索禪悅為本宗之門人前時來謁我師一言有得今將以是月十七日謹護法器藏於靈龕緣徽烈於樂石者非子而誰歟簡求於義無文字之解辭不得已乃粗舉其要以備用焉師諱齊安知者謂帝系之英髙門之出先人因難播越故師生于海汀郡焉深避世榮終祕族氏尊其雅尚故亦不書在胎而夢日兆祥既孕而神光下燭數嵗有異僧欵門召見摩其頂曰鳳穴振儀龍宫藏寶紹隆之業其在斯乎及丱亟請出家父母呵止之師曰祿利之養止於親爾𡨕報之利不其逺耶圭組之榮止於家爾濟拔之利不其廣耶父母感悅而順聽遂依于本郡雲宗禪師雖勤榮謙默和光同塵而螢月殊輝雞鶴異態矣當年受具及詣南嶽知嚴一作知巖律師外檢律儀內照實相非修非證雅會真詮後聞南康之龔工山大寂大師隨化度人慈緣幽感裹足振錫不日而至本師竒而悅之乃以辨惠暢其指歸俾於利那而登妙覺及大寂蛻去盡力送終後逰於他方爰𢎞於般若且曰胎卵濕化無非佛種行住作卧皆是道場方便隨迎各安性類妙心法眼其有限乎元和末師春秋已逾七十而居越蕭山之法樂寺寺古製陋垣屋靡完補壞扶傾不克宴坐時昕於海昌放生池壖廢地肇葺禪居焉修廊大殿彩壁層甍罛罶自屏鱗介咸若昕謙不自有延請我師慕學之徒從而至者日比百數逮今委化年登二紀釋子仰食信士擅施粳稌糗餌蔬果飴糖無精粗之分别無凶禮之隆殺星馳阜積莫辨誰何非冥報勝因何以臻此師不言寒暑不下堂廡無留盼無傾聽如此者蓋有年矣每五日開法四座屏氣直心示一作下體引經證心法外無言叩之即應不分迷悟矧勝負之機耶不有定慧矧是非之相耶與夫顯神通而振道業者固相逺也而又法身魁岸相好莊嚴眉毛紺垂顱骨圎聳望之者如仰髙華而揖滄溟曽不測乎髙深者也於戲德攸天縱為傳教之法雄道實生知蓋積習於聖位聆其風者皆曰不可思議粵以會昌壬戌嵗十二月二十一日泊然宴寂俄爾示滅先時而竹柏盡死至是而精彩益振爰有清響扣戶祥光滿室如環佩之鏗鳴若劔戟之交射示現之相豈由於我哉嗟乎流禪河於法海寧有盡期詮群品于三乘同歸聖果今也徒瞻相妙永閟輝容橋壞玄津雲貍瑞日學徒信士哀可既乎是用追採遺言重宣教肯銘曰人心常靈法證常明定慧一相有無俱名於此有得自師歸寂一作自歸空寂近取諸身胡云不識五千尊經何限奧義迷者見文悟者見意見者無住指即是處醫病未除徒勞回顧我行慈悲示爾蚩蚩無鑿髙原自有清池大師之言一一真詮不疑不怖同歸善緣彭州九隴縣再建龍興寺碑陳會郡之雉東方萬楹橫空屹然麗譙之欲造乎天倪者某名曰再建龍興之佛寺焉厥初寺號大空天授二年為大雲我唐開元中詔號龍興會昌五年廢為間地僧俄巾像示滅鐘聲絶耳樓臺為薪吁呼表成毁哀之數者其實在言然而不知言者徒行咨坐歎以為吾釋門之大教將灰燼於今日矣殊不知流濁者攪而清籺多者簸而精繇是未經嵗我皇馭九土懷八荒以為我之提大化也無欲其一事之不得其所於我也而况釋之教毗我之為理者深可取焉𢎞大法則生死皆無是鎖我之七情也推小乘則禍福皆有是割人之衆惡也惡之興我刑止於殺惡之釋我刑惟其生繇由澄上流禁浮俗曽何以異我之理焉繇是我負扆玄郊而復詔天下使率土郡府各復其寺寺之數郡府有差釋之數男女一致其於夫彭為郡得復寺之二焉二之數龍興居一一寺度僧三十精選進一作潔行能臻不二之門者居其右焉開須逹之園者抑其次矣謹住持善完緝使材無遺用衆有所歸肩一心紹前搆不瞬目使其寺如從踊出者其慎選得人力焉其始也披蒿萊割榛莾重疊敗棟草創危梁嚴贊頌晝夜以聳其信心示因果教化以開其衆意既而逺近咸萃耆艾必疑作畢臻浹月疊旬資糧山峙嘯良工度貞木繚以周墻七百餘尺一旦二字疑作亘以備廓間百十四然後中堂雲搆三門洞開儼八臂之瑞容赩丈六之金質峥嶸曤落哉飾遽宇而鳳欲狂飛抱危梁而蟉將拗力吁呼􅌄窱瓌嚴固不可一二言之也况乎列開講宇周繪四牗東序設以聖神部五合沓西廂施治無畏常晬慈容然後倣以天途寫其地府笙鏞鐃鈸嘗聞真界之音鼎鑊砧鎚盡載酆都之苦是使即之者勇善望之者悛惡誠象設之多岐亦針規之别户者也况創浮圖建寶剎請金口之妙典萬軸玉崇銘佛頂之具言講幢珠綴是知摩勝建寺豈滯有為如來葺門寧妨無著以是因復寺而破性相者以為空寂兩忘方歸真諦性相俱在未入妙塗如是則理乖圓對法閡影從俾迷方者盡不得出於三途溺川者何緣極於五衍茫茫八表盡從心猿浩浩羣生誰調意馬因知空寂與性相同途性相與空寂易軌非性相無以臻空寂非空寂無以見性相是知性相為空寂之筌蹄空寂因性相而超度如是則寺不得不復道不得不𢎞捨之不可猶四教之在躬為之則無何三乘之别載大矣哉釋教之復興者其於誨誘弼化不可得而名也而况彭門地控山河俗多獷悍邪正相軋是非堅明雖五刑具設誠足以攝其威而百法俱陳固可以斂其惡豫剖符是郡星欲二周守成之下螟螣望境而他飛行化之物疑商旅乘風而沓至以是公多暇日因諾衆長老與鄉之鮐耋之請而書復寺之嵗月以廣其一二焉銘曰吾皇混一三教兮復建仁祠復之多少兮其數甚冝不屈土木兮不奪耕機吮筆紏窮兮日用不知上或以之為定制兮不熾不衰寺之一復兮衆知其非宣州新興寺碑盧肇至哉邃古已集作以來天之永錫正命者其惟帝唐乎聖祖神宗光啓土宇垂億萬祀克承休嘉莫不以禮樂先兆人以慈儉任天下仁居惠住營魄離者而其施猶存揭淺厲深心迹泯者而厥功亦在常善救人常善救物非至德誰能二字集作其孰能普行之故鬼神受祉黎元樂康寶祚延洪率由此道也於是表大覺為靈根與羣生共有叩真空而不壞惟聖者獨知非崇夫金輪氏之教則焉得窮理盡性齊萬法於物我哉是以沉善惡乎洗集本文粹並依澆妄之泉擢枝莖乎植性之囿常令學者崇飾集作飭精廬顯有唐二本作唐堂皇亦如庠序郡國分理必付元臣將俾羣生罔不開悟且夫斯干秩秩止在周邦靈宫彤彤唯居魯國曷有列剎映乎霄皓飛甍麗乎陽光瞻彼玉毫儷然金地翬軒雕睆岫聳雲攢遍於州郡若斯之美與若夫宣城新興寺者會昌四年既毁大中二祀故相國太尉裴公之所立也公諱休字公美河東聞喜人代濟文德洎公彌大擢進士甲第科登直言制首未三十由捨遺遷殿內鴻名偉望迭處清雄入奉絲綸出省風俗拜春官則齊驅驥騄視民部則克阜生齒至於調入王府貨出水衡洎涉台司亦勞厥事凡三拜廉察五授莭旄孫先生有愧知兵山巨源當慙視史二本作史揆路既長乎百羣荆門復平乎水土公降由辛未歸以甲申為唐碩臣作佛大士光珉顯竹此不復書所至之邦必興修淨行大中二年拜宣城常興名緇會難有設疑以試公者曰三界虛妄群生顛倒可二本作何有修行能解纒縳孰為智慧可二本作何化凡愚胡為乎公之區區徒自撓耳公曰噫嘻珠玉在櫝啓之則見其珍聖賢有門行之則踐其閾分塗而往惟善惡焉善惡如東西耳趣之不已則至其所焉在乎推心於不染馭馬於無塗也如是三界信真實羣生非顛倒但學者不能窒欲攘貪遺名去利弗捨有漏而思住二本作往無為耳然捨之自我取不由人非用智慧解彼纒縳如此則了無一物以撓吾真也他日門人有謂公曰敢問三界之言未立人不知修行不知因果畏隂隲者不為之多介景福者不為之少理亂增損繫乎其時洎斯教也行乎諸華愚人畏罪以損其惡賢者望福以增其善增之不已則至今當盡善矣損之不已亦至今宜無惡矣何昏迷暴虐無減於秦漢之前福慧聰明不增於魏晉之後歸之者殊途輻湊立之者萬法雲興稽諸天下見其文求諸古莫有其法號為大聖作天人師是宜使吾人盡升覺路不冝使蚩蚩庶類由古迄今若斯爾之文粹作若斯之者也集作若斯之感設使集作或像法至今未行將盡墮惡道為鬼為蜮乎夫法未始有今而有之希聖之徒可存而知之也其由之之固庸非溺乎公笑謂之曰大昭肇啓法不齊二本作濟備聖人繼作代天為工結繩畫卦質文滋變一聖立一法生天道人事顯若符契夫燧人氏之未為火也則天無火星人無火食龜無火兆物無火災必矣少昊氏之未理金也則天亦二本無亦字下同無金星人亦無金用龜亦無金兆物亦無金災必矣及聖人攻木出火鍛石取金於是乎精芒主宰騰變上下則知世法時事隨聖而立佛二本無此四字聖人也考精神之原文粹作源窮性命之表作大方便護於羣生受之而不知蓋由天道運行物以生茂皆謂自己孰知其然也於是問者廓然自得佛味武宗時毁寺而宣之新興故有崇基廣厦文甓雕甍鞠為土梗唯喬柯灌木森聳澗澞二本作壑祥煙翠藹二本作靄交覆巖麓耳及宣宗詔許立寺宣之四人相鼓以力二本作萬請先立之於宣郛公獨不許遂命苾芻上首元敬謂之曰吾聞之新興寺大歷初有禪師巨偉南宗之上士也與北宗昭禪師論大慧綱明實相際於此始作此山道場後有浩禪師作草堂於道場西北其旁有藻律師居之逮二本作律師去世間人立塔院貞元中巨偉之門人靈翹始請於太守合三院而為寺彼皆知慧傑出親啓山林今之立寺無以易此也議定郡東故有妙覺寺寺雖毁而杉檜多大十圍一旦有二龍鬬谷中拔大樹三十二視之皆殿宇之材也公嘆曰將立寺而龍拔巨樹天其有意乎遂用之於是霜斤沐楹玉砂瑩礎上下其響音中桑林不期年集作月而雲攢肆榮風搖寶鐸蟉拏六扇月照金鋪勝絶集作紀一源繚墻百雉繕修多羅為攝受置無盡藏為莊嚴􅌄窱幽邃輪奐博敞蓋江南之首出也初奉詔𨽻僧二文粹作三十人今其存者太半搆殿立門有軒有廡則律師元敬法華道延首其事編經立藏不遺句偈則維摩從省禪門真會著其功善集檀施備修房廊學于三時旁窺六義則金剛清越服其勤而法華遂言涅槃明則洎法林超度皆以禪學為宗律師道隨宜春人幼植浮行行二本作得是泥洦二本作泛妙旨一日二字二本作直以披文相質之事造余于新安余既許之道隨復言繼二十人者皆苦二本作善修持一作行能遺物纍則有應玄友恭道幽仁寶懷賁從儉惟恭文明文粹作昉師回師宗思靜常政文暢𢎞暢契蒙景先法進惟勤志𢎞玄操與前輩又為三二本作二十人矣而太尉所立有殿內千佛有地藏院有上方石盆院又以俸錢入膏腴之墅為地藏昌大定中之謀始于太尉太尉作之門人述之有作有述誰曰不然乃為文二本作銘曰奕奕新興敬亭南麓巨搆崇基峥嶸煜煜伊昔既毁二本作廢神愁鬼毒洎將再營二本作榮天人合福赩有逴龍其怒則觸助作棟楹拔此巨木雨運風移騰文粹作謄川跨陸神怪戮力老幼同心蚨翼飛貨龍鱗布金揭立赫奕化成嶔崟玉礎方丈花臺百尋日明香到雲生寶林太尉裴公聳其學者𢎞以戒光甘露披灑示厥有為取彼難捨必有精靈扶持大厦小儒刻石有慙史野水言欲之庶近風雅魏州故禪大德奬公塔碑公乘億蓋聞妙諦惟玄不可以一理測真詮至奧不可以諸相求隨萬化而泯色空而不生不滅超三界而越塵垢故無去無來此乃不思議者其惟西方釋迦牟尼佛之謂乎伏自教傳西域化被中原漢明推入夢之祥梁武顯施身之願語其大也外不見須彌之廣言其小內不知知芥子之微斯乃梵璽褒疑作褻然代代相付肇自摩訶迦葉迄于師子尊者統為二十三代而後逹摩多羅降于漢土至能秀分之為七而後苞披葉附派别脈分其真宗不泯不滅者則我大覺大師固有系焉和尚姓孔字存奬家本鄒魯即闕里之裔孫也乃祖乃父因官𨽻於薊門歷祀既深籍同編人和尚以無量劫中修菩薩行及兹降世豈同凡倫當衣采之妙齡蓄披緇之大志未逾七嵗即悟三乘啓白所親懇求剃落遂於薊三河縣盤山井泉院依止禪大德曉方一有而字乃親承杖屨就侍瓶盂啓顧全身惟思半偈大中五年伏遇盧龍軍莭度使張公奏致疑作置壇場和尚是時戒相方具而後大中九年再遇侍中張公重起戒壇於涿郡請和尚以六踰星紀三統講筵宣金石之微言示玉毫之真相三千大千之世界靡不瞻依十一十二之因緣竟無凝滯禪大德玄公者即臨濟之大師也和尚一申禮謁得奉指歸傳黃蘖之真筌授白雲之祕訣所謂醍醐味爽乍灌頂以皆醒薝蔔花香才經手而分馥一旦旋辭舊剎願歷諸方西自京華南經水國至於攀蘿冒險踏石眠雲經吳會興廢之都盡梁武莊嚴之地無不追窮聖迹探討禪宗後過鍾陵伏遇仰山大師方開法宇大啓禪扃赴地主之邀迎即違言疑相公會天人之供施而陳奧義衆莫能分和尚立以剖之如刀解物仰山目眙擊指稱歎再三遽聞臨濟大師已受滿相蔣公之請才凝省侍飛錫而遽及中條尋獲參隨致林疑作置柸而將渡白馬當道先太尉中令何公専發使人迎請臨濟大師和尚翼從一行不信宿而至於府下而乃止於觀音寺江西禪院而得簮裾繼踵道俗連肩曽未期年是至遷化斯蓋和尚服勤道至展敬情深無乖靈堵之儀克盡茶毗之禮云乾符二年有幽州莭度押兩蕃副使檢校祕書兼御史中丞賜紫金魚袋董廓及幽州臨壇律大德沙門僧惟信并涿州石經寺監寺律大德𢎞嶼等咸欲指陳盤嶺祈請北歸和尚欲狗群情將之薊部晨請衙庭啓述行邁先時中丞韓公之叔曰贊中遽聞告去撫掌大驚乃曰南北兩地有何異也魏人何薄燕人何厚如來之敬豈如是耶和尚辭不獲已許立精舍韓公之叔常侍及諸檀信鳩集財貨卜得勝槩在於南甎門外通衢之左成是院也有如化成松柟將把椇俱來文石與碔砆荐至重廊復道竹翠松青四户八窗風輕月朗和尚樂兹幽致用化羣迷開解脫門演無量法能使天花散地水月澄空常與四衆天人皆臻法要六州士庶盡結勝因豈謂一念俱尸奄從物化斯乃文德元年七月十二日也享齡五十九僧臘四十一有親信弟子藏暉一作暐行簡一以主喪一以傳法大德奉先師之遺命於龍紀元年八月二十二日於本院焚我真身用觀法相闔城禪律繼踵爭來四逹簮裾連肩悉至於是幡花蔽日螺嗔喧天火才發而雲自愁薪不加而風助勢三日三夜號禮如斯於香燼之中得舍利一千餘粒諸寺大德各各作禮請分供養於戲雪㲲如故其儀宛然捧一履以徒悲仰雙林而莫見遂建塔于府南貴鄉縣薰風里附於先師之塔志也憶到職之初曽獲瞻禮法主大德藏暉不以億才業庸淺具聞於我公相請撰斯文億秉筆惕然得盡蕪鄙銘曰傳如來教厥惟大雄百千劫外方丈室中慈悲是念色相空端然不動豈染塵蒙其一矯迹三界安心四禪身雖是􅖍道本無邉璞內有玉火中生蓮傳法何處隨其有緣其二越絶攴道匡廬逺公髙情逺致迹異心同既離邪縳肯處凡籠松軒竹徑空悲夜風其三我性不動我心就燃果得舍利粒粒珠圓幡花艷閃螺嗅交連唱偈作禮聲徹梵天其四寶剎新建招提舊蹤蓮芳不見䓤嶺誰逢響亮朝磬清泠夜鐘歷千萬祀傳我禪宗其五文苑英華卷八百六十八
