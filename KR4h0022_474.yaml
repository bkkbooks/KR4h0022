body:
  text: 文苑英華卷四百七十四宋李昉等編䇿問十九道華州試進士問五道試進士問九道試進士問五道乾元元年華州試進士䇿問五道杜甫第一道問古之集無此二字山林藪澤之地各以肥磽多少為差故供甲兵士徒之役府庫賜豫之用給郊社宗廟之禮奉養祿食之出辨乎名物存乎有司是謂公賦知歸地著不撓者已今聖朝紹宣王中興之洪業于上庶尹備山甫補衮之能事于下而東寇猶小梗率土未甚闢總彼賦稅之獲盡贍軍旅之用建集作逮是官御之舊典闢矣人神之攸序乖矣欲使軍旅足食則賦稅未能充備矣欲將誅求不時則黎元轉罹於疾苦矣子等以待問之實知新之明觀志氣之所存於應對乎何有佇渴救弊之通術願聞強學之所措意道在此矣得遊說乎第二道問國有軺車廬有飲食古之案風俗遣使臣在王官之一守得馳傳而分命蓋地有要害郊有逺近供給之比省費相懸今兹華惟襟帶關逼輦轂行人受詞於朝夕使者相望於道路屬年嵗無蓄積之餘職司有愁痛之色集作歎况軍書未絶王命急宣插羽先翥於騰鷹弊帷不供於埋馬豈芻粟之勤獨爾實驂騑之價闕如人主之軫念屢及於兹邦伯之分憂何嘗敢怠乞恩難再近日已降水衡之錢積骨頗多無暇更入燕王之市欲使輶軒有喜主客合宜閭閻罷杼軸之嗟官吏得從容之計側佇嘉論集作新語當聞適集作齊時第三道問通道陂澤隨山濬川經啓名賢策問作啓闢之理疏奠名賢䇿問作鑿之術一作跡抑有可觀其來尚矣𥘉聖人盡力溝洫有國作為隄防洎後代控引淮海漕通涇渭因舟楫之利逹倉庾之儲又賴此而殷亦行之自久近者有司相土决彼支渠既潰渭而亂河竟功多而事寢人實勞止岸乃善崩遂使委輸之勤中道而棄今軍用蓋寡國儲未贍雖逺方之粟大來而助挽之車不給是以國朝仗彼天使徴兹水工議下淇園之竹更鑿啇顔之井又恐煩費居多績用莫立空荷成雲之鍤復擁闐名賢策問作墳淤之泥若然則舟車之用大小相妨矣軍國之食轉致或闕矣矧夫人煙尚稀牛力不足者己子等飽隨時之要挺賔王之資副乎求賢敷厥讜論第四道問足食足兵先哲雅誥蓋有兵而集無而字無食是謂棄之致能掉鞅靡旌斯可用矣况寇猶作梗兵不可去日聞將軍之令親覩司馬之法關中之卒未息灞上之營何逺近者鄭南訓練城下屯集贍彼三千之徒有異什一而稅竊見明發教之集作以戰鬬亭午放其庸保課乃菽粟集作麥以為尋常夫悅以使人是能用古伊嵗則云莫實慮休工文粹作土未卜及瓜之還交比翳桑之餓群有司自救不暇二三子謂之何哉第五道問昔帝堯之為君也則天之大敬授人時十六升自唐侯者已昔帝舜之為臣也舉禹之功克平水土三十登為天子者已本之以文思聰明加之以勞身焦思既睦九族協和萬邦黜去四凶舉十六相故五帝之後傳載唐虞之美無得而稱焉易曰君子終日乾乾詩曰文王小心翼翼竊觀古之聖哲未有不以此集無此字君唱於上臣和於下致乎人和年豐成乎無為而理者也主上躬純孝之聖樹非常之功內則拳拳然事親如有闕一作待外則悸悸然求賢如不及伊百姓不知帝刀庶官但恭已而已寇孽未平咎徴之至數也倉廪未實物理之固然也今大軍虎步列國鶴立山東之諸將雲合淇上之捷書日至二三子議論𢎞正詞氣髙雅則遺祲蕩滌之後聖朝砥礪之辰雖遭明主必致之於堯舜雖降一作降及元輔必要之於䕫臯集作稷卨驅蒼生於仁壽之域反淳朴於羲皇之上自古哲王立極大臣為體眇然坦途則何往不頁集作利川往何順子有說否庶復見子之志豈徒瑣瑣射䇿趨競一第哉頃之問孝秀集作麻取備尋常之對多忽經濟之體考諸詞學自吐文章在䇿以徴事曷成凡例焉今愚之粗徴貴切時務而已夫時患錢輕以至於量資幣權子母代復改鑄或行乎前榆莢後契刀當此之際百姓䝉利厚薄何人所制輕重又穀者所以阜俗康時聚人守位者也下至十室之邑必有千鍾之藏茍凶穰以之貴賤失度雖封丞相而猶困侯大農而謂何是亦一作以繼絶表微無或區分踰越䝉實不敏仁逺乎哉進士䇿問韓愈第一道問夫子既沒聖人之道不明蓋有楊墨者始侵而亂之集有其時二字天下咸化而從焉孟子辭而闢之則既廓如也今其書尚有存者其道可推而知不可乎其所守者何事其不合於道也集作者幾何孟子之所以辭而闢之也一無也字者何說今之學者有學於彼者乎有近於彼者乎而集作其已無傳乎其無乃化而不自知乎其無傳也則善矣如其尚在將何以救之乎諸生學聖人之道必有能言是者其無所為讓第二道問所貴乎道者不以其便於人而得於已乎當周之衰管夷吾以其君伯九合諸侯一匡天下戎狄以微京師以尊四海之內無不受其賜者天下諸侯奔走其政令之不暇而誰與為敵此豈非便於人而得於已乎秦用商君之法人以富國以强諸侯不敢抗及七君而天下為秦者商君也而後代之稱道者咸羞言管商氏何哉庸非求其名而不貴其實歟願與諸生論之無惑於舊說焉第三道問夫子之言曰盍各言爾志又曰居則曰不吾知也如或知爾則何以哉今之舉者不本於鄉不序於庠一朝而羣至乎有司有司之不知也宜矣今將自州縣始請各誦所懷聊以觀諸生之志死者可作其誰與歸集有又曰居是邦也六字事其大夫之賢者友其士之仁者敢問諸生之所事而一有所字友者其誰乎所謂賢而仁者其士集作事如何哉言及之而不言亦君子之所不為也第四道問春秋之時百有餘國皆有大夫士詳於傳者無國無賢人焉其餘皆足以充其位不聞有無其人而闕其官者春秋之後其書尤詳以至於吳蜀魏下及晉氏之亂集作下及晉魏氏之亂國分如錙銖讀其書亦皆有人焉今天下九州四海其為土地大矣國之舉士內以明經進士外有方維大臣之薦其餘以門地勳一作勢力進者又有集作加倍於是其為門户多矣而自御史臺尚書省以至於中書門下省咸不足其官豈今之人不及於古之人耶何求而不得也夫子之言曰十室之邑必有忠信如丘者焉誠得忠信如聖人者而以委一作而為之以大臣宰相之事有不可乎况於百執事之微者哉古之十室必有任宰相大臣者今之天下而不足士大夫於朝其亦有說乎第五道問周易之說曰乾健也今考乾之爻在𥘉者曰潛龍勿用在三者曰夕惕若厲無咎在四者曰無咎在上者曰有悔卦六位一勿用二茍得無咎一有悔安在其為健乎又曰乾以易知坤以簡能乾之四位既不為易矣坤之爻又曰龍戰于野集有其血𤣥黃四字戰之於事其足為簡乎易六經也學者之所宜用心焉願施其辭陳其義焉第六道問人之仰而生者在榖帛既豐無饑寒之患然後可以行之於仁義之途措之於安平之地此愚智所同識也今天下穀愈多而帛愈賤人愈困者何也耕者不多而穀有餘蠶者不多而帛有餘有餘宜足而反不足此其故又何也將以救之其說如何第七道問夫子言堯舜垂衣裳而天下理又曰無為而理其舜也與書之說堯曰親九族又曰平章百姓又曰協和萬邦又曰厯象日月星辰敬授人時又曰洪水懷山襄陵下人其咨夫親九族平章百姓和萬邦則天道授人時愁水禍非無事也而其言曰垂衣裳而天下理者何也於舜則曰慎集有徽字五典又曰叙百揆又曰賔四門又曰齊七政又曰類上帝禋六宗望山川遍群神又曰協時月正日同律度量衡五載一巡狩又曰分十二州封集作隨山濬川恤五刑典三禮彰施五色出納五言嗚乎其何勤且煩如是而其言曰無為而理者何也將亦有深辭隱義不可曉耶抑其年代逺矣集作已逺失其所集無所字傳耶二三子其辨焉第八道問古之學者必有所師以通其業成就其德者一無者字由漢代集作氏已來師道日微然猶時有授經傳業者及于今則無聞矣德行若顔回言語若子貢政事若子路文學若子遊猶且有師非獨如此雖孔子亦有師問禮於老𣆀問樂於萇𢎞是也今之人不及孔子顔回逺矣而且有所師然其不聞有業不通而道德不成者何也第九道問食粟衣帛服仁行義以俟死者二帝三王之所守聖人未之有改焉者也今之說者有神仙不死之道不食粟不衣帛薄仁義以為不足為誠何道耶聖人之於集作于下人猶父母之於子有其道而不以教之不仁其道雖有而未知之不智仁與智且不能又烏集作焉足以為聖人乎不然則說神仙者妄矣試進士䇿問元和二年為府試官作白居易第一道問禮記曰事君有犯無隱又曰為人臣者不顯諫夫夫字集作然則不顯諫者有隱也無乃失事君之道乎無隱者顯諫也無乃失人臣之節乎語曰不知命無以為君子易曰樂天知命故不憂語又曰君子憂道不憂貧斯又憂道者非知命乎樂天不憂者非君子乎夫聖人立言皆有倫理雖前後上下若貫珠然今離之則可以旁行合之則不能一集作同貫豈精義有二耶抑學者未達其微㫖耶第二道問夫集作夬字大時不齊大信不約大白若辱大直若屈此四者先聖之格言後學之彛訓有國者酌之以行化也立身者踐之以修已也然則雷一聲而蟄蟲蘇勾萌逹霜一降而天地肅草木衰其為時也大矣斯豈不齊者乎日月代明而晝夜分刻漏者凖之無秒忽之失焉春秋代謝而寒暑節律吕者候之無黍纍之差焉其為信也大矣斯豈不約者乎堯讓天下而許由遁周有天下而伯夷餓其為白也大矣斯豈辱身者乎桀不道龍逢諫而死紂不道比干諫而死其為直也大矣斯豈屈已者乎由是而觀有國者立身者就之久矣衆君子試為辨也集作之第三道問大凡人之感於事則必動於情發於歎興於詠而後形於歌詩焉故聞蓼蕭之詠則知德澤被物也聞北風之刺則知威虐及人也聞廣䄂髙髻之謡則知風俗之侈集作有蕩也古之人君者採之以補察其政經緯其人焉夫然則人情通而王澤流矣今有司欲請於上遣觀風之使復採詩之官俾無逺近一作邇無美刺日採於下嵗聞於上以副我一人憂萬人之㫖識者以為何如第四道問百官職田蓋古之稍食也國朝之制懸在有司兵興已還吏鮮克舉今稽其地籍則田亦具存計以户租則數多散失至使內外官中有品秩等局署同而厚薄相懸不啻乎十倍者斯積弊之甚也得不思革之乎請陳所宜以救其失第五道問穀帛者生於下也泉布一作貨者操於上也必由均節以致厚生今田疇不加闢而菽粟之價日賤桑麻不加植而布帛之估日輕懋力者輕用而愈貧射利者賤收而愈富至使蠶農益困遊手益繁夫然豈穀帛斂散之節失其宜乎將泉貨輕重之權不得其要乎今天子方䇿天下賢良政術之士親訪利病以活元元吾子若待問於王庭其將何辭以對文苑英華卷四百七十四
