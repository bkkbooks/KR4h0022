body:
  text: 文苑英華卷二百十七宋李昉等編人事四宿會七十五首王侍中夜禁吳均抽蘭開石路剪竹製山扉文淪見緑水參差隱翠微西商採藥至東都謝病歸紡毛織野服縫芰作山衣欲知三青鳥簷上素雲飛喜祖三至留宿王維門前洛陽客下馬拂征衣不枉故人駕平生多掩扉行人返深巷積雪帶餘輝集作暉早嵗同袍者髙車何處歸河南嚴尹弟見宿敝廬訪别人賦十韻前人上客能論道吾生學養蒙貧交世情外才子故人中冠上方安豸車邊已畫熊拂衣迎五馬垂手憑雙童花醥一作醴和松屑茶香透竹叢薄霜澄夜月殘雪帶春風古壁蒼苔黑寒山逺燒紅眼看東候别心事北川同若學輕先輩何能訪老翁欲知今日後不樂為車公友人會宿李白滌蕩千古愁留連百壺飲良夜一作宵宜清話一作談浩然一作皓月未能寢醉來臥空山天地即衾枕此詩一百九十卷重出今已削去注異同為一作宿陳留李少府揆㕔祖詠相知有李集作叔卿訟簡夜彌清旅宿倦愁臥空堂聞曙更風簾集作簷搖燭影秋雨帶蟲聲歸思那堪說悠悠限集作恨洛城宿王昌齡隱居常建青溪深不測隱處惟孤雲松際露微月清光猶為君茆庭宿花影文粹作茅亭宿花鳥藥院滋苔文余亦謝時去西山鸞鶴羣宿畢侍御宅錢起交情貧更好子有古人風晤語秋霜裏平生苦節同心唯二仲合室乃一瓢空落葉寄秋菊愁雲低夜鴻薄寒燈影外殘漏雨聲中明發南昌去回看御史驄秋夜宿嚴維宅皇甫冉昔聞元度宅門向會稽峯居疑作君住東湖下清風繼舊蹤秋深臨水月夜半隔山鐘世故多離别良宵詎可逢謝盧十一過宿前人乞還方未遂日夕望雲林况復經集作逢春草何妨集作勞問此心閉門公務散枉策故情深靜集作遙夜他鄉酒同君梁甫吟同韓一作韋員外宿雲門寺嚴維小嶺路雖近仙即此夕一作日過潭空觀月定澗靜見雲多竹翠煙深色松聲雨㸃和萬緣俱不有對景自垂蘿謝一作酬諸公宿鏡水宅前人幸免低頭向府中貴將藜藿與君同陽鴈呌霜來枕上寒山映月在湖中詩書何德名夫子草木推年長數公聞道漢家偏長少此身那比訪芝翁宿江西竇主簿㕔與此公亡兄聨官崔峒廣庭方緩步星漢話中移月滿關山一作水關道烏一作鳥啼霜樹枝時艱難㑹合年長重親知前事成金石悽然淚欲垂秋夜同暢當宿藏公院盧綸禮足一垂淚醫工知病由風螢方喜夜露槿已傷秋顧以童子愛每從仁者逰將永一作來竟何得滅跡在緇流客舍喜崔補闕司空拾遺訪宿一作見訪因留宿前人步月貸諸鄰蓬居宿近臣烏裘先醉客青鏡早朝人懷璧疑作壞壁煙垂網香街火照塵悲榮俱是分吾亦樂吾貧冬夜宿司空曙野居因寄酬贈韋應物南北與山鄰蓬庵庇一身繁霜疑有雪荒草似無人遂性在耕稼所交唯賤貧何緣張掾傲每重德璋親同褒子秋齊獨宿前人山月皎如燭風霜時動竹夜半鳥驚棲窗間人獨宿盧新吳航忽逺至留宿敝居戴叔倫出門迎故友衣服滿塵埃嵗月不可問山川何處來綺城容敝宅散職寄虛臺願此留君醉相逢知幾回與故人夜坐道舊權德輿笑語歡今夕煙霞愴昔逰清羸還對月遲暮更逢秋勝理方自得浮名不在求終當製初服相與臥林邱夏夜宿袁兄一作宅字話舊竇叔向夜合花開香滿庭夜深微雨醉初醒集作酲非逺書珍重何曽達舊事凄凉不可聽去日兒童皆長大昔年親友半凋零明朝又是孤舟别愁對一作見河橋酒幔青宿嚴祕書宅釋清江佳期曽不逺甲第即南鄰惠愛偏相及經過豈厭頻秋光林葉動夕霽月華新莫話羇棲事平原是主人晚秋宿李軍道所居釋皎然青溪路不遙都尉每相招落日休戎馬秋風罷射鵰木花生野徑柏實滿寒條永夜依山府禪心共寂寥宿支硎寺上方前人上方精舍逺共宿白雲端寂寞千峯夜蕭條萬木寒山光露下見松色月中看暫與西林别歸心却欲䦨馬兵曹季良宅夜集前人清景不可失尋君趣有餘身髙避事外道長問心初出處名則異逰從跡何疏吟看刻盡燭笑卷讀殘書露彩生筆硯風音入庭除平明仙侣散觳觫動回車晦夜李侍御萼宅集招潘述湯上人飲茶賦詩前人晦夜不可坐一作生月琴軒猶為開牆東隱者在淇上逸僧來茗愛傳花飲詩看卷素裁風流髙此會晚景屢徘徊秋喜盧綸訪宿司空曙靜夜四無鄰荒居舊業貧月集作雨中黃葉樹燈下白頭人以我獨沉久愧君相訪頻平生有深集作自有分况是蔡霍作家親秋喜盧綸同宿寺前人浮生共多故聚宿喜君同人息時聞磬松搖乍有風寒霜疑集作凝水際夜木似山中一願投如意長來事逺公此詩二百三十五卷重出今已削去耿湋就宿因傷故人前人舊時聞笛淚今夜重沾衣方恨同袍少何堪相見稀竹煙凝澗壑林雪似芳菲多謝勞車馬應憐獨掩扉中秋與空上人同宿華嚴寺冷朝陽見雜詠掃榻相逢宿論詩舊梵宮磬聲迎鼓盡月色過山窮庭簇安禪草忩飛帶火蟲一宵何惜别回首隔秋風宿興善寺後堂集無此字池李端草堂髙樹下月向後池生野客如僧靜集作同僧坐新河共水平錦鱗集作沉同不食繡羽亂相鳴即事思江海誰能萬里行秋夕會友姚係倦客易相失歡逰無良一作浪晨忽然一夕間稍慰闔家貧白露下庭梧孤琴始悲辛回風入幽草蟲響滿四鄰會遇更何時持杯重殷勤山齊獨宿晏上人楊衡憧憧雲樹秋黃葉下山頭蟲響夜難一作空度夢閒神不逰窗燈寒几盡簾雨曉階愁何以禪栖客灰心在沃州一作洲宿雲溪觀賦得秋燈引送客前人雲房寄宿秋夜客一燈熒熒照虛壁蟲聲呼客客未眠幾人語話清景側不可離别愁紛多秋燈秋燈奈别何宿陸氏齊賦得殘燈詩前人殷勤照水夜屬思未成眠餘暉含薄霧落燼迸空筵誰比秦樓曉緘愁别幌前宿漁家張籍漁家住江口潮水入柴扉行客欲投宿主人猶未歸竹深村路暗月出釣船稀遙見尋沙岸秋風動草衣此詩二百九十三卷重出今已削去酬段丞與諸碁流㑹宿敝居見贈元稹鳴局寧虛日閒窗任廢時琴一作詩書甘盡棄園井詎能窺運石疑填海爭籌憶坐帷赤心方苦鬭紅燭已先施蛇勢縈山合鴻聨度嶺遲堂堂排直陳衮衮逼羸師懸劫偏深猛回征特險巇旁攻百道進死戰萬般為異日元黃隊今宵黑白棊斫營看迥㸃對壘重相持善敗雖稱怯驕盈最易欺狼牙當必碎虎口禍難移乘勝同三捷扶顛望一榰希因送目便敢恃指蹤竒退引防邊䇿雄吟斬將詩眠牀都浪置通夕共忘疲曉雉風傳角寒叢雪墮枝繁星收玉版殘月耀氷池僧請聞鐘粥賔催下藥巵獸炎餘炭在蠟淚短光衰俯仰嗟陳跡殷勤卜後期公私牽去住車馬各支離分作終身癖兼從是事隳此中無限興唯怕俗人知神照禪師同宿白居易八年二月晦山梨花滿枝龍門水西寺夜與逺公期晏坐自相對密語誰能知前後際斷處一念不生時初除主客郎中知制誥與王十一李七元八一作九三舍人中書同宿語一作話舊感懷前人閒宵靜語喜還悲聚散窮通不自知已分雲泥行異路忽驚雞鶴宿同枝紫垣曹署榮華地白髮郎官老醜時莫怪不知君氣味此中來較十年遲秋夜宿梁十三㕔事戎昱今年秋已暮還恐未成歸夢裏家仍逺愁中葉又飛竹聲風度急燈影月來微賴得梁夫子心源集作如有所依宿太守李公宅于鵠郡齊常夜靜集作掃不臥獨吟詩把燭迎幽客升堂戴接䍦微風吹凍葉殘集作餘雪落寒枝明日逢山伴須令隱者知雨中喜賈島訪宿姚合雨裏難逢客閒吟不復眠蟲聲秋併起林色夜相連愛酒此生理趨朝末老前終須携手去滄海棹漁船洛下夜會寄賈島前人洛下工集作攻詩客相逢只是吟夜觴歡稍靜寒屋坐多深烏府偶為吏滄江長在心懷君難就寢燭滅復星沉夜宴一作宿太僕田卿宅前人故人九寺長邀我此同歡永夜開筵盡中年飲酒難微風侵竹影疊漏過林端臘後分朝日天明幾刻殘宿友人山居前人偶向山中覓紫芝山人勾引住多時摘花浸酒春愁盡燒竹煎茶夜臥遲泉落林梢多碎滴松生澗底足傍枝明朝却欲歸城市問我回期自不知夜集姚合宅期可公不至賈島公堂春一作秋雨夜已是念園林何事疾病日重論山水心孤燈明臘後微雨下更深釋子乖來約泉西寒磬音宿姚少府北齊前人石溪同夜泛復此北齊期鳥絶吏歸後蛩鳴客臥時鎖城凉雨細開印曙鐘遲憶此漳川岸如今是别離冬日與諸公會宿姚端公宅懷永樂殷侍御僧無可柱史靜開筵所思何地偏故人為縣吏五老逺峰前賔榻寒侵曉集作樹公庭夜落泉會當隨假務一就白雲禪冬晚與諸文士會太僕田卿宅一作别業前人從容一作客啓華館饌玉復燒蘭是嵗兹旬盡清宵幾客殘燈回松竹動人息斗牛寒别後思吟集須期月再圓同劉秀才宿見贈前人浮雲流水深只是愛山林共恨多年别相逢一夜吟既能持苦節勿謂少知音憶就西池宿月圓松竹深冬夜與蔡校書宿無可上人院劉得仁儒釋偶同宿夜忩寒更清忘機于世久晤語恐集作到天明月對集作倒髙松影風延一磬聲真門猶是幻不用覺浮生秋日同僧宿西池前人菡萏編一作偏秋水隔林香似焚僧同池上宿霞向月邊分岸鷺集作峯鶴栖蒲立城砧接曙聞來宵莫他宿重此話孤雲冬日喜同志宿前人相逢話清夜言實轉相知共道名雖切唯論命不疑吟身坐霜石眠鳥握風枝别憶天台客煙霞昔有期宿韋律集作津山居前人永夕見招宿詩書盈集作滿草堂靜吟傾藥酒髙論出名場窗颯松篁韻庭兼雪月光心期身未老一去泛瀟湘秋夜喜友人宿前人莫話春闈事清宵且醉集作但共吟頻年遺我輩有日值公心逼集作通曙天傾斗將寒葉墜林無為簪紱意從古貴知音回中夜訪獨孤從事前人滿庭霜月魄風靜絶纎聞邊境時無事一作冦州城夜訪君推裘聽塞角酌缶一作醴話湘雲贊佐元戎美恩齊十萬軍宿友生林居因懷賈區于武陵繞屋樹森森多栖紫閣禽暫過當永夜微得話前心入楚行應逺經湘恨必深那堪對寒燭更賦别離吟與無可賈島宿姚少府宅朱慶餘莫厭通宵話貧中聚會難堂虛雪氣入燈在漏聲殘役思因成疾一作病當禪豈覺寒開門各有事誰不惜餘歡雪夜與真上人宿韓協律宅前人斜雪微霑砌空堂夜語清逆風孤漏短回燭向樓明盥潄隨禪伴謳吟得野情此歡那敢忘世貴丈夫名宿陳處士書齊前人結茅當此地下馬見髙情菰菜髙塘淺集作曉杉光小徑集作松隂白石明向燈集作爐新茗色隔雪逺鐘聲閒得相逢少吟多寢不成同朱慶餘宿僧房周賀溪僧還共謁相與坐寒天屋雪凌髙燭山茶稱逺泉夜清集作深更徹寺空濶鴈衝煙莫惜多時坐集作話重來又隔年宿李樞書齊前人書齊經暮雨四靣絶纎埃眠客聞風覺飛蟲入燭來夜凉書讀遍月正户全開住逺稀相見留連宿始回秋宿徐處士宅懷少室前人曽居少室黃河上秋夢長懸未得迥扶病半年離水石思歸一夜隔風雷空齊幾遇僧眠後野菊曽經鹿踐來燈下此心君共說倚松孤徑已生苔同賈島宿無可上人院雍陶何處銷愁宿携囊就逺僧中宵吟有雪空屋語無燈靜境惟聞鐸寒牀但枕肱還因愛閒客始得見南能雪夜與友人同宿曉寄近鄰已見一百五十三卷溫庭筠宿秦生山齊衡巫路不同結室在東峰嵗晚得支遁夜寒逢戴顒龕燈落葉寺山雪隔林鐘行解一作行李又作戒行無由發曹溪欲施舂此詩三百十七卷重出今已削去宿何書記先輩延福新居趙嘏松下有琴閒未收一燈髙為石集作柱叢留詩情似到山家夜樹色輕含御水秋小榼提携終集作宜永日半斑集作年容鬢漫生愁因君撫掌問時俗紫閣堆簷不舉頭李侍御歸山同宿華嚴寺前人家有青山近玉京風流柱史早知名園林手植自含緑霄漢眼看當去程處處白雲迷駐馬家家紅樹近流鶯相逢一宿最髙寺夜夜翠微泉一作松落聲集宿姚殿中宅期僧無可不至馬戴殿中日一作殿內臣相命開樽話舊時餘鐘催鳥絶積雪阻僧期林靜寒光一作聲逺天隂曙色遲今宵復何夕人謁去難追集作鳴珮出難隨此詩二百二十三卷重出今已削去注異同為一作宿賈島原居集作尋賈島原東居前人寒鴈過原急渚邊秋色深煙霞向海島風雨宿園林俱住明時願同懷故國心集作共許貧交久猶嫌外事侵未能先隱跡聊集作閒此一相尋新秋霽後宿王處士居前人夕陽逢一雨夜木洗清隂露氣竹窗靜秋光月色深煎茶靈草味話友故山心得意兩不寐微風吟玉琴洛陽寒夜姚侍御宅宿同憶賈島前人夜來寒色動集作夜樹動寒色洛陽城闕深如何異鄉思更抱故人心微月嵩山逺閒階霜霰集作霧侵誰知石門橋集作路待子與相尋宿崔卲池陽别墅前人楊栁色已故郊原日復低煙生寒樹上霞散逺山西待月人相對驚風鴈不齊此心君莫問舊國去將迷答鄜坊集作寺友人同宿見示前人為客自堪悲風塵日滿衣承明無計入舊隱但懷歸雪積孤城暗燈殘曉角微相逢喜同宿此地故人稀秋夜宿祕書姚監宅李頻髙樹密濛濛開樓待逺風集作桂宅多佳木先來有好風情閒眠闕下夢野到山中露色浮寒瓦螢光墜暗叢聽吟麗句盡河漢轉虛空隱巖陪鄭少師夜坐張喬幸喜陪騶馭頻來向此宵硯磨青澗石厨㸑白雲樵竹外村煙細燈中禁漏遙衣冠與文理靜話對前朝宿劉溫書齊前人不掩盈窗月天然格調髙凉風移蟋蟀落葉在離騷回筆挑燈燼懸圖見海濤因論三國志空載幾英豪文苑英華卷二百十七
