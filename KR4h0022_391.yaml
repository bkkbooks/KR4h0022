body:
  text: 文苑英華卷三百九十一宋李昉等編南省七左右司員外郎授柳渙左司員外郎制蘇頲勑朝議郎行起居舍人判左司員外郎柳渙襟情雅正藝能敏洽珥筆記言才光東觀張燈起草譽動南宫宜同滿歲之遷式副為郎之舉可行左司員外郎散官如故授薑昻右司員外郎等制勑尚書金部員外郎薑昻殿中侍御史李常等勵節修身敏才通識金曹典事頗效精勤白簡繩違久聞堅正皆能奉職宜稱遷升昻可尚書右司員外郎常可行侍御史散官勳如故吏部員外郎授鄭叔則吏部員外郎制常衮勑朝議郎檢校尚書吏部員外郎鄭叔則志經含章仗雅師儉罔有擇行未嘗近名省理辨疑時稱簡達才盛居東之佐禮處司南之重高選髦士以分劇曹正其舊員允是新命可尚書吏部員外郎散官如故授李建吏部員外郎制白居易勑六官之屬選部郎首之歷代以來諸曹郎之中擇其踐歷久考第高加以有器局律度者遷焉今之選任亦由是矣兵部員外郎李建文行才理公勤課績可以具美宜居厥官歲調方殷勉勤爾事可吏部員外郎司封員外郎授李知止司封員外郎等制孫逖勑至公之用本無偏黨惟善斯擢豈隔親疏四從叔前京兆府奉天縣令上柱國知止等咸有人才見推公族秉惟清之操兼致逺之資朕每精念同盟不勤于德當懸右職以觀其徒先委宗卿精為內舉量能考行歷載踰時名數則多升聞蓋寡倘膺是選諒在得人固可擢以清要遷於臺閣將觀志於七子冀齊名於八人宜各悉心佇聞成績可依前件書不云乎九族既睦平章百姓蓋由內而理外必自近而及逺凡我懿戚可不愼歟違道慢常義無私於王法謹身勵節恩豈薄於他人期於率先勵我風俗深宜自勉以副明言授邢宇司封員外郎制賈至勑前户部員外郎邢宇雅志沖淡敏識精達養間移疾亦有歲年南宫地清列宿虗位擢才進善以佐邦理可守司封員外郎授班肅司封員外郎制元稹勑朝議郎前坊州刺史賜緋魚袋班肅馳競之徒能於寒暑之際不以憂畏移其厚薄之道者鮮矣聞爾為祠部員外郎時值吾黜姦之日遊其門者莫不跧竄奔迸懼罹其身惟爾安分不渝進退有素縉紳之論有以多之復爾中臺以厚吾俗勉愼其始無輕所從可行尚書司封員外郎餘如故授馮韜司封員外郎等制崔嘏勑分列宿之位應覆被之榮入可以封還詔書出可以分領符竹優遊於粉署之內談笑於錦帳之前苟非清才不在斯選以韜文章炳煥獨步詞科以同靖門胄光華深通聖典荆玉韜含章之美霜鐘蓄待扣之音是用升彼名曹擢於藝閣文昌之地職業非輕式佇彌綸更期遷陟韜可司封員外郎同靖可金部員外郎司勳員外郎授李畬司勳員外郎制蘇頲勑朝議郎行殿中侍御史李畬雅負才學能循名教蒞官執憲歷歲愈聞清操默識為時所重俾樹聲於勳府宜矯步於仙闈可尚書司勳員外郎散官如故授李岫司勳員外郎制孫逖勑朝議郎行京兆府司録參軍上柱國李岫訓稟詩禮才稱英妙既博藝而能文亦謹身而勵節疆場決勝是賴於台臣爵服懋功宜及於胤子雖讓為德主父則固辭而賞以恩延國有恆典俾增章紱之寵仍在神仙之地可朝散大夫行尚書司勳員外郎勳如故考功員外郎授裴耀卿檢校考功員外郎制蘇頲勑朝散大夫行河南府士曹參軍裴耀卿士行純密文詞典麗時人許其清秀職事推其綜核惟才是舉方慿止水之明在位斯聞佇考觀光之彥可檢校考功員外郎户部員外郎授張博濟户部員外郎制孫逖勑朝議郎行河南府司録參軍張博濟心和識逺藝博詞優清白承於教忠通明達於從政頃在河洛備聞紀綱郎官選俊雅望攸歸時宰避親良才久滯宜膺特命俾踐劇曹可尚書户部員外郎散官如故授權審户部員外郎制杜牧勑文林郎守尚書水部員外郎權審湖嶺旱暵百姓枵耗老弱死道上強壯入賊巾爰求使臣以救其弊執事者上言爾審學古有文通知理道遂使乘驛視吾飢人果能臨事知權受命達旨慰撫流散宣導恩澤蠲貸逋逸能裁濶狹大小輕重各合事宜雖古所謂直指繡衣美俗使者言之於爾無以過焉用超名曹以酬往效無曠官業勉服休命可守尚書户部員外郎散官如故禮部員外郎徐彥樞改授户部員外郎制薛廷圭勑具官徐彥樞吾前以儀曹員外郎南宫劇選求思時彥克副僉諧聞爾先臣在會昌中事武宗皇帝文行修整綽有令名亦由至公膺此愼選得人之盛于今稱之而彥樞趣嚮規為能紹先志俾之繼美亦謂當才而能以爾令兄執吾大柄潔矩彌峻避嫌不居牢讓之心確乎山立今吾又安敢以流薄所尚凂爾操修改司人曹允叶中道亦欲使彥若乃彥樞之兄曽作相展四體以事我秉一心而律人靡不有初一有鮮克有終四字非爾無忘於自勵其下皆讓豫庶幾乎有聞稽乃檢身慮吾假器自待之旨何其優哉可度支員外郎授李元紘度支員外郎制蘇頲勑朝議郎守潤州司馬李元紘清真不雜恬雅自居部劇著於祠曹養能傳於宰邑頃聞出佐方馳日下之聲爰佇入官猶屈黃中之美宜遷郎位以寵相門可行尚書度支員外郎散官如故金部員外郎授崔夷甫金部員外郎等制常衮勑宣議郎守尚書駕部員外郎賜緋魚袋崔夷甫朝散大夫行尚書祠部員外郎上柱國韋􅯺疑作􅛴等清心在公強力從政縱橫之辨嘗亦專達緣飾以儒素推強敏參訂集作久參奏議頗練朝章宜從滿歲之遷俾轉集作輔分曹之次夷甫可尚書金部員外郎散官賜如故􅯺可行尚書倉部員外郎散官勳如故倉部員外郎授陳惠滿倉部員外郎等制蘇頲黃門朝議大夫行尚書祠部員外郎兼判倉部員外郎上柱國陳惠滿操履堅剛能守文法朝請大夫前行太子舍人上柱國蕭嵩風情瀟灑見推才器並頡頏清貫籍甚芳猷大事曰祀蒸人以粒宜奉舊章俾承新命惠滿可行尚書倉部員外郎嵩可行尚書祠部員外郎散官勳各如故主者施行授崔鄯倉部員外郎判度支案制白居易勑奉天縣令崔鄯大凡南宫郎無非愼選者也况地官之屬有堆案盈几之文有月計歲會之課故員郎不可踰時缺不待滿歲遷一作故員不可逾時缺郎不待滿歲遷事劇才難斷可知矣而鄯自操白簡宰赤縣繩舉違謬惠養鰥惸皆有善聲著于官次豈能於彼而不能於此乎宜率廪人佐計務決繁折滯期有可觀可依前件禮部員外郎授李莘禮部員外郎制賈至勑九隴令李莘學行薰茂藻思清新譽流京劇政洽巴庸會府章奏之殷春官典禮之要任難其選才可當人可試禮部員外郎授張元夫禮部員外郎制白居易勑殿中侍御史張元夫官有秩清而選妙者其儀曹外郎之謂乎凡殿內御史雖文才秀出功課高等者滿歲而授猶曰美遷有如元夫連膺二選歷彼踐此僉以為宜况怒飛青冥翔集禁陛由兹去者十八九焉汝知之乎思有以稱可尚書禮部員外郎授徐商禮部員外郎制李德裕勑朝議郎殿中侍御史內供奉上柱國徐商于公以容駟高門虞氏以升卿名子其所全活不聞大賢猶誠感幽神慶流苗裔矧乃祖往以淑問嘗為理官屬政在吕宗謀傾王室將相陷辟忠良受誣而深念郡獄之寃固拒詔使分别楚囚之濫自履危機義激命輕仁為己任有是陰德宜覃後昆爾風度粹和文詞溫麗列於清憲雅有貞標既旌先正之忠爰舉賞延之典勉修官業無替家聲可授宇文臨禮部員外郎制崔嘏勑凡在南宫必資望實而儀曹之選益難其人以爾松篁清韻瓌璧貞姿以文學為積行之基用規檢為修身之具飾外以舉其衆能居中自持其謙益佐雲幕而鬱有佳聲處霜臺而介然獨立玉墀之下益振金相載筆之間共推直史是宜遷于粉署光彼文星勉膺起草之求無忝握蘭之美可授徐彥樞禮部員外郎制薛廷圭勑具官徐彥樞文昌列曹代稱清署宗伯之重時難厥官其在外郎選擢尤重率多虛位以待當才聞爾淡以立身謙而履道情田萬頃瑶林將玉樹森羅文律九成調露與承雲交奏動必由禮人無間言克承德行之規不染脂膏之態介然自立無愧前修是用聽彼羣情懋兹劇選斯文重振資爾之嘉謀時政有疑佇爾之讜論勉臨厥職紹乃家風敬蹈氷泉以成踐履可祠部員外郎授韋少逰祠部員外郎等制賈至勑左補闕直𢎞文館韋少遊修詞懿文終溫且惠守右監門衛胄曹參軍許登振藻揚采穆如清風並藏器於身陳力就列南宫即位是登柱史一作題柱之才左禁諫臣方求折檻之直少遊可檢校祠部員外郎登可右拾遺授禇長孺祠部員外郎制常衮勑朝議郎行起居郎集賢殿直學士禇長孺等國之才人一作俊乂拔乎羣萃精力於學五經之大儒覃思於文三變而合雅繫年秉直及霤盡規侍從之勞著於厥服含香載筆允茲並命可依前件授蕭睦祠部員外郎制李虞仲勑朝散大夫使持節袁州諸軍事守袁州刺史上柱國蕭睦中臺總天下之務分以郎吏各有司存前代用人率為愼選以爾克茂才實嘗擢科名操尚端貞職業修舉纍登使局頃綰郡章一作仍領郡符去常見思居不自伐是宜陟以郎署佇其彌綸能稽舊章則無敗事可行尚書祠部員外郎散官勳如故授李隲總目作韋陟祠部員外郎等制崔嘏勑由憲府而入文昌自藩方而并粉署既為佳選亦舉滯才爾等皆以文藻發身馨香馳譽早茂閨門之行久從賔幕之遊或賜告經時頗積退藏之美或綱丞上請雅膺選擢之科祠膳清曹省闈右地勉思起草無念應星隲可祠部員外郎特可膳部員外郎授章仇兼瓊主客員外郎制勑殿中侍御史章仇兼瓊雅有堅操嘗懷逺圖義不辭勞忠能盡節頃逾砂磧能正糾繩興國利於懸車振朝威於絶漠甄其績用宜遷禮閣之榮寄以澄清仍受憲臣之任可尚書主客員外郎餘如故授裴薦攝主客員外郎制賈至勑左拾遺裴薦正直而溫洵美且惠有紛綸之詞藻懷耿介之志氣自居近侍屢獻讜言中原未寧鄰國是協俾領攝於郎署為專對之使人一作者可攝主客員外郎授陸海主客員外郎制常衮勑朝議郎侍御史內供奉賜緋魚袋陸海儒流貫穿詞韻清麗貞以自檢峻而能通執法允歸於詳當間邪不畏於強禦雖近遷柱史未終滿歲之勞而高選星郎實在一時之俊俾參奏議期有損益可行尚書主客員外郎散官賜如故膳部員外郎授房宗偃膳部員外郎制勑朝議郎侍御史內供奉充山南西道節度管內支度營田副使賜緋魚袋房宗偃孝謹之風克傳素業賢良之器早負清才頃主方書兼毗戎政淡雅高潔在公著美臺郎之盛妙選當人處以彌綸茲謂稱職可行尚書膳部員外郎散官勳如故授李德修膳部員外郎制白居易勑尚書左曹集作士郎自奏議彌綸外凡邦之牲豆之品醴膳之數實糾理之今文昌長佐一作洎春官卿以朝散大夫守祕書丞上柱國李德修籍訓于台庭業官于書府揆才考第得補為郎司膳缺員爾宜專掌可尚書膳部員外郎餘如故文苑英華卷三百九十一
