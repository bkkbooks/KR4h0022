body:
  text: 文苑英華卷二百七宋李昉等編樂府十六梁甫吟三首白頭吟三首遊子吟五首妾薄命九首妾安所居一首宛轉歌三首古興九首古曲一首古歌一首古詞五首梁甫吟陸瓊臨淄佳麗地少小習名倡似笑唇朱動非愁眉翠揚掩抑隨竽轉和柔會瑟張輕扇屢回指飛塵亟繞梁寄言諸葛相此曲作難忘同前沈約龍駕有馳䇿日御不一作無停隂星籥亟回變氣化坐盈侵寒花稍耿耿秋海一作塞日沉沉髙窗仄一作灰餘火傾河駕騰參颷風折暮草驚籜一作竿霣層林時雲靄空逺年氷一作淵水結清深奔樞豈易紐殊庭不可臨懷仁每多意履順孰能禁露清一唯促緩志且移心哀歌步梁甫歎絶有遺吟一作音同前李白長嘯梁甫吟何時見陽春君不見朝歌屠叟辭棘津八十西來釣渭濵寧羞白髮照清一作緑水逄時吐一作壯氣思經綸廣張三千六百鈎一作釣風期暗與文王親大賢虎變愚不測當年頗似尋常人又一作君不見髙陽酒徒起草中長揖山東隆準公入門開説一作不拜騁雄辨兩女輟洗來趨風東下齊城七十二指旄楚漢如旋蓬狂生落魄見酈食其傳尚如此何况壯士當羣雄我欲攀龍見明主雷公砰訇震天鼓帝旁投壺多玉女三時大笑生一作開電光倐爍晦冥起風雨閶闔九門不可通以額叩關閽者怒白日不照吾精誠杞國無事憂天傾猰㺄磨牙競人肉騶虞不折生草莖手接飛猱摶雕虎側足焦原未言苦智者可卷愚者豪世人見我輕鴻毛力排南山三壯士齊相殺之用一作費二桃吳楚弄兵非一作無劇孟亞夫咍爾為徒勞梁甫吟聲正悲張公兩龍劔神物合有時風雲感會起屠釣天一作大人􅒈屼當安之白頭吟張正見平生懷直道一作白首松桂比真一作貞風語默妍媸際沉浮毁譽中讒新恩易盡情去寵難終彈珠金市側抵玉泰山東含香老顔駟執戟異揚雄惆悵崔亭伯幽憂馮敬通王嬙沒故一作胡塞班女棄深宫春苔封履迹秋葉奪粧紅顔如花落槿鬢似雪飄蓬此時積一作即長歎少一作傷年誰復同同前劉希夷文粹作宋之問洛陽城中桃李花飛來飛去落誰家洛陽一作幽閨女兒好顔色行逄落花長歎息今年花開顔色改明年花開復誰在已見松柏摧為薪更聞桑田變成海古人無復洛陽東今人還對落花風年年嵗嵗花相似嵗嵗年年人不同寄言全盛紅顔子應憐半死白頭翁此翁白頭真可憐憶昔紅顔美少年光祿池臺文錦繡將軍樓閣畫神仙公子王孫芳樹下清歌妙舞落花前一朝卧病無相識三春行樂在誰邉宛轉蛾眉能幾時須臾鶴髮亂如絲但看古來歌舞地惟有黃昏鳥雀飛一作悲同前李白錦水東北流波蕩雙鴛鴦雄巢漢宫月雌弄春草芳寧同萬死碎綺翼不忍雲間兩分張此時阿嬌正嬌妬獨坐長門愁日暮但願君恩顧妾深豈憚黃金買詞賦相如作賦得黃金丈夫好新多異心一朝將聘茂陵女文君因贈白頭吟東流不作西歸水落花辭條羞故林兔絲本無情隨風任傾倒誰使女蘿枝而來強縈抱兩草猶一心人心不如草莫卷龍鬚席從他生網絲且留琥珀枕會有夢來時覆水再收豈滿杯棄妾已去難重回古來得意不相負只今惟見青陵臺遊子吟顧况故櫪思疲馬故窠思迷禽浮雲蔽我鄉躑躅遊子吟遊子悲久滯浮雲鬱東岑客堂無絲桐落葉如秋霖囏哉逺遊子所以悲滯淫一為浮雲詞憤塞誰能禁馳歸一作暉百年內惟願展所欽胡為不歸歟坐使年病侵未老霜繞鬢非狂火燒心大行何難哉北斗不可斟夜靜星河出耿耿辰與參佳人敻青天尺素重於金泬寥羣動異眇默諸境森苔衣上間階蟋蟀催寒砧立身計幾悮道險無容針三年不還家萬里遺錦衾夢魂無重阻離憂罔古今胡為不歸歟辜負匣中琴腰下是何物牽纒曠登尋朝與名山期夕宿楚水隂楚水殊演漾名山窅嶇嶔客從洞庭來婉孌瀟湘深橘柚在南國鴻鴈遺其音下有碧草洲上有青橘林引燭窺洞穴凌波睥天琛蒲荷影參差鳬鶴雛淋涔浩歌惜芳杜散髮輕華簮胡為不歸歟淚下沾衣襟鳶飛戾霄漢螻蟻制鱣鱏赫赫大聖朝日月光照臨聖主雖啓迪吾人分湮沉層城登一作發雲韶王一作玉府鏘球琳鹿鳴志豐草况復虞人針同前李益女羞夫壻薄客耻主人賤遭遇同衆流低回愧相見君非青銅鏡何事空照面莫以衣上塵不為心如練人生當榮盛待士勿言倦君看白日馳何異弦上箭同前孟郊慈母手中線逰子身上衣臨行密密縫意恐遲遲歸誰言寸草心報得三春暉同前陳陶棲烏喜林曙驚蓬傷嵗闌關河三尺雪何處是天山朔風無重衣僕馬飢且寒慘戚别妻子遲回出門難男兒值休明豈是長泥蟠何者為木偶何人侍金鑾鬱鬱守貧賤悠悠亦無端進不圗功名退不處巖巒窮通在何日光景如跳丸富貴苦不早今人摧心肝誓期春之陽一振摩霄翰同前聶夷中萱草生堂階遊子行天涯慈親倚門堂不見萱草花妾薄命篇梁簡文帝名都多雅一作麗質本自恃容姿蕩子行不一作未至秋胡無定期玉貌歇紅縷一作臉長嚬慣翠眉奩鏡迷朝色釙縫一作縫針脆故絲本異搖舟咎何關竊虎疑生離誰拊背溘死詎來遲王嬙貌本絶踉蹌入氊幃盧姬嫁日晚非復妙一作少年時轉山猶可逐一作遂烏白望難期妾心徒自苦旁人會見嗤同前劉孝威去年從越障一作嶂今嵗沒胡庭嚴霜封碣石驚沙暗井陘玉簮久落鬢羅衣長挂屏浴蠶思洙一作水挑桑憶鄭坰寄書朝鮮吏留釧武安亭勿言戎夏隔但令一作念心契冥不見豐城劍千祀復同形同前劉元淑自從離别守空閨遙聞征戰赴一作起雲梯夜夜相思一作思君又作愁君遼海北一作外年年拋一作棄妾渭橋西陽春白日照空暖紫燕紅一作銜花向庭滿彩鸞琴裏怨聲多飛鵲鏡前梳粧斷誰家夫壻久一作不從征應是漁陽别有情莫道紅顔燕地少家家還似洛陽城且逐新人殊未歸還令秋至夜霜飛北斗星前橫旅一作度鴈南樓月下搗寒衣更一作夜深聞鴈腸欲絶獨夜挑燈燈復滅暗啼羅帳空自憐夢度陽關向誰説每吟一作憐容貌宛如神何其一作如何薄命不如人願君朝夕燕山至好作明年楊栁春同前李白漢帝重阿嬌貯之黃金屋咳唾落九天隨風生珠玉寵極愛還歇妬深情却踈長門一步地不肯暫回車雨落不上天覆水最難一作難再收君情與妾意各自東西流昔日芙蓉花今成素秋草以色事他人能得幾時好同前權德輿昔住邯鄲年尚少只是嬌羞弄花鳥青樓碧紗大道邉緑楊日暮風裊裊嬋姢玉貌二八餘自矜一作憐顔色花不如麗質全勝秦氏女藁砧寧用専城居嵗去年來年漸長青蛾一作春紅粉全堪賞玉樓珠箔但間居南陌東城詎來往韶光日月看漸遲摽梅既落行有時寧知燕趙娉婷子翻嫁幽并遊俠兒年年結束青絲騎出門一去何時至秋月空懸翡翠簾春幃懶卧鴛鴦被沙塞經時不寄書深閨愁獨意何如花前拭淚情無限月下調絃一作琴恨有餘别離苦多相見少洞房愁夢何由曉間看雙燕淚霏霏靜對空床夢悄悄鏡裏紅顔不自禁陌頭香騎動春心為問佳期早晚是人人總解有黃金同前孟郊不惜十指弦為君千萬彈常恐新聲至一作發坐使故聲殘一作使我故曲殘棄置今日悲即是昨日歡將新變故易將故為新難青山有蘼蕪淚葉常不乾空令後世一作代人采掇幽思攢一作思幽蘭同前曹鄴薄命常惻惻出門見南北劉郎馬蹄疾何處去不得淚珠不可收蟲絲不可織知君緑桑下更有新相識同前盧綸妾年初二八兩度嫁狂夫薄命今猶在堅貞掃地無同前孟郊薄命頭欲白頻年嫁不成秦娥未十五昨日事公卿豈有機杼力空傳歌舞名妾専修婦德媒氏却相輕妾安所居曹鄴賤妾先無寵蛾眉進不遲一非西北麗無復南城期何因暫艷逸豈為乏妍姿徒有黃昏望寧遇青樓時惟惜應門掩方除永巷悲匡床終不共何由橫自私宛轉歌江總七夕天河白露明八月濤水秋一作青風驚樓中恆聞哀曲響塘上復有苦辛行不解何意悲秋氣直置一作致無秋悲自生不怨前階促織鳴偏愁别路搗衣聲别燕差池自有返離蟬寂寞詎含情雲聚含一作懷清四望臺月冷相思九重觀欲題芍藥詩不成來採芙蓉花已散金樽送曲韓娥起玉柱調絲一作弦楚妃勸一作歎翠眉結恨不復開寶鬢迎秋度一作風前亂湘妃拭淚灑貞筠行樂玩花一作策藥浣衣何處人步步香飛金薄履盈盈扇掩珊瑚唇已言採桑期陌上復能解珮就江濵競入華堂要花枕爭開羽帳奉華茵不惜獨眠前下鈎一作釣欲許便作後來薪後來暝暝同匡一作玉牀可憐顔色無比方誰能巧笑時一作特窺井乍取新聲學繞梁宿處留嬌墮黃珥鏡前含笑弄明璫卷葹摘心心不盡茱萸折葉葉更芳已聞能歌洞簫賦詎是故愛邯鄲倡擬古神女宛轉歌二首崔液風已清月朗琴復鳴掩抑悲千態殷勤是一聲歌宛轉宛轉和更一作且長願為雙鴻鵠比翼共翺翔二日已暮長簷鳥應度此時望君君不來此時思君君不顧歌宛轉宛轉那能異棲宿願為形與影出入恆相逐古興二首沈徽蔓草自細微女蘿始夭夭夤緣至百尺榮耀非一朝惠色髙碧嶺流芳薄丹霄如何摧秀木正為餘波漂莖朝一作葉落巗迹英蕤從風颷洪柯不足恃况乃託陵苕二長門一作安冨豪右信是天下樞戚里笙歌發禁門冠蓋趨攀雲無愧士唾地盡成珠日晏下雙闕煙花亂九衢恩榮在片言零落亦須臾何意還自及曲池今已無同前三首冦坦母趙氏鬱蒸更將半暑氣煽飛閣驟雨滿空來當軒卷羅幕度雲開夕霽宇宙何清廓明月流素光輕風換炎鑠孤鸞傷對影寶瑟悲别鶴君子去不還搖心欲何託二金菊延清霜玉壺多美酒良久疑作人猶不歸芳菲豈常有不惜芳菲歇但傷别離久含情罷斟酌凝怨對窗牖三霽雪舒長野寒雲半幽谷嚴風振枯條猿啼抱氷木所嗟遊宦子少小荷天祿前程未云至悽愴對車僕嵗寒成詠歌日暮棲林朴不憚行險道空悲年運促同前常建轆轤井上雙梧桐飛鳥銜花日將沒深閨女兒莫愁年玉指泠泠怨金碧石榴裙裾蛺蝶飛見人不語顰蛾眉青絲紅絲雜緑絲織成錦衾當為誰同前薛據日中望雙闕疑軒蓋揚飛塵鳴珮初罷朝自言皆近臣光華滿道路意氣安可親歸來宴髙堂廣筵羅八珍僕妾盡綺羅歌舞夜逹晨四時固相代誰能久要津已看覆前車未見易後輪丈夫須兼濟豈得樂一身君今皆得志肯顧憔悴人同前李嘉祐十五小家女雙鬟人不知一作如蛾眉暫一見可直千萬資一作金餘自從得向蓬萊裏出入金輿乘玉趾梧桐樹上春鴉鳴曉伴君王猶未起莫道君恩長不休婕好團扇苦悲秋君看魏帝鄴都裏惟有銅臺漳水流同前聶夷中片玉一塵輕粒粟山丘重唐虞貴民食秪是勤播種前聖後聖同今人古人共一嵗如苦飢金玉何所用集作將何用古曲王褒青樓臨大道遊俠盡淹留陳王金被馬秦女桂為鈎馳輪洛城巷鬬雞南陌頭薄暮飛塵起聊為清夜逰古歌沈佺期落葉流風向玉臺寒釭愁一作夜寒秋思洞房開水晶簾外金波下雲母窗前銀漢回玉階隂隂苔蘚色君王履綦難再得旋一作璇閨窈窕秋夜長繡户徘徊明一作秋月光燕姬綵帳芙蓉色秦女金爐蘭麝香北斗七星橫夜半清歌一曲斷君腸古詞衛象鵲血調弓濕未乾鸊鵜新淬劔光寒遼東老將鬢成雪猶向旄頭夜夜看同前三首于鵠素絲帶金地窗間掬飛塵偷得鳳凰叉門前乞行人二新長青絲髮啞啞言語黠隨人敲銅鏡街頭救明月三東家新長兒與妾同時生並長兩心熟到大相呼名同前曹鄴髙闕礙飛鳥人言是君家經年不歸去愛妾面生花妾面雖有花妾心非女蘿郎君不自重重一作教妾欲如何文苑英華卷二百七
