body:
  text: 文苑英華卷六百七十六宋李昉等編諫諍下上封事書一首論教本書一首初授拾遺上書一首論進奉書一首與人論諫書一首直諫書一首上封事書張九齡五月二十日宣義郎左拾遺內供奉臣張九齡謹再拜昧死上書開元神武皇帝陛下臣所上事以臣愚見並當時尤切不敢飾詞伏願陛下親覽可否之宜幸甚幸甚臣伏以陛下自克清內難光宅天下常欲躋人於富夀致國於太平聖慮每勤德音屢發然猶黎人未息水旱為憂臣竊伏思之有由然矣臣聞乖政之氣發為水旱天道雖逺其應甚速新唐書作邇昔者東海枉殺孝婦旱者久之一吏不明匹婦非命則天為之旱以昭其寃况今六合之間元元之衆莫不懸命於縣令宅生於刺史陛下所與共理此尤親於人者也多非其任徒有其名致旱之由豈惟孝婦一事而已是以親人之任宜得其賢用才之道宜重其選而今刺史縣令除京輔近處雄望之州刺史猶擇其人縣令或備員而巳其餘江淮隴蜀三河諸處除大府之外稍稍非才但於京官之中出為州縣者或是緣身有纍在職無聲用於牧宰之間以為斥逐之地或因勢附會遂忝髙班比其勢衰且無他責又謂之不稱京職亦乃出為刺史至於武夫流外積資而得官成於經久不計於有才諸若此流盡為刺史其餘縣令以下固不可勝言蓋氓庶所繫國家之本務本務之職反為好進者所輕承弊之人每遭非才者所擾陛下聖化從此不宣皆由不重親人之選以成其弊而欲天下和洽固不可得也古者刺史入為三公郎官出宰百里莫不迓有所重勸其所行臣竊怪近俗偏輕此任今朝廷卿士入而不出於其私情遂自得計何則京華之地衣冠所聚子弟之間身名所出從容附會不勞而成一出外藩有異於此人情進取豈忘於私但立法制之不敢違耳原其本意固私是欲今大利在於京職而不在於外郡如此則智能之士欲利之心日夜營營寧肯復出為刺史縣令而陛下國家之利方賴智能之士此輩既自固而不行在外者又技癢而求入如此則智能之輩常無親人者陛下又未格之以法無乃甚不可乎故臣愚以為欲理之本莫若重刺史縣令此官誠重智能者可行正宜懸以科條定其資歷凡不歷都督刺史唐書有雖字有髙第者不得入為侍郎列卿不歷縣令唐書有雖字有善政者亦不得入為臺郎給舍雖即逺處都督刺史至於縣令以次差降以為出入亦不得十年頻在集作任京職又不得十年盡任外官如此設科以救其失則內外通理萬姓獲安集作寧如積習為常遂其私計陛下獨宵衣旰食天下亦未之理也又古之選用賢良取其稱職或遙聞而辟召或一見而任之是以士修素行不圖僥幸羣小不逮亦用息心以故姦慝自止流品不雜今天下未必理於上古而事務日倍於前誠為不正其本而設巧於末所謂末者吏部條章動盈千百刀筆之吏辨析毫釐節制搶攘溺於文墨胥徒之猾又緣隙而起唐書作緣姦而奮臣以為始造簿書以備用人之遺忘耳今反求精於案牘不急於人才亦何異遺劍中流而刻舟以記去之彌逺可為傷心凡有稱吏部之能者則曰從縣尉與主簿從主簿與縣丞斯選曹執文而善知官次者也惟據其合與不合不論其賢與不肖大略如此豈不謬哉陛下若不以吏部尚書侍郎為賢必不授以職事尚書侍郎既以賢而受委豈復不能知人人之難知雖自古所慎而拔十得五其道可行今則執唐書作膠以格條貴於謹守幸其心能自覺者每選於所拔亦有三人五人若又專固者則亦一人不拔據資配職自以為能為官擇人初無此意故使時人有平配之議唐書作誚官曹無得賢之實朱紫同色清濁不分是於聖朝有何禆益故臣以為選部之法弊於不變變法之易在陛下渙然行之假且今之銓衡欲自為意亦限行之已久動必見疑遂用因循益為浮薄今若刺史縣令精核其人即每年當管之內應有合選之色先委考其才行堪入品流然後送臺臺又推擇據所用之多少為州縣之殿最一則州縣慎於集作其所舉必取入官之才二則吏部因其有成無多庸人之數縱有不在送者妄起怨端且猶分謗於外臺不至喧譁於南省今則每歲選者動以萬計京師米物為之空虛豈多士若斯蓋渝濫至此而欲仍舊致理難於改制祗益文法煩碎賢愚混雜就中以一詩一判定其是非適使賢人君子從此遺逸斯亦明代之闕政有識者之所歎息也又天下雖廣朝廷雖衆而士之名賢誠可知也若使毁譽相亂聽受不明事將巳矣無復可説如知其賢能各有品第每一官缺而不以次用之則是知而不為焉用彼相借如諸司清要之職當用第一之人及集有其字要官闕時或以下等叨進以故時議無髙無下唯論得與不得自然清議不立名節不修上善則守志而俟集本唐書並作後時中人則躁求而易操其故何哉朝廷若以令名進人士子亦以修名獲利而利之所出衆則趨焉已而名利不出於清修所得集作趨多歸於人事其小者茍求輒集作取得一變而至阿私其大者許以分義再變而成朋黨斯並教化漸漬使之必然故於用人之際不可不第其髙下若髙下有次不可妄干天下士流必刻意修飾思齊日衆刑政自清此興衰之大端安集作焉可不察易曰履霜堅氷至言聖人之見終始之微矣今所言上刺史縣令等事一皆指實縱臣所欲變法不合時宜伏望更發睿圖及詢於執事作為長算振此頽風使官修其方人受其福天下幸甚伏惟陛下聰明神武動以聖斷正當可為之運未行反本之法微臣企竦竊有所望伏願少留宸􅀈稍覽愚誠必無可施行棄之非晚臣不勝塵露禆補之誠論教本書憲宗元和四年元稹某年某月日某官臣稹昧死再拜獻書皇帝陛下臣伏見陛下降明詔修廢學增胄子選司成大哉堯之為君伯夷典禮夔教胄子之深旨也然而事有萬萬急於此者臣敢昧死舊唐書作冒昧殊死而言之臣聞諸賈生曰三代之君仁且久者教之然也誠哉是言且夫周成王人之中材也近管蔡則讒入右文粹作親舊唐書作有新唐書作任周召則義聞豈可謂天聰明哉然而克終於道者得不謂教之然耶始其為太子也未生胎教既生保教太公為之師周公為之傅召公為之保伯禽唐叔與之遊禮樂詩書為之習文粹作玩目不得閲淫艷妖誘之色耳不得聞優笑陵亂之聲口不得習慘舊唐書文粹作操斷擊搏之書居不得近容順隂邪之黨遊不得恣舊唐書作縱追禽戮舊唐書作逐獸之樂玩不得有遐異僻絶之珍凡此數者非謂備之於前而不為也亦將不得見而為之矣及其長而為君也血氣既定遊習既成雖有放心快已之事日陳於前固不能奪巳成之習已定之心矣則彼忠直道德之言固吾之所習聞也陳之者有以諭焉回佞庸違舊唐書作庸佞違道之説固吾之所積懼也諂之者有以辨焉人之情莫不欲耀其所能而黨其所近苟將得志則必快其所藴矣物之性亦然是以魚得水而遊馬逸駕而走鳥得風集作乘風而翔火得薪而熾此皆物之快其所藴也今夫成王所藴道德也所近聖賢也是以舉其近則周公左而召公右伯禽魯而太公齊快其藴則興禮樂而朝諸侯措刑罰而美教化教之至也可不為舊唐書文粹作謂信然哉及夫秦則不然滅先王之學曰將以愚天下黜師保之位曰將以明君臣胡亥之生也詩書不得聞聖賢不得近彼趙髙者詐宦之戮人也而傅之以殘忍戕賊之術且曰恣睢天下以為貴莫見其面以為尊是以天下之人未盡愚而胡亥固巳不能分獸畜新唐書作馬鹿矣趙髙之威攝天下而胡亥固巳自幽於深宫矣彼李斯者秦之寵丞相也因集本文粹作困讒寃死無所自明而况於疏逺之臣庶乎若此文粹作然則秦之亡有以致之也漢髙承之以兵革漢文守之以廉謹卒不能蘇復大訓是以景武昭宣天資集作質甚美才可以免禍亂哀平之間則不能虞篡弒矣然而惠帝廢易之際猶賴羽翼以勝其邪心是後有國之君議教化者莫不以興廉舉教設學崇儒為意曾不知教化之不行自貴者始略其貴者教其賤者無乃鄰於倒置乎洎我太宗文皇帝之在藩邸以至于為太子也選知道德者十八人與之遊習即位之後雖遊宴飲食之間若十八人者實在其中上失無不言下情無不逹不四三年而名髙盛古豈一日二日而致是乎遊習之之漸也貞觀以還師傅之官皆宰相兼領其餘官寮之集無之字選亦甚重焉馬周以位集作官髙恨不得為司議郎此其驗也文皇之後漸疏之賤之至於母后臨朝翦棄王族二唐書作室當中睿二聖厄難舊唐書作勞勤之際雖有骨鯁敢言之士既不得在調護保安之職終不能措唐書作吐扶衛之一詞而令醫集本文粹無醫字匠胡安金藏剖腹以明之豈不大哀哉兵興已集作以來兹弊尤甚師資保傅之官非疾廢眊瞶不任事者為之即休戎罷帥不知書者處之至於教諭贊議之徒疏冗散賤之士甚者縉紳恥舊唐書集本有由字之夫以匹夫之愛其子者猶求明哲慈惠之師以教之直諒多聞之友以成之豈天下之元子二唐書作良而可以疾廢眊瞶不知書者為之師疏冗散賤不適用者為之友乎此何足反居上舊唐書作不及上古之甚也近制宫寮之外往往以沉滯之老儒充侍書侍讀之選而又疏棄斥逺之越月踰時不得召見彼又安能傅成道德而保養其舊唐書有身字躬哉臣以為積此弊者豈不以皇天眷祐祚我唐德以舜繼文粹作以舜生舜舜以堯繼堯傳陛下十一聖矣莫不生而神明長而仁聖以是為屑屑習儀者故不之省耳臣獨以為於列聖之謀則可也計無窮之業以傳後嗣則不可脫或萬代之後有若周成王中才者而又生於深宫優笑之間無周召保助之教則將不能知喜怒哀樂之所自矣况稼穡之艱難乎今陛下以上聖之資肇臨海內是天下人人舊唐書作之人傾耳注目舊唐書集本作心之日也特願陛下思成王訓導之功念文皇遊習之漸選重師保慎擇集作簡宫寮皆用博厚𢎞深之儒而又練舊唐書作明逹機務者為之更進迭見日就月將因令皇太子洎諸生舊唐書作聚諸生定齒胄講業之儀行嚴師問道之禮至德要道以成之撤膳記過以警之血氣未定則輟禽色之娛以就學聖質既備則資遊習之善以𢎞德此所謂一人集作有元良萬邦以貞之化也豈直修廢學選司成而足倫匹其盛哉而又俾則舊唐書作知百王莫不幼同師長同術識君道之素定知天倫之自然然後選用賢良樹為藩屏出則有晉鄭魯衛之盛入則有東牟朱虛之強蓋所謂宗子維城犬牙磐石之勢也又豈與夫魏晉以降囚賤其兄弟而自翦其本枝者可同年而語哉集作乎微臣竊不自揆思為陛下永建無窮之長算輒敢冒昧殊死而言之初授拾遺獻書憲宗元和二年白居易五月八日翰林學士將仕郎守左拾遺臣白居易頓首頓首謹昧死獻書于旒扆之下臣伏奉前月二十八日恩制除授臣左拾遺依前充翰林學士者臣已與崔羣同狀陳謝但言忝冒未吐衷誠今者再黷宸嚴伏惟重賜詳覽臣謹按六典左右拾遺掌供奉諷諫凡發令舉事有不便於時不合於道者小則上封大則廷諍其選甚重其秩甚卑所以然者抑有由也大凡人之情位髙則惜其位身貴則愛其身惜位則偷合而不言愛身則茍容而不諫此必然之理也故拾遺之置所以卑其秩者使位未足惜身未足愛也所以重其選者使上不忍負恩下不忍負心也夫位未足惜恩不忍負然後能有闕必規有違必諫朝廷得失無不察天下利病無不言此國朝置拾遺之本意也由是而言豈小臣愚劣昧懦所宜居之哉况臣本鄉里一作校竪儒府縣走吏委心泥滓絶望煙霄豈意聖慈擢居近職每宴飫集作飲無不先及每慶賜無不先霑中廄之馬代其勞內厨之膳給其食朝慙夕惕已逾半年塵曠漸深憂愧彌劇未申微效又擢清班臣所以授官以來僅經十日食不知味寢不遑安唯思粉身以答殊寵但未獲粉身之所耳今陛下肇建皇極初受鴻名夙夜憂勤以求致理每施一政舉一事無不合於道便於時故天下之心顒顒然日有望於太平也然而今而後萬一事有不便於時者陛下豈不欲聞之乎萬一政有不合於道者陛下豈不欲革之乎儻集作候陛下言動之際詔令之間小有遺闕稍關損益臣必密陳所見潛獻所聞但在聖心裁斷而已臣又職在中禁不同外司欲竭愚衷合先陳露伏希天鑒深察赤誠無任感恩欲報懇欵屏營之至謹言論進奉書憲宗皇甫湜臣聞一人莫非王臣尺土莫非王有山川林澤文粹作藪之所産殖雨露春秋之所成就莫非王財誠宜推至公以示無外今國家既有公府又為私藏使州郡貢賦之外進奉相及恐非以天下為家示天下無私之道也且任土作集作之貢生産有常履畝之稅集作收等籍既定人識所出吏難為姦既無度程莫知紀極恣橫徵發因緣贓私驅陛下赤子措之不存之地侈君之嗜欲惑君之聰明實大姦之門大罪之竇也臣雖熟知陛下上聖之姿深仁之理凡內藏之實以充宴賜非務積藏如四逺未知何如百姓受弊何如後嗣平中之主由此傷儉德萌侈心何雖漢有少府水衡管𣙜山澤之利終不若領之於大農也且地之財無盡王之用不會何必固立集作之內府以開濫關耶伏望陛下罷內藏歸之公府約進奉之禮集作約别進合古之制徵斂有常財用無虧絶姦之根源除政之粃蠧全大體興太和天下大幸伏見去集作正月十一日赦書陛下深念疲人懇責貪吏往之隨使貢來一皆罷之此實白日之明層雲之澤也凡諸州府必有羡餘不歸之王庭必沒之集作于私室伏請每使當罷必上其數而謹其收水旱之不虞疾疫之不期以振疲集作罷羸以代蠲免軍旅之事工役之用以給其費以供其須居常之歲閉以待時無敢散泄以干刑司如是則大賴於人大伸於用矣與人論諫書杜牧某疏愚放文粹作怠惰不識機括獨好讀書讀之多矣每見君臣治亂之間興亡諫諍之道遐想其人舐筆和墨則冀人君一悟而至於治平不悟則烹身滅族惟此二者不思中道自秦漢以來凡千百輩不可悉數然怒諫而激亂生禍者纍纍皆是納諫而悔過行道者不能百一何者皆以辭語迂險指射醜惡致使然也夫迂險之言近於誕妄指射醜惡足以激怒夫以誕妄之説激怒之辭以卑陵尊以下干上是以諫殺人者殺人愈多諫畋獵者畋獵愈甚諫治宫室者宫室愈崇諫任小人者小人愈寵觀其旨意且欲與諫者一鬬是非一決怒氣耳不論其他是以每於本事之上尤增飾之今有兩人道未相信甲謂乙曰汝好食某物慎勿食果便食之必死乙必曰我食之久矣汝為我死必倍食之甲若謂乙曰汝好食某物第一少食茍食多集作多食必生疾集作病乙必因而謝之減食何則集作者迂險之言則欲反之循常之説則必信之此乃常人之情世多然也是以因諫而生亂者纍纍皆是也漢成帝欲御樓船過渭水御史大夫薜廣德諫曰宜從橋陛下不聽臣自刎以血汚車輪陛下不得入廟矣集本文粹並作陛下不廟矣仍注云不得入廟祠也上不説張猛曰臣聞主聖臣直乘船危就橋安聖主不乘危御史大夫言可聽上曰曉人不當如是耶謂諫諍之言當如猛之詳善乃從橋近者寶歷中敬宗皇帝欲幸驪山時諫者至多上意不決拾遺張權輿伏紫宸殿下叩頭諫曰昔周幽王幸驪山為犬戎所殺秦始皇葬驪山國亡玄宗皇帝宫驪山而祿山亂先皇帝幸驪山而享年不長帝曰驪山若此之凶耶我宜一往以驗彼言後數日自驪山回語親幸曰叩頭者之言安足信哉漢文帝亦謂張釋之曰卑之無甚髙論令一有今字可行也今人平居無事友朋骨肉切磋規誨之間尚宜旁引曲釋亹亹繹繹使其樂去其不善而樂行其善况於君臣尊卑之間欲因激切之言而望道行事治者乎故禮稱五諫而直諫為下前數月見報上披閣下諫疏錫以幣帛僻左且逺莫知其故近於遊客處一覩閣下諫草明白辨婉出入有據吾君聖明宜為動心數日在手味之不足且忭且喜且慰三者交并不能自止吾君聞諫既且行之仍復寵錫誘能諫者斯乃堯舜禹湯文武之心也聞於逺地宜為吾君忭也閣下以忠孝文章立於朝廷勇於諌而且深於其道果能動吾君而光世德牧承集作蒙閣下之厚愛冀於異時資閣下之知以進尺寸能不為閣下之喜復自喜也吾君今日披一疏而行之明日聞一言而用之賢才忠良之士森列朝廷是必集作以奮起志慮各盡所懷則文祖武宗之業窮天盡地日出月入皆可灑掃以復厥初牧縱不得效用但於一官一局筐篋簿書之間活妻子而老身命文粹有焉字作為歌詩稱道仁聖天子之所為治則為有餘能不自慰故獲閣下之一疏忭喜慰三者交并真不虛也宜如此也無因面讚其事書紙言誠不覺繁多某再拜直諫書劉允章救國賤臣前翰林院學士劉允章謹冒死上諫皇帝陛下臣聞太直者必孤太清者必死昔朝錯勸削諸侯之地以蒙不幸之誅商鞅除不軌之臣而受無辜之戮今并臣三人矣伏一無伏字守忠懷信口不宣心則刎頸刳腸向闕廷而死者并臣是也救國策從千里而來欲以肝腦上汙天廷欲以死尸下救黎庶臣死之後不見聖代清平故留賤臣以諫明主今短書一封不入長策伏蒙不收所以仰天捶胸放聲大哭殺身則易諫主則難以易死之臣勸難諫之主伏見陛下初登九五頒下諸州開直諫門言者無罪四方雷震百里奔馳至闕廷者願陛下致升平之業矣陛下既不用其策不捨其過或鞭撻市朝囚禁園苑深一作沉埋溝壑者不知其數乞食道路者不記其名夫輸忠獻策之臣匍匐闕廷者豈敢欺陛下乎大臣愛位而不敢言小臣畏死而不敢諫忘生請死之罪往往冒死天庭者知陛下覺悟也伏聞樞密之事要在殱疑作纎人以宰臣為度外之官以御史為不速之任寃者不得伸君子所以深藏小人所以深亂自古帝王以御史為耳目以宰相為股肱股肱廢則不能用耳目蔽則不能視今陛下廢股肱蔽耳目塞諫諍罪忠良欲令四海不言萬方鉗口可不畏也臣恐千秋萬歲説陛下不聖笑陛下不明臣所以急也當今天下求進之臣智者不肯自言不肖愚者不肯自言不賢故使賢愚混雜善惡同羣真智真愚何所分别取之則善惡進捨之則賢愚退何不使至愚在野至賢入仕使疑作今天下食祿之家凡有八入臣請為陛下數之節度使奏改一入也用錢買官二入也諸色功優三入也從武入文四入也虛銜入仕五入也改偽為真六入也媚道求進七入也無功受賞八入也國有九破陛下知之乎終年聚兵一破也蠻夷熾興二破也權豪奢僭三破也大將不朝四破也廣造佛寺五破也賂賄公行六破也長吏殘暴七破也賦役不等八破也食祿人多輸稅人少九破也臣聞自古帝王終日勸農猶恐其飢終日勸桑猶恐其寒此輩不農不桑坐食天下欲使天下之人盡為將士矣舉國之人盡為僧尼矣舉國之人盡為劫賊矣欲使誰人蠶桑乎今天下蒼生凡有八苦陛下知之乎官吏苛刻一苦也私債徵奪二苦也賦稅繁多三苦也所由乞斂四苦也替逃人差科五苦也寃不得理屈不得伸六苦也凍無衣飢無食七苦也病不得醫死不得葬八苦也仍有五去勢力侵奪一去也姦吏隱欺二去也破丁作兵三去也降之疑為客四去也避役出家五去也人有五去而無一歸人有八苦而無一樂國有九破而無一成官有八入而無一出凡有三十餘條上古已來未之有也天下百姓哀號於道路逃竄於山澤夫妻不相活父子不相救百姓有寃訴於州縣州縣不理訴於宰相宰相不理訴於陛下陛下不理何以歸哉伏見蠻冦欺侵神道誑惑我國家作亡命之渠魁為逋逃之窟穴徵兵五年今日誅之何見之晚也臣聞却以疑未終銷兵於當時本無養兵日為一作與亂臣張本也今不除其亂本而除其亂苗士卒蕩盡於中原玉帛多亡於道路嶺外仍令節度四面討除蒼生嗷嗷何負陛下今行此討罰以為上策臣恐今年除一承嗣明年又生一承嗣天下征戰未有了期則禍難起於腹心蜂蠆生於手足陛下左右無人敢言但知潤色美詞恱情暢志而已豈知千里零落萬里凋殘者哉今國家狼戾一作狽如此天下知之陛下獨不知之天下不敢言臣獨言之萬死一生臣死一介之命救萬人之命臣今雖死猶勝於生臣獻策千條未蒙一問羈孤貧病流落風塵眷戀朝廷而不能去儻陛下覽臣愚見知臣愚忠則理亂斯須存亡瞬息太平之日昭然目前必也陛下不以萬國為心不以百姓為本臣當幸歸滄海葬江魚之腹不忍見國難危臣之願畢矣臣懇劈一作辭不勝痛切感懼之至文苑英華卷六百七十六
