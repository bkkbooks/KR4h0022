body:
  text: 文苑英華卷二百九十八宋李昉等編行邁十館驛附館驛八十首經望湖驛韋鎰大漠無屯雲孤烽出亂栁前驅白登道顧失飛狐口遙憶代王城俯臨恆山後纍纍多古墓寂寞為墟久豈不固金湯終聞擊銅斗交歡初仗信接晏翻貽咎埋寶賊夫人磨笄傷彼婦功成且行薄義立名不朽莫慎纎微端其何社稷守身殘國遂亡此立人君醜竹里館盧象江南氷不閉山澤氣漸通臘月聞山鳥寒崖見蟄熊栁林青半合荻笋亂無叢回首金陵岸依依向北風剡溪館聞笛丁仙芝夜久聞羌笛寥一作寂寥虛客堂山空響不散溪靜曲宜長草木生邉氣城池逗夕涼虛然異風出髣佛宿平陽題豫章館崔國輔楊栁映春江江南轉佳麗吳門緑波裏越國青山際逰宦常往來津亭暫臨憩驛前蒼石沒浦外湖沙細向晚宴疑且平孤舟同一作冏然逝雲留西北客氣歇東南帝獨有萋萋心誰知怨芳嵗間齋卧疾行藥至山館稍次湖亭常建旬時結隂霖簾外初白日齋沐清病客心魂畏虛室間梅闕户明鏡悲舊質同袍四五人何不來問疾行藥至石壁東風變萌芽主人出門緑小隱湖中花時物堪獨往春帆宜别家辭君為滄海爛漫從天涯晚行次苦行館却憶于越舊逰劉長卿匹馬風塵色千峯旦暮時遙看落日盡獨向逺山遲故驛花臨道荒村竹映籬誰憐却回首步步戀南枝移使鄂州次峴陽館懷舊居前人多慙恩未報敢問路何長萬里通秋鴈千峯共夕陽舊逰成逺道此去更違集作迷鄉草露空山裏朝朝滿客裳使還至集作自菱波集作坡驛渡溮水作前人清川已再涉疲馬共西還何事行人倦終年流水間孤煙出廣澤一鳥響空山愁入雲峯裏蒼蒼閉古關登松江驛樓北望故園前人淚盡江樓北望歸田園已陷百重圍平蕪萬里何人去落日千山空鳥飛孤舟漾漾寒潮小極浦蒼蒼逺樹微白鷗漁父徒相待未掃攙搶懶息機北歸次秋浦界清溪館前人萬嶺集作里猿頻斷孤村客暫依鴈過彭蠡暮人向宛陵稀舊路青山在餘生白首歸漸知行近北不見鷓鴣飛嶽陽館中望洞庭湖前人萬古巴邱戍平湖集作北此望長問人何渺渺愁暮更蒼蒼疊浪浮元氣中流沒太陽孤舟有孤客早晚達瀟湘登金陵臨江樓驛張謂古戍依重險高樓見五梁山根盤驛道河水浸城墻庭樹巢鸚鵡園花隱麝香忽然江浦上憶作捕魚郎登楚州城望驛路十餘里山村竹林相次交映李嘉祐十里山村道千峯櫟樹林霜濃竹枝亞嵗晚荻花深草市多樵客漁家足水禽幽居雖可羡無那子牟心自蘇臺至望亭驛人家盡空春物增思悵然有作因寄從弟紓南浦孤蒲覆白蘋東吳黎庶逐黃巾野棠自發空臨水江燕初歸不見人逺岫集作樹依依如送客平田渺渺獨傷春誰集作那堪回首長洲苑𤇺火連集作年年報虜塵宋州東登望題武陵驛前人梁宋人稀鳥自啼登艫一望倍含悽白骨半隨河水去黃雲猶傍郡城低平坡戰地花空落舊苑春田草未齊明主頻移虎符守幾時行縣向黔黎題前溪館前人兩年謫宦在江西舉目雲山要自迷今日始知風土異潯陽南去鷓鴣啼宿洞口驛集作官錢起野竹通溪冷泉聲入户鳴往來人不到寒草上階生石城館酬王將軍郎士元誰能繡衣客肯駐木蘭舟連鴈沙邉至孤城江上秋歸帆背南浦楚塞入西樓何處看離思滄波日夜流登鍾山館耿韋匹馬宜春路蕭條背館心澗花寒夕雨潭水黑朝林野市魚鹽隘江村竹葦深子規何處發青樹滿高岑雲陽館與韓申卿宿别司空曙故人江海别幾度隔山川乍見翻疑夢悲歡一作相悲各問年孤燈寒照雨濕竹暗浮煙更有明朝恨離杯惜共傳題江陵臨沙驛樓前人江天清更愁風栁入江樓鴈惜楚山晚蟬知秦樹秋凄涼多獨醉零落半同逰豈復平生意蒼然蘭杜洲自平陽館赴郡暢當晨興平陽館見月沉江水溶溶山霧披肅肅沙鷺起奉恩謬符竹伏軾省頑鄙何當施教化愧迎小郡吏寥落火耕俗征途青冥裏德綏及吾民不德將鹿矣擒姦非性能多愍會衰齒恭承共理詔恆懼墜諸地宿荆溪館呈丘義興嚴維失落荆溪上依仁忽暝投長橋今夜月陽羡古時州野燒明山郭寒更出縣樓先生能館我何事五湖逰襄武館逰眺韋應物州民知禮讓訟簡得遨逰高亭慿古地山川當暮秋是時粳稻熟西望盡田一作平疇仰恩慙政拙念勞喜嵗收淡泊風景晏繚繞雲樹幽節往情惻惻天高思悠悠嘉賔幸得集芳樽始淹留還希習池賞聊以駐鳴騶自蒲塘驛回駕經歷山水前人館宿風雨滯始晴行蓋轉潯陽山水多草木俱紛衍﨑嶇緣碧澗蒼翠踐苔蘚高樹夾浮流集作湲崩石橫隂巘野杏依寒折餘雲冒嵐淺性愜形豈勞境殊路遺緬憶昔終南下佳逰亦屢展時禽下流暮紛思何由遣除夜宿石橋驛巳見一百五十八卷戴叔倫彭婆館逢韋判官使還前人受辭分路逺會府見君稀雨雪經年去軒車此日歸暮春愁見一作更别久客順相依寂寞伊川上楊花空自飛寓居武丁館陳存暑雨颯巳過涼飈觸幽襟寓一作噓館無喧塵緑槐多晝隂俯視古苔積仰聆早蟬吟放卷一長想閉門千里心清溪館作前人指途清溪裏左右唯深林雲蔽望鄉處雨愁為客心遇人多物役聽鳥時幽音何必滄浪水庶兹浣塵襟宿北樂館陳閏欲眠不眠夜深淺越鳥一聲空山逺庭木蕭蕭落葉時溪聲雨聲聽不辨溪流潺濕雨習習燈影山光滿忩入棟裏不知渾是雲曉來但覺衣裳濕喜皇甫大夫同宿大梁驛釋清江江頭旌斾去花外卷簾空夜色臨城月春聲渡水風也知行李别暫喜話言同若問廬山事終身愧逺公酬姚補闕南仲雲溪館中戲題隨書見寄前人寺溪臨使府風景借仁祠補衮周官貴能名漢主思卧雲知獨處望月憶同時忽枉緘中贈瓊瑶滿手持宿新安江深渡館寄鄭州王使君朱長文霜飛十月中搖落衆山空孤館閉寒水大江生夜風賦詩情有憶沈約在關東題嘉陵驛武元衡悠悠風斾繞山川山驛空濛雨似煙路半嘉陵頭已白蜀門西更上集作上更青天病中赴袁州次香館楊衡病輿憩上館繚繞向山隅荒葛漫欹壁幽禽啄朽株力微怯升降意欲結踟蹰誰能挹香水一為濯煩紆小江驛送陸侍御歸湖上山陳羽鶴唳天邉秋水空荻花蘆葉起西風今夜渡江何處宿會稽山在月明中秋日送客至濳水驛劉禹錫候吏立沙際田家連竹溪神祠社日鼓茅屋午時雞雀噪晚禾地蝶飛秋草畦驛樓宫樹集作榭近疲馬再三嘶元和甲午嵗詔書盡徵江湘逐客余自武陵祗召赴京宿于都亭有懷續來諸君子前人雲雨江湖集作湘起卧龍武陵樵客躡仙蹤十年楚水楓林下今夜初聞長樂鍾三鄉驛樓伏覩玄宗望女几山詩小臣斐然有感前人開元天子萬年足唯惜當時光景促三鄉陌上望仙山歸作霓裳羽衣曲仙心從此在瑶池三清八景相追隨天上忽乘白雲去世間空有秋風辭宿江館集作鹽江驛張籍楚驛南渡口夜深來客稀月明見潮上江靜覺鷗飛旅宿今巳逺此行猶未歸離家久無信又聽搗衣寒題褒城驛元楨見集本嚴秦修此驛兼漲驛前池已種萬竿竹又一作更栽千樹梨四年三月半新笋晚花一作牡丹時悵望一作思向東川去等間題作詩一作隅然題作詩望亭驛酬别周判官白居易何事出長洲連宵飲不休醒應難作别歡漸少於愁燈火穿村市笙歌上驛樓何言五十里巳不屬蘇州早發楚城驛前人過雨塵埃滅緣江道徑平月乘殘夜出人趂早涼行寂歷間吟動冥濛暗思生荷塘翻露氣稻隴㵼泉聲宿犬聞鈴起栖禽見火驚朧朧煙樹色十里始天明宿揚州水館李紳舟依淺浦一作岸參差合橋映晴虹上下連輕楫過時搖水月逺燈繁處隔秋煙却思海嶠還悽歎近涉江濤更凛然間憑欄干指星漢尚疑軒蓋在樓船宿孤館賈島落日投春戍愁生為客途春山晴集作寒後緑江月夜深集作來孤橘樹千株在漁家一半無自知風水淨舟繫岸邉蘆泥陽館前人客愁何併起暮送故人回廢館秋螢出空城寒雨來夕隂飄白露樹影掃青苔獨坐離容慘孤燈照不開題青雲館杜牧虬蟠千仞劇羊腸天府由來百二強四皓有芝輕漢祖張儀無地與懷王雲連帳影蘿隂合一作近枕繞泉聲客夢涼深處會容高尚者水苖三頃百株桑冬日五湖集作浪館水亭懷别蘆荻花多觸處飛逰登集作獨憑虛檻雨微微寒林葉落鳥巢出古渡風集作浪高漁艇稀雲抱四山終日在草荒三徑幾時歸江城向晚西流急集作暝東風急無限鄉心集作一半鄉愁聞搗衣商山富春集作水驛驛本名與陽諫同姓名因此改為富沙驛前人益戅猶來未覺賢終須南去吊湘川當時物議朱雲小後代聲華白日懸邪佞每思當靣唾清貧長欠一杯錢驛名不合輕移改留警朝天者惕然和野人殷潛之一作夫題籌筆驛前人三吳裂婺女九錫獄孤兒霸主業未半本朝心是誰永安宫受詔籌筆驛沈思畫地乾坤在濡毫勝負知艱難同草創得失計毫釐寂默經千慮分明混一期川流縈智思山聳助扶持慷慨匡時略從容問罪師褒中秋鼓角渭曲晚旌旗仗義懸無敵鳴攻故集作固有詞若非天奪去豈復虜集作慮能支子夜星才落鴻毛鼎便一作漸移郵亭世自換白日事長垂何處躬耕者猶題殄瘁詩宿黃花館楊發孤館蕭條槐葉稀暮蟬聲隔水聲微年年為客路無盡日日送人身未歸何處迷鴻離浦月誰家愁婦搗霜衣夜深不卧簾猶捲數點殘螢入户飛行次潼關驛逢魏扶東歸巳見二百十八卷許渾宿望亭驛却寄蘇州同逰前人候館人稀夜更長姑蘇臺逺樹蒼蒼江湖潮落高樓逈河漢秋歸廣簟涼月轉碧梧移鵲影露低紅草集作夜濕螢光西園時思應無限集作詩侣應多思莫醉笙歌掩畫堂秋晚題雲陽驛西亭蓮池前人心憶蓮池秉燭逰葉殘花敗尚維舟煙開翠扇清風晚水泛紅衣白露秋神女暫來雲易散仙娥初去月難留空懷逺道無時贈醉倚西欄盡日愁題白馬驛薛逢晚麥芒乾風似秋旅人方作蜀門逰家山漸隔梁山逺客路長依漢水流滿壁存亡俱是夢百年榮辱盡堪愁胸中憤氣文難遣強指豐碑哭武侯題籌筆驛前人天地三分魏蜀吳武侯倔起贊訏謨身依豪傑傾心術目對雲山演陳圖赤伏運衰功莫就皇綱力振命先徂出師表上留遺恨猶自千年激壯夫過馬嵬驛溫庭筠穆滿曾為物外逰六龍經此暫淹留返魂無驗青煙滅埋血空成集作生碧草愁香輦無集作却歸長樂殿曉鍾還下景陽樓甘泉不得集作復重相見誰道文成是故侯題望苑驛東有馬嵬驛西有相思樹前人弱栁千條杏一枝半含春雨半垂絲景陽寒井人難到一作見長樂晨鍾曉集作鳥自知花影幾年集作至今通博望樹名何世集作從此號相思至今集作分明十二樓前月不向西陵照戚集作盛姬此詩第三百二十七卷英華誤作題端正樹詩詳載後注題松江驛方干便向中流出太陽兼疑大岸逼浮桑門前一作樹間白道通丹闕浪裏青山占幾鄉帆勢落斜依浦溆鍾聲斷續在滄茫古今悉不知天意偏把雲霞媚一方平望驛張祐一𣲖吳興水西來此驛分路遙輕幾日身去是孤雲雨氣朝忙蟻雷聲夜聚蚊何堪秋草色到處重離羣洞庭南館前人一徑逗霜林朱欄繞碧岑地盤雲夢角山鎮洞庭心樹白看煙起沙紅見日沉還因此悲屈惆悵又行吟濠州水館前人高閣去煩燠客心遂安舒清流中浴鳥白石下逰魚秋樹色凋翠夜橋聲梟虛南軒更何待坐見玉蟾蜍題弋陽館前人一葉飄然下弋陽殘霞昏日樹蒼蒼葛溪弋陽别名漫淬干將劒却是猿聲斷客腸泊鳬磯江館趙嘏風雪晴來嵗欲除孤舟晚下意何如月當軒色湖平後鴈斷雲聲夜起初傍晚管絃何處靜犯寒楊栁繞津踈三間茅屋東溪上歸去生涯竹與書發青山館前人鳬鷖聲暖野塘春鞍馬風高驛路塵一宿青山又須去古來難得是間人仙娥驛前人溪上郵亭氣早秋樹邉溪色繞床流行人亦羡郵亭吏住向此中今白頭題嘉秦驛薛能盡室可招魂蠻餘出蜀門雹涼隨雨氣江熱傍山根蠶月繅絲路農時碌碡村干將磨欲盡無位可酬恩題嘉陵江驛前人江濤千疊閣千層銜尾相隨盡室登稠樹蔽山聞杜宇午煙曛日食嘉陵頻題石上程多破暫歇泉邉起不能如此幸非名利切益州來日合攜僧下第後夷門乘舟至永城驛題前人秋賦春還計盡違自知身是拙求知唯思曠海無休日一作處忽喜孤舟似去時連夜一程兼汴宋夾隄千栁雜唐隋從來此恨皆前達敢負吾君作楚詞浙河館集作暮春山行田家歇馬李郢西濕菰蒲斜日明茅厨煮繭棹車聲青蛇上竹一種色黃蝶集作燭隔溪無限情何處樵漁將逺餉故田園土憶春耕千峰萬瀨集作靄水潏潏羸馬此中愁獨行興州江館鄭谷向蜀還秦計未成寒蛩一夜繞床鳴愁眠不穩孤燈盡坐聽嘉陵江水聲宿山驛張蠙驛在千峯裏寒宵獨此身古墳時見火荒壁悄無鄰月白翻驚鳥雲間欲就人秪應明日鬢更有老相親經荒驛前人古驛成幽境雲蘿隔四鄰夜燈移宿鳥秋雨禁行人廢巷荆叢合荒庭虎迹新昔年經此地終日是紅塵春日過夀安山館羅鄴舊國多將泉石親西逰愛此拂行塵簾開山色離亭午步入香松别島春誰肯暫安耕釣地相逢謾嘆路岐身歸期不及桃花水江上何人繪雪鱗宿彭蠡館羅隱孤館少行旅解鞍增别愁逺山矜薄暮高栁怯清秋病裏見時態醉中思舊逰所懷今巳矣何必恨東流宿荆州江陵驛前人西逰象闕愧知音東下荆溪稱越吟風動芰荷香四散月高集作明樓閣影相侵間欹别枕千般夢醉送征帆萬里心薜荔衣裳木蘭楫異時煙雨好追尋籌筆驛前人拋擲南陽為主憂北征東討盡良籌時來天地雖同力運去英雄不自由千里山河輕孺子兩朝冠劒恨譙周唯餘岩下多情水猶解年年傍驛流蓮塘驛前人蓮塘館東初日明蓮塘館西行人行隔林啼鳥似相應當路好花疑有情一夢不須追往事數杯猶可慰勞生莫言來去只如此君看鬢邉霜幾莖商於驛樓東望有感前人山川去接漢江東曾伴隋侯醉此中歌繞夜梁珠宛轉舞嬌春席雪朦朧棠遺善政隂猶在薤送哀聲事巳空惆悵知音難得見集作魂難得兩行清淚白楊風秋日泊平望驛寄太常裴郎中前人蘋洲重到杳難期西倚郵亭憶住時北海樽中長集作常有酒東陽樓上獨集作豈無詩地清早負生靈望官重方升禮樂司聞説江南舊歌曲至今猶自唱吳姬文苑英華卷二百九十八
