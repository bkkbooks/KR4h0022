body:
  text: 文苑英華巻八百八十二宋李昉等編家廟三東都留守令狐楚家廟碑一首天平軍節度使殷公家廟碑一首淮南節度使檢校尚書左僕射趙郡李公家廟碑一首東都留守令狐楚家廟碑劉禹錫今上元年七月十三日汴州刺史宣武軍節度副大使知檢校禮部尚書兼御史大夫上柱國彭陽縣開國伯令狐公西嚮拜章上言守臣楚蒙被恩澤列爲元侯得立家廟以奉常祀制書下其奏于有司於是善相考祥得地于集作於京師通濟里居無何新廟成公以守藩故申命季弟監察御史定卜牲練日越八月丁亥祔享三室塪墉以尚幽設幄以迎精禮無尤違神用寜謐第一室曰秦州上邽縣尉諱濬以妣太原王氏配第二室曰綿州昌明縣令贈吏部尚書諱崇亮以妣贈太原郡夫人河東柳氏配第三室曰太原府功曹叅軍贈司空二字集作太子太保諱丞集作承簡以妣贈魏國太夫人冨春孫氏配明年十月公由浚郊以介圭入覲直拜户部尚書進爵爲侯旣辭戎旃集作旗得以列侯謁三廟是嵗南至上不視朝又得以展時祭先期致齋栗然以敬旣齋盡志歆然永思奉其百順陳以具物始躋而䖍恭終獻而汍瀾旣卒事顧麗牲之石冝有刋紀乃俾家老授其牒于所知云令狐晉邑也晉大夫魏顆以輔氏之功始封焉其易名曰文國語所謂令狐文子是也一作已其先周文王之昭畢公髙之裔畢萬為晉卿始封于魏自萬至顆盖四世其後三十七世藍田侯虬仕拓䟦魏爲燉煌郡太守子孫因家遂占數為郡人藍田之孫熈在隋爲納言惟上邽府君納言之𤣥孫道克肖而位不至惟尚書府君西州之右族光未耀而德已基惟司空集作太保府君志爲君子之儒以明經文粹作經學居上第調補陽安縣主簿歴正平縣尉汾州司法叅軍陜西大都督府兵曹終于太原府首掾始以顓經進旣仕旁通百家愛集作愛非榖梁子清而婉左邱明國語辨而工司馬遷史記文而不華咸手筆朱墨䆒其㣲㫖愷悌以肥家信誼以急人德克齒耋獨享天爵故休祐集作祜集于身後徽章流乎佳城凡以子貴丞集作承澤降命書告第者始贈尚書祠部郎中再贈禮部尚書三加右僕射四進太保五爲上公八字集作四字今稱先夫人亦四徙封宻印纍纍邦族聳慕生三子皆才彭陽公爲嗣次子從端實肅給今爲檢校膳部郎中叅河東軍事季子前所謂監察御史今主柱下方書温敏而有文綽綽然真令兄弟惟彭陽公以才名翰飛叅侍從八字集作以詞筆取科名班叅侍從由博士主尚書牋奏典内外書命遂登樞衡言文章者以爲冠擁節緫戎率身知集作和是衆留于盟津變風于浚都言方畧者以為能夫浚師嚄唶難治乘釁竊發寢成習俗莅政二作本政五載飲和革心束馬來朝慿熊集作熊羆文粹作人皆隕涕問公還期觴必祝之留為常伯旋命居守汴人聞公之東近而愈集作俞懐翹瞿集作翹翹瞿瞿盡文粹作咸西其首言遺愛者可紀焉貴而率禮老而能慕怵惕乎霜露齊莊乎廟祧睦其仲季施及鄉黨言孝悌者歸厚焉勒銘于碑以代夷文粹作彛鼎銘曰己孤之孝莫如備物顯彼二本作顯新廟四阿三室時維仲月卜用柔日醆醴苾芬牲牷博文粹作肥腯籩甒在堂蕭膋在庭孝孫蒸蒸躬文粹作恭若捧盈低簮委紳薦爼登鉶肹蠁交感流涕集作涕流縁纓禮以備儀誠以致羙祖考來格錫之休集作丕祉工祝告記退循軒所乃授風人作詩以紀猗歟彭陽之寵光佐憲皇穆集作王非西省東䑓迭為侍郎國之大柄集作政咨爾平章敬宗凝旒俾鎮雍邱入爲地官今集作令守東周彭陽之忠厚冝介福以壽東郊旣釐可復朝右綿綿其胄系于周舊由我顯起必昌其後大和紀元作廟之首刻碑廟門龍集己酉天平軍節度使殷公家廟碑馮宿能樹休勲著茂功豊人爵列天秩焜耀當代恢張其門者幾何人哉不有營繕乎先宗廟而後宫室不有禋祀乎愴春秋而感霜露太和甲寅嵗天平軍節度使檢校尚書右僕射陳郡殷公侑建家廟于京師永平里之東北隅禮也前此表陳其請詔報曰俞勿亟成功度思來格於是乎討獻尸奠盎之茂典徵以繭粟浴蘭之通制冬十有一月辛亥奉工部衞尉騎省三府君李氏周氏劉氏三太夫人神主克祔于其室自西徂東靡陋靡豐守經㨿古處約為恭追惟我氏之權輿二十一代祖封在東漢桓靈間爲諌議大夫出冀州刺史避黨錮棄官挈家属南渡江栖於曲阿邁德流芳或隠或顯粲于家牒播于人聞十九代至工部府君諱楷字文絢一作詢髙宗朝四岳舉髙第釋褐拜雍州新豐尉累遷大理丞天授中以議獄平反為酷吏所䧟貶台州永寕丞今上太和八年七月詔追贈工部侍郎衞尉府君諱𤣥覺字元明十八明經出身以工部府君處明夷之時持法不撓謫居而殁未歸舊阡茹荼調選求為寕海尉旣克營護祔于先兆遂大布之衣終身不言禄與工部府君同日追贈衞尉少卿騎省府君諱懌字易從少負志氣博學善屬文弱冠逰太學籍甚於公卿間天寳末知天下將亂乃捉裝東歸侍太夫人版輿徙居吳郡吳中士大夫得從府君逰者鄉黨以為榮本道採訪使李希言辟為從事奏授試崑山尉浙東節度使薛兼訓請爲謀奏授試右衞兵曹叅軍並不就事具今東川節度禮部尚書楊嗣復府君神道碑元和至寳歴中累追贈左㪚騎常侍於戱三君皆位不允疑作充量道屯於時贈典累錫覃恩逮及天其或者將厥後必有逹人疇庸纉服在於茲者不然何陳郡公之龎鴻魁梧磊砢昭彰若此陳郡公大度宏略自誠而明垂髫而早聞立志負笈而見賞先逹佐軺軒不辱於絶域昇禮闈有聲於奉常爾其起草彌綸剖符愷悌五諌之𢎞益十連之勞徠徵拜名卿出乘元戎奮餓夫為齊氓化亂邦為善部襁負始至壺漿遽迎錫命就加壐書亟降時以為賀公以為憂桂人洪人滄人鄆人旣尸祝之又謳歌之異日鄭伯來朝韓侯入覲執圭有委蛇之狀捧爼申洞屬之容揚名立身養親繼孝賢臣之懿圖彰矣君子之能事畢矣夫碑之於神道者懸空疑作窆所用碑之於廟門者麗牲所資先祖無羙而稱之之爲一作謂誣先祖有羙而不稱之之謂不明古之人銘其功烈於鼎今人銘其德善於碑若然則轉石他山搜詞直筆垂攸乆於刋刻託堅剛以居諸皷音無窮鍾慶不匱盡在是已其銘曰帝里西偏天街右方三室兩廂克建一作搆斯堂於惟浸昌云誰經之鄆侯殷君云誰處之祖烈宗文藹然清芬揚名顯親教孝申敬是為率德可以觀政莫之與盛比時備物追逺復始無違享嘗茲用受祉固在元祀祝嘏言具粢盛旣飭罔絶敬齊如聞歎息有典有則順考前典聿脩明禋事死猶生為能饗親爰奉爰尊於惟皇祖持法不囘酷吏所擠竟孤其才僉曰哀哉穆穆王父天鍾孝德啜泣封樹歸全兆域報日罔極猗那先子超度名軰逺圖中輟貽慶後昆𤣥鑒不昧否道旣傾復迷非逺奉烝如在欽若報本飛章瀝懇秉越有䖍干城嶷然永懐悽愴長薦吉蠲於斯萬年淮南節度使檢校尚書右僕射趙郡李公家廟碑白居易王建侯侯建廟廟有噐噐有銘所以論譔先德明著後代或書于鼎或文於碑古今之通制也維開成某年某月某日宣武軍御史節度使檢校尚書右僕射汴州刺史上柱國賜紫金魚袋趙郡李公齋沐祗栗拜章上言請立先廟以奉常祀於是得請于天子承式于有司是嵗某月某日經始於東都明年某月某日有事于新廟外盡其物内盡其志三獻百順神格禮成其友居易以李氏南祖唐宰相世系表李乃趙郡李氏有南祖西祖東祖集作宗廟非世家名爵與僕射志行官業書于麗牲之碑謹按家畧九代祖善權後魏譙郡守八代祖延觀徐梁二州刺史七代祖續馬頭太守六代祖顯逹隋頴州刺史五代祖遷皇朝冝榖二州别駕贈德州刺史髙祖季集粹作孝卿右㪚騎常侍贈德集粹作鄧州刺史曽祖府君諱敬𤣥總章儀鳳間歴吏部尚書侍郎同中書門下三品中書令𢎞文舘大學士監脩國史封趙國公謚曰文憲才智職業載國史今祭于第一室以妣集作非國夫人范陽盧氏配焉王父府君諱守一屬世難家故不求聞逹避榮樂道與時浮沉終成都府郫縣令今祭于第二室以妣榮陽夫人鄭氏配焉先考府君諱晤集作悟非歴金壇烏程晉陵三縣令府君為人篤於家行餙以吏事動有常度居無惰容所蒞之邑有善政辭滿之日多遺愛不登貴仕其命矣夫登于第三室以先妣上谷夫人范陽盧氏配焉府君累贈至尚書右僕射夫人累贈至上谷郡太夫人前後凡三追命六告身二本作弟渥澤疊洽自葉流根從子貴也郫縣洎晋陵府君咸善積于躬道屈于位儲祉流慶而僕射生焉僕射名紳字公埀六嵗丁晋陵府君憂孺慕號踊如成人禮九嵗終制孝養上谷太夫人年雖幼承順無違家雖貧甘㫖無闕侍親之疾冠帶不觧者三載餘可知也執親之䘮水漿不入口者五日餘可知也先是祖考妣晋陵府君前娶夫人裴氏無子早䘮洎叔父兄妹之殯咸未歸祔各隅集作處一方公在斬衰中親護九䘮匍匐萬里及期䘮事禮無闕違至誠文粹作誠感神有靈鳥瑞芝之應事動鄉里名聞公卿言孝友者以為表率憲宗嗣綂三年李錡盗據京口公寓居無錫擢第東歸錡聞公名署職引用初詢以謀畫結舌不對次強以章檄絶筆不書誘之以厚利不從迫之以滛刑不動將僇辱闕就幽囚者七旬誠質神明有死無二言名節者以闕拜右拾遺嵗餘穆宗知公忠孝文行召入翰林特授司封員外郎知制誥遷中書舍人承㫖前膝二本作承顔色膝知無不言獻替啓沃如石投水俄拜御史中丞戸部侍郎旣而望屬台衡朝當晏駕時移世變遂出掾髙要佐潯陽旋為滁壽二州刺史大凢公之爲政也應用無方所居必化卧理二郡以去害為先故有盗奔獸伏集作依之感㢘察浙右以分憂爲功故有䘏隣活殍之惠尹正河洛以革弊爲急故有摘奸抉蠧之威文宗知公全才知文粹作以汴難理乃授鈇鉞俾鎮綏之初宣武師人驕強狠悍狃亂徼利積習生常公旣下車盡知情僞刑賞信惠合以為用一年而下懲勸二年而下服畏三年而下耻格肅然丕變薫然太和撫之五年人俗歸厚至於捍大患禦大災却飛蝗遏暴水致歲於豐稔免人於墊溺噫㣲公之力汴之民其為殣乎其為魚乎殊績尤課不可具舉天下征鎮淮海為大非公作師不足以長束諸侯制加銀青光禄大夫揚州刺史淮南諸州二本作道節度觀察等使餘如故詔下之日出次於外軍門不擊柝里巷無吠犬從容五日按節而東百姓三軍挈壺漿捧簞醪遮道攀餞者動以萬軰皆鳴咽流涕如嬰兒之别慈母焉噫若非襦袴之惠及其㓜鷄豚之養及其老又推赤心置人腹中者則安能化暴戾之俗一至於此乎西人泣送東人歌迓二本作迎梁楚千里風變化移膏雨景星所至蒙福于時開成㑹昌之際上方致理公未登庸顒顒蒼生還二本作還望而已盛矣哉大丈夫生於世也以忠貞奉于君以義利惠乎人以黻冕貴乎身以宗廟顯乎親以孝敬交乎神冝其荷百禄輔一德為有唐之宗臣者歟君子謂李氏之廟也休哉公之祭也順哉然曰有孫如此有子如此可謂孝矣故其碑銘曰二本作云祭祀從貴爵士二本作士有秩諸侯之廟一宫三室皇皇西室皇祖中書曽二本作孝孫追逺昭穆有初顯顯中室王父闕順孫祗享盡慤文粹作孝盡敬肅肅東室先考晋陵嗣子奉薦孝思蒸蒸嗣子其誰僕射公垂公垂翼翼齊嚴諒直爲子爲臣有典有則載膺休命載踐右職以孝肥家以忠報二本作肥國乃授侯伯纛鉞旂㦸乃饗祖禰牲牢黍稷家聲振耀國典褒餙六命徽章三世血食光大遺訓顯揚先德子孫承之埀裕無極文苑英華巻八百八十二
