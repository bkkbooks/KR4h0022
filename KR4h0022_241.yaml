body:
  text: 文苑英華卷二百四十一宋李昉等編酬和二劉禕之一首楊炯三首盧照鄰三首褚亮一首陳子昻四首任希古一首李嶠五首沈佺期一首杜審言一首于季子一首宋之問三首張説六首蘇頲五首張九齡七首酬鄭沁州劉禕之騏閣一代良熊軒千里躅緝圖昭國典按部留宸矚匪厭承明廬佇兼司隸局藝書暫輟載行使方臨俗節變風緒髙秋深露華溽寒山斂輕靄霽野澄初旭已覺一作切長年悲誰堪岐路促遙林征馬迅别館嘶驂局雅贈響摐金索居暌倚玉悽斷離鴻引勞歌思足曲和酬虢州李司法楊炯脣齒標形勝關河壯邑居寒山抵方伯秋水面鴻臚君子從遊宦忘情任卷舒風霜下刀筆軒蓋擁門閭平野雲黃變長洲鴻鴈初菊花冝泛酒蒲葉好裁書昔我芝蘭契悠然雲雨疏非君重千里誰肯惠雙魚和鄭讐校內省眺矚思鄉懷友前人銅門初下辟石館始沉研遊霧千金字飛雲五色箋樓臺橫紫極城闕俯青田暄入瑶房裏春回集作過玉宇前霞文埋落照風物集作色淡歸煙翰墨三餘隙關山四望懸頽風集作峯暌酌羽流水曠鳴絃雖欣承白雪終恨隔青天和劉長史答十九兄前人帝堯平百姓高祖宅三秦子弟分河嶽衣冠動縉紳盛名恆不隕歷代幾相因街巷塗山曲門閭洛水濵五龍金作友一子玉為人寶劔豐城氣明珠魏國珍風標自落落文質且彬彬共許刁玄亮同推周伯仁石城俯天闕鍾阜對江津驥足方遐駛集作騁狼心獨未馴鼓鼙鳴九域風火集重闉城勢餘三版兵威乏四鄰居然混玉石直置保松筠耿介酬天子危言數賊臣鍾儀琴未奏蘇武節猶新受祿寧辭死揚名不顧身精誠動天地忠義感明神怪鳥來集作俄垂翼修蛇竟暴鱗來朝拜集作報休命述職下梁一作良岷善政馳金馬嘉聲繞玉輪三荆忽有贈四海更相親宫徴諧鳴石光輝掩燭銀山川遙滿目零露坐霑巾友愛光天下恩波浹後塵懦夫仰高節下里繼陽春和王奭秋夜有所思盧照鄰寂寂南軒夜悠然懷所知長河落鴈苑明月下鯨池鳳臺有清曲此曲何人吹丹唇間玉齒妙響入雲涯窮巷秋風葉空庭寒露枝勞歌欲有和星鬢已將垂酬張少府柬之前人昔余與夫子相遇漢川隂珠浦龍猶卧檀溪馬正沉價重瑶山曲詞驚丹鳳林十年暌賞慰萬里隔招尋豪翰風期阻荆衡雲路深鵬飛俱望昔蠖屈共悲今誰謂青衣道還歎白頭吟地接神仙澗江連雲雨岑飛泉如散玉落日似懸金重以瑶華贈空懷舞詠心和吳侍御被使燕然前人春歸龍塞北騎指鴈門陲胡笳折楊柳漢使採燕集作條支戍城聊一望花雪幾參差關山有新曲應向笛中吹和御史韋大夫喜霽之作褚亮晴天渡旅鴈斜影照殘紅野淨餘煙盡山明一作開逺色同沙平寒水落葉脆晚枝空白簡光朝幰彤騶出禁中息駕逰蘭坂雕文折桂叢無因輕羽扇徒自仰仁風東征答朝達相送陳子昻見集本平生白雲意疲苶愧為雄君王謬殊寵旌節此從戎挼繩當繫虜單馬豈邀功孤劔將何托長謡塞上風酬李參軍崇嗣旅館見贈前人昨夜銀河畔星文犯天集作遙漢今朝紫氣新物色果逢真言從天上落乃是地仙人白璧疑寃楚烏裘似入秦推藏多古意歷覽備艱辛樂廣雲雖覩夷吾風未春鳳歌空有問龍性詎能馴寶劔終應出驪珠會見珍未及馮公老何驚孺子貧青雲儻可致北海憶孫賔答洛陽主人前人平生白雲志早愛赤松逰事親恨未立從宦此中州主人亦何問集作何發旅客非悠悠方謁明天子清宴奉良籌再取連城璧三陟平津侯不然拂衣去歸從海上鷗寧隨當代子傾仄且沉浮東征至淇門答宋十一參軍之問前人南星中大火將子涉清淇西林映集作改微月征斾空自持碧潭去已逺瑶華折遺誰君集作若問遼陽戍搖搖集作悠悠天際旗和左僕射燕公春日端居述懷任希古見初學記豐野光三傑媯庭贊五臣綈緗歌美譽絲竹詠芳塵聖歷開環象昌年降甫申高門非捨築華搆豈垂綸鳳邸摶霄翰龍池躍海鱗玉鼎升黃閣金章謁紫宸禮闈通政本文昌總國均調風振薄俗清教敘彛倫星回應緹管日御驚寅賔葉上曽槐變花發小堂春思挂東都冕言訪北山巾赫赫容臺上千祀耀平津劉侍讀見和山邸十篇重申此贈李嶠神嶽瑶池圃仙宫玉樹林乘時警天御清暑滌宸襟梁駕陪玄賞淄庭掩翠岑對巖龍岫出分壑鴈一作鳳池深簷迥松蘿映窗高石鏡臨落泉奔澗響驚吹助猿吟野氣迷涼燠山花雜古今英藩盛賔侣勝境相招尋踐徑披蘭葉攀崖引桂隂穆生時泛醴鄒子或調琴雉翳分場合魚鈎向浦沉朝逰極斜景夕宴待橫參顧已慙鉛鍔叨名齒玳簮暫依朱邸館還暢白雲心邱壑信多美煙霞得所欽寓言攄宿志竊吹簡知音奬價踰珍石酬文重振金方從仁智所攜手濯清潯和杜學士江南初霽羇懷前人大江開宿雨征棹下春流霧卷晴山出風恬晚浪收岸花明水樹川鳥亂沙洲羇眺傷千里勞歌動四愁和杜五弟晴朝獨坐見贈前人平明坐虛館曠望幾悠哉宿霧分空盡朝光度隟來影低藤架密香動藥欄開未展山陽會空留池上杯和杜學士旅次淮口阻風前人夕吹生寒浦清淮上暝潮迎風欲舉棹觸浪反停橈渺漫煙波濶參差林岸遙日沉丹氣斂天敞白雲消水鴈含蘆葉沙鷗隱荻苗客行殊未已川路幾迢迢和同府李祭酒休沐田居前人列位簮纓序隱居林野躅徇物爽全真棲貞昧均俗若人兼吏隱率性夷榮辱地籍朱邸基家在青山足暫彌西園蓋言事東臯粟築室俯澗濵開扉靣巖曲庭幽引夕霧簷迥通晨旭迎秋谷黍黃含露園葵緑勝情狎蘭杜雅韻鏘金玉伊我懷邱園願心從所欲答寧愛州書沈佺期書報天中赦人從海上聞九泉開白日六翮起青雲質幸恩先貸情孤枉未分自憐涇渭别誰與奏明君和晉陵陸丞早春有懷杜審言獨有宦逰人偏驚物候新雲霞出海曙梅柳度江春淑氣催黃鳥晴光照緑蘋忽聞歌古調歸思已霑巾早春答洛陽杜審言于季子梓澤年光往復來杜灞逰人去不回若非戴筆登麟閣定是吹簫伴鳳臺路傍桃李花猶嫩波上芙蓉葉未開分明寄語長安道莫教留滯洛陽才酬李丹徒見贈之作宋之問鎮吳稱奧里試劇仰通才近邑人披霧遙聞境震雷一朝逢解榻纍日共銜杯連騎集作轡登山盡浮舟望海回以余慙拙宦期子遇良媒贈曲南鳬斷征塗北鴈催更憐江上月還入鏡中開使往天兵軍約與陳子昻新鄉為期及還而不相遇前人入衛期之子吁嗟不少留情人去何處淇水日悠悠恆碣青雲斷衡漳白露秋知君心許國不是愛封侯答李司户前人逺方來下客輶軒揖使臣弄琴宜在夜傾酒貴逢春駟馬留孤館雙魚贈故人明朝散雲雨遙仰德為鄰和魏僕射還鄉張説富貴還鄉國光輝滿舊林秋風樹不靜君子歎何深故老空懸劔鄰交日散金衆芳搖落盡獨有嵗寒心以下六篇並見集本酬崔光祿冬日述懷贈答前人徐陳嘗並作枚馬亦同時各負當朝譽俱承明主私夫君邁前侣觀國騁奇姿山似鳴威鳳泉如出寶龜材雄子雲筆學廣仲舒帷紫綬拂三寺朱門臨九逵昔我含香日連爾縉雲司朝攜蘭省步夕退竹林期中路一分手數載來何遲求友還相德一作得羣英復在茲留臺少人務方駕遞尋追涉玩懷同賞霑芳憶共持迎賔南澗飲載妓東郊嬉春郭緑畝秀秋澗白雲滋名畫披人物良書討滯疑興來光不惜歡往迹如遺歲宴罷行樂層城間所思夜魂燈處厭朝髮鏡前衰忽枉崔駰什兼流韋孟詞曲高彌寡和主善代為師齊戒觀華玉留連歎色絲終慙起豫者何足與言詩和張監觀赦前人日御臨雙闕天街儼百神雷舒乍解氣歲復建寅春喜候同新集作開星驛歡聲發市人金環能作賦來入管絃新和朱使欣道峽似巫山之作前人江如曉天淨石似暮霞集作雲張征帆一流覽宛若巫山陽楚客思歸路秦人謫異鄉猿嗚孤月夜再使淚霑裳和朱使二首前人南土多遺寇西江盡畏途山行阻篁竹水宿礙一作硋萑蒲使越才應有征蠻力豈無空傳人贈劔不見虎銜珠二江勢連山逺天涯此夜愁霜空極天靜寒月帶江流思起南征棹文高北望樓自憐如墜葉泛泛侣仙舟奉和姚令公溫湯舊館永懷故人盧公之作蘇頲樹德豈孤邁降神良並出偉茲廊廟楨調彼鹽梅實正悅虞垂舉翻悲鄭僑卒同心不可忘交臂何為失清路荷前幸明時稱右弼曽聮野外迷尚記帷中密新慟情莫遣舊逰詞更述空令屬和辰長感知音日奉和魏僕射秋日還鄉有懷之作二首前人南宫夙拜罷東道晝逰初飲餞傾冠蓋傳呼問里閭樹悲懸劍所溪想釣璜餘清發光輝至增榮駟馬車二溽暑時云謝愆陽澤暫偏鼎陳從祀日鑰動問刑年絳服龍雩寢玄冠馬使旋作霖期傅説為旱聽周宣河嶽隂符啓星辰暗檄傳浮涼吹景氣飛凍灑空煙颯颯將秋近沉沉與暝連分湍涇水石含穎雍州田德施超三五文雄賦十年及私何以樂明主敬人天奉和同崔尚書贈大理陸卿鴻臚劉卿見示之什前人戲藻嘉魚樂棲椅集作梧高鳳飛類從皆有召聲應乃無違美價逢時出奇才選衆稀避堂貽後政掃第集作地發前幾出曳仙人履還薰侍女衣省中何赫奕庭際滿芳非吏部端清鑒丞郎肅紫機會心歌詠是回迹宴言非北寺鄰玄闕南城寫翠微參差交隱見髣佛接光輝賔序嘗柔德刑孚已霽威巨源林下契不速自同歸和杜主簿春日有所思前人朝上高樓上俯見洛陽陌搖蕩吹花風落英紛已積美人不共此芳好空所惜攬鏡塵網滋當窗苔蘚碧緬惟一作懷在雲漢良願暌枕席翻似無見時如何久為客酬宋使君見贈一作貽之作張九齡時來不自意宿昔謬樞衡翼聖負明主妨賢愧友生罷歸猶右職待罪尚南荆政有留棠舊風因繼組成高軒問疾苦蒸庶荷仁明衰廢時所薄祗言僚故情與袁補闕尋蔡拾遺會此公出行其後蔡有五韻詩以此篇答焉前人轍迹陳家巷詩書孟子鄰復集作偶來乘興者不值草玄人契是忘年合情非纍日申聞君還薄暮見眷及茲晨贈我如瓊玖將何報所親答太常靳博士見贈前人上苑春先入中園花盡開唯餘幽徑草尚待日光催酬王履震逰園林見貽前人宅生惟海縣素業守郊園中覽霸王説上邀集作激明主恩一行罷蘭徑數載歷金門既負潘生拙俄從周任言逶遲集作迤戀軒陛蕭散反邱樊舊院集作徑稀人迹前池耗水痕併看芳樹老惟覺敝廬存自我棲幽谷逢君翳覆盆孟軻應有命賈誼得無寃江上傷行逺林間遇集作偶避喧地偏人事絶時霽鳥聲繁獨善心俱閉窮居道共尊樂因南澗藻憂豈北堂萱幽意加集作如投漆新詩重贈軒平生徇知已窮達與君論酬王六霽後書懷見示前人雲雨俱行罷江天已洞開炎氛霽後滅邉渚集作緒望中來作驥君垂耳為魚我曝鰓更憐湘水賦還是洛陽才酬王六寒朝見貽前人賈生流寓日揚子寂寥時在物多相背唯君獨見思漁為江上曲雪作郢中詞忽枉兼金訊長懷伐木詩武司功有幽庭春暄見贈夏首獲見以詩報焉前人芳月盡離居幽懷重起豫雖言春事晚尚想物華初遲日暾方照高齋淡復虛笋成林向密花落樹應疏贈鯉情無間求鶯思有餘暄妍不相待含歎欲焉如文苑英華卷二百四十一
