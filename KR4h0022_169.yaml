body:
  text: 文苑英華卷一百六十九宋李昉等編應制二侍宴七十二首侍宴樂遊苑餞徐州刺史應詔丘遲詰旦閶闔開馳道聞鳯吹輕荑承玉輦細草藉龍騎風遲山尚響雨息雲猶積巢空初鳥飛荇亂新魚戲實惟北門重匪親孰為寄參差别念舉肅穆恩波𬒳小臣信多幸投生豈酬義侍宴謝朏宅東歸應制沈約皇情悵東􅀈羽斾拂南㕓夏雲清朝景秋風揚早蟬飲和陪下席論道光上筵侍宴樂遊苑餞吕僧珍應詔前人丹浦非樂戰負重切君臨我皇秉至德恭一作忘已用堯心愍兹區宇內魚鳥失飛沉推轂二崤岨揚斾九河隂超乘盡三屬選士皆百金戎車出細桞餞席遵上林興師誅後服授律緩前禽函轘方解帶嶤武稍披襟伐罪芒山曲吊民伊水潯將陪告成禮待此未抽簮侍宴餞臨川王北伐應詔王筠金版韜英玉牒藴精帝德乃武王威有征軒習弧矢夏陳干戚周騖戎車漢馳羽檄我皇駿聖千年踵武德洞千門威加八柱金正圯德水行失道駟馬南牧戎徒西保荐食伊瀍整居豐鎬金閣一作闕揚塵銅臺茂草命彼膳夫受詔協律樂賦出車弦操别日玉饌駢羅瓊漿泛溢聖德溫溫賓儀秩秩侍宴餞庾於陵應詔劉孝綽皇心眷將逺帳餞靈芝側是日青春獻林塘多秀色芳卉疑綸組嘉樹似雕飾遊絲綴鶯領光風翔綺翼下輦朝既盈留宴景將昃髙談競辨端竒文爭筆力伊臣獨無技何用奉吹息侍宴餞張惠紹應詔前人滄池誠自廣蓬山一何峻麗景花上鮮油雲葉裏潤風度餘芳滿鳥集新條振餞言班俊造光寵私輶吝徒然謬反隅何以窺重任侍宴二首前人清宴延多士鴻私濫微薄臨炎出蕙樓望辰躋茵閣上征切雲漢俯眺周京洛城寺鬱參差街衢紛漠漠禁林寒日晚方秋未搖落皇心重發志賦詩追並作自昔承天寵於兹𬒳人爵選言非綺綃何以儼金艧二兹堂乃峭嶠伏檻臨曲池樹中望流水竹裏見攢枝欄髙景難蔽岫隱雲易垂邂逅逄休幸朱蹕曵青規丘山不可答葵藿空自知侍宴景陽樓王僧孺金鋪爍可鏡桂棟儼臨雲沾觴均飲德服道驗朝聞詎論禹無間非耻堯為君小臣亦何者短翮屢追羣侍宴二首前人麗景燭春餘清隂澄夏首交枝隱修徑回流映遙阜徙帷轢輕筠移鑾拂髙桞去矣勞茂績勉哉報嘉誘小臣良不才㳙塵愧所守何用勝雕斫譬木良如朽二回鑾避暑宫下輦迎風館渺漫卿煙轉霏微商雲散蔓草亘巗垂髙枝起天半回風稍驚水落光漸斜岸妙舞駐行雲清歌入層漢晬顔暢有懌德音良已粲御幸樂遊苑侍宴張正見大君臨四表榮光普八埏區中文化洽海外武功宣鳯下書丹篆龜符著緑編昆明不習戰雲夢豈遊畋軌文通萬國旗節靖三邉髙秋藐姑射睿想屬汾川兩宫明合璧雙闕帶非煙揚鑾出城觀詔蹕指郊壥禁苑回雕輦離宫建翠㫋流水奔雷轂追風赴電鞭畫熊飄析羽金埓響膠絃鳴玉升文砌稱觴溢綺筵獸舞依鍾石鸞歌應管絃霞明黃鵠路風爽白雲天潦收荷蓋折露重菊花鮮上林賔早鴈長楊唱晚蟬小臣慙藝業擊壤慕懷鉛康衢飛駚羽大海滴微㳙詠歌還集木舞蹈遂臨泉願薦南山夀明明奉萬年九日侍宴樂遊苑應制見一百七十三卷庾肩吾入隋侍宴應詔陳後主日月光天德山河壯帝居太平無以報願上東方書侍宴𤣥武觀江總詰曉三春暮新雨百花朝星宫移渡罕天駟動行鑣斾轉蒼龍闕塵飛飲馬橋翠觀迎斜照丹樓望落潮鳥聲雲裏出樹影浪中搖歌吟奉天詠未必待聞韶秋日侍宴婁湖苑應詔前人翠渚還鸞輅瑶池命羽觴千門響雲蹕四澤動榮光玉軸昆池浪金舟太液張虹旗照島㠘鳯蓋繞林塘野靜重隂閣淮秋水氣凉霧開樓闕近日逈煙波長洛宴諒斯在鎬飲詎能方朽劣叨榮遇簮笏奉同行侍宴莎册宫賦應制得情字許敬宗三星希曙景萬騎翊天行葆羽翻風隊騰吹掩山楹暖日晨光淺飛煙旦彩輕塞寒桃變色氷斷箭流聲漸奏長安道神臯動睿情侍宴應詔得前字虞世南芬芳禁林晚容與桂舟前橫空一鳥度照水百花燃緑野明斜日青山淡晚煙濫得陪終宴握管類窺天侍宴歸鴈堂前人歌堂靣緑水舞館接金塘竹開霜後翠梅動雪前香鳥歸初可侣鴈起欲分行刷羽同棲集懷恩愧稻梁侍宴北門杜正倫大君端扆暇睿賞狎林泉開軒臨禁籞藉野列芳筵參差歌管揚容裔羽旗懸玉池流若醴雲閣聚非煙湛露晞堯日薰風入舜絃大德侔𤣥造微物荷陶甄謬陪瑶水宴仍厠柏梁篇關名徒上月鄒辨詎談天既喜光華旦還傷遲暮年猶冀升中日簮𥚑奉肅然正夜侍宴應詔薛曜重關鐘漏通夕敞鳯凰宫雙闕祥煙裏千門明月中酒杯浮湛露歌曲唱流風侍臣咸醉止恆慙恩遇崇侍宴銀潢宫應制魏元忠别殿秋雲上離宫夏景移寒風生玉樹凉氣下瑶池塹花仍吐葉巖木尚抽枝願奉南山夀千秋長若斯蓬萊三殿侍宴奉敕詠終南山應制杜審言北斗挂城邉南山倚殿前雲標金闕逈樹杪玉堂懸半嶺通佳氣中峯繞瑞烟小臣持獻夀長此戴髙天𥘉春行宫曲宴應制得天字蘇味道溫液吐涓涓跳波急應絃簮𥚑承睿賞花桞發韶年聖酒千鍾洽宸章七曜懸微臣從此醉還似夢鈞天奉和宴小山池賦得溪字應制武三思年光開碧沼雲色斂青溪凍解魚方戲風喧鳥欲啼巖泉飛野鶴石鏡舞山雞桞發龍鱗上松新麈尾齊九韶從此驗三月定應迷凝碧池侍宴應制得出水槎前人彼木生何代為槎復幾年欲乘銀漢曲先泛玉池邉擁溜根橫岸沉波影倒懸無勞問蜀客此處即髙天凝碧池侍宴看競渡應制李懷逺上苑清鑾路髙居重豫遊前對芙蓉沼傍臨杜若洲地如𤣥扈望波似洞庭秋列筵飛翠斚分曹戲鷁舟湍髙棹影沒岸近榜歌遒舞曲依鸞殿簫聲下鳯樓忽逄天上樂疑逐海查流侍宴旋師喜捷應制韋安石蜂蟻屯夷落熊羆逐漢飛忘軀百戰後屈指一年歸厚眷紓天藻深慈解御衣興酣歌舞出朝野嘆光輝梁王宅侍宴應制前人梁園開勝景軒駕動宸衷早荷承湛露修竹引薰風九醖傾鍾石百獸協絲桐小臣陪宴鎬獻夀奉維嵩同前張說梁王池館好晚日鳯樓通竹町羅千衛蘭筵降兩宫清歌芳樹下妙舞落花中臣學延州聽還知大國風過太平公主山亭侍宴張昌宗淮南有小山嬴女隱其間折桂芙蓉浦吹簫明月灣扇掩將雛曲叉承墮馬鬟歡情本無限莫掩洛城關泛舟侍宴應制張易之平明出御溝解纜坐回舟疑緑水澄明月紅羅結綺樓絃歌爭浦入冠蓋逐川流白魚臣作伴相對舞王舟公主南宅侍宴應制前人逐賞平陽地鳴笳上苑東鳥吟千户竹蝶舞百花叢時攀小山桂共揖大王風坐客無勞起奏簫曲未終興慶池侍宴應制蘇瓌金闕平明宿霧收瑶池式宴俯清流瑞鳯飛來隨帝輦祥魚出戲躍王舟帷齊緑樹當筵密蓋轉緗荷接岸浮如臨竊比微臣懼若濟叨陪聖主遊立春日侍宴內出剪綵花應制李嶠幸聞年欲至剪綵學芳辰綴綺能似景裁紅巧逼真花從篋裏發葉向手中春不與韶光競何名天上人同前趙彥昭剪綵迎𥘉候攀條故寫真花隨紅意發葉就緑情新嫩色驚銜燕輕香誤採人應為薰風拂能令芳樹春同前沈佺期合殿春應早開箱綵預知花迎宸翰發葉侍御筵披梅訝香全少桃驚色頓移輕生承剪拂長伴萬年枝同前宋之問金閣裝新杏瓊筵弄綺梅人間都未識天上忽先開蝶繞香絲住蜂憐艷粉回今年春色早應為剪刀催同前劉憲上林春館披春光獨早知剪花疑始發刻燕似新窺色濃輕雪㸃香淺嫩風吹此日叨陪侍恩榮慙數枝同前昭容上官氏密葉因裁吐新花逐剪舒攀條雖不謬摘葉詎知虛春至由來發秋還未肯踈借問桃將李相亂欲何如同前蘇頲曉入宜春苑穠芳吐禁中剪刀因裂素粧粉為開紅彩異驚流雪香饒㸃便風裁成識天意萬物與花同春日侍宴幸芙蓉園應制李嶠年光竹裏遍春色杏間遙煙氣籠青閣流文蕩畫橋飛花隨蝶舞艷曲伴鶯嬌今日陪歡豫還疑陟紫霄同前蘇頲御道紅旗出芳園翠輦遊繞花開水殿架竹起山樓荷芰輕薰幄魚龍出負舟寧如穆天子空賦白雲收同前李乂水殿臨丹籞山樓繞翠微昔遊人託乘今幸帝垂衣澗篠緣峯合巖花逗浦飛朝來江曲地無處不光輝同前宋之問芙蓉秦地沼盧橘漢家園谷轉斜盤徑江回曲繞源風來花自舞春入鳥能言侍宴瑶池夕歸途笳吹繁三日禁園侍宴沈佺期九重馳道出上巳禊堂開畫鷁中川動青龍上苑來野花飄御座河桞拂天杯日晚迎祥處笙鏞下帝臺九日侍宴應制得長字此詩見一百七十三卷九日門奉和一無此二字九日侍宴應制得時字蘇頲嘉㑹宜長日髙遊順動時曉光雲半洗晴色雨餘滋降鶴因韶德吹花入御詞願陪陽數節億萬九秋期一作微臣復何幸長得奉私恩此詩一作見嵗時雜詠疑是應制原本後編詩集八句皆改中宗降誕日長定公主滿月侍宴應制李嶠神龍見像日仙鳯養雛年大火乘天正明珠對月圓祚遙金篋裏歌奏玉筐前今日宜孫慶還參祝夀篇同前鄭愔春殿猗蘭美仙階柏樹榮地逄方節應時覩聖人生月滿增祥莢天長發瑞靈南山遙可獻常願奉皇明嵗夜安樂公主滿月侍宴應制沈佺期除夜子星回天孫滿月杯詠歌麟趾合簫管鳯雛來嵗短常然桂春盤預折梅聖皇千萬壽乘曉御明臺侍宴桃花園詠桃花應制李嶠嵗去無言忽憔悴時來含笑吐氛氲不能擁路迷仙客故欲開蹊待聖君同前趙彥昭紅蕚競妍春苑曙粉茸新向御筵開長年願奉西王宴近侍慙無東朔才同前徐彥伯源水叢花無數開丹跗紅蕚間青梅從今結子三千嵗預喜仙逰復再來同前李乂綺蕚成蹊遍苑芳紅英撲地滿筵香莫將秋宴傳王母來比春華望聖皇同前蘇頲桃花灼灼有光輝無數成蹊㸃更飛為見芳林含笑侍遂同溫樹不言歸宿羽亭侍宴應制見一百七十五卷亭門應制杜審言白蓮花亭侍宴應制沈佺期九日一作月陪天仗三秋幸禁林霜威變緑嶼雲氣落青岑水殿黃花合山亭綘葉深朱旗夾小徑寶馬駐青潯苑吏收寒果饔人膳野禽承歡不覺暝遙響素秋砧仙蕚亭初成侍宴應制前人山中氣色和宸賞第中過輦路披仙掌帷宫拂帝蘿泉臨香澗落峯入翠雲多無異登𤣥圃東南望白河仙蕚池亭侍宴應制前人步輦尋丹障行宫在翠微川長看鳥滅谷轉聽猿稀天磴扶階逈雲泉透户飛間花開石竹幽葉吐薔薇徑狹難留騎亭寒欲進衣白龜表疑作來獻夀仙吹返彤闈嵩山石漴侍宴應制前人金輿旦下緑雲衢彩殿晴臨碧澗隅溪水泠泠逐行漏山煙片片引香爐仙人六膳調神鼎玉女三漿捧帝壺自昔汾陽紆道駕無如太室覽真圖三陽宫石漴侍宴應制宋之問離宫祕苑勝瀛洲别有仙人洞壑幽嵓邉樹色含風冷石上泉聲帶雨秋鳥向歌筵來是曲雲依帳殿結為樓微臣昔忝方明御今日還陪八駿遊麟趾殿侍宴應制前人北闕層城峻西宫復道懸乘輿歷萬户置酒望三川花桞含丹日山河入綺筵欲知陪賞處空外有飛煙上陽宫侍宴應制得林字前人廣樂張前殿重裘感聖心砌蓂霜月盡庭樹雪雲深舊幄驂宸御慈恩忝翰林微臣一何幸再得聽瑶琴侍宴應制喬知之紫禁肅晴氛朱城落曉雲豫遊龍駕轉天樂鳯簫聞竹外仙亭出花間輦路分微臣一何幸詞賦奉明君奉和幸上陽宫侍宴應制前人紫庭金鳯闕丹禁玉雞川似立蓬瀛上疑遊崑閬前鳥將歌合轉花共錦爭鮮湛露飛堯酒薰風入舜絃水光搖落日樹色帶晴煙向夕回雕輦佳氣滿巖泉梨園亭子侍宴喬知之年光陌上發香輦禁中遊草緑鴛鴦殿花紅翡翠樓天杯承露酌仙管雜風流今日陪歡豫皇恩不可酬守嵗侍宴應制杜審言季冬除夜接新年帝子王孫捧御筵宫闕星河低拂樹殿庭燈燭上薰天彈絲奏管梅風入對局探鈎柏酒傳欲向元正歌萬夀暫留歡賞寄春前故洛陽城侍宴姚元崇遊豫停仙蹕登臨對晚晴川鳬連倒影巖鳥應虛聲野奏風成曲山居雲作纓今朝丘壑上髙興小蓬瀛春日洛陽城侍宴前人南山開寶厯北渚對芳蹊的歷風梅度參差露草低堯樽臨上席舜樂下前溪任重由來醉乘酣志轉迷侍宴曲前人雲陛褰珠扆丹墀覆緑楊隔疑簾粧隱映向席舞低昻鳴佩長廊靜開氷廣殿凉歡餘劔履散同輦入昭陽醉中侍宴應制李白桞色黃金嫩梨花白雪香玉樓巢翡翠珠殿鎖鴛鴦選伎隨雕輦徴歌出洞房宫中誰第一飛燕在昭陽文苑英華卷一百六十九
