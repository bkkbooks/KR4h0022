body:
  text: 文苑英華巻五百五十八宋李昉等編賀赦一為崔冀公賀赦表一首禮部賀改永貞元年表一首為宰相賀赦表一首賀上尊號後大赦表一首賀赦表十二首為崔冀公賀赦表楊於陵臣某言送赦書使某人至伏奉月日恩制大赦天下臣聞獻嵗之初也惟天所以布和將以發生萬類故降之春雨俾澤及群品也明后始立也惟君所以使令將以昭蘇萬國故降之以大赦盖與人更始也伏惟陛下道叶千齡克膺聖嗣光乗八葉式纂鴻休則髙天以布和法文明以施令故大赦天下殊澤霈然徳及羣生宥加殊死薄賦棄債恤孤養老不頒瑞物所以戒驕也節省其用所以防侈也卑宮菲食所以昭儉也黜邪去佞所以懲惡也任才用能所以勸善也賞勞録効所以報功也睦親敦族所以明孝也招諌納言所以聞過也尊賢容衆所以興化也三事用殷六府孔修九功既備無得而稱四海乂安斯為盛矣矧夫省不急之務損太官之膳外廢五坊内减六宫釋鷙鳥於長林縱猛獸於深谷俾鳥獸咸若黔黎用康舉五帝之闕遺行三皇之聖化自三皇兩漢以来無可比也臣權叨連帥職守藩隅備位明朝幸逢昌運不獲與千官接武稱慶闕庭無任禮部賀改永貞元年表栁宗元臣某等言伏奉今日詔集作誥命今月九日冊皇帝改貞元二十一年為永貞元年自貞元二十一年八月五日昧爽以前應犯死罪特降從流流以下逓降一等者寳命方始聖厯用彰載宣照臨之明遂施渙汗之澤臣某等誠慶誠賀頓首頓首臣伏以類表作惟重光下濟積慶旁流類表作流行集作旁流漢祖推奉教之尊文王遂無憂之志正名紀厯表運行於萬方宥過輕刑流汪濊於四海歡呼抃蹈遐邇攸同臣某等親奉聖謩仰承大化踴躍之至倍萬恒情無任蹈舞欣慶之至為宰相賀赦表就南郊撰進臣某等言伏奉今日制書大赦天下者臣與百執事奉揚宣布與億兆衆舞抃一作蹈舞歡呼自天降和率土同慶臣某誠歡誠抃頓首頓首伏惟皇帝陛下出震御極建元發號大明升而六合曉一氣薰而萬物春肆眚措刑滌瑕蕩穢凡在回首納於歡心矧又祗祀天地孝享宗廟蠲减租債䇿徴賢良褒徳及先賞功延嗣敬賔養老念舊睦親生人之積弊盡除有國之頽綱必振况陛下承二百祀鴻業之重纂十二聖耿光之初始奉嚴禋新開寳厯天下之目専然觀陛下之動天下之耳顒然聽陛下之言斯則陛下出一言不終日必逹於朝野舉一事不浹辰必聞於華夷當疲人求安思理之秋是陛下敬始慎㣲之日茍行一善則可以動人聽而歌舞况其衆美信足以感人心而和平康哉可期天下同慶臣等謬居重任幸屬休明慙竊股肱喜深骨髄歡抃悚躍倍萬常情無任皷舞慶幸之至賀上尊號後大赦表臣某言伏奉某月日制書大赦天下跪捧宣命蹈舞歡呼自天降休率土同慶臣某誠歡誠抃頓首頓首臣聞𤣥功盛徳非鴻名不能形容物厲人疵非皇澤不能蕩滌自非上聖莫能兼之伏惟元和聖文神武法天應道皇帝陛下纂承大業子育群生信及豚魚威殱梟獍削平寰海混一車書億兆一心願崇大號從人欲而俯膺盛禮暢時和而廣洽鴻恩蠲减賦租振㧞淹滯命黜陟以别臧否開諌諍而䇿賢良宿弊必除舊章咸舉帝王能事盡集於今凡在生靈孰不幸甚臣謬當委擢職奉詔條抃躍之誠倍萬恒品限以官守不獲稱慶闕庭無任皷舞慶幸之至賀赦表崔融臣某言臣伏奉闕元年十月十日墨制以二月為正大赦天下服周之冕衣冠混於無外行夏之時正朔覃於有截伏惟皇帝陛下天地合徳厯數在躬交日月於龍躔㑹風雲於鳳紀取新之化首出於九皇除舊之恩曲成於庻類加以載懐孝享肅事天田休聲動於萬國盛禮懸於百代凡在形氣孰不昭蘇㣲臣慶偶時来榮沾日用同草樹而知樂類鳥獸而增歡跡雖限於一隅心每馳於雙闕抃舞昌運倍百恒情不任屏營之至謹附賀正使某官奉表稱賀以聞賀赦表此下六表英華以為李邕作按邕天寳初卒而六表在代宗徳宗憲宗時故英華五百五十九卷有重出一表題云李吉甫又唐類亦然今從之李吉甫臣某言伏奉某月日制大赦天下至徳純茂鴻私溥洽中謝臣聞聖人紹統必建元良王者郊天是崇嚴配伏惟寳應元聖文武皇帝陛下嗣守鴻業光膺駿命奉先思孝誠已達於幽明立嫡以長義仍深於燕翼皇猷允塞墜禮咸甄俯𢎞作解之恩式布惟新之令若乃滌瑕蕩穢雷雨之施也茂時育物天地之仁也薄征弛力政理之源也録功念舊敦勸之方也加以躬儉節用捐珠棄玉執䘮者俾從逹禮繫獄者咸釋明刑啓進善之門開一作廣直言之路徳殷虞夏義掩羲軒凡在宥刑孰不欣悦同前類表作貞元二十一年賀大赦表後篇作賀貞元大赦表臣某言伏奉二月二十四日制書大赦天下徳洋恩溥逺洽邇安億兆欣欣罔不幸甚臣某誠歡誠喜頓首頓首伏惟陛下體元聖之姿膺出符之運類表及後篇作纂奉昌圖光膺寶厯統理萬事建中于人躬大禹之菲薄奉後篇作本𤣥元之慈儉損已以益下約身而愛人捐珠玉而不玩斥綺類表作纎麗而不御事有妨於農業物有害於女工人力所疲上心攸蕩自此罷黜歸于典常若乃投荒禦魅之倫觸網嬰羅之類或炎裔淪屈骨肉相從或囹圄幽囚饋餉不至皆陽和所未煦雨露所罕一作未霑靡不沐浴天波昭覩白日然後表捐軀之烈所以勸忠廣自棄之仁所以敦孝䖍奉寢廟輟玉輿之資恵緩市估發金錢之積異類均懐土之志髙年加挾纊之恩斟􅀈泉貨之源變通恵利之弊逋債咸已讜直必容如天之湛恩廣矣稽古之能事備矣彼鶉衣之徒類表作珉鮐背之叟孰不擊中衢之壤共樂於堯年詠太階之符同躋於夀域况臣謬當共理職在撫循欣後篇作惟抃之誠倍萬恒品不任踊悚後篇作悦之至謹遣當州軍事衙前虞侯王國清奉表陳賀以聞臣某誠歡誠喜頓首頓首謹言此篇五百五十九卷重出今已削去同前臣某言伏見制書大赦天下以今年正月一日改為元和元年者臣聞行慶布和允光於獻嵗履端居始實屬於元正將大有以恵人乃順時而布令法五始之要流恩而降澤統三㣲之厯觀象而建元正朔所加遐邇忻戴中賀伏惟皇帝陛下大孝嗣業鴻猷啓圗順天地而發生均日月而齊照馴洽飛走煦育生靈既承太宗文武皇帝之耿光禀保夀天皇之嚴訓百神饗徳萬國宅心敷作解之澤布惟新之典將致和平蠲京畿之逋債言念水旱薄江淮之征賦開羅網以宥過崇勲秩以賞勞𢎞褒酬之典澤被幽明旌忠烈之臣賞延於代闡庠序以勸學愍耆艾而加禮恩覃有截化洽無垠超溢虞夏掩映軒頊首出千古遐冠百王億萬斯年永荷天禄臣謬當任用分鎮藩維不獲奔赴闕庭親覩盛禮同前臣某言伏奉某月日恩制大赦天下一人百慶百度惟新戴天履土罔不欣抃中賀臣聞天地元功施雨露以育物帝王繼統昇日月以垂曜羣品資始萬方文明伏惟皇帝陛下嗣守鴻業光膺駿命淳化均於四序大徳合於二儀保寧社稷光宅區宇𢎞孝慈以御下崇恭儉以垂休恩覃浹旬事冠今古况乃順時布政乗春導和敷作解之恩宣在宥之典九族既睦四門廣闢而又洗滌幽縶雷雨之施也歸還流竄羅網之釋也移叙貶黜覆載之仁也蠲除逋債政理之源也褒寵勲賢激勸之方也廢金寳之貢有以彰儉徳也搜遺逸之士有以表至公也元勲宿將賞延子孫庶尹卿士榮周存沒廣直言之路啓進善之門徳超虞夏道掩軒頊必將平一殊俗發揮大猷億萬斯年永荷天緒臣謬當任用述職藩維不獲奔赴闕庭臣無任云云同前臣某言伏奉今月日赦詔自上下下由衷尊尊叅天地之大名貴聖文之崇號休氣宛秀彌漫雲天煙景昭華光融草樹臣誠歡誠踊一作躍再舞再蹈者有以副萬國之歡情增九廟之炳靈矣臣聞孝子事父誠奉其色忠臣事君將順其美皆疑殊外奨情實内殷超邁盈耳之言適㑹因心之義所以然也伏惟陛下道𢎞一徳功盖四時辰象曷以煥其文雷霆無以雄其武固以業振今昔事溢名言雖僉臣子之謀莫究方圎之廣所謂塞元命起兆人羣岳騰聲長河變色宜其雷振於地慶蟄户之出幽日飛於天賀霄極一作漢之開朗是以神魚載舞祥鳳載鳴况於人靈况於榮位乎徒張三寸之舌不足以談聖猷空捐七尺之軀不足以報明主無任大慶欣抃倍百之至謹遣所部宣徳郎某奉表陳賀以聞臣某誠惶誠恐頓首頓首同前臣某言伏奉七月三日册皇太子詔書大赦天下臣聞元良者宗祀之本枝赦宥者含育之全徳伏惟陛下赫然光大日昇於天巍然崇髙岳鎮於地萬齡為度夀物咸春東海注百川之朝北辰列衆星之拱笑龜鶴之將老嘲龍鳳之未伸但以禮備儲宫德刑廣物挺黄沙之罪再荷生成洗白玉之瑕俱承渙汗中外一命錫無戰之勲夀考百年賙不耕之粟莫不抃舞帝極頌歌聖慈萬嵗之聲夷夏一作華夷合聽九成之樂天地同懽臣乆沐鴻恩竟無上答悦豫之至倍百恒情謹因進樂使某陳賀表以聞同前獨孤及臣某言中使某至宣示赦書大赦天下者臣伏以作解宥過前王之茂典嚴配享神聖朝之縟禮非大孝無以肅祗宗廟非洪勲不得告承天下伏惟皇帝陛下誕敷文徳昭烈武功鋪於八埏横被四海拯兆人之疾苦恢累聖之洪業伐叛問罪電發王師為人除災為時誅惡陛下恬神凝累儲道藴徳以義制事以欲從人雷霆之震也心不恕於兇戾元惡之戮也勲不書於簡策淡泊功徳隂隲萬邦大哉聖王之為君也無得而稱矣頃者賊臣伺梟獍之變翠華廵逰四方愁寃百神震駭誅剪大憝清復闕庭事不稽於浹旬慶已延於億萬接踵之禍又起近郊犬羊猖獗相繼夷滅然後舉墜典脩禮文鏟革繁苛搜揚嘉遁自上古之所不臣前聖之所未賔梯航而來悦我聲教掃除氛沴日月載貞大安反側上下交泰而又發徳音降明詔歸過罪已降去鴻名含生動植許遂其性草木知感况在人倫今以履端之初先陳盛禮豐絜簡易應時順人展敬於郊壇薦誠於清廟丕昭列聖咸秩神祗抑臣聞之仲尼曰明乎郊社之禮禘嘗之義是陛下徳合祖宗道符三五慶于祉福與天無疆鴻私湛恩溥施萬國洗蕩㾗垢咸使維新牢獄空虚囚拘蕩滌禎祥鬱于川瀆嘉氣塞于乾坤天下臣妾不勝慶幸同前臣某言伏奉今月某日制大赦天下恭承恩詔宣布藩隅負瑕累者咸荷生成被傷痍者如蒙覆育中賀臣聞春以首時盖本於陽徳澤以周物取象於鴻私伏惟皇帝陛下出震繼明體元立極作解施㑹順時致和問安禮備於三朝班朔恩加於九有猶念刑不可變死不復生泣辜興慈納隍軫慮與民更始其命惟新禦魑魅者復還係桎梏者咸宥丹檄一作激無滯黄沙已空疎漢網而逺無不賔祝湯羅而下無犯順雖水旱繫於常數每惻憂勤以征賦本於黎人載加蠲貸應天以實推已以誠疇庸懋能自家刑國或圖舊以延賞或錫類以崇先日月遍燭於幽明雨露不私於中外舊章備舉墜典咸秩崇儒術所以𢎞教化旌孝義所以厚時風憫耆耋而廪賜有差廢横斂而㐫荒是禦皆歴代哲王之茂典今陛下脩一作揔而行之洋洋聖謨曠所聞見雖虞帝之孝殷后之仁垂拱而人無間然鞬􅐤而兵不復用方於今日未足比崇臣幸属昌期謬領藩服官惟責實未効㳙埃之勞賞及無功亦洽一作沾渙汗之寵拜恩竊抃倍萬恒情同前劉禹錫臣某言伏奉今月一日制書改太和十年為開成元年大赦天下者雷雨作解人神悦随澤及八荒網開三面臣某誠歡誠喜頓首頓首伏惟皇帝陛下上承乾綱下立人極用含𢎞光大之徳集作澤非副華集作夷夏㑹同之心獻嵗改元惟新景祚先明首罪次及羣妖述睿情以曉萬方施鴻霈以蘇庻物恤刑集作辜宥過已責弛征郡縣之舊弊悉除賦税之新規咸備停藩方節獻之禮以恵疲人廻榷筦餘羡之財以資京邑命使展澄清之志察言求讜直之材弓旌賁于丘園粟帛頒於耆耋集作艾爰以初告御于明庭德音一發於九天和氣驟同集作周於四海開物成務實表於建元應天順人永延於億載臣幸居近輔先受殊恩不獲稱慶闕庭陪榮班次衆星列位常拱北辰之尊集作光新嵗拜章遥獻南山之夀無任抃躍屏營之至同前令狐楚臣某言臣伏奉今月十一一作五日制書𤣥徳融明聲聞於宗廟鴻名光大充塞於乾坤與物皆春大赦天下臣當時宣流渥澤騰布耿光恩均而萬物昭蘇慶洽而三軍鼓舞中賀臣聞覆載無私天地所以為大徳照臨不已日月所以為大明六位因時以成功一代一作人觀象而設教肇自古昔垂為憲章伏惟睿聖文武皇帝陛下並日而明配天為大冠三皇之道𢎞十聖之風保合太和緝熈帝載是以廓清氛霧曽不累旬䖍一作䖏奉郊禋未嘗虚嵗百蠻梯航以内面萬國歌舞而宅心所謂巍乎其有成功煥乎其有文章也尚復勞謙仄席勤恤納隍釋纍繫一作責之幽囚無分輕重歸遐逺之放逐不問存亡棄逋債一作責於窮人戒多求於貪吏憫朔邉之介士厚其寒衣恢武功也褒闕里之胄嗣一作𦙍賁以布帛振文教也推恩而九族既睦行慶而六師用張忠貞必表於門閭耆耋遍羞其牢醴百神咸秩一物不遺安人之所未安理人之所未理天波渙汗綸㫖丁寧有以知天地覆載之仁有以見日月照臨之徳天下臣妾不勝慶幸臣限守藩鎮不獲稱慶闕庭無任抃躍欣賀之至謹遣某官奉表陳賀以聞一作皆唐類表賀赦表後篇作為鄭尚書賀登極赦表臣某言伏以類表作奉二月二十四日制書大赦天下者霈澤自天鴻恩匝後篇作遍地三軍萬姓不勝慶躍後篇作抃日聞天地至大或有所不容日月至明猶後篇作或有所不照伏惟皇帝陛下體元繼統垂象立極齊軒昊之𤣥化冠唐虞之至仁敷大號於天中揭明謨於日下臣以為覆載之徳大於天地矣照臨之光明於日月矣何則用刀鋸而伏斧鑕者無重無輕陛下捨之投豺虎而禦魑魅者無逺無近後篇作邇陛下移後篇作還之免逋宿履後篇作逃獻畆之租罷雕華任土之貢出後宫之伎樂還外國之俘囚褒崇先首於二王敦叙旁周類表作流於九族明徴義烈各録其裔胄後篇作胄𦙍悉數忠勞遍增其爵級宣股肱之力者賞延於上後篇作近効爪牙之任者賜出於中搜淪滯之才遷乆次之秩聘士既尊於經術問年必本於期頁在幽隠一作陟降而不遺雖細㣲而皆後篇作之必及歡聲雷動喜氣雲騰百姓知聖人之仁萬物覩聖人之作普天率土無不慶幸臣叨居藩服累沐後篇作荷恩榮抃舞欣歡倍百恒品所守有限不獲稱慶闕庭臣及後篇作與将士官吏百姓等無任踴躍屏營之至此篇五百五十九卷重出今已削去文苑英華卷五百五十八
