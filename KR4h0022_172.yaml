body:
  text: 文苑英華卷一百七十二宋李昉等編應制五嵗時一元日八首人日十二首上元一首晦日二首春二首寒食四首仲春一首中和節一首上巳二十二首夏三首秋十一首元日獻嵗宴宫臣隋煬帝三元建上京六佾宴吳城朱庭容衛肅青天春氣明朝光動綵劍長階分佩聲酒䦨鐘磬息欣覩禮樂成自煬帝至晦日門魏收共二十三首並見嵗時雜詠奉和獻嵗宴宫臣虞世南履端初啓節長苑命髙筵肆夏喧金奏重潤響朱絃絲光催栁色日彩泛槐烟微臣同濫吹謬得仰鈞天奉和元日蕭慤帝宫通夕燎天門拂曙開瑞雲生寶鼎榮光上露臺華山不凋葉冝城萬夀杯遙見飛鳬下懸知鄴縣來元日唐太宗髙軒曖春色邃閣媚朝光彤庭飛彩毦一作斾翠幌曜明璫恭巳臨四極垂衣馭八荒霜㦸列丹陛絲竹韻長廊穆矣薰風茂康哉帝道昌繼文遵後軌循古鑒前王草秀故春色梅艷昔年粧巨川思欲濟終以寄舟航奉和元日應制許敬宗天正初開節日觀上重輪百靈滋景祚萬玉雜詠作土慶維新待旦敷𤣥造韜旒御紫宸武帳臨光宅文衛象鈎陳廣廷揚九奏大帛麗三辰發生同化育播物體陶鈞霜空澄曉氣霞景瑩芳春德暉覃率土相賀奉還淳元日恩賜柏葉一作枝應制趙彥昭器乏雕梁器材非搆厦材但將千載葉常奉萬年杯同前李乂徑節凌冬雜詠作霸徑芳心待嵗芳偏雜詠作能令人益夀非止麝含香同前武平一緑葉迎春緑寒枝歷嵗寒願持柏葉夀永奉萬年歡人日人日重雜詠作侍宴大明宮恩賜綵縷人應制李嶠鳯城景色己含韶人日風光倍覺饒桂吐半輪迎此夜蓂開七葉應今朝魚猜水凍行猶澀鶯喜春熙弄欲嬌愧奉登髙搖綵翰欣承雜詠作逢御氣上丹霄同前趙彥昭寶契無為屬聖人雕輿出幸玩芳晨平樓半入南山霧飛閣一作關旁臨東野春夾路桃花千樹發垂軒弱桞萬條新處處風光今日好年年願奉屬車塵同前劉憲紫苑韶年此日歸東郊道上轉青旗桞色梅芳何處所風前雪裏覔芳菲開冰池內魚新躍剪綵花間燕始飛欲識君一無此字王逰幸一有陽字氣為觀天藻競春暉同前崔日用新年宴樂正雜詠作坐東朝鐘鼓鏗鍠大樂調金屋瑶筐開寶勝花箋彩筆頌春椒曲池苔色冰前液上苑梅開雪裏嬌辰極此時飛聖藻微臣竊抃預聞韶同前韋元旦鸞鳯旌旗雜詠作旗拂曉陳魚龍角抵大明辰青韶既肇人為日綺勝初成日作人聖藻陵髙裁柏賦仙歌促宴摘梅春垂旒一慶冝年酒朝野俱歡獻夀新同前馬懷素萬宇千門平旦開天容辰象列朝回三陽候節金為勝百福延祥玉作杯就暖風光偏著栁辭寒雪影半藏梅何幸得參詞賦職自憐終乏馬卿才同前蘇頲疏龍磴道切朝回建鳯旗門繞帝臺七葉仙蓂承雜詠作依月吐千株御栁拂烟開初年競帖冝春勝長命光雜詠作先浮獻夀杯是日最靈知竊幸羣心就捧大明來磴雜詠作澄同前李乂詰旦行春上苑中憑髙御下大明宮千年執象寰瀛泰七日為人慶賞隆鐡鳯曽鶱搖瑞雪銅烏細轉入祥風此時朝野歡無算此嵗雲天樂未窮同前鄭愔瓊殿含光映早輪玉鸞嚴蹕望初晨池開凍水仙宫麗樹發寒花禁苑新佳氣徘徊籠細網殘霙淅瀝染輕塵良時荷澤皆迎勝窮谷睎陽猶未春同前李適朱城待鳯韶年至碧殿蟠龍淑氣來寶帳金屏人己帖圖花學鳥勝初裁林香近接冝春苑山翠遙添獻夀杯向夕憑髙風景麗天文垂曜象昭回蟠雜詠作疏同前閻朝隱勾芒人面乘兩龍道是春神衛九重綵勝年年逢七日酴醿嵗嵗滿千鍾宫梅間雪祥光遍城桞含烟瑞氣濃醉倒君前情未盡雜詠作己願因歌舞自為容同前沈佺期拂旦雞鳴仙衛陳慿髙龍首帝庭春千官黼帳杯前夀百福香奩勝裏人山鳥初來猶怯囀林花未發巳偷新天文正應韶光轉設報懸知用此辰上元正月十五日應制孫逖洛城雜詠作陽三五夜天子萬年春彩仗移雙闕瓊筵㑹九賔舞成倉頡字燈作法王輪不覺東方白筵隨御栁新晦日晦日泛舟應詔盧元明又見初學記輕灰吹上管落蓂飄下蒂遲遲春色華晼晼年光麗同前魏收又見初學記裊裊春枝弱關關新鳥呼棹唱忽逶迤菱歌時顧慕睿賞芳月色宴言忘日暮逰豫慰人心照臨康國步春早春桂林殿應詔陳叔達金鋪照春色玉律動年華朱樓雲似蓋丹桂雪如花水岸銜階轉風條出桞斜輕輿臨太液湛露酌流霞同前上官儀步輦出披香清歌臨太液曉樹流鶯滿春堤芳草積風色翻露文雪華上空碧花蝶來未巳山光曖將夕寒食初入秦川一作州路逢寒食唐𤣥宗附見張說集及歲時雜詠洛川芳樹映天津灞岸垂楊窣地新直為經過行處樂不知虛度兩京春去年餘閏雜詠作有今春早曙色和風著花草可憐寒食巳清明光暉並在長安道自從關內雜詠作路入秦川爭道何人不戲鞭公子途中妨蹴踘佳人馬上廢鞦韆渭水長橋今欲渡葱葱漸見新豐樹逺觀驪岫入雲霄顧想湯池起烟霧烟霧氛氲水殿開暫拂香泉歸去來今嵗清明行己晚明年寒食更相陪奉和入秦路逢寒食應制張說見集本上陽桞色喚春歸臨渭桃花拂水飛總為朝廷巡幸去頗教京洛少光暉昨從汾硤集作汾陜山南口馳道依依漸花桞入關正投寒食前還京遂落清明後路上天心重豫逰御前恩賜特風流便幕那能鏤雞子行宫善巧帖毛毬渭橋南渡花如撲麥隴青青斷人目漢家行樹直新豐秦地驪山抱溫谷溫谷香池春溜平預歡浴日照京城今嵗隨宜過寒食來雜詠作明年陪調集作倍宴作清明寒食應制韋承慶見嵗時雜詠鳯條春色滿龍禁早暉通舊火收槐燧餘寒入桂宫鶯啼正隱葉雞鬪始開籠藹藹搖山滿仙歌始樂風同前張說見集本寒食春過半花穠鳥復嬌從來禁火日㑹接清明朝鬪敵雞殊勝爭毬馬絶調晴空數雲㸃雪樹百風搖改木迎新燧封田表舊燒皇情愛嘉節傳曲宴雜詠作興簫韶仲春奉和聖製仲春麟德殿㑹百寮觀新樂權德輿仲月集作春藹芳景內廷宴羣臣森森列干戚濟濟趨鈎陳大樂本天地中和序人倫正聲邁咸濩易象合羲文玉爼映朝服金鈿明舞裀韶光雪初霽聖藻風自薰時泰恩澤溥功成行綴新賡歌仰昭回竊比華封人中和節奉和聖製中和節賜百官宴集因示所懷前人萬方慶嘉節宴喜皇澤均曉開蓂莢初莢集作葉景麗星鳥春藻思貞百度著明並三辰物情舒在陽時令𢎞至仁衢酒和樂被薰絃聲曲新賡歌舞辨側永荷𤣥化醇上巳三日侍宴林光殿梁簡文帝芳年留帝賞應物動天襟挾苑連金陳分衢度羽林帷宫對廣掖層殿邇髙岑風旗爭曳影亭罕共生隂樹類聚作林花初墮蒂池荷欲吐心三日侍林光殿曲水宴沈約宴鎬鏘玉鑾遊汾舉仙車犬榮光泛彩旄修風動芝蓋淑氣婉登晨天行聳雲斾帳殿臨春籞帷宫繞芳薈漸席同羽觴分墀引回瀨穆穆𤣥化升濟濟皇家類聚作階泰將御遺風軫逺侍瑶臺㑹三日侍華作林光殿曲水宴劉孝綽薰祓三陽暮濯禊雜詠作伎元已初皇心眷樂飲帳殿臨春渠豫遊髙夏諺凱樂盛周居復以焚類聚作禁林日丰茸花樹舒羽觴環階轉清瀾傍席疏妍歌己寥亮妙舞復紆餘九成變絲竹百戲起雜詠作動龍魚三日侍蘭亭曲水宴庾肩吾䇿星依夜動鑾駕總集作匆朝遊旌門臨逺類聚作苑樹相風出鳯樓春生露泥泥天覆雲油油桃花生類聚作舒玉澗栁葉暗金溝禊川分曲洛帳殿掩芳洲踴躍赬魚醉類聚作出參差絳藻浮百戲俱臨水千鍾共逐流三日華林園公宴邢劭回鑾自樂野弭蓋屬瑶池五丞接光景七度類聚作友樹風儀芳春時欲遽覽物惜將移新萍巳冒沼餘花尚滿枝草滋徑蕪沒林長山蔽虧芳類聚作方筵羅玉爼激水漾金巵歌聲斷且續舞袖合還離三日侍宴宣猷堂曲水江總上巳娛春禊芳辰喜月離北宫命簫鼓南館列旌麾繡柱擎飛閣雕軒傍曲池醉魚沉逺岫浮藻漾清漪落花懸度影飛絲不礙枝樹動丹樓出山斜翠磴危禮周羽爵遍樂闋光隂移三日曲水侍宴應制閻朝隱三月重三日千春續萬春聖澤如東海天文似北辰荷葉珠盤净蓮花寶蓋新陛下制萬國臣作水心人奉和三日祓禊渭濵韋嗣立乘春袚禊逐風光扈蹕陪鑾渭渚傍還笑當時水濱老衰年八十待雜詠作侍文王同前徐彥伯晴風麗日滿芳洲御色春筵袚錦流皆言侍蹕璜溪宴暫似乘槎天漢逰同前劉憲桃花欲落栁條長沙頭水上足風光此時御蹕來遊處願奉年年祓禊觴同前沈佺期寶馬香車清渭濱紅荷碧桞褉堂春皇情尚憶垂竿佐天祚先呈捧劍人同前李乂上林花鳥暮春時上巳陪逰樂在兹此日欣逢臨渭賞昔年空道濟汾詞同前張說青郊上巳艷陽年紫禁皇逰袚渭川幸得歡娛承湛露心同草樹樂春天三月三日承恩逰官莊池得筵字前人鳯凰樓下帶集作對天泉鸚鵡洲中匝管絃舊識平陽佳麗地今逢上巳盛明年舟將水動千尋日幕共林橫兩岸烟不降王人觀禊飲誰令醉舞拂賓筵三月三日曲江樓侍宴應制王維萬乘親齊祭千官喜豫逰奉迎從上苑祓禊向中流草樹連容衛山河對冕旒畫旗搖浦溆春服滿汀州仙籞龍媒下神臯鳯蹕留從今億萬嵗天寶紀集作紹春秋奉和聖製與太子諸王三月三日龍池春褉之作前人故事修春禊新宫展豫逰明君移鳯輦太子出龍樓賦掩陳王作杯如洛水流金人來捧劍畫鷁去回舟苑樹浮宫闕天池照冕旒宸章在雲漢垂象滿皇州奉和聖製上巳於望春亭觀褉飲之作前人長樂青門外宜春小苑東樓開萬井集作户上輦過百花中畫鷁移仙妓金貂列上公清歌邀落日妍集作妙舞向春風渭水明秦殿黃山入漢宫君王來袚褉灞滻亦朝宗三百十五卷重奉和聖製三月三日陳希烈見雜詠上巳迂龍駕中流泛羽觴酒因朝太子詩為樂賢王錦纜方舟渡瓊筵大樂張風搖垂栁色花發異林香野老歌無事朝臣飲嵗芳皇情被羣物中外洽恩光奉和聖製三日舒懷因以示百寮崔元翰見雜詠佳節上元巳芳時屬暮春流觴想蘭亭捧劍傳金人風輕水初緑日遲花更新天文信昭回皇道頗敷陳恭巳每從儉清心常保真誡兹遊衍樂書以示羣臣三月三集作二十日承恩宴樂逰園賦得風字張說樂逰形勝絶集作地表裏望郊宫北闕連雲集作天頂南山對掌中皇恩貸芳月旬宴美成功魚戲芙蓉水鶯啼楊栁風春華看欲暮天澤戀無窮長袖招斜日留光待曲終元在上巳門今據集本作三月二十日又有旬宴之句故移於此夏和湘東王首夏梁簡文帝冷風雜細雨垂雲助麥凉竹水俱葱翠花蝶兩飛翔燕泥銜復落鶗鴂吟初學記作吟斂更揚卧石藤為纜山橋樹作梁欲侍初學記作待華池上明月吐清光奉和夏初應詔魏彥琛見初學記雖度芳春節物色尚餘華出簾飛小燕映户落殘花舞袖飄細縠歌扇掩輕紗蘭房本宜夜不畏日光斜奉和夏日晚景應詔楊師道輦路夾垂楊離宫通建章日落橫峯影雲歸起夕凉彤軒動流吹羽蓋息回塘剃草生還緑殘花落初學記作疏尚香青巖類姑射碧澗似洛一作汾陽幸屬無為日歡娛方未央秋秋日即目唐太宗爽氣浮丹闕秋光淡紫宫衣碎荷踈影花明菊㸃叢袍輕低草露蓋側舞松風散岫飄雲葉迷路飛煙鴻砌冷蘭雕珮圭寒樹隕桐别鶴棲琴裏離猿啼峽中落野飛星箭弦虛半月弓芳菲夕霧起暮色滿房櫳奉和秋日即目應制許敬宗玉露交朱網金風度綺錢昆明秋景淡岐岫落霞然醉燕歸寒海來鴻出逺天葉動羅帷揚花晚繡衣鮮規空升暗魄籠野散輕烟鵲度林光起鳬沒水文圓無機絡秋緯如管奏寒蟬乃眷情何極宸一作神襟豫有旃秋日即目應詔上官儀上苑通平樂神池邇建章樓臺相掩映城闕互相望緹油泛行幔簫吹轉浮梁晚雲含朔氣斜陽蕩秋光落葉飄蟬影平流寫鴈行槿散凌風縟荷鋪裛露香仙歌臨枍詣臺名𤣥豫歷長楊歸路乘明月千門開未央初秋夜坐唐太宗斜廊連綺閣初月照宵帷塞冷鴻飛疾園秋蟬噪遲露結林疏葉寒輕菊吐滋愁心逢此節長嘆獨含悲初秋夜坐應詔楊師道玉管凉初應金壺夜漸䦨滄池流稍潔仙掌露方漙鴈聲風處斷樹影月中寒爽氣長空净髙吟覺思寬遼東山夜臨秋唐太宗秋風何凛冽白露為朝霜柔條朝夕徑緑葉日夜黃明月出雲崖皎皎流素光披軒臨前庭嗷嗷晨鴈翔右按文選及初學記皆作晋左思雜詩而初學記别有唐太宗遼東山夜臨秋小詩偶與左思詩相接致當時誤編今附太宗詩于后煙生遙鴈隱月落半崖隂連山驚鳥亂隔岫斷猿吟奉和山夜臨秋上官儀見初學記帳殿清炎氣輦道含秋隂凄風移漢筑流水入虞琴雲飛送斷鴈月上净疏林滴瀝露枝響空濛煙壑深秋日應詔袁朗見初學記玉樹凉風舉金塘細草萎葉落空飈觀鴻歸明月池迎寒桂酒熟含露菊花垂一奉章臺宴千秋長願斯九成宫秋初應詔劉禕之見初學記帝圃疏金闕仙臺駐玉鑾野分鳴鸑岫路接寶雞壇林樹千霜積山宫四序寒蟬急知秋早鶯疏覺夏䦨怡神紫氣外凝睇白雲端舜海辭波發空驚逰聖難秋暮言志唐太宗朝光浮燒野霜華净碧空結浪冰初鏡在徑菊方叢約嶺煙深翠分旗霞散紅抽思滋泉側飛想傅巗中已獲千箱慶何以繼薰風奉和秋暮言志應制許敬宗秋深桂初發寒窗菊餘菲波擁羣鳬至秋飄朔鴈歸月莢生還落雲枝似復非凝宸閲栖畝觀文停少微聖敬韜前哲先天諒不違文苑英華卷一百七十二
