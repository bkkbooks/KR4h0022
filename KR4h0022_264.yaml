body:
  text: 文苑英華巻二百六十四宋李昉等編寄贈十八薛能十首李頻七首劉駕二首皮日休三首陸龜䝉四首許棠六首聶夷中三首司空圖四首鄭谷二十七首杜荀鶴六首周朴十一首贈禪師已見二百二十四卷薛能寄李頻前人長安千萬蹊迷者自多迷性直集作直性身難達良時日易低環簷消舊雪晴氣滿春泥那得君同去遥峯苦愛齊贈苗端公二首前人繁總近何如君才必有餘身歡步兵酒吏寫魯連書坐黙聞鼙吹庭班見雪初沈碑若果去一為訪鄰居二至老不相疎斯言不是虚兩心宜一體同舍又鄰居曉角秋砧外清雲白月初從軍何有用未造魯連書麟東寓居寄蒲中友人前人蕭條秋兩地獨院且同羣一夜驚為客多年不見君邉心生落日鄉思羡歸雲更在相思處子規燈下聞寄河南鄭侍郎前人三峽與三壕門䦨去夢勞細氷和洛水初雪洒嵩髙大雅何由接日疑㣲榮已逃寒忩不可寐風地葉搔搔獻僕射相公前人清如氷玉重如山百辟嚴趨禮絶攀強虜外聞須一作應破膽平人長說一作見盡開顔朝廷有道青春好門館無私白日閒致却垂衣更何事㡬多詩句定一作合詠闗闗一作皆百家詩選䝉恩除侍御史行次華州寄蒋相前人林下天書起遁逃不堪移疾入塵勞黄河近岸隂風急仙掌臨闗旭日髙行野衆喧聞鴈發宿亭孤寂有狼嘷荀家位極兼禪理應笑埋輪著所操寄唐州楊郎中前人闗雎憔悴一儒生忽把魚鬚事聖明貧得俸錢還乍喜曉登朝序却無榮前年坐蜀同樽俎此日邉淮獨斾旌班列道孤君不見曲江春煖共僧行塞上䝉汝州任中丞寄書前人三省推賢兩掖才闗東深許稍遲迴舟浮汝水通淮去雨出嵩峰到郡來投札轉京憂不逺枉緘經虜喜初開西樓一望知無極更與何人把酒盃長安投邢員外李頻所學近彫蟲知難望至公徒隨衆人後擬老一生中間歳家書到經營世業空心懸滄海闊夢去白雲通玉漏聲連北銀河氣極東闗門迢逓月禁苑泬寥鴻地廣身難跼時平道獨窮蕭條苔長雨淅瀝葉從風久怯干朝客長愁别釣翁拜投何忽敢言奨為曽䝉舉善如無替垂恩本有終霜天摇落日莫使逐飄蓬秋日江上思歸山中友人前人蕭條對秋色相憶在雲泉木落病身起潮平歸思懸凉鐘山頂寺暝色渡頭船此地非吾土淹留又一年贈喻坦之前人從容心自别飲水勝銜杯共在山中長相隨闕下來脩身空有道取事疑作士各無媒不信清平日終遺草野才富春贈孫路前人天柱與天目曽把疑絶頂房青雲求禄晩白日坐家長井氣通潮信忩風引海凉平生詩稱在老達亦何妨江上居寄山中客前人山後與山前相思隔呌猿殘雲收樹末返照落江源苦雨秋濤漲狂風猛火翻朝來賣藥客遇我達君言下第後屛居書懷寄張侍御前人刖足豈一生良工隔千里故山彭澤上歸夢向汾水低催神氣盡僮僕心亦耻未達誰不知達者多忘此行年忽已壮去老年更㡬功名如不彰身歿豈為鬼纔看芳草歇即歎凉風起驄馬未來朝嘶聲尚在耳寄逺前人槐欲成隂分袂時君期十日復金扉槐今落葉已将盡君向逺鄉猶未歸化石早曾聞節婦沉湘何必獨靈妃湏知此意同生死不學他人空寄衣琪樹下因吟六韻呈先達者劉駕舉世愛嘉樹此樹何人識青疑秋逺山意偶向亭際得竒柯交若鬪世業二字疑宻如織塵中尚青葱更想塵外色所宜巢三鳥影入瑶池碧移根豈無時一問紫烟客長安抒懷寄知已前人岐路不在地馬蹄徒苦辛上國聞姓名不如山中人火宅滿六街此身入誰門愁心日𣪚亂又似空中塵白露下長安百蟲鳴草根况當秋賦日却憶歸山村静女頭欲白良媒况我隣無令苦長嘆長嘆銷人魂宏詞下第感恩獻兵部侍郎皮日休分明仙籍列清虚自是還丹九轉疎畫虎已成飜類狗登龍纔變即為魚空慙季布千金諾但負劉宏一紙書猶有報恩方寸在不知通塞竟何如夏日獨處寄魯望前人幽慵不覺耗年光犀柄金徽亂一床野客共為賖酒計家人同作借書忙園蔬預遣分僧料廩粟先敎算學糧無限髙情好風月不妨猶得事吾松陵集作呉王呉中書事寄漢南裴尚書前人萬家無事鎖蘭橈鄉味腥多厭紫䖀江文通云石劫也水似棊文交度郭柳如行陣松陵集作障儼遮橋青梅蔕重初迎雨白鳥羣髙欲避潮唯望舊知憐此景松陵集作意得為傖鬼也逍遥贈逺陸龜䝉茱萸匣中鏡欲照心還懶本是細腰人别來羅帶緩從君出門後不奏雲和管妾思冷如簧時時望君煖心期夢中見路永魂夢短怨生泣西風秋牕月華滿寄淮南竇一作鄭書記前人記室千年翰墨孤唯君才力一作學似應徐五丁驅得神功盡二酉搜來秘檢疎煬帝㠶檣留澤國淮王牋奏入班書清詞醉草無人見但釣寒江半尺魚一作鱸曉起即事因成回文五十六言寄皮日休先輩前人平波送一作落月吟閑境一作影暗幌浮烟思起人清露曉垂花謝半逺風㣲動蕙抽新城荒上處樵童小石蘚分來宿鷺馴晴寺野尋同去好古碑苔字細書勻寄吴子華前人一夜秋聲入井桐數枝㣲葉怕西風霏霏晩砌烟葉疑上淅淅疎簾雨欲通君整輪蹄名未了我依雲鶴病相攻到頭江畔從漁事織作中流萬疋葓旅次滑臺投獻陸侍御許棠已是愁來日堪驚却背秦天遥三楚樹路逺兩河人旅夢難歸隠吟魂不在身霜臺欹豸次頼許信來頻寄趙能卿前人我命同君命君詩似我詩俱無中道計各失半生期素業滄江逺清時白髪垂蹉跎一如此何處卜棲遲隴州旅舍書事寄李中丞前人三伏客吟過長安未擬還蛩驚秋不動燕别思仍閑亂葉隨寒雨孤蟬起暮闗經時髙枕外來往斾旌間寄黔南李校書前人從戎巫峡外吟興更應多郡響蠻江漲山昏蜀雨過公筵饒越客俗土尚巴歌中夜懷呉夢知驚灔澦波寄盩厔薛能少府前人滿縣唯雲水何曾似近畿曉庭禽集慣寒署吏衙稀水色封深澗樵聲在翠㣲時聞迎隠者依舊着山衣寄睦州侯郎中前人下國多髙趣終年半是吟潮濤通越分部伍雜閩音曉郭雲藏市春山鳥讓林東浮雖未遂日日至中心住京寄同志聶夷中在京如在道日日先集作夜夜先雞起不離十二街日行一百里役役大塊上周朝復秦市貴賤與賢愚古今同一軌白兔落天西赤鵶飛海底一日復一日日日無終始自嫌性如石不達榮辱理試問九十翁吾今尚如此贈農前人勸爾勤耕田盈爾倉中粟勸爾無伐桑減爾身上服清霜一委地萬草色不緑狂風一飄林萬葉不着木青春如不耕何以自拘束客有進嘆後時者作詩勉之前人後達多晩榮速得多疾傾君看構大厦何曽一日成在暖湏在桑在飽湏在耕君子貴𢎞道道𢎞無不亨太陽垂好光毛髮悉見形我亦二十年直似戴盆行荆山產美玉石石皆堅貞未必盡有玉玉且間石生精衛一㣲物猶恐填海平長安贈王注司空圖正下搜賢詔多君獨避名客來當意惬花發遇歌成樂地留髙趣權門讓後生東方御閑駟園外好同行贈疑步寄李員外前人危橋轉溪路經雨石叢荒幽瀑下仙果孤巢懸夕陽病辤青𤨏秘心在紫芝房更喜諧招隠詩家有望郎寄鄭仁規前人清才鄭小戎標的貴逰中萬里雲無侣三山鶴不籠香和丹地煖晩着綵衣風榮路期經濟唯應在至公寄考功王員外前人喜聞三字耗閒客是陪逰白鳥間疎索青山日滯留琴如髙韻稱詩愧逸才酬更勉匡君志論思在獻謀巴竇旅寓寄朝中從叔鄭谷驚秋思浩然信美向巴天獨倚臨江樹初聞落日蟬衰榮悲往事漂泊念多年未便甘休去吾宗盡見憐以下二十六篇並見集本寄題方干處士前人山雪照湖水漾舟湖畔歸松篁調逺籟臺榭發清輝野岫分開徑漁家並掩扉暮年詩力在新句更幽㣲寄獻湖州從叔員外前人顧渚山邉郡溪将罨畫通逺看城郭裏一作外又作處全在水雲中西閣歸何晩東呉興未窮茶香紫笋露洲迥白蘋風歌緩眉低翠杯明蠟剪紅政成尋往事輟棹問漁翁寄膳部李郎中昌符前人鄠郊陪野步早歳偶因詩自後吟新句長愁減舊知静燈㣲落燼寒硯旋生澌夜夜冥搜苦那能鬢不衰寄贈孫路處士前人平生詩譽更誰過歸老東呉命若何知已彫零垂白髮故園寥落近滄波酒醒蘚砌花隂轉病起漁舟鷺迹多深入富春人不見閒門空掩半庭莎贈日東鑒禪師已見二百二十四卷前人寄前水部賈員外前人謝病别文昌仙舟向越鄉貴為金馬客雅稱水曹郎白鷺同孤潔清波共渺茫相如辭賦外騷雅趣何長贈文士王雄前人知已竟集作更何人夫君尚苦辛圖書長在手文學老於身公道天難廢貞姿玉任真小齋松菊静願卜子為鄰寄南浦謫官前人多才翻得罪天末抱窮憂白首為遷客青山遶萬州醉欹梅障曉歌厭竹枝秋望闕懷鄉淚荆江水共流寄同年禮部趙郎中前人仙步徐徐整羽衣小儀澄淡轉中儀樺飄紅燼趨朝路蘭縱清香宿省時彩筆煙霞供不足綸一作粉闈鸞鳳訝來遲自憐孤宦誰相念祝禱空吟一作憑一首詩寄贈楊䕫處士已見二百三十一卷前人寄碁客前人松忩楸局穏相顧思皆凝㡬局賭山果一先饒海僧覆圖聞夜雨下子對秋燈何日無覊束期君向杜陵寄察院李御史前人古柏間松篁清隂在印牀宿郊䖍㸃饌秋寺静監香參集行多揖一作懾風儀見即荘佇聞横臂去帷集諫書囊贈富平李華集作宰前人夫君清且貧琴鶴最相親簡肅諸曹事安閑一境人陵山雲裏拜渠路雨中巡易得連宵醉千缸石凍春偶懷寄臺院孫端公前人才拙道仍孤無何捨釣徒班雖超玉笋香不近金爐雨露瞻䨇闕烟波隔五湖唯君應見念曾共伏一作仗青蒲丞相孟夏禮集作祗薦南郊紀獻十韻前人節應清和後郊宫事潔羞至誠聞上帝明徳祀圜􅏀雅用陶匏器馨非黍稷流就陽陳盛禮匡國稱集作禱鴻休漸曉蘭凝露㣲凉麥弄秋夀山横紫閣瑞靄抱皇州外肅通班序中懐納誓憂集作中嚴納慶憂升集作奏歌三酒備表敬百神柔池碧将還鳳原清再問牛萬方瞻輔翊共賀贊王猷李夷遇侍御久滯水鄉因抒寄懐前人簪豸年何久懸帆興甚長江流愛呉越詩格愈齊梁竹寺清隂集作吟逺蘭舟曉集作晩泊香髙閒徒自任華省待為郎寄贈藍田韋少府先輩前人王畿第一縣縣尉是詞人館殿非初意圖書是舊貧破氷泉竇響賽雪廟松春自此升通籍清華日逼集作近身聞所知逰樊州有寄前人誰無泉石趣朝下少同過貪勝覺程近愛閒經宿多片沙留白鳥髙木引青蘿醉把漁竿去殷勤藉岸莎久不得張喬消息有寄前人天末去程孤沿淮復向呉亂離何處甚安稳到家無樹盡雲垂野檣稀月滿湖傷心遶村路應少舊耕夫九日偶懐寄左省張起居前人令節争歡我獨閒荒臺盡日向晴山渾無酒泛金英菊漫道官趨玉笋班深愧青莎迎野步不堪紅葉照衰顔羡君官重多吟興醉帶天坡集作朱坡落照還獻制誥楊舍人前人為郡東呉只飲氷瑣闈湏降詔一作鳳書徵隨行已有朱衣吏伴直多招紫閣僧忩下調琴鳴逺水簾前睡鶴背秋燈葦坡竹塢情無限閒話一作語毗陵問杜陵獻大京兆薛常侍前人恥将官職一作業競前途自愛篇章古不如一炷香新開道院數坊人静一作聚避朝車縱逰藉草花垂酒閒卧臨忩燕拂書唯有明公賞新句秋風不敢憶鱸魚為户部李郎中與令季端公寓止渠州洴江寺偶作寄獻前人退居瀟洒寄禪闗髙挂朝簪浄室間孤島暫集作雖留䨇鶴歇五雲争放一龍閒輕舟共泛花邉水野履同登竹外山仙署金閨虚位久夜清應夢近天顔賀新除左省韋拾遺前人初昇諫署是真仙浪透桃花十五年垂白郎官居坐末着緋人吏立堦前百僚班定趨丹陛兩腋風清上碧天從此追飛何處去金鑾殿與玉堂連寄職方李員外前人曾袖篇章謁長卿今來隨集作附鳳事何榮星臨南省陪仙步春滿東朝接珮聲員外攝儲宫官谷沗獲攀接集作附談笑不拘先後禮嵗寒仍與集作契子孫情龍墀仗下天街暖共看圭峯並馬行寄顧雲杜荀鶴省得前年别蘋洲旅館中亂離身不定彼此信難通侯國兵雖斂吾鄉業已空秋來憶君夢夜夜逐征鴻下第後寄池州鄭員外前人省得集作出蓬蒿修謁初䝉知曾不見生疎侯門數處将書薦帝里經年借宅居未必有詩堪諷誦只憐無援過吹嘘而集作如今足得成持取莫使江湖却釣魚贈漣水崔少府前人庭户蕭條燕雀喧日髙忩下枕書眠只聞留客敎沽酒未省逢人說料錢洞口禮星披鶴氅溪頭吟月上漁船九華山叟心相許不計官資集作卑贈一篇贈李鐔鐔自維陽避亂東入中山前人君行君文天合知見君於此我傷集作興悲祗殘三口兵戈後纔到孤村雨雪時着卧衣裳難辨洗旋求粱食莫供炊地爐不煖柴枝濕猶把䝉求授小兒贈僧已見二百二十四卷前人宿灤城却寄長山張書記前人一更更盡到三更吟破離心句不成數樹秋風滿庭月憶君時復下堦行寄處士方干周朴桐廬江水閒終日對柴闗因想别離處不知多少山釣舟春岸泊庭樹晩鸎還莫便求栖隠桂枝堪恨顔寄塞北張符前人隴樹塞風吹遼城角㡬枝霜凝無暫歇君貌莫應衰萬里平沙際一行邉鴈移那堪朔烟起家信正相離次梧州却寄永州使君前人隨風一作雲身不定今夜在蒼梧客淚有時有猿聲無處無潮添瘴海闊煙拂太山孤却憶零陵住吟詩半玉壺贈念經僧前人庵前古折碑夜静念經時月皎海霞散露濃山草垂鬼聞抛故塜禽聽離寒枝想得天花墜馨香拂白眉春日逰北園寄韓侍郎前人灼灼春園晩色分露珠千㸃映寒雲多情舞蝶穿花去解語流鶯隔水聞冷酒盃中宜泛灔暖風林下自氛氲仙桃不肯全開折應借餘芳待使君贈太偽和尚前人太偽清復深萬像影沉沉有客衣多毳空門偈勝金王侯皆作禮陸子只來吟我問師心處師言無處心秋夜不寐寄崔温進士前人愁多難得寐展轉讀書床不是旅人病豈知秋夜長歸鄉憑逺夢無夢更思鄉枕上移忩月分明是淚光春中途中寄南巴崔使君前人旅人逰汲汲春氣又融融農事蛙聲裏歸程草色中獨慙出榖雨未變暖天風子玉和予去應憐恨不窮喜賀㧞先輩衡陽徐正字前人黄紙晴空墜一緘聖朝恩澤洗寃讒李膺門客為閒客梅福官銜改舊銜名自石渠書典籍香從芸閣着衣衫寰中不用憂天旱霖雨看看屬傅巖客州賃居寄蕭郎中前人松店茅軒向水開東頭舍賃一徘徊忩吟苦為秋江静枕夢驚因曉角催鄰舍見愁賖酒與主人知去索錢來眼看白筆為霖雨肯使紅麟便曬腮贈李裕先輩前人曉擎弓箭入初塲一發曾穿百步楊仙籍舊題前進士聖朝新奏校書郎馬疑金馬門前馬香認芸香閣上香閑伴李膺紅燭下慢吟絲竹淺飛觴文苑英華卷二百六十四
