body:
  text: 文苑英華卷四百三宋李昉等編東宫一太子太師授宋王成器太子太師制蘇頲門下孟侯之禮雖歸於冡弼太伯之風實尚於髙節左衞大將軍宋王成器㓜而聦惠長則温仁禮樂同歸質文相半孝以為政每用因親忠而立誠所期尊主故能樂於為善好在服儒占蟻穴以探徵登省臺而成賦自奄有梁宋作藩邦家其儀孔臧其德可大朕之元子當踐副君以隆基有社稷大功神祇唐書作人神僉屬由是朕前懇讓言在必行天下公議唐書作至公誠不可奪爰符立季之典庻叶從人之願况别為九州必資於牧伯貞夫萬國先佇於師傅式副僉諧之求仍先不拜之寵可雍州牧揚州大都督太子太師别加實封二千户賜物五千叚細馬二千匹奴婢十房金銀噐皿二百事甲第一區良田三十頃餘如故主者施行授信安王禕太子太師制孫逖門下傅導元子師長庻寮必在正人無非舊德太子少師上柱國信安王禕宗室良翰朝廷碩老踐忠公而立節體明肅而成用頃膺大任頻緫中權掌夏司春是為六官之長戢兵禁暴何止萬人之敵睦親尚齒念舊録功宜優天秩之榮俾極官臣之位可光禄大夫守太子太師勲封如故太子太傅擬太子太傅制劉禹錫勑太子太傅古今之重任也其使吾子目見正事耳聞正道左右前後無非正人繋爾太傅之力久虗其位式佇端人以爾命之朕無慙德可太子太保擬太子太保制勑禮云三王之教太子入則有保出則有師是以教諭而德成也其實一焉必擇恭敬温文以輔道其德使吾太子觀爾之道景行之無人則虗不求充位校德而命其稱厥官可太子少師授唐休璟太子少師制蘇頲門下君臣之道欽若從又師保之寄人具爾瞻必在耆德共康庻政特進前行尚書右僕射同中書門下三品上柱國宋國公致仕唐休璟自天錫夢維岳䧏精心竭忠公器包文武廟堂隆棟委以弼丞帷幄運籌推其決勝爰當宰任固辭揆職私第懸車耆年益壯公門軾馬朔見逾聞求舊所期懐賢是切諭於三善况侍正人營於百工孰過元老宜紆几杖俾作鹽梅可行太子少師同中書門下三品散官勲如故授岐王範太子少師等制黄門賛翼皇儲允歸師保崇敬叔父諒屬親賢虢州刺史上柱國岐王範秘書監兼幽州刺史上柱國薛王業等明允篤誠温良恭儉忠孝先於令典文儒偉於成業自為我藩翰擁其干旄雅聞邵伯之詩尤羨魯公之政雖頒條是務而導禮兼資因入拜於承明佇來儀於博望範可太子少師虢州刺史業可太子少保兼幽州刺史勲封等各如故主者施行太子少傅授嚴綬可太子少傅制白居易勑東朝保傅歴代尊崇漢擇名儒一作漢擢碩儒任一作名先踈廣晉求耆德選在山濤實資六傅之賢用𢎞三善之道檢校司徒兼太子少保嚴綬文雅成器恭謙致用出領重鎮以率諸侯入為大集作具僚以長卿士歴踐中外備嘗艱虞殆三十年勤亦至矣况理心以體道知命而安時是謂教誨之人可尼集作領調䕶之任由保遷傅爾其敬之可太子少傅授鄭餘慶太子少傅制勑東朝三少歴代重選不必備位在乎得人吏部尚書鄭餘慶貞恒儉素有古人風發自脩身施於為政出入中外多歴要重咸有勤績存乎集作于官次况動中禮法學綜儒𤣥是謂羽儀之臣可居師傅之任輔我元子爾其勉歟可太子少傅太子少保授崔琳太子少保制門下貞萬國者必在於元良教三善者是求於端士銀青光祿大夫守刑部尚書上柱國清河郡開國公崔琳中和禀氣厚德資身雅言有章明議能斷標禮樂於先進効忠公於大官堅白不渝芬芳自久緝熙秋典用簡于心調䕶春宫更難其選宜取才於六職俾齊名於二傅可守太子少保太子賔客授韋嗣立太子賔客制蘇頲門下望園賔客非賢莫可中朝碩茂選衆尤歸銀青光禄大夫國子祭酒上柱國逍遥公韋嗣立温恭密静孝悌忠實鍳測毫端詞詮象外昆弟承一經之業登相者代不乏人閨門有萬石之風立言者士是則效疇咨滿於故亊潤色敷於令典屬以疾辭用體張良之志資於德舉宜從綺季之逰可太子賔客散官勲封如故主者施行授鄭惟忠太子賔客制黄門元良之重賔友是擇自匪舊德孰膺一作應斯拜銀青光禄大夫守禮部尚書上柱國滎陽縣開國公鄭惟忠積温厚之氣暢清純之風學綜幽賾詞含比興屢登近要見美徽猷不訐直而狗名期後仁以為利北斗喉舌雖屬於尚書南山調䕶更憑於耆老而宜廻建禮之秩將益承華之裕可守太子賔客散官勲封如故授賀知章太子賔客等制孫逖門下調䕶儲宫典司延閣必在舉德固無虛授慶王侍讀銀青光禄大夫秘書監員外郎置同正員賀知章等衣冠耆舊詞學宗師或恬淡風流獨擅東南之美或清貞介特是稱江漢之英負當朝之令名有錫類之純行頃令教導久侍藩維善利則多寵章宜及方之四老用列賔友之任綜彼三墳俾在圗書之府可依前件授孟温太子賔客等制門下重位高官必歸於舊德中朝内外亦在於更遷金紫光祿大夫使持節同州諸軍事行同州刺史上柱國魯國公孟温性與嚴明才優政理朝請大夫使持節魏州諸軍事守魏州刺史上柱國安平縣開國伯崔璘清而率下正以持身或累登要劇聲謠夙著或頻更刺舉歳序滋深出入兼施噐能皆適宜膺調䕶之選俾踐宫坊之任温可太子賔客璘可太子右庻子散官勲封如故授裴元初太子賔客制門下宫朝所重賔友為先誰其徃諧必也求舊通議大夫守太僕卿上柱國聞喜縣開國侯裴元初已勵行全一作脩已勵行存誠好德中和應物豈終食而違仁至理為心每忘筌而合道早升清要一作官累踐崇班能慮始以思終不近名而過實宜膺端士之選以佐元良之貞可太子賔客勲封如故授嗣吳王祗太子賔客制常衮勑古者選孝悌閑博有道術者輔翼太子今以宗室之老處賔師之位亦親親而教敬也光禄大夫檢校工部尚書兼宗正卿上柱國嗣呉王祗文昭之慶蔚于公族楚元之後繼有忠賢達道虚懐寛厚廉謹藩翰舊德人倫憲行更於内外職事頗循疑年在華皓未嘗衰惰叅㑹府而百工時叙掌宗卿而九族益親每託肺腑深加優禮宜以冬官之重乃在春儲之列可兼太子賔客其檢校工部尚書及散官勲封如故授孟子周太子賔客制勑聞匹夫之愛其子者猶求明哲為之師賢善為之友而况於羽翼元子賔㳺東朝非舊德耆年孰副兹選前守光祿卿騎都尉賜紫金魚袋孟子周詞藝餙身端厚居業歴官中外休有令聞人推君子之風朝洽名卿之目副予求舊咨爾誠明勉脩諷喻之詞以俟元良之德可守太子賔客勲封如故授趙昌檢校吏部尚書兼太子賔客制白居易門下王者以尚齒尊賢為體以念功任舊為心况文武之才有以兼備則中外之職所宜迭居所以寵舊勲而優耆德者也前荆南節度管内度支營田觀察處置等使金紫光禄大夫檢校兵部尚書兼江陵尹上柱國天水郡開國公趙昌聚學餙身脩誠致用久膺事任累著勲猷統䕶交州威惠之聲克振鎮臨南海撫循之政有經自移部荆門馳心魏闕増脩職貢益勵忠勤爰舉寵章用旌茂績夫望優四皓然後能調䕶春闈才冠六卿然後能紀綱㑹府惟爾年德足尚可以周旋其間宜増喉舌之榮以崇羽翼之任服我休命其惟懋哉可檢校吏部尚書兼太子賔客散官勲封如故主者施行授王牘太子賔客制錢珝勑典職之重本於調䕶之名者非端厚自守練達有聞焉可罷而復居當我為官之選具官王牘始剛方之氣嘗失志於策名受聘塞垣通籍朝序致強學之力不廢半塗恥巧宦之謀罔違公道利多開物優實在邦戒滅裂以能勤知蒲盧之可化頃因將命遂乃去官爰陟崇階俾還舊秩勉來辨色無墮盡忠可依前件太子詹事授畢構太子詹事制蘇頲黄門攝生遂性義存於尚德去劇從簡禮切於優賢銀青光祿大夫守户部尚書上柱國魏郡開國公畢構當代周才幹時良具臺閣推其簡練衣冠仰其全德而五教之重六官是先精以辦政勞而弱疾方欲憑於導引極疑彼清羸暫踐竇嬰之職亟期吕䝉之愈可守太子詹事散官勲如故主者施行授許王瓘太子詹事制孫逖門下宫僚之首必擇正人邦畿之内實資良牧銀青光祿大夫秘書監上柱國太原郡開國公王暐言行立誠是稱親懿嘗以善而為樂每執謙而㤀倦從政已多議能惟允彈違是屬宜肅事於東朝理劇尤難俾安人於左輔瓘可太子詹事暐可使持節同州諸軍事守同州刺史散官封如故授盧詢一作綸下同太子詹事制門下大中大夫使持節華州諸軍事守華州刺史上柱國盧詢才標公望器重士林頃寄分憂備彰聲稱近聞稱病已歴旬時雖從政之能猶堪於卧理而攝生之道終忌於勞神宜増班秩之榮俾在優閑之地可太子詹事員外置同正員授程伯獻太子詹事等制門下準䋲儲寀師長國庠爰擇親賢用諧任寄鎮軍大將軍行右金吾大將軍兼弩營使上柱國廣平郡開國公程伯獻勲臣業固幹略有餘雲麾將軍守右武衞大將軍上柱國安平郡開國公李仲思宗子地華行能無悔咸推雅量早踐通班或甫及髙年或近嬰㣲疾營校之任久以煩卿優閑之職期於遂性宜膺並拜俾在兩宫伯獻可光祿大夫行太子詹事仲思可銀青光祿大夫國子祭酒員外置同正員授王暐太子詹事制門下儲闈掌事端尹命官疇咨所難慎擇斯在雲麾將軍前左千牛衞將軍上柱國太原郡開國公王暐衣冠貴緒人物通才善自謀身見推於賢戚凡所効職必聞於中外頃縁謝病今則有瘳舉其滯淹用升于朝列甄其望實宜首於宫寮可銀青光祿大夫守太子詹事勲封如故授郭曜太子詹事制常衮門下正于宫僚以視邦憲務兼内外選重古今銀青光祿大夫守太子賔客上柱國太原郡開國公郭曜丞相之子夙聞禮訓孝悌信讓清公仁厚端莊慎獨如有大賔之容沈静少私澹然儒者之行濟以才識達於公方素多歴職之稱用叶居家之理士林推重朝野洽聞待以客禮既任賢於調䕶委之官事更持綱於彈糾可守太子詹事散官勲封如故主者施行太子少詹事授沈佺期太子少詹事等制蘇頲黄門正議大夫太府少卿昭文館學士上柱國吳興縣開國男沈佺期才標穎㧞思詣精㣲早升多士之行獨擅詞人之律正議大夫行衞尉少卿上柱國楊崇禮神情凝正器識沉敏久聞忠義之風克樹循良之績儲闈緫務卿寺推能佇執紀綱爰司帑藏佺期可太子少詹事崇禮可行太府少卿散官勲如故主者施行授裴君士太子少詹事制黄門正議大夫行殿中少監員外置同正員裴君士外以凝正中惟雅實地稱垂棘之寳門䧏穠華之貴自邁迹朝行升榮御府尤聞密静行益一作益重柔嘉亞彼儲端允符公選可太子少詹事主者施行文苑英華卷四百三
