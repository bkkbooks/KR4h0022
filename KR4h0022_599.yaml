body:
  text: 文苑英華卷六百宋李昉等編請勸進及封嶽行幸勸進梁元帝表二首請復子正位表一首為齊州父老請陪封禪表一首為朝集使于思言等請封中嶽表一首請許封泰山表一首百官請不從靈駕表一首在神都留守請車駕還洛表一首諌則天幸三陽宫表一首李採訪請駕停金牛一日表一首為京兆第五尹請車駕廽西京表一首勸進梁元帝表徐陵臣陵言臣聞封唐有聖還承帝嚳之家居代維賢終纂髙皇之祚無為稱於革舄至治表於埀衣而撥亂反正非聞一作間前古至如金行重作源出東莞炎運猶昌枝分南頓豈得掩顯姓於軒轅非才子於顓頊莫不因時多難俱繼神宗者也伏惟皇帝陛下出震等於勛華鳴謙一作明讓同於旦奭握褒秉鉞類聚作握圖執鉞將在御天玉媵一作勝珠衡先彰類聚作章元后神祗所合一作命非惟太室之祥圖諜一作畫類聚作書斯歸何止堯門之瑞若夫大孝聖人之心中庸君子之德固以作訓生民貽風多士一日二日研覽萬機允文允武包羅羣藝擬兹三大賔是四門歷試諸難咸熙庶績斯無得而稱也自無妄為象鍾禍上京梟獍虔劉缺宗蕩墜銅頭鐵額興暴皇年二十四字一作無妄為暴皇祚寢微封豨修蛇行災中國靈心所宅下武其興望紫極而行一作長號瞻丹陵而隕慟家寃將報天賜黃鳥之旗國害宜誅神奉𤣥狐之録一作籙尅李軼於河津征陶謙於海岱滕公擁樹一本作面擁蓋避諱也出漢書滕公夏侯嬰傳雄氣方嚴張繍交兵風神彌勇忠誠貫於日月孝義感於氷霜如雷如霆非貔非虎一作如貔如虎前驅效命元惡斯殲既挂膽於西州方燃臍於東市蚩尤三塜寧謂嚴誅王莾千假一作刺非云明罰青羌赤狄同界狼豺胡服夷言咸為京觀邦畿濟濟還見隆平宗祀一作廟愔愔方承多福自氛一作氤氲渾沌之世驪連栗陸之君赴起龍圖文因鳥跡雲師火帝非無戰陳之風堯誓湯征咸用干戈之道星躔東井時破崤潼雷震南陽初平尋邑未有援三靈之已墜救四海之羣飛赫赫明明恭行天罰莫如當今之盛者也於是卿雲似蓋晨映姚鄉甘露如珠朝垂原一作華景寢芝房感德咸出銅池蓂莢伺辰無勞銀剪重以東漸𤣥兔西踰白狼髙栁生風扶桑銜一作盛日莫不編名屬國歸貢一作質鴻臚荒服來賔遐邇司慶一作福其文昭武穆跗萼也如彼天平地成功業也如此久應旁求掌故一作固詢詔一作咨詢天官斟酌繁昌經營髙邑宗一作宋非王啓霸非勞武德一作陽武之侯清蹕無虞何事長安之邸揚龍一作鑾旗以饗帝御鳳扆以承天歷數在躬疇咨一作與為讓去七月二十四日兼散騎常侍栁暉等至鄴伏承聖旨謙冲為而不一作弗宰或云洛一作涇非陽未復函谷無泥旋駕金陵方膺天眷愚謂大庭少昊非有定居漢祖殷宗皆無恆宅登封岱嶽且署一作猶置明堂巡狩荆州一作章陵時行司隸何必西瞻虎踞一作據乃建王宫南望牛頭方稱天闕抑又聞之𤣥圭既錫蒼玉無陳乃棫朴之愆期非包茅之不貢雲和之瑟久廢井泉孤竹之管無聞方澤豈不懼歟伏願陛下因百姓之心振一作極萬邦之命豈可逡巡固讓方示石戶之農髙謝為君一作君臨徒宏箕山之客未知上德之不德惟見聖人之不仁率土翹翹蒼生何望昔蘇季張儀違鄉負俗尚復招三方以事趙請六國以尊秦况臣等預一作顯奉皇華親承朝命圭璋特達通聘河陽貂珥雍容尋盟漳水加牢貶館隨世一作勢汙隆瞻望鄉闕一作關誠均休戚但輕生不造命與時乖等一作忝一介之行人同三危之遠擯承閒內殿事絶耿弇之因一作恩封奏邊城私等劉琨之哭不勝區區之至謹拜表以聞同前沈炯臣僧辨等言衆軍以今月戊子英華作午非惣集建康賊景鳥伏獸窮徒為擊摶一作頻擊頻挫力一作姦竭詐盡深溝自固臣等分命將士一作分勤武旅百道同趨突騎短兵犀函鐵楯結隊千羣持㦸百萬止紂七步圍項三重轟然大潰羣凶殄一作四滅京師少長俱稱萬嵗長安酒食於此價髙九縣雲開六合清朗矧伊圓一作黔首誰不載躍伏惟陛下咀痛茹哀嬰憤銜一作忍酷自紫庭絳闕胡塵四起恆山易水一作擩垣好疇冀馬雲屯泣血思治一作治兵嘗膽誓衆而吳楚一家方與七國俱反管蔡流言又以三監作亂西京義衆阻強秦而不達一作通并州遺民跨飛狐而見抵一作泯豺狼當路非止一人鯨鯢不梟倐焉五載雄一作英武克振哀一作怨耻並雪不申二字一作永尋霜露如何可言臣等輒依故實奉修祖廟一作廟社使者持節分告園一作塋陵嗣君升遐龍輴失一作未殯承華掩曜梓宫莫測並隨局一作並即隨由備辦禮具凶荒四海同哀六軍祖哭情敦孝友理增一作當感慟日者百司群嶽一作嶽牧仰祈宸鑑以析一作錫圭之功既歸有道當璧之禮又一作允屬聖明而優詔謙冲窅或作寂然凝邈飛龍可濟一作躋而乾爻在四帝閽云呌而閶闔未聞謳歌載馳是用翹首所以越人類聚英華作楚人非固執燻丹穴以求君周氏樂歸一作推越一作踰岐山而事主漢王不即位無以貴功臣光武思蕭王一作不止戈豈謂紹宗廟黃帝迷一作遊於襄城尚訪治民之道放勛寂一作入於姑射當一作猶使樽爼有歸伊此儻來豈聖人所欲帝王應運一作所應可不其然一作不獲已而然伏讀璽書仰承一作尋諷制旨顧懷物外未奉慈衷陛下日角龍顔之姿表於狥齊之日彤雲素氛之瑞基於應物之初博覽則大哉無所與名深言則曄乎昭章之觀忠為令德孝實動天加以英威茂略雄圖武算指麾則丹浦不戰顧眄則阪泉自蕩七十六字英華作陛下孝實動天忠為令緒加以威窮則板泉自蕩非地維絶而重紐天柱傾而更植鑿河津於孟門百川復啓補穹儀於一作以五百萬物再生縱陛下拂袗衣而遊廣成登弇山而去東土羣臣安得仰訴兆庶何以歸仁况郊祀配天罍觴一作篚禮曠齊宫清廟邊豆一作匏竹不陳仰望乘一作鑾輿匪朝伊夕瞻言法駕載渴且飢豈可久稽衆議有曠彛典一作則况舊邦凱一作既復函洛已還一作函額已平髙陵櫟陽宫館雖敗一作毁榮一作濁河清洛一作渭佳氣斯在一作猶存臯門有伉井泉四敞土圭測景仙人承露斯蓋九州之宇縣六合之樞機博士奉一作捧圖書而稍還太常定禮儀而已立一作列豈得不揚警蹕一作清駕而赴名都振一作具玉鑾而旋正寢昔東周既遷鎬京遂其不復長安一亂陜洛永以為居英華作不以為君非夏禹以萬國朝諸侯文王以六州匡天下方之一無方之二字王一作跡基百里劔拔一作杖三尺以殘楚之地抗拒六一作九戎一旅之卒一作師剪夷一作滅三叛坦然大定御辨一作輦東歸解五牛於冀州秣六馬於譙郡緬求前古可得比歟一作其可得歟對揚天命何所讓德有理存焉敢重所一作所奏臣僧辨等誠惶誠恐頓首頓首死罪死罪請復子正位表蘇安恆此篇唐書作疏又載六百九十四卷封建門題作請皇家諸孫姪疏為齊州父老請陪封禪表駱賔王臣聞元天列象紫宫通北極之尊天集作大帝凝圖𤣥猷暢東巡之禮是知道隆充澤集作光宅既輯玉於雲臺績劭集作業紹禋宗必塗金於日觀云云伏惟皇帝乘乾握紀纂三統之重光御辨登樞應千齡之纍聖故得河浮五老啓赤文於帝期海薦四神奉丹書於王㑹瑞開三脊祥洽五靈既而緝總章之舊文捃辟雍之故事非煙翼軼移玉輦於梁隂若月承集作乘輪祕金繩於岱巘臣等質均芻狗隂謝桑榆幸屬堯鏡多暉昭餘光於連石軒圖廣運集作耀追盛禮於摐金然而鄒魯舊邦臨淄遺俗俱穆二周之化咸稱一變之風境接青疇俯瞰獲麟之野山開翠屺斜連辨馬之峯豈可使稷下遺氓頓隔陪封之禮淹中故老獨奏集作奉告成之儀是用就日披丹御璧輪之三舍望雲抒素呌天門集作閽於九重儻允微誠許陪大禮則夢瓊餘息玩仙閭集作仰仙闕以相歡就木殘魂遊岱宗而載躍為朝集使于思言等請封中嶽表崔融臣某言臣聞易有太極是生兩儀有父子焉有君臣焉道莫尊於三皇皇合符於奕葉德莫髙於五帝帝展事於云亭禮莫盛於三王報功於岱畎政莫隆於兩漢紀號於仙閭皆所以省方觀人增天益地刻玉篆印金泥激清流於滲漉翔仁風而萌動然則業隆不封禪何以答三靈道備不巡遊何以㑹萬國為人上者可不敬哉中謝伏惟聖母神皇陛下寶命絪緼立期肹蠁包混元而建極宅造化而開階剖靈符於天合至德於地渥澤浸潤萬物恩光明懸四海不言而含氣風從無為而流形日用允所謂榮鏡絶代禪壓振古者焉臣聞古之聖王受命者然後得封禪又云功成道洽符出乃封又云致太平必封禪今陛下獲瑞銘於廣武得寶圖於溫洛星連月合雲起風搖上以擁神休下以塞天望崇徽號定都邑文質再而復正朔三而改義在得天乃立天統非受命者孰能臻兹因時創冝以順制逆建三廟崇五塋廣太學以教胄子開明堂而祀上帝彼東夷西戎南蠻北狄殊方絶界窮幽極遠蠢然莫敢不來享莫敢不來王非功成者孰能臻兹三階平萬方晏巖廊無事囹圄云空獄訟清而王風淳禮樂和而人氣樂衢路有鴈行之序邑里得鶉居之時五尺童兒羞論霸道八十父老不知帝力非道洽者孰能臻兹乾符總集不召而自至坤瑞昭升應圖而合諜慶雲出神池涌毛宗擾羽族馴樹連理而麥兩岐闕黃黍而闕𤣥秬匪朝伊夕以時繼年非符王者之瑞孰能臻兹命既受於天矣功既成於人矣道已洽於古矣符已出於今矣若此者非太平之效歟可以升中名山可以肆類上帝嵩高維嶽峻極于天風雷所起設險於畿甸霜露所均作鎮於邦國雖復千八百處未常遊玉女之臺七十四家不能幸仙人之洞區區漢武止聽三呼汲汲晉炎但喧羣議臣等竊以為祕籙有云中嶽之神姓武天意若曰神皇其封中嶽乎藏纎緯以須時蓄符祥而待聖顯見神跡覺寤黎蒸天祚嶽姓必將封祀祀嶽者非陛下而誰由是王公侯伯日夕登封之奏禮官博士歲時符命之書鴻儒碩學思獻儀於野外川后山祗願前駐於闕下天人之望久矣陛下何得而辭哉伏乞深惟至公仰祗靈眷傍稽瑞命俯順氓歌龍駕帝服背河洛而上泝星陳天行指轅嵩而東邁石芝生而五色可以為盛貝樹長而三可以為籍埋玉報地燔柴告天載巍巍扇翼翼上以答昊穹之儲祉下以副率土之歡心永保鴻名長為稱首盛矣美矣猗歟偉一作那歟臣等忝職外臺受委方土宣太平之風化聽古老之謳謡望屬車而未來思呌一作扣閽而至極庶千年一㑹陛下垂不讓之恩使五載四朝羣臣有慶成之地孰不幸甚不勝悃欵之至謹詣朝堂奉表誠請以聞請許封泰山表已見五百五十六卷張說百官請不從靈駕表李嶠臣嶠等言伏以靈駕道疑作遵途聖恩攀從國計非便羣臣不安冒昧上祈未蒙哀允跪對還㫖載深惶惕臣嶠等中謝臣聞古者天子上法天心不極私情違衆欲以順人理國為孝以克已制心為禮是故凡聖異禮公私殊制私心獨展凡人之孝也萬姓咸若聖人之孝也陛下行堯禹之事以萬姓為心奈何守曽閔之節懷獨展之願臣等囂闕竊所未曉且永淳已後關輔流散近適旋定人猶未足今山陵起築役徒惣萃彌春涉夏為費宏多若陛下此行羣司畢從於人取給臣實難之水旱小愆農慮非淺東都則水漕淮海易資鹽榖之蓄陸走幽并近壓戎夷之便朝命新復人望安在冝應靜鎮未可移動陛下若俯順羣願留撫都人則其安如此若不勝私情攀奉靈駕則其慮如彼况扈從兵馬既不預集行宫廩蓄又未先備發期俯邇支計闕然倉卒敦迫必不敢辦若待陵寢安厝霜露終感三農歲稔萬乘時巡奉郊廟以展虔瞻日月其何遠今固將抒私戀棄羣言忘人力蔑國用此實非陛下安集新業之故亦非先后憐憫遺人之意且朝廷故事典章猶在獻陵追遠太宗不至於三元昭陵上遷髙宗不至於九畯豈先帝私懷不堪故事羣臣公議之所奪也伏願仰遵舊訓顧定新基屈至情而順羣心抑小節而成大孝使軍國長算函洛皆安邦甸窮人賦斂少减萬姓翹望實深至願百寮結誠期於死請無任悲迫之至謹詣朝堂奉表固請以聞在神都留守請車駕還洛表臣嶠等言臣聞天下皆春而燕谷有祈暄之律日中並照而彭澤有隨陽之禽豈非承光飲和仰德廷鹿二字疑深於戀者其往若不親渴於求者其來如不足以圭表既宅關河馳怨思之誠鑾和未巡襄鄧切謳歌之慕帝車北指震疑駕西臨槐檀已歷於四時舊茂二字疑猶淹乎八水耆一作大老延頸簪裾企望戴天有分徒嗟京兆之遙捧日無階竊恨長安之遠臣嶠等中謝伏以載祀七百卜年非豐登疑作鎬之地時乘九五啓聖由瀍洛之鄉所以受龍圖龜書所以朝雨師河伯叶祥符於䜟籙採謀議於人鬼萬靈幽贊百物阜昌是曰天地之心實興帝王之祚方使四夷為守西賔屈無外之談六合為家東土壯居中之業况復圓丘方澤神祗之兆域以安復廟重檐昭穆之尊卑既叙定社而立稷建邦而設都是萬年長王之郊誠億載不遷之宇寧可久曠中壤即安偏據詠山河於漢舊訪宫室於秦餘五載時巡曽無告至之禮四方述職仍以不均之患臣等庸愚竊所未達今三秋告稔萬寶已成隂陽所和一作有稼穡遍茂却連澤潞汾曲叙廟荆揚海隅萬庾同殷千箱一作斯並詠禾萌一作箱九穗未曰休徵榖石五錢詎名豐穰加以舟車並凑水陸交衢物産尤多觀聽胥悅衆庶有來蘇之冀神靈翹望幸之心伏願陛下俯察氓謡仰祗天意因銅省疑作雀之稔歲命玉鸞之仙軫㳙時擇日屯萬騎而出函秦省俗觀風撫四人而還鞏洛逍遙乎九阿之阻容與乎八表之路回輿駐蹕觀十月之圃場闢纊凝旒間百年之疾苦然後歸格逍乎疑九廟疑明堂衆星拱列長居辰極之尊萬寓駿驅闕詠朝宗之俯光輝將日月齊殷德澤與江河比潤致乾坤之景福盡億兆之歡心凡在人祗孰不欣幸臣等限以所守不獲親詣闕庭無任區區之誠謹附洛州奏事使朝議郎行洛州司兵參軍盧正言奉表陳請以聞諫則天幸三陽宫表後篇作疏張說久視元年為右補闕臣說言臣聞明王集作主不惡切陳以博覽忠臣不敢隱忠以曲辭伏願陛下特集作少加裁察臣說誠惶誠恐頓首頓首死罪死罪陛下屯萬乘幸離宫暑退凉歸未降還㫖愚臣固陋恐非長舊唐書作良策請為陛下陳其不可三陽宫去洛陽城一百餘後篇集本作一百六十里有伊水之隔崿岅之峻遇涉夏秋集作過夏涉秋水潦方積道壞山險不通轉運河廣無梁咫尺千里扈集作擁從兵馬日費資給連雨彌旬即難周濟陛下太倉武庫並在都邑積後篇集本作紅粟利器藴若丘山後篇作山積奈何去宗廟之上都安山谷之僻處是猶倒持劔㦸示人樽柄臣竊為陛下不取夫禍敗後篇集本作變之生在人所忽故曰安樂必戒無行所悔此不可止之理一也告成英華及集本作郜城非褊小萬方輻凑填城溢郭併插集作鍤無所排斥居人蓬宿草次風雨暴至不知庇託孤惸老疾唐書後篇作病流轉衢巷陛下作人父母將若之何此不可止之理二也造設後篇作池臺唐書作池亭竒巧誘掖上心鑿山疏觀後篇唐書削巒起觀竭流漲海俯貫集作窮地脉仰出雲路集作端易山川之氣奪農桑之土延木石運斧斤山谷連聲春夏不輟勸陛下作此者豈正人邪詩云人亦勞止汔可小康此不可止之理三也御苑東西僅三十里集作二十里所出入來去後篇唐書作往雜人甚多外無墻垣扄禁內有榛藂溪谷猛獸後篇唐書集本作毅所伏暴慝是憑陛下來往後篇唐書作往往輕行警蹕不肅歷蒙密乘險巇卒然有逸獸狂夫後篇作奔突驚犯左右豈不殆哉雖萬全無疑然人主之動不冝容易也易曰思患豫防願陛下為萬姓持重此不可止之理四也今國家北有胡冦覻後篇作窺邊南有夷獠騷徼關西小旱耕稼是憂安東近平輸漕方始臣願陛下及時旋軫深居上京息人以展農修德以來遠罷不急之役省無用之費澄心淡慮惟億萬年蒼蒼羣生莫不幸甚臣自度芻議十不一從何者阻唐書集作阻盤遊之娛間林沚之玩規逺圖而替近適要後利而棄前歡未沃明主之心已捩後篇作怫唐書作戾貴臣之意然臣血誠密奏而不愛死者不願負陛下言責之職耳輕觸天威伏地待罪此篇又載六百九十四卷今已削去李採訪請駕停金牛一日表常衮臣某言臣聞葵藿何禀猶每傾陽犬馬無知尚能戀主伏惟陛下廽鑾巴蜀指斾咸秦萬乘雷奔經劔門之險阻六宫雲從歷棧道以﨑嶇恐天步有厭於登臨聖躬暫勞於行幸稍移玉輦將至金牛漢水梁城郡當所守蜀門秦塞路則居中乃微臣厠侍從之時冝陛下休羽儀之地伏望小停仙蹕寬一日之程暫奉宸居喜千年之遇臣忝陪宗室得備藩條懇欵之誠倍萬恆品無任攀戀屏營之至奉表陳情以聞為京兆第五尹請車駕廽一作還西京表于邵臣某言臣聞古公去邠初因避狄襄王出鄭終見興周故能成九五之尊享八百之祚載在前史昭然可知伏惟元聖文武皇帝陛下道合四國威加八紘一作裔啓中興之運宏下武之功殊方異俗重譯交順惟犬戎小醜敢亂天常陵逼豐鎬震驚都邑陛下理兵陜服遣將泰川鴟張未幾狥游自溺今八川底定萬姓怨思同一作皆懷奉一作捧日之誠共結屬車之望况地稱百二勢比咽喉足以橫制九圍財成六合陛下豈可捨山川之固為巡省之遊臣雖至愚竊知不可伏願謀及百辟俯狥羣心廽鑾舊宫駐蹕西夏使百川有朝宗之所衆星復環拱之方凡在有一作肖形孰不幸甚無任懇欵涕戀之至謹遣官奉表陳情以聞文苑英華卷六百
