body:
  text: 文苑英華卷五百三宋李昉等編乾象律厯門二十三道習星厯判六道家僮視天判五道私習天文判一道馮相會天判一道以管聽鳳判一道為律娶妻判三道上生下生判一道厯生失度判三道典同度管判二道習星厯判得甲稱人有習星厯屬會吉凶有司劾以為妖疑疑作欵云天文志所載不伏對南正司天北辰列象昭回可議坐徵雲漢之詩厯數難推自合史官之序當今銅渾設範玉衡齊政編氓各業庶績其凝舉而推之雖頗會於終吉子不語怪竟貽咎於為妖彼何人斯獨探幽説然古人垂教良史屬詞重黎掌日得唐堯之躔次甘公言星明漢家之厯象遐覽前志事有職司攻乎異端誰任其罰請置霜典無取星占同前郭休賢天道非逺人情難測俯察仰觀知來藏往顧惟所習頗曰常途取則四時識乘蛇之度數明諸六厯辨回蟻之循環習洛閎之平生得陵渠之志事既知休咎同入精微攻乎異端自貽伊戚必若門傳良冶亦觀過而知仁如其職異靈臺乃欽哉而難恤劾為妖妄何太忽諸引以天文未聞其可同前韋恆玄象垂文星辰作範休咎之徵斯在吉凶之迹可明祕以人倫得之邦國既河長而山久亦自古而迄今尚有不遵典刑默習推步眷茲所學幸遇休明慕劉氏之髙蹤仰張衡之舊業既而秋槎將泛知河漢之明梭太白初髙識將軍之出戰雖災祥之屢犯在徵應之可慿若彞典以斯違亦公途而難舍有司情惟糾慝志切繩違告為妖訛事恐乖於五聽科其犯禁誠有叶於三章同前薛重暉藝術多端隂陽不測吉凶潛運倚伏難明預曉災祥子産稱博通之首逆窮否泰裨竈為廣學之宗是知羽駕奔星初平言七日之會乘槎上漢嚴君定八月之期習學之規技無妨於紀厯屢會之禮法禁言於吉凶英華作會之禮法禁妄言於吉凶非有司嫉惡居心繩愆軫慮恐惑彞憲劾以為妖冀必靜於金科庶不刑於玉律眷言執旨雖欵載於天文審事語情實恐迷於至理即定刑罰恐失平反庶誥有司方期後斷同前褚廷詢和氏命官疇人繼職裁度一作成厯數辨正隂陽雖日月星辰無幽不燭而吉凶性命象在其中所以班固題篇編而作志馬遷著史取以成書安可私議災祥公違典憲仰秦儀而雖隔瞻漢綱而斯存豈得日用不知都勞帝力天文妄習仍委國刑宜峻典彞以申平反同前徐楚望大君一作唐有位北辰列象庶官分職南正司天和玉燭而調四時制銅儀而稽六合是則官修其業物有其方彼何人斯而言厯數假使道髙王朔學富唐都徒取衒於人間故無聞於代掌多識前載方期為已役成稱一作則賤寧是潤身眷彼司存行聞紏慝語其察變應宗石氏之經會以吉凶合引班生之志誡其偏習宜肅正刑家僮視天判甲於庭中作小樓令家僮更直於上視天乙告違法甲云專心候業不伏對劉庭琦士惟各業法貴師古茍睽厥道蓋速其尤甲也黔人頗逰玄藝門庭之中駕小樓而對月星象之下縱微管以窺天懸究昭回逺探雲物傳諸子弟頗覿前修授以家僮未詳其可雖有詞於候業亦難免於刑典更資研問方寬紏繩同前蘇綰聖人作孚萬物惟乂百寮分事命南正而司天五緯連衡遵北辰而列象莫不上稽天道下授人時率由舊章克備常典辨躔次之無忒識運行之有度南躔日至爰有望於靈臺東陸春歸方可觀於太室必若官非代掌業異家藏復王朔漢有王朔望氣英華作霸非之精才有唐都之祕術不在其位理宜朂於間邪有犯於時辭豈逃於語怪惟彼甲也能微訟乎僮則無良異疇人之子弟乙惟嫉惡復吕氏之刑書庭際遐瞻寧用圭而測景樓中仰視徒以管而窺天攻乎異端既殊氷操在乎正本請置霜科同前薛驥仰觀俯察通幽洞微明分野之災祥知廢興之休咎故漢皇應籙瑞日揚光宋景推誠妖星退舍所以標之甲令著自前經茍非主司習者多罪甲官非馮氏名在平人詩書為席上之珍無聞教子圖緯豈門庭之事輒訓家僮公然有違法在無赦難專候業定欲窺天措之罪刑應須搶地乙告非法既叶公途請置條章無容詞訴同前崔翹昜不云乎仰觀時變詩有之矣上列昭回國家蓋轉銅渾灰飛玉律曙光侵而鼓應暝色下而鍾鳴月穆穆而增波煙藂藂而不散茍非其局必置刑名甲命家僮心謀窺管至如長雲氣色京房有隱士之占德星夜聚太史有賢人之奏儻泛言古事自合張裕之流如私習天文請置吕刑之訓必也業傳弓冶名𨽻保章寧失不經豈濫無罪待窮由緒方正紏條同前貟俶聖人體道雖旁行而不流君子為儒亦博覽而多識甲誠不敏嘗窺祕文傳妙術於青猿得精符於翠鳳管公明之好事不寐每踰於夜分劉子政之多能觀星或至於明發固當率由古道仰止先賢既非日御之官當晦風占之迹况門庭之內賔友相趨遂乃别構青樓廽披丹檻當牖異紅粧之女寓宿乃蒼頭之僕董舒災異主人猶且致尤雕語怪神秦帝尚令下獄既私庭竊候罪已一作乃良多公憲正詞刑其無捨但以考陳生之國志嘗有其人徵葛公之蜀科未聞斯罪古今異政夫何足疑待更細推方從公議私習天文判定州申望都縣馮文私習天文殆至妙絶被鄰人告言追文至云移習有實欲得供奉州司將科其罪文兄遂投匭請追弟試敕付太史試訖甚為精妙未審若為處分對崔璀精心寧寂綿思洞幽既訊水之如符亦言天而若印昔聞其事今覩斯人馮文儒術圓冠識均方士耻蒼蠅之迷夜重鳴雞之唱晨一作曉由是微神穿石流觀刺井探九玄之微妙察五緯之綱維眷彼傾河言不乖於暝雨循茲險澗罪已挂於秋霜鄰人嫉深始求資於魏闕友于情切方辨過於堯年由是皇旨鑒微刑不阿附一作附重既令付法須裁典憲按其所犯合處深刑但以學擅專精志希供奉事頗越於常道律當遵於異議即冝執奏伏聽上裁馮相會天判甲為馮相氏掌十二嵗以會天位闕於冬夏致日所司科之不伏對惟甲馮相稱氏隂陽具司登臺窺天庶無乖於經紀觀景致日方不越於躔次自可式旌典法克審璇衡或禳災於未彰亦表瑞於先覺而乃曠我后之要列效羲和之廢時愛陽南臨既睽於宿偶月令宿離不貸注離讀如儷偶之儷宿儷謂其屬馮相氏保章氏掌天文者與宿偶當審侯伺不得過差也畏暑北至又闕於瞻度儻冬夏失度分至乖道則六氣不節五行混施爾職不恭天位斯紊所司科處誠謂合冝徒事薄言終資按法以管聽鳳判乙以管聽雌雄之鳳而不合將罪之云中國無竅均者對逺奚珣鳳凰于飛聲中律吕雌雄是聽道在伶倫通乎忽微探彼幽賾瞻言乙也忝迹於倫一作斯豈術數之未精飾詞之而有訴且軒轅已降嵗序茲深推律者寧止於一家探竹者無聞於絶塞遐求嶰谷近捨金門荀朂聲髙懸同此設京房識逺有愧其能既一作多謝知音冝從置罪為律娶妻判甲善算為律娶妻生子人告其妖不伏對周之翰甲道窮靈府藝盡數原探鄒衍之幽谷總洛閎之妙術洞律吕相生之道尚隂陽更配之理推計必究其精微變育乃均乎造化言其孕子如逢蘭夢之徵語以好仇似叶楊子之慶且智殫風律尚有革於京生况妙極玄穹豈無知於鄧道稽之自古尚不為妖察之於今如何結罪告者無理咸從配之同前張鼎理厯明時創自軒丘之帝寅餞納日制彼丹陵之主散在國典欎乎疇人甲以妙察五均工言三統雄管雌管候六間而靡差上生下生稽五行而得象乾坤並位律固聞於娶妻隂陽昜一作定方吕實號於生子豈曰三星之會何驚十月之祥顧不謀於白圭寧可信於緹幕如簧之口雖欲加人匪石之心安能引咎疑則合闕妖則謂何同前武同德物生有象象而後數洎夫化原孰得其始惟此甲也算莫善焉乃窮日者之言纍盡唐生之術不測謂神推隂陽之度數曠能變谷知律吕之短長想彼娶妻寧因匪斧之克興言生子備見弄璋之慶與物相召誰其忍諸人告為妖一何誣也上生下生判律生算失上生下生之數或告之辭云管皆合度對張秀元聖立極俾人作乂博謀廣通以訪異能理厯明時用司氣候律生何者忝乎在職考銅渾而正氣吹玉管以飛灰變冷含一作昜寒暄當盡互物之妙娶妻生子庶探成器之功何得俶擾厥繇候張失數儻虧官紀必殄孟陬安可敬授人時是亦焉知天道永惟至理多昧彞途且官不易方士資守業唐都祕術莫繼菁華趙達能名空嗟已矣既乖七始之則須正九章之科厯生失度判厯生失秒忽之度對李昂鳯凰司厯象疑謀託算象生有數感而遂通邈探渾元是知玄妙眇覩雲物必在精微情至紛擾則他想交亂形質濁穢則寄鑒不明焉可以見天地之心窮鬼神之狀幽變未測孰辨端倪相彼厯生迹參日御臺觀是忝泉蒙未豁唐都不作糟粕誰傳趙達何追菁華莫繼失秒忽之度曷以敬授人時若歸竒於扐履端於始則毫釐不爽黍纍無愆如或未精法將焉捨同前瞻乎厯生迹編太史按黃鍾之妙算玉管非工察緹幕之微灰銅儀罕究今者三元奧術尚懵履端之明六律幽源未達歸餘之數失之黍忽紏以簡孚誠櫝龜之見毁豈書馬而致誤不堪敬授將亂甲乙頗異太初之差宜正羲和之罪同前王泠然律吕之本今古攸尚周行殷厯孔子於是興嗟漢襲秦正劉歆以之條奏莫不考於經傳稽之氣象惟彼厯生稱明算法理須一作辨銅壺曉唱則聽雞嗚玉斗夜回方看蟻轉何得輕於秒忽失以毫釐裨竈多言豈知天道羲和廢職幾亂人時遂令太史罷占疇人廢業陸佐公之漏刻莫見新成張平子之渾儀但聞虛設既失推蓂之典何逃置棘之刑典同度管判典同度管失候不應史稱黍細徒少其人對范鳴鶴道幹始根陽圓成象同律審候紀物書雲各守其官倫創厥事考同律於巡禮先閲虞書資省律於張生方尋漢志恭惟所典實曰司存職此之由須聞不怠影度從候物精昭芒既未曉於談天徒效誠於窺管遂使牛車轉水顛倒煙灰之色雞卵色黃混淆氣火之象損三生一紛糾無憑居隂布陽舛錯奚甚史也胥品誠迷厥官縱欲陳力就列未知不能者止黍細厥粒徒寡其人先無告辭後有推過此而獲宥何以用刑同前常非月登科記作自火正分司疇人命職欽若天象敬授人時黍纍無愆寸管測隂陽之數葭灰期應閉户窺天地之心所以申命有司節宣丕序未遂御於乾道近獲戾於叛官辰廽鴈天不奪於房次月躔龍宿莫命於勤農二分或錯於春秋九土有虧於啓閉不修厥職猶飾彼辭且列在群司匪無常典徒有成數黍有常形黍細當合簡孚徒少豈宜緘口防微於始胡不謀先敗而後言無乃太晚愆我星度冝暴刑章待憑髙下之班方定重輕之罪文苑英華卷五百三
