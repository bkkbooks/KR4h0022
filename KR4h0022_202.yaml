body:
  text: 文苑英華卷二百二宋李昉等編樂府十一長相思十五首有所思二十首君子有所思一首自君之出矣五首古離别九首離别一首逺别離一首久别離一首長别離一首生别離二首别離曲長相思梁昭明太子相思終無一作無終極長夜起歎息徒見貌嬋一作㛹姢寧知心有憶寸心無所因願附歸飛翼同前二首張率長相思久離别美人之逺如雨絶獨延佇中心結望雲雲逺散一作去逺望鳥鳥飛滅逺望終若斯珠淚不能雪二長相思久别離所思何在若天垂鬱陶相望不得知玉階月夕映羅帷風夜吹相思不能寢坐望天河移同前雜言陸瓊長相思久一作逺離别一罷鴛鴦鋒矢絶一作一罷鴛文綺薦絶鴻始一作巳去栁堪結室冷鏡凝氷庭幽花似雪容貌春春減一作朝朝改書字朝朝一作看看滅同前徐陵長相思望歸難傳聞更始戍樓蘭一作傳聞奉詔戍臯蘭龍城逺鴈門寒愁來瘦轉劇衣帶自然寬念君今一作君今念不見誰為抱腰看同前王磋長相思久離别兩同心一作心同憶不相徹悲風凄愁雲結栁葉眉上銷菱花鏡中滅鴈封歸飛斷鯉素還流絶同前二首江總長相思久離别征夫去逺幽芳滅一作芳音滅又作幽芳歇湘水深隴頭咽紅羅斗帳裏緑綺清弦絶逶迤百尺樓愁思三秋結二長相思久别離春風送燕入簷窺開脂粉弄花枝紅樓千愁色玉筯兩行垂心心不相照望望何由知同前蘇頲君不見天津橋下東流水南望龍門北朝市楊栁青青苑北垂桃紅李白花參差花參差桞堪結此時憶君心斷絶同前李白長相思在長安絡緯秋啼金井欄微霜凄凄簟色寒孤燈不寐一作眀思欲絶卷帷望月空長嘆佳期迢迢一作美人如花隔雲端上有青冥之髙天下有緑水之波瀾天長路逺魂飛苦夢行一作魂不到關山難長相思摧心肝同前權德輿少小别潘郎嬌羞倚畫堂有時裁尺素無事約殘黃鵲語臨粧鏡花飛落繡床相思不解説眀月照空房同前劉復長相思在桂林蒼梧山逺瀟湘深秋堂零淚倚金瑟朱顔搖落隨光隂長宵嘹唳命鴻侣河漢蒼蒼隔牛女寧知一水不可度况復萬山修且阻綵絲織綺文雙鴛昔時贈君君可憐何言一去瓶落井流塵歇滅金爐前同前陳羽長相思長相思相思無限極相思苦相思相思損容色容色真可惜相思不可徹日日長相思相思腸斷絶腸斷絶淚還續間人莫作相思曲同前武元衡長相思隴雲愁單于臺上望伊州鴈書絶蟬鬢秋行人山北一作天一畔暮雨海西頭殷勤大河水東注不還流同前曹鄴妾顔與日改君心與日新三年得一書猶在湘之濵料君相輕意知妾無至親况當受明禮不合再嫁人願君多生日化質為妾身有所思梁簡文帝昔未離長信金翠奉乘輿何言人事異宿昔故恩疏寂寞錦筵靜玲瓏玉殿虛掩閨泣團扇羅幌詠蘼蕪同前梁昭明太子公子路逺一作逺行隔乃在天一方望望江山阻悠悠道一作坂路長别前秋葉落别後春花芳雷歎一流一作聲響雨汨忽成行悵望情無極引領心一作傾心還自傷同前王筠丹墀生細草紫殿網一作納輕隂曖曖巫山逺悠悠湘水深徒歌轆轤劍空貽玳瑁簮望君終不見屑淚且微吟同前庾肩吾佳期杳一作竟不歸春物生芳菲拂匣看離扇開箱見别衣井桐生未合宫槐卷復稀不及銜泥燕從來相逐飛同前王僧孺夜風吹熠耀朝光照辟邪一作昔邪瓦松也幾銷蘼蕪葉空落蒲萄一作桃花不堪長織素誰能獨浣紗光隂復何極望促反成賖知君自蕩子奈妾亦倡家同前劉繪别離安可再而我更重之一作佳人重更之佳人不相見明月空在帷共銜滿堂酌獨斂向隅眉中心亂如雪寧知有所思同前費昶上林鳥欲飛長門日行一作將暮所思鬱不已空想丹墀步簾動意君來雷聲似車度北方佳麗子窈窕能回顧夫君自迷惑非為妾心妬同前裴讓之夢中雖暫見及覺始知非展轉不能寐徙倚獨披衣凄凄曉風急暗暗月光微室空當一作常達旦所思終不歸同前顧野王賤妾有所思良人久征戍笳鳴故一作胡塞表一作塞城表花間一作開落芳樹白登澄月色黃龍起煙霧還聞雉子斑非復長征賦同前張正見深閨久離别積怨轉生愁徒思裂帛鴈空上望歸樓看花憶塞草對月想邊愁相思日日夜一作度淚臉年年流同前陸系别念恨城闉還思樓上人淚想愁一作離前落愁開一作聞别後新月來疑舞扇花度憶歌塵只看月彩一作今度裏那似隔河津同前陳後主佳人在北燕相望渭橋邊團團落日樹耿耿曙河天愁多明月下淚盡鴈行前别心不可寄唯餘琴上絃同前盧思道長門與長信憂思並難任洞房明月下空庭緑草深怨歌裁潔一作紈素能賦受黃金復聞隔湘水猶言限桂林悽悽日已暮誰見此時心同前楊炯賤妾留南楚征夫向北燕三秋方一日少别比千年不掩嚬紅縷無論數緑錢相思明月夜迢遞白雲天同前沈佺期君子事行役再空芳嵗期美人曠延佇萬里浮雲思園槿綻紅艷郊桑柔緑滋坐看長夏晚秋月照羅帷同前一作君子有所思李白紫閣連終南青冥天倪色慿崖望咸陽宫闕羅北極萬井驚畫出九衢如絃直渭水清銀河橫天流不息朝野盛文物衣冠何翕赩廏馬散連山軍容威絶域伊臯運元化衛霍輸筋力歌鍾樂休明一作未休榮去一作至老還逼圓光任一作過滿缺太陽移中昃不散東海金何爭西輝匿無作牛山悲惻愴淚霑臆同前韋應物借問江一作堤上栁青青為誰春空逰昨日地不見昨日人繚繞萬家井往來車馬塵莫道無相識要非心所親同前陳陶欲唱玄雲曲知音復誰是採掇情未來臨池畫春水同前王貞白芙蓉出水時偶爾便分離自此無因見長教挂所思殘春不入夢芳信欲傳誰寂寞秋堂下空吟小謝詩同前女郎劉雲朝亦有所思暮亦有所思登樓望君處靄靄蕭關道掩淚向浮雲誰知妾懷抱一作靄靄浮雲飛浮雲遮却陽關道向晚誰知妾懷抱玉井蒼苔春院深桐花落一作池盡無人掃君子有所思沈約晨策終南首顧望咸陽川戚里遡層闕甲館連一作負崇阡復塗希傑一作紫閣重臺擬望仙巴姬幽蘭奏鄭女陽春絃共矜紅顔日俱一作但忘白髮年寂寞茂陵宅炫一作照曜未央蟬無以五鼎盛顧嗤三徑玄自君之出矣鮑令暉自君之出矣臨軒不解顔砧杵夜不發髙門恆晝一作畫恆關幃一作帷中浮一作帷中流熠耀庭前華紫蘭物枯識節異鴻歸知客寒近取暮秋盡餘思待春一作君還同前范雲自君之出矣羅帳咽秋風思君如蔓草連延不可窮同前陳叔達一作賈馮吉自君之出矣紅顔轉憔悴思君如明燭煎心且銜淚同前賈馮吉一作陳叔達自君之出矣明鏡罷紅粧思君如夜燭煎淚幾千行同前徐幹自君之出矣明鏡不曽持一作暗不治思君如流水無有窮巳時古别離沈佺期白水東悠悠中有西行舟舟行有反棹水去無還流奈何生别者戚戚懷逺遊逺遊誰當惜所悲會難收自居間芳麗青陽四五遒皓月掩蘭室光風虛蕙樓相思無明晦長歎纍冬秋離居久一作分遲暮髙駕何淹留同前王適昔嵗驚楊桞髙樓悲獨守今年芳樹枝孤栖怨别離珠簾晝不捲羅幔晚長垂苦調琴先覺愁容鏡獨知頻年鴈去一作頻來鴈渡無消息罷却鴛紋一作去鴛文何用織夜還羅帳空有情春著裙腰自無力青軒桃李落紛紛紫庭蘭蕙日氛氲已能憔悴今如此更復含情一待君同前孟雲卿朝日上髙臺離人怨秋草但見萬里天不見萬里道君行夲遙逺苦樂誠一作良難保宿昔夢同衾憂心夢顛倒含酸欲誰訴輾轉傷懷抱結髮年已深一作遲征行去何早寒暄有時謝憔悴難再好人皆算年夀死者何曽老少壯會無一作見期水深風浩浩同前二首趙微明離别無逺近事歡情亦悲不聞車輪聲後會將何時去日忘寄書來日乖前期縱知明當還一息千萬思二為别未幾日一日如三秋猶疑望可見日日上髙樓唯見分手處白蘋滿芳洲寸心寧死别不忍生離憂同前姚係涼風已嫋嫋露重木蘭枝獨上髙樓望行人逺不知輕寒入洞户明月滿秋池燕去鴻來至年年是别離同前釋皎然太湖三山口吳王在時道寂寞千載心無人見春草誰堪忍緘默一作緘怨者老特一作特此傷懷抱孤舟畏狂風一夜一作點宿煙島望所思兮若何月蕩漾兮空波雲離離兮北斷鴻一作鴈眇眇兮南多身去兮天畔心拆兮湖岸春一作山風胡為兮塞路使我歸夢兮撩亂同前權德輿人生天地間瞥若六轡馳夭夀既常數奈何生别離迹當中人域正情日已衰是非千萬境杳靄情塵滋出門事何常暫别亦難期冉冉歎流景悠悠限山陂盡此一夕歡華樽會前墀雞鳴東方曙夙駕臨通逵欲出懶一作強移步欲留難致詞兩情不得已念此留何為天明去已逺寂默居人歸入門復上堂恍恍生驚疑經履同遊處猶言常相隨覽物或臨盤翻怪來何遲乃知前日歡本為今日悲翻思一作持此别後心寧及未見時則知交疏分久久翻易持報君未别人一作後别後當自知同前孟郊松遷一作山雲繚繞萍合一作路水分離雲去有歸日水分無合時芳景役雙目一作春芳役雙眼春色柔四肢楊栁織别愁千條萬條絲别離白居易不得哭别離不得語暗相思兩心之外無人知深籠夜鎖獨栖鳥利劍春斷連理枝河水雖清濁有日一作雖有清日烏頭雖黑白有時一作有白時唯有潛離與暗别彼此甘心無後期逺别離李白逺别離古有皇英之二女乃在洞庭之南瀟湘之浦海水直下萬里深誰人不言此離苦日慘慘兮雲冥冥猩猩啼煙兮鬼嘯雨我縱言之將何輔皇穹竊恐不照豫之忠誠雷憑憑兮欲吼怒堯舜當之亦禪禹君失臣兮龍為魚權歸臣兮鼠變虎或云堯幽囚舜野死九嶷聮綿皆相似重瞳孤墳竟何是帝子泣兮緑雲間隨風波兮去無還慟哭兮逺望見蒼梧之深山蒼梧山崩湘水絶竹上之淚乃可滅久别離前人别來幾春未還家玉窗五見櫻桃花况有錦字書開緘令一作使人嗟此腸斷彼心絶雲鬟霧一作緑鬢罷攬一作梳結愁如回飈亂白雪去年寄書報陽臺今年寄書重相催東風兮東風為我吹行雲使西來待來竟不來落花寂寞一作寂寂委青苔長别離吳邁逺生離不可聞况復長相思如何與君别當我盛一作少年時蕙華每搖蕩妾心長一作空自持榮乏草木歡悴劇霜露悲富貴貌難老一作身難變貧賤顔易衰持此斷君腸君亦冝自疑淮隂有逸將折羽不曽飛楚有扛鼎士出門不得歸正為隆凖公杖劍入紫微君才定如何白日下爭暉生别離梁簡文帝别離四絃聲相思雙笛引一去十三年復無數書一作好音信同前白居易食蘖不易食梅難蘖能苦兮梅能酸未如生别之為難苦在心兮酸在肝晨雞再鳴殘月沒征馬嘶風一作連嘶行人出回看骨肉哭一聲梅酸蘖苦甘如蜜黃河水白黃雲秋行人河邊相對愁天寒野一作路曠何處宿棠梨葉戰風颼颼生離别生離别憂從中一作何來無斷絶憂積一作極心勞血氣衰未年三十生白髮離别曲孟雲卿結髮生離别相思復相保何知日已久五變庭中草耿耿大一作天海途悠悠吳江島但懼一作恐不出門出門無逺道逺道行既難家貧衣正一作服單嚴風吹積雪晨起鼻何酸生人各有志一作意豈不懷所安分明上天一作天上日生死誓同歡文苑英華卷二百二
