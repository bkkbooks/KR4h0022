body:
  text: 文苑英華巻八百五十三宋李昉等編釋四梓州𤣥武縣福會寺碑一首彭州九隴縣龍懐寺碑一首梓州𤣥武縣福㑹寺碑王勃若夫龍圖而括運撫麟筆以傷時天地閉而賢人隐周孔長疑而㣲言絶豈非太階無象三辰鮮叙之因滄海為陵百川有横流之勢况乎法身長往顧糟粕以空存化迹繁流仰舟航而遂逺雖復功推八正猶迷鶴樹之談道亞三眀未覩龍宫之籍則有妙音難遇瞻雪嶺而投軀真諦希聲仰雲山而破骨優填企景新雕白玉之龕般若尋風而疑化黄金之像三千寳座迥出天宫八萬珍䑓遥臨净域非惠圖之冥感孰能臻于兹乎福㑹寺者隋開皇中之所建也爾其峯巒地列東分井絡之光樓雉雲横西覩禺同之奥北彌豐邑里閈十甍南控平江波潮萬里擁亭臯之絶勢昇林野之殊形肇開修竹之園式揆旃檀之刹法川髙闢慈宫峻蔽文璫寶綴環日月於重廊翠栱丹楹起虹蜺於複殿真容俯映福衆爰依梵筵交燭禪房互啟山神獻果還棲交露之䑓天女持香即遶飛花之閤輪輝夜滿抽紫熖於金山毫相晨臨發珠華於玉地爰有縣令桞邉河東令族大業之年來光上邑髙人捧檄功為銅墨之先令宰鳴琴課稱絃歌之最眷香城而惻念披道肆而矜魂示懐延奬司疑作思𢎞末教廼於寺内起重閤一所乘煙置臬揆日端繩層榭三休琱簷四注奔星掛廡混珠網而同歸眀月窺軒雜璿璫而共貫仍抽麗筆俯刋貞琰詞源迅委振法海之波瀾義宇宏深接禪宫之閫奥昔者陶潜彭澤闕之風潘岳河陽未入菩提之域兼其美者著在我柳君乎俄而帝隋方否三官失龍鳯之圖皇業未昌九野被豺狼之毒雖復飡砂茹石窺釰道而廽心蜂聚梟勝疑指銅梁而革面自非法雲西睠潜銷火宅之氛惠日東來廽朗昬衢之景則安能冥資福地顯沮魔軍波清於振壑之隅燎息於炎昆之曲洎乎大鈞無事神噐有歸清玉户而帝寰中轉金輪而王天下𤣥塲佛境與天下而惟新鶯樹鷄林共風雲而改旦功既成矣時既貞矣紫宸有裕蒼甿胥悅都人狎至瞻鴈塔而懽心野老相趨尋鹿園而頓顙或至誠冥發争知不盡之虚或道恩旁流竟委忘縁之施乃於寺内造菩提塑像一座實彭氏絶群之迹洞叅瑶銑體偹丹青得延疑作埏範之竒模盡陶甄之能事功分闕實相變入冥機丹果長春蓮不染靈儀若動似臨王舍城中神足疑行即作菩提樹下銀牀地湧寶帳猶懸珍木天成金花下落緫章元年又奉為皇帝更造八菩薩像成於净境别峻崇堂而力寄群縁功難獨舉遂令衆情馳䳱空懐經始之圖靈座端嚴未得安居之地時有𢎞瀇上人自丹鳥下日昌帝籙於眀堂青鶴乘宵􅑙仙苗于大室軒冕將風雲交映鍾鼎與山河共逺法師宿時疑真諦㓜挺殊姿㧞五醫於長驅登四禪於廽觀以為徳因時建澄什繼踵於西都道冀人𢎞林逺隨肩於南國痛迷生之詭矯悲正覺之後疑作陵夷思欲樹真氣於未萌緒崇因於已往遍遊净境歴騁疑遐方至緫章二年于兹刹身持寶印口出神珠心動巴南化行蜀右法羅潜舉馴鳥性於慈林惠鏡旁開息猿心於定水亦有情鈎五縳遥騰觧脫之川想瘞六塵廽㧞沉迷之域名臣長者禘玉珮於銀庭苦女靈姬落金環於寳地貪機霧滌法施泉流林衡掄杞梓之材班匠獻鈎䋲之巧千欒電紏萬桷霞張飛陸縁甍曽構架景瓊釭杳照乘紺壁而宵分珠箔重華掩青疏而曉亂紅葩植井彩綴河宫丹桂承梁香交列肆天倡梵樂肅然㣼利之天藻盖琱璫煥若摩伽之殿豈精力之𤣥感而神化曲成乎直嵗寺主等州閭盛族鶖鷺榮因昇惠圃而功成踐魔庭而戰勝排四門而獨往共極邦縁攀十地而遐征同趨覺路縣令虞洽旌旗百代劒履三朝匡帝座而南征擁台庭而北面星像埀祉川岳載靈豫章七嵗麒麟千里雄情負俗欝王佐之宏圖英識邁時得公門之逸氣既而拂衣華族入天邑而觀光列板仙䑓出靈關而作宰泉魚狎夜多單父之深恩隴翟遊春嗣中牟之善政有條不紊施緩政於繁䋲㫁訟有神下髙鋒於錯節因以激揚大化潜滋比屋之封光啟令圖預積攀輪之慕縣丞裴林家接朱欄譽流丹闕軒裳照緒忠孝榮門鳥鳴有伐木之歌龍文非制蓬之具髙材列霧盛徳分司翰墨不足留神琴鐏由其狥性十旬休沐奄有泉林千里邀迎乃疲風月青驪躞蹀終噴玉而懸雲素鶴徘徊具御珠而犯露加以沉研有地題橋八觧之津誘勸無方叱馭三乘之路故能使幽眀仰徳法俗依仁攀海祗而如歸挹衢鐏而不疑瞰鄉望等龜靈髙族驥子名家關錦室於中堂分綺䟽於甲第或望雄都鄙代列歌鍾或業預雲雷門藏璽詔文塲促席有江漢之英靈武觀連衡得岷峨之銳氣並能馳心彼岸欲臨海而蹇裳投足化城下悲思而反𬒮下官薄遊江右族寄城隅懐道術於百齡接風期於四海依然梵宇欣象教之將行莞爾公庭惜牛刀之遂屈雖文殊辨論妙懸觧而亡言而伯喈雄管叙真宗而罔愧敢廵此義乃作頌云金堤廽邑玉峽長瀾城闕紛亂江山聳盤雲屯勝邑霧啟禪壇右縈層雉左控崇巒竹園精舍檀山香閤萬栱騰虬千楣跂鶴晩星踈翠朝霞泛㬦鼓奏泉流鍾鳴霜落時經失道代歴交呈神宫不撓法衆無驚金輪邃曉玉鏡施眀功照佛刹化被玉城帝圖冥運真儀濬發貝齒含星流毫推月鳥離山面龍還海闕寶樹刑疑留天宫匠設爰有真人式宣慈主發迹江甸馳聲蜀宇望逺連規攀澄襲矩力窮興道功周廊廡羣縁肹蠁衆福氤氲叢楹列電髙棟御雲銀龕曙撫玉座宵分瓊璣有爛藻繪多文欝彼巖邑猗歟上宰松桂連葉鴛鸞集彩禪津有裕至公無待火宅可辭舟航斯在我之飄寓邈矣來遊山川俯仰道義淹留承風郭外撰綴江幽𤣥機勝筆天地相周彭州九隴縣龍懐寺碑粤若真元混沌抱一氣於天門象化童蒙構三靈於地户由是金城逆順山河假成噐之因玉燭沉浮風火兆流刑之孽懸大眀於日月適滯泉宫設巨浸於雲雷終迷燬宅太極所以散而為兩洪颷所以吹而為萬雖復卑髙異列俱沉方内之遊坌集横流共失環中之契豈夫湼槃深視不背色以求真般一作波若長驅每乘空而得靜則知一名同出隂陽為破道之墟萬象皆空天地即降魔之境莫見其俯仰不知其去就至自於太虗復歸於無物其建言立徳開業成務握大柄而推造化執洪鑪而誥元始四門幽闢顧非相而遲廽三駕晨嚴臨有為而出頓豈不知覉孤乏路終嬰旅泊之虞舟楫中流未釋風濤之苦將以宅心者寂虚室所以合符應物者神眀鏡由其不倦故能商㩁宇宙指麾權實演羣生而非其力存庻品而非其有千巒閉景似居蓬艾之間䨇闕臨空若在江湖之上其釋迦之冲用乎龍懐山者井絡之所交㑹岷隅之所控帯攅峯北走吐香嶂於𤣥霄巨壑南馳歕洪濤於赤岸香城寳地左右林泉碧岫丹岑往來烟霧時有法㑹禪師者俗姓禇氏吳郡錢塘人也金章錫羙河隂傳九命之尊玉鉉乘榮江左受三台之貴地靈人傑自朝野而重光學府文宗冠南都而獨秀法師紫星降彩紅雲受氣應積善於髙門契冥縁於累世果浮觴引潜圖彼岸之功聚礫延砂即揆為山之業靈樞宻運闢仁路而長鳴惠刄髙揮斬邪關而洞照以為冥機體化毫髮莫滯其真執數逐㣲乾坤不容其筭於是四禪幽觀破銅堞而出無眀三殊雄圖排鐵圍而冺非相法雲自在吐納龍宫賢聖不仁奔馳象域將使三千塔廟知真實之𤣥津萬億幡幢入闕之秘藏安心樂土遁影靈關以開皇元年憇于兹嶺靈墟福地已被神功玉牓金䋲未光朝命蜀王秀以文昭建國帝子專征仗巴服之尊名裂卭荒之寳命彤騑僣帝蹕萬騎於銅梁皂盖圖王警千乘於玉宇鏡山南望志狹彭渝錦水西浮耻朝江漢開實沉之壁壘嘯京叔之風塵擁龜堞而託殊方慿爵堂而傲天子威權所制勝兵數十州雄視所臨經塗五千里三英賦雪瞻秋月於梁䑓八叟吟風傳朝雲於楚舘思𢎞正法廣召名僧振錫雲趨乘盃霧合禪師括囊泉石韜跡煙霞攀紫桂而同塵守青蓮而向晦衝颷蕩岳寜移忍地之靈烈火焚闕撓堅林之色王心有悟時加優禮順風拜道封山謝失净發財於廣内揆仙室於重幽因嶂為壁慿崖列户以開皇五年始賜額為龍懐寺地鄰緜左遂均緜上之恩山似龍盤即建龍懐之利爾其崇巒經復複磵萦廽髙邱洩雲長林翳日増瓊垣於下麓揆瑶構於中巖香闕神行珍䑓妙邱玉虯衘靄絶游氣而負蒼天金鳯連甍排烈風而瞰𤣥圃延縁房於疊巘上拂霞荘蔓丹闕於重磎下披泉户陽開隂闔變霜和露廽蠖虵以騰飛起雷霆於指顧玉堂朝亘影襲長虹珠殿宵浮光含列宿禪師歿後爰有孝恭法師智開法師𢎞嚮法師寶積闍梨四上人者並禪師之上足而法門之領袖也五眀衢路控引情宫八觧源流朝宗性海其深為寳㧞白玉於嶃巖無礙居真得𤣥珠於罔象住持真界栖息妙塗俱探寂滅之源各證菩提之域雖業定人境照已極於無方而道寄生成功遂覃於有相演中乘之奥義増上棟之宏規萬栱不騫千門有濶疑俄而帝隋大去皇家小往天地閉而賢人隐雲雷屯而巨寶哀毒龍横霧四天沉暗逆之悲醉象驅風三界溺崩離之酷上人惠機幽晤定識潜融知佛日之恒眀審王風之尚靜芝歌商岳揆雞嶺而同歸茅籍磻溪與候江而共致遁俗無悶因時有待洎丹陵啟秩赤縣居尊迦維授手波旬革面十千天子新朝帝釋之宫八萬仙人始向毗耶之國一音演而荒景服三聖澄而禮樂備由是巴方舊彦蜀城遺老仰慈門而知户牖升福田而喜耕鑿雕鞍繡轄闕㠋而馳魂黼帯綖𥚑指鸚林而䳱欵寳瓶宵注潤浹堯旬玉栖晨魔風調舜歴咸以為假沉其性迷生安視聽之功動亂其心窮子失肌膚之戀江連巫峽始絆心猿山對禺同終維意馬貞觀年中積闍梨等廼宣昭遺趾發揮精舍容成校歴揆日用於天經𨽻首陳章筭神功於地籙廻廊􅌄窱自吐風颷列榭峥嶸坐含雲雨圖竭宫之妙質儼盧舎之真容寳珠周映銀龕備色逸多埀足似臨兠率之天師利分身若赴維摩之境靈仙可接藻繪無施真應難㣲雕鐫有寄若乃廵積岨歴森沉天花照而髙月落地籟驚而幽泉思紫蘭香疑徑香侵栢葉之鑪緑草紋茵影入芙蓉之座真童鳯策即踐金沙仙女鸞衣還窺石鏡巖莊轉梵香冥松桂之墟磵户栖橰寂寞藤蘿之院法鼓奏而寒山曠洪鐘嗚而曉壑靜頳苔翠蘚具不盡之靈依石乳瓊漿入無生之妙饌肅肅焉遥遥焉信調衘之珠庭而列真之甲第也爰有上座𤣥鍳法師等並六塵無我四諦非他奉乾越之㣲言守楞伽之奥府法雷潜吼鼓動風煙慧日揚眀照臨丘壑青漢坐得見宅心之恒靈丹洞行忘覺身成之羙化湏彌不動廽鎮閻浮闍崛安居下觀忉利開四生之廣路叙六趣之彛倫足以遵揚真績恭宣來命者矣縣令桞公諱眀獻字太初河東人也太𤣥降氣中黄授彩襲周魯之榮基吐河汾之靈液四科髙第振風翮於三冬萬室崇班跼雲驂於百里既而政成黎頌道洽甿謳假無上之幽筌毗不言之景化絃歌在韻將寳偈而齊歸銅墨成章與梵天而共貫瓊波湛淡沃蕩雲電珠灌蕭條蔽虧煙雨貞機罕應良談於好事之遊朗調多竒髙賞盡名山之曲下走東臯事失南州塗窮歎孔席之栖遑笑楊岐之浩蕩薄遊兹邑喜見髙人三接而定琴罇七縱而擒風月林宗有道相期清濁之間平叔能言見許天人之際從容宴語契濶胷懐欣性情之同㝠感形骸之共遣雖𤣥都妙域已桂於忘言而義塾文場竊申於知已敢作頌曰妙象無倪神功有渉湛淡名噐崩騰事業慧路翹車禪河艤檝控引羣倫品廽庻刼縱横宇宙反覆山川言因境立道寄形詮爰稽福地式揆珍田丹溪漏日碧洞栖烟闍都玉檻湏彌石室榛灌溟濛風雲蕭瑟晬容廼眷禪徒有謐葉磴三休花嚴疑作巖四宻崇巒架殿疊嶂營樓千楣鳯起萬栱鸞浮星開紺髮月湛青眸神宫不夜邃於長秋户臨重㠋牎分絶嶺手廽香浮中天梵警鶴林聖迹龍泉佛影馬思山空猿悲峽靜森森巨栢落落長松月出東岫霞生北峯山人自狎野老相逄白雲屢㫁青溪㡬重彭澤之令臨卭之客比得疑山藪重䂓泉石法守成言慈門致役糠粃吏隐薜蘿心迹五疑作吾生擾擾與道遑遑殷勤頌詠惆悵津梁投功翠碣助化闕百年之後苔蘚蒼蒼文苑英華巻八百五十三
