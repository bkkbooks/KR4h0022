body:
  text: 文苑英華卷一百三十六宋李昉等編鳥獸六鵰賦一首鶻賦二首蒼鷹賦一首放籠鷹賦一首白鷹賦一首一鶚賦一首射隼髙墉賦二首鵰賦并進表杜甫臣甫言臣之近代陵夷公侯之貴磨滅鼎銘之勳不復照曜於明時自先君恕預以降奉儒守官未墜素業矣亡祖故尚書膳部員外郎先臣審言修文於中宗之朝高視於藏書之府故天下學士到于今而師之臣幸賴先臣緒業自七嵗所綴詩筆向四十載矣約有千餘篇今賈馬之徒得排金門上玉堂者甚衆矣唯臣衣不蓋體常寄食於人奔走不暇祗恐轉死溝壑安敢望仕進乎伏惟明主一作天子哀憐之一有明主二字儻使執先祖之故事拔泥塗之久辱則臣之述作雖不足以鼓吹六經先鳴數子至於沉鬱頓挫隨時敏捷而揚雄枚臯之流庶可跂及也有人如此陛下其捨諸伏惟明主哀憐之無令役役便至於衰老也臣甫誠惶誠恐稽首頓首死罪死罪以為鵰者鷙鳥之殊特搏擊而不可當豈但壯觀於旌門發蹤於原隰引以為類是大臣正色立朝之義也臣竊重其有英雄之姿故作此賦實望以此逹於聖聰耳不揆蕪淺謹投延恩匭進表獻上以聞謹言此表六百十卷重出今削去當九秋之清凄見一鶚之直上以雄材為已任橫殺氣而獨往梢梢徑翻肅肅遺響杳不可追俊無留賞彼何鄉之性命碎今日之指掌伊鷙鳥之纍百敢同年而爭長此鵰之大略也若乃虞人之所得也必以氣凛一作禀𤣥冥隂乘甲子河海蕩潏風雲亂起雪沍山隂氷纒樹死迷向背於八極絶飛走於萬里朝無以一作所充腸夕違其所止頗愁呼而蹭蹬信求食而依倚用此時而椓杙待弋者而綱紀表狎羽而潜窺順雄姿之所擬歘捷來於森木固先繫於利觜解騰攫而竦神開羅網而有喜獻令一作全又作禽之課數備而已及乎閩𨽻受之也則擇其清質列在周垣揮拘攣之掣曳挫豪梗之飛翻識畋遊之所使登馬上而孤騫然後綴以殊一作珠飾呈於至尊摶風搶櫐用壯旌門乘輿或幸别館獵平原寒蕪空闊霜伏喧繁觀其夾翠華而上下卷毛血之崩奔隨意氣而電落引塵沙而晝昏豁堵墻之榮觀棄功效而不論斯亦足重也至如千年孽狐三窟狡兔恃古塜之荆棘飽荒城之霜露回惑我往來趦趄我場圃雖有一無此字青骹戴角白鼻如瓠蹙奔蹄而俯臨飛迅翼以一作而遐寓而料全於果見迫寧遽屢攬之而頴脫便有若於神助是以嘵哮其音颯爽其慮續下韝而繚繞尚投跡而容與奮威逐北施巧無據方蹉跎而就擒亦造次而難去一竒卒獲百勝昭著夙昔一作夕多端蕭條何處斯又足稱也爾其鶬鴰鴉鶂之倫莫益於物空生此身聨拳捨穗長大如人肉多奚有味乃不二字一作不足珍輕鷹隼而自若託鴻鵠而為鄰彼壯夫之慷慨假强敵而逡巡拉先鳴之異者及將起而遄臻忽翮天路終辭水濵寧掩羣而進取且快意而驚新此又一時之俊也夫其降精於金立骨如鐵目通於腦筋入於節架軒楹之上純漆光芒掣棟梁之間寒風凛烈雖趾蹻千變林嶺萬穴擊藂薄之不開突杈丫而皆折此又有觸邪之義也久而服勤是可吁畏必使烏攫之黨罷鈔盜而潜飛梟怪之羣想英靈而遽墜豈比乎二字一作非虛陳其力叨竊其位等摩天而自安與槍榆而無事者矣故不見其用也則晨飛絶壑暮起長汀來雖自負去若無形置巢嶻嵲養子青冥倐爾年嵗茫然闕庭莫試鈎爪空回斗星衆雛儻割鮮於金殿此鳥以一作已將老於巖扄凡一作皆文粹及集本鶻賦李雍伊鷙鳥之雄毅有俊體之超特意凝緩而無營體閒整而自得隂沉其情一作精慘淡其色固未足以異於衆禽也夫一指一呼一擊一搏為主之用騁人之樂凛然神動翕然氣作殞三窟之狡兔斃五里之仙鶴騰霄漢而風卷透原野而星落萬乘為之顧盼六軍為之揮霍歡聲動於天地逸氣靄於林薄至若逐烏舛類射隼殊名獲不相讓遊不同征何至德而肯疑制每協義而不爭偶坐推食雙飛和鳴殺敵齊力登樓比形夫其嚴冬沍寒烈風迅激或上棘林或依危壁身既禀於喬木骨將斷於貞石營全鳩以自暖罔害命以招益信終夜而懷仁仍詰旦而見釋矧乃戀主不去徇食猶止豈貪利而永言將效誠而必死甘閉於籠分從於使寧竭力之利人曷戢翼以存已則知負力干勢爭啄奪肉始飛聲而逺引忽側翅而橫蹙遇之者夭當之者覆壯士感之驚歎行子羡之回矚故能連擊縱便臨事莫違一超雲以高舉一隨物以低飛馳逐妙於人智促節合於兵機禽雖小而不陋獸雖捷而無依或則九霄擊下萬里一作文接來風行電轉月上雲開乍差池而不中終棄置而不回彼俊異之英决豈凝滯於嫌猜觀夫愛子防巖惜巢忌物吻一作聲戛戛而雄厲翅翩翩而徑逸觜距者先中而命處錦疑作綿蠻者異狀而同疾苟精别而棲條同賞心而無失奉和鶻賦并序髙適天寶初有自滑臺奉太守李公鶻賦以垂示適越在草野一作澤才無能為尚懷知音遂作鶻賦其詞曰夫何鶻之為用置之則已縱之無匹懷果斷之沉潜任情性之敏疾頭小而鋭氣雄而逸邈耿介以凌霜目精明而㸃漆想像遼逺孤貞深密將必取而乃回若受詞而無失當白帝之用事下青霄一作入青雲而委質乃順一作徇節而一作以勃然因指蹤而挺出嚴冬欲雪蔓草初焚野莽蕩而風緊天崢嶸而日曛忿頑一作願兔之狡伏耻高鳥之成羣始滅沒而略地忽升騰而篲一作參雲翻决裂以電繫一作擊皆披靡而星分奔走者折脅而絶脰鳴噪者血灑而毛紛雖百中而一作之自我終一呼而在君夫其左右更進縱橫發跡掃窟穴之凌兢振荆榛之折歷一作折瀝翕六翮以直上交雙指以迅擊合連弩之應機類鳴􅐴之破的豁爾胸臆伊何凌厲以爽朗曽莫蠆芥豈虞夷險之三字亦作險難而怵惕觀其獲多不三字亦作所獲多有得用非媒歷閶闔以肅穆翊鉤陳以一作而環回幸耀一作輝光於搜狩承剪拂於樓臺望鳯沼而輕舉紛羽族以驚猜路杳杳而何尚一作向雲茫茫而不開鶯出谷而一作兮徒爾鶴乘軒而何哉彼懷毅勇轗軻而棄置胡不效其間關而徘徊爾乃顧恩有地戀主多情念層空而不去一作起託虛室而一作以無驚雅節表於能讓義心激於效誠勢愈一作逾高而下急體彌重而飛輕戢羽翼以受命一作知若肝膽之必呈嗟日月之云邁猶羈縻而見嬰别有橫大海而徑度順長風而一寫投足眇於巖巔脫身逸一作冥於弋者氷落落以凝閉雪皚皚而飄灑諒堅鋭之時一作持然寧苦寒以一作之求捨匪聚食以祈滿聊擊羣一作鮮以自假比𤣥豹之潜形同幽人之在野矧其升巢絶壁獨立危一作霜條心倐忽於萬里思超遙於九霄豈外物二字一作别物之能慕曷凡禽之見邀一有則字未知鴛鷺之所以一作適孰與夫鵬鷃之一作兮逍遙云爾哉凡一作皆集本蒼鷹賦闕名中疑靈繁育萬象周流綜羣物之衆夥懿羽族之齊侔俱含識與哺啄終愧容於爽鳩散以瑶光之彩來自鍾巖之丘周官以司寇比德漢氏以將軍作儔鈎成利嘴電轉竒眸蒼姿疊色𤣥距聯韝至于長楊大獵雲夢時搜寒光送曉霜氣橫秋頓平原而亘弋截洞壑以張罘野霧初霽朝陽尚早於是排空漢飛絶島奮之鼓之載擊載討凌紫氣而蔽日下平臯而覆草歸鴻失四飛之路狡兔亡三窟之道夫品彚之功用之非器至於表德頗亦千致仙莫過龍駿莫過驥鵬垂天以圖逺劍斷甲以稱利夫其庶類之呈能未若兹禽之為鷙固得緗牒再演史臣攸記逐彼鳥雀然明之對國僑擊于殿上要離之讐慶忌且般樂之遊君子未適禽荒是戒哲王盛績太康洛汭一作水之表已驚一作怒不還李斯上蔡之門情何更溺覽二君之喪道每觀事其如惕幸免射於高墉願摶風而上擊放籠鷹賦以無育斯禽以明惡殺為韻張莒貞元初敷文教於率土念畋遊之無度啓鷙鳥幽縶之中示皇家不私之務將以致仁夀明好惡雕籠永閉念受紲之多虞金架爰辭俾凌風而得路由是縱逸翰於寥廓釋猛志於扄固當其海晏時清天高日明離習習之恩重視蒼蒼而體輕捨靈檻而方鋭歷秋林而上征乍遂翻空出君門而不返遙憐厲吻過宫樹而猶驚洎夫恤彼幽閒順兹棲止用成端拱之化將盡好生之理足使去韝上而無疑顧人間而何以昔因殊顧幸肉食以見羈今降深𠂻忽雲翔而有始故得脫身聖代矯跡天衢方縱心於萬里詎斂翼於四隅山藪之思俄失嘴距之衛寧無然則播仁風於坱圠乃順時以止殺戒逸氣於荒淫故無用於兹禽豈俟夫飬育之勞既久徘徊之懼彌深雖多士盈朝無聞諫獵故黔首在下盡得歡心則知信及纎微念兹棲宿庶羣情而知感期衆類之蒙福遂使擊搏之性將翺將翔乳哺之心既生既育是用保其鴻業建此深規惠澤爰臨整羽儀於户牖微誠既展遂鳥雀於藩籬信九霄之可託將一舉而在斯白鷹賦闕名於爍明德兮動休徴縈墨綬兮效素鷹朱草一作系如之何所縈一作繫則止玉壺如之何所飲則承借如紫巖碧流煙深樹幽産鷖成羽自春徂秋含隂陽之淳粹任天地之剛柔懷好音與好質非成色而不求厭羽毛於原野戀主人而即留嗟乎含情履潔象君之節厲吻鈎鋭澡毛玉截遷河陽之喬木一㸃清花映武城之瑶琴孤飛春雪昔王魯同勳賢哉二君或雉隨黃壤或鸞下青雲莫匪白鷹之為最况復見之與所聞良以出自幽谷遷於華屋霜飄上衣星流入目涅而不緇惟公象之比德於玉象公不欲匪我政表來儀者何致之由德玩物則那思君子以馴擾不避虞人之網羅蓋以少而取貴豈同乘鴈之為多一鶚賦以凌厲清浮羽翰無匹為韻楊𢎞真禽之鷙者鶚兮挺生不翻翻以羣萃自耿介以孤貞羽族之中雖彼衆而我寡雲路之上如特立而獨行固將殺敵無匹擊鮮莫京豈惟拂之於平野玩之於太清哉卓彼雄姿凛乎壯觀或危石以礪吻或髙柯而整翰搏鳩之隼不敢飛揚逐燕之鸇望而伏竄及夫當殺節乘徑秋雙眸電擊六翮雲浮仰之彌高方一舉而千里翔而後集耻乘居而匹遊既而變金風驚商律不類聚以頡頏自孤飛而厲疾介然直下固不可以同羣邈矣獨翔諒有殊於喪匹磨疑作摩碧落而上騰與紫氣而相凌自樂其絶侣無求於得朋鷹揚者迎之而不逮鵰悍者攀之而不能莽蒼天髙悠揚日霽自暇自逸倐來倐逝何剛者而不懼何勍者而不制風毛雨血見張衡西京賦在嫉惡而無遺草伏木棲咸畏威而若厲明心不測利用則殊以少為貴匪繁有徒想像乎八紘之間視逺如邇隱映乎九霄之際出有入無諒搏擊而不競豈搜狩而弗圖是知禽之凡者雖纍百而何補士之傑者將無雙而必取亦猶務利觜刷迅羽雖多亦奚以為固非一鶚之為伍射隼高墉賦以君子藏器待時為韻敬騫養形𤣥豹兮以隱霧而成文振羽飛蛾兮因附火而自焚彼紛然之落隼識昧此而喪羣誠不知髙非小者所處靜為躁者之君苟失度而接疑適將受斃而何云且夫長墉崇崇矗若雲峙飛隼􅀈􅀈倐隨風止曽不料其微陋焉更知其休否故疾惡之夫善射之子操騂角之弓調白羽之矢縱穿楊之妙呈落鴈之美量逺近於目端審高下於規裏紛洞胸而逹腋果裂素而破觜原夫剛鏃初架徑絃正張引彎彎之月影迸的的之星光鏟毛羽之振迅挫容貌之昻藏審必中而後發固焉用而不臧若乃處身順理投跡知常時决起而無滯或怒飛而有方煙雲足以遐賞翳薈足以來翔必絶捐軀之患豈貽在彀之殃是則素有雋志往無不利藏器者人獲隼者器矢應弦而上激禽應矢而橫墜微隼諒比於小人高墉亦方於重位苟不戒於遊處曽何免於顛躓士有五善斯在載櫜有待麗龜之知未忘貫隼之誠勿改幸文武之不墜希葑菲之必采則知發矢有期獲禽俟時想大易之靈一作垂文微言可賾稽高墉之𤣥疑作立象壯立空持既是則而是效永念兹而在兹第二同前韻武少儀羽族紛紛彼飛隼兮獨徑捷而莫羣心耿介以騰踴毳斑斕而被文擊每依於素節翔亦致乎青雲匪全身以自變一作愛寧有齒而見焚貫矢落庭既垂名於孔宣父搏鳩陷網又伏罪於信陵君今也何時一作持輕乎所履伊廣甸不遊乃高墉爰止信非位乎是蹈宜賈害而鬻死吾嘗問術於列禦寇學藝於熊渠子爾或捨諸吾斯過矣我矢惟良我弓未藏度中而發于何不臧矧專精而致用奚得失之難量哉於是正色斂容凝心定志睨手引滿注目神萃驚弦駭括將辟易以翻飛裂臆洞胸已披離而迸墜觀彼隼之貽戚諒吾人之㑹意故君子周而不比用則擇地無苟進以躡高位無躁求以享厚利智昧於是安往而免夫顛躓未見器字官韻然則懷貪怙力者怨一有咎字所聚材小任崇者覆一有亡字可待故聖人明彖象以立言懸日月而不改或有人兮修其詞遇其時三復射隼之兆載質射隼之期幸寸長而罔貴冀一聞而在斯文苑英華卷一百三十六
