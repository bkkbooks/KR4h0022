body:
  text: 文苑英華卷九百九十八宋李昉等編祭古聖賢謁舜廟文一首謁禹廟文一首謁夫子廟文一首祭關龍逄文一首祭巢許文一首祭杜康新廟文一首祭司馬相如文一首祭王子喬文一首祭殷仲堪羊叔子文一首祭伏波神文一首祭田橫墓文一首酹王景略墓文一首謁舜廟文吕溫唐貞元十一年歲次乙亥十一月一日東平吕溫敢盥沐齋潔敬謁於舜帝之神恭惟至仁無方大孝不匱德馨升聞允釐百揆以聖授聖猶言歷試擇人之君良不可易聖功無全相待而宣雷驅四凶雲起八元大冶蜀本作火治陶土集作世璿璣轉天垂衣巖廟萬物浩然是稱至理是曰帝者混成雍熙永錫大嘏乃眷南顧蒼梧之野歸堯鴻名付禹天下茫茫推遷邈萬斯年三代之後誰為聖賢政如頺波俗若壞山韶樂猶在薰風不還於戲道有通變事有同異官帝家王隨時之義揖讓而禪固非力致所以識者存而不議若輔相之冝財成之規煥乎文章百代可知九官惟舊七政有彛𢎞道在人太平無時如何後王曽莫是思其易甚簡舍而弗為歷山巋然河水東注唐虞日逺楊墨誰拒瞻彼歷山集作清廟薄言往訴庶幾精誠必我依據假我以靈集作俾躍清源俾飛層雲行神之道以致吾君不然歸來鳥獸為羣敢竭微志託於集作于明神祭禹廟文宋之問維大唐景龍三年歲次甲子月日越州長史宋之問謹以清酌之奠敢昭告於集作于夏后之靈昔者巨浸橫流下民集作人交喪惟后得流星貫昴之夢受括地治集作理水之符底定九州弼成五服遂類上帝乃延群公自有生靈樹之集作以司牧大災三字集作禦水災莫踰於堯日勤人集作隱字不越於夏君集作時向微隨山奠川之功蒼生為魚至今二千九百年矣肇為父子始生君臣興用天之道廣分地之利者嗚呼皆后之功也之問移班會府出佐計鄉遂得載踐遺塵逺探名穴朝玉帛於斯地聲存而處亡晉精靈於此山至誠而響發悲夫井家相連于今幾年當其葬也上不通臭下不及泉棺絞葛兮增集作墳收壤鳥耘荒兮象耕田先王為心享是明德后之從政忌此姦慝酌鏡水而勵清援竹箭以自直謁上帝之休祐期下人之蘇息日之吉神之歆激楚舞奏越吟芳爼溢醇罍深遺羞猒於魚鳥餘瀝醉於山林忽雲搖兮鳯舉空夀堂兮隂隂謁夫子廟文此篇已見三百七十三卷李觀祭關龍逄文王績集作績歲月日謹以清酌之奠敬祭夏忠臣關生之靈曰聖貴逹節賢貴識時興亡有運用捨有期慿河暴虎前哲所嗤身滅主喪如何忽思我因行役歷于荒祠壯山河之舊壤歎墳隧之餘基松枯柏悴集作老草密苔滋託深悲於薄醑魂有靈而饗之登箕山祭巢許文前人懷二子之髙烈背嵩嶽而來逰挹千載之遐軌登箕峯之集作而少留昔時慷慨神輕九州今來寂寞集作絶魂辭一丘英蹤落而猶在精誠冥而遂幽集作休山荒廟僻地古松秋吾集作余鄙懷之有素仰前哲之清猷同聲同集作必感異代相求如志集作至誠之見接庶蘋蘩之可羞伏惟尚饗祭杜康新廟文前人歲月日敢以清酌之奠敬祭先生之靈曰兩儀判闢萬象森羅都邑未建鳥獸獨多茹毛飲血巢居穴窠天地不交人靈未和智哉先生爰作甘醴上配百牢下主五齊以宴以禱為樽為洗萬神以降三獻成禮法成必弊文盛則華奚仲斫輪焉知覆車桀紂亡國羲和喪家周公作誥乃防厥邪我聞古時王道正直賢人君子澡身浴德降及中世昏主作式刑罰不中讒淫罔極吁嗟世道一至於此逹人大觀貴和其禮與制於物寧在於已乘流則逝遇坎則止眷兹酒德可以全身杜明塞智蒙垢受塵阮籍遂性劉伶保真此避其世于今幾人我瞻前説功髙受賞嗟嗟先生其義可想肇基麴蘖光開祀饗大禮斯備羣賢就養敢依河曲建爾靈祠前臨極岸却就長磯茅茨不翦采椽不治掃地而祭神其享之祭司馬相如文陳子良維大唐貞觀元年歲次丁亥五月壬子朔十六日丁卯相如縣令陳子良謹遣主簿譙恱齊疑作齋桂醑蘭殽之奠敬祭故文園令司馬公之靈惟君夙敏雅調雍容含章挺生慕藺斯在題橋去蜀杖䇿入關終倦梁園之逰還恱臨卭之客楊意為之延譽王孫以之開筵彈琴而感文君誦賦而驚漢主一作武帝金門侍制深嗟武騎之輕長門賜金方驗雕龍之重及乎茂陵謝病逰岱無歸空留封禪之書遂感宸衷之悼是知聲名籍甚絶後光前厥迹猶存餘芳無泯豫忝宰茲邑似覿遺塵撫事懷賢實勞寤寐夫遊九原者慕隨會而增悲望魏都者佇侯嬴而顧步仰惟往彥差擬其倫緬彼風猷載深長想至於蘋蘩可薦黍稷非馨庶降明靈幸垂嘉祐神其如在希能饗之為兖州司馬祭王子喬文宋之問維大唐神龍二年歲次甲子月日前中中字集作太中大夫行兖州都督府司馬王某謹以清酌之奠敢昭告於集作于仙居之靈夫惟仙君神化寥廓昔為葉宰蒞此郛郭謁帝乘鳬賔天控鶴玉以為棺言降楚鄉土自成壠人知東岡靡靡行邁邑過諸梁實感我先顧墓增傷載馳載奔于陵于谷乃披蔓草式敬喬木孰不懷古誰非彼昆靈胄日衰遐心莫存逮及仙伯復茲道門小子實幸忝惟枝孫華陽舊里緱氏集作山新宅二君爰創百代不易豈無沃土永守遺迹有鳥有鳥歸來何斯集作可期緬惟此地登真之基願考狹室樹兹豐碑有志未就靈其祐之尚饗祭殷仲堪羊叔子文張説荆州府城中西北隅舊有殷仲堪祠説到官廣其堂立羊叔子廟像成而祭之維開元六年歲次戊午正月日荆州大都督長史燕國公范陽張君集作某謹遣功曹參軍吳興沈從訓敢昭告於普殷羊二荆州之神我聞立人之道曰仁與義仁者孝之先義者忠之主也殷公惟孝子羊公惟忠臣行植普國德施荆人不孤其美是建為鄰雙風雖舊二廟維新凡百君子高山仰止馨香以時肅集作敬恭明祀尚饗凖制祭伏波神文李翺嗚呼伏波之生好兵自喜幼有壯節騰聲出仕定册歸漢漠俞帝旨算無失畫功伐可紀破斬徴側實平交趾來征集作往蠻溪未卒而死小人赤口曷本於理薏苡南還明珠譛起乃收侯印爵不及子遺蜀本作唯德不忘愛留社里築廟以祭人敬集作敬畏其鬼久而若新千歲不毁讒口嗤嗤易白成緇孔子義失勛華不慈曽氏殺人母投於集作于機居竊厥嫂陳平不疑申生置堇普有驪姬蜀本有是以二字無極巧詆集作舌伍奢誅集作族夷孟子傷讒萋兮作詩公失其所梁松實為何獨將軍自昔如斯故士有歷萬代而不滅者常被訕於當時苟窺心而不怍雖棄置兮集無兮其奚悲赫赫聖帝嘉賢命祠酒斚既列一本作設神乎降斯集作思尚饗祭全義縣伏波廟文李商隱年月日觀察處置使兼御史中丞鄭某謹遣全義縣令韋必復以酒牢之奠昭賽於漢伏波將軍新息侯馬公越城舊疆漢將遺廟一𣲖湘水萬重楚山比潁川袁氏之臺悲同異日方汝水周公之渡感極當時嗚呼昔也投隙建功因時立志隗將軍坐談西北棄去無歸梁伯松集作孫梁松字伯孫自降王姬雖來不起以若畫之眉宇開聚米之山川扶風里中詎守錢而為虜德陽本傳作宣德殿下寧相馬以推工悵望關西趨馳隴首事嫂冠帶誡姪書成龍伯高之故人其言有所公孫述之刺客相待何輕鳶跕啓行蠻溪請往銅留鑄柱革誓裹尸男兒已立邊功壯士猶羞病死灕湘之滸祠宇依然豈獨文宣之陵不生刺草更若武侯之壠仍有深松向我來思停車展敬一樽有典集作奠五馬忘歸及申望歲之祈又辱有秋之澤雲興柱礎電繞墻藩何煩玉女之投壺方聞天笑不待樵人之取箭已見風回敢忘黍稷之馨用報京坻之賜屬以時非行縣不獲躬詣靈壇詞託煙波意傳天壤既謝三時之澤兼論千載之交勿負至誠以孤玄契祭田橫墓文韓愈貞元十一年九月愈如東京道出田橫墓下感橫高義能得士因取酒以祭為文而弔之其詞曰事有曠百世而相感者豫不自知其何心非今世之所稀孰為使豫歔欷而不可禁豫既博觀乎天下曷有庶幾乎夫子之所為死者不復生嗟豫去此其從誰當秦氏之敗亂得一士而可王何五百人之擾擾而不能脫夫子於劒鋩抑所寶之非賢亦天命之有常昔闕里之多士孔聖亦云其遑遑苟豫行之不迷雖顛沛其何傷自古死者非一夫子至今有耿光跽陳辭以薦酒魂髣佛兮來享華山酹王景略墓文吕溫唐貞元十二年十一月六日河東男子吕溫敬酹于符秦丞相王公景略之墓昔馬氏暴興世不及三枝根河洛遺枿東南鋸牙霆聲爭逐婪婪天下為血普猶清談帝命景略被兹文武秉心無親用則為主惟秦悼世求我草莾振衣投畚乃作雷雨雨莫不潤雷莫不震吸涼吞燕嚼魏含普海蕩風掃天臨嶽鎮功存生人是曰大順武功成矣文理定矣晏開太平垂及三紀子也無夀秦其不祀日沉天昏水竭龍死時更運改道歷消長屹彼壯骨沉為朽壤烈氣猶在英風可想雲開華山若見精爽樂毅佐燕功負其名漢猶求後寵號華成曷如夫子翊運而行廓定八州澤流羣生歷代王者逮我聖明盛德未聞荒墳欲平我行於東稅駕釃酒才何敢望數亦未偶終期自致窺子户牖靈魂若存死為冥友文苑英華卷九百九十八
