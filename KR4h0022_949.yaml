body:
  text: 文苑英華卷九百五十宋李昉等編職官十二此下五卷英華所編失作者先後今正之楊常州德裔墓志一首杜袁州墓志一首李懷州冲寂墓志一首馮潘州衡墓志一首陸岐州伯玉墓志一首常州刺史楊公集作伯父東平楊公墓志銘楊炯楊氏之先其來尚矣在皇為皇軒在帝為帝嚳在王為武王集作周武在霸為晉文此之謂不朽西京為丞相東漢為司徒魏室為九卿晉朝為八座此之謂代祿公諱德裔字德裔𢎞農華隂人也即常州刺史華山公之元孫左衛將軍武安公之長子生而岐嶷代不乏賢事親以孝聞在鄉黨恂恂如也始以父父字集作文任為太子左千牛備身轉秀容華亭福昌雒四縣令制集作詔封東平公䇿勳上柱國是時也天子仄席求賢勵精為化以公屈臨小縣焉用牛刀處治中别駕之任方展其驥足耳擢拜頴州幽州二司馬寬以濟􅀈嚴而不殘每行縣録囚徒其所平反者十八九制集作詔徴尚書郎御史中丞謇謇諒集作亮直有王臣之節尋以公事去官復拜饒州括州越州都督府三州長史在㑹稽引陂水溉田數千頃人獲其利于今稱之焉遷棣曹恆常四州刺史歷政清白為當時所重於是覽先賢之言知止足之分罷歸初服告老私庭乃率群從子弟營别業於冝城集無此字神鄉之望仙里其制宅也宗廟為先廄庫為次居室為後喟然而言曰古人所謂歌於斯哭於斯聚國族於斯者吾知之矣維文明元年夏四月某日薨於正寢春秋八十有五嗚呼哀哉公簡貴不交流俗非禮不動非禮不行望之儼然聽其言也厲博觀史籍不學書生尋章摘句而已至於臺閣舊事法令科條莫不成誦在心若指諸掌最集作丸為六集無此字尚書郎二年御史中丞滿嵗宰人者四縣上佐及專城者九州盛德形容被於歌詠門生故吏遍於天下永淳二年輿駕幸東都召公見於金城頓訪以得失公採托集作博采群言悉心以對髙宗嗟嘆者良久賜几杖粟帛鄉里榮之一子令珍早亡朝夕溫清者四女公慨然有喪明之痛因不豫彌集作遂留遺命以弟之子神毅為後越垂拱元年春二月某日與夫人隴西李氏合葬於集作于某原禮也逺近㑹葬千餘人操筆而為誄者以百數嗚呼哀哉其其字集作乃為銘曰巖巖華山峻極于天上侵集作寢神氣下固窮泉夫惟積德生我大賢其一滔滔河水中國之紀𣲖别九都經營萬里夫惟積潤生我君子其二惟桞疑作欣按志文為秀容令即欣州所治之城惟華之亭冝陽之地益部之星公為其宰不殞其名其三汝隂之國薊門之北陂水朝黃燕雲夜黑公為其佐日宣其德其四入踐郎官含香握蘭來居白室直繩明筆潘子一除士師三黜其五邑號鄱陽山名括蒼東南之美吳㑹集作㑹稽之鄉展其驥足直集作實賴王祥其六四州之大是稱都㑹千里之榮即分麾蓋言旋舊國保茲耆艾其七生為貴臣死集作殁為貴神隂堂是夜古木非春鄧攸無子天道何親其八杜袁州墓志銘前人公諱某字某京兆杜陵人也髙辛之撫教萬人一作方堯帝之平章百姓傳稱聖人之後易曰積善之家在夏為御龍在周為唐杜三王已降百代可知車服出於南陽衣冠集集作襲於京兆曽祖榮華集作業後衛秦州别駕祖良宇文朝復州長史父舉唐易州司兵參軍州事端履道掾史安貞厚於天爵薄於人位闕里之庭學夫詩禮太丘之門執其羔鴈公孝慈而敬威莊而安狎貫義方周覽典籍服其服則文之以君子之容遂其辭則實之以君子之德起於集作家左翊衛選授貝州府倉參軍事出自中禁在於集作于外臺謹其蓋藏實其倉庾尋遷蓬州咸安許州長杜相州洛陽三縣令地方百里官歷三城言非法度不出於口行非公道不萌於心令不肅而威宣教不舒而德洽轉虢州司馬制授朝散大夫婺州司馬又遷蘇州長史加中散大夫鸞鳯不棲於枳棘燕雀不集於梧桐冝得其材非公莫可我大周誕受萬國寵綏四方建官惟賢垂拱而理乃命公為朝議大夫使持節袁州諸軍事守袁州刺史天王之使列國之君發其德音而勸不用賞正其顔色而禁不用刑德成而位尊名遂而身退乞骸告老謝病言歸以某年月日終于淮水集作海之館春秋七十有七嗚呼哀哉夫人太原王氏魏驃騎大將軍新昌公平之曽孫唐蜀王府典軍上柱國志隆之女也纂承洪烈嗣續集作揚徽音中外柔加小大懷睦夫人之化國風美於鵲巢寶劔之沉夜集作祥氣衝於牛斗享年四十八嗚呼咸亨二年某月日終長杜之官第維天授三年春二月合祔於杜陵之平原禮也王人吊祭儀仗官給長子某官等毁形於骨痛貫於心父母哀哀昊天莫報佳城鬱鬱白日何年願述餘風式銘幽壤其銘曰鳯凰鳴矣于彼髙岡顯允君子邦家之光猗歟令德秀於閨房嵗云暮矣池樹荒凉死則同穴如何彼蒼李懷州墓志銘前人公諱冲寂字廣德隴西狄道人也左衛大將軍西平王之孫荆州大都督漢陽王之子今上之族兄也原夫帝堯之緒運期授於天漢顓頊之胄大命集於皇家光耀則若木十枝波瀾則長河九𣲖或中軍按部金鼓所以節其聲或刺史班條冕旒所以彰其德信可謂玉林多寶天族多竒以御家邦以藩王室者也公山河誕慶辰昴發祥金多木少孔文舉之天骨玉潔氷清華子全之神彩南陽季恭偉懸識宰臣沛國趙元儒竊知公望編漢皇之兄弟列周室之邢茅天下稱其八才吾家號為千里初任尚舍直長稍遷城門郎仍奉勑於𢎞文館讀書掌舍諸宫城門列校制詣東觀有黃香之博聞賜其制書有班游之廣學尋授駕部員外郎轉金部郎中又勑公為戎州道支度軍糧使天府充牣軍儲委積振南宫之紱冕譽表三臺歷西蜀之江山榮髙駟馬遷太府鴻臚二少卿丁難去職揚播之登太府初聞纍遷之命鄭默之拜鴻臚遽見終喪之禮孔宣尼既祥五日彈不成聲孟獻子加人一等懸而不樂服闋歷青德齊徐四州刺史東臨巨海西至長原或全齊厯下之軍或大禹徐方之地任隆刑疑部陶侃八州寄重尋陽桓伊十部本傳作郡遷宣州刺史吳王舊邑楚國先封江回鵲尾之城山枕海根之治蜀郡無此計吏則惟薦張堪頴川尤多制書則但稱黃霸巡察使以尤異聞遷陜州刺史觀其井邑虢仲上陽之故墟度其川原周公分陜之遺跡唇齒通其列國咽喉壯其天險善人為政無待於百年童子行謡先符於兩日于斯時也天以順動帝以㑹昌修封禪於岱嶽作明堂於汶上望山川而遍群神執玉帛而朝萬國制公檢校司理常伯文昌之省遙接大階建禮之門旁連復道萬機匡贊八座謀猷既陪軒帝之巡乃覿漢家之事屬河縣南走慿斗骨而為城居衛蒲東亡界朝鮮而為役屬乘輿乃誅後至討不庭申命六事之人以問三韓之罪制曰師出遼左卿可為北道主人檢校營州都督石門山險銅鼎河流天文則營室辦方地象則神臺鎮野供其行李鄭國有東道之名為我主人常山當北州之寄遼東平以功遷蒲州刺史堯都蒲坂舜耕厯山昭襄王始作河橋穆天子至於雷首汝南朕之心腹遂拜韓崇河東吾之股肱時徴季布遷少府監忠信為主揚阜齊衡清白在官常林比德又除蒲州刺史諸童之逢迎郭伋再牧并州百姓之願得耿純復臨東郡孝敬皇帝國之儲嗣乾之長男四極奏於重光二年賔於上帝崇其諡號用黃屋於羽儀卜其園塋象𤣥宫之制度山陵之建也以公檢校將作大匠游衣漢寢之外抱劔橋山之下百工畢力陳琳於是乎躬親諸吏懷恩魏霸於是乎無謫遷銀青光祿大夫行少府監若夫叶時月乘天正秦人往事逰别館而祈年漢宫舊儀下明庭而避暑上幸九成宫以公檢校右領軍將軍本官如故董司戎政以戒不虞七校陳其甲兵五營按其車服領軍之職用文武於紀瞻右軍之官叙勤勞於常惠尋以公事免左授歸州司馬楚州舊也始得子男之田䕫之先也裁為附庸之國人同賈傳路似長岑伯騫有聲於鄉里仲任見知於筆札制遷中大夫行衮州都督府長史大庭之庫少昊之墟上真降婁金精吐宿旁瞻日觀木德題山别乘初迎將宣萬邦之化佩刀終爽徒見三公之服以永淳元年某月日行次唐州方城縣遇疾薨朝廷聞而傷之贈懷州刺史公嚴而有禮直而能和行孝立身移忠事主生知者上重之以八索九丘道在尊加之以文昭武穆故能入登常伯出踐方州為六卿之儀表發三軍之號令引長㦸於門前羅曲旃於堂下子孫朝夕玉樹相輝賔客逺迎玳簮交映悲夫展禽三黜安仁再免奚辭棘署俯集桐華慘舒則不繫隂陽喜溫則不形顔色何嗟及矣竟遊東岱之山無所不知旋閉南陽之墓二年夏五月日葬於萬年縣龜川鄉之平原長子某官某次子某官某箕裘必復花蕚生光鄰人泣其悲慟明主憂其毀瘠觀其弔客不無雙鶴之徴察其成墳自有百烏之感森森隴樹漠漠郊烟右𤣥灞而浩蕩左驪山而起伏杜陵萬家之邑非復城池滕公駟馬之銘不知年代其銘曰髙陽積德武昭餘慶宅鎬開基封唐啓聖叶和萬國平章百姓天叙諸侯禮陳宗正其一周之曲阜漢之平陸地則葭莩祥惟嶽瀆鄉黨稱善閨庭雍穆始拜城門即逰天祿其二大微之位益部之星卿則有六四至丹青州則有九八牧専城既踐臺閣仍司甲兵其三倚伏無兆遭隨有運賈誼從王柏談佐郡自忘寵辱曽無喜愠人去何歸天髙不問其四東都門外長樂宫邉白馬旒旐青烏墓田揪桁夾路碑石書年百代之後南陽之阡其五贈潘州刺史馮君墓志銘張說公諱集有君字衡字正平廣管髙州人也昔畢萬苖裔邑于馮城因以為氏其適越者則袁宏過江録所載長樂馮祖思之後也逺居僻地代為右族帶甲千人擬四豪之公子田洞百里齊萬户之封君祖盎持節總管髙州都督耿國公薨贈左驍衛大將軍荆州大都督恩命分府為三州授君之三子子知璣唐書作智載髙州刺史子智玳唐書作智或恩州刺史猶子子猷潘州刺史公荆州之孫恩州之子量包山海氣逸風雲隂德以濟物力行以遊道散岸從心乘化而沒斯實一方超邁全貞之士也夫人南海郡太夫人麥氏誕嫣勳門作嬪傑室初執冀妻之禮終抗梁冥之行即大將軍宿國猛公鐡杖之曽孫女也夫人有三子一女同歸上京長子元璡左衛中候次子元圭左領軍衛郎將少子力士右監門衛大將軍以將軍少飬於髙氏故舉家從其姓焉夫德厚者福長先否者終泰天之報應其虛也哉大將軍所以雲漢奮飛忠孝之感迎聖善於炎海展三牲之色養拔友于於荒徼㑹四烏之嚶鳴縉紳美談簮紱傾慕是知敬仲羇旅將育于齊孟軻儒藝成名此母信塊才之特逹亦餘慶之助成乎夫人享年八十有七開元十七年五月十二日薨于西京來庭里粵八月二十六日集作二安厝於長樂原之新城集作域憫將軍之純至嘉先士之晦名恩詔追贈潘州刺史招魂而合葬焉蓋殊常之禮若夫慈以遺後孝以揚親忠能合聖惠足昭仁嗟乎馮氏之子具此四美集作德鏤石垂文為不朽矣銘曰潘州違世滅跡沉彩詔贈本邦光爍南海其孤永慕昊天不待夫人處順奄背榮𦙍悲離兩鄉魂合雙襯孝心可贈百身集作年匪吝天日蒼蒼丘壠茫茫地名長樂人樂無長郭門之外愁生白楊岐州刺史平泉志中作原男陸君墓志銘張說開元十三年十一月六日故岐州刺史平原男陸公卒于京師十四年冬十一月葬于鄴西之先塋公諱伯玉字某河南人識真之士也夫譽其克家光乎觀國篤慈惠以宰邑𢎞雅量以執憲擅華妙於禮闈敷文敏於禁掖推直方以獨坐率易簡以專城集作成所居而美風振所蒞而德聲溢非德充於內而美形於外者焉若是夫孝盡愛敬之衷悌包友順之節仁叶返身之恕義適成物之和四者禮之善物歟吾友曽集作嘗從事於斯矣然而舉禮之綱持心之柄靜則樂先生之道動則濟賢人之業位不盈年無登夀之才也命也復焉可而言哉銘曰陸侯泉妙體曠心古龍章炳文麟角藏武槖籥冲用詩書義府移孝則忠安親合主乃建侯社乃牧王畿有嚴有翼有長有威汲直謝病秦和不醫乞言未老啓手全歸石鼓東臨銅臺西望别業宛在舊塋增創弱子攀車孀妻送葬風景飄忽山川惆悵令德可傳浮生匪重神去一息形遺萬種露往草陳霜來樹拱一仁兮一義長蕪沒於丘壟文苑英華卷九百五十
