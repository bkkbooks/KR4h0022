body:
  text: 文苑英華卷六百九十八宋李昉等編貨殖下論度支疏一首水旱諫捕蝗疏一首論關中饑餓疏一首雜疏奏楊素疏一首上東宫請減膳疏一首上百里昌言疏一首諫中宗置公主府官疏一首請勿令胡僧婆陀燃燈疏一首請褒僧劉蕡疏一首貨殖下論度支疏德宗權德輿十一月十二日將仕郎守右補闕臣權德輿謹昧死頓首上疏皇帝陛下臣聞建官惟賢任人以器細大畢效轅輻無遺蓋就其所長以求至當古人所以有優於趙魏而劣於滕薛敗於粟邑而理於頻陽誠才各有所極也伏見司農少卿權判度支裴延齡早以文學纍居官次固而似守刻而少通􅑫有專謹之心且非適時之器往者二大農之卿長司大倉之出納號為稱職蓋有恆規陛下急於奬能切於賞善權委邦賦冀有成績集作冀其有成且度支所務天下至重量入為出從古所難使物無遺利而不可竭竭則害生類使奸無隱情而不可刻刻則傷人和調其盈虛制其損益上繫邦本下繫元元茍非全才通識則有所壅自延齡受任已近半載集作嵗群議紛然皆曰非宜且權其輕重固與守之之才不同邉儲經費之功懋遷移用之法貴無留事以酌乎中簿領簡書周行郡國失於毫釐利病相萬一物未理所軫皇情而延齡切於感恩昧於量力思有以效强所不通則有枉尺直尋之心多方自固之計吏伺其隙人售其奸因緣䝉弊觸類滋長致逺恐泥學製實傷異時甚敗罪之何補伏料聖意久未正授延齡職名似觀其能否以為進退官司閭里衆口一心評議喧譁所不可遏伏望與一二宰臣時有裁議或詔問度支郎官使得以事實條對茍言者謬妄蓋有以辨之或才實未稱恐難久處倘擇能代命以他官以全延齡以便天下上副求理之意下遂陳力之宜則事任交修職業不廢臣忝備員陛下諫諍之官常服師訓緘默自負無以為容阮嗣宗口不言人之短臣心常師之但以束帶立朝則異於是職當獻納豈敢顧身耳有所聞心有所見義在無隱以奉聖明言而獲戾臣之死所不勝愚瞽悃欵之至伏惟陛下裁擇謹奏水旱諫捕蝗疏𤣥宗韓思復臣伏聞近日河南河北蝗蟲為害舊唐書作頃日更益繁熾經歷之處苗稼都損今漸翾飛向西荐舊唐書作遊食至洛使命來往不敢昌言山東數州甚為惶懼且天災流行埋瘞難盡臣望陛下悔過責躬發使宣慰損不急之務召至公之人上下同心君臣一德持此誠實以答休咎前後驅蝗使等伏望總停書云皇天無親惟德是輔人心無常惟惠是懷不可不收攬人心也論關中饑疏文粹作請勤政崇儉疏張廷圭開元初臣聞古有艱難興王殷憂啓聖者皆以事危則志逺舊唐書作鋭情迫則思深故能自下登髙轉禍為福者也伏見景龍之末中宗遇禍先天之際凶黨搆謀社稷有危於倒懸唐書舊作綴旒文粹作懸旒國朝殆唐書作將均於絶紐二本作綖陛下神武超代精誠動天再掃氛沴六合清朗而後上順皇㫖俯念黔黎髙運璿衡光膺寶籙文粹有以字日月所燭之地書軌未通之鄉無不霑濡渥恩被服元唐書作淳化十堯九舜未足稱也明明上帝照臨下土宜錫介祉以答鴻休然屬頃嵗以唐書作已來隂陽愆候九榖失稔萬姓阻饑關輔之間更為尤劇至有樵蘇莫爨糠麧唐書作糧籺靡資不暇唐書作復聊生方憂轉死偶㑹昌運遘兹艱否文粹作險者臣竊思之皇天之意將恐陛下春秋鼎盛神聖在躬不崇朝而建大功自藩邸而陟元后或簡下濟之道獨滿雄圖之志輕虞舜而不法思漢武以自髙是故昭見咎徴載加善誘將欲大君日慎一日雖休勿休永保太文粹作天和以固邦本也斯則皇天之於陛下眷顧深矣陛下焉可不奉若休㫖而寅畏哉臣愚誠願陛下約心削志澄思勵精考羲農之書敦朴素之道登庸端士放黜佞人屏退後宫減徹外廄場無蹴鞠之玩野絶縱禽之賞促文粹作休石田之逺境罷金甲之懸軍文粹作運惠唐書作矜恤惸嫠蠲薄徭賦去竒伎淫巧損和璧隋珠不見可欲使心不亂自然波清四海塵銷九域農夫樂其業餘糧棲於畝則和氣上通於天雖五星連珠兩曜合璧未足多也珍祥下降於地雖鳯凰巢閣麒麟在郊未足竒也或謂天之鑒二本作炯戒不足畏者則將上帝憑怒風雨迷錯荒饉缺甚無以濟下矣或謂人之窮乏不足恤者則將齊氓沮志億兆攜離愁苦怨極無以奉上矣斯蓋安危所繫禍福之源奈何朝廷曾不是察況今陛下受命伊始敷政惟新卿士百寮華夷萬族莫不清耳以聽刮目而視延頸企踵冀有所聞顒顒如也何可怠棄典則坐孤其望哉雜疏奏楊素疏梁毗竊見左僕射楊素幸遇愈重權勢日隆所私皆非忠讜所信咸是親戚子弟布列兼州連縣天下無事自可息圖四海稍虞必為禍始夫奸臣擅命有漸而來王莽資之於積年桓𤣥篡之於易世卒殄漢祀終傾晉祚陛下若以素為阿衡臣恐其心未必如伊尹也謹疏上東宫請減膳疏髙宗咸亨中為太子典膳邢文韋臣竊見禮大戴記曰太子既冠成人免於保傅之嚴則有司過之史徹膳之宰史之義不得不司過宰之義不得不徹膳不徹膳則死今皇帝式稽前典妙簡英俊自庶子已下至咨議英華作司議舍人及學士侍讀等使翼佑一作佐殿下式一作以成聖德近者巳來未甚延納談議不狎謁見尚稀三朝之後但與內人獨居何由發揮聖智使睿哲文明者乎今史雖闕官宰當奉職忝備所司不敢逃死謹守禮經微申減膳謹言一作皆舊唐書本傳上百里昌言疏王勃勃言鄉人奉五月一日誨子弟各陳百里之術宣於政者承命惶灼伏增悲悚勃聞古人有言明君不能畜無用之臣慈父不能愛無用之子何則以其無益於國而纍於家也嗚呼如勃尚何言哉辱親可謂深矣誠宜灰身粉骨以謝君父復何面目以談天下之事哉所以遲回忍恥而已者徒以虛死不如立節茍殞不如成名悔過儻存於已為仁不假於物是以孟明不屑三奔之誚而罷匡秦之心馮異不羞一敗之失而摧輔漢之氣故其志卒行也其功卒就也此言雖小可以喻大此勃所以懷既往而不咎指將來而駿奔割萬恨於生涯進一簣於平地者今大人上延國譴逺宰邉邑出三江而浮五湖越東甌而度南海嗟乎此皆勃之罪也無所逃於天地之間矣然勃嘗聞之大易曰人之所助者信也天之所助者順也是以君子不以否屈而易方故屈而終泰忠臣不以固窮而喪志故窮而必亨今交趾雖逺還珠者嘗用之矣書不云乎弗慮胡獲弗為胡成不勝憤激之至謹上百里昌言一部列為十八篇分為上下卷庶謁私欵少禆公政追思罪戾若投氷谷謹奉言疏不備勃再拜諫中宗置公主府官疏辛替否景龍元年臣聞聖人廣視聽於四方納謳謠於九有者蓋欲以上通下達逺聞邇信元首惟聖股肱惟明若此則國可長久時無災害者也臣聞事君上牧黎庶莫不慎器與名畏怨重禍不激詭以求進不貨賄以要榮公侯伯子男等各以功為先後卿大夫士九品各以德為次等劉毅無賣官之誚仲經無免爵之謠則格於皇天光於后土何風雨不順隂陽不和之有哉臣聞古之建官員不必備九卿已下皆有其位而闕其選賞一人謀乎三事職一人訪乎群司負寵者畏權勢之在躬求一作知榮者避權門而不入故稱賞不僣官不濫士皆完行家有亷節朝廷有餘俸百姓有餘食下忠於上上禮於下委裘而無倉卒之危垂拱而無顛沛之患夫事有揚耳目動心慮作不師古以行於今者蓋有之矣伏惟陛下百倍行賞十倍增官金銀不供其印束帛無充於錫何愧於無用之臣何慙於無力之士至於公府補授罕存推擇遂使富商豪賈盡居纓冕之流鬻伎行巫咸陟膏腴之地一旦羊頭入興狗尾生謠將恐巍巍盛唐取議於後臣聞於古人曰福生有基禍生有胎伏惟公主陛下之愛女選賢良以嫁之設官職以輔之傾府庫以賜之壯第觀以居之廣池籞以嬉之可謂之至重也可謂之至憐也然而用不合於古義行不根於人心將恐變愛成憎轉福為禍何者竭人之力人怨也費人之財人怨也奪人之家人怨也愛數子而取三怨於天下使邉疆之士不盡力朝廷之士不盡忠人之散矣獨特所愛何所恃乎向者魯王賞同諸壻禮等朝臣則亦有今日之福無曩時之禍人徒見其禍不知其禍之所來所以禍之者寵愛過於臣子也去年七月五日已見其徴矣今猶前篇作與今一作而今事無改更理尚因循棄一宅而造一宅忘前禍而忽後禍臣竊謂陛下憎之矣非愛之也何利於公主臣聞君以人為本本固則邦寧邦寧則陛下之夫婦母子長相保也伏惟外謀宰臣為久安久寧一作之計以存之不使奸臣賊子以伺之臣聞微不可不防逺不可不慮當今疆場驚駭倉廩空虛揭干一作竿守禦之士賞不及肝腦塗地之卒輸不充野多食草家不識穀而方大起寺舍廣營第宅伐木空山不足充梁棟運土塞路不足充牆壁誇古耀今踰章越制百僚鉗口四海傷心臣聞釋教者以清淨為基慈悲為主故常一作當體道以濟物不為利欲一作不欲利已以損人故常去已以全真不為榮身以害教三時之月掘山穿地一作池損命也殫府虛帑損人也廣殿長廊榮身也損命則不慈悲損人則不濟物榮身則不清淨豈大聖大神之心乎臣以為非真教非佛意違時行違人欲自像王西下佛教東傳青螺不入於周前白馬方行於漢末一作後風流雨散千帝百王飾彌盛而國彌空寶彌重而禍彌大覆車繼軌曾不改途晉臣以佞佛取譏梁主以捨身搆隙若以造寺必為其治體養人不足以經邦則殷周以往皆暗亂漢魏已降皆聖明殷周已往為不長漢魏已降為不短臣聞夏為天子二十餘代而殷受之殷為天子二十餘代而周受之周為天子二十餘代而秦漢受之自漢已後歷代可知也何者有道之長無道之短豈因其窮金玉修塔廟方建長久一作方得長久之祚乎臣聞於經曰若菩薩心住於法而行布施如人入暗則無所見又曰一切有為法如夢幻泡影如露亦如電臣以為減雕琢之費以賑貧人一作下是有如來之德息穿掘之苦以全昆蟲是有如來之仁罷營搆之直以給邉陲是有湯武之功回不急之祿以購亷清是有唐虞之理緩其所急急其所緩親未來而疏見在失真實而冀虛無徇俗人之所為而輕天子之功業臣竊痛之矣當今出財依勢者盡度為沙彌一作門下同避役姦訛者盡度為沙彌其所未度唯貧窮與善人耳將何以作範乎將何以租賦乎將何以力役乎臣以為出家者捨塵俗離朋黨無私愛今殖貨營生非捨塵俗援親樹知非離朋黨畜妻養孥非無私愛是致人以毀道非廣道以求人伏見今日之宫觀臺榭唯京師之與洛陽不曾一作增修飾猶恐奢麗陛下尚欲填池塹捐苑囿以賑貧人無産業者今之天下之寺蓋無其數一寺當陛下一宫壯麗甚之矣用度過之矣是十分天下之財而佛有其七八陛下何有之矣百姓何食之矣雖以隂陽為炭萬物為銅役不食之人使不衣之士猶尚不給况資於天生地養風動雨潤而後得之乎臣聞國無九年之儲國非其國伏惟一作以計㑹一無㑹字倉廩量一無量字度府庫百寮供給百事用度臣恐卒嵗不充况於九年之積乎一旦風塵再擾霜雹薦臻沙彌不可執干戈寺塔不足攘饑饉臣竊惜一作痛之矣此篇一作皆舊唐書本傳六百二十一卷重出題作諌多造寺觀及王主邸第表而文多節略前巳削去請勿令胡僧婆陀燃燈疏已見六百二十卷題作諌安福門酺樂表嚴挺之且臣卜其晝未卜其夜前篇無此四字斯存前篇作攸傳返朴覆古前篇作還淳復古不獲前篇作矜頗積前篇作巳積之歡前篇作樂貨易前篇作貿易請褒贈劉蕡疏羅衮右臣衮伏以典禮褒榮用廣哲王之道生死抱痛可念直臣之魂伏以陛下再闡皇圖初平內患善無歿而不紀惡無存而不誅事或有遺臣不敢不奏竊見故祕書郎責授栁州司户臣劉蕡當大和年對直言䇿是時宦官方熾朝政已侵人誰敢言蕡獨能指抑墮雨回天之勢欲使當門奪官卿爵土之權將令擁篲遂遭退黜實負寃欺其後竟陷侵誣終罹譴逐沉淪絶世唐書作身異世唐諱六十餘年正士為之吞聲唐書作切齒義夫為之飲泣當時排先見之說後代襲蔽聰之謀寖成其風以至前嵗東內幽辱西州播遷旒綴竿而未危矢及屋而非亂伏賴陛下德勝妖孽義感勳賢克返塵鑾再安寶位向使蕡䇿得用蕡才得施則杜漸防萌尋消逆節豈殷憂多難逺及聖躬以此追惟誠堪軫悼當氛霧蔽虧之日雖纍朝明聖其奈蕡何及天地廓清唐書作及正之辰則𡨕寞幽寃唐書作枉􅷠憤胔必有望於陛下矣特乞宣府中書門下顯加褒贈仍勑天下州府求蕡子孫振拔録用不獨慰耀九泉之骨庶亦感勵四海之心冒瀆宸嚴臣衮無任戰懼隕越之至文苑英華卷六百九十八
