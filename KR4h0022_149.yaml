body:
  text: 文苑英華巻一百四十九宋李昉等編草木七庭菊賦一首百合花賦一首闕浮萍賦二首水藻賦一首艾人賦一首荷珠賦一首牡丹賦一首𤓰賦一首庭菊賦并序楊烱庭菊美貞芳也天子幸於東都皇儲監守於武徳之殿以門下内省為左春坊今庶子裴公所居即黄門侍郎之㕔事也其庭有菊焉中令薛公昔拜瑣闥此焉遊處今兼左庶子止於東㕔甍宇連接洞門相向每罷朝之後未嘗不遊於斯詠於斯覽叢菊於斯歎其君子之徳命學士為之賦是日也薛愷一作凱以親賢為洗馬田巖以幽貞為學士髙元思張師徳以至孝託後車顔强學沈尊行以博聞兼侍讀周琮李憲王祖英曹叔父以儒術進崔融徐彦伯劉知柔石抱忠以文章顯徳行則許子豐耆舊則權無二駱縯則古訓之前識張相則老莊之後英並承髙命咸窮體物小子託於吹竽之末敢闕其詞哉遂作賦云日之貞矣于彼重陽菊之榮矣于彼華坊含天地之精氣吹集作吸是日月之淳光雲布霧合箕舒翼張欝兮曼衍郁兮芬芳珉枝金蕚翠葉紅芒其在夕也言庭燎之晳晳其向晨也謂明星之煌煌爾其萬里年華九州春色花灼爍兮如錦草蟬連兮似織當此時也和其光同其塵應春光而早殖及夫秋星下照金氣上騰風蕭蕭兮瑟瑟霜刺刺兮稜稜當此時也弱其志强其骨獨嵗寒而晩登雨還風去天長地久純黄象於后土故採桑而菊衣輕體御於神仙故登山而菊酒文賔採之而羽化康公服之而不朽東極於是長在南陽以之眉夀胡太尉之允誠光輔漢庭萬機理三階平及暮年華髪垂肩一作白又作耳秋菊長一作落英蠲邪滌瘵於焉永貞鍾太尉之聲實彛倫魏室道合鹽梅功成輔弼降文皇之命修彭祖之術保性和神此焉終吉君章請老嵗久懸車秋風生兮北園夕白露濕兮前堦虚佇一作歩閒庭之曠邈對凉菊之扶疎人生行樂孰知其餘泉一作淵明觧印退歸田野山鬱律兮萬里天蒼莽一作浪兮四下慿南軒以長嘯出東籬而盈把歸去來兮夫何為者若夫窈窕重闈亘青瑣兮接皇扉深沉大壯通肅成兮連博望乃有􅘌歩回切河東聞喜縣有􅘌鄉鄉貴族薛縣名家共汾河之鼎氣同庻子之春華朝遊夕處徘徊顧慕難摇落於三秋偉貞芳於十歩伊纎莖之菲薄荷君子之恩遇不羡池水之芙蓉願比瑶山之桂樹嵗如何其嵗已秋叢菊芳兮庭之幽君子至止悵容與而淹留嵗如何其嵗將逝叢菊芳兮庭之際君子至止聊從容以卒嵗庭有菊集作庭有叢菊珉枝集作玳枝康公集作嵇康長在集作長存及暮年華髪垂肩秋菊長英十一字集作暮年之華髪味秋氣之落英嵗久集作嵗及歸去來兮此下有夫字若此集作若夫百合花賦王勔闕似風竿而掲起荷春光之餘煦託陽山之峻趾比蓂莢之能連引芝芳而自擬固其布葉相從潜根必重示不孤於日用欣有叶於時雍嗤五葉之非偶陋三花之未濃亦藐兮不可長辰兮不可逢恐鶗鴂吟兮衆芳晩幸左右之先容浮萍賦常衮居洪泉而不根植者惟浮萍而已矣不懐芳以賈害不衒一作愆非色以標美動不忤物卑以安已乗流則遊得坻則止如識變而知時似委命而順理故能無幽不涉無逺不尋隨長汀而自汎值驚浪而不沉既不遷其清濁亦何避乎淺深可以明逍遥之意可以警滯著之心然而推移河海凌歴隈澳溜緩則去遲水急則浮速秋遇楓浦與墜葉而齊奔春渡桃源共落花而相逐披拂丹草摇演青蘋出入經其潭洞髙下歸其奫淪擇利而行有似見幾之士不常厥所同乎漂梗之人歌曰大江之水東西流别有孤萍朝夕浮莫言此中長汎汎終當結實觸王舟第二趙昂汎汎者萍乗流匪寧殊源比影異沼均形初苒弱兮碕岸乍連延兮廣汀映池則草色同翠照日兮苔光共青霞凝兮片片成玉月上兮處處疑星入門自媚穠李徒矜其妖豔取足為樂行潦豈小於滄溟觀其枯華有時一作自動静無必習坎斯止遇亨則逸安卑取順契君子之用心揚波隨流豈漁翁之能詰每託隣於藻荇不混跡於蓬蓽與菡萏而相鮮向莓苔而如失實幽賞之可嘉何寓遊之足匹夫物之云云糾纒誰分茨處墻兮或不才而見棄蘭生幽也終以香而自焚惟兹萍矣獨善其美謙能居下知則樂水鑒擥芳於楚客寧見羞於彛簋象虚舟而不繫或倐往而忽來類至人之無心更出生而入死噫疑歟植匪深根長無固蔕將舍之而不芟翦豈見用而能種藝鄙朝菌之蹔榮笑匏𤓰之長繫空慙雨露之恩竊愧陶鈞之惠願同蒹葭比玉而見珍託陋質於池塘之際水藻賦郭元超遊子行邁登晉山之孤嶽翠谿皛以淪漣紅嶂赫兮崩駁爾其雲崖委溜風壑鳴泉苔彬彪以冒石藻漫莽兮山疑川于以采藻于彼行潦沼沚之毛汙潭之藻一作草靃靃靡靡汎汎悠悠乍夤緣於春水或羃䍥於春洲觀其往往縈散離離無畔㛹娟島嶼暐曄江漢碎流月於澄波隠孤雲於斷岸生不擇所長亦無叢不資潤於㣲露不懼威於勁風纎莖璀璀密葉茸茸宿銀塘之白鷺矯清一作碧水之文虹則知乗流則遊遇坻則植柔而能全弱而能直其為隠也不居髙而處卑其為謙也常韜光而晦色嗟茂族之無託願貞芳之見移生君之銅沼汎君之瑶池雜青蓮與翠荇隅一作偶杜若與江蘺生一作全於水人不知嵗嵗年年幽澗垂艾人賦以懸艾為人以禳毒氣為韻陳章採彼艾兮及此佳辰標一作振至靈以衛物因善救以成人當戸而居惡莠言兮結舌負墻而立甘菜色以安身異發能以求舊方正惡以知新原夫生亦有涯寂然没齒盈腰雖賤於楚客奮臂若威乎厲鬼茍三年之疾雖云來者可追而五日為期豈復怨乎不以蓬頭亦取其容直蒿目似存乎深視行止於百姓之病雖云具體而㣲育材於萬物之靈必見一作㣲盡瘁以俟直躬不墜邪氣可禳毎表先生師曠占病草先生者艾也之後善為君子之防類宗則荆楚嵗時記宗則五月五日採艾灸有驗之初來一朝而獲順夏正之聚蓄久要不忘終躡虚而挂户爰摭實以升堂想在野之時豈謂生無根柢及得門之後如其自有肝一作肺腸列名號於氷䑓載典常於玉燭免繩持而遏惡因草創而成俗以枝葉為膚革之胞藉麻絲為筋骨之屬待時而用益彰惟爾之能不怒而威詎可比予于毒起自蒿萊之下處乎軒屏之前奉百藥而首出展四肢而脉連異萱草之忘憂孰云言樹等匏𤓰之不食焉肯徒懸藹爾端容森然屏氣逾芻狗而善御並木奴而為貴雖雷奔電激寧聞乎危者使傾而暑往寒來亦見乎移疑作後生可畏故得擥蘭莫比懸葦未竒委質而桐君是錄焚軀而介子相隨宜爾室家略備詩人之採不祈土地雅同儒者之為及夫氣散於中貌萎於外弔時匪謂其徼福焦思亦齊乎逺害斯人也而有斯疾見靈溝之靈艾荷珠賦以泣珠絲鮮瑩為韻白居易迸水所集輕荷正敷引修莖而出葉凝玉液以成珠净緑田田神龜之巢處斯在虚明皎皎靈鵲之銜來豈殊既羅列其青葢又昭章於白榆亂㸃的皪分規青瑩仰虚無以上出掩晶熒而外映洒之不著湛兮逾净時寄寓於傾欹每因依於平正可止則止必荷之中央在圓而圓得水之本性颷風既息而常凝魚鳥頻衝而不定爾乃一氣暗後初陽照前宿雨霽而猶在曉露裛而正鮮熠熠有光映空水而煥若纍纍無數遍池塘而烱然宛轉而魚目廻視冲融而蚌胎未堅因霑濡而小大隨散合以虧全輕彩蕩淵疑芳濃厭浥明璣而夜月争光丹粟而晨霞散入其息也與波俱停其動也與風皆急若轉於掌乃是江妃之珠如凝於盤遂成泉落疑作客之泣氷壺捧之而殊倫水鏡沉精而莫及則知氣有相假物有相資唯雨露之留處當芙蓉之茂時雖賦象而無凖必成形而在兹未見絲字官韻喻於人則寄之生也擬於道則冲而用之自契𤣥珠之妙何求赤水之遺牡丹賦并序舒元輿古人言花者牡丹未嘗與焉葢遁於一作乎深山自幽而芳不一作以為貴者一無此字所知花則不可過為四字一作何遇焉天后之鄉西河也有衆香一無此三字精舍下有牡丹其花特異天后歎上苑之有闕因命移植焉由此京國牡丹日月寖盛今則自禁闥洎官署外延士庶之家瀰漫如四瀆之流不知其止息之地每暮春之月邀一作遨遊之士如狂焉一無此三字亦上國繁華之一事也近代文士為歌詩以詠其形容未有能賦之者余獨賦之以極其美或曰子常以丈夫功業自許一作持今則肆情於一花無乃猶有兒女之心乎余應之曰吾子獨不見張荆州之為人乎斯人信丈夫也然吾觀其文集之首有荔枝賦焉荔枝信美矣然亦不出一果耳與牡丹何異哉但問其所賦之旨何如吾賦牡丹何傷或者不能對而退余遂賦以示之圓玄瑞精有星而景有雲而卿其光下垂遇物流形草木得之發為紅英英之甚紅鍾乎牡丹㧞類邁倫國香欺蘭我研物情次第而觀暮春氣極緑苞如珠清露宵偃韶光曉驅動盪支節如觧凝結百脉融暢氣不可遏兀然盛怒如將憤洩淑日一作色披開照曜酷烈美膚膩體萬狀皆絶赤者如日白者如月淡者如赭一作嚇殷者如血向者如迎背者如訣坼者如語合一作含者如咽俯者如愁仰者如恱褭者如舞側者如跌亞者如醉曲者如折宻者如織踈者如缺鮮者如濯慘者如别初朧朧而上下一作下上次鮮鮮一作鱗鱗而重疊錦衾相覆綉帳連接晴籠晝薰宿霧一作露宵裛或的的騰秀或亭亭露竒或颭然如招或儼然如思或帶風如吟或泫露如悲或重然如縋或爛然如披或迎日擁階一作砌或照影臨池或山雞已馴或威鳯將飛其態萬萬胡可立辨不窺天府孰得而見乍疑孫武來此教戰其戰謂何摇摇纎柯玉欄滿風流霞或一作成波歴階重䑓萬朶千窠西子南威洛浦一作神湘娥或倚或扶朱顔已一作色酡角一作各衒紅釭争顰翠蛾灼灼妖妖一作夭夭逶逶迤迤漢宫三千艷列星河我見其少孰云其多弄彩呈妍壓景駢肩席奪一作發銀燭爐昇絳煙洞府真人㑹於羣仙晶熒往來金缸列錢班固西京賦金缸銜璧是為列錢凝睇相看曽不語言未及行雨先驚早一作旱蓮公室侯家列之如麻咳唾萬金買此繁華遑恤終日以言相誇列幄庭中歩障開霞曲廡重梁松篁相加如貯深閨似隔窓紗髣髴息媯依稀館娃我來觀之如乗仙槎脉脉不語遲遲日斜九衢遊人駿馬香車有酒如澠萬坐笙歌一醉是競孰知其他我案花品此花第一脱落羣類獨當一作占春日其大盈尺其香滿室葉如翠羽擁抱􅌨比蕋如金屑粧飾淑質玫瑰羞死芍藥自失夭桃斂跡穠李慚出躑躅宵潰木蘭潛逸朱槿灰心紫㣲屈膝皆讓其先敢懐憤嫉煥乎美乎后土之産物也使其花之如此而偉乎何前代寂寞而不聞今則喧一作昌然而大來曷草木之命亦有時而塞亦有時而開吾欲問汝曷為而生哉汝且不言徒留翫以徘徊𤓰賦康子玉巫山之岡秦川之陽垂條引蔓布緑敷黄彌臯被野含芬吐芳轉晨風之穆穆湛宵露之瀼瀼花葉則煜煜煒煒文彩則焜焜煌煌錦繡為之失色霞日為之奪光逺而望之燦兮爛繁星列兮曜長漢光色連延遥相煖廹而察之瓞兮綿明璣盈蚌媚重泉大鱗巨介近相連細雨流風每飄颻兮葉上遊蜂戱蝶時歴亂於花前爾其大明疑作則三尺二升廣志青燈𤓰大如三斗魁桂枝𤓰長二尺餘疑當作二尺三斗美則金漿玉實狸頭羊骹之字黄㼐白摶之質見陸機賦感仙貴於孫鍾避世資於歩隲異蔕表於前代同心章乎曩日既而横綺席會嘉賔琴罇逸賞海陸具陳香分四座氣雜八珍既取類於母子亦取辨於君臣欽哉彼美流玩不已何以剖之金錯刀何以澆之玉英水邵平固植以著業阮籍託詞而興已非但留怨於戍夫抑亦取誡於君子文苑英華巻一百四十九
