body:
  text: 文苑英華卷三百九十八宋李昉等編卿寺三太常少卿授韋恆太常少卿制孫逖門下朝議大夫守給事中鄭縣開國男韋恆神清氣爽識逺心微周才可以求備雅望期於必復自登近密已積歲年淑慎有恆間和易退奉常之亞稱職為難宜回夕拜之榮俾在春官之屬可守太常少卿散官授李林宗太常少卿制門下朝議大夫守衛尉少卿上柱國李林宗寡言敏行清節令名能執謙沖之心以成友悌之美自亞九卿一作列已淹四歲舉必以類既承拜命之榮恩則由中俾佐奉常之職可守太常少卿授陳中師太常少卿制白居易勑尚書吏部郎中兼侍御史陳中師早以體要集作物之文待問之學中鄉里選第甲乙科集有及字筮仕立身皆有本末不背俗以矯迹不趨時以沽名從容中道自致聞望纍踐郎署再參憲司官無卑崇事有集作無簡劇如玉在佩動必有聲為時所稱何用不可朕以立國之本禮樂為先號令之常集作今之太常兼掌其事二兹職者不亦重乎歷代迄今謂之清選往服是命行覩集作行觀一作仲觀有成豫方急才爾寧久次可太常少卿餘如故授棣王府司馬崔就太常少卿賜紫制錢珝勑暢中發外以應天地之和在夫樂而六樂雅司于奉常弦工磬師存者尚習具官崔就負足用之學表之以能文思有畔之農施之於善政失爵之纍無機則然乃非敗名人亦觀過一眚之黜數歲方還言念常情得無所鬱遂以奉常之亞命服之朝欲爾聽六樂之和以平其氣兹為君道當識豫心馭貴之崇亦惟其舊可依前件宗正少卿授李瀚宗正少卿制常衮勑銀青光祿大夫前亳州刺史本州團練守捉使上邽縣開國男李瀚識精於理才辨於政祗服禮訓甄詳事經振麟趾之芳更隼旟之命馴致其道達於家邦慈惠之化洽於黎老以親九族乃立二卿宜一作而敘周文之昭用毗劉德之任可行宗正少卿散官封如故光祿少卿授宋玄爽司膳少卿制李嶠勑朝請大夫守司僕少卿宋玄爽藝能詳洽局量優深踐行不虧歷官著稱參守僕正以表公勤可兼檢校司膳少卿餘如故授張沛司膳少卿制鸞臺新除齊州刺史張沛禮義髙族忠賢令緒才優識通學敏詞贍實藴幹時之具雅懷在公之節絃歌出撫亟動於謳謡符傳所經必聞於課最允稱衣冠之胄一作望是謂廊廟之珍三署為卿九流莫尚宜回負海之駕俾登象河之列可一有同字司膳少卿主者施行授李椿光祿少卿制賈至門下堂姪守太子家令開國男椿恭儉溫良宗枝擢一作特秀敏於從政勤以在公宜換儲闈之職俾居亞卿之任可守光祿少卿同正封賜如故授張光奇光祿少卿制勑始安充經略使張光竒忠肅周敏懷其利用歷試中外纍有能名嶺嶠地遐方隅寄重威懷之政惟爾悉舉一作允惟克舉宜參榮於卿士俾兼鎮於藩條可兼光祿少卿如故授向萼光祿少卿制勑百里之長九卿之亞參於軍事職比廷評必舉才能以匡庶政荆南奏事官守太子僕同正向萼等咸膺推擢俾在兹任可守光祿少卿同正授周若氷光祿少卿制常衮勑試王府司馬兼福州都督府别駕守一作占闕攝寧海軍副使賜紫金魚袋周若氷氣識沉和風儀端偉秉心以正蒞事惟明法以言揚久參朝序頗有聞望洽於縉紳自佐法方州兼領戎事政術尤著勳勞亦深俾踐亞卿之列仍兼題輿一作座之任可試光祿少卿兼福州都督府别駕占闕餘如故授前峽州刺史李授總目作綬光祿少卿制劉崇望勑近出天屬富有吏能進士已來恪勵無替覽宗正列狀念夷陵當官公舉何多奬用宜及仍聞罷退曠有歲時誠曰任能亦既振滯光祿古官也而比朝于今兼掌尤重是命爾司少其事勉幹吉蠲之職無忽禋祀之官可依前件授前將作少監趙蠻等光祿少卿制薛廷圭勑具官趙蠻等或公卿棣萼或台輔子孫或登史傳之科或著弦歌之政並從間罷亟涉光隂振滯掄材各當遷陟亞于卿寺頒我詔條洎率屬於膠庠一時之茂選也惟勉思砥礪以應柬求大開霄漢之程允屬軒裳之後苟能自奮可往承之可衛尉少卿授鄭孝式衛尉少卿制蘇頲黃門朝議大夫守太子率更令鄭孝式早負才幹素聯姻戚詢事可以樹風聽言可以從政韜戈之任衛戟是司俾移名於白簡宜亞寵於丹棘可守衛尉少卿散官如故授李岫衛尉少卿制孫逖門下朝議大夫行祕書丞上柱國清水縣開國伯李岫説禮敦詩資忠履孝勵清修而立節包麗則以為文曩者輟務仙臺移官祕府一從間退七變星霜父在樞衡固守范宣之讓謙沖自牧足鎮於浮躁而進用無黨須歸於至公宜承特命之恩俾踐亞卿之職一作秩可守衛尉少卿散官勳如故太僕少卿授鄭子獻太僕少卿制勑朝議郎前行一作守宗正卿賜紫金魚袋鄭子獻業繼簮裳地連姻戚早升班序纍效忠勤公族之司頃居亞列太僕之任宜復舊資可守太僕少卿員外置同正員散官勳如故授嗣虢王溥等太僕少卿制元稹勑正議大夫行宗正丞嗣虢王溥守隨州司馬員外置同正員李逢等昔我憲宗章武皇帝法堯睦族深惟本枝乃詔執事曰伯父叔季幼子童孫在屬籍者必命卿長以才行聞而溥等國族之良雅副兹選糾訓羣僕允釐王官各率乃誠無替厥職溥可權知太僕少卿逢可守袁王府長史餘如故司刑少卿授杜景佺司刑少卿制李嶠鸞臺銀青光祿大夫守秋官尚書上柱國杜景佺薄有吏能頗間時務比加奬擢今典樞衡乃輕違憲章私樹恩福罔懷緘慎屢有泄言朕情在含𢎞不忍置之嚴憲五曹顯秩非可濫居九列通班冀當自效可司刑少卿勳如故主者施行授徐有功司刑少卿鸞臺中散大夫行文昌左司郎中東苑縣開國男徐有功器局𢎞深文藝優膽秉節守義直道正辭繩準憲曹樞機會府咸歸平恕雅有聲績獄吏輕重人咨胥怨天工推擇朕之所難選衆而居庶乎不濫可守司刑少卿散官勳如故主者施行大理少卿授陸景初大理少卿制蘇頲門下朝議大夫守中書舍人上柱國陸景初識悟清真虛心得妙言符正直獨行鄰幾故能儒玄默知文史明達翔集仙署翻飛禁省而咎繇為理釋之不寃精求上才欽恤中典宜慎刑法俾聞哀矜可大理少卿散官勳如故主者施行授崔器大理少卿制賈至勑國備其官則庶務理官得其人則善政舉廷尉所以執刑柄御史所以糾不法掖垣崇諫諍之職郎署當草奏之煩皆朕注心柬求一作慎擇髦士守保定太守崔器諒直忠肅才行周敏登于清列庶績其凝可守大理少卿授韋損大理少卿制常衮勑銀青光祿大夫前潤州刺史上柱國馮翊縣開國男韋損識清行理強學自輔服於禮而中節居其業以全忠一作誠識一作才能有餘階歷頗久京江按部終始六年勤職惠人風化一變循吏之稱去而益彰天下之平屬於廷尉乃立其二方求直清俾之弼教敬爾繇獄可行大理少卿散官勳封如故授景延之大理少卿制勑朝議大夫前守河南少尹騎都尉景延之業擅文儒行資忠信推令望於公器著能名於吏途久踐周行夙彰聲實祥刑之地稱職其難任在柬孚選兼勳舊宜參河海之亞俾副朝廷之舉可守大理少卿散官勳如故授孫乘大理少卿李震宗正少卿等制薛廷圭勑具官孫乘等廷尉卿生人之司命也大宗正我族之本根也二卿之任昔難其材與夫丞殿省而立朝著聽其一作於公舉我有人焉以乘等或掌奏大藩或字人劇邑書檄有聞於記室絃歌多暇於琴堂而昌亦號通材丞於六尚言從罷秩久於艱難各使立朝仍觀舉職恤刑庇本勉稱我心可鴻臚少卿授李崇鴻臚少卿制薛廷圭勑李崇等各以材行來服簮裳或字人箸績於封畿或嗜學見推於流輩大卿寺王官儲宫學省一時茂選爾往蒞之飭勵有聞陟勸斯在可司農少卿授韋玢司農少卿制蘇頲黃門正議大夫行太常少卿上柱國薛縣開國男韋玢勵精正已力行徇公從務表其清白幹時允其文采故以臺閣褒稱縉紳甄奬盛禮興樂望雖重於執圭八政一農事尤殷於理粟况洛京轉漕淮海通波宜任牟融之能遷改鄭莊之弊可兼司農少卿散官勳封如舊仍分司東都主者施行授楊先司農少卿制孫逖門下朝議大夫守太僕少卿上柱國朱陽縣開國男楊先精勤從事堅白在公任以器能位於河海出納之吝朝廷所難宜回職金之府更膺搜粟之寄可守司農少卿仍東都留守授裴藏之司農少卿制賈至勑蜀都司馬裴藏之等果行育德忠肅溫良或持憲握蘭譽流臺省或分憂共理政洽藩條咸在清貫備聞茂績寇難初息庶尹擇才宜任能於雋選俾分職於中外可守司農少卿太府少卿授蕭晉太府少卿制門下宫相之位亞卿之職朝廷所精擇必惟其人守西河太守蕭晉陽城太守嚴向等歷踐中外皆聞政理涉於艱難尤著誠節宜司長府之劇式備儲闈之選晉可守太府少卿向可太子左庶子授侯希超太府少卿制常衮勑正議大夫試太常卿兼左領軍衛將軍上柱國賜紫金魚袋侯希超溫良植性藝業修身有臨事之幹能彰適時之才用班資久踐職務非親內舉自於元戎正名從於亞列宜成風俗之美俾展多方之效可行太府少卿散官勳賜如故文苑英華卷三百九十八
