body:
  text: 文苑英華巻五百二十八宋李昉等編堤堰溝渠陂防門二十三道稍溝判二道菜地判一道清白二渠判六道開渠判一道毁濯龍泉判六道陂防判五道河卒判一道請塞㪷門判一道稍溝判甲通稍溝三十里主者按興役不申甲云水潄之不合申對鄭昭先王之制廬井有伍爰自澮畎逹以溝洫拯下人之墊溺變彼汾之沮洳故河渠式修煥馬遷之典衡漳既導羙夏禹之績今甲之所施用酌前訓不資穿鑿坐㸔通引顧源流之所觸望平疇之有藝况承茲水潄罔殫衆庸同史起之利人類王尊之濟物遂使苞蕭發詠無浸彼之虞汾澮興言多流惡之美既稱禆益聞此損費自可旌其殊效勸彼異能豈宜按以不申加之底戾但刑期不僣令著明文役且不滿千夫法難從於五罪既不合上請即宜原宥同前湯履氷甲義恤菑畬志殷溝洫懼襄陵之荐及稍孽攸通稽濬川之前聞源流遂逺當以崇朝其雨高岸為谷無勞役之事濟稼穡之艱里則斯遥功則其倍涇泥是沃俄分數斗之謡韓工已成良開萬代之利嵗自便稔邦由是臧異東西之見分寧嗟别思殊劉項之有割是悅昌期潄而不徭足以嘉尚决而非役奚用申為粉署將繩恐渉察泉之義白圭思復冝從因水之詞菜地判甲為匠人於菜地制溝遂廣深二尺為度所由劾功少訴不違理對十地分宜順其髙下九夫為井列以溝洫式備水泉之害將損壅塞之虞利以生人成其務本永言經典實著廣深自畎澮而陳規及園鄽而不紊守之勿失敏則有功惟彼匠人誠為盡力審斷徑術善相邱陵設夫間之小溝明遂上之有徑水勢地勢因而用焉善溝善防斯焉在矣二尺為度殊其不法三農取託乃亦有秋方黍稷之離離見流波之活活决其行潦逹彼巨川庀度功程規模曲節即和夷之既藝豈陵谷之將遷樊遲學於孔丘自得老農之術哀公問於有若寧有不足之憂縱彼公田何妨稼穡况茲菜地已輟耕耘將為功少取科實為淫刑以逞十門呉堰撫昔事而無慙三章漢條因茲躅而當逭清白二渠判得清白二渠交口不著斗門堰府司科髙陵令罪云是二月一日以前對清白二渠其來自逺善利萬物聞諸古昔故䟽溝若雨荷鍤如雲利彼秦坰興功鄭白雖墾鑿南畆人歌日出之功而翹望西成不假月離之潤所以毎加修葺式建隄防各有司存標諸令式髙陵令以遷鸎入仕翔鸞布徳宣風百里早副天心管轄二渠正當交口欲加門堰諒有前規即此經營非無徃例但以金堤柳色未變新枝玉琯葭灰尚飄春雪節未逾於二月事不越於三章府局論辜竊以未可欲加罪也其如詞乎同前溝洫之宜隄防是急惟禹盡力乃安生人自鄭渠來興秦壤増利清白相映雲天並開稻粱交隂雨汗俱發東風適降南畆初勤曉波猶㣲春修未遽縣令以恤人從術計役乗閒雖蟄户驚飛方期伐木而斗門議立且恐勞人未為瓠子之决欲後桃花之水府司按職體要俱懐聽風俗於初聞謂絃歌於未理誠以溉灌無闕經營有圖豈乖蒲宰之明當寛栁惠之黜情存審慎可適隨時同前三輔名區千里奥壤决渠為雨荷鍤成雲衣食之源見資於畎畆桑麻之地實頼於溝渠故隠於金椎沉之石揵見漢書作挿非用防飄梗爰備墊流縣令職在字人化兼馴翟用遵常式或未成規良以秋潦未収且疑於瓠子春流詎泛未慮於桃花修葺既非後時府科何其速耳請從按記愚謂合宜同前劉仲宜殷俗富人實惟稼穡分疆列土必假溝渠白公入秦卒興涇水之利史起居魏大引河流之溢信衣食之是資知珠玉之非貴理宜順時役築作制隄防惟彼髙陵地稱三輔瞻言沃壤良由二渠完謹苟虧畜洩乖用必貽罪戾何以逃刑且如雨畢除道既候於天時水涸成渠再編於月令斗門不設交渠未修功雖闕於千金時靡過於二月遽即科殿恐爽㢘平請從矜釋謂合通典同前薛霽導水東流百川歸海甘泉北對二渠交錯灌注不息黔黎資上善之功奔瀉無窮生靈得下潤之廣鄭國創業白公繼焉秦兼十倍之資韓得數年之力决渠降雨不待商羊之歌荷鍤成雲寧假飛龍之氣理合克奉時令謹塞隄防水潦盛昌懼有奔突桃花泛溢増修及二月之前瓠子無疑作興謡流潤安四人之業縣宰絃歌緝化鸞雉添祥雷震一時風行百里遵乎令典誠未失時見彼章程不罹其咎有詞難罰無濫斯人同前劉晉作利生人實資水徳至於泛溢或以災成故立彼隄存夫令式雖墨綬為化不願於勞人而黄潦或湧益深於害物况作事謀始合用於農隙啟塞隨時豈待於春仲論事乃拙於為政語對何聞於有司堰既不立於千金刑亦安疑於兩壁郡侯所詰然案科條開渠判岐州刺史馬囬奏開渠與人相假貸嵗課不時入執事以為勞無成將議裁貶對蒲宻之化鄭白之饒溝洫可以立人秦漢斯焉定霸豳風載陳於王業瓠口深著於甿謡故典農中郎明濟河於興廢搜粟都尉定邦國於錙銖眷彼循良義存俯企馬囬中和踐化右翊班條以為鄴下墱都俊切流功成於冩鹵南陽疏畆冨埓於京坻雖開鑿方勤而清閒毎就假多慙於邵父終有協於倪公儻秋蟀春鶊人樂疲於力役杏花菖葉農靡闕於耕桑輸稅若或先時菽粟何妨殷積祥刑議獄詎曰攸宜毁濯龍泉判輿人毁濯龍泉或失其利楊氏因形勝興廢業邑人訴勞役不伏事對因興立功就敗成罰天之所壊人莫能支泉既稱於濯龍歌未聞於黄鵠是為廢墜匪克修平則當程以土功議其逺邇同夫鄴令舄鹵更生其稲粱嫓彼秦人荷鍤能降其雲雨若乃虞藪澤之利述形勝之由非曰子來驚一作似乎慮始無有猶可一作傳勿對其庸同前李翥秦起曲江之沼漢興濯龍之泉或因山壅流或平地出水皆導逹溝瀆修利隄防竭役費財窮侈極麗今國家罷苑囿燕㳺之所為農桑禾黍之塲浸彼稲粱實我箱庾事失業廢其何可知楊氏用因其資大興其利非直務盡地利葢亦誘人歸本我疆我理既叶農夫之慶載勞載役徒使邑人有言同前裴春卿水徳利物在乎泉源農功以時資於灌沃必欲壅畜無泄將以源防有用輿人何者輙起訟於漚菅楊氏不争更有興於負鍤詎謝王尊之堰重開方進之陂既以樂成何徴役本同前蘓令問濯龍之奥泉源交屬楊氏因形以利物輿人捨舊以謀新且河渠列於八方溝洫陳於十志類百工之居肆同五行之廢一提封既設潤下是資宜命水工鳩諸藪澤以文無害雖訟何傷邑中之黔實興我役汝南之鵠亦著人謡物之常情難與適變同源異口史起尊其前刋石表界信臣旌於後苟利於物何恤於言既無稽於簡孚終有慙於割斷待資閱實方定刑名同前房宻澤國之政川衡是恤止以瀦防均之溝遂畜彼雨施錯興水物將廢業之不修豈分地之為利雖輿人之訟中則可毁而兩鵠之謡據聞當復候天時而潤澤成我濯龍灌秋水於涘涯誰其辨馬與人為利其利則深仍舊為功其功益一作葢寡勞雖是憚訟則有孚何者伍其田疇初結怨於東里遵彼溉灌終見美於西門乃謀始而獲尤方樂成而久次此而為罪夫何勸能同前屈突湒道逹溝瀆濬利川源允符禮經克茂邦政啟塞苟失艱荒荐臻惟彼濯龍稱善利物不貴離畢之澤惟俟决渠之降奚其毁敗詎潤溝塍遂使彼黍離離竟無成於東作我稷翼翼豈有収於南畆而上膺帝澤下虧甿業伊輿人之是除同漢相之斯廢楊氏以量彼地勢度兹土宜興繼絶業如何不可既月長而日引亦暫勞而永逸邑人之訴稍乖常典此而不罰誰謂其宜陂防判甲秉權决去陂水人相傳云有两鵠言陂當復甲以惑衆云飯我豆食羮芋魁科不伏罪對秉國之權非賢奚可因人所利君子不奪甲為政者異於是乎以為畜水不流竭之何害豈知舊防是要罷之或損且川浸藪澤殖物於是乎生蒲魚稻粱為利於是乎慱齊人理國職此之由潰塘涸源過孰斯甚葢藏或寡純固則盈割鱻厭粱空思於舊貫飯豆一作菽煮芋奚取於託一作訛言愚謂載以既陂政可遵於夏訓廢而興謗事無取於漢臣此則有過能改彼當内訟自直無徃不復傳者何傷聊以抒憂未為惑衆甲自不典人無匪彞輙欲笞之末由也已同前樊晦開物議制興化優人務先適時權貴合道甲為正典欲遵救弊决其澤障成我井疆冀茨梁有作藨蓘無嫌何己日未孚率籲斯戚然在釐變俗必觀習土與其芋羮豆食黄鵠興謡曷若池陽谷口白渠作頌自邑告命當反古以順今代天救人奚愎衆而從已謂莫益或擊湏移轍知方成既無終徃何難復雖聞言不信將降戾乎齊甿而有怨是叢請懲忿於鞭朴同前任璆紐金曵組賢不兼利决水窒陂權曷由已伊甲開甿洗務無聞史起之功鳩藪牧臯習為翟進之理俾初汪萬頃隱長天而不見載翔千仞下髙風而有言評其放紛固將必復而草木震色猶失其潤况舄鹵偏溉孰不思肥寄黄鵠而遺音實蹲鴟而猶美且受羮含菽利不天來委畆宿糧事資陂漲今奪衆水不及私恩是曰殘人何以富俗更収威也能無辭乎與其秉權以求利曷若乗禄以自馭請遏其清畆之流罔愆我宜鱗之所同前裴鼎天生五材水善利物且溉且糞長我黍禾為隄為防制為畜泄甲秉國鈞軸作人父母可以興利除害仍舊貫以從時豈宜違俗變常歸疑作師乃心而改作使或者相駭訛言不懲託黄鵠以興詞冀洪波之必復鳥鳴亳社抑有前聞石言魏榆斯無可採昔田疇是闢歌鄭卿之遺愛今羮芋興謡嗟漢臣之不軌緬想翟公之䇿安可效諸竊詳寗越之鞭非其罪也同前于季重政在利農人惟守業順其事者莫不胥悦變其舊者曽是興謡惟甲國均是秉具瞻斯重永言溝浚而新見謀水旱不愆資燮理而成化人天可望冀敦勸而有秋然則南陽之陂自滮池而為洼澤鄴旁之水因舄鹵而作膏腴是汎是流俯雲雨之攸潤我疆我理棲豆芋之餘糧方進不忘於前蹤白公且同於斯類此則有益於國專利而行未可式禮苟愆更從人欲陂兮當復聴乃輿言惑衆論笞責則何甚黄鵠既聞於師古焉敢定刑丹筆亦宥於無稽終宜伏念寘之理也誰曰是乎河卒判甲充河卒官給平價又被差外徭訴有兼丁不合倍賦對鄭昭徒駭既導誠禹貢之宏規宣防式歌亦漢國之盛業莫不功勤釃决績著䟽開既輸閩越之賝行漕海陵之粟河渠既設控引是資青翰晨移背呉江而電騖艅艎夕至仰天府以雲趍眷彼泛舟良資鼓栧瞻言河卒實繫水官平價允叶於酬庸輕役雅符於悅使報者倦矣在彞典而無乖施者未厭論外徭而有訴羔羊起詠節儉寧聞碩鼠興謡貪婪何甚論古既聞此役設法不合輙蠲無端之詞請從告記請塞㪷門判得轉運使以汴河水淺運舩不通請築塞两岸斗門節度使以當軍營田悉在河次若斗門築塞無以供軍對白居易川以利渉竭則壅稅水能潤下塞亦傷農將舎短以從長宜去彼而取此汴河决能降水集作雨流可導集作通財引漕運之千艘實資積水生稲粱於一溉亦藉餘波利既相妨用難兼濟節度使以軍儲足務斯開竇而有年轉運司以邦賦貴通恐負舟而無力辭既集作雖執競理可明徴壅四國之征其傷多矣專一方之利所獲㡬何贍軍雖望於秋成濟國難虧於日用利害斯見與奪可知文苑英華巻五百二十八
