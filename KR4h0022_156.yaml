body:
  text: 文苑英華卷一百五十六宋李昉等編天部六風十七首雜題風十三首雲八首雜題雲六首霜二首露九首霧六首煙霞二首天河三首虹霓二首風詠風梁簡文帝飄飄類聚作飄颻散芳勢泛漾下蓬萊傳凉入鏤檻發氣滿瑤臺委禾周邦偃飛鶂宋都回亟搖故葉落屢蕩新花開暫舞驚鳬去時送藥香來已拂巫山雨何用卷寒灰同前梁沈約類聚作梁孝元帝樓上試類聚作起朝粧風花下砌傍入鏡光飄粉翻衫好染香逐類聚作度舞飛長袖傳歌共繞梁欲因吹少女還將拂大王同前梁沈約見類聚作梁臨春風春風起春樹逰絲暖如烟落花紛似霧先泛天淵類聚作津池還過細柳枝葉逢飛搖漾燕值羽差池類聚作參差下句有飛參差揚桂斾動芝蓋開燕裙吹趙帶趙帶飛參差燕裙合且離回看復轉黛顧步惜容儀容儀已照灼春風復回薄氛氲桃李花青跗含素蕚既為風所開復為風所落搖緑蒂抗紫莖舞春雪雜流鶯曲房開兮金鋪響金鋪響兮思鳯鳴梧臺未隂淇水始碧迎行雨於高唐送歸鴻於碣石經洞房響紈素感幽閨思帷帟想西園可以遊念蘭翹已堪摘拂明鏡之冬塵解羅衣之秋襞既鏗鏘以動珮又氛氲而流射始搖蕩以入閨終徘徊而緣隟鳴珠簾於繡户散芳塵於綺席是時悵思歸安能久行役佳人不在茲春風為誰惜同前劉孝綽嫋嫋秋聲習習風吹鳴茲玉樹渙集作煥此銅池羅帷自舉襟袖集作袖襟乃披慚非楚侍濫賦雄雌同前王臺卿浸淫不可議類聚作識去來非有情乍見珠簾捲時覺洞房清暫拂蘭池上㶑淡玉波類聚作塵生一辨雄雌異還惡庶人輕同前庾肩吾宋地鶂飛初湘州燕起餘拂烟類聚掃聊動竹吹薤欲成書蒼梧桐尚一作猶在合浦樹應疏陽鳥一轉翅千里定非虛同前梁何遜可聞不可見能重復能輕鏡前飄落粉琴上響餘聲同前祖孫登見藝文類聚颻揚楚王宫徘徊繞竹叢帶葉俱吟樹將花共舞空飄香雙袖裏亂曲五絃中試上高臺聽悲響定無窮同前阮卓高風應爽節搖落漸疏林吹雲旅鴈斷臨谷曉松吟屢惜初學記作棄凉秋扇常飄清夜琴泠泠隨列子彌諧逸豫心同前唐太宗見初學記蕭條起關塞搖揚下蓬瀛拂林花亂彩響谷鳥分聲披雲羅影散泛水織文生勞歌大風曲威加四海清同前應魏王教虞世南見初學記逐風飄輕袖傳歌共繞梁動枝生亂影吹花送逺香同前董思恭蕭蕭度閶闔習習下庭闈花蝶自颻初學記作飄舞蘭蕙生光暉相烏正舉翼退鶂已驚飛方從列子御更逐白初學記作浮雲歸同前王勃肅肅凉景一作風生加我林壑清驅烟尋初學記作入澗户卷霧出山楹去來固無跡一作際動息如有情日落山水靜為君起松聲同前李嶠落日正沉沉微風生北林集作落日生蘋末搖風偏逺林帶花疑集作迎鳯舞向竹似龍吟月動臨秋扇松清入夜琴若至蘭臺下集作蘭臺宫殿峻還拂楚王襟同前李商隱春風雖自好春物太昌昌若教春有意唯遣一作遺一枝芳我意殊春意先春已斷腸同前張祐遙遙輕集作搖搖歌扇舉悄悄舞衣輕引笛秋臨塞吹沙夜繞城向峰回鴈影出峽送猿聲何似琴中奏依依别帶情同前韓琮類詩作韓溉競持飄忽意何窮為盛為衰半不同偃草喜逢新雨後鳴條誰類詩作愁聽曉霜中凉飛玉管來秦甸暗裊花枝入楚宫莫見東西便無定滿帆還有濟川功雜題風春風梁賀文標排簾動輕幰類聚作幔泛水拂垂楊本持飄蘂落翻送舞衣香入幌風梁費昶經芳泛寶瑟乘隙動浮埃鏘金驅響至舉袂送芳來能使蘭膏滅乍見珠簾開輕裙試一舉令子暫遲回賦得風生翠竹裏應教張正見見初學記金風起燕觀翠竹夾凉池翻花疑鳳下揚水覺龍移帶露依深葉飄寒入徑枝聊因萬籟響詎待伶倫吹秋風駱賔王紫陌炎氛集作氣歇青蘋晚吹浮亂竹搖疏影縈池織細流飄香曳舞袖帶粉泛粧樓不忿集作分君恩絶紈扇曲中秋守風銅官渚杜甫昨夜楚帆落避風湘渚間水耕先浸草春火更燒山早泊雲物晦逆行波浪慳飛來雙白鶴過去杳難攀新林浦阻風寄友人李白潮水定可信天風難與期清晨西北轉薄暮東南吹以此難挂席徘徊益相思海月破圓景菰蔣生緑池昨日北湖梅開花已滿枝今朝東門柳夾道拂青絲歲物忽如此我來復幾時紛紛江上雪草草客中悲明發新林浦空吟謝朓詩永城使風盧象長風起秋色細雨含落輝一作暉夕鳥向林去晚帆相逐飛蟲聲出亂草水氣薄行衣一别故鄉道悠悠今始歸汴河阻風孟雲卿清晨自梁宋掛席之楚城一作荆幽浦風漸惡傍灘舟欲橫大河噴間氣集作復東注一作大河東注海羣洞皆窅間氣集作昏冥白霧一作露魚龍氣黑雲牛馬形間氣集作黃雲牛虎形蒼茫迷所適一作遇色間氣集作危懼安暫寧信此天地內孰為間氣集作孰於一作後將身命輕丈夫苟未達所向須有成間氣集作存誠前路捨舟去一作楫東南仍間氣集作應晚晴此詩二百九十三卷重出今已削去異同注為一作富陽南樓望浙江風起張南史南樓渚風起樹杪見滄波稍覺征帆上蕭蕭五兩一作暮雨多沙洲殊未極雲水更相和欲問任公子垂綸意若何竹窗聞風早寄苗發司空曙李益微風驚暮坐臨牖思悠哉開門復動竹疑是故人來能文粹作時滴枝上露稍沿階上苔幸文粹作何當一入幌為拂緑塵文粹作琴埃江上風釋皎然江風西復東飄暴忽何窮初生虛無際稍起蕩漾中應吹夏口檣竿折定蹙溢城浪花咽今朝莫怪沙岸明昨夜聲狂卷成雪始聞秋風劉禹錫昔看黃菊與君别今聽𤣥蟬我却回五夜颼飀枕前覺一年顔狀鏡中來馬思邊草拳毛動鵰盼青雲睡眼開天地肅清堪四望為君扶病上高臺西風白居易西風來幾日一葉已先飛新霽垂輕屐初凉换熱衣淺渠鋪集作銷慢水疏竹透斜暉薄暮青苔巷家童引鶴歸雲雲和周丞已見一百五十四卷作雪詩梁吳均同前于季子見初學記瑞雲千里映祥暉四望新隨風亂鳥足泛水結魚鱗布葉疑臨夏開花詎待春願得承嘉景無令掩桂輪同前董思恭帝鄉白雲起飛蓋上天衢帶月綺羅袂從風枝葉敷參差過層閣倐忽下蒼梧因風望既逺安得久踟蹰同前大梁白雲起氛氲殊未歇錦文觸石來蓋影凌天發煙煴萬年樹掩映三秋月會入大風歌從龍赴魏闕單題詩與此詩同異今並注于下英英大梁國郁郁祕書臺碧落從龍起青山觸石來官名光邃古蓋影耿輕埃飛感高歌發威加四海回同前杜甫龍似集作以瞿塘會江依白帝深終年常起峽每夜必通一作過林收穫辭霜渚分明在夕岑高齊非一處秀氣豁煩襟同前杜牧盡日看雲首不回無心都大似無才可憐光彩一片玉萬里青天何處來同前韓琮類詩作韓溉深惹離情類詩作輕惹離愁靄落暉如車如蓋早依依山頭觸石應常在天際從龍自不歸莫向隙窗籠夜月好來仙洞濕行衣春風淡蕩無心後見說襄王夢亦稀同前羅隱溶溶泄泄自舒張不向蒼梧即帝鄉莫道無心便無事也曽愁殺楚襄王雜題雲和王中書德充詠白雲梁沈約白雲自帝鄉氛氲屢回沒蔽虧崑山樹含吐瑶臺月秋風西北起飄我過城闕城闕已參差白雲復離離皎潔在天漢倒影入華池將過丹丘野時至碧林垂九重迎飛燕萬里送翔螭秋雲駱賔王南陸銅渾改西郊玉葉輕泛斗瑶光暗集作動臨陽瑞色明蓋隂連鳯闕陳影翼龍城誰知時不遇空傷留滯情賦得歸雲送友人集作李山人歸華山錢起秀色橫千里歸雲積幾重欲依毛女岫初卷少姨峰蓋影隨征馬衣香拂卧龍秪應函谷上真氣日溶溶溪雲釋皎然舒卷意何窮縈流復帶空有形不纍物無跡去隨風莫怪長相逐飄然與我同慶雲現李紳禮成中嶽陳金册祥報卿雲冠玉峰輕未透林疑待鳯細非行雨詎從龍卷風變彩霏微薄照日籠光隱映重還入九霄成沆瀣夕嵐生處鶴歸松孤雲于武陵南北各萬里有雲心更閒因風離海上伴月到人間洛浦少高百家詩作佳樹長安無舊山徘徊不可駐百家詩作住漠漠又東還霜霜梁張率駟見視乾度鐘鳴測地機秋冬交代序申霜白綏綏原野生暮靄階墀散夕霏徘徊總嚴氣悵望淪清輝平臺寒月色池水愴風威凝隂洞初學記作同徂夜遞鴈獨歸飛縈叢亂蕪絶繁林紛已稀真松非受令芳草徒具腓同前蘇味道金祗暮律盡玉女暝氣集作氛歸孕冷隨鐘徹飄華逐劒飛帶日浮寒景乘風盡曉威自有真筠質寧將庶草腓露驚早露梁劉蟾初學記作憺九畹凝芳葉百草縈新珠盈荷雖不潤拂竹竟難枯賦得露梁顧愷飛空猶藴伏初學記作狀集物始呈華萎黃病秋菊厭浥長春芽非唯薄蔓草頗亦變蒹葭仍增江海浪聊㸃木蘭花賦得胥臺露庾抱胥臺既落構荆棘稍侵扉棟折連霞古樂府初學記並作雲影梁摧照日暉翔鶤逐不及巢燕返無歸唯有團階露承睫共沾衣露駱賔王玉關寒氣早金塘秋色歸泛掌光逾淨添河集作荷滴尚微變霜凝曉液承月委圓輝别有吳臺上應濕楚臣衣同前董思恭夜色凝仙掌晨甘下帝庭不覺九秋至逺向三危零蘆渚花初白葵園葉上青晞陽一灑惠方願溢滄溟同前李嶠滴瀝明花苑葳蕤泫竹叢玉垂丹棘上珠湛緑荷中夜警千年鶴朝零七月風願凝仙掌內長奉未央宫同前李正封霏霏靈液重雲表無聲落沾樹急𤣥蟬灑池淒皓鶴流塵清逺陌飛月澄高閣宵潤玉堂簾曙貫文粹作寒金井索佳人比珠淚坐感紅綃薄秋露雍陶白露曖秋色月明清漏中痕沾珠箔重㸃落玉盤空竹動時驚鳥莎寒暗滴蟲滿園生永夜漸欲與霜同露韓琮長隨聖澤墮堯天濯遍幽蘭葉葉鮮才喜輕塵銷陌上已愁新月到階前文騰要地成非久珠綴秋荷偶得圓幾處花枝抱離恨曉風殘月正澘然霧行舟遇早霧梁伏挺水露類聚作霧雜山煙冥冥不見天聽猿方忖岫聞籟類聚作瀨始知川漁人惑澳浦行舟迷泝㳂日中氛靄盡空水共澄鮮霧沈趨窈鬱蔽園林依霏被軒牖睇有始疑空瞻空復如有逰蛇隱遙漢文豹棲南阜既殊三五輝逺望徒延首同前董思恭蒼山寂已暮翠觀暗將沉終南晨豹隱巫峽夜猿吟天寒氣不歇景晦色方深待訪公超市將豫赴華隂同前蘇味道氤氲起洞壑遙裔匝平疇乍似含龍劒還疑映蜃樓拂林隨雨密度逈帶烟浮方謝公超步終從彥輔遊同前李嶠曹公之一作迷夢澤漢帝出平城别有丹山霧朦朧映水明一作涿野妖氛靜丹山睿色明類烟霏一作飛稍重方雨散還輕倘入非熊繇寧思𤣥豹情淩霧行韋應物秋城海霧重職事淩晨出浩浩合元天溶溶迷朗集作朝日才看含鬢白稍視集作似霑衣密道騎全不分郊樹都如失霏微誤噓吸膚腠生寒栗當歸集作歸當飲一杯庶用蠲期疾煙霞煙李嶠瑞氣凌霄閣空濛上翠微迥浮雙闕路遙拂九仙衣桑柘凝寒色松篁暗晚暉還當紫霄上時接彩鸞飛霞前人應是行雲未擬歸變成春態媚清暉深如綺色斜分閣碎似花光散滿衣天際欲銷重慘淡鏡中閒照正依稀曉來何處低臨水無限鴛鴦妬不飛天河賦得秋河曙耿耿張正見見初學記耿耿長河曙泛濫宿雲浮天路橫秋水星橋轉夜流月下姮娥落風驚織女秋德星猶可見仙槎不復留同前陳閏曉鏡高秋夜微明欲曙河橋成鵲已去機罷女應過月上殊開練雲行類動波尋源不可到耿耿復如何天河杜甫見集本常時任顯晦秋至輒分明縱被微雲掩終當永夜清含星動雙闕伴月落邊城牛女年年渡何曽風浪生虹霓虹霓董思恭見初學記春暮萍生早日落雨飛餘橫彩分長漢倒色媚清渠梁前朝影出橋上晚光舒願逐旌旗轉飄飄侍直廬同前蘇味道紆餘帶星渚窈窕架天潯空因壯士見還共美人沉逸勢含良玉神光藻瑞金獨留長劒彩終負昔賢心文苑英華卷一百五十六
