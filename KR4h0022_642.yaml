body:
  text: 文苑英華卷六百四十三宋李昉等編雜奏狀奏度女道士等狀二首代伊僕射奏請女正度狀一首奏得嘉禾嘉瓜狀一首奏行營兵馬狀一首奏投降回鶻狀一首奏黃家賊事宜狀一首奏太原官吏選數狀一首奏教習長鎗弓弩狀一首奏排比第二般差撥兵馬狀一首奏教兵馬狀一首奏差赴許州兵馬狀一首奏加嶺南州縣官料錢狀一首奏擢管長平義倉狀一首奏令子弟主辦遷奉狀一首奏孝子劉敦儒狀一首奏百姓割股狀二首奏誅逆人等狀一首奏黃州録事參軍張紹棄妻狀一首奏貶薑鉥狀一首奏度女道士無名尼等狀王仲周右伏以代理𢎞道三教同歸聖誕佳辰萬靈叶慶上件女道士無名尼或早授畢法已聞具戒願編僧道之録永遂修持之心今因降誕日伏乞賜其正度奏姚季立妻充女道士狀右件驍將自貞元年身亡其妻行服三年情禮畢備去歲秋首已及祥除素習真經志願入道伏以草野之人能修柏舟之誓義足以勸志不可移今因聖誕之辰願崇景福請度充女道士法名真玄仍請就潤州道林觀代伊僕射奏請女正度狀吕溫光祿大夫尚書右僕射南充郡王臣女請度尼右臣伏以陛下降誕之辰率土蒙幸臣於含氣之內獨受深恩集作受恩獨深思所以稱慶南山獻心北極遂割骨肉之愛俾歸岑寂之門結幽願於金仙奉勝因於寶壽冒昧上請精誠匪他陛下以釐革初行渙汙無反憐臣罄至之分事與恩違念臣愚魯之忠貸於法外特降中使俯加慰諭臣忝居端右之地首干畫一之科集作文誠雖奉上義乖率下合當嚴譴忽被殊私震驚失圗慙局罔據荷降鑒之眀原情斯在蒙曲全之澤為感則深輒集作輕瀆宸嚴伏增隕越謹奏奏汴州封丘縣得嘉禾浚儀得嘉瓜狀韓愈集無右謹按符瑞圖王者德至於地則嘉禾生伏惟皇帝陛下道合天地恩霑動植邇無不協逺無不賔神人以和風雨咸若前件嘉禾等或兩根並植一穗連房或延蔓敷榮異實共蒂既叶和同之慶又標豐稔之祥感自皇恩微莖何極於造化親逢嘉瑞小臣喜遇於休明無任云云奏差赴唐州行營軍馬狀崔行先右伏奉今月日墨詔令選擇馬軍三日騎隨中使赴唐州臣當時已具聞奏訖臣所管士馬常經校試蓄鋭斯久惟忠益彰常持報國之心盡秉一作盡懷恩之分忽奉詔命頓生光輝豈意宸私俯察誠願三軍抃舞闔境歡呼並喻以勳忠形於感激雖慙數寡不愧衆多蔚為天討之師自假神威之福其器械軍容等並得鮮潔亦稍豐饒以今月十三日從鳳翔府隨中使進發訖臣職當護塞志切除姦不獲齒列諸軍身先士卒助銛鋒於破賊逆節斯摧俾付寸燭以燎原焚枯可待臣無任憤悱踴躍之至奏投降回鶻大首領大將軍安達于等狀于邵右臣得邠州節度使牒上件人等背逆歸順云被懷恩招來打鳴沙縣便擬將收長安為不奉可汗處分遂却回邠寧投降並到使訖謹遣監軍使徐欽令領赴闕庭者回鶻逺蕃素效誠節自中原俶擾纍建勳庸陛下約為弟兄式崇惠好我即示以恩信親仁善鄰之道彼亦懷於德澤為不侵叛之臣而逆竪猖狂間行招誘初遭誑惑雖襟甲而即戎遽感恩私竟束身而請命可汗既不助逆懷恩當即成擒殘孽永清指期非逺代裴中丞奏雍管黃家賊事宜狀栁宗元右今月四日雍管奏事官嚴訓過稱押衙談叔向等與黃家賊五千餘人謀為翻動雖已誅斬猶未清寧臣當時差本道同十將試光祿卿雷繞至雍管界首賔州以來刺集作迎探事宜兼為聲援昨得雷繞十四日狀并嚴訓狀報同到其黃家賊並已退散各歸洞穴訖伏以鼠竊狗偷非足為患陛下威靈逺被神化旁行遂使姦狡集作猾之謀先期而自露回邪之黨不戮而盡滅集作夷伏恐飛章已達吉語未聞上軫天心猶煩廟算臣謬居方鎮忝接疆界所得事宜不敢不奏奏太原府資望及官吏選數狀令狐楚右臣得司録參軍李旦等狀稱前件府名三都望同兩府吏曺近日稍易舊規格限之中增加選數特乞奏聞者謹檢開元十一年正月二十八日勑置北都府縣資望並凖京兆府河南府中間吏曺暫有降下前使王縉薛兼訓馬燧李説并有舉奏尋蒙復舊今凖三月十五日勑停減諸州府雙曺司録判司及甲曹參軍特蒙勑旨京兆河南太原三府不在減限伏以太原府龍興盛業天啓雄藩有義旗起建一作建起之堂為仙駕留逰之地官標留守驛署都亭典章甚眀制度咸在數年來吏部選格不同京兆河南兩府官資稍下選數則深掾吏諸臣懇有披訴儻伺疑作徇從權之義恐乖仍舊之規伏乞聖慈特勑吏部凖元勑與京兆河南一例處分奏教習長鎗及弓弩狀右淮泗寇猶或未一作未掃除天下人臣皆思奮擊臣伏以射渠魁之目徑弩為先舂大憝之心長鎗是切比雖兼習多不專精臣今選定前件官健取八月四日於城東起教不敢不奏奏排比第二般差撥兵馬狀右臣伏以逆賊吳少誠孤負聖明作為姦亂尚延晷刻之命未即雷霆之誅天下人臣皆同憤激况臣任當旄鉞誓掃煙塵割肌肉以資軍亦無所苦執干戈而衛國惟恐不堪况將士等忠義居心堅剛挺質勇於戰陳樂此征行臣謹差前件兵馬如前其資裝器械一事已上並無所闕續具發日聞奏仗其忠順兵氣自雄諭以功名衆心皆勵矧兹窮寇非足勞師伏望天恩不至憂軫奏教當道兵馬狀右臣伏以不教視成為國之蠧政有備無患前王之格言今吳少誠叛換汝南慿陵淮右雖鳥鳶嘯聚見彈已驚而枳棘萌生須鋤其本昨臣所陳章奏願往討平及奉詔書但令排比在軍中之百事誠有舊規以麾下之萬人要知新令謹取今月二十五日於東城凖敕教習至二十九日大設後各勒歸本鎮不敢不奏奏差兵馬赴許州救援并謝宣慰狀前人右中使臣希倩至伏奉詔書兼宣恩旨慰問臣今差前件兵馬者臣伏以吳少誠內懷姦詐上負聖明因幸鄰喪遂虧臣節提携逆黨逼迫孤城凡在忠良不勝憤切况臣謬居方鎮便合封平伏蒙陛下委曲照臨丁寧誨諭感槩而毛髮盡徑憤啓而肺腸皆激諸軍會合計日剪除當道兵馬差定訖已具列狀奏聞奏加嶺南州縣官課料錢狀孔揆右伏以前件州縣或星布海壖或斗一作雲絶荒外首領強黠人户傷殘撫御緝綏尤藉才幹刺史縣令皆非正員使司相承一例差攝貞亷者懇不願去貪求者茍務徇私臣自到州深知其弊必若責之以理莫若加給料錢今具分折如前並不破上供錢物輒陳管見務在逺圖伏乞天恩允臣所請奏擢管常平義倉狀李渤臣伏詳勑文本救荒歉忽有危切貴及其時當州去京往來萬里奏回方給豈及飢人臣請所管忽遇災荒量事賑貸訖續分折聞奏庶使逺人速活聖澤遐流臣之所管僻在嶺外迫以山賊人尤難理若令數改必困蟊食常平義倉本救災害向為歉沴擢臣處之方鎮臣宜竭力上答皇明伏乞聖恩允臣所奏庶使皇靈逺被獷俗知恩奏凖詔令子弟主辦遷奉事狀裴次元臣某言伏以幸遇通年奏請遷奉事伏奉月日手詔令子弟主辦以趂時日者私願上陳天書下降跪承恩一作明命榮感失圖臣實不天幼丁家禍荐鍾凶釁方在童蒙逮于成人終鮮兄弟比以時日非便顧室且貧日居月諸未辦歸祔痛心疾首以候吉辰昨日一作者陳露下情求替遷奉赴任之日亦具奏聞今奉詔書令子弟主辨雖懇辭上瀆而天聽未回荷朝廷之寄深望阡兆而心殞臣即凖詔遣子弟專往揚州舒州主辦便赴上都續具聞奏臣揆以才劣職任非輕不敢重陳冉煩睿覽懷罔極之感章奏冀允於深誠奉絲綸之書奬任益彰於聖旨顧違恩重哀荷難任臣不勝荒塞摧逼之至奏孝子劉敦儒狀元和八年權德輿時為東都留守孝子劉敦儒年四十九曽祖子玄祖貺父浹住東都從善坊右件人名儒史官之家積成教義至性誠孝感動人倫母患風狂心緒乖亂無辜榜箠常至僵仆或凍於積雪之下或曝於赫日之中腐爛皸瘃一作裂裂略無完體見其楚毒方上集作與飲食敦儒蘇而復起常懼人知承順恬然不覺疾痛因心之道貫於神眀欲蓋彌彰事久方著蒸蒸不匱十有六年貞元二十集無此字非年留守韋夏卿具狀奏聞奉其年八月二十九日勑宣付史館旌表門閭臣至洛都具詳事實聞諸族類布在風謡今又十年不改其飬飢寒所迫衣食闕然晨昏所奉朝不繼夕伏以底祿筮仕資廕多門至行絶人尤可嘉奬伏望天恩特授一解褐京官使分司就飬則私計集作計食可給寸祿為榮庶厚時風以𢎞孝理特乞聖慈允臣所奏集作請謹録奏聞伏候勑旨奏百姓王士昊割股狀令狐楚右臣得太原府牒前件人為母阿張患病割股奉母其母所得疾漸損者臣伏以登于大孝在禮為難忍其甚痛於人不易王士昊長於市井利在錐刀誓以誠明之心療其羸老之疾割肉於股饋羮于堂信可以感通神眀風變人俗某猥司亷察獲守方隅以此至性恐須旌表奏榆次縣馮秀誠割股奉母狀右臣得太原府牒前件人為母久患割股奉母所疾漸損者臣差當縣主簿劉戡檢驗得狀具如前申者臣伏以縱螫及膚口猶難忍援刀刺骨心豈易安前件人出於畎畝之中長在草茅之下天生仁孝日用元和忘甚痛於已軀期有瘳於親疾人倫共感名教所宗斯實陛下仁掩周王孝逾虞帝陶蒸動物之性啓迪仁人之心况臣守在方隅職司廉察據其至行恐合褒稱奏誅逆人等狀于邵右前件官等或久登清貫或厚受國恩天步艱難不隨清蹕偽庭頡頏忍飲盜泉或修撰文書或統制兵馬或動衆以資敵或作姦以蠧人事迹昭彰實不可掩臣等初命禁錮伏候聖恩輿議囂然皆將倳刃此輩大逆無道覆奏難容臣參諸禮法按軍令訖匿瑕含垢誠君父之恩私嫉惡剛腸亦臣下之職分擅此處置伏增戰越奏黃州録事參軍張紹棄妻狀牛僧孺右臣得張紹妻盧氏狀其張紹寵婢花子每令無禮相陵臣推問有實者伏以張紹忝迹衣冠幸陶德化不敦二姓之好敢瀆三綱之經嬖惑女奴蔑侮妻室非特一作徒衣服飲食貴賤渾同兼亦待遇等威袵席顛倒欵招明白愆尤至多縱稟性庸愚靡及於教義而歷官州縣合聞於憲章逞其邪心曾不懼法顧茲醜行恐玷大猷臣職在觀風事先按俗有關政理敢不申聞伏乞明示罪名流竄逺地使人知家道以誡士林謹具奏聞伏聽勑旨奏貶晉陽縣主簿薑鉥狀為人作令狐楚右臣劉氏堂外生即故硤州刺史伯華嫡孫左補闕某第三女是臣亡叔庶子絳州刺史勛外孫父身早亡臣妹多病遺孤寡婦無所依投及臣總戎來相依止臣見其長成須有從歸其薑鉥久在太原曽任主簿誠非匹敵誤與婚姻豈料如獸之心同人之靣縱橫凶悖舉止顛狂旬月之間豪橫備極惡言醜語所不忍聞有忝祖宗難施面目臣以為夫婦之道無義則離因遣作書遂令告絶矜其愚下擬許生全而將校等二十三人播進於庭確論其事具如前例請以上聞雖忍孤兒可欺其如衆怒難息特希竄謫以雪寃疑干冒宸扆伏增戰越之至文苑英華卷六百四十三
