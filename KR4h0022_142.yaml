body:
  text: 文苑英華卷一百四十二宋李昉等編蟲魚四蚯蚓賦一首蟾蜍賦一首尺蠖賦一首蝸牛賦一首聽秋蟲賦一首蜘蛛賦二首蒲盧賦一首燈蛾賦二首螳蜋拒轍賦一首蟄蟲始振賦一首蟋蟀鳴西堂賦一首蚍蜉賦一首蚯蚓賦東方虬惟隂陽之播氣實萬類以呈形有微蟲之稟質應甲子而濕生雨欲垂而乃見暑既至而先鳴乍逶迤而鱔屈或宛轉而蛇行內乏筋骨外無手足任性行止物擊便曲徒進退而皓首竟不知其所欲東西詰屈南北夤緣上食塵塊下飲淵泉應軒轅土德之王入蔡雍勸學之篇其體甚微其用至専墐泥塗以自保觸鹽滋而罔全豈造化之賦命信歸之於自然蟾蜍賦觀夫天地之道轉萬物以自然鱗蟲之衆有蟾蜍而可稱焉鳥吾知其擇木魚吾知其在泉此皆嬰刀爼以生患而我獨沉冥而得全爾其文章睆目鋭頭皤腹本無牙齒之用寧懼鷹鸇之逐或處于泉或漸于陸常不離於跬步亦何擇於栖宿當夫流潦初溢隂霖未晴乘清秋之涼夜放響耳之繁聲澒洞雷殷混萬籟而為一喧豗鼓怒怛異類以相驚既莫知其所止故乃時逢則鳴觀其忘機似智稱善不伐進而無悔耻魚之曝鰓退亦能謀笑龜之灼骨方將樂彼泥中與井底安能出夫河長與海濶稱其異則畫地成川謂其神則登天入月豈直窪坳之內而見其浮沒意兹蟾蜍匪陋攸居沼沚之毛恣涵泳之無斁蘋藻之菜兼糗糧而有餘方其鳴孔公若聞于鼓吹當其怒越子反駐乎乘輿彼龍蛇之蟄也吾不知其所如尺蠖賦六氣氤氲四時平分天道恍惚是生萬物化而為鳥兮有鳴鳳之來儀化而為蟲兮有尺蠖之能屈原夫蠖之為生也不飲不食非榮非利無欲近道處身似智幸稟天地之生亦承雲雨之施哂摶擊而爭疾輕爪牙而自致其勇也不怯雷霆之聲其慎也寧勞鷹隼之鷙浩然無悶之境獨處不爭之地多其順時而出就暖而長吐微絲以逍遙蹙緩步而來往當靜泉澄遇躁風興屈伸進退翼翼繩繩同吹萬而生養體抱一以含宏聖人書之以作誡君子行之而足徴况不才之下士敢求伸以自矜蝸牛賦并序馬吉甫甲辰嵗夏五月余寓居官舍時雨初止有蝸牛蠢蠢緣堂砌而上恐致踐履之禍因命稚子移於墻隂乃潛角縮殼而有自衛之意退為賦云蕤賔仲月逆旅孤亭薄官春罷間門晝扃雲漫漫兮雨冥冥荷蕖紅兮苔蘚青卷隂風於北幌間疑皓月於南櫺觀蝸牛之蕃育何詭錯之殊形若乃順隂而起背陽而化夤緣於草木縈委於臺榭傍庭廡以徐回循墻隅而亂下纎角內奮寧交觸氏之兵堅殼外圖疑終結野人之舍闕爪牙兮自達無羽翼兮相借本忘情於蚌守亦何憚於鴟嚇故其投迹多間冥心寡欲進不奔競退非飲啄吸大道之淳精體中庸之止足匪徇一作同物而天疑悔恆居沖而守朴升清流兮不為寵頓黃汙兮不為辱豈蜾識之可量何霓量疑之能較借如海蛤無脛江龜有靈懷珠胎以自伐韜玊兆以先形蜋之捕也後黃雀而寧懼魚之貪也前翠竿而不驚觀萬夫而恕己會千載而作程乃知無用之為用求生而喪生聽秋蟲賦李子卿時不與兮嵗不留一葉落兮天地秋况白露之夜遙聽隂蟲之啾啾且鳴因夜急思以秋苦始躍躍而緣階轉喓喓而入户輕揚颯而韻合殘溜泠而響聚隴水咽而應然峽猿啼而何取由是知悲秋者自此生興感物者因兹為主則有三年逐臣千里逺客鄉路何處君門且隔吟澤畔之風秋卧江臯之煙夕逆旅愁聽鳴蛩四壁欲解寒衣蕭然淚滴媫妤恩薄義猶辭輦永巷秋深層城夜淺涼月斜照明河近轉塵滿瓊鈎珠簾不卷秋聲四入曼睩雙泫長樂歌鍾悲來莫辨香衢甲第趙李經過霞擁繡軸風調玊珂髙堂引滿醉舞婆娑承一作永夕之樂孰知其他清露醒後繞砌聲多瞪視凝聽傷如之何去嵗良人逺征絶域錦書欲寄翩翩鴈翼不語朝紡含嚬夜織其那空閨悲鳴亂逼欲夢翻驚方愁更憶腸絶聲聲門前月色貧士失職寂寞下帷蘭葉風敗苔痕雨滋覽鏡而玄髮將白拂塵而素衣己緇柴門日暝響沸茅茨展轉孤枕偏驚故時念懸鶉之正弊恨躍馬之將遲何必葉落自長年悲且蟲之聲也無端人之聽也多緒亦由心羈者多感激志苦者易悽楚苟有任於行藏亦何嗟於寒暑水之積也鱗斯奮風之厚也翼斯舉彼數蟲兮何知且逍遙以容與蜘蛛賦賈餗涼風起兮秋初步簷宇兮躊躇有微蟲之窈窕挂輕影於空虛績不待筐固無求於蟹結而成網若有羡於魚觀其周旋細密往復輕疾縷積於纎綸成若屈其身也或垂之如墜其絲也亦動而愈出成章無札札之聲不漏得恢恢之質夜居於外同熠耀之宵行日就其功異蛾子之時術於是規模既辨詭麗無儔纎羅礙日薄霧含秋圜影初成有似毁方而合輕絲乍吐還同不茹其柔塵飛空而罥結葉下樹而縈留可以待遊蟲於死地為終日之養羞嗟夫積少者多因微者大始一絲而輕絡成衆目之交會言其巧乃織婦不如語其功孰雕蟲可配豈徒玩回文之縹眇閲浮景之明昧風乍觸而將紛露微霑而成纇實亦愛其組織憐於琢磨將懸心而有待信役力而無他容有志業未騁勤勞則多文章徒緝職競不羅覩在户之呈妍爾功既就慙閉門而守拙吾道如何第二敬括蠢爾蠨蛸樂居間邃不資毛羽以為力不假暉光以為媚挺自然之巧蓄多端之思託玊堂以謀生賞疑作當金忩而得地得地於中因而致功委曲面實回環一作旋接空踠長絲於柔指拖纎網於輕躬妙技將臨愛南軒之上月清心欲就愁北户之生風始裔裔而將盡幾綿綿而不窮是經是構既勤既朂或連延於壁隅時蒙羃於楹曲雜花幌而左右交引緣錦屏而逺近相屬爾其乾坤一作乾乾務生運動多情窈窕前移有作調疑梭之勢逶迤下退無聞震懾之聲逺而瞻籠絡紛披如罾罟罘罳之結出迫而察嬋娟斐斖似綾紈綺縠之綴成至如河漢佳人濮陽美婦蜀江新製秦樓妙手將積功之多途固仁智而同夀且驗以張弛效其縈紆踈而不漏細而勿逾貼飛花則亂錦霑皓露則垂珠彼蒼蠅兮則營營而見縶此粉蝶兮亦栩栩而就拘則知繫縲絏者信非其罪囚羑里者又匪其辜韓非所以飲恨伍子所以捐軀痛凝脂兮若爾祝一作想一靣而得乎雖復龍之神兮深其穴而自全隼之捷兮高其巢而取樂龍竟入於炮醢隼終嬰於弋繳彼守道者當然况履危而可作既而倚伏無次職此之由應塞而止從波而流四時可以投契五湖可以泛舟即松石之堪保奚名利之足求子徒羈牽於弋網期逺害而能無少憂蒲盧賦以教彼他蟲變成時類為韻究政化之所歸於蒲盧而可見負么麼之異族能教誨而知變大鈞所播各異稟而殊方二氣相生遂改形而革靣初其穿土取彼桑蟲負以蛸飛之勢置諸蝸舍之中以氣相感以類相通笑鄧攸之輩無兒絶其天性若何晏之為假子養在公宫薨薨鼓翅咽咽傳意本乃與吾同物孰云所畜非類如能肖貌便若假寐因蠕動而稍分與胎教而齊致蠆尾潛出蜂腰未備將革故而就新諒末同而本異嗟乎俱為化育别感生成已改其狀復移其情躡糞土而股戰弄清風而翅輕漸能羽化永别跂行具體皆遷雖似通於應變無心而守曽不知其改更連拳未己奮迅復止謂我自然莫知所以舉螳蜋之臂而動振莎雞之羽乃起化形如蝶既以忘於神遷委蛻若蟬信難窮於天理雖離本質亦匪殊姿遇穴入易逢花去遲見其類而却為非類遇一作過其支一作枝下同而翻訝何支衆彚皆同昔不非兮今不是含生無别彼一時兮此一時然則聖人舉以立言指而垂教謂微蟲兮猶知適變矧伊人兮不能胥效於戲其形稍别其類靡他煦然而方隨氣母蠢爾而共稟天和吾徴夫蜾螺之與螟蛉也見品物而居多燈蛾賦以人皆曰豫知為韻陳仲師燈者火也尊而不親奚斯蟲之眇質翻體密而意馴必將蹈火而後止是以疑氷之與鄰雖異探湯執熱之情可見不蒙明照暗投之罪則均是以鴈飛無忘於避繳龍蟄有貴乎存神於以知無知之智有以同自知之人無損於明雖光暉可借自貽其咎與壓溺同塵始其焰焰中開青煙爰發􅖇􅖇一作薨薨四足白羽若月燋爛唐突離披觸蹶人心卒然天意若曰嬰焚灼者何如玊石之俱盡處高明者曷若烏兔之屢闕且繼彼覆車雖百夫死難而無餘納諸密網狀衆鳥驚飛而在初循環責實宛轉投虛沉脂膏則屈死觸煙焰則焚如自我構患非天禍豫愛水螢之光載浮熠熠笑鼎魚之樂其薨疑作斃徐徐阽乎焦原可叶其義投畀炎火莫之知避曷若晨雞候明以自得火鼠就躁疑作燥而無纍莫不守之以為順居之以為智是蛾也餘光可託留影如寄排朱焰扇輕吹胡麋疑作糜爛於瞬息為腐餘之容易若然者蠢蠢之類將外強而必乖炎炎之著非內熱之所懷既油然相煦於膏火亦瞥然相忘於形骸吾所以知捐軀於鼎鑊與是道而孔階第二范鳴鶴流月半庭兮頽光初夕金釭坐明兮凝暉的的蛾繚繞而未息意沉潛而自溺逝者已往存者可哀伊戚戚之未畢俄栩栩而復來覩前軌之已覆因委命而不回彼尚無恨哉殊化難窮神理斯昧物情無傷亦或貽害每捐慮於進止恆忘懷於否泰任逍遙以無營將何負而顛沛如膏之明豈怪前死比薰之馥豈惜同燬儔二美而多慙痛一生之虛委明不可投投之必斃膏不可赴赴之必泥彼優遊之萬端奚於斯乎失計始來也吾故知其必凶及死也吾未識於所從何生微而智劣苟不若於自空爾愛候明何不候日光隂不留尚存爾質爾愛候明何不候月素華將移爾猶不滅何相繼以焚軀竟不知謀之為拙玄豹深隱終不效幾是蟲以欲卒與命違豈若不死之仙鼠待昏夕而後飛螳蜋拒轍賦以怒臂當車生不知量為韻陳硎蠢彼微蟲勇而不懼當往來之轍迹阻東西之馳騖聞轞轞而虎蹲佇鱗鱗而狼顧見危致命方確爾而靡遷唯敵是求乃毅然而增怒且肖形卓犖植性強梁豈奔衝之足畏非會逺而不當逸性喬桀雄姿激昂拖輕軀致命死地壯前趾若有巨防觀卧轍之時似當黃霸想埋輪之處何憚張綱其或輸穀千箱御姬百兩方擊轂之自逺已張拳而相向死且如歸路何能讓苟不折節於焉用壯睅其目曾不見機揮以肱豈為知量其理何如其生忽諸禍甚觸株之兔危同戲鼎之魚行無逗撓豈必籧篨在聖人之經誠宜避地非長者之轍詎肯回車且麟傷豈仁龍醢非智思控搏而莫及喻壓溺而何啻不若履薄兢兢臨深惴惴任肖翹之可適曷強禦之不避微茫膚血豈足殷其左輪展轉路塵寧止斷其右臂居當假息動必阽危捨鳴蟬而莫捕蔑黃雀而不知儻所據非據亦何斯違斯謂豺狼之不若念虺蜴而何為且含氣之類求生之厚豈必賢哉曷云能不獨不降志自貽伊咎誠轥轢之所加諒虀粉而何有奚必矜夫躍躍冒彼彭彭願陳力之方盛意當途之足驚曲循天理深居物情徒紏紛而莫紀固密勿而難明倘不載馳載驅廣人之用當念無輗無軏遂爾之生蟄蟲始振賦以和氣初發幽蟄潛啓為韻王起蟄以寒閉春以陽和閉者待時而後振和者煦物而無頗萬穴之中或羽毛而櫛比積塊之下或鱗甲而駢羅咸蠢蠢以潛發應熙熙之屢過則知出處有時變通為貴煦嫗斯感嚴凝罔畏跂行喙息負日月之融光蠕動蠉飛得天地之仁氣爾其形分土石色動丘墟潛乎野處達彼巖居歷窮隂而兹久當獻嵗之厥初思麗景之鳴躍念和氣以吹噓順於時比應雷之雉感於候同上水疑作氷之魚况夫勾芒整轡太蔟紀月蒸以絪緼斂其觱發或振羽而不倦或動股而不歇細則肹蠁以凌空巨則連蜷而映窟處否藏周逢時出幽順地之理承天之休將昭蘇而忽變豈枯稿而為儔想像山川依稀原隰氣且布於感動形無違於燥濕祕邃泥蟠依稀土蟄青雲之表期蜿蜿以龍升繡户之前佇翩翩而燕入則知離於淹滯託彼沉潛苟存身而有待必坯户而是瞻豈唯月令舊章紀之而無斁時訓前典徵之而不厭客有窮屈伸之理得行藏之體固無恨於陸沉將必俟於天啓蟋蟀鳴西堂賦以始入於門漸藏床下為韻張隨嵗云秋矣秋亦暮止西堂寂聽之時蟋蟀寒吟之始紛稍稍一作哨哨以驚節洞喓喓以橫耳若夫八月在宇三秋及門清韻晝動哀音夜繁潘生感而增思宋玊傷而斷魂於時招搖北馳河漢西瀉煙澄寥廓露肅原野背暑而出爾草間驚寒而入我床下或有聲相應氣相依雜蠨蛸於內屏混耀熠於前除羅幌燈寂珠簾月疏掖庭聞而夜久華省聽而秋餘若乃愁雲結隂暮雨流濕拂寒威之密邇當暝色而逾急我堂既在我室既入亦何異羣鳥養羞昆蟲閉蟄懶婦也唯爾可以促女巧羈人也唯爾可以催客泣夜如何其夜未央天晴地白月如霜士有衣絺綌坐藜床怨空階之稿葉聆暗壁之寒螿乃言曰何彼蛩矣與時行藏火氛鬱蒸迹邁於中野秋氣融朗聲聞於西堂然後屏輕箑卷涼簟時嵗忽以徂謝功名曷其荏苒美豳化之有成陋晉風之太儉夫如是莫不驚白露之蟲躍望青雲之鴻漸蚍蜉賦并序李德裕此郡多蚍蜉余一無此字所居臨流實蕃一作繁其類或聚於衽席或入於盤盂終日厭苦而不知可禦之術因戲為此賦令稚子煜一作煜和之惟江潭之下國况幽居於澤畔何螻蟻之微物亦有徒而凌亂或泮散於經笥或夤緣於食案余乃戲而問之曰爾能居厚地而漏山阿無乃處吾身而為大患蟻不能言詞以臆宣其旨曰我稟形於造化亦一氣之所甄嘗濟齊師之乏曾聞媯德之羶覩封穴而知雨驗寸壤而得泉以時術三字一作出以時而不息故學者得而稱焉戴笠而逰若巨鰲之冠神嶽繞磨而行如日月之麗青天若乃依垤緣壁淫淫奕奕其聚無聲其行無迹值晏溫而出逰當祁寒而入隙迅雷作而靡一作不駭微雨灑而自適生維一作雖瑣細亦有行藏止若羣羊之聚進如旅鴈之翔乘其便也雖鱣鯨而可至一作制無其勢也雖蛭蚓而不傷今願悔過戢於一作于垣墻豈敢同青蠅之點白汙君子之衣裳文苑英華卷一百四十二
