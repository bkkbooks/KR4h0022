body:
  text: 文苑英華卷五百五十五宋李昉等編尊號二中書門下請上尊號表三首為文武百官請復尊號表六首京兆府請復尊號表二首代京兆府耆老請復尊號表二首禮部為百官上尊號表二首中書門下請上尊號第一表于邵建中元年臣炎等言臣聞自古帝王配天受命必建徽號𫝊之無窮號者功之表也三五以降皆約所著之功以彰厥徳則犧農軒頊之號或質勝文而文勝質悉以一時盛烈而崇號焉伏惟皇帝陛下纘戎立極紹庭應運居域中之大為天下之君聖敬日躋孝理時乂放珍禽竒獸為異方逺物畧嘉禾美瑞俾良史不書洪惟成湯一徳率先老氏三寳舞干是務和戎是利惟賢是登惟惡是去雖夏后卑宮菲食漢文帷囊弋綈與我比崇彼實慙徳今園陵永閟升祔云畢孝思罔極逹于神明克禋克祀卜時撰吉載命元子光啓儲君禮無不備道無不洽而鴻名未揚典故猶缺將何以告清廟謁聖祖對越神祗昭格上下伏乞許臣等上尊號以備大禮有以答乾坤之貺有以符億兆之歡臣等才非啓沃職叅近侍逺媿賡歌空懐赤實不勝懇願屏營之至謹奉表陳請以聞第二表臣炎等言伏以表鴻勲尊明號百王之𢎞典八聖之嗣烈則可祖述古訓憲章前範上以明帝王無私於已下以表臣子行古之道所以詢於公卿稽彼典常冐昧為請期於必從奉詔還答未蒙聽允阻臣子之協同彰聖人之謙甚當此反側得為安乎臣炎等誠惶誠廹頓首頓首臣聞上覆有名曰天下載有名曰地天地尚著於名位而陛下父母天地端居大寳獨無名乎臣等固知其不可無此况踰年作制履端於始啓廸乾運祗膺天秩此皆宗社廼睠元元式瞻其當至公不在謙已伏惟一作以陛下首在藩邸親摠六軍屬彼昆夷乗我間舋犯我都鄙扈鑾輿以東幸奮貔虎以旋師一呼而上將雲奔𫝊檄而逺蕃麏至朝廷以正華夏以寧旋表元良迨茲臨御顧命之後畏天之威躬履節用勤於宵旰大孝感於神明茂功由乎發號友愛日至觀行不忘顧升平以儉致將徠逺以徳服風雨時若妖氛一作氣不動夫然則俗可追於大庭人可納於夀域而欲忽鴻名觖人望固以自約其可得乎臣等才謝將明力慙匡輔欣逢至道竊荷寵光願回天私獲遂丹悃無任懇廹屏營之至謹奉表陳請以聞第三表臣炎等言臣等考古訓酌羣言建大中之道陳徽號之請累表上聞皆抑而未許跼天悚廹屏營失圗臣固以此請者方欲協萬國之歡繫一人之本蓋非私於主而専於已實以荷大賚法上𤣥遵王之路也伏惟皇帝陛下以唐堯四徳光宅天下以周文直行陟降庭止應乾立極迨乎踰年又奉今月甲寅詔將有事於郊廟越翼日乙卯復下有司命元子以主器薦珪置幣尊祖配嚴屬車將邁明號未布瞻望霄極遐哉邈乎至乃陳一王之儀合百神之禮祝告史載則謂之何臣又聞之守文纘服繼序不忘遵奉遺烈必思其復惟髙祖象雲雷以起經綸惟太宗造區夏以創大業惟𤣥宗倚孤劍以攘臂惟肅宗振一旅而討逆惟代宗摠天兵以佐命皆拯生人之崩角安國家之綴旒徳澤洽于上蒼功業冠於邃古而皆順人心以敬天命享大名而騰茂實况陛下居雍邸將天下奔西戎約北狄此所以彰武功也其在望苑則問安視膳春誦夏弦尊師以廣其聰明敬老以全其羽翼此所以懿文徳也及受顧命反居諒闇勺飲不入杖而後起同軌不踰於七月升祔永終于九虞此所以昭大孝也克勤于邦日親萬務克儉于用化行四海珍禽竒獸不育於國沉珠捐金必受以人此所以返太素也有一於此則可以發揮鴻休光啓尊號豈可尚懐謙損莫顧與能九廟之靈儼思虔告百辟之望終期必從陛下必欲固拒羣心輕此盛典則祖宗之前號盡為虚美陛下安得而堕之臣愚故知其不可也臣等待罪掖垣屢陳愚欵儻未回天睠將萬請以之無任大願慺慺之至謹奉表昧死以聞為文武百官請復尊號第一表崔元翰貞元五年臣等言臣竊觀前代之盛列辟之英咸保鴻名而崇明號或配其徳或昭其功蓋所以揚耿光彰淳懿而示逺也其有暗然類表作而不耀後嗣何觀蔽而不揚羣臣之罪伏惟皇帝陛下由正統而臨祚承聖緒而受圗禀髙明之姿於天侔博厚之徳於地端教化之本制行禮之中聲震八區威加六合運造化之柄柳集類表作運𤣥造之化靡有不通成隂隲之功衆莫類表作信莫栁集作莫之能測是用光膺聖神文武之號其後雖逢阨運㝷栁集作今睹昌期誠我武之掃清猶自咎而抑損同罪已之義明愛人之仁羣臣等上順聖心以成恭徳而退懐大懼謂掩全功五年于兹若墜氷谷方今百職皆理庶績其凝人用咸和俗惟丕變陳師鞠旅無犯塞之虞封疆畫界栁集作畫界封疆無専地之患四海寧謐栁集類表作一萬類蕃滋薄刑溢不寃之聲逋賦蒙勿收之惠西成有穰嵗之報南極見夀星之祥靈貺屢加天恩允答豈冝固類表作妄為菲薄以掩盛明尊號之崇願復如舊况臣等親奉平明之理乆蒙覆露之恩耻徳美之不彰憂罪戾之將及伏惟陛下復循舊典俯狥羣心栁集作情誠天地神祗内外臣庶之所望也臣等無任屏營悃欵栁集類表作懇之至謹詣朝堂奉表陳請以聞臣誠勤誠懇頓首頓首謹言徳宗興元元年幸奉天削去徽號貞元五年六年百僚六表請復舊即此也是時崔元翰為禮部貟外郎歴知制誥唐書稱其詔令温雅故類表以為元翰所作而英華誤作常衮按衮建中初卒至是已十年又栁文收此表或入正集或入外集按宗元年譜貞元五年方十七嵗八年始貢京師其謬誤可知况英華總目明言取之類表其為元翰何疑第二表臣某等言臣等前詣朝堂上表伏願栁集作請復加尊號奉被還㫖未遂懇誠拳拳顒顒不勝大願臣等伏以崇明號昭盛徳爰自中古實為上儀以至於我祖宗莫不膺茲典禮伏惟皇帝陛下有廣運之徳𢎞覆載栁集作照㣲之仁燭幽以明威逺以武恵澤之被誠浹洽于八方英聲之揚冝越軼于千古而乃乆為抑損以守謙恭事有曠而不遵禮有缺而未備臣等又以為不私與已是謂至徳栁集類表作公有美之而莫敢辭有非之而莫敢隠必推於物而順於人既以狥於羣心又思叶於中典此皆聖王栁集作人之事也且夫虚而失實則夸耀而誣質而不華則朴畧而固而而字栁集作所以王度資於潤飾帝者務於恢崇盖栁集無盖字將以法日月之昭明配天地之廣大聳逺人之觀聽兼前代之軌模然後表其全功謂之盡善不可以方當陛下臨位羣臣在庭而使鴻名不彰盛典猶闕既無以光昭衆美又無以丕承舊儀類表作章則臣等蒙耻於今獲罪於後實為大懼敢忘盡規尊號之崇願從羣議伏惟陛下俯回宸睠察納愚誠不惟臣等受恩天下幸甚無任區區懇廹之至謹昧死重詣朝堂奉表固請以聞臣等誠懇誠勤頓首頓首謹言第三表臣某等言臣等前再上表請加尊號實以功徳俱茂典禮宜崇然而不能鋪陳無以動寤愚誠雖竭天鑒未回臣某等誠懼類表作惶誠恐頓首頓首臣某等謹按白虎通曰號者功之表也神農有教田事之勤燧人有興火食之利伏羲正五始白虎通曰伏羲因夫婦正五行始定人道始字疑祝融續栁集作紹三皇人為之名以栁集作不非美其事其後帝王之盛洎我祖宗之明咸因人心而慎栁集作順古道雖損益或異其於二字栁集作而表功明徳一也臣等所栁集類表作是以遵有國之令典采上古之遺文察人志栁集作心於謳謡觀天意於符瑞敢以為請累表陳誠曩者運丁艱難時或順動陛下思成湯之罪已念周宣之側身去徽號而不稱垂炯誡而自儆應天以徳示人以恭聞於蠻貊戎夷告于天地宗廟是故咸知陛下之志慕義而歸仁潛感陛下之誠垂栁集作通靈而助順今者君臣和栁集作同徳上下叶心百職畢脩庻官以序法令明具教化流行方内歡康天下寧壹四人遵業萬類樂生嘉應休徵神物靈貺形于草木著于星辰而辭之以仁夀未臻至化猶鬱遂使徳誠可紀名號類表作仍未崇不告於明神不示於殊俗將何以知陛下之戡難將何以表陛下之致平下無以威於四方上無以報於九廟其不可一也淳古之至化邈而不追栁集作足非烈祖之盛儀廢而不續其不可二也庻正群官宗室支屬西土耆老栁集作長太學諸生黄冠之倫緇衣之侣萬衆伏闕彌旬織路而乃不從人心以違公議其不可三也守謙恭卑讓之志忽光大𢎞逺之圗臣等誠雖至愚以為大謬伏以恒乆之徳貞夫一也元始之義善之長也并包覆露天之大也清净𤣥黙道之妙也睿知之周物不可以不稱夫聖也妙筭之無方不可以不稱夫神也行仁義脩典法歌詩頌考文章不可以不稱夫文也攘却戎夷戡剪暴逆邉兵以整禁衛以嚴不可以不稱夫武也而合於唐堯乃聖乃神乃武乃文之徳臣某等謹稽以乾符叶於古典侔徳澤之廣配功業之崇昧冐萬死伏請上尊號曰貞元大道聖神文武皇帝臣等竭其闕發於交感庶栁集作無以回日其能動天無任屏營悃懇之至謹詣朝堂奉表固請以聞臣誠惶誠恐頓首頓首謹言及大㑹議户部尚書班宏又請加奉道字故又改其文博施不息而萬物以生推功不宰而萬化以成又合於書之奉若天道之義伏請上尊號曰聖神文武奉道皇帝第四表臣某等言臣等去年九月三度詣闕上表請復上尊號懇悃雖竭精誠莫通又懼於累塵聖聽類表作聰是用中輟大願未畢羣心靡寧臣某等誠勤誠懇頓首頓首臣等生逢昌運早列清朝獲睹文明繼迹賢俊類表作俊又栁集作聖俊亦甞考前載於史氏訪遺儀於禮官至於保鴻名尊號之榮昭茂功盛徳之美皆烈祖之垂法為累代之成規子孫之所宜丕承臣下之所宜崇奉陛下纂聖緒而臨下尊令典而栁集作以制中則亦俯從公卿大夫之請光膺聖神文武之號間者陛下以禍亂之故特貶損而自儆以從一時之宜信為恭也今乃欲遂變更而不復以廢先祖之典則若専焉豈陛下或未之思然臣等實以為懼雖欲行陛下之志奈先祖之典法何伏惟陛下因于憂勞深自咎責命祝史告于天地陳圭幣祠于祖宗布于羣臣聞于兆庶固能降開祐之福致感悦之誠咸和以闕心盡瘁而畢力弼成神造康濟艱難冦逆掃除暴强擾順侯衛奉守屏之職夷狄為來庭之賔兵戎不興邊鄙類表作圖不聳文軌同於四海貢賦脩於九州至若時候將愆必維思而内省皇情㣲軫遂交感而潛通隂陽和而風雨時年榖熟而財用足休祥數見福應屢臻此皆天地祖宗垂靈錫祉以成陛下之志明無不答不享之咎也陛下宜承天意以悦神心増修盛儀再加明號崇昭報之禮表恢復之功而辭以仁夀未臻至化猶鬱則若尚懐不足以要天地祖宗雖有固讓之勤而非重請之義且夫號者其來尚矣燧人神農各旌其事湯以甚武而曰武王迨我祖宗亦栁集無亦字崇髙栁集類表作尚古道垂著新法陛下獨為辭讓以守謙冲則皇王將有媿於前祖宗將不悦於後而帝徳是非之辨固有所歸國典異同之文後難以守且陛下本為炯誡以示敬恭誠謙徳也今以先王之道而不敢不法烈祖之訓而不敢不承又謙徳之大也若乃守獨善而遺公議執小讓而忽宏規違臣庶之心廢祖宗之典乃所以失陛下之恭徳又徒以掩陛下之全功臣等雖誠至愚竊所不取輙敢徴之國典酌於經義取貞者事之幹元者善之長以配聖謨神化之盛文徳武功之崇叶紀年之嘉名遵舊號之美稱以如開元故類表作政事謹昧冒萬死請上尊號曰貞元聖神文武皇帝伏惟皇帝陛下沛然回慮俯狥群情然後聖徳之光昭𤣥功之茂著後代得揚盛美而鏡至清是羣臣之願也不勝懇廹之至謹復奉表詣闕固請以聞臣某等誠勤誠懇頓首頓首謹言第五表為文武百僚太子少保于頎以下作臣頎等言臣伏以尊號未復累表陳情伏奉詔㫖固守謙恭臣頎等上援栁集作授天地神靈次奉祖宗典法列經義而順古因類表作考人心以從時詞繁而不能陳明誠端而未蒙察納徳美盛而猶蔽憲度缺而莫修罪戾是憂氷炭交集臣頎等誠惶誠恐頓首頓首臣頎等伏以先王之道由大中而可乆近古之化以彌文而益彰則守謙而為恭不如立中而垂法表類表作素樸而禮畧栁集作畧禮不如文明而化光况於文質異時而國家自有制度豈直為一王之法固以通三代之文其於規模信為𢎞逺陛下嗣訓先祖貽謀後聖當踐修以纂承奚栁集作寜變更而廢墜臣等又伏讀詔書曰遐想哲王則自燧人神農殷湯之時有其事也又曰欽若典訓則自代宗肅宗𤣥宗而上有其儀也又曰所誡者滿所尚者謙守之以誠期於終始臣等以為去鴻名而貶損謙之始也遵舊典而奉承謙之終也造次而未甞違於禮守之以誠也敬恭而無或蹈栁集類表作䧟於専所誡者滿也又曰虚美崇飾所不敢當伏惟皇帝陛下恤人之心動天之徳致理之文教戡難之武功著於頌聲光於史氏上有其實無虚美之謙集作嫌下盡其誠非崇飾之偽又曰勉一乃心共康庶政曩者公卿大夫侍御攜僕或從扞牧圉或備持戈矛盖有同力之誠而無離徳之間今者四嶽羣后九土庶邦外自藩維内及宗室黄髮耆老青衿諸儒或僉以同辭或逺而抗䟽一心之效也羣材序進百職交脩烽燧不驚兵戈以息鑽鑿不用獄訟以清六氣和而風雨時五糓昌而倉廪實庶政之康也誠由教化以致雍熈自當冠於皇王寧復謝於堯禹宜加明號以表成功陛下雖以為辭臣等未知其説又伏奉詔㫖令臣等斷表伏以君親一致臣子一例而春秋之義以王父命辭父命栁集無此二字不以父命辭王父命則臣頎等得遵先帝之典以違陛下之詔謹冒昧萬死伏請復上尊號如前不勝惶懼懇廹之至謹復詣朝堂奉表固請以聞臣頎等誠惶誠恐誠勤誠懇頓首頓首謹言第六表臣頎等言臣等今月七日所上表昨十五日下詔㫖如初辭讓愈固臣等感謙冲於盛徳而私有舊典隳廢之憂懼煩瀆於聖聽類表作聰而内懐㣲誠懇廹之切進退競惕不知所措臣頎等誠惶誠恐頓首頓首臣頎等伏以為類表無為字事貴舉其中立栁集類表無立字名惡浮於實得其中不宜變之而失正有其實不必避之以為恭况以祖宗之矩儀國家之典制陛下道尊教備栁集作教尊道備徳博化光奚栁集作辭取於貶損而自卑朴畧而太簡者也昔漢宣帝謂元帝曰我漢家自有制度諸葛孔明誡其主曰不宜妄自菲薄前史載之詳矣幸陛下思之臣等又為執小讓之賢不足以方得禮抑集作宜合度之善去鴻名之敬不足以補變法改作之専陛下行之將何所守伏以髙祖受兹栁集作其明命歴代承以聖徳至陛下又有下武繼文重熈累盛之美不可謂徳之不嗣也躬上聖之資合至神之化戡禍亂制夷狄之武修禮樂垂憲度之文不可謂實之不孚也此年以來俗化斯厚人少犯法吏無舞文獄犴將空桎梏栁集作梏拲不用可謂人皆遷善豈曰俗未勝殘若固栁集作然若辭之所未悟也况於尊號之美陛下已受於初去之既栁集作即由於艱虞復之冝因於康靖若栁集類表作徒示其罰不旌其功何以知區宇之削平何以知宗廟之紹復柳集作復祀似非陛下之本意但自欲改先祖之遺儀耳内外臣庶跋履山川思報主恩誓雪讐耻亦欲攄其宿憤表其成勞陛下猶掩鴻名不彰栁集作罔窮其事則此等有如栁集作如冇未盡不以為歡儻陛下以自咎責之心尚或未弭則羣臣不能匡輔之罪是亦栁集類表作亦當未除將何以蒙陛下之恩私將何以受陛下之爵賞君猶含垢臣以偷榮羣下之情必深反側又無以示於萬古無以威於四夷皆非逺圖且乖大體臣等懐此數者恨恨而不能自安謹冐昧萬死重違詔㫖伏請復上尊號以如前表伏惟皇帝陛下思聿脩無念栁集作忝之言顧屈已從人之義再膺大典俯狥羣心因來月謁太清宫太廟郊祀上帝遂以告祠實臣等之至誠實臣等之厚幸不勝惶懼懇廹之至謹復詣朝堂奉表固請以聞臣等誠惶誠恐誠勤誠懇頓首頓首謹言及大㑹議國子祭酒韓洄請歴數近日徴應祥瑞故又改其文如後表又伏見陛下以今年四月以來方當雩祭之脩而有旱備之請纔愆期而未害於物深軫念而將恤其人氣潛通而交感以和澤旋流而滂霈思逺由是風雨時而霜雹不降稼穡茂而蝗螟不生農功以成年糓大熟休祥數見福應屢臻仁木連理而垂隂嘉禾同穎而挺秀夀星舒景炎之盛芝草布葩英之重白麞凝彩而雪暉蒼烏取象於天色將徧於郡國相繼於嵗時右具如表京兆府請復尊號表栁宗元貞元十九年臣某言某月日諸縣耆老某等若干人詣臣陳狀辭意廹切以陛下尊號未復請詣闕上表者人心已鬱安可乆違天意實勤諒難固拒撫狀英華作伏非感悦深契㣲誠臣某誠懇誠廹頓首頓首伏惟皇帝陛下聖神之功貫於天地文武之道超乎古今盛徳愈大而謙光益深𤣥化已成而徽號未復遂使神祗觖望人庶怨思沐浴鴻澤者敢懐晷刻之安捧戴皇恩者不知寢食之適負愧懐憤萬方一心日月以冀遂淹星嵗况今地不愛寳致百糓之豐穰天惟降衷呈衆瑞而繁委汙萊瘠鹵之地混成大田草木蟲集作鳥獸之㣲化為神貺萬靈垂鑒昭然甚明此而不從臣所大惑矧又兵戎永戢夷狄咸懐煦英華作照非然長春樂以終日是以耆老等深感聖育踊躍不寧上奉天心集作恩跼蹐知懼頓顙闕下願復鴻名不謀而同無期而至此皆上𤣥幽賛以誘其衷列聖垂靈以悟其意臣以為陛下當敬于類表作承斯㫖不可忽也臣又伏以陛下賞功與能舉賢出滯小言不廢片善是褒豈可使臣子之効雖㣲而必旌君父之徳盡美而無稱凡在覆載孰不驚惶臣不勝懇到恐懼之至謹封耆老等狀随表昧死陳請以聞謹言第二表臣某等言臣伏以耆老等並發丹誠將貫白日請復徽號以光聖謨臣以其懇欵自中不可禁止遂抗表陳請備述㣲誠伏奉墨詔批答未蒙允許者衆心尚阻天意未從懇廹逾深兢惶無措臣某中謝伏惟皇帝陛下道大益謙化成彌損雖江海善下每應朝宗之心而日月居髙久稱照臨之位况復上承天命下覩人誠若然辭之理有不可伏以陛下功參造化政體乾坤萬邦宅心百靈効職此聖之至也明並兩曜信如四時先天不違窮神知化此神之極也道徳純被禮樂興行宸翰動於三光睿藻窮於六義此文之備也五兵不試七徳咸宣殊方者知歸負固者率服此武之成也黄龍皓兎甘露慶雲神禾嘉𤓰祥蓮瑞木萬物暢遂百穀茂滋此天之至靈也黎老斑白伏守闕庭鰥婺矛牙童㓜謡歌道路此人之至誠也有其徳而無其號拒乎天而違乎人雖陛下謙讓之至美抑非臣心之所安也伏以賤志難明㣲誠莫逹戴天彌懼履地益慙不任懇廹屏營之至伏願早建大號以稱天人之心謹再奉表昧死陳請以聞代京兆府耆老請復尊號表京兆府長安縣耆老臣石靈等言臣伏以陛下尊號未復一十九年盛徳彌光大化益被加以休徴咸集福應具臻至於今嵗紛綸尤盛風雨必順生長以時五稼盡登萬方皆稔神意類表作應人事正在於斯天不可棄臣等誠懇誠廹頓首頓首臣聞恩深必報徳盛必崇以陛下九重之尊推崇無上以陛下四海之大報効何施惟有尊名用光聖理闕然未復誰所敢安臣心則㣲天意甚重伏惟皇帝陛下體昊穹以施化虔上帝以致誠今則集作即萬祥應期百神奉職飛走之物皆已効靈草木之類咸能應聖天命降於上人誠發於中此而可辭孰云有奉况復野多滯穂畆有餘糧足食之慶充溢於京坻阜財之謡歡呼於道路盡非人力皆是天成神祗之望既勤遐邇之心又廹况臣等得生邦甸幸遇盛明身體髮膚盡歸於聖育衣服飲食悉自於皇恩被𤣥化而益深望鴻名而未覩懇到之至夙夜不寧謹詣光順門昧死請復聖神文武之號以副天地宗社之心使海内赤子得安其所臣等不勝懇到廹切之至謹奉表以聞第二表京兆府長安等縣耆老臣石靈等言伏奉墨批答臣所請復尊號未蒙允許者捧對惶遽不知所裁天實命之於臣何有臣等誠懇誠懼頓首頓首臣聞聖君以奉天為心不以執謙為徳以順人為大不以崇讓為優今陛下深拒天人之誠猶懐謙讓之道臣等愚惑未知所歸且百祥荐臻特表昊穹之睠五糓蕃熟用彰后土之勤億兆嗷嗷籲天請命上下交應幽明同心舉而違之臣所未識况臣等共被仁育同臻太和陛下徳逹上𤣥以豐臣之衣食道躋夀域以延臣之嵗年沐浴皇風二十餘載兒童感化鰥寡知恩故臣等出鄉之時歡呼遍野閭里勉臣以不進不止妻孥誓臣以不遂不歸唯竭血誠退無面目便當殞首闕下終不徒還伏惟陛下照臣懇廹之情哀臣羸老之命臣等不勝嗚咽慚恨之至謹奉表陳請以聞禮部為百官上尊號表永貞元年臣某言伏以聖王之纂承天位也臣子必竭懇誠獻尊號安敢為佞禮在其中一則以告天地神祗二則以奉宗廟社稷三則以安華夏蠻貊巍巍大稱其可廢乎臣等誠歡誠望頓首頓首伏惟皇帝陛下叶周文之孝徳齊大禹之約身𢎞帝堯之法天過殷湯之解網未逾周月四海將致於時雍甫及元正率土更欣於再造然而神人之願億兆之情有所不安率謂未盡善者以為帝徳廣運而尊號猶一作獨闕郊廟備禮而祝嘏無詞凡百競懐華夷屬望臣謹按昔臯陶之頌舜伊尹之頌湯皆臣子至公面揚君父以敷於當代以播於無窮夫豈飾哉率由事實帝王尊號盖漸於此皇家光被四表祖宗烈文時當太和徳崇明號類表作崇號表徳耳目所接簡牘斯存稽之於前典則如彼考之於聖朝又如此今龜筮習吉元正戒期當品物惟新之時乃皇上大禮之日陛下交天地饗宗祧隂陽協和動植交暢不建至尊之稱恐違列聖之心所以臣等冒責集作死陳聞請上尊號伏惟陛下抑集作小謙讓之節安延企之情特詔名儒禮官百寮庶尹詳明故實議崇聖徳則人望允厭神心獲安山川効靈光贊無疆之夀祝史陳信永彰不朽之功臣等蒙國寵榮備位班列無任懇望之至第二表順宗臣某等言臣等再陳丹懇請獻鴻名天心未從伏増隕越集作隕越無措臣某等誠惶誠恐頓首頓首謹按堯曰咨爾舜舜曰格爾禹湯曰吾甚武自號曰武王則堯舜禹湯皆當時王者之號也考帝王之故實徴徃聖之憲章允協禮經煥乎圖牒伏惟皇帝陛下允恭克讓約已謙尊參天兩地之功為而不有安上理人之徳置而不論此至哉王言非羣下所能仰望也然臣等伏以為尊號所以類上帝饗祖宗萬人所稱百蠻所仰表聖徳於率土播天聲於無疆臣下請之之謂禮帝王允集作承之之謂孝孝大於讓禮光集作先於謙百王不刋之典安可得而廢也臣等又以春秋本於五始元者五氣集作一嵗之首春者四時之首王者受命之首正月者政教之首郊天大禮者立極之首今天地交泰俯臨元辰正始之美正當其運陛下確違羣願固守謙冲此臣等所以兢惕失圖回集作徊惶無措上冒嚴憲敢逃厚責伏乞俯賜集作垂天聽察納㣲誠特詔禮官議臣所請揆日推筴虔奉鴻休區區懇誠期集作敬盡於此猶恐天光未照三獻無徴彷徨闕庭伏待斧鑕無任聳望之至此卷英華所編失年代先後之序今正之文苑英華卷五百五十五
