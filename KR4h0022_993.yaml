body:
  text: 文苑英華卷九百九十四宋李昉等編親族四祭妻文二首祭姨文一首祭姊夫文一首為崔氏姊祭大夫何郎文二首祭新婦文一首雜祭文九首祭亡妻博陵郡君文獨孤及大厯八年二月十五日檢校司封郎中兼舒州刺史獨孤及謹以清酌菜果之奠敬祭于故博陵郡君之靈嗚呼及顧惟鄙薄謬忝合好采蘩助祭歲時未幾執手偕老昊天遽奪齊體苦晚遺跡太早猶未知夀域有涯短長已臻其極耶將薄祐速釁冝為淑明所棄耶屋壁挂存琴瑟響絶修法勤集作勸義今將疇依日月有時龜筮何集作告協將陟集作涉故路祔于先塋及為印綬所拘不獲親自封樹豈虞此别死生間之往歲方舟偕來今也單輤獨歸郊岐不集作一慟心骨可絶頃者萬事無非去塵變化茫茫往矣何道今日巵酒將抒永别尚饗祭妻李氏文符載坤道尚順婦德尚柔於維夫人璨璨寡仇玉樹易摧慶雲不留零落當年職此之由禮云胖合意不為薄矧余於子既和且樂一朝已矣百端無託穆穆中闈從兹寂寞常日和鳴尚為邈然此别如何遂欲終天夏木蓋庭新隂芊眠美景如舊孤魂不還同穴相從乃曰義全斯言旦旦神無懵焉祭楊夫人文白居易維元和三年歲次戊子八月辛亥朔十九日已已將仕郎左拾遺翰林學士太原白居易謹以清酌庶羞之奠敬祭于集有陳氏二字楊夫人之靈惟夫人柔明理集作治性溫惠保身靜修言容動中規度洎承訓師氏作嬪良人茂四德而蘭幽有香潔百行而玉塋集作仁無玷發為淑問著為芳猷姻族有輝閨闈是式噫福行集作仁何昧積慶無徵冝享永年遽歸長夜浮生若此永痛如何嗚呼生必有涯如何不殁所甚感者其惟情乎故事劇者情易鍾深感者理難遣夫人雖從冝集作冝其室竟未辭家畜和順之誠不得施於娣姒藴孝恭集作之德不得展於舅姑有志莫伸何恨過此况一嬰沉涸自夏徂秋伏枕七旬姊妹視疾歸櫬千里弟兄主喪凋桃李之花夫逺不見失乳哺之愛女小未知其集作乃使哀情倍鍾血屬洛川迢遞秦野蒼茫日慘不見雲愁無色妹孤集作姊妹且病親老尤慈哭别一聲聞者腸斷居易早聆懿範近接嘉姻維私之眷每深百集作有一慟之情何已恭集作敬陳薄奠庶鍳悲誠尚饗祭徐姊夫文李商隱嗚呼以君之文學以君之政術幼以自立老而不倦亦可以為君子人矣君子人歟而不即清途不階貴仕此其命也夫何慊焉始者仲姊有行獲託貴族半産以資於外姓闔門冀託於仁人將以衰微倚為藩援不圖薄祐天奪初心仲姊凋殂諸甥不育以親以懿翻為路人再號再呼莫訴蒼昊尚以君子存伉儷之重敦行李之私二十年已來雖事賖而意通跡遙而誠密神當賜集作自鍳愚豈敢忘逮愚不天冉丁凶釁泣血偷息餘生幾何君亦赤紱銀章浙東從務道途悠邈時序徂遷訝弔緘之不來忽訃書而俱至感舊懷分情如之何埋玉焚芝固未可喻嗚呼今來古往人誰不亡於君之亡其酷斯甚藐然一女才已數齡乞後旁宗又未曽立賢弟扶服東路遇疾洛師徘徊十旬淹不得進浮泛水陸厥途四千逮旐云歸曠然無主尼姑居宗老之地􅀈集作騶奴揔家相之權獲及故阡信為餘慶其所以為祔禮記作附下同身祔棺之具又豈礙平生之曠達耶日月次遷卜筮斯叶幽明之異始於今辰愚方纒哀憂瘵恙縻寢不及一攀宰樹一慟荒阡謝淡成之交申永訣之禮矧余仲妹君其與集作與歸撫心骨以皆驚抆血淚而何算嗚呼巳哉其何言耶禭衣非華奠物殊薄靈其監此慰我哀心嗚呼哀哉尚饗為崔氏姊祭大夫何郎文符載嗚呼莫莫女蘿縈紆葛藟我有弱妹克配君子關睢之化夫婦之始禮奉籩豆義濟死生常恐寡訓昧章懵理夙夜針規庶無愧耻結䄜成婚垂三十春樂踰鼓瑟敬越如賔才盛道貴為唐碩臣擁旄樹羽夏水之濵鼎食錦衣長㦸朱輪宗旅百口庇公清塵浩浩陂池常為無津坊崩水涸哀此窮鱗嗚呼序當仲姊自慙踈昧用禮過恭豐家甚泰良辰美景長幼髙會錯落圓方抑揚盻睞神理如何杳杳茫茫朝榮夕落使人摧傷言自漢江將歸洛陽喪旗旅櫬親墳舊鄉苟可薦誠蘋藻馨香感深恩而何報寄沉痛於孤孀為錢侍御太夫人祭新婦文前人嗚呼婦姑之間尊嚴而已情苟不至兩城千里吁嗟新婦德禮具美心之所親如臂有指齒髮衰暮方用依倚天降鞠凶骨驚心死新婦門緒薰華𣲖流深逺貞淑端一聰明婉娩奉余以敬待夫有則舉案得如賔之禮均養實鳴鳩之德勤勞絲枲吉蠲酒食自中閨之與外姻莫不盡其心力嗚呼爾之事吾善非一端柔聲順色迎意承歡晨雞初鳴風髙露寒環珮至止我心則安今也年高人間意闌爾復捨我窮泉杳漫房帷空虗孤稚摧落深沉注視焦然肺肝嗚呼鄉關迢遞道路乖阻權厝兹地非為永處夀堂猶近如聞晤語靈其慰安無或羇旅撫棺永訣持觴奠醑寫一慟於髙秋望素車以延佇雜祭文為岐集作伎下同人祭元十郎文張說維神龍三年月朔日故岐人伏十善謹以清酌少牢之奠敬祭于元十郎之靈緑水集作流茂樹藻集作萍蘿是依山崩川竭魚鳥何歸恭惟主君髙才逹節賞心樂事風流不絶歌艷露華舞回春雪幸持此技承君餘晚綺羅脂粉嬌上春自言終代保集作實情親能知一日集作旦君魂集作思斷繁絃清管為何人懷主君之一集作異顧願狥命於九原迫夫人之嚴㫖遂投足於他門生有十年之愛况無數日集作爰無一日之恩雖強飾容集作容飾於新奉心摧絶而不敢言君子廣德仁心必遍疇昔與君琴樽歡宴永懷蕙歎俯憐荼苦錫以時珍申哀故宇廞車既展祖奠斯開悲歌助挽長䄂承杯平居好此魂來不來心思往而莫遂足欲返而遲回終天地於此訣毒煩寃而難裁嗚呼哀哉尚饗祭和靜縣主文前人維年月朔日敬祭薛氏太夫人和靜縣主之靈惟夫人軒庭繁祉嬴臺茂淑承訓公宫冝家卿族博士學問集作築尚書題目法度蘋蘩刑儀集作儀刑松菊夫拜中令昔同鮑婦子升璅闥今類馮母舉案如賔䦱門戒友在貴能降居貧施厚天道初革王風變韶維城落構若木踈條欽聞積善智洽仁昭克庇二族命服兩朝肅肅柔禮集作和如風是暢峩峩集作娥女師如月斯望潘輿獻夀仲祿方養不弔昊天何德之喪嗚呼哀哉洛邑啓殯長安歸陌哭慟髙堂集作臺旌懸舊宅階濕夜露庭隂曉魄嗟我外姻俱成弔客為留守賈尚書祭嗣曹王故太妃文穆員維年月日某官某乙謹遺某官某以清酌少牢之奠敬祭于荆南節度觀察使户部尚書兼御史大夫嗣曹王故太妃之靈名山大川列于祀典以其所育能利於人恭惟太妃享用元福乘運之啓受天之終間生親賢為國藩屏人賴德施祀之攸冝樂貴自生禮宗其本維厥分閫資於卜鄰報我以榮則公侯其位養我以志則嬰孩其心如何風樹之悲遽奪晨葩之慶哀哀嗣王泣血終制既及先逺疚焉如新中貴護喪有司備物詔臨祖奠弔集同盟風物含悽簫笳啓路泉扉一閉松月千秋黍稷非馨精誠所至尚饗為杜相公祭易棣張相公太夫人文符載熊羆之門將大而榮必有令母贊成家聲於維尊儀涵懿禀靈德補隂教言為婦經輔助司空淑茂芳馨大君有命啓封于邢冝保攸長既休且寧鞠凶何謂鍾我天齡英英家疑作冡子少年杖鉞身靜邉封世間忠節孟軻賢聖陶侃勳列實由二母卜鄰截髮端揆承訓事君禮竭知與古人異時同轍杯圈猶澤扇枕永訣創巨痛深茹荼泣血某以拙薄叨鎮藩維偕分天子之茅土共列太常之旌旗歲月崩迫窀穸有期拘以戎事無因載馳風景蕭索山川逶迤遣蘋藻以寫慟瞻夀堂而凄其為魏元忠祭石嶺戰亡兵士文張說維長安二年月朔日勑并州道行軍大總管兼宣勞使左肅政御史大夫同鳯閣鸞臺三品兼知并州事魏元忠遣裴思益以酒脯時果之奠致祭于石嶺戰殁兵士之靈邉𤇺漫天南牧吠主石嶺橫地北都扄户興集作與我王卒保界并圡如何不弔罹此冦虜列鎮既嚴連巖既削攻則路險守非惡滅集作城惡彼謀匪臧實愆偕作援絶兵减軍孤勢弱地拒兩陘山望雙㠋風塵天起白刃交錯石盡矢窮旗焚胄落嗟爾戰夫烈烈忠勇奮不顧命志無旋踵身殁名揚生輕義重天子命我理兵普陽思與士衆底寧遐荒痛兹壯士翦為國殤盍訴天帝降厲鬼方助氣金鼓復怨沙場虜血爾酹虜醢爾嘗封尸死所招魂故鄉尚饗為魏元忠祭石嶺沒陷士女文前人維長安二年月朔日勑并州道行軍大總管兼宣勞使左肅政御史大夫同鳯閣鸞臺三品兼知并州事魏元忠遣裴思益以酒脯時果之奠致祭石嶺死亡百姓之靈北蕃自擅賊虐不道氣悍朔風馬肥秋草侵軼郡縣驚逼稚老奔走山林是賴集作障是保兵不善守將不逺謀如何减䆴無復燒牛侔爾士女熸于冦讐魂飛鋒刃血送氊裘傷悲雨哭氣怨天愁總兵帝鄉言念北阜抗憤朔漠傷心按部泣弔郊童哀問田叟為爾復惡誓滅羣醜蹴踏蘭山脂膏葦藪誠若克就歿亦不朽慰爾衆靈醉此簞酒尚饗祭歿將文為杜尚書梁肅年月日某使某謹以清酌之奠敬祭于夀州鎮遏十將何鄭江某官三士之靈嗚呼勤身奉主之謂忠臨敵致果之謂勇以死成名之謂節惟此三士具兹三美昨者封境不靜寇竊斯興集作受春各領軍行以當扞守山谷積阻矢石相陵謀無所用志必有死遂使勇集作英氣挫於小醜雄心屈於短兵人之云亡斯害也已嗚呼哀哉我居藩鎮不能守在四鄰爾有忠勳遂乃沒于集作於一戰且憤且歎激于中腹集作腸是知以今辰旋定歸夀集作旋歸夀陽爰遣奠酹用申悲凉加爾贈賻恤爾孤孀魂而有知知豫不忘人誰不終所貴名揚已矣三士俱為國殤嗚呼哀哉尚饗衡州祭者集作拓里渡溺死百姓文吕溫維元和五年歲次庚寅十月戊辰朔十七日甲申刺史呂某遣故衙前虞候何防以豚酒蔬果二字集作之奠致祭蘇升陳演李寬泰陳甫魯餘之靈爾等五人感余誠信力輸公稅爭赴先期溪山阻深潦水集作淫潦暴至不忍欺我忘其險艱州令未明津渡不謹致此淪逝咎由使君興言涕流痛念何及聊申薄酹兼致微贈代納殘稅皆余俸錢魂而有知諒此深意尚饗道州祭百姓鄧助費念文前人維元和五年歲次庚寅五月庚子朔七日景午刺史呂某遣衙前虞候蔣洛集作沼以酒脯之奠告鄧助費念之靈使君受命牧汝不能庇護使賊孟鸞等敢作不道酷加殺害是用疚心疾首萬計討擒亷使仁明不貸凶惡窮泉寃痛今日方申慙念無及澘然泣下故令於汝歿處陳賊之尸魂而有知歆此告酌集作酹嗚呼傷集作哀哉文苑英華卷九百九十四
