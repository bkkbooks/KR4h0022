body:
  text: 文苑英華卷十五宋李昉等編天象十五秋露賦一首露賦一首五色露賦四首清露點荷珠賦一首湛露晞朝陽賦一首秋露如珠賦一首秋露賦李鐸天何言哉萬化斯該嵗云秋矣傷心不已起涼風於四面飛斷雲於千里爾乃髙天氣爽寒日光清下翠樓以回矚見白露之晨生向珠網以添淨依玉階而助明如霜未結似雨還輕點庭蕪而葉重滋園菊而花榮歌湛則周詩入興凝甘則漢載留名故色貴含秋光冝泛曉既騰文於地上復垂容於筆杪煙淡彩而的的月籠華而皛皛豈只華山之際童子受於囊中金莖之端仙掌承於雲表况乎胥臺發色軒丘降祥紅蘭受而彌潔緑葵含而轉芳初益巨海終晞太陽既隨時以隱見還任物以行藏爾其無林不沾無草不羃薤上流彩林中湛液思蟬飲而曉潤旅鶴警其宵滴詞人賦矣已凝冷以淒清君子履之又傷心而怵惕感斯露而揣稱愧才殫而莫析者也露賦張彥勝夫露者隂陽之精氣也天地之靈液秋冬濁而春夏清晞於朝而生於夕隨時應變不凝不積遇物受彩因象而光滴滴瀝瀝熒熒煌煌爾其為大也澄九天而靜六合爾其為廣也清四極而灑八荒故能消歇氛埃生成草木羃䍥千品霑濡萬族其澤厚矣其潤深矣願聞其始試言厥初兆自元氣生於太虛巨人飲之而不死上古吮之而穴居天無雲兮珠的皪野有草兮玉扶踈寫蟲鳥兮為篆懷蛟龍兮著書河洛建都兮氣均風雨甘泉築館兮名亞儲胥或泛灔池臺或葳蕤竹柏鶬鶊鳴兮色紫鴻鴈來兮光白露之為德也天乙所以為王侯露之為文也詩人所以歌召伯既因甘而作頌稱未晞而留客是時鷙鳥初擊鳴蟬向晚悲九節之相催恨三危之路逺或乃幽閨織婦初下鳴機徘徊空院悵望秋暉洞房月入羅帳螢飛看鴻鴈之將度怨良人兮不歸灑交頥之玉筯苦寒露之沾衣至如開疑作關山氣寒瀚海風急塵驚壠塞兵屯馬邑征人此時思歸下泣不覺漣如沾我衣濕别有洛陽才子人間一作河間秀士逺自巖曲來遊學市有恨驚心無人知已聞墜葉而嘆息對浮雲而愁起恓恓兮恍若有亡此句疑有闕文覩蒹葭之蒼蒼惜白露而為霜宋大夫聞而嘆曰嵗乎不我與一寒一暑昔時春晚拂楊柳於南津今日秋深落芙蓉於北渚古人末逹平生羈旅君何為而絶絃敢知音而相許重曰白日黯黯兮秋風多緑川蕭蕭兮空水波聞郢中之有曲試調露而為歌歌曰天降氣兮地凝精皇德茂兮芝蓋平金盤漬兮玉杯清葉有露兮落有聲遼東之鶴中夜驚日南之雞凌晨鳴華山柏兮多珠露松子服之得長生五色露賦以率土康樂之應為韻白行簡惟上天之隂騭至誠感通靈液肇吉能分五色之異以候一時之出祥風爍乎茂草瑞景晞乎朝日玄黃雜錯綴玉樹以相鮮丹紺交輝映金盤而乍失既能偶聖以呈貺寧有普天之不率飛液花塢流光蕙圃青熒玉綴燦爛珠吐露藥訝仙童捧來潤石疑女媧欲補花禽拂著宛如陳寶之雞平野染成焕若徐方之土當其金烏戢耀玉兔騰光夜寂空知警鶴寒輕猶未為霜徒想狀天酒類神漿豈辨彰施而披棘尤分雜錯以沾裳滿林嶺而霞駮遍莓苔而錦章自然鬱為天祚慶我皇唐何必徵勒畢之言以為國泰驗吉雲之説乃辨時康嘉其風中煜爚空際浮爍綴瑶草以紛敷泫庭柯而照灼彼瀼瀼刺其感歎此湛湛歡其宴樂徒用興其詠歌曽何覩其交錯未若含瑞表德耀彩逄時乍綺分於彼或星合於茲為隂陽之淳粹作花木之葳蕤喜氣度關徒虛語耳雲光出水曷足方之是知天降休祥聖為明證淡汪濊之仁澤得文質之善稱天何言哉固有感而善應第二同前韻賈餗露彩呈祥厥狀非一表四方之其慶故五色而俱出間朱青以騰文雜玄黃而成質則沐聖澤者疇敢不祗被湛恩者罔有不率大化式孚瑞物斯覩究其源兮則一分其色兮惟五曖空之際若麗非煙之祥潤塊之時如啓建侯之土神化無方至精宣光且見凝夫渥彩孰云晞以朝陽雖有本於三危三危不得不比諒無當於五色五色不得不彰豈直超絳雪掩玄霜空挹瀼瀼之靈氣酌湑湑之神漿始也結以成形自東方而轉色今也出於協慶猶上天而降康則知時在中和何物不樂超飛走而為瑞與風雨而咸若不資揭以金莖寧假承於瓊爵錬石初染狀媧皇之補天鴛瓦才霑類彩鳳之巢閣在漢武時方朔陳詞涉吉雲之異境得五露之靈滋曷若我后統寰海之有截應天地之無私包衆瑞之備矣選列辟而觀之自然隂陽降祉天人合應吸沆瀣延楚客之情詠厭浥動詩人之興若以彼而方此曽不得侔色而揣稱第三同前韻王起露表嘉瑞國昭元吉發五色以斯呈掩百祥而非匹輝光駭目知泛灔之惟新變化殊姿覺淒清之有失若非澤無不被化無不率則何以感之於寥天榮之於聖日爾其寂歷地表希微天宇無聲而零有色斯覩始曖空而雜糅俄泫草而周普霑於衣也皆成黼黻之衣潤於土焉更謂苴茅之土且其白能受彩朱則孔陽青映苔而轉麗玄點漆而有光既炫耀於衆彩終錯雜於中黃儻在琉璃味無忝於甘醴如浮葭菼色詎變於凝霜何湑兮之膏潤有焕乎之文章固可以扶夀而愈疾俗泰而時康徒觀夫泥泥未晞瀼瀼既落珠彩點綴日華照灼無煩勒畢之求方成曼倩之樂散東陵之上乍混其瓜灑西山之中更迷其藥其凝厭浥其布葳蕤鶴將警而未測蟬欲飲而猶疑何紺霧而喻矣何卿雲而比之則知墜露成文休祥有證實我后之冥感掩前王之嘉應第四同前韻袁兊上帝宥密露滋貺吉青紫相宣玄黃間出湛鮮輝以交透涵潤彩以爭溢搖泫泫於微風散離離於初日滴而成暈冝警鶴之偏聞感以無情勝舞獸之能率被萬物之咸覩表天心之以溥識瑞氣之非二辨方來之自五洗於石如披媧后之文遍於地似割封侯之土合德於唐成金之黃鳥晨散而翻墜煙晴籠而轉光既桂成於重葉亦珠綴於垂芒契之斯來我則調玉燭而後致求之靡得彼則耀金莖而莫量是以其邦用昌其人用康誠可以為飲不可以為霜其離絢兮其濃沃若遐矚文象旁通綺錯狀郊祀之琮璧燦以芬敷擬霄漢之雲霓焕乎蕭索固自天而同酒諒不醉而可樂其甘如飴其凝如脂苟叶于道不常厥期在春而衆葩皆麗或秋而羣蕪更滋彼露瀼矣我王則之接荷光兮渥蓂莢連碧砌兮滿階墀旁霑兮對龍衮之彪炳芬映兮逼鸞鳳之葳蕤始繁於天臨之際終晞於日旰之時足使魏殿懷慙漢宫非勝多聞前後之仙術豈逮吾君之響應願濡翰於攻文之徒庶發揮於夢筆之興清露點荷珠賦以題為韻池有秀冠衆卉兮彼荷最英天之氣結淳和兮惟露斯清圓規覆水兮翻然蓋傾素質積葉兮炯爾珠明露非荷無以呈潔已之狀荷非露無以異先凋之榮皓影搖光修莖羃疑布氣散蘭郁光分雹聚鄰腐草為螢火將飛俯澄波若蠙珠已露冝瀼浥於夜景惜芬芳於嵗暮縹綵將闌瓊光未斂團素律以泥泥擢餘芳之冉冉映翠帶狀蓮的之剖開對青霄仰星文之亂點色慙兮菱藻氣肅兮金波雖有秋月我則承恩於彼露豈無朝日我則庇身於此荷尚不願灑園葵而澤豐草豈學老林葉而滋枯柯客有感秋而嘆曰滴瀝縈紆布濩芬敷浮地一作浮池煙兮葳蕤吐絳點天酒兮璀璨垂珠已矣夫露欲變荷欲蕪君不見嚴霜降萬物皆盡兮復有此芙蕖湛露晞朝陽賦以諸侯來朝錫宴具醉為韻張勝之陽暉早曙露泫清宵宵既寂而露彩結曙將動而陽氣消是以在蘭者照之則焕乎葉在棘者燭之則晞乎條故乃喻天子布澤於宴猶諸侯命朔於朝觀夫潤草瀼瀼晞陽羃羃氣色濃兮猶茂枝幹燥兮如滌初將比玉以減其琳璃稍欲如珠復消夫玓瓅故可比臣竭忠以祗敬君降恩而蕃錫及夫大明有赫五色初收陵晨光動平野氣浮遂使將飲之蟬驚陽烏而復退罷警之鶴懼白駒而不留出扶桑兮始上被豐草兮徒周何異夫錫宴則臨乎我后來朝則嘉彼爾侯原夫曭朗之光未舒沾濡之色猶遍忽其陽氣匝晴風扇則滴而有響者其響罷聽布而成文者其文難見夫如是有類藩臣感化而來覿中朝布德而成宴彼以朝為數此以夜為初夜則因我而隂勝朝則因我而陽舒其凝也無不備矣其晞也曷可藏諸况有麗天之暉潤月之意崇其燕禮著乎前志朝日出海若一人之當陽夕露低柯若羣臣之既醉天晴夜朗林霽煙開稽其順陽之心既且周而復始懿乎漸晞之理又觀往而知來所以為成嵗之本履霜之具華葉既濡清光若煦吾知湛露晞朝陽也為君臣宴饗之喻秋露如珠賦以涼風變節凝露可觀為韻師貞風入秋而方徑露如珠而正團映蟾輝而迥列疑蚌剖而俱攢綴别葉之中時翻的的轉衰荷之上微振珊珊虛靜內瑩圓明外寒且驗目前之美何殊掌上而觀懿夫寓物成規效微應節含緑葵而結緑方麗耀黃菊而中黃轉徹落蒹葭之浦誠媚川而可移泫庭宇之間雜照廡而何别所以未逢朝溘還著夜光當助海而為深功雖至薄蒙沉泉之是棄德且非涼比蟬飲之為狀與蛇銜而允臧發澤之道素昭結霜之儀漸露咸欣遐被之德寧起暗投之怒遙瑩空際思縹眇之金莖散照林中謂璀璨之瓊樹宛轉無窮精明有融乍見紅蘭之內如尋赤水之中稍迷徑蔓偏入園藂每袐彩於晝景何流形於夜風時也草始化螢星逾流火叶物候而增美信晶熒而必果想遊女於水上訝鮫人之淚墮降自天而任彼無私照於乘而孰云不可湛湛方積纍纍正凝彌增皓鶴之警不憚驪龍之興逺睇平蕪俯首而鮮苗益潤俯觀朝藿傾心而靈液是承嗟乎彼以少而為貴此以多而豈賤遇沾衣而未化如被褐而初見其克好以員來孰若順隂而適變文苑英華卷十五
