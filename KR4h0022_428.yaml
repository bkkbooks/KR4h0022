body:
  text: 文苑英華卷四百二十八宋李昉等編赦書九禋祀赦書五太和三年十一月十八日赦文編制門下王者祗見宗廟情極於孝思肅事郊丘義崇於嚴配諸侯駿奔以助祭百靈肸蠁而降祥感達神明詔令作祗斯為茂範朕以冲昧獲嗣丕圖奉纍聖之耿光承上天之眷命以簡易𢎞宣政本以勤儉調順化源宵旰勵心思臻至道兢業寅畏于今四年屬興伐叛之師未暇燔柴之禮賴祖宗保祐上帝監臨氛慝澄清弓戈槖戢今因南至有事圓丘薦誠敬於二儀申感慕於九廟群祀來享至誠必通既陳信以告䖍宜覃恩而廣澤可大赦天下自太和三年十一月十八日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不原者咸赦除之唯犯惡逆已上及故殺人官典犯正入已贓不在免限左降官量移近處已經量移者更與量移如復資者五品已上中書門下速與處分六品已下即任依常調選丁憂去任服闋日亦與量移如有親故在上都任於所司陳狀便與處分不必更待本州府申請别勑因責授降資正官員未經改轉者量與進改亡官失爵放歸不齒者量加收叙縱元勑云終身不齒者亦量與收叙流人未到所在及已到者竝放還唯降死徒流者竝與移近地如已收叙者量才録用并僧尼道士移𨽻者亦與改還得罪人已亡歿家口未許歸者一切放歸如有情願留者亦任諸色得罪人中如先勑云縱逢恩赦不在免限者并别勑安置者亦竝委中書門下量事狀輕重節級處分左降官及流人先有官者如已亡歿各還本官流貶人及諸色得罪人所在身亡任其親故收以歸葬仍仰州縣量給棺櫬優當發遣諸色人中有痕纍禁錮及逃匿者一切竝與洗滌常參官及諸州刺史有先因停替及以病解免并終制未授官者委中書門下量才進擬勿令稽遲已才命士所貴任賢黷貨鬻官深為貶法縱思寬宥亦慮惠姦其有僞官出身人近已從流者與移近處未處分者减等處分未發覺者賣官買官人竝仰赦書到後一月內於所在納官告陳首得免其罪如不陳首者已後事覺不在免罪限封畿之內供億常殷既渥恩宜加霑給其京兆府明年夏青苗錢宜放一半財貨之司姦屈皆有切資政一作踈理以遏幸門應度支鹽鐵户部三司所管諸色官吏所由人户等缺負太和元年已前諸色錢物斛㪷等各委本州盡理勘實如是貿易招狀入已隱欺即凖條處分如緣收貯年深盤覆缺拆水火深藝事實有憑如此之類除檢責家産及攤徵元保外如實無可納空掛簿書連年囚禁者宜各具色目聞奏河南諸鎮仍嵗兵荒百姓困窮宜有蠲免其鄆曹濮淄青兖海及滄德管內齊州明年夏稅錢每貫放二百文其稅子每畝十分放二分諸道方鎮自兵興以來或緣進奉助軍或緣本道徵發務求濟辦多是權宜今冦賊既平中外無事宜申典法以救傷殘天下除二稅外不得輒有科配其擅加雜槯率一切宜停仍令御史臺及出使郎官御史并所在巡院嚴加訪察自滄景用兵所在逐急須借諸州常平義倉斛㪷權充軍糧宜令度支勘計速遣收糴填數聞奏邉防至重悉宜有素器械倉廪尤須精實比嵗有司屢以營屯奏報納計諸鎮儲蓄合支數年尚恐主吏欺罔未加約束宜委度支與本道節度及營田使仔細勘會自營田已來所貯糧見在倉者多少支得幾年軍糧具實聞奏又緣邊諸鎮兵額虛實器械色目亦仰聞奏如涉虛謬本判官必加懲責有缺闕當議添置務令托實無掛空文纂組文采貴貨勞人奇技淫巧蕩心喪志將欲導其儉朴必在抑其華飾率化天下先自朕躬應緣乘輿服御宫禁詔令作宗廟供須一事已上當從儉約自今已後四方竝不得輒以新樣難得非常之物為獻其機杼織作有纎麗尤甚若花絲布繚綾之類及幅尺廣狹不中常度者竝宜禁斷仍仰天下州府勑到後一月日內所有此色機杼一切焚棄訖聞奏并委觀察判官嚴加檢察犯者以故違勑論縣令政切親人糾曹職當舉轄命於選部非不擇才比者令常參官得各舉縣令所舉不當雖有明文法既因循遂開僥濫自今後宜令諸州刺史及本道觀察使各舉管內堪任縣令録事參軍者仍須資考相近并據缺申奏所舉官如才職不稱刺史書下考如至贓犯闕刺史停見任觀察使據事輕重臨時處分如政事修舉課第殊尤亦當明賞以觀能者立法之意使人不移茍移用之有名在公費而何害天下州府兩稅占留錢每年支用各有定額其回錢羡餘凖前後赦文許充諸色公用長慶四年二月三日制亦具言緣無分明條件可使執守刺史每被舉按即以坐贓論須為立程俾無甚弊其州府應合公用羡餘物并因循舊例與格令不同者竝令尚書省御史臺明立條件散下州府使知所守永可遵行緇黃之衆蠶食生人規避王徭凋耗物力應諸州府度僧尼道士及創造寺觀纍有禁令尚或因循自今已後非别勑處分妄有奏請者委憲司彈奏量加貶責其百姓中有茍避徭役冒為僧道所在長吏量為科禁古者理戎皆舉成法將卒有制簡閲有時所以籍無虛名軍無冗食至於符守各奉詔條諸道先發轄屬支郡將士如聞衣糧解補猶繫使司詳其事理頗非簡便宜委本使差官檢元轄名額及賜糧等第文案與刺史勘會除續凖詔勑抽停外據所合給錢米竝以當州合送使錢米依虛實糙熟分數拆計割入留州錢數勘會訖州使各具分數聞奏應闕解補支給并委本州其使司更不緣得收管諸道諸州所置將吏如非原額周事之外各隨閒劇務從簡省方鎮刺史在京除官所須收補隨從人數有司即為節限他時替罷仍令隨使停解其方鎮交代之時及知留後官不得輒有一作又補置如違委巡院官具事目申臺司録奏其違犯官重加科貶所補人并本職停解刺史職在分憂得以專達事有違法觀察使寧不糾繩四字詔令作然後舉奏頃年赦令非不丁寧如聞逺地多未遵守州司常務巨細取裁至使官吏移攝將士解補占留支用刑獄斷結動須禀奉不得自專雖有政能無所施設選置長吏將何責成宜委御史臺及出使郎官御史嚴加察訪觀察奏聼進止本判官不能匡正及刺史不守朝章竝量加貶降若所管州郡控接蕃夷軍戎之間事資節制須得使司共為條理即不在此限邦畿之內物役殷繁事茍不均人何以濟如聞近年以來京城坊市及畿甸百姓等多屬諸軍諸使諸司占補之時都無㫖勑差科之際頓異編氓或一丁有名則一户合詔令作全免往年制勑無復遵行宜委本軍本使及京兆府各切詔令作切加提舉凖元和二年八月京兆府所奏勑及長慶元年制度節文處分自先朝以來纍有赦令防姦除弊條目甚詳至如閉糶禁錢橫徵暴賦兩稅物估之虛實四方進獻之豐省再三處分非不丁寧出令不行名實自爽從元和二年已後所有勑令宜委中書門下及內外百司按事施行勿踵前弊仍令御史臺嚴加糾察諸色出身三衛最濫假冒官蔭妄用優勞補既過多簡亦失實既參選序命此理人積嵗幸門誠宜杜塞其三衛三二年且不得一作須非補待簡先補人數盡無如更要補委有司條疏嚴為限制每所補注挾名替闕如便可停廢亦詣實奏聞禮著從人詩稱下嫁義當選尚俾各有行其六宅十宅諸王女縣主每令每年於選人中擇其情願者配尚授官之日量加優賞罷秩之後仍减兩選其初婚者更有賜與使備行禮如非士類不在選限其該載未盡處委中書門下别條疏聞奏量能授用允屬於群材舉善推賢是先乎公族經學可以𢎞教本髙尚可以觀時風宗子中有才行著明文學優異者委宗正寺具名聞薦比類加奬諸色人中有精究經術洞該今古求志不期聞逹委所在長吏具以名聞國家與吐番甥舅之好彼此無虞自今已後邉上不得納投降人并擒捉生口締構興運翼贊昌期勳鏤鼎彛名光簡冊載懷夙烈何日忘之武德已來配享功臣及將相名跡尤著節義顯聞而子孫陵替官閥廢墜未經甄録者委中書門下搜訪後一作役非嗣特一作量非加優異故尚父汾陽王贈太師晟贈太尉秀實子孫中未經甄奬者每家與一人正員官盤石之親義資敦叙穠華之慶道備肅雍文武庶僚中外執事或敬恭厥位或秪奉嚴禋爰考舊章用申慶澤亞獻循王遹終獻恭王通等各賜物一百匹夾侍正衣進圭捧圭各賜物五十匹亞獻終獻正衣各賜物四十匹大長公主長公主嗣王郡主縣主各賜物有差內外文武見任及致任官三品已上賜爵一級四品已下加一階合入三品五品缺考未合叙者待考足日聼叙素王設教崇儒配於斯文虞賔在庭想遺風於先烈微言不墮令德攸彰文宣王之後及二王三恪各與一子官其祠廟委所在量加修飾禮重睦親化先合族慈訓克承於椒掖寵光宜首於觀津太皇太后皇太后二等已上親皇后三等已上親委中書門下各擇有才行者量與改官無官者各與出身皇五等已上親三品已上賜爵一級五品已上加一階六品已下及前資常選散官簡選日優與處分未有出身陪位者每家放一人出身應陪位皇五等已上親及太皇太后皇太后三等已上親三品已上賜爵一級四品已上加一階諸親四等伍等并諸色陪位官五品已上加一階六品已下及白身人竝賜勳兩轉其前資及有出身者各减一選推恩之令所以申孝愛褒贈之典所以極哀華爰加寵章用舉徽數常參官及諸道州府長官父母見存有官封者竝量與五品致仕官及階并邑號如已有者量與進改如官已至五品已上者即與五品階父母亡歿未經追贈者量與贈官及邑號輔弼之臣鈞衡是屬既當大慶爰錫殊恩中書門下及節度使帶平章事者宜特加一階如本階已至正三品已上者與一子正員八品官祖父母先亡歿各與追贈已追贈者更與改贈節度使與一子正員九品官東都留守度支鹽鐵使觀察處置都團練都防禦經略招討使及神䇿金吾六軍將軍上軍統軍威逺鎮國軍等使皇城留守各與一子出身父母先亡殁未經追贈者各與追贈禮儀使大禮使京兆尹各與一子正官九品官大祀有嚴殷薦尤重凡在厥職宜特加恩應郊廟升殿行事官普恩之外宜更加一階如合入三品者量减三考入五品者量减兩考仍待考足日聼叙其合選人與减一選禮奉郊禋任親殿省忠勞既竭甄録宜優內行事官三品已上更賜爵一級四品已下更加一級內侍省及內坊官四品已上各賜勳五轉五品已下各賜勳三轉應從駕至郊廟者普恩之外三品已上賜爵一級四品已下各加一級白身賜勳兩轉陳列威容肅清警衛載加寵錫用示恩私神䇿六軍威逺營左右金吾及皇城將士應緣大禮仗宿衛御樓立仗等普恩之外三品已上賜爵一級四品已下加一階仍依舊例賜物有差其神䇿將士應在京畿諸縣者亦各有賜物應緣大禮職掌行事官併修撰儀注及留守副留守倉庫鄉等普恩之外三品已上賜爵一級四品已下各加一階要荒地逺職貢方來既覩郊禮之盛儀須覃慶賜之殊澤鴻臚禮賔院應在城內蕃客等各有賜物諸道知上都進奏院在城各賜勳三轉應緣大禮四方進奏疏及賀官各賜勳三轉藝術所資優假宜及况因大賚當給新恩翰林待詔供奏并諸色直見任及前資并員外試官三品已上賜爵一級四品已下各加一階無官者賜勳兩轉爰執豆籩克恭薦饗或贊引叶於義矩或祗飾奉其事功心畢幹勤理當褒奬郊廟行事齊郎減二年勞室長掌座禮生贊者减一年勞而勞可减者便放出身崇𤣥館行事學生及齊郎禮生畨考已滿所司緣大禮却追入行事各减一選國子監學生陪位者賜勳一轉中書門下儀制官各加一階應緣祗供作官直司長上諸州行綱考典兩縣耆壽諸色畨役當上在城并量留十月畨者各賜勳兩轉飛龍間廄宫苑典引掌扇內園總監栽接少府將作內作中尚武德軍器內外弓箭庫等諸司諸使下白身人及無品直司定額長生雜匠巧兒黃衣長上監門直長雜仗三衛七色引駕細行執扇角手弩手彍騎武士天文觀生厯生漏生典鼓典鍾工人樂人主衣主膳主酪典食胡食手宰手掌間幕士御士醫士獸醫門僕藥僮御書手楷書手典書流外行署等各賜勳兩轉夫務仁壽莫若敬耆老厚風俗莫若勸名節天下百姓婦人年九十已上各賜米五石絹兩匹綿一屯羊酒有差版授下州刺史郡君八十已上各賜米三石絹兩匹版授上佐縣君孝子順孫義夫節婦旌表門閭終身勿事先已旌表者量加優恤竝委令長賫米帛就家宣賜訖具名申本道一時聞奏極天而峻既多鎮定之功赴海不窮且有朝宗之義五嶽四瀆宜令本州刺史備禮致祭大報之後咸秩當行常祀雖定於嵗時遍祭因宜乎柴燎載慕前王之令德復想古人之義風名山大川自古聖帝明王忠臣烈士各令所在以禮致祭亡命山澤挾藏軍器百日不首復罪如初赦書有所不該者所司具作條例聞奏敢以赦前事相告言者以其罪罪之赦書日行五百里布告天下咸使聞知主者施行文苑英華卷四百二十八
