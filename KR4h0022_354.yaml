body:
  text: 文苑英華卷三百五十四宋李昉等編騷一五悲文五首弔屈詞三章五悲文并序盧照鄰自古為文者多以九七為題目乃有九歌九辨九章七發七啓其流不一余以為天有五星地有五嶽人有五章一作常禮有五禮樂有五聲五者亦在天地之數今造五悲以申萬物之情傳之好事耳悲才難一悲曰恭聞古之君子兮將逺適乎百蠻何故違父母之宗國從禽獸於末班將矯詞兮不往將背俗兮不還寧曲成而薄喪不直敗以厚顔彼聖人兮猶若此况不肖於中間古往今來邈矣悠哉嵇生玉折顔子蘭摧人兮代兮俱盡代兮人兮共哀一作人代代兮俱盡代人人兮共哀至如左丘失明冉耕有疾兵法作而猶臏史記修而下室髙明者鬼瞰其門正直者人怨其筆雖為鏡於前代終抱痛於今日别有漢陽計掾邠國臺卿抗希代之竒節負超時之令名坎壈九死離披再生伊才智之為患故賢哲之所嬰若乃賈長沙之數竒崔亭伯之不偶思欲削魯史之髙行鉗楊墨之辨口為書為禮驅季俗於三古之前垂譽垂聲正頺綱於百王之後天子聞之而欲用羣公畏之而莫取徒窘蠢於泥沙竟龍鍾於塵垢異乎稽之古人則如彼考之今代又如此近有魏郡王公曰方華隂楊氏曰亨咸能博逹竒偉覃思研精探孔門之禮樂吞鬼谷之縱橫嶽秀泉澄如川如陵髙談則龍騰豹變下筆則煙飛霧凝王則官終於郡吏楊則官止於邑丞何異夫操太阿以烹小鮮飛夜光而彈伏翼灼金龜兮訪兆邀玉騏兮騁力雖勞形而竭思吾固知其不得豫之昆兮曰杲之余之季兮曰昻之杲也杲杲兮如三足之鳥昻也昻昻焉如千里之駒杲之為人也風流儒雅為一代之和玉昻之為人也文章卓犖為四海之隋珠並蘭馨兮桂郁俱龍駒兮鳯雛生於戰國則管樂之器長於闕里則遊夏之徒以方圓異用遭遇殊時故才髙而位下咸默默以遲遲青青子襟兮時向晚黃黃我綬兮鬢如絲昆兮何責坐乾封兮老矣季兮何負橫武陵而棄之舉天下兮稱屈何暗室之足欺為小人之所笑為通賢之所悲童子尚知其不可矧衡鏡與蓍龜故曰至道之精窅窅𡨕𡨕至道之極昏昏默默焚符破璽而人朴鄙剖斗折衡而民不爭捩莊子作儷工倕之指而天下始巧膠離朱之目而天下始明然後除其矯黠之患安其性命之精太平之代萬物肫肫凡聖吻合賢愚滑昏公卿不接友長吏不迎尊當成康勿用何暇談其兵甲典謨既作焉得耀其書論雖有晏嬰子産將頓伏於閭巷雖有冉求季路且耕牧於田園彼尋常之才子又焉可以勝言命鸞鳯兮逐雀驅龍驥兮捕鼠使掌事者校其功兮孰能與隼狸而齊舉金為舟兮玳瑁楫不可以涉丘陵些珠為衣兮翡翠裳不可以混樵蒸些何器用之乖剌悼斯人之勤奓一作些倚長巖以為枕兮吸流光以髙卧見城市以盈虛若蚊虻之相過當其時也巢由滿野不知稷禹之尊周召盈朝莫救夷齊之餓若夫管仲不遇齊桓則城陽之贅壻太公不遭姬伯亦棘津之漁夫一義一仁柴也來兮由也醢一忠一孝微子去兮箕子奴聖人百慮而一致君子同歸而殊途推既焚兮胥既溺桀亦放兮文亦拘笙簧六籍則秦谷有坑儒之痛黼藻百行則漢家有黨錮之誅鄴都傾覆飛禍纒於髙鼻洛陽板蕩橫死坐其無鬚喔咿栗斯口含天憲睚眥蠆芥尸僵路隅變化與屈伸交逐窮逹與存亡並驅因其所有而有之則萬物無不有就其所無而無之則萬物無不無有竅而生寧唯混沌無用而飽何獨侏儒是以蘧伯玉卷兮長卷寧武子愚兮更愚庭有樹兮樹有荆園有鳥兮鳥有鴒鴒其鳴矣思諸兄矣荆其悴矣思諸季矣巖有芳桂隰有棠棣枝巃嵸兮相樛葉翩翻兮相翳天之生胡寧不惠何始吉兮初征悲終凶於未濟悲窮通二悲曰流淚公子傷心久之歷萬古以抽恨橫八荒而選悲有幽巖之卧客兀中林而坐思形枯稿以﨑峨足聮踡以緇釐悄悄兮忽愴愴眇眇兮惆悵超遙兮獨蹇淹留兮空谷天片片而雲愁山幽幽而谷哭露垂泣於幽草風含悲於拱木徒觀其頂集飛塵凥埋積雪骸骨半死血氣中絶四支萎墮五官欹缺皮襞積而千皺衣聮褰而百結毛落鬚秃無叔子之明眉脣亡齒寒有張儀之羞舌仰而視睛翳其若瞢俯而動身羸而欲折神若存而若亡生不生而不滅其所居也不㸑其所狎也非人古樹為伴朝霞作鄰不隂森以多晦傍恍惚兮無根枌門草合石路苔新公子方撫其背兮曵其裾曰子非有唐之文士歟燕地之髙門歟昔也子之少則玉樹金枝及其長則龍章鳯姿立身則淹中不足言其禮揮翰則江左莫敢論其詩每兢兢於暗室恆詡詡於明時常謂五府交辟三臺共推朝紆會稽之綬夕獻長楊之辭痛私門之禍速惜公車之詔遲豈期晦明乖序寒燠愆度鱗傷羽折筋變肉蠧離披於丹澗之隅觳􅑌於藪山之路已焉哉已焉哉崑山玉石忽摧頺事去矣事去矣古今聖賢悲何已天道如何自古相嗟項羽帳中之飲荆卿昜水之歌何壯夫之懦節伊兒女之情多借如蘇武生還溫序死節王陵之母伏劔杞梁之妻泣血事蓋迫於功名情有並於貞烈若關羽漢隂田橫海島孤城已迫疲兵尚老離離碣石之鴻羃羃江潭之草廽首永訣吞聲何道及夫獻帝偷生懷王客死哀西都之城闕憶南荆之朝市鳯凰樓上隴山雲鸚鵡洲前吳江水一離一别兮漢家宫掖似神仙獨坐獨悲一作獨愁獨怨兮楚國英華競桃李别有士安多疾顔竒不起馬援困於壼頭冉耕悲於牖裏平生書劔宿昔琴樽研精殫於玉册博思浹於銅渾思欲為龜為鏡立德立言成天下之亹亹定古今之諄諄一朝溘卧萬事寧論君徒見丘中之饒朽骨豈知陌上之有遊魂假使百年兮一作之上壽又何足以存存悲昔遊三悲曰竒峯合沓半隱天緑蘿蒙蘢水潺湲因嵌巖以為室就芬芳以列筵川谷縈廽兮迷徑路山嶂重復兮無人煙當䫜顤之洞壑臨泱咽之奔泉中有幽憂之子長寂寞以思禪容色踳踳形神綿綿形半生而半死氣一絶而一連自言少小一作年遊宦來從北燕淮南芳桂之嶺峴北明珠之川東魯則過仲尼之故宅西蜀則耕武侯之薄田舊鄉舊國白雲邉飛雪飛蓬暗逺天暫辭薊門千萬里少别昭丘三十年昔時人物都應謝聞道城隍今可憐忽憶揚州揚子津遙思蜀道蜀橋人鴛鴦渚兮羅綺月茱茰灣兮楊桞春煙波渺渺帶平沙門棧一作閣道連延狹復邪山頭交讓之木浦口同心之華嚴君平之卜肆戴安道之貧家月犯少微弔吳中之隱士星干織女乘海上之仙槎長安綺城二十重金作鳯凰銅作龍蕩蕩千門如錦繡巖巖雙闕似芙蓉題字於扶風之柱繫馬於驪山之松灞池則金人列岸太華則玉女臨峯平明共戲東陵陌薄暮遙聞北闕鍾洛陽大道何紛紛榮光休氣曉氛氲交衢近投東西署復道遙通南北軍漢帝能拜嵩邱石陳王巧賦洛川雲河水河橋木蘭栧金閨金谷石榴裙曾入西城看歌舞也出東郊送使君一朝憔悴無氣力曝骸委骨龍門側當時相重若鴻鐘今日相輕比蟬翼驅代情兮共此何余哀之能得使我孤猿哀怨獨鶴驚鳴蘿月寡色風泉罷聲嗟昊天之不弔悲后土之無情松架森沉兮户內一作何掩石樓摧折兮柱將傾竊不敢當雨露之恩專長痛恨於此生悲今日四悲曰傾蓋若舊白頭如新嘗為疑作謂談過其實辨而非真自髙枕箕潁長揖交親以蕙蘭為九族以風煙為四鄰朝朝獨坐惟見羣峯合沓年年孤卧常對古樹輪囷相弔相哭則有飢鼯啼夜相慶相賀則有好鳥歌春林麌麌兮多鹿山蒼蒼兮少人時向西溪汲水或就東巖負薪百年之中皆為白骨千里之外時見黃塵平生連袂宿昔銜杯談風雲於城闕弄花竹於池臺皆是西園上客東觀髙才超班匹賈含鄒吐枚一琴一書校竒蹤於既往一歌一詠垂妙製於將來絃將調而雪舞筆屢走而雲回自謂蘭交永合松契長并通宵扼腕終日盱衡罵蕭朱為賈竪目張陳為老兵悲蒼黃兮驟變恨消長之相傾貴而不驕人皆共推晏平仲死且不朽吾每獨稱楊疑相范巨卿及其蹇産推聮支離括撮已濡首兮將死尚搖尾兮求活莊西貸而魚窮姬東徂而狼跋今皆慶弔都斷存亡永濶憑駟馬而不追寄雙魚而莫逹向時之清談尚存今日之相知已沒則有河濵漂母隴上樵夫盤食一作餐帶粟粥麵兼麩藜羮一簋濁酒一壺夫負妻戴男歡女娛攀重巒之岝崿歷飛澗之﨑嶇哀王孫而進饋問公子之所須因謂豫曰哀哉可憐聖人之過久矣君子之罪多焉詩書禮樂適足衰人之神用宗族朋友不足駐人之頺年削迹伐衛孔席由來不暖摩頂至踵墨突何時有煙一朝至此萬事徒然自昔相逢把臂談玄六字一作相逢把臂相見談玄橫雕龍於翠札飛縞鳯於瓊筵各自雲騰羽化谷變鶯遷鳴香車於闕下曵珠履於君前豈憶荒山之幽絶寧知枯骨之可憐傳語千秋萬古寄言白日黃泉雖有羣書萬卷不及囊中一錢悲人生五悲曰禮樂既作仁義不愆死生有命富貴在天一變一化一虧一全去其外物歸於內篇一作歸其自然儒與道兮方計於前其書萬卷其學千年鍾鼓玉帛蹩躠邉一作蹁蹮金木水火混合推遷六合之內慕其風兮如市百代之後隨其流兮若川三界九地往返周旋四生六道出沒牽聮硠硠礚礚蠢蠢翾翾受苦受樂可悲可憐有超然之大聖歷曠劫以為期戒定惠解非隂入慈悲喜捨非見思聞儒道之髙論乃撞鐘而應之曰止止善男子觀向時之華説乃天子之辨士請弄宜僚之丸以合兩家之美若夫正君臣定名色威儀爼豆郊廟社稷適足誇耀時俗奔競功名使六藝相亂四海相爭我者遺其無我生者哀其無生二句一作有者遺其無死者哀其生孰與乎身肉手足濟生人之塗炭國城府庫恤貧者之經營捨其有愛以至於無愛捨其有行以至於無行若夫呼吸吐納全身養精反於大素飛騰上清與乾坤合其壽與日月齊其明適足增長諸見未能永證無生孰與夫離常離斷不始不終恆在三昧常遊六通不生不住無所處不去不滅無所窮放毫光而普照盡法界與虛空苦者代其勞苦蒙者導其愚蒙施語行事未嘗稱倦根力覺道不以為功所言未畢儒道二客離席再拜稽首而言曰大聖哉孔晚聞道聃今已老徒知其一未究其術何異夫戴盆望天倚杖逐日蒼蒼之氣未辨昭昭之光已失嗚呼優優羣品遑遑衆人雖鑿其竅未知其身來從何道去止何津誰為其業誰作其因一翻一覆兮如掌一生一死兮若輪不有大聖誰起大悲請北面而趨伏願終身而教之弔屈原辭三章并序劉蛻吁三閭大夫之事司馬相如集作長卿班孟堅各有言蛻不載故也噫大夫之賢懷王之事蛻得之涕泗下衣濡毫瀝辭集作血噫大夫之為臣千萬年其誰肖宋玉淮南王劉向東方朔王褒繼有悼語蛻一小儒也思賢人之作悲哿集作苛人之侫著弔屈原集無此字辭三章弔公之志也雨濛湘波浮楫搖歌既集無既字而悲伸紙披辭祈公兮采之哀湘竹悵二妃之淚竹圓紅滴滴兮臨乎煙沚竦枝與修幹兮吟哀風之不已搖徑節而錦舒兮垂髙蔭集作隂而自美招翔鸞之與翠鳯兮緝晴霞之數里繁柯重乎舜祠兮瘦影疊乎湘水諒髙節之自任集作佳兮匪庭篠之云比鄙衆蔭之延接兮耻凡羽之棲止入清溪之浪聲兮無笙簧之相擬恨葉翻波兮騷屑之風露滴煙蒙兮濯纓之子悵靈均之節兮依然想真姿兮千年若此下清江清江之上兮心夷猶清江之下兮煙波浮風軟雨絲兮湘波髙雲昏竹暗兮鬼神愁逺霞開兮烏一作鳥帆隨碧江平兮桂楫移帶隱虹兮衣凝雲披一作被薜荔兮扈江蘺歲華髙兮水東注秋色下兮紅蘭渡瓴甋合兮荆和喪岐鳯翔兮龍媒去又曰心既潔兮道雲端水之浪兮人之集無之字波瀾浪可平兮人心不可平波瀾一翻兮孰測其情水之深兮不曰深悵前恨兮淚沾襟招魂集作招帝子招湘靈兮澄瀾之渚雲蔽煙沉兮明月之浦唱宵歌兮撫雲璫擊鳴根兮薦清醑鸞去鳯飛兮雲不歸九疑疊翠兮橫湘雨颯輕颷兮揚微波激楚怨兮下湘娥緝荷蓋兮集雲壇潔桂席兮紉芳一作奠椒蘭霞為裳兮瓊為珮舉雲旗兮持風幡若有來兮窸窣敲懸珂兮珊珊張孔蓋兮臨瑶臺月凝袖兮雲裁冠目眇眇兮千里春悵集作恨無言兮蒼梧濱戢蕙帶兮握芳芬撫集作拂瑤琴集作瑟兮淚斑筠乘桂棹兮下清湘拖無集作金波兮涉滄浪集作茫九疑之翠兮不可尋懷沙之水兮恨之深文苑英華卷三百五十四
