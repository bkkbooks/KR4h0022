body:
  text: 文苑英華卷一百四十一宋李昉等編蟲魚三螢火賦一首水螢賦一首腐草為螢賦一首蟬賦一首聽早蟬賦一首蜩甲賦一首痀僂丈人承蜩賦一首蟬蛻賦二首螢火賦并序駱賔王余􅀈以明時久遭幽縶見一葉之已落知四運之將終悽然客之為心乎悲哉秋之為氣也光隂無幾時事如何大塊是勞生之機小智非周身之務一作防嗟乎綈袍匪舊白首如新誰明公冶之非孰辨臧倉之訴是用中宵而作達旦不瞑覩兹一有流字螢之自明哀一有此字覆盆之難照夫類同而心異者龍蹲歸而宋樹伐質殊而聲合者魚形出而吳石鳴苟有會於精靈夫何患於異類况乘時而變含氣而生雖造化之萬殊亦昆蚑一作蟲之一物應節不愆信也與物不競仁也逢昏不昧智也避日不明義也臨危不懼勇也事沿情而動興理因物而多懷感而賦之聊以自廣云耳伊玄功之播氣有丹鳥之賦象順隂陽以亭毒資變化而涵養每寒潛而暑出一作至若知來而藏往既發揮而外融亦含光而內朗若夫小暑南收大火西流林塘改夏雲物迎秋或凌虛而赴逺乍排叢而出幽均火色一作齊之宵映如夜光之暗投逝將歸而未返忽欲去而中留入槐榆而焰發若改燧而環周繞堂皇而影遍疑秉燭以嬉遊點綴懸珠之網隱映落星之樓乍滅乍興或聚或散居無定所習無常玩曳景一作影周流飄光凌亂泛灧乎池沼徘徊乎林岸狀火井之沉熒左思蜀都賦火井沉熒一夲作騰熒似明珠之出漢值衝颷而不烈逢霪雨而逾煥照灼兮若湛盧之夜飛的皪兮象招搖之夕爛照重隂於已昏與夜燎而相炫共爝火而焉一作齊息避太陽於始旦爾其光不周物明以一作足自資偶仙鼠而伺夜謝飛蛾而一作對飛蛾之赴嬉疑作熺類君子之有道入暗室而不欺同至人之無迹懷明義以應時處幽不昧居照斯晦隨隱顯而動息候昏明以進退委性命兮幽玄任物理兮推遷化腐木而含彩集枯草而藏煙不貪熱而苟進每和光而曲全豈知一作如鎔金而自鑠寧學膏火而相煎陋蟬蜩而一作之習蛻怵螻蟻之慕羶匪傷蜉蝣之夕不羡龜鶴之年槍榆飛而控地摶扶起而垂天雖小大之殊品豈逍遙之異筌夫何化之斯化無使然而自然若乃有來斯通無去一作往不至排朱門而獨逺升青雲而自致匪偷光於鄰壁寧假暉於陽燧終徇已以效能靡因人以成事物有感而情動迹或均而行一作心異響必應之於同聲道一作物固求之於同類始未明其一作而趣捨終一作庸詎識其指意子尚不知魚水一無此字之為樂吾又安一作庸字知螢火一無此字之所利明兮能遷變兮無窮一作髙明兮有融變遷兮無窮哀牛一作牛哀倐而化贙羽泉忽兮生熊血千年兮藏碧火一作魂一變兮成虹知戰場之化一作有磷悟寃獄之為蟲彼翩翻之弱質一作彼翾飛之弱質尚矯翼而凌空何微生之多躓獨宛頸以觸籠異壁一作璧光之照廡同劍影之埋豐覬道迷而可復庶鑒幽而或通覽年華以自照顧形影而相弔感秋夕之殷憂慙一作戁宵行之熠耀熠耀飛兮絶復連殷憂積兮明自一作且煎見流光之不息愴驚魂之屢遷如過隙兮已矣三字一作之已來同奔電兮忽焉儻餘輝之可照庶寒灰之重然水螢賦李子卿水螢惟蟲惟蟲能天彼何為而化草此何事而居泉腹可自持故無取於蟹足能自運亦曷憐於蚿其形也蠢耳其光也炯然色動波間狀珠還於合浦影懸潭下若星聚於潁川明不可以並時故當晝而潛曜暗不可以同德故候夜而開照近而察之若海底之隂火逺而望也辟山邉之寒燎潛伏類於全真無故疑作欲均於觀妙質未為用自脫豫且之網餌且不貪髙視任公之釣徒觀夫因坎而止隨萍則流任晦明而隱見與風水而沉浮自得井蛙之樂何虞轍鮒之憂儻欲觀書固不惜於餘照如將案劍非有意於暗投火為象兮取於時而去其熱水為宅兮質其潤而得其潔且混迹於泥沙詎等夷於魚鱉同至人之樂道類君子之甘節覽於心乃止水之常淨燭於物靡傳薪之無絶由此而言覺吾道之滅裂腐草為螢賦以積腐有光可名為螢為韻陳章厭浥敗草霏微夜螢若受天之明命能在地以成形始爛然於朽壤俄蠢爾於荒庭形質甚微異囊中之點點本根既朽想河畔之青青彼若昧而未彰此如茨而久積始前衰而委化終後顯而可覿寂然不動應大暑於兹時默爾而成揚溫風於永夕徒觀夫從微至著出死入生幾變青袍之色漸加丹鳥之名匪我愆期故分形於夜朗自他有耀因易貌而宵行故得脫陳根騰宿莽質化幽藹氣非腥腐無聲無臭同朽葦之成蛩有顯有微殊積穀之為蠱小明必俟其時變待暗稍觀其類聚並桃蠱疑作蟲而映彼中林齊藿蠋而光於舊圃始則退藏終能發揚詎蒙蘢於階砌初炳耀於池塘豈比膏腴之地多依糞土之墻每遲留於三時不愆于候既生成於六月必見其光徒有異於升沉信莫分於彼我得賦象而自出故非時而不可晶熒乍起訝林際之無煙的皪漸生疑池中之有火隕霜殺兮自晦零雨被兮增萎考書文之小大咸若載月令而逺近相隨始經黃落之餘三年不化既及朱明之節一日可為農夫之務既停剃氏之芟已久飛光兮倐爾而至向晦兮於何不有斯所以成武子之能勤冀聚之於書牖蟬賦馬吉甫鶉星兮御夏鵙鳴兮登序日月驟而運長贏隂陽爭而催小暑詢求縱賞之地枚卜追涼之處尋川徑而棲遲頓林庭而延佇則有應律初蟬含生自然其聲嘒嘒其翼翩翩參萬物之動植隨四序之回旋避啼鶯於春後伴鳴蛩於秋前廉而有德靜而無纍逸豫攸安沉吟斯慰體素質而標儉養清心而拔萃食不求粒雖黍稷而非珍棲不擇林縱梧桐而何貴暨夫三危露結四野雲平蒼茫日暮爽朗天明託髙枝以庇影竄密葉以流聲匝地臺之響亮洞巖壑之清泠羣吟則少懼孤引則多驚時行時止有虧有盈疑紡絡之雙至似簫韶之九成避雀飛急迎風翅輕飾鬢裁新樣圖冠有舊名雖屈螳蜋之斧終齊鵬鷃之情若乃平子歸田仲長就第新開泉石之賞俯洽琴歌之契莫不應促軫而方逺赴調絃而轉麗繁音遞進一作相顧白雪而難酬逸韻爭馳對薰風而莫繼足使牧子興感雍門下涕降翔鶴於雲端出潛魚於水際復有沙塞征夫山川遊子風蕭蕭兮八九月路悠悠兮千萬里坐聽霜鴈自無聊復對寒蟬怨何已望鄉關而思積撫搖落而愁起悲深嘶馬之初淚斷啼猿之始觸類多感於何不傷伊兹蟲之菲陋識君子之行藏其立志也不慕於鴻鵠其守分也不越於榆枋任朝夕之棲處極天地之翺翔適其性韜其光豈比飛燕之巢幕流螢之聚囊至如入檻愁猿觸籠窮鳥縶透水之幽志屈凌雲之遐矯豈無故而嬰羅諒有求而自擾聊息心於萬事放寓迹於一枝淡然兮自守千秋兮若斯聽早蟬賦以吸風飲露為韻蕭頴士清商兮暮急白露兮朝濕伊寒蟬之早聞知涼風之初入散亂搖揚翛寥歘吸前聲未盡後響仍及邇層簷而驚歸向茂樹而遙集足令志士傷惋征夫佇立動閨人之夜悲垂塞客之秋泣况乎日晏天空晴景微風命儔嘯侣乍西或東既更鳴而迭息亦處異而音同催渡漢之離鴈伴橫階之思蛩空庭曖其已寂遐路杳而難窮伊蜩螳之至細王侯毒一作睢獨而猶稟體孤高而自適候時節而斯審其處也敦兮若朴乃蝤躋而未化其出也道之將行必沆瀣而方飲豈徒爾雅辨其名體詩人詠夫章句味編本草之録聲徹上林之賦歌郕宰之化偶范緌而見稱飾趙王之冠與貂尾而胥附莊篇載痀僂之志孔氏感螳蜋之捕苟動靜不爽飛鳴有度因依密葉蕭散凝露韜餘隂於嵗晚等羣蟄於時暮兹括囊而用吉又曽何鳥雀之能喻蜩甲賦以似之而非為韻魏照精氣為物物必有依遊魂為變變亦有歸蜩者精氣所聚甲者遊魂以飛功存造化理暗疑幽微察形如在責實而非觀乎離隱出穴先號後喜或附枯枝或映深水揮幽跧伏臨危聳跱致身勞苦不獨附贅懸疣動足艱難何殊駢拇枝指上懼於雀下憂於蟻情有感於仁人一作情有感之於人事不可乎以已效神仙尸解之術得龍蛇變化之理雖欲全生且同半死既折既疈如動如止一體區分雙形酷似髙冠而立睅目而視莫躁其心能靜諸已飲露則躍翻風忽起再生之命蠢焉不存之皮朽矣覩遺迹於棄甲想能鳴之在耳空披腹心徒伏泥滓其內也既等混沌之無竅其外也何患螳蜋之利觜與繪事而均功齊木偶之所擬昔則如羮如沸孰能聽之今則不飲不食何憂餒而數往有分途窮有時雖滅天理尚存幽姿已脫輕翼猶帶懸緌有象受服者解褐衣而去又同適越者棄章甫於兹既逍遙以脫屣非蠆芥以僵尸其靈託焉蘧廬可以設喻其質去矣魍魎曷足措詞文非變虎殼等枯龜莫懷爾詐仍謂我欺心通者不惑性殊者猶疑君徒見僵仆塊然而無用曽不知脫身輕舉而莫追痀僂丈人承蜩賦高郢巧乎道者承蜩之叟蜩擇木兮有翼叟持竿兮在手物我相絶嗜欲靡同彼不飛兮焉待此將掇兮何工丈人曰我有道也初五六日纍丸為術稿木其臂朽株其質不墜者二則失之錙銖不墜者三則失之十一既纍五而咸若寧絶四而無必由是步平地之上入深林之下耳目俱營心手相假葉空密而皆見枝雖繁而不捨豈伊拾芥將同注瓦或挾三而兼兩或指多而就寡期於百中則啼猿之射乎曽不孑遺殊慕鴻之弋者彼飲露為事蛻殼有期顧非鼎爼之實尚何彈射之疑庸詎知絶俗猶纍凌虛亦危以無用之質遇有求之時始則長鳴聲嘒唳而中絶方將一舉翅蕭條而半垂豈獲戾於不食而構患於有緌且觴深操舟大馬捶鈎三十仭磨崖不溺十九年肯綮皆遊徒聞其事未見其憂豈知天覆地載四荒八極不以萬物易蜩之智不以萬物易蜩之翼惟精惟一無反無側用志凝神何求而不得若以叟為臣以蜩為賊亂繩斯理背陳斯克一言以蔽可詳周公之風一矢可加何逺蠻夷之域螳蜋之捕兮信劣黃雀在後兮安得至哉丈人功並孫息説苑晉靈公造九成之臺孫息以纍十二棊加九雞子為諷蟬蛻賦以一體區分雙形酷似為韻左牢物之化兮則多蟬之類兮唯一棄捐無用之甲振奮有聲之質彼則曲拳擎跽附麗修條此則逺害全身飛鳴永日當其間園向蛻輕吹無聞衝孔之異狀初出寓物之雙形欲分暗入幽叢上纎莖而繞繚時搖殘蕚散芳氣之氤氲于以警素秋于以戒炎酷進退如懼攀援欲速兢兢而恐墜微躬步步而竟升髙木來能應候禍豈避於刳腸去乃乘時智終期於剖腹煙月思寡懸垂勢孤以抱膏肓之疾待成胡越之區拳局而投足既定蹙縮而脫身是圖漸呀然而甲拆俄豁爾而形殊前程而逺寄園林如矜得路下視而若遺枯朽孰肯守株由是乍舉輕躬初留具體薄翼而朝陽始照玄緌而宿露新洗才發響於林下已傳聲於澗底驗形有二責實無雙啾啾而送恨蓬户嘒嘒而添愁瑣窗吟逺樹於荒郊思盈秋野噪寒花於别浦韻繞晴江則知造化之旨難窮其理何末異而本同何一生而一死其死信不自以為辱其生信不自以為美能彼我而兩忘則榮枯而相似别有甘冗居於聖代期羽化於天庭久羡出身之術多慙負贅之形髙枝尚逺短景難停儻遭逢於此夜冀音響之堪聽第二以變化逢時飛鳴有日為韻李逺勿謂乎蟬之至微能變化以知機因挺質以竦拔遂脫身而奮飛餘殼連拳抱緑葉而猶在新聲響亮噪清風而不歸原夫深穴初開空庭始夜步凌兢而微進形磊磈而將化託身而去上風篁投迹而來緣月榭履險微駐愁危却下纎枝不定懼裊裊以頻移弱蔓難窮騰搖搖而盡亞於是輕軀暫息一足才容時驚鬭鼠乍怯鳴蛩局促而初安利爪逡巡而欲改前蹤想黃雀之飢腸先憂見捕念螳蜋之怒臂預恐相逢已而踧踖拳形窮疑作穹隆奮質既罅發而微斷若苞開而漸出擘肌分理有謝於昔時露膽披肝請從於今日騰超稍異竦擢如驚新緌薄疑嫩舊翼羅輕觀腋分之拆裂訝脈散之縱橫嗟纍卵之勢危方求上達歎含風之力寡未敢先鳴及夫據嶮形柔拏空股戰方疑乎蠖屈終類於龍變洞胸逹腋玲瓏而素甲皆虛潔己全身輝赫而玄光已遍俄分曙色似遇良時便有臨空之意還生去故之悲嘒嘒而頻遷碧樹凄凄而若紡寒絲響繞晴雲傳楚岸之風逺聲催晚景怨陶家之栁衰至若委蛻難留沖虛已久體將泰而是望皮不存而何有儻假一枝願飛聲而不朽文苑英華卷一百四十一
