body:
  text: 文苑英華卷六百四十二宋李昉等編進貢下進金花銀櫻桃籠等狀一首進白蕉狀一首進娑羅樹枝狀一首進古銅器狀一首進金盞并甕子狀一首進瓷器狀一首進馬狀一首進異馬駒狀進白兔狀二首進鷹狀三首進雙雞狀一首進白雀狀一首進金花銀櫻桃籠等狀令狐楚右伏以首夏清和含桃香熟每聞採擷須有提携以其鮮紅宜此潔白前件銀籠并煎茶具慶等羡餘舊物銷錬新成願承薦寢之羞敢效梯山之獻其通犀玳瑁上藥等買並依價採皆及時誠非珍竒恐要聚蓄勤奉丹欵不敢不進進白蕉狀令狐楚右伏以半夏欲生正陽初王將勝時熱在新其衣前件白蕉先時織成依價市得光雖讓雪疏不礙風願充當暑之服爰申任土之貢干冒宸聰無任戰汗進娑羅樹枝狀張謂右所管四鎮境天竺山壓枝一作祗園國有拔汗那最為密近乃一作木有娑羅樹特稱竒絶不庇凡草不棲惡禽聳幹無慚於松柏一作杓成隂不愧於桃李但以生非得地譽絶因人榮枯長在於異方委棄不聞於中土陛下髙視三代橫制四夷威信浹於君長仁惠沾於草木前件樹枝臣去載已進訖臣伏以凡遵播殖貴以滋多今屬陽和之時願助生成之德近差官於拔汗那計㑹又採前件樹枝二百莖並堪進奉如得託根長樂擢頴建章布葉垂柯鄰一作連恐非月中之丹桂連枝接影對天上之白榆於物無遺在人知感謹差軍將李滔押領赴京賀衢州進古銅器狀張九齡右伏見衢州所進瑞魚銘等神物環竒形製純古魚為龍象既章受命之元銘作龜文更表錫年之永河圗舊事無以加之臣升集作叶贊休明屢承福應恭惟拜慶倍百恆情伏望宣付史館傳之不朽無任喜躍之至進貢扶風縣平地穿得金盞二枚并甕子一枚狀于公異右臣得所由狀送前件物至臣所者輒令瑩拭非是常珍宜在升聞輒敢上獻隂陽造化神妙潛功羣生既偶於昌期靈貺豈私於聖德伏惟皇帝陛下化通𤣥默躬贊升平神功所以服不庭大孝所以尊清廟故天惟儲慶雲物表瑞於非煙地不韜珍寶玉騰光於內府陛下方𢎞至道爰紀殊祥仰聖德而彌髙在天心而難讓至如此寶安敢無言觀其形製標竒非一時之物精輝旁射逾百錬之珍臣輒比擬他金光芒獨映求之故事未或前聞表孝通誠美已彰於盈缶徵神録異慶常美於化鈞况其賦質堅剛銷形盞斚膺大雅獻酬之用告太平歡樂之符時佇休明潛躍久同於瓦礫道合交泰成器堪佐於樽罍况因封管而生似表微𠂻而獲儻從殊貨是更褒揚必取類於金堅至遂成於家寶期於銘刻傳在子孫長承聖主之恩使效微臣之節代人進瓷器狀瓷器若干事栁宗元右件瓷器等並藝精埏埴制合規模禀至德之陶蒸自無苦窳合太和以融結克保堅貞且無瓦釜之鳴鳴是稱土鉶之德器慚瑚璉貢異砮丹既尚質而為先宜當無而有用謹遣某官某乙隨狀奉進謹奏進馬狀元稹同州防禦使供進烏馬一匹八嵗堪打毬及獵右臣竊聞道路相傳車駕欲暫遊幸溫湯未知虗實者臣職居守土侍從無由集作因羡魏闕之埃塵猶隨日御恨新豐之雞犬亦聼車音目斷魂消形留神往幸又得進奏官狀知河中華州京兆府並於昭應排比進獻臣當州素乏所出無以粗展丹誠臣既别受恩私又不合獨無壤奠伏以前件馬北方正色東道竒蹤調習多時備諳材力集作色解擊毬者每嘉其環回斗轉動可集作必愜心善獵射者皆歎其度塹踰溝走不換足欲隨正至獻賀竊慮群衆混同徘徊顧瞻蓄鋭斯久今者宸遊近甸帝降靈泉施展是時戢藏何益伏望陛下揚鞭頓轡取驗其馴良結尾絡頭試觀其神彩臣某深恩未報愚志空存自慚駑鈍之姿莫展驅馳之效捫心戀主因馬喻身輕冒天威無任戰汗其馬謹隨狀進謹進進異馬駒狀令狐楚右臣得征馬使穆材狀謹具毛色如前者臣伏以行地之用莫神於馬擅華名者則衆效竒質者甚稀伏惟陛下廣大際天髙明配日殊祥競發休祉荐臻前件馬禀天駟之精體坤元之德毛拳惟細鬛赤而髙尾掉肉而蜿蟺額帶星而倜儻臣謹差虞候辛峻専往覆視俱如前列峻云雙瞳有耀四蹄如削宛然天産定是龍媒允協建午之辰光昭太一之貺臣見今就太原府養調旬月稍任行步即専陳獻謹差某官聞奏為太原李說尚書進白狀前篇作表非前人貞元十二年右臣得嵐州刺史趙挺六月二十九日狀稱嵐州合河縣太平鄉大慶村收獲前件白差行官李希林送到者臣謹按瑞應圗曰白夀千年滿伍百則色白又曰王者恩加耆老則白見臣伏以白為正色實仁獸來皆有為前篇作應出必以時伏惟陛下聖夀無疆神功不宰是故太隂精魄降以為瑞皓質玉立素毛霜垂清明不讓於殷狼皎潔可齊於周鹿况村為大慶鄉號太平無為而成不索而獲協元符之一氣彰皇德於千齡雖標中瑞之科實應太廟之曲前篇作典臣忝守藩前篇作方鎮覩兹休祥無任忭躍歡慶之至此篇六百十二卷表門重出前已削去同前右貞元十二年六月嵐州刺史於州界太平鄉獲白一隻臣已并圗進獻死一作斃於中路惜其誕生靈質不達明庭誠意所求禎祥荐至今又得狀宜芳縣孝義鄉百姓王貞收得前件白􅊵送到者臣謹按瑞應圗云王者仁及鳥獸則白見臣伏以免之為獸毚狡者多獸之有毛龐雜者衆臣觀前件皓然養素恬爾守柔處群萃以自殊抱貞明而不汙皎如疊雪燦若凝霜克生孝義之鄉實表中和之化伏惟皇帝陛下恩覃動物澤及毛群方宏三靣之仁果應千齡之瑞若非上天慈惠下土清平則安得四年之中再見其地信可以摛皇上之懿德薦臣子之明誠昭彰可徵肸蠁如答臣覩兹潔朗宛在封疆踴躍欣歡實倍恆品謹遣某官并圗隨狀奉進為易定張令公進鷹籠狀鄭絪右件鷹臣去秋來頻令入草一一揀擇皆有所能試其摶擊下韜必中伏以上囿五方固多殊異之選下土一物實表臣子之誠敢望備羽獵於長楊從搜狩於天仗輕瀆旒扆無任屏營之至進白鷹狀張謂右臣管內大小鷹娑羅山採得前件鷹簡擇並堪進奉特禀異氣挺生殊姿頭圓頂平臆潤脛短丹目時轉志凌雲霄花毛始齊色淨霜雪既拔竒而賞異實超等而殊倫但四鎮川原千里砂磧草木既少禽獸亦稀礪志疑爪距調其羽翮徒有願於擊摶竟無階於效用今寒風凛冽殺氣嚴凝萬乘時巡六龍冬狩出樊籠之地登校獵之場必能隨人指蹤驅御苑之狐順時行令逐禁林之鳥雀物性有適天心所知進異鷹狀令狐楚右臣所管採捕得前件鷹兩翅齊肩雙翎對㩳雖非神俊稍似瑰竒以臣微誠輒敢陳獻風霜之後儻或得用於三驅鳥雀之中曽兾成名於一擲干冒宸扆無任戰越同州進雙雞等狀元稹同州防禦使供進鳥鶻并雙雞共四聨右臣當州元和十五年奉宣令採雙雞五聨各重四斤頻年採取一聨不獲自臣到州詢問採捕人等皆云二十年前採得一聨雙雞爾後不曽採得昨旬日之內併獲兩聨斤兩輕重稍符詔㫖况浚郊初啓既已大剪豺狼鷙鳥自來可以助清裊獍臣所以恨身無羽翼不獲陪奉屬車擒狡兔之根源破狐狸集作妖狐之群黨臣某無任忘軀思奮覩物感恩之至謹遣某官某乙隨狀奉進謹進為政事進白雀狀蘇頲右巢於黃門外雀過官廰事丹眸瑩徹明若流珠嘉毳鮮華光如藴玉臣等謹按瑞應圗白雀主鐡劵隂之精也不來則國無俊嗣伏以清宫踐位慶重離於上天黃閣曽巢屬五瑞於明日固以事優御符聲髙作頌臣等叨陪近侍喜萬恆情無任忭躍之至文苑英華卷六百四十二
