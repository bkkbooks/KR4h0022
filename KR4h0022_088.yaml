body:
  text: 文苑英華巻八十八宋李昉等編符瑞五蓂莢賦二首指佞草賦三首朱草合朔賦一首瑞麥賦二首平露賦一首嘉禾合穎賦一首甸人獻嘉禾賦一首蓂莢賦以呈瑞聖朝為韻程諫堯堦蓂莢兮實稱休禎盖歴代而難值至我后而斯呈植之以前墀左墄映之而鏤檻丹楹激薫風而葉轉迎太陽而心傾日徃月來深符大小之數時和厯應因見天地之情觀乎榮謝以月徳為常巻舒以日數成類随初吉以增茂暄然自春度既望以漸零翛然如寄體盈虚而方同得道任消息而匪殊有智金波桂樹遠合象於彫榮炎漢芝房近方慙於祥瑞彼朱草與萐蒲曷於兹而擬議則知聖作物覩物興由聖聖於赫而克著元亨物効祥而天莫之令然而蓂之為應也博蓂之為瑞也昭賛睿主則太平在邇測隂靈則時變不遥初也則日益一日終也則宵盡一宵弱質浹金莖之露輕姿散玉户之飈或曰麟在郊而合圖牒鳯來儀以聽簫韶雖咸見而可貴於列迹而斯超豈如䝉賁著總集於厚地焜燿於皇朝第二同前韻吕諲聖人法天兮無物不成皇天輔聖兮有貺必呈蓂莢之嘉植爰乃應乎休禎禀神疑靈以擢質因堯堦而得名抽莖䔿䔿布葉英英二八而落三五而盈隂徳自然仰蟾蜍而知晦太陽常近與葵藿而同傾爾乃丕體其祥愽考其義所以厚上天之徳所以表皇王之瑞其國亂也則植之猶難其國理也則生之孔易惟我后之欽若亦合符而受賜承榮金殿旁沾三露之滋毎奉玉階上䕃五雲之施豈無萱草以悦其性豈無靈芝以彰其盛芝擢其秀既以紛綸於䇿書萱樹於堂曷能彌縫於明聖未若蓂莢生於皇朝與夫髦士來應弓招受成於天諒多聞於國瑞託得其地且有異於山苖竊預談於王道庻有望於遷喬指佞草賦以靈草無心有佞必指為韻梁肅聖澤濡煦兮動植斯形相彼瑞草兮逄時効靈體嘉生於浩氣秉直道於彤庭昔在堯帝至化惟馨伊屈軼之芳貞恊王猷與國經有皇睿后徳動杳㝠二氣暢而羣生遂百祥來而萬宇寧矧夫佞者小人之道直者為國之寳雖紏正於邦憲實發明於瑞草象恭言偽於是焉去而勿疑葉布莖分何患乎辨之不早若乃一人當宁一作宇超黄越虞百辟來朝日臨雲趨風力論道伊咎陳謨瑞草在前疇敢以諛故曰物生於有有生於無感此變化發為禎符不然彼植物之何知乃同功於帝俞天道不言聖人無心寓形闡教其用則深禾穎降於周王芝房發於漢后信呈豐兮告慶并垂美於不朽彼集作比直指以去邪諒於功乎何有我明主所以超三英之躅彼靈草所以為百瑞之首有由然也史魚守直宣父惡佞佞直不分邦家靡定惟草所指惟皇所聽指歸乎一聽戒乎失茍君集作執道之不𢎞徒倚瑞以自必重曰曄彼草兮直而指佞聖之瑞兮時之禮頌皇休兮無極已第二同前韻沈封伊嘉卉兮昔生軒庭盖歴代而莫觀其狀至我后而方覩其形對右平與左墄間朱草與彤庭一作階蓂薫風晝灑湛露宵零所以彰吾君之睿聖所以表吾君之徳馨匪然何以於昭其異有赫厥靈根莖竦擢枝葉静好惡夫佞允叶乎聖心作乎祥特異於靈草况今勤施五至克奉三無多忠良之士絶䜛佞之夫非斯草之助化何以臻於此乎指佞之為徳也廣指佞之為瑞也深逢聖斯生介一人之景福有佞必指俾百寮而革心故能殊衆芳之質標羣瑞之首彼獬豸之觸邪抵罪在法則嚴伊平露之傾葉知方於人何有孰若我應明聖指邪佞昔之輔徳告軒后之功成今也呈祥賛吾君之理定一名屈軼千載挺出有佞則指孰云無必豈比夫萐蒲空扇於堯厨芝房徒歌於漢室哉足以彰郅理薦嘉祉君子在位我則恭黙以傾心佞人入朝我則無私以直指信可以美芳聲於雅頌垂不朽於國史第三同前韻鄭轅旒扆肅誠天地降靈藎臣咸造屈軼生庭翠影如植皇心以寧暑屏寒生感萐蒲之代謝日來月徃異蓂莢之飄零舄奕𤣥造誕生厥草表忠蹇之不遲懼壬佞之何早宵承湛露宻葉如傾晝偃薫風纎莖若掃猗那且都歌詠難模其生也則一其道也乃殊育於軒堦其指或有生於聖代其用則無是靈草之無心以聖人之為心對危行而不侮覿巧言而則侵榮乎砌隂實為龜為鏡肅我皇度式如玉如金冠卉之首綿代曠有茅三脊之可封芝九莖而延夀曷若兹草之盛莫之與並類貂蟬之性潔均獬豸之質勁得詩人之無邪行疑孔門之逺佞於鑠屈軼邈乎逈出遇唐復生應時作實經百王而影戢歴一作越千祀而宥宻如執法之不囘奉直道而自必所以野退宵人朝多髦士同魚水之合契絶螮蝀之莫指封思齊於大夫名可比於君子謝有香之蘭蓀惡無言之桃李朱草合朔賦韋模當縣官執大法闡大猷道惟行逺化必通幽彼朱草以合朔示皇天之降休月始而生用資乎隂隲月虧而落事契夫㝠搜其於作候靡或不由乃知天㒺私親神惟輔徳茍明智之有務必㝠報而無忒或産水涯或生巖側布赤葉之蒨練挺朱柯之翕赩既周復而莫窮與乾坤而不極誰究其義吾知其為美一人之化洽俾萬國而澤被由是節候不疑生榮以時依天聽以叶祉順月魄以呈姿朔告合焉表皇化之無異草名朱也比丹心兮自持較瑞不慙於蓂莢稱珍豈讓夫一作乎靈芝觀其光彩妍媚文理宻緻資亭毒以榮落以神祗之奥祕三五之前逐蟾光以潜長二八之後與桂華之一作而暗墜匪權量之能侔將漏刻而齊致其氣芬芳其色焜煌聖帝攸感靈仙是常何纎芥之㣲物遇休明而効祥諒君恩之克播致天意之溥將可以同覩日月共貫隂陽豈止漬𤣥醴變金漿而已哉懿夫分莖灼爍擢穎超遥候朔自呈詎比夫偶陽而動既望斯隕寧同乎見晛曰消幽𤣥不測神化孔昭自然澤浸有截化行無外三光並明兩儀交泰於靈草以配厯冠古今而為大瑞麥賦任瑗建極惟皇昭鑠于光出豫考卜乗時省方西自酆鎬東廵洛陽順天遊而有度協日晷之云長徴賢宣室布政明堂風雨時序黎庻其康盡物稱瑞窮靈委祥明含疑日月則階蓂恒秀澤及草木一作莾而隴麥登芳於是闢離宫通禁苑覩兹瑞之所應實皇恩之燭逺朝任得人時唯賢相九流分職三旗恊亮稱堯舜之允敷同益賛而禹唱曰珍瑞麥生我皇國凌寒而秀彰聖之徳願載東觀之書以歌南薫之則既而帝曰欽哉天符聿來俾予光于四表惟爾翼于中台念幽芳之遂性知棫樸之當材且夫麥之為瑞其徳至矣居寒自生當暑薦美含實珠净耀芒鋒起既標詠於詩人亦稱竒於縑史當其芃芃于野漸漸其秀將嗣榖以登年豈凌霜而不茂在昔唐叔嘉禾伊育昭彼周王天人斯穆今惟聖帝此焉攸淑􅉼之如春也及晝而繁榮就之如日也來牟而紛郁則有小儒怡然鼔腹照水鏡之光鑒恭歴選之題目未登髙而賦成庻陳美於金竹者也第二髙敭庭聖人順動文思欽明天地貞觀品物咸亨去憑虚而就安處面周洛而背咸京雲旗電發霜㦸林行太隂用事其日在斗萬國來庭百神奔走泉潜動而荄落水益壯而氷厚冠異氣於繚垣吐嘉麰於寒藪不忌風雪全抽兩穗逼日月之光華得雲雨之攸利芒纎纎而擢隴葉青青而聳翠同黍谷之移暄類榆林之因地瑞紀增煥嘉禾異殖出天苑以一作之稱竒訪人寰而未識凌玉霜而表勁挺金莖而孤植顧擢穎於年和望生成於地力倬彼藩翰其代天工即漢庭之相國類晉室之清通拜殊祥而北首列圖史於南宫紆粹容於有穆冠鴻業而無窮實穎實栗是崇是奉可以為瑚璉之姿可以為穜稑之種偉長至之馭序同少陽之在候成粒貴於鳥衘覆苖期於雉雊夫瑞也百王之珍事其生也二儀之大徳道泰則稱物呈形政乖則羣方皆忒伊小草之何幸逢大人之允塞願均照於離明祁作禎疑作楨於王國平露賦惟唐累慶唯天眷命植平露之殊祥表吾君之睿聖不窺於牖可以辨百寮之賢不下於堂可以觀四方之政其儀可尚其義可覈平也者所以表太平之時露也者所以彰雨露之澤以此知庻類光賛神功昭格也希代以出曠古而無空嘗覩於青史獨有驗於祥圖借如嘉禾合穗且生於隴畝萐蒲扇食未逺於庖厨孰與夫薦祉於彤庭之際含榮於紫殿之前亭亭莖擢的的規圓屬乾坤交泰風烈昭宣是以執正自守居中不偏偶香堦之蓂莢對玉户之賔連以承君顧眄以奉君周旋非夫聖哲首出英賢在位君臣同心上下一致五帝可以六三王可以四亦曷能感於兹瑞如或政有所缺道有未光則低枝傾盖應是知方寧兹物兮自爾信有神兮所將似能存於烱誡豈獨効於禎祥客有聞之而歎曰於戱哉莫瑞匪靈匪聖莫丁偉兹平露卓爾祥經物之咸若國之康寧覩珍符之有炳敢不頌乎徳馨頌曰官為賢兮政無失君與臣兮徳惟一伊平露兮應時出彰聖代一作出兮光史筆嘉禾合穎賦張禎祥南山之下兮無人之境力穡此中兮均夫躁静勞則不憚既寒耕而熱耘慶有所歸忽異畝而同穎莖駢惜芃芃之色秀合垂䔿䔿之影此焉觀瑞亦秪以異比於木乃連理之祥在於人盖同心之義稃己聞於二米莖乃殊於九穗豈非徳之能及實聖朝之所致爰考休徴豐年是慿麥兩岐而能匹茅三脊而徒稱固神倉之可貯期郊廟之以升欲薦堯階且聞秷秷之獲疑作穫將登禹膳遂入烰烰氣出盛也之烝天道𤣥黙瑞以表徳豈無沃土而光於我家豈無異方而祚此王國不有嘉生孰謂賔榮友朋之心因取興於連茹兄弟之樂遂作戒於分荆佇聞唐叔之獻頌我后之昇平甸人獻嘉禾賦趙蕃聖上崇國本致時康動𤣥象之昭鑒産嘉禾而應祥甸人於是具畚鍤修封疆啓芳穎於修畛薦靈姿於我皇懿夫挺㧞疑作枝自分連拳相接始穰穰而齊實終矯矯而異葉殊其本均二氣以發生同乎心表一徳之和恊不然者寧擢秀於墳衍載具美於圖牒徴其瑞質稽彼大同見芬敷而共貫信縈結以交通則知符乎帝道發自天功合穗之珍方將効祉於今日異畝之美豈獨標竒於古風於是野老歡心田夫盡力宛移根於沃壤之際俄發耀於丹墀之側祥煙近拂乍疑連理之形喜氣傍臨更辨合歡之色彌彰執契之道載助惟馨之徳爾其天鑒非逺神珍是呈始苕亭而間出終夭矯而曲成豈比躬稼之時盡化晉君之草挺生之嵗克符漢帝之名向令質委離披孤生苯䔿安得臨玉砌邇龍衮設穜稜疑作稑之萌芽為理化之根本是知六府惟序萬邦式孚茅三脊而非偶獸共觝而自殊未若耀青芳於近甸垂嘉貺於靈圖况復聖慮彌深皇猷思永梯山航海未足契其休光菲食卑宫將欲示其豐省斯所謂騰茂實於厚地故薦穗於重穎文苑英華巻八十八
