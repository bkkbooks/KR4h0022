body:
  text: 文苑英華卷三百二十五宋李昉等編花木五竹五十二首笋二首竹梁元帝嶰谷管新抽淇園節復修作龍還葛水為馬向并州柯亭臨絶澗桃枝夾細流冠學芙蓉勢類作樣花堪威鳯遊卭王若有獻張騫應拜侯竹劉孝先竹生荒野外捎雲起類集作聳百尋無人重類集作賞髙節徒自抱貞心恥染湘妃淚羞入上宮琴誰能制長笛當為作類集作吐龍吟竹蕭放懷風枝轉弱防露影逾濃既來丹穴鳯還作葛陂龍侍宴賦得夾池竹詩隂鏗夾池一叢竹青翠不驚寒葉醖宜城酒皮裁類詩作治薛縣冠湘川染别淚衡嶺拂仙壇欲見葳㽔色類集作凌冬質當來兔苑看賦得山中翠竹張正見修竹映巖隈類詩作垂乘風異夾池復澗藏髙節重林隱徑枝雲生龍未上花落鳯將移莫言棲嶰谷伶倫不復吹賦得夾池竹賀修緑竹影參差㛹姢帶曲池逢秋葉不落經寒色詎移來風韻晚徑集鳯動春枝所欣髙節類聚作蹈客來待伶倫吹賦得臨池竹虞世南蔥翠捎雲質垂彩映清池波泛含風影流搖防露枝龍鱗漾嶰谷鳯翅拂漣漪欲識凌冬性唯有嵗寒知竹李嶠髙幹楚江濆蕭條含翠氛集作娟娟含暑氛白花搖鳯影青節動龍紋葉拂集作掃東南日枝捎西北雲誰知湘水上流淚獨思君奉和徐侍郎中書叢篠蔣煥一作盧象中禁夕沉沉幽篁别作林色連雞樹近影落鳯池深為重凌霜節能虛爽一作應物心年年承雨露長對紫庭隂此詩二百四十二卷重出今已削去沈十四拾遺新竹生讀經處同諸公作王維間居日清靜修竹復集作自檀欒嫩節留餘籜新叢出舊欄細枝風響亂踈影月光寒樂府裁龍笛漁家伐釣竿何如道門裏青翠拂山壇慈姥竹李白野竹鑽集作攢石生含煙映江島翠色落波深虗聲帶寒早龍吟曽未聼鳯曲吹應好不學蒲栁凋貞心常自保同郭參謀題崔令公廳前竹劉長卿不學媚清瀾能依上將壇蒙蘢低冕過青翠捲簾看得地移根逺經霜抱節難間花成鳯實嫩笋長魚竿肅肅軍容靜蕭蕭郡宇寬細音和角暮踈影上門寒阮巷何人在梁園幾樹殘空餘軒屛側嵗晚伴任安晚春歸山居題窗前竹劉長卿溪上殘春黃鳥稀辛夷花盡杏花飛始憐幽竹山窗下不改清隂待我歸寒竹釋皎然裊裊孤生竹獨立山中雪蒼翠搖徑風嬋娟帶寒月狂花不相似還共凌冬發竹張南史竹竹被山連谷出東南殊草木葉細枝徑霜停露宿成林處處雲抽笋年年玉天風乍起爭韻池水相涵更緑却尋庾信小園中間對數竿心自足竹戴叔倫卷籜正離披新枝復蒙密翛翛月下聞裊裊林際出豈獨對芳菲終年色如一竹朱放青林一作竹何森然沉沉獨曙前出墻同淅瀝開户滿嬋娟籜卷初呈粉苔侵亂上錢踈中思水過深處若山連疊夜常栖露疑作鷺清朝乍有蟬砌隂迎緩䇿簷翠對欹眠迸笋雙分箭繁梢一向偏月過驚散雪風動極聞泉幽谷添詩譜髙人欲製篇蕭蕭意何限不獨住湘川池上竹楊巨源一叢嬋姢色四面清泠波氣潤晚煙重光間秋露多翠筠入踈栁清影拂圓荷嵗晏琅玕實心期有鳯過和令狐舍人酬峰上人題山欄孤竹前人滿院氷姿粉籜殘一莖青翠近簾端離叢自欲親香火抱節何妨共嵗寒能讓繁聲任真籟解將孤影對芳蘭范雲許訪西林寺枝葉須和彩鳯看庭竹劉禹錫露滌鉛粉節風搖青玉枝依依似君子無地不相宜郡齋左偏栽竹百餘竿炎涼已周青翠不改而為墻垣所蔽有乖愛賞假一作暇日命去齋居之東墻由是俯臨軒階低映帷户日夕相對頗有翛然之趣令狐楚齋居栽竹北窗邊素壁新開映一作見碧鮮青藹近當行藥處緑隂深到卧帷前風驚曉葉如聞雨月過春枝似帶煙老子憶山心暫緩退公間坐對嬋娟和宣武令狐相公郡齋對新竹劉禹錫新竹翛翛韻曉風隔窗依砌尚朦朧數間素壁初開後一片清光入座中欹枕間看知自適含毫朗詠與誰同此君若欲長相見政事堂東有舊叢和汴州令狐相公新於郡內栽竹百竿拆壁開軒旦夕對玩偶題七言五韻白居易梁園修竹舊傳名園集作久廢年深已集作竹不生千畝荒涼栽集作牽未得百竿青翠種新成墻開乍見重添興窗靜時聞别有情煙葉蒙籠侵夜色風枝蕭索集作颯欲秋聲更登樓望尤堪重千萬人家無一莖汴州人家並無竹題盧祕書夏日新栽竹前人湘竹初封植盧生此考槃久持霜節苦新託露根難等度雖當户集作須當砌踈稠要滿欄買憐分薄俸栽稱作間官葉剪藍羅碎莖抽玉琯端幾聲清淅瀝一蔟緑檀欒未夜青嵐入先秋白露漙集作團拂樓集作眉搖翡翠尉手㺯琅玕韻繞集作透窗風起隂鋪砌月殘炎天聞覺冷窄地見疑寬梢動勝搖扇枝低好挂冠碧籠煙羃羃珠灑雨珊珊曉籜晴雲展隂牙蟄虺蟠愛從抽馬䇿惜未截魚竿松韻徒頻集作煩聼桃夭不足觀梁慚當家杏臺陋本司蘭古詩云盧家蘭室杏為梁又祕書府即蘭臺撑撥詩人興勾牽酒客歡靜連蘆簟滑涼拂葛衣單豈止銷時暑應能保嵗寒莫同凡草木一種夏中看和東川李相公慈竹十二韻元稹慈竹不外長密比青瑶華矛攢有森束玉立無蹉跎纎粉妍膩質細瓊交翠柯亭亭霄漢近靄靄雨露多氷碧寒夜聳簫韶風晝羅煙涵朧朧影月泛鱗鱗波鸞鳯一以顧燕雀永不過幽姿媚庭實皓氣陵集作爽天涯峻節髙轉露貞筠寒更佳託身仙壇上靈物神所呵集作何時與天籟合音閣日聞陽春歌應憐孤生者摧折成沉集作病又作卧疴郵竹庭有蕭蕭竹門有田田騎囂靜本殊途因依偶同寄亭亭乍干雲裊裊亦垂地人無集作有異我心我無異人意南庭竹李紳東南舊美陵霜操五月凝隂入座寒煙惹翠梢含玉露粉開春籜聳琅玕莫令戲馬童兒見試引為龍道士看須信結根香實在鳯皇終擬下雲端題鄭常侍廳前竹賈島緑竹臨詩酒嬋娟思不窮亂枝低積雪繁葉亞寒風蕭颯疑泉過縈回有徑通侵庭根出土隔壁笋成叢踈影紗窗外清音寶瑟中卷簾終日看欹枕幾秋同萬頃歌王子千竿伴阮公露光憐片片雨潤愛濛濛嶰谷蠻湖北湘川灀水東何如軒檻側蒼翠裊長空鄰人自金仙觀移竹李逺新居移竹已堪看斸破莓苔得幾年圓節不教傷玉粉低枝猶礙拂霜壇墻頭引動如煙緑枕上風來送夜寒第一莫教漁父問且從蕭颯滿朱欄昊天觀新栽竹劉得仁清風枝葉上山鳥已栖來根别古溝岸影生秋觀苔遍思諸草木唯此出塵埃恨為移君晚空庭更擬栽酬人雨後玩竹薛濤南天春雨時那鑒雪霜姿衆類亦云茂虗心寧自持多留晉賢醉早伴舜妃悲嵗後君能賞蒼蒼徑節竒題諸塘館竹集作秋日白沙館對竹許渾蕭蕭陵雪霜濃翠異三湘踈影月移壁寒聲風滿堂卷簾秋更早髙枕夜偏長忽憶南遊集作溪路萬竿今正涼題新竹方干青苔斸破植貞堅細碧竿排鬱眼鮮小鳯皇聲吹嫩葉短蛟龍尾裊輕煙節環膩色端勻粉根拔秋光暗長鞭怪得入門肌骨冷綴風粘月滿庭前越州使院竹前人莫見凌風飄粉籜須知礙石作盤根細看節集作枝上蟬吟處猶是笋時蟲蝕痕月送緑隂斜上砌露含集作凝寒色濕遮門列仙終日逍遙地鳥雀潛來不敢喧碧鮮亭春題竹薛能竹少竹更重碧鮮強一作猶更名有欄常憑立無徑獨穿行夕月隂何亂春風葉盡輕已聞圖畫客兼寫薛先生竹徑前人盤徑入依依旋驚幽鳥飛尋多苔色古踏碎籜聲微鞭節橫妨户枝梢一作苖動拂衣前溪聞到處應接釣魚磯新竹前人栁營茒土倦粗材因向山家乞翠栽清露便從終夜滴好風疑自一作是故園來欄邊匠去朱猶濕培後蟲浮穴暗開他日會應威鳯至莫辭公府受塵埃竹鄭谷宜煙宜雪集作雨又宜風拂水藏村復間松移得蕭騷從逺寺洗來踈淨見前峰幽階蘚坼春芽迸繞徑莎微夏蔭濃無賴杏花多意緒數枝穿翠好相容題僧院紫竹陳陶喜遊蛟井寺復見炎州竹杳靄萬丈間嘯風清獨速江南正霜散吐秀弄顓頊似瑞驚堅貞如魔試金粟笋非孝子泣文異湘靈哭金碧誰與鄰蕭森自成族新聞赤帝種子落毛人谷逺祖賜鷦鵬遺芳遍南陸對煙蘇麻醜夾澗篔簹伏美譽動丹青瓌姿艷秦蜀因緣鹿苑識想像蛇丘斸幾葉别黃毛何年依白足龍樹蟄一花砌瑶掃雲屋色靜曼仙花名髙給孤獨青蔥太子樹灑落觀音目法雨每沾濡玉毫時照燭離居鸞節變住冷金顔縮豈念葛陂榮幸無祖父一作欠辱光搖水精串影送蓮花軸江霧日相尋野鶚時寄宿幽香入茶竈靜翠直碁局肯羡垣上蒿自多籬下菊從來道生一况伴龜藏六棲託詎星回檀欒已雲矗霞杯傳縹葉羽管吹紫玉久絶釣竿歌聊裁竹枝曲愧生黃金地千秋為師緑竹五首前人不厭東溪碧玉君天壇雙鳯有時聞一峰曉似朝仙處青節森森倚絳雲二萬枝朝露學瀟湘杳靄孤亭白石涼誰道乖龍不行雨春雷入地馬鞭狂三嘯入新篁一里行萬竿如甕鎖龍泓驚巢翡翠無尋處間倚雲根刻姓名四青嵐帚疑亞思吾祖緑潤偏多憶蔡雍長聼南園風雨夜恐生鱗甲盡為龍五迸玉間抽上釣磯翠苗番次脫霞衣山童泥乞青驄馬騎過青一作春泉掣手飛竹韓溉緑色連雲萬葉開王孫類詩作王家不厭滿庭栽凌霜盡節無人見終日虛心待鳯來誰許風流添興詠自憐瀟灑出塵埃朱門處處多間地正好移隂覆類詩作結翠苔竹羅鄴翠葉才分細細枝清隂猶未上階墀蕙蘭雖許相依日桃李還應笑後時抱節不為霜霰類詩作雪改成林終與鳯凰期渭濵若更徴賢相好作漁竿繫釣絲竹崔涯領得溪風不放回傍窗緣砌遍庭栽須招野客為鄰住看引山禽入郭來幽院獨驚秋氣早小門深向緑隂開誰憐翠色兼寒影靜落茶甌與酒杯新栽竹杜荀鶴斸破莓集作蒼苔地一作色因栽十數莖窗風從此冷詩思當時清酒入杯中影碁添局上聲不同桃與李瀟灑伴書生新竹張蠙新鞭暗入庭初長兩三莖集作一莖莖不是他山少無如此地生垂梢叢上出柔葉籜間成何用髙唐峽風枝掃月明竹羅隱籬外清隂接藥欄曉風交戞碧琅玕子猷沒後知音少粉節霜筠漫嵗寒江南竹許晝江南瀟灑地本自與君宜固節還同我虗心欲待誰澗泉傍借響山木共含滋粉膩蟲難篆叢踈鳥易窺盡應逄野渡中忽見村祠葉掃秋空靜根橫古塹危影迷寒靄裏聲出夜風時客棹深深過人家逺逺移遊邊曽結念到此數題詩莫恨成龍晚成龍會有期竹秦韜玉削玉森森幽思深一作清阮家髙興尚分明卷簾隂薄漏山色欹枕韻寒宜雨聲宜類詩作疑斜對酒缸偏覺好靜籠碁局最多情類詩作舒情却驚九陌輪蹄外獨有溪煙數十莖笋籬笋李頎東園長新笋映石復穿籬近出依青嶂攢生伴緑池密一作色因林向背行逐地髙卑但恐春將老青青獨爾為笋白居易此州有集作乃竹鄉春笋滿山谷山翁集作夫折盈把集作抱將來入集作抱來早市鬻物以多為賤雙錢易一束將歸安集作置之炊甑中與飯同時熟斑殼拆集作柴籜拆故錦素肌擘新玉只此一蔬餐集作每日遂加餐經旬集作時不思肉久為京洛客此味常無集作不足速集作且食勿蜘蹰南風吹作竹文苑英華卷三百二十五
