body:
  text: 文苑英華卷九百二十四宋李昉等編職官三十二刺史六黔州刺史薛舒碑一首常州刺史獨孤及碑一首房州刺史杜元徽碑一首溫州刺史裴希先碑一首黔州刺史薛舒神道碑韋建名位所以寵賢爵祿所以馭貴德盛者慶逺源深者流長垂裕後昆啓迪前烈今見其人矣薛氏之先奚仲為夏車正仲虺為湯左相與滕爭長薛實先封佐漢登台因而胙土河東冠族代不乏賢五代祖道衡隋吏部侍郎內史侍郎隋文帝創造霸圖發揮綸翰變當時之文體髙祖收皇朝行臺金部員外天䇿府學士我太祖之經綸王業專掌詔檄擅經國之詞宗凡所事業著於史傳曽祖原超皇朝户部尚書中書令汾陽縣開國男丹青景化金玉王度訏謨載於盟府故事留於臺閣祖毅皇朝鄜州洛交縣令大子舍人父儒童皇朝京兆府醴泉縣丞贈梁州都督潛德養蒙晦眀藏用位不克量道屈安卑武子之德在人太丘之德益茂府君諱舒字仲和醴泉府君之長子也元和誕靈純粹時秀覃訏有異敏惠夙成聞詩禮之義方深仁眀之正性讀書知王霸大體覽史纂名臣髙節脫略細務經濟逺圖銓衡賞擢年十九授華州司士參軍從纍士也轉相州司法參軍又遷岐州司功參軍鄴郡舊都扶風左輔掾曺之選必先才地以儒學飾吏以明察涖官筮仕之初有令名再命而傴不忘循牆之恭三語故稱則聞趨府之譽堆案之下析滯無虞天寶初寰宇升平典刑攸敘旁求端士以授法官拜大理寺丞敬爾繇獄有郡吏抵犯議合惟輕台臣作威俾令從重伏念纍日至於旬時茍有動搖必將頗類彰書厥狀實曰非辜初秉直而不移終忤權以獲罪貶青州司户參軍君子曰守法不回正也移官無愠達也道不可屈身屈何傷無何授金州司馬遷夷州刺史舉淹滯擇廉平也至德初遷渝州刺史西通楚道北控漢中山鎮縉雲峽通明月歌來暮於巴俗願借留於梁境升課最矣君理行第一所居必聞冉季膺政事之科龔黃獲循良之首纍遷巫溪二刺史兼少府監殿中侍御史溪洞雜類蠻夷徼外綬有素服小有底寧言語之所不通撫柔之化風靡寶應初皇上以四郊多壘五溪未安乃拜黔州刺史黔中經略招討官觀察處置鹽鐵選補等大理卿兼御史中丞黔中者禹貢荆州之域秦開武陵郡其啓土也大其貨殖也殷有廪君之土舟擅寡婦之丹穴惠化所感無思不服昆明夷者西絶域開池習戰漢所未通逺聞德政翻然琛賮尤物來獻於重譯紫泥寶書屢榮於手詔尋加金紫光祿大夫御史大夫河東郡開國伯賞茂勳也十郡土氣百域異俗輕剽啙窳姦宄矯虔示之以威信興之以禮讓華風變於夷裔膏雨浹於殊壤方將作鎮藩翰永為長城天不憗遺人將安仰以大厯十年四月二十五日薨於溪州之公館春秋六十有八勤王事也魏闕將朝來展韓侯之覲荆州罷市深懷叔子之仁百蠻感慟三軍雨泣惟君孝悌之性始於閨門忠義之誠聞於邦國少有大量幼而考成結綬勤王敬恭朝夕精識可以應務眀斷可以析疑每推是心以接於物魏其廡下金盡散人汜育室中衣無常主而雅好文酒醉猶溫克陶然忘機傲然自得儻來軒冕曽不在懷此則山簡之疏曠莊周之造道貴而不驕謙遜每推於寮友寬而能恕喜愠不見於家人信大雅之保身中庸之蹈道况乎負才器以身許國剖郡符簡易之風政行於南國者二紀領藩鎮者十年凡所條奏上簡聖心汝實專征嘗受元戎之鉞我惟共理兼榮副相之印充國之功宣右地伏波之式是南邦遺愛去思古今一揆君外祖故中書令逍遙公韋嗣立先朝碩德叔父故陳留郡太守河南採訪使江童當代著名賢季弟前吏部侍郎今宣州刺史宣歙等州觀察使雍朝之俊茂既疑隋朝至今掌綸翰者四葉天寶之後膺方面者三人中外相門奕代文學閥閲之大莫與之京夫人京兆韋氏故工部尚書東都留守虛心之次女琬疑作婉淑之德早映圖史柔明之姿動成師範方保榮於韓樂奄追悼於潘詩以永泰二年三月殂逝巫州官舍追贈扶風郡夫人從夫貴也長子長卿貢明經安親次子左金吾衛兵曺安國早成訓遵皆成器業才行之美孝友彰聞友志不時相次淪夭三子永王府參軍安郡髫稚之嵗執親之喪致毁而終人踰疑所痛卜云其吉列兆先塋不忘孝也第二女故梓州射洪縣令杜滔妻至孝純深提攜孤幼江山險阻扶護言歸誠孝所通龜筮協吉喪事不敢不勉備物必誠必信聖恩震悼贈禮部尚書賻物三百匹仍令中使監護弔祭儀仗禮優常等飾終之典回日月於佳城詔葬之儀濡雨露於泉隧以大厯十一年七月二十日合祔於萬年縣栖鳳原禮也季子大常寺奉禮郎遵誠協律郎遵誨太祝一作常非遵訓等七人童丱而孤孺慕罔極松楸已拱地邇先君棣萼前雕塋連愛子封之若斧尚行夫子之規坎不及泉自合延陵之禮余沗內弟早荷周旋傳盛德而備詳敘髙行而無愧詞曰汾水源長條山連岡鼎氣發祥大族其昌車正仕夏鈞衡佐湯贛君法令內史文章德厚慶逺才優道彰中書政本綸合傳芳時稱茂緒代濟業祉學小申韓藝通墳史邦有良翰朝推端士拆滯列曺申寃大理三黜無愠九遷兹始州縣暫勞雲霄則邇西南重鎮實倚長城夷落風變蠻陬化行駐車決遺攬轡澄清赤舄命服朱綸錯衡霜飛憲簡露溫戎旌絶域輸一作納欵殊方獻誠牙璋既備介圭方覲仁則宜夀天胡不憗迢遰江山悲涼旅櫬震悼宸扆哀痛藩鎮詔使護喪同盟執引哀哀孝子煢煢令胤銘德敘功庶乎傳信常州刺史獨孤及神道碑崔祐甫昔劉向稱賈誼言三代與秦亂之意其論甚美達於國體雖古之尹管文粹作吕未能逺過又稱董仲舒有王佐之才雖伊吕無以加管晏之屬殆不及也烏文粹作於戲二君以偉才當盛漢之崇而位止於下國二千石祐甫聞於先君僕射曰主恩非臣下之所圖天命豈生人之所制有唐碩量深識之士曰獨孤常州諱及字至之河南洛陽人皇朝左千牛元慶之曽孫蔡州刺史思暕之孫殿中侍御史贈祕書監通理之第四子仕而遭時鵠立於朝建旟東夏三著嘉績嗚呼痛乎奄忽捐館其時也大厯十二年夏四月二十九日其地也常州之路寢其夀也五十三年凡朝士公素見知者後進之士聞義嚮風者洎濠舒常三州之百姓莫不揕集作填膺流背不宴不相浹辰彌月厚而惜之者往往失聲出涕沱若公有子朗郁等年未齓厥兄檢校水部員外郎兼侍御史泛方佐浙河集無此字東帥聞喪來奔半旬而至􅀈毒之甚情二本作如不欲生既受吏人賓客之弔乃忍死集作哀謀事以六月六日引使君之柩去常州歸洛陽其年嵗次丁已十月朔七日葬我使君于河南府夀安縣其原先祕監之塋以夫人博陵縣君崔氏祔焉禮也水部曰天之降災害二字集作割于我家仲叔季盡矣吾將老矣吾弟常州之子未立今不刻石表墓則常州之令名何以傳於後乃託我故人敘而銘之常州稟元和以生幼有成人之量祕監府君親授以孝經常州一覽成誦祕監問曰汝志於何句對曰立身行道揚名於後世是可尚二字文粹作志也自是遍覽五經觀其大義不為章句學成童丁祕監憂勺飲不入口者纍日先夫人同郡長孫氏諭以不可滅性之義由是微進饘粥杖而後起免喪加於人一等鄉族稱其孝焉長孫夫人髙行明識訓導甚至至常州漸教成器卓然有立著延陵論君子謂其評議之精在古人右天寶末以洞曉玄經對䇿上第超拜華隂縣尉著古函谷關仙掌二銘格髙理精當代詞人無不畏服俄屬中原兵亂避地於越丁太夫人憂毁瘠過禮既外除江淮都督使戶部尚書李闕奏為掌書記授左金吾衛兵曺參軍旅之事非其所好未幾返初服今上即位下詔收俊茂舉滯淹政之大者以公為左拾遺凡所諫諍直而不訐婉而不撓削藁詭詞文粹作屬稿訓詞不傳於外遷太常博士時新平大長公主之子裴防尚永清公主初以太子少傅裴遵慶為婚主將行五禮公實相焉中使口宣詔旨易之大長主後夫薑慶初常州曰婚姻之禮王化之階以異姓之人主之不可甚矣某不奉詔中書令汾陽王時為五禮使從焉又百官薨卒定諡之際綜核名實皆居其當與嚴河南郢訓答吕荆州諲諡議博而正當時韙之遷尚書禮部員外郎受詔考第吏部選人詞翰旌别淑慝朝野稱正上方大恤黎庶精選牧守以公為濠州刺史平其徭賦恤其寃弱課績聞上加朝散大夫遷舒州刺史舒集有之字境瀕江傍山羣盜所聚或闕林藪或趦趄城市公惠以柔之武以讋之釋矛服耒盡為良俗其他如在濠之政居一年璽書勞問就加尚書司封郎中錫以金章紫綬屬江南旱歉比境之人流移甚衆公忠集作悉心以撫舒獨完安天子聞而休之擢拜常州刺史常州當全吳之中據名域沃土兵興之後中華剪覆吳中州府此焉稱大故朝之選牧恆屬意焉公宣中和平易之教務振人育德之體百姓蒙化遷善不知所以安而安吏不忍欺路不拾遺餘糧棲畝膏露降之集作庭公平生聞人之善必揄揚之氣盡與之不啻若身得之後進有才而業未就者教誨誘掖之惟日不足公之文章大抵以立憲誡世褒賢遏惡為用故論議最長其或列于碑頌文粹作碣流于詠歌峻如嵩華盛如江河清如秋風過物邈不可逮公有集二十卷行於代若夫贊堯舜禹湯之命為誥為典為謨為訓人皆許之而不吾試論道之位集作任宜而不涉前是公之仲兄季弟伯姊三年之間繼殁執天倫之喪如荼如蓼竟以無祿天何不仁然則賈與董名位不盡其才吾先君之歎主恩天命斯見矣其銘曰常州之德二本無此字孝行為大蒸蒸翼翼以敬以愛友于兄弟如捧如戴常州之義篤于朋二本無此字友用之有恆行之可久集作故之曰如一恆之曰可久扶危拯溺爾身我手常州之才施于有二本無此字政扶柔三部謙以為柄龔遂國僑千古迭映常州之文究其元二本無此字本質取其深文粹作艷從其損在星之緯在衣之衮常州之年止于二本無于字身深去昭昭之盛世與萬鬼而為鄰白馬江上青鳥洛濱鶺鴒在原嗟爾元昆縗絰二本作在霑血長號訴寃纂述遺美謂余不諼我見二本作覯之子將二十年相投藥石胡疹不痊譬我於池子為之泉譬我於桐子為之絃榮不獨遂難不隻全如何淑明推馥碎堅斂衣楚挽徘徊墓田望之不見赴之無緣貍首斑如女手拳拳如天如天泣涕漣漣二本作貍首斑如女手拳如天如天如泣涕漣如房州刺史杜府君神道碑劉大貞茂天爵者薄人秩韜真機者庇世道是有草萊纓組塵埃聲利位始階而身退名始存而迹逺者見之府君矣府君杜氏諱元徽字金剛京兆人也宗啓周封業光魯史層源演派疊萼舒英以地則因人斯大以世則令郡望族至若驟諫興王飛謀戰國垂康漢之緒著平吳之功咸寵冠往賢爵華前載斯粗舉而未能也曽祖良把府君銀青光祿大夫國子祭酒贈左僕射祖士倫府君大中大夫左衛大將軍考玄隱府君遊擊將軍商州栒水府折衝上柱國或遵揚儒風或宣肆武烈方傳學省勳在戎府俾昌而裕育我今人府君貞量居體中和成性孝慈根於素風明敏彰於羈貫惟道素是味唯還丹是慕浮碧落而雲髙立秋江而鶴逺既而宗族喻良弓之業親朋示博帶之義事感於中勉而筮仕解巾暑部戎校金吾左翊府尋授左監門衛長史朝錯才識始從掌固揚雄詞賦仍聞執戟滯修鱗於汙瀆棲逸翮於榆枌摩重霄躍洪瀾將有日矣然而雅好翰墨尤工弧矢援毫露垂舍拔星落修倒薤以偕極掩穿楊而稱妙造次於是專精無怠况素以飾智於是隳身徇物則儒墨兩忘也匪江湖而間匪仁義不修則朝野一致也是用齊榮賤混淹速嵗星逾所名秩乃徙人不堪其望我則莫之屑其鍊性存神逺希彭羡猶初志也府君之從父昆弟有懸王官宿債者簡書煙交司空星至悉責薄産殆將不給且家人嗷嗷泉壤貽懼府君憂攢于貌事甚在己遂鬻所居之業而代償焉卜遷于西郊之别墅又有至自西州者官遊既久田屋斯變陶園兼松菊己荒江宅與桑田俱盡府君復推别墅以居之其仁愛之厚多此類也屬虜起幽都兵交中原二京弛禁六龍偏幸府君心壯血憤志圖家國乃激勸親族糾率子弟弦木礪金有車一乘督責遣之曰吾聞救時者無險易赴難者無逺邇况文武繼代食君之祿者乎吾夙有林棲之契又齒髮將暮不有處者誰保家屬汝曺行乎吾欲兼濟遂提老襁幼集于終南時勳武爭摶齊人大擾戰血殷野傷魂嘯林丁壯濟師婦姑行餉府君深居事外適與靜合身絶鼙角目無鋒刃天下鼎沸雲卧恬然伊昔漢臣擇日而不去秦客緣原以忘返屯往泰還我無凝滯由是故放蕩形役徜徉家林州閭歸仁疆理息訟儒書仙録開卷自得鶴侣鴻儔風期相許實清冥上人也以乾元二年夏四月十八日遘疾終于長安居德里私第春秋六十有四夫人渤海郡太夫人髙氏媛懿淑茂柔貞惠和含貞樂道合府君之志以貞元四年秋九月庚午合葬于咸陽之洪瀆原禮也長子前河北招討都統領兵馬使銀青光祿大夫檢校太子詹事兼御史中丞上柱國建安郡王食實封一百五十户季玭宣茂績於邦家施湛恩於祖考忠誠好謀深毅能斷當禁衛之心膂總兵符於掌握皇威揚於外臣節固於中勳庸大來爵位斯集朝廷以府君重疑作垂裕道至貽謀慶深下詔褒寵用光幽穸贈房州刺史次子冠軍大將軍兼試太常少卿季璘探賾兵謀妙通劍術致身環列亦著殊名惟伯與仲孝心罔極莫不切追逺之情循聿修之旨爰托圖篆式昭令德其詞曰休祉錫美元淳育靈是曰哲人惟道之英風質簡逺音詞淑清優遊下秩想象高冥謀能圖國射足觀德藥龜霜玄書池水墨義自情感仁非教植鬻業推居宗親翼翼當夷亂華髙蹈雲崖子弟從師䇿勳王家艱難既平吐納元和玉貌雖全促齡如何詵詵令嗣忠武濟世位崇銀章權總輿衛是降褒贈載光幽竁攢疑詞揚休昭示來裔故朝議郎使節溫州諸軍事溫州刺史充靜海軍使賜緋魚袋河東裴府君神道碑權德輿春秋時賢卿大夫皆敘其代功舊德章明以續集作績蓋黃流玉瓚之寶産於深山清廟夏屋之材秀於中林其或為珩為珮為節為梲無非禮神用備崇構洪河之東裴氏在焉自魏晉逮今忠賢輩出士林以為領袖史臣披於簡䇿而又奕代降休且公侯上嬪王姬領方州者可得而言以刻金石曰君諱希先字某四代祖懷節皇給事中工部侍郎荆楊二州集無二字大都督府長史洛州刺史諡曰定曽祖昭歷司門度支二郎中衛尉太府二守卿祖確歷左右衛左右金吾衛四大將軍太府卿太子詹事平陽郡開國公諡曰貞自定公至貞公皆銀青光祿大夫以至烈考怦仕至鄜集作麟非州刺史太子僕贈絳州刺史凡四代貴仕左曺二千石四衛九列副冬官尹東朝集作明非禮及易名恩深追逺代修其業鍾美於君君寬裕博厚恭儉莊誠資性端直詞氣間雅於經書泛為疏達而不窮章句於吏道通於理述而不求聞問自解巾而至於捐館凡歷十一官無疵政無違德祗守家法奉以周旋仕於宫殿始為僕寺進洗馬中允再為家令仕於國王歷濟陳蜀三府初為騎曺掾次為長史次為傅其初又為夀安丞後牧臨卭乃遷永嘉班宣六條撫柔二郡惠和所被夷越嚮方其在朝也以朝錯之智王陽之道而滯於散地括於久次其分符也仁慈愛利而必易集作不茍簡奉法循理亦不細苛居三年以疾受代貞觀六年冬十一月沒于鍾陵集作林非之私第享年若干明年八月返葬於長安少陵原之舊塋以夫人永年郡主祔焉禮也惟郡主玄宗之孫今皇帝之從祖姑也儲是慶靈生而洵淑窕窈德象婉娩聽從備柔嘉之行成肅雍之道初天寶十三年詔選資地才令以府君有安仁武子之美而下嫁焉齊莊以主中饋和樂以宜姻族作配君子禮同家人嚴祭祀服浣濯者三十六年而沒春秋五十八嵗貞元五年也鍾陵之守臣以聞上不視朝率禮有加嗚呼以公之率履永年之仁淑宜其繁祉夀考子孫繩繩而生不極其道歿無主其後此伯道之痛碩人之詩所由作也遺命以兄之子某為副乃列其祖代官伐請刻豐碑辭之不獲乃繫詞曰河東右族蕃衍紹績代功世祿昌而熾兮乃生永嘉剖符承家實而不華諭於義兮二邦靜謐禮之善物朱轓赤茀亦為貴兮有齊永年作儷仁賢佩玉鎗然四德備兮天漢之尊平王之孫爛其盈門恭祀事兮返彼玄壤少陵之上終古悽愴金石識兮文苑英華卷九百二十四
