body:
  text: 文苑英華卷七百七十六宋李昉等編頌德下唐劍南東川節度使鮮于公經武頌一首唐檢校右散騎常侍容州刺史李公去思頌一首陵煙閣勳臣頌二十二首陵母頌一首唐劍南東川節度使鮮于公經武頌于邵皇唐八葉伐叛取亂再寧區夏四海絶橫流九州無匪人制要荒以從述職分周召以相夾輔有多士為內理有方鎮為外攘垂衣裳而御極惟十有三祀矣大劍之南自秦惠疏疆是一都之會南蠻西戎舊為敵國伺我休戚為爾進退國家之有天下也或懷柔羈縻與之連和或掩義背德與之交鋒尋盟問罪不無事矣當天寶中河隴之外却地千里赤山青海不敢芻一作致飲牧絶漠無迹我嘗有之屬燕薊猾亂毒痡生人羣盜乘時舋彼戎復舊怨是以緑林逋藪白晝殘人池隍鞠為茂草邑里化為煨燼墜瓦萬聚頺垣一平大厯三年夏六月分命漁陽伯鮮于公擁旄仗鉞總統東川八州之地自閫之外帝俞欽哉公才包五行體含四氣揮若神劍扣如鴻鍾其始也凛之以威其漸也濟之以恩作之君師為之父母由是逺者來來者安也於是驅豺狼之所嘷剪荆棘之所蔽一之嵗二之嵗葺郡邑正疆理而樹牙幢三之嵗四之嵗闢田疇闐帑藏而耀軍實五之嵗而甲兵大振六之嵗而勇可賈餘七之嵗而人有取疑作聚訓有常矣無暴可禁所謂保大定功有財疑作才斯豐所謂安人和衆兼之者不戰而勝兵將戢乎畿內諸侯始有賴而捍戎於邠隴矣則知漁陽公外陳藩屏而助威武於鑠哉其為人臣之式歟方今龍安屬邑久為重門待暴之地壤連西山分我天限有間道可以招戎偵有絶險可以資敵國去年發中軍之倅為之鎮守今秋自元戎十乘以先啓行白露始降秋草方實斤角徑而膂力既堅樵蘇積而糗糧斯峙如熊羆曰千夫長如貔虎曰百夫特前矛一作茅後徑不戮一人君子曰軍政不戒而備矣以此料敵兵必勝戰必克我武惟楊休有烈光福履所將夀考無疆其猷克壯而佐堯翊湯不其盛歟公名晉字叔明漁陽燕人也其先殷人箕子處其地世有君長北方之強歟至西漢有京兆尹褒惠東漢虎牙將軍輔散遷伊洛相衛之間垂裕後昆繼世流慶粵有髙祖父康紹後牧于閬解印寓於新政縣伯會二字一作洎曽王父與王父因家焉衣冠耒裔松檟斯茂實膏腴而止斯樂土正版圖而終移關內今復為長安人也公先兄仲通擢桂枝綰黃綬不十年而權生殺於梁益之地入為京兆尹公自孝亷專經髙第再參環衛纍拜棘司四遷柱史連擢華省宰洛邑時號神明牧商於人歌父母有詔加金商均房等州觀察使處置使又入為京兆尹歷左右宫相出牧臨卭兼御史中丞充卭南招討都團練使由中司復加節制焉尋遷御史大大朝廷以為今之二難時也卓絶載形詔旨談者榮之方將登金鋪調玉鼎徼蒼生之福豈懾殊俗收係虜從衛霍之事乎邵忝嘉賔一作拔之末猥厠諸侯之選拜賜之辱奉以周旋頌聲不作無以報德發彼馨香存乎琬琰匪報也永以為好遂作頌曰金火間秀實生有德風雲所感以佐王國龍韜豹略天資默識敦詩閲禮行有餘力忠於事君立名底績鴻鵠斯舉驊騮登迹風雨如晦我心匪易三川震蕩萬里沙磧宗社既安君臣正焉乃眷西顧實維東川東川伊何人其播遷邑有遺洛家無舊阡爰命虎臣仗兹犀節上天下地惟爾之發拉一作招彼羣逋輯我逰闕躬之先之不日不月七載勤勸三軍克振龍安之役伐原示信么戎宣驕則我觀舋王帳潛機金鉦俟進漢恩營平先零之功班壯車騎燕然以封軍之一作從軍之所樂吾之所從門生獻頌豈二子之所疇庸哉唐檢校右散騎常侍容州刺史李公去思頌并序前人維貞元二年秋八月天子以郡國二千石之髙第者曰隴西李某字某利澤施於裔土美化被乎遐氓是用遵虞書陟明之義參周官進律之典俾之由檢校右散騎常侍兼御史中丞容州刺史本管經略守捉招討處置等使為御史大夫嶺南節度經略觀察處置等使實授兵符加擁使節某月自合浦如南海於是縣道溪谷鰥寡孤老泪于士吏相與懷思隱然不去乎心森然不離乎目願所以昭明其德光示于後嶺南經略使判官權知容州留後事監察御史裏行同郡李牢一作字始以文學居辟選之首遂參帷席復以謀能當器任之重留總軍府美公之政大傋感公之禮有加因其人之請而上之上可其奏夫其郡之四封濵于百越外則有山冦海孽比境雜處之虞內則有勤戍勞師流散轉死之弊親師其下以撫吾人慰薦傷夷安集疲一作罷通用耗懼貨貢之闕至助之以家財憫徭事之繁至代之以私屬選武藝歸老疾罷減塞卒四千餘人以趨農時率浮惰闢汙萊開置屯田五百餘頃以足軍實舍冦賊之為縲囚者釋而遣之以除其怨而狙獷以順禁人民之相虜賣者執而誅之以去其害而童昏以安常嵗有災濫炎而連燒于廬舍公創其制以禦其鬱攸而邑居以葺舊俗多怨睚眥而致毒于飲食公立其防以解其悁忿而鄉黨以和樹枝幹而啓閉畢修列亭燧而厄害斯控差重輕以行徴令無不均之譏量逺近以納貢職無不供之責人用富庶家有儲峙敦之以禮懷之以仁潔已而不汚未嘗有貰貸勤身而不怠未嘗有懈弛明足以照遁情隱慝而不為察威足以制猾人暴吏而不為苛古之良能何以加此其人之獻狀云耳惟公我有唐宗室枝屬之選鹽州刺史諱孝詵一作先府君之曾孫𢎞農郡太守諱璟府君之孫太子太傅贈司徒諱齊物府君之子洪緒丕績之餘裕𢎞休純懿之下鍾寬博而柔良髙明而踈逹根於經義飾以藝文故其仕王畿宰京邑纍執憲簡且登軺車備重臣賔介之職居大府紀綱之任三亞京尹兼中司之貴復為宫相在常伯之位歷饒州刺史而後至於是州恩結於人功加於物必聞理效而興頌聲且夫有美焉有刺焉詩人之義也善善而褒之惡惡而絀之春秋之事也使賢士大夫之事業不沒於後太史公之制也以余之嘗修史記而為訓辭緣人之懷心而頌之曰帝念南方迫界蠻夷人新被冦嵗或勞師屬之於公俾養牧之匪直勤身亦帥其屬贍我貧匱字我惸獨息人便農墾田積粟修其教化被以威德賊害既除禍災斯息完我廬舍親我骨肉咸保其生且易其俗蚩蚩羣族孰不蒙福播為頌聲公受百祿彤弓玈矢以長諸侯人之懷德刋石垂休凌煙閣勳臣頌文粹作讃二十二首并序吕溫我二后受成命撫興運轉坤軸撼乾樞鼓元氣而雷域中騰百川而雨天下雲收雨霽如再開闢蕩蕩焉與太極同功貞觀十七年太宗以功成理定秉為而不有之道讓德於祖考推勞於羣臣念匡濟於艱難感風雲於疇昔思所以攄之無窮乃詔有司擬其形容圖畫於凌煙閣者二十有四人蓋象乎二十四氣之佐天生物文粹集本無此二字昭勳德也昔者舜以九官文粹作五經致理周以十亂反正髙皇文粹作祖以三傑祚二本作祚或作祚漢光武以二十八將中興若夫錯綜勳賢牢籠今古雄四代而髙視者其唯聖唐乎至若唐莒公劉渝公之倫探元符建帝圖首戴神堯舉晉陽而活天下此則大禹之拯溺也魏鄭公以致君為己任諌若不及謇謇左右秉心宣猷此則咎繇之揚言也虞永興紏合羣儒旁求百代明備王禮克諧帝樂使我大國煥乎其有文章此則夷夔之制作也長孫趙公舉大義除二凶安宗廟定社稷以振我丕赫無疆之休此則周公之匡救也英衛受天勇智雄武佐聖鼓行海內摩定四方此則太公之鷹揚也房杜玄機朗識並運帷幄神發響效暮成天功此則蕭何之指縱子房之決勝也尉遲秦程剛毅木訥氣鎮三軍力崩大敵匹馬孤劍為王前驅此則吳漢之朴忠賈復之雄勇也其餘皆榱棟殊材黼黻異制儔諸古烈罔有慙德皇王之業集作際於斯為盛其始也文為經武為緯智斯作忠斯述其末也大不逼小不遏退者全來者逹控而縱之使自用之推而引之使自盡之不設籠檻以觀寥集作遼廓之致不頓韁鎖以極權竒之變執一德而衆力展懸大信而羣情竭髙祖聚之以義大宗用之以道髙宗終之以仁傳聖萬代享其功利此非盛歟昔陸機袁宏為晉人而歌功於漢魏作者猶或稱之况乎逰聖代觀國光目睨凌煙而頌聲不作某不揣賤劣有亹文粹作斐然之志輒盡所蓄各為讃一章上以見王業之艱難中以明聖賢之相須次以朗前哲之光韻末以聳後人之盛節侯君集張亮負勳跋扈自陷大逆敢沒其名用彰天罰二本作刑使伐勞懷二者懼春秋之義異姓為後故以河間元王為讃首云河間王孝恭太極構天本由一氣大人創業資我族類堂堂河間仁勇是經遹駿有聲為唐宗英暴隋天亡羣盜猖狂我伐用張時惟文粹作繼哲王武有烈光為爪文粹作翼牙肺腸經綸八方自南徂東晏海澄江平有銧輔光祐使我父二本作使父兄帝天下化家為邦用竭爾力寵臻其極言不伐色不德以遜以默柔嘉惟則佐髙祖建大績如周旦奭與太宗守大成如漢間平宜君宜王盤石無疆房梁公玄齡梁公先覺龍卧待君長彗流光掃天布新義師雷興公躍其鱗杖䇿千里來排帝閽婉婉梁公實懿實聰實光實融羽翼義忠若鸞若鴻大風動地儒服從容靜運胸中弛張折衝左右太宗夷屯廓蒙定髙祖功功告武成翊開太平我雖忘勞時靡有爭網羅遺賢推轂羣英玉不韜光文粹作輝蘭無沉馨飛鴻出冥振鷺在庭濟濟多士太宗以寧太宗寧矣文粹無此四字公無事矣闕衮有補惟仲山甫經營四方方叔邵虎大邦鈞軸至則委汝間居台輔揮二本作撝默自處亦莫敢余一作佘敢侮髙朗令終於二本作嗚呼梁公杜萊公如晦穆穆萊公竒資粹靈藴元和氣為大國禎乘時能恢文粹作恢能唐室天文粹作大開故人相携少與房梁公同有匡濟之志也直上泰階更為隂陽迭作日月佐明四海贊育萬物二人同心王度是欽如玉如金德音愔愔萬有千古永稱房杜如周申甫魏鄭公徴堂堂魏公崇節大志喬幹直聳摩天自致遭風雲時得霸王器一言委質有死無二一本作二撫我則后各盡其志嘗事隱太子李密也沉浮變通吾道不窮龍戰既息皇建其極俾補衮職其繩則直諤諤嶷嶷危言正色保太宗德弼違替否日月不蝕黜漢霸雜行周王道人或有言秉德不撓與封德彜廷論禮興樂崇德洽道豐保合太和昭明有融起四年中復三代風言出化成神哉厥功尹躬佐商有耻于湯公以其心文粹作志匡飾文粹作錦聖唐為唐宗臣致唐無疆致唐無疆永式萬邦長孫趙公無忌趙國之先發祥朔土乃祖乃父受天之祜有女而聖文德皇后為天下母有子而賢為唐室輔聖賢同契文粹同氣千載一覩丕顯趙公允文允武克忠克仁實有大勳髙祖受命太宗歸尊翼翼乾乾恪居于藩羣孽亂嗣爭窺神器鴻業將墜公揭大義一匡天地人到于今家受其賜帝將傳聖爰有顧命汝忠汝誠莫與汝京與我聖子守唐太平公相髙祖有太宗餘二本作遺風刑措財豐八荒來同和氣大融妖星襲月一作夜襲禍起中空公將正言集作之以正集作王帝躬武氏謀位公以力爭力屈羣邪誠阻天聰黜非其尤令問無窮唐莒公儉嵗寒隂凝氷雪皚皚有鳥擇木先陽春來猗與莒公王佐之才間運未開登潛龍臺代萬一本作百姓請命與天為媒扶龍而興振起雲雷權輿帝圗經始唐基始覆一簣勃焉巍巍易失者集作月時難知惟幾知幾其神莒公元勳劉渝公政會河出崑崙來潤中夏連山合沓橫擁其𣲖巨靈勃然手拆文粹作擘太華決流東注功並造化粵我聖唐將舉晉陽帝命是將往拯溺于四方亦既載斾亦既秉鉞強凶當路王威髙君雅拒不得發渝公慷慨感義激節用竒制變大事立決雷奮電文粹作霆越天衢八逹則莫我敢遏如巨靈破山河勢始豁赫矣渝公與神齊烈迹如仙掌炯炯不滅李衛公靖有隋之末羣盜熾爇帝怒震發五星從太白煥照參野將有聖人兵定天下金精下射猛毅感激李公矯矯從此奮迹躍于中原王者則集作自獲壯士不死初公不利於我帝戳之壯其言而免壯士云自稱云唐威載赫帝曰汝傑致天之罰手付金鉞俾往式遏不庭則殺如颷發發如火烈烈摧枯爍雪應鼓如截逺若荆巫險若江湖強若胸奴莫不率從莫不震恭車書混同氛祲蕩空衛侯之功功則維何威明惠和䇿勇駕智長驅仁義仁義曠蕩帝王之將萬古式二本作曷瞻鐵山巉巖詔築墳闕象鐵山積石山巉巖一作巉巉李英公績橫流莫極大亂無象英公傑出應運為將與楚楚霸與漢漢王天時人事隨我所嚮長蛇縱蠧王世充東據河洛婪婪封豕建德來濟同惡虓二本作號吼連聲如雷如霆萬里震驚時維英公諒我太宗斬豕以鉞取蛇于穴羣穢殄滅乃定九鼎乃開明堂奄有大邦金甲同光告成于皇太宗獻捷于髙祖與績擐金甲為上下將皇業用昌帝命英公北伐獫狁雷鼓殷殷旄頭幾殞掃雪文粹作雲黑山布唐陽春五原草緑不見南牧島夷未庭天子親征其鋒維英莫拒莫抗是震是蕩破東海浪天下既和解鞍投戈衮服委蛇華髮皤皤始終三朝無玷可磨劉夔公𢎞基夔公峥嶸金虎之精應時而生與運俱行總帝元戎震唐天聲瞑目張膽前無金城别建龍節中分虎旅啓行萬里乘氣一鼓劍揮雷電二本作霆斾卷風雨先馳咸陽鎮定天府天府既定唐集大命入揚王庭出握文粹作權兵柄薄伐獫狁朔風不競徂征島夷東海如鏡義始忠卒元勳之盛長孫邳公順德泰山未明雲鬱幽崖日觀赫間舒為丹霞昔我太原賢傑潛屯帝出于震爛其盈門邳公炳焉實耀其間功參造化謀協先天執殳前驅捧轂南轅以榮以舊佐命之先虞永興公世南英英永興華德素行以文冨國以道佐命天下既定為唐儒宗東觀石渠始生集作出古風秉精驛文粹作繹思假道書圃馳騁文粹作驅百代出入三古開渠作問羲皇心聼堯舜語歸來帝側獻可替否帝告永興與鴻碩之倫闡六籍三墳建樂章禮文先師是宗先聖是崇於廓辟雍辟雍沉沉天子所臨或絃或歌講古述今其徒八千纓辨森森獩貃羌髳咸詠德音羽林孤兒亦垂青襟洋洋聲教無逺不洎日月所照皆成文字鬱開古始掃蕩澆季實我羣儒成太宗之志英英永興冝曰文懿公諡尉遲鄂公敬德洸洸文粹作侁侁卾公百鋉龍鋒文粹作泉沉翳未宣氣衝斗間佩非其人初事金剛躍入大川神武獲焉提之上天天地之內指麾無前熊威虎力隱若敵國剛毅木訥安劉必勃武德之屯手拔禍根掃除氛昏捧出白日文粹作日月耀乎天門功成名遂髙謝戎事烈烈猛志化為和氣深地髙堂頥性保常屑瓊飲露靜奏清商商為臣勵事君鄂公之德之勳貞觀後公不交人事常鋉氣服食奏清商之樂以日奉之德之勳二本作之志之仁蕭宋公瑀隋氏不君忠賢莫用桐生朝陽有集惟鳳捨彼頺厦鬱為新棟輅車玄衮開國有宋武德之暮羣孽內蠧巍巍宋公聳節髙步不吐不茹不來不去屹崛文粹作屼中立為天一柱從容而言社稷遂安持誠秉忠光輔二君激濁揚清育集作欲人如身道至廣莫我敢羣境至大不容纎塵雪山倚空氷壑照人耿介絶鄰文粹作倫為唐貞臣張郯公公謹有倬郯公仡仡而仁二本作貞洸洸文粹作侁侁而純二本作仁實太宗信臣太宗守藩內難未夷圖之則安捨之則危帝臨安危機二句一本作圖之則危帝臨危幾以懼以疑以蓍為有文粹作先知是筮是咨郯公嶷然排闥折蓍抗憤正詞用人事定天意身為元龜不識不知順帝之則以定社稷郯公之力公之云亡帝念其勤若痛在身天懷發中哭不避辰君臣之間敻古未聞屈突蔣公通五運相推土火革期隋化為唐忠臣不知猶驅義徒奮拒王師指心誓天摩頸待時人歸有德四海皆叛春日滿川孤文粹作流氷未泮亡家徇國方寸不亂力屈勢窮排空落翰東南慟哭血文粹作聲盡魂斷仗忠就擒萬國瞻嘆帝曰爾通古之烈士孝子其親誰不欲子俾侯于蔣授以師紀感恩不死宣力如彼佐唐扶隋名教之美髙申公士廉維嶽降神佐唐生申忠貞自天孝友如春德為邦基行文粹作仁厚人倫肅肅雍雍真王者臣慶因歸妹光誕集作延天配文德皇后公之同出德文粹作懿非婚媾之中雲龍潛會建功二本作公南海廓我無外諒武撥亂弼文開泰遏文粹作過彼庸蜀荐鍾澆季文翁之化若掃于一作於地中公攸徂有教無類父子兄弟望風相愧勃興儒雅大復禮義西南頌聲到今不川文粹作未墜名登元勳理冠羣吏全材大器於鑠厥懿殷勛公開山溫溫殷公初若懦夫銅印試吏褎衣為儒大風驅雲忽與之俱遭逢真宰參造化謨天地既闢厥功有赫從王龔行佐帝光宅逺展驥足髙揮鳳翮以永終譽垂于竹帛秦胡公叔寶洛汭之役龍戰未決王世充與我師陳于九曲秦公應變臨陳電拔鋭氣盡來我盈彼竭成敗反掌存亡奄忽虎來風壯鼇轉山沒遂作心膂爰從討伐崩圍陷陳火迸氷裂翕如鶚聳縱若鯨突功成國定萬古壯骨程盧公知節盧公倬然動軼幾先轉禍為福與秦胡公降于九曲攀龍上天繽翻鵬翼積風乃聳桓桓將軍大敵則勇雷崩山谷貔虎頓伏颷倒溟波鯨鯢蹉跎見危而進當死不讓干城三朝身老氣壯段褒公志玄褒公虎臣先運而臻謁帝大原許唐以身挺集作擁劍駕氣騰風躍雲積忠纍仁光有厥勳建旄蜀本作斾北伐細桞宵屯風謐霜凝嚴扄逹晨天子之使駐車軍門軍屯肅章門乃外壁門以夜不納制使安衆秉威此真將軍洸洸文粹作侁侁桓桓克壯有聞英華此卷纍用洸洸而文粹皆作侁侁疑當時避熙陵藩邸嫌名許譙公紹羣動相食血流中原譙公夷陵豺虎與文粹作為鄰列境連城火炎煙昏皎其一邦如王不焚三光忽開萬象皆新誰有天下平生故人公與髙祖有舊引忠歸城豹變蠖伸金石之契移為君臣奕奕煌煌為龍為光元戎啓行大斾央央式遏大江奄征南方恩斯勤斯兩不相集作可忘陵母頌皮日休孔父稱唯小人與女子為難養也夫女子之忠貞義烈或聞于一時小人之姦詐暴亂不忘於一息使千百女子如小人姦詐暴亂者有矣使千百小人如女子忠烈貞義者未之有也則安國侯之母也不以項強而劉弱俾子事項不以子背君而别事而有忿色對暴君而抗大節捨其生而踐死地嗚呼春秋書解楊致晉君之命漢史稱周苛拒項籍之爵方諸陵母誠未為忠何者男子少服教壯行道忠貞義烈雖死不辱鼎鑊在前而不懼鎖集作鑽笮被體而無怨乃男子之常事也至夫女子少隱帷薄壯執箕帚豈常熟於忠貞義烈哉是女子之有是者猶百物之有瑞者矣豈易為哉豈易為哉文苑英華卷七百七十六
