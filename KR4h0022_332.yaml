body:
  text: 文苑英華卷三百三十二宋李昉等編仙道華清詞二首夢仙謡二首懷仙歌一首桃源行二首黿頭山神女歌一首馬明生遇仙女歌一首天上謡一首朝上清歌一首漢武帝雜歌三首王子喬行一首玉華仙子歌一首學仙難一首元丹丘歌一首仙人詞二首謫仙詞一首王母歌一首華淸詞劉禹錫日出驪山東徘徊照溫泉樓臺相集作影玲瓏稍稍開白煙言昔太上皇常居此祈年風中聞清樂往往來列仙翠華入五雲紫氣歸上元哀哀生人淚泣盡弓劔前聖道本自我凡情徒顒然小臣感元化一望靑𡨕天同前顧雲祥雲皓鶴盤碧空喬松稍稍韻微風絳節影來朱幡響丁東相公淸齋朝蘂宮太上符籙龍蛇散花天女侍香童隔煙遙望見雲水璈吹鳯淸瓏瓏丹砂黃金世可度願啓一言告仙翁道門弟子山中客長向山中禮空碧九色真龍上漢時願把霓幢引仙客一作煙䇿夢仙謡李沇海宮蹙浪收殘月挈壺掌事傳更歇銀蟾半墜恨流咽六鰲披月撼蓬闕九氣真翁騎白犀臨池靜聽雌蛟啼桂花浥露曙香冷八窗玉朗驚晨雞裁紗剪羅貼丹鳯膩霞逺閉瑶山夢露乾欲醉芙渠塘回首驅雲朝正陽同前祝元膺蟾蜍夜作靑𡨕燭螮蝀晴為碧落梯好箇分明上天路誰教深入武陵溪懷仙歌李白一鶴東飛過滄海放心散漫知何在仙人浩歌望我來一作秋應攀玉樹長相待堯舜之事不足驚自餘囂囂真集作直可輕巨鰲莫戴三山去我欲蓬萊頂上行桃源行王維漁舟逐水愛山春兩岸桃花夾去一作古津坐看紅樹不知逺行盡淸溪忽值一作不見人山口潛行始隈隩山開曠望旋平陸遙看一處攢雲樹近入千家散花竹樵客初傳漢姓名居人未改秦衣服居人共住武陵源還從物外起田園月明松下房櫳淨一作靜日出雲中雞犬喧忽一作驚聞俗客爭來集競引還家問都邑平明閭巷掃花開薄暮漁樵乘水入初因避地去人間及至一作更聞成仙去一作遂不還峽裏誰知有人事世中遙望空雲山不疑靈境難聞見塵心未盡思鄉縣出洞無論隔山水辭家終擬長遊衍自謂經過舊不迷安知岑一作峯壑今來變當時只記入山深靑溪幾度一作幾回到雲林春來遍是桃花水不辨仙源何處尋一作皆文粹同前前人武陵川徑入幽遐中有雞犬秦人家家傍流水多桃花桃花兩邊種來久流水一道何時有垂條落蕊暗春風夾岸芳菲至山口歲歲年年能寂寥林下青苔日為厚時有仙鳥來銜花曽無世人此携手可憐不知若為名君任一作往從之多所更古驛荒橋平路盡崩湍怪石小溪行相見維舟登覽處紅堤緑岸宛然成多君此去從仙隱令人晚節悔營營黿頭山神女歌韋應物黿頭之山直上洞庭連青天蒼蒼煙樹閉古廟中有蛾眉成水仙水府沉沉行路絶蛟龍出沒無時節魂同魍魎潛太隂身與空山長不滅東晉永和今幾代雲髮素顔猶盼睞隂作沉深靈氣靜凝美的皪龍綃雜瓊珮山精木魅不敢親昏明響像如有人蕙蘭瓊芳積煙露碧窗松月無冬春舟客經過奠椒醑巫女南音歌激楚碧水冥空見鳥飛長天何處雲隨雨紅蕖緑蘋芳意多玉靈蕩漾陵淸波孤峯絶島儼相向鬼嘯猿啼垂女蘿皓雪瓊枝殊異色北方絶代徒傾國雲沒煙銷不可期明堂翡翠無人得精靈變態狀無方遊龍宛轉驚鴻翔湘妃獨立九疑暮漢女菱歌春日長始知仙事無不有可惜吳宮空白首馬明生遇神女歌前人學仙貴功集作工亦貴精神女變化感馬生石壁千尋啓雙檢中有玉床鋪玉簟集作堂立之一隅不與言玉體安穩三日眠馬生一立心轉堅知無丹白蒙哀憐安期先生來起居請示金璫玉珮天皇書神女呵責不合見仙子謝過手足戰大瓜元棗冷如氷海上摘來朝暮凝賜仙復坐對食了集作訖頷之使去隨雲升乃言馬生合不死少頃集作姑勑教令付爾安期再拜將生出一授素書天地一作章畢天上謡李賀天河夜轉杓回星銀浦流雲學水聲玉宮桂樹花未落仙姿綵女集作仙妾採春垂珮纓秦妃捲羅八方曉集作簾北窗曉窗前食桐青鳯小王子吹簫鵝管長呼龍耕煙種瑶草粉霞紅綬藕絲裙青洲步拾蘭苕春東指羲和能走馬海雲集作塵初生石城集作山下朝上淸歌顧况潔服朝上清緑景開紫霞皇皇紫微君左右皆靈娥曼聲流睇和清歌些至陽無諼其樂多些旌蓋颯沓簫鼓和些金鳯玉鱗鬱駢羅些反風名香香氣遐些瓊田瑶草壽無涯些君著玉衣升玉車些欲降瓊宮玉女家些其桃千年始著花些蕭寥天清而滅雲目瓊瓊兮情感珮隨香兮夜聞肅肅兮愔愔啓天和兮洞靈心和為舟兮雲為馬君乘之觴于瑶池之上兮三光羅列而在下漢武帝雜歌三首韋應物漢武帝好神仙黃金作臺與天近玉母海上摘桃還集作摘桃海上還感之西過一作遇聊問訊欲來不來夜未央殿前青鳥先徊翔緑鬢縈雲裙曳霧雙節飄颻不仙步白日分明到世間碧空何處來時路玉盤捧桃將獻君踟蹰未去留彩雲海水桑田幾翻覆此桃中間三四熟集作中間此桃四五熟可憐穆滿瑶池宴正值花開不得薦花開子熟焉集作安可期邂逅能當漢武時顔如芳花潔如玉心念武作我皇多嗜欲雖留桃核桃有靈人間糞土種不生由來在道豈在藥徒勞方士海上行掩扇一言相謝去如煙非煙不知處二金莖孤峙兮陵紫煙漢宮美人望杳然通天臺上月初出承露盤中珠正圓珠可飲壽可永武皇南面曙欲分從空將集作下來玉杯冷世間採翠亦作囊八月一日仙人方仙人稱上藥集作方靜者服之恆綽約柏梁沉飲自傷神猶聞駐顔八十春乃知甘醴集作醲又作酒皆是腐腸物獨有淡泊之水能益人千載金盤竟何處當時鑄金恐不固蔓草生來春復秋碧天何言空墜露三漢天子觀風自南國浮舟大江屹不前蛟龍索鬪風濤黑春秋方壯雄武才彎弧叱浪連山開愕然觀者千萬衆舉麾齊呼一矢中死蛟浮出不復靈舳艫千里江水清鼓鼙餘響數日在天吳深入魚鱉驚左有佽飛落霜翮右有弧兒貫犀革何為臨深親射蛟示威以奪諸侯魄威一作蛟可畏皇可尊平田校獵書猶諫集作陳此日從臣何不言獨一作猶有威聲振前集作千古君不見後嗣尊為武王母歌李頎武帝齋戒承華殿端拱須臾王母見霓旌照耀麒麟車羽蓋淋漓孔雀扇手指元梨遣帝食可以長生臨宇縣上元頭戴九星冠揔領玉童坐南面欲聞要言今告汝帝乃焚香請此語若能練魄去三尸後當見我天皇所顧謂侍女董雙成酒闌可奏雲和笙紅霞白日儼不動七龍五鳯來相迎惜哉志驕神不悅歎息馬蹄與車轍復道歌鍾杳將暮深宮桃李飛成雪但看青玉五枝燈盤螭吐火光欲絶玉華仙子歌李康成紫陽仙子名玉華珠盤承霞餌丹砂轉態凝情五雲裏嬌顔千歲芙蓉花紫陽綵女襟疑無數遙見玉華皆掩嫭高堂初日不成妍洛渚流風徒自憐瑶階霓綺閣碧題霜羅幕仙娥桂樹長自春王母桃花未嘗落上元夫人賔上淸深宮寂歷厭曽城解珮空憐鄭交甫吹簫不逐許飛瓊溶溶紫庭步渺渺瀛臺路蘭陵貴士謝相逢濟北書生尚回顧滄洲傲吏愛金丹淸心回望雲之端羽蓋霓裳一相識轉疑情寫念長無極長無極永相隨攀霄歷金闕弄影下瑶池夕宿紫府雲母帳朝餐元圃崑崙芝不學蘭香中道絶却教靑鳥報相思王子喬行髙允生仙化非常道其義出自然王喬誕神氣白日忽升天暗曖御雲氣飄颻乘長煙寄想崆洞外翺翔宇宙間七月有佳節控鶴崇崖巔永與時人别一去不復還元丹丘歌李白元丹丘愛集作好神仙朝飲潁川集作水之清流暮還嵩岑之紫煙三十六峯長周旋長周旋躡星虹身騎飛龍耳生風橫河矯集作跨海與天通我知爾心遊集作遊心無窮學仙難韋應物昔有道士求神仙靈真下試心確然千鈞巨石一髮懸卧之石下十三年存道忘身一試過名奏玉皇乃升天雲氣冉冉漸不見晉語子弟集作弟子但精堅謫仙詞見二百二十五卷陳陶仙人詞二首小仙皆云十洲客莓苔為衣雙耳白淸編遺我忽隱身暮雨紅霞一千尺二赤城門開六丁直曉日已紅一作燒東海色朝天半路聞玉雞星斗離離礙龍翼文苑英華卷三百三十二
