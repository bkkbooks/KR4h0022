body:
  text: 文苑英華卷三百四宋李昉等編悲悼四哭人六十二首張籍五首元稹三首白居易八首闕名一首賈島六首釋無可一首杜牧六首姚合一首張祜二首朱慶餘一首劉得仁二首許渾六首雍陶一首溫庭筠三首方干三首李洞二首項斯一首馬戴二首聶夷中一首皮日休二首鄭谷五首陳陶一首哭元九少尹張籍平生志業獨相知早結雲山老去期初作學官常對宿晚登朝列暫同時間來各數經過地醉後齊吟倡和詩今日春風花滿宅一作院入門行哭見靈帷哭胡十八前人早得聲名年尚少尋思集作常志氣出風塵文場繼續成三代家世集作族輝華在一身幼子現存集作生才滿月選書知寫未成人送君帳下衣裳白數尺墳頭柏樹新哭丘長史前人曽作先皇殿上臣丹砂久服一作别不成真常騎馬在嘶空櫪自作書留别故人詩句遍傳天下口朝衣長送地中身最悲昨日同逰處看却春一作東風樹樹新一作春沒蕃故人前人前年戍月支城下集作上沒全師蕃漢斷消息死生長别離無人收廢帳歸馬識殘旗欲祭疑君在天涯哭此時哭孟寂前人曲江院裏題名處十九人中最少年今日春光君不見杏花零落寺門前傷吕衡州二首元稹望有經綸釣䖍收宰相刀鵬心駕風逺雲貌接天高國待球琳器家藏虎豹韜盡將千載寶埋入五原蒿二鵰鶚生難敵沉檀死更香兒童喧巷市羸老哭碑堂鴈起沙汀暗雲連海氣黃祝融峯上月幾照北人喪哭女樊四十韻虢州長史時作前人逝者何由見中人未逹情馬無生角望猿有斷腸鳴去伴投遐徼來隨夢險程四年巴飬育萬里硤回縈病是他鄉染魂應逺處驚山魈邪去集作亂逼沙虱毒濳嬰母幼看寧辨余慵療不精欲尋方次第俄值疾充盈燈火徒相守香花祗浪擎蓮初開月梵舜已落朝榮魄散雲將盡形全玉尚貞空垂兩行血深送一枝瓊祕祝休巫覡安眠放肆令舊衣和篋施殘藥滿甌傾乳媪間於社醫僧愧似酲憫渠深覺瘠集作賸一作痏訝佛力難爭騎竹癡猶子牽車少外甥等長集作間迷過影遙戲誤啼聲汙集作涴紙傷餘畫扶牀念試行獨留呵面鏡誰弄倚墻筝憶昨工言語憐初妙長成撩風拓鸚舌凌露觸蘭英翠鳳輿貞女紅蕖捧化生祗憂嫌五濁終恐向三清宿惡諸薰味懸知衆物名生而不食薰血虎豹狨猿等皮毛盡惡斥之巴南所無之物及北而默識其名者數輩環從枯樹得經認寶函盛愠怒偏憎數分張雅愛平最憐一作矜貪栗妹頻救懶書兄為占嬌嬈分良多眷戀誠别恆回靣泣歸定出門迎解怪還家晚長將逺信呈說人偷罪過要我抱從橫騰逹遊江舫攀緣看樂棚和蠻歌字拗學妓舞腰輕迢遞離荒服提集作持携到近京未容誇伎倆惟恨枉聰明往事心千緒新絲鬢百莖暗忩風報曉秋幌雨聞更敗槿蕭踈館襄陽敗壞城此中臨老淚仍自哭孩嬰哭崔常侍晦叔白居易頑賤一拳石精珍百鍊金名價既相逺交分何其深中誠一以合外物不能侵逶迤二十年與世同浮沉晚有退寒約白首歸雲林垂老忽相失悲哉口語心春日蒿高陽秋夜清洛隂邱園共誰卜山水共誰尋風月共誰賞詩篇共誰吟花開共誰看酒熟共誰斟惠死莊杜口鍾殁師廢琴道理使之然從古非獨今吾道自此孤我情安可任惟將病眼淚一灑秋風襟哭皇甫七郎中湜前人志業同元宴詞華似禰衡多才非福祿薄命是聰明不得人間夀還留身後名涉江文一首便可敵公卿寄劉蘇州前人去年八月哭微子今年八月哭敦詩可堪老淚交流日多是秋風搖落時泣罷幾回深自念情來一倍苦相思同年同病同心事除却蘇州更有一作是誰哭劉尚書夢得二首前人四海齊名白與劉百年交分兩綢繆同貧同病退間日一死一生臨老頭杯酒英雄君與操曹公曰天下英雄惟君與操耳文章微婉我知丘仲尼云后世知丘者春秋又云春秋之㫖微而婉也賢豪雖殁精靈在應共微之地下遊二今日哭君吾道孤寢門淚滿白髭鬚不知箭折弓何用兼恐唇亡齒亦枯窅窅窮泉埋寶玉駸駸落景挂桑榆夜臺暮齒期非逺但問前頭相見無哭雀兒前人掌珠一顆兒三嵗鬢雪千莖父六旬豈料汝先為異物常憂集作早知吾不見成人悲腸自斷非因劒啼眼加昏不是塵懷抱又空天默默依前重作鄧攸身微之敦詩晦叔相次薨一作長逝巋然自傷因成二絶前人一併失鴛鴦侣空留麋鹿身只應嵩洛下長作獨遊人二長夜君先去殘年我幾何秋風滿衫淚泉下故人多哭從伯祭酒失名剖符馮翊次以疾拜司成義重踈皆友仁深怨不生昔居南北省長話水雲情吟諷資高興絲綸發重名經秋漳浦卧一旦逝川聲自古誰回得重泉獨往程明靈辭魏闕冬日冷秦宫孝子號天護銘旌引柩行門闌容足跡章句許才清劣薄無因報恩知豈謂輕捫膺詞莫吐奠酒淚先傾從此階前石何人肯念貞愚魯獻孤石蒙賞孤峭哭孟郊賈島身死聲名在多應萬古傳寡妻無子息破宅帶林泉塜近登山道詩隨過海船故人相弔後斜日下寒天一作天邉哭胡遇前人夭夀知齊理何曽免嘆嗟祭回收朔雪弔罷折寒花野水秋吟斷空山暮影斜弟兄相識遍那集作猶得到集作見君家哭張籍前人精靈歸恍惚石磬韻曽聞即日是前古誰人耕此墳舊遊孤棹逺故域九江分本欲蓬瀛去餐芝御白雲弔孟協律前人才行古人齊生前品位低葬時貧賣馬逺日哭惟妻孤塜北邙外空齊中嶽西集詩應萬首物象遍曽題哭孟東野前人蘭無香氣鶴無聲哭盡秋天月不明自從東野先生死側近雲山得散行第三百卷三載王建吊東野二詩今此篇乃云島作前卷已詳注今併存之哭盧同前人賢人無官死不親者亦悲空令古鬼哭更得親鄰比平生四十年惟著白布衣天子未辟召地府誰來追長安有交友託孤遽棄移冢側志石短文字行參差無錢買松栽自生蒿草枝在日贈我文淚流把讀時從兹加敬重深藏恐失遺弔從兄島釋無可見集本盡日歎沉淪孤高碣石人詩名從蓋代謫宦竟終身蜀集重編否巴儀薄葬新青門臨舊巷欲見永無因哭張籍司業後篇作哭陳陶前人先生抱衰疾不起茂陵間夕臨諸孤少荒居弔客還遺文禪東嶽留語葬鄉山多雨銘旌故殘燈素帳間樂章誰與集壠樹即堪攀神理今難問豫將呌帝關此詩三百五卷重出今已削去哭李員外集作哭池州李使君杜牧縉雲新命詔初一作書行才一作政是孤魂受氣一作夀氣成黃壤不知新雨露粉書空一作唯換舊銘旌巨卿哭處雲空一作魂斷阿騖歸來月正明多少四年遺愛事鄉閭生子李為名聞慶州趙縱使君祭酒與党項戰中箭而死輒書哀句前人將軍獨乘鐡驄馬榆溪戰中金僕姑死綏却是古來有驕將自驚今日無青史文章爭㸃筆朱門歌舞笑捐軀誰知我亦輕生者不得君王丈二殳哭韓綽前人平生送葬上都門紼翣交橫逐去魂歸來冷笑悲身事喚婦呼兒索酒盆重到襄陽哭亡友章集作韋夀朋一作重宿襄州哭韋楚老拾遺故人墳樹五集作立秋風伯道無兒跡更空重到笙歌分散地隔江吹曲集作笛月明中哭李給事中敏前人陽陵郭門外坡陀五丈墳九泉如結友兹地好埋君朱雲葬陽陵郭外李甘詩前人太和八九年訓注極虓虎潜身九地底轉上青天去四海鏡清澄千官雲片縷公私各間暇追逰日相伍豈知禍亂根枝葉潜滋茂九年夏四月天誡若言語烈風駕地震疾集作獰雷驅猛雨夜於正衙階集作殿拔去千年樹吾君不省覺二凶日威武操持北斗柄開閉天關路森森門庭士縮縮循墻鼠平生負名節一旦如奴虜指名為鈎黨集作黨錮狀跡難告訴喜無李杜誅敢憚髠鉗苦當時仲秋集作秋夜月日直曰庚午喧喧皆傳言明晨相登注豫時與和鼎官班各持斧和鼎顧豫言集作云我死知集作有處所當庭裂詔書退立須鼎爼君門曉日開赭按橫霞布儼雅千官容勃欎吾纍怒適屬命鄜將趙儋除鄜坊節度昨之傳者誤明日詔書下謫斥南方去夜登青泥坂墜車傷左股病妻尚在牀稚子初離乳幽蘭思楚澤恨水啼湘渚恍恍三門魂悠悠一千古其冬二凶敗渙汗開湯罟賢者須喪亡讒人尚堆貯子於後四年諫官事明主常欲雪幽寃於時一禆補拜章豈艱難膽薄多憂阻如何干斗氣竟作炎荒土題此涕滋筆以代投湘賦哭費拾遺徴君姚合服儒遵佛集作師道㫖糲食卧中林誰識先生事無身本是心空山流水逺故國白雲深日夕誰來哭唯應逺鳥吟哭汴州一作夷門陸大夫張祜利劒一作刃太堅操何妨拔一毛寃深陸機霧憤積伍員一作胥濤直道非無驗一作險明時不録勞誰當青史上卒為顯詞褒哭京兆龎尹前人揚子津頭昔共迷一為京兆隔雲泥故人昨日同時弔舊馬今朝别處嘶向壁愁眉無復畫扶牀稚齒已能啼也知世路名堪貴誰信莊周物調齊哭胡遇朱慶餘尋僧昨日尚相隨忽見緋幡意可知題處舊詩休更讀置來新馬憶曾騎不應隨分空營奠終擬求人與立碑每作宣陽里中過遙聞臨哭淚先垂置來集作買來每作集作每向哭翰林丁侍郎劉得仁相知出肺腑一作深過等非舊亦非親每見鴛鴦侣多揚鄙拙身即期匡聖主豈料哭賢人應是隨先帝依前作近臣平生任公直愛弟尚風塵宅閉青松古集作密墳臨赤水新官清仍齒壯兒小復家貧惆悵天難問空流淚滿巾哭鮑溶有感寥落故人宅今來身已亡古苔淺墨沼深竹舊書堂秋色池臺一作館靜雨聲雲水凉無因展交道日暮割心腸傷馮秀才許渾旅葬不可問茫茫西隴頭水雲青草濕山月白楊愁琴信有時罷劒傷無處留淮南舊烟集作今夜月孤棹又集作更逄秋哭虞將軍一作傷河東虞押衙前人自昔集作白首一作十載從軍未有名近來孤劍到江城巴童戍久能畨語胡馬調多解漢行對雪夜窮黃石略望雲秋計集作秋算一作朝算黑山程可憐一作誰知身死家猶逺汴水東流無哭聲傷楊攀處士前人先生憂道不憂集作樂清貧白髮終為不仕身嵇阮沒來無酒客應劉亡後少詩人山前月照荒集作孤墳曉溪上花開舊宅春昨夜回舟更惆悵至今鐘磬滿南鄰重傷楊攀處士二首攀字緑雲集作自號緑雲翁前人緑雲多學術黃髮竟無成酒縱山中性詩流集作留海上名讀書新樹老垂釣舊磯平今日悲前事西風聞哭聲二從官任直道幾處脫長裾歿後兒猶小葬來人漸踈新鄰集作鄰翁占池館長史集作門吏覔圖書身賤難相報平生恨有餘集作無復前秋事西齊賦子虛傷李秀才前人曾醉笙歌日正遲醉中相送易前期菊花滿地人亡後菰葉連天客集作鴈過時琴倚舊忩塵漠漠劍埋集作橫新塜草離離河陽集作橋酒熟平生事更向東流奠一巵哭饒州吳諫議史君雍陶忽聞身謝滿朝驚俄感鄱陽罷市情遺愛永存今似古高名不朽死如生神仙難見青騾事諫議空留白馬名門館曾為恩愛客幾回垂淚過宣平舊宅在宣平里哭盧處士見三百五卷溫庭筠和友人悼亡一作喪歌姬前人玉貌潘郎淚滿衣畫羅輕鬢兩霏微紅蘭委露愁難盡白馬朝天望不歸寶鏡塵昏鸞影在細筝絃斷鴈行稀春來多少傷心事集作春風幾許傷情事碧草侵階粉蝶飛傷溫德彛前人昔年戎虜犯榆關一破集作敗龍城匹馬還侯印不聞封李廣别集作他人邱隴似天山哭王大夫方干俗人皆嫉謝臨川果中常情闕為政舊規方利國降生真性已歸天峴亭惋咽知無極渭曲馨香莫計年從此心喪應畢世忍看墳草讀殘篇哭祕書姚監前人寒空此夜落文星星落文存集作留萬古名入室幾人成弟子為儒是處哭先生家無諫草逢明代國有遺篇續正聲臨曉向集作曉向平原陳葬禮悲風吹雨濕銘旌哭喻鳬前人日夜役神多損夀先生下世未終年撰碑縱託登龍伴營奠應支賣鶴錢孤壠隂風吹細草空忩濕氣漬殘篇人間别更無寃事此事集作到此誰能與問天弔侯圭常侍李洞我重君能賦君褒我解詩三堂一拜遇四海兩心知影挂僧挑燭名傳鶴拂碑涪江弔孤塜片月落峨嵋弔膳曹從叔郎中前人華省支殘俸寒蔬辦祭稀安墳對白閣買石折朱衣蜀客彈琴哭江鷗入宅飛帆吹佳句逺不獨遍王畿哭南流人項斯遙見南來使江頭哭問君臨終時有雪亂葬處無雲官庫空收劍山僧共起墳知名人尚少誰為録遺文哭京兆龎尹馬戴神州喪賢尹父老泣集作哭關中未盡群生願才留及物功清光沉皎月素業振遺風履跡蒼苔掩珂聲紫陌空從來受知者㑹葬漢陵東哭劉駕博士聶夷中見集本出門四顧望此日何徘徊終南舊山色夫子安在哉君詩如門户夕閉晝還開君名如四時春盡夏復來原野多邱陵纍纍如高臺君墳雖數尺誰與夫子偕傷盧獻秀才皮日休從征新價欲陵空一首堪欺左太冲只為白衣聲過重且非青漢路難通貴侯待寫過門下詞客偷名入巷中手弄桂枝嫌不折直教身歿負春風哭進士李洞二首鄭谷所惜絶吟聲不悲君不榮李端終薄宦賈島有集作得高名旅葬新墳少遺孤逺俗輕猶疑隨計晚昨夜草蟲鳴二自聞東蜀病唯我獨集作最關情若近長江死想君勝在生先生酷愛賈浪仙詩在長江東蜀嶺一作境內浪仙家在此處瘴蒸丹旐濕燈隔素帷清冢樹僧栽後新蟬一兩聲哭建州李員外頻前人令終歸故里末嵗道如初舊友誰為志清風豈易書雨墳生野蕨鄉奠釣江魚獨夜吟還泣前年伴直廬弔禮部常員外序前人臘雪初晴共舉杯便期攜手上春臺高情惟怕酒不滿長慟可悲花正開曉奠鶯啼殘漏在風幃燕覔舊巢來杜陵荒草年年緑醉魄吟魂無復回弔水部賈員外嵩前人八韻與五字俱為時所先幽魂應自慰李白墓相連哭王贊府陳陶白水流今古青山送死生驅馳三楚掾倐忽一空名金玉埋臯壤芝蘭哭弟兄龍頭孤後進鵬翅失前程愁變風雲色悲連鼓角聲落星辭聖代寒夢閉佳城伊昔來江邑從容副國英德踰棲棘美公亞飲氷清大厦亡孤直羣儒憶老成白駒悲里巷梁木慟簮纓隴遂添新草珠還滿舊籝蒼蒼難可問原上晚烟橫文苑英華卷三百四
