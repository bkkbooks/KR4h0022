body:
  text: 文苑英華卷三十三宋李昉等編水二觀秋水賦一首空水共澄鮮賦一首水鏡賦三首水木有本源賦一首水輪賦一首曲水杯賦一首滄浪濯纓賦一首水始氷賦一首觀秋水賦尹程采疑作乘秋日之逰豫縱竒觀於長川惟秋水之清泚宗大壑而潺湲波浩蕩而不極影澄徹而彌天波沉馬色類真人之雲度岸迷牛影疑織女之河邊柳浸影而如卧萍隨流而似牽鳬帶藻而聲澀魚亂流而水圓晴霞晚鋪如漢江之濯錦夜月初上若纎鈎之映泉乃與斷金之好連璧之友矜壯歲之紅顔怯衰年之白首效淡水之密契就河濱而置酒惜素節之凋荷歎嚴風之入柳况夫澄淡逶迤涵空寫淨符老君之上善同至人之不競處下不辭其垢濁攻堅豈難乎流盛星光夜照如臨剖蚌之珠菱影朝開似照盤龍之鏡爾乃長波澒洞洪濤泛溢晴天淨而空鮮夏雲臨而峰出照鄒忌之蕞貌鑒陸雲之笑疾遂有感於莊篇託微言於拙筆空水共澄鮮賦張嘉貞空之為象也本乎天水之為德也本乎泉上善之人方其性真化之客愛其𤣥清虛而隱性含受而無偏因高下而臨照故能共於澄鮮誠大明而盡善實和光如可憐爾其皎潔淸泚空色懸於水底分明昭曠水光積於空上玲玲瓏瓏晶晶液液託九霄如染翠徹千里而含碧微風共息含晴影而湛然兩日俱生弔長輝而相射表裏如一容象難尋含泳游鱗若回陵而上出聮翩度鳥疑戲沙之下沉為當物將類於回覆為是人自惑於窺臨竟未能縷列於疑似分別於空水𤣥之又𤣥美之逾美水鏡賦利濟者水涵虛者鏡懷朗鑑遇物無心處下流通而不競對淸流則泛濫長游開寶匣則蟠螭孤映汾澮所及泯衆惡而無私銓衡不遺鑒羣才而必正淸汋其味堅貞其質六氣咸用彼得於終亨五材不愆乃取其初吉深則不竭貞能象物浮錦纜而花生映瑶臺而月出若然者體不自有故受之於金功不自居乃推之於坎昭昭神遇必盡其妍媸泛泛隨流豈懷於舒慘淸必見底明恆照膽壅之則止寧有謝於屯蒙用之則行竟無情於窺鑒臨萬象而皆見總百川而俱㑹隱瑞鵲於光中泛靈查於天外混之不濁含靜質而終潔覆之則昏用明道而若昧功雖一致理或殊調乘桴浮海從我者豈測其深賦蒙求徴無欲者以觀其妙納晴天而兩日交麗因紅粉而雙容俱笑既不憚於惠風亦何疲於屢照加以向日冰靜澄流玉潔聲名未著覽鶴髮而魂驚功業後時仰龍門而心絶幸君子之惠鑒疑庶流同而𣲖別第二鄭繇夫有名之域有象之中惟水能淨惟鏡能空水則無心而皎徹鏡則照膽而幽通遇物斯應匪我求蒙爾其决之則流盈而不闕泛金碧而色潤開玉匣而光發其淸也不同和風其鑒也不同朗月爾乃雲收白日粉拭紅塵拂芰葉而交映抱菱花而獨春直注千里旁通四鄰成美惡之𤣥鑒原闕十一字惜容輝之易晚歎功名之難續况復影圓鳯沼聲激龍門可驚飛於神鵲可搖動於靈鯤同大道之自然合重𤣥之衆妙氷潭洞逹石崖含耀亦由裴楷淸通王戎簡要知之疑類之疑意忘疲於屢照第三賈曽原夫水能利物鏡以含虛泛鷁攸往盤龍是居藴靈長而遠蓄懸洞鑒而藏諸其止水也體靜而舒惠風拂而逾益明月來而不如清則徹底蒙紛濯洗朗亦難雜逢昏可合則有分流學海挂影仙臺映氷壺而洞徹連錦帳以徘徊是用益澄流品取鑒羣材涸鮒思躍飛雞自猜挹餘波而得潤雖屢照而常開惟兹道也可允孚惟兹務也可長守所以息僥幸之心疑杜讒慝之口將座銘之不若雖撲滿而何有士或湮淪時多苦辛願濯纓而未暇思照膽而無因空匪材而濫挹願將此以書紳水木有本源賦高郢木造天水窮𤣥森森擢千丈之秀汪汪澄萬頃之鮮散而成衆木疏而為百川把梓之材備矣江湖之量存焉竊聞源長而下流不竭未見本盛而枝葉先顛志士託以垂隂無假惡木渴者飲而滿腹何求盜泉故樹善於人人懷則甘棠不朽泛愛於衆衆凑則德水長懸方將成不言之蹊廣利涉之路俾出幽之鳥仰喬幹而能遷未濟之人因餘波而可渡鳥豈木之所擇非擇木而不栖人奚水之足鑒亦鑒人而取喻徒聞其移橙渡北不能苞貢於王國導漾之東是以昭回於昊穹木誠戀於南枝常得地而專美水豈忘於西土乃陵雲而獨崇用不用也非結根之有異高莫高兮將聞源而實同葛藟猶能庇其本江漢所以朝其宗固宜大樹䕃庥而千牛可蔽洪河浸潤而九里旁通寧效有喬而不可休息於其下至廣而不可游泳於其中者哉則有青青弱幹獨秀未立涓涓細流徐清可挹植翰苑以蕭散赴龍門而驚急企樛木之逮下望恩波之流濕水輪賦以汲引之道成於運輪為韻陳章水能利物輪乃曲成升降滿農夫之用低回隨匠氏之程始崩騰以電散俄宛轉以風生雖破浪於川湄善行無跡既斡流於浪靣終夜有聲觀夫斷木而為慿河而引箭馳可得而滴瀝輻輳必循乎規準何先何後互興而自契心期不疾不徐迭用而寧因手敏信勞機於出沒惟與日而推移殊轆轤以致功就其深矣鄙桔橰之煩力使自趨之轉轂諒由乎順動盈科每恱於柔隨遠望蹄涔詎有朱殷之色挹兹鱗起終無塗附之期作霖或自於斯干流濕更彰乎就燥回環潤乎嘉榖洊至踰於行潦鈎深致遠沿洄而可使在山積少之多灌輸而各由其道爾其揚清激濁吐故納新輾桃花之活活搖杏葉之鱗鱗一勺每勞於濡軌三材必賴於工人浴海上之朝光升如日御泛江中之夜影重似月輪常虛受以載沉表能圓於獨運低回而涯岸非阻委曲而農桑是訓惠可周於地利空霑負郭之田材足任於天津多寄臨川之郡池陂無漉畎澮既瀦用能務實勢欲陵虛磬折而下隨毖彼持盈而上善依於當浸稻之時寧非沃壤映生蒲之處相類安車異矣哉俯此溝塍潤於原隰成形必仰乎膏雨屈己且安乎卑濕苟量逺大之功庶無慙於甕汲曲水杯賦以曲水同醉樂如之何為韻陸環麗景云暮歡情奈何水散循環之勢杯浮一勺之多樽爼必呈反本源於抔飲歌鐘合奏起觴飲於流波爾其洋溢折旋從容娛樂觀滴瀝以繚繞將灌注而酬酢袒裘解帶笑沉醉以山頽永日暄風期竭歡於水涸狎玩未己回環不窮方醴泉之自異念酒池而莫同滿座酡顔盡染桃花之水緣隄芳草尚遺蒲杓之風是以布令如流娛情忽起已控淸流而引滿遂用銷憂而飾喜且異載沉而載浮寧同以水而濟水情符泛愛誤比投醪之時曲辨靈長足見濫觴之始爾乃負舟無力載酒何如波卷每觀其泛蟻鈎深自致乎無魚成禮交歡寧酒流而生禍效竒行怪豈杯度以慿虗所以上下隨波方圓在器念縮茅而自別比浮芥而亦異獻壽終歎於流川如澠倍符於此地已傾壺而揚觶默爾無喧方枕麴而藉糟塊然復醉想夫飲流畢㑹倒載為期乘波而潏潏回疾入曲而悠悠轉遲投轄留賓自有清澄之色汙樽就飲翻疑朴略之時分巡而小大殊矣繞座而左右流之時也酒且以闌景云暮促愜蘭亭之嘉㑹散陽春之麗曲終已時移但山高而水緑滄浪濯纓賦以君子澡身及時為韻滄浪之水兮伊楚之濆汗漫蕩漾兮清泠奫淪控三湘之淺浪從大別而派分澄淡清景離披曉雲彼美人兮何其獨商歌以思君覩斯水之洞徹惡吾纓之垢氛將濯其纓亦潔其已逐臣逋客漁翁樵子吟刈楚以激昻詠伐檀而筮仕哀靈均之濯足笑許由之洗耳載泛載浮曷云其已洎夫白日始晞青天收潦千尋湛而見底萬里净而猶掃漾磷磷之淺沙蕩靡靡之纎草縈紆浦漵邐迤洲島興既遠兮情亦閒纓載濯兮身亦澡于彼濯矣伊水之濱于彼澡矣君子之身滌我滓穢去我埃塵且潔净以精微又肆志而王神孰與夫澤畔憔悴空見悲於楚客心之憂矣匪興刺於詩人已焉哉士生世兮患於不立朝聞夕死道之所急偶滄浪之且淸豈坎窞之能習易載出處詩稱維縶歲冉冉而不留雖追悔而何及一有辭字曰滄浪之水兮徵楚詞臨清漪兮應昌期濯吾纓兮有所思幸我生兮及明時進德修業兮已矣拔茅彚征兮良在兹水始氷賦以律報司寒氷因水結為韻潤下之性有時可凝暑歸寒集陽閉隂升吹寒風之遠派蹙凍雨而成氷俾巨海以息浪胡涓波之足徵北陸隂涸寒泉井冽天吳外摶靈胥自潔含貞抱虛既瑩且徹斷流而稜稜劍威照日而片片霜切馺坳曲陵湫穴蒼山甕石大冶流鐵圓光而蚌珠可掬朝涉而馬蹄可折既否隔於風雲亦祕藏於魚鱉爾乃命海若戒馮夷連焰絶於火井俾梁成於水湄乘險無替旬日不衰若擁輕絮如積素絲秋令雖終尚占庚辛之色嚴風更肅將奉𤣥冥之司其為水也則陷其為氷也則履畜成比玉之壺散作流謙之水柔性是著仙顔是比方稽化而轉疑蓋不知其所以夫其瀑布流湍迸射交攢簷溜承綆垂空凍乾微波煙羃大壑雲漫滴貫珠而呈脆排層巖而召寒至於六尺表竒百丈涵奧鼠北方而可規蠶東夏而禀操堅貞應運度光武而堪竒孝德幽通獻頳鯉以為報此下不見因字官韻始氷之初立冬之日將鑿井望納秩刷室應候司管調律溫泉殊沼夏蟲異術閶闔門靜琅琊井溢當腹堅而將藏候朝陽而乃出文苑英華卷三十三
