body:
  text: 文苑英華巻一百七十四宋李昉等編應制七宮二十九首臺七首宅七首宮過舊宫周明帝玉燭調秋氣金輿歴舊宫還如過白水更似入新豐秋潭漬初學記作清晩菊寒井落疎桐舉杯延故老今聞歌大風奉和春日幸望春宫岑羲和風助律應韶年清蹕乗髙入望仙花笑鸎歌迎帝輦雲披日霽俯皇川南山近獻仙杯上北斗平臨御扆前一奉恩榮欣在鎬空知率舞聼薰絃同前集作望春宫迎春内出綵花樹應制崔湜澹蕩集作澹淡春光滿曉空逍遙御輦入離宫山河眺望雲天外臺榭参差烟霧中庭際花飛錦繡合枝間鳥囀管絃同即此歡娱齊鎬宴唯應率土集作舞樂薰風同前張說别館芳菲上苑東飛花澹蕩御筵紅城臨渭水天河近闕對南山雲霧集作雨露通繞殿流鶯凡幾樹當蹊亂蝶許多叢春園既醉心和樂和集作知共識皇恩造化同同前武平一鑾輅青旂下帝臺東郊上苑望春來黄鶯未觧林間囀紅蘂先從殿裏開盡閣條風初變栁銀塘曲水半含苔欣逢睿藻光韶律更促霞觴畏景催同前劉憲暮春春色最偏一作便妍苑裏花間列御筵南山一作商山積翠臨城起滻水浮光共幕連鶯藏嫩緑歌相唤蝶礙芳叢舞不前歡娛節物今如此願奉宸逰億萬年一作皆初學記同前蘇頲東望望春春可憐更逢晴日栁含烟宫中下見南山盡城上平臨北斗懸細草偏承廻輦處輕花㣲落捧觴前宸逰對此歡無極鳥哢聲聲入管絃同前鄭愔晨蹕凌髙轉翠旌春樓望逺背朱城忽排花上逰天苑却坐雲邉㸔帝京百草香心初罥蝶千林嫩葉始藏鶯幸同葵藿傾陽早願比盤根應帝榮同前薛稷九春風景足林泉四面雲霞敞御筵花鏤黄山繡作苑草圖𤣥㶚錦為川飛觴競醉心廽日走馬争㸔眼着鞭喜奉仙逰歸路逺直論行樂不言旋同前韋元旦九重樓閣半山霞四望韶陽春未賖侍蹕妍歌臨㶚涘留觴艷舞出京華危萍競捧中街日戱馬争銜上苑花景色歡娛長若此承恩不醉不還家同前崔日用東郊芳物正薰馨素滻鳬鷖戱緑汀鳯閣斜通平樂觀龍旂直逼望春亭光風搖動蘭英紫淑氣依遲栁色青渭浦明晨脩禊事羣公傾賀水心銘同前馬懐素綵眊一作仗琱輿俯碧潯行春御氣發皇心搖風細栁縈馳道映日輕花出禁林通野園林開帟幕連堤草樹狎衣簮謬參西掖霑堯酒願沐南薰觧舜琴同前李適玉輦金輿天上来花園四望錦屏開輕絲半拂朱門栁細纈全披畫閣梅舞蝶飛行飄御席鸎歌度曲繞仙杯聖詞今日光暉滿漢主秋風莫道才同前李乂東城結宇瞰千尋北闕回輿且集作具四臨麗日祥烟承䍐罼輕荑弱草藉衣簮秦商重沓雲巖近河渭縈紆霧壑深謬接鵷鴻集作鸞陪賞樂還欣魚鳥遂飛沉同前沈佺期芳郊緑野散春晴複道離宫烟霧生楊栁千條花欲綻蒲萄百丈蔓初榮林香酒氣元相入鳥囀歌聲各自成定是風光牽宿醉來晨復得幸昆明奉和聖製幸長安故城未央宫應制李嶠舊宫賢相築新苑聖君來運改城隍變年深棟宇摧後池無復水前殿乆成灰冀辨祈風觀空傳承露杯宸心千載合睿律九韶開今日聮章處猶疑上柏臺同前趙彦昭夙駕移天蹕慿軒覽漢都寒烟收紫禁春色繞黄圖舊史遺陳跡前王失覇符山河寸土盡宫觀尺椽無崇髙惟在德壯麗豈為謨茨室留皇鑒薰歌盛有虞同前劉憲漢宫千祀外軒駕一来逰夷蕩長如此威靈不復留慿髙睿賞發懐古聖情周寒向南山歛春過北渭浮土功昔云盛人英今所求幸聴薰風曲方知覇道羞同前宋之問漢皇未息戰蕭相乃營宫壯麗一朝盡威靈千載空皇明悵前跡置酒宴羣公寒輕彩仗外春發幔城中樂思廻斜日歌詞繼大風今朝天子貴不假叔孫通同前李乂集無鳯輦乗春陌龍山訪古䑓北宫纔盡處南斗獨昭回肆覽飛宸札稱觴引御杯已觀蓬海變誰厭柏梁灾代揖一作挹孫通禮朝稱賈誼才忝儕文雅地先後各時来暇日與兄弟同逰興慶宫有序不録唐𤣥宗附見張說集代邸青門右離宫紫陌垂庭如過沛日水若渡江時綺觀連鷄岫朱樓接鴈池從来敦棣萼今此茂荆枝萬葉傳餘慶千年志不移慿軒聊屬目輕輦共追随務本方崇訓相輝保羽儀時康俗易漸德薄政難施鼓吹迎飛蓋絃歌送羽巵所希覃率土孝弟一同歸奉和同前應制張說漢武横汾日周王宴鎬年何如造區夏復此睦親賢巢鳯成新集作新成閣飛龍躍舊集作舊躍泉棣華歌尚在桐葉戱仍傳禁籞氛埃隔平䑓景物連聖慈良有裕王道固無偏問俗兆人阜觀風五教宣獻圖開益地張樂奏鈞天侍酒衢樽滿詢芻諫鼔懸詠言形友愛萬國共周旋過晋陽宫唐𤣥宗附見張説集緬想封唐處實惟建國初俯察伊晋野仰觀乃參墟井邑龍斯躍集作濯斯城池鳯翔餘林塘猶沛澤䑓榭宛舊居運革祚中否時遷命兹符顧循承丕構怵惕多憂虞尚恐威不逮復慮化末孚豈徒勞轍迹所期訓戎車習俗問黎人親巡慰里閭永言念成功頌德臨康衢長懐經綸日歎息履庭隅艱難安可忘欲去良踟蹰奉和同前應制張說太原俗尚武髙皇初奮庸星軒三晋躔土樂二堯封北風遂舉鵬西河亦上龍至德起王業繼明頼人邕集作雍六葉啓昌期再興廣聖蹤傳呼大駕來文物如雲從連營火百里縱觀人千重翠華度汾水集作橋樓非白日臨罕峯枌榆恩賞洽桑梓舊情恭往運感不追清時惜難逢時發樽爼心頌刋盛德容願君及春事廻輿綏萬邦同前張九齡隋季失天策萬方罹凶殘皇祖稱義旗三靈皆獲安聖朝特申錫王業咸集作成艱難盗移未改命厯在終履端彼汾惟帝鄉雄集作洪都信欝盤一月朔廵狩羣后陪清鑾覇迹在沛庭舊儀覩漢官唐風思何深舜典敷更寛戸集作家蒙枌榆復邑争牛酒歡緬惟剪商後豈􅍦㣲禹歎三后既天在集作在天萬年期石刋尊祖實我皇天文皆仰觀同前蘇頲隋運與天絶生靈厭氣昏聖期在寧亂士馬興太原立極萬邦推登庸四海尊慶膺神武帝業付皇曽孫緬慕封唐道追惟歸沛魂詔書感先義典禮廵舊藩商殿綵雲合春旗祥風翻率西見汾水奔北空塞垣欵曲童兒集作兒童佐依遲故老言里頒慈惠賞家受除復恩下輦崇三都集作教又作觀建碑當九門孝思敦集作敭至美億載奉開元奉和聖製至長春宫登樓觀稼穡之作前人帝迹奚其逺皇符之所崇敬時堯務作盡力禹稱功赫赫惟元后經營自左馮變蕪秔稲實流惡水泉通國阜猶前豹人疲詎昔熊黄圖廵沃野清吹入離宫是閱京坻富仍觀都邑雄慿軒一何綺積溜冩晴空禮節家安外和平俗在中見龍垂渭北辭鴈指河東睿思方居鎬宸逰若飲豐寧夸子雲從秪為獵扶風奉和御製從蓬萊宫向興慶閣道中作王維渭水自縈秦甸曲黄山舊繞漢宫斜鑾輿迥出仙門栁閣道遙集作迴㸔上苑花雲集作雪裏帝城雙鳯闕雨中春樹萬人家為乗陽氣行時令不是宸逰重物華同前李憕别舘春還淑氣催三宫路轉鳯凰䑓雲飛北闕輕隂散雨歇南山積翠來御栁遙随天仗發林花不待曉風開已知聖澤深無限更喜年芳入睿才䑓琴䑓詩此詩見三百十三巻䑓門梁簡文帝登三䑓言志唐太宗未央初壮漢阿房昔侈秦在危猶騁麗居奢遂役人豈如家四海日宇整朝輪扇天裁戸舊砌地剪基新引月擎宵桂飄雲逼曙鱗露除光炫玉霜闕映雕銀舞接花梁鷰歌迎鳥路塵鏡池波太液莊苑麗冝春作異甘泉日亭非路寢辰念勞慙逸已居曠反勞神所欣成大厦宏材佇渭濱奉和同前許敬宗中天表雲榭載極聳崑樓聖作規𤣥造軒阿復聿脩髙門符令節形勝總神州企翼摶禽萃飛甍鷰雀逰綴星羅百拱縁漢轉三休旦雲生玉舄初月上銀鈎妙管含秦鳯仙姿麗斗牛形言防處逸粹藻發嘉猷荷生無以謝盡瘁竟何酬燕雀集作賀鳥盡瘁集作來子春䑓望唐𤣥宗暇景屬三春髙臺聊四望目極千里際山川一何壯太華見重巗終南分疊嶂郊原紛綺錯參差多異狀佳氣滿通溝遲歩入綺樓初鶯一一鳴紅樹歸雁雙雙去緑洲太液池中下黄鶴昆明水上映牽牛聞道漢家全盛日别舘離宫趣非一甘泉邐迤亘明光五柞連延接未央周廬徼道縱横轉飛閣廻軒左右長須念作勞居者逸勿言我后焉能恤為想雄豪壯栢梁何如陋儉卑茅室陽烏黯黯向山沉夕鳥喧喧入上林薄暮賞餘廻歩輦還念中人罷百金奉和御製同前賀知章青陽布王道𤣥覽陶真性欣若天下春髙逾域中聖神臯類觀賞帝里如懸鏡繚繞八川浮岧嶤雙闕映曉色徧昭陽晴雲巻建章華滋的皪丹青樹顥氣氤氲金玉堂尚有靈蛇下鄜畤還徴瑞寳入陳倉自昔秦奢漢窮武後庭萬餘宫百數旗廻五丈殿千門連綿南隥出西垣廣盡螓蛾華窈窕羅生玳瑁象崐崘廼睠天晴興隐恤古來土木良非一荆臨章觀趙叢䑓何如堯階將禹室層欄􅌄窱下龍輿清管逶迤半綺疏一聼南風引鸞舞長謠北極仰鶉居同前許景先睿德在青陽髙車視中縣秦城連鳯闕漢寢疏龍殿文物照光輝郊畿欝葱蒨千門望成錦八水明如練複道曉光披宸逰出禁移瑞氣朝浮五雲閤疑作閣祥花夜吐萬年枝蘭葉負龜初薦祉桐花集鳯更來儀秦漢生人凋力役阿房甘泉構雲碧汾祠雍畤望通天玉堂宣室坐長年鼔鐘西奏咸陽觀苑圃南通鄠杜田明主卑宫誡前失輔徳欽賢政惟一昆蟲不夭在春蒐稼穡常難重農術邦家已荷聖謨新猶聞儉陋惜中人預奉北辰垂七耀長歌東武抃千春同前蘇頲壮麗天之府神明王者宅大君乗飛龍登彼復懐昔圓闕朱光熖横山翠㣲積河汧流作表縣聚開成陌即舊在皇家維新具物華雲連所上居恒屬日更時中望不斜三月滄池搖積水萬年青樹綴新集作㸃驚花暴嬴國此嘗圖覇覇業後仁先以詐東破諸侯西入秦咸陽北坂南渭津詩書焚爇散學士髙閣奢踰嬌羙人事往覆輈經逺喻春還按蹕慿髙賦戎觀愛力深惟省越厭陳方何足務清吹遙遙發帝䑓宸文耿耿照天廻伯夷位事愚臣忝喜奏聲成鳯鳥來宅過舊宅二首唐太宗新豐停翠輦譙邑駐鳴笳園荒一徑㫁䑓古半階斜古一作平前池消舊水昔樹發今花一朝辭北初學記作此地四海遂成家二金輿廵白水玉輦駐新豐紐落藤披架花殘菊破叢鋪庭荒草蔓流竭半池空紉珮蘭凋徑舒珪葉剪桐昔地一藩内今宅九圍中架海波澄鏡韜戈噐反農八表文同軌無勞歌大風奉和同前應制許敬宗飛雲臨紫極出震表清光自爾家寰海今兹反帝鄉情深感代國樂甚讌譙方白水浮佳氣黄星聚太常岐鳯鳴層閣酆雀賀彫梁桂山猶總翠蘅薄尚流芳攀鱗有遺皓沐德抃稱觴同前上官儀石闗清晩夏璇輿御早秋神麾颺珠雨仙吹響飛流沛水祥雲泛宛郊瑞氣浮大風凝漢筑叢烟入舜球翠梧臨鳯邸滋蘭帯鶴舟偃伯歌𤣥化扈蹕頌王逰遺簮謬詔奨珥筆荷恩休爰因廵省途次舊居唐𤣥宗附見張説集三千初擊浪九萬欲摶空天地猶驚否隂陽始遇蒙存身斯集作期歴試佐貳佇昭融多謝時康理良慙實頼集作寳劍功長懐問鼎氣夙負㧞山雄不學劉琨舞先歌漢祖風英髦既包括豪傑自牢籠人事一朝異謳歌四海同如何昔朱邸今此作離宫鴈沼澄瀾翠猨巖落照紅小山餘桂馥長坂舊蘭叢即是淹留處乗歡樂未窮奉和同前應制張説蓊集作葱欝興王郡殷憂啓聖圖周成㑹西土漢定集作武幸南都嵗卜鸞一作鑾輿邁農祠鴈疑政敷武威稜外域文教靡中區警蹕千戈捧朝宗萬國趨舊藩人事革新化國容殊壁有真龍畫庭餘鳴鳯梧叢觴祝堯夀合鼎獻湯厨陽樂寒初變春思集作恩蟄共集作更蘇三耆頒命服五稔復田輸君賦大風起人歌湛露濡從臣觀王業集作玉葉方願紀靈符同前蘇頲潞國臨淄邸天王别駕輿出潜離隐際小徃大來初東陸行春典南陽即舊居約川星䍐駐扶道日旂舒雲覆連行在風廻助掃除木行城邑望臯落土田疏昔試邦興后今過俗徯予示威寧校獵崇讓不陳魚府吏趨宸扆鄉耆捧帝車帳傾三飲處閑整六飛餘盛業銘汾鼎昌期應洛書願陪歌賦末留此蜀相如文苑英華巻一百七十四
