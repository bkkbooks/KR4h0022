body:
  text: 文苑英華卷五百二十一宋李昉等編喪禮門下二十六道里正主妹喪判一道本正為主判一道同姓為主判一道主者不杖判一道父在凶門判三道輿尸謁廟判五道助鄰婦喪判二道寢苫枕草判二道父在杖堂判一道練祥羣立旅行判一道除喪鼓琴判一道祥鼓素琴判一道禫服鼓琴判一道奪情腰絰服事判一道妻喪奏樂判一道士弔大夫喪判一道同門生喪親判一道食於喪家判一道里正主妹喪判癸為縣令有妹之喪使里正主之或告非禮訴云所居無東西前後家對侯嶠女也有喪行實殊制士之達禮哀以立則惟癸領縣同氣辭家生稱未亡已軫柏舟之詠死歸異姓且無欒棘之悲東西南北之人歎四鄰而莫有鄉黨里閭之室望九族而繄無日月有期主喪孰是匍匐救之里尹其人殊周勃之給喪所資致祭異項梁之倚辦寧惟執紼在禮自有明文或人胡為妄動本正為主判婦人適人死無親族兄乃為主本正亦為主鄉人吊者兄拜爭為主對嚴識賢洪波振海終不到於蓬瀛流電促人詎有固於金石無不魂逰北斗水閲東川咸促半夜之山共盡明朝之露聞人不幸一去無歸洛川之風雪共銷陽臺之雲雨俱霽泉門永閉但聞松柏之聲繐帳空懸無復綺羅之色惜乎丈夫獨立親屬蔑如秋蘭匪植於庭砌春花詎榮於棣蕚眷言為主寂寞無人切哀痛於仁兄慟悲涼於本正爭承即疑禮競執喪儀未終白鶴之來詎盡青蠅之哭縣司直申情理非究禮經徒開弄法之門未杜簿書之路竊尋州斷實允公途以鄰主喪雅叶春卿之禮捨兄於罰殊乖秋典之文同姓為主判甲妻亡無主後者乃命同姓主或人告失禮所由科之對美而無子賦以碩人生也有涯歸乎大夢贄榛栗而方就據蒺藜而何辜眷言于甲倐喪宜家鳯凰于飛八代徒兆蛟龍中絶一劒空悲扣盆之哀但取傷於對簟懸弧之義本未徴於夢蘭有歎溘先無以為後爰邀同姓將陳主喪三祖思崇五哭攸設永惟哀戚誠則靡捐撫以禮經猶為未逹且男主婦主之道同姓異姓之儀抑有前聞非冝此謬蓋匪慎兹坐貽差互至若婦主必使異姓厥義彰乎外成反是不思捨禮何立道有取於宗婦事非屬於族人甲所為喪誠為不法哀興弔影雖撫事以傷神迹未吞聲罪恐餘一作為於滅耳主者不杖判甲卒女子在堂無主喪者命同姓主之喪者不杖令女子杖所由科失禮對男主女主則異其族苴杖削杖而别于儀良無扈扈之嫌用竭親親之道承家有託亦何詢于異門繼代或虧乃陳攝於同姓甲年馳石火光隂坐沉訓絶金籯胤嗣非立若敖之餒固宜理而方嗟鄧攸之謡諒天道而多懵桑弧靡設詎憂嵇紹之孤葛覃在辰空有緹縈之類謝庭窺雪奏歌詠於常時蔡氏知絃輟娛歡於是日三星尚阻未及有行五哭斯崇奄嗟無怙喪主既非棣蕚輯杖固屬摽梅同切昊天寧遺巽位撫禮深逹將譴何慿則子一人諒斯取而不謬惟刑三復宜伏念於無辜父在凶門判乙父在喪母立凶門或告一家不合一作宜二門乙訴云虞而無主以重當輕對顔勝休死勞生存亡大數絶漿泣血孝敬常期乙也哀摧禍鍾凶釁感風枝而殞魄反哺何施陟霜屺而縻心跪乳奚及願言負米空結戀於梁山疾深懷橘一作懷墻愴開編於吳史凶門列位夙著等差方取則於殷周驗昭然於典禮既虞而作瘞重之制自分有祔于姑為主之儀寧惑坦然明白可舉而行事不亂於大猷法難加於小纍同前陟屺纒哀終天永慕形神訾毁有切於何曽流慟傷神詎慙於吳隱於是牛山卜兆魚岫開塋帝軒轅之乘龍衣冠作隧王子晉之御鶴履舄成墳因班牛而動祥樹石馬而旌貺既而玄門告掩丹旐云飛聊申虞祀之儀方則夏殷之禮立主之義自有常條以重當輕終乖禮式既無虧越何爽公途同前仁焉而終智焉而死九原悽愴寧聞可作之期千日荒涼徒結有涯之恨乙以悲深厚地痛結終天充窮於溢米之晨荼毒於寢苫之日青烏襲吉已托萬家之地白鶴飛來俄聞再奠之禮所以表斯廬位設彼銘旌佇馴獸之見逰希祥禽之或至言申陟屺之戀再寫循陔之悲既結歎於生靈實無慙於死孝或人言告未可依慿哀敬之心理在矜察審慎之典慿藉必及淫濫儻行手足無措既非月之無失何如霜之可繩輿尸謁廟判鄭太曽祖亡輿尸謁其家廟人告狂怪對張季明聖立訓謨禮明沿襲文物大備沮勸攸先是以茂閲高勳載在王府封侯廟食克濟家聲允歸通德之門未絶謀孫之道既而鬼闞其室祖以負杖延災人告其狂太以輿尸獲譴卒哭而祔反葬而虞捨禮何觀撫事斯謬且執喪以寧戚為本謁廟以如在致誠昭穆相承自可次其神主宗祧有序焉得失乎禮文狂怪之言責則甚矣既灌之後不欲觀之同前杜嚴廟者曰貌則事之若生鬼之言歸則敬而莫黷考孔丘之要道將入必問覽周文之繫象輿尸且凶鄭太久挹家聲素高門閥自宣王之母弟承后稷之神人讀司農之經榮分爾族聽尚書之履代著一作有其名爵賞不泯錫承家而開國垣廟而立寵貽孫而及祖禍鍾斯兆哀慕何追父已喪親緦亦從嫡奠延無主孫也哭曽自宜别外內之嫌分吉凶之敬謁廟以輿尸見責寧合禮經告人以狂怪見尤豈諧典則大從笞罰有蔭須寬於贖刑告者任還無識不勞於反坐同前度進白駒易往素蓋俄歸長沙空庚日之災北海奄已年之夢鄭太留􅓅永慕捧硯長悲通德之門露纒書草承明之殿塵絶履聲且周設冡官孔演師卦戰亡猶令周官冡人凡死於兵者不入兆域幽疑作出兆輿尸豈宜廟謁雖理殊觀蠟同賜也之云狂而義異亂神乃夫子之稱怪竊尋古制合置今繩同前先王制禮造次以之君子奉行威儀無選鄭太門承通德代有象賢處異域之圍全其使節受良田之廣儉以家貞華軒懸示後之車密石表先人之廟釁鍾亡祖哀疚謀孫捧硯攀悲輿尸入廟大夫銜命神雖幽而已往使者回車身不幸而必告魯使以為有美漢臣猶且不非况太恭事廟門展行祖德尊靈髣佛瞻棟宇而風生喪紀綢繆備衣裳而日逺太之此舉必有為之人雖薄言詎成狂怪同前聖人設教蔚在蓬山諸侯立家藏彼栗主豈唯孝子不匱薦蒸嘗於四時亦取孝孫承家咨吉凶於五廟鄭太乃祖厥德嘉聞有彰良弓克傳投筆從事孝比參也在家必聞勇超仲由從政何有或胡塵暗塞漢將鳴鼙逐金革之威唯聞死節登玉門之險不見生還輿尸方弟子之凶掃埏合鄒人之禮所謂去死事生來宜朝謁薄言狂怪何太踈遺助鄰婦喪判得聞人有鄰婦喪自三日而不舉火乃力借凶事之給所以言黨人未獲因主斂爭訟官以先後逺罪具不伏對趙泉虬鄰婦時命先秋生涯凋落四德之名尚在九泉之魄俄沉存既寡於周親沒亦感於鄰義既而朱火不舉俯凶事而無從玄璲未臨仰生人而何托聞人以蹈危為意憂濟留心爰行博施之恩自合無喪之服論其主斂則親屬為先語其科辜則聞人無罪同前仲尼講三王之禮垂百代之範臨喪寧戚實先匍匐之風力行近仁更著威儀之則永惟鄰婦忽奄泉扃一作宫蘭閨生向月之悲幽隧切行雲之望於是哀歌佇引尚有具於飯含夢容猶遲誰見勤於營護三日不舉九原若何彼人以桑梓情深芝蘭愛厚欲奔波於黨屬先假借於鄉閭劬勞之志莫辭終始之心愈勵項將軍之志業比德猶一作無慙郭有道之風猷方斯未逺且為主斂緣是善鄰親踈之爭鬱興牒訴之喧爰起官司以公平在慮剖析存懷申報禮以明愆討彞章而見罰既叶平邦之典妙符淳古之風徒更有詞終成飾説寢苫枕草判甲雅修士禮為宗黨所敬居斬縗寢苫枕草閭里化之御史劾其惑衆對甲修道訓允乎厥休宗黨稱其有儀閭閻美其惟孝而夜壑匪固風林多感雖就禮之則俯同縗絰之儀而由衷之心無奪絶深之至寢苫枕草抑惟寧戚仁里德門所居則化御史驄威電發隼視霜雄坐非平仲之仁行問冶長之罪且鄉人化善則置刑章鄰母興悲欲從何典既有明於古事亦何滯於今科同前朝良貞一作良貴閲水成川賢愚共盡因心制禮榮賤同歸甲以慶絶循陔一作甲以悲愴絶思哀纒罷社綵綵其服永謝老萊之歡戀戀厥心空聞孺慕之切三年茹痛寢苫不爽於喪期九族遷風偃草遂行於仁里御史幸持清憲須辨彞章暴勝繡衣徒然忝竊晏嬰一作生縗服罕悟重輕逹禮之誠猶迷寧戚之宜安在請從宗黨之好無憚簡書之威父在杖堂判戊居母喪父在杖於堂上對顔勝居母親之喪茹荼嬰痛踊既無節哭何常聲悲在其中形瘠於外口不甘味身不安美潘生園裏無復版輿顧氏家中空餘畫扇仙人白鶴遙投士行之前孺子隻雞逺赴林宗之所蔡順有繞墳之感老萊無衣綵之由喬枝未摧桂樹猶茂執椅桐之杖上芝蘭之堂循禮制而多違顧刑書而有犯請歸司敗任便科推練祥羣立旅行判丁三年之喪練祥羣立旅行對丁為人子持乎喪服身體髮膚不失全生之道衣衾棺槨無虧送死之儀仰風樹而充窮履霜庭而孺慕鍾創巨之悲酷有荼蓼之苦卒壁日不停練期何及毁不滅性痛感終身道在慎終義存追逺人來輒語禮稱忘哀羣立多爽於事宜旅行有乖於物理二途俱發一罪須科除喪鼓琴判乙既除喪而鼓琴成聲或告忘哀云不敢過對三年之喪寧戚毋易百行之最唯孝為先乙縗絰既除欒棘餘毀既而緑琴在御朱絃高張摶拊成聲愈樂斯在雖子張臨喪和一作彈之而和先王制禮不敢不至與其樂也何其速哉祥鼓素琴判戊祥之日鼓素琴鄰人告違禮對執親之喪行孝之道出入不當門隧升降不由阼階苴縗在躬溢米充食恨纒風樹痛結寒泉舉號已見於心摧毀瘠載聞於骨立念親之在土哀親之在外寢唯枕塊居必倚廬隙駟不留祥期奄及既除凶制奚鼓素琴示人有終於物無犯食醢猶許奏樂何辜請從雪滌庶符氷釋禫服鼓琴判得鄒人告孔叢子居親禫服鼓琴而作樂叢子曰此是子輿梁山之琴曲鼓器不伏對張鼎地惟洙泗人參鄒魯闕里之詩書斯在淹中之禮樂不渝孔叢子風樹搖悲寒泉動思霜露云惕日月其除是以君子為難子臯一作展非親喪而永慕先王制禮孟獻禫懸而不樂既祥絲屨一作而練見孔父之深譏行奏綺琴聞子輿之雅操且恩懷罔極五日樂禁於成聲哀貫終身踰月禮通於作樂去順效逆魯史稱其速禍朝祥暮歌鄒人據而興誚節哀順變雖殊念始之心以今况昔未惇送終之禮欲加之罪其無詞乎奪情腰絰服事判甲腰絰服事既而曰不即人心致仕而退時謂非禮稱人蓋善之對出師正邦大易有象率義弭一作殄寇春秋則書用孚中行攸往夙吉以威作匿疑取渙於羣甲閨門麗凶苴麻纒疾喪則寧戚義能繼思痛深倚廬雖授杖以不起政急分閫或執兵而啓行介以趨軍絰而躬役魯侯金革我直以興晉襄墨縗彼釁而動克壯輿輻能豶豕牙任長子以帥師利元戎以光濟策勳苟進不即人心致仕能歸何暌孝體有為也無仁乎得反經以合道胡責善以非禮妻喪奏樂判得丙妻有喪丙於妻側奏樂妻責之不伏對白居易喪則思哀見必存敬樂惟飾喜舉合從宜夫婦所貴同心吉凶固冝異道丙室方在疚庭不徹懸鏗鏘無倦於鼓鍾好合有傷於琴瑟既愆夫義是奪集作棄人喪儼麻縗之在躬是吾憂也調絲竹一作管以盈耳於汝安乎如賔之敬頗乖若往之哀斯黷遂使唱和不應憂喜相干道路見縗猶必變色鄰里有殯亦不為歌誠無惻隱之心冝受庸奴之責士弔大夫喪判得丙為大夫有喪丁為士而特弔或責之不伏對官有常尊禮無不敬位若殊於等列弔則異其節文丙惟集作為大夫丁乃元士居喪而哭合遵朝夕之期特弔以行奚越尊卑之序既乖前典乃速斯言且禮貴明微位宜慎守事非其事信干食菜之榮儀失其冝徒展贈芻之意是曰無上將何以觀同門生喪親判得乙有同門生喪親將往弔之其父怒而撻之使遺縑而已或詰其故云交道之難對子道貴恭當從理命交逰重義盍恤哀情孝不在於詭隨仁豈忘於惻隱乙父訓乖愛子道昧擇交况求益之初無友不如己者及居喪之際凡人猶合救之既罔念於一哀是有違集作不遵於久要苟知生而不弔雖贈死以何為舊館遇忘集作哭亡宣父尚猶出涕同門在戚王丹未可忘情縱申遺帛之誠豈補贈芻之義肆一抶之怒父兮既爽義方杜三諌之辭子也亦虧孝道宜哉或詰允矣知言食於喪家判得丁食於喪者之側而飽或責之辭云主人食我以禮故飽對飲食以陳庶無求飽齊斬集作衰可恤仁豈忘情丁靡念人喪姑求主禮遇加籩之膳誠可療飢對泣血之哀亦冝忘味既念吉蠲之饎是忘惻隱之心况舂於其鄰相猶違禮而食於其側飽亦非仁徒嘉施氏之儀且昧宣尼之教勿思變色當顧戚容文苑英華卷五百二十一
