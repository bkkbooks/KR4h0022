body:
  text: 文苑英華卷三百三十七宋李昉等編草木茶四首牡丹二首薔薇一首枸把一首苔一首松二首柏一首柳三首橘二首柑子一首梅一首道邉樹一首美人嘗茶行崔珏雲鬟枕落困泥春去聲玉郎為碾瑟瑟塵閒教鸚鵡啄忩詩和嬌扶起濃睡人銀瓶貯泉水一掬松雨聲來乳花熟朱唇啜破緑雲時咽入香喉爽紅玉明眸漸開橫一作轉秋水手撥絲篁醉心起臺時一作前却坐推金筝不語思量夢中事飲茶歌請崔石使君釋皎然越人遺我剡溪一作山茗採得金芽㸑金鼎素瓷雪色飄一作縹沫香何似諸仙瓊蘂漿一飲滌昏寐情思爽朗滿天地再飲清我神忽如飛雨灑輕塵三飲便得道何須苦心破煩惱此物清髙世莫知世人飲酒徒一作多自欺好一作愁看畢卓甕間夜笑向陶潜籬下時崔侯啜之意不巳狂歌一曲驚人耳孰知茶道全爾真唯有丹丘得如此飲茶歌送鄭客前人丹丘羽人輕玉食採茶飲之生羽翼天台記云丹丘出名大茗服之羽化名藏仙府世莫知骨化雲宫人不識雪山童子調釡鐺楚人茶經虛得名霜天半夜芳草折爛漫緗花啜又生常說一作賞名此茶祛我疾使人胸中蕩憂栗日上香爐情未畢亂踏虎溪雲髙歌送君出採茶歌一作紫荀茶歌秦韜玉天柱香芽露香發爛研瑟瑟穿荻篾太守憐才寄野人山童碾破團圓月倚雲便酌泉聲煮獸炭潜然蚌珠吐看著晴天早日明鼎中颯颯篩風雨老翠香塵下才熱攪時繞筯天一作愁雲緑耽書病酒兩多情坐對閩甌睡先足洗我胸中幽思清鬼神應愁歌欲成和李中丞慈恩寺清上人院牡丹花歌權德輿淡蕩韶光三月中牡丹偏自占春風時過寶地尋香徑已見新花出故叢曲水亭西杏園北濃芳深院紅霞色擢秀全勝珠樹林結根幸在青蓮域艷蘂仙集作鮮房次第開含煙洗露照蒼苔龎眉倚杖禪僧起輕翅縈枝舞蝶來獨坐南臺時共美閒行古剎情何巳花間一曲奏陽春應為芬芳雜詠作芳菲比君子牡丹芳白居易牡丹芳牡丹芳黃金蘂綻紅玉房千片赤英霞爛爛百枝絳熖集作艷燈煌煌照地初開錦繡假當風不結蘭麝囊仙人琪樹白無色王母桃花小不香宿露輕盈泛紫艷朝陽照耀生紅光紅紫二色間深淺向背萬態隨低昂映葉多情隱羞面卧叢無力含醉粧低嬌笑容疑掩口凝思怨人如斷腸濃姿貴彩信竒絶雜卉亂花無比方石竹金錢何細碎芙蓉芍藥苦尋常遂使王公與卿士遊花冠蓋日相望庫車軟輿貴公子集作主香衫細馬豪家郎衛公宅靜門東院西明寺深開北廊戲蝶雙舞看花集作人久殘鶯一聲春日長共愁日照芳難駐仍張帷集作羅幕垂隂凉花開花落二十日一城之人皆若狂三代巳還文勝質人心重華不重實重華直至牡丹芳其來有漸非今日元和天子憂農桑恤下動天天降祥去嵗嘉禾生九穗田中寂寞無人至今年瑞麥分兩岐君心獨喜無人知可歎息我願暫求造化力減却牡丹妖艷色少回卿士一作士女看集作愛花心同助集作似吾君愛稼穡明月湖醉後薔薇花歌英才萬朵當軒紅燭燭晚隂照水塵不著西施醉後情不禁侍兒扶下蘂珠閣柔條嫩蘂一作葉輕􅀈鰓一低一昂合又開深紅淺緑狀不得日斜池畔香風來紅能柔緑能軟濃淡參差相宛轉舞蝶雙雙誰喚來輕綃片片何人剪白髮使君思帝鄉驅妻領女遊花傍持杯憶著曲江事千花萬葉垂宫墻復有同心初上第日暮華筵移水際笙歌日日徴教坊傾國名娼盡佳麗我曽此處同諸生飛盂落盞紛縱橫將欲得到上天路剛向直道中行去一朝失勢當如此萬事如灰壯心死誰知奏御數萬言翻割龜符四千里丈夫達則賢窮則愚胡為紫胡為朱莫思身外窮通事且醉花前一百壺湛處士枸杞架歌釋皎然天生靈草生靈地設生人間人不貴獨君井上有一根始覺人間衆芳異拖緑垂絲宜曙看徘徊滿架何珊珊春風亦解愛此物裊裊時來傍香實濕雲綴葉擺不去翠羽銜花驚畏失肯羡孤松不凋色皇天正氣肅不得我獨全生異此輩順時榮落不相背孤松自被斧斤傷獨我柔枝保無害黃油酒囊石碁局吾湛生心出世俗擷芳坐影風灑懷其致翛然此中足苔歌顧雲檻前溪奪秋空色百丈潭心數砂礫松筠一作籟條條長碧苔苔色碧於溪水碧波回梳開孔雀尾根細貼著盤陀石撥浪輕拈出少時一髻濃煙三四尺山光日華亂相射靜縷藍鬐勻襞積試把臨流一作風抖擻看琉璃珠子淚雙滴如看玉女洗頭處解破雲鬟收未得即是仙宫欲製六銖衣染絲未倩鮫人織採之不敢盈筐篋苦把龍神河伯惜瓊酥玉鹽爛漫煮咽入丹田續靈液㑹待功成插翅飛蓬萊頂上尋仙客風入松釋皎然西嶺松聲落日秋千枝萬葉風飀飀美人援琴弄成曲寫得松間聲斷續清我魂流波壞陵安足論美人夜坐月明裏含少商兮㸃清徴風凄清兮何飄飉攪寒松兮又夜起夜未央曲何長金徽更促聲泱泱何人此時不得意意苦絃悲聞客堂澗底松白居易青松百尺大十圍生在澗底寒且卑澗深山險人路絶老死不逄工度之天子明堂缺梁木集作梀彼求此棄俱集作此求彼有兩不知誰喻蒼蒼造物意但與之材不與地金張世祿黃憲賢集作黃憲貧牛衣黃憲本牛醫兒諸本作衣恐誤寒賤貂蟬貴貂蟬與牛衣髙下雖有殊髙者未必賢下者未必愚君不見沉沉水集作海底生珊瑚歷歷天上種白榆古柏行杜甫孔明廟前有老柏柯如青銅根如石霜皮溜雨四十圍黛色參天二千尺君臣巳與時際㑹樹木猶為人愛惜雲來氣接巫峽長月集作日出寒通雪山白憶昨路繞錦城一作亭東先主武侯同閟宫崔嵬枝幹郊原古窈窕丹青户牖空落落盤踞雖得地冥冥孤髙多烈風扶持自是神明力正直元因造化功大厦如傾要梁棟萬牛回首丘山重不露文章世已驚未辭剪伐誰能送苦心豈免容螻蟻香一作密葉終經宿鸞鳯志士幽人莫怨嗟一作傷古來材大難為一作皆難用楊柳歌庾信河邉楊柳百尺枝别有長條窈地垂河水衝激根株色疑作危倐忽河中風浪吹可憐巢裏鳯凰兒無故當年老别離流槎一去上天池織女支機應見隨誰信從來䕃數國直用東南一小枝昔日公子出南皮駿馬翩翩西北馳左右彎弧仰月支何處相尋𤣥武陂鳯凰新簫管史吹朱鳥春忩玉女窺銜雲酒杯赤碼瑙照日食螺紫琉璃君言丈夫無志氣為問燕山那得知百年霜露掩離披一旦功名不可為定是懷王作計媸無事翻覆用張儀武昌南城誰可移官渡營前那得知尚憶落絮鵝毛色無復青絲馬尾垂各與梅花留一曲共在長笛管中吹門前柳前人門前蜀柳先知春風淡暖煙愁殺人將謂止栽羣樓下不知迤邐連南津南津柳色連南一作溪市南去戎州三百里夷陬蠻落相連接故鄉莫道心先死我今帝里還有家門前嫩柳插一作披仙霞晨沾太一壇邉雨暮宿鳯凰城裏鴉别來三載當誰道門前年年緑隂好春來定解飛雪花雨後還應庇煙草憶昔當年栽柳時新芽茁茁嫌生遲如今宛轉拂著地常向緑隂勞夢思不道彼樹好不道此樹惡試將此意問野人野人盡道生處樂為報門前楊柳栽我應來嵗當歸來縱今樹下能攀折白髮如絲心似灰隋堤柳闕名隋堤柳嵗久年深盡衰朽風飄飄兮雨蕭蕭三株兩株汴河口老枝病葉愁殺人曽經大業年中春大業年中煬天子種柳成行夾流水西自黃河東接集作至淮緑影一千三百里大業末年春暮月柳色如煙絮似作如雪南幸江都恣佚遊應將此柳繫一作夾龍舟紫髯郎將護錦纜青蛾御史直迷樓海內財力此時竭舟中歌笑何日休上荒下困勢不久宗社之危如綴旒煬天子自言歡樂殊未極豈知明年正朔歸武德煬天子自言福祚垂集作長無窮豈知後年皇子封酅公龍舟未過彭城閣義旗巳入長安宫蕭墻禍生人事變晏駕不得歸秦中土墳數尺何處葬吳公臺下多悲風二百年來汴河路沙草和煙朝復暮後王何以鑑前王請看隋堤亡國樹諒公洞庭孤橘歌顧况不種自生一株橘誰教渠向階前出不羡江陵千木奴下生白蟻子上生青雀雛飛花薝蔔旃檀香結實如綴摩尼珠洞庭橘樹籠煙碧洞庭波月連沙白待取天公放恩赦儂家定作湖中客洞庭山維諒上人院階前孤生橘樹歌釋皎然洞庭仙山但生橘不生凡木與梨栗真子無松自不栽感得一株階下出細葉繁枝委露新四時常緑不關春若言此物無道性何意孤生來就人二月三月山初暖最愛低簷數枝短白花不用鳥銜來自有風吹手中滿九月十月爭破顔金實離離顔色殷一作色殷一夜天晴香滿山天一作山生珍木異於俗俗士來逄不敢觸清隂獨步禪起時徙倚枝前看不足分柑子歌示諸小前人癡男騃女愁殺人偏呼小者大者嗔粗衣糲食盡須一何况異味兼時新今朝樓下柑初熟摘得一筐分不足兒童豈待父母施自各捻來一作各自捻將獻兄叔就中小女有所翳闕梅王轂闕暑日題道邉樹前人火輪迸熖燒長空浮埃撲面愁朦朦羸童走馬喘不進忽逄碧樹含清風清風留我移時住滿地濃隂懶前去却歎人無及物功不似團圓道邉樹文苑英華卷三百三十七
