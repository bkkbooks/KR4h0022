body:
  text: 文苑英華卷一百二十七宋李昉等編逰覽一間逰賦一首逰廟山賦一首楚望賦二首望賦一首間逰賦并序徐魁余嘗讀易至謙豫二卦乃廢書而歎曰嗟乎天道其何逺哉故逍遙山阿內身外物自保幽靜庶無悔吝遂援毫命牘賦間逰之章云爾夫居幽而思逺兮固先逹之所言吾乘方以靜拙兮亦自得於丘園羡馬蹄之踐雪兮憐澤雉之處樊朅歸來以遂志兮豈榮華之足敦傍山阿而葺宇兮即樹楥而啓門爾其山則盤紆深沉穹窿杳靄下枝回溪上㵼懸瀨絶峯交竦深林縈帶魚鳥歘以來往煙雨紛其雜會喧以騰倚之獸蔭以偃蹇之木百藥爭妍千芳競馥紫芝所業黃精所畜玄猿逰嘯於隂杖疑作枝惠風徘徊於陽谷潤疑作澗綿靡而成文泉暾鏡而自肅若乃春華既落秋實就成翔雲亹亹流月亭亭髙蟬嘶韻玄鳥辭楹氣凄清而開朗露溧冽而含清或傍徨乎松壑亦偃息乎林扄覽五聖之餘軌酌三古之遺經信居謙而履福如在豫而忘鳴遵養性於黃術鑒止足於老生欣松屑之可餌難一作歎黃金之未成至乎身乖俗偶志罷世紛坐鄰沙雪卧接煙雲耿長霜一作宵而未寐乍含咏以成文傷孤鴈之失伴懷哀鵠之離羣何物類之多感鬱豫懷其誰語希體逸而心廣願飄然而高舉美人兮巖阿芳菲兮襲豫天奄冉其將暮山蕭條而無侣發清琴以輔志操長歌以延佇歌曰上幽岫兮得所欽山蔬陳兮桂酒斟嗟草木兮洛疑春心悼日月兮逰疑相尋貴龍鳳兮就高深悅張邴兮託蕭森歌響既畢月已沉乃擁荷蓋命漢舟越蘭渚泛滄流意超遙其誰恨何俗纍之為憂傷路人之狹隘聊放心以間逰逰廟山賦并序王勃玄武山西有廟山東有道君廟蓋幽人之别府也長蘿巨樹梢翳雲日王子馭風而逰泠然而喜益懷霄漢之舉而忘城闕之戀矣思欲攀洪崖於煙道邀羡門於天路仙師不在集作存壯志徒爾俄而泉石移景秋隂方積松柏群吟悲聲四起背鄉關者無復四時之策焉嗚呼有其志無其時則知林泉有窮路之嗟集作哭煙霞多後時之歎不其悲乎遂作賦曰陟彼山阿積石峩峩亭臯千里傷如之何啓松崖之密蔭攀桂岊之崇柯隔浮埃於地絡披皓氣於天羅爾其緑巖分徑蒼岑對室菌軒丹糾芝場翠密俯泉石之清泠臨風颷之瑟䫻仰紺臺而携手望清都而容集作屈膝躡霞岡於玉砌步雲岊於金壇懷妙童於真女想青螭及碧鸞情恍恍而將逸心回回而未安見丹房之晚晦知紫洞之宵寒既而霧昏千障煙浮四野恨流俗之情多痛飛仙之術寡驅逸思於方外局髙情於天下使蓬瀛可得而宅焉何必懷於此都也亂曰已矣哉吾誰欺林壑逄地煙霞失時託宇宙兮無日俟鸞虬兮未期他鄉集作邦山水集作谷秪令人悲楚望賦并序李嶠序曰登髙能賦謂感物造端者也夫情以物感而心由目暢非力覽無以寄杼軸之懷非髙逺無以開沉鬱之緒是以騷人發興於臨水柱史詮妙於登臺不其然歟蓋人稟情性是生哀樂思必深而深必怨望必逺而逺必傷千里開年且悲春目一葉早落足動秋襟坦蕩忘情臨大川而永息憂喜在色陟崇岡以纍歎故惜逝慜時思深之怨也搖情蕩慮望逺之傷也傷則感遙而悼近怨則戀始而悲終逺節𢎞人且猶軫念苦心志士其能遣懷是知青山之上每多惆悵之客白蘋之野斯見不平之人良有以也余少歷難疑艱虞晚就推擇揚子甘泉之嵗潘生秋興之年曽無侍從之榮顧有池籠之嘆而行藏莫寄心迹罕并嵗月推遷志事遼落栖遑卑辱之地窘束文墨之間以此為心心可知矣縣北有山者即禹貢所謂岐東之荆也岧嶤髙敞可以逺望余簿領之暇蓋嘗逰斯俯鏡八川周睇萬里悠悠失鄉縣處處尺疑雲煙不知悲之所集也嵗聿云暮逰子多懷援筆慨然遂為賦云爾眇乎忽然髙山之顛露團團而濕草風烈烈而鳴泉對蒼茫之寒日聽蕭索之悲蟬廟疑獨處而無晤吾凝睇乎八埏於是繁懷載紆積慮未豁生逺情於地表起遙恨於天末霜盡川長雲平野濶恨逰襟之造疑作浩蕩憤羇怨之協疑作忉怛寂焉長想倐若有亡固將言而已歎信無哀而自傷撫余情之增軫悼人事之多戚曽浮促之幾何而思緒之纒邈思何憂而不入心何慮而不攢雖感目之一致終寄懷而百端若乃平原杳兮千里春晴山香疑兮萬里親疑作新迷故鄉之處所滅愛舊之聲塵願寄言而靡託思假翼而無因徒極睇而盡思終夭性而傷神或復天髙朔漠氣冷河關漢塞鴻度吳宫燕還對落葉之驅影怨浮雲之慘顔爾乃永眺無見端居不聊音留愴歸軒之寂寂傷逺客之悠悠月臨城曉風送邉秋唳鶴二字疑聞兮炯不寐凝笳動兮此夜愁及夫寒野蕭條空山寂寥目鄢郢而途眇指邯鄲而路遙傷永離兮浦曲訣逺送兮河橋眺平蕪之漫漫瞻逺樹之迢迢仡然直視嗌矣魂銷形將稿木同植心與飛蓬共飄至如隴上從軍漢疑陽謫戍插羽朝急要鞭夜赴黯黯塞雲蒼蒼關樹甘埋影於異城暫回首於歸路魂逝兮邑里目斷兮煙霧步將前而後疑作復留望欲罷而還顧覩驚塵之欻起見征羽之將度泉石愴而增咽行旅悲而失措亦有搗衣思婦織錦懷人看粉黛兮無色視桃李兮非春君去兮還無期妾心兮私自悲高臺四望杳無極天疑衍天涯一去何君疑衍盡時天涯兮綿綿問道路兮將幾千朝朝暮暮綺忩前長懷此恨終永年若夫羇旅失職之人放逐流離之客羌抱恨而誰許疑作訴塊緘愁而不擇疑於是窮澤際天滄流拂漢屬榮悴兮時改遇炎涼兮節换莫不瞻草木而孤絶向風煙而永歎故夫望之為體也使人慘悽伊鬱惆悵不平興廢思慮震蕩心靈其始也罔兮若有求而不致也悵乎若有待而不至也悠悠揚揚似出天壤而涉雲莊逡逡巡巡若失其守而忘其真羣感方興衆念始并既情招而思引亦目受而心傾浩兮漫兮終逾逺兮肆兮流兮宕不返兮然後精回疑魄亂神璽至二字疑否憂憤總集莫能自止雖剛悍武力之夫法度禮容之至作志孰不解威失毅廢綱遺紀祝疑衍借使􅀢疑據河負海牛山之美可逰左江右湖京臺之樂難忘闕邈千秋金石悲兮綺羅傷一作相顧山川以永慨邀山月而詎央若乃羊公愴惻於峴山孔宣憫然於曲阜王生臨逺而沮氣顔子登高而白首惟夫作聖明哲寬和敦厚亦復怛色愀容喪精亐疑夀故望之感人深矣而人之激情至矣必也念終懷始感往悲來沿未形而至造思繫無而生哀此歡娛者所以易情而慨慷達識者所以凝慮而徘徊者也第二并序劉禹錫豫既謫于武陵其地故郢之裔邑與夜郎諸夷錯繫乎天者隂伏陽驕繫乎人者風巫氣寙是以囂氛一作霧浮浮利于樓居城之麗譙實鄰所舍四垂無蔽萬景坌入因道其逺邇所得為楚望賦云翼軫之野祝融所司隂迫而專專實生沴天濡而雺土泄而泥氣罕淑清兮淫氛曀曀四字一作漫淫氛曀中人之體兮為瘥為瘵一作廢以曠滌煩兮利居髙于物外我卜我居於城之隅宛在藩落麗譙渠渠四阿垂空洞户發樞眸子不運坐陵虛無嵗更周流時極慘舒萬象起滅森來貺豫櫺軒之外羣山巃嵸岡陵靡陀勢若相拱出雲見怪窈蔚森聳露夕霞朝望如飛動簷廡之下大江澒洞支流合輸泄入雲夢羲和望舒出沒兩涯涵泳之族聱取𣢺呀秋水灌盈漩石飄沙流枿軒昂舞于盤渦逮及收潦淡如醁醽白石磷磷倒影羅生蘋末風起有文無聲悠逺煙綿與空蒼然湘沅之春先令而行臘月寒盡溫風發榮土膏如濡言鳥嚶嚶三星嘒其曉中植物颯以飄英雲歸髙唐草蔽洞庭目與天盡神將化并圓方相函逰氣杳冥熙熙藹藹藻飾羣形枿樹同丘積空凝青環洲曲塘含景曜明恢台之氣發于春季涉夏如鑠逮秋愈熾土山焦熬止水漫沸翔禽跕墮呀喙一作咮垂翅曦赫歊蒸陽極召一作反隂二儀交精下上相歆雲興天際歘若車蓋凝矑未瞬彌漫霮䨴驚雷出火喬木糜碎殷地爇空萬夫皆廢懸霤綆縋日中見沫移晷而收野無完塊少隂之中景物澄鮮丹葉星房燭耀一作輝川原夕月既望曜一作躍于丹泉上鏡下氷湔塵濯煙宿麗潛芒獨行髙躔皓一作皎一氣之悠悠潔有形而溢清玄杳微一作徴明以斐斖想逰目於化先夜無朕以徂征金霞暈乎海壖明星方揚斜漢西懸璿柄如墮半沉層一作曽瀾雞啁唽而晨鳴兮日荏苒以騰晶動植瞭兮已分山川鬱乎不平復人寰之喧卑洶浩浩以營營追向時之景光不可驟得以再更意華胥之夢還猶一作獨倣像而馳精日次于房天未降霜百卉猶一作獨澤水泉收脈故道朘音宣削衍為廣斥水禽嬉戲引吭伸翮紛驚鳴而決起捨綵翠于砂礫時北風振稿揚埃蕭條邉聲與鴈俱來寒氛委積萬竅交激楚雲改容飛雨凝滴灑林遞響淅瀝梢槭飛電照雪以騰光柔蔬傲霜而透坼躔次殊氣川谷異冝民生其間俗鬼言夷招三閭以成謡德伏波而搆祠投粔籹以鼓楫豢鱣魴而如蟻蟠木靚深孽妖慿之祈年去厲於蠲敬祗擊鼓肆筵河一作阿旁水湄薦誠致祝却落躨跜渚居鮮食大掩水物罟張餌啖不可遁伏顯舉潛縋晝撞夜觸設機沉深如拾于陸彼逰鯈之瑣類咸跳脫於窘束雖三趾與六眸時或加乎一目亦有輕舟拖綸往復軒輊泛浮馴鷗相逐暮夜澄寂嘯歌羣族傖音俚態幽怨委曲逗踈柝於江城引哀猿於山木巢山之徒抨一作捽木開田灼龜伺澤兆食而焮鬱攸起于巖阿騰絳氣而蔽天熏歇雨濡一作澤頴垂林顛盜天和而藉地勢諒無勞而有年罷士間人逸為末作求金渚涘淘汰瀺灂流注濻沱一作隤池繁光熠爚貪賈來貿發于懷握無翼而飛潤于豐屋哂耘耕之悒悒徒胼胝以自鞠我處層軒日星回還閲天數而視民風百態變見乎其間非耳剽以臆説兮固幽求而縱觀觀物之餘遂觀我生何廣覆與厚載豈有形而無情髙莫髙兮九閽逺莫逺兮故園舟有楫兮車有轄江山一作上坐兮不可越吾又安知其所如恍臨髙以觀物望賦劉禹錫邈不語兮臨風境自外兮感從中明晦轉續兮八極鴻蒙集作濛上下交氣兮羣生異容發孤照於寸眸騖遐情乎太空物乘化兮多象人遇時兮不同嗟乎有目者必騁望以盡意當望者必緣情而感時有待者瞿瞿忘懷者熙熙慮深者瞪然若喪樂極者沖然無違外徙倚其如一中糾紛兮若斯望如何其望最樂睎慶霄兮遡阿閣如雲兮天顔咫尺如草兮臣心踴躍扇交翟兮葳蕤旗升龍兮蠖略日轉黃道天開碧落凝瑞景於庭樹掬非煙於殿幕望如何其望且歡登灞岸兮見長安紛擾擾兮紅塵合鬱蔥蔥兮佳氣盤池象漢兮昭回城依斗兮闌干避御史之驄馬逐幸臣之金丸望如何其望攸好宗萬靈兮越四隩漢帝仙臺兮秦皇海嶠霓裳踊一作踴于河上馬迹窮乎越徼紫氣度關而斐亹神光屬天而照耀睆眷眷以馳精聳專專而觀妙望如何其望有形視蠢蠢兮窮冥冥楚塞氛惡兮蕭關燧明暈籠孤月兮角奮長庚沙長一作多似雪磧有疑城煙雲非女子之氣草木盡王者之兵審曳柴之虛警破來騎之先聲信有得於風鳥亦一作示無言於斾旌望如何其望且慕恩意隔兮年光度雕輦已辭兮金屋何處長信草生兮長門日暮候翠華之儻來仰玄天以自訴况復湘水無還章一作漳河空注淚染枝葉香餘紈素風蕭蕭兮北渚波煙漠漠兮西陵樹夫不歸兮江上石子可一作河見兮秦原墓拊一作拍琴翻朔塞之思一作音挾瑟指邯鄲之路望如何其望最傷俟環玦兮思帝鄉龍門不見兮雲霧蒼蒼喬木何許兮山髙水長春之氣兮悅萬族獨含嚬兮千里目秋之景兮懸清光偏結憤兮九回腸羡環拱於白榆惜馳暉於落棠諒衝斗兮誰見伊戴盆兮何望平聲豈止蘇武在胡管寧浮海送飛鴻之滅沒附隂火之光彩鶴頸長引烏頭未改恨已極兮平原空起何時兮東山在永望如何傷懷孔多降將有依風之感宫人成意一作憶月之歌歌曰張衡側身愁思久王粲登樓日回首不作渭濵垂釣臣羞隨一作為洛陽拜塵友凡一作皆集本文苑英華卷一百二十七
