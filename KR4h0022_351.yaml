body:
  text: 文苑英華卷三百五十一宋李昉等編問答一七契八首七勵八首七契梁昭明太子奚斯逸士肥遁棄榮蓮峯於焉剗迹灌木是用庇形口不悅於五味心不娛於八聲鄙巢父之稱哲笑蘇門之為英鵠蓋龍旗初不關意鳯吹鼉鼓終不屑情跨四海而擅美邁三古而振名居山林而不返終無慮而無營於是辨博君子詞若湧泉言踰却秦之魯辨超稷下之田欲抑則大鵬垂趐欲抗則尺鷃沖天聞逸士之懷寶乃拂衣而造焉駕兩驂之如手乘輕車之若流爰自畿甸徑造山周傍瞻虹見俯眺雲浮鳴禽聒耳零霧蔽眸唯一壑之為阻無三徑之可求於是披榛陟路援蘿踐崿雖跋涉而不休覩逸士之所託其為居也寂焉而靡所聽瞑然而無所瞻三春蔓戶八桂攢簷蓽門鳥宿圭竇狐潛風來室搖霧下窗霑實人迹之罕至逸士於此而獨淹君子曰蓋聞智士不希狷介仁者莫有迷邦傅説終受殷爵吕望遂啓齊封余敬吐誠而畢慮子能留志而見從乎逸士曰鄙人固陋自潛幽藪必枉話言敬聆金口君子曰若夫夾鍾之節春景依遲碧樹初蘂緑草含滋春臺之樂信矣熙熙於是百金之士萬鍾之家招搖隆富徴集豪華駕紫騮之馬乘青蓋之車出自髙宇行無挾斜陶嘉月而結交逰藉芳辰而宴朋友望宜春以隨肩入長楊以携手金盤薦美藉之珍玉杯沉縹清之酒義曰和神事非爽口於是娛樂未終留一作曦光將夕飛觴引滿奮袖舉白投轄安坐歡甚促席以會雕蟲之賔加有清談之客論同炙輠藻若凌雲戴憑不能髙其説相如不能擅其文無玄不析無細不分搦簡玉振下筆蘭芬乃亦六郡莫擬非直三蜀蔑聞屬虞泉氣晚朗月潛曜清巵未闌宵景方照竒舞遞作名謳斯召約綽妍姿嬋嫣宜笑綺縠風吹珠璣星耀齊竽揚參差之響趙瑟奏鏗鏘之妙茲亦遊宴之至娛子能偕此而為樂乎逸士曰輕蕩遊觀非豫所耽得性行樂從好山南君子曰輔性和神實惟至味非直方今見重乃亦一作其自古攸貴不周之禾調腸補一作輔胃雜以龍肝玃炙豹一作貊舌猩唇劉氏之醢范公之麟鶬出雲際鱘來江岷蒲葅芬馥古聖所珍其酒則蒼梧九醖中山千日取譬湛露擬之飴蜜百味交馳三雅間出若其珍異則修筵斯溢千品萬類不可詳悉西母靈桃南楚萍實東陵之瓜北燕之栗湖畔之柿江隂之橘張掖白奈恆陽黃黎河東洗犬隴蜀蹲鴟並怡神甘口窮美極滋加以伊公調和易氏燔㸑傳車渠之碗置青玉之案瑶爼既已麗竒雕盤復為美玩子能與一作從豫而享之乎逸士曰甘膬腸腐五味口爽伊人素蓄無羡方丈君子曰千里之駒出自余吾伯樂所選伏波所模通肩合相平腹應圖激電比速躡景競驅騰黃弗敢擬駿赤兔莫與爭途異態蹥踡竒姿猗倚逸足驟反逰雲移駛形函逰華日不暇徙乃飾金羈之昭晣加以玉鞍之輝煥連乾麗靡輕蘇粲爛逸氣既為勝矚美飾重成壯觀蹄蹶紅塵膺流絳汗風起龍驤灰聲鳥散自古迄今人誰不玩逸士能就一作從豫而乘之乎逸士曰遊逸輕佻策馬爭驅粵今樂靜豈能感娛一作豈感吾娛君子曰光形飾體莫過鮮衣冠鵕鸃之長纓若層雲之零霏琅玕珩珮言飾于背飄揚輕裾是用曜軀方空之綬弱紈之蕉暑才炎而已却風未至而先搖既唯照麗兼以輕鏘似朝霞之發彩若夕景之舒光至夫杪秋既謝寒緒中人則輕狐稱美豐貂表珍斯乃赤也所以去魯孟嘗所以出秦步光之妙櫑具之華君子武備所用禦邪標以珠玉飾以蓮花其任則百冶精鋭利擬秋霜豈止在身為美服襲稱臧固乃龍躍於襄水見氣於南昌幽通神化其妙難詳將與逸士服之以相徉逸士曰紾絺避暑緼袍禦冬鮮麗綺靡未之或從君子曰實有喬桐抽葉青蔥結根善地擢幹華嵩栖鳯層山之側藏龍平陵之東拂靉靆之髙雲鼓梢殺之雄風岧亭萬仭實造天中乃使匠石運斤班輸琢錘製起玄修形踰緑綺與金石而鏗鏘共絲竹而曼靡托北方之佳人命髙樓之杞氏間以巴隴才僮邯鄲妙妓騁獸為之輟馳飛禽為之不徙加以荆和之飾照耀柘絲之絃激揚三聲吐韻四結流唱辭髙薰奏響溢芝房竹來嶰谷律寫歸昌再鼓而玄鶴集九成而儀鳯翔初音魚踊餘妙繞梁何止田文慨慷劉靖心傷而已哉中山青曲若折而和揚美目以流眄啓玉齒而安歌歌曰陽阿奏兮激楚流望洛水兮有好仇縱輕棹兮泛龍舟將與逸士陟彼華堂憩諸閎館玉宇明華文階燦爛璇題昭晣珠簾彪煥身託玳瑁之筵目寓瓊華之玩且以悅諸和性之樂豈非綺麗之觀哉逸士曰居茲四郭寧辨五音靡曼不極君子弗欽雖聞贍辭之鋭無會野人之心君子曰白藏肅殺天髙野清玉樹始落金蘂初榮幕燕北反沙鴈南征實秋收之美節將校獵以娛情使櫪無伏馬巷靡遺行執戈於芉眠之野彎弧於曠浪之隂養由輕盼則林摧鷙獸蒲且效技則虛下翔禽騰猿蹶其足虓虎不擇音掩兔轔鹿既蔑古之烏有填坑滿谷亦眇昔之上林至於輕繳才飛則連鴻解羽微纎始放則並鱗失波豈論玄泉之則寧願將遨之歌弭節言旋禽不可算周旋眺覽足為京觀子雖山栖其從此玩逸士曰解網垂仁殷王美則聞聲不食孔聖淑音害蠢類而為樂豈君子之用心君子曰蓋聞地美養禾君人愛士澤被無垠光照郊鄙蒲輪必鄒魯之儒宗紆青必洛陽之才子大漢愧得人之盛有周慙以寧之美萬國若翕從一作同從流四海同使指刑措弗用囹一作理圄斯虛既講禮於太學亦論詩於石渠代有載戢史無絶書銅律應度玉燭調和黃髮擊壤青襟興歌元帥竒士庠序鴻生求禮儀之汲汲行仁義之明明隆采椽之義却玳瑁之榮當朝有仁義之睦邉境無煙塵之驚信如四氣明並三光厨萐挺茂階蓂比芳瑞鹿摛素祥熊耀黃靈禽樂囿儀鳯栖堂太平之瑞寶鼎樂協之應玉羊丹烏表色玉露呈瀼野絲垂木嘉苖貫桑固以德苞子姒道邁虞唐六合寧泰四宇咸康不煩一戟東甌膜拜詎勞一卒西域獻琛鹿蠡稽顙以悛惡樓蘭面縳而革音吾疑皆去鼻飲之穴棄烏舉之深固已澤流無外恩被遐方福比嵩岱道則穹蒼豈有聞若斯之化而藏其皮冠哉逸士曰鄙人寡識守節山隅不聞智士之教將自潛以糜軀請伏道而從命願開志以滌慮七勵梁簡文帝藏名外臣體道好異遁迹埋影剗心人事任性於蓼水之側放心於自得之場情苞六合德貫九方巖栖谷飲絶際濠梁於是寂鏡公子聞而往説乃飛車翠蓋翔駕絳螭丹旌鳯轉碧幔雲移映玉軑之綺靡照銀車之陸離經九橋一作嶠之敻阻歷五曲之巑危路入閬風道經通谷橋塗泱漭路林蕭肅石磴穹窿松關重復羊腸望斷邃路迂餘非林稅駕乃遇藏名之所居其居則蘚苔沒砌幄葉斜林千峯沓頂萬仞懸深南危碧流北障芳林左榮重陸右背髙岑煙霞罩日石澗籠隂聲音百籟響弄千禽寂鏡公子曰蓋聞智者不懷道沒志遺俗埋名迷邦碎寶却粒辭榮今欲説子以默語之術寧欲聞乎藏名曰僕雖幽栖逺紆名德寧忘潔已以受至言公子曰夫怡情託體實寄間宫跨危樓於枍詣挂日景於迎風玩靈華於仙掌度窈窕於飛虹金枝照曜玉璧玲瓏文窗洞右飛閣陵東桂柱通光雄梁亘日璧鏡鈕懸抽荷井出中宿錦筵長廊周密青錢碧影金墀玉律冬閨溫煦夏室含霜圖以珍怪畫以禎祥瓊茅秋花緑蕙春香植宜男於粉閣樹君子於椒房回風煙於璇題垂珠璣於玉箱文魚水宿錦鳥雲翔乃登陟逰踐望逺通踈擢素藕於石鏡搴蔓草於康衢若荆山之琢玉似隋水之弄珠若斯宫之間麗子能與我而共居外臣曰僕遊心蓬葦未暇斯處公子曰夫靚粧嚴服託體必嘉五絲擅美獨璽稱華組帷粲綵緹服含葩丹墀聚葉鏤檻飛花至如稷下縫掖泗上章甫雉緝霜鮮秦絲園縷鳯色龍分鴛文鵠聚雕紛瑶席綺飾瓊珮齊都滑石南海玳瑁散似綴珠離如並繢蜘蛛弄巧越女調樞夏則桃笙竹席冬則青莞金鬚溫麗瓊臺密華承寢當户之縠大文之錦華蒲萄之綺衾麗芬若之丹枕金蘇翠幄玉案象牀子能從我樂此芬芳外臣曰帶索披裘自得山性雕章麗服未敢攸同公子曰五飪調神三芝輔性用康仁夀以𢎞貞正乃使有伊之徒調嘗鼎味九州珍雜八方豐貴名亷天地之聲殽竭山海之味蟬鳴秋稻燕頷玉精離紅之膾勺藥之羮蒙山擅重灌水傳聲桂蠧石瓊龍胎鳯肺四膳八珍五肉七菜纍似縠雜切均鮮繪色若紫蘭紛如紅綷若乃越梅變實楚醴方添陳晨鳬之美味薦雋燕之肥甜洗以三危之露水調以大夏之香鹽霜薤沸烈露葵繁舒芳菰之菜白露之茹澄瓊漿之素色雜金筍之甘葅素醥浮氣酃醪凝清獻三爵之踰雅等千日之芳醴酌玉斗之英麗照銀柸之輕蟣一作蟻此亦天下之美味子能從我而享之乎外臣曰藜藿可膳薇蕨堪餐五味口爽寧假玊盤公子曰若夫鈞臺之樂葛天之歌飛七盤之妙節動六變之清和緑綺麗琴丹山寶瑟鏤器倕雕孤一作孫枝伶律奏白雪之楚緩陳亭席之吳疾躍鳥追飛潛魚伴出將使漸離擊築雍門鼓琴鳴繞梁之妙響發愁户一作眉之清音至如五陵金穴六郡豪家逺一作表流歌於東夏出祕舞於京華金鈿設一作沒翠步搖藏花遙同暮雨逼似朝霞髮鬢如點纎腰成削玉齒笑容紅粧綽約疾趨巧步霧袖芬披舒蛾眉之窈窕委弱骨之逶迤戴金翠之婉嬋珥瑶璫之陸離芬芳於梧一作吾春之苑灼爍於長洲之中于時斜光西委薄霧舒紅隋珠照影羅衣從風觀者方堤覩者盈淇令二燕之綴翼使八鶴之增悲明君為之斂泣西施為之解眉於是蘭閨寂晚曲韻相和對輕風之落景望明月以清歌歌曰酣醑半兮樂既陳長歌促節綺羅人拂鏡弄影情未極廽簮轉笑思自親此亦聲音之盡妙子能從我而聽之乎外臣曰淫聲亂耳未足入聽方追山壑永弄林泉公子曰夫心遊百氏理奧六經樞機性道隂陽窅𡨕昭玉牒於年史覽石記而照情若夫鄒枚上客掦馬俊人揮金入趙易服歸秦賣舌彈劔買義追仁商權萬古弋釣陶甄池中水黑席上稱珍判二氣之氛氲辨六爻之終始鳥變龍工鳯書雲紀辭𢎞八索辨崇三耳至如范睢折脅豫讓拉齒禮竭中心報深國士碎玉爭城臧圖解劔見碣石之金堤望楚都之環塹美陳平之反間揖子房之智謀想秦君之傳器仁漢后之解裘此亦天下之奧籍得性之林圃子能同覽悅目以齊此心外臣於是色動清顔頓解髙意曰僕雖野陋頗悅帶經但負薪多疾未甘斯説公子曰夫氛氲構象純雜不同共工折柱雖播英風自古而然曽何足道但吹沙役冦抑自犧年吐霧藏妖聞之堯日至於今者昌運天啓握歷寶年風猷駕層美道德漏重泉至如玄蹄外境紫舌頑人悖而無禮不沫皇仁於是騰三泉之窅漫戴五旗之飄揚引玉車於西隴鳴金鼓於北邙拭龍泉之雄劔瑩魏國之寶刀銛踰巨闕利擬豪胄至如牽鈎壯氣斗膽豪心緣腰白玉帶珮黃金酬恩報死尅逺長岑騕裊白燕耀躍青離五玉察善十相無遺連腰錦帶半足塵飛標威於鴈門之境振旅於龍突之鄉若乃驚沙絶岸苦霧綿長秋河曉碧落蕙山黃紅顔素改玄鬢斑霜征夫抵掌而飲膳壯士憤氣而沸腸回雲鳥之密陳背却月而相望旗才轉而漂杵鋒未至而驂傷前鋒紛其易幟後騎決其沙囊何湯雪之能比豈拾塵之可方於是呼韓頓顙龜茲銜璧羊牽既袒熊山已積九截同文八極齊軌帝曰念功班茅賜履青紫如拾賞歸詔美此亦天下之壯績子能從我而效之乎外臣曰葛伯不祀雖聞湯誥野叟力弱未敢振衣公子曰堯舜垂拱煥彼前聞今惟聖厯萬代一君壁儀照氣玉井珠分德合天地道方華勳滄海碧徹黃河一作流黛文愛人育德澤等春雲一作工宣尼茂典周姬禮容黃裳進士清襟俊童邦知改俗國化移風賣藥無藏名之老河泗無洗耳之翁德星夜映慶雲晝色異草雙條靈禽比翼狐尾既九茅脊復三金船漾寶銀甕呈甘康歌壤笑悅禮樞談隆周謝德盛漢知慙慈照無疑生化湛靈覺散漓𢎞淳拯澆敦朴國被仁壽家欣無學三明鑒道六度𢎞風出塵照苦入𡨕觀空善識無盡因性必通天不愛寶地無隱瑞百神受職三苖奉義石䇿一作縈紫泥繩金玉刺或託諷梁甫權卧德而龍盤或織箔渭濵耻藏名而鳯跂於是露點飴密溜泓澄於玉掌雲垂五采覆旖旎於仙樓漾醴泉於浪井拂垂楊於御溝或聯七葉一姓五侯外臣於是觀色內動神貌外移忽正山巾而言曰蓋聞幽居獨善見機往聖儻不遺朦叟亦願順來命文苑英華卷三百五十一
