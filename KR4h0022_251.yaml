body:
  text: 文苑英華卷二百五十一宋李昉等編寄贈五杜甫十三首李白十八首投贈韋左相時兼兵部尚書故云聼履上星辰杜甫鳳厯軒轅紀龍飛四十春八荒開夀域一氣轉鴻鈞霖雨思賢佐丹青憶舊集作老臣公之先人遺風餘烈至今稱之應圖求駿馬驚世集作代得麒麟沙汰江湖集作河濁調和鼎鼐新韋賢初相漢范叔已歸秦盛業今如此傳經固絶倫豫章深出地滄海濶無津北斗思喉舌東方領縉紳持衡留藻鑑聽履上星辰獨步才超古餘波德照鄰聰明過管輅尺牘倒陳遵豈是池中物由來席上珍廟堂知至理風俗盡還淳才傑俱登用愚䝉但隱淪長卿多病久子夏索居頻回首驅流俗生涯似衆人巫咸不可問鄒魯莫容身感激時將晚蒼茫興有神為君集作公歌此曲涕淚在衣巾贈韋左丞丈濟前人左轄頻虛位今年得舊儒相門韋氏任集作在經術漢官集作臣須時議歸前列天倫恨莫俱鴒原荒宿草鳳沼接亨衢有客雖安命衰容豈壯夫家人憂几杖甲子混泥塗不謂矜餘力還來謁大巫嵗寒仍顧遇日暮且踟蹰老驥思千里寒集作飢鷹待一呼君能微感激亦足慰榛蕪一作折骨效區區奉贈嚴八閣老前人扈從集作扈聖又作今日登黃閣集作閣明公獨妙年蛟龍得雲雨鵰鶚在秋天客禮容疏放官曹許集作可接聫新詩句句好應任老夫傳路逢襄陽楊少府入京城戲題四韻附呈楊四員外綰甫赴華州日許員外為求茯苓前人寄語楊員外山寒少茯苓歸來稍暄暖當為斸青冥翻動龍蛇集作神仙窟封題鳥獸形兼將老藤杖扶汝一作爾醉初醒寄髙三十五詹事前人安穩髙詹事兵戈久索居時來如一作知宦逹嵗晚莫情踈天上多鴻鴈河集作池中足鯉魚相看過半月集作百不寄一行書寄李十二白㑹稽賀知章一見白號為天上謫仙人也前人昔年有狂客號爾謫仙人筆落聞集作驚風雨詩成泣鬼神聲名從此大汨沒一朝伸文彩承殊渥流傳必絶倫龍舟移棹晚獸錦奪袍新白日來深殿青雲滿後塵乞歸優詔許遇我夙集作宿心親未負幽栖志兼全寵辱身戲集作劇談憐野逸嗜酒見天真醉舞梁園夜行歌泗水春才髙心不展道屈善無鄰處士禰衡俊諸生原憲貧稻粱求未足薏苡謗何頻五嶺炎蒸地三危放逐臣幾年遭鵩鳥獨泣一作立向麒麟蘇武先還漢黃公豈事秦楚筵辭醴日梁獄上書辰已用當時法誰將此義陳老吟秋月下病起暮江濵莫怪恩波隔乘槎與問津贈比部蕭郎中十兄甫從姑子前人有美生人傑由來積德門漢朝丞相系梁日帝王孫藴藉為郎久魁梧秉哲尊詞華傾後輩風雅藹孤騫宅相榮姻戚兒童惠討論見知真自幼謀拙愧諸昆漂蕩雲天濶沉埋日月奔致君時已晚懷古意空存中散山陽煆愚公野客集作谷村寧紆長者轍歸老任乾坤同元使君舂陵行并序前人覽道州元使君結舂陵行兼賊退後示官吏作二首志之曰當天子分憂之地效漢官良吏之目今盜賊未息知民疾苦得結輩十數公落落然參錯天下為邦伯萬姓吐氣天下少一作小安可待已一作矣不意復見比興體制微婉頓挫之詞感而有詩增諸卷軸簡知我者不必寄元遭亂髮盡白轉衰病相縈一作嬰沉聫集作綿盜賊際狼狽江漢行歎時藥力薄為客羸瘵成吾人詩家秀博采世上名粲粲元道州前聖畏後生觀乎舂陵作歘見俊哲情復見集作覽賊退篇結也實國楨賈誼昔流慟匡衡常引經道州哀一作憂黎庶詞氣浩縱橫兩章對秋月一作流水一字偕華星致君唐虞際淳朴憶大庭何時降璽書用汝集作爾為丹青獄訟永衰息豈唯偃甲兵悽惻念誅求薄斂近休明乃知正人意不苟飛長纓凉飈振南嶽之子寵若驚色阻金印大興含滄浪清我多長卿病日久思朝廷肺枯渴太甚漂泊公孫城呼兒具紙筆隱几臨軒楹作詩呻吟內墨淡字欹傾感彼危苦詞庶幾知者聽寄薛三丈郎中據前人人生無賢愚飄飄集作飄颻若埃塵自非得神仙誰免危其身與子俱白頭沒沒集作役役常苦辛雖為尚書郎不及村野人憶昔村野人其樂難具陳藹藹桑麻交公侯為等倫天未厭戎馬我輩本常貧子尚客荆州我亦滯江濵峽中一卧病瘧癘經冬春春復加肺氣一作復加肺氣疾此疾集作病蓋有因早嵗與蘇鄭痛飲情相親二公化為土嗜酒不失真余今委修短豈得恨命迍聞子心甚壯所過信席珍上馬不用扶忽集作每扶必怒嗔賦詩賔客間揮灑動八垠乃知蓋代手才力老益神青草洞庭湖東浮滄海漘君山可避暑况足采白蘋子豈無扁舟往復江漢津我未下瞿唐空念禹功勤聽說松門峽吐藥攬衣巾髙秋却束帶鼓柂集作枻視清旻鳯池日澄碧濟濟多士新余病不能起健者勿逡巡上有明哲君下有行化臣贈虞十五司馬前人逺師虞祕監今喜識𤣥孫形象丹青逼家聲器宇存凄凉憐筆勢浩蕩問詞源爽氣金天豁清談玉露繁佇鳴南嶽鳳欲化北溟鯤文集作交態知浮俗儒流不異門過逢聫客位日夜倒芳樽沙岸風吹葉雲江月上軒百年嗟已半四座敢辭喧書籍終相與青山隔故園戲簡鄭廣文前人廣文到官舍繫馬堂階下醉即集作則騎馬歸頗遭官長罵才名三十年坐客寒無氊近集作賴有蘇司業時時與酒錢奉贈李八丈判官曛前人我丈時英特宗枝神堯後珊瑚市則無騄驥人得有早年見標格秀氣衝一作通星斗事業富清機官曹正獨守頃來樹佳政皆已傳衆口艱難體貴安冗長吾敢取區區猶歷試炯炯更持久討論實解頥操割紛應手篋書積諷諫宫闕限一作浪奔走入幕未展才秉鈞孰為偶所親問淹薄集作泊泛愛惜衰朽垂白慕集作辭南翁委身希比叟真成窮轍鮒或似喪家狗秋枯洞庭石風颯長沙柳髙興激荆衡知音為回首毒熱寄簡崔評事十六弟前人大火一作暑運金氣荆揚不知秋林下有塌翼水中無行舟千室但掃地閉關人事休老夫轉不樂旅次兼百憂蝮蛇暮偃蹇空牀難暗投炎宵惡明燭况乃憶集作懷舊邱開襟仰內弟執熱露白頭束帶負芒刺接居成阻修何當清霜飛㑹子臨江樓載聞大易義諷詠詩家流藴藉異時輩檢身非久集作茍求皇皇使臣體信是德業優楚材擇杞梓大宛集作漢苑歸驊騮短章逹我心理為識者籌贈張相鎬二首時逃難病在宿松山作李白神器難竊㺯天狼窺紫宸六龍遷白日四海暗紅集作胡塵昊穹降元宰君子方經綸淡然養浩氣歘起持天鈞秀骨象山嶽英謀合鬼神佐漢解鴻門興唐思退身擁旄秉金鉞伐鼓乘朱輪虎將如電霆揔戎向東巡諸侯拜馬首猛士騎鯨鱗澤被魚鳥恱令行草木春逢聖集作聖智不失時建功及良辰醜虜安足紀可貽幗與巾倒㵼溟海珠盡為入幕珍馮異獻赤伏鄧生歘來臻至集作庶同昆陽舉再覩漢儀新昔為管將鮑中奔吳隔秦一生欲報主百代期榮親其事竟不就哀哉難重陳卧病古松滋蒼山空四鄰風雲激壯志枯槁驚常倫聞君自天來目張氣益振亞夫得劇孟七集作敵國空無人捫虱對桓公願得論悲辛大塊方憶氣何辭鼓青蘋斯言儻不合歸老漢江濵二家本隴西人代集作先為漢邉將功略天地中集作功略蓋天地名飛青雲上苦戰竟不侯當年頗惆悵世傳崆峒勇氣激金風壯英烈遺厥孫百代神猶王十五觀竒書作賦陵相如龍顔惠殊寵麟閣慿天居晚途未云己蹭蹬遭讒毁想像晉末時崩騰胡塵起衣冠陷鋒鏑戎虜盈朝市石勒窺神州劉聰劫天子撫劒夜吟嘯雄心日千里誓欲斬鯨鯢澄清洛陽水三台集作六合灑霖雨六合集作萬物無凋枯我揮一杯水自笑何區區因人恥成事貴欲决良圗滅虜不言功飄然陟蓬壺唯有安期舄留之滄海隅江夏使君叔席上贈吏部二字集作史郎中前人鳳凰丹禁裏銜出紫泥書昔放三湘去今還萬死餘仙郎久為别客舍問何如涸轍思流水浮雲失舊居多慚華省貴不以逐臣踈復如竹林下而陪芳晏初希君生羽翼一化北溟魚贈郭將軍前人將軍豪蕩有英威昔集作入掌銀臺護紫微平明拂劍朝天去薄暮垂鞭醉酒歸愛子臨風吹玉笛美人嬌月舞羅衣今日相逢俱失路何年灞上弄春輝寄集作贈崔侍御三首前人宛溪霜夜聽猿愁去國長為不繫舟獨憐一鴈飛南海却羡雙溪解北流髙人屢解陳蕃榻過客難登謝朓樓此處别離同落葉朝朝分散敬亭秋二長劒一杯酒男兒方寸心洛陽因劇孟託宿話胸襟但仰山嶽秀不知江海深長安復携手再顧重千金君乃輶軒佐余叨翰墨林髙風摧秀木驚彈落虛禽不取回舟興而來命駕尋扶搖應借便桃李願成隂笑吐張儀舌愁為莊舄吟誰憐明月夜腸斷聽秋砧三黃河三尺鯉本住集作在孟津居㸃額不成龍歸來伴凡魚故人東海客一見借吹噓風濤儻相見集作因更欲凌崑墟何當赤車使再往召相如贈韋侍御黃裳二首前人太華生長松亭亭凌霜雪天與百尺髙豈為微飈折桃李賣搖艷路人行且迷春光拂集作掃地盡碧蘂集作葉成黃泥願君學長松慎勿作桃李受屈不改心然後知君子二見君乘驄馬知上太行集作山道此地果摧輪全身以為寶我如豐年玉棄置秋田草但朂氷壺心無為歎衰老安陸白兆山桃花巖寄劉侍御綰前人雲卧三十年好間復愛仙蓬壺雖𡨕絶鸞鶴心悠然歸來桃花巖得憩雲窗眠對嶺人共語飲潭猿相連時升翠微上邈若羅浮巔兩岑抱東壑一嶂橫西天樹雜日易隱崖傾月難圓芳草换野色飛蘿搖春烟入逺構石室選幽開山田獨此林下意杳無區中緣永辭霜臺客千載方來旋贈潘侍御論錢少陽前人繡衣柱史何昂藏鐵冠白筆橫秋霜三軍論事多引納階前虎士羅干將雖無二十五老者且有一翁錢少陽眉如松雪齊四皓調笑可以安儲皇君能禮此最下士九州拭目瞻清光贈常侍御前人安石在東山無心濟天下一起振橫流功成復瀟灑大賢有舒卷季葉輕風雅匡復屬何人君為知音者傳聞武安將氣振長平瓦燕趙期洗清周秦保宗社登朝若有言為訪南遷賈江行寄崔員外宗之前人飄飄集作飄颻江風起蕭颯海樹秋登艫美清夜挂席移輕舟月隨碧山轉水合青天流杳如星河上但覺雲林幽歸路方浩渺集作浩浩徂川去悠悠徒悲蕙草歇復聽菱歌愁岸曲迷後浦沙明瞰前洲懷君未集作不可見望逺增離憂贈王漢陽前人天落白玉棺王喬辭葉縣一去未千年漢陽復相見猶乘飛鳬舄尚識仙人面鬢髮何青青童顔皎如練吾曽弄海水清淺嗟三變果愜麻姑言時光速流電與君數杯酒可以窮歡宴白雲歸去來何事坐交戰贈崔郎中宗之前人胡鴈拂海翼翺翔鳴素秋驚雲辭沙朔飄薄集作飄蕩又作薄霧迷河洲有如飛蓬人去逐萬里逰登髙望浮雲髣佛如舊邱日從海傍沒水向天邉流長嘯依集作倚孤劍目極心悠悠嵗晏歸去來富貴安所求仲尼七十說歷聘莫見收魯連逃千金圭組豈可酬時嵗集作哉茍不㑹草木為我儔希君同携手長往南山幽贈崔咨議前人騄驥本天馬素非伏櫪駒長嘶起凉集作起清又作向清風倐忽凌九區何言西北至却走東南隅世道有翻覆前程難預圗望君垂集作希君一翦拂猶可騁中衢贈歷陽褚司馬前人北堂千萬夀侍奉有光輝先教集作同稚子舞更著老萊衣因為小兒啼醉倒月下歸人間無此樂此樂世中稀江上寄巴東故人前人漢水波浪逺巫山雲雨飛東風吹客夢西落此中時覺後思白帝佳人與我違瞿唐饒賈客音信莫令稀文苑英華卷二百五十一
