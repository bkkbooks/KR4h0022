body:
  text: 文苑英華卷三百九十七宋李昉等編卿寺二太僕卿授王希雋太僕卿制蘇頲黃門僕臣之任王命斯允在德而舉其名必彰一作正銀青光祿大夫檢校太僕卿上柱國華容縣開國男王希雋門承舊閥器藴通才立言可以敏事為政可以居劇登于副尹聲滿於字人試乃列卿眷踰於數馬巾車是屬建鼓攸司爰賴服勤宜膺邦寵可太僕卿勳封如故主者施行授王斛斯太僕卿制孫逖門下安西大都護王斛斯將略稱多忠誠克著頃自二字一作自頃膺邊寄頗洽人心間歲以來頻有騷警能清寇虐不頓甲兵契軍國之逺圖得攻拒之良術有勞懋賞自昔如兹宜踐列卿之位俾兼辨護之職可太僕卿員外置同正員兼安西都護等如故授王昱太僕卿制門下列彼九卿正于羣僕允膺兹命必藉兼才正議大夫守太原尹北都留守使持節河東道諸軍節度營田副大使知節度事兼採訪處置使攝御史中丞上護軍賜紫金魚袋王昱韜是明斷資其理識成務有餘奉公不撓自持軍律兼委使車能啓刑書以懲貪吏到官未幾除惡已多類能則然賞善宜及俾升榮於左馭仍受任於北京可守太僕卿兼太原尹餘如故授李林宗太僕卿制門下中大夫守太常少卿上柱國李林宗行能溫厚器識該深清白奉公嘗聞吏術恭謙應物更表身謨自亞河海亟移星歲友于之愛實掌樞衡致美之心俱懷退讓逺嫌滋久舉滯當遷宜正位於名卿俾欽承於密命可太僕卿散官勳如故授竇鍔太僕卿等制門下申以婚姻必求於才地制於祿位兼取於親賢竇鍔等克嗣髙門能修善道有溫恭之言行兼美秀之形神勳華之緒既連於舊戚選尚之恩更諧於新禮俾升榮秩乃錫寵章可依前件授敬令琬太僕卿制賈至勑前左金吾衛大將軍員外置同正員敬令琬陳力戎事忠勇有謨入九軍之副獻七戰之獲嘉其誠節録乃茂功俾列卿士是司馬政可太僕卿員外置同正員充朔方經略副使授許誡言檢校太僕卿制勑金吾大將軍許誡言心和志堅訥言敏行被服禮義嗣圭組之資策名委質誠文武之任課績斯著公勤無斁警其晝夜顧乃執金之勞象其河海寵以列棘之位可檢校太僕卿授劉士涇太僕卿制元稹勑卿寺甚重不易其人或以勳以親以報以勸又何愛焉銀青光祿大夫前檢校大理少卿駙馬都尉劉士涇去歲西戎跳入涇上京師戒嚴朕慨然有思廉頗李牧之志而習事者言爾父司空之在涇也築平涼等八城二堡塹保定平原使涇人益樹麥禾以復后稷公劉之教十有六年犬戎不敢東顧朕聞其人思見其後果有令子在吾懿親與之討論亦自集作自亦奇士鋪陳將略殊有父風訪其班資則集作且曰亞諸卿之間嘗十年矣今乃除其憂服命以太僕豈唯報爾先臣榮吾戚里亦欲使緣邊諸將顧其愛子為我竭誠可守太僕卿駙馬都尉散官勳如故授鴻臚少卿賜紫賈渭太僕卿前太常丞吳方太原少尹制錢珝勑具官賈渭等渭比以學文通經之勤而不得志於壯歲束帶入仕今至九卿紱冕既崇光隂云晚詔之就列以慰其心方吏術甚長免官仍久暮齒已踰於月制下僚尚歎於陸沉置之不遷君道何在往作亞尹錫之金章亦有以嘉於老者矣可依前件授太僕卿制薛廷圭勑具官某書曰昔周穆王命伯冏為太僕正曰昔在文武聰明齊聖侍御僕從罔匪正人以承弼厥辟且曰僕臣正厥后克正僕臣諛厥后自聖太僕之為官也重矣朕每讀書允擇其可矧惟前代畢用名臣數馬執綏故實具在為豫禦侮作我前驅審官擇人今以命汝稽諸訓誥得不勉之可守太僕卿大理卿授蔡法度廷尉制沈約門下民命所懸繫乎三尺一作尺一止殺除殘一作害實由乎此是以臯陶作士五刑惟明于張蒞官世無寃獄且漢代律書出乎小杜吳雄以三世法家係為理職郭躬以律學通明仍業司士爰及晉氏此風未泯叔則元凱並各名家自兹厥後斯尚漸薄迄至于今損棄頓盡衣冠士子恥復用心州郡姦吏恣其取捨舞文弄法非止一塗朕膺天受命為兆民主每一念此忘寢與食尚書刪定左曹郎中蔡法度少好律書明曉法令世之所廢篤志不怠至於章句踳滯名程乖礙莫不斟酌厥𠂻允得其門方欲寄以國刑開示後學文一作拔才取士豈有定方自世道澆流浮偽雲起量計多少辨校錐刀若遵往從舊守而勿失豈所以軌儀上世垂風于後宜加褒擢弗繫常階可守廷尉卿主者施行授陸餘慶大理卿制蘇頲黃門法者天下所共廷尉天下之平選衆甄才惟明克允宗正卿上柱國廣平郡開國公荆一作判尚書左丞陸餘慶早回翔於近密久踐歷於中外雍容文雅自然素徴清商蕭散風華莫不瑶林瓊樹必當和而不撓貞則有恆正罰金於後人戒刻木於前吏念兹欽恤深可哀矜宜修白雲之典俾靜黃沙之職可大理卿勳封如故主者施行授李成式大理卿薛景仙少府監制賈至門下守廣陵長史李成式貞白儉約履歷清貫前鳯翔太守薛景仙忠義慷慨憤激危時靖鎮藩條咸有成績遞遷中外宜登卿士成式可試大理卿景仙可少府監鴻臚卿授張暐鴻臚卿制蘇頲黃門賔客旅庭戎夷在邸眷言任職必佇其才銀青光祿大夫詹事兼尚書右丞上柱國鄧國公張暐雅量溫恭志誠忠信懷直方而不蔽務寬大而不雜委之軍旅則嘗服威名升之國朝則咸宜令典非契因潛躍義篤始終可辦鴻臚之儀惣象胥之事爰加寵拜允符成奬可鴻臚卿勳封如故主者施行授武三思鴻臚卿制孫逖門下典于屬國列彼正卿班秩既崇寵光斯在金紫光祿大夫行國子監祭酒武三思延恩戚里效職公朝能勵公勤以修名檢頃在膠序頗淹星歲度材而用舉類而遷宜增三揖之榮俾正九賔之禮可行鴻臚卿散官如故授杜希望鴻臚卿制門下賞以懋功官無虗授所貴天秩斯為國典朝議郎守太僕少卿員外置同正員使持節都督鄯州諸軍事兼鄯州刺史隴右節度副使仍知經略度支營田等留後事賜紫金魚袋杜希望器能開敏才略雄一作𢎞深識韜鈐之大綱知戰守之良術頃令討罪爰委行師不憚艱危常先士卒恩威必備權變多方狂寇已清堅城又克疇庸是屬舉善攸歸俾膺超等之榮仍列上卿之位可通議大夫守鴻臚卿員外置同正員攝御史中丞餘如故授李光進鴻臚卿制賈至勑左驍衛將軍李光進行已莊肅臨戎果斷有卞莊之勇懷孟明之材屢獻奇功益聞幹略克副難兄之業能摧強寇之鋒允武允文宜加美秩一作卿士光進可鴻臚卿同正授蔣渙鴻臚卿制常衮門下古之上卿次公一等至于西漢每與列侯參決朝議今之秩望亦謂之崇朕方修文德以撫區外則重譯象胥之事九儀相贊之職正用髦碩俾之典領銀青光祿大夫檢校刑部尚書知省事上柱國汝南縣開國公蔣渙顔子之德行張仲之孝友能積其厚以叢于身恭儉之訓可以軌俗學通文變髙視一時非得喪之可干亦剛柔之相濟服在通列且踰二紀精於憲章舉有倫要東雍居部近郊移風以禮除暴人安其業俾京師之河潤守一作首經術之循吏司秋會府訓夏議刑以之弼教能用中典時屬四夷之敘參授大賔之任韓暨以宿德而拜陳紀以至行而遷求舊任賢正當此選待遇諸國宜約故事使有準以明等威也可檢校刑部尚書兼鴻臚卿散官勳封如故主者施行司農卿授鄭賁司農卿制門下國有大農實司金穀兹惟古官之重難於正卿之拜朝散大夫試祕書監兼侍御史上柱國賜紫金魚袋鄭賁通敏良才沉詳雅識明斷臨事貞修奉公所更秩序必著聲績早參幕畫在樽爼而止戈自董軍儲有京坻之足食適時多可選衆攸歸爰籍變通主其出納務殷任切倚辨當仁宜膺理粟之命佇繼康成之美可守司農卿散官勳賜如故授裴武司農卿制元稹勑一有司字農天下之大本也故國有九列而司農氏居其一焉前代非牟融之修理康成之儒學不在兹選今海內無事思與公卿等樹立根柢以制四方於是集作是用外選方伯之善於其職者入補兹任謂之恩榮前荆南節度觀察處置等使中散大夫守江陵尹兼御史大夫上柱國賜紫金魚袋裴武豫聞其先始以孝友書於國籍其後果集作纍有丞相為唐名臣賢彥因仍代濟不絶武亦嗣其忠孝益熾家聲鬱為元僚所至稱理嘗居內史屢入正卿自華至荆無非劇地鍵轄豪右衣食焭婺嚴而不殘仁而有制鎮定南服豫方賴之而亟請來朝因求內任嘉其戀我難奪乃誠假以秩宗之榮用制國泉之重費而不屈爾其勉之可檢校禮部尚書兼司農卿餘如故授司農卿制薛廷圭勑具官某書曰昔我先公五世后稷以服虞夏夏之衰也棄稷不務先公不窟用失其官至于武王昭前人之光明事神保人莫不欣喜訓誥具在朕安敢失墜而叔世偷薄乃不知稼穡之艱率以三署為華輕其東用寖以成俗嘻鄭玄漢之名儒也韓信漢之上將也尚聞徴拜或至就加一作家來奉疇庸得不寅畏敬受羲和之職往修后稷之官豐阜有聞陟勸斯在可太府卿授豆盧欽望太府卿制李嶠鸞臺宗卿之任選衆尤切銀青光祿大夫檢校司禮卿上柱國芮國公豆盧欽望體業貞簡幹能詳備歷官中外具聞政績象河惟月太府國泉繁要所鍾委任斯在宜加榮一作寵擢允兹公議可太府卿勳封如故主者施行授李從逺太府卿制蘇頲門下膺河寺之秩寵選方髙致泉府之殷惟才是屬銀青光祿大夫行黃門侍郎上柱國常山縣開國男李從逺清密任道直方為量學仞山髙詞場雲鬱闕里之室動不違仁潁川之門居而會理比登要近備效忠益宜回夕拜式踐冬卿可守太府卿勳封如故主者施行授吕崇賁太府卿制常衮門下九卿之重參理於佐邦六府孔修頒貨於列藏歷代右職莫非髙選開府儀同三司行太子賔客上柱國公吕崇賁忠謹良實居簡向方能用晦於精辨亦體微於剛貞一作直峻節孤立清心確然以長才之有餘應羣務而多適擁旄一作旌乘塞周歷大藩薄於戰功經以事典用明既富之教必厚豐財之德自頃艱阻有司曠廢府寺寂寥卿府虛設寖成其弊朕甚懼焉今再舉舊章各歸其局出納之地眷求惟精兼領三尚之煩以榮四至之列可行太府卿散官勳如故授裴武太府卿制白居易勑聚九州之賦辨百貨之名按其度程謹其出納孰為主者外府上卿務殷秩崇不易其選具官裴武有通敏之識有倚辦之才以兹器用早膺任使小大之務罔不勵精纍有勤績存乎官次而受藏之府國用所資若非使能何以集事俾升顯列仍委劇務爾宜率其官屬欽乃職司會帑藏出入之要修權量平校之法以遵成式無使改易謹而守之斯為稱職可文苑英華卷三百九十七
