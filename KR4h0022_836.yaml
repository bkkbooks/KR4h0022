body:
  text: 文苑英華卷八百三十七宋李昉等編后妃哀冊文上此下二卷英華所編不依年代先後今正之太穆皇后哀冊文一首文德皇后哀冊文一首則天皇后哀冊文一首和恩皇后哀冊文一首昭成皇太后哀冊文一首哀皇后哀冊文一首貞順皇后哀冊文一首太穆皇后哀冊文李百藥維貞觀九年嵗次癸未冬十月辛丑朔二日庚寅太穆皇后梓宫啓自夀安陵將祔于獻陵其日至尊親奉奠于太安宫乃使兼太尉某設祖于行宫禮也龍攢夙啓翟輅朝陳方祗靖德圓魄虛神哀子嗣皇帝諱攀弓劔而長號想禕䄖之弗御痛異宫之隔禮切分心於窮慮二南風化萬古徽音式昭史冊如玉如金其詞曰𤣥功肹響景福氤氲將開樞電且應黃雲曰惟基命于昭德性配天不失復夏無競門德丕承華宗遞興皇家漢氏祥發慶膺𡨕符世胄並㑹休徴帝妃北渚聖母東陵祕景隂陵含章嬪則柔順𢎞範幽間育德率禮無違尊師罔忒言昭圖史聲芳邦國帝録將啓天妹言歸塗山表貺渭汭增暉外求方淑內鍳幾微蘋蘩夕牖絲枲中闈琴瑟匪諧氷霜慙潔道叶離明貞符兊悅潜德勿用內教爰詔令作奚設世罕交泰時虧地節膺期集祉含和履正華渚降祥髙襟誕聖潜著軒象朱彰靈命奄御雲衣俄飛天鏡嗚呼哀哉受終撫運馭極乘乾物思厚德政闕承天瑶樽委奠金屋虛筵嗟故劔之無託歎房樂之徒懸嗚呼哀哉宸駕上仙玉几垂裕率土遏密同軌畢赴背櫟陽之神宇指原陵之封樹悼虞妃之不從遵周典而遷祔嗚呼哀哉蒼茫昭世𡨕漠神心松庭幽寂隧路凝深儼龍輼而未進切鳳吹之哀吟水㴞㴞而不息日黯黯而將沉百神驚而𤣥兆詔令作宫邃萬國動而寒山隂晦重雲於畢陌結微霜於穀林嗚呼哀哉極寰宇之儀訓播英聲於先後惟皇運之天長配靈昆而地久流凱風於椒掖散白露於陵阜軼任姒之髙縱疑作蹤邁嵩華而不朽嗚呼哀哉文德皇后哀冊文虞世南維貞觀十年嵗次甲申六月已未朔二十一日乙卯大行皇后崩于立政殿粵九月十一日丁酉將遷座於文粹詔令作于昭陵禮也殯宫夕啓靈轜曉前儼帷㡩於空殿肅陛衛於靈筵皇帝親臨霄載義深追逺瞻青蒲而永絶悼玉階之莫反蜃輅將引鳯樽已徹爰詔記言式揚徽烈其詞曰二儀合德兩曜齊光列聖觀象邦家克昌猗歟華族英靈降祉比齊越姜匹宋踰子育德髙門騰芬素里體仁將聖披圖閲史造舟為梁嗣徽前德履和思順自家刑國淑問不已柔風允塞紃組執勤璁珩垂則時逢昌聖運屬休徴代邸膺厯唐侯嗣興紫宫並曜黃道階升化宣風始業贊丕承比德無競凝神不測應物逹二本作通理撫機先識體備簡文粹作賢能暉無朓側績苞九亂恩加八極性道希夷言容莊敬戒奢處約懷冲履正景暖風暄霜嚴氷净領略三古針規六行源濬流逺時昌祚延國貞誕睿皇支挺賢談髙辨日學冠通𤣥慈訓所及懿德光前五福云備千齡方永地紀絶維月輪韜景晨興弗豫德音彌整馬鬛無封鶴珠斯屏嗚呼哀哉異人神於倐忽變容服於平生改清蹕以哀梚易朱旗以素旌昔照朝景響環珮於增城今𡨕永夜吟松柏於山楹嗚呼哀哉氣變灰飛暑退寒襲煙觸樹而凝慘露分枝而泫文粹作垂泣聞哀鴈之夕飛聽悲風之曉急仰雲霄而永慕慟陵寢其何及嗚呼哀哉悲𤣥武而北轅絶牽牛而橫度途去去而逾逺馬駸駸而不駐想渭水之貫都歎黃山而隱霧嗚呼哀哉嗟人生之浮促若飄風之過牖牖何風而暫停人何生而能久惟承天與載物邈慈深而德厚邁任姒之髙蹤播英聲而無朽嗚呼哀哉則天大聖皇后哀冊文崔融維神龍元年嵗次乙已十二月已已朔二十六日甲午文粹作十一月二十日唐㑹要作十二月二十六日大詔令作十一月已已朔二十六日甲午新舊唐書并通鑑並十一月壬寅按通鑑目録十一月丁丑朔壬寅即二十六日大行則天大聖皇后崩于洛陽宫之觀象文粹作仙居殿旋殯于集仙殿之西階粵二年嵗次丙午闕月朔日將遷祔于乾陵禮也祖庭火燼攢宫月曉雲戴黼翣風牽絳旐儼天衛之蒼蒼邈神遊詔令作宸儀文粹作神義之窅窅哀子嗣皇帝諱慕切充窮誠殷遣奠瞻象服其如在攀龍車而不見閟慈範於長陵戢神暉於前殿示人軌訓先詔令作前王典則爰命史臣揚言聖德其詞曰天生后稷飛鳥覆翼天護武王躍魚隕航施于成康武子有光豐沛之疆河汾之陽異氣發祥聖后其昌穆穆皇皇作合于唐至哉坤德沉潜剛克竒相月􅟠惠心淵唐諱二本作泉塞蘋藻必恭二本作惟勤紘綖是則訓自閨閫風行邦國九二本作七廟肅祗六宫允釐中和外睦遐邇清夷家道以正王化之基皇曰內文粹作納輔后其謀咨謀咨伊始文粹作攸俟皇用嘉止亦既顧命聿懷代已聖后謙冲辭不獲已從宜稱制於斯為美仗義當責忘軀濟厄神器權臨大運匪革宗祧永固寰區奄宅負扆肅詔令作淑清垂旒光赫洸洸文粹作洗洗非我君四海無氛英才逺略鴻業大勳雷霆其武日月其文灑以甘露覆之慶雲制禮作樂還淳返朴宗祀明堂崇儒太學四海文粹作夷慕化九夷文粹作戎禀朔沉璧大河泥金中嶽巍乎成功靡文粹作翕然向風乃復明辟深惟至公歸間於太庭之館受養於長樂之宫品彚胥恱謳歌載隆鼎祚既穆璇文粹作珽非樞已肅庶保太和長介景福如何靡怙而降斯酷后㺯孫其未淹文粹作掩人喪妣其焉速嗣皇劈摽文粹作踊列辟扶服九族文粹作親號咷萬姓荼毒嗚呼哀哉積憂勞而弗悆文粹作不豫兮搆氛沴而成災逢氷霜詔令作霰之慘烈兮見草木之凋摧感大漸之將逝文粹作至兮遺惠言而不回付聖子其得所兮顧黎元曰念哉頒寵錫以留訣兮莭禮數以文粹作而送哀邈終天而一往文粹作去兮復何時而下來嗚呼哀哉光隂荏苒兮氣序回互泣盡冬霜兮悲生春露攢塗云啓兮同軌畢赴湘川未文粹作不從兮漢瑩蓋祔古則禮文粹作祀非闕今也儀具嗚呼哀哉夜漏盡兮晨挽發轉湘風兮搖畫月厭河洛兮不臨去嵩邙兮飄忽指咸陽之陵二本作園寢歷長安之宫闕旋六馬兮須斯考三龜兮中歇嗚呼哀哉出國門兮林邱文粹作夷曲覽舊迹兮新憂具文粹作備物森兮如在詔令作無改良辰闕兮莫留當赫曦之盛夏宛蕭瑟之窮秋山隱隱兮崩裂水回回兮逆流嗚呼哀哉掛旌旐於松煙即宫闈於夜泉下幽翳兮無日上穹隆兮蓋天隧路嚴兮百靈拱殿垣虛兮萬國旋如有望而不至怨西陵之茫然嗚呼哀哉軼二本作攝帝皇之髙風兮稽母后文粹作欽文母之餘懿時來存乎文粹作兮立極詔令有兮字數往歸乎二本作兮配地何通變之有恆兮而始終之無愧惟正辭文粹作聖慈之可法詔令有兮字播徽音詔令作休聲於後嗣嗚呼哀哉和恩皇后哀冊文蘇頲維景雲元年嵗次庚戌十月戊寅朔二十日丁酉和恩皇后魂歸于仙靈宫之寢殿粵十一月戊申朔二日已酉招祔于定陵禮也皇帝翼翼而承洪緒親親而居寶位痛終鮮於棣華哀不從於行淚祔自姬冊招因漢圖神既來兮雲之際神將往兮山之隅象物中嚴容車外設間一作聞竒香兮藹如在委微燼兮空若滅當四海之遏音延六宫而告訣有司忝直清之寄奉㫖宜方大之烈其詞曰乾道元亨川維永貞德由覆合功佇載成帝典攸正人倫則厚以光虞嬪思媚京婦貴胄昌演華宗慶膺書藏乃命符得而興展我之媛惟皇之出主家選容師氏練吉觴賀紫掖軿歸朱邸儉而中規榮必循禮闕覯止婉兮孌兮陳詩佩玉執事裁桂姜后通言衛臣知行是修密靜能服莊敬芬若蘭吐華若李穠光搖采翟歘同飛龍房樂懸而莫御國風詠而猶廣豈娥靈之有慿而羽化之無像嗚呼哀哉至業隆於祀夏尊名冠於升唐披麗人之金屋見仙鳥之瑶筐才窈窕兮時已逝事蹉跎兮夜不𤾉潜太虛以滅景長自依乎清光萬邦攀於晏駕七月㑹於同軌往寓集青之臺今招灑丹之水上仙厭俗以求故內則在隂而追美無不之兮有來長作合於神理對嬌山之墜舄垂渭溪之造舟群動觀而雨灑疑作泗柔明進而燭幽嗚呼哀哉聽鳴雞以徒奏悲服馬以空發簫鼓還兮遺朔風松楸翳兮吐微月歸杏陵其永閟絶柘館而靡尋資謂德之良史啚配和之徽音嗚呼哀哉昭成皇太后哀冊文劉子𤣥維開元四年嵗次景辰秋八月詔令作七非甲辰朔十七日庚申昭成皇太后梓宫啓自靖陵將遷祔于橋陵皇帝乃使某官姓名設祖于行宫禮也丹旐既舒𤣥宫載闢俶龍輼而命駕指鮒隅而卜宅哀子嗣皇帝諱瞻蓼莪而罔極感芣苡而增傷嗟鏡奩之不御痛珠匣之無光緬考前烈闕稽舊史顧西唐詔令作南陵以永懷託東觀而書美其詞曰觀津鍾祉平陵誕靈作嬪西漢為母東京地專戚里門承后族重覩玉衣再開金屋爰初笄總實負詔令作表才賢學殫詩禮工極紘綖方松等徑比菊齊妍慶膺懷月祥兆捫天膠東胙土濟南開國邦媛思才河魴佇德柔閒植性婉順成則六行畢彰四訓無忒粵自朱邸來升紫微政成閫闥化穆閨闈孕育三母牢籠二妃桃天闡譽葛藟增徽五福多爽百齡過隙地裂方祗天傾圓魄歸神蒿里滅彩椒掖德音若存儀形遽隔嗚呼哀哉痛鍾宸扆禮極哀榮諡踰光烈儀比功成尋周闕之先夢奉堯門之舊名撫遺鏡而增咽攬賜衣而疚情嗚呼哀哉龜兆協謀龍輴戒轍指黃山以徐轉背青門而永訣挽鐸鏘其競喧旒旐儼其齊列萬國慘而潜怛詔令作潜泫六宫悲而慟絶嗚呼哀哉隧入松徑園歸榖林見寒山之月苦聞拱樹之風吟玉座空兮夀宫寂金釭閉兮泉户深想清徽之不昧寄彤管以流音嗚呼哀哉哀皇后哀冊文髙宗太子𢎞追封孝敬皇帝之妃宋溫璩維開元六年嵗次戊午夏五月甲午朔三日景申哀皇后裴氏梓宫啓自先殯將遷祔于恭陵之山塋禮也皇上御寰區而翼翼纂洪緒而親親感上仙於周嗣一作副痛未從於虞嬪攀鶴駕於終古贈鷖輅而增新時無逺而惟吉物有容而必陳纂芳佇思徴幽寄神載揚清懿之烈爰屬有司之臣其詞曰月麗雲升靈叶爽馮􅘌鄉茂族晉邑丕承土厚河廣祥發慶膺公侯必復紱冕攸興艮精兊象室疑作宜家化國昌胄延和榮門誕德淑問不已柔風允塞素里揚英清閨仰則一人元良萬邦大本天作之合興能烈壼家本楙於漢封地先歸於一作于晉衮主饋旌善駕酒騰歡承暉養德奉景訪安搖金羽之頻頻結環珮之珊珊賁日月之光色妙靈象而無端含章握文敬微慎獨崇法服於翬組接懿筐於蠶簇覲皇英而上親祗宵燭而下睦庶無違於信順期有慿於福靈忽虧光於輪月奄落彩於前星爽仁夀於偕老遘天禍而斯丁瞻神宇之惟漠感靈衣之靡形驚回風於靈一作虛殿宿衆鳥於空庭顧長御以揮一作涕甘自殉於山扄制歷時而遽終情徇莭一作循而恆苦草驕春而繞砌蟲吟秋而入户限百刻之不延調一作周六脉其誰顧一作補嗚呼哀哉殂謝緬其永久氣莭漫一作浸以流換感窀穸之冥漠一作幽偏軫皇情以凄歎稽舊章之典禮崇新命之綸渙濟天地而德合綜神靈而道貫嗚呼哀哉日吉兮晨良玉佩兮金章命騏校以進駕翊龍輈而上驤代靈靴於河鼓建參旗於太常號宫女之嗷嗷一作噭噭遣使臣之皇皇騰魚軒兮背北渚亂鳳管兮越南岡當赫曦之畏日如徙靡之秋光望層城而不返遵厚夜而何長嗚呼哀哉一疊此四字神理惟昧萬物同宅人生有終駟馬過隙訊虞妃於千一作前古聞賔帝於在昔感伊洛於一作之山川懷靈仙之顯一作影迹彼宵形兮天壤云誰固兮金石惟彤管之芳輝與青史而無斁嗚呼哀哉真順皇后哀冊文徐安貞維開元二十五年嵗次丁丑十二月庚子朔七日丙午惠妃武氏薨于興慶宫之前院移殯春宫麗正殿之西階粵翌日乃命有司持莭冊諡曰真順皇后以旌德飾終也洎明年春二月己亥朔二十二日庚申將遷座于敬陵禮也啓攢塗於春禁候重門於初旭轉靈衛於金根緬哀懷於上國亦既有命銘于貞玉其詞曰風之始者闕備內職選才淑政兼翊戴化錫丕祉繁華鍾美我天后之從孫周桓王之季子于渭之涘重開戚里鵷鸞飛翔珮玉鏘鏘自莘野一作捷妤而三命乃率先於鴈行出言有章彤管有光孝慈之心諒自天啓鞠育孫幼恩流愷悌七子既均六宫有禮貴主三分於外館賢王兩闢於朱邸彼隂教惟微承日月之光輝輔聖人之至德故動用而無違驪谷湯泉天行慕律屬車之汭陪遊之日孰謂蕩邪兹焉遇疾闕焚香山以邀元吉却届重城彌晉永畢思勿藥之有喜痛還年之無術嗚呼哀哉覽舊館兮洞開踐芳塵兮徘徊指井泉之畫像謂德音之在哉自昔層唐詔令作增城之宫椒風之殿獲遇明詔令作時主是矜邦媛有平生之渥恩無淪沒之餘眷况真順之寵錫伊往古之莫見卜兆詔令作地考常三龜既良園陵蒼蒼在國之陽傍芙蓉而左轉怨桃李之春芳風卷旌斾繁笳委咽中使護道懿見辭訣山藏玉衣地留金穴惟清灞之永矣流國風而不竭嗚呼哀哉文苑英華卷八百三十七
