body:
  text: 文苑英華卷四百七十五宋李昉等編䇿問二十二道䇿進士問五道明經諸經策問七道道舉䇿問三道𢎞文崇文生䇿問二道禮部䇿問進士五道䇿進士問五道權德輿第一問問六經之後百氏塞路微言大義寢以乖絶使昧者耗日力以滅天理去夷道而趨曲學利誘於內名賢策問作知誘於外不能自還漢庭用經術以升集作都貴位傳古義以決疑獄誠為理之本也今有司或欲舉建中制書置五經慱士條定員品列於國庠諸生討論嵗課能否然後刪非聖之書使舊章不亂則經有師道學者一作皆顓門以為如何當有其説至於九流百一作六家論著利病有可以輔經術而施教化者皆為别白書之第二問問易曰君子夕惕若厲語曰君子坦蕩蕩禮之言絅衣則曰惡其文之著也儒行則曰多文以為富或全歸以為孝或殺身以成仁或玉色以山立或毁方以瓦合皆若相戾未能盡通顔回三月不違仁孟軻四十不動心何者為優桞下惠三黜而不去子文三已而無愠何者為愈召忽死子糾管仲相小白棠君赴楚召子胥為吳行人何者為是析疑體要思有所聞第三問問周制什一是稱中正秦開阡陌以業農戰今國家參酌古道惠綏元元均節財征與之休息豐年則平糴於轂下恆制則轉漕於關東尚慮地有遺利人有遺力生之者少靡之者多粟帛寖輕而緍錢益重或去衣食之本以趣末作自非翔貴之急則有甚賤之傷欲使操竒贏者無所牟利務農桑者沛然自足以均貨力以制盈虛多才洽聞當究其術至若管仲通幣之輕重李悝視嵗之上下有可以行於今者因亦陳之美利嘉言無辭悉數第四問問懲忿室欲易象之明義使驕且吝先師之深誡至若洙泗之門人故人謂原讓漸漬於道德固已深矣而仲由愠見原壤夷俟其為忿與驕不亦甚與商不假蓋賜能貨殖從我之徒而各吝缺如是皆所未逹試為辨之第五問問育材造士為國之本修辭待問賢者能之豈促速於儷偶牽制於聲病之為耶但程試司存則有拘限音韻頗叶者或不聞於軼響圭璋特逹者亦有纍於微瑕欲使楚無獻玉之泣齊無吹竽之濫取捨之際未知其方子曰盍各言爾志趙孟亦請七子皆賦以觀鄭志古人有述祖德敘家風之作衆君子藏器而含章者久積善集作厚而流慶者逺各言心術兼敘代德鄙夫虛佇以廣未聞明經諸經䇿問七道春秋第一問五經𢎞文生同問孔聖屬詞丘明同耻裁成義類比事繫年居體元之前已有先傳在獲麟之後尚列餘經豈脫簡之難徴復絶筆之云誤子産遺愛也而賂伯石叔向遺直也而戮叔魚吳季札附子臧而吳衰宋宣公捨與夷而宋亂陳為鵝鸛戰豈捷於魚麗詛以犬雞信寧優於牛耳子集有之字所習也為豫言之禮記第二問五經𢎞文生同問三代之弊或朴或薄六經之失或愚或誣夫以殷周之理道詩書之述作施於風俗豈皆有所未至耶輟祭納書誠為追逺執戈桃茢無乃傷恩何二者之相反耶兩楹坐奠歎有切於宗豫九齡魂交數能移於與爾何二者之不一耶山節藻棁豚肩狐裘皆大夫也又何相逺耶檀弓袒免子遊衰麻何如直諒而忠告之耶各以經對周易三問五經道舉同問四營成卦三古遺文本自河圖演於羑里而西鄰禴祭斯乃自多箕子利貞且居身後豈理有未究復古失其傳乾彖辭乃次六爻之末坎加習字有異八純之體無妄則象稱物與同人則彖引卦名或備四德而才至悔亡或無一德而自居貞吉訪於承學思以稽疑至若康成之陰陽象數輔嗣之人事名理異同優劣亦為明徴尚書第四問五經同問左史記言古之大訓何首載堯典而乃稱虞書當文思之代而九官未命及納麓之時而四凶方去豈允恭克讓待玄德而盡善耶仲虺作誥伊尹作訓豈臣下忠規之稱耶伯禽費誓穆公秦誓豈帝王軌範之書耶好風好雨既從於箕畢時若恆若復係於休咎何所適從耶伏生傳於耄耋魯璧得於殘缺前代講訓孰為名家可以詳言用窺奧學毛詩第五問丑經同問二南之化六義之宗以類聲歌以觀風俗列國斯衆何限於十四陳詩固多豈止於三百頌編魯頌奚異於商周風有王風何殊於鄘衛頗疑倒置未逹指歸至若以句命篇義例非一瓜瓞取綿綿之狀草蟲棄喓喓之聲斯類則多不能具舉既傳師學一為起豫企聞博依之喻當縱解頥之辨穀梁第六問五經同問魯史成文以一字為褒貶漢庭尚學有二傳之異同雖子夏援經孫卿肄業而去聖寢逺傳疑儻多閠以定時何非乎告朔雩乃閔雨奚憂於去讓文有無天之説定有無王之年例或難通理亦未盡衛輒辭以尊祖於義安乎許止闕於嘗藥受誣乃甚以兹凝滯皆藉發明穀梁子之言固當有據應上公於古復是何神諸儒待問一為覼縷論語第七問問孔門逹者列在四科顔子不幸伯牛惡疾命之所賦誠不可同至若攻冉求以鳴鼓比宰我於朽木言語政事何補於斯七年可以即戎百年可以去殺固弛張之有異曷遲速之相懸為仁由已無信不立拜陽貨則時其亡也辭孺悲則歌使聞之聖人之心固當有為鄙則未逹子其辨歟道舉䇿問三道第一問問莊生曰吾聞庖丁之言得養生焉蓋以其遊刃無全善刀一作刃而藏之故也禦冦則曰養生如何肆之而已莊生曰嗜欲深者天機淺禦冦則以朝穆善理內而性交逸何二論背馳之甚耶夫一氣之暫聚為物之逆旅誠不當傷性沽名以耗純白儻昧者未通矯抗之説因遂耳目之勝甘心置一作宜力則如之何既學於斯佇有精辨第二問問駢拇之言曰有虞氏招仁義以撓天下天下莫不奔命於仁義以易其性庸詎知不有性於仁義而不可易者乎以伯夷死名於首陽之下庸詎知伯夷非安於死而不可生耶徴濠上觀魚之樂則莊生非有虞與伯夷也又安知有虞與伯夷之不然耶徴鳬鶴短長之脛又安知有虞與伯夷之性非不可斷不可續者耶雖欲齊同彼是先逆集作忤後合惡用謬悠卓詭如是之甚耶蓬心未逹幸發吾覆第三問問至人恬淡外其形骸使如死灰如木雞斯可矣至若蹈履水火而不燋沒雖以誠信庸至是乎斯所以有疑於呂梁丈人商丘開之説也蓋有以誠信安於死而不遷者未有以誠信蹈難而必不死者此何所謂其質言之𢎞文崇文生䇿問二道第一問問儒館設科以優華緒亦明勸學然後審官諸生或以紈綺之年講誦未暇在琢玉之或怠於製錦而如何儻稍舉章程以明課試因粲粲之質加孳孳之勤可以逺圖固為盡善但因循既久慮物議為難盍自言之將求折𠂻第二問問左掖東朝載𢎞學斆貴遊胄子於是翔集法禁或弛藝實難徴推恩補員據闕升第或人疑張祿或詞假葛襲川文粹作龔是誠瑕不掩瑜豈仕優則一作方學澄汰則衆心未允因仍則流弊寖深有司病諸幸喻其術禮部䇿問進士五道貞元十九年第一問問漢廷董仲舒公孫𢎞對䇿言天人相與之際而施於教化韋玄成匡衡之倫以明經至宰相封侯皆本王道以及人事今雖以文以經貴祿學者而詞綺靡於體川文粹作景物寖失古風學因緣於記問寧窮典義説無師法經不明家有司之過敢不內訟思欲本司徒之三物崇樂正之四術不率教者屏之逺方則名義益修風俗益厚程孝秀之本業恭周漢之舊章慮難改作式佇嘉話事關理本必議上聞斯集作悉乃誠求諸生毋忽第二問問齊人之所以務於賦輸用給公上大抵饋軍實奉邉􅍯而已今北方和親亟通禮命南詔納欵屢獻竒功而蠢兹西戎尚有遺類猶調盛秋之戍頗勤中夏之師思欲盡復河湟之地永銷爟一作烽燧之警師息左次人無外徭酌古便今當有長䇿乃者戎人願修前好因請其俘或曰彼實無厭絶之以固吾圉或曰始示大信許之以靖吾人或曰歸貴種以懷其心或曰奪長技以翦其翼當藴較然之見備可舉之方第三問問祖宗昭穆王者之盛典明祀嚴禋有國之大事頃嵗奉常上奏以獻祖之位非正太祖之尊未申而公卿諸儒雜有其議皆以百代不遷宜居東向而獻懿二主所歸不同或曰藏於夾室或曰置於别廟或曰附於德明興聖酌殷周之制或曰遷於園寢石室採漢魏之儀而又有並居昭穆之列竟虛其位分饗禘祫之禮互處於西衆議云云莫有所一至今留中未下誠聖意所重難也至當無二衆君子辨之第四問問人之生也稟五行之秀其化也順一氣之散而牛哀為獸杜宇為鳥趙王為蒼犬夏鯀為黃能一作熊傅巖之相為星圯橋之老為石變化紏紛其故何也夭壽貴賤賦命萬殊而驪山之儒長平之卒歷陽之魚鱉南陽之侯王豈稟數斯同復適然也衆君子通性命之理究古今之學幽探造化佇所未聞第五問問有司之求才與多士之求進其心不相逺也諸生知之乎計偕者幾乎五百籍奏者不逾二十蓋二十五之一也諸生又知之乎雕龍之辨皆謂有餘靈蛇之珠無非在握射或失鵠瑜寧掩瑕雖涇渭終非而蓬麻未直匿名飛語詆庀一作計云云誠無它腸時有讒口豈有司之道未至復諸生之所習難化耶異時有司固諸生之所履也復何如哉非有防川之心願聞易地之説文苑英華卷四百七十五
