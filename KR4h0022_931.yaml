body:
  text: 文苑英華卷九百三十二宋李昉等編宦官下內侍彭獻忠碑一首內侍仇士良碑一首內侍護軍中尉彭獻忠神道碑張仲素𢎞璧之在御府也韞連城之價所以為寶景雲之見慶霄也麗捧日之彩所以為瑞大臣之居崇列也處近君之任所以為貴况復侍軒墀之密地護禁衛之雄軍昭彰茂功回復介祉終始一德永垂清名者哉侯誰能之見於彭公矣公諱獻忠字琦夫彭為商諸侯以國表姓至漢大司馬宣有逺績盛烈書於班史至孫業避漢末之亂寓居隴西襄武縣因地方望傳諸歷代隍中隴上推為右族沠緒綿逺冠蓋蟬聨貴任漸繁乃附咸鎬今為京兆三原人也烈考諱令俊皇朝儀郎行內侍省內謁者監保安福履𢎞闡義訓鍾慶濟美傳於藎臣公善下寬中蹈方守直竹箭有筠而可比城府無迹而自深以䖍肅恭懿承大君以仁孝清儉纘前烈建中三年入侍宫殿德宗皇帝嘉其敏厚器任異等便蕃於帷扆之內承奉於指顧之間言必有章動皆由禮貞元三年授內府局丞四年授內謁者監七年授朝散大夫清階命服所以馭貴白圭無玷赤紱斯皇自天之渥澤方深漸陸之羽儀始就十一年授朝請大夫周旋密勿獻納端亮孔光問樹而不對石慶數馬而後言以公方之今古何逺十六年特加金紫所以懋其勤而昭其美也二十年加正議大夫內侍省內侍仍賜上柱國充教坊使位愈高而接物愈敬恩益厚而處躬益卑故能行與福隨動將吉㑹當德宗仙馭上升順宗宅憂諒暗公以貞固服勞之節宣承衛翊戴之忠嘉績悃誠可書竹帛皇上御極拱侍穆清疇其功庸疏以爵土元和元年封襄武縣開國男食邑三百户充飛龍使二年加忠武將軍右武衛將軍三年授左神策軍副使加雲麾將軍馭衆之才著于倅一作粹理賜棨㦸户耀其高門所以旌其勳表其貴也其年奉詔充淄青道宣慰使六年遷知內侍省事充弓箭庫使六年充惠昭太子監護使祗事既畢加冠軍大將軍至十月遷左領軍衛大將軍知內侍省事充左神策軍護軍中郎將兼左街功德使十二年春以勤瘁遘疾上章請告宸眷屬賴令卧護陳讓懇切纍至再三動于天心方始得謝二月乙巳薨于翊善里之私第享年五十二聖皇軫悼輟膳興歎追念勳舊賻禭加等贈開府儀同三司左武衛上將軍所以録其勞而飾其終也官司職喪僚吏襄事卜兆窀穸圖其永安以十月十四日葬于萬年縣鳳棲原祔從先域之松檟禮也惟公爰自弱冠暨于知命奉職三朝殫竭一心掌繁領重樹勳宣力澡濯仁義發揮心靈斯所謂奉上之心閨門就養承順著聞及丁艱棘勺飲不進毁瘠過禮宗族感傷斯所謂因心之孝踐歷禁省榮耀貂璫冠軍護戎在帝左右飲氷持操鑒水潔身侈泰是懲燻灼自息置與道契儉而全貞生不務於家為殁仍規其薄葬斯所謂立志之本探賾精微講貫學藝周勃引强之能有而不恃孫武用竒之術知而罕論斯所謂遊藝之方綜事呈才仰奉睿㫖允釐樂府韶夏是司演嶰谷之正聲絶齊竽之濫吹廨署增輝絲桐載和去而借留上叶宸聽既臨馬政一日必修用奚官訓一作馴騶之法整穆王八駿馬皂及董武庫程範庶工弦木砥金罔不犀利斯所謂蒞官之敬嘗馳星軺撫慰兖海鄆岱之域風宣露濡戎臣列校蹈舞感抃斯所謂御命之功萬旅雲屯屹為親衛加拜中尉統兹六年夜護繚垣曉趨丹陛隂助神武制外自中奬善任材動必詢衆廣修廪庾贍食熊羆符伍有倫禮樂是閲咸使夫既勇且毅並務於移孝為忠至於别部支兵邊陲縣內拊循訓整不犯秋毫聞公之殁如喪親戚斯所謂護軍之略宜其享之遐福錫以永年蒼蒼難諶不至者夀夫人長樂郡君馮氏端懿柔明慈和婉孌一作􅀢母儀婦德淑慎是彰自晝哭之罹凶乃明心而習靜落髮壞服從哀節空元和十二年三月十五日出家受戒特勑正度仍錫法名正智賜居義陽寺所以遂𢎞誓而資幽福也嗣子希倩次子給事郎行內侍省奚官局丞員外置同正員希昭次子正議大夫行內侍省員外置同正員上柱國賜紫金魚袋希貞次子正議大夫內侍省內侍員外置同正員上柱國賜紫金魚袋希成次子希冕次子希慶芝蘭滿庭組綬相映荼蓼茹戚縗麻儼然哭泣之哀慕深先逺蒸夷之紀思烈舊勳欒欒貴臣匍匐上請詞臣奉詔傳信揚芳焯敘德善永垂琬琰銘曰帝在法宫下臨八荒外倚輔弼內憑忠良奕奕彭公藴義含章左右軒陛言端行方夙夜孔勤貔貅是職丹霄侍從黃道引翼深承寵渥克茂勳力寒玉侔清朱絲表直厚德多恕明誠不回决雲利器構厦長材北落謝疾東榮報哀恩加法賻官贈儀台祖載之辰清川曉涉凄鏘笳挽搖曵旌霎新阡舊城龜從筮協原即鳳棲封如馬鬛紹績之馨子貴家榮繼孝嗣恪宣功保名纂篆金石琢磨堅貞用播徽烈將來作程內侍省監楚國公仇士良神道碑鄭薰運巨壑者必資帆楫之便以鼓其波濤築廣厦者必堅柱石之材以完其結構一作楝宇是故明王聖帝立國保家莫不求竭忠宣力之臣配帆楫柱石之用懋崇基業𢎞濟艱難百代通規千載相遇孰稱全德其故開府儀同三司內侍監致仕楚國仇公乎公諱士良字匡美海豐興寧人也宋大夫牧以忠烈正直書於春秋公實其裔焉其後香以文雅仕於東漢儒以議論貴乎北燕蟬聨圭冕暉映簡册代著竒節率多令人史編家譜一二詳焉顯公之曽考皇朝正議大夫內給事賜緋魚袋諱上客府君忠昭事任績茂聲猷躬行正途克嗣先業烈祖皇朝議大夫內常侍賜紫金魚袋諱奉詮府君名以才彰功由道著王氏教讓羲之巳行于公髙門定國方大皇考諱文晟府君精持貞亷髙挹塵俗位以命屈慶因善餘厥惟楚公克振勳德追贈特進左監門衛將軍賜紫金魚袋申公之誠孝也公年未弱冠入仕東朝是時憲宗皇帝主器承華體元儲兩親奉再飯共歡九齡助登少海之瀾更闡前星之耀永貞十年授掖庭局宫教博士賜緋魚袋元和初以舊恩本固新渥彌隆既頒侍從之勤首舉寵遷之命加宣徽供奉官賜紫金魚袋檢身極敬奉輦施勞勵自牧於撝謙表無私於應對閏六月轉朝散大夫內侍省內給事宣徽供奉官如故材力彰於省局周旋美於禁闈驟議甄升更加命秩冬十月拜內常侍餘如故未周星紀三歷顯途既洽謳謠且明恩澤彼虞卿再見為趙上卿荀爽九旬登漢三事允膺時議彼或多慙三年以本官充內外五坊使尋或疑衍遷宣徽供奉官發彼五豝輔騶虞之仁化殪此大兕詠吉日於春搜外撫一作按之暴橫自銷中綏一作野之井閭知感十年加大中大夫內侍省內常侍尋以本官充平盧軍監軍使全齊舊壤繼代邀恩甲兵甚充貢賦不入公聞其叛渙諭以忠貞爰革非心幾至效順明年詔徵又以內侍依前宣徽供奉官吳冦據淮天兵在野逗留不進沮敗為憂揀求使臣往諭中㫖遂命公以本官及職充淮西行營宣慰使至則大布皇澤益勵軍威四逺瞻風萬夫振氣而又盡得機要既還奏聞竟至成功斯為顯效十五年遷雲麾將軍右監門衛將軍充內外五坊使仍賜上柱國又進封南安縣開國男食邑三百户驅獸而無害五穀充庖而有事三田蕙圃蘭塘落飛駐走助開三面之網勤施一目之羅鄙長楊之大誇胡人笑上林之務矜楚使條令既肅巡遊盡歡其冬復加冠軍大將軍長慶初罷五坊使以本縣進封開國子尋進侯爵食邑一千户宣徽供奉官皆如故二年除鳳翔監軍使又進封開國公食邑一千五百户亶父舊疆繆公遺政郡邑則武安留守扶風則馬謨擅名雜於版屋之郊號為難治之俗公攬轡即路下車撫戎三軍畏威百姓懷惠寶厯二年徵一無此字復為宣徽供奉官以本爵進封郡公食邑二千户尋除鄂嶽監軍使傍連荆楚南接湖湘閭閻皆土著之安貨貝有山積之富兵不堅利人皆惰游公深贊訓齊同為朂勉知方有勇自我而能鼓疑大和元年入為宣徽供奉官轉內坊典內侍省秩清事簡優逸自娛莫展長材鬱于群論俄拜右神策軍副使公於是端肅以二戎政亷讓以播軍聲屏衛益嚴暴悍知禁二年擢為右領軍衛將軍內外五坊使講事一時農不易隴選徒百隊人不告勞鮮扁而布青林行事而無遺衮一無此十二字貙貗古法搜獮新規指顧之間莫非盡善六年真拜內侍知省事餘如故明年轉大行庫領染坊依前知省事恩澤浹於寰瀛寵錫周於藩服綺羅萬段錦繡千箱每極珍華曽無濫惡又𤣥黃朱紫染彩文章靡不精鮮悉中程度以賞能陟于龍飛使本官並仍舊御間二六天驥三千異骨峯生深溝洫溢親習盡馳驅之妙羣分多駔駿之竒芻秣尤精藁秥常美九年五月拜左神策軍中尉兼左街功德使將軍知省事如故練達戎機㧾親護禁典理爪牙之衛左右心膂之師寬不喪威簡不曠務氣勵熊羆之勇手持虎豹之韜恩由忠深士以誠感張孺驂乘孝宣乃安趙喜宿衛顯宗加厚轉左驍衛將軍餘如故既而鄭注挺妖李訓附㑹列奏僞瑞固邀鑾輿圖害腹心漸逞姦毒公先機立斷禁旅遽齊坐遏凶渠保護帝輦指名魁首俄頃追擒其餘躁競進取之徒枝連葉著之黨或志諧狂計罔自正身或跡比頑童居然就禍莫不盡苞恢網同抵國章由是宗社乂寧中外協睦非夫忠謀天假廣業神通其孰能如此乎及於廟堂議功公在第一優詔特進本衛上將軍中尉知省事如故位輕於德賞不配勳難許冲謙終升峻級尋遷驃騎大將軍開成五年加開府儀同三司左衛上將軍封楚國公食邑二千户食實封二千户頒恩常例非私受也㑹昌元年又加食實封二百户尋擢為觀軍容使兼統左右三軍奬舊常議昭異渥也公每念禍伏福中祿為身纍將持盈滿莫過退休三年夏以寒暑內外針鑿罕效因求散秩用遂素懷乃除內侍監將軍知省事如故尋又連表陳讓固辭恩榮優詔以本官致仕其年六月二十三日薨于廣化里之私第享年六十有三嗚呼身隨運往名寄勳留一代推雄九原表傑天子悼之罷朝兩日贈揚州大都督公弱冠以辨智取位强仕以幹蠱居官及蒞大政以機略致勳勞臻于貴夀以恬退保終始事在簡冊爵及天人出入七朝顯揚三紀秩以功藝進道由忠直張擊鞠廣場則馳先百馬彎弧逈野則飛落雙雕故得侍娛遊則三領五坊承顧問則八加供奉元和中盧從史倚上黨兵徑隂結叛臣憲宗皇帝命護軍中尉吐突公統戎專征密勿神算誘至幕下縳送闕廷是時公適在軍助成丕績其或揚鑣宣命電掃雷驚每播深恩親當橫陳兩河平殄頗預其功雖不一作非是自矜實傳衆口而多材多藝强記博聞舉策畫若應神明閲簿書無逃心目而又精鑒冠絶當時門館賔僚薦延功行必求明德用輔聖朝則有秉忠正之心荷匡贊之任才表王佐出為國禎康濟羣生輝華四海者矣然後知衛將軍七擊胸奴封侯九國霍驃騎六征絶塞列將八人特美髙勳豈膺賢弼以今方古我德為優以四年正一作六月二十三日歸葬於萬年縣寧安鄉鳳棲原社季村夫人安定胡氏祔焉禮也夫人故開府儀同三司檢校太子賔客兼御史大夫贈户部尚書承恩之女性得天才儀標冠族叶組紃之懿範彰圖史之貞規法度所以正家柔閒所以遵道洎祥開鳳兆德協鵲巢芳徽溢於閨闈淑則洽於姻族以公勳位峻重纍封至魯國夫人壬戍嵗先公而殁有男五人長宣徽使銀青光祿大夫行內侍省內給事賜紫金魚袋曰從廣次光祿大夫檢校散騎常侍持節曹州諸軍事守曹州刺史兼御史中丞上柱國南安縣開國公食邑一千五百户曰亢宗次閣門使朝散大夫行內侍省內府局丞賜緋魚袋曰從源次邠寧監軍使中散大夫行內侍省內侍局丞賜緋魚袋曰從渭幼曰從潩皆稟訓過庭早通詩禮承恩入仕共效忠勤為明庭之羽翰作私室之符瑞不忘素業自致青雲宜乎懿德有後信不誣矣大中紀號五年克平四裔東南欵化西北開疆三耀舒光八紘無事皇帝念功軫慮録舊申恩惟楚公永貞時祖宫有翼戴之勞元和時宣徽有委遇之渥今則已悲封樹未刻松銘乃命舉其殊庸勒在貞石用傳不朽昭示將來特詔詞臣俾其選述臣薰恐惶直叙不敢虛美謹為銘曰仇氏之先本宋大夫就義輕死昭于冊書厥後聞人漢香燕孺乃生楚公前修不渝其一焯焯楚公俊乂邁德克抱才器必循典則天資忠孝神助正直髙揭勳名幾摧姦匿其二從史負力潜通鎮郊上將受詔縳歸天朝楚公佐成衆不敢搖東國大定塵氣自消其三蔡冦不庭誅行原野羣校傷敗師無進者楚國銜命汗血波㵼貔貅鼓氣城壘連下其四注訓勃戾妖凌北宮和鑾在御狂祲來衝楚公奮臂甲士趨風克殱巨孽乃建殊庸其五五坊三居公畋有節宣徽八入密議攸竭再監戎閫將校感悅一牧郊坰驊騮敻絶其六佐佑帝室手提禁師士伍胥附皇心勿疑持滿先誡居高不危懸車告謝彭薛肩隨其七駭起截颷哀傳逝水空留洪烈永載青史精爽何之壯猷已矣京兆開阡夀堂在此其八仕承泰運歿偶昌期徽音不泯令嗣䘖悲聖念既勤爰斫豐碑事功難究有靦色絲其九川常不移松楸已列𤣥室雖閒清風靡歇作皇代之英臣期終吉兮無絶其十文苑英華卷九百三十二
