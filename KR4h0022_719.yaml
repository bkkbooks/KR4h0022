body:
  text: 文苑英華巻七百二十宋李昉等編餞送三送封判官攝監察御史之磧西序一首送史判官之河南序一首送李叅軍水運序一首送李叅軍序一首餞崔朔司功入計序一首送蕭少府之幽州序一首送崔司户過隴迎大夫序一首送崔二十一之上都序一首送孟大入蜀序一首送恵上人還江東序一首送王大拔萃不第歸睢陽序一首送盧涓落第東還序一首送謝氏昆季下第歸南陽序一首送田八落第東歸序一首江州卧疾送李侍御序一首送十三舅適越序一首送房七西游梁宋序一首送薛九逺游序一首送薄九自牧往義興序一首送張十五往吳仲序一首送觀往吳中序一首送河萇序一首送蔣十九丈奏事畢正拜殿中歸淮南幕府序一首送于兵曹往江夏序一首送李兵曹往江外序一首送孟校書往南海序一首送封判官攝監察御史之磧西序陶翰夫子以忠義為名以才能為用頃年投筆多制勝之謨間嵗策勳有斯皇之命以西師之未解右地之多虞何寧此材豈獲居息我主將所以封弱水擒月氐畧康居取勃律雖出車之任事属於才能而入幕之賢功歸於帷幄嗟乎非萬里無以見逺圖非三軍無以知壮節古人於是厯孔道窮河源豈勤勞而樂行役甘絶域而厭諸夏必以為擔石者能喪志懐安者也而拜命封侯功成事立不同日言矣勉哉封子守其嘉謀輶軒將馳繡服將假雖天下險阻玊闗之風故不足為子慮耳帝鄉山川徙倚將逺别路雲樹蒼茫欲秋可以贈離杯可以贈離唱乃命座客唯然賦詩送史判官之河南序子始以詞進而果以政聞拔起翰林激昂儒服朝升一尉暮入五府漢東之駕纔返河南之檄適至皇皇之命未嘗寧居將欲拒其辟書韜其利用若清規雄烈已異於天下矣周鄭之風好僻齊魯之政或訛使戎臣所以政疑於勵精鋭於填舉以東夏侯子得無戒之哉於是中朝名士左補闕任侯序其詠謌太常主簿楊公鳩其宴餞筆墨以之聚至文章以之感合不有君子胡寕是焉中條氣凝河氷將壮闗中送客美使者之賢泗上諸侯盛主人之禮慎爾行役勉哉軺軒别筵再興詞賦間作故我有後甲之術凡不在任氏之唱者實𨽻於斯矣送李叅軍水運序壮哉大河之功也南分淮泗東委溟渤呀呷長川呼吸萬里若舟楫是戒風濤無虞則三萬之廩可得而西矣故朝廷大役實難其人李公精義宏髙徳量魁逹聲聞闗右義徹浙川我侍御史薛公資之以成務也於是驛騎首路列筵在庭山川且長語笑云隔勵其節宣其規使白波徐清紅粟流衍則國家之事濟矣勉旃故交不敏詩以投贈之送李叅軍序人生相知心乎僕之心嘗語君矣相天疑以志相忠以言以居則無悶以動則無悔孰謂子非天下之知己乎同官為僚同志為友豈不欲晤語終日盡平生之歡然而天時者盈虚也人事者倐忽也一合一否與時而來不有聚何以同二人心不有𣪚何以見四方志長揖而去勉哉東軒楊花初飛郊草先碧自秦及洛雲山千里子衿之首章善矣吾從也餞崔朔司功入計序冬天子至自河華中使至司功崔公朝於京師禮也今天下有道聲教必被要荒來格况其邇者乎政莫大於殷㑹使莫大於述職故學於禮足以専對崔公近之矣及夫三物成者斯義歟征驂如飛郊暮來祖渭上西眺寒源無色賦皇華而送崔氏行焉送蕭少府之幽州序頃林胡大㓂邊殺右將軍於是幽薊之北門不啟天子方憂朔漠之事問盧龍之策公安得收其宏畧匣長劍塊然為一尉哉夫感於事則忠義全登於危則臣節見必也海水晏燕山空代雲胡沙談笑而静蓋王師之義全言未畢征馬將𣪚三嘯於離郊之上敬而辭焉送崔司户過隴迎大夫序大公銜紼海裔東歸玊門戎夏已康金甲已息伊大夫皆受賜矣矧司户公詩禮是朂庭闈是故疑假輶軒登隴雲而四望矣吾朋乃驅征騎㩦㫖酒歌白雲以贈之闗河始風秋草尚碧衆皆詩人也安闕乎文哉送崔二十一之上都序士之相知故不在舊僕一覩君詞志慷慨情幹絶人是欲片心樹善君子風義相感笑言卒獲時不與而清秋至樂未央而别恨生則臨岐憮然把袂如失蘭可佩也掇而贈君酒可忘憂酌以酬我且士為疑當世虚已之運主司推心之時而不能翰飛冲天凌勵勁翮非人英也子之往矣吾無間然乃徴詩寮以賛行色送孟大入蜀序襄陽孟浩然精朗竒素㓜髙為文天寳年始游西秦京師詞人皆歎其曠絶也觀其匠思幽妙振言孤傑信詩伯矣不然者何以有聲於江楚間嗟乎夫子有如是才如是志且流落未遇風塵所已疑謂天下無否泰無時命豈不謬哉翰讀古人文見長楊羽獵子虚賦壮哉至廣漢城西三千里清江夤縁兩山如劍中有微徑西入岷峨有竒幽皆感子之興矣勉旃故交不才以文投贈送恵上人還江東序李頎自延陵季子來詣上國齊魯晉鄭賢豪風靡及夫顧陸入洛亦稱南金今錢塘恵上人捉一盂振一錫則呼吸詞府頡頏朝顔長江之南世有詞人舊矣於是侍御史王公維太子舍人裴公揔寄彼好事於焉首唱才賢翕集文墨敷芬作者為之不寜詞林為之一振此公家夲富春棲於天竹白雲青岫方丈之居江風海濤一杯而泛窮其奥㫖即空王之法門賾其精心有真如之理性不然我羣公風流虚佇歌詠間作者豈無哉正月祴裳東旅征㠶南岸眺吳山而可見值湖水之將碧震澤千里孤舟𣺌然比思我曹時開離贈巻也送王大拔萃不第俗從竹非歸㫿陽序前人才格可得而仰也文章可知而畏也故往年有公連之㨗矣九流之學日盛三鼔之音未歇今茲有天官之阨矣天將啟子於世故命以才授子於亨故先以屈屈伸理也才位時也子姑感激毫翰増脩詞律冲天之舉吾倚而待焉歡洽豈常離言實早河岳西别悠哉鎬京庭闈東瞻誰謂家逺草色將變雲天浩然詩而詠言將以述志送盧涓落第東還序噫天生秀明雋而才之有九流胡蒙而屯之故君子守之以知息之命而固有湏也不然者盧氏子魁岸特逹而若是尚脉脉於公車之下而三嵗不覿哉灞城春潤風喧景遲鸎聲始調栁色堪醉當此而裹足千里背而東豈意者歟衆皆賦詩以慰行旅送謝氏昆季下第歸南陽序吾嘗游江表得二謝焉青青子衿始在童丱時巳辨其稍雲噴浪之兆江河蕭𣪚垂二十秋忽然上京再瑩心目詩騷之興天假流畧之奥日新才藝克脩文鋒甚鋭吾以此自負不為非知人矣金門未偶征蓋言旋雲峰閉於武閣春野開於楚鄧蓋將窮計一作討策府琢磨詞律他日之奮六翮登九霄未為後一作俊非耳春水尚寒郊草無色何以贈别必在乎斯文送田八落第東歸序田子行於古而志於文雅多清調將有新律鋒鏑甚鋭將來者其憚之勿以三年未鳴六翮小挫則遂有清谿白雲之意夫才也者命在其中矣屈也者伸在其中矣將子少安吾以是觀徳灞亭栁緑昆池草青于何送歸無易謌詠江州卧疾送李倚御序李華侍御厯揔漢上湖隂江左之賦王府之入不匱愛人之頌有餘前相國劉公居佐帝庭行恤人隠侍御時賢髙譽盛府舊僚傳檄速駕江城風動當天心厭兵品物思理將束貪狼之口掩破骨之傷濡足而前化危為安此大丈夫懸弧四方之志與夫竄身漁釣山林枯槁異日論也天下有道貧且賤焉恥也今聖人在上夔龍宣力而老夫甘心貧賤得非人生窮逹固有分耶方理舟潯陽追跡幽人解纓網陵顥淳雖病痼齒衰而神王顦顇之中齊榮辱一視聽是非哀樂無自入矣侍御忽告余行余知悒焉軫心豈紛累未滌將悲亦有道且以簮擊茶甌歌而餞之曰江沉沉兮雨凄凄洲渚沒兮𤣥雲低傷别心兮聞鼔鼙送十三舅適越序舅氏適越華拜送西階之下俟命席端舅氏曰吾交侍御鮑君夫玉待琢者也知我者鮑君成我者鮑君是以如越求琢於鮑昔子路去魯告顔生曰何以贈我夫贈人以言古之道也况背楚山凌淛河覩㑹稽之險棹鏡水之波窺禹穴之㝠㝠仰秦望之峨峨如不誡我汝將若何華拜手曰柔而立咎繇所以成九徳也寛而静師乙所以諧五聲也文犀明珠之珍伏於掌握之間此君子所以恢令名也再拜稽首送房七西游梁宋序君子既學之患不能行也河南房敬叔其行之者歟我思古人之道其房君哉安親於羈旅之中講道於茅茨之下不改其樂以文㑹之吾與房也顔子屢空曽參衣敝聞宋之君子落落有竒節竒節發於仁義者也以顔曽之行求仁義之均勉旃斯有望送薛九逺游序士之舒毛羽宣聲調不在髙位在有道自王允𤣥晏發左思名盛當時價壓百代薛都卿以夷澹飬素以文章導志自浙右游湖左一句一韻遍於衣冠江山為之鮮潤煙景為之明㓕其餘情性所得蓋古人之儔歟南陽有畧兼有道之髙𤣥晏之道論其措意則王允左思豈其逺乎恵然訪余告以行邁將棹溪吳越濡札江嶠東南勝事落爾胷中况為諸侯上賔知大夫之官族古所貴勉之哉病叟李遐叔贈送薄九自牧往義興序中明檢而能曠年邁體衰而人罕知之陽羡山深水濶海隅幽阻而人罕知之以中明之𤣥姿黙識陽羡之清􅀈秀石人乎哉清乎哉之子所以為貴也詩者輔佐情懐其舊俗則泰伯之讓徳延陵之髙風因是而阻王孫縁物而興之逺也矣送張十五往吳中序邯鄲遐叔風病目疾家貧不能具藥爰以言自醫南陽張士容引㡌攝策晨告余曰雖耕楚田而無耰費相里杭州刑部郎李君以道教我以文博我將求飦粥於二賢可乎余諗之曰嘗讀大雅美張仲之徳子其後乎欲而求仁愚以為可今賢士君子多在江淮之間吾見二丈夫必開館拂席聄相如之玊聲盡家之有無也不爾者人而不仁如禮何人而不仁如樂何息言息言此獲麟之絶筆也送觀往吳中序見觀送蘭州兄詩敬不踰節情而中禮是篇也得詩人之一端矣先王省方命太師陳詩以觀人風固非逺嶠之松雪清江之雲月變也久矣將如之何觀其勉之在昔蘭陵府君髙平𤏡公栢仁疑作人邑名下同懿公兄弟三人有重名於天下鉅鹿蘭陵之穆也故揚州孝公後之觀之世父也髙平𤏡之嫡也吾後之宣城文昭公栢仁之嗣也故中丞蘇州後之夫知卿大夫之族姓班位之髙下見貴春秋而此道將亡自族之不知况他人乎觀於經感士匄郯子之祖徳於史慕子長孟堅之自叙羈旅無書往吳中蒐以備家傳之遺闕附之於篇吾病矣老矣是行也慰我祗命聿脩之心永泰二年四月庚寅叔父華序送何萇序廬江何秀才棹流千里候余柴門執弟子見師之禮余竦然自何徳以堪之意者賢大夫賈廬州待余異等談余過實是以致秀才神邁氣専文詞有調孤雲超忽逈出秋江若游公卿間必成名然赤光湛盧擬物氷斷其發也在礪磨而已用此申千里之報也何氏之先喆比干徳通神明受策阜昌世為大官有勳有徳遹追來孝亦以祝秀才也元老趙公華叅疇年之歡夫貴與尊議功論徳不究其涯秀才將奉郡之命宣方面之烈我思古人實獲我心送蔣十九丈奏事畢正拜殿中歸淮南幕府序賈至天子以淮海多虞黎人未乂命舊相崔公董之公以封畧所覆澄清是圖辟柱史蔣公作之如翰負風以石投水于茲五稔方隅克定乃朝天闕將命述職帝用嘉之進其命秋七月流火言旋幕府懿親良朋寵行惜别曰兵興十年九州殘弊生人凋喪植物耗竭行者罹鋒刃之艱處者困求奪之累豈不以連率之敗類使臣之無恥獨揚州一隅人尚完聚屢遇海島震盪再當河南離叛亟供職役之繁而室家相保耕績未罷得非崔公之賢乎公之賢而其佐可知矣今朝廷多故戎狄未服塞門不扃人心驚駭魚鹽之殷舳艫之富海陵所入也齒革羽毛𤣥纁璣組東南所育也匡時之謨富人之術幕府所畫也豈伊方隅是頼得不勉歟時臨岐贈言盍各有望衆君子之志其詩乎送于兵曹往江夏序予謫居洞庭嵗三秋矣有客自蜀浮舟來者則河南于侯能讀古人書辨當世務年邇四十猶沉下位為静者之尚退乎先逹之迨賢乎與子登麗譙縁鳥嶼一時累月多情甚歡忽然挂㠶告我行邁豈非窮轍不能濡故也馮翊太守王公移鎮武昌好賢下士所以衣縫掖襲藝文者歸之如川吾子東行謂得時矣送李兵曹往江外序千里之馬維而不馭則意在空谷而逺思豐草累鷙之鶚鞲而不摶則心在窮徼而愈懐雲霄是以濟時命代之才或湮淪未遇之士𦕈然在滄海之上扁舟之中矣李侯吾將鮑子也我知其為人立身清而廉從政敏而逹内以孝悌著外以信義稱嘉辰良宵亹亹清話又足見林宗髙識叔度宏量一命佐邑非以政學也再命環衛之曹非以官擇也徒棲遲下位禄未代耕是以去游鏡亭探禹穴水宿雲卧彌年始還今又疋馬出闗艤舟洛下念安石東山之賞懐子猷剡溪之興何雲思浩蕩而野情寥廓哉予困於徒勞累在五斗昇沉風波之裏跼蹐長吏之前豈倉州逺蹈之情南陽躬耕之意臨岐長酒有愧長劍想子行邁路經夷門見潁川陳兼河南于頔為問道心無恙星鬢如何宿昔屢空復為安邑也予近得隂君祕訣之北方河車郊原近山金鼎夕燎秋來氣冷爐火適宜刀圭一開與子攜手送孟校書往南海序元結平昌孟雲卿與元次山同州里以辭學相友幾二十年次山今罷守舂陵雲卿始典校芸閣於戱材業次山不如雲卿詞賦次山不如雲卿通和次山不如雲卿在次山又非集無非字詡然求進者也誰言時命吾欲聽之次山今且未老雲卿少次山六七嵗雲卿名聲滿天下知己在朝廷及次山年雲卿何事不可勿隨長風乗興蹈海勿愛羅浮往而不歸南海幕府有樂安任鵬集作鵰與次山最舊請任公為次山一白府主趨資装雲卿使北歸慎勿令徘徊海上請公等集作弟醉歌以送之文苑英華巻七百二十
