body:
  text: 文苑英華卷一百九十五宋李昉等編樂府四結客少年場八首行行且遊獵二首門有車馬客四首對酒二十一首前有一樽酒三首將進酒三首勸酒六首飲酒樂一首結客少年場行劉孝威少年本六郡遨遊遍五都插腰銅匕首障日錦屠蘇鷙一作鷲羽裝銀鏑犀膠飾象弧近發連雙兔髙彎落九烏邊城多警急節使一作度滿郊衢居延箭箙盡踈勒井泉枯正䝉都護接何由憚險途千金募惡少一麾擒骨都勇餘聊踘蹴戰罷暫一作戲投壺昔為北方一作邊將今成一作為南靣孤邦君行負弩縣令且前驅同前吳均結客少年歸翩翩駿馬肥報恩殺胡一作人竟賢君賜錦衣握蘭登建禮拖玉入含暉顧看草𤣥者功名終自微同前庾信結客少年場春風路滿香歌撩一作嫌李都尉果擲潘河陽隔一作折花遙勸酒就水更一作便移床今年喜夫壻新拜羽林郎定知劉碧玉偷嫁汝南王同前孔紹安結客佩吳鈎橫行度隴頭鴈在弓前落雲從陳後浮吳師驚燧象燕一作火將警奔牛轉蓬飛不息氷河結未流若使三邊定當封萬里侯同前虞世南韓魏多竒節倜儻遺名利共矜然諾情一作心各負縱橫意一作志結交一作友一言重相期千里至緑沉明月弦金絡浮雲轡吹簫入吳市擊筑遊燕肆尋源博望侯結客逺相求少年懷一顧長驅背隴頭焰焰霜戈動耿耿虹劔一作劔虹浮風一作雲起龍沙暗木落鴈門秋天山冬夏雪交河南北流輕生殉一作狥知己非是為身謀同前盧照鄰長安重遊俠雒陽富才一作財雄玉劔浮雲騎金鞭一作鞍明月弓鬬雞過渭北走馬向關東孫賔乃趙妓事一作臏非遙見侍一作待郭解暗相通不受千金爵誰論萬里功將軍下天上虜騎入雲中烽火夜似月兵氣曉成虹橫行狥知已負羽逺從一作征戎龍旌昏朔霧鳥障卷胡風追奔瀚海咽戰罷隂山空歸來謝天子何如馬上翁同前盧一作虞羽客幽并俠少年金絡控連錢竊符方救趙擊筑正懷燕輕生辭鳳闕揮袂上祁連陸離橫寶劔出沒鶩一作驚徂旃䝉輪恆顧敵超乘揔一作忽爭先摧枯逾百戰拓地逺三千骨都魂已散樓蘭首復傳龍城含苦一作宿又作曉霧瀚海接一作隔遙天歌吹金微返振旅玉門旋烽火今已息非復照甘泉同前李白紫騮黃金曈稜稜搖緑騣一作鬃平明相馳逐結客洛門東少年學劔術陵轢白猿公珠袍曳錦帶匕首插吳鴻由來萬夫勇挾此生一作英雄風託交從劇孟買醉入新豐笑盡一杯酒殺人都市中羞道易水寒徒一作從令日貫虹燕丹事不立虛沒秦帝宫舞陽死灰人安可與成功行行且遊獵篇一作遊行且獵篇劉孝威之罘講射所上林娛獵場選徒驕楚客詔狩誇胡王罕車已戒道風鳥復啓行佽飛具矰繳材官命蹶張髙罝掩月兔徑矢射天狼跖地不遑免一作逸排虛豈反翔日暮鈎陳轉風清鐃吹揚歸來宴平樂寧肯滯禽荒同前孟雲卿少年多武力勇氣冠幽州何以縱心賞馬蹄春草頭遲遲平原上狐兔奔林丘猛虎忽前遊俊鷹連下韝俯身逐南北輕捷固難儔所發無不中失之如我讐豈唯務馳騁猗爾暮田疇殘殺無不痛古來良有由門有車馬客何遜門有車馬客言是故鄉來故鄉有書信縱橫印檢開開書看未極行客屢相識借問故鄉來潺湲淚不息上言離别久下言望應歸寸心將夜鵲相逐向南飛同前張正見飛觀霞光起重門戒早一作平旦開北闕髙輶至一作箱過東方千一作連騎來紅塵揚翠轂赭汗染龍媒梢鞭聊靜電接眼漸一作軫暫停雷桃花扶岸一作夾院又作夾徑聚流水傍池回非關萬里客自是一作有六竒才琴和朝翟一作雉操酒泛夜光杯舞袖飄金谷歌聲繞鳳臺良時不再遇一作可再騶御鬱相催安知太行道失路車輪摧同前虞世南財雄一作陳遵重交結戚里一作田蚡擅豪華曲臺臨上路髙軒一作門抵狹斜赭汗千金一作里馬繡軸一作轂五香車白鶴隨飛蓋朱鷺入鳴笳夏蓮開劔水春桃發綬花髙談辨飛兔摛藻掘靈蛇一作輕裙染回雲浮蟻泛流霞逢恩出毛羽一作借羽翼失路委泥沙曖曖風煙晚路長歸騎遠日斜青瑣第塵飛金谷苑危絃促柱奏巴渝遺簮墮珥解羅襦如何守直道翻使谷名愚同前李白門有車馬賔一作客金鞍耀朱輪謂從雲一作丹霄落乃是故鄉親呼兒掃中堂坐客論悲辛對酒兩不飲停觴淚盈巾歎我萬里遊飄飄三十春空談霸王略紫綬不掛身雄劔藏玉匣隂符生素塵廓落無所合流離湘水濵借問宗黨間多為泉下人生苦百戰役死托萬鬼鄰北風揚胡沙霾一作埋翳周與秦大運且如此蒼穹寧匪仁惻愴憶一作竟何道存亡任天均一作大鈞對酒范雲對酒心自足故人來共持方悅羅襟解誰念髮成絲狥性良為達求名本自欺逮君當歌日及我傾樽時同前張正見當歌對玉酒匡坐酌金罍竹葉三清泛葡萄百味開風移蘭氣入月逐桂香來獨有劉將阮忘情寄羽杯同前岑敬之色映臨池竹香浮滿砌蘭舒文泛玉碗漾蟻溢金盤簫曲隨鸞易笳聲出塞難唯有將軍酒川上可除寒同前張率對酒誠可樂此酒復芳醇如華良可賞一作貴似乳更堪一作甘珍何當留上客為寄掌一作夀屬中人金樽清復滿玉盤一作碗亟來親誰能共遲暮對酒及一作惜芳辰君歌尚未罷却坐避梁塵對酒歌范榮樂府作庾信春水望桃花春洲籍芳杜琴隨一作從緑珠借酒就文君取牽牛一作馬向渭橋日曝山頭晡山簡接䍦倒王戎如意舞箏鳴金谷園笛韻平陽塢人生一百年歡笑唯三五何處覔錢刀求為洛陽賈音古對酒春園作庾信數杯還已醉春風一作風雲不復知唯有龍吟笛桓伊能獨吹同前春園作王勃投簮下山閣携酒對河梁狹水牽長鏡髙花送斷香繁鶯歌似曲踈蝶舞成行自然催一醉非但閲年光同前巴陵作張說留侯封萬户園令夀千金本為成王業初由賦上林繁華一作榮安足恃霜露遞相尋鳥哭楚山外猿啼湘水隂夢中城闕近天畔海雲深空對忘憂酌一作酒離憂不去心同前崔國輔行行日將夕荒村古塜無人跡䝉籠荆棘一鳥飛屢唱提壺沽酒喫古人不逹酒不足遺恨精靈成一作傳此曲寄言世上一作當代諸少年平生須盡杯中緑同前一作月下獨酌李白花前一作下一壺酒獨酌無相親舉杯邀明月對影成三人月既不解飲影徒隨我身暫伴月將影行樂須及春我歌月徘徊我舞影凌亂醒時同交歡醉後各分散永結無情遊相期邈雲漢一作碧嵓畔此詩一百五十二卷重出今已削去注異同為一作二一作月夜獨酌天若不愛酒酒星不在天地若不愛酒地應無酒一作醴泉天地既愛酒愛酒不愧天已聞清比聖復道濁如賢聖賢既已飲何必求神仙三杯通大道一斗合自然但得醉中趣勿為醒者傳三此詩見二百七十卷對酒示申屠學士戴叔倫三重江水萬重山山裏青春度日閒且向白雲求一醉莫教愁夢到鄉關湘中對酒行張謂夜坐不厭湖上月晝遊不厭湖上山眼前一樽又長滿心中萬事如等閒主人有黍數百石濁醪數斗應不惜即今相逢不盡歡别後相思復何益茱萸灣頭歸路賖願公且宿黃公家風光若此人不醉參差孤負東園花對酒曲賈至春來酒味濃舉酒對春叢一酌千憂散三杯萬事空放歌乘美景醉舞向春風寄語樽前客生涯任轉蓬二梅發柳依依黃鶯歷亂飛當歌憐景色對酒惜芳菲曲水浮花氣流風散舞衣通宵留暮雨上客莫言歸對酒王建為病比來渾斷絶因一作緣花不免却知聞從來樂一作事事關身少坐領春風只在君秋日對酒武元衡行年過始衰秋至獨先悲事往悸神魄感深滋涕洟百憂紛在慮一醉兀無思寶琴拂塵匣清韻作音凝朱絲幽圃蕙蘭氣煙窗松桂姿我乏濟時略仗節撫坤維山川大兵後牢落空城池驚沙猶振野緑草生荒陂物變風雨順人懷天地慈春耕俟一作事秋戰戎馬去封陲波瀾暗超忽微雨亦磷緇客有自嵩潁重徴棲隱期丹訣學仙晚白雲歸谷遲君恩不可報霜露繞南枝對酒白居易莫上青雲去青雲足愛憎自賢誇智慧相軋鬬功能魚爛緣吞餌蛾燋為撲燈不如飲美酒任性醉騰騰同前曹鄴愛酒知是癖難與性相捨未必獨醒人便是不飲者晚歲無此物何由住田野錢塘對酒曲陳陶風天鴈悲西陵愁使君紅旗㺯濤頭東海神魚騎未得江天大笑閒悠悠嵯峨吳山莫誇碧河陽經年一宵白南州彩鳳為君生古獄愁蛇待恩澤三清羽童來何遲十二玉樓蝴蝶飛炎荒翡翠九門去遼東白鶴舞歸期一作家歸鴟夷公子休悲悄六鰲如鏡天始老樽前事去月團圓琥珀無情憶蘇小前有一樽酒雜言張正見前有一樽酒主人欲行夀今日合來坐者當令皆富且夀欲令主人三萬歲終歲不知老為吏當髙遷賈市得萬倍桑蠶當大得主人宜子孫前有樽酒行二首李白東一作春風東一作忽非來忽相過金樽渌酒生微波落花紛紛稍覺多美人欲醉朱顔􅋳青軒桃李有一作能幾何流光欺人忽蹉跎君起舞日西一作將夕當年意氣不肯惜一作傾白髮如絲竟一作白首垂絲嘆何益二琴奏龍門之緑桐玉壺美酒清若空催絃拂柱與君飲眼白看杯顔色紅一作看朱成碧顔始紅胡姬貌如花當爐笑春風笑春風舞羅衣君今不醉欲安歸將進酒梁昭明太子洛陽輕薄子長安遊俠兒宜城溢璖碗中山浮羽巵同前一作惜空酒李白君不見黃河之水天上來奔流到海不復回君不見髙堂明鏡悲白髮朝如青雲一作絲暮成雪人生得意須盡歡莫使金樽空對月天生我材必有用一作我身必有材千金散盡還復來烹羊宰牛且為樂㑹須一飲三百杯岑夫子丹丘生將進酒杯一作君莫停與君歌一曲請君為我傾耳聽鐘鼎玉帛豈足貴一作鐘鼓饌玉不足貴但願長醉不復一作用醒古來賢聖皆死盡一作聖賢皆寂寥惟有飲者留其名陳王昔日一作時宴平樂斗酒十千恣歡謔主人何用一作為言少錢徑須沽酒一作取對君酌五花馬千金裘呼兒將出換美酒與爾同銷萬古愁此詩三百三十六卷重出今已削去同前陳陶金樽莫倚青春健齷齪浮生如走電琴瑟盤傾從世珠黃泥局㵼流年箭麻姑爪秃瞳子昏東皇肉角生魚鱗靈鰲柱骨半枯朽驪龍德悔二字疑愁耕人周孔蓍龜久淪沒黃嵩疑誰認賢愚骨兔苑詞才去不還蘭亭水石空明月姮一作巫娥弄簫香雨收江濵迸瑟魚龍愁靈芝九折楚蓮醉翾風一歎梁庭秋一作塵愁醁亞蠻觥奉君夀玉山三獻春紅透銀鴨金鵝言待誰隋家嶽瀆皇家有珊瑚座上凌香雲鳳肪龍炙猩猩脣芝蘭此日不傾倒南山白石皆賢人文康調笑麒麟起一曲飛龍夀天地山人勸酒李白蒼蒼雲松落落綺皓春風爾來為阿誰蝴蝶忽然滿芳草秀眉霜雪顔桃李一作桃李貌骨清髓緑一作青髓緑髮長美好稱是秦時避世人勸酒相歡不知老各守麋鹿志耻隨龍虎爭歘起安太子漢皇乃復驚顧謂戚夫人彼翁羽翼成歸來商山下泛若雲無情舉觴酬巢由洗耳何太一作獨清浩歌望嵩嶽意氣遙相傾相勸酒李賀羲和騁六轡晝夜一作夕不曽閒彈鳥崦嵫石扶馬蟠桃鞭蓐收既斷翠柳青帝更一作又造紅蘭堯舜至今萬萬歲數子將為傾蓋間青錢白璧買無端丈夫快志一作意方為歡臛􅏲臛熊何足言㑹須鍾飲北海箕踞南山歌淫淫管愔愔橫波好送一作别雕題金人生得意且如此何用强知元化心相勸酒終無醉伏願陛下鴻名絲一作終不歇子孫綿如石上葛東一作來洛一無此字長安車軿軿中有梁冀舊宅石崇故園勸酒李敬方不向花前醉花應解笑人只憂連夜雨又過一年春日日無窮事區區有限身若非杯酒裏何以寄天真同前聶夷中白日無定影清江無定波人無百年夀百年復如何堂上陳美酒堂下列笙歌與君入醉鄉醉鄉樂天和歲歲松柏茂日日丘陵多君看終南山萬古青峩峩二灞上送行客聽唱行客歌適來橋下水已作渭川波人間榮樂少四海别離多但恐别離淚自成苦水河勸爾一杯酒所贈無餘多飲酒樂前人日月似有事一夜行一周草木猶須老人生得無愁一愁解百結再飲破百憂白髮欺貧賤不入醉人頭我願西江集作東海水盡向杯中流安得阮步兵同入醉鄉遊文苑英華卷一百九十五
