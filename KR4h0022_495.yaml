body:
  text: 文苑英華卷四百九十五宋李昉等編任官議庶官遷次遲速一道革吏部之弊一道牧宰考課一道使百職修皇綱振一道議封建論郡縣一道使官吏清廉一道省官併俸減使職一道議百司食利錢一道議職田一道審官一道大官乏人一道使臣盡忠人愛上一道議庶官遷次遲速白居易問先王建官升降有制遷次有恆此經久之道也或云賞善罰惡者不踰時月又曰為官吏者可長子孫豈今古之制殊乎不然何遲速之異如此乎今欲速遷而勸善恐誘躁求之心令久次而望功慮興滯用之歎疾徐之制何以為中此卷並於白居易集凖備制科七十五門中摘取一十二篇其問答皆白居易擬作對臣聞孔子曰茍有用我者三年有成舜典曰三載考績三考黜陟幽明雖聖賢為政未及三年不能成也雖善惡難知不過九載必自著也由此而論為官吏者不可速遷也不可久次也若未三年而遷則政未立績未成且躁求之心生而馴致之化廢矣若過九載而不轉則明不陟幽不黜而勸善之法缺懲惡之典隳矣大凡內外之官其略如此然則最與天子共理者莫先于二千石乎臣竊見比來諸州刺史有未兩考而遷者豈為善集作成政之速於聖賢邪將有司考察之不精邪不然何遷之遽也又有踰一紀而不轉者豈善惡未著莫得而知邪將有司遺忘而不舉邪不然何轉之遲也臣伏見順宗皇帝詔曰凡內外之職四考遞遷斯實革今之弊行古之道也然臣猶以為吏能有聞者既以四考遷之政術無取者亦宜四考黜之將欲循其名辨其實則在陛下奬糾察之吏督考課之官使别其否臧明知黑白仍命曰雖久次者不得踰於四載雖速遷者亦待及於三年此先王較能之大方致理之要道也伏惟陛下試垂意而察焉革吏部之弊問吏部之弊為日久矣今吏多於貟其故何因官不得人其由安在姦偽日起其計何生馳騖日滋其風何自欲使吏與貟而相得名與實而相符趨競巧濫之弊消公平政理之道長妍媸者不能欺於藻鏡錙銖者不敢冒於銓衡豈無良謀以救其弊對對臣伏見吏部之弊為日久矣時皆共病不知其然臣請備而言之臣聞古者計户以貢士量官而署吏故官不乏吏士不乏官士吏官員必相參用今則官倍於古吏倍於官入色者又倍於吏也此由每嵗假文武而筮仕者衆冒資蔭而出身者多故官不得人員不充吏是以爭求日進集作至姦濫日生斯乃為弊之一端也臣又聞古者州郡之吏牧守選而用之府寺之寮公卿辟而署之其餘者乃歸有司有司所領既少則所選必精此前代所以得人也今則內外之官一命已上嵗羡千數悉委吏曹吏曹按資署官猶懼不給則何暇考察名實區别臧否者乎至使近代以來寖而成弊真偽爭進共徵循資之書賢愚莫分同限停年之格才能者淹滯而不振巧詐者因緣以成姦此又為弊之一端也今若使內外師長者各選其人分署其吏則庶乎官得其才矣使諸色入仕者量省其數或間以年則庶乎士不乏官矣官得其才則公平政理之道所由長也士不乏官則趨競巧濫之弊所由消也矧又減銓衡之偏重則力不撓而易平矣分藻鏡之獨鑒則照不疲而易明矣與夫羣集作千品折於一面百職斷於一心功相萬也得失相懸豈不逺矣臣以為芟煩剗弊莫尚於斯牧宰考課議殿最未精又政不由已問今者勤恤黎元之隱精求牧宰之才亦既得人使之為政何以撫字之方尚未副我精求之旨疲困之俗尚未知我勤恤之心豈才未稱官將人不求理備陳其故以革其非對臣聞王者之設庶官無非共理者也然則庶官之理同歸而牧宰之用為急蓋以邦之賦役由之而後均上之風化由之而後行人之性命繫焉國之安危屬焉故與夫庶官之寄輕重不可齊致也臣伏見陛下勤恤黎元之心至矣慎擇牧宰之旨深矣然黎元之理尚未副陛下勤恤之心牧宰之政尚未稱陛下慎擇之旨非人不求理非才不稱官以臣所窺粗知其由矣臣聞古之賢者為善不待勸也何哉性不忍為惡耳愚者為不善雖勸而不遷也何哉性不能為善耳賢愚之間謂之中人中人之心可上可下勸之則遷於善舍之則陷於惡故曰懲勸之廢也推中人而墜於小人之域懲勸之行也引中人而納諸君子之塗是勸沮之道不可一日無也况天下之牧宰中人者多去惡遷善皆待勸沮伏見當今殿最之法具備黜陟之令甚明然則就備之中察之者未甚精也就明之中奉之者未甚行也未甚精則臧否同貫未甚行則善惡齊驅雖有和璞之真不能識也雖有齊竽之濫何由知之如此則豈獨利淫亦將失善善茍未勸淫或未懲欲副陛下勤恤之心稱陛下慎擇之旨或恐難矣臣又請以古事驗之臣聞唐虞之際也敷求俊乂而四凶見用及三考黜陟而四罪乃彰則知雖至明也尚或迷真偽之徒雖至聖也不能去考察之法故其法張則變曲為直如蓬生於麻也其法弛則變香為臭似蘭化為艾也且聖人之為理豈盡得賢而用之乎豈盡知不肖而去之乎將在乎秉其樞操其要剗邪為正變觚為圎能使善之必遷不謂善之盡有能使惡之必改不謂惡之盡無成此功者非集作無他懲勸之所致也則考課之法其可輕乎臣又見當今牧宰之內甚有良能委之理人亦足成政所未致者義有其由臣聞牧宰古者五等之國也於人有父母之道焉於吏有君臣之道焉所宜弛張舉措由其心威福賞罰懸於手然後能鎮其俗移其化也今縣宰之權受制於州牧州牧之政取則於使司迭相拘持不敢専達雖有政術何由施行况又力役之限賦斂之期以用之費省為求不以人之貧冨為度以上之緩急為節不以下之勞逸為程縣畏於州州畏於使雖有仁惠何由撫綏此猶束舟楫而望濟川絆騏驥而求致逺臣恐龔黃卓魯復生於今日亦不能為理矣問使百職修皇綱振在乎革慎默之俗對夫百職不修萬事不舉皇綱弛而不振頽俗蕩而不還者由乎君子讜直之道消小人慎默之道長也臣伏見近代以來時議者率以拱默保位者為明智以柔順安身者為賢能以直言危行者為狂愚以中立守道者為凝滯故朝寡敢言之士庭鮮執咎之臣自國及家寖而成俗故父訓其子曰無介直以立仇敵兄教其弟曰無方正以賈悔尤識者腹非而不言愚者心競而是效致使天下有目者如瞽也有耳者如聾也有口者如含鋒刃也慎默之俗一至於斯此正士直臣所以退藏而長太息也豈直如此而已哉蓋慎默積於中則職事廢於外強毅果斷之心屈畏忌因循之性成反謂率職而舉政者不逹於時宜當官而行法者不通於事變是以殿最之文雖書而不實黜陟之法雖備而不行欲望善者勸惡者懲百職修萬事舉不可得也然臣以為歷代之頽俗非國朝不能革也國朝之皇綱非陛下不能振也振革之術臣粗知之何者夫人之蚩蚩惟利是務若利出於慎默則慎默之風大起若利出於讜直則讜直之風大行亦猶冬日之陽夏日之陰不召物而物自歸之者無他溫涼之利所在故也伏惟陛下以至公統天下以至明御羣臣使情偽無所逃言行無所隱有若讜直強毅舉正彈違者引而進之有若慎默畏忌吐剛茹柔者推而逺之使此有利彼無利安得不去彼取此乎斯謂俾人日徙善逺罪而不自知也如此則百職修萬事舉皇綱振頽俗移太平之風由斯而致矣議封建論郡縣問周制五等其弊也王室衰微秦廢列國其敗也天下崩壞漢封子弟其失也侯王僣亂何則為制不同同歸於弊也故自古及今議其是非者多矣今若建侯開國恐失隨時之宜如置守専城慮乖稽古之議考其要旨其誰可從又問封建之制肇自黃唐郡縣之規始於秦漢或沿或革以至國朝今欲子兆人家四海建不拔之業垂無疆之休大鑑興亡從長而用無論古今擇善而行侯將守而何先郡與國而孰愈具書于䇿當舉行之對臣聞封建之廢久矣是非之論多矣異同之要歸于三科或曰周人制五等封親賢其弊也諸侯擅征伐陪臣執國命故蠶食瓜剖以至於衰滅也而李斯周青之議繇是興焉又曰秦皇廢列國棄子弟其弊也萬人無定主九族為匹夫故魚爛土崩以至於覆亡也而曹冏士衡之論繇是作焉又曰漢氏侯功臣王同姓其失也爵號太尊土宇太廣故鴟張瓦解以至於悖亂也而朝錯主父之計由是行焉然則秦懲周之弊也既以孤立而易衰漢鑒秦之亡也亦以矯枉而過正歷代之説無出於此焉以臣所觀竊謂知其一未知其二也何者臣聞王者將欲家四海子兆人垂無疆之休建不朽之業者在乎操理柄立人防𨗳化源固邦本而已矣是故刑行德立近恱逺安恩信推於中惠化流於外如此則四夷為臣妾况海內乎雖置守罷侯亦無害也若法壞政荒親離賢棄王澤竭于上人心叛于下如此則九族為讎敵况天下乎雖廢郡建邦又何益也故臣以為周之衰滅者上失其道天厭其德非惟封建之弊也秦之覆亡者君流其毒人離其心非惟郡縣之咎也漢之禍亂者寵而失教立不選賢非獨強大之故也由是觀之茍固其本𨗳其源雖郡與縣俱可理而安矣苟踰其防失其柄雖侯與守俱能亂且危矣伏惟陛下慮逺憂近鑒古觀今以敦睦親族為先不以封王為急以憂集作優勤勞逸為念不以建侯為私集作思以尊賢寵德為心不以開國為意以安撫黎元為事不以廢郡為謀則無疆之休不拔之業在於此矣况國家之制垂二百年法著一王理經十聖變革之議非臣敢知問官吏清廉在均其祿厚其俸對臣聞為國者皆患吏之貪而不知去貪之道也皆欲吏之清而不知致清之由也臣以為去貪致清者在乎厚其祿均其俸而已矣夫衣食闕於家雖嚴父慈母不能制其子况君長能檢其臣吏乎凍餒切於身雖巢由夷齊不能固其節况凡人能守其清白乎臣伏見今之官吏所以未盡貞廉者由祿不均而俸不足也不均者由所在課料重輕不齊也不足者由所在官長侵尅不已也甚者則有官秩等而祿殊郡縣同而俸異或削奪以過半或停給而彌年至使衣食不充凍餒並至如此則必蹈白刃冒水火而求私利也况可使撫人字物斷獄均財者乎夫上行則下從身窮則心濫今官長日侵其吏而望吏之不日侵於其人不可得也蓋所謂渴馬守水餓犬護肉則雖日用刑罰不能懲貪而勸清必矣陛下今欲革時之弊去吏之貪則莫先於均天下課料重輕禁天下官長侵尅使天下之吏溫飽充於內清廉形於外然後示之以耻糾之以刑如此則縱或為非者百無一二矣集作也問省官併俸減使職對臣聞古者因人而置官量賦而制祿故官之省置必稽人户之衆寡祿之厚薄必稱賦入之多少俾乎官足以理人人足以奉吏吏有常祿財有常征財賦吏員必參相得者也頃以兵戎屢動荒沴荐臻户口流亡財征減耗則宜量其官而省之併其祿而厚之故官省則事簡事簡則人安祿厚則吏清吏清則俗阜而天下所由理也然則知清其吏而不知厚其祿則飾詐而不廉矣知厚其祿而不知省其官則財費而不足矣知省其官而不能選其能則事壅而不理矣此三者迭為表裏相須而成者也伏惟陛下詳而行之臣又見兵興以來諸道使府或因權宜而置職一置而不停或因暫勞而加俸一加而無減致使職多於郡縣之吏俸優於臺省之官積習生常煩費滋甚今若量其職員審其祿秩使多寡有常數厚薄得其中則費不廣而下無侵削之患矣職有常數則事不煩而人無勞擾之弊矣此又利害之相懸逺者伏惟陛下念而救之問議百司食利錢對臣伏見百司食利利出於人日給而經費有常日徴而倍息無已然則舉之者無非貧户徵之者率是逺年故私財竭於倍稱集作相非官課積為逋債至使公食有闕人力不堪弊既滋深法宜改作且王者惡言求利患其不均况天下之錢一也謂之曰利曷若謂之曰征乎取之於寡曷若取之於衆乎今者日計其費嵗會其用舉為定數命曰食征隨兩稅以分徵使萬人而均出散之天下其數幾何故均之於衆則貧户無倍息之弊矣入之有程則公食無告闕之慮矣公私交便其在兹乎問議百官職田對臣伏以職田者職既不同田亦異數內外上下各有等差此亦古者公田稍食之制也國家自多事已來厥制不舉故稽其地籍而田則具存考以户租而數多散失至有品秩等官署同而廪祿厚薄之相懸近乎十倍者矣今欲辨內外之職均上下之田不必乎創新規其在乎舉舊典也臣謹按國朝舊典因品而授地計田而出租故地之多少必視其品之髙下租之厚薄必視其田之肥磽如此則沃瘠齊而户租均等列辨而祿食足矣今陛下求其典而典存焉索其田而田在焉誠能申明而舉行之則前弊必自革矣審官量才受職則政成事舉問官既備而事未舉才既用而政未成將欲正之其失安在對臣聞夫官既備而事未舉才既用而政未成者由官與才不相得也且官有大小繁簡之殊才有短長能否之異稱其任則其政立枉其能則其事乖故先王立庶官而後求人使乎各司其局也辨衆才而後入仕使乎各盡其能也如此則官雖省才雖半可得而理矣若以短任長以大授小委其不可而望其可強其不能而責其能如此則官雖備才雖倍無益於理矣故曰任小能於大事者猶狸捕虎而刀伐木也屈長才於短用者猶驥捕鼠而斧剪毛也所以不相及豈不宜哉王者誠能量衆才之短長審庶官之小大俾操鑿枘者無圜方之謬備輪轅者適曲直之宜自然人盡其能職修其要彛倫日序庶績日凝又何患乎事不舉而政未成哉大官乏人由不慎選小官問國家台衮之材臺省之器胡然近日稍乏其人將欲救之其故安在對臣伏見國家公卿將相之具選於丞郎給舍丞郎給舍之材選於御史遺補郎官御史遺補郎官之器選於祕著校正畿赤簿尉雖未盡是十恆八九焉然則畿赤之吏不獨以府縣之用求之祕著之官不獨以校勘之用取之其所責望者乃丞郎之椎輪公卿之濫觴也則選用之際宜得其人臣竊見近日祕著校正或以門地授畿赤簿尉惟以資序求未集作不商較其器能不研覆其才行至使頃年以來臺官空不知所取省郎闕不知所求豈直集作唯乏賢誠亦廢事且以資序得者僅能參其簿領以門地進者或未任於鉛黃臣恐台衮之才臺省之具十年以後稍乏其人又頃者有司懲趨競之流杜徼幸之路俾進士非科第者不授校正校正欠資考者不署畿官立而為文權以救弊蓋一時之制非可久之術今者有司難於掄材易於注擬因循勿改守以為常至使兩畿之中數縣之外雖資序皆當其任而名實莫得而聞故每臺省缺貟曾莫議擬則守文之弊一至於斯伏願思以後艱革其前失廣丞郎椎輪之本疏公卿濫觴之源如此則良能之材必足用矣要劇之職不乏人矣問使臣盡忠人愛上在乎明報施之道對夫欲使臣盡忠節人心愛上則在乎明報施之道也傳曰美惡周必復又曰其事好還然則復與還皆報施之謂也夫日月不復則晝夜不分隂陽不復則寒暑不行善惡不復則君臣不成昔者五帝接其臣以道故臣致其君以德也三王使其臣以禮故其臣事君以忠也秦漢以降任其臣以利故其臣奉君以賈道賈道者利則進不利則退故君昏寡救惡之士國危鮮致命之臣是以其君獨安獨危其臣亦獨憂獨樂君臣之道既阻於上則億兆之心不得不離於下也故曰君視臣如股肱則臣視君如元首君待臣如犬馬則臣視君如路人君愛人如赤子則人愛君如父母君視人如草芥則人視君如冦讎孔子曰審吾之所以適集作道人知人之所以來集作求我也則盡忠愛上之理在於此不在於彼矣文苑英華卷四百九十五
