body:
  text: 文苑英華卷三百五十六宋李昉等編騷三弔屈原一首九諷系述一首九諷九篇反招魂一首悼賈一首弔屈原柳宗元後先生蓋千祀兮余再逐而浮湘求先生之汨羅兮攬蘅若以薦芳願荒忽之顧懷兮冀陳辭而有明集作光先生之不從世兮惟道是就支離搶攘兮遭世孔疚華蟲薦壤兮進御羔褎牝雞咿嚘兮孤雄束咮哇咬環觀兮蒙耳大吕堇喙以為羞兮焚棄稷黍岸詩宜岸宜獄集作犴非獄之不知避兮宫庭之不處陷塗藉穢兮榮若繡黼榱折火烈兮娛娛集作娭娭笑舞讒巧之嘵嘵兮惑以為咸池便媚鞫恧兮美愈集作逾西施謂謨言之怪誣兮反置瑱而逺違匿重痼以諱避兮進俞緩之不可為何先生之凛凛兮厲針石而從之一有但字仲尼之去魯兮曰吾行之遲遲柳下惠之直道兮又焉往而可施今夫世之議夫子兮曰何隱忍而懷斯惟逹人之卓軌兮固僻陋之所疑委故都以從利兮吾知先生之不忍立而視其覆墜兮又非先生之所志窮與逹固不渝兮夫惟服道以守義矧先生之悃愊兮蹈大故而不二沉璜瘞佩兮孰幽而不光荃蕙蔽匿兮胡久而不芳先生之貌不可得兮猶髣佛其文章托遺編而歎喟兮渙余涕之盈睢呵星辰而驅詭怪兮夫孰救於崩亡何揮霍夫雷電兮苟為是之荒茫耀姱辭之矘朗兮世果以是之為狂哀余姱之坎坎兮獨愠憤而增傷諒先生之不言兮後之人又何望中集作忠誠之既內激兮抑咸集作銜忍而不長芉為屈之幾何兮胡獨焚其中腸吾哀今之為仕兮庸有慮時之否臧食君之祿畏不厚兮悼得位之不昌退自服以默默兮曰吾言之不行既偷風之不可去兮懷先生之可忘此篇第一千卷哀吊門重出今已削去九諷系述皮日休在昔屈平既放作離騷經正詭俗而為九歌辨窮愁而為九章是後詞人托而為之皆所以嗜其麗詞撢集作探其逸藻者也至若宋玉之九辨王褒之九懷劉向之九嘆王逸之九思其為清怨集作愁素艷幽快集作抉古秀皆得芝蘭之芬芳鸞鳯之毛羽也自屈原已集作以降繼而作者皆相去數百祀足知其文難述其詞罕繼者矣大凡有文人不擇難易皆出於毫端者乃大作者也揚雄之文孔孟乎而有廣騷也梁竦之詞班馬乎其一作而有悼騷也又不知王逸奚罪其文不以二家之述為離騷之兩派也昔者聖賢不偶命必著書以見志况斯文之怨抑歟噫吾之道不為不明吾之命未為未文粹作不偶而見志於斯文者吾懼來世任臣之君因一作用謗而去賢持祿之士以猜而逺德故復嗣數賢之作以九為數命之曰九諷焉嗚呼百世之下復有修離騷章句者乎則吾之文未過不為乎廣騷悼騷也九諷正俗粵句亹之薄俗兮其風狡而且苦吾欲以直道揠烏入切其邪心兮皆逞容而莫顧前而誨行兮後止髙而踰集作喻仰兮下俯咸為疑吾之儇音翾為愚兮並以吾之㦟音埋為傴羌靈修之乃吾知兮先職我而為輔奈其臣之狺狺魚巾切兮乃不知吾之所撫亡輔切吾欲以明哲之性辨君臣之分兮定文物之數吾欲以正直集作訏之道兮進忠賢而退姦豎吾欲以醇釀之化兮反當今而為往古吾欲以忖度之志兮定觚圜而反規矩念儓覆上臺下匐文粹作核之在位兮若梟羊之當路內灼怛以如倳側吏切兮復何知其所訴乃指天而鬱悠兮將天奪乎國之祐永惄惄以何言兮將求知於吾祖禺謗有肪兮墨而謂之不潔有泉兮壅而謂之不決有茝兮轥而謂之不芳有軸兮鍥苦結反而謂之不轍聲咺呼逺切唏呼几切以無音兮氣鬱悒而空咽集作噎既魚覲切川文粹作惄惄以憎懼兮又謾謾而不訣誣彭祖以為孺兮譎殤子以為老夥衆人之難信兮撏夸者之不悅侫為贅兮何去姦為龎兮莫劀讟為轡兮莫銜謗為玉兮何切彘既䑋而羊切而必烹兮木方菱土鬯匕子公切兮必折心􅀈􅀈以集作而似車兮思綿綿而如瓞手欲動兮似拲足將行兮如絏既不辨於文粹作其顔跖兮遂一貫於堯桀吾哀生之不逄兮奚至死而惙惙念帝座之不爣他郎切兮胡集作故交光於卷舌既何路以自辨兮遂沒齒而癆剌見逐靳尚之言兮美於集作如嬴子蘭之氣兮醲於酲既怒􅗻音綿以相向兮遂裹足而南征靣㥾㥾音匿以奚文粹作美色兮心􅀈􅀈音榮以集作而何情耳方聰兮忽瞶集作揆目正集作方視兮忽肓日當午兮便是天方晝兮不明欲泣兮有血將啼兮失聲望靈修兮似失出國門兮若驚軔識怨兮欲緩駟知愁兮復明既徜徉兮夏水復眷戀兮南荆嗟余夙稟於大訓兮涵漬國之忠貞既貿者之莫余容兮向重蒼而自明既婪仁以慿義兮遂鈲匹歷切漢書鉤鈲折亂注鈲破也信而槻音規誠將真宰者一無此字之不仁兮胡為役余以此生彼鷽音預斯之蟊賊兮固不能容乎鶬鶊彼茨菉之藂穢兮固不能讓於杜蘅已矣乎國無人兮莫我留將訴帝于玉京悲遊荷為裯丁牢切兮芰為襬彼皮切荃為䘿居匆切兮薜為褘弭吾棹兮灃之浦駐吾楫兮湘之湄悲莫悲兮新去國怨莫怨兮新相思幽篁蕭兮靜晚清渏淡兮去遲湘君欲出兮風水急帝子不來兮煙雨微芷既老兮深一作白藥日將暮兮紅萎朝浮乎鶻􅕭音啼夕呌乎羇雌􅀈集作􅀈漾漾兮不止潢音黃悠悠兮何之日出沒兮北渚雲依稀兮九疑既無人以辨余兮又何心而怨咨退不解其㤞音懌􅭛音悸進不知其忸怩寒蜩怨而無聲兮古木凄其寡枝嗟吾魄之不返兮千秋萬嵗湘中馳憫邪慨天道之不明兮何獨生此大侫若猰貐之能冠兮當一國而持柄見亂臣之反詐兮信其主以不競轍已覆而又遵兮仡將翻而不整不思心腹之疾兮又玩膏肓之病竟客死于咸陽兮終不作毒王之幸既養菟音莬以遺患兮遂倒釬音犴而授柄將諛臣之肆禍兮豈上天之付命粵吾大以為不可兮彼以災而為慶儻靈修之魄有知兮刷吾耻於下暝端憂有一美人兮端憂千喑萬惄兮曾不得以少休腸結多以莫回兮淚啼劇而不流王孫何處兮碧草極目公子不來兮清湘滿樓汀邉月色兮曉復一作將曉浦上蘆花兮秋復秋天泬寥以似悴兮峯巉崒以如抽篔簹颯兮兩岸杜若死兮霜洲遺余程兮灃之側整余陌兮湘之幽望汝嬃兮秭歸夢懷宋玉兮荆門愁欲向天以噭咷兮寸晷不可以少留又不知吾魂之所處兮永寞寞以悠悠紀祀山之巔兮水之涘桂為祠兮蘭為位一作祀執玉桴兮扣雷鼓奠金􅡸音摩兮滴蜉蟻薦瓊芳兮望暮雲獻椒醑兮拜寒水祝肹蠁以怪談兮巫妖冶而魅醉波倐忽集作閃倐兮湘君風集作竹蕭踈兮帝子日將暮兮河伯秋正深兮山鬼神之化兮何方人之艱兮至此胡不化其邪而為直集作正兮胡不返其戾而為義胡不轉其亡而為興兮胡不易其亂而為治但血食于下國兮曾不少禆於有為集作位吾將乘青螭而駕白虬兮將謁帝而訴神之纍請天弧發鏃兮天棓行箠神速悔尤俾吾靈修而昜志捨慕粵吾秉心兮潔於瑾瑜芬其德而芳其道兮榮於蘼蕪將興國以見罪兮擬佐王而蒙辜彼羣小之茸茸兮如慕臭之蚍蜉以大鵬為雀兮以康瓠為㼶以衮衣為褋兮以黎丘為墟以鄭姬為醜兮以子産為愚以鮑焦為貪兮以孔聖為誣吾將奮鱗於太空兮奚獨慕此江湖吾將發榮於蟠桃兮奚獨守此蒿蔞吾將蕩其魄兮驂風軌集作軔與乾一作虬車謁帝於𡨕𡨕之中兮秉其生殺之樞將飄飄以髙逝兮亦何必懷此姦文粹作侫邪之故都潔死堯死兮舜滅禹殄兮湯絶似玉兮將沉似金兮永折集作沒行以仁兮止以義生以貞兮死以潔念余曾不足以蹈聖閫兮亦慕茲而自恱湘浦兮煙沉沅江兮風切顧影兮自憐撫躬兮永訣鬼慘兮天愁一作神悲雨泣兮泉咽竟汨沒以奫淪兮永幽憂而拂鬱湘之山兮未盡湘之流兮不竭千秋兮愁雲萬古兮明月靈均之寃兮孰能銷其氣靈均之愁兮孰能釋其結來者之取集作自鑒兮無致恨於牙孽反招魂并序前人屈原作大招魂或云景差作疑不能明宋玉作招魂皮子以為忠放不如守介而死奚招魂為故作反招魂一篇以辨之辭曰承溟涬之命兮付余才以一作而輔君君既不得乎志兮余飄飄而播遷余將蕩大空而就滅兮君又招余俾復身余詣帝以請訣兮帝俾巫陽以筮云巫陽御一作語余以不可歸兮故作詞以招魂集作君乃下招曰君集作余兮歸來故都愼不可留些其君雄虺兮其民封狐些食民之肝膈以為其肉兮摘民之髮膚以為其衣些朝刀鋸而暮鼎鑊兮上曖昧而下墨呆上眉下癡些君兮來歸故都愼不可留些余昔為比干之魂兮干僇而余去些未聞干貪生以自招兮余竟潔其所處些君兮歸來故都愼不可留些余昔為伍胥之魂兮胥僇而余逝些未聞胥貪位以惜生兮執屬鏤而不滯些君兮歸來故都愼不可留些余昔為𢎞演之魂兮演自殘而余行些未聞演惜命以不死兮俾其義而義明些君兮歸來故都愼不可留些帝命余以輔君兮亦以君之忠介自今以忠而見聞歟尚盤桓而有待些將自富貴而入羈旅兮其志乃悔些將戀骨肉而惜家族兮何不自裁去聲些梟食母而鏡集作獍食父兮見禽獸之為生些苟凶殘者眉夀兮食梟鏡集作獍之集作而同名些君乎愼勿懷故都之戀歸來乎余為君存千古忠烈之榮名集作枯些悼賈并序前人余嘗讀賈誼新書見其經濟之學大矣哉真命世王佐之才也自漢氏革嬴髙祖得於矢石不暇延儒生文粹作人及為天子制缺度弛處華而夷是時獨有叔孫生能定朝儀其制未悉唯生草其書欲以制屈諸侯推定正朔調革輿服通流貨幣天不祐漢絳灌興謗竟枉其道出傅湘南集作沅生自以不得志哀屈平之放逐及渡沅文粹無此字湘沉文以弔之故其辭曰􅀈丑離切九州而相君兮何必懷此都也一作此故都噫余釋生之意矣當戰國時屈平不用於荆則有齊趙秦魏矣何不捨荆而相他國乎余謂平雖遭靳尚子蘭之讒不忍舍同姓之邦為他國之相宜矣然則生之見棄又甚於平當漢時舍乎帝則為諸侯矣如適諸侯則新書之文抑諸侯而尊天子也捨諸侯則胡越矣如適胡越則新書之文滅胡越而崇中夏也是以其心切其憤深其詞隱而麗其藻傷而雅余悲生哀平之見棄又生不能自明一作用其道嗚呼聖賢之文與道也求知與用苟不在於一時而在于百世之後者乎其生之哀平歟余之悲生歟吾之道也廢與用幸未可知但不知百世之後得其文而存之者復何人也咸通癸未中南浮至沅湘復沉文以悼之其詞曰粵炎緒之媽綿兮其國度之未彰天錫生以命理兮冀其道之益光偉吳公之知賢兮道其名於文皇既􅀈音刃􅂒音軫以召之兮遂位之於上庠愍耄儒之憃窒集作愚兮對天問文粹作懟天間之不臧既羣愚之讓俊兮馳其譽之煌煌嘆集作嗟大漢之丕緒兮蚪其賢於汙潢上下溷而不分兮議削制於驕王殺僇棼而不制兮斷捽胡與集作其冦攘羌虜坌以侵華兮曾不能以抑強餌其嗜之延延兮實一作定三代之計良念五德之更承兮論尵結而不綱乃秉臆以興説兮數用五而色上文粹作尚黃又諸侯以開國兮輸其租於咸陽曾不得以撫民兮俾其君兮可忘請紆􅀈音愚以乘印兮各馳化于所疆上既説而欲大通兮遭絳灌于東陽道既擯兮何明何出傳于三集作於阮湘侼音敖沅波之滃集作翁洫兮或漁集作漾棹以夷猶望靈均之沒所兮顮音頻其心之怊怊臨汨羅之浩漾兮想懷沙之幽憂森一作卉樛蘿以蓊鬱兮時􅀈狖以相號霧雨暗于北渚􅘿䗤毒乎芳洲景黯沮以不明兮若夫悼乎離騷香依依兮杜若韻凄凄集作萋萋兮䔁􅀢上音栗下音勞山隱隱以掃空兮煙微微而淡集作淡秋吾不知所感兮淚懭悢以橫流當抱憤于渺藩兮曽無足以少休既菼薍以傷思兮聞集作又鵂鶹而動愁嗚呼哀哉世既不平頷吾感切吾道以為非兮吾復何依蘋蘭憔悴兮稂莠繁滋麟鳯匿迹兮梟鏡文粹作獍騰威憒文粹作哲匠罷斤文粹作斧兮拙者搆之離婁閉目兮瞽者揚眉子都蒙袂兮敦洽騁姿嗚呼哀哉亦先生之尤也貽其世之不可兮何不解而去位文垂萬世之名兮取舍在此奚自取謗於童羖兮乃憫然而為纍蓋伊尹三就五就之心兮冀其民之可治奈惛惛之不悟兮又被之以非議幸一人之再覺兮答受釐之奧義既孱王以墮駕兮乃寃慟而已矣訊曰君不明兮莫我知幽都寂兮和涕歸文懸日月兮俟後聖用之大故忽兮其何足悲文苑英華卷三百五十六
