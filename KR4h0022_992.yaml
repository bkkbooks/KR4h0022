body:
  text: 文苑英華巻九百九十三宋李昉等編親族三祭姨文二首祭女文二首祭姪文一首祭姪女文二首祭徐氏姨文李商隱嗚呼追訣慈念一十八年罪積行違上下無禱天怒猥集不誅其身再丁憫凶藐無恃怙號潰荼裂心摧骨崩獲見諸甥来奉遷合舊物半同於泥滓新阡方列於松楸斷手折足厥痛非擬終天殁地此誠莫伸寃痛蒼天苦孤蒼天始某兄弟初遭家難内無強近外乏因依祗奉慈顔被䝉訓勉及除常制方志人曹以頑陋之姿辱師友之義獲因文筆實忝科名三千集作遷有司兩被公選再命芸閤叨跡時賢仲季二人亦志儒墨於顯揚而雖未在進脩進作脩進而不隳永惟幽靈盍亦垂鍳今者苴麻假息糞土偷存不即殞傷盖亦有以伏以奉承大族載屬衰門三弟未婚一妹處室息𦙍猶闕家徒索然將恐烝嘗有曠闕之憂邱隴絶芟除之主延駐晷刻不敢自私又以祖曽之前未一完兆骨肉之内猶有旅魂將有来兹克用通便以顯之義雖不敢望無忝之訓庶幾或存靈其聞之必將加憫然有以沒齒懐恨粉身難忘者以靈之懿茂而不登遐夀不生賢人使别女致哀猶子為後哀哀天地云胡不仁黙黙神祗其何可訴今嵩奐二子既為我甥誓當撫之以慰幽抱男勸其學使得祿仕女求其偶必擇賢良縱乖宅相之徵庶冺忽諸之歎夀堂宿啟潜舟既移那期求訣之悲復見重開集作關之兆以祥忌云近哀憂載迷不獲臨壙逹誠撫柩致奠東望景亳椎心仆身具禭擇蔬灑以淚血日慘風逺叫號無聲伏惟明靈一賜臨鍳孤苦蒼天不孝蒼天祭裴氏姨文前人嗚呼哀哉靈有行於元和之年返𦵏於會昌之歲光隂迭代三十餘秋得不以既𦵏集作笄闕廟見之儀枚卜二字集作改卜言舉歸宗之禮不幸不祐天實為之椎心泣血孰知所訴恭惟先德實紹𤣥風良時不来百里為政愛女二九思託賢豪誰為行媒来薦之子雖琴瑟而著詠終天壌以興悲謂之何哉繼以沉恙禱祠無冀奄忽凋違時先君子以交辟貟来南轅已轄接舊隂於桃李寄蹔殯之松楸此際兄弟尚皆乳抱空驚啼於不見未識會於沉寃淛水東西半紀漂泊某年方就傅家難旋臻躬奉板輿以引丹旐四海無可歸之地九族無可倚之親既祔故邱便同逋駭生人窮困集作異聞見無所及衣裳外除㫖丼是急乃占數東甸傭書販舂日就月將漸立門構清白之訓幸無辱焉既登太常之第復忝天官之選免跡縣政刋書祕邱榮飬之志纔通啟動之期有漸而天神降罰艱棘再丁弱弟㓜妹未筓未冠世集作𦙍緒猶闕家徒屢空載惟家長之寄偷存晷刻之命號天呌地五内崩摧然亦以靈寓殯獲嘉向經三紀歸祔之禮闕然未修是冀苟全得終前限屬劉孽叛換逼近懐城懼罹焚發之災永抱幽明之累遂以前月初吉攝縗告靈號歩東郊訪諸耆舊孤魂何託旅櫬奚依垂興欲堕之悲幾有將平之恨斷手觧體何痛如之灑血荒墟飛走同感伏惟朝夕二奠不敢乆離遂遣羲叟一人主張啟奉抱頭拊背戒以信誠附身附棺庶無遺闕壇山榮水實惟我家靈其永歸無或栖寓嗚呼哀哉靈沉綿之際殂背之時某初觧扶床猶能託靣長成之後豈忘遷移頃者以先妣年高兼之多恙每欲諮畫即動作咸涕泣既繁寢膳稍减雖云通禮亦所難言荏苒于斯非敢怠忽今則南望顯考東望嚴君伯姨在前猶女在後克當寓殞疑作殯歸養幽都雖歿者之兆宅永安而存者之追攀莫及又以十二房舊城風水為災胡子彭兒藐然孤小雖古無修墓著在典經而忘禮約情亦許通變今則已於左坎集作次别卜鄰集作鮮原重具棺衾再立封樹通年難遇周集作同是月異辰兼小姪寄兒亦来自濟邑騃魂稚魄依託尊靈逺想先域之旁纍纍相望重溝疊陌萬古千秋臨穴既乖飲痛何極唯安陽祖妣未祔仍世遺憂昨本卜孟春便謀啟合會雍店東下逼近行營𤇺火朝燃鼓鼙夜動雖徒歩舉櫬古有其人用之於今或為簡率潞冦朝彌則此禮夕行首夏已来亦有通吉儻天鍳孤藐神聽至誠獲以全兹免負遺託即五服之内更無流寓之魂一門之中悉共歸全之地今交親饋遺朝暮饘餬収合盈餘節省費耗所望克終逺事豈敢温飽㣲生苟言斯不誠亦神明誅責老舊僕使纔餘兩人靈之組繡餘工翰墨遺跡並收藏篋笥用寄哀傷嗚呼哀哉蕣夭當年骨還舊土箕箒尋移於繼室兄弟空哭於歸魂終天衘寃心骨分裂胞胎氣類寧有舊新呌號不聞精靈何去寓詞寄奠血滴緘封靈其歸来省此哀殞傷痛蒼天苦孤蒼天伏惟尚饗於郎集作湖州别女足娘墓文李翺維長慶元年歲次辛丑十二月癸亥朔十九日辛已父舒州刺史翺以酒果之奠敬别於第七女足娘子之靈吾以前月二十六集作八日䝉恩改舒州刺史以明日將領汝母等水路赴州故以酒果来與汝别嗚呼我為汝父汝則我集作吾女王命有期不得安處延陵䘮子𦵏不歸呉考之於禮其合矣夫汝之形骨託終此土汝之精神㝠寞不覩上及於天下及於泉鬼神有知汝骨安全永永終古無有後艱我来訣别灑涕集作涕淚漣漣嗚呼哀哉尚饗為外姑隴西郡君祭張氏女文李商隱吾配汝先世二十餘年七女五男撫之如一往在南海令子云亡藐爾兩孤未勝多難提挈而至踰涇渉河十年之間母子俱盡念汝差長慰吾最深女德婦容光映姻表秭歸為牧官閑俸優實獲我心用選良對笄旒纚纚環珮鏘鏘螽斯鳯凰兩有深慶汝天集作夫文章播于友朋身否命屯乆而不第郎寧合浦萬里乖離汝寄京師食貧終歲頃吾南返又往朝那汝實從夫適来岐下道途雖邇靣集猶妨金馬碧雞長懸魂夣及登農揆去赴天朝汝罷蒲津聿来胥會朝堂夜閤曲榻煴集作温爐稚子雛孫滿吾懐抱汝時不祐忽爾孀殘撫視寃傷載慟心骨旋移計下念汝支離卜室築居言遷頴上潞童作孽使節啟行﨑嶇關山暴露戎旅汝失所怗吾猶未亡念汝弟昆莫任堂構牽哀挽痛偷此殘生日往月来旋更氣序吾衰汝少吾病汝強誰謂一朝汝先吾逝五男未冠二女未笄哀憤之深難念集作全禮道章兒盧七取以依吾汝夫先邱逺在江渚群從之内官名且稀劉四頃年固難返𦵏始議權厝遂得嘉占白馬呈祥眠牛薦吉里名三趙地爾九城風水無虞巒岡信羙𦵏於所始古為逹生將命来雲自我為祖今汝之柩斯焉是歸嗚呼言自淮陽已臨洛宅素棺丹旐託宿城隅盤具盃醪儼然已備吾將臨汝用雪沉寃介婦諸孫憂吾衰齒俯令推測云有相妨俗忌巫言吾非甚信牽衣擁路固不可違集作遲女使僕奴寄詞而往肝腸兼潰血淚無行嗚呼曩昔容華生平淑婉漠然不見永矣何歸將籍掛諸天遥歸真路將福興靜域湏赴上生將為釁累所招遂淪幽界將是療治不至枉䘮韶年千感集作惑裝懐萬疑疊慮觸途氣結舉月心摧天實為之復將何訴嗚呼汝弟言護靈轜自始及今必誠必信棺衾華好封隧幽深永從汝夫以安𤣥路寃摧漬結殆集作文不勝書嗚呼有靈領吾此意祭姪集作兄子十二郎老成文韓愈貞元十九年五月二十六日季父愈聞汝䘮之七日乃集有能字衘哀致誠使建中逺具時羞之奠告汝二郎子集作十二郎之靈嗚呼吾少孤及長不省所怙惟兄嫂是依中年兄没南方吾與汝俱㓜從嫂歸𦵏河陽既又與汝就食江南零丁孤苦未嘗一日相離也吾上有三兄皆不幸早世承先人後者在孫唯汝在子唯吾兩世一身形单影隻嫂常撫汝指吾而言曰韓氏兩世在集作唯此而已汝時㓜小當不復記憶吾時雖能記憶亦未知其言之悲也吾年十九始来京城其後四年而歸視汝又四年吾往河陽省墳墓遇汝從嫂䘮来𦵏又二年吾佐董丞相集有幕字于汴州汝来省吾止一歲請歸取其孥明年丞相薨吾去汴州汝不果来是年吾蜀本有又字佐戎徐州使取汝使集無此字者始行吾又罷去汝又不果来吾念汝從于東東亦客也不可以蜀本有乆字圖乆逺者袁本作不可以圖圖乆逺者莫如西歸將而集作成家而致汝嗚呼孰謂袁本作逺汝遽去吾而集註作先殁乎吾與汝俱少年以為雖暫相别終當乆相與處故捨汝而旅食京師以求斗斛之祿誠知其如此雖萬乘之公相吾不以一日輟汝而就也去年孟東野往吾書與汝曰吾年未四十而視茫茫而髪蒼蒼而牙齒動摇念諸父與諸兄皆康強而早世如吾之衰者其能乆在集作存乎吾不可去汝不肯来恐旦暮死而汝抱無涯之戚也孰謂少者殁而長者存強者夭而病者全乎嗚呼其信然耶其夣耶其傳之非其真耶信也吾兄之盛德而夭其嗣乎汝之純明而不克䝉其澤乎少者强者而夭殁長者衰者而存全乎未可以為信也夣也傳之非其真也東野之書耿蘭之報則何為而在吾側也嗚呼其信然乎集作矣吾兄之盛德而夭其嗣矣汝之純明冝業其家者不克䝉其澤矣所謂天者誠難測而神者誠難得集作明矣所謂理者不可推而夀者不可知矣雖然吾自今年来蒼蒼者或化而為白矣動摇者或脱而落矣毛血日益衰志氣日益㣲幾何不從汝而死也死集訌作如而有知其幾何離其無知悲不蜀本有知字幾時而不悲者無窮期矣汝之子始十集作一歲吾之子始五歲少而强者不可保如此孩提者又可集作可冀其成立耶嗚呼哀哉嗚呼哀哉汝去年書云比得軟脚病往往而劇吾曰是病集作疾也江南集有之字人常常有之未始以為憂嗚呼其竟以此而殞其生乎抑别有疾而至斯極乎汝之書六月十七日也東野云汝殁以六月二日耿蘭之報無月日盖東野之使者不知問家人以日月集有如字耿蘭之報不知當言日月集註作時東野與吾書乃問使者使者妄稱蜀本作傳以應之耳其然乎集有其不然乎今吾使建中祭汝弔汝之孤與汝之乳母彼有食可守而待終䘮則待終䘮而取以来如不能守以終䘮則遂取以来其餘奴婢並令守汝䘮吾力能改𦵏蜀本有終𦵏二字汝於先人之兆然後唯其所願蜀本有焉字嗚呼汝病吾不知時汝殁吾不知日生不能相養蜀本作以相養以共居殁又不得撫汝以盡哀殮不袁本有得字憑其棺窆不袁本有得字臨其穴吾行唯作何負神明而使汝夭不孝不慈而不得與汝相養以生相守以死一在集作在天之涯一在地之角生而影不與吾形相依死而魂不與吾夣相接吾實為之其又何尤彼蒼者天曷其有極自今也集作已往吾其無意於人世矣當求數頃之田於伊頴之上以待餘盡集作年教吾子與汝子幸其成長吾女與汝女待其嫁如此而已嗚呼言有極集作字而情不可終汝其知也耶其不知也耶嗚呼哀哉尚饗祭姪女行軍夫人文令孤楚年月日某官某致祭于故十三姪女行軍夫人之靈嗚呼婦德尚柔以冝其家人之不幸生也有涯側聞夫人明懿穠華輝奪夜光鮮侔晨葩行軍之妻尚書之女動而中禮欲不踰矩婉彼宋子歸于鄭武主吏之昌副軍大鹵雲霄兹姑琴瑟方調孰云大年曽莫崇朝曄曄蕣華不思疑風飄瀼瀼薤露先旦而消嗚呼哀哉昔也北来繡帷虧蔽今兹南去丹旐容曵逰矣㝠漠宛然慈惠嫡女墜心良人迸涕嗚呼哀哉本支百世如水一源况是鰥夫彌憐小孫千齡共盡萬化如存申奠致詞悲何可言尚饗奠小姪女寄寄文李商隱正月二十五日伯伯以果子弄物招送寄寄體魂歸大塋之旁哀哉爾生四年方復本族既復數月奄然歸無於鞠育而未申結悲傷而何集作則極来也何故去也何縁念當稚戲之辰孰測死生之位時吾赴調京下移家關中事故紛綸光隂遷貿寄瘞爾骨五年于兹白草枯荄荒塗古陌朝飢誰抱夜渇誰憐爾之栖栖吾有罪矣今吾仲姊反𦵏有期遂遷爾靈来復先域平原卜穴刋石書銘明知過禮之文何忍深情所屬自爾殁後姪軰數人竹馬玉環繡䄡文葆堂前堦下日裏風中弄藥争花紛吾左右獨爾精誠不知所之况吾别娶已来嗣集作𦙍緒未立猶子之義倍切他人念往撫存五情空熱嗚呼榮水之上壇山之側汝乃曽乃祖松檟森行伯姑仲姑冡集作壙墳相接汝来往於此勿怖勿驚華綵衣裳丼香飲食汝来受此無少無多汝伯祭汝汝父哭汝哀哀寄寄汝知之耶文苑英華巻九百九十三
