body:
  text: 文苑英華卷五百九十五宋李昉等編節朔謝物宴賜附謝端午賜物表一首謝端午賜衣表一首為田神玉謝端午物表一首謝端午賜衣及器物等表六首謝社日賜羊酒等表一首謝冬至賜羊酒等表二首謝賜遊曲江宴表一首謝京城東亭子宴送表一首三月三日為百官謝賜宴表一首謝觀內宴表一首為宰相謝賜永穆公主池亭遊宴表一首謝賜宴表一首為楊中丞謝設表一首代百僚謝許遊宴表一首為宰相謝內宴表一首為兩省官謝內宴表一首謝端午賜物表李嶠臣某言中使某至伏奉手詔慰諭并宣口勑賜臣端午衣一副及銀碗百索等兼賜大將衣若干副者天書綢繆聖澤汪濊被服輝煥承恩隕越臣某中謝臣聞日移東井律應南風正陽為納慶之辰長嬴表文運之節臣謬膺任使備位守臣撫封而多愧無能望闕而遙思獻夀而陛下恩覃率土寵並勳賢俯因初五之辰逺頒尺一之詔衣垂纎靡之盛器飾雕刻之珍則辟邪寧假於赤符蠲癘詎勞於朱索况賜霑禆將化洽方隅仰荷殊私實慚非據誓將誕敷渥澤保定藩維變淳風於邑里宣戎政於軍旅俾溪洞安靜波濤不驚伏惟皇明俯照丹慊臣無任謝端午賜衣表臣某言中使某至伏奉手詔慰諭并奉宣聖㫖賜臣端午衣一副銀碗百索等大將衣兩副者王人逺臨天賚下逮承恩捧詔悸心汗流臣伏以正陽届節初五授時萬國獻珍以稱夀九天垂衣而納慶至如靡麗出於王府頒賜及於方隅蓋所以褒寵有功旌異有德顧臣庸劣未補㳙毫沐日月之齊明與勳賢而並命猥將固陋之質獲兹器用之深衣降九天懼興刺於鵜翼縷分五色增長夀於堯年何角黍之足稱豈纎繒之為比况賚及禆將澤被戎行顧兹殊賜實愧非據臣一至湖湘再周星嵗扇皇風而蘇息黎庶布聖澤而底定封疆今井賦不愆軍旅知訓庶期獷悍之俗獲躋仁夀之域伏惟鴻造俯察丹誠無任為田神玉謝端午物表張說田神玉大歷中為節度張說開元十八年卒此表疑邵說代作英華恐誤臣某言中使某至賜臣母趙國太夫人手詔并衣一副銀碗一事百索十軸兼賜臣勑書及手詔并衣一副銀碗一事百索十軸又賜將軍等衣共五副百索共二十軸者聖慈稠疊感戴無階臣某中謝臣恭守舊規謬知重務功慙毫髮寵荷丘山滿篋詔書偏承睿顧傾家服玩皆自天來叶彼良時旌其益夀淮南藥碗對此殊輕漢帝露盤方斯匪重索盈千縷衣倍五時雨露恩深不遺於老母乾坤施廣遍及於下臣受賜若驚銜恩載躍誓當戮力祗奉威靈縱有百身何階報效臣無任感恩謝端午賜衣及器物等表常衮臣衮言中使羅希皎至奉宣恩㫖賜臣衣二襲金銀器物十事百索兩軸扇一柄特降王人俯臨私第捧承殊賚祗荷失圖臣衮誠惶誠恐頓首頓首伏以聖政惟新方求至理天心所待豈止常才在臣庸愚何足驅使自受恩宸扆已積三旬尸素廟堂未有能事固宜歸責誠合避賢聖恩優容寵渥逾厚今屬三疑陽届節五日御辰下濟天光曲流睿澤王人班器司服降衣飾其盤盂示以金玉王度總其領㑹一作繪將何以黼藻朝章佩色絲而表祥捧輕箑而迎暑寵光逾分憂負難勝出自禁中珍華未覩在於臣下服用敢安既承飾外之恩彌積善中之懼無任感戴屛營之至二臣某言中使某至奉宣聖㫖賜臣衣兩襲金銀器物十事扇一柄百索兩軸伏以塵辱台司曠廢事任遭逢若此報效無聞罪譴未知已荷曲成之施庸愚不逮恐傷則哲之明所以極冒宸嚴懇祈罷黜中慈未允外責彌深徘徊渥恩靦愧朝列四時之鍚纍沐寵私五日之慶又蒙榮賚衣服器用特降珍華疵賤凡微曷堪光飾况師旅在外疆界未寧日費千金簞無半菽今有功之士賞或未周無益之官一作臣寵之過厚已紆成命不敢上辭惶赦拜恩實慙虛受無任荷懼之至謹奉謝表以聞同前吕頌臣某言中使至伏奉詔書并賜臣衣一副金花銀碗二枚百索一軸大將衣兩副大明生東無逺不照時雨潤物有形必霑臣某中謝伏以朱明届節端午良辰寶歷叶於重離聖夀齊於兩曜臣凡愚賤質草木微軀謬居藩鎮之榮獲守黔巫之地豈意聖慈天覆不隔遐荒珍物出於九重麗服延於萬品臣與將校等雖備戎旅素乏勳庸當蠻徼廓清之時霑普恩頒賚之慶榮分閫外喜溢行間仰戴殊私罔知所報不勝忭躍之至同前權德輿臣某言中使陳忠玠至伏奉集作准前月十七日手詔賜臣端午衣一副銀碗二隻銀鈔羅二集作砂羅百索一軸并大將衣服等慶賜逺降天顔如臨恩光綢繆器服輝麗成周士吏居守輿師喜氣歡聲以感以抃臣某誠欣誠荷頓首頓首伏以斗杓建午之初日永星火之際隂陽慶接天地氣交陛下法象乾坤順行時令賀獻本臣子之志寵賚延君上之恩孱微無庸局踳斯甚佩長命之縷俾夀而臧捧在笥之衣既安且吉然後大敷渥澤盡感鴻私顧已難酬此生何幸無任荷戴踴躍之至謹附中使陳忠玠奉表陳謝以聞臣誠歡誠抃頓首頓首謹言同前劉禹鍚臣某言中使劉元弼至奉宣聖㫖慰勞臣及將佐官吏僧道耆老集作夀百姓等兼賜臣墨詔并衣一副金花器三事絲索集作綵絲一軸大將衣四副綵絲五軸寵光荐至慶賜曲霑抃舞失容捧戴無力臣某中謝伏以朱明仲月端午佳辰萬國被薰風之和九天垂湛露之澤臣幸逢休運獲守外藩叨承睿慈猥霑集作受榮賚發詔而煥窺宸翰集作象振衣而頓失炎威色絲表祥載光於佩服珍器充玩盡飾於圓方恩輝既盈喜懼交集下延禆將共荷鴻私二臣某言德音曲被喜溢羣情厚賜遐頒榮霑陋質臣某中謝伏以𬎼賔在律端午御辰慶列丹墀守藩莫及恩隨綵縷捧軸難勝况衣極珍纎凉生溫暑器皆照爛光發户庭竊慙彼已之詩敢忘滿盈之誡惟當蒞戎有勇訓俗知方永懷銘縷之誠冀申赴蹈之節臣與大將無任感戴踴躍之至謝社日賜羊酒等表常衮臣某言內常侍王子升至宣奉聖㫖以社日賜臣羊酒脯臘海味油麵粳米等仍特賜藥飲者喜抃失容兢慙無措臣誠惶誠悚頓首頓首臣叨踐台階已速官謗聖慈矜宥殊貸曲全猶使省近掖之文重高門之地白骨再起飛魂復還感恩若驚雖死何答伏以宰輔之任燮和所關自頃愆陽向逾纍月近方降雨今復周旬致令水旱不時隂陽失序若令歸責臣亦何逃故事昭然所冝黜免且勾龍立社祀典攸書大稷主農國章斯在以享田祖以報秋成今穎實未登粢盛乖望是君積憂之日是臣獲戾之時豈望慶自雲天曲容酒食之宴恩霑疵賤下及膏粱之珍醉樂空比於堯人宰乎實慙於漢相無功受賜有靦何逃上戴寵私益深惶愓無任忭躍屏營之至謝冬至賜羊酒等表臣某言中使某至奉宣恩㫖以至節賜臣米麵羊酒猪鹿雜味等伏以非才曠官微臣之愧耻待寬責薄聖造之矜容貸罪則多負恩已甚進思無補退復何顔以周官之職且乖於水旱而漢臣之賜空積於嵗時屬北陸涸隂南郊迎日古今良節朝野同休天慈過深榮賚逾厚王人結駟膳宰駢輜特减內庖之珍遍賜逺方之異光華里閈充溢門閭臣本布衣列於賤品千年遇聖忽至層霄萬死酬恩豈禆大化素甘藜糗既飽於粱肉多乏濁醪既醉於醇酎荐沐非常之寵不知所忝之由少長對筵悲歡相慶何功而至此何力以任之捧戴若驚慚惶交集無任同前臣某言中使某至奉宣恩命以至節賜臣者聖㫖頻降榮賚過優以周官百品之珍載頒其實雖魏臣五熟之釡豈容其多受賜踰涯拜恩失次臣出自孤微素常貧苦食不滿腹竊誡修身且祭不掩豆飯惟脫粟昔賢之美其儉可師敢望豐盈重彰尸曠而雨露偏施嵗時益榮俾奉先之饗味兼陸海合族之宴甘及膏粱又沐深慈下霑中饋以感以慶啓處難勝無德無功慙惶罔極云云謝賜遊曲江宴表李雍臣雍等言臣聞昔時人君之德也大撫萬國必親諸侯是以通下情序賔禮伏惟陛下因遇上已收接下臣順發生之時宏在鎬之宴仙厨和鼎浹洽於廣筵舜瑟一作樂歌風均調於曲水士女車騎充溢山川林薄光華纚連城闕臣等撫躬何幸報德無階空慙尸素之名豈適輪轅之用不任戴荷忭躍之至謹詣朝堂奉表以聞謝京城東亭子宴送表張說臣某言力士至奉宣勑以臣臨岐特令賜宴恭承惠渥念及庸微天地同仁木石知感不勝惶悚戴荷之極臣某中謝臣歷觀自古君臣凡所際㑹或因緣黨進或延接功成故未竭而知不言而信豈有地孤援寡毁衆謗深察蒙蔽之中致曠蕩之外逢陛下特逹之遇當陛下聖明之朝事出非常澤均恩重今者誓將瀝血未足竭誠徒欲殺身豈能報德至如勵精勤政與直守公酬陛下憂人之心行陛下宏道之化安敢失墜以負神明但函關路遙長安日逺不任戀主悽愴之至三月三日為百官謝賜宴表宋璟臣某言臣伏以漢崇元已齊曰上遊咸聞執蘭以盛禊飲洛水之㑹囂呼不足紀也永和之遊僻陋不足追也臣等生逢多幸遇㑹聖明賜與榮渥逾溢涯分詢於史䇿超軼古今臣某中謝伏惟皇帝陛下屈已愛人布和施恩慶賞所及萬國歡心財成之道與天悠久爰以令節錫宴公亭萃集作翠帟文茵俱來天上嘉肴清酤亦自大官欣歡之聲浹於億兆銜感之至形於頌歌而天心霈然宸章煥發曲蒙賜示捧讀兢懼涵泳五音光輝二雅流於管磬永播無窮豈臣庸愚詎能思度今狂虜衰息年穀屢登俗被湛恩人歸夀域宴遊髙㑹適助時康况上宰冡卿修簮長劍前後羅列小大相從所以序聖朝之多士為百代之風流臣等叨榮無任懇迫報效何日進退知慚不勝欣抃之至謝觀內宴表臣某等言伏以雲韶是稱天樂華夷不覩庶品徒瞻伏惟皇帝陛下慶浹人神惠敷雲雨合飲於八仙伎降於九重遂使六樂增唱萬人駭嘆豈激楚之足匹何鈞天之能擬况復飾無貨寶衣用大帛逺而望之如金翠之旅近而觀之同弋綈而髣其廣大也可以俗應陽和其純儉也可以人知軌物故能作程海內垂裕天長望編史冊永彰明聖臣等不勝恱豫之至為宰相謝賜永穆公主池亭遊宴表孫逖臣某言內使趙侃奉宣恩㫖賜臣等明日於永穆公主池亭遊宴者謬承天澤頻賜春遊小人之腹每辱於珍膳下里之聽屢聞於仙樂殊私荐及榮施難酬雖朝野多歡實樂太平之運而㳙埃莫效彌慙非據之恩無任悚灼之至謹奉表陳謝以聞謝賜宴表常衮臣某言臣一昨特荷聖慈曲承寵㑹今日又奉進㫖臣兄太常丞臣某亦霑內宴仍賜錦綵百匹衣一襲并銀器等非據之任已忝股肱曲承之恩更及骨肉仰天增愧何地有安臣某中謝臣聞禮之制也以飲食親宗族詩之義也以愷樂宴嘉賔以通上下之情以展君臣之義將以禆於風化故無謬於寵私伏惟陛下稽古以理宗儒之教示其恭儉之訓溥頒雨露之恩叶時布和式崇饗宴至於需以酒食昭其慈惠必先宗戚次及舊勳臣出於孤賤又乏功勞無所克堪豈冝齒列臣兄何幸又沐殊榮寵極膳羞之珍禮優筐篚之至合生成於同氣聚慶賀於私庭昔人獨咏於鹿鳴在臣兼輝於鴈序手足無措揣分空慙形影相顧捐軀何答臣無任為楊中丞集作湖南謝設表栁宗元臣某言中使某乙至奉宣聖㫖賜臣長樂驛設者恩榮特殊宴飲斯及顧兹厚禮猥集微躬臣某誠歡誠慶頓首頓首臣以多幸屬此昌時任重方隅職參文武甘受素餐之刺知無肉食之謀以憂以惶寢寐無措豈謂鴻私繼至豐膳爰來陸海兼陳酒集作飴醴皆設庶當奉揚聖澤覃布逺人流愷樂於皇風均乳哺於赤子少陳微效上答殊私無任感恩抃集作欣躍之至代百僚謝許遊宴表吕溫臣某等言今月二十三日宰臣奉宣進㫖集作止如聞百寮士庶等親友追遊公私宴集及晝日出城餞送每慮奏報自今已後各暢所懷者志存必信義切同休令行如春神應若響寒木暉潤嚴風變和推已感於人心發生先於天意臣某中謝臣聞與人同其樂者不必盡致於韶夏之庭在夫不奪其歡而已與物致於集作其誠者不必日效於丹青之信在夫不察其細而已况乎縉紳之樂名教聚皆以類臣子之事君父遊必有方豈足輕聳物情遽塵天聽伏惟皇帝陛下光纂十聖威臨萬方集作國神武功就人文化成窮溟無波豐嵗將宴集作晏樂奏穆清感深乎共樂之道駕言遊幸思所以適人之方爰詔輔臣式將明命優諭卿士逹於庶人琴筑追遊無憚京輦集作轂輜軿送逺勿限嚴城禁吏司之苛察盡朝野之歡泰始覺飛沉之樂宇宙之寬物不自疑人知所措集作得所在宗載考夜飲承湛露之恩求友相鳴時宴奉祥集作需雲之慶浹休聲於夷夏蒸喜氣於山川千載之昌運允符百王之遺美斯舉臣等謬膺寄任親奉休明方感生成之德更蒙優貸之詔恭承睿㫖務竭歡心飽思屬厭醉念溫克戒竹林之虛誕去金谷之浮華君雖不察於泉魚臣敢有愧於屋漏承歡且懼居寵彌驚稽首知慚殺身何報無任感恩兢愓之至為宰相謝內宴表錢珝臣某言臣聞古之王道美在詩人爰徵式宴之名則有鹿鳴之什爼豆既列筐篚亦陳羣臣享而受之得使盡其心也能追古道實在哲王臣某中謝伏惟尊號皇帝陛下聖文有作臨照克明昨者以告見祖宗率兩宮而偕行重典祈禱天地感百神而已報豐年方屬清和更宏慈惠遂當暇日乃闢廣場既接輔臣兼延卿士我心則恱洞開咫尺之顔不醉無歸畢降獻酬之禮而又深形睿㫖新製樂章但臣等忠則有思拙而無補陛下勉其翼戴播在絃歌竊聽鏗鏘空知慚感為恩如此何力可勝徒以宫殿飾同疑文符混一舞成竒字更俟太平待季子之請觀笑吳宫之教戰盡如解愠詎異聞韶况凡有嘉籩親令下筯巨細之事指顧不違鴻私曲被於茲辰寵遇頗踰於往列仍蒙賜賚且極纎華伏自侍宴已來還家自省燮理欲酬於𤣥造終乏嘉謨傳聞空遍於逺方彌光聖德君臣共樂史冊可書臣某等無任銜恩涕感歡榮忭躍之至為兩省官謝內宴表臣某等言臣聞謂傾心於百辟向日雖同觀拱極於衆星在天各逺所以㑹朝之地每隔丹墀而燕私之嘉忽親黼扆注渥恩而則可求故實以未聞事出常倫感深庶位臣某等伏以考擊鍾鼓鋪陳几席恭惟列聖常命周行且屬宴安仍須物用匪勞規畫始就歡娛今陛下以尚念多難不為自逸外開貢輸之數內無饒羡之資蓋以臨昧旦而謁宗祧彛章必具仰昊天而祈稼穡甘澤已頻方當行慶之時且欲與人同樂昨者昭垂睿眷俯接羣僚忘憂而飲備六清既飽而羞踰百品戒膳夫之失飪詔酒正以如澠賜者鮮闕行之皆遍􅎖喜則聲從禹律製曲則音自堯聰樂和而鳯鳥應來舞妙而薰風共轉曲形文字全為生靈承天詔以咸觀兼聞金石泛恩波而已醉不待樽罍柏梁殿唯召詞臣華林園亦非密座共當異寵難並茲辰光束帶而更勵立朝顧綵繒而彌慚勝質則微臣非徒享滋味聽鏗鏘而已霑纓感德稽首拜章臣某等無任荷恩激切榮躍屛營之至謹奉表陳謝以聞文苑英華卷五百九十五
