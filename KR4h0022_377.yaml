body:
  text: 文苑英華巻三百七十七宋李昉等編征伐為建安王誓衆詞一首補逸書一首讀司馬法一首雜製作時日無吉㐫解一首祅祥辨一首相解一首禹書上下二篇較農一首䟽亡一首刪方䇿一首寒泉子對秦惠王一首讀韓詩外傳一首題叔孫通傳一首題後魏書釋老志一首題安昌侯傳一首征伐為建安王誓衆詞陳子昻諸惣管部將旗長隊正各聽命夫聖人用兵以伐有罪姦慝竊命戎夷不龔則必肆諸市朝大戮原野我皇周子毓萬國寵綏百蠻遐荒戎狄莫不率職契丹㐫羯敢謀亂常蜂聚九一作凡山豕食遼塞十六字集作聚兵率衆非欲勞人盖逆不可縱亂不可長所以屈已推轂垂涕泣辜誠恐蒼生顛墜塗炭今契丹㐫羯敢亂天常為封豕長蛇荐食上國玉帛布幣棄而不貢名器正朔僣而有謀乃將紿神虐人暴殄天物故皇帝命我肅將王誅今大師已集方將問罪公等諸衆及士卒已上須各嚴職事肅恭天命契丹㐫賊本為中國奴𨽻昏狂不道勞我師徒今與公等及士卒久勤干戈冐犯霜露夫四郊多壘士大夫之恥蕞爾㐫狡一劍可屠况皇帝義兵尅期誅剪此猶太山壓卵鴻毛在鑪今日之伐須如雷霆之震虎豹之擊搴旗斬馘掃孽除㐫上以攄至尊之憤下以息邊人之患鼓以作氣旗以應機公等各宜戮力務當其任若能奮不顧其二字集作顧命䧟堅摧鋒金紫玉帛國有重賞若進退留顧向背失機斧鉞嚴刑集作誅軍有大戮各自集作宜勉勵無犯典刑補逸書湯征諸侯葛伯不祀湯始征之作湯征湯征葛伯荒怠敗禮廢祀湯專征諸侯肇徂征之湯若曰格爾三事之人逮于百集作有衆啓乃心正乃容明聽予言咨先格王有彛訓曰禄無常荷荷于仁福無常享享于敬惠乃道保厥邦覆乃徳殄厥世惟葛伯反易天道怠棄邦本虐于民慢于神惟社稷宗廟罔克尊奉暨山川鬼神亦靡禋祀告曰罔犧牲以共爼羞予介集作界厥牛羊乃既于盗食曰罔黍稷以奉粢盛予佑厥稼穡乃困于仇餉今爾衆曰葛罪其予聞文粹作其如予予聞曰為邦者祗奉明神撫綏蒸民二者克備尚克保厥家邦吁廢于祀神震怒肆于虐民離心自集作頃繩契已降暨于百代神集有恕字亟民叛而不顛隮者匪我攸聞小子履以凉徳欽奉天威肇征有葛咨爾有衆克濟厥功其有儆師徒戒車乗敬君文粹作吾事者有明賞其有罔率職罔戮力不龔命者有常刑明賞不僣常刑無赦嗚呼朕告汝衆君子鍳于兹欽哉懋哉罰及乃躬不可悔讀司馬法皮日休古之取天下也以民心今之取天下也以民命唐虞尚仁天下之民從而帝之不曰取天下以民心者乎漢魏尚權驅赤子於利刄之下争寸土於百戰之内由士為諸侯由諸侯為天子非兵不能為非戰不能服不曰取天下以民命者乎由是編之為術六韜也術愈精而殺人愈多法益切文粹作工而害物益甚嗚呼其益不仁矣蚩蚩之類不敢惜死者上懼乎刑次貪乎賞民之於君猶子也何異乎父欲殺其子先紿以威後㗖以利哉孟子曰我善為陳我善為戰大罪人也文粹作大罪人集作大罪也使後之君于民有是者雖不得土吾以為猶上焉雜製作時日無吉㐫解沈顔古者國家將有事乎戎祀必先擇時日以定其期是用備物於有司習儀於禮寺俾臻其慮而戒其誠非所以定吉㐫决勝負也後之惑者不詳其故惟考時日妄生穿鑿斯風不革拘忌益深至使凡庶之家將欲越一溝隍拆一葭葦必待擇日而後為之搆一衡宇薙一榛蕪必審方位而後為之且吉㐫由人焉繫時日夫四逺之衢輪蹄未嘗息也五都之市貨賄未嘗絶也萬家之邑斤斧未嘗斷也七雄之世戰伐未嘗已也其㐫也必由於人其吉也必由於人故吉人㐫其吉㐫人吉其㐫一於人之所為而已矣然則惑者不知其在人有一不知則罪於時日矣且以不謀之將不練之士有能時日勝者乎不耕之土不實之糓有能以時日種者乎以鐵為金以石為玉有能以時日濟者乎是皆不能也則時日於人何有哉夫王者之兵以徳勝覇者之兵以義勝其次以智其次以勇故古之名將未嘗不以此而戰勝也未嘗不以此而立功者也妖祥辨凡所謂祥者必曰麟鳯龜龍醴泉甘露景星朱草所謂妖者必曰天文錯亂草木變性川竭地震冬雷夏霜或者以為察王道之廢興國家之治亂則􅀈古稽字考於是而不知君明臣忠百司稱職國之祥也信任讒邪棄逐讜正刑賞不一貨賂公行國之妖也既三代已後廢興之兆理亂之故鮮不由此矣若嚮所祥者果祥則周道衰而麟見妖者果妖殷道盛而桑榖生庭不其明與也一無也字相解皮日休今之相工言人相者必曰某相類龍某相類鳯某相類牛馬某至公侯某至卿相是其相類禽獸則富貴也噫立形於天地分性於萬物其貴者不過人焉有真人形而貧賤類禽獸而富貴哉將今之人言其貌類禽獸則喜真人形則怒言其行類禽獸則怒真人心則喜夫以鳯為禽耶鳯則仁義之禽也以騶虞為獸耶騶虞則仁義之獸也今之人也仁義能符於是哉是以行又不若於禽獸也宜矣哉集無哉字或曰相者有乎哉曰上善出於性大惡亦出於性中庸之人善惡在其化者也上善出於性若文王在母不憂體不變故不憂重耳弱不好弄是也大惡亦出於性若商臣之蜂目豺聲必殺其父叔魚之虎目豕腹集作心必以賄死是也中庸之人善惡在其化者若大舜設化而有苖格仲尼垂諭而子路服是從善而化者也若齊桓公管仲輔之則覇竪貂輔之則亂是從惡而化者也故舜相於堯而天下平禹相於舜而大災弭咎繇相禹斯為相見者也見人知其賢愚見國知其治亂亦相也或曰賢愚者見行事而知也敢問聖人之相人知其有位哉曰堯之於舜任之以天下知其有位也舜之於四㐫投之於四裔知其無位也曰苟若是聖人之能相人也是必賢者得其位不肖者不立朝三苖九黎焉得以國文粹作侯飛㢘惡來焉得以爵曰有是者其君不能相也將其國之是滅豈暇相人而用哉是則三苖九黎未聞不滅飛㢘惡來未聞不誅嗚呼聖人之相人也不差忽微不失累黍言其善必善言其惡必惡言其勝任必勝任今之人不以是術行其心區區求子卿唐舉之術居其窮處其困不思以道逹不思以徳進言其有位必翻然自負生集作坐白屋有公侯之姿食藜羮有卿相之色盖不能自相其心者也或有士居窮處困望一金之助己有沒齒之難有妄誕之人自稱精子卿唐舉之術取其金則易於反掌耳有能以聖賢之道自相其心哉嗚呼舉世從之吾獨戾也其不勝明矣禹書上劉蛻以功不就而受誅則可謂勤民而死乎曰不然然則夏之郊也奚不尋其先安得以鯀配曰以功不可就則不可謂勤民文粹作以功不就則可謂勤民而死也以誅其身則可為文粹作謂勤其家矣不怨君誅而尋父功鯀當誅也傳曰不以家事辭王事既勤其家為天下故報其勤家於夏郊而已矣有鯀之誅而不廢其功禹為其子也不以得集作得以天下而擇其功者禹文粹有為字之事鬼神也微禹之為子先人之罪將不食矣故其子之功由勤父嗣也然則夏郊宜矣於是君誅其怠也而子不怨而家祭其勤也民神文粹作弗畔盖禹以天下不逮事其父而致孝乎鬼神云禹書下治天下之野見之於夏功而未見先於夏功者乆矣夫八年之間生聚非不壊也委積非不耗也常無憂則人怨無樂則民愁文粹作帝憂則民愁樂則民喜故以憂樂隐顯而助之常集作帝能治其心也集作者故禹後雖以身先天下而不以一身負天下之土石以其得治世之心而易使也嗚呼必不得和心之人而為可以智治則豈羽山之下忍不以智獻其父者歟夫夫文粹作天下見濡手足之禹則不見土階之上以治憂樂者也故曰心治乎人也功治乎水也其可獨禹云乎較農功以救於民頼其功者有違順徳以化於民敦其民者有疾徐夫以三月除糓地五月糓入土雖當世不㧞其苖後世不毁其糓其飲食之道順於情也故生不疪癘其道死則爼豆其功集無功字聖人救壊以禮垂世以法當世伐其樹後世毁其法所以禮違其情法違其欲者也是以生為旅人疪癘於天下肉腐於爼酒乾於器然後為聖人是愚民頼聖人之功忘聖人之道嗚呼禮亡而争器矣雖有粟弱者安得而食之法壊而奪其三時矣雖有山澤農者安得而種也集作之䟽亡盗惡名也取之有以合聖人若取其亂而理之取其死而生之則民樂其取也後豈擇其故歟故昏夜之盗為小人衰亂之盗為丈一作大夫能知其取者而嘗蹈其背也故不以無人而棄其守者有大棄天下者仁義盗其名有小棄其國者小人有盗其器故春秋不貶其器聖人以一作必正其名嗚呼盗非惡名也左右前後亦可懼哉刪方䇿古之記惡將以鑑惡而後世為昏謏滛逆徒而將徴於古謂古不盡善若其涕泣以信其詐罪己以固其恩陰謀反覆從書以滋其智矣然而記惡者將以懼民也去善者不足懼昔紂讀是一無是字夏書而嘗一作常笑其亡國嗚呼惡既不足以鑑則刑一作刋可也古無其迹可也無其迹可也集不疊此五字寒泉子對秦惠王陸龜䝉寒泉子秦之處士見秦惠王曰客有自趙來以約從連横事説大王者為誰惠王曰東周人蘇秦也寒泉子曰書六上而王弗聽有之乎曰然其道如何王耶覇耶曰覇黜其覇以濟一作躋王乎曰不一無不字然則何上書之煩而不用之棘一作而用之踈乎惠王曰醯鷄不能混雷霆嬰兒不能抗烏獲者響與之懸絶故也蘇子誠辨矣安能以三寸舌媾一作謀山東諸侯使西靣朝秦者乎寡人非不知不破一領甲不折一隻一作枝矢之為利也顧其猶捕風耳諸侯不可一非一朝也齊桓晉文之覇也始若膠附終若水拆豈止連鷄不能俱上於栖而已哉寡人塞耳義弗聞也寒泉子曰不然夫齊晉三荆文粹作齊荆三晉之人病一作疾於兵久矣方城之金十九為兵一為鏄銚董澤之蒲十九為幹一為箕捲父子兄弟之血前後濺野草齊魂為燕氛趙骨化魏土悽痛之聲入金石出絃匏聞之者悄戚酸屑泣不自禁一旦有人謂曰朝與秦連橫暮得帖帖安卧秦亦厭戰雖鼓牙頰未能吞諸侯秦休而强吾亦勇而奮矣設有辨口安能反覆乎大王不用秦詔一武士尺鐵斷秦文粹作其頸無令車輪輾闗下土使東諸侯聞其言合從散橫東向以背秦大王出則奪氣入則包羞及其殆也披土地以奉讐國獨不念秦仲之業艱難乎春秋祀事何面目以見宗廟惠王卒弗用寒泉子耕於鄙趙封秦為武安君六國果奉教閉闗者十五年十九字集作趙即封蘇季子為武安君六國果拒秦閉闗門十五年讀韓詩外傳皮日休韓詩外傳曰韶用干戚非至樂也舜兼二女非逹禮也封黃帝之子十九年集無年字非法義也往田號泣未盡命也日休曰甚哉韓詩之文悖乎大教夫堯舜之世但務以道化天下天下嘻嘻如一家室其化雖至其制未備豈可罪以越禮哉如以韶用干戚非至樂一有也字則顓頊之八風髙辛之六莖一作英不以一作可作矣如以舜兼二女非逹禮也則堯之世其禮未定不當責也又宜矣以封黃帝之子非法義也則丹朱商均無封邑是庶人也哉一無哉字傳曰賢者子孫必有土又曰公侯之子孫必復其始夫賢者與公侯其子孫尚不廢况有熊氏道冠於五帝化施於千世哉如以往田號泣未盡命也則舜之孝道匪天也其誰知之不號泣也文粹無也字則吾恐舜之命不及乎一作于堯用嗚呼韓氏之書抑百家崇吾道至矣夫如是者吾將間一作闕然題叔孫通傳古之所謂禮不相襲樂不相㳂者何哉非乎彼聖人也此聖人也不相襲者角其功利之深淺乎一作爾不相㳂者明其文武之優劣乎一作爾故三王迭作五帝更制夏殷易置文武逓述其禮文昭昭若雨躍争朗百川注潰者矣然猶周公刋之仲尼正之以周公之才之美謂後世無其人乎乃有仲尼仲尼之後迄至於今望其道如顔閔文如游夏者鮮矣况聖人哉是後之人一無人字制禮作樂宜取周書孔䇿為標凖也漢氏受命禮壊文毁作集作時無聖人苟措其儀立其禮不沿襲於聖製者妄也夫國之大祭不過乎郊祀宗廟也則文集無則字漢之既命其祀也文粹作郊祀止於五疇之祀者禮不曰兆五帝之郊者乎止於昭靈之園者禮不曰天子七廟者乎而叔孫生不為之正郊祀立宗廟去秦畤一作時之非制議昭靈之不禮汲汲於朝㑹之儀俾漢天子為髙祖身不得郊見享不及七廟噫生剏其制物刑集作刋厥式非不標凖聖人也將以漢世斯始夫四字文粹作新去水火方弭兵械難為改作乎將不明壇墠之位禘祫之儀者乎若然者湯武伐桀周公去紂文粹作湯伐桀周伐紂其制可知也嗚呼不明於古制樂通於時變君子不由也其叔孫生之謂矣題後魏書釋老志魏收為後魏書大夸西域氏之教以為漢獲休屠王金人乃釋氏之漸也秦始皇聚天下之兵鑄金人十二於咸陽漢復置之豈可復為釋氏哉夫仲尼之脩春秋君有僣王號者皆削爵為子况戎狄之道不能少抑其説耶孟子曰能以言拒楊墨者逺矣不能以言抑者收也亦聖人之徒文粹作亦聖徒之罪人矣謂史必直歟則春秋為賢者諱之為尊者諱之歟集無歟字筆削與奪在手則收之為是媚於偽齊之君耶不然何不經之如是題安昌侯傳安昌侯禹見時災集作變異若上體不安常擇日㓗齊露蓍於星宿正衣冠筮得吉卦致其名集作則獻其占如有不吉禹為感動日休讀漢史至是未嘗不為之動心因書曰夫宰相之節以己道輔上天地平則致於君夷狄服則致於君風教行則致於君苟天地有災則歸於己兵戈屢動則歸於己此真大宰輔之職也禹也為漢名相居師傅之尊處輔弼集作𨗳之位見災異屢發上不能匡於君下不能稱其職孜孜稱其集無此二字於筮為事斯不足以為賢相之業也嗚呼當漢帝之重禹禹之有言如師訓門人未有門人可違師之旨也依違在位竟無所發誠伊周之罪人也大凡國有災異禬禳占問一作筮之事自有司存若官有龜人占人占夣眠祲太祝也為宰相者當提大政之綱振百司之領握天下之樞而已不空以斯處位也以直論之近乎侫以誠論之近乎偽偽宰相其名儒之恥耶嗚呼漢之尊禹崇師道也禹若此者即非崇師道之過矣文苑英華巻三百七十七
