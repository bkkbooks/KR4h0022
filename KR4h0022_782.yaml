body:
  text: 文苑英華卷七百八十三宋李昉等編佛像下尊勝幢讃一首毗盧遮那佛花藏世界圖讃一首繡阿彌陀佛讃一首繡觀世音菩薩像讃一首畫水月菩薩讃一首畫彌勒上生㡠讃一首繡西方㡠讃一首寫眞徐則畫讃一首宋史君寫眞圖讃一首侍中兼吏部尚書裴公畫讃一首楊侍御寫眞讃一首秦州都督吳公寫眞讃一首尚書右丞徐公寫眞圖讃一首蘇州刺史兼御史大夫襄武李公寫眞圖讃一首張侍御史寫眞圖讃一首大雲寺逸公寫眞讃一首楊逵處士寫眞讃一首張荆州畫讃一首淮南節度使㶚陵公杜佑寫眞讃一首劒南西川幕府諸公寫眞讃十三首佛像尊勝幢讃并序柳宗元以佛之尊而尊是法嚴之於頂其為最勝宜也既尊而勝矣其為㧞濟也尤大塵飛而災去影及而福至睦州於是誠焉不疑礱石六觚其長半尋乃篆乃刻立之為福馬孺人之墓孺人之生奉佛道未嘗敢怠今既沒睦州又成其志擇最勝具集作且尊之道乆集作文之於石以延其休則其生佛所得佛道宜無疑也讃曰世所尊兮又尊道勝無上兮以為寳㧞大苦兮升至眞靈合賛兮神而神駕元氣兮濟𤣥津誰為友兮上品人徳無已兮石無磷延永世兮奠坤垠靈受福兮公之勤毗盧遮那佛花集作人藏世界圖讃并序劉禹錫佛說華嚴經眞入集作人沙覺不由諸乗非大圓智不能信解徳宗朝有龍象觀公能於是經了第一義居上都雲華寺名聞十方沙門嗣肇是其上足以經中九㑹纂成華藏圖俾人瞻禮即色生敬因請余讃之即說讃曰清净不染花中蓮捧持世界百億千踴出香海浩無邊風輪負之晝夜旋大雄九㑹化諸天釋梵八部來森然從昏至覺不依緣初初極極性自圓寫之綃素色相全是色非色言非言繡阿彌陀佛讃并序白居易繡西方阿彌陀佛一軀女弟子京兆杜氏奉為皇集作主妣范陽縣太君盧夫人八月十一日忌辰所造也五綵莊嚴一心恭敬願追㝠福誓報慈恩讃曰善始一念千念相屬繡始一縷萬縷相續功績成就相好具足金身螺髻玉毫紺目報罔極恩薦無量福繡觀世音菩薩像讃并序故尚書膳部郎中太原白府君諱行簡妻京兆杜氏奉為府君祥齋敬繡救苦觀世音菩薩一軀長五尺二寸闊一尺八寸紉針縷綵絡金綴珠衆色彰施諸相具足發大集作𢎞願於哀懇薦景福於幽靈稽首焚香跪而讃曰集萬縷兮積千針勤十指兮䖍一心嗚呼鑒悲誠兮集作而介㝠福實有望於觀世音畫水月菩薩讃周助畫净渌水上虚白光中一覩其相萬緣皆空弟子居易誓心歸依生生劫劫長為我師畫彌勒上生㡠一作幀讃并序南贍部州大唐國東都城長夀寺大苾芻道嵩存一惠恭等六十人與優婆塞士良惟儉等八十一人以大和八年夏受八戒修十善設法供捨净財畫兠率陀天宫彌勒菩薩上生内衆一鋪眷屬圍遶相好莊嚴於是嵩等曲躬合掌焚香作禮發大誓願願生内宮劫劫生生親近供養按本經云可以除九十九億劫生死之罪也有彌勒弟子樂天同是願遇是緣爾時稽首當來下生慈氏世尊足下致敬無量而說讃曰百四十心合為一誠百四十口同發一聲仰慈氏形稱慈氏名願我來世一時上生繡西方㡠一作幀讃并序西方阿彌陀集有佛字與閻浮提有願此土衆生與彼佛有緣故受一切苦者先念我名祈一切福者多圖我像至於應誠來感隨願徃生神速變通與三世十方諸佛不侔噫佛無若干而願與緣有若干也有女弟子𢎞農郡君姓楊號蓮花性發𢎞願捨净財繡西方阿彌陀佛像及本國土眷屬一部奉為故李氏長姊楊夫人滅宿殃追㝠祐也夫範銅設繪不若刺繡文之精勤也想形念號不若覩相好之親近也即造之者誠不得不著感不得不通受之者罪不得不滅福不得不集爾時蓮花性焚香合掌跪唱讃曰金方刹金色身資聖力福幽魂造者誰𢎞農君受者誰楊夫人寫眞徐則畫讃并序栁𧦬徐則東海郯人也沉靜寡慾隐於縉雲山不娶妻常服巾褐陳太建中應召來憇於至眞觀朞月又辭入天台山因絶粒養性所資惟松水而已雖隆冬沍寒不服綿絮太傅徐陵為之刊山立頌初在縉雲山太極眞人徐君降之曰汝年八十當為王者師然後得道隋煬帝為晉王鎮揚州聞其名手書召之遂詣揚州晉王欲請受道法則辭以時月不便其後夕命侍者取火香如平常朝儀之禮至于五更而死支體柔弱如生停留數旬顔色無變帝遣人送還天台窆葬是時自江都至于天台在道多見則徒歩云得放還至其或作于舊居取經書道法分遺子弟仍令净掃一房内一無内字曰若有客來宜延於此然後跨石梁而去不知所之須臾屍柩至方知其靈化時年八十煬帝聞之遣畫工圖其狀貌令桞𧦬為之讃可道非道常道無名上徳不徳至徳無盈𤣥風扇矣亦一作而有先生夙鍊金液怡神玉清石髓方軟靈丹欲成言追葛稚將侣茅盈一作羸我王遥屬爰感靈誠柱下暫啟河上沈精留符告信化杖飛聲永思靈跡曷用攄情時披繪素如臨赤城一作皆隋書徐則傳宋使君寫眞圖讃并序張九齡夫形者神明之表而動用之應也察之茍至則珠玉雖藴光輝必兆於山泉而眉睫可知賢達亦徴於象骨如宋公之天姿森挺人望儼然一覩清揚不俟深鑒是猶雞羣見鶴象齒知集作如非牛居然有差此其殊特者也聲聞如彼風格復集作又爾安集作寧有陳平之羙更虞子羽失之集作之失即難庸妄集作即雖妄庸之目素非知公者偶見斯狀亦已明其瑰異焉初公舉茂才歴長安尉三為御史再入尚書郎色莊以立朝則百寮所憚言揚於伏奏則三臺為表而竟以出守俄復徙集作從邊其故何哉由抗直之為患也然公處屯而必行其道居陋而不改其度能貞其節可謂君子哉才為國而生命有時而泰彼宋公修志以俟也其復可立而湏焉時其集作有族兄曰之望者亦賈生之謫居有顧君之畫絶偉公之貌作為是圖意得神傳筆精形似因命僕為讃其詞云宋公卓犖體標山嶽匪石不移如玉斯琢被服忠信規模禮樂望之儼然允謂髙邈侍中兼吏部尚書裴公畫讃并序元聖有作大賢將其命良弼有二侍中是其一所從龍虎實感風雲我之裴公道與上合義深體國䇿在忠主亦既致於堯舜不唯比於管樂至於執人柄振天綱丹青帝圖金玉王度雖古之作合謂之有開未始聞也夫事可法道可度威可愛儀可象赫咺中來菁英外發故工繪其事所以見盛徳之形容士頌其功所以知和氣之傍集作導逹五事曰貌一以作恭七聲成文六乃為頌俾凡今之人色斯而覩奥聽之而知理水有方折辨和氏之價焉山為具瞻表師尹之重焉讃曰赫諠人望時為一作維國紀偉量川渟一作停髙標嶽峙磊落成節精明人集作入理倬哉輔臣式是多士丹青炳發儼如至止楊侍御寫眞讃子邵仙狀秀出丹青寫似亭亭玉立峩峩嶽峙野鶴無羣天鵬擊水英華間發眞素相擬銳上當侯豐下有子環林既構鐵柱兹始風騰雲㑹一日千里相者何為讃之而巳秦州都督吳公寫眞讃英姿一絶自出常倫揮毫得妙又全其真真不失舊舊有彌新挺如鶚立婉似虹伸當封在骨得正從神緑車協相白馬稱珍吳侯吳侯翻然牧一作㧞秦愛而不見見似思人尚書右丞徐公寫眞圖讃并序獨孤及侍御史韓公至集作志清以學藝書畫之美聞於集作于天下辛丑歳三月以王事靡盬客于豫章與前尚書右丞徐公同舍於慧明集作命寺之净室一作宇嘗以暇日裂素灑翰畫集作寫徐公之貌集作容陳於集作于公之座隅而羙目方一作箕口和氣秀骨毫釐無差若分形於鏡入自外者或欲擎跽曲拳俯僂上集作拜謁不知其畫也衆君子嗟嘆之不足則足言以讃其羙及亦集作以繼唱于後二字一作其詞集作讃曰哲匠運思天姿是具假之筆精實以神遇居然成象豁若披霧瞻仰一作如聸神鋒如窺武庫婉婉高識昻昻獨歩絶頂孤松空波集作陂白鷺不犯之色匪躬之故孰知造化亦在毫素蘇州刺史兼御史大夫襄武李公寫眞圖讃前人作繢精至於藝懸擬公之徳容集作於藝懸解擬公徳容與化同製獨立正色神和氣邁婉兮清揚若聞嘉話公綽不欲仲山匪懈形于懿範觀者目駭百城仰止羣吏警集作儆戒成務安民亦猶作集作此畫張侍御寫眞圖讃堂堂乎張洵羙且恭執法柱下分形畫工玉立氷集作天姿霜淬神鋒武庫森㦸寒山勁松方彈獬豸以佐䕫龍他年雲臺與古同風大雲寺逸公寫真讃釋皎然畫與理宜兩身不異淵情洞識眉睫斯備欲發何言正思何事一牀獨坐道具長隨瓶執堪瀉珠傳以移清風拂素若整威儀楊逵處士寫真讃識洞才髙天貸神與霜縑之上逄君不語聳聳山立翹翹鶴舉置之巖石邈然無侶張荆州畫讃并序吕温中書令始興文獻公有唐之鯁亮臣也開元二十年後𤣥宗春秋髙矣以太平自致頗易天下綜覈稍怠推納寖廣君子小人摩肩于朝直聲遂寢邪氣始勝中興之業衰焉一作矣公於是以生人為身社稷自任抗危言而無所避秉大節而不可奪小必諌大必諍攀帝檻歴天階犯雷霆之威不霽不止日月之一作幾蝕為公却明虎而冠者不敢猛視群賢倚賴天下仰息凛乎千載之望矣不虞天將啓幽薊之禍俾姦臣負乘一作乗釁以速致戎詐成讒勝聖不能保禠我公衮寘于侯服身雖逺而諫愈切道既塞而誠彌堅憂而不怨終老南國於戱功業見乎變而其變有二在否則通在泰則窮開元初天子新出艱難乆憤荒政樂與羣下勵精致理於是乎有否極之變姚宋坐而乗之舉為時要動中上急集作意天光照身宇宙在手勢若舟檝相得當洪流而皷迅風崇朝萬里不足怪也開元末天子倦于勤而安其安髙視穆清霈然大滿於是乎有泰極之變荆州起而扶之舉為時窖集作害動咈上欲日與讒黨抗衡于交㦸之中勢若微陽戰隂衝宻雲而吐丹氣歘耀而滅又何難集作歎乎所痛者逢一時事一聖踐其跡執其柄而有可有不可有成有不成况乎差池草茅沉落光耀者復何言哉復何言哉曹溪沙門靈澈雖脫離世務而猶好正直得其圖像因以示予覩而感之乃作讃集作銘曰唐有棟臣徃矣其邈世傳遺像以覺後覺徳容恢晏天骨峻擢波澄東溟日照太嶽具瞻崇崇起敬起忠貌與神㑹凛然生風氣藴逆鱗色形匪躬當時曲直如在胷中鯤鱗初脫激海以化羊角中頽摩天而下無喜無愠亦如此畫嗚呼為臣儆爾夙夜淮南節度使㶚陵公杜佑寫眞讃并序符載丞相㶚陵公以虎符龍節清鎮淮海凡十五年矣有盛徳羙化加於民可以刻金石以圖其一作儀形遂於龍興佛廟大修繪事自相國洎監軍使樊常侍賔僚將校羅乎素壁森然也有部從事殿中侍御史穆賞作㶚陵志太常寺奉禮郎符載作寫真讃以頌之夫藴二儀統萬類役百靈者莫善於人故得全氣者為至聖堯舜周孔是矣得間氣者為大賢䕫龍伊尹是矣自夐古達于兹日一時之理百化之損益未嘗不繇是矣然則造時者必繫乎君者輔時者必繫乎臣也至於藴咎䕫之業得輔弼之道者其㶚陵公之謂乎公參三才之粹氣包五行之靈用以大和為正性以至仁為厚徳以神明為視聽以禮樂為肢體涯岸𢎞大才智傑出注百川而溟海不動臨萬象而𤣥機獨運脩眉廣顙晬容玉色如祥鸞彩鳳徘徊瑞氣得不謂人倫之上才歟公之為政也根柢於誠信柯榦於賞刑枝葉於禁忌達時之通變識人之好惡聽覽而不察寛裕而有制故䝉澤者如膏雨畏刑者如秋霜萬情浩擾懸我條貫生生之分各得一作安其性得不謂民之父母歟公之為學也冠冕六籍衣裳群史履屨百氏毎讀書取其實而不取其華深研著述號為通典大抵自開闢旁行至乎歴代有兵食財賦職官禮樂交關于當世者莫不擿拾其英華滲漉其膏澤截煩以趣約裁疎以就宻其有覽之者如熱得澤如饑得食五車萬卷盡為冗廢得不謂立言垂範歟守藩嵗乆哀乞朝覲上賜優詔聽答悃欵伏見車騎奕奕星馳闕下明天子闢閶闔負黼扆延國老於雲臺之下鋪陳皇王之道徳發明古今之教義上以揚君后之鴻化下以言理國之大要是知經天地戡禍亂敦五教端百揆大君以此柄授公知公不得而讓也夫漢之麒麟唐之凌煙愛其徳即圖其人覩其人則景行其事復銘景鐘樹甘棠此皆以遺芳餘烈浹於人骨髓者也異日廣陵之民懷公之惠愛嗅公之馨香企公之軌躅擁袂接武沉吟兹地嚴目而視捧手而指必知夫咨嗟慨詠之聲發於肺肝矣載山林野賤之士猥辱眄睞塵厠下界恭覩盛徳敢無詞乎不書爵氏㶚陵公之尊也讃曰碩徳昻昻智圓徳方武庫矛㦸禮容珪璋神氣端凝風儀髙張晴天鶴立秋水龍驤擁旄淮南俗阜民康休聲四塞入覲天王天王虗懷待公廟堂始終進退赫然有光後人來斯環遶長廊以此净域便為甘棠劒南西川幕府諸公寫眞讃并序戊辰嵗尚書韋公授鉞之四年也初尚書以汧隴殊勲拜執金吾天子猶以為功重而報輕俾作鎮于蜀得自開幕府延納賢雋焉韋公虗中下體愛敬士大夫故四方文行忠信豪邁倜儻之士奔走接武麏至幕下縉紳峩峩為一時偉人時符子客于成都歎其盛羙又咸得衆君子之歡而嘗思一作私欲讃誦之事無由緣殆似行佞藴蓄浩思殊欝欝不快也適㑹有沙門義全者善丹青尤攻寫真諸公博雅好事皆使圖畫之山客由是得書曩意因述寫眞讃十三章使士林才彦不獨仰大府得賢之盛抑亦欲屬詞比跡各明其為人也金部陳郎中東羙字徳將河目犀額材為國楨幹局方大質文光明霞出海嶠鸞翔玉京式瞻冠紱褊吝不生兵部張郎中芬字茂宗襟靈灑散揮斥塵細佩服五常翺翔六藝諸和養正含噐經世風裁伊何空山松桂水部司空郎中曙字文風儀朗邁振㧞氛囂玉氣凝潤鶴情超遼文燭翰苑徳成士標問望何有羽儀中朝金部尹員外植字𤣥本英明淳粹凝作正氣沉益神明黙分涇渭世或蕩本我則歸至髙閱繪圖憲章有寄禮部裴員外說字公諒體岸恢峻神機宏廓河發崑崙風生廣莫道以義見文由雅作彰善繩僭讜言無怍殿中鄭侍御鋼字礪甫中和曼溢為祥聖代彩鳳翺翔卿雲霮䨴誠多被物跡則用晦神宇森森形諸粉繪監察盧侍御珵字公瑜䟽通亮直落落公材馴義立則求仁不囬松吟石澗雪洒瑶臺髙張粉繪清風四來太常王恊律立字元起王生嶷嶷精粹在體雪山孤峙瑤池見底静必感神動則由禮共事騫舉出納雲陛左衛劉倉曹闢字太初皎皎太初噐傑文雄靈蟠出水秋鶚乗風鑪化宇宙無所不攻他時圖畫麟閣之中右衛李兵曹公進字徳昇質噐渾素寔曰清儒三獻爼豆八音笙竽擺落覉局沉研道樞髙播屹立無得而踰大理錢許亊徽字文羙和順中積英華外發碧海靈珠秋天朗月風度可法文章無轍何許風栖峩峩雙闕劉將軍雲摩氣英百戰知名蓮花劒利騂角弓鳴臨敵有勇奉身以誠志清淮海材冠戎兵皎皎素壁雄雄華精毎遊秦苑翻疑栁營徐將軍進朝姿觀瓌竒和門之嶲龎首箕口虎頭鷹瞬臨戎激厲撫士下信虚實知兵龍蛇識陣機謀宏逺墻宇髙峻何處功名下邳古鎮文苑英華卷七百八十三
