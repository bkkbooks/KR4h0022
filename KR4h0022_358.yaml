body:
  text: 文苑英華巻三百五十八宋李昉等編騷五秋風摇落一首擬招隠士一首獄中學騷體一首招北客文一首文祝延一首為人譔乞巧文一首湘中怨觧一首迎潮送潮詞一首憫禱辭一首秋風摇落梁孝元皇帝秋風起兮寒雁歸寒蟬鳴兮秋草腓萍青兮水澈葉落兮林稀翠為蓋兮玳為席蘭為室兮金作扉水周兮曲堂花交兮洞房樹參差兮稍宻紫荷紛披兮疏且黄雙飛兮翡翠並泳一作某兮鴛鴦神女雲兮初度雨班妾扇兮始藏光且淹留兮日云暮對華燭兮歡未央此篇三百三十一巻重出前已削去注異同為一作擬招隠士范縝修竹苞生兮山之岑繽紛葳蕤兮下一作不交隂木蘢藂兮巍峩川澤泱漭兮雲霧多悲猨鳴噪兮嘯儔侣攀折芳條兮聊停佇夫君兮不還蕙華兮彫殘嵗晏兮憂未開疑作闌草蟲鳴兮凄凄蕭兮森兮𤣥磵深悵徬徨兮沉吟紛紛一作紛紜兮菴薆一作晻曖窮巖穴兮熊窟幽林杳𡨕兮吁可畏嶔崟兮嶮㠖岌峩兮傾欹飛泉兮激沫散漫兮淋漓弱蘿兮修葛亘蔓兮長枝緑林兮被崖隨風兮紛披猛獸兮封狐眈眈兮視余扶藤兮直上巖巖兮嶷嶷一作擬擬霏霏兮敷敷赤豹兮文貍攀騰兮相追思慕公子兮心遲遲寒風厲兮鴟梟吟鳥悲鳴兮離其羣公子去兮誰與親行露厭浥兮似中人獄中學騷體盧照隣夫何秋夜之無情兮皎晶悠悠而太長圜户杳其幽邃兮秋疑作愁人披此嚴霜見河漢之西落聞鴻一作鳴雁之南翔山有桂兮桂有芳心思君兮君不將憂與憂兮相積歡與歡兮兩忘風嫋嫋兮木紛紛凋緑葉兮吹白雲寸歩千里兮不相聞思公子兮日將曛林已暮兮鳥羣飛重門掩兮人徑稀萬族皆有所托兮蹇獨淹留而不歸招北客文岑參文粹作獨孤及蜀之先曰蠶藂兮縱其目一作號以穪王當周室陵頽兮亂無紀綱洎乎杜宇從天而降鼈靈泝江而上相禪而帝㨿有南國之九世二字一作地蜀本南夷人也皆左其袵而椎其髻及通乎秦也始於惠王之代五牛琢文粹作椓而秦女至一蛇死而力士斃二江雙注羣山四蔽其地卑濕其風胜脆蠻貊雜處滇𤏡為隣地偏而兩儀不正寒薄而四氣不均花葉再榮秋冬如春暮夜多雨朝旦多雲陽景罕開隂氣恒昏以暑以濕為瘵為癘氣浥熱以中人吾知虛膇之疾兮將嬰爾身蜀之不可徃北客歸去來兮其東則大江沄沄下絶地垠百谷相吞出于荆門突怒吼劃附于太白渤潏硼砰㑹于滄溟跳噴浩淼上濺飛鳥蹙縮盤渦下漩黿鼉三峽兩壁亂峯如㦸槎枒屹崪澒洞劃拆髙干天霓雲外水積盡日無光其下黑窄瞿塘無底淺處萬尺啼猿哀哀膓斷過客復有千歳老蛟能變其身好飲人血化為婦人衒服靚粧逰於水濵五月之間白帝之下洪濤塞峽不見灔澦翻天蹙地震吼雷怒亦有行一作巨舟突然而去人未及顧棹未及舉瞥見陽䑓不辨雲雨千里一歇日未亭文粹作移午須臾黑一作狂風暴起㧞樹震山石走沙飛波騰浪翻舟子失㩀摧檣折竿漩入九泉没而不還支體糜散蕩入石間水族呀呀撥文粹作㧞剌争飡蜀之東兮文粹無兮字不可以徃北客歸去來兮其西則髙山萬重峻極屬天西有崑崙其峯相連日月廻環礙文粹作閡於山巔巒崖盤嶔天壁夐絶陽和不入隂氣固閉千年增氷萬古積雪谿寒地坼谷凍石冽夏月草枯春天木拆蒼煙凝兮黑霧結人堕指兮馬傷骨江水噴激廻盤紆欝文粹作縈棧壁縁雲鈎連相撑繩梁嶫虚儔文粹作傍沓杳𡨕下不見底空聞波聲過者矍然亡魂喪精復引一索其名為笮人懸半空度彼城壑或如鳥兮或如玃倐徃還來幸不落後文粹作或有豪猪千羣突出如牛脩角如劔餓虎争肉吼怒闞闞復有髙崖墜石兮聲如雷之軯轟上敲下磕似火迸兮滿山流星磵谿忽兮倒流林岸為之頽傾驚文粹作碎非騰狖與過鳥駭木魅兮山精深榛努一作怒鬛射人寒態孔碩登樹自擲見人則擘巨糜飛石壓人兮不可行西有犬戎與此山通行貎類人言語不同氊廬隆穹毳裘䝉茸啜酪啖肉持鎗挾弓依草及泉務戰與攻其聲如犬其聚如蜂中國之人兮或流落於其中豈知掘䑕茹雪以為食終當鈹其足而纍其胸泣漢月於西海思故鄉於北風蜀之西不可以徃北客歸去來兮其南則有卭崍文粹作笮之關天設險難少有平地連延長山横亘瀘江傍隔百蠻吁彼漢源上當漏天靡日不雨四時霶然其人如魚爰處在泉終年霖霪時復日出㹞㹞諸犬向天吠日人皆濕寢偏死腰疾復有陽山之路毒瘴下凝白日無光其氣瞢瞢暑雨下濕黄茅上蒸南方之人兮不敢過豈止走獸踣兮飛鳥墮吾不知造化兮何致文粹作知此方些蜀之南兮不可以居文粹作蜀之南不可以徃北客歸去來兮其北則有劔山巉巉天鑿之門二壁谽谺髙崖嶙峋上柱南斗榜鎮於坤下有長道兆逹於秦秦地神州中有聖人左右伊臯能致我君雙闕峩峩上覆慶雲千官鏘鏘朝於紫宸玉樓鳯凰金殿麒麟布徳垂澤搜賢修文皇化欣欣煦然如春蜀之北兮一作不可以徃北客歸去來兮文祝延并序沈亞之文祝延之指本有集作其本又作有本儔祀閩人歌其賢也閩侯居政得民民䕃而安他日侯恙在體巷野之祈祀於神者皆以侯請蓋憂焉後得間而祠乃舒其俗以為言俚不足自道或謂軍副者亞之能變風從律善闡物志因耋耆為請於是與聞之二字作文以通其意且以古之得人者衆皆祝延之今復用言命為篇目其詞二集有闚字閩山之枕杭兮水淜淜吞荒抱大兮沓疊層騰氣清渾兮朝昏神生其中兮宅幽凝居如山兮惠如水處端卓兮赴下而忘鄙集集作集人之祈兮從人之所市攀清明兮咋髣髴我民請兮期吉日願聴誠兮陳所當侯臨我兮恩如光照導兮煦覆惠流吾兮樂且康恭聞侯兮飲食失常民㷀集作縈憂兮心若瘡飽我之饑兮侯由百集作有糓神有澤兮宜隂集作䕃沃脫侯之恙兮歸侯之多福羣卑勤之㓗㳟集作㳟㓗兮鑒鎮盟乎山行右一闋為祈神兕載吹兮音咿咿銅鐃呶兮睋呼眓睢樟之蓋兮麓下雲垂幄兮煙為帷合吾民兮將安惟吾侯之康兮樂欣肴盤列兮合集作答神神擺漁皇兮降拂崒崒右侍妓兮左夫人態修邃兮佻眇調丹含瓊兮瑳上聲使笑馨炮羶燔兮溢按豆爵盎無虚兮果摭雜佑杖集作秋雲清醉兮流融光巫裾旋兮覡袖翔瞪虛凝兮鑒廻陽集作覧迴陽語神歡兮酒云集作味央望吾侯兮遵賞事朝馬駕兮搦寳轡干彌函弦兮森導騎吾何樂兮神軒維吾侯之康兮居遊自遂右一闋為酬神為人譔乞巧文和史舘陳學士作邯鄲人伎婦李客集作容子七夕祀織女作穿針戱取苕葟芙蓉雜致席上以望巧所降其夫以為沈下賢工文集有又字能剏窈窕之思善感物態因請譔為情語以道所欲詞曰惟雲渚之震集作晨秋兮天曠碧以凝慕懸韶桂於姹月泫明淚之新集作清露即河集作何非房之將期儼龍輪以就馭㳟聞司巧之多方妾修馨香以奉具竊獨溺於自私希靈娥之所付羽集作珚碧凝其異質兮韻隆虹集作虹隆於霾霽假文羽於孔雀兮而使擅夫佳麗載雲蟬之重緌兮塗蠻金於綺篲細綃縷於藕腸兮差蓮跗以齒緻集作様齒而纎𤓰之絲蟲兮集作命纎𤓰之蟲絲兮褭簷機之夕綴是物之巧功善飾願賜妾於針紉也葩蕚鬰於濃妍包多宜以善喜一作矣匪引纎吹於輕颷若將翔而復倚醉光春之流景播清香於萬里霓煙出乎無間縹窈眇以斐亹若披若曵兮撦平林兮横曉水一作若曵乎平林撦兮迴若横於曉水襲霽旦之繁芳兮因文集作隱映而增綺澹冉冉其夥容一作澹凝􅀈其冶容兮世無容集作隠以皆此是物之巧容善態願委妾於態媚也短蒲狹涘兮曲溜溢鵁鶄鵷鶵兮引乳娣戱音一有聲字清諧兮蕩一有演字曵牽遊裾之低凝兮蔓春心於淇裔枯寒勁幹兮憶氣擺風呌夜兮留澡雪留韵凄澁兮映􅑜咽吟夢語之連一作清漣感霜鍾之流越是物之巧音善感願付妾於管絃也湘中怨觧并序湘中怨者事本恠媚為學者不當集作未嘗有述然而淫溺之人徃徃不悟今欲慨其所論以著誠而已從生常敖喜集作善譔樂府故牽而廣之以應其詠垂拱年中駕在上陽宫太學進士鄭生晨發銅駞里乗曉月度洛橋聞橋下有哭甚哀生下馬循聲察集作索之見艷女三字集作見有麗情集作見其翳然䝉袖麗情集作袂曰我孤飬於兄嫂惡常苦我麗情集作嫂惡視我今欲赴水故留哀須臾生曰能遂集作逐我歸之乎應曰婢御無悔遂載與居號曰汜人所麗情集作能誦楚人九歌招魂九辨之書亦嘗擬其調賦為怨詞其詞麗絶麗情集作亦嘗擬詞賦為怨歌其詞艷麗世莫有属者因譔風光集作光風詞曰隆佳秀兮昭麗情集作招盛時播薰一作芳緑兮淑華歸故里荑集作英與處蕚兮潛重房以飾姿見雅集作推態之韶羞麗情集作容兮䝉長藹集作靄以為幃醉融光兮渺渺瀰瀰迷千里兮涵湮媚晨陶陶兮暮熈熈舞姚娜之穠條兮嫂集作騁盈盈以披遲酡遊麗情集作容顔兮倡蔓冉縠流蒨電兮石髪髓施麗情集作隨生居貧汜人嘗觧篋出輕繒一端與賣胡人酬之千金居數歳生遊長安是夕謂生曰我湘中蛟宫之娣也謫而從君今歳滿無以乆留君所欲為訣耳相倚二字集作即相持啼泣生留之不能麗情集作啼泣留之竟去後十餘年生之兄為岳州刺史㑹上已日與家徒登岳陽樓望卾渚張宴樂酣生愁思吟之曰情無垠兮蕩蕩洋洋懐佳期兮属三湘聲未終有畫艫浮漾而來中為麗情集作有綵樓髙百餘尺其上施幃帳欄櫳盡集作畫飾帷褰有彈絃鼔吹者皆神仙娥眉被服煙電麗情集作霞裙麗情集作裾袖皆廣長麗情集作又其中一人起舞含嚬凄怨麗情集作怨望形類汜人舞而歌曰泝清風集作青山麗情集作青春兮江之隅拖湘波兮褭緑裙荷拳拳兮情未舒匪同歸兮將焉如舞畢歛袖翔然凝望樓中縱觀方悟眙二字麗情集作臨檻須臾風濤崩怒遂迷所徃元和十三年余聞之於朝集作朋中因悉補其詞題之曰湘中怨蓋欲使南昭嗣煙中之述集作志為偶唱集作偈也迎潮送潮辭并序陸龜蒙余耕稼所在松江南旁田廬門外有濤通浦溆而朝夕之潮至焉天弗雨則乾而留之用以滌濯灌溉及物之功甚鉅其形狀遲速繫望晦盈虚也用之則順而進捨之則黙而退有類乎君子之道翫而感之作迎潮送潮二辭以聊寄聲於騷人之末云集作耳迎潮江霜嚴兮楓葉丹潮聲髙兮墟落寒鷗巢卑兮魚箔短逺岸没兮光爛爛潮之徳兮無涯際既充其大兮又充其細沒幽逕集作沒幽岸文粹作宻幽兮欵柴門寂寞留集作流連兮依希舊痕餘波集作濡腴文粹作濡餘澤槁兮潮之恩不尸其功兮歸於混元送潮潮西來兮又東下日染中流兮紅灑灑汀葭蒼兮嶼蓼枯北風騷牢兮愁煙以孤大幾望兮㣲將晦翳睨文粹作瀛溶兮歛然而退愛長波兮數數一幅巾兮無纓可濯㠶生塵兮檝有衣悵潮之還兮吾猶未歸憫禱辭有序劉蛻小子出都城見邑大夫為民之禱者屬石燕不飛啇羊不舞民有焦心請大夫祈龍波祠以厭民望彼巫歌伶吹竹鼔栧呼空者訖唱屢夕俄然㣲灑輕霎芳神之來意似憫巫之役是也作辭以吊民云公邑之南兮禱龍之潭空波隣天兮雲物中涵鱗颸糓碧兮淵恠相叅風翼輕翔兮帶直煙嵐吏不政兮胥為民蠶政不繩兮官為胥酣彼民之不能口舌兮為胥之緘進不得理兮若結若鉗隂戾陽返兮民之不堪燥集作爍日日流熖兮赫奕如惔奫泉沸涌兮如湯而炎役巫女兮鼉鼔坎坎平聲叶韻風笛摇空兮舞袂衫衫胥不䖍祈兮官資笑譚胡不戮狡胥兮狥此㓗嚴胡不罪已之不正兮去此貪婪荷天子之優禄兮胡為而不亷又何役女巫而集作兮禱此空潭文苑英華卷三百五十八
