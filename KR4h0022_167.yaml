body:
  text: 文苑英華卷一百六十七宋李昉等編帝德執契靜三邊一首奉和執契靜三邊應詔一首觀大駕出敘事寄懷一首織錦作太平詩一首在雋州遙敘封禪一首宣政殿芝草一首奉和皇帝上禮撫事述懷一首皇帝上禮撫事述懷一首扈從登封途中作四首龍池篇一首大同殿生玉芝龍池上有慶雲百官共覩聖恩便賜宴樂因書即事一首駕出長安一首駕幸河東一首皇帝聖感詞四首天長地久詞五首大禮畢皇帝御丹鳯門改元建中大赦一首還京樂歌詞一首春日奉獻皇壽無疆詞十首太和戊申嵗大有年詔賜百僚出城觀秋稼謹書盛事以俟采詩者一首今皇帝陛下詔徴兵不日功集河湟諸郡次第歸降臣獲覩聖功輒獻歌詠一首奉和白相公聖德和平致兹休運嵗終功就合詠盛明呈上三相公一首歌詠聖德追懷天寶因題關亭一首宣政殿前陪位觀册憲宗皇帝尊號一首元日樓前觀仗二首三年冬大禮五首升平詞五首朝元引四首聖帝擊壤歌一首嵗仗一首執契靜三邉唐太宗執契靜三邉持衡臨萬姓玉彩輝關燭金華流日鏡無為宇宙清有美璇璣正皎珮星連景飄衣雲結慶戢戈榮七德升文輝九功煙波澄舊碧塵火息前紅霜野韜蓮劔關城罷月弓錢綴榆天合新城桞塞空花銷蔥嶺雪縠盡流沙霧秋駕轉兢懷春氷彌軫慮書絶龍庭羽烽休鳯穴戍衣宵寢二難食肝飱三懼剪暴興先廢除凶存昔亡圓蓋歸天壤方輿入地荒孔海池京邑雙河沼帝鄉修躬思勵已撫俗愧時康元首佇鹽梅股肱唯輔弼羽賢崆嶺四翼聖襄城七澆俗庶反淳替文聊就質已知隆至道共歡區宇一奉和執契靜三邉應詔許敬宗玄塞隔隂戎朱光分昧谷地遊窮北際雲崖盡西陸星次絶軒臺風衢乖禹服寰區無所外天覆今咸育竄苗猶有孽戮負自貽辜網踈妖鯢漏盤藪怪禽逋髯飛尚假息乳視慙稽誅乾靈振玉弩神略運璇樞日羽廓遊氣天陳清華野升烜光西夜馳恩溢東瀉揮袂靜崑炎開關納流赭錦軺凌右地華纓羈大夏清臺映羅葉玄沚控瑶池駝鹿輸珍貺樹羽饗來儀輟肴觀化雨栖籞萃條支薰風交閬闕就日泛濛漪充庭延飲至絢簡敷春藻迎薑已創圖命力方論道昔託逰河乘再備商山皓欣逄德化流思效登封草觀大駕出敘事寄懷釋法輪紫臺宵漏竭青門曙鼓通輕霞照復道徐吹轉相風玉鑾光萬騎金輿鬱五戎鳴笳猶度闕清蹕尚喧宫雲旗亂陌紫羽斾雜塵紅百城歸北麗兩漢久慙雄吾曹陋薄技餘慶洽微躬平原已起洛印手亦還豐得奉衣冠盛仍觀書軌同猶言待封告未忍向華嵩織錦作太平詩新羅王真德永徽五年合從本傳作元年新羅王真德即新羅王金真平女也平卒無子女乃嗣立為王大破百濟之衆其弟子春秋之子法敏以聞德真乃織錦作五言太平詩以獻之其詞曰大唐開洪業巍巍皇猷昌止戈戎衣定修文繼百王統天崇雨施治物體含章深仁諧日月撫運邁時康幡旗既赫赫征一作鉦鼓何鍠鍠外夷違命者剪覆𬒳天殃和風凝宇宙一作淳風凝幽顯遐邇競呈祥四時調玉燭七耀巡萬方維嶽降宰輔維帝任忠良五三咸一德昭我皇家唐在雋州遙敘封禪李義府天齊標巨鎮日觀啓崇祠岧嶤臨渤澥隱嶙控河沂建嶽誠為長升功諒在兹帝猷符廣運玄範暢文思飛聲總地絡裁化撫乾維瑞䇿開珍鳯禎圖薦寶龜創封超昔夏修禪掩前姬東后方肆覲西都導六師肅駕移星苑揚罕馭風司沸鼓喧平陸凝蹕靜通逵汶陽馳月羽蒙隂警電麾巖花飄曙輦峯葉蕩春旗石閭環藻衛金壇映黼帷仙階溢祕秬靈檢耀祥芝三始貽遐貺萬嵗受重釐菲質陶恩奬趨迹奉軒墀解網淪幽裔乘徼限明時周南昔已歎卭西今復悲宣政殿芝草前人明王敦孝感寶殿秀靈芝色帶朝陽淨光涵南露滋且標宣德重更引國恩施聖祚今無限微臣樂未移奉和皇帝上集作丘禮撫事述懷陳子昻大君忘自我應運居紫宸揖讓期明辟謳歌且順人軒宫帝圖盛皇極禮容申南靣朝萬國東堂會百神雲陛旗常滿天庭玉帛陳鐘石和睿思雷雨被深仁承平信娛樂王業本艱辛願罷瑶池宴來觀農扈春卑宫昭夏禮尊老睦堯親微臣敢拜手歌舞頌惟新皇帝上一作丘禮撫事述懷李嶠配極輝光逺承天顧託隆負圖濟多難脫履歸成功聖道昭永錫雍言讓在躬還推萬方重咸仰四門聰恭已忘自逸因人體至公垂旒滄海宴解網法星空雲散天五色春來日再中稱觴合纓辨率舞應絲桐凱樂深居鎬傳歌盛飲豐小臣濫簮筆無以頌唐風扈從登封途中作宋之問帳殿鬱崔嵬仙逰實壯哉曉雲連幕卷夜火雜星回谷暗千旗出山鳴萬乘來扈逰良可賦終乏掞天才扈從登封告成頌前人御路回中嶽天宮接下都百靈無後至萬國競前驅文衛嚴清蹕幽仙讀寶符貝花明漢果芝草入堯厨濟濟衣冠會喧喧夷夏俱宗禋仰神理凱樂望仙途撫已貧非病時來本不愚願陪丹鳯輦率舞向天衢頌前人復道開行殿鈎陳列禁兵和風吹鼓角佳氣動旗旌後騎回天苑前山入御營萬方俱下拜相與樂升平松山嶺前人翼翼髙旌轉鏘鏘鳯輦飛塵銷清蹕路雲濕從臣衣白羽搖丹壑天宮逼翠微芳聲耀今古四海警宸威龍池篇沈佺期龍池濯龍龍已飛龍德光天天不違池開天漢分黃道龍向天門入紫微邸第樓臺多氣色君王鳬鴈有光暉為報寰中百川水來朝北地莫東歸大同殿生玉芝龍池上有慶雲百官共覩聖恩便賜宴樂因書即事王維欲笑周文歌宴鎬遙輕漢武樂橫汾豈如玉殿生三秀詎有銅池出五雲陌上堯樽傾北斗樓前舜樂動南薰共歡天意同人意萬嵗千秋奉聖君駕出長安王昌齡聖德超千古皇風扇九圍天回萬象出駕動六龍飛淑氣來黃道祥雲覆紫微太平多扈從文物有光輝駕幸河東前人晉水千廬合汾橋萬國從開唐天業盛入沛聖恩濃下輦回三象題碑任六龍睿明懸日月千載此時逢皇帝聖感詞四首盧綸提劔雲雷動垂衣日月明禁花呈瑞色國老見星精發棹魚先躍窺巢鳥不驚山呼一萬嵗直入九重城二天衣五鳯彩御馬六龍文雨露清馳道風雷翊上軍髙旌花外轉行漏嶽前聞時見金鞭舉空中指瑞雲三妙算干戈止神謀宇宙清兩階文物盛七德武功成校獵長楊苑屯軍細桞營歸來獻明主歌舞溢春城四天樂下天中雲軿儼在空鉛黃艷河漢笑語合笙鏞已見長隨鳯仍聞不射熊君王親試舞閶闔靜無風天長地久詞五首前人玉砌紅花樹香風不敢吹春光解人意偏發殿南枝天長地久萬年枝二虹橋千步廊半在水中央天子方清暑宫人重暮粧天長地久萬年昌三辭輦復當熊傾心奉六宫君王若看貌甘在衆妃中天長地久萬年通四雲日呈祥禮物殊彤庭生獻五單于塞天萬里無飛鳥可在邉城用郅都五臺殿雲涼秋日微君王𥘉賜六宫衣樓船泛罷歸猶早行遣才人鬭射飛大禮畢皇帝御丹鳯門改元建中大赦李益大明曈曈天地分六龍負日升天門鳯凰飛來銜帝籙言我萬代金皇孫靈雞鼓舞承天赦髙翔百尺乘朱幡宸居穆清受天厯建中甲子合上元昊穹景命即已至王事乃可酬乾坤升中告成答玄貺泥金檢玉昭鴻恩雲亭之事略可記七十二君寧獨尊小臣欲上封禪草集作表久而未召集作就歸陵園還京樂歌詞竇常百戰初休十萬師國人西望翠華時家家盡唱升平曲帝幸梨園親製詞春日奉獻皇壽無疆詞十首楊巨源文物京華盛謳謡國步康瑶池供壽酒銀漢麗宸章靈雨含雙闕雷霆肅萬方代推仙祚逺春共聖恩長鳯扆臨花暖龍爐旁日香遙知千萬嵗天意奉君王二鴛鷺彤庭際軒車綺陌前九城多好樂萬井半祥煙人醉逄堯酒鶯歌答舜絃花明御溝水香暖禁城天賜宴文逾盛徴歡物更妍無窮艷陽月長奉太平年三雲陛臨黃道天門在碧虛大明含睿藻元氣抱宸居戈偃征苖後詩傳宴鎬初年華富仙苑時哲滿公車化入絪緼大恩垂渙汗餘悠然萬方靜風俗揖華胥四玉漏飄青璅金鋪麗紫宸雲山九門曙天地一家春瑞靄方呈賞暄風本配仁巖廊開鳯翼水殿壓鼇身文雅逄明代歡娛及賤臣年年未央闕恩共物華新五垂拱乾坤正歡心品類同紫煙含北極玄澤付東風珠綴留晴景金莖直曉空發生資盛德交泰讓全功間氣登三事祥光啓四聰遐荒似川水天外一朝宗六代是文明晝春當宴喜時爐煙添桞重宫漏出花遲漢典方寬律周官正採詩碧霄傳鳯吹紅旭在龍旗造化膺神契陽和沃聖思無因隨百獸率舞奉丹墀七睿德符玄化芳情翊太和日輪皇鑒逺天仗聖朝多曙色含金榜晴光轉玉珂中宫陳廣樂元老進賡歌蓮葉看龜上桐花識鳯過小臣空擊壤滄海是恩波八物象朝髙殿簮裾溢上京春當九衢好天向萬方明樂報簫韶發杯看沆瀣生芙蓉丹闕暖楊桞玉樓晴閶闔開中禁衣裳儼太清南山同聖壽長對鳯凰城九日上蒼龍闕香含紫禁林晴光五雲疊春色九重深賞叶元和德文垂雅頌音景雲隨御輦皓氣在宸襟永保無疆壽長懷不戰心聖朝多慶賜瓊樹粉墻隂十化洽生成遂功宣動植知瑞凝三秀草春入萬年枝鳯掖嘉言進鴛行喜氣隨仗臨丹地近衣對碧山垂渥澤方柔逺聰明本聽卑願同東觀士長對漢威儀大和戊申嵗大有年詔賜百寮出城觀秋稼謹書盛事以俟采詩者劉禹錫長安銅雀鳴秋稼與雲平玉燭調寒暑金風報順成川原呈上瑞恩澤賜間行欲返皇城掩猶聞歌吹聲今皇帝陛下一詔徴兵不日功集河湟諸郡次第歸降臣獲覩聖功輒獻歌詠杜牧捷書皆應睿謀期十萬曾無一鏃遺漢武慙誇朔方地周宣休道太原師威加塞外寒來早恩入河源凍合遲聽取滿城歌舞曲涼州聲韻逺參差奉和白相公聖德和平致兹休運嵗終功就合詠盛明呈上三相公前人行看臘破好年光萬壽南山對未央黠戞可汗修職貢文思天子復河湟應須日馭西巡狩不假星弧北射狼吉甫裁詩歌盛業一篇江漢美宣王歌詠聖德追懷天寶因題關亭聖敬文思業太平海寰天下唱歌行秋來氣勢洪河壯霜後精神泰華寧廣德有強朝萬國用賢無敵是長城君王若悟治皮諭安史何人敢弄兵宣政殿前陪位觀册憲宗皇帝尊號薛逢樓頭鐘鼓遞相催曙色當衙曉仗開孔雀扇分香案出衮龍衣動册函來金泥照耀傳中旨玉節從容引上台盛禮永尊徽號畢聖慈南靣不勝哀元日樓前觀仗二首前人千門曙色鎖寒梅五夜踈鐘曉箭催寶馬占堤朝闕去香車爭路進名來天臨玉几班初合日照金雞仗欲回更傍紫微瞻北斗上林佳氣滿樓臺二曈曈初日照樓臺漠漠祥雲雉扇開星駐冕旒三殿曉雲翻珠翠六宫來山呼聖夀煙霞動風轉金章鳥獸回欲識普恩無逺近萬方歡抃一聲雷三年冬大禮五首曹唐皇帝齋心潔素誠自朝真祖報升平華山秋草多歸馬滄海寒波絶洗兵銀箭水殘河勢斷玉爐煙盡日華生千官整肅三天夜劔佩初聞入太清二海日西飛度禁林太清宫殿月沉沉不聞北斗傾堯酒空覺南風入舜琴歌壓鈞天間夢盡詔歸秋水道情深雪風更起古杉葉時送步虛清磬音三太一天壇降大君屬車龍鶴夜成羣春浮玉藻寒初落露拂金莖曙欲分三代樂回風入律四溟歌駐水成文千官不動旌旗下日照南山萬樹雲四山擁飛雲海水清天壇未夕仗先成千官不起金縢議萬國空瞻玉藻聲禁火曙然煙焰裊宫衣寒拂雪花輕側聞左右皆周吕看取從容致太平五太和琴暖發南薰水濶風髙得細聞滄海舉歌夔是相歷山回禪舜為君翠微呼處生丹障清淨封中起白雲今日病身慙小隱欲將泉石勒移文升平詞五首前人瑞氣繞宫樓皇居上苑逰逺岡連聖祚平地載神州會合兼重譯潺湲近八流中興豈假問據此自千秋二寥泬敞延英朝班立位橫宣傳無草動拜舞有衣聲鴛瓦霜消濕蟲絲日照明辛勤自不到遙見似前程三處處是歡心時康嵗已深不同三尺劔應似五絃琴夀笑山猶盡明嫌日有隂何當憐一物亦遣斷愁吟四日日聽歌謡區中盡祝堯蟲蝗初不害兵革近全銷史筆唯書瑞天臺絶見妖因令匹夫志轉欲事清朝五五帝三皇主蕭曹魏邴臣文章唯返朴戈甲盡生塵諌紙應無用朝綱自有倫升平不可記所見是間人朝元引四首陳陶帝燭熒煌下九天蓬萊宫曉玉爐煙無窮鸞鳯隨金母來賀薰風一萬年二正雜詠作玉殿雲開露冕旒下方珠翠壓鼇頭天雞唱罷南山曙春色先歸十二樓三萬宇靈祥擁帝居東華元老薦屠蘇龍池遙望非煙拜五色曈曨在玉壺四寶祚河宫一向清龜魚天篆益分明近臣誰獻登封草五嶽齊呼萬嵗聲聖帝擊壤歌四十聲前人百六承堯緒艱難土運昌大虛橫彗孛中野鬭豺狼帝曰更吾嗣時哉憶聖唐英星垂將校神嶽誕忠良錬石醫元氣屠鼇正昊蒼掃原鋪一德驅祲立三光大道重蘇息真風再發揚芟夷踰舊迹神聖掩前王郊酒酣寥廓鴻恩受渺茫地圗龜負出天誥鳯銜將雜貢來山峙羣夷入鴈行紫泥搜海岱鴻筆富巖廊鷹象敷宸極寰瀛作瑞坊泥丸封八表金鏡照中央構殿基一作輝麟趾開藩表鳯翔鑾輿親稼穡朱幌務蠶桑戎羯輸天馬靈仙侍玉房宫儀水精甲門衛緑沉槍陶鑄超三古車書混萬方時巡望虞舜搜狩法殷湯化合謳謡滿年豐鬼蜮藏政源歸牧馬公法付神羊寶鼎無靈應金甌肯破傷封山昭茂績祠執答嘉祥在昔宫闈僣仍罹羿浞殃牝雞何憝噧猘犬漫劻勷苖禱三靈怒桓偷九族亡鯨鯢尋挂網魑魅旋投荒松柏霜逾翠芝蘭露更香聖謨流祚逺仙系發源長島嶼征徭薄漪瀾泛稻涼鳬魚饜餐啖荷薜足衣裳寤寐華胥國嬉逰太素鄉鷹鸇飛接翼忠孝住連牆有叟能調鼎無媒隱釣璜乾坤資識量江海入文章野鶴思蓬闕山麋憶廟堂泥沙空淬礪星斗屢低昻歷草何因見衢樽豈暫忘終隨嘉橘賦霄漢謁羲皇嵗仗羅鄴玉帛朝元萬國來雞人唱曉五門開春排北極迎仙馭日捧南山入夀杯歌舞薰風鏗劔佩祝堯佳象靄樓臺可憐四海車書共重見蕭曹佐漢材文苑英華卷一百六十七
