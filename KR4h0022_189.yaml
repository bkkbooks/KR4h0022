body:
  text: 文苑英華卷一百八十九宋李昉等編省試十州府試附至人無夢一首人不易知二首行不由徑四首言行相顧一首求自試一首天門街西觀榮王聘妃二首太社觀獻捷一首觀劍南獻捷一首河中獻捷一首送薛大夫和蕃二首吳宫教戰二首李太尉重陽日得蘇屬國書一首題杜賔客新豐里幽居一首石季倫金谷園一首仲秋太常寺觀公輅車拜陵一首早春送郎官出宰一首武德殿朝退望九衢春色一首金莖一首錦帶佩吳鈎一首雲母屏風隔坐一首觀淬龍泉劍一首青出於藍二首白受采一首晦日同志昆明池泛舟二首上已連清明遊宴一首登聖善寺閣望龍門一首上元日聽太清宫步虛一首府試中元觀道流步虛一首河南府試鄉飲酒一首京兆府試目極千里一首國學試風化下一首府試古鏡一首秦鏡二首監試夜雨滴空階一首江陵府試澄心如水一首至人無夢蔣防已賾希微理知將靜默鄰坐忘寧有夢跡滅示凝神化蝶誠知一作知成幻徵蘭匪契真抱𤣥雖解帶守一自離塵寥朗壺中曉虛明洞裏春翛然碧霞客那比漆園人人不易知鄭昉如靣誠非一深心豈易知入秦書十上投楚嵗三移和玉翻為泣齊竽或濫吹周行雖有置殷鑒在前規寅亮推多士清通固賞竒病諸方號哲敢相反成疵冬日承餘愛霜雲喜暫披無令見瞻後回照復云疲同前失名權衡諒匪易愚智信難移九德皆殊進三端豈易施同稱昆岫寶共握桂林枝鄭鼠今奚别齊竽或濫吹瑶臺有光鑑屢照不應疲片善當無掩先鳴貴在斯龍門峻且極驥足庶來馳太息李元禮期君幸一知行不由徑孟封類詩作蕭昕欲速竟何成康莊亦砥平天衢皆利往吾道本方行不復由蓬徑無因訪蔣生三條遵廣道九軌尚安貞紫陌悠悠去芳塵步步清淡臺千載後公道有遺名同前王炎類詩作庾承宣邪徑趨時捷端心惡此名長衢貴高步大路自規行且慮類詩作且避縈紆僻將求坦蕩情詎同流俗好方保立身貞逺跡如違險修仁在履平始知夫子道從此得堅誠同前張籍田裏有微徑賢人不復行孰知趨集作熟知求捷步惟集作又恐異端成從易衆所欲安邪患亦生誰能違大路集作逺大道共此競前程子羽有遺跡孔門傳舊聲今逢大君子士節再集作自應明同前俞簡古人心有尚乃是孔門生為計安貧樂當從大道行詎應流逺迹方欲料前程捷徑雖云易長衢豈不平後來無枉路先逹擅前名一示遵途意微衷益自精言行相顧吳叔逹聖人垂政教萬古請常傳立志言為本修身行乃先相須寧得闕相顧在無偏榮辱當於已忠貞必動天大名如副寶至道亦通𤣥千里猶能應何云邇者焉同前孟翺將使言堪復常聞行欲先比圭斯不玷修已直如絃跬步非全進吹噓禀自然當令夫子察無宿仲由賢正遇興邦際因懷入曙年坐知清監下相顧有人焉求自試竇常仙禁祥雲合高梧彩鳯遊沉冥求自試通鑑果䝉收文墨悲無位詩書誤白頭陳王抗表日毛遂請行秋雙劔曽埋獄司空問斗牛希垂拂拭惠感激願相投天門街西觀榮王聘妃張光朝仙媛來朱邸名王出紫微三周初展義百兩遂言歸鄭國通梁苑天津接帝畿橋成烏鵲助蓋轉鳯凰飛霜仗迎秋色星缸滿夜暉從茲磐石固應為得賢妃同前張鉉帝子乘龍夜三星照户前兩行宫火出十里道鋪筵羅綺明中識簫韶暗裏傳燈攢九華扇帳撒五銖錢交頸文鴛合和鳴彩鳯連欲知來日美雙拜紫微天太社觀獻入翰林試以功字為韻白居易淮海妖氛滅乾坤喜氣通班師郊社內操袂凱歌中廟算無遺策天兵不戰功小臣同鳥獸率舞向皇風觀劔南獻捷失名遐圻新破虜名將應一作舊登壇戎首西南至氈裘長幼觀邊疆氛已息矛㦸血猶殘紫陌歡聲動丹墀喜氣盤唐虞方德易衛霍比功難共覩俘囚入𢋫歌萬國安河中獻捷梁隨叛將忘恩久王師不戰通凱歌千里內喜氣二儀中冦盡條山下兵回漢苑東將軍初執訊明主欲論功落日烟塵靜寒郊壁壘空蒼生幸無事自此樂堯風送薛大夫和蕃孫頠亞相獨推賢乘軺向逺邊一心傾漢日萬里望胡天忠信皇恩重要荒聖德傳戎人方屈膝塞月復嬋娟别思流鶯晚歸朝候鴈先當書外垣傳回奏赤墀前同前失名戎王歸漢命魏綘諭皇恩旌斾辭雙闕風沙上五原往途遵塞道出祖耀都門策令天文盛宣威使者尊澄波看四海入貢佇諸蕃秋杪迎回驛無勞枉夢魂吳宫教戰吳祕類詩作顔粲客獻陳兵計功成欲霸吳玉顔承將略金殿賜軍符轉斾風雲暗鳴􅤯錦繡趨雪花頻落粉香汗盡流珠掩笑誰干令嚴師必用誅至今孫子法猶可靜邊隅同前林藻類詩作葉季良強吳矜霸略講武在深宫盡出嬌娥輩先觀上將風揮戈羅袖卷擐甲汗裝紅輕一作掩笑分旗下含羞入隊中鼓停行未整刑舉令方崇自可威鄰國何勞騁戰功李太尉重陽日得蘇屬國書白行簡降虜意何如窮荒九月初三秋異鄉節一紙故人書對酒情無極開緘思有餘感時空寂寞懷舊幾躊躇鴈盡平沙逈烟銷大漠虛回頭向南望掩淚對雙魚題杜賔客新豐里幽居蔣防退迹依三徑辭榮繼二踈聖情容解印帝里許懸車已去龍樓籍猶分御廪儲風泉輸耳目松竹助𤣥虛調護心常在山林意有餘應嗤紫芝客逺就白雲居石季倫金谷園許堯佐石氏遺文在凄凉見故園輕風思奏樂衰草憶行軒舞榭荒苔掩歌臺墜葉繁斷雲歸舊壑流水咽清源曲渚殘虹斂藂篁宿鳥喧空餘林上月長似對金樽同前李君房梓澤風流地凄凉跡尚存殘芳迷妓女衰草憶王孫舞態隨人謝歌聲寄鳥言池平森灌木月落弔空園流水悲難駐浮雲影自翻賔階餘蘚石車馬詎喧喧仲秋太常寺觀公輅車拜陵苖重芳南吕初開律金風已戒凉拜陵將展敬車輅儼成行士庶觀祠禮公卿習舊章郊原佳氣引園寢瑞烟長鹵簿辭丹闕威儀列太常聖心何所寄惟德正無忘早春送郎官出宰張隨仙郎今出宰聖主下憂民紫陌軒車送丹墀雨露新趨程猶犯雪行縣正逢春粉署時迥首銅章已在身鳴琴化欲展起草戀空頻今日都門外悠悠别漢臣武德殿朝退望九衢春色曹松玉殿朝初退天街一看類詩作一望春南山初過雨北闕净無塵夾道夭桃滿連溝御栁新蘇舒同舜澤煦嫗並堯仁佳氣浮軒蓋和風襲搢紳自茲憐萬類詩作知萬物同入發生辰金莖徐敞武帝貴長生延年餌玉英銅盤貯珠露仙掌抗金莖拂曙氛埃斂凌空沆瀣清岧嶤捧瑞氣巃嵸出宫城勢入浮雲聳形標霽色明大君當御宇何必去蓬瀛錦帶佩吳鈎張友正帶劔誰家子春朝紫陌遊結邊霞聚錦懸處月隨鈎綵縷回文出雄芒練影浮葉依花裏艷霜向鍔中秋的皪宜驄馬斕斒映綺裘應須待報國一刎月支頭雲母屏風隔坐失名彩障成雲母丹墀隔上公才彰二紀盛榮播一朝同近玉初齊白臨花乍散紅凝姿分縹眇轉珮辨玲瓏意愜恩偏厚名新寵更崇誰知歷千古猶自仰清風觀淬龍泉劔裴夷直歐冶將成器風胡幸見逢發硎思剸玉投水化為龍詎肯藏深類詩作深藏匣終期用刜鐘蓮華生寶鍔秋日勵霜鋒鍊質才三尺吹毛過百重聲一作擊磨如不倦提握願長從類詩作决雲今得便提出剪姦凶青出藍王季文芳藍滋匹帛人力半天經浸潤加新氣光輝勝本青還同氷出水不共草為螢翻覆依襟上偏知造化靈同前吕溫物有無窮好藍青更集作又出青硃研方比德白受始成形袍襲宜從政襟垂可問經當年集作時不採擷佳色幾飄零白受采失名皛皛金方色遷移妙不窮輕衣塵跡化净璧繢文通沙變藍溪漬氷渝墨沼空似甘言受和由禮學資忠皎潔形無定𤣥黃用莫同素心如可教願染古人風晦日同志昆明池泛舟朱餘慶故人同泛處逺色望中明靜見砂㾗露微思月魄生周回餘雪在浩渺暮雲平戲鳥隨蘭棹空波蕩石鯨劫灰難問理島樹偶知名自省曽遊雜詠作追賞無如此日情同前失名靈沼疑河漢蕭條見斗牛煙生知岸近水净覺天秋落月低前樹清輝滿去舟興因孤嶼起心為白蘋留曉吹兼漁唱閒雲伴客愁龍津如可上長嘯且乘流上已連雜詠作接清明遊宴獨孤良弼上已觀初罷清明賞又追閏年侵舊厯令節併芳時細雨鶯飛重春風酒醒遲玩花迷白雪看栁折青絲淑氣如相待天和竟為誰却雜詠作呼嗟名未立空詠宴遊詩登聖善寺閣望龍門成崿髙閣聊登望遙分禹鑿門剎連多寶塔樹滿給孤園香境超三界清流振陸渾報慈𢎞孝理行道得真源空净祥煙霽時光愛日溫願從初地起長奉下生尊上元日聽太清宫步虛張仲素仙客開金籙元辰㑹玉京靈歌賔紫府雅韻出層城磬雜音徐一作餘徹風飄響更清紆餘空外盡斷續聽中生舞鶴紛將集流雲住未行誰知九陌上塵俗仰遺聲府試中元觀道流步虛殷堯恭𤣥都開祕籙白石禮先生上界秋光靜中元夜景清星辰朝帝處鸞鶴步虛聲玉洞花長發珠宫月最明掃壇天地肅投簡鬼神驚儻賜刀圭藥還成不死名河南府試鄉飲酒吕溫見集本酌言雖舊典刈楚始登堂百拜賔儀盡三終樂奏長想同鶯出谷看似鴈成行禮罷知何適隨雲入帝鄉京兆府試目極千里劉得仁獻賦多年客低眉恨且千此心常鬱矣縱目忽超然送驥登長路看鴻入逺天古墟烟羃羃窮野草綿綿樹與金城接山疑桂水連何當開霽日無物翳平川國學試風化下薛能霽闕露穹崇含生仰聖聰英明高比日聲教下如風靜發宸居內低來品物中南薰歌自溥北極響皆通蘋末看無狀人間覺有功因令委泥者覩此忘途窮府試古鏡失名舊是秦時鏡今來古匣中龍盤初挂月鳯舞欲生風石黛曽留殿朱光適在宫應祥知道泰監物覺神通肝膽誠難隱妍媸信易窮幸居君子室長願免塵䝉秦鏡仲子陵萬古秦時鏡從來抱至精依臺月自吐在匣水常清爛爛金光發澄澄物象生雲天皆洞鑒表裏盡虛明但見人窺膽全勝響應聲妍媸定可識何處更逃情同前張佐樓上秦時鏡千秋獨有名菱花寒不落氷質夏長清龍在形難掩人來膽易呈升臺冝逺照開匣乍藏明皎色新磨出圓規舊鑄成愁容如可鑒常欲拂塵纓監試夜雨滴空階喻鳬霎霎復凄凄飄松又灑槐氣濛蛛網檻聲疊蘚花階古壁青燈動深庭濕葉埋徐垂舊鴛瓦競歷小茅齊冷與隂蟲間清將玉漏諧病身唯展轉誰見此時懷江陵府初試澄心如水盧肇丹心何所喻唯集作為水並清虛莫測千尋底難知一勺初內明非有物上善本無魚淡泊隨高下波瀾逐卷舒養䝉方浩浩出險集作海每徐徐若灌情田裏常流盡不如文苑英華卷一百八十九
