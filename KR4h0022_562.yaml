body:
  text: 文苑英華卷五百六十三宋李昉等編賀祥瑞三賀連理樹表一首皇太子賀瑞木表一首為納言姚璹等賀瑞桃表一首為宰相賀連理木表為宰相賀李樹凌冬結實表一首中書門下賀許州連理棠樹表一首皇太子賀芝草表二首為宰相賀合煉院産芝草表一首代百官賀芝草表一首中書門下賀芝草嘉禾表一首中書門下賀芝草表一首皇太子賀嘉麥表一首中書門下賀恆華州嘉禾合穗表一首賀嘉禾表一首為百官賀千葉瑞蓮表一首中書門下賀神龍寺渠中瑞蓮表一首賀西內嘉蓮表二首為百竂賀瑞筍表一首為朝官及嶽牧賀慈竹再生表賀連理棠樹合歡瓜白兔表一首賀連理樹表閭丘均臣聞靈氣所生恆起於無形祥跡所慿名屬於聖日雖微物之成象固王者之明徴臣所部官園中有李樹質茂宗生異標恆類交枝兩出共理三連緑葉密而泛烟白花糅而似雪觀於即事此句疑知者稱瑞當今星精下流天意𤣥寄往一作嘉圖誰載休徴莫儔昔上林樹生中興劉氏推神議物我則居多臣謬齒勞疑章慙名首席欣逄偶數竊躍昌期皇太子賀瑞木表臣某言臣聞惟德動天無逺而不格惟神感物有來而必應伏惟天皇提乾象運斗柄戴黃屋而臨太階正紫宫而開列室伏見某官奏稱石門𤣥谷內玉山宫側秋水一作暴長漂木三萬餘根林衡悚迫匠人驚視仙桂來於月中靈查下於天上昔開陽門之肇建飛柱潜移太極殿之初營浮梁逺至論其壯觀猶尺燼之窺尋木喻以皇家若牛涔之望鼇海方見凌雲之構匪日而成負黼扆而朝百神垂衣裳而㑹萬國盛矣美矣輪焉奐焉臣德謝元良濫膺儲二寢門來謁常取候於鳴雞大厦既成竊自歡於賀雀不任鳬藻之至謹遣某官某奉表稱賀為納言姚璹等賀瑞桃表李嶠臣某等言伏見內出靈桃四實共同一蒂禁園芳果仙庭竒樹名珍杏奈族茂櫻胡鮮花發於上春嘉實成於早夏四而為一表四夷之一君異而為同明異才之同貫漢宫留核曾所未窺衛國報瓊何能竊似殊祥靈應疊貺駢臻凡在見聞孰不歡躍臣等謬當樞近纍覿休符喜抃之情實萬恆品無任欣慶之至謹奉表陳賀以聞為宰相賀連理木表常衮臣言今月二十六日得太清宫道士陳嶽等狀稱聖祖殿院東廊九靈門北有奈樹連理異枝還合者臣按漢武元狩元年得竒木枝旁出輒後數日越地及胸奴率衆來降者中興書云王者德澤純洽八方大同則木連理伏惟皇帝陛下體元以臨寶位法道以御太和孝通神明故祖宗禔福德合天地則草木呈祥至孝所感生靈遂性湛恩既溥異類懷仁大告休期纍彰嘉瑞况我祖太清别殿竒樹效珍連理雙莖混成一體其同本也所以煩於衆枝其附內也所以慶於無外必有削袵之類亦表其強幹之休天下一家本支百代稽於圖傳可以明徴聖敬所臨神心允答不然豈獨秀不遷之廟增華太素之宫曲折合符精靈相㑹耿光丕貺高映古今臣愧無黃老之術謬贊清虛之化獲奉休異喜萬恆情望請宣付史官編之簡册無任欣抃之至謹奉表陳賀以聞臣某誠歡誠慶頓首頓首為宰相賀李樹凌冬結實表孫逖臣等伏見劉麟奏南郡李樹凌冬結實并圖及李實者惟此珍樹名應皇族𤣥元所指用興長發之祥明靈是慿故表非常之瑞已經夏實更發冬榮霜雪而翠葉不凋斯須而朱實皆就仁及草木既叶太平之期道貴生成仍呈久視之應恭惟聖感詎可名言所以彰寶祚之靈長表天枝之碩茂逺踰海嶠來薦闕庭豈三秀之足稱何兩岐之敢喻殊祥荐至品物同歡况在臣等寧勝抃躍無任欣慶之至謹奉表陳賀以聞中書門下賀許州連理棠樹表權德輿臣某等言今月中使某乙至奉宣進止示臣等許州觀察使上官說所奏許州長社縣嘉禾鄉合穗村連理棠樹一株者謹按孝經援神契曰王者德及草木則木連理伏惟陛下聖澤𤣥功浹洽生類故天休滋至地産交感亭育變化發為百祥珍木敷榮異根合幹表兹植物以瑞康時况嘉禾名地以同唐叔之獻甘棠挺秀寧比召南之什芬芳連理遐邇叶心叢滋慶祉昭煥圖籍臣等謬參鼎飪喜萬恆情無任欣抃踴躍之至謹奉表陳賀以聞貞元八年四月一日皇太子賀芝草表崔融臣某言伏承某月日芝草生乾元殿瑞命天來符祥日至煌煌三秀分芰一作藻井而攢柯曄曄九光間梅梁而吐葉晋都宫閣何必靈芝之臺洛邑山川居然密邇之地中賀伏惟天皇君臨海內帝有域中兼漢制而宅兩京用堯心而加百姓神精下降洽至道於丘陵靈液旁霑被深仁於草木觀其如蓋如閣一作為蓋為閣如日如星得五方之氣象合四時之景色仙人在上則車馬疑飛神龍居下則風雲不去謂蓬瀛之海列一作到即崑閬之山開魏皇之雙幹莫儔漢帝之九莖為劣可以薦郊廟可以觴公卿臣謬踐儲闈祗膺守國不獲親承左右目覽休徴雖玉脛逆疑作延齡在神仙而可致而方疑作刀圭入膳視朝夕而猶賖是用心馳仁夀之前慶集肅成之下無任抃躍之至謹遣某官某奉表稱賀皇太子賀天后芝草表臣某言臣聞德合天地仁之所及也深道貫神明孝之所置也極故有𤣥功肹蠁靈命氤氲瑶光發辰象之精金色吐隂陽之秀伏惟天后化含萬物訓正六宫天下被塗山之音海內仰河洲之教今月某日使某至伏承芝草生於東都太原守舍利塔屋下芝英繞殿暫疑王母之臺芝草成田聊比宓妃之館其蒂紫其莖白霑霈雨露之津搖動風雲之氣斜臨網樹分貝葉而重開近對淪池接蓮花而倒下豈與夫生于石室空傳好道之言産自珠宫徒事不經之說可同年而語哉臣濫承天祚多慙國本始欽𤣥澗之祥更喜黃雲之地頌聲無輟在郊廟而方傳御膳有慿俯神仙而何逺臣子之慶倍百恆情無任欣忭之至為宰相賀合鍊院産芝草表孫逖臣等伏見道士黃河清等奏興慶宫合鍊院內産芝草五色分輝六莖闕神丹入鍊而轉精禎祥應期以如答覩兹嘉瑞望宣付史官者伏以靈芝所致和氣之精著美仙經標名瑞典陛下深仁契道至德通神錬液飛丹既啓長年之館敷華有葉遽呈三秀之祥五色有類於卿雲六莖且符於帝樂豈惟動植昭感以表於休徴固亦真仙叶應用彰於聖夀臣等忝侍軒陛倍深慶悅無任抃躍之至謹奉表陳賀以聞代百官賀芝草表獨孤及臣某等言伏見開府儀同三司魚朝恩奏含暉院及白華亭院內並芝草生者臣等謹按圖諜集作謹披圖按諜竊考前典集作志蓋王者以道蒞天下而德及庶物則有靈木神草集作神木靈草儲祉集作祥效異陛下賢聖恭儉慈仁愛人開闡學校尊教勸德將以五經根本庶政風化所浹神人以和和氣旁逹感蒸為瑞集作和氣傍感蒸而為瑞不然豈靈芝菌蠢異處同植不産他宇必於宸居曄曄九葩之蓋煌煌三秀之質蓋表陛下之欽明光宅以人文成化靈根碩茂萬葉無疆神應炳然天意如答臣等獲忝朝列幸覩禎祥云云中書門下賀芝草嘉禾表常衮臣等言伏見兵部尚書中書門下平章李抱玉進芝草嘉禾者臣聞王者道洽則靈芝生天下和一則嘉禾應伏惟陛下誕膺景命憂濟生靈合太上之德感元精之氣天地氤氲神明滋液降此珍物叶於昌期垂蓋連莖三華煥發離根合頴一穗孤秀沫我渥澤扇其祥風衆草之英百穀之長以兆稔嵗以符太平昔周得唐郊之獻列篇於典策漢獲甘泉之祉薦歌於清廟三瑞之極一朝㑹同長發其祥無疆之慶臣等謬參近侍幸覩休祥喜抃之情倍萬恆品無任歡抃之至中書門下賀芝草表臣某言今日中使吳承一作永清至宣示宋汴節度使御史大夫田神功所獻芝草一株紫蓋黃莖叢生者天生神物王者嘉瑞竒秀之狀靈篇未書伏惟陛下孝通神明德至草木和氣所感禎祥屢彰煌煌靈芝郡國來獻垂以金蓋發其瓊葩爛然紫雲之色灼然紅蕖之秀王德斯應皇家永昌固可寫狀圖諜薦于郊廟祇奉天意贊揚鴻休臣等獲覩殊祥喜倍恆品無任慶抃之至皇太子賀嘉麥表崔融臣某言伏見雍州司馬徐慶稱所部有嘉麥一莖六穗纎芒濯露疑因黑壤之宜香稼搖風若吐黃金之色豈非靈心昭應睿德感通降之自天何必來牟之詠嘗之於廟先符孟夏之時凡在含生相趨動色臣謬當居守肅奉宗祧一穗兩岐徒說張君之詠十畝千石方輕范氏之書仰天意而增歡顧人心而載躍無任喜抃之至謹附起居使某官某奉表陳賀以聞中書門下賀恆華州嘉禾合穗表權德輿臣等某言伏見武俊所奏恆州鼓城縣生嘉禾一本合穗又盧徴奏華州鄭縣太平鄉三交里獲嘉禾一穗者謹按孫氏瑞應圖曰嘉禾者五穀之長王者德茂則生伏惟陛下德叶𤣥功仁育生類同頴擢秀殊祥並時昔周道既昌唐叔以獻表天下和平之兆為隂陽欣合之符五穀登成百嘉儲祉發於厚載集是休徴况嶽鎮之方表章繼至感通昭晣莫甚於斯臣等忝列台司喜倍恆品無任欣抃踴躍之至謹奉表陳賀以聞臣某等誠歡誠喜頓首頓首謹言貞元十五年九月七日賀嘉禾表張仲素臣某等言今月某日伏見平盧淄青等州節度使鄆州大都督府東平縣官莊地內有禾異壠雙本合成一穗畫圖奏進傳示百僚者臣等中賀謹按瑞應圖曰王者德茂而太平君臣和則嘉禾朱草以中萌言不得中和之氣即不生也伏惟陛下鼓和風茂休德泰階平於上下大中建於人臣神明是若徴兆必報通彼殊壠揔其雙莖滋大澤以冥造成嘉穗而薦和合為一彰至化之㑹同堅而好表資生之豐實推物類以得天意觀繪事而擬靈篇几在班行咸同慶幸不勝云云為百官賀千葉瑞蓮表崔融臣某等文武官若干人言伏奉恩㫖垂示臣等千葉瑞蓮觀其緑裏紅葩緗莖素萼露搖珠㸃霞坼金鬚百星交映羽蓋張而一色萬目齊明車輪合而千狀謂翔鸞之欲舞若群鵷之並飛峯形聳而半天石勢蹲而臨海冲氣積其下惠風流其上服之可以登仙採之可以駐夀雖復釋𣑽天王之國千影離婁善住天子之地雙輝燦爛校之今日未可同年臣等謹按華嚴經云蓮花世界是廬舍那佛成道之國一蓮花有百億國無量清淨經云無量清淨佛七寶池中生蓮花上夫蓮花者出塵離染清淨無瑕有以見如來之心有以察如來之法道之行也曽不徒然伏惟天册寶金輪聖神皇帝現此妙身當兹巨瑞符契冥合影響不差有百億國無量清淨者天意若曰護蘇蟻結默啜蜂飛聞鼓鞞而革靣望旌旗而懸首指麾而邉境獲安髙枕而中國無事風行電掃縳噍類於百億之區霧廓塵銷反逰魂於清淨之域深仁所及不亦𢎞哉臣等濫奉朝恩親披瑞諜非常之貺曠古未聞殊特之珍歷代一見手舞足蹈倍百常情無任慶躍之至謹詣朝堂奉表陳賀以聞中書門下賀神龍寺渠中瑞蓮表柳宗元臣某等言今日中使某至奉宣進止示臣等神龍寺殿前渠中瑞蓮花圗其花一莖兩房者伏惟陛下仁聖感通𢎞被生植宥萬方之暇必順天心於九重之中别開佛剎絪緼降祉菡蓞敷榮瑞兹灼灼之花廽出田田之葉吉祥殿外芳集作芬馥殊常功德池中光華交映扶踈發越並秀相鮮𤣥功嘉應超冠圖諜彼芝稱三秀麥有兩岐雖驗休祥豈階妙法觀雙房之挺茂荷一雨之均霑隂隲生成發輝嚴淨臣等忝居樞近倍萬歡心無任欣忭悅懌之至謹奉表陳賀以聞貞元十八年六月十八日賀西內嘉蓮表德宗權德輿臣某言今日某時中使某至奉宣聖㫖出西內神龍寺前水渠內合歡蓮花圖一軸示百寮神圖煥開異彩交映贊天地之合德表神人以同歡臣某誠歡誠慶頓首頓首伏惟皇帝陛下道協重華慶傳種德陶隂陽之粹美孕造化之精英吉慶每見於天心發祥必自於禁掖是使雙華擢秀連蒂垂芳香激大王之風影耀集作輝天泉之水煥開宫沼旁映給園靈貺應期天龍護聖寶厯敻超於小劫神功允洽集作協於大千臣某獲覩升平濫居榮寵聞瑞應而稱慶仰繪事以增歡無任抃蹈喜躍之至賀西內嘉蓮表張仲素臣某言臣伏見今月九日中書門下宣示百官西內池中嘉蓮圗其蓮一本兩花者臣聞明聖有作天人合應既彰花本必降祥符即事而推昭昭可見伏惟陛下儲精要道憂濟群方致理大同猶懼不至所以恢𢎞聖教資福生靈𤣥造感通嘉瑞屢降况兹菡蓞儒釋同稱經文但喻乎淤泥詩人特歌於陂澤豈比夫躍銅池闕傳芳丹禁濯影清流特聳孤莖以表清淨之源一致對敷雙萼是明內外之教齊興天雖不言假物明意臣仰披圖諜逖覽古先豈無禎祥莫此昭著望雲就日徒深抃躍之誠舞德歌功何報恩私之重無任抃賀慶躍之至云云為百寮賀瑞筍表李嶠臣某等言伏見舊明堂某前有叢竹抽新筍數莖緑蘀含霜紫苞承雪凌九冬而擢頴冒重隂而發翠伏惟陛下仁兼動植化感靈祗故得萌動惟新象珍臺之更始貞堅效質符聖夀之無疆鄰帝座而虛心當嵗寒而抱節一人有慶萬類呈祥凡在見聞孰不欣躍無任慶抃之至謹奉表稱賀以聞為朝官及嶽牧賀慈竹再生表陳子昂臣某等言臣等聞書曰天視自我民視天聽自我民聼故堯臣方命降震怒之災姫旦聖人集作姫聖尊仁受昭事之福先王所以恭畏上下祇奉天心於是有昭德塞違懲惡勸善所以明枉直正典刑伏奉恩勑宣示司農卿宗正集作晋卿所奏日者王德夀等承使失㫖虐濫無辜災感蝗蟲毒痛慈竹寧嵗為之饑饉氓庶以之流離寃魂𡨕呻𤣥感上惻乃降明制發德音恤淫刑蠲虐典於是幽魂雪憤遺噍昭蘇枯竹由其再生蝗蟲為之隕跡集作韜青牂蠻動色瘴癘收氛當天札之凶年致升平之稔嵗非夫聖靈昭感天人合符何吉凶之徴報同影響天下幸甚臣等聞聖人法天所以順物小人違道則必亂常故虞稱欽明嚴四凶之罪魯有仁義正兩觀之誅所以邦家用昌苛慝不作王某等色厲內荏心僻行堅弄措刑之文為商夷之法以訟受服同惡自尤竟招殛竄之辜允肅政刑之序今者蒼鷹斂翼乳虎含牙朝廷無腹誹之憂天下有措手之頌信可以懲殘創酷誘善旌寃永清侮弄之階共登仁夀之域臣等謬贊臺閣忝守藩維實思仰奉大猷以穆中典幸屬至聖崇德小人勿用凡在庶品實百恆歡雖成康頌聲文景默化刑清政肅曾何足云伏乞書之國經頒示天下使四方風動萬國歸仁垂範後昆以為炯誡無任慶抃之至賀連理棠樹合歡瓜白兔表武元衡臣某言臣聞至德有感嘉瑞必呈非汪洋雱霈不能動神靈非葳㽔䢔遝無以彰明盛伏惟陛下登建皇極二紀于茲情無忘于一日德彌新於萬載懷徠反側優容直諒至仁所漸潜銷于毒螫大賚所及無間于忽荒故得禎祥荐臻䇿簡填委逮于今日不可勝書此實上天所以丁寧俟登封告成也今又見許州長社縣劉斌地內連理棠樹圗徐州彭城縣陽守志園中合歡瓜圗又進白兔并圗等伏以甘棠符於國號連理表於邑中瓜瓞頌於詩人合歡守於園內兔居卯位白順金色金者取象於武臣白者明資於義邑足表巍巍宗社長慶於大同赫赫天枝永崇於皇度俾秉旄節必效精誠懸象告人焯乎明著竊覽前志歷考休徴積彼千載之祥無兹一歲之盛臣忝私恩覩所未聞抃舞之誠倍百恆品無任云云文苑英華卷五百六十三
