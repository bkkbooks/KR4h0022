body:
  text: 文苑英華卷八百五十五宋李昉等編釋六宣州大雲寺碑一首陜州龍興寺碑一首長安西眀寺碑一首宣州大雲寺碑李嶠或稱唐虞神祗之奧主也其在孔墨道術之眀師也然其經略所制僅行於冠帶之鄊名教所談不出於乾坤之位徒齷齪於步武蓋搶攘於禮法語方外之靈躅窺天中之妙寶則知夫力有遺而途有窮矣察動用於神機推朕迹於冥𢾗則知夫識有畔而功有闕矣悠悠百代蠢蠢四流蒙埃塵於夢幻之境隔視聽於神明之域任忠信之薄徒一作已喪淳源救質文之弊無階聖道沒世不聞至極之理終身不覩𤣥門一作妙之法奔嗜騁欲壓五濁而輪廽躡穽投機入三途而鼎沸大運不可以終否橫流不可以遂溺五精延貺披鳯籙而告休期七覺垂仁闢龍宫而開寶命慈氏越古金輪聖神皇帝體兼具相心冥衆善超十方四諦之門惣三眀六通之業諸天翼戴上升於兜率之宫萬寓慕思下蒞於閻浮之俗哀末法之衰弊悵夷途之榛梗載紵金屣由紺殿而起西方乃眷瑶圖臨紫宸而正南面大矣靈覺深哉妙果去來無象曠萬劫而潜神起滅有緣應千齡而啓聖粵若屈迹𢎞道乘機濟物馭之以神通知惠行之以方便善功感或異理故應無常身化本隨方故居無定位襲五運於𤣥壇之上降三尊於黃屋之下稱緣而動宰官共啇主同歸虛已而遊廟堂與山林一致天人之善權也提宏綱之落紐廓大象之權構遂荒百億窮有頂而君臨奄有三千罄無邉而光宅闢海縣而清囂滓開天庭而掃氛祲四魔六賊盡為征賦之民萬邑千閭悉成道場之宇爾乃御寶極而𤣥覽撫璿衡以貞觀茫茫净界宛如忉利之天眇眇大紘化為莊嚴之國宇宙之嘉㑹也制目籥而動出張洪爐而造化不為不宰鼓舞而羣品隨何慮何思氤氲而百寶湧然後蕩之以香風甘露薰之以福田惠業大根小葉咸受施而蒙榮蠕動翾飛盡餐和而飲澤協氣煙曼休禎雲聚乾符坤寶載於龍馬之圖嵗德年祥調於鳯凰之歷隂陽之太和也立最上之乘不棄於聲聞小道用無為之理猶存夫禮樂常教闢四果之門闈訓三雍之典業然後闕心近行俱得所聞傾樽酌蠡各滿其量憲章乎法寶而度律既周經緯乎時文而網羅畢備登一世於解脫躋羣生於仁夀軌躅謐靜頓屣於元亨之衢品物康寧髙枕於㑹昌之宅道德之神化也合樂而埋瘞焚燎陳詩而嚴配昭格禮于上下不失於金木五官享于宗祊遂及於山川百祀旁求六趣之府下建四冥之室莫不于食有福奔走而來蘇用晦而眀攀援而出苦鬼神之福寧也𤣥門罕測法象難窺雖金口微言時傳于貝多之葉而玉毫靈相莫覩于優曇之花屬大事之因緣逄逺期之旦暮稽首禮足親瞻五梵之容滌慮清心俱奉一音之偈洗貪欲之腸腎開盲聾之耳目置須彌於掌握詎是難思警海水於靈空未為希有氓黎之誠感也惣人祗幽顯之微資鬼神變化之妙兼育萬物而莫見其生成遍履十方而不窺其轍跡巧諭善說而罕測其靈祕㸃黑一作墨數塵而未量其終始故能慈以救物寬而容衆罷黜刑憲而天下勝殘屏撤牲牢而蒸人以粒豈與夫慘痛傷骨象魏懸桎梏之書剖卵殈胎山澤厭罝罘之酷可同年而語也觀握鏡之緣起得獻書之本事象藏祕録禎符鬱乎大雲登跡乘時靈應開于寶雨受先佛之付囑荷遺黎之負擔頒其瑞紀所以旌識善緣樹其階梯所以津梁法俗天授二年乃下制令天下諸州各置大雲寺一所宣州大雲寺者本名永安寺晉義熙二年之所立也龍飛在運既易龍興一作光之名天歷惟新即改天安之號積暄寒而驟風雨所以制毁圓方法爻象而應星辰所以基綿載祀若乃地橫瑶阜壤帶金陵廓巨鎮于三吳走通莊於百越山川磊落郊畿枕端委之鄉島嶼慿隆烟霧合朝宗之浦上帝於是乎垂象先王於是乎髙㑹衣冠俊傑滿舊國之風謡物産珍竒傾神州之韞櫝東南之巨麗也因福地之形一作名勝即靈模之兆迹拓其趾而峻其墉擇其材而增其構星榆月桂泛河鼓之天津露柏霜松出巴陵之地道山祗則讓夫荑境海若則輸其珍藏精衛銜石遇神營而中留靈蛇吐珠屬良緣而改獻爾乃授矩司臬乘巒架巘廽廊曲榭亘迢遞而掩髙深峻閣崇臺陟峥嶸而望寥廓復道共星階連步雙闕與天門對象內則香殿崛起若朱鳥舒翼冠南海之鵬雲前則涌塔化成若皇媧振鱗立東維之鼇柱翕赫璀璨帶璧而垂珠窈窕深一作森沉藏烟而吐霧瓊林幽其妙境珍衛嚴其象設五通羅漢夾奉金山八部龍王分司玉砌窮壯麗於天巧擬威神於帝室故能使外道摧服一作伏異方歸向四倒八謬瞻奈苑而心廽五蓋六纒經竹園而纍盡若乃雲除雨霽闢牅當軒眺八極之山川臨萬家之井邑緇軿繡軸前通舍衛之城桂楫蘭橈下泛蓮尼一作尼連之水賞心極目遣纍忘機處子於是乎傲其江海詞人於是乎驕其翰墨至如毗耶聚落眷屬俱來摩詰道場君臣惣集舉玳瑁之欄檻入琉璃之塔廟一一香蓋懸於寶縷之幢種種天花散於金繩之地贊嘆圍繞歸依薰習洗心於八解之池拭目於三眀一作朝非之藏名衣上服資貝樹之經行重溢全裝襯蓮花之法㑹自非大心𢎞益圓智曲成為天上天下之師護人間世間之法豈能使恆沙國圡並登常樂之門億蓋生靈俱出無眀之路刺史曲陽男巨鹿魏正見大名開宇復南史之公侯懋賞承家奏西河之金石隆簮組之舊德壯朝廷之厚寄朱軒皂蓋辭折坂而越長洲來晚去思喜昌門而怨彭闕長史隴西李延慶黃裳具美白賁全真文學則東魯之四科鍾鼎則西朝之七貴司馬南陽男張安宏才碩量經文緯武策勳光刑馬之封服冕榮珥貂之業機明足用政理多方承縟禮於䄡帷有成勳于邦國諸曹參佐籙事參軍李文逺等或文房學府吐鳯而懷蛟或劒室珠泉衝星而襲月水火錯居而致用青一作朱藍糅色而成彩羣務允緝喧北汝之謳謡庶事無留閴南陽之府寺縣令丹陽儲孝任大江播氣長離發藻未踐廊廟之班猶屈絃歌之事卓子康之蒞政不任刑書虞承卿之到官唯開講席縣丞鄭文覽等並刀筆英選琳琅竒資一作賞髙才未展聊從枳棘之遊俊翮方升豈滯榆枋之集凡我聮事莫匪同心攀十地之𢎞因奉四天之大號經營朴斫克成輪奐之功修習柱持願假招提之福上座寺主等並通逹無升惠解多聞勤求於八清净心成就於五菩提法升大悲之座俯慰迷津轉無上之輪髙懸勝躅用能經始梵域規模神造凌雲起搆雖慿於太極之靈匪日成功實俟於彌天之力鄉望前杭州監官縣尉吳寶度等雲澤竒寶水鄉遺俊或隱鱗求志蓄美價於瑶􅀈或撫翼俊時貢珍名於箘簵咸能厭離塵垢修持真業具足三施豈真黃金買田積纍衆功自白衣成道咸以為六種震動法王之利見金身十善護持大士之莊嚴净吐無算數之良果有不思議之妙力豈可使車轍馬跡獨銘於西弇之山佛影龍龕不紀於東林之石是用伐彼真琰詢其藻繢下官負心多恙驅傳不遑欽白黑之勒誠偉丹青之壯觀客自南鄙王夀之雅嘆靈光言於東吳左思之髙談建鄴聊扣寥一作寐寞而為頌云正法中否淳風載邈道隱三眀時昏五濁聲利外染驕淫內斫識淺易淪蔽深難覺其一至人乃眷屈已乘時諸佛付囑羣仙護持遂荒法寶奄頓乾維露灑天澤雲含一作合帝慈其二是撲燎原爰清水剪截奔競滌除囂滓九道合符十方同軌區宇一變隂陽更始其三大康雅俗廣濟含生六寶神御三才化成慶延動植德至幽眀魔識正觀神呼太平其四至道雖合迷方未悟樹以妙梯登之覺路寶坊邑啓銀函壤布大矣能仁深哉善護其五勝境吳俗名都楚封海潮翔鷺山氣盤龍物産殷阜閭閻錯重津途繫䡺里閈鳴鍾其六良牧帝難俊僚人望負荷深委規模大壯長者法財沙門異匠共表靈剎同開寶相其七觀閣雲心階基洞口飛月栖棟宛虹入牖闕對蜃樓幢侵牛斗跨時靈域津梁妙有其八落落間宇沉沉絶機池開梵樂樹下天衣髙座𢎞道深經暢微虎馴十戒龍學三歸其九天啓聖期神扶净域萌秪斯一作期逺微祥難測粹業已安髙碑乃植沙數有盡金堅無極陜州龍興寺碑蘇頲有唐神龍元年龍集丁巳應天神龍皇帝出乎震御乎乾也粵若我髙祖撥亂反正受天眀命太宗震逺懷荒立人紀綱髙宗見天之則愛人之力故我祖宗之耿光天人之交際矣功侔於天靡弗覆矣道濟於人靡弗育矣上祗乎闕人心醇醲之化積乎中和樂之聲被乎外則聖母以權居位七廟不可乏主以義眀羣萬方由其傒豫乃考順應之符旌緝熙之頌有若周文為太子益三朝之恭有若漢文為天王遵五讓之實遂稽盛典張宏紀綱纂舊物由舊章穆穆皇皇顒顒昻昻俾爾熾而昌俾爾夀而臧其斯之韙也時公卿大夫禮官慱士稽首揚言曰陛下誕彌厥月初朔龍也接統伊始元又龍也潜者德之隱飛者德之興觀乎聖人之變合於聖人之契古之白鱗赤鴈威鳯神雀或當道而蛇分或中流而魚躍惟萬物之幽贊曽六年之不若陛下冝以大寶加眀號其龍之興乎天子方晬容遷慮卑聽深視答神祗之協謀討經籍之遺美於戲軒轅氏聲疑元扈就肴虛者莫如佛之寶也推大聖之藴超衆妙之機則道方於權智成乎真實修心觀心惟凡證聖即色非色惟覺悟迷小者得其小大者得其大藥草之喻是也有者見其有無者見其無露泡之喻是也使般若之門隨方而啓仁夀之域舉代咸登用於國家六度齊行於人倫五常等豈與夫太后好道而黜於儒曽孫好刑而雜於霸朕當䆒登庸之休瑞詢住世之宗㫖衆生未度而度之百姓有罪而罪已𢎞風而共貫興化而致理以助天之子人乎因制天下州盡置大唐龍興寺陜州者以𢎞福寺為之寺則唐武德中所創昔王業始基冝於百億故俟福之𢎞暨帝圖中缺躍於九四故見龍之興此又前聖之兆後聖之徴也徒觀其阿疑作河山豁險當砥柱之湍瀨城雉紆餘瞰崤陵之風雨蓋朝宗之次行在之宫三輔齊劇鄰其左二京分政出其中斯何壯哉郡國之雄也先是香填之金布之神祚之福護之千櫨疊映萬楹叢舉含真珠之赤光帶琉璃之紺色般般逺矚奕奕增新虹電生於樹杪星漢拂於樓間謂須彌邪現空而隱半謂兜率耶住世以臨下如有待者塔廟之靈乎上自清洛而西顧經翠巖而北指七聖不迷百神咸扶旌廽守塞輦過間田吟邵伯之甘棠追漢仙之結草勿剪勿伐將有聲而在風曰希曰夷豈無寂而觀妙孰若此寺崇大法之本協中興之符致於間安得所饒益爰發中㫖出五綵繡及金銀以寵之後庭則雜於四時其布惟五內藏則錯於三品其功用六飾紅玻條紫磨璀繡色􅉼鏡光分身應矣金相覩矣雨諸天花隨慶雲而歷亂作諸天樂混清吹以參差善哉彌勒降梯育王讓座弗之比也當月宇披露門注眀毫晞净目者駕肩而凑接足而禮猶稻麻之與竹葦墨黑之與針鋒稱三自歸獲四無畏大德君瑶君愕而禪師上座慈郁維那道休二法師神入於定力思用於塵勞泊其慮也寺主靈觀上人樂說多聞辨才強學焉可淪以愛染撓其情也亦有廬阜之寄儻冥於隱迹剡山之期或禠於襟帶每至斷三苦絶三流止六衰禁六賊修善明之願則罔不偕唱須逹之祈則罔不攝受龍王之泉則罔不捨自非淬慈劒破魔邪麾勝福舉闕正孰能臻於此矣前刺史東平畢使君名構字其忠謇士也清心徑節祗服文藝故其臨事天下謂之直臣今刺史河南元使君名淡字行冲精粹士也正辭邪道研機禮樂故其著書天下謂之良史朝請大夫行陜令清河崔君名昱字盛緒長仁合義睦而奉娣當作娣用晉國變事郭奕之儔也友以為兄魯恭之匹也故其虛心應物理家移政則太守樹風以飬之宰君承流而廣之始乎精悉終乎惠愛務㷀婺而歸厚惴姦慝而寡悔寂則旁通誠則圓對斯並倜儻卓犖殊尤絶倫者盍務之哉郡有張士龍王忠誠侯元嗣郭琬袁休王方等修業諦聽感緣信受應乎千里聞于十室皆以為周錫王命而藏大鼎漢振天聲而樹隆碣况探密記指元符轉聖輪道皇極使雕篆之辭缺則莊嚴之事眇云何以觀人世殿我邦乎遂載諸厥中宣此偈曰賢劫聖惟法王吾君子與巨唐應夫符契而後翔龍圖永象教昌清燬宅接通莊列璇題崇寶坊翠華轉河之傍青蓮降陜之鄉河之水幕榮光陜之路蔽甘棠東洛邑西咸陽望巡幸歡且康歸調御福穰穰唐長安西眀寺塔頲嘗誦先王之訓探衆聖之㫖蓋本三極而宗五常也泛以觀則吹萬循而照則歸一知夫棄理悟寂與能制事者覺為之路以諸疑作詣精微定得其門而𢎞汲外邱釋不言乎始扁輪不義乎末其真如之藴邪智有無涯間之以息物無有祕應之以刑矣物也者不可使刑止有也者不可因無息然後三極冥符適時之義逺五常昭合濟俗之功大其象法之韙也赫矣帝唐發于天光鴻勳鋪億載盛業冠三代欽眀濬哲以至髙宗天皇紹元命而導要道也時孝敬皇帝儲副承祧晦眀示疾一物三善禀人君之量喜而又懼聞王子之言以大威力作𢎞誓願慿有為之基獲無妄之吉粵眀慶元年仲秋癸酉詔於京兆延康里置西眀寺以報之先是三藏法師元奘惟應真乎乃成果者首闕視延袤財輪往以繩度還而墨順次命少監吳興沈謙之傾水衡之藏徹阿疑作河宗之府制而縮版參以懸矩鈎北阜之舄伐南山之枚初歷落以星峙忽穹崇以雲曼攢栱岌嶫騫甍宛轉揆隂陽之中居子午之直叢倚觀閣層立殿堂虬鳯夭矯而相承鬼神睢盱而欲起罔不珠綴􅌄窱琁題照燭琉璃洞徹菡蓞紛敷白日為之隱蔽丹霞為之舒卷者凡一十二所每動微風滴細霤窅然其若來和鎗然其有去音悉豐麗博敞峥峥曭朗奕奕焉耽耽焉中國之莊嚴未有大荒之神異所絶於是召以正工以考安瑞表湛真容繡色電烻金光火合移忉利之宫鎮菩提之座狀微笑而莞爾意屢言於善哉者不可勝計遂賜田園百頃净人百房車五十兩絹布二千匹徴海內大德髙僧有毗羅靜念滿皓廣說鵬耆辦了鶖子知㑹凡五十人廣京師行業童子有空净聞道善思喜法須迦分施撰擇不染者凡一百五十人導天衢指天寺上御安福觀以遣之有則有容昻昻顒顒駢象馬錯人龍幡幢之隂周四十里伎樂之響震三千界使其將法印發妙梯上至乎穆清下遺乎紛濁散而無我見桃李之成蹊聚則有朋知稻麻之為衆若普聞名稱時立威儀行則上首舉為左臂者上座道宣寺主神察都維那智衍子立傳學元則棲禪靜定持律道成懷素等八法師舍衛是求須彌不動以等空知行如海法如陶器必盡而寫瓶共縳今大律師崇業約身利牧維忍辱之行全信役仁守毗尼之律眀猶染壘壑比持綖摧伏魔障弼成學徒上座大德神嶽法師開方便品證圓明實貫穿百氏分别四諦藝扄諸彥不敢近論筆墨蓬嶽群仙自應遙寄書帙相與禁六賊制六衰紅粟腐積黃金巨萬行天厨之寶輿泛海岸之雕艫日靜楗槌夜鳴鍾柝罔不受薰修戒破煩惱結禪以思默聼以和發商調柔之意書祕密之偈業公愀而歎曰此身有待諸行無常欽疑不居之嵗月無不滅之泡影樂化成而記壁者請因寺而言之是則有隋尚書令越國公楊素泊我濮王泰宅之舊區豐不當必蔀儉不師且奪終異謀始之則滿非守城之具從梁抵第寧復賔遊封薛池臺果成童牧孰若變為嚴净歸入檀那匪化塵之可思匪劫燼之能毁轉以清渠灑道緑樹分行水流舊空花落雨新殿邦而住世者不亦大哉宜宣詠歌以備刋勒矣我開元神武皇帝御十方之四載格上下秩神祗萬人敬百蠻服伊護法者必聖王乎演法者其開士乎敢作頌曰吳作京兮秦之理殊住寶剎兮從中起䡾相望兮非相似輪乎奐兮不可擬惟聖皇之經始兮惟調御之依止封迦葉之上人兮延德光之太子香為圡兮金為界樹低枝兮蓮出水紛接足以駢闐兮盡洗心以歡喜永巍巍兮什梵宫揚大法兮尊大雄文苑英華卷八百五十五
