body:
  text: 文苑英華卷二百八十宋李昉等編送行十五方干二十一首李洞十一首杜牧七首許渾二十八首雍陶四首送姚合貟外赴金州方干受詔從華省開旗發帝州野煙新驛曙殘照古山秋樹勢連巴沒江聲入楚流唯應化行後吟句上間樓以下十一篇並見集本送江隂霍明府之任前人遙遙去舸新浸郭葦兼蘋樹列巢灘鶴鄉多釣浦人虹分陽羡雨浪隔廣陵春知竟三年袂琴書外是貧送人之日本前人蒼茫大荒外風教即難知連夜揚帆去經年到岸遲波濤吞集作含左界星斗正東夷集作定東維或有歸風便當為相見期别喻鳬先輩前人知心似古人嵗久分彌親離别波濤濶留連槐栁新武陵間集作墓陵寒貫酒漁浦夜垂綸若集作自此星居後音書豈厭頻送相里燭前人相逢未作期此送欲集作相送定何之不得長年少那堪逺别離泛湖乘月早踐雪過山遲永望多時立翻如在夢思送從兄韋郜前人道路本無限更集作又應何處逢流年莫虛擲華髮不相容野渡波搖月寒集作空城雨翳鐘此心隨去馬迢遞過千峯送許渾集作溫前人壯嵗分彌切髫年心正集作即同當聞千里去難遣一樽空翳燭蒹葭雨吹帆橘柚風明年見親族冬集作盡集在懷中寄朱特前人登車誤相逺談笑亦何因路入瀟湘樹書隨巴蜀人斂衣寒犯雪傾篋病看春莫貴集作負髫年去集作志清朝有獻臣送趙明府還北前人故林終不在劒鶴在扁舟盡室無餘俸還家得白頭鐘催吳岫晚月照渭河流曽是棲安邑恩期異日酬送鄭端公前人聖主佇知宣室事豈容才子滯長沙隋珠此去方酬德趙璧前時誤指瑕驄馬將離江浦月繡衣却照錦林集作禁中花應憐寂寞滄洲客霄壤集作煙漢塵泥相去賒送睦州侯郎中赴闕前人昔著政聲聞國外今留儒術化江東青雲舊路歸仙掖白雪新詞入聖聰絃管未知銀燭曉旌旗巳待錦帆風郡人誰集作難識酬恩德遍在三年禮遇中送永嘉王明府之任二首前人定擬孜孜化海邊須判素髮侮流年波濤不應三集作雙溪水分野長如二月天浮客若容開荻地釣翁應免稅笞田前賢未必全堪學莫讀當時歸去篇二雖展縣圖如到縣王程猶入縉雲東山間閣道盤花集作巖底海界孤村集作峯在浪中禮法未聞離漢制土宜多説似吳風字人若用非常術唯要旬時便立功送婺州許録事前人之官便是還家路白日堂堂著錦衣八詠遺風資逸興二溪寒色助清威曙星沒盡提綱去暝角吹殘鎖印歸笑我中年更愚癖醉醒多在釣魚磯送錢特卿赴職天台前人路入仙溪氣象清垂鞭樹石罅中行霧昏不見西陵岸風急先聞瀑布聲山下縣寮張樂送海邊津吏棹舟迎詩家弟子無多少唯只於余别有情送杭州李員外前人政成何必集作用滿三年上界羣仙待謫仙便赴新恩歸紫禁還從舊路上青天笙歌愁集作怨咽當離席更漏丁東在畫船正殿集作必恐駐班留立位前程一步集作前咫尺是爐煙送孫百篇遊天台前人東南去路落斜行入樹穿村見赤城逺近常聞集作時皆藥氣髙低無處不泉聲映巖月集作日向床頭沒濕燭雲從柱底生更有仙花與靈草集作鳥恐君多半不集作未知名送人宰永泰前人北人雖泛南流水稱意南行莫恨賒道路先經毛竹嶺風煙巳集作漸近刺桐花舟停漁浦猶為客縣入樵溪似到家下馬政聲集作成王事少應容閩吏日髙衙送晉陵王少府赴選集作舉前人相看不忍盡離觴五兩牽風速去檣逺驛新砧應弄月初程殘角未吹霜越山直下分吳苑淮水橫流入楚鄉珍重郤家好兄弟明年祿位在何方送李集作陳秀才將遊霅上便議北歸前人婆娑戀酒山花盡繚繞還家水路通轉楫擬投集作從青草岸吹帆猶是白蘋風淮邊欲暝軍鼙急洛下光寒苑樹空詩句因余更孤峭書題不合忘江東送吳彥融赴舉前人用心精至自無疑千萬人中似爾集作汝稀上國才將五字去全家便望集作待一枝歸西陵栁路搖鞭盡北固潮程挂席飛想見明年榜前事當時分散著來衣送曹郎中棄官南歸集作南中用軍李洞桂水清和天南歸似謫仙繫絛輕象笏買布接蠻船海氣蒸鼙軟江風擘疑作劈箭偏罷郎吟亂里帝逺豈知賢龍州送鄭郎中兼寄昌明鄭侍御前人待車登沓障經亂集鴒原省壞蘭飄葉臺空柏有根縣清江入峽樓靜雪連村莫隱匡山社機雲受晉恩送盧郎中赴金州前人雲明漆嶺髙刺郡輟仙曹危棧窺猿頂公庭掃鶴毛出軍明壁罅話道白眉毫逺集歌謡客舟前泊幾艘冬日送涼州刺史前人寵餞西門外雙旌出漢陵未辭金殿日巳夢雪山燈地逺終峯盡天寒朔氣凝新年行巳到舊典聼難勝吏掃盤雕影人遮散馬乘移軍駝馱角下塞掾河氷獵近崑崙獸吟招磧石僧重輸右藏實方見左車能兵聚邊風急城寬夜月澄連營煙火嶺望詔幾回登送知己赴任華州前人東門罷相郡北拜重京華落月開宵印初燈見早麻雞身紅斾拂仙掌白雲遮塞色侵三縣河聲聒兩衙松根醒客酒蓮葉隱僧家一道帆飛直中筵嶽影斜書銘尋雪石澄鼎露金沙鎖合眠闕史杯空啄廟鴉分臺話嵩洛賽雨拜煙霞樹谷期招隱吟詩煮柏茶送東宫賈正字遊蜀前人南朝馱晉史蜀地瞰巴樓長棧懷宫館踈峯露劍州半空飛雪化一道白雲流若次江邉邑宗詩為遍搜送知己赴濮州前人中路行僧謁郵亭話海濤劒搖林狖落旗閃嶽禽髙苔長空州獄花開夢省曹濮陽流政化一半布一作有風騷送人遊天台前人行李一條藤雲邉曉扣氷丹經如不謬白髮若為能淺井山集作仙人鏡明珠海客燈乃知真隱者笑就漢庭徴送福州從事前人嶺前齊鳥飛雨過荔枝肥南斗看應近北人來甚稀湖浮廉使宴珠照島僧歸幕下聞遷拜何官著茜衣龍州送友人赴舉前人獻䇿赴招携行宫積翠迷集作西挈囊秋卷重轉棧晚峯齊踏月候朝見拂雲看省題飛鳴肯回顧獨鶴困江泥送友罷舉赴邊職前人出剡篇章入雒文無人細讀嘆俱焚莫辭秉笏隨紅斾便好携家住白雲過水象浮蠻境見隔江猿叫漢州聞髙談濶略陳從事盟誓邊庭壯我軍送容州唐中丞赴鎮杜牧交趾同星座龍泉佩斗文燒香翠羽帳看舞鬱金裙鷁首衝瀧浪犀渠拂嶺雲莫教銅柱北長集作空説馬將軍池州春日送前進士蒯希逸前人芳草復芳草斷腸還斷腸自然堪下淚何必更殘陽楚岸千萬里燕鴻三兩行有家歸未得况舉别君觴送劉秀才歸江陵前人綵服鮮華覲渚宫鱸魚新熟别江東劉郎浦夜侵船月宋玉亭春滿集作弄袖風落落精神終有立飄飄才思杳無窮誰人世上為金口借取明時一薦雄送國碁王逢前人王子紋楸一路饒最宜簷雨竹蕭蕭羸形暗去春泉長猛勢橫來野火燒守道還如周柱史鏖兵不羡霍嫖姚浮生一作得年七十更萬日與爾期於局上銷宣州送裴坦判官往舒州時牧欲赴官歸京日暖泥融雪半銷行人芳草馬聲驕九華山路雲遮岫集作寺青集作清弋江村栁拂橋君意如鴻髙的的我心懸斾正搖搖同來不得同歸去故國逢春一寂寥送李羣玉赴舉前人故人别來面如雪一榻拂雲秋影中玉白花紅三百首五陵誰唱與春風送人又云寓言前人鴛鴦繡被集作帳裏暖芙蓉遙想關山萬里重集作低泣關山幾萬重明鏡半邉叉一股人集作此生何處不相逢送客江行許渾蕭蕭蘆荻花郢客獨辭家逺棹依山響危檣轉浦斜水寒澄淺石潮落漲虛沙莫與征徒望鄉園去漸賒送前緱氏韋明府南遊前人酒闌橫劒歌日暮望關河道直去官早家貧為客多山昏函谷雨水落洞庭波莫盡逺遊興故園荒薜蘿送客歸荆集作湘楚前人無辭一樽酒集作無辭一杯酒平昔集作昔日與君深秋色換歸鬢曙光生别心桂花山廟冷楓樹水亭集作樓隂此路千餘里應勞楚客吟送客歸南集作蘭溪前人花下送君處集作歸路路長應過秋暮隨江鳥宿寒共嶺猿愁衆水喧巖集作岩瀨羣峯抱戍集作沈樓因君幾南望曽向此中遊算山津送客歸峽中前人津亭多别離楊栁半無枝住接猿啼處行逢雁過時江帆望風急集作江風揚船急山月下樓遲此夕歸城郭不眠人詎知集作還就西齋宿煙波勞夢思送李公自淮楚之南昌集作送前南陸李少府前人髙人亦未間來往楚雲間劒在心應壯書窮鬢巳斑落帆秋水寺驅馬夕陽山明日南昌尉空齋又掩關送客集作懷江南同志前人南國去集作别經年雲暗波接天蒲深鸂鶒戲花暖鷓鴣眠竹暗湘妃廟楓隂楚客船唯應洞庭月萬里共嬋集作娟娟送從兄别駕歸蜀州并序前人從兄彥昭與桂陽令韋伯達貞元年中俱為千牛伯達官至王府長史長慶中非罪受譴前年會赦復故秩詔未及而已身沒從兄自蜀而南發旅襯歸葬塗上既而西還因成十韻贈别聞與湘南令童年侍玉墀家留秦塞曲官謫瘴溪湄道直姦臣屏寃深聖主知逝川東去疾霈澤北來遲青漢龍髯去蒼山馬鬛移風悽聞笛處日慘罷琴時客路黃公廟鄉關白帝祠已稱鸚鵡賦寧誦鶺鴒詩逺道書難達長亭酒重集作莫持當憑蜀江水萬里寄相思送從兄歸隱藍溪前人名髙猶素衣一作氣髙聲不達窮巷掩荆扉漸老故人少久貧豪客稀塞雲橫劒望山月抱琴歸幾日藍溪醉藤花拂釣磯一作莫遣藍溪路青苔滿釣磯送人歸吳興前人緑水棹雲月洞庭歸路長春橋懸酒幔夜柵集茶檣巖影集作葉沈溪暖蘋花繞郭香應逢栁太守為説遇瀟湘送友人罷舉歸東海前人滄海天塹外何島是新羅舶主辭畨逺碁僧入漢多海風吹白鶻沙日曬紅螺此去知投筆須求利劒磨送鄭秀才東歸憑達家書前人欲寄家書客未過閉門心逺洞庭波四鄰花落清集作兩巖花落夜風急一徑葦荒秋集作草荒春雨多愁泛楚江吟浩渺憶歸吳岫夢嵯峨貧居不問應知處溪上間船繫緑蘿送盧先輩自衡嶽歸集作赴復州嘉禮前人名振金閨步玉京暫留滄海見髙情衆花盛集作盡處松千尺羣鳥喧時鶴一聲朱閣簟涼初集作踈雨過碧溪船動早潮生離心不異西江水直送歸集作征帆萬里行送前東陽于明府由鄂渚歸故林前人結束征車換黑貂灞西風雨正瀟瀟茂陵久病書千卷彭澤先集作初歸酒一瓢帆帶集作背夕陽湓水濶棹經秋月集作滄海甑山遙殷勤為謝南溪侣集作客白首螢窗未見招送陸拾遺東歸前人獨振儒風遇盛時紫泥初降世人知封章報主非無意書劒還家自有期秋寺卧雲移棹曉暮江乘月落帆遲東歸自是緣清興莫比南山詠紫芝送友人浙西任宰集作送上元王明府赴任前人莫言名重懶驅雞六代江山碧海西日照蒹葭明楚塞煙分楊栁暗集作見隋堤荒城樹繞集作暗沈書浦舊宅村集作花連罨畫溪官滿定應集作知歸未得九重霄漢有丹梯呈王總下第歸丹陽前人秦橋一作樓西望楚天涯集作江湄繫馬春風酒一巵汴水月明東下疾練塘花發北來一作歸遲青山虛戀集作定沒安貧計白髮集作黃葉應催獻賦時一作期為寄家書報消息集作憑寄家書為回報舊鄉集作君還有故人知南樓送餞李明府歸姑蘇集作將歸姑蘇南樓餞送李明府前人無處登樓不繫情一憑集作瓶春酒醉髙城漸移羅綺見山色才駐管弦聞水聲花落西亭添别夢栁隂南浦促歸程前期迢遞今宵短更倚朱欄待月明送薛洪南遊訪山習業前人姑蘇城外月初凋同上江樓更寂寥繞壁舊書塵漠漠隔窗寒竹雨蕭蕭憐君别路隨秋鴈盡我離觴任晚潮從此草玄應有處白雲青草一相招送客自兩河歸江南集作西河送客歸江南前人兩河庶集作西河陳事巳堪傷南客秋歸路更長臺畔古集作偃松悲魏帝苑邊修竹弔梁王山行露變茱萸色水宿風披集作搖菡萏香遙羡落帆逢舊友緑娥青鬢醉橫堂集作塘送鄭秀才叔姪會送楊秀才昆仲東歸前人書劒功遲白髮新異鄉仍送故鄉人阮公留我集作客竹林晚集作曉田氏到家荆樹春雪盡塞鴻南翥少風來胡馬北嘶頻洞庭煙月如終老誰是長楊諫獵人兩人字疑有誤送杜秀才歸桂林集作往桂州前人桂州南去與誰同處處山連水自通兩岸曉霞集作晚煙千里草半帆斜日一江風瘴雨𣣔來楓樹黑火雲初起荔枝紅愁君路逺銷年月莫滯三湘五嶺中送嶺南盧判官罷職歸華隂山居前人曽事劉琨鴈塞空十年書劒似一作任飄蓬東堂舊屈一作有移山志南國新留煮海功還挂一帆青草上更開三徑碧蓮中關西親友如相問巳許滄浪伴釣翁送武處士歸章洪山居前人形影無羣消息沈登聞集作門三繫疑血沾襟皇綱一日開寃氣青史千年重壯心却望烏臺春樹老獨歸蝸舍暮雲深他時縱有徵書去雪滿空集作重山不可尋吳門送振武李從事前人曉促離筵醉玉缸伊川一曲淚雙雙欲移刀筆從新幕更宿煙霞别舊窗胡馬近秋侵紫塞吳帆乘月下清江嫖姚若許傳書檄坐築三城看受降送人之任卭州前人緑髮監州丹府歸還家樂事我先知羣童竹馬交迎日二老蘭觴初見時黃卷新書藝委積青山舊路菊離披亨衢自有橫飛勢便到西垣視訓辭與韓鄭二秀才同舟東下洛中親朋集作友送至景雲寺前人三十六峯同集作橫一川緑坡無路草芊芊牛羊晚食鋪平地雕鶚晴飛磨逺天洛客盡回臨水寺楚人皆逐下江船東西未有相逢日更競集作把繁花共醉眠凌歊臺送韋秀才前人雲起髙臺日未沈數村殘照半巖一作蘿隂野蠶成繭桑柘盡山集作溪鳥引雛蒲稗深帆勢依依投極浦鐘聲杳杳隔前林故山迢遞故人去一夜月明千里心送徐使君赴嶽州雍陶渺渺楚江上風旗搖去舟馬歸雲夢晚猿叫洞庭秋别思滿南渡鄉心生北樓巴陵山水郡應集作偏稱謝公遊送裴璋還蜀因亦懷歸前人客在劒門外新年音信稀自為千里别巳送幾人歸陌上月集作日初落馬前花正飛離言殊未盡春雨滿集作濕行衣送前鄠縣李少府前人近出圭峯下還期又不賒身間多宿寺官滿未移家罷釣臨秋水開樽對月華集作向晚花自當蓬集作臺閣選豈得卧集作戀煙霞送宜春裴明府之任前人南行春巳滿路半水茫然楚望花當渡湘隂月集作橘滿川山橫湖色上帆出鳥行前此任無辭逺親人貴用還文苑英華卷二百八十
