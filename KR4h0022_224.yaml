body:
  text: 文苑英華卷二百二十四宋李昉等編釋門六六十九首薛能十一首陳陶三首羅鄴三首司空圖二首鄭谷七首楊䕫一首周朴三首杜荀鶴七首張喬九首張蠙六首曹松九首羅隱三首王貞白一首裴說四首冬日送僧歸吳中舊居薛能去掃東林下閒持未遍經望山低鑿牖容月廣開庭舊業雲千里生涯水一瓶還應覔新句看雪倚禪扃送禪僧前人寒空孤鴈度落日一僧歸近寺路聞梵出郊風滿衣步搖瓶浪起盂戞磬聲微還坐棲禪所荒山月照扉秋晚送無可上人前人半夜覺松雨照書燈悄然河聲才淅瀝舊業近潺湲坐滴寒更盡吟驚宿鶴遷相思不可見日短復愁牽贈禪者前人門前雖有徑絶向世間行剃草因逄藥移花更得鶯甘貧元是道苦學不為名莫怪蒼鬚晚無機任世情贈禪者一作師前人夢想青山寺前年住此中夜堂吹竹雨春地落花風舊句僧一作師曽見清齊我亦同浮生蹇莫問辛苦未成功此詩二百六十四卷重出今已削去注異同為一作贈源寂禪師前人瓶鉢鎮隨腰怡然處寂寥師禪從北祖僧格似南朝性近徒相許緣多愧未銷何傳能法慧此岸要津橋贈禪師前人嗜欲本無性此生長在禪九州空有路一室獨多年鳴磬微塵落移瓶濕地圓相尋偶同宿星月坐忘眠夏日青龍寺尋僧二首前人帝里欲何待人間無闕遺不能安舊隱都屬擾明時違理須齊辱雄圖豈藉知縱橫悉已誤斯語是吾師二得官殊未喜失計是忘愁不是無心速焉能有自由凉風盈夏扇蜀茗半邢甌笑向權門客應難見道流寄題巨源禪師前人風雨禪忩外應殘木槿花何年别鄉土一衲代袈裟日氣侵瓶暖雷聲動枕斜還當掃樓影天晚自煎茶雲花寺寓居贈海岸上人前人暫寄空門未是歸上方林疑獨著儒衣吾師不語應相問頻惹街一作香塵入寺飛題贈髙閒上人陳陶薝蔔花間客軒轅席上珍筆江秋菡蓞僧國瑞麒麟內殿初招隱曹溪得後塵龍蛇驚粉署花雨對金輪白馬方依漢朱星又入秦劇談凌鑿齒清論倒波旬拂石先天古降龍舊國春珠還合浦老龍去玉川貧鴛鷺輸黃絹壇場繞白蘋鼎湖閒入夢金閣靜通神海氣成方丈山泉落净巾獼猴深愛月鷗鳥不猜人拂嶽蕭蕭竹垂空淡淡津漢姝難覔對荆璞本來真伊傅多聮璧劉雷競買鄰江邊有國寶時為㔉疑星辰酬元亨上人前人一衲净居雲夢合秋來詩思祝融髙何因知我津涯濶逺寄東溟六巨鰲寄元孚道人前人梵宇一作楚寺章句客佩蘭三十年長乘碧雲馬時策一作借翰林鞭曩事五嶽遊金衣曵祥煙髙攀桐君手左倚鸑鷟肩哭玉秋雨中摘星春風前橫輈截洪偃慿几見廣宣爾來寤華胥石壁孤雲眠龍降始得偈龜老方巢蓮內殿無文僧騶虞誰能牽因之問楚水弔屈幾潺湲冬日廟中書事呈棲白上人羅鄴日髙荒廟掩雙扉杉徑無人鳥雀悲昨日江潮一作湖起歸思滿忩風雨覺來時何堪身計長如此閒盡爐灰却自疑賴有碧雲吟句客禪餘相訪說新詩秋日留别義初上人前人寒寺窮秋别逺師西峯一鴈倍傷悲每嗟塵世長多事重到襌齊是幾時霜嶺自添紅葉恨月溪休和碧雲詞關河回首便千里飛錫南歸詎可知贈僧前人繁華舉世皆如夢今古何人肯暫閒唯有東林學禪客白頭閒坐對青山上柏梯寺懷舊僧二首司空圖雲根禪客居皆說舊無廬松日明金像山風一作苔龕響木魚依棲應不阻名利本來踈縱有人相問林間懶拆書二髙鴉隔谷見路轉寺西門塔影䕃泉脉山苗侵燒痕鐘踈含杳靄閣一作閣逈亘黃昏更待他僧到長如前信存寄懷元秀上人鄭谷悠悠干祿利草草廢漁樵身世堪惆悵風騷頓集作頗寂寥髙秋期步野積雨放趨朝得句如相憶莎齊且見招以下七篇並見集本次韻和秀上人遊南五臺前人中峯曽到處題記沒蒼苔振錫傳深谷翻經想舊臺危松臨砌偃驚鹿驀溪來內殿御集作評詩切師以文章應制身回心未回贈圓昉公昉蜀僧僖宗幸蜀昉堅免紫衣前人天階讓紫衣冷格鶴猶卑道勝嫌名出身閒覺老遲曉集作晚香延宿火寒碧度髙枝每說長松寺他年與我期居長松山贈信美寺岑上人前人巡禮諸方遍湘南頻有緣焚香老山寺乞食向江船紗碧籠名畫燈寒照净禪我來能永日蓮漏滴寒泉集作階前寄贈詩僧秀公前人靈一心傳清塞心可公吟後礎公吟近來雅道相親少唯仰吾師所得深好句未停無暇日舊山歸老有東林冷曹孤宦甘寥落多謝携笻數訪尋重陽日訪元秀上人前人紅葉黃花秋景寬醉吟朝夕在樊川却嫌今日登山俗共與集作且共髙僧對榻眠别畫長懷吳寺壁冝茶偏賞霅溪泉歸來童稚爭相笑何事無人與酒船贈日東鑒禪師前人故國無心度集作渡海潮老禪方丈倚中條夜深雨絶松堂靜一㸃飛集作山螢照寂寥此詩二百六十四卷重出今已削去注異同為一作送日東僧遊天台楊䕫一瓶離日外行指赤城中去自重雲下來從積水東攀蘿躋石徑挂錫憩松風回首雞林道唯應夢想通登福州南澗寺周朴萬里重山繞福州南橫一道見溪流天邊飛鳥東西沒塵裏行人早晚休曉日春山當大海連雲古塹對髙樓那堪望斷他鄉目一作外又作客只此蕭條自白頭贈雙峯山和尚前人峩峩雙髻山瀑布㵼雲間塵世自疑水禪門長去關茯神松不異藏寶石俱閒向此師清業如何方可攀贈無了禪師前人不學世所惜是何無了公靈一作雲匡虛院外虎跡亂山中晝夜必連去古今爭敢同禪情豈堪問問答更無窮送僧杜荀鶴道了亦未了言閒今且閒從來無住處此去向何山片石樹隂下斜陽潭影間請師留别偈集作偈别恐不到人寰以下七篇並見集本和劉評事送海一禪師歸山前人內集作衲外元無象言尋那路尋問禪將底說傳印得何心未了羣山淺能集作難休一室深伏魔寧是獸巢頂亦飛禽觀色風驅霧聽聲雪灑林况當幽隱處集作凡歸是歸處未必在髙岑集作不必指髙岑送紫陽僧歸廬嶽舊寺前人紫衣明主贈歸寺感先師受業恩難報開堂影不知松風欹枕夜山雪上樓時此際無人㑹微吟復斂眉秋宿詩僧雲英院集作房因贈前人賈島憐無可都緣數句詩君雖是後輩我謂過當時溪浪和星動松隂帶鶴移因集作同吟到明坐此道淡誰知贈老僧前人衆僧尊夏臘靈嶽遍曽登渡水手中杖行山溪畔藤心空默是印眉白雪為稜自得巡方道棲禪老一作向未能贈僧前人利門名路兩無慿百嵗風前短焰燈只恐為僧僧一作心不了為僧心一作得了總一作盡輸僧此詩一百六十四卷重出今已削去注異同為一作山寺老僧前人草靸無塵心地閒靜隨猿鳥過寒暄眼昏齒落經看遍却向僧中總不言贈鏡亭清越上人張喬海畔與窮邊歸來二十年久閒時得句漸老不離禪砌木欹臨水忩蓬一作峯直倚天猶期白雲裏别掃石牀眠贈仰山禪師前人仰山因久住天下仰山名井邑身雖到林泉性本清野雲看處盡江月定時明髣佛曽相識今來隔幾生贈初上人前人竹色覆禪棲幽禽繞院啼空門無去住行客自東西井氣春來歇庭枝雪後低相看念山水盡日話曹溪聞仰山禪師歸曹溪因贈前人曹溪松下路猿鳥重相親四海求𤣥理千峯繞定身異花天上墮靈草雪中春自惜經行處焚香禮舊真贈碁僧侣前人機謀時未有多向奕碁銷已與山僧敵無令海客饒靜驅雲陳起一作出踈㸃鴈行遙夜雨如相憶松忩更見招送新羅僧前人東來此學禪多病念佛緣把錫離巖寺收經上海船落一作捲帆敲石火宿島汲瓶泉永向扶桑老知無冉少年送僧雅覺歸東海前人山川心地內一念即千重老别關中寺秋歸海外峯鳥行來有路帆影去無蹤幾夜波濤息先聞本國鐘送僧鸞歸蜀寧親前人歌詩精外學夫子是知音坐夏宫鐘近寧親劔閣深髙名徹西國舊跡寄東林自此棲禪者因師滿蜀吟贈頭陀僧前人自說年深别石橋遍遊靈跡熟南朝已知世路皆虛幻不覺空門是寂寥滄海附船浮浪久碧山尋塔上雲遙如今竹院藏衰老一㸃寒燈弟子燒贈棲白大師張蠙剃髮得時名僧應别應星偶題皆有詔閒論便成經掃葉寒燒鼎融氷曉注瓶長因內齊出多客叩禪扄贈聞一上人前人見靣雖年少聞名似白頭𤣥談窮釋㫖清思掩詩流果一作巢落痕生砌松髙影上樓壇場在三殿應召入焚修贈可倫上人前人師教本於空流來不自東修從多劫後行出衆人中衲冷湖山雨幡輕海甸風游吳纍夏講還與虎溪同寄法乾寺令諲大師前人師居中禁寺外請已無緣望幸唯修偈承恩不亂禪院多仙藥種集作種藥池有化生蓮何日龍宫裏相尋借法船寄太白禪師前人何年萬仭頂獨有坐禪僧客上應無路人傳或見燈齊厨一作盂唯有橡講石任生藤遙想東林社如師誰復能送南海僧遊蜀前人真修絶故鄉一衲度暄凉此世能先覺他生豈冉忘定中船過海臘後路沿湘野迥鴉隨笠山深虎背囊瀑流垂石室蘿蔓蓋銅梁却後何年㑹西方有上房雲居長老王貞白巘路躡雲上來參出世僧松髙半巖雪竹覆一溪氷不說有為法非傳無盡燈了然方寸內應秪見南能寄洪正師羅隱寄蹇渾成跡經年帶疑杜南價輕猶有二足刖巳過三雞肋曹公忿猪肝仲叔慙㑹應謀避地依約近禪庵寄無相禪師前人老住西峯第幾層為師回首憶南能有緣有相集作想應非佛無我無人始是僧爛椹作袍名復利鑠經集作金為講愛兼憎何如一衲塵埃外日日香煙夜夜燈送𧦬光大師師以草書應制前人禹祠分手戴灣逄健筆尋知逹九重聖主賜衣憐絶藝侍臣摛藻許髙蹤寧親久别街西寺待詔初離海上峰一種苦心師得了不須回首笑龍鍾慈恩寺貽楚霄上人曹松在秦生楚思波浪接禪關塔礙髙秋鳥忩藏白日山樹隂移草上岸色透林集作庭間樓集作人內談經徹空携講疏還關山寄詩贈清越前人不醉秦中酒冥心秪似師望山吟過日伴鶴立多時溝逺流聲細林寒緑色遲庵西蘿月夕重得話空期薦福寺贈棲白大師前人才子紫檀衣明君寵顧時講升髙座懶書答重臣遲瓶勢傾圓頂刀聲落碎髭還聞穿內去隨駕進新詩青龍寺贈雲皓法師前人紫檀衣且香春殿日尤長此地開新講何山鎖舊房僧名喧北闕禪印續南方莫惜青蓮喻秦人聽未忘貽住山僧前人罷講巡巖塢無窮得野情臘髙猶伴鹿夏滿不歸城雲朵緣崖發峯隂截水清自然雙洗耳唯任白毫生送德光禪師前人天涯緣事了又造石霜微不以千峯險唯將獨影歸有為嫌假佛無境是真機到後流沙錫何時更有飛送乞雨禪臨遇南遊前人活得枯焦耕者知巡方又欲向天涯珠穿閩國菩提子杖把靈峯楖栗枝春蘚任封降虎石夜雷從傍養龍池生緣在地南浮去自此孤雲不可期廣州貽匡緒法師前人口宣微密不思議不是除貪即誡癡祗待外方緣了日爭看內殿詔來時周回海樹侵階疾迢遞江潮應井遲畢竟懶過髙坐寺未能全讓法雲師江南逄僧省文前人髙僧不負雪峯期却伴青霞入翠微七葉巖前霜欲降九松枝上鶴初歸風生碧澗魚龍躍威震金樓燕雀飛想得白蓮花上月滿山猶帶舊光輝不出院僧裴說四逺參尋遍修行却不行耳邊無俗語門外是前生塔見移來影鐘聞過去聲一齊唯默坐應笑我營營湖外寄處賔上人前人怪得意相親髙携一軸新能搜大雅句不似小乘人嶽麓擎枯檜瀟湘吐白蘋他年遇同道為我話風塵寄貫休前人憶昔與吾師山中靜一作精論時總無方是法難得始為詩凍犬眠乾葉饑禽啄病梨他年白蓮一作雲社猶許重相期寄僧尚顔前人曽居五老峯所得共誰同才大天全與吟精楚欲空客來庭減日鳥過竹生風早晚搖輕拂集作金錫重歸瀑布中文苑英華卷二百二十四
