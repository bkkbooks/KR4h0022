body:
  text: 文苑英華卷四百十七宋李昉等編加階加階授宣城縣令儲孝任等加階制李嶠鸞臺朝議郎行宣州宣城縣令儲孝任等並早從推擇久著勤勞績茂綰銅時逢檢玉千齡有慶既屬休符百里能官宜從榮奬可依前件主者施行授右衛親府中郎將裴思諒等加階制前人鸞臺宣威將軍守右衛親府中郎將檢校左羽林衛上柱國裴思諒等八屯五校俱奉職司三垓九筵咸屬休慶錫以班秩用存優奬可依前件主者施行授通州刺史于光逺等加階制前人鸞臺中散大夫使持節通州諸軍事守通州刺史于光逺並資才藝咸剖符竹勤勞有積聲望俱優神嶽貢金明堂㑹玉頒賞行慶宜加恩奬可依前件主者施行授皇甫翼等加階制張九齡門下朝請大夫檢校尚書左丞上柱國皇甫翼等才有國良望為時重或紀綱㑹府成司直之名或彌綸列曹得在公之譽屬禮崇齊祭慶洽衣冠宜加等級之恩用廣殊常之賜可依前件授張均等加階制鄭少微門下中大夫行中書舍人張均等並藻圭璋騰華綸綍文行致美駮議惟精肅侍嚴禋咸稱慎禮宜覃行慶之典俾承加等之榮可依前件授李逢吉章祕等加階制元稹門下某官李逢吉是朕皇太子時侍讀也忠孝之訓何嘗忘之惟祕洎璀實惟藩臣克壯威猷以固垣翰楊造等祗事內外夙夜惟寅並沐前恩遞升榮級上下有等式示彛章可依前件授崔元略等加階制勑崔元略等階之設二十有九有庸有事有叙有加用是四者以詔百吏由郾而上至于元略曰加曰叙由瀍而下至于𢎞景曰事曰庸光我侍從之臣且優致政之老詔賢詔德於是乎在堂奧益近爾其敬之可依前件授髙元裕等加階制崔嘏勑國之肆眚必有霈澤所以惠及於下也爾元裕國之重臣守我封部能以惠化富吾疲氓其地分內外之任盡勤勞之誠皆以所能舉其官業是用因兹大慶錫以崇階各敬爾儀無忝休命可依前件授內諸司及供奉官叙階制勑設堂陛所以辨等威置階級所以彰貴賤苟可授者吾無愛焉爾等或司我繁重夙夜無違或侍吾左右勤勞不懈而皆溫和植性廉潔終身方將委以腹心豈止加於爵位爾其率職以事上用降以持滿勿以貴而驕人無以髙而自忽保兹貞吉以永休光可依前件授韋慤裴識等加階制勑記曰爵人於朝與衆共之蓋以階級既崇寵榮斯異疏封錫命列土承家爾等或才推粉澤豈唯五字之工或任重藩垣自茂一方之績或官居象月或位應列星或擁緹騎而分九衢或奉瑶墀而總六尚皆聿修官業克紹家風爰因慶澤之辰更舉山河之誓宜思帶礪永保簮裾可依前件授李駢等加階制勑慶澤可以示恩榮貴階可以顯勞績至於叙進則有彛章况爾等咸以儒業吏能纍更事任久而益茂志且不渝方承覆簣之勤宜錫崇基之漸封妻䕃子斯足為榮可依前件授孫簡等加階制勑上造出秦中㳙自漢古所以叙武功今所以寵文德施恩布澤今古同途爾等皆道光儒業任重藩維才膺歷試之難德茂嵗寒之操或卿曹副二多推幹用之方或正殿贊揚共許詳間之美况橋山奉職鶴禁來儀既讐事往之勞亦舉優賢之典河山在目帶礪為期克保初終永光胄緒可依前件授盧𢎞正加三品階制勑夫門交棨㦸身耀金紫抱孫可䕃顧室增封自非峻級崇階其何以致爾等或以强學潤已武略登壇或望重瑣闈輝華於粉署或道光憲席輔相於青宫或以長才纍更重任或以吏道久領郡符用則殊途事皆一致爰因慶澤以布恩榮勉思階級之髙無忽柔謙之誡可依前件授朱克柔張戎等加階制薛廷圭勑具官某等外諸臣有政事可以稱家父位尊功大不求聞於時者可謂能處其身而協進趣之道矣而師保元勳燕居轂下以遺落之材廣朕聞聽亦深得大臣之體裁一作哉惟兹二事朕實樂聞爾克柔能以政經葺吾舊許人蒞俗逺至邇安而戎前佐大藩休有淑問盤錯斯驗鋒鋩有餘或嘉韜櫝之心或允求伸之志大臣子弟朕豈無私元勳薦揚朕豈不信上公進律少將通班階序徽章旌别優異惟爾克柔與戎宜知朕寵待汴帥全忠與太保鋋之意而勉於從政立朝也可依前件開府授王仁皎開府儀同三司制蘇頲門下后族之榮况有資敬台儀之重允膺是求特進王仁皎盛門華緒當代賢戚不言而自有陽秋從信而罔愆風雨軒星作範已寵於金穴魯管增輝更芳於玉樹三事斯擬百工式瞻俾延椒臺之祥宜助槐庭之理可開府儀同三司主者施行授李抱玉開府儀同三司制常衮門下秉德者必先於冲讓報功者亦資於禮秩遂其所執以彰明哲之心存其所賞以稱勳賢之䇿一作業則勞臣知勸羣議允從兵部尚書同中書門下平章事潞州大都督府長史知鳯翔事充陳鄭澤潞觀察處置等使仍充南道通和吐蕃秦隴淋疑洮以來觀察處置等使上柱國李抱玉風雲所感挺此人傑文武相濟弼于朕躬竭股肱而宣力敷心腹而納誨道髙可以咨訪言惠可以底行鎮撫四夷旌麾授其二柄决勝千里法令齊於一人端誠馭衆律略安邊究詩書之義府修德刑之戰器故使剛者有禮勇者有方三軍可用九伐皆尅西戎即叙中夏底寧而又精心吏職諭我朝旨茂周原之多稼省隴戍之外徭老少安懷逺邇和洽社稷之衛邦家之光嘉乃丕績肆于時夏冲而不盈泰而彌損纍執范宣之志不言馮異之功辭禮閣之端右罷王畿之戎號足以光昭史冊軌度縉紳今之儀同未曰優異以其遜職是有進階式從彛序無替成命可開府儀同三司餘並如故授鍾庭光開府儀同三司制勑鳯翔節度下歸順羌首領部落副使保寧州都督特進守右羽林軍試太常卿鍾庭光夙承勳望早勵誠勤自屬艱虞備申效用既臨危而見節亦因事以成功率先歸懷丹款昭著益表自新之志允兹從重之賞禮優八命秩比三司宜茂寵章式酬勳則可開府儀同三司餘如故授李秀璋開府儀同三司制勑儀亞槐庭寵分茅社議功而賞舊典斯存河西觀察判官特進檢校左散騎常侍兼泗州刺史上柱國李秀璋議慮深逺理懷明濟徑節不奪長才有餘湟中絶塞久毗戎幕車師前部仍領藩條萬里孤軍十年連戰主畫以貞師律推誠而得士心摧凶陷堅勝捷相繼軍吏緩帶邊人反耕緬思忠勞益用嘉歎宜進秩於八命更褒封於五等可開府儀同三司仍封隴州縣開國男餘如故授張自勉開府儀同三司制勑淮西節度都虞候特進試太常卿上柱國張自勉體仁以成勇狥節以臨戎職在刺奸威屬整旅齊軍令之進退明師律之否臧南清江黃北啓申息邊虞載戢亭候肅然舍爵議榮實居其右承景風之章叙比公府之命秩可開府儀同三司餘如故授論誠信等開府儀同三司制前人勑大將軍論誠信等咸有將才早彰臣節或往參締構業著總干或近歷艱難勳髙負靮録功行慶啓號覃恩宜疏五等之封更寵三司之任誠信可開府儀同三司授杜冕開府儀同三司制門下禮優八命秩比三台名器之崇勳賢所屬特進試太常卿使持節鄜州諸軍事兼鄜州刺史御史中丞充鄜坊等五州都防禦使上柱國鄭國公杜冕植性剛毅立心忠烈夙有將帥之才早知軍旅之事任當禦侮政在親民守七德以臨戎頒六條而訓俗地臨上郡時屬多虞軍令惟行髙懸賞罰之柄王師所處不敗商農一作不敢傷農恐誤之業戎軒屢捷郊壘用寧制勝功髙緝綏課最加以命數抑惟典常可開府儀同三司餘並如故特進授阿史那獻特進制蘇頲黃門建官制爵立化之本樹善崇功惟能是任招慰十姓兼四鎮經略大使定逺道行軍大總管北庭大都護瀚海軍使節度巴西諸蕃國左驍衛大將軍攝鴻臚卿上柱國興昔可汗阿史那獻凌鐵關之逺塞威揚萬里雄金山之舊族誠竭纍朝每讀古人之書且多竒士之節豈止秺侯忠孝呼韓𦙍緒而已哉頃服獯戎綏其種落茂勳則逺已寵於登壇厚秩未加俾榮於開府亞台之典羣議允集可特進餘並如故主者施行授李林甫特進制門下王度以貞實寄於良輔天秩有禮允歸於盛德光祿大夫尚書左僕射兼右相吏部尚書集賢院學士修國史上柱國晉國公李林甫應期致用命代生才禮樂形於物範文章表於王佐自登衮職一紀于兹啓沃之謨酌泉源而不竭忠公之節貫霜雪而罔改彛倫攸叙庶績其凝實賴豫弼用熙帝載猶且謙冲夕惕兢慎日嚴問溫樹而不言履薄冰而逾勵久而益著德則茂焉近者禮屬交神恩當進秩雖允恭克讓徒有固辭而惟器與名本無虛授宜昭寵數以鎮崇班可特進行尚書左僕射兼吏部尚書主者施行授李光顔加階并賜一子官制元稹門下朕聞有天下者道德仁義以為理城郭溝池以為固故曰不教人戰是謂棄之有備無患可以應卒此先王驅攘戎狄保障黎元之大略也五原居宥夏靈慶之中當蛇豕豺狼之窟將扼咽喉之要爰授集作命腹心之臣厥有成功宜加茂典邠寧慶等州節度觀察處置等使金紫光祿大夫檢校司空兼邠州刺史御史大夫上柱國武威郡開國公李光顔氣敵三軍心師百行有卞莊之勇守之以仁有日磾之誠濟之以武叱咤則風雲回合開宴而鐏爼周旋蓋文武之全才真古今之良將是以淮蔡之役百勝功髙青齊之師一面居最朕以蕭關尚警馬嶺猶虞五餌之詐可羞百雉之防爰度先是屬役每難其人惟爾良能果諧豫願程功而不愆于素訖事而不勞于人比命有司褒乃實效僉曰古諸侯勳德優盛則就加特進以寵之我國家封植崇重則有朝請一子以異之豫嘉乃勤兼用兩者兹謂上賞爾惟欽哉可特進仍與一子正員四品常參官餘如故主者施行授張濬特進守右僕射依前充諸道租庸使制錢珝勑古者建官取諸垂象故左右執法附於文昌以揔六卿以提庶政用人之本邦國繫焉一作興邦國焉進賢既協於嚮公致理詎宜於虛位具官張濬剛而能斷寬則有容保和而實孕元精索隱而若陳洪範他山攻玉鮮類禹圭九牧貢金自成周鼎先皇帝爰立作相朕小子圖任舊人每親夾輔之才且致勤行之道必將率衆由已化兵為農載胡越以同舟混車書於外户志所未就我實盡知經營向在於四方親附未遺於百姓雖聚財之任不欲允煩大臣而復國所資安可有稽征賦荐居端右兼陟崇階得名器之所歸在典章而斯重永期𢎞濟更集前功可依前件授河東節度副使檢校司空一作徒王瓌特進制前人勑為國之政在蕃有條贊立武於中權屬好謨於副介具官王瓌河汾之氣當萃爾家欒范之宗亦髙他族伯仲繼撫封之盛子孫承錫命之功爾能纘彼勳名主於忠信逺取而寧規勇爵深思而但顧良弓列羣后之上卿處前人之許一作興國尊奬之道造次必論心或益恭諒蕃昌之可保性能召福何富貴之不來朝舉寵章事歸敦勸方布冊勳之澤俾崇馭貴之階善佐永圖以承厚渥可依前件授沁州刺史張漢瑜加特進封開國男食邑制前人勑具官張漢瑜等漢室勳勞始以進奉朝請而好爵之設五等具焉至於任以專城秩參環衛假之有寵一作典典一作寵亦匪輕漢瑜以致勇之誠臨戎罔憚且能抱節而後立功則良將之才挺然可見宗裕耻同兒戲學在師貞過庭有聞刺部甚美則愛子之號昭然可知是以詔我代言俾兹申命亦用垂勸期于狥公可依前件文苑英華卷四百十七
