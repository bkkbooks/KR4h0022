body:
  text: 文苑英華卷七十七宋李昉等編樂七焦桐入聽賦一首無絃琴賦一首五色琴絃賦一首孔子彈文王操賦一首鍾期聽伯牙鼓琴賦一首鍾期聽琴賦一首朱絲繩賦二首昭文不鼓琴賦一首焦桐入聽賦以泠然雅音至聽方識為韻王起聽之微者不必五音伊焦桐之逸韻契伯喈之眀心氣逐炎炎始將隨於槁木聲飛烈烈終見用於雅琴當其大匠未收樵人所利圭葉零落孫枝殘瘁以薪見迷以竈求媚聲連而丹焰乍飛響送而紅星忽墜聞之者徒為木之槁火之熾殊不知八音之珍佇五絃之至彼美中郎神妙無方樂無不審音無不詳聽執爨之間克諧律吕聞就燥之處乍含宫商乃言曰惜乎斯桐韻實天假可以加雕斫可以暢韶雅何混彼樗林而棄于薪者於是收質焰焰求音泠泠撲滅其色鱗皴其形被之以絃佇水流而山立鼓之為操必鶴舞而魚聽平聲則知桐之成器待其人而克定桐之有聲非其人而靡聽向若清耳不傳瓌材遂損希聲率爾聾俗猶然則半死之根誰一收其餘燼孤生之幹將久滅於青烟桐之爇兮人之德焚身之闕兮躬忽見屈殊不知焦尾為珍竟獲伸於多識至矣哉一無此三字感知音者願是效而是則無絃琴賦以舜歌南風待絃後發為韻張隨陶先生解印彭澤抗跡廬阜不矯性於人代笑遺名於身後適性者以琴怡神者以酒酒兮無量琴也無絃粲星徽於日下陳鳳啄一作軫於風前振素手以揮拍循良質而周旋幽蘭無聲媚庭際之芬馥緑水不奏流舍後之潺湲以為心和即樂暢性靜則音全和由中出靜非外傳若窮樂於求和即樂流而和喪扣音以徴靜則音溺而靜捐是以撫空器而意得遺繁絃而道宣豈必誘𤣥鵠以率舞驚赤龍而躍泉者哉如是載指載撫以逸以和因向風以舒嘯聊據梧以安歌曰樂無聲兮情逾倍琴無絃兮意彌在天地同和有真宰形聲何為迭相待客有聞而駭之曰樂之優者惟琴君之聖者惟舜稽八音而見重彈五絃以流韻故長養之風薰而敦和之德順無為而天下自理垂拱而海外流一作求覲伊德音之所感與神化而相參固以極天而蟠地豈惟自北而徂南然則琴備五音不可以闕絃為音而方用音待絃而後發苟在意而遺聲則器空而樂歇先生特一作待執由心之理而昧感人之功俾清濁不聞於小大宫商莫辨夫始終攫之深舍之愈促空軫而奚則角為民徴為事扣無聲而曷通秖反舌疑作反古以自異實詭代而違同孰若同靜華以發外合恬和而積中傳雅操於心手播德音乎絲桐俾其審音者悟専一之節奏知變者美更張之道崇先生曰吾野人也所貴在晦而黜聰若夫廣樂以成教安敢與䕫而同風五色琴絃賦以宫商角徵羽文武為韻仲子陵絃有五色而播蓋出乎舜宫方理之而登於夀域故制此而歌夫薰風黑與青間青與赤通或以白而受采或以黃而居中本乎朱襄以至陶唐因加而自七至八以少乎惟宫與商事匪因於蠶餌或不由於解疑作蟹筐園客以登夫鈎軫墨子徒歎於蒼黃及其瓠巴所彈師文所學流連昭一作放曠縹眇綿邈莫不因其靜好生此和樂張伯牙之號鐘含師曠之清角八音克諧兮自比五色相宣兮有以雖因聲以至用終假色而為美清音從內而發和氣由中而起奏激楚則引以結風歌陽春則雜以流徵或向虛壑或臨積水影歷歷而分形聲泠泠而過耳直其躬而能屈鮮其色而受汙惡以紫而奪朱常恐新而代故大白若辱有以見至道之源小扣必鳴有以昭儒者之度召姑洗則草木潜發歌黃鐘而川池異沍泉魚瀺灂以躍鱗雲鶴婆娑而拂羽至如心有所感聲成於文既為事而為物亦有臣而有君哀而不慘樂而不分著萬物之情性和二氣之絪縕别有鳴琴在筵實篚無覩木繩則直色然後取儻同聲之不遙願聞乎亂之以武孔子彈文王操賦以審音知人前後一揆為韻薛勝之文王有聲惟聖能審初彈雅操知德音而有懷稍奏遺音覺儀形之可禀黮然之狀已究鏘然之響可尋述而不作載好其音德必不孤諒前聖合於後聖道乃無二誠此心達於彼心其神也邂逅相遇其慮也罔或不欽則知掩四方而氣正加一絃而義深曲引蒸哉調吟皇矣穆穆乎順帝之則洋洋乎令聞不已同聲相應雖千古而㑹徽音異日而論猶萬邦而聆遺美所以聖賢不逺古今一揆且將合于心豈獨盈乎耳既而溫故知新若聖與仁千里同風自冥契於風韻千年一聖當間出於聖人玉指回軫朱絃應律運八風而吹萬迭五音而不一既而文德在兹以寧王道宥密斯操也必俟後賢吾無間然陟降因我而著昭穆因我而宣符盍徹之言無毫釐乖於是叶同音之理豈合度差於前是謂惟神所受繼聖之後自得於心匪傳於口稽帝謂之意勤止豈無非天縱之才生知何有無音不合無德不宜翼翼之心因心而㑹亹亹之善盡善而知師襄於是作而言曰子聖人也與文王而同規鍾期聽伯牙鼓琴賦林慮山人天贊厥德惟伯牙與鍾期一則能清師曠之耳一則能調園客之絲愜易象斷金之義應詩人伐木之詞審爾律吕不爾瑕疵何千載之見遇使二妙以同時且琴者所以納正禁邪白虎通琴者禁也禁止淫邪以正人心弄者所以協情和一作利性必藉其手敏亦假其心靜使音無所容於姦聲安得惑於鄭若然者信可謂能彈而復思乎善聽能彈奚若播於往古善聽伊何奏難鹵莽所以協律之六應聲之五故將中感於天地豈惟外合於匏土不爾何貴鍾期之聽何尚伯牙之鼓𬗟想二子徽音不瑕冥合匪慙於郢匠絶藝方超於瓠巴賴爾能聽知子有嘉苟解揮宫以按徵豈勞樹羽與崇牙乃若被褐懷珠當年入賦合絲桐之響希爾促柱有金石之音思君惠顧以聲韻當於清彈以詩書同乎雅琴顧惟一作願以小人之述得回君子之心儻能順聽欲仰訴於知音鍾期聽琴賦并序王太真昔曽待詔金門屬吾君耽道久之事寢歸歟寧省竊服古訓見郭林宗傳曰貞不絶俗隱不違親賢哉斯文生人端格然恨甘㫖不足每淪翮自咎及耿坐虛館凝神定靈夜分假寐如聞琴聲發越宛在左右寤而驚惋貴知音為難感鍾期善聽因賦是以廣意寂兮琴之德寥兮琴之聲德徹隂陽之奧聲涵淳粹之精體空洞響真清偉上皇之遺功超萬祀之垂名祇聞成連伯牙以傳曲忽覩師文子春而移情俟良知轉化靡忒鍾子期故有空山之谷清澗之湄幽人髣佛絶粒茹芝憑髙梧引長颸激楚窈窕流波逶迤陽阿布濩結緑參差髙秋風冷逺浦霜滋素月滿繁星稀雅調閒逸流風逺吹鍾期當日傾耳志之怡性愜靈中矩應規躊躇四顧侯其褘而曰聽商則知愁霖春零聞角乃覩韶華秋榮羽發則寒生朱夏徵來則暑移𤣥英陵厲翕忽消息竭盈君子恱懌導心和平斯實庖丁投刃而節應郢人運斤而風生者也夫其髙張絶絃韻清調苦惝恍惻憾一龍一虎猛將之逐虜冰雪操蘭蕙薰嶷兮崇山徑若寒雲烈士之諫君跂燕趙望江漢行路難杳無畔淋漓沸渭牢落泮渙逰子之悽斷徽未撫涕橫流悲宿昔心悠悠樵童牧豎登孤丘哀引南音一何楚囚興歌百里又喜子游應事態移體物聲愁或飛而不速或擁而不留愔愔泠泠窮微達幽一偶鍾生之聽妙極而不周於是䕫襄愕眙昭曠咄咨音有至而乃發發當及乎此時乃理雲和寫咸池感天地動神祇𤣥鶴鼓舞鳳凰來儀風雷并雲雨隨黃帝之所聽瑩伊代人疇敢以窺鍾子兀然收聽反視沉吟不已感樂之至精得音之微㫖信音之難蓋曲有此誠在聽之以心安可察之以耳嗟嗟琴韻盡美矣朱絲繩賦失名達者覩物而自識眷繩而象直白能受采知成用而可修樂匪在音遂執中而有得諒絲繩之為物類託質以自一作孤植幸操張以一伸任縱橫而取則故能貞而守正徑以全真含至和以不屈抱孤直以誰鄰若剛克以自致諒柔立而有音齊達人之履道比君子之修身久而莫渝豈紅紫之見奪徑而不撓非糾纒之為倫當其涗水初滋勢如束理女工爰作視其所以如疑積微於杪忽遂立質於經紀察其本同成經以自綸喻乎時表直道以如砥挂端標以有凖持正色而為美將配德於清壺願齊名於直矢故能從繩作直因物寓詞苟一繩之可法將百行以為師義足仰而象矣理自中而得之直可自侔奚感鮑君之與色非我行徒興墨子之悲將徑挺而自守庶回邪而不欺俾夫取象師心必由斯道考一作盼朱絲之外物得素尚于中抱奚水鑑之足徵拒韋絃之是保觀夫正不與奸色儔勸吾人之聿修直不為虛聲枉俾吾人之取象故能名昭樂曲義暢人謨鄙在棼而不理賤為直以就汙願處微而自正終守直以不渝足以詭良材而轉雅操端循質而喻通途茍中正之可進願從繩而已乎第二庾承宣絲之為體兮柔以順德絲之為用兮施之則直從其性而不改成其音而罔忒故君子體直以為象履中而立身豈委曲而取媚將徑挺而惟新既端懿以難匹想髙張而莫倫初未為絃兮信任其舒卷既比夫矢也諒難乎屈伸寧懼不合於衆而改操不同其類而易真雖立質以假物立音而因人敦夫㡛氏之功辨夫園客之養非繞指以可恱將如絲而是仰志士以是而興歎詩人因此而取象清廟之瑟非我而莫聞空桑之琴非我而奚響惟直是與惟端是求惡靡然以從俗恥紛若以隨流天心保貞側媚見而用悔疑神道助正謇諤鑒而無憂信乎去邪以受福孰不履正而身修間其色兮未嘉素其質兮孰美信挺挺而直繩是若固奕奕而渥丹無比欲衆之好我染之而匪他知代之惡邪直之而有以非矯其俗將遷其時寧三思而有贊諒一向而無疑道在斯而為得文捨此而何之古所以嗟是非而莫分怨邪正之難考多將任情而媚俗鮮能率性而行道何不鑒朱繩而獨異與羣類而且殊其美雖偶其道則孤儻斯言而是當又可得而已乎昭文不鼓琴賦吳冕息絃軫兮大朴𤣥同忘琴音兮至人守中道不緣情則去聲而外寂德惟抱素故含和而內融於是見髙士之心出常人之境其養貴默其伎尚靜及卷懷而克順反不鼓而是逞韞藝如何𤣥德靡他知迷則達用晦實多虛張不彈俾指節而交暢全聲入妙吻心曲而同和且人心靜為常琴心虛為主將寧體於道樞亦守器於德宇壞之無故常寂響而有餘用之則虧乃含音而莫吐故自適於胸臆亦何用於角羽顔子所以如愚昭文由是不鼓近情好樂尚德養空罷奏南音悟人間之客寄不操三峽體山下之泉䝉斯懷柔之古者竟生白於仙宫夫動極則靜音繁不復守朴外真含虛內肅施絃罔舉則見素而如絲沉聲莫發乃繁根而猶木因雅韻而不奏識道情之所蓄此則恬然誰與寂爾自耽希夷既造妙理難探栗里無絃淵眀則矯王門碎質安道更慙是以飾外者貴其體備厚內者尚其包含於戲琴心懸解幽響何答于以閒和于以虛納十指攸措咸制動而是宜五音知常各處寂而不雜故琴默而美昭信仁靜而道合文苑英華卷七十七
