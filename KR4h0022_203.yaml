body:
  text: 文苑英華卷二百三宋李昉等編樂府十二幸甘泉宮歌二首櫂歌五首紹古歌五首勞歌二首鞠歌二首浩歌三首長歌三首短歌十六首放歌四首幸甘泉宮歌梁簡文帝雉歸海水寂裘來重譯通吉行五十里隨處宿離宮鼓聲恆入地塵飛暗上一作上暗空尚書隨豹尾太史逐相風銅鳴周國旞旗曵楚雲一作虹紅幸臣覆射罷從騎一作妓新歌終董桃拜金紫賢妻侍禁中不羡神仙侣排烟逐駕鴻同前劉孝威漢家迎夏畢避暑甘泉宮機車鳴里鼓駟馬駕相風校尉烏丸騎待制一作詔樓煩弓後旌猶五柞前笳度九嵕才人豹尾內御酒屬車中輦回百子閣扇動七輪風鳴鍾休衛士披圖召後宫材官促一作從校獵凉秋戲射熊櫂歌梁簡文帝妾住在一作妾家住湘川菱歌夲自便風生解刺一作搒浪水深能捉船葉亂由牽荇絲飄為折蓮濺粧疑薄汗霑衣似故湔浣紗流暫濁汰錦色還鮮參伺一作同趙飛燕借問李延年從來入絃管詎一作誰在櫂歌前同前盧思道秋江見底清越女復傾城方舟共采摘最得可憐名落花流寶珥微吹動香纓帶垂連理濕棹舉木蘭輕避人一作順風傳細語因波送逺情誰能結錦纜薄暮隱長汀同前蕭岑桂酒既潺湲輕舟亦乘駕鼓枻何所吟吟我皇唐化容與滄浪中淹留明月夜同前魏收雲溜添春浦花木足新流桃發武陵岸栁拂武昌樓同前駱賓王寫月塗一作圗黃罷凌波拾翠通鏡花搖芰日衣麝入荷風葉密舟難蕩蓮疏浦易空鳯媒羞自託鴛翼恨難窮愁一作秋帳燈光一作華翠倡樓粉色紅相思無别曲併在櫂歌中紹古歌三首梁簡文帝翻階蛺蝶戀花情容華飛燕相逢迎誰家總角岐路隂裁紅㸃翠愁人心天窗綺井暖一作暖徘徊珠簾玉篋明鏡臺可憐年幾十三四工歌巧舞入人意白日西落楊桞垂含情弄態兩相知二西飛迷雀東羇一作飛雉倡樓秦女乍相值誰家夭麗鄰中止輕粧薄粉光閭里網戶一作洞房珠綴曲瓊鈎芳茵翠被香氣流少年年幾方三六含嬌聚態傾人目餘香落葉坐相催可憐絶世為誰媒三一作擬古又云劉孝威作雙栖一作飛翡翠兩鴛鴦巫雲一作山洛月乍相望誰家妖冶折花枝衫長釧動任風吹一作娥眉􅝇睇使情移金鋪玉鎖琉璃扇花鈿寶鏡織成衣一作青鋪鎖窗琉璃扉瓊筵玉笥金縷衣美人年幾可十餘含羞騁一作轉笑斂風裾珠丸玉彈不可追空留可憐持與誰此詩二百五卷重出今已削去注異同為一首同前陳後主池側鴛鴦春日鶯緑珠絳樹相逢迎誰家佳麗過淇上翠叉綺袖波中漾雕軒繡戶花恆發珠簾玉砌移明月年時二七猶未笄轉顧流盼鬟鬢低風飛蘂落時一作將何故可惜可憐空擲度同前江總南飛烏鵲北飛鴻弄玉蘭香時㑹同誰家可憐出窗牖春心萬媚勝楊桞銀床金屋挂流蘇寶鏡玉叉橫珊瑚今年一作年時二八新紅臉宜笑宜歌羞更斂風花一去春一作杳不歸只為無雙一作雙雙惜舞衣勞歌伍緝之幼童輕嵗月謂為一作言可久長一朝見零悴歎息向愁荒一作秋霜迍邅已窮極疹一作疾疴復不康每恐死及我朝露見日光一作每恐先朝露不見白日光庶幾一作及盛年時驚逐情所忘一作暫逐情所望吉辰既乖互一作越來期眇未央促促嵗月盡窮年空怨傷同前蕭撝百年能幾許公事罷平生寄言任意正誰憐李少卿鞠歌行李白玉不自言勝一作如桃李魚目笑之卞和恥楚國青蠅何太多連城白璧遭讒毁荆山長號泣血人忠臣死為刖足鬼聽曲知寧戚夷吾因小妻秦穆五羊皮買死百里奚洗拂青雲上當時賤如泥朝歌鼓刀叟虎變磻溪中一舉釣六合遂荒營丘東平生渭川一作水曲誰數一作識此老翁奈何今之人雙目送飛鴻同前羅隱麗莫似漢宫妃謙莫似黃家女黃女持謙齒髮髙漢妃恃麗天廷去人生容德不自保聖人安用推天道君不見蔡澤嵌枮詭怪之形狀大言直取秦丞相又不見田千秋才智不出人一朝富貴如有神二侯行事在方冊泣麟老人終困厄夜光抱恨良嘆一作撲悲日月逝矣吾何之浩歌權德輿杖策出蓬蓽浩歌愁興長北風吹荷衣蕭颯景氣凉通逵抵山郭里巷連湖光孤雲净逺峯緑水溢方塘魚鳥樂天性雜英互芬芳我心獨何為萬慮縈中腸履道身未泰主家謀不臧心為世教牽跡寄翰墨場出處兩未定羈孤一作空自傷沉憂不可裁佇立河之梁晚歸茅簷下左右陳壺觴獨酌復長謡放心逰八荒得喪同一域是非亦何常胡為苦此生矻矻徒自強乃知杯中物可令一作使憂患亡一作忘因此謝時輩棲息無何鄉同前白居易天長地久無終畢昨夜今朝又明日鬢髮滄浪牙齒踈不覺身年四十七前去五十有幾年把鏡照面心茫然既無長繩繫白日又無大藥駐朱顔朱顔日夜不如故青史功名在何處欲留年少待冨貴冨貴不來年少去去復去兮如長河東流赴海無回波賢愚貴賤同歸盡北邙塜墓髙嵳峩古來如此非獨我未死有酒且髙歌一作醉顔回短命伯夷餓我今所得亦已多功名富貴須推一作待命命苟不來一作命若不來又作苟未知奈何同前李賀南風吹山作平地帝遣天吳移海水王母桃花千遍紅彭祖巫咸幾回死青毛駿一作驄馬參差錢嬌春楊栁含湘一作細烟筝人勸我金屈巵神血未寧身是一作問誰不須亂舞一作浪飲丁都護世上英雄本無主買絲繡作平原君有酒唯澆趙州土漏催水咽玉蟾蜍衛娘鬢一作髮薄不勝梳看一作差見秋眉换深一作新緑一作看看見秋眉换緑世上男兒那刺促長歌行鮑明逺一作沈約春隰荑緑栁寒墀積皓雪依依往紀盈霏霏來思結思結纒嵗晏曽是掩初節初節曽不掩浮榮逐弦缺弦缺更圓合浮榮永沉滅色隨夏蓮變鬢與秋霜耋道迫無異期賢愚有同絶銜恨豈云亡天道無甄别功名識所職竹帛尋摧裂生外苟難尋坐為長歎說一作設同前王昌齡曠野饒悲風颼颼稿一作黃蒿草繫馬倚一作停白楊誰知我懷抱所是同𫀆者相逢盡衰老北一作况登漢家陵南望長安道上有枯一作下有古樹根下有鼯一作上有鼷鼠窠髙皇子孫盡千載一作古無人過寶玉頻發掘精靈其若一作奈何人生須達命有酒且長歌同前劉復淮南木落秋雲飛楚宫商歌今正悲青春白日不與我當壚舉酒勸君持出門驅驅四方事徒用辛勤不得意三山海底無見期百齡世間莫虛棄君不見金城帝業漢家有東制諸侯欲長久姦雄竊命風塵昏函谷重關不能守龍蛇出沒經兩朝胡虜憑陵大道銷河水東流宫闕盡五陵松柏自蕭蕭短歌徐謙窮通皆是運榮辱豈關身不願一作顧門前客看時逢故人同前意氣青雲裏爽朗煙霞外不羡一囊錢唯重心襟㑹同前二首送祁録事歸合州因寄蘇使君杜甫前者途中一相見人事經年記君面後生相勸何寂寥君有長才不貧賤君今起柂春江流余亦沙邊具小舟幸為達書賢府主江花未盡㑹江樓二贈王郎司直王郎酒酣拔劍斫地歌莫哀我能拔爾抑塞磊落之竒才豫章翻風白日動鯨魚跋浪滄溟開且脫佩劒休徘徊西得諸侯棹錦水欲向何門趿朱履仲宣樓頭春已深青眼髙歌望吾子眼中之人吾老矣同前李白白日何短短百年苦易滿蒼穹浩茫茫萬劫太極長麻姑垂兩鬢一半已成霜天公見玉女大笑億千場吾欲攬六龍回車挂扶桑北斗酌美酒勸龍各一觴冨貴非所願為人駐頽光同前文粹作悲歌集作短歌行三首顧況邊城路今人犂田昔人墓岸上沙昔時江水今人家今人昔人共長歎四氣相催節回換明月皎皎入華池白雲離離度清漢我欲升天天隔霄我欲渡水水無橋我欲上山山路險我欲汲井井泉遙越人翠被今何夕獨立沙邊江草碧紫燕西飛欲寄書白雲何處逢來客一作蹤跡二新繫青絲百尺繩心在君家轆轤上我心皎潔君不知轆轤一轉一惆悵何處春風吹曉幕江南渌水通朱閣美人二八顔如花泣向春一作東風畏花落臨春風聽春鳥别時多見時少愁人一夜不得眠瑶井玉繩相對曉三軒轅黃帝初得仙鼎湖一去三千年周流三十六洞天洞中日月星辰聫騎龍駕景遊八極軒轅弓劍無人識東海青童寄消息本集自臨春風至軒轅以下為一首列之第三篇文苑所載多脫略今從文粹及集本添入但不用序文同前二首白居易世人求冨貴多為奉一作身嗜欲盛衰不自由得失常相逐聞君少年日苦學將干祿負笈塵中逰抱書雪前讀布衾不周體藜茹才充腹四一作二十登官途五十被朝服奴溫新挾纊馬飽初食粟未敢議歡逰尚為名檢束耳目聾暗後堂上調絲竹牙齒缺落時盤中堆酒肉彼來此已去外餘中不足少壯與榮華相避如寒燠青雲去地逺白日經天速從古無奈何短歌空一作聽一曲二曈曈太陽如火色上行千里下一刻出為白晝入為夜圜轉如珠住不得住不得可奈何為君舉酒歌短歌歌聲苦詞亦苦四座少年君聽取今夕未竟明旦催秋風才往春風回人無根蒂時不駐朱顔白日相隳頽勸君且強笑一面勸君復強飲一杯人生不得長歡樂年少須臾老到來同前馮著寂寂草中蘭亭亭山上松貞芳日有分生長耐相容結根各得地幸沾雨露功參辰無停泊且顧一西東君但開懷抱猜恨莫匆匆同前釋皎然古人若不死吾亦何所悲蕭蕭烟雨九原上白楊青松葬者誰貴賤同一塵死生同一指人生萬代一作在世共如此何似一作異浮雲與流水短歌行短歌無窮日已傾鄴宫梁苑徒有名春草秋風傷我情何為不學金仙侣一悟空王無死生同前聶夷中八月木隂一作䕃薄十葉三墮枝人生過五十亦已同此時朝出東郭門嘉樹鬱參差暮出西郭門原草已離披南鄰好臺榭北鄰善歌吹榮華忽銷散一作歇四顧令人悲生死與榮辱四者乃常期古人耻其名沒世無人知無言鬢似霜勿謂事一作髮如絲耆年無一善何殊食乳兒同前釋子蘭日月何忙忙出沒住不得使我勇壯心少年如頃刻人生石火光通時少與塞四季倐往來寒暑變為賊偷人面上花奪人頭上黑同前司空圗鳥飛飛兔蹶蹶朝來暮去催時節女媧只解𥙷青天不解煎膠粘日月同前王貞白物候來相續新蟬送晚鶯百年休倚賴一夢甚分明金鼎神仙隱一作祕銅壺晝夜傾不如早立德萬古有其名放歌行王昌齡南望一作渡洛陽津西望十二樓明堂坐天子月朔朝諸侯清樂動千門皇風𬒳九州慶雲從東來泱漭抱日流升平貴論道文墨將何求有詔徴草澤微誠將獻謀一作獻謀猷冠冕如星羅拜揖曹與周望塵非吾事入職一作賦且遲留幸蒙國士識自一作因脫負薪裘今者放歌行以慰梁甫愁位榮數斗祿奉義本一作養母豐羞願一作若得金膏遂飛雲亦可籌一作儔同前李頎少年學文耻學武世上功名不解取雖沾寸祿已後時徒欲出身事明主柏梁賦詩不及宴長楸走馬誰相數斂迹俯眉心自髙含歌擊節聲半苦由是蹉跎一丈夫養雞牧豕東城隅空歌漢代蕭相國肯事霍家馮子都虛爾當年名籍籍濫作詞林兩京客故人斗酒安隱橋黃鳥春風洛陽陌吾家令弟才不羈五言破的人共推興來逸氣如湓湧千里長江歸海時别離短景何蕭索佳句相思能間作舉頭南望魯陽山木葉紛紛向人落同前孟雲卿吾觀天地圖世界亦何小落落大海中飄浮數洲島賢愚與蟻虱一種同草草地脉日夜流天衣有時掃東山謁居士了我生死道自見難噬臍心通可親腦軒皇竟磨滅周孔亦衰老永謝當時人吾將寶非寶同前權德輿夕陽不駐東流急榮名貴在當年立青春虛度無所成白首銜悲亦何及拂衣西笑出東山君臣道合俄頃間一言一笑玉墀上變化生涯如等閒朱門杳杳列華㦸坐中皆是王侯客鳴環動珮暗珊珊駿馬花驄白玉鞍十千斗酒不知貴半醉留賔邀盡歡銀燈一作燭煌煌夜將久侍婢金罍㵼春酒春酒盛來琥珀光暗聞蘭麝幾般香乍看皓腕映羅䄂微聽清歌發杏梁雙鬟美人君不見一一皆勝趙飛燕迎杯乍舉石榴𥚑勻粉時交合歡扇未央鍾漏醉中聞聫騎朝天曙色分雙闕烟雲遙靄靄五衢車馬亂紛紛罷朝鳴佩驟歸鞍今日還同昨日歡嵗嵗年年恣逰宴出門滿路光輝遍一身自樂何足言九族為榮真可羡男兒稱意須及時閉門下帷人不知年光看逐轉蓬盡徒詠東山招隱詩文苑英華卷二百三
