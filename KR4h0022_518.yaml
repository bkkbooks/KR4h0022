body:
  text: 文苑英華卷五百十九宋李昉等編祭祀四雜祭祀門二十八道祭闕頒誥判七道大夫采地祭判二道庶子牲祭失禮判一道士祭判三道匹士大牢祭判一道士不合設壇判三道用牲于門判一道歸胙判八道祭器判一道祭器奢僣判一道祭闕頒誥判所司有禮事不頒誥所由斷徒訴不伏對斐子建禮典之制期諸豐潔祼鬯將行無宜秕稗是以有司卜日而頒教所由先庚而讀法故能籩豆有楚殷薦聿修皇祖降歆萬壽攸酢孝孫有慶百祿是荷若後時而不陳則臨事而或闕偶俱罹謗須一辨明彼以不戒視成居然有罰此以未承憲令無狀可明俱曰宫臣當須慎守既一作自貽伊戚尚曰奚為同前常建祀禮孔殷以供百姓禮容不肅奚疑作豈崇二獻興言國典厥在司存頒之猶恐不供不頒將何集事俾左社右廟奚捧幣薦牲方澤圓丘曷焚柴埋玉欲加之罪安得有詞必也禮或重輕法存降殺將定所刑之典須明所祭之神議以從徒宜其後命同前祀事孔明展誠告備崇享獻之道則歌舞其牲嘉滌濯之容則詔相其禮取則不逺聞斯行諸政貴有恆人用不撓雖小祭大祭課乃機宜而充人亨人曷不頒布况卸疑作郵罰麗事職汝之由天子有司是堪自頒龜玉毁櫝曷所逃刑同前薛彥國國有祀典以和神人思不出位是主蠲潔茍越率履不承權輿難乎守官直以窒惕所司實掌其祭或承之羞備物不頒於職人戒嚴有乖於先甲遂使奉牲之告不及於肆師降神之典無聞於六變闕而為罪宜灼薰心過而必聞自貽噬臘詳諸秩典俾罰鬼薪同前郭庭誨於糾禮官無辱祀典欽若天地肅恭神人如何有司失其頒誥將季氏之暗失由也之質明致使槱燎不供難為象祭爟火無設便乖漢典宗伯或差於三望太常乍闕於六宗職此之由而襲其守而天秩有禮罔不克集置以徒坐復何疑焉同前梁乘受福之祭固存乎肅恭出令以言實在乎頒告繄有司之不腆乃事神而未逹不能先備禮物預頒祀典存彼舊章介茲景福雖自牖納約所貴齋心倘入廟未知將何措手若也禮則斯缺人心匪虔信且未孚福將何所且祀有大小罰有重輕大則合置於徒刑小則宜從於笞坐須明大小方辨重輕同前薛大球祀以追孝祭以馭神厥儀孔昭執事有恪欲使粢盛豐備祖考歆黍稷一作禾稷之馨圭璧允植川嶽享沉浮之薦所司不供其職俾人用迷鍾鼓或闕於鏗鏘籩豆恆乖於薦楚法既將紊神其舍一作吐諸且無翼翼之容曷降穰穰之福自底不類嘖有煩言固乃曠我之官告曰轉爾于恤斷從徒罪斯乃鋭乎翻事言焉其何補也大夫采地祭判得宗人掌三辰之法以猶鬼神祗之居辨其名物保章不供本職輒事左道人云采地所祀對天子建國法合掌於三辰諸侯立家禮許修其五祀非直為之紏禁抑亦辨其名物各有職守無相奪倫至如日月運行陰陽消息乾坤測度之法山川沉埋之儀蓋存公道希憲於觀臺豈合私為輒陳於采地宗人所祀正當左道之條保氏所陳深得禮刑之制同前三代命祀厥有禮文六官陳殷匪無名秩思不出職舉必在公神人之官各恭爾位爼豆之事實有司存伊彼宗人祭於采地茍不失禮夫何間言殊季孫之見嗤振疑作旅于岱嶽異晉侯之有疾不祀羽泉今茲掌彼三辰不修其法紊我禋祀之道以猶鬼神之居祝詞爰論名物徒辨不以為禮神其享諸保章祠彼上玄昔疑作習茲左道不恕其咎何所逭逃庶子牲祭失禮判得庶子為大夫以上牲祭其家人告其失禮辭云宗子為士不可以貴就賤對王緯霜露孝思朔月一作日殷祭申其爵祿格以祖考茍或違經是同匹嫡相彼庶子命為大夫體異承祧位踰齒族固令奉其常祀從以大宗獻上牲於嵗時稱介子於工祝使僾然之歎不絶於聲如在之義復存於目乃黯於祀典越我顛毛恃肥腯之牲牷或將或肆繄豐盛之黍稷于豆于登假一作嘏祖禰之恩二重實疑於夫子竊蒸嘗之薦三廟奚取於私家仍聞就賤之辭豈聽如流之責實誣之祭人何以觀士祭判為士殺犬豕或人告君子逺庖厨凡有血氣之類不身踐訴云有故凖禮不坐對禮以制人命以防欲是彰品秩無取僣差茍豐約之不踰於德義而斯美乙周行已置沗曰王臣班列尚微蓋為元士曽靖恭其位不虧莊敬之文當官而行既不越於時式執禮以動亦何恤於人言屬霜露既零春秋匪懈爰修饗祀載展牲牷近彼庖厨雖則踐於血氣潔茲犬豕頗亦薦於夫疑膏既稱有故而殺難議不經之科或人詞遊宜以麗法同前曹詵禮探寧儉士有等威茍不體於牲牢則無儀於享祭惟乙命士克由舊章入户僾然感四時而展敬祭神如在瞻一廟以式思告全將啓其血毛備物乃利一作封於犬豕修戴禮而不忒豈吕刑而可加或人何斯居然昧識好生軫憲徒有效於愛羊速訟不稽寧無慙於相鼠雖庖厨可逺身踐一作剪則誠爽至仁而蠲潔在躬親割乃允孚主敬稱以有故于何議刑同前崔曙孝子饗親祭神如在主人肅客式宴以衎籩豆有楚無償西鄰之言餼牢不竭是陳東道之禮觀乙為士聞斯行諸曰殺羔羊尚流詁訓嵗修犬豕何爽大經同燕人愛疑思雖踐血氣異翨氏之業終逺庖厨將食節而事時豈厚味而臘毒或人興訟捨禮何之有孚致辭勿問元吉匹士大牢祭判匹士大牢而祭對祀典所興人倫共仰違越行禮章程不容匹士下流陋巷微物竒才有慙於梓漆利器無逮於干將事於鬼神陳於爼豆如在申敬惟馨展禮著於行潦無妨於預祀輒薦大牢載虧於非月既斯故犯宜置于刑士不合設壇判甲嘗有大事祫於王父及其曽髙遂設壇為墠或曰僣而不經甲稱且有後命對祭盡於敬是敦孝享備其鼎爼潔爾牛羊克孚濟濟之容實受穰穰之福眷言宗廟罔黷蒸嘗甲何人斯每事無問干彼祫典昧斯國經靡虔於寢之儀茍踰立廟之制有禱而祭實越等威我髙我曽雖罄由𠂻之道為壇為墠且貽僣上之責前言匪習後命奚施待窮越禮之詞然正恤刑之典同前劉公輔聖教因親人事有禮春秋祭祀以時思之眷言於甲慎終追逺祫父志髙展於孝敬將序昭穆以列尊卑神明始交哀樂兼半祝史陳信曽無愧詞彼或何為忽乎興訟然則五廟諸侯大夫此之等差非無典誥儻貴通五爵甲稱固則有憑如位列萬人或告不宜無當請責名品方正刑書同前孝以思親祭之如在既申怵惕式備蒸嘗惟甲承家方茲主鬯遵先王之法有事宗枋讀非月之書方申禘典既而享獻其潔壇墠克除在祀之敬不乖陳信之儀無闕有何所犯旋告不經請從後命之詞靡取無稽之訟用牲于門判洛水溢有司用牲于門或非之云茍濟於物祀之何爽對瞻彼洛矣其水泱泱雲澄緑潭樹夾清岸天作霖雨時維浸溢縱柏舟而難泛豈一葦之可航永惟主司能業爾職載懷黔首用祭玄冥巨浪無倪已不分於牛馬明德可恃乃展敬於牲牷漢皇之歌彰夫舊史周官之禮著自前聞何彼人斯行葦末學事則有據非將奚為歸胙判甲監享以胙歸父餕而祭對康子元無文咸秩既重於肅雍有功則祭或防於跛倚甲以棘匕方載式預監牲茅縮以陳遂聞歸胙餕食煙逹應非尊者之餘胙致曰嚴自入先生之饌用此而祭頗乖經禮之儀未及於刑須黜平典之議同前朝良貞精意以享敬于展牲率禮莫違洽乎歸胙甲以膚敏典司蒸禴分以貴骨爰封介葛之犧奉乎髙堂用入老萊之膳恩必逮下子道或霑其食餘祭示有先神理詎歆其餕末既比慶封之祀難許叔氏之禮同前母嬰宗廟崇儀禴嘗明祀先王有以尊祖考歷代所由追饗敬惟甲趨召奠奉蒸羞與於蠟賔非喟然之有歎侍於邦祭聞立者之無跛接神旌而下御來盡恭肅送靈驛而方行去升微滅眇威儀之奕奕期降福之穰穰已而往辟云除笙鏞則闕罷儀於國休事於家致胙以歸奉其親乎則可既餘為餕因設祭而何乖永言禮經瞻所祠一作祀典匪伊天降寧惟地出有誤於事貽謗何逭同前鄭齊望三才既分六宗爰設或因地事地或因天事天明堂尊嚴配之儀清廟崇禘祫之典國之盛禮其何以先神之至誠罔不或降於是陳以簠簋薦之犧牲瑟奏空桑管吹孤竹甲言參大享監彼有司獻灌無虧福祐攸洽貴骨以頒於髙品賤禮疑作體仍霑於庶寮他日鯉趨且聞歸胙今朝神惠更用祭先錫類之美則多黷禮之嫌宜避同前韋述郊廟蒸嘗春秋禴祀執膰成禮受胙為榮甲位列周行職惟神監舉信從政須慎威儀屬有事宗祊無虧肅敬鄒人問禮非惟黍稷之馨祝史正詞抑亦牲牷必備既而三獻徹爼肆夏尸還天子多歡始預受釐之福先生有饌遂欣歸胙之榮初則視膳在堂終則降福於廟雖必嘗君賜頗取則於前規而不捨餕餘誠有違於昔典非復必齋之慎審乖如在之儀何慢神之致尤惟失禮而斯取同前袁暉餕餘不祭昭彼前聞事且違經慙於逹者甲沗居官序式陪精意悅分胙以言旋鄙過屠而自足瞻白華之養孝則盡誠昧非月之言理難逃責逺儔知禮雖惡於鄒人近取恤刑宜寬於漢典同前牛上士祀祭以神官司執事昔者由也曽陪季氏之庭孰謂鄒人每入魯侯之廟甲既策名朝列監享嚴禋剛鬛柔毛不化庖人之饌白茅醴酒遽聞歸胙之榮食美思親無乖孝養餕餘有祭暫越禮經柴也之愚雖聞小過參也之魯何妨大倫以禮許人則吾豈敢棄瑕録用將子有聞論情雖欲薄言與進未宜深責同前單有鄰甲幸彼曲成官同直指不彼一作被澤宫之誡與監清廟之儀執燭薦腥禮循朝饋崇牙樹羽樂遽撤懸方致美於吉蠲即同班於福肉榮仍在已祿逮其親詠蘭陔之詩晨昏少力申綵服之養烏鳥多歡用廣中厨因茲外胙為中之道始則著於先嘗食父之餘終必歸於致祭且聖人之禮祭示有先夫婦各差父子異數盡於是矣何所疑焉祭器判少府監申稱太常寺牒稱須造樽罍彛器并舟光不詳形狀制度請裁下對先王制物禮器為先商周虞夏容形各異象樽之儀爰刻象以成形玉斚之名遂以玉而為飾疊雲采采如開五色之雲彛鳥軒軒似翥六時之鳥舟其足也夫復奚疑少府自有常儀太常非無舊凖更請裁下未爽公方至於規模一作矩並在於此如愚管見謂叶通途祭器奢僣判甲飾祭器以連行劾其奢僣訴禮也對殷之六瑚周之八簋始有列於雞象終見釁於猳豚陳其犧牲備以鼎爼用嚴莊敬則著品章是以有舟有罍資適用之恆理廢禁棜禁分貴賤之攸宜賻布之餘則以是具畫布之羃則見將施茍禮典而是違信奢僣而逾陷甲祧廟其主祭器為先方用展於蒸嘗忽謬崇於朴斫博以庶物損其葆大考揮風之妙思得天巧之良工規制旋開鱗甲斯覩開絃疑作聞絃樂影宛似出於重泉擁劒潛形坐見儀於四豆雕其物象紊所欽崇一作承况黍稷而非馨何刻畫而為用且外骨內骨連行仄行同於剞劂之功以儷陶匏之器非取義於鄉士本嚴禮於邦家託以私門實忘公憲同管仲之􅍢簋昔所為非擬季氏之舞庭孰不可忍此而捨罪豫其何誅尚未覩於滅吞一作口實有違於噬嗑文苑英華卷五百十九
