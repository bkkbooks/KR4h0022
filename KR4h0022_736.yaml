body:
  text: 文苑英華卷七百三十七宋李昉等編雜序三孝經序一首老子道德經序一首九疑山記序一首隨求即得大自在陀羅尼神呪經序一首懷素上人草書歌序一首河南于氏家譜後序一首戴氏廣異記序一首維摩經略疏序一首陪獨孤常州觀講論語序一首通典序二首魏國公貞元十道録序一首李奕登科記序一首孝經序唐𤣥宗朕聞上古其風朴略雖因心之孝己萌而資敬之禮猶簡及乎仁義既有親譽益著聖人知孝之可以教人也故因嚴以教敬因親以教愛於是以順移忠之道昭矣立身揚名之義彰矣子曰吾志在春秋行在孝經是知孝者德之本歟經曰昔者明王之以孝治天下也不敢遺小國之臣而况於公侯伯子男乎朕嘗三復斯言景行先哲雖無德教加於百姓庶幾廣愛刑于四海嗟夫夫子沒而微言絶異端起而大義乖况泯絶於秦得之者皆煨燼之末濫觴於漢傳之者皆糟粕之餘故魯史春秋學開五傳國風雅頌分為四詩去聖愈逺源流益别近觀孝經舊注踳駁尤甚至於迹相祖述殆且百家業擅專門猶將十室希升堂者必自開户牖攀逸駕者必騁殊軌轍是以道隱小成言隱浮僞且傳以通經為義義以必當為主至當歸一精義無二安得不剪其繁蕪而撮其樞要也韋昭王肅先儒之領袖虞翻劉邵抑又次焉劉炫明安國之本陸澄譏康成之注在理或當何必求人今故特舉六家之異同㑹五經之㫖趣約文敷暢義則昭然分注錯經理亦條貫寫之琬琰庶有補於將來且夫子談經志取垂訓雖五孝之用則别而百行之源不殊是以一章之中凡有數句一句之內意有兼明具載則文煩略之又義闕今存于疏用廣發揮老子道德經序同前敕昔在元聖强著𤣥言權輿真宗啓迪來裔微文誠在精義頗乖撮其㫖歸雖蜀嚴而猶病摘其章句自河公而或略其餘浸微固不足數則我𤣥元妙㫖豈其將墜朕誠寡薄常一作嘗感斯文猥承有後之慶恐失無為之理每因清宴輒扣𤣥關隨意所一作所意得遂為箋注豈成一家之說但備遺闕之文今兹絶筆是詢于衆公卿臣庶道釋二門有能起豫類於卜商針疾同於左氏渴於納善朕所虛懷茍副斯言必加厚賞且如諛臣自聖幸非此流懸市相矜亦云小道既其不諱誠一作咸可直書勿為來者所嗤以重朕之不德一作皆本文九疑山記序見八百三十二卷作九疑山圖記元結隨求即得大自在陀羅尼神呪經序任華我本師設教務存饒益㑹因啓聖方有激揚則大梵懷愍念之心如來演神妙之句使無願不滿有求則隨故此經標之為其品題矣夫大自在者天之王陀羅尼者呪之目蓋以慿神呪威力同天王自在且呪有八首除八難也經唯一作惟一軸明一乘也若聽受講誦若書寫帶持即是金剛之身便作如來之眼是知煩惱大海本從妄想中生業障髙山亦因覺悟而破則頸邊瓔珞衣中寶珠未足比其珍矣懿夫能摧他敵不假韓信之登壇能致井雨乃同傅說之作相此則有功於國矣至若火坑成水刀刃為塵毒龍生慈夜叉作禮此則有功於人矣及乎泥犂自苦阿一作河旁驚怪人便生於天上塔猶在於城南此則有功於鬼矣非我有九十九億那由他諸佛同心同德安樂一有人字曷致於此矣粵有雅和尚者誕於中土如從西域而來不讀外書只說東流之法丙午歲訪余於景城西巖之蘭若從容曰此呪有不可思議之力竟無序述謂之何哉華答曰唯然和尚謹聞命矣將欲無垢之呪可驗靜居之言足徵豈獨施於信者亦將悟彼疑者若可信而信信不應疑而疑一無此二字則三途之中不出入此輩略述少言耳亦乃勉㫋諸仁懷素上人草書歌序顔真卿開士懷素僧中之英氣槩通踈性靈豁暢精心草聖積有歲時江嶺之間其名大著故吏部尚書韋公陟覩其筆力朂以有成今禮部侍郎張公渭集作謂賞其不羈引共逰處兼好事者同作歌以讚之動盈卷軸夫草書集作藁之作起於漢代杜度崔瑗始以妙聞逮乎伯英尤擅其美羲獻兹降虞陸相承口訣手授以至於吳郡張旭長史雖恣性顛逸超絶古今而楷法精詳特為真正真卿早歲嘗接逰處集作居屢䝉激勸教以筆法資質劣弱又嬰物務不能勤集作懇習迄用無成追思一言何復可集作可復得忽見師作縱橫不羣迅疾駭人若還舊觀向使師得親承善誘亟揖規模則入室之賔捨子奚適嗟嘆不足聊書以冠諸篇首河南于氏家譜後序于邵序曰邵髙叔祖皇尚書左僕射侍中太子太師燕國定公諱志寧博學多聞狥忠秉直為秦府十八學士其左右庶子不道嘗撰諫苑三十篇唐書作二十卷以諷之凡有文集若干卷於代又述作之外修集家譜其受姓封邑衣冠婚嫁著之譜序亦既備矣歷一百七十餘年家藏一本人人遵守未嘗失墜洎天寶末幽寇叛亂今三十七年頃屬中原失守族類逃難不南馳吳越則北走沙朔或轉死溝壑其誰與知或因兵禍縱橫吊魂無所或道路阻塞不由我歸或田園湮沒無可回顧所以舊譜散落無餘將期㑹同一有經字考集不齊奚疑為修集實難有待今且從邵一房自為數例有若九祖長房今太子小保譙國公頎與邵同升于朝股肱四聖為國元老邵之弟也有若九祖第三房今襄王府録事參軍載與邵同在京列保家履道為宗室長邵之兄也各引才識子弟參定其宜從而審之誰曰不可又以子孫漸多昭穆編次紙幅有量須變前規亦春秋之新意也今請每房分為兩卷其上卷自九祖某公至𤣥孫止為下卷自父考及身已降迭相補注即令邵以皇考工部尚書為下卷之首此其例也且諸房昭穆既同尋而繹之可以明矣後能代習家法述作相因從子及孫從孫及子孫孫子子興復宗祧豈唯兩卷乎將十部而彌盛矣其文公第四子安平公房此疑建平公已上三房衣冠人物全少今與文公第五子齊國公文公第六子華陽公文公第七子平恩公文公第八子襄陽公文公第九子桓州刺史併以六房同為一卷就中第五卷已下子孫皆名位不揚婚姻無地湮沉斷絶寂爾無聞但存舊卷而已後有遇之者知之者以時書之其五祖九祖分今叙在三卷並録之于後時貞元八年歲在壬申八月朔日金紫光祿大夫太子賔客上柱國襲恆山郡開國公于邵述戴氏廣異記序顧况豫欲觀天人之際變化之兆吉凶之源聖有不知神有不測其有干元氣汨五行聖人所以示怪力亂神禮樂刑政著明聖道以紏之故許氏之說天文垂象蓋以示人也說文示字如今文不字儒有不本其意云子不語此大破格言非觀象設教之本也大鈞播氣不滯一方檮杌為黃熊彭生為大豕萇𢎞為碧舒女為泉牛哀為虎黃母為黿一作鱉君子為猿鶴小人為蟲沙武都婦人化為男成都男子化為女周娥殉墓十載却活嬴諜一作姬暴市六日而蘇蜀帝之魂曰杜䳌炎帝之女曰精衛洪荒窈窕莫可紀極古者青烏之相冡墓白澤之窮神姦舜之命䕫以和神湯之問革以語怪音聞魯壁形鏤夏鼎玉牒石記五圖九籥說者紛然故漢文帝召賈誼問鬼神之事夜半前席志怪之士劉子政之列仙葛稚川之神仙王子年之拾遺東方朔之神異張茂先之博物郭子潢一作橫之洞冥顔黃門之稽聖侯君素之精一作旌異其中神奧顧君真誥周氏之冥通而異苑搜神山海之經幽冥之録襄陽之耆舊楚國之先賢風俗所通歲時所記吳興陽羡南越西京注引古今辭標淮海裴松之盛𢎞之陸道瞻等諸家之說蔓延無窮國朝燕梁四公傳唐臨𡨕報記王度古鏡記孔慎言神怪志趙自勤定命録至如李庾成張孝舉之徒互相傳說譙郡戴君孚幽賾最深安道之𦙍若思之後邈為晉僕射逵為吳隱士世濟文雅不隕其名至德初天下肇亂况始與同登一科君自校書終饒州録事參軍時年五十七有文集二十卷此書二十卷用紙一千幅蓋十餘萬言雖景命不融而鏗鏘之韻固可以輔於神明矣二子鉞雍陳其先志泣請父友况得而叙之維摩經略疏序梁肅聖非道不生道非教不明教非人不行是三者相依而住道有大小權實故净明以在家成化人有聖賢淺深故智者以初依啓法然後因言遣言即象忘象俾後學有以得正真之終始二字集作路逰道義之門户集無户字祖而述之存乎其人天台上人二字集作大比丘然公纂智者之法裔集作𦙍探毗耶之妙賾一貫文字之學㑹歸解脫之淵以為昔智者大師之演是經也備偏圓頓漸之義盡方等生蘇之體其㫖逺其道微微言在闕用不惑故常外闡其訓內澄其照凡百學者望崖而歸乃謂門弟子曰祖師所述其道甚著集作大而嗜簡者或病其繁求集作見精者則遺其粗吾欲因而就之以伸其教刪而裁之以存其要何如弟子比邱衆作禮以請公於是削其浮辭闕為十軸不失舊則其義惟明與前部偕行號為净名略疏原夫聖人有以見生生根器之不齊也故用四教五味經而緯之有以見萬法弛張之不殊也故用一道一乘㑹而成之然則聖人隨感以利物集作見故其數不得不差賢哲因感以立誠故其業不得不傳觀其所感則毗耶之與天台杜口之與立言雖偕集作階位不同廣略異冝至於赴機施化其揆一也肅嘗受經於公門逰道於義學之列集無此二字雖鑽仰莫能集作至而嗟嘆不足故序其述作之所以然著乎集作于辭疏成之歲歲在甲辰吾師自晉陵歸于佛龕之夏也陪獨孤常州觀講論語序前人晉陵守河南獨孤公以德行文學為政一年儒術大行與洙泗同風公以為使民悅以從教莫先乎講習括五經英華使夫子微言不絶莫備乎論語於是俾儒者陳生以魯論二十篇於郡學之中率先講授乃季冬月朔公既視政與二三集作一二賔客躬往觀焉已而公遂言曰昔文公用儒變蜀蜀至於魯當大厯初元新被兵饉之苦今御史大夫贊皇李公為是邦愍學道圯闕開此庠序自後俊集作孝秀並興與計偕者歲數十闕之詩起而復廢鄉飲酒之禮廢而復興至于今風闕敦美矣哉仁人之化也摳衣之徒承其波流得不闕誨而厲之又悅以動之朱輪遲遲逮暮而歸士有獲在左右覩公之施教退謂人曰夫四時繼氣而成物仁賢施功而成化是學校也非贊皇不啓非我公不大鼓之以經書潤之以仁義君子得之以修詞立誠小人仰之以遷善逺罪泱泱乎不知所以然以至夫政和而人泰舊史記前召集作邵與召同後杜而南陽移風民到于今稱之矧贊皇植學之本與我公道之以德德則有成而未播於叙述後人謂之何哉鄙不佞謹紀公之雅訓或傳諸好事者云爾通典序杜佑自序附出李翰儒家者流博而寡要勞而少功何哉其患在於習之不精知之不明入而不得其門行而不由其道何以徵之夫五經羣史之書大不過本天地設君臣明十倫五教之義陳政刑賞罰之柄述禮樂制度之統究理亂興亡之由立邦之道盡於此矣非此典者謂之無益代一作世教則聖人不書學者不覽懼人𡨕一作冗煩而無所從也先師宣尼祖述堯舜憲章文武七十子之徒常一無常字宣明大義三代之道百代可師而諸子云云猥復制作由其門則其教已備反其道則其人可誅而學者以多閲為廣見以異端為博聞是非紛然塞胸滿腹鴻一作澒洞茫昧而無條貫或舉其中不知其本原其始不要其終髙談有餘待問則泥雖驅馳百家日誦萬字學彌廣而志彌惑聞愈多而識愈疑此所以勤苦而難成殆非君子進德修業之意也今通典之作昭昭乎其警覺羣迷歟五字一作警學者之羣迷與以為君子致用在乎經邦經邦在乎立事立事在乎師古師古在乎隨時必參今古之冝窮終始之妙始可以度其終一作古古一作終可以行於今問而辨之端如貫珠舉而行之審如中鵠夫然故施於文學可為通儒施於政事可建皇極故採五經羣史上自黃帝至於我唐天寶之末每事以類相從舉其終始一作始終歷代沿革廢置及當時羣士論議得失靡不條載附之于事如人支脉散綴其一作於體凡有八門勒成二百卷號曰通典非聖之書乖聖人微㫖不取焉惡煩雜也事非經世緯俗一作經國禮法程制亦所不録棄無益也若使學者得而觀之不出户知天下未從政達人情罕更事知時變為功易而速為學精而要其道甚直而不徑其文甚詳而不煩推而通放而凖語備而理盡例明而事中舉而措之如指諸掌不假從師聚學而區以别矣非聰明獨見之士孰能修之淮南元戎之佐曰尚書主客郎京兆杜公君卿雅有逺度志於興邦一作邦興篤於一作學好古生而知之以大厯之始實纂斯典纍紀而成杜公亦自為序引各冠篇首或前史有闕申髙見發明以示勸誡用存景行近代學士多有撰集其最著者御覽藝文玉燭之類網羅古今博則博矣然率多文章之事記問之學至於刋列百度緝熙王猷至精至粹其道不雜比於通典非其倫也於戲今之人賤近而貴逺昧微而觀著得之者甚鮮知之者至一作甚稀可以二字一作可為長歎息也翰與杜公數旬探討故頗詳㫖趣而為之序十七字一作翰嘗有斯志約乎舊史圖之不早竟為善𫐠者所先故頗詳㫖趣而為之序庶將來君子知吾道之不誣也一作皆本文杜佑自述序佑少嘗讀書而性且䝉固不逹術數之藝不好章句之學所纂通典實採羣言徵之人事將施有政夫理道之先在乎行教化教化之本在乎足衣食易稱聚人曰財洪範八政一曰食二曰貨管子曰倉廪實知禮節衣食足知榮辱夫子曰既富而且教斯之謂矣夫行教化在乎設職官設職官在乎審官才審官才在乎精選舉制禮以端其序立樂以和其心此先哲王致治之大方也故職官設然後興禮樂焉教化隳然後用刑罰焉列州郡俾分領焉置邊防遏戎狄焉是以食貨為之首十二卷選舉次之六卷職官又次之二十二卷禮又次之一百卷樂又次之七卷刑又次之大刑用甲兵一十五卷其次五刑八卷州郡又次之一十四卷邊防末之一十六卷或覽之者庶知篇第之㫖也本初纂録止於天寶之末其有要須議論者亦便及以後之事魏國公貞元十道録序權德輿序曰自夏書禹貢周官職方漢志地理厥後史臣繼有其書國家將九夷丕冒四海梯航聲教過前古逺甚相國魏公明誠助化育奧學窮古今百揆師長十年樞衡贊端拱無為之風以宥天下王佐盛業論著形焉嘗以為言區域者濶略未備或傳疑失實於是獻海內華夷圖一軸古今郡國縣道四夷述四十卷盡瀛海之地窮鞮譯之詞陳農不獲之書朱贑未條之俗貫穿切劘靡不詳究開卷盡在披圖朗然又撮其要㑹切於今者集作日為貞元十道録四卷其首篇自貞觀初以天下諸州分𨽻十道隨山河江嶺控帶紆直割裂經界而為都㑹在景雲為按蔡在開元為採訪在天寶以州為郡在乾元復郡為州六典地域之差次四方貢賦之名物廢置升降提封險易因時制度皆備于編而又考迹其疆理以正繆集作謬誤採獲其要害而陳開置至若護單于府並馬邑以集作而北理榆林關外冝𨽻河東樂安自乾元後河流改故道冝𨽻河南合川七郡北與隴氐南與庸蜀四逺不相冝應於武都建府以恢邊備凡類是者十有二條制萬方之樞鍵出千古之耳目故今之言地理者稱魏公焉公之意豈徒洽聞廣記以學名家而已哉蓋體國逺馭不出户而知天下親百姓撫四夷真宰相之事也凡今三十一節度十一觀察與防禦經略以守臣稱使一有府字者共五十列于首篇之末其三篇則以十道為凖縣距州州距兩集作西都其書道里之數與其四鄙所抵其事核其言詳閲覽默識精微錯綜斯為至矣德輿忝掖垣之屬承公話言盱衡屈指珠貫氷釋辱命授簡書其大端輒罄斐然之辭用揚不朽之業時貞元壬午歲夏四月謹序李奕登科記序趙傪選士命官有國之大典察言考行先王之舊規古者命於鄉而升於學俾大樂正論造士之秀者而升諸司馬曰進士進士者謂可進而授之爵祿也然則前一作歷代選士其科不一洎聖一作既有唐髙祖以神武靜天下用文教貞萬姓武德五年帝詔有司特以進士為選士之目仍古道也自鄉升縣縣升州州升府皆歷試行藝秋㑹貢於一作于文昌咸達一作造帝庭以光王國然後㑹羣后謁先師備牲牢奏金石尊儒教也若明試其業主張其文核能否於聽覽之間定取舍於筆削之下職在考功郎後至𤣥宗開元二十五年重難其事更命春官小宗伯主之而業文志學之士知勸矣於是獻藝輸能擅場中的者榜第揭出萬人觀之未浹旬而名達四方矣近者佐使外藩司言中禁彈一作峩冠憲府起草粉廊由此與能十恆七八至於一作于能登台階參密命者亦繁有徒所謂選才授爵之髙科求士濫觴之捷徑也不其然歟粵自武德至乎貞元閲崔氏本記前後嗣續者在我公為多焉顧惟寡昧獲與斯文因濡翰而為之序一有十字七年春三月丁亥序一作述文苑英華卷七百三十七
