body:
  text: 文苑英華巻一百宋李昉等編射博奕破的賦一首射楊葉百中賦一首百歩穿楊葉賦一首貫七札賦一首射已之鵠賦一首射中正鵠賦一首棊賦一首握槊賦一首彈棊局賦一首彈棊賦二首戲摴蒱頭賦一首破的賦并序喬潭君子修辭以干禄禄或不至居常以俟命感而遂通抑亦莊生不射故為破的賦以喻其辭曰飛衛學射於逄䝉希其術窮搜董蒲白羽之箭獲燕角緑沉之弓悵望隴雲徘徊朔風以為隼必獲於墉上雀無全於彀中或曰人将觀徳子盍呈功乃見於諸侯諸侯閲之州序獻於天子臨乎澤宫自上而一作两下陳其比偶歌騶虞奏貍首其或少筭從而進酒於是乎擇素士張畫侯韜朱膊捍韋韝既垂櫜以弦弧亦啓箙而抽鏃内審其志外専其目釋思其平去務其速落殘月於象弭飛明星於金菆宜易易而獲禽飜兢兢而失鵠師哂之曰殆矣王庭之賔胡為先利其噐而不反求其身乃杜門三年猶乎家人聴之以氣視之以神秋毫如山虱心如輪髙其小物申以嵗貢從容君所無復命中不知矢之所加弦之所控不知一無此二字引之而滿縱之而送以無心為心若夣不夣斯疑焉而發遽騞然而通洞洞之者是為中的中之者細若毫芒乃能匪左匪右不留不揚絶心乎後一作絶乎心後後疑作繫牢落判散亦何有四方是時也君子觀之貴其得一小人視之多其中質九賔之衆毛竪骨驚隂幽鬼神股戰頥慄固可使朝肅慎面先零變幽都柔南溟至逺無外罔不來庭夫以有形之器猶能破的况天機為弧大直為矢而不能破其夷狄故事無矜功理在冥跡不射乃師之益吾将為益射楊葉百中賦以藝通於神動不虚𤼵為韻何據於稽百氏爰得六藝射之制伎之銳既取象於逄䝉且規模於飛衛寝石遇而洞啓蹲甲徹而激藝疑作勢於是眄牂牂之葉引觪觪之弓撥長弰而累氣慮輕葉之摇風心與手兮冥合神與術兮𤣥同標的外凖精和内融杯水凝而色粲粲金鏑擬而光雄雄亦既縱横鳴弦激羽馳虛走空栁雖大忘於所志之外葉雖小舎之必取其中力不屈道必通牢籠五善之奥摠括百中之工時稱絶技寔曰巧發貴乎揖譲賤乎矜伐豈直忘歸貫星繁弱御月鴈迸落於雲霄猿洞呌於岩樾而已哉客有覩之而歎曰弧矢之利器之惟新而彼審鵠為美曷若中葉可珍衆謂之葉我視如輪㕘於靈妙逹於鬼神飛後鏃而挺出劃前括而相循養叔之復一矢顔髙之持六鈞庸麗一作儷景而同塵此射禮所以冝爾射善所以温如其發也不虛慎於末善厥初用弓猶有勁楊葉碎無餘不見於動不三字官韻百歩穿楊葉賦以藝精意専發必能中為韻賈餗有羙一人兮操其矢獻其藝發兹手敏與彼心契廣塲爰設砥平乎百歩之中一作外衆目所瞻星流乎片葉之際恒規規而月滿乍肅肅而風厲是時也固當審毫釐分巨細槁木斯立自應徃昔之無貫珠而來孰謂後難為繼豈非妙歸至習道合惟精積少之多而無失以小觀大而有程克中之時􅀈詬荘子作喫詬喫口觧切多力也不能以施力造㣲之處離婁不得以争明不然則一矢之短寧期乎必至一葉之㣲若有乎餘地諒有開而必先故無徃而不利然後知射也捨耳而任目外形而専意出乎一札焉知來者之不如中乃百全勿慮前功之併棄且夫禀絶倫之伎當明試之前為衆所推發不可不中冀君所賞情不可不専由是捨矢而破固葉是穿翻光而白雪馳羽振響而清風激弦名加徹札術異攻堅非後來之居上信直道而無偏夫然則習藝者不得暫閱控弦者不可不發弦不發則吾何以述藝不修則爾亦無必安得窮五善之妙出百夫之能積時之功且棄必獲之羙徒稱嗟夫一作乎今之習射則多選才斯衆若穿楊葉者曠千載而一中貫七札賦以心平體正徹彼堅剛為韻楊宏貞善乎養由之為弓也挾穿楊之技推貫金之誠左烏號兮右青莖睨七属之甲收百中之名神馳手敏體正心平始則一以貫之將疊雙不息終則迭於徑也俾合七而成頴脫洞逹鱗差混并旁穿而雀角非勁深入而䖟飛有聲一有觀字夫蹲蛟函彀象弭量歩逺邇廻眸徙倚指鏘鏘之練取中於茲狀纍纍之珠其端若彼驀六以進吾無間然吞八之名我異於是是知弦木之出貫革為先出一札而鋒鋩自利踰百歩而犀兕無全虛其中螳螂之衛徒設稽其數混沌之竅齊穿豈徒激白羽開月弦俾晋侯之禽自失漢將之石彌堅且鞬櫜既啓羙六材之定體决拾將臨矜壹發於巧心是誇妙捷豈憚重深疑疊翮之摧頺猶驚飲羽類逄疑作縫裳之襞積尚謂紉針夫弓以火而勁其徹得火之正故將笑函人之仁掩矍相之盛俾帶甲之士知皮之不存在引弓之人則心莫能競故稱矢無虛發藝得専塲考窮深之冝我將用直探破堅之理爾則乗剛方今寰海鏡清皇明朗徹澤宫是選貍首為節望正鵠以進一作振旅奉弧矢之成列然後徹札之人庻騐其工拙射已之鵠賦以審諸已而後能中為韻張友正習射之妙惟精惟審其審也在無偏無頗其精也在不食不寢是則動之不虛由已求諸三侯張而六鈞始彀一鵠中而百發如初月滿指掌星飛庭除已因鵠修其徳惟積鵠為已任其射寧踈志氣中叙威儀外舒正其身而有則有凖合其奏而匪疾匪徐原夫彼鵠父射為父子射為子並列其名各承其羙假以成績修之在已射不應而有善誰觀藝不臻而有時奚俟専功繹志每歎於流年時中成人敢忘其寸晷以此懷之常憂殆而日月既徃弧矢既持心超超兮有嵗魂怳怳兮無時非不慎乎規矩逮恐失於毫釐周旋可託進退唯茲鏃破的兮流光散出弦應手兮飛羽相追寔此鵠之是念唯彼侯之敢思立則惟心成因在手且一控而一發亦何先而何後舎意雖晩和容已乆喜滿勢而暫疑維媿直弦之屢受若乃旌竿並舉侯狀皆升曉露中滴晴光上凝觀武於茲可明七徳之要取才於彼亦彰一藝之能以其獨弄旁觀者衆豈比夫啼猿散繞飛鴈䨇中儻射已鵠之可稱冀鳴弦而再控射中正鵠賦以諸侯立戒衆士知訓為韻白居易聖人弦木為弧剡木為矢惟弧矢之用也中正鵠而已矣是謂武之經禮之紀故王者務以選諸侯諸侯用而貢多士將俾乎禮無秕稗位有降殺廣塲闢而堵牆開射夫同而鐘皷戒於一作有以致國用修嵗貢使技癢者出於羣藝成者推於衆在乎矢不虛發弓不再控射繹志也信念茲而在茲鵠小鳥焉取難中而能中乃設五正張三侯叶吉日於清晝順殺氣於素秋禮事展樂容修既五善而斯備將百中而是求於是誠心内藴壯一作莊容外奮升降揖讓合君子之令儀進退周旋仰一作伸先王之彛訓故禮舉而義具一作立且無聲而有聞一作問及夫觀者坌入射者挺立矢既挾弓既執抗大侯次决拾指正則掌内必取料鵠乃彀中所及雕弧乍滿當晝而明月彎彎銀鏑忽一作急飛不夜而流星熠熠其一發也騞若徹札其再中也􅚹如貫笠玉霜降而弓力凋金氣一作風勁而弦聲急愜羣心而踴躍駭衆目而翕習若然者安知不能空彎而鴈落虗引而猿泣者也矧乃正其色温如洒如逰於藝匪疾匪徐妙能曲盡勇而一作可賈餘豈不以志正形直心莊體舒不出正兮信得禮之大者無失鵠也豈反身而求諸斯盖弓矢合規容止有儀必氣盈而神正寧心讋而力疲則知善射者在乎合禮合樂不必乎飲羽在乎和容和志不必乎主皮夫如是則射之禮射之義雖百代而可知凡一作皆文集似不及古本謂如詩有聞無聲聞雖訓問而集本不應徑改為問其他大率類此棊賦呉大江竒謀入妙巧思叅𤣥雖一枰之可羙起三隅而邈然似將軍之出塞若猛士之臨邊及其進也則鳥集雲布陳合兵連或參差而易决或齟齬而難便開馬眼以防後張虎口而遮前磊磊似玉石之相飾粲粲若衆星之麗天爾其深思逺慮知白守黒以仁義為反道用譎詭為明德或意在東南而偽擊西北類行藏之通變同隂陽之不測於是且侵且戰不恃疑不平鴈行絡繹魚陣縱横寧扶危以救死不貪敗以䘮生或偏攻於略地或専命於用兵或轆轤以成劫或宛轉而入征雖勞形而竭思固難得以言名及夫雌雄有决疑多勝寡心悠揚而不定心沉吟而未下名不可竊智不可假千慮萬計復何為者行必量力動則相時其措意也屢巧其適變也多姿既得之者榮失之者辱此餘而未已彼懐而詎足馳神不竭應運無窮勢出心外命懸手中圍初開而復閉路欲塞而不通伊仁智之可翫豈造化之為功使夫離婁䘮睹𨽻首迷術公子罷宴而驚視樵客入山而忘出握槊賦并序邢紹宗握槊今人為疑作謂之長行也斯博奕之徒與觀其進退遲速雖存於大體因時適變必務於權興疑作輿施之於人可以義存賦曰夫何一枰之内兮而取之多端六藝之外兮其為功乎實難張四維則地理攸載背兩目則天文可觀不可飾於丹漆寧假貴於琅玕物以羣分故𤣥黄而不雜鬬必遇敵惟蚌鷸其何懽彼千變之奚凖任雙頭之所安遂使象牙在手駿骨登盤為無竅之湏鑿故非龜而見鑚且其廣凡幾分數不過六參差宛轉循環反覆不能者敗而成患故能者養之取福則掎角相持首尾俱蹙形同楚漢氣陵賁育收七縱之竒功在一擲於餘掬或撫䏶而驚眄或聳身而助速似臨敵之旗皷同在師之耳目率成是而敗非類吉凶之倚伏多廻君子之慮以實小人之腹爾乃啓行前指要然自能輕彼䇿之無筭謂我謀之足徴豈知夫否終則傾道非假易持不競之㣲力乗驟勝之遺累閉六關而不通因一子而為質乃欲速而賈害翻後世疑而獲利無以慿陵而顦顇無将徃蹇而自棄實反掌而變生亦隨手而時異至若幽人欲寡智士謀深不蕩其一作乎志以平其心非獨巧於徃遂移情於今是知行必有恒事思不乆亹亹終一作經略循循善誘或欲退而徑前或謀疾而居後雖有敵而必應固無險而不走或用壯而可攻或示羸而難扣不幸災以矜伐每終吉而何咎雖小道而可觀彼多詐而焉有其故柔匪及懦勇必兼㫁聚或一旅分為數叚始霧委而雲集忽風觧以氷泮皆應物以巻舒亦從冝而合散雖觸類而則長維吾道之攸貫足明夫正而不譎取又非貪全同坐隱期為手談必由理勝豈非言甘雖小失其奚爽亦大來而莫慙然則終多䘮志吁嗟士兮不躭彈棊局賦閻伯璵西南之羙有華山之礦一作石焉底貢之珍有荆山之象齒焉於是工人創器軌物備叙豐腹上圓頽根下矩慿陵衡隧掬筭師旅發蹏一作號啓行兵綦迭舉赴縱奔電影亂飄風左掎右角為梟為雄易心而行俟釁而動奮以武怒賈其餘勇作威以襲敵厭陣以承權建瓴桓桓謂戎馬之旋路長斜矯矯猶翰音之發疑作登天耻交綏而退旅尚彼廢而我全侔射隼以藏噐眷得魚以忘筌惴惴將頺識成敗之亹亹纍纍不絶嘆𤓰瓞之綿綿始收功而隔澗終制敵以縁邊原夫粲若星離偃如雲岸映垂奩而黻合拂轉巾於霧散示之以弱效羸師以設疑謀之其臧象觀兵以静亂克乃因於通理敗不由乎强幹或應為而不為或當㫁而不㫁鄙夫遘戰而未非智者見機而已嘆連連搏漢必成其鴈行歴歴登壠何異乎魚貫愧逃疑政以周流慙不競於奔竄諒棲遲以保險仍卼臲而長歎良工飾法以修身小人耻射以作翫鍳炯誡於博奕吾是以箴之藻翰彈棊賦盧諭惟古人之衆技必有託而觀智既垂誡以為喻故求能而不累見小人矜捷之迹識君子安全之義孰謂猶賢在於兹戲觀乎局之為狀也下方廣以法地上圎髙以象天起而能伏危而不懸四隅咸舉四逹無偏居中謂之豐腹在末謂之縁邊棊之為數也各一十二彚其始布也各以其類乃分其位環合相承櫛比為次其始作也則云其宻未之為難乃契謀衆指意或多端欲因先以獲勝恐致危以思安每遇敵其増惕故用之而假歡則有飛迅一繫一作擊紛紜俱散慮加少以為多實思危而不亂謀而後動審而方按或始否而終亨或先傾而後歎若乃臨邊却舞徑天廽越必在知機之㣲騁異而發至如垂空勁徃應心得雋雖具羙於踰平終易虧於履峻是知冒險者忘於趨進規利者失於戒慎豈與夫所適多方所求唯順因其利不失於得追其逺若歸於信乍從容以周旋時倐忽於一瞬伊衆趣之無極諒所戒以唯貪苟能知其義者無棄學而假躭第二張廷珪其為局也不徴荆山之璞不用藍田之質兀若𤣥龜之起爛若繁星之出約勝負仗明信但分類而抗行咸背深而列陣唯智是役唯貪是慎敗不同奔闘不齊進曉之者敵衆多以寡少懵之者起徑寸猶萬仭徒觀其彈射萬變精妙入神口與心計行隨意新作氣者博疑作搏乎九天之上猶檀欒而旁擊受敵者横墜乎九地之下甘棄置而歸仁行必假道居必擇鄰衝危以䧟其兩虎陪疑險更生乎一秦至若狂生俠少使氣為主顧懷將恡動越規矩競縁局而斜衡争隔矢而曲取既向角而散亂復當中而攅聚苟萬一之偶中何輕狡之云數曷若恬和之士神清意逺豈棊布而興來亦手運而情遣先和容而取則兼中敵而為善務専一於道求寧苟貪於席巻或聊假以喻大或有迷而知返夫局勢將畢觀者逾樂兩敵相持三顧而作劃去者箭飛分索者星落眄四隅之豁然若萬里之清廓戲摴蒱頭賦以酒酣舉白為韻薛恁在衆藝兮所尚伊摴蒱兮自乆招邯鄲少年命諸葛新友分曹列席促罇舉酒猶賢博奕將取適於觧頥乃貴先鳴故决争於逰手終日莫閒連宵戰酣不㧞其旗且背城而借一并兼是視豈分土之惟三瞋目賈勇危冠竟疑作竸貪鑒座中之奔北為席上之司南然用之斯行捨之斯去老氏以訓人立範莊生以亡羊是舉佐歡有則任物有叙既無我以推移每隨之以處所别有膏粱之子縉紳之客時為此物以代支䇿初一擬而純盧忽連呼而成白相顧則笑泯然無隙請傾耳側目看後來之一擲文苑英華巻一百
