body:
  text: 文苑英華卷一百九十九宋李昉等編樂府八從軍行四十三首古悔從軍行一首從軍有苦樂行一首軍中行一首從軍行二首梁簡文帝雲中亭嶂一作障羽檄驚甘泉烽火夜深一作通夜明二師將軍新築營嫖姚校尉初出征復有山西將絶世受一作愛雄名三門應遁甲五壘學神兵白雲隨陳一作斾色蒼山答鼓聲先平小月障却滅大宛城善馬還長樂黃金付水衡小婦趙人能鼓瑟侍婢初笄解鄭聲迤邐觀鵝翼參差覩鴈行庭前柳花一作桃花又作柳絮飛欲合必應紅粧起見一作來起迎二二師惜善馬樓蘭貪愛財前年平一作出右地今嵗討輪臺魚雲望旗聚龍沙隨陳開氷城朝浴鐡地道夜䘖枚將軍號令密天子璽書催何時反舊里遙見下機來同前梁元帝寶劔飾龍烟長虹畫彩旃山虛和鐃管水靜㵼樓船連雞隨火度燧象帶烽然洞庭曉風急瀟湘夜月圓荀令多文藻臨戎賦雅篇同前蕭子雲一作顯左角名王侵漢邊輕薄家子一作良家惡少年縱橫向沮澤凌厲取沙田黃塵不見景飛蓬恆滿天邀功封浞野竊寵拜一作却祁連春風春月將進酒妖姬舞女亂君前同前劉孝儀冠軍輕俠射長平自解一作合圍木落雕弓燥氣秋征馬肥賢王皆屈膝幕府復申威何為從軍樂往還速如飛同前沈約惜哉征夫子憂恨良獨多浮天出鯷海束馬渡交河雪縈九折嶝風卷集作風堅萬里波維舟無夕島秣驥乏年莎凌濤富驚沫援木闕垂蘿江颸鳴疊嶼流雲照層阿𤣥埃晦朔馬白日照吳戈寢興動征怨寤寐起還歌晨裝豈輟驚夕疊一作夕壘詎淹和苦哉逺征人悲矣將如何同前戴皓樂府作吳均長安夜刺閨夜警投刺於門下胡騎犯一作白銅鞮詔書發隴右召募取關西劔懸三尺鞘鎧纍七重犀督軍鳴戰鼓逴夜數更鞞侵星向柳塞際暗入榆溪秦涇含藥鴆晉火逐飛雞逼泉開一作通地道望敵竪雲梯隂山日不暮一作著長城風自凄弓寒折錦􅀈七入反字林云雜錦錦􅀈以被弓馬凍滑斜蹄燕旗竿上脆羌吹一作笛管中嘶登山成一作試下趙慿軾且平齊當令函谷上唯用一丸泥同前二首張正見胡兵屯薊北漢將起山西故人輕百戰聊欲定三齊風前噴畫角雲上舞飛梯鴈塞秋聲逺龍沙雲路迷燕然自可勒函谷詎須泥二將軍定朔邊刁斗出祁連髙柳橫絶塞長榆接逺天井泉含凍碣烽火照山燃欲知客心斷危旌萬里懸同前二首王褒兵書久間習征戰數曽經講戎平樂觀學戲一作覽獻羽林亭西征度踈勒東驅出井陘牧馬濵長渭營軍毒上涇平雲如陳色半月類城形羽書封信璽詔使動流星對岸流沙白緣河柳色青將幕恆臨斗旌門常背刑勳封瀚海石功勒燕然銘兵勢因麾下軍圖送掖庭誰憐下玉筯向幕掩金屏二黃河流水急驄馬送征人谷望河陽縣橋渡小平津惡少年一作多遊俠結客好輕身代風愁櫪馬胡霜宜角筋羽書勞警急邊鞍倦苦辛康居因漢使盧龍有一作稱魏臣荒戍唯看柳邊城不識春男兒重意氣無為羞賤貧同前庾信河圖論陳氣金匱辨星文地中聞鼓角天上下將軍函犀恆七屬絡鐡本千羣飛梯聊度絳合弩暫凌汾冦陳先中斷妖營即兩分連烽對嶺度嘶馬隔河聞箭飛如疾雨城崩似壞雲英王於此戰何用武安君同前周趙王遼東烽火照甘泉薊北庭障接燕然水凍菖蒲未生節關寒榆莢一作葉不成錢同前盧思道朔方烽火照甘泉長安飛將出祁連犀渠玉劔良家子白馬金羈一作鞍俠少年平明偃月屯右地薄暮魚麗逐左賢谷中石虎經銜箭山上金人曽祭天天涯一去無窮已薊門迢遞三千里朝見馬嶺黃沙合夕望龍城陳雲起庭中竒樹已堪攀塞外征人殊未還白雪初下天山外浮雲直上一作向五原關一作間關山萬里不可越誰能坐對芳菲月流水本自斷人腸堅氷舊來傷馬骨邊庭節物與華異冬霰秋霜春不歇長風蕭蕭度水來歸鴈連連映天沒從軍行從軍萬里出龍庭單于渭橋今已拜將軍何處覔功名同前明餘慶三邊烽亂警十里且橫行風卷常山陳笳喧細柳營劔花寒不落弓月曉逾明㑹取淮南地持一作特作朔方城同前三首虞世南塗山烽候警弭節度龍城冀馬樓蘭將燕犀上谷兵劔寒花不落弓曉月逾明凛凜嚴霜節氷壯黃河絶蔽日卷征蓬浮天散飛雪全兵值月滿精騎乘膠折結髮早驅馳辛苦事旌一作旄麾馬凍重關冷輪摧九折危獨有山西將年年屬數竒二爟一作烽火發金徽連營出武威孤城寒雪起絶陳虜塵飛俠客吸龍劔惡少縵胡衣朝摩骨都壘夜解谷蠡圍蕭關逺無極蒲海廣難依沙鐙離旌斷晴川候馬歸交河梁已畢燕山斾欲飛一作施方知萬里相侯服見一作有光輝同前楊炯烽火照西京心中自不平牙璋辭鳳闕鐡騎繞龍城雪暗凋旗畫風多雜鼓聲寧為百夫長勝作一書生同前駱賔王平生一顧重一作念意氣溢三軍野日分戈影天星合劔文弓弦抱漢月馬足踐胡塵不求生入塞唯留死報君同前西征軍行遇風崔融北風卷塵沙左右不相識颯颯吹萬里昏昏同一色馬煩莫敢進人怠未遑食草木春更悲天景畫相匿夙齡慕忠勇雅尚存孤直覽史懷浸驕讀詩歎孔棘及茲戎旅地忝從書記職兵氣騰百荒軍聲動四極坐覺威靈逺行看氛祲息愚臣何以料倚馬申微力同前前人穹廬殺氣亂金方五將神兵下玉堂天子旌旗過細柳胸奴運數盡枯楊關頭落月橫西夜塞下凝雲斷地荒漠漠邊塵飛衆鳥昏昏朔氣聚羣羊依稀蜀杖迷新竹髣佛胡麻識故桑臨海舊來聞驃騎尋河本自有中郎坐看戰壁為平土近侍軍營作破羌同前喬知之南庭結白露北風掃黃葉此時鴻鴈來驚鳴催思妾曲房理針線平砧搗文練鴛綺裁易成龍鄉信難見窈窕九重閨寂寞十年啼紗忩白雲宿羅幌月光棲雲月曉微微愁思流黃機玉霜凍珠履金吹薄羅衣漢家已得地君去將何事宛轉結蠶書寂寥無鴈使平生荷恩信本為容華進况復落紅顔蟬聲催緑鬢同前劉希夷秋天風颯颯一作秋風來瑟瑟羣胡馬行疾嚴城晝不開伏兵暗相失天子廟堂拜將軍凶門出紛紛晉一作洛陽道一作伊洛間戎馬幾萬匹軍門壓黃河兵氣衝白日平生懷伏劔慷慨即投筆南登漢月孤北走代一作燕雲密近取韓彭計早知孫吳術丈夫清萬里誰能掃一室同前王寵兒生三日掌上珠燕頷猿肱穠李膚十五學劔北擊胡羌歌燕筑送城隅城隅路接伊川驛河陽渡頭邯鄲陌可憐少年把手時黃鳥雙飛一作雙雙黎花白秦皇築城三千里西自臨洮東遼水山邊疊疊一作壘黑雲飛海畔莓莓青草死從來戰鬭不求勳殺身為君君不聞鳳凰樓上吹急管落日徘徊腸先斷同前賀潮清朔風乘月冦邊城軍書插羽刺一作賜中京天子金壇拜飛將單于玉塞振佳兵騎射先鳴推任俠龍韜决勝佇時英聞有河書客愔愔理帷帟常山啓霸圖泥水先天策銜珠浴鐡向桑乾疊旗膏劔指烏丸鳴雞已報關山曉來鴈遙傳沙塞寒直為甘心從苦節隴頭流水長嗚咽邊樹蕭蕭不覺春天山漠漠長飛雪魚麗陳接雲塞平鴈翼營通海月明始看晉幕飛鵝入旋聞齊壘鳴鳥一作烏聲自從一戍燕支山春光幾度晉陽關金河未轉青絲騎玉筯應啼紅粉顔鴻歸燕相續池邊芳未緑已見氛一作氣清細柳營莫更春歌落梅曲烽沉竈減靜邊亭海晏山空肅已寧行望鳳京旋凱捷重來麟閣畫丹青同前王維吹角動行人喧喧行人起笳應一作悲馬嘶亂爭渡金河水日暮沙漠垂力戰一作戰聲煙塵裏盡繫番王頸歸來報天子同前李昂漢家未得燕支山征戍年年沙朔間塞下長駐流血馬雲中恆聞一作閉玉門關隂山瀚海千萬里此日桑河凍流水稽洛山邊胡騎來漁陽戍裏烽煙起長途羽檄何相望天子按劔思北方羽林練士拭金甲將軍校戰出玉堂幽凌異域風煙改亭嶂連連古今在夜聞鴻鴈南渡河曉望旌旗北臨海塞沙飛淅瀝遙裔連窮蹟𤣥漠雲平初合陳西山月出聞鳴鏑城南百戰多辛苦路旁死臥黃沙人戎衣不脫隨霜雪汗馬䟃𧽼長被鐡楊葉樓中不寄書蓮花劔上空流血胸奴未滅不言家駐逐行行邊徼賖歸心海外是明月别思天邊夢落花落花回望何悠悠芳樹無來渡隴頭春雲不變陽關雪桑葉先知胡地秋田疇不賣盧龍策竇憲思勒燕然石麾兵靜北垂日照交河湄欲令塞上無干戚㑹待單于繫頸時同前崔國輔塞北胡霜下營州索兵救夜間一作夜夜偷道行將軍馬亦瘦刀光照塞月陳色明如晝傳聞賊滿山已共前鋒鬭同前王昌齡關城榆葉早踈黃日暮雲沙古戰場表請回軍掩塵骨莫教兵士哭龍荒同前四首劉長卿回看虜騎合城下漢兵稀白刃兩相向黃雲愁不飛手中無尺鐡徒欲穿一作突長圍二草枯秋塞上望見漁陽郭胡馬嘶一聲漢兵淚雙落誰為吮癰者此事今人薄三目極鴈門道青青邊草春一身事征戰匹馬同苦辛一作辛勤末路成白首功歸天下人四黃沙一萬里白首無人憐報國劔已折歸鄉身幸全單于古臺下邊色寒蒼然同前三首李約看圖間教陳畫地靜論邊烏壘天西戍鷹姿塞上川路長唯算月一作須算日書逺每題年無復生還望翻思未别前二柵壕一作髙三靣鬭箭盡舉烽頻營柳和煙暮關榆帶雪春邊城多老將磧路少歸人殺盡金一作㸃盡三河卒年年添塞塵三堠火起雕與鵰同城塵沙擁戰聲遊軍藏漢幟降騎說蕃情霜落􅀈沱一作淲池淺秋深太白明嫖姚方虎視不覺說一作請添兵同前杜顔秋草馬蹄輕角弓持弦急去為龍城候正值胡兵襲軍氣橫大荒戰酣日將入長風金鼓動白露一作霧鐡衣濕四起愁邊聲南轅時佇立斷蓬孤自轉寒鴈飛相及萬里雲沙漲平川一作路平氷霰澀夜聞漢使歸獨向刀環泣同前盧綸二十在邊城軍中得勇名卷旗爭集作收敗馬占一作斫磧護集作擁殘兵覆陳烏鳶起燒山草木鳴集作明塞閒思遠獵師老厭分營雪嶺無人跡氷河足集作有鴈聲李陵甘此沒惆悵漢公卿同前釋皎然候騎出紛紛元戎霍冠軍漢鼙秋􅀈地羌火晝燒雲一里戍一作萬里戍城合三邊羽檄分烏孫驅不一作未盡肯顧遼陽勳同前三首姚合朝朝十指痛唯署㸃兵符貧賤依前在顛狂一半無身慙山友棄膽賴酒杯扶誰道從軍樂春來鑷白鬚二每日尋兵籍經年集作時别酒徒眼疼長不校肺病且還無僮僕驚衣窄親情覺語粗幾時得歸去依舊作山夫三濫得進士名才用苦不長性僻藝亦獨十年作詩引章六義雖粗成名字猶未揚將軍俯招引遣脫儒衣裳常恐虛受恩不慣一作能把刀鎗又無遠籌略坐使虜滅亡昨來發兵師各各赴戰場顧我同老弱不得隨戎行丈夫生世間職分貴所當從軍不出門豈異病在牀誰不戀其家其家無風霜鷹鶻念搏擊豈貴食滿腸同前王貞白從軍集作從事朔方久未省用干戈祗以恩信及自然遠塞和邊聲動白草燒色入枯河每度因看獵令人勇氣多古悔從軍行憶昔仗孤劔十年從軍威論兵親玉帳逐虜過金微隴水秋先凍關雲漢一作寒不飛辛勤功業在麟閣志猶集作多違從軍有苦樂行李益勞者且莫一作勿歌我欲歌送一作送君觴行一作從軍有苦樂此曲樂未央僕居在一作本居又作本起隴上隴水斷人腸東過秦宫路宫路入咸陽時逢漢帝出諫獵至長楊詎馳遊俠窟非結少年場一旦承嘉惠輕身一作命重恩光秉筆參帷帟從軍至朔方邊馬一作地多隂風草木自凄凉斷絶西海一作海雲去出沒胡沙長參差引鴈翼隱轔騰軍裝劔文夜如水馬汗凉一作凍成霜使一作狹氣五都少矜功六郡良山河起目前睚眦死路傍北逐驅種一作獯虜西臨復舊疆昔還鮮餘資今出乃贏糧一矢韜一作㢰夏服我弓不再張寄語丈夫雄苦樂身自當文苑英華卷一百九十九
