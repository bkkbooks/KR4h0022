body:
  text: 文苑英華巻二百十宋李昉等編樂府十九臨髙臺八首登髙臺一首上之回五首釣竿篇四首箜篌謡二首箜篌引二首公無渡河四首苦熱十二首苦寒六首猛虎行四首臨髙臺梁簡文帝髙臺半行雲望望不可一作髙不極草樹無參差山河同一色髣髴洛陽道道逺難可一作别識玉階故人情一作情人情來苦一作共相憶同前張正見層臺邇清漢出逈架重棼飛棟臨黄鶴髙牕度白雲風前朱幔一作幌色霞處綺䟽分此中多怨曲地逺詎能聞同前沈約髙臺不可望逺望使人愁連山無斷絶河水復悠悠所思竟一作愛何在洛陽南陌頭可望不可見一作至何用觧人愁同前蕭慤崇臺髙百尺逈出望仙宫畫棋浮朝氣飛梁照晩虹小衫飄霧縠艶粉拂輕紅笙吹汶陽篠琴奏嶧山桐舞逐飛龍引花随少女風臨春今若此極宴豈無窮同前禇亮髙臺暫俯臨飛翼聳輕音浮光随日度漾影逐波深廻瞰周平野開懐暢逺衿一作襟獨此三休上還傷千里心同前王勃臨髙臺髙臺迢遰絶浮埃瑶軒綺構何崔嵬鸞歌鳳吹清且哀俯瞰長安道萋萋御溝草斜對甘泉路蒼蒼茂林樹髙臺四望同帝鄉佳氣欝葱葱紫閣丹樓紛照耀璧房錦殿相玲瓏東彌長樂觀西指未央宫赤城映朝日緑樹摇春風旗亭百隧開一作間新市甲第千甍分戚里朱輪翠盖不勝春疊樹層楹相對起復有青樓大道中繡户文窓雕綺櫳錦衣晝不襞羅帷夕未空歌屏朝掩翠粧鏡晩窺紅為吾安寳髻蛾眉罷花叢狹路塵間黯將暮雲開月色明如素鴛鴦池上兩兩飛鳳凰樓下雙雙度物色正如此佳期那不顧銀鞍繡轂盛繁華可憐今夜宿倡家倡家少婦不須顰東園桃李片時春君看舊日髙臺處栢梁銅雀尚一作生黄塵同前沈佺期髙臺臨廣陌車馬紛相續廻首思舊郷雲山亂心曲逺望河流緩周看原野緑向夕林鳥還憂來飛景促同前王易從漢主事祁連良人在髙闕空臺寂已暮愁坐變容髪汎艶春幌風徘徊秋户月可憐軍書斷空使流芳歇登髙臺王僧孺試出金華殿聊登銅雀臺九路平如掌一作砥千門乗晩一作洞已開軒車映日至一作過簫管逐風來若非邯鄲美便是洛陽才上之回蕭慤發軔城西疇廻輿事北遊山寒石道凍葉下故宫秋朔路傳清警邉風巻畫旒嵗餘巡省畢按節一作擁仗返皇州同前陳子良承平重遊樂詔蹕上之回属車響流水清笳轉落梅嶺雲盖道轉巗花映綬開下輦便髙宴何如在瑶臺同前盧照隣回中道路險蕭關烽候多五營屯右一作北地萬乗出西河單于拜玉璽天子按琱戈振旅汾川曲秋風横大歌同前沈佺期制書下闕右天子問回中壇墠經過逺威儀侍從雄黄麾摇晝日青幰曵松風廻望甘泉道龍山隠漢宫同前李白三十六離宫樓臺與天通閣道歩行月美人愁烟空恩踈寵不及桃李傷春風滛樂意何極金輿向回中萬乗出黄道千旗揚綵虹前軍細栁北後騎甘泉東豈問渭川老寧邀襄野童但慕一作秋暮瑶池宴歸來樂未窮釣竿篇劉孝綽釣舟畫彩鷁漁子服氷紈金轄茱萸網銀鈎翡翠竿促棹一作歛橈随水脉急艇渡江湍一作急漿渡沙湍湍長自不亂前浦有佳期船交橈一作棹影合浦深魚出遲荷根時觸餌菱芒乍罥絲蓮度江南手衣渝京兆眉埀竿自有一作未樂誰能為太師同前張正見結宇長江側垂釣渡一作鈎廣川潯竹竿横翡翠桂髄擲黄金人來戱一作水鳥沒檝渡岸花沉蓮摇見魚近綸盡覺潭深渭水終須卜滄浪徒自吟空嗟一作明芳餌下獨見有貪心同前李巨仁潺湲靣江海滉瀁瞩波瀾不惜黄金餌惟憐翡翠竿斜綸控急水定檝下飛湍潭廻風來易川長霧歇難寄言朝市客滄浪徒自安同前劉孝威試持𤣥渚釣暫罷池陽獵翠羽飾長綸藻花裝小艓鈎利斷蓴絲㠶舉牽菱葉聊載前魚童還看後舟妾箜篌謡前人結交在相得骨肉何必親甘言無忠實世薄多蘓秦從風暫靡草富貴上昇人一作真不見髙巔樹摧折下為薪豈甘一作目睹井中泥時至出作塵同前李白攀天莫登龍走山莫騎虎貴賤結交心不移惟有嚴陵及光武周公稱大聖管蔡寧相容漢謡一斗粟不與淮南舂兄弟尚路人一作行路吾心安所從他人方寸間山海㡬千重輕言托朋友對靣九疑峰多花必早落桃李不如松管鮑乆已亡一作死何人繼其蹤箜篌引又曰公無渡河李賀公乎公乎提一作携壺將焉如屈平沉湘不足慕徐衍一作羡入海誠為愚公乎公乎牀有筦席盤有魚北里有賢兄東隣有小姑隴畆油油黍與葫瓦瓶濁醪蟻浮浮黍可食醪可飲公乎公乎其一作可奈居被髮奔流竟何如賢兄小姑哭嗚嗚此詩三百三十五巻重出今已削去李憑箜篌引李賀吴絲蜀桐張髙秋空白凝雲頽不流湘娥啼竹素女愁李慿中國彈箜篌崑山玉碎鳳凰呌芙蓉泣露香蘭一作蘭香笑十二門前融冷光二十三弦動紫篁一作皇女媧鍊石補天處石破天驚逗秋雨夣入神山教神嫗老魚跳波瘦蛟舞吴質不眠倚桂樹露脚斜飛濕寒兎公無渡河劉孝威請公無渡河河廣風威厲檣偃落金烏舟傾沒犀枻紺盖空嚴祠白馬徒牲祭銜石傷寡心崩城掩孀袂劍飛猶共水魂沉魄俱逝君為川后臣一作神妾作江妃娣同前張正見金堤分一作紅錦䌫白馬渡蓮舟風嚴歌響絶浪急一作湧榜人愁棹折桃花水㠶横竹箭流何言沉璧處千載偶陽侯同前李白黄河西來決崑崙咆哮萬里觸龍門波滔天堯咨嗟大禹理百川兒啼不窺家殺湍湮洪流一作水九州始蠶麻其害乃去茫然風沙被髪之叟狂而癡清晨徑一作臨流欲奚為旁人不惜妻止之公無渡河苦渡之虎可摶河難馮公果溺死流一作沉海湄海湄有長鯨白齒若雪山公乎公乎挂骨於其間箜篌所悲竟不還同前陳標隂風颯颯浪花愁半度驚湍半挂舟聲盡雲天君不住命懸魚鼈妾同休黛蛾芳臉垂珠淚羅襪香裾赴碧流餘魄豈能銜木石獨將遺恨付箜篌苦熱梁簡文帝六龍騖不息三伏啓炎陽寢興煩几案俯仰倦帷床滂沱汗似瀹一作鑠霏㣲風如湯洄池愧生浪蘭殿非含霜細簾時半掩輕幌乍横張雲斜花影沒日落荷心香願見洪崖井誰一作詎憐河朔觴同前任昉旭旦烟雲巻烈景入東軒傾光望轉蕙斜日照西垣既巻蕉梧葉復傾葵藿根重簟無冷氣挾石似懐温霡霂類珠綴喘赫狀雷奔同前何遜昔聞草木燋今覩沙石爛曀曀風逾静曈曈日漸旰習静閟一作悶衣巾讀書煩几案卧思清露挹一作浥坐待髙一作明星燦蝙蝠户中飛蠛蠓窓間亂實無河朔飲空有臨淄汗遺金自不拾惡木寧無幹願以三伏晨催促九秋換同前劉孝威日暮苦炎溽遷坐接長廊月麗姮娥影星含織婦光棲禽動夜竹流螢出闇墻香盤糅鮮一作鱗粉雕臺一作壺承蔗漿白羽徒摇幄緑水自周堂弱紈猶覺重纎絺尚一作向少凉弄風思漢朔戲雨憶吴王𤣥氷術難驗赤道漏猶長誰能更吹律還令黍谷凉同前王筠日域散朱雰天隅歛青靄飛光煥南陸炎津湧北瀬繁星聚若珠宻雲屯似盖月至每開衿風過時觧帯同前和樂儀同庾信火井沉熒散炎洲髙燄通鞭石未成雨鳴鳶不起風思為鸞翼扇願借明光宫臨淄迎子禮中散就安豐美酒合一作含蘭氣甘𤓰開蜜筒寂寥人事屏還得隠墻東同前杜甫七月六日苦炎蒸對食暫飡還不能每愁夜中自足蝎况乃秋後轉一作復多蠅束帯發狂欲大呌簿書何急來相仍南望青松架短一作絶壑安能赤脚踏層氷奉和李大夫同吕評事太行苦熱行兼寄院中諸公仍呈王員外劉長卿迢迢太行路自古稱險惡千騎儼欲前羣峰望如削火雲從中起仰視飛烏落汗馬卧髙原危旌倚長薄清風何不至赤日方煎鑠石露一作枯山木燋鱗窮水泉涸九重今旰食萬里傳明略諸將候軒車元兇愁鼎鑊何勞短兵接自有長纓縳通越事豈難渡瀘功末博朝辭羊腸坂夕望貝丘郭漳水斜繞營恒山遥入幕永懐姑蘇下因寄建安作白雪和難成滄波意空託陳琳書記好王粲從軍樂早晩歸漢廷随公一作君上麟閣五言酬薛貟外誼苦熱行見寄僧皎然六月金數伏茲辰日在庚炎曦爍一作曝肌膚毒靄昏性情一作毒霧昏檐楹安得奮輕一作翅翮迢遥出雲征不知天地心如何匠生成火徳燒百卉瑶草不及榮有客當此時忽貽懐中瓊捧玩煩衿滌嘯歌善一作美風生遲君佐元氣調使四序平中令霜不祅火餘氣常貞江南詩騷客休吟苦熱行苦熱行王轂祝融南來鞭火龍火旗焰焰燒天紅日輪當午凝不去萬國如在洪爐中五嶽翠乾雲彩滅陽侯海底愁波竭何當一夕金風發為我掃却天下熱同前僧鸞燭龍銜火飛天地平陸無風海波沸彤雲疊掛竒峰長焰焰流光爇凝翠烟島摶鵬嚲雙翅羲和赫怒强總轡飲流夸父斃長途始見當中印王字明明夜西朝又東古來有道仍在中扶桑老葉蔽不得輝華直上凌蒼穹萬人揮汗翻成雨口燥喉乾隘塵土西郊雲色晝冥冥如何不放一作救生靈苦何山恠木蔵蛟龍縮鱗巻鬛為乖慵不發滂澤注天下欲使風雲何所從早苖原上枯成焰嶽靈徒祝無神驗豪家簾外喚清風水紋明角鋪長簟玉扇畫堂凝夜秋歌艶遶梁催莫愁陽烏落盡酒不醒扶上西園當月樓靡由暍死非吾屬庫有黄金倉有粟苦寒喬知之胡天夜清逈孤雲獨飄颺遥裔出鴈關逶迤含晶光隂陵乆徘徊幽都無夕陽祁寒凍巨海殺氣流大荒朔風吹水寒行子覆疑作履胡霜路有從役倦卧死黄沙塲覊旅因相依慟之淚沾裳由來從軍行賞存不賞亡亡謝誠已矣徒令存者傷同前二首杜甫漢時長安雪一丈牛馬毛寒縮如蝟楚江巫峽氷入懐虎豹哀號又堪記秦城老翁荆揚客慣習炎蒸嵗絺綌𤣥冥祝融氣或交手持白羽未敢釋二去年白帝雪在山今年白帝雪在地凍埋蛟龍南浦縮寒割肌膚北風利楚人四時皆麻衣楚天萬頃一作里無晶輝三足之烏骨一作足恐斷羲和送之將安歸一作送將安所歸又作迭送將安歸同前二首杜甫南紀巫廬瘴不絶太古以來無尺雪蠻夷長老怨苦寒崑崙天關凍欲一作應折𤣥猿口噤不能嘯白鵠翅垂眼出一作流血安得春泥補地裂二曉一作晩來江邉失大木猛風中夜飛一作吹白屋天兵新一作斷斬青海戎殺氣南行動坤軸不爾苦寒何其一作大酷巴東之峽生凌澌彼蒼廻斡人得知同前劉駕百泉凍皆咽我吟寒更切半夜倚喬松不覺滿衣雪竹竿有甘苦我愛抱苦節鳥聲有悲歡我愛口流血潘生若觧吟更早生白髪猛虎行一作吟儲光羲寒亦不憂雪饑亦不食人人肉一作血豈不甘所惡傷明神太室為我宅孟門為我隣百獸為我膳五龍為我賔䝉馬一何威浮江一以仁綵章曜朝日爪牙一作牙爪雄武臣髙雲逐氣浮厚地随聲震君能賈餘勇日夕長相親同前李白行作一作朝作又作行亦猛虎吟一作行坐作一作暮作又作坐亦猛虎吟腸斷非關隴頭水淚下不為雍門琴旗旌繽紛兩河道戰鼓驚山欲顛倒秦人半作燕地囚胡馬飜銜洛陽草一輸一失關下兵朝降夕叛幽薊城巨鰲未斬海水動龍魚奔走安得寧頗似楚漢時飜覆無定止朝過博浪沙暮宿一作入淮隂市張良未遇韓信貧劉項存亡在兩臣蹔到下邳受兵略來投漂母作主人賢逹一作哲悽悽古如此今將棄擲一作今時亦棄青雲士有䇿不敢干一作犯龍鱗竄身南國避胡塵寳書長劔束一作挂髙閣金鞍駿馬散故人昨日方為宣城客掣鈴交通二千石有時六博快壯心遶牀三匝呼一擲楚人每道張旭竒心蔵風雲世莫知三吴邦伯多顧盼四海豪一作雄俠皆相推蕭曹亦一作曽作沛中吏攀龍附鳳皆一作當有時溧陽酒樓三月春楊花茫茫愁殺人胡鶵緑眼吹玉笛吴歌白紵飛梁塵丈夫相見且為樂椎牛撾鼔會衆賔我從此去釣滄海得魚笑寄情相親同前張籍南山北山樹冥冥猛虎白日遶村一作林行向曉一作晩一身當道食此一作山中麋鹿盡無聲年年養子在深谷雌雄上下不相逐谷中近窟有山村一作林長向林中一作村家取黄犢五陵年少不敢射空來林下看行跡同前李賀長戈莫樁强弩莫抨乳孫哺子教得生獰舉頭為城掉尾為旌東海黄公愁見夜行道逄騶虞牛哀牛哀化虎也不平何用尺刀壁上雷鳴泰山之下婦人哭聲官家有程吏不敢聴文苑英華巻二百十
