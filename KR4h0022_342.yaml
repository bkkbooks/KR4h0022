body:
  text: 文苑英華巻三百四十二宋李昉等編山虎牙行一首閬山歌一首閬水歌一首嵩山天門歌一首髙山引一首小山歌一首驪山行一首苔蘚山歌一首望山歌一首太山路一首隂山道一首蓮峰歌一首石石笋行一首石犀行一首青石一首隠逸逸人歌一首丁隠君歌一首柴溪翁歌一首佛寺道林寺三首岳麓寺一首山虎牙行杜甫北風歘吸吹南國天地慘慘無顔色洞庭揚波江漢廻虎牙銅柱皆傾側巫峽隂岑朔漠氣峰巒窈窕溪谷黒杜鵑不來猨狖寒集作啼山鬼幽憂雪霜逼楚老長嗟憶炎瘴三尺角弓兩斛力壁立古集作石城横塞起金錯旌竿滿雲直漁陽突騎獵青丘犬戎鏁甲圍丹極八荒十年防盗賊征戍誅求寡妻哭逺客中宵淚霑臆閬山歌前人閬州一作山城東靈集作雪山白閬州城北玉臺一作壺碧松浮欲盡不盡雲江動將崩已集作未崩石那知根集作眼無鬼神㑹已覺氣與嵩華敵中原格鬬且未歸應結一作㸔茅齋㸔一作向青壁此詩一百五十九巻重出已削去註異同為一作閬水歌前人嘉陵江色何所似石黛碧玉相因依正憐日破浪花出更復春從沙際歸巴童盪集作蕩槳敧側過水鷄衘魚來去飛閬巾勝事可腸斷閬州城南天下稀嵩山天門歌宋之問登天門兮坐盤石之磷􅀈前漎漎兮未半下漠漠兮無垠紛窈窕兮巖倚披以鵬翅洞膠葛兮峰崚層以龍鱗松移岫轉左變而右易風生雲起出鬼而入神吾亦不知其靈恠如此願逰杳𡨕兮見羽人重曰天門兮窮崇廻合兮攅藂松萬接兮柱日石千層兮倚空晩隂兮足風一作嵐夕陽兮赩紅試一望兮魂奪况衆妙之無窮髙山引前人攀雲窈窕兮上躋懸峰長路浩浩兮此去何從水一曲兮腸一曲山一重兮愁一重松檟邈已逺友于何日逢况滿室兮童稚攅衆慮一作愁於心胷天髙難訴兮逺負明徳却望函京兮揮涕龍鍾小山歌萬楚人説淮南有小山淮王昔日此登仙城中鷄犬皆飛去山上壇塲今宛然世人貴身不貴夀共笑華陽洞天口不知金石變長年謾在人間戀携手君能舉㠶至淮南家住旴𣅿余先諳桐栢亂流平入海茱萸一曲沸成潭憶記來時魂悄悄想見仙山衆峰小今日長歌思不堪君行為報三春鳥驪山行韋應物君不見開元至化垂衣裳厭坐明堂朝萬方訪道靈山䧏聖祖沐浴華池集百祥千乘萬騎被原野雲煙草木生一作相輝光禁伏圍山曉霜勁集作切離宫積翠夜漏長玉階寂厯朝無事碧樹葳蕤寒更芳三清小鳥傳仙語九華真人奉瓊漿下元昧爽漏一作編恒秩登山朝禮𤣥元室翠華稍隠天半雲丹閣先集作光明海中日羽旗旄節憇瑶臺清絲妙管從空來萬井九衢皆仰望綵雲白鶴方徘徊慿髙覧古集作一望嗟寰㝢造化茫茫思攸哉秦川八水長繚繞漢氏五陵空崔嵬乃言聖祖授集作奉丹經以年為日億萬齡蒼生咸夀隂陽泰髙謝前王出塵外英雄共理天下晏戎夷讋伏兵無戰時豐薄賦集作賦歛未告勞海闊珍竒亦來獻干戈一起文物乖懽娯已極人事變聖皇弓劔墜幽泉古木蒼山閉宫殿纉承鴻業聖明君威振六合驅妖氛太平逰幸今可待湯泉嵐嶺還氛氲苔蘚山歌顧况野人夜夣江南山江南山深松桂閑野人覺後長歎息帖蘚黏苔作山色閉門無事任盈虛終日欹眠觀四如一如白雲飛出壁二如飛雨巖前滴三如騰虎欲哮咆四如懶龍遭霹靂嶮峭嵌空潭洞寒小兒兩手扶欄干同裴觀察東湖望山歌前人浴鮮積翠栖靈異石洞花宫横半空夜光潭上明星啓風雨壇邉樹如洗水淹徐孺宅恒乾繩墜洪崖井無底主人載酒東一作春湖隂遥望西山三四岑太行路白居易太行之路能嶊車若比人心是坦途巫峽之水能覆舟若比人心是安流人心好惡苦不常好生毛髮惡生瘡與君結髮未五載豈期集作忽從牛女為參商古稱色衰相棄背當時羙人猶怨悔何况如今鸞鏡中妾顔未改君心改為君薰衣裳君聞蘭麝不馨香為君事容餙君㸔珠集作金翠無顔色行路難難重陳人生莫作婦人身百年苦樂由他人行路難難於山險於水不獨人家集作間夫與妻近代君臣亦如此君不見左納言右納史朝承恩暮賜死行路難不在水不在山只在人情反覆間隂山道前人隂山道隂山道紇邏敦肥氷泉好毎至戎人進集作送馬時道傍千里無纎草草盡泉枯馬病羸飛龍但印骨與皮五十疋縑易一疋縑去馬來無了日養無所用土集作飛去非冝毎嵗死傷十六七縑絲不足女工苦踈織短截充疋數藕絲蛛網三丈餘廻紇集作鶻訴稱無用䖏咸安公主號可敦逺為可汗頻奏論元和三年下新勅内出金帛酬馬值仍詔江淮馬價縑從此不令踈短織合羅將軍稱集作呼萬嵗捧受金銀與縑綵誰知胡集作黠虜啓貪心明年馬來多一陪縑漸好馬漸多隂山虜奈爾何蓮峰歌賈島錦礫潺湲玉溪水曉來㣲雨藤花紫冉冉山鷄紅尾長一聲樵斧驚飛起松刺梳空石差一作室齒煙香一作空風軟人參蘃陽崖一夣伴雲根仙菌靈芝夣魂裏石石笋行杜甫君不見益州城西門陌上石笋䨇髙蹲古老集作來相傳是海眼苔蘚蝕盡波濤痕雨多往往有集作得瑟瑟此事恍惚難明論恐是昔時卿相墓集作家立石為表今仍存惜哉俗態好蒙蔽亦如小臣媚至尊政化錯忤失大體坐㸔傾危受厚恩嗟爾石笋擅虛名後來未識猶駿奔安得壮士擲天外使人不疑見本根石犀行前人君不見秦時蜀太守刻石立作三犀牛自古雖有厭勝法天生江水湏集作向東流蜀人矜誇一千載泛濫集作溢不近張儀樓今年灌口集作注損戸口此事或恐為神羞終藉隄防出衆力髙擁木石當清秋先王作法皆正道詭恠何得參人謀嗟爾三犀不經濟缺訛只與長川逝但見元氣相集作恒調和自免洪濤恣凋瘵安得作者集作壯士提天綱再平水土犀蒼集作奔茫青石白居易青石出自藍田山兼車運載來長安工人磨琢欲何用石不能言我代言不願作人家墓前神道碣墳土未乾名已㓕不願作官家道傍徳政碑不鐫實録鐫虛詞願為顔氏叚氏碑雕鏤太尉與太師刻用集作此兩片堅貞質状彼二人忠烈姿義心若石屹不轉死節若石確不移如觀奮擊朱泚日似見叱呵希烈時各於其上題名字集作謚一置髙山一沉水陵谷雖遷碣猶集作碑獨存骨化為塵名不死長使不忠不烈臣觀碑改節慕為人慕為人勸事一作助君隠逸逸人歌贈李山人張楚金上有堯兮下有由眠嵩陽兮漱頴流其貎古其心幽浩歌一曲兮林壑秋道險可驚兮人莫用樂天知命兮守巖洞時擊磬兮嗟鳴鳯吾欲知往古之不可追自悠悠於元夣丁隠君歌陸龜蒙華陽道士南遊歸手中半捲青蘿衣集作皮自言逋客持贈我乃是錢塘丁翰之連江集作天大抵多竒岫獨話君家最孤秀盤燒天竺春笋肥琴倚洞庭秋石瘦草堂暗引龍泓溜老樹根株若蹲獸霜濃果熟未容收往往兒童雜猿狖去嵗猖狂有黄㓂官軍駭散無人鬬滿城奔送翰之閑秪把枯松塞圭竇前度集作後非相逢正集作已非賣文一錢不直虛云云今來利作採樵客可以抛身麋鹿群丁隠君丁隠君集作昻昻頭且莫變名氏即日便尋丁隠君紫溪翁歌前人一丘之木其棲身也屋吾容不辱一溪之石其居平也席吾勞以息一竇之泉其音清也絃吾方在懸得乎人得乎天吾不知所以然而然先生側弁而賡之曰采江之魚兮朝舡有鱸采江之蔬兮暮筐有蒲左圖且書右琴與壺夀歟貴歟賤歟歌闋而去佛寺前人岳麓山道林二寺行杜甫玉泉之南麓山殊道林林壑争盤紆寺門髙開洞庭野殿脚挿入赤沙湖五月寒風冷佛骨六時天樂朝香爐地靈歩歩雪山草僧寳人人滄海珠塔刦宫墻壮麗敵石集作香厨松道清凉俱蓮池集作花交響共命鳥金牓雙廻三足烏方丈渉海費時節𤣥圃尋河知有無暮年且喜經行近春日兼䝉暄暖扶飄然斑白將集作身奚適傍此煙霞茒可誅桃源人家易制度橘洲田土仍膏腴潭府邑中甚淳古木守庭内不喧呼昔遭衰世皆晦跡今幸樂國養㣲軀依止老宿亦未晩富貴功名焉足圖乆為謝集作野客尋幽慣細學何顒免興孤一重一掩吾肺腑仙鳥仙花集作山鳥山花吾友于宋公放逐曽題壁物色分留待集作興老夫道林寺韋蟾石門廻接蒼梧野愁色隂深二妃寡廣殿崔嵬萬壑間長廊詰曲千巖下静聴林飛念佛鳥細㸔壁畫䭾經馬暖日斜明螮蝀梁濕煙散羃鴛鴦瓦北方部落檀香塑西國文書貝葉冩壊欄迸竹醉好題窄路垂藤困堪把沈裴筆力閫雄壮宋杜詞源兩風雅他方居士來施齋彼岸上人投結夏悲我未離擾擾徒勸我休學悠悠者何時得與劉遺民同入東林逺公社同前崔珏臨湘之濵麓之隅西有松寺東岸無松風千里擺不斷竹泉㵼入于僧厨宏梁大棟何足貴山寺難有山泉俱四時唯夏不敢入燭龍安敢停斯湏逺公池上種何物碧羅扇底紅鱗魚香閣朝鳴大法皷天宫夜轉三乘書野花市井栽不着山鷄飲啄聲相呼金檻僧廻歩歩影石盆水濺聮聮珠北臨髙處日正午舉手欲摸黄金烏遥江大船小於葉逺村雜樹齊如蔬潭州城郭在何處東邉一片青模糊今來古往人滿地勞生未了歸丘墟長卿之門乆寂寞五言七字誇規模我吟杜詩清入骨灌頂何必湏醍醐白日不照耒陽縣黄天厄死飢寒軀明珠大貝採欲盡􅑕蛤空滿赤沙湖今我題詩亦無味懐賢覧古成長吁不如興罷過江去已有好月明歸途嶽麓寺沈傳師承明年老輙自論乞得湘守東南奔為聞楚國富山水青嶂邐迤僧家園含香珥筆皆眷舊謙挹自忘臺省尊不令執簡候亭舘直許携手遊山樊忽驚列岫晩來逼朔雪洗盡煙嵐昏碧波廻嶼三山轉丹檻繚郭千艘屯華鑣蹀􅞃狥砂歩大斾綵錯輝松門樛枝競騖龍蛇勢折幹不㓕風霆痕相重古殿倚巖腹别引新徑縈雲根目傷平楚虞帝䰟情多思逺聊開罇危絃細管逐歌颺畫皷繡靴隨節翻鏘金七言陵老杜入木八法蟠髙軒嗟余潦倒乆不利忍復感激論元元文苑英華巻三百四十二
