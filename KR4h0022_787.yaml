body:
  text: 文苑英華卷七百八十八宋李昉等編樓觀關防橋梁附石橋銘二首梓州惠義寺重閣銘一首虎牢關銘一首古函谷關銘一首趙郡南石橋銘一首望思臺銘一首成臯銘一首古東周城銘一首棧道銘一首舒州新堂銘一首藍田關銘一首兩觀銘一首文選樓銘一首石橋銘張說集有同玉真公主過大哥山池十字唐𤣥宗英華作張說非梁園勝躅碣館佳遊苔深石暗山斜路幽橋非七夕節是三秋爰停弄杼共此淹留奉和張說玉梁架逈碧沼涵空石鞭海上鎖煆河中橫漢飛鵲規天拖虹仙聖來往風雲路通梓州惠集作慧義寺重閣銘并序楊炯大辰之嵗正陽之月有郪縣宰扶風竇兢字思眘昭宣令德光闡化猷庶政惟和萬人以理閒庭不擾退食自公逺覽形勢䖍心净域乃與禪師釋智海忘言道契寓目於長平之山援飛莖陟峭崿削成千仭壁立萬尋俯觀大道僅如集作同棗葉下望須彌裁同芥子飛流滴瀝而成集作生響喬樹璀璨而垂榮玉堂石室千門相似大殿珠毫十方皆現慷慨榱桷集作椽之未立吁嗟棟宇之莫修不捨有為取諸大壯觀夫左龍角右參旗前太微後營室駢羅列以雜㳫瑟蕭條而集作以清泠上磊落以晃朗下泓澄而集作以靉靆參參差差森森纚纚千櫨萬栱乍合乍離蒨蒨粲粲絢絢煥煥六采五章或同或散莾如天履矗以雲平金火合舍於垂珠日月相望於銜璧璇墀扣砌平接泰階玉户金扉俯臨閶闔曵紅日舒丹霞豐隆為雲抨集作砰鏗訇於軒檻列缺為電翕􅝉霍於庭除寒暑隔閡於墻垣集作落虹霓回帶於廊廡仰之不極目炫炫而喪精登之無階心遑遑而失度土木集作若上是翔九垓之表仍不逮於上榮文集作火是章窮四海之間猶未離於前墄借如梵天之宅集作闕釋帝集作帝釋之宮兩曜城池五雲樓觀輪王所處純金為說法之堂諸佛所遊衆香作經行之地亦未可同年而語也夫黃金鏤榜曾不若四攝之門青石為墻曾不若三空之地殫百工之力建七寶之樓豈徒然哉良有以也夫何故如來神力且觀嚴净道師方便化作一城事有古而可以質於今言有大而可以徴於小是則毗耶四㑹集作衆俱發道心險路衆人咸知寶所其銘曰長平山兮建重閣上穹隆兮下磅礴紛被麗兮駢交錯儼色集作靈相兮冲寂寞誰所為兮天匠作虎牢關銘并序賈至天地定位三一作山川據其極王侯設險虎牢擁其要扼一作振之以五嶽維嵩崒焉迫之以四瀆洪河突焉宜其咽喉九州閫閾中夏贊經綸之攻拒却欃槍之陵暴若乃金火代變山河分裂脅從力爭義散約解時則漢祖守之以臨山東坐清三齊强楚躑躅而不進及夫隋氏失馭中原版蕩封豕荐食龍戰𤣥黃時則太宗據之以拒河朔克擒醜夏僞鄭袒縳而請命於戲自周室微弱虎狼并吞盛衰千祀正閏更王而政和人民一作民安一統長久漢氏昭於前載我唐光於兹日其創業之主戡難定功咸在斯地意者天關一作開險固為霸王之器乎聖作功業知窅冥之意乎不然何𤣥期時事影響之若此也又聞諸鄭志曰制巖邑也虢叔死焉而唐漢紹興得非山靈河神正直是輔乃知英雄者不獨恃險而顚沛者在於凉德歟天寶七嵗一作載至自宋都西經洛陽歇鞍登兹懷古欽聖一作望覽山河之壯麗想威靈而咫尺慨然有懷敢獻銘一作頌曰邈矣維嵩峻極于天磅礴崔嵬北臨洪川嶽瀆㑹險蹙坼封泉實開虎牢作固伊瀍維兹虎牢天設巨防攻在坤下拒在離旁昏恃以滅聖憑而王崢嶸豁呀孟門相向伊昔漢祖戡秦統周勍敵相及此焉淹留終夷海春遂割一作復鴻溝乘舋而東奄有九州隋氏敗績黎人難阻帝命太宗陳師鞠旅鐵騎僔僔雲旗容與擒夏剋鄭在此一舉日月永清昆蟲得所嵗在戊子西經登兹祗聖肅然憫亡悽其虢叔反道復隍熸一作熠師項氏烹苛莫能守之險易同途成敗異時德不在鼎王孫布詞三苖不循魏武忸怩逆失順獲古今同期申鑒勒銘庶警將來一作皆唐文粹古函谷關銘并序獨孤及王者建邦經野觀象立極於是有重門擊柝以待暴客故封略土宇守在關塞山川丘陵為之城池天作崤函俾屏京室崇山回合連岡叢倚長河屈盤萬里來束崖奔嶺蹙谷扼溪鬬崛起重險為秦東門截函夏於閫域鎖天府於户牖外扼八州之咽喉故百二形焉內擁六合之奧區故霸王出焉當其中集作周原鹿駭戰國蝟起嬴氏建瓴山東擇肉宇內持㦸百萬連衡此關是時也開門而九國師遁振䇿而二周鼎入奄有大寶遂吞中國洎集作及江返秦璧天祐漢祚髙皇帝提劍而起以遏亂略斬白帝絏降王舉漢中平咸陽廓金城以建都活萬姓以集作於三章取威定功此焉是保粵若詢事國諜聆風仙籙則真氣靈蹤起乎其中柱史一去流沙萬里留玉函於舊宅傳寶圖於本枝豈上帝乃眷興王是感不然何錫羡開國如此其成耶其太五字集本文粹作其大嵗在大火余適下陽停驂塞門慿覽舊國襟帶如故世道不留秦餘空山漢遺集作為茂草恐復舟失於壑岸化為谷萬載之後昧者不知乃刻頌此石以示來裔其詞曰天地雷雨英雄交爭設險守國作藩於京姓易時移山空塞平千秋陵谷想見精靈仙駕長往雄圖杳冥于集作何以志之勒銘巖局集作巖扃趙郡南石橋銘并序張彧閹茂嵗我御史大夫李公晟奉詔總禁戎三萬北定河朔冬十月師次趙郡郡南石橋者天下之雄勝乃揆厥績度厥功皆合於自然包我造化僕散客也狀而銘曰汶水伊何諸川互凑秋霖夏潦奔突延袤杼材藏制朴斫紛糅幹地泉開盤根玉甃虹舒電拖虎步雲構截險橫包乘流逈透坱軋匠造琳琅簇簉敞作洞門呀為石竇窮琛莫算一作賖莫算盈盈一作一紀方就力將岸爭勢與空鬬吞齊跨趙警夜防晝月桂虛蟾星羅伏獸謂之鈐鍵撮我宇宙謂之關梁扼我一本作乃戎冦郡國襟帶河山領袖經途者安逸軌者覆東南一尉西北一候萬里書傳三邊檄奏郵亭控引事物殷富夕發薊一作蒯壖朝趨禁霤質含氷碧文輝藻繡花影全芳苔痕半舊天啓大壯神功罕究勒銘巨橋敢告豪右一作皆唐文粹望思臺銘并序吕溫望思臺者漢武帝思戾太子之所建也事具漢書夫立人之道本乎性情生而知曰性感而動曰情性雖生情情或滅性是以聖人患其然而為之節誠而明之中而庸之建以大倫統以至順倫莫極於父子順莫先於慈孝然而全之者正也慈不得其正則失子孝不得其正則失親救失之術存乎善教昔者三王之教世子也如周公乃為太傅如召公乃為太保如太公乃為太師左右前後罔非端士禮以專其目樂以一其耳仁以制其氣義以凝其情故非僻之心無自入也讒慝之口莫能間也父子君臣之道所以全也漢則不然世子非三代之賢保傅無二南之老左右前後唯刑餘罪人目流於靡慢耳溺於惉滯氣溢於寵渥情蕩於驕奢於是非僻之心得以入矣讒慝之口得以間矣父子君臣之道所以離矣向使太子師友尊嚴左右端肅雖江充之詐豈敢以不義而加之耶向使太子孝德彰聞仁聲茂著雖武帝之惑豈遽以大逆而疑之耶向使太子早服師訓少知教義豈忍一朝之忿棄其親而忘其身耶由是言之其所以陷於此者漸矣殆哉當時之勢也國忘疑作亡冡嗣武老昭弱京師蹀血天下疑動若無霍光受負圖之寄秉不奪之節斥昏建明鎮翊鴻業則必庶孽尋戈起商參之禍姦臣乘釁行羿浞之事漢家之祀豈及三七哉此有社稷者之所宜深戒也乙亥嵗豫經於湖登兹荒臺望古太息以為遇夫一物有可以垂訓於集作整訓于世者秉筆之士未嘗闕焉乃作銘曰人倫大統天性是寶雖曰自然亦資斧藻漢皇父子一失其道四海為家不能相保荒臺巋而千古之悲悔目空斷寃魂不歸疑生於微禍積於基苟有明義誰其間之嗣維邦本本動邦危於呼後王鑒兹在兹成臯銘茫茫大野萬邦錯峙惟正守國設險於此呀谷成塹崇山若壘勢軼赤霄氣吞千里洪河在下太室傍倚岡盤嶺蹙虎伏龍起鎖天中區控地四鄙出必由户入皆同軌拒昏納明閉亂開理集作治昔在秦亡雷雨晦冥劉項分險扼喉而爭漢飛鎬京羽斬東城德有厚薄此山無情維唐初興時未大同王于東征烈火順風乘髙建瓴擒建係充奄有天下斯焉定功二百年間大朴既還周道如砥成臯不關順至則平逆來蜀本作者惟難敢跡成敗勒銘孱顔古東周城銘并序魯昭公三十二年周萇𢎞集作叔合諸侯之大夫城成周晉女叔寬見左傳四字蜀本作衛彪傒蓋從國語曰天之所壞不可支也萇𢎞違天必受其咎異嵗周人殺萇𢎞左氏明徴以為世規俾持顚之臣沮其勝氣非所以勵尊王垂大順集作訓也豫經其地而作是銘文武集作王受命肇興西土周公作洛始㑹風雨居中正本拓統開祚盛則駿奔衰則夾輔平王東遷九鼎已輕二伯之後時無義聲大夫萇𢎞言抗其傾坐召諸侯廓崇王城雖微逺猶實被令名宜福而禍何傷於明立臣之本委質定分為仁不卜臨義不問無天無神唯道是信國危必扶國滅集作威必振求而不獲乃以死狥興亡理集作治亂在德非運罪之違天不可以訓升墟覽古慨焉遐憤勒銘頽隅以勸大順棧道銘歐陽詹秦之坤蜀之艮連髙夾深九州之險也隂溪窮谷萬仞直下奔巖峭壁千里無土亘隔呀絶巉巉冥冥麋鹿無蹊猿猱相望自三代而往蹄足莫之能越秦雖有心蜀雖有情五萬年間敻不相接且秦之為蜀也人一其性物同所宜嗜欲無餘門集作源教化無餘源集作門可貿遷可親眤擘拆地脉暌離物理豈造化之意乎天實凝清而成地實凝濁而形當其凝也如鎔金下鑄騰雲上浮空隙有所不開集作周回翔有所不合澄結既定竅集作嶷下同缺生乎其中西南有漏天天之竅缺也于斯有兹地地之竅缺也天地也者將以上覆下幬含蓄萬虛可通必使而通者也苟有可通而未通聖賢代其功集作工而通之故有為舟以濟川為梯以踰山唯兹地也有川不可以舟涉有山不可以梯及粵有智慮以集作念全𤣥造立巨衡而舉追氏縋懸纑以下梓人猿垂絶冥鳥傍危岑鑿積翠集作石以全力梁半空於木棚斜根玉壘旁綴青泥截斷岸以虹矯繞翠屏而龍踠堅徑膠固雲橫砥平總庸蜀之通集作道途繞岐雍之康莊都邑之能步山川之無脛若水决防如鴻嚮陽南之北之踵武湯湯躋峨峨以自若臨蒼蒼而不懼繇是贄幣以遙集無此字達人神以集無此字㑹同稽禮樂之短長量威力之汙隆可王者王可公者公而相次以風或曰受琢之石長存可構之材無窮易刓代蠧斯道也未始有終嗚呼為上懷來在乎德為下昭德在乎義德義之如今日則或人之言有孚其反之則石雖存恐不為琢材雖多恐不為構想夫往昔有時而有有時而無是用惕惕天下嗤嗤集作蚩蚩知聖賢創物之意之人寡明德義固物之道之人稀敢陳兩端之要銘諸斯道之左庶主德義者存今之所履踵武湯者荷古之攸作乃為銘曰天覆地燾本亦備集作周設大象難全或漏或缺損多益寡聖賢代工彼雖有缺與無缺同惟北曰秦惟南則蜀地缺其間坤維不續斗起斷岸集作岸斷屹為兩區秦人路絶蜀火煙孤天實不通賢斯有造鑽堅剡徑無蹊以道若川匪舟若陸匪車緣危轉虛步驟交如構雖在功存亦由德項怫劉怒從完以踣隋落我榮集作營自顚而植地非革勢材不易林踣植之致惠怨之心勿謂斯道不常集作恆勿謂斯道可久禮不以禮可有而無恭不以恭可無而有創之之意如彼固之之理若兹彼知不易兹而易知勒銘道左其同我思舒州新堂銘李翺先時寢壞有隘有攎集作其廬乃作斯堂髙嚴旟旟六桷四楹裝重架虛欒栱不設簷梠集作蜚祛祛嚴不越度險而有餘左立嘉亭繚以環除延其泉源志肆其紓集作延延其深肆肆其紓吏事既退齊心以居思民之病擇弊而鋤弗敢逸隳集作弗逸弗墜謹終猶一作如初大旱之後鄰邑成墟獨我州氓樂哉胥思鬼神所福事非集作匪在豫丞相以言乃下徴書復官于朝以解前疽刻銘于斯永永羣舒藍田關銘並序皮日休六年皮子副諸侯貢士之薦入京程至藍田關覩山形關勢廽抱于天秀欲染眸危將驚魄噫將造物者心是而加力耶不然者何壯觀若斯之盛也易曰王公設險以守其國信矣哉若為天下之樞機萬世之閫閾者非兹關而莫守也因陳其規是為藍田關銘天輔唐業地造唐關千巖作鎖萬嶂為拴難圖其形莫狀其秀雙扉未開天地如斗軋然晝啓人流如濟似畫秦國鋪於馬底嶮不可侵唯王之心矧夫兹關獨可規臨兩觀銘陸龜䝉兩觀雉門雖僭天子聖人在朝姦佞誅死姦首擲地姦血如水政不得亂國是以理下及千祀澆風四起內荏外賢舉世稱美赫奕皇都象魏天倚豈無姦邪佩玉蘂蘂左傳作蕊蕊聖人弗生兩觀如砥以石鑱辭著于闕里文選樓銘并序楊䕫文選樓者梁昭明太子選文之地時逾四代年將五百清風懿號藹然不泯况廣陵乃隋室故郡遺事斯存求之於今陳迹盡滅斯猶巍巍久而益新其不由以學而立道者道則不朽以文而經業者業則不磨乎𢎞農子經於是樓提筆路絶且慮夫不文不典者肆而處乃泣以銘云峩峩萬宇匪歌則舞美哉此樓獨以文修自由名貴不以華致雖超千古靡有顚墜孰堪其登必精必誠孰可以居必賢必明無聚優以為娛無習伎以稱榮吾恐其素德懷辱於冥冥文苑英華卷七百八十八
