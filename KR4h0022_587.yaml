body:
  text: 文苑英華卷五百八十八宋李昉等編公卿雜謝一為武奉御謝官表一首謝尚方監表一首謝加授通義大夫表一首為崔日知謝洛州長史表一首代侯中莊謝封表一首謝兄除補闕表一首為王仲升謝加兵馬使表一首謝除考功郎中知制誥表一首謝賜緋表一首謝加銀青光祿大夫表一首代路冀公謝旌節等表一首謝録銀青光祿大夫河內郡開國公第二表一首謝加正議大夫表一首謝舒州刺史兼加朝散大夫表一首謝加司封郎中賜紫表一首代閻中丞謝銀青光祿大夫表一首為李希烈謝留後表一首為武奉御謝官表一首武后臣某伏奉某月日詔書以臣為尚食奉御肅恭休命祗拜寵章榮慶既崇慙荷交集臣某中謝臣才虧琢玉學昧贏金徒以席一作藉寵葭莩容光日月叨承雲渥既曠天工而榮更恩覃集作升位非德舉無階而進坐致於青霄有慶方來載光於朱紱臣聞瑶庭任切猶稱六尚之榮玉食禮尊實總八珍之貴臣術慙緑鶴業匪豢龍將何致美瓊芳式和金鼎鴻私曲被殊寵降臨天命既不可違聖恩允宜祗戴循涯揣分實所非宜集作啚謝尚方監表武后臣某言伏奉制書以臣為尚方監忽承鴻霈遽辱崇章澤甚漏泉懼深阽谷臣材乖逺大識謝一作昧淹通曽微汗馬之勞非有成麟之業欣逢昌厯謬踐清階自邇陟遐從幽至顯題輿外郡多慙展驥之能綰墨中京久乏栖鸞之譽雖韋弦自朂而寬猛猶昧空慙尸素罕聞政績幸以聖德動天而祥山發地踴竒峯而槩日披秀崿以干雲虔惟造化之靈以告休明之慶帝之力也臣何預焉乾奬曲臨聖恩橫被俄輟一同之務坐遷二府之班秩亞括河榮兼稅滓疑顧茲踈諛何以克堪伏願七景停輝五潢收潤矜容薄淺更採英髦則上不汨於朝彛下無招於官謗無任控欵之至代侯中庒謝封表肅宗邵説臣某言伏奉某月日制授臣太子詹事兼封上谷郡王祗奉榮命以慙以惕臣聞論德而建封者聖王之事量功而受賞者忠臣之義也封或謬建則王綱斯紊賞或虛受則臣體以乖聞之古先敢忘之疑誡伏惟皇帝陛下大聖繼統神武經邦道邁纂堯功高復禹頃幽燕肆逆汾澮阻兵朝義叛換於前懷恩旅拒於後陛下宸謨獨斷睿略潛行曾未三年克平二豎此蓋皇躬保祐宗社降靈豈臣愚蒙敢叨封爵假使進能排難退克全軍為臣之節固當若是以茲干賞實為包羞昔漢祖仗義而西滅秦項韓彭諸將異姓同封然而德薄位崇卒見傾覆以臣智略敢方先賢苟或受之其能自保力微任重福過災生俯仰增憂心魂若勵乞停嚴令俯遂私情倘聖澤旁流天光曲照俾從散秩得齒周行臣之至願死將不朽無任懇迫之至謝兄除補闕表肅宗五百九十一卷謝親屬加官門有此題而闕其表今已移入姑存其目為王仲升謝加兵馬使表代宗臣某言伏奉今月日制書授臣元帥左廂兵馬使兼知滑州兵馬使恭承寵命祗懼兼深臣某中謝臣聞至理之代為官擇人故能謨謀有成授受惟允若才不稱職任非其能冒進求榮必貽禍敗伏惟寶應元聖文武皇帝陛下道齊濬哲德邁徇齊惟新景命再造區宇微臣薄劣早荷恩私慙無樽爼之謀一作謨纍忝腹心之寄擁旄仗鉞自北徂南來剪凶渠已嗟挫惡守節雖同於蘇武喪師有類於孟明議以刑章分從虀粉陛下察其本志念臣微忠特全要領再加驅策位兼風憲職典禁兵撫已循涯實為塵忝每思陳力之誠竊懼妨賢之責不謂更沐殊恩猥當重任佐皇太子元戎之律統王畿禦侮之權內省凡庸必多敗事乞停新命別授時英則朝章式序軍政無闕無任云云謝加授通議大夫表武后李嶠臣嶠言伏奉恩制加臣通議大夫守成均祭酒兼檢校文昌左丞餘如故榮過望表慶溢身涯荷寵祗恩蹈氷臨谷臣嶠中謝臣燕雀之羽多謝於飛翻蜉蝣之衣久慙於忝竊屬秦人望幸虞帝卜征萬騎時巡不倍遊於渭北四關留鎮獨延欷於周南劬勞異羈靮之臣寵渥均廟堂之士燕溪弱黍分隔於陽和楚塞輕茅遂承於雨露仰平分而載躍撫留滯而成歡惠重丘山徒深於抃舞身輕糞壤豈議於答酬無任喜戴慙惶之至謹附某官奉表陳謝以聞為崔日知謝洛州長史唐書作司馬恐非表睿宗崔沔景雲中臣某言伏奉某月日制書除臣洛州長史勳封如故伏荷殊私祗承重任屏營夕惕無以自寧臣某中謝臣實凡材素無逺量書生問道未探經術之精俗吏隨班僅見章程之末官資命達榮與時來謬齒周行誤升官秩挈瓶乏智守職何功盈缶之誠蹈常斯在冀免罪戾以紓微生仍賜寵章胡寧始望服忝三命階踰九列子孫蒙澤宗黨被恩榮遇既深隕越何答豈雨露之潤沐浴無涯而日月之明昭晰不已更承中旨作尹下都玉城嚴門洛師殷雜實四海之朝市據三河之樞要鎮俗移風方資舊德剸繁理劇必藉良能臣亦何人濫膺斯授如觀渤澥未測淺深若負蓬萊無任施重云云謝除考功郎中知制誥表代宗常衮寶應二年臣衮言伏奉去年十二月二十六日恩制授臣考功郎中餘如故詔書降辱類表作猥降詔書特榮新命祗荷殊造若無所容臣衮誠惶誠恐稽首頓首臣本諸生素虧令望慿藉儒業遭逢聖時類表作朝幸從彛序纍踐清秩得以文墨侍於軒墀五字非工四年待罪禁垣之右朝奉如綸宸扆之前夜參視草以地尤密惟才必精在臣無堪忝迹斯甚食浮之議所責何逃類表作於何逃責陛下𢎞奬文儒優容侍從恕其職事之闕録以歲時之深爰錫朝章俾遷郎位典掌如舊寵榮有加翺翔雲霄沐浴雨露俯伏拜賜心靈若飛效薄恩崇罔知攸措何以上報期於死節無任感戴屏營之至謝賜緋表代宗常衮臣衮言今日內給事潘副宗奉宜敕旨賜臣緋衣一副并魚袋玉帶牙笏等寵自天來恩加望外顧已何幸循涯若驚臣衮中謝臣學愧聚螢才非倚馬典墳未博謬陳良史之官詞翰不工叨辱侍臣之列唯知待罪敢望殊私銀章雪明朱紱霞映魚須在手虹玉橫腰祗奉寵榮頓忘兢惕蜉蝣之羽恐刺國風螻蟻之誠難酬天造捧戴無力兢惶在心無任感荷屏營之至謹奉表陳謝以聞謝加銀青光祿大夫表代宗韋元甫大厯中臣某言伏奉去年月日制特加銀青光祿大夫跪奉詔書震驚心腑恩深益懼喜極成悲臣某中謝臣肄業儒門出身聖代始服勤於州縣遂竊位於臺省每自兢惕常憂滿盈一從效官三十餘載不敢受鍾釡之祿不敢敘節級之階中朝舊人或所知悉非唯懼速訕一作誹謗實亦有畏神明屬頃歲姦宄亂常中原多故聖皇委臣以武關方城之任賜以章服監護七軍先帝委臣以荆南江西之寄特加朝散兼察兩道今陛下又録臣駑駘薄效超授銀青三朝荷榮百生何報仰天局地自省無能撫本循涯罔知攸措便當門施棨戟綬綰銀黃車服有加子孫蒙福禽鳥飛動不知天地之功草木芬華空滋雨露之澤誓將輕命上答生成冀效涓埃以禆萬一代路冀公謝旌節等表代宗王緯大厯八年臣嗣恭言月日中使至伏奉敕書并賜臣冬衣一副李獻誠至奉宣聖旨重賜臣敕書一通并嶺南旌節及告身殊恩薦至列郡光生旌旄自天介胄增氣榮加慶外感在懼中臣某中謝臣幸承明命出鎮楚郊忽奉除書兼總閩徼捧彩牒而親承睿旨受命服而逺荷聖慈仰戴俯慙以歡為懼况臣名膺上將識昧中權豹韜無聞龍節見授但欲仗於百越震閫外之雷霆亦示未詳其事三軍壯轅門之鼙鼓光生澤國榮觀江城所恨荒服猶虞且有後命長安更逺未賜前期望丹闕而心魂共驚負鴻恩而灰粉何答不勝感激荷戴之至謝銀青光祿大夫河內郡開國公第二表代宗常衮大厯十三年臣某言內侍喬獻德至奉示答臣所讓新受階封德音宜即斷來表者臣自沐恩私不遑寢息所以上冒宸扆頓首拜章瀝懇於宴賜之辰披誠於對揚之次纍煩睿覽下執愚𠂻竊以榮級清階本因馭貴分茅錫土必在報功冀達舊章非勤飾讓天書再及嚴旨不移受詔兢惶撫躬震越伏自思念戰汗交馳恐負聖睿之慈當類表作亦審微臣之分何者謬升非次既參二府之榮縱避今恩不減四方之責唯當勉申駑蹇恭守紀綱茍塵露之可裨雖灰壤而無恨重承嚴命不敢固辭此生甚微厚施何答無任惶懼感荷類表作慙惶感戴之至謹奉表陳謝以聞臣某誠惶誠恐稽首頓首謹言謝加正議大夫表蘇冕臣某言伏奉今月日制書以臣職理粗進加正議大夫朝命逺臨天慈曲被感戴殊造震驚失圖臣某中謝臣自出書生謬分旌鉞拙直無援孤真少徒雖封域乂安參慿理化而涓塵靡效實懼素餐屬瘴癘為災私門多釁愧無烈士之死志而有犬馬之貪生輒狀表章陳乞骸骨遇陛下寬一戮之責起將廢之魂因請退之誠增進秩之典宸光獨照枯朽頓榮况堯舜在上蒸人自理日月既出爝火何光加以無左右之容無龔黃之政猥蒙天地之德載於金玉之音是則陛下切思理之心以風海內而臣受分憂之寄謬竊寵榮成命已行不敢固讓受恩益厚期於殺身無任感戴屏營之至謝舒州刺史兼加朝散大夫表代宗獨孤及臣及言臣伏奉七月十八日敕加臣朝散大夫使持節舒州諸軍事守舒州刺史充當州團練守捉使兼知淮南岸當界緣江賊盜臣典濠州無政可紀人幸不擾時和所致流者稍復年登之力臣敢貪此以為已能陛下過聽驟降殊私集作奬既增之秩又命以服無德受賞集作愧幸孰甚焉仰戴皇渥類表作澤且榮且懼今以九月二十七日到州上訖州經積年冦盜瘡痍之後百姓流浪集作窳十不一存臣已奉宣聖慈與之休息勞來鰥寡寬集作薄其徭賦以是集作是以招携亡者撫柔存者庶經秋之後或致集作頗或安集非曰能爾冀竭力焉臣無任感戴之至謹奉表陳謝以聞謝加司封郎中賜紫表代宗臣及言臣伏奉三月一日敕加臣檢校司封郎中使持節舒州諸軍事兼舒州刺史當州團練守捉使仍知淮南岸當界緣江賊盜賜紫金魚袋殊榮厚渥驟鍾臣身且喜且驚集作駭以愧以懼臣聞堯舜建官三考黜陟漢代二千石以循良稱者於是有璽書勞勉增秩賜金之制臣到官始半嵗職事未有所補見在户口才肯地著其中鰥寡疲弱不能自存者十猶六七徵遣征賦未嘗及期此臣政不逮力不任之效獲宥罪戾幸固深矣豈謂皇恩驟降復以古典命臣加位授服寵過臣量伏讀詔書懼孰大焉此州古荆舒之地詩人懲其剽輕復當賊冦虔劉比屋流亡之後其人心已難安易動况加徭役稅斂日不獲已緩之則驕急之則散輯柔底綏之道尤非愚臣所及伏當宣風集作伏思夙夜勉勵力安斯人省事以慰其愁示信以杜其爭亦冀俗稍務本人漸足食使闕之人歲增月長三歲大比以版圖歸於有司犬馬闕臣無任感戴之至代閻中丞謝銀青光祿大夫表羊士諤臣某言今月日吏部闕奉恩制加臣銀靑光祿大夫朝命逺臨殊私曲被喜躍無措感懼惟深臣某中謝臣謬忝方隅實淹歲序幸逢昌運得備職官昨者纍狀封章輒有陳乞敢希奬進虛荷恩榮而陛下不思天功為臣已力詔曰二千石便安吾人理有異等則就行賞典不繫年序夫人神休泰自感陶鈞封域乂安是恭理化雖云六稔無裨三載之文况當退思乃叨進秩之典濫慿微績陟在綸言超踐清階猥登明勸榮深載造光被生華匪臣孱愚所宜忝竊唯奉宣時令敬尊農祥保率土之康寧贊逺黎之生植而丘山施重螻蟻效輕上報無階稽首知懼無任感戴屏營之至為李希烈謝留後表代宗韓翃大厯十四年臣某言中使梁某至伏奉今月日制書授臣使持節蔡州刺史兼御史中丞充淮西節度觀察度支營田等使留後特逹睿恩殊常寵寄權兼専席榮重褰帷稠疊聖慈心魂戰越臣某中謝臣少小孤遺又無藝術叔父忠臣勵以成人自屬艱難親承任使備牙門之將總帳下之兵耳目腹心臣當職分毫釐絲髮臣合知委而依阿從事曖昧居心羣小用權臣不能規諌三軍潛怨臣不能警覺蒼黃之際遂成禍階十起之恩低佪未報一朝之難逼迫見留白刃交前脫身無路謝安內舉寧效驅馳疏廣告歸獨乖隨從在臣情地何以自容雖畢願仇讐才雪家怨而自慙面目有負國恩豈謂降以殊私副茲重鎮上承朱邸之令下奉玉帳之謨權副九州地方千里在臣微眇難繼威聲豈臣竊賣舊勳謬膺殊澤撫心泣血何地自容特望聖恩察臣微懇選朝廷舊德副節度重權許臣歸骨關西死且不朽文苑英華卷五百八十八
