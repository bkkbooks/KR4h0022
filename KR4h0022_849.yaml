body:
  text: 文苑英華卷八百五十宋李昉等編釋一此下十九卷英華所編失作者先後之次今正之陜州𢎞農郡五張寺經藏碑一首益州綿竹縣武都山淨惠寺碑一首梓州飛烏縣白鶴寺碑一首陜州𢎞農郡五張寺經藏碑庾信蓋聞如來説法萬萬恆沙菩薩轉輪生生世界豈直優波提舍祗夜修多而已哉是以熙連禪河質多羅樹七處八會三清一作清是四説皮紙骨筆木葉山花象負之所未勝龍藏之所不盡一作蓋雖復銀函東度金疊南翻秦景遙傳竺蘭私記譬猶得海水之一珠不下昆山之片玉若夫人雲深藏師子雷音梵志往生聲聞説戒雪山羅漢之論鷲嶺菩提之法本無極際何可勝言𢎞農五張寺者南陽張元髙寓居此地昔者千金之族見徙五陵大姓之民移家六郡蓋其流也元髙五子負荷遺訓離經辨志並是成名入室生光咸能顯德加以尊承慧業敬受法門兄弟同居共捨為寺伽藍肇建即以五張為名是知城居趙信仍名趙信之城殿入蕭何即號蕭何之殿加以象馬無吝衣裘是捨一作拾春園栁路變入禪林蠶月桑津回成定水平輿雖盛豈可獨擅二龍扶風最良不得専稱五馬寺主三藏大法師法映一作法映法師邑主洛州刺史張隆等財行法擅一作財法行壇身心罄竭兼化鄉邑道俗數千敬造一功德輪見成三百餘部雲書金繩金檢削之蒸粟之簡裝酸棗之珠並入香城咸封禪閣坐堂伏檻羌一作老非湘水之神緑房紫的足擬恭王之殿髙掌西望長河北臨鼎氣常浮爐煙咸起户牖寥廓吹萬龍門一無門字之風梁棟峥嶸落客二字一作實河源之樹僧徒雲集不逺燉煌之城學侣相奔更合華隂之市兩陜昔分實基王化二陵今阻翻馳羽檄虞公屈産交亂風塵召伯甘棠凋零霜露雖復兼能共治未遣渡河之獸烽柝是警實擾移關之民是以法王御世天人論道汲引四流周圓五怖故能調伏怨憎消除結縳法水津梁得無砥柱之難香山轍迹非復終南之險天子命我試守此邦墨竈未黔孔席無暖才臨都尉之境即有樓船之役既而南風不競北道言旋幕府既開邦君且止鄉俗耆老依然此别屬兹法事須余制文聊以課虛為銘云爾舍衛之國祗洹之園三明極地八會窮源連河競説勝辨爭論波提東度秪夜南翻非空即色離有無言達人止是獨悟重昏身雖繫鳥疑作馬心避騰猿禪樓却月義殿翔鵾回風香蓋反露珠幡西臨砥柱東背轘轅河鳴陽硤山嚮漢書響嚮通用蘇門翔禽歌囀流澗絃喧度河餘獸移關舊村昔為畿服今成塞垣城疑廣武地似樓煩爟烽並照象馬單奔無鍾襲莒有雨一作兩圍原不資十方誰釋三一作二怨風傾地柱火及天元銀鈎永固金牒長存封君馬首方事南蕃言從楊僕請謝劉昆用後漢劉昆虎渡河事正應前句英華誤改作琨益州綿竹縣武都山淨惠寺碑王勃原夫帝機寥廓雲雷驅妙有之功正氣洪荒清濁構乾元之象融而為川瀆結而為山嶽五城韜海接崑閬於大都八洞藏雲冠瀛州於巨闕造化之所偃薄靈谷之所啓處極緹油而縱觀詠頌寧殫出宇宙而髙尋風煙罕測是知玉巵無當遐荒非視聽之津金榜所存城闕盡江湖之致何必九虯齊騖直訪銀宫八駿長驅遙臨石室武都山淨惠寺者梁大清年中之所建也名山列嶽之舊仙都福地之湊黃龍負匣著寶籍於經山紫鳯銜書蔭榮光於井絡須彌山頂仍開梵帝之宫如意山中即有經行之地爾其盤基跨險列嶂憑霄日月之所竄伏煙霞之所枕倚飛泉瀑溜蕩滌崩崖緑樹玄藤網羅邱壑飛塵作氣被萬吹於中巖帝琰司寒宅千霜於北谷丹梯碧洞杳冥林岫之間桂廡松楹寂寞風塵之表是稱英鎮實瞰崇岡閭閻當四會之街城邑辨三分之地綿磎錦瀆下侵重巒玉阜銅陵旁分絶磴山川絡繹崩騰宇宙之心原隰縱橫隱軫亭皋之勢頃以黃旗夜徙紫蓋晨傾九服失圖三靈在疚姦臣躍馬據折版疑作坂而吟雲壯士聞雞擁陽關而嘯雨岷峨失險化為鋒鏑之場江漢橫流非復朝宗之國禪宇由其覆沒法衆是以凋淪國家淹有帝圖削平天亹紫宸反照皇階即敘萬國順百靈朝幽顯再立華戎一揆燭龍韜景避堯日於幽都雲鵬斂翼候虞風於晏海以為軒階具美功窮望祲之臺漢道兼𢎞力盡初疑作祈年之觀爰經寶地大啓祥宫撫香象而髙視鳴法螺而再唱龍垣淨土連帝道而重光鶴苑崇基脫皇居而首出况乎山積舊壤下鎮偏隅天帝遺墟上干躔次王舍城之宫闕白玉猶存給孤獨之園林黃金尚在法物由其大備盛德所以相尋株兵奉天藏之圖泉女獻山祇之籍離亭合榭因岸谷之髙低疊觀連房執岡巒之曲直丹崖反照畫栱相臨緑嶂斜煙雕簾間出豐隆曉震次復審疑作霤而悽皇列缺晨奔望崇軒而愕眙千香寶樹自起風煙九乳仙鐘獨鳴霜雪銀龕佛影遙承鴈塔之花石壁經文下映龍宫之業虹生北澗即挂新幡鳯下東岑還栖舊剎若乃尋曲􅔍歷崇隈周行數里直上千仭蒼松蓄吹臨絶徑而疏寒黛篠防煙繞回疆而結蔭春巖橘柚影入山堂秋壑芙蓉光浮水殿亦有山童採葛入丹竇而忘歸野老紆花向青溪而不返山神獻果送出菴園天女持花來遊淨國實杳冥之祕訣託幽深之逸境豈直淮南桂樹暫得仙家江左桃源終迷故老而已爰有寬闍梨者俗姓揚氏其先華隂人也因官徙地家於綿竹山分太華水帶長汾州嶽會同風雲感召玄經素論侍郎居八俊之英緑綬黃軒太尉列三台之首法師玉函降彩金瓶探色振八解之遙源踐三明之廣路靈機入證窮象載於初髫妙諦因心釋羊車於弱冠三千法界由廣位而出無明十二因緣自普濟而登彼岸𢎞宣誓願大拯沉黎揮覺劍而破邪山揚智燈而照昏室彌綸所被白馬盡於禺門權漸所開黃牛至于嶓冡虔誠樂土憩影兹峰乃以貞觀九年於寺西院立七佛堂一僧舍星毫動牖月面分階彩鳯銜旒神龍負塔飛煙湧座龕龕忉利之天杳霧成臺樹樹菩提之果朝散大夫行縣令清河張楚親承妙業俯刋貞琰林宗有道伯喈無愧法師夙機少晤應變多竒玉山中斷瓊林下雜支道林之好事語默方融釋惠逺之髙居風埃遂隔洎乎坐忘遺照返寂歸真城肆颯然若空山川黯而無色豈直巖枝泣血澗户摧梁而已哉縣令劉照彭城人也自碭山杖劔綰鳯歷於雲臺春郊授鉞嗣龍圖於白水玉壘三分之胄下雜公門金陵一霸之基旁參帝緒翠緌丹紱歷今古而先鳴人傑地靈冠山川而得雋君膺嶽瀆之秀挺風雲之會一作選昆溪劔鍔直照胸於疑楚澤圭璋潛周履行魯恭明德方升漢輔之階潘嶽能文且職河陽之縣仁徽可被闔境仰其風猷威德所加百城疊其霜彩尚乃康莊妙域光開不捨之壇舟楫愛河昭暢無生之業痛鷲林之殄瘁悲象教之榛蕪爰命緝興式光泉藪武蹊龍澗近分廬嶽之圖金闕瑶臺更討瀛洲之記銘曰武都仙鎮靈墟奧域邑動香城山開淨國澗流百道峯雲五色谷暗藤斜山髙樹逼千楣鶴列萬栱星懸分林構趾接磴開廛臨階竹樹繞棟風煙龕前怪石塔下秋泉緑崖疏徑青岑拒室霧道相縈煙房互出葉濃磎淨花深嶂密鳥度難尋猿驚易失簷分石竇地絡金沙丹邱抗月碧洞棲霞松開野路桂列仙家仙爐柏葉寶座蓮花砌因巖曲橋隨峰返果出天厨香來仙苑玉鑄疑啓曙金鐺照晚谷思鍾張山悲鐸逺閭閻踐勝銅墨髙情聲飛别邑望動専城懸金道肆刻石山楹千載之後于嗟令名梓州飛烏縣白鶴寺碑原夫玉都瓊室紫垣光大帝之庭金闕銀臺玄壁壯羣仙之域故能使神明有宅駕日月以長驅鸞鳯知歸撫雲霓而上出斯則會巢瑾穴上皇迷棟宇之尊考室靈臺中古識巖廊之貴然後冕旒前序提四海以為家登步大階列千門而有閲疑作閌况乎𡺸山形見旁行草昧之先闕光宅乾坤之右雖鶴臨西門龍宫與王法同亡而象化東流鴈塔與遺儀繼起白鶴寺者蓋菩提寺之餘址梁武皇之所建也香城福地之舊三巴五蜀之湊裂岷山之奧域分井絡之榮光西包玉壘之墟北瞰銅陵之野南扄列第門庭萬家東户連峰岡巒千里實伽藍之勝迹得迦衛之英模憑絶磴以圖規俯長溪而作固自金陵不競玉鏡無章地池興南露之悲亭障切北風之候崩山鬭水觸地網而三分墜月奔星劃乾綱而五裂中原錯戾慈門為虎豹之墟滄海橫流定水穴鯨鯢之浦懷山既蕩法衆咸淪林院榛蕪軒堂委寂遂使悲生棄井堙玉甃於三泉歎積為山移瓊峰於九仞皇上攝千秋之寶運緒三聖之宏機挾宇宙而先神御雷風而首出靈功不宰華夷沾共貫之恩至道無思霜露得平分之序考禎圖於日慎寤寐同符稽妙册於年刀疑幽明合貺然後東巡巨鎮初疑六聖而撫寰中南面天壇朝萬方而小天下皇威既暢寶應齊歸川嶽薦靈風煙動慶丹烏抱日疑增帝閣之華素鶴低雲若赴仙庭之會昔白魚黃竹業未峻於封崇赤鴈芝房名不登於梵宇爰徵瑞典肇錫嘉名重興波若之臺更起招提之院金繩夕布綿秀闕以開壇玉榜晨舒擁回峰而闢户爰有𢎞演上人者法門之秀士也行超常凍思越恆飢悲淨域之為墟喜皇波之普泛縱還舟於苦海驚浪旋夷比歸馭於邪山靈關非險於是淨財雲委真衆煙馳如趨摩勒之宫似向毗邪之國縣令梁𢎞悅首加甄緝縣丞梁敬一親昭施典上憑天旨爭開舍利之壇俯會衆心競起須彌之座禺同故嶺石鮮堅華廣漢餘坰地多疏斥事關經始人懷祗懼重階不就空思天室之氓寶像無資未獲黎陽之士豈非冥期肹蠁功參造化之外故能果脣間發蓮眸周映貝齒含滋璿毫起照三十二相臨玉座以相輝八十四儀擁金山而圓立層甍四合爍奔電於丹楹復殿三休絡浮煙於翠幌因髙積磴疑遷倒景之臺架嶮連榮闕立迎風之觀雕簷競注縈霧道以龍回繡桷爭飛傃雲衢而鳯矯寫歸禽於寶鏡誤接朝鸞圖走獸於文璫疑栖夕兔雷霆蓄泄裁臨承霤之間煙雨飛浮未出層巒之下耀丹青於菌壁妙迹疑存炳銑鋈於蓮龕神輝自燭鏘鏘櫩鐸聲傳桂葉之風熖熖山爐氣結松隂之藹仰真容於始旦滿月晨昭窺列棟於方宵長虹夜發香泉激溜有符溫淨之池珍木成行無忝祗園之樹信煦尼之别府實兜率之殊庭者乎愛友上座法師等情機藻瑩戒律圓明披玉笥以研芳候瓊鐘而肅慮禪姿曉映依稀同雞岫之前梵唄晨臨髣佛像玉山之曲縣令獨孤儉等或鵬垂待運終燮道於中台或蠖屈求伸且毗風於下邑鄉望儀曹等或鹽泉錦室家稱二燭之毫疑作三蜀之豪左思蜀都賦云家有鹽泉之井又云三蜀之豪或抱朴懷仁譽擁雙流之美或以為山川肆踐猶紀石於弇州陵谷生哀尚沉研疑作碑於峴首况乎德因時盛慶流封拜之辰名為功登事屬文明之運豈可使璿猷被物終昧燮於玄機金字韜華不題勳於翠琰敢作頌曰睿塗菌疑藹靈機翕忽玉架天都金裁地闕法王利見香城繼發鴈塔齊雲龍宫瘞月長江近域廣漢遺居禪扃共往梵宇全疏迹均梁後義切秦餘山川牢落榛莽邱墟有聖聿興惟皇降撫因天慿地為雲為雨日觀龍驤煙壇鶴舉肇開嘉號重光淨土猗歟上士道場真政物觀成章子來興詠土石呈彩人靈合慶寶座晨嚴金山夕映紫微分殿青岑暇疑郭復岫縈樓攢峰跨閣月低璿鏡星連寶鐸彩鳯將飛蟠虹未落森沉桂宇肅穆筠壇花明栁砌葉暗朱欄溪留夏雪澗咽秋湍山虛梵冷谷靜鐘寒法衆爰依禪徒戾止望風三蜀征塵千里頓首玄墀歸心翠扆業起疑作超有色功齊無始偉哉冥化妙矣能仁去來均迹前後俱身寂滅為樂般若為因題芳翠琰敢詣靈津文苑英華卷八百五十
