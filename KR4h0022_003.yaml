body:
  text: 文苑英華巻三宋李昉等編天象三慶雲抱日賦二首日月如合璧賦三首寅賔出日賦四首慶雲抱日賦以雲日輝映精彩相耀為韻闕名太陽之昇兮鑠景氣而澄氤氲聖人之徳兮上蔚結而生慶雲外浮相煥中映成文郁郁昱昱繽繽紛紛粲兮若組繡之縈寳鏡翊兮若申甫之相明君無心而生應徳而出不曜青以干吕能叶慶以扶日縹緲蜿蜒遊龍相逐而不如斐亹葳蕤彩蜺舒状而難匹始流形於孤嶽終垂象於九圍麗碧霄以增媚捧金烏而徐飛感覆幬之仁效靈表瑞慿𤣥黄之氣耀影含輝夫天道無言以物應聖聖功不宰物自效命故有非烟非雲為祥為慶付我元吉彰我元盛豈徒衆彩錯出重輪交映者哉且日者實也象君而貞明雲者運也應時而發生就日而浮若就君之朝聘五色成象告五方之和平騰乎天假其隂隲見于晝資厥炎精懿乎煌煌燭空縵縵呈彩域中之目無不仰觀天下之心若有所待何必蒼梧稱羙横汾是載者乎夫變化翕忽希夷混茫理至則無幽不感徳盛則化妖為祥煥厥霄極亘于天光彼丹甑玉燭蓂莢芝房孰若此感化而見五彩其相者焉是知聖與冥通理由感召故我后之盛徳不求彰而自耀第二同前韻闕名太陽淳精兮表徳於君徳感珍瑞兮應天垂文曉望東方昇耀耀之麗景晴分上漢覩郁郁之祥雲若乃運叶堯年靈符舜日燦玉葉以繁布抱金輪而半出灼爍兮乍似漢祖隐居横紫氣曈曨兮又若楚王乗舟捧萍實豈錦江之所能擬諒秦鏡之所非匹既而五彩不散三足増輝英英而浮光並射杲杲而合璧相依信乾坤之道不昧知君臣之徳同歸我唐由是越五馳聲超三表聖臣如雲而仰均雨露君並日而用敷徳政故表乃禎祥之主遂其雲日之性始漠漠以飛空復昭昭而逺映跡前聖之能事曷比夫今日之嘉慶也徒觀啓重霄而逈出得中道而遐征不傍樓䑓詎隨於聚散不依城闕但耀其真精氤氲兮匪氛霧而能雜泱漭兮知沴氣而不生懿夫日麗天兮出巨海瑞應臻兮見其彩雲浮空兮藹休祥靈輝集兮寳其相故可以卜年永祚奕聖蕃昌大矣哉兹瑞之為慶禆福善而無疆若鯫生者飲化闕廷削跡海嶠覩慶雲而動咏仰聖日以觀妙是知物無不感幽罔不照蠢兹動植之類莫不息隂而發耀日月如合璧賦以應候不差如璧之合為韻韋展國家纂宏天綂紹啓王跡獵英華於百代漱芳潤於六籍於是闡睿厯於疇人鏡𤣥象之氷釋察運行之盈縮見分度之損益五星同舍状自叶於連珠兩曜集辰候不愆於合璧是知隂陽巻舒日月居諸時㑹而乍離乍合順行而匪疾匪徐徴於顓頊之法考以軒轅之書百靈以之肅若四海由其晏如惟上元之嵗時和氣茂惟南至之辰日月來就望烏兎之交集瞻斗牛而既覯璧惟圓制象其圓正之形玉以貞稱表此貞明之候可以襲承天意可以敬授人時觀䑓之瑞斯騐馮相之言不欺方見仲尼無得而踰矣乃知潘夏何足以當之臨楚山豈和氏而能識入秦野非相如之見持且夫日者尊而有常月者謙而不雜每有徳而昭感必効靈而允荅分則列照於三無聚則和光於六合徒觀夫炳煥可嘉毫釐靡差珥作如虹之氣波為旁達之華映彼仙娥有似夫佩而比徳吐兹王字更疑乎瑜不掩瑕然則天垂象兮至明厯為功兮可乆重之斯實理本輕之則為亂首是以堯之分命典誥髙其能然魯也失官春秋貶其誠不吾君之所懲勸将永代而遵守顧惟愚懵竊覩嘉應鈎深索隐雖無瞽史之才頌徳歌功敢借詩人之興前題以兩曜相合候時不差為韻盧士開聖人在上與天地廣𤣥徳彰於日月洪休備乎瞻仰合璧之為状也穎曜相向圓明比象麗重光於一軌開混茫而精爽其真不遷其合以兩和隂陽而二儀交泰辨分至而九服融朗既無異於弦望故王道所以坦蕩也至矣哉考日以正時本於𤣥妙㑹日以合月宜乎暠曜歴躔次而雙滿合晶耀而並照一隂一陽曰柔曰剛既恒其用亦曜其相其合也契天地之明其璧也本日月之光國有道則循其度邦無道則失其常上元昇而軒厯著太初復而漢運昌寧止纎纎西樓昭國憙而形偃杲杲東戸表臣忠而據黄者哉懿乎一徳昇聞天休下荅示軌範於萬代發文明於六合且乾道㣲而難究惟君是候帝徳廣而無私惟天是祐明者莫昭於日月故表之以㑹同同者将慶於和平乃整之於宇宙同輪共規叶慶應期既周天而同道乍皎皎以遲遲璧之生也本乎律律之用也在乎時厥祥云乆逢昏則否其興也明后惟道之遐其應不差是昭乎皇家諒我后之明徳發大道於光華何必堯年之與漢代而兹厯之可嘉前題以天地交泰日月貞明為韻賈餗格天之功兮不宰而成麗天之象兮乃合其明躔次無差乃可立圭以辨禎符既叶必俟重璧而呈於是曜隂魄騰陽精将周旋而一體異逺近之相傾時也萬類昭融四方清泰激朝暉之杲杲發夜色之藹藹懸異象於人間吐榮光於天外挺連城之價誰敢指瑕居匹夫之懐非同賈害金烏共色玉兎増鮮麗萬室兮瑶䑓共美泛千林兮瓊樹争妍變方流於斜漢疊圓影於遥天落照西沉若欲抵於昧谷澄暉東上又如返於虞泉熒煌異質燭耀非一抱珥之彩潜銷如圭之容闇失于以表𤣥象明隂隲瑞至徳於堯年契昌期於漢日懿其經紀不忒明宵有程聮彩徘徊似有求於潘子雙形宛轉若可賜於虞卿既同道以脗合亦相推而運行見乎天則一人有慶比於王則百度惟貞矧今馮相觀祲而罔愆羲和敬授而無闕将冥照於幽昧在宣精於日月是以靈符必集休祜可包不縮不盈自契於三年之閏無偏無黨何憂乎十月之交豈是合彩呈姿和光効異陵珠星而掩縟逗洛水而増媚東西並耀疑夾鏡於長空昇降相沿異藏珍於厚地然後操觚進牘賦邦家之盛事寅賔出日賦以大明在天恒以時授為韻王儲惟天為大兮堯實則之命羲和而馭日俾出納而從時肇嵗首以平分既中星鳥及宵衣而敬導始見嵎夷所以示農功之有序叶君徳於無私我國家克定三元光臨四海纂唐虞之舊說崇徳禮而斯在将舉正以履端奉天時而不改繇是春官蕆事太史作程天子居青陽之左个覽萬物之初生始昭宣於東作終協贊於西成杲杲臨空無幽而不燭遲遲監下有蟄而皆驚伊兆人分地之利我聖上則天之明淑氣載揚暢禽魚而共躍融風乍扇逮葵藿而咸傾庶績其凝三農式就髙䑓紀於雲物大野陳其蒐狩畢嚮化以觀光亦順時而敬授嵗如何其嵗既登節盈縮兮日有恒嵗如何其嵗将起兆發生兮日之始苟奉順而無違得禎祥而所以原夫君比徳於日日麗光乎天撫有萬方每朝君於嵗始照臨庶物故出日於春前煦百泉而氷泮薰九陌而蒼然合璧表無為之化重雲示有慶之年信惟貞而惟一示無黨而無偏客有藏器俟時卑躬思泰遇乾坤之訢合覩日月之光大莫不向春景以自娯沐堯風而永賴第二同前韻獨孤授登科記授作綬古先哲王允釐内外雖庶政之咸叙在司天而為大所以叶乎上下所以察乎交㑹其職廢而時令則乖其職修而黎人永賴嵗既陽止東風作矣惟時羲仲奉若天紀候暘谷之初昇揆農功之當起寅賔克展守而勿失表耜乃修視其所以觀乎旭日之漸也麗蒼穹而曜晶按黄道而徐行萬物發春仁氣良由兹始四方仰照陽徳恊於離明盈縮必循夫晷度職司寧闕其将迎木位值於扶桑初杲杲以出土膏潤於南畆且澤澤其耕故王者重焉官不虚授考之厯象則象是用貞凖之田農則農靡愆候惟帝典之明徴示人有常惟日官之無改永代斯在平秩乎下以播百榖欽若乎上以刑四海慎爾有司惟其敬之是将邁景徳於太皥俟神功於女夷玉燭開耀金烏效遅致人和而嵗羙無亂日而廢時况吾君承乾𤣥化昭宣叙三光以著象乗六龍而御天經紀不忒職官惟賢分命之事舉曲成之道全觀寅賔之出日端稼穡兮大田願聆舜絃歌唐年因末光之可就與羲馭而廻旋第三同前韻袁同直登科記第五人日為天經春為嵗始貞三農而允恊于度調四時而不愆于理敬其所出導其所以升黄道而萬化融出青方而百工起所以放勲欽明羲仲是司恊和天意敬授人時闕其職則厚生斯廢行其典乃庶績咸熈且曉色曈曨清光杳藹垂大明於有截察幽深於無外守晦明之度數順躔次之交㑹合一徳而無私位三光而稱大煦育無偏隂陽氣宣應律管而初變暖林花而未鮮興農功於燠室發耒耜於原田既陶陶以受嵗亦欣欣而樂天則知日以陽為徳君以政為恒陽虧則物無仰照政失則年用不登睹寅賔之有則知平秩之方𢎞瞻彼漲海日之所在出扶桑而吐輝泛暘谷而浴彩貞明宇宙恊順時候将䖍敬而專其所職豈出納而輕其所授我國家獻嵗發生舒勾達萌警大田於東作紀斯箱於西成君徳與日徳俱逺道光與日光齊明将授官而守職俾萬禩而為程第四同前韻周謂登科記第二人陶唐氏欽若日出資授人時乃命羲仲徃哉汝司紀寅賔而建始旌照燭兮無私暘谷初昇退羣冥於仄陋扶桑適上分萬象於毫釐日之為徳也均日之為功也大作朝夕之程凖見乾坤之交泰無逺無近幽而必通惟植惟生罔不咸頼出於東兮示發生之所在傾於西兮覩光靈之不改必将表嵗以務穡豈獨陵虚而賦彩爾其孟陬叶月太簇和聲農祥正而土膏咸動庶績凝而百度惟貞于以秩東作于以望西成塗足沾體勉穡夫與田畯布和施令樂國泰而君明豈不以五行班序七曜宣精者哉則有三足呈祥重暉降祉瑞聖斯應為光有以逺色杲杲非童子之辨焉浮彩昭昭惟仲尼之掲矣爰考休徴圖牒與能既煦育之無外同寅賔而有恒賓者導也惟人之導陽寅者敬也惟人之敬授諒難踰而可仰參地載而天覆觀其燁熠動川澄明麗天消瀌瀌之殘雪斂藹藹之輕烟謡東君於楚客祀岱嶽於漢年願捧圖稱瑞以相宣文苑英華巻三
