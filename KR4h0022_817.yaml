body:
  text: 文苑英華卷八百十八宋李昉等編釋氏二院下常州建安寺止觀院記一首廬山黃石巖院記一首佛像上利州北題佛龕記一首福州南澗寺上方石像記一首移佛記一首再修成都府大聖慈寺金銅普賢菩薩記一首繡西方大慈大悲阿彌陀佛記一首畫千手千眼大悲菩薩記一首夔州始興寺移鐵像記一首院下常州建安寺止觀院記梁肅沙門釋法顒啓精廬于建安寺西北隅與比丘衆勸請天台湛然大師轉法輪于其間尊天台之道以導後學故署其堂曰止觀初南嶽祖師受於惠文禪師以授智者大師於是乎有止觀法門大旨止謂之定觀謂之惠演是二德集作法攝持萬行自凡夫妄想訖諸佛智地以契經微言括其源流正其所歸圓解然後能圓修圓修然後能圓證此其略也自智者五葉傳至今大師當像法之中誕敷其教使在家之徒撥邪反正如天雲降雨無草木不潤升其堂者甚衆其後進入室不十數人法顒與居一焉豫以為法門有三觀遂徴之此堂蓋非緣不成空也有之以為利假也不廣不狹不奢不陋中也又以淨名之喻宫室謂於虛空然集有後字不能成隨其心淨則一切境淨作一物而觀者獲數善焉又况我大師居之為斯人之庇乎小子忝遊師門故不敢不志時大厯九年冬十一月日記廬山黃石巖文粹有禪字院記劉軻古老有言曰太極之氣積而為二字作成一山嶽泄而一無而字為川瀆然則匡阜之氣一作境其大也一作者乎庚辰嵗山客劉軻採拾怪異自麓至頂却下半里餘次于黃石巖巖中有棲禪子不知其幾許臘而瓌行峻節人事難能僕髙其人而信宿忘返一無此十八字乃一作及賾其輕重頗見其宅心之地乃問其住年但手指松桂云初一無此字毫髮我植今環人臂烏飛兔走吾復何齒矧卯戌之昏旦霜炎之凍灰廬山記拾遺作炙生落之榮悴去留之沿泝雖云云一作之非自彼而於我蔑如也於戲向非巖房峭絶僧行孤峙則人境兩失故文粹無此字一本作固其宜也復何言哉觀夫煙雲生於一作雜乎履舄風嵐出一作嵐靄生於襟袖羣形浩擾俶一作併人或作入眸子每至煙雨初霽山光澄練泠泠仙語如在耳右况又聳凌兢上冥冥安一作焉知不能與洪涯一作崖接袂浮丘連駕盈縮造化吐納皓氣絶慙容於厚面逺喧卑於腥一作之臊穢乎何不得然四字一作不得而然者蓋鈎也餌也名為利鈎利為名餌吞鈎食餌手足羈鎖彼安一作焉得跳躍於此乎是知夫禪僧心去桎梏一作夫禪子脫去桎梏四支宣展動與雲無心靜將石何機物我一致端邪徑塞僕所謂非斯人不能住斯境也禪師宜春人俗姓劉名常進時人以師久住遂以其姓易其巖名也一作云佛像上利州北題佛龕記蘇頲禮部尚書兼益州大都督府長史使持節劒南安南一作按察節度諸軍州事許國公蘇頲敬造因寓言曰吾見夫山連岷嶓水合江沱山兮水兮路窮嶮鬱南望兮此一作北情多吾又見像法住世于巖之阿百千萬億兮相觀我載琢載追兮吾匪他伊古昔兮焦吕擬作莒不懼必忠信兮艱危若何故吾因空而即有孰不回向以檀那行矣些陽景頽兮翠改色隂風起兮自增波福州南澗寺上方石像記歐陽詹萬物闐闐各由襲沿無襲無沿而忽以然苟非妖怪實為珍慶斯石像者其珍慶歟始孕靈韞質朕兆未見則峩峩巨石巖峭山立鎮郡城之前阜壓蓮宫之上界海若鞭而莫動天將泐而終固皇唐天寶八年五月六日清晝忽騰雲傍集作旁湧驟雨來集驚颷環駭軒文粹作匉訇杳冥雄雄者雷騞然中震迸火噴一作焚野大聲殷空岑嶺躨跜潭洞簸蕩須臾風雨散雲雷收激文粹作頂辟輪囷斬焉中闢南委地以梯集作柿落北干霄而碣一作揭樹不上不下不西不東亭亭厥心隱出文粹作隱隱真像三十二相具八十種好備列侍環衛品覺有序莊嚴供養文物咸秩融蜀本作端然慈面儼矣儀形似倚雪山而授法如開月殿以趺坐異矣哉不曰博聞乎未聆於既往不曰多智乎罔測其所來且物之堅莫堅於石况髙厚廣袤又羣石之傑一朝瓜剖中有雕琢其為造石之初致有相於外封乎其為有石之後入無間以內攻乎噫不可以人事徴試請以神化察巍巍釋氏發揮道精其身既傾其神不生等二儀以通變齊四大而有力教於時有所頽靡人於教有所忸怩則為不可思議以煦以吹故示此無迹之迹難然之然俾知其集無其字我存存入集無入字我之門經曰千百億化身蓋隨感而應茲身者則千百億之一焉昔諸佛報現皆托於有命則有生有生則有滅曷若因其不朽之物憑乎集作其不動之基形既長存法亦隨是與夫為童兒集作男而出世假長者以來化玄玄之徼則雖一永永之利則不侔可以禮足而悔罪寄影以安樂豫則求福不回者焚香跪仰或從釋子之後故於文粹作為巉巉之餘仭聊書其所由來貞元六年七月十五日記移佛記沈亞之元和四年三月五日杭州報恩寺長老與其鄉閭父子將徙故佛像歸復于其寺佛至乃饗長老使白其由於亞之而求詳録焉沈子曰西域之有神教流於東域中者其教像法其法者名曰佛自稱曰天人師又曰世尊出其言亦曰經驗其經之説佛去世而後摹其形焉像其真與衆瞻仰之故法之言像由斯一有興字也其或範金鐵以為之合土木以為之堅之以脂膠飾之以丹漆五色然後形神儼然成其像舉其數體有為尊而坐者有為卑而拱立者有跪集有者字如受教諭者有執樂而絃者吹者有具其形怪荷戈而勉強者有瞋目而叱吒者摹鬼神焉此為像之外者也其性之旨為戒慎焉集無焉字正邪去惡為濟渡力導盲聾警沉溺使民無不善如我仁誼慈惠然此為像之內者也又説有已來之生來生之後生為福則福應為禍則禍應因緣化而設其旨或由是舉域大敬自天子逹於庶人一信佛之來於今六集作八百餘年矣其間亦時神怪焉先天中其寺之佛事具足如向之所有無何水火集作大是災生民流沉溺于是邦其寺之佛事卑而拱立者跪而集作如受教諭者執樂而絃者吹者衛而荷戈叱吒者皆毁也散其宇皆落唯尊而坐者獨巋焉而存由是納去又重其裝集作莊敬焉數嵗其鄉人後生敵惡者十誡其三四故此鄉之人思其功力復求而歸之與其敵惡誡一作是欲誡敵惡而一有與字敬順之道明矣嗟乎忠信仁誼不舒信於人久矣而皆以已生來生之後因緣禍福之説化行矣集作焉今余因長老請余記移佛之由遂得道教之意集無此字所以意者欲使羣生隨其機以悟之其機髙者其性惠見其內像而內覺發其心而能至其正其機下者其性回見其外變一作像而外覺反其心而後歸其正是故精粗其內外之像以陳之再修成都府大聖慈寺金銅普賢菩薩記韋臯真如常寂色相假名法本無緣誠感必應大慈寺普賢像蓋大照和尚傳教沙門體源之所造也儀合天表制侔神工蓮開慈顔月滿毫相昔普賢以𢎞誓願於南贍部洲贊釋迦文拔羣生苦而塵俗昏智莫覩真相雖同諸法究竟寂靜而隨所應為現其身即色即空皆菩薩行自昔鎔于寺之東像成功巨莫能締構危棟泄雨頽墉生榛狐狸梟鷲號嘯昏晝於戲明可以照幽晦教可以逹羣迷何廢興之變隂隲於冥數昔大厯初有髙行僧不知何許人曰斯像後十年而廢二十年而復興我今皇帝神聖纂圖詔四方藍宇修舊起廢斯其明效也臯因降誕慶辰肅羣寮戒武旅上崇景福齋于斯寺觀象王雄傑天眼慈矚一作瞻禮足諦視恍如有神而廢故湫漏殆無人迹將何以昭誘沉淪發揮誠敬遂南遷百餘步度宏規開正殿因詔旨諭羣心千夫唱萬夫和奮贔屓岑穹崇橫絙運巨力拔始雷殷而地轉歘雲旋以山廽面西方而聖教攸歸鎮坤維而蠢類知向於是平坎窞翦蒙籠橫空凖繩審曲面勢連廊靄以雲屬三橋揭其虹指廓廣庭之漫漫增重門之巘巘是知至道默存於濁劫元功必啓於康時不然何神像巍巍冠諸有相久而弛廢將有待而興乎觀其左壓華陽之勝中據雄都之盛岷江灌其前趾玉壘秀其西偏足以彰會昌之福地𢎞一方之善誘安得不大其棟宇規正神居哉夫像未一作設陵夷去聖彌逺言教者必滯於物遺物者亦住於空將求乎中𢎞我至教乃擇釋子逹真源之所歸者于以居之臯受命方鎮十有七年求所以贊皇猷裨大化嘗以萬人之心不俟懲誡靡然歸善者釋氏之教𢎞矣况冥祐昭報大彰于時崇而守之亦同歸於理也是用上承聖意虔奉天心存像存教以勸其善貞元十七年十一月二十日劒南西川節度觀察處置并雲南安撫等使光祿大夫檢校司徒兼中書令成都尹南康郡王韋臯記并書繡西方大慈大悲阿彌陀佛記穆員儒之執喪也極其哀止於毁其於既往也則無及焉西方聖人以大慈大悲為功追護往生為誓凡爾銜恤靡至克窮罔極如有求而不獲者何末由斯而泄之貞元八年百一旬有六日我伯姊前烏程令𢎞農楊萃一作華故夫人之喪再周先是哀子泰衡嵩復觀洎女子子字一作十娘相與號曰我之生也自親之生今我報親幾何而既何先王制禮不即人心何羲和迅節不恤余慕於是合哀僝聖誠而禱之男𡨕其心女集其指逮茲日而阿彌陀佛現嗚呼西方之教念焉斯至矧是像也一縷一哀一哀一聖凡億萬縷為億萬聖億萬大慈大悲一一作一之乎爾願其為追護也可訾量哉泰等毁傷見者之神號墮鄰人之淚是月之慕有逾其初舅氏員撫而廣之曰親之於子也生三年而免於懷子之於親氏喪三年而免於服是則服之終也豈哀之終乎記所謂君子有終身之憂蓋哀之終也此又哀之終也豈孝之終也經曰立身揚名以顯於後世夙興夜寐無忝爾所生此孝之終也若然者爾之孝爾之哀偕爾身齊爾性於是始孝何痛夫終焉員悲不能文強為之記畫千手千眼大悲菩薩記貞元七年孟夏月再旬有六日我伯姊𢎞農楊氏夫人之喪期女祕書省正字河東裴求巳妻痛夫四序往而還萬化周而始慈顔復覩終天無期伏念身體髮膚重於所受不敢以毁生為報其發於一號者則昊一作旻穹可聞泉壤可徹恭西方之教有追護之功崇建是像庶乎有及吾聞之古之泣血不必以血為淚痛之至者如泣血焉是像也起爾一心成千手千眼自素為繢自繢為相自相為聖自聖為福所以復于爾所生者庸非爾之血乎希微窈𡨕之聞一作間惟至可至之至者孰至於哀哀爾思舅氏員自以一虧而不復續者骨肉之謂泣撫其事從而記一作紀之夔州始興寺移鐵像記劉禹錫佛薪盡于乾竺而像教東行是法平等故所至為淨土是身應供故隨念如降生先是魚復人有以利金為彌勒像者重千鈞睟容瑞相人天兩足鳬氏卒事而他工未備故寓于西偏不知其幾年矣寺僧法照瞻禮發信赤肩白足入諸天集作大域乃至聚落無空過者積十餘年得信財無量繇是購工以嘗巧募徒而畢力四輩增增工麾以肱中樞外脈隂轉陽動歘如地湧岌如山行大匠無言尊容嚮明青蓮承趺金獸捧持藻井花鬘蔥蘢四垂邑人膜拜如佛出世法照以願力能就泣於集作于佛前因持片石乞詞以示後按此寺始於宇文周初瀕江卑庳皇唐神龍中為水所壞有波那賴耶國僧廣照浮海而至頓錫不去遂移於今道場所山曰磨刀嶺曰虎岡其經始與克終集作修皆蕃僧是力後之有志者豈無人哉法照夔人姓穆氏年十有五出家依江陵名僧受具肇自貞元二十年甲申歸此寺願崇建有為凡修大殿立菩薩大弟子侍佛左右逮長慶癸卯有成其善植德本者歟文苑英華卷八百十八
