body:
  text: 文苑英華巻三百三十一宋李昉等編天雪二首雨六首月五首雲二首霹靂一首明河一首四時春三首秋四首冬三首天白雪歌朱孝亷凝雲凌霄漢從風驚樂府作飛且散聮翩避幽谷徘徊依井幹既興楚客謡亦動周王歎所恨輕寒早不待春光旦樂府作春陽旦瑞雪篇劉廷琦紫宸飛雪曉徘徊層閣重門雪照開九衢皛一作晶耀浮埃盡千品羌池贄帛來何處田中非種玉誰家院裏不生梅埋雲翳景無窮已因風落地吹還起先過翡翠寳房中轉入鴛鴦金殿裏美人含笑出聮翩艶逸輕相鬬容止羅衣㸃着渾是花玉手摶來半成水奕奕紛紛何所如頓憶陽園二月初羞同班妾一作女高秋扇欲照明王乙夜書姑射山中符聖壽芙蓉闕下降仙一作神車願垂睿澤流無限長報豐年貴有餘此詩一百五十五巻重出前已削去注異同為一作秋雨嘆三首杜甫雨中百草秋爛死堦下决明顔色鮮着葉滿枝翠羽盖開花無數黄金錢凉風蕭蕭吹汝急恐汝後時難獨立堂上書生空白頭臨風三嗅馨香泣二闌風長音仗雨一作蘭風伏雨飛秋紛紛四海一作萬里八荒同一雲去馬來牛不復辯濁涇淸渭何當分禾頭生耳黍穗黒農夫田父無消息城中㪷米抱集作換衾稠相許寧論兩相直三長安布衣無此數反鎻衡門守寰堵老夫不出長蓬蒿稚子無憂走風雨雨聲颼颼催早寒湘鴈翅濕高飛難秋來未曽集作省見白日泥汙后集作厚土何時乾夜兩吟集作歌陸龜蒙屋小茅乾雨聲大自疑身着蓑衣卧兼是集作似孤舟夜泊時風吹折葦來相佐我有愁衿集作襟無可那纔成好夣剛驚破背壁寒燈不及螢重挑却向燈前坐和柯古窮居苦熱喜雨韋蟾貞機澹少思雅尚防多僻攬葛猶不畏疑勞形同處瘠頭燋詎是焚背汗寧關炙方欣見潤礎那虞悲鑠石道與古人期情難物外適幾懐朱邸綬頗曠金門籍淸興已蕭蕭陳柯將槭槭玉律詩調正瓊巵酒腸窄衣桁襲中单浴床抛下綌黎侯寓於衞六義非凡格秋霖歌李沇西方龍兒口猶乳初解驅雲學行雨縱恣群陰駕老虬勺水蹄涔盡奔注葉破苔黄未休滴膩光透長狂莎色恨無長劍一千仭劃斷頑雲看晴碧閒霄望月前人巻箔舒紅茵當軒翫明月懿哉深夜中静聽歌初發苔含殿華濕竹影蟾光潔轉扇來清風援琴飛白雪行愁景候變坐恐流芳歇桂影有餘光蘭燈任將滅拜新月張夫人吉中孚妻拜新月拜月出堂前暗魄初一作深籠桂虗弓未引弦拜新月拜月粧樓上鸞鏡始一作未安䑓蛾眉已相向拜新月拜月不勝情庭前風露淸月臨人自老人望月一作望月更長生東家阿母亦拜月一拜一悲聲斷絶昔年拜月逞容一作儀華如今拜月䨇淚垂廻看衆女拜新月憶却紅閨年少時一作皆樂府明月李如璧三五月華流炯光可憐懐歸郢路長逾江越漢津無梁遥遥永夜思茫茫昭君失寵辭上宮娥眉嬋姢卧氊穹胡人琵琶弹北風漢家音信絶南鴻昭君此時怨畫工可憐明月光朣朧節既秋兮天向寒沅有漪兮湘有瀾沅湘糾合淼漫漫洛陽才子憶長安可憐明月復團團逐臣戀主心愈恪棄妾思君情不薄已悲芳歲徒淪落復恐紅顔坐銷鑠可憐明月方照灼向影傾身比葵一作藜藿秋閨月權德輿三五二八光一作月如練海上天涯人共見不知何處玉樓前乍入深閨瑇瑁筵露濃香逕知愁坐風動羅帷照獨眠初捲珠簾看不足斜抱箜篌未成曲稍映粧䑓臨綺牎遥知不語淚䨇䨇此時愁望知何極萬里秋天同一色靄靄遥分陌上光迢迢對此閨中憶早晩歸來歡讌同可憐歌吹明月中此夜不堪腸斷絶願隨流影到遼東洞庭秋月行劉禹錫洞庭秋月生湖心層波萬頃如鎔金孤輪徐轉光不定逰氣濛濛隔寒鏡是時白露三秋中湖平月上天地空岳陽城頭暮角絶蕩漾已過君山東山一作孤城蒼蒼夜寂寂水月逶迤遶城白蕩槳巴童歌竹枝連檣估客吹羌笛勢高夜久陰力全爽氣肅肅開清躔浮雲夜鳥歸四裔首冠一作闞字星斗當中天天鷄相呼曙霞出劍影含光譲朝日日出喧喧人不閒夜來晴景非人間慶雲章陳子昂崑崙元氣寔生慶雲大人作矣五色氛集作氤氲昔在媯帝集作帝媯南風既薰叢兮集作芳爛漫戫戫集作郁郁紛紛曠矣千祀慶雲來止玉葉金柯阼我天子非我天子慶雲誰昌非我聖母慶雲誰光慶雲光矣周道昌矣九萬八千天授皇年白雲歌寄陸中丞使君長源釋皎然一見西山雲使人情意逺意高登詠何遥迢道妙有如君舒巻一作如君有巻舒縈空疊景多麗容衆峯峯上自為峯潔白不由陰雨積高明肯共雜煙同萬物有形皆有着白雲有形無一作難繫縛黄金被鑠玉亦瑕一片飄然汙不着或逢天上或人間人自營營雲自閒忽爾飛來暫為侶忽然飛去莫能攀逸民對雲效高致禅子逢雲増道意白雲遇物無偏頗自是人心見同異閶闔天門宜曙看華一作為纓作盖擁千官從龍合沓臨清署就日逶迤繞露寒誰憐西山雲亭亭處幽絶座右長看非我覊手中欲攬待君說貞白先生那得知觧向山中自怡悅霹靂引辛德源出地聲初奮乘乾威更作雲銜天笑明雨帶星精落碎枕神無撓震楹書自若時聞明樂府作側聞吟白虎逺觀飛白鶴樂府作逺見舞元鶴明河篇宋之問八月凉風天氣晶萬里無雲河漢明昏見南樓清且淺曉落西山縱復横洛陽城闕天中起長河夜夜千門裏複道連薨共蔽虧盡堂瓊户特相宜雲母帳一作屏前初泛濫一作灔水精簾外轉逶迤倬彼昭回如練白復出東城接南陌南陌征夫文粹作人去不歸誰家今夜搗寒衣鴛鴦機上踈螢度烏鵲橋邉一鴈飛鴈飛螢度愁難歇稍見星河文粹作星見明河又作坐見河傾漸微没已能舒巻任浮雲不惜光輝流月明文粹作讓流月明河可望不可親願得乘槎一問津更將織女支機石還訪成都賣卜人四時春日篇梁元帝春還春節美春日春風過春正類聚作心日日異春情處處多處處春芳動日日春禽變春意春已繁春人春不見不見懐春人徒望春光新春愁春自結春結詎能申欲道春園趣復憶春時人春人意何在空爽上春期獨念春花落還似惜春時奉和湘東王春日篇梁鮑泉新燕始新歸新蝶復新飛新花滿新樹新月麗新輝新光新氣早新望新盈抱新水新緑浮新禽新聽好新景自新還新葉復新攀新枝雖可結新愁詎解顔新思獨氛氲新知不可聞新扇如新月新盖學新雲新落連珠淚新㸃石榴裙春日行李白深宮高樓入紫淸金作蛟龍繡作集作盤繡楹佳人當牎弄白日絃將手語弹鳴筝春風吹落君王耳此曲乃是昇天行因出天池泛蓬瀛樓船蹙沓浪波驚三千䨇娥獻歌笑撾鍾考鼔宮殿傾萬姓聚舞歌太平我無為人自寧三十六帝欲相迎仙人飄翩下雲軿帝不去畱鎬京安能為軒轅獨往入杳集作窅𡨕小臣拜獻南山壽陛下萬古垂鴻名秋辭後篇作秋氣摇落見三百五十八巻梁元帝去秋行杜甫去秋涪江木落時臂蒼集作搶走馬誰家兒到今不知白骨處部曲有去皆無歸遂州城中漢節在遂州城外巴人稀戰塲寃魂每夜哭空令野營猛士悲秋日篇見一百五十八巻鮑泉秋來李賀桐風驚心志集作壯士苦衰燈絡緯啼寒素誰看青簡一篇書不遣花蟲粉空蠧思牽今夜腸應直雨冷鄉集作淚魂弔書客秋墳鬼唱鮑家詩恨血千年土中碧冬日傷志篇邢子才昔時惰遊士任性少矜裁朝驅瑪瑙勒夕銜熊耳杯折花贈淇水撫琴望叢䑓繁華宿昔改衰病一時來重以三冬月愁雲聚復開天高日色淺林勁鳥鳴類作聲哀終風激簷響類聚作宇餘雪滿條枚遨遊昔宛洛踟蹰今草萊時事方去矣撫已獨懐哉初學記作傷懐冬夜吟陳陶黑帝天寒愁散玉東皇海上張仙燭侯家歌舞案梨園石氏賔寮醉金谷魯家襜榆闇披水雪花燈下甘垂翅散帙高編折桂枝披紗宻甃青雲地霜白溪松轉斜盖銅龍喚曙咽聲細八埏螻蟻厭寒栖早晩青旗引春帝展轉城烏啼紫天瞳矇千騎衙樓前冬宵引宋之問河有氷兮山有雪北户墐兮行人絶獨坐山中兮對松月懐美人兮屢盈缺明月的的寒潭中青松幽幽吟勁風此情不向俗人説愛而不見恨無窮文苑英華巻三百三十一
