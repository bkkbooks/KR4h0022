body:
  text: 文苑英華巻六百七十宋李昉等編省上上姚令公書一首為邵翼上張兵部書一首答左司崔員外書一首為崔僕射與郭令公書一首與郭令公書一首與楊員外書一首與李尚書書一首上西川韋令公書一首上韋尚書書一首贈鄿州盧員外書一首代李侍郎與山南嚴僕射書一首送張尚書書一首上姚令公書張九齡月日左拾遺張九齡謹奏記紫微令梁公閣下公登廟堂運天下者久之矣人之情偽事之得失所更多矣非曲學之説小子之慮所能損益之集作亦已明矣然而意有不盡未可息區區之懐或有見容亦猶用九九之術以此道也忍棄之乎今君侯秉天下之鈞為聖朝之佐大見信用渇日集作日渇太平千載一時胡可遇也而君侯既遇非常之主已踐難得之機加以明方集作若鏡中運如掌上有形必察無徃不臻朝暮羲軒之時何云伊吕而已際㑹易失功業垂成而舉朝之衆傾心前人之弊未盡徃徃疑集作擬議愚用惜焉何者任人當才為政大體與之共理無出此途而曩之用才非無知人之鑒其所以失者皆縁情之舉夫見勢則附俗人之所能也與不妄受志士之所難也君侯察其茍附及不輕受就而厚之因而用之則禽息之首為知已而必碎豫讓之身感國士而能漆至於合如市道亷公之門客虚盈勢比雀羅廷尉之交情貴賤初則許之以死殉體靣俱柔終乃背之而飽飛身名已遂小人恒態不可不察自君侯職相國之重持用人之權而淺中弱植之徒已延頸企踵而至諂親戚以求譽媚賔客以取容情結笑言談生羽翼萬事至廣千變難知其間豈不有才所失在於無耻君侯或棄其所短收其所長人且不知深㫖之若斯便謂盡私情於此軰其有議者則曰不識宰相無以得遷不因交游無以求進集作售明主在上君侯為相安得此言猶出其口此九齡所以為君侯至惜也且人可徳化集作誠感難用集作可户説為君侯之計謝媒介之徒即雖有所長一皆沮集作阻抑尊謀選衆之舉息此集作彼訕上之失禍生有胎亦不可忽嗚呼古人有言禦寒莫若重裘止謗莫若自脩倄之至極何謗不息勿曰無害其禍將大夫長才廣度珠潜璧匿無先容以求逹雖後時而自安今豈無之何近何逺但問於其類人焉廋哉雖不識之义何不可是知女不私人可以為婦矣士不茍進可以為臣矣惟集作此君侯之度内耳安用小人之説為固知山藏海納言之無咎下情上通氣用和洽是以不敢黙黙而已也願無以人故而廢其言以傷君侯之明此至願也幸甚幸甚為邵翼作上張兵部書蕭頴士月日應武藝超絶舉某乙謹上書侍郎公執事某汝潁儒家子先人以文至尚書郎今僕不肖持七尺之軀蹶張角力為褒衣者所不見禮猶復決短䇿希餘光願以羸疵之形忽微之氣三寸之舌百金之義一朝而委諸執事將納之耶拒之耶嗚呼茍或拒之士亦未易知也誠為執事言之僕㓜聞禮經長習篇翰多舉大略不求微㫖且尤好史臣之言自秦漢迄於周隋馳乎千餘載間天人秘理軍國竒畫皆耳剽其論而為文未止一作甞不喜潤色求官惡一作要拙莫能進趨顧人事所先則天資所闕雖欲從士大夫之後髙談抵掌取當代名其不可得也審矣然每讀太史公書竊慕穰苴樂生之髙義常願一寘戎車之殿指麾部分為天子捍城近臣不知明主未識徒欲奮決孰為引致嗟乎使古之二子復與僕同時於今雖有敗晉强燕之謀亦不能自逹也明矣所謂論干戈於揖譲之代則悖者信哉是以傴僒其形慙沮其色與被堅執銳之伍以馳逐撃刺為容雖欲耻之其可得已侍郎亦不可謂僕無學而輕之今聖主居安慮危有備無患以侍郎為深寄故専任簡稽之司豈不欲旁求爪牙式遏㓂虐故將七擒是擇寜止百中為竒則孫子之謀長於减竈杜侯之力曽不跨鞍蓋古之有善陣不戰者未聞以投石㧞棘為全軍也侍郎懋衮之後為善是學朝稱偉才物飽宏議固當纉韋平之業為社稷之臣使小人得驅馳下風訃畫見用比蕭何韓信之事顧不美乎侍郎必不以僕為狂使待罪末品参一旅之長受偏師之任羽書狎至𤇺火交馳察以時候占其氣物標利害之形相山澤之險乍聚乍㪚一隂一陽颷馳雷動千變萬化使兵不血刃勢如川決與夫搴一旗斬一卒﨑嶇行陣之末以徼賞求名者何其逺歟如或人非廢言事有可驗又得出疆塲之外奉咫尺之書因宜料敵随事制變使千古忠臣之節凛然復存則蘇武虜一作窘中尚能齧雪傅生幕下必斬樓蘭此一竒也侍郎又不可謂僕大言而疑之以侍郎有卓立傑出之姿虚心待士貴不驕物故小人越上下之分持得失之端私布之於侍郎期不以衆人見遇也侍郎用僕亦今日否亦今日屈伸待命惟所進退某再拜答左司崔員外書權徳輿徳輿器用𤨏薄無他才術徒以木納之姿翫習聖賢之訓甞以為大樸集作和久㪚世道交喪師友之義缺醨薄之風起蚩蚩萬情無所思向銜憤結懐惄然終日前年得以行役獲覯徳容始䝉泛愛竟接清議初論當世之理要次陳情性之大端終語道徳之宗集作原祖澡雪百慮泊然葆真一聞至論神開意警不覺虚白澄曠浹洽四支則易直子諒又其細也當此之時誠欲備門弟子之數日展嚴師之敬雖此志不遂實念逾餘涯忘年之歡契比伯仲昨者奉問洞見仁衷且有退身丘樊之說􅐵夫中人之性或不以利回而多以名敗或時能蹈義而鮮能克仁此誠細者可力大端則循情而動矣至於黜聦晦明恬於退讓息浩然之氣哀樂不入不然則乗時致位以天下為已任化醨為醇澤流無垠彛倫式叙生生茂遂此誠大君子之出處也近古以来作者實鮮豈世運有在或時無其人間睹皇極綜論之一篇得之盡矣然則或進或退小屈小伸豈足為執事者道也又示問之中情㫖備至不棄弱植仲以嘉姻荀陳之義非所敢當況司徒令子為後来名軰精識洞鑒丞集作誠已得之鄙人何堪後疑作復當此命門閭之下珉玉不侔將何以祗承厚意當叔寳逸少之目恐累清徳無任下情已具諮聞敬承嘉命尋冀拜謝感慶伏深某再拜為崔僕射與郭令公書于邵某月日某官某謹奏記令公閣下幽風固隂月紀將暮伏惟尊安福履萬夀無疆幸甚幸甚某逺鎮方隅蕃蠻未靖力㣲寄重憂累交煎雖無暇自謀終分心逺難一昨中使飛驛王命急宣特諭西戎侵偪郊甸即日奔走以副廟謀神徃形留豈遑夙夜近知輦下人無動摇復聞朝廷勞師薄伐朱相公以幽燕勁騎先啟戎行而令公以朔漢舊軍暫分兵要始則聖略不世出固推心與人終則上台一作才應時湏同力戡難朱分禀命而有進令公遣戍而不疑是皆存大業於至公遂表無私以奉已太白所以食昴魯陽所以廻暉斯乃恊和萬邦豈必因依一代昔者范宣子讓徳晉君以覇藺將軍避怒秦兵不侵書之縑緗名亦不朽令公勲冠天地力存宗社每當一軍隠如敵國若渉大川而令公能濟若火燎原而令公能㓕厚徳及行葦太和合陽春謙尊而光直方以載四方延頸萬邦立程當今執事在具瞻之上將自下而彌髙欲從損而彌益一諾而千萬人說一謙而千萬人讓況作相三朝行師二紀東征西怨逺懐邇安是以蒼海之隅莫不率俾膏雨既滋於百榖人倫復正於五常當今日之嘉猷何邃古之能擬齊晉之際其大此乎某區區不才謬司戎律每欲刳心示衆甞膽酧恩側聽逺方有行疑君父忘寢與食思奉前人矧辱在下風特䝉恩奬欣逢千載之事竊賀兩君之好感慕書紳未知其極謹遣某官某奉獻情言書非盡言之具蓋陳赤實拳拳之分某頓首再拜與郭令公書汾陽王令公閣下伏惟戡難定禍勲載王府致君行已徳冠當時講信脩睦敦叙舊好悉為古今第一則一作側小子在數科之一而不能上逹以自布露九泉之下何以塞責頃年令公先府君刺史于渭家世出牧於岷二境相接數年脩好睦為弟兄契以金石則令公之所聞見也久矣初以專經遜業常假籍於渭之渚于時使君文特以禮送問以時務許以大名為之下榻教之改業復歸以報命先人從而誨焉天寳中沗以進士及第其年判入超絶科受校書此則使君文人倫髙鑒施及小子不其神乎永懐報徳何日敢忘慶流後嗣日以昌大及兹匡救莫之與京謬從庶官之列黜於衆人之下爰自起居郎署省闥未為令公所顧以職在下位不敢干進也殊不知江海納細以為大山岳積壤以為髙斯道日顯人皆是效以不待掃門願陪下拜有若公之令弟少府監知之為人工部趙侍郎賞之為文户部李郎中列之為友皆朝廷俊選而不相鄙棄庸可誣乎夫有開必先先兆所感如小子者使先文字之已足一作及於此令弟愛之貴婿終一無此字眷之及及一作又於此而不能再登龍門禮叙世舊未之有也謹奉尺書塵黷執事轉於内屏以待命死罪死罪某再拜與楊員外書七官一有人字院長足下愴與子别雖以為晤出處黙語蓋非一途頃自除官乗流則逝性有定分愚不可移是進已無所干退亦無所悶到家喜骨肉之愛出門全賔友之歡陶然而不知樂之將至亦何暇役耳目從智力哉故知山林之士入而不返者宜每逍遥縱觀從亨疑多暇近覽古公避狄之地𬗟想用文出畋之師如其仁如其仁又其聖也不逺閭井頺然舊風嗟乎我生不辰遭值世難天未悔禍人猶怨嗟顧子弟之為邑逼時政以多故㳟寛信敏惠力行不必果長太息之復何可言一作復可信言猗那楊生行道利物勤於四海君子之踐中朝柄政從容畫計抑有由也勉旃良圖無以自媚風味遐屬此情難論甞當春臺梅栁動色興思與携手傷如之何時流好音尚慰覊旅幸甚幸甚大尉告身在匠人魚朝處望為收取逺代傳慶不欲失墜慎爾無忽因家人馳驛臨紙惘然于邵頓首與李尚書書某頓首尚書姨夫閣下伏惟秀岀天枝挺生王國十年分閫八座居榮善譽嘉聲聞於四海幸甚幸甚某忝接末姻早承餘睠南秦旅寄特奉周旋西掖宦游叨聨清切髙山景行何日忘之去年出守江華未遑進路猥當時議且復拘留滿室遺孤立錐無地朝求暮乞日徃月来外媿親朋内慙骨肉屏居陋巷不堪其憂惟此絶糧已復旬日古人併食今實當之側聞姨夫入朝先以貧賤為意頌聲載路誰不歸心某於池陽之間獲空閑數頃之地誓將作勞隴畆以望秋登所乏耕牛傭賃無訃儻或哀此窘逼許以後圖解倒懸之憂廣賙急之路以德報怨先哲格言區區之心竊慕此耳輙肆干觸昧於是非懲諸常情豈敢逃責痼疾暴發末由造門謹使家人投刺不宣某再拜上西川韋令公書符載伏見自建功汧隴之後天子念重付託西蜀擁旄杖節垂二十年能斷西戎之股臂鑒南蠻之耳目獻驃國之絃管摧芥熱之横滑四方仰首威聲赫然是何才略如是之偉也巴岷之人䝉慈惠被法禁秋霜膏雨不足為喻是何政化如此之羙也於戱大丈夫生乎天地之間功德富貴而已矣今令公英姿玉色照灼當世勲業格皇天崇髙如泰山若使圖丹青刻鍾鼎為有唐一世之盛令公獨得之矣某頃不自揆謬隠匡廬間其所務者不專文字亦甞有意窺佐王治國之術思樹勲不朽之事心長才短難進易退徘徊林壑屢移星霜齒髪蕭索無所成遂雖命使然也亦實慙贅疑作質鈍自成都違奉馳心旌麾髙卑勢殊分絶干請一昨戀慕滋甚不敢寜處因脩狀䟽并獻拙文不謂滄溟量深轉㴠微細猥見下答仍賜褒寵蓬蓽之下煥然有光臨風悚息不知所措某氣性野直寡儔少合宇宙至廣逈無知音遭逄知音便是死所伏惟令公上才宏識傑出人表律吕一動變寒為温伏知小生爰自兹日至於沒齒無沉痼之恨矣然九霄之鴻假勁翮而飛者也萬斛之舟假長風而逝者也鴻與舟而不翮不風皆摧頺朽蠧之物也安能自運哉輙敢比況輕塵視聽伏計令公發凾之際當不哂飛逝也新文五章音以賞奏重干宗匠伏惟俯賜省覽幸甚幸甚上韋尚書書伏惟尚書雲霄之禄位汧隴之勲業河海之宇量青萍之操持斯事已形丹青載在太常野人復欲云云則若詠滄溟之深頌泰山之髙識者聞之以為悠悠腐儒僕不曉事故略而不書某聞獸饑思食士窮思遇此生物之常也其有食不濟遇不至常情必然某則否何哉夫蘭有香雖植蘙薈必從風而揚之士有道雖混闒茸必由人而彰之某拜顔踰年出入五謁而善竟不聞於左右顧不及於布褐汨沒塵土造次覊旅是缺行敗德充溢視聴之深也射矢失中求正諸已而已矣不然即黄金之臺崔嵬造天獨不陪郭隗之後從容而登之乎然有志未遂於節下將欲求遂於節下伏惟少請詳之幸甚幸甚頃年與友生數人隱居廬山中時包祭酒牧於江州小子荒唐曽以短書干之包公聲聞君子也一言感激因為逺大當是時賢豪侁侁滿盈江湖翕然以風槩相與亦屢為侯伯之有土者行束帛之禮焉某皆抗詞不應斯鵾鵬一舉之致以方寸之地久違寧覲顧瞻歸路敢逡廵乎昨奔走萬里得伸拜慶慈顔怡怡然喜其如人親戚隣里亦㑹酒相賀雖爵禄未及而門户有光稽古之力實亦斯在則古林之松桂草堂之朋友懐芳結念相望於榖口可勝言哉今欲越三峽之湍瀨適九江之遐阻以業就志以家依山青風白雲相與終嵗斯也者非大官上列恢張特逹之賜則無以自振焉尚書功徳巍巍與嵩華侔善政如和羹美深仁類陽春寵材拯困多在輦下今羽毛頺弱大賢能煦而嫗之使其騫飛乎今鱗介蟠屈大賢能澤一作雷而雨之使其騰驤乎顧之即榮重委之即廢賤通塞之路期於反掌敢不虚中惕慮敬俟遭值伏惟非常施與之幸甚幸甚贈蘄州盧員外書符載去年春三月某有謂暫出蓬户間適值麾幢將度潯陽嚴太守命某為貳食之客偶於末席備聆嘉話如和風扇春膏雨澤物真可愛也玉斝未醉蘭撓遽動襟緒百端欝欝不開後疑有逺役南征千里夏徂冬歸道路蕭條音塵寂滅至此而已今者有襄漢之役實逰郡境誓將維舟泄宣曩懐一昨至蘄陽岸下屬日晏水闊風猛波起帆席張快不可偃落眄睐失徒煙露蒼茫杳杳馳心悵然無悰某深山耕漁之人也不求干進貴賤之異何縁驅偪竊嚮下風聽君子之議采輿人之誦若將時㑹踐升朝廷伏知君侯必能明禮樂補教化翊大君於皇極保蒼生於仁夀夫如此則善人國之紀也敢不㳟敬乎敢不親愛乎拳拳之衷正在此耳方廹行邁稍趨北路延賔一作顧英華戀慕滋篤李山人丞以藝術日游門閤問訊所止將欲候起居今故留之用書冩懐其他文一軸蓋執贄也非敢誇也不遺細陋或見光寵但願抵襄漢病夫拂拭耳目而俟之某再拜代李侍郎與山南嚴僕射書吕温僕射稟天全才受國重寄控全蜀咽喉之地當狂㓂奔侮之衝治集作處瘠土而其材甚豐訓羸師而其武可畏少分麾下潜運掌中再開劍閣之扄繼獻鹽亭之㨗應接制使先假地征掎角王師且為鄉道集作𨗳削叛臣之跡釋梓州之圍勞實居集作陪多無與讓美集作功無與讓聖上神武睿斷注意西南一校之善否必知一夫之勞逸必察況閣下効彰朝論事布人謡精誠貫於神祗茂伐懸於日月豈復聽簿書之微巧詆笙簧之濫音来示所虞無足介意某以寡薄謬膺重任舉闗國計動屬軍期夙夜憂慙未知所濟過䝉稱奬愧惕良深唯托方岳至公共守王度物估小事固無二三許共遵行亦如受賜佩荷之至無喻下情某再拜送張尚書書歐陽詹前鄉貢進士歐陽詹於洛陽旅舍再拜授僕人書獻尚書閣下某同衆君子伏在尚書下風久矣孟冬已寒伏惟尊體動止萬福人生於世今天下之人識與未識有一善則願知之有一困則願知之尚書以為其人何如哉愚以百年二百年無一而已矣尚書豈知身則其人乎既知其人某則願知也集作斯某所以願也凡今之人進路於長者或以卑詞褒頌為先者亦或求人書狀為先者伏計尚書飽見之英明特逹必不之愛小子固集有直字亦竊醜之況以尚書茂徳雄才則已騰於寰宇矣豈假區區片言隻字章明於身乎以尚書川集作山容海納則自斷於胷襟矣豈在悠悠八行尺牘進退於人乎知不然矣某才拙魯訥不敢游詞某閩越人向京師七千里集有以字去秋逺應直言極諫詔不逮試便徃西秦今冬將從慱學宏詞科赴集期昨至東洛舊負人錢五萬卒然以逢某則合還人又艱難困逼唯一驢一馬悉以償之賃廡之下如喪手足兀然不能出門者再旬于兹矣亦以窘逼遍祈於人人無非常所與唯疋帛斗粟供朝夕則纔可過其外則莫就無車無儲寄人之廬士之窮莫窮乎此也今日有来相㸔者曰子之困至於是何不以情聞於徐方南陽公乎明日有来相㸔者曰子之困至於是何不以情聞於徐方南陽公乎某晝忖夜量既先在尚書矣义人人異口同詞區區之心與議并俾忘干犯以困投於尚書尚書之力上將驅雲雷清宇宙副萬乗之賴答億兆之望豈獨遺某所願知之困乎尚書下將爕隂陽調風雨合百神之意允飛走之望豈獨遺某所願知之困乎救火之家水雖在逺不以逺而徃者知其必能濟患也詹之困曽未拜伏尚書所居洛陽西隣陜虢北俯河陽南接陳許東有汴滑捨東西南北之近越千里控於尚書者亦知尚書必救所困焉神遊五侯之門遍心擇王公之量匝方決意投於尚書尚書留意焉布露微辭亦非容易考試事畢特冀拜伏雖有蓄積庶及靣陳某再拜文苑英華巻六百七十
