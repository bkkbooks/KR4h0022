body:
  text: 文苑英華巻一百三十一宋李昉等編鳥獸一獅子賦二首天狗賦一首越人獻馴象賦二首放馴象賦二首正月一日含元殿觀百獸率舞賦一首舞馬賦二首獅子賦虞世南惟聖皇一作惟皇王之御厯乃承天而則大洽至道扵區中被仁風於海外通鳯穴以文軌襲龍庭以冠帯含夷言扵藁街陳方物於王㑹𣺌𣺌地角悠悠嶂表有絶域之神獸因重譯而來擾其所居也巖磴深阻盤紆絶峻翠嶺萬重瓊崖千仭馬頓轡而莫升車摧輪而不進伊方服之君長召積風而奉進爾乃發烏代過白狼踰絶巘跨飛梁越流沙而遥集超積石而髙驤其為狀也則筋骨糾纒殊文一作資異制闊臆脩尾勁毫柔毳鈎𤓰鋸牙藏峰蓄銳弭耳宛足伺間借勢暨乎奮鬛䑛脣倐來忽徃瞋目電曜發聲雷響拉虎吞貔裂犀分象碎遒兕於齗齶掘一作屈巴虵於指掌踐藉則林麓摧殘哮呼則江河振蕩是以名將假其容髙人圖其質罄其威以凌厲美其風而賛述鍳倚伏以榮身乃有識之髙軌彼白猿之騁妙終取斃於弧矢雖𤣥豹之幽栖亦捐軀於巖趾並同亡而異術豈行藏之足紀何茲獸之明智獨出處以殊倫雖奮武以馴勢乃知機而屈伸去金方之僻遠仰𤣥風之至淳服猜心與猛氣遂守一作感徳以依仁同百獸之率舞共六擾而來馴斯則物無定性從化如神譬鱗羽變質於淮海金錫成噐於陶鈞當是時也兆庶欣瞩一作瞻百僚嘉歎恱聲教之遐宣屬光華之在旦臣載筆以叨幸得寓目於竒翫順文徳以呈祥廼編之於東觀第二并序牛上士上士曽讀實録貞觀九年西域進獅子秘書監虞世南獻賦前史美之竊謂一有虞字公博物洽聞誠則可重瓌瑋倜儻或非所長欲精體物乃賦其事窮汗漫之大荒當崑崙之南軸鑠精剛之猛氣産靈猊之獸族指千里於崇朝逾鐵山而徃復非取俊於熊豹豈方姿於甝虪張景陽七命曰甝虪虪音叔故其方頥蹙額隅目髙匡攫地蹲踞騰空抑揚簇拳毛以被勁縷柔毳以為裳逄之者碎犀象聞而頓伏值之者破鵰鶚不敢飛翔哮呼奮迅眱瞲騰振掌擭攅鈹口銜霜刄怒䨇睛以電射一吼威三字一作掲一吼而雷震似烏獲之摧鋒疑項王之入陣及夫朝晡未食鼔髯奮力後勁䨇瞚前張闊臆蹉殊榛以傲睨跳絶梁而合赩倐横噬而風馳乃掉尾而雷息口裂奔貙足捎狂兕猛虎摧於掌握豪猪碎於牙齒既飽飫而心和乃宛頸而帖耳彷徨於金河之外生長乎葱山之裏嘉此獸之竒傑邈蹻勁而殊材隨馬牛而内向順謳歌而朅來逾烏城之積阻獻龍闕之崔嵬資譯人之納貢弭雄心以效能何虞者之維縶驚牙𤓰之可怖頓金鎖而長縻閟鐵牢而永固悲此生之窘束懐舊國而愁慕雖食肉於當年思盡力而無路羡文豹之掎鹿美韓盧之逐兎伊薄技之見收而偉材之不顧聞夫天以煦育為施草木皆春帝以恵訓為施猛戾皆仁夏后氏擾驪龍而伏皁軒轅氏役熊羆以佐人此竒獸之為用豈無用而來馴何不校之於搏擊投之於絶倫而使之欝欝於窮檻區區於後塵者乎天狗賦并序杜甫天寳中上冬幸華清宫甫因至獸坊怪天狗院列在諸獸一有院字之上胡人云此其一有獸字猛㨗無與並一作比者因一作甫壯而賦之尚恨其與凡獸相近其詞曰瞻華清之萃萃漠漠而出一作山殿戍削縹焉一作與天風崛乎迴薄上揚雲旓兮下列猛獸夫何天狗嶙峋兮氣獨神秀色似狻猊小如猿狖忽不樂雖萬夫不敢前兮非胡人焉能知其去就向若鐵柱欹而金鎖斷兮事未可救瞥流沙而歸月窟兮斯豈踰晝日食君之肥鮮一作鮮肥兮性剛簡而清瘦敏於一擲威觧兩鬬終無自私必不虛透嘗觀乎副君暇豫奉命于畋則蚩尤之倫已脚渭㦸涇提挈丘陵與南山周旋而慢圍者戮實禽有所穿伊鷹隼之不制兮呵犬豹以相纏蹙乾坤之翕習兮望麋鹿而飄然由是天狗㨗來發自於左頓六軍之蒼黄兮劈萬馬而一作以超過材官未及唱野虞未及和冏髇許交切箭也矢與流星兮圍要害而俱破洎千蹄之並一作迸集兮始拗怒以相賀真雄姿之自異兮已歴塊而髙卧不愛力以許人兮能絶等以為大徒賀切既而羣有噉咋勢争割據垂小亡而大傷兮翻投跡以來預劃雷殷而有聲兮紛膽破而何遽似爪牙之便秃兮無魂魄以自助各弭耳低佪閉目而去每嵗天子騎白日御東山百獸踿蹌以皆從兮肆一作四猛仡銛銳乎其間夫靈物固不合多兮胡役役隨此輩而徃還惟昔西域之逺致兮聖人為之豁迎風虛露寒函一無此字體蒼螭軋金盤初一顧而雄材稱是兮召羣公與之俱觀冝其立閶闔而吼紫㣲兮却妖孽而不得上干時駐君之玉輦兮近奉君之渥歡欲使奥處而誰何兮備周垣而辛酸彼用事之意然兮匪至尊之賞闌仰千門之崚􅡲兮覺行路之艱難懼精爽之衰落兮驚嵗月之忽殫顧同儕之甚少兮混非類以摧殘偶快意於校獵兮尤見疑於蹻㨗此乃獨步受之於天兮孰知羣材之所不接且置身之暴露兮遭縱觀之稠疊俗眼空多生涯未愜吾君儻憶耳尖之有長毛兮寧久被斯人終日馴狎者一無此字已越人獻馴象賦以辭林邑望國門為韻闕名倬彼馴象毛羣所推特稟靈於荒徼思入貢於昌期豈不以獻我令辰自林邑而來者稽諸舊史在成康而紀之一則識王者之無外一則見遐方之不遺苟形瓌之足偉孰路逺之云辭於是出豐草去長林殊狒狒之被格異猩猩之就擒厲其容也故獸伏我力和其性也故人知我心作蠻方之貢為上國之琛萬國標竒名已馳於魏闕千年表慶價實越於南金况乗之便習或訛或立動髙足以巍峩引脩鼻而嘘吸塵隨蹤而忽起水將飲而迴疑入牙櫛比而槮槮眼星飜而熠熠中黄雖勇力不能加見張平子西京賦蒼舒信竒知之莫及服我后之皁棧光我唐之域邑驅之則百獸風馳翫之則萬夫雲集故其威容足尚筋力殊壯輪囷而重若旄丘贔屓而髙如巨防執燧奔戰牽鈎委貺遇之者或驚駭而反行覘之者或披靡而遥望何斯象之剛克兼美義之不忒懼有齒而焚軀故全身而利國縱使牛能重任馬有報徳徒久困於輪轅又每傷於銜勒豈如我邈自逺藩來朝至尊辭桂林之小郡入閶闔之通門負名聞之籍籍守馴擾以存誠幸投之於芻藁豈敢昧於君恩第二同前韻杜洩惟彼馴象産乎南夷其形大也因地而受氣其性順也從心之所資食豐草於幽巖之麓飲清流於長江之湄不忌於人如得其時推誠於物任以縶維此吾王之化被也故逺人得而獻之中心摇摇其道遲遲左顧右盼知出羣之已逺廣思遐想與草澤而長辭脩途是尋疊嶂嶇嶔或行于陸但隨山而上下或載於舟距渉江之淺深既濟水以次水復出林而入林所過之邦徒觀其骯髒之貎所遇之衆豈識其謙柔之心荒徼已違王畿斯入聞之者遐邇必至覩之者士女咸集與疑人不知其故皆愕然而立或告之曰所馭之者越人所出處者林邑近之可仰逺之可望銓衡不能舉其體丹青足以圖其狀揣輕重者我有蒼舒之智髙思柔服也我有周公之徳王以之馳三軍比矛㦸而齊鋒以之和六氣與簫韶而俱唱稽其來也自南徂北嘉彼所獻充我王國食以筐筥牽以徽纆將致貢扵昆夷亦率職扵卭僰斯之為義可得而論性之馴良表邊夷之向化體之一作必固實揣中夏之所尊以君好生之故我身必夀以君賤貨之故我齒斯存豈克耕於野輸衆人之力曷如我入貢霑萬乗之恩雖自慙於陋質永願在乎王門放馴象賦以珍異禽獸無育家國為韻獨孤授彼炎荒兮王國是賔此馴象兮越俗所珍化之式孚則必受其來獻物或違性所用感於至仁吾君於是詔掌獸之官諭如天之意惟越獻象不逺而致推已於物曽何以異徒見弭雄姿而屈猛志安知不懐其土而感其類揆夫國用芻豢之費則多許一作計以方來道途之勤亦至與其紲之而厚飬孰若縱之而自遂且彼集於禁林我則有五色九苞之禽在于靈囿我則有雙骼共觝之獸何必致逺物於外區崇偉觀於皇都是用返諸林邑之野歸爾梁山之隅時在偃兵豈嬰乎燧尾上惟賤賄寧恤乎焚軀非同委棄罔或踟蹰知拜跪兮則有謝渥恩兮豈無復得顧侣求羣跨川登陸食豐草以垂鼻出平林而瞪月逍遥乎存存之鄉保守乎生生之福懐仁初就於牽掣順理竟資於亭育游乎水同反身之龜處乎山異放麑之鹿大道茲始淳風不遐感以和樂亦參乎百獸率舞驅之仁夀寧阻乎四海為家奚必充帝庭之實駕鼓吹之車然後可以為國華者哉由是聖心孚于下國物靡不獲其所化乃允臻其極放一獸而庶類知歸遂四方而萬代作則彼周驅犀象漢放駿馬未可論功而校徳第二同前韻獨孤良器皇上御寳厯之惟新闡乾符發坤珍徳被華夷敷雲雨之大澤恩及飛走含天地之全仁乃却走馬以反素斥馴象而不異非耳目之可役同寳玉之遐棄放之於無人之境歸之於不毛之地或羣或友伊飲齕之無虞載寝載興信生成之自遂觧網之惠無聞放麑之仁克類然後以儒為林毓賢哲以為禽以道為囿利忠良以為獸亮功格于人神徳齊於宇宙是由化與澤俱仁與道符賢為其寳太康之訓不作獸用不擾虞人之箴遂無徇物之情允著好生之徳式孚可以順天然可以遂亭育既絶燧尾之患不虞焚身之戮去狂顧於人寰徇野心於林麓伊昔漢氏惟其晉家焚雉頭之裘於前殿却千里之馬於後車猶自一作且颺休垂美有聞無譁况我一人温恭允塞本忽之而勿營非欲之而復抑往籍之所未覩前王之所不克誠可以懐四夷柔萬國者也正月一日含元殿觀百獸率舞賦以題為韻鄭錫皇上端拱穆清法春秋五始之要酌禮樂三代之英赫帝典含元正衡紀允叶攝提為貞䟽龍首以抗殿靡魚湏而建旌開彤庭執玉帛者萬國發金奏韻簫韶而九成祥風應律卿雲夾日華夷㑹同車書混一羽衞宿設乗與曉出陳八佾象鈞天之儀舞百獸備充庭之實彼毛羣與羽族感盛徳而呈質度曲既三薰風自南進旅退旅兮猛志外戢擊石拊石兮和氣内含勿齊首以瞪目乍脉脉而耽耽威而不猛樂而不諼搏鷙者摇尾而就養剛狠者戢角於觸藩牝馬馴致於坤徳羣龍利見於乾元若乃大禮成壽觴薦天聲起皇威遍金石鏗鏘以攅雜文物葳蕤以葱蒨獸臣獻伎於廣庭樂正舉麾於層殿怛荒戎於醜一作裔虜咸稽首而革面其初進也波委星攅如崗如巒發揚蹈厲兮鼔舞争集無小無大兮容止可觀其少退也軍旋陣拆匪蠻匪貊蹄角且千兮羽儀累百詭色殊竒兮相輝赫赫豈獨九尾靈狐一角神獸顧兎宵落麒麟夜鬬非熊非羆為猿為狖威鳯巢閤騶虞在囿條支之犀黄支之􅑹而已漢平帝紀黄支國獻犀牛西域甕傳條支國獻鳥卵如似與此文交互其徒實繁厥狀非一五靈嘉瑞百寳異質數不可盡之於詞名不可殫之扵筆莫不聞至樂而知感樂皇風以相率忽指顧於應規亦廻旋而中律穆穆焉羌難得而備述則知樂之感也深徳之被也普彼禽獸之遇聖隨萬里而成覩至若吳歈越吟荆艷楚舞徒慆堙於心耳安擬議於干羽曽不充虞舜之帝圖列后䕫之樂府辭曰鑠元㑹兮正王度奏雲門兮歌大濩百獸舞兮四夷懼于胥樂兮皇風布客有慕上古之賡歌望承明而獻賦舞馬賦并序以奏之天庭為韻闕名書曰擊石拊石百獸率舞是知時貞而物應徳博則化光故九有宅心萬方惟允我開元聖文神武皇帝陛下懋建皇極丕承寶命揚五聖之耿光安兆民於反側功成道備作樂崇徳上以殷薦祖宗下以導達情性則有天馬絶足來從東道出天庭而屢舞仰皇心而載悦豈止緑錯開圖分九疇於夏后汗溝走血服四夷於漢皇而已哉野人沐浴聖造與觀盛徳敢述蹈舞之事而賦之皇帝叶天行乘春候張廣樂而化通鬼神徴舞馬而懐柔奔走爾其聆音却立赴節騰湊顧遲影而傾心效長鳴而引脰徘徊振迅類威鳯之來儀指顧倏忽若騰猨之驚透眄鐘鼓而載止暢簫韶之九奏洎宛跡遲遲汗血生姿順指不動因心所之日照金羈而晴光交映風飄錦覆而淑氣相資顧以退而未即將欲進而復疑絶節交衢而大人相慶赴曲齊列而皇心則怡豈若檀溪水上章臺路前塵埋玉勒汗濕金鞭竟空疲於力用固無取於當年孰若矯足騰摧婉柔姿而近日驚身聳躍嬌逸態於鈞天别有假象天星因時降靈雙瞳夾鏡而異質兩顴夾月而殊形出渥洼兮道已泰歴吳坂兮心匪寧願因百獸之相率舞聖徳於天庭舞馬賦以奏之天庭為韻闕名渥洼之駿兮逸羣特秀簡偉之來兮稀代是覯豈憚夫行地無疆是美其承天之祐弭雄心以順軌習率舞而初就因大樂以逞狀隨伶官而入奏樂彼皇道上委折於一人狎節廣場下歡心於百獸飾金鋄頓紅緌類却畧以鳳態終宛轉而龍姿或進寸而退尺時左之而右之至如鼉鼔歴考龍笛昭宣知執轡之有節乃蹀足而爭先隨曲變而貌無停趣因矜固而態有遺妍既習之於規矩或奉之以周旋迫而觀焉若桃花動而順吹逺而察之類電影倏而横天固絶倫之妙有豈衆伎之齊焉我皇端拱無事垂意至寧愔愔正聲以久變而合樂逐逐良馬終萬舞而在庭豈比夫漢皇取樂而同轡魯侯空牧而在坰以今古而匹敵何長短之相形文苑英華巻一百三十一
