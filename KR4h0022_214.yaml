body:
  text: 文苑英華卷二百十四宋李昉等編人事一宴集六十七首同集晉安兒宅劉孝綽夫君追宴喜十日遞來過築室華池上開軒臨芰荷方塘交密篠對霤接繁柯景移林改色風度類聚作去水餘波洛城雖半集作未掩愛客待驪歌後園宴樂魏收束馬輕燕外獵雉陋秦中朝車轉夜轂仁旗指旦風式宴臨平圃展衛寫屠穹積崖疑造化導水逼神功樹靜歸烟合簾疏返照通一逢堯舜日未假北山叢月下秋宴前人此夕甘言宴月照露方塗使星疑向蜀劒氣不關吳良交契金水上客慰萱蘇何必應劉輩還來逰鄴都齊韋道遜晚春宴邢子才日斜賔館晚風輕麥候初簾喧巢幕燕池躍戲蓮魚石聲隨流響桐影傍巖疏誰能千里外獨倚八行書羣公髙宴楊訓中郎敷奏罷司隸坐朝歸開筵引貴客饌玉對春暉塵起金吾騎香逐令君衣緑酒犀為碗鳴琴寶作徽寸隂良可惜千金本易揮後園宴盧思道嘗聞崑閬有神仙雲冠羽佩得長年秋夕風動三珠樹春朝露濕九芝田不如鄴城佳麗所玉樓銀閣與天連太液回波千丈映上林花樹百枝燃流風續洛渚行雲在南楚可憐白水神可念青樓女便妍不羞澀遙艷工言語池苑正芳菲得戲不知歸媚眼臨歌扇嬌香出舞衣纖腰如欲斷側髻似能飛南樓日已暮長簷鳥應度竹殿遙聞鳳管聲虹橋别有羊車路携手傍花叢徐步入房櫳欲眠衣先解半醉臉逾紅日日相看轉難厭千嬌萬態不知窮欲知妾心無劇已明月流光滿帳中後渚置酒陳叔達大渚初驚夜中流沸鼓鞞寒沙滿曲浦夕霧上耶溪岸廣鳬飛急雲深鴈度低嚴關猶未遂一作逺此夕待晨雞夏晚尋于政世置酒賦韻陳子良聊從嘉遁所酌醴共抽簪以兹山水地留連風月心長榆落照盡髙栁暮蟬吟一反桃源路别後難追尋冬日宴于庶子宅各賦一字得趣令狐德棻髙門聊命賞羣英于此遇放曠山水情留連文酒趣夕煙起林蘭霜枝殞庭樹落景雖已傾歸軒幸能駐賦得杯于志寧陋巷朱軒擁衡門緹騎來俱裁七步詠同傾三雅杯色動吟春栁花發犯寒梅賔筵半未醉驪歌不用催賦得鮮劉孝孫解襟逰勝地披雲促宴筵清文振筆妙髙論寫言泉凍柳含風落寒梅照日鮮驪歌雖欲奏歸駕且留連賦得歸許敬宗倦逰嗟落拓集作拓落短翮暮追飛周醪忽同醉牙絃乃共揮油雲淡寒色落景靄霜霏纍日方投分茲夕諒無歸賦得平岑文本金蘭篤惠好樽酒暢生平既欣投轄賞暫緩望鄉情愛景含霜晦落照帶風輕於兹歡宴洽寵辱詎相驚賦得節社正倫李門余妄進徐榻君恆設清論暢𤣥言雅琴飛白雪寒雲暖落景朔風凄暮節方欣投轄情且駐當歸别賦得色封行髙夫君敬愛重歡言情不極雅引發清音麗藻窮調飾水結曲池氷日暖平亭色引滿既杯傾終之以辨側上已浮江宴韻得遙王勃披觀玉京路駐賞金臺址逸興懷九仙良辰傾四美松吟白雲際桂馥清溪裏别有江海心日暮情何已此篇題得遙字而詩押美字按嵗時雜詠及本集自有遙字韻詩今録于後上已年光促中川興緒遙緑齊山葉滿紅泄片花銷泉聲喧後澗虹影照前橋遽悲春望逺江路積波潮聖泉宴韻得泉前人披襟乘石磴列席俯春泉蘭氣薰山酌松聲韻野絃影飄垂葉外香度落花前興洽林塘晚重岩起夕煙春日宴樂逰園賦韻得接前人帝里寒光盡神臯春望浹梅郊落晚英栁甸驚初葉流水抽竒弄崩雲灑方牒清樽湛不空暫喜平生接三月曲水宴得舒疑詩中却押園字盧照鄰風煙彭澤里山水仲春園由來弃銅墨本自重琴樽髙情邈不嗣雅道今復存有美光時彥養得坐山樊門開芳杜徑室拒桃花源公子黃金勒仙人紫氣軒長懷去城市髙詠狎蘭蓀連沙飛白鷺孤嶼嘯𤣥猿日影巖前落雲花江上翻興䦨車馬散林塘夕鳥喧和前得煙王勃彭澤官初去河陽賦始傳田園歸舊國詩酒間長筵列室窺丹洞分樓瞰紫煙縈回亘津渡出沒控郊鄽鳳琴調上客龍轡儼羣仙松石偏宜古藤蘿不記年重簷交密樹復磴擁危泉抗石晞南嶺乘沙渺北川傳巖來築處磻磎入釣前日斜真興逺幽楚思凉蟬宴梓州南亭得池盧照鄰二條開勝迹大隱叶冲規齊閣分危岫樓臺繞曲池長薄狄煙起飛梁古蔓垂水鳥翻荷葉山蟲交桂枝逰人惜將晚公子愛忘疲願得回三舍琴樽長若斯初秋登王司馬樓宴賦得同駱賔王展驥端歸暇登龍喜集作嘉宴同締賞三清滿承恩六義通野晦寒雲集作隂積潭虛秋集作夕照空顧慙非夢鳥濫此厠雕蟲春夜章明府宅宴得春前人酌桂陶芳夜披薜笑幽人雅琴馴野集作魯雉清歌落梁集作范塵宿雲低回蓋殘月下集作上虛輪幸此蒙集作承恩洽聊當故鄉春冬日宴前人二三物外友一百杖頭錢賞洽袁公地情披樂令天促席鸞觴滿當爐獸炭燃何須攀桂樹逢此自留連初秋宴得風一作于寶六宅宴前人千里風雲契一朝心賞同意盡通家合集作深交冷神靈俗纍空草砌一作帶銷寒翠花釭斂集作枝發又作疏斂夜紅唯將淡若水長揖古人風夜飲東亭宋之問春水集作泉鳴大壑皓月吐層岑岑壑景色佳慰我逺逰心聞芳足幽氣驚棲集作嘶多衆音髙興南山吟長謡橫素琴春日宴宇主簿山亭得寒字前人公子正邀歡林亭春未䦨攀巖踐苔易迷路出花難窗覆垂楊暖階侵瀑水寒帝城歸路直流興接鴛鸞春日鄭協律山亭陪宴餞鄭卿同用樓字前人潘園枕郊郭愛客過相求樽酒東城外騑驂南陌頭池平分洛水林缺見嵩丘暗竹侵山徑垂楊拂妓樓彩雲歌處斷遲日舞前留此地何年别蘭芳空自幽同劉給事城南宴集前人一作張說水竹幽閒地簪纓近侍臣雍容乘暇日蕭灑出囂塵樹長栖集作足思朋鳥池深入養鱗管絃髙逐吹歌舞妙含春老子叨専席歡逰隔縉紳此中情不淺遙寄賞人心嶽州宴别潭州王熊前人縉雲連省閣溝水遽西東然諾心猶在容華嵗不同孤城臨楚塞逺樹入秦宮誰念三千里江潭一老翁幽州夜飲前人凉風吹夜雨蕭瑟動寒林正有髙堂宴能忘遲暮心軍中多集作宜劒舞塞上重笳音不作邊城將誰知恩遇深鳳閣尋勝地前人西掖持醇酒東山就白雲開軒緑池映命席紫蘭芬舞度花為伴鶯來管作羣太平多樂事春物共氛氲定昆池奉和蕭令潭字韻前人暮春三月日重三春水桃花滿禊潭廣樂逶迤天上下仙舟遙衍鏡中酣藥園宴武輅沙將軍得洛字前人東地垂餘興南園宴清洛文學引王枚歌鐘陳衛霍風髙大夫樹露下將軍藥待聞出塞還丹青上麟閣奉蕭中令酒并詩前人樂奏天恩滿杯來秋興髙更蒙蕭相國對席飲醇醪廣州蕭都督入朝過嶽州宴餞得冬字前人孤城抱大江節使往朝宗果是臺中舊依然水上逢京華遙比日疲老颯如冬竊羡能言鳥銜恩向九重夕宴房主簿舍前人嵗晏關雍空風急河渭氷薄逰羈物役微向怯集作愜逺慿旅館月宿永閒扄雲思興伊人美思集作修夜朋酒惠來稱交談既清雅琴吟亦凄凝不逢君騫涸集作裳憂思長鬱蒸嶽州宴姚紹之前人杞梓滯江濵光華白日新難兄金作友媚子玉為人山水含秋興池亭借善鄰簷松風送靜院竹鳥來馴翠斚催集作吹黃菊雕盤繪紫鱗緩歌將舞宜集作為拂繡衣塵修書學士奉勑宴梁王宅得樹字前人虎殿成鴻業猿巖題鳳賦既荷大君恩還蒙小山遇秋吹凝絃管凉雲生竹樹共惜朱邸歡無辭洛城暮秋社日崇讓園宴得新字蘇頲見雜詠鳴爵三農稔勾龍百代神運昌叨輔弼時報喜黎人樹缺池光近雲開日影新生全應有地長願樂交親寒食宴于中舍别駕兄弟宅前人子推山上歌龍罷定國門前納駟來始覩元鵾鏘玉至旋聞季子佩刀回晴花處處因風起御栁條條向日開自有長筵歡不極還將一作持彩服詠南陔天津橋東旬宴得歌字張九齡清洛象天河東流形勢多朝來逢宴喜春盡却妍和泉鮪歡時躍林鶯醉後歌賜恩頻若此為樂今奈集作奈人何雲陽驛陪崔使君邵道士夜宴張子容一尉東南逺誰知此夜歡諸侯傾皂蓋仙客整黃冠染翰燈花滿飛觴雲氣寒欣承國士遇更借美人看濟州過趙叟家宴王維雖與人境接閉門成隱居道言莊叟事儒行魯人餘深巷斜暉靜閒門髙栁疏荷鋤修藥圃散帙曝農書上客搖芳翰中厨饋野蔬夫君第髙飲景晏出林閭與盧象集朱家前人主人能愛客終日有逢迎貰得新豐酒復聞秦女筝栁條疏客舍槐葉下秋城語笑且為樂吾將達此生宴越府陳法曹西亭孫逖見集本公府西巖下紅亭間白雲雪梅初度臘煙竹稍迎曛水木涵澄影簾籠引霽氛江南歸思逼春鴈不堪聞和韋和尚兄春日南亭宴兄弟兄在京前人臺閣升髙位園林隔舊鄉忽聞歌棣萼還比報瓊芳門向宜春近郊連御宿長德星常有㑹相望在文昌洛陽客舍逢祖詠留宴蔡希寂綿綿鐘漏洛陽城客舍貧居絶送迎逢君貰酒因成醉醉後焉知世上情與王昌齡宴王十一孟浩然歸來卧青山嘗魂在一作嘗夢逰清都漆園有傲吏惠縣一作好在招呼書幌神仙籙畫屏山海圖酌霞復對此宛似入蓬壺奉先張明府休沐還鄉海亭宴集探得階字前人自君理畿甸余亦經江淮萬里音書斷數年雲雨乖歸來休浣日始得賞心諧朱綬集作綏恩雖重滄州趣每懷樹低新舞閣山對舊書齊何以發秋興隂蟲鳴夜階夏日與崔二十一同集衛明府席一作夏日宴衛明府宅遇北使前人言避一時暑池亭五月開喜逢金馬客同飲玉人杯舞鶴乘軒至逰魚擁劒來坐中殊未起簫管莫相催盧明府早秋宴張郎中海園即事得秋字前人邑有絃歌宰翔鸞已狎一作野狎又作狎野鷗眷言華省舊暫拂海池逰鬱島藏深竹前溪對舞樓更聞書即事雲物是清集作新又作髙秋宴包二融宅前人閒居枕清洛左右接人野門庭無雜賔車轍多長者是時方盛夏風物自瀟灑五月休沐歸相擕竹林下開襟成歡趣對酌一作酒不能罷煙暝棲鳥迷余將歸白社宴張記室宅前人甲第金張館門庭軒一作車騎過家封漢陽郡文㑹楚材多曲島浮觴酌前山入詠歌妓堂花映發書閣一作閣栁逶迤玉指調筝柱金泥飾舞羅寧知書劒者嵗月獨蹉跎清明日宴梅道士房此詩見二百二十六卷前人寒夜張明府宅宴前人瑞雪初盈尺閒宵始半更列筵邀酒伴刻燭限詩成香炭金爐暖嬌絃玉指清醉來方欲臥不覺曉雞鳴襄陽公宅飲前人窈窕夕陽佳丰茸春色好欲覔淹留處無過狹斜道綺席卷龍鬚香床集作杯浮瑪瑙北林積修樹南池生别島手撥金翠花心迷玉紅草談笑集作天光六義發論明三倒座非陳子驚門還魏公掃榮辱集作革應無間歡娛當共保臨渙裴贊集作裴明府席遇張十六集一作房六前人河縣栁林邊河橋晚泊船文叨才子㑹官喜故人連笑語同今夕輕肥異往年晨風理征棹吳楚各悠然集作理歸棹夜宴左氏莊杜甫風林纖月落衣露靜琴張暗水流花徑春星帶草堂檢書燒燭短看劒引杯長詩罷聞吳詠扁舟意不忘上已日徐司籙林園宴集前人鬢毛垂領白花蘂亞枝紅歌倒衰年廢招尋令節同薄衣臨積水吹靣受和風有喜留攀桂無勞問轉蓬崔駙馬山亭宴集前人蕭史幽棲地林間踏鳳毛洑流何處入亂石閉門髙客醉揮金碗詩成得繡袍清秋多宴㑹終日困香醪陪李北海宴歷下亭前人東藩駐皂蓋北渚凌清河海右此亭古濟南名士多雲山已發興玉佩仍當歌修竹不受暑交流空湧波蘊真愜所遇落日將如何貴賤俱物役從公難重過海右川本作海內湘江宴餞裴二端公赴道州前人白日照丹斾朱旗散廣川羣公餞南北肅肅秩初筵鄙人奉末眷佩服自早年義均骨肉地懷抱罄所宣盛名富事業無取愧髙賢不以喪亂嬰保愛金石堅計拙百僚下氣蘇君子前㑹合苦不久哀樂本相纏交逰颯向盡宿昔浩茫然促觴激萬慮掩抑淚潺湲熱雲初集黑川本作曛缺月未上天白團為我破華燭蟠長煙鴰鶡催明星解袂從此旋上請減兵甲下請安井田永念病渴老附書逺山巔宴王使君宅題二首前人漢主追韓信蒼生起謝安吾徒自飄泊世事各艱難逆旅招要近他鄉思緒集作意緒寬不才甘朽質髙臥豈泥蟠二泛愛容霜鬢一作髮留歡上夜關世傳杜子美不避家諱詩中兩押間字麻沙傳孫覿杜詩押韻作卜夜間北斗間今英華元本亦作卜夜間其實皆非也或改作夜闌又不在韻按卞氏圜集注杜詩及别本自是留歡上夜關蓋有投轄之意上字訛為卜關字訛為間耳北斗間者漢書有朱旗絳天今子美諸將七言詩既云曽閃朱旗北斗間則是因朱旗絳天閃見斗亦赤本是殷字於顔切紅色也後本殷周之殷於今切盛貌修書時宣宗諱殷正緊音雖不同字則一體或改作間今既祧不諱則是殷字又何疑焉文苑不載北斗殷之詩偶論疑兩間字故併及之自吟詩送老相勸酒開顔戎馬今何地鄉園獨舊集作在山江湖墜清月酩酊任扶還陪章侍御宴南樓得風字前人絶域長夏晚兹樓清宴同朝廷燒棧北鼓角漏天東屢食將軍地仍騎御史驄本無丹竈術那免白頭翁冦盜狂歌外形骸痛飲中野雲低度水簷雨細隨風出號軍集作江城黑題詩蠟燭集作炬紅此身醒復醉不擬哭途窮曲江陪鄭八丈南史飲前人雀啄江頭楊栁花鵁鶄雞䳵滿晴沙自知白髮非春事且盡芳樽戀物華近侍即今難浪跡此身那得更無家丈人才力猶强健豈傍青門學種瓜文苑英華卷二百十四
