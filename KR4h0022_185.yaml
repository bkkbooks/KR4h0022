body:
  text: 文苑英華卷一百八十五宋李昉等編省試六驪龍一首劔化為龍一首龜負圖二首魚上氷三首臨川羡魚二首河鯉登龍門二首鮫人潜織一首歸馬華山一首西戎獻馬一首天驥呈才三首𠡠賜三相馬一首騏驥長鳴二首儀鳯一首緱山鶴一首織鳥一首鶴警露一首鶴鳴九臯一首齊優開籠飛去所獻楚王鵠一首黃鵠下太液池一首越裳獻白翟二首鶯出谷四首栁陌聽早鶯一首禁林聞曉鶯一首鳥散餘花落三首空梁落燕泥一首好鳥鳴髙枝一首振振鷺一首飛鴻響逺音一首出籠鶻一首霜隼下晴臯一首反舌無聲一首雪夜聽猿吟一首寒蟬樹一首驪龍失名有美為鱗族潜蟠得所從標竒初韞寶表智即稱龍大壑長千里深泉固九重奮髯雲乍起矯首浪還衝荀氏傳高譽莊生冀絶蹤仍知流淚在何幸此相逢劔化為龍張聿古劔誠難屈精明有所從沉埋方出獄合㑹却成龍牛斗光初歇蜿蜒氣漸濃雲濤透百丈水府躍千重拖尾迷蓮鍔張鱗露錦容至今沙岸下誰得覩𤣥蹤龜負圖詩缺同前詩缺魚上冰王季則北陸收寒盡東風解凍初冰消通淺溜氣變躍潜魚應節似知化揚鬐任所如浮沉非樂藻沿泝異傳書結網時空久臨川意有餘為龍將可望今日愧才虛同前紀元臯類詩作何儒亮春生寒氣滅類詩作氣减稍動伏泉魚乍喜東風至來觀曲浦初近冰朱鬛見望日錦鱗舒漸覺流澌退還欣掉尾餘噞喁情自樂沿泳意寧踈儻得隨鯤化終聽戾太虛類詩作終能戾太虛同前吳冕春水潜鱗發寒潭舊藻踈揚鬐順氣後振鬛上氷初戲廣憐空潔浮清媚景虛戒貪還避餌思逹每懷書濕映流澌薄時遊觸浪餘終希泮渙澤為化北溟魚臨川羡魚張正元有客百愁侵求魚正在今廣川何渺漫高岸幾登臨風水寧相阻煙霞豈憚深不應同逐鹿詎肯比從禽結網非無力忘筌自有心永存芳餌在佇立思沉沉同前薛少殷曽是歸家客今年且未旋遊鱗方有待織網豈能捐向水煙波夕吟風嵗月遷莓苔生古岸葭菼變清川不逐滄浪叟還宗內外篇良辰難自擲此日願忘筌河鯉登龍門失名年久還求變今來有所從得名當是鯉無㸃可成龍備歷艱難遍因期造化容泥沙寧不阻釣餌莫相逢擊浪因成勢纎鱗莫繼蹤若令搖尾去雨露此時濃同前集本作魚登龍門元稹魚貫終何益龍門在此登有時常集作成當作雨無用耻為鵬激浪誠難泝雄心庶亦集作亦自憑風雷潜㑹合鬐鬛忽騰陵泥滓辭河濁煙霄見海澄回瞻順流輩誰敢望同升鮫人潜織康翊仁珠館馮夷室靈鮫信所潜幽閒雲碧牖滉漾水精簾機動龍梭躍絲縈藕綷添七襄牛女恨三日大人嫌古樂府焦仲卿妻詩三日斷五匹大人故嫌遲透手擎吳練凝冰笑越縑無因聽札札空想濯纎纎歸馬華山白行簡牧野功成後周王戰馬閒驅馳休伏皂飲齕任依山逐日朝仍去隨風暮自還冰生疑隴坂葉落似榆關躞蹀仙峯下騰驤渭水灣幸逢時偃武不復鼓􅎏間西戎獻馬周存天馬從東道皇威被逺戎來參八駿列不假二師功影别流沙路嘶流上苑風望雲時蹀足向月每爭雄禀異才難狀標竒志豈同驅馳如見許千里一朝通天驥呈材徐仁嗣至德符天道龍媒應聖明追風竒質異噴玉彩毛輕躞蹀形難狀連拳勢乍呈效材矜逸態絶影表殊名岐路寧辭逺關山豈憚行鹽車雖不駕今日亦長鳴同前盧征異産應堯年龍媒順制牽權竒初得地躞蹀欲行天詎假調金埓寧須動玉鞭嘶風深有戀逐日定無前周滿誇常馭燕昭恨不傳應知流赭汗來自海西偏同前鄭蕡毛骨合天經拳竒步驟輕曽邀于闐駕新出二師營噴勒金鈴響追風汗血生酒亭留去跡吳坂認嘶聲力可通衢試材堪聖代呈王良如顧盼垂耳欲長鳴勑賜三相馬張隨上苑驊騮出中宫詔命傳九天班錫禮三相代勞年顧主聲猶發追風力正全鳴珂龍闕下噴玉鳯池前四足疑雲滅雙瞳比鏡懸為因能致逺今日表求賢騏驥長鳴章孝標有馬骨堪驚無人眼暫明力疲吳坂峻嘶苦朔風生逐逐懷良御蕭蕭顧樂鳴瑶池期弄影天路欲飛聲皎月誰知種浮雲莫問程鹽車終願脫千里為君行同前陳去疾騏驥欣知已嘶鳴忽異常積悲攄怨抑一舉徹穹蒼迹類三年鳥心馳五逹莊何言從蹇躓今日逐騰驤牛皂休維縶天衢恣陸梁向非逢伯樂誰足見其長儀鳯楊嗣復八方該帝澤威鳯忽來賔向日朱光動迎風翠羽新低昻多異趣飲啄逈無鄰郊藪今翔集河圖意等倫聞韶知鼓舞偶聖願逡巡比屋初同俗垂恩擊壤人緱山鶴張仲素羽客驂仙鶴將飛駐碧山映松殘雪在度嶺片雲還清唳因風逺髙姿間水類詩作對水閒笙歌應天類詩作憶天上城郭嘆人間幾變霜毛潔方殊藻質斑蓬瀛如可到逸翮詎能攀織鳥張何季春三月裏戴勝下桑來映日華冠動迎風繡羽開候驚蠶事晚織向女工裁旅宿依花定輕飛繞樹回欲過髙閣栁更拂小庭梅所寄一枝在寧憂弋者猜鶴警露陳季南國商飈動東臯野鶴鳴溪松寒暫宿露草滴還驚欲有髙飛意空聞召侣情風間傳藻質月下引清聲未假摶扶勢焉知羽翼輕吾君開太液願得應皇明鶴鳴九臯失名胎化呈仙質長鳴在九臯排空散清唳映日委霜毛萬里思寥廓千山望鬱陶香凝光不見風積韻彌髙鳯侣攀何及雞羣思忽勞升天如有應飛舞出蓬蒿齊優開籠飛去所獻楚王鵠崔樞受命籠齊鵠交歡獻楚王惠心先巧辨戢羽見回翔意適清風逺憂除白日長度雲搖舊影過樹閲新芳直取名翻重寧唯好不傷誰言滑稽理千載戒禽荒黃鵠下太液池賈島集無髙飛空外鵠下向禁中池岸印行蹤淺波搖立影危來從千里島舞拂萬年枝踉蹌孤風起徘徊水沫移幽音清露滳野性白雲隨太液無彈射靈禽翅不垂越裳獻白翟王若嵒素翟宛昭彰遙遙自越裳冰晴朝映日玉羽夜含霜嵗月三年逺山川九譯長來從碧海路入見白雲鄉作瑞興周后登歌美漢皇朝天資孝理惠化且無疆同前孫昌徹聖哲符休運伊臯列上台覃恩丹徼逺入貢素翬來北闕欣初見南枝顧未回斂空殘雪淨矯翼片雲開馴擾將無懼翻飛幸莫猜井從上苑裏飲啄自徘徊鶯出谷錢可復玉律陽和變時禽羽翮新載飛初出谷一囀已驚人拂栁宜烟暖衝花覺路春摶風翻翰疾向日弄吭頻求友心何切遷喬幸有因華林高玉樹棲託及芳晨同前張鷺弱質隨儔匹遷鶯正及春乘風音響逺映日羽毛新已得辭幽谷還將脫俗塵鴛鸞方可慕燕雀逈無鄰遊止知難屈翻飛在此伸一枝如借便終冀託深仁同前劉莊物幸因辭舊谷從此及芳晨欲語如調舌一作求友初飛似畏人風調歸影便日暖吐聲頻翔集知無阻聮綿貴有因喜遷喬木近寧厭對花新堪念微禽意關關也愛春同前劉得仁東風潜啓物動息意皆新此鳥從幽谷依林報早春出寒雖未久振羽漸能頻稍類冲天鶴多隨折桂人樽前喧集作時有語花裏晝藏身若向一作若在穠華處餘禽不見親栁陌聽早鶯陶翰見集本忽來枝上囀還似谷中聲乍使香閨靜偏傷逺客情間關難辨處斷續若頻驚玉勒留將久青樓夢不成千門候曉發萬井報春生徒有知音賞慙非臯鶴鳴禁林聞曉鶯陸扆曙色分層漢鶯聲繞上林報花開瑞錦催栁綻黃金斷續隨風逺間關送月沉語當溫樹近飛覺禁林深繡户驚殘夢瑶池囀好音願將棲息意從此沃天心鳥散餘花落趙存約春曉遊禽集幽庭幾樹花坐來驚艷色飛去墮晴霞翅拂繁枝落風添舞影斜彩雲飄玉砌綘雪下仙家分散音初靜凋零蘂帶葩空階瞻玩久應共惜年華同前竇洵直晚樹春歸後花飛鳥下初參差分羽翼零落滿空虛風外清疑香轉林邊艷影踈輕盈疑雪舞髣佛似霞舒萬片情難極遷喬思有餘微臣一何幸吟賞對宸居同前孔溫業美景春堪賞芳園白日斜共看飛好鳥復見落餘花來往驚翻電經過想散霞雨餘飄處處風送滿家家求友聲初去離枝色可嗟從兹時節換誰為惜年華空梁落燕泥顧况卷幕差池燕常䘖濁水泥為黏珠履跡未等畫梁齊舊㸃痕猶淺新巢緝尚低不緣頻上落那得此飛棲好鳥鳴高枝鄭衮養翮非無待遷喬信自卑影高遲日度聲逺好風隨雲拂千尋直花催百囀竒驚人時向晚求友聽應知委質經三嵗先鳴在一枝上林如可託弱羽願差池振振鷺李頻有鳥生江浦霜華作羽翰君臣將比潔朝野用為歡月影林梢下冰光水際殘飛翻時共樂飲啄道皆安回翥宜高詠羣棲入靜看由來鴛鷺侣濟濟列千官飛鴻響逺音李體仁漠漠微霜夕翩翩出渚鴻清聲流逈野高韻入寥空舊質經寒塞殘音響逺風縈雲猶類網避月尚疑弓弱羽雖能振丹霄竟未通欲知多怨思聽取暮煙中出籠鶻濮陽瓘玉鏃分花袖金鈴出綵籠遙心長捧日逸翰鎮生風一㸃青霄裏千聲碧落中星眸隨狡兔霜爪落飛鴻每念提携力常懷搏擊功以君能惠好不敢沒遙空霜隼下晴臯失名九臯霜氣徑翔隼下初晴風動閒雲卷星馳白草平稜稜方厲疾肅肅自縱橫掠地秋毫逈投身逸翮輕髙墉全失影逐雀乍飛聲薄暮寒郊外悠悠萬里情反舌無聲張籍夏木多好鳥偏知反舌名林幽歸舊集作仍共宿時過已無集作即分聲竹外天空曉溪頭雨自晴居人疑集作宜寂寞深院益淒清入霧暗相失當風閒易驚來年上林苑知爾最先鳴雪後聽猿吟顧偉寒巖飛暮雪絶璧夜猿吟歷歷和羣鴈寥寥思客心繞枝猶避箭過嶺却投林風冷聲偏苦山寒響更深聽時無有定靜裏固難尋一宿扶桑月聊看懷好音寒蟬樹沈鵬一葉初飛日寒蟬益易驚入林慙織細依樹愧身輕大幹時容息喬枝或借鳴心由飲露淨響為逐風清忝有翩翾分一作翼應憐嘒唳聲不知微薄影早晚掛緌纓文苑英華卷一百八十五
