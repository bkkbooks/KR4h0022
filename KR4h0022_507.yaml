body:
  text: 文苑英華卷五百七宋李昉等編禮門樂門二十六道國公嘉禮判四道九文六采判一道負劔辟咡判一道樂請置判懸判五道燕弓矢舞判五道教擊編鍾判一道奏安代樂判一道典樂羽籥判一道四品女樂判三道怒心皷琴判一道學生皷琴判一道迴風變節判一道五品女樂判一道國公嘉禮判國公有嘉禮謁者不示儀式科之云非五品已上仰處分對齊融稽彼寵章資乎禮物以明貴賤諒有等差顧諟國公幸分茅土爵跨五等位冠諸侯爰擇良辰用展嘉事相夫儀式合有司存謁者之行法乃為允執非五品更引兩端冝更喻知使仍舊貫同前李子卿國著建封禮存嘉好盖降殺之有數何等威之不忒惟彼國公列在王制當享賔之日且欲媵羞於合好之時仍將委幣顧茲謁者今則謂何拜辱拜嘉蔑無聞於紹相三揖三譲曽不節於周旋五馬初来見使君之佇立三星已下於粲者之未逢慢禮自冝抵罪闕事於何逃責遊詞所及雖委援於五品薄訴徒為袛取慙於一握俾投棘署無聽莠言同前陶朝五等之儀必從軌物六禮之數非無令典或表著而失節固憲章而在斯惟彼國公責稱列土慎爾侯度見錫命之有常覩於承家知禮容之必盛謁者久聞一作問從事云在司存儀式且虧於職官論刑未免於離次法有常制從徵於五品義而能伏實佇於三緘必也位居襲封時在散職將申直筆應候正名同前杜位開國承家已膺明命成人宜室當率舊章所謂伊人展斯嘉禮三揖三讓爰脩著代之儀墨車漆車將執親迎之道眷言謁者曽莫是思儀式之間自合歸其茅土降殺之數復何昧於等威縱以五品為辭終冀片言斯折九文六采判丁能從九文六采之大自謂成人或責其揖譲未中禮詞云周旋曲直各有所從對李暄威儀有差賔聘所貴舉必執禮是為成人能曲直之不違則進退而皆中惟丁克荷前烈紹復舊典修上下之紀制財用之節不失天地之經尚陳文采之數此實大者夫何間焉同游吉得禮之初固疑作因於國産類趙簡習儀之際效彼魯侯奉以周旋誰敢失墮每事皆問無廢孔門之則一言之請將成晋國之風諒詞者之有據誠或人之妄責負劔辟咡判甲負劒辟咡受詔者不掩口或告失儀曰唯而未對對敬括父子異論應對殊㫖或有不敬必一作心遺其責負劒者甲莫履乎禮爰辟咡而有詔宜掩口而斯答何乃良袂未引哆口斯張心尚滯於童䝉氣先加於長者侔之内則斯闕義方語彼過庭此迷禮訓或非為當仍訴何為樂請置判懸判有州申百姓皆好操縵都不識雅章以不能易俗請置判懸供釋菜賔社之用使人觀習省以為非所冝言不為聞欲科罪訴云州將鹵簿見著令文且方古軒縣為降已其置之何過對萬希荘革物訓時觀人設教欲風之以正樂必采之以雅章茍操縵之見淫誠布政之為辟如或上下乖序雅節亂常匪所以易俗宣風適足以貽刑立辟且禮資成化樂貴移風諸侯軒懸自有感縁之節州將鹵簿豈係賔社之容若以大夫之懸俾人觀習是棄先師之禮云誰降殺同前齊融國家制禮作樂懸象示人列在京師編諸甲令禮縁失序自可取之於朝樂章不虧何輙列之於野茍希專制豈曰宜言惟彼有州殊非折𠂻中和樂職不見盛徳之容上下判懸無聞達禮之意置之何過州乃飾非不與上聞省以為當同前康子孝雅有大夫樂有君子將以昇幽崇徳降物平心當令率土齊觀頌無為而擊壌普天同樂學操縵以施絃涓選既脩匡衡之章遂覩鄭聲久絶文侯之卧亦興比屋可封薰琴觧愠自應兩日施化三年有成釋菜之儀則聞於肆夏賔社之用葢取於登歌欲還甿庶之風何假大夫之樂而引令鹵簿空肆危言州乃不應請置有紊彞章省以非所宜言雅符公正事縁共理過亦難科未推臯陶之刑宜㸃平輿之品同前李元樂章脩設國風式備延陵聘魯竟辯興王之徵魏綘和戎始受歌鍾之賜干舞有序上下於是協和金奏克諧隂陽以之交泰所以考性情之不忒質鬼神之無疑靖俗調人比物適節雖擊石拊石萬物必諧於大雅而不識不知百姓尚迷於古奏然而古今異制沿襲匪常皂葢朱軒接國章而有著奏籥振萬徵古禮而斯易學操縵於雅曲乃大略之椎輪感頌漸音行當易俗何必引軒判之制操賔祭之儀非所言焉象刑之典宜及古之制也鹵簿之例徒施同前張𤣥度明則有禮樂幽則有鬼神並繫國移風助天成物我堯舜其徳清明在躬詠南風之時光宅天下肆東平之樂政事惟醇瞻彼有周誠為率土百姓樂業羣黎向方而先彼藝能後其節目操茲雜弄存彼安絃承奨訓於鹿鳴冀成功於蟻垤州司以亊乖易俗不識樂章既慙師乙之言有類文侯之問爰申禮閣欲置判懸供釋菜於賔社庶甿黎以觀習且是請也非所宜言昔子路居蒲文翁處蜀自有無聲之樂豈聞操縵為辭欲寘爰書若何文過軒懸鹵簿徒餙詞於如簧郵罰麗亊豈逃刑於聽棘燕弓矢舞判燕師國子以弓矢舞樂師廵列將撻之曰眂瞭詔瞽來臯對解賁國有大㑹式敷燕禮大樂允釐萬舞斯列或陳干戚或執羽旄與天地而同和在神人以咸若惟彼國子師膠于庠將諧搏拊之節遂形弓矢之制實遵古典豈紊彞章樂師所巡奚妄加撻祭用荆茅徵羽乃遺其一聲饗以空桑孤竹或全於九變春秋興廢葢宗伯之常禮尊卑抑揚實伶官之本職何懵大體忽寘深尤審樂不愆子焉斯得惟刑是恤師也則亡眂瞭稱過於師曠知音曷同於季札濫罰之咎明以刑書同前蕭昕選勞策勲辨樂論徳師曠侍晉如崇侑食之儀士丐平王頗職蒸餚之禮於是小臣戒備太師辨章笙入懸間歌昇堂上禮亦異數既加籩而稱節樂其無筭方及旅而揚觥率禮未見陳弓搢扑固宜行撻國子以行能不著版籍徒編乏周瑜之聽音同孔張之失位使仲尼忘味不及在齊吳札觀風還同自鄶舞師見察而不迷於樂章瞽人妄告請無廢於杜舉同前崔㝢禮備吉㐫義存燕享茍嘉事之不體豈刑書之獲宥命䕫典教虞經所重立政崇術王制攸先國家授才任能講信勸學鄭聲久放不效文侯端冕簫韶已陳足使孔宣忘味顧是胄子舞斯嘉樂不能請業且服拳拳之道而乃將撻以速青青之刺樂師巡列葢亦司存頼先父之職官敢有二習為於予之擊拊能閑六律撻之不謹謂得其忠誠厚責而難逃奚薄言之妄訴將眡瞭成訟孰曰知言以瞽臯為詞何居昧識徳之不務失鵠自可求身過也必文溺人無宜反笑同前趙陵陽國有燕禮式明慈惠之徳政資和樂爰修歌舞之容所以厚之崇仁此句疑誠省威儀之節先王作則顧禮文而可徵君子守官瞻守一作聽主掌而何闕且宗伯列位舊章不忘司弓設班周經未棄是以舞而習射抑有前聞用斯義而燕飲孰明其趣而乃師兹國胄亂我王猷静言越樽何以率職相師之道在眂瞭而何傷失禮之辜伊瞽矇之或忝樂師所罰雅符滅鼻之刑訴者無辭尚勞滕口之説徒有來臯之詔終貽獲戾之憂同前張喬燕訓恭儉樂協詠歌君子以之侑食先王所以布政師彼國子舞于公庭始合於文執羽籥而在列終奏以武覩弓矢之斯張進退疾徐取六律以成節屈伸俯仰宣八風以克諧始協伯䕫之教自得周官之典眡瞭詔瞽既訴者之有詞樂師巡列何朴作之妄罰於此觀禮宜其緩刑教擊編鍾判太常申視瞭訴稱無人教擊編鍾科鍾師罪憲司按其未當所由不伏對邢寅國典攸設秩官之常各靖其能無替乃事所以備樂成列編鍾在懸是擊是考有倫有脊則修古訓儆其職官將視瞭之所司宜磬師之尚教何所由之黷禮寘鍾師於非辜同蠶績與蟹筐比邯圍於魯薄興言循口刑其捨諸或縱詭辭罪難於已未當斯按皆將取焉不伏為言猶拾見左傳一作捨非瀋也奏安代樂判禮部責太常不奏安代樂訴云今之所奏雖曲名不聞聲調相類且簫難備何用此為對魏宥禮因樂聲既沿且襲須有專達司于太常是知六律六吕一作同之差三成四成之奏所以感和天地降格神祗繁手淫聲必有所禁輯人安代奚乃之違則韶濩其名匪一䕫而可辨笙鏞以間何細器之能諧輙游厥詞過亦奚逭典樂羽籥判乙典樂掌羽籥干戚不知屈伸俯仰人或非之云所主噐未達其文對姚峴聲以成文樂可易俗期於五者不亂故使八音克諧爾乙于何典斯噐也爰執干戚雖職列伶官徒紀鏗鏘則義同制氏欲使齊其綴兆節以屈伸縱曰仲由兼人不及鍾儀守職周旋罔墜禮義何愆或者見非誠為參不敏也而辭且能順勿謂䕫其勞歟四品女樂判乙有女樂一部御史按之云見任四品清官仰處分對李仲云樂云鍾皷詩美琴瑟貴以平心非徒娛耳惟兹四品諧此八音茍嘉樂之可觀在官班而有節况昇平之代朝野多歡簫韶之陳獸猶來格家室之際女也何妨未乖至理之宜何速憲司之按此而獲過豈曰知音同前爵以馭貴樂以報功異其四者昭以聲文既比物以飾節亦安徳而教和乙也銀艾蟬聨朱輪焯耀名稱貴士位列清班家乃伐氷朝膺食肉二肆未陳於縮霤一部且列於曲房事等馬融義符魏絳且窈窕閒淑蛾眉麗姿樂則備於伶人禮可嬪於君子功化絲枲舞節鏗鏘稽命數而合宜在法令而何爽御史紏按無乃深文同前李應禮不與奢慎微以從事用過於儉在貴而能貧乙也不愆其儀匪懈其位詎聞不擊不考同詩人之皷鐘而乃翕如純如類文侯之冠冕東山逸態事比謝安後庭曲施意齊田蚡法司所舉允執厥中儻人惟通班列四備之嘉樂國有成命因五利以和戎理宜捨之以勸能者怒心鼓琴判甲聽乙皷琴曰爾以怒心感者乙告誰云詞云粗厲之聲對元稹感物而動樂容以和茍氣志僨興則琴音猛起儻精察之不昧豈情狀之可逃况乎乙異和鳴甲惟善聽克諧清響將窮舞鶴之能俄見殺聲以屬捕蟬之思慿陵内積趨數外形未平君子之心翻激小人之愠既彰蓄憾詎爽明言詳季札之觀風尚分理亂知伯牙之在水豈曰譸張斷以不疑昭然無妄宜加黜職用刺褊心學生皷琴判乙為太學生好鼓琴博士科其廢業訴云非鄭衛之音對夙夜惟寅雖無捨業琴瑟在御誰謂溺音茍未爽於克諧亦何傷於不撤乙也良因釋巻雅尚安絃期青紫於通經喜趨槐市鼓絲桐之逸韻叶暢薫風好濫既異於文侯和聲豈乖於曽子欲科將落合辨所操儻雜桑間之淫須懲煩手若經杏壇之引難責平心未詳緑綺之音何速青衿之刺忝司綿蕝當𨽻國章載考䋲違恐非善教廻風變節判甲鼓琴春叩商秋叩角樂正科愆時失律訴云能廻風變節對八風從律氣必順時五音迭奏和則變節絲桐之妙茍極寒暑之應或隨甲務以相宣因而牙動和飰牛之唱白露乍結於東郊授舞鶴之聲青陽忽生於南吕皷能氣至藝與天同且異反常之妖何傷應感而起惡夫典樂曽是濫科凉風徐動於鄭奏遽云失節寒谷儻移於鄒律何以加刑克叶之薰無令寘棘五品女樂判辛為五品官有女樂五人或告於法訴云三品已上有一部不伏對聲樂皆具以奉常尊名位不同則難踰節辛也榮沾五命始用判懸僣越三人終乖儀制非道不處多備何為茍耽盈耳之繁遂過粲兮之數廣張女列徒効尤於馬融内顧何功欲思齊於魏絳罔循唐令空溺宋音雖興一部之詞其如隔品之異請懲擾雜以償人言文苑英華巻五百七
