body:
  text: 文苑英華卷三十七宋李昉等編水六浮漚賦三首潢汙賦一首尺波賦一首溺賦一首浮漚賦崔根總目作損仰參造化之理俯察宇宙之功既希微而不測亦要妙而無窮至如殷雷發谷激電流空石燕飛而迎雨銅烏振而驚風已而懸溜不止空庭積水對雱𩃱而厯覽見浮漚之邐迤瑩映澄徹內明外美倐往忽來乍滅乍起含卷舒之度得行藏之軌其柔也則隨波以為心其剛也乃觸物而忘已諒潛運之恍惚孰能察其終始浮漚之義大矣哉俯而觀之錯落煌煜若明珠之出合浦遠而望之的􅀈和一作旁羅若衆星之列長河爾其因水發色以空成相懷清潤之秀氣負圓通之雅量信天澤以成姿豈人圖而為狀且夫勢有萬端形無定質或繁小而爭湧或希大而間出從下流而守謙託上善而非溢冀輝彩於當年故韜光于晴日第二楊炯在霖霪之可玩唯浮漚而已矣况曲澗兮增波復坳堂兮漲水霤滴瀝兮行注階潺湲而浪起寸步百川咫尺千里於是乍明乍滅時行時止排雨足而分規擘波心而對峙輕盈徘徊容與庭隈狀若初蓮出浦映晴波而未開又似繁星落曙耿斜漢而將回合散消息安有常則倐來忽往不可為象雨密稠生風牽亂上若乃空濛采褰浩汗浮天流平舊沼𣲖溢新泉分容對出吐映均鮮觸流萍而欲散礙浮芥而還連光陵虛而半動影倒水而分圓始參差而別趣終宛轉以同沿歷亂踟蹰漂沸縈紆細而察之若美人臨鏡開寶靨大而望也若馮夷剖蚌列明珠逐風波而淡泊乃變化而須臾迹均顯晦妙合虛無同至人之體道亦隨時而不拘夫其得坻則止乘風則逝處上下而無窮任推移而不繫似君子之從容常卷舒而不滯故其在陽則隱在隂則出泄泄悠悠匪徐匪疾固自然以見體託行潦以凝質類逹人之修身故不欺於暗室蕩薄畎澮鼓舞洲渚其生兮若浮其居兮若旅雲銷雨霽寂無處所唯斯物之靡依獨含情而應機暫假有而示潔終淪空而匿暉苟無心以自纍夫何適而有違第三鄭太昊粵若雲橫於斗月離於畢石燕初化泥牛未失重隂潤礎看澍雨而交飛行潦浸階見浮漚之亂出爾其合散無常漂蕩自然形色虛潔表裏澄鮮似珠胎之出漢若星象之浮川拂還風而獨轉偶到集作倒景而雙圓夫其仁也不輕蛙黽之穴夫其勇也不怯蛟龍之泉觸奔槎而遽碎近浮藻而還連觀夫繞砌潢汙回塘緑水長簷連屬通溝表裏排亂滴而攢生逼潨流而細起乘川則逝遇坎則止雖有近於泥沙信無纍於囂滓既生既滅如幻如夢體象明媚上下沖融徘徊未息展轉何窮識盈虛之不定知造化之皆空則知生也若浮榮兮如寄秉隂守不競之德就下保撝謙之義清虛自若有高尚之風隱顯無恆有行藏之智別有縉紳公子思浮思沉乘時趨勢佩玉鏘金見浮漚之形象息狙詐之機心况乎失路書生懷憤胸臆規術恬靜節行孤直覺萬化之俄頃知千齡之瞬息能不操紙殫毫敘浮漚之德潢汙賦并序錢起潢汙水之微也汲引之際人皆捨諸唯有德者知之薦鬼神以昭忠信則百川雖廣莫逮其用焉喻士先沉後伸放疑作於知己也辭云潢汙之水天實降之雲散雨絶淵然在茲胡稟柔而成性能處下以任時善乎濁而徐清貯之將緑棄捐池沼之外隱翳林臯之曲接九派而何勞方一勺之自足至若雲霽地表霞開水隂乾天可鑒物象是臨山曉映而色近雲高淨而影深險阻不行芥舟寧覆盈滿知節鴻毛匪沉産蘋蘩同南澗之有藻聚飛動異舊井之無禽斯其善利也乃至人之用心且夫出山者泉歸海者川汲引無絶隄防在焉彼苞蕭屢浸束楚不傳唯潢汙也獨此晏然其明若昧其壅若退竭而自中盈不侵外天資其潔德維貫神明人棄爾微道不行畎澮夫事有小而可廣運有塞而必通當休明之聖代徵泂酌之古風彼湛然以虛淨盍薦之於王公俾爾忠信昭明有融俾爾嘗祀景福延洪斯則椒漿與桂酒可以比美而同功尺波賦以水淡幽色風初起波為韻錢起瀲灔駭水奫淪始波引分寸之餘風從一勺激尋常之內無爽盈科勢將坌湧迹異盤渦蹙跬步以無數蕩分隂而自多觀其日色遙臨風生未已圓規可驗疑沉璧之舊痕前後相侔若浮書而競起迹疊相近萍縈有餘促漣漪之散漫擁跳沫以虛徐流脈中移類蠖影求伸之際浮光上透若雪華呈瑞之初湧以回回馳乎淡淡始羣分而下瀨將積少以習坎生而有凖動必若浮如投石以花散等覆杯而迹幽影不過於布指光遽溢乎寸眸洶洶安翔似欲將乎斗注沺沺增繞如潛運以環周無驚川后未發陽侯當淡以成之寧同瀑怒謂小為貴也爰進涓流淺漾風光輕蟠水力寸長所及知文在其中方折是為見動不過則散或往之浮彩轉初盈之淨色將潛寧戚之鯉半未能容若流張協之薪重而才得汾濕若沖溶滴相通未合流於油岸方鼎沸於汾風礐石愈蹙淪池不融是將寬其泓量誠有重於泉蒙濩也如委淪然可視茲延袤以上騰匪徒旋於中沚翠瀲交映璇源共紀將不退於大成固在乎有便於風水溺賦楊夔玄微先生淡慮澄情樓倚嶽陽湖觀洞庭渺漫兮若與乎天平遠指君山一螺黛青遙覘湘浦一片雲明輕楫巨舸載縱載橫或楚歌以應棹或漁唱以齊征雖云吳楚之濶於焉瞬息之程俄而濃雲興猛吹作訇訇兮雷霆零零兮雨雹波勢兮奔騰波聲兮渀瀖或若積雪或若裂壑樓岌嶪兮地如落欹檣側帆倐出欻入煙馳霧驟神號鬼泣忽翼舉忽蟲蟄波而解浪而傾者亦一瞬而俱及雨既霽風亦止呀呷餘波振蕩未己俄有呈其板而流者碎其篷而飄者彼緘縢之篋扃鐍之匱委翳波間罔知所祕或一竹以脫命或舉族而咸墜沿汀繞濱零落在地玄微子指而泣曰其嗜利則孟子所以惡交爭也其欲速則仲尼所以悲不逹也孰有輕命若糞重賄如山用一縷無繼之力涉萬仭不測之川踐險冒危既蔑履氷之誡殞身覆族空銜沒齒之寃𢎞農子聞其言同其歎此則以江以湖沒不可援今復有非波非濤溺不可算窺之則茫然無岸由古及今陷者如貫玄微子矍然其詞泫然其悲何陸之為溺而不維不持紛吾緒而亂余曲爾其辨而折之乃曰麴蘖是惑沉湎無時混淆先後顛倒矩規唯誕是習莫禮是持散髮裸體以遨以嬉汨親踈兀尊卑情所至則至意所為則為可慶者忽其慶可悲者忘其悲龍章莫保鳯德何衰光逸則狗竇求入伯有則壑谷忘歸子反不謀於軍前敗非天作正平不拘於席上禍乃自貽但驕其氣益亂其機隋兵濟江玉樹方舞越人入户金斚猶飛所以為酒之溺也至若貝含其齒雲聳其鬟苞藏其戾矜持其妍攻巧若拙移曲成端為媚斯極荷寵益堅陳靈以衵服戲朝俾君臣受禍驪姬以歸胙獻毒使父子成寃齊莊以盜室取斃郤犨以奪儷不全此所以為色之溺也至若伊義莫顧唯賄是務以譎以回不軌不度溝壑難滿錐刀必聚莫興知足之慙蔑有惡盈之懼其帑溢其帛蠧其貫朽其粟腐營營尚恐其力窮汲汲不思其日暮復有白版為侯黃金作輔南宫變屠賈之行西圓疑作園成闤闠之路求金求劔曽無就木之心鬻爵鬻官但欲齊天之富壬夫死而方覺雍子戮而未悟此所以為貪之溺也至若專國之柄操天之軸任其情性隨其嗜欲其喜也沉者浮其怒也贏者縮易否為臧化直為曲雖山重而可回雖海深而可覆其門若市其帑如谷背者斥向者録言張其機笑孕其毒譽之則銖而為鈞訾之則歌而為哭屏內外之氣側天下之目稽其莽卓考其産祿謂兵鈐之在已將神器之有屬國璽行竊弄之手宫闈開盜視之目自謂其投蓋之力可圖殊不知燎原之火難撲既衆叛而親離竟噬臍而齧腹此所以為權之溺也是四者匪橫其流匪駕其舟有溺者孰究其由其毒也必漬於骨髓其痛也亦甚於戈矛雖扛鼎之力觸山之酋亦不能杼之以出而况於纎離之儔哉玄微子乃曰始吾觀涉水而溺則恍然而內惕今復聞不波而沉則瞿然如大敵且酒不可甘甘之則沉吾命酒曰甘波色不可愛愛之則溺吾命色曰愛河衣所以被體食所以充腸苟朝晡而不匱寒暑而有裝豈假積粟於廪儲貨於囊且藥所以攻百疾百疾蠲而藥不止者鮮不及其殃吾命財曰藥江士患不逹之名不立之身苟逹苟立在守其真何必競升沉之路爭輕重之鈞狼子野心昵之害人吾命權曰狼津噫生於世不溺於四水者吾謂夫顔閔之倫文苑英華卷三十七
