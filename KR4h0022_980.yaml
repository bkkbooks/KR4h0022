body:
  text: 文苑英華卷九百八十一宋李昉等編交舊四祭吏部元郎中文一首祭夀州張使君文一首祭揚州韋大夫文一首祭韋炎端公文一首祭賈尚書文一首祭相里造文一首祭滁州李庶子文一首祭裴尚書文一首祭李員外文一首祭陸端公文一首祭吏部元郎中文獨孤及年月日禮部員外郎獨孤及謹以蔬飯壺酒敬祭於集作于故吏部郎中元公之靈上士齊死生下士愛生惡死而惑之知生死若幻而不能忘情於其間者我輩所不克免始者與公同弔死問生論議亦頗嘗及此豈謂言未絶口而公又長往昨日經過遽成疇昔何變化之速乃至於是視不及瞬言不容集作及息嗚呼元君今已返於機夫彭祖殤子同歸於盡豈不知前後相哀逹生者不為嘆公齒髮未老官途方半相視而笑冀前路各有所展豈圖問濶數日而死生間之竹林如故階塵未掃惟人琴兩亡影絶響滅清絃豈可復聞承以今辰將赴塋闕痛天道之無集作茫昧予豈無言而悲来從中遂集作逺復抒意匪祭也永以為别也尚饗祭夀州張使君文前人年月日舒州刺史獨孤及謹以清酌嘉蔬柔毛之奠敬祭集作薦于故尚書工部郎中夀州刺史兼侍御史張公之靈頃者剖符為郡與公隣邑祗役往復日以携手嘗辱嘉恵愛我則深奈何此集作故别後盈魄未周相去無山川之間纔聞嬰疾遽告不幸古詩稱一息不相知今而果爾三字集作乃爾耶别時髙論精義在耳袖中尺書灑翰猶濕而形影驟滅了無還期雖欲効古賢謂悲哀為怛集作恒非化情莫可遏徒虚語爾惟公貞亮温毅強學好古人皆窪而盈曲而全公獨以全真集作峭直接物雖悔恡不改其度人多求田問舎公獨以百家言為寳蔵書至八千卷而不止以斯道也施於集作于有政故其德形於事業其仁浃於百姓楚人夀人如得陽春識者揣公夀與位偕今也溘然而人何望嗚呼王事拘限㑹葬莫及思賢嘆逝執紙涕零苦久要之不我忘也豈不顧饗於今日蘋藻之奠尚饗祭揚州韋大夫文前人年月日朝散大夫檢校尚書司封員外郎三字集作郎中兼舒州刺史充本州團練守捉使賜紫金魚袋獨孤及謹以嘉蔬柔毛之奠敬祭于故揚州大都督府長史兼御史大夫淮南道節度觀察處置使韋公之靈王命九伯底綏四方惟公剖符作藩維揚往嵗斯民匪廸匪康自公戾止視之如傷飾吏以儒出言有章革剗煩苛載戢暴强將吏奉之集作君若網在綱罔或作威以紊典章集作常民斯輯睦政亦允臧和氣被物豐年降祥天之輔仁公宜熾昌奈何不淑景命遽殃集作央百城悼心萬民何望及忝列城備守封疆獲宥罪戾庇身余光德宇所覆今也則亡偏思遺愛追蹈一作悼餘芳俛仰興懐望慕淒凉拘限所職路阻且長遥抒下情㫖酒一觴尚饗祭韋炎端公文前人年月日司封郎中兼舒州刺史獨孤及前舒州司馬皇甫曽等謹以清酌庶羞之奠敬祭于故侍御史舒州桐城縣丞韋公之靈昔公執法柱下某等接足集作武周行嘗集作常趨後塵飽聴公議及既出守曽後播遷公亦負譴玷玷字集作黜官辱同官為寮之好敢不知孝弟忠信强毅正直樂善惟恐不及嫉惡不盡集作去不止分枉直於心職集作識以澄清為己任形於造次發於自然謂必眉夀且鍾介福奈何强仕集作壯之年大才先謝志業所趍未申萬一有生之涯溘然永已慈親羸老弱子未齔反葬無望委體集作骸他山等為歸真難集作艱痛太甚天不我弔哀有何極某等頃嘗以樽酒豆肉邀君同歡今之所獻猶前樽也但夙昔志氣比来話言遽悉㝠漠無非夢想往既不及来莫我集作可追猶持此樽集作奠以抒永别至苦集無此二字夭閼之痛夫復何言尚饗祭賈尚書文前人大厯七年四月二十一日朝散大夫檢校尚書司封郎中兼舒州刺史賜紫金魚袋獨孤及謹以清酌庶羞之奠敬祭于故散騎常侍贈禮部尚書賈公六兄之靈嗚呼性命之源仲尼罕言頃者與兄存而勿集作不論亦謂景福必鍾德門未虞昊天驟忍我斯集作欺是所以分手容易前期日往書札秪嗟别離孰云别中死生間之賈生謫去遭世不用以命問鵩千古猶痛兄逢盛時任適梁棟青雲咫尺巨鱗始縱溘爾中止俄同大夢天下孤望非兄誰慟追念夙昔嘗陪討論總集作終覈微言揭厲孔門匪究枝葉必探本根髙論㧞俗精義入神誓將以儒訓齊斯民文章陵夷鄭聲奪倫兄於其中振三代風風復為朴集作復雕為朴正始是崇學者歸仁百川相宗集作如川朝宗六義炳焉自兄中興大名全才儀刑百工嗚呼彼天胡不祐焉集作賢闒茸讒䛕或錫永年好學不幸繄兄復焉集作然豈天地不仁將斯民薄祜顒顒之望見奪何遽某獲見於兄三十有六年矣兄有十集作七年之長䝉以伯仲相視博文約禮為集作謂仁由己同心之言期於沒齒前後尺牘羅列案几愔愔清論恍恍在耳一旦如失萬年集作事遄已民之所望今也胡俟某守職拘限㑹䘮集作塟願乖白馬素車欲往無階寢門一號心酸骨悽容徽自此永不復見若魂魄無不之也豈不覩平生心於今日斗酒之奠乎尚饗祭相里造文前人年月日舒州刺史獨孤及謹以清酌之奠敬祭于河南少尹贈禮部侍郎相里公之靈嗚呼往嵗嘗與公度論死生變化豈不知身與萬物悉當歸無猶謂不惑於道者可以不奪其算豈圖論猶在耳目未及瞬而公度之身後為異物益知觀化而怛集作恒非自古皆妄而哀来從中妄豈易遣嗚呼公度有志有文量足韜世善可救物宰賜言語冉季政事古莫兩大繄公兼之伊昔密薦可否廷折兇佞京師童兒亦知公名其後江人杭人頌德不暇洛表耆老傒公而蘇秉公論者無賢不肖孰不謂公致君致身方自此始奈何吉未㑹也凶問随之天下悼惜士友悽欷况某投分於䇿名之始並命於剖符之列久要不忘平生實惟公度是望心同病同集作同心同病我身子身也子與化往奈我心何名跡留為政集作故事語集作話言存乎耳目惟音形渺忽無前期可望每一念至哀填胷臆往矣公度去我何之勿言一樽永難集作無共持儻肯顧饗表公我思尚饗祭滁州李庶子文前人某月日常州刺史獨孤及謹以清酌嘉蔬之奠敬祭于故右庶子滁州刺史揚州大都督府司馬兼侍御史隴西李長夫之靈嗚呼才與上夀并者吾不得見之矣得見中夀者斯可矣嗚呼長夫曽未半之官不展才事不如志奄謝昭世溘歸黄泉雖欲茹哀哀可茹乎追惟長夫行茂神俊孝愛友睦諒直仁勇卓犖夸邁英明曠逺集作逹文武志略邦家必聞為州治行居百城之最詩賦歌事窮六義之美休聲喧於里巷佳句被於管絃珪璋令問中外注耳謂當入拜九卿出分四岳萬人所望一旦中止行路悼惜豈直同心者之心滄洲長挹之談玉溪獨往之興兢集作竟迫身世永孤志願集作願言倘魂而有知當飲痛泉下往嵗滁城之㑹俱未以小别為感集作慼臨岐道舊坎坎鼔我酒酣氣振言盡歡甚孰知此際以是永訣今萬事如昨日集無日字書札猶新惟故人音容不可復見悲莫悲兮生别離况長往之别乎王事拘限莫由執紼巵酒豆肉後㑹無期彼蒼悠悠逝者何之長夫長夫魂兮来思尚饗祭裴尚書文顧况嗚呼天禍甌邦尚書告薨哀哀甌民罷市輟舂何時復覩盛德形容伏惟尊靈恵和温恭識洞元龜文掩雕龍天生大賢叶賛時雍至人厭世寥廓為友精神不留天地長久谷神不死是曰長生伏料尚書上賔天庭悲號者何在物之情惟公據道夙負重名爰自成才歴拜通榮五十餘年侍奉承明随難西蜀㧞身定傾有唐中興累踐銓衡朝廷擬公三老五更上憂方隅出典百城淺學自私掩善揚鄙峩峩尚書近仁不已昔在春宫先我大國欝興多士周易有云黄中通理其斯謂乎自我江潭于今多秩處順保終洗然自逸上官命况糶鹽蛟室奄居黄泉不見白日顧惟陋賤時承周密感德懐仁何時終畢神儀超忽靈駕徘徊敬申薄禮以表深哀伏惟尚饗祭李員外文前人古之哲人銅鞮介山栁下臧文先生企之密邇四隣逄時不昌與世邅迍先生淵然金碧無塵通識殊倫精義造神退居江潭節貫松筠皎皎先生蘭言玉聲詞林摇落天地空春宜與太一上為帝賔若商傅説例列星辰天將以公經濟生人生人不幸天䘮斯文斯文既䘮嗚呼郢匠先生逝矣何人知况如况何人升堂誘進造次無為樞機必慎跡暢髙節心融密印詞不能豁其胷襟故舂容於絶韻而京口歸魂毗陵旅櫬可勝悲哉心䘮自何身役炎洲先生大歸赴哭無由古之逹者以生為浮先生徂征與化同遊四節不畱物無長在寂寂賔階人遷事改陶潛自祭管輅知終本師瞿曇了逹虚空初命少子昏冠先一作光禮兆祭一作發深哀疑作衷聖朝悼歎儻遂追崇忝友季茂休戚略同北望丹徒山險萬里文非尺牘鬱塞盈胷想公形容昭况肅恭尚饗祭陸端公文前人維大厯八年正月朔同郷顧况於永嘉發使具簞蔬野酌敬祭陸三十二兄端公之靈嗚呼接席之歡俄成奠酒殊郷少别杳忽于今牽拘南役逺哭如淚兄秉德居厚植靈超茂天和發外虚白自内特挺孤操與物去害惟昔二京群盜縱横出入十年天下交兵越盜㓂吴殺人燒城國危如此公乃請行我之行焉無往不平擁陣陵陽廻戈歙右江南山洞畧盡遺醜拒敵先摧羣降獨受兄之令弟况之良友感激風雲留連詩酒昔魏有人子方段干兄之所在人心獲安賢者讓平惟患是急兄之忠勇人莫能及燕將泣書齊師復邑迹為功著名因義立惟帝念功君門遂通臺閣生風乃憶江東髙臨山中有書滿屋與人共讀有粟如雲與人共分破富為貧好事日聞靄靄牛潭峩峩囊嶺開流架逈倒寫烟景今日凄凉林空夜永人或有言吉凶無門我命由我以兄之才何適不可寧知一旦忽鍾兹禍鴻翔千仞自兹而墮嗚呼哀哉伏惟尚饗文苑英華巻九百八十一
