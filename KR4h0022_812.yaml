body:
  text: 文苑英華卷八百十三宋李昉等編河渠絳巖湖記一首南陵縣大農陂記一首桂州重築靈渠記一首興州江運記一首祈門縣新修閶門溪記一首絳巖湖記樊珣句容西南二十三里曰赤山天寶中改為絳巖山以文變質也山外周流厥有湖塘舊址考於前志則曰吳人創之梁人通之矣洎金火有變積為習坎灌莽之所我唐麟德嵗邑宰楊嘉延亦纂前服利農為名雖迹於傳聞而事斯茫昧楊氏之後今餘百年實滋菰蒲莫植粳稻剝極則賁俟能而伸大厯十二紀縣大夫兼大理司直太原王公昕能蘇罷勞一作人且易弊俗臨湖而歎以欲從人吟使臣之清風酌良牧之髙課將圖永逸匪顧暫勞因察其地形訪以輿誦謀始作則定徒撰工月在休農雲其荷鍤周匝百頃一作里蓄為湖塘置兩斗門用以為節旱暵則决而全注霖潦則瀦而不流收功濟時道甚明逺開田萬頃贍户九鄉洎成奧區頗無凶嵗魚稻之盛公實為之昔叔敖芍陂能張楚國史起漳水竟富魏邦秦稱鄭國漢歌邵杜皆謂是也每商羊罷舞龍見而雩比屋有憂於銷鑠連阡莫覩於耘耨我則黛波奫淪白鳥飛滅下洞庭之鳬鴈泳中流之鱣鮪橫塘之右構為新亭芬其芰荷樹以杞栁楊楚江嶺憧憧是途行李實獲於䕃庥歌詠或藉於觀覽懿乎哉君子之用心也孰愈崇其島榭侈以林堂此而莫文翰墨奚述大厯十二年十月三日記南陵縣大農陂記韋瓘宣部支邑十城而南陵處劇蓋由庶民囂豪物産多狀山川鬭錯風俗詭浮故理束則民潰政放則民怠俱不得其極自非肅亷和敏措動守中則莫至良能况功利及物邪皇帝四年今地官侍郎盧公觀察宣部精心厚下重難邑長乃以寧國令順陽范君假南陵印為大夫於是肅以檢姦廉以約身和以納民敏以應物物不天落民得休泰盧公嘗曰時或爽候雲龍遁逃膏澤翔枯物不遂液吾人其瘁乎下令邑中有能修復陂塘積水防患者終懋厥功先時縣有廢陂曰大農積嵗不理荒梗幽扈丘隰遁形空規殘狀非鄉黨之夀耋不可欵識輿人飛語他邑病能訾訾囂囂波翻風合范君獨判於心不惴一作畏騰口曰利於人也使吾獲戾而罹悔真吾心也且黔愚皆苦於始作而泰於成功况吾君侯明吾天子聖尚何懼哉乃召鄉老里正尹而計之具畚挶列綆鍤筥礫礱堅披材輦壤日必巡丈周察勢便仁以撫馴悅以附來法以督姦勤以勸勞於是雲動雷行斬莽闢蕪撥腐曝淤培髙徹卑不知形疲不憚苦骨不殘民力不費金刀潛軼化工事於農隙三旬而畢不戮一人其大一作始也驅江波六十里活活下來闢荒梗數萬畝汪汪虛明疊石構嶺縱三百步龍蟠虎鬭橫殺衝波泄流引洫臂發三港支分脉散澤入大田厥功既成乃有風雨暴鬭洄復一作激换晨虺虺沸㑹似聞構作及乎雨斬雲除則沙洲突出力捍嶺下若自開闢之初信為神物所相雖使江河合災驚濤稽一作懷山大浸崩驅暴猛來敵亦不能軼峻防而侵厚趾斯乃天贊其功豈非仁深於物乎其或火雲爇天旱魃為虐歊蒸疸怒蛟龍逭誅而翠㶑搖岸澄瀾洗月溶溶浩浩獨落天光順勢導流猶潤百里則貫畦浮塍平嵗之溉千頃豈為多哉其細也孕鱗甲之族育鳬鴈之羣羅生菰蒲蔓合菱藻漁父舟人浩歌揚楫厚生之物永永不極斯其功也可以灼當世而芳千古矣昔者西門豹治鄴召翁卿二字一作公治上蔡而史氏國書或作書美顯白良能以其因水茂功利澤及物者也則大農傑跡功符天作可以論古對能豈有愧乎范君尋遷御史後三年吏民益慕而願表尤功今連率范公以文行德器挺為時賢爰領宣部仁義明舉其下聳善常推至公邑人三請于公乃曰他人有善惟恐不聞况伯也一作氏功利如是吾豈詭故哉乃從之邑長李君久以材能𢎞張其化吏民甚安之追論大農盛績因民之心以成其善志亦春秋之事也鄉將石定録事丁宗耆夀戴誠佐史章佾或參其議或督其事洎百姓朱綸李縱田丘程𦙍等若干人咸請豫為記云元和八年嵗次癸巳六月壬午朔十五日丙申建一作皆唐文粹興州江運記栁宗元御史中丞集作大夫嚴公牧于梁五年嗣天子用一作舉周漢進律增秩之典以親諸侯謂公有功德理行就加禮部尚書是年四月使中謁者來錫公命賔僚吏屬將校卒士黧老童孺填溢公門舞躍歡呼願建碑紀德垂億萬祀公固不許退而相與怨咨遑遑如不欲集作飲食於是西集作四鄙之人密集作私以公刋山導江之事願刻巖石曰惟梁之西其蔽曰某山其守曰興州興州之西為戎居嵗備亭障實以精卒以道之險隘兵困于食守用不固公患之曰吾嘗為興州凡其土地集作人之故吾能知之自長舉北至于青泥山又西抵于成州過栗亭川踰寶井堡崖谷峻隘十里百折負重而上若蹈利刃盛秋水潦窮冬雨雪集注作水潦于秋雨雪于冬深泥積水相輔為害顛踣騰藉血流棧道糗糧芻藁填谷委山牛馬羣畜相枕集作藉物故餫夫畢力守卒延頸嗷嗷之聲其可哀也若是者綿三百里而餘自長舉而集本作之西可以導江江集本不疊此字而下二百里而至昔之人莫能集作得知也吾受命于君而育斯人其可已乎乃出軍府之幣以備器用即山僦功由是轉巨石仆大木縱以焚火集作焚以炎火沃之集作以食醯摧其堅剛化為灰燼畚鍤之下易其朽壞乃闢乃墾乃宣乃理隨山之曲直以休人力順地之髙下以殺湍悍集注作水怒厥功既成咸如其素於是决去壅土疏導江濤萬夫呼抃莫不如志雷騰雲奔百里一瞬既㑹既逺淡焉集作為安流蒸徒謳歌枕卧而至戍人無虞專力待寇惟我公之功疇可侔也而無以酬德致其大願又不可得命矧公之始來屬當惡嵗府庾甚虛器備甚殫饑饉昏札死徙充路賴公節用愛人克安而生老窮有養幼乳以遂不問不使咸得其志公命鼓鑄庫有利兵公命屯田師有餘糧選徒練旅有衆孔武評集作平刑議獄有衆不黷增石為防膏我稻粱嵗無凶災家有積倉傳館是飾旅忘其歸杠梁已成人不履危若是者皆以戎隙帥士而為之不出四方集作人之力而百役已告集無告就且我西鄙之職官故不能具舉惟公和恆直方廉毅信讓敦尚儒學挹損貴位率忠與仁以厚其誠有可以安利于人者行之堅勇不俟終日其興功濟物宜如此其大也昔之為國者唯水事為重故有障大澤勤其官而受封國者矣集注作焉西門遺利史起興歎白圭壑鄰孟子不與公能夷險休勞以惠萬代其功烈尤章章焉不可蓋也是用假辭焉集無此字謁工勒而存之用永憲于後祀祈門縣新修閶門溪記張途縣西南十三里溪名閶門有山對聳而近因以名焉水自疊嶂積石而下通于鄱陽合于大江其濟人利物不為不至矣其奔流激注巨石硉矹騰沸汹湧瀺灂圓折凡六七里舟航勝載不計輕重篙工楫師不計勇弱其或濟者若星馳矢逝脫或蹉跌必溺灣㳬中俄頃滅跡矣邑之編籍民五千四百餘户其疆境亦不為小山多而田少水清而地沃山且植茗髙下無遺土千里之內業於茶者七八矣繇是給衣食供賦役悉恃此祈之茗色黃而香賈客咸議愈於諸方每嵗二三月齎銀緡繒素衣求市將貨他郡者摩肩接跡而至雖然其欲廣市多載不果遂也或乘負或肩荷或小轍而陸也如此縱有多市將泛大川必先以輕舟寡載就其巨艎蓋是閶門之險元和初縣令路君一作旻常患之聞於太守故光祿大夫范卿因修作斯處其後商旅知不履閶門果竟至籍户繇是為之泰其來已五十五載矣元和咸通伏臘相逺閶門始廢一作度之時功未甚至猶利於人且久長慶中縣令王迅曽略見舊址蓋茶務委州縣貴暫邀商賈而已今則潁川陳甘節為祈門一年而政成孜孜求閭里之患果得閶門溪焉乃速詣目擊嶮狀吁可畏也必一作心期改險阻為安流回激湍為澄碧乃録其始製之實聞於太守清和崔公自請以俸錢及茶一有案字羡利充市木石之用因召土客商人船户接助夫使咸適其願無差役之患無箕斂之弊公恱而從之自咸通二年夏六月修至三年春二月畢穴盤石為柱礎疊巨木為橫梁其髙一丈六尺長四十丈闊二一作三十尺堰之左俯崇山作𣲖為深渠導溢流廽注于乾溪既髙且廣與往製不相侔矣甃石叠水泝流安逝一帶傍去滔滔無滯馴鷗戲魚隨波沉浮不獨以賈客巨艘居民葉舟往復無阻自春徂秋亦足以勸一作歡六鄉之人業於茗者專勤是謀衣食之源不慮不優夫如是有以見清河公求理誠至茍非良邑長不可以佐理潁川君臨事必專茍非賢太守以立事其作用堅固永久與山川齊途寓於郡下嘗逰茲邑頗熟本末因得以記咸通三年秋七月十八日歙州司馬張途述桂州重修靈渠記魚孟威靈渠乃海陽山水一𣲖也謂之灕水焉舊說秦命史祿吞越嶠而首鑿之漢命馬援征徴側而繼疏之所用導三江貫五嶺濟師徒引饋運推爼豆以化猿飲演墳典以移鵙舌蕃禹貢蕩堯化也則所繫實大矣年代寖逺隄防盡壞江流且潰渠道遂淺潺潺然不絶如帶以至舳艫經過皆同奡蕩雖篙工楫師駢臂束立瞪眙而已何能為焉雖仰索挽肩排以圖寸進或王命急宣軍儲速赴必徴十數户乃能濟一艘因使樵蘇不暇採農圃不暇耰靡間晝夜畢遭羅捕鮮不籲天胥怨冒險遁去矣是則古因斯渠以安蠻夷今因斯渠翻勞華夏識者莫不痛之洎乎寶厯初給事中李公渤廉車至此備知宿弊重為疏引仍增舊跡以利行舟遂鏵其隄以扼旁流斗其門以級直注且使泝沿不復稽澀李公真謂親規養民也然當時主役吏不能協公心尚或雜束篠為堰間散木為門不歷多年又聞湮圮于今亦三紀餘焉桂人復苦已恨終無可奈何矣况近嵗來蠻寇猶梗王師未罷或宣諭旁午晦暝不輟或屯戍交還星火為期役夫牽制之勞行者稽留之困又積倍於李公前時轉使桂人膚革羸臘指足胼胝且逃且死無所訴怨殆十七八矣咸通九年余自黔南移鎮於此艤棹嶺首備觀其事試詢左右曰向時何不疏鑿版築而使艱阻如是耶則末校劉君素前曰逺事固不可指明近事又非不知修渠必去民病然其奈邇來屢以迎送輶軒供億師頓召募補卒犒賚征夫帑藏且殫閭井亦蠧故無以興疏鑿版築也余固為父隱一作慈於子孰有子病而為家貧不求醫救子是知長吏所當子民也今民塗炭若是又何緣帑藏且殫而無暇救之固頃一作須是約公費積刀布召丁壯導壅塞以平民病也因召君素若能主張乎君素唯之遂領其軍凡用五萬三千餘工費錢五百三十餘萬固不敢侵征賦必竭其府庫也不敢役窮人必傷其和氣也皆招求羡財標示善價以傭願者自九年興工至十年告畢其鏵隄悉用巨石堆積延至四十里切禁其雜束篠也其斗門悉用堅木排竪至十八重切禁其間散材也濬决磧礫控引汪洋防厄既定渠遂洶湧雖百斛大舸一夫可涉繇是科徭頓息來往無滯不使復有胥怨者噫草木無情也榮落限於春秋然猶春則華秋則實以利於人焉而人稱萬物之靈擅百嵗之夀安可不利於人哉况余無大勳業而竊據寵祿宜孜孜力補尸素豈令草木反鄙於余哉於是聞害必削見益必樹蓋為此耳時上聞其興役逺降詔書猥賜嘉奬然人臣受國恩為惡則罪一作罹耳為善乃常事亦猶子孝親詎可誇乎况余審其所為未立山愧一作傀疑矣又何敢當詔書之美也今所自記重修非為名也且要叙民之艱苦實猶斯渠冀後之居者不闕其修行者不毁其修長利民而已矣時咸通十一年四月十五日謹記文苑英華卷八百十三
