body:
  text: 文苑英華卷六百五十宋李昉等編移文此卷英華所編失年代先後今正之移虜淮陽太守文為侯景叛移梁朝文為東魏與梁請和移文梁報東魏移文答魏初和移文移齊河陽執事文二首移虜留使文移虜淮陽太守文永眀十年太嵗某淮隂太守某移淮陽長大齊乘乾得一清寧今皇上體聖居震纘戎昌緒仁澤之所灑沾惠風之所偃靡威武之所勝疑作騰驤刑政之所宣暢浩浩乎其不可涯涘固能徼岷禺關夷海拓沙渚道零山八𦙍承嗣九垓禔福含齒戴髮其樂只且所以通歡魏境靜息邉民嗟爾黔氓共和優忝而魏主不篤我信誓侮弱我慈懷慿陵我南城冦擾我樊鄧元帥逞梟鳶之心鋭卒畜蜂蠆之毒蠅飛藩棘蟻附池隍我聊命偏將執而俘之連左袵于郊門頻編首於外闕有司將加誅焉天子弗之許也重謁而請天子又不許也更從請所以置之乃制詔曰昔虞帝欽眀苖山記倒戈之陳夏君踵武鈞臺載不戰之兵今鋒鏑陵邉彤雲入候加討而後擒待征而知服此乃朕之凉德彼將何德徒哀其積習為性因染遂變一作惑不識天時用干人事雖同濱率境自隔王臣直曰斯民獨為係虜父母生乖妻兒逺則疑作别桑梓悠悠墳塋萬里情甚悲之可解網改祝聼歸巢穴豈直鄰好足鄙疑特以哀矜自中以時資遣稱朕意焉巳遵眀詔部送所虜若干人即日在界宜速近護時施故堡使幽荒之外知皇王之德音故移為侯景叛移梁朝文魏收夫化成萬物分界九道紀之以山河照之以日月方足圓首含氣呈形咸總之於聖人畢㑹之以朝市皇魏應銜甲之祕圖納封金之寶命萬方為宅四海為家卜世靈長將踰八百天壤之間朝疑不别焉惟夫三江五湖九蠻百濮其地如掌人鳥未分瞻星昧環拱之方託水迷朝宗之義積蠅為衆長蛇稱長石田無菽粟之用衆人非聲教所孚是以年歷三僞棄而不有豈力不足蓋所未徴而陸梁塗泥時軼疆鄙天討所遺理存惡殺自二紀及茲中原多故未清區宇文武兼勤偃伯歸戰有懷勞止將令動植俱仰堯心遂冠蓋括途象胥提告推誠蹶然類識王道授衣禮一作祠節拜首歸仁舞戚所以為髙止戈故能稱大方知夙沙交臂不待兵車有苖納欵未勞征伐而庸夫為善希能令終狂人克念更知徒語聞利無匹夫之信好虐有助鬼之心白頭為賊曽莫自揆嘉文浮功甘於苟得罔顧榆次之禍詎識江浦之禽侯景一豎微蔑民斯下矣人倫士操本自不倫直以少從羈勒頗習趨走叨忝名器事出爾朱藏情諂笑惟利是視義兵同舉羣胡覆族雖狐祭首丘事非小人而忘恩背本景為先至不義不信自此可知但丁公之戮時有未可也大澤深山龍蛇並育遂容其悔非棄其瑕穢任一作假以將率授以兵符庶其被鞍銜錬盡力馳驟指蹤投緤駑兔或擒而弱才負重折足是慮置之不爭之地虛出韓鄭之間曽無戰伐之勤可言摧陷之績嵗往年徂率無可紀而腹心羣小信納逋亡劫奪行道侵掠民庶流聲逺聞王法有典驄馬將出朱筆且行自貽伊戚了不知咎盜憎主人乃圖逆節拔本塞源以疑衍委身賊虜逼脅居民翻蕩城池義手曲躬千里唯諾殘賊相依欣同鱗水寵以大位屬以東方外曰臣主內深骨肉安危契濶約以死生拯其鼎鑊之命全其虀粉之福時不暇浹翻然易慮還相掩擊事劇仇讐反覆剽獲莫非此類至于老母暮倚少弟升岡妻望行夫子號出父食毛之屬可為痛心哉景忽之如草芥棄之如塵垢任其斫截之誅安其烹斬之痛放麑食子有以可親觀臧窮否耻其並主獸心人面華裔同讐歸家懼執法之刑赴賊反噬臍之釁首領無地進退數窮遂騁邪說自託左右苟有君子義均逐雀而彼方上下樂禍好亂叛竊之豎獲毒之人圖浮芥之小利忘丘山之大禍乃崇飾土偶被以𤣥黃馳馬髙蓋載鼷為重委以專征施其爪角驅逼子姓率我叛亡逼厭虐之侣鞠苦役之衆蟻攢蚋集侵竊邉鄙恤患分災本不要于違僻違衆悖禮蓋神眀之所誅皇帝垂旒華土則天而動卷覆三古懷佩百王掌握中道崇基增構殊塗同㑹百慮一歸中外禔福戎華俱庇持秋霜夏震之威以拔山超海之力顧指則風雲總至回眸而山嶽削平雖復旗鼓所臨有征無戰猶以師出而服辱在我世所務者息民所存者文德豈復以擒將威敵漂杵溺驂為功于一時示武於千載且天生五材有聞前古禍非我貽其得巳乎遂置壇命將持柯畢禮引營就道分途競馳批熊舉輪之士翹關扛鼎之卒被組橫矛執殳挺劔龍駒並躍驥子千羣沸聒天壤蒸鬱雲霄一朝指揮倐忽千里候騎羅絡聊逞前驅天兵之鼓未鳴衆軍之旗詎接而荆揚烏合一朝崩解塞川滿野馘耳截鼻以千萬計不可勝數宗親節將咸見擒束委命軍吏憂在釁鼓楚兵吳甲積若山丘青鵲赤烏噎流斷岸千金之貴為我資焉痛辱可哀其利安在覆師喪旅禍本可尋方之噬臍悔之靡及皆侯景叛戾虛相陷誘指成提挈之舉終無犄角之勢景棄本趨末背國違鄉部下數千屈逼羅網離親懷土一日三秋拘網立匏朝不謀夕豈能搖足東上逺赴彭城天奪彼魄信納虛詭使蕭眀貴孫面縛於徐泗景為凶藪逡巡而坐觀託人七尺之身居人成敗之地急病讓夷固若此也兩端自見故態未除今知東南滌蕩睢潼清復梁之喪師單輪不返擊援之期終當無日勢窮路盡憂在滅亡事晋變生將謀及已且彼軍殱殄江淮屠酷禍源釁迹景變疑作實為之上懼金陵君長致請設二字疑之責下恐荆吳子弟洗疑父兄之寃愚小猜驚將興異計乘專任之機藉方面之重必當招結傖楚扇合無賴內自封植外絶防禦因見信而類起出不疑以竊發事比疾雷理同激矢上或慿陵乘一作建疾專擅縱橫下則鴟峙淮肥覬覦叛換老疾姦回不虛然也而彼土區區厚加崇納置之襟帶之方處以藩籬之所費金帛于烮火罄酒漿於漏巵非乘景虛聲委其變疑作實用夫量材授任必原其始考行責成當存其大景豺聲蜂目之首狼心狐魅之徒義無父子棄同即異捐親背德于我尚反目而去在梁則何施可懷且我疑重傷心尾大不掉魚脫于淵義彰老氏而假威凶險授柄姦回欲求肝膽之誠更啓危亡之兆固智者不為迷者遂去若抽薪止沸剪草除根髠首囊頭義手械足返國姦於司敗歸侵地於𤣥武非直惡之在今天道人事實棄無禮苟達一作違之者其長世何若悔非知罪恭承德音且欲飛驛合符班師凱入悠悠水鄉有救其死若乃執飾非之辨固遂過之失便當盡常勝之戰極必取之攻飛江南渡深山將恐削壤卑名雖頓顙而不獲亡宗滅廟望喬木而可悲昔田假英人於期壯一作莊非士窮而歸我許以入懷景竦悖狗子攪亂四國庸可紓難棄若孤雛何足戀戀於亂臣勤勤于賊子也王者之威心疑厲如雷電信同寒暑言猶麗天移至深念變通熟量可否幸思大雅無貽後悔為東魏與梁請和移文元世俊侍中大驃騎同尚書令武陽子元世俊移梁執事乃眷江漢襟帶南土疆埸相望交錯如繡輶軒未通革車屬起一彼一此或利或鈍亡載得輿所獲蓋寡爭雞失牛所損更大空使干戈未戢一作不戎馬生郊髓腦塗于原野骸骨暴于草澤二國不和百姓何罪靜言思之艮所未悟我皇帝以聖眀啓運禮樂惟新澤漏原泉道光日月方欲寢榆關之髙烽罷輪臺之逺戍鑄劍㦸為農器納蒼生于仁夀而前益州刺史傅和往處西蕃逢時多難歸途一作中多阻流寓江濱亦既來朝具陳彼意知以止戈在念去殺為心留情灌瓜遲存通樂夙期所望實協虛想一作心猶恐失詞或乖其實眷言在茲佇聞良信至彼假節開逺軍李稜昔經垂翅遂掛天網矜是南冦拾之還書故因其致書用宣朝旨若覆前言共敦鄰好當拂逆旅以待行人梁報東魏移文何敬容侍中宣惠將軍尚書左僕射何敬容報魏執事成湯二十七征志惟靖難軒轅五十二戰義在拯民既異時而同致信殊政而一揆豈其黷武以窮兵寧為仗威而尊大我皇帝降茲仁一作上聖承彼百王負扆君臨不以四海為貴冕旒日昃常以百姓為心同二儀以覆載一六合而光宅德踰羲昊道邁唐虞諒開闢之聖君信典謨而莫擬均心彼我等恱怨親物有常懷人無異念自北闕紛擾河洛沸騰牝雞索家蕭墻起釁事以集作似談尚義以疑衍類閼沉競一作親尋干戈民無定主候馬乞師月陳庭廄裹糧請救日填闕下單民有時雨之望遺黎興徯后之悲誠感仁恕理惻皇慈任好璅璅納二晉君小白區區存三亡國况我朝廷寧忘拯救是以命師薄伐至於伊川雲旗屢張非為玩武鉦鼓載陳豈尚威力湯武不祀周有義兵匹夫是讐尺土非利百戰百勝非善之善九拒九攻終勞率土納隍之慮無忘寢食李陵失律摧一作隨身晉陽獲彼來移聞見委曲知魏當璧得人兆龜有主作相惟賢棟梁克一作充室欲偃兵戎式敦鄰好九臯既響唳天巳聞銅山一啓靈鍾斯應矧乃出其言善千里莫違嘉言孔昭良以收納且敵怨敵惠不在後嗣亡羊補牢亦所未失移至月日輒以奏聞即䝉詔可不爽來意行符一作等非緣邉偃兵解甲庶烽一作爟火不警邉亭息候征夫捨刁斗之勤處婦無憤望之志尋常不爭農桑是務分災恤患繼好息民稜在此嵗久情無疑難還使賫移報彼來懷答魏初和移文任孝恭蓋聞軒轅五十二戰義在拯民湯武二十七征本惟靖難明異時而同致信殊政而一揆我皇帝屈茲上聖承彼百王卷六合而包含𢎞二儀而覆載照髙日月澤畜一作富雲雨值魏氏紛綸亟離星晷競尋干戈爭以興廢一作發王無卒嵗相不浹辰隻馬乞師月陳庭闕裹糧請救日欵關扉故屢動震一作雲旗再驅蒼兕同小白之存亡等任好之繼絶匹婦是讐尺土非利然百戰百勝猶苦四民九拒九攻終勞百姓納隍之念無忘日昃李陵以失律暫摧鱗羽同孟眀之返秦似荀罃之歸晉少展一作并賫來移文之委曲知彼當璧得人兆龜有主欲偃兵戈式敦雅好鶴鳴九臯唳天巳響出其言善良以欣然輒勒緣邉屯戍各息烽警旌旗晝卷刁斗夜停混雞犬於四鄰接桑麻于二境一作皆藝文類聚右二篇大同小異前篇加詳後篇見藝文類聚今英華並收不欲去取內有同處止于後篇作白字移齊河陽執事文庾信周天和四年四月二十七日使持節車騎大將軍儀同三司大都督陜西總管府移齊河陽執事自疆埸卧鼓邉鄙收烽義讓之行未能朞月孔誠誨盜即值包藏是以板載之師須時而動自安封域非求拒防雖復風塵暫接旗鼓無侵五將即回雙崤已靜始奉朝㫖獲被一作彼移書令受叛城使回軍實想彼邉司已奉處分既有此還輒須領納未知何日可遣戍兵指附行人遲能速報盟且不渝鄰境相善顧瞻原野幸甚實多故移同前周天和四年十一月十日陜州㧾管長史梁昕移齊河陽執事自拭玉繼書通關去傳實謂上方銷劍山陽息馬故茲禦客或慢重扄屬彼司疆隂行善盜君一臣二上穆下乖國家以邉鄙心搖須固備守大司馬齊國公天子介弟中軍元帥駕馭孫吳驅馳貔虎舉因農隙義異城郎師巡我境曽非反鄆縮載之畢前旗巳回彼國兵馬不防殿後餘塵遂至相接建旌一作忠壘上未及五申安鄴城傍先驚七伏當時鋒刃或膏原野所獲彼將夏州刺史梁老首領今以相還尸鄉不逺無令久客馬驢甲兵具條相勒封人宜依領納宿無鬭志不獲交綏致此埃塵誰階其咎故移移虜留使文年月朔日某官告配某州郡前本欲發遣彼使但某入境以來國祥甫邇自秋迄冬未申欵接且狼星表邦嚴霜巳戒浮河亂濟長路苦寒時當獻嵗惟新三元告慶圭贄盈庭華裔參軫式觀盛禮洽此嘉歡陽和既動澤漸萬邦便當遣使相隨永敦鄰睦故移文苑英華卷六百五十
