body:
  text: 文苑英華卷一百六宋李昉等編器用五卧讀書架賦一首雞距筆賦一首五色筆賦一首筆賦一首斑竹筆管賦一首石硯賦二首孔子石硯賦一首書軸賦一首獺皮書袋賦一首卧讀書架賦楊炯儒有傳經在乎致逺力學在乎請益士安號於書淫元凱稱於傳癖髙眠孰可詎貽邊子之嘲甘寢則那寧恥宰豫之責伊國工而嘗巧度山林疑以為格既有奉於詩書固無違於枕席朴斫初成因夫美名兩足山立雙鈎月生從繩運斤義且得於方正量枘製鑿術仍取於縱橫功因期於學植疑作殖葉可究於經明不勞於手無費於目開卷則氣雜香藝挂編則色連翠竹風清夜淺每待蘧蘧之覺日永春深常偶便便之腹股因兹而罷刺膺由是而無服庶思覃於下帷豈遽留而更讀其利何如其樂只且中疑作巾遂挂於簾幌履誰曳於階除每偶草玄之子不親非聖之書比角枕而嗟若匹瑶琴而病諸爾其臨窗有風閉尸多雪自得陶潛之興仍秉袁安之節既幽獨而多間遂憑兹而髙閲讀易則期於索隱習禮則防於志悅儻叔夜之神交固周公之夢絶其始也一木所為其用也萬卷可披墨沼之前謂江帆之乍至書林之下若雲翼之新垂動靜隨於語默出處任於挽推必欲事於所事實斯焉而取斯因謂之曰爾有卷兮爾有舒為道可以集虛爾有方兮爾有直為行可以立德濟筆海兮爾為舟航騁文囿兮爾為足翼故吾不知夫不可聊逍遙以宴息雞距筆賦以中山毫作之尤妙為韻白居易足之健兮有雞足毛之徑兮有毛就足之中奮發者利距在毛之內秀出者長毫合為手筆正得其要象彼足距曲盡其妙圓而直始造意於蒙恬利而銛終騁能於逸少斯則創因智士製一作傳在良工拔毫為鋒裁一作栽竹為筒視其端若武安君之頭小一作鋭窺其管如玄元氏之心空豈不以中山之明視徑而迅汝隂之翰音勇而雄一毛不成採衆毫於三穴之內四者可棄取鋭武於五德之中雙美是合兩揆相一作而同故不得毫無以成起草之用不名雞距無以表入木之功及夫親手澤隨指顧秉以律動有度染松煙之墨灑鵝溪之素莫不畫為屈鐵點成垂露若用之戰陳二字一作交戰則摧敵而先鳴若用之草聖則擅場而獨步察所以稽其故雖云任物以用長亦在假名而善喻向使但隨物棄不與人遇則距畜縮於晨雞毫摧殘於寒又安得取名於彼移用於一作在兹映赤管狀紺趾乍舉對紅箋疑錦臆初披輟翰停毫既象乎翹足就栖之夕揮鋩拂鋭又似乎奮拳引鬭之時苟名實之一有相字副者信動靜而似之其用不困其美無儔因草為號者質陋折蒲為書者體柔彼皆瑣細此實殊尤是以搦之而變成金距書之而化出一作作銀鈎夫然則董狐操可以勒為良史宣尼握可以削一作刪定春秋夫其不象雞之羽者鄙其輕薄不取雞之冠者惡其柔一作軟弱斯距也如劒如戟可繫可縛一作可以繫縛將為一作壯我之毫芒必假爾之鋒鍔遂使見之者書狂發秉之者筆力作挫萬物而人文成草八行而鳥迹落縹囊或一作盛處類藏錐之沉潛圓扇忽書一作團扇或書同舞鏡之揮霍儒有學書臨水負笈辭山含毫既至握管未回作還過園而易感望雞樹而一作以難攀願爭雄於爪距之下冀得雋於筆硯之間五色筆賦以徴諸嘉夢藻思日新為韻竇紃物有粲奇文抽藻思含五彩而可寶煥六書以增媚豈不以潤色形容昭宣夢寐漬毫端於一勺潛含水章施墨妙於八行宛成錦字言念伊人光輝發身拳然手受灼若迷真戴帛驚纈文漸出臨池訝蓮影長新效用辭林分宿鳥之丹羽呈功學海間遊魚之彩鱗所以成盡飾之規得和光之道輕肆力於垂露覩流精於起草俾題橋之處轉稱舒虹當進牘之時尤宜奮藻掌握猶重文章可矜糅松煙以霞駮操竹簡而淚凝儻使書紳黼黻之容斯美如令畫像丹青之妙足徴卓爾無雙斑然不一摛握彩以冥契刷孤鋒而秀出紛色絲兮宜映練囊暈科斗兮似開緗帙動人文之際懷豹變於良霄呈鳥迹之前想烏凝於瑞日當其色授之初念忘形而獲諸魂交之次驚目亂以相於將發揮於拳疑鍊石闕書秉翰苑之間媚花隂而蔚矣耕情田之上臨玉德以班如是能潛映丹誠暗彰吉夢嘉不亂之如削意相宣而載弄混青蠅之點取類華蟲述皓鶴之書思齊彩鳳故可以彰施薤葉點綴桃花舒彩箋以增麗耀彤管兮孔嘉彼雕翠羽而示功鏤文犀以窮奢曽不如披藻翰而發光華筆賦韋充筆之健者用有所長惟兹載事或表含章雖發迹于衆毫誠難頴脫苟容身於一管豈是鋒鋩進必願言退惟處默隨所動以授彩寓孤貞而保直修辭立句曽無點畫之虧遊藝依仁空負詩書之力恐無成之見擲常自束以研精擇才而丹青不間應用而工拙偕行所以盡心於學者嘗巧於人情惟首出筒中長憂銼鋭及文成紙上或冀知名以其提挈不難發揮有自縱八體之俱寫亦一毫而不墜何當入夢終期暗以相親倘用臨池詎欲辭於歷試今也文章具舉翰墨皆陳秋毫似削寶匣以新但使元禮之門不將點額則知子張之手永用書紳夫如是則止有所託有因然後録名之際希數字於依仁斑竹筆管賦并序李德裕豫寓居於一無此字郊外精舍有湘中守贈以斑竹筆管奇彩爛然愛玩不足因為小賦以報之山合沓兮瀟湘曲水潺湲兮出幽谷緣層嶺兮茂奇篠夾澄瀾兮聳修竹鷓鴣起兮鈎輈白猿悲兮斷續實璀璨兮來鳳根聮延兮一作根連延而倚鹿往者二妃不從獨處兹岑望蒼梧兮日逺撫瑶瑟兮怨深灑思淚兮珠已盡染翠莖兮苔更侵何精誠之感物遂散漫於幽林爰有良牧採之嵓趾表貞節於苦寒見虛心於君子始操一作裁截以成管因天姿一作資而具美疑貝錦之濯波似餘霞之散綺自我放逐塊然巖中泰初憂而絶筆殷浩默而書空忽有客以贈鯉遂啓一作起豫以雕蟲念楚人之所賦實周詩之變風昔漢代之一無此字方侈增其炳煥綴明璣以為柙飾文犀以為玩傅子曰漢末一筆之柙雕以黃金飾以和璧綴隨珠發以翡翠此筆非文犀之飾必象齒之管也發一作裝徒有貴於繁華竟何資於藻翰曾不知擇美於江潭訪奇於湘岸况乃彤管有煒列於詩人周得之以操牘張得之以書紳惟兹物之日用與造化而齊均方寶一作資此以終老永躬耕乎典墳凡一作皆集本石硯賦以山水輝映墨妙筆精為韻張少博硯之施也被乎用石之質也本乎山溫潤稱珍騰異彩而玉色追琢成器發奇文而綺斑蓋求伸於知已爰待用於君子故立言之徒載筆之史將吮墨以濡翰乃操觚而汲水始爛爛以光徹終霏霏而煙起或外圜兮若規或中平兮如砥原夫匠石流眄藻熒生輝象龜而負圖乍伏如鵲之緘印將飛設之戶庭王充之名已著置之藩溷左思之用無違徒觀夫清光影耀貞質霜浮符彩華鮮精明隱映皎如之色比藏氷之玉壺煥然之文狀吐菱之石鏡當其山谷之側沉竒未識韜玉吐雲懷珍隱德及乎入用以磨礪因人而拂拭故能撫之類磬發奇音對之若鏡開新色既垂文以呈象亦澄瀾而漬墨硯之用也詎可興歎而焚石乃堅然孰謂有時而泐斯可以正典謨之紀垂篆籀之則者也遂更播美六書傳芳二妙用之漢帝常同彭祖之席存之魯國猶列宣尼之廟是以遺文可述兹器奚匹匪銷匪鑠良金安可比其剛不磷不緇美玉未可方其質光鳥迹於青簡發龜文於鴻筆則知創物作程事與利并兹硯也所以究墨之妙窮筆之精者也第二同前韻黎逢有子墨客卿從事於筆硯之間學舊史之暇日得美石於他山琢而磨之其滑如砥欲精研而染墨在虛中而貯水水隨暈而環周墨浮光而黛起明而未融是以為用久而不渝故以為美器成上古徴闕里之素王匠法增華參會稽之內史且王言惟一道心惟微于以幽贊由之發揮從人之欲委質莫違代若遐棄文將疇依肅觀光而霧集賴設色而煙霏實將振文而為邦豈惟藴玉而山輝者哉君無謂一拳之石取其堅君無謂一勺之水取其淨君其遂取我有成性苟有輔於敷閲固無辭於藴映惟聖人有大寶昊天有成命莫不因我以載形以我而施令志前王之事業作後人之龜鏡夫物遷其常天運不息水有涸兮石有泐代貴其不磷我則受其磨代貴其不染我則受其黑象山下之泉為天下之式因碌碌於俗間類栖栖於孔墨嗚呼辭尚體要文當絶妙雖濡翰其不疲無煩文以取誚爰貢君子以其徑質或升之堂或入之室對此大匠厠諸鴻筆見珍於殺青之辰為用於草玄之日夫氣結為石物之至精攻之為硯因用為名事若可久代將作程斯器也不獨堅之為貴諒於人之有成孔子石硯賦王嵩萼昔夫子有石硯焉邈觀器用宛無雕鐫古石猶在今人尚傳從歎鳳兮何世至獲麟兮幾年世歷近王近霸年止幾徂幾遷任往回於几席垂翰墨於韋編時亦逺矣物仍在焉非聖人之休祐安得兹而不捐洎乎俗逺聖賢教遺齊魯列廟以居先師攸主上熒熒以光徹旁羃羃以色固介爾貞堅確乎規矩昔諸侯立政周道無聞嗟禮樂之仍缺歎詩書而未分聖人乃啓以褒貶垂以典墳必藉兹器用成斯文蓋石固而人往亦事存乎硯云至乃方質圓形銅模龜首雕飾為用陶甄可久橫彩煙而不絶添緑水而常有豈如石焉斯為不朽昔偶宣父厥容伊何旁積垂露中含偃波時代遷移去遊夏而彌逺日月逾邁變炎涼之已多别有縫掖書生獻䇿東京仰希先哲攻文後成叨秉筆以當問愧含毫而頌聲書軸賦吕牧方輿之靜也軸居其重大輅之轉也軸當其用夫履端抱圓何所適而不中則有飾以金玉交以丹漆乍駢首於青桉或周身於縹帙雖偶提而偶擕亦無固而無必故能退尺則不短進寸則不長得隨時之舒卷合君子之行藏劉向校書之時遍薰蘭氣揚雄草玄之所獨染藝香其質則微其用不淺若輪轂之負載同户樞之開轉能藏飛鶴之書更掩回鸞之篆妙揮疑謙以處厚每求伸而先卷遭秦則玉質斯焚入漢則石渠可踐别有韜黃公之祕略懷王烈之素書探禹穴而誰見啓金縢而有諸仲宣之藏萬卷惠子之藏疑五車非我軸之何寶能懷文以自如豈俟脂膏後運枘鑿方虛彼所持而有待假經籍為蘧廬獺皮書袋賦王起懿彼玄獺生於水鄉始殺身於河涘卒成器於書囊仍彼殘文不假乎雕刻裁以新製自合乎圓方既出納而一作於斯取亦扃鐍而有常想夫下泉委質上天致祭紫府咸萃丹誠若契宜介福以全生奚徼禍而致斃苟利人以獲助甘成器於此際則有攻皮之工嘗巧於中遺文勿剪輕縷潛通圓其蓋則合而能固柔其質則用之不窮謝水府之至樂入書林而見崇外也蒙茸毛有所傅中也駢坒比利切地相次坒也一作攢書有所聚韜蔚矣之文章祕煥乎之詞賦彌縫則密豈亡三篋之書周旋必復豈涉九衢之路若乃青簡疊至尺素交馳藏筐篋而不可置懷袖以攸宜必資之以善閉克守之而不遺雖納以魚箋乍似噬魴之日臨乎墨沼寧同赴汨之時動必依人靜而挂壁滿貯攸戒緘縢受益其來也江海至深其潔也波瀾所滌掩青囊之貯卷異豹文之成舄既翰墨之居珍幸提擕而無斁文苑英華卷一百六
