body:
  text: 文苑英華卷八百四十三宋李昉等編誄二隋新城郡東曹掾蕭平仲誄一首平城縣正陳子幹誄一首德先生誄一首衡州刺史東平吕君誄一首虞鶴鳴誄一首隋新城郡東曹掾蕭平仲誄陳子良蕭平仲字某蘭陵人也梁文皇帝之玄孫鄱陽王之曽孫也鄱陽嗣王之孫定襄侯之第五子也𣲖清瀾于天潢分喬枝于若木君降生昴宿挺質圭璋孝友溫恭仁慈亮直其形曲而雅其神俊而明耽思羣書研精衆藝盡人間之能事極天下之竒才江淮貴逰獨稱領袖故可以坐覿羔鴈俯拾朱紫至如南山為志不能北靣事人詩書自娛耻與絳灌等列洎有陳失馭西遷于隋而兄弟十人白眉斯在棠棣之詠事等薑肱君子義之髙其行也屬皇期有道咸序縉紳乃拜吏部貟外郎東宫學士冀州司法參軍禮部員外郎新城郡東曹掾從班列也君蒞政能官咸熙庶績所在遺愛置言成範至如纓紱之士草萊之客莫不聆嘉聲而雲萃餐德音而風趨李膺曩號楷模王商昔稱賢智方之蔑如也適應入踐常伯超補台司如何靈祇殱我明哲春秋五十有五大業九年二月十五日卒一作終于新城郡之官舍嗚呼哀哉余與夫子頗有親連少敦莫逆既同羇旅彌篤綢繆非無陸機之書一作詩尚有鍾儀之操誰謂吉士奄逐隙駒嗟乎盛年何晚一作時促之如此也嗚呼哀哉昔之絶絃軫歎聞笛傷心余雖謝古人寧不悽慟是知身歿名存實由著述况復故人景行何能泯之敢以聞見乃作誄曰嗚呼哀哉粵若髙祖大造惟梁德侔五帝道冠百王赤眉作梗黃屋云亡有媯之後應運遐昌君之顯考耻為委質在行既髙居賔坦逸篤生夫子如披雲日儀形信典聲名本實機神電舉雅調風生還同照乘有類連城學逾班固才冠劉楨金湯失險天猒有陳幸逄隋德預沭堯民青蓋西度紫氣東淪依依去楚悽悽入秦梁亳之郊忽傾風樹結廬狎鳥穿池慿霧兄弟十人義聲咸布爰降綸紱特預銓衡龍樓振藻司冦馳名俄居郎署升朝擅美含香趨奏事禮承祀抑抑威儀彬彬文史涪水既臨郪城是靣視民如傷事心惟戰周震善政潘嶽能官企彼前哲顧巳非難余之室人君之從妹加以篤欵頗蒙提誨銘之在心沒齒唯佩契濶關隴連翩冀代余任主簿眉山之川亟會琴臺兼遇名賢花朝月夜置酒題篇近之新城暫申纍日謂君積善永保元吉不言别後忽嬰斯疾如何清暉奄辭蘭室嗚呼哀哉承諱驚惶聞喪慟泣前悲未盡後哀仍集白馬不追素車安及悲人世兮太促歎死生兮異路玄壤冥兮難窮黃泉寂兮易暮客位空而聚塵書臺掩而生蠧嗟古人兮神交念往哲兮虛通淚有竭兮心尚感聲有止而哀無窮宿草衰兮凝秋露白楊慘兮生悲風痛逰魂兮安在徒釃酒兮招空嗚呼哀哉平城縣正陳子幹誄昔聞子路雄烈赴難如歸先軫忠貞雖死無悔故能貽芳塵于後世徇一作殉節義于遐年况乎勇嗣前修功深曩代者豈可使身名頓滅典籍無聞悲夫余弟少府則其人也弟名子幹字元楨梁右將軍信義太守之孫陳晉安王府咨議吳平侯之第三子也惟元楨稟質純和天挺聰俊生知孝悌早擅雄才屬金陵亂離王室版蕩人倫東喪禮樂西歸洎于一門同遷灞岸是則開皇九年之四月也家君有鍾儀之操懷敬仲之心遂屏迹杜門茹憂成疾忽悲風樹痛深陟岵其時余年十九爾始八嵗伶仃辛苦實迫飢寒青門乏種瓜之田白社無容身之地一溢一作釡之米巳索一瓢之飲屢空日夕相悲分填溝壑賴余以少遵庭訓夙稟家風曽覽五經頗窺三史追孔融之令範慕張楷之髙蹤長安主人儀同郝朔要余入室仍寄廡下遂慕西河縉紳公子負笈雲萃藉此束修方濟糊口幸以爾幼不好弄長實庶幾因兹入學以勤以苦諒非性分何能成立隋齊王英禮賢待士沛獻非儔召入平臺悅其篆𨽻仍題銀榜取埓仲將足稱妙絶見美當世隴西李巨仁才華任俠一作使與余疑宿素欽其俊乂因妻以女非厥人品孰能致之及爾委質周行䇿名吏部公卿籍甚士類一作友趨風俄而詔授并州平城縣正是乃深間簿領妙達治方藴冰蘗而不渝顧松筠而無改屬隋運將謝盜賊公行太上皇于時留守并州龍潛汾水所管州縣咸聽指麾專揔兵機式遏冦虐元楨素便弓劒立性雄昭屢剪凶渠頻蒙榮賞凡有草竊咸資決勝以大業十二年八月有賊帥郭六郎一無郎字將兵三千人來侵縣境元楨受命率徒數百獨飛輕騎手斬十人賊見威雄莫不披靡忽遭流矢斃于陳中春秋三十有一鳴呼哀哉嗟爾輕生奮不顧命在天胡忍殱我哲人方冀龜文以諧豹變如何馬革遂裹師元嗚呼哀哉爾從官東西死生契濶與余一别已逾二紀往聞非命實用痛心愧鶺鴒之在原悲棠棣之先落惜哉同氣冥漠何之嗚呼哀哉余以貞觀六年二月十日夜于相如縣夢見爾靈仍於夢中共馳哀慟乃涕流于枕悲不自勝嗟乎門祚不昌鍾此衰薄既乏子姪終鮮兄弟顧影煢獨實切肝腸是知結草酬恩魏顆之功無爽出魂屢請蔣濟之子非虛雖生死之或殊諒鬼神之有識不任感愴追誄友于式紀遺塵庶同潘嶽敢詢前典而為誄云猗歟我祖承舜之緒爰從媯汭下居潁汝鳳飛于齊輝映于許宛彼長陵離江而舉攀手桂林篤生翹楚淮海喪亂關河播遷忽傾庭蔭痛結昊天惟我兄弟泣血連翩余雖弱冠爾尚童年立錐無地窺竈無煙余稟家風世敦經史式崇儒教俄而成市衣食是資殷憂備履爾因修學遂能克已孝敬有裕才華難擬言行無擇自此揚名偏工篆𨽻獨擅嘉聲爰參選部乃任平城金科是執玉律逾明尤便弓劒本慕忠貞皇上龍潛居汾之汭兵權攸揔諸侯是制郭六胸渠稱兵齊衛元楨受律奮威投袂躍馬星奔抽戈電逝斬將搴旗罕當鋒鋭忽中飛鏑在陳而斃嗚呼哀哉人亡勇敵衆疾英竒况逄亂世功無所施在位非重居名極卑不登廟食虛死何為凡百君子各慎爾儀獨埋玄壤誰其賞知空令親友遙哭路岐無復蒲簡惟餘墨池露團宿草風響松枝山花開落隴月盈虧一朝非命千秋永離嗚呼哀哉余于縣府春宵獨寐忽覿爾靈夢中相值執手嗚咽其疑作共傷憔悴語未及終倏如電駟實感我心窹乃驚悸恍焉如失伏枕流淚曽聞賁父魯侯命志亦承揚贊宋䇿云記矧伊義勇取埓無愧非余所述誰當在意興言逺感發增情思援翰寫心式旌遺事嗟爾義夫英聲不墜嗚呼哀哉德先生誄李華或問曰德先生者奚氏余曰南陽張姓有略其名維之其字也或曰與古誰倫可造七十子乎余曰七十子或賢或恆人方于賢原憲文粹作思宓不齊其比也或曰大哉余曰七十子親聖人之道者也七十子得聖人強畛之際維之得聖人衣冠之潤向使獲親聖人則鱗差耕雍也或曰何咎而瞽余曰聖賢偕時故春秋之亂冉耕惡疾左丘明卜商皆瞽聖如夫子失司冦飢于陳蔡忠如萇𢎞明文粹無此字謀尊王室而戮死君子道消故仁賢窮維之鄰道昌黎韓極文粹作拯亦以德聞與維之同病不幸二子不以病為僉不喪中明者也或曰夫如是得無誄之余誄之曰神胡病後之人而奪先生噫嘻哀夫文粹有人字德甫余將疇兄故衡州刺史東平吕君誄桞宗元維唐元和六年八月日衡州刺史東平吕君卒爰用十月二十四日稿葬于江陵之野嗚呼君有智勇孝仁惟其能可用康天下惟其志可用經百世不克而死世亦無由知焉君由道州以陟為衡州君之卒二州之人哭者逾月湖南人重社飲酒是月上戊不酒去樂會哭于神所而歸余居永州在二州中間其哀聲交于北南舟船之下上必􅈱􅈱然蓋嘗聞于古而覩于今也君之志與能不施于生人知之者又不過十人世徒讀君之文章歌君之理行不知二者之于君之獨本作其末也嗚呼君之文章冝端于百世今其存者非君之極言也獨其詞耳君之理行冝及于天下今其聞者非君之盡力也獨其迹耳萬不試而一出焉猶為當世甚獨本作所重若使幸得出其什二三則巍然為偉人與世無窮其可涯也君所居官為第三品冝得諡于太常余懼州刺史二字集作史之逸其辭也私為之誄以志其行其詞曰麟死魯郊其靈不施濯濯夫子胡潔其儀冠仁服義干櫓詩書忠貞繼佩智勇承綦獨本作基跨騰商周堯舜是師道不勝禍天固余欺鬼神齊集作不怒妖孽咸疑何付之德而奪其時嗚呼哀哉命姓惟膐集作吕勤唐以力輔寧萬邦受祚集作胙爾國維師元聖周以降德世征五侯伊祖之則嗣濟厥武前書是式至于化光爰耀其特春秋之元儒者咸惑君逹其道卓焉集作然孔直聖人有心由我而得敷施變化動而不克推理惟功舒文以翼宣于事業與古同極道不苟用資仕乃揚進于禮司奮藻含章決科聮中休聞用張署讐百氏錯綜逾光超都諫列屢皂其囊帝殊爾能人服其智戎悔厥禍欵邊求侍咸集作盛選邦良難乎始使君登御史贊命承事風動海壖皇威以致來惣征賦甲兹郎吏制用經邦時推重器諸臣之復周官匪易漢課箋奏鮮云能備君自他曹載出其伎集作于技筆削自任羣儒蜀本作倫莫集作革議正郎司刑邦憲為二逖侫肅邪栁州本作糾逖侫肅諂諛其畏八字集注作紏逖伊肅邪諛其畏遷理于道集作道民服民一作民服休嘉思踈若昵惕邇如遐實閉其閣而撫于家載其愈樂申以舞歌賦無吏迫威不刑加浩然順風從令無譁絲集作繇蠶外邑我繭盈車雜耕鄰邦我黍之華既字其畜亦藝其麻鼛鼓斯屏人喜則多始冨中教興良廢邪考績既成王用興嗟陟于嶽濵言進其律號呼南竭謳謡北溢欺吏悍民先聲如失逋租匿稅歸城自出兼并既息罷羸乃逸惟昔舉善盜奔于鄰今我興仁化為齊人惟昔冨人或賑之粟今我厚生不竭而足邦思其弼人戴惟父善胡召災仁胡罹咎俾民伊怙而君不夀矯矯貪陵乃康乃茂嗚呼哀哉廪不餘糧集作食藏不積帛內厚族姻外賙賔客恆是懸罄逮茲易簀僮無凶服葬非舊陌嗚呼哀哉君昔與余講德討儒時中之奧希聖為徒志存致君笑詠唐虞揭茲日月以耀凡集作羣愚疑生所怪怒起特殊齒舌嗷嗷雷動風驅良辰不偶卒與禍俱直道莫試嘉言罔敷佐王集作王佐之器窮以郡符秩在三品冝諡王都諸生羣吏尚擁良圖故友咨懷纍行陳謨是旌是告永永不渝嗚呼哀哉虞鶴鳴誄維某年月日前進士虞九臯字鶴鳴終于長安親仁里既克葬于髙陽原二三友生皆至于墓哀其行之不昭于世追列遺懿求諸后土申薦嘉名實曰恭甫乃作誄曰昔集作吳虞之分爰宅上陽其後優遊在越為鄉延詡輔漢恢定封疆東徙之賢時惟仲翔曰預曰喜在晉克彰義篤斯久集作文有苾其芳祕書多能垂耀于唐洎于漢陽世德以昌君先父終沔州刺史毗贊尚父休徽用揚惟我先君並時翺翔洽主記室蔚其耀蜀本作輝光實契伯仲永永不忘漢陽元子實紹其美傳習儒集作餘風彪炳文史克恭以孝惟禮是履譽洽于鄉論為秀士百郡之選叢于京師昧沒騰藉乘凌蔽欺生之始至則奮其儀退然集作默以謙人悅而隨名卿是挈先進咸推方出羣類振耀于時禍丁舅氏漂淪海沂捧訃號呼匐匍增悲喪有幼主禮或多違孰徇于名而不是思投袂就道乘艱若夷竭誠喪具申敬裳帷萬里來復祗祔于墓遽不凌節儉而有度由其溫恭守以貞固行道咨嗟觀禮興慕復從鄉賦煥發其華克不再舉聞于邦家倚閭千里歡咏斯多姻族盈門載笑且歌君之不淑名立忘阻蜀本作沮慶歸其鄉身終逆旅生死已間夀觴方舉賀書在途委骨歸土哀歡易地弔客交戶神胡不仁降此大苦嗚呼哀哉惟昔夏首羈貫相親通家修好講道為鄰既冠于阼思致其身升于司徒及爾繼年交歡二紀莫間斯言愈乎其和確爾其堅更為砥礪咸去韋弦今則遽已吾其缺然嗚呼哀哉誄行謀諡惟古之道生而無位沒有其號惟是友生徘徊顧悼爰用一惠幽明是告溫溫其恭惟德之經先民有言集作今也是旌嗚呼恭甫欽哉嘉名文苑英華卷八百四十三
