body:
  text: 文苑英華巻八百九十六宋李昉等編職官四南省二禮部尚書禇无量碑一首刑部尚書韋抗碑一首工部尚書鮑防碑一首贈禮部尚書禇公神道碑蘇頲昔軒轅至孔丘師止十一名之聖者今天下尊皇帝學踰三五教之神者既學且師考今猶昔蹈道從事伊禇公焉公諱无量字𢎞度其先邑河南之陽翟十一代祖盛後漢海鹽長子孫因居遂為吳郡海鹽人也二唐書作杭州塩官人未詳五代祖陽齊民部尚書駙馬都尉嗣錢唐侯髙祖遼民梁鄱王國常侍曾祖仁𢎞陳始興王法曹叅軍暨陽令祖範隋豫章郡丞父義宗皇贈使持節和州刺史自㣲子封宋以迄于恭恭裔食禇因而得姓迺侯迺戚或史或儒粤不可量已豈岳鎮天峻是先人之郡國将河清世平當天子之門舘靈其效矣公實休哉上哲鍾懿元和育粹忠乎孝乎盡至於至寛得衆易有親晦而明㣲而闡其立行也絲白不染不成黼黻砥黄不礪不就純鈎寝思益居待問功可倍論可博其立言也始吳興沈子山吳郡曹福授以經次吳郡張嘉㑹授之史演至賾平牴牾研至精起廢疾貫心則中達革其餘師乃厭服爾為宗匠逮攝齊膠序揚袂河洛罔不企獨立以先赴聆逺音而響從猶彫材之有楩柟綷翼之有鵷鳯下制家一作嘉辟用超倫等即拜成均直講轉右鷹揚倉曹叅軍直講如故稍遷成均助教累至國子博士朝散大夫國子司業崇文舘學士嘗二仲齋祀㑹一時髦彦主賔難折羣疑應不敢夸官閥單不能曜旗皷太夫人在東也庭闈是思鍾釡不違遂罷而就飬我聖皇居震也司過惟吏聽聰則書復徴以侍讀及回金輅問辟雍摇柄前席有丞有祝聲羣奔以坻頽辯連属而河㵼是日中賜章綬并時服雜繒就拜銀青光禄大夫以昭其業上正位遷郯王傅國子祭酒轉左散騎常侍特封舒國公實食二百公雖傳天人司國子然而載啓載沃百氏之言滿中禁日尊日亊五更之禮存上庠故珥貂寵而刑馬誓也尋與中令洛陽張説侍郎武功蘇頲黄門郎趙郡李文等開講序於掖垣悉上其昌言嘉謩可體要經逺者京都之政起有軒墀齊魯之風成於㝢縣公以遭盛明而華皓不息迺作帝師懐喜懼而斑斕未旋孰為人子灑零獻懇于再于三重論思而乆駐修切至而方遣臨軒贈詩盈篚将意華晨省而偉晝逰焉居無何太夫人即世公禮不當毁號而殆㓕遂於塋兆之側伏苫塊時松楸鹿常犯之公祝乃止應物也通神也有如是乎喪既除驛徴至仍舊左常侍兼侍讀登朝則老臣布武自屏不趨侍講則宦者平肩必輿而進皆别㫖之非常也上復以舊章散落羣籍湮墜張購令捃逸文補其缺刪其謬勑公於都即東都乾元殿京即西京麗正殿總而成之上帝之璧先王之府委墳索流筆墨可滌𤣥覽而照清光耶日者皇太子志於學齒于胄演經則太師憑几納誨則元良降席諭夫錯中形外一物三善者禮如前粤開元庚申嵗正月哉生魄景命不造遘疾薨於長安崇仁里之賜第春秋七十有五王輟朝不視旅次而哭遣中使潺湲以恤故盼近臣歔欷以追往乃贈禮部尚書賻物四百段米粟四百石小宗伯陳祭儀亞京尹䕶喪事歸則本州刺史帥属厚加焉僉謂公進以秉德動而率禮自石渠延首金華造膝時属升賢良杜讒佞雖明慮天斷匪獨開陳亦讜辭日聞寧虚聽受若藏罟者諗無藝出裘者思有惠使輕革也之説傲嬰也之譏又安能是果良圖中比則隠之微章之末所撰儲君翼善二十篇帝王要覽二十二巻帝王紀録二巻心鏡三十篇刪正論語孝經䟽各一部每條上則留中錫之孔殷盈不可數大抵以義約以文見俾興文有兆消長無傾規乎諷乎類乎指乎行之則是聞足自戒不然何以皇賚之聖叶之至於斯也化益淳儒益信則郊廟有典賔軍有容發揮牲玉斟酌犧象必咨焉度焉此又衆之難公之易薨後羣學士於書殿中得講史記至言十二巻即日聞之上悼甚重賜其家絹五百疋試為我著常奏新篇從取其書竟賫遺草悲夫粤某年仲冬甲子歸祔於錢塘臨平山之舊域容軒止塗喪服㑹葬者數百顧而歎曰公何學也何師也則我副闕惟君是登皇極天子之子是作孟侯皆受於公矣董則五朝典學無同道之用桓則三世各師有殊特之美曽不可援疑作枚以事舉諸凡卓哉使後之人泛㣲波攀絶迹者我公也太常易名曰文宜也長子河南澠池主簿庭詢次左拾遺庭誨次京兆渭南縣尉庭賔三子之戚二連所善居家嗣徽繼世承烈則仲弓之有元及李伯起之傳疑作傅秉及賜故逺邇嘉之吳江漫兮将海合吳岫重兮與天㳫公是屬兮公是安仁則返兮儉乃完異樹行兮生也志他石篆兮子也刋噫不憖歟寄之銘曰昭昭府君生代叶期儒有斯文帝王者師探幽典墳賛道雍熈其德彌芬其謩益祗訓由老成榮以恩屢資孝是悦資忠是務禹嘗獻蓍光不言樹專禇之學啓書之賦六經芳兮七命章戴頻頻兮服煌煌無還齡兮有去光未餙疑杖兮歘擁疑作摧梁宸極凄兮門人慕悲風起兮轅馬顧背西畤兮即東路路阻修兮日悠悠旌旐思兮空山秋吾見業可乆而名不朽者猗那禇侯猗那禇侯刑部尚書韋抗神道碑前人天下膏腴之土莫若雍州雍州紱冕之多莫若韋氏粤自殷伯傳于漢相昌而世濟美慶不乏賢髙矣乎猶秦塞出華岳西連於嶓冡大矣乎猶濁河納清渭東至於溟渤言之者可備也故周隋創厯後又疑作入當朝惟我二君迭為二祖逍公其首鄖也其仲處有山林之節糠粃俗塵出為廊廟之器丹青世道鄖之子太僕少卿陵州刺史武陽公諱津是生銀青光禄大夫太子詹亊贈秦州都督諡曰貞諱瑎唐宰相世系表作琨是生司農丞贈金州刺史諱暢皆素風清範百代一時公諱抗字抗闕金州府君第二子也八嵗精易十五讀春秋深入爻彖試論臣主及貴疑有闕字便成誦具觧理微義中初以明經射䇿補魏州叅軍立於稠人端若一鶚復常調就太子典膳丞亟換岐州司倉雍州司户右輔要劇上京浩穰九年致豐兩訟舉直升左䑓殿中侍御史轉尚書主客吏部二員外吏部郎中侍中執憲者雖譙郡桓彦範廣平宋璟大選持衡者京兆韋嗣立河内司馬鍾並逺識髙量領賢進善齊白簡共青縑者范陽盧懐愼子從愿趙國李乂吳郡陸象先隴西李朝隠武功蘇頲為四公特賞推數子之器公益文墨自持凖繩不雜拜洛陽令役人好惠務約刑清刻石而傳鳴桴自止遷一有右字御史中丞兼禮部尚書法明象魏禮達邦家外守其則内脩其度遷兵部尚書戎政孔殷夏司多僻作姦犯科者莫忌接利乘便者皆是公凡易四年濯一作灑然一變發其狙詐成我鷹揚别加銀青光禄大夫除太子左庻子閑以珍攝德以調䕶而巴蜀方隅西南斗絶戎常犯軼蠻或離叛討則勝不補亡猒造端之口綏則靜而作乂翹致理之心命公為益州大都督長史持節廵按公至革乎弊順乎美暑徃寒來人不知用風雨時順一作春風時雨物果遂宜入拜黄門侍郎東宻黄扉右一作左嚴青闥半股肱之委總脩餙之裕上間燕顧近臣言韋抗朕素知之何適不允大鴻臚今典賔客之事古稱行人之職俾令即序期以不濫抗宜兼授登叶睿圖遷御史大夫持節朔方軍大總管擇副宰御一作徴元帥廷諍已决廟謀先假挫貪人於敗類追桀虜於奔亡公之績也會凉州都督楊敬述羽林将軍郭知運失律摇憲䘮師倚權公確乎不㧞條奏其罪公之正也以郡縣吏坐贓發覺貶安州都督尋與之蒲雲疑作雷澤之庻河濵之阜聲淪噢沭左傳作咻頌被和樂未幾拜為大理檢校刑部尚書欽若刑柄繫於人命士師之望平冦之成一作士師之平司冦之成安以手足所措慎以毫釐之失繄頼公勿喜斯得不寃而待筭則摧其巧一作功粉餙則杜其效上将登封岱山留睠洛邑延企遲居徘徊往俞因謂公曰朕思乆之罔出卿者迺仗公作鎮還贈武陽伯兼使部銓斥浮動甄貞實妍媸露求當之途勢利塞一作窒容非之鏡復盧從愿暨頲受恩聮召崇朝交臂至信相欵他日攜手㣲疾應問豈期摇落素秋窅𡨕𤣥夜開元十四年八月某日薨於洛之永義里第享年六十嗚呼人之望公以宗伯四字一作士之宗凡百姓韙公陟台階佐王道始則夷路翹首終而亨衢鎩翮吁嗟全德孤我具膳而勝氣標凖一作曽標色荘辭定舉不忤物行不由徑獨而不黨三者無惑聞義於卜商起予立誠於鮑叔知我撫遺恤寡常所空匱以奮藻揮一作彈毫轉為神速故大課典謩必咨於公是亦施政何遽薨也旒扆深撫牀之痛纓緌惜和鼎之實盖如鄭國僑虞之竒楚子文魯公儀不其偉矣詔贈太子太傅䕶葬及窆備物加等太常考行曰貞粤以某年某月日卜葬於京城東南少陵原禮也笳鐸晨送烟霜曉發葬者藏也儉則自完素車出日一作祖縞服來至吉先兆於蓍蔡哀更傷於松栢光昭之事克恭懿之道存此曷為然其不捐者三子長京兆士曹叅軍曰載次昭文生曰翹㓜某公侯必復羙秀而文可以崇京兆之阡屬扶陽之舘公之季左司郎中萬年令澤州長宋曰某松栢之林也公最友歟疑毒天倫之孔艱思我兄之不及疇云撰勒其寄雕刋以頲爰在弱齡獲知君子牙琴不賞慟哭兹晨樂弩仍懸沉羸嵗晩銜悽固托撫疾何成愧不得絶妙好辭披文而相質爾銘曰國大司冦家大彭氏亡世疇貴府君鍾美衣冠禮樂盡在是矣講信脩睦自求諸已命之以官其直如矢秉之以憲其清若水遽登金華終列瑶戺威震蠻貊信夫邉鄙曰刑曰政載敞載理公輔未升官人作紀奈何逺韻怱頓髙軌跡滿清畤事昭緹史㣲言遂絶令問不已巖緑南望樓丹北峙或向城闉或臨松梓盛烈孤邁羣悲四起工部尚書鮑防碑有唐尚書東海宣公姓鮑春秋六十有九公從三十六載致政二一作三年歴官二十五凡居達官之長十二領四嶽十三州牧之寄三貞元六年秋八月丙申薨于洛陽私第冬十月旬有七日從先公于北邙南原一作郊詔贈太子少保給鹵簿鼓吹旌其卒葬後三年嗣祖宗由惟中古封樹之制且曰丘隴與年代相推幾何而平松栢與霜露相薄幾何而盡将令百代之後㳺九原者徘徊不朽之烈歎息可作之美其惟金石刻乎是用建碑表墓以揚先懿公諱防字子慎河南洛陽人其先蓋夏禹之苖裔春秋時杞公有仕齊者食采於鮑因以命氏曾祖標一作諲皇隴州汧陽令祖仁爽雅州飛越尉贈眉州刺史父思温彭州唐昌丞贈工部尚書皆盛德下位發祥於公天寳中天下尚文其曰聞疑作文人則重侔有德貴齒髙位公賦感遇十七章以古之政一作名法刺譏時病麗而有則屬詩者宗而誦之舉進士髙第調太子正字中州兵興全德違難辭永王去來瑱為李光弼所致光弼上将薛兼訓授專征之命于泉越輟公介之始兼訓之奉光弼也以順命為忠不及於義公知光弼之不終也諭而絶焉東越仍師旅饑饉之後三分其人兵盗半之公之闕兼訓也令必公口事必公手兵兼于農盗復于人是時中原多故賢士大夫以三江五湖為家登㑹稽者如鱗介之集淵藪以公故也徴拜尚書郎優游公卿間執政者以代言之司見屬無何薛兼訓寝疾太原上以北門寄重軫念於薛思所以貳而代之者莫與公比召對勞賜寵而遣之公之至也人不知其帥之疾帥不自知其疾及其代也由亞尹中丞洎居守專征之倅各遷其任一作各還其長兵自勇厲至于輯睦人自安業至于移風政自無闕至于有典代宗嘉歎之不足圖冩公形列于别殿盖麟閣名臣之次也三載朝覲屬今上嗣位惟新大政授公紀律俾作典刑拜御史大夫旋以文武之柄方鎮為大南國萬里俾之師長綂閩越轉江西公之撫人也以家勤之以子愛之利用用之厚生生之詔加銀青光禄大夫右散騎常侍紀成績也眞拜右常侍扈從廵狩轉禮部侍郎上還鎬京展謝郊廟公預太常折無文之禮進封東海公詔徴賢良求其讜言時薦一作員仲兄不敢違詔承詔絶句實蒼生利之宰臣病之與公並命考第者以為異日故事言或有犯投之不疑焉公曰使吾聞所未聞聖朝之瑞也擢居甲科每嵗貢士充于王庭心為靈龜亊絶請托京師仍嵗蝗旱務殷人耗拜京兆尹詔下風行令宣政舉威革難理惠周無告既而痿痺生疾陳乞遂閒上置上将軍員以待功臣先用文儒耆耋以寵其選拜右武衛上将軍厥疾加劇優詔授工部尚書致仕徙家東周富天禄貴天一作人爵樂天命頥天和以終夫天年嗚呼賢哉公德本於孝才歸于周從王牧人即戎臨亊大畧以忠肅慈惠沉毅荘敏為稱喜善怒惡不必為已論交任人必惟其忠入為羽儀出作藩翰䕫䕫然以家人嚴君之義屬于長兄盖什卿之禄千乘之賦一以奉之四時賔客之事車服器用之費一以禀之公與夫人視諸孤羣從唯所授公不敢以禮秩異夫人不敢以居有私而敬恭和樂之道於是乎乆御史中丞武威賈全公之甥也少長於我登朝異門教切義方慈均天性故全之報也稱天下甥舅加禮焉三字一作加焉受馬鄭滑節度使隴西李融公之吏也推以腹心齊厥憂寵歴佐三道其間如一故融之報也類天下賔主加歡焉於全也見公之内於融也見公之外然則公之行已與人可知矣夫人蘭陵郡夫人蕭氏始佐公賢終成公貴及公既殁清風如同二孤前左衛兵曹叅軍殿中省進馬宗叅以文學世公之業孝友繼公之志猶日不足以抒夫罔極於是乎發揚垂裕之義作為銘曰穆穆宣公為王藎臣終始明哲優游寵勛在昔理平逢時尚文髙唱寡和長才不羣星河麗天卉木榮春羽翰方睦風雲一作雲雷疑作雷雲構屯乃佐戎帥名屈道伸乃登天朝盛美惟新茫茫南國赫赫北門股肱王室父母生人執憲成式尹京作則春官主文宗一作當伯尚德出捍牧圉入趨宸極望實攸并謀猷允塞賢宜翊聖道厄于命方叔元一作未老冉耕所病明明天子禮優致政曵履散金頥眞保性良辰何遽厚夜何長歸全故丘鞏一作郎洛之陽貞石是勒德音孔章於戱宣公百世不亡文苑英華巻八百九十六
