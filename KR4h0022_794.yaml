body:
  text: 文苑英華卷七百九十五宋李昉等編傳李紳傳一首郭常傳一首馮燕傳一首燕將傳一首張保臯鄭年傳一首蔡襲傳一首何武傳一首李紳傳墨數十行墨浙本文粹作纍沈亞之李紳者本趙人徙家吳中元和元年節度使宗臣錡在吳紳以進士及第還過謁錡錡舍之與宴遊晝夜錡能其才留執書記明年錡以驕聞有詔召稱疾不欲行賔客莫敢言紳堅為言不入又不得去會留後使王淡專職為錡具行錡蓄怒始發於淡隂教士食之初士卒當勞賜者皆會府中受賜與中貴人臨視以至日三字集作次至文粹作以至中軍士得賜者俱不散齊呼曰淡逆可食既文粹作即盡即執中貴人脅曰爾寧遂衆欲寧飽衆腹曰請所欲曰為我衆書報天子幸得復錡位貴人懼偽諾之召書記以疏聞紳聞之亡入錡內匿衆索不得及中貴人至促錡行錡益怒急召紳授紙筆令操書上牘紳坐錡前佯惴怖戰管搖紙下札皆不能字輒塗去墨數十行又如是幾盡紙錡怒罵曰是何敢如此汝欲下從而先人耶對曰紳不敢惡生直以少飬長儒家未嘗聞金革嗚今暴及此且不知精神在所誠得死若在前三字集作在畏若前幸耳錡復制以兵刃令易紙復然旁一人為錡言曰聞有許侍御集作御史縱者尤能軍中書紳不足與等請召縱縱至錡鋭文粹有意字自舉授詞操書無不可錡意遂幽紳於潤之外獄兵散乃出縱竟逆死亞之二字作粹集本作贊曰李錡之賊江東也其抗節者有李雲李紳雲則中山劉騰為書以大之而紳之迹未及稱且紳職錡肘腋下舉動顧盼有一不誠則支體立盡衆手而紳亦不顧而曉然自效如此可謂臨大節而不可奪者耶馮燕傳前人馮燕者魏豪人父祖無聞名燕少以意氣任專麗情作俠集為擊毬鬪雞戲魏市有爭財鬪者燕聞之往搏殺不平遂沉匿田間官捕急遂亡滑益與滑軍中少年雞毬相得時相國賈公耽在滑能燕才留屬軍中集作中軍他日出行里中見户傍婦人翳袖而望者色甚冶使人熟其意遂室焉集作之其夫滑將張嬰者也嬰聞其故纍毆妻妻黨皆怨望會嬰麗情集有嬰暮二字從其類飲燕伺得間復偃寢中拒寢戶嬰還妻開户納嬰以裾蔽燕燕卑脊步就蔽轉匿户扇後而巾墮枕下與佩刀近嬰醉且瞑燕指巾令其妻取妻取刀授燕燕熟視斷其妻頸遂持巾去明旦嬰起見妻殺死愕然欲出自白嬰鄰以為妻嬰殺留縳之趣集作趨告妻黨皆來曰常嫉毆吾女乃誣以過失今復賊殺之矣安得他殺事即其他殺而集無而字安得獨全耶共持嬰且百餘笞遂不能言官家收繫殺人罪莫有辨者強伏其辜司法官麗情集有與字小吏持撲者數十人將嬰就市看者圍面千有餘人有一人排看者來呼曰集有且字無令不辜死者吾竊其妻而又殺之當繫我吏執有言人乃燕也司法官與俱見賈公盡以狀對賈公以狀聞請歸其印以贖燕死上義之下詔凡滑城死罪皆免亞之二字集作贊曰余尚大言二字集作大史言而又好敘義事其賔黨耳目之所聞見而一作者為余道元和中外郎劉元鼎語豫貞元年中集無此四字有集作以馮燕事得傳焉鳴呼淫惑一作􅑯之心有甚水火可不畏哉而燕殺不義白不辜真古豪矣燕將傳杜牧談集本文粹作談忠者綘人也祖瑶天寶末令內黃死燕冦中豪健善兵始去燕燕牧劉濟與二千人障白狼口山名契丹路後將漁陽軍留范陽元和五年中黃門出禁兵伐趙魏牧田季安合集本文粹作令其徒曰師不跨河二十五年矣今一旦越魏伐趙趙誠虜魏亦虜矣計為之集有禁字何其徒有超佐伍而言曰願借騎五千以除君憂季安大呼曰壯夫集作矣哉兵決出格沮者斬忠集本文粹有其字時為燕使魏知其謀乃入謂季安曰某之謀是引天下之兵也何者往年王師取蜀取夏集作吳算不失一是相臣之謀今王師越魏伐趙不使耆臣宿將而專付中臣不輸天下之甲而多出秦甲君知誰為之謀此乃天子自為之謀欲將誇服於臣下也今若師未叩趙而先碎於魏是上之謀反不如下且能不恥於天下乎既恥且怒於是任智畫䇿仗猛將練精兵畢力冉舉涉河鑒前之敗必不越魏而伐趙校罪輕重必不先趙而後魏是上不上下不下當魏而來也季安曰然則若之何忠曰王師入魏君厚犒之於是悉甲壓境號曰伐趙則可隂遺趙人書曰魏苦集本文粹作伐趙則河北義士謂魏賣友魏若與趙則河南忠臣謂趙反君賣友反君之名魏不忍受執事若能隂解牌障遺魏一城魏得持之奏捷天子以為符信此乃使魏北得以奉趙西得以為臣於趙有集作為角尖之耗於魏獲希集作不世之利執事豈能無意於魏集作趙乎趙人脫不拒君是魏霸基安矣季安曰善先生之來是天眷魏也遂用忠之謀與趙隂計得其堂陽縣名屬冀州忠歸燕謀欲激燕伐趙會劉濟合諸將曰天子知我怨趙今命我伐之趙亦必大備我伐與不伐孰利忠疾對曰天子終不使我伐趙趙亦不備燕劉濟怒曰爾何不直言濟以趙叛命忠繫獄因使人視趙果不備燕後一日詔果來曰燕南有趙北有胡胡猛趙孱不可捨胡而事趙也燕其為豫謹護北疆勿使豫復挂胡憂而得專心於趙此亦燕之功也劉濟乃解獄召忠曰信如子斷矣何以知之忠曰潞牧盧從史外親燕內實忌之外絶趙內實與之此為趙畫曰燕以趙為障雖怨趙必不殘趙不必為備一且視趙不敢抗燕二且使燕獲疑天子趙人既不備燕潞人則走告于天子曰燕厚怨趙今趙見伐而不備燕是燕反與趙也此所以知天子終不使君伐趙趙亦必不備燕劉濟曰今則奈何忠曰燕孕怨天下無不知今天子伐趙君坐全燕之甲一人未度集作濟易水此正使潞人將燕買集作賣恩於趙敗忠于上兩皆售也是燕貯忠義之心卒染私趙之口不見德於趙人惡聲徒嘈嘈於天下耳惟君熟思之劉濟曰吾知之矣乃下令軍中曰五日軍集作畢出後者醢以徇濟乃自將七萬人南伐趙屠饒陽束鹿二縣屬深州殺萬人暴卒于師濟子總襲職忠復用事元和十四年春趙人獻城十二德州管平原安陵長河棣州管猒次滴河陽信蓨平昌將陵滿臺浡海蒲冬誅齊三分其地忠因説總曰凡天地數窮合必離離必合河北與天下相離六十年矣此亦數之窮也必與天下集本作地復合且建中時朱泚摶天子狩畿甸李希烈僣于梁王武俊稱趙朱滔稱冀田悅稱魏李納稱齊郡國往往弄兵者抵集作低目而視當此之時可謂危矣然天下卒為無事自元和以來劉闢守蜀棧道劒閣自以為子孫世世之地然甲卒三萬數月見羈李錡橫大江撫石頭全吳之兵不得一戰反束粹有縳字帳下田季安守魏盧從史守潞皆天下之精甲駕趙為騎鼎立相視可為強矣然從史繞塹五十里萬戟自護身如大醉忽在檻車季安死墳杵未收家為逐客蔡人被重葉之甲圓三石之弦持九尺之刃突前跳後卒簇忽反如摶鶚一可支百者纍數萬人四嵗不北二三可為堅矣然夜半大雪忽失其城齊人經地數千里倚渤海墻太山塹太河精甲數億鈐劒其厄可為安矣然兵折於潭趙地名闕西六十里首竿於都市此皆君之自見亦非人力所能及蓋上帝神兵下來誅之耳今天子巨謀纎計必平章於大臣鋪樂張獵未嘗戴星俳倡顐玩集作玩之臣顔澀不展縮衣節口以賞戰士此志豈須臾忘於天下哉今國兵駸駸北來趙人已獻城十二助魏破齊唯燕未得一日之勞為子孫夀後世其能帖帖無事乎吾深為君憂之總泣且拜曰自數月已來未聞先生之言今者幸枉大教吾心定矣明年春劉揔出燕卒于趙忠護總喪未數日亦卒年六十四官至御史大夫忠弟憲前范陽安次令持兄喪歸葬于綘常往來長安間元年孟夏集本文粹作春某遇於馮翊屬縣北衛集本文粹作徴中因吐其兄之狀某因直書其事至於褒貶之間俟學春秋者焉張保臯鄭年傳前人新羅人張保臯鄭年者自其國來徐州為軍中小將保臯年三十鄭年少十嵗兄呼保臯俱善鬪戰騎而揮搶其本國與徐州無有能敵者年復能沒海履其地五十里不噎角其勇健保臯差不及年保臯以齒年以藝常齟齬不相下後保臯歸新羅謁其王曰遍中國以新羅人為奴婢願得鎮清海新羅海路之要使賊不得掠人西去其王與萬人如其請自大和後海上無鬻新羅人者保臯既貴於其國年錯寞去職飢寒在泗之漣水縣一日言於漣水戍將馮元規曰年欲東歸乞食於張保臯元規曰爾與保臯所挾何如奈何去死其手年曰飢寒死不如兵死快况死故鄉耶年遂去至謁保臯保臯飲之極歡飲未卒其國使至大臣殺其王國亂無主保臯遂分兵五千人與年持年泣曰非子不能平禍難年至其國誅反者立王以報王遂徵保臯為相以年代保臯天寶末安祿山亂朔方節度使安思順以祿山從弟賜死詔郭汾陽代之後旬日復詔李臨淮持節分朔方半兵東去趙魏當思順時汾陽臨淮俱為牙門都將二人二字集作將萬人不相能雖同盤飲食常睇相視不交一言及汾陽代思順臨淮欲去計未決新唐書有旬日二字詔至分汾陽兵東討唐書作詔臨淮分汾陽半兵東出趙魏臨淮入請曰一死固甘乞免妻子汾陽趨下持手上堂偶坐曰今國亂主遷非公不能東討集作伐豈懷私忿時耶悉召軍吏出詔書讀之如詔約束及别執手泣涕相勉以忠義訖平劇盜實二公之力知其心不畔知其材可任然後心不疑兵可分平生積忿知其心難也忿必見短知其材益難也此保臯與汾陽之賢等耳年投保臯必曰彼貴我賤我降下之不宜以舊忿殺我保臯果不殺此亦人之常情也臨淮分兵詔至請死於汾陽此亦人之常情也保臯任年事出於己年且飢寒易為感動汾陽臨淮平生抗立臨淮之命出於天子角集作權於保臯汾陽為優此乃聖賢遲疑成敗之際也彼無他也仁義之心與雜性集作情並植雜性勝則仁義滅仁義勝則雜性銷彼二人仁義之心既勝復資之以明故卒成功世稱周召為百代人師周公擁孺子而召公疑之以周公之聖召公之賢少事文王老佐武王能平天下周公之心召公且不知之茍有仁義之心不資以明雖召公尚爾况其下哉語曰國有一人其國不亡夫亡國非無人也其未亡時賢人不用茍能用之一人足矣蔡襲傳李磎蔡襲者自言禆將也不詳其氏族源胄至襲居北部振武軍學擊劒沉勇好奇謀功名初無知者嘗任氣與人鬪而斃之時故司空劉沔以右僕射為振武節使聞之收襲繫獄將杖殺之經宿而死者復蘇故襲得免死謫役數年沔移鎮河東武宗初胸奴犯邊詔沔河東及諸道兵出征襲聞邊方有事將因之以立功乃逃其所務來叩沔曰往君免襲之死是明公屈法申恩而襲之大幸也今天兵有伐於北虜竊願施犬馬之勞於軍前上得以酬君之恩下乞以自補其惡死生畢矣沔聞而壯義之命厠諸卒官軍至大寧聞胸奴已入振武界時大和公主在蕃多年又聞振武欲奪公主沔恐公主為振武所得蓋已功籌䇿未知所出諸將吏莫能謀襲乃請詐為捕逃者至胸奴營動搖令入河東界沔深然其計遂遣襲往襲至胸奴所揚言云振武鎮守欲殺汝曹河東劉僕射是招撫使若不移必為振武所害胸奴有得此語者遽歸寧武遂移部曲八字一作遽歸單于單于遂移部曲次于屈越城西已在河東界去官軍猶二百餘里襲歸告沔欲奏恐詔問須生口為據襲又獲生口十二人馬十五匹主帥乃具事上聞自後屢有詔令奪公主沔患胸奴衛帳逺欲其近又不能襲遂請以資糧入蕃招引沔從之襲至蕃中見公主公主流涕告以北蕃破亡疾飢孤危無告襲對曰聖明在上公主何不與單于議同入奏以困急耶公主曰此已曽議單于為我去必不還事已不諧矣言畢襲請對單于謁者髙達干曰單于是離本國復一作後中路一有册字不宜與使相見有故但可與蕃相論之襲遂見蕃相相曰吾病飢竄亡唐不我恤今日唐使來幸得無可懷襲對曰為不知單于消息捕得胸奴十二人詰問方知在唐界外數月河東劉僕射令以資糧一十橐馳寄公主單于宰相兼遣詔命如能南下則所匱竭易相助也今部落甚逺安知旱歉如此蕃相曰人不曉公法昨者飢莩不得已有所犯干今日汝必以此故來誘殺我遂推襲出帳令步卒以弓弩圍繞曰不露情必當射殺襲曰國家實命招恤如信即往疑盍走諸蕃後悔亦無及矣今虐我何益蕃相曰我若徒走諸蕃亦何悔襲曰單于大蕃與唐為親有舅甥之恩輔車之勢破亡祗宜歸唐反入諸小蕃若為小蕃所蔑安得不悔蕃相乃曰我今歸唐但恐汝主誤我汝若真招徠當為我重約誓襲曰凡作誓者急則萬端襲之為誓異於是遂引手蕃相前請斷左手腕以為誓顔色不動辭令甚壯蕃相不許曰且為我劈心出血後自飲之亦足為信襲乃於心上出血置器中而誓曰我若誤汝入唐境而携二心天必殛誅烹醢分擘言畢飲盡器中血胸奴乃信遂移帳至雲州北塞谷山東與官軍相距六十里後又詐稱弋獵侵掠振武不和引歸襲在虜庭多日恐不得歸乃誑單于相云更於雲朔州為蕃國取資糧因遂得歸具告沔以誘得胸奴近塞兼胸奴新劫振武還兵勞瘁又以唐家招徠不設備若奪公主必宜乘時疾往沔許諾命將校石雄王峯等與襲皆至單于帳合圍大破之襲突入帳中挾公主於馬上出十數步恐官軍不知誤傷乃呼曰此乃公主也石雄聞以步卒三十人奪之歸公主至河東悉訴其事於劉沔又嘗書襲名於尺素中許以上聞又言於監軍吕義忠曰無蔡襲吾不生還矣其智如此公主既歸京師沔加司空石雄受天德軍防禦使唯襲非大君所知主帥不為奏公主亦竟不能為言功業籌䇿遂曀而不顯而河東絶滅胸奴至今邊塵晏清者本襲運籌之力也會昌二年劉稹據上黨反揚辨於大原乘間拒命見獲四年上黨平今上大中四年南山黨羌反自會昌二年及今征伐襲並有勳績其功皆録在河東簿書惟破胸奴為首功而為人所掩耳至今部曲將校無不稱其智勇李磎曰甚矣功名之見沉也一至於是然古人嘗稱位可排而名不可奪矣由蔡襲以言之其可奪耶其不可耶始余於京洛間聞説者多稱劉石有破虜之功及至大原聞蔡襲方知為舉代之惑也悲夫功業卓然尚可掩抑况才藝耶余念其勤而無益故詳足其事為傳云何武傳皮日休何武者夀之驍卒也故為步卒將戍鄰霍嶽嶽生名荈昌兖切有負其販者多強暴民民不便必訴其集作於將武之至矣責其強暴者盡擒而械之俟簿圍將申夀守請殺之強暴之黨懼且死乃誣訴武于夀守且曰不順守命擅生殺于外夀之守嚴悍不可犯茍聞不便於民雖劇寮貴吏得皆辱殺之至是聞武罪如乳虎遇觸怒蝮遭傷其將害也可知己乃命徑卒將命拲武至府武固集作已知理可伸不奈守嚴悍必當受枉刑乃樂而俟死矣至則守怒而責武以其過武善媚對又支體魁然乃投石拔距之類集作狀枉之事也守雅愛是類翻然釋之絀其職一級武曰吾今日不歸地下真守之賜也請得以命報居未久夀之指邑曰樅陽即今盛唐縣野寇四起其邑將危武請於守曰此真某畢命之秋也守壯之復其故職奏命為二將武領偏師自間道入樅陽不意伏盜發於一作崛發叢翳間兵盡駭逃武獨鬪死日休曰武之受謗不當其刑况其死乎如非武心者縱免死其心不能無憤也况感分用命哉嗚呼古之士事上遇謗當職遭辱茍其君免之必以憤報破家亡國者可勝道哉春秋弒君三十六其中未必有不由是而致者也武一卒也獨有是心嗚呼今之士事上當職茍遇讒集作謗遭辱無是心者吾又不知武一卒也文苑英華卷七百九十五
