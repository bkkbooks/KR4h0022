body:
  text: 文苑英華卷二十四宋李昉等編嵗時四刻漏附寒賦一首時賦一首聖人以四時為柄賦一首先王正時令賦一首閏賦一首漏賦三首刻漏賦一首寒賦趙自厲儒有討混元搜綿祀既覿寒暑之終亦測興伏之始覘風驚於一葉委時換乎千里寒之厥狀自茲而起若夫大火宿藏青霜晨烈則蜀井煙閉漲海氛滅長河天浹綴珠岸而生冰幽朔地窮濛飛沙而雨雪乃知蘇武增感李陵愁絶聽胡笳以攪思儷漢庭之仳别及幽林風掃時物霜殘柔條危徑奧室凄寒有美人而心恍惚情怵悼而靡安隂凝栁塞怨龍庭之路隔月透羅幌憐駌衾之夜單屣銀階之悄悄雪珠淚之珊珊縫筐笥之紈素寄戎幕之艱難别有陸沉之子厠跡荒藪器宏偉而可觀命屯剝而不偶當其時也趨炎俯僂佩瞰噓吸無詩人卒嵗之衣雨泉客將離之泣豈祁寒而致憾亦遭時而不息終乖挾纊之暄更悲綈袍之及層氷涸溜宋生則綴悵而相望皓雪盈門袁子則茹悲而於悒雖居榮而可貴亦憂道而不入于時倚歎窮律佇目遐坰伊鮮物之皆悴獨霜松之常青縱寒苦之飄激淬堅眀而自寧汨吾情之浩蕩願冥志於紫靈時賦闕名從龍者雲召風者虎物之相應時哉則侣傅巖捨築渭浦收綸命或時偶時惟道親時既行焉西漢之臣附鳯時之否也東魯之父傷麟時可以謀身時可以逹命李子談說宣尼歷聘平津列侯長卿國命時廢時通知之則慶𤣥穹埏埴時運收成日月貞輝時合晦眀大火流兮歲聿云暮春花歇兮寒露將生感天時之興替矧人事之窮亨時乏良工龍泉掩彩時逢伯樂驥坂長鳴借如紅樹呈色玉顔含粲貴當時而則榮恥後時而貽歎古之君子謀於終始薦之惟賢士或知已刺途者棘垂隂者李其道可存將來之士遷喬者鶯待時而鳴芬庭者蘭候時而榮易曰時止則止時行則行自古而觀惟時之大豈獨夫今日之情者也聖人以四時為柄賦以題為韻闕名粵若受天明命配天唘聖其作則也必敬敷五教齊七政節春夏秋冬之候順金木水火土之性變通無失表正度以惟平雩祀有常示帝圖之斯盛始或星分于木斗建于寅配其宫於甲乙面其地於庚辛莫不合乎序應乎人念羣生而悉遂彰盛德以維新則是柄也非父非子而天下親暨夫候應乎離音諧于徵列其位於丙午制其方於壬子莫不循厥功究厥㫖𨗳貞悔之所由體長贏之所以則是柄也非堯非舜而天下理至乃金精儲其氣白帝蒞其事有湛露兮斯降凉風兮斯至是則仰察于天俯觀于地司肅殺而不忒憫凋落而無遺抑是柄也五帝惟六三皇復四又若𤣥律騰輝伊水德兮膺是期有積雪兮自爾有堅冰兮自茲是則上窮于象下順于時念衣褐之未濟表嵗寒之不欺抑是柄也兩漢非逺二周可追况復正已無替虛心罔差隨土圭而暗測同灰管以潜知執隂陽代謝之功咸歸不宰用日月推遷之候盡合無為由是暉映化權鏘洋德柄契皇眀於玉燭流睿覽於金鏡士有隨計上京觀光末路欣有凖於時政賀無疆於聖祚故尋繹於禮經因抽毫而是賦先王正時令賦以四時漸差置閏以正為韻陳昌言天序運氣王統時紀欽若是授人之初履端為步厯之始欲正時而罔忒非置閏其何以伊昔陶唐五帝之世申一作日眀推策之術表錫落蓂之異羲和之職既分厯象之文始備於其寅亮帝圖式昭天事其則伊邇其猷孔嘉日月運行故有遲速之異晦朔循軌因為大小之差立分至則寒暑不忒積餘日而盈虧匪賒且正者王之丕訓時者天之大信正得其序則面離而御乾時失其經則夏雹而冬震人殃於疫年不為順故時不得不正嵗不得不閏也昔周禮在魯厯法可推官或尸位閏則迷時良史為之追正議士為之興詞俾夫司厯法者罔或二事建皇極者於焉慎思則序不愆而事不悖沴可伏而祥可期我唐百王居盛九葉伊聖昧爽無忘乎順序動息少疑作必繇乎時令茲嵗也當仲秋而歸餘居位也闔左扉以舒政化災為祥紆憂作慶南山之夀閏月而潜𢎞北户之氓重譯而歸正于時金風半肅雕雲乍斂野樹丹舒遙峯翠㸃燕溟海以馳歸鴻朔漠而方漸正時之文存乎往志捨之則玉燭不調得之則銅儀安次可以使四夷禀朔之君萬代守文之士知我正往厯奉天時而置也閏賦張季友閏之所起自厯而推得餘日於終嵗爰稽候於正時其始也日之行而疾月之行而遲躔次周流運將窮矣毫釐奸一作舛度失是逺而不歸餘何以定一嵗之厯不小正何以序四時之紀於是太史授事羲和敬理以日繫月積三年而成原始要終豈周月而已天時由之而式叙國令於焉而合軌春生夏長不失其常東作西成孰知所以雪應冬而絮落雲識夏而峯起秋之夕湛露為霜春之朝堅氷為水豈不以律之克中閏之匪虛以風以雨兮各得其序曰寒曰燠兮無悖於初國家握乾符正律書契洛下之言算定乎一日之設考容成之律閏生乎卒嵗之餘故得氣正於今律移於昔履端於始節乃差而匪差歸餘於終日雖積而不積旻疑作昊天之厯象咸若重黎之職司有辟候月盈缺豈資蓂莢而知推日短長不假土圭而測且夫夏有伏冬有臘匪閏則其氣不順月有縮日有盈匪閏則其氣不成故有慢時廢朔則曰不常無藝闔扉聼政則曰假時來歲歷前古之所重綿後王之取制矧可昭翼翼扇巍巍百王之理是倚庶績之廣焉依丕赫哉我后之正時定厯堯典而同歸漏賦竇翬易曰天垂象聖人則之故備以人事法乎天時定損益之道察盈虛之期嗟嵗運兮倐忽眷年容之逶遲景苒苒而難駐晷銖銖而在茲蓋以重金壺之器建銅史之司致用久而不易循環因而可推爾其漏之所作漏之所託至精至微惟寂惟寞水滴瀝而潜響箭差池而靡錯俯通軒禁上應寥廓亘千門兮連萬户左彤階兮右丹閣亂微唱於晨雞雜幽聲於夜鶴清清泠泠日殷鳥星送春漏於重扃赫赫曈曈時方祝融傳夏漏於深宫的的綿綿眀河爛然耿秋漏於凉天暗暗隂隂濃氛鬱沉轉冬漏於寒林觀夫修短之意見乎造化之心信晷刻之道廣知挈壺之用深故能度量萬物均分四序既不忒於盈縮亦無差於寒暑順之則千載可通逆之則寸隂是阻應乎日月合乎律吕蓋漏亡則時昧漏存則政舉實邦國之是務諒樞衡之所與悲夫天轉氣流人生悠悠景有虧而有滿時或沉而或浮恥功名之未立懼容華之先秋所以懷寶獻玉彈冠振裘歌聖眀而不已肯休暇於林丘第二符子璋昔南正重司天北正黎司地迎日推策舉分定至將以綱紀厯象察明躔次算氣候為晝夜之刻立渾儀驗晦眀之異故歲時環回而有凖國家憲章以成事唐虞承用以大興夏商恭行而無墜其後疇人失業挈壺不舉詩刺東方之未明史書南風之乖序測辰屢舛於杓建揆景頗謬於寒暑千官鮮視以權衡萬姓孰寧其安處何不謂漏之既定而人自正漏之既衰而人自疑故有國者不可以不眀其事今上都咸陽理天下道歸簡易政被風雅人皆得真事則無假至於掌漏尤足稱也其本則披甲子而求範得黃鍾而下生如因三以窮數隔八以循行課六厯之踈密齊七曜之經營俾攝提之有紀實孟陬之用成其器則方圓列陛髙卑中度制隂蟲以吐輸設靈虯以水疑作盛注銅史應其方金箭刻其數則於道如符契之合精於微無黍纍之誤每至雞人起唱鼉鼓相催九重初曉千門以開國史奏事於平樂羣官謁帝於金臺不失其度及時而回自邇及逺識往知來漏之為義實大矣哉第三闕名仰察天文俯觀地理參律吕而權度審衡平而潜擬則閏餘之數乖厯攝提之運無紀空跡馬遷之能竟絶邵平之美時運紛其鼎革禮術於焉中圯樵夫恥王道之不談天子愍挈壺之闕史乃分建斯官疇咨此職將唘閉合叙以繩平俾夙夜在公而端直於是金徒抱箭銅史司刻尊疑作遵靈虯吐納之規揆抽繭髙卑之力信是模範可為法則體象隂陽代為作式故雞人合唱洪殺無差鶴蓋成隂員流不息夫其開闔之勢財成之規凖度毫釐之末錙銖圭撮之儀則離婁失其精思班匠亡其所為將運功於不測當稱物以平施乃若鑑持日夜書備眀晦爰受授而是司考事事而必載雲物順其端序寒暑成而不昧雖未代於天工亦無預於權槩能收視返聼周流六虛策勤補拙寅亮三餘校擊刁之有則均藂木之不踈察銅衡兮氣混混純積水兮來徐徐臨泉非誡危之懼巢幕寧誠安之居是使名勳合道彰國器於周書則知漏之為器其大矣哉聖人資之以端拱日月順之以行藏賢者不能减其分度智者不能損其纎芒存之則雙美廢之則兩傷是用齊天長兮地久均國祚兮無疆刻漏賦以叶心理馳箭為韻顔舒原夫隂陽遞運日月分馳星紀之輪還或爽律吕之踈密難知逮皇王之有作命壺氏以緝規爰置水於刻漏載以火而守之則晦眀之期可凖興寢之候無差爾其髙卑列級洪殺順理靈虯屹疑以俯開隂蟲矯而仰止上流注而不竭下吞挹而無已既泓澄而泉淡亦驚激而波起則良工之妙著焉睿哲之心見矣是用斟乾晷測時變視盈闕於金壺觀騰波於銀箭惟箭馳而壺减固流續而波薦筒列之數與運而無乖輝景之移閉户而可見懿其節正斯代事沿往牒信古往而今來必用之而道叶罷衣裳之顛倒配皇極而調燮不假軒閣之鳯凰何用堯階之蓂莢别有希榮片玉庇影環林驅疾風之早厲知寒漏之已侵恐年華之不與更悄悄而傷心文苑英華卷二十四
