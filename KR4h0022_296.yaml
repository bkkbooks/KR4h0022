body:
  text: 文苑英華卷二百九十六宋李昉等編行邁八奉使五十首奉使廬陵吳均悵然不自怡端憂坐漠漠風急鴈毛斷氷堅馬蹄落客子飢寒多江上衣裝薄何當報恩罷驅車還北郭奉使北徐州參丞御庾肩吾炎農稱卷領唐勛載允恭猶將表世盛尚且號民集作人從未如今聖主比德邁前蹤格天垂禮樂寰海置提封枌榆諒昔社方門有舊墉故鄉深帝念巡狩集作豫及時雍禁園周百里離宫即九重浮橋還㵼渭抗殿本疏龍過沛追鄉飲歸宛盛禮容千金登禹膳萬夀獻堯鍾依然對白水眷言懷赤松回天隨輦道駐日逐戈鋒路逺大風積山長佳氣濃年光正婉娩春樹轉丰茸竹葉含初籜集作笋蓂枝發早笻瑞木翻無鳥祥花更少蜂咸英起雲鳯率舞間笙鏞海鷗時出沒集作泛漾江鱏乍噞喁雲邉開鞏樹霧裏識嶢峯小人濫趨走虛薄愧無庸皇恩不可報河清徒易逢被使出關何胥出關登隴坂回首望秦川綘水通西晉機橋指北燕奔流下激石古木上參天鶯啼落春後鴈度在秋前平生屢此别腸斷自催年公館宴酬南使徐陵裴讓之嵩山表京邑鍾嶺對江津方域殊風壤分野各星辰出境君圖事尋盟我恤憐有才稱竹箭無用忝絲綸列樂歌鍾響張旃玉帛陳皇華榮受命垂類聚作延譽本無因韓宣將聘楚申胥欲去秦方當飲河朔翻屬卧漳濵禮酒盈三獻賔筵盛八珍嵗稔鳴銅雀兵戢坐金人雲來朝起蓋日落晚推輪異國猶兄弟相知無舊新奉使至鄴館類聚作鄴館公晏裴納之晉楚敦盟好僑札同心賞禮成樽爼陳樂和金石響朝雲駕馬進曉日乘龍上雙闕表皇居三臺映仙掌當階篁篠密約岸荷蕖長束帶盡欣娛誰言騖歸兩將命至鄴庾信大國修聘禮親鄰自此敦張旃事原隰賔序類聚作負扆報成言西過犯風露北指度轘轅交歡值公子展禮覿王孫何以譽嘉樹徒欣賦采蘩四牢盈折爼三獻盡類聚作滿罍樽人臣無境外何日類集作由欣此言風俗既殊阻山河不復論無因旅南館空欲祭西門眷然惟此别風類聚作夙期幸共存對宴齊使前人歸軒下賔館送蓋出河堤酒正離杯促歌工别曲悽林寒木皮厚沙逈鴈飛低故人儻相訪知余巳執圭將命至鄴酬祖正員前人我皇臨九有聲教洎無堤興文盛禮樂偃武息氓黎承乏驅騏驥類聚作馬詩我馬為騏旌類聚作旃旗事琬圭古碑文字盡荒城年代迷被隴文瓜熟交塍香穗低投瓊實有慰報李更無蹊廣陵岸送北一作逺使隂鏗行人引去節送客艤歸艫即是觀濤處仍為郊贈衢汀類聚作漢又作河洲浪巳息𨝍江路不紆亭嘶背櫪馬檣轉向風烏海上春雲雜天際晚帆孤離舟對零雨别渚望飛鳬定知能下淚非但一楊朱贈北使潘徽業定三邉靜時和四海敦行人仍禮籍使者接輶軒賔榮君享宴客踞我司存既美齊嬰學欣逢鄭産言琴酒時歡會篇章極討論回旌逗隴左返軸指河源塞榆行隱路津栁稍垂門日沉山氣合潮落水花翻離情欲寄鳥别淚不因猿所可緘懷袖方以代蘭萱贈司馬幼之南聘盧思道故交忽千里輶車蒞逺盟幽人重離别握手送行征晚霞浮極浦落景照長亭拂霧揚龍節乘風遡鳥旌楚山百里映吳江萬仞清夏雲樓閣起秋濤帷蓋生陸侯持寶劒終子繫長纓前修爾類聚作亦何逺君其朂令名接北使盧世基會玉二崤至瑞節三秦歸林蟬踈欲盡江鴈斷還飛墻垣崇客館旌蓋入王畿先敢論類聚作共此敦封植方欣薦初學記作當篤類聚作欣薦紵衣奉使益州至長安發鍾陽驛盧照鄰躋一作踰險方未夷乘春聊騁望落花赴丹谷奔流下青障葳蕤離樹滋滉漾春江漲平川看釣侣狹徑聞樵唱魚戲緑苔前鶯歌白雲上耳目多異賞風煙有竒狀峻阻將長城高標吞巨舫聮翩事羈靮辛苦勞疲恙多濟幾潺湲晨登每惆悵誰念復芻狗山河獨偏喪逺使海曲春夜多懷駱賔王長嘯三春晚端居百慮盈未安蝴蝶夢遽切魯禽情别島連寰海離魂斷戍城流星疑伴使低月似依營懷祿寧期達牽時匪徇名艱虞行巳逺昧集作時迹自相驚送魏兵曹使嶲州得登字陳子昻陽山淫霧雨之子慎攀登羌筰多珍寶人言有愛憎思一作欲酬明主惠當盡使臣能勿以王陽歎一作道卭道一作迢遞畏􅲠􅜤此詩二百六十七卷重出今巳削注異同為一作奉使築朔方六州城率爾而作李嶠奉詔受邉服揔徒築朔方驅彼犬羊族正此戎夏疆子來多悅豫王事寧怠遑三旬無愆期百雉鬱相望雄視沙漠垂有截北海陽二廷已頓顙五嶺盡來王驅車登崇墉顧盼凌大荒千里何蕭條草木自悲涼慿軾訊古今慨焉感興亡漢障緣河逺秦城入海長顧無廟堂䇿貽此中夏殃道隱前業衰運開今化昌制為百王式舉合千載防馬牛被路隅鋒鏑銷戰場豈不懷殆勞所啚在永康王車何為者稱代陳頌章和李大夫嗣真奉使存撫河東杜審言六位乾坤動三微厯數遷謳歌稱火德圖讖在金天子月開階統房星受命年禎符龍馬出寶籙鳯凰傳地即交風雨都仍卜澗瀍明堂唯御極清廟乃尊仙不宰神功運無為大象懸八荒平物土四海接人煙巳屬羣生泰猶言至道偏璽書傍問俗旌節近推賢秩比司空位官臨御史員雄詞執刀筆直諌罷樓船國有大臣器朝加小會筵將行備禮樂送别仰神仙城闕周京轉關河陜服連稍觀汾水曲俄指綘臺前姑射聊長望平陽遂宛然舜耕餘草木禹鑿舊山川昔出諸侯爭無何霸業全中軍歸戰敵外府絶兵權隱隱帝鄉逺瞻瞻肅命虔西河偃風俗東壁挂星纒井邑枌榆社陵園松柏田榮光朝掩代佳氣晚侵煙雨霈鴻私滌風行睿旨宣惸婺訪疾苦屠釣採貞堅人樂逢刑措時康洽賞延賜踰秦氏級恩倍漢家錢擁傳咸翹首稱觴競比肩拜迎彌道路詠舞溢郊鄽殺氣西衝白窮隂北瞑玄飛霜遙度海殘月逈臨邉緬邈朝廷問周流朔塞旋興來探馬䇿俊發把集作抱龍泉學揔八千卷文傾三百篇澄清得使者作頌有人焉莫以崇班閡而云勝託捐偉材何磊落陋質幾翩翾江海寧為讓巴渝轉自牽一聞歌聖道助曲荷陶甄歸戰敵歸集作掃送高郎中北使杜審言北狄願和親東京發使臣馬銜邉地雪衣染異方塵嵗月催行旅恩榮變苦辛歌鍾期重錫拜手落花春送梁卿王郎中使東蕃弔册崔湜梁侯上卿秀王子中臺傑贈册綏九夷旌旃下雙闕西堂禮樂送南陌軒車别征路入海雲行舟泝江月兹邦久欽化歷載歸朝謁皇心諒所嘉寄爾宣風烈送姚侍御出使江東宋之問帝憂河朔郡南發江陵倉坐歎青春别逶迤碧水長飲水朝受命衣錦晝還鄉為問東山桂無人何自芳奉使嵩山途經緱嶺前人侵星發洛城城中歌吹聲畢境至緱嶺嶺上煙霞生草樹饒野意山川多古情大隱德所薄歸來可退耕送郭大夫元振再使吐蕃張説犬戎廢東獻漢使馳西極長册問酋渠猜擕集作阻自夷殛客髮徂邉嵗旌裘喪弊集作弊海色五年一見家妻子不相識武庫兵猶動金方事未息逺圖俟才智苦節輸筋力脫刀贈分手書帶加餐食知君萬里侯立功在異域送鄭大夫惟忠從公主入蕃還字韻前人鳯吹遙將斷龍旗送欲還傾都邀節度集作使酌酒緩離顔春磧沙連海秋城月對關和戎應賞魏定逺莫辭班南中送北使二首前人傳聞合浦葉曾向洛陽飛何日南風至還隨北使歸紅顔度嶺歇白首對秋衰高闕何由見層臺集作堂不可違誰憐炎海曲淚盡血沾衣二待罪居重譯窮愁度兩集作暮雨秋山臨鬼門路城繞瘴江流人事今如此生涯集作自日可求逢君入鄉縣傳我念京州别恨經集作歸途逺離言暮景遒夷歌翻下淚蘆酒未消愁聞有胡兵急深懷漢國羞和親先是詐欵塞果為讐釋繫應分爵蠲徒幾復侯亷頗誠未老孫叔且無謀若道馮唐事皇恩尚可收奉使自藍田玉山南行張九齡征驂入雲壑始憶步金門通籍微軀幸歸途明主恩匪唯徇行役兼得慰晨昏是節暑雲熾紛吾心所尊海縣且悠緬山郵日駿奔徒知惡囂事未暇息隂論嶢武經陳迹衡湘指故園水聞南澗險煙望北林繁逺路集作靄千巖合幽聲百籟喧隂泉夏猶凍陽景晝方暾懿此高深景集作極徒然集作令夢想存盛明期有報長往復奚言使還湘江水上前人歸舟宛何處正值楚江平夕逗煙村宿朝緣浦樹行于役已彌嵗言旋今愜情鄉郊尚千里流目夏雲生使還都湘東作前人蒼鷓昨歸候陽鳥今去時感物遽如此勞生安可思養真無上格圖進豈前期甘節往來苦壯容離别衰盛明非不遇弱操日云私孤楫清川渚征衣寒露滋風朝津樹落月夕嶺猿悲牽役而無悔坐愁秪自貽當須報恩巳終爾謝塵緇送使廣州前人家在湘源住君今海嶠行經過正中道相送倍為情心逐書郵去形隨世網嬰因聲謝逺别緣義不緣名巡按自灕水南行前人理棹雖云逺飲氷寧有惜况乃佳山川怡然傲潭石竒峯岌前轉茂樹隈中積猿鳥聲自呼風泉氣相激目困詭容逆心與清暉滌紛吾謬執簡行郡將移檄即事聊獨歡素懷豈兼適悠悠詠靡盬庶以窮日夕使至廣州前人昔年嘗不調兹地亦邅回本為雙鳬入何知駟馬來人非漢使橐郡是越王臺去去雖殊事山川長在哉酬趙二侍御史西軍贈兩省舊寮之作前人石室先鳴者金門待制同操刀常願割持斧竟稱雄應敵兵初起緣邉虜欲空使車經隴月征斾繞河風忽枉兼金訊非徒秣馬功氣陵集作清蒲海曲集作內聲滿柏臺中顧巳塵華省欣君震逺戎明時獨匪報嘗欲退微躬使至塞上王維銜命辭天闕單車欲問邉集作單車欲問邉屬國過車延征鴻出漢塞歸鴈入胡天大漠孤煙直長河落日圓蕭關逢候騎集作吏都護在燕然休假還舊業便使前人謝病始告歸依依入桑梓家人皆佇立相候衡門裏時輩吟集作皆長年成人舊童子上堂嘉慶畢顧與姻親齒論舊忽一作或餘悲自集作目存且相喜田園轉蕪沒但有寒泉水衰栁日蕭條秋光清邑里入門乍如客歸集作休騎非便止中飲顧王程離憂從此始送靳十五侍御使蜀孫逖天使出霜臺行人擇吏才傳車春色送離興夕陽催驛繞巴江轉關迎劍道開西南一何幸前後二龍來和左司張員外自洛使入京中路先赴長安逢立春贈韋侍御等諸公二首前人拜郎登省闥奉使馳車乘遙瞻使者星便是郎官應臺妙時相許皇華德彌稱二陜聽風謡三秦望形勝此中暌友益是日多詩興寒盡嵗隂催春歸物華證二忽覩雲間數鴈回更逢山上正花開河邉淑氣迎芳草林下輕風待落梅秋憲府中高唱入春卿署裏和歌雜詠作詩來共言東閣招賢地自有西征作賦才贈獻納使起居田舍人杜甫獻納司存雨露邉地分清切任才賢舍人退食收封事宫女開函近御筵曉漏追趨青瑣闥晴窗點檢白雲篇揚雄更有河東賦唯待吹噓送上天使過彈筝峽儲光羲鳥雀知天雨羣飛息復集作復羣鳴原田無遺粟日暮滿空城達士憂世務鄙夫念王程晨過彈筝峽馬足凌兢行雙璧隱靈曜莫能知晦明皚皚堅氷色漫漫隂雲平始信古人言苦節不可貞送友人使夷陵崔翹猿鳴三峽裏行客舊沾裳復道從此一作兹去思君不暫忘開襟春葉短分手夏條長獨有幽庭桂年年空自芳奉使巡檢兩京路種果樹事畢入秦因詠歌鄭審聖德周天壤韶華滿帝畿九重承渙汗千里樹芳菲陜塞餘隂薄關河舊色微發生和氣動封植衆心歸春露條應弱秋霜果定肥影移行子蓋香撲使人衣入徑迷馳道分行接禁闈何當扈仙蹕攀折奉恩輝銜命使本國胡衡銜命將辭國非才忝侍臣天中戀明主海外憶慈親伏奏違金闕騑驂去玉津蓬萊鄉路逺若水故園鄰西望懷恩日東歸感義辰平生一寶劔留贈結交人送金鄉歸新羅陶翰奉義朝中國殊恩及逺臣鄉心遙度海客路再經春落日誰同望孤舟獨可親拂波銜木鳥偶宿泣珠人禮樂夷風變衣冠漢制新青雲已千侣知汝重來賔和中丞出使恩命過終南别業劉長卿不過林園久多因寵遇偏故山長寂寂春草過年年花待朝衣間雲迎驛騎連松蘿深舊閣樵木散間田拜關貪搖珮看琴懶更集作著弦君恩催早入巳夢傅巖邉送裴四判官赴河西軍試前人吏道豈易愜如君誰與儔逢時將騁驥臨事無全牛鮑叔幸相知田蘇頗同逰英姿挺孤秀清論含風集作九流出塞佐集作復持簡辭家擁鳴騶憲臺貴公舉幕府資良籌武士佇明試皇華難久留陽關望天盡洮水令人愁萬里看一鳥曠然煙霞收晚花對古戍春雪寒邉州道路雖暫隔音塵仍集作耶可求他時相望處明月西南樓奉使新安自桐廬縣嚴陵釣臺宿七里灘下寄使院諸公前人悠然釣臺下懷古時一望江水自潺湲何一作行人獨惆悵新安從兹一作此始桂楫方蕩漾回首百里間一作里閭間青山千萬狀連崖去不斷對嶺遙相向夾岸黛色秋沉沉緑波上夕陽留古木水鳥拂寒浪月下扣舷聲煙中採菱唱猶憐負羇束未暇依清曠牽役徒自勞近名非所尚何人集作時故山裏却醉松花釀回首唯白雲孤舟復誰訪賈侍御自會稽使回篇什盈卷兼蒙見寄一首與余有挂冠之期因書數事率成十韻前人江上逢星使南來自會稽驚年一葉落按俗五花嘶上國悲蕪梗中原動鼓鼙報恩有一作看鐵劒銜命出金閨風物催歸緒雲峯發詠題天長百越外潮上小江西鳥道通閩嶺山光落剡溪暮帆千里思秋夜一猿啼柏樹榮新寵桃源憶故蹊若能為去此行復草萋萋送盧舉使河源張謂故人行役向邉州匹馬今朝不少留長路關山何日盡滿堂絲竹為君愁武城一作威春寒一作暮聞宇文判官西使還已到晉昌岑參片雨過城頭黃鸝上戍樓塞花飄客淚邉栁送集作挂鄉愁白髮悲明鏡青春换弊裘君從萬里使聞巳到瓜州送日本國聘賀使朝臣卿東歸包佶上才生下國東海是西鄰九譯蕃君使千年聖主臣野情偏得禮木性本含仁錦帆乘風轉金裝照地新孤城開蜃閣曉日上車輪早議來朝嵗塗山玉帛均文苑英華卷二百九十六
