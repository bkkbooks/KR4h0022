body:
  text: 文苑英華卷五百四十四宋李昉等編國城官宅墻井門三十二道國城建國判五道臨宫判四道城邑判四道城者謳甲判一道登城判一道升高判八道官宅造室判二道宅判一道墻井築墻判二道鑿井獲鏡判三道義井判一道國城建國判後篇作侵官判典同置臬晝參諸日中之景夜考之極星或告其越司視事詞云知無不為對楊仲昌考工建官匠人營國既匡政本將懋彛倫惟彼京師式模大壯三門煙竦九軌繩列殷稱重屋周曰明堂必有以懸之工理資置臬之審晝規日景夜考星躔陽不遁來月焉藏往屬吾君稽古庶政文明將大朴為城池用無私為宫闕凡諸奢靡咸悉棄捐瞻言主司雖設何有况典同之務𨽻在宗伯雖舉公道全非守官輒相奪倫焉以逃責望貽出位之誡以厚正名之典同前褚亮定之方中作為宫室紫微夜視考太乙之帝居黃道晝參取羲和之亭午於是審曲靣勢置臬懸衡各有典司無乃一作乃無詢於梓匠越其樽爼翻見作於同律晉雖不競楚勿與知侵官有刑罪將安捨不司宗伯之事妄為荀息之詞人亦有言自貽伊咎同前乾道著明聖人作則仰必觀象測隂陽之運行俯而定居考星日之中正法象無昧道誠傳於古今典司不愆事宜禁夫侵越典同業尚多藝知無不為成周舊臺嘗見立圭之法作楚前室能探置臬之規候太陽於齊天占列象於清夜六龍齊御不差亭午之隂衆星環拱自識方中之節雖行之有則無慙述者之明而視或越司終代匠人之斫同前晝夜分象為章於天欽咨日官懋緝星紀探六厯之無爽齊七政而不忒周官命職各有司存相彼典同實非其任安得置斯水臬均彼土圭茍違盈縮之理徒知分至之節雖占星揆日坐識乾坤而越局侵官終罹罪罟既紊銅渾之典請挂玉條之律此下二篇元編在五百四十九卷雜判門今移入於此同前百揆分曹式著尊卑之位九流開務非無守主之規若官得其人網有條而不紊任乖其器玉毁櫝而何愆惟彼典同頗輕其職不專律吕之應傍占星緯之中在定雖合於楚宫理職式乖於周秩越司之過誠謂當仁然以君子器周無往不利調鍾則聞於合響置臬何隔於兼通即欲論辜恐乖輕典請重考其本藝然後定以明科愚管所窺將此為允臨宫判丙登髙臨宫法司斷徒一年丙訴云令所對吕焯至若惑衆創規邦憲貽範能賦雖聞一作云於曩列不呼取誡於前經丙登臨此時宫墉近矚方比迹於桓景豈均賞於屈平窺見可徴愆尤自速法司務惟疾惡志在繩非未窮令所之由遽加徒罪之罰待詳疑璧方可揮鉛同前范令芬總目作冬芬玄圃邃居青宫祕籞事隔中外理絶登臨丙之無良自貽伊咎升髙異梁竦之憤抵法挂臯陶之刑且夫子之牆猶其難見儲君之禁焉可輒臨然法難動搖罪宜欽恤弊一作典獄雖結於徒坐往訴須從於減科同前宫室九重深居而理山河四顧設險為雄或有登臨當其近密始疑楚宫極目春江終類子牟逰心魏闕事必無故情其難捨抵玉律以懲違論頳衣而何失既有詞於令所須閲實於司存懸議科條恐貽深刻同前帝宅天居深宫邃宇閶闔爰啓甘泉是壯必資恭敬無或登臨丙昧科條輒兹違犯且登臨之理抑有前聞桓景所以消災山濤猶其望逺若非此道終合加刑法司處以徒年景訴猶為文過謂從令所冀減嚴科且前星發輝少陽開景銀榜之門斯闢玉裕之德稱尊焉可輕然聿來慿眺法司科結正合公途城邑判甲將仞邑乙不從命比周狗以屬之損已對蔣勵已大道既隱天下為家巢燧已逺於三皇城邑已安於萬姓將以寇盜無擾鄰伍有孚以崇墉濬洫用偹於王制屋粟里布亦率於周典猗嗟彼甲務成厥功足使孔丘門人論於千乘之賦鄭國説者難於九仞之髙豈謂立身致誠人未從命不聞忠信之迹翻起比周之言忘筌深謝於得魚致損俄聞於屬狗且辨璧以聼理貴審詳東矢而論道取嚴科且損者恐其無過命者寧載有詞待窮三刺之典然措片言之折同前祝雲將侯伯之城中五之一茍不以度事或有虞甲恪居官曹慎固封守魯大夫之為政必葺其垣晉獻子之城周先仭其邑豈謂澤門之晢見沮於邑中之子於垣載關於詩頌眷言於乙深昧從時且人之比周既貽官謗而墻之隙壞誰執其愆今遐邇乂寧邉鄙不聳茍不從命亦何懵焉遽嗾夫獒棄人何甚况屬於古令出惟行欲加典刑可以理遣同前鹿慶期自上棟下宇疆里井田度土居人量地制邑故墉垣是葺版築聿修華元巡功見謳於城者子囊臨逝貢策於荆王甲何人斯職兹仞邑乙不從命同之鑿壞趨舍路殊便為鎖一作隙末雖叔孫受縶每效勤勞而子騫發言何必改作遽營危堞未崇射隼之規不憚嚴科輒嗾夫獒之噬棄人用犬何其不臧既紊風猷請書霜簡同前張思鼎大道既隱天下為家度土以居人量地而制邑將興版築必俟命疑作金槌劃以斷岸長雲負以重城四郭孟軻五畝匪宅是營孔丘數仞爰兹仰止生異里仁之美行多嫉惡之辭茍此不從胡施而可棄人用犬雖猛何為且闔門塞竇在明時而難許比周阿黨豈君子之攸宜損乙既謝於當全罪甲庶期於無訟然恐造有妨害兆有吉凶或利晉而闕秦將抑彼而就此各從所便不亦宜乎城者謳甲判甲為植巡功城者謳之甲乃鞭之其城者訴不伏對千乘制國百堵興詩義非取於復隍道實遵於髙壘繕葺惟隙人其以寧廣袤無稽禍由莫大是以京制非經禍延鄭伯梁興不處卒有秦兵在恱使以忘勞豈嚴刑而毒衆甲為其植是訓於從庀以功程務其操築傅巖之野疑將見於代刑邑中之黔即類聞於有沮興其百版就以九成方取託於啼烏佇推功於射隼匪隕孀妻之慟寧頽薛縣之琴晉獻成周初開仞邑華元植宋遂見為謳省已良虧尤人遽覩棄甲而復事本叶於前聞執撲以行譴何貽於是日咸其輔頰雖成滕口之嫌既謹垣墉請逭噬膚之罰登城判甲登城而指乙告其惑衆甲云實無妖言對王泠然先王訓俗禁以窺臨君子執身慎乎登降惟甲才非入室教異垂堂既處隘而乘間爰興髙而眺逺平看雉堞回數人家遍識山川周知國邑殊鄭君之伺敵忽上層埤同漢后之思鄉且瞻長路行未聞於能賦告將惑於妖言不指不呼孰云知禮從輕從重旋欲議刑向若甲是卑流恭隨長者承所視而待問事緣情而可矜今者攀陟不宜驚疑於衆獲疑作護非有失雖云李徑無言故犯難容亦可棘司懲訓嚴城作限緩獄何逃罪自招於指揮理宜退於心伏升髙判解式與長年行因升髙不從所視遂杖之式訴州斷鬬論省科失入對王延光視瞻無回在於往記周旋有禮著之前聞惟彼長年與兹解式行將望逺豈伊升髙之能賦悠然目極寧復登山而送歸且平原坦夷回首超忽茍不從其所視欲何詳於切問式之立身誠未謂之學矣長者加杖蓋亦尤而效之則不愠不知君子之通論如怒如祉詩人之美述既墻靣而斯責於情恕而安施薄訴之由其文有以雖鬪論勑法頗欽於州見而失入在宥請遵乎省科同前田南砅罰懲其淫禮主於敬若長幼而失節在典刑而無捨蠢爾解式從於長年三人而行尚聞擇善十年以長非可肩隨况侍上丘陵不能向其所視如問及雲物其將對於何詞無儀所謂於伊人有體自均於相鼠杖其傲禮固未乖宜昔者蠟畢出遊言偃問其何歎幼而不遜尼父叩其夷俟合志為友前賢猶且不嗤年長以倍今日云何致罰必若齒於鄉黨則應金作贖刑如或列於父兄豈可求之凡鬬失入宜從省見定刑更待州申欽哉惟刑捨此將濫同前王惟孝先王設教各有等威君子慎儀必修德禮茍昧斯道時謂不欽解式妄人不若厥訓徒守尊卑之位終乖敬讓之節不從所視實曰愆儀或人杖之是亦奚爽州曹丕弊因噬臘之遇毒省司失入覺從者之詞遊罪自己招云誰之咎請當從禮之罰勿聽無稽之訴同前張郊總目作鄰行已以恭執事在敬同人攸往於野則亨茍踐禮而不踰必遊目而從睹瞻言解式惟是長年道契三人方擬同心之利名參百行亦專好德之寵行邁云靡丘陵是升覽雲物於五方壯山河於千里不從吾視奚率爾虞事類武侯且未屈於吳起義同文子仍不徴於叔向禮經有紊夏楚收威實長者之訓恭何薄言之速訟淫刑以逞外臺於是觸藩寬政荐敷仙省凖一作宜其射隼同前劉孺之設教以防禮不逆矣遇長不敬患至掇焉茍訓典之不修乃撲撻而何害相彼一作時解式誠謂狡童五人羣居且聞異席十年以長則必肩隨不恭辟咡之儀致闕升髙之禮惑其所視吾何以觀之哉杖以作威固當斯害也已小人文過肆以薄言君子詰姦無從長傲歸諸司敗足示陵尊成以調人可徴犯齒且州司以刑頗均短綆會府是糾且異長鞭伊小大之以情庶寬猛以相濟同前王靈嶽長者與行登髙向視古之用典決事原心越則謂昏逞而生害是夫鞠稚從陟丘陵已實處卑執奚有黷拾足於後固合益恭肆目以遊無乃長傲逺有所望問而莫知使曳練吳門宣尼尚惑徹蕃晉壁楚子徒觀茍由禮以防非則記過而及杖况尊能制幼刑期就均所罰則可豈宜有訴嗟州議之非當招省司之是詰同前程諫恭敬何常少長有禮自以引以翼無失於等威左之右之動從於瞻視茍昧斯者則何以觀解式陪彼長年身居弱嵗比景未聞於有德居卑且見於無儀於是舍車而徒升髙自下異梁鴻之適越不覩興謡殊柏景之禳災豈能成俗既而碧空一色翠微萬里迷周流於逺晀闕咫尺以承顔梢雲之杖遂行白雲一作雪之途且默然鞭以為罰恐傷剛暴且人而無禮寧罷防間與其居尊而肆威曷若導愚而誘暗况擊蒙垂象於周易叩脛設教於孔門徒事薄言寧容文過剖符之郡涉深故於鬬論握蘭之司雅議懲於失入同前陳齊卿介福維祺授康緝御未濟溝壑是登丘陵將察視之致虧唯對問之所詔非我族類其心則乖且幼長之行陟降有序儻云能賦遂爾升高或匪事親爰加大杖豈桑榆之已逼將夏楚而收威設取愧於離婁終見傷於寧越外臺置辟實諧所訴華省繩愆請修其本解式之競長年其悲官宅造室判丁為室斫其椽而礱之法司科罪訴云新加三命對袁令問九儀辨等八柄正名設貴賤之地立財用之宅如或居處無節制度不經動而失中難以為正彼丁為室將完是居有覺其楹於粲而掃上棟下宇燥濕不交輪焉奐焉鳥鼠攸去既成隩阼如位崇而德尊不事亷隅知物誘而心汰無法自守用奢宣驕安且燠兮其功可取斫而礱也於禮則那且加命則大夫之命此室則國君之室何取彼義自用於身請麗本刑無撓常度同前王雄風易稱上棟下宇禮載度堂考室眷言崇飾誠有等威動而或踰過則誰任丁沐我皇化策名清時既登大夫之職方用少牢之禮爰修其廟載飾其椽斫之則通礱之未可事且非據法實難容尋考父之銘雖同三命徴穀梁之傳則僣諸侯憲局所科罪斯得中宅判洛陽縣人朝諺先蒙本縣給同鄉人任蘭死絶宅一區又被蘭女夫郭恭妻理訴此宅縣斷還諺州斷還女諺不伏對任蘭幸逄昌運得齒齊氓欽奉太和庶延遐壽豈謂夢瓊殘喘奄就飄零連石餘輝遽聞遒盡但以庭虛謝玉掌絶韋珠同伯道之無兒類伯喈之輟嗣孟軻五畝竟闕承基揚雄一區俄從别授縣司以女既出嫁判給朝諺之家州司以宅是見財斷入郭恭之婦宅及資物女即近親令式有文章程宜據牆井築牆判洛陽縣甲界內坊牆因雨頽倒比令修築坊人訴稱皆合當靣自築不伏率坊內衆人共修對赤縣分曹黃圖控邑周公曲阜池一作地是浮龜之浦元禮髙門人積登龍之望擊鐘鳴鼓歌吹由其沸天向述當衢㕓閈於焉撲地屬長空驟雨看石燕之分飛廣術頽墉見銅駝之咫尺仲尼數仞無復及肩相如上林唯餘填塹徒掃茨之有刺終射隼之無由奚疑作爰興洛汭之垣載俟傅巖之築雖人唯比屋而地實離疆幸無踰於舊途理宜歸於本界若本衆户始可興功自招頭會之嫌仍必靣牆之請與奪之理斯之謂歟同前虞俌帝王是宅河洛之陽雲闕巖巖列綺城之萬雉環途隱隱分體國之九經重閈交開樓臺相拒屬隂風回扇纍日沈輝灑洪雨於四溟布族雲於千里煙凝萬井萍泛中衢半露宫牆坐見室家之好全頽環堵行瞻湫隘之居且揆務黃圖參榮赤縣理雖謹察故典遵牧黎人必使溝洫廣開垣墻甚厚因茲法令正叶隨時坊人以東里北郭則邑居各異黔婁猗頓乃家産不侔奚事薄言佇遵恆式既資衆力須順人心垣髙不可及肩板築何妨當靣鑿井獲鏡判鑿井獲古鏡不送官司鄰告違法對玉甃浮輝珠星湛耀漢隂舊址方除飾智之心譙國開源忽遇神仙之兆乙乃劬勞是務穿鑿為功暫因梧樹之傍遂覽菱花之照光芒射目騕裊一作窈窕明心見飛鵲之時來覩回鸞之屢舞雖則私獲合送官司愛而欲留法將焉許自招其責誰復哀矜鄰人告之雅符公正同前吕務博乙既鑿井將開射鮒之泉欲施繘瓶已獲盤龍之鏡清源初鑿疑菱花而始成玉甃將升似明月而飛出寶匣藏而晦宇美人拂而生光王濛覽影已堪自愛秦嘉贈心歎惜何極眷言此得誠所珍竒爰令送官不吝於下誠亦允當固無所疑即以鄰者之言置乙之辜庸人陷法只堪矜憫請寬於乙將謂恤刑同前朱萃乙也鑿井遘墳而獲古鏡抱春銅之色涵明月之輝罷照秦樓未懸溫室玉女窺而不倦仙人磨而益明異龎儉之得銅殊宣尼之對缶既曰竒觀理合歸官雖隱則有愆刑故無捨然物非古迹事或可矜請更詳審方可裁斷義井判得人於京陌施桔橰汲水作義漿尹責擅穿街地訴云濟途行對香街隱隱垂栁垂楊行道遲遲載飢載渴既繘井而辨義亦鑿木而設機故窮谷射鮒坐忘抱甕之勞挈水濟人行符種玉之兆魯宣逰往未捨蟻丘之漿漢尹載馳旋覯章臺之陌責其專擅雖掘地而及泉濟以途行庶恢天而漏網茍利則可胡其未從文苑英華卷五百四十四
