body:
  text: 文苑英華卷四百四十七宋李昉等編册文六九錫文册陳王九錫文徐陵大哉乾元資日月以貞觀至哉坤元憑山川以載物故惟天為大陟配者欽明惟王建國翼輔者齊聖是以文武之佐磻溪蘊其玉璜堯舜之臣滎河鏤其金版况乎體得一之鴻姿寧陽九之危厄援陳書作拯橫流之南史作於碣石撲燎火於崑岑南史作岡驅馭於韋彭跨蹍於齊晉神功行而靡用聖道運而無名者乎今將授公典䇿其敬聽朕命日者昊天不弔鍾亂于我國家漏網吞舟強胡內贔茫茫宇宙惵惵黎元方趾陳書一作足圓顱萬不遺一太清否亢橋山之痛已深大寶迍如平陽之禍相繼上宰膺運康救兆民南史作黔黎鞠旅於滇池之南揚旌於桂嶺之北懸三光於已墜謐四海於羣飛屠猰㺄於中原斬鯨鯢於蒙汜功滿上國光啓中興此則公之大造於我皇家者也既而天未悔禍夷醜荐臻南夏崩騰西京蕩覆羣胡孔熾藉亂乘間推納藩枝盜假神器冡司昏撓旁引寇讎既見貶於桐宫方謀危於漢閣皇運已殆何殊贅旒中國搖然非徒如線公赫然投𬒮匡救本朝復莒齊都平戎王室朕所以還膺寶厯重履宸居挹建武之風猷彰南史作歌宣王之雅頌此又公之再造於皇家者也應務之初登庸惟始三川五嶺莫不窺臨銀洞珠宫所在寧謐孫盧肇舋越貊為羣南史作災畨部阽危勢將淪殄公赤旗所指祅壘洞開白羽才撝凶徒粉潰非其神武久喪南藩此又公之功也大同之末邉政不修李賁狂迷竊我交愛敢稱大號驕聲陳書作恣甚於尉他據有連州雄豪熾於梁碩公英謨雅算電掃風行馳御樓船直跨滄海新昌典徹陳書作徹備履艱難蘇歷嘉寧盡為京觀三山獠洞八角蠻陬逖矣水宇南史作寓之鄉悠哉火山之國馬援之所不屆陶璜之所未聞南史作開莫不懼我王靈爭朝邉候歸賝天府獻狀鴻臚此又公之功也自冦虜清南史作陵江宫闈幽辱公枕戈嘗膽提劒折心陳書作推氣涌清霄神飛紫路陳書作闥而畨禺連率本自諸夷言得其朋是懷同惡公仗此忠誠乘機勦定執沛令而釁鼓平新野而據鞍此公之功也世道多艱方隅多難勳門桀點作亂衡山兵切池隍衆兼夷獠公以國盜邉警知無不為恤是同盟誅其醜類莫不魚驚鳥散面縳頭懸南土黔黎重保蘇息此又公之功也長驅嶺嶠夢想京畿緣道酋豪遞為榛梗路養渠率全據大都蓄聚逋逃方謀阻亂百樓不戰雲梯之所未窺萬弩各張髙墉陳書作輣之所非敵公龍驤虎步嘯陟風雲一作雲從風生山靡堅城野無強陳清妖氛於贛石滅沴氣於雩都此又公之功也遷仕凶慝屯據大臯乞活類馬騰之軍流民多杜韜之衆推鋒轉鬭自北阻南頻嵗稽誅實惟勍虜公坐揮三略遙制六竒義勇同心貔貅騁力雷奔電擊谷靜山空列郡無犬吠之驚藂祠罷狐鳴之盜此又公之功也王師討虜次屆淪波兵乏兼儲士有飢色公回麾彭蠡積穀巴丘億庾之詠斯豐壺漿之氓陳書作迎是衆軍民轉漕曽無砥柱之難舳艫相望如運敖倉之府犀渠貝胄顧蔑雷霆髙檻層樓仰捫霄漢故使三軍勇恱南史作鋭百戰無前承此軍糧遂殄凶逆此又公之功也若夫英圖邁俗義旅如雲湓壘猜擕用淹戎略公志唯同奬師克在和鵠塞非虞鴻門是會若晉侯之誓白水如蕭王之推赤心屈禮交盟人祇感咽故能使舟師並路逺近明心南史作逺邇崩心此又公之功也姑熟襟要崤函所陳書作阻慿寇虜據其關梁大盜負其扃鑰公五南史作一校裁撝三雄並奮右角沙潰左廣土崩南史作左賢右角沙潰土崩木甲殪於中原氊裘赴於江水他他藉藉萬計千羣鄂坂之隘斯開夷庚之道無塞此又公之功也義軍大衆俱集帝京逆豎凶徒猶屯皇邑若夫表裏山河金湯險固疏龍首以抗殿剪華嶽以為城雜虜慿焉強兵自若公回兹地軸抗此天羅曽不崇朝俾無遺噍軍容甚穆國政方修物重覩於衣冠民還曕於禮樂楚人滿道爭歸於葉公陳書作覩漢老銜恩俱歡於司𨽻此又公之功也天子內難南史作內難初靜諸侯出關外郡傳𤇺鮮卑犯塞莫非沮渠當户中貴名王冀馬迾於淮南胡笳動於徐北公舟師坐南史作步甲亘野橫江殱厥羣羝逐殫封狶莫不絓木而止戎車靡遺遇濘而旋歸駿陳書作驂盡殪此又公之功也公克黜禍難劬勞皇室而孫寧之黨翻啓狄人陳書作心伊洛之間咸為虜戍雖金陵佳氣石壘天嚴或作巖朝暗戎塵夜喧鉦鼓公三籌既畫八陳斯張裁舉靈鉟亦抽金僕咸俘醜類悉反髙墉異李廣之皆誅同龎元之盡赦此又公之功也任約叛换梟聲不悛戎羯貪婪狼心無改穹廬氊幕抵北闕而為營烏孫天馬指東都而成陳公左甄右落箕張翼舒掃是欃槍驅其玁狁長狄之種埋於國門椎髻之酋烹於軍市投秦坑而盡沸噎滍水而不流此又公之功也一相居中自折彛鼎五湖小守妄懷同惡公夙駕兼道秉羽杖戈玉斧將揮金鉦且戒妖冦南史作酋震懾遽請灰釘爇櫬以表其含𢎞焚書以安其反側此又公之功也賊龕凶橫陵虐具區阻兵安忍慿災怙亂自古蟲言鳥迹渾沌洪荒凡或虔劉未此殘酷公雖宗居汝頴世寓東南育聖誕賢之鄉含章挺生之地眷言桑梓公私憤切卓爾英猷承規奉算戮此大憝如烹小鮮此又公之功也亂離未久陳書作永羣盜孔多浙右凶渠連兵搆逆豈止千兵五校白雀黃龍而已哉公以中軍無率選是親賢姦寇途窮自豈止至途窮二十七字見陳書而南史及英華但云勢窮力蹙而已漼然氷泮刑唐陳書作溏又注作塘之所文命動其天陳書作大威雷門之閫陳書作間勾踐行其嚴戮英規聖迹異代同風此又公之功也同姓有扈頑凶不賓憑藉宗盟圖危社稷觀兵滙澤勢震京師威迫蠻夷陳書作驅率南蠻已為東帝公論兵於朝堂之上決勝於樽爼之間寇賈樊滕浮江下瀨一朝翦撲無待甸師萬里澄清非勞新息此又公之功也豫章祅寇依憑山澤繕甲完聚多歷嵗時結從連橫爰洎交廣吕嘉既獲吳濞已摐命我還師征其不恪連營盡拔偽黨斯擒曜聖武於匡山回神旗陳書作旌於蠡𣲖此又公之功也自八紘九野瓜割一作剖豆分竊帝偷王連州比縣公武靈已暢文德又宣折簡馳書風猷斯逺至於蒼蒼浴日杳杳無雷北洎丈夫之鄉南踰女子之國莫不屈膝拜手陳書作膜拜請陳書作求吏欵關此又公之功也京師禍亂亟積寒暄雙闕低昻九門寥豁寧秦宫之可視豈魯殿之猶存五都簪辨百僚卿士胡服縵纓咸為戎俗髙冠厚履希復華風宋微子麥穟之歌周大夫黍離之詠較於斯日未足為悲矣公求衣昧旦昃食髙舂興構宫闈具瞻遐邇郊庠宗稷之典六符十等之章復南史作還聞太始之風流重覩永平之遺事此又公之功也公有濟天下之勳南史作重加之以明德成性合道盛德符天南史作凝神體道合德符天用百姓以為心隨萬機以成務恥一物非唐虞之民歸含靈於仁夀之域上德不德無為以為夏長春生顯仁藏用忠信為寶風雨弗騫陳書作無愆仁惠為基牛羊勿踐功成治定南史作化合樂奏咸雲安上治民南史作御人禮兼文質物色丘園衣裾里巷朝多君子野無遺賢菽粟同水火之饒工商富猗頓之旅是以天無蘊寶地有呈祥潏露卿雲朝團晚陳書作曉映山車澤馬服馭金間陳書作登既昺煥於圖書方葳蕤於史牒髙勳踰於象緯積德冠於嵩華固無德而稱者矣朕又聞之前王宰世茂賞尊賢式樹藩長揔征羣伯二南崇絶四履遐曠泱泱東南史作表海祚土維齊巖巖泰山俾侯于魯抑又勤王反鄭夾輔遷周召伯之命斯隆河陽之禮咸備况復經營宇宙寧唯斷鼇足之功𢎞濟蒼生非直鑿龍門之險而疇庸報德寂爾無聞朕所以垂拱當寧載懷慙悸者也今授公相國以陳留等十郡六字南史作以南豫州之陳留南丹陽宣城揚州之吳興東陽新安新寧南徐州之義興江州之鄱陽臨州十郡封公為陳公錫茲青土苴以白茅爰定爾邦用建冡社昔姬南史作旦奭分陜俱為保師晉鄭諸侯咸作卿士兼其內外禮實攸宜今命使持節兼司空王通授相國印綬陳公璽紱使持節兼司空王㻛授陳公茅圡金獸南史作虎符第一至第五左竹使符第一至第十相國秩踰三鉉任揔百司位絶朝班禮由事革其以相國揔百揆除録尚書之號上所假節侍中貂蟬中書監印章中外都督太傅印綬義興公印䇿其鎮衛大將軍揚州牧如故又加公九錫其敬聽後命以公禮為楨幹律等䘖䇿四維皆舉八柄有章是用錫公大輅各一玄牡二駟以公賤寶崇穀疏爵待農室富京坻民知榮辱是用錫公衮冕之服赤舄副焉以公調理隂陽燮諧風雅三靈久降萬國和同是用錫公軒縣之樂六佾之舞以公宣導王猷玄南史作𢎞闡風教光景所照鞮象必通是用錫公朱户以居以公抑揚清濁褒德進賢髦士盈朝幽人虛谷是用錫公納陛以登以公嶷然廊廟為世鎔範折衝四表臨御八荒是用錫公虎賁之士三百人以公軌陳書作執兹明罰期在刑厝象恭無赦干紀必誅是用錫公斧鉞各一以公英猷逺量跨厲嵩溟混一作包一車書括囊寰宇是用錫公彤弓一彤矢百盧弓十盧矢千以公天經地義貫徹幽明春露秋霜允供粢盛是用錫公秬鬯一卣圭瓉副焉陳國置丞相以下一遵舊式往欽哉其恭循朕命克相皇天𢎞建邦家允興洪業以光我髙祖之休命唐王以相國揔百揆并九錫詔王言會最詔曰於戲惟爾假黃鉞使持節大都督內外諸軍事録尚書大丞相新除相國揔百揆唐王夫乾道貞觀四象所以運行坤德含𢎞萬有憑其載育是以天地交泰資始由乎聖人隂陽順成揔已歸其元輔故能陶甄百物代彼天工息四海之羣非迥回三靈之掩耀百揆時敘五典克從伊尹格于皇天公旦光於四表方諸蔑如也今將授王典册其敬聽朕命上天不造降禍于我國家髙祖棄盛業而升龍太上釋寶圖而委御王室如燬喪亂𢎞多數屬道消時鍾世季郊廟絶主有若綴旒則我祖宗之基已墜于地矣王應幽明之道從兆民之欲奉七璽於代邸飛六轡於周京此則綱我絶紀為有大造於皇家者也曩者塞表省方羣胡反噬矢流君側圍甚平城淪陷有期阽危莫恤王釋位同謀揔戎千里晨炊蓐食倍道兼行胸奴逺迹乘輿反正此又王之功也歷山飛稱兵燕趙妄假名號河朔響應山西屯結王道啓戎行大殱醜類此又王之功也夷狄貪婪屢犯關塞逼脅良善殺掠吏民王鞠旅治兵卷甲長騖追奔逐北掃地無遺此又王之功也威王徒黨潛謀逆亂外交邉裔內騁姦回實繁有徒將傾宗社王收戮凶渠罪人斯得此又王之功也四郊多壘三輔倒懸黃圖示宫闕之名赤眉劫園陵之禍凶荒仍嵗荆棘旅庭王投袂義舉星言電邁取霍邑若摧枯舉秦闕如反掌尅清河渭志存匡復此又王之功也北荒獯鬻事藉羈縻比者中原多故龍堆道絶王式遏有方􅍁關請吏更敦鄰睦復我舊藩此又王之功也汾晉地險逋逃攸聚山藏川量負罪稽誅類馬騰之乞活同嚴尤之盡赦王懷柔伏叛杖信示威交臂屈膝申其正旦此又王之功也河潼轉漕密邇關畿京坻委積由來尚矣羣凶保據一鼓而崩此又王之功也京師危逼姦臣放命異一象之居內同四凶之扇禍王大誓師旅興言感慨蕩清上國拯厥贅旒暴骨焚尸並勦羣惡此又王之功也上天貽愛莫甚乎民爰作聖哲弼于沖幼官守司存社稷有奉濟方割於下墊爍圓光於上墋此又王之功也唐弼凶豎草竊岐陽吞噬舊邦侵逼都鄙王制以銜䇿觀其携二新疑作親衆叛離我盡收之此又王之功也華陽黑水控接岷峨山川阻深盡為逋藪義風所麾行化江漢此又王之功也薛舉崇姦同惡相濟僣擬輿服滔天泯夏西土遊魂秦川肆毒赫斯授律咸俘醜類岐隴齊其京觀汧渭為之不流此又王之功也三蜀隩區一都之會夷民雜糅蠻陬荒梗王發一介之使降咫尺之書而靈關洞開劔閣無隘此又王之功也𢎞農甸服襟帶河洛鞠為寇場連城阻亂長䇿逺振不征而服此又王之功也王有濟天之勳重之以明德爰初發迹肇自鴻基峻極於嵩華潤連於溟渤體兹將聖道被如仁在物不失其宜含靈咸安其所春生夏長信及四時地平天成義兼一德揔萬機之務因百姓之心保乂我皇家𢎞濟其多難者也是以濟濟多士庶政緝熙穆穆四門要荒式敘敦澆風以勵俗暢和氣以調元神功侔於造化積德髙於垂象朕又聞之先王之宰世也尊賢尚德茂賞疇庸五侯專征九命作伯周襄光錫桓文是膺大啓南陽以表東海况今業冠伊稷功髙晉鄭酬勳蔑爾朕甚懼焉今進授相國以河內汲郡清河武安魏郡信都髙陽平原趙郡襄國通前二十郡增封唐國錫以黑土苴以白茅爰定爾邦用建宗社一作冡昔周邵分陜咸為保傳毛畢諸侯入作卿士內外之任禮實攸宜今授相國印綬唐王璽紱茅土金獸符第一至第五竹使符第一至第十相國體絶羣臣任揔百司朝班彛數宜與事革其以相國揔百揆去録尚書之號上所假黃鉞中外都督丞相印綬又加王九錫其敬聽王命以王繩紀禮度哀矜折獄罔不用情無或遷志是用錫王大輅戎輅各一玄牡二駟以王分地敦本民天是賴疏爵務農所寶惟榖是用錫王衮冕之服赤舄副焉以王風雅所被獯戎咸格隂陽順理遐邇宅心是用錫王軒縣之樂六佾之舞以王翼宣黃道義齊疑遐暢三才所運四海攸歸是用錫王朱户以居以王登賢命世褒德升朝思帝所難能官流詠是用錫王納陛以登以王正色持衡鎔範御下式遏姦宄蕩滌華裔是用錫王武賁之士三百人以王威同夏日厲等秋霜刑有其章寬而不漏是用錫王鈇鉞各一以王明罰信賞折衝無外是用錫王彤弓一彤矢百旅弓十旅矢千以王霜露履踐禋祀恭嚴天地幽通孝思至感是用錫王秬鬯一卣圭瓉副焉唐國置丞相以下官一遵舊式往欽哉祗奉大禮用膺多福以光我髙祖之休命可不慎歟文苑英華卷四百四十七
