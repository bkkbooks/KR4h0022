body:
  text: 文苑英華卷六百二十九宋李昉等編謝恩二謝弟授官狀四首謝兄加恩狀二首為子謝恩狀九首謝賜母國號狀一首謝除副使等狀一首謝賜將士等物狀五首謝兩弟移官就養狀張九齡右臣兩弟蒙恩移官就養老母感戴殊澤戰荷兼深臣山藪陋材豈堪國用日月私照謬掌綸言犬馬以地近見矜烏鳥以情至蒙福曲成孝理之賜莫知報效之所無任悚躍集作懼荷恩之至讓兩弟起復授官狀右臣昨以兩弟身名狀涉隱冒家且未正焉能正人所以陳露奏聞誠欲自律今日高力士宣勑令與兩弟京官慈旨優柔感深骨髓微臣何有叨此殊恩但臣自罹災殃集作殃罰才踰年序忝承重任不敢顧私而鞠育之恩終懷罔極几筵在逺奠酬不親唯有兩弟在家獲申情紀今若恭承恩命盡在墨縗將以集作何心何顔可偷此集作以偷責陛下每𢎞教義必先名節豈於愚臣不集作無少矜憫若使九臯等獲免罪戾幸無削除在臣闔門已霑殊澤更令授職俱逺哀次於臣私情實所不忍且於朝議必多集作有喧黷乞寢恩集作成命俯亮愚衷冀無玷大猷豈敢自遂而已不勝哀荷戰懼之至此是讓狀緣次篇謝兩弟授官故英華併入謝兩弟授官狀右臣伏奉昨二十日恩命授臣弟九臯殿中丞集作殿中大監九章太子司議郎臣私門積疊殃罰如昨日月逾邁禮及外除弟九臯等如臣常材集作加以常材比伏集作福哀疚瞻望未逺縞素集作練猶存非常之恩一朝㧾集慙惶哽咽罔識言次不知微命餘生何以上答集作報大造載悲載躍集作懼五情飛越不勝感戴戰悚之至為令狐相國謝回一子官與弟狀元稹右臣奉某月日勑以所賜臣一子官回與臣弟定授六字集作回授官弟定京兆府藍田縣尉者寵過憂深集作來恩殊感極倣徨自顧悚惕難居臣本實凡愚集作才猥當重任雖星辰軌道幸屬聖時嵗月環周實妨賢路未蒙罪退益自慙惶豈謂睿集作天慈仍加渥澤特降推恩之命曲成友愛之私九族生光百身集作年何報况藍山集作田美邑黃綬清流旋觀冉冉之趨倍慶怡怡之樂手足交抃形影相輝空鏤肝心難酬雨露無任抃躍感恩之至為晉公謝兄林宗為太僕卿狀苑咸右臣伏承今日恩制除臣兄太常少卿林宗為太僕卿明命自天惶忭一作怍無地臣兄每私門誓約公道為心務竭忠勤敢踰涯分豈謂陛下降中旨之詔假望外之恩拔自奉常正於群僕臣久居宰輔職忝進賢考盤之詩未能息詠葛藟之蔭先及本根渥澤既重於丘山光輝復聨於花蕚一門為幸九死何酬無任感戴惶悚之至為晉公李林甫謝賜兄衣服狀前人右臣今月某日中使郭全羽至奉宣聖一作恩旨賜臣兄太僕卿林宗紫衣一副并犀角集作腰帶及金魚袋恩出常倫一作非常榮超望表闔門捧戴喜懼失圖臣少遭閔凶早違怙恃兄弟素少形影相依幸遇休明俱霑官序且一身叨竊謬踐一作奉台衡闔門寵榮皆承天覆恩奬所及始望已過但兄林宗年力稍一作俱侵近嬰風疾常恐溘先朝露不報前期一作恩豈謂睿渥特深鴻私曲被河海重寄已叨集作荷命卿之榮章印崇班更承綬一作受服之賜慶流公族光照私門雖喜鶺鴒一作鳲鳩之詩終懼維鵜之刺無任喜懼感佩之至此篇五百九十二卷表門重出前已削去注異同為一作為晉公謝疑作讓男五品官狀右臣今日曲蒙聖恩處分仙客令與臣男岫五品并授外郎愚誠懇辭天鑒不察仙客承旨又已進官憂懼失圖不知死所臣幸承天蔭特荷殊榮無補涓塵常靦靣目至如邉城克捷狂寇肅清皆睿略玄通聖謀獨斷臣之遙統但有空名敢冒天功而為已力虛承厚委深是曠官况在頑童何議延賞假使天慈善誘宸眷曲臨變其服章已深榮幸更塵清奬何以自安且郎官之任朝廷俊選無人則缺不可虛授臣男岫性資愚戅無所能為臣實知之非為矯飾儻謬踐華省深纍聖朝必負黃童之才豈憚祁奚之舉知其不可敢乞收恩制命未行猶祈更寢無任懇欵之至謹冒死陳請以聞代王尚書謝一子官狀二首王仲周右臣素乏器能謬司方鎮敗公之責夙夜惟憂延世之榮雨露覃及顧老臣以增懼念童子以何知恩私忽臨負荷無力不勝惶恐屏營之至二臣某言伏見某月日制除臣男慿御史中丞捧讀綸音驚慙無據臣頃戰伐河北男亦隨身救援李忠頓軍易定屬陛下遷幸聞及河南臣留與論婚娶然得引軍關右堅保渭橋承算略於皇明摧凶醜於都邑事關聖運功匪衆人陛下特以微功録其小子年未登於弱冠官已及於中司若以忠孝而升且無往例若由臣闕授是紊國章臣初沐殊私即將陳讓但緣李忠在外方遏寇戎已行之恩難可追止柔逺之體或要順從勉承不次之榮益荷無窮之惠君親垂施並居踰等之官父子同心各獲捐軀之地不勝感荷屏營之至為人作謝子恩賜狀五首令狐楚右臣得進奏院狀報中和日伏蒙天恩賜臣男公敏內宴併賜前件綾羅三十匹銀碗一者臣伏以桃花始開蓂莢初吐陛下式崇佳節以慶仲春舞八卦於廣庭陳四詩於别殿道光在鎬義冠濟汾蓋所以勞徠勳賢昭明慈惠男公敏年方童幼智乏老成何殊一芥之微忽宴九天之上乳口而餐嘗鼎食青襟而陪列朝班越次之恩已深逾涯之賜仍及色絲成匹爛盈其箱篋白金為器皎映於杯盤澤流而九族皆榮信至而萬夫相慶生子如父無功則同知臣者君報德何日徘徊官次喜懼交并戎守有限不獲陳謝無任感恩結戀屏營之至二右臣得男公敏狀今月十八日中使王希朝到院奉宣聖旨緣臣男患耳賜絹一百匹以充藥直并遣醫人劉江診療者臣自受國恩已更嵗序其於功績絲髮未伸夙夜憂兢不知所處男公敏昨緣耳疾今赴上都素乏義方未能典謁豈意陛下惻隱之德俯加於纎芥敦睦之慈旁流于枝葉殊恩猥及渥澤曲臨特降醫工厚霑藥直雛犢之疾料即痊除君親之恩何可報效榮光燭於府舍喜氣溢乎閨門恩深命輕繼以感泣戎役有限未獲躬詣闕庭陳謝不勝感戴三右臣得進奏官趙履溫狀報中使姚文嵩到院奉宣進旨賜臣男公敏冬至節料羊酒麵等伏以愚臣在邉賤等螻蟻弱子兼疾微如塵埃豈意陛下施惠必均推恩皆及屬登臺以望之日降其出如綸之言錫香醪而滿壺頒肥羜以盈几伏自惟念不勝所蒙一門驚莫大之榮百衆賀非常之慶未知報效空積慙惶日月高明照臣忠懇所守有限未獲躬詣闕庭陳謝不勝感戴戀結之至四右臣得進奏院狀報前月二十九日中使某至奉宣進旨賜臣男公敏嵗料羊酒麵等臣自領北藩于今五稔曽無明略以奉大猷孤直愚忠未足報陛下萬分之一男公敏伏緣醫療勤赴京都尚未平除爰逢嵗節豈意翩蝐微物飛舞於東風靃靡輕生霑濡於春雨降少牢而頒賜迃中貴以宣傳麵起玉塵酒含瓊液鼷鼠飲河之腹聞以滿盈老牛舐犢之心喜無終極深恩似海𢎞覆如天寧唯感激一門實亦光明九族何階報答終日慙惶空將許國之身誓竭在邉之力所守有限不獲陳謝無任感恩抃躍之至五右臣得進奏院狀報二月二十九日中使某至奉宣進旨賜臣男公敏寒食節料羊酒麵等至二十一日中使某又宣賜麥粥餅餤者臣伏以天地之恩所加斯厚君臣之義有感則深臣自守近藩曽無薄效緣恩處義以月繫年男公敏未識憲章獲參班序每因令節又沭殊私班首之羊委其全體擢芒之麥散以輕塵粥既擬於瓊膏餤有同於萍實出為寵錫皆申上帝之心食以充盈莫匪小人之腹涓毫未展叨餮已頻常懷覆餗之憂有忝分甘之施茍仁之逮下微物敢讓於生成如澤或因臣瑣質何堪於負荷官守有限不獲陳謝無任感恩抃躍之至同前右臣得進奏院狀報今月九日中使李朝誠到院奉宣進旨賜前件節料麵肉等次十日中使徐智嚴奉宣聖旨又賜麥粥餅餤者寵榮便繁錫賚稠疊或陳於廊廡或貯在鐏壺酒可駕車麵疑經市而况屑杏實以為粥味甜於蜜卷牢肉以成餤規大於拳皆出御厨無非仙饌靣墻之目未曽窺見含糗之口忽此捧嘗恩逾涯分榮冠倫列在微臣而過幸日益憂兢念小子之何知無由答效身輕施重負荷難勝所守有限不獲陳謝無任抃躍之至為蕭相謝賜太夫人國號告身狀元稹恩賜臣母國號告身一通右今月日某乙奉宣恩旨賜臣母前件告身恩光灼耀捧戴兢惶對楊天休無任戰越臣家傳儒素母實劬勞每織履以資臣宦遊嘗斷織以勉臣師學念臣庸昧本望非高所希捧檄之榮敢萌集作思開國之慶陛下恩加望外簡自宸衷石窖封疆已光於萬葉蘃珠文字重降於九重朝野謂之殊私宗族以集作為之榮光臣及臣母以抃以歡誓將齋戒洗心永奉真人之誥緘縢在笥深藏大帝集作太常之符寶過金籯瑞同鵲印蓼蕭知感雨露難酬無任抃躍兢懼集作戴恩之至為榮陽公謝除盧副使等官狀李商隱新授某官盧戡新授某官任繕右臣得進奏官某狀報臣所奏盧某等二人奉某月日勑旨賜授前件官充職者臣謬當亷印合起幕庭撫魚罩以興懷懼羖皮之廢禮盧戡與臣同年登第少日論交學富文雄氣孤志逸玉清越而為樂女舒退集作脫以求媒實懷難進之􅒑不起後時之歎任繕幼學孝悌潔淨精微得君子之時中友鄉人之善者匪因請托實自諳知皇帝陛下俯照逺藩咸加命秩南臺貼職延閣分班使戡有紆朱之榮繕無衣白之見已經聖鑒可謂國華冀收規畫之功共奉澄清之寄不任感恩荷聖集作得賢之至為人作謝防秋回賜將士等物狀令狐楚右件將士中使朱孝誠監領某月日平安到太原其賞物並勑給付訖臣伏以受命以行人臣之節斯著及期而代君父之仁已深陛下愛育武夫綏懷猛士采薇遣戍既霑挾纊之恩出車勞旋又有分縑之澤才識家而競入俄拜賜以嵩呼盡忘征役之勞固感生成之德况臣叨居將帥獲沐恩波所守有限不獲陳謝為人作謝賜行營將士匹假并設料等物狀前人右臣得行營兵馬使李黯狀報伏蒙聖恩賜前件匹假設料者伏以懷生之類莫匪王臣有事之時唯聽君命今者天誅小醜恩施羣雄豈謂偏禆皆蒙賜賚需以飲食比肩而膚革充盈賁於束帛連袂而衣裳華楚空知飽德何以勝恩競堅摩壘之心爭竭拘原之力臣叨居將帥誓掃寇仇感戴屏營倍萬恆品為人謝賜行營將士襖子及弓弩狀前人右臣得兵馬使李黯狀伏蒙聖恩賜前件物等者伏以狂賊未平偏師在逺臣並全支器械厚給衣裝陛下念以戰爭矜其寒苦特頒星使猥降天波衣絮八蠶之綿暖如狐腋弓纒九牛之角徑若烏號頒及連營來從國府遙知被服皆不憚於兵鋒緬想操張盡一作悉將穿於虜骨歡聲感動勇氣蒸騰信山嶽之可移豈妖氛之足滅臣名叨將帥志掃寇讐沐恩澤而空深效勤勞而尚淺誓將忠懇以勵驍雄所守有限不獲陳謝為人謝賜天德防秋將士綿一作馳下同絹狀前人右臣今月七日中使朱孝誠至伏奉詔書兼宣恩旨賜前件綿絹等臣伏以武夫之用職在防虞壯士之心樂從征役陛下仁慈廣被渥澤旁流諭以功名賜之綿帛荷殊私而東拜悉有兼衣賈餘勇而西行若無逺道同將日力共振天聲臣猥守藩隅叨居將帥欣榮感戴實百恆情為人謝賜將軍官告狀右臣中使朱孝誠至伏奉詔命慰問臣并宣慰旨允臣所奏當使諸將官賜前件告身者寵命從天榮光溢路歡呼感戴皆不自勝臣素是懦愚叨居上將微誠空竭薄效未伸伏蒙陛下曲降天波俯加王澤華資清秩周及於百夫喜氣歡聲喧傳於一道家藏寶軸人受綸言三軍驚非次之榮萬井賀殊情之慶誓將苦節上答明恩謹準勑捧受分給訖臣與諸將等限以所守不獲詣闕陳謝無任抃躍之至文苑英華卷六百二十九
