body:
  text: 文苑英華卷四百九十七宋李昉等編禮樂議禮樂一道議沿革禮樂一道復樂一道議祭祀一道忠敬質文損益一道刑法上罷刑獄一道用刑寬猛一道刑法用舍二道折獄一道議禮樂白居易問禮樂之集作並用其義安在禮樂共理其效何徵禮之崩也何方以救之乎樂之壞也何術以濟之乎此卷禮樂門並於白居易凖備制科七十五門中摘取五篇其問答皆居易擬作對臣聞序人倫安家國集作國家莫先於禮和人神移風俗莫上集作尚於樂二者所以並天地參陰陽廢一不可也何則禮者納人於别而不能和也樂者致人於和而不能别也必待禮以濟樂樂以濟禮然後和而無怨别而不爭是以先王並建而用之故理天下如指諸掌耳志曰六經之道同歸而禮樂之用為急故前代有亂亡者由不能知之也有知而危敗者由不能行之也有行而不至於理者由不能逹其情也能逹其情者其惟宗周乎周之有天下也修禮建集作逹樂者七年刑措不用者四十年負扆垂拱者三百年龜鼎不遷者八百年斯可謂逹其情臻其極也故孔子曰吾從周然則繼周者其惟皇家乎臣伏聞禮減則消消則崩樂盈則放放則壞故先王減則進之盈則反之濟其不及而泄其過用能正人道反天性奮至德之光焉國家承齊梁陳隋之弊遺風未殄集作弭故禮稍失於殺樂稍失於奢伏惟陛下慮其減消則命司禮者大明唐禮防其盈放則詔典樂者少抑鄭聲如此則禮備而不偏樂和而不流矣繼周之道其在兹乎議沿革禮樂問禮樂之用百王共之然則歷代以來或沿而理或革而亂或損而興或益而亡何述作之迹同而得失之效異也方今大制雖立至理未臻豈沿襲損益未適其時宜將文物聲名有乖於古制思欲究盛禮之本集作旨審至樂之情不和者改而更張可繼者守而勿失具陳其要當舉而行對對臣聞議者曰禮莫備於三王樂莫盛於五帝非殷周之禮不足以理天下非堯舜之樂不足以和神人是以揔章辟雍冠服簠簋之制一不備於古則禮不能行矣干戚羽旄屈伸俯仰之度一不修集作循於古則樂不能和矣古今之論大率如此臣竊謂斯言失其本得其末非通儒之逹識也何者夫禮樂者非天降非地出也蓋先王酌於人情張為通理者也茍可以正人倫寧家國是得制禮之本意矣集作也茍可以和人心厚風俗是得作樂之本情矣蓋善沿禮者沿其意不沿其名善變樂者變其數不變其情哉得其意則五帝三王不相沿襲而同臻於理矣失其情則王莽屑屑習古適足為亂矣故曰行禮樂之情者王行禮樂之飾者亡蓋謂是矣且禮本於體樂本於聲文物名數所以飾其體器度節奏所以文其聲聖人之理也禮至則無體樂至則無聲然則茍至於理也聲與體猶可遺况於文與飾乎則本末取舍之宜可明辨矣今陛下以上聖之資守列祖之制不待損益足以致理然茍有沿革則願陛下審本末而述作焉蓋禮者以安上理人為體以别疑防欲為用以玉帛爼豆為數以周旋裼襲為容數與容可損益也體與用不可斯須失也樂者以易直子諒為心以中和孝友為德以律度鏗鏘為飾以綴兆舒疾為文飾與文可損益也心與德不可斯須失也夫然則禮得其本樂逹其情雖沿襲損益不同同歸于理矣復樂古器古曲問時議者或云樂者聲與器遷音隨曲變若廢今器用古器則哀淫之音革矣若舍今曲奏古曲則正始之音興矣其説若此以為如何對對臣聞樂者本於聲聲者本於情情者繫於政蓋政和則情和情和則聲和而安樂之音由是作焉政失則情失情失則聲失而哀淫之音由是作焉斯所謂音聲之道與政通矣伏觀集作覩時議者臣竊以為不然何者夫器者所以發聲聲之邪正不繫於器之今古也曲者所以名樂樂之哀樂不繫於曲之今古也何以考之若君政驕而荒人心動而恐集作動而怨則雖舍今器用古器而哀淫之音不散矣若君政善而美人心平而和則雖奏今曲廢古曲而安樂之音不流矣是故和平之代雖聞桑間濮上之音人情不淫也不傷也亂亡之代雖聞咸濩韶武之音人情不和也不樂也故臣以為銷鄭衛之聲復正始之音者在乎善其政和其情不在改其器易其曲也故曰樂者不可以偽唯明聖者能審而述作焉臣又聞若君政和而平人心安而樂則雖援蕢桴擊野壤聞之者必融融泄泄矣若君政驕而放人心困而怨則雖撞大鐘伐鳴鼓聞之者適足慘慘戚戚矣故臣以為諧人神和風俗者在乎善其政歡其心不在乎變其音極其聲也議祭祀問聖王立郊廟重祭祀者將以展誠敬而事鬼神乎將以集作欲裨教化而利生人乎又問近者敬失於鬼祭祀以淫禳禱者有僣濫諂媚之風蒸嘗者失疏數豐儉之節今欲使俗無淫祀家不黷神物省費而厚生人守義而不惑何為何作可以救之對臣聞祭祀之義大率有三禋于天地所以示人報本也祠于聖賢所以訓人崇德也享于祖考所以教人追孝也三者行於天下則萬人順百姓和此先王所以重祭祀者也臣又觀之豈直若是而已哉蓋先王因事神以集作而設教因崇祀以利人俾乎人竭其誠物盡其美美致於鬼則利歸於人焉故阜集作備其牲牷則牛羊不得不蕃矣豐其黍稷則倉廩不得不實矣美其祭服則布帛不得不精矣不畜者無牲不田者無盛則遊惰者不得不懲矣勤本者不得不勉矣四者行於天下雖曰事鬼神其實厚生業也故曰禮行於祭祀則百貨可極焉斯之謂矣然則禮物集作物力有餘則奢淫之弊起祀事不節則諂黷之萌生先王又防其然也是以宗廟有數豐約有度疏數有時非其度者則鬼不享而禮不容非其類者則神不歆而刑不舍二者行於天下則人與鬼集作神不相黷矣不相傷矣近代已集作以來稍違祀典或禮物失於奢儉或巫史假於淫昏追逺者昧從王之文徼福者有媚神之祭雖未甚弊亦宜禁之伏惟陛下崇設人防申明國典蒸嘗不經者示之以禮禳禱非鬼者糾之以刑所謂存其正抑其邪則人不惑矣著其誠謹其物則人厚生矣斯亦齊風俗和人神之大端也惟陛下詳之忠敬質文損益問忠敬質文百代循環之教也五帝何為而不用三王何故而相承將時有同異邪道有優劣邪又三代之際損益不同所祖三才其義安在豈除舊布新務與相反相異乎復扶衰救弊其道不得不然乎又國家祖述五帝憲章三王質文忠敬大備於今而尚人鮮朴而忠俗多利而巧欲救斯弊其道如何對臣聞步驟殊時質文異制五帝以道化三王以禮教道者無為無為故無失無失故無革是以唐虞相承無所改易也禮者有作有作則有弊有弊則有救故殷周相代有所損益也損益之教本乎三才夏之教尚忠忠本於人人道以善教人忠之至也故曰忠者人之教也忠之弊其人野救野莫若敬故殷之教尚敬敬本於地地道謙卑天之所生地敬養之故曰敬者地之教也敬之弊其人鬼救鬼莫若文故周之教尚文文本於天天道垂文而人則之故曰文者天之教也文之弊其人僿救僿莫若忠然則三王之所祖不同者非欲自異而相反也蓋扶衰救弊各隨其運也運茍有異教亦不同雖忠與敬各繫於時而質與文俱致於理標其教則殊制臻其極則同歸亦猶水火之相形集作盩同根於冥化共濟於人用也寒暑之相代同本於元氣共成於嵗功也三王之道亦如是焉我國家欽若五帝憲章三王典謨不易之道祖述而大用忠敬迭救之教具舉而兼行可謂文質協和禮樂明備之代也然臣聞之孔子曰殷因於夏禮周因於殷禮損益始終若循環然其繼周若百代可知也臣觀周之弊也爵賞黷刑罰窮而秦反用刑名祚因中絶及漢雜以霸道德又下衰逮于魏晉以還未有繼而救者是以周之文弊今有遺風故人鮮朴而忠俗猶利而巧伏惟陛下以繼周為已任以行夏為時宜稍益質而損文漸尚忠而救僿斟酌於教曲緯其人使瞻其集無其字前而道繼三王顧於集無於字後而光垂萬葉則盡善之道大同之風不専美於上古矣刑法上罷刑獄北齊天保八年策秀才問帝王之柄賞罰為首雖三代損益百代可知未有舍此二途而能𢎞風闡化聖賢為治咸出斯道明獄訟之來非關叔世孔子三日而誅少正卯太公下車而戮華士康王疑作誥文王作罰刑兹無赦明措刑由於用刑非去殺而刑清也然子産相鄭唯殺一人子文治兵刑遂無用伯禹引罪自歸武王見辜而泣雖政治不殊而理亦相反朕恭臨萬國祗御兆人視之如傷有同赤子未能以理代刑舍其律憲亦輕罰緩死漸就蠲除去凝脂之網收刺骨之怨臨麥秋而生惆悵望窮冬而載懷思使畫服象刑同唐虞之世罷獄息罪等成康之時循酷俱治宜有辨析誠有未遂想望其中對李德林對逖聽風聲企踵文武未之逮也而有志焉大道之行結繩而治無德之世有罪更慙殆是天愛昔人唯令設教神化一作仇末俗要須密網又豈淳風已降同往者之不追澆法自然遂確乎而不變然而成康之衆逮幽厲而為燬嬴項之人至文景而刑措方知桀紂居羲昊之世亦比屋可誅勛華處桓靈之時即垂衣而治唯應宣尼去殺必期之以百年周人太平會資之以三世我國家之殺龍斬蛇斷鼇獵雉牧羊驅雞之法烹鮮放馬之功莫不因冥冥之心受蒼蒼之命十軒九舜千堯萬禹抑特揚榷俱何足稱至於約法憑威行師用武怨起後征之地哀切自犯之辜故上下千官遐邇兆庶風化之所遵逹政教之所抑揚皆肅肅然若嚴刑之在側矣但臯陶之類常問黃沙定國之流恆持丹筆分陕有棠陰之德剖符致蒲鞭之美梁獄決疑不假陶朱之璧楚國以理無用莊生之金稍簡刑書漸行禮教使駃騠逺至懸感仁心獬豸來儀不知所觸然後升東嶽而揖羣后望西方以謝聖人復何如也謹對用刑寬猛問獄市之寄自昔為難寬猛之宜當今不易緩則物情恣其詐急則姦人無所容曹相國所以殷勤路廷尉於焉太息韋弦折衷歷代未聞輕重淺深佇承嘉議對上官儀對攘袂九流披懷萬古覽七書一作玉籙之奧義覿金簡之遺文覩皇王臨御之迹詳政術樞機之旨莫不則乾綱而張禮樂法霆震而置威刑縱使軒去鼎湖非無涿鹿之戮舜辭雷澤遂有崇山之誅自臯陶不嗣怨疑生長往甫侯設法徒有説於輕重子産鑄書竟無救於衰敗是知風淳俗厚草艾而可懲主僻時昏黥鑿而猶犯我君出震繼天承國一作圖宰化孕十堯而遐舉吞九舜而上征猶以為周書三典既疏逺而難從漢律九章已偏雜而無準方當採韋弦於往古施折𠂻於當今若能詔彼刑章定金科之取舍徵其張趙平丹書之去留必使楚國受金不為莊生所責長陵盜土必用張子之言謹對刑獄用舍問玄默垂拱理歸上德法令滋彰事鍾澆季是以唐虞畫象四罪而咸服姬夏訓刑三千而愈擾故知勝殘去殺必在於𢎞仁反朴還淳不務於多辟一作不勝於羣惡方知削兹三尺専循五禮幸陳用舍之宜以適當時之要對張昌齡對兩儀亭育蓄嚴刑於積陰四氣平分降明罰於秋序是知觀象設教聖人所以勝殘因物造端懿后由其立辟故媯川受命士師陳九德之歌瑶山載刑吕侯訓百鍰之典然則激揚神化鼓舞皇偕疑資粉澤而𢎞風俟德刑而振俗是故六轡在御飛龍之駕可期九罭不施奔鯨之害斯兆縱使業優卷領道邁橧巢齊飲啄於鶉居絶往來於犬吠猶未可長懸三禮永擯五刑削兹噬嗑之科専行忠信之薄况今時推纂聖運屬升皇猷猶勞丹浦之誅尚漏青丘之罪伯夷典禮與猾夏而同科司冦祥刑共春官而聮事自可逺稽九代近命三驅釋刀鋸於凶魁休甲兵於原野然後施疑作弛威象闕展事天宗繼美媧皇追風火燧石渠未滅豈待一作得輒議寢刑中嶽既封自可専循大禮謹對同前郝連梵對法星垂象列九霄而照燭習坎分爻疏六位而輝煥故有皇王慎罰正俗以經時聖哲祥刑開物而成務莫不克清函夏載穆黎元制天討之威嚴𢎞秋官之典憲舜遊媯汭乃去四凶湯出鑣宫驟除三靣然則質文異代興廢殊途微禹會昌仁流於下泣獨夫受戮禍招於剖心自運往道消淳離朴散王風不競菀栁之刺斯聞后德方衰杞疑作棘槐之刺疑作制斯闕望夷招敗酷甚凝脂函谷生災寃多精氣雖復蕭何改創爰始九章溫舒上言仍譏一失網漏吞舟之罪主茍持寬律加盈閣之繁吏還舞智邈乎遺法允屬升平大唐執紀先天凝圖王氣化軼胥庭之上功超出疑驟之前掃氛祲於乾樞靜囂塵於地軸紫微君聖時乘光於得一黔首安生日用陶其吹萬皇帝上元統厯下武嗣徽道叶順風契黃神之罔象精通就日符赤運之文明於是職列英竒朝班俊乂載升降之節既著禮容臨甲乙之科方在政辟道無為以端拱思有罪而責躬念向隅之獨嚬乃納隍而軫慮曲詢管庫取薦芻蕘誠宜妙簡平反旁求庶獄渭橋驚馬必歸張季之言禁圍射兔勿爽高柔之旨于公隂德委以廷尉之司盛吉深仁授以憲曹之任剖符寄劉寬之輩蒲鞭之教可追分陜趨召奭之儔棠隂之德斯在加以五詞咸備兩造兼持運靜躁於韋弦聽遲速於寬猛獬豸雖觸咎繇行其惠化蒼鷹輟號郅都息於煩苛自然圄犴空虛靡怨黃沙之罪鉗釱安用無施白粲之刑則迹邁成康道逾文景不仁自逺無得而稱謹對折獄之理問大道未隱教而不誅比屋可封畫象無犯是知金科玉條不制淳厚之俗嚴刑峻法定施交喪之年皇家化軼無為德高邃古棄叢棘而去嘉石投丹筆以廢黃沙願言此道則防萌之術無寄茍違斯理則削觚之化闕如且齊國遺冠楚人封府肆眚之制無復前聞欲擯多幸之心便復作解之義用舍之要咸宜具舉若其法術之興非無首倡律令之起固有厥先何王絶鋸鑽之科何帝易肌膚之痛方知折獄之理宜一作庶詳先代之規幸可縷陳故實無為毛舉而已對張處信對五材遞用前聖因而設刑四象代興往賢則而為治所以明弼五教敬成三德為安上之鞭策作御下之隄防粉黛帝猷脂澤王化故軒皇六禁設言而不違媯帝三居畫象而無犯既而末代多僻亂政滋章網密凝脂文深刺骨威逾夏日苦烈秋荼或酷甚棄灰或刑深盜土遂使棘林之下鬼哭呈祅一作日聞函谷之前寃魂表畛疑雖漢文易肌膚之痛孝景減鞭朴之科竟未革弊除煩焉能救焚拯溺方今膺期千載保業重光表至德以泣辜布深仁於解網敬刑若祭重獄如傷誠宜削季業之慘科襲至安之有美自可駕三皇而騑五帝超千古而籠萬方欲廢彼黃沙赦兹丹筆眷言斯理蒙竊惑焉何者德刑遞施寬猛相濟是知明君至乂不獨任於詩書哲后欽明豈専行於禮樂此乃殺以止殺刑期無刑綿絶代而不渝邁終古而無替愚謂擯蒼鷹之酷吏棄乳虎之屠伯然後舉臯陶而作士命隨會以守官則內盜自奔不仁斯逺自然防萌之術無闕削觚之化有餘豈止封府之赦不施遺冠之宥無設用舍之義夫何足疑且律之興其來尚矣蓋三光列景法星麗乎天文六位成形習坎彰於易象爰洎二負見山海經初沿維縶之科降及四凶始受殛流之罰及庭堅翼舜獄律遂此陶情蕭相佐劉甲令於焉刻意至如鋸鑽之絶班固書而可知肉刑之興孫卿論而已備謹對文苑英華卷四百九十七
