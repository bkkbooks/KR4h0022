body:
  text: 文苑英華卷四百七十六宋李昉等編䇿問二十八道中書試進士䇿問二道吏部試上書人䇿問三道䇿問明經八道道舉䇿問二道𢎞文崇文生問一道禮部䇿試進士問五道又明經䇿問七道貞元十三年中書試進士䇿問二道權德輿第一問問先師之言辨君子小人而已勸學則舉六蔽咸事則稱九德推其性類又極於是矣孟軻之數聖者有清有和文子之言人位上五下五列夷惠於天縱頗有所疑况牛馬於最靈豈為至當班固之古今表劉邵之人物志品第乖逆集作忤或鈎托纎微誠有可觀恐未集作非盡善既強為已之學必有析理之精敬俟嘉言以祛未逹第二問問乃者西裔背盟勞師備塞今戎王自斃邉遽以聞而議者或曰因其喪而弔之可以息人或曰乘其虗而伐之可以闢地或曰夷實無厭兵者危事皆所以疲中國也不若如故是三者必有可採思而辨之元和元年吏部試上書人䇿問三道前人第一道問天下理本繫於朝廷乃者夏州阻命益部干紀皇帝神武制勝指期致誅二方晏清九有貞觀紀律載新於耳目爵命畢集於勳賢內修八柄外𢎞九法教理刑政之要制軍詰禁之宜使人皆嚮方兵不復用一其禮俗以致和平酌於古而行於今舉其大而遺其細佇逹聰聽子其昌言第二道問聖人虛心思天下之理至矣求天下之士勤矣搜於中林縻以好爵者往往至焉君子澡身聚學被褐藏器方伯上薦賁然而來與夫充賦計偕者異而論也其何以佐理道陳嘉猷去徭戍而徼塞無虞减農征而財用不乏子集作固所藴積悉期指明第三道問四方之人萃於選部六品以下繫有司積資者豈盡獲吏能考言者或見遺敏行一日之鍳固不能周四方所稽亦慮未盡近日甸內逹於海隅命官親人利病所屬欲使舉皆稱職吏必首集作當公則輪轅適宜鰥寡受賜企聞體要一二言之䇿問明經八道左氏傳第一道問魯史之文先師用明於王道漢武之代左氏不列於學官誠義例之可觀集作徴終誣艷而多失鳳凰啓兆陳氏不得不昌鸜鵒成謡季氏不得不叛既未然於前定於立教而謂何同耻釋經豈其如是夏五之闕雖繫月而何嫌艮八之占於兼山為何象因生因諡未詳命氏之殊德命類命請數制名之義集作一生既充賦無辭說經禮記第二道五經明經𢎞文崇文生同問冠婚成人著代之義一獻之饗舅姑先降以奠酬三加彌尊母兄皆拜而為禮責婦順而則可於子道而謂何一與之齊終身不改而夷狄有問服二姓之合為重而孔門多出妻蹈白刃或易於中庸引重鼎奚列於儒行裼裘襲裘之制繼别繼禰之差生既講聞佇觀詳辨周禮第三道問周制六官以倡九牧分事任之廣計名物之多下士吏胥類頗繁於冗食上農播殖力或屈於財征簡則易從寡能理衆疑宋母之失實豈周公之信然今欲舉司徒之三物教賔興之六藝又慮樂舞未通於韶濩徒玩干旄鄉射有昧於和容務持弓矢適廢術學豈資賢能至若六變八變致神祗之格天産地産有禮樂之防忝二春官企聞詳說周易第四道問作易者其有憂患乎又曰樂天知命故不憂鼓天下之動者存乎辭又曰吉人之辭寡寂然不動則感而遂通見幾而作乃不俟終日豈各有所趣幸備言其方至若巽之於人為廣顙白眼坎之於馬為美脊薄蹄誠曲成以彌綸何取象之鎖細佇聞體要然後忘言尚書第五道問堯之文思也命羲和四嶽敬授人時其道巍巍矣舜之登庸也則流放竄殛考績黜陟熙帝載而亮天工者二十有二人其理昭昭矣至禹則别九州導九河分五服建五長辛壬癸甲荒度土功其勤云云矣夫以陶唐虞夏皆聖人也而勞逸斯殊豈時不得不然復道有所不及何事功𤣥德煩簡相去之逺耶願聞其說毛詩第六道五經明經同問三綱之道有君臣焉有父子焉周南召南以風化于天下關雎鵲巢乃首於夫婦舉后妃曷若先天子美夫人曷若稱諸侯豈自邇而及遐將舉細而明大又太師所採孔聖所刪以時則齊襄先於衛頃以地則魏土褊於晉境未詳差次何所後先一言雖蔽於無邪六義乃先於譎諫既歌乃必類何失之於愚理或出於鄭箋言無憚於匡說穀梁傳第七道問褒貶之書宣父約於史氏清婉之傳卜商授於門人經有體元且無訓說日稱夜食頗近迂異徴秃眇之修聘聚綦輒之方言晉大夫奚俟於偕行衛公子豈名其天疾隱居攝以崇讓鄭討叛以滅親未曰申邪寧為積慮鄒氏夾氏學既不博集作傳尸子沈子復為何者鄙夫未逹有佇嘉言論語第八道明經𢎞文崇文生同問子曰君子無終食之間違仁又曰仁逺乎哉則子文之忠文子之清由也之果求也之藝皆曰不知其仁豈盡非君子耶胡為乎登夫子之門而稱齊楚之賢大夫也其愚如愚寧武與顔生孰愈三思三省季文子與曽子孰優虞仲隱居以放言下惠辱身以降志頗殊取捨皆曰逸賢探索精微當有師說道舉䇿問二道南華經第一道問安時處順泊然懸解至人之心也故曰材全而德不形又曰休影息迹與夫五漿先饋履滿户外者固不侔矣然則以紀渻之養雞痀僂之承蜩匠石之運斤梓慶之削鐻用志不分移於教化則萬物之相刃相靡者悠然而順暗然而和奚在於與無趾無眼之徒支離形德然後為德耶願聞其說通𤣥經第二道問文子𤣥虛師其言於老氏計然富利得其術者朱公疑傳記之或差何本末之相逺人分五位智辨居忠信之前體包五藏耳目乖肺肝之中皆何故耶當有其說至於積德積怨實昧其圖上義下仁願聆其㫖大辨若訥大道甚夷豈在顛之倒之使學者泥而不通也𢎞文崇文生問一道問鄊賦國庠已有定制又闢兩館以延諸生蓋砥礪貴遊而進之於學也二三子江夏童年頗聞岐嶷舞雩春服皆已鮮明雖異賔興亦稱講業於經書所好何句於古哲所慕何人兼陳從政之方用辨保家之美貞元二十一年禮部䇿問五道第一道問古之善為政者在得人而已在求理而已周以功德詔爵祿秦以農戰居職員漢武帝詔察茂異可以為將相者夫功與德非常才所及也農與戰非筮仕所宜也安危注意之重非設科可俟也是三者固有利病幸錯綜言之又三適之宜九品之法或計户以貢士或限年以入官事有可行法有可採制度當否悉期指明第二道問夏殷周之政忠敬文之道承弊以救始終循環而上自五帝不言三統豈備有其政或史失其傳嬴劉而下教化所尚歷代相變其事如何豈風俗漸靡不登於古復救之之道有所未至耶國家化光三代首冠百王固以忠厚勝兹文弊前代損益佇聞討論遽數之中所希體要也第三道問古者士足以理官業工足以備器用啇足以通貨賄而農者居多所以務三時之功有九年之蓄用阜其業實藏於人乃者惰游相因頗復去本今皇帝勵精至化在宥萬方德音聖澤際天接地凡𢎞於理道者無不至也裕於齊人者無不被也而又詢吏祿公田之制稽財征𣙜管之宜使羣有司質政損益庶官匹士皆得上言衆君子躬先師之儒生盛聖之代佇兹嘉話當薦所聞第四道問昔伊尹酒保傅說胥靡竟昌殷道以阜王業春秋時觀丁父彭仲爽申卻之俘也克州蓼朝陳蔡楚邦賴之漢廷韓安國徒中拜二千石張釋之以資為郎並稱名臣焯叙前史然則俘徒作役或財用自發前代取之而得人如是魏晉已降流品漸分筮仕之初率先文學或薦賢推擇皆秀發州閭而致理之風頗未及集作反古豈朴散寖久或求之大精其故何也集作斯故何也常有所憤集作常有所懵今四門大闢百度惟貞執事者固欲上副聰明悉搜才實幸酌古道指陳所宜第五道問言身之文也又曰灼於中必文於外司馬相如揚雄藉甚漢廷其文盛矣或奏琴心而滌器或贊符命以投閣其於溺情敗度又奚俟集作事於文章耶至若孔融禰衡夸傲於代禍不旋踵何可勝言兩漢亦有質朴敦厚之科亷清孝順之舉皆本於行而遺其文復何如哉為辨其說明經䇿問七道左氏傳問一道問春秋者以仲尼明周公之志而修經丘明受仲尼之經而為傳元凱悅丘明之傳而為注然則夫子感獲麟之無應因絶筆以寄詞作為褒貶使有勸懼是則聖人無位者之為政也其於筆削義例豈皆用周法耶左氏有無經之傳杜氏又錯傳分經誠多艷富慮失根本既學於是頗嘗思乎禮記第二道問大學有明德之道中庸有盡性之術闕里𢎞教微言在兹聖而無位不敢作禮樂時當有聞所以先氣志然則得甫申之佐猶曰降神處定哀之時亦嘗問政致知自當乎格物夢奠奚歎集作難非於宗豫必若待文王之無憂遭虞帝之大德然後凝道孰為致君爾其深惟以判其集作斯惑周易第三道問潔净精微研幾通變伏羲重其象文王演其辭設位盡通於三極修德豈惟於九卦何思何慮既宜以同歸先甲先庚乃詳於出令儉德避難頗殊蹇蹇之風趨時貴近方異謙謙之吉窮理盡性之奧入神致用之精乾元用九之則大衍虛一之數成性有存存之道知幾窮至至之原此所講聞試陳要集作崔略尚書第四道問洪範之美大同也曰子孫其逢吉數五福也曰考終命皆其極致也至若允恭克讓而生丹朱方命圮族乃産神禹何吉凶之相戾也金縢請命方秉圭以植璧元龜習吉乃啓鑰而見書豈賦命之可移也絶地天通未詳厥理血流漂杵何乃溢言待問而來幸集作宜陳師說毛詩第五道問風化天下形於詠歌辨理代英華作治世非之音厚人倫之道弼鄘褊小尚列于篇楚宋奧區豈無其什變風雅者起於何代動天地者本自何詩南陔白華亡其辭而不獲谷風黃鳥同其目而不刋舉毛鄭之異同辨齊魯之傳授一有正字墻面而立既非其徒解一有人字頥之言斯有所望榖梁傳第六道問榖梁名經興於魯學劉向闕稱於漢朝或貶絶過深或象類無據非立異姓乃以闕滅成文同乎他人豈謂齊侯之子異類頗甚後學景從諱親諱賢當舉其例耳理目理幸數其言何詞所謂近於情何義所謂失於短凡厥師授為豫明之論語第七道問夫子以天縱之聖畏匡厄陳行合神明故集作固久於丘禱將行理道奚矢於天厭對社栗之問宰我强通歎山梁之時仲由未逹季氏旅岱冉求莫救皆見稱於逹者或才比於具臣嘗肄善言顧多滯義末卷載游夏之事終篇紀舜禹之詞頗疑不倫可以敷暢文苑英華卷四百七十六
