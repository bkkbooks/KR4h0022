body:
  text: 文苑英華卷一百十九宋李昉等編寶五絲帛一珊瑚樹賦一首碎琥珀枕賦一首通犀賦一首琥珀拾芥賦一首不寶金玉賦一首蜀江春日文君濯錦賦一首回文錦賦二首臨風舒錦賦一首海人獻文錦賦一首珊瑚樹賦仲子陵珊瑚生矣于彼滄溟稟精於天地之氣擢秀於魚龍之庭含九泉之滋液冠百寶之神靈在涅不緇既同象玉之潔有枝無葉亦如貝樹之形當其萌芽欲成根柢初結同堅冰之有漸類隂火之潛爇瓊枝碩茂鐵網森列貫纎目而玲瓏映重泉而昭晰海人於是方舟以進拭目而觀牽夫密網出彼清瀾潤奪白虹之氣光連赤玉之盤厥價伊何有逾於琥珀其色則爾取類於雞冠及夫漢帝思仙神君降質堂惟大小帳有甲乙植以珊瑚之樹綴以明珠之實何幽茂以陵秋獨青蔥而照日亦有王家貴戚石氏財雄爭豪世上使氣胸中視珊瑚之若芥運如意以成風彼植之為貴此碎之又何謂諒無補於經綸徒見稱於祥瑞今也聖人御天所寶惟賢斂雲物之容不書於策斫珠玉之脛而沉於泉車有龍首鸞衡不以珊瑚為柱馬有乘黃兹白四字見文選曲水詩序不以珊瑚為鞭故雖古人之所貴獨吾君能捨旃碎琥珀枕賦以良藥是資竒物非寶為韻獨孤授琥珀為枕兮可保而持欲加首兮金瘡是資况無用於寢戈之日固非全於枕轡之時在寶難求不藉金之堅也其脆易破無勞斧以斫一作斯之豈為我寶用安爾止况將展轉之狀用救通中之痏分好惡於千歲之姿定剛柔於一人之捶莫投金柱相如之璧則非不隕霜鋒子雲之珍焉是夫其鏗然始解發耀騰暉定錙銖詎論乎大小考多少未極乎精微異色旁分兮渙然冰釋虹光中裂兮溘爾星飛然後霞彩斷角勢違豈同摘玉之流去彼取此殊異毁珠之日辨是與非美夫節彼用物視其豐約始如席上之珍忽碎封中之藥念刮骨之痛爾將束手於無為在抗首一作道之時我則曲肱而奚若故逺於患無或不良扣兩端兮乍疑分寶摧一角兮尚可含章在目無全似假庖丁之術應手而碎不同石氏之強誰謂大道不寶吾道則屈固非合散之流不是羣分之物假以衒將疑為美絶代稱竒昔為永堅之好今傷善價之儀偕苻氏之堅名果遭貞石同五鹿之神角或遇金槌猶能動彩熠熠馳精杲杲難分走海之靈尚認沙洹之寶徒美夫棄其異而斥其好曽不知失其枕而獲其道通犀賦以溫潤而澤厥文自然為韻王損犀有異角其名通天外徑挺以孤聳內清明而自全匪刻匪雕既含章而無隱如追如琢一作瑑亦通理於未然當其逺徴搜備琛賮得自烏弋之野斷以龍泉之刃瑟兮素理如線之狀既呈灼爾清光似玉之开疑作形方潤豐下鋭上勢圓質峻倘成象以表竒必駭雞而取信明徴以驗分剸是資美勝截肪之日珍逾剖蚌之時素光的的而中貫玄彩規規而外滋良玉無瑕既呈竒而異矣白圭有玷將配美兮逺而故其分堅貞比金石光通上下色潤膏澤透掌而纎粟必分窺天而秋毫不隔況本精粹蓄絪緼依稀象物皎潔成文或似雙魚伏緑水而鬐鬛皆見偶成孤鶴翔碧霄而羽翮斯分則知變態不恆衆美難越契人情之用矣豈天意之貽厥故能貞而不變明而不昏粲竒文之炯炯暢美質之溫溫則貝有文兮不必為異羲列卦兮何足而論究其所然徴其所自雖常情難得之貨蓋造物偶然之意何異夫筆誤點而狀蠅蟲食菜疑作葉而成字若然者則文犀之美故不足為瑰異琥珀拾芥賦何據天地之根孰知其源倐而化化歘爾存存琥珀拾芥鳳形精蕞物之冥會出乎意外於是氣以冥合物猶化造礎因雲以積潤燧取火而就燥伊琥珀之為珠亦鳳形而吸草既璀錯以瓊豔又熒煌而金藻爾乃探其至賾持其自然手與心愜視與目全美寶擢色以臨矣飛芒乘虛而附焉此見幾而作間不可省彼因感而應道不可傳故能異質吻合殊途玄通播形的皪透影玲瓏似乎月含桂以貞明泉泛籜而映淨雲發彩於虹玉竹乘隂於鵲鏡虞都尉見而言曰昔者楓丹崖綺松翠山衣膏淪甘壤珠孕清輝全其真詎蜂巢之所僭守其朴寧鶴卵之能希進乎潔已一薰一蕕而並採德以繄物拾蕭拾艾而同歸且珠之於寶也至貴芥之於草也至微不以貴而黜菅蒯不以寶疑作微而替葑菲君無謂我腐為螢有耀君之經是照君無謂我弱為舟有徴君之流可乘物猶尚爾人亦諒只若太初之偶蒹葭長公之俯青紫生芻對如玉之容芳荷被懷琰之士則珠豈草以相期芥得珠以成美吾乃今知然乎至矣不寶金玉賦以君子立身無利財賄為韻蔣防聖哲之人含道德以自貴逺瓌竒而不珍被褐所懷上恃慈儉以為主作礪於用下推忠信以為臣俾得各歸於其璞庶將靡失於其真異彼滿堂且由乎知足殊夫潤屋焉藉以發身慮知損而賈害比行妨而賤賄寧因衆口以鑠自絶匹夫之罪當令與土同價誰重一籯念其將石俱焚奚誇陸海塞淫奢之路彰亷潔之徒諒縱橫而抵鵲豈鎔範以為符抑好貨之心自家刑國秉不貪之志雖有若無顧毁櫝兮則那念稱穴之可恥獻而辭也足愧彼宋人欲乃攫之誠一作誡書乎列子還兹磧礫之內宜彼巖巒之隈類亞父之碎斗鄙昭王之築臺虛而盈將以禮義為器藏諸用何須府庫之財靡近取於藍田詎逺求於林邑却玲瓏兮塵翳守清淨兮氷立或黃或白得之而必捐如錫如圭踐之而不拾空韞石以自晦孰披沙而強分苦受欺於田父嗤冒賞於商君執固窮以去奢視同纍塊喻至富於來學輕如浮雲於是國尚親仁民從棄利戒多藏於百貨思寡欲於萬類所攻惟善寧採之于荆山所揀惟賢任雨之於秦地蜀江春日文君濯錦賦張何粵惟姑洗應律勾芒御辰鴈橋風暖犀浦花新疊嶂縈郭長楊映津軒車照地士女驚人風土堪樂山川可珍歲時不殊於荆楚形勝有類夫咸秦晚景彌秀晴江轉春即有卓氏名姝相如麗室織回文之重錦豔傾國之妖質鳴梭靜夜促杼春日布葉扶踈安花巧密寫庭葵而不欠擬山鳥而能悉績縷嫌遲嚬蛾慕疾乍離披而成段或煥爛而成匹言濯春流鳴環乃出於是近深沉傍清泚朱顔始映珍篋方啓其始入也疑芳樹影落澗中少將安焉若晴霞色照潭底奪五雲長風未散泫一作勝百花微雨新洗爾乃曝林崖出泉洞遲日徐轉和風緩送稍變回鸞全分舞鳳戲蝶時繞嬌鶯欲弄乘春景而方收俟王正而入貢懿其彩色足重鮮明可嘉青為禁桞紅作宫花能使御疑作飾尉榮障夫人飾車郎官居而列宿郡守衣而還家若夫齊紈之與楚練豈非細縠之與輕紗回文錦賦以文思精絶今古傳賞為韻張仲素昔竇滔之于役從軍伊少婦兮玉潔蘭薰對鳴機以抽恨織美錦而成文攢萬緒之荏苒揉衆綵之絪緼腸迥而緑字初結髮亂而青絲共棼萋兮斐兮常屬思於黃絹不日不月長寄懷於碧雲其始也軫蕙心蓄藻思披流黃之渥彩等後素之繪事循環而覽夫言豈一端宛轉而求則韻皆居次寫别既久怨心有盈錦霞駮而增麗詩綺靡而緣情自發於巧心素手何慙於墨妙筆精當其用寄逺方臨風載閲迹類雕蟲文如委纈既連珠而復貫又通理而不絶居人言念緘萬恨而在中君子置懷字三歲而寧滅是繹是尋攻乎織紝宛而成章見色絲之麗永以為好表美人之心儻或以新而代故豈殊陋古而榮今黼黻不同愁閲目而等耀彩章自異懼讒口之見侵況復委篋多年化塵千古方爛兮如在復燦兮可覩藻豔波旋環回輻圓藴四愁而難解煥五采以相鮮猶或踰繡段勝彩箋貴以文自奪鴛衾之價贈乎逺無勞雁足之傳且物在人亡留思長想謂其文之著也可卷而懷謂其製之貴焉乃攄而賞若知七襄之非匹豈玉案之虛往第二同前韻皇甫威彼美人兮懸隴雲念塞上之征客回機中之錦文千里馳心十年誓志相關山之延夢託丹素而垂意札札鳴杼紛紛績翠梭曵緒而龍回錦披雲而鳳至情生萬象功歸一致緑為芳草怨王孫之不歸紅作仙花發美人之幽思懿夫逹其意者在乎誠為其藝者貴乎精顧異物之可賞諒同心之所成離披而芳樹搖影煥爛而明霞近榮振素手以鳴機蘭閨霜集斂翠蛾而績縷紗窗月生則知妙極十全才光一絶既以彰其意亦以表乎節類乎錦卓氏服以妍精言乎詩謝女慙乎清切稽六義而不忒方百花而迥别心唯念逺將績縷以同營字是回文與愁腸而共結成乎手發乎心鋭精思而在今方之紈比之素積玄功而冠古笑草露之輕薄勝林花之新吐宛矣麗矣錯金彩以成章寂兮寥兮零玉筯而如雨於是閲披風前光文爛然百花互進五色相宣文彬彬而愴矣彩重重而恨焉匪類雕蟲工乎織豈徒恱目寄乎邊寫片心之贈逺代尺素之相傳一則託乎情一則存於想謂乎錦也可裁心乎足賞君乎君乎發緘封知精誠之不爽臨風舒錦賦以賦之明麗當如此為韻閻楚封風響清韻錦明色絲閲攢花之麗綵當偃草之驚時拂袖而起翻光益滋始暉暉之展也俄習習以動之且爛兮則舒爰假不周之力及斐然而異誠同絶妙之詞爾其黼黻言開浸淫逺度藴鳴一作投梭之巧思比擲地之麗賦暉光亂起如蕩漾之波翻彩狀間飄若逶迤之霞布觀夫引曵交映彰施煥盈當大塊之初發遇回文之已成奪雲彩曜日晶激飀飀而愈疾動獵獵而增明向水而搖似挂帆之欲去當筵而列謂施障之將行況復入座輕泠橫空掣曵當蜀郡之新濯擬潘文而更麗絪緼乍舉時牽素手之中煦嫗潛來逺自青蘋之際晚映花户暗臨洞房簸煙暉之照判疑騰藻豔而飄揚裊輕吹鑠流光扇涵和而迥觸攄炳麗而前當五色相宣喻體物之詞彩八風迭起駭織文之鳥章且蕭颯初戾紅明正舒照瑣窗而粲矣煥雲幄以暉如彩曜克宣諒本因於剪飾精華可玩終亦藉其吹噓是知修時者莫貴其精微製錦者莫尚其綺靡善染翰之瑰麗狀臨風之旖旎懿哉文之義也諒發明之在此海人獻文錦賦以珍物時來以應君德為韻李君房彼潛織兮泉室之人曵文綃兮結氷縷灼錦彩兮照花新背窮海以入貢望君門而效珍于以獻之爰彰至德非同㡆氏之練更異仙家之織臨風始啓全含琪樹之芳向闕爰開遙寫蜃樓之色固竒工之所就蚩疑作豈常情之可識當其綵縷方織鳴梭靜聞絢霞光於隂火綴縟藻於卿雲舞鳳翔鸞乍徘徊而撫翼重葩疊葉紛宛轉以成文疑映地之花折似飲渚之虹分弄杼斯成既呈妍於泉客垂衣可仰欣有奉於明君啓瑶緘而駭視方霧縠而難擬離披耀彩臨玉砌以蓮舒燦爛生姿映金門而霞起固將保疑作寶其所異孰能識其所以投熾熖而靡燎為灰濯清流而不濡於水原夫獻琛方至捧篋員來臨虛庭而障倚俯洞户以屏開蝶翩翻而誤起鳥眄睞以驚回物無情而自感化有孚而斯應以文為貴寧同巷伯之詩表德方來且異美人之贈非同禹貢不謝堯時對天庭而照燭向麗景而葳蕤皎潔凝光爰識氷蠶之緒霏微發色不唯園客之絲既而煥彼文章作為黼黻方可重於逺人寧有譏於玩物文苑英華卷一百十九
