body:
  text: 文苑英華巻六百六十四宋李昉等編投知七投顧端公啟一首代人上路相公啟一首投户部裴郎中啟一首投殿院韋侍御啟一首投戸部鄭員外啟一首投翰林劉學士啟二首投西邊節度使啟一首投刑部趙郎中啟一首投陸侍御啟一首上池州衛郎中啟一首上池州庾員外啟一首上翰林劉侍郎啟一首上鹽鐵路綱判官啟一首上左司袁郎中啟一首投顧端公啟顧雲某啟某聞三呉詞苑不乏家聲兩晉儒林非無祖徳洎風流寖薄簮紱漸稀將闡吾宗獨付全徳不依華宇更託何門某逺𣲖涓流寒林一葉學由耕石才實鏤氷爰自随計遐方觀光上國難沽聲價易掇覉愁出谷風髙先摧弱羽登門浪急預返窮鱗伏念一擲魚竿四環星管華髮灑倚門之淚逺書開隔嵗之緘而又曽棄闗繻空歸未得已随律柱捨此何之今則漸偪春期將臨試藝彎弧乏勇睇鵠增憂伏以端公三翁徳服儒流言為詁訓荑枯有術肉骨多方儻䝉少借餘波微廻誕説當見長房之竹亦可為龍則知莊叟之魚終能化羽輕瀆尊聽伏積憂惶延望音塵不勝翹企代人上路相公啟某啟某本異仙材又非良器叨因射䇿偶沗決科始脱麻衣纔沾斗粟方期清慎稍竊寵榮無何不善攝生遽沉痼疾懸虵結釁一作疹鬬蟻成灾針石屢加駑一作襄羸無減並相如患渇雖覺有瘳比𤣥晏病風猶稀可療實以彌年伏枕終日閉闗嬰㓜素多饘餬莫給腸燃烈火鬢染繁霜分無榮逹之由敢望陶鎔之力家室以幸連姻戚合候起居伏䝉特軫襟靈深垂顧問咨嗟生業憫惻覉危許以轉衘致諸外府側聆嘉命寂聽好音扶䇿病躬開張淚目仰希尊㫖如釋沉疴拜賜猶賖衘恩欲泣望朱門而尚逺銘丹慊以先深必也果踐玉音不移金諾資糧有羡藥餌無虞然後訪三世之名醫千金之顯效獲離枕席再服冠纓維此昇沉實繋恩徳困而待問希同喘路之牛誓此酬恩願比棲囊之雀謹專奉啟起居陳謝投户部裴徳符郎中啟某啟某聞放龜者無心覔印養雀者㣲意求環蓋由仁發于誠惠加於物因懐感激遂効禎祥若某者泳沼未期傷弦有日仰恩波而尚逺指雲路而猶賖欲望生成猶希憫惻實以才非辨鵲道異猶龍四海投知希逢厚遇二年求試未遇先塲撫螢忩而便欲灰心對鸎花而徒傷淚目加以秦呉路阻烟水程遥甘滑多違問安常闕中宵夣到星漢俄沉萬里書廻槐檀遽改而又偶師題柱竊學棄襦期未逹而不還亦捨此而何適伏以曽將薄伎叨忝殊私儻䝉尚憫枯鱗猶傷塌翼纔霑末薦便是深恩縱不能生報田文亦可以死酬宣子傾心企望瀝懇依投圓蓋低臨方輿上載茍違斯語請告神明謹啟投殿院韋侍御啟某啟某聞干時妄動君子不為小智大謀一作智大謀小兵家所忌進憂狂狷退耻敗亡詳觀躁静之機爰一作頗契軍戎之事聊因牋簡假喻師徒冀慿殷氏之凾用代秦庭之泣某名同膠柱用等鉛刀不思量力而行竊欲争鋒而進洎焚舟學海決戰名塲忠一作衷甲不堅心城匪固兩經先榜但一作俱潰楚師再犯終塲亦班齊騎雄鋒缺落鋭志消磨執金皷以無因送降旗而不暇李陵矢盡項籍兵窮歸漢懐慙還呉失計所以重嘘懦氣再奮空拳欲罷不能既蘓復上將欲戒嚴文陣蹂躪義圖贖孟明奔命之辜雪曹沬敗軍之辱而我師甚寡彼敵尚强未暇争衡空憂失律持疑不進掉鞅難前先懐納欵之誠欲有乞師之志伏以侍御身弓落鴈心劍剸犀儒囿中軍翰林盟主揮五色筆為諸侯師出竒於文苑之中二南衘璧決勝於粉闈之内七子輿棺儻䝉益以竒兵濟之餘勇旁麾義櫓逺借雲梯使武庫戈矛皆為我旅文山草木盡作王師茍無必勝之功甘受後期之責塵凂清聽一作徳伏積憂惶謹啟投户部鄭員外啟某啟某聞桞文暢之遇王融初因雅􅀈劉嗣芳之逄沈約實自片辭或兩句可嘉或一篇堪奬則題於團扇冩在郊居遂使西邸流芳南朝溢美時名愈大紙價彌髙今也故事具存清風盡在每因投巻竊賀伊人雖有負於斯文幸遭逄其至鑒若某者學殊半豹藝愧全牛慙無經濟之文空有悲哀之賦投竿魚浦簉跡龍津無一時暫廢討論無一日敢忘索課誠不足揄揚大政感動知音比於雕蟲一作蟲跡為文鳥跡一作蹤成字雖無闗至理亦粗有可觀輙敢編録荒蕪輕塵裁鑒禽中一鶚冀文舉之明知嶽底雙龍庶茂先之必識儻或氷壺借潤水鏡分光如其積玉之名示以鑑金之譽一日三復非敢望於休文拂席易衣竊有期於謝混仲尼墻峻元禮門深非因咫尺之書難冩依投之懇絃哀柱促言切詞繁先甘妄進之嗤然一作後受自媒之責干犯明一作名德伏積兢慙謹啟投翰林劉學士啟某啟某聞鄭𤣥之謁馬融不知不去趙壹之干羊陟未遇未休或三年常在於門庭或一日再經其牆仞蓋以此時儒學無出於馬公一作融非當世文儒不先於羊子今所以重桴靈鼓復扣洪鐘者實存於此也某問一作聞不知三書惟闕五未能窺豹强欲知龍洎投棄綸竿依慿緗帙從田巴於稷下謁楊震於闗西三篋之書粗知篇目一枚墜簡微識指歸栖遲雖甚於蘇秦勤苦近同於寗越時或嚴霜届節脱葉辭枝曲突無烟幽忩有雪飛文月殿欲擬謝莊染翰蘭臺思齊宋玉實以鈍踰龎統魯極曽參三犯龍門屢奔鯨浪𤣥珠難得空迷罔象之津大道多岐頻灑亡羊之泣輙塵藻鑒叨獻菲辭竊自朋㳺或聞推許潘生摛錦巧借丹青謝氏碎金猥加流品亦復願披仙霧頻扣朱門冀遂望塵不期倒屣今則藩羝類窘幕燕同危正當羸角之時未識安巢之計輙披肝膽一作膈来訴融闕伏以學士辨敵飛龜才雄白鳳監同止水公甚平衡潤菁藻於詞林薙榛蕪於義路講理則絲繩讓直發言則山嶽慙輕儻假以風雲賜之慰薦奏揚雄於漢殿始郭隗於燕臺願借吹嘘豈無禆助至於斬衣異命顧印酬恩夜盜狐裘曉開魚鑰凡於死所請以身先干犯清嚴無任隕越謹啟又謝下第後使人存問啟某啟某聞收燼枝於烈熖必假良知出埋刃於重泉當資至鑒茍非精識孰測神功蓋由六律五音固應難審靈鋒寳鍔或未易知某不善守株妄脩通刺爰從前嵗秋杪去年冬初累貢菲詞上干藻鑑實以仙凡阻越流品懸殊天上程遥人間信斷在塵寰而祝望空有精誠向雲路以存思寜通夣想近者以龍門阻浪鸎谷摧枝鱗鬛傷殘羽翰零落懐鄉莊舄正苦越吟去國鍾儀方悲楚奏誰言否極忽有㤗来前日某官委訪窮居曲傳芳訓側聆尊㫖跪聽玉音竊聞俯降咨嗟深垂憫惻初疑夣覺終謂風傳方當退鷁之時忽得攀龍之便伏以學士優㳺仙苑一作禁泛泳天潢覆錦髙眠八花磚而讓寵含香視草五色筆以一作而慙神況鏤鼎思調前籌待運起骸有術肉骨多方儻䝉列在衆賔致之下舍曉彈長鋏不空効其歌魚夜取珍裘竊欲偕於狗盜下情無任攀望依託感激之至謹啟投西邉節度使啟某啟某聞天列將星國分戎律必命英傑以專統臨故入則掌驍衛而主親兵為王心膂出則驅隼旟而駕熊軾分國土田茍非敵號萬人謀通七徳孰副擁旌之選仍當注意之求伏以尚書勇冠山西聲聞隴右九天九地之法夜受於神姝金箱金櫃之書曉傳於靈叟故得㧞劍龍吼彎弧鴈驚使夷落無喧干戈盡偃邉𤇺息熖寒柝沉聲為天子之長城斷匈奴之右臂加以文通三變學洞九流郭璞神毫每通於夣想羅含彩羽素貯於心誠時或月滿青樓風清畫閣謝𤣥暉之理郡不廢謳吟杜元凱之禦戎何妨講讀而又政惟師古恩切字人利刃一揮亂繩皆理佇見鳯銜仙詔豹製牙旗長驅十乗之驍雄福致一方之黎庶遐瞻寵渥不越秋冬某稷下儒生天涯客子逺擕書劍来拜斾旗識馬援之鬚眉見太初之禮樂頻叨前席屢聽𤣥談憂一夫不濟其生耻一物不登其所義形顔色煦一作照疑避諱發襟靈因敢覼縷血誠輕塵藻鑑必希恩察少賜知憐某射鵠無功亡羊有恨婁敬之衣裘屢敝張儀之頰舌何為至於草織衡門雪封陋巷蛙鳴竈㡳魚躍釡中然猶講樹未休書筠不已潜脩此道以俟一作候明時春初將謁朱門卜行上國蓍言利見龜告叶從徑趨沙漠而来直指旌旗之下盡披肝膈布在牋毫事逼丹誠言多直致志一作心同鄰女止希蘓代之餘光身類鲋魚惟冀莊周之一勺干犯清重無任兢惶謹啟投刑部趙郎中啟某啟某聞弱水渺瀰匪風輪而不濟丹丘懸一作綿邈微羽駕而何之茍非𤣥化之功寜造長生之境其有本無靈氣復異仙材徒勤九轉之功未識三清之路侍立於葛洪陂上願附龍鱗徘徊於緱氏山前思随鶴馭敢傾丹赤盡寄牋毫扣徳操之皷鐘冀聞遺響仰劉琨之山海庶覿髙深或覬憐憫少加披省某勾吳寒族鄒魯庸儒偶効殺青因思拾紫捨獨繭文竿之樂預横經染翰之游一别楚山四凋秦葉進惟角觸一作解退則覊棲望化羽之期烏頭詎白困龍門之險魚尾將頳近者輙以荒蕪上干裁鑒實慙小道不副至公或自朋㳺竊聆風㫖潘江陸海曲借品流繡叚金聲仍加縁餙今則將臨筆陣漸逼掄材既乏先容惟憂㸃額絃哀柱促風勁葉危輙冩丹誠仰塵清鑒儻䝉特分餘潤微假末光朽枿生荑寒灰發熖纔沾慰薦便是輝華酬恩豈止於捐軀効徳願同於異類廻眸顧印庶竊比龜靈四代五公請先於雀報投陸侍御啟某啟某聞河南器賈本為能文紀一作渭北推袁曽因善賦或以年將弱冠或以才越衆流繇是援自後生寘諸前席髙擅洛陽之價雄專倚馬之名故能為文苑之美譚作儒家之盛觀若某年將逾誼才不及宏論乏過秦詩殊詠史徒脩通刺莫偶深知加以故國三千青霄九萬但抱覊離之苦畧無騫翥之期陶元亮之揮毫只思歸去庾子山之染翰空有悲哀近者不自揣量輙懐狂狷累緘巴唱来叩郢門螢近燭龍敢言芒耀鷃親威鳯論耻羽儀近自朋游竊聆風㫖毎承譚論常借丹青免貽覆甕之譏叨枉擲金之譽此皆情深誘掖意在推持馳洛下之名華徑容攀附記呉中之氏族常在接聨令申孔李之交許入原甞之舎且知逄晏子屈則宜伸媒遇蹇脩醜而思嫁所以更傾幽抱來訴融襟宋玉雄風必加吹照謝莊明月終借光輝獲居七士之間便是百生之忝干犯清聽伏積憂惶謹啟上池州衛郎中啟某啟某聞哲匠搜材不遺於榱桷至公選士無間於蒿莱茍求其文行高明豈計其人材仄陋故王襄之臨益部首薦郡人杜宻之理太山先推縣吏咸齒公侯之爵秩欝為文學之宗師若某者早寓樂郊實為編籍數間螢牖猶存於去獸江邊一葉漁舟尚繋於還珠岸下頃者不量名分學翫縑緗足履春闈肩隨貢士争先路狹角力材微伏膺於孔硯江毫終愧於秦一作楚鷄遼豕加以中臺千里丹禁九重空吟招隐之詩誰買長門之賦寒同氷子久迷温燠之途窮類偶人更軫漂流之歎伏念自随鄉薦便託門墻每以蕪詞常干藻鑑必謂秉持刀尺流品生徒豈期来暮興歌亂繩思理旋提郡竹俄擲省蘭寜知出刺之邦又是維桑之地伏以郎中含香望重覆錦才髙輟自南宫出臨偏郡池魚官犢既濟於公私綸閣𤨏闈已形於僉矚某近得弟霄狀報竊知曲敦奬勸俯念孱微深嘉寗越之辛勤仍憫酈生之落魄大垂恩煦下䕃宗親兒童知激勵之風骨肉感饘餬之賜伏以秦呉阻隔江嶺萦廻不獲奔走階庭拜陳感激随車在御空懐軾下之熊無翼陵虚更羡旟邉之事上池州庾員外啟某聞陳太守之奬善先自郡人鄭司農之受知始從鄉佐欲使恩隆薄俗化起儒門年代雖遷風流常在某者樵蘇賤品桑梓遺民識昧機先智惟人下陳於器用則魏瓠興譏列在宫商則齊竽致誚徒以㓜知經訓長辨義方偶近縑緗遂捐耕釣披經閲史無怠於光隂雪牖螢忩每叨於懸刺至於論都叙别歎逝悲秋假烏有以交談擬子虚而發論偶以書筠得句聊因起草成篇陸海潘江亦常聞慮宋風謝月素所營心縱不及於前脩時見推於同軰爰自束書辭楚懐刺逰秦求試春官昇名貢士投暗而終多齟齬秉機而本乏梯媒纔犯龍津旋悲鶂退且桃花浪峻難前短鬛纎鱗蘋葉風髙預返踈翎弱羽雖匡衡逰䆠未及十年而卞氏傷嗟俄經再刖廻翔輦下求索闗中横戈而未忍先降掉鞅而猶思更戰竊念秦舟已爇敵在不還蜀柱曾題途窮未返而又戀深陟岵悲重倚門父子棲遲鄉閭共笑蘇秦覊旅骨肉相疑儻䝉特降文符稍存庥庇纔聞顧盼便是恩榮使魯鄰知敬孔丘楚市不陵韓信謝郎中端楚公皆曾投謁遂忝眷知近聞有使還家便令附狀訴言名姓實辱奬憐非敢趦趄妄邀聲援上翰林劉侍郎啟某聞皎鏡當懸無疲屢照華鐘在簴不阻頻鏗其有餙貌前来横筳直進思投郎鑒願聽洪音孔室髙深前逺仲由之懇羊門峻阻難傳趙壹之懐所以載託牋毫用為紹介某呉門釣者闕里儒徒捨詹何獨繭之綸學揚子雕蟲之技慕顓孫之干禄効車子之聚螢西過許昌空吟景福東㳺鄒魯欲擬靈光時或風入楚臺雪飛梁苑偶然成詠忽爾盈篇是用歴韓鄭之門庭學楊衡之刺謁刻舟琢木未擬迃踈鑿柄攻堅難方齟齬以致兩臨文陣俱挫筆鋒東郭先生將逃濫吹歩兵校尉欲泣窮途然亦黙聽時謡頗聞通論以為蔡中郎之未顧則竹葉柯亭張司空之見知則劍辭圓室以時方濟㑹物有窮通湏因甄藻之時冀别沉淪之所求諸作者不在他人是以某月日輙貢菲詞上干英眄以侍郎學士作時儀鳳為國元龜學海波瀾常融沆壑情田壟畆曽稔耕耘屬詞則麗藻恒春視草則文星鎮動言能振蟄勢可燃灰儻䝉垂一顧之恩出陸沉之所平生進退決在指蹤干犯清嚴無任惶懼企望之至謹啟上塩鐡路綱判官啓某聞積塊為龍猶能致兩攻堅作鳥亦善因風此皆出自巧心營於敏手被之鱗甲假以毛羽纔離土木之形便逹隂陽之理當其入用猶或濟時況某跡忝人曹名殊物類瞻雲望畢粗識晦明指月看箕常知動息實以曽親筐篋强學進趨人非冠玉之儀賦乏披砂之譽澗松遲茂隴葉難芳重趨孟門再困先浪以至萍漂陸海蓬轉九衢吳子生涯惟餘四壁揚雄家産不過十金猶然染翰自强草𤣥無怠克已惟脩其直道潜心將候於已一作明知必有英賢寧無濟㑹自叨將陋唱再黷冲襟螢邇太陽敢言芒耀鮒游滄海方愧眇㣲豈期俯惻湮沉深垂汲引吐丹青於金口誇姓氏於同心榮耀既多鐫銘倍切今則俯臨文陣方假詞鋒失水多虞傷弦易怯輙披肝肺更訴融明儻䝉少借餘光微均美䕃庶使因風託便不謝於冥鴻假霧成斑無慙於隐豹塵黷清鑒無任攀望延佇憂懼之至謹啟上左司袁郎中啟某聞仙翁逞術叱石為羊方士呈能結巾成茍神靈之必至亦變化而何難其有欲改前蹤湏慿異行徴諸事跡或可比倫如某者稷下庸儒呉中單緒爰從㓜稚竊慕摶鵬思積學以干時欲代耕而求禄俄抛釣舸遂履名場朝無九品之親業有三餘之苦揚子雲之詞賦自愧雕蟲丁敬禮之文章人嗤畫虎邉蓬易斷路槿難芳頻傷肅殺之威未識陽和之力窮棲家逺旅宿衣單望鵠長踈懸鶉屢敝況復呉波㵼渌秦巘堆青懐橘莫從採蘭多阻大書一去𤣥律方還蝶夣初廻凉宵已艾恨淚泉湧愁膓火煎數竒而只自傷身語苦而何人傾耳竊思曽披仙露獲拜仁風煦以温和借其光彩或終以陸沉興念再惻傷懐願假雲雷偶蘇幽蟄豈可使鷄鳴凾谷只美馮諼龍躍天衢獨傳文舉倘徳鄰而義合寜古有而今無遐想音徽無任懇廹遥瞻紫氣希傳尹喜之書更詣朱門重奉張湯之刺謹啟文苑英華巻六百六十四
