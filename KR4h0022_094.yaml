body:
  text: 文苑英華巻九十四宋李昉等編人事五人不易知賦一首君子不器賦一首人鏡賦一首心鏡賦一首至人用心若鏡賦一首至人心鏡賦一首以賢為寳賦一首行不由徑賦一首同人于野賦一首得意忘言賦一首人不易知賦以題為韻郭適總目作鄭遹墳素通㫖古今彛倫惟沖虚以效迹貴特達而知人有藏器在我有從方立身歴九徴而觀則甄一徳而求真既而糺合性情交驅馳驟一作勝負莊列談其險艱堯舜病其授受玉石相蔽悲獻璞之匪工媒介未孚忌投珠而自久考聲度之軌躅察言貌之休咎鑒之則理將斯契昧之則亂何不有彼經緯之區分在昭擇於能否復覽前志清通不易或失子羽之容或失宰我之議自非識周郎之顧曲辨齊竽之濫吹安能取士於飯牛之時拔才於卧龍之器其道或如蘭芷應以塤篪聞撤俎而興歎指負甑而留規管仲覇齊終慟哭於鮑叔國僑相鄭始登舉於子皮此則秦鏡一覽而皆得何必豫章七年而見知别有事業後時徘徊中路厭東郭之雪隱南山之霧猶恐相士者失之於下流披文者棄之於異處一作趣苟名實之斯在願曲直而咸喻徒叩寂於不材實有慚於能賦君子不器賦以用之則行無施不可為韻白居易君子哉道本性一作生知徳惟天縱抱乎不器之器成乎有用之用不器者通理而黄中有用者致逺而任重盖一有由字識包權變理藴通明業非學致器異琢成審其時有道舒而無道巻慎其徳舍之藏而用之行語其小能立誠以脩詞論其大能救物以一作而濟時以之理心則一身獨善以之從政則庻績咸熈既居家而必達亦在邦而允釐彼子貢雖賢唯稱瑚璉之器彦輔信美空標水鏡之姿是故一作謂非求備者又何足以知一作多之豈如我順乎通塞合一作含乎語黙何用不臧何嚮不克施之乃伊吕事業蓄之乃一作則莊老道徳雖應物而不滯終飭躬而有則若止水之在器因器圓方一作任器方圓如良工之用材隨材曲直原夫根淳精於妙有宅元和於虚受内𢎞道以一作而惟新外濟用而可久鄙斗筲之奚筭一作算諒一作哂挈瓶之固守何器量之差殊在性情之能否豈不以神為𤣥樞智為心符全其神則為而勿有虚其心則用當其無故動與神一作時合静與道俱時或用之必開臧武之智道不行也則守寗子之愚至乎哉冥心在一作無我無可而無不可應用不疲無為而無不為信大成而大受非小慧而小知顧庻類曲從則輪轅適用若一隅偏執則鑿枘難施是以易尚隨時禮貴從宜展矣二字一作盛矣哉君子斯焉取斯人鏡賦以主聖臣忠道光貞觀為韻金為鏡兮其鑒則明人為鏡兮其象則精彼有取其昭燭我方致乎和平廣霽而磨礱既至酌獻而邦家以貞懸於心則四聽一作聰常朗寘於握而萬方不傾惟賢任賢自聖傳聖守之則通幽洞冥執之乃窮理盡性致和樂功逾止水之平徴古今道光仁夀之鏡比璿樞以潛運挂靈臺而韜映是委照以無疲每含光而不競無鑒於水自視於人曷容華之自飾惟道徳之所親鎔範義陳協於君臣八字一作功匪勤於鎔範義將協於君臣斯乃至寳載光皇道辨物數之紛紛洞晦冥之杲杲放之可包乎海嶽巻之可盈乎懐抱煥乎發䝉皎若晴空光甚鑒兮塵不能翳徳若容兮物莫能充以是為臣則獻可替否以是為鏡則進思盡忠斯為理兮化洽斯為鏡兮照窮惟賢聖之光贊含英華而不散執一法而不回仰千齡而殊觀貞明而翹楚角逐皎潔而羣邪冰泮兹鏡也克念則正罔念則荒播無疆以垂範披六幽而散光燭明明而洞洞歴久久而煌煌聖作物覩鏡清寰宇騐成敗之原知榮辱之主我鏡在徳曽無盤龍之雕我鏡在心自有山雞之舞若然則皇唐邁徳於陶唐吾君齊聖於文祖心鏡賦楊慎虚嘗觀夫乾位始造坤儀廣生運元和而産氣因自有而含精萬靈羣分立圓形以標貴四體成物包寸心而致亨含妙有而存象賁虚無而自明故其端以居中動不違正藏牝谷而為主闢靈臺而作鏡將黷之而不昬因澄之而彌静既剗邪而窒慾忽窮理而知命然後和精神明情性俾存存而不惑恒皎皎而孤映由觸類而感有為必因象物知器乘時利人敷禮經以導俗馳精義以入神探禍福而知運任行藏而理身所以君子處順而情逸明王不言而化淳若乃潜英議蓄明斷欲鴻䝉而未析勿冒昧而相亂凝至精而一臨俾羣疑而四散故使立身者潔之而清真自守入官者朗之而美化攸贊語衆妙之𤣥通分萬殊於大觀然則物以心鑒心由物遷掇輕花而意艶坐孤石而情堅所以去彼取此削觚為圜將欲保至和而不撓存大朴而自然兹㑹有體彼管攸設選賢而官知人則哲端靈心之朗暢拂清鏡之光潔取捨妙諧於物宜推擇靡遺於井渫遣許郭而齊鑒與山盧而比傑可謂張英風著徽烈嗟小子之庸蔽撫蓬心而望絶至人用心若鏡賦以方寸虚地有來斯應為韻紇干俞睠理心之至者有明鏡而比諸皎然可鑒泊然其虚捨將迎之載勤無情是得存好惡之不辨何狀不儲彼誠之明惟道斯守居中自執于精一待物豈殊乎先後云誰鑒矣則用當其無匪我功焉乃為而不有淵兮内照曠若虚受伊黙慮其智愚儼分形於美醜稽至理也其性命哉瑩爾䝉蔽滌乎氛埃引曜𢎞納清明洞開自外爰依叶彼生而有象由衷必應體夫神以知來故得稱有别於宏規等無私於衆類苟觀過之能審爰見疵而不愧始求義於昭昭卒窮微於至至和平自保非險乎山川容貌既呈必肖乎天地美夫鑒乃不臧勝而無傷恒其徳匪明而匪晦一作而匪韜匪晦狀於物或圓而或方仰周文之翼翼同叔度之汪汪是知𢎞量資乎日宣儲精本於明證鏡將心而共理影與形而合應思負局之克脩並懸心而有稱感物攸在立誠取斯彼範金之遺制信靈府以一作之相隨吾道方存庶一觀而無替其明固久亦屢照而忘疲想夫朗若爰啟静而無悶比申監於盈尺願脩容於進寸樂廣播披雲之詞莊生諧止水之論冀因照以𤣥鑒豈逢時而在困至人心鏡賦以人心融道清鑒應物為韻于可封莊生有言曰至人用心若鏡一作至人之用心若鏡盖用全句有㫖哉是言也夫鏡也者以明為體是故有來而必應心也者以净為照亦可不思而𤣥通拂拭生光掛新臺而月滿象罔求得映赤水而珠融若錬心而比鏡信清明而在躬爾乃以鏡為心因心載考菱花發而羣象生靈府開而萬物保斯鏡之精明謂人心得道至人所以卑其性而遺箴弱其志以虚襟聽無聲之和樂天籟之音明白四達照幽燭深希洞視而𤣥鑒在無心而用心苟能忘已作虚舟之泛必保其光得秦鏡之鑒我邦君皇宗之子天人之英體以合道沖融混成其用心也達至人之妙理其朗鑒也同水鏡之澄清開意而圓照吐心而自明妍嗤莫能藏其象鬼神莫以遁其情絶毋意與毋我固不將而不迎懸彼髙鑒求乎有貞覩處子兮調脂粉争捧心兮效蹙嚬醜者自醜新者自新形美惡而區别吾何情於知人醜一作媿匪桃夭寧容比證對香奩而呈貌慮柔姿而不稱有待良人非徒好勝因兹佇賞必冀象應紅粉蛾一作眉趨而競謁宛其素質統疑作髠彼𤣥髮類芙蓉之映水若姮娥之向月大明無私衆鑒不歇光之所燭照及微物度疑作庻有假於恩一作思輝幸留心於剪拂以賢為寳賦以朂名霸道邦家之託為韻謝觀楚國之君賢人為寳彼則貴於無脛此為尊於有道琢磨仁義而不緇不磷淬礪鋒鋩而既堅既好皎皎神爽稜稜貌清志一潔而靡垢行百錬而逾精非暗投以取誚不韞櫝以沽名廉謹一作讓在心命爵而蔑聞銅臭文章滿腹擲地而自有金聲洞徹不欺光芒相燭砥名而可尚礪節而自朂吐清詞之粲粲心水含珠見正色之温温情田積玉言錯落而無玷性真明而不瑕袖懐荆璞握有靈虵以鑒姦察邪之煥爛比照乘映廡之光華足可充盈軍國輝耀邦家何必積滿堂以遞矜易連城而助詐一非克儉之教一損不貪之化虞君受垂棘而滅齊國得孫生二字疑而霸徒美其色映層闕光能耀夜殊不知寸隂踰尺璧之珍一經奪滿籝之價所以愛兹被褐重彼迷邦以清徳之惟一奚白璧之能雙况各藏器俟時見機而作直若弦矢頴如鋒鍔誠席珍之可任以柱石之有託以之一作此綏撫而上下康寧以之守禦而内外胥樂既三復之可驗奚衆口之能鑠則知金玉為寳者徳義之衰賢人為寳者邦家之基國無日而無事賢無代而無之如此則何必楚也獨二三子之可師行不由徑賦以處心行道有如此焉為韻浩虚舟澹臺滅明幽棲武城感朴直之風散惡姦邪之徑生苟正其身寧偏僻而是履不以其道故斯湏而不行想乎塵滿荆扉草迷荒墅追遊不慎其經歴咫尺固難於出處鍾山石上杖藜之意殊乖蔣氏庭中携手之期頓阻牢落幽居交從日踈顧履危之若是將苟且其焉如訪野徑以閒遊恐穿松竹出衡門而獨步不遶園廬嘉夫礪志草茅規行畎畝避幽隱以不到視﨑嶇而何有蕪城獨賞寧遊舊井之間山館時歸肯逐樵人之後至若草樹沉沉幽芳阻尋絡野之茅隂自合縁溪之苔色空深以遨以遊見徇公滅私之志一動一息有去邪崇正之心是以蕭索鄉閭虚閒襟抱優遊多轍之窮巷來徃疎槐之古道花間絶跡念蹊樹之徒芳原上無人惜臯蘭之暗老且遵道如砥持心若弦信無私以白首將抱直以窮年顔生附郭之田有時窺矣謝氏登山之屐無所用焉既而披蔓草之荒凉見遊人之邐迤方檢身於邪正寧繫懐於逺邇楊朱悲道喪事亦如斯阮籍哭途窮意殊若此當舉直以錯枉冀風行而草靡苟非賢智之為心孰能如是同人于野賦以君子之道何徃不通為韻周鍼善本身脩名由道長惟君子之所履遇同人而遂徃不脩正直誡邪枉於出門既叶於心視野郊於指掌守柔以處亦何後而何先秉健而行諒無偏而無黨盖以居謙不躁應上通欲垂文於天下湏立志於胷中雲合霧開孰無機於豹變聲馳響答皆有意於雷同必使量統含𢎞義資探討包利貞而共濟顧言行而相保情田波注將符若水之時徳宇馨香用法如蘭之道乃言六二是乘柔之主九五為行健之資乘乎柔而何剛敢奪行乎健而何徃不之况能辨方知類視險如夷念同氣以遵彼實忘言而在兹于以審吉凶較能否始居中而體正終處上而為首理方求友喻伐木以攸冝義在同心於斷金而誰有所期利比浮雲悠然莫分光於身者曰道聲于教者曰文故得退無失位進得其羣將果行以育徳候移忠而事君則知福應無他元亨由已理契和順心惟知止不然何以風雲偶㑹咸為得路之人悔吝不生盡似同舟之子别有勵志彌久勞謙已多既考之於六位亦化之於四科且如今日之進也道如之何得意忘言賦以去象棄詞根乎幽朕為韻謝觀易意難見言以存之得意之後而言可遺本慿詮以指昧既達誠而去詞昔者先王𤣥通黙想以深指難可擬議嗟後世無不一作所瞻仰是以錯綜六爻森羅萬象立文以寓其吉凶賾隱以知其來徃慿有狀之狀而定其範圍因可名之名以徴其影響悟影響則可名之名息達範圍則有狀之狀無執可名為常名者謬定有狀為常狀者愚方知禮以適變作事之符符以觀設遵意之樞但魚兔之得也於筌蹄而已乎然則言者意之苖得意一作苖而根源有據意者言之本得本而枝葉不御假以寄誠明為定據如鑽燧求火獲火而燧之可忘似剖蚌求珠得珠而蚌之可去於戲置文字之館植𤣥牝之根自入存存之室廢乎察察之門不爽毫釐經濟無為之内匪差黍累彌綸有截之垠既而搜未形之形索無朕之朕變以喻而立幽藉明為凖則可棄喻取變即明討幽不可以理縛難可以文囚遇陽則明豈必離乃為日遇隂則順何湏坤乃為牛夫如是稽其意窮其事旁通其閫域曲盡其精義英華可採桎梏斯棄儻究忘言之機庻叶表微之思文苑英華巻九十四
