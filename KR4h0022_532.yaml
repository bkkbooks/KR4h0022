body:
  text: 文苑英華卷五百三十三宋李昉等編為政門十五道為人興利判二道教吏為缿筒判二道不拘文法判二道告糴判一道刺史求青牛判一道京令問喘牛判三道長安令登夫家判一道縣令增資判三道為人興利判南陽太守好為人興利作均水刻石立於田畔採訪使奏煩擾訴云以防忿爭對樂都既康太守成式念為耒之功而無鹵開均水之法以防忿爭故經界不正人將生心土田陪敦見左傳職競用力規子木偃瀦左傳子木規偃瀦注下濕之地之政思桓公障谷之盟畚鍤星繁溝塍綺錯孫叔敖之霸全楚意在陂塘邵信臣之典南陽名因溉灌興利除害而人不爭雖歉㱂音康穀不升謂之㱂之荐及因京坻之有望俾知涯分無廢函活何使司之不明而效奏之非允昔鄧晨開夢理鴻隙而條源何敞效能流鮦陽而刻石揆今度古自合激揚紏繆繩愆妄云煩擾以兹獲戾不亦太一有過字乎同前韓極自物必制嘉謨克獲飭勸耕桑領符卧理出入阡陌其敢寧居且通溝之攸在亦堰陂而斯尚鄉亭之中曽未刻石水門之下初欲成雲化可比於文翁恩實多於邵父使臣以飲水察俗煩擾致詞太守以均水利人約束尤當疆埸有理知薄言之足稱忿爭不生何簡書之妄奏比而無爽自可明徵教吏為缿筒判丙為守教吏為缿筒得其書託子弟所言以相告訐採訪使科其不能和睦於人辭云以散其黨對間邪存誠禦奸以德彼訓人者為政先之其有風俗未齊泉藪為患共成黨與率相比周作法於凉且從權而救弊誰能執熱故逝濯以隨時惟丙化俗臨人除患務本散落奸黨在三輔而尤異紏訴豪族為一切之權宜同夫汙衣致偷問羊知馬類鈎距之能事物無隱情俾枹鼓之稀鳴人皆懼法既且違於從政復何恤於人言效廣漢之缿筒聿聞操簡比國僑之刑鼎終見貽書既度時而立功亦反經而合義如肯綮之投刃乃豪猾之云鋤何八使之縱劾在一畫而斯蔽同前蔣諫學以入官貞足幹事茍隨時而制法則助化之通方施於在公是亦為政景忠而奉職知無不為置以缿筒方兹水器觀書記而察過託子弟以為言冀乎擒奸固隳黨與嗟爾人吏胡為告訐未能反身三省而乃相怨一方不悛厥心覆惡其上一作覆怨其上使司急夫求瘼務彼澄清察以不能責其非當斯則小人難養抑亦君子何情顧禮義之不愆爰紏舉之能恤不拘文法判甲為守不拘文法科其罪曰無為而已對建官惟賢臨下以簡爰合大中之道可還淳古之風甲委質清時分符列郡崇簡易之道化洽百城削文法之苛人安千里如汲黯之為守卧理淮陽若龔遂之能官行歌渤海無為而理不肅而成固良吏之可嘉何深文而見劾且政有經矣豈必拘之守常人可化焉自當變而至道欲科厥罪不見其宜同前垂範作則資政教而為本居上訓下在文法而為先甲非異能職忝專守聖人之轡䇿曽未奉於公家為政之脂粉且聞隳於吏道必也心疑有待道貴無為逺企華胥之朝或使人迷日用久異大庭之俗何不事與時遷况澆風大行淳化已寢宜奉先王之法用革小人之心奚乃不拘自速伊咎縱引古訓亦置今科告糴判得甲為郡一年不升告糴於鄰州觀察使讓其無備云百姓有積則公賦不足對李淑救災恤鄰古之令典有備無患邦之善謀甲宣彼六條克念勤恤施其五教務彼樂輸而天災流行實害嘉榖井稅不給職司其憂告糴於鄰庶擬泛舟之役有年而藴曷資祿禀之用一作為况今寰宇初泰黔黎再寧惟彼萊田尚多荒隴畎畝之獲每憂於家給什一之稅咸資於國儲或委積之闕然乃凶歉而無備觀察援今習古恐謬是非郡守通變隨時何妨損益捨而勿讓咸一作愚謂合宜刺史求青牛判許州人鄭傑家有青牛刺史張勤從傑求市不與及勤身死傑將牛贈勤子鄉人告取牛父為監臨對張勤宗承七葉政舉六條經一作謡日無戲方訓白鹿牽星可慕欲好青牛鄭傑滎水通門襄城編户既仰留棠之德旋聞伐梓之求言惜清廉少從拒抗雖林中鳳集已見秦彭而天上鶴來忽徵王距一作丁令銅符此閟玉樹斯在始叶朱暉慮玷解刀一作鈎之化終齊季札即追懸劍之誠昔孔氏脫驂猶見疑於弟子今張勤受犢何廢惑於鄉人論情不是監臨撫事適當投贈輒為糾告深懵古今不犯刑書理宜絶筆京令問喘牛判京縣宰冬日退朝逄相害者至死初不屑懷委而不問俄見行牛喘停車尋詰久而方去所司以為不理所職妄干他事對二京分邑墨綬居官三揖通班黃圖作宰自可遙聞善政廣樹嘉猷江陵叩頭止風有驗洛陽强項據地無從何得道乏良規人餘惡少翳桑墻下不見童子懷仁垂楊路旁唯聞暴客相殺一朝之忿爰揮白刃百年之命遽掩黃泉縣宰既不開口死者固難暝目人雖進路事屬退朝忽此逄牛翻能駐馬群非向楚詎是因風氣似還吳猶疑見月但以時流愛一作冬景寒結層氷自有慘切之容元無溫燠之候六畜行觀致喘四時坐見失宜此乃丞相及言何煩邑宰垂詰操刀之術罕明代斫之嗤難免憂喘不憂殺正是越司問牛不問人豈非離局以為妄干他事實亦雅叶本條同前崔融奕奕九重鏘鏘萬國凝旒闢纊天臨布政之宫曵組垂紳日旰懸書之闕臺郎伏奏簫翟初飛縣宰退朝王鳬稍下度金錢之廣埒過鐡鎖之長橋河南帝城是惟都㑹陜西王邑須禁椎埋何得逄暴客而不收委僵尸而無詰徵洛陽之故事行馬先知採漢相之遺塵停車有問當其所職曽不懼於宣風越其所司翻見憂於喘月妄干他事深謂當然牒送所由任依常典同前康廷芝皇都赤縣帝宅仙居萬國攸歸四方是則縣令幸陶昌化謬宰神京過北陸之寒初屬南宫之朝退珂回九陌騎歷三條俄逢蠆芥之凶復屬䦨單之變材非玉鉉顧牛喘而多懷任綰銅章覩人亡而不問既昧為邦之術徒興體國之心是曰曠官足成侵職所司紏劾有合通途長安令登夫家判長安令初上登夫家衆寡因移用其人觀察使以為煩辭云各逐地宜救其時事對盧仁贍一作瞻求才審官以恤人瘼施貢頒賦宜遵國章茍玷爾舊規亦荒我王度瞻彼邑宰實曰能賢物土之宜使廬井之有伍隨時改作在稅征而無差方今弓矢未􅐤疆場尚一作仍駭眷言州縣尚勞其供億念兹倉庾已竭於餼牽固可當官而行慮善以動均有無於鄉黨足可安人稽衆寡於夫家是資贍國議事以制且叶於時宜執法奉公何乖於古典觀察所見理或未然請從百里之謀佇聽千箱之詠增資就賦判劉乙為邑道百里增資就賦減年從役對邵潤之四井為邑先王所以致理九賦斂財大宰由其懸法劉乙返風遺緒震雷成化不下堂以任人入其境而稱善無奪時以立教終悅使以忘勞故增資以請征方減年而願役鶉衣本弊已聞杼柚之空鶴髮將衰尚勞筋力之事當今升域中之福致天下之肥髙三代之養老遵九式而節用何必增資減年然後計弊論績道一作既紀成於咸暢理儀一作宜又作其守其恆典同前蔣挺皇明撫運萬㝢欽承墨綬為邦四人從化雖輯寧之道自我國章而惠養之規亦慿良宰劉乙懷符宓賤比績劉平增資減年誠一時之異政以今方古亦千載而同風撫狀雖欲驚疑論情翻可嘉尚請從薦舉用表賢能同前學古入官議事以制正其德以率下下不忍欺厚其生以養人人樂其業既而教化之本禮讓為先量力而行省嗇其用懷恩者增資就賦慕義者減年從役可為銅墨之標長不在金科之擬議必若情由抑遣可與願為欲求異政之聞殊失養人之道此亦深心莫測逖聽攸疑百慮未孚兩端須扣文苑英華卷五百三十三
