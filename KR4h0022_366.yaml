body:
  text: 文苑英華卷三百六十六宋李昉等編辨論四原人一首十原系述原化原用原寶原謗原親原刑原已原兵原奕原祭兩戒一首補泓戰語一首弔舊友一首原人韓愈形於上者謂之天形於下者謂之地命於其兩間者謂之人形於上日月星辰皆天也形於下草木山川皆地也命於其兩間夷狄禽獸皆人也曰然則吾謂禽獸曰人可乎曰非也指山而問焉曰山乎曰山可也山有草木禽獸皆舉之矣指山之一草而問焉曰山乎曰山則不可故天道亂而日月星辰不得其行地道亂而草木山川不得其平人道亂而夷狄禽獸不得其情天者日月星辰之主也地者草木山川之主也人者夷狄禽獸之主也主而暴之不得其為主之道矣是故聖人一視而同仁篤近而舉逺十原系述皮日休夫原者何也原其所自始也窮大聖之始性根古人之終義其在十原乎嗚呼誰能窮理盡性通幽洞微為吾補三墳之逸篇修五典之墮䇿重為聖人之一經者哉否則吾於文尚有歉然者乎原化或曰聖人之化出於三皇成於五帝定於周孔其質也道德仁義其文也詩書禮樂此萬代王者未有易是而能理者也至于東漢西域之教始流中夏其民也舉族生敬盡財文粹作産施濟子去其父夫亡其妻文粹作婦蚩蚩囂囂慕其風蹈其閫者若百川蕩滉不可止者何哉所謂聖人之化者不曰化民乎文粹有民字今知化者唯西域氏而已矣有言聖人之化者則比戶以為嗤豈聖人之化不及於西域氏文粹有之化二字耶何其戾也如是曰天未厭亂不世世生聖人其道集有則字文粹有者字存乎言其教集有則字文粹有者字在乎文有違其言悖其教者即戾矣古者楊墨塞路孟子辭而闢之廓如也故有周孔必有楊墨要在有孟子而已矣今西域之教嶽其基而溟其源亂於楊墨也甚矣如是為士則孰有孟子哉千世文粹作載之後獨有一昌黎先生露臂瞋視詬之於千百人內其言雖行其道不勝茍軒裳之士世世有昌黎先生則吾以為孟子矣譬天下之民皆桀民也茍有一堯民處之一堯民之善豈能化天下桀民之惡哉則有心於道者乃堯民矣嗚呼今之士率邪以禦衆握亂以禦一作治天下其賢尚爾求不肖者反化之不曰難哉不曰難哉原寶或問或者曰物至貴者曰金玉焉人至急者曰粟帛焉夫一民之飢須粟以飽之一民之寒須帛以暖之未聞黃金能療飢白玉能免寒也民不反是貴而貴金玉也何哉曰金玉者古聖王之所貴也其在舜典則曰修五玉也一作焉其在春秋則曰九牧貢金禹所以鑄鼎象物玉所以飾禮金所以備貢以斯為貴貴不多乎曰舜取五玉以備禮禹鑄一作取九金以為鼎由自舜愛文粹作由言其禮不為諸侯乎不為人民乎茍無粟與文粹無帛是無諸侯與人民也則五玉九金豈徒貴哉如舜不修五玉禹不鑄九金三代之祭祀不以玉貨賄不以金矣由是言之金玉者王者之用也茍為政者下其令曰金玉不藏於民家如有藏者以盜法法之民不藏矣法既若是民必貴粟帛棄金玉雖欲男不耕女不織豈可得哉或曰然原親能嗣其親不曰子乎吾觀夫今世之誨其子者必檟肌榜文粹作篣步庚切籠也骨傷愛毁性以為教嗚呼孟子所為古者易子而教誠有旨歟不能教其子者是遺其身者也不能嗣其親者是捨其族者也古者文粹作之侫臣愛人之貴過乎文粹作於其親必捨而事文粹作爭之公子開方是也愛人之權過乎其子必殺而殉文粹作殉之易牙是也自兹以降為夫強臣者將欲奪人之宗必先殺己子王莾殺子宇是也噫教尚不可况其殺歟或曰均是親也均是害也則周公誅管蔡石碏殺石厚叔向僇叔魚漢文流淮南可乎曰均是親也賢則能嗣親凶則能覆族均是害也周公不誅則他人誅之石碏不殺則他人殺之叔向不僇則他人僇之漢文不流則他人流之已刑則及一人他刑則及其族此聖賢所以惜其族也刑也者仁在其中矣原已能以心求道者不曰已乎能以心為天子為諸侯為聖賢者不曰已乎是已之重不獨重於人抑亦重於道也嘗試論之能辱已者必能辱於人能輕已者必能輕於人能苦已者必能苦於人為顔孔者非他寶乎已者也為跖蹻文粹作盜跖非者非他殘乎已者也故古之士有不出户寢文粹作庭名重於嵩衡道廣於溟渤者敬於已而已矣或曰所謂敬已者不曰不能自害文粹作害已者乎如竪貂自宫能敬已乎鮑莊刖足能敬已乎曰均是敬也均是害也其媚與直不同也所謂敬於已者以道也害及已者亦以道也或曰聖人汲汲於民至若堯如臘舜如腒其勞至矣於已安乎曰勞者勞於心也勞一心而安天下也若禹者股無胈脛無毛其勞亦至矣勞者勞於身也勞一身而安萬世者也古者有殺身以成仁者况勞者歟嗚呼吾觀於今之世諂顔偷笑辱身卑已汲汲於文粹無於字干進如堅貂者幾希原奕問奕之原於或人或人曰堯教丹朱征丹朱以文粹作之為是信固有其道焉皮子曰夫奕之為藝也彼謀既失我謀先之我智既虧彼智乘之害也欲利其內必先攻外欲取其逺必先攻近詐也勝之勢不城池而金湯焉負之勢不兵甲而奔北焉勝不讓負負不讓勝爭也存此免彼存文粹作得彼失此如蘇秦之合從陳軫之遊説偽也若然者不害則敗不詐則亡不爭則失不偽則亂是奕之必然也雖奕秋荐出必用吾言焉嘗試論之夫堯之有仁義禮智信性也如生者必能用手足任耳目者矣豈區區出文粹有其字纎謀小智以著其術用爭勝負哉堯之世三苖不服以堯之仁苖之慢堯兵而熠之由羅人殺鵂鶹漁人烹鯤鮞者矣然堯不忍加兵而以命舜舜不忍伐而敷之文德然後有苖格焉以有苖之慢尚不加兵豈能以害詐之心爭偽之智用為戰法教其子孫文粹無孫字以伐國哉則奕之始作必起自戰國有害詐爭偽之道當從橫者流之作矣豈曰堯哉豈曰堯哉原用堯為諸侯非求為天子也摯之民用之舜為鰥民非求為天子也堯之民用之或曰摯善亦堯乎曰亦堯而已矣曰摯與堯其民俱捨之則善惡奚分耶曰摯固不仁矣堯固仁矣堯仁如是民尚慕舜况有君惡過集無過字於摯君道不如堯焉得民用哉故曰聖人不求用而民用之求用而聖人不用之曰若是集有則字孔子奚不用魯曰用之則魯化不用之天下奚化原謗天之利下民其仁至矣未有美於味而民不知者便於用而民不由者厚於生而民不求者然而暑雨亦怨之祁寒亦怨之已不善而禍及亦怨之已不儉而貧及亦怨之是民事天其不仁至矣天尚如此况於君乎况於鬼神乎是其怨訾恨讟蓰倍於天矣有帝天下君一國者可不慎歟故堯有不慈之毁舜有不孝之謗殊不知堯慈被天下而不在於子舜孝及萬世乃文粹作而不在於父嗚呼堯舜大聖也民且謗之後之王天下有不為堯舜之治文粹作行者則民扼其吭捽其首辱而違文粹作逐之折一作拆而族之不為甚矣原刑或曰丹朱為諸侯舜為天子丹朱有過舜誅之乎商均為諸侯禹為天子商均有過禹誅之乎曰不也朱均之為國必有舜禹之吏翼而治之何容朱均得暴其民也哉茍有過必諭之諭而不可奪其政一有必誅之集無此三字如誅之者去堯舜之嗣也焉有為人臣而去其君嗣哉或曰法家嚴而少恩周官有八議漢法有三章徴八議也雖殺人可免以三章而親賢必刑何也文粹作哉曰聖賢在世不能無過以輕重議之耳如以謗刑刑之雖周孔其可免諸原兵管子説蚩尤割廬山之金以鑄五兵説者或云蚩尤古天子則炎黃繼命其間無蚩尤之運也按史記曰文粹作云蚩尤與其大夫作亂如此為庶人之暴者且庶人不當有大夫日休以為蚩尤乃黃帝之諸侯蓋其為人暴黃帝征而滅之如此為庶人一夫之暴不足當天子用兵也又明矣嗚呼昭然之理前賢懵文粹作惛之况大聖之深旨哉原祭説者以蚩尤為五兵每有師祭當祭蚩尤嘻厥亂甚矣皮子直以蚩尤為黃帝逆亂之臣五兵直作於炎帝固始茍自蚩尤始以其亂逆且不當祀一作况字果不自蚩尤蚩尤不道黃帝滅之文粹有又字不當以不道充祀軒轅五帝之首能以武定亂以德被後今之師祭宜以軒轅為主炎帝配之於義為允兩戒窮者宜有以樂乎果宜有以樂也窮者宜有以懼乎果宜有以懼也樂者何樂吾之窮非吾之修也樂吾之不茍就偷取也樂吾寢道之安腹義之飽而不更富貴也樂吾之自反而縮偃偃而居蕩蕩而行也樂吾之善擇善蹈而無所移流也樂舉如是也樂可涯乎哉故曰窮者果宜有以樂也懼者何懼吾之窮時不能也懼吾之道終不能施設也懼利澤不下於人也懼吾之榮名淑譽不謂一作冒聞於天上以為父母寵大懼吾之無以與親戚為厚也懼吾之無以與鄉黨賢友俱有之也懼舉如是也懼可弭乎哉故曰窮者果宜有以懼也逹者宜有以樂乎果宜有以樂也逹者宜有以懼乎果宜有以懼也樂者何樂吾之逹上不欺乎君下不愧乎人樂吾之乘良食腴有以得之也樂吾能蹈古之逹者之道以匡戴于上也樂吾之進而能思有以為報也樂吾之穀祿豐多而不為積藏有以與戚愛為厚也樂吾之不大其家而養來天下賢士可以繼續吾祖道也樂吾之奉養祠祀率父母所教育而居有之以為潔井薌馨也樂吾之功利流布於人而國人指名以榮父母之善教誨也樂上有以倚也樂下有以仰也樂似先古之為令子孫也樂垂後世為賢祖考也樂古之人非無吾道而有合不合吾適有之而有合也樂舉如是也樂可涯乎哉故曰逹者宜有以樂也懼者何懼吾之所以逹無曲折便邪以得之乎懼吾雌顔飴辭態媚嬖御以得之乎懼吾飛聲竄迹盜取衆好以得之乎懼吾之得位無急夷而讓病乎懼吾無嗜豐盈而迷位如郵乎懼吾不恤居職而早計後來乎懼吾無激詭譎詐以取譽乎懼吾無擕實傳藝為雀聚狙黠乎懼舉如是也懼可忘乎哉故曰逹者冝有以懼也窮者宜有其所以樂無其所以懼古之人有之顔子是也凡所以病疾於道擇去之鮮矣而又得聖人為之依旦夜熟復所理以為樂所謂懼者獨不得功利下於人耳辱有所歸也歸乎有國有人者也與吾之俱生之人無逹也懼於我何哉逹者冝有其所以樂無其所以懼古之人有之周公是也以家為周抱負稚主以究成天下矣凡所養天下者宜舉置之以為樂而一無所以懼代之希顔子而道周公者有其所以有無其所以無哉茍不至焉宜兩有所戒作兩戒補泓戰語宋襄公伐鄭楚伐宋而救鄭與楚會泓戰既濟未陳司馬子魚請擊之公不以戰卒敗而退公羊氏以為文王之戰亦不過此日休補其文曰聖人制民患其力不可禁也設法以刑之患刑之不可止也用武以兵之兵之既出也民秉一作乘之為格殺執之為攻殘故聖人施金鼓以節之用羽旄以飾之為搜狩以教之自三代以降春秋之時禮樂之征弛掩襲之弊廣窮其力者譬角抵者爭其勝負並驅者競其先後故為仁讓哉文王聖人之至也雖以德化未聞不兵而獲者然則伐大夷征密須敗耆國伐崇侯虎襄公始戰齊而納孝公次及于泓則云不禽二毛不以阻隘夫聖人之愛民也班白者不提挈又云一夫不獲其所焉能驅於死地文粹作豈能區區於此決其勝於人命哉較其戰也文王不為也噫公羊氏違丘明之旨以為文王之戰亦不過於此罪矣夫二字文粹作也吊舊一作故友張琛范陽盧氏子驤與人交必先熟仁信道德然後旨迹無間始卒之道必全或重之以井譽固不腴於心或風之以巧言亦不間其舊盧子之性逹於玄盧子之機忘於言雅好歌詩吟風吸月往往有前輩體調七薦文曹不為時遇病乎其人皇帝十三年以故東觀歸孝則逹於鄉里悉得盧子事一旦沉疴醫不去卒於山陽嗚呼天付盧子之至道而時違之天生盧子之孝節而時反之命耶以其欺天之盜一作道跖胡為福以其逹天之顔一作微回胡為促時之為一作道其跖耶時之為其回耶明然子之為固不及跖之時也琛之措意不足以書孤山雕碧寒水澄練子兮已而文苑英華卷三百六十六
