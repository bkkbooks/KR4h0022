body:
  text: 文苑英華卷四百七十三宋李昉等編䇿問十五道䇿賢良問五道䇿秀才問三道䇿博通文典逹於教化科問一道䇿識洞韜略堪任將帥科問一道䇿神嶽舉問一道䇿賢良問三道䇿宰相科問一道䇿賢良問五道第一道顔師古問天生蒸庶樹之司牧立化成俗闡教𢎞風譬璽印之抑塗若盤盂之置水汙隆各隨所齒方圓在其所制夏后尚忠之政固以率服萬邦殷人先敬之道亦足儀刑百姓亟從革變靡定沿襲所貴雖殊同歸於乂先聖設法將不徒然厥意如何佇聞詮釋第二道問夫雜用霸道不純德教是非稽古何以稱强權宜一切寧可垂訓其理隱微其說安取且設官分職非賢不任知人則哲惟帝難之良由言行相違名實乖舛情態難覩蘭艾莫分藻鏡銓衡苦其混揉如何審綜察兹優劣八觀之術往彥所陳七繆之郵非無前說澄汰糠粃其可必陳何謂七繆宜具條録勿致闕遺又西京課吏其法何以鄴洛考功衆議孰得且公卿已下員祿素定量其閒劇職務才舉而散官一色多乏器幹縱非鄙弱則有疵瑕至於銜命諸方承㫖出使按察撫勞絡繹相趨若差職事之人則於官曹闕廢如其專遣冗散又致前塗虧失彼此難周未能通允欲施何法使得兼濟又二代寮寀大𢾗幾何用官詳備遣人可觀凖望聖朝繁省何若自秦及漢掌外使者何人當塗典午出邦畿者何職書傳所說可得而言識逹化方久應商略既無礙滯悉俟敷陳第三道問潔已以進陳諸往册平康正直彰乎前訓修身勵操俱曰可稱攝職當官何者尤切必能兼善其利博哉互有所長宜甄先後今既舉兹二事欲委共康廣扇清風大矯流俗施行條教可用率下使人懷氷碧一作玉之心家有素絲之節軌物昭範佇觀表儀若在姬周號稱多士嬴氏居位亦有賢人誰修亷潔之道孰當正直之舉爰及兩漢魏晉已來歷載遐長亷直衆矣其間尤異凡有幾人必須具列姓名分條事迹無或非當意狀殊違先古有言惟德作乂既充亷潔之選又應正直之科誠宜追蹤曩人尚想同志並驅前烈誠可比肩企仰高山誰者弗逮當仁不讓寧假撝謙近取諸身豈或涯分無而為有是則非亷虛美雷同又乖正直兼兹學植一作殖理必該通原始要終當盡𢎞博第四道問學以從政昔賢令則博文強識君子所尚結髮升朝敷袵受職開物成務率由兹道是以登高能賦可列大夫試諷籀篇乃得為史然而算祀悠邈載籍實繁鑽仰雖多罕能擇練今將少論古昔庶異見聞勿用浮辭當陳指要九流七略題目何施八體六書名義焉在三皇五帝諸說不同列次區分誰者為允翠為疑作媯𤣥扈臨之而安得緣純黃玉所表其奚事陰康驪畜行序孰當封巨大填胡寧遊處彤魚昌僕出何典誥窮蟬聲望厥類惟何管仲文錦既醜何貴子産深練實厚何俾周鼎所存議疑作識者幾物齊鍾所釁卒用何牲罷絀諸侯何名三十六都褒貶將相何謂三十二人至如象葉之精乎棄日木雞之巧乎異端著於簡諜何所沮勸學綜古今想宜䆒悉一二顯析無憚米鹽第五道問八政所先食貨居首萬商之業市井為利菽粟稻粱饑饉足以充口布帛絲纊寒暑足以蔽形生靈所資莫此為急爰及室宇器械同出五材皆禀造化之功取者得供其用而龜貝之屬何故為寶競取而多誰所創意錢幣之作本以何施億兆賴其何功政教得其何助若夫九府之法于何貿遷三官所統又何典掌未知乘時趨利濟益淺深起僞生姦有何虧敗九府之名欲知其九三官之號何等為三宜各指陳務令可曉子紺前漢食貨志赤仄應劭曰子紺錢也稱貴文飾何如赤仄殊形以向間錯又賣穀極賤則農夫劬勞而不給糴價翔踴則工商窘乏而難振為政之道患在不均設法籌算去其太甚使夫荷鍤擁耒阡陌之用獲饒作工通財倉廪之儲不匱又糴三舍一起自何人以母權子云誰所建各申何法厥利焉如今欲修之孰可孰不可亦宜辨說不可曖昧佐時經國此亦一隅既膺斯舉何所興讓聊動翰墨豈申餘勇䇿秀才問三道獨孤及第一道問儒有安身以全德有殺身以成仁有狥名以行已有忘名以救物雖俱出於儒墨而用之不同聖人立言豈其無操持歟集作豈其夫魏顆違命申生受賜伍尚赴郢伍胥如吳四者孰孝比干死而集作之微子去之太公投竿伯夷採薇四者孰義石户竄於海上伯陽隱於柱下鴟夷子去去字集作范蠡泛舟於越三者孰潔今欲考其本末度長以挈大較其去就合異以為同渴聞貫之之道辦之之說第二道問黃帝氏以無為為政故垂衣裳而天下順周人三千其儀亦克用乂舜誅四罪天下咸服而成康恭己刑措不用致化之本豈不同源而文質殊貫損益相反以古範今何為去集作去向就孔子用鉞兩觀而魯至於道集作子宓子賤鳴琴單父集作培幟而民集作單父亦自化寬猛之際小大奚侔比權量實其義焉在敷暢厥㫖敬佇嘉言第三道問𫝊曰其君齊明精潔則神饗人聽故神明降之夫天地絪緼冲氣為人神何由降明何由出至如晉祟實沉嵩生申甫編傳穀城之老言發魏榆之石檮扤杜伯與商周而存亡黃熊白毛將晉虢而興敗是何神也根本焉在二三子賁然來思宜䆒乎天人之終始其悉數以對策博通墳典逹於教化科問陸贄問皇帝若曰朕承祖宗之鴻休登科記作烈獲主神器任大守重懼不克堪思與賢士大夫共康理道虛襟以佇側席以求而群議紛然所見異指或牽古議而不變或趨時㑹而不經依違以來七年于登科記作於兹矣國制多闕朕甚恧焉今子大夫博習典墳深明教化褎然充舉咸造于庭其極慮精思以諭朕心之未寤仲尼叙禮樂删詩書修春秋廣易道六經之義登科記作教所尚各殊豈學者修行理當區别將聖人立意本異㫖詔令無㫖字為是英華疑宗源集作願非施之於時孰為先後考之於道何者淺深差次等倫指明其義夫知本乃能通於變學古所以行於今今詔令作用之教人則異於是工祝陳禮樂之器而不知其情生徒誦禮樂之文而不究其集作賦以事欲人無惑其可得耶將革前非固有良術堯舜帥天下以義比屋可封桀紂帥天下以暴比屋可戮然則上之化下罔或不從而三仁四凶較然同集作自異有教無類豈虛言耶集作哉作樂移風聞諸昔典夫至雅必淡至音必希文侯英華作公非列國之賢君猶曰則惟恐寐矧彼流俗其能化乎將天地同和災殄不作黎人丕變姦慝不萌何施何為以至一作致於此王者制理必因其時故忠敬質文更變迭救一作改三代之際罔不由之自秦剗古法漢雜伯道紛綸千紀王教不興國家接周隋之餘俗未淳一集作純一處集作居都邑者利巧而無一作忍恥躬一作服田畝者朴野而近愚尚文則彌長其澆風復質則登科作文莫救其鄙俗立教之本將安所登科記作何適從自昔哲王唯此一作以三正互用後之術士乃言五運相生漢應火行則周為木德禮猶一作稱尚赤義則集作登記作烈頗乖永言於義一作兹莫識厥理九流得失之論歷代興亡之由王鄭釋禮登枓記作識禮之異同公穀傳經之優劣必精心考究詔令作必精必究用沃虛懷䇿識洞韜鈐堪任將帥科問問皇帝若曰朕遐覽典謨詳求至理集作理道三代之制登科記作際粲然可徴未嘗不文武並興農戰兼務故能居則足食動則足兵足兵則暴亂息足食則教化行十二字集作登科記並作兵足則威食足則固威則暴亂息固則教化行興集作理國之本實在於此秦漢已降王制不修選士廢射御之儀教人無搜狩之禮即戎者不知其稼穡力本者罕習於干戈於是異文武之人分農戰之道守則乏食征則鮮兵歷兹千年竟莫能復抑知之者盡寡將行之者惟艱與朕念之甚勤思繼前躅良以軍旅之事戎詔令作役戍靡寧勳庸既多爵秩咸貴俾服田畝慮興怨咨仰於一作給縣官不可勝計由是版圖嵗登科記作日减阡陌日登科記作嵗荒水旱小愆廪餉咸竭欲使軍人悅歸於耒耜儒者兼逹於韜鈐田萊盡耕攻取必勝誘人甚集作孔易其術安施王者之師本於立德兵家之法方務出竒德以信成竒以詐勝理有違反將何適從宋襄成列而敗軍見嘉魯册韓信决囊以詔令作而推敵取貴漢朝然則喪國亡家豈集作存字伯王之道冒危乘險非詔令無字仁義詔令作誼之心所宜討論以定褒貶夫衆寡不敵克必以謀樂生下齊孫子破楚魏武之勝袁紹宋高之滅姚泓成敗之由備陳本末古人有言曰誅伐不可偃於天下又曰善為國者不師二端異焉其有深㫖子房次序一作列兵法任宏論撰軍書指明一作陳異同詳録名氏所聞高略一作想聞商略擇善而行之䇿神嶽舉問此篇所答策載四百八十卷賢良方正科䇿問隨䇿今不重出止存其名䇿賢良問三道第一道問天六地五經緯斯列內和外順禮樂攸興體也備而後成履也踐而乃立厥語則興導諷誦厥德則祗庸孝友而大道之行本無制作忠信之薄翻為亂首終以六君子由此振三代之英四豪士違之嬰五伯之罪焉往可以還淳反朴何適可以持盈守成郁乎文哉周監二代網羅奔放沿革多端至若緇布纁祗疑夏腒冬雉弓矢詢於五物嚌啐正於三命示惠而加折節訓恭而置房蒸間問殷聘搢三挾一詩懷祝嘏絲紑尸賔忱疑木虞筐桑匰館然䄙闕盎涗飄疑作汛齊茍敬之儀甫竁之節此等之物各為何興用之安所捨之何從經邦之略焉假設施别白書之無或曖昧第二第三右二篇所答䇿第二篇載四百八十三卷賢良方正科第三篇載四百七十七詞標文苑科䇿問隨䇿今不重出止存其名䇿宰相一作臣科問問聖人握天下之圖居域中之大莫不仗羣材而康庶績資多士以牧黎元夢想傅巖之野佇思磻溪之上遂得乘箕入相就三命而作鹽梅投釣升朝封四履而稱師父故如英靈間出千載一賢皇化軌躅殊途共貫我大周道冠羲軒功高媧燧長楚必割翹木無遺虛席旌賢宵衣納善降賢良之制下徴辟之書子等並藏器待時懸瓢俟扣深識宰臣之體妙逹經邦之術欲使陰陽調六律風雨應四時一百姓之心平九州之利餘糧棲畝外户不扄亭障無虞關河罷戍漁者虛湍瀨田者讓肥腴路不拾遺市無二價眷言於此何道以臻至如九儀八座之指歸四師六典之題目並馭人之大體撫俗之良規幸陳名義之端無致踈遺之對文苑英華卷四百七十三
