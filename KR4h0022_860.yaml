body:
  text: 文苑英華卷八百六十一宋李昉等編釋十二東都聖善寺無畏三藏碑一首尤溪大師碑一首潤州天卿寺雲禪師碑一首東都聖善寺無畏三藏碑一首李華惟和尚輪王梵嫡號善無畏釋迦如來季父甘露飯王之後其先自中天回因難分八一無此字王烏茶父曰佛手王以和尚生有聖姿早兼德藝故歷試焉十嵗統戎十三嗣位睹諸凡舉兵搆亂不得已而後征之接刃中體捍輪傷頂軍以順勝兄以愛全乃白母后告羣臣曰向者親征義斷恩也今以國讓行其志也因置位於兄固求入道太后哀許賜以傳國寶珠南至海濱殊勝招提入法華三昧聚沙建塔誓一萬區黑蛇傷指而不退息身寄商舶往中印度密修禪誦口放白光無風三日而舟行萬里與商人同遇羣盜阽於併命和尚慰帖徒侣默誦真言七俱胝尊全現身相盜果為他冦所殱冦乃露罪歸誠指蹤夷險越窮荒踰毒水至中天境上乃遇其王王之夫人即和尚妹也和尚服凡品而徒侣以君禮奉之王問獲其由嗟稱不足菩提眷屬是日同歸慈雲布蔭一境丕變於是發三乘之藏究諸部之宗品偈章句誦無遺者説龍宫之義理得師子之頻伸名振五天尊為一有聖字稱首那爛陀寺像法之泉源衆聖之都會乃捨寶珠營大像額端晝如月魄夜則光耀僧有達摩鞠多掌定門之祕鑰佩如來之密印顔如四十許實二字作巳八百年也和尚投體兩足奉為本師鉢中非國食示一禪僧華人也見油餌尚溫粟飯餘暖愕而嘆曰中國去此十萬八千里是彼朝熟而午時至此何神速也會中盡駭而和尚默然本師謂和尚曰中國白馬寺重閣新城吾適受供而反汝能不言真可學也乃授以㧾持密教龍神圍繞森一作自在目前無量印契一時受頓即曰灌頂為天人師稱曰三藏三藏有六義內為戒定慧外為經律論以陀羅尼而統攝之惟陀羅尼菩提速疾之輪下脫吉祥之海三世諸佛生於此門夫慧照所傳一燈而巳殊異燈亦無邉由是有百億釋迦微塵三殊菩薩一作提金剛㧾攝於諸定向月懸同於法身頓升階位鄰於大覺此其旨也和尚遍禮聖迹周行大荒不悔艱難每所三至為迦葉剃髮愛觀音摩頂嘗結夏於靈鷲山有猛獸前路深入山冗冗明晝有摩尼立像左右侍者色相如生中印大旱求和尚請雨觀音大聖在日輪中手執淨瓶一作軍持注水地中感咽于雙樹之下問往昔於佛世之人為者不言十問一作聞其一煆金為貝葉寫大般若鎔銀起窣堵波等佛身相母后謂和尚已化淚竭喪明及寄疏問安朗然如故大雄威後外道如林九十六宗各専其見和尚皆隨所執乘喻破疑解邪縳于心門捨迷津於覺路法雨大小而均澤定水方圓而滿器仆異學之旗鼓建心王之勝幢使其以金制徑即身觀佛大師喜曰善男子中國有緣可以行矣乃頂辭奉下至迦葉濕彌國中夜次河河無津梁浮空以濟受請於長者有羅漢降曰我小乘之聖大德是登地菩薩乃讓席推尊和尚受以名衣乃升空而去鳥傷國有白鼠馴繞日獻金錢講毗盧於突厥之庭而可敦了請法和尚乃安禪樹下法為金字列在空中突厥之妻一作官人有以手按其乳乳為三道飛注和尚口者乃合掌端容曰此我前生母也或悟舉刃三斫支體無所傷破者唯聞銅聲而已至雪山天池而和尚不愈疑作念本師自空而至曰菩薩身同世間不捨生死汝久離諸相寧有病耶言畢而沖天則洗然而愈矣路出吐蕃與商旅同次夷人貪貨率衆合圍乃密為心印而蕃豪請罪至中國西境夜有神見曰此東非弟子界也文殊師利實護中州禮足而滅以駝負經至西川涉龍沙陷駝匹沒于泉下和尚入泉三日止龍宫而化之牽駝出岸經無霑濕􅌖宗道尊德盛立契無為詔僧若那及將軍史獻出玉門塞表以俟來儀開元紹一作繼興重光大化聖皇夢與真僧見其姿狀非常躬御丹青圖之殿壁及和尚至止與夢合符天子光靈而敬悅之飾內道場尊為教主自寧薛二王而下四字一作以降皆跪席捧器為師賔大士於天台接梵筵於帝座禮國師以廣成之道致人主於如來之乘巍巍法門於此為盛有術者握鬼神之契參變化之功承詔御前效其神異和尚恬然不動而術者手足無施矣其餘祕要代莫聞也纍請居外敕諸寺遞送隨駕至洛京詔於聖善寺安置自出內之後奔走華夷和尚臨之貴賤如一奉儀形者蓮華開於眼界稟言説者甘露降於心源超然自悟曰有其人矣法侣髙標惟尊奉長老寶思其餘皆接以門人之禮禪師一行者定惠之餘術窮天地有所未達咨而後行和尚質粹神邁氣和言簡不捨律議而身心自在不離坐席一作宴坐而願力俱圓有來畢應蠲應無礙故衆妙懸解藝能兼於百工大悲普薰草木同於一子不知其極也於本院鑄金銅靈塔以此功德應緣護世手為模範妙極人天寺衆以銷冶至廣庭除深隘慮風至火盛災延寶坊笑而言曰無可為憂自當有驗及鼓鑄之日大雪蔽空靈塔既成瑞花飄席前後奉詔禳旱致雨滅火返風昭昭然遍諸耳目矣從容上請大庇緇林正法之興繫於龍象信也表求還國優詔不許開元二十三年十一月七日右脅纍足涅槃於禪室享齡九十九僧臘八十法界凄涼天心震悼詔鴻臚卿李現威儀賓律師以某月日葬於龍門西山涕慕傾都山川變色弟子寶思一作畏非禪師滎鄭氏明畏禪師琅琊王氏皆髙族上才超然自覺息言為樂説之辨妙用即禪那之宗入和尚之室惟兹二人而乾元之嵗再造天維大君心證無緣之悲躬行不匱之孝由是釋梵扈蹕天師濟師凶穢掃除人祇清淨位光付囑教大興行二禪師爰以偈頌刻諸金石法離文字道不可名以慰門人感慕之心有同顔子喟然之嘆其文曰釋宫尊種龍扶出持捨位成道為天人師度微塵寰行甘露慈仁消大怖辨洗羣疑法本不滅今子得之隨方演教聿來中國帝居承迎天花滿裓歡喜園花惟聞薝蔔百千萬億調服其心灌頂在昔聲聞現今山王髙妙海月圓深因於示滅空悲鶴林伊水西山冥冥玄室金棺此閉式瞻無日雙寶昭興教尊言密歸我者因因明悟實故左溪一作溪下同大師碑百億三昧無非度門於覺昭中而自在過去大士時惟左溪傅氏之子法號玄朗字惠明其先北地洽陽人漢魏大族隨晉南渡家於義烏今為東陽義烏人也自江夏太守極梁居士翕賢達相承世謂居士為諸佛化身杳不可測左溪即一作則居士六代孫梵行之間宜生上德母葛氏夢天降靈瑞而娠左溪心淨體安迄于乳育生九年矣辭家入道兼綜羣言曰此法門之畎澮也如意年中剃度𨽻義烏清泰寺尋光州岸律師受具戒就會稽印宗禪師尚一作商律部重山深林怖畏之地獨處巖穴凡三十年晏居左溪因以為號每言石泉可以洗昏蒙雲松可以遺身世吾以此始亦以此終於一作于所居一方建立精舍約而不陋跪懴其間如來諸大弟子皆菩薩僧大迦葉之頭陀舍利佛一作弗之智慧羅㬋羅之密行須菩提之解空由一無由字此四者皆最上乘同趣異名分流合體舍利弗先佛滅度佛以法心付大迦葉此後相承凡二十九世至梁魏間有菩薩僧菩提達摩禪師傳楞伽法八世至東京聖善寺宏正禪師今北宗是也又達摩六世至大通禪師大通又授大智禪師大智一有禪師二字降及長安山北寺融禪師蓋北宗之一源也又達摩五世至璨禪師璨又授能禪師今南宗是也又達摩四世一作代至信禪師信又授融禪師住牛頭山今徑山禪師承其後也至梁陳間有慧文禪師學龍樹法授惠思大師南嶽祖師是也思傳智者大師天台法門是也智者傳灌頂大師灌頂傳縉雲威大師縉雲傳東陽威一無威字大師左溪是也又宏景禪師得天台法居荆州當陽傳真一作其禪師俗謂蘭若和尚是也左溪所傳止觀為本祗樹園內常一作當又作嘗聞此經燃燈佛前無有少法因字以詮義因義以明理因理以同如定慧雙修空有皆捨此其略也菩薩或以性海度或以普門化香像一作象至底彌樓最髙其餘幽贊不知充滿法界夫知上法易行上法難修上法易證上法難明謂左溪為有則實無所行謂左溪為無則妙有常住視聽之表巍巍左溪因恭禪師重研心法唯一無唯字十八種物行頭陀教厥後奉東陽威大師得最上乘詮第一義現聲聞像宏大覺心大一無大字無可名也偏袒跪膝奉觀音上聖願生兜率天親近彌勒殫罄衣鉢嚴具尊儀焚香稽首則舍利降靈光發寺非正陽屋宇凋落殿移則像毁財匱則力難一作難左溪錫杖指揮工人聽命如從舊貫一作館儼若天成心不離定中口不嘗藥味耄期之嵗同於壯齡告門人曰吾六印道圓萬行無得戒為心本汝一作爾等師之天寶十三載九月十九日就滅春秋八十二僧一無僧字夏六十一一作四四輩號慟如慕如疑香花一作木幢雷動山谷鄉人或夢左溪居寶一作寶閣第四重者窹告其鄰與之夢協兜率天者第四天也願力所屆度廣人天既茶毗巳門人闕建塔于左溪遵相法也城邑之人願獲親近分半舍利起塔於州某原申永慕也左溪假在深山衣弊食絶布紙而衣一作綻掬泉而齋如繒纊之溫均滑甘之飽誦經則翔禽下聽洗鉢則騰猿跪捧一作群猿來捧宴坐一室如一作同法界之樂一作大蕭然一院等他方之逰或問曰萬行皆空云何苦行對曰本無苦樂妄習為因衆生妄除我苦隨盡又問曰山水自利如聚落何對曰名香挺根於海岸如來成道於雪山未聞籠中比大遼廓至若旱蛙躍流瞽犬能視雲雷興而獵者捨弓矢鱗介絶而漁者壞曾梁舉其晫一作倬然曷可殫載弟子衢州龍邱九嵓寺道賓越州法華寺僧法源僧神雍本州靈隱寺僧玄靜一作淨棲嵓寺僧法開蘇州報恩寺僧道尊菩薩僧開左溪之祕藏常州福業寺僧守真杭州靈曜寺僧法澄靈隱寺僧法真明州天寶寺僧道原一作源淨安寺僧惠從本州開元寺僧清辨純得醍醐飽左溪之道味入室弟子本州開元寺僧行宣常州妙樂寺僧湛然見如來性専一作傳左溪之法門新羅僧法融理應英純理應歸國化行東表宏左溪之妙願一作順菩薩戒弟子傳禮王光福等菩薩一作提惠芽霑左溪之一雨清辨禪師等荷瞻遺烈見請斯文銘曰慈作磁石湊金澄流見月法與心起緣隨定或作足設衆生未度我為舟筏將如趙代空一作豈望荆越趨道云何知之在行殈煩惱􅙿歸一作開寂滅城不住之住無生之生兜率天樂徘徊下迎瀛洲左溪東入蒼海青松白月人亡地在四輩盡哀時乎不待頌德空嶺劫塵一作衣無改一作皆唐文粹潤州天鄉寺故大德雲禪師碑前人東南苾芻之上首曰長老雲公報年若干永泰二年某月日涅槃於潤州丹徒天鄉寺人天痛慕江海寂寥御史中丞韋公元輔史作甫頃臨潤州嘗申跪禮無何韋公兼觀察領浙西按部至京江來修謁問長老曰如來遺教付囑仁賢貧道有檀像一龕敬以相奉意深言簡聞者凄然韋公致别之明曰長老繩床跏趺無病而滅嗚呼至矣哉昔支遁與謝公為山水下疑衍之逰竺法師與王度為生死之約古今同道如見其人長老每言曰得天師於牧馬求善法於鬻香不可不敬樂羊以食子見疑苾芻以草繫成忍不可不仁智瑶死於大縣頂生退於什宫不可不亷留侯先期而黃石悅玄謀懇乞而觀音降不可不信學此四者以為教端內訓緇褐外化群品其餘觸類而長道遍恆沙長老法號法雲獲度於神龍之嵗俗姓申氏其先魏都之望出於薑姓左右宣王詩所謂惟嶽降神者也曽祖寧皇朝考功員外郎祖靖睦州遂昌縣令父儉不仕以復楚之忠烈相韓之勳伐蓄靈韜曜鍾美後人長老童丱入道誦法華經景龍嵗受具于本州龍興寺玄昶律師由是萬計俱圓名冠同列與鶴林絢律師偕往嵩頴求法於大照和尚以心眼視徹見無邉界果在掌中隨心舒卷喻菴羅熟終當自知此其端也道在兼愛故無棄物有志於道來問長老曰飲甘露者當淨其身有涉道未泓來問長老曰菩提為寶耶無知無德涅槃為空耶常樂我淨由是江景疑禪教有大照之宗焉至若願力所𢎞莊嚴佛教像飾同日月之照厨供盡人天之福積若山川流于他方凡聖去來緇素皆以天鄉為中路之化城也夫三界為牢鬼神同死使桎梏輪轉無解脫時佛性在煩惱之中佛身即衆生之體大法平等無所不同雪山滿月是為真語同音半字寧為妄説如來毫相始于東土菩薩求法遍在西方慈悲之間固非一致若乃昆明劫灰夏時同學化來周穆之嵗星隕魯莊之年甘泉金人之祀伊存浮圖之説謂之為妄則常情不測謂之為實則迂濶難明立定哀之時書隱桓時事慿魯史之文猶未之詳况超乎視聽之外出乎名言之域固宜然也國史傍録往往合符者則宣尼稱西方有聖玄老云吾師竺朝厥後感夢孝明漸於中國楚王英尤敦此道嘗奉縑贖罪詔曰王誦黃老之微言尚浮圖之仁祠潔齋三月與神而為誓其還縑以助伊蒲塞桑門之盛饌浮圖仁祠即塔廟也潔齋為誓即禮懴也伊蒲塞則優婆塞也至魏受禪洛陽宫中有浮圖毁除之沙門以佛舍利擲水生光由是移於道車廣開禪室僧會楊花於三吳惠持演教於三蜀震曜聾瞽無代之法壤也因蓋吳同亂之積其後也賴曇休堅持之誓自菩提達摩降及大照禪師七葉相乘謂之七祖心法傳示為最上乘南方以殺害為事北方多豪右犯法故大通在北能公在南至慈救愍曲無不至其餘則澄公威神止石羯之虐惠始定力悛赫連之暴淨檢尼部之初曇柯律藏之始道安垂範羅釋詮譯惠達道生闡教於廬匡杯渡寶志著異於江浙公之慈靈鎮攝智者之遵揚真極清膺昏季在壤尋舉稠公之衣而定興廢驗仲尼之記而崇建立唐撫運同符聖覺中州徼外人智如林玄莊無畏繼興夷憂疑作夏不可悉數舉甚疑作其殊尤長老既滅門人僧某等戒還本原智人無學以某月十六日遷定於鶴林寺西江湖晦冥道路悽慟初吏部侍郎齊潮採訪江東見天鄉殿宇傾圯孰尸完葺乃請禪師與絢公當謂寺僧乾最得堅固力求真實智乾元初奏請天下一一作二十五寺長講戒律天鄉即其一焉爾後率同心願善繕理禮部員外郎崔令欽常為丹徒宗仰不怠於何吳越震擾緇似竄伏長老挺身於戈劍之間宴坐於虎狼之口大浸不溺大火不焚天鄉獲全長老之力也韋中丞以句容令田少文悅長老之風宏無生教故托句容議辦葬事刺史韋公損奉善逝甚深之旨行菩薩廣大之慈大理司真兼丹徒令史坦惟爭道周如潤州者疑長之兄弟之子曰堂構為當代詞人修在家梵行與門人俾華贊德於萬斯年其文曰至哉玄德髙標法流法而不著行而不求輪王自在象寶調柔黑夜生月驚波起洲洲淪大浸日落中夜方外常在人間代謝性不遷易法無髙下億萬人天從吾受化從受化巳委順知時諸佛如是今得之清江朗月古人仁祠以我遺法為人導師文苑英華卷八百六十一
