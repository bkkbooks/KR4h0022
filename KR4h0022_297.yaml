body:
  text: 文苑英華巻二百九十七宋李昉等編行邁九奉使四十五首館驛十九首送袁員外宣慰勸農便集作畢赴洪州使院李嘉祐聖主臨前殿殷憂遣使臣氣迎天詔喜恩發土膏春草色催歸棹鸎啼為送人龍沙多道里流水自相親此詩二百七十一巻重出前巳削去送崔夷甫員外和蕃前人君過湟中去尋源未是賖經春逢白草盡日渡黄沙雙節行為伴孤烽到似家和戎非用武不學李輕車送陸珽侍御使新羅錢起衣冠周柱史才學我鄉人受命辭雲陛傾城送使臣去和滄海月歸思上林春始覺儒風逺殊方禮樂新重送陸侍御使日本前人萬里三韓國行人滿目愁辭天使星逺臨水簡霜秋雲佩迎仙島紅旌過蜃樓定知懷魏闕廻首海西頭送友人使河源賈至送君魯郊外下車上高丘蕭條千里暮日落黄雲秋舉酒有遺恨論邉無逺謀河源望不見旌斾去悠悠送作使巳見二百七十二巻皇甫曾送中丞和畨郎士元錦車登隴日邉草正萋萋舊好尋君長新愁聽鼓鼙河源飛鳥外雪嶺大荒西漢壘今猶在遥知路不迷送從兄使新羅顧况六氣銅渾轉三光玉律調河宫清奉賮海嶽晏來朝地絶提封入天平賜一作錫貢饒揚威輕破虜柔服耻征遼曙色黄金闕寒聲白鷺潮樓船非習戰騘馬是嘉招帝女飛啣石鮫人賣淚綃管寧雖不偶徐市儻相邀獨島縁空翠孤霞上泬寥蟾蜍同漢月螮蝀異秦橋水豹横吹浪花鷹迥拂霄晨装凌莽渺夜泊記招摇㡬路通員嶠河山是沃焦颶風晴汨一作泊起隂火暝潜燒鬢髪成新髻人參長舊苖扶桑啣日近析木帶津遥夣向愁中積魂當别處銷臨川思結網見彈欲求鴞共散羲和厯誰差甲子朝滄波伏忠信譯語辨謳謡疊鼓鯨鱗隱隂㠶鷁首飄南溟垂大翼西海飲文鰩文選吳都賦注文鰩常行西海而逰東海指景尋靈草排雲聽洞簫封侯萬里外未肯後班超奉和裴將軍使河北宣慰因訪張氏昆季舊居兼寄趙卿侍郎時趙卿拜陵未廻盧綸飛軒不住輪感激漢儒臣氣攝千夫勇恩儔萬里春古原收野燎寒笛響空隣書此逹良友杜陵風雨頻送耿拾遺括圖書使往江湘前人傳令收遺籍諸儒喜餞君孔家唯有地禹穴但生雲編簡還知緒蟲魚亦自分如逢北山隱一為杼移文逢南中使因寄嶺外故人前人見説南來處蒼梧接桂林過秋天更煖邉海日長隂巴路縁雲出蠻鄉入洞深信廻人自説夣到月應沉碧水通春色青山寄逺心炎方難乆客為爾一霑襟廵諸州漸次空靈戍戴叔倫寒盡鴻先去江廻客未歸早知名是幻不敢繡為衣霧積川源暗山多郡縣稀明朝下湘岸更逐鷓鴣飛送日本使還徐嶷絶國將無外扶桑更有東來朝逢聖日歸去及秋風夜泛潮廻際晨征莽蒼中鯨波騰水府蜃氣壯仙宫天眷何期逺王文乆巳同相望杳不見離恨托飛鴻送工部張曹長大夫奉使西蕃權徳輿殊隣覆露同奉使小司空西候車徒出南臺節印雄吊祠將握命導譯暢皇風故地山河在新恩玉帛通塞雲凝廢壘闗月照驚蓬青史書歸日翻輕五利功送人使之江陵得賞字前人嘉招不辭逺捧檄利攸往行役念前程讌逰暌舊賞征軺星乍動江信潮應上煙水飛一㠶霜風摇五兩紛紛别袂舉切切離鴻響後㑹杳何時悠然勞夣想送韋中丞奉使新羅得往字前人淳化洽聲明殊方均惠養計書重譯至錫命雙旌往星辭北極逺水泛東溟廣斗柄辨宵程天深宜晝賞孤光洲島廻净綠煙霞敞展禮盛賔徒交歡覿君長經途勞視聽愴别縈夣想延頸旬嵗期新恩在歸鞅送張閣老中丞持節册弔廻鶻前人旌斾翩翩擁漢官君行常得逺人歡分職南臺知禮重掇書東觀見才難金章玉節鳴騶逺白草黄雲出塞寒欲散别愁唯有醉暫煩賔從駐征鞍春日酬祭嶽瀆使大理盧卿自㑹稽廻經年將赴朝寄故林十二韻釋皎然望祀崇周典皇華出漢庭紫泥頒㑹計𤣥酒薦芳馨聖慮祈多祐齋心合至靈占祥形史祝一作竹筮日數堯蓂禮秩新加命朝章舊理刑敷城依北闕遺愛在西亭五袴歌仍詠三碑石重銘躊躇問存沒委曲向郊坰苕水曾同泛機疑作稽山昔共經清風門客仰佳頌國人聽奉使朝行月飛文夜動星征途回四牡遥戀故林青陪顔使君餞宣諭蕭常侍前人江淮凋瘵後逺使發天都昏墊宸心及哀矜詔命敷恤民驅急傳訪友枉飛艫外鎮藩條最中朝顧問殊文皆正風俗名共溢寰區巳事方懷闕歸期早戒途繁笳咽水閣高葢擁雲衢暮色生千嶂秋聲入五湖離歌猶宛轉歸馭巳踟蹰今夕庾公意西樓月亦孤白蘋洲送洛陽李丞使還前人蘋洲北望楚山重千里廻軺止一封臨水情來還共載㸔花醉去更相從罷官風渚何時别寄隱雲陽㡬處逢後㑹那應似疇昔年年覺老雪山容送遼陽使還軍李益征人欲且一作歌且行北上遼陽城二月戎馬息悠悠邉草生青山出塞斷代地入雲平昔者匈奴戰多聞殺漢兵平生報國憤一作意日一作月夜角弓鳴勉君萬里去勿使虜塵驚送歸中丞使新羅册立吊祭前人東望扶桑日何年是到時片㠶通雨露積水隔華夷浩渺風來逺虛明鳥去遲長波靜雲月孤島宿旌旗别葉傳秋意廻潮動客思滄溟無舊路何處問前期同前吉中孚官稱漢獨坐身是魯諸生絶域通王制窮天問水程島中分萬象日起轉雙旌氣積魚龍窟濤翻水浪新路長經嵗去海盡向山行復道殊方禮人瞻漢使榮同前耿緯逺國通王化儒林得使臣立君成典册行吊奉絲綸雲水連孤棹恩思在一身悠悠龍節去𣺌渺蜃樓新望裏山仍暮波中嵗又春昏明㸔日脚靈恠問舟人城邑分華夏衣裳擬縉紳他時命禮畢歸路不迷津奉送崔侍御和蕃萬里華戎隔風沙道路秋新恩明主啟舊好使臣脩旌節隨邉草闗山見戍樓俗殊人左袵地逺水西流日暮氷先合春深雪未休無論善長對博望自封侯途次近蜀驛蒙恩賜寶刀及飛龍馬使還日寄中書二相公見二百五十五巻武元衡送殷員外使北蕃楊巨源二軒將雨露萬里入煙沙和氣生中國薰風屬外家塞蘆隨鴈影闗栁拂駝花努力黄雲北仙曹有雉車送許侍御充雲南哀册使判官前人萬里永昌城威儀奉聖明氷心瘴江冷霜憲漏天晴荒外開亭候雲南降斾旌他時功自許絶域轉哀榮冬晩送友人使西蕃陳羽驛使向天西廵羗復入氐玉闗晴有雪沙磧雨無泥落淚軍中笛驚眠塞上鷄逢春鄉思苦萬里草萋萋送工部張侍郎入蕃吊祭時張兼修史劉禹錫月窟賔諸夏雲官向集作降九天飾終隣好重錫命禮容全水咽猶登隴沙鳴稍極邉路因乗驛近志為飲氷堅毳帳差池見烏旗摇曳前歸來賜金石榮耀自編年送兵集作工部蕭郎中刑部李郎中以本官兼中丞分命充京西京北復糧使霜簡映金章相輝同舎郎天威廵虎落星使出鴛行樽爼成全䇿京坻閲見糧歸來塞塵滅畫地奏明光送源中丞充新羅册立使侍中之孫前人相門才子稱華簮持節東行奉集作捧徳音身帶霜威辭鳯闕口傳天語到鷄林煙開鰲背千尋碧日浴鯨波萬頃金想見扶桑受恩後一時西拜盡傾心送邉使張籍揚旌一作旌旗過隴頭隴水向西流塞路見集作依山逺戍城逢雨集作笛秋寒沙隂漫漫疲一作瘦馬去集作歩悠悠為問征西將誰封定逺侯送邉使詩合在此巻安西將詩合在三百巻元本誤併為一今既正之又詳註三百巻中送新羅使前人萬里為朝使離家巳經集作今㡬年應知舊行路却上逺歸船夜泊避蛟窟朝炊取集作求島泉悠悠到鄉國還望到西天送金少卿副使歸新羅前人雲鳥茫茫天畔㣲向東萬里一㠶飛乆為侍子承恩重今佐使臣啣命歸過海便應將國信到家一作鄉猶自著朝衣從前此去人無數光彩如君定是稀送于中丞使廻紇册立賈島君立天驕發使車册文字字著金書漸過青塜鄉山盡欲逹皇情譯語初調角寒城邉色動下霜秋磧鴈行踈旌旗來往㡬多日應向途中見嵗除送田中丞使西戎同用旗字釋無可朝元下赤墀玉節使西夷闗隴烽廻首河湟雪灑旗磧砂行㡬月戎帳到何時應盡平生志高全大國儀送于中丞入蕃朱慶餘上馬生邉思戎裝别衆僚雙旌啣命重空磧去城遥迥出沙中樹孤飛雪外鵰蕃庭過册禮㡬日却歸朝送陳御史入蕃前人逺使隨雙節新官屬外臺戎裝非好武書記本多才歸使依泉宿迎人帶雪來心知玉闗道稀見一花開送册東夷王使馬戴越海傳金册華夷禮命行片㠶秋色動萬里信潮生日映孤舟出沙連絶島鳴翳空翻大鳥飛雪灑一作噴長鯨舊鬢廻應改遐荒夣易驚何當理風檝天外問來程送和北虜使前人路始隂山北迢迢雨雪天長城人過少砂磧馬難前日入流沙際隂生瀚海邉刀鐶向月動旌纛冐霜懸逐獸孤圍合交兵一箭傳穹廬移斥候一作冐頓𤇺一作候火絶祁連漢將行持節胡児坐控弦明妃的迴靣南送使臣旋送金夷魚一作吳奉使歸本國張喬渡海登仙籍還家備漢儀孤舟無岸泊萬里有星隨積水浮魂夣流年半别離東風未廻日音信杳難期送入蕃使周繇獵獵旗旛過大荒勅書猶帶御煙一作爐香滹沱河凍軍迴探邏逤城孤鴈著行逺寨風一作燒狂移帳幕平沙日晚卧牛羊早終册禮朝天闕莫遣虬髭染塞霜送王中丞使日東曹松辭天理玉簮揆日使鷄林獨有中華戀方同積浪深張㠶度鯨口啣命見臣心渥澤遐宣後歸期抵萬金奉使岐下聞唐宏夫行君為賊所擒傷而有作唐彦謙報國捐軀實壯夫楚囚垂欲復神都雲臺畫像皆何者青史書名或不孤散卒半隨袁校尉寡妻休問辟司徒聞君敗績無歸計氣激星辰坐向隅館驛聘齊秋晩館中丞酒庾信欣兹河朔飲對此洛陽才殘秋欲屏扇餘菊尚浮杯漳流鳴二水日色下三臺無因侍清夜同此月徘徊入彭城館襄君前建國項氏昔稜威鶂飛傷楚戰鷄鳴悲漢圍年代殊民俗風雲更盛衰水浮流磬動山喧雙翟飛夏餘花欲盡秋近燕將稀槐庭垂緑穗蓮浦落紅衣徒知日云暮不見舞雩歸宿襄集作讓河驛浦陳子昻沿流辭北渚結䌫宿南洲合岸昏初夕廻塘岸不流行聞塞鴈斷坐聽峽猿愁沙浦明如月汀葭晦若秋未及能鳴鴈徒思海上鷗天河殊未曉滄海一作江信悠悠早發苦竹館李嶠合沓巖嶂深朦朧煙霧曉荒阡下樵客野猿驚山鳥開門聽一作濟潺湲入徑尋窈窕栖鼯抱寒木流螢飛暗篠早霞稍霏霏殘月猶皎皎行㸔逺星稀漸覺逰氛少我行撫軺傳兼得傍林沼貪翫水石竒不知川路𣺌徒慚野心曠詎惻浮年小方解寵辱情永託累塵表貶降至汝州廣城驛鄭愔近郊慿汝海遐望一作服指江干尚憶趨朝貴方知失道難曙宫平樂逺秋澤廣城寒岸葦新花白山梨晚葉丹鄉闗千里暮嵗序四時䦨凾塞雲間白一作别旋門霧裏㸔夙年追騄驥暮節仰鵷鸞疲駕勞垂耳騫騰一作飛遽矯翰將調梅鉉實不正李園冠荆玉終無玷隨珠忽巳彈曉裝違鞏洛夕夣在長安北臨易傷阮西征未學潘傾車無共轍同𣲖有殊瀾去去懷知巳何由報一飡初到黄梅臨江驛宋之問馬上逢寒食途中屬暮春可憐江浦望不見洛橋人北極懷明主南溟作逐臣故鄉一作園腸斷處日夜栁條新此詩二百九十巻重出前巳削去注異同為一作登大庾嶺北驛陽月南飛鴈傳聞至此廻我行殊未巳何日復歸來江靜潮初落林昏瘴不開明朝望鄉處應見嶺頭梅題端州驛寄杜審言王二無競前人逐臣北地承嚴譴謂到南中每相見不覺南中岐路多千里萬里分鄉縣雲隨雨散各翻飛海濶江長音信稀處庭山川同瘴癘自憐能得㡬人歸盧巴驛聞張御史張判官欲到不得待㽞贈之張說旅竄南方逺傳聞北使來舊庭知玉樹同浦識珠胎白髪因愁改丹誠偶集作説夣廻皇恩若何冄集作冄造為憶不然灰以下十一篇並見集本深渡驛前人旅泊集作宿青山夜荒庭白露秋洞房懸月影高枕聽江流猿響寒巖樹螢飛古驛樓他鄉對摇落併覺起離憂此詩二百九十巻重出前已削去還至端州驛前與高六别處前人舊館分江口凄然望落暉相逢傳旅食臨别換征衣昔記山川是今傷人代非往來皆此路生死不同歸候使登石頭驛樓作張九齡山檻憑南望川途渺北流逺林天翠合前浦日華浮萬井縁津渚千艘咽渡頭漁商多末事耕稼少良疇自守陳蕃榻甞登王粲樓徒然騁目處豈是獲心逰向跡雖愚谷求名亦盗邱息隂芳木所空復起集作越鄉憂文杏館王維文杏裁為梁香茅結為宇不知棟裏雲去作人間雨永嘉上浦館逢張客卿孟浩然逆旅相逢處江村日暮時衆山遥對酒孤嶼共題詩廨院隣蛟室人煙接島夷鄉闗萬餘里失路一相悲奉濟驛重送嚴公杜甫逺送從此别青山空復情㡬時盃重把昨夜月同行列郡謳歌一作歌謡惜三朝出入榮江村獨歸處寂寞養殘生山館前人南國晝多霧北風天正寒路危行木杪身逺宿雲端山鬼吹燈滅厨人語夜䦨鷄鳴問前館世亂敢求安通泉驛南去通泉縣十五里山水作前人溪行衣自濕亭午氣始散冬温蚊蚋在人逺鳬鴨亂登頓生層隂欹傾出高岸驛樓衰栁側縣郭輕煙畔一川何綺麗盡目窮壯觀山色逺寂寞江光夕滋漫傷一作知時愧孔父去國同王粲我生苦飄零所歴有嗟嘆荅裴侍御先行至石頭驛以書見招期月滿泛洞庭李白君至石頭驛寄書黄鶴樓開緘識逺意速此南行舟風水無定凖湍波或滯留憶昨新月生西簷若瓊鈎今來何所似破鏡懸清秋恨不三五明平湖泛澄流此歡竟莫遂枉殺王子猷巴陵定逺近持贈解人憂題宛溪館前人吾憐宛溪好百丈集作尺照山集作心明何謝新安水千尋見底清白沙㽞月色緑竹助秋聲却笑嚴湍上于今獨擅名文苑英華巻二百九十七
