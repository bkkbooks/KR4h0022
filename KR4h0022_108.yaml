body:
  text: 文苑英華卷一百八宋李昉等編器用七白羽扇賦一首扇賦一首雉尾扇賦一首翟扇賦一首六角扇賦一首畫桐華鳳扇賦一首竹如意賦二首麈尾賦一首有即席探得麈尾賦一首金剪刀賦一首瓢賦二首白羽扇賦并序張九齡開元二十四年夏盛暑一有奉字敕使大將軍髙力士賜宰臣白羽扇九齡與焉竊有所感立獻一作進賦曰當時而用任物所長彼鴻鵠之弱羽出江湖之下方安知煩暑可致清涼豈無紈素彩畫文章復有修竹剖析毫芒提擕密邇搖動馨香惟衆珍之在御何短翮之敢當預一作而文椊作與竊恩於聖后且見持於未央伊昔臯澤之時爾一作亦有雲霄之志苟效用之得所雖殺身而何忌肅肅鳥一作白羽穆如微風縱秋氣之移奪終感恩於篋中批答朕頃賜羽扇一作朕頃賜扇聊以滌暑卿立賦之且見情素詞髙理妙朕詳之矣然嘉彼徑翮方資利用與夫棄捐篋笥義不同也參用集本及文粹校定扇賦田鶴若夫暑氣綿綿炎光赫然毒衝心而氣盡汗匝背而珠漣是日何貴兹扇為先匠者呈巧所重惟素疑織飛禽而寫妙規曉月以成圓葉隨意出花逐情妍飾金翠而作彩緻膠漆以期堅爾乃題竹流譽贈葵稱美雖見重於人臣未承恩於天子曷若充歲貢隨篋篚比德進賢齊芳獻雉徙倚君側徘徊宫裏揮拂涼來動搖風起逢陽氣而不息遇重隂而暫止心素何所欲常愁歲月馳珠簾秋氣滿羅幌曉風吹中道恩既歇棄捐誰見知雉尾扇賦并序裴振客有薦雉尾扇要豫作賦豫亦感於心遂命紙筆詞曰吁嗟名翬兮誰喪爾躬吁嗟名翬兮我愛其尾何不作於三嗅乃見傷於一矢當遭恱妻於大夫不值仁心於孺子凋骨肉於俎豆翦羽毛於錦綺雖蒙玩於翠翅無復刷其丹觜今屬聖人布命王道克理解羅者之目攦工倕之指我欲請造物復爾之生許虞人追爾之死且王者三驅爾供庖厨王后六衣爾為光輝爾毛既美爾膚既肥為薦廟之用昭媒翳之機誠不顧樊籠之習習又安得林麓之飛飛當昔五步一啄十步一飲選地而遊擇木而寢固將保羣雌以比翼豈知遭鳴髇之碎錦已矣哉彼龜何辜其腹將刳乃願掉於泥塗彼雞何知方論其肥乃自斷於郊犧至如千人操萬人歌不如休於桃林之阿復有青絲絡黃金裝不如放於華山之陽身死命絶魂銷魄亡永别儔侣長辭故鄉雖復氛氲綺席窈窕紅粧間以彩翠盛以筐箱百常之臺刻月九華二扇名之扇凝霜獨不及疇年之澤畔昔日之山梁悲夫翟扇賦以輝列崇殿明照初日為韻郭遵前王之立制也取象於明翬森然如六翮之布煥乎分五彩之輝其位也夾輔於皇極其用也咫尺於天威故歷代奉之而不替我后行之而不違若夫朝彥晨趨天仗宿設分鴛鷺而式斜儼貔貅而成列視容具瞻誠意咸竭司儀克仰之以取則對揚必候之以為節禮斯恭敬斯崇倐傳詔而初合知大君之居中俄承命而復啓見天顔之在空謂儀鳳於烟閣若飛龍於霞宫列丹楹之左右分玉扆於西東爛兮方照其朝景颯然如度其薰風光彩絢練羽儀廣殿接鈞天以成形洎億兆而咸見髙其中也如捧聖日於雲霄散而行也似扇皇風於㝢縣當合朝之滿盈闢凝旒於穆清無謂其求進也所以應時而至待命而行無謂其速退也示不敢蔽人之望掩君之明既進退而有則在行止而何情且蔚其文寧以自耀布其彩非其競照象舞羽於舜階異總干於周廟輝映皇居間列綺疏來若鱗萃去如翼舒指北辰之期可久侍南面不替其初故先君而出待朝而畢合儀不爽其疾徐舒布亦獲其疏密前拂瑞氣傍臨旭日永效用於君前願竭盡其微質矣六角扇賦以右軍書之可以求價為韻陸遵扇有異體六角其尤雖嘗巧而是鬻非好奇而不求故須借聲於墨工之類假手於札家之流伊彼姥矣禆販是以鏤竹於蕺山之陽求錢於越人之市柄一條而有象形六折而難擬翳杲日規模莫成搖清風綺紈不已逸少遇諸濡翰而書兩行而露垂花散五字而龍盤鳳居絶筆以授髙價是就觀之者雲集售之者輻凑騰驤乎六體之先彈壓乎九華之右既而厥價載殷厥聲載聞賈之者但慙於老婦鬻之者寧忘於右軍且手非扇之所題扇實手之所藉一自以翳飛塵一自以防朱夏何握提之見投而毫芒之忽借既盡擕之之妙亦長鬻之之價是知物不自貴惟人貴之向使松煙不染翠管不持則是扇也入晉鄽而陋賤彼老姥也同班妾之見遺又安得用六角之善獲五銖之資哉嗟乎小因大而事罔不行美加醜而用無不可故扇待書而色貴人假扇以財夥姥曰右軍惠而好我畫桐華鳳扇賦并序李德裕成都夾岷江磯岸多植紫桐每至春暮一作暮春有靈禽五色小於𤣥鳥來集桐華以飲朝露及華落則煙飛雨散不知其所往有名工繢於素扇以賚稚子余因作小賦於上者也一作書於扇上桐始華兮緑江曙粲鮮葩兮泣一作浥清露樹煜煜兮霞舒鳥爛爛兮星布彼嘉桐兮貞且猗當春暮兮英葳二字一作發英蕤豈鵷雛兮一作之珍族久一作又棲託乎瓊枝彼零露兮甘且白涵曉月兮灑鮮澤豈青鳥之靈儔常飲吮兮一作乎玉液有嘉穀而不啄有喬松而不適獨美露而愛桐非人間之羽翮逮華落而春歸忽雨散而川寂悵丹穴之何逺想瑶池而已隔爰有妙工圖其麗容宛宛兮若飱珠於芳蘂飄飄兮疑振翠一作羽於光風感班姬之素扇空皎潔兮如霰亦有美人增華㸃絢雀伺蟬而輕騖南朝畫扇尤重蟬雀女乘鸞而微眄未若繢兹鳥二字一作斯禽於珍箑動涼風於羅薦非欲發長袂之清香掩短一作清歌之孤囀庶玉女之提擕列崑墟之𤣥一作瑶宴乃為歌曰東風二字一作青春晚兮芳節闌敷紫華兮䕃碧湍美斯鳥一作兹禽兮類鵷鸞具體微兮容色丹彼飛翔於霄漢此藻繪於氷紈雖清秋之已至常愛玩而忘餐一作皆集本竹如意賦以簡素輕易適手便人為韻李德裕博哉匠人之心窮地之産覽如意之形製實用周而事簡惟竹也何慕實存乎貞素伊篠簜之既敷持斧斤而方顧擇其罕節稽此有裕燥之以火首之曲也中鈎裁之以金本之長也合度蒨練氷削䙰褷瓜布靡加雕飾之勞卒獲提擕之遇被以嘉名允臻厥成匪求榮觀自愜幽情彼用玉之為寶我則不謝其貞彼用鐵以為固我則利在乎輕指事明義此焉攸寄執之者安創之者智巾几周用丘園其賁外青中素合二妙於隂陽尚質貴誠符兩儀之簡易爾乃林栖冲寂室處虛白羣義窟之黨速道流之客發奧滌𤣥遐鈎獨索必資振擊以聳聽常假指麾而就適則知好麈尾者將害物以嬰咎執象笏者徒徇祿而何有用惻於心亦勞於手既因時而能遷在理順而體便素質或輕於流俗貞姿或重於髙賢故貞其形則示屈而表伸致其用則物疏而道親豈節歌於烈士可投贈夫幽人願如君意以靡極與靈夀而為鄰第二同前韻蘇子華嗟夫約物之製智不可限利用則深論工太簡彼如意之在御得幽賞之餘裕雕飾非駭目之珍雅麗乃捎雲之簵絲柄玉質瓜首氷素啓嘉論之要端導指蹤之𢎞度原其性也靈而貞度其體也堅而輕倚鮮膚而烟潤掉皓腕而風生升堂間乎琴瑟入座偶乎簪纓荷親仁之重顧承在握之深情羣幽人之居既挺乎髙節如君子之義因錫以嘉名工以盡智明乎所為樂貴聲和禮存體易唯此物之閒素通達人之深義不擊寶樹而爭毫經云毫豪通用豈埋金陵而自纍衆媚彩而求益我全真以自適㸃珠翠之華筵宜幽捷疑作棲之烟策雖小曲而受用終大正而不易動息含舒散之情拂拭滅風塵之跡信而可久直而不朽每發四座之先不起一人之後亮無心以應物寧效事而我有擢本歸造化之工死節順操持之手嗟乎在野之年亭亭碧鮮泫空中之墜露掃石上之輕煙紆巧思以規規疑愜幽心而靜便永以暢君之肌骨永以奉君之周旋亦有居守之臣感時之倫分御服而恩甚擊唾壺而命迍胡一否而一泰因歌之於古人麈尾賦并序陳子昂甲申歲天子在洛陽時豫始解褐守祕書省三字一作麟臺正字太子司直宗泰客置酒於一無此字金谷亭大集賔客酒酣共賦席上之食物豫為麈尾賦焉天之浩浩兮物亦云云老子作芒芒性命變化兮如絲之棼或以神好正直天監一作蓋默默或以道惡強梁天亦茫茫此仙都之微獸因一作固何負而罹殃始居幽山之藪食夫一作乎豐草之鄉不害物以一作而利已每營道而同方何忘情以委代而任性之不忘卒罘網以見逼受庖割而罹傷豈不以斯尾之有用而殺身於此堂為君雕俎之羞厠君金盤之實承主人之嘉慶對象筵與寶瑟雖信美於兹辰詎同歡於疇日客有感一有之字而歎曰命不可思神亦難測吉凶悔吝未始有極借如天道之用莫神於龍受戮為醢不知其凶王者之瑞莫聖於麟遇害於野不知其仁神既不能自智聖亦不能自知况林棲而谷走及山鹿與野麋古人有言天地之心其間無巧冥之則順動之則天諒物情之不異我心又何競於猜矯故曰天之神明與物推移不為事先動而輒隨是以至人無已聖人不知豫欲全身而逺害曾是浩然而順斯凡一作皆集本有即席探得麈尾賦陸龜蒙謝文靖桓宣武王東亭郗北府相與叩易論𤣥驅今駕古散入神明之賾中稽道德之祖理窟未窮詞源漸吐支上人者浮圖其形左擁竹杖支遁有度世竹杖右提山銘支遁嘗著天台山銘於焉就席一作坐兀一作引若潛聽俄而齧缺風行逍遙義立不足稱異才能跂及公等盡矚當仁咸云俯拾一無此十字上人一作道林乃攝艾衲而精爽捉犀柄以揮揖天機發而萬物一作目張大壑開而百川入於戲一作嗟乎世路欹一作崎斜藏訛匿一作掩瑕陽矜莊而靜默暗奔競而喧譁貞襟枳一作柴棘奧㫖泥沙雖然絶代清談客致一作置此聊同王謝家凡一作皆集本金剪刀賦梁洽金剪刀者奚其有情柔而能决堅而能貞表裏洞徹上下鮮晶缺處磨盡鋩間淬成長鋒貯其煙色秀色奪其霜明值凝寒則徑質加勵霑微潤則青衣半生雙刃回合兩稜㩻傾閟之而綵縷皆隱用之而畫尺常并及其春服既裁寒衣欲替隙光入座蟠蛟龍於影中暝色浮階下星辰於環際且夫小而輕生閨閣之幽情新而利為房櫳之名器開玉匣則飛光射人落銀床則喧聲碎地色綵滿篋細錦盈箱推妙便製擇賢而當豈顧常規而在凖不徒借美而多傷方須取拾合時短長有若欲去纎過不遺片善貪寸美而寬裁避一花而斜剪紕繆者退之而自慙縟繡者進之而自勉莫不賞兹器之能荷情人之妙選矣瓢賦崔曙送子清酤挹兹瓢杓杓為器用勢本天作生也綿綿長非濩落工雖能而莫騁賔有量而是度外象招搖中虛橐籥泛然無繫似為客之漂流浮而不沉如從事之鳴躍許何挂而厭喧顔何飲而為樂傳一杯之引滿更百壺之竭涸倘遇主人之深恩敢忘此堂之斟酌第二以豈徒用乃可珍為韻韋肇器為用兮則多體自然兮能幾惟兹瓢之雅素禀成象而瓌偉安貧所飲顔生何愧於賢哉不食而懸孔父嘗嗟夫吾豈離方葉配金壺雖人斯造製而天與規模柄非假操而直腹非待剖而刳靜然無似於物豁爾虛受之徒黃其色以居貞圓其首以持重匪憎乎林下逸人何事而喧可惜乎樽中夫子寧拙於用笙匏同出詎為樂音以見奇牢卺各行用謝婚姻之所共受質於不宰成形而有待與簞食而義同方杯飲而功倍省力而易就因性而莫改豈比夫爾戈爾矛而勞乎煆乃礪乃於是薦芳席娛密座動而委命雖提挈之由君用或當仁信斟酌而在我挹酒漿則仰惟北而有别充玩好則校司南以為可有以小為貴有以約為珍瓠之生莫先於晉壤杓之類奚取於梓人昔者滄流曾變蠡名而願測今兹廟禮請代龍號而惟新勿謂輕之掌握無使辱在埃塵為君酌人心而不倦庶反朴以還淳文苑英華卷一百八
