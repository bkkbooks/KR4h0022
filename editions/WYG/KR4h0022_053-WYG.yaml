body:
  text: 文苑英華卷五十三宋李昉等編苑囿朝㑹靈囿賦一首九城宫東臺山池賦一首太平公主山池賦一首集賢院山池賦一首叔孫通定朝儀賦一首南蠻北狄同日朝見賦一首朝呼韓邪賦一首周公朝諸侯於明堂賦一首靈囿賦以仁及禽獸恵均樵牧為韻徐元弼代間秦餘地仍周舊俯皇都之近域有文王之古囿遥縈林麓之表逺抱川原之秀沼莫辨於窮流臺靡遺於層構往往歸鳥依依顧獸逄時之慶雖鍾思古之懐亦疚當昔周徳資始靈臺是新繚以斯囿洽其至仁使芻牧畢入而獝狘皆馴目以靈知感通於異類大其囿見恵洽於蒸人固以垂耿光本亭育無私公共而有俟一作候勿亟子來而以築不麛不卵仁叶於羽毛以薪以蒸恵昭於郊牧覆露功溥誠明感深遂天性於物性即人心於已心白鳥不驚匪觀於狎物非熊已兆奚事於從禽嗟乎遺址全平餘風可挹想千古之蹤未昧歎三代之英不及猶欲恣窺臨淹佇立㣲茫似隔乎烟水邐迤半臨於井邑見魚躍想坎窞於泉流聞鹿鳴訪陂池於原隰竟以隂壑蕭條荒榛寂寥無人試問有路通樵悵望風烟之景沉吟黍稷之苖今國家以榮古為心宗周是繼且欲儲休祉降嘉恵園苑資靈囿之規宫室擬靈臺之制是以愛物之誠溥好生之徳均仁政潛施於上苑之内靈徳已播於率土之濵然簡弋逰於暇日縱芻詞於賤臣稽制度於盛王百里猶小嗣風流於前古千載為隣九城宫東臺山池賦并序王勃九城宫東臺地接閒曠面山臨水爾其松峯桂壑紅泉碧磴金石千聲雲霞萬色侍郎張公雅思沉鬱永懐梓匠式侔仙造聿構靈㕓仙流成止水之源拳石儼干霄之狀雖流波覆簣俯藉人機而布葉攅花妙同天繪僕因暇日濫奉清埃敢抽南畝之才聊叙東山之事云爾若夫金臺妙境玉署仙居酌丹墀之曉暇候青禁之宵餘馳沖情於月道飛峻賞於烟墟指山楹而思逸懐水鏡而神虚既而仰瞻頳嶠傍窺黛壑複嶂烟迴攅溪霧錯偉沉用之兼濟想神功之可作規疊巘於盤龍憲飛泉於掛鶴覆簣而營巖磴浮芥而環州􅔌採拳石於瑤濵搴纎珠於綺薄萍徙楚江之蔕花轉崑墟之蕚岫藴玉而鴻驚浦涵珠而星落美仁智之同歸信髙深之縱托爾其危岑漏景曲渚留寒高松偃鶴清篠吟鸞被蘭丘而結佩照蓮服而披冠激坳堂於别溆引膚寸於危巒若乃嶺分雞秀波連鳳液花鳥縈紅蘋魚漾碧緑衣𤣥祍頳鱗翠額在林藪而同驩望江湖而齊適毎至景沉西㠋月下東濵峯深夜久潭静秋新荷抽水蓋薜引山茵雪芝獻液露菊傾津嗣南商之逸興有東海之遐賔保林泉而肆賞混簮紱而同塵何濯纓之有地如攀桂之無因太平公主山池賦宋之問粤若公主祗生集作誕生皇家太平徴郡國以選號叶時雍之美名孕靈娥之秀彩輝婺女之淳精虹美電熠蘭香玉清禀金后之𤣥訓係列聖之聰明厭綺羅與絲竹愛瑶池及赤城構僊山兮既畢侔造化之神術其為状也攅怪石而岑崟其為異也含清氣而蕭瑟列海岸而争聳分水亭而對出其東則峯崖刻劃洞穴縈廻乍若風飄雨灑兮移鬱島又似波沉浪息兮見蓬萊圖萬重於積石匿千嶺於天台荆門掲起兮壁峻少室藂生兮劍開削成秀絶蓮華之覆髙掌獨立窈窕神女之戱陽臺爾其樵溪釣浦茅堂菌閣秘僊洞之瑶膏隠山家之場藿煙岑水涯繚繞逶迤翠蓮瑶草的礫分被映江潯而爛爛浮海上而纍纍迺之罘與衡霍豈吾人之所為向背重複参差反覆翳薈䝉龍含青吐紅陽崖奪景隂壑生風竒樹抱石新花灌藂向若天長地久兮苔蘚合古往今来兮林澗空始燕秦而開徑訪靈藥乎其中其西則翠屏嶃巖山路佶曲髙閤翔雲丹巖吐緑忽兮恍渉弱水兮至崑崙杳兮宜乗龍梁兮向巴蜀壮岷嶓兮連属鬱氛氲兮斷續巖虚兮谷峻藏清兮蓄韻含珠兮藴玉衆彩兮明潤芳圍暮兮白日沉爽氣浮兮黛壑深風泉活活兮鳴石葛藟青青兮蔓岑羅八方之竒獸聚六合之珍禽别有複道三襲平臺四注跨渚兮交林蒸雲兮起霧鴛鴦水兮鳳凰樓文虹橋兮彩鷁舟山池成兮帝子逰試一望兮銷人憂召七賢集五侯棹浦曲席巖幽鳴玉佩兮登降列金觴兮獻酬未窮觀而極覧忽雲散而風流於是乎上客既旋重扃嚴閉榜童儼而高登綵女分而為衞牽水葉兮張水嬉摘山花兮詠山圻燕姬荆艶兮代所稀鳳舞鸞歌兮儼欲飛披烟弄月兮宵未歸桂枝清霧兮濕羅衣奕奕濟濟夜旋玉邸隠隠崇崇朝趨帝宫銀鑪翕習烟生霧集絳節繽紛揚光吐文行軒即水去馬勝雲鏘鏘翼翼兮馳丹闕超超遥遥兮向紫氛寵極兮慈掌情勤兮幽賞戀宸扆兮出入憶幽山兮来徃採朱蕚兮山之側歩蘭庭兮候顔色掇緑蘋兮于澗潦宜室家兮叶仇好既而貞心内潔淑則逺傳詼談者聞之而必勸􅆙薄者聞之而凛然况復淮王招隠秦主随僊㺯子房之琴瑟驅碧落之風烟賔屈宋於珠履引鄒枚於玳筵秋葉飛兮散紅樹春苔生兮覆緑泉春秋寒暑兮嵗榮落林巒沼沚兮日芳鮮吾君永保南山夀車馬往来千萬年太平公主山池賦禀金后集作禀于后聦明集作聦英岑崟集作嶔崟樵溪集作樵頭分被集作分披映江集作景江生風集作藏風向若集作杳若始燕秦而集作兮翔雲集作翔風乘龍梁兮龍集作飛芳圍集作芳圃忽雲散而集作兮髙登集作齊發綵女分集作合燕姬集作妹清霧集作清露朝趨集作朝還馬勝雲集作騰雲子房集作紫房瑇筵集作象延集賢院山池賦杜顗鬱乎羣賢之林有山其秀有池而深幽流淡泞蒼翠嶔崟千門下隔三殿旁臨引彤庭之佳氣涵碧樹之清隂連綿芳草逰泳仙禽對石渠之鉛粉㑹金馬之衣簮宛雲霞而在目𦕈江海而為心何扁舟之獨往何倒影之逺尋懐我魏闕浩爾長吟山池之隂可以清吾襟山池之所可以狎吾侣凉風忽起白雲時舉歩苔岸之周流藉松溪之積阻邈矣幽興颯然清暑乃登玉巒撫金渚圗書載暇纓弁以序此焉逰處於兹宴語發菱花而不能歸攀桂枝而久延佇日落池上雲無䖏所爾其秋風既起秋興爰至見䕨篠之幽娟㺯石泉之明媚禁林餘雨増曲霤之華清御苑晴烟借遥巖之積翠是以洗雪煩想優㳺雅思嗟乎山中人兮猶未識池上蛟兮焉可得顧蘭芳與菊滋從此賞兮無極朝㑹叔孫通定朝儀賦以制㝎朝儀上尊下肅為韵白居易集無稷嗣君上稽天命下察人聽以為作樂者存乎功成制禮者本乎理定故易尚随時禮貴從宜于以致理何莫由斯允矣君子休哉令規採三代之帝典起兩漢之朝儀于斯時也秦吞六䧺之後漢承百王之弊禮壊樂崩上陵下替將欲剏洪業尊皇帝馴致王道丕革季世莫先乎正位以經邦體元而立制者也夫其將用於國先習於野辨度數於聲明文物審等威於君臣上下儒生肅以濟濟物有其容國典煥其煌煌禮無違者然後闢雙闕㑹百僚動必嚴恪進無諠囂長㓜之序不忒貴賤之儀孔昭鏘鏘兮若萬國赴塗山而㑹秩秩兮如百官仰太一而朝嵗十月天地澄爽宫殿清曠風傳警蹕日麗天仗於是右陳列辟左立丞相東西分而則别文武儼以相向簮裾奕奕頌鵷鷺之具寮劍㦸森森列熊羆之名將帝容式展皇威克壮莫不上恭已以臨下下竭誠而奉上觀其威儀允淑容止具篤天子負鳳扆以皇皇正龍顔而穆穆百辟欣戴九賔悅服㧞劍者懲懼而慄慄飲酒者敬慎而肅肅故知君有威故能守其邦臣有儀所以保其禄帝謂叔孫舊章斯存可以發揮我洪徳啓迪我後昆方將守而經國豈止煥而盈門不然何以表一人之貴知萬乗之尊南蠻北狄同日朝見賦以渡瀘欵塞咸造闕庭為韻穆寂我皇道叶神化功髙睿算萬國之廣斯臨八聖之業是纂遐哉窮髪之俗既竭赤誠逷爾椎髻之人亦輸丹欵豈不以隂陽煥乎金鏡律吕諧乎玉琯徳該動植而以信以寛仁及飛走而不麛不卵故得殊方述職異俗来庭歸我𤣥造沐我皇靈曉逾赤坂以向日夕過白登以占星磧路誠遥委毳幕氊裘之質山梯雖險致穿胸儋耳之形然則自南自北或馳或渡俱為九譯之鄉各渉萬里之路同臻禁地事且叶於不期并列盛時禮若符於有素是以坦王道恢帝圖蕩然與龍山非隔廓爾將鳳穴靡殊集六蠻而輝赫九域萃五狄而光耀八區邇無不賔鄙周宣勤乎薄伐逺無不服笑諸葛矜於渡瀘遂能革至性於方外柔獷俗於面内大行人明其近逺懐方氏導其進退靡僣晷刻既從荔浦之源罔復斯湏爰自榆林之塞有以見化溢含𢎞恩覃覆幬膳豐舘給禮洽郊勞孰云胡越之異來若同心且殊虞芮之争㑹如兩造以其踰絶漠逗懸巖蓋由君邁軒轅顓頊臣掩伊陟巫咸不然則焉能抵秦川來魏闕皆展遐方之貢獻共備同日之朝謁者哉第二同前韻王起我皇制百蠻以徳輝刑八狄以威靈俾曠代之絶域同一日而来庭則不叛不侵知遐邇之無外自南自北昭聲教之永寕惟蠻也荒陬有倔强之號惟狄也絶漠有桀黠之暴辭炎徼應感而偕来謝穹廬不期而兩造上乃御正殿臨中區文物有耀聲明以殊小周王之賔肅慎卑漢后之享單于於是卉服雲集旃裘風趨駿奔而逺無不届麏至而實繁有徒垂衣而朝三表自慙於制虜止戈為武五月孰矜其渡瀘百辟式瞻九儀以配寕有截而斯暢儼無譁而相對獻琛盡禮雜彩服以和光蹶角展容望珠旒而欣戴若非越荒徼踰紫塞則南同魚鱉安得仰龍章於舜年北喻豺狼未可親獸舞於堯代是知歴寒鄉之觱發欽百度兮無闕忘沓嶂之嶄巖彰九區兮克咸聖上惟北辰之位是纉匪南面之尊自滿窮髪斯服雕題無算仰天威以懐柔化夷徳為悃欵盛禮畢具幽遐既慕同寅協恭兮斯親在逺如邇兮斯赴始差肩于著定之位終收跡於夐絶之路史臣書曰美異俗而同臻象斯華而合趣則昔有梯山驟至航海徑渡無蠻狄入覲之遇朝呼韓邪賦以煥乎盛儀遐掩前古為韻失名倬哉惟漢至徳鴻融元功絢焕敷仁義於異域俾華夷而同貫故能臣匈奴来單于超沙漠越余吾弃窮廬而雲起望髙闕而風趨屈膝而来有以見其蠢爾垂拱以待是用表于巍乎况當行幸祠祀之禮崇甘泉泰畤之儀盛肅肅乎萬物是備昭昭乎威容既正象胥以譯豈言語之不通司儀式班示進退之必敬然後差行列辨尊卑序璧羔皮帛之等第示要荒守衛之威儀冠帶之容間彼荷氊被毳韶濩是作雜夫僸佅兠離雍容之禮有則倔强之心不施𤣥塞永安寕蝟起兮於彼青蒲方奏猶蟻伏而在斯信純化之雲布俾逺戎之星馳不然何以其國則賖其人不遐修臣之節為國之華朝一人於㝢縣渉萬里之窮沙則周公明堂之儀寕九采之足美而夏禹塗山之㑹雖萬國而何嘉且夫懐我有方所由者漸徳之為被我不可掩非慕義而有求奚尊君之自貶是知撫御之道莫善於漢宣威儀之設莫盛乎甘泉美舞徒稱乎干羽鏤勲何媿於燕然布令陳辭之義行豈事成而後樹引領稽顙之容作乃瞻之而在前自可光九功服九土曠萬代而一時宜耀今而榮古周公朝諸侯於明堂賦以九垓向序外方同心為韻謝觀赫赫明堂居國之陽巍峩特立鎮壓殊方所以施一人所以朝萬國諸侯王面室有三總數惟九間大廟於正位處大室於中霤啓閉乎三十六户一作扉羅列乎七十二牖左个右个為季孟之交分上圓下方法天地之竒偶時也六年之初孟春之首有截而至無脛而走将欲交正於成王之命所以立辟于周公之手洞八闥以臨八極闢四門而来萬有所司􅊀班品於庭除執事肅文物於前後及夫諸位散設三公㝡崇當中階而列位與羣臣而不同諸侯東階之東西面而北上諸伯西階之西東面而相向諸子應門之東而鶚立諸男應門之西而鶴望戎夷金木之户外蠻狄水火而位配九采外屏之右以成列四塞外屏之左而遥對朱干玉戚森聳以相參龍楊豹韜抑揚而相偝肅肅沉沉巒崇壑深烟收而卿士齊列日出而天顔始臨戴冕旒以當軒見八紘稽顙負斧扆而南面知萬國歸心於是鏘金石揚律吕動塤篪摇柷敔儼若思而山立悄不言而鴈序一拜一起嶽抃而齊傾舞之蹈之雷屯而復舉俄而翠華轉仙仗廻恩覃率土化溢九垓合蠻貊以畢至盡梯航以爰來彼禹有大室武作靈臺曷與此而同哉文苑英華卷五十三
