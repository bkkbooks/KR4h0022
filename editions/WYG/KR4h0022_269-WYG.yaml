body:
  text: 文苑英華巻二百六十九宋李昉等編送行四杜甫十三首李白二十一首劉希夷三首盧象二首祖詠一首綦毋潛六首常建四首奉送郭中丞兼太僕卿充隴右節度使三十韻杜甫詔發山西將秋屯隴右兵凄凉餘部曲燀赫舊家聲鵬鶚乗時去驊騮顧主鳴艱難湏上䇿容易即前程斜日當軒葢髙風捲斾旌松悲天水冷沙亂雪山清和虜猶懐惠防邊詎敢驚古來於異域鎮静示専征燕薊奔封豕周秦觸駭鯨中原何慘陸機功臣賛作慘黷餘孽尚縱横箭入昭陽殿笳吟細栁營内人紅袖泣王子白衣行宸極妖星動園陵殺氣平空餘金盌出無復繐帷輕毁廟天飛雨焚宫火徹明罘罳朝共落輪桷夜同傾三月師逾整羣胡勢一作􅇯就烹瘡痍一作恭承親接戰勇決一作餘勇冠垂成妙譽期元宰殊恩且列卿幾時廻節鉞戮力掃欃槍圭竇三千士雲梯七十城耻非齊說客甘一作祗似魯諸生通籍㣲班忝周行獨坐榮隨肩趨漏刻短髮寄簪纓徑欲依劉表還疑厭禰衡漸衰那此别忍淚獨含情廢邑狐狸語空村虎豹争人頻墜塗炭公豈忘精誠元帥調新律前軍壓舊京安邊仍扈從莫作一作無使後功名送陵州路使君赴任前人王室比多難髙官皆武臣幽燕通使者岳牧用詞人國待賢良急君當㧞擢新佩刀成氣象行盖出風塵戰伐乾坤破瘡痍府庫貧衆寮宜潔白萬役但一作盡平均霄漢瞻佳士泥塗任此身秋天正摇落廻首大江濵送梓州李使君赴集作之任前人藉甚黄丞相能名自潁川近看除刺史還喜得吾賢五馬何時到雙魚㑹早傳老思笻竹杖冬要錦衾眠不作臨岐恨唯聽舉最先火雲揮汗日山驛醒心泉遇害陳公殞于今蜀道憐君行射洪縣為我一澘然郪城西原送李判官兄武判官弟赴成都前人憑髙送所親久坐惜芳辰逺水非無浪他山自有春野花隨處發官柳著行新天際傷愁别離筵何太頻從江送衛十八倉曺還京因寄岑中允參范郎中季明前人遲日深江水輕舟送别筵帝鄉愁緒外春色淚痕邉見酒湏一作應相憶将詩莫浪傳若逢岑與范為報各衰年泛江送客前人二月頻送客東津江欲平烟花山際重舟檝浪前輕淚逐勸盃落一作士愁連吹笛生離筵不隔日那得易為情送路六侍御入朝前人童稚親情四十年中間消息兩茫然更為後㑹知何地忽漫相逢是别筵不分桃花紅勝錦生憎柳絮白於綿劍南春色還無頼觸忤愁人到酒邉送李校集作秘書赴杜相公幕前人青簾白舫益州來巫峡秋濤天地迴石出倒聽楓葉下櫓摇背􅃌菊花開貪趨相府今晨發恐失佳期後命催南極一星朝北斗五雲多處是三台送翰林張司馬南海勒碑相國製文前人冠冕通南極文章落上台詔從三殿去碑到百蠻開野館濃花發春㠶細雨來不知滄海使集作上天遣㡬時回送衛二十四司直充嶺南掌選崔郎中判官兼寄韋韶州前人選曹分五嶺使者厯三湘才美膺推薦君行佐紀綱佳聲期共逺雅節在週防明白山濤鑒嫌疑陸賈装故人海外少春日嶺南長憑報韶州牧新詩作寄將夏日楊長寧一作官宅送崔侍御常正字入京前人醉酒揚雄宅升堂子賤琴不堪垂老鬢還對欲分襟天地西江逺星辰北斗深烏臺俯麟閣長夏白頭吟送孔巢父逰江東兼呈李白前人巢父掉頭不肯住東將入海隨煙霧詩巻長留天地間釣竿欲拂珊瑚樹深山大澤龍蛇逺春寒野隂風景暮蓬萊織女回雲車指㸃虚無引歸路自是君身有仙骨世人那得知其故惜君只欲苦死留富貴何如草頭露蔡侯静者意有餘清夜置酒臨前除罷琴惆悵月照席幾嵗寄我空中書南尋禹穴見李白一作若逢李白騎鯨魚道甫問訊今何如送髙司直尋封一作赴閬州前人丹雀銜書來暮栖何鄉樹驊騮事天子辛苦在道路司直非冗官荒山甚無趣借問泛舟人胡為入雲霧與子姻婭間既親亦有故萬里長江邊邂逅一相遇長卿消渇再公幹沉綿屢清談慰老夫開巻得佳句時見文章士欣然淡情素伏枕聞别離疇能忍漂寓良㑹苦短促溪行水奔注熊羆咆空林逰子慎馳騖西謁巴中侯艱險如跬步主人不世才先帝常特顧拔為天軍佐崇大王法度淮海生清風南翁尚思慕公宫造廣厦木石乃無數初聞伐松柏猶卧天一柱我瘦一作病書不成成字讀亦誤為我問故人勞心練征戍送客歸呉李白江村秋雨歇酒盡一㠶飛路歴波濤去家唯坐卧歸島花開灼灼汀柳細依依别後無餘事還應掃釣磯送友生逰峽中前人風静楊柳垂看花又别離㡬年同在此今日各驅馳峡裏聞猿呌山頭見月時慇懃一杯酒珍重歳寒姿送袁明府任長江前人别離楊柳青樽酒表丹誠古道携琴去深山見峡迎暖風花繞樹秋雨草沿城自此長江内無因夜犬驚杭州送裴大擇時赴廬州長史西江天柱逺東越海門深去割辭親戀行憂報國心好風吹落日流水引長吟五月披裘者應知不取金送史司馬崔相公幕前人峥嶸丞相府清切鳳凰池羡爾瑶臺鶴髙棲瓊樹枝歸飛晴日好吟弄惠風吹正有乗軒樂初當學舞時珍禽在羅網㣲命苦猶絲願托周周羽相衘漢水湄送張舍人之江東前人張翰江東去正值秋風時天清一鴈逺海闊孤㠶遲白日行欲暮滄海集作波杳難期呉洲如見月千里幸相思送紀秀才逰越前人海水不滿眼觀濤難稱心即知蓬萊石却是巨鼇簮送爾逰華頂令余發舄吟僊人居射的道士住山隂禹穴尋溪入雲門隔嶺深緑蘿秋月夜相憶在鳴琴送趙雲卿前人白玉一盃酒緑楊三月時春風餘幾日兩鬂各成絲秉燭唯湏飲投竿也未遲如逢渭川獵猶可帝王師送友人尋越中山水前人聞道稽山去偏宜謝客才千巖泉灑落萬壑樹縈廻東海横秦望西陵繞越䑓湖清雙鏡曉濤白雪山來八月枚乗筆三呉張翰盃此中多逸興早晩向天台送侯十一前人朱亥已擊晉侯嬴尚隠身時無魏公子豈貴抱闗人余亦不火食逰梁同在陳空餘湛盧劔贈爾託交親送梁四歸陳平前人玉壺挈羙酒送别強為歡大火南星月長郊北路難殷王期負鼎汶水豈集作起垂竿莫學東山卧參差老謝安金陵送張十一再逰東呉前人張翰黄花句風流五百年誰人今繼作夫子世稱賢再動逰呉棹還浮入海船春光白門柳霞色赤城天去國難為别思歸各未旋空餘賈生淚相顧共悽然送楊少府赴選前人大國置衡鏡凖平天地心羣賢無邪人朗鍳窮清深吾君詠南風衮冕弹鳴琴時泰多羙士京國㑹纓簮山苗落澗底幽松出髙岑夫子有盛才主司得球琳流水非鄭曲前行一作前後遇知音衣工剪綺繡一悞傷千金何惜刀尺餘不裁寒女衾我非彈冠者感别但開襟空谷無白駒賢人豈悲一作獨吟大道安棄物時來或招尋爾見山吏部當應無陸沉送程劉二侍御兼獨孤判官赴安西幕府前人安西幕府多才雄喧喧唯道三數公繡衣貂裘明積雪飛書走檄如飄風朝辭明主出紫宫銀鞍送别金城空天外飛霜下葱海火旗雲馬生光彩胡塞塵清計日歸漢家草緑遥相待送儲邕之武昌前人黄鶴西樓月長江萬里情春風三十度空憶武昌城送爾難為别銜盃惜未傾湖連張樂地山逐泛舟行諾謂楚人重詩傳謝朓清滄浪吾有曲寄入棹歌聲金鄉送韋八之西京前人客自長安來還歸長安去狂風吹我心西挂咸陽樹此情不可道此别何時遇望望不見君連山起煙霧送裴十八圖南歸嵩山二首前人何處可為别長安青綺門胡姬招素手延客醉金樽臨當上馬時我獨與君言風吹芳蘭折日沒鳥雀喧舉手􅃌飛鴻此心集作情難具論同歸無早晩潁水有清源二思君潁水緑忽復歸嵩岑歸時莫洗耳為我洗其心洗心得真情洗耳徒賣集作買名謝公終一起相與濟蒼生送張秀才謁髙中丞并序前人余時繫潯陽獄中正讀留侯傳秀才張孟熊藴滅胡之策将之廣陵謁髙中丞余嘉一作希子房之風感激於斯人因作是詩以送之秦帝淪玉鏡留侯降氛氲感激黄石老經過滄海君壯士揮金搥報讐六合聞智勇冠終古蕭陳難與群兩龍争鬪時天地動風雲酒酣舞長劍倉卒解漢紛宇宙初倒懸洪溝勢將分英謀信竒絶夫子揚清芬胡月入紫㣲三光亂天文髙公鎮淮海談笑廓妖氛採爾幕中畫集作所振雄畧期戡難光殊勲我無燕霜感玉石俱燒焚但洒一行淚臨岐竟何云同王昌齡送族弟襄歸桂陽前人秦地見碧草楚謡對清樽把酒爾何思鷓鴣啼南園予欲一作亦羅浮隠猶懷明主恩躊躇紫宫戀孤一作辜負滄洲言終然無心雲海上同飛飜相期乃不淺幽桂有芳根一作雜芬蓀送賀賔客歸越前人鏡湖流水漾清一作春始波征客歸舟逸興多山隂道士如相見應寫黄庭換一作取白鵝送友人之新豐劉希夷日暮秋風起闗山㫁别情淚隨黄葉下愁向緑樽生野路歸驂轉河洲宿鳥驚賔逰寛旅宴王事促嚴程餞李秀才赴舉前人鴻鵠振羽翮翻飛入帝鄉朝鳴集銀樹暝宿下金塘日月天門近風煙夜路長自憐窮浦鴈歳歳不隨陽洛中晴月别殷四入關前人清洛浮橋南渡頭天明集作晶萬里林葉秋集作華洲散晴㸔石瀬尤無數曉入圓潭浸集作漫不流㣲雲一㸃曙煙起南陌憧憧遍行子欲将此意與君論復道秦關向千里送綦毋濳盧象夫君不得意本自滄海集作江來髙足未云騁虗舟復空廻淮海楓葉落㶚岸桃花開去家蹔為閑一作出廵暫為間浮沉安繫哉如何天覆物還遣世遺才欲隠秦將漢當關王與裴離筵對寒食别雨乗春雷㑹有徵書到荷衣且慢裁送祖詠前人田家冝伏臘嵗晏子言歸石路雪初下荒村一作山鷄共飛東原同一作多煙火北澗隱寒輝滿酌野人酒倦聞隣女機胡為因樵採幾日被集作解朝衣送劉髙郵稅使入都祖詠常聞積歸思昨日復一作又兼秋鄉路京華逺王程江水流呉歌喧兩岸楚客醉孤舟漸覺潮初上悽然多暮愁送崔員外黔中監選綦毋潜持衡出帝畿星指夜郎飛神女雲迎馬荆門雨濕衣聴猿収淚罷繫鴈待書稀蠻貊雖殊俗知君肝膽㣲送章彛下第前人長安渭集作㶚橋路行客别時心獻賦温泉畢無媒衛闕深黄鶯啼就馬白日暗歸林三十名未立君還惜寸隂送賈恒明州兼寄温張二司户前人越客新安别秦人舊國情舟乗晩風便月帶上潮平花露西施石雲峯勾踐城明州報兩掾相憶二毛生送宋秀才前人冠古稱榮盛當時數㦸門舊交丞相子繼世五侯孫長劒倚天外短書盈萬言秋風一送别江上黯銷魂送平判官入秦前人謫逺自安命三年已忘歸同心願執手驛騎到門扉云是帝鄉去軍書謁紫㣲曽為金馬客向日淚霑衣送儲十二還莊城前人西坂河繚繞青林問子家天寒噪野雀日晩度城鴉寂歴道傍樹曈曨原上霞兹情不可說長恨隱淪賖送樊十少府常建㣲風吹霜氣寒影流前除落日未能别蕭蕭林下虗愁煙閉千里仙尉其何如因送别鶴操贈之雙鯉魚鯉魚在金盤别鶴哀有餘心事則如此請君開素書送陸懽前人聖代甘疑秀才陸生何考槃南山髙松樹不合空摧殘九月湖上别北風秋雨寒慇懃嘆孤鳳早食金琅玕送李十一尉臨溪前人泠泠花下琴君唱渡江一作頭吟天際一㠶影預懸離别心以言神仙尉因致瑶華音廻軫撫商調越溪澄碧林送宇文六前人花映隋楊水徹一作漢水清曉一作㣲風林裏一花輕即今江北還如此愁殺江南離别情文苑英華卷二百六十九
