body:
  text: 文苑英華巻二百七十宋李昉等編送行五高適十一首王昌齡八首陶翰一首劉眘虚二首劉長卿二十首朱頎七首送柴司户充劉鄉判官之嶺外高適嶺外資雄鎮朝端寵節旄月卿臨幕府星使出詞曹海對羊城闊山連象郡高風霜驅瘴癘忠信涉波濤别恨隨流水交情脫寳刀有才無不適行矣莫徒勞送馮判官前人碣石遼西地漁陽薊北天闗山惟一道雨雪盡三邉才子方為客將軍正愛集作渇賢遥知幕府下書記日翩翩送張少府前人歸客留不住朝雲縱復横馬頭向春草斗柄臨高城嗟我久離别羡君看弟兄歸心更難道回首益集作一傷情淇上送韋司倉徃滑臺前人飲酒莫辭醉醉多適不愁孰知非逺别終念對新集作窮秋滑䑓門外見淇水眼前流君去應回首風波滿渡頭東平别前衛縣李宷少府前人黄鳥翩翩楊柳垂春風送客使人悲怨别自驚千里外論交却憶十年時雲開汶水孤㠶逺路遶梁山疋馬馳此地從來可乗興留君不住亦凄其送别前人昨夜離心正鬰陶三更白露西風高螢飛木落何淅􅄋此時夣見集作忽頡西歸客曙鍾寥亮三四聲東隣嘶馬使人驚攬衣出户一相送惟見歸雲縱復横送别王徹前人歸客自南楚悵然思北臨一作林蕭條秋風暮廻首江淮深􅇔君終日歡集作􅇔連愁作歡或為梁甫吟時輩想鵬舉他人嗟陸沉載酒登平䑓贈君千里心浮雲暗長路落日有歸禽離别未足悲辛勤當自任吾知十年後季子多黄金送蕭十八與房侍御前人常苦一作悲古人逺今見斯人古澹泊遺聲華周旋必鄒魯故交在梁宋逰方出庭户匹馬鳴朔風一身濟河滸辛勤採蘭詠欵曲翰林主嵗月催别離庭闈逺風土寥寥寒燈静莽莽夕雲苦明發不在茲青天𦕈難覩餞宋八充彭中丞判官之嶺南前人覩君濟時略使我氣填膺長策竟不用高才徒見稱一朝知已達累日詔書徵羽翮忽然動集作就風飈誰敢陵舉鞭投嶺障屈指冒炎蒸北鴈送馳馹南人思飲氷彼邦本倔強習俗多驕矜翠羽干平法黄金繞直䋲若將除害馬慎勿信蒼蠅魑魅寧無患忠貞適有憑猿啼山不斷鳶跕路難登海岸出交趾江城連始興繡衣當節制幕府盛威稜勿憚九疑險湏令百越澄立談多感激行李即嚴凝離别胡為者雲霄遲爾昇贈别韋叅軍前人二十解詩選作辭書劍西逰長安城舉頭望君門屈指取公卿國風冲融邁三五朝廷懽樂彌寰宇白璧皆言賜近臣布衣不得集作敢干明主歸來洛陽無負郭東過梁宋非吾土兎苑為農嵗不登鴈池垂釣心常苦世人向我同衆人惟君於我情集作最相親且喜百年有交態未曽集作當一日辭家貧彈琴擊筑白日晩縱酒髙歌楊柳春歡娯未盡分散去使我惆悵驚心神終當不作兒女悲詩選作别臨岐涕淚詩選作泗霑衣巾宋中贈别周梁李三子前人曽是不得意適來兼别離何如一樽酒翻作滿堂悲周子負髙價梁生多逸詞周旋梁宋間感激建安時白雲集作雪正如此青天一作雲無自疑李侯懷清英骯髒乃天資方寸且無間衣冠當在斯俱為千里逰忽集作勿念兩鄉辭且見壯心在莫嗟携手期凉風吹白原落日照西陂露下草初白天長雲屢滋我心不可問集作得君去集作兮定何之京洛多知已誰能憶左思别劉諝王昌齡天地寒更雨蒼茫楚城隂一罇廣陵酒十載衡陽心倚仗不可料悲歡豈易尋相逢成逺别後㑹何如今身在江海上雲連京國深行當務功業䇿馬何駸駸送任五之桂林前人楚客醉孤舟越水將引棹山為兩鄉别月帶千里貌覊譴同矰綸僻幽聞虎豹桂林寒色在苦節知所效送李濯逰江東前人清洛日夜漲㣲風引孤舟離傷便千里逺夣生江樓楚國橙橘暗呉門煙雨愁東南具今古歸望山雲秋送魏二前人醉别江樓橘柚香江風引雨入舟一作舡凉憶君遥在湘江上一作山月愁送一作聽清猿夣裏長一作皆絶句詩選送髙三之桂林前人􅇔君夜飲對瀟湘從此孤舟客夣長嶺上梅花侵雪暗歸時還拂桂花一作枝香送韋十四兵曹前人縣職如長纓終日檢我身平明趨郡府不得展故人故人念江湖富貴如埃塵跡在戎府掾心逰天台春獨立浦邉鶴白雲長相親南風忽至呉分散還入秦夜寒天光白海净詩選作静月色真對坐論嵗暮絃悲豈詩選作歌起無因平生驅馳分非謂杯酒仁出處兩不合忠直何由申看君泛舟去且欲歌垂綸送喬林前人草緑小平津花開一水濵今君不得意辜負帝鄉春口不言金帛心常任屈伸阮君唯一作絶飲酒陶令肯羞貧陽羡風流地滄江避世人菱歌五湖逺桂樹八公隣青鳥迎孤棹白雲隨一身潮從秣陵上月映石頭新未可逃名利應湏在縉紳汀洲芳杜色勸爾蹔垂綸送歐陽㑹稽之任兼呈陳處士前人懷禄貴心賞東流山水長官移㑹稽郡地邇上虞鄉綬帶屛紛雜漁舟臨訟堂逶迤廻溪趣一作曲猿嘯飛鳥行萬室霽朝雨千峰迎夕陽輝輝逺洲映暖暖澄湖一作江光髮白有髙士青春騎疑上皇應湏枉車歇疑為我訪荷裳送朱大出關陶翰楚客西上書十年不得意平生相知者晩節心各異長揖五侯門拂衣謝中貴丈夫多離别各有四方事㧞劍因髙歌蕭蕭北風至故人有斗酒是夜共君醉努力長一作強加飡當年莫相棄送韓平兼寄郭㣲劉眘虚上客夜相過小童能沽酒即為臨水處正值歸鴈後前路望鄉關近家見門栁春時未曽暮風景自應有余憶東周人經年别未久殷勤為傳語日夕念携手兼問前寄書中間復達否海上送薛文學前人日處歸且逺送君東悠悠滄溟千萬里日夜一㠶舟曠望絶國所㣲茫天際愁有時近仙境不定若夣逰或見青山石孤舟百處秋前心方杳𦕈此路獨夷猶離别惜吾道陂澤敬皇休春浮溪花逺思逐海水流日暮驪歌後永懷空滄洲送徐大夫赴廣州劉長卿上將壇塲拜南荒集作方羽檄招逺人來百越元老事三朝霧繞龍川暗山連象郡集作嶺遥路分江淼淼軍發馬蕭蕭塞集作畫角知秋氣樓船逐暮潮當令輸貢職集作賦不使外夷驕送齊郎中典括州前人星象移何處旌旄獨向東勸耕滄海畔聽訟白雲中樹影集作色雙溪合猿聲萬嶺同石門空康樂在集作任㡬里往㠶通送李中丞之襄州前人流落征南將曽驅十萬師罷歸無舊業老去戀明時獨立三朝識輕生一劍知茫茫江漢上日暮欲集作復何之送李秘却赴南中此公舉家先流竄嶺外兄弟數人俱沒南中前人却到畨禺日應傷昔所依炎州百口住故國幾人歸路識梅花在家看棣蕚稀獨逢廻鴈去一作衡陽猶作舊行飛送營田判官鄭侍御赴上都前人上國三千里西逰集作還及歳芳故山經亂在春日送歸長曉奏趨䨇闕秋成報萬箱幸論開濟力已實海陵倉送嚴侍御充東畿觀察判官前人海陵爭戰後君去問凋殘雲日臨南至風霜向北寒故園經亂失古道集作木近鄉看誰訪江城客年年守一官送蔡侍御赴上都前人遲遲立駟馬久客戀瀟湘明日誰同路新年獨到鄉到集作别孤煙向驛逺積雪去關長秦地看春色南枝不可忘送梁侍御赴永州前人蕭條江雨暗客散短集作野亭空憂國天涯去思鄉歳暮同到時猿未㫁回處水應窮莫望零陵路千峰萬木中送鄭說集作晩之歙州謁薛能郎中集作侍郎前人漂泊來千里謳謡滿百城漢家尊太守魯國重諸生俗變人難理江流集作傳水至清船經危石住一作往路入亂山行老得滄洲趣春傷白首情嘗聞馬南郡門下有康成送裴使君赴荆南充行軍司馬前人盛府南門寄前程積水中月明臨下口山晩望巴東故節辭江郡寒笳發渚宫漢川風景好遥羡繼集作遂羊公送鄭十二一作山人還廬山已見二百三十一巻前人送行軍張司馬罷使適越時危身赴敵事往任浮沉末路三江去當時百戰心春風呉苑緑古木剡山深千里滄波上孤舟不可尋送馬秀才移家京洛赴舉前人自從為楚客不復掃荆扉劍共丹城在書隨白髪歸舊逰經亂盡後進識君稀空把相如賦何人薦禮闈送荀八過山隂訪舊集作舊任兼寄剡中諸官前人訪舊山隂縣扁舟到海涯故林嗟滿歳春草憶佳期晩景千峰亂晴江一鳥遲桂香留客處楓暗泊舟時舊石曹娥篆空山禹帝集作夏禹祠剡溪多隠吏君為道長思送耿拾遺歸上都前人若為天畔獨歸秦對水看山欲暮春窮海别離無限路隔河征陣獨歸人長安萬里傳雙淚建徳千峰寄一身想到郵亭愁駐馬不堪西望見風塵送嚴員外集作呉中贈别嚴士元前人春風倚棹闔閭城殊國雲隂暗或作水閣天寒隂復晴細雨濕衣㸔一作人不見閑花落地聽無聲日斜江上孤㠶影草緑湖或作江南萬里情君去一作東道若逢相識問青袍今已悞儒生此詩二百八十七巻重出今已削去注異同為一作送桞使君赴袁州前人宜陽出守新恩至京口因家始願違五桞閉門髙士去三苗按節逺人歸月明江路聞猿㫁花暗山城見吏稀惟有郡一作舊齋䆫裏岫朝朝空對謝𤣥暉送陸澧倉曹西上集作下前人長安此去欲何依先達誰當薦陸機日下鳳翔雙闕迥雪中人過二陵稀舟從故里難移棹家在寒塘獨掩扉臨水自傷居洛集作流落久贈君空有淚霑巾送皇甫曾赴上都前人帝鄉何處是岐路空垂泣楚客集作思愁暮多川長帶潮急潮歸人不歸獨向廻塘立送人歸􅃆南朱頎梅花今正發失路復何如舊國雲一作霞山在新年風景餘春曉漢陽夣日寄武陵書可惜明時老臨川莫羡魚送劉主簿歸金壇前人與子十年舊其如離别何宦逰憐故國歸夣是滄波京口青山逺金陵芳草多雲㠶曉容裔江口晝清河縣郭舟人飲津亭漁者歌茅山有仙洞羡爾再經過送顧朝陽還前人寂寞俱不偶裹糧空入秦宦途已可識歸卧包山春舊風指飛鳥滄波愁旅人開樽洛水上怨别桞花新送竇恭軍前人城南送歸客舉酒對林巒喧鳥迎春囀風一作春衣度雨寒桃花開翠幕栁色傍金鞍公子何時至無令芳草闌送魏萬之京前人朝聞逰子唱離歌昨夜㣲霜初渡河鴻鴈不堪愁裏聽雲山况是客中過關城樹色催寒近御苑砧聲向晩多莫見長安行樂地空令歳月易蹉跎贈别穆元令前人二職九載滿藏名三十年丹墀策頻獻白首官不遷明主棄㣲士吏曹何忽賢空懷濟世業獨棹滄海船舉酒洛川外送春滄一作送君春海邊彼鄉有令弟小邑試烹鮮轉浦雲壑媚涉江花島連緑芳暗楚水白鳥飛呉煙贈紵亦奚貴亂流期早旋金閨㑹通籍生事豈一作亦徒然送張諲入蜀前人出門便為客憫然悲徒御四海惟一身茫茫欲何去經山復歴水百恨將千慮劍閣送一作空梁州是君㫁膓處客心落日感君深夣裏慕一作孤雲傷客心落日感君深江畔蒹葭渚天邊橘柚林蜀江流不測蜀路險難尋木有相思號猿多愁苦吟一作音莫向禺山隠禺山地非近故鄉可歸來眼見芳菲盡文苑英華巻二百七十
