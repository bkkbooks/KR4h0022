body:
  text: 文苑英華巻二百三十八宋李昉等編寺院六塔附温庭筠十首杜牧三首許渾十首喻鳬五首盧肇一首趙嘏十首方干六首李洞十首李羣玉二首陳陶二首張祜七首羅鄴一首宿灃曲僧舍温庭筠東郊和氣新芳靄逺如塵客舍一作路停疲馬僧牆畫故人沃田桑景晩平野菜花春更想嚴家瀨微風蕩白蘋和友人盤石寺逢舊友前人楚寺上方宿滿堂皆舊遊月溪逢逺客煙浪有歸舟江館白蘋夜水闗紅葉秋西風吹暮雨江一作汀草更堪愁宿一公精舍前人夜闌黄葉寺瓶錫兩俱能松下石橋路雨中山殿燈一作松下石橋雨山中佛殿燈茶爐天姥客棊席剡溪僧還笑長門賦髙秋卧茂陵月中宿雲居寺上方前人虚閣披衣坐寒堦踏葉行衆星中夜少圓月上方明靄盡無林色喧餘有澗聲秪應愁恨事還逐晩光生題終南佛塔寺前人鳴泉隔翠㣲千里到柴扉地勝人無慾林昏虎有威澗苔侵客屨山雪入禪衣桂樹芳隂在還期嵗晏歸題西明寺僧院前人曽識匡山逺法師低松片石對前墀為尋名畫來過寺因訪閒人得㸔棊新雁參差雲碧處寒鴉寥落集作撩亂葉紅時自知終有張華識不向滄洲理釣絲宿松門寺前人白石青崖世界分巻簾孤坐獨氛氲林間禪室春深雪潭上龍堂夜半雲落日蒼一作荒凉登閣在曉鍾摇蕩隔江一作牆聞西山舊是經行地願漱寒瓶逐領軍馬嵬佛寺前人荒雞夜唱戰塵深五皷雕輿過上林才信傾城是真語直教塗地始甘心兩重秦苑成千里一炷胡香抵集作直萬金曼倩死來無絶藝後人誰肯惜青禽司馬相如傳注青禽古神女也清凉寺前人黄花紅樹謝芳蹊宫殿參差黛巘西詩閣曉牕蔵雪嶺畫堂秋水接藍溪松飄晩吹摐金鐸竹䕃寒苔上石梯妙跡竒名竟何在下方煙暝草萋萋開聖寺前人路分溪石夾煙叢十里蕭蕭古樹風出寺馬嘶秋色裏向陵鴉亂夕陽中竹間泉落山厨静塔下僧歸影殿空猶有南朝舊碑在敢集作耻將興廢問漁翁集作休公寄題甘露寺北軒杜牧曽上蓬萊宫裏行北軒欄檻最留情孤髙堪弄桓伊笛縹緲宜聞子晉笙天接海門秋水色煙籠鹿一作隋苑暮鍾聲他年㑹著荷衣去不向山僧道姓名題禪院前人航集作􅘑船一棹百分空千載集作十嵗青春不負公今日鬢絲禪榻畔茶煙悠集作輕颺落花中集作風題宣州開元寺寺置於東晉時前人南朝謝朓城東吳最深處亡國去如鴻遺寺蔵煙塢樓飛九十尺廊環四百柱髙髙下下中風繞松桂樹青苔照朱閣白鳥兩相語溪聲入僧夢月色輝粉渚集作堵閱景無旦夕憑一作凭欄有今古留我酒一樽前山㸔春雨將歸塗口宿鬰林寺道元上人院許渾西巖一磬長僧起樹蒼蒼開殿灑寒水誦經焚曉一作晩香竹風雲漸散杉露月猶光無復重來此歸舟凌夕陽潼關蘭若前人來徃㡬經過前軒枕大河逺帆春水闊髙寺夕陽多蝶影下紅藥鳥聲喧緑蘿故山歸未得徒詠採芝歌題恩德寺前人樓臺横復重猶在集作有半巖空蘿洞淺深水竹廊髙下風晴山踈雨外集作後秋樹斷雲中未竟平生意孤帆又向東崇聖寺寺即故行宫前人西林本行殿池榭日坡陁雨過水初漲雲開山漸多晩街垂御柳秋院閉宫莎借問龍歸處鼎湖空碧波與裴三十秀才自越西歸望亭阻凍登虎丘精舍前人春草越吳闗集作間心期旦夕還酒鄉逄客病詩境遇僧閒倚棹冰交集作生浦登樓雪滿山東風猶集作不可待歸鬢巳集作坐班班下第寓居崇聖寺感事前人懐玉泣京華舊山歸路賒静依禪客院幽學野人家林晩鳥争樹園春蜂䕶花東門有閒地誰種邵平𤓰渚集作洛東蘭若夜歸前人一衲老禪床吾生半異鄉管絃愁裏醉書劔夣中忙鳥急山初暝蟬稀樹正凉又歸何處去塵路月蒼蒼寓居開元寺集作開元精舍酬薛秀才見贈集作貽前人知巳蕭條信陸沉茂陵扶病卧西林芰荷風起客堂静松桂月髙僧院深清露下時傷旅鬢白雲歸處寄鄉心勞君詩思猶相憶題在書集作空齋夜夜吟和河南楊少尹奉陪薛司空石笋詩前人暖溪寒井碧巖前謝傅賔朋盛綺筵雲斷石峯髙竝笋日臨山勢逺開蓮閒留幢節低春水醉擁一作領笙歌出暮煙聞道詩成歸巳夕桞風花露月初圓題蘇州虎丘寺僧院前人暫引寒泉濯逺塵此生多是異鄉人荆溪夜雨花飛疾吳苑秋風月滿頻萬里髙低門一作雲外路百年榮辱夢中身世間誰似西林客一卧煙霞四十春逰山北集作北山寺喻鳬煙岡影畔寺逰步此時孤庭静衆藥在鶴閒䨇檜枯藍峯露秋院㶚水入春厨便可棲心跡如何返舊途冬日題無可上人院前人入户道心生茶閒踏葉行瀉風瓶水澁承雪鶴巢傾閣北長河氣窻東一檜聲詩言與禪味語黙此皆清逰雲際寺前人澗壑吼風雷香門集作禪闗絕頂開閣寒僧不下鍾定虎常來常一作長鳥啄林梢果鼯跳竹裏苔心源無一事塵界擬休回題翠㣲寺前人沿溪又陟嶺始喜入集作到前軒鍾度鳥沉壑殿扄雲濕幡凉泉墮衆石古木徹踈猿月上僧偕近集作初定斯逰豈易言隠集作岫禪師南溪蘭若前人錫影配瓶光孤溪集作脩心黙草堂水懸青石磴鍾動白雲床樹色含殘雨河流帶夕陽唯應無月夜暝目見他方題甘露寺盧肇北固巖端寺佳名自上台地從京口斷山到海門廻曙色煙中滅潮聲日下來一隅通雉蝶千仞聳樓臺林暗疑降虎江空想渡杯福庭増氣象仙磬落昭回覺路花非染流年景謾催隋宫凋緑草晉室散黄埃西蜀波湍盡東溟日月開如登最髙處應得見蓬萊重逰楚國寺趙嘏徃事飄然去集作竟不廻空餘山色在樓臺池塘風集作春暖雁尋去松桂寺髙集作松檜樹髙人獨來莊叟著書真達者賈生揮涕信悠哉老僧心地閒於水猶被流年日月催集作白髮催宿楚國寺有懐前人風動衰荷寂寞香斷煙殘月共蒼蒼寒生晩寺波摇壁紅墮踈林葉滿床起雁似驚南浦棹隂雲欲䕶北樓霜江邊松菊荒應盡八月長安夜正長宿靈巖寺即古呉宫前人明月溪頭寺蟲聲滿橘洲倚欄香徑晩移石太湖秋古樹一作老樹集作樹老雲歸盡荒臺集作臺荒水更流無人見惆悵獨上最髙樓越中寺居前人遲客踈林下斜溪小艇通野橋連寺月髙竹半樓風水静魚吹浪枝閒烏下空數峯相向緑日夕郡城東初入寺居寄上元相公巳見二百二十三巻題作越中寺居寄上主人遶竹前篇作㸔竹恩酬前篇作酬恩浙東陪元相公逰雲門寺前人松下山前一逕通燭迎千騎滿山集作川紅溪雲乍歛幽一作髙巖雨曉氣初髙集作開大斾風小檻宴花容客醉上方㸔竹與僧同歸來吹盡嚴城角路轉髙集作横塘亂水東題天鄉寺神亮上人院亮不出院五年巳見二百二十三巻題作贈天卿寺神亮上人前人題虎丘山西寺巳見二百三十六巻前人早發剡中法堂寺集作石城寺前人暫夕勞生樹色閒集作半日平明塵事集作機慮又相闗吟辭宿處煙霞去一作外心集作身負秋來水石閒竹户半開鍾未絶松枝静霽鶴初還明朝一倍堪惆悵廻首塵中見此山三像寺酬元秘書前人官總芸香閣署蓬可憐詩句落春風偶然侍坐水聲裏還許醉吟松影中車馬照來紅樹合煙霞詠盡翠㣲空不因髙寺閒回首誰識飄飄一作飄零一塞翁此詩二百六十三巻重出今已削去宿四祖寺前人千株松下䨇峯寺一盞燈前萬里身自是心猨不調伏祖師元是世間人寒食宿先天寺無可上人房方干䨇扉檜下開寄宿石房苔幡北燈花動城西雪霰來收棊想雲夣罷茗議天台同憶前年臘師初白閣廻題寳林山禪院前人山捧亭臺郭遶山徑盤蒼翠到山巔巖中古井雖通海窟裏隂雲不上天羅列衆星依木末週廻萬室在簷前我來可要師集作歸禪老一寸寒灰已達禪題應天寺上方兼呈謙上人前人中天坐卧見人寰峭石垂藤不易攀晴巻風雷歸故壑夜和猿鳥鎖寒山勢横緑野蒼茫外影落平湖㶑灔間師在西巖最髙處路尋之字一作子見禪闗題報恩寺上方前人來來先上上方㸔眼界無窮世界寛巖溜噴空晴似雨林蘿礙日夏多寒衆山迢逓皆相疊一路髙低不記盤清峭闗心惜歸去他時夣到亦難􅂸集作判書法華寺上方禪師一作僧壁前人砌下松巔有鶴栖孤猿亦在鶴邊啼卧聞雷雨歸巖早坐覺集作見星辰去地低一徑穿縁應在集作就郭千花掩映似無溪是非生死多憂惱此日憑集作䝉師為破迷題法華寺絶頂禪家壁前人蒼翠岧嶤逼窅𡨕下方雷雨上方晴飛流便向砌邊挂片月影從牕外行馴鹿不知誰結侣野禽多是自呼名只應禪者無來去坐㸔千山白髮生秋宿荆上人禪房李洞江房無葉落松影帶山髙滿寺中秋月孤牕入夜濤舊真懸磬壁老髮逐銅刀卧㸔曉耕者與師知苦勞宿書僧一作記院前人夜水筆前澄時推外學能書成百箇字庭轉㡬遭燈寄墨天壇吏分牋蜀國僧為題江寺塔牌挂入雲層冬日題覺公牛頭蘭若前人天寒髙木静一磬隔川一作牕聞鼎水㸔山汲臺香拂一作掃雪焚鶴歸遥認刹僧步不離雲石室開禪後輪珠謝聖君題維摩暢上人房朽枿集作寒櫟前人諸方逰㡬臘五夏五峯銷越講迎騎象一作馬蕃齋懴射鵰冷笻書雪倚朽枿話雲燒從此棲林老瞥然三萬朝題西明寺攻文林復僧房前人誰寄湘一作江南信隂牕硯起津燒痕碑入集海角寺留真樓憇長空鳥鐘驚半闕人御溝圓月㑹似在草堂身題竹溪禪院前人溪邊山一色水擁竹千竿鳥觸翠微濕人居酷暑寒風揺瓶影翠一作碎砂䧟屨痕端爽極青崖樹流平緑峽灘閒來披衲數漲後巻經㸔三境通禪寂埃塵染着難題新安國寺前人佛亦遇艱難重興􅑋廢壇偃松枝舊折畵竹粉新乾開講宫娃聽抛生禁鳥飡鍾聲常入夢天竺化長安宿鳯翔天柱寺窮易元上人房前人天柱暮相逄吟思天柱峯墨研清露月茶吸白雲鍾卧語身粘蘚叅一作安禪集作行禪頂拂松探一作深𤣥為一訣一作决明日去臨卭題西明自覺上人房前人御溝尋岸行逺岫見雲生松下度三伏磬中銷五更雨霖經閣白日閃剃刀明海畔終湏去燒燈老國清題雲際寺前人門開風雪頂上徹困飛禽猿戲青冥裏人行紫翠一作閣隂臘雲氷下出夜磬月中尋盡欲居巖室如何不一作一住心登蒲澗寺後二巖二首李羣玉五仙騎五羊何代降兹鄉澗有堯時韭集作堯年韭菖蒲也山餘禹代集作日糧樓臺籠海色草樹羡集作發天香吟嘯秋集作浩笑波光裏浮溟興甚長二行盡﨑嶇路驚從汗漫逰青天豁眼客集作快碧海醒心秋便欲尋河漢因之犯斗牛九霄身自致何必遇一作問浮丘題居上人法華新院陳陶浮名深般若方等設蓮華鍾唄成僧國湖山稱法家一塵多寳塔千佛大牛車能誘泥犂客超然識聚沙題豫章西山香城寺前人十地巖宫禮竺皇旃檀樓閣半天香祗園樹老梵聲小雪嶺花香燈影長霄漢落泉供月界蓬壺靈鳥侍雲房何年七七空人降金錫珠壇滿上方杭州孤山寺張祜樓臺聳碧岑一徑入湖心不雨山長潤無雲水自隂斷橋荒蘚澁空院落花深獨集作猶憶西窓夜集作月一作外鍾聲盡此集作在此一作到此林此詩一百五十九巻重出今已削去注異同為一作常州無錫縣惠山寺前人舊宅人何在空門客自過泉聲到池盡山集作月色上樓多小洞穿集作生斜竹重階夾廋莎殷勤集作望入城市雲水暮鍾和潤州甘露寺前人千重構横險髙歩出塵埃日月光先到集作見江山勢盡來冷雲虚水石清露滴樓臺况是東溟上平生憶集作意一開金山寺前人一宿金山頂集作寺㣲茫水國分集作超然離世群僧歸夜船月龍出曉堂雲樹影中流見鍾聲兩岸聞因悲集作飜思在朝市終日醉醺醺石頭城寺前人山勢抱煙光重門突屼傍連簷金一作天像閣半壁石龕廊碧樹叢髙頂清池占下方徒悲宦逰意盡日老僧房題招隠寺前人千年戴顒宅佛廟此崇脩古寺集作井人名在清泉鹿跡幽竹光寒閉院山影夜蔵樓未得髙僧㫖煙霞空暫逰秋夜登潤州慈和寺上方二字集作塔前人清夜浮埃暫歇集作暫出又作歇􅆵塔輪金照露華鮮人行中路月生海鶴語上方星滿天樓影半集作暗連深岸水鍾聲寒徹逺林集作溪煙僧房閉盡下樓去一半夣魂離集作歸世縁夏日宿靈巖寺宗公院羅鄴寺入千巖石路長孤吟一宿逺公房卧聽半夜杉壇雨轉覺中峯枕簟凉花界已無悲喜念塵襟自足是非妨他年縱使重來此息得心猿鬢已霜文苑英華巻二百三十八
