body:
  text: 文苑英華巻一百七十九宋李昉等編應令應教附應令三十七首應教二十四首應令侍遊新亭應令梁簡文帝神襟愍行邁岐路愴徘徊遥瞻十里陌傍望九成臺鳯管流虚谷龍騎藉春荄曉光浮野映朝煙承日廻沙文浪中積春隂江上來栁葉帶風轉桃花含雨開聖情藴珠綺札命表英才顧憐碔砆質何以儷瓊􅅛餞廬陵内史王脩應令前人餞行臨上節開筵命羽觴廻池㵼飛棟濃雲垂畫堂疎槐未合影反日暫流光園梅歛新藻階蕙結初芳奉和簡文帝太子應令劉孝威太子天下本元良萬國貞周朝推上嗣漢代慙重明前星涵瑞彩洊雷揚逺聲三善得樂正百行紀司成九流遍已辨七經咸所精博聞强子政髙才陵長卿禮尊逾屈已德盛益卑情仙菊類聚作氣貽鍾相儒道推桓榮延賢博望苑視膳長安城園綺随金輅浮丘侍玉笙智囊前歛笏端士後垂纓九仙良所重四海更垂纓初學記作誰輕類聚作東傾斑輪同笨乗甲舘類聚作觀齊蓬衡奉和六月壬午應令前人𤣥圃棲金碧虚澗挹一作抱琨瑤築山圖碣岫穿池控一作類海潮雷奔石鯨動水濶牽牛遙乗黿猶怯渡鞭石遂成一作類為橋崖崩下生窟壁峭上干霄噪蛙常􅍦沸遊魚或自跳荒徑横臨浦空舟斜挿橈愁鴟集古樹白鷺隐青苖神一作乍心重丘壑散歩一作㣲懐漁樵石壘元卿徑枝掛許由瓢伊臣本寂寞一作黙由來畏市朝為貪山水心所意惟逍遙寄言周伯沆勞君擅縠綃侍宴餞陸倕應令蕭子顯儲皇餞離送廣命傳羽觴侍遊追曲水開宴等清漳新泉已激浪初卉始含芳雨罷葉増緑日斜樹影長餞張惠紹應令劉孝綽鮮雲積上月凍雨晦初陽廻風翻類聚作揚集作飄淑氣落景煥集本類聚並作渙新光竹萌始防露桂樾集作梃已含芳瑤階變杜若玉沼發攅蔣聖􅁭集作衿惜岐路曲宴闢蘭堂侍宴離亭應令前人轘轅東北望江漢西南永羽旗映日移鐃吹臨風警令王愍追送纚集本類聚並作䌫舟宴俄頃掩􅃑眺征雲銜杯惜餘景首燕徒有心局歩何所集本類聚並作由騁侍宴集賢堂應令前人北閣類聚作閤時既一作見啓西園又已闢官屬引鴻鷺朝行命金璧伊臣獨何取隆恩徒自昔布武登玉墀委坐陪瑤席綢繆叅宴笑淹留奉觴醳壺人告漏晩烟霞起將夕反景入池林餘光映泉石侍宴應令庾肩吾副君時暇豫曽城聊近遊清池㵼飛閣疎樹出龍樓北陸氷方壯西園春欲抽類聚作周梅心芳屢動蒲節促難収徒然欣類聚作須並命無以厠應劉侍宴宣猷堂宴湘東王應令前人陳王驂駕反副后西園遊並命登飛閣列樹類聚作坐對芳洲桂岩逢暮序菊水值窮秋竹徑簫聲發蘭門琴曲幽徒奉文成誦空知思若抽從皇太子出𤣥圃應令前人春光起麗譙屣歩陟山椒閣影臨飛盖鶯鳴入洞簫水還澄故渚樹長合前橋緑荷生綺葉丹藤上細苗顧循慙良藻何用擬瓊瑤侍宴宣猷堂應令前人副君德將聖陳王才掞天歸來宴平樂置酒對林泉爐香雜山氣殿影入池漣豔舞時移節新歌屢上絃聼曲慙回顧思經徒欲眠侍宴餞湘東王應令前人陳王從逰士髙宴入承華並載同連璧雕文類簡一作揀沙落猿時動樹墜雪乍類聚作慙搖花念此離筵促方愁別路賖奉和太子納凉梧下應令前人北圍凉氣早歩輦暫逍遙避日交長扇迎風列短簫山帶彈琴曲桐横棲鳯條懸門開溜水錦石鎮浮橋黑米生蘇葉青花出稲苖無因學仙藻雲氣從飄颻奉和春夜應令前人春牖對芳洲珠簾新上鈎燒香知夜漏刻燭驗更籌天禽下北閣織女入西樓月皎疑非夜林疎似更秋水光懸蕩壁山翠下添流詎假西園讌無勞飛盖遊暮遊山水應令得磧字前人餘香屬清夜西園恣逰歴入逕轉金輿開橋通畫艗類聚作鷁細藤初上援新流漸涵磧雲峰沒城栁電影開巖壁侍宴餞新安太守蕭幾應令劉孺芝蓋延藻類聚作近薄景畫石寫油雲𤣥覽多該洽聖思究前聞㣲宻操類聚作探精義優㳺妙典墳餞飲参多士言贈賦新文侍宴餞東陽太守蕭子雲應令張纉仲月發初陽輕寒帯春序緑池觧餘凍丹霞霄疑新雨良守謁承明仙舟式類聚作戒蘭渚皇儲惜將邁金樽留宴醑征虜亭送新安王應令徐陵鳳吹臨南浦神駕餞東平亭迴漳水乗斾轉洛濱笙地凍斑輪響風嚴羽蓋輕燒田雲色暗古樹雪花明岐路一迴首流襟動睿情奉和夏日應令庾信珠初學記作朱簾巻嚴日翠幕蔽重陽五月炎蒸氣初學記作氣蒸三時刻漏長麥随風裏熟梅逐雨中黄開氷帶井水和粉雜生香衫含蕉葉氣扇動竹風凉早菱生軟角初蓮開細房願陪仙鶴舉洛浦聼笙簧侍宴東宫應令于仲文銅樓充震位銀牓集佳賔青宫列紺幰紫陌結朱輪絃調寳瑟曲歌動畫梁塵金巵傾斗酒瓊筵列八珎花驚度翠羽萍散躍赬鱗承恩叨並作扣寂繞陽春侍皇太子宴應令沈君道副君監撫暇禁苑暫停輿初學記作車水落金沙淺雲髙玉葉疎随厨白羽扇學記作燕逐釣紫鱗魚飽德良無已榮陪終宴餘同前一作和初春宴東堂應令劉端睿賞叶春芳開筵臨畫堂庭梅飄早粉簷栁變初黄八珎羅玉爼九醖湛金觴筝響流飛閣歌塵拂妓行何必西園夜空承明月光奉和悲秋應令王胄秋天擬文學秋水擅莊蒙草濕蒹葭露波巻洞庭風便坐飜桑葉一作莢長坂歇蘭藂簷喧猶有鷰波疑作陂静未來鴻蝉噪一作唱聞疑斷池清映似空劉安悲落木曹植歎征蓬重明豈凝滯無累在淵冲随時四序合應物五情同發言形惻隐睿作挺神功下材均朽木何以慕雕蟲此篇前五韻按初學記作蕭慤秋日詩文苑一百五十八巻復云庾信作而此巻乃十韻共題王胄作觀其詞意只是一篇當以此本為正宴樂修堂應令江總見初學記肅城通甲觀承華啓畫堂北宫降恩賞西園度羽觴殊思奉玉裕終宴在金房庭暉連樹彩簷影接雲光仙如伊水駕樂似洞庭張弹絲命琴瑟吹竹動笙簧庸疎濫應阮衰朽惡連章奉和初秋西園應令蕭慤見初學記池亭三伏後林舘九秋前清泠間泉石散漫雜風煙蕖開千葉影榴艶百枝燃約嶺停飛斾凌波動畫船奉和初春出逰應令李百藥鳴笳出望苑飛蓋下芝田水光浮落照霞彩淡輕煙栁色臨三月梅花隔二年日斜歸騎動餘興滿山川奉和禁苑餞别應令禇亮大蕃初錫瑞出牧邇皇京暫以緑車重言承朱傳榮舒桃臨逺騎垂柳映京營惠化宣千里威風動百城禁篽芳春初學記作嘉節神襟餞送情金笳催别景玉管切離聲野花開且落山鳥哢還驚㣲臣夙多幸薄宦奉儲明鈞䑓慚作賦伊水濫聞笙懐德良知久酬恩識命輕奉和同太子監守違戀韓王元嘉乾象開層構離明啓少陽卜征從獻吉守噐屬元良逖矣凌周頌遙哉掩漢莊好士傾南洛多才盛北陽初學記作場地分丹鷟嶺途間白雲鄉儲誠䖍曉夕宸愛積炎凉珠璧連霄漢萬物仰重光同前薛元超儲禁銅扉啓宸行玉􅋴遙空懐夀街吏尚隔寢門朝地首瞻龍㦸塵外想鸞鑣飛文映仙牓瀝思叶神飈帝念紆蒼陸乾文煥紫霄雲塘横筆海平圃山海經槐江之山實維帝之平圃振詞條欲應重輪曲鏘洋韻九韶汴水早發應令虞世基夏山朝萬國軒庭㑹百神成功疇與讓盛德今為隣區宇屬平一庶類仰陶鈞鑾蹕臨河濟裘冕肅柴禋啓行分七萃備物象三辰祁祁亘原隰濟濟咸搢紳𤾉谷昇朝景青丘發早春衮衣敷帝則分噐叙彛倫臨淄成誦羙河間雅樂陳薫風穆已被茂實久逾新奉和長春宫應令虞世南瑤山盛風樂南皮象逸遊何如事廵撫民瘼諒斯求文鶴揚輕蓋蒼龍飾桂舟汎沫縈沙㠘寒澌擁急流路指八仙舘途經百尺樓眷言昔游踐回駕且淹留後車喧鳯吹前旌映采斿龍驂駐六馬飛閣上三休調諧金石奏歡洽羽觴浮天文徒可仰何以厠琳球追從鸞輿夕頓戱下應令前人重輪依紫極前耀奉丹霄天經戀宸扆帝命扈仙鑣乗星開鶴禁帯月下虹橋銀書含曉色金輅轉晨飈霧徹軒雲初學記作營近塵暗斗城遙蓮花分綉蕚竹箭下驚潮撫已慙龍幹承恩集鳯條瑤山盛風樂抽簡薦徒謠春日出苑逰曯唐𤣥宗三陽麗景早芳辰四序佳園物候新梅花百般障去路垂栁千條暗廻津鳥飛直為驚風葉魚沒都由怯岸人唯願聖主南山夀何愁不賞萬年春和同前應令張説禁林艷裔發青陽春望逍遙出􅀞堂雨洗亭臯千畆緑風吹桃李一園香鶴飛不去随青管魚躍飜來入綵航睿賞歡承天保定遒文更覩日重光同前賈曾銅龍曉闢問安廻金輅春逰博望開渭水清光搖草樹終南佳氣入樓䑓招賢已從商山客託乗還徴鄴下才臣在東周􅍦留滯忻逢睿藻日邉来皇太子頻賜存問并索唱和新詩因有陳謝釋廣宣望苑招延後禪扉訪道餘秪言俟文雅何意及庸虚率性多非學縁情偶自書清風聞寺響白日見心初重道逢軒后崇儒過魏儲青宫列芳梓𤣥圃積瓊琚鄭䑕寧容者齊竽乆􅃕諸空懐受恩感含思㡬躊躇應教和晋安王薄晩逐涼北樓廻應教庾肩吾向夕紛諠屏迎凉飛觀中樹影臨城日窓含度水風遙天如接岸㠶影似陵空陪文慙宋玉徒等侍蘭宫詠朝牀應教前人傳名乃外域入用信中京足欹形已正文斜體自平臨堂對逺客命旅誓初征何如淄舘下淹留奉盛明奉和汎舟漢水徃萬山應教前人桂棹沙棠船飄揚横大川映巖沉水底激浪起雲邉廻一作回岸髙花發春塘細草懸陪歌乗睿賞接醴侍恩筵誰云李與郭獨得似神仙北園新齋成應教庾信紅粉跂鳥翼山節拱蘭枝畫梁雲氣繞雕窓玉女窺月懸唯反照蓮開長倒垂盤根細壊石行雨暴澆池長藤連格徙髙樹帶巢移鳥聲唯雜曲花風直亂吹白虎題書觀𤣥熊帖射皮文絃入舞曲月扇掩歌児玉節調笙管金船代酒巵若論曹子建天人本共知春初賦得池應教張正見遙天收宻雨髙閣映奔曦雪盡青山路氷消緑水池春光落雲葉花影發晴枝琴樽奉終宴風月豈云疲從籍田應衡陽王教前人帝京惟赤縣宸居映紫㣲塗山萬國仰滄海百川歸東作事平秩仲月祀靈威含光開早扇閶闔啓朝扉洛城鐘漏息靈䑓雲霧巻森森虎㦸前靄靄鸞旗轉屬車猶類聚作逰綘闕風馬類聚作鳥度丹巘帳殿幸金輿旌門擁玉輦玉輦帶飛烟金輿映緑川雨師清逺路風伯静遙天分渠通沃野􅈭水入類聚作繞公田草發青壇外花飛蒼玉邉蒼玉臨初學記作陳珪璧青壇躬帝籍冐撅乃三吹齊衡均百辟蘭場儼芝駕桂圃芳瑤席山禽詠管絃野獸和鐘初學記作金石鐘石既相和江海復無波梁客簮裾盛陳王文雅多脩塗參弱駘喬木閉類聚作問輕蘿幸承温吹末擊壌自為歌衡陽王秋夜應制前人雎苑凉風入章䑓雲氣收螢光連燭動月影帶河流緑綺朱絃泛黄花素蟻浮髙軒揚䴡藻即事賦新秋賦得新題梅林輕雨應教前人梅樹耿長虹芳林散輕雨蜀郡随仙去陽䑓帶雲聚飄花更濯枝潤石還侵柱誰初學記作詎得零陵鷰随風時共舞詠雪應衡陽王教前人九冬飄逺雪六出表豐年睢陽生玉樹雲夢起瓊田入窓輕落粉拂栁駛飛綿欲動淮南賦亂下桂花前暮秋望月示學士各釋愁應教徐儀碣石寒光逺闕秋色髙長洲正下葉曲岸已飛濤君王悵晩節延佇謁神臯復屬西園夜輕輦暫遊遨遊遨未云賞蒼梧孤月上枝間影合離波上光来徃此夕未央宫應照仙人掌掌髙明轉浄夜深留睿想處處敞髙扄流照滿珠庭重輪入雅曲合璧應祥經燦爛浮珠網參差間玉星山幽有芳桂林静發新蓂蓂開在帝城分枝共月明斜暉漸西落彌軫闕歸情驂駕且來遊聖藻命舒愁詢芻以蠲痗參妙本難酬良吏稱太閎因時命應劉楚王追緑兕齊后出青丘馳原落雲翼截水曳吞舟無勞子虚咤即事可忘憂賦得㣲雨諸葛頴㣲雨間初學記作闇東峰散漫灑長松澗滿新流濁山霑積翠濃風起還吹鷰雲來本送龍登年随玉燭名山定可封奉和望山應教蕭慤仙逰本多趣復此上秋初巖低石倒嶮嶺髙松更疎峰形疑鳥翅塞路似狼居矚望清初學記作情無已詞殚意有餘奉和濟黃河應教前人大蕃連帝室驂駕奉皇猷未明驅羽騎凌晨方畫舟津城度維錦岸栁夾緹油鐃初學記作鍾聲揚别島旗影照滄流早光生劍服朝風起節樓滔滔細波動裔裔輕舷浮廻橈避近磧放舳下前洲全疑上天漢不異謁蓬丘望知雲氣合聼識水聲秋從軍何等樂喜從神仙逰奉和晩日楊子江應教栁顧言詰旦金鐃發驂駕出城闉鮮雲臨葆盖細草藉斑輪千里烟霞色四望江山春梅風吹落蘂酒雨減輕塵日斜歡未畢睿想良非一風生叠浪起霧巻孤㠶出掞藻麗繁星髙論光朝日空羙鄒枚侣終謝淵雲筆初學記亦載一篇其題目與栁顧言姓名並同詩却云大江都㑹所長洲有舊名西流控岷蜀東汎邇蓬瀛未覩纖羅動先聼逺濤聲空濛雲色晦浹叠浪花生欲知暮雨歇當觀飛斾輕未詳孰是梅夏應教薛道衡長廊連紫殿細雨應黄梅浮雲半空上清吹隔池來集鳯桐花散勝龜蓮葉開幸逢為善樂頻降濟時才詠寒食闘鷄應秦王教杜淹寒食東郊上雜詠作道揚韝競出籠花冠初照日芥羽正生風願敵知心勇先鳴覺氣雄長翹頻掃陣利爪雜詠作距屢通中飛毛遍緑野灑血積雜詠作㪚芳藂雖然百戰勝㑹自不論功奉教追赴九成宫途中口號李嶠委質承仙翰祗命遄遙䇿事偶從梁㳺人非背淮客長驅歴川阜迥眺窮原澤欝欝桑柘繁油油禾黍積雨餘林氣静日下山光夕未攀叢桂巖猶倦飄蓬陌行當奉麾盖慰此勞行役宴龍泓有序不録武三思登臨開勝託眺矚盡良游嵒崿縈紆上澄潭曲屈流泛蘭清興洽折桂野文遒别後相思處﨑嶇碧澗幽奉和梁王宴龍泓應教宋之問水府淪幽壑星軺下太㣲鳥驚司僕馭花落侍臣衣芳樹搖春晩晴雲遶坐飛淮王正留客不醉莫言歸奉和夏日逰山應教蔡文恭首夏林壑清薄暮烟霞上連巗聳百仭絶澗臨千丈照灼晩花鮮潺湲夕流響悠然動睿思息駕尋真賞掞彼渦州作懐兹洛濱想竊吹等齊竽何用承恩奨勅借岐王九成宫避暑之作應教王維帝子逺辭丹鳯闕天書遙借翠㣲宫隔窓雲霧生衣上捲幔山泉入鏡中林下水聲喧笑語巗間樹色隐房櫳仙家未必能勝此何事吹笙向碧空從岐王過楊氏别業應教前人楊子談經處淮王載酒過興䦨啼鳥換坐乆落花多逕轉廻銀燭林開散玉珂嚴城時未啓前路擁笙歌從岐王夜宴衛家山池應教前人座客香貂滿宫娃綺幔張澗花輕粉色山月吐燈光積翠紗窓透集作暗飛泉綉戸凉還將歌舞出歸路莫愁長文苑英華巻一百七十九
