body:
  text: 文苑英華巻四百四十九宋李昉等編制書二命相二權徳輿拜相制玉堂遺範門下夫宰相之任上以代天工輔佐之宜下以立人極燮調之理詔令無此四字爰得忠正方膺股肱正議大夫守太常卿上柱國襄武縣開國侯賜紫金魚袋權徳輿器度端實智識通敏學成師法文為國華素履常踐於貞方黄中允合於易簡自出入清列茂著嘉聲名利無屑於中懐風雨不移詔令作易其常性驥騄之質常識於逺途鸞鳳之姿宜巢於阿閣期于致理推之至公寵以春卿掌我樞務輔天地之徳俾化及平明導隂陽之和使物靡疵癘予違汝弼言無面從君可臣否事己心同詔令作許用佇𢎞美式副虚懐可守禮部尚書同中書門下平章事散官勲封賜如故元和五年九月武元衡冄入相制門下邦國興理将相是資選衆而舉思賢俾乂故有台臣外撫宣力已靖於四方衮職迭居懋功復凝於庻職允兹崇踐爰屬上才前劒南西川節度副大使知節度事管内度支營田觀察處置統押近界諸藩及西山八國雲南安撫等使銀青光禄大夫檢校吏部尚書兼門下侍郎同中書門下平章事成都尹上柱國臨淮郡開國公食邑二千戶武元衡粹厚端莊簡易常壹有誠明之道以致用有宏茂之略以佐時貞方自得於性術操尚不愆於風雨加以懿文合雅聚學承師通禮樂刑政之源逹古今治變之要歴登華貫休聞穆然洎處鈞衡中立不倚致君思堯舜之盛修職以邴魏為宗益部大藩比仗兼濟而能布宣威惠撫蒞蠻髦縣道輯寧疲黎安息推心而下皆率附正已而人自嚮方臨之累年理有殊詔令作異等朕以出納王命緝熈帝圖緫庻官之職業為百度之扄鍵惟此重任屬于黄扉分憂遂輟於殿邦具瞻再歸於碩望爾尚行之以中正煦之以和平毗于一人膏潤天下祗膺禮命無替徽猷可守門下侍郎同中書門下平章事兼崇𤣥舘大學士充太清宫使元和八年三月令狐楚拜相制門下賛天工而成光濟叶帝力以致昇平非中和禀氣不能將燮調之道非誠明在躬何以膺弼亮之位况今積祅詔令作殄已弭而邉鄙猶虞大化方行而里閭未泰将欲舉百度甄群材外撫四夷内輯諸夏納之夀域被以仁風代予之勤其孰克任眷求斯得是用命之河陽三城懐州節度使朝議郎持節懐州諸軍事守懐州節度兼御史大夫賜紫金魚袋令狐楚根於粹厚著以端明表山立之莊容洞泉渟之精識文髙雄冨學茂該通自頃揮翰掖垣持囊禁署嘗延造膝屢竭沃心發言有詔令作必誠臨事無惑藹是公望居然國楨及剖符近郊兼暢牧人之術仗節分閫尤深馭衆之方可謂器適中外效宣文武宜展舟檝之用式登鼎鉉之司管于中樞持我大柄於戯輔翼之任人臣極崇未至而衆馭有歸既處而其名罕副萬務攸託朕何賴焉爾其敬聽此言渝思其道行致君之志終始勿渝以報國為期夙夜益勵無俾厥后有慙知臣可朝議大夫守中書侍郎同中書門下平章事元和十四年七月李夷簡拜相制門下致理之道王者由其盡心弼成之功輔臣所以宣力皇極是建蒼生乃安敷求實難倚任斯重将付大政必惟僉諧正議大夫守御史大夫上柱國成紀縣開國侯食邑一千戶賜紫金魚袋李夷簡學詔令作才稱通明性本嚴重守以正直傳之文華羽儀朝端冠耀宗籍早司邦憲爰緫地征糾逖無聞於避强經費克均其定制中立不撓孤標出倫聳善激一作仰貪法行令肅自鎮漢上洎臨蜀州儉徳載彰清規一貫山岳比厚雷風有常勵貞峻以理心竭忠勞而奉上人望汲黯印歸趙堯俾之持綱萬目皆舉固可以綜參庻務允釐百工燮和隂陽宣發號令是用申命陟于台堦於戯說積爾躬夢恊朕志虚已将求其𢎞濟鯾言罔懼於怫違道必舉中位無苟曠膺此寵擢敬哉戒哉可守中書詔令作門下侍郎同中書門下平章事元和十三年三月夏侯孜拜相制門下篙檝克修航艦以之濟海羽翮可勵一作厲鵾鵬於是摩天朕恭已寰瀛勞誠夢獵将以篙檝賢輔羽翮寳臣以三代至理之英濟群生並洽之欲載仗舊徳期獲我心劒南西川節度副大使知節度使事管内度支營田觀察處置統押近界諸蠻及西川八國雲南安撫等使光禄大夫檢校尚書右僕射同中書門下平章事元和十三年三月上柱國譙郡開國公食邑三千戶夏侯孜大昴分精維嵩挺秀擅四海之賢俊作中朝之表儀禮樂詩書資其懿範温恭孝愛輔以多才服道以致身含章而底力經國之用貫百川而不改其清應物之明體萬象而莫窮其照周踐華列多識舊章郎署諫垣休聲夙振東陽故絳恵愛洽聞洎甘棠政成㑹府徴命兼領臺轄之任冄居邦憲之尊正色無私當官必舉㧾征賦以贍國幹山澤而富人美利無加遺澤益覩積是朝著一作徳昇於台司内竭謨明外𢎞體理馳咎䕫之極摯陋周漢之遐蹤克彰為輔之聲允叶有開之契屬者以西南重鎮邉徼多虞爰頼恵征以隆外閫福星時雨既恵巴庸景化元和須歸鼎鉉是用召於驛騎待一作代以天工重開集鳳之池冄仰問牛之化弼謨萬務師長庻僚亟付機衡俾康區夏於戯刀非礪不剖一作割魚非水不行為君誠難得中一作時甚易决疑定計吾以爾為神龜肥國救人吾以爾為上藥盡布四體懋堅一心勉哉勿疑對揚我休命可尚書左僕射同中書門下平章事散官勲封如故咸通三年七月一作皆唐大詔令韋執誼入相制門下宰相之職寅亮緝熈導隂陽之和賛天地之化裁成百揆揔領庻官非道契時中識通理本則何以敷暢皇猷一作極阜安群庻一作黎朕以𦕈身嗣守丕業思立人紀以承鴻休一作天其代予言允屬良弼朝議郎守吏部郎中騎都尉賜緋魚袋韋執誼孝友忠肅自誠而明茂實本於宗師英華發於事業久參内署動冝静恵累踐中臺職修事舉克有令一作公望冠于群倫以予冲人恭黙思道是用命爾納誨弼違必能行四方之風成天下之務祗乃茂一作􅡘乃職厥惟欽哉可守尚書左丞同中書門下平章事賜紫金魚袋永貞元年二月一作皆唐大詔令皇甫鎛加恩制門下選衆舉材俾參大政俟善績丕著嘉謨有成然後進序台階協宣徳務乃制輕重謂之盈虚以經用靡虧而成功克集黄扉之位式示疇勞具官皇甫鎛器識端方性尚孤直文發貞而詞去枝葉學為己而政資本根每脫落於浮榮能優游於劇任志圖經逺心惟狥公自貳中臺專㧾大計昇之相府兼賛鴻猷屬問罪二方徴師十萬千金難减於日費百役併萃於司存而供億罔差中外咸樂一作若泉貨無虞於竭涸干戈遂致於清寧允茲忠勤副我倚任是宜踐居左輔均賦中邦漸於雍熈期乃成績可守門下侍郎平章事依前判度支皇甫鎛罷判度支制門下古者丞相府不接吏盖以任重體大地親禮崇苟非征討之時豈仗貨財之事爰俾出納歸諸有司用嚴台庭以輔吾道中大夫守門下侍郎同中書門下平章事判度支上柱國賜紫金魚袋皇甫鎛精明絶倫乾健不息藴是器業發為英華頃以守位聚人必資大計因其能事委以重權致用之機所以經天下之務重輕之法所以莞天下之財自淮右不䖍東平犯順兵車在野饋食連年而乃庖無折刄御有濡轡既授明命升之股肱軒裳所瞻崖峯詔令作岸益峻請謁自絶其風凛然况贍給之餘謀慮必至平二方之險阻慮載戢之干戈庸非坐籌佐朕而致今則百揆攸叙萬邦保和宜全相府之重勿領計司之劇撫夷夏調隂陽用安元元時乃之職可守門下侍郎依前同中書門下平章事程异拜相制門下漢宣帝𢎞祖宗之業正刑徳之本簡求輔相以致中興朕祗荷丕圖思揚聖緒每懐舟檝以渉巨川俾人不迷用底于道今獲良弼式允僉諧朝散大夫守衛尉卿御史大夫充諸道鹽鐡轉運等使賜紫金魚袋程异厚徳外嚴沉機内朗抱精微以致逺本誠明以格物盡瘁亊國誠明在公常探化原雅髙學術揚歴斯久公望藹然自位列大寮揔諸劇務逹𣙜酤之利適財賦之方贍出納於邦家申績效於官業頃以淮夷未殄師旅在郊有漕輓之勞兼供億之費言念多事恐傷吾人而异法能變通道益明著言無伐善動必由𠂻藴夷難致君之心見懐道佐時之略况屬饋軍之事尚倚良能載閱前功宜當大用乃服休命俾參中樞爰表秩於冬官仍兼綜於舊職膺兹重任用表全材爾宜左右朕躬朝夕啟沃干戈未絶詔令作戢尤佇廟謀敬聽斯言副我明奨可守尚書工部侍郎同中書門下平章事依前充諸道鹽鐡轉運使元和十三年九月楊收加恩制門下古先聖哲之御天下也莫不勞於擇賢逸於任已一作恭己是以巖求匪易殷代稱宗畋獲甚難周王受命一作膺肆朕在位天授一作材正人於言語侍從之間得亮采恵疇之俊固亦髙邁前烈垂休當朝敬遵用汝之文一作言爰舉弼予之典雅符不讓㫁自無私翰林學士承㫖朝議大夫守尚書兵部侍郎知制誥柱國賜紫金魚袋楊收器茂渾金寳欽大玉瑩清冰於溽暑挺緑桂於嚴霜行過曽顔道兼夷恵詞一作文冠一時而若非游藝學該一作窮千古而似不能言自鴻飛名場鷺振班列憲署每聞其守法曲臺咸著於推公所蒞有聲歴試皆可才一作用彰簡要已洽譽於含香業擅精微遂騰輝於視草戒慎攸至初終莫一作不渝常懐造滕之中俾見沃心之㫖謝安體識王儉精一作才能動為僉論所諧居益一作溢具瞻之望由是擢於禁苑升以台階求匡輔之勤用燮和之事一作俾申匡輔之勤用燮和之重爾其慕伊周之志𢎞臯益之謨九流既分百辟斯正嘉猷可舒於前席妙略尚在於止戈式序三才允歸一徳懋乃致主副予知臣無使載筆之褒獨稱於姚宋也可守本官同中書門下平章事散官勲賜如故主者施行咸通四年五月授李逢吉門下侍郎同平章事制同前門下朕聞天地洪鑪鼓之者槖籥帝王大業成之者股肱故堯舜垂衣禹湯恭已𢎞道任徳惟一作為予輔臣則八表清寕萬邦咸乂一作理故伊尹之舉臯陶之升庻績其凝不仁自逺正議大夫守兵部尚書輕車都尉賜紫金魚袋李逢吉大方比量中正持心貞玉無瑕精一作堅金匪礪一作在礪峻節而髙山是仰推誠而止水可觀剛柔所持吐茹無易徃以青宫齒學導我典墳儀刑式孚蘭藿馨茂洎升台席翊奉先朝訏謨密聞獻替潜逹外順明徳中深至言温恭聿修終始一貫朕嗣守丕業思得賢良将俟和羮期於舊老易之襄漢居以南宫每詢嘉言啟沃惟允今授之相印委以樞衡代天之工爾在專任於戯發號施令選賢任一作與能能申於百辟之上行於四海之内朝無黨比人絶澆浮白黑燦然淄澠不溷使巖廊重位揚我清風𢎞宣大猷以暢王度可守門下同中書門下平章事散官勲如故主者施行長䖍二年六月一作皆唐大詔令除鄭朗工部尚書同平章事制門下雲因龍興龍非雲無以施膏澤臣由君用君非臣無以播皇猷信乎際㑹相湏以康天下永念詔令作言良弼常切寤思詳求國禎乃獲時傑通議大夫守御史大夫上柱國賜紫金魚袋鄭朗間代應期禀靈作瑞王室髦彦士林菁英温華凝珪玉之姿磊落負棟梁之任諫垣蘭省常推讜正之風㢘俗登壇克懋撫循之績洎領劇務益見盡忠杜邪徑而啟公途懲奸吏大制誥作利而絶私託饋軍無闕贍國有經委以憲綱尤彰直道是宜毗賛大業翊宣景化朕以區區齊晉取覇諸侯率由三賢叶心五臣同徳况今四海為宅百辟盈庭未能㓂靖塞陲人歸夀域豈無長䇿俾及升平惕然疚懐莫知攸措肆予命汝徃踐台階勉𢎞濟代之功罔致曠官之誚善調兵食以備我邉虞慎舉典章以貞我庻品敬戒于位惟其有終可工部尚書同中書門下平章事散官勲賜如故主者施行大中十年正月十二日丁巳韋貫之授中書侍郎平章事制門下地拱宸居任膺宰臣宣明大號佐佑丕圖失其道而庻事靡陳得其道而彛倫攸叙成我柱石在乎鈞衡况今戎役方殷廟謀為切利用既彰於歴試崇名冝允於僉諧右丞韋貫之代秉亷清天資貞白竒文包於五色茂徳體於千鈞含和抱公居易求己徊翔禮闥堅明以辨其妍媸綱轄仙臺宻靜克修其班制動有直氣居無流心洎權登衮職參事樞務平章庻事屢入三臺逺猷是經中立不倚𤣥成之慶靈斯集山甫之恭勤日聞俾重輝於相門爰正位於台座於戯宰相者實執人柄以為國楨化有未孚于休物有不遂其性俟爾髙議副予虚懐予欲恵于兆庻爾思均賦之宜庸觀在位式序品物咸亨鼔時風以淳厚吾人流王澤以光昭乃辟服我成命仰而行之可守中書侍郎平章事擬門下侍郎平章事制門下天地至大任四時以成功元首雖尊託三台而佐理况外居黄閣入奏青蒲寅亮皇猷緝熈帝載以相予位以安兆人必有夢卜之期式重将明之職求其具位果獲良臣擬中書侍郎平章事制門下四輔齊耀衆星拱於北辰百職分官萬物歸於西掖翺翔鳳閣泛泳龍池報我祖宗格於上帝今獲良弼天實賚予授盧翰劉從一門下中書侍郎平章事制陸贄門下集作勅寅亮天工𢎞宣理本俾予從乂時乃輔臣扈蹕載馳以勞定國懋官遷列式是彛章銀青光禄大夫行尚書兵部侍郎同中書門下平章事范陽縣開國公盧翰嚴重不撓貞方自持養恬鎮俗集作浮居簡濟衆言思無隠亊必有恒守尚書刑部侍郎同中書門下平章事賜紫金魚袋劉從一質厚器深識精體逺集作雅冲用無竭真規不渝從容以和出納惟允自鸞一作鑾車載駕薄狩于梁執覊有從我之勤及霤勵匪躬之節交修不逮集作怠庻績其凝俾並命於掖集作禁垣仍參掌於樞務今百度伊始四維載張論駮是非不可以不審宣揚憲令不可以不明爾其欽承無墜我丕集作休命翰可守門下侍郎同中書門下平章事餘並如故授劉滋崔造齊映平章事制門下朕嗣位君臨精求理道小大之務靡不經心日慎一日于今八載教化未洽蒸黎未康因之以甲兵繼之以災沴斯固鍳有所不至慮有所未周予􅇆集作心浩然若渉深水思所以匡我致理助我官人宣其澤而四方以寧執其要而百工式序允是大任其惟輔臣夣想勞懐敷求俊乂得兹良弼爰在周行權知吏部侍郎劉滋操履貞清介然自守居能慎獨動集作思不違仁析理究其精微勵學探於㫖趣集作其㫖奥守給事中賜緋魚袋齊映修已崔夣識通化源適時有成務之才事上懐匪躬之節藴蓄器業居為名臣中書舎人賜紫金魚袋齊映修已以立集作敬自明而誠體賢人可大之規用君子時行集作中之道虚受能擇清通不流惟滋之直方可以激風俗惟造之體度可以振條綱惟映之精深可以該物理我有大典爾其參之􅅷昭厥猷勿替休聞滋可守集作左散騎常侍同平章事造映可各守本官同平章事造仍賜紫金魚袋其有散官勲封賜並如故貞元二年正月文苑英華巻四百四十九
