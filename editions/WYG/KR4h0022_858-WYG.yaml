body:
  text: 文苑英華巻八百五十九宋李昉等編釋十鄭州大雲寺碑一首楚州淮隂縣婆羅樹碑一首五䑓山清凉寺碑一首台州乾元國清寺碑一首鄭州大雲寺碑李邕恭惟黄屋者異唐堯之大雅精舎者曷什迦之廣乘將以示崇髙𢎞誘進俾夫壯麗加于四海瞻仰攝於群情酌言永圖即理一貫矣大雲寺者鄭國慈縁之所建也觀其肇允枚卜爰適底居所感彌多光靈滋茂固以星晷上憲人統下稽執天物之大中合元宫之妙相豈止宅豐壌盤名州厦屋雲隂沙門玉立而已於是象設巨麗法供魁殊尊容乃神靈眷所仗則有寳座蓮動現身金光不同於凡復歸于静至使彌留咸華逺人孔殷香饌比肩花盖擊轂一心不起則從願應如二見無物則随施逾疾故能飛名勝出福履嘉祥昭升累朝發𢎞歴聖粤我髙祖堯皇帝俟時登庸從一作縱觀興感再駕尚軔五轉欲承鳯難疑矞雲龍睇霄極馳睿想於幽賛禱法力於大雄創建漆象一軀植净根也洎我髙宗天皇大帝纉祖匡業繼眀德暉萬流澄􅌡八風叶律齊致功於化造將有事於岱宗道由是邦言念兹者寺中留綉像一幀實也丁厥則天皇大后奉遺托孤與權改物母儀覇迹閫政神噐追惟乾䕃永動皇情眀啟度門宣遊覺路乃降綉像一鋪廣也借如崇建塔宇附麗朝闕慿縣官之力散王府之財中使相望匠人經始則有之矣未或介在草澤僻居里閭發皇明於日中落寵錫于天上有如此之盛者也日者通莊載堙繚垣式遏門途弗敞面勢匪宏浮雲在天蝦蟆蝕月具瞻者渇髙眀之歎歸止者憤翳欝之心寺主俗姓李氏名婆諦隴西姑臧人也發趣如因彌入禪寂雖獨得㫁相而同人有為乃陳詣府庭移牒省闥引仍舊之直矯易恒之枉申報曠祀奔走宣勞終于訟真成我道勝是以頽墻埧塹焚䒹平塲廣途褰開層構踴出疑若當陽豁若揵徑洛師之道盪胷冷然决渠滎波之水所謂形便得裝嚴具行李榮觀羣一作􅇿邑景矣長史河東桞冲府君道融至和性與元德從心絲譜遊刃翰林推轂演成誓言同事是刋厥懿豈伐于功其詞曰鄭之法宇兮在城一隅大雄應感兮休徴有殊累聖克念兮象設三鋪佛身圓對兮神光發圖乃奉靈勝兮至自彼都面勢推一作惟隔兮頽垣朽株南望不及兮欝然坐拘觀者佇眙兮願履夷途碩徳感發兮執心匪渝豈用歴紀兮兹事乃敷刻石傳懿兮表此亨衢楚州淮隂縣婆羅樹碑觀厥好德存樹愛人及烏有情不忘雖小可作夫施及者也則有宗廟加敬墟墓増悲覩物可懐比事期廣此觸類者也矧及通感靈變元符聖迹根柢净土碩茂佛時燭金山之祕影聮玉毫之殊相至若渥日法㑹茶毗應身䨇樹之間光覆僧祗之衆安可混曜散木比列清林議上茅之生喻堅固之神造者也婆羅樹者非中下物土所宜有者已婆婆十畆映蔚千人宻幄足以綴飛颷髙盖足以轉流景惡禽翔而不集好髙止而不與巢有以多矣然深識者雖能疑徊仰止而莫知冝識慱物者雖沉吟引稱而莫辦嘉名華葉自竒榮枯常異隨所方面額貞靈應東瘁則青郊苦而嵗不稔西茂則白藏㤗而秋有成惟南匪他自北嘗爾或季春肇發或仲夏萌生早光豐隨晩暮儉若且槁莖後吐芬條前秀差池旬日奄忽齊同無今者疑可殊非物理所測古老多怪時俗每驚巫者占於鬼謀議者感於神樹證聖載有三藏義净還自西城疑作域建疑作逮兹中土宿因依齊戒瞻嘆演夫本處真之舊間疑作聞原其始也榮灼道成之際䆒其來也𣙜藏薪盡之餘或森列四方或合并二體常青不壊應現分榮變白有終示滅同盡昔與什迦䕃首今為羣生立縁夫佛病從人有一來字大慈感故樹萎因物悲理然化能分身半枯即是以有合相後茂還齊冝其表正聖神靈貺品彚以變見一攝而稱讃十方者也淮隂縣者江海通津淮楚巨防彌越走蜀㑹閩驛吳七發枚乗之邱三傑楚王之窟勝引飛輿商旅接艫每至同雲冐山終風振壑官子惕息橋工疚懐魚貫延其萬艘霧集坌於層渚莫不膜拜圍繞焚香䕶持復悔多尤廻析景福於是風水相借物色同和挂㠶啟行萬舳駿邁浮山崛起而䟽巘慶雲亂飛而北峯雖電影施鞭夸父杖策罔可喻其神速曷云狀其豁快者哉州牧宗子名仲康廣孝惟家大忠刑國播清政以主郡儀古式以在人知㣲知彰有禮有樂别駕扶風竇公名誡盈盛門貴仕懿懐令名利用以厚生眀畧以營道上交不謟下交不黷司馬宗子名曰景虚受賢交幹用柔克退遂中律先後自公且觀麟趾之詩未𢎞驥子之任邑宰清河張公名松質藐自稚節忽乎傳一作慱聞始于能賦而彰中於成噐而立牧人通忽狥物合權威肅攝於神眀慈惠安其父母豈依政理自有才名莫不净慮一作浮盧一乘追攀八樹歎徒植而多感惟化生而永懐大啟上縁率以檀施碩直得多道暉寺主道元上座道約都維那曇一寺皆妙覺圓常什門上首痛金棺而既往駭堅林而在兹鄉里司徒元簡戴元景王元珪張仁藝王懐儼劉元隠沈信祥等夙悟大師深入真際勤行進力䕶供儼莊楊州東大雲寺法師希元廣𣲖清流固祗懐本戒行有以鎮浮俗利言有以誨蒙求既慿籍於衆心亦謀眀于獨得是標靈跡乃建豐碑其詞曰政化之理兮甘棠猶存寳乘之妙兮婆羅是郭欽厥道成兮八相克尊感乎示跡兮一歸可捫與佛合縁兮榮落同時歘爾化生兮變誰思休咎畧徴一作休真徴兮伺察不欺流俗莫識兮綿曠驚疑上人西方一作還兮覯止僧悲發呈靈貺兮堅固在兹方國傳聞兮想象悽其廽首正信兮頂禮䕶持優曇千年兮曷足儀之五䑓山清凉寺碑上尊王之分䕶大千也甘露以洒之慈雲以覆之香風以熏之惠日以暖之忽恍乎無相之體通淍疑作洞乎有形之類演正法降毒龍在清凉之山苑經行之地其山也左溟渤右孟津恒岳掲其前隂山屋一作崖其後五峯對聳四望崇崇蓄隂陽之神秀含造化之竒特每至丹霄出日俯拍雲霞清漢無波下看星月可以侔鷲嶺可以闢蓮宫在炎漢時卜中箭領用肇造我清凉寺在北齊時以八州租稅食我緇徒焉歴代帝王莫不崇餙洎我唐開元天寳聖文神武應道皇帝丕𢎞妙教大闡元宗渥澤浸而恒河流景福丞而鐵山固仍復舊號祗以修先是長安年中勑國師德感供以幡花文殊應見于代具大神變法大光眀儼兮似或存倐兮無䖏所凡稽首咸懐欣擇傍顧此身盡在光影其畢棄咎乃罔不休示立諸相而無所立廣度群生而無所度非大聖至神覆䕶其孰能如此者歟夫其清凉之為狀也壯矣麗矣髙矣博矣靡可得而詳矣赫奕奕而燭地崒巍巍而翊疑作􅀈天寒暑隔閡于簷楣雷風擊薄於軒牖星樓月殿慿林跨谷香窟花堂枕峯卧嶺尊顔有睟像設無聲觀之者發惠而興敬居之者應如而合道天花覆地積雪交輝梵響乘虚逺山相答珍木靈草仰施而紛榮神鍾異香降祥而聞聽凄風烈烈詎辨冬春奔溜潺潺不知晨暮經所謂吉祥之宅豈虚也哉開元二十有八載帝之元女曰永穆公主銀漢炳靈瓊娥耀質發我上願歸乎大雄爰捨金錢聿崇妙力奉為皇帝恭造净土諸像欽鑄銅鍾一駢之以七寳合之以三金影摇安樂之界聲震閻浮之國足以滌除煩惱足以開鍳聾盲二沙門清白懐忠置陳于禪林之院樹法幢以供之聲梵樂以安之惟時孟秋月望慶雲出山西北圓光五百餘丈有萬菩薩同見其間前後感應不􅑈數意者其福我聖君乎天寳七載貴妃兄銀青光禄大夫𢎞農縣開國男上柱國鴻臚卿楊銛奉為聖主冩一切經五千四十八巻般若四教天台䟽論二千巻俾鎮寺焉海墨樹筆竹紙花書宻藏妙輪千童萬品置之以寳案盛之以玉箱上裭祐于君親下澤潤於黔庻善夫上座曇財寺主神慶都維那智詵入妙覺海登大空山大德忠翰一作幹智空曇開如岸玉寳先覺蓮花不染髙僧清超净法雲光庭觀谷䕃禪枝巖栖戒葉並鸞鳯比德龍象叶心豈即舊而増脩亦惟新而超一作起構備致靈應昭彰邑郡以為智德斯遺靡籌稱謂句偈不忘式圖刋勒敢承前短強述斯文銘曰天作五山兮寔曰五䑓山一作䑓上出泉兮有龍為災大聖煦嫗兮戢毒徘􅆦西南其刹兮赫赫枚枚翠㣲之上兮崒崫崔嵬金容月滿兮寳座蓮開祈我聖皇兮其至矣哉以感以通兮為祉為福前際后際兮無去無來台州乾元國清寺碑李華天寶十五載逆將犯闕塵翳郊廟上皇哀蒼生避狄幸蜀皇帝誓復君父之耻理兵于朔方避狄仁之盛也復耻孝之大也惟仁盛孝大故疑不逾年而收京師奉陵寢凶孽走而天降之戮化一作元氣和而人至于道巍巍乎堯舜之烈不足比崇天子齊心元黙運行慈煦為一作與元吉卿士妙講一作議妙化之宗以為五帝三王之道皆如來六度之餘也厥初生人降及中古君臣父子日用而不知故𤣥聖昇竺乾而師有古先聖宣尼有言三皇五帝皆非聖者而西方有聖人其為大千之尊乳育群聖眀矣夫玉帛非為禮之本捨玉帛則無以為禮象餙豈施教之源捨象餙則無以為教建塔廟為禮一作尊威容履霜堅氷物有其漸於是卿士從兆人從九圍之中列刹相望矣盈川非古邑也襟東江西山因而城之寺在逺郊信者勞止自官吏耆耋至於商旅咸以津梁未建為媿為羞邑城之西有净名廢寺背連山而面通川杉栝晝暝緇褐經行寒潭夕清車馬無聲境勝心閑十金果成耆夀徐君賛録事徐知古等請於縣令隴西李公平平請于前刺史趙郡李公丹丹請于河南等五道度支使御史中丞京兆第五公琦琦聞於天子墨制曰可僧義璿等伏以乾元之初元惡掃除國歩既清廟易名牓因改曰乾元國清寺昭􅌖功也自所志一作治洎於州縣之長僚吏以降多捨清白之俸徴梓人求繪工為民儲福為佛成宫髙殿倚雲長廊生風蓮花出界開在空中自江南無有是刹上座某等至某都維那某奉前佛之心印得輪王之髻珠第五公以上智利國人登宰輔李使君以全德公才持憲為郎今刺史陳郡殷公日用忠武傑出長城江海専知官司馬隴西李公乾嘉峻一作俊能操綱清可激俗縣令李令宗室闕儒政之善者皆易簡詣於真境清净符于度門醍醐勝闕甘露妙源正性無說𢎞之在言其詞曰東裔名刹西方樂土吳山倚垣越水當户檉松黝靄下有象潭龍在泉中水容耽耽景象光澈江湖氣含天清寳界地湧靈龕大聖蒸蒸動乎天地百神奔走戎服既備命將誓師殄殱逆類奉迎太上開闢正位神人什憤品物咸遂皷舞賡歌上通元氣無思不泊雜沓禎瑞輪帝御㝢像法昭融項一作湏彌四洲建大一作大起蓮宫倬彼盈川秀冠越中縣有徳政州有名公奉宣􅌖謀爰度崇工一作爰崇梵侣開士慈雲惠風願言上報聖夀無窮建表勒名堂堂乎鍾文苑英華巻八百五十九
