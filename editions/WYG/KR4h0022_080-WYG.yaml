body:
  text: 文苑英華巻八十宋李昉等編鐘鼓霜鐘賦一首夜聞山寺鐘賦一首觀鑄鐘賦一首洪鐘賦一首鼓鐘于宫賦一首長樂鐘賦一首敢諫鼓賦一首諫鼓賦一首數里鼓賦一首六街鼓賦一首霜鐘賦并序喬潭南陽有豐山山有鐘霜降則鳴斯氣感而應也潭忝預少宗伯逹奚公特逹之遇擢秀才甲科庶㡬人間有是譽處然南陽則公隠居之舊也故為霜鐘賦以廣知音豐山之峰巉巖積翠之石森爽凌一作冐寒之松上無鳥飛一作飛鳥下無人蹤深一作何杳杳以静謐有天然之古鐘兩欒神資九乳靈化寜失制於侈弇豈遺音於窕摦每簴器以自閑常宿懸而不下一作每虚氣以自得常宿懸以警下動於耳而藏於心必髙秋之良夜於是泬寥兮日暮而天晶蕭瑟兮霜落而風清爽氣無朕前来滿盈跳然出復一作復出鏗爾有聲信不擊而不考能大鳴而小鳴始則函一作含胡擁鬱旋復充詘紆閒若往若還徘徊其間爾其舒肆奔放長齊一作欒逺暢乍浮空以紆餘更觸物而瀏亮入林蕭蕭在水湯湯泛濫淺瀨聨綿踈篁夜鶴怨兮彌若寒猿悲兮更長餘韻舂容隨風悠揚遶於洞庭浮於瀟湘梧楸紛以離披蒹葭颯其蒼蒼及夫夜已艾兮彌静山無人兮月冷時一作初肅肅而一作以自凄復硠硠而虚警其動愈出其来甚徐合於元化遊於太虚轉達一作逺而盡誰知所如聊獨立一作坐以傾聽恍若失其躊躇聽不及已想存其餘方其寒氣曉集鏘然應急發越林巒周流井邑前聲未盡後韻相及羇臣之空館屢来思婦之髙樓偏入莫不恍然驚夢歔欷掩泣夫鐘之應霜也應以無心士之知己也貴其知音不鼓而鳴者其聲逺不言而信者其分深故自然之聲無假於煩手特達之分不資於騰口吾欲徴華鐘喻良友懐音退一作淵黙藏器虚受可以適南陽待清霜之一扣亂曰風籟起兮喧長薄霜鐘鳴兮動哀壑合大塊兮聲無作雖有聞兮常寂寞夜聞山寺鐘賦時宿髙山少林寺李子卿寒月山空蕭蕭逺風有客静聽雙林之中鷲嶺深兮夜分後龍宫隠兮洪鐘扣蒲牢鬬兮獅子吼魍魎懾兮魑魅走搏泉頂兮隤谷口入有間兮出無有其發地也衆竅怒兮群籟起既聾山兮從疑噎水石鼓震於四荒雲雷飛於百里其在空也漫兮浩浩殷兮雄雄若陽臺之散雨似溟海之生風其稍絶也小不窕兮細不𦂳斷還連兮逺而近著回風而欲散值輕吹而更引寂兮寥兮忽不知其所盡或有宴坐真境觀空禪林将冺萬法是資一音惟其来無所見其跡察其去不可得而尋繁焉則應應而無心葉蠒曽是而問一作聞或作問縛驚猿因斯而受擒别有道冀隠淪學傳文囿鏗爾而作賈勇在於横撞洞然而来含毫思於一扣嶺上曈曨星漢移松楓颯颯風未詳吾欲不書山鐘之状何歌於斯詠於斯觀鑄鐘賦翟楚賢隂陽作炭兮天地為爐陶甄庶類兮品物昭蘇上法下象兮智者紀圖終宵盡日兮工人製模圖之如何情専思苦模之如何聚沙凝土金堅以為樣度窕摦而成規矩設機闗立扉户憑虚無以蹙凝疑槖籥之有主尊鳬氏之宏規鑄龍宫之信鼓青蓮妙果兮蒼生所怙檀施如山兮縱觀如堵回禄用事兮烈氣激揚飛亷呈巧兮熾聲赫怒沸沸渭渭奪於日光霍􅜱燐亂青熒蒼黄𤣥穹之星夜落焉可侔象赤城之霞朝起無以比方疑崑崙之飛爍吸晴天之太陽聚徒侣走匠石煎金膏煉鉛液青白之氣畜精粗之氣適伶人奏樂以先譟法侣焚香而接迹願疑觀者攅眸以奔騰畏焮者連袂以辟易開竇泉注歸模電射固倏空而成功乃踟蹰而方闢攅鍤開長繩曳衆力㧞群扛制歸禪闗之清浄亂埃窞之堙瘞禮含禀說之文旋起熊龍之勢懸於簴鼓於宫氣凌厲聲沖沖清塵濁警昏䝉惟良匠之鎔鑄尚其如此况鴻鈞之陶冶行乎至公洪鐘賦謝良輔昔者皇帝度六律和五音率伶倫之士緫金石之鈞将合樂以教令俾洪鐘以平心當其形器作坯土進太房既列風槖伊震奉眀謀以立象窕摦不􅄽出良冶而成聲函圜得儁空以受氣動以發生尚羽大擊逢霜小鳴穢浮為之踈曠沉伏由其震驚如戢韻以待扣每登懸而惡盈若乃長鯨似小猛簴為狘崇巒呦糾練響潜越九乳形矣信垂範於九州兩欒存焉更分儀於日月虚而不屈應而無窮廣樂之器為音之雄欲其能鳴幸舂容以大扣冀乎聞外必鍧厲之有中不誇乎窮髪之墟實美乎亭臺之宫儻擊考之無厭敢昭宣於國風鼓鐘于宫賦以喻以鼔鐘自中形外為韻李程徴鼓鐘于前聞誠修身之善喻始自中出終能外布此夫曠理必彰善惡之由将以審音不失洪纎之度擊之于宫聲無不通乍超越以迴出竟周流而四充聞之者足可以自誡聽之者於焉而發聦若然則處暗室者可以慎獨在多言者曷若守中豈徒夹兩欒滿九乳運四氣而應律合五音而中矩必将察理亂之變眀是非之至播洪音於萬鈞在敏手而一鼓由審音以聽焉未見自字官韻鐘之為喻警夫行道之人聲也何從出乎有過之地苟由中而既發諒聞外之難秘夫鐘之所響響而見聽人之所慎慎於未形雖扣之而在寝必聞之而盈庭禮失所譏想杜蕢之揚觶教之以義嘉大禹之勒銘和順積中辟疑訇發外可以掩笙鏞之逸響節干羽之繁㑹究彼所從爰自九重鏘然有聲初疑乎叔之離磬鏗以立號如辨乎倕之和鐘其小也究而無滅其大也摦而不容原乎其異察乎所以若禮之失惟鐘是比茍因聲而必聞信無良而可恥故能分清濁韻宫徵将有感於動心寜取樂於盈耳故君子之聽鐘非其鏗鏘而已長樂鐘賦鄭錫漢宫昏曉兮樓殿相望雙闕雲聳兮千門日長銅壺夜漏金鏡朝光鏘華鐘兮肅天居之岑寂張猛簴兮壮神容之焜煌含虚守静應用無方聞之者朝警而夕惕扣之者神和而意揚此乃樂府之彞器宫懸之髙張豈比夫羽籥絲竹匏土革木徒攅雜以鏗鏘若乃九陌初昏重門聚􅈀清禁將開繁星乍落月宿翠樓風清金閤發清聲之響亮覺層樓之寥廓思逺客於鶉衣怨美人於羅幕足使懐愁者感之而増欷得志者聽之而愈樂豈在物之有心伊人情之所托及夫雞人未唱鵠鑰猶封星翻南陸月掛西峰出入萬室周流九重走軒車於金馬震櫺檻於銅龍千官警兮清珮響百鳥鳴兮春露濃豈謝泗濵之浮磬豐嶺之霜鐘而已哉夫其逐吹含空馳烟驛霧徘徊宫闕演漾官署虎嘯空中龍吟何處近從丹庭之室逺盡青門之樹刜之以劍思利器之一揮擊之以莛嘆酌斯之再遇一作嘆清音之難遇豈獨稱鳬氏於周典發鯨魚以漢賦爾其舂容鼓怒之音千石萬鈞之實洪爐鎔冶之姿一作貌白蟲篆三字一作蟲篆龍文之質總衆美以混成亮吹萬而得一客有羇旅靈臺經過牟首𤣥文未獻白賁徒久聲聞於外空美鼔鐘于宫氣或在天誰知蔵劍於斗懐洪音而未發敢虚心而待扣敢諫鼓賦以聖人来諫諍之道為韻白居易大矣哉唐堯之為盛一無此八字鼓者樂之器三字一作工所制諫者君之一作所命鼔因諫設發為治世之音諫以鼓来懸作經邦之柄納其臣於忠信一作直致其君於眀聖将俾乎内外必聞一作将使内外必聞上下交正然後為一人之慶􅄨其㫖知君上之無私酌其義知臣下之勿欺二十五字一作於是乎唐堯得以為盛者也至矣哉獻納者於焉直節諷議者由是正辭一作諷諫於焉盡節獻納由是正辭故蹇蹇匪躬道之行也鼘鼘不已聲以發之雖言之無罪而擊之有時十字一作言之者無罪擊之者有時在由是正辭之下始也土鼓増革一作華蕢桴改造外揚音以應物中含虚而體道不窕不摦由工人二字一作巧者之作為大鳴小鳴隨諫者二字一作直臣之擊考若乃宸居謐静閶闔洞開隠隠聞於天闕鼕鼕發於帝臺既類夫坎其缶宛丘之下亦象乎殷其雷南山之隈若乃至南山之隈一作有若坎其缶于宛丘之下又如殷其雷在南山之隈音鏗鏘以鞺鞳響容與以徘徊儆乎一作于帝心四聰之耳必逹納諸人聽七諍之臣乃来故用之一無此字於朝朝無靣從之患行之一無此字於國國無居下之訕洋洋盈耳幽贊逆耳之言坎坎動心眀啓沃心之諫且夫鼓之為用一有也字或備於樂懸或施於戎政以諧八音節奏以眀三軍號令元本作八音之節三軍之命縁第一韻已押君之命故從集本未若發揮謇諤啓廸諫諍一作備察朝闕發揮廷諍聲聞于外以彰我主聖臣良道在其中以表我上忠下敬稽前典叙彛倫諫鼓既陳諫聲乃臻對善旌而俱懸義之與比将謗木而並出徳必有鄰稽前典至必有隣一作然則義之與比徳必有隣将善旌而並建與謗木而俱陳是以一作必聞其音則知有獻替之士聆其響豈一作必獨思将帥之臣嗟乎捨之則聲寢用之則氣振雖諫諍二字一作聲聲之在鼓終用捨而因二字一作之由人凡一作皆集本諫鼓賦以聖帝之心渴於聞過為韻王起先王懼五諫之或替恐四聰之有蔽爰立鼔於朝得為邦之制臣之擊也將宣補衮之誠君之聽焉是叶從繩之契所以臨下國所以承上帝豈鼕鼕於金奏之間坎坎於宫懸之際亦既戒止居然可分契無私之路彰不諱之君猛簴趪趪以特立直言謇謇而必聞聽其音知有譎而有諷察其状亦非鼗而非鼖借如眀眀哲后輔以賢佐懼徳化之失慮政刑之墮必佇斯音用補其過乃有誾誾之闕諤諤如林或匪躬自致或造膝来箴叫帝閽而九重猶逺獻工藝而一人且深於是伐兹鼉鼓殷爾雷聲氣作援枹雖假下臣之手聲聞黈纊終沃大君之心豈表識於作礪将思度於如金誰謂再而衰響不可遏誰謂三而竭志由是達防口之政多慙逆耳之言載渴列彼天居大音所儲志惟厲乃仁則依於得夫賢掩善旌之所進箴於闕殊謗木之所書自得與一言而戾止何必諧八音而樂胥方今堯舜在上伊臯為政皇建極睿作聖而百官尚箴七臣猶諍用設之為舊典亦表之為新令念兹在兹是訓是彝藥石必納芻蕘不遺鼓也髙懸寜不考而不擊君惟無過願歌之而舞之數里鼓賦以聖人立制智者研精為韻栁宗元異哉鼓之設也恢制度於天邑佐大禮於時行即行贊盛容而立之斯立觀其象可以守威儀之三千節其音可以表吉行之五十配和鑾以一作而入用並司南而為急若乃郊薦之儀既陳封禪之禮攸執經千里而分寸可候度四方而禮容是集施五擊於華山之野知霧氣已籠用百發乎南山之陽識雷聲所及先聖有作後王式遵啓𤣥機以求舊運巧智而攸川文粹作信新相彼良工自殊昧道之士眷兹木偶應異迷途之人齊步武而無佚差逺近而有倫遵大路㒺􅄽乎禮典聽希聲克正於時廵雖道有環廻地方險易固善應而莫實諒知㡬而有為載考載擊所辨于一作乎長亭短亭匪疾一作亟匪徐足分乎有智無智觀其妙矣孰測其微細觀其徼矣一作兮詎知其啓閉音不衰而得度響其鏜而有制于以翊龍御于以引天旋異銅渾之儀亦可叙紫微之星次殊玉漏之制而能步黄道之日躔周物之智斯設極深一作塗之幾是研鄙繁音之坎坎陋促節之闐闐妙出人謀巧一作思由神假時然後擊贊賞一作虞典于今兹動惟其常契同一作周文于一作於古者由是皇衢以正帝道斯盛恭出震以成威三字一作之威儀膺御乾而啓聖我后得以昭文物展聲眀不􅄽於素可舉而行宜乎騁墨妙呈筆精固敢先三雅而獻賦庶将開萬國之頌聲此據栁文校定其一作皆集本六街鼓賦以動心駭耳防非之道為韻王履真惟道路兮此有其紀綱在昏曉兮用警於行蔵設彼鼓節以為人防俾守度而知禁咸順時而嚮方觀其四門洞達九逵攸長不有司局則政或以荒不有式遏則人或以􅔯粤惟聖唐作法兹始岐路分職里閈對峙萬井如棊三條若砥樹鼉鼓也㒺不式遵命虎賁焉各慎所履日入于酉俾于行者止斗回于天警夫居者起惟其度數自合銅龍之漏節其晝夜不失金烏之晷豈比夫繁於手盈於耳而悦彼姝者子乎每司辰而不􅄽必候時而後動聲坎坎而旁殷遐邇氣雄雄而中遏煩偬通途廣陌萬户千扉晨應雞鳴夕催人歸牛羊下時迎暮烟而斯發河漢云沒伴曉色而漸微此乃守常有則守矩不違一厥人兮人懐其信齊厥政兮政絶其非不然者則是或見訛下無所楷使六厯時謬萬夫聽駭是知街之設也所以通達幽深鼓之懸也所以發揚聲音豈獨警其當路亦用革其非心職是司者爾㒺不欽無先天兮以欲敗度無後天兮則人匪忱别有養䝉以居惜隂為寳逰藝鄒魯觀光咸鎬每聽喤喤之聲實樂平平之道敢課虚而進牘聊體物而摛藻未見之字官韻文苑英華巻八十
