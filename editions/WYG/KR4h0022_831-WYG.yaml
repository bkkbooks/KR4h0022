body:
  text: 文苑英華巻八百三十二宋李昉等編刻候易州候臺記一首池州造刻漏記一首歌樂琴㑹記一首王氏廣陵散記一首歌者葉記一首圖畫十八學士圖記一首九疑山圖記一首風后八陣圖記一首保安鎮陣圖記一首張僧繇畫僧記一首刻候易州候臺記李徳裕昔武王順天應人奄有周室邵公受命作伯宅兹燕土列分冀為幽之都專受脈執燔之命於是建宗廟立城市分噐輯其邦家築臺觀乎雲物則候臺之建允或在兹初具版幹陳畚鍤書丈尺糗一作餱糧之數度髙平逺近之差奔命子來執用林聚約之閣閣荷鍤而雲隂數重築之登登相杵而雷響四合成之不日欝兮崇山將中天以懸居豈承露以特立然後分保章以典之命日者以覘之使八風不姦五雲式序人無凶札夭瘥之疾國絶䘮荒水旱之沴凡若是者數百年至六國糜沸九州𤓰剖昭王平一無平字能破齊抗趙候雲在朔則二至二分之占五紀五緯一作五行五紀之數雖少沒振未大滅裂及秦有華戎漢封郡縣析木空聞於分野甘棠已盡於剪伐則眡祲之儀掃地都盡廊廡旅乎荆棘階阯穴其狐兎自我唐再造區夏大分岳牧使鎮天子之邦不同諸侯之郡遂及陳迹以作新臺既無占候之事共為宴樂之所雖山節藻梲禮不僣於大夫而刻桷丹楹誠終慙乎君子代為故事人無間言洎我良牧郭公博采舊史發揮新意文物大備懲勸可觀公名明肅字晉容太原郡人也監門將軍之孫御史大夫之子纉戎餘慶克荷明徳靈源與天地争長廣度與江湖比量故能受明主之詔剖太守之符澤從雲㳺心入水凈俗變於道禮賢存擁篲之風人歌其徳聼訟擬一作紹坐棠之化幸三年而政教已成雖一日而墻宇必葺以為先王議事理不忘本君子懐徳人惟求舊况候䑓易之古臺也壯址仍存昭王燕之賢王也盛徳不泯欲觀古人之象至止可以肅肅如享太牢之味登之可以熙熙遂於臺之外壁列劇辛樂毅焉以為道者萬物之奥天地之禪六度之門寂滅之義施之于國則富證之于人則夀况守道者必嚴之于吸風飲露安禪者必釋之以息照冥境乃於臺之内壁圖桑門一作䘮偶宴坐焉以為孝者徳之本揔人百行貞者事之幹為乾四徳至天則風雨以時比竹而霜霰不變廬於墓有田氏之子安其室有王章之一作也非妻生芝草於大隧之前是加一等詠栢舟在中河之側乃無貳事復於其次為遶墳薦鯉焉俾觀者如堵覽之駭目擊懦夫烈士之節警貞女孝子之心豈徒壓百雉之崇墉架九烏之峻堞軒榭窈窕松桞隂映幽室納寒谷之氣炎天下霜畫梁對霽雨之輝晴虹射日夫如是則登之不假贈扇北風其凉視之不待褰幃太山如礪豈比夫逐荆臺遂為流遁畫麟閣不有姓名者哉别駕彭城劉公循忠從政以賢方協海沂之詠司馬清河張公瓉食禄以徳爰光中外之逰咸秉濟代之材以成考室之羙雖二公𢎞一作行非化有無窮之令聞終三后協心樹不朽之丕構徳裕邑人也實寡聞見㧞薤投水徳未半於任棠築臺置金禮何多於郭隗敢不傳美以為實録蔵於屋壁誠有媿於家書勒於碑版庶無慙於臺記時建崇𤣥學之嵗秋八月旬有九日其從事叅佐等學冨今古材堪經濟雖懐坐嘯之功未展摩天之力並勒石于後以克永代池州造刻漏記杜牧百刻短長取於口不取於數天下多是也牧太和三年佐沈吏部江西府暇日公與賔史環城集作吏環城見銅壺銀箭律如古法曰建中時嗣曹王臯命處士王易簡為之公曰湖南府亦曹王命處士之集無之字所為也後二年公移鎮宣城王處士尚存因命工就京師授其術創置於宣集無宣字城府牧為童時王處士年七十嘗集作常來牧家精大衍數與雜機巧識地有泉鑿必湧起韓文公多與之逰太和四年牧自宣城使於京師處士年餘九十精神不衰牧拜于牀下言及刻漏因圖授之㑹昌五年嵗次已丑夏四月始造于城南門樓京兆杜牧記歌樂琴㑹記栁識君子之座必左琴右書雅好閱古古亦置於舟車也大厯六年浙西觀察使蘇州刺史兼御史大夫賛皇公祗命朝于京闕春正月夕次朱方刺史樊公稱江月當軒願以巵酒侑勝居無何賛皇公絃琴樊公和之演操相應澄清撫綏逓為伯牙更為子期琴動人静琴酣酒醒清聲向月和氣在堂春風猶寒是夜覺煖既罷一作罷宴之後賛皇顧潤州曰見明珠者始賤魚目知雅樂者方鄙一作始賤鄭聲自樸散為噐真意在琴與衆樂同法三字一作同出於虚獨能致静同韻五音獨能多感同名為樂獨偶聖賢是宜稱徳切近於道昔堯以美利利於天下曲名始暢自舜禹至于夫子不居盡善稱操自持聖達節次或作賢守節達宜仍防守徴河深此句疑而猶至弄已下習多一無此三十字不正一作止且聲著哀思或當戚自陳其後居常翫之和理所措若然者寜襲陶公真意空拍而已豈襲胡笳巧麗異域悲聲我有山水桐音寳而持之古操則為其餘未暇是知賛皇所好無非訓典一作貽訓似有道而猶重之若此况乃真有道之士乎輙紀述一無述字所論貽諸達者一作皆唐文粹王氏廣陵散記顧况衆樂琹之臣妾也廣陵散曲之師長也琅邪王淹兄女未笄忽弹此曲不從地出不從天降如有宗師存焉曲有日宫散月宫散歸雲引華嶽引意者虚寂之中有宰察之神司其妙有以授王女於戱天地鄙恡而絶神明倜儻而授中散没而王女生一作傳其間寂寥五六百年先王作樂殷薦上帝有不得而聞者皷鍾時動敢告於太師歌者葉記沈亞之昔者秦青之弟子韓娥從學乆之以為能盡青之妙也即辭去青送之將訣且歌一歌而林籟振蕩再歌則行雲不流矣娥心乃衰然集有則字韓娥亦能使逶迤之聲環梁而逰凝塵奮發集作飛微舞上下者三日不止能為人悲亦能為人喜其後漢武時協律李延年為新聲亦云能二字集本川文粹作尚感動人至唐貞元中集本川文粹作貞元元年洛湯金谷里有女子葉學歌於栁恭之下二字二本作恭下之初與其曹十餘人居獨葉歌成無等後為成都率川文粹作帥通用家妓及率死復來長安中而轂下聲家聞其能咸為集作與㑹唱次至葉當引弄及舉音則絃工吹師皆失執自廢既罷聲黨相謂約慎語無令人得聞知是時博陵大家子崔莒賢而自患其室饒乃曰吾緑組初秩寜宜厚蓄以自奉集作封耶遂大置賔客門下縱樂與遨逰極費無所恡也二本作無有所恡他日莒宴賔堂上樂屬因言曰有新聲葉者歌無倫請延之即乗小車詣莒莒且酣為一擲目作樂乃合韻奏緑腰俱囑葉曰幸給聲葉起與歌一觧一坐盡眙刺利反是日歸莒莒沉浮長安數十年葉之價益露然以莒能善人而優曹亦歸之故卒得不貢聲中禁葉為人㓗峭自處雖諧者百態争笑於前未嘗換色元和六年莒從事岐公在朔方時余徃謁焉令與公賔舍於郵在莒鄰夜聞其歌有一人坐泣且集作甚悲良乆復悅及卒聲而悲悅再三曰孰與集作為之是欲吾不得自任矣明旦問其狀乃葉為也後莒復與岐公來彭城十年余過其居問葉安在曰近逝矣自趙璧李元慿集作馮世稱為知音之尤皆擅鼔絃及為余言葉之歌使其妙自循集作備則音屬不知和矣鳴呼豈韓娥之嗣與惜其終莫有能繼其聲者故余著之欲其聞於後世云圖􅀞十八學士圖記王覿夫立身之功莫大於行道行道之功莫大於逢時行道則孝悌才學有聞逢時則仁信機謀及物有其時無其材斯固一作故自犬彘也有其材無其時得不憤心涕血歟則知無代無材計用與不用耳髙祖起於沛光武起於南陽而籌畫功勲獨出豐宛之士蕭丞相從漢帝入闗封府蔵而收圖籍房太尉從太宗征討捨珠玉而採人材二君子之徳一作材豈偶然也十八學士皆煬帝之臣曷闇於隋而明於唐是有其材而無其時也如晦𤣥齡止於一尉或非好去任或挂􅃠徙邊禇亮虞南不離下位或嫉才見謫或七品十年暨我國家則有道兼文武噐重珪璋者慷慨大節臨機能斷者仁孝忠直預識存亡者㓗行檢身而有英畧者好學敏達詳明吏道者出入軍旅涉歴危難一作難危者不憚兵威樹立忠誼者博聞貞儉文翰兼絶者風韻閒雅善於吟咏者精練古訓長於講論者夫如是則立身行道之事盡在於斯矣得不𡨕心契志以自朂勵哉覿每覩十八學士圖空瞻賛像而已輙各採本傳列其嘉績庶幾閱像者思其人披文者思其人非惟臨一作昭鑒耳目抑可以垂誡於君臣父子之間也九疑山圖記元結九疑山方二千餘里四州各近一隅世稱九峯相似望而疑之謂之九疑亦云舜望九峯疑禹而悲從臣有作九悲之歌因爲集作謂之疑九峯殊極髙大逺望皆可見也彼如嵩峯集作華之峻峙衡岱之方廣在九峯之下磊磊然如布碁石者可以百數中峯之下水無魚鼈林無鳥獸時聞聲如蟬黽莫杏反前篇作蠅之類聼之亦無徃徃見大谷長川平田深淵杉松百圍榕前篇作檜栝並之集作茂青莎白沙洞穴丹崖寒泉飛流異竹雜華廻映之處似蔵人家實有九水出於山中四水南流灌前篇作貫於南海五水合集作比注合為前篇作於洞庭若度其髙卑比洞庭南海之岸直上可二三百里不知海内之山如九疑者則集無則字幾焉哉集作或是曰若然者兹山何不列於五岳對曰五帝之前封疆尚隘衡山作岳已出荒服今九疑之南萬里臣妾國門東望不見西岳集作涯際西行幾萬里未盡前篇作見邊陲當令集作合以九疑為南岳以崑崙為西岳衡華之輩聼逸者占為山居前篇作林封君表作苑囿耳但若當世議者拘限常情率引古制不能有所改剏也如何故圖畫九峯畧載山谷傳於前篇作之好事以旌異之如山中之往跡峯洞之名稱為人所傳說者並隨方題記庶幾觀者易知時永泰丙午年集作中也此篇七百三十七卷重出前已削去風后八陣圖記獨孤及物不終静必受之以動當純坤用事隂疑於陽則飛龍戰太朴以散聖盗並起故戎馬生乃有力集作并吞八荒争截九有大者天柱折地維絶小者作慝盧山負阻中冀上帝慿怒下土是恤乃眷武徳黄帝受之始順殺氣以作兵法文昌以命將於是乎征不服討不庭其誰佐命曰元老風后盖戎行之不修則師律用爽隂謀之不作則㐫噐何恃故天命聖者以廣集作光戰術俾懸衡於未然察變於竒獸集作倚數握機制勝作為陣圖夫八宫之位正則數不愆神不惑文粹作忒故八其陣所以定位也衡抗於外軸布於内風雲附集作負其四維所以備物也虎張翼以進蛇向敵而蟠飛龍翔鳥上下其勢所以致用也至若疑兵以固其餘地遊軍以按其後列門具將發然後合戰弛張則二廣迭舉掎角則四竒皆出必使陷堅陣㧞深壘若星馳天旋雷動山破彼魏之鶴列鄭之魚麗周武之熊羆昆陽之虎豹出匪以律我異於是既而圖成罇爼帝用經畧北逐獯鬻南平蚩尤戡黎於阪泉省方於崆峒底定萬國旁羅七曜鼎成龍至去而上僊於是遺風㝠㝠時亡而圖在在字集作存焉嗚呼集本文粹作戱聖迹長徃神機未昧酌其流者猶足以决勝九集作三軍禦侮萬里故項籍得之以覇西楚黥布得之奄有九江漢孝武得之攘匈奴服甌越東收獩貊西拓大夏然則聖圖幽賛未始有涯唐天寳中客有為韜鈐者得其遺制於黄帝書之外篇裂素而圖之則勝敗之朕在我指集作股掌天地之心見於毫末議欲獻諸策府用廣武事㑹天子以不戰為師無為為寳則是圖也興於多難廢於昇平湮淪不書盛徳其没乃集作及旌諸圖側以為三皇之故事六藝之餘技云保安鎮陣圖記符載甲子嵗我王克蘄春之明年也是時天王居梁州丞相司徒勉出於陳留逆豎乗是遂為一作于六合鯨吞虎踞使宿賊杜少誠長短兵三萬方將㧞蘄取黄濟江而南至于五嶺盡以天子之地懸自受署焉春二月逆師自穆陵隂山白沙三大闗支下而進威聲炎炎如無枝梧縁道邏守已陷六七我師洶然少沮氣勢王感槩激三軍沉畧通神明以為是鎮地勝而險固卒薄而孱老彼必知我將銳志而圖之設伏衆戎盡殪可也乃命兵馬使伊慎桀帥驍悍四千人御枚宵入張諸柵之卒人伏于莽間賊果體疑來以蝥弧偕登於是中軍一皷萬夫雷呼内兵乗髙而唐突之伏卒陵背而芟割之紅旗拉風長㦸如倚晨暮三接朱殷谿瀆獲馬牛百萬蹄斬首數千級其餘斃踣瘡痏皚皚枕藉者遂大築京觀以光武功焉由是氛霧蕩八方日月麗大幽兇醜懐締搆江淮完推命江淮而南父子夫婦無僕虜之患皆一舉之力也故自希烈亂常天下擁兵之諸侯議鴻勲茂績者莫敢承風焉先是包大夫佶司天下之賦將自揚徂荆萬檣峩峩不得安動繄我之㨗即陸驅車水方舟驚飈駭雲集貢于天王君子謂我王之勲績也大宜載太常刋鼎銘豈獨續縑素而己載忝賔介厠櫜鞬之末得備書事揚公休聲貞元元年七月二十日記張僧繇畫僧記劉長卿天竺僧畫像者梁直閣將軍張僧繇之真迹也張公繪事之始厥有二僧後屬侯景師至金陵江南䘮亂此畫流離散落多歴年所遂遭剖割集作裂分而爲二其一在唐故右常侍陸堅處即此僧也陸公常嬰篤疾殆將屬纊忽於夢寐覩此故僧謂公曰我有同侣一人自從離析己百餘年集作嵗今在洛陽故城東李君家深所寳玩舉世莫知若能為我求之再得㑹合當以法力扶助令爾無憂陸公既寤遽以集作以處求訪果如夣中之㫖獲見斯人而僧亦俱在乃以俸錢十萬贖集作購而合焉即日陸公疾瘳勿藥有喜信知造思之妙通於神祗識者以為干將鏌鎁散而復合亦其類也嗟乎陸公已沒子孫不守有姬鬻之於市為校書郎宋儋所得集作得之開元中儋服藥過度因而䘮明其李氏之僧復失所在惟入夣者巋然獨存儋卒傳故人劉傑傑居之集作隠小室不求聞達天寳末遭禄山之難避地淮隂與道士魏審交深相結納無何傑以老卒傳乎審交審交傳楚州刺史李湯湯傳睦州司馬劉長卿今為劉氏之寳蔵矣文苑英華巻八百三十二
