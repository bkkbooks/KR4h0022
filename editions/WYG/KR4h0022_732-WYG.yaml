body:
  text: 文苑英華巻七百三十三宋李昉等編餞送十六送趙大秀才徃江陵序一首送韋七秀才序一首送元秀才序一首送豆盧膺秀才南遊序一首送婁圖南秀才遊江南序一首送苑論序一首送侯權秀才序一首送丘儒赴舉序一首吉州送簡師序一首送同年任畹歸蜀序一首送薛處士序一首送豆盧處士謁宋丞相序一首送侯道士還太白山序一首送小鷄山樵人序一首送趙大秀才徃江陵序栁宗元士之知感激許與常欲蜀本無欲字以有報爲志者則凡志乎道者咸願爲之如趙生庶乎哉來謂余曰宗人尚書以碩德崇功由交廣臨荆州仁我若子姓恩禮重集作備厚有賢子爲御史好學而甚文友我若同生歡欣交通我誠樂爲之用甚不辭也不幸遭重痼六旬而後知人方其急也大懼不克報尚書公之恩又懼無以當御史君之心以没毎念於集作于是則未嘗不䀌然内傷若受鋒刃自是而後調藥石時飲食生血補氣强筋植骨榮衛之和膂力之剛迨今兹始全然爲人舒幹抗首文翰端麗其材足以用敢辭而徃以効於戱下其言云爾自吾竄永州三一作四年趙生亟見視其狀專蜀本作恭謹愿慤觀其跡温宻簡靖聞其言徑直端誠自尚書理理蜀本作之爲荆州異政日至至則趙生喜蜀本作震抃起立伸目四顧不啻若自已而爲之者誠宜有報知已之道又誠宜有大賢而爲之知也是行也趙生其將奮六翮翔千里以爲轅門大府之重増羽儀之盛其爲美矣故余繼之以辭送韋七秀才序所謂先聲後實者豈唯兵用之然一本無然字雖士亦然若今由州郡抵有司求進士者嵗數百人咸多爲文辭道今語古角夸麗務富厚有司一朝而受者㡬千萬言讀不能十一即􅅯仰疲耗目眩而不欲視心廢而不欲營如此而曰吾能不遺士者僞也唯聲先焉者讀至其文辭心目必專以故少不勝京兆韋中立其文懿且髙其行愿以恒試其藝益工乆與居益見其賢然而進三年連不勝是豈拙於爲聲者歟或以韋生之不勝爲有司罪余曰非也糓梁子曰心志旣通而名譽不聞友之過也名譽旣聞而有司不以告有司之過也人之視聽有所止神志有所不及古之道名譽未至不以罪有司而况乎今集作今乎韋生樂植乎内而不欲揚乎外其志非也孔子不避名譽以致其道今韋生仗其文簡其友思自得於有司抑非古人之道歟將行也余爲之言旣以遷其人又以移其友且使惑興國本作或者知釋有司也送元秀才序周乎志者窮躓不能變其操周乎藝者屈抑不能貶其名其或處心定氣居斯二者雖有窮屈之患則君子不患矣元氏之子其殆庶乎言集作貌恭而信行端而靜勇於講學急於進業旣遊京師寓居仄陋無使令之僮闕交易之財可謂窮躓矣而操愈集作逾厲志之周也才濬而清詞簡而備工於言理長於應卒從計京師受丙科之薦獻藝春卿當三黜之辱可謂屈抑矣而名益茂藝之周也茍非處心定氣則曷能如此哉余聞其欲退家殷墟脩志増藝懼其沉欝傷氣懐憤而不逹乃徃送而諭焉夫有湛盧豪曹之噐者患不得犀兕而剸之不患其不利也今子有其噐宣其利乘其時夫何患焉磨厲而坐待之可也遂欣欣而去送豆盧膺秀才南遊序君子病無乎内而餙乎外有乎内而不餙乎外者無乎内而餙乎外則是設機集作覆爲穽也禍孰大焉有乎内而不餙乎外則是焚梓毁璞也詬孰甚焉於是有切瑳集作磋琢磨鏃礪栝羽之道聖人以爲重豆盧生内之有者也余是以好之而欲其遂焉而恒以㓜孤羸餒爲懼恤恤焉遊諸侯求給乎是是固所以有乎内者也然而不克專志於學餙乎外者未大吾願子以詩禮爲冠屨以春秋爲襟帶以圖史爲佩服琅乎璆璜衝牙之響發焉煌乎山龍華蟲之采列焉則揖讓周旋乎宗廟朝廷斯可也惜乎余無禄食於世不克稱其欲成其志而姑欲其速反也故詩而序云送婁圖南秀才遊江集作淮南序僕未冠求進士聞婁君名甚熟其所爲歌詩傳詠都中通數經及羣書當時爲文章若崔比部于衛尉相與稱其文集有衆字皆曰納言曽孫也而又有是咸推讓爲先登後十餘年僕自尚書郎謫來零陵覯婁君猶爲白衣居無室宇出無僮御僕深異而訊之乃曰今夫取科者交貴勢倚親戚合則挿羽翮生風濤沛焉而有餘吾無有也不則饜飲食馳堅良以歡集無此字歡于朋徒相貿爲資相易爲名有不諾者以氣排之吾無有也不則多䈥力善造請朝夕屈折於恒人之前走髙門邀大車矯笑而僞言卑陬而姁媮偷一旦之容以售其伎吾無有也自度卒不能堪其勞故舍之而遊逾江湖集作湖江出豫章至南海復由桂而下也少好道士言餌藥爲夀未盡其術故行蜀本作徃且求之僕聞而愈疑徃時觀得進士者不必若婁君之言又少能類婁君之文學又無納言之大德以爲之祖無比部衛尉以爲之知而升名者百數十人今婁君非不足也顧不樂而遁耳因爲余留三年他日又曰吾所以求於心者未克今其行也余旣異其遁於名而又德其久留於我也故爲之言夫君子之出以行道也其處以獨善其身也今天下理平主上亟下求士之詔婁君智可以任軄用事文可以宣風歌德行於世必有合其道而進薦之者遽而爲處士吾以爲非時將曰老而就休耶則甚少且銳羸而自養耶則甚碩且武問其所以處咸無名焉若茍焉以圖夀爲道又非吾之所謂道也夫形軀之寓於土非吾能私之幸而好求堯舜孔子之道集作志唯恐不得幸而遇行堯舜孔子之道唯恐不慊若是而壽可也求之而得行之而慊雖夭其誰悲今將以呼嘘爲食咀嚼爲神無事爲閒不死爲生則深山之木石大澤之龜虵皆老而久其於蜀本作於其道何如也僕甞學集有於字儒時集作持之不得以陷於是以出則窮以處則乖其不宜言道也審矣以吾子見私於僕而又重其去故竊言而書之而宻授焉送苑論登第後歸覲詩序八年冬余與馬邑苑言揚聨貢於京師自時而後車必挂轊席必交袵量其志知其達於昭代究其文辯其勝於太常探而討之則明韜於淳朴集作朴厚之質行浮於休顯之聞遊公卿之間質直而不犯恪謹而不懾交同列之羣以誠信聞余拜而兄之以爲執誼而固臨節不奪在兄而已是嵗小司徒顧公守春官之缺而權擇士之柄明年春同趨權衡之下並就重輕之試觀其掉鞅於術藝之場遊刃乎文翰之林風雨生集作交於筆札雲霞發於簡牘左右圜視朋儕拱手甚可壯也二月丙子有司題甲乙之科掲於南宫余與兄又聨登焉余不厚顔懐愧而陪其遊久矣夏四月告歸荆衡拜手行邁輪移都門之轍轅指秦嶺之路方將髙堂稱慶里閈更賀曵裾峨冠榮南諸侯之邦遐登王粲之樓髙視劉表之榻桂枝片玉光生於家是宜砥啇雒之阻艱帶江漢之浩蕩集有以字談笑顧盼超越千里而無倦極也然而景熾氣燠徃即南方乘陵炎雲呼吸温風可無敬乎愼進藥石保安其躬是亦非兄之所宜私也羣公追餞於覇陵列筵而觴送逺之賦圭璋交映或授首簡於余曰子非知言揚者乎安得而黙耶余書而授之一作余受而書之編於羣玉之右非不知讓貴傳信焉爾送侯權秀才序白居易貞元十五年秋余始舉進士與侯生俱爲宣城守所貢明年春余中春官第旣入仕凡歴四朝才朽命剥蹇躓不暇去年各蒙不次恩遷尚書郎掌誥西掖然青衫未解白髪已多矣時子尚爲京師旅人見除書走來賀余因從容問其官名則曰無得矣問其生業則曰無加矣問其僕乘囊輜則曰日削月朘矣問别來㡬何時則曰二十有三年矣嗟乎侯生當宣城别時文才志氣我爾不相下今余猶小得遇子卒無成由子而言余不爲不遇爾嗟乎侯生命實爲之謂之何哉言未竟又有行色且曰欲謁東諸侯恐不知我集作我知者多請一言以寵别余方直閣慨然竊書命筆以序之爾送丘儒赴舉序皇甫湜吾居河隂丘生敲門請曰儒貴求知余謹自露願以是非賜决語其學如猗頓之富聽其音如清廟之樂觀其刻意勵行如奉商鞅之法而懼秦刑吾驚而與之遊踰年將鬬其藝於洛下吾逺來集有遊字洛下喻之曰子知市乎懐貝玉以之名都之肆未有不售者也挈而之三家之墅未有不爲盗困幸矣集作盗而困矣子將安寘哉京師具才市也一人不知子也他人知子一門不容子也他門容子子謹持其所有以徃未有不成者也今子之類固少勢能移事者稀爲一不知爲一相移白變而復集作爲黒倒上而爲下吾末如之何矣生不信而試果困而見吾酌酒而賀之曰謹持貝玉以徃之都市可矣曰諾乃序其行吉州送簡師序鳯羽而麟毛鳥與獸也經傳以興比於聖人豈非以其心不以其形者耶師雖佛其名而儒其行雖夷狄其衣服而人其知三字文粹作仁義其心雖未齒於士與鳯麟類矣不猶愈於冠儒冠服朝服或集作惑溺於滛恠之說以斁彛倫者耶嗚呼師吾獨賢也刑部侍郎昌黎韓愈旣貶於集作於字潮州浮屠之徒集作浮屠之士歡快以抃師獨憤起訪余求序行以資適潮不顧蛇山鰐水萬里之險毒若將朝得進拜而夕死可者嗚呼悲夫吾絆集有而字不得侣師以馳送同年任畹歸蜀序沈亞之十年新及第進士將去都乃大宴朝賢卿士與來㑹樂而都中樂工倡優女子皆坐優人前贊舞百奮袖出席於是堂上下匏吹絃簧大奏即暮旣罷生揖語亞之曰吾家世居蜀嘗以進士得第吾少能嗣其業幸余之文得稱甚光願爲我序還家之榮亞之辭謝不敏曰願無讓曰始生與兄來舉進士得黜集作絀及綴字爲便口之句歴贄其文於公卿之門由是一嵗而知名八年成都貢士生名在貢首九年生與其兄式貢京兆京兆籍貢名生爲亞首生之兄益在列下十年禮部第士生名在甲乙如是而後歸亞之以爲相如還蜀之榮而生未後也送薛處士序杜牧處士之名何哉潜山隠市皆處士也在山也且非頑如木石也在市也亦非愚如市人也盖有大智不得大用故羞耻不出寧反與市人木石爲伍也國有大智之人不能大用是國病也故處士之名自負也謗國也非大君子其孰能當之薛君之處文粹有士字盖自負也果能窺測堯舜孔子之道使指制有方弛張不窮則上之命一日來子之廬子之身一日立上之朝使我軰居則來問學仕則來問政千辯萬索滔滔而得若如此則善茍未至是而遽名曰處士雖吾子自負其不爲矯歟某敢用此贈行送豆盧處士謁宋丞相序陸龜蒙龜蒙讀揚雄所爲書知太𤣥凖易法言凖論語晩得文中子王先生中說又知其書與法言相類道之始塞而終通子雲􅁤範集作乾乾不足當也何者子雲仕於西漢末屬莾賢用事時皆進符命取寵雄獨黙黙以窮愁著書病不得免人希至其門止一侯巴漢書作芭從之受太𤣥法言而已文中子生於隋代知聖人之道不行歸河汾間脩先君之業九年而功就謂之王氏六經門徒集無徒字弟子有若鉅鹿魏公河南疑作濟南集作清河房公京兆杜公代郡李公咸北靣稱師受王佐之道隋亡文中子没門人歸於唐盡發文中子所受之道左右其理集作治文皇集作太宗每歎曰魏徴教我功業如此恨不使封德彛見之逮今十八聖舉其君必曰太宗舉其相集作臣必曰房魏上下之心耻不及貞觀則生人受賜足矣豈非文中子之道始塞而終通乎丈人文中子外諸孫也誦文中子之書不絶于口率弟兄耕稼以自給一旦訪集作謂龜蒙曰宣中集作仲非兵荒來人不足犬豕之食安能遂退藏耶吾從子相天下矣吾西而見之龜蒙曰丈人外族之門人實作良輔今復家有丞相必以房魏之道致君中興是内外有德於四海也此行徒東歸也一作乎丞相未升甲科時年纔出弱冠龜蒙幸得叅遊中以兄事之許與膠固形於詠歌及丞相爲朝鉅儒居侍從之列龜䝉江湖邊集作間病不能起一耒而耕一船而漁有文三十編有書數千幖未嘗干東諸侯四字集作干求諸侯門故没没集作汲汲然無一人道着名字今丞相方築太平之基架羣材立清廟丈人乘閒宴語幽仄試丞相意復念以小榭集作杠城北秋霖聲髙中夜對榻有苦吟生耶因丈人之行叙房魏得王佐之道丞相追貞觀之風小子復言曩日之分雜而書之用以爲送送侯道士還太白山序侯生嘗舉進士名彤作七言詩甚有態度不見十年自云冄貢於有司藝不中度輙得黜齟齬不與世合去入老子法中作道士更名雲多居太白山在雄州西南梁州之地苦寒霜雪恒積雖夏五六月赫日在上羣峯若焚我獨皓然玉竦巖壁澗壑之木不數百集作十年不能爲材及其堅良又不與他等居集作民乘是氣皆壽而不衰况集作矧養生者耶吾今南遊天台旣將復而老焉余曰夫物命乎天者人不能有存乎人者天不能奪推其氣則謂集作爲之一考其命則有懸絶不類者焉余曰噫集無三字居恒寒之地而不夭者吾不信也居恒燠之地而不壽者吾不信也信其集作乎命乎天者人不能有而已矣傳曰仁者壽則恒寒之地不仁者夭而死矣恒燠之地仁者壽而生矣苟恒寒之地壽其不仁者恒燠之地夭其仁者是寒燠爲不祥之氣又何以佐天地之生植乎哉如此則居寒而壽居燠而夭吾益不信也信其集作乎存乎人者天不能奪而已矣或曰仁者夀不仁者亦壽不仁者夭仁者亦夭吾又不知命乎天存乎人果可信乎未也無乃自壽自夭自仁自不仁耶天不能與之集無之字又安能奪也集作耶行集作信矣子姑務乎仁無以山寒自欺則吾亦信子之集作而之壽矣送小鷄山樵人序小鷄山在震澤西出吳胥門背朝日行四十里得野步市曰光福光福西五里得土山山土多石寡無大林木率生小櫟樸樕皆薪材直吳之㸑此爲助焉連延廣袤不一其主爲書畫疆界一作互以相授自冡至麓凡二百弓東北倍髙而加半焉余所置多少如此余家大小之口二十月費米十斛飯成理魚蔌軰十觧一作斛薪然後已四時賓祭沭浴澣濯疾病湯藥粥糜一作糜粥在外嵗入五千束足矣其掌而供事者顧及小鷄之樵甿也乾符六年春弗雨夏支流將絶八月暴雨而巨艑可實而行之矣九月朔方置薪二百五十於門召而責之曰吾一夏來撤敗屋㧞庭草以炊雨之明日望爾來矣何數亷而至晩得非赭吾山而爲汝之利耶吾一作老而欺如名惡何及英華作反字笑曰吾年餘八十矣元和之中一無之字嘗從吏部遊京師人言國家用兵帑金窖粟不足用當時江南之賦已重矣殆今盈六十年賦數倍於前不足之聲聞於天下得非專地者之欺甚乎吾有丈夫子五人諸孫亦有丁壯者自盗興以來百役皆在亡無所容又水旱更害吾稼未即死不忍見兒孫寒餒之色雖盡售小鷄之木不足以濡吾家况一作矧一二買名爲偷乎今子一煬竈不給而責吾之深吾將欲移其責於天下之守則吾死不憾矣余嘆之曰汝之信也然當發於余汝姑歸與之酒繼之以歌云長其舩兮利其斧輸其薪兮勿予侮田予登兮糓予庾突晨烟兮蓬縷縷窻有明兮編有吉飽而安兮惟編是伍時不用兮吾無撫汝一作皆唐文粹文苑英華巻七百三十三
