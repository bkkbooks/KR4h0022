body:
  text: 文苑英華巻二百三十一宋李昉等編隱逸二處士四十五首山人二十一首處士春日送麗處士歸龍山釋無可愛弟直霜臺家山羡獨廻出門時返顧何日更西來柳亦臨闗發花應到越開漁舟誰伴上依舊恣沿洄酬吳處士一作寄朱慶餘周賀已當聽鴈夜多事不一作少同居故疾離城晩秋霖九月踈趂一作聽鐘開靜户帶一作掃葉卷殘一作閒書蕩一作盪漿期南去荒園久廢鋤此詩二百四十六巻二百六十一巻重出並已削去注異同為一作送沈處士赴蘇州李中丞招以詩贈行杜牧山城樹葉紅下有碧溪水溪橋向吳路酒旗誇酒美下馬此送君髙歌為君醉念君抱材能百工在城壘空山三十年鹿裘挂窓睡自言隴西公飄然我知己舉酒屬吳門今朝為君起懸弓三百斤囊書數萬紙戰賊即戰賊為吏即為吏盡我所有無惟公之指使予曰隴西公滔滔大君子常思掄羣材一為國家治譬如匠見木礙眼皆不棄大者麤十圍小者細一指榍橛與棟梁施之皆有位忽然竪明堂一揮立能致予亦何為者亦受公恩紀處士常有言殘賊為犬豕常恨兩手空不得一馬箠今依隴西公如虎傅兩翅公非刺史材當坐巖廊地處士瑰竒姿必展平生志東吳饒風光翠巘多名寺踈煙亹亹秋獨酌平生思因書問故人能㤀批紙尾公或憶姓名為說都憔悴贈宣州元處士前人陵陽北郭隠身世兩㤀者蓬蒿三畆居寛於一天下罇酒一作前對不酌黙一作宻與𤣥相話人生自不足愛嘆遭逄寡此詩二百六十一巻重出今已削去注異同為一作題韋處士山居集作題韋隠居西齋許渾斸藥去還歸家人半掩扉山風藤子落溪雨集作水豆花肥寺逺僧來少橋危客過一作到稀不聞碪杵動應解剪集作製荷衣贈裴處士前人為儒白髮生鄉里早聞名煖酒雪初下讀書山欲集作未明字形翻鳥跡詩調合猿聲門外滄浪水知君欲濯纓送集作别韋處士前人南北斷蓬飛别多相見稀更傷今日鬢集作酒未換昔時集作年衣舊友幾人在故鄉何所集作處歸秦原向西路雲晩雪霏霏此詩二百八十八巻重出今已削去將赴京師留題孫處士山居二首前人西巖有髙興路僻幾人知松䕃花開少集作晩山寒酒熟遲遊從收集作隨野鶴休息過集作遇靈龜長見隣翁說容華似舊時二草堂近西郭遥對鏡集作敬亭開枕膩海雲起簟凉山雨來髙歌懐地肺逺賦憶天台應笑集作學相如志終須駟馬廻寄昭亭楊處士集作寄陽陵處士前人舊隠青山紫桂隂一書迢遞寄歸心謝公樓上晩花發集作盛揚子宅前春草深吳岫雨來溪鳥浴楚山集作江雲暗嶺猿吟野人寧負滄洲伴㑹待吹竽定至音題獨孤處士村居薛逢江上園廬荆作扉男驅耕犢婦鳴機林巒當户蔦蘿暗桑柘繞村薑芋肥㡬畆稻田還謂業兩間茆舍亦言歸何如一被風塵染到老云云相是非處士盧岵山居温庭筠西溪問樵客遥識楚人集作主人家古樹老連石急泉清露沙千峰隨雨暗一逕入雲斜日暮鳥飛散滿山􅘹麥花題陳處士幽居前人松軒塵外客髙竹集作枕自蕭踈雨後苔侵井霜來葉滿渠閒看鏡湖畫時得越僧書若待前溪月誰人伴釣魚題李處士幽居前人水玉簮頭白一作戴角巾瑶琴寂歴拂輕塵穠隂似帳紅薇晩細雨如煙碧草春一作新隔竹見籠疑有鶴捲簾看畫更無人南窓集作山自有㤀機集作年友谷口空稱鄭子真此詩三百十八卷重出今已削去題李羽處士寄新醖走筆戯酧前人髙譚有伴還成藪沉醉無期即是鄉已恨流鶯欺謝客更將浮蟻與劉郎簷前栁色分張緑窓外花枝借助香所恨玳筵紅燭夜草𤣥寥落近廻塘處士隠居張祜斜日半飛閣髙簷集作簾輕翳一作翳逺空清香芙蓉水碧冷琅玕風絕岸𣲖沿洑修廊趾崇隆唯當餌仙术坐作朱顔翁送鄭台處士歸絳巖方干榮啟先生挾琴去厭尋靈勝憶巖栖白猿啼集作垂樹窓邊月紅鯉驚鈎竹外溪慣採藥苗資素饌曽書蕉葉寄新題古賢猶愴河梁别未可怱怱便解携書桃花塢周處士壁前人醉吟雪月思彌苦思苦神勞白集作新髮生自學古賢修靜節唯應野鶴識髙情細泉出石飛難盡孤燭和雲濕不明何事懶於嵇叔夜更無書信集作札荅公卿贈黄處士前人閉户先生無是非竹灣松榭藕絲衣愁吟宻雪思難盡醉倒落集作殘花扶不歸若出薜蘿迎鶴簡應隨舴艋别漁磯到頭苦節終何益空改文星作少微贈中巖王處士前人垂楊裊裊草芊芊氣象清深集作虚似洞天援筆便成鸚鵡賦洗花亦集作須用桔橰泉商於避世堪同日渭叟集作曲逄時必有年直恐肺集作剛腸閒不集作未得醉吟爭柰被才牽送房處士閒遊李羣玉注集作採藥陶貞白尋山許逺遊刀圭藏妙用巖洞契冥搜花竹集作月三湘水琴樽一葉舟羡君隨野性集作鶴長謝稻粱愁贈包處士李洞愁思枕月卧瀟湘寄宿慈恩竹集作寺裏房性急還集作却於碁上慢身閒未免藥中忙休抛手網驚龍睡曽挂頭巾拂鳥行聞說石門君舊隠寒峰集作風濺瀑壊書堂虎丘寺贈漁處士趙嘏蘭若雲深處前年客重過岩空秋色動水濶夕陽多早負江湖志今如鬢髮何唯思閒勝我釣艇在煙波送韋處士歸省朔方前人映桞見行色故山當落暉青雲知己殁白首一身歸滿袖蕭闗雨連沙塞鴈飛到家飜有喜借取老萊衣贈曹處士幽居前人勾漏先生氷玉然曽將八石問群仙中山暫醉一千日南苑住來三百年碁局不收花滿洞霓旌欲别浪翻天何須更學鴟夷子頭白江湖一短船新秋雨霽宿王處士東郊馬戴夕陽逄一雨夜雨洗清隂露氣竹窓靜秋光雲月深煎嘗靈藥味話及故山心得意兩不寐微風生玉琴送胡處士歸湘南李頻見話荆湘切長愁有去時江湖秋渉逺雷雨夜眠遲舊業多歸興空山盡老期天寒一瓢酒落日擬留誰秋晩訪李處士所居皮日休門前襄水碧潺潺靜釣歸來不掩闗書閣䑕穿厨簏破竹園霜後桔橰閒兒童不許驚幽鳥藥草須教上假山莫為愛詩偏念我訪君多得醉中還李處士郊居前人石衣如髮小一作水溪清溪上柴門架樹成園裏水流澆竹響窓中人靜下棋聲㡬多狎鳥皆諳性無限幽花未得名滿引紅螺詩一首劉禎失却病心情送陸處士張喬罇前放浩歌便起一作處泛烟波舟楫故人少江湖明月多孤峯經宿上僻寺共雲過若向僊巖住還應著薜蘿送韓處士歸少室山前人江外歴千岑還歸少室吟地閒緱嶺月窓逈洛城砧石竇垂寒一作新乳松枝長别琴他年瀑泉下亦擬置家林西蜀凈衆寺松溪八韻寄水筆崔處士鄭谷松因溪得名松吹荅溪聲繚繞能穿寺幽竒不在城寒煙齋後散春雨夜中平染岸蒼苔古翹沙白鷺明澄分僧影瘦光徹客心清帶梵侵雲響和鐘激石鳴淡烹新茗爽煖泛落花輕此景窮一作吟難盡憑君畫入京蔡處士前人無著復集作更無求平生不解愁鬻蔬貧凈潔中酒病風流㫖趣陶山相詩篇沈隠侯小齋江色裏籬柱繫漁舟梁燭處士辭金陵相國杜公歸舊山因以寄贈前人相庭留不得江野有苔磯兩浙尋山遍孤舟載鶴歸世間書讀盡僧集作雲外客來稀諫署搜賢急應難惜布衣長安夜坐寄懷湖外嵇處士前人萬里念江海浩然天地秋風髙羣木落夜久數星流鐘絶分宫漏螢微隔御樓集作溝遥知集作思洞庭上葦露滴漁舟寄贈楊䕫處士前人結茅依約釣魚臺濺水鸕鷀去又廻春卧甕邊聽酒熟露吟庭際待花開三江勝景遨遊遍百代羣書講論集作貫來國步未安風雅薄可能髙尚抑天才此詩二百六十四巻重出今已削去題仇處士郊居棄官卜居杜荀鶴江南景簇好集作此林亭手板藍裾自可輕洞裏客來無俗話郭中人到有山情閒抛集作敲巖果呼猿接時釣溪魚引鶴爭笑我有詩三百首馬蹄終日急於名憶張處士王貞白天台張處士詩句造𤣥微古樂知音少名言與俗違山風入松徑海月上巖扉畢世唯髙卧無人說是非韋曲杜處士新居羅隠翠歛王孫草荒誅宋玉茅㓂餘無故物時薄少深交迸笋穿集作侵行逕飢雛出壊巢小園吾亦有多病近來抛酧張集作章處士見寄前人中原甲馬未曽安今日逄君事萬端亂後㡬囘鄉夢隔别來何處路行難霜鱗共落三門浪雪鬂同歸七里灘何必新詩更相戯小樓吟罷暮天寒早春送處士張坤歸汴州集作大梁前人蕭蕭羸馬正塵埃又送歸軒向吹臺别酒莫辭今夜醉故人知是㡬時來集作廻泉經華嶽猶應凍花到梁園始合開為謝東門抱闗吏不堪惆悵滿離盃此詩又見二百八十三巻贈鏡湖處士方干二首曹松包含教化剰搜羅句出東甌柰峭何世路不妨平處少才人唯是屈聲多雲來島上便幽石月到湖心忌白波後軰難為措機杼先生織字得龍梭二秪擬應星眠越絶唯將麗什當髙勲磨礱清濁人難㑹織絡虛無帝亦聞鳥道未知山足雨漁家已没鏡中雲他時莫為三徴起門外沙鷗解笑君再訪陸處士前人萬巻書邊人半白再來惟恐降𤣥纁性靈比鶴爭多少氣力登山較㡬分吟鬂漸無前度漆寢衣猶有昨宵雲將知谷口耕烟者低視齊梁楚趙君題任處士修精舍魚元機幽人剙竒境逰客寄一作駐行程粉壁空留字蓮宫未有名鑿池泉自出開逕草重生百尺金輪閣當川豁眼明山人寄鄭霍二山人王維翩翩繁華子多事集作出金張門幸有先人業早逄集作䝉明主恩同集作童年且未學肉食驚華軒豈乏中林士無人薦至尊鄭生老泉石霍子安丘樊賣藥不二價著書盈萬言息隂無惡木飲水必清源吾賤不及議斯人竟誰論逰李山人所居因題屋壁前人世上皆如夢狂來或自歌問年松樹老有地竹隂集作林多藥倩韓康賣門容尚子過飜嫌枕席上無那集作柰白雲何寄張十二山人彪杜甫獨卧嵩陽客三違一作逄潁水春艱難隨老母慘澹向時人謝氏尋山屐一作屣陶公一作潜漉酒巾羣兇彌宇宙此物在風塵歴下辭姜被闗西得孟隣早通交契宻一作濶晩接道流新靜者心多妙先生藝絶倫草書何太一作甚古詩興不無神曹植休前軰張芝更後身數篇吟可老一字買堪貧將恐曾防㓂深潜託所親寧聞倚門夕盡力潔飱晨踈懶為名悞驅馳䘮我真素居猶寂寞相遇益酸一作愁辛流轉依邊徼逄迎念席珎時來故舊少亂後别離頻世祖修髙廟文公賞從臣商山猶入楚源一作湍水不離一作流秦存想青龍秘騎行白鹿馴耕巖非谷口結草即河濵肘後符應驗囊中藥未陳旋懐一作懐賢殊不愜良覿渺無因自古皆悲恨浮生有屈伸此邦今尚武何處且依仁鼓角凌天籟闗山信月輪官場羅鎮磧賊火近洮岷蕭瑟一作索論功一作兵地蒼茫鬬將辰大軍多處所餘孽尚紛綸髙興知籠鳥斯文豈一作起獲麟窮秋正摇落廻首望松筠送范山人歸太山李白魯客抱白鶴别余往太山初行若片雪杳在青崖間髙髙至天門海日近可攀雲生望不及此去何時還送楊山人歸嵩山前人我有萬古宅嵩陽一作山玉女峯長留一片月掛在東溪松爾去掇仙草菖蒲花紫茸嵗晩或相訪青天騎白龍下終南山過斛斯山人宿置酒前人暮從碧山下山月隨人歸却顧所來逕蒼蒼横翠微相携及田家稚子開荆扉緑竹入幽徑集作援青蘿拂行衣歡言得所憇美酒聊共揮長歌吟松風曲盡河星稀我醉君復樂陶然共㤀機送鄭山人還廬山别業劉長卿潯陽數畆宅歸卧掩柴闗谷口何人待一作在門前秋草閒㤀機賣藥罷揮手一作不語杖藜還舊笋成寒竹空齋向暮山水流經一作過舍下雲去一作起到人間桂樹花應發因行寄一攀此詩二百七十巻重出今已削去注異同為一作送朱山人放歸山隂見三百十八巻入白沙渚夤縁二十五里至石室山下懐天台陸山人前人逺嶼藹將夕翫幽行自遲歸人不計日流水閒相隨輟棹石集作古崖口捫蘿春景熙偶因廻洲次寧與前山期對此瑶草色懐君瓊樹枝浮雲去寂寥集作寞白鳥相集作來因依何事愛髙隠但令勞逺思窮年卧海嶠永望愁天涯吾亦從君一作此去扁舟何所之迢迢江上帆千里東風吹宿闗西客舍寄東山嚴許二山人時天寳初七月初三日在學見有髙道舉徴岑參雲送闗西雨風傳渭水秋孤燈燃客夢寒杵𢷬鄉愁灘上思嚴子山中憶許由蒼生今有望飛詔下林丘寄華隂山人李岡前人君隠處當一星蓮花峯頭飯黄精仙人掌上演丹經鳥可到人莫攀隠來十年不下山袖中短書誰為逹華隂道士賣藥還送楊山人歸嵩陽髙適不到嵩陽動十年舊家一作時心亊已徒然一二故人不復見三十六峯猶眼前夷門二月柳條色流鶯數聲淚沾臆鑿井耕田不我招知君以此㤀帝力山人好去嵩陽路唯余眷眷長相憶送韋山人二字集作邕少府歸鍾山别業李嘉祐旗亭閱書罷集作祈門官罷後負笈向桃源萬巻長開帙千山不掩集作峯不閉門緑楊垂野渡一作徑黄鳥傍山村念爾能髙枕丹墀㑹一論此詩二百七十巻重出今已削去送陸鴻漸山人採茶廻皇甫曽千峯待逋客香茗復叢生採摘知深處煙霞羡獨行幽期山寺逺野飯石泉清寂寂燃燈火相思一磬聲贈强山人郎士元或棹孤舟或杖藜尋常適集作隨意釣前溪草堂竹逕在何處落日孤煙寒渚西送王山人歸别業集作送元晟歸潜山所居皇甫冉深山秋事間氣集作意早歸去意集作復何如浥露收新稼迎寒葺舊廬題詩即招隠作賦足集作是閒居别後空相憶嵇康懶寄書集作讀書此詩二百七十二巻重出今已削去送李山人還前人從來無檢束只欲老煙霞雞犬聲相應深山有㡬家送李山人還玉溪顧况好鳥共鳴臨水樹幽人獨欠買山錢若為種得千竿竹引取君家一眼泉贈題韋山人耿湋失意成逋客終年獨掩扉無機狎鷗慣多病見人稀流水知脩一作行藥孤雲伴採薇空齋暮還坐心事與時違奉和張大夫詶髙山人司空曙野客居鈴閣重門將校稀豸冠親穀弁龜印織集作識荷衣坐久寒泉集作飈爽談餘暮角㣲蒼生湏太傅山在豈容歸送麴山人往集作住衡山前人白石先生眉髮老集作光已分紺集作甜雪飲紅漿衣巾半染煙霞色集作氣語笑兼和藥草香茅洞玉聲流暗水衡山碧氣集作色映朝陽千年城郭如相問華表峩峩有夜霜文苑英華巻二百三十一
