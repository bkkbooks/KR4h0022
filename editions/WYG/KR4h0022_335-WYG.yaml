body:
  text: 文苑英華巻三百三十五宋李昉等編音樂下箜篌二首瑟三首五絃二首笛二首觱篥三首笙二首鼓二首舞五首歌二首李供奉彈箜篌歌顧况樂府國手彈箜篌赤黄絛索金鎝頭早晨有勑鴛鴦殿夜静遂一作逐歌明月樓起坐可憐能抱撮大指調絃中指撥腕頭花落舞製裂手下鳥驚飛撥剌珊瑚席一聲一聲鳴錫錫羅綺屏一絃一絃如撼鈴急彈好遲亦好宜逺聼宜迎聼左手低右手舉易調移音天賜與大絃似秋鴈聮聮度隴關小絃似春燕喃喃向人語手頭疾腕頭軟來來去去如風巻聲清泠泠鳴索索垂珠碎玉空中落美女争窺玳瑁簾聖人巻上真珠箔大絃長小絃短小絃緊快大絃緩初調鏘鏘似鴛鴦水上弄新聲入深似太清仙鶴遊秘館李供奉儀容質身材稍稍六尺一在外不曽輙教入内裏聲聲不遣出指剥葱腕削玉饒鹽饒醬五味足弄調人間不識名彈盡天下崛竒曲胡曲漢曲聲皆好彈著曲髓曲肝腦徃徃從空入户來瞥瞥隨風落春草草頭只覺風吹入風來草即隨風立草亦不知風到來風亦不知聲緩急爇玉燭㸃銀燈光照手實可憎只照箜篌絃上手不照箜篌聲裏能馳鳯闕拜鸞殿天子一日一廻見王侯將相立馬迎巧聲一日一廻變實可重不惜千金買一弄銀器胡瓶馬上䭾瑞錦輕羅滿車送此州好手非一國一國東西盡南北除却天上化下來若向人間實難得箜篌引見二百十巻李賀泣嗚嗚前篇作哭烏烏趙瑟沈約邯鄲竒弄出文梓縈絃急調切流徴靈樂府作元鶴徘徊白雲起白雲起鬰枝樂府作皮香離復合曲未央同前梁元帝羅袖颯纚拂彫桐促柱髙張散輕宫迎歌度舞過歸風過歸風止流月夀萬春歡未歇調瑟詞并序劉禹錫里有富豪翁厚自奉養而嚴督臧獲力屈形削然猶役之無藝一旦不堪命亡者過半追亡者亦不來復翁悴沮而追昨非之莫及也予感之作調瑟詞詞曰調瑟在張絃絃平音自足朱絲二十五闕一不成曲美人愛髙張瑶軫再三促上絃雖獨響下應不相屬日暮聲未和寂寥一枯木却顧膝上絃流淚難相續五絃彈白居易五絃彈五絃彈聽者傾耳心寥寥趙璧知君入骨愛五絃一一為君調第一第二絃索索秋風拂松踈韻落第三第四絃泠泠夜鶴憶子籠中鳴第五絃聲最掩抑隴水凍咽流不得五絃並奏君試聼凄凄切切復錚錚集作丁丁鐵擊珊瑚一兩曲氷冩玉盤千萬聲鐵聲殺氷聲寒殺聲入耳膚血􅉃寒氣中人肌骨酸曲終聲盡欲半日四座相對愁無言座中有一逺方士唧唧咨嗟集作咨聲不巳自歎今朝初得聞始知辜負平生耳唯憂趙璧白髪生老死人間無此聲逺方士爾聽五絃信為美吾聞正始之音不如是正始之音其若何朱絃䟽越清廟歌一彈一唱再三嘆曲淡節稀聲不多融融洩洩召元氣聽之不覺心平和人情重今多賤古古瑟有絃人不撫自集作更從趙璧藝成來二十五絃不如五五絃行韋應物美人為我彈五絃塵埃忽靜心悄然古刀幽磬初相觸千珠貫斷落寒玉五絃中曲又不喧徘徊夜長月當軒如一作始伴流風縈艷雪更逐落花飄御園獨鳯寥寥有時隠碧霄來下聼還近燕姬萬集作有恨楚客愁言之不盡聲能盡未有幾曲感我情解幽釋結我樂生壯士有􅄷未得報㧞劍欲去憤己平憤巳平夜寒酒多愁遽明武昌老人説笛歌劉禹錫武昌老將文粹作人七十餘手把庾令相問書自言少小學吹笛早事曹王曽賞激往年鎮戍到文粹作征鎮戍蘄州楚山蕭蕭笛竹秋當時買材恣搜索典却身上烏貂裘古苔蒼蒼封老節石上集作山孤生飽風雪商聲五音一作商音五聲隨指發水中龍應行雲絶曽將黄鶴樓上吹一聲占盡秋江月如今老去語文粹作興尤遲音韻髙低耳不知氣力巳無心尚在時時一曲夢中吹小笛弄陳陶一尺玲瓏握中翠僊娥月浦呼龍子五夜流珠粲一作渠夢鄉九清鸞倚洪崖醉丹穴饑兒笑風雨媧皇碧玉星星語虵蠍愁聞骨髓寒江山恨老眠秋霧綺席鴛鴦冷朱翠星流露泫寒一作誰驅使江南一曲罷伶倫芙蓉水殿春風起小童薛陽陶吹觱篥歌白居易剪削乾蘆挿寒竹九孔漏聲五音足近來吹者誰得名關璀老死李衮生衮今又老誰其嗣薛氏小集作樂童年十二指㸃之下師授聲含嚼之間天與氣潤州城髙霜月明吟霜思月欲發聲山頭水集作江底何悄悄猿鳥不喘魚龍聼翕然聲作疑管裂詘然聲盡疑刀截有時婉一作脆軟無筋骨有時頓挫生稜節急聲圓轉促不斷栗栗集作轢轢轔轔似珠貫緩聲辰引長有條直直一作有餘條條直又作條條直直如筆描下聲乍墜石沉重髙聲忽舉雲飄蕭明旦公堂陳宴席上人命樂娛賔僚集作客碎絲細竹徒紛紛宫調一聲雄出羣衆音覼縷不落道有如部伍隨將軍嗟爾陽陶方稚齒下手發聲已如此若教頭白吹不休但恐聲名壓關李聼安萬善吹觱篥歌李頎南山截竹為觱篥此樂本是龜兹出流傳漢地曲轉竒凉州胡人為我吹傍隣聞者多歎息逺客思鄉皆淚垂世人解聼不解賞長飇風中自來往枯桑老栢寒颼颼九雛鳴鳯辭啾啾龍吟虎嘯一時發萬􅄜百泉相與秋忽然更作漁陽摻黄雲蕭條白日暗變調如聞楊栁春上林繁花照眼新嵗夜髙堂列明燭美酒一盃聲一曲薛陽陶觱篥歌羅隠平泉上相東征日曽為陽陶歌觱篥烏江平泉為李徳裕曽作薛陽陶觱篥歌蘇州刺史白居易越州刺史元禎並有和篇此言烏江恐是呉江乃蘇州也太守㑹稽侯相次三篇皆俊逸喬山殯葬衣冠後金印蒼黄南去疾龍樓冷落夏口寒從此風流為廢物人間至藝難得主懐抱差池恨星律邦溝僕射戎政閑試渡𤓰洲吐伊鬰西風九月草樹秋萬喧沉寂登髙樓左一作老篁揭指徴羽吼煬帝起坐淮王愁髙飄咽滅出滯氣下感知巳時横流穿空激逺不可遏髣髴似向伊水頭伊水林泉今巳矣因取遺編認前事武宗皇帝御宇時四海恬然知所自掃除桀黠似提箒制壓權豪若穿鼻九鼎調和各有門謝安王儉真兒戲功髙近代竟誰知藝小似君猶不棄勿惜喑嗚更一吹與君共下難逄淚吹笙歌秦韜玉信陵名重憐髙才見我長吹青眼開便出燕姬再傾醑此時花下逄仙侣彎彎往月壓秋波兩條黄金閡黄霧逸艷初因醉態見濃春可是韶光與纎纎軟玉捧暖笙深思香風吹不去檀唇呼吸宫商改怨情漸逐清新舉岐山取得嬌鳯雛管中藏著輕輕語好笑襄王大迂闊曽卧巫雲見神女銀鎻金簧不得聼空勞翠輦衝泥雨吹笙引王轂媧皇遺音寄玉笙䨇成傳得何凄清丹穴嬌雛十七一作七十隻一時飛上秋天鳴水泉迸瀉急相續一束宫商裂寒玉旖旎香風遶指生千聲妙盡神仙曲曲終滿席悄無語巫山冷碧愁雲雨丘少府小皷歌顧况地盤山鷄猶可像坎坎砰砰隨手長夜半髙樓沉一作客醉時萬里踏橋亂山響􅎏皷行韋應物淮漢生雲暮慘澹廣陵城頭􅎏皷暗寒聲坎坎風動邉忽似孤城萬里絶四望無人煙又似集作如虜騎截遼水胡馬不食仰朔天座中亦有燕趙士聞聲不語客心死何况鰥孤火絶無晨炊獨婦夜泣官有期觀公孫大娘弟子舞劒器行并序杜甫大厯二年十月十九日䕫府别駕元持公集無公字宅見臨潁李十二娘舞劒器壯其蔚跂集作跂問其所師答余云三字集作曰余公孫大娘弟子也開元三年集作載余尚童稚記於郾城觀公孫氏舞劒器渾脱瀏灕頓挫獨出冠時自髙頭宜春梨園二教集作伎坊内人洎外供奉舞女集無此二字曉是舞者聖文神武皇帝初公孫一人而己玉貎錦衣况余白首今兹弟子亦匪盛顔既辨其由來知波瀾莫二撫事慷慨聊為劒器行往時吳人張旭善草書書帖數嘗於鄴見一作鄞縣見公孫大娘舞西河劒器自此草書長進豪蕩感激即公孫可知矣既辨集作既辦往時集作往日昔有佳人公孫氏一舞劒氣動四方觀者如山色沮喪天地為之乆低昂㸌如羿射九日落矯如羣帝驂龍翔末集作來如雷霆收震怒罷如江海凝清光絳唇朱袖兩寂寞晩集作况有弟子傳芬芳臨潁美人在白帝妙舞此曲神揚揚與余問答既有以感時撫事増惋傷先皇集作帝侍女八千人公孫劒器初第一五十年間似反掌風塵澒洞昏王室梨園弟子散如煙女樂餘姿映寒日金粟堆南木已拱瞿塘石城暮集作草蕭瑟玳筵急管曲復終樂極哀來月東出老夫不知其所往足繭荒山轉愁疾拂舞歌詞李賀吳娥聲絶天空雲閒徘徊門外滿車馬亦湏生緑苔樽有烏程酒勸君千萬夀全勝漢舞集作武錦樓上曉望晴空集作寒飲花露東方日不破天光無老時丹成作蛇乗白露千年重化玉井土一作龜從蛇作土三千載吳堤春緑集作緑草年年在背文集作有八卦稱神仙邪鱗頑甲滑腥涎霓裳羽衣舞歌答微之白居易我昔元和侍憲皇曽陪内宴宴昭陽千歌萬舞集作百武不可數就中最愛霓裳舞舞時寒食春風天玉鈎欄下香案前案前舞者顔如玉不著人家一作間俗衣服虹裳霞帔步摇冠鈿瓔纍纍珮珊珊娉婷似不任羅綺顧聴樂懸行復止磬簫筝笛遞相攙擊撤彈吹聲邐迤凡法曲之初衆樂不齊唯金石絲竹次第發聲霓裳序初亦復如此散序六奏未動衣陽臺宿雲慵不飛散序六遍無拍故不舞中序擘騞初入拍秋竹竿裂春氷折中序有拍亦無拍序飄然轉旋去聲廻雪輕嫣然縱逸遊龍驚小垂手後栁無力斜曳裾時雲欲生四句皆霓裳舞之初態煙蛾歛畧不勝態風袖低昻如有情上元㸃鬟招蕚緑王母揮袂别飛瓊繁音急節十二遍跳珠撼玉何鏗錚霓裳破凡十二遍始終集作而終翔鸞舞了却收翅唳鶴曲終長引聲凡曲將畢皆聲促唯霓裳之末長引一聲當時乍見驚心目凝視諦聴殊未足一落人間八九年耳冷不曽聞此曲湓城但聴山魈語巴峽唯聞杜䳌哭予自江州司馬轉忠州刺史移領錢塘第二年始有心情聞絲竹玲瓏箜篌謝好筝陳寵觱篥沈平笙清絃脆管纎纎手教得霓裳一曲成自玲瓏以下皆杭之妓名虚白亭前湖水畔前後只曽三度按便除庶子抛却來聞道如今各星散今年五月至蘇州朝鍾暮角催白頭貪㸔案牘常侵夜不聴笙歌直到秋秋來無事多閒悶忽憶霓裳無處問聞君部内多樂徒問有霓裳舞者無答云七州千萬户集作七縣十萬户蓋指越州管内言之若問論浙東觀察使所統七州則英華本為是無人知有霓裳舞唯寄長歌與我來題作霓裳羽衣譜四幅花箋碧間紅霓裳實録在其中千姿萬狀分明見恰與昭陽舞者同眼前髣髴覩形質昔者今朝想如一疑從魂夣呼召來似著丹青圖寫出我愛霓裳君合知發於歌引集作詠形於詩君不見我歌云驚破霓裳羽衣曲長恨歌云又不見我詩云曲愛霓裳未拍時錢塘詩云由來能事皆有主楊氏創聲君造譜開元中西京節度使楊敬述進君言此舞難其集作得人須得集作是傾城可憐女吳妖小玉飛作煙夫差女小玉死後形見於王其母抱之霏微若烟霧散空文章元主頗畧越艷西施化為土嬌花巧笑乆寂寥娃館羅山集作苧蘿空處所苧蘿山西施所居如君所言誠有是君試從容聴我語若求國色始翻傳但恐人間廢此舞妍媸優劣寧相逺大都只在人擡舉李嬋集作娟張態君莫嫌亦擬隨時且教取娟態蘇州伎名胡旋女天寳末康居國來獻前人胡旋女胡旋女心應絃手應皷絃皷一聲䨇袖舉廻雪飄颻轉􅅾舞左旋右轉不知疲千匝萬周無巳時人間物類無可比奔車輪緩旋風遲曲終再拜謝天子天子為之微啓齒胡旋女出康居徒勞東來萬里餘中原自有胡旋者鬬妙争能爾不如天寳末年時欲變臣妾人人學圓轉中有太真外禄山二人最是能胡旋梨花園中册作妃金鷄障下養為兒禄山胡旋迷君眼兵過黄河疑未反貴妃胡旋惑君心死棄馬嵬念更深從兹地軸天維轉五十年來制不禁胡旋女莫空舞數唱此歌悟明主獨摇手陳陶漢宫新鷰矜蛾眉春臺艷粧蓮一枝迎春侍宴瑶華池游龍七盤嬌欲飛冶袖鸎鸞拂朝曦摩煙裊雪金碧遺愁鴻連翾蠶曳絲颯還明珠掌中移仙人龍鳯雲雨吹朝哀暮愁引啞吚鴛鴦翡翠承宴私南山一笑君無辭仙娥泣月清露垂六宫燒燭愁風欷西川座上聽金五雲唱歌前人蜀王殿上華筵開五雲歌從天上來滿堂羅綺悄無語喉音止駐雲徘徊管絃金石還依轉不隨歌出靈和殿白雲飄颻席上來貫珠歴歴聲中見舊様釵箆淺澹衣元和梳洗青黛眉低叢小鬢膩䰀鬌徒果切小貎剪髪為鬌碧牙鏤掌山參差曲終暫起更衣過還向南行座頭坐低眉欲語謝貴侯檀臉䨇䨇淚穿破自言本是宫中嬪武皇改號承新恩中丞御史不足比中丞御史皆當時宫中歌者水殿一聲愁殺人武皇鑄鼎登真籙嬪御䝉恩免幽辱茂陵弓劒不得親嫁與卑官到西蜀卑官到官年未周堂衡禄此三字疑有衍者罷東西遊蜀江水急駐不得復此萍􅅾二十秋今朝得侍王侯宴不覺途中妾身賤願持巵酒更唱歌歌是伊州第三遍唱著右丞征戍詞更聞閨月添相思如今聲韻尚如在何况宫中年少時五雲處處可憐許明朝道向褎中去須㬰宴罷各東西雨散雲飛莫知處秦娘歌并序劉禹錫秦娘本韋尚書家主謳者初尚書為吳郡得之命樂工誨之琵琶使之歌且舞無幾何盡得其術居一二嵗携之以歸京師京師多新聲善工於是又捐去故妓以新聲度曲教之又盡其妙而秦娘名字往往見稱於貴遊之間元和初尚書薨於東京秦娘出居民間乆之為蘄州刺史張愻所得其後愻坐事謫居武陵郡愻卒秦娘無所歸地荒且逺無有能知其容與藝者故日抱樂器而哭其音燋殺以悲雒客聞之為歌其事以足于樂府云秦娘家本閭門西門前緑水環金堤有時粧成好天氣走上臯集作河橋折花戲風流太守韋尚書路傍忽見停隼􅒅斗量明珠鳥傳意紺幰迎入專城居長鬟如雲衣似霧錦茵羅薦承輕步舞學驚鴻水榭春歌撩集作傳上客蘭堂暮從郎西入帝城中貴遊簮組香簾櫳低鬟緩視抱明月纎指破撥生胡風繁華一旦有消歇題劒無光履聲絶洛陽舊宅生草萊杜陵蕭蕭松栢哀粧奩蟲網厚如繭博山爐側傾寒灰蘄州刺史張公子白馬新到銅駞里自言買笑輕集作擲一作直黄金月墮雲中從此始安知鵬鳥座隅飛寂寞旅魂招不歸秦嘉集作家鏡有前時結韓夀香銷故篋衣山城少人江水碧斷鴈哀猿風雨夕朱絃已絶為知音雲鬢未秋私自惜舉目風煙非舊時夣尋歸路多參差如何將此千行淚更洒湘江斑竹枝文苑英華巻三百三十五
