body:
  text: 文苑英華巻六百五十七宋李昉等編上文章啟下上吏部侍郎帝京篇啟一首獻李相公雜文啟一首上湖南李中丞啟一首獻江陵趙相公雜文啟一首寄嚴東川啟一首上裴門下啟一首上襄陽李僕射啟一首上興元權尚書啟一首上令狐相公詩啟一首為舉人獻韓郎中琮啟一首為先輩獻集賢相公啟一首獻相國京兆公啟一首上知已文章啟一首獻詩啟一首上蔣侍郎啟二首上裴相公啟一首上吏部侍郎帝京篇啟駱賔王賔王啟昨引注日垂索鄙文拜手集作首驚魂承恩累息楚翬丹質在荆南以懐集作多慙遼豕白頭望河東而載恧賔王散材易朽蟠木難容雖少好讀書無謝髙鳳而老不曉事有類揚雄徒以易象六爻幽賛通集作適乎政本詩人五際比興存集作在乎國風故體物成章必寓集作冩情於小雅登髙能賦豈圗榮於大夫蓋欲樂道遺榮從心所好非敢希聲刻鵠竊譽雕蟲至若資集作質醜行以自媒衒庸音而茍進固立身之殊集作岐路行已之外篇矣君侯藴明畧以佐時虚靈臺以照物觀梁父之曲識卧龍於孔明聽康衢之歌得飯牛於寗戚是用異人翹首俊乂歸誠獨此集作猥以疵賤之姿謬奉清通之盼雖仲由之瑟終閟響於丘門而宋玉之謡儻均音於郢路敢忘英華作望非下里輕用集作冒上呈庶道叶起予陳卜商之四始恐吾㡬失子效然明於一言拜首增慙憂心如醉謹啟獻揚州李吉甫相公雜文啟栁宗元宗元啟始閤下為尚書郎薦寵下輩士之顯於門闥者以十數而某尚幼不得與於厮役及閤下遭讒妬在外十餘年又不得効薄伎於前以希一字之褒貶公道之行也閤下乃始為賛書訓辭擅文雅於朝以宗天下而某又以此時去表著之位受放逐之罰薦仍囚錮視日請命進退違背思欲一日伏於集作在門下而不可得常恐抱斯志以沒卒無以知於門下㝠㝠長懐魂魄幽憤故敢及其能言貢書編文冒昧嚴威以畢其志伏惟覽觀焉幸甚幸甚閤下相天子致太平用之郊報則天神降地祇出用之經邦則百貨殖萬物成用之文教則經術興行用之武事則暴亂剪滅依倚而冒榮者盡去幽隠而懐道者畢出然後中分主憂以臨東諸侯而天下無患盛徳大業光明如此而又有周公接下之道斯某所以廢錮擯集作濵死而猶欲致其志焉閤下儻以一言而揚舉之則畢命荒裔固不恨矣謹獻雜文十首六字一作謹以雜文十首上獻縲囚而干丞相大罪也寧為有聞而死不為無聞而生去就乖野不勝大懼謹啟上湖南李中丞啟宗元啟宗元無異能獨好為文章始用此以進終用此以退今者畏罪悔咎伏匿惴慄猶未能去之時時舉首長吟哀歌舒泄幽欝因取筆以書紉韋而編畧成數巻伏念閤下以文章昇大僚統方隅而某幸縁罪辜得與編人齒於部内不以此時露其所為以希大君子顧視則為陋劣而自棄也敢飾近文及在京師官命所草者凡三巻合四十三篇不敢繁故也儻或以為有可采者當繕録其餘以增几席之汙去就鄙野伏用兢惶謹啟獻江陵趙相公雜文啟宗元啟徃者常侍坐於崔比部聞其言曰今之為文莫有居趙司勲右者自是恒欲飾其所論著薦之閤下病其未就將進且退者殆十數焉幸以廢逐伏匿獲申其業類於嚮者若有可觀然又以罪惡顯大甘死荒野不能出其固陋以求知於閤下則固昧昧徒生於世矣謹獻雜文十首儻還以數字定其是非使得存於世則雖生與蠻夷居魂與魑魅遊所不辭也輕黷威尊集作重伏增戰懼集作惶灼謹啟寄一作上嚴東川啟宗元啟伏惟僕射以仁厚蓄生人以勇義平國難而劍門用兵之事最為天下倡首取其險固為我要衝王師得以由其門而入彷徉布䕶遂無留滯是閤下之勲力宜著於萬祀而不已也某負罪俟命晷刻觀望道里深逺不得悉聞當時之威聲然而竊以累受顧念踴躍盛徳唯恐沒身炎瘴卒無以少報於閤下是以晝夜恟恟不克自寧今身雖敗棄庶幾其文猶或傳於世又焉知非因閤下之功烈所以為不朽之一端也敢黙黙而已乎謹撰劍門銘一首惶恐上獻誠無以稱宏大之略亦足以發平生之心不勝慙愧戰越之至謹啟上裴門下啟宗元啟伏以周漢二宣中興之業歌於大雅載在蜀本作於史官然而申甫作輔方召專淮夷之功魏丙謀謩辛趙致罕羌之績文武所注中外莫同伏惟相公天授皇家聖賢克合謀協徳一以致太平入有申甫魏丙之勤出兼方召辛趙之事東取淮右北服恒陽畧不代出功無與讓故天下文士皆願秉筆牘勤思慮以賛述洪業集作烈闡揚大勲某雖敗辱斥遂守在蠻裔猶欲振發枯稿决䟽潢汙罄効蚩鄙少佐毫髪謹撰平淮夷雅二篇恐懼不敢進獻私願徹聲聞於下執事庶宥罪戾以明其心出位僣言惶戰交積無任踴躍屏營之至不宣謹啟上襄陽李僕射啟宗元啟昔周宣中興得賢臣召虎師出江漢以平淮夷故其詩曰江漢之滸王命召虎其卒章曰于周受命自召祖命以明虎者召公之孫克承其先也今天子中興而得閤下亦出江漢以平淮夷克承于先西平王其事正類然而未有嗣大雅之說以布天下以施後代豈聖唐之文雅獨愧集作後於周室哉某身雖䧟敗而其論著徃徃不為世屈意者殆不可自薄自匿以墜斯時苟有補萬分之一雖死無憾謹撰平淮夷雅二篇齋沐上獻誠醜言滛聲不足以當金石庶繼代集作代洪烈稗官里人得采而歌之不勝憤踴之至輕黷威尊戰越交深謹啟上興元權尚書啟元稹某啟某聞周諸侯生桓文時而不列於盟㑹則夷狄之以其㣲不能自達於盟主也元和以来貞元而下閤下主文之盟餘二十年矣某亦盗語言於經籍卒未能効互鄉之進甚自羞之自陛下以環梁十六州之地授閤下麾蓋鉄棨𤣥纛青旌晨一作泉皆可疑魚符竹信車朱左右轓府置軍司馬以下官屬刻節而㹅制之則某實為環内之州司馬而又移族謁醫在閤下治所私心歡欣願改前耻然而吏通之初有言通之州幽隂險蒸瘴之甚者私又自憐其才命俱困恐不能復脫於通由是生心悉所為文留置友善冀異日善惡不忘於朋類耳筐箧之内遂無遺餘方創新一作雜詞以須供一作洪贄不幸瘡痍暴侵手足沉廢恐一旦神棄其形終不得自進於閤下因用官通已来所作詩及常記憶者共五十首又文書中得遷廟議移史官書戡難紀并在通時敘詩一章次為巻軸封用上獻塵黷尊重帖伏廻遑謹以啟陳不宣謹啟上令狐相公詩啟某啟某初不好文章徒以仕無他技一作岐强由科試及有罪譴棄之後自以為廢滯潦倒不復以文字有聞於人矣曾不知好事者抉摘芻蕪塵黷一作微尊重竊承相公直於廊廟間道某詩句昨又面奉教約令獻舊文戰汗悚踴一作躍慙忝無地某始自御史府謫官於外今十餘年矣閒誕無事遂用力於詩章日益月滋有詩至千餘首其間感物寓意可備矇瞽之諷逹者有之詞直氣麤罪戾是懼固不敢陳露於人唯盃酒光景間屢為小碎篇章以自吟暢然以為律體卑庳一作下格力不揚茍無姿態則䧟流俗常欲得思深語近韻律調新屬對無差而風情自逺然而病未能也江湘集作湖間多有新進小生不知天下文有宗主一作宋玉非妄相倣傚一作教而又從而失之遂至於一無於字支離褊淺之詞皆自謂二字一作目為元和詩體某又與同門生白居易友善居易雅能為詩就中愛驅駕文字窮極聲韻或為千言或為五百言律詩以相投寄小生自審不能有以過之徃徃戱排舊韻别創新詞名為次韻相酬蓋欲以難相挑耳江湘一作湖間為詩者復相傚三字一作或相倣斆力或一作或力不足則至於顛倒語言重複首尾韻同意等不異前篇亦自謂二字一作目為元和詩體而司文者考變雅之由往往歸咎於某嘗以為雕蟲小事不足自明聞相公記憶累旬已來實懼糞土之墻庇以一作於大厦便一作使不復摧壊實一作永為版築者之誤輙敢撰一作繕冩古體歌詩一百首百韻至兩韻律詩又一百首合為五􅃃奉啟跪陳或希搆厦之餘一賜觀覽知小生於章句中欒櫨榱桷之材盡曾量度則十餘年之邅廻不為無用矣三字一作無所用心耳詞㫖𤨏劣冒凟尊嚴俯伏一作伏候刑書不敢逃讓死罪死罪一作皆唐文粹為舉人獻韓郎中琮啓李商隠某啓某少承嚴訓早學古文非聖之書未嘗關慮論都之賦頗亦􅅏神徒以不授集作受非綵毫未吞瑞鳥馳名江左陸機莫及於材多擅譽鄴中王粲終聞於體弱上下羣士差池累年頃者輙露䟱蕪不思狂簡捧爝火以干日御動已光銷抱布皷以詣雷門忽然聲寝不謂郎中搜才路廣登客門寛望犬附書冀雞談易特垂題目曲賜丹青旋屬榮嶓從行神州視膳同孟陽之覲蜀比孝若之歸齊雖佩恩私竟乖陳謝光隂荏苒誠抱勤拳今此秋期遂有天幸更奉禰衡之刺敢無鬷蔑之言某在京多時自夏有疾失外郡薦名之限俯神臯試士之期物情既集於宗師公選果歸於令季懐材者皆云道泰抱器者自謂時来以卞和為玉人無不收之瓊玖得蹇修為媒氏無不嫁之娉娗集作婷是以願託一拳潛布百兩顧方流而有託慮良㑹之猶賖伏惟郎中與先輩賢弟價重兩劉譽髙二陸比李膺則仙舟對棹方馬融則絳帳雙褰若某者雖陋若左思瘦同沈約無庾信之腰腹乏崔琰之鬚眉然至於感分識歸銜誠議報將酬楊寳則就雀求環欲答孔愉則從龜覔印推其異類不後他人謹復陳集作軸新文重干清鍳馬卿室邇孔子墻髙遲面莫由隳肝無所任重道逺方懐驥坂之長鳴一日三秋空詠馬嵬之清什知深可恃言切成煩幽谷未見於鶯喬曲沼空勤於鳬藻仰瞻几閣伏待簡書謹啓為先軰獻集賢相公啓某啓某竊觀集作覩貞觀朝書伏見文皇帝因夣吹塵方求風后于畋問卜始載磻溪事偉於王圖集作塗道光於帝載下惟敷袵上則虛襟纒綿圗緯之前窈窕天人之際崇基立極四足雖㫁於神集作巨鼇開物成功七竅仍沾於混沌禹羞乘輦舜耻弹琴白馬已見於将雛朱草仍聞於滯穗共工蚩尤之軰與二負同抱豕常晉耳之徒與七騶共御是以今上貽謀負扆相公以餘慶持衡用十一徳之資賛七百年之祚古猶今也仁豈逺乎伏惟相公日觀同光天球並價揚鋒露鍔則武庫常開散藻摛華則文星鎮見一言悟主三接承㤙季孟伊繇友朋蕭邴漢皇發論十萬常愧於淮隂齊后推誠一二皆歸於仲父百度既已貞矣九流又復清焉墻東竈北隐淪者咸欲呈材猿飲鳥言僻陋者皆思入貢莊生獻臂揚子㧞毛三百篇之詩更無諷刺二百年之史永絶譏嫌斯乃百代可知一言可集作以蔽豈立錐側管可折齒尋環巍乎煥乎盛矣美矣若某者剖集作刳心寡竅對面多墻小比焦螟敢矜巢窟微同觸氏寕務戰争徒以簮紱承家階庭受訓堂中得桂已有前叨幕下開蓮仍當後忝所宜結囊無咎綵服為榮絶方朔之上書罷禰衡之投刺直以措心賢路誓志昌時旣慕義無窮思有道則見伏惟相公霧能蔚豹燔集作雷可燒龍為百氏之指南作九州之木鐸任安彦國已在於廐中揚子馬卿並歸於門下而猶飢渴未副影響無寕請客者不觧衿裯當關者空有皮骨此某所以淮山逺至漢棧斯来望姬旦之吐飡冀張華之倒屣以昇堂客衆擁篲人多苟無鬷蔑之言難佐仲宣之陋今輙以嘗所著文若干首上獻伏惟少廻巖電微駐台星固無望於討論庻或觀於指趣儻蕭稂可刈菅蒯無遺䝉文宣一字之褒得𤣥宴三都之序便若神巫去癘司命添年禱祝之誠造次於是門遥閶闔路隔瀛洲於人世存思空移氣序以塵中仰望未見端倪希陪上士之流終預群仙之末祈恩望徳乃百斯生干冒威嚴下情無任惶懼感激之至謹啓獻相國京兆公啓前人某啓人禀五行之秀偹七情之動必有詠嘆以通性靈故隂慘陽舒其塗不一安樂哀思厥源數千逺則􅅠邶曹齊以揚領袖近則李蘇顔謝用極菁華嘈􅓐而鐘皷在懸煥爛而錦繡入翫刺時見志各有取焉某爰自弱齡側聞古義㽜連薄宦感念離群東至泰山空吟梁父南逰郢澤徒和陽春逰於自得之場實竊徳音之選伏惟相公旣秉集作康大政復振斯文論風雨則秋枿英華作卉非芬華語霜霰則春條零落發軔於風力觧鞍於伊咎宫商資正始之音寒暑協中和之序是故贄其纓拾俟被斧斤神氣雖怯於大巫名字願聞於下客舊詩一百首謹封如别延之設問希鮑照之一言何遜著名繫沈約之三讀干冒嚴重延望恩輝進退之間若據泉谷伏惟俯賜容納謹啟上知已文章啓杜牧某啓某少小好為文章伏以侍郎文師也是敢謹貢七篇以為視聼之汙伏以元和功徳凢人盡當詠歌文粹作歌詠紀叙之故作燕將録往年吊伐之道未甚得所故作罪言自艱難来始文粹作以来卒伍傭役軰多㨿兵為天子諸侯故作原六十衛諸侯或恃功不識古道以至為反側叛亂故作與劉司徒書處士之名即古之巢由伊吕軰近者往往自名之故作送薛處士序寳歴大起宫室廣聲色故作阿房宫賦有盧終南山下常有耕田著書志故作望故園賦雖未能盡集作深窺古人得與揖譲笑言亦或的的分其狀貌矣自四年来在大君子門下恭承指顧納束於政理簿書間永不執巻上都有舊第唯書萬巻終南山下有舊盧頗有水樹當以耒耜筆硯歸其間及髮齒甚壮兾有成立他日捧持一逰門下為拜謁之先或希一奨今者所獻但有輕凟尊嚴之罪亦何所取伏惟少假誅責生死幸甚謹啓獻詩啓某啓某苦心為詩本求髙絶不務奇麗不渉習俗不今不古處於中間旣無其才徒有其意篇成在紙多自焚之今謹録一百五十篇編為一軸封留獻上握風捕影鑄木鏤氷敢求恩知但希鐫琢干凟尊重下情無任惶懼之至謹啟上蔣侍郎啓二首温庭筠某聞有以踈賤而聞至貴者古人之所譏􅀏有以單外而蘄末契者君子之所兢戒何則無因以至遽庸辨其姸蚩豈有為而然曾不計於能否有詼嘲異狀詭激常姿希彼顧瞻斯為衒造則亦受嗤於識者見詆於通人者矣抑又聞三月而行士人之常凖十年乃字女子之常期未為干世之心厥有後時之歎某尋常一作亡爵里謬詞盤盂離方遁圓因陋成寡亦嘗硏窮簡籍耽味聲詩頗識前脩之懿圗盖聞長者之餘論顓愚自任并介相忘質文異變之方驪翰殊風之㫖粗承師法敢墜緹緗伏以侍郎𢎞繼濟之機謀運搜羅之黙識思將菲質来掛平衡遂揚南紀之清源謹効東臯之素謁越石父彼何人也夙佩遺文趙䑓卿豈欺我哉敬承餘烈輙以常所為文若干首上獻二某聞朔禽違雪海鳥知風茍曰含靈咸思擇地况乎謬窺墳索常禀盤盂從師於洙泗之間擢跡於湘江之表能不成周問道先詣伯陽故綘侍言唯從叔向伏惟侍郎禀生成之秀窮先哲之姿言成訓謨信比暄燠某率兹孤植緬彼单詩持擊缶之凡音嗣操琴之舊事於是持撾自警割席相徴味謝氏之膏腴㺯顔生之組繡勞神焦慮消日㤀年雖天分不多尚慙於風雅而人功斯極劣近於謳歌頃常撰刺門人投書齊帥蒙垂盼飾致在褒稱既而文囿求知神州就選遂得生芻表意腐箒生姿永言棲託之懐不在翾飛之後今者南飈已扇髙壤蕭衰楚貢將来津途悵望髙堂有念末路增悲願持欵啟之心先偵生成之施倘或洛陽仲暠仲暠仲山甫之後猶記姓名建業張逹方宏採拾則百靈斯畢一顧為榮謹以新詩若干首上獻延露蛬聲皇華下調有慙狂􅎩不稱仁私無任依投之至上裴相公啓某啓聞効珍者先詣隋和蠲養疑者必求倉扁苟無懸觧難語竒功至於有道之年猶抱無辜之恨斯則沒為癘氣来撓至平敷作寃聲将垂不極此亦王公大人之所慷慨義夫志士之所歔欷某性實顓蒙噐惟頑固纂脩祖業逺愧孔琳承襲門風近慙張岱自頃爰田錫寵鏤鼎傳芳占數遼西横經稷下因得仰窮師法竊㺯篇題思欲紐儒門之絶維恢常一作帝典之休烈俄屬覉孤牽軫藜藿難虞處黙無衾徒然夜歎修齡絶米安事晨炊既而覉齒侯門旅逰淮上投書自逹懐刺求知豈期杜摯相傾臧倉見嫉守土者以㤀情積惡當權者以承意中傷直視孤危横相陵阻絶飛馳之路塞飲啄之塗射血有寃呌天無路此乃通人見愍多士具聞徒共興嗟靡能昭雪竊見𤣥宗皇帝初融景命遽惻宸襟収拭瑕疵申明枉結劉丞相尋揚優詔蘓許公潤色昌謩五十年間風俗敦厚逮及翔泳未安其所雨暘不得其和匹夫匹婦之吁嗟一聚一鄕之幽欝欲期昭泰必仰陶鈞某進抱疑危退無依據暗處四拘之列不沾渙汗之私與煨燼而俱捐比昆蟲而絶望則是康荘並軌偏哭於窮途日月懸空獨彰於豐蔀伏以相公致堯業裕佐禹功髙百姓咸被其仁一物不違於性儻或在途興嘆解彼右一作左驂彈劍有聞遷于代舎瞻風自卜與古為徒此道不誣貞明未逺謹以文賦詩各一巻率以抱獻縑緗儉陋造寫繁蕪干冒尊髙無任惶灼文苑英華巻六百五十七
