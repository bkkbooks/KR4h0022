body:
  text: 文苑英華巻二百七十七宋李昉等編送行十二劉禹錫二十七首張籍二十五首元稹四首送令狐相公自僕射出鎮南陽梁劉禹錫夏木正隂成戎裝出帝京沾襟辭闕淚廻首别鄉情雲樹褒中路風煙漢上城前旌轉谷去後騎踏橋聲乆領鵷行重無嫌虎節集作綬輕終當持一筆􅄪入福蒼生以下二十七篇並見集本奉送裴司徒令公自東都留守再命太原本封晋國公兩任相去十六年前人星使出闗東兵符賜上公山河歸舊國管籥換離宫行色旌旗動軍聲皷角䧺愛棠餘故吏騎竹見新童漢壘三秋静胡沙萬里空其如天下望旦夕詠清風早秋送䑓院楊侍御歸朝仙署棣華春當時已絶倫今朝丹闕下更入白雲人重振髙陽族分居要路津一門科第足五府辟書頻鷙鳥得秋氣法星懸火旻聖朝寰海静所至不埋輪送陸侍御歸淮南使府五韻用年字韻前人江左重詩篇陸生名乆傳鳳城来已熟羊酪不嫌羶歸路芙蓉府離堂玳瑁筵秦山呈臘雪隋栁布新年曽忝揚州薦因君達短牋時段丞相鎮揚嘗辱表薦送太常蕭博士棄官歸養赴東都時元兄罷相為少師仲兄為郎官並分司洛邑前人兄弟盡鴛鸞歸心切問安貪榮五綵服遂掛兩梁冠侍膳曽調鼎循陔更握蘭從今别君後長向徳星㸔奉送家兄歸王屋山隠居㩀道書王屋山一名洛陽山前人陽落天壇上依稀似玉京夜分先見日月静忽集作静逺聞笙雲路將鷄犬丹䑓有姓名古来成道者兄弟亦同行送趙中丞自司直郎轉官叅山南令狐僕射幕府趙氏兄弟皆僕射門客前人綠樹滿褒斜西南蜀路賒驛門經赤縣集作臨白草道路集作縣道過黄花相府開油幕門生逐絳紗行㸔布政後還從入京華送河南皇甫少尹赴絳州祖帳臨周道前旌指晉城午橋羣吏散亥宇老人迎詩酒每同樂别離方見情從兹洛陽社吟詠欠書生送王師魯協律赴湖南使幕即永穆公之孫前人翩翩馬上郎驅傳渡三湘橘樹沙洲暗松醪酒肆香素風傳竹帛髙價騁琳琅楚水多蘭若何人事搴芳送浙江李相公重赴舊鎮加旌節前人江北萬人㸔玉節江南千騎引金鐃鳳從池上遊滄海鶴到遼東識舊巢城下清波含百谷牕中逺岫列三茅碧鷄白馬徊翔乆却擁集作憶朱方集作幢是樂郊奉送浙江李僕射赴鎮前人建節東行是舊遊歡聲喜氣滿吳州郡人重得黄丞相童子争迎郭細侯詔下初辭温室樹夢中先到景陽樓自憐不識平津閤遥望旌旗汝水頭送李尚書鎮滑州自浙西觀察使拜兵部侍郎月餘有此拜也前人南徐報政入文昌東郡須才别建章視草名髙同蜀客擁旄年少勝荀郎黄河一曲東城下緹綺千重照路傍自古相門還出相如今人望在巖廊送渾大夫赴豐州自大鴻臚拜家集作家丞舊勲前人鳳啣新詔降恩華又見旌旗出漢集作渾家故吏来辭辛屬國精兵願逐李輕車氊裘君長迎風懼錦領酋豪踏雪衙其奈明年好春日無人喚㸔牡丹花送户部李侍郎自河南尹􅄪除本官歸闕前人昔年内史振䧺詞今日東都結去思宫女猶傳洞簫賦國人先詠衮衣詩華星却復文昌位别鶴重歸太乙池想到金門待稱籍一時驚喜見鳳儀送河南尹馮學士赴任前人可憐玉馬風流地暫輟金貂侍從才閣上掩書劉向去門前修刺孔融来崤陵路静寒無雨洛下集作水橋長晝起雷却集作共羡府中棠棣好先於城外百花開時公伯仲四人並以顯官居洛士宗榮之送李庚先輩赴選前人一家何啻十朱輪諸父雙飛秉大鈞曽脱素衣叅幕客却為精舎讀書人離筵洛水侵杯色征路函闗向晚塵今日山公舊賔主知君不負帝城春送李二十九兄員外赴邠寧使幕前人家襲韋平身業文素風清白至今貧南宫通籍新郎吏西候從戎舊主人城外草黄秋有雪峰頭煙静虜無塵鼎門為别霜天晚剰把離觴三五廵送唐舎人出鎮閩川集作中前人暫辭鵷鷺出蓬瀛忽擁貔貅鎮粤城閩嶺夏雲迎皂盖逺溪秋樹映紅旌山川逺地由来好富貴當年别有情了却人間婚嫁事復歸朝右作公卿送王司馬之陜州自太常丞授工為詩前人暫綴清齋出太常空携詩巻赴甘棠府公既有朝中畫集作舊司馬應容醉集作酒後狂按牘来時惟署事風煙入興便成章兩京大道多遊客每遇詞人戰一塲洛中送楊處厚入闗便遊蜀前人洛陽秋日正凄凄君去西秦便向西舊學三冬今轉富曽傷六翮養初齊王城曉入窺丹鳳蜀路晴来見碧鷄早識卧龍應有分不妨從此躡丹梯送周使君罷渝州歸郢州别墅前人君思郢上吟歸去故自渝南擲郡章野戍岸邉留畵舸綠蘿隂下有山荘池荷雨後衣香老集作起庭草春深綬帶長只恐鳴騶催上道不容待得晚菘香送蘄州李郎中赴任前人楚闗蘄水路非賒東望雲山日夕佳薤葉照人呈夏簟松花滿椀試新茶樓中飲興集作酒興因明月江上詩情為晚霞北地交親長引領早將𤣥鬂到京華洛中逢韓中丞之吳興前人今朝無意訴離杯何况清絃急筦催本欲醉中輕逺别不知翻引酒悲来送張輿集作與下同赴舉輿即同年之子有序不錄前人爾生始懸弧我作座上賔引箸舉湯餅祝辭天麒麟今成一丈夫坎坷愁風塵長裾来謁我自號廬山人道舊與撫孤悄然傷我神依依見眉睫嘿嘿含悲辛永懐同年友追想出谷晨三十二君子齊飛凌烟旻曲江一會時後會已凋淪况今三十載閲世難重陳盛時一已過来者日日新不如摇落樹重有明年春火後見琮璜霜餘識松筠肅機乃獨秀武抱亦絶倫爾今持我詩西見一重臣成賢必念舊保節在安貧清時為丞郎氣力侔陶鈞乞取斗升水因之雲漢津送韋道冲秀才赴制舉前人驚禽一辭巢栖息無少安秋扇一離手流塵蔽霜紈故侣不可追凉風日已寒逺逢杜陵士别盡平生歡逐客無印綬楚江多芷蘭因君時暇遊長鋏不復彈閱書南軒霽絙瑟清夜䦨萬境身外寂一盃腹中寬伊昔𤣥宗朝冬鄉冠鷺鸞肅穆升内殿從容頂髙集作領儒冠㳺夏無措詞陽秋垂不刋至今羣玉府學者空縱觀世人希徳門揭若攀峰巒之子尚集作向明訓鏘如振琅玕一旦西上書班裳拂行集作征鞍荆䑓宿暮雨漢水浮春瀾君門起天中多士如星攅煙霞覆雙闕忭舞羅千官清漏滴銅壺仙厨下雕盤熒煌仰金牓錯落飛濡翰古来長䇿人所嘆遭時難一鳴從此始相望青雲端送湘陽熊判官孺登府罷歸鍾陵因寄呈江西裴中丞二十三兄前人射䇿志未就從事府云除箧留馬卿賦袖有劉宏書忽見夏木深悵然憶吾廬復持州民刺歸謁專城居君家誠易知勝絶傾里閭人言北郭生門有卿相輿鍾陵藹千里帶郭西江水朱檻照河宫旗亭緣雲裏前年初缺守慎簡由宸扆臨軒弄郡章得人方付此是時左馮翊天下第一理貴臣持牙璋優詔發青紙迎風奸集作行吏免先令疲人喜何武劾腐儒陳蕃禮髙士昔升君子堂腰下綬猶黄中丞時為萬年尉汾隂有寶氣赤葦多竒鋩束簡下曲䑓佩鞬来歷陽綺筵陪一笑蘭室襲餘芳集作蘭堂襲芳香風水忽異勢江湖遂相忘因君忽集作儻借問為話老滄浪送華隂張苕赴邕府使幕張即燕公之孫頃坐事除名前人昔忝南宫郎往来東觀頻嘗披燕文傳聳若窺三辰翊聖崇國本保賢正朝倫髙視緬今古清風夐無鄰蘭綺照通衢一家十朱輪鄼國嗣侯絶蒍鄉貴業貧夫子成集作承大名少年振芳塵青袍仙掌下矯首陵煙旻公冶本非罪潘郎一為民風霜苦摇落堅白無緇磷一旦逢良時天光燭幽淪重為長裾客佐彼觀風臣分野窮禹畫人烟過虞廵不言此行逺所樂相知新雨起巫山陽鳥鳴湘水濵離筵出蒼莾别曲多怨辛今朝一柸酒明日千里人從此孤舟去悠悠天海春送鄭尚書出鎮南海張籍逺鎮承新命王程不假催班行争路送恩賜一集作併時来牙斾從城展兵符到府開蠻聲集作流喧夜市海色潤朝集作南䑓殘角天邉月寒闗嶺上梅共知公望重多是隔年廻送嚴大夫之桂州旌斾過湘潭幽竒得遍探莎城百越北行路九嶷南有地多生桂無時不養蠶聴歌疑似集作難辨曲風俗自相諳送蠻客前人借問炎州客天南㡬日行江連惡谿路山遶夜郎城栁葉瘴雲濕桂林蠻鳥驚集作桂叢蠻鳥聲知君却廻日記得梅花名送逺人集作薊北旅思前人日日望鄉國空歌白紵詞常集作長因送人處憶得别家時失意還獨語多愁自不集作祇自知客亭門外栁折盡向南枝送逺客前人南原相送處秋草水邉生同作一集作憶鄉客今知集作如今分路行因誰寄廻集作歸信漸逺向集作問前程明日重陽節無人上古城送海南客歸舊島前人海上歸集作去應逺蠻家雲島孤竹船来桂浦山地集作市賣魚鬚入國自獻錦集作寶逢人多贈珠却廻集作歸春洞口斬象祭天吳送人往濟南前人黄綬在腰下知君非旅行將書報舊里留褐與諸生贈别盡沽酒惜歡多出城春風濟水上候吏聴車聲送越客前人見説孤㠶去東南到會稽春雲剡溪口殘月鏡湖西水鶴沙邉宿集作立山鼯竹裏啼謝家曽住處煙洞入應迷送韓集作韋評事歸華隂前人蓮花峰下住集作三峰西面住出見世人希白髪集作老大誰相識青山集作恓惶又獨歸拂牎秋菌落開箧蟄蛾飛若訪雲中伴還應着褐衣送南客前人行路雨脩脩青山盡海頭天涯人去逺嶺北水廻集作南流夜市連銅柱巢居属象州来時舊相識誰向日邉集作南遊送朱慶餘及第歸越前人東南歸路逺㡬日到鄉中有寺山皆遍無家水不通湖聲蓮葉雨野色集作氣稻花風州縣知名乆争邀與客同送從弟戴元之蘇州前人楊栁閶門外集作路悠悠水岸斜乘船集作舟向山寺着屐集作履到人集作漁家夜月紅柑樹秋風白藕花江天詩境集作景好廻日莫令賒送友人歸山前人出山成白首重去結茅廬移石修廢井掃龕陳舊書開田留杏樹分洞與僧居長在幽峰裏樵人見亦疎集作初送李評事逰越前人未習風塵事初為吳越逰露沾湖草晚集作濕日照海山秋梅市門何在蘭亭水尚流西陵待潮處知汝不勝愁送李騎曹靈川歸覲前人翩翩出上京㡬日到邉城漸覺風沙處還將弓箭行席箕侵路暗野馬見人驚軍府知歸慶應教數騎迎送裴相公赴鎮太原前人盛徳䧺名逺近知功髙先乞守藩維啣恩乍集作暫遣分龍節署勑還同在鳳池天子親臨樓上送朝官齊出道傍集作邉辭明年塞北諸藩守集作落應起生祠請立碑送李司空赴鎮襄陽前人中外兼權社稷臣千官齊出拜行塵􅄪調公鼎勛庸盛三受兵符寵命新商路雪開旌斾逺集作展楚堤梅發驛亭春襄陽風景由来好重與江山作主人送南海鄭尚書前人聖朝選將持符節内制宣時百辟聴海北蠻夷来蹈舞嶺南封舘送圖經白鷴飛遶迎官舫紅槿開當宴客亭此處莫言多瘴癘天邉㸔取老人星送侯判官赴廣州從事集作軍前人年少多才求自展將身萬里赴軍門辟書逺至集作到開呈客公服新成着謝恩驛舫過江分白候戍樓集作亭當嶺見紅旛海花巒草連冬有行處無家不滿園送楊少尹赴蒲集作浦城前人官為本府當身榮因得還鄉任野情自廢田園今作主每逢耆老不呼名舊逰寺裏僧應識新别橋邉樹亦集作巳成公事多閑詩更好將誰相送集作逐上山行送枝江劉明府前人老着青衫為楚宰平生志業有誰知家僮從去愁行逺縣吏迎来恠到遲定訪玉泉幽院宿應過碧澗早茶時向南漸漸雲山好一路遥聞唱竹枝送浙東集作西周阮範判官前人由来身集作自是煙霞客早已聞名詩酒間天闕因將賀表至江城應集作家鄉新着賜衣還常吟巻裏新集作相酬句自話湖中集作邉舊住山吳越主人皆集作遍愛重多應不肯放君閑送友人盧處士遊吳越前人羡君東去見殘梅唯有王孫獨未回吳苑夕陽明古堞越宫春草上髙䑓波生逺一作野水鴈初下風滿驛樓潮欲来試問一作逐漁舟看雪浪㡬多江燕荇花開送蜀客前人蜀客南行過碧溪木綿花發錦江西山橋日落人来集作晩行人少時見猩猩上樹一作樹上啼送入蜀客張籍行盡青山見益州錦城樓下二江流杜家曽向此中住為到浣花溪上集作水頭送東川馬逢侍御使廻十韻元稹風水荆門濶文章蜀地豪眼青禮賔重眉白衆情髙思湧曽吞筆投虚慣用刀詞鋒倚天劒學海駕雲濤南郡傳紗帳東方讓錦袍旋吟新樂府便續古離騷雪岸猶封草春江欲滿槽餞筵君置醴随俗我餔糟莫歎巴三峽休驚鬂二毛流年等閑過人世各勞勞送崔侍御之嶺南二十韻元稹漢法戎施幕秦官郡置監蕭何歸舊印自江陵曹拜鮑永授新衘幣聘雖盈篋泥章未破緘蛛懸絲繚繞鵲報語詀諵􅄪礪神羊角重開憲簡函崔君前任已為御史鞶纓驄赳赳緌珮綉縿縿音衫逸翮憐鴻翥離心覺刃劖聨遊虧片玉洞照失明鑒遥想車登嶺那無淚滿衫茅蒸連蠎氣衣漬度梅黬象鬪緣溪竹猿啼帶雨杉颶風狂浩浩韶石峻嶃嶃宿浦宜深泊祈瀧在至諴瘴江期集作乗早渡毒草莫親芟試蠱㸔銀黑排腥貴食鹹菌湏蟲已蠧果重鳥先􅡪氷瑩懐貪水霜清頭痛巖珠璣當盡擲薏苡詎能讒荆俗期王粲吾生問季咸逺書多不達勤為枉㩥㩥送王協律遊杭越十韻前人去去莫悽悽餘杭接會稽松門天竺寺花洞若耶溪浣渚逢新豔蘭亭識舊題山經秦帝葬壘辨越王棲一作堤江樹春常早城頭月易低鏡呈作澄湖面出集作滯雲疉海潮齊章甫官人戴蓴絲姹女提長竿集作干迎客閙小市隔煙迷紙亂紅藍壓甌凝碧玉泥荆南無底物来日為儂携送王十一南行前人夏水􅃞天末晚𤾉依岸村風調烏尾勁眷戀餘芳罇觧袂方瞬息征㠶已翩飜江豚涌髙浪楓樹摇去魂逺戍宗侣泊暮烟洲渚昏離心詎㡬許驟若移寒温此别信非乆胡為坐憂煩我留石難轉君泛雲無根萬里湖南月三聲山上猿從兹耿幽夢夜夜湘與沅文苑英華巻二百七十七
