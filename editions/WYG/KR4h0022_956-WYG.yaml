body:
  text: 文苑英華巻九百五十七宋李昉等編職官十九元兵曹盛墓誌一首蕭功曹墓誌一首馬别駕墓誌一首楊司倉墓誌一首吕判官恭墓誌一首盧司録士瓊墓誌一首任司馬佶墓誌一首李長史則墓墓誌一首河南兵曹元公墓誌銘穆員公諱盛字某河南洛陽人魏昭成帝之十二代孫皇金紫光禄大夫司膳卿汝陽公善應之曽孫集州司馬崇敏之孫處士履清之季子生五十有五年官歴憲府法寺宰邑掾京者十政以貞元十一年六月十五日卒于東都綏福里第十月四日孀妻孤女奉喪歸葬于偃師首陽山之北原嗚呼哀哉公忠竭於事上孝終于報親許與諾著于氣類其蒞官也剛决堅利致用如今易人之所難敢人之所畏累佐戎府獨歩神州肅肅羽儀方漸于陸何年官階半而不知者命廹焉初處士府君之逝也公二兄孟㓜仲嬰公方孕太夫人則我伯姑来歸于我惟是内外同氣兄無常弟弟無常兄入學過庭雁行三紀既而從官方始異門孟仲早落公終養焉嗚呼我伯姑深仁如天髙行鄰古昔有三子今無一孫悠悠彼蒼與善焉在仁人之祀奄焉忽諸夫人河東桞氏從公致養奉公歸祔存没成公之志賢乎哉女子藐爾未笄㷀然主奠聞者悲之公方大漸以埏􅎬之銘見託何以為報哀而不文銘曰歸全舊丘列侍先人有知當樂無知返真成都功曹蕭公墓誌銘前人公諱某字某其先事具梁史盖宣武皇帝七代孫也曽祖憬唐宰相世孫表名文憬皇朝朝散大夫湖州司馬祖元祖表作禮相表作湘州刺史贈太子詹事父詮大理評事昭穆相遺者曰清白孝友人稱之君㓜以眀經登第洎天下多事投家逺迹而所至聞焉或吏或賔報之如一歴任曹州筦勾杭州富陽二邑轉都水監主簿左金吾衛兵曹調大理評事地官司國計使臣督王賦迭咨公以分其重公受命事集而輿頌隨之劔南節度使表公成都功曹掾兼佐蜀州戎事錫以章紱不幸遇疾退閒于荆楚之間貞元八年歸故國于洛汭秋九月十四日終于康裕里第春秋五十八其冬十月二日遷祔于某縣某鄉從先公居公之志也公之生也和其發也清其行也晦其用也眀其文也餘力其學也存誠其從事也口不言禄其為善也心不近名是故歴仕無報勞之寵終身無充量之榮汨没下位摧頽壯齡傳曰天下有道貧且賤焉恥也若乃道富而家貧徳貴而身賤才合二字疑而竒跡髙位下恥在夫天焉如蕭公者處退而退求仁得仁焉恥焉既非所恥則又何怨夫人某郡暢氏故尚書左丞某之子昔佐公義今成公家生男四人三子早夭一子曰範方齠而嗣毁如成人姪纂遵世母㓜孤之請見託為誌其詞曰吁嗟古人不貴貴仕義猶重生徳豈輕位猗歟蕭公其道不匱何以表墓唐之君子銀青光禄大夫行平州别駕馬公墓誌銘歐陽詹嗚呼死也者君子曰終有唐興元二年六月二十四日銀青光禄大夫行平州别駕馬公終于京師國喪英才家亡令子國之集作家國不幸痛貫所集作可知公諱某字某其先京兆扶風人始實趙氏累葉繼將多總戎塞下有以因居今為燕之名流曽祖某某官祖某某官父某某官公則某官第某子也積奕世忠貞之慶得隂方嚴勁之氣天骨山峻神姿玊耀集作神葱玊輝有孝有悌閨門以和有信有義州閭以附矛㦸韞器風雲馳聲燕趙多竒士公其人也用正直奉籌畧擁旄仗節者尊以果斷行政令擐甲執兵者伏前後佐全師大幕不有暫寧方將張翼翔雲揚鬐游溟大命不永大疾集作病遄及享年三十三秦氏醫遲顔生禍促哀哉夫人某處某氏子二人長曰縱次曰緒永念集作思之感至性過人以貞元十二年嵗在某月某日大通卜宅于京兆某鄉某里某原禮也天長地久埋集作煙川塹阜于何不有乃為銘徳于誌以三字集作而誌墓云士以常第集作士此常才如瑜在珉燕趙多竒士集無士字公則其人業繼忠貞識資籌畧流器瑚璉羽族鵰鶚題輿大郡佐侑雄師雖有極徳集作雖猶在徳亦匪孤時南抑集作仰摶鵬更期遐揚集作颺東觀逝水忽兹永徃卜逺期集作斯及窆于此岡惟安惟永地久天長集作天長地久朝議郎行鄂州司倉㕘軍楊公墓誌銘前人公諱某字某其先闗右𢎞農人永嘉過江公自始遷之祖若干代處於閩越曽祖某皇唐循州司馬祖某漳州長史父某泉州南安縣丞公則南安第若干子長七尺骨目瑰異温良節行所至自昭風神識度羣居不掩六籍外偏好穰苴管子之術永泰中以耕戰之法致集作郊梁宋軍畫用有成大厯元年節度使右僕射田公薦授右集作左武衛率府倉曹㕘軍事在位以貞慎聞公以不仕則墜業躁求則背道或出或處聖人為中依吏部節文敬遵常調大厯八年集授吉州永新縣丞興元元年集授廬州司曹集作田㕘軍貞元三集作二年集集無此字授鄂州司倉㕘軍累職貞慎如率府倉曹時毎罷官待集卜勝屏居宴集作晏如也鄂州秩滿愛其風土亦止焉集作愛其江山宅心焉貞元十二年冬又合集春赴京師遇疾於途以二月四日終于汝州龍興縣之逆旅時年六十七凡入仕三十一年歴官四政禄非豐儉以足務雖劇通以簡上以中正集作政非重下以公平矚皆白圭無玷朱紘有聲嗚呼公之材量如鐘含音如水待月集作盛大小當應方圓必合公集作我則不􅃷人胡不求莫能全展光耀以至殞殁悲失夫保性居業時行則行時止則止道也公昔於名宦之理是焉仕禄農耕猶生則營若死則已亦道也公昨之集作於是岐路之役是焉公存以道始亡以道終至人不違道公與之同旋正矣乎善始終者也夫人隴西彭氏戴天之感痛以禮成長子曰集無曰字下同晃次子曰暈季子曰果伏㐫集作㐫是之號以至見血以某年二月日卜葬于某郡集作鄉某原禮也佳城一閉他時古丘後之人孰知丘中之徳墓許有誌故為墓誌銘庶覩今為古者眀斯地泉下有君子焉銘曰一種鱗物神則曰龍一種植物真則曰松英英楊公於人被物集作楊公於人被真役神藝術􅅗宏温良内克名不稱實禄有負徳夭桃信美不能秋敷冬日可愛日集作亦用西徂大限集作此斯来無賢無愚英英楊公與逝川俱卜宅集作此脩原有形永圖集作宅東海之集作西山不易其廬集作其廬罔易嶺南節度判官吕公墓誌銘栁宗元吕氏世居河東至延之始大以御史大夫為浙東道節度大使延之生渭為中書舍人尚書禮部侍郎刺湖南七州生四子温恭儉讓以温為尚書郎再贈至右僕射恭字敬叔他名曰宗禮或以為字實惟吕氏宗子尚氣節有勇畧不事小謹讀縱横書理隂符握機孫子之術曰我師尚父胄也大父洎先人咸統兵今天下將理平蔡兖冀幽洎戎猶負命早夜呼憤以闕任爪牙畢力通天子命作文章咸道其志云又曰由吾兄而上三世世為進士吾文為不墜教戒猶集作獨武事未克纉厥緒因棄去從山南西道節度府掌書記預謀畫不甚合以試守軍衛佐加恊律郎入薦為長安主簿復出以監察御史參江南西道都圍練軍事府表進殿中侍御史為桂管都防禦副使元和八年去桂州相國尚書鄭公遮留假嶺南道節度判官至廣州病疹集作痞是瘧加滯六月二十八日卒妻裴氏户部尚書延齡女有丈夫子三人曰爽曰壊曰特女三人曰環曰鸞曰倩皆㓜行於道而倩又死遂以柩如洛陽祔葬如集作於大墓欵志吕氏世仕至大官皆有道宜興於世温集作泊字恭名為豪傑知者以為是必立王功活生人不幸温刺衡州年四十卒恭未及理人年四集作三是十七又卒也世固有有其具而不及其用若温恭者邪恭貌竒壯有大志信善容物宜夀考碩大而又不克吕氏之道惡乎興銘曰渢渢之風乎不可追有志之大乎今安歸吕君去我死乎吾誰依河南府司録㕘軍盧君墓誌銘李翺君諱士瓊字徳卿范陽人家世為甲姓祠部郎中瀜集作融之長子眀經及第厯寧陵華陽集作隂二縣主簿知泗州院事得恊律郎鄭少師之留守東都奏為推官得大理評事韓尚書代為留守請君如初尚書節將陳許奏充觀察判官得監察御史府罷嵗餘除河南府户曹以疾免河南尹重其能奏為司録叅軍八月癸丑發疾而卒年六十九君少好著文精曉吏事少遊故丞相陽炎張延賞之門楊美其文辭張每歎其吏材過人常攝職同州當徴官税錢時民競出粟易錢以歸官斗至十八九君白刺史言狀請倍估納粟下以澤民上可以與官取利刺史詰狀君辨其所以必然刺史行之民用得饒未一月果被有司牒和收官粟斗給六十後刺史到欲盡入其羨于官君既去職猶止之曰聖澤本以利民民户知之不可以獨享刺史乃懸牓曉民使請餘價因以絹布髙給之民亦歡受州獲羨錢六百萬其為户曹决斷精速曹不擁事及為司録始就官承符吏請曰前例某等一十五人合錢二千集無此二字僦人與司録養馬敢請命因出狀君謂集作呵曰汝試我邪使拽之將加杖承符吏衆進仰曰前司録皆然故敢請君告曰司録豈不自有手力錢邪用此贓何為因叱出之召主饌吏約之曰司録判官文學叅軍皆同官環處以食精麤宜當一不合别二集無此字無踵舊犯吾不恕及日終厨之率其餘而分之文學叅軍得司録居三之一君饒之曰俸錢職田手力數既别官品矣此飱錢之餘不當計位髙下從此後自司録至叅軍平分之舊事掾曹之下各請家僮一人食錢助本司府吏厨附食司録家僮或三人或四人就公堂餘食侵撓厨吏弊日益長君使請家僮二人食錢於司録府吏厨附食家僮終不食官厨召諸縣府望吏告曰某居此嵗久官吏清濁侵病人者毎聞之司録職當舉非法徃各白汝長宜慎守㢘靖以澠池令為戒其所改易皆刻已便人堪為故事及君卒士君子相弔哭咸以為能髙而位卑不副有子三人孺方嗣宗嗣業號慕祗守不失家法女二人前娶清河崔敏女無子後娶滎陽鄭虬之女有子故皆附葬於祠部塋東北孺方叩頭泣曰丈人先與先父集作嘗與先子同官而游宅居南北隣敢請紀石翺不得辭乃據所見聞者鐫其實可推類以知凡所從事之賢銘曰嗟盧君性直而用優約已以利人宜夀宜貴以拯時所難集作艱其緘而不伸以喪厥神豈奪恵于東民悲夫信州司馬集作檢校工部員外郎任君墓誌銘前人君諱佶字叔正樂安人殿中侍御史元植集作恒之孫靈府功曹日新之子君少遭父喪養母以孝稱京兆尹崔光逺表試左清道率府兵曹叅軍勅攝富平縣尉知縣事及克復京師以功授成都府犀浦縣丞又以優授涇陽縣尉吐蕃犯都代宗幸陜州君召募吏人保守佛寺寇不敢逼擢為本縣令充渭南集作北十縣團練使及駕囘京為同列􅅗搆功不得論僕射裴冕寃而奏之得長安縣尉轉本縣丞歴大府寺丞未幾遷監察御史京畿舘驛使判官中書侍郎元載為澤漕使請為判官轉殿中侍御史又檢校工部員外郎兼侍御史判官如故元載得罪君左授建州建安縣集無此字尉及楊炎入相君以書戒之由是楊怒而不用又移處州司户再授信州司馬觀察使鮑防集作魴非以為判官權知饒集作詔州事遘疾歸卒于集作於信州權窆於州西原有詩兩巻前娶宗正氏女生男冀為邠州司法叅軍三女各為士妻後娶杜氏女子三人曰淑集作叙下同曰羡曰􅶐女五人長女嫁長洲尉源咸季次女權適權穎三女早卒少女二人未許嫁淑厯佐太府以吏能有聲為度支振武營田使得試恊律郎攝監察御史元和十四年杜氏卒淑乃自信州奉府君之喪合葬於萬年桞村從先人舊塋淑嘗與翺同事嶺南府翺知淑之賢集作方亟薦於時故淑来請誌銘曰士生于時兮所貴者才有才無命兮古今所哀噫歙州長史隴西季府君墓誌銘前人府君諱則字某凉武昭王十三世孫大父獻眉州别駕時宰相有請婚者力不可止因去官歸集作居家弟遇疾集作病暴卒别駕燒一指以禱於神既而弟復生自説方就縶上帝有命以兄燒指宜復其生别駕生令一侍中源乾曜一子求婚府君拒之固以詞抵之貶黔州彭水尉遂以夀終府君始十餘嵗先夫人以之從喪歸殯汝州由是依于舅族少好老子莊周之言與羣童居集作游盡能記他童之始集作所習先夫人學左氏春秋博該百家之書故府君以經史浸潤力田供養由是少不肯求仕善草𨽻畫弓矢博奕皆得其妙既冠得濠州定逺縣集無縣字尉假領他縣令嚴而行吏急民寛富豪并貧民之産而不税者盡以法治之貧民用安罷職復還其初從事嶺南得試左蜀本作右武衛兵曹於福建得試太子通事舍人大理司直授歙州長史宣歙觀察使請為判官奏未下以疾卒年七十四夫人河南元氏夀州刺史從之女年六十八先府君而終生子某子某皆未仕早卒女子五人長女壻禮部員外郎鄭錫次女壻桂府觀察使杜式方次女壻京兆韋放次女壻滎陽鄭循禮小女壻密縣尉鄭公瑜㓜子克㳟少讀書學文以兄舉進士家事自飾弗克求名故年四十有六始奏授睦州司兵累遷試大理司直兼殿中侍御史充鹽鐵推官寳厯三年三月克恭奉府君夫人之喪歸葬于鄭州某縣岡原翺知克恭之材十三年矣故克恭以府君之葬来請且曰將以六月庚申窆知克恭者若吾季叔又何何字集作安可以辭銘曰徳不稱禄鬼神之責材優以賤古人不戚非道不集作弗求曷計人爵慶藴而傳後必有積其葬為誰孝子之卜蓍蔡僉吉嘉原乃蜀乃作創擇合骨于兹終永其託何以識之有封有栢文苑英華巻九百五十七
