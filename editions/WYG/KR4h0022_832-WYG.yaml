body:
  text: 文苑英華巻八百三十三宋李昉等編災祥泗州大水記一首甘露記一首質疑息壌記一首辨石鐘山記一首釋武豹門記一首寓言醉鄉記一首鶚執狐記一首枕中記一首災祥泗州大水記吕周任春秋左氏傳曰天反時為災一作妖地反物為妖一作災其於水也反利為害矣在唐堯時包山陵而若漫一作浩滔天在漢武時浮齧桑而浸鉅野皆震蕩上心昬墊下人其故何哉天其或者警休明而表忠誠也皇唐貞元八年嵗在壬申夏六月上帝作孽罰茲東土浩淼長瀾周亘千里請究其本而言之是時山泐桐栢發谼歕湧下注淮瀆平湍七丈浮夀踰濠下連滄波東風駕海潮上不落雨水相逆濺濤倒流矗縮廻薄衝壅汴一作淮泗積隂驟雨河㵼瓴建不捨晝夜至于旬時一作浹乾坤合怒雲雷為屯以水濟水吞洲漂防走不及􅇡飛不及翔連甍為河海一作淮噍類如魚鱉事出慮外孰能圖之開府儀同三司檢校右散騎常侍兼御史大夫泗州刺史武當郡王張公以其始至也聚邑老以訪故搴薪楗石以禦之其漸盛也運心術以馭事維舟編桴以載之遂連舳促櫓歛邑之惸嫠老弱州之庫蔵圖籍官府之噐先寘于逺墅軍資甲楯士女馬牛遽遷於集作于水次將徤丁壯遏水之不可者任便而自安迨數日而計行矣洪波汗漫不辨一作測涯涘驚颷皷濤舟不得不覆巨浪崩山城不得不圯崇丘如島稍稍而没夏屋如查汎汎相繼天廻地轉混茫其中公獨與左右十數人纜舟於郡城西南隅女牆濕堵之上以向衝波而一作之來不亦危哉公之左右失色同辭請移公曰伾天子守土臣也茍有難而違之若王一作君命何且南山隔淮幾五六里吾能往矣况是别境離局姦也雖死不為公於是使部内十驛遷於虹城西鄙而南傍南山而東四百里達維揚之路俾星郵無壅又東北直渡經下邳五百里至于一作於徐州通亷察之問又移書淮南城將令斷扁舟往來立標樹信以虞冦賊一作盗之變公毎端拱對水而訴曰伾奉聖主明詔司牧此州以親萬姓河公何為不仁降此大沴伾之罪也厲聲正色阽危不撓歴再旬而水定又再旬而水抽自水始至及水始耗已一一作六疑時矣又一時而復流郊境之内無平不陂郛郭之間無岸不谷尺椽片瓦蕩然無所有可異者惟公之露寢與内寢巋然存焉豈不可浮而往盖不可顛而壊乎斯則神仰公之仁先庶物而遺已神賞公之忠臨大難而守節神髙公之義動適權以成務故保其聼政養安之所旌公之善也昔邵伯之理也人愛甘棠而勿剪方兹神靈支一作扶持不亦逺乎公乃捨車而徒棄輴而泥弔亡恤存綏復軍郡逺軫聖慮詔左庶子姚公弔而賑之至於修府署建城池詔有司計功而償緡立㕓市造井屋公申勸科程以貰以貸纔踰年而城邑復常矣其於縮板為垣樹栁為麗端衢四達􅇬宇䨇峙即公之新意也天災流行何代無之逢昏即盛遇賢即退故劉琨後漢即昆返風而火滅王尊臨河而水止盖忠誠之至也公嘗領羸兵守孤城以百當萬俾國家全山東之地名載青史公即國之長城也今以一葦之航挂一作絓於危堞之上以當漲海之勢城頽而一塊不傾水止而所濟獲全公即國之貞臣也固知明主之委任於公也皆感而通焉周任不敏學於舊史氏借古人以諭公未或同年矣謹述而記之時貞元十三年嵗在丁丑清和之月哉生魄勒于石一作皆唐文粹甘露記符載大唐壬午嵗南陽張君一作公宰上元之二年也有甘露降于庭梧瀼瀼靄靄如雨非雨者數日縣大夫謙不敢自道其羙胥徒洎邑之緇黄㓜艾以狀聞於連帥連帥表奏于天子天子嘉之優詔寵答煥然光曜癸未嵗復降于庭梧夏四月余自淮南罷去丞相府將假道以歸主人備勞餞之禮遂盛於杯噐以示予予取前箸以嘗之即薰喉淬齒液不及咽而腑臟塗楚陸反一作凃楚陸反然矣輙自揣大化之精而計之曰夫天地無私也至虚也寂然不動感而遂通若御物之心誠萬人之氣和為祥雲也甘露也或御物之心淫萬人之氣寃為繁霜也苦雨也動於此形於彼自開闢至於兹日無他理矣一作也夫如是張君之政徭賦調歟倉廪實歟風俗厚歟人民樂歟不然則何嘉祥𤣥貺鍾于邑也如此繇是言之二千石至于六百石主有土之教化操生人之性命正即為禎祥邪即為妖沴得不嚴心直志静操理本上答神明之㫖乎茂宰之時政也張君名集自某郡某里人也其餘風猷義行存乎碑頌此不書甲申嵗十月一日記質疑息壌記栁宗元永州龍興寺東北陬有堂堂之地隆然負塼甓而起者廣四歩髙一丈五寸始之為堂也夷之而又髙凡持鍤者盡死永州居楚越間其人鬼且禨由是寺之人皆神之人莫敢夷史記天官書及漢志有地長之占而亡其說甘茂盟息壌盖其地有是類也昔之異書有記鴻集作洪下同水滔天鯀竊帝之息壌以堙鴻水帝令祝融殺鯀于羽郊其言不經見今是土也夷之者不幸而死豈帝之所愛耶南方多疫勞者先死則彼持鍤者其死於勞且疫也土烏能神余恐學者之至於斯徴是言而唯異書之信故記于堂上辨石鐘山記李渤水經云彭蠡之口有石鐘山酈道元以為下臨深潭微風鼓浪水石相搏響若洪鐘因受其稱有幽棲者尋綸東湖沿瀾窮此遂躋崖穿洞訪其遺蹤次于南隅忽遇䨇石欹枕潭際影淪波中詢諸水濵乃曰石鐘也有銅鐵之異焉扣而聆之南聲函㗅一作清韻北音清越枹止響騰餘音徐歇若非潭滋其山山涵其英聨氣凝質發為至靈不然則安能産兹竒石乎乃知山仍石名舊矣如善長之論則瀕流庶峯皆可以斯名一作石非貫之聊刋前謬􅇔遺將來貞元戊寅嵗七月八日白鹿先生記釋武豹門記韋承造徃之事不知者多以故老之傳而實之舛生於訛以至大謬至若正氣為邪氣所偪本非正氣也盖疑生於莫折以逮於言思耳愚咸通甲午嵗孟春月十有七日奉天子詔來牧兹郡郡之人以武豹之門為祛邪禦魅之所作也其門北向左畵白虎執以蒼頭之矛右畫犬豕拒以雄武之威門之東壁有刻石焉乃故大光禄李公暨前牧是邦為文以觧之義與夫郡人之說不貳也又曰圖於寢室怳怳焉疑有所壓愈不知其所由來者矣適有多才能之士胡姓承裕名為愚釋之曰是州也其宅東西廣正北傾後無乾地南北嶮􅇖林木森聳水自北來地一作山勢岡阜即是八難地而武豹門正當九苦風時俗以武豹謂辟邪按韓王元嘉始創之㫖一作言乃以五行所尅勝其灾而滅之禍武屬木以木臨亥位故以豕承之寅主東方故畫東垣豹主西方故誌西壁禦禍之風制空之位一其義也今愚所築池北望月䑓池南釣絲䑓且及此門中架虹梁正與韓之設色三獸暗合其理一也愚故命筆書之庶將釋惑表異為後君子信與不信耳時乾符二年四月六日綘州刺史韋承造記寓言醉鄉記王績醉之鄉去中國不知其幾千里也其土曠然無涯無邱陵阪險其氣和平一揆無晦明寒暑其俗大同無邑居聚落其人甚精無愛憎喜怒吸風飲露不食五榖其寢于于其行徐徐與鳥獸魚鼈雜處不知有舟車械噐之用昔者黄帝氏嘗獲遊其都歸而杳然䘮其天下以為結繩之政已薄矣降及堯舜作為千鍾百壺之獻因姑射神人以遐集作假道盖至其邊鄙終身太平禹湯立法禮繁樂雜數十代與醉鄉隔其臣羲和棄甲子而逃冀臻其鄉失路而集本文粹並有道字夭二本有故字天下遂不寜至乎末孫桀紂怒而昇二本有其字糟丘階級千仭南向集作面而望卒不見醉鄉武王得志于世乃命公旦立酒人氏之職典司五齊拓土七千里僅與醉鄉達焉故四二本作三十年刑措不用下逮幽厲迄乎秦漢中國䘮亂遂與醉鄉絶而臣下之受二本作愛道者往往竊至焉阮嗣宗陶淵明等十數人並逰于醉鄉沒身不返死葬其壌中國以為酒仙云嗟乎醉鄉氏之俗豈古華胥氏之國乎何其淳寂也如是予得二本作将遊焉故為之記鶚執狐記李華某嘗目異鳥擊豐狐於中野䨇睛燿宿六翮垂雲迅猶電馳厲若霜殺吻决肝腦爪刳腎腸昂蔵自雄倐歘而遊問名於耕者對曰此黄金鶚也其何快哉因識一作譲之曰仁人秉心哀矜不暇何樂之有曰是狐也為患大矣震驚我姻族撓亂我閭里喜逃徐子之盧不畏申孫之矢皇祗或者其惡貫盈而以鶚誅之予非斯禽之快也而誰為悲夫髙位疾僨厚味腊毒遵道致盛或罹諸殃况假威為孽能不速禍在位者當洒濯其心祅疑作祓除㐫意惡是務去福其大來不然則有甚於狐之害人庸忸於鶚之能爾枕中記沈既濟開元七年道士有吕翁者得神仙術行邯鄲道中息邸舍攝帽弛帯隠囊而坐俄見旅一作邑中少年乃盧生也衣短褐乗青駒將適于田亦止於邸中與翁共席而坐言笑殊暢乆之盧生顧其衣裝敝䙝乃長歎息曰大丈夫生世不諧困如是也翁曰觀子形體無苦無恙談諧方適而歎其困者何也生曰吾此茍生耳何適之謂翁曰此不謂適而何謂適答曰士之生世當建功樹名出將入相列鼎而食選聲而聼使族益昌而家益肥然後可以言適乎吾嘗志于學富於遊藝自惟當年青紫可拾今已適壯猶勤畎畆非困而何言訖而目昬思寐時主人方蒸黍翁乃探囊中枕以授之曰子枕吾枕當令子榮適如志其枕青甆而竅其兩端生俛首就之見其竅漸大明朗乃舉身而入遂至其家數月娶清河崔氏女女容甚麗生資愈厚生大悅由是衣裝服馭日益鮮盛明年舉進士登第釋褐袐校應制轉渭南尉俄遷監察御史轉起居舍人知制誥三載出典同州遷陜牧一作郡生性好土功自陜西鑿河八十里以濟不通邦人利之刻石紀徳移節汴州領河南道採訪使徴為京兆尹是嵗神武皇帝方事戎狄恢宏土宇㑹吐蕃悉抹一作採疑邏及燭龍莽布支攻陷𤓰沙而節度使王君􅎢新被殺河湟震動帝思將帥之才遂除生御史中丞河西道節度大破戎虜斬首七千級一作十餘萬開地九百里築三大城以遮要害邊人立石於居一作㧞延山以頌之歸朝冊勲恩禮極盛轉吏部侍郎遷户部尚書兼御史大夫時望清重羣情翕習大為時宰所忌以飛語中之貶為端州刺史三年徴為常侍未幾同中書門下平章事與蕭中令嵩裴侍中光庭同執大政十餘年嘉謨宻命一日三接獻替啟沃號為賢相同列害之復誣與邊將交結所圖不軌下制獄府吏引從至其門而急收之生惶駭不測謂妻子曰吾家山東有良田五頃足以禦寒餒何苦求禄而今及此思衣短褐乗青駒行邯鄲道中不可得也引刄自刎其妻救之獲免其一作共罹者皆死獨生為中官保之減罪死一作死罪復追為中書令封燕國公恩㫖殊異生五子曰儉曰傳曰位曰倜曰倚皆有才噐儉進士登第為考功員外傳為侍御史位為太常丞倜為萬年尉倚最賢年二十八為左㐮其姻媾皆天下望族有孫十餘人兩竄荒徼再登台鉉出入中外徊翔䑓閣五十餘年崇盛赫奕性頗奢蕩甚好佚樂後庭聲色皆第一綺麗前後賜良田甲第佳人名馬不可勝數後年漸衰邁屢乞骸骨不許病中人候問相踵於道名醫上藥無不至焉將殁上䟽曰臣本山東諸生以田圃為娛偶逢聖運得列官叙過䝉殊奬特秩一作被是鴻私出擁節旌入昇台輔周旋中外綿歴嵗時有忝天恩無禆聖化負乗貽冦履薄增憂日懼一日不知老至今年逾八十位極三事鍾漏並歇筋骸俱耄彌􅇔沉頓待時益盡顧無成效上答休明空負深恩永辭聖代無任感戀之至謹奉表陳謝詔曰卿以俊徳作朕元輔出擁藩翰入賛雍熙昇平二紀實卿所賴比嬰疾疹日謂痊平豈斯沉痼良用憫惻今令驃騎大將軍髙力士就第候省其勉加鍼石為予自愛猶冀无妄期於有瘳是夕薨盧生欠伸而悟見其身方偃於邸舍吕翁坐其傍主人蒸黍未熟觸類如故生蹶然而興曰豈其夣寐也翁謂生曰人生之適亦如是矣生憮然良乆謝曰夫寵辱之道窮達之運得喪之理死生之情盡知之矣此先生所以窒吾欲也敢不受教稽首再拜而去文苑英華巻八百三十三
