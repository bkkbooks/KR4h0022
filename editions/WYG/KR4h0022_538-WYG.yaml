body:
  text: 文苑英華卷五百三十九宋李昉等編畋獵門十七道畋獵三品判一道覆車罝罘判一道金吾不辨夜判一道不饁獸於郊判一道澤虞傷田苖判一道招虞人以弓不進判一道中郎率家僮出畋判一道仲夏百姓弋獵判一道出畋毁耕者之瓶判一道用毒矢而射判一道金吾不供畋矢判一道摶獸判一道捕獸判一道捕鳥䑕獲豹判一道採捕判一道觀魚判一道取魚判一道畋獵三品判丙畋獵三品自稱有功所綂斷為强暴天物且違時禁丙詣三司訴持法不中對大易立象以畋以漁明君順人有典有則用能遵彼蒐狩奉于蒸嘗丙何人斯祗若王命弧矢之利未聞貫於兩笠􅇼豆之宜遽見論於三品斷暴天物㡬於深文張皇已功何逭自汰且因貳而濟刑可小懲欲一以窮禮一作傳云奚獲徒為薄訴豈不多慙覆車罝罘判京兆申鄠杜間有覆車罝罘縣悉焚之百姓訴財失業府責縣以貧人弊政縣訴云此並犯禁之具若不毁除是内人於䧟阱也對惟聖開物以仁興化不麛不卵覃率土而知方以畋以漁在王畿而愈一作逾禁所以中綸式降野掲恒書雖鷹隼之已飛猶罻羅之不入一作入澤且政惟通變豈傷財以害人作為網罟盖僃物而致用况今庶類蕃殖蒐田有時祝遵殷后之辭俗卜文王之囿必也專司牝牡晋臣有誡於虞箴如或不施林逵蜀土何妨於醸具俱焚見及罝罘若在於崑岡弊政攸加縣法誠傷於鄠杜伊府之責允得其中金吾不辨夜判金吾不辨夜草止者不慎左廵使舉劾訴云五月教茇舍自有所由不伏對國有振旅畋且順時將利武人之貞是明司馬之法惟彼茇舍掌夜於軍噐械儼陳防困獸於奔北名號明立與衆人為司南指事既取於隨時應命亦同於影饗金吾不辨舉劾謂何自為警夜之司寜分驅獸之命周亞夫營細栁制敵宜遵李將軍過㶚亭宵行何禁左廵使紏非其罪飜以抵尤草止者職司無他孰為不慎請從夏卿之教無舉秋官之典不饁獸於郊判得大畋所司不饁獸於郊御史詰之甲云將頒禽也對設彼大畋陳其盛禮車徒畢􅍯鐃皷皆作三發三刺無差於進退大獸小獸爰及於公私既而獲耳之校未施馳逆之儀方罷所司莅職舊典攸著何饁祭之云廢乃頒禽而是先宗伯守官實虧於古制主吏問罪雅符於通識以茲見詰理合無辭澤虞傷田苖判乙為虞所司夏苖乙萊田表地或告有闕訴稱恐傷夏苖仰正斷對乙為澤虞掌於原獸司其牝牡職在畋漁逄有司之夏苖而猶秉於周禮至於萊田表地事屬農休驅豕迎猫恐為稼害何得迷夏令之事行冬狩之儀翻罪守官之人奚勸在公之吏或者有告訟則未孚虞人所陳辭皆可據請從審允寜使厚誣招虞人以弓不進判甲畋于郊招虞人以弓不進法司劾辭以守官對林麓藪澤以畋以漁農牧衡虞是糾是禁禮無變俗政在守官甲獨于何不臧厥訓雖弦弧或進足以表㣲而皮冠不懸無聞受一作爰令法司順謏成徳舉以為非君子正直待人韙之無怒可否之理居然易知中郎率家僮出畋判中郎髙牟率家僮出畋晚歸滋水長因醉使酒呵止云違勑出畋牟云今既斷酒豈宜帶酒忿競詣金吾對髙牟早承亭育夙效欵誠背牛加之絶壤奉鷹揚之峻秩屬以葉下黃山草排丹浦歴非熊之舊徑徇逐兎之荒遊既而獲已多乎言指霸陵之路日云暮矣果逄廷一作醉尉之呵類寛饒之發狂焉知去路同季布之飲酒豈辨尊卑既蚌鷸而相持乃齊楚之俱失則獵雖有禁文不繫於蕃官酒乃停沽限未拘於自飲若其因酒入罪豈非釀具招刑以獵為違則是獻豜獲戾彼此俱無本罪論告皆失正途既詣金吾之司湏寘正條之典但告雖不當狀匪搆虗不可從勑反科宜以不應寘罪待知官䕃方定刑名仲夏百姓弋獵判得鄭州刺史㢘範以仲夏月令百姓弋獵觀察使紏其違令云為苖害對網罟之設有自來矣掎角之用其可廢乎苟利人阜俗亦違令何咎㢘範滎叅建隼職列褰惟將布政以頒條故違經而合道當仲夏之月畋以為苖居專城之尊徳惟除害不麛不卵合取則於禮經以畋以漁盖䂓承於易象且獸之暴物人何以堪俾肅肅兎罝不忘於詩義芒芒禹跡克疆我甫田雖黎庶勞四體之勤而􅅵畆取十千之嵗則原田膴膴不逄走險之遊稼穡芃芃豈雜食華之地刺史為政諒在隨時觀察所䋲奚將勸善寘之于理恐未通途出畋毁耕者之瓶判丁畋于渭表毁耕者之瓶詬丁及父為厲一作詈非事對眷彼獵徒情多禽獸之獲語茲農者心惟稼穡之勤鳴鏑彎弧適騁麗龜之妙晨耕夕耒殊異非熊之師坐毁重丘之瓶行取閉門之詬苟敗其噐宜徵陪償之資言詈彼尊有虧耆耋之敬野人不敏於義何誅用毒矢而射判乙用毒矢而射迹人禁之云貴其必獲對大獸小獸各有攸處敦弓潔矢隨利而行爰俾迹人職斯厲禁用捨必由其令左右無乃失宜苟封毒而重傷雖省括而何狩况今物遂蕃茂政和鍾律四靈雜製百瑞同休彼何人斯虧我王化禁之可也多訴奚為金吾不供畋矢判金吾申不供畋矢冬狩有闕對制國之用一作義必嵗之杪量大小而用地審豐耗以視年鳩化為鷹見草木之摇落豺既祭獸設罻羅而以漁然後順時出遊因隙校獵俾虞人以入澤閲車徒而展事昆蟲未蟄無以火田麛卵不傷動必討叛金吾申上田矢不供職司其憂冬狩慮闕然寛則得衆敏則有功合供雖則不供恐闕固應未闕若官曹立限送者違程於理難容請從嚴斷摶獸判山有徒摶殺獸者請賞州之所不與使科州違式不伏對賦受不同勇怯殊迹瞻彼徒摶罕能為之眷乎傷一作攝生吾所不與何者啓足貽訓嘗不愛於遺軀履尾有言翻見矜於扼猛撫事雖殊愛已除橫誠則利人州司執文切同膠柱使科違式所謂合宜捕獸判設穽獲取獸而誤陷人按罪不伏對山有猛獸林木不伐擇肉而食已假喻於秦君在物為患實有同於周處所以㝠氏張弧設其穽獲冀疑蹊在足李陵無憂於垂餌檻穽摇尾張衡絶言於摶翼人之誤陷罪亦何加且啓塞從時古今明凖若鷹隼未擊設者誠則匪彛如鴻鴈已飛陷人豈可有訟兩端斯按一言可蔽捕鳥䑕獲豹判甲捕鳥䑕獲豹以為有異送官求賞所由科罪對網罟結䋲見彼取禽之道雄雌共穴聞於導渭之山甲雅志平生盤於是習利有攸往毎懐馳騁之娛適我願兮仍持採捕之術既尋巒而討谷遂乗幽而歴險罻羅未亘傍掩西嶺之巖霧雨潜栖并獲南山之獸然體君子之變雖符彖象入虞人之羈盖無竒異瞻言賞典或恐難從乃眷刑科寜宜濫罰採捕判甲採捕為業斷溪路之木不殊夜行者過乃推蹶科故為罪訴云暗中不審對為利殊途生人各業或豺已祭獸罻羅方設或獺未祭魚津梁仍禁惟甲情閑採捕志樂畋遊即鹿于林渉﨑嶇之險道將禽伐木橫結屈之荒途所以盡巢穴之羽毛窮棲宿之飛走竟嵗趨末彌年棄本相彼夜行不遑宵處河傾左界捫暗樹以求溪月映前峯度幽溪而失路倚行招譴推蹶貽災斷之者雖則不殊觸之者有同非意不利攸往是妨行邁欲罪故為良難與奪覽薄言之訴援一作採不審之詞法貴在寛庶從非濫觀魚判同州刺史矢漁而觀之御史糾弹辭曰農隙以講事仰處分對爰整車徒用陳蒐狩辨其貴賤習以威儀將七徳而聿脩在三時而無害眷言刺史殊昧禮經在施政以庇人無聞去獸苟徇情而畧地空見觀漁且魯隠如棠僖伯稱諌有窮遊洛虞人獻箴從皂𨽻之賤司誠當失位輕公候之重任實曰曠官理合緘言豈宜文過請從繡衣之紏勿聽彤襜之辭取魚判有人取漁輕車重馬或告非法訴有古義對彼何人斯漁以為事結廬逃境吟澤畔之風烟垂竿振緍盡河邉之嵗月唑嚴陵之磯石芳餌長懸入尚父之蟠溪游鱗或躍始虗徐以在藻亦沉浄以逺蓮臨川之羨不忘入肆之求何逺殊野客之來獻匪曰猶賢類詩人之遊梁方聞起訟或告非法未見其宜採川樵山實庶人之攸利輕車重馬合古義其何傷文苑英華卷五百三十九
