body:
  text: 文苑英華巻八百三十五宋李昉等編諡册文齊明皇帝諡册文一首唐中宗孝和皇帝諡議册文一首唐徳宗皇帝諡册文一首唐文宗皇帝諡册文一首哀册文上陳文皇帝哀册文一首唐髙祖神堯皇帝哀册文一首唐太宗文皇帝哀册文一首唐髙宗天皇大帝哀册文一首諡册文齊明皇帝諡册文謝朓維永泰元年九月朔日哀子嗣皇帝諱仰惟大行皇帝早棄萬邦聖烈方逺式遵一作尊帝世俾鬯鴻猷咸以為無名以化則言繁莫宣其道有求一作來斯應則影響庶同一作圖其功所以永言配命寄心宗極光昭令徳允樹風聲伏惟大行皇帝令信四時齊明日月創光一作保大於登庸通神機一作機神於受命因時以暢籍九萬而輕舉天保既定運四海而髙臨及廼一無此字開物成務重維國綱一作紐風作草化一作偃心一作化往如神左賢右戚内樂外禮輯五材以教民申三驅而在宥用能盡徳殷薦美善斯畢皇矣之業既孚烝哉之道咸備景化方逺厭世在天龜筮告期逺日無改仰則前王俯詢百辟累徳稱睿允極鴻名謹命某甲奉太牢之奠謹上尊諡曰明皇帝廟號髙宗天人允協神其尚饗嗚呼哀哉一作皆藝文類聚唐中宗孝和皇帝諡議册文蘇頲維景雲元年嵗次庚戍十月戊寅朔十三日庚寅攝太尉銀青光禄大夫守户部尚書上柱國宣城郡開國公臣姚珽等上議曰臣聞聖人極天下之賾以象其物宜成天下之文以察其時變加於百姓之謂徳刑於四方之謂風徳也者動於神明風也者由於教化原始見則名合道先知終存義迹因行表其來尚矣伏惟大行應天神龍皇帝纉武之命允文之基肇承於宥宻以至乎緝熙若乃含青雲之符耀赤光之瑞履順而一夷險安貞而再潜躍由是恭于三朝服兹四罪徯予之始祀夏而無改舊物若帝之初遷周而有膺新命䖍匹夫蒸蒸之思愛於文母豫大帝庚庚之占友於王季既而三年諒隂九族敦叙免䘮問道穆乎天子之容退朝宻藏怡若家人之禮功收其成不以微刑濟其寛不以大讜詞所不悼文粹作忤讒說所不入約躬而厚物盡下以推人翺翔乎儒雅之林經啓唐詔令作營於文章之囿不傷麛卵不天卉木體仁也行於蠻貊暨於陪䑓施惠也酌中衢之樽不竭也陳太廟之噐不盈也故能百寳用四靈臻嘉禾神芝日獻于府柔逺格懐荒至名駒鉅象嵗填于牧方採原文粹作厚陵之露華感而通夣遂揚昊壇之煙燎嚴以配尊然後心㳺絶㝠神寄愷樂在雲䑓之上希夷於真諦之門追汾水之陽縹緲乎列仙之舘豈圗變生氛沴凶遘詔令作構霄極歘慿玉以大漸顧遺弓而上僊所以函夏攀援人神哀戚龍攅既啓鳥耘逾詔令作愈慕禮徹三獻北有因山之名法崇二言南有至郊之議謹按諡法慈惠愛親博施備物皆曰孝安人緝衆推賢譲能皆曰和夫孝以愛文粹詔令並作安親和以安人是則憲先王之典謨垂後裔之光烈者盖天之所稱矣請上尊諡曰孝和皇帝廟曰詔令作號中宗謹議文粹作上此篇唐大詔令及文粹並作諡冊文編英華官以其有臣某上議之語又首末頗類諡冊故題目兼云諡議冊文而八百四十巻别有諡議門此殆一時變禮今仍其舊按本紀九月丁卯上諡詔令作十月十三日庚寅疑是奉冊之時唐徳宗文粹有神武二字皇帝諡冊文權徳輿維永貞元年嵗次乙酉十月丙申朔孝孫嗣皇帝臣某伏惟大行皇帝徳合天地作人父母纂承光明建用皇極昔在寳應制天下賦輿戚藩以大自魯流集本文粹唐大詔令並作䟽雍師律既貞㑹陜收洛克殫威命廓開王塗是登上嗣乃宅丕后服藝祖神宗之大烈有乾乾翼翼之至敬敷佑廸哲尊嚴懿恭燭明四極發育萬物濯沐乎仁澤澄清乎理本巍巍乎建中風聲與貞觀同符洎時有祲沴變生京轂省方履薄諸本作展義𢎞隂隲之功整旅致誅申震燿之令鴟誼文粹作氛祲滅息侯王軌道丕冒持載鏡清砥平然後明禋毖祀萬靈以接翕受敷施九徳咸事含𢎞亭毒以致其和博采虚受以通其志政刑有箴宸扆有銘煥乎文明之化成也因時創節象卦設樂薰然中和之被物也納嘉言於近侍輟已行之詔疾讒口於宵人宥過誤之罪去徽號而約已正廟祧而文粹詔令並作以尊祖九譯通道萬方來庭賨旅焯乎勲籍夷歌陳於樂府霜露所墜車書大同順氣旁達天休滋至慶霄詔令作瑞雲輪囷徳水清澈三辰秉陽以宣耀百嘉麗地而交感飛走呈祥肖翹遂性在宥天下二十有七年夫文思光被陶唐之盛也憯怛忠利虞帝之教也亹亹穆穆周文之業也聰明神武漢祖之烈也窮詔令作包古先之大律極帝者之上儀方將扈升介文粹作崇邱待詔令作侍檢玉諜集作牒奄遺末文粹作天命永棄多文粹作萬方億兆嗷嗷哀號靡訴顧惟冲昧懼忝孫謀君父有命付兹神噐䖍恭貽訓感慕滋深今因山既建同軌畢至一二元老宗工碩生考稱天之禮稽節恵之法式遵古義敢薦大名謹遣攝太尉門下侍郎平章事杜黄裳謹奉冊上尊諡曰神武孝文皇帝廟曰徳宗伏惟聖靈昭格膺是典禮幽賛丕祉流于無窮嗚呼哀哉唐文宗皇帝諡冊文李珏維開成五年嵗次庚申七月乙亥朔十一日乙酉哀弟嗣皇帝臣伏惟大行皇帝徳升上𤣥功定内難百辟勸進萬姓一作情樂推洎順人撫運嗣統立極凝旒建大中之道執契𢎞無為之化聰明天縱孝敬日新翼翼承九廟之祭烝烝奉三宫之養以文思光赤縣以武徳一作烈澄滄海慈儉厚下端莊肅物達聰無不察黈纊若不知成湯之六事罔􅄽大禹之九功咸序學無常師惟格王是式仁必由已以蒼生為心修雅樂而簫韶成音戒逸逰而靈囿望幸遏外夷之教覊縻殆絶舉中古之典汪洋勃興宫禁無私恩嬪嬙無侈服每宰臣伏奏卿士宴見論道何啻於日旰恤刑已至於嵗減大闢諌路深排倖門危言激訐惟理是聽匪唯納之而又賞之宻戚貴寵惟法是訓匪唯戒之而又繩之禎符秘瑞王者之所寳郡國承詔寢而不揚鴻名徽號列聖之所重臣寮抗䟽約而不受興起儒術修明祀事刻經誥於琬琰奠宗廟之琮璜鷄鳴而起孜孜於衆善日入而息矻矻於群書敦叙九族厚戚藩之恩協和萬邦惇一作存戎狄之信至公不私於天性體道必從乎人欲應變懸觧知機如神日者數逢俶擾星有謫見克已修徳側身勵政和人心以保乂謹天戒而來祥復貞觀之故事編開元之政要旌别淑慝澄清品流一物失所必形於睟容百姓未康每勞於聖慮聴政餘力㳺藝縁情探二南之風雅窮一作講六義之教化汾水著韶一作遺韻栢梁變體腴雋人口馨香國風南山崇崇京國之望不列祀典綿千百年舉神授職發自精懇興雲致雨響應䖍祈至於出宫人放鷙鳥太官節重味之膳外府減任土之貢傾倉賑乏平糴恤餓蟲螟不為災水潦不成一作為沴日月臨照天地含𢎞肖翹蠢蠕樂生遂性稽帝王之能事鄙封禪之虚美超邁三五度越聖賢繇是四夷八蠻罔不庭九州六合罔不順在宥天下十有五年於戱身居九重心遍萬㝢日用憂一作優濟時臻治平形悴神勞至于大漸啓金縢而無驗慿玉几而有命顧屬冲昧丕承寳圖祗奉神噐懼不克荷今因山戒期復土備禮痛深手足哀結精靈呼天擗摽觸目增感夫諡者行之迹號者功之表採鴻生鉅儒之議從公卿庶尹之請考彼古道易兹大名對越昊一作旻穹式揚徽烈謹遣太尉中書侍郎同中書門下平章事李珏謹奉冊上尊諡曰元聖昭獻孝皇帝廟號文宗伏惟聖靈昭格膺受茂典隂隲宗社介福無窮嗚呼哀哉哀冊文上陳文皇帝哀冊文徐陵維太康元年太嵗丙戌四月丁未朔二十七日癸酉大行皇帝崩于有覺殿殯于太極之西階粤六月丙寅將遷於永寜陵禮也宫一作容車晩駕幄殿晨張旌銘一作惟具列綍翿成行哀子嗣皇帝諱擗蜃輅於丹階一作陛攀龍帷於紫庭趨過窮於屏闕一作闈拜慟感於明靈東京飛其瑞露北陸霣其祥星乃詔雲䑓之史稽採咸池之曲叶大雅於鳴金同藏書於羣玉其辭曰若水傳帝薰風御民重光所集世載于陳赫矣髙祖愍一作悠哉上旻蟬聨寳霄一作胄暉煥郊禋我皇誕聖應一作膺此家慶道主衢罇神凝懸鏡洛書天表河紀靈命納揆馳芳賔門流詠稽隂克伐震野勤王毫道增搆幽風㑹昌言瞻少昊實狀一作仗髙陽効駕轇轕一作駕彼軫轕是清宫未央歡覃兆庶徳洎遐荒穆齊髙寢上膳長樂肅肅承顔哀哀薦酌悼園恭儉章陵謙約大寳崇明無間一作聞改作纂武升厯遺憂一作愛實繁三湘九派沴氣雲昏力折天柱才傾地門丹一作甘泉夜照細栁朝屯谷魅山鬼横流塞源赫赫英謩﨣﨣雄斷遍行天討無遺神筭欝掃江淮長驅巴漢九夷百越雷隨風渙北俘一作領昆邪西戡伊靬荷負皇極劬勞庶幾勤民聼政昃食宵衣服貴綈皁風移閫闈唐山罷奏濮水韜徽訪採狂狷搜敭仄微世感中孚民惟大畜外户無閉髙垣奚築降情儒雅凝懐庠塾御廡為歡臨雍彌肅禮兼三代樂備九成天資武徳地照文明墨屨一作履斯在幪巾自清連珠合璧曜爽流精獸舞時務一作豫禽歌頌平帝載維逺王靈維大候雨占風荒中海外憬彼鞮譯咸承冠帯是曰君臨斯為交泰白環已貢一作𤣥珪克貞一作禎東河佇揖北狄思征鉞斧將戒􅋛珩未鳴星淫去楚日沴悲荆億兆何釁穹旻遽傾嗚呼哀哉大禹胼胝重華腒腊仰惟勞務同斯違懌發夣無徴昭祈奚益聼茂陵之鐘皷抱喬陽之劍舃雖一作記髣髴於神儀終纒綿以一作於號擗嗚呼哀哉三占已一作以吉四海星一作同奔列贈一作賵天宇崩號帝閽千門啓於閶闔萬乗警於靈輼槐風悲於輦道松雨思於郊原鑾斾動而虚悲宿衛静而空尊嗚呼哀哉卑陌平夷流山蟠固紀無遷市唐有通樹經白社之修途廻青門之廣路思沛邑以東臨懐周京以西顧嗚呼哀哉機神不測性道難稱充窮靡寄孺慕奚慿唯封云亭之與禪肅遺玉牒之與金繩揚英聲而永乆共日月而俱升嗚呼哀哉一作皆藝文類聚唐髙祖神堯皇帝哀冊文虞世南維貞觀九年嵗次癸未五月乙未朔六日庚子大行太上皇崩于大安宫殯于前殿之西階粤十月甲子朔二十七日庚寅將遷座于獻陵禮也九天落構七曜沉暉引鷺翿於兩闕駕龍轜文粹大詔令並作輴於六飛哀子嗣皇帝諱擗踴崩心攀號泣血悲慕望其如在痛音顔之已絶去昭景而不晋即幽途而永訣孝以追逺哀惟慎終爰詔史冊叙徳宣風其詞曰𤣥覽載籍逖聼皇王立徳可乆應運期二本作斯昌天基崇峻帝系悠長虹耀二本作輝降祉真氣呈祥葱珩朱紱熊軾龍章文粹作常契叶禎符誕生叡徳文粹作聖彤雲晝聚黄星夕映舒巻潜躍幾深道性地載天臨日暉川鏡厯試藩岳風移俗正火徳云謝羣龍戰野蚩尤躍文粹作曜旗王良策馬㧞山殪文粹作曀日滔天泯夏蕩析黎元阽危宗社提劍創業杖鉞專征風驅雲動海運天行伐謀上畧制勝神兵尊王踐土復帝夷庚軄惟上相任隆羣辟六階已平四門咸闢殊物顯命彛章典冊錫重介珪禮優乗石煙雲文粹作霞改色鏞筦變音觀圖受命負扆君臨仁霑動植化感飛沉殷輅周冕禹迹堯心削觚返樸抵璧蔵金商俗未改遺氛阻亂沙塞䖍劉伊源文粹作􅈆叛換應變雷動乗機電斷十角雲消三川氷泮漸以文教致諸王道制禮和樂尊儒養老翠鳳栖桐二本作梧丹魚在藻水浮𤣥貝階榮朱草威加海外澤被區中要荒合軌鞮譯文粹作羯遐通没羽沉浪飛輪駕風眷言釋負有懐髙謝倐爾櫟陽杳同姑射趨詩禮以承天禀義方以成化聿應文粹作膺景福方期大文粹作永年玉几奄及金縢遂騫文粹作愆絶五日之晨省遽千齡而上仙攀帷扆以孺慕抱劍舄以纒綿嗚呼哀哉䖍奉顧託式遵遺志捐珠玉而不蔵即陶甄以成噐貽儉徳以為謩垂風聲於後嗣嗚呼哀哉永去天邑言遵紀市文粹作地肺背沃野於文粹作之神臯越通川於渭涘文粹作之清渭懐岐山之前跡睠新豐之舊里笳哀噎以留思旐聨翩文粹作翻而顧指悲風急而古文粹作拱木吟平野晦而愁雲文粹作寒煙起嗚呼哀哉惟綴衣之如昨忽馳光之不文粹作莫駐亟時逰文粹作逝而節改俄渉新而履故野蒼蒼以日衰嵗凛凛而行暮感物悲於氣序衘哀踐於霜露泣逝水之東流文粹作川水之逝波動喬文粹作商山之風樹蹐厚地而無感仰髙天而何訴嗚呼哀哉曰聖與仁誰前誰後炎暑無金石之固勲華異松喬之夀孰厯世而長存惟令名之不朽矧𤣥功與至徳冠列辟而為首俾軼五而登三與造化而長乆文粹作天長而地乆唐太宗文皇帝哀冊文禇遂良維貞觀二十三年嵗次已酉五月甲辰朔二十六日已已大行皇帝崩于翠微宫之含風殿旋殯于太極殿之西階粤八月庚寅將遷座于昭陵禮也鳳紀一作管凝秋龍帷將曙溢化同軫綿區縞素哀子嗣皇帝諱覽風樹而増感攀銅池而拊膺逼宗祧之是寄傷往駕之無慿奠樽盈而悲序促靈景翳而愁雲興去劍滋逺清徽方閟爰詔司存傳芳瓊宇其詞曰三微固祉五耀垂文光昭司牧對越唐勛族著𤣥牝家傳縉雲髙祖配文粹作配于天一人有慶大行神武維幾作聖良畫文粹並大詔令作書自得髙文成性夙表餘雄先懐友敬二本作反正蒼兕爰發朱旗首令寰瀛昏墊闗洛荒蕪妖傾地軸盗弄乾樞戎衣光啓覇政宏謩天兵電照文粹作掃月陣風驅蚩尤逓詔令作遽剪窫窳成二本作咸誅閏位不䖍餘分興戾先收秦組次焚商袂轉圜上畧容光下濟從詔令作徙疑邑垂仁賔門灑恵修風順軌凝圖奉睿青戾同規𤣥珠叶契發揮三五聲明遐裔泛野休兵靈臺偃革升巖蔵銑遵河奉壁學肄詔令作肆徐輪偃園散帛就日攸宜如天在斯刑哀動植化美塤箎樂華曾舉禮葉旁垂沙塲罄剪斗極咸羈狼山入囿潮海一本作渚歸池東旌若木西斾條支龍鄉委質詔令作賮烏弋來儀大矣乗時悠哉利見文龜浮沼應龍在淀潏露飛甘卿雲呈絢松荑望幸瑶華方薦仙丹劍術星飛告變凝沴氣於千二本作升年掩璿暉於離殿嗚呼哀哉𢎞璧陳階鈞天罷佾二本作商管初秋飛絃罷佾夣齡遐想詔令作驚川悠緬宫車晏出大隧弗營元龜獻吉展軨効駕羲和二本作端圭司日廹靈心於將餞痛皇情其如失凝清秋文粹作凝秋林詔令作拂凝霜於廣陌詔令作路遡悲風於長樹經栢梁而徐轉邁蘭池而從蹕聳輕斾之逶迤動邊笳之蕭瑟嗚呼哀哉周營甫竁漢啓泉闈糓林摇落喬巖變衰平原凄兮白日逺深渚澹兮秋雲飛覽銅爵而興慕傷鼎湖之不歸嗚呼哀哉崤陵𤣥壌隅二本作嵎山窮路肅二本作虚衞翻英輕池文粹作馳委素羲庭易晩松隂難曙萬方悲而雨泣三靈慘而雲沍嗟厚徳之長違仰髙天而攀慕嗚呼哀哉崇基永煥置業方昭遺風餘烈天長地遥想神襟而騰茂縱史筆而揚翹籠嘉聲於日月終有裕於唐堯嗚呼哀哉唐髙宗天皇大帝哀冊文天后武氏維𢎞道元年嵗次癸未十二月甲寅朔四日丁已大行天皇崩于洛陽宫之貞觀殿殯于乾元殿之西階粤以文明元年五月壬午朔十五日丙申發自瀍洛旋于鎬京以其年八月庚辰朔十一日庚寅將遷座于乾陵禮也曉霧收碧晨霞泛丹庭分羽衛殯啓龍攅哀子嗣皇帝諱攀訴容車崩號扆殿悲蜃輅之空嚴感鳳樽之虚薦擗摽縻潰充窮殞裂飈思攀一作舉而還迷羸喘興而復絶俯惟㷀懇荼毒交侵瞻白雲而茹泣望蒼野而摧心愴逰冠之日逺哀墜劍之年深淚有變於湘竹恨方纒於糓林念兹孤㓜哽咽荒襟腸與肝而共斷憂與痛而相尋顧慕丹檻廻環紫掖撫眇嗣而傷今想宸顔而慟昔寄柔情於簡素播天聲於金石其詞曰月瑶誕慶靈一作雲丘降祥仙源漢逺聖緒天長繞樞飛電麗室騰光烏庭開象龍徳含章六藝生知四聦神授晦迹登序韜光齒胄綴玉詞條緝瓊文囿發揮緑錯牢籠紫宙鑑符敦敏量本䟽通賔門表譽納麓彰功始潜朱邸或躍青宫夏俞欽徳周誦傾風粤自銅闈䖍膺寳命恵霑動植信洎翔泳淳化有敷至仁無競教溢璇㝢道光金鏡五龍開運六羽昇平西雲應吕南風散絃晷符羲日䕃廣堯天賁園旌士焚林藎賢濬明上格財成下濟問寢承親在原申悌戒盈茅宇蠲奢土砌衢室禋宗雲門饗帝以聖承聖資明嗣明禮崇殷夏樂盛咸英時和俗泰天平地成永同文軌長垂頌聲徳動乾符威清地紀澄氛襚一作和穴掃沴濛汜推轂六師坐知千里亭毒寰縣瑩鏡圖史霜㦸林聳月旗雲亘疊皷蕭闗鳴笳松嶝追凉水殿避暑山楹霞翻浪井樹響層一作曽城務簡通三神凝得一𤣥池肆賞青丘佇逸訪道順風養真乗日拜牧襄野尊師石室寳獻河宗賮歸王㑹浮毳交影飛輪繫軑雲封薦欵日觀申䖍告成七廟歸功九天無事無為爰遊爰豫滑域延想汾川滌慮儀鳳巢阿飛麟在馭火林歸朔燭鄉移曙所冀𤣥夀齊年紫皇祲興旅舘災纒未央遽脫屣於宸極奄乗雲於帝鄉亘天維而落構匝日㝢而沉光殉百身而靡贖積萬苦而徒傷魂銷志殞裂骨抽腸受玉几之遺顧託寳業於窮荒嗣君孝切諒闇居䘮荷一作集大務於殘喘積衆憂於未亡所以割深哀而克勵力迷衿而自强嗚呼哀哉浹埏遏宻綿區縞素恨鈞天之不歸瞻鼎湖以凝慕嗚呼哀哉攀聖滋逺戀徳滋深訴昊穹而雨泗擗厚載而崩心泣人靈而灑悲霰晦宇宙而起愁隂嗚呼哀哉緹琯移序朱明應律蛩竁方營龜謀獻吉背九洛而移馭傃八川而從蹕列璧羽之逶迤動鍾絻之蕭瑟顧園邑之蒼翠望巖􅎬之紆欝喬陽之舃不追茂陵之書方出嗚呼哀哉跡圖懸圃神降長流去重陽之奕奕襲大夜之悠悠同覇塋之薄窆契紀㕓而莫脩思闗山於夕月悲隴樹於新秋嗚呼哀哉想軒駕之攀龍思予一作杼山之戀鳳矧承眷於先房誓牽毁而哀送豈謂務切至綦一作丕基事違深倥仍狥公而抑已遂奪情以從衆悲千罔極之悲痛萬終天之痛嗚呼哀哉恭惟聖烈實鏤微𠂻敬因彤管載撰𤣥功業彌遥而道彌著時益逺而聲益隆播二儀而不極横四海而焉窮嗚呼哀哉一作皆唐大詔令文苑英華巻八百三十五
