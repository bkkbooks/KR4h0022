body:
  text: 文苑英華卷五百八十一宋李昉等編辭官二為楊相求退表一首河東副元帥馬司徒請罷節度表二首卧疾辭官表一首代盧相公謝賜方藥并陳乞表五首代賈相公乞退表一首又代賈相公陳乞表六首代魏慱田僕射辭官表一首代韓僕射辭官表二首為鄭滑李僕射辭官表一首代裴相公辭官表一首為楊相求退表德宗于邵建中二年臣炎言比者盛夏無雨農人觖望遂軫聖慮迨乎孟秋乃下明詔並表羣祀神人協和膏澤旋降嘉穀無害粢盛可期此皆陛下明聖慈仁上應臣所以慙冒重位容身無地載積憂懼豈遑夙夜歴觀自昔帝王以理天下者未有不疇咨訏謨以熙帝載三五以降則有六相十六族共陳翼亮之功其在夏殷不易斯典逮周分六官秦置左右西漢因之以丞相東漢更名以三公魏晉雖有損益亦無獨任之道陛下拔臣江澤之外致臣密勿之地縱欲思報鴻造贊襄盛業其如智識薄劣力所不任常恐負乘之纇無以塞責臣又聞之天有三台鼎有三足疑丞所以備四輔股肱所以象四體創明堂構大厦非一木之力焉况臣駑愚而久備位今舞干以化戎狄脩好網羅􅄪張兆人是賴朝多賢達野無遺逸一能勝臣者則指顧皆是豈以萬務之重而獨委於凢流乎縱臣一朝敗累分從隕越則既墜之跡死将安謝伏乞俯廻天鑒退臣散地舉用伊臯使不仁者遠臣雖萬死誓無所恨不勝待罪兢惶之至河東副元帥馬司徒請罷節度表德宗崔元翰興元元年臣燧言臣聞享其名者必有其實受其賞者必有其功臣以往年奉詔東征田悅尋又伏奉恩命加臣魏博節度使方将收其土地撫彼黎人致天誅以伸威布王澤而施恵不得不居其任何事而辭其後摧敗雖多剪滅未即類表作則未其賊偷延數刻獨保孤城田悅以潰亂殞身田緒以窘逼歸欵聖恩復加𢎞貸悉復舊封以臣有擒制之所係纏綏懷之所降附人徒之衆将吏之多特勑别置保寧軍節度仍以臣兼充其使臣又方以勞來為事實且慰安其心尋獨西討河中内清關輔事殷任重勞力焦神正在憂虞未遑辭讓今臣舉軍還鎭解甲息師况當歉歲未康疲人類表作重困苦復虚兼二使别創兩軍職任既繁祿廪愈一作逾倍且臣非有收郡邑壁壘之實不宜復加名位非有保城池封畧之才不宜别開軍府而乃妄為繁費謬積恩榮在私心懷苟得之羞於國典為虚授之失伏乞罷保寜節度停臣此使以保寧軍兵馬𨽻屬河東節度則聖朝有省約之利愚臣減盈滿之憂且臣尊爵大官窮榮極寵何待加兹一職乃為被以鴻私今保寧河東兵馬久同征行以相和協有同一體不必異名頗亦便安伏希裁擇無任悃欵之至第二表臣某言為臣之道臣實聞之有難則受命而不敢辭事君無苟免之責已安則避位而不敢處量己無昧進之譏况福過忌於滿盈任重憂於顛覆臣之所懼孰以類表作不為宜臣少無材能進非經術因逢屯難遂効驅馳陛下毎録微功累加高秩皆緣恩澤備盡寵光名列台司位兼宰輔總戎巨鎭類表作防居守舊都比又以東討魏州招降頗衆伏奉恩命别以為保寧軍節度又以臣兼充其使重以四征羣寇總帥諸軍加臣河東寧保奉誠等軍節度并管内諸道兵馬副元帥臣亦欲懷來欵附統一携離以此因循不即辭避今者寇戎剪掃區宇混同方将撫綏無事征伐則止不宜復居副元帥之任保寜軍将士與河東将士久同居處並以和寧不必别為節度伏請停此二使許臣但以河東節度使鎭守北藩猶有尊官又兼寵祿以為厚甚不可復加雖尚偷榮近於量力豈将飾讓於外實惟陳請於中伏乞聖慈俯垂照鑒臣無任懇欵屏營之至卧疾辭官表德宗齊映貞元二年臣某言臣生何僥倖遇聖屬千年之運命何舛薄染患逾十旬之程法既限於朝章事竟塵於天聽惶懼戰灼不知所圖臣某中謝臣自三月天澤傍流御醫親降膏肓既辨沉痼日輕但於寢疾多時羸頓猶甚支體骨立氣力惙然審慮旬日之間未任朝謁之禮更以法資畫一令在必行豈以微臣虧於大憲况中書近密樞務重切不可一日而闕臣以累月在假頗為曠闕罪實難逃更乞淹延心何自處故臣之陳奏非敢竊退讓之名臣之懇誠非為追止足之誡直以當其無病猶不逮人既以違文豈堪玷法伏乞𢎞廣運之道崇大中之規是歸執象之言以副垂衣之理豈微臣幸甚實彛章幸甚無任誠懇之至代盧相公謝賜方藥并陳乞表徳宗權徳輿見集本臣邁言臣自染偏風今已彌月将息未減渥澤轉深伏蒙特令供奉僧智昌醫療每日令中使存問及賜柳湯煎驢頭方仍便令服餌者臣以庸賤昧於攝理久兹竊位常懼害盈隂陽之和無補時化風毒生疾上煩聖慈靈方御醫稠疊備至雖受恩服藥誠合漸瘳而福過災生慮難自保况中貴将命寵臨私門犬馬之微日塵黈纊或有加減自合上聞非常之恩伏乞停罷且台司要重庶政泉源以臣平居素積官謗今右邊手足動用不隨自滯枕席己淹弦晦伏乞以時免職使得養疾家居博求上才用塞人望則公朝無覆餗之責陋質荷生成之仁今攝衣拜章力且未足口占代署貴逹愚衷無任感恩廹切之至謹奉表陳請以聞貞元十二年十月一日第二表臣某言臣以疾病所嬰在假既久自審不逮遂有上陳詔㫖優荅懇誠未允屏營慚懼不知所安臣聞為官擇人各司其局條貫責實集作條責實効共致理平凡在庶僚猶不可曠况宰臣之任鼎足承君調和隂陽左右敎化能否之下利害繫焉苟有所壅其傷必大以臣虚薄備位四年奉勵精之勤但樂昌運當具瞻之地莫負羣心書曰百僚師師百工維時言得其人也語曰陳力就列不能者止言審其分也况沉頓逾月冠帶未任風毒所侵惟望速差彼其之刺倍切於今以被病之微臣尸台司之厚祿自知不可如公議何伏枕披誠再黷宸扆冀廻天鑒俯遂愚衷所謂曲成豈惟平施無任悃欵廹切之至謹奉表陳請以聞貞元十二年十月八日第三表臣某言臣逼於疾瘵累有陳奏再奉詔㫖私願未從感恩則深量力難濟况偏風狀候與諸疾不同雖時似少減終慮成沉痼中樞務重不可闕人自臣在假已四十餘日曠廢斯甚兢惶益深一夫不獲一吏不職則繫聖慮以之憂勞今臣手足未平心緒未復卧受豐祿胡顏自安伏惟陛下順天理物躬勤庶政事無細大咸遂其宜豈可獨私微臣久玷時化是以直疏誠懇不敢苟餙煩詞冒黷宸嚴期於照鑒無任惶怖震越之至謹奉表陳請以聞貞元十二年十月十六日第四表臣某言臣素以庸虛又嬰疾病半年在假未任出入四表上陳備盡誠懇過蒙渥澤特賜優容聖慈則深私願猶阻俯仰袵席兢惶靡寧臣本謂至春和得漸平復今方藥遍用根本未除雖簮帶假人得以被體而趨步無力難於拜恩輔臣之任百辟是仰遵守法度誠所宜先豈有踰歲家居尚塵鼎飪况所受厚祿出於疲人竊位公卿尚知不可沉疴私室何以自安易象害盈實在今日伏惟陛下𢎞覆萬物曲成不遺凢在懷生各得其所以臣沉痗久曠官司前後臣聞披瀝肝膽期切之至謹奉表陳請以聞貞元十二年十月二十五日第五表臣某言臣待罪非據歳時已深寵秩逾涯災患自至一從移病忽及周月五獻章表未遂血誠沉痼之身滯於牀枕職守之効絶於官曹虚費祿廪不安夙夜遂於本年五月二十八日進狀乞停俸錢自後不敢更有請受竊冀素飡之責少息輿議再懇之至上廻聖心邇來又經九十餘日承命未下憂惶無措盖聞祿以詔功又以養賢以臣之愚而無功績久此尸曠俯仰内訟逼於公私臣之情理實為難處臣之言詞不能自逹使得終獲退免曲遂微誠亭育深恩實在於此無任猥逼懇欵之至謹奉表陳乞以聞貞元十三年九月某日代賈相公乞退表臣耽言臣以庸愚謬尸寵禄位居師長職重台司徒叨渥恩無補時化跼蹐荏苒六年于兹去秋以來多病相繼毎自策勉以奉休明而筋骸内衰官謗外積近染痢疾綿歴旬時進退之狀不恒寢食之理皆耗伏寢循省無所克堪凡在常情皆願貴仕况臣累蒙任使實越等夷從容廟集作朝堂沐浴天澤恩私歲久誠毎切於匪躬疲薾日侵事有逼於量力伏惟陛下覆育臨照曲成不遺俯矜愚衷移授散秩則樞軸不曠輪轅適宜拳拳之誠所望斯足無任懇欵惶懼之至謹奉表陳請以聞貞元十四年七月二十四日又代賈相公陳乞表順宗臣耽言伏奉今日制除臣檢校司空兼左僕射依前同中書門下平章事祗荷成命捧戴恩私心䰟震驚慙怖失次臣以庸薄無他才能先朝過聽謬賜驅策叨居鼎飪十有三年猥承雨露之恩終闕涓埃之効累經陳乞未允懇誠復以餘年再承休運集作命自陛下紹集作纂膺寶厯澤被羣生亭育所加飛沉遂性而臣齒髪頽暮疾恙嬰侵筋體集作骸日衰心力皆耗况宰相之職用調隂陽司空之官實平水土從古授受重難其人以臣平居猶知不可今中既眩耄外亦支離寢興不安言語失次豈可苟貪貴任上玷清時省躬則然况在公議古者君有致政之惠臣感得謝之恩鐘鳴漏盡前哲所誡年衰疾劇在臣為甚逼於情理敢黷天威慺慺血誠期在鑒聽無任懇欵恐懼之至謹奉表陳讓以聞臣耽誠惶誠恐頓首頓首謹言貞元二十一年三月二十一日第二表臣耽言臣以疾病所逼氣力不任輒露懇誠上祈退免聖慈備至私願未從詔㫖便蕃慰勉纎悉自宜策勵以奉休明螻蟻之誠敢忘夙夜犬馬之疾日益纒綿視聽昏煩舉措乖誤心不記事口不逮心神理害盈正謂今日昔韋賢致仕著在漢庭韓厥請老書於魯史豈可以兹沉廢苟汙班榮逼於公私非敢撝挹自聖明馭宇動植覃恩豈於庸愚獨阻誠志乞廻天鑒俯遂殘生伏紙上陳感涕嗚咽無任惶懼懇切之至謹再奉表陳乞以聞臣耽誠惶誠恐頓首頓首謹言貞元二十一年三月二十七日第三表臣耽言臣殘年沉瘵漸不支持再表上陳未蒙允許顧兹朽質徒感鴻私而枕席纒綿形神消耗上台之任歲月積深大病之期晦明難保自叨升論道扶疾拜恩邇來狀候日以羸瘠集作頓災因福過足驗於今伏乞賜臣骸骨收臣印綬期於必遂不敢煩辭無任量力懇迫之至謹奉表陳乞以聞貞元二十一年五月二十日第四表臣耽言臣聞生人所欲豈過富貴仕進之榮無踰公相臣受祿過厚叨恩且深疾瘵所侵日月以甚表章三上宸睠未廻薾然私室溘盡是慮臣頃歲齒及懸車疾經百日輙援禮令乞遂休閒先聖優容未蒙允許集作矜允今則桑榆轉逼沉頓寖深比於往年逺不相及前後陳請備竭肺肝特希聖慈俯鑒愚懇羸骸假息所望退身瀝血披誠伏待明命無任屏營懇逼之至謹奉表陳乞以聞貞元二十一年七月二十二日第五表臣某言臣以庸愚累叨爵命大行皇帝㧞擢非次列於宰輔歲時寖深塵露無補太上皇踐祚聽政寵登三公而臣寢疾所嬰已在牀枕沉疴日劇氣力漸微自春涉秋四表陳乞伏遇陛下繼明纂統臨照萬方澄清化源朝野相慶但臣百疾所凑四支不任豈使将盡之人猶處具瞻之地私誠所逼上黷宸嚴既非矯一作飾讓期在聽納無任懇欵逼切之至謹奉表陳乞以聞永貞元年八月八日第六表臣某言臣犬馬之疾福過災生前日以來轉就危困自量氣力的不支持自陛下嗣纂睿圖臣已寢疾一作瘵綿亟竟不得一趨陛下謁龍顏幽壤之中以此為恨臣備位宰相歲時最深永歸泉下無補明代伏惟陛下為萬姓自愛則幽明蒙福無任感恩哀戀之至謹奉遺表以聞永貞元年十月十一日代魏博田僕射辭官表臣某言臣聞中原息戰子房得以乞身東吳既平范蠡終能行志二臣皆因時効用遇主成功進咸展於盡忠退各安於秩考所以立名萬古保慶一時愚臣夙心私有所慕况蒲桞先邁駑蹇易疲審已無堪量力知止吐誠上達罄冩中懷仰覬天慈俯照愚悃中謝臣雖長於戎旅㓜業詩書毎凛効忠之言早勵為臣之節當河朔承襲之日在軍幕危疑之間毎動險中幾隣於死常以捐軀報國率彼頑人受命指蹤掃清餘孽用攄宿憤一作志以荅明時一覩天庭百生願足但懷感激豈意遭逢伏遇陛下神武應期聖謀獨斷臣得進陳忠欵見委赤心唯将擐甲啓行執殳畢力上慿睿筭凶寇自夷今日獲覲天顏躬承睿渥平生之願既遂休老之志宜申豈可更貪寵光久冐榮祿使貽官謗取笑将來臣自總魏師初率歸化當時結念便誓此心祈於一作終始素誠非是飾讓匹夫之志猶不可奪臣昨自離本鎭亦以此意明言陳諭聖恩勉其忠義将士等皆懐皇化盡激丹誠則一軍幸安且無足慮在於今日臣何所任豈可久職妨賢待譏竊位此時不退何日宜退臣犬馬之齒未云甚髙筋力之間己知不健一作逮加以少罹憂患􅁂髮早衰久經行陳心力已耗若許其優養或冀保餘年儻抑其愚性則生理必阻且身兼将相人臣之位已極滿朝子弟人臣之家至盛於國何補獨荷殊私所以憂餘惡盈樂在知足擊壤自歡於聖日懸車豈待於禮年是用瀝膽披肝冒昧陳乞伏惟皇帝陛下德邁羲軒恩深覆載蕩除餘祲理致太和動植含靈無不遂性方将旁求英俊共洽昇平如臣以鷹犬之微獲申搏噬累塵髙位常積厚顔福過災生自當勇退且富貴榮樂是人所欲苟心所有尚意趣或違彊其不能適足增苦儻蒙恩造獲遂優閒許歸衡茅取樂餘齒是天地曲成之徳君父莫大之恩五湖廻舟生無慙於越相都門揮手死不愧於漢臣言披血誠情切中素無任悃欵懇逼之至代韓僕射辭官表張述臣某言臣以夙疾多時受任非淺常有負􅌤冐據官榮将貽折足之尤以速素飡之謗昨者輙陳章疏冀蒙矜免不意血誠徒懇聖慮未廻懐荷寵私有如氷炭臣聞力小任重久則致敗功微祿厚過則生災故經垂知足之言易著負乘之誡皆明力不勝任才不當官臣雖孱微嘗所執守且臣受鉞閫外二十一年弟執金吾男居藩服窮極寵幸萃臣一門毎夙夜憂惶常恐身先犬馬不獲䇿勵駑蹇上報鴻恩今臣實懼不逮是以告訴况臣心力未减猶可支持筋骸已傷或難勉彊伏望聖慈哀察賜徇一作鑒懇誠恐其再有陳聞許以病免丹欵儻遂没齒為榮無任懇逼之至第二表臣某言伏以累獻表章微誠務達屢陳聖聽罪犯已多臣聞固陋寒賤人之所惡富貴榮達人之所欲自臣忝謬即宜推陳豈可蓄縮偷安敓􅔯一作依違苟得若禮一作命字乖當植得者不勸一作榮故禮以旌徳賞以勸勞諒或苟差何以沮勸臣自叨幸高位二十一年手足病風十有餘歲毎恨國恩未答沉瘵遂嬰命竊極於公侯身實隣於廢棄幸逢明詔獲覩闕庭天顔咫尺之間稠疊慈諭彤庭拜舞之際宣一作曲賜人扶焉有臣對君上獲此恩禮陳于明庭雖丞相乘車入朝鄼侯劒履上殿臣忝一作方臣僥倖竊被殊榮未知何功寵光及此史冊莫載今古全無皆陛下降稽天之仁垂極地之徳特開貸納俯賜含容君父之恩不可稱量臣毎退朝之後感極涕流唯思訓子導孫披誠瀝懇率令致命不止終身盖由感深遂切肌骨但臣去就如此保固官榮尚稽覆載之私更安顯重之位則何以標明賞典準約朝綱臣是以陳露鄙誠罄竭於此昨者再披悃欵冐死奏聞蒙賜批諭特加奨飭錄其微功未賜允從臣今輙敢復獻表章觸法陳乞特仰恩私養疾衡門則陛下無虚授之名微臣免曠官之責不奪之志告訴豈懼於再三觖望之誠允許庶幾於萬一陛下倘恕塵黷俯察區區容其病免以徇誠請一作情雖死之日猶生之年臣無任為鄭滑李僕射辭官表臣某言臣聞虞舜之朝九官皆讓西漢之盛二疏云去盖上以淳風盪俗下以廉耻激節故也况寵辱之際不驚則愚進退之間不知則殆中謝伏惟皇帝陛下徳超邃古功格上𤣥誕敷文敎丕變頽靡天地日月載惟貞明動植翔泳罔不咸若臣某席以枝䕃階緣休運弱齡入仕四紀于兹三省微躬一何厚幸是以毎涖一職毎徙一官未嘗不心効權衡操懷竹栢雖齷齪廉謹曾無異績而毫釐過犯未汚簡書知臣在君匪敢矜述自陛下嗣臨寶位一十七年不以疲駑猥蒙奨㧞授以疆土假以麾幢入居宗廟之司出典股肱之郡八座之貴臣拜者三六條之榮臣守其五四開戎幕一佐中軍至如宫相臺丞侍臣遥節兼命稠叠累遷頻速輝光既極盈滿是憂間歲初領華州方宣聖澤俄以滑臺選帥非次及臣雙旌自天匹馬之鎭此州當四達之地控兩河之境兵雖勁逸人至凋殘臣逺仗皇威推誠撫衆服勤吏事盡瘁牧人遂得黎庶就耕織之時士伍知訓習之禮此皆大化光被臣敢貪天之功常恐三至奪慈孤立速謗此臣所以怵惕惟厲中夜以興願披血誠上達旒扆伏惟陛下少加憐察臣竊以酬恩狥節心實無涯引重致逺力誠有極臣先於嶺南染風毒脚氣今年春又患發鬢分将不起命及阽危幸沐亭育之恩免從帷蓋之斃臣年逾知命齒髮已衰疾經沉痼方寸頓減久當繁劇必慮闕遺臣又聞制類表作分閫者以重鎭為雄仗鉞者以専征為務臣器幹不足以在類聚作獨任方畧不足以持權何以統節制之師貞定否臧之戎律臣且陳力就列訓誥攸存審才則然以病宜免况巖廊多士宇宙無虞為官擇人皆出臣右胡可晏安冒寵尸素妨賢乞降賜骸之恩以全折足之咎臣獲退就散秩保養餘年類表作生候筋力之復彊申赴蹈而寧晚臣於當類表作所部勸課營田及以羨餘優恤将士等事一一别具條奏冀明輯睦上副憂勤塵黷宸嚴氷炭交臆無任懇切屏營之至代裴相公辭官表文宗劉禹錫太和四年臣某言臣去冬得疾近日加集作方劇西夕之景豈能久留及其未亂披露誠懇臣犬馬之齒六十有七壽雖不長亦不為短位忝公台近十五年皆由際會非以才進常懼官謗以招國刑令被病得死保其始終為幸甚厚豈復咨嗟所恨者遇聖明之君不得佐成太平之化自量氣力忽恐奄時一作然則心有微素無階上達伏惟聖慈照鑒臨而察之中謝伏惟集作以三公非曠職之地宰相非卧理之官臣伏枕之初已有陳乞請罷真食兼辭貴階集作之陛伏蒙優詔纔遂一事頻降中使慰勉再三専令御醫旦夕診視苟安名器不覺經時主恩則深公議不可伏思陛下臨御之始宰臣四人逮今零落忽已一半臣且危惙餘年幾何唯易直外鎭獨得無恙竊持此理權位難居伏乞賜臣停官許在家養疾就閒辭祿或冀有瘳害盈福謙固是神理倘天眷綢厚念以服事多年臣之所陳未蒙便遂則國朝勲舊以疾辭一作辟位者皆得致仕使其家居足以頥養既有成例著於舊章伏望天恩特賜哀允文苑英華卷五百八十一
