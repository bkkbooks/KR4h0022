body:
  text: 文苑英華巻一百四十五宋李昉等編草木三幽松賦一首枯楊生梯賦一首木蓮賦一首松柏有心賦一首嵗寒知松柏後凋賦一首寒松賦一首柳栢賦一首金松賦一首洞庭獻新橘賦二首扶桑賦一首落葉賦一首幽松賦惟天地之覆載屬日月之貞明幸雲雨之廣潤及草木之滋榮代何材而不用材何代而不生若乃地勢卑而路脩迥一作㢠有孤山曲澗之幽松挺百尺而敷其狀聳千仞而擢其容柯榦夭矯花葉芊茸枝橫栖鶴盖偃盤龍蹙皮膚而文舋一作疊峞宏磊砢而谷深重代一作伐人之所未見匠者之所未逢抱雅操兮積年載持慨節兮佇時雍梢森乎巖之畔扶踈兮山之足禀二儀而自清居四時而常綠其孤髙也則排煙而蕩霧其貞堅也則超代而越俗偏睹日而疏隂邃自然而孤直起喻有叔夜之材入夢表丁君之職澗底幸左思之詠嵗寒䝉孔丘之識偉哉盛矣屬時代兮多杞梓其用無隔窺幽澗兮茂松栢梓待構而見湏松堪棟兮希擇其文理也竒絶可以雕木一作楹架梲其雅操也昂藏可以振雪凌霜向日貞心擢臨風足氣揚深谷如䝉顧此地有材良王爾經過而歎曰帝徳咸亨此松挺生公輸俯仰而顧曰王道利貞大厦用成希皇鑒之留眄感欝欝之餘情者也枯楊生稊賦以青春光耀為韻敬括柔得乎剛則變化無方故能令老者以安分使衰者而再芳不然爻之均奚獨殊其棟撓木之衆奚獨舉其枯楊徒觀其枝葉滋潤色帶韶光發枯槁擢豪芒直幹森梢歘浮於青翠髙柯偃蹇漸變於蒼黄豈比夫顛木貴枿􅅛材稱良而已哉至如和風稍吹遲日久照淡清烟而羃䍥合晩靄而凝耀苟非懐蠧狀雖死而猶生忽應鳴禽類先號而後笑是知心動於内氣變於形以類相感因時則𡨕或叢生落落或孤峙亭亭映平林而迥秀倚長空而半青爰有翰林墨客懿此維新覩物生興與時為春在陽當榮於枯木理代實資於哲人遂稽大道將期小伸相長楊以體物希百中於兹辰木蓮賦蔽芾珍樹森林綺堂庇根天壤擢秀春光雖違性於舊國終奉恩於此鄉違性何苦主人有勿翦之怙奉恩何其主人有挈瓶之滋君既加我以恵好我亦報君以葳蕤弱其枝圓其葉亂階前之蓂莢附疑緑縟蕚䒠茸狀中浦之芙蓉既因其理又憐其美懐香則十歩必聞含笑則千金可市有實雖漏於貢納有隂足延乎憇止此木也誠則不材必姑樹其桃李松栢有心賦以君子得禮嵗寒不變為韻上官遜觀卉木之庶類而松栢之異羣貫四時而不改柯易葉挺千尺而恒冒雪凌雲抗髙標於物外逺卑冗於代紛其榦則直其理則文驗受命於方地信無竒於此君於是載離風霜多歴年紀持本性而常茂抱幽貞而獨美太華之上森森映仙掌之峰台嶺之旁落落䕃靈溪之水經冬不改憐江南之前剪疑乗春暫榮笑東園之桃李故見稱於前聖喻徳於君子故其勁節可佳眀心不忒實繁衆類生我邦國故將枝葉無隔於心源豈同橘柚有限一作根於南北錯萬物以為佐求其族而始得是以後凋之義久不刋於魯經有心之言永昭著於戴禮吉士逺託或亭亭於嶺上山苗乍凌時欝欝於澗底雖彼此殊軌而榮華一體若乃背徂年當芳嵗林烟乍巻秋雨時霽仙侶或遊隠淪常憇莫不對偃盖以瀟洒仰仙雲而摇曵暢方外之遐遊滌樊籠之流滯若乃幽澗之側高岫之端葉離離而日來冬暖枝梢梢而風至夏寒不以無人而不秀又同美乎芳蘭至若大厦方構長材是求詣藪澤訪陵丘逺近必度大小所謀有斯木之時疑作特達惟工倕而擇不重曰嵗聿云暮兮何木不變惟松栢兮凌霜葱蒨儻有心之可嘉期君子之一眄嵗寒知松栢後凋賦以真心勁節翠貫四時為韻裴度窮隂忽至品物盡瘁唯良木之堅貞映衰林而葱翠桃蹊李徑聞别葉之互飛松磵栢陵見脩條之自異諒本性以無易託斯時而不類雖殺菽之霜再三斷蓬之風數四徒凛凛以終日竟青青而在地懿夫春夏榮滋我不競於芳時秋冬凄冽我不改其素節遥分郁郁之烟逺映霏霏之雪故其桑榆種其前後杞梓植其行列或蕭瑟以柯空或離披而條折何在昔而相混果迄今而旌别觀夫陽曜以芳菲為事隂凝而肅殺為名徒運彼以寒暑豈齊我於枯榮斯乃時累不能累其質天損不能損其貞亦被霜氣亦含風聲挺喬枝而易識在灌木而難并故蒼然以殊致豈蠢爾以叢生異其欝欝秀色亭亭髙幹産二儀之内我獨後凋處羣木之中孰云共貫當其黄隕方可瞻翫庭有槐兮落際山有榛兮凋隂見一作覩枯槁之無色識茂恱之有心愛日照而逾静嚴飈吹而轉勁或出衆而標竒或處幽而表正雖結根山嶺移植軒屏如全直疑作真而率性客有擇木務材感衰歎盛悟漂一作標勁無永疑申蚍蜉之歌愛堅貞不渝發風雨之詠松兮栢兮猶君子之志行寒松賦李紳松之生也于巖之側流俗不顧匠人未識無地勢以􅃷容有天機而作色徒觀其貞枝肅矗直幹芊眠倚層巒則梢雲蔽景據幽澗則蓄霧藏烟穹石盤薄而埋根凡經幾載古藤聨緣而抱節莫寄何年於是白露零凉風至林野慘慄山原愁悴彼衆盡於𤣥黄斯獨茂於蒼翠然後知落落髙勁亭亭孤絶其為質也不易葉而改柯其為心也甘冒霜而停雪叶幽人之雅趣明君子之竒節若乃確乎不㧞物莫與隆隂陽一作寒署不能變其性雨露所以資其豐擢影後凋一千年而作盖流形入夣十八載而為公不學春開之桃李秋落之梧桐亂曰負棟梁兮時不知冒霜雪兮空自竒諒可用而不用固斯焉而取斯栁栢賦并序李徳裕夫受天地之正氣者唯松栢而已故聖人稱其有心美其後凋豈無他木莫可儔匹余嘗歎栢之為物貞苦一作若有餘而華滋一作而姿華不足徒植於精舍列於幽庭不得處園池之中與松竹一有相字映獨此郡有栁栢風姿濯濯宛若荑楊而冒霜停雪四時不改斯得一有謂字之具美矣惜其生於遐逺人罕知之偶為此賦以貽親友惟天地之生物均覆載而不私雖草木之殊性皆榮落之有時感松栢兮自得二字一作得真經隆冬兮一作而乃知常集霰於窮節秉心終而不移觀夫竹嬋娟以挺秀松英茂以含滋可䕃蔚於臺榭故封植於園池嗟緑栢之貞苦爰自託乎一作於幽崖或森森於寒壟或蕭蕭一作肅肅於神祠何炎徼之僻陋或珍木而在兹齊芊蔚於蘭苕儷真芳一作儷貞姿於桂枝逺而象之聳榦參差凝翠旌之陸離廹而翫之布葉低垂若孔盖之葳蕤又似翠列巢以羣棲鸞奮翼而來儀含輕烟於夕景泫零露於朝曦逮秋實之蕃衍綴青珠以纍纍嗟乎材不可備人亦如此斯子張之容雖盛栁恵之貞則虧有長孺之正色無思曼南史張緒字思曼之風姿歎此物之具美以幽深而見遺非企瑶林於塵外方玉樹於前墀望舊國兮無際思故人兮未期曽不得倚瓊樹二字一作樹而泛瑶瑟攀條而獻蘭巵慨路逺而莫致抑毫端而孔悲顧謂稚子煜起為謡曰楚山側兮秋一作湘水源美斯栢兮託幽根條總翠兮冬轉茂實垂珠兮秋始蕃彼變化兮不測焉知非張緒之精魂金松賦并序前人廣陵東南有顔太師猶子舊宅其地則孔北海故臺余因晩春夕景命駕逰眺忽覩竒木植於庭除枝似檉松葉如瞿麥廹而察之則翠葉金貫燦然有光訪其名曰金松訊其所來曰得於台嶺乃就主人求得一本列一有於字平泉今聞封植得地枝葉益茂叙其所自作此賦焉青春已暮白日將夕經顔子之陋一作故巷訪孔子之舊宅美珍木之在庭得嘉名於樵客曩擢本於台嶺近徙根於簷隙其柯肅肅自比於真松其葉纎纎實侔於瞿麥風入葉而成韻露垂柯而流液不受命於嚴霜諒因一作同心於寒栢含春藹而葱蒨映夕陽而的皪疑翠尾之羣翔若金潭之旁射雜爽籟於篁竹混晶光於瑶宿一作碧琪樹以垂珠而擅名金松以潜頰一作光而莫覿亦由處子在於隠淪竒才遺於草澤我有衡宇依山岑寂類仲長之清曠如蕭宰之窮僻植根此地似在崖壁殊橘柚之不遷同甘棠之可惜庶封殖於園林永愛翫而無斁洞庭獻新橘賦以湖海清和逺人脩貢為韻可頻瑜洞庭之逺兮亘全楚而連巨呉路悠悠以窮塞波淼淼而平湖逺國之奥壤中華之外區風土所宜兮四方各異珍果斯出兮諸夏或無至於白商謝𤣥律改風落瑶林寒生窮海枇杷落而將盡荔枝摘而不待然後浮香外散美味中成照斜暉而金色帶曉潤而霜清圓甚垂珠琪樹方而孰可味能適口玉果比而全輕在禹貢非他於周制則那充厥包於林下發使者於江沱襄橙不得而雜楚柚不得而和所獻者皆歎其美所貴者不以其多嵗峥嶸而已晩路﨑嶇而自逺齊萬物以坌入離本枝而不返其價可重其味可珍固緑蔕而未變施素錦而猶新若夕發於南國已朝奉於北辰匪雕飾以自媚實羽翼以因人獻芹者既非其匹敵獻桃者何足以等倫豈比夫江北則枳江陵則洲隨樝棃而莫遂備職貢而無由同碩果而已矣望君門兮阻脩美哉植物斯多結實者衆斯橘也栽則隔乎淮浦生則主乎雲夢獨専美於當今及嵗時而入貢第二同前韻仲子陵皇帝垂衣裳而治萬國舞干戚而來九區包之橘柚至自江湖嵗以為常知方物之咸有時而後獻表庭實之何無本其來則風秋洞庭霜落寰海元侯布教下吏旁採碧林冬生大小異名已去霜蔕初辭緑莖然後盛以瀟湘之竹束以江淮之菁背楚塞以西走望秦雲而北征上方端想𤣥黙深居穆清扇鴻鈞而不宰張大樂而無聲閲彼要荒之貢得斯華實之英乃明四目乃停九歌朱紱方來以彰其道泰碩果可食以表其時和時和在乎務夲道泰在乎柔逺一果熟知百果之不荒一方來知萬方之未晩橘之名也則珍橘之熟也維新越彼千里獻於一人丹其實體南方之正酸其味含木徳之純足以附荔枝於末葉遺㯽榔於後塵然出自荒陬升聞莫由烟波無己嵗月空流豈知夫烟疑作堙沉可達職貢可脩辭草澤以孤往入金門而見收物之因人也其則以衆人之象物也豈不或中儻草木之可儔希成名於入貢扶桑賦朱鄴木臨大壑名曰扶桑厭洪波之萬里在青帝之一方受浩氣以生成那倫衆木挺仙材之秀麗能戴朝陽塵外風吟天涯雨泣山晴而瑞氣初動海晚而潮痕乍濕幾千嵗月標下界之無雙迥㧞榮枯倚髙空而獨立霧折烟融孤光在東長迎旭日先得春風吾將原太極之意考真宰之功不産竒異安分混同物欲明焉我則與三才並起田云化矣我則與大朴無窮卓出古今莫逾貞固當乾坤之上位瞰魚龍之要路至若玉漏聲殘銀蟾影度收人間之暝色未遍羣山聳海底之紅輪先經此樹露戢雲驚珠懸焰生雖凌厥熾寧奪兹榮豈若常材隨大匠之雕刻有如良輔契吾君之聖明巢之者不可得其窺蠧之者不可得其噬陽烏象擇木之狀晴虹作挂弓之勢名大天下身髙水際掩彩翠於蟠桃病虧盈於月桂非海也不足以容其大非日也不足以升其高葉茂而雲垂霽景根深而龍撼驚濤卑沃焦於尺土㣲鄧林以秋毫巨影倒空而漠漠寒聲吹夜以飈飈靈境難尋人寰罕測性欺霜雪心藏正直故能齊衆木而據滄溟永佐東君之徳落葉賦衆木森沉嵗暮秋深日黯黯以斜度風悄悄而亂吟喬枝邈以架迥墜葉槭以辭林睠彼摇落夫何蕭索形宛轉而斷連狀徘徊以斜一作前却枝稍髙而飛逺條漸疎而隂薄逗凉空以伴螢繞明月而驚鵲或散漫於原野或摇颺於樓閣爾其下自幽谷髙隕山椒葉何樹而不墜樹何葉而不凋擁玉砌以初聚值金風而復一作不摇浮於水中似孤舟之逺泛落於山際若斷雲之已飄悲夫處處園林紛紛相似覺絶漠之寒至聆洞庭之波起何夏茂而秋落何先榮而後死葉之致也既順隂陽之宜葉之趣也誠叶盛衰之理願歸本而猶未嗟㣲脱而不已别有寂慮卧幽逸氣無儔聊賞心以遐望乃觸目而增愁見一葉之已落感四序之驚秋媿體物之逾拙思軋軋而空抽者也文苑英華巻一百四十五
