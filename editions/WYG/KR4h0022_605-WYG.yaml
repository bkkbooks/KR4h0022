body:
  text: 文苑英華卷六百六宋李昉等編請朝覲此卷英華所編失年代先後今正之為房州刺史請朝覲表一首為張侍郎乞入覲表一首再請入覲表一首李令公乞朝覲南郊表一首皇帝違和請朝覲表一首青帥乞朝覲表一首為陜州盧中丞請朝覲表一首鄭滑李僕射乞朝覲表一首杜司徒乞朝覲表一首為鄭相乞朝覲表一首為楊大夫請朝覲表三首請朝覲表二首代孔大夫請朝覲表一首崔中丞請朝覲表一首李大夫請朝覲表一首為房州刺史請朝覲表上官儀臣某言臣一介薄才不周時務命隨事偶超竊宦途歴職文武榮兼内外年餘三紀受恩兩朝循涯省分實優常品自違丹陛寒暑亟移限以大藩乆絶朝覲頃以年頺疹迫風昡日増懐闕庭而載佇仰雲霄而聳望陛下昔居春禁臣預應朝集披膽祈恩特蒙鑒許尋奉明詔入衛鈎陳惠澤曲流其來自逺誓生沉族未識所酬今以衰疾之年乆違趨拜望充計吏一奉宸闈頃者希天聽卑期照心靈振蕩氷谷非危干黷旒纊伏知待罪謹言為張侍郎乞入覲表德宗黔府觀察使時任吕頌臣某言去貞元五年於延英殿賜靣辭之日親奉進止一作聖旨令臣一考即來者臣謬承聖奬猥守方隅自到黔中首末三年更入新正即及四載臣素以㣲一作書生叨居重鎭恭行朝旨宣諭皇恩種落逺人庶幾於理伏以遐荒僻阻控帶諸藩溪洞蠻夷性本生梗木石為伍鳥獸同羣寛之則伏匿山林不遵王命一作公法迫之則結聚蜂蠆害及邊陬臣於撫馭之間酌其中道示以一作之威惠諭英華作論非以憲章以清净臨人以不擾為政開設學校令知君臣父子之道勸勉一作課稼穡令知生成衣食之原减其征徭蠲其力役今國恩逺及夷落大安萬里勤王一方無事臣管内素多瘴癘山峽重深毒霧蒸雲常在牎户四時多雨不識霜雪終歲隂昏少見天日出門無路舉目唯山猿鳥之心如在籠檻臣從去年冬初忽染脚疾膝脛頑痺行歩一作立艱難絶無醫人素乏藥物深山窮谷無處市求任重命輕未可言疾一作病臣先奉進止一考令歸又凖勑文二年與替臣今歲月以一作已乆疫癘交侵况奉綸言難堪更住臣乆辭天闕一作闕庭戀切龍顔瞻望天門不勝涕隕無任攀戀切迫之至再請入覲表臣某言臣去貞元五年面辭之日親奉進止令臣一考即來臣謬荷聖恩擢居方鎮炎瘴之地首末四年恭守廟謀一作謨宣布皇澤唯以静理惠䘏逺夷今縣道晏清干戈罷戢雕題左袵萬里勤王溪洞之人無不樂業此皆聖上一作主之恩豈是微臣之力臣從前年六月患脚膝行立艱難秋深已來更染風疾又從去年六月直至今日不見三光山谷昏昏終日隂雨吞茹瘴毒實所難堪伏奉勑文二年與替况奉進止一考令歸臣疾癘所侵氣力衰敗一作憊素無醫藥恐不支持臣伏見近日已來楊或作暢恱孫誠李速裴腆皆在遐裔相次䘮亡特乞聖恩全臣性命許臣凖勑歸赴闕庭再覩龍顔灰粉無恨臣去年十二月已進表陳乞情有至切再黷宸聰伏乞天慈救臣疾苦一作病不勝懇迫憂塞之至李令公乞朝覲南郊表于公異國家以來年正月五日告謁宗廟柴燎南郊率土同歡室家相慶臣已陳乞願奉大儀監使王敬親至陛下以西門式遏未蒙矜遂夙夜惶戀心如焚灼目覩漢儀猶傳故老况臣累塵清貫謬處台司侍奉翠華未為失任亟承顧問亦近守官既違捧日之誠益慕告天之慶伏惟皇帝纂戎聖運光啓帝圖澤流亭毒一作育之源化溢舟車之外今者以天地交㤗華夷大同明發以展神宗陶匏而郊上帝紹前王之闕典納殊俗之始賔九域駿奔傾皇都而壯觀庶官少肅扈清蹕而徐驅臣於此時獨守蕃鎮伏惟陛下鳯翔密邇或多戎梗未可輕離臣酌事宜必無所慮何者吐蕃所有兵甲悉不在邊流沙已西纔有烽戍况其畏威讋伏向化協和自安戎貊之邉敢犯漢家之塞吳說之居隴上李觀之處涇州既承聖謀各有成筭以此制敵何憂撫封臣於鳯翔亦擇留後庶令軍務皆叶權宜又以州縣雖存黔黎未復徒御既衆供承則難臣當倍道兼行遺於入侍謝車捐騎才取成容則岐路有載馳之章郵亭絶告勞之費以此利往未為擾人今者設壇場告天地尊嚴執禮陛下當元首之名賛拜陳儀臣子漏股肱之用臣且自愧人何以觀乞陛下特降洪私容臣朝聘俾汪洋皇澤亦霑戎屏之臣肅穆旌門粗識昇平之禮既均情於故老庶無愧於子牟退入泉壑不為恨矣云云皇帝違和請朝覲表臣某言伏奉手詔聖躬頃蹔違和旋亦康復鼓舞歡忭倍百常情然且爾來未有人到惶戀之至寢興無寧何者臣義忝寵榮恩當弼亮聖躬乖理股肱何安是以𤨏𤨏寸誠欵欵㣲志思陪朝列一觧漏疑容之憂或從良醫待獻十金之藥頃以陳乞願得輕行未蒙還㫖猶増戀慕且睿謀𢎞逺邉鄙方安春候轉深戎馬難動以此揣度固無憂慮伏乞聖慈許臣朝謁輟旬時於藩鎮候安否於宸顔臣之㣲願於斯畢矣青帥乞朝覲表栁冕臣某言臣備位方面守鎮一作在海隅顧無理平之績猥受増秩之榮而不自媿者顔之厚也竊感江漢朝宗之義鹿鳴君臣之燕頌聲之作王道之唐書作本始也國家自兵興之後不遑儀一作議禮方岳唐書作牧未朝讌樂乆缺臣限以一切之制例無朝集之期目不覩朝廷之禮耳不聞宗廟之樂足不踐軒墀之地十有二年于兹矣犬馬齒衰益深戀主葵藿將暮空仰太陽古人云日雖不為葵藿廻光然向之者誠也臣職在戎馬身辭日月願因朝謁一見漢儀會一作亦臣之誠也傳曰朝以正班爵之義㑹以訓上下之則朝㑹者禮之本也臣安敢忘故羣后四朝以明黜陟唐虞制也五歳一見以考制度殷周制也三載上計以㑹考課兩漢制也其或不朝則以禮讓之故孟子曰諸侯之朝天子曰述職一不朝則黜其爵再不朝則削其地三不朝以一作則六師移之然則諸侯朝㑹尊王室也可以廢食不可以廢朝洎秦􅌍古制罷侯置郡漢立王侯並建守相聖唐稽右兼而用之故天下朝集三考一見皆以十月上計至于京師十一月禮見㑹于尚書省其朝覲也應考績之事至一作其元日也陳筐篚之責集於朝唐書作考堂唱其考第進賢以興善簡不肖以黜惡穆穆濟濟靡然成風太宗之遺政也自安史亂常始有專地者矣四方多故始有不朝者矣戎臣恃險未有悔過者矣臣忝閫外一作牧之寄竊憤不朝之臣故每忘寢與食思一入覲庶因㣲臣率先天下則君臣之義親而不踈朝覲之禮廢而復興一作舉臣之幸也常唐書作誠恐負薪之疾溘先朝露覲禮不展歿於下泉臣之憂也又臣四年已來頻乞骸骨聖恩哀憫許為擇替無德而禄殃釁荐臻臣雖上恃天慈不殞瘴癘而下悲骨肉繼以死䘮及聞諸將帥亡没亦衆臣自悼何德以堪乆長昔公子牟身在江海之上心馳魏闕之下則鄉國者人情不忘也闕庭者臣子之戀也朝覲者國家之大禮也是三者人之大願伏乞一作惟陛下憫臣丹懇許臣入朝再謁聖顔萬舞稱賀一作慶斯願畢矣無任懇欵屏營之至為陜州盧中丞請朝覲表周行先臣某言臣家忝儒門才非國器生休明之代遇堯舜為君束髮從官三十餘年矣曩日佐幕獲在湖南蒙先聖察臣効愚録臣克謹歴外臺三院知留務五年頻降絲綸驟登朱紫天慈子育不集戾於㣲躬君父之德且深昆蟲之力難報臣某中謝伏惟陛下繼明授圖誕敷至化特授以刺史兼經畧觀察等使頃容管鎮任職方隅逮兹五考要荒外服僻陋在夷不能賦車籍馬以給國儲不能餼牽饋餉以賑軍食忝列位聫率慙無匹間歲陛下避狄奉天省方梁漢臣不獲身當矢石血濺兇渠及陛下掃除妖氛再造區宇臣復不獲扈蹕清道執戈啓行且霑率土之毛莫展事君之節此臣所以内訟刻骨上思訴天茍貪符竹之榮實懼素飡之刺臣今年踰知命齒髮已衰官守炎陬星霜屢改乏中和之理行無考課之彰聞而炎癘暗侵桑榆漸迫常恐一先風燭永謝聖朝况復不識覲見之儀未知班瑞之禮羔鴈列序空聞於禮經鵷鷺同行欲求於夣寐伏惟皇帝陛下煦育動植酌心元元垂仁降慈俯遂愚懇許臣得對敭休命抃舞薫風則朝拜玉墀夕歸泉壤愚臣生不恨矣一作免死且不朽云云鄭滑李僕射乞朝覲表馬揔臣聞臣之事君如子事父子有晨昏之道臣有朝覲之儀載罹寒暑之遷豈勝犬馬之戀臣聞古之郡國皆有邸第列在京師出命守藩入令述職所謂百谷朝海衆星拱辰伏惟皇帝陛下德伏萬邦理臻三代夷夏率俾沉翔昭然臣頃受任畨禺星霜七變身在南海心懸北闕特蒙渥澤徵領宗司方厠朝行旋牧關輔東郡缺帥又忝㹅戎雙旌自天便道之鎭赤墀輔疑作轉逺伏謝無因及兹三年丹懇每結况自貞觀之後迄于聖朝臣之一門繼荷重任擁旌鉞者僅二十人高祖淮安郡王神通弼亮太宗戮力締構榮登左揆以寵勲勞臣無先祖之功而塵先祖之位師長宗秩胡堪謬到是願罄述愚志一覩聖顔宵膓九廻晝食三歎今河朔軌道汴宋底寧臣所部宣物睿慈綏緝黔庶師旅知訓農桑以時徵賦有常廪儲有備但以違奉既乆心不遑安輙敢冐昧上聞特希矜許入覲臣獲蹈舞班叙親承德音却歸方隅生死榮幸杜司徒乞朝覲表劉禹錫臣聞事君之道有死無隱懇誠所至敢不罄陳伏惟聖明俯賜矜察臣某中謝臣代受國恩忝承門䕃脫巾筮仕敢期榮名陳力効官靡樹聲績始因人乏集作孤直驟歴清班復荷朝奬作藩外府逺違輦下十有四年恪守淮濆于集作逮今一紀犬馬戀主寢興匪遑蒲栁易衰遲暮俄及竊位時乆妨賢愧深況歴任集作官已來四十八考衹奉朝謁時纔二周服勤郡府荏苒垂老屏營魏闕之思夣想承明之迹集作遊如迫餒寒不忘衣食伏惟睿鑒俯亮愚衷早賜擇人與臣為替交受集作授之際冀無可虞然後脂車奔赴京輦微願斯畢雖死且集作猶生臣頃以戎務方殷猥加宰輔今既事罷實慙此名為有藩鎮同時未敢輕上印綬伏以聖朝赫奕左右惟賢漢愧得人周慙多士臣才略既短齒髮且集作又衰柄用之地甘心自絶所冀退歸舊里沐浴皇風絶鍾鳴漏盡之譏展維桑與梓之敬匪惟名器不假實貴骸骨獲集作可全知止之心神祗可集作所鑒無任悃欵屏營之至為鄭相請朝覲表元固臣某言伏以受恩之地中外則同戀主之心遐逺愈一作逾切臣素無方畧又乏理能徒以乆侍掖垣嘗叨衮職罪已彰於負乘位猶忝於藩維一違闕庭累變寒燠虛當重任未答鴻恩一作私常恐愚効未一作莫申官謗將及敢不誓心奉職克己臨一作勤人哀矜獄情節省財用蠲途誡愼終日憂慙而百越殊風庶甿失業流庸未復於田里逋賦仍積於歳時邕管防虞尚勞師旅海南饋饟猶資費用軍府屢空物力將竭至如奉宣化理一作皇化恭守國章臣實盡疲駑庶裨萬一將使宼戎殄􅌍食貸豐滋臣雖策勵終亦無及伏乞聖慈矜念天鑒照臨察臣審分之誠哀臣瀝懇之意儻獲言旋京國重覩天顔則汲黯無恨於淮陽馬援不辭於瘴海矣微臣幸甚無任感恩戀主踴躍之至一作皆唐類表為樓煩監楊大夫請朝覲表令狐楚臣某言臣聞君猶父也臣猶子也子事父有冬温夏凊之禮臣事君有大聘小聘之義臣雖庸鄙常感斯言今類表作况乃地離京師千里而近身去王室十年有餘心既傾而陽光未廻目已極而雲路猶阻此臣所以形留神往淚盡血繼者也况監司之寄甚重馬乘之務非細或物有因襲革之而無妨或事無典據為之而有利咸非翰墨所可升聞貯于中心期以上逹伏惟陛下廻天地之鑒垂日月之明俯借恩光暫令朝奏儻得飛纓於赤墀之下委佩于彤庭之前目見龍顔足履丹地則犬馬大幸與天無窮無任悃欵之至同前臣某言臣自罷侍龍樓出班馬政星霜驟變十有三年伏惟陛下光宅寰瀛惟新景命奏簫韶之九變獨臣未聞舞干羽於兩階唯臣未見累歳有違離之苦終朝懐戀慕之誠是以屢獻封章懇求朝覲愚衷不逹聖眷未廻邉山之中躑躅愁結比者臣雖庸鄙兼領嵐州職在治人固難離局今既專知監務特有使名伏櫪多暇望雲増切且臣所部濵類表作頻河近塞兵家利病時事便宜難於逺陳願一敷奏而况道途非逺僕御不多次舍之費誠未擾於郡縣往來之期當不踰於旬月伏望俯廻天鑒曲遂臣一作誠心使得稱慶於中朝然後代勞於外廐至願斯畢死無所恨無任懇廹戀結之至同前臣某言臣聞心孤者觸緒而悲意切者發言皆懇揣情循理今古同塵嘗謂無之今乃信有臣某中謝臣雖頑鄙無取亦嘗側聞長者之論上自古昔迄至於今才能事業百十於臣而不升名官之級不知禄廪之數者何可一二其紀臣甚無耿介之秀或作節開濟之能且有極愚至陋之累而㣲生際會事陛下於藩邸之中周旋出處雖無擁戴神聖之績便蕃左右曽有侍從言語之樂竊自欣賀若昇雲天伏惟陛下握圖御極凝旒垂象惠均於動植信及於細㣲擢臣於方岳之中委臣以監牧之務仰慿殊造俯竭愚衷封人粗安國馬稍息今者秩視賔客位為大夫耳煩絲竹之音響口厭梁肉之滋味馳驅駿足偃息華穰蒙陛下覆育之恩已為太過顧㣲臣止足之分實所甚榮豈敢更冐寵光别求奬用伏以狗馬之齒衰暮相迫螻蟻之命危殘不常日往月來懼貽敗覆天地相分不勝瞻戀每至木葉下邊馬嘶切思指畫君前以畢平生之力常恐先霜露塡溝壑不見丹闕長恨黄泉伏惟陛下仁愛惻隱及於萬類察臣之至願表一作知臣之赤心使一入帝城死無所恨無任一作不勝哀迫懇苦之至請朝覲表符載臣某言臣聞臣之事君猶子之事父茍閨庭之侍曠晨昏之禮絶擬議名教得為孝子乎臣自違天顔二十餘載身不趨宫闕之地心不展烏鳥之誠戴天嚮日肝肺焦灼况臣暮齒筋力漸衰以中人之材當大藩之寄智慮昏殆政術荒踈自揣封疆固多敗累豈可使萬人禀無德之令四方興尸禄之譏跼形顧影月慙歳恥方今赫赫大國髦彦如林采於衆才必超十倍伏願陛下蹔廻慈眷俯察愚衷念蒼生之疲授能者之位即㣲臣無妨賢之愧大君有任用之明得公論於縉紳盡私誠於犬馬再以白首獲奉紫宸備一刻於周行實百生之榮耀前後陳乞煩黷聖聰雖懇迫之未申瞻軒墀之已近不勝慺慺之至同前周行先臣某言昨遣奏事官馬元宗附臣口奏請赴朝覲馬元宗廻奉宣進止語臣云君臣之情不厭相見朕與卿心無二縁途路稍逺卿來後即不免朕憂况乍收復洺州士庶恐未安泰須卿存恤未能遂卿此志且不須作來意者皇靈特降天語密開俯伏流汗隕越無地臣某中謝臣内顧庸虛謬居藩鎮日月云邁倐然三年空荷丘山之恩未申絲髮之効隳肝瀝膽豈盡愚誠從頂至踵皆承𤣥造夙夜袛惕悼心失圖誠願暫覩鴛鷺之行獲倍羔鴈之列特近宸睠親奉德音則朝聞夕死臣之甚幸而軍城初復天意遙軫戀結之至尚抑懇誠今疆場無虞干戈己戢軍儲戎賦幸有支持伏望天意許臣至冬末春初已來暫赴朝謁得申犬馬之志庶盡葵藿之心碎首糜軀死之無恨云云代孔大夫乞一作請朝覲表杜周士臣某言臣以斗筲之資荷旄一作旌鉞之寄職兼千乘位一作職摠十聫而節制頒條曾無可紀妨賢專禄亦一作忽已四年由是再陳表章備瀝哀一作䘮懇誠在必逹義無茍安伏惟元和聖文神武法天應道皇帝陛下憂勤萬務砥礪庶工服勞中外者有更踐之常受寄方隅者無專任之幸所以俗用丕變官稱得人坐致平治寔使均一天下幸甚天下幸甚今輙冐犯嚴譴更陳丹悃不敢廣引逺事請以近日一作事言之至如揚於陵鄭絪馬摠等或從偏鎮陟授或自周行蒞事或三年獲歸或三考一作載除替公議惟允私願亦伸伏乞聖慈平分許循往例賜停見職擇用羣才則聖代盛審官之規㣲臣無去國之歎無任禱祈之至一作皆唐類表崔中丞請朝覲表憲宗臣某言臣歴刺三州連􅀈二府外任逾紀入覲無階就日望雲魂飛心往臣某中謝伏惟睿聖文武皇帝陛下覆載無私遐邇同致復昇平之故事繼前聖之高蹤中外踐更出入迭用臣以虛薄叨受恩榮徒竭夙夜之心未伸朝夕之敬天威咫尺誠寤寐而無違雲漢昭回固瞻仰而何及是以前在朗缺封章累上及移臨松漠星紀屢周㣲衷尚隔於戴盆積望徒懸於窺管葵藿之誠彌切犬馬之戀愈深人欲天從於兹未騐下情上逹終冀不誣敢黷宸嚴罄陳丹懇伏乞賜臣除替許至闕庭厠蹈舞於羣寮備班行之散地足趍中禁目覩大明俾成九族之榮以盡百生之幸非敢竊國賔五獻之禮希康侯三接之恩一覿龍顔萬死為足無任懇到迫切之至謹遣某官奉表陳乞以聞李大夫請朝覲表敬宗裴度臣聞天道君也高而下濟地道臣也卑而上行上下交感然後萬姓生焉庶政成焉其或蓊鬱不通則為災沴之氣必在宣逹使之光明太平之風實繫於此伏惟文武大聖廣孝皇帝洪覆品彚光宅寰區翾飛跂行皆得其所况臣器識庸陋遭遇便藩始事憲宗過蒙驅䇿復事先帝猥加爵命大恩無報終懼且慙以至今日又承寵寄㳙毫未効齒髮將衰起在山南不逺甸服宴安厚利拜受軒階此則為君之道下濟有餘為臣之道上行不足尸禄彌乆心魂若驚日往月來寖成憂塞伏希降鑒特許入覲冀得少謝萬一使無壅情然後退歸里閭降避賢路雖則萬殞無恨可謂百生之幸况李光顔薛平皆武臣也淮海以為要重然猶邐迤而至述職明庭臣儒生也梁漢無事道途孔邇若泰然自安貪冐榮顯位為公相衆所指名又何以表率四方儀刑多士臣不勝傾心延首瞻系天衢之至文苑英華卷六百六
