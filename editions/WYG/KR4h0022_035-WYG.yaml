body:
  text: 文苑英華巻三十五宋李昉等編水四新潭賦二首秋潭賦一首小池賦二首清泠池賦一首漲昆明池賦二首墨池賦一首盆池賦一首新潭賦王泠然國之天府名曰河南水有清洛漲乎新潭夫其貫都成川習坎為德石門呀豁而洞㵼緑樹逶迤而夾植源自山來漕因人力或清淺而見底或深沉而莫測奔狹口以雷聲積中心而黛色若乃方將暮春大集都人錦筵横石羅幕藉塵騎影攅臨變作桃花之浪衣香亂入飜為蓮葉之津由其地勢多羙所以潭名永新觀其城闕映帶閭閻縈繞半向石崇之園斜經潘岳之沼星月沉浮乎其内烟雲洗拂乎其表不生芰荷但聚魚鳥通舳艫之利於國既多開浸灌之功與人非少自記從調恆來此遊朝林坐而疑夕夏潭行而覺秋清可照人實欣逢於朗鏡虚宜受物佇相引於仙舟帶洛常恥臨淄更羞况獲忝乎餘派終敢希乎下流第二張環惟國之左當河之南分逶迤之舊洛漲浩􅃞之新潭觀其沙石中映魚龍内涵泛危槎而獨隱紛衆水以相叅原夫引派潜廻䟽源洞出淙石門以雷注透金塘而箭疾暝浮天漢之雲晝洗嵎夷之日雖習坎之爲常乃流謙而不溢若夫正月登晦韶風報春花明上已栁暗長津出金垺之遊騎下瓊樓之羙人愛清流之亹亹走香駕以轔轔樂此幽勝褉乎陽濱竭主第之羅幕盡侯家之錦茵窺浴鳥之呼伴見飛魚之觸綸既靈長於上國恆見羙於斯辰若夫黛色冲融清光皛了緑苔一㸃疑濯髪於江波青楊四周若連帷於漢沼湛珠彩於星夜流鏡華於月曉苟形影之可觀乃妍媸而必表嵗蒼茫兮寒氣冽潭皎㓗兮生堅氷比玉巵而逾净對瓊華而更凝猶不若鏡室之爲朗銓䑓之可稱庻狂愚之可鑒知簡要而相承秋潭賦以秋氣清爽資彼澄澈爲韻王起沔彼積水凛乎高秋秋應律兮則勁水爲潭兮至幽當草木之不芳獨開翠色因天地之始肅更變寒流匪騷人之詠歎實知者之娛遊爾其畜奫淪之色得蕭瑟之氣就其淺則亹亹共清臨其深則兢兢足畏居下流之可保信上善之爲貴寂爾不動湛然恒平正衣冠而逾審燭毫髪而必呈性則納汙能積小以成大時方收潦故沿濁而更清鷗浪不振鷺濤不驚同至人之虚受比君子之持盈懿其歇昏霾羅物象峯巒之所攅列雲烟之所來徃媚潜虬之幽姿䟽遊人之煩想不汪汪於千頃自泠泠於百丈冩星火兮初流涵珪月兮始上湛清華於古木于以交輝澄鮮彩於層空於焉競爽虚明莫映皎鏡無私處不爭而成德體自然以爲資金風乍摇似易水蕭蕭之日木葉方落如洞庭嫋嫋之時映泬寥之逺天動悠揚之短晷與碧落而相合將清光兮乍起凈如練兮可名清濯纓兮増美儻朝于海知引往而納來如挈其瓶可注兹而挹彼安波皎潔利物含𢎞溢金隄之晶晶窺銀礫而澄澄飛螢乍臨疑列宿之在漢纎鱗或躍若迎春而上冰豈清淮之可翫何靈溪之是矜則知沸潭無湧聞之於栗烈寒潭見底稱之於洞澈孰若積𤣥流當素節金鏡同朗冰壺共潔既妍媸而照臨幸清通之區别小池賦并序唐太宗許敬宗家有小池作賦賜之若夫素秋開律碧沼凝光引涇渭之餘潤縈咫尺之方塘竹分叢而合響草異色而同芳徘徊躑躅淹留自足疊風紋一作文兮連復連折廻流兮曲復曲映垂蘭而轉翠飜輕苔而動緑牽狹鏡兮數尋泛芥舟而已沉湧菱花於岸腹劈蓮影於波心减㣲涓而頓淺足一滴而還深于時景落池濵霧黯踈筠巻舒澄霞彩高低碎月輪露宿鳥之全翮隱遊魚之半鱗岸隨年而或故流與日而終新雖有慙於溟渤亦足瑩乎心神小池賦應詔許敬宗臣忝班下列胥宇上京欣託巢之有庇體墐户之全生爰鑿小池依於勝地引八川之餘滴通三涇之洋泌慕鑒止而端形乃遊智而清志爾其潺湲繞砌㶑没縈除擬高陽而不足比蹄涔而有餘游瑩劔之㣲鳥躍露鼎之纎魚乃若椅井傍通桃蹊俯映仰天津兮共澹㓗秋景兮俱凈倒列宿以疑珠含望舒而似鏡覩江使之潜處翫波臣之沉詠於是飜光甕牖漾影蓬門溜激石兮長嘯鳬鼔浪兮相喧竹凝露而全弱荷因風而半飜足以澡瑩心神澄清耳目對昆明而取况喻春蘭與秋菊不羨寶於河宗豈希大於暘谷彼瑶池之高醼固幽遠而空傳此坳堂之信逺遂騰譽而聞天降臨渭之睿藻連横汾之曩篇何㣲生之一日荷大賚於千年清泠池賦王泠然梁王既受封於漢命駕東游入睢陽之下國吊㣲子之高丘榮華莫比僣擬無休復欲象昆明之校戰同右武之習流决河間而飲馬治宫樹以維舟當時舊跡此地爰脩土木間成起䑓宫而似􅀞絲金並奏和氷石而疑秋是時宮人出看上客淹留既成此池勝形無比喬樹青㝠而外合層甍岌嶪而斜指曉坐狎鷗春祠薦鮪連小山而夾廻嶝截長河而分半水徒觀其清泠無㸃洞澈如凝鏡開珠淨月滉星澄鳬嚼紅藻龜飜碧菱地將昏而霧合天欲雨而雲蒸明則可鑒虚而不竭風靜浪碎日落圓折波含閣而相動潭映空而俱澈此土之池君王所爲年深則峴山陵變水浹則滄海塵吹不見射魚之浦空餘飬鴈之陂皇家化溢成周包含一作合梁宋分星辰以主萬國㑹江漢而歸一統惟兹之池清而且平居下流而不濁含上善而逾明常以柔而處順豈遺道而從榮時人競渡摇海艦於三春暮客來投落江㠶於四岸何今日之登陟皆昔年之池舘物是人非所存者半濟巨川必待舟楫得風流還升汗漫儻餘波而可霑幸不遺於所觀漲昆明池賦以池滿春流思象河漢爲韻張仲素空濶靈沼蒼茫舊規昔穿焉迎秋而大閱戎艦今漲也乘春而無竭陂池時則陽候既序隂氷已泮天子乃詔京尹以亢役命水工而叶贊陳衆力而雲鍤勃興决萬派而箭流共灌澹汪汪之積水似耿耿之斜漢况復榖雨初霽夭桃正春揔上善以利物涵聖澤之深仁軼彼宫沼瀰如海濱鼓金堤之曲岸揚石鯨之彩鱗浪湧煙郊更失辨牛之涘日華翠㶑纔分織女之津伊昔殊荒未化勤遠是思非障澤之瀦矣將水戰而𨽻疑作肄之構館浮鷁以遨以嬉獱獺呈形有類於文身之俗鳬鷖亂響如習乎下瀨之師春水平兮波湲春日煦兮沙暖雖守柔以易狎竟安卑而就滿重泉之沫騷騷而若廻淺沚之毛離離而漸短至若鏡朗風收澄明不流沃餘潤於荒野引孤光於釣舟豈獨龞蜃是獻實亦龜龍載游厥跡既徃前聞可想故人遥集曽分刼火之灰蕃帥來朝暗識滇河之象其漲則那式詠且歌開鄭白之墳衍流畎澮以天波瑞氣長凝表宸居之在鎬晴虹乍飲若榮光之出河大哉水之爲量皆從夫一勺之多第二宋悛於廓靈沼其流湯湯控清源於近甸澄積溜於方塘頃者天子時欲出池苑贍農桑納獻可之規諌設成務之紀綱乃斬杞栁破隄防將欲抑耳目之逰觀資稼穡於人康一物失所若已納隍竭其澤則龜魚無咸若之地害於物則邦家無好生之方豈以成功者不可以適變識道者克在乎順常乃天意怡豫人謀允臧不遠而復載濬其隍前已押納隍亦既具畚鍤亦既瀦沼沚將挹彼而注兹乃引流而激水揔括趣絶見鯨波之大來委輸成深覺鳬舟之漸起且池之盈矣亦云自瀕脩軌躅雖聞於仍舊開汲引終期乎取新鱗介將枯而復躍草木咸滋而更春皇矣我后有如其仁懿乎哉仰對一水旁連九陌流惡有類於汾澮納汙頗同於川澤煙收霧歛混天色而波清秋霽霜晴浮月華而影白載育菱茨一作芡羣浮羽翮將飛有翼時棲太一之雲欲濟無梁幾滯璧池之客且流謙者聞於善下惡盈者誡於忌滿儻從事於水鑒庻可形乎長短墨池賦以臨池學書水變成墨爲韻王起墨之爲用也以觀其妙池之爲翫也不傷其清苟變池而爲墨知功積而藝成伊昔伯英務兹小學棲遲每親乎上善勤苦方資乎先覺俾夜作晝日居月諸挹彼一水精其六書或流離於崩雲之際乍滴瀝於垂霧之餘由是變黛色涵碧虚浴玉羽之翩翩忽殊白鳥濯錦鱗之潎潎稍見𤣥魚則知自强不息允臻其極何健筆之成文變方塘而設色映揚鬐之鯉自謂奪朱沾曵尾之龜還同食墨沮洳斯久杳㝠不測愛涅者必染其緇知白者咸守其黒蘋風已歇桂月初臨𤣥渚彌净𤣥流更深所以恢𢎞學海輝映儒林將援毫而閱目豈泛舟而賞心其外可察其中可見同君子之用晦比至人之不炫氷開而淳漆重重石映而𤣥圭片片儻北流而浸稻自成黒黍之形如東門之漚麻更學素絲之變究其義也如蟲篆之所爲恱其風也想鳥跡之多竒將與能而可傳可繼豈謀樂而泳之㳺之耻魏國之沉沉徒開墨井笑崑山之浩浩空設瑶池專其業者全其名久其道者盡其羙譬彼儒疑作濡翰成兹色水則知逰藝之人盡以墨池而爲比盆池賦以積水盈器如望深池爲韻浩虚舟逹士無羈居閒剏竒陷彼陶器疏爲曲池小有可觀本自挈瓶之注滿而不溢寧逾鑿池之規原夫深淺隨心方圓任器分玊甃之餘潤寫蓮塘之遠思空庭欲曙通宵之瑞露盈盤幽逕無風一片之春氷在地觀夫影照高壁光涵逺虚濳窺而舊井無別就飲而汙罇不如雲鳥低臨誤鏡鸞之縹緲庭槐俯映迷月桂之扶踈是則涯涘非遥漪瀾酷似沾濡纔及於寸土盈縮不過乎瓢水蘭燈委照以珠動紈扇摇風而浪起沉蛛絲爲羨魚之網深抵百尋浮芥葉爲解纜之舟遠同千里想乎泥滓無染泉源本清盛之而細流不泄鼓之而圓折長生蛙穿而別𣲖潜通想漏巵之難滿雨落而古痕全没知小器之易盈及夫岸灔灔以初平水汪汪而罷漲韜雲分白璧之色映竹寫圓荷之狀光飜曉日誰謂覆而不臨底露青天孰假戴之而望至若煙靄沉沉莓苔四侵方行潦而不濁比坳堂而則深遂使好勇之徒暗起慿河之想無厭之士潜懷測海之心故得汲引無勞泓澄斯積環纎草以彌澈泛流萍而更碧沙洲連一畆之地山翠接如拳之石悠哉智者之爲心聊覩之而自適文苑英華巻三十五
