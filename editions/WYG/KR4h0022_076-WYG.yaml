body:
  text: 文苑英華巻七十六宋李昉等編樂六無聲樂賦二首審樂知政賦二首樂徳教胄子賦六首無聲樂賦髙逞樂而無聲和之至聲而有象樂之器特飭樂以彰物非克和之大義故保和而遺飾然後至樂之道備樂不可以見見之非樂也是樂之形樂不可以聞聞之非樂也是樂之聲天廣其覆地厚其生四時和萬物成絪緼煦嫗何樂能名豈非有之為粗無之為精魚泳重泉獸安茂草鳥頡頏於雲路人逍遥於至道咸自適於中情亦何擊而何考厥初造化衆籟未吟寂兮寥兮有此至音無聽之以耳將聽之以心漠然内虚充以真素處此道者無日不聞於律度倏爾中動遷於内形渉此流者沒身而不得一聽得意貴於忘言得魚貴於㤀筌堯人致歌於擊壤陶令取逸於無絃音留情以待物亦同禮於自然此樂也平而不偏正而不回貧且賤不以之去富與貴不以之来顔生得之陋巷而自然殷紂失之北鄙而人哀樂云樂云鐘鼓云乎哉第二以區宇輯寧時要為韻張楷神既和而人不可誣化將兆兮道與之俱故聖人張樂於無聲之境以造化夫寰區樂之作焉所以節百事物既㤀矣於是奉三無其用秩秩其風于于發自靈府達於道樞樂師盈前一作庭政行於靡擊靡考㳙衣在御化成而不曵不婁爰自周隋上達堯禹或理或亂時更萬主誰不欲肅清家邦統一區宇莫能知無聲之樂而政教斯聚慆堙既考於鳴絃節宣豈専乎促柱移風莫大於出令修徳不在乎觀舞故曰猶有五起政之所急徵之則道存微眀行之則人用寧輯所謂君子設法貴與物宜日聞之政四方以寧過此以徃余亦知其不經肆皇家之首出庶物也髙張政典而踈數適中深具揖讓而剛柔洽時且無惉懘之風豈蕩然而不反何異嘽諧之作故賁然以来思是以素王閒居而觀卜商體政以妙願盡趨隅之禮以聞愷悌之要不可以耳察又難以目照方知夙夜之詩遂合無聲之兆一作衡審樂知政賦以善聽其樂能識於政為韻依次用失名昔先王省風作樂象物制典賓讌服禮神歆降戩六代各異五音相演盛衰感召而自生理亂區分而可辨列國殊化化形於聲淫正難分分之者善於是師曠陳樂而立伯牙注耳而聽鐘師擊鐘磬師擊磬考鼓振革撰土木以相宣懸匏一作瓠裁笙發絲竹而逓鎣審正聲之發防奸聲之徑俾夫鄭不干雅正不近佞混音者澄醉歌者醒集九成而儀羽自降立六變而致物斯定惟政在人惟聲無私興亡繫焉逆順應之天將是懲神告勿疑卜商之告文侯古則如此端賜之問師乙歌如何其堂上堂下既獻既酢百拜終禮八音合樂天地潛㑹鬼神相索遂使浃洽充塞馨臭上登和樂無親惟徳是𢎞惉懘無凖惟惡是朋聲雖無常聽其有恒盖致理者妙非習樂者能惡可鑒誡徳可奮興惟周后棄播種黍稷惟文王昌不邇聲色雅頌廢於後昆幽厲隳於正直觀邑人之備樂知天子之深識既而䃂緩有餘其樂只且聲之感化浸潤相於審音達性飛沉翔泳自上化下敢告執政第二以同彼吴札觀樂於魯為韻依次用獨孤申叔樂之為樂也布五氣和八風政之為大也包有截被無窮雖尋源泝異而致用是同故政行而樂作而樂在其中是以重華昭昭兮簫韶若此獨夫靡靡兮顛沛如彼鄭衞作而濮上慄焉絃歌聞而武城樂只為政之善否實由樂之張弛惟審樂之大義其梗槩也如是若乃終始類四維廣大象八區成質文於五色齊宥宻於三無奏宫而君位斯合動商而臣道克符角之鳴人斯度矣徴之應事而形乎理方𤣥氣政亦隂敷彼師曠傾耳而在晉季札發跡而在吴惟樂之道也盖精微於此乎不然何以深聽宻察善惡凶札寂慮居安静志遐觀故將亡之音哀以思至理之感柔而寛是故君子審音以知樂存亡必見乎未兆理亂亦在乎先覺其道亂也憔禮記作噍殺作而繟禮記作嘽慢興其世理也乘一作来騏驎而棲鸑鷟則是政之所以樂亦依於茍聽五聲以悖矣諒八音而忽諸方今九功已成八佾斯舞鼓虙羲之琴瑟植虞舜之干羽故能仁洽道廣澤融徳溥聽之㤀味殊三月之在齊化之式臧寧一變而至魯客有作樂之賦者將含容於上古樂徳教胄子賦以育材訓人之本為韻依次用李彦方王子垂訓導於門子戒驕盈於代禄厲師嚴以成教誨敷樂徳而宣化育長能從而可久㓜能正以不黷恱之以道寧假乎干戚羽旄動之斯和詎資乎匏土革木是知深於樂者豈徒然哉暢生成於夀域導純粹於靈䑓眀眀而六徳是以蕩蕩而群心有開瞻之在前佇將成於國棟由乎充選一作由此而選庶有嗣於鄉材登於雋造釋其奸回聆㫖疑作音乃接武而至樂善而差肩載来且於中者表得中而可尊和者逹至和而不紊繄吾道之克廣諒乃心之是訓青衿選其恱學綘帳資乎待問于以識琬琰之姿于以言始終之訓然則祗者敬也居敬足以修身彝者常也守常而能化人萃群生之濟濟達誘善以循循肅穆以居而文眀有耀條暢斯及而樂教惟新然後以孝友俾其師資春秋則教夙夜惟寅𢎞廣博易良人胥效矣美父母兄弟誰能間之内必成性外無越思匪鏗鏘而感物咸敬順以親師異齊國之聞於宣父叶虞帝之命以后䕫惟徳音之是進豈奸聲之能混入于國學習者由是知歸祭于瞽宗享者於焉報本至哉聖人之設教諒終古而無損第二同前韻羅讓至樂之極兮徳教所畜徳者體中和而定剛柔教者正情性而靖一作端耳目既垂法於國胄亦布政於方族四術允正一作孚三行祗肅所以眀俊選之標表所以致才賢之藴育比師嚴而道尊信仁行而禮復樂正初協司成理該被其風而道其志滌其濫而釋其回持筋骸以固束刷性靈而洞開徳義可依異射宫之取士程凖斯在同杍人諸賦用杍人即椊字俗本多妄改之理材樂且致之行之廣運内無聲以是託表中庸以垂訓在敬遜以務時資端慤而待問斯乃成性所臻斆學相因既廣博而克已抑直易以藩身不待考擊兮教備無假拊搏兮行醇以道應物以樂和人事且符於米廩義且暢於成均將俟乎綺紈之子率變何患乎膏粱之性難馴茍以我於木鐸爾宜必誠必信茍以我於藻鏡爾寧不智不仁庶居之也洩洩諒誨之乎諄諄在聲音之道兮以律度是維諧和是司在徳教之術兮以友敬為儀忠孝為師固捨彼而取此念鑽之而仰之足使放心精正體道希夷罷鏗鏘於師氏識眀命於后䕫寧鼓箧而徒至必摳衣以慎兹俾行乎鄉黨尊尊長長俾立乎黌塾庸庸祗祗夫然則寛愿者日益簡傲者曰損習語舞而殊源敦詩書而異壼斯教也教之至誠天下之本第三同前韻徐至至哉樂為徳也保太和茂生育是以先王法之以成教樂正尊之以示睦將磨琢於仁義匪鏗鏘於匏竹洋洋乎節以恵和煦煦然致其恭肅其儀不忒故容止可觀其道既𢎞乃進退可復信月將而日就庶不諂而不瀆且有教無類道之原来亷讓之風斯扇愷悌之徳不回趨隅以繼其志待問以成其材于以見易和之容参於前也中庸之徳夫何逺哉何必朱干玉戚一起一僨將以宫商克懸角徴潛運鳬趨碧沼皆籍籍於令名魚貫青衿各愔愔於淑問百行由是内融三徳於焉成順俾夫遷善者樂以陳修已者徳以真樂者樂也可以樂其孝友徳者得也可以得其忠臣昔后䕫所以推其典樂虞舜所以稱其聖人豈不以人心感樂樂有其倫者哉今國家徳教綏于九有禮樂達乎四維樸素逺符於軒氏和樂方軼於周詩多士濟濟百寮師師眀誠之徳可見中和之樂在兹自君臣達乎父子性成也何莫由之由之伊何行之非逺亦由端本去末化遐自閫然後外可以維城中可以補衮於與樂乎實教人之大本第四同前韻鄭方國有學家有塾播樂徳之文采率胄子以化育始先激其清濁而後攻其節目鼓箧之士宣聲音以相和函杖曲禮曰函文注或作挟杖之時俾心志而思服語于效疑作郊者執徳不回道以樂者知陽必来盈耳之聲詎作理心之教有開實俎豆之聞矣寧鐘鼓而云哉動於外而暢於中使和其性進以徳而舉以事各盡其材惟其斆學必有謨訓咸養以致和强學以待問觀徳畢賢愚之貫序徳同長㓜之分豈不以樂之至也通乎神教之至也慎乎身惟彼樂之為徳是彰教之有倫不在匏竹設金石振乃貴於祗庸備孝友陳豈不念終始而典學美教化於成均遂乃與誦諷觀屈伸斯可以移風易俗不止於温故知新保和於心暢五聲而授之有道將遜其業崇四術而𢎞之在人厥類可知允懐在兹諒審樂以知政由切問而近思初感至音聽角聲而惻隠變矣終懐雅性聞羽奏而寛大似之且被之以簫管加之以訓辭升學而在於春候合射而戒於秋時然則不教以中和不能知學不教以博依不能安詩是以學者為王化之端樂者繫國風之本故曰觀大學之道然後剛知困而滿知損第五同前韻劉積中惟天恵人惟王司牧必資立樂以化被聚賢而政肅樂垂六徳允接於生靈人抱七情於是乎修睦故命樂官宣樂徳之㫖教國子俾國人思服施行而萬邦作乂動蕩而羣生茂育原其詔司樂闢靈臺選國中之胄子集宇内之瓌材示中和於前俾行而不怠尊祇庸於次將守而不回實克孝而克友必無間而無猜緬􅄨謨猷眀徴義訓樂同和而㑹極綱有條而不紊中為忠告俾邪者奉忠格之心和乃適正制剛者守調適之分非有象以外感乃無聲而潛運祇敬不逾疑庸言是尊率威儀而允淑致言行之惟醇睦烝烝之孝誠全乎天性勗怡怡之友義原乎天倫設教之規爰立列樂之事方陳是將崇徳教播成均議道自已建中于人夫就學必時為樂在兹春誦夏絃順陽而樂功猶懋無虐無傲率下而樂徳増丕所以舜命伯伯讓䕫立之以四教道之以六詩然後學制敦浹國經允釐通至性於倫理垂善教於師資慕其人則遐不謂矣仰其教則學以知之方今政舉道光文修武偃播崇徳為宣風之始訓國子為化人之本忝承教之在躬庶聲名之不逺第六同前韻杜周士國家自誠而眀講信修睦既移風以設教每登賢而制禄由是命司樂之職率一作掌彼成均教舞勺之童取諸鄉族常徳咸事庸言可復納諸軌物則物有其容攝以威儀則儀無不淑日就月將不疾而速于以見中和之教克修杞梓之材可育觀鼓箧請益攝齊員来嚴師尊道至矣休哉捧函丈之筵無思不厭聽撞鐘之問有說心疑作必該心不忘於翼翼視有主於梅疑梅審依仁即童䝉之求我語成器如杍人注在前篇之禮疑作理材且鼓舞鏗鏘徒聞於物格興道諷誦亦資於釋回豈如中以理心和而適分敬居簡而可久徳有常而不紊孝寔天經友為義訓本其至也可以􅄨天地之情引而伸之可以暢雍熈之運則知通一作敦和章徳在聖與仁革蒙惑於初志致輝光於日新于以代天工則庶績時序于以施邦教則百姓皆淳斯可為理以樂成俗師以賢得人於戯至教在兹無從匪彞合游洋以来學任道徳而為資孝友祇庸則無不順者自上下下可咸使由之夫然則樂之教也義㣲而婉以八音為制以六徳為本既履孝而資忠宜任重而道逺若然者安得不慎其終而思其反者也文苑英華巻七十六
