body:
  text: 文苑英華巻七百九十六宋李昉等編傳無心子傳一首負笭者傳一首仲長先生傳一首五斗先生傳一首強居士傳一首醉吟先生傳一首江湖散人傳一首甫里先生傳一首書李賀小傳後一首李夫人傳一首楊烈婦傳一首竇烈女傳一首趙女傳一首無心子傳并序王勣集作績東臯子始仕以醉懦罷鄉人或誚之東臯子不屑也退著無心子以見趣焉集作云無心子寓居於越越王不知其天人也拘之仕無喜色泛越集此無字若而從越國之式新唐書作法集作載曰有穢行者不恥俄而無心子者以穢行聞於王王黜之無愠色退而將逰于茫蕩之野適勣之邑而遇機士機士撫髀而歎者三曰嘻子賢者而以罪癈無心子不應機士曰願受教無心子曰爾聞蜚亷氏之馬説乎昔者蜚廉氏有二馬一者朱鬛白毳龍骼集作體鳯臆驟馳如舞終日不釋鞍竟以熱集作藝死一者重脛昻尾駞頸貉踶齧善蹶棄而散諸野終年肥遁是以鳯凰不憎山栖蛟龍不羞泥蟠君子不茍㓗以罹患聖人不避穢而飬生唐書作清東臯聞之曰善哉不可以加之矣負笭者傳前人昔者文中子講道於白牛之溪弟子捧書北靣環堂成列講罷程生薛生退省于松下語及周易薜收嘆曰不及伏羲氏乎何詞之多也俄而有負笭者皤皤然委擔而息曰吾子何嘆也薛生曰叟何為者而徵吾歎負笭者曰夫麗朱者丹附墨者黒盖累漸而得之也今吾子所服者道而猶有嘆是六府五藏不能無受也吾是以問生曰收聞之師易者道之藴也伏羲氏畫八卦而文王繫之不逮省乆文粹作文矣一作文王繫辭之不逮者乆矣以為文王病也吾是以嘆集作疑負笭者曰文王焉病伏羲氏病甚者也昔者伏羲氏未畫卦也三才其不立乎四序其不行乎百物其不生乎萬象其不森乎何勞乎而費畫也一作事畫自伏羲氏洩道之密漏神之機分張大和磔裂元氣使天下智詭之道迸出曰我善言篆而識物情隂陽相磨逺近相取作為剛柔同異之説以駭人志於是智者不知而大朴散矣則伏羲氏始兆亂者也安得羸嘆而嗟文王乎負其笭而行追而問之居與姓字集本文粹作名不答而去文中子聞之曰隱者也仲長先生傳前人先生諱子光字不曜自云洛陽人也往來河東傭力自給無室廬絶妻子開皇末始菴河渚間以息身焉十餘年集有間以二字賣藥為業人莫知之也汾隂侯生以筮著集有名字因㳺河渚一覩而伏集作服曰東方朔管輅不如也由是顯重守令至者皆親謁先生辭以瘖疾未嘗交語著獨遊頌及河渚先生傳以自喻識者有以知其懸觧也人有請道者則書老易二字示之彈琴餌藥以終其世文中子比之虞仲夷逸五斗先生傳前人有五斗先生者以酒徳遊於人間有以酒請者無貴賤皆往往必醉醉則不擇地斯􅃦矣醒則復起飲也常一飲五斗因以為號焉先生絶思慮寡言語不知天下之有仁義厚薄也忽焉而去倐然而來其動也天其靜也地故萬物不能縈心焉嘗言曰天下大抵可見矣生何足集作為飬而稽康著論途何為窮而阮籍慟哭故昬昬黙黙聖人之所居也遂行其志不知所如强居士傳釋皎然人生性靜而遷乎可欲可欲萌乎憂喜者病之源一作原也故至人觀其靜見萬物之真觀其動見萬物之通客有强君隱士之儔也理照淈俗寄於和扁之伎而時人無能知者予嘗問君以醫之術君對曰夫妙有統於心而通於物理其靜為性其照為覺覺也者日月之謂乎性也者太虚之謂乎故理世為儒可以敷五典理性為釋可以越四荒一作四流理病為醫可以空六腑使定命可逭業疾可亡而世教罕能代之故醫王未悉辨也子曰至哉斯言命小子志之醉吟先生傳白居易醉吟先生者忘其姓字鄉里官爵忽忽不知吾為誰也宦遊三十載將老退居洛下所居有池五六畆竹數千竿喬木數十株臺榭舟橋具體而㣲先生安焉家雖貧不至寒餒年雖老未及昏耄性嗜酒躭琴滛詩凡酒徒琴侣詩客多與之遊遊之外栖心釋氏通學小中大乘法與嵩山僧如滿為空門友平泉客韋楚為山水友彭城劉夣得為詩友安定皇甫朗之為酒友每一相遇欣然忘歸洛城内外六七十里間凡觀寺丘墅有泉石花竹者靡不遊人家有美酒嗚琴者靡不過有圖書歌舞者靡不觀自居守洛川洎布衣家以宴遊召者亦時時往每良辰美景或雪朝月夕好事者相遇集作過必為之先拂酒罍次開詩箧詩酒既酣乃自援琴操宫聲㺯秋思一遍若興發命家僮調法部絲竹合奏霓裳羽衣一曲若歡甚又命小妓歌楊栁枝新詞十數章放情自娯酩酊而後已往往乘興屨一作履及鄰杖於鄉騎逰都邑肩轝適野轝中置一琴一枕陶謝詩書數巻轝竿左右懸雙酒壺尋水望山率情便去抱琴引酌興盡而返如此凡十年山間二字集作其間日賦詩約千餘篇日釀酒約數百斛而十年前後賦釀者不與焉妻孥弟姪慮其過也或譏之不應至再至三乃曰凡人之性鮮得中必有所偏好吾非中者也設不幸吾好利而貨殖焉以至于多藏潤屋賈禍危身柰吾何設不幸吾好博奕一擲數萬傾財破産以至於妻子凍餒柰吾何設不幸吾好藥損衣削食錬鉛燒汞以至于無所成有所誤柰吾何今吾幸不好彼而自適盃觴諷詠之間放即集作則放矣庸何傷乎不猶愈於好彼三者乎此劉伯倫所以聞婦言而不聼王無功所以遊醉鄉而不還也遂率子弟入酒房環釀甕箕踞仰靣長吁太息曰吾生天地間才與行不逮於古人逺矣而富於黔婁夀於顔回飽於伯夷樂於榮啟期健於衞叔寳幸甚幸甚餘何求哉若捨吾所好何以送老因自吟詠懐詩云抱琴榮啟樂縱酒劉伶逹放眼㸔青山任頭生白髮不知天地内更得㡬時集作年活從此到終身盡為閒日月吟罷自哂揭甕撥醅又飲數盃兀然而醉既而醉復醒醒復吟吟復飲飲復醉醉吟相仍若循環陶陶然昏昏然不知老之將至古所謂得全於酒者故自號為醉吟先生于時開成三年先生之齒六十有七鬢集作鬚盡白髮半秃齒雙缺而觴詠之興猶未衰顧謂妻子云今之前吾適矣今之後吾不自知其興如何江湖散人傳陸龜䝉散人者散誕之人也心散意散形散神散既無覊限為時之怪民束於禮樂者外之曰此散人也散人不知恥乃從而稱之人􅂉笑曰彼病子之散而目之子反以為其號何也散人曰天地之文粹無之字大者也在太虚中一物耳勞乎覆載勞乎運行差之晷度寒暑錯亂望斯須之散其集作而可得耶水土之散稽有用乎水之散為雨為露為霜為雪水之局為瀦為洳為潦為汙土之散封之可崇穴之可深生可以藝死可以入土之局塤不可以為埞集作埏甓集作瑶不可以為盂得非散能通於變化局不能耶退若不散守名之筌進若不散執時之權筌可守耶權可執耶遂為散歌散詠集作傳以志其散甫里先生傳甫里先生者不知何許人也人見其耕於甫里故云甫里松江上村墟名先生性野逸無覊檢好讀古聖人書探六籍識大義就中樂春秋抉擿㣲㫖見有文中子王仲淹所為書云三傳作而春秋散深以為然貞元中韓晉公嘗著通例刻之于石今在閏州文宣王廟意以是學為己任而顛倒漫漶翳塞無一通者殆將百年人不敢指斥疵類先生恐疑誤後學乃著書摭而辨之先生平居以文章自怡雖幽憂疾痛中茫集作落然無旬日生計未嘗暫輟㸃竄塗抹者紙札相壓投于箱篋中歴年不能淨冩一本或為好事者取去後於他人家見亦不復謂已作矣少攻一作工歌詩欲與造物者争柄遇事輙變化不一其體裁始則凌轢波濤穿穴險固囚鏁恠異破碎陣敵卒造平淡而後已好㓗几格音閣䆫户硯席剪然無塵埃得一書詳熟然後寘于方冊值本即校不以冄三為限朱黄二毫未嘗一日去手所藏雖少咸精實正定可傳借人書有編簡斷壊者緝之文字繆誤者刋之樂聞人為善講評通論不倦有無賴者毁折糅汙或藏去不返先生蹙然自咎先生貧而不言利問之對曰利者商也人既士矣柰何亂四人之業乎且仲尼孟軻氏之所不詳先生居有地數畆有屋三十楹有田畸十萬歩呉田一畆當二百五十歩有牛減集作咸四十蹄有耕夫百餘指而田汙下暑雨一晝夜則與江通也集無也字無别集有他字田也先生由是苦饑困倉無升斗蓄積乃躬負畚鍤率耕夫以為具具區之具集作具區由是嵗波雖狂不能跳吾防溺吾稼也或譏刺之先生曰堯舜黴瘠大禹胝胼彼聖人也集作焉非聖人耶集作無此四字吾一布衣耳不勤劬何以為妻子之天乎且與其蚤虱名器雀䑕倉庾者如何哉先生嗜茶荈置小園於顧渚山下山在呉興嵗貢茶之所嵗入茶租十許薄為甌蟻之費集作蟻之實自為品第書一篇繼茶經茶訣之後茶經陸季庇撰茶訣釋皎然述南陽張又新嘗為水説集作記凡七等其二曰慧山寺石泉在無錫縣出其三曰虎邱四石井其六曰呉松江是三水距先生逺不百里高僧逸人時致之以助其好先生始以喜酒得疾血敗氣索者二年然後能起有客至亦㓗樽置觴集作觶但不復引滿向口耳性不喜與俗人交雖詣集作訪門不得見也不置車馬不務慶吊内外姻黨伏臘䘮祭未嘗及時往或寒暑得中體佳集作性無事時則乘小舟設蓬蓆賫一束書茶竈集作爐筆牀釣具櫂船郎而已所詣小不㑹意徑還不留雖水禽决起山鹿駭去之不若人謂之江湖散人先生乃著江湖散人傳而歌詠之由是渾毁譽不能入利口者亦不復致意先生性狷急遇事發作輙不含忍尋復悔之屢改不能乆集作矣先生無大過亦無出入人事不傳姓名無有得之者豈涪翁漁父江上丈人之流者乎書李賀小傳後玉溪生傳李賀云集作字長吉常時旦日出遊從小奚奴騎距驢背一古破錦囊遇有所得即書投囊中暮歸足成其文余為兒時在溧陽聞白頭書佐言孟東野貞元中以前秀才家貧受溧陽尉溧陽昔為平陵句絶縣南五里有投金瀬瀬八里許道東有故平陵城周千餘歩基阯陂陁裁高三四尺而草木勢甚盛率多大櫟合數十集作夫抱藂蓧䝉翳如塢如洞地窪下積水沮洳深處可活魚鼈軰大抵幽䆳岑寂氣候古澹可喜集作嘉除里民樵罩外無入者東野得之忘歸或比日或間日乘驢後集作領小吏經驀投金渚一往至得䕃大櫟隱嵓集作藂蓧坐于積水之傍吟到日西還爾後衮衮去曹務多弛廢令季躁集作秃懆卞急不佳東野之為立白王府請以假尉代東野分其俸以給之東野竟以窮去吾聞滛畋漁者謂之暴天物天物既不可暴又可抉擿刻削露其情狀乎使自萌卵至于槁死不能集作得隱伏天能不致罰耶長吉夭東野窮玉溪生官不掛朝籍而死正坐是哉正坐是哉李夫人傳華外祖故貴鄉丞范陽盧君諱善觀夫人李華夫人趙郡李氏諱某字某號惠日自後魏義豐懿公璨七代至明經君𤣥福道義徳禮歸于一門魏史所謂事親孝謹風度審正是也年十三歸于貴鄉丞范陽盧公善觀姑崔夫人待子婦甚嚴年高多疾自夫人奉飬體氣日和姑視夫人愛子如也夫人奉飬姑慈親如也撫下掩其小過因而誨之則大過無從生矣姑怒責㓜賤夫人則詭請曰此誠違教尊宜降責新婦不安請引外懲恥既而輕罰復命姑或未厭則曰責誠未塞伏以尊慈恐他日追憐傷尊之心崔夫人撫而笑曰李新婦不唯安吾兼變吾性自是委以家政其柔明婉敏皆此類也盧公嘗為宕州司法叅軍夫人隨官西南羗戎不知長㓜之别夫人之威儀敬順聞於殊俗羗戎化焉大夫人因疾䘮明夫人奉衣則安奉膳則飽每曰此女在側吾忘失明及居憂泣血三年終身衘戚讀論語詩書禮傳古史箴頌近世詞賦合於雅者盡諷之善皷琴幽閑自娯志普門之教肹蠁符應六姻孤㓜歸夫人者如不孤焉開元元年終春秋五十無子有女一人孝慈明惠如夫人之德歸于安邑令趙郡李公遺孤檢校吏部員外華不及逮事感慕罔極聞於外家十不存一哀書大畧敢告史官楊烈婦傳李翺建中四年李希烈䧟汴州既又將盗陳州分其兵數千人抵項城縣盖將掠其玉帛俘纍其男女以㑹於陳州縣令李侃不知所為其妻楊氏曰君縣令也冦至當守力不足死焉職也君如逃則誰守侃曰兵與財皆無將若何楊氏曰如不守縣為賊所得矣倉廪皆其積也府庫皆其財也百姓皆其戰士也國家何有奪賊之財而食其食重賞以令一作合死士其必濟於是召胥吏百姓於庭楊氏言曰縣令誠主也雖然嵗滿則罷去非若吏人百姓然吏人百姓邑人也墳墓存焉冝相與致死以守其邑忍失其身而為賊之人耶衆皆泣許之乃狥曰以瓦石中賊者與之千錢以刀矢兵刃之物中賊者與之萬錢得數百人侃率之以乘城楊氏親為之㸑以食之無長少必周而均侃使與賊言曰項城父老義不為賊矣皆悉力守死得吾城不足以威不如亟去徒失利無益文粹作為也賊皆笑有飛箭集于侃之手侃傷而歸楊氏責之曰君不在則人誰肯固矣與其死於城上不猶愈於家乎侃遂忍之復登陴項城小邑也無長㦸勁弩高城深池集作溝之固賊氣吞焉遂率其徒將超城而下有以弱弓射賊者中其帥墜馬死其帥者希烈之子壻也賊失勢因集作遂相與散走項城之人無傷焉刺史上侃之功詔遷絳州太平縣令楊氏至茲猶存人之受氣於天其何不同也婦人女子之徳奉父母舅姑盡恭順和於娣姒於卑㓜有慈愛而能不失其貞者則賢矣至於辦行陣明攻守勇烈之道此固公卿大臣一作夫之所難厥自兵興朝廷注意寵旌守禦之臣慿堅城深池之險儲蓄山積貨財自若冠冑服甲負弓矢而馳者不知㡬人其勇不能戰其志不能守其忠不能死棄城而去有矣彼何人哉若楊氏者婦人也孔子曰仁者必有勇楊氏當之矣李翺二字集粹作賛曰凡人之情皆謂後來者不及於古之人賢者自古亦稀况集無况字獨後代耶及其有之與古人不殊也若高愍女楊烈婦者雖古烈女其何加焉予懼其行事湮㓕而不傳故皆叙之將告於史官竇烈女傳杜牧烈女姓竇氏小字桂娘父良建中初為汴州户曹掾桂娘美顔色讀書甚有文李希烈破汴州使甲士至良門取桂娘以去將出門顧其父曰慎無戚必能滅賊使大人取富貴於天子桂娘既以才色在希烈側復能巧曲取信凡希烈之密雖妻子不知者悉皆得聞希烈歸蔡州桂娘嘗謂希烈曰忠而勇一軍莫如陳先竒其妻竇氏先竒寵且信之願得相徃來以姊妹叙齒因徐説之使堅先竒之心希烈然之桂娘集有因字以姊事先竒妻嘗間謂曰賊兇殘不道遲晩必敗姊宜早圖遺種之地先竒妻然之興元元年四月希烈暴死其子不發䘮欲盡誅老將校以卑少者代之計未决有獻含桃者桂娘白希烈子請分遺先竒妻且以示無亊於外因為蠟帛書曰前日已死殯在後堂欲誅大臣希烈僣敗曰臣湏自為計以朱染帛丸如含桃先竒發丸見之言於薛育曰兩日希烈稱疾但恠樂曲雜發晝夜不絶此乃有謀未定示暇於外事不疑矣明日先竒薛育各以所部兵譟於衞門請見希烈希烈子迫出拜曰願去偽號一如李納時正已死納代為帥先竒曰爾父悖逆天子有命因斬希烈及妻子凾匕首以獻暴其尸於市后兩月呉少誠殺先竒知桂娘謀因亦殺之請試論之希烈負桂娘者但刼之耳希烈僣而桂娘妃復寵信之於女子心始終希烈可也此誠知所去所就逆順輕重之理明也能得希烈權也娣先竒妻智也終能滅賊不顧其私烈也六尺男子有祿位者當希烈叛與之上下者衆矣此豈才力不足耶蓋義理茍至雖一女子可以有成大和元年予客遊涔陽路出荆州松滋縣攝令王湛集作淇下同為某言桂娘事湛年一十嵗能念五經舉童子及第時年七十五尚可日記千言當建中亂希烈與李納田悦朱泚朱滔等僣詔書檄争戰勝敗地名人名悉能記之聽說如一二日三字集作一日前言竇良出於王氏實湛之堂姑子也趙女傳皮日休趙氏女山陽之鹽山人其父貿鹽盗出其息不納有司賦官捕得法當死簿音部已伏就刑有日矣趙氏女求見䀋鐵官泣愬于庭曰某七嵗而母亡䝉父私盗官利衣食某身為生厚矣今父罪根露某當隨坐法若不可官能原乎原之不能請隨坐之法官清河崔遽義之曰固當三字集作固為減死論趙氏大泣曰某之身前則父所育今則官所賜誓集作願去髮學釋氏以報官徳自以女子之言難信因出利刃于懷立截其耳以盟必然崔益義之竟全其父命趙氏侍父刑疾愈因訣歸浮屠氏舍日休曰古者救危拯禍必先示信至夫家全國完則隨而乖其盟如趙氏一乳臭女子耳繼死請父命孝也自刑以盟言信也秉孝植信高蹈於世㓗乎瑾瑜不足為其貞芬乎􅉅蘭不足為其秀與夫古之救危拯禍者逺矣今之士見難不立其節見安不償其信者其趙女之刑人乎噫後之脩女史者幸無忘耶文苑英華巻七百九十六
