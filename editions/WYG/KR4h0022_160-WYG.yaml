body:
  text: 文苑英華卷一百六十宋李昉等編地部二南岳三首廬山四首望夫山五首歸山七首山中十六首雜題十四首南岳至湘州望南岳吳均重波淪且直連山斜復紛鳥飛不復見風聲猶可聞朧朧樹裏月飄飄水上雲長安逺如此無縁得報君望南岳杜甫南岳配朱鳥秩禮自百王歘吸領地靈鴻洞半炎方邦家用祀典在徳非馨香巡狩何寂寥有虞今則亡洎吾隘世網行邁越瀟湘渇日絶壁出􅃞舟清光旁祝融五峯尊峰峰次低昂紫葢獨不朝争長嶪相望恭聞魏夫人羣仙夾翺翔有時五峰氣散風如飛霜牽迫限修途未暇杖崇岡歸來覬命駕沐浴休玉堂三歎問府主曷以贊我皇牲璧忍衰俗神其思降祥遊南岳張喬入巖仙境清行盡復重行若得閒無事長來寄此生澗松閒疑易老籠燭晩生明一宿泉聲裏思鄉夢不成廬山出守豫章郡途次廬山入東巖下作張九齡茲山鎮何所乃在澄湖隂下有蛟螭伏上與虹蜺尋靈仙未始曠窟宅何期集作其深雙闕出雲峙三官集作宫入烟沉攀崖猶昔境種杏非舊林想像終古跡怊集作惆悵獨往心紛吾嬰世網數載忝朝簮孤根自靡托量力况不任多謝周身防常恐横議侵豈能鴛鸞别集作鵷鴻列惕如泉壑臨迨臨集作茲刺江郡來此滌塵襟有趣逢樵客忘懐狎野禽棲閒義未果用拙歡在今願言答休命歸事丘中琴發湓城浦望廬山集作初晴直省齋勅催赴江隂十字李嘉祐西望香爐雪千峰晩色集作照新白頭悲作吏黄紙苦催人多負登山屐深藏漉酒巾傷心公府内手板日相親和段校書冬夕寄題廬山劉得仁名高身未到此恨蓄多時是夕吟因話他年必去隨當時廬岳頂半入楚江湄幾處懸崖上千尋瀑布垂鑪峰松淅瀝湓浦棹參差日色連湖白鐘聲拂浪遲煙梯縁薜荔岳寺步欹危地本饒靈草林曽出祖師石樓霞耀壁猿樹鶴分枝細徑縈巖末高窓見海崖嵌空寒更極寂寞夜尤思隂谷氷埋木仙田雪覆芝亂泉禪客瀬疑作漱異跡逸人知蘇室新開竈檉潭未了碁如何遂閒放長得任希夷空務漁樵事方無道路悲謝公臺尚在陶令柳潜衰塵外難相許人間貴迹遺雖懐丹桂影不忘白雲期仁者終携手今朝預賦詩廬山王貞白嶽立鎮南楚雄名天下聞五峰高閡日九疊翠連雲夏谷雪猶在隂巖晝不分唯應嵩與華清峻得為羣望夫山望夫山李白寫集作顒望臨碧空怨情感離别江草不知愁巖花但争發雲山萬重隔音信千里絶春去秋復來相思幾時歇望夫石前人髣髴古容儀含愁帶曙輝露如今日淚苔似昔年衣有恨同湘女無言類楚妃寂然芳靄内猶若帶一作待夫歸同前武元衡佳人集作名望夫處苔蘚封孤石萬里水連天巴山暮雲碧湘妃淚竹下成林集作下竹成班子規夜啼江水深集作樹白望夫山正對和州郡樓劉禹錫終日望夫夫不歸化為孤石苦相思望來已是幾千載祗是當年集作時初望時同前前人何代提戈去不還獨㽞形影白雲間肌膚銷盡雪霜色羅綺㸃成苔蘚斑江鷰不能傳逺信野花空解妬愁顔近來豈少征人婦笑採蘼蕪上北山歸山歸嵩山作王維晴川帶長薄車馬去閒閒流水如有意暮雲集作禽相與還荒城臨古渡落日滿秋山迢逓嵩集作高山下歸來且閉闗歲暮歸南山孟浩然北闕休上書南山歸敝廬不才明主棄多一作卧病故人疎白髮催年去青陽逼歲除永懐愁不寐一作寢松月夜窓虚夜歸鹿門山歌前人山寺鐘鳴晝已昏漁梁渡頭争喧集作渡喧人隨沙道集作路向江村余亦乗舟歸鹿門鹿門月照開煙樹忽辨集作到龎公栖隠處巖扉草文粹作松徑四字集作樵逕非長寂寞唯有幽人夜來去冬日歸舊山李白未洗染塵纓歸來芳草平一條藤逕緑萬㸃雪峰晴地冷葉先盡谷寒雲不行嫩篁侵舎宻古樹倒江横白犬離村吠蒼苔壁上生穿厨孤雉過臨屋舊猿鳴木落禽巢在籬疎獸路成拂床蒼一作山䑕走倒箧素魚驚洗硯脩良策敲松擬素貞此時重一去去合到三清歸山作釋䕶國喧静各有路偶隨心所安縱然在朝市終不忘林巒四皓將拂衣二疏能掛冠牕前隠逸傳每日時三㸔靳尚那可論屈原亦可歎至今黄泉下名及青雲端松牖見初月花間禮古壇何處論心懐世上空漫漫歸舊山張喬昔年山下結茅茨村落重來野徑移樵客相逢悲往事鄰生閒坐問歸期異藤遍樹無空處幽草縁溪少歇時此景一抛吟欲老可能文字聖朝知自歸山陳陶海嶽南歸逺天門北望深暫為青瑣客難换白雲心富貴老閒事猿猱思舊林清平無樂志一作道罇酒有瑶琴山中山中集作未婚山中叙志王績物外知何事山中無所有風鳴静夜琴月照方春集作罇酒直置百年内誰論千載後張鳯集作奉娉賢妻老萊藉嘉偶孟光儻未嫁梁鴻正湏婦羇卧山中盧照隣卧壑迷時代行歌任死生紅顔意氣盡白璧故交輕澗户無人迹山窓聴鳥聲春蘚縁巖上寒光入溜平雪盡松帷暗雲開石路明夜伴饑鼯宿朝隨馴雉行度溪猶憶處尋洞不知名紫書長自集作日閲丹藥幾年成撞鐘鳴天鼓燒香厭地精倘過集作遇浮丘鶴飄飄凌太清早秋山中作王維無才不敢累明時思向東溪守故籬不集作豈厭尚平婚嫁早却嫌陶令去官遲草間蟲集作蛩響臨秋急山裏蟬聲薄暮悲寂寞柴門人不到空林獨與白雲期集作歸落日憶山中李白雨後煙景緑晴天散餘霞東風隨春歸發我枝上花花落時欲暮見此令人嗟願遊名山去學道飛丹砂山中作馮道之一作用之草堂在巖下卜居聊自適桂氣滿堦庭松隂生枕席逺瞻惟鳥度旁信無人跡靄靄雲生峰潺潺水流石頗尋黄卷理庶就丹砂益此即契吾生何為苦塵役同前沈千運棲隠别無事所願早離塵不辭城邑遊禮樂拘束人邇來歸山林庶事皆吾身何者為形骸誰辨文粹作是智與仁寂寞了閒事然後知天真咳唾矜文粹作驚榮華迂俯相屈伸何如巢與由天子不得臣同前顧况野人愛向山中宿况在葛洪丹井西庭前有箇長松樹半夜子規來上啼五字一作山中啼子規此詩三百二十九巻重出今已削去山中作春夜張籍寂寞山集作春景静幽人歸卧遲移集作横琴當月下漉集作壓酒及花時新露冷茆席集作濕茅屋暗泉衡竹籬西峰採藥伴此夕恨無期山中自述于鵠三十無名客空山獨卧秋病多知藥性年長信人愁螢影竹窓下松聲茅屋頭近來心更静不夢世間遊秋日山中姚合秋來長早起拄杖繞堦行風冷衣裳脆天寒筆硯清臨書愛竒跡避酒怕狂名不擬隨麋鹿山中過一生秋夜山中述事薛能初宵門未掩獨坐對霜空極目故鄉月滿溪寒草風樵聲當嶺上僧語在雲中正恨歸期晩蕭蕭聞塞鴻山中作項斯青􅇫林疎亦有人一渠流水數家分山當日午移峯影草帶泥痕過鹿羣蒸茗氣衝茆屋出繅絲聲隔竹籬聞行逢賣藥歸來客不惜相隨入白雲山中冬夜張喬寒葉風摇盡空林鳥宿稀澗氷妨鹿飲山雪阻僧歸夜坐塵心定長吟語力微人間去多事何處夢柴扉山中言事方干日與村家事漸同燒畬集作松掇茗學隣翁池塘月動集作撼芙蕖浪牖集作窓户凉生薜荔風書幌晝昏嵐氣裏巢枝俯集作夜折雪聲中山隂釣叟無知已窺鏡撏多鬢欲空山中司空圖全家與我戀孤岑蹋得蒼苔一徑深逃難人多分隟地放生鹿大出寒林名應不朽輕山骨理到忘機近佛心昨夜前溪驟雲集作雷雨晩晴獨步數峰吟同前曹松要路豪家非往還巖門先有不曽闗衆心惟恐地無剰吾意亦憂天惜閒白練曳泉窓下石絳羅垂果枕前山樵夫豈解營生業貴欲自安麋鹿間雜題守山東沈約守山東山東萬籟類聚作嶺欝青葱兩壑共一瀉水潔望如空崖側青莎被巖間丹桂叢上瞻既隠軫下睇亦溟濛逺林響咆獸近樹聒鳴蟲路出若谿右類聚作古澗吐金華東萬仞倒危石百丈注懸淙掣曳冩流電奔飛似白虹洞井含清氣漏穴吐飛風玉竇高滴瀝石乳室空籠余平生之所愛歘暮年之逢此欲一去而不還悵鄒衣之未褫秩滿撫白雲淹留事芝髓留真人東南還前人連峰竟無已積翠逺微微寥唳野風急芸黄秋草腓我來歲云暮於此悵懐歸霜雪方共下寧唯止露衣待余兩岐成去去掩柴扉和宇文内史春日遊山庾信遊客值春輝金鞍上翠微風逆花迎面山深雲濕衣鴈持一足倚猿將兩臂飛戍樓侵嶺路山村落獵圍道士封君逹仙人丁令威煑丹於此地居然未肯歸賦得山卦名張正見蓬萊遯羽客巖穴轉䝉籠雲歸仙井暗霧解石橋通影帶臨峰鶴形隨雜雨風尋思不失路咸欲馭飛鴻賦得往徃孤山映蕭詮青山照落暉映逺望連飛仙峰㸔玉笥闗路視金微鼓吹聲疑盡香爐煙覺稀共君臨水别勞此送將歸夜作巫山崔仲方荆門秋水急巫峽斷雲卿一作輕若為教月夜長短聴猿聲南隠遊泉山孔徳紹名山狎招隠俗外逺相求還如倒景望忽似閬風遊臨崖俯大壑披霧仰飛流歲積松方偃年深椿欲楸野花開石鏡雲葉掩山樓何湏問方士此處即瀛洲過東山谷口盧照隣不知名利險辛苦滯皇州始覺風塵倦歸來事緑疇桃源迷處所桂樹可淹留跡異人間俗禽同海上鷗古苔依井被新乳傍涯一作崖流野老堪成鶴山神或化鳩泉明碧澗底花落紫巖幽日暮飡龜殻天寒御鹿裘不辨秦將漢寧知春與秋多謝青浦客去去赤松遊遊禹穴宋之問禹穴今晨到耶溪此路通著書聞太史錬藥有仙翁鶴往韻集作籠猶掛龍飛劒似集作已空石帆摇海上天鏡落湖中水底寒雲白山邊墜葉紅歸舟何慮晩日暮使樵風遊陸渾南山自歇馬嶺到楓香林以詩代書答李舍人適前人晨發歇馬嶺遥望伏牛山孤出羣峰首熊熊元氣間太和亦崔嵬石扇集作扉横閃倐細岑互攅倚浮巘競奔蹙白雲近入懐青雲近可掬集作青靄濃盈掬徒尋靈異跡集作我從尋靈異周顧惬心目晨拂鳥路行暮投人煙宿此下集有粳稻逺彌秀栗芋新秋熟石髓非一巖藥苗乃萬族二十字間闗踏集作蹋雲雨繚繞縁水木西見商山芝南到楚鄉竹楚竹幽且深半雜楓香林浩歌清潭集作楓香曲寄爾桃源心至陵陽山登天桂石酬韓侍御見招隠黄山李白韓衆騎白鹿西往華山中玉女十集作千餘人相隨在雲空見我傳秘訣精誠與天通何意到陵陽遊目送飛鴻天子昔避狄與君亦乗騘擁兵玉集作五陵下長策遏胡戎時泰解繡衣脱身若飛蓬鸞鳳翻羽翼啄粟坐煩集作樊籠海鶴一笑之思歸向遼東黄山過石柱巘㠋上攅叢因巢翠玉樹忽見浮丘公又引王子喬吹笙舞松風朗詠紫霞篇情闗集作請開蘂珠宫步岡繞碧落倚樹招青童何日可携手遺形入無窮焦山杳望松寥山前人石壁望松寥寂集作宛然在碧霄安得五彩虹駕天作長橋仙人如愛我攀集作舉手兩相招鄒衍谷前人燕谷無煖氣窮巖閉嚴隂鄒子一吹律能廻天地心銅官山醉後前人我愛銅官樂千年未擬還要須廻舞袖拂盡五松山文苑英華卷一百六十
