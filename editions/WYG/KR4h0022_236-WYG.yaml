body:
  text: 文苑英華巻二百三十六宋李昉等編寺院四塔附盧綸八首韋應物七首嚴維三首戴叔倫二首崔峒六首權德輿二首戎昱一首李涉二首張暈一首李正封二首羅烱一首朱放二首徐嶷一首房融一首劉三復一首于鵠三首陳潤一首朱長文一首釋靈一八首釋皎然十首王建二首春日陪李庶子遵善寺東院曉望盧綸映竹水横集作田分當山起雁群陽峯髙對寺隂井下通雲雪盡集作晝唯逢鶴花時此見君由來禪誦地多有諸公文宿澄集作程上人院前人竹牕聞逺水月出似溪中香覆經年火幡飄後夜風性昏知道晩學淺喜一作豈言同一悟歸身處何山路不通同崔峒慈恩寺避暑前人寺凉髙樹合卧石緑雲中伴鶴慙仙侣依僧學老翁魚沉荷葉露鳥散竹林風始悟塵居者應將大宅同題雲際寺上方前人松髙蘿蔓輕中有石床平下界水長急上方燈自明空門不易啟初地本無程廻步忽山盡萬縁從此生寳泉寺送李益端公歸邠寧幕前人參差巖嶂東雲日晃龍宫石净非因雨松凉不為風戀泉將鶴並偷果與猿同眼界塵雖染心源蔽一作路巳通蓮花國何限貝葉字無窮早晩登麟閣兹門欲付公登西集作棲巖寺前人林香雨氣新山寺緑無塵遂結雲外侣集作賞共逰天上春鶴鳴金閣麗僧話集作語竹房隣待月水流急惜花風起頻何方非壊境此地有歸人廻首空門外皤然一幻身宿定陵寺寺在陵内前人古塔荒臺出禁牆磬聲初盡漏聲長雲生紫殿幡花濕月照青山松栢香禪室夜聞風過竹一作燭奠筵朝啟露霑裳誰悟威靈同寂滅更堪砧杵發昭陽夜投豐德寺謁海集作液上人前人半夜中峯有磬聲偶尋樵者問山名上方月晩集作日曉聞僧話一作語下路林踈見客行野鶴巢邊松最老毒龍潜處水偏清願得逺公知姓字焚香洗鉢過浮生逰開元精舍韋應物夏衣始輕體逺集作逰步愛僧居果園新雨後香臺照日初緑隂生晝寂孤花表春餘符竹方為累形跡一來踈寓居永定精舍前人政拙忻罷守閒居初理生家貧何由往夢想在京城野寺霜露月晨興覉旅情聊租二頃田方課子弟耕眼暗文字廢身閒道心清集作精即與人羣逺豈為集作謂是非嬰與盧陟同逰永定寺北池僧舍集作齋前人竹逕集作宻竹行已逺子規啼更深緑池芳草氣寒齋春樹隂暗絲集作晴蝶飄蘭徑㳺蜂繞花心不遇君携手誰復此幽尋荅河南李士巽題香山寺前人洛都逰宦日少年携手行投盃起芳席總轡振華纓關塞有佳氣巖開伊水清攀林憇佛寺登髙望都城蹉􅋸二十載世務各所營兹賞長一作常在夢故人安得并前嵗守九江恩召赴咸京因塗再登歴山河屬晴明寂寞僧侣少蒼茫林木成牆宇或崩剝不見舊題名舊逰况沉沒獨此淚交横交横誰與同書壁貽友生今兹守吳郡綿思方未平子復經陳跡一感我深情逺蒙惻愴篇中有金玉聲反覆終難答金玉尚為輕藍田集作嶺精舍前人石壁精舍髙排雲聊直上佳㳺愜始願㤀險得前賞崖傾景方晦谷轉川如掌緑林含蕭條飛閣起𢎞敞道人上方至深夜還獨徃月落群山隂天秋百泉一作聚響所嗟累己成安得長偃仰澄秀上座院前人繚繞西南隅鳥聲轉幽静秀公今不在獨禮髙僧影林下器未收何人適煑茗行寛禪師院前人北望極長廊斜扉映叢竹亭午一來尋院幽僧亦獨唯聞山鳥啼愛此林下宿奉和獨孤中丞逰雲門寺作嚴維絶壑開花界耶溪極上源光輝三獨一作石座登陟五雲門深木鳴騶馭晴山曜武賁亂泉親坐卧踈磬發朝昏蒼翠新秋色莓苔積雨痕上方㸔度鳥後夜聽吟猿異跡焚香對新詩酌茗論歸來還捨俗諸老莫攀轅奉和皇甫大夫夏日逰花巖寺時大夫昆季同行前人初地花巖㑹王家少長行到宫龍節駐禮塔雁行成蓮界千峯静梅天一雨清禪庭未可戀聖主寄蒼生宿法華寺前人一夕雨沉沉哀猿萬木隂天龍來䕶法長老宻㸔心魚梵空山静紗燈古殿深無生久巳學白髪浪相侵逰清溪蘭若兼隠者舊居戴叔倫西㸔疊嶂㡬千重秀色孤標此一峯丹竈久閒荒宿草碧潭深處有潜龍靈仙巳去空巖室一作穴到客唯聞古寺鍾逺對白雲幽隠在年年一作年時不離舊杉松題武當逸禪師蘭若前人我生本似逺行客況是亂時多病身經山渉水向何處羞見竹林禪定人宿禪智寺上方演大師院崔峒石床一作林髙㡬許金刹在中峯白日空山梵清一作晴霜後夜鍾竹牕廻翠壁苔徑入寒松幸接無生法疑心怯所從題空山人石室前人早晩悟無生頭陁不到城雲山知夏臘猿鳥見修行地僻無溪路人尋逐水聲年年深谷裏誰識逺公名登蔣山開善寺前人山殿秋雲裏香煙出翠微客尋朝磬食一作至僧背夕陽歸下界千門見前朝萬事非㸔心兼送目葭菼暮依依題崇福寺禪院前人僧家更無事掃地與焚香清磬度山翠閒雲來竹房身心塵外逺嵗月坐中長向晩禪室閉無人空夕陽題蘭若前人絶頂茅菴老此生寒雲孤木獨經行世人那得知幽逕遥向青峯禮磬聲秋夜前篇作晩招隠寺東峯茶宴送内弟前人前篇作李嘉祐與沈十九拾遺同逰栖霞寺上方夜於亮上人院㑹宿二首權德輿躡山標勝絶暇日諧想矚縈紆松路深繚繞雲巖曲重樓迥樹杪古像鑿山腹人逺水木清池集作地深蘭桂馥層臺聳金碧絶頂摩浄緑下界誠可悲南朝紛在目焚香入古殿待月出深竹稍覺天籟清自傷人世促宗雷此相遇偃放隨集作從所欲清論月輪集作松枝低閒吟茗花熟一生如土梗萬慮相桎梏永願事潜師窮年此棲宿二偶來人境外心賞幸隨君古殿煙霞夕深山松桂薰巖花㸃寒溜石磴掃春雲清浄諸天近諠塵下界分名僧康寳一作保月上客沈休文共宿東林夜清猿徹曙聞題招提寺戎昱招提精舍好石壁向江開山影水中盡松聲天上來一燈傳嵗月深殿一作院長莓苔日暮䨇林磬泠泠送客廻題鶴林寺上方李涉終日昏昏醉夢間忽聞春盡强登山因過竹院一作寺逢僧話又得浮生半日閒重過文上人院前人南隨越鳥北燕鴻松月三年别逺公無限心中不平事一宵清話又成空題栖霞寺張暈躋險入幽林翠微含竹殿泉聲無休歇山色時隠見潮來雜風雨梅落成霜霰一從方外㳺頓覺塵心變夏逰招隠寺暴雨晩晴李正封竹栢清風過一作風雨蕭踈臺殿涼石渠㵼奔溜金刹照頽陽鶴飛巖煙碧鹿鳴澗草香山僧隠本作引清梵幡蓋遶廻廊禪門寺暮鍾前人簨簴髙懸于闐鍾黄昏發地殷龍宫㳺人憶到嵩山夜疊閣連樓滿太空行縣至浮查寺羅炯三十年前此布衣鹿鳴西上虎符歸行時賔從光前事到處松杉長舊圍野老競遮官道拜沙鷗遥避隼旟飛春風一宿瑠璃地自有泉聲愜素機逰石澗寺朱放聞道幽深石澗寺不逄流水亦難知莫道山僧無伴侣獼猴一作猴猿長在古松枝題竹集作鶴林寺前人嵗月人間促煙霞此地多殷勤竹林寺能集作更得㡬㢠過宿洌上人房徐嶷浮生不定若蓬飄林下真僧偶見招覺後始知身是夢更聞寒雨滴芭蕉逰始興廣勝寺果上人房房融零落嗟殘命蕭條託勝因方燒三界火遽洗六情塵隔嶺天花發凌空月殿新誰令故鄉思一作誰憐鄉國思從此學分身寺居清晨劉三復髙枕對曉月衣巾清且凉露華朝未晞滴瀝含靈疑作虚光隔竹聞汲井開扉見焚香幽心感衰病結念依法王青冥早雲飛杳眇空鳥翔此情皆有釋悠然知所㤀題栢臺寺巳見二百二十一巻于鵠題宇文裔山寺讀書院前人讀書林下寺不出動經年書閣通集作草閣連僧院山厨共石泉雪集作雲庭無履跡龕壁有燈煙年少今頭白刪詩到㡬篇温泉僧房前人雲裏前朝寺修行獨㡬年山村無施食盥漱亦安禪古塔巢溪鳥深房閉谷泉自言僧入室知處梵王天登西靈塔陳潤塔廟出招提登臨碧海西不知人意逺漸覺鳥飛低稍與雲霞近如將日月齊遷喬未得意徒欲躡雲梯題虎丘山西寺朱長文一作朱長雲王氏家山昔在兹陸機為賦陸雲詩青蓮香匝東西宇日月與僧無盡時静林精舍梁武帝隠所巳見一百六十六巻釋靈一自大林與韓明府歸郭中精舍作前人野客同舟檝相携復一歸孤雲集作孤煙生暮景逺岫帶春暉不道還山是誰云向郭非禪門有通隠喧寂共㤀機酬皇甫冉將赴無錫於雲門寺贈别前人湖南通古寺來徃意無涯欲適雲門路千峯到若耶春山子敬宅古木謝敷家自可長偕隠那言集作堪相去賖此詩二百四十四巻重出今巳削去注異同為一作再還宜豐寺前人再尋招隱地重㑹宿心期樵客問歸日山僧記别時野雲隂逺甸秋水漲前池勿謂探形勝吾今不好竒題東蘭若前人上人禪室路徘徊萬木清隂向日開寒竹影侵行逕石秋風煙入誦經臺閒雲不繫從舒巻狎鳥無機任徃來更惜片陽談妙理歸時莫待暝鍾催將出宜豐寺留題山房前人池上蓮荷不自開山中流水偶然來若言聚散定由我未是回時那得回題王僧院前人虎溪閒月引相過帶雪松枝挂薜蘿無限青山行欲盡白雲深處老僧多宿静林寺前人山寺門前多古松谿行欲到己聞鍾中宵引領尋髙頂月照雲峯凡㡬重宿吳匡山破寺釋皎然䨇峯百戰後真界滿塵埃蔓草縁空壁悲風起故臺野花寒更發山月暝還來何事池中水東流獨不回髙僧詩載皎然詠廢寺云武原遺跡在真界積塵埃殘月生秋水悲風吹故臺居人今巳盡栖鴿暝還來不到無生理應堪賦七哀與前詩畧同今附于此寒食日集報德寺解公房一作寒食日同陸處士行報德寺宿前人欲問章陵寺一作古寺章陵下支一作潜公住㡬年亂山春靄裏微逕古松邊一作安心生軟草灌頂引春泉寂寂傳燈地寥寥禁火天世人一作間多暗室白日為誰圓一作懸一作皆嵗時雜詠奉和盧使君㓜平㳺朝陽山寺臨太湖時在郭不得往前人仁祠當絶境明牧躡靈蹤欲到清凉地初聞斷續鍾城中歸路在湖上碧山重水照千花界雲開七葉峯寒芳艾綬滿空翠白綸濃逸韻知難繼佳㳺恨不逢仍聞撫禪石為我久從容秋日遥和盧使君㳺柯山寺宿歇上人上方論湼槃經大義前人江郡當秋景期將道者同跡髙連一作憐竹寺夜静賞蓮宫古磬清霜下寒山曉月中詩情縁境發法性寄筌空翻譯推南本何人繼謝公遥和塵外上人與陸灃夜集山寺問湼槃義兼賞陸生文巻上人自號北山子共是竹林賢孫綽僧史以七人配德嵇阮號竹林七賢心從貝葉傳說經㸔月過一作喻開巻愛珠連清净遥城外蕭踈一作條古塔前應隨北山子髙頂枕雲眠題報德寺清幽上人西峯寺即陳文帝故鄉前人陳世凋亡後仁祠識舊山帝鄉喬木在空見白雲還䨇塔寒林外三陵暮雨間此中雖戰勝君獨啟禪關奉同顔使君真卿開元寺經蔵院觀樹文殊碑前人萬國布殊私千年降祖師雁門傳法至龍蔵立言時故實刋周典新聲播魯詩六銖那更拂刼石盡無期奉同盧使君㓜平㳺精舍寺前人影刹西方在虛空翠色分人天霽後見猿鳥定中聞真界隠清壁春山凌白雲今朝石門㑹千古仰斯文奉陪陸使君張源裴端公樞春逰虎丘寺前人雲水夾䨇刹遥疑滿平陂入門見蔵山元化何由窺曳組探詭恠停驂訪幽竒情髙氣為爽德暖春亦隨瑶草自的皪蕙樓爭蔽虧金精發壊陵劔彩沉靈池一覽匝天界中峯歩未移應喜生公石列坐援松枝秋晩宿破城一作山寺前人秋風落葉滿空山古殿殘燈石壁間昔日經行人去盡寒雲夜夜自飛還題石甕寺王建青崖古寺集作白石夾城東泉脉鍾聲内裏通地壓神龍集作龍虵山色别屋連宫殿匠名同簷燈經夏紗籠黑溪葉先秋臘樹紅天子親題詩總在晝扉長鎖壁龕中題台州隠静寺前人隠静靈仙一作山寺天鑿盃度飛來建巖壑五峯直上挿銀河一澗當空㵼寥廓崆峒黯淡碧琉璃一作琉璃殿白雲吞吐紅蓮閣不知勢壓天㡬重鍾聲常聞一作在月中落文苑英華巻二百三十六
