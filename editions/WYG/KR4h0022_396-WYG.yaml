body:
  text: 文苑英華卷三百九十六宋李昉等編卿寺一太常卿授姜皎太常卿制蘇頲黄門命卿之貴以象冬春化人之本孰踰禮樂殿中監上柱國楚國公姜皎貞夷一作􅃵粹温精密純固藴深厚之量懐直方之道學皆為已聞義思齊忠以事君立言成則自歴屯險爰慿翊戴鳴謙滿於視聽好讓存於始終故可銘之鼎彛光我簮紱在昔唐典惟清乃命洎于周官以和為重宜守太常卿勲封如故主者施行授楊綰太常卿制常衮門下舜以伯夷作秩宗漢以列侯掌郊廟至於圓丘大射之制禮官博士之論莫不綜詳得失而折衷焉故事職尊冠九卿之首朝議大夫守國子祭酒兼脩國史賜紫金魚袋楊綰常在於道亦周於仁文以君子之言生知聖人之意司我載籍鴻聲不泯常典選舉後之法程廼者崇進名儒俾其宣明師訓講求三代稽合五經濟濟諸生誨之不倦飽於道德之富成其禮讓之風况恭儉忠信一作恪守而彌固一時模表清議所髙固可以處楊震桓榮之位領曲臺太子之重勉思厥服以稱任賢可守太常卿依舊兼脩國史散官如故主者施行授趙宗儒太常卿制元稹勑銀青光祿大夫守太子少傅兼判太常卿事趙宗儒昔叔孫通徒以綿蕞草具之功遂獲封侯之賞况朕始見天地初集無初字朝祖宗哀勵祗嚴不克是懼惟爾肇自清廟逮予還宫賛道法儀踰於四百俛伏趨數訖無尤違夫何叔孫用是為比顧此冲昧實賴老成不有甄升孰明勤藎奉常正秩左揆兼榮六樂九儀興替在此無忘朂率以厚人倫可檢校尚書左僕射兼太常卿散官勲封如故授崔羣右僕射兼太常卿制李虞仲勑僕射貳令之職也奉常正卿之選也假中臺之極稱冠列寺之崇秩無此兼命必資重賢前荆南節度管内觀察處置等使銀青光禄大夫檢校吏部尚書江陵尹御史大夫上柱國清河縣開國公食邑一千五百户崔羣道合時中識通政本含五行之秀氣為一代之偉人文學致名公忠蒞職清貞不撓方廉自持曩升台階助一作弼我憲祖實著賛時之績用存經國之規周旋累朝揚歴大位出作垣翰入摽羽儀風雨有不已之鳴雪霜無可變之色秉是全德罔聞異詞乃者輟自夏卿授之戎閫統荆衡之巨鎮嗣羊杜之前聲政推洽平理在徴復禮樂之器予心所難冀流合雅之音將考依經之制愼簡斯久僉諧乃俞俾廻軍旅之謀式暢人祇之職伯夷官業佇乃脩明可檢校尚書右僕射兼太常卿散官勲封如故宗正卿授高平郡王重規司屬卿制李嶠鸞臺百工惟時必在推擇九族既睦仍資敦叙右千牛衛大將軍上柱國髙平郡王重規宗室儀表衣冠領衲有姬旦之藝兼劉蒼之善出居連帥功名著於兩河入奉鈎陳誠欵申於八校本枝望重河海職隆宜輟掌於魚鈐俾專司於鱗族可司屬卿勲封如故主者施行授韋希仲宗正卿制蘇頲黄門中衛司階已崇於命將上卿為府尤重於睦親左衛將軍上柱國兼通事舎人内供奉韋希仲以醖藉之姿中折旋之禮趨事端雅吐詞雄暢束帶立朝既副聲實彯纓在位迭居文武宜輟魚鈐之委叙于麟族之盟可宗正卿餘如故主者施行授褒信郡王璆宗正卿制孫逖門下公族之任得才則難舉親而官選舊惟允銀青光禄大夫殿中監上柱國褒信郡王璆雅正一作志惟恭虚懐敏達近屬蕃翰中朝一作朝端羽儀無競維人不矜於貴分克勤于位忠每効於公敦叙是司疇咨所屬宜居六尚之職以副九委之勤可宗正卿授濮陽郡王澈宗正卿制門下宗卿設位邦族是司必擇親賢一作賢能以光名器金紫光禄大夫行太僕卿員外置同正員上柱國濮陽郡王澈清貞履道淑愼持身行無越思動不踰矩以才從政於歴官而則深以地推恩在同姓而為近敦叙之任疇咨所難宜受寄於本枝更遷榮於列棘可行宗正卿官勲如故授李􅈌宗正卿制賈至門下前𢎞農太守李􅈌體正心和操端行潔或政能茂異所蒞必聞或忠孝兼全避權勤讓咸推公議多負卿才官惟其人用必有適宜欽爾職以弼予教可守宗正卿授李琬宗正卿制常衮門下堯親九族禮重於敦序漢睦諸劉秩存乎宗正内姓之選豈伊異人三從叔祖銀青光禄大夫前婺州刺史本州團練守捉使上柱國荆國公琬才秀本枝挺此公器忠敬達順簡廉向方飭禮樂於身文詳典刑之政體夙所任遇久於階歴勲勞理行當亦兼書思有補察義深肺腑固可以居宗室大臣之位叙文昭武穆之親懐德任賢敬兹休命可宗正卿散官勲封如故主者施行授宗正卿嗣鄭王遜大理卿李克助宗正卿等制錢珝勑九卿間重而顯者大宗正卿與廷尉實次奉常焉易官而處惟典之章具官遜等皆吾屬之楨幹也而又荷出相㦸之門遜繼分郡符必聞其政久歴庻位咸稱有材克助承忠孝之家踐修罔墜多所該練揚于縉紳今載葺京師敬先宗廟資乎集事速以成功而方備法官是宜改秩往趨急務更在厲精伏念旬時獄可知也我有具律遜其盡心可依前件光禄卿授房光義光祿卿制蘇頲門下上卿之貴爰因徳選終獻之禮必由才致宣威將軍上柱國房光義門承胄緒地聯姻戚雅容端操惟玉有温擇行踐言復珪無玷頃祗班序尤稱望實蘭猗趨職已一作以仗於誰何栢梁賦詩俾聞於總領可太中大夫守光祿卿勲如故主者施行授廣武郡王承宏光禄卿制孫逖門下銀青光祿大夫行房州别駕員外置同正員廣武郡王承宏地在維城慶延分土頃乖周愼因從䧏黜捨其公犯用申猶子之恩復其舊資俾踐列卿之秩可光祿大夫光禄卿員外置同正員授韋珙光禄卿制門下銀青光禄大夫慶王傅員外置同正員上柱國扶陽郡開國公韋珙衣冠耆舊德行名賢吏術該通嘗聞理劇道心逺曉雅好攝生一在優閑久淹年序恬和自保志力猶強宜有命於移官俾承榮於列寺可光禄卿員外置同正員勲封如故授呉仲孺試光禄卿制賈至門下守衛尉少卿充朔方經畧副使呉仲孺心温而直識敏而和習韜鈐之秘旨知孫呉之大畧久副戎幕克濟謨猷伊茂勲之可嘉俾寵光而宜及昇其階序列在正卿可中大夫試光祿卿授前䖍王傅賜紫韋師貞光祿卿制錢珝勑具官韋師貞國朝考課之法有三善者升上下籍師貞強仕之歳繼為字養糾率之官三善之名四書于籍校諸能事不亦多乎歴年且深為吏斯得慰兹班白宜有陟遷夫辨酒必良視牲不瘠祭祀之事繫爾所司徃為列卿勉戒郡吏可依前件授韋韜光祿卿等制薛廷珪勑具官韋韜等卿寺膠庠僉曰清署序遷愼擇必惟其人以韜儒素成家直方守道源本粹茂材術周通以績詩禮飭躬簮裳著代心惟耿介志在功名以承休養素典墳服膺螢雪成如麟角雅有鳯毛以承乂鼎甲華宗松筠茂行貞方從政諫讞有聞而皆久脫朝簮能安陋巷列卿曹而象月次國學以横經我俞丞相之求爾叶輪轅之用敬愼爾事徃臨厥官無或素飡以塞虚位可衛尉卿授崔惠童衛尉卿等制孫逖門下尚主之恩允歸於人秀睦親之典必洽於朝榮駙馬都尉崔惠童豆盧建等在人物士林在勲華忠一作貴緒行能䨇美才貎兼資善道自修令名無忝錫之姻好已承築舘之榮寵其章服宜列象河之位惠童可銀青光禄大夫衛尉卿建可銀青光祿大夫太僕卿並員外置同正員授馬承進試衛尉卿制賈至勑左金吾衞大將軍馬承進能以勇幹久於戎旅勲勤克著奬命宜加俾列九卿仍叅八命可特進試衛尉卿授向昌鑾試衛尉卿等制勑前太子洗馬向昌鑾三品子昌釬等代業忠貞死於王事能遵先志常著貞誠稽彼典謨賞延于代俾超秩次是用旌善昌鑾可試衛尉卿昌釬可通事舎人授前鹽鐵淄青催勘使檢校左散騎常侍王鄯衞尉卿制錢珝勑具官王鄯等稱職之吏無所陟明則陳力者之志怠矣爾自居官次必公為先若恥告勞但思責實頃者乗諸軺傳使彼海濵善徴𣙜酤之名允集鹹鹺之利徃不廢命還可程功是用進爾於朝且升卿列宜奉警廵之事如專行役之心克念不渝後寵當至可依前件文苑英華卷三百九十六
