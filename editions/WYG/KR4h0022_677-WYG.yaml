body:
  text: 文苑英華巻六百七十八宋李昉等編贈荅中荅族人梁東海太守長孺書一首重與蕭十書一首重荅李清河書一首贈韋司業書一首荅蕭十書一首荅族人梁東海太守長孺書其人因梁末入北齊徐陵恩報近歲奉使來歸辱彼河清年中告行并惠以明鏡亟離寒暑雖復時陳梁鶴日照孫一作孤鸞言慰相思反增離眷劉傳三常侍還又承書札銀鈎甚麗玉疏依然開封伸紙破愁為笑素秋方届溽暑稍闌體中何如善保元吉藂臺之璧少海之珠何必鄉里所在為貴卿託身大國既已積年彼朝英彦理相欽挹方當交辟三命清官兩宫何乃濶然遲有問也吾七十之歲崦嵫已廹朽老之疾隨年而甚徒懐北邙之切未遂東都之期牽役承閒但有衰頓賢從君政佐佑興基中舎一作書諶殿中並休宜自别有書問來告訪吾文章吾自歸來鄉國亟徙炎凉牽課疲朽不無辭製而應物隨時未曾編錄既承今告輙復搜檢行人相繼别簡知音但既乏新聲全同古樂正恐多慙於協律致睡於文侯耳燕南趙北地角天涯言接未由但以潜欷善敬徳中郎並比境之良選皇華之上求若可輶軒别當委白君問重與蕭十書李憕再覽來封皆如一面秋熱未解所履如何某拙疾但昧於理耳崔子日月漸逺弟故人情多一慟深衷豈易論也委曲具悉待彼官到若有商量與申後意彼有人作主人否承郎欲還豈不能一至此也外郡感别情不易言道路無留滯朝廷待士論屈日深佇聞鳴躍勿至斷絶弟多才博識言成楷模某棄廢之人何能為也言談次可吹嘘之合不負公私亦親故之情耳千萬千萬不具李憕諮重荅李清河書蕭頴士名白臨清傳馬子逺至昌樂奉問及亦既披緘慰慘交集幸甚幸甚亡友存日側聞緒言以其先門在殯舊塋未祔將事啓卜指用早秋見託不才俾述銘誌手草行狀遺本猶存豈期逺日未臨長夜俄遘埋追逺之純心受終天之永酷幽㝠憤歎豈其可言南陽王公聞而傷之近賚錢二萬以濟所欲兄又不以人廢言克申後意則不腆之作刋就有期既徃之魂瞑目無悔存歿所荷非二公而誰然後知燕王無以矜其吊疑作市骨魏妾不獨申其結草矣辭奉日逺係積難任惟珍重因還騎不宣名再拜贈韋司業書月日潁川男子蕭名敢復書於京兆韋夫子足下嗟乎事有勇於昔聞而怯於今見求之累月而棄之一言此其勇於昔聞而怯於今見者固見之不厭其成也求之累月而棄之一言者固言之未通其情也難進為志士之節知音實盛名之選可不謂難哉必也道不磷於進趣之幾交可判於言談之分雅心特逹中義不囘者能之由是而其來也必審於幾其去也必揆於分鳥能擇木木不能擇鳥離合是非之迹在主不在客則僕之所以怯乃足下之所以難也嗚呼將見不見聞不聞惟難僕所以盤桓顧望且累月焉惜知音之至希一絶不再也泳然不謁幸不怪乎僕家業山東非舉選時不至三輔而倐來忽徃亦已再三一昨遇謝官乃不知門下省與朝堂所在足下試以此等事相對豈輕於進退者耶而願託深期積有年矣幼小日曾竊窺足下所著兩京新記長來追思實為善作人疑所知殷晉亟接清言僕幸因之飽於餘論思心諫遲疑以日為年頃數歲前足下新除吏部郎中時曾於都省之間昧然一謁足下亦頗垂顧接而今得無忘耶豈或念此便謂僕為輕於造詣者也僕徃時之舉誠復輕率然自足下則有固求而不至者焉足下誠問僕於衡軸諸公必知未有一人言僕造其門矣以正月二十五日至自東京叅後迨兹遽承足下屢垂訪引又賢弟曾一陪宴席貴壻徐子舊所交歡豈不足假延譽於門庭披舊積於心腑耶何曩之不能徃也如此所謂勇於昔聞而怯於今見者矣仰惟足下旁求百氏獨􅇍當朝抑揚鑒戒時難與擬自甫登清貫垂二十年更事既多閱人不少尚能紆廻雅慮辱在小人懃懃懇懇至於數四何其異也方今運偶休命賢才至衆龍門之下躍鱗所萃豈復吹嘘眄睞之地尚微一蕭茂挺乎雖足下惠顧轉深而僕愈自疑也未知足下設何禮以接之竊觀今之文人雅操大缺内不能自强於已外有以求譽於時籧篨闒茸人望口氣謂其髙位必以援登芳聲要以用致而當路者既不能人人有許郭之見亦因依左右惑而客一作容之由斯而達十倍八九翕翕闐闐而忘返致令待士者不能備其禮懐才者無以表其誠混淆委翳良足歎也亦知足下爰自諸生早云峻拔策名從仕清標有素世所希也而時事共然頺風一扇詎知來者有貞純之士得無繫累於流俗乎僕褊介自持麤疎浸乆平生峻節未嘗屈下恐足下尚以為風塵一士名位不侔行言致迕音容便阻則麋鹿雖微欲服之轅軛且必異於騏驥矣挺而走險何公之門不可曳長裾乎此所謂求之累月而棄之一言也足下名卿之孫相門自出妙年籍甚寵駕時賢俯仰周旋故已在雲霄之上而僕汝潁之間一後生耳不知足下何從而見訪耶髙命驟臨怪歎無寡竊為重之忽記徃年奉詣時足下云孫大所言第一進士子則其人不肖誠愧孫公之過談足下誤聽然尚恐足下正由此見知茍曰其然則足下未知之也嗟夫漢有言曰公知其一未知其二此言雖大可以喻小若孫考功之於僕可謂知其一矣一作也深矣可不忘矣然其所未知者乃三四不啻豈一二而已哉慎子有言以離朱之明視秋毫之末於百歩之外視水一尺則不能見其淺深何則所賦者異也曩時與孫考功無里閈交逰之知親朋推薦之分勢懸望阻聲塵不接躡無情之路廻必斷之明懐恩下隔於至公而見遇盡闗於薄技則是僕詞策之知已非心期之知已故曰可謂知其一也丈夫生遇昇平時自為文儒士縱不能公卿坐取助人主視聽致俗邕熙遺名竹帛尚應優游道術以名教為已任著一家之言垂沮勸之益此其道也豈直以辭塲策試一第聲名為知已相期之分耶若由此見知僕不才者幸嘗遇賞於孫氏𤨏𤨏之文何足枉二賢深顧哉足下藴丘明之恥資董狐之良載筆延閣職司國史誠朝之得人竊為足下重之斯未易任也亦知足下懐獨見之明後來諸生固無借其一字然聞一無此字受金於吕氏之藏者不可謂之秦無人矣僕不意少有此癖心存目想行已十年時命不貸所懐莫就而朋從之間或謬見稱說亦何知足下不緣此見訪耶茍曰其然則僕心期之知已未始或移於足下矣非曰能爾敢事當仁何者僕私心自料亦已熟矣今朝野之際文塲至廣掞藻飛聲森然林植必也扣精微於賞鑒之府稽折中於序述之科如僕料得足下門而入者寡矣僕不敏竊嘗自以為升足下堂而未入於室也但足下未深知耳僕與足下無世業通家之舊屈伸之際僕輙預舒慘焉聲同氣感不知其所以然也夫司業古成均之貳學政是循國風伊始先哲王之所以導人敏徳謀猷長世者曷嘗不就學校而奔風化耶梁代劉嗣芳自尚書左丞除國子博士于時物議以為妙選近髙宗朝樂安孫公以宰臣之重再轉此官朝廷素望初不點缺斯尚學尊儒之道也今來擢用此塗稍革必當由憲臺而遷㑹府典綸誥而掌銓衡一履學官便為屛棄雖不足以斷賢才通塞之路而常情積習可不謂然乎頃在洛中聞足下初出南宫僕惕然不樂尋知足下載司東觀又翻然以喜王綏有言國寳雖不我知我自知國寳此之謂也夫人生相知亦有運命在僕素誠乃命爾足下果惠而訪之豈人事也以足下陵戾青㝠漸漬恩渥雍容璧沼之觀耀映石渠之府而屈伸小數僕尚預其慘舒况乎淪厭盛時悲凉壯歲宿心有在得不為先達論乎臨書耿歎不知自已惟足下實深諒之今請以一世浮沉之端一身能否之効從始至末仰訴知音言而不應命之極也僕南遷士族有梁支孫系祖司徒鄱陽忠烈王追蹤二南邁徳荆郢有子四十人俾侯錫社入卿出牧且忠且賢終始梁代第三子侍中懿惠侯大同中以信武將軍都督北兖州緣淮南軍遺愛在人詔學士謝蘭撰徳政碑文長子山隂侯儒術精博世有盛名隋代山隂第十一弟常侍君才標清峻見崔子發齊糺陽玠著談藪亦稱俊爽而有才辨隋開皇中徴為東宫學士謝病免少子零陵通守以再從姪齊王諮議府君為後則小人曾王父本則惠侯第十七弟太尉宜豐侯之後太子太保梁安公之孫宜豐有忠孝大節見稱梁季迹光五史分載南北安公以前代宿徳再綰台傅於義寧武徳之間同堂兄弟百有數十自梁渉唐多著名跡終古蕃盛莫之與比貞觀之後羣從凋零垂拱以來無復大位越敬王之圖匡復也王父實預其謀擯身江海不臣武氏舊業邠岐一朝瓦解内弟琅邪王仁簡標列傳贊備昭事迹家君子少丁家難辛苦百罹事繼親長異母弟育孤姪以孝友聞於姻族僕生於汝潁幼而苦貧孜孜强學業成冠歲射策甲科見稱朝右當此之時為奮筆飛鸞鳳摛論吐雲煙明主可正議而干羣公可長揖而見何言日損一日年貶一年蹉跎半紀乃朱方一下吏耳興言念此不覺氣之交胷從來事業復何所用未可為不知已者論也僕平生屬文格不近俗凡所擬議必希古人魏晉以來未嘗留意又况區區咫尺之判曷足牽丈夫壯志哉而時議喧喧輙復見數亦嘗標奬恩於銓庭振塵一作虚聲於輦下而今拙句尚在人口已云再矣復何補於淪棄耶嗟乎以苗侍郎之至公待物以僕之直道干時取捨之端理闗於一試由來賞待亦云乎不薄而壯年志氣盡此一行時耶命耶若此之甚也又溺志著書放心前史乍窺律令無殊桎梏使終身學此未知得時用兹措足寧逃罪戾髪膚不毁豈若是也惟疾之憂寧逃罪乎僕從來宦情素自落薄撫躬量力栖心有限假使因緣㑹遇躬力康衢正應陪侍從近臣之列以箴規諷譎為事進足以獻替明君退足以潤色鴻業决不能作擒奸摘伏以吏能自逹耳况乎累土之漸升天無階自經窘蹙千端萬緒方欲議一官之資勤歴政之効信兹課最跂彼京畿不二十年未免斯厄舉足踏坑穽揮手挂網羅摧折庭臣之威喧呶卒伍之役捨長用短雖智何為安得一作見鼔鐘可樂便將饗爰居以愁也近日見苗侍郎乃云以子文章非文章才所及異時大用不繫于此得㑹當再發方成一舉嗟夫以文體為言則爾而一身自卜且又不然一作能何者僕向時之試非不工也苗公之言非不知也以得便之試逢見知之言詞殫理極卒孤始望自兹以外更安可料哉僕有識以來寡於嗜好經術之外畧不嬰心幼年方小學時受論語尚書雖未能究解精微而依說與今不異由是心開意適日誦千有餘言榎楚之威不曾及體有時疲頓即聊自止息不過臨池水視遊魚耳頃來志若轉不耐煩觀圍碁讀八分書亦憤悶除經史老莊之翫所未忘者有碧天秋霽風琴夜彈良朋合坐茶茗間進評古賢論釋典已又酒性不多涓滴輒醉適情緩飲則樂在終席雖體氣薰薰實加困憊而中心醒悟了無惑焉常時知故以此見寡三杯之餘則任意縱誕就閑窓或屏風間曲肱岸幘怡然自處或經過廣座稠人之中綺筵四匝珍羞盈品爽心翻然有時閣著若乃筝歌亂奏繼以舉白博奕樗蒲呼梟争道優姬艶妓喧雜左右易貌變聲千態萬曲即嗒然氣盡無所覺知心識低徊魂動神撓但思臨長風一大呌耳雖復郤昭子之驚楚奏夏仲御之逃越巫何以加之一行郡邑志尚都沮事與好相背責與悶相成察列不諳悉異之又以為務恃文詞傲弄當世同聲悉疾何地自容可歎息也直性褊中少所容忍於心不愜未曾勉强昔常話文章得失論姓氏臧否忤人雅意累悔無及友生邵軫深以為言四五年來絶無此過終朝杜口不復發端偶然見問則率意便荅必不能矯情飾理雷同取合而今世風流見異者衆雖三五至交才名乆著一㕘名理俄然楚越而州縣之禮捨義重權小人跨躡便成簡倨卑身下氣已自不堪詞色之端更求附㑹守初心則嫌猜頓起將任節則操履全乖丈夫行已三十年讀書數千巻尚不能揣摩押闔取權豪意旨况復終年怏怏折腰於掾吏之下哉古者右史記事左史記言記事者春秋經記言者尚書是也周徳既衰史官失守孔聖斷唐虞以下刪帝王之書因魯史記而作春秋託詞以示褒貶全身逺害之道博懲惡勸善之功大韓宣子見之曰周禮盡在魯矣吾乃今知周公之徳與周之所以王也有漢之興舊章頓革馬遷倡其始班固揚其風紀傳平分表志區别其文復而雜其體漫而疎事同舉措言殊巻帙首末不足以振綱維支條適足以助繁亂於是聖明之筆削褒貶之文廢矣後進因循學猶不及竟增泛博彌敦簡要其迷一作述固乆非可一二言也僕不揆顧嘗有志焉思欲依魯史編年著歴代通典起於漢元十月終於義寧二年約而刪之勒成百巻應正數者舉年以繫代分土宇者附月以表年於左氏取其文榖梁師其簡公羊得其覈綜三傳之能事標一字以舉凡扶孔左而中興黜遷固為放命昔荀仲豫袁彦伯二賢亦嘗筆削紀年裁成兩漢晉代則孫安國編次南北迄穆帝之終其道鸞一作鑾非鑿齒幾原叔庠繼踵于宋齊之間矣梁武烈太子以弱冠之年早事刪錄雜諸家之說著三十家春秋泰清之季金陵板蕩元帝嗣興乗輿不復東臺典籍悉上荆州及郢都淪䘮焚燒畧盡史策遺逸散在人間同源異流十家俱起而究終始一氏則何劉二典存焉陳紀裁於野王齊志創於君樊蔡學士集江陵故事撰後梁春秋隋季有後畧一家亦行於世秦趙凉諸國亦有得而稱元魏及周無聞焉爾自漢元卒於大業期運驟遷史籍填委編年之作亦徃徃而聞其間體裁非無優劣終未能摧漢臣僣偽之鋒接魯論之緒附庸班范曾何足云雄鋩獨斷抑非諸君子之事也誠智小謀大綆短汲深加之數年可以集事嘗願得秘書省一官登蓬萊閱典籍冀三四年内絶筆之秋使孟浪之談一朝見信寧不知立身有百行立名非一途豈必繫心翰墨為將來不朽之事也夫太上立徳其次立功其次立言立言者乃不朽之末耳然則古之終年著述者亦已知之心有所存正爾不能自已也豈求見重於千載耶校理是司於今絶望刋削之志事即都損矣聖朝官人宜求稱職使道皆適務時無棄能何須銓一作詮衡枉分如此僕以三月二十六日拜謝闕廷邇來凡四十餘日正以足下之故未便東行久不能斷夫人與不見於胷中由此致淹泊耳幸足下勿謂僕為後輩一生聞其小有所知但欲輕一召來試觀其談說也僕遇於足下豈徒伯喈王粲之嘉㑹子産延陵之脗合耶雖數百年外邈爾相望亦不為遼濶也况契心期於俛仰之頃得不重哉僕從來綴文畧不苦思惟専心舊史企望有成不復能以他人手筆冀流傳於人世所以援毫襞紙見推疾速自今月五日始作書首末千餘言經半旬乃就加之筆札斯亦勤矣誠如殊剪截之清詞長謬悠之曼說然茍非足下安能有此課之善士之託於知已恨鬱悒而無所申非必求利也計足下之年應長僕二十許歲亦已懸矣而才名位望之隔則又可知所不聞於夙期者道耳足下本以道垂訪小人亦以道自謀故此書之禮過於慢易成足下之髙耳茍道之不著而名位是務足下之趨風者多豈惟一蕭茂挺小人之受侮亦衆豈獨一韋夫子乎足下必不以為狂而亮其志越絆拘之常禮頓風流之雅躅乗躡履之遇展傾蓋之歡則重賜一書猥荅誠貺既奔足下不暇豈敢差池若文不足徵道未相借請見還此本謹俟燒焚無為輕置蓋瓿使識者一窺齊楚交失非古之君子退人有禮之道也雜詩五首謹以奉投聊用代情不近文律耳名再拜荅蕭十書韋述述白忽枉書問詞髙理博尋翫反覆罔知厭倦述聞登太山者覩藂薄而迷其方面涉瀛洲者挹波濤而懵其淺深蓋廣大則昧然難為究足下貫穿羣言靡不該覽聞一以知十切問而近思詞人之淵藪僕誠不敏何以當斯乎足下無棄芻蕘輕投瓊玖講學先訓足以起予所一作啓發微言孰不賈勇謹當掃陋巷之庭宇望君子之軒車博約之道以俟㑹面韋某頓首文苑英華巻六百七十八
