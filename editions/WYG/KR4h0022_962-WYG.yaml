body:
  text: 文苑英華巻九百六十三宋李昉等編婦人一周譙國公夫人步陸孤氏墓誌一首周趙國公夫人紇豆陵氏墓誌一首周安昌公夫人鄭氏墓誌一首周大將軍隴東郡公侯莫陳君夫人竇氏墓誌一首周冠軍公夫人烏石蘭氏墓誌一首周鄭國公夫人鄭氏墓誌一首後魏荆州刺史賀拔夫人元氏墓誌一首周長孫都督夫人羅氏墓誌一首周拓拔儀同夫人尉遲氏墓誌一首周柴驃騎夫人李氏墓誌一首周譙國公夫人步陸孤氏墓誌銘庾信夫人諱某本姓陸呉郡人也大夫拓境百越來庭丞相勒兵三江席巻髙祖載為劉義真長史留鎮關中既没赫連因即仕魏臨終誡其子孫曰樂操土風不忘本也言念爾祖無違此心祖政驃騎大將軍儀同三司恒州刺史父通柱國大將軍大司馬文安公匡贊經綸參謀揖讓名髙廣武功重長平夫人七徳含章四星連曜敬愛天情言容禮典九日登髙作銘秋菊三元告始或誦春椒年十有四娉于譙國友其琴瑟愈恭節儉之心伐其條枚實秉憂勤之徳鄴地登髙之錦自濯江波平陽採桑之津躬勞蠶月天和元年册拜譙國夫人東武亭之妻既稱有秩南城侯之婦還聞受封柱國殿下以名華分照增城峻土揚旌棘道問政邛都白狼之溪途艱黄牛之坂茘枝之山地險葡萄之國夫人别離親戚闗河重阻夷歌一曲未足消憂猿鳴三聲沾衣無已一作有感是以天厲之疾遂成沈痼玉瀝難開金膏實逺建徳元年七月九日薨于成都私第春秋二十有一即以其年十一月二十二日歸葬長安之北原詔贈譙國夫人禮也殿下傷神秋月掩淚長松周季直之留書更深㝠漠潘安仁之詞藻徒増哀怨豈直西河女子獨見銀臺東海婦人先逢金闕銘曰芟疑陵反斾椒山止戈金精據嶺昌閣凌波西遊卿相東裂山河華亭冠冕穀水絃歌震維徙族燕垂從宦塞入飛狐闗連鳴鴈策預登阜功叅臨澗寳鼎留銘彫戈餘贊應圖淑令秉禮言歸魚軒馮軾澤雉文衣明月照鏡仙石支機行雲細起迴雪輕飛北降帝子南麾蜀守若水既開靈山已鏤月峽猿啼江神牛鬬星機北轉日轡西迴陽泉伏氣隂律沈灰鶴辭呉市鳯去秦臺神光離合燈影徘徊雙流反𦵏百兩迴旌少女離位夫人去城帷堂野設帳殿郊營山川竒事風月無情搖落丘隴荒涼封域樹樹秋聲山山寒色草短逾一作愈平松長轉直節墳方固園陵永植周趙國公夫人紇豆陵氏墓誌銘前人夫人諱含生本姓竇扶風平陵人魏其朝議列侯則莫能抗禮安豐奉圖功臣則咸推上席外戚列傳既聞建武之書仲山古鼎或表單于之獻祖略少保建昌郡公父織柱國大將軍大宗伯鄧國公孟津大誓常預同徳之臣咸陽違約克贊先登之主並得位入六府功叅八柄夫人有文在手有象應圖榮曜夙彰徽華早茂肅恭以禮受教於公宫言容以徳有聞於師氏及乎進賢君子内主邯鄲琴瑟在堂輜軿是服長乆於節不無秋菊之銘履端於始或有椒花之頌豈止莊姬掩淚一作笑楚相知慙定姜問兆齊兵不入武成二年册拜趙國夫人昔漢王聞立義之婦邑以延鄉齊侯見有禮之妻封之石􅐎異代同榮差無慚徳柱國殿下居若木之一枝在天潢之别𣲖揚旌玉壘驅傳銅陵南通向日之民東被無龍之國夫人從政月峽贊徳雲門錦濯江波還臨織室山明石鏡即對粧樓既而玉律頻移金爐不變胡香四兩嗟西域之使稀靈草一枝一作株恨瓊田之路絶天和五年四月二十二日薨于成都之錦城春秋二十孫子荆之傷逝怨起秋風潘安仁之悼亡悲深長簟况復仙臺永别無復簫聲傅母長歸惟留琴曲七年二月日歸葬於長安之洪瀆原詔贈趙國夫人禮也雲雨初來既留連於楚后光隂離合實惆悵於陳王銘曰河西斗絶觀津孤起章武賢臣安豐賢仕木樓千仞金山萬里紹慶邢姨基昌宋子施衿趙北侍姆秦南紘綖禮數厭狄騑驂義超江汜仁流葛覃玉筐迎䴏金籠助蠶敬愛純深端莊叔問有光國史無形喜愠舉案外恭停機下訓馨馥於蘭年華於蕣風雨消散神靈離絶婺女還星姮娥歸月左楹夕奠髙堂朝發空揚凌波更無迴雪下濕曰隰髙平曰原西臨水井北望塞門猶垂雉服尚駕魚軒平原忽矣天道何言山迴地市路没滕城松悲鶴去草亂螢生新雲别起舊月孤明賢墳永式節隴常貞周安昌公夫人鄭氏墓誌銘前人夫人諱某滎陽陽武人也周宣王之母弟俾侯于鄭鄭莊公之重世卿士於周以國為族自茲而始祖瓊太常恭侯父穆司空貞公西京賦詩奉常參栢梁之宴東都言䜟司空為武衛一作𤣥作武後漢王梁傳赤伏符曰王梁主衛𤣥武𤣥武水神名司空水土官也之官籍連帝譜既同盤石門稱通德無廢儒林夫人禮義閨門端莊令淑采采芣苢萋萋葛覃及乎作配君子言事舅姑下氣怡聲承巾奉箒親戚惟禮閨門以睦保定二年册拜滎陽郡君序戚升榮從夫有秩豈惟立義一作德之婦邑以延鄉有禮之妻封之石窌大將軍沈犀二江夫人聞猿三峽明月靈闗之阻秋風蜀道之難掩以瑤華先從春露天和十八年五月二十日薨于成都春秋三十六年詔贈安昌國夫人禮也即以其年十一月十六日歸葬于咸陽之白起原遂使山迴反壤先封節婦之陵日入虞淵實掩賢姬之墓嗚呼哀哉乃為銘曰天河開國分畿置政地有十城人居九命疇昔之邑今茲成姓識履傳風參輿留慶三星在户百兩言歸䖍恭内政榮曜中闈承姑奉盥訓子停機桑園蠶績錦室鸞飛珩璜節步藻火文衣巴水幽咽猿鳴㫁絶月落珠傷春枯桂折趙琴長辭秦簫永别貞姬掩隧節女封墳洛濱無月荆臺失雲鳥悲傷聽松聲愴聞千年遂古百代餘芬周大將軍隴東郡公侯莫陳君夫人竇氏墓誌銘夫人諱某扶風平陵人也章武開國名髙外戚之右安豐入朝位在功臣之上祖以孝昌之始主諾淮陽父以正光之初褰帷海岱夫人生於禮義之門宗於箴誡之德䖍恭惟禮令淑惟儀及乎百兩言歸三星在户箴盥禮記作管始事條枚是則有子從政猶無逸豫之心有夫出征自識山陵之兆大統十六年册授永安郡君婦以夫尊親由子貴朝章家慶一作承家之慶兼而有之保定二年改授隴國夫人車服禮數袿褵典則有美河魴足光彤史既而風霜所及一作厲灰琯遂侵與善何言至于大漸天和六年四月七日薨春秋六十有六即以其年十月十日遷𦵏於咸陽萬年一作石安堂唐書地理志咸陽無石安縣而此巻元氏誌文云咸陽石安原縣之杜原山形起伏既符白鶴之祥地勢風煙乃合青烏之氣銘曰觀津世族平陵豪姓四侯登仕三君從政白狼建功丹蛇襲慶漢之廣矣先聞淑令君子朝端賢才家政簪珥以禮軒車以命讓果成亷推珠止競百年超忽千金莫恃室謝賢夫庭辭貴子歸鞌輟露采蘩廢祀室委眠蠶衣留畫雉一作元衣苗雉非雲垂下澤日掩髙舂空帷舊館虚幕新封山迴廣栁路没深松遊魂幾變大人何從周冠軍公夫人烏石蘭氏墓誌銘前人夫人諱某樂陵人也晉司徒樂陵公苞後子孫就封因即家焉扶風舊城猶存鉄市河南故墅尚餘金谷或寓燕陲仍仕代郡祖行代郡尹父魏司空蘭陵郡公司空佐命魏朝少傅丞疑周室並為大族俱䝉賜姓秦晉匹也是曰通家夫人年十七歸于宇文氏淑令端莊含章貞吉箴盥禮記作管惟儀閨闈已正某年除金鄉郡君某年改授冠軍國夫人四德小君宜其家室三事内主翻辭贊務以保定五年四月遘疾甍時年四十有四即以其年某月日歸𦵏於京兆之某原人世風煙山川超忽陵波青麥儻逢貞女之墳隴首白楊或表賢姬之墓乃為銘曰三星麗天五岳鎮地禮有其秩人居其位燕趙多奇山川雄氣挺茲令淑惟此含章玉生庭照蘭開室香邢姨褧服宋子河魴百兩言歸九儀從聘褕狄七彩軒車六命鼎室辭親槐庭贊政世為閲水人成大夢迴帳山門移燈泉洞金棗長含銀蠶永送香填栢槨路閉松城悲鸞獨影雄劍孤鳴留連趙琴悽愴秦笙周太傅鄭國公夫人鄭氏墓誌銘前人夫人諱某滎陽開封縣逺里人也七子賦詩足光賔客三卿從政實靜諸侯驂乗則晉后停輿來朝則漢君識履華胄蟬聫無虚史籍祖那秦州别駕父茂伯撫軍將軍涼州刺史伯陽縣侯夫人令淑早聞芝蘭獨茂既容既德言告言歸悌實温清恭惟箴盥禮記作管太傅弼諧周室股肱攸寄夫人輔佐君子勤勞是司琴瑟既友條枚無伐故得用之邦國成之孝敬某年月日封鄭國夫人褕狄既加紘綖是務夫人疑衍有安世之貴躬服浣濯子有文伯之尊無忘機杼表裏惟安閨門且正醫門有疾藥對無徵天和三年三月二十日薨𦵏于長安之石安原世子某兄弟並朂慈訓咸遵母儀霜露深悲寒泉增慟銘曰居德圃田當官教府置騎賓來開黌學聚福履家室賢才踵武棠棣之華螽斯之羽人倫七德風化二南采采芣苢萋萋葛覃節行聲玉副加一作笄珈篸一作副珈􅀈加栁園秉杼桑津浴蠶春秋超忽零落無一作非時家亡淑女國喪賢姬香墳永送舞鶴長辭山深月闇風急松悲千年開閉將驗靈龜後魏驃騎將軍荆州刺史賀拔夫人元氏墓誌銘在河之洲聞君子之配德言采其蕨一作薄言采蕨見夫人之有禮用之風化人倫厚焉夫人諱安字大羅河南洛陽人也祖某京兆康或改作尹非王父昭驃騎大將軍開府儀同三司録尚書司州牧汝陽郡王跗萼雄圖堦基霸迹公卿之室將相維國維家夫人能修法度無思犯禮恭儉節用憂在進賢大統五年封安樂公主歸于賀拔氏時年十三思事憂勤化成婦德彤管載暉棠棣早茂及乎謳歌有歸褕狄降等輔佐君子猶安其室周天和元年乃封章武郡君霜露不居風煙飄忽遘疾累旬奄捐館舎以周天和四年二月二十六日薨於長安萬年里春秋五十有二詔贈頓丘國夫人禮也即以其年三月二十日歸葬於咸陽之石安原既異乗鸞翻然永去雖非舞鶴即掩泉門欲誌佳城乃為銘曰逖矣雄謀悠哉霸轍九服潛運三川中竭卿相連鑣賢才舞疑絶琬琰令淑施衿結褵方之棠棣譬以螽斯既全婦徳還稱母儀遊疑作逝水滔滔危途冉冉問藥無對蒸丹無驗狄服空陳絃機虚掩郭門路轉哀挽途窮隴深結霧松髙聚風春蘭秋菊唯始唯終周大都督陽林伯長孫瑕夫人羅氏墓誌銘前人夫人諱某恒州代郡太平縣人祖某父協周大將軍南陽郡公夫人資於事親躬奉訓誡教於宗室足聞詩禮及乎言歸肅恭如事蘋藻維敬紘綖是勤内位克諧中閨以睦年齡不競霜露先侵更延無壽疑之杯遂闕長生之枕以周天和四年二月八日薨於長安之洪固鄉時年二十有三其年某月日葬於萬年縣之壽里山非宋國翻為節女之陵地異荆臺遂有賢妃之墓銘曰畢狼建國靈武開都地接天柱山臨寳符人資義烈世襲雄圖葛覃維萋棠棣早盛既安淑德爰從配命四教𢎞宣三星克正霜凋桂苑風落芝田三從闕性五福傷年歸安永絶言告長捐悽切郊野紆迴隰原風慘雲愁松悲露泣朗月空嗟傷神何及周儀同松滋公拓跋競夫人尉遲氏墓誌銘前人夫人諱某河南洛陽人也祖父太師柱國公魏室喪亂經綸夷阻周朝建國匡翊揖讓圖牒帝系即有内外之親分裂山河仍為舅甥之國夫人容範端莊儀型淑令六義觀德南風有夫人之詩八卦成形東方有少女之位外傅習言公宫教業箴盥禮記作管線纊佩悦茝蘭年十有二出適儀同拓跋競衣其翟服既得宗婦之儀乗其魚軒還從列國之禮摽梅三實無闕其時夭桃九華能修其政某年某月册拜迴洛縣君母金明公主魏文帝長女春則帝女採桑秋則王姬築館夫人出入主家遨遊戚里濯龍園苑長門宫殿既而膏腴美疢一作疾華茂傷年沈痼牀帳蒸離寒暑三世之術無乏一作迨於醫門百草之本途疑窮於藥性建德三年五月七日亡春秋三十昔西河女子值九節之菖蒲東海婦人得三山之芝草無由再遇悲矣如何即以其年十一月十五日葬於京兆之北陵原龜筮告辰丘陵啔奠西臨織女之廟南望湘妃之墳嗚呼哀哉乃為銘曰父曰帝師母曰王姬車服不繫江漢無思是生令淑觀禮敦詩聲超宋子德茂邢姨繼世盛德思賢克舉奠鴈迎門儒一作襦是蘋實俎奉盥如事移茵即序春氷浴蠶秋機秉杼帝鄉近親帝城近臣濯龍親戚平陽主人金波迴月玉樹臨春弄玉鳯凰昌容紫草自此千年無人得道舜華榮曜飄零何早渭水北原平陵故園纔通谷口即望寒門吁嗟此地去矣歸魂孟冬十月長松九年親賓掩淚悽愴何言周驃騎大將軍開府儀同三司冠軍伯柴烈李夫人墓誌銘夫人諱某隴西狄道人也周有柱史夫子以之猶一作見龍漢有將軍宛城以之輸馬復有西入上書仍為秦國之相東向問計即是韓王之師父宜使持節大將軍南北二華州刺史順陽郡公魏武皇帝之長舅也禳侯魏冉居咸陽之宫曲陽王根借明光之殿語其貴戚差足擬倫論其退謙彼多慚德夫人幼而聰敏早聞令淑彤一作箴管有美賢才見稱弄其紙筆懼失諸兄之意剪其齠齡二字疑畏傷王母之心年十有一出適驃騎大將軍開府儀同柴烈烈以上將頒朔一作領胡中台受任軍國忠勤規模繁總夫人輔佐君子言容匡贊增曜三星欽明四德授巾沃盥有謹於事姑㫁織停機無忘於訓子保定二年册授大夏縣君既以夫尊又云子貴乃遷順陽改郡君夫人之邑或用鄉名小君之號多從夫秩典册光臨足稱榮寵本有風氣之疾頻年贈動略多枕卧飛龜之散遣疾無徵畫龍之符留年不驗以今建徳四年三月日甍于館舎春秋四十九即以其年八月日葬於長安之洪瀆原神光離合尚在河湄雲氣徘徊猶歸樓下嗚呼哀哉乃為銘曰上書秦相立功漢將隴水分流秦川遥望秋陸俗勇金行地壯廣武軍中安平河上妻者齊也謂嫁曰歸三星夜照百兩朝飛褕狄有典容禮無違台庭等秩一作列侯一作秩服同衣子奉母儀夫聞家政七族承和九閨連慶紛悦恭肅温清孝敬杼秉秋成蠶隨春令年華未落電影先過徒飡日氣空飲天河星凋玉井月捐金波虞淵落日薤露哀歌寂寞虚奠荒涼象設幽隴龜封重泉蟻結秋色悽愴松聲㫁絶百年何幾歸於此别文苑英華巻九百六十三
