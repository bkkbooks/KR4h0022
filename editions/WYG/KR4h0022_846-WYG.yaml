body:
  text: 文苑英華卷八百四十七宋李昉等編儒三旌儒廟碑一首福州都督府新學碑一首麟臺碑一首旌儒廟碑賈至觀象考歴本乎元辨方正位稽乎極體元御極莫先於一作于敎敎之大者一無者字莫大於儒旌儒者祠我新典也昔秦滅羲軒之制廢唐虞之則大搜學徒竭索儒黨懷書捧檄者鱗集麏至然後罪九流之異論尤百氏之殊術無辜殺身有道併命寃骸積於坑谷流血淬一作染於泉壤蹈仁義而死者不可勝紀開元末天子在驪山之宫登集雲一作靈之臺考圖驗地一作記周覽原隰見鄉名坑儒頺壍猶在慨然感亡秦之敗德哀先儒之道喪強或作倔死千載逰魂無依乃詔有司作是一作是作新廟牲幣有數以時饗祠一作祀因祀命鄉號曰旌儒人神和恱怨氣銷散於戯秦皇帝以神武邁古併吞六合掃天下以一篲剪一作芟羣雄如衆草建守一作官罷侯大權在已自軒轅以降平一宇宙未有若斯之盛也夫勘亂以武守武以文文以正崇武以權勝秦皇知權之可以取不知正之可以守向一作嚮使天下既定守正崇儒遵一作導六經之謀一作謨訓用三代之文質則黄一作唐軒盛美湯武𢎞業不若也觀夫坑儒焚書之意乃欲盖先王之能事竊作者之鴻名黈衆耳以前聞逞私欲於當代此儒之所忌一有也字秦之所志悲夫儒以恭儉為宗秦則疲弊生人極力宫室儒以道徳柔逺秦則竭耗中國勞師四夷儒以宥過議賢秦則刻法峭刑賊虐諫輔儒以述先好古秦則勞師一作師心狥智燔一作播棄墳典一作典墳夫如是則秦不得不滅儒不得不坑事之一作使然也今天子矯覆車之前軌崇明祀於後葉秦之所滅一作廢我之所興斯區夏無疆之休子孫萬代之福也昔武王封比干之墓則招諫之道勸矣晉文表綿上之田則誌過之名立矣漢髙䕶信陵之塚則尊賢一作義之風著矣夫徵揚三字一作未若激揚大教廟食衆賢上以興天地之經次以存顛覆之鑒下以絶厲災之眚建一詞一作祀而三德具焉鯫臣不敏敢作一作獻頌曰於維先王設敎崇儒乃作經籍一作作訓六經為代典謨降及夫子三千其徒再一作載揚清風文在兹乎天喪斯文道有通塞實生暴秦反道敗一作背德竊善攘譽師慝一作心狥惑焚書坑儒萬古悽惻牢路千祀微茫九原驪山之北坎窞猶存草樹無色一作顔愁一作秋雲晝昬時聞夜哭如一作知有寃魂帝在華清登髙訪古愍黙或作繁蕪頺壍悲涼榛莽上感亡秦覆車遺武下哀羣哲饗祠無主爰降嘉詔聿修清祠饋之牲牢奠酬以時幽幽廟門肅肅靈儀冥漠一作寞求食長無餒而粤自漢初建一作迄于隋運一作閏亦有令主尊儒尚訓闕典莫一作罔崇斯文莫振昭昭神理長懷幽憤我后濬哲聰明文思敷𢎞大敎咸秩神祗鬼無妖災人不癘疵俾爾蒼生富壽無期小臣作頌敢繼刪詩一作皆唐文粹福州都督府新學碑獨孤及世與道交相興喪𢎞之者在人非庚桑楚不能使㟪􅕲莊子作畏壘大壤向化微文翁蜀學不崇閩中無儒家流成公至而俗易民賴德施古今一也初成公之始至也未及下車禮先聖先師退而歎堂室湫狹斆學荒墜懼鼓篋之道寢子衿之詩作我是以易其地大其制新其棟宇盛其俎豆俎豆既修乃以五經訓民考敎必精絃誦必時於是一年人知敬學二年學者功倍三年而生徒祁祁賢不肖競勸家有洙泗户有鄒魯儒風濟濟被於庶政大歴十年嵗在甲寅秋九月公薨于位於是羣吏庶民耆儒諸生雨泣廟門之外若有望而不至號曰豈不欲斯文之漸漬於東甌之人歟不然何錫厥化而不遐公之年也吾黨瞠然嗚呼曷歸判官膳部員外郎兼侍御史安定皇甫政殿中侍御史潁川韓贄監察御史河南長孫繪率門人部從事州佐縣尹相與議以公之功績明示後世謂及嘗同司諫之列宜備知盛德善政見託論譔以實錄刻石曰公諱掎字某皇帝之諸父宗室之才子寛裕愷悌孝慈忠敬莊而成式文而強力治王氏易左氏春秋酌其精義以輔儒行故居處執事著書屬詞非周孔軌躅不踐也天寶三載應選部辯論為安陽縣集無縣字尉中興之後歴御史尚書郎諫議大夫給事中十餘年間周歴三臺言中彛倫動中大本上交不諂下交不瀆家貧不樂清近求為京兆少尹無何出守𢎞農集有𢎞農人和四字又移典華陰兼御史中丞華陰之近者安逺者來天子以為才任四岳十二牧之職大厯七年冬十有一月加御史大夫持節都督福建泉汀漳五州軍事領觀察處置都防禦集作團練等使八年夏四月龍旂六轡至自京師閩越舊風機巧剽輕資貨產利與巴蜀埒富猶無諸餘善之遺俗號曰集作為難治公将治之也考禮正刑節用愛人頒賦遣役必齊其勞逸視年豐耗量入以制用削去事之煩苛法之掊尅者吏不奉職民不師敎則懲以薄刑俾寖遷善由是人知方矣公将安之也初哥舒晃反書至公屨集作履及於門遽命上将帥戈船下瀨之師西與鍾陵軍會先拔循潮二州以援畨禺推誠誓衆士皆奮勇既而大憝就戮五嶺底定民是以康繄我師是賴人無姦宄寇賊之虞矣公将敎之也考頖宫之制作為此學而寓政焉躬率羣吏之稍食與贖刑之餘羨以備經營之費而不溷於民也先師寢廟七十子之像在東序講堂書室函丈之席在西序齒胄之位列於廊廡之左右毎嵗二月上丁習舞釋菜先三日公齋戒肄禮命博士率胄子修祝嘏陳祭典釋菜之日釁器用幣籩豆在堂罇罍在阼公𤣥端赤舄正詞陳信是日舉學集無學字士之版視其藝之上下審問慎思使知不足敎之導之講論以朂之八月上丁如初禮嵗終博士以遜業之勤惰覃思之精麤告于公斂其才者進其等而貢之于宗伯将進必以鄉飲酒之禮禮之賔主三揖受爵於兩壺之間堂下樂作歌以發徳鹿鳴南陔由庚嘉魚南山有臺以将其厚意由是海濵榮之以不學為耻州縣之敎達於鄉黨鄉黨之敎達於衆庶矣公薨之二集作明年太常議按公叔發一作束髪非修衞國之班制以交四隣故易其名曰文孔文叔其勤公家夙夜不懈衞人銘其彛鼎以公尊敎勸學徳洽荒服乃奏諡曰成詔贈禮部尚書而刻金石之禮則未備今也敢播徳馨貽之無窮其銘曰公之文肅恭且仁宣力事君潤飾經術㡳綏斯民公之武鰥寡不侮剛亦不吐率師勤王戡厥醜虜易俗集作公之移風經始頖宫百堵皆興孔堂崇崇四科以班乃侯乃公秩秩祀典鏘鏘禮容大昕鼓篋集作徵學士萃止褒衣方屨登降以齒從公于邁樂我泮水我㕓我里講論集作誦資始比屋為儒俊造集作選如林縵胡之纓化為青衿公宜難老為學集有者字司南女今反斜集作扳日告凶實天匪忱翽翽和鑾兮不聞遺音願言思公兮如玊如金鏤餘烈於此石以塞罷市者之心麟臺碑常表微大凡二字一作夫聖人作然後王道明王道明然後瑞應至靈貺感通理合冥數昔殷道剝喪民罔攸歸於是文王以有位之聖嗣成湯之徳神人感義一作咸乂故鳯鳴於岐洎周徳陵夷一作遲道靡所屬由是仲尼以無位之聖述文武之法憲章聿修故麟見於魯于時王室無主禮法盡去天子之尊存乎位號魯周公之所封用四代之禮樂遺風故典鬱而未發仲尼以天生一作縱之徳主乎其中居周公之邦志文武之道觀廢興之運知作者在已位不得以庇生民權不得以司刑賞是天将喪斯民也而未喪斯文也乃綴絶緒申舊章變其禮文酌為典憲擥五常之龜鏡遵三綱之軌轍帝王之道幽而復明盛德大業於是乎在天錫嘉瑞光昭厥功顧一作故周敬魯哀不得而有也由此觀之盖春秋為王法之器魯國為王法所寄在其所寄以舉其器鼓仁義為舟航權褒貶為檝櫂一作蒿檝乘横流之波濟天下之溺上無列國之輔下無陪臣之助故道不信於天下而信于知一作智者法不著於當時而著於後代向使仲尼有滕薛之土得三家之衆興我王澤沛一作霈及烝民則麟出於一無此字其郊得其所矣豈復厄於虞人哉故麟不見則孔聖之道不彰麟不死則周室之亂不極嗚呼聖人之生也得其時則化行於江漢不得其時則道屈於季孟靈瑞之出也得其時則名薦於郊廟不得其時則身罹於殘夫是以一無以字聖人能順時以濟人不能反時以自聖靈瑞能因時以應感不能反時以自靈被厄於陳蔡獲麟於大野影響之應其符著矣春秋傳曰有以告者曰有麏一作麕而角者何一作而一角者孔子曰孰為來哉孰為來哉夫豈不知乎盖遜一作殺之而不敢有一有故字示人以疑一有之故二字也元和五年冬十一月表微以滑之從事使於一作乎鄆陽停驂訪古得一作經獲麟之舊壤且曰後之人築臺於此以旌厥徳一作路感先聖之不遇俾麟出之不一作而非時徘徊道周乃作銘曰二儀既闢三象乃乖聖道湮鬱人心不開上無文武下有定哀于一作吁下同嗟麟兮孰為來哉周維不綱孔實嗣聖詩書載刪禮樂大定懲惡勸善姦一作歸邪反正于嗟麟兮克昭符命聖與時合化行為一作位是尊茍或乖戾身窮道存於昭豐邑栖遑孔門于嗟麟兮孰為其仁一作孰知其昬運極數殫一作沒道一作德至時否楚國寢廣秦封益侈墻仭廹阨﨑嶇闕里于嗟麟兮靡有攸止世理則麟世亂則麏出非其時麋鹿同羣孔不自聖麟不自神于嗟麟兮夫何所云一作夫復何云一作皆唐文粹文苑英華巻八百四十七
