body:
  text: 文苑英華巻八百八十四宋李昉等編將相二梁國公姚崇神道碑一首右僕射太子少師唐璿神道碑一首侍中兼吏部尚書裴光庭神道碑一首故開府儀同三司上柱國賜揚州刺史大都督梁國文真公姚崇神道碑張説叙曰八柱承天髙明之位定四時成象亭毒之功存畫爲九州禹也堯享鴻名播時百糓棄也舜稱至德由此言之知人則哲非賢罔乂致君堯舜何代無人有唐元宰曰梁文貞公者位為帝之四輔才為國之六翮言為代之軌物行為人之師表蓋維嶽降神應時間出者也公諱崇字元之姚姓有虞之後逺自吳興近徙于陜今家洛陽焉烈考長沙文獻公樹勲王室建旟嶲府公紈綺而孤克廣前業激昻成學榮問日流武庫則矛㦸森然文房則禮樂盡在弱冠補孝敬挽郎又制舉髙第歴佐濮鄭並有聲績集本文粹作華入為司刑丞天授之際獄吏峻宻公持法無頗全活者衆進夏官員外郎郎中侍郎朝廷曰能遂掌軍國遷鳯閣侍郎監脩國史兼相王府長史始則天人讓王承置醴之顧終以飛龍利見延驂乗之恩自時厥後恒當大任凡三處兵部尚書三入中書令一為禮部尚書左庻子又肅政大夫惣靈武庫兵馬又司僕卿知隴右監牧使出典亳宋常越許申徐潞揚同十郡景雲初以藩邸舊寮封梁國公食賦百室公性仁恕行簡易虗懐泛愛而涇渭不雜真率逕二本作徑盡而應變無窮毎文粹作常集作亦推是心以御於物故所蒞必甿庻風􅅯桀驁二本作狼化從言不厲而教成政不威而事理去思觀頌來暮聞歌旣登邦政卒乘輯睦及在宗伯神人克諧今之中書是為理本謀事兼於百揆論道惣於三台公執國之鈞金玉王度大渾順序休徵來臻懋德格天名遂身遜拜開府儀同三司崇其秩逸其志也初太夫人在堂公受任文粹作職西掖頗限扄禁求侍晨昏優詔旣許尋命二本作令還職公固請以泣制曰家有令弟足慰母心國有棟集作諌臣安可蹔闕其後部符江表敦諭起復纕麻外墨欒棘内毁變禮中權通識所貴神龍之首與聞興復疇其井賦累讓而停夫以革故鼎新大來小徃得䘮而不形於色進退而不失其正者鮮矣君子曰忠不忘親仁也哀不違事義也譲功辭邑禮也濟代全名智也仁以長人義以和下禮以安上智以周身宜其光輔四帝軒冕三紀池䑓琴筑優游暮齒傳爵土於祚𦙍保禄位於終始矣享年七十有一開元九年九月寢疾薨於東都之慈惠里皇上悼焉國人慕焉撫牀輟舂曽未云比制贈揚州大都督謚曰文貞禮也十年二月葬於萬安山之南原在疾也王人賜膳御醫視藥集作御藥視醫于薨也中使弔臨羽儀哀送君臣之義厚莫重焉子异子集無子字奕思綴遺羙以寘罔極有詔掌文之官叙事盛德之老銘功將以寵宗臣揚英烈闕乃灑恩仙翰鏤澤豊䂥日月照臨於佳城煙雲變態於神道寳其文字别爲群玉之山禁其樵蘇即表三司之墓銘曰源深自虞𣲖别從吳避地魯陜居家洛都神明逺契岳瀆真符翊聖斯偶生賢不孤仁將勇濟孝與忠俱學仞文粹作刃攅植文鋒迅驅􅅻安卑位即聘長途惟實惟有若虛若無再三軍國一二訏謨戎柄尤重王綸最樞兼司任切乆政榮殊黼藻彌煥丹青靡喻以寛容物以鍳分區外或形放中恒禮拘箴雖誡口諍亦忘軀但覩渾璞誰詳瑾瑜伊咎尺寸管樂錙銖名遂身正二本作名正身遂言誠願孚方辭漢禄更辱齊租旣積而㪚窮歡盡娛川歸東極日去集作止西晡上惻旒扆旁悲路衢藍田羙玉荔浦明珠載廣休慶爰𢎞典謨豐碑乃立盛業其輔帝念頻軫仙毫持紆䥴金刻石鳳篆龍圖七耀光動三泉澤濡銓文粹作欽能欽事理欝詞敷求舊銘實慙恧磾蕪二本作慙磾恧蕪緬思雲霧尚想江湖有道之德其何以踰延陵之墓空此嗚呼存殁終始遐哉邈乎右僕射太子少師唐璿神道碑蘇頲欽若於天者謂之代工覆冐于人者謂之成務則調元氣法三象鼓洪爐冝萬物其代工成務之本也簡大僚所以服其事明先正所以詔其功卜熊羆所以占其兆從龍虎所以合其應匪徒然而已哉有唐元老宋公侯矣公諱璿字休璟晉昌酒泉人也昔在夏商大夫陳其氏姓泊遷汾晉季子聴其聲樂豈軒之後唐之遺乎旣仕楚而聞魏亦家秦而滅項凉武昭王攬中州之傑居右地之盟七代祖晉昌宣王和佐厥威霸守其夷險故累爲郡之首族粤宣公逺我曽祖驃騎大將軍開府儀同三司贈兖州刺史諱某世位大將軍二千石大父洛陽令朔方郡賛特贈秦州都督諱某烈考咸陽令贈岐州刺史諱某操斧鉞班珪瑞者耀洪烈於四世垂餘風於百里於穆不已莫之與京公初􅀢而孤入則孝出則悌承於母兄之㫖及冠而立學以聚問以辨從於師黨之言焉張嘉運先授於易森然可見者萬象賈公彦次授於禮坦然可觀者百度射䇿髙第初補吳王典籖歴綿州邑西尉同州馮翊主簿弗之好也嘗欲屠郅支刺樓蘭執渾邪逐呼韓始自謀於將帥終見器於公輔遂爲踈勒道行軍從事䇿勲至上柱國授營州都督府户曹叅軍尋以朝㪚大夫檢校朔州刺史盖養能而成績矣轉安西副都護檢校庭州刺史長壽中武威軍大惣管王孝傑之復四鎮實頼其謀表公為西州刺史渉龜沙薄烏壘矛精絶慰渠此之謂也公至則扶厥傷止其擅因所利補其闕故西州之士刻石而建碑焉無何遷靈州都督新昌軍防禦營田等使入蕭關殺都尉絶梓嶺討符離此之謂也公至則城彼方要其險狎諸野墾其實故此地之犬者有備而無討矣就加銀青光禄大夫入拜左豹韜將軍遷司衞卿未㡬攝右肅政大夫檢校凉州都闕節隴右諸軍事叅警夜之肅嚴不時之敬事典之常闕公是遷受南憲之寵惣四方之役邦家之急者繄公是任其年麴莾布支率種落數萬冦於洪源也公訓鉦鐲完甲兵以禦之虜見積尸之凶我懸斬級之賞遁則忘草在而蒙棘他他籍籍不可勝云朝實休之除右武衞右金吾二大將軍俾仍舊鎮雖貴而不留中也先后稽六官之本思五法之要自我聦明惟天照鍳乃拜公文昌夏官尚書同鳳閤鸞䑓平章事隠心而行正色不撓功多㣲管議切安劉中宗之踐副君旁求中庶特轉公大夫太子右庶子加金紫光禄大夫知政如故召綺里而稱叔孫也属駕言北垂薄伐東鄙復公爲夏官尚書兼幽營二州都督安柬都䕶按河北一作翔之州軍一作軍州自􅆁􅅠廵遼碣貪夫亷而忌法戰士逸而待冦且有倫要而無怨讟神功初徵拜輔國大將軍同中書門下三品遷持進尚書右僕射食實封三百户已而居守秦雍今之揆路古曰台司百寮師師萬事理也分郡闕而興之鎮京師以留之豈冨人之始封亦鄼侯之大任位益髙而勇退年愈邁而思止抗聞旒扆宻奏封章乆之聴致仕進封宋國公朝朔望天子方崇文太學講武宣揚延首鴻儒傾心碩老復以公為太子少師監脩國史乞言而書法也景雲初匈奴請公主盟使臣爲約未堅致辭或紿國命公爲持進檢校御史大夫朔方軍大惣管以禦之伏宸威肅戎令人莫聞於吠犬騎寧憚於射闕舉則全師還而罷事將簡棄軒冕神明芝木然邦有大禮樂大政刑率由典謨罔不資度享年八十有六景命不造延和元年七月戊子薨於長安懐真里第嗚呼哀哉皇上聞哀撤懸出次揮涕追柳莊而承命一作亟赴思鄭産而安歸制贈使持節都督荆州諸軍事荆州刺史贈物四百叚米粟四百石䘮事官給仍差官四品一人監䕶有加等也太常考行謚曰忠書不云殷之得傳用訓朕志而承其道雅不云周之命程是我戒我師而就其緒於戯惟公浚明前典允迪古訓惣而成之入則獻規出不言政石建孔光之比决勝千里通知四夷子房充國之亞爲將軍尊重於位而謝賔客公之不敢專爲丞相開陳其端以歸人主公之不敢伐如是則鏤彛噐圖旂常載史宮列盟府矣夫翠鵠犀象非不鷙也有其用則不全麟鳳龜龍非不靈也無其時則不至若乃時已偕用不竭身已康名不滅者旣明而且哲也公上惟祖禰傍至功緦頃於槐里之間謹原之右卜其兆圖其域各以族而為之度焉臨薨戒諸子曰儉則自完孝不忘本吾之志矣嗣子陳州刺史先眘左千牛中郎將先擇等克奉遺命能循懿業以年月日塟于舊塋亡夫人太原王氏從祔禮也昔禽息進里奚於秦而穆公之政厚虞邱進叔敖於楚而莊王之力霸故有世祝而代禄焉則我師臣計功𦙍子私風小彼秦楚之事大哉韋平之烈謀可乆者敢作銘曰稽古陶唐惟帝之初遷虞事夏俾侯而起居盤峻峙令德之祉亦曰綿系誕生君子君子伊何邦之宰臣宰臣伊何秉我洪鈞登于廟堂王則是保服于戎狄公嘗致討事惟一心㳟乃三命從讓頥老歸閒體正天也不憗人之云亡大夫掌域郡公㑹䘮咸陽北坂渭水南渡其如邢山永此防墓王則是保疑作王躬是保侍中兼吏部尚書裴光庭神道碑張九齡夫道遵常習故盖人拘於凡也得精亡麤是天縱於聖也方聖上之㧞大師也豈籍譽於朝廷哉徑取士集作才於無跡懸收功於未朕而終致大用克成休勛使祖虗名者見西子而憎貎工橫議者聞魯連而杜口乃知古謂則哲維帝其難今之得人遇聖為易能允明主之鍳不負真賢之實者其在正平中憲公乎公諱光庭字連城河東聞喜人也伯翳之後與秦同姓始封于裴因邑命氏在魏晉之際為人物之傑與琅琊王氏相敵時人謂之八裴八王自茲厥後弈代更盛大王父定周大將軍馮翊大常瑯琊公大公仁基隋光禄大夫追贈持節原州都督天之旣厭隋德矣見危致命不亦難乎謚之曰忠憲春秋之義也父行儉禮部尚書兼定㐮道行軍大惣管聞喜縣公贈太尉時或有姦集作奸王命矣禁暴安人不謂重乎謚之曰憲尊名典也公即獻公之第七子降神元和含光不耀越在初服集作嵗已有老成雖逺大是圖而近識莫悟學探帝載何事小名業綜人倫豈矜一善弱嵗居太尉獻公䘮幼以孝聞尋補𢎞文舘學生神龍初明經擢第授家令寺丞轉太常丞加朝㪚大夫景龍中以親累外轉尋入為陜王友改右衞郎將丁晉國大夫憂柴毁骨立殆至滅性服免起為越州别駕未之就也復除右衞郎將無何遷率府中郎嗟乎有其道而無其用不可行也得其時而不得其志亦不可行也公負經綸之器韜王覇之畧自委洎外䑓棲遲下位出外從事十數年間坦然而自若者何哉盖知才有所必伸命有所必與非茍而已開元中聖上思光禄之休烈嘉太尉之元勲是必象賢其將大受特拜司門郎中轉兵部侍䑓之文始應列宿鴻漸之羽可用爲儀遷鴻臚少卿以觀其能也是嵗天子有事于岱宗諸侯㑹朝于行在執籩豆者不限於中外獻琛集作賝賮者亦勤於駿奔莫不來享無有逺近而執正以公代曉邉事職在行人且曰夷性持集無此字翻覆黷盟阻德我今有事戎或生心我張吾師有備無患若何公曰不可夫封禪者所以告成功也觀兵者所以威逆命也云亭苖扈非一時之事也受脤執燔非三代之禮也天方佑我光啓舊服憬彼獯鬻能違天乎無庸勦人可以諜告從之秋九月突厥果使其相執失頡利發與其介阿史德暾泥熟來朝公之謀也東封還遷兵部侍郎所父之職夏卿之亞存而舉者悉以咨之公於是考遺訓補闕典蒐苖獮狩之禮詳施䅋簡稽之賦周禮大司馬施貞分職簡稽卿民集改施仁征頒九畿之政設九伐之刑以練國容以精軍實邉鄙不聳帝用嘉之旣而拜中書侍郎同中書門下平章事兼御史大夫王出其言霈乎人有歸也天憲惟明肅乎人知禁也尋加銀青光禄大夫換黄門侍郎俄遷侍中兼吏部尚書𢎞文舘學士惣百揆之樞轄酌九流之泉集作淵唐諱奥叶文軌之殷受天人之和木集作水非火象鼎其惟實餗山川出雲用作霖雨時哉之㑹無得稱焉先是大化之行務以𤣥黙遵夫易簡舊章在而不議吏道雜以多端公於是求革故之實契隨時之義作秩序以平之設循資以定之謹權衡以選之考殿最以叅之姦回無所措其邪噂􅊱不能介其量多士動色群方改瞻仰之者邈乎如山窺之者間不容髪或曰執事無乃惠歟公曰大命敢不敬歟若然方將致六符於泰階驅百姓於仁壽豈直睥睨先正集作世唐諱紛綸近古汨而隨流守而勿失云爾哉二十年冬上幸河東祠后土命公兼左軍師禮畢賜爵正平男加光禄大夫云集無此字抑人有言曰樹善莫如滋積仁莫如重則臧僖之慶有後於魯欒武之德未絶於仁冝公侯之子孫必復其始也公嘗讀易至乾之屯升之漸喟然嘆曰物惡有滿而不溢髙而不危者哉旣而居不崇侈動無踰法雖百乗之家萬夫之長冲如也謂日用不知存諸方冊何天年未永瘼此台臣二十有一年春三月癸卯遘疾薨於京師平康里之私第春秋五十八朝廷哀傷冕旒震悼制户部尚書杜暹即殯弔祭􅈖集作賻物五百叚粟五百石䘮事優厚官供輟朝三日丁未有詔追贈太師謚曰忠憲使某官某監候䘮事以某月日葬我忠憲公於聞喜之舊塋禮也初知星者言上相有變良臣將殁謂請譲之公曰使禍可禳而去則福可祝而來也論者多之以爲知命夫天下之達道有五所以行之者三曰忠孝仁安君忠也榮親孝也周物仁也此三者有一於集作于身鮮矣而公實兼之且媚于人者必好其威福賢於事者必羞其謗政公知其然則以直道匪躬之故忠莫厚焉禮為人子春秋以致享義於人臣夙夜以從命公知其然則以時告如在之敬孝莫重焉夫以衡石之任陶鈞之力莫不責於下吏求備於一人以故舞文雷同疑獄嵗構恬而不改浸以成風公知其故則以信察御物之惠仁莫加焉其行已奉公皆此類也嘗所著述率于箴規以為惇叙九族本枝百世集作代王者之盛也而義不可以無訓作瑶山徃記維城前軌以諷之㣲而彰志而晦聖人之舉也道不可以虛行作續春秋自戰國迄于周隋以統之臣子義也天人之際備矣非洽聞通理其孰能與於此乎冝其存無幸人殁有遺愛嗣子積京兆府司録事叅軍孝實克家動必中禮丕承厚命紆天鍳而増華敢跡前脩琢豊碑而不朽銘曰益作舜虞鍼分晉土慶流八族德盛三祖琅琊象賢懐文佩武光禄忠烈殺身報主尚書出將恢我王畧文教内敷武功外鑠緇衣之弊惟公繼作用晦而明處豐思約鴻臚好謀夏卿稱職代天施化佐皇立極納于憲府好是正直乃宅冡司謀猷允塞盡瘁事國夙夜在公居無闕正殁有餘忠天子命我頌德銘功日月有旣令聞無窮文苑英華巻八百八十四
