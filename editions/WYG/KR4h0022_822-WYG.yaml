body:
  text: 文苑英華巻八百二十三宋李昉等編宴遊一宴遊始得西山宴遊記一首鈷鉧潭記一首鈷鉧潭西小丘記一首至小丘西小石潭記一首袁家渇記一首石渠記一首石澗記一首小石城山記一首溪谷丘右溪記一首新安谷記一首黄溪記一首龍興寺東丘記一首園圃菊圃記一首㐮陽張端公西園記一首宴遊此集大率篇目各以類分而此巻自巻首始得西山宴遊記以下至小石城凡八首皆藂雜其名盖栁宗元一時之述也觀其詞㫖次叙纍如貫珠故不可漏略一題而差其先後也因専命其門曰宴逰仍冠宴逰部之首始得西山宴逰記栁宗元自余為僇人居是州恒惴慄其隟也則施施而行漫漫而遊日與其徒上髙山入深林窮廻溪幽泉怪石無逺不到到則披草而坐傾壺而醉醉則更相枕以卧卧而夣意有所極集無卧而夣夣亦同趣覺而起起而歸以為凡是州之山林集無林字有異態態字集作能勝者皆我有也而未始知西山之怪特今年九月二十八日因坐法華西亭望西山始抵集作指異之遂命僕人過湘江縁冉集作染溪斫榛莽焚茅茷窮山之髙而上集作止攀援而登箕踞而逰集作遨則凡數州之土壤皆在衽席之下其髙下之勢岈然洼然若垤若空集作穴尺寸千里攢蹙累積莫得遯隠縈青繚白外與天際四望如一然後知是山之特出不與培塿為類悠悠乎與灝氣俱而莫得其涯佯佯集作洋洋乎與造物者逰而不知其所窮引觴滿酌頽然就醉不知日之入蒼然暮色自逺而至至無所見而獨集作猶非不欲歸心凝形釋與萬物不異集作萬化㝠合然後知吾向之未始逰逰於是乎始故為之文以志是嵗元和四年也鈷鉧潭記鈷鉧潭在西山西其始盖冉水南奔注抵山石屈折東流其顛委勢峻盪擊益暴齒集作齧其涯故旁廣而中深畢至石乃止集作止流沬成輪然後徐行其清而平者且十畝餘有樹環焉有泉懸焉其上有居者以余之亟逰也一旦欵門来告曰不勝官租私劵之委積既芟山而更居願以潭上田貿財以緩禍余樂而如其言則崇其臺延其檻行其泉於髙者而墜之潭有聲潨然尤與中秋觀月為宜於此以見天之髙氣之逈孰使余樂居夷而忘故土者非兹潭也歟鈷鉧潭西小丘記得西山後八日尋山口而面二字集作西北道二百步又得鈷鉧潭潭集本不疊潭字西二十五步當湍之集作而浚者為魚梁梁之上有丘焉生竹樹其石之突怒偃蹇負土而出争為竒恠集作狀者殆不可數其嶔然相累而下者若牛馬之飲于溪其衝然角列而上者若熊羆之登于山丘之小不能一畝可以籠而有之問其主曰唐氏之棄地貨而不售問其價曰止四百余憐而售之李深源元克已時同逰皆大喜出自意外即更取器用剷割穢草伐去惡木烈火而焚之嘉木立羙竹露竒石顯由其中以望則山之立集作髙雲之浮溪之流鳥獸蟲魚集無此二字之遨逰舉熈熈然廻巧獻技以效兹丘之下枕席而卧則清泠之狀與目謀瀯瀯之聲與耳謀悠悠集作悠然而虚者與神謀淵然而静者與心謀不匝旬而得異地者二雖古好事之士或未能至焉嘻集作噫以兹丘之勝致之灃鎬鄠杜則貴逰之士争買者日増千金而愈不可得今棄是州也農夫漁父遇集作過而陋之價四百連嵗不能售而我與深源克已獨喜得之是其果有遭乎書于石所以賀兹丘之遭也至小丘西小石潭記從小丘西行百二十步隔篁竹聞水聲如鳴珮環心樂之伐竹取道下見小潭水尤清洌金集作泉石以為底近岸巻石底以出為坻為嶼為嵁為巗青樹翠蔓䝉絡摇綴參差披拂潭中魚可百許頭皆若空逰無所依集注一作披逰魚類拂潭中俯類若乗空日光下澈影布石上佁集作怡然不動俶爾逺逝往来翕忽似與逰者相樂潭西南而望半折蛇行明滅可見其形勢大牙差互不可知其源坐潭上四面竹樹環合寂寥無人淒神寒骨悄愴幽邃以其境過清不可乆居乃記之而去同逰者吴武陵襲集作龔古余弟宗𤣥𨽻而從者崔氏二小生曰恕已曰奉一袁家渇記由冉溪西南水行十里山水之可取者五莫若鈷鉧潭由溪口集有而字西陸行可取者八九莫若西山由朝陽巗東南水行至蕪江可取者三莫若袁家渇皆永中幽麗竒處也楚越之間方言謂水之反集本作支流者為渇音若衣褐之褐上與南舘髙嶂合下與百家瀬合其中重洲小溪深集作澄潭淺渚間側曲折平者流集作深黒峻者沸白冉集作舟行若窮忽又無際有小山出水中皆美石石上生青菆集作叢冬夏常蔚然其上多巖洞其下多白礫其樹多楓柟石楠楩櫧樟柚草則蘭芷又有異卉類合歡而蔓生轇轕水石每風自四山而下振動大木掩苒衆草紛紅駭緑蓊葧香氣衝濤旋瀨退貯谿谷摇颺葳蕤與時推移其大都如此余無以窮其狀永之人未嘗㳺焉余得之不敢専也而出傳於世其時地世主袁氏故以名焉石渠記自渇西南行不能百步得石渠民橋其上有泉幽幽然其鳴乍大乍細渠之廣或咫尺或倍尺其長可十許步其流抵大石伏出其下踰石而往有石泓昌蒲被之青蘚環周又折西南集無南字行旁蹈集作䧟巖石下北墮小潭潭幅員減百尺清深多鯈魚又北曲行紆餘睨若無窮然卒人集無人字入于渇其側皆詭石恠木竒卉美箭可列坐而庥焉風摇其顛韻動崖谷視之既静其聼始逺余從州牧得之攬去翳枋集作朽決䟽土石既崇而焚既釃而盈惜其未始有傳焉者故累記其所屬遺之其人書之其陽俾後好事者求之得以易元和七年正月八日蠲渠至大石十月十九日踰石得石泓小潭渠之美於是始窮也石澗記石渠之事既窮上由橋西北下土山之隂民又橋焉其水之大倍石渠三之亘石為底達于兩涯若牀若空集作堂若陳筵席若限閫奥水平布其上流若織文響若操琴掲跣而往折竹掃陳葉排腐木可羅胡牀十八九居之天集無天字交絡之流觸激之音皆在牀下翠羽之木龍鱗之石均廕其上古之人其有樂乎此耶後之来者有能追予之踐履耶得意之日與石渠同由渇而来者先石渠後石澗由百家瀨上而来者先石澗後石渠澗之可窮者集有皆字出石城村東南其間可樂者數焉其上深山幽林逾峭險道狭不可窮也小石城山記自西山道口徑北踰黄茅嶺而下有二道其一西出尋之無所得其一少北而東不過四十丈土斷而川分有積石横當其垠其上為睥睨梁欐之形其旁出堡塢有若門焉窺之正黒投以小石洞然有水聲其響集作音之激越良乆乃已環之可上望甚逺無土壤而生嘉樹美箭益竒而堅其䟽數偃仰類智者所始集作施設也噫吾疑造物者之有無乆矣及是逾集作愈以為誠有又恠其不為之於中州而列是夷狄更千百年不復集作得一售其技是故勞而無用神者儻不宜如是則其果無乎或曰以慰夫賢而辱於此者或曰其氣之靈不為偉人而獨為是物故楚之南多人而多石是二者余未信之溪谷右溪記元結道州城西百餘步有小溪南流數十歩合營溪水底兩岸悉皆恠石欹嵌盤缺不可名狀清流觸石洄懸激注佳木異竹垂隂相䕃此溪若在山野則宜逸民退士之所㳺處在人間則可為都邑之勝境静者之林亭而置州已来無人賞愛徘徊溪上為之悵然乃䟽鑿蕪穢俾為亭宇植松與桂兼之香草以禆形勝為溪在州右遂命之曰右溪刻銘石上彰示来者新安谷記穆員京洛佳賞盡走乎闕塞次則東城以桃李繁華相髙北山瀍陽有崖谷谿洞之勝盖天然疏鑿以遺来者而人不之争我公懸車之三年探得其最凡逺于一作乎國門邇于闕塞者四之一買之一有夫字直減於東城之貴者亦如之連岡疊磴中斷夾鬭為其拱躊如狀如意翠竹茂樹縈環森羅為其縁飾如績如織泉出山腹釀而為池釃而為𣲖帶於竹樹葱蘢之間池可行舟𣲖能流響果園蔬囿用以為溉其餘與瀍水合于山下臨玩之美耳潺潺目鱗鱗不俟潄浥而煩襟如洗於是卜瀍之上泉之側周章顧盼擁抱之勢作為新亭春之日百花流鶯笑語滿谷迭相為主待一作代人為賔始至也若讌賞之之踈將去也若怨棄之之速夏之日清風入林徘徊不散若為繁暑與之竟夕而流泉娯客亦奏雅音秋之日霜淒氣肅萬象畢清亭中一望超忽天外而片雲行雁又似與賞心逺目相期於前冬之日木落天㢠遥山入戸可愛之景照於陽坡遲遲為人人散而歛凡四時暇日公與大夫從甥姪子孫攜琴罇翰墨㳺於斯燕於斯慈顔怡天和熈一觴舉萬福隨穆穆雍雍翼翼䕫䕫中外具慶如塤如箎公曰人生知足為富當時為貴茍俟外奬則此一作知地足以忘年何必陸賈擊鮮䟽廣散金然後為適興王氏之少長咸集潘家之兒童稚齒吾之適也爾羣子識之謹按春秋之義地從主人今我公開國新安則家谷宜以新安為稱新安之為解也既所以旌新之安亦所以祝吾家之慶與兹山之賞日月新而永永安安之謂也又江南有新安者山水之異絶于一作乎中國維其似之是以命之第三子員受命紀石且若從者名位列之于隂也逰黄溪記栁宗元北之晉西適豳東極吴南至楚越之交其間名山水而州者以百數永最善環永之治百里北至於浯溪西至于湘之源南至于瀧泉東至于黄溪東屯其間名山水而村者以百數黄溪最善黄溪距州之城二字集作治七十里由東屯南行六百步至黄神祠祠之上兩山墻立如丹碧之華葉駢稹集作植與山升降其缺者為崕峭巗窟水之中皆小石平布黄神之上掲水八十步至初潭最竒麗殆不可狀其略若剖大甕側立千尺溪水即焉黛蓄膏渟来若白虹沉之集作沉沉無聲有魚數百尾方来㑹石下楚越之人數魚以尾不以頭南去又行百步至第二潭石皆巍然臨峻流若頥集作頦頷齗齶其下大石離列可坐飲食有鳥赤首烏翼大如鵠方東嚮立自是又南數里地皆一狀樹益壯石益廣集作瘦水鳴皆鏘然又南一里至大冥之川山舒水緩有土田始黄神為人時所居也集作居其地傳者曰黄神王姓莽之世也莽既死神更號黄氏逃来擇其深峭者潛焉始莽嘗曰余黄虞之後也故號其女曰黄皇室主黄與王聲相邇而又有本其所以傳焉者益驗神既居是民咸安焉以為有道死乃爼豆之為立祠後稍徙近乎民今祠在山隂溪水上元和八年十月五日入六日歸栁州本作五月十六日既歸為記以啟後之好逰者永州龍興寺東丘記逰之適大率有二曠如也奥如也如斯而已其地之凌阻峭出幽鬰寥廓悠長則於曠宜抵丘垤伏灌莽廹遽㢠廻合則於奥宜因其曠雖増以崇臺延閣㢠廻還日星臨瞰風雨不可病其敞也因其奥雖増以茂樹叢石穹若洞谷蓊作蔚若林麓不可病其邃也今所謂東丘者奥之宜者也其始龕之外棄地余得而合焉以屬于堂之北垂凡坳窪坻岸之狀無廢其故屏以宻竹聮以曲梁桂檜松杉楩柟之植幾三百本嘉卉美石又經緯之挽入緑縟幽䕃薈蔚步武錯迕不知所出温風不爍清氣自至水亭陿室曲有奥趣然而至焉者往往以邃為病噫龍興永之佳寺也登髙殿可以望南極闢大門可以瞰湘流若是其曠也而於是小丘又將披而攘之則吾所謂逰有二者無乃闕焉而䘮其地之宜乎丘之幽幽可以處休丘之窅窅可以觀妙溽暑遁去兹丘之下太和不遷兹丘之巔奥乎兹丘孰從我逰余無召公之徳懼剪伐之及也予集無此字故書以祈後之君子園圃菊圃記元結舂陵俗不種菊時自逺致之植於前庭壇下及再来也菊已無矣徘徊舊圃嗟嘆乆之誰不知菊也方華可賞在藥品是良藥為蔬菜是佳蔬縱須地趨走猶宜徙植修養而忍蹂踐不愛惜乎於戲賢士君子自植其身不可不慎擇所處一旦遭人不愛重如此菊也悲傷奈何於是更為之圃重畦植之其地近讌息之堂吏人不此奔走近登望之亭旌旄不此行列縱參歌妓菊非可惡之草使有酒徒則菊為助興之物為之作記以託後人并錄藥經列於記後襄陽張端公西園記符載南雍州地靈氣爽號為雄勝峴山漢水環抱里閈東西主人有問於我我或致譲其地荆揚淮楚之不侔也繇是侍御史張公得風景之髙朗依連帥之仁愛遂此一廬作為宅居居有園園在萬山東五六里檀溪西三百許步南值漢髙廟正相當佛宫數四與岑巒邐迤蒼蒼松檜盡為庭木前有名花上藥羣敷簇秀霞鋪雪灑㶑灔清波後有含桃朱杏的皪䕃藹殊姿絶艷甲冠他囿毎天清雲浄雨霽風息山僧羽客洎簮纓好事者亟来從之開軒設簟耳目袪曠煮茶摘果動至酣樂出門為人寰宴居成山林適自中得萬累何逺故公用是上才草聞風聲舊齒曩曹翰飛青㝠今手操財賦之柄心寓希夷之際人謂官薄我有浩氣屈伸通塞頽如也即西園之地實張公營道之塲也是何棲心拔俗之遐曠也如此載匡廬遁客目㳺履踐故輙書衆美于素壁之上使異日造辟彊者遂用之為導人云丁丑嵗六月庚午推厯者以為金畏火而伏之日也符載之記文苑英華巻八百二十三
