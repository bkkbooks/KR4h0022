body:
  text: 文苑英華巻三百二十四宋李昉等編花木四松三十七首栢二首桂六首檜一首杉一首桐八首槐二首松北鄉古松樹隋煬帝古松唯一樹森竦詎成林獨留麈尾影猶横偃葢隂雲來聚雲色風度雜風音孤生小庭裡尚表嵗寒心松樹李徳林結根生上苑擢秀邇華池嵗寒無改色年長有倒枝露自金盤灑風從玉樹吹寄言謝霜雪貞心自不移松李嶠欝欝髙巖表森森幽澗垂鶴棲君子樹風拂大夫枝百尺條隂合千年葢影披嵗寒知不及類詩作終不改勁節幸君知四松杜甫四松初移時大抵三尺彊别來忽三嵗離立如人長㑹看根不㧞莫計枝凋傷幽色幸秀發幸集作㑹踈柯已昻藏所挿小籓籬本亦有隄防終然掁撥損得愧集作恡千葉黄敢為故林主黎庶猶未康避賊今始歸春草滿空堂覽物嘆衰謝及兹慰悽凉清風為我起洒面若㣲霜足為集作足以送老資聊待偃葢張我生無根蔕配爾集作汝亦茫茫有情且賦詩事跡可兩集作兩可㤀勿矜千載後惨澹蟠穹蒼蕭寺偃松顧况凄凄百卉病亭亭雙松逈直上古寺深横拂秋殿冷輕響入龜目一作息片隂栖鶴頂山中多好樹可憐無比並觀鄰老栽松李端雖過老人宅不觧老人心何事殘陽裡栽松欲待隂待字一作得中書相公任兵部侍郎日後閣植四松逾數年澣忝此官因獻拙什鄭澣丞相當時植幽襟對此開人知舟檝器天假棟樑材錯落龍鱗出襹一作䙰褷鶴翅廻重隂羅武庫細響静山䑓得地公堂裡移根澗水隈吳臣夣寐逺泰嶽嵗年催轉覺飛纓謬何因繼組來幾尋珠履跡願比角弓培栢悦猶依社星髙久照台後凋應共操無復問良媒奉和劉禹錫右相歴中䑓移松武庫栽紫茸抽組綬青實長玫瑰便有干霄勢看成構厦材數分天柱半影逐日輪廻舊賞台階去新知谷口來息隂常仰望翫意集作境幾徘徊翠粒晴懸露蒼鱗雨起苔凝音助瑶瑟飄蘂泛金罍月桂光摇集作花遥燭星榆葉對開終湏似鷄樹榮茂近昭囘同前唐扶幽抱應無語貞松遂自栽寄懐丞相業因擢大夫材日射蒼鱗動塵迎翠箒廽嫩茸含細粉初葉泛新杯偶聖為舟去逄時與鶴來寒聲連曉竹静氣結隂苔赫奕鳴騶至熒煌洞户開良辰一臨眺憇樹幾徘徊恨發風期阻詩從綺思裁還聞舊凋契凡在一作九萬此中培同前姚合四松相對植蒼翠暎中䑓擢幹陵空去移根斸石開隂陽氣漸照造化手親栽日月滋佳色烟霄長異材清音勝在澗寒影徧生苔静遶霜霑履閒看酒滿杯同榮朱户際永日白雲隈宻葉聞風度髙枝見鶴來賞心難可盡麗什妙難裁此地無因到循墻幾百回同前右相歴兵署四松皆手栽斸時驚鶴去移處帯雲來根倍雙桐植花分八桂開生成造化力長作棟樑材豈羡蘭依省猶嫌栢占䑓出樓終百尺入夢已三台幽韻和宫漏餘香度酒杯拂冠枝上雪染履影中苔髙位相承地新詩寡和才何由比蘿蔓攀附在條枚西齋小松二首元稹松樹短於我清風亦已多况乃枝上雪動摇㣲月波幽姿得閒地詎感嵗蹉跎但恐厦終構藉君當柰何二簇簇枝新黄纎纎攅素􅃌柔苔漸依條短莎還半委清風日夜髙凌雲意集作竟何已千嵗盤老龍脩鱗自兹始右小松詩􅍬集并英華皆誤作一首詳詩意并疊用清風二字合是二首庭松白居易堂下何所有十松當我階亂立無行次髙下亦不齊髙者三丈長下者十尺低有如野生物不知何人栽接以青瓦屋承之白沙䑓朝昏有風月􅀈温集作燥湿無塵泥踈韵秋瑟瑟集作槭槭凉隂夏凄凄春深㣲雨夕滿葉珠蓑蓑集作漼漼嵗暮大雪天壓枝玉皚皚四時各有趣萬木非其儕去年買此宅多為人所咍一家三集作二十口移轉就松來近松集作移來有何得但得煩襟開即此是益友豈必湏集作交賢才顧我猶俗士冠帶走塵埃未稱為松主時時一愧懐寄題盩厔㕔前雙松兩松自仙遊山移植縣㕔前人憶昨為吏日折腰多苦辛歸家不自適無計慰心神手栽兩樹松聊以當平聲嘉賔乗春日一溉生意漸欣欣清韵度秋在緑茸隨日新始憐澗底色不憶城中春有時晝掩關雙影對一身盡日不寂寞意中如三人忽奉宣室詔徴為文苑臣閒來一惆悵恰似别交情集作交親一作情親早知烟翠前攀翫不逡廵悔從白雲裡移爾落囂塵題遺愛寺前溪松前人偃亞長松樹侵臨小石磎静将流水對髙共逺峰齊翠葢煙籠宻花幢雪壓低與僧清影坐借鶴稳枝栖筆冩形難似琴偷韻易迷暑天風槭槭一作瑟瑟晴夜露集作静夜雨凄凄獨憇依為舍閒行遶作蹊棟梁君莫採留着伴幽棲小松章孝標爪葉鱗條龍不盤梳風幕翠一庭寒莫言只是人長短湏作浮雲向上看僧院小松前人抛杉背栢冷僧簾鎻月梳風出殿簷還似天台新雨後小峯雲外碧尖尖賦得聼松聲劉得仁庭際㣲風動髙松韻自生聼時無物亂盡日覺神清强與幽泉並翻嫌一作疑細雨并拂空一作雲増鶴唳過牖合琴聲况復當秋暮偏宜在月明不知深澗底蕭瑟有誰驚松釋無可枝怪幹鱗皴煙梢出澗新屈盤髙極目蒼翠逺驚人待鶴移隂過一作隂移聼風落子一作子落頻青青寒木外自與九霄隣贈賣松人于武陵入市雖求利憐君意獨真斸将寒澗樹賣與翠樓人瘦葉幾經雪淡花應少春長安重桃李徒染六街塵友人亭松前人俛仰不能去如逄舊友同曽因春雪散見在華山中何處有明月訪君聼逺風相将歸未得各占石巖東廣徳官舍二松喻鳬楊公休簿領二木日堅牢直甚彰吾節清終庇爾曹幽隂月裏細冷樹雪中髙誰見干霄後枝飄白鶴毛松韓喜類詩作溉倚空髙檻冷無塵徃事閒徵夢欲分翠色本宜霜後見寒聲偏向類詩作許月中聞啼猿想帶蒼山雨歸鶴遥知類詩作應和紫府雲莫向東園競桃李春光還是不容君和李用夫栽小松項斯移來未换葉已勝在空一作深山静對心標直遥吟境助閒影侵殘雪際聲透小窗間即聳凌空幹修條豈易攀横水舘雙松趙嘏故園溪上雪中别野一作野館枕前雲畔逢白髪漸多何自苦清隂長在好相容一作從迎風幾拂朝天葢帶月猶􅅤度嶺鐘更憶葛洪丹井側數株臨水欲成龍松鄭谷下視垂楊拂路塵雙峰石上覆苔文濃霜一作霜濃滿逕無紅葉晩日一作日晩髙枝有白雲春砌花飄僧旋掃寒溪子落鶴先聞那堪寂寞悲風起千樹深藏李白墳題净衆寺古松崔塗百尺森踈倚梵䑓昔人誰見此初栽故園未有偏堪戀浮世如閒即合來天暝豈分蒼翠色嵗寒應識棟梁材清隂可惜不駐得集作可老住不得歸去暮城空首囘唐興寺小松杜荀鶴雖小天然一作生别難将衆木同侵僧半窗月向客一一類詩作與客滿襟風枝拂行苔鶴聲分呌砌蟲如今未堪看湏是類詩作待雪霜中小松前人自小刺頭深草裏而今漸覺出蓬蒿時人不識凌雲木直待凌雲始道髙鄭轂補闕山松張蠙心将積雪欺根與白雲離逺寄僧猶憶髙看鶴未知影交新長葉皴匝舊生枝多少同時種深山不得移松許棠何年斸到城滿國響髙名半寺隂常匝隣坊景亦清代多無巧勢風定有餘聲自得天然狀非同澗底生興善寺古松張喬種種近王城前朝古寺名瘦根侵地逺香吹入雲清鶴動池䑓影僧禅雨雪聲看來人旋老因此嘆浮生移小松前人松子落何年纎枝長水邊斫開新磵雪移出逺林煙帶月棲幽鳥兼花灌冷泉㣲風動清韵閒聼罷琴眠松陸肱雪霜知勁質今古占類詩作名嘉名斷砌盤根逺踈隂偃葢清鶴棲何代色僧老四時聲欝欝心彌久烟髙萬井生述松王貞白逺谷呈材幹何由入棟梁嵗寒虚勝竹功績不如桑秋露落松子春深一作雪裛嫩黄雖䝉匠者顧樵採日難防僧院松曹松此木韻彌全秋宵學瑟絃空知百餘尺未定幾多年古甲磨雲折孤根把一作促地堅何當拖一幹作葢道塲前栢庭栢魏收見初學記古松圗偃葢新栢寫鑪峰凌寒翠不奪迎暄緑更濃茹葉輕沉體咀實化衰容将使中䑓麝違山能見從晉朝栢樹集作法雲雙檜温庭筠晉朝名輩此離羣相對濃隂去住分題處尚尋王内史畵時應是顧将軍長廊夜静聲疑雨古殿秋深影勝雲一下南䑓到人世晩泉清籟更誰集作難聞桂李嶠未植銀宫裡寧移玉殿幽枝生無限月花滿自然秋俠客條為馬仙人葉作舟願君期道術攀折可淹留詠桂二首李白園花笑芳年池草艶春色猶不如槿花㛹娟玉堦側芳集作芬榮何夭促零落在瞬息豈若瓊樹枝終嵗長翕赩二世人種桃李多在金張門攀折争㨗徑及此春風暄一朝天霜下榮耀難久存安知南山桂緑葉垂芳根青隂亦可託何惜樹君園比聞龍門敬善寺有紅桂樹獨秀伊川嘗於江南諸山訪之莫致陳侍御知予所好因訪剡溪樵客得數株移植郊園衆芳色沮乃知敬善所有是蜀道茴草徒得嘉名因賦是詩兼贈陳侍御金陵作李徳裕昔聞紅桂樹獨秀龍門側越叟移數株周人未嘗識平生愛此樹攀翫無由得君子知我心因之為羽翼豈煩嘉客譽且就清隂息來自天姥岑長疑翠嵐色芬芳世所絶偃蹇枝漸直瓊葉潤不凋珠英粲如織猶疑翡翠宿想待鵷鸞集作雏食寧止暫淹留終當更封植山中桂于武陵日暖上山路鳥啼知已春忽逢幽隂樹如見獨醒人石冷開常晩風多落亦頻樵夫應不識嵗久伐為薪雙桂詠陳陶青冥結根易傾倒沃州山中雙樹好琉璃宫殿無斧聲石上蕭蕭伴僧老檜揚州法雲寺雙檜張祜謝家雙植本南集作圖榮樹老人亡地變更朱頂鶴知深盖偃白眉僧見小枝生髙臨月戸集作殿秋雲影静入風簷集作廊夜雨聲縱使集作從此百年為上夀緑隂終借暫時行集作終是借君行杉郡齋移杉韋應物擢幹方數尺幽姿已蒼然結根西山寺來植郡齋前新􅅤野露氣稍静髙牎眠雖為賞心遇豈有嵓中縁桐同詠庭中桐呉均龍門有竒價自言梧桐枝華暉實掩映細葉能披離不降周王子空将嵗月移初學記作空待嵗時移嚴風忽交勁遂使無人知零落桐虞世基零落三秋幹摧殘百尺柯空餘半心在生意漸無多詠桐陸季覽摇落依空井生死尚餘心不辭先入爨惟恨少知音桐李嶠孤秀嶧陽岑亭亭單題詩作萋萋出衆林春花雜鳯影秋月㺯珪隂忽被夜風激遂逢霜雪侵单題詩作髙映龍門逈雙依玉井深不因将入爨誰為作鳴琴段宥㕔孤桐王昌齡鳯凰所宿處月影孤桐寒槁葉零落盡空柯蒼翠殘虗心誰能見直影非無端響發調恒苦清商勞一弹梧桐戴叔倫亭亭南軒外貞幹脩且直廣葉結青隂繁花連素色天資韶雅性不愧知音識孤桐雍陶踈桐餘一幹風雨日蕭條嵗晩琴材老天寒桂葉凋已悲根半死復恐尾全焦幸在龍門下知音肯寂寥蜀桐李商隠玉壘髙梧拂玉繩上􅅤霏霧下含氷枉教紫鳯無棲處斷作秋琴弹壊雜録作廣陵槐李嶠暮律移寒火春宫長舊栽葉生馳道側花落鳯庭隈烈士懐忠觸鴻儒訪業來何當赤墀下踈幹擬三台庭槐白居易南方饒竹樹惟有青槐稀十種七八死縱活亦支離何此郡庭下一株獨華滋䝉䝉碧烟葉嫋嫋黄花枝我家渭水上此樹䕃前墀忽向天涯見憶在故園時人生有情感遇物牽所思樹木猶復爾况見舊親知文苑英華巻三百二十四
