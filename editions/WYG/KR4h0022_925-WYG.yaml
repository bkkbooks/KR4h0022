body:
  text: 文苑英華巻九百二十六宋李昉等編職官三十四揚州長史王公碑一首果州刺史李公碑一首桂府長史程府君碑一首梓州司馬楊公碑一首溜州司馬鄭公碑一首隴州司馬楊志誠碑一首揚州大都督長史王公神道碑蘇頲生甫及申思皇多士必訏謨以亮采惟肸蠁幽贊者不曰才乎君安其才居其業奉丹霄之下濟詞白日之中辰者不曰命乎霸城王府君諱某字某爰事英主皇皇我神武金疑期寶臣籍我公輔及揮綸翰乘刀尺宜其尹天下登宰衡雖克揚其休而不踐厥位何也府君之始魏安僖王弟信陵君之績秦滅魏謂之王家者遂命氏焉其後世居霸城族著京兆故得魏藩公子錫𦙍稱宗是猶齊國夫人因昌保姓况神臯之表裏刑盛俊城之相承紱冕固以倜儻卓犖為龍光五代祖罷西魏尚書令贈大尉相州刺史扶風公紀於周史高祖明逺隋雍州大中正𢎞化郡守司金上士銀青光祿大夫書大旗勒大鼎猗那成績繁衍重世曽祖夀隋州都七職主簿隋氏淪胥煬皇板蕩竟全孤竹之操不敗幽蘭之芳祖喜唐世系表作詰皇朝晉州司倉參軍同州河西縣丞父慶趙州房子冀州棗强二縣主簿文秀儒雅韜光鏟跡雄雌之歎則聞鸞鳳之栖未逺公八嵗工詩賦十五讀典墳十八歴渉代史十九初逰太學二十升甲科三傾五城一日千里詣選部冊天門出九流之先當萬夫之特授亳州城父尉且未光也無何棗强府君不祿毁將形骨扶杖於家者三載哀不絶聲倚廬於墓者六祀古曽子死事之中今老萊生事之極思奉檄以盡養顧瞥疑裾而足恥庭闈何適有南山之隠路黌塾不倦有北海之儒門教子弟學成志立盖云十數而府君雲卧林棲傲然肥遁迫於從父之命就以賢人之辟授華州華陰縣尉復冊甲科轉京兆府華原縣尉換華原丞廉問之舉屈為之佐殊尤之薦用冠於首擢拜左臺監察御史王憲斯執國刑不紛一嵗遭内艱如在先考之戚禫闋制復舊倖臣左補闕何輝圖怙勢作奸頗盈罪惡府君直言正色莫避權寵簡墨條奏當朝允之遷殿中侍御史無何拜尚書户部員外郎轉祠部主爵考功三郎中邦有教謂之安國有祀謂之事則人祗之政罔弗恪邦有等謂之爵國有功謂之課則賞罰之㫖罔弗齊自非貞廼應物敏於成務疇能振景拔萃川渟岳立主上旒冕而思一以寰宇腹心特重其掖垣故近宻委於侍臣緝諧連乎小相拜給事中轉中書舎人剸犀兕者其議可以斷割賦鷦鷯者其言可以逺大况天詞往復行於中㫖人望虛佇期以上台姑試之劇備觀周美遷兵部侍郎回翔要津拂拭夷路消長容其正忠邪順其直戎昭者有畢力之師彛序者無曠負之人以東南封圻淮海殷雜雖陸攝水標填於委輸而風果氣鋭懲以剽輕巨鎮何有繄公則賴乃出為揚州大都督府長史陽秋信風雨若不競不絿有倫有要化之為最理念於兹嗚呼景命不融流年孰返以年月日遘疾終於府之官舎享年六十府庭䬃戀閭巷聚哭攀舟檝以咨嗷越江關之重復名流常化雅俗追嗟嗚呼以為當代所歸禮謝於陳在豈謂逢時共許愛深於産卒夫靈龜明鏡可以决疑駟馬拱璧不如進道牽於彼則疑已釋存乎我則道已用府君是以寘毛髪之愆徵膏肓之疾加以博聞好古精義入神有夫子之文章得吾家之書籍闕富山藏當工篆體間以琴徳不揮頴而好事者珍每成聲而知音者寡疑作賞身歿之日所纂集二十巻自彈琴几數張俾後代美其華㫖其實垂芳塵之菴藹採嘉頌之洋溢其高致歟粤開元十五年龍集於卯仲春日晨卜塟於京兆咸陽洪凟原禮也周之堇原漢之槐里丹碑已刻青檟成行子八人長曰有次曰寔並行齊曽閔聲軼元季徵昔有八子之名喪有二連之善府君之仲著作佐郎敬從者季太廟丞擇從者敬也瑚璉之器擇也金玉其相稱之真披文之實記吾人早逰學序曽比義於青襟晩哭寢門匪致能於黄絹辭所不獲强為之銘曰高惟雍兮大曰京遷王氏兮著霸城或公或侯散佩垂纓子子孫孫府君挺生其一徳有必綜才無不括勝情風翔偉量河濶帝曰俾乂求賢如渇公其裒然藏器以達其二三才疑清憲清憲攸歡四趨明光明光孔彰並躋雙掖雙掖忠益皆掌二柄二柄方正其三爰迴􅍨司廼蒞揚都政既成矣公嘗邁乎輔我皇極奮於天衢奈何不藏違世而殂其四世閲人之不息兮人違世之遂即獨四塞之山川兮盡千年之封域噫古之不朽記載是力撰懿圖芬兮清虚廣直其五故果州長史李公神道碑張九齡公諱仁贍字某趙郡房子人其先自段干木至伯仁侯皆以淳徳茂功奮於上世始於藩魏終而將趙其名不隕逺集作遂濟於今五代祖後魏中書侍郎始豊唐世系表同此集作對非不同懿公璨璨生徐州刺史始豐慎公元茂元茂生趙郡太守府君諱鳳昇表作子之字鳳昇生駙馬都尉直閣將軍府君諱道宗道宗生齊尚書兵部郎中府君諱山夀公即郎中府君之子仍世致美在邦攸宜故我公禀靈中和履道元吉以學則探其奥㫖見聖人之心以行則踐其嘉言合君子之度以故動為人譽名乃日宣義府孔修徳輿云逺故未可量也隋大業中舉孝廉洎唐興調棣州司户參軍磁相二州總管府户曹參軍莫不事人以直反身於誠處卑能安敬長則順故光輔郡將周爰我咨自州徂州或嘯或諾既而遷金鄉晉陵二縣令敏集作精識以庀事善教以長人四封用孚三英以粲彼蒲與宻獨何有焉以課最遷歸州治中郢州司馬加朝散大夫行果州刺史盤栢參佐未復公侯道非吾行徳不集作無必貴遂以沒代豈命也夫某年月卒於官舎享年若干及喪至自蜀而塟不歸趙乃卜宅於許封樹汝墳子孫遂家亦既重世至開元中公之孫曰察以古諸侯之祿奉先大夫之祀晝逰本郡輝光前烈非清白以遺善慶之餘保艾爾後人亦何以臻此於是履霜為感恭惟春秋之事刻石是圖俾揚祖宗之業斯善繼者也叙而志之銘曰長史英英作為世程動合雅度休有令名以之入官從事而昇集作允以之佐郡為政孔明悠悠上天曷不貴徳終於參佐孰云邦國孝孫其昌餘慶乃彰宰集作冢樹蒼蒼徽音不忘桂州長史程府君神道碑李邕觀厥品目異等業尚獻臣天與才名神福夀考而中留官序小徃代艱位不極乎多能績未宣其利用戢駿翮韜良工悲聲起於絶絃泣涕形於抱玉自傷楚老豈獨公明而已哉公諱某字某廣宗新安人也其先出自顓頊重黎之後周之休父入為司馬漢之不識擢居衛尉至若昱輔魏主嬰立趙孤奉日以納忠殺身以明節精誠發於寤寐義烈冠於人倫宜其貽謀克家寵光形圖業與時並名與功偕者也五代祖響府君陳襲重安侯隋蕭縣宰四代祖育府君隋車騎將軍曽祖皆府君隋涿郡主簿大父𢎞府君皇朝安陽令考大辨府君泗水六合二縣宰撰東征記兩巻藏之秘省莫不託宿元徳從事老成典學積於蓬山能賦秀於詞苑府君令始家則光有國庠博通全經悉數賢行孝曰曽子文似相如下筆不休違言無擇陳平長者把臂每多田蘇好仁引䋲相重解褐徐城尉始入仕也旋應王臣昇第遷宋城轉櫟城簿王畿政重帝告事先握札雲飛聴訟風靡載擢來庭長安二赤縣尉撙銜御黠夙駕承天驚暗若神應封猶響籍聴擢左臺監察御史仁克寛仁無害恥為誶刻雅欲優閒朝廷許之轉詹事府司直歴城直歴城門郎長杜武進朝邑曲沃好疇雲陽宰六縣皆代工開化順時布和慎簡里胥周省條簿其清水鑑其坦砥平從心術以外形随手妙以旁發人樂新政俗勸古風載遷魏州司馬靜守憲矩審喻寀寮官師有章人吏不黯疑作黷屬右族黜免徹嗣姻連奏引諫書醜詆宰輔選其頗正其奸贜志士寒心明家質首左遷府君饒州焉謫子昕崖州舎城尉俄轉府君桂府洎島夷干誅天師問罪憑險毒送死阻兵昕乃不俟檄徵自促鋭陣挺身而當矢石􅋞面而覆㓂讎馬旋泥中人走岩下憤氣雖作救兵莫臨劒交於胷戈達於腋其命則殞其目不瞑嗚呼爭首謂忠供養謂勇倉卒歸盡零落無成有感路人愍悼慈父沉悲生疾積痛傷年猿堪斷腸烏可銜木人非命也天何問焉以開元十六年十月五日奄徂化於官合以某年月日反塟於其原舊塋禮也夫人廣宗潘氏封某縣君即銀州刺史寶勣之息女柔慈孔嘉貞淑丕訓是佐君子宜諧永年桃李早零栢松同祔子皓曜㬢等並才彥惟有名教克開優㳺翰墨之塲造次仁義之域宅憂殆滅追孝有望匍匐昭親哀迷紀石邕以披顔友道列坐詞人談笑未終存殁相訣情也有慟涕之無從雖不工於文將逹其義詞曰曽源積兮流彌長高闈慶兮齡亦夀命不泰兮時未將何寵祿之中否從政理之孔臧坐疎屬之嬰累重愛子之飛章遭一門兮二謫備周嵗兮兩䘮寄永懐兮身後唯沒代兮名揚梓州司馬楊君神道碑陳子昻君諱越字復珪𢎞農仙掌人也其先帝高辛氏之裔周有天下晉受其封至宣公伯喬早基揚國若乃彤弓玈矢𤣥鬯赤茀則禮命之樂歌之崇天王之寵光保元侯之福一作休祉其後十六世一作代有揚寶者天賜黄鳥授以白環若曰令君子孫世登三公迨震秉彪賜四代五公烈光照於漢室盛徳充于海内金圭銘鼎至今為𢎞農世家也高祖椿魏尚書右僕射開府儀同三司司徒公進位太保加侍中給後部鼓吹致仕歸邑賜安車駟馬傳制三一作二人可謂國之元老帝之師臣功成名遂社稷之寶曽祖思善齊通直散騎侍郎贈中書侍郎祖敬通鎮逺將軍鄭州治中邛州别駕父居同隋蒲州芮城縣令皆國書舊史列於名節公即芮城縣君之第二子也少而冲嶷苦節真素家無玉帛室有琴書聞少連之風而悦之庶乎身中權行中清上以際乎天下以敦乎物不應州郡之命有金玉之心嘗嘆曰以明珠彈千仞雀吾不能也是觀寶龜之象心滅朶頤探金虎之爻志在幽履遂去家遁於嵩山經十餘年丹仙白雲之志𣺌然矣屬太宗文武聖皇帝初臨天下物色幽人闕山傍道網羅遺逸君子若曰天下有道可以見矣於是始以角巾應命褐衣謁闕陳大道之閎謩論至言之閫奥四字一作公於天下帝曰俞爾言乃可底行若嵗大旱用汝作霖雨今南山近塞北漢連兵石州邊烽皇化未謐汝往欽哉輯乃人禦乃敵以息匈奴之患始解褐授石州方山縣令樽爼在堂干旄在階布大信於獯戎示折衝於袵席威名震曜乃升聞也有詔一作勅徵授憲臺監察御史綉衣始拜珥筆升朝臺閣以之生風豪貴由其斂手又勅授中書侍御一作侍制未幾又遷秘書郎直中省如故逰鳳皇之池觀蓬萊之府是天下之榮踐也又轉闕宗正寺丞居嵗餘帝思南史之才將崇東觀之美又遷起居郎驍騎都尉龍朔中天子將觀兵於東夷以復先帝之業凡居中者多出守旁郡是嵗授公朝散大夫除冀州司馬同知州事於時天下雌韓而雄魏將壯武帝疑衍而柔文公始厭承明出臨外郡探丸堊而犯禁崇奸欲嘗朱博之能以親疑作觀龔遂之政公深鈎潜往英機立斷短服赭裾於是乎理麟徳中兼授梓州長史盖在華之南區彭之北鄙豪俗侈靡政削闕緩一作瞹攅六國之遺甿雜三巴之中壤公下車問道觀風立政先之禮讓教以詩書抑浮窳禁冗食堂叩鐘磬家擅山川莫不為之節制行其典禮來暮之頌復起於斯時高宗大帝方接千載之統升中太山玉帛雲趨朝者萬國預陪金蹕拜侍瑶壇白雲既封皇慶斯洽加朝議大夫餘如故太上旋命御駕來歸殷楹夢奠遇病薨於官舎時年六十四嗚呼哀哉遺令薄塟不藏珠珍孝經一巻堯典一篇昭示後嗣不忘聖道即以某年月日塟於西嶽習仙鄉登仙里西麓遵遺令也嗣子嘉賓等哀號哭血柴骨戀心􅃡維罔極之恩思榮永錫之道以為君邱于役無助冥因季由之嘆空勤負米於是考群聖之典擇衆妙之門求所以昭報幽扄賛祉冥籍則云金仙慈救寶手來迎若徳崇於此則功濟於彼是用歸誠真諦祈祐能仁箱鐵圍而寫容描金蓮而得象於登仙麓之塋則造阿彌陀像一區座高三丈并衆變菩薩天人畢備全金湧出象寶裝嚴雲仙鬼神周羅上界珠幢羽盖圍繞中天盖所以丕顯尊靈光昭惠葉逹人之事畢矣孝子之事親終矣銘曰巖巖太嶽浼浼長河歕雲滃霧涵靈貯和陽侯之國宛其中阿子孫𤓰瓞軒盖駢羅四代五公自于伯起蟬聨彪懿令問不已二千户侯三十刺史世濟其榮至我君子峩峩君子皎有令光不寵我組而括其囊洗心岩遁抗迹雲翔冥鴻來逺白駒在塲解我薜蘿綰我墨職邊朔多虞獫狁孔棘之子之往允威允得干旌在階烽火罷色行行騘馬繡衣之光烈烈董狐司史之良而我君子總其徽章出同嚴助政穆王祥雄魏既康郪蜀獨侈攬轡言邁題輿載理尺兵允戢亂繩攸靡天子登封拜服玉趾大禮既畢西歸遲遲嵗亦秩止天不憗遺呼呼甿吏號泣漣洏曷其往矣來暮歌思㷀㷀孤子棘心哀疚永號昊天𣺌泣冥祐蓮花之國金池玉霤崇此香緣生彼荷秀全金既湧衆寶斯裝考墳其後叔塋其旁香花圍繞松栢成行千秋萬嵗祚祉無疆中散大夫行淄州司馬鄭府君神道碑張説五岳可渉唯徳也謂之崇高萬物皆化唯名也謂之不朽若夫行欲盖而徳彰道無求而名立嘗聞其語今見其人公諱某滎陽人也華州刺史襄成公偉之曽孫蒲陽太守太濟之孫荆州刺史乾符集作漿之子在昔周王敦序九族封集作邦懿親於鄭維時鄭伯敬敷五教賦善職於周其後蕃衍儒門光華士族盛行西域名震京師入則天子授經出則單于抗禮公掲日月表山川體二氣之清淳納百代之層慶越在岐嶷異於常童既以冠帶逰皆長者初以門子宿衛解褐凉州參軍轉嘉州司士又宰鍾離嘗陽二縣皆秩滿兼攝江陵朞月政不改俗官不易方羣盜出奔逺人來附其所處也入境開愷悌之風集作聲其所去也扶路有鬰陶之思非夫忠信以結之法令以濟之易簡以業之仁義以肥之孰能順人如此其理者乎闕皇玉册授天金壇拜洛頓網而鶴書下闢門而羣龍至公待制公車詔義宣室自以奇士承一顧之恩許其正人參四率之屬乃墨制除太子右清道長史尋加中散大夫行淄州司馬負士元之才於是拜職遇丘明之疾從兹挂冠洛汭閒居漳濱沉錮優㳺卒嵗福應愆期豈惟朋友之哭將見神仙之弔享年七十有九神龍二年夏六月十五日終於洛陽之私第冬十一月集作十月一日歸塟於滎陽之舊集無此字原成先志也公執親之喪三年泣血以聞州里不亦孝乎先人餘業一物不有以讓兄弟不亦悌乎加以賑窮紆急陽集作隠徳隂施惠人由己反身持物是用氣類益親聲談載路善擊劒好投壺盡五射之妙巧䆒六書之體勢此盖行有餘力則以參能位不充量天之命也有子曰博古曰博雅曰嘉慶集作徵曰嘉徵集作慶曰嘉重生極其養没過乎戚恭惟皇考安宅靈邱盛徳備乎集作于卑位家風缺乎國史伐石他山寄哀詞客子産遺愛得無叔譽之言公業不忘實有荀救之嘆式撰鴻烈垂之後昆銘曰大君有命桓公封鄭世執王政其後不競為韓所并以國成姓沉水截河溢為滎波荆山之阿勝氣實多髙門峩峩衮服委他猗嗟君子世一作代濟其美動如義市居成仁里鳳集文忠猿啼弧矢善政當官惟人所安救危拯越勞而不伐大運奄忽芳留形没高壠既封深泉又重徑無人蹤薺苔嵗濃哀哀邱隴墮淚青松隴州司馬楊公神道碑前人公諱忠集作志誠字某𢎞農華隂人也厥初生人為姫伯之祖因邑命氏有楊侯之𦙍其後東凌奮而開國西漢盛而移闗門廬隠隠亘連桃塞之上碑闕巖巖蔽滿華山之下明徳之後世有人焉大王父隋直閣將軍岷尉撫豪道五州刺史邢國公諱貴大父故左衛副率慈汾二州刺史靜公諱譽考故常州刺史工部侍郎鴻臚卿金紫光祿大夫散騎常侍太子少師賜開國集無此二字儀同三司上柱國鄭國懿公諱宗敬若夫家聲代業累徳積仁故以克隆前統光啟來葉矣公禀純嘏之粹靈漸軌物之名教端操以正己崇讓以與人厲精以探道善問以毓徳學無不逹藝無不周成童有傾矚之望既冠為宗匠之表年十三調太宗集作常挽郎尋補潞王典籖大夫門子執紼橋山王國詞人曵裾睢苑皆一時之選也明慶中詔郡國舉賢良公對䇿天朝無能出其右者遷太子通事舎人􅄪舉髙第徙國子監丞坊監清流才地擇東朝束帶銀牓増華西序彯纓環林益潤高宗接千載之統嗣百王之業封岱岳禪云亭稽於舊章俟兹通博乃除公禮部員外郎祠集作祀事克明大典欣叙建邦分職得人者昌吏曹居六官之首求郎盡一時集作䑓之妙又轉公吏部員外郎凖的文昌羽儀丹地丁太夫人憂去職公至行純篤幾於滅性雖杖經外除而闕瘠加等門人記其喪禮天子憂其死孝服畢授􅃎州三水令曵尚方之舄鳴單父之琴志道不矜其大才勤政無陋其小邑善聲流於􅃎籥惠化在集作帀於周原又應文擅詞揚舉䇿試天下第一敷陳聖謨啟沃明主究天人之際建皇道之極如有用我者其為東周乎朝廷納賈生之言排汲直於外乃拜公隴州司馬未及赴官遘疾卒於長安之私第春秋若干王祥未施於邦政陳寔近疑終集作止於邑長位不允徳其如命何神龍初中宗克復丕業格於文祖迺睠從臣緬懐先正以公二子在章綬之列遂追贈公使持節㤗州諸軍事泰州刺史非夫立言不朽隂徳陽報安有邈諸孤而崇集作隆家既沒世而榮號哉夫人天水趙氏殿中監武權公某之子集作女也受訓公宫作合君子言容賁於國史徳行循於法度六姻之内宗焉始有輔佐之力卒延門户之寄初公之捐館也九子呱呱哀縗喪位賴夫人是顧是復日就月將徙宅依仁闕門成訓三十年内八子登朝庭交虎綬之華門接魚軒之軫某年月日封梁國太夫人景龍二年五月七日終於長安之延夀里間者遭家遷播几筵靡托而今䝉國昭洗情禮獲申以先天元年十月二十五日合塟於少陵原禮也第二第三子夫人在堂而沒長疑子第八子夫人在殯而亡今並列於塋兆用嘉魂魄長子故兵部郎中子前衛將軍此永懐徽烈思勒銘頌郎中昔嘗緒言意感延州之許將軍今復哀託情深舊館之悲高跡難名短詞草𨽻採諸故老恭存梗槩云集無云字其詞曰昻昻楊君秉心淵懿太河靈岳含光毓粹學少姸精文遒逸思行為時範言為故事存藴令徳沒揚虚位慶善克家哀榮乃備嗣姑稱姒敬妻曰冀復有母儀千載一致貞墳圡隴同封此地芳烈悠哉金生碑字文苑英華巻九百二十六
