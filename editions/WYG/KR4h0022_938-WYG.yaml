body:
  text: 文苑英華巻九百三十九宋李昉等編職官一安南副都護畢公墓誌一首福建觀察使鄭叔則墓誌一首陜虢觀察使盧岳墓誌一首安南都護張公墓誌一首嶺南節度使徐申墓誌一首宣州觀察使韋温墓誌一首安南副使都護畢公墓誌一首張九齡公諱某字某東平人四世祖義雲北齊度支郎中青州刺史曽祖琰貞觀初并州白馬府右果毅都尉集作右左衛郎將祖義蒲州河東令坐事左轉桂州歸義縣丞因家于始安集作寧父誠舉孝亷高尚不仕公即孝廉府君之子稟靈純茂姿性開朗亦既志學休有令聞雖在諸生之中已有萬人之望矣夫忠有世善有元仁於其親友于兄弟豈尚行所致其因心而然公之植身根萌素厚操本制末何適非宜故為政之方所從來逺矣某年初有御史將命黜陟幽明公時盤桓居貞未有攸徃而使者承式固才是求褐衣見召直繩斯委乃表公授梧州録事㕘軍非其好也先是剽刼在境行李所病綱佐無㡬逋盜肅然歲滿換廣州滇陽令事必簡舉人用安集作穏便莫不咨嗟未始見也尋轉韶州司馬其政如初秩滿丁母集作内憂公有至性幾於毁滅廬墓展哀泣血扶病有加一等不唯三年嶺南按察使廣州都督兼御史大夫蕭璿彼孝悌之士也以錫類之故有嘉徳音於是版一作㧞補按察判官義行相成終始如一尤加欽重持以表文勅授新州刺史屬恩州酋帥日尋干戈將有式遏寔資明允後按察使廣平郡公宋璟以公為五府緫管以甲兵戍焉雖臨之集無之下字同以兵威而開之以恩信俾忿鷙狠戾化梟為人廣平公深以為能奏假恩州刺史俄又真授夷落大寧尋加朝散大夫遷端州刺史居必致理莫匪嘉績并護之寄朝選以歸於是加秩中散大夫拜安南副都護致官未幾闇忽遷殂時年六十某年月日庚子歸葬於某山之原公内行無玷外物不干文非務華學皆為已所蒞數郡遺愛在人全已而歸可謂厚矣有子曰某衘恤終天愬哀逺日永惟稱代存乎幽篆銘曰猗歟畢侯濬源長流愛民于畢爰自有周彼美世載實惟孫謀賢哲繼軌斯其逺猶嗟彼懿宗是生孝友和實内積行非外誘家邦必聞人倫歸厚微此令德夫豈善守亦既從政厥問載榮邑能訟息郡用禮成蠻夷慕教䲭梟變聲九真副領萬里揚旌護彼絶域義忘險艱提律未改載旐而還存殁之際忠孝之間徽音無泯篆德兹山福建觀察使鄭公墓誌銘穆員唐貞元八年四月十六日福建團練觀察使福州刺史兼御史大夫鄭公薨于位明年孟夏已酉朔歸葬于東都萬安山之南原龜吉筮吉即于人謀且曰前望先君俾公之體魄列侍于後與兹山久還顧洛邑俾爾子孫盈如市朝生没於斯公諱叔則字某榮陽人自元魏中書令周小司空金卿文公穆凡五葉至皇朝遂州刺史老萊代以婚姻德義俱為家法相授公則遂州之冡子也未冠以明經擢第凡五命至御史府又再遷歴尚書省以屯田員外郎介吏部侍郎李卿觀風之命議者韙之李公出納稱職且多貢巖藪幽滯充于王庭繄公是賴轉庫部相國王縉受居東之寄又資公以畫拜檢校吏部員外郎使罷而真凡吏部分天下之疑折無文之中去聲曰廢置清九流之路坦多士之門曰南曹公酌其會通流守以貞固七考二職日新厥聞丁繼母艱免服拜刑部郎中皇上即位思與四方萬姓垂家至而日見之制臨遣八使必朝之良公為首冠清選分命于西江閩越之地所至蠲疾所去遺利並命者取而法焉兩河不開命帥梁汴所求郤縠之比為其中軍授檢校祕書少監兼御史中丞克平軍節度副使之官拜御史中丞廉問東夏俄領東都留守兼河南尹就加户部侍郎仍再位副相之寵持憲以清明律下牧人以禮讓和俗保釐以威重懐逺冦不敢犯吏不忍欺扶危以安制動以靜罷鎮歸省轉尚書左丞未幾兼御史大夫撫淮夷反側之俗四牡蒞止萬人革心如風之清如雨之滌復命遷太常卿國有大事主辦多儀加銀青光禄大夫轉京兆尹理行三載惟遭權臣構愍貶永州長史謫去之日京師􅆵空巷隘車不得前怨咨之聲雷動天聴旋以非罪拜信州刺史居數月又有四嶽十二牧之換方以和風清徳移蠻貊之風何斯人之幸與上天之祐較彼炎瘴而不勝焉夫人范陽盧氏著作郎侑之女也望申北州德成公家不幸早世事具前誌生一子曰約河南府洛陽縣主簿後夫人范陽郡夫人盧氏華宗美行與前夫人如一繁祉餘慶續公之榮生二男一女納前𢎞文生紳右千牛衛備身女未笄是日約前已曰一子約奉范陽夫人命舉前夫人柩㑹公之䘮禮也公之為德也温純深潤高厚博達文以禮樂本於中和犯不違仁愠不傷善滔然如川澤無不容之者及其秉操厲俗好是正直不畏非畏不疑可疑酷惡春秋之左一作右巫疾隂陽之拘忌嶷然如斷山絶巘不可以邪徑造乎嗚呼使公之得志也天下之人非法言不言非大道不蹈此可以為天子大臣未絶遑數其餘哉是以夀七十有一歴官二十有八政朝仰故事人懐遺德門列朱㦸家垂清風而遊公藩者猶以不期頥為嘆問神明焉約等以為哀報揚名莫如紀述謂員昔備吏末嘗司斯文將期餙終何敢廢職銘曰嗟哉公居此室猗夫人㑹琴瑟萬安南山瑞氣浮洛陽北闕家聲流夐千祀兮日悠悠陜虢觀察使盧公墓誌銘前人有唐貞元四年夏六月陜虢都防禦觀察轉運等使陜州長史兼御史中丞范陽盧公夀六十中疾于位優詔得謝家東都履信里秋七月甲戌終于其寢冬十月乙酉歸于此堂禮也萬安之腹因山而封嵩邱伊流還帶捧抱龜筮叶吉神宅是宜府君諱岳字周翰其先齊太公之後公子高傒食采於盧因以命氏及自東漢中郎植乃元魏秘書監陽烏第四子都官尚書道䖍凡十葉代代得禄其兄子思道所著家譜詳之道䖍生齊左庶子昌衡昌衡生隋澤州内部長寳素寳素生皇朝綿州長史安夀安夀生汝州司馬正紀正紀生絳州聞喜令杭惟是婚姻其類為義方相襲禮樂冠蓋侔其盛焉府君聞喜之第二子也發地之祥鍾天之和處為孝而友悌從之出為忠而貞諒從之施於事物為聦明純粹而寵位從之天寳末擢明經調宋州襄邑主簿歴􅄔州䕫州二録事叅軍以大理評事兼監察御史始佐湖南觀察之政前帥韋之晉倚之以清後帥卒京杲藉之以立既真拜又稍遷殿中侍御史京杲入覲咨以留府時有驕將數人京杲實父子兄弟之其蹈罪姦令率以為順府君告之以刑辟明之以無赦而郡帥如故乃盡戮之由是軍政理而庶政舉初朝廷之任京杲也以恩舊用不責之以龔黄之績至是還之不可易之不能留之京師以盡府君之美若是者五載累錫銀印朱紱金章紫綬加侍御史建中初今上嗣位有自屬部譎官入為相者謂公才膺方鎮受容府經略招討等使就加御史中丞南越獷俗井税之入鮮具其布帛之幅通流之貨悉異中土府君以美利利之王制制之又每歲有西原之警府君布政羣盜為人元年季春賦入貞元三年來朝拜少卿監上以陜郊之守藩垣二京冠冕諸夏非沃心之臣勿授前此元臣授之是為郡伯今相國李公自中書侍郎徵拜思嗣其事重難其選府君於是乎有由衷之拜惟事小不敢不戒大不敢不懲日嚴祗恪惟新厥舊由是軍服其嚴明而報之以肅吏從其簡易而報之以理惜乎其自下車及遘癘不十月焉嗚呼有其才無其時之嘆不甚於有其時而無其命今之方鎮蓋唐虞四嶽十二牧之職而周漢股肱爪牙之任府君承堯之咨庸舜之俞累分共理之憂方咨薄伐之効凌風拂翼徘佪於㝠㝠之間何天奪上心而命孤人望是可以為嘆歟府君前娶隴西李氏實姬姜之偶先春早落今也力不及逺未遑合祔繼室以同宗同德而年位異之三子載戣戡一作晋長齒未童幼哀及禮洎兄子嘉猶稟伯父永州司馬嶠之命泣血襄事見託於銘詞曰世重五姓冠于百族倬彼山川來宗嶽瀆帝慈蒸黎命分司牧慎選良臣俾之戬穀猗歟府君受天之禄未見其止如何不淑邱隴何所郊原重復瑞氣嘉祥於是乎育前川為陵北地為谷世系德代於是乎獨金紫光禄大夫檢校禮部尚持節度都督廣州諸軍事兼廣州刺史御史大夫充嶺南節度度支營田觀察處置本營經畧等使東海郡開國公贈太子少保徐公墓誌銘權德輿公諱申字維降東海郯人五代祖周宣州刺史瓌瓌生隋江州司馬宴宴生吉州太和丞仁澈仁澈生皇吏部郎中諫議大夫𤣥之𤣥之生公烈考汾州司户㕘軍贈信州刺史用仁義世其家諫議之文行信州之廉退及公始大永泰初嘗疑著作賈常侍至操柄儀曹搴士林之菁華舉進士上第調補秘書正字四征翹車相屬於途望公舉趾以為重九江而西服嶺而南與朔塞被邊之地聨為命介歴大理評事司直監察御史太子司議郎殿中侍御史錫以章綬冀國路公之誅哥舒晃也公以從事主謀居多嗣曹王之守鍾陵而誅李希烈也公以長史行刺史調州師以護饟道厥勞茂焉江漢既清拜韶州刺史先是長史不任職官曹弛廢刺史寓於理下邑之令丞與編人雜處比屋逋亡公田為蕪公乃假之耕牛賦與種食人人自占視其力而為之制歲乃善熟積為倉箱於是計徒庸程日力作為城寺大治垣屋廐置市列道橋器用皆備焉罷去之日夫家名數倍差於始至而不書于籍邑子張棣等五百人獻其理狀得請於觀察府以函奏書請立碑祠公瞿然止之曰此刺史職且一旦上聞與沽伐者何異所不忍為也府不能奪改合州刺史以先濮陽郡太夫人兆域未祔表求改葬緦麻既除以御史中丞領景州刺史自兵興四十年山東諸侯率强大驕蹇郡二千石多自命於轅門蓋縣官息人含垢而因縁漸漬然也至是朝廷以滄州負海勁兵攸處乃建節將幕庭裂屬城以制支郡會其帥亦請􅆙守於朝朝論難之二府比推擇未稱因召公入見而面命焉錫命服文馬緍錢五百集作十萬尋加節度副使中朝之條職慮令始被于景人是歲節度使來朝既從父兄為代表公以本官為軍司馬陳情去職徵還京師復以御史中丞出蒞邕州領經畧之任開南蠻徼道宣明威信獞人黄氏納質請命化條風行獷俗以清明年中貴人持兵符詔書至部以御史大夫督南海二十一州軍事而節制焉前此守臣物故軍吏乘變竊發印符易置部校㧞用惡少年百輩軍中幾亂相率亡命公既至捕誅首惡悉原諸詿誤者夷越負險阻白晝攻剽芟夷根株使無遺類然後布以寛大人安作業溟漲之外巨商萬艦通犀南金充牣狎至天子之恩澤賜予聲明物采皆待焉上應急宣以馳疾傳下無强賈用絶姦利和輯招徠外區懐之則四封之内其理可知也朝典疇庸進階至銀青光禄大夫時庸蜀未平公宻疏請發卒徒五千循伏波故道抵岷峨以會師期誅不恪詔可其奏就加禮部尚書秩正三品疏封東海命書未及至奄捐舘舍遂以太子少保印授弔祠稱焉是歲改元元和公之生七十年矣嗚呼以文發身以智經物惠和直温忠恪廉清佐賢侯長轂皆有理效在韶也興事功在景也脩班制朗寧察風俗南海整師律以八命居六官攸好德考終命其蹈履之全乎夫人渤海高氏早殁繼夫人扶風郡夫人竇氏柔明有賢行嗣子右衛倉曹元弼似續文敏號咷毁慕以某月日寧神于東都偃師縣之某原乃刻堅石以傳永久銘曰噫徐公有質有文有義有仁名聲章明邁群倫兮噫徐公不忮不求不緇不磷贊佐四征暢嘉聞兮公之牧人于韶于景于邕于廣朱轓照路利攸徃兮公之愛人以清以靜以惠以養流庸集附如景響兮如何不傭奄忽鞠凶蓍龜之同天地之中吁嗟乎徐公中散大夫檢校國子祭酒兼安南都護御史中丞充安南本管經畧招討處置等使上柱國武城縣開國男食邑三百户張公墓誌銘栁宗元漢光中興馬援雄絶域之志晋武一統陶璜布殊俗之恩理隨德成功與時並今皇帝載新景命丕冒海隅時惟長公祗復厥績交趾之理繼蜀本作續于前人公諱某字某某郡人也曽祖彥師朝散大夫尚書駕部郎中祖瑾懐州武徳縣令考清朝議郎試大理寺丞贈右賛善大夫咸有懿美積為餘慶公以忠肅循其中以文術昭于外推經㫖以飭吏事本法理以平人心始命蘄州蘄春主簿勾㑹敏給厥聲顯揚仍以左領軍衛兵曹為安南經畧巡官申固扞衛有聞彰徹轉金吾衛判官二歴御史績用𢎞大揚于天庭加檢校尚書禮部員外郎換山南東節度判官復轉郎中為安南副都護賜金紫魚袋充經畧副使遷檢校太子右庶子兼安南都護御史中丞充本管經畧招討處置等使公自為吏習於海邦凡其比較勤勞利澤長久去之則夷獠稱亂復至而冠攘順化及受命再任集作專征得陳嘉譽誓㧞禍本約集作納於夷軌乃命一其貢奉平其斂施牧人盡區處之方制國備刑體之法道阻而通百貨地偏而具五人儲峙委積師旅無庚癸之呼繕完板榦控帶兼戊已之位文單環王怙力背義公於是陸聨長轂海合艨艟兩集作再舉而克殄其徒廓地數圻以歸于我理烏蠻首集作酋帥負險蔑德公於是外申皇威旁達明信一動而悉朝其長取州三集作二十以被於華風易皮卉以冠帶化姦宄為誠敬皆用周禮率由漢儀公患浮海之役可濟可覆而無所恃乃刳連烏以闢坦途鬼工來并人力罕用沃日之大束成通溝摩霄之阻硩一作祈非為高崖而終古蒙利公患疆埸之制一彼一此而不可常乃復銅柱為正制皷鑄既施積集作精堅是立固圉之下若白黒易野之守險逾邱陵而萬世無虞竒琛良貨溢於王府殊俗異類盈于藁街優詔累旌其忠能集作良良集作太史嗣書其功烈就加國子祭酒封武城男食邑三百户凡再䇿勲至上柱國三増秩至中散大夫某年月薨于位年若干天子震悼傷辭有加明年其孤某官與宗仁集作人號奉裳帷率其家老咨于叔父延唐令某卜宅于澤集作潭州某月某日人謀皆從龜兆襲吉乃刻兹石著公之閥以至集作志是于邱竁以告于幽明銘曰周限荆衡秦開百粤交州之治炎劉是設德大來服道消自絶伏波南征漢威載烈宛陵北府集作附是晋政爰發我唐流澤光于有截皇帝中興武城授鉞肅肅武城惟夫之哲更歴毗賛顯揚彰徹既受休命秉兹峻節度其謀猷守以廉潔厚農薄征匪貊匪桀通商物平集作平貨有來胥悦踐山跨海堅其鶴列制器足兵潰兹蟻結烏蠻屈服文單剪滅柔逺開疆㑹朝天闕銅柱乃復環山以硩一作折海無遘逆冦罔踰越琛賮之獻周于窮髪帝嘉成德載旌茂閥増秩䇿勲土封斯裂位厄元侯年虧大耋邦人號呼夷裔悽咽卜葬長沙連岡啟穴書銘薦辭德音罔缺宣州觀察使御史大夫韋公墓誌銘杜牧韋公㑹昌五年五月頭始生瘡召子婿張復魯曰三稚女得良婿死以是託墓宜以池州刺史杜牧為誌復魯曰公去歲兩瘡生頭今始一尚微何言之深公曰吾年二十九官授秘二字作校書郎時嘗夢渉滻水既流中有二人若舉符召我者其一人曰墳墓至大萬日始成今未也今萬日矣天已告我我其可逃乎謝醫不問以其月十四日年五十八薨于位公從父弟某盡公功行以公命來命牧牧位哭序且銘之公諱温字𢎞育韋氏自殷周秦漢邱明馬遷班固輩爭書其人以光其所為書至後周逍遙公夐出世家富貴集作冨貴中隠身行道當其時及後代論者以蜀嚴谷口不能為比逍遙公五世生潞州上黨尉贈諫議大夫希元上黨生吏部侍郎贈太尉肇吏部生右補闕翰林學士右散騎常侍致仕贈司空緩常侍生公於逍遥公為九代孫年十一以明經取第為太常侍奉禮部秘書省校書郎選判入等咸陽尉監察御史公曰是官豈奉養所宜耶上疏乞免改著作佐郎當貞元中常侍公事德宗為翰林學士帝深於文學明察人間細微事事有宻切多委之歲久憂畏病心帝曰某之心我其盡之以致仕官屏居西集作四郊公蚤夜侍側温凊飲食迎情致意一經心手積二十餘年丁常侍䘮自毁不欲生後相國李公逢吉以相印鎮武昌皆虚上職書卑辭至門公起赴武昌命集無命字未至府拜監察御史遷左補闕事文宗皇帝時宰相百吏願條帝功德譔號上獻公獨再疏曰今蜀之東川川溢殺萬家京師雪積五尺老㓜集作稚多餓死豈崇虚名報上帝時耶帝乃止遂訖十五年不答尊號事改侍御史尚書禮部考功員外郎當太和九年文宗思㧞用德行超出者以警集作新􅋏音義亦悚同天下故公自考功不數月拜諫議大夫召為翰林學士遂欲相之公立銀臺外門下拜送疏入且集無且字天具道先常侍遺誡子孫不令任宻職言懇志决因命掌言舍人閣下公復堅讓不半歲轉太常少卿一歲遷給事中皇太子侍讀公復陳先誡以侍讀辭自宰相下皆曰帝以一子請教於公是宜避耶公不聴凡拜送三章帝終不能奪靈武節度使王晏平罷靈武以戰馬四百疋兵器數萬事去罪成貶康州司户不旬日改撫州司馬仙韶院樂官尉遲璋以樂官授光州長史晏平以財膠貴倖璋大有寵於上公皆封詔書上還上比論之公持益急竟以康州還晏平璋免長史莊恪太子得罪上召東西省御史中丞郎官於内殿悉疏莊恪過惡欲亟廢之曰是宜為天子乎羣公低首唯公獨進曰陛下唯一子不教陷之至是太子豈獨過乎上意稍平不數日遷尚書右丞朱衣魚章遷兵部侍郎函請丞相願為治人官出為陜州防禦觀察集無此二字使兼御史大夫服章金紫回鶻窺邊劉禛繼以上黨叛東徵天下兵西出禁兵陜當其衝公撫民供事就不兩告苦入為吏部侍郎典一冬選老吏無所賣復以御史大夫出為宣歙池等州觀察使賦多口衆最於江南公急惡寛窮益自儉苦刑律其俗凡周一歲無所更改自至大治公幼不戲弄冠為老成人解褐得官超出羣衆中人不敢旁發戲嫚及為公卿在朝廷省閤中大臣見公若臨絶壑先忖度語言舉止然後出發其所執持不可者筆一落紙言一出口雖天子宰相知不能奪俯委遂之不以德行尚人人自畏敬不施要結於人人自親慕後進凡持節業自許者獲公一言矜奮刻削益自貴重官卑家貧時主將家事在私門内高曾兄弟鐫琢集作教誘嫁娶衣食無有二等疾甚將終悉召親屬賔吏稱先常侍詩句云在室愧渥漏因曰今知殁身不負斯誡遂涕下不禁當夫子世得七十子國小俗儉復有聖人為之師使生於今與公相後先必有能品之者夫人隴西李氏贊善大夫慫之女先公四歲終生集作生字四男長曰磪前國子監四門助教次曰璆前明經次曰環次未免乳女子集無子字四人長嫁南陽張復魯復得進士第有名於時為試太常寺恊律郎鄂岳觀察支使其下皆稚齒相次銘曰德則至矣位其充乎如其充兮可大厥功以施生人天先告之萬日之期天實為之文苑英華巻九百三十九
