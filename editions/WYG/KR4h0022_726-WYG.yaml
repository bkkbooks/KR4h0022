body:
  text: 文苑英華巻七百二十七宋李昉等編餞送十夏日盧大夫席送敬侍御之南海序一首鍾陵夏中送裴判官歸浙西序一首潯陽嵗暮送徐十九景威㳺潞府序一首荆州與楊衡說舊因送逰南越序一首宣城送黎山人歸滁上瑯瑘山居序一首奉送良郢上人逰羅浮山序一首奉送裴二十一兄閣老中丞赴黔中序一首送安南裴中丞序一首奉送黔中元中丞赴本道序一首送水部許員外出守郢州序一首送建州趙使君序一首送循州賈使君赴任序一首送歙州陸使君員外赴任序一首夏日盧大夫席送敬侍御之南海序符載今天下司王職之官官立帥帥立屬制置滋乆繁冗日甚二年春皇帝以易簡之道大黜冗吏詔近臣冠惠文冠者四人分行郡國以權之所至之邦刀布粟帛有廢供給辦二千六百石得自考課殿最以聞朝廷重其寄能其人以監察御史敬公清明上才克荷斯任故自黔中距于南海盡得而董之夏四月辛已至于江夏六月丁酉馳于嶺嶠鄂管連帥御史大夫盧公闢以髙舘羅以籩豆搜文以餞之禮也先是侍御之至風威儀稜江湖颷馳如霜氣肅物莫不震惕我大夫政有和裕賦無逋曠饔夕餼朝問候君子有以見天王之臣行者以威重居者以恪敬也且國家尚兵已來百萬軍食仰給黎庶者數年矣至於靡弊等劇矣今羣冦底定生人始泰如飢腸凍骨易施饘褐是行也軌大中扇皇風决滯寃察賢良使海隅蒼生沐浴江濊者正在於是豈獨責稽逋之賦乎小子濫以儒列厠末座大夫欲卑賤者得申其志至猥而命之載乆栖山林詞樸意拙跪受簡牘伏用靦汗然各請賦五言一章頌皇皇之盛也鍾陵夏中送裴判官歸浙西序樹生人之求籠天下之利鹽鐡而已矣非剸犀切玉之噐操劃利病之權務通泉貨上充天府下活人命則不得而居之國家委中丞李公以王賦之柄輕重之權實才授也去年春三月至于秋八月不雨關中飢饉職司憂焉以豫章江夏長沙諸郡地産瓌材且憑江湖將刳木為舟以漕國儲乃命河東裴從事承檄擁傳與三諸侯圖之從事名滉字瀾之風緒高華中和而深敬恭文敏羽翼吏道始以幹局為萬年尉中嵗逺竄乎南徼㑹恩澤下降李公聆其才而辟之方今藩維大臣奉法謹文所至之邦朝令夕供加以瀾之禮以持外誠以發内温温多可中無疵吝故方帥地主瞻其顔色聴其聲氣略去形體相與懽愉醆斚之下闇然事緝斯所謂賢士哉若人也與夫用威造勢者豈同年而語耶眇眇千㠶從風飛揚復命主人賔亦有光或者云勤不報屈不伸余不信矣况我公於公揖珪璋之望於私敦中外之愛感歎流落慨然盈懐即異日調和鼎鼐掄材取士得不與中丞同力合謀也水國方夏白波無邉檣烏一動吟嘯千里主公知非文什無以紓一作緩離志奉送將歸猥令首叙腆焉如􅆙但欲言鼓韶濩者之唱調耳一作但欲為鼔唱韶濩者之調耳潯陽嵗暮送徐十九景威逰潞府序前人道舊者同志之至歡乎送逺者有情之至悲乎二者激人中腸我獨何謂鍾此懐抱始余與徐君識面余獨一言道合遂相顧攬載即亟徃候太傅夫人起居他年余及楊即中偕詣梓潼依李太傅生亦相從其於講道藝攻闕漏時上下郪中諸山賦詩舉酒吟嘯風月每至忘形骸也爾後鳥飛雲散南北四去邈邈悠悠凡十餘年一昨余被命召為江西從事生乃枉道顧訪病劣不任罷歸潯陽生亦䇿馬相隨余有茅居一作屋在郡南西嶺下前有芙蕖菱芡後有髙梧大竹家貧無他具日為徐君舂黄梁爚園蔬䱟鱐數噐相顧下筯頽然簷下快然􅅯仰至宵夜即燎薪火觴白酒引滿之際更語曩事襟期浩然如太古時人間萬累無非糠粃斯一何為樂之甚也徐君僑寓成都日乆常欲扶持尊老歸家洛陽寒氣綿薄不與意㑹有澤潞從事尚書郎郄君士羙生之姑之子也長材端操敦好中外將自茲始裂裳而從之開顔未孰孰熟通用執袂相送嵗暮風雪獨逰萬里㑹面寄書杳杳何期又一何愁慕之深也徐君方厚有志氣履行醇固善為文匿華用晦叩之乃應加以身長七尺聲如笙一作含簧能飲酒斗餘談語眄睞自有標韻所至之地方伯牧守洎賢士大夫莫不為子前席倒屣即士道其幾乎䘮矣况山東望雄諸俟賢明舉才携雋樹勲當世豫章之幹寧迯於班輸之目乎厚自珍重無患知已崔君行先齊君照一作熙予之舊友也㕁君士美盧君頊予得之友人蕭易簡也此數君子皆以宏才賔畫幕中寒暑推謝為余問其無恙否耶復以是便代雙鯉荆州與楊衡說舊因送逰南越序前人載弱年與北海王簡言隴西李元象洎中師高明㑹合于蜀四人相依然約為友遂同詣青城山斬刈蓁葦手樹屋宇俱務佐王之學初載未知書其所覧誦章句而已中師發明大體擊去疵雜誘我於䟽通廣博之地示我於精淳𤣥顥之際偲偲之道實有力焉無幾何共欲張聞見之路方乘扁舟沿三峽造潯陽廬山復營蓬居遂我遁棲二三子以道徳相播以林壑相髙精綜六籍翺翔百氏繇是聲譽一作稱殷上聲然為江湖聞人居五六年載出廬岳歸蜀問起居中師愛惜離思振衣相送泝九江歴楚抵秭歸而旋執祛之際互修前志已已嵗自成都至中師自長安僑寓荆州羈旅相依各被婚娶困于柴水去嵗迄今凶問荐臻王李二生相次殞零草堂無主雲林索寞郷風長想不知涕之横墜也噫青城匡廬岑嶔際天下有煙霞上有神仙緬懐曩昔逍遥其下背負素琴手持道書掬泉掃石吟嘯終畫一有之字是時年少無事費傲光景造適則止不知其他孰謂倐忽與中師啓煩襟期晦明一十二年于兹矣辭山林墮塵滓五變星霜矣嵗月馳于外憂喜攻于内動非濟當世之務静不庇環堵之室泥塗碌碌視日旦暮永言念此厚用慙穢思欲攀石門之松桂宿靈溪之煙月可再得乎然跼度者多繋乎出處知幾者不滯于進取前年冬中師聊整文思起嘗於禮闈間飛聲騰陵譟動公卿當疑作常伯輸教俯授髙第雖不當素尚亦天路之鴻漸也世之繇此而進者必聮振六翮聿求昇翥苟有便捷一作振躍登青冥十六七矣中師旅食淹恤内顧勤窶策馬南向慰其室家未幾而囊金中罄庖煙屢絶乘時蒸鑠將逰炎方又何其濩落也相國齊公挺鸞皇之儀欝經緯之謩新荷天寵鎮安越服執事行業明白且曰親舊或將脩假道之禮不為丁寧結約求以自輔乎重慎舟檝無畏逺道議者云五嶺風候加飡飯日舉醇酒數觴可以佐助正氣生其誌之宣城送黎山人歸滁上瑯琊山居序前人有沃田有良耜土膏脉發凌春而耕之播穜稑之種極耘耨之力其或七年旱九年水穫不登於秉庾者此天時也非為農之不精也用聦明端思慮古先典籍鑚研而求之以道徳為冕弁以仁義為組綬其名不光其位不及身尚嬰於貧賤者此人時也非為學之不至也山人誦堯舜之言服堯舜之行四十年矣鬢毛班白龍鍾布褐得不曰命之水旱歟山人名復氣清骨植凡態不入揖譲應對甚有素士之風探賾以知章居易以安貧立誠以守晦服勤以樹善始結茅於滁上有瑯琊山清泉白石羅在戸牖耕餘之暇時時開素巻飲濁醪以雲霞為賔友以林籟為簫管頽然竟嵗不知其他頃有好事者日抵其廬舎莫不叢口一意頌我中丞寉君之賢明山人聞風裹足於蓬户齋心於宣城手持短書候獻鈴閣中丞厚徳如山愛敬士大夫降千乘之嚴貴納縫掖之顦顇相與談話惠其氣色枯株旱草霡霂膏雨嗟夫古人云國士遇我正在此耳何必他感然後捐軀乎况復與其文藝之優贍慨其羽毛之頺弱將欲借摶扶之力鴻漸之勢㧞自泥滓化窮為通黎君心腸得不快然哉中丞下車日乆政成俗阜倉廪實禮義立府中清净白晝無事遂甘心於賔客焉朱軒洞開四壁風凉弹絃清歌絡繹行觴簮􅅂荷蕙陶然一醉居無何山人有歸歟之興中丞乃抽妙思動髙韻以大雅之什貺之文人幕客聮和瓊璧組繡鄙夫知到山之日猿鶴顧迎視有喜色也嗚呼一作戱幽蘭生於大澤香薰芬馥過時不採摧於蓬蒿矣黎君隠於滁上藴才蓄力是行不偶老於風塵矣去矣自愛謹候休問載卑客也才識短陋猥以叙述冠于群什如處泰山之上兢惶惴恐之不暇也敢為首乎奉送良郢上人逰羅浮山序良郢法師多聞强學風表端净㧞乎出萃者也始童子剃落轉持麈尾講仁王經白黒讃歎生希有想既進具酷自砥礪加之以聦明迅發至於修多羅毗尼逹摩書雜如是若干種法上人悉知觧以佛門言之文學則㳺夏也以法將則韓彭也異日必能破魔軍闡𤣥風當來像教不墜於地矣甲申嵗夏六月中丞楊公下車長沙之三年也余自故山扁舟一葉主人舎我于東舘師荷簦振策惠然相顧始見其青蓮眼目水田衣裳其心則懽如也次聞縱論雲湧波委甚嚴如也居累日報余以羅浮之行雲心不定稍欲引去噫沙門釋子棄捐萬慮携三衣鉢乞食自給晦宿聚落朝行亂山心冥境界何樂如此悲夫塵勞之士校名利溺愛縳區區于尋尺之内寕復拱懐於方外之逰哉常聞說者云有蓬萊一島浮至與羅山合并因命曰羅浮風煙草樹木有異態余未嘗踐履其心技癢師到日為我殷勤手䟽寄北來檀越也奉送裴二十一兄閣老中丞赴黔中序權德輿裴兄居諌大夫五年休問籍甚其於匪躬㨿古切劘獻替掖垣衆君子徒見其拜章伏閣而莫知其所以言者然則發舒純誠𢎞大聦明以貢於穆清者可勝道耶毎漢廷大僚與六官二職之缺羣情屬目俟其授受乆矣壬子詔書有黔巫長帥之拜秩於清憲褒以命服周行諸公以為一方之宰且惜其去而未喻也及夫别殿前席沃心交感重藩符之所付慮安集之不稱凡所以輟近臣惠逺人之㫖纎悉備厚上許周月之代兄求三嵗之理又以見首公急病而忘其勤逺淹䘏然後諸公知惜别為細而感恩為大在此行矣自牂牁見後漢志唐文多用此二字亦或從牛前漢及他書或以為柯皆船􅍻也集韻通用通道夜郎置吏以示綏懐以安剽輕失其理則蕭然愁擾得其和則驩然感恱方略招徠繋於官師以兄之慈惠直信粹清亷白為仁由已不改其度使大化淳流在明誠洞開推人情以賦政便習俗而不擾彼四封集作境之内如熱得集作待濯如水走下史臣操簡以傳循吏使者急宣以將徴命雖欲復三嵗之言其可得乎未間則褰赤帷飲醇酒晏晏言笑中無町畦雖欝蒸霧雨之候無自而入矣大丈夫被薦紳剽華纓𢎞宣職業無有逺邇則嚮之玉堂清禁論思侍從與今之龍節前導金龜映組皆所以事君也豈有中外之異耶祖軷霑醉宣言相勉在加飡寓書而已至若山川風物與騷離瞻望之嘆皆備於詩人所賦故不再書集作茲不書送安南裴中丞序士君子循道致用感恩宣力則萬里如咫歩集作尺溟波猶康莊况金印照路熊車伏軾集作伏能載軾提封甚闊命賜甚厚此裴侯所以忭笑就道視交州如衡軛之前則天時之瘴熱地里之囬逺皆細故也初裴侯夷退燕息未嘗角逐於有司且曰不試則已豈能自售其後累以惠文法冠為戎輅上介甫登中臺旋鎮南服盖純鋼百汰不得自閑於匣中明矣今天子惠茲元元邁唐虞之風鄙夫司言九年玷辱清途集作近顧不能裁成謩訓著一代典法耗竭蚩鄙為明時羞思得上分憂嘆下布條職使四封之内列郡和洽斯亦大丈夫之事也因君是行聊復起予追思徃嵗携手相樂與蘭陵蕭元植范陽盧載初宦逰出處多在江介索然物故何可勝言又想夫楊栁古灣秣陵仁祠寒夜促膝歡言舉酒晦明颷馳忽二十年各乘風波時一㑹合今日出祖話别在加飡自愛而已至若馬文淵集作泉之功略士威彦三國志士爕字威彦為交阯太守英華作王彦威非之教化臊集作憬俗裔人納諸掌握明珠文犀視同涕唾皆裴侯彀中所畜也不復煩言奉送黔中元中丞赴本道序中丞頃持邦憲靈襟集作臺坦蕩中立不倚公輔之望懸於人心者乆矣大方夷道且無町畦持刀筆者忮害為獄故前年有餘杭之命左遷也大君端拱穆清深恤人隠慮逺黎之未集作不康擇可以富集作宣教之者以餘杭風政表課第一故有持節黔中之拜天之愛人斯謂甚矣受命之日庀徒戒行鄙人以使者之㣲假道于此屬當祖軷辱在賔筵敢宣言於集作于執事曰夫蹈全徳者事無夷險播善政者地無遐邇然則五溪之氓其將泰乎吕梁懸水尚在忠信矧夫巴黔故地方鎮專逹惠飫夷落興行禮譲然後翺翔清朝羽儀百僚倚伏之數庸詎知不以此乎夫臨觴捧袂愀然悽愴此兒女之仁也固壯夫耻之愚亦耻之引滿舉白既醉而罷文則不腆盖指事云送水部許員外出守郢州序吏二千石與中臺郎循良雋茂旋相為重在其推擇所切而已故叔載以文術而居郎位以吏理而分郡節時所重難輙居選中其初已獻賦射䇿取甲科如地芥交諸侯之聘車不輟鞅繇外臺察視入佐著作休聲日揚乃擢建禮與伯氏左曹蕚附相鮮濟濟於公朝怡怡於閨門士君子永集作詠歌屬和以為榮觀昔郢中之客能為陽春白雪之曲洎梁水部郎何遜文含清律重於江南今叔載有必類之詞比興温雅其於宦逰宜乎典水曹而牧郢人也况漢南長帥風行列郡郡守清静公亷遵詔條而已以叔載内平夷而外質重不佻不流佳言析理亹亹可復施於列藩如發硎投刃况得漢南之歡舊矣又何疑於報政耶大則以尤異徴細猶轉遷劇部皦然前知不足為賀觴酒祖軷姑以紓居者之愀愴云送建州趙使君序予嘉趙侯者在京下十餘年禄甚薄而心甚泰操利權燻灼可以頥指變化者趙侯顧不游其津退然自得集作是鄙夫識之曰斯可以為君子矣今茲以蘭臺郎滿嵗佩二千石印綬受明天子面命牧茲建人為仁由已斯亦不細是邦為東閩劇地故相安平穆公嘗理焉穆公予之戴侯也故能言之當孝文避狄時廵之際移書四方詞義憤切宻䟽奔問請以州師赴蹈凡穆公所以彰大名操大政者皆建之為也趙侯於斯時實為從事賔榻虚左得之甚懽凡趙侯所以令聲籍甚四征交辟者由穆公發之也今日幢盖昔時山川存問遺老凄凉故事至止之日情何可言屬者狀徃行於考功易嘉名於博士斯亦士君子盡誠於所奉其可誣耶頃予忝職西垣殆將十嵗草列郡命過於百數每發緘含毫未嘗不惕然慎重以其四封之内性命所繋故也或歎趙侯官尚屈而地頗逺予以為不然昔孔門諸生以蒲莒單父著稱况諸侯之貴乎東漢循吏以交阯九真報政况建溪之邇乎則趙侯旟軾之間猛鷙飛伏勞徠所及鰥孤樂康陟明善價如建瓴水雖欲勇退知止其可得乎南轅計日祭軷即路白晝羙景如歸故鄉行矣趙侯當以書札為念也送循州賈使君赴任序使君嘗以司直佐黔陽黔陽之政舉又以賛善守寧夷寧夷之人乂乃今以周行慰薦詔領海豊天慈覆露無有逺邇及夫書於循吏為後法程則古人交阯九真之績與河内頴川固何以異焉知今日麾盖不為使君南溟之變化耶追思從兄秀才為使君門閭之賔曩嵗晤語備徴理行愴族屬之凋落集作零益暌離之怊悵事可覆視言為不誣朱轓郡節三伏就路衆君子祖道或賦列為一編延頸屈指在徴書北轅而已送歙州陸使君員外赴任序始予與公佐俱以圓冠褒衣息偃於江湖間練塘鏡溪樂在雲水帥心自放相視莫逆其後則攻集作改過内訟知道不逺人洗其心虛以順外逮三四集作三四年又俱以法冠翹車為諸侯賔攝衣塵中與俗駕並馳間闗道路離憂多而歡言少七年詔書以禮官博士徴鄙夫於吴十六年以尚書祠部徴公佐干越其間間闊忽焉十嵗心期寓書常若對面中朝大夫君子皆以推轂為已任未至如􅆙然亦既覯止笑與抃㑹月未再朞麾幢在門繇是大夫之賢者士之仁者皆惜其去以公佐有端操直質無巧言讇笑得之自是不得自是故也今天子加恩元元慎重吏師則列郡長人不輕於中都官明矣况宣城有賢長帥以亷風俗新安有佳山水以資勝踐為仁由已賦禄且厚此皆不期集作蘄至而至者然則表課陟明疾若傳置行當以尺一徴書奪于集作於是邦邦人雖欲遮道借留末由也已又惡用今日少别為戚戚耶公佐嗇神自愛以俟良㑹文苑英華巻七百二十七
