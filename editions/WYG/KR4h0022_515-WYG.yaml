body:
  text: 文苑英華巻五百十五宋李昉等編禮賢門二十七道小吏歡言判四道薦賢能判五道寢延部人判三道志行髙㓗判一道舉抱甕生判六道貢市井之子判一道選人代試判一道㧞萃相非判一道取名士判一道教胄子毁方瓦合判一道試選人繼燭判一道徴辟不起判一道小吏歡言判景與小吏歡言倨見功曹將黜不伏對康子元義在斯合借容猶重於將軍道或可存縫掖未輕於太守景歡言小吏將疑十五之詩倨見功曹無近三千之律耕耘禮義儒行已申於仲尼嘯傲風雲髙節未屈於光逸雖闕循牆之敬豈千銘鼎之科將加譴黜恐乖寛裕希從理遣無重斯愆同前母嬰聲同律和氣合形比渡遼捨鴈門之守獨挹書生中郎捐座客之談方近處士吁惟小吏職在含香光逸有著於美名李斯果昇乎列位神期暗許能紆長者之歡精義其同何廢逹人之話功曹望慙樂廣才謝范滂空嫌倨見之輕遂啟黜賢之責不省諸已飜欲退人巡覆再三匪聞其可磁石非曲斜之取武魄無俯芥之收捨凡就能幸從其議同前鄭少㣲智士敏徳難進易退明識流鑒察㣲知彰與善無求於貎恭選能何限於厮役一言而善三語攸升交匪竭歡談仍詣理不乏吾事在小吏而非辜無速我尤何主吏之頗類不從棄黜深謂得宜同前景與小吏歡而且言不勤無傲之心旋得有皮之刺恭匪近禮信則承羞黜而未甘或難奪志若使才不足美怠而可尤必也徳有可甄倨而何責徴諸故事折有其倫酈生見重於抗詞元淑無嫌於長揖與其詰過寜取優賢薦賢能判甲薦賢能之士三詣公車試皆高第表請錫彤弓矢廷尉致詰詞云三適有功對趙子餘建官惟材言刈其楚為政以徳行歸于周甲徽華國章夾輔王室允茲好徳是用進賢禮盡異能褒然登於漢室䇿選巖穴咨爾置於周行既三適於公車宜九錫以觀國且得臣敗楚失在子文夷吾覇齊功歸鮑叔寵錫既傾於彤弓將命必議於太常致詰豈煩於廷尉儻任刑而廢禮猶越祝以待庖既見侵官未能唯命同前甲何人斯惟曰舉善士異其行光乎薦能如祁大夫則仇讐不避若隨武子乃管庫先登才膺明試雖公車之是辟事匪專征豈彤弓以為請名器不假車服以庸信有徳之可嘉終無功而何錫致廷尉之詰雖三適稱勞異諸侯之勲而百矢奚用典禮不易事義斯存同前沈東美舉善惟㣲知人則哲妙聞音者識窮山之竹能追芳者賞幽徑之蘭甲位登八命才髙四岳言刈其楚有異錯薪載縶其駒屢聞驤首文舉之昇一鶚陶洪之披三國志陶丘洪云御二龍於長塗披字疑二龍曷足思齊寧將比價懿兹擢桂便請錫弓自伐誠則躁求議功何妨懋賞稽諸漢史軌躅昭然名器不可假人升降固宜合禮爵土互錫理或酬功弓矢斯張雅符謬請六卿司過三適胡為同前王昌齡俾爾公侯敬服王命乃升賢俊昭宣訓典惟甲蕃屏有垣既孜孜於審擇黜陟咸若亦賢賢而脩貢三詣三適登漢室之明科九徳九徴賛虞臣之寅亮有如取火於燧故能任事加爵且汝惟勿伐則繼珪瓉不誣今也自賢豈曰彤弓是允與其表請孰若謙光廷尉有詞匪伊妄作同前劉潤唐堯稽古時謂能官周文小心號稱多士雲龍感召鸞鷺充庭蒲璧交衢弓車荐委薦異能之士採非常之徳遊大學而横經詣公府而髙第驥足千里同主父之三擢桂林一枝恥公孫之十上爰求九錫之命以旌三適之功惟甲書生可貴能移太守之尊小吏雖卑猶奪宰君之望在道雖云可重傷倨無宜寘刑理存優賢不勞加黜此篇惟甲以下四十二字疑誤寢延部人判撫州别駕豆盧安舍正寢延部人乙弗乾公事禀而後行所由舉不法安不伏對貟峴端右之寄古人為難光我大邦抑惟良政豆盧安雅有通識率由舊章吕䖍推其佩刀諸葛稱其驥足好問則裕髙步於丘門有道可尊且懸於陳榻舍兹正寢延彼部人饑渇良圖咨謀雅道昔干木賤士文侯尚且軾閭侯嬴匹夫信陵以之虚左重其所部望古何慙舉此為非愚所不取同前豆盧安幸屬清泰早襲衣冠陪去獸而宣風賛還珠而緝化題輿就職行聞仲舉之風展驥臨人坐振士元之躅爰於正寢延兹部人罕言私情但舉公事乙弗乾既奉嚴命禀而後行論情未越於古風據理何乖於即事王子之臨東海雖未贈刀盧君之撫南康終其化鶴所司妄舉將有昧於條章安既有推詞請從於緘黙同前劉光王祥望職乆著傳刀龎統良材攸稱展驥承上接下故宜自已而行舉目提綱或可禀人而借如鄭産流譽尚採鄉校之言晉侯質疑猶聴輿人之誦則智有不逹材有不通江海以納流為大君子以訪賢為美子賤之居茂宰實禀度於邑人何晏之任尚書上闗懷於談客孔丘既稱其善史臣不敘其非按舊章而可憑明所司之妄舉安今不伏良謂有詞志行高㓗判得甲志高㓗遂為時人所宗有司詰之曰景前時以為通而今以為介是不恒人也請斥之甲云景雅尚自若而論者或異不伏對李暄國著進賢之賞人思類能之用欽崇慰薦敦固引繩野無遺才邦有大任甲方伸已志將舉所知毛玠當仁克尊徐邈孔融明敏無棄禰衡見機一作貴乃通逹之人失道為草一作井皆可疑介之士隨乎去就順以行藏不㑹適來之時將疑過後之行寧問管鮑之厚孰存莊惠之深其於有司未曰知我居然請斥何哉失辭舉抱甕生判河南東道持斧舉抱甕生或告云矯州科生妄罪不伏對王利器大道潜運羣動無心明王徳孚庶物適遂由是山栖谷隱常有居巢之人鬻蔬灌圃一作園時聞抱甕之叟屬旒冕側席載勤於夢卜繡衣持斧博訪於丘園皇華以知無不為誠朴畧之可尚或人以多聞博識明渾沌之非真跡初兆於行藏事有同於倚伏舉者縱非折􅇆猶或獻芹科者貴叶平反無宜一作疑寘棘愚之寡見告記為宜同前王冷然使臣巡方天子錫命有能利國無待受辭况詩著考槃易稱嘉遁清髙勵俗義道周身致為舉先可以師者御史嵗觀風物夜動星芒路出河東載馳騘馬地疑河上便遇真人將觀善以懲違遂薦賢而報國逄萌既逹疑作違威辟莫辨東西法真一作慎又作振非不以禮迎何能進退由是黄金見鑠白玉成瑕雖莊周道心以枯槁非本而子貢利口乃渾沌假脩人既無情罵叔文而稱矯州寧妄罪鞭􅑔越以成威同前馬翊濟濟以寧實惟多士戔戔所賁其在旌賢且抱甕之生代稱髙尚垂竿投釣寧殊渭水之公灌園鬻蔬不讓漢隂之叟御史以皇華動俗騘馬生風有隱逸而必求無賢才而不舉今當所薦理合其宜復有澆薄之夫淳和詎識季孫讒於子路未損其容武叔毁於仲尼何傷其徳寧使挂瓢之輩道以矯時飲犢之流人稱為妄州司處斷未曰通途同前張景弓旌待士束帛登賢授方任能察言觀行雖三㣲改運文質有殊百代可知風聲不替國家克明俊徳無曠庶官多士斯聞得人為盛猶恐考槃有作薖軸生詞思草澤之遺芳憶山泉之逸賞傍馳鶴板博訪龜枚將求異等之才載下非常之制方書執簡直指觀風澄清之道莫聞黜陟之宜且昧海隅沉隱未薦褒衣漢隂矯識飜稱抱甕詳延不中使司自是疎遺混沌假脩野老若為加罪同前張法詩詠考槃易稱嘉遁聲流載籍美播丘山誠出處之多途乃蕭蘭之或致至若丘中一作立老圃漢上棲神跡徒挂於幽閑名未通於束帛既而金潭洗菊不暇優遊玉甃滋園徒施混沌御史乘騘按俗持斧臨人有悔必彈聞善斯舉然以羸瓶小節抱甕㣲流賁然來思竊用多愧或告云矯深紊前聞生也不甘如何厚貎同前世道交喪文質平易朴畧之緒𦕈焉不退混沌之萌去之彌乆眷言持斧庀我王職將鎮風化是旌漢隂孑孑干旄雖得詩人之詠悠悠抱甕仍招孔父之責或者之告不其宜乎假脩之名於是驗矣然刑克以當遁真存肥甯越尚不致科巢父如何詰罪免夫度外竊以為得貢市井之子判得州府貢士或市井之子孫為省司所詰甲云集作稱羣萃之才集作秀出者不合限以常科對白居易惟賢是求何賤之有况士之秀者而人其捨諸惟彼郡貢或稱市籍非我族類則嫌雜以蕭蘭舉爾所知安得棄其翹楚誠有惡於禆敗諒難捨於集作其茂異㨂金於砂礫豈為類賤而不收度木於澗松寧以地卑而見棄但恐所舉失徳不可以賤廢人况乎識度冠時出自牛醫之後心計成務擢於賈豎之中在往事而足徴何常科而是限州申有據省詰非宜選人代試判得乙充選人識官選人代試法司斷乙與代試者同罪訴云實不知對前人官擇賢良選稽名實茍作偽以集作而心拙必代斵而手傷乙情匪容奸行乖周慎將如吾面遂充識以不疑未見子心果代試而有悔既彰聞而貽戚乃連坐而集作以論辜察情諒不同謀結罪誠應異罰法無攸赦選者當凖格論人不易知識名所宜情恕削奪恐為過當貶降庶叶决平㧞萃相非判得乙與丁俱應㧞萃乙則趨時以求名丁則勤學而待命二人于有相非未知孰是對前人立已狥名則由進取脩身俟命寧在躁求智乎雖不失時仁者豈宜棄本屬科懸㧞萃才選出羣勤苦脩詞乙不能也吹嘘附勢丁亦恥之躁静既殊惟習遂逺各從所好爾由徑而方行難强不能吾舍道而奚適觀得失之路或似由人推通塞之門誠應在命所宜勵志焉用趨時若棄其葑菲失則自求諸已儻中其正鵠得亦不愧於人無尚茍求盍嘉自致取名士判得選舉司取有名之士或云不息馳騖恐難責實對前人聲雖非實善豈無名不可茍求亦難盡棄屬時當仄席任重掄材思得士於聲華懼誘人於奔競若馳騖而方取慮非嵗貢之賢儻集作如寂寥而後求恐失日彰之善將期摭實必在研精集作情但取捨不私是開乎公道則吹嘘無益自閉其倖門名勿論於有無鑒自精於舉措教胄子毁方瓦合判前人此篇當在五百一十二巻師學門今已移入此姑存其目試選人繼燭判得吏部選人入試請繼燭以盡精思有司許之及考其書判善惡與不繼燭同有司欲不許未知可否對前人旁求俊造迨將筮仕厯試文詞俾從卜夜茍狂簡而無取宜確執而勿聴萃彼羣才登于㑹府惟賢是急慮失寶於握珠有命則從何集作許借光於集作而秉燭及乎考覈罕有菁英屬詞既謝於㨂金待問徒煩於繼火將期百錬之後思苦彌精何意一塲之中心勞愈集作逾拙曷如早已焉用晩成敢告有司勿從所請徴辟不起判得乙隱居徴辟不起子孫請以所辟官用䕃所司不許對脩身獨善寵則若驚制爵尊賢命其難廢形雖遺於軒冕䕃宜及於子孫乙貞以自居辟而不起鶴書下集作莫顧雖忘恤後之心爵命已行寧闕賞延之典若使死無用䕃生不及榮何成旌善之風宜集作且是廢君之命揚苖不食誠自絶於縶維葛藟有隂義難虧於燕翼請優後嗣以奬外臣無出身判得乙居家理亷使舉請受官吏部以無出身不許使執云行成於内可移於官對前人選調集作調選正名誠宜守序敷求懋徳安可拘文乙積行於中聞彰于外亷使以道敦知已欲致我於青雲天官以限在出身將棄子於白屋事雖異見理可明徴掄𤨏𤨏之材則循舊格割翹翹之楚寧守常科幸當仄席之求無惑刻舟之執况自家刑國移孝資忠既聞道不虚行足見舉非失徳所宜堅决無至深疑文苑英華巻五百十五
