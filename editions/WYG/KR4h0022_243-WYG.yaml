body:
  text: 文苑英華巻二百四十三宋李昉等編酬和四包融一首包佶三首包何二首李嘉祐四首錢起一首皇甫曾三首張繼二首韓翃一首郎士元三首皇甫冉三首顧况九首耿緯二首司空曙二首李益一首李端一首章八元一首暢當二首李夷簡一首武元衡三首李吉甫一首盧綸十三首答國子張主簿包融湖岸纜初解鸎啼别離處遙見舟中人時時一迴顧坐悲芳歲晩花落青軒樹春夢隨我心摇揚逐君去奉和柳相公中書言懷包佶運籌時所貴前席禮偏深羸駕歸貧宅欹冠出禁林鳳巢方得地牛喘最闗心雅望期三入東山未可尋以下三篇並見集本酬兵部李侍郎晩過東㕔之作時任刑部侍郎除國子祭酒前人酒禮慙先祭刑書已曠官詔馳黃紙速身在絳紗安聖位登堂靜生徒跪席寒庭槐暫摇落幸為入春看酬于侍郎湖南見寄十四韻前人桂嶺千崖斷湘流一派通長沙今賈傅東海舊于公章甫經殊俗離騷繼雅風金閨文作字玉匣氣成虹翰墨時無侣丹青夙在工主恩留左掖人望積南宫巧拙循名異浮沉顧位同九遷歸上略三已契愚衷責謝庭中吏詩選作禮悲寛塞上翁楚材欣有適燕石愧無功山曉重嵐外林春苦霧中雪花飜海鶴波影倒江楓去札頻逢信迴㠶早挂空避賢方有日非敢愛㣲躬和程員外春日東郊即事包何郎官休浣憐遲日野老歡娛為有年幾度折花驚蝶夢數家留葉待蠶眠藤垂委一作宛地縈珠履泉長侵階浸緑錢直到閉闗朝謁去鶯聲不散柳含煙和孟處州閑齋即事前人古郡鄰江嶺公庭半薜蘿府寮閑不入山鳥靜偏過睥睨臨花柳䦨干枕芰荷麥秋今已至君聽兩岐歌奉和杜相公長興新宅即事呈元相公李嘉祐意有空門樂居無甲第奢經過容法侣雕飾讓侯家隱樹長簷宿集作肅開園一逕斜據梧聽好鳥行藥寄名花夢蝶留清簟垂貂坐絳紗當山不掩户暎日自傾茶雅望歸安石深知在叔牙還成吉甫頌贈答比瑶華和都官苗員外秋夜寓直對雨已見一百九十一巻前人奉酬路五郎中院長新除工部員外見簡前人一門同伴集作袐省萬里作長城問絹蓮花府揚旗細柳營詞鋒偏却敵草奏直論兵何幸新詩贈甘輸小謝名酬皇甫十六侍御曾見寄此公時貶舒州司馬前人自顧衰容累玉除忽承優詔付銅魚江頭鳥避青旄節城裏人迎露網車長沙地近悲才子古郡山多憶舊廬更枉新詩思何苦離騷愁處亦無如山中酬楊補闕見過錢起日暖風恬種藥時紅泉翠壁薜蘿垂幽溪塵過苔還靜深樹雲來鳥未知青瑣同心多逸興春山載酒逺相隨却思身外集作却慙身事牽纓冕寜勝林集作未勝杯前倒接羅和杜相公移入長興宅呈諸宰執皇甫曾欲向幽偏適還從絶第移秦官鼎食貴堯世土階卑㦸户槐隂滿書窓竹葉垂纔分五更漏遥隔萬年枝北闕深恩在東鄰逺夢知日斜門杳暎山逺樹參差論道齊鴛翼題詩憶鳳池從公亦何幸長與珮聲隨酬鄭高郵秋夜見寄前人摇落空林夜河陽興已生欲辭公府歩知結逺山情高柳風難定寒泉月助明袁安方卧雪尺素及柴荆酬竇拾遺秋日見呈時此公自江隂令除諫官前人孤城永巷時相見衰柳閑門日半斜欲送近臣朝帝一作魏闕猶憐殘菊在陶家酬李書記校書越城秋夜見贈張繼東越秋城夜西人白髮年寒城警刁斗孤憤抱龍泉鳳輦棲岐下鯨波鬪洛川量空海陵粟賜乏水衡錢投閣嗤揚子飛書代魯連蒼蒼不可問余亦賦思𤣥酬張二十員外前國子博士竇叔向前人故交日零落心賞寄何人幸與馮唐遇心同跡復親語言未終夕離别又傷春結念湓城下聞猿詩興新酬程延秋夜即事見贈韓翊長簟迎風早空城澹月華星河秋一鴈砧杵夜千家節候看應晩心期臥正集作亦賖向來吟秀句不覺已鳴鴉和王相公題中書叢竹寄上元相公郎士元多時仙掖裏色並翠琅玕幽意含烟月清隂庇蕙蘭枝繁宜露重葉老愛天寒竟日䨇鸞止孤吟為一看酬蕭二十七侍御初秋言懷前人楚客秋多興江林月漸生細枝凉葉動極浦早鴻聲勝賞暌前夕新詩報逺情曲高慚和者惆悵閉寒城奉和杜相公益昌路作前人春半梁山正落花台衡受律向天涯南去猿聲傍䨇節西來江色遶千家風吹畫角孤城曉林暎蛾眉片月斜已見廟謀能喻蜀新文更喜報金一作南華奉和王相公喜雪已見一百五十四巻皇甫冉奉和王相公早春登徐州城前人落日憑危堞春風似故鄉川流通楚塞山色遶徐方壁壘依寒草旌旗動夕陽元戎資上策南畝富集作起耕桑和袁郎中破賊後經剡中山水前人武庫分帷幄儒衣事鼓鼙兵連越徼外宼盡海門西節比全疎勒功當雪㑹稽旌旗迴剡嶺士馬濯耶集作靈溪受律梅初發班師草未齊行看佩侯一作金印豈得訪丹梯酬唐起居前後見寄二首顧况愁人空望國驚鳥不歸林莫話彈冠事誰知結襪心霜凋樹吹斷土蝕劒痕深欲作懷沙賦明時恥自沉二何處弔靈均江邉一老人漢儀君已接楚奏我空頻直道其如命平生不負神自傷庚子日鵩鳥上承塵奉酬茅山贈賜幷簡綦毋正字前人玉帝居金闕靈山幾處朝簡書猶有畏神理詎能超鶴廟新家近龍門舊國遥離懷結不斷玉洞集作洞浦一吹簫酬柳相公前人天下如今已太平相公何事喚狂生箇中恰似籠中鶴東望滄洲呌數聲酬信州劉侍郎兄前人劉兄本知命屈伸不介懷南州管靈山可惜曠土棲集作土乖樵隠同一徑竹樹薄西齋鳥陵嶂合沓月配波一作陂徘徊薄宦脩禮數長景謝譚諧願為南州民輸稅事鉏犂胡為立不正集作走不止風雨驚邅迴奉酬劉侍郎前人㡬迴新秋影璧滿蟾又缺鏡破似傾臺輪斜同覆轍雖分上林桂還照滄洲雪蹔伴顦顇人歸華耿不滅酬本部韋左司前人好鳥依佳樹飛雨灑高城况與二三子列坐分兩楹文雅此何盛林塘含餘清府君未歸朝逰子不待晴白雲帝城逺滄江楓葉鳴却略欲一言零淚和酒傾寸心久摧折别離重骨驚安得凌風集作霜翰肅肅集作蕭蕭四海輕酬房杭州前人郡樓何其曠亭亭廣而深故人牧餘杭留我披胷衿滿篋閲新作璧玉誕清音流水入洞天窅豁欲一作相凌臨闢險延北阜薙道陟南岑朝從山寺還醒醉動笑集作愁吟荷花十餘里月色攅湖林父老惜使君却欲速華簮酬漳州張九使君前人故人窮越徼狂生起悲集作悲楚愁山海萬里别草木十年秋鞭一作鞍馬廣陵橋出祖張漳州促膝墮簮珥闢幌戞琳球短題自兹簡華篇詎能酬無階承明庭高歩相追逰南方榮桂枝凌冬捨温裘猿吟郡齋中龍靜檀欒流薜鹿莫猺洞網魚盧亭洲集作舟心安處處安處處思遐陬酬張少尹秋日鳳翔西郊見寄耿緯鼎氣孕河汾英英濟舊勲劉生曾任俠張率自能文官佐征西府名齊將上軍秋山遙出浦野鶴暮離羣逺恨邊笳起勞歌騎吏聞廢闗人不到荒戍日空曛草木凉初變隂晴景半分疊蟬臨積水亂燕入過一作高雲麗藻終思我衰髯亦為君閑吟寡和曲庭葉漸紛紛酬田璫前人同逰七祖後已是十年餘幾度曾相夢何時定得書日高城影盡霜重柳條疎且對樽中酒千般總未如酬李校書端見贈一作謝李端見贈司空曙見集本緑槐垂一作初穗乳烏飛忽憶山中獨未歸青鏡流年看髮變白雲芳草與心違乍一作多逢酒客春一作朝逰慣久别林僧夜坐稀昨日聞君到城闕莫將簮弁勝一作責荷衣此詩二百五十四卷重出今已削去注異同為一作酬張芬有赦後見贈前人紫鳳朝銜五色書陽春忽布網羅除已將心變寒灰後豈料光生腐草餘建水風烟収客淚杜陵花竹夢郊居勞君故有詩相贈欲報瓊瑤恨不如答許五端公馬上口號李益漫逐旌旗俱白首少逰京洛共緇塵不堪身外悲前事強向盃中覔舊春和王元二相避暑懷杜太保李端艱難嘗共理海晏更相悲况復登堂處分明避暑時緑槐千穗綻丹一作紅藥一畨遲蓬蓽今何幸先聞大雅詩酬劉員外月下見寄章八元夜凉河漢白巻箔出南軒過月鴻爭逺辭枝葉暗翻高謡聞麗曲緩歩接清言宣室思前席行看拜主恩天柱隱所重答江州應物暢當寂寞一悵望秋風山景清此中惟草色翻意見人行荒徑饒松子深蘿絶鳥聲陽崖全帶日寛嶂偶通耕拙昧難容世貧寒别有情煩君瓊玖贈幽懶百無成山居酬韋蘇州見寄前人孤柴泄烟處此中山叟居親雲寧有事耽酒詎知余水定鶴飜去松敧峯儼如猶煩使君問更欲結深廬西亭暇日書懷十二韻獻上相公李夷簡勝賞不在逺無然念𤣥一作冥搜兹亭有殊致經始富人侯澄澹分沼沚榮廻間林邱荷香奪芳麝石溜當鳴球撫俗來康濟經邦去咨謀寛明洽時論惠愛聞甿謳代斵豈容易守城獲優悠文翁舊學校子產昔田疇琬琰當佳什池䑓想舊逰誰言矜改作曾是日增脩憲省忝陪属岷峨問徽猷提攜當有路勿使滯刀州奉酬李十一尚書大使西亭暇日書懷見寄十二韻之作武元衡鼎鉉昔云忝西南分主憂烟塵開􅈎道旌節護蠻陬任重功不立集作無立力微恩未酬據鞍慙齒髮責帥懼春秋高德間集作聞鄭履儉居稱晏裘三刀君入夢九折我廻輈時景屢遷易兹焉期退休方追故山事豈謂台階留遐挹清靜理眷言蘭杜幽一緘瓊玖贈萬里别離愁巴嶺雲外没蜀江天際流懷賢耿遙思相望鳳池頭奉酬荆州嚴司空見寄前人金貂再領三公府玉帳連封萬户侯簾捲青山巫峽曉烟開碧樹渚宫秋劉琨坐嘯風清塞謝朓裁集作題詩月滿樓白雪調高歌不得美人南國集作望翠蛾愁甲午歲相國李相公有北園寄贈之作集作什唫翫歴時屢促酬答機務不暇未及卒集作報章今古遽分電波增感留墓劔於集作而心許偶鄰笛而意傷寓哀冥寞以廣遺韻云前人機事勞西掖幽懷寄北園鶴巢深更靜蟬噪斷猶喧仙醖百花馥艷歌䨇袖飜碧雲詩變雅皇澤葉流根未報雕龍贈俄傷淚劒痕佳城開集作闗白日夜集作哀挽去集作向青門禮命公台重烟霜壠樹繁天高不可問空使輔星昏夏夜後園即事寄門下武相公李吉甫結構非華宇登仙似古原僻殊蕭相宅蕪勝邵平園避暑依南廡追凉在北軒烟霞霄外靜草露月中繁鵲遶驚還止蟲吟思不喧懷君欲有贈宿昔貴忘言和太常王卿立秋日即事盧綸山集作嵩高雲日晴集作明潘岳賦初成籬槿花無色堦桐葉有聲絳紗垂簟靜白羽拂衣輕鴻鴈悲天逺龜魚覺水清别絃添楚思牧馬動邊情田雨農官問林風苑吏驚松篁終盛茂蓬艾自衰榮遙仰憑軒夕唯應苦集作善宋生和王倉少尹暇日言懷前人清時多暇日况乃是夫君習靜通仙事書空閲籙集作篆文劒飛終上漢鶴夢不離雲無限烟霄路何嗟跡未分和考功王員外杪秋憶終南舊居前人靜憶溪邉宅知君許謝公曉霜凝耒耜初日照梧桐澗䑕喧藤蔓山禽竄石叢白雲當嶺雨黃葉遶堦風野果垂橋上高泉落水中歡榮來自間羸賤往曾通月滿珠藏海天清鶴在籠餘音如可寄願得隱牆東酬劉侍御春日見招一作酬侯釗侍御春日見寄前人清園君子居左右滿圖書三徑春自足一瓢歡有餘莎庭成野席蘭藥是家蔬幽顯豈殊迹昔賢徒病諸酬孫侍御春日見寄前人經過里巷春同是謝家鄰顧我覺衰早荷君留醉頻松高猶覆草鶴起慙縈塵如悟達人志患名非患貧和太常李主簿秋中山下别墅即事前人清秋來幾時宋玉已先知曠朗霞暎竹澄明山滿池葺橋雙鶴起收果衆猿隨韶樂今方奏雲林徒蔽虧酬韋渚秋夜有懷見寄前人蕭條凉夜永秋草退集作對衰顔露下鳥初定月明人自閑獨悲無舊業共喜出時艱為問功成後同遊何處山酬李叔度秋夜喜相遇因傷闗東寮友䘮逝見贈前人寒月照秋城秋風泉澗鳴過時見蘭蕙獨夜感衰榮酒散同移病心悲似逺行以愚求作友何德敢稱兄石一作谷變波長急松枮藥未成怨看新髩色怯問故人名野澤雲隂散荒原日氣生覉飛本難定非是惡絃驚酬李端長安寓居偶詠見寄前人自别前峯隱同為外累侵幾年親酒㑹此日有僧尋學稼功還棄論邊事亦沉衆歡徒滿目專愛久離心覽鏡絲垂鬢彈絃淚灑琴訪田悲洛下寄宅憶山隂薄溜浸青石横雲架碧林壞簷藤障密衰棟棘籬深流散俱多故憂傷併在今為當俟高躅歸止共抽簮奉和陜州十四翁中丞寄雷州二十四翁司户前人聮飛獨不前逈落海南天賈傅竟行矣邵公唯泫然瘴開山更逺路極水無邊沉劣本多感况聞原上篇酬陳翃郎中冬日攜柳郎竇郎歸河中舊居見寄前人三旬一休沐清景滿林廬南郭羣初一作儒從東牀兩客居晨煙浮雪野麥隴潤氷渠斑白皆持酒蓬茅盡有書終期買寒渚同此利蒲魚酬包佶郎中覽拙巻後見寄前人令伯支離晩讀書豈知詞賦稱相如狂逢花木無新思拙伏溪源損舊居禁路看山珂自緩雲司翫月夜應初沉幽敢望金門召空愧巴歈問子虚酬李益前人戚戚一西東十年今始同可憐歌酒夜相問兩悲翁文苑英華卷二百四十三
