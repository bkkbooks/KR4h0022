body:
  text: 文苑英華巻七百十一宋李昉等編遊宴四江西觀察宴度支張侍御南亭花林序一首宴韋庶子宅序一首中和節奉陪杜尚書宴集序一首上己日陪劉尚書宴集北池序一首九日陪劉中丞賈常侍宴合江亭序一首中和節陪何大夫㑹讌序一首冬日洛下登樓宴序一首秋夜侍姑叔讌㑹序一首臘日與諸公龍沙讌集序一首同徳寺湊禪師院羣公㑹集序一首泉州席使君宴邑中赴舉秀才於東湖亭序一首三月三日茶宴序一首陪永州崔使君游宴南池序一首送徐從事北游序一首遊大林寺序一首三遊洞序一首江西觀察宴度支張侍御南亭花林序顧况右洞庭左彭蠡公所臨也先庚式戎後甲徴文公所搃也夫以清浄和平之徳下施於民猶之不理既當其樂不觀其華不在吐曜騰光自開自落而已欣戚之氣實棲其間繡衣使者詞客張君相閤之賢從事于公疆理一曰均賦二曰省徭三曰主文能中質茲亭之樂其可節乎蓋取文明離麗君子健應之象宴韋庶子宅序前人昔洛文粹作雒下鄴中蘭亭峴首文雅之盛風流之事蓋一方耳今席有芳樽庭有嘉木飲酒賦詩皆大國聖朝羣龍振鷺握蘭佩玉者也在古其有陋乎在今其有榮乎終宴一夕寄懐千載是時也暮春駘蕩孟夏恢台之交耳文粹無耳字中和節奉陪杜尚書宴集序梁肅沛乎聖人在穆清之中合四序茂萬物謂二月之吉殷天人之和肇以是日為中和節原夫中以立天下之夲和以通天下之志明君所以搃萬邦也奉時以協氣播氣以授人元侯所以承王集作丕命也于時上元甲子之六嵗地平天成河海清晏集作海晏河清君臣髙㑹由内及外粤我主公搃集作牧揚州領東諸侯既承湛露之澤且脩式燕之禮乃邀中貴人及我上介部從事列將羣吏大官重客峨星弁執象笏脱劍曵綬列于賔席者百有餘人火旗在門雷鼓在庭合樂既成大庖既盈左右無聲㫖酒斯行乃陳獻酬之事乃酣無筭之飲於是羣戱坌入絲竹雜遝集作沓毬蹈槃舞橦懸索走之疾集作捷飛丸㧞距扛鼎踰刃之竒迭作於庭内急管參差長袖嫋娜之美陽春白雪流徴清角之妙更奏於堂上風和景遲既醉集作樂且儀自朝及暮惟節有集作是度君子謂福禄之所浹在是命矣既醉小子且集無此字輙起而言曰大君有命令節茲始我公宴喜於以受祉歌以發徳歌集作詩以頌美于胥樂兮胡可廢巳公曰善乃俾坐客偕以六韻成章授簡為序上以志王澤所及次以紀方鎮之歡末以示將來盛事云爾上巳日陪劉尚書宴集北池序符載才智宏傑者其人尊政教簡易者其民泰時節和暢者其游盛地形盤鬱者其宴雄我尚書劉公挺天姿之英特采人心之愉樂乘上已之暄淑趣北池之汗漫操四駕騰百祥皇皇􅈌􅈌氣象飄動真髙會也况乎九天之澤滂沱下㴻新握龍節保寕坤維茍或風流褊儉不耀是則欲顦顇榮寵也豈承荷錫命之意乎巖巖西蜀古稱天府之奥也江山數千里羗蠻萬餘落嵗時風俗豪侈凡所好尚竒偉譎怪遭值此際得攄胸襟故尤為壮觀矣先期旬日也嚴徑術洗涯岸洞篁篠熾䑓榭有事之辰也擁幢蓋揖賔客寅及於近郊夘及於北池其降車也鼙鼓發登舟也絲桐揭解䌫也百戱作覧水府摧江蘺叱天吳拉馮夷躍龜魚騰蛟螭召琴髙嘯宓妃蓬壺以迴泊若雲蔚而霞披一何壮也及乎耳煩目劇綿趣静境稍自引去于空闊水波不動四羅羣山簮裾坐於天上思慮遊於象表又何曠也觀夫水嬉之倫儲精蓄鋭天髙日晏思奮餘勇實有赤縣兩為朋曹獻竒較藝鈎索勝負於是劃萬人之浩擾豁一路之清泚南北穏徹中無飛鳥爰挂綿彩從風為標爛然長虹横拖空碧乃計才力量逺邇一號令雷鼓而飛千橈動萬夫呼閃電流於目眥羽翼生於肘下觀者山立隂助鬬志肺腸為之沸渭草樹為之偃悴揭竿取勝揚旌而旋觀其猛厲之氣騰陵之勢崇山可破也青天可登也若使移於摧堅䧟陣之地寜有對宇宙乎夫文質殊途古今異宜君子作事得時也是都也有軍旅焉有南詔焉有西戎焉尚或以清流激湍一觴一詠為賔客之娛者是不知變也而識者咍之其觀一時之能事成千古之休烈在今辰也豈與夫永和少長咸集同日而言哉載自顧薄劣塵厠下介謬處陳璋之任被命首敘敢逡巡乎請賦八韻以耀蘭亭諸子也先是故太師韋公因是令節課賔寮賦詩乃取諸黄裳以為韻今尚書繼之以青蓋欲使其五色相宣耳九日陪劉中丞賈常侍宴合江亭序前人井絡萬方之奥區也重陽四序之佳節也合江一都之竒勝也張此筵者中司劉公焉監此事者常侍賈公焉是亭鴻盤如山横架赤霄廣場在下砥平雲集而東西南北夐然也場中羅崇牙大斾亭上列雕盤玊斚主人與賔朱紫爛然相與峩冠揖讓而臨之雷鼔震動壺觴波湧山川風景凌軒入坐地形勝天氣嘉人心洽三者既極遂成歡娛不知醉之無從也夫和樂之在人心也未嘗不激於衷而形於外此自然之數是言也其何故哉禮曰有為而為之曩者藩隅變故主帥殂歿而子繼弟及者有之毒民殺吏者有之逐將攘位者有之兵戈一動羶腥數嵗今坤維禍起太尉公薨落山川之所控引兵車之所雜蹂蕃蠻之所連屬師漏於涓滴釁成於波瀾安危之計懸在絲髪我常侍沉斷𤣥機發如飊馳以眄睐之力移山丘之勢我中丞聰明英傑動與神遇承要約當談笑間萬形施張巳在靈府遂乃推大誠布大賞誅横猾㧞雋異息老稚洗故瑕一日而聲作浹旬而恩被盈月而政成森然萬户與令清浄麾幢之所至也自耆耋至於童孺瞻其馬首拜其玊顔唯恐其不為父母也故兹㑹之宴賞今日之愉樂與彼登栢景之山落孟嘉之帽飲菊酒佩絳囊者豈同日而言哉於戯非常侍無以康䕶全蜀非中丞無以恢建盛烈熊羆二美輝映一時若使載事者聆而書之可以聳忠良而驚奸慝也載忝幕府之舊謬親文翰憑良㑹之竒勝來群情之踴躍敢竭思慮紀其風流至于登臨眺聽之興烟霞草樹之状即存乎大雅六韻之什此無備焉中和節陪何大夫㑹讌序中和王節也萬國承之樂洪慶也夫天地之大徳曰生發生之盛氣曰春春之於孟也萌動而方微於季也發泄而過强唯仲春木徳乃茂沃生人之愷樂洗萬物之枯槁當三陽之正中凝四氣之太和以正星鳥以推律度五年春皇帝負黼扆臨前殿酌天心之旻美順人情之煦嫗啟襟宸疑作宸襟於髙瓊建嘉名於振古遂下明詔詔天下以每年春二月朔旦為中和之節焉凡八紘九州舟車所至之域莫不嚮風蹈躍承順帝則即今日之㑹我岳鄂連帥御史大夫何公蓋所以祗明詔宣徳教而歡萬民也夫景不和無以破昏䝉之氣地不雄無以壮光華之㑹且觀夫廣場削平空迥無涯黄鶴前峙以峥嶸大江旁注而逶迤朝之日晴陽始升鏡清無塵髙楊如煙拂冠垂紳主人乃揖乎英僚上介洎簮􅅂耆老之客相與羅拜於北向巳而敘登於阼階之上脱劍搢笏百戱具舉焉旌旗飄飄馬鳴蕭蕭始金鼓以一振忽端立而揚鑣鐡衣錚鏦白羽在腰列髙的於虛碧翻大斾於回飊既而鑑疑作鏗絲桐耀丸劍齊入體以岑崟罍涌而川注暄風徐來春日未歛美人盤跚緩歩前墀態生横波怨拂蛾眉感青春之不再歌朱實之離離音綿緲以切雲羌逺放而如遺樂及於繁奏爵及於無筭愉一變至於懽懽一變至於醉莫不載時之交泰飲公之恵洽恬悦饜飫充塞臟腑而巳哉大夫涵青雲之噐極黄裳之美忠厚方直清明而深竭至忠以輔國啟大誠以御物下車於江夏自始至於兹日徳行浹人於骨髓禮義澤人於思慮馨香問望久而益茂故地方千里民蓋百萬口親愛如父母畏威如神明利劍水鏡日懸户牖此所以無留訟無寃志熈熈穆穆為清淳之俗焉今天子以皇極大中之道居鴻寳之位垂二十載矣如天之覆如地之幬如春之仁如秋之威神聖聰明文武温龔侔羲農之遐想軼唐虞之絶軌况乎稷契咎夔訏謨其内也如彼韓侯申甫輯柔其外也如此則何憂乎北邊何患乎犬戎異日也若飛詔發來大夫有鼎鉉之拜則天下之理又未可量矣鄙夫樸野亦承玊斚之一人也授教序述慙靦無措請咸賦八韻用極中和之美焉簮裾一夲作簮文冬日洛下登樓宴序吳少微僕抱書劍河洛嵗月多矣曷嘗不憶林宗想元禮慨然今古追思盛徳有太原莊雄材特逹信而好事招奨英竒亦千載一時也取樂文翰不孤風景置㫖酒命羣公列坐層樓觀望天地烟霞咫尺左右娛賔山水凄清縱横在目其時既晩其日將䦨度北牖之凉風下南端之白日覽物増思遊子多懐乃眷斯文期乎不墜云爾秋夜侍姑叔讌㑹序權徳輿叔父至自東周第如新定就長子桐廬尉之養也途出雲陽徳輿之僑居在焉拜慶之後式展讌餞掇蔬焚枮以實圓方叔父諸姑既就坐羣從伯仲或冠或丱中外稚孺凡四五十人差其長㓜為侍坐之列暢之以㫖酒既醉不諠侑之以清絃中奏彌静夭夭申申其樂無垠發之於恬曠得之於名教稍間則圓魄照坐微風入林殘暑盡銷清光交映歌詩類事舉節應觴覺聽視之内無非和樂雖謝庭羯末之盛雪花栁絮之興及夫情適於中率禮無違亦一時也乃命編次其文且書其時時建中四年之七月徳輿操觚以序臘日與諸公龍沙宴集序清祀嘉平著於三代蓋祭百種以報嗇表一嵗之順成故吾徒亦休澣考勝用文㑹友龍沙古地大江在下可以縱逺目可以滌煩襟况簮裾成列觴豆備薦酒酣神王舉手拊節盡一日之澤遣百慮如遺二三子唯今日可以酒狂而不書是無勇也同徳寺湊禪師院羣公會集序穆員嵗五日杜揚州出鎮東洛羣公禮賔用餞㑹於此堂以候於戱從公率俗道機變態倦息得於此樂道得於此衆君子同之員亦同之况乃竹深寒庭雪净禪室境捐世染坐對天涯甘茗代醪清論如樂蓋勞生之少息羣心之一勝㑹耳惜乎夕鳥集暝客散候人至車馬行各從爾司復返吾患嚮來所聚倐爾成空索過風於前林求往夢於既寤不可及也尚書郎李君曰其可及者詩猶庶乎詩之哉泉州席使君宴邑中赴舉秀才於東湖亭序歐陽詹貢士有宴我牧席公新禮也貞元癸酉嵗邑有秀士八人公將首薦集夲文粹作薦之于闕下古者相覿相祖有享有宴享以昭恭儉宴以示慈恵二典為用鮮或克兼諸侯升俊造於天子遣之日唯行鄉飲酒之禮則享禮也胾肉𤣥酒莫飲莫食公念肉不使食則仁不下浹酒不使飲則歡不上交方欲激邦俗於流醨致王人乎徳行而賢者仁未伊浹才者歡未我交其若蚩蚩何秋七月與八人者鄉飲之禮既脩乃加之以宴餚移巳膳醴出家醖求絲桐匏竹以將之選華軒勝境以光之後一日遂有東湖亭之㑹公削桑梓之禮執賔主之儀揖讓升堂雍容就筵樂遍作而性情不流爵無筭而儀形有肅鏘鏘焉濟濟焉於是老㓜來窺盡室盈岐非其親懿則其閭里皆内訟而誓遷善焉於戱行其教不必耳提而口授移其風不必門扇而户吹公斯宴則風移教行其間矣真盡心竭誠奉主化民之宰也煙景未暮酒徳俱飽有逡巡避位而言曰夫詩者有以美盛徳之形容君侯因片善附小能回一邑之心成一邑之行又昭吾人恭儉于嘉享示吾人慈恵于清宴回人心成人行周孔之才也昭恭儉示慈恵管晏之賢也不有歌詠其如六義何是日人有甘棠泮宫之什客有天水姜閲河東裴參和潁川陳翊邑人濟陽蔡沼佐賛盛事亦獻雅章小子公之甿幸鼓微聲先八人者鳴捧豆伺徹時在公之側覩衆君子之作遂從卜商之後書其㫖為首序同上文粹無此五字三月三日茶宴序吕温三月三日上巳禊飲之日也諸子議以茶酌而代焉乃撥花砌愛庭隂清風逐人日色留興卧措青靄坐攀香枝閒鸎近席而未飛紅蘂拂衣而不散乃命酌香沫浮素杯殷凝琥珀之色不令人醉微覺清思雖五雲仙漿無復加也座右才子南陽鄒子髙陽許侯與二三子頃為塵外之賞而曷不言詩矣陪永州崔使君游宴南池序栁宗元零陵城南環以羣山延以林麓其崖谷之委㑹則泓然為池灣然為溪其上多楓柟竹箭哀鳴之禽其下多芡芰蒲蕖騰波之魚韜涵太虛澹灔閭里誠游觀之佳麗者巳崔公既來其政寛以肆其風和以亷既樂其人又樂其身于暮之春徴賢合姻登舟於茲水之津連山倒垂萬象在下浮空泛景蕩若無外横碧落以中貫凌太虛而徑度羽觴飛翔匏竹激越熈然而歌婆然而舞持頥而笑瞪目而倨不知日之將暮則於向之物者可謂無負矣昔之人知樂之不可常㑹之不可必也當歡而悲者有之况公之理行宜去受厚錫而席之賢者率皆在官䝉澤方將脱鱗介生羽翮夫豈趑趄湘中為顦顇客耶余既委廢於世恒得與是山水為伍而悼茲㑹不可再也故為文志之送徐從事北游序此篇當在七百三十二巻餞送門今已移入姑存其目遊大林寺序白居易余與河南元集虛范陽張允中南陽張深之廣平宋郁安定梁必復范陽張特集作時東林寺沙門法演智滿中堅利辯道深道建神照雲臯息慈寂然凡十七人自遺愛草堂歴東西二林抵化城憩峯頂登香爐峯宿大林寺大林窮逺人跡罕到環寺多清流蒼石短松瘦竹寺中唯板屋木噐其僧皆海東人山髙地深時節絶晩于時孟夏如正二月天山文粹作梨桃始華澗草猶短人物風候與平地聚落不同初到恍然若别造一世界者因成口號絶句云人間四月芳菲盡山寺桃花始盛開長恨春歸無處覔集作覔處不知轉入此中來既而周覽屋壁見蕭郎中存魏郎中𢎞簡李補闕渤三人姓名文句因與集虛輩歎且曰吁此地實匡廬間第一境由驛路至山門曽無半日程自蕭魏李遊迨今垂二十年寂寥無繼來者嗟乎名利之誘人也如此時元和十二年四月九日太原白樂天序三遊洞序前人平淮西之明年冬予自江州司馬授忠州刺史微之自通州司馬授虢州長史又明年春各祗命之郡與知退偕行三月十日參㑹於夷陵翌日微之反棹送予至下牢戍又翌日將别未忍引舟上下者久之酒酣聞石間泉聲因捨棹進䇿歩入缺岸初見石如叠如削其怪者如引臂如垂踵三字集作如垂如幢次見泉如瀉如灑甚集作其竒者如懸練如不絶綫遂相與維舟巖下率僕夫芟蕪割蘙梯危縋滑休而復上者凡四五焉仰睇俯察絶無人迹但水石相薄磷磷鑿鑿跳珠濺玊驚動耳目自未訖戌愛不能去俄而峽山昏黒雲破月出光氣含吐互相明滅晶熒玲瓏象生其中雖有敏口不能名状既而通夕不寐迨旦將去憐竒惜别且歎且言知退曰斯境勝絶天地間其有幾乎如之何俯通津綿嵗代寂寥委置罕有到者乎集無乎字予曰借此喻彼可為長太息者豈獨是哉豈獨是哉微之曰誠哉是言矧吾人難相逢斯境不易得今兩遇於是得無述乎請各賦古調詩二十韻書於石壁仍命予序而紀之又以吾三人始遊故目為三遊洞洞在硤州上二十里北峰下兩崖相廞間欲將來好事者知故備書其事文苑英華巻七百十一
