body:
  text: 文苑英華巻三百八十九宋李昉等編南省五左右司郎中授韋審規等左司户部郎中等制元稹勅尚書郎㑹天下之政上可以封還制誥下可以昇負牧守居可以優游殿省出可以察視違尤非第一流不議兹選守職方郎中上騎都尉韋審規等皆歴踐䑓閣閑逹憲章或滿嵗當遷或擇才斯授皆極一時之妙足為三署之光於戯提紀綱而分命六聦左右司之職甚重登生齒以比董九賦人曹郎之任非輕勉竭彌綸之心勿虚俊茂之舉可依前件吏部郎中授慕容珣吏部郎中等制蘇頲緫目賈至黄門朝請一作㪚大夫檢校尚書主爵郎中慕容珣在公無撓守道不囬利用特稱其斷割清心自表其剛正正議大夫行商州刺史上柱國申國公髙紹羽儀鵷鷺符采珪璋詣理愈見於昭明屬詞毎聞於警㧞九流綜覈五等封建式副為郎之羙宜用選衆之求珣可尚書吏部郎中紹可行尚書主爵郎中㪚官勲封各如故主者施行授韓滉吏部郎中制勅尚書郎中佐理六卿事關政本御史則舉直措枉綱紀周行非雅正之才難在斯任吏部員外郎韓滉恪慎惇敏且吏且文一作飭吏以文夙夜在公咸宜進位可吏部郎中授韋元曽吏部郎中等制常衮勅朝議郎行尚書吏部員外郎賜緋魚袋韋元曽朝請大夫前行尚書司封集作勲員外郎兼侍御史䕶軍賜魚元挹等學業優深詞華通瞻雅有縉紳之望列於郎署之間乆在劇曹尤推精宻自登膳部克舉彌綸選重一時職參六典宜膺並拜之寵式羙齊名之論元曽可守尚書吏部郎中㪚官賜如故元挹可行尚書吏部員外郎㪚官勲賜如故授盧元輔吏部郎中制白居易勅六官之屬升降隨時獨吏部郎班秩加諸曺之右歴代迄今未嘗改也則其典職之重選用之精可知矣洛州刺史盧元輔深於文敏於行加以剸犀之利洞膽之明潔而用之無徃不適連領大郡至于三四剗訛剔弊迎刃有聲宜付劇司俾之操制選曺郎缺用爾補員嵗調方􅇻佇揚乃職可尚書吏部郎中授盧懿吏部郎中制崔嘏勅河南少尹盧懿緫天下之缺員必先閲於吏曺郎然後逹於銓官自非神機穎利識用周宻則不得備於斯選也以爾詞鋒絢練門緒清華儒席許其温恭士林推其端厚自分曺洛汭貳尹三川澹於趨進之途鬱彼静専之操晦迹而囂浮自逺長鳴而風雨不渝是用徴還首曹榮以題柱必能佐持衡之重任聨藻鍳之清輝勉服官常無孤所舉可依前件司封郎中授王丘主爵郎中等制蘇頲勅宣議郎守尚書考功員外郎王丘學思文華精而典麗朝議郎守侍御史内供俸判右司員外郎上柱國韋虚心神清氣勝敏以甄通或刈於楚翹先有司之課績或提其綱轄肅諸曺之填委一作委靡爰旌二妙宜叶再遷丘可守尚書主爵郎中虚心可守右司郎中㪚官勲如故授韋儇緫目作環司封郎中制賈至勅司駕員外郎韋儇忠義􅈭切智深謀敏懐斷割之利用慨國家之深讐淮海多虞冦戎未殄是擇才彦佐斯旄鉞宜兼䑓閣以懋勲庸可司封郎中充淮南行軍司馬兼召募使司勲郎中授韋博司勲郎中等制崔嘏勅韋博等頃以邊城命將肇建麾幢當警塵未息之時及􅇏火尚明之日故於粉署妙選星郎欲以贊充國屯田之謀佐武賢備戎之術既而賔筵有耀幕畫已多荐居於沙漠之中茇舎於戎旌之下亦既勞績亟更嵗寒念其褁革之誠更復握蘭之羙而煥本以文學傳之吏能克踐正途乆司宗祏今以三農務急一作重九扈才難宜遷丞副之榮用陟亞卿之列無忘素履各服新㤙可依前件考功郎中授裴諝考功郎中制賈至勅君子立義為勇在國而能通故全其節而成其務矣守太子中允裴諝言忠信行篤敬有敏才斯可與權有直道磨而不磷造次顛沛秉心塞淵宜奨固之風緝䑓閣之政可守考功郎中授鄭涵考功郎中馮宿刑部郎中等制元禛勅二帝三王之所以仁聲無窮績用明而刑罰當也尚書郎専是兩者疇將若予僉曰前國子博士充史舘修撰鄭􅉼文無害可以彰善惡守歙州刺史馮宿思無邪可以盡哀敬庶尹百吏之能否四海九州之性命用汝叅斷汝其戒之夫刻則害善放則利滛僻則不通流則自撓惟是四者時考之難亟則失情緩則留獄深則礙恕縱則生姦惟是四者時行之難八者不亂然後可以有志於理矣朕實集作所注意爾其盡心㴠可考功郎中宿可刑部郎中餘並如故授趙昌翰考功郎中制錢珝勅具官趙昌翰國之舊章繋㑹府者僅卄六七坐曹郎見墜不舉焉用官為而善最之法所墜尤重非精材彊力安能舉之一作比昌翰以名家子實自修整為縣罷去修然自安公卿有知已之門車馬無致身之跡善餋材用益聞精疆是以考績處之且欲明試於爾噫擇名曹置名士吾不知設官之始獨為人乎如或深思必將召寵可依前件户部郎中授李邕户部郎中制蘇頲黄門朝㪚大夫守江州别駕李邕探學精奥為文沉鬱謇諤之心動必無撓彌綸之用行則有恒故以髙才逸羣懿聲滿聽宜膺版圗之任允光蘭握之選可守尚書户部郎㪚官如故主者施行授李規户部郎中制常衮勅朝議郎前檢校尚書户部郎中兼侍御史賜緋魚袋李規志學純偹居有彛檢才理精逹動無滯用常執邦憲兼毗使軒處煩行簡從容濟務叅我地官之屬首於時俊之科亦既外除尤彰内行正名舊秩以寵廻翔可守尚書户部郎中㪚官賜如故授髙允恭户部郎中判度支案制元稹勅行刑部員外郎飛騎尉髙允恭書云明徳慎罰明猶慎之况朕不徳兹用省于有司之獄莫不伏念隠悼周知其情惟爾允恭告我詳集作祥刑罔不率恊稽爾明効陟于他曹大比生齒之書仍掌圻毫之牘戎車方駕物力未豐剖滯應期斯任不細推爾惟恡之意㒺或失財用爾無害之文以懲刻下恡不欲過過則不終文不欲繁繁則不逮率是二集作數者時惟厥中可户部郎中判度支案㪚官勲如故度支郎中授裴倩度支郎中制常衮勅朝議大夫前守饒州刺史嗣正平縣開國男賜紫金魚袋裴倩逹識含精長材致逺秉彛尚晦金璞自明當劇居難干將獨割周歴䑓閣綢繆藩鎮休聲異政亦克有終底慎財賦之殷校計軍國一作需之用得專其任爰舉舊章佇爾發揮以之贍濟可尚書度支郎中㪚官封賜如故金部郎中授蔡秦客金部郎中制蘇頲黄門正議大夫行尚書右司員外郎上柱國蔡秦客風格允一作敏正文詞優洽明以在公直而履道聲馳粉署爰提建禮之綱位緫金曹宜轉司徒之屬可行尚書金部郎中㪚官勲如故主者施行倉部郎中授倉部郎中制劉禹錫勅周制倉人以辨於邦用廪人以待乎匪頒後代或均輸或平糴皆周官倉廪之職也於戯王者藏於天下吾何私焉收歛以時儲蓄必謹俾夫凶荒無患貧富克均宜詠京坻之詩勿守豆區之限可禮部郎中授彭景直禮部郎中制蘇頲黄門正議大夫檢校尚書禮部郎中上柱國彭景直通理内融含輝外静文尚典雅學窮精博故能容䑓是則仙闥咸推俾即真於滿嵗更惟允於卿月可行尚書禮部郎中㪚官勲如故主者施行授程休文禮部郎中制賈至勅司封郎中程休文郎中應列宿之位御史為凖䋲之舉紀必以徳任難其人况於四海多虞兩京未復䑓省樞要非賢不居或以節推或以才擇可守禮部郎中祠部郎中授王璵祠部郎中兼侍御史制賈至勅知上黨司馬事王璵藏器於身䇿名清列多才多藝知微知章歴兹艱難屢有籌畫宜兼䑓省之任仍緫師戎之役可祠部郎中兼侍御史充招召權宜處置使主客郎中授主客郎中制劉禹錫勅漢制尚書郎四人一人主營部成帝又署客曹主外國戎狄事皆今主客之任也其後或東西列職左右分名統彼行人之家綏其外臣之務朝聘則定位晏㑹則辨儀穆我四門深於九譯用委藁街之政克資粉署之賢可膳部郎中授鄭博雅膳部郎中制蘇頲黄門中大夫檢校太子洗馬鄭博雅志業融暢襟靈閑逺備聞前言嘗習故事來逰博望既増清道之華入奏明光宜副丹墀之寵可行尚書膳部郎中散官如故主者施行文苑英華巻三百八十九
