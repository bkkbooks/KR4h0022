body:
  text: 文苑英華巻三百九宋李昉等編悲悼九遺跡四十八首登石頭城何遜開域乃形勝地險嗟非一馬嶺逐縈一作紆廻犬牙傍隂一作險崪百雉極襟帶億庾兼量出疑作入押出字至理無窮形為善竟何恤眺聼窮耳目逺近備幽悉擾擾見行人輝輝視落日連檣入回浦飛幰交長術天暮逺山青潮去遥沙出薄宦惡師表属辭慚愈疾願乗觳觫車還隠朦朧室望郢州城沈烱䰟兮何處返非死復非仙坐柯如昨日石合未淹年歴陽頓成浦東海果為田空憶扶風詠惟􅁼聚作誰見峴山傳世變才良改時移民物遷悲哉孫驃騎悠悠哭彼天遊梁城盧思道揚鑣歴汴浦廻扈一作靶入梁墟漢藩文雅地清塵暖有餘賔遊多任侠臺苑盛簮裾歎息徐公劍悲凉鄒子書亭臯落照盡原野沍寒初烏散一作息空城夕烟銷古樹踈東越嚴子陵西蜀馬相如脩名竊所慕長謡獨課虚過故鄴叚君彦玉馬芝蘭北金鳳鼔山東舊國千門廢荒壘四郊通深潭直有菊涸井半生桐粉落粧楼毁塵飛歌殿空雖臨𤣥武觀不識紫㣲宫年代俄成昔唯餘風月同遊隋故都陸敬洛城聊顧歩長想遂留連水鬬宫初毁風變鼎将遷臯陶徳不見一作建汾隅似忽焉宗祊曠無象聲朔緬誰傳枌榆何冷落禾黍欎芊綿悲歌盡商頌太息憫周篇来蘓佇聖徳濡足乃承一作乗乾正始淳風被人勞用息肩舞象人思澤偃伯武功宣則百昌厥後於萬永斯年兹辰素商節灰管變星躔平原悴秋草喬木歛寒烟翻黄墜踈葉凝翠積高天參差海曲鴈寂寞柳門蟬興悼今如此悲愁復在旃徬徨不忍去杖䇿屡廻邅和周記室遊舊京孫萬夀大夫愍周廟王子泣殷墟自然心斷絶何闗係慘舒余本漳濵士舊國亦淪胥紫陌風塵起青氊冠盖踈臺留子建賦宫薄仲将書譙周自題柱商容詎表閭聞君懐古曲同病亦漣如夕次舊吴駱賔王維舟背楚服振策下吴畿盛徳𢎞三讓雄圖抗九圍黄池通覇迹集作業赤壁長一作暢戎威文物俄遷謝英靈有盛衰行歎鴟夷没遽惜湛盧非地古烟塵暗年深舘宇稀山川四望是人事一朝非懸劍空留信亡珠尚識機陣風遥可託闗月渺一作耿難依西北雲逾滯東南氣轉㣲徒思袁伯隠集作徒懐多謝買臣歸唯有荒臺露薄慕濕征衣北使長城王無競秦世築長城長城無極已暴兵四十萬興工九千里死人如亂麻白骨相撑委殫弊未云悟窮毒豈知止胡塵未北滅楚兵遽一作遂東起六國遂一作復囂囂兩龍鬬觺觺卯金竟握䜟反壁俄淪圯仁義寝邦國徂暴行終始一旦咸陽宫翻為漢帝一作朝市過漢故城吴少㣲大漢昔未定强秦猶擅塲中原逐鹿罷高祖鬱龍驤經始謀帝坐兹焉壮未央規模窮棟宇表裏浚城隍羣后崇長樂中朝増建章鈎陳被蘭錡樂府奏芝房翡翠明珠帳鴛鴦白玉堂清晨寳鼎食閑夜鬱金香天馬来東道佳人傾北方何其赫隆盛自謂寳靈長歴數有時盡哀平嗟不昌氷堅成巨猾火徳遂頺綱奥位匪虚校貪天竟速亡䰟神吁社稷豺虎闘巖廊金狄移㶚岸銅盤向洛陽君王無處所年代幾荒凉宫闕誰家域蓁蕪罥我裳井田唯有草海水變成桑在昔高門内于今岐路傍餘基不可識古墓列成行狐兎驚魍魎鴟鶚嚇獝狂空城寒日晩平野暮雲黄烈烈樊一作焚青棘蕭蕭吹白楊千秋并萬嵗一作萬嵗後空使詠歌傷經江寧覽舊跡至𤣥武湖張九齡南國更數世北湖方十洲天清華林苑日晏景陽樓幕一作梁下廻仙騎津傍駐綵斿鳬鷖喧鳳管荷芰闘一作暗龍舟七子陪詩賦千人和棹謳應言在鎬樂不讓横汾秋風俗因紓慢江山成易由駒王信不武孫叔是無謀佳氣日将歇霸功誰與脩桑田東海變麋鹿姑蘇遊否運争三國康時劣九州山雖幕府在舘豈豫章留水淀一作淚還相閲菱歌亦故遒雄圖不足問難想事風流巫山之陽香溪之隂明妃神女舊跡存焉蔣冽神女歸巫峡明妃入漢宫𢷬衣餘石在薦枕舊臺空行雨有時度溪流何日窮至今詞賦裏悽愴冩遺風經埋輪地前人漢朝張御史晉國緑珠樓時代邈已逺共謝洛城秋洛城大道邉此地尚依然下馬獨太息擾擾城市喧詩人嘆緑珠詩滿金谷園千載埋輪地無人興一言正直死猶忌况乃未死前汨羅有翻浪恐是嫌屈原我聞太古水上與天漢連如何一落地又作九曲泉萬古惟嵩少可以旌我賢五言登越州城孫逖越嶂繞層城登臨萬象清封圻滄海合􅆵閈鑒一作碧湖明曉日漁商滿芳春棹唱行山風摇美箭田雨潤香秔代閲英靈盡人閑吏隠并贈言王逸少已見曲池平雜言丹陽行前人丹陽古郡洞庭隂落日扁舟此路尋傳是東南舊都處金陵中㫁碧江深在昔風塵起京都亂如燬雙闕戎虜間千門戰場底傳聞一馬化為龍南渡衣冠亦願從石頭横帝里京口拒戎鋒青楓林下廻天蹕杜若洲前轉國容都門不見河陽樹輦道唯聞建鄴鐘中原悠悠幾千里欲掃攙搶未云已英雄傾奪何紛然一盛一衰如逝川可憐宫觀一作舘重江裏金鏡相傳三百年自從龍見聖人出六合車書混為一昔年王氣今何在併向長安就堯日荆榛草木開荒阡共道繁華不復全赤縣餘存一作唯餘江樹月黄圖半入海人烟暮来山水登臨遍覽古愁今淚如霰唯有空城多白雲春風淡蕩無人見金陵李白六代興亡國三盃為汝一作爾歌苑方秦地少山似洛陽多古殿吴花草深宫晉綺羅併隨人事滅東逝與集作只滄波秋夜板橋浦泛月獨酌懐謝朓前人天上何所有迢迢白玉䋲斜低建章闕耿耿對金陵漢水舊如練霜江夜清澄長川㵼落月洲渚曉寒凝獨酌板橋浦古人誰可徴元暉難再得洒淚一作酒氣填膺望鸚鵡州悲禰衡前人魏帝營八極蟻觀一禰衡黄祖斗筲人殺之受惡名吴江賦鸚鵡一作鸚鵡賦落茟超羣英鏘鏘振金玉句句欲飛鳴鷙鶚啄孤鳯千春傷我情五岳起方寸隠然詎可平才高竟何施寧不集作寡識冐天刑至今芳洲上蘭蕙不忍生經下邳圮橋懐子房前人子房未虎嘯破産不為家滄海得壮士椎秦博浪沙報韓雖不成天地皆振動潜匿遊下邳豈曰非智勇我来圯橋上懐古欽英風惟見碧水流集作流水曽無黄石公歎息此人去蕭條徐泗空越中覽古前人越王勾踐破吴歸義士還家盡錦衣宫女如花滿春殿至今惟有鷓鴣飛故綘行杜頠君不見銅鍉觀數里城池已蕪漫君不見虒祁文粹作祁裭非宫幾重臺榭亦㣲濛介馬兵車全盛時歌童舞女妖艶姿一代繁華皆共絶九原惟望塚壘壘題沈黎城權徹蘇子卧北海馬翁渡南州迹悔事乃立功逹名遂休夜聞羽書至召募北邉州鐵騎耀楚甲玉匣横吴鈎雪厚羣山凍蓬飛荒塞秋久戍曷辭苦數戰期封侯不學竪儒輩一經垂白頭漂母岸崔國輔泗水入淮處南邉古岸存秦時有漂母於此饋王孫王孫初未遇寄食亦何論後為楚王来黄金答母恩事蹟遺在此徒傷千載魂寒洲漲未觧花壟草空繁是一作徒望淮隂日蒼蒼雲樹昏幾年崩處色每月落潮痕古地多堙圯時哉不敢言其夕淚沾裳遂宿蘆洲村南浦望漢宫司空曙荒原空有漢宫名衰草茫茫雉堞平連鴈下時秋水在行人過盡暮烟生西陵歌唱何年絶南陌登臨此日情故事悠悠不可問寒禽野水自縱横過馬嵬三首李益路至墻垣問樵者顧予曰集作云是太真宫血染馬蹄盡朱閣影當天際挿青空集作太真血染馬啼盡朱閣影當天際空丹壑不聞歌笑一作吹夜玉階惟有薜蘿風世人莫重霓裳曲曽致干戈是此中二金甲雲集作銀旗盡已回蒼茫羅袖隔紅埃濃香猶自隨鸞輅恨魄無因離馬嵬南内真人悲帳殿東溟方士問蓬萊惟留坡畔彎環月時送殘蟬集作娥入帝集作夜臺三漢将如雲不直言冦来翻罪綺羅㤙託君莫集作不洗蓮花血留寄千年妾淚痕夜歩次古城楊衡茫茫死復生惟有古時城夜半無鳥雀花枝當月明長城鮑溶䝉恬集作公虜生人北築秦氏寃禍興蕭墻内萬里防禍源集作根城成六國亡宫觀豈文粹作闕啓集作闕幾千年生人半為土何用空中原奈何家天下骨肉尚無恩文粹作奈何天下人骨肉尚酬㤙投沙擁海水安得久不翻乗高慘人神文粹作䰟寒日易黄昏白文粹作枯骨貫折矢一作鐵砂中如有言萬嵗一作世􅌐山下文粹作萬古􅌐山𦵏徒悲文粹作誰知野火燔雲夣故城秋望戎昱故國惟一作遺墟在登臨想舊遊一朝人事變千載水空流夣渚鷗飛晩荆門樹色秋片雲凝不散遥掛望鄉愁鄴中行郭良驥年去年来秋更春魏家園廟已成塵只今惟有西陵在無復當時歌舞人登司馬錯故城秦昭王命錯征五溪蠻城在武陵沅江南劉禹錫將軍實集作將秦帥西南奠遐服故壘清江上蒼烟昧集作晦喬木登臨值蕭辰周覽壯前躅塹平陳葉滿墉高秋蔓緑廢井抽寒萊毁臺生穭谷耕人得古器宿雨多遺鏃楚塞鬱重壘蠻溪紛詰曲留此數仭基幾人傷送集作日逺目過故洛城白居易故城門前春日斜故城門裏無人家市朝欲認不知處漠漠野田飛草花過洛陽城于武陵古来利與名俱在洛陽城九陌鼓初起萬車輪已行周秦時幾變伊洛水猶清二月中橋路鳥啼春草生故洛陽城有感杜牧一片宫牆當道危行人為爾集作汝去遲遲蓽圭苑裏秋風起一作後平樂舘前斜日時鈎黨豈能留漢鼎清談空觧集作識笑胡兒千燒萬戰坤靈死慘慘終年鳥雀悲登故洛陽城許渾禾黍離離半野蒿昔人城此豈知勞水聲東去市朝變山勢北来宫殿髙鴉噪暮雲歸古堞雁迷寒雨下空壕可憐緱嶺登仙子猶自吹笙醉碧桃過新豐温庭筠一劒乗時帝業成沛公鄉里到咸京寰區已作皇居貴風日猶􅍭白社清泗水舊亭秋草變千門遺瓦古苔生至今留得離家恨鷄犬相聞落照明馬嵬二首李商隠海外徒聞更九州鄒衍云九州外復有九州他生未决集作卜此生休空聞虎旅鳴宵柝無復鷄人報曉籌此日六軍同駐馬當時七夕笑牽牛如何四紀為天子不及盧家有莫愁二冀馬燕犀動地来自埋紅粉自成灰君王若道堪集作能傾國玉輦何因過馬嵬南陽皮日休昆陽王氣已蕭踈依舊山河捧帝居廢路塌平殘瓦礫破墳耕出爛圖書緑莎滿縣年荒後白烏盈溪雨霽初二百年来覇王業可知今日是邱墟早發鄴北經古城聶夷中微月東南明雙牛耕古城但耕古城地不知古城名當昔置此城豈料今日一作人耕蔓草已離披狐何縱横秋雲零落散秋風集作風雨蕭條生對古良可嘆念今轉傷情古人已㝠㝠今人又營營不知馬蹄下誰家舊臺亭經故洛城王貞白下世何久逺由来仰聖明山河徒自壮周召不長生幾主任姦諂諸侯各戰争但餘崩壘在今古共傷情金陵前人六代江山在繁華古帝都亂来城不守戰後地多蕪寒日隨潮落歸㠶與鳥孤興亡多少事回首一長吁長城羅鄴當時無徳御乾坤廣築徒教萬古存謾役生民防極塞不知血刄起中原珠璣旋見陪陵寢社稷何曽保子孫䧏虜至今猶此説寃聲夜夜哭城根經洛陽有感前人一片危墻勢恐人墻邉日月走蹄輪築時驅盡千夫力崩處空遺數里塵長嘆往来經此地毎嗟興廢欲沾巾那堪又向空城過錦雉驚飛麥隴春臺城羅隠晩雲隂映下空城六代纍纍夕照明玉井已乾龍不起金甌雖破虎曽争亦知覇世才難得却是蒙塵事最平深谷作陵山作海茂宏流涕莫傷情涕一作輩同前前人潮平逺岸草浸沙東晉衰来最可嗟庾舅已能窺帝里集作室王郎還是御人家山寒花樹嗟風雨泉暖枮骸動齒牙欲起九泉㸔一遍秦淮聲急日西斜江南前人玉樹歌聲澤國春纍纍輜重憶亡陳垂衣端拱渾閑事忍把江山乞與人江北前人廢宫荒苑莫閑愁成敗終須要徹頭一種風流一種死朝歌争得似揚州新豐唐彦謙沛中歌舞百餘人帝業功成里巷新半夜素靈先哭楚一星遺火下燒秦貔貅掃盡無三户鷄犬歸来識四隣惆悵故園前事逺曉風長路起埃塵文苑英華巻三百九
