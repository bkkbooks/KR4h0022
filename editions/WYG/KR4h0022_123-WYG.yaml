body:
  text: 文苑英華巻一百二十三宋李昉等編薪火野燎賦一首燈賦一首取榆火賦一首鑚燧改火賦一首庭燎賦二首獸炭賦一首清明日恩賜百官新火賦一首積薪賦三首野燎賦并序崔湜先天二年十月僕客于郢山之胡氏胡氏之子體道之疑命與僕有忘年之厚焉常以暇日登髙縱觀見火燎于野壯而偉之因謂僕曰吾讀文多矣未嘗見有賦於是者試為吾賦之僕時負譴觸物多興援毫斐然豈近聲律其詞曰郢國東走楚藩南極江闗蒼茫千里一色在季月之窮㑹方短辰之驟匿霜皚皚而夜塗霰淅淅而朝逼百草同死萬木皆枯瞻彼灌莽鞠為榛蕪葉煩拏而積蔓枝擁腫而盤株既攘壑以擢阜亦纍塍而冐塗及乎農聚告畢澤虞縱燎逺靡不焚近無不燒灼地而山川巻色炎天而日月頽照固玉石以俱銷何芝蘭之不噍豈害物以利獲將順時而通教沃我公田之饒遂及我私之効盧城之曲客遊者聞之訊之其足觀也乃命我賔僕束吾征馬登於髙崗一瞰平野是時牧童樵豎匍匐交馳提爝秉炬斯焉取斯爾其薙棘崇藴縮茅始吹殘一作殱芳未爇短炬猶羸或蠢蠕蓊勃或宛延冶迤晶翳翳而莫振力緜緜而可覊不利進而求食疑作退每違髙而趨卑狀君子之攝勇同哲人之守雌及乎旭日照爛晴風蕭索慿燥鼔威倐忽而作光赩赩而旁翥氣曈曈而上薄翻紫焰於半天迸紅星而四落騞爾電烈雄然雷奔泉汨飋飃沙騰霧昏其始也杳然若六氣含象開混元其少進也赫焉若十日揚光登天門迫而察之既似乎驚鑣失轂駭平原逺而望也又似乎列羽攅旗馳塞垣於是走熾狂迕衝煙怒擊咆林吼叢欱谷歕壁或霍濩以燐亂見靈光殿賦乍轟嗃而揊拍􅀈如萬壑之岸崩拉若千巖之石坼經雪窟而歊靄突氷凌而沸液棲禽失竄以驚嘷伏獸迷奔而墮蹶應接不既吁其可畏能使烈士賈勇懦夫増氣開耳目之溷濁蕩胷襟之滯欷登農山之嶺既瑣瑣焉觀廣陵之濤亦復何謂及乎炎盛亢極途窮勢摧赫赫掃地㓕成煙煨何倐興而忽歇何有徃而不來無介推之生氣見韓安之死灰僕乃愀然歎息而謂胡公曰夫物忌太甚火亦如之得兹在兹失兹在兹徒觀其進德并命䇿名逄時三堦式踐六柄初持方望㑹於朝論亦謀明乎帝思居則擊鍾陳鼎出則長㦸幡旗咄嗟而嚴霜夏落顧盼而腐草冬滋道路多望塵而拜朝廷以轉目相期及乎過進受傷滿盈致缺或身辱名替或氣隳心折或朝失卿相之權或暮為匹夫之列客稍引而多去友雖求而已絶髙門翳羅雀之叢曲池淪涸魚之轍伊焰焰而不禁固炎炎而就滅聊假興於斯文庶投鍳於來哲燈賦馮真素日杲而朝隮月朧而宵出禀純陽而合彩體沉隂而盈質照未被於覆盆光豈周於暗室顧兹燈之燠炫保謙光於自薦推九華於洞房攅百枝於複殿嗟㣲瑣之陋質侍君子之髙讌光逶迤於舞袖影朦朧於歌扇絲竹夜響綺羅春絢玉階星列金缸花徧至若上客將歡中樽未䦨吐氤氲於玉宇流艷溢一作滏於金盤雜行月而浮桂乘流風而泛蘭瑟韻諠兮逾炳更籌深兮轉寒覺離筵之閴寂知别恨之良難别有蕩子遼水賤妾空閨掩錦屏而綿歎下羅幔而長啼既婵娟於永夕亦委鬱於孤棲花伴粧而共落煙遶思而俱迷况復古人處否通道居幽門庭閴寂景物清秋憤書劔之無託意年華之不留抱枯簡以銳想對寒燈而足愁及其遇曉韜暉乗昏吐耀明以利物光非自照希助美於太陽豈聨暉於庭燎雖寓詞於感物終有類一作累於體要取榆火賦以方春改火用榆鑚燧為韻王起國家布和令稽舊章候葭灰之所應取榆火之有常鑚之彌堅初若切磋之響動而愈出俄生煒煜之光火則循利人惟嚮方豈徒宣明於四海固將貽範於百王時也遲遲日昇習習風至太簇中律勾芒整轡擇木之宜順天之利歴歴初種常散莢而如錢煌煌是求必鑚木而成燧曲直有倫尋尺為珍啓炎上之氣當發生之辰佐暄妍於獻歲助煦嫗於陽春比皇明之燭幽既自邇而及逺叶時令而委照是捨舊而謀新始青林兮見採終洪鑪兮有待鬱攸之氣方騰枮槁之容不改其執熱也殊金燧之感其攻堅也非水石之鑚佩之或雜於刀礪用之以代其槐檀運手而緑煙乍起屬目而朱燄可觀餘燼收之而有耀死灰燃之而孰難束藴是繁抱燋一作憔衆夥何鎔鑄而不頼何燔炙而不可紅星忽迸不異乎種天之星朱火既非疑詎同夫敲石之火則知調其玉燭取彼白榆誠國之美利亦君之逺圖始韜光而無朕卒既燥而有孚所以微成於著有生於無豈徒嚴凝之鄉樹於北塞晼晩之景失於東隅宜乎大化不爽餘光必共莫不愛一人之大化為百姓之日用鑚燧改火賦以順兹四時取彼衆木為韻乾坤設兮其儀有二寒暑運兮其序有四聖人則天而順氣故改火而鑚燧大矣其功愽哉其利智以濟物時以作事萬人由是資生六府以之咸遂爾其始也命工徒案林麓選槐檀之樹榆桞之木斬而取也期克順於隂陽鑚而改之序不􅄽於寒燠既類夫求美玉而琢山石又似乎採明珠而剖蚌腹爾其鑚也勢若旋風聲如驟雨星彩晨出螢光夜聚赫戱鬱攸赩熾振怒青煙生而陽氣作丹焰發而炎精吐影旁射而曜威氣上騰而作苦冠五行以斯用審四時而是取司方守赤以備乎南北東西利物濟人用配乎金木水土則知火之為德候而為期火之為用無以尚兹輝赫赫而不㓕性烈烈而自馳其猛也物則望而畏矣其炎也人則寒而附之豈不以陽氣所禀厚生所資用於燧人之氏熾於火正之司及乎日月其逝春秋相推取捨有常必假於人力新舊迭用無乖於天時惟火之用其則有順其初也鑚一木而挺英其大也燒萬物而為燼豈止夫田單克燕孟明伐晉或焚舟而濟河或爇牛而破陣而已哉今我國家七德聿修九牧入貢若以之爍金為鼎可以備物致用若以之鑄金為器可以安人和衆然則鑚燧之始既已如彼利一作和用之美又亦如此濟乎今古逹乎遐邇猗歟火之不可闕也如此庭燎賦以早設王庭輝映羣辟為韻王者崇北辰之位正南面之威赫朱燎以具舉列彤庭而有輝助彼皇明可燭於夜色一作艾叶兹睿哲引曜於宵衣信乎令典有作舊章不違當其冠劔鏗鏘環珮昭晣峩峩爭赴肅肅就列聽玉漏而未央仰紫宸而初疑爇珠旒將出方熠熠以星懸綵仗徐來以疑作已煌煌而電設九儀稍布六樂爰分代晨光之昭曜雜佳氣之絪緼騰輝於鴛鷺之行若離若合委照於熊羆之旅或分一作友或羣昭昭彰彰紫氣紅光聲明燦煒百物熒煌覩炎上之有赫知臨下之無荒逺而瞻之謂焚裘之煙昭儉於晉帝迫而察之似流屋之火呈瑞於周王金缸莫齊銀燭非競長風乍拂髙焰彌盛華衮燦爛以相鮮猛虡攫拏而交映其容烈烈其明杲杲附寒者覺其春深假寐者疑其曙早則知統四海朝百辟勵夙興勤夕愓佐盛儀而有待惜流光而無斁昭其明也叶天鍳之清穆望而畏之左傳火烈人望而畏之一作望之儼然契天威之咫尺彼爟火秦舉神光漢覿何足示來儀之容呈入覲之績則知我皇立人之程為國之經旂渒渒而咸造鸞鏘鏘而可聆萬宇乂多士寧豈徒美君子之至在宣王之庭第二以天覆之廣文德以來為韻楊濤王者親政以䖍遲明於未明之前佇來朝於昩爽爰設燎以光宣爛然見舉赫以相鮮燧人載馳俾流光而燭地羣后咸造將辨物以朝天時也四照方一作干陽千官是候星尚泛於銀漢夜未窮於玉漏烘廣庭之際赩以朱陽曜紫㣲之旁皎如白晝伊有爛之通照契無私之光覆於是逮其時灼其姿影摇丹檻光動彤墀凌霜氣而炎威轉熾拂輕颷而委燼潜遺設必有因蓋欲司其明也幽無不察豈假望而畏之事光乎國典詠美乎周詩如是則稱蘭膏者自㓕影於是夜言金釭者敢呈暉於此時豈設王庭其照能廣既烈烈之旁逹不勤勤於睿想尚早斯至激環珮以鏘洋居髙匪遑疑燭宫闈而曭朗功殊甸燎事美蘭薰燃五夜而幽明已辨輝九重而鴛鷺斯分小投炬以流景嗤銜璧之呈文息其焰而恒讓朝日浮其煙而乍雜瑞雲有以啓天顔輝至德燐亂炳煥熒煌翕赩連珠户而散彩暎丹柱而混色懿夫勲烈有融用捨合理當其晦可燔爇以生譲其明可撲㓕而止原燎縱而爰疑作奚匹爟火通而何以未若兹燎之舉天庭之隈可使九門洞啟諸侯畢來獸炭賦以朱火清耀昇為韻蔣防彼好竒者巧與之俱揉煨燼兮是謀是度象猛獸兮為虎為貙將以輝爍殊觀焜燿洪爐腹翕赩以凝電口喊呀而奪朱曳尾垂頭似無心而暴物噓煙吐焰若有齒而焚軀寓形兮必果徒搏兮莫可鋸牙鈎爪乍騰倚於寒灰隅目髙􅀈載光芒於烈火所以暖虛室娯密坐稽其狀也成鷙獸之雄雄求其類也笑形鹽之瑣瑣其靜兮無營其動兮匪驚稍頓足以狼顧時迸列以豺聲煜爚交光孰辨犬羊之鞹䫜顤欲歩似懷林野之情因炎上以委質殊檻中而徇生輝兮赫兮美其容之有焯不貪不暴嘉其身之中清無野心以見誚非内熱以自照恒虩虩而出勇復煌煌而引耀威而不猛謂馴擾於中堂攫而莫前疑踡跼於餘燎襲狐貉者對之而不驚被􅗽絺者向之而伏膺佐南薰之煦嫗却北陸之嚴凝金釭近之而發彩玉壺隣之而散氷髣髴枕籍爌晃依馮類火䑕兮炎丘是託比燭龍兮崑閬斯昇此制也不唯資於翫好抑亦彰夫伎能清明日恩賜百官新火賦以題為韻謝觀國有禁火應當清明萬室而寒灰寂滅三辰而纎靄不生木鐸罷循乃灼燎於榆栁桐花始發賜新火於公卿由是太史奉期司烜不失平明而鑚燧獻入匍匐而當軒奏畢初焰猶短新煙未密我后乃降睿㫖兹錫有秩中人俯僂以聳聴蠟炬分行而對出炎炎就列布皇明於此時赫赫遥臨遇恩光於是日觀夫電落天闕紅排内垣乍歴闈璅初辭渥恩振香爐以朱噴和曉日而燄飜出禁署而螢分九陌入人寰而星落千門于時宰執具瞻髙卑畢賜降五侯以恩渥歴庶僚以簡易煖逐来命風随逸騎入權門見執熱之象閲有司識燭幽之義咸就地以照臨示廣徳之遐被於是傳詔多士同歡令晨將以明而代暗乃去故而從新均於庭燎貺彼元臣燿燿當門煙助松篁之茂熒熒滿目艷如桃李之春羣臣乃屈膝辟易鞠躬踧踖捧煦育之恩惠受覆載之光澤各罄謝懇競輸忠赤拜手稽首感榮耀之無窮舞之蹈之荷鴻私之累百然後各㸑鼎鑊傳輝膳官爭焚爐炷競爇膏蘭銷冷酒之餘毒却羅衣之曉寒方知春秋故事未逾於我周禮救災徒稱變火曷若賜於百官萬方同荷積薪賦以後來者居上為韻張敦實積薪如之何伐自中野藏用如之何俟夫㸑者當就燥而未及固不材而見捨我取彼竭在寖寖以増髙顛之倒之信多多而益寡來因髙岡之上徙殊曲突之下知附熱之足食疑貪兼㣲光而是假原乎瞻彼林薄爰發條枚綢繆既束負荷皆來始交積以發地俄重叠而如堆顧遇可期亦有含音之器操持倘用豈無束濕之材匪伐柯於林下疑設燎於庭隈入用雖慙於散木待燃未怯於死灰幸薰灼之可近唯掄擇之所裁必能揚大君之光資烹飪以調味豈徒發太守之化祈㴻雨以禳灾觀其疊迹連牆攅形内向功成執熱化歸炎上催發生於庖人廢全模於梓匠曽不知縱横長短之術成結搆髙卑之狀犬牙交列未失本枝之形蠅翼巧成猶蓄運斤之望豈徒分彊幹弱枝之義留錯節盤根之餘異掄材而晉用似橧巢而夏居幸爝火未息與獸炭焚如無之實難鑚燧者於兹待乏雖欲勿用和􅃵者焉能捨諸古人徴一作懲用賢之乖喻積薪為偶奚自我而爭先反忽焉而在後念採掇之所在顧髙下而何有倘堅貞之可求庶有心而不朽第二以帝取汲黯為韻僕少好讀書長而無替謝絶門客幽闗長閉志尋經史見汲黯積薪之言即知君臣有道之契乃廢巻憤色竦袂臨砌豈吾道業謝於古人君德慙於徃帝竟空鹽梅之用長虛舟檝之濟於是辭雲林裂荷薜赴以時貢擬先一作光秋計何歲華之不與幾山川之迢逓積薪暗入於心一作先期後來空望其他惠積薪何薪唯楚與桂其採之也翹車載馳畢搜其林壑其得之也良材盡取靡遺其巨細風塵爾勞阡陌相繼辭雲壤而百處指王城而四詣得大有之妙象同萃享之深智無怠其功有司是主雖不近於丹陛幸得貯其華宇然蓄薪而雖多非有命而不取每至膳夫興造金鼎初汲論食玉而來窺將然桂而先挹勿貴先至在其下兮必棄置於後時勿輕後來居其上兮必取用而先及此自然之理胡物情之可習已矣哉蒼苔蕪兮白露湛愁來曉夜紅顔減君若助化於聖明伏望留情於汲黯第三并序李徳裕此郡巖壑重複林麓繁盛一作榛林鬱盛樵採之子未嘗輟音徃徃㳂流而下詣余求售余因積薪于庭竊有所歎乃為積薪賦賦曰邈巖居之幽逺有楚澤之放臣方絶學以自㸑誠未暇於披榛悲顔子之飯煤感萊蕪之生塵時束藴以請火訪蓬茨之善隣乃遇樵客維舟水濵余訊之曰採樵賤業常棲隱淪詩既嘉於刈楚傳亦歎於析薪爾豈延瀬之客不取金而且貧又豈叔敖之子似好亷而苦辛何乃負擔不已其生實勤客顧余而歎曰貴則近禍富多不仁寄迹於此以養吾真善大雅之知言信蒭蕘之一作以可詢既而交加累積髙下齊均轟若井幹疊似龍鱗避氿泉而無浸生曲突而不陳一作先曲突以斯陳苟知防患之術終無焦爛之賔嗟長孺之昩道常喻此而求伸雖後來之髙處亦居上而先焚使薪為能言之物豈欲一作容入㸑而揚芬未若生幽崖之側糺芳桂之輪不近野田之燎免勞匠者之斤冐霰雪以終嵗齊天年於大椿文苑英華巻一百二十三
