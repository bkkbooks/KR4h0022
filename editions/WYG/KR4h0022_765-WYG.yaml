body:
  text: 文苑英華卷七百六十六宋李昉等編冠冕冕服議二首衣冠乘馬議一首太子服綘紗袍議一首經籍孝經老子注易傳議二首冠冕冕服議顯慶元年九月十九日長孫無忌議曰凖舊唐志通典㑹要有武徳初撰四字衣服令乘輿唐志作天子祀天地服大裘冕無旒臣無忌志寧敬宗等勘前件令是武徳初撰雖慿周禮理極未安謹按郊特牲云周之始郊日南至被衮以象天戴冕藻十有二旒則天數也而此二禮俱說周郊與衮大裘亊乃有異按月令孟冬天子始裘明以禦寒理非當暑若啓蟄祈糓冬至報天行事服裘義歸通允至於季通典作秋會要作孟夏迎氣龍見而雩炎熾方隆通典作盛如何可服謹尋厯代唯服衮章與郊特牲義㫖相協按周遷輿服志云漢明帝永平二年詔唐志作制採周官禮記始制祀天地服天子備十二章沈約宋書志云魏晋郊天亦皆服衮又王智深宋紀曰明帝詔唐志作制云朕以大冕純玉藻𤣥衣黄裳郊祀天地後魏周齊迄于隋氏勘其禮令祭服斯則百王通典炎凉無妨復與禮經事無乖殊諸本作舛今請憲章故實郊祭天地皆服衮冕其大裘請停仍改禮令又凖諸本作檢新禮皇帝祭社稷服絺通典㑹要並作黼唐志作綉冕四旒衣三章祭日月服𤣥冕三旒衣無章謹按令文是四品五品之服此即唐志作則三公亞獻皆服衮衣孤卿助祭服毳及鷩斯乃乘輿章數同於大夫君少臣多殊不可據周禮云祀昊天上帝則服大裘而冕五帝亦如之享先王則衮冕享先公則鷩冕祀四望山川則毳冕祭社稷五祀則絺冕諸小祠唐志作祀則𤣥冕又云公侯伯子男孤卿大夫之服衮冕以下皆如王之服所以三禮義宗遂有二釋一云公卿大夫助祭之日所著㑹要作服之服降王一等又云悉與王同求其折衷俱未通允但名位不同禮亦異數天子以十二為節義在法天豈有四旒三章翻為御服若諸臣助祭冕與王同便是貴賤無分君臣不别如其降王一等則又王著㑹要作服𤣥冕之時羣臣並著諸本作次服爵弁既屈天子又貶公卿周禮此文乆不施用亦猶祭祀之立尸侑君親之拜臣子覆巢設硩蔟之官去鼃置蟈氏之職雖曰古禮唐志作難施周代事不可唐志作通行是故漢魏以來通典㑹要作降下迄隋代相承舊事皆服唐志作唯用衮冕今新禮親祭日月乃服五品之衣諸本作服臨事施行實不穏便請遵厯代故實諸祭並用衮冕謹議公卿以下冕服議楊炯儀鳳二年議曰古者太昊庖犠氏仰以觀象俯以察法造書契而文籍生次有黄帝軒轅氏長而敦敏成而聦明垂衣裳而天下理其後數遷五徳君非一姓體國經野建邦設都文質所以再而復正朔所以三而改夫改正朔者謂夏后氏建寅殷人建丑周人建子至於以日繫月以月繫時以時繫年此則三王相襲之道也夫易服色者謂夏后氏尚黒殷人尚白周人尚赤至於山龍華蟲宗彛藻火粉米黼黻此又百代可知之道也今蘇知機表奏請立節文改章服奉付禮官學士詳定是非者謹按虞書曰予欲觀古人之象日月星辰山龍華蟲作㑹舊唐志文粹作繪宗彛藻火粉米黼黻絺繡由此言之則其所從來者尚矣夫日月星辰者象聖王光照下土也山者布散雲雨文粹作物象聖王澤霑下人也龍者變化無方象聖王應時唐志作機布教也華蟲者雉也身被五彩象聖王體兼文明也宗彛者虎唐志諱作武蜼也以剛猛制物象聖王神武定亂也藻者逐水上下象聖王隨代而應也火者陶冶烹餁象聖王至德日新也粉米者人恃文粹作時以生象聖王為物之所頼也黼者能斷割象聖王臨事能决也黻者兩已相背象君臣可否相濟也逮有周氏乃以日月星辰為旌旗之飾又登龍於山登火於宗彛尊神明也唐志文粹並無尊神明也四字於是乎制衮冕以祀先王也九章者法陽數也以龍為首章者衮者巻也龍德神異應時㑹要文粹作變潜見表聖王深沉逺智巻舒神化也又制鷩冕以祭先公也鷩者雉也有耿介之志表公有賢才能守耿介之節也又制毳冕以祭四望也四望者岳瀆之神也虎唐志作武蜼者山林所生也明其象也又制絺冕以祭社稷也社稷者土榖之神也粉米由之而成象其功也又制𤣥冕以祭羣小祀也百神異形難可遍擬但取黼唐志文粹並無此字黻之相背昭異名也夫以周公之多才故治唐志諱作化定制禮功成作樂夫以孔宣之将聖也故行夏之時服周之冕先王之法服乃自此之唐志㑹要作此之自出矣天下之文粹有服字能事又於是乎畢矣今表狀請制大明冕十二章乘輿服之者謹按日月星辰者已施於旌旗矣龍武山火文粹作龍山火米者又不踰於古矣而云麟鳯有四靈之名元龜有負圖之應雲有紀官之號水為盛唐志作感德之祥此盖别表休徴終是無踰㑹要作所比象然則皇王受命天地與諸本作興符仰觀則璧合珠連俯察則銀黄玉紫盡南宫之粉壁不足寫其形狀罄東觀之鉛黄無以紀其名實固不可畢施㑹要文粹作陳於法服也雲也者從龍之氣也水也者藻之自生也又不假别為章目也此盖不經之甚也又鸞冕八章三公服之者也鸞者太平之瑞也非三公之德也鷹鸇者鷙鳥也適可以辨祥刑文粹作刑曹之職也熊羆者猛獸也適可以旌武臣之功也又稱藻為水草無所法象引張衡賦云帶倒茄於藻井被二本作披紅葩之狎獵請為蓮華取其文彩者夫茄者蓮也藻者飾也盖以蓮飾水非謂藻為蓮也若以蓮代藻變古從今旣不知草木之名亦未逹文章之則文粹作意此又不經之甚也又毳冕六章三品服之者按此王者祀四望服之名也今三品乃得同王之毳冕而三公不得同王之衮名豈唯顛倒衣裳抑亦自相矛盾此又不經之甚也又黼冕四章五品服之者考之於古則無其名驗之於今則非章首此又不經之甚也國家以斷鼇鍊石之功今上以緯地經天之德漢稱文景周曰成康講八代之樂蒐三王之禮文物旣行矣尊卑又明矣天下已和平矣萬國已咸寧矣誠請順考古道率由舊章弗詢之謀勿庸無稽之言勿聽若夫禮惟從俗則命為制令為詔乃秦皇之故事猶可以適於今矣若夫唐書作乃義取隨時則出稱警入稱蹕乃漢國之舊儀猶可以行於代矣亦何取於變周公之軌物改宣尼之法度者哉謹議衣冠乘馬議文粹作朝服乘車議劉子𤣥景龍二年議曰伏以古者爰自大夫已上文粹作下皆乘車而以馬為騑服魏晉已降迄于隋代朝士又駕牛車歷代經史具有其事不可一二而言也至如李廣北征觧鞍憇息馬援南伐據鞍顧盼斯則鞍馬之設行於軍旅戎服所乘貴於便習者也按江左官至尚書郎而輙輕乘馬則為御史所弹又顔延之罷官後好騎馬出入閭里當代稱其放誕此則專車慿軾可服舊唐志作擐朝衣單馬御鞍宜從䙝服求之近古灼然之明驗也唐志作矣自皇家撫運沿革隨時至如陵廟廵謁唐志作幸王公冊命則盛服冠履乘彼輅車其士庶有衣冠親迎者亦時以服箱充馭在於他事無復乘車貴賤所行通用鞍馬而已臣伏見比者鑾輿出幸法駕首途左右侍臣皆以朝服乘馬夫冠履而出止文粹作只可配車而行今乘車旣停而冠履不易可謂唯知其一而未知其二也何者褎衣博帶革履高冠本非馬上所施自是車中之服必也韈而升鐙跣以乘鞍非惟不師古道亦自取驚今俗求諸折中進退無可文粹作凖且長裙廣袖翼如襜如鳴珮紆組鏘鏘弈弈馳驟於風塵之内出入於旌棨之間儻馬有驚逸人從顛墜遂使属車之右遺履不收清道之傍絓驂相續固以受嗤行路有損威儀今議者皆以唐志作云秘閣有梁武帝南郊圖多有衣冠乗馬此則近代故事不得謂無其文臣案此圖是後人所為非當時所撰且觀民唐志作代間唐志作今當有古今圖畫者多矣如張僧繇畫羣公祖二疏而兵士有著芒屩者閻立本畫昭君入匃奴而婦人有著帷㡌者夫芒屩出於水鄉非京華所有帷帽創於隋代非漢宫所作議者豈可徴此二畫以為故實者乎由斯而言則梁氏唐志作武南郊之圖義同於此又傳稱政宜因俗禮貴縁情殷輅周冕規模不一秦冠漢珮用捨無恒况我國家道軼百王功高萬古事有不便理資唐志作資於變通其乘馬衣冠竊謂宜從省廢臣懐此異議其來自久日不暇給未及抑唐志文粹作㩁揚今屬殿下親從齒胄将臨國學凡有衣冠乘馬皆憚此行所以輙進狂言用申鄙見謹議太子服絳紗袍議并序蕭嵩開元二十六年肅宗升為皇太子受冊太常所撰儀注有服絳紗袍㑹要作衮下同之文太子以為與皇帝所服舊唐志通典㑹要作撰同因上表辭不敢當請有㑹要有司字以易之𤣥宗令百官詳議嵩與裴耀卿等奏議之議曰臣等謹按衣服令云皇太子具服有逺遊冠三梁加金附蟬九首施珠翠黒介幘髪纓緌犀簮一諸本並無一字導絳紗袍白紗中單皂領褾襈白裙襦方心曲領絳紗蔽膝革帶劍珮綬等謁廟還宫元日冬至朔日入朝釋奠則服之其絳紗袍則是冠衣之内一物之數與裙襦劎珮等無别至於貴賤之差尊卑之異則冠為首飾名制有殊并珠旒及衣諸本並無此字裳采章之數多少有别自外不可事事差異亦有上下通服名制是同禮重則具服禮輕則從省今以至敬之情有所未㑹要通典作不敢衣服不可減省稱謂湏更變名望所撰儀注不以絳紗袍為稱但稱為具服則尊卑有差謙光成德謹議勑改為朱明服經籍孝經老子注易傳議劉子𤣥議曰謹按今俗所傳孝經題曰鄭注爰在近古皆云鄭注一無此字即康成而魏晉之朝無有此説至晉穆帝永和十一年及孝武帝太元元年再聚羣臣共論經義有荀茂祖二字一作㫤者撰集孝經諸説始以鄭氏為宗自齊梁已來多有異論陸澄以為非𤣥所注請不藏於秘省王儉不依其請遂得見傳於時魏齊則立於學官著在律令盖由膚俗無識故致斯訛舛然則孝經非𤣥所注其驗十有二條㨿鄭君自序云遭黨錮之事迯難注禮黨錮事解注古文尚書毛詩論語為袁譚一作潭非所逼來至元城乃注周易都無注孝經之文其驗一也鄭君卒後其弟子追論師注所述及應對時人謂之鄭志其言鄭所注者唯有毛詩三禮尚書周易都不言鄭注孝經其驗二也又鄭志目録記鄭之所注五經之外有中候書傳七政論乾象厯六藝論毛詩譜答臨碩難禮駮許慎異義發墨守鍼膏肓及答甄子然等書寸紙片言莫不悉載若有孝經之注無容匿而不言其驗三也鄭之弟子分授門徒各述師言更相問答編録其語謂之鄭記唯載詩書禮易論語其言不及孝經其驗四也趙商作鄭先生碑銘具稱諸所注箋駮論亦不言注孝經晉中經簿周易尚書尚書中候尚書大傳毛詩周禮儀禮禮記論語凡九書皆云鄭氏注名𤣥至於孝經則稱鄭氏改無名𤣥二字其驗五也春秋為演孔圖云康成注禮詩易尚書論語其春秋孝經則一作别有評論宋均於詩緯一作譜序云我先師北海鄭司農則均是𤣥之傳業弟子也師所注述無容不知而云春秋孝經唯有評論非𤣥之所注於此特明其驗六也又宋均孝經緯注引鄭六藝論叙孝經云𤣥又為之注司農論如是而均無聞焉有義無辭令余昏惑舉鄭之語而云無聞其驗七也宋均春秋緯注云為春秋孝經畧説則非注也謂所言𤣥又為之注者汎辭耳非事實其序春秋亦云𤣥又為之注也寧可復責以實注春秋乎其驗八也後漢史書存於代者有謝承薛瑩司馬彪袁山松等其為鄭𤣥傳者載其所注皆無孝經其驗九也王肅孝經傳首有司馬宣王之奏云奉詔令諸儒注述孝經以肅説為長若先有鄭注亦應言及而都不言鄭其驗十也王肅注書發揚鄭短凡有小失皆在訂證若孝經此注亦出鄭氏被肅攻擊最應煩多而肅無言其驗十一也魏晉朝賢論辨時亊諸注無不撮引未有一言引孝經之注其驗十二也凡此證驗易為討覈而代之學者不覺其非乘彼謬説競相推舉諸解不立學官此注獨行於代觀夫言語鄙陋義理乖踈固不可以示彼後來傳諸不朽至古文孝經孔傳本出孔氏壁中語其詳正無俟商㩁而曠代亡逸不復流行至隋開皇十四年秘書學士一作生王孝逸於京市陳人處買得一本送與著作郎王邵邵以示河間劉炫仍令校一作置又作按定而此書更無兼本難可依慿炫輙以所見率意刋改因著古文孝經稽疑一篇邵以為此書經文盡正一作在傳義一作正義甚美而歷代未嘗置於學官良可惜也然則孔鄭二家雲泥致隔今綸㫖發問校其短長愚謂行孔廢鄭於義為允又今俗所行老子是河上公注其序云河上公者漢文帝時人結草庵於河曲仍以為號以所注老子授文帝因冲空上天此乃不經之鄙言流俗之虛語按漢書藝文志注老子者有三家河上所釋無聞焉豈非注者欲神其事故假造其説也其言鄙陋其理乖訛雖欲纔别朱紫粗分菽麥亦皆嗤其過謬而况有識者乎豈如王弼英才雋識探賾索隠考其所注義者為優必黜河上公昇王輔嗣在於學者實得其宜又按漢書藝文志易有十二家而無子夏作傳者至梁阮氏七録始有子夏易六卷或云韓嬰作或云丁寛作然據漢書藝文志韓易有十二篇丁易有八篇求其符㑹則事殊隳刺者矣夫以東魯伏膺文學與子游齊列西河告老名行将夫子連蹤而嵗越千齡時經百代其所著述沉翳不行豈非後來假慿先哲亦猶石崇謬稱阮籍鄭璞濫名周寳必欲行用深以為疑臣竊以鄭氏孝經河上公老子二書訛舛不足流行孔王兩家實堪師授毎懐此意其願莫從伏見前前一作去月十日勑令所司詳定四書得失具狀聞奏臣尋草議請行王孔二書牒禮部訖如将為允請即頒行謹議一作皆唐㑹要同前司馬貞議曰今文孝經是漢河間王所得顔芝本至劉向以此本叅校古文省除繁一作煩惑定為此一十八章其注相承云是鄭𤣥所注而鄭志及目録等不載其一無此字故徃賢共疑焉唯荀㫤范曄以為鄭注故㫤集解孝經具載此注而其序以鄭為主是先逹博選以此注為優且其注縱非鄭氏所作而義㫖敷暢将為得所其數處小有非穏寔亦未一作非爽經傳其古文二十二章元出孔壁先是安國作傳縁遭巫蠱代未之行荀㫤集注之時尚有孔傳中朝遂亡其本近儒欲崇古學妄作此傳假稱孔氏輙穿鑿改更又為作閨門一章劉炫詭隨妄稱其善且閨門之義近俗之語非宣尼之正説案其文云閨門之内具禮矣乎嚴兄妻子臣妾一作嚴親兄妻子臣繇百姓徒役也是比妻子於徒役文句凡鄙不合經典又分庶人章從故自天子已下别為一章仍加子曰二字然故者連上之詞即為章首不合言故是古文旣亡後人妄開此等數章一無此字以應二十二章之數非但經文一作久不真抑亦傳習淺偽至一作又注用天之時因地之利其畧曰脱衣就功暴其肌體朝暮從事露髪塗一作徒足少而習之其心安焉此語雖傍出諸子而引之為注何言之鄙俚乎與鄭氏之所云分别五土視其高下高田宜黍稷下田宜稻麥優劣懸殊曽何等級今議者欲取近儒詭説殘經缺傳而廢鄭注理實未可望請凖式孝經鄭注與孔傳依舊俱行又注老子道德經者實謂𤣥言注家多罕窮厥㫖河上公盖慿虛立號漢史實無其人然其注以養神為宗以無為為體其詞近其理𢎞小足以修身潔誠大足以寧人安國且河上公雖曰注書即文立教皆體指明近用斯可謂知言矣王輔嗣雅善𤣥談頗探一作深道要窮神用乎一作於槖籥守静黙於𤣥牝其理暢其㫖微在於𤣥學頗是所長至若近人立教一作徴修身𢎞道則河上為得今請望王河二注令學者俱行又案劉向七畧有子夏易傳但此書不行已久所存者多失真本又荀朂中經簿云子夏傳四巻或云丁寛所作是先逹疑非子夏矣又隋書經籍志云子夏傳殘缺時六巻今二巻知其書錯謬多矣又王儉七志引劉向七畧云易傳子夏韓氏嬰也今題不稱韓氏而載薛虞記又今秘閣有子夏傳薛虞記其質粗畧㫖趣非逺無益後學不可将帖正經謹議一作皆唐㑹要文苑英華巻七百六十六
