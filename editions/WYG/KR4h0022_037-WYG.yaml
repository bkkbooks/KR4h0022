body:
  text: 文苑英華巻三十七宋李昉等編水六浮漚賦三首潢汙賦一首尺波賦一首溺賦一首浮漚賦崔根總目作損仰參造化之理俯察宇宙之功既希㣲而不測亦要妙而無窮至如殷雷發谷激電流空石鷰飛而迎雨銅烏振而驚風已而懸溜不止空庭積水對霶􅑛而厯覽見浮漚之邐迤瑩映澄澈内明外羙倐徃忽來乍㓕乍起含巻舒之度得行藏之軌其柔也則隨波以為心其剛也乃觸物而忘已諒潜運之恍惚孰能察其終始浮漚之義大矣哉俯而觀之錯落煌煜若明珠之出合浦遠而望之旳􅀈和一作旁羅若衆星之列長河爾其因水發色以空成相懷清潤之秀氣負圓通之雅量信天澤以成姿豈人圖而為狀且夫勢有萬端形無定質或繁小而爭湧或希大而間出從下流而守謙託上善而非溢冀輝彩於當年故韜光于晴日第二楊烱在霖霪之可翫唯浮漚而已矣况曲澗兮増波復坳堂兮漲水霤滴瀝兮行注階潺湲而浪起寸歩百川咫尺千里於是乍明乍滅時行時止排雨足而分規擘波心而對峙輕盈徘徊容與庭隈狀若初蓮出浦映晴波而未開又似繁星落曙耿斜漢而將廻合散消息安有常則倐來忽徃不可爲象雨宻稠生風牽亂上若乃空濛采褰浩汗浮天流平舊沼𣲖溢新泉分容對出吐映均鮮觸流萍而欲散礙浮芥而還連光陵虚而半動影倒水而分圓始參差而別趣終宛轉以同沿歴亂踟蹰漂沸縈紆細而察之若羙人臨鏡開寶靨大而望也若馮夷剖蚌列明珠逐風波而澹泊乃變化而須㬰迹均顯晦妙合虚無同至人之體道亦隨時而不拘夫其得坻則止乘風則逝處上下而無窮任推移而不繫似君子之從容常巻舒而不滯故其在陽則隠在隂則出泄泄悠悠匪徐匪疾固自然以見體託行潦以凝質類逹人之修身故不欺於暗室蕩薄畎澮鼔舞洲渚其生兮若浮其居兮若旅雲銷雨霽寂無處所唯斯物之靡依獨含情而應機暫假有而示潔終淪空而匿暉苟無心以自累夫何適而有違第三鄭太昊粤若雲横於斗月離於畢石鷰初化泥牛未失重隂潤礎看㴻雨而交飛行潦浸階見浮漚之亂出爾其合散無常漂蕩自然形色虚㓗表裏澄鮮似珠胎之出漢若星象之浮川拂還風而獨轉偶到集作倒景而雙圓夫其仁也不輕蛙黽之穴夫其勇也不怯蛟龍之泉觸奔槎而􅃍碎近浮藻而還連觀夫遶砌潢汙廻塘緑水長檐連屬通溝表裏排亂滴而攅生逼潨流而細起乘川則逝遇坎則止雖有近於泥沙信無累於􅅝滓既生既㓕如幻如夢體象明媚上下冲融徘徊未息展轉何窮識盈虚之不定知造化之皆空則知生也若浮榮兮如寄秉隂守不競之德就下保撝謙之義清虚自若有高尚之風隠顯無恒有行藏之智別有縉紳公子思浮思沉乘時趨勢佩玉鏘金見浮漚之形象息狙詐之機心况乎失路書生懷憤胸臆規術恬静節行孤直覺萬化之俄頃知千齡之瞬息能不操紙殫毫叙浮漚之德潢汙賦并序錢起潢汙水之㣲也汲引之際人皆捨諸唯有德者知之薦鬼神以昭忠信則百川雖廣莫逮其用焉喻士先沉後伸放疑作於知己也辭云潢汙之水天實降之雲散雨絶淵然在茲胡禀柔而成性能處下以任時善乎濁而徐清貯之將緑棄捐池沼之外隠翳林臯之曲接九派而何勞方一勺之自足至若雲霽地表霞開水隂乾天可鑒物象是臨山曉映而色近雲高浄而影深險阻不行芥舟寧覆盈滿知節鴻毛匪沉産蘋蘩同南澗之有藻聚飛動異舊井之無禽斯其善利也乃至人之用心且夫出山者泉歸海者川汲引無絶隄防在焉彼苞蕭屢浸束楚不傳唯潢汙也獨此晏然其明若昧其壅若退竭而自中盈不侵外天資其潔德維貫神明人棄爾㣲道不行畎澮夫事有小而可廣運有塞而必通當休明之聖代徵泂酌之古風彼湛然以虚淨盍薦之於王公俾爾忠信昭明有融俾爾嘗祀景福延洪斯則椒漿與桂酒可以比美而同功尺波賦以水澹幽色風初起波爲韻錢起㶑灔駭水奫淪始波引分寸之餘風從一勺激尋常之内無爽盈科勢將坌湧迹異盤渦蹙跬歩以無數蕩分隂而自多觀其日色遥臨風生未已圓規可驗疑沉璧之舊痕前後相侔若浮書而競起跡疊相近萍縈有餘促漣漪之散漫擁跳沫以虚徐流脉中移類蠖影求伸之際浮光上透若雪華呈瑞之初湧以回囘馳乎澹澹始羣分而下瀬將積少以習坎生而有凖動必若浮如投石以花散等覆杯而迹幽影不過於布指光遽溢乎寸眸洶洶安翔似欲將乎斗注沺沺増繞如潜運以環周無驚川后未發陽侯當澹以成之寧同瀑怒謂小爲貴也爰進涓流淺漾風光輕蟠水力寸長所及知文在其中方折是為見動不過則散或往之浮彩轉初盈之净色將潜寗戚之鯉半未能容若流張恊之薪重而纔得汾濕若沖溶滴相通未合流於油岸方鼎沸於汾風礐石愈蹙淪池不融是將寛其泓量誠有重於泉蒙濩也如委淪然可視茲延袤以上騰匪徒旋於中沚翠㶑交映璇源共紀將不退於大成固在乎有便於風水溺賦楊䕫𤣥㣲先生澹慮澄情樓倚岳陽湖觀洞庭渺漫兮若與乎天平遠指君山一螺黛青遥覘湘浦一片雲明輕檝巨舸載縱載横或楚歌以應棹或漁唱以齊征雖云吳楚之濶於焉瞬息之程俄而濃雲興猛吹作訇訇兮雷霆零零兮雨雹波勢兮奔騰波聲兮渀瀖或若積雪或若裂壑樓岌嶪兮地如落欹檣側㠶倐出欻入煙馳霧驟神號鬼泣忽翼舉忽蟲蟄波而觧浪而傾者亦一瞬而俱及雨既霽風亦止呀呷餘波振蕩未己俄有呈其板而流者碎其篷而飄者彼緘縢之篋扃鐍之櫃委翳波間罔知所秘或一竹以脱命或舉族而咸墜沿汀遶濱零落在地𤣥㣲子指而泣曰其嗜利則孟子所以惡交爭也其欲速則仲尼所以悲不逹也孰有輕命若糞重賄如山用一縷無繼之力渉萬仭不測之川踐險冒危既蔑履氷之誡殞身覆族空衘没齒之寃𢎞農子聞其言同其歎此則以江以湖没不可援今復有非波非濤溺不可筭窺之則茫然無岸由古及今陷者如貫𤣥㣲子矍然其詞泫然其悲何陸之爲溺而不維不持紛吾緒而亂余曲爾其辨而折之乃曰麴蘖是惑沉􅊺無時混淆先後顛倒矩規唯誕是習莫禮是持散髪躶體以遨以嬉汨親踈兀尊卑情所至則至意所爲則爲可慶者忽其慶可悲者忘其悲龍章莫保鳯德何衰光逸則狗竇求入伯有則壑谷忘歸子反不謀於軍前敗非天作正平不拘於席上禍乃自貽但驕其氣益亂其機隋兵濟江玉樹方舞越人入户金斚猶飛所以爲酒之溺也至若貝含其齒雲聳其鬟苞藏其戾矜持其妍攻巧若拙移曲成端爲媚斯極荷寵益堅陳靈以衵服戯朝俾君臣受禍驪姬以歸胙獻毒使父子成寃齊莊以盗室取斃郄犨以奪儷不全此所以爲色之溺也至若伊義莫顧唯賄是務以譎以囘不軌不度溝壑難滿錐刀必聚莫興知足之慙蔑有惡盈之懼其帑溢其帛蠧其貫朽其粟腐營營尚恐其力窮汲汲不思其日暮復有白版爲侯黄金作輔南宫變屠賈之行西圓疑作園成闤闠之路求金求劔曽無就木之心鬻爵鬻官但欲齊天之富壬夫死而方覺雍子戮而未悟此所以爲貪之溺也至若專國之柄操天之軸任其情性隨其嗜慾其喜也沉者浮其怒也贏者縮易否為臧化直為曲雖山重而可廻雖海深而可覆其門若市其帑如谷背者斥向者録言張其機笑孕其毒譽之則銖而爲鈞訾之則歌而爲哭屏内外之氣側天下之目稽其莽卓考其産禄謂兵鈐之在已將神器之有屬國璽行竊弄之手宫闈開盗視之目自謂其投葢之力可圖殊不知燎原之火難撲既衆叛而親離竟噬臍而齧腹此所以爲權之溺也是四者匪横其流匪駕其舟有溺者孰究其由其毒也必漬於骨髓其痛也亦甚於戈矛雖扛鼎之力觸山之酋亦不能杼之以出而况於纎離之儔哉𤣥㣲子乃曰始吾觀渉水而溺則怳然而内惕今復聞不波而沉則瞿然如大敵且酒不可甘甘之則沉吾命酒曰甘波色不可愛愛之則溺吾命色曰愛河衣所以被體食所以充腸苟朝晡而不匱寒暑而有裝豈假積粟於廪儲貨於囊且藥所以攻百疾百疾蠲而藥不止者鮮不及其殃吾命財曰藥江士患不逹之名不立之身苟逹苟立在守其眞何必競升沉之路爭輕重之鈞狼子野心暱之害人吾命權曰狼津噫生於世不溺於四水者吾謂夫顔閔之倫文苑英華巻三十七
