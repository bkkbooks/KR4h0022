body:
  text: 文苑英華卷五十六宋李昉等編禋祀三迎長日賦二首禋六宗賦一首祠靈星賦一首祀后土賦一首大蜡賦一首焚柴賦一首雍畤舉爟火賦一首郊特牲賦一首迎長日賦以三王郊禮日用夏正為韻栁宗元惟饗帝於事天必推䇿而迎日寅方肇建候啓蟄以展儀夘位將初爰用牲而恊吉送烈烈之凝氣導遲遲之陽律猶分可愛之輝式停寅賔之質稽之虞典期匪疾而匪徐行以夏時契惟精而惟一職在馮相事傳小正符上春以備儀必修其始先仲春而有事故謂之迎時也淑景初一作方延幽陽潛啓當四時之首位用三代之逹禮探賾索隐得郊祀一作禋之元辰極徃一作數知來正邦家之大體事冠前古儀標後王皮弁乍臨土圭之影猶積泰壇既罷玉漏之聲潜一作漸長變熙熙之純曜流杲杲之晴光璧彩一作影始融麗景欲一作才凝於城闕輪形尚疾斜暉未駐乎一作於康荘是知迎長一無此字日之儀實王心之四字一作聖王二字所共兆南郊之正位乗陽事之所用故可以知上下之分際見天人之交動浮晨光於爼豆散㣲照於苞茅周流金石暉照陶匏異乎天紀不修秦伯尚矜於泰畤日官失職晉侯徒繼乎夏郊于以迎之則無違一作為非者委照將久豈一作寕三舎之足慿延光可期胡再中之云假自然應以繁祉錫之純嘏禮儀允洽於一作于神人正朔克周於戎一作夷夏今我后再新古禮一作典與天地相參應戩榖之宜受之千億奉郊祀之報至於再三然則迎長日恭祀事並虞夏而何慙暉照一作輝映第二同前韻李程氣之至兮景之長郊之初兮國之陽將有事於新日以無忘乎舊章太史先期而以告天子齋心而有常且曰經紀不忒乃貞明而成象疾徐中度胡躔次而可量俟一人天臨而斯出俾羣后景從而有光可以冠千古之嘉禮軼三代之盛王然後五輅乃駕六龍是驂迎炎精表著明於君象就陽位乃展禮於國南斯可以人詠明哉且知配虞帝之二工升歌也奚獨美文王之三且天有兩曜兮日無其匹域有四大兮王居其一將報本而郊天因宣明而主日大司徒執圭以表位羣有司奉璋而有秩羲和御之而有倫疇人則之而無失運行之次望遲遲以就陽寅賔之時見杲杲而已出始也戒職司明國體卜郊之典無闕迎日之義爰啓受命於祖作龜於禰是皆匪愆于儀未有不謹於禮禮容必呈祀事孔明迎扶桑之初乃實柴而薦敬因吉土之兆同掃地而貴誠信列辟之盛節俾歴代而作程魏則朝於獻嵗夏則置乎小正今則聽封人之善祝採從臣之嘉頌時令空美於風行帝力孰知其日用人悦於下禮行於郊不獨服尚𤣥素器遵陶匏是知禮之設也教之大者彼孔稱從周殷因於夏曽未若我后敬授人時而天錫純嘏禋六宗賦以享神精潔四氣叶和為韻王起王者稽祀典竭至誠禋六宗而欽若致四海之和平宗者以尊為稱禋者以敬為名爰是崇而是長必惟一而惟精則四序三光運有恒度水旱寒燠災無所萌上乃擇元辰留睿想萬樂備百禮徃圭璧陳爼豆敞靈壇嶽立擁千官而式瞻天仗星陳覩一人之可象玉食皓皓而方積珠旒穆穆而斯仰觀乎薦在有翼而有嚴貴其誠故来格而来享原夫禋于三辰天一作六宗必降嘉薦是列歆之以䖍恭奠之以豐潔使兩曜合璧不為薄蝕之虧五星連珠詎有欃槍之孽其禋于四時也將以恤蒸人感明神使還周克序鱗次相循攻一作攷之于葭灰不愆于候調之以玉燭無奪其倫其祭寒暑也將以周萬類均二氣時當𤣥律無堕指以成災節變朱明曷流金之足畏其祭水旱也則天無作孽人獲大和祅魃不生乎災熾商羊自屏於滂沱相彼六宗皇聖是接戬榖降而肸蠁文物紛其暐曄聆夫管磬知律吕之克諧列彼苾芬信幽明之允叶然後一徳不二三皇可四地發嘉生天呈上瑞授百神之職興兆人之利君子謂大舜之克禋唯我皇之能􅊀祠靈星賦以工奏雲漢祈彼嘉榖為韻失名祀有典兮惟敬天垂象兮在崇奉靈星之徳祈戩榖是豐乃命宗伯詔樂工徵舊典於祝史答嘉貺於𤣥穹以夫靈者降休祐星者燭宇宙况出應天田見彰農候足使野夫致享祠官敬授禮而有異豈雩禜之同登樂則必倫乃絲簧之並奏於是騐星紀稽帝文覩一作觀農祥之晨正彰土膏之脉分奠玉杯於青帝用潔牲於白雲乃啓雲壇爰登玉瓉拜天貺之昭彰見星光之照爛列黍稷而馨感明靈奏和樂而聲聞霄漢瞻彼太極載乎紫微神之至兮雲映曖靈之降兮日揚飛列綴兆於峻舞徵歌頌於絲衣禮成文兮樂終變神胥樂兮儼將歸雕豆玉觴自殊器於宗祀青主紺席乃叶禮於禳祈懿夫髙祖建始福禄奚委禮用太牢名存漢氏皇家復位樂器是備一作庀異晉皇之配饗因南郊而道弛禮容盛兮在今時祀豐兮邁彼且夫與衆祈禱曷不稱嗟溥天之恵罔不休嘉豈比夫賈生弔屈空祀三閭之水漢皇幸蜀疑虚禱萬里之沙者哉是知我禮有肅苾祀不黷告農可以勸躬耕祀聖可以厲浮俗固宜不害三時方成九榖然後覩觀澤之禮承届天之福庻慿之而多祐覩秋成於西陸祀后土賦張餘慶粤若盛唐勃成天光禮樂克備典謨允􅆇固以轥轢軒昊跨躡堯湯豚魚信行於㝢縣鵷鷺才擢於巖廊至于我后招賁林藪即金鏡於南面運璿樞於北斗㧾四靈為禎祥以萬物為芻狗將以天之靈命纉乎已躬國之盛烈在祀與戎乃詢訪太史㧾攬英䧺金門曉闢御路横通隔嵗梅花氛氲於帳殿迎春楊栁摇曳於離宫戈横鐡騎旗掣長虹叠靈鼓於流水引繁笳於朔風威單于而過代比祠后土而幸河東故致䖍誠揀吉日甸師清野宗伯奉秩端旒垂綖左輔右弼修五禮之大道酌千靈之故實綵幣藻耀層壇崷崪黄琮展前以備陳白茅有藉而間出𤣥酒式降以尚本瑞珪不􅅣音篆而貴質繁一作盤纓藻帶燦爛於祭容孤竹雲和鏗鏘於聲律鬱人獻爵司干授器據青野之雕阜肅黄祗之神位鼎氣歊雲神光燭地魏珠映天子之輦汾鴈入大夫之贄薰風偃草以浹洽遲景暄空而明媚河圗所以無隠天寳由其不秘於是湛露沕潏羣后徜徉接武委質述職勤王神具醉止降福穣穣包六合而布化横萬乗以騰芳吾君終以守謙静重賢良其儀不忒其言有章豈比夫魯蜡有乖仲尼聞而發歎漢祀多僻匡衡陳其用祥顧惟不才宅生帝道願候雲亭之事素懐封禪之草儻中人之見談賦上林之振藻大蜡賦以暮冬律變新陽載動為韻楊諌大蜡之祭兮所以饗田神賞農務隂律窮𤣥冬暮星迴於舊列日極於餘度必也介僎謀牲牷具狐裘以黄皮弁以素盖欲息田夫而褒嵗賦夫搜索之謂蜡閉藏之謂冬其索也可以舉羣祀其藏也可以務三農欲碩苖而不害則迎貓暨於田䑕俾昆蟲之無作則祭坊與夫水庸以夫月建丑日在戍磔犧牲之體所以尚其腥登水草之菹所以貴其質詠豳詩以合雅擊土鼓以應律瑞穣穣芬苾苾百日之勤一日之薦或酧或酢既騰觚於無筭為宫為徵方播樂於六變命清祀兮在殷復嘉平兮處秦繄率仁而終義實革故而迎新樂舉斯陶嗤子􅀈疑作貢之来覿禮成而出美仲尼之為賔故聖人之舉事也務於崇勸戒敦否􅆇樹之瓜華告多藏者必覆致乎女鹿示不徳者斯亡豈唯乎其儀抑抑其樂洋洋未見陽字官韻是以伊耆之禮不易大羅之職有常嗣嵗將興或祈榖于上帝人才不匱或觀政於四方則知徳厚者必祀功髙者必載司嗇之祐維永瑞於我唐先惞之神豈獨見於前代故曰蜡也移萬人登百種可以志隂陽之變動焚柴賦以報天享日精意蠲潔為韵何迥於穆聖君功髙徳奥利澤能廣靈祗必禱溢周夏之珍符繼三五之徽號順甿心而展禮擇良日而大報所以后土祈榖圎丘祭天雍雍濟濟翼翼乾乾建朱干而日曜張翠帳而雲懸皇帝嚴法駕而戾止詔羣官而萃旃藉白茅以顒若望青壇而仡然我君精潔我后孝享容衛翩翻威儀森爽就陽之位斯在薦帝之儀罔失陶匏必成牲玉惟栗風伯戒道𤣥㝠司律惟天命子之辰惟帝告天之日靈神以之保艾昊穹以之宥宻殽核洋溢鼓鐘鏗鍧三靈同感庶物皆精故祭者修禮之義柴者告成之意燎焜煌而上熏煙勃窣而傍駛朝野美乎聖澤華夷賛乎能事恵浹洽於煇胞恩汪濊於民吏則知柴而致福祭示吉蠲效周室之為理望虞家之有年福福應兮飛熖神神来兮駕煙珪組既陳酒醴皆潔繼功前王垂裕來哲化成而萬嵗無疆禮畢而四方有截諒夏郊之義舉媿序能之筆拙雍畤舉爟火賦以享神之期候此為節為韵王起䧺䧺雍畤兮神州之壌赫赫爟火兮橋衡之象所以郊祀克明所以照臨是仰成形中度知有要而有倫燭幽以時表來顧而來享肇秦帝而有制洎漢皇而不爽伊昔克修羣祀大合百神聲明雲集文物星陳仰珠旒則嚴其待曙聽玉漏則闇然未晨晦威儀之秩秩迷爼豆之莘莘張華燈而其光不逺秉神燭而其明不均則雍畤之舉爟火也莫之與倫既而亭亭有掲燄燄方爇于以觀百里之備于以昭五夜之節拂瑞雲之表乍疑乎燭龍方來入靈壇之中又似乎神光不絶由是皚皚炳映盞斚罇彜咸若光而若滅罔顛之而倒之燿爚無替熒煌自持在質明而有譲當委照而無私殊太叔之于田盤遊是舉異齊侯之設燎朝㑹為期薦嘉者于焉仰止執熱者難乎嚮邇電延而自西自東星繁而一彼一此比王屋之火空際不流似陳寳之光祠中乍委則雍畤之義斯焉取斯爟火之作為於有為照苾苾與芬芬自明無黷燭蹌蹌與濟濟方表有儀故將崇其明祀立我洪規豈徒散孤光於地表煽丹熖於天垂而已哉國家祀典式崇舊章必授思宅中而圖大雍畤方𢎞法居上而克明爟火斯候足以掩前王之純懿諒介福而何究郊特牲賦以繭栗之㣲貴乎誠慤為韻韋充天實至尊物難致味所以郊祀之展禮惟重牲犧之用犢有為故能昭徳馨導生氣叶上帝精明之感必因誠以告䖍示下土恭謹之心有以小而為貴由是選才斯始禀命有歸固資於至敬之薦不在乎充身之肥盡黒黄蒼赤之形舉書其數用齒角皮毛之狀具體而㣲苟山川之不舍曷天地以相違當其大禮既陳泰壇斯踐形殊歸獸角若獨繭羈縻忽至􅀄無悚于肇牽觳􅑌方來終有悲於餘喘肅然之内蠢爾如生委質未分於天理亡軀終狥於物情足以上祗明命下逹精誠乾乾之意不虧因必之於心敬戢戢之儀斯異亦何假於楅衡可以薦明時可以撰吉日天子以之合禮而具備有司用此陳儀而罔失殺身之際雖有補於馨香登爼之時固無慙於榛栗斯可以見至徳在斯入用惟時實禮之大者在信以成之介葛雖聞於早辨荘周誠得而興悲是故聖人制禮作樂必資後學分隆殺於輕重之心辨等儀於長短之角彼賔客者滿尺宗廟者盈握曽何足以表於齋荘固未可以彰其忠慤方今四海既定小信咸孚郊天祀地之禮將展博碩肥腯之用奚無所以下臣稽首而歌曰惟吾君之徳也與天地之巍乎文苑英華卷五十六
