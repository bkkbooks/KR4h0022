body:
  text: 文苑英華卷六百十四宋李昉等編邉防一出師表一首請罷姚州屯戍表一首爲喬補闕論突厥表一首諫鑾駕親征表二首爲清邉大緫管建安王奏失利表一首幽州論戎事表一首并州論邉事表一首出師表後魏髙歡普㤗元年臣某言故天柱大將軍榮援立聖明中興寳厯而屠戮衣冠升降自已其勲雖大厥咎亦深以過比功則功不補過永安之末國祀權移疑貳已彰遂加大戮君猶天也理絶讐怨而世隆等鳩集犬羊傾覆京邑大行幽執酷害賊首且自立六王擅相署置或權重上將或官兼宰相輔滛貪亂肆行兇惡賣官鬻獄専貨求財政令無恒朝改暮易雖復南山之竹豈可盡言陛下龍德先一作光天飜飛紫極斯乃宗廟之威靈億兆之念望而世隆等沮疑衆安忍自以爲功帶甲勒兵唐突宫省篡逆之漸昭然有徴臣本無勲庸濫叨非㨿位班台鉉爵等藩王質薄任隆憂深責重常恐顛沛負之無力主憂臣辱先達明規主辱臣死微臣宿志况擁百萬之師罄四海之銳而坐觀成敗不恤國家之難哉方將㧾馭大軍弔民伐罪其指麾形勢備在檄書若世隆等退出藩維奉辭廷闕臣便按甲休兵一無所預事畢之後泥首歸愆矯命專征分甘鈇鉞若固執逆謀敢拒義師者當戮及妻孥罪延三族伏願陛下􅅏神省察照臣丹欵大勲克舉拜手有期心馳象闕載懐罔極請罷姚州屯戍表武后張柬之神功初臣某言臣伏聞一作竊按姚州者古哀牢之舊國絶域荒外山髙新唐書作阻水深自生人以來洎於後代舊唐書作漢不與中國交通前漢唐蒙開夜郎滇莋而哀牢不附至光武末舊唐書作季年始請内屬漢置永昌郡以統理之乃收新唐書作賦其塩布氈罽之税以利中土其國西通大秦南通交趾竒珍異寳進貢嵗時不闕劉備㨿有巴蜀常以甲兵不充及備死諸葛亮五月渡瀘收其金銀塩布以益軍儲使張伯岐選其勁卒利舊唐書作搜兵以增武備故蜀志稱自亮南征之後國以富饒甲兵充足由此言之則前代置郡其利頗深今塩布之利舊唐書作税不供珍竒之貢不入戈㦸之用不實於軍新唐書作戎行寳新唐書作賨貨之資不輸於大國而空竭府庫驅率平人受役蠻夷肝腦塗地臣竊爲國家新唐書作陛下惜之漢以得利旣多歴博南山渉蘭倉水更置博南哀牢二縣蜀人愁怨行者作歌曰歴博南越蘭津渡蘭倉爲他人蓋言舊唐書作譏漢貪珍竒塩布之利而爲蠻夷之所驅役也漢獲其利人且怨歌今减耗國儲費用日廣新唐書作引而使陛下之赤子身膏野草骸骨不歸老母㓜子哀號望祭於千里之外於國家無絲髮之利在百姓受新唐書作蒙終身之酷臣竊爲國家痛之往者諸葛亮破南中使其渠率自相綂顧不置漢官亦不㽜兵鎮守人問其故亮言置留兵有三不易大率舊唐書作意以置官夷漢雜居猜嫌必起留兵運糧爲患更重忽若反叛勞費更多但粗設紀綱自然久定臣竊以亮之此策妙得覊縻蠻夷之術今姚府所置之官旣無安邉静冦之心又無葛亮且縱且擒之技惟知詭謀狡筭恣情割剥貪叨刼略積以爲常扇動酋渠遣成朋黨折支諂笑取媚蠻夷拜跪趨伏無復慙恥提挈子弟唱舊唐書作嘯引兇愚聚㑹蒲博一擲累萬劔南逋逃中原亡命有二千餘户見散在此州專以掠奪爲業姚州本龍朔中武陵縣主簿石子仁奏置之後長史李孝讓辛文協並爲羣蠻所殺前朝遣郎將趙武貴討擊及蜀兵應時破敗噍類無遺又使將軍李義㹅等往郎將劉惠基在陣戰死其州遂廢臣竊以諸葛亮稱置官留兵有三不易其言遂集唐書作乃驗至垂拱四年蠻郎將王善寳昆州刺史㸑乾福又請置州奏言所課稅自出新唐書作支姚府管内更不勞擾蜀中及置州後録事叅軍李稜爲蠻所殺延載中司馬成琛奏請於瀘南置鎮七所遣蜀兵防守自此蜀中騷擾于今不息且姚府緫管五十七州巨猾遊客不可勝數國家設官分職本以化新唐書作正俗防姦無耻無厭狼籍至此今不問夷夏負罪並深見道路刼殺不能禁止臣恐一朝驚擾爲禍轉大伏乞省罷姚州使𨽻嶲府嵗時朝覲同之蕃國瀘南諸鎮亦皆悉廢於瀘北置關百姓自非奉使入蕃不許交通來徃增雋府兵選擇清良宰牧以統理之臣愚將爲穏便爲喬補闕論突厥表陳子昂臣某言臣以顓蒙幸叨近侍陛下不以臣不肖特勅臣攝侍御史監護燕然西軍臣自違闕庭渉歴秋夏從軍集作徙居邉徼無尺寸之功臣識闇劣孤負聖明然臣久在邉隅夙夜勤灼莫不以蕃事爲念比按察已北突厥離亂事迹集作俾按察之此以突厥離亂事迹叅驗委曲窮問徃來竊有以得其真莫不自爲鯨鯢逓相吞食流離殘餓莫知所歸臣誠愚不識事機然竊以徃古之變考驗於今乃知天亡凶醜之時是陛下收功之日然臣聞之難得而易失者時也易遇而難見者機也聖人所貴者去禍於未萌今陛下體上聖之資開太平之化匈奴爲中國之患自上代所苦乆矣今天降其災以授陛下萬代之業在於今時臣請以秦漢以來事迹證明之伏願陛下少㽜天聽尋繹省察天下幸甚臣聞始皇之時并吞六國雄制集作制有天下按劔叱咤八荒奔馳然匈奴彊梁威不能伏集作服牧馬河内以侵邉疆始皇赫然使蒙恬將四十萬衆北築長城因以逐胡取其河南之地七百餘里當時燕齊海岱嬴糧給費徭役煩苦人以不堪故長城未畢而閭左之戍己爲其患二代而亡莫不始於事胡也至漢興髙帝受命率羣雄乗利便以三十萬衆困集作窘廹白登七日被圍僅而獲免自是歴吕太后至孝文帝單于桀鷔益陵漢家文帝徒以遜詞致獻金帛但求其善和而已不敢有圖賈誼所以哭之痛文帝以天下之盛而卑事戎狄以倒懸天下也至景帝時邉受其患於是漢武踐阼以承六代鴻業屬乎文景𤣥黙之化海内乂安太倉之粟紅腐而不可食内府之錢貫朽而不可校財力雄富士馬精彊忿匈奴之驕慢將報先帝之辱遂使王恢韓安國將三英華作四非十萬衆以馬邑誘單于師出徒費竟無毫髮之功一作利於是大命六師專以伐一作擊胡爲務首尾二十餘年中國騷然大受其弊至於國用不足軍興不給租及六畜筭及船車盗賊群興京師亂起竟不能制單于之命一日而臣服之漢室衰殘幾自覆社稷也故漢武晚年厭兵革之弊廼下哀痛之詔罷輪䑓之遊封丞相爲冨人侯將以蘓中國也至宣帝代罕復出師屬匈奴數窮天降其禍虚閭權渠單于病死右賢王屠耆堂代立骨肉大臣自不相服又立虚閭權渠子爲呼韓邪單于擊殺屠耆堂諸名王貴人各自分立爲五單于更相擊以至大亂殘害死者計萬億數畜牧集産作耗减十至八九以饑饉集作餓相燔燒以充集作求非食於是寄命無所諸名王貴人右伊秩訾且渠當户以下將衆集作兵五萬稽首來降於是北方晏然靡有兵革之事直至哀平之際邉人以安臣竊以此觀匈奴之形察天時之變盛衰存亡之機事可見也然則匈奴不滅中國未可安卧亦已明矣夫以漢祖之聖集作畧武帝之雄謀臣勇將勢威集作盛雷電窮兵黷武傾天下以事之終不能屈一王服一國宣帝承衰竭之後撫瘡痍之衆不敢惕集作煬然有出師一作征之意然而未有遺矢之費而臣僕於單于之長者其故何哉蓋盛衰有時理亂有數故曰聖人脩備以待時是以正天下如拾遺陛下肅恭神明德動天地今上帝降匈奴之災孽遺陛下之良時不以此時順天誅建大業使良時一過兇虜復興則萬代爲患雖悔之亦不及矣古語曰天與不取反受其咎今天意厚矣陛下豈可違之哉臣比在同城接居延海西逼近漢南口其磧北突厥來入者莫不一一臣所慰集作委察比者歸化首尾相仍携㓜扶老已過數萬然而瘡痍羸憊皆無人色饑餓道死頗亦相繼先九姓中遭大旱經今三年矣野皆赤地少有生草以此牛馬死耗十至七八今所來者皆是稍能勝致始得度磧磧路旣長又無好水草羊馬因此重以死盡莫不掘野䑕食草根自相殘命以給餱食集作或自相食以活喉命臣具委細問其磧北事皆異口同辭又耆老云自有九姓來未甞集作曽見此饑饉集作饒之甚今者同羅僕固雖爲逆首僕固都督早已伏誅爲亂之原集作元既自喪滅其餘外小醜徒侵暴自賊耳本無逺圖多有獵葛復自相讐人被塗炭逆順相半莫知所安囬鶻諸部落又與金州横相屠戮群生無主號訴嗷嗷臣所以願陛下建大策行逺圖大定北戎不勞陛下指麾之間事業可致則千載一作干戈之後邉鄙無虞一作憂中國之人得安枕而卧豈不在陛下一斷哉且匈奴爲中國之患非獨秦漢之間臣竊惟先帝時衛公李靖蓋中庸之一老臣徒藉先帝之威用廟勝之策當頡利可汗全盛之日因機逐便大破虜庭遂繫其侯王裂其郡縣六十年將於今矣使中國晏然斥候不警一作無斥侯之警書之唐史傳之無窮至今天下謂之爲神况陛下統先帝之業履至尊之位醜虜狂悖大亂邉陲皇天遺陛下以鴻業之時陛下又得復先帝之迹德之大者其何以加若失此機事已過徃使李靖豎子獨成千載之名臣愚竊爲陛下不取也臣伏見去某月日勅令於同城權置安北都䕶府以招納亡叛扼匈奴之喉臣伏慶陛下見機於萬里之外得制匈奴之上策臣昔聞隗囂言一作云漢光武見事於萬里之外制敵應變未甞有遺今陛下超然神鑒昭宣集作逺照實所謂聖明之見覩於無形也臣比住一作在同城周覩集作觀其地利又博問諳知山川者莫不悉備其地東西及南集無南字北皆是大磧磧並石鹵水草不生突厥嘗所大入道莫過同城今居延海澤接張掖河中間堪營田處數百千頃水草畜牧足供巨萬又甘州諸屯犬牙相接見所蓄粟麥積數十萬田因水利種無不收水運集作運到同城甚省功費又居延河海多有魚塩此可謂彊兵用武之國也陛下若調選天下精兵採㧞名將任以同城都䕶臣愚料之不用三萬陛下大業不出數年可坐而取成臣比來一作此者㸔國家興兵但循於常軌主將不選士卒不練徒知集作如驅市人以戰耳故臨陣對冦未嘗不先自潰散遂使夷狄乘利輕於國威兵愈出而事愈屈蓋是國家自過計於敵耳故非小醜能有異圖臣竊以爲陛下今日不更爲之圖以激勵天下忠勇但欲以今日之兵今日之將冀收功於異域建業於中興則臣之愚蒙必以爲未可得也陛下即以突厥爲萬代之患則臣所言願少加察若以戎集作夷狄荒服不臣則微臣小人非所敢諫臣今監領後軍某等取某月即度磧去計至某日及劉敬同謹當親按行磧計至北以來地形及突厥滅亡之勢察具集作當審虚實續以聞奏伏願一作惟陛下省臣此章爲國大計儻萬有一可中者請與三事大夫熟圖議之此亦萬代一時也伏願少㽜聖意閑暇念之天下幸甚天下幸甚陛下採臣蒭蕘臣請執銳集作没先驅爲士卒啓行横行匈奴之庭歸報陛下臣死之日庶無遺恨不勝踴躍之至諫鑾駕親征表𤣥宗蘇頲開元三年臣某言伏承某日制以吐蕃侵軼邉隅陛下欲親揔元戎出征秦隴蠢彼羗髳敢爲叛渙王赫斯怒整旅龔行實陛下雄略英威愛人活國之長策也臣聞北狄西戎自古而有雖夏殷之強軒農之盛未息其患也書稱蠻夷猾夏詩著獫狁孔熾未損東漸西被之化帝王馳驟之迹則有南仲出車吉甫維憲縱侵鎬及岐宻邇畿甸未聞親征之義及乎漢代則􅇏火至于甘泉朝那䘮其都尉亦止之兵細栁天子但安于上京何者戎狄荒服忽慌之義也來則拒之去則勿逐以禽獸處唐書作畜之以覉縻御之比諸校獵羽毛不入於服用體肉不登於郊廟則王者不射故知千鈞之弩不爲鼷䑕發機也况萬乘之重而與犬羊角勝哉誠勝之不武不足以勞也且陛下有髙行者甚衆焚珠翠放鷹狗出宫女納直言爲百姓請命故關中豐稔則知皇天所睠通夫至誠今小冦難將不久陛下勤脩德音日慎一日當自消弭也且兵法有先聲後實陛下但發親征之令以㫖逺而潜遣猛將謀畧之士以濟其師則戎人日便崩挫也岐隴粗熟凋敝積年千乘萬騎徃還儲峙恐外有冦虞内興徭役人不堪一也又戎虜之性倐來忽徃敗不羞走勝不成師唐書作讓成若大軍臨邉尋已鳥散則屢出多方我受其誤二也况太上皇萬福鍾愛實深陛下將對冦塲必勞憂慮非惟問安頗闕亦恐御膳有違則陛下烝烝之思何以自得三也臣故曰擇將嚴邉旰食脩德爲良􅄸也臣愚不識忌諱惟陛下裁擇一昨欲幸蒲州及長春宫臣等以人勞未復不足輕擾輙進狂􅎩遂簡天心下制賢諫臣一作官之奏恤農人之業因而賜一作見停遐邇並知陛下從諫如流之羙今月日未久勞役倍前㫁可知矣陛下若哀此疲人頓兹戎輅則天下幸甚昔蒯城侯泣諫漢祖曰主上常自勞豈無人使漢祖以爲愛我良史書爲羙談今朝廷將相之衆豈無與陛下盡力哉何勞聖躬之遽行也臣等不勝慺慺之誠謹表以聞第二表前人臣某言皇情愍彼邉甿忿兹兇醜必親弔伐臣聞天子之怒伏屍百萬流血千里若吐蕃者䑕竊豕食猶魚躍釜中耳又何足以當陛下之怒哉臣愚竊以不可何也頻嵗以來百姓不足岐隴河渭動無儲廪今大駕遄征供置倉卒若緩之以法必乏我軍興如急之以刑則人無所措此時不可也乗邉將士或交鋒刄飛書告捷首尾繼來料賊之勢不復支久陛下若輕車電發則虧持重之慮一作虞如按部天行又非赴敵之義此勢不可也盖稱王者之師有征無戰謂蕃貢有闕王命征之於是乎理兵其郊獲辭而止非謂擐一作按甲臨軍敵人畏之莫敢戰也是以古者聖帝明王無親將也云黃帝五十三戰者即締構草昩非太平之本也故自阪泉之後脩身養德與七聖游於具茨三月齊而訪道今陛下鳯翔藩邸龍躍御天不日再造乾坤一呼而撥定禍亂是則聖過黃帝而經綸之業備矣故當髙居深視制禮作樂禪梁甫登崆峒雅歌從容爲後王法閫外之事屬諸將軍何至厭玉輦甘金革邀功馬上爲一人一作日之敵也今吐蕃遣偏禆小醜干犯大國我軍未捷而恥已深而陛下又將屈至尊逺爲之敵使攻無不勝戰無不克猶未足以誇四夷適足以驕敵人羞天下也又扈從之人半非鬭士使給徃來日費千金與其傾耗資儲孰若囬募驍健重賞之下必有勇夫以敢死之師當疲老之冦若排山壓卵何必勞聖躬哉况事有不可輕敵有不可小者昔周師困於祝聃漢祖厄於平城安可謂吐蕃無祝聃耶河右無平城耶千金之子坐不垂堂聖人終日不離輜重不可忽也臣又聞吐蕃之入也惟趣羊馬不至殺掠於人但剥體取衣以窮冦耳又數道俱進按隊徐行者若有所望恐連謀北狄陛下如必親戎邁于岐隴脫幽并警候靈夏馳烽突厥之騎南侵猶如吐蕃之勢長安百姓驚擾太上皇帝豈不憂勞陛下以三賊憑陵誰者先擊豈可挂西軍之衆分御北胡野次之間遥謀廟堂不戰之策帝城空虚衆亦何仰臣固曰居中制勝爲防萌杜漸之上畧也今但發近縣之兵擇良能之將重爲之募嚴爲之約其敗衂失律者已加必罰之誅矣其勇敢殺敵者亦願加信賞之勸焉兼購賊中有能斬首帥以一作已下歸降者及邉軍之士俘馘醜虜者並厚爲賞格以班之我軍必大振矣彼賊聞之自解而去也又承萬騎官者數千其受國恩亦已多矣並習練梟雄逺近所憚陛下或㧞爲將帥或備軍行勒以從征足可威賊也又數十年來人之多幸乃有捐司馬遷傳作全軀保妻子之臣親戚貪佞之輩並人厭階勲家盈封爵乃至紫衣塞路朱服滿朝皆能侵國害人未見尺功寸効自陛下欲櫛風沐雨親冒邉塵不聞獻一竒輸一策主憂臣辱請代此行而但縻府庫之財殫征稅之奉嗚呼此所謂六蝎五蠧者是也臣所以痛心椎膺而移疑陛下言之耳何不簡冗食重禄之夫權令禦冦此但惜身自當爲國而容養蠧蝎輕勞聖躬賈誼所以長歎息繼之慟哭爲此也昔楚漢相持楚強而漢弱漢祖猶曰使刑徒擊公吾不能鬭力也區區之時猶能如此况今四海之内皆爲臣妾普天之下莫非王土而蕞爾一冦如一蚊之附九牛陛下便欲降萬乗之尊親衘橜之變輕其帝重逸此庸臣臣竊爲陛下不取也夫三皇善用仁聖五帝善用智勇陛下當三五之運而捨其所長非英武之稱也議者或爲疑陛下前欲征匈奴制行而止今必須一出示信萬人此大謬也夫兵者以正合以竒勝故不厭詐而尚以權今以陛下英雄之資發親征之令敵聞而懼我勢已張更練熊羆推轂將帥見可而進騁變如神適謂幽逺而難知河漢而不測人是以服信是以孚夫何疑也今夫頓岐隴之外擾疲敝之人率徴之兵不過數萬阻饑積嵗師不宿飽州縣急於供費力不足以救邉軍容制於部伍勢不足以赴敵脫胡騎紛擾京城空虚人情易動難安不可不慮也如太上皇暫勤旰食是陛下以天下之大不能安其親也惟陛下圖之今卜征有期不可頓止但更延發日示擇良辰以候西軍動静以爲長策臣愚所陳衆計亦願陛下擇善而從之臣聞資父事君惟忠與孝况臣職叅衮闕逾念讜言苟益涓塵死而無悔昨四日已於閤門封進一表恐未周覽今復盡愚非敢阻於成規實願廣於天聽輕言時政伏待刑辟爲清邉大㧾管建安王奏失利表武后張說萬嵗通天初臣攸直言今日某乙從硤集作徃峽石山稱前軍王孝傑等以某日失利於峽石山忽聞殞絶心搉魄死上孤天威下慙士卒臣死罪死罪頓首頓首臣以駑怯謬職戎麾衘戴恩榮統率將士驅闗隴之馬引淮海之駒旗幕亘於邉城弓甲傾於内府不堪任使撓失節度群帥無决勝之功偏師有挫衂之咎長犬馬之孔熾縱梟獍之未滅憤結靈祇怨毒骨髓臣實其罪非他人忍恥苟全逺媿胡顔之責引慝遄死内負猶鬭之心踧踖無顔進退匪集作靡處臣既不建師律有干常憲合即嚴科以塞重責然以見在兵馬交要部統未敢束手軍事委置旌節稽後集作緩刑書伏深兢戰特乞更召嚴猛代臣部卒集作統帥臣請歸罪司冦以正國刑囚伏邉陲惟待斧鉞幽州論戎事表𤣥宗開元六年前人臣某言伏以先帝以臣踐履忠孝使臣啓發聖明故得侍讀春闈夙承天眷洎於中嵗兼掌樞宻内當沸騰之口外禦傾奪之勢陛下監撫既安自天所佑然臣叶賛之意明神啟之開元之始首典鈞軸智小任大福過災生出守三州違離六載曲直非已升降由人惟君知臣事不待說今既牧邉鎮委重戎麾竊以兩蕃共和能器疑同異九姓逺聞撫納欲恃賊殺無侵擾之慮保兩蕃受徴發之期臣愚料之恐未然矣何者賊殺親一作新立必逞兵所加必收九姓若去兩蕃摇失九姓雖屬并州節度然其幽州宻邇脫有風塵何所不至臣熟聞幽州兵馬寡弱卒欲排比未可即用城中倉糧全無貯積事未逼廹臣實憂之伏乞聖慈深以垂意博詢舊將預爲籌畫事若早圖必無後悔且孤臣㧾衆易起猜嫌寛大失濟事之宜嚴整招怨黷之謗逺辭天聽臨事回惶如有論告臣身奏劾軍事者乞追臣靣問對定寘疑虚則日月無可蔽之期幽逺有自通之望伏乞留書在内時加矜察并州論邉事表𤣥宗前人開元七年臣某言臣說頓首死罪死罪言臣聞小忿不忍延起大患小罪不寛迫成大禍契丹奚背恩誠負天地不容之責然原其状本是夷狄君臣不和自相誅戮耳伏集作所望聖慈且使其族類在朝者將勅書再三告讓因其所欲立酋長而便定之或可不戰而定也必告之不訓則大發兵馬東召靺鞨西舉九姓來春未青數道齊入突于之首可拾而取未爲晚也天恩若不忍以中國勞事蠻夷則嚴兵備塞棄兩蕃如糞土耳又許欽淡集作浹擁二萬餘兵集作衆㨿五丈之城有糧即守不可㧞無糧即皷而行何所慮也今遣史獻非時逺抄兵回甚難八字集作非時逺抄近掠其實甚難萬一未捷賊氣轉壯臣愚不曉集作下臣愚昧不敢隱情伏望聖恩再加裁度臣說誠惶誠恐頓首頓首文苑英華卷六百十四
