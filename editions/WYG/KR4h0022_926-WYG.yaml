body:
  text: 文苑英華卷九百二十七宋李昉等編職官三十五别駕判官附高平别駕權幼明碑一首曹州别駕張無擇碑一首嶺南節度判官宗義仲碑一首故朝議大夫高平郡别駕權公神道碑獨孤及開元天寶之際𤣥宗始以八柄付三公由是台司得專其廢置其中或因寵憑位集作慿寵固位懼天下有異己者諸附離之者皆出入三䑓若公才令名以望見憚則稍稍優其俸而黜其職故天水權公幼明由新安令為絳郡司馬高平郡别駕而沒同於道者皆竊歎之是嵗天寶六載秋八月也没後二十有二載嵗次己未春二月返塟洛陽故塋夫人新鄭縣君滎陽鄭氏祔焉縣君某官某之孫某官某之子十字集作某縣某官某之孫某之子以仁儉好禮輔佐懿徳柔明之風訓齊閨門夀六十五大歴二年十月某日終於丹陽初公娶於博陵崔氏生子曰驊而終新鄭以繼室生四子曰駃集作軼下同曰申曰器曰舒不幸短命驊駃申器悉忠信好學善屬文位未顯而令名歸之慶之垂訓之流也至是既卜宅兆驊等懼日月逝集作逾逺後裔不知先人之徳善謂及忝聲華集作鄉舉之舊故使錄而銘之云公諱𦙍集作徹字幼明隴西天水人也權氏之先出於顓頊其逺祖殷武丁之少集作小子生而有文在其手曰權因以權受封且受集作命氏焉至周為楚武王所滅國除其後有仕隴西者遂家於天水歴漢魏晉宋間子孫世為都尉郡守至裔孫翼與王景畧同佐符堅官至僕射翼生二字集作後僕射數世至景宣景宣生士玢並知名於時士玢生萬春歴華州刺史封千金縣公華州生集作嗣右領將軍曰文奬領軍生集作嗣永興令曰懐育公永興之嗣也奕葉之明徳粹氣叢乎其躬故融而為仁行播而為文學童子時舅氏崔湜奇其文嘗謂有何無忌之似其鄉舉也考功郎中蘇頲拔諸羣萃之間連尉湖城汾陽新繁渭南河南五縣開元二十三年拜監察御史㑹監祭太廟先時同集有㑹字事者約相與偕赴及將赴祭約者有故不至遽不暇告公曰人約我矣豈可先已而後信乎遂不赴坐是降為河南府法曹君子義之初選部舊制每嵗孟冬以書判選多士至開元八年乃擇公廉無私工於文者考校甲乙丙丁科以辨論其品是嵗公受詔與徐安貞王敬從吳鞏裴朏李宙張恒集作烜等十學士參焉究其升奬皆當時才彦考判之目由此始也于時天下無兵二十餘載縉紳之徒用文章為耕耘登高不能賦者童子大笑公攘臂其間以仁義為己任片詞隻字動為學者所法時軰榮之而居家清方惟徳禮是仗潤身飭吏不過經術不矯持操以媚貴游二字集作貴游媚倖行威作福者忌之由是官徙而階不遷從法曹數嵗而後有新安之拜及至歴降郡安平任愈疎逺安貞守中一作中正未嘗易方虚舟其心與位升降春秋六十四而終盖道之行止與時不并論者以漢梁叔敬桓君山為比公所著文二十巻其立言之宗趙郡李華嘗集無此字編而叙之矣集無此字若世系事業則書諸文其文曰咺兮權公有徳有言忠恕廉清道直而温行有餘力足言斯文居高釐績勤約是守與明與信寧黜無集作不茍跡屈志申義彰身後冉政游學左詩潘詠風流遺烈足以遺子九原與歸末由也已曹州别駕張公神道碑集作故通議大夫和州刺史吳興郡張公神道碑白居易張之為著姓尚矣自漢太傅良侍郎肱晉司空華丞相嘉以降勲賢軒冕歴代不乏肱避地渡江始居於吳故其子孫稱吳郡人嘉以孝悌聞於郡故其所居號孝張里嘉之曽孫裕在宋為司徒即公五代祖也司徒之孫儔在趙集作隋是為吳郡都督即公曽王父也台州臨海令諱鵾即公大集作王父也袁州司馬諱季集作孝績即皇考也或以人物著或以㛰集作閽閥稱迄今為江南右族公諱無擇字無擇未冠丁袁州府君憂廬於墓晝號而夜泣者三年矣有靈芝醴泉出焉既冠好學能屬文從鄉賦登明經第應制舉中精通經史科補𢎞文館校書郎調左金吾錄事換一作投杭州錄事參軍在杭州前後詰偽制吏者三十八人駁假年侍老者三千人舉而正之人伏其明㑹劉幽求來為刺史舉課上聞詔授絳州錄事參軍絳之郡丞有主婿者估寵侮法豪奪人利公數其罪露章奏之章下丞相府丞相姚元崇奇之致書褒美尋改太原府功曹參軍給事中張昶為江淮安撫使表公正直奏署郡一作部從事吏部尚書陸象先為河東按察司使狀公清白奏授懐州獲嘉令在獲嘉以不茹柔得人心以不吐剛得罪繇是左遷鄂州司馬移深州司馬轉虢州長史時上方思理詔求二千石之良者時宰以公塞詔擢拜和州刺史公在郡奉詔條䘏人隠而已不知其他無何水潦害農公請蠲榖籍之捐者十七八時李知柔為本道採訪使素不快公之剛直密疏誣奏以附下為名遂貶蘇州别駕幼艾集作老㓜攀泣而遮道者數百人宿信方得去移曹州别駕嵗餘謝病歸老於家天寶十二年正月二十八日終於東都利仁里私第十二載集作某年二月十二日塟於河南府伊闕縣中里原享年八十三噫公生天地間八十有三年可謂夀矣其間當明皇帝馭天下四十有五年可謂時矣有其才得其夀逢其時然職不過陪臣秩僅至郡守凡所貯蓄鬱而不舒嗚呼其命也夫公之文學嘗為賀知章賈彦璿許之公之諒直嘗為李邕張廷珪稱之公之政事又為劉姚張陸推之夫以八君子之力援之而不足以一知柔之功推之而有餘阨窮不振以至沒齒嗚呼其命也夫古人云道不虚行又云其後必有起集作達者故公之子大理評事誠以節行聞於時公之孫户部侍郎平叔以才位光於國報施之道信昭昭矣不在其身即在子孫相去幾何哉長慶二年某月某日平叔奉祖徳掲而碑之四字集作碣之居易按據家狀序而銘之其詞曰有木有木碩大而長破為桶棧疑作伐不作棟樑有驥有驥規行矩歩辱在短轅不駕大輅嗚呼噫嘻公亦如之將時不遇我而我不遇時勿謂己矣天錫多祉既賢其子以濟其美又才其孫以大其門茍無先徳孰啟後昆嶺南節度判官宗公神道碑豆盧詵夫工文者或懦於勇烈善武者或昧於政理徐則失於斷疾則寡於謀至若文而有勇武而有政徐而能斷疾而能謀者公有之矣公諱羲仲字羲仲其先南陽人也高祖出宰榆次因家太原昔宋襄公之母弟敖仕於晉至伯宗為三郤所害州犂犇楚其子家於南陽以王父字為氏公其後也逺祖均東漢為九江太守累遷司徒六條分而千里雲行五教敷而四方風動厥有成績罔或不臧自東漢迄於聖代英賢間發吏牒詳焉曽祖隋雍州牧鄱陽將軍諱義國之選也烈考皇靈州錄事參軍諱良獻人之望也皆纉成前緒垂祐後昆秉徳不回世濟其美公則靈州府君之仲子也允武允文惟忠惟孝丱嵗失趨庭之訓絶漿有類於參乎弱齡喪倚門之慈泣血不殊於柴也曽未弱冠克自激昻不安顔子之貧遂投班生之筆乃慷慨而言曰文武不墜在人𢎞之遂從安思順破魚海敗五城授上柱國又從哥舒翰破吐蕃収九曲前後討伐稠疊勲庸累遷㳺擊將軍左武衛中郎將暨乾元中秦州防禦使都督楊公公之懿親邦之碩徳也懐郭有道之深識行祁大夫之内舉以公才兼文武徳備剛柔表為司議參軍尚賢也至上元初楊公為同州刺史又表公兼韓城令當縣團練使任能也攙搶未攘獫狁孔棘既因之以師旅又加之以饑饉㓂盜蟻聚於我疆黔黎鳥散於他境城壁頺圮􅆵户閉隳嗷嗷彼方望公如嵗公於是完城郭修器械均賦斂峙糗糧城郭之完也則矗長雲以倚天器械之修也則騰勁霜以撲地均乃賦則流人不召而來峙乃糧則軍士不戒而備農狎於野商復於肆去其煩苛敦其簡易曽不期月而人知所庇解印未㡬朝廷多之遷澄城令無何楊公拜御史中丞嶺南節度乃諮參公謀授以參軍時宦官吕太一怙恃寵靈凌虐神主前節度張休為之棄甲公於是稽韜畧演遁法算之以孤虚考之以風角潜軍間道克復舊藩甲士不勤而兇黨殲矣所謂不戰而勝者也乃大貢方賄丕叙庶績朝議嘉焉授大理少卿且監察御史仍充節度判官懋賞也棘署亞卿表其赤心而刺外栢䑓柱史俾其白簡以正邪方將振翼南溟竭誠北闕曜威靈於象郡布渥澤於龍川豈上天不惠降此大戾閲水去而不留藏舟淹其長逝以永泰三年四月六日寢疾捐館於上京務闕里第春秋四十有二以其年五月十八日塟畢陌原禮也公之元昆曰夷仲早世而殞公之季弟曰昌仲為光祿寺丞撫孤追往號慟靡及唯公禮以檢身忠以奉國其事上也敬其臨下也簡御衆以寛撫孤以義率性而仁愛及物因心而孝友過人從官之祿利散霑於疎屬承家之資産悉付於同生宗族之所嗟稱寮友之所景慕者也夫人昌黎郡君豆盧氏太原交城令元偉之孫寧州真寧尉廣洽之女也調諧琴瑟志厲氷霜施衿結縭作嬪君子婉嫕淑慎宜其家人伯道無兒豈獨悲於晉史共姜誓死寧專美於衛詩痛失翼於凌虚思招福而遺有終願削髮禪寂納衣空門愍幼女之未嫁抑深心而少止嵗月逾邁陵谷有遷願播芳猷紀之貞石詵也不侫知其為人哀彼譚公念兹歸祔乃為銘曰於穆君子問望不已文武並茂忠孝兼美徳所立兮奕奕韓邑嗷嗷疲人命公為宰厥政維新化所及兮小臣不帥肆虐荒裔師徒不勤渠魁自殪資令謀兮聖朝懋賞俾崇乃秩卿月照庭堂霜輝質沐鴻休兮天地不仁殱我邦彦百身莫贖孰不興怨行之積兮孀妻孤女魂斷骨驚爰紀貞石永播芳名美無斁兮文苑英華巻九百二十七
