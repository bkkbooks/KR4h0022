body:
  text: 文苑英華巻四百六十五宋李昉等編詔勅七戒勵官寮制蘇頲門下法之所設本以懲非令之必行期於禁止致理為要何莫由斯至如官典受贓國有常法承前雖有處分在外多未遵奉且不戒視成為暴不令而罰為虐豈含容之日詔令作自乆將訓導之未明歟朕情存畫一過欲不貳恐愚人陷罪莫識隄防姦吏狥私自嬰徽纆永言於此明發興懐今日已前既徃不咎今日詔令作九百已後有犯必䋲朕不食言爾無荒怠所以勤勤懇懇預戒百官詔令作九百者盖以罰止罰可不慎哉告示遐邇令知朕意主者施行先天二年九月七日毎日聽政勉勵百寮勅勅三春布和萬物資始而去冬無雪以迄於今將何以敬授人時欽若天道豈政有所缺將敎有不明致兹亢旱深用祗惕堯舜以百姓為心禹湯以萬方罪已朕雖薄徳匪敢遑寜自今以後毎日聽政思𢎞道理俾康庶績至於日旰㤀食未明求衣惟懐求圗朕之志也凢百在位可不勉歟開元四年正月七日命新除牧守面辭勅自古帝王莫能獨理爰樹侯伯所以分政則今刺史之詔令無之字謂矣盖欲亭之毒之納於富壽不夭不札以致和平朕受天睠命作人父母殷鑒逺圗㒺知攸濟頃者都督刺史惟良是求而寂寥厥聲孰副虚想豈六條察舉未詢事以考言將三載黜陟不責實而求當遂令進之則易吏煩於送迎退之則難人務於苟且豈所謂安孤老長子孫之意邪漢宣由是興言劉廣為之長嘆誠有㫖也今事謀伊始邦政惟新俾凝庶績思改前弊自今已後都督刺史毎欲赴任皆引面辭朕當親與疇咨用觀方略到任之後宜待四考滿隨事褒貶與之改轉諸州上佐五品已上應改轉限亦宜准此夫類其才則適用乆其事則有恒致用執恒未聞不致於理也詔令作凢咨爾在位可弗勉哉先天二年月二十四日誡百寮與供奉人交通制勅朕聞事君者必在至公行已者貴於獨立如聞供奉近侍之軰比日因循一作皆因循節廣有招携未能周慎爰與朝列頗相闒茸苟非親表不合數至門庭多行請托便渉趨附眷言此弊湏革前非宜體朕懐深自戒勵自今已後百官輙不得與入内供奉人徃還誡勵御史制勅御史之職邦憲是司先正其身始可行事當湏舉直錯徃不避親讎糾慝䋲違務存公正如聞愆過隂自鼓動不即弹射自樹私㤙詔令作㤙私曽無忌惮仍有請托將何以寄之鷹隼用屏豺狼如此當官􅀷負所委自今以後不得更然誡勵兵吏部侍郎及南曹郎官制孫逖勅銓綜之司名噐所屬苟虧審慎必有姦濫及今按詰其數頗多馬有害羣罪雖在於胥吏龜之毁櫝過亦由於主守其御史中丞楊慎矜所奏前後知銓侍郎及南曹郎官等忝効職司不能舉察合投嚴譴用肅慢官猶以乆踐朝班夙昭人譽過其能改必在増脩特宜寛宥俾自懲警誡勵吏部兵部禮部掌選知舉官等勅前人勅官邪則敗國賞僭則利滛自昔至言政之明誡朕祗膺大寳豈㤀兢業臨馭已來且踰二紀期大道之成化冀天下之為公凡百卿士豈不恊力而選舉之司委任尤重若名噐失序則勸沮何施近者流外銓曹頗多渝濫有塵清議實紊彛章胥吏之徒雖則微賤仕進之路終為厥初必澄源流無雜涇渭不慎於細其傷則多小既不可不懲大亦不可不誡其吏部兵部禮部掌選知舉等官各宜飭勵當盡至公必湏杜邪枉之門絶請託之路何止一變仍圗永清且銓綜九流必仗賢俊取諸賞鑒立斷可知何至淹時至稽團奏開聞之後餘甲未終既滯官曹長兹罪過舊選未畢新格復脩此乃因循實為煩弊自今以後吏部選入三月三十日已前團奏事畢兵部二月内畢其流外銓及武舉專委郎官恐不詳悉共為取捨適表公憑毎至留放之時皆就尚書侍郎對定既上下檢察庶在得人而覆車尚在殷鑒非逺法不可廢宜識朕懐誡勵兵部兩司勅勅設官分職將以奉法禁非實在上下叶心中外一徳共熈庶績用絶姦源如聞百司頗皆寛縱遂令胥吏得以挾私近者兵部令吏因令推鞠或在選曹増減之狀雖小人之過則惟其常永言在官亦為踈略朕今申之寛宥許以自新庶觀將來冀能効節至如詔令作於兵吏兩司是掌衡鏡進趨者非一揆姦巧者亦百端推而言之或所未免無謂幽昧朕皆察焉各宜盡心靖恭爾位誡勵風俗誡勵風俗勅四首制集勅建立州縣列􅆆官司所以導俗宣風懲姦息暴頃以承平既乆中外晏安人懐弛慢之心官無警覺之意遂使綏宋二州屢奏亂常之黨荆并兩府頻言搆逆之徒發露雖復數州包藏猶慮未絶此等祅釁尋自伏誅旬日之間警害良善誠按察寛縱禁止不明或使無辜陥於非命興言及此深用惻隠詔令作隠惻自今以後在州縣官寮各宜用心檢校或惰於農業專事末逰或妄説祅訛潛懐聚結或棄其井邑逋竄外州或自􅃷醫工詔令作占誘惑愚昧諸如此色觸類旁求咸湏防糾勿許藏匿又屬當首夏務在田蠶雖則各觧趨時亦資官府敦勸若能肅清所部人無犯法田疇墾闢家有餘糧所由官人宜加考第功狀尤異者别加外擢若為政苛濫户口流移盗發罕能自擒逆謀為外境所告輕者年終貶考甚者非時觧替御史及䑓郎出使審加訪察各以狀聞宜宣示諸州各令所在知悉文明元年四月十三日二門下朕克纉丕業誕膺景命憲章昔典欽若前王克己勵精緬思至道宵衣旴食勤脩庶政夙夜寅畏匪遑底寜在渉泉氷㒺知攸濟頃屬殷憂啓運多難興邦禮義載復品物咸乂思欲致萬姓於仁壽歸六合於昇平永言政途庶㡬沿革猶恐學校多闕賢俊罕登牧宰不存政理農桑未加勸導樽爼之儀不習冠婚之禮莫脩朕所以當宁興歎載懐兢惕者矣庠序者風化之本人倫之先仰州縣勸導知禮節毎年貢明經進士不湏限數貴在得人先賢廟及州縣學即令脩理春秋釋菜使敦講誦之風天下有竒才異行沉伏不能自逹及官人百姓有能極言時政得失者並令本州責狀封進鄉飲禮廢為日已乆尊徳尚齒𢎞益極深宜令諸州毎年遵行鄉飲之禮令有勸慕王公卿士務存訓奨子弟成立則有冠婚婚禮糟粕或存冠禮乆為廢闕自今以後並行冠義責以成人之道便知負荷之難食為人天農為政本綏撫萌庶勸課農桑牧宰之政莫過乎此刺史縣令有課最尤異委廉察使名聞當别加甄擢縣令字人之本明經為政之先不稍優異無以勸奨縣令考滿考詞使狀有清字無負犯明經及第常選毎至選時量加優當若屬停選並聽赴集真如設教理歸清净黄老垂範道在希微僧尼道士女官之流並令脩習真寂嚴持戒行不得假託功徳擾亂閭閻令州縣嚴加檢察私度之色即宜禁斷諸州縣官有不因選序别犯贓賄非時除受官等皆依倚形勢恣行侵剥如有此色仰州長官録事叅軍速勘責奏聞訖宜停務待進止仍委吏部兵部速勘責處分諸州百姓多有逃亡良由州縣長官撫字失所或住居側近虚作破除或逃在他州横徴隣保逃人田宅因被賤賣宜令州縣招携復業其逃人田宅不得輙容賣買其地任依鄉源詔令作原例租納州縣倉不得令租地人代出租課寺觀廣占田地及水碾磑侵損百姓宜令本州長官檢括依令式以外及官人百姓將莊田宅舍布施者在京並令司農卿即收外州給貧下課户凢此數事咸宜區分繫乎風俗義存奨勸刺史縣令等各申明舊章勉思撫輯罷凋弊之務歸淳厚之源訓導黎蒸宣我朝化書不云乎徳惟善政政在飬人布告天下咸知朕意唐隆元年七月十九日通鑒唐隆元年七月庚戌朔二十日己巳改元景雲詔令只作十九日是矣英華於十九日之上添二字恐非三黄門朕聞天為大者莫先於育物物最靈者莫甚於愛人故樹之侯王以康兆庶朕緬鑒前烈深惟逺圗懼徳之不脩化之未偃寅畏夙夜如臨泉􅊤然則疇咨命於四岳黜陟存乎三載既以百姓為心明非一人獨理今之牧守古稱侯伯賢者任之則循良之迹著不賢者任之則愁苦之聲作毎冀精於所擇委之俞詔令作前徃豈時或頺靡苟且尚多而吏之殊尤寂寥不嗣静言政要朕用憮然間嵗水旱周於郡國倉廩不蓄閭閻荐飢加以出攝頗多冗官増弊至於處置皆憑刺舉當於京官内簡宏才通識堪致理興化者量授都督刺史等乆在外藩頻有昇進狀者量授京官使出入常均永為恒式課最超等必議昇遷循黙守常必裁貶黜昭昭賞罰不可不慎屬冬朝禮成春事方起朝集使等俾還所蒞欽若朕言官寮間或幹濟清苦或貪濫侵漁灼然稱職及不稱職並委都督刺史審察奏聞㒺或阿容自貽悔咎諸道雖遣使存問尚切憂勞牧宰等深體朕懐各宜隠恤交正乏絶者速量事優當公私債負停徴至秋州縣差科務減常日昔國僑相鄭以至和平曹叅相齊貴於清静清静則不擾不擾則和平和平則不争不争則知恥愛費而與休息除煩而從簡易自當農者歸隴畆蠶者勤紡績既富而教乃克有成導徳齊禮不逺斯復庶幾在位𢎞朕此心凢厥遐邇各令委悉主者施行開元二年正月十三日四勅國家祖武宗文重熈累洽克清寰極大庇生人𤣥徳獨化與乾元而資始至道無名合詔令作舍帝先而首出自削平區宇混一車書六合晏然百有餘載則我文武之業有大造於生靈朕嗣守丕運纂承鴻緒恐不敷𢎞前烈光闡睿圗夙夜祗畏若臨泉谷曷嘗不恭黙思道寤寐勤政從人之欲毎以百姓為心屈已之勞常矜一物失所且夫法乆而弊法弊則通制國以立法為先教人以地著為事自屬清晏人多媮怠國章或弛甿偽實繁今正朔所及封疆無外雖户口且増而租賦不益莫不輕去鄉邑共為浮惰或豪人成其泉藪或姦吏為其詔令作之囊橐逋亡積嵗流蠧日滋雖朕之薄徳罪則在予亦官無其政吏不守法耳今欲去其末而歸其本閑其邪而正其徳使法有所立人知嚮方是用恤孤窮逸逋貸式廣自新之路俾申莫厚之㤙禁制禁斷錦繡珠玉制詔令作勅蘇頲勅朕聞召公曰弗作無益害有益孔子曰奢則不遜儉則固斯乃聖人詔令作賢之至言矣叔代遷訛僻王驕縱惟崇詔令作頗榮於玊盃象筯不務於捐金抵璧好之者君也習之者人也即用疋帛服長纓之類歟朕爰在㓜冲毎期質朴手未曽持珠玉目未嘗觀錦繡願言其志造次不㤀自寅奉休圗勉康政道常想漢文衣綈之徳晉武焚裘之事竟未能令行禁止敦本棄末朕甚懼之今王侯勲戚下洎厮飬所得者重於逺所求者貴於異至雕文刻鏤衣紈履絲習俗相誇殊途競爽有妨於政無補於時豈朕言之不明教之未篤也且一夫一女不耕不織則天下有受其飢寒者今四方晏如而百姓不足豈不以尚於珠玊珍於錦繡墾田疇而奪其務出布帛而害其功歟其珠玊錦繡等自今以後切令禁斷如更循舊弊並歸罪長官仍令御史金吾嚴加捉搦州牧縣宰勸督農桑待至秋收課其貯積使人知禮節俗登仁壽有司仍為條例稱朕意焉開元二年七月三日斷珠玊等制詔令作焚珠玉錦繡勅内制勅朕聞珠玊者饑不可食寒不可衣故漢文云彫文刻鏤傷農事錦繡纂組害女功農事傷則饑之本女功害則寒之源又賈生有言曰夫人一日不再食則饑終嵗不制衣則寒饑寒切體慈母不能保其子君焉得以有其人哉朕以𦕈身託於王公之上曷嘗不日旰忘食未明求衣思使返朴還淳家給人足而倉廩未實饑饉相仍水旱或愆糟糠不厭静思厥故皆朕之咎致有漿酒藿肉玉食錦衣互相夸尚浸成風俗夫令之所施惟行不惟反人之所化詔令作化上從行詔令作好不從言是以古先哲王以身率下如風之靡何俗不易此事近有處分當以施行朕若躬服珠玉自玩錦繡而欲公卿節儉黎庶敦朴是使揚湯止沸渉海無濡不可得也是知文質之風自上而始朕欲捐金抵玉正本澄源所有服御金銀噐物今付所詔令作有司令鑄為鋌仍别置掌以供軍國珠玊之貨無益於時並即焚於殿前用絶浮競至誠所感期於動天况於凢百有違朕命其宫掖之内后妃以下皆服澣濯之衣永除珠翠之飾當使金土同價風俗大行日用不知克臻至道布告遐邇知朕意焉開元二年七月禁斷女樂勅蘇頲勅朕聞樂者起於心心者動於物物不正則不可為樂樂不和則不能理人况天生黎蒸區别男女外則導之以禮中則由之以樂苟或不臧孰云致理自有隋頺靡庶政彫弊詔令作缺徴聲徧於鄭衛􅃷色矜於燕趙廣埸角抵長袖從風聚而觀之浸以為俗此所以戎王奪志夫子遂行也朕方大變澆訛用清淄蠧眷兹女樂事切驕滛傷風害政莫斯為甚既違令式尤宜禁斷自今以後不得更然仍令御史金吾嚴加捉搦如有犯者先罪長官務令杜絶以稱朕意開元二年八月七日禁斷大酺廣費勅勅禮存寜儉書戒無益約費嗇財為國之本至如賜酺合宴正欲與人同歡廣為聚歛固非取樂之意况目狥於奢是不誡也心勞於偽是不經也殷鑒於此良増詔令作用憮然自今以詔令作已後兩京及天下大酺詔令作酺宴所作山車旱船結綵樓閣寳車等無用之物並宜禁斷先天二年八月二十五日禁斷妖訛等勅勅釋氏汲引本歸正法仁王䕶持先去邪道失其宗㫖乃般若之罪人成其詭怪豈涅槃之信士不存懲革遂廢津梁眷彼愚䝉相陥坑穽彼有白衣長髪假託彌勒下生因為妖訛廣集徒侶稱觧禅觀妄説災祥或别作小經詐云佛説或輙蓄弟子號為和尚多不婚娶眩惑閻閭觸類寔繁蠧政為甚刺史縣令職在親人拙於撫馭是生姦宄自今以後宜嚴加捉搦仍令按察使採訪如州縣不能覺察所由長官並量狀貶降開元三年十一月十七日禁斷臘月乞寒勅勅臘月乞寒外蕃所出漸漬成俗因循已乆至使乗肥衣輕競矜胡服闐城溢陌深玷華風朕思革頺弊返於淳朴書不云乎不作無益害有益功乃成不貴異物賤用物人乃足况妨於政要敗詔令作取非紊禮經習而行之將何以訓自今以詔令作已後即宜禁斷開元二年十二月七日勅詔令作禁天文圖䜟制詔令作詔常衮勅天文著象職在於疇人䜟緯不經蠧深於疑衆盖有國之禁非私家所藏雖禆竈明徴子産尚推之人事王彤必騐景略猶寘於刑典况動渉詔令作皆訛謬率皆詔令作是矯誣者乎故聖人以經籍之義資理化之本仄言曲學實紊大猷去左道之亂政俾彛倫而攸叙自四方多故一紀于兹或有妄庸輙陳休咎假造符命私習星歴共肆窮鄉之辯相傳委巷之談餙詐詔令作偽多端順非而澤熒惑州縣詿誤閭閻懐挾邪妄詔令作懐紀挾邪莫逾於此其𤣥象噐物詔令作局天文圗書䜟書七曜歴太一雷公式等凖法官人百姓等私家並不合輙有自今以詔令作已後宜令天下諸州府切加唐書作宜禁斷各委本道觀察節度等使與刺史縣令嚴加捉搦仍令分明牓示鄉村要路并勒隣伍逓相為保如先有藏蓄者限勅到十日内齎送官司委本州刺史等對衆焚毁如限外隠藏有人紏告者其藏隠人先决杖一百仍禁身聞奏其紏告人先有官及無官者毎告得一人超資授正員官其不願任官者給賞錢伍百貫文仍取當處官錢三日内分付訖其狀聞奏告得兩人已上累酬官賞其州府長史縣令本判官等不得捉搦委本道使具名彈奏當重科貶兩京委御史䑓切加訪察聞奏凖前處分咨爾方面勲臣洎十連庶尹㒺不誠亮王室簡于朕心無近憸詔令作宵人慎乃有位端本静末其誡之哉大厯二年正月癸酉文苑英華巻四百六十五
