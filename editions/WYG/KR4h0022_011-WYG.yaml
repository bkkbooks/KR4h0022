body:
  text: 文苑英華巻十一宋李昉等編天象十一望雲物賦一首勤政樓視朔觀雲物賦一首郊天日五色祥雲賦一首南至郊壇有司書雲物賦一首南至郊祭司天奏雲物賦一首南至雲物賦一首秋晴曲江望太一納歸雲賦一首早秋望海上五色雲賦一首日暮碧雲合賦一首秋雲似羅賦一首望雲物賦以察微表象書物備年為韻陳正卿天道昭著靈䑓聳㧞将治厯以明時必仰觀而俯察誰敢俶擾曽不範圍既七政以欽若亦四序而發揮寒暑有次啟閉相依彼疇人以視逺類君子之表微維人有令維天有兆道在乎觀法用不撓彼分至之復應生雲物以縹緲俾占望以聿書将豐災之是表夫其大觀在上南正是掌審仁和之景色候肅殺之氣象授時莫愆行令靡爽舉祀物以昭報順禳祈之肹蠁若乃履端於緒以正厥初分職辨雲既眀於周典申命出日載列於虞書舉春奉始積閏歸餘節候應乎寒燠政令隨乎慘舒是用敬授以崇祗祓将舉正以舉中寧不軌而不物豈惟中臺端立永望以肆将以見天地之心辨剛柔之位庶乎有典有則克眀克類若夫春景載陽冬日已至望西成之平秩見南郊之敬致莫不㕘隂陽之則符璿玉之器審四時以成序察五雲而有備備用先天實惟有年儻虚疑作靈臺之可頌庶無忝乎周篇勤政樓視朔觀雲物賦以天地交泰萬國歡心為韻彭朝曦聖上以睿徳昭宣宸衷告蠲静以法地動而合天天何言哉毎降鑒於眀主君為政也亦仰觀乎上𤣥是以魯史薦書雲之典禮經徴視朔之篇于時㝢縣昇平朝廷無事闢朱樓於曉日垂紫旒於空翠至誠必應果呈證聖之祥至感必通遂有効一作助眀之瑞乍異色而抱日或神光而覆地是知昊穹成命必在於昌期𤣥象著眀詎違於躔次萬國來朝十月之交時當盈一作陽數氣發隂爻晴色俯臨逺接黑龍之水清輝一作光四散仍縈彩鳳之巢臣竊觀前代之君也居九重之深據四海之大遇皇天之隂隲属當時之交泰則必怠一作忘政理而不脩唯昇平而是頼今陛下則不然體至道以得一播元精以吹萬發號施令必酌於故實垂範制法亦咨一作質乎前憲古人云朔者蘇也陛下視之所以蘇息兆一作下人雲者運也陛下觀之所以廣運眀徳人既蘇而寧靖一作静徳乃一作又運而充塞猶儲精而谷神尚克己而作則方将揚耿光於五聖一作上帝布深仁於萬國三事大夫抃而同歡一無同歡二字歡字為官韻却改後韻情深履端為情深理歡上言曰陛下敦本棄末圖易於難夫此視朔情深履端况式瞻於萬象将布政於千官固可軼緹油而播美藏金匱而不刋然聖上方以無為作慮不宰為心鼓元氣之槖調薫風之琴以至徳撫御以大明照臨盛矣夫聖徳一有之字若此豈為臣之所能謳吟此賦全篇第四十九巻重出今已削去頗有異同注為一作郊天日五色祥雲賦以題為韻元稹臣奉某日詔書曰惟元祀月正之三日将有事於南郊直端門而云一作未出天錫余以雲瑞是何祥而何吉臣稹稽首敢言其實陛下乗五位而出震迎五帝以郊天五方騰其粹氣故雲五色以相宣排空一作控壇乍直捧日初圓獸蹲而龍鱗熠熠鳥跂而鳳翼翩翩羽葢凝而軒皇蹔駐風馬駕而王母欲前影帶其彩一作旂常疑錯繡之遥屬一作動光照乎一作昭文章物比摛錦之相連觀之者無小無大觀之日一作曰非烟若烟一作若烟非烟昔者卿雲作歌於虞舜白雲著詞於漢武皆跂望而為言非仰觀而遂覩今陛下徳至天地恩覃草莽當翠輦黄屋之一有方字行見金枝玉葉之一有可字數陋泰山之觸石方出句鄙髙唐之舉袂如舞昭示於公一有侯字卿士莫不稱萬嵗者三並美於麟鳳龜龍可以與四靈而一作為五於是載筆氏書百辟之詞曰郁郁紛紛維慶霄之雲古之一作有堯舜幸得以為君象一有胥字氏譯四夷之歌曰煒煒煌煌天子之祥唐有神聖莫敢不來王帝用愀然句曰予何力澤未周於四海雲胡為乎一作而五色來以一作爾羣后舉爾衆職由一作因五行以脩五事遵五常而厚五徳正五刑以去五虐繁五稼而除五賊苟順夫人理一有之字父子君臣則安知雲物一有之字赤黄蒼黒進我輦輅就我鈞陶一作陶匏雖有光華之萬状不若豐穰於四郊凢百庶僚相趨而顧稍疑江上之竒一作綺果異封中之素補天者維一作雖欲抑之而不出簪筆者安可寝之而無賦越明日臣稹詠霈澤於雞竿之前覩斯雲散之為五彩之湛露元稹有集印行今間取二三為一作南至郊壇有司書雲物賦以題為韻崔立之唯皇動天辨方正位稽大明於北陸郊上𤣥於南至五夜祗肅載維列祖之誠三日罔􅄽用表致齋之意於是乘法駕鳴和鸞玉漏聲曉金波影殘環衞儼以星拱簮裾列而雲攅備肅肅之盛禮咸濟濟於靈壇大吕雲門既六變而斯閱嘉栗旨酒感百神而具懽矧器用陶匏藉以包茅光逾泰畤馨邁周郊朱火煬煙逺浮於華葢𤣥酒明水近映乎長旓懿夫宇宙氛氲晴郊景曛宗伯司禮保章辨雲榮光燭於九野佳氣覆於六軍飄飄颻颻郁郁紛紛足以昭上帝瑞吾君時謂唐時歌卿雲之五色徳稱虞徳詠南風之再薫是以惟聖惟夀可大可久既豐稔之足徴復災癘一作眚之何有既而旋天歩廻象輿大孝是展皇情未攄将欲超羲軒於上古方淳樸於太初俾時和俗阜塗謡史書土階攸則而瓊室靡居且慮乎賢􅈒尚屈所以敦於雲物􅃡乎徳化未覃所以郊於國南祈動植之攸濟匪娯樂而是甘然後景福來格無疆在兹笑竹宫之求應鄙宣室之受釐是以降哀矜之詔宣惻隐之慈布政施徳逮惸與􅄔舉沉淪於是日庶聞之於有司南至郊祭司天奏雲物賦以題為韻郭遵惟肇祀於上𤣥必展禮於南至至者作候故用其吉辰南則嚮明故就於陽位葢取諸吉土以父事天降皇車以盡敬奉蒼璧以告䖍至誠遂通禎祥不能以自閟幽贊不昧雲物於是乎昭宣及夫盛禮既畢大駕言旋兆人仰觀於空際太史伏奏於君前曰當此和煦静無纎氛照曜兮天垂愛景霏㣲乎山出祥雲度青霄而匪徐匪疾向丹闕而乍合乍分應乎一陽之始焕乎五彩之文氤氲摇曵去來無際望之雖曰崇朝慶之知其嗣嵗誰謂其有葉本乎觸石而來誰謂其無心偏舒捧日之勢豈非夫表王者之殊祉荅泰壇之親祭者也天子乃命百辟詔有司載筆以茲記事祝史叶其正辭國慶可徴寧虞於水旱年豐有待先詠其京坻自躋仁夀之域肯繼春秋之時且南正上言休徴無咈肯比夫觀臺之望将為備於雲物子月之祀隂陽始交豈比夫魯史所紀候啟蟄而乃郊我禮踰舊我祥靡究望嵗而知嵗之穰祀天而受天之祐五雲八風之異寸眸遂占三百六旬之期一日可候不然者何以炳焕圖牒發揮草奏是知郊祀而漢武奚匹推厯而軒后懐慙照臨之明兮将日月並出覆載之廣兮與天地同參臣有覩盛儀而瞻瑞物願齊聖夀於終南南至雲物賦以題為韻王諲於赫至化時惟大君推厯比夫軒后授人齊乎放勲北風戒節南至司分驗律飛灰遥應乎懸炭登䑓視祲必在乎書雲麗乎時方别色天歛殘氛星連珠而候曉日合璧而呈文衆瑞咸集禎祥荐至雲散黄光天浮喜氣金柯郁郁而蔽野玉葉飄飄而委地廻紀天表永無兵意災沴靡作罷札瘥之虞水旱不行詠京坻之亊得此先甲還同漢日之觀報以豐年不假春秋之備于時帝在暘谷風后陪驂㑹玉帛而塗山有愧朝公卿而汾水懐慙佳氣從龍遥連渭北非煙拂日俯對終南懿聖夀之與萬美皇道而超三保章告其符祉太史視其簮紱應子月兮生一陽奏黄鍾兮動萬物乃明南至者日極之數視雲物者嵗占之故其在必書不􅄽常度慶瑞滿於圖牒獻納盈其府庫鳳凰下於𤣥都銅雀棲於温樹調玉燭而隂陽爕和撫黔首而時令大布日之方夕嵗聿云暮才非瞽史未知天道之祥文似相如願獻凌雲之賦秋晴曲江望太一納歸雲賦以題中字為韻喬潭秦稱百二鎮為太一合沓横空嶔岑蔽日豈瓌寳之攸産葢雷雲之自出宜其宻爾王甸雄茲帝京敗葉風輕髙秋氣清時雨夕歇歸雲晩晴俯枕曲水前臨直城山半隐而半見雲乍低而乍傾其趣可賞而不極其容可状而難名爾其沉隂始解靄䨴初歸廻日猶重因風則飛其始也峨峨巍巍千巖萬嶺稠疊而相威其漸也紛紛霏霏齊童趙女並舞而垂衣忽天澄而地廓欝氛氲於翠微别有容與之勢輕盈之状日下空籠天邉引颺始悠悠於緑野漸羃羃於青嶂洛川神女何以踰巫峽佳人不能上雖更僕而非久仍移景而堪望落日将曛山銜㫁雲緑氣隂欝嵐光氤氲横截髙巖驚數峰之頓失却臨幽石與殘雪而俱分乃為歌曰節彼南山兮人所矚施此雲雨兮濟君欲信軌物之無􅄽奚百姓之不足徘徊不去乃賦歸雲之曲曰歸雲之狀兮不一歸雲之趣兮難儔雲不以朝晡而異賞士不以前後而異求誠在位之如是知夫鴻漸之髙秋早秋望海上五色雲賦以餘霞散成綺為韻張何夫幽棲多暇樂道閒居坐文章之苑囿放精思以畋漁詠太冲之招隐諷相如之子虚覩蘭凋而蕙歇傷夏巻而秋舒昇重軒以徙倚目平海而踟蹰見五雲之間出繞三山而忽諸映烏晶之曭朗涵蜃氣之紓餘光泛泛而逾净影離離而不踈懿夫騰碧海瑞皇家金柯玉葉兼雜花文璀璨光紛華况夫羅幃錦帳繞香車雙虹宛轉縈翠霞及夫倐而聚忽而散霓裳羽斾相陵亂倚長空浮逈岸宛若瓊樓金闕横天半美人濯錦春江畔既而叢彩可望竒状難名羣象糾紛疑綺羅之繡出五色眀媚若丹青之畫成影沉波而海晏氣羃岫而山晴嗤碭嶺之光淺耻汾川之色輕壮瑞圖之舊籙應樂府之新聲似帝鄉之迢遰兾有司而見行悠悠帝國三千里不託先容誰􅃷美希君顧盼當及時無使霏微散成綺日暮碧雲合賦宋昱夕望兮見碧雲之出岑過太液拂上林配藜四施掩映千尋混蒼蒼之正色垂漠漠之輕隂西陸月弦南山風落輕濃象似倐忽龍蠖集髙議之䑓連寓直之閣亭亭廣陌異公子之飛葢裔裔長空如美人之巻幕遂能不逺仙宅來遊帝鄉無心而生自浮洛以徼瑞感化而動乃干吕而呈祥同君子之出處均至人之行藏故吾儕從政之暇觀此而一詠一觴已乎已乎余未始兮可量者也秋雲似羅賦以蘭亦堪采為韻侯喜雲之可觀時惟佩蘭映婺女而扇薄透姮娥而幔寒縹緲如畫霏㣲似殘乍逐乗槎之人訝鴛裾逺曵毎暎銜蘆之鴈謂鷰幕遥㸔且曉霧如縠于今何在餘霞成綺須㬰則改詎若我終日是似有時而待擬六銖而披拂伴仙女降衣臨七夕以輕盈助牽牛納采羃羃風引籠籠露涵染綘日而成蒨暎青空而似藍氷綃若無孰不比方而皆忝霓裳儻有誰謂裁縫而不堪吁嗟乎一言有以千秋只亦天網本踈春絲不敵今夕何夕是尋是尺如可求斯服之無斁文苑英華巻十一
