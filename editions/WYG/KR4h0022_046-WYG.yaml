body:
  text: 文苑英華卷四十六宋李昉等編邑居二灞橋賦二首河橋賦一首河堤賦一首河橋竹索賦一首沙堤賦一首鞭石成橋賦一首萬里橋賦一首題橋賦一首日中為市賦一首灞橋賦以水雲輝映車騎繁雜為韻杜顔溶溶𤣥灞兮經秦川之有餘􅒁􅒁紅橋兮代造舟之厥初飛梁黙以霞起綵柱􅈌其星舒九陌咸凑三條所如連山疊翠而西轉羣樹分形而北疎電透孤棹雷奔衆車白日南登望長安之如綺黄煙東睇見咸陽之為墟杲杲初霽蕭蕭晩吹登隱者之翹車度將軍之獵騎日既上已禊于洪源晩具遊宴咸出國門七葉衣冠憧憧而遥度五矦車馬奕奕而騰軒鍾皷既列絲竹亦繁秦聲嘔哇楚舞叢雜帷帟紛其霧委羅紈靄以雷沓掉輕舸之悠悠順清流之納納時憑倚以觀眺喜煙花之環合爾其居人出祖連騎將分望曲溆之清路視逺天之無雲紫沙兮皓晃緑樹兮氛氲莫不際此地而舉征袂遥相望兮愴離羣明月生岑涼風度水聽鳬鴈之悽􅃤對苔蘋之靃靡或披襟以延佇獨掩涕而無已上臨煙碕霞石相輝過客對兮澹忘歸下近巖逕林巒隱映漁人去兮恣誦詠獨遊子而俟時倦塵衣以嗟命第二同前韻王昌齡聖人以美利利天下作舟車禹乃開鑿百川紆餘舟不可以無水水不可以通輿遂各麗於所得非其安而不居横浮梁於極浦㑹有跡於通墟借如經綸淮海陶皷仁義藏用於宻動物以智每因宜以制模則永代而取寄伊津梁之不設信要荒之莫致思未濟於中流視安危之如戲故可取於古今豈徒閲千乗與萬騎惟梁于灞惟灞于源當秦地之衝口束東衢之走轅拖偃蹇以横曳若長虹之未飜隘騰逐而水激忽須臾而聽繁雖曰其繁潰而不雜懐璧拔一作杖劒披離屯合當遊役之嗷嗷自洪波之納納客有居於東陵者接行埃之餘氛薄暮垂釣平明去耘傍連古木逺帶清濆昏曉一望還如陣雲乃臨川而嘆曰亡周霸秦舉目遺址前車後軌不變流水嘆往事之誠非得兹橋之信美皇風不競佳氣常依既東幸而清道每西臨以駐旂連袂挾轂煙闐雨飛未見暉字官韻嗟乎此橋且悅明盛徒結網於川隅視雲霞之輝映聊倚柱以嘆息敢書橋以承命河橋賦以山河魏國寳為韻閻伯璵壯三輔之雄極非魏國其伊那總魏國之繁隘非斯橋而豈一作匪他條山左臨髙嶂東連於渤海晉闗右抱浮梁西截於長河却頓鐵牛駭浮川之魍魎旁飛畫鷁驚入浪之黿鼉竹笮其維不虞於奔濤擘赫金鏁斯纜何懼於層氷皚峨川有梁兮閃疑聞於揭渉王在鎬兮有格於來訛葢取諸益其不謂何故馬卿之歘爾斯題請觀即事尾生之溘焉守死夫奚足多豈比夫虹能象兮不可以來往鵲能填兮不可以經過若斯之利用吾賔薦之士亦可歌頌諸侯之盛績樂王化之雍和爾其薄煙霏霏初日杲杲逺之而望勢侔神造既似乎瀑布之界天台又似乎蓬萊之横海島虚其内則用當於無䟽其間則屈而且抱憑險作固夾咽㗋之重開疑作闗用否而通連秦晉之長道東西水滸義非待於秦求襟帶山河固可兼之於魏寳爾其憧憧往還曳曳空間華柱上征殊馬援之標界石臺中聳若鼇力之負山偉哉武侯時賞兹國况天樞要作限通塞旁達無垠下臨不測舟形﨑嶬似火龍之飲川梁勢編綿疑海鵬之㸃翼其拯物也有來斯適其濟時也遐方不亟非夫蓄巨川之運迴斡地之力則何能掄梓材以當路臨要津而作式守此道也夫有何極然而物有成規國有虚費信彼才之可取奚此橋之獨貴使夫期不日以獻珠連城而出魏河堤賦吕令則水以潤物飛梁載舟居信順動法謙處柔朝滄溟以委輸習坎德以安流善利為水涵育乎萬族極深不測灌注乎九州擁之則有備無患決之則致敗二字一作靡致為憂先設其防以遏奔潦興板築䕶衢道惟精惟一是經是造其奮鎚也齊呌以雷震其輝疑作揮鍤也連刃以霜皓矗長堤其若雲岌修岸其如島何固䕶之克壯息奔突以永保既夾植於菱蓮又夤緣於萍藻雖興役賦而一勞永固牛馬由其望辨樓船可以逕度清深鏡澈時升曳尾之龜左右人稀每帶銜魚之鷺行旅於是乎無虞耕耘於是乎知措夫水可以為人之利堤可以防水之溢堤修則中國無憂水敗則下人多恤亦由人之為政政成人之逸政或不成姦詐以出則河堤之義取類非一可以合人之安危可以喻政之得失凢百在位慎乃終吉别有沈淪戒忤飃䬙衢術幸登渉於河堤冀一作亦霑濡於瑣質河橋竹索賦以誰謂河廣一葦航之為韻張仲素大川不測以設險浮橋架迥以通逵利乎濟也或溢解乎難也無私以虚舟而易蕩屬激箭以相推吾見其梁木斯壞安得稱大道甚夷肇彼謀者莫知其誰於是辦修笮曳長縻侔可久以為慮將制動而咸資且夫原始要終授材度費徵十圍之巨收千古之貴費非難得用之不既易危成安斯之所謂憑逺岸亘長河將好勁以横截或守柔以旁羅每自直以應用恒守節而居多檻欄之勢舳艫之廣因大索以横流俾羣材之攸仰皆恃此以綰縶故不憂於析蕩徒謂其勁挺為質連延不一或指逺岸以孤引或自中灘而對出苟易志而殊途亦齊勞而共逸縱奔澌激射浮湍迅疾駭聲騰雷驚波湊日雖前後之皷怒終上下而駢比拔山之倫扛鼎之匹雖則取之大壯抑亦執之或失豈不以順事安排故能守乎元吉斯乃道濟行路功深模軌人有觀於投足物寧憂於濡尾視綯索而久存亦何比於一葦况橋因索而襲固索以橋而用長力雖參於索鐵繫或固於苞桑恢益下之極致信為物之紀綱彼黿鼉虚構於溟海烏鵲徒駕於天潢惟衆人之攸利葢有助於連航夫物有小而可以屬詞材有小而足以濟時索因有條而不紊人亦直道而用之儻要津以見假願盡力以維持沙堤賦以隱以金椎樹之青槐為韻韋肇遵大路乎新謀倚善人之廣運沙之積也得禦濕之宜堤乃名焉審用功之分爰謀爰度是築是隱使夫晴靡磽确之煩雨無塗潦之窘若然者施之城闕豈但三條之通用之郊坰可以千里而近伊功足紀斯美奚擬臺或虧簣我終始兮無然山不讓塵我包含兮亦爾應物兮寧倦安卑兮詎恥俾時行各得其所由故日用不知其所以君勿謂泥滓之賤君其乗宏益之深髙而不危仰諸侯之殊化直而能正定志士之夙心何止禦浸淫而為岸或當披隤阤而揀金其處也周帝城之内徒有羡於瑶池其堅也雖衆人之力固自得於金椎亦由道存而命舛天縱而非師是以遽疑奔衝應馳騖洞萬戸兮旁啓紛九門兮争赴往來相接見軒葢之成隂蹊逕自開何桃李之足樹役無妨時利莫尚兹豈衢於踰且以疑夫大為防也能保其固匪同中聚而兩之仰對髙闕兮熒熒夾植喬木兮青青無偏無頗庶託情於王道不騫不圮長委質於地靈願得乗御輦䕃宫槐敢邀功於捷徑期展効於微埃徒一作人以為臨曲沼登髙臺誠不如賦沙堤之盛觀足以騁作賦之才鞭石成橋賦以秦皇舊跡至今尚存為韻韋充石雖至大兮水亦能受以水浮石兮其功難就何異術之得中忽成橋於海右是必窮恠力極宇宙將觀光於暘谷亦誇功於周舊在昔嬴氏八表初吞言巡日域遂瞰海門感召初牽以表迴山之力崚嶒斯至皆呈見血之痕誠隂陽之不測與天地而長存當其大駕臨流羣官列位皇威赫其斯震巨石矻以前至豈惟韞玉皆符投水之姿不俟造舟自叶濟川之利所以驅汗漫走嶙峋架巨壑越通津始峩峩而聚轉忽蕩蕩而惟新岳立星馳異成名於隕宋神符鬼助若受命於强秦故得勢壓長源影分髙浪似迫官刑之急如一作急構凌波之壯萬靈却走藹朝景以先驅五色争臨杳如虹之可望硉矹初定峥嶸不讓烏鵲未足以比倫黿鼉故難其想尚萬變千化杳杳茫茫將持峻極以配靈長投跡皆因於水府推功可謝於媧皇嗟乎代異人殊山空地寂邈矣前事依然故跡對江海之上終感逝川在陵谷之中徒為恠石則知帝王之道貴乎居深日月之異難可窺臨馳騁固傷於至德亂神終歎於非今一作終戒於方今萬里橋賦以殊鄉絶邑行役路偏為韻陸肱萬里兮蜀郡隨都二橋兮地角天隅相去而如乖夷貊曾遊而只在寰區倚檻多懐結長悲而莫極憑川試望思逺道以何殊昔者滄海朝宗岷山發跡期觀理水之要若啓鑿穴之役逮夫東土為揚西邦曰益架長虹於兩地客思迢迢浩積水於千秋江流脈脈宇宙綿綿今來邈然結構應似途程甚偏將蹔遊於楚岸欲經疑作徑度於巴川目斷波中過巫峯之十二心馳路半到荆門而五千􅑫觀夫偃蹇東流峥嶸二邑揭華表以相効刻仙禽而對立俄驚迴復潮生而夕月初明孰敢争先㠶去而秋灘正急眇天末之殊方有人間兮異鄉顧盻而層隂動色徘徊而浮柱生光飾丹雘以雖同彼臨淮海度軒車而既易此對銅梁古來幾許行人曾遊此路跨緑岸以長存俯清流而下注寧為雜疑作駐足之所莫問傷心之故復有逆旅傷情臨卭逺行壯宏製以靈矗壓洪流而砥平家本江都羡波濤而自返身留蜀地偶萍梗以堪驚迤邐歸遥飄流恨結之子去兮揚桂棹長卿還兮建龍節既風月以相間固音塵之兩絶斯橋也可以濟巨川之往來不可以攜手而相别題橋賦以望在雲霄居然有異為韻李逺昔蜀郡之司馬相如指長安兮將離所居意氣而登橋有感沈吟而命筆爰書儻並遷鸎將欲誇其名姓非乗駟馬􅊎不還於里閭原夫别騎留連鄉心顧望銅梁杳杳以横翠錦水翩翩而逆浪徘徊浮柱之側睥睨長虹之上神催下筆俄聞風雨之聲影落中流已動龍蛇之壯觀者紛紛嗟其不羣染翰而含情自負揮毫而縱意成文渥澤向疑作尚遥滴瀝空瞻於垂露飜飛未及離披且覩其崩雲意以立􅊎無疑傳芳不朽人才既許其獨出富貴應知其自有潛生肸蠁之心暗契縱横之手於是名垂要路價重仙橋離離逈出一一髙標參差鳥跡之文旁臨一作隣綵檻踴躍鵬摶之勢下視丹霄既而玉壘經過金門寵異方陪侍從之列忽奉西南之使乗軺電逝於遐方建節風生於舊地結構如故髙低可記追尋往跡先知今日之榮拂拭輕塵宛是昔時之字想夫危梁蘚剥漬墨蟲穿長含氣象久滯風煙幾遭凢目之見嗤徒云率爾終俟瓌姿之後至覺始昭然所謂題記數行寂寥千載何搦管而無感如合符而中在警後進而慕前賢亦丁寧而有待日中為市賦以日中而市易志所明為韻失名曜靈正中交易必萃諒農皇之善制著噬嗑之明志葢取諸酌中以畫一用取夫定凖於列四遂得販繒之子候當午以貟來抱布之徒恐移躔而忽至於是旗亭滅影賈旅協時睹稠人之並凑測端景以交一作是期雜一作交錯相酬而豈畏日之將夕貿遷以退寧憂其室信逺而是前王之所則實後代之攸資當夫相髙以夸美言為市競駕肩以求進争掉舌而一作以明㫖貨聚於未映之標州處於逾已之紀咸寸隂而時惜望兼贏以畫履衆寳麕至族蟻同風當大明之方盛求善價以不窮葵藿未傾而靡􅄽其候有無交鬻而允執厥中物各以時貨遷乃日瞻陽烏之未旰索青蚨以競出質劑由是與行權廥漢趙王彭祖傳為賈人權㑹疑用此事於焉積實則知日以中為政市以利為名不求端以取表奚立法而作程俾居物致富之流心之有待方不盈不縮之際時即可明景既唯恒人得其叙何逺珍之不至曷近利之為阻賈用不售者當此之歸求之不得者於焉獲所此乃時不差利同射亘五都之所共厯百王而不易是以知日中為市之義豈空書於往籍文苑英華卷四十六
