body:
  text: 文苑英華巻二百五十九宋李昉等編寄贈十三孟郊九首張籍一十二首李廓一首章孝標六首賈島二十三首擢第後東歸書懐獻座主吕侍郎孟郊昔嵗辭親淚今為戀恩泣去住情難竝别離景易戢夭矯太空鱗曽為小泉蟄幽意獨沉時震雷忽相及神行既不宰直制集作致非所執至運本遺功輕生各一作苦自立大君思此化良佐自然集寳鏡無私光時文有新習慈親誠集作誡志就賤子歸情急擢第謝靈臺牽衣出皇邑行襟海日曙逸抱江風入蒹葭緑波浪芙蓉紅岸濕雲寺勢動摇山鍾韻噓吸舊逰期再踐懸水得重挹松蘿雖可居青紫終當拾以下九篇並見集本贈張端公前人君子量不極胷吞百川流嫉邪霜意一作氣直問客集作俗春辭柔日户晝暉靜月杯宵景幽詠驚芙蓉發嘯激風飈秋鸞歩獨無侣鶴音清一作仍寡儔幸霑分寸顧散此千萬憂古意贈梁補闕前人曲木忌日影䜛人畏賢明自来集作然照燭間不受邪佞輕不有百鍊火孰知寸金情集作精銅鈆正同鑄願分麤與精集作金鈆正同鑪願分精與麄以避精字贈章仇兵馬使集作大隠詠章仇將軍良弃功守貧前人飲君滄一作江海心誰能辯淺深揖君髙山岳集作山岳徳誰能齊嶔岑東海精為月西岳氣凝金進則萬景盡退則羣物隂吾集作我欲薦此言天門峻沉沉風飈亦感激為我颼颼吟上河陽李大夫前人上將秉神略至兵無血集作猛威三軍當嚴冬一撫勝重衣寒集作霜劒奪衆景夜星失長輝蒼鷹獨立時惡鳥不敢飛武牢鎻天闗河橋紐地機大君集作軍奚以安守此稱者稀貧士少顔色貴門多輕肥試登山岳髙始文粹作方見草木㣲山岳恩既廣草木心皆一作亦歸奉贈蘇州韋使君前人謝客吟一聲霜落群聽清文含元氣柔鼓動萬物輕嘉木依性植曲枝亦不生塵埃徐庾詞金玉曹劉名章句作雅正江山益鮮明蘋萍一浪草菰蒲片池榮曽終集作是康樂詠如今攀集作搴其英顧惟菲薄質亦願將此行集作并大隠詠崔從事鄭以正隳官集作以直隳職前人古人留清風千載遥贈君破松見真心裂竹見直紋集作看直文殘月色不改髙賢徳常新家懐詩書富宅抱草木貧安排一泉深集作安得一啼泉未化千尺鱗含意永不語釣璜幽水濵題陸鴻漸上饒新開山舍前人驚彼武陵牀移歸北巖邊開亭擬貯雲鑿石先得泉嘯竹索集作引清吹吟花討集作成新篇乃知髙潔情擺落區中縁贈韓愈前人何以定交契贈君髙山石何以寳貞資集作寳貞堅文粹作保貞妍又作寳貞賢贈君青松色貧交過此外無可相彩飾更有石集作聞君首䑕詩吟之堪淚滴集作淚空滴其集作石䑕既穿墉又齧機上絲穿墉有閒土齧機無餘絲集作齧絲無餘衣盖連押兩絲字朝吟枯桑柘暮泣空杼機豈是無巧妙絲斷將何施衆人尚肥華志士多羸饑願君保此節天意多察㣲登城寄王秘書建張籍聞君住鶴嶺西望自集作月依依逺客偏相憶登城獨不歸十年為道侣幾䖏共柴扉今日煙霞外人間得見稀以下十二篇並見集本寄昭應王中丞前人借得街西宅開門御集作渭水頭長貧唯要健漸老不禁愁獨凭藤書案空懸竹酒篘春風石甕寺㑹擬待集作意共君逰贈姚合少府前人病来辭赤縣案上有丹經為客燒茶竈教兒掃竹庭集作亭詩成添舊巻酒盡卧空瓶闕下今遺逸誰占集作聸隠士一作者星舟行寄李湖州前人客行集作愁無次第川路動集作重辛勤藻密舟行澁集作藻宻行舟澁一作萍宻移舟澁灣多檝轉頻集作轉楫頻薄逰空感惠客集作失寄自憐貧頼誦一作有汀洲句一作問時時慰逺人此詩二百九十三巻重出今已削去注異同為一作書懐寄王秘書前人白髮如今欲滿頭從来一作前百計集作事盡應休唯集作祗於觸事集作目湏防病不擬將心更養愁下藥逺求新熟酒看山多上最髙樓頼君同在京華内集作城住每到花時免獨逰贈王秘書前人不曽浪出謁公侯唯向花間水畔逰毎酌新泉㸔藥竈多收古噐在書樓有官只作山人老平地能開洞穴幽自顧閒思無别事集作自領閑司了無事得来君處喜相留寄白二十二舍人前人蚤知内詔遇先輩蹭蹬江南百事踈湓浦城中為上佐爐峯寺後着幽居偏依仙法多求藥長共僧逰不讀書三省此来名望重肯容君意集作去樂樵漁寄蘇州白二十二使君前人三朝出入紫㣲臣頭白金章未在身登第蚤年同座主題書今日是集作異州人閶門柳色煙中逺茂苑鶯聲雨後新此處吟詩向山寺知君望㫁集作望却曲江春寄元員外前人外郎直罷無餘事歸掃書堂對藥爐門巷不教當閙市集作要市詩篇轉覺足功夫月明臺上惟僧到夜静坊中有酒沽朝省入頻閒日少可能同作舊遊無贈趙將軍前人當年膽畧已縱横毎見妖星氣不集作未平身貴蚤登龍尾道功髙自破鹿頭城尋常得對論邊事委曲承恩掌内兵㑹取安西將報國凌煙閣上蚤集作大書名贈賈島前人籬落荒凉僮僕饑樂逰原上住多時蹇驢放飽騎將去集作出秋巻裝成寄與誰拄杖傍田尋野菜封書乞米趂朝炊姓名未上登科記身屈唯應内史知贈商州王使君前人銜命南来㑹郡堂却思朝裏接班行才雄猶是山城守道薄初為水部郎選勝相留開客舘尋幽更引到僧房明朝從此辭君去獨出商闗路漸長上令狐舍人李廓名引集作利生愁地貧居嵗集作逐月移買書添架上斷酒逐集作過花時宿客嫌吟苦乖童恨睡遲近来唯儉静將此答深知思越州山水寄朱慶餘章孝標窓户潮頭雪雲霞鏡裏天島桐秋送雨江艇暮摇煙藕折蓮芽脆茶桃茗荈鮮還將歐冶劒更淬若耶泉蜀中上王尚書前人梓桐花幕碧雲浮天許文星寄上頭武畧詔環輝一作劍鋒環相府詩情錦浪浴山州丁香風裏飛牋草卭竹煙中動酒鈎自古髙名閒不得肯容王粲賦登樓贈劉侍郎子弟三人一時及第前人文動星辰衣彩霞問誰兄弟是劉家鴈行雲接參差翼庭樹風開次第花天假聲名喧日月國慿騷雅變浮華曽看晉漢儒家一作流傳龍虎雖多不足誇題東林寺寄江州李員外前人山勢稜層入杳冥寺形髙下趂山行象牙床坐蓮花佛瑪瑙凾盛貝葉經日映砌隂移寳閣風吹天樂動金鈴門前更有清江水便是潯陽太守㕔錢塘贈武侍御翊黄前人曽將心劒作戈矛一戰名場造化愁花錦文章開四靣天人科第上集作占三頭鴛鴻待侣飛清集作中禁山水縁集作延情住外州時伴庾公㸔海月好詩吟斷望潮樓贈陸鬯浙西進詩除官前人帝城雲物得陽春水國煙花失主人昨日天風吹樂府六宫絃管一時新再投李益常侍賈島何處初投刺當時赴尹京淹留花木變然諾肺腸傾避暑蟬移樹登髙鴈過城人家嵩岳色公府洛河聲聫句逢秋盡嘗茶見月生新衣裁白紵思從曲江行以下二十二篇竝見集本寄錢庶子前人曲江春水滿北岸枕集作掩柴闗祗有僧隣舍全無物映山樹隂終日掃詩債集作藥價隔年還猶記聼琴夜寒燈竹屋間宿姚合宅寄張司業前人閒宵因集㑹柱史話先生身愛無一事心期徃四明松枝影摇動石磬響寒清誰伴南齋宿月髙霜滿城黄子陂上韓吏部前人石樓雲一别二十二三春相逐升堂者㡬為埋骨人涕流聞染集作度瘴病起賀還秦曽是今集作令勤道非唯卹在屯踈衣蕉縷細爽味茗芽新鍾絶滴殘雨螢多無近鄰溪潭承到數位秩見辭頻若箇山招隱機忘任此身喜姚郎中自杭州回前人路多楓樹林累日泊清隂来去泛流水翛然適此心一披江上作三起月中吟東省期司諫雲門悔不尋贈李金州前人綺里祠前後山程踐白雲泝流隨大斾登岸見全軍曉角吹入夢秋風巻鴈羣霧開方露日漢水底沙分寄宋州田中丞前人古郡近南徐闗河萬里餘相思深夜雨集作後未逹去年集作秋書自别知音少誰忘識靣初舊山期已乆門掩數畦蔬寄劉侍郎前人衣多苔蘚痕猶擬更趨村集作門自夏雖無病經秋不過原積泉留代鴈疊岫集作嶼隔巴猿琴月西齋集如今豈復言秋暮寄友人前人寥落闗河暮霜風樹葉低逺天垂地外寒日下山西有志煙霞切無家嵗月迷清宵話白閣已負數年棲寄胡遇前人一自殘春别經炎復到凉螢從枯樹出蛩入破堦藏落葉書勝紙閑砧一作砥坐當床東門因送客相訪也何妨寄武功姚主簿前人居枕江沱北情懸渭曲西數宵曽夢見㡬度得書批驛路穿荒坂公田帶淤泥静棊功奥妙閒作韻清凄鋤草留叢藥尋山上柏集作石梯客迴河水漲風起夕陽低空地苔連井孤村火隔溪巻簾黄葉落鏁印子規啼隴色澄秋月邊聲入戰鼙㑹湏過縣去况是屢招携重與彭兵曹前人故人在城裏休寄海邊書漸去老不逺别来情豈疎硯氷催臘日山雀到貧居羡有平戎計官家集作蒙别勅書一作官名勑盡除前已押書字寄賀蘭朋吉前人徃徃東林下花香似火焚故園從小别夜杵集作雨近秋聞野菜連寒水枯株簇古墳泛舟同逺客尋寺入幽雲斜日扉多掩荒田徑細分相思蟬㡬處偶坐蝶成羣㑹宿曽論道登髙省議文苦吟遥可想邊葉向紛紛上邠寧邢司徒前人箭頭破帖全集作渾無敵杖底敲毬逺有聲馬走千蹄朝萬乗地分三郡擁雙旌春風欲盡山花發曉角初吹客夢驚不是邢公来鎮此長安西北未能行處州李使君改任遂州因寄贈前人庭樹幾株隂入户主人何在客聞蟬鑰開原上髙樓鎻瓶汲池東古井泉因趂集作趂静野僧曽後到休吟隣叟始安眠仙都弱集作山水誰能憶西去風濤書滿船投龎少尹前人閉户息機搔白首中庭一樹有清隂年年不改風塵趣日日轉多泉石心病起望山臺上立覺来聽雨燭前吟龎公相識元和嵗眷分依依能至今賀龎少尹除太常少卿前人太白山前終日見十旬假滿擬秋尋中峯絶頂非無路北闕除書又入林朝謁此時閒野屐宿齋何處正鳴砧省中石蹬陪隨歩唯賞煙霞不厭深贈翰林學士前人清重無過知内制從前禮絶外庭人看花在處多隨駕召宴無時不覲集作及身馬自賜来騎覺穩詩縁見徹語長集作當新應憐獨向名場苦曽十餘年浪度集作過春寄韓潮州前人此身集作心曽與木蘭舟直到天南潮水頭隔嶺篇章来華岳出闗書信過瀧流峯懸驛路殘雲斷海浸城根老樹秋一夕瘴煙風捲盡月明初上浪西樓黎陽寄姚合前人魏都城裏逰從熟才子齋中止泊多去日緑楊垂紫陌歸時白草映集作夾黄河新詩不覺千廻詠古鏡還曽一集作曽經㡬畨磨惆悵心思滑臺北滿杯濃酒與愁和三月晦日贈劉評事已見一百五十七巻前人戱贈友人前人一日不作詩心源如廢井筆硯為轆轤吟咏作縻綆朝来重汲引依舊得清冷書贈同懐人詞中多苦辛寄逺前人别腸多鬰紆豈能肥肌膚始知相結宻不及相結踈踈别恨應少宻離恨難祛門前南流水中有北飛魚魚飛向北海可以寄逺書不惜寄逺書故人今在無况此數尺身阻彼萬里途自非日月光難以知子軀文苑英華巻二百五十九
