body:
  text: 文苑英華巻三百七十五宋李昉等編論事西邊患對一首叛解一首罪言一首原十六衛一首書田將軍邊事一首西邊患對沈亞之元和十有二年夏六月亞之西出咸陽行岐隴之間採其風得西土亡降故老為余言邊之所以為患可痛之狀辭甚條悉或短曰微叟以西戎蠕蠕之旅而為邊出若言使聞北塞匈奴雜虜之風叟曽不哭文粹作知也盖天子之憂甚勤與師長分節符給所用以事邊何困對曰不然今言所以為患者非一因此而邊兵不得習伎險不得為固百姓不可為生如此吏尚輕易之然則北虜匈奴雖以逸馬强弓乗嚴寒時南馳其來衆不過數千其所掠民財貨一人所舉而已猶鷙隼不能止屯兵留塞且北逈集作過千里而屬􅇏望其興塵知奔蹄之幾受降城故事云虜南下望其塵髙下則知衆寡視其狀則􅇏燧次發然後收民畜嚴壁而待之且每嵗八月戌有清野之火使其馬無所食彼縱至不暇解鞍而旋矣而西戎則不然其衆蟻聚多包山川沮陸之利其兵材雖集有一字不能當唐人然其䇿甚逺力戰不患死所守必險所取必地而唐人軍中以為材不能皆易之故自安西以東河蘭伊甘及西涼至於㑹寧天水萬三千里凡六鎮十五軍皆為西戎有由易而見亡也聞其始下凉城時圍兵厚百里伺其城既窘乃令能通唐者告曰吾所欲城耳城中人無少長即能東吾亦謹兵無令有傷去者城中争號曰能圍即集有東字解其後取他城盡如凉城之事由此人人皆固生無堅城意自得集作羅其䇿以來為語相傳尚近奈何客獨不聞其説乎岐隴所以可固者以隴山為阻也昔其林比避必切繁故戎不得為便道今盡於斬伐矣而蹈者無集作有字不逹且又虚兵集有之字號與實十五又有非戰闘而役入山林伐麞集作麋鹿熊集作羆麏麝豪豕是徭者居十之三窮嵒障芟集作剃繁取材斤聲合呌不息於寒暑是徭者居十之四發畜粟金繒文松大梓竒藥珍集作言禽薰臭之具挽轅於陸浮筏於渭東抵咸陽入長安部署相屬是徭者居十之二其餘兵當守􅇏擊柝晝夜捕候者則皆困於饑寒衣食或經時不賑顧其心怨望幸非常尚能當戎耶是皆賴主上聖神彼戎畏其化而不敢東刄今岐隴之土甚饒而農食不充秕稗衣結縷無完集作帛布其租稅納粟官一而耗倍細吏憑法而要賂賂厚者雖逋亦寛之粟雖後至必亟與符賂薄者或稽一日即白吏笞之粟當輸則曰次當某人又當某人故有累日而不得者其他征徭倣此農盡所獲不能出其費尚無不忍吏是民由蓬息而處又何聊生今所患衆多其畧可痛如此長吏終不省尚輕易之噫奈何為不困叛解李甘或曰申恒何讐而叛解曰盗賊富家文粹作豪讐乎且惏其財而强索之若寃其主也申習盗恒習賊差乎解曰害財曰盗以盗害人曰賊天下有士家之有紵粟也天下有相家之有子弟也申憑葉縣非盗歟恒驚宰相非賊歟或曰有盗一金費千文粹作十金而可捕為之乎有賊一夫殺十夫而可磔行之乎今三年兵之一有費字非千文粹作十金而捕如費何萬人死之罪文粹無罪字非十夫而磔如殺何解曰以金為輕而不捕則窮人家家謀盗矣富人家家遇盗矣以一夫為寡而不磔則壯夫人人為賊矣懦夫人人被賊矣是故盡天下之盗者三年為蚤也勝天下之賊者萬人為少也或曰吾聞勇夫重閉盍鍵乎解曰天雨垣敗盜賊乗之門之閉耶曰以彼習叛之巧也贖而吏之何如解曰盗賊欲巧吏不欲擾如贖娼而為妻也為娼且滛為妻且禁乎者也文粹無此二字罪言杜牧國家大事某不當言實言之集作之實有罪故以云集作罪言人生常病兵兵祖於山東􅉙於天下不得山東兵不可死山東之地禹畫九土一曰冀州舜以其分野太大離為幽州為并州程其水土與河南等常重十一二故其人沈鷙多材力重許可能辛苦自魏晉已下𦙍浮羨滛工機纎雜意態百出俗益卑弊人益脆弱唯山東敦五種本兵矢他不能蕩而自若也復産健馬下者日馳二百里所以兵常當天下冀州以其恃强不順理冀其必破弱雖已破弱冀其後强大也并州力足以并吞也幽州幽陰慘殺也故聖人因其風俗以為之名黃帝時蚩尤為兵階阪泉在今媯川縣自後帝王多居其地豈尚其俗都之耶自周劣齊覇不一世晉太常傭役諸侯至秦萃銳三晉經六世乃能得韓遂折天下脊復得趙因拾取諸國秦末韓信聮齊有之故蒯通知漢楚輕重在信光武始於上谷成於鄗魏武舉官渡三分天下有其二晉亂胡作至宋武號為英雄得蜀得闗中盡得唐書作有河南地十分天下有其二字唐書作之八然不能使一人渡河以窺胡至于髙齊荒蕩宇文取得唐書作之隋文因以滅陳五百年間天下乃一家隋文非宋武敵也是宋不得山東隋得山東故隋為王宋為覇由此言之山東王者不得不可為王覇者不得不可為覇猾賊得之是唐書作足以致天下不安國家天寳末燕盗徐起出入成臯凾潼間若渉無人地郭李軰常以兵五十萬不能過鄴自爾一百餘城天下力盡不得尺寸人望之若廻鶻吐蕃義無有敢窺者國家因之畦河修障戍塞其街蹊齊魯梁蔡被其風流因亦以為㓂以裏拓表以表撑裏混澒廻轉顛倒橫斜未嘗五年間不戰生人日頓委四夷日昌熾天子因之幸陜幸漢中焦焦然七十餘年矣嗚呼運遭章集作孝武澣衣一肉不畋不樂自卑冗中㧞取將相凡十三年乃能盡得河南山西地洗削更革罔不順適唯山東不服亦嘗再攻之皆不利以返豈天使生人未至於帖泰耶豈其人謀未至耶何其難哉何其艱哉今日天子聖明超出古昔志於理平若欲悉使生人無事其要在先去兵不得山東兵不可去是兵殺人無有已也今者上䇿莫如自治何者當貞元時山東有燕趙魏叛河南有齊蔡叛梁徐陳汝白馬津盟津㐮鄧安黃壽春皆戍厚兵凡此十餘所纔足自䕶治所實不輟一人以他使遂使我力解勢弛熟視不軌者無可奈何階此蜀亦叛呉亦叛其他未叛者皆迎時上下不可保信自元和初至今二十九年間得蜀得呉得蔡得齊凡收郡縣二百餘城所未能得唯山東百城耳土地人户財物甲兵校之往年豈不綽綽乎亦足自以為治也法令制度品式條章果自治乎賢材奸惡搜選置捨果自治乎障戍鎮守干戈車馬果自治乎井閭阡陌倉廪財賦果自治乎如不果自治是助虜為虐環土三千里植根七十年復有天下陰為之助則安可以取故曰上䇿莫如自治中䇿莫如取魏魏於山東最重於河南亦最重何者魏在山東以其能遮趙也既不可越魏以取趙固不可越趙以取燕是燕趙常取重於魏魏常操燕趙之性命也故魏在山東最重黎陽距白馬津三十里新鄉距盟津一百五十里黎陽新鄉並属衛州陴壘相望朝駕暮戰是二津虜能潰一則馳入成臯不數日間故魏於河南間亦最重今者願以近事明之元和中纂天下兵誅蔡誅齊頓之五年無山東憂者以能得魏也田宏正來降昨日誅滄頓之三年無山東憂者亦以其能得魏也史憲誠來降長慶初誅趙一日五諸侯兵四出潰解以失魏也田布死昨日誅趙一日罷如長慶時亦以失魏也李聽敗故河南山東之輕重常懸在魏明白可知也非魏强大能致如此地形使然也故曰取魏為中䇿最下䇿為浪戰不計地勢不審攻守是也兵多粟多敺人使戰者便於守兵少粟少兵不敺自戰者便於戰故我常失於戰虜常困於守山東之人叛且三五世矣今之後生所見言語舉止無非叛也以為事理正當如此沉酣入骨髓無以為非者指示順向抵侵族臠語曰叛去酋酋起矣至於有圍急食盡餤屍以戰以此為俗又豈可與决一勝一負哉自十餘年來凡三收趙食盡且下堯山敗郗尚書士羨趙復振下慱敗杜叔良趙復振館陶敗李聽趙復振故曰不計地勢不審攻守為浪戰最下䇿也原十六衛國家始踵隋制開十六衛將軍總三十員屬官總一百二十八員署守集作字分部夾峙禁省厥初歴今未始替削然自今觀之設官言無謂者其十六衛乎本原事跡其實天下之大命也始自貞觀中既武遂文内以十六衛畜養戎臣褒公鄂公之徒並為諸御將軍外開折衝果毅府五百七十四以儲兵伍或有不幸方二三千里為㓂土數十百萬人為㓂兵蠻夷戎狄踐踏四作此時戎臣當提兵居外至如天下平一暴勃消削單車一符將命四走莫不信順此時戎臣當提兵居内當其居内也官為將軍綬有朱紫章有金銀千百騎趨奉朝廟集作謁第觀車馬歌児舞女念功賞勞出於曲賜所部之兵散舍諸府上府不越一千二百人五百七十四府凡有四十萬人三時耕稼襏襫耞耒一時治武騎劍兵矢禆衛以課父兄相言不得業他籍藏將府伍散田畆力解勢破人人自愛雖有蚩尤為帥雅亦不可使為亂耳及其當居外也縁部之兵被檄乃來受命於朝不見妻子斧鉞在前爵賞在後以首争首以力摶力飄暴交捽豈暇異略雖有蚩尤為帥雅亦無能為叛者一作也自貞觀至于開元末百三集作五十年間戎臣兵伍未始逆簒此聖人所能柄統輕重制障表裏聖筭神術也至於開元末愚儒奏章曰天下文勝矣請罷府兵詔曰可武夫奏章曰天下力强矣請摶四夷詔曰可於是府兵内剷邊兵外作戎臣兵伍湍奔矢往内無一人矣起遼走蜀繚絡萬里事伍强㓂奚契丹吐蕃雲南大食國十餘年中亡百萬人尾大中乾成燕偏重而天下掀然根萌燼然七聖旰食求欲除之且不能也由此觀之戎臣兵伍豈可一日使出落鈴鏠哉然為國者不能無也居外則叛韓黥七國近者禄山僕固是也居内則簒莽卓曹馬已下是也使外不叛内不􅆲兵不離伍無自焚之患將保頸領無烹狗之喻古今已還法術最長其置府亡衛乎近代以來於其將也弊復為甚也人囂曰廷詔命將也名出視之率市児軰盖多稽文粹作賂金玉負倚幽陰折劵交貲所能也絶不識父兄禮義之教復無慷慨感槩川文粹作激之節集作氣百城千里一朝得之其强傑愎勃者則撓削法制不使縳已斬族忠良不使違已力一勢便罔不為㓂其陰泥去聲巧狡者亦能家筭口歛委於邪倖由卿市公去郡得都四履所治指為别館或一夫不幸而壽則戞割生人畧匝天下是以天下每每兵亂湧溢齊人乾耗鄉黨風俗滛窳哀薄教化恩澤擁抑不下召來災沴被及牛馬嗟乎自愚而知之人其盡知之乎且武者任誅如天時有秋文者任治如天時有春是天不能倒春秋是豪傑不能惣文武是此軰受鉞誅暴乎曰於是乎在某人行教乎曰於是乎在欲禍􅗜不作未之有也伏惟文皇帝十六衛之旨誰復而原其實天下之大命也故作原十六衛書田將軍邊事孫樵背臨卭南馳越二百里得嚴道郡實與沉黎越雋俱為邊城逼於羣蠻田在賔將軍刺嚴道三年能條悉南蠻事為樵言曰巴蜀西逼于戎南逼于蠻宜其有以制之者當廣徳建中間西戎兩飲馬於岷江其衆如蟻前鋒魁健皆擐五蜀之甲持倍尋之㦸徐呼按文粹作接歩且戰且進蜀遇闘如植横堵羅戈如林發矢如蝱皆折刄失集作吞鏃不能斃一戎而况䧟其陣乎然其戎兵踐吾地日深而疫死者日衆即自度不能留亦輙引去故蜀人為之語曰西戎尚可南蠻殘我自南康公鑿青溪道以和羣蠻俾由蜀而貢又擇羣蠻子弟聚于錦城使習書筭業就輙去復以他繼如此垂五十年不絶其來則其學於蜀者不啻千百故其國人皆能習知巴蜀土風山川要害文皇帝三年南蠻果能大入成都門其三門大入成都是一句門其三門是一句今文粹集本盡削其三門三字而云大入成都門乃不成語賴英華可證其非四日而旋其所剽掠自成都以南越雋以北八百里之間民畜為空加以敗卒貧民持兵羣聚因縁刼殺官不能禁由是西蜀十六州至今為病自是以來羣蠻常有屠蜀之心居則息畜聚粟動則練兵講武集作戰非而又俾其習於蜀者伺連帥之間隙察兵賦之虚實或聞蜀之細民苦於重征且將啓之以幸非常李丞相固言鎮西蜀時有編民李􅁠者遣子齎書通蠻言蜀無備可取狀邊戍搜獲之按問得實棄市至今或有踵其所為者吾不知羣蠻此舉大劍以南為國家所有乎且每嵗發卒以戍南者皆成都頑民飽稻飫豕十九如瓠雖知鉦鼓之數不習山川之險吾常伺其來朔風正嚴緩歩坦途日次一舍固已呀然汗矣而况歴重阻即嚴程束甲而趨㧞㦸而鬬耶加以為將者刻薄以自入餽餫者縱吏而一作以䑕竊縣官當給帛則以苦文粹作踈而易良當賑粟則以砂而參粒每嵗當給帛主將輙先市輕帛以易重帛然後散諸邊卒當給糧下吏必先盜其米然後以砂補其數以給邊卒以此為恨四字集作常以口為怨之也如此則邊卒將怨望之不暇又安得集作能殊死而力戰乎此巴蜀所以為憂也樵曰誠如將軍言苟為國家計者孰若詔嚴道沉黎越嶲三城太守俾度其要害按其壁壘得自募卒以守之且兵籍於郡則易為役卒出於邊則習其險而又各於其部繕相美地分卒為屯春夏則耕蠶以資其衣食秋冬則嚴壁以俟其㓂虜連帥即能督之嵗遣㢘白吏視其卒之有無劾其守之不法者以聞如此則縣官無餽餫之費奸吏無因縁之盜兵足食給卒集有胥字無怨於將軍則如之何四字集作如何田將軍曰如此何患言卒遂書文苑英華卷三百七十五
