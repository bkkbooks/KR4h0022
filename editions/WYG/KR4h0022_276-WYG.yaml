body:
  text: 文苑英華巻二百七十六宋李昉等編送行十一武元衡十一首姚係三首馬異一首楊巨源五首楊衡九首陳羽八首歐陽詹二首韓愈十一首孟郊十首吕温四首送李侍郎集作郎中裴起居武元衡沱江水綠波喧鳥去喬柯南浦别離處東風蘭杜多長亭春婉娩層漢路蹉跎會有歸朝日班超奈老何送韋侍御司議赴東都前人洛京千里近離緒亦紛紛文憲芙蓉沼元方羔鴈羣河闗連鞏樹嵩岳接秦雲獨有秋風引集作思暌携不可聞送太常十二兄罷冊南詔却赴上都鄉路自兹始征軒行復留張騫随漢節王濬守刀州澤國煙花度銅梁霧雨愁别離無可奈萬恨錦江流送徐員外使還上都前人九折朱輪動三巴白露生蕙蘭秋意晚闗塞别魂驚寶瑟連宵怨金罍盡醉傾旄頭星未落分手轆轤鳴送李正字歸蜀前人已獻甘泉賦仍登片玉科漢官新組綬蜀國舊烟蘿劒壁秋雲斷巴江夜月多無窮别離思遥寄竹枝歌送吳侍御司馬赴台州前人盧耽佐郡遥川陸共集作若迢迢風景輕吳會文章變越謡煙林繁橘柚雲海浩波潮余有靈山夢前君到石橋送韋集作李秀才赴滑州謁大夫舅陌頭車馬去翩翩白面懐書羙少年東武楊公姻婭集作好重西州謝傅舅甥賢長亭呌月新秋鴈官渡含風古樹蟬知己滿朝留不住貴臣河上擁旌旃送張六諫議回朝前人詔書前日下丹霄頭戴儒冠脱皁貂笛怨栁營花集作烟漠漠雲愁江舘雨蕭蕭鴛鴻得路争先翥松桂凌寒識集作獨後凋歸去朝端如有問玉門闗外老班超同幕中諸公餞送李侍御歸䑓前人昔年專席奉清朝今日持書即舊僚珠履會中簫管急白雲歸處帝鄉遥巴江暮雨連三峽劒壁危梁上九霄嵗月不堪相送盡頺顔更為集作被别離凋送崔判官還集作使太原前人勞君車馬此逡廵我與劉君本世親兩地山河分節制十年京兆共風塵笙歌㡬處胡天月羅綺長留蜀國春報主自應集作由來須盡敵相期集作烟塵萬里寶刀新送唐次前人都門去馬嘶㶚水春流淺青槐驛路直集作長白日離亭晚望望煙景㣲草色行人逺送陸渾趙主簿宗儒赴任姚係山中渺然意此意乃平生長日望鳴騶遥對洛陽城故人吏為隠懐此為蓬􅌡夕氣渭巖上晨流潟岸明存亡區中事影響羽人情溪寂值猿下雲歸聞鶴聲及兹春始暮花葛正相縈會有携手日悠然去無程送周愿判官歸嶺南前人早蟬望秋鳴夜琴怨離聲眇然多異感值子江山行由来重義人感􅈭事縱横往復念遐阻淹留慕平生晨奔九衢棧暮始萬里程山驛風月樹海門煙霧城易綃泉源近拾翠沙漵明蘭蕙一為贈貧交空復情楊叅軍庄送宇文邈前人秋雲冒原隰野鳥滿林聲愛此田舎事稽君車馬程離堂慘不喧脉脉復盈盈蘭葉一經露香消為贈輕燈光耿方寂蟲思隠逾清相望忽無際如含江海情送皇甫湜赴舉馬異見文粹馬蹄聲特特去入天子國借問去是誰秀才皇甫湜含吐一腹文八音兼五色主文有崔李郁郁為朝徳青銅鏡必明朱絲䋲必直稱意太平年願子長相憶清明日后土祠送田徹雜詠作澈楊巨源清明千萬家處處是年華榆栁芳辰火梧桐今日花祭雜詠作登祠結雲綺遊陌擁香車惆悵田郎去原廻煙樹斜送杜郎中使君赴䖍州前人迢逓南康路清輝得使君虎符秋領俗鵷署早辭羣邊靖仍連戍城嚴本帶軍傍江低檻月當嶺滿窻雲境勝閭閻間天清水陸分和聲將惠政頌述九衢聞重送胡大夫赴振武前人何年擢桂儒生業今日分茅聖主恩旌斾仍將過鄉路軒車争㸔出都門人間文武能雙㨗天下安危待一論布惠宣威大夫事不妨詩思許琴樽送陳判官罷舉赴前人練思多時氷雪清拂衣無語别書生莫將甲乙為前累不廢煙霄是此行定愛紅雲燃楚色應㸔白雨打江聲心期玉帳親台位魏勃因君説姓名送李虞仲秀才歸東都因寄元李二友髙翼閑未倦孤雲曠無期晴霞海西畔秋草闕南時鄴中多上才耿耿丹霄姿顧我於逆旅與君發光儀同將儒者方獲忝携疑作雋人知幽蘭與芳佩寒玉鏘羙詞舊友在伊洛鳴蟬思山陂到来􅄪春風夢盡雙瓊枝素業且無負青㝠殊未遲南橋天氣好脉脉一相思廣州石門寺重送李尚赴朝時兼宗正卿楊衡象闕趨雲陛龍宫憇石門清鐃猶啟路黄髪重攀轅藻變朝天服珠懐委地言那令蓬蒿客兹席未離樽送孔周南之海謁王尚書前人泛棹若流萍桂寒山更清望雲生碧落㸔日下滄溟潮盡收珠母沙閑拾翠翎自趨龍㦸下􅄪為誦芳馨冬夜舉公房送崔秀才歸南陽前人聞君動征棹犯夜故来尋强置一樽酒重欵百年心燈白霜氣冷室虚松韻深南陽三顧地幸偶價千金送陳房謁撫州周使君前人匡山一畝宫尚有桂蘭叢鑿壁年雖異穿楊志幸同貌羸緣塞苦道蹇為囊空去謁臨川守因憐鶴在籠江陵送客歸河北前人逺客歸故里臨路結徘徊山長水復濶無因重此来聊將歌一曲送子手中杯送鄭丞之羅浮中習業前人百年泛飄忽萬事繫衰榮髙鴻脱矰繳達士去簪纓始從天日疑遊復作羅浮行雲卧石林宻月窺花洞明全形在氣和習黙憑境清夙秘絳囊訣屢投金簡名鐘筦促離觴煙霞随去程何當真府内重得欵平生送王秀才往安南前人君為蹈海客客路誰諳悉鯨度乍疑山鷄鳴先見日所嗟廻棹晚倍結離情宻無貪合浦珠念守江陵橘送公孫器自桂林歸蜀前人桂林淺復碧潺湲半露石將乘觸物舟暫駐飛空錫蜀香異青眼蓬户髙朱㦸風度杳難尋雲飄詎留跡舊户閑花草馴鴿傍簷隟揮手共忘懐日墮千山夕秋夜桂州宴送鄭十九侍御前人秋至觸物愁况當離别筵短歌銷夜燭繁緒徧髙絃桂水舟始泛蘭堂榻詎懸一杯勾一作勿離阻三嵗奉周旋鴉噪更漏颯露濡風景鮮斯須不共此且為更留連送戴端公赴容州陳羽分命諸侯重葳蕤繡服香八蠻治險阻千騎踏繁霜山斷旌旗出天清劒珮光還將小戴禮逺出化南方送殷華之洪州前人離堂悲楚調君奏豫章行愁處雪花白夣中江水清扣船歌月色避浪宿猿聲還作經年别相思湖草生西蜀送許中庸歸秦赴舉前人春色華陽國秦人此别離驛樓横水影鄉落入花枝日暖鶯飛好山晴馬去遲劒門當石隘棧閣入雲危獨鶴心千里貧交酒一巵桂條攀偃蹇蘭葉藉參差旅夢驚蝴蝶殘芳怨子規碧霄今夜月惆悵上峨嵋送友及第歸江東前人五陵春色泛花枝心醉花前逺别離落羽詩選作第耻為闗右客成名空羡里中兒都門雨歇愁分處上店燈殘夢到時家住洞庭多釣伴因来相賀話相思梓州與温商夜别前人鳳凰城裏花時别𤣥武江邉月下逢客舎莫辭先買酒相門曽忝共登龍迎風騷屑千家竹隔水悠揚五夜鐘明日又從西蜀路不堪天際逺山重送友人遊嵩山前人嵩山歸路繞天壇雪影松聲滿谷寒君見九龍潭上月莫辭清夜訪袁安伏翼洞送夏方慶前人洞裏春晴花正開㸔花出洞㡬時廻殷勤好去武陵客莫引世人相逐来送徳輿歸穿石洞山居前人烏巾年少歸何處一片綵霞仙洞中惆悵别時花似雪行人不肯醉春風送潭府州陸户曹之任曹自處州淘倉受集作司倉處州除歐陽詹三語又為掾大家聞屈聲多年名下人四姓江南英衡嶽半天秀湘潭無底清何言驅車逺集作逺車去有䝉莊情福建送鄭楚材赴京時監察劉公亮有感激鄭意前人羙人河嶽靈家本滎陽集作水濆門承若蘭族身藴如瓊文早折青桂枝俯窺鴻鵠羣邇来丹霄姿逺逐蒼梧雲有伊光鑒人惜兹瑶蕙薰中酣前激昻四座同氛氲海郡梅雪晴山郵炎景曛廻翔罷南遊鳴唳期西聞秦塞鸞鳳征越江雲雨分從兹一别離佇致如堯君送鄭尚書赴南海韓愈畨禺軍府盛欲説暫停盃盖海旗幢出連天觀閣開衙時龍户集上日馬人来風静鶢鶋去官㢘蚌蛤廻貨通獅子國樂奏越王䑓事事皆殊異無嫌屈大才送李尚書赴襄陽得長字前人帝憂南國切改命付忠良壤畫星摇動旗分獸簸揚五營兵轉肅千里地還方控帶荆門逺飄浮漢水長賜書寬属郡戰馬隔鄰疆縱獵雷霆迅觀碁玉石忙風流峴首客花艷大堤娼富貴由身致誰教不自强杏園送張轍侍御前人東風花樹下送爾出京城乆抱傷春意新添惜别情歸来身已病相見眼還明更遣將詩酒誰家逐後生送桂州嚴大夫前人蒼蒼森八桂兹樹在湘南江作青羅帶山如碧玉簪户多翰翠羽家自種黄柑逺勝登仙去飛鸞不假驂一作暇参送李員外院長分司東郡前人去年秋露下羈旅逐東征今嵗春光動驅馳别上京飲中相顧色送後獨歸情兩地無千里因風數寄聲送李六協律歸荆南前人早日羇遊所春風送客歸栁花還漠漠江鷰正飛飛歌舞知誰在賔寮逐使非宋亭池水綠莫忘蹋芳菲送侯喜前人已作龍鍾後時者懶於街裏蹋塵埃如今便别長官去直到新年衙日来送李翺前人廣州萬里塗山重江逶迤行行何時到誰能定歸期揖我出門去顔色異恒時雖云有追送足跡絶自兹人生一世間不自張與施譬如浮江木縱横豈自知寧懐别時苦勿作别後思送石洪處士赴河陽幕前人長把種樹書人云避世士忽騎將軍馬自號報恩子風雲入壯懐泉石别幽耳鉅鹿師欲老常山險猶恃豈惟彼相憂固是吾徒耻去去事方急酒行可以起送李礎判官歸湖南前人長沙入楚深洞庭值秋晚人随鴻鴈少江共兼葭逺歷歷余所經悠悠子當返孤游懐耿介旅宿夢婉娩風土稍殊音魚鰕日異飯親交俱在此誰與同息偃送諸葛覺往随州讀書前人鄴侯家多書揷架三萬軸一一懸牙籖新若手未觸為人强記覧過眼不􅄪讀偉哉羣聖文磊落載其腹行年五十餘集作餘五十出守數已六京邑有舊廬不容乆食宿䑓閣多官貟無地寄一足我雖官在朝氣勢日局縮屢為丞相言雖懇不見録送行過淮集作滻水東望不轉目今子從之遊學問得所欲入海觀龍魚矯翮逐黄鵠勉為新詩章月寄三四幅送殷秀才南遊孟郊詩句滿離袂酒花醺别顔水程千里外岸泊㡬宵間風葉亂辭木雪猿清呌山南中髙集作多古事詠遍始應還張徐州席送岑秀才前人振振芳集作芝蘭歩升自君子堂泠泠楓集作松桂吟生自楚客腸迷集作覉烏無定棲驚蓬在他鄉去兹門舘閒即彼道路長雨餘山川净麥熟草木凉楚淚滴章句荆塵滿集作京塵染衣裳贈君無餘他乆要不可忘送崔寅亮下第前人天地唯一氣用之自偏頗憂心集作人成苦吟達士為髙歌君子識不淺枝蔓幽更多嵗晏期攀折時歸且婆娑素貌集作質貌如削玉清詞若傾河潛虬集作虬龍未化時魚鱉同一波去矣當自適故山饒薜蘿送韓愈從軍前人志士感恩起變衣非變性親賔改舊觀僮僕生新敬坐作羣書吟行為孤劒詠始知出處心不失平生正凄凄天地秋凛凜軍馬令驛塵時一飛物色極四静文粹作净王師既不戰廟畫在文粹作廟畧盡無競王粲有所依元瑜初應命一章諭檄明百萬心氣定今朝旗集作旌皷前笑别丈夫盛贈崔純亮别前人食薺腸亦苦强歌聲無歡出門即有礙誰謂天地寬有礙非遐方長安大道旁小人智慮險平地生太行鏡破不改光蘭死不改香始知君子交集作心乆之集作交乆道益彰君心與我懐離别俱廻遑譬如浸蘖泉流苦日已長忍泣目易衰忍悲形自文粹作易傷項籍豈非集作非不壯賈生豈非集作非不良當其失意時涕泗各滿集作沾裳古人勸加飡此飡難自强一飲集作一飯九祝噎一嗟十斷腸况是兒女寃集作怨下同寃氣凌彼蒼彼蒼若有知白日下清霜今朝始驚呼碧落空茫茫送任齊二秀才自洞庭遊宣城前人洞庭非人境道路行虚空二客月中下一集作片㠶天外風魚龍波五色金碧樹千叢閃怪如可懼至誠無不通扣竒驚浩淼採異動穹崇物表積髙韻人間訪仙公宣城文雅地謝守聲聞融證玉易為力辨珉誰不同從兹阮籍淚且免泣途窮山中送從叔簡前人莫以手中瓊言邀世上名莫以山中迹乆向人間行松柏有霜操風泉無俗聲應憐枯朽質驚此别離情送從弟郢東歸前人爾去東南夜我無西北夣誰言貧别易貧别愁更重曉色奪明月征人逐羣動秋風楚濤髙旅榜將誰共大梁送栁淳入闗前人青山轉為塵白日無閑人自古推髙車争利西入秦王門與侯門待富不待貧唯賫集作空携一束書獨去將誰親送栁淳前人青山臨黄河下有長安道嵗嵗集作世上名利人相逢不知老送范司空赴朔方吕温築壇登上將膝席委前籌虜滅南侵趾集作跡朝分北顧憂抗旌廻廣漢撫劒動旄頭日集作坐見黄雲暮行㸔白草秋山横舊秦塞河遶古靈州戍集作善守如無事唯應獵騎遊送段秀才歸澧州前人湘南孤白芷幽託在清潯豈有馨香發空勞知處深推賢路已隔賑乏力弗任慙我一言方負君千里心寸義薄聨組片誠敵兼金惟期踐氷雪無使弱思侵衡州送李兵曹赴湘東前人慷慨視别劒凄清泛離琴前程楚塞斷此别集作恨洞庭深文字已乆集作乆巳廢循良非所任期君碧雲上千里一揚音道州送戴簡處士賀州謁侍郎羸馬孤童鳥道㣲三千客散獨南歸山公念舊偏知我今日因君泪滿衣文苑英華巻二百七十六
