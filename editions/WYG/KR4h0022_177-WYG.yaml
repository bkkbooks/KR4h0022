body:
  text: 文苑英華巻一百七十七宋李昉等編應制十送餞餞中書侍郎來濟二首幸望春宫送朔方軍大緫管張仁亶六首送沙門𢎞景等還荆州二首送張說廵邉二十二首送崔日知徃潞州二首餞王晙廵邉二首送宇文融安輯户口一首送李邕之任滑臺一首送新除岳牧一首送十道採訪使及朝使二首送李尚書入蜀一首送不蒙都䕶兼鴻臚卿歸安西一首餞中書侍郎來濟唐太宗曖曖去塵昏㶚岸飛飛輕盖指河梁雲峰衣結千重葉雪岫花開幾樹粧初學記作芳深愁黄鶴孤舟逺獨歎青山别路長聊將分袂沾襟淚還用持添離席觴奉和餞來濟應詔許敬宗萬乘騰鑣警岐路百壷供帳餞離宫御溝分水聲難絶廣宴當歌曲易終興言共傷千里道俯迹聊示五情同良哉既深留帝念沃化方有賛天聦奉和幸望春宫送朔方軍大緫管張仁亶李嶠玉塞征驕子金符命老臣三軍張武斾萬乗餞行輪猛氣陵𤣥朔崇恩降紫宸投醪還結士辭第本忘身露下鷹初擊風髙鴈欲賔方銷塞北祲還静漠南塵同前劉憲命將擇耆年圖功勝必全光輝萬乗餞威武二庭宣中衢横鼓角曠野蔽旌旃推食天厨至投醪御酒傳凉風過鴈苑殺氣下鷄田分閫恩何極臨岐動睿篇同前李乂邉郊草具腓河塞有兵機上宰調梅寄元戎細栁威武貔東道出鷹隼北庭飛玉匣謀中野金輿下太㣲投醪銜餞酌緝衮事征衣勿謂公孫老行聞奏凱歸同前蘇頲北風吹早鴈日夕渡河飛氣冷膠應折霜明草正腓老臣帷幄筭元宰廟堂機飲酒回先蹕前巻作仙蹕臨戎觧御衣軍装乗曉發師律候春歸方佇勲庸盛天詞降紫㣲同前鄭愔御蹕下都門軍麾出塞垣長楊誇武騎細栁接戎軒睿曲風雲動邉威鼓吹喧坐帷將閫外俱是報明恩同前李適地限驕南牧天臨餞北征觧衣延寵命横劍緫威名豹畧恭宸㫖雄文動睿情坐觀膜拜入朝夕受䧏城送沙門𢎞景道俊𤣥奘還荆州應制李嶠三乗歸净域萬騎餞通莊就日離亭近彌天别路長荆南旋杖鉢渭北限津梁何日紆真果還來入帝鄉同前李乂初日承歸㫖秋風起贈言漢珠留道味江璧返真源地出南闗逺天回北斗尊寧知一柱觀却啓四禪門送張説廵邉有序不録唐𤣥宗附見張説集端拱復垂裳長懐御逺方股肱申教義戈劍静要荒命將綏邉服雄圖出廟堂三台入武帳八座起文昌寳胄匡朝集作韓主華宗輔漢王茂先慚博物平子謝文章盡節恢時佐輸誠禦寇塲三軍臨朔野駟馬即戎行鼔吹威夷狄旌軒溢集作益洛陽雲臺先著美今日更貽芳將赴朔方軍應制張説禮樂逢明主韜鈐用老臣恭慿神武策逺禦集作御鬼方人供帳榮恩餞山川喜詔廵天文日月麗朝賦管絃新幼志傳三畧衰材謝六鈞膽猶忠作屏集作伴心固集作故道為隣漢保河南地胡清塞北塵早集作連年大軍後邇集作不日小康辰劍舞輕離别歌酣忘苦辛從來思博望許國不謀身奉和聖製送張尚書廵邉源乾曜匈奴邇河朔漢地須集作復戎旅天子擇英才朝端出監撫流星下閶闔寳鉞專公輔禮物生光輝宸章集作意備恩詡有征視集作是矛㦸制勝唯尊爼彼美何壯哉桓桓擅斯舉聲華振臺閣功德標文武奉國知命輕忘家以身許安人在勤恤保大殫襟腑此外無異言同情報明主以下十篇並附載張説集同前張嘉貞天錫我宗盟元戎付夏卿多才兼將相必勇獨横行經緯稱人傑文章作代英山川㸔是陣草木想為兵不待河氷合猶防塞月明有謀當繫醜無戰且綏氓閫外傳三畧雲中冀一平感恩心共集作共心盡悵别旅魂驚直視前旌掣遥聞後騎鳴還期方定日復此出郊迎同前宋璟帝道薄存兵王師尚有征是闗司馬法爰命緫戎行盡集作畫閫崇威信分麾盛寵榮聚觀方結轍出祖遂傾城聖酒江河潤天詞象緯明德風邉草偃勝氣朔雲平宰國推良噐為軍挹羙集作壯聲至和常得體不戰即亡精以智泉寧竭其徐海自清遲還廟堂座贈别故人情同前盧從愿上將發文昌中軍静朔方占星引旌節擇日拜壇塲禮樂臨軒送威聲出塞揚安邉俟帷幄制勝在巖廊作鼓將軍氣投醪壯士觴戒途遵六月離贈動三光槐路清梅暑蘅臯起集作赴麥凉時文仰雄伯耀武震遐荒衽席知無戰兵戈示不忘佇聞歌杕杜凱入繫名王同前許景先文武承邦式風雲感國禎王師親賦政廟畧久論兵漢主知三傑周官統六卿四方分閫受千里坐謀成介胄辭前殿壺觴宿左營賞延頒賜厚集作重宸贈出車榮龍武三軍氣魚鈴五校名郊雲駐旌羽邉吹引金鉦訓集作捧旅方稱德安人更克貞佇觀銘石罷同聼凱歌聲同前韓休一德光台象三軍賞集作掌夏卿來威申廟畧出緫叶師貞受鉞辭金殿慿集作凭軒出集作去鼎城曙光搖組甲疎吹遶雲旌左律方先凱中鼙即訓兵定功張武事陳頌紀天聲祖宴初留賞宸章更寵行車徒靈雨送林野夕隂生路極河流逺川長朔氣平南轅遲返斾歸奏謁承明同前徐知仁聖德膺三統皇威備集作被八埏大明均照物小醜未寧邉國相台衡重元戎廟畧宣紫泥方受命黄石乃推賢問罪隂山下安人屬國前度闗行照月乗障坐消烟北闕紆宸藻南橋列祖筵耀威當夏日殺氣指秋天鞞鼓黿鼉振旌旗鳥獸懸由來詞翰首今見勒燕然同前崔羽錫供帳何煌煌公其撫朔方羣僚御餞酌明主䧏離章闗塞重門下郊岐禁苑傍陳兵宜雨濯集作洗卧鼓候風凉炎景寧云憚神謀肅所將旌搖天月逈騎入塞雲長赫赫皇威振油油聖澤滂非唯按車甲兼以正封疆叱咤隂山道澄清瀚海陽虜垣行决勝台座佇為光同前胡皓燕公為漢將武德奉文思利用經戎莾英圖叶聖詒塞沙制長䇿窮石捲搖旗萬里要相賀三邊又在兹稜威方逐逐談笑坐怡怡寵餞紛郊道充厨竭御司嘗醪企行邁聽樂罷漣洏衮旒垂翰墨纓蕤迭賦詩金山無積阻玉樹有華滋請迨炎風暮歸旌候此時同前王翰紫綬尚書印朱軿丞相車登朝身許國出閫將辭家不憚炎蒸苦親嘗走集賖選徒軍有政集作令誓卒爾無譁帝樂風初起王城日半斜寵行流聖作寅餞照台華騎歴河南樹旌搖塞北沙榮懐應盡服嚴殺已先加業峻靈祗保功成道路嗟寧如集作知恐非鑿空使逺致石榴花同前崔泰之南庭荒服逺北斗將星飛旗皷臨沙漠旌旄出洛畿闗山遶玉塞烽火映金㣲屢獻帷謀策頻承廟勝威􅉜蹀臨河騎逶迤渡隴旂地脉平千古天聲振九圍車馬生邉氣戈鋋駐落暉夏近蓬猶轉秋深草未腓餞送紆天什恩榮賜御衣佇勒燕然頌鳴騶計日歸同前王丘德業藴時宗幽符夣象通台司計祈父師律緫元戎出入敷能政謀猷體至公贈行光睿什宴别感宸衷文炳髙天曜恩垂湛露融建牙之塞表鳴鼓接雲中䇿宻鬼神祕威成劍騎雄朔門正炎月兵氣已秋風肅殺從此始方乗天運隆同前蘇晉方漢比周年興王今在宣亟聞降虜拜復覩出軍集作師篇祈父萬邦式英猷三畧傳筭車申夏政茇舍起戎田嚴問盈集作盟胡苑軍容濟洛川皇情悵闗斾詔餞列郊筵路接禁園草池分御井蓮離聲軫去角居念㫁歸蟬三㨗豈云永七擒良信然具寮有誠寄望凱秋風前同前王光庭賢相德符充朝推文武雄海波先若鏡闗草預從風鉞助將軍勇威成天子功瓊章九霄發錫宴五衢通玉輾龍盤帶金装鳯頸騘虎貔分儗儗河洛振熊熊戈劍千霜白旌旃集作旗萬火紅示刑夷狄變流惠鬼神同㓂息軍容偃塵銷朔野空用師敷禮樂非是為獯戎同前袁暉出師宣九命分閫用三台始應幕中畫言從天上來丹青不獨任韜畧遂䨇該坐見威稜洽彌彰事業恢旌旗曉雲送鞞鼓朔風催虜氣銷殘月邉聲韻落梅羽書雄北地龍漢寢南埃集作垓寵戰黄金盡輸戈集作誠白日廻離章宸翰發祖讌國門開欲識恩華盛平生文武才同前席豫聖帝重兵權分麾屬大賢中軍仍執節集作政丞相復廵邊翕習戎装動張皇廟畧宣朝榮承睿札野餞轉行旃亭障東縁海沙塲北際天春冬見巖集作嚴雪朝夕候烽烟已勒封山記集作燕山頌猶聞遣戍篇五營將月合八陣與雲連經絡集作畧圖方逺懐柔道更全歸來畫麟閣靄靄武功傳同前張九齡宗臣事有征廟算在休兵天與三台座人當萬里城朔南方偃革河右蹔集作誓非揚旌寵錫從仙禁光華出漢京山川勤逺畧原隰軫皇情為奏薫琴唱仍題寳劍名聞風六郡伏計日五戎平山甫歸應疾留侯功復成歌鐘旋可望衽席豈難行四牡何時入吾君聽履聲同前徐堅至德撫遐荒神兵赴朔方帝思元帥重爰擇股肱良累相承開地深籌叶子房寄崇專斧鉞禮備設壇塲鞞皷喧雷電戈劍凛風霜四黄集作騏將戒道十乗啟先行聖賜集作錫加恒數天文耀寵光出郊開帳飲寅餞盛離章雨濯梅林潤風秋麥野凉燕山應勒頌麟閣佇名揚同前崔日用軒相推風后周官重夏卿廟謀能允廸韜畧又縱横吉日差集作四黄馬宣王六月兵擬清鷄鹿塞先指朔方城列將懐威撫匈奴畏盛名去當推轂送來佇出郊迎絶漠蓬將斷華筵槿正榮壯心㸔舞劍别緒應懸旌睿錫承優㫖乾文復寵行蹔勞期永逸赫矣振天聲同前賀知章荒憬盡懐忠梯航已自通九攻雖不戰五月尚持戎遣戍徴周牒恢邊重漢功選車命元宰授律取文雄胄出天弧上謀成帝幄中詔旂分夏物專討錫唐弓帳宿伊川集作生右鉦傳集作吹晉苑東饔人藉蕡實樂正理絲桐岐陌涵餘雨離川照晩集作曉虹恭聞詠方叔千載舞皇風賜日知往潞州唐𤣥宗潞國開新府壺闗寵舊林集作臨妙旌循吏德持集作特恱庶甿心禮樂中朝貴仁明列郡欽揚風非贈扇易俗是張琴藩鎮謳謠滿集作洽行宫雨露深㑹書丞相䇿先賜潁川金奉和賜崔日知往潞州應制張説聖情留曩鎮佳氣翊興王増㦸雄都府髙車轉太常川横八練濶山帶五龍長連帥初恩命天人舊紀綱餞途飛御藻闔境自生光明主徴循吏何年下鳯凰餞王晙廵邊唐𤣥宗振武威荒服揚文肅逺墟金壇申將禮玉節授軍符免胄三方外銜刀萬里餘昔時呉㑹静今日虜庭虚分閫仍推轂援桴且訓車風颺旌旗逺雨洗甲兵初坐見台階謐行聞祅祲除檄来湏挿羽箭去亦飛書舟檝功斯著鹽梅望匪疎不應陳七德欲使化先敷奉和餞王晙巡邉應制張説六月歌周雅三邉念夏卿欲施攻戰法先作簡稽行禮樂知謀帥春秋識用兵一勞堪定國萬里即長城䇿有和戎利威傳破虜名軍前雨洒道樓上月臨營别藻瑤華降同衣錦襮榮闗山由義近戈甲為恩輕絲竹路傍散風雲馬上生朝廷謂吉甫邦國望君平奉和聖製送宇文融安輯户口應制前人至德臨天下勞情遍九圍念兹人去本蓬轉將何依外避征戍數内傷親黨稀嗟不逢明盛胡能照隐㣲栢臺簡行李蘭殿錫朝衣别曲動秋風恩令生春輝使出四集作西海安詔下萬心歸怍無􅇪龍佐徒歌鴻鴈飛送李邕之任滑臺唐𤣥宗漢家重東郡宛彼白馬津黎庶既蕃殖臨之勞舊臣逺别初道路今行方及春課成應第一良牧爾當仁奉和聖製漕橋東送新除岳牧應制蘇頲寳賢不遺俊臺閣盡鵷鸞未若調人切其如簡帝難上才膺出典中㫖念分官特以專城貴深惟列郡安政行思務本風靡屬勝殘有令田知急無分獄在寛至言題睿札殊渥洒仙翰詔餞三台降朝榮萬國歡舉杯臨水發張樂擁橋觀式佇東風㑹鏘鏘簡玉壇奉和聖製送十道採訪及朝集使張九齡三年一上計萬國趨河洛課最力已陳賞延恩復博垂衣深共理改瑟期咸若首路廻竹符分鑣揚木鐸戒程有攸徃詔餞無淹泊昭晰動天文殷勤在人瘼侍集作恃久聖念兹克終朝所托行矣當自强春耕庶秋穫奉和聖製暮春送朝集使歸郡應制王維萬國仰宗周衣冠拜冕旒玉乗迎大客金節送諸侯祖席傾三省褰帷向九州楊花飛上路槐色䕃通溝來預鈞天樂歸分漢主憂宸章類河漢垂象滿中州奉和聖製送李尚書入蜀張九齡睿言感忠義何有間山川狥節今如此離情空復然皇心在勤恤德澤委昭宣周月成功已集作后明年或勞旋奉和聖製送不䝉都䕶兼鴻臚卿歸安西應制王維上卿増命服都䕶揚歸斾雜虜盡朝周諸胡皆自鄶鳴笳瀚海曲按節陽闗外落日下河源寒山盡秋塞萬方氛祲息六合乾坤泰無戰是天心天心同覆載文苑英華巻一百七十七
