body:
  text: 文苑英華巻七百三十八宋李昉等編雜序四地志圖序一首道州律令要録序一首風后握機圖序一首擬三國名臣讃序一首長慶宣眀厯序一首荔枝圗序一首黠戞斯朝貢圖序一首注子孫序一首地志圖序吕温廣陵李該集作彦博達集有之字士也學無不通尤好地理患其書多門歴世浸廣文詞浩蕩學者疲老由是以獨見之眀法先聖之制黜諸子之闕記述仲尼之職方㑹源流考同異務該暢從體要倬然勒成一家之說猶懼其奥未足以昭啓後生乃裂素為方併據書而畫隨方面以區别擬形容而訓觧命之曰地志圖觀其粉散百川黛凝羣山元氣剖判成乎筆端任土之毛有生之類大鈞變化不出其意然後列以城郭羅乎文粹作于陬落内自五侯九伯外洎要荒蠻貊禹跡之所窮漢驛之所通五色相宣萬邦錯峙毫釐之差而下正乎封畧方寸之界而上當乎分野乾象坤勢炳焉可觀與夫聚米擬其端倪畫地陳乎梗槩固不可同年而語文粹有其字詳畧也每虗室燕居薄帷晴褰普天之下盡在屋壁户納四海窓籠八極名山大川隨顧奔走殊方絶域舉意而到髙視華裔坐横古今觀帝王之疆理見宇宙之寥廓出遐入幽曽不崇朝與夫役形神於嵗月窮轍跡於區外又不可並軌而論勞逸也且夫刪百代之弊綜羣言之首繁而不亂踈而不漏才識以潤之丹青以炳之使嗜學之徒未披文而見義不由户而觀奥斯訓道文粹作導之眀也窮地而述舉世而載事極鴻纎理通皦昧混一家之文軌張大國之襟帶覈人物之虚實總山川之要㑹表皇威之有截眀王道之無外斯乃功用之大也見蒼梧塗山則思舜禹恤民之艱覩窮邉集作荒大漠則悟秦漢勞師之弊覧齊墟晉壤則見集作想桓文勤王之覇觀洞庭荆門則知苖蜀恃險之敗王者於是眀乎得失諸侯於是鑒于興替斯又懲勸之道也然則本之所以廣學流申之足以賛鴻業垂之可以示後世豈徒由近觀逺以智自樂為室中之一物哉而時無知音道不虚行舉地成圖問天無路此志士儒林所以為之太集作頽息也某久從君逰辱命序述庶明作者之意俾好事集作學君子知其所以然道州律令要録序某頃累忝官尚書省御史䑓徧觀諸曹多書令式格律於其屋壁茍非以宦逰為情而奉其職者皆得日夕省覧卧起出入目存心悟累累集作章然如貫珠如循環吏無以欺臨事不惑決繁滯舉枉直而協于大中中人以集作已上固可馴集作循致吾不知其誰著之何前賢處心恤事之周也若州縣者卑而近於人逺而切於得失動有懸人命關風俗而惰者委成於一吏望空而署勤者檢閱而山積神憤氣沮卒無所歸致政集作政令之弊不亦宜乎此州法吏何洛庭良吏集作士也與之撮其要講其義書之集作于㕔記集作事之左某不深於法猶慮未盡後來君子其究成之此長人者之所急元和五年五月二十七日風后握機圖序嚴從中黄子曰予觀風后握機圖殆有情哉然年代遷逺文字損益或致􅄽訛矣惜乎夫兵者榮賤覆殺之大機也天地神靈之所閟也洞則王昧則亡故黄帝湯武得其道矣然則兵之用也豈惟道乎亦有工拙矣語大㫖有三微焉昔伊尹勸湯吕望勸周子房勸漢祖鄧禹勸光武可謂知運命之微也樂生破竹迎刄之喻曹劌三皷候衰而作可謂知和氣之微也孫臏邀敵於馬陵韓信置軍於水上可謂知地勢之微也故古今有言曰能知三微覇世之師至夫以智料智因竒縱竒千變萬化不可殫備今夫握機者約而逺㡬而深用少以一作少而濟廣貫一以締萬微乎微乎可以神會雖疑作難以跡融非智合曩賢役心淵妙者不可以常識偕之今予依風后大㫖畧為此圖以擬方陣陣有八物有八容八八相值可離可合中有容効三元天子上將所居常静不動以象𤣥極以配中黄一作黃中其理微矣若乃四衡夾三軸九地夾二天吟龍嘯虎當前後之衡雲鳥風虵居摶掣之要敵寡則從虎翼之屬風虵之勢合而圍之彼衆則奮龍虎之衡接雲鳥之勢突而擊之亦百勝之術也昔諸葛孔眀以傑特之智將求其源而未得也乃曰八陣成可以橫行天下然武候陣法亦有虎翼翔鳥足眀武侯所習則風后五圖也桓温見蜀將八陣云是常山虵勢徒妄言耳常山蛇者法出孫子謂之率然葢直陣也故桓温覧孫子而有是言殊無指㢤然此離合之勢竒正之術故曰或離而為八或合而為一以正合以竒勝其要此矣公孫子儒者也至注釋務析精奥而多引空言以誣後人何哉馬總述云増字發眀未得精了更益煩蕪予昔常覧焉中失其本每思經述近乃得之聊因時暇刋繁舉要序而第焉二百八十言殆不過尺并為圖式以悟後賢庶有賴云爾擬三國名臣讃序昔孔子舉詩書作後王者之法其稱殷頌曰天命𤣥鳥降而生商書天工人其代之然則聖人受命賢人受任龍騰虎躍風流雲蒸求之精微其道莫不咸係乎天者也故夫受天之命者不可以茍代天之理者不可以私前聖知其如此故明四目達四聰髙居而審聴處幽而遐覧羣才必用衆功乃廣然後天應以福而太和之化臻矣雖三光襲一作逓照五運潜周媯圖啓而揖讓興夏鼎移而干戈用徳業相踵一作踳屯夷不同然激揚名義増廣基宇何嘗不得賢則理失賢則危哉是故五老尊而軒風熾三仁去而殷道衰淮隂來而漢家昌亞父亡而楚王滅姬漢已降大象淪夷當極者不以垂拱居尊干禄者必以權利邀進鏡物者不以虛已為徳達才者必以寒雋為嫌故洪綱強集作弛而萬目頺大理虧而亷讓塞貞良甘退而莫進賢士卷藝以深潜故伯夷為之哀歌綺里為之髙遁晉重滅名以避其患楚狂遁世以全其身豈惡富貴哉盖有為而然也夫眀王旰食以求士君子含徳以俟時然求應之感徒深而君臣之分猶鮮者何也盖經達之道難而世乏鮑子蕭何之智也若夫觧縛為相古今所罕有登壇受爵賢者一作哲欲疑作嘆其難漢髙始以為疑齊桓終受其福乃知有管仲之才無鮑叔之介則桓公不納有韓信之畧無蕭何之助則漢髙不容齊桓漢髙不易值矣蕭公鮑子豈屢得哉夫未遇良鑒則夜光不為寳時逢哲后則負鼎可升朝歴求邃古爰覧近圖臣主之際授受之外垂大眀以叙下推至公以匡上則有我唐太宗文武大聖皇帝魏文貞者之流也盖至理之代君子不以王爵私其身而况親屬乎是以貞觀之中賢者在朝各崇至公馬周懐竒思而㧞起隴畆李靖多大功而終始援用魏徴數直諌而優㳺撫納我之得才於斯為美彼三國之臣主始當草昧之期卒踐陵遲之運君無尺土之漸而以争奪為徳臣無素定之分而以偷合為功然其屬衰亂之間固貞仁之節接風塵之㑹吐博奕之謀用能各奉其主克立一作昭厥勲者亦不可誣也又若清淑沉懿有顔氏之徳靈鑒洞照有子房之能推戈疑給下有終始之勤篤誼守節有風雲之槩歎一作感王室之多故懐黍離以永吟遂委忠曹公冀圖匡復而天命潜革人心則殊姑廻備物之謨卒抗非常之錫雖欲匡上以徳翻乃殺身成仁夫一作乎仁義豈有恒在乎不捨道而已是故比干湛身於殷后㣲子亢一作抗跡於周邦雖二美同歸而三仁齊致公達慷慨總角耀竒􅁖奸臣之擅命想桓文之髙舉羣雄兢起漢厯寢㣲翻然回慮吐詞魏幕原其所以然者豈不以桑榆之暉非魯陽可止溝瀆之節豈仲尼所嘉是以攝管仲之髙蹤攀魏武之遐轍全生之理其亦逺乎崔子矯然植青松之操鯁詞直對則左右失容捐生取義千載稱美雖遇讒譛一作譏盖亦其素志矣若乃天命未改則人思其舊乾道將革則物厭其常是以司𨽻之儀見悲於漢叟先王之跡逺播於汶隅孔明躬耕南陽盤桓俟主吐籌獻策識鼎峙之形㹅衆臨戎有席巻之望原其去就抑亦懐漢之雅志焉及其撫戎幕持國鈞開誠心布公道賞不失徳罰不濫刑又雖古之遺直不能尚也昔管仲用法伯氏無怨子羔刑人終以見徳孔明之謫李嚴葢近之矣周瑜魯肅咸起諸生鶚眎烏林鷹揚赤壁然肅為布衣當襄漢之際標賣田宅分財結士以求人傑此其志不小也公瑾推第於孫策子敬輟粟於周郎咸有異於人者也子布剛簡懐不撓之節屬桓王創業首賛經綸仲謀嗣立躬自扶翊古人所謂託六尺之孤者歟既而忠言屢發直道不囬折弋獵之娯沮鈞䑓之樂斯又王臣蹇蹇國之元老者哉夫江東之於天下猶四體之有一掌耳權不能恢闡雄量以一有允字求忠讜而乃輕肆忿毒厭聞至言始抽刄於虞翻終按刀於子布翻既謫終遐裔昭亦廢處家僮故使時望挫傷元功圮衂由是見仲謀之器小也其不能厠跡中原􅅷長世之業者宜矣夫以子布忠賢承奕代之遇一言忤㫖有不測之辜况賤跡之士而欲自下干上罄其孤慮者乎善料古者必察乎今善籌逺者必謀諸近讃詠之作豈必覈既往之陳盖將暢其幽情貴使來葉有可觀者聊復采斷為其讃云長慶宣明厯序唐穆宗古者聖人莫不研七精之數以察天道一作以揆天道設四時之官以授人事在顓頊之代雖罕疑漫靡察制度未備然已有重黎二官故可得而一無而字述是以欽昊天協時月必首於堯舜之典敘九章用五紀亦冠於周宗之書則知履端受命斯為本也我國家侔天地以制法統隂陽以立極恭惟烈祖嘗所盡心載誕神人協成厯象太史究閎洛之術大惠極容成之妙而體一作躬聖創制賾一作探賾隐窮神順時氣之發歛考星度之踈宻故亦窮變化洞窈𡨕矣然後隂陽和刑罰清八風之叙立萬物之序成累聖讃序必更紀厯推體元居正之道彰敬授惟新之法斯舊典也曷敢廢乎朕以菲薄未眀至理荷祖宗之耿光守聖人之大寳深懼不徳獲戾于上𤣥感易象之隨時懐禮經之聴朔又嘗覧漢丞相魏弱翁之奏以為帝王法天地順四時以理國家是奉宗廟安天下之大禮也爰命太史洎乎疇人候望於清䑓論思於别殿究以微妙考其禎祥觀渾儀以見天心視圭影而知日至則八卦之氣不雜百工之職允釐豈必於記鳯威之晨晦明無爽候仙蓂之莢弦望不􅄽今勒成三十四巻命之曰長慶宣明厯承唐堯授人之規庶於是矣効軒后合符之驗非所企焉因叙制作之由在乎篇首荔枝圖序白居易荔枝生巴峽間樹形圖圓如帷蓋葉如桂冬青華如橘春榮實如丹夏熟朶如蒲桃集作萄核如枇杷殻如紅繒膜如紫綃瓤肉瑩白如氷雪甘如醲酪四字文粹集本並作漿液甘酸如醲酪大畧如彼其實過之若離本枝一日而色變二日而香變三日而味變集無日字四日五日外色香味盡去矣元和十五年夏南賔守樂天命工吏圖之集無之字而盡書之集無盡字葢為不識者與識而不及一二三日者云黠戞斯朝貢圗傳序李徳裕昔越裳貢雉薦於宗廟西旅貢􅋙陳以典訓所以感其至而戒其初也仁聖文武至神大孝皇帝御厯之四年矣天瑞璨爛王道昭焯五材並用六轡斯柔布政宣室以張神化振兵朔野以耀威靈故得天晬而清日晏而明虫螟不生嘉榖以成中外集作寓既安四夷來庭由是龍荒君長黠戞斯遣使注吾合素等上表獻良馬二匹絶大漠而貢赤誠渉流沙而霑赭汗非至徳所感孰能臻於此乎皇帝以前有鸞旗集作所焉用驥騄不貴龍友鳴駕鼔車乃命其使見於内殿賜以珍膳錫之文錦謹按故相魏國公賈耽所撰古今四夷述黠戞斯者本堅昆國也貞觀二十一年其酋長自身入朝授以將軍印拜堅昆都督逮于天寳季年朝貢不絶洎中國多難以廽鶻隔礙黠戞斯忿其桀鷔乗彼薦饑於是破龍庭焚罽幕蕭條萬里地無種落得出重泉而見白日披氛霧而覩青天臣伏見太宗謂羣臣曰南荒西域自逺而至其故何哉宰臣𤣥齡對曰殊域来朝者中國乂安帝徳遐被所致也太宗曰向使中國不安亦何縁而至朕觀此懐懼何者昔秦始皇并吞六國漢武帝威加戎狄今殊方異類無逺不賔竊比秦始漢武想無多愧亦欲傳之子孫念集作愈二主之末途朕所以不能不懼爾臣伏思太宗往昔之懼致我唐百代之隆則聖祖貽謀可謂深矣此太宗所以永保鴻名爲受命之祖陛下所以丕承王業為中興之君豈不宜哉天㫖以賈耽有陳平鎮撫之才得充國通知之敏其所述作該明古今詔太子詹事韋宗卿祕書少監李集作吕述往蒞賔舘以展私覿稽合同異覼縷闕遺傳胡貊兠離之音載山川曲折之狀條貫周備文理洽通臣伏以貞觀初中書侍郎顔師古上言昔周武王天下太平逺國歸欵周史乃集其事為王㑹篇今萬國來朝蠻夷率服實可圗冩請撰為王㑹圗有詔從之臣輙因韋宗卿李集作吕述所紀異聞餙以㑹集作繢事敢叙率服以冠篇首注孫子序杜牧兵者刑也刑者政事也為夫子之徒實仲由冉求之事也今者據案聴訟械繋罪人笞死于市者吏之所為也驅兵數萬撅其城郭纍其妻子斬其罪人亦吏之所為也木索兵刃無異意也笞之與斬無異刑也小而易制用力小者木索笞也大而難制用力多者兵刃斬也俱期於除去惡民安活善民集作人為國家者使教化通流無敢輙有不由我而自恣者其取吏文粹有也字無他術也無異道也俱止於仁義忠信智勇嚴明也茍得其道一二者可以使之為小吏盡得其道者可以使之為大吏故用力少者其吏易得也功易見也用力多者其吏難得也功難就也止此而已無他術也無異道也自三代已降皆由斯也子貢頌夫子之徳曰文武之道未墜於地在人賢者識其大者逺者不賢者識其小者近者季孫問於冉有曰子之戰學之乎性達之乎集作也對曰學之季孫曰事孔子惡乎學冉有曰即學之於孔子者大聖兼該文武並用適聞其戰法實集作猶未之詳也復不知自何代何年何人分為二道曰文曰武離而俱行因使縉紳之士不敢言兵或恥言之茍有言者世以為麄暴異人人不比數嗚呼亡失根本斯為最甚周公相成王制禮作樂尊大儒術有淮夷叛則出征之夫子相魯公㑹于夾谷曰有文事者必有武備叱辱齊候伏集作服不敢動是二大聖人豈不知兵乎周有齊太公秦有王翦兩漢有韓信趙充國耿弇虞詡叚頻魏有司馬懿呉有周瑜蜀有諸葛武侯晉有羊祜杜公元凱梁有韋叡元魏有崔浩周有韋孝寛隋有楊素國朝有李靖李勣裴行儉郭元振如此人者當此一時其所出計畫皆考古校今竒秘長逺策先定于内功後成於外彼壯徤輕死善擊刺者供其呼召指使耳豈可知其所由來哉牧㓜讀禮至于四郊多壘卿大夫之辱也謂其書真不虚說年十六時見盗起圍作圜二三千里殺戮將相族誅刺史及其官屬屍塞城郭山東崩壊殷殷焉聲振集作震朝廷當其時使将兵行誅者則必壮徤善擊刺者卿大夫行列進退一如常時笑歌嬉逰輙不為辱非當辱不辱以為山東亂事非我軰所宜當知牧自此謂㓜所讀禮真妄人之言不足取信不足為教及年二十始讀尚書毛詩左傳國語十三代史書見其樹立其國滅亡其國未始不由兵也主兵者聖賢才集作材能多聞博識之士則必樹立其國也壯徤擊刺不學之徒則必敗亡其國也然後信知為國家者兵最為大非賢卿大夫不可堪任其事茍有敗滅真卿大夫之辱信不虛也因求自古以兵著書烈於後世可以教於後生者凡十數家且百集作數萬言其孫武所著十三篇自武死後凡千嵗将兵者有成者有敗者勘其事跡皆與武所著書一一相抵當猶印圈模刻一不差跌武之所論大約用仁義使機權也武所著書凡數十文粹作十數萬言曹魏武帝削其繁剰筆其精切凡十三篇成為一編曹自為序因注觧之曰吾讀兵書戰策多矣孫武深矣然其所為注觧十不釋一此者盖非曹不能盡注觧也予尋魏志見曹自作兵書十餘萬言諸将征伐皆以新書從事從令者克㨗違教者負敗意曹自於新書中馳驟其說自成一家事業不欲隨孫武後盡觧其書不然者曹豈不能耶今新書已亡不可復知予因取孫武書備為其注曹之所注亦盡存之分為上中下巻後之人有讀武書予觧者因而學之猶盤中走丸丸之走盤橫叙貟直計於臨時不可盡知其必可知者是知丸不能出於盤也議於廊廟之上兵形已成然後付之於將漢祖言指縱文粹作蹤者人也獲兔者犬也此其是也彼為相者曰兵非吾事吾不當知君子曰叨居其位可也文苑英華巻七百三十八
