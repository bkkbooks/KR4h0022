body:
  text: 文苑英華卷五百三十八宋李昉等編孝感門十七道墳樹有甘露判四道紫芝白兎判一道紫芝白兎由刺史善政判二道男取江水溺死判四道孝女抱父屍出判一道不除姊喪判一道居喪年老判一道賣宅奉塟判一道士用大夫禮葬父判一道不用父言殉𦵏判一道墳樹有甘露判楚州申殷賢喪親負土成墳甘露降樹芝草生廬青鸞鎮集白鹤一作鵠通用翺翔縣令張徳以為孝感刺史欲旌表郷人梁静告國家祥瑞對殷賢所親云喪罔極纒哀集荒蓼以崩心攀寒松而泣血既流悲而遶墓遽結欷以成墳所以白鶴青鸞靈芝甘露翔集墳塋之際降生廬樹之間善應類彰禎符洊至所感雖因孝致論孝亦感皇風旌以門閭實將無媿告以祥瑞良亦有疑對楚州淮海北距江水南濵挹桐栢之遥源酌柴桑之逺𣲖人沐無為之化家覃孝里之風殷賢志切茹荼誠深負土故得靈芝三秀如馬如龍甘露載垂為珠為玉鳴琴邑宰先以檢尋集竹州司欲加旌表但飡和飲徳日用猶迷舞鶴翔鸞天心有屬瑞允彰於周徳孝因感於殷賢梁静雖陳還宜凖此同前殷賢名編澤國業預封人荷聖皇東户之期感孝子南陔之詠仰攀風樹俯蹈寒泉同王裒之手藝松栢比平原之躬修墳墓哀哀之性切切逾悲孝徹幽明祥聞動息故得春芝列秀曉露凝甘青鸞廻入鏡之容素鶴舉聞琴之翼縣寀檢尋非謬州端勘亦不虗静是郷人親來投告以為盛瑞咸屬國家但以子輿之冠前詢烏集休徵之屋一作室復見魚游則殊貺之來誠闗於至化而楚州申狀亦符於孝感事縁奬勸理合申明眷彼門閭固須旌表同前劉憲殷賢名編荆楚行逹神明實禀先賢之風遍聞至孝之感甘露降其樹還同淚栢之林芝草生其廬即在􅃦苫之室雖禎祥驟委諒神理無欺而謗議是興為郷人所惡且求諸故事抑有前聞率土莫非王臣含靈皆用天道通論則歸於有國析理則存乎其人以匹夫之感皆為王者之瑞則皇天所相何彰孝徳之深梁静湏正刑書刺史不煩疑惑紫芝白兎判懐州申衛士楊建徳被差鎮勑到之後母亡遂廬墓側哀毁乃有紫芝生白兎來馴州司請加旌表廉察以為避鎮科罪對橫戈出塞雖五校之嚴䂓主奠臨喪亦十倫之重制建徳身叅戎旅名列材官負羽􅆎鞬將馳邉戍枯魚銜索旋廹私庭瞻大樹於轅門痛風枝之不静聽嘶驂於戎幕感隙駟之難留燕雀之心已纒於罔極熊羆之效未遑於載馳詳甲乙之科無虧典禁推忠孝之道何爽公私既而匍匐墳埏充窮隴隧霜露之思義貫天經精感之徵遂彰靈應白兎呈貺背三窟而來馴紫芝符祥對九莖而擢秀州司請加褒異錫類之儀載光使局作此科䋲昧禮之情何甚聖朝孝理史官自合發揮楊建至誠門閭固宜旌表紫芝白兎由刺史善政判岳州人王懐俊㓜䘮二親廬于墓側負土成墳至孝潜通屢呈祥瑞其地内生芝草兼白兎刺史元利濟仁明訓俗善績著聞亷使以為由刺史録奏懐俊不伏對高思元天經地義聖人不加通幽洞冥神心必應懐俊㓜傾怙恃早摽孝徳無窮之思已結於㨕書孺子之感更纒於匣扇既而日月有時爰從筮宅墳塋是託俄見葺廬馬鬛新封牛岡載闡有同文讓栢逕栖烏還類許孜蒿埏集鴈故得皎皎仙兎孕質而呈祥藹藹靈芝抽莖而表瑞豈以劉家之堇止出於生前王氏之魚不彰於死後此由聖皇御㝢恩覃錫類神靈滋液品物昭蘇純仁蹈於二儀禎符效於萬象假使六條闡化千里宣風侔郭賀之深仁嫓劉寛之善績何禎祥之所及豈徵應之所臻廉察推功妄塵旒扆懐俊不伏徒勞漫訟莫大之孝何以自安同前孝通神明誠感天地烏馴兎擾聲髙曩傳芝秀堇榮事藹前史嘗聞其語豈獨古人王懐俊性實由􅇆行非外奬風樹不静遽軫攀栢之哀陟屺無望終纒負土之感豈惟弔賔驚鶴故已祥霄集鴈遂使金英孕彩奪神葉於芝田玉毳含暉接仙毫於麗魄斯固仁聖有道至徳潜通兆庶沐化以自效動植乗休而相感非借瑞於閭里不乞靈於郡縣而利濟仁明不問喬卿之徳察一作刺使風績未見王褒之頌掠美竊譽在濟雖是有心假應移禎於使無宜妄察昔聞讓善今見争功貪天之誠頗同於往責無伐之願亦􅈥於前事但論孝則義歸光國於師則不許讓仁與其抑俊而揚濟未若捨貴而褒下任雖通廣孝實因心許與一介之人豈累六條之政既繼録奏湏更申聞勸奬之䂓竊將合序男取江水溺死判顧乙從母所好令男十五里取江水溺死不為之服對孝乃因心禮從適變惟彼顧乙徳合天地甘㫖必在於無違承顔克遵於不匱瞻言愛子取汲長江庶南陔之不虧豈東流而永逝掌玉茲碎庭蘭坐歇顧斯惟疾之憂恐阻長筵之樂既不彰於枲服誠有切於斑衣雖失禮入刑合寘彛典而割情循飬庶可權宜既竭姜詩之孝無寘蕭何之律同前顧乙行繼人志譽美天經嘗申不匱之誠毎竭服勤之養母以不甘井汲好味江流爰將植杖之男當其抱甕之役異曹娥之父無復還屍均屈原之妻空餘往恨緬曕前誥既有同於姜詩詳彼舊章亦何殊於庾季雖云不服欲寘何辜同前立身之道忠孝為先訓俗之䂓䘮紀攸重所以王祥王覽閔損曽參曉於九族傳諸萬古顧乙芳摇美箭業嗣良弓挹至孝之清猷得隨時之大義母之所好志必無違嘉旨精誠乃臻異物長江汎濫取汲何功孝情至切於求魚䘮制奚遵於䑛犢欲遵寕戚恐阻承顔所以僶俛于懐幽哀宻念憶將鶵之曲不忍聽琴對驅蚊之宵更勤扇枕眷彼純至足以揚名逝者如斯男何不吊三殤之服誠合切於哀情五禮之文貴取順於顔色既循姜詩之孝難科漢尉之刑同前顧乙依仁植性履孝因心生我之義方深倚廬之思何極一竹切扇枕温席造次無違候旨承顔欽從所好屠鷄留膳不為執友之賢求鯉探泉兼入隣家之饌順慈親之旨忘愛子之勞屬以廻浦生風長江起浪因茲汲引遂見沉淪乙類姜詩無復㺯璋之念男同精衞空摇一作存銜石之悲不服以殤初疑越禮苟全於孝取叶隨時既有符於古風恐難寘於令典孝女抱父屍出判錢塘人孫戩少以迎濤為事因八月迎濤一作潮乗船衝濤船覆至死戩女媚容巡江哭以𤓰設祭因而自投江水抱父屍出縣司以為純孝欲立碑州司不許乃禁媚容數日一作月對海水有期三秋必壯江濤可望八月湏迎孫戩既曰篙工是稱舟子自言習水不慮驚風豈知白馬俄奔空邀伍相青鳬坐覆忽識馮夷應同罔象之神頗異吕梁之子媚容悲纒枕草志切投牋忽以祠𤓰何殊薦艾疑作芰衘心似石寜怕海童泣淚如珠即追泉客初均洛媛持弱態以陵波竟學曹娥抱沉骸而出浪論情足為純孝撫事不媿褒揚未題黃絹之詞先寘𤣥縲之罪州司滯獄法恐不然縣請立碑理應為當不除姊喪判得丙有姊之䘮合除而不除或非之稱吾寡兄弟不忍除也對䘮雖寜戚禮且節哀俾不足與有餘必跂及而俯就丙愛深血屬禮過時制興鮮兄之嘆情既鍾於孔懐及居姊之䘮服將除而不忍雖志崇敦睦而事越典彛况僥貴適中哀不在外宜抑情而順變多奚以為苟在禮而或踰過猶不及請遵仲尼之訓無執季路之辭居䘮年老判得丙居䘮年老毁瘠或非其過禮丙云哀情所鍾對孝乃行先則當衘恤子為親後安可危身丙䘮則未終老其將至懐荼蓼之慕誠合盡哀廹桑榆之光豈宜致毁所以爰從肉食佳服麻縗况血氣之既衰老夫耄矣縱哀情之罔極君子忍之苟滅性而不勝則傷生而非孝因親立節庶畢三年之䘮順變從宜無及一朝之患既虧念始當愧或非賣宅奉𦵏判得丁䘮親賣宅以奉𦵏或責其無廟云貧無以為禮對慎終之道必信必誠死𦵏之儀有豐有省諒欲厚於卜宅亦難輕於慮居丁昊天降㓙逺日叶吉思𦵏具之豐􅍯欲俯九泉顧家庭之屢空將鬻三畆愛雖深於䘮死義且渉於傷生念顔氏之貧豈宜厚𦵏覽子游之問因合稱家禮所貴於從宜孝不在乎益侈合伸破産之禁以避無廟之嫌士用大夫禮𦵏父判得丁為士𦵏其父用大夫或責其僣辭云從死者對禮惟辨貴孝不貶親是謂奉先孰云僣上丁慶加一命憂及三年㓙降昊天且結茹荼之痛吉從逺日方追食采之榮既貴賤之殊宜亦父子之異道同曽元易簀正位於大夫殊晏嬰遣車見非於君子未爽慎終之義允符從死之文辭則有徵責之非當不用父言殉𦵏判一作嬖妾為殉判得甲將死命其子以嬖妾為殉其子嫁之或非其違父之命子云不敢陷父於惡對觀行慰心則禀父命辨惑執禮宜全子道甲立身失正没齒歸亂命子以邪生不戒之在色愛妾為殉死而有害於人違則棄言順為陷惡三年之道雖奉先而無改一言以失難致親於不義誠宜嫁是豈可順非况孝在慎終有同魏顆治命事殊改正未傷莊子難能宜忘在耳之言庶見因心之孝文苑英華卷五百三十八
