body:
  text: 文苑英華卷三百九十九宋李昉等編諸監秘書監授張昌宗麟臺監制李嶠鸞臺校理文籍緝宣大典惟國所重非才勿居新除右散騎常侍中山縣開國男張昌宗鍾鼎盛門珪璋重器資忠履孝逰藝依仁碩學惣於丘墳高才軼於睢渙姿澹雅之操無欲無營體撝謙之風不矜不伐每懐五嶽之舉期陟九仙之路雖混濟之量未去朝廷而𤣥逺之心恒對山水頃立功祠廟欲以致福朕躬嘉其懇誠用増顯秩而有懐難進深懼將備一作滿固辭侍從之班願在優㳺之地子雲寂寞雅好文詞季長博通堪典經史宜因松栢之性處以蓬萊之山可麟臺監餘如故授王方慶麟臺監脩國史制李嶠鸞臺芸閣秘文蓬山奥府是為國重尤切帝難銀青光禄大夫行鳯閣侍郎王方慶鍾鼎高門簮纓舊德學富古今才優舒向自叅機密亟改凉暄謇諤之風不忘於獻替謙挹之美屢陳於衰病西垣掌誥雖藉謨猷東觀屬詞更資通博宜輟鳯凰之省俾緝麒麟之署可麟臺監仍監脩國史勲封如故主者施行授馬懐素秘書監制蘇頲黄門廼睠文籍填於外府旁求儒雅掌彼中繩左散騎常侍常山縣開國公仍每日入内侍讀馬懐素有舒向之風擅東南之美貫穿從學博而多能沈欝成章麗而有則自朝趨𤨏闥日侍金華事必討論言惟潤色故可以發揮秘奥詳覈異同俾㣲疑荀朂之才更允潘尼之拜可秘書監餘如故主者施行授蕭昕秘書監等制賈至門下圗書之府掌天人之際禮義之柄繫風化之元一作原為官擇人必舉髦士行禮部侍郎蕭昕文質彬彬學于舊史行給事中韓液恭儉莊敬藏器於身咸有令名昇降朝列正我墳典懋乃直清昕可守秘書監液可守太常少卿授王廻質秘書監等制孫逖門下守諫議大夫王廻質茂學純行國之耆耋左補闕韋㢘清才敏識人之英秀藩維日就實頼於師資軒陛晨趨有光於侍奉各施於用皆著其勤宜拜藏書之府俾遷紀言之職廻質可秘書監廉可起居郎授李潓秘書監制常衮勑昔劉向父子代典文籍今之秘室豈曰避親集作豈避選親再從叔正議大夫守光禄卿員外置同正員嗣澤王潓㓜嗣藩國夙彰忠孝素風自逺清識彌髙傳魯恭之古文禀吳季之知樂早承先顧嘗歴大僚秉彛端潔流問休茂自合縉紳之望况推宗室之良寜止於敦族以恩固在於叙賢以位周稱外史晉謂内臺俾領儒官是崇禮秩可守秘書監餘如故授許季同秘書監制白居易勑大理卿許季同國朝以來有劉德威張文瓘唐臨為大理卿有魏徴虞世南顔師古為秘書監則設官之重得賢之盛人到于今稱之今季同以明慎欽恤理刑獄以文學博雅掌圖籍由廷尉而長秘府論者榮之宜自重其官自逺其道又思與劉張唐魏虞顔為比不亦自多乎可秘書監餘如故授峽州刺史崔昌遐秘書監制薛廷珪勑今之出牧優賢之任也苟昆弟當塗即不敢膺其選避膏梁而示謙畏者果能行之乗氣熖而苟温足者或自便矣具官崔昌遐昔以令季作鎮衡湘願分使符出守荆楚輟自秘府委之夷陵二天方惠於疲人三入復蘇於旱歳亟陳章表牢執撝謙以為手足秉鈞固絶饑寒之患簮纓委地宜均休戚之懐且惜分飛懼妨賢路操履如是在一作其志不回凢今之人兹用嘉尚况爾踐揚華顯彬蔚彩章際此脩途資之明識又安敢置爾於要劇之地煩爾於撝揖之勞者哉眷言三閣實秘九流簡求常在於清賢臨長必先於儒者矧留虗位允屬僉諧更増馭貴之榮不改秩宗之任敬承休寵勉務優閑可正議大夫守秘書監殿中監授牛仙客殿中監制孫逖門下乃立御府其代天工必在信臣以兼重寄銀青光禄大夫太僕卿朔方節度兼闗内道度支一作支度下同兼管營田鹽池押諸蕃部落副大使兼採訪處置使羣牧都使監牧度支營内閑廐宫苑五坊等使攝御史大夫上柱國隴西縣開國子牛仙客忠公有度亮直無私長才為萬里之城沈畧乃一作是百夫之禦頃持節鉞嘗鎮河湟兵器惟精邊人咸頼出則靖國方資五利之功入則訓騶宜修六尚之職可殿中監散官勲並如故授李拭等宗正卿殿中監制元稹勑殿中監李拭左庶子韋乾度等明皇而下其屬未逺諸王在閣朕得時序其寒温睿祖集作宗而上五十餘族長㓜秩序盡委之於大宗正苟非賢能不敢輕授以爾拭踐履中外論備古今主宗之盟綽有餘裕而執事者又曰殿中監總六尚以供名物當進圭進爵之時不可虛位僉以乾度文學儒素旁通政經執憲南臺挺直不撓以之代拭允謂其良仍假右貂之冠加之集作於宗正之首朕不能無意於吾屬也拭可檢校左散騎常侍兼宗正卿乾度可守殿中監餘如故將作監授韋湊將作大匠制蘇頲黄門職惟共工率以匠石愛力省費為官擇人岐州刺史上柱國彭城縣開國侯韋湊直方在躬孝友成性文學可以比事髙明可以應物素風清節已振循良之聲課最當先宜膺述守之任可將作大匠勲封如故主者施行少府監授崔諤之少府監制黄門尚方既設内府為要選衆而求非賢孰與銀青光禄大夫行太府少卿上柱國趙國公崔諤之承名相之軌有忠臣之節正無所詘明無不鍳若披雲霧不雜風塵籍甚才名彬彬文質允兹邦彦尤重時英用符文舉之遷庻叶孟孫之拜可少府監勲封如故主者施行國子監授魚朝恩國子監制常衮勑大司成以三德行教國子所以明詩書禮樂之宗立忠信孝友之本使方領矩步敬業樂羣繋於化成舊選尤重叅其事任今亦難之開府儀同三司行内侍監兼􅂶監門衞大將軍觀軍容宣慰處置使仍兼知處置神䇿軍兵馬事内飛龍廐内弓箭庫等使兼檢校鴻臚禮賔上柱國韓國公魚朝恩國之純臣忠以事朕竭誠宣力義貫神明有兩朝侍從之勤監六師征伐之事雅達名理叅尚儒𤣥逺涉源流旁通訓詁自頃右武未遑勤學方𢎞闕里之教用誡子衿之詩以其達爼豆之禮嘗亦委膠庠之事能以德義導其諸生國之俊選其貴遊子弟摳衣皷篋歌詠先王之道春誦夏弦服勤師氏之訓而恭敬退讓抗䟽累辭重奪勞謙之志權遂由𠂻之請今三千之徒資於學植思卒其業懐之益深用𢎞儒風式允公望可兼檢校國子監餘並如故秘書少監授李永秘書少監制勑朝散大夫前守絳州别駕本州團練守捉副使李永慶自相門才推公器武子之德所謂在人𤣥成之經不忘肄業早從清秩備著聲華頃佐近藩衆稱淹滯俾叅榮於秘府仍貳職於名都可檢校秘書少監兼揚州大都督府司馬散官如故殿中少監授髙忠良殿中少監制賈至門下守司農少卿髙忠良植質温恭持操端慤每恪慎於公道尤精詳於吏事刄有餘地人無間言亞我九卿既聞條理典斯六尚允謂僉諧可守殿中少監授杜元逞殿中少監制蘇頲黄門銀青光禄大夫行光禄少卿上柱國金城縣開國子杜元逞久登位事早負聲實擇言以法飾吏以文清方藴其素心斷割成其利器用才可任惜太官之滯􅇔備物惟殷當御府之關綜宜膺寵命式副僉選可殿中少監散官勲封如故主者施行將作少監授敬暉營繕少監制李嶠勑前中大夫檢校洛陽縣令上柱國平陽縣開國男敬暉體業敦一作端詳識用强濟䕶衣仙閣已著聲芳製錦神畿遽聞課績杼人務切棘署名髙宜回三善之能令得百工之任可檢校營繕少監散官勲封如故授皇甫文佾營繕少監制鸞臺正議大夫行司刑少卿皇甫文佾早預衣簮累居清顯恭勤無怠歴職有聲徽纒為官已淹歳序斧斤成用更佇才能宜輟掌於棘庭俾昇營於梓匠可行營繕少監散官如故主者施行授陳正觀將作少監制蘇頲黄門正議大夫前襄州刺史上柱國陳正觀藴器沈敏懐才雅實在公有甄綜之能臨事有靖恭之譽頃者荆岑作鎮楚望班條時許仁明俗稱威惠五材是用百工分職爰考掄材一作符之績宜膺梓匠之司可行將作少監散官勲封如故授王震將作少匠一作監下同制賈至門下壽王府司馬王震立志恒新在公惟恪雍容散地未愜其才亮采百工宜欽乃職可將作少匠主者施行授宋渾將作少匠一作監下同制孫逖門下朝議大夫前守諫議大夫上柱國襄國縣開國男宋渾明敏自然通和足尚一作用承舊德之餘訓有多才之令名䘮制久除朝章式叙宜升髦士之列俾亞匠卿之任可守將作少匠散官勲封如故授翟璋將作少監制門下滑州刺史翟璋等精勤立志果斷雄才有吏道之能名是郎官之俊選掄材考行用掌百工之事宰邑臨人佇為四方之則可依前件授前左賛德任蕖將作少匠一作監制錢珝勑具官任蕖丞相進人之請吾嘗觀其所陳或舉淹滯或稱才用有一於此未嘗不行今言爾在公實踰四紀同塗之吏達者固多立事之心老而不已俾越下僚之次以寛暮齒之憂可依前件少府少監授李處直少府少監制蘇頲門下一作黄門中散大夫守將作少監上柱國李處直秉節清苦用心該密學探羣言文有幽致侍臣對問駮義無差共工之職豈徒有効宜遷内府俾徃中京可少府少監散官勲如故仍令東都守一作􅇔司檢校主者施行授馬錫少府少監制常衮勑中散大夫諫議大夫賜紫金魚袋馬錫躬服禮義處之以厚膺用多才動而濬發歴官有政居必修明擢登諫列屢獻忠讜言皆展意事亦主文勤職且淹以時叙進周之内府漢之尚方典掌服御任當親重輟我侍臣俾其叅貳可守少府少監散官賜如故授薛伯髙少府少監制勑前澧州刺史薛伯高昔楊洪公孫賀皆以儒術居于少府國朝監寺之列亦稱通顯貳于其長所任非輕以爾伯高早踐臺閣亟頒詔條勞績有聞聲譽不替因其秩罷寘在周行宜以廉潔自居用司所藏之職可守少府少監餘如故文苑英華卷三百九十九
