body:
  text: 文苑英華卷一千宋李昉等編哀弔下弔古戰塲文一首弔夷齊文一首弔漢武文一首弔萇𢎞文一首弔屈原文一首弔樂生文一首弔道殣文一首弔韓弇没胡中文一首弔古戰塲文李華浩浩兮一作乎平沙無垠夐不見人河水縈帯羣山糾紛黯兮􅉃一作慘悴風悲日曛蓬斷草枮凛若霜晨鳥飛不下獸挺亡羣亭長告予曰此古戰塲也嘗一作常覆三軍往往鬼哭天隂則聞傷心哉秦歟漢歟將近代歟吾悼浙本作聞夫齊魏徭戍荆韓召募萬里奔走連年暴露沙草晨牧浙本作收氷河夜渡地濶天長不知歸路寄身鋒刄臆腷一作腷臆誰愬秦漢而還多事四夷中州耗斁無代一作世無之古稱戎夏不抗王師文教失宣武臣用竒竒兵有異於仁義王道迂濶而莫為嗚呼噫嘻吾想夫北風振漠敵兵伺便主將驕敵畿一作期門受戰野竪旌一作旄旗川廻組練法重心駭威尊命賤利鏃穿骨驚沙入靣主客相搏山川震眩聲折一作析江河勢崩雷電至若窮隂凝閉凛冽海隅積雪沒脛堅氷在鬚鷙鳥休集作依巢馬亦一作征馬踟蹰繒纊無温墜指裂膚當此苦集作沍寒天假强徒慿陵殺氣以相剪屠徑截輜重横攻士卒都尉新降將軍復沒屍踣渃水一作塡屍巨港之岸血滿長城之窟無貴無賤同為枯骨可勝言乎一作哉鼔衰兮力竭一作盡矢盡一作竭兮絃絶白刄交兮寳刀折兩軍蹙兮生死决降矣哉終身夷狄鬬一作戰矣哉曝骨沙礫鳥無聲兮山寂寂夜正長兮風淅淅魂魄怨一作結兮天沉沉鬼神聚兮雲羃羃日光寒兮草短月色苦兮霜白傷心慘目有如是耶吾聞之牧用趙卒大破林胡開地千里遁逃匈奴漢傾天下財殫力痡任人而已其在多乎周逐玁一作獫狁北至太原既城朔方全師而還飲至䇿勲和樂且閑穆穆棣棣君臣之間秦起長城竟海為關荼毒生民一作人萬里朱殷漢擊匈奴雖得隂山枕骸遍野功不補患蒼蒼蒸人一作民誰無父母提携捧負畏其不夀誰無兄弟如足如手誰無夫婦如賔如友生也何恩殺之何一作如咎其存其殁家莫聞知人或有言將信將疑悁悁一作姢姢心目寤一作寢寐見之布奠傾觴哭望天涯天為之愁一作天地為愁草木悽悲弔祭不至魂靈一作精魂無依必有㓙年人其流離嗚呼噫嘻時耶命耶從古如斯為之奈何守在四夷一作皆唐文粹弔夷齊文栁識洪河之東兮首陽穹崇側聞孤竹二子昔也餒在其中偕隠胡為得仁而死青苔古木蒼雲秋水魂兮来何依兮去何止掇澗谿之毛薦精誠而已初先生鴻逸中洲鸞伏西山顧薇蕨之離離歌唐虞之不還謂易暴兮文一作又武謂墨縗兮胡顔時一吒兮忘饑若有誚兮于巖之間一作關豈不以冠弊在於上履新居一作處於下且曰一人之正位孰知三聖之純嘏譲周之意不其然乎是以知先生所恤者偏矣夫一無此字當昔夷羊在牧商浙粹作殷綱觧結乾道息坤維絶鯨吞噬兮鬼妖孽王奮厥武天意若曰覆昬暴資濬哲於是二老歸而八百會一戎衣而九有截况乎旗錫黄鳥珪命赤烏俾荷巨一作鉅橋之施俾伸羑里之辜故能山立雨集電掃風驅及下車也五刃不礪於武庫九駿伏轅於文途雖二士不食而兆人其蘇既其溥天率土咸為周人一作溥天周土率土周人吁嗟先生逃將何臻萬姓歸飾兮獨欝乎方寸六合莽蕩兮終跼於一作乎一身雖忤時而過周固一作終臣心而惻殷所以不食其食求仁得仁然非一端事各其志若皆旁通以阜厥躬以濟其利則焉有貞節之規各親之事靈乎雖非與道而保生可一作乃朂為臣之不二一作皆唐文粹弔漢武帝文并序李觀集無閱太史氏書見漢武之御極雖非蹈道之主亦英雄之君也然觀其内傳有學神仙與築三山焉飲露食霞希升汗漫激流延石用擬林泉嗚呼履其位而不知所以守好其事而不知所以從夫一物各異道萬彚不同致帝王之與神仙林泉之與朝市猶鱗羣毛族川陸分之日居月諸晝夜常之麒麟不可又處泉蛟龍不可更居藪玉兎莫闕於旦金烏莫瞻於宵附其翼者兩其足與其角者一其齒不兼之兼乂理昭然帝者冥本於觀人仙者冥先於逺世以林泉為意者可居於藪澤以天下為念者可謹於朝廷是以唐虞堯舜無野心子普許由辭寳祚誠以帝王於神仙有隔林泉將朝市難并也今據唐堯虞舜之地而求子普許由之志不亦迂而可痛哉况君子所以懽心屈體為僕御元元所以刲膏割血為飽暖又非圖林泉而學仙也傷心乆之戊辰嵗秋八月周覽秦原次茂陵之下既覩永歸之地彌懐所行之事且夫承天統物豈無足稱之德歟盖觀日月高明有時虧昃珠玉貞㓗不免瑕疵徘徊路隅興言而弔曰赫赫兮炎靈降神造漢秦楚四葉重茂翹英荐新首出羣龍卓為世祖秋風揚文夏日昭武柔不化之人闢一作闡未名之土雖殊仁聖之后是異凡庸之主伊何才有不周事非所事求非所求惟此帝謨相夫仙道魚處重淵獸居茂草辨乎朝市别以林泉日由旦陸月麗宵天跡既兩分理難齊尅若死將生猶南與北貪臣王公鞅掌可以勤萬幾欲升汗漫逍遥者可以為匹夫愛深宫秘殿者可以垂旒纊好青山渌水者可以棲江湖飲露乘景激流貫都苟能同致實曰殊途堯舜曰聖巢由匪愚確乎守一亦以難俱况夫小人唯唯罔圖山水君子乾乾孰為神仙嗚呼哀哉前鑒孔彰高臺深池夫差以伐尋山越海嬴致其亡有一於此未或無殃胡為乃辰于窮厥方舟全虎臂車出羊腸已臨塗炭幾絶包桑反覆前聞痛心疾首藥石無人瑾瑜有垢暑来寒往時移代乆吉壟將頽惡聲不朽日臨宇宙有時而虧目覩毫釐或不見眥將為而不知復知而故為嗚呼噫嘻弔萇𢎞文栁宗元有周之羸兮邦國異圖臣乘君則兮王易為侯威強逆制兮鬱命輔集作甫幽疹蟲集作蠱膠密兮肝膽為􅄷集作尤姦權䝉貨兮忠勇以劉伊時云侔集作幸兮大夫之羞嗚呼危哉河渭潰溢兮横軀以抑嵩高坼陊兮舉手排直壓溺之不慮兮堅剛以為式知死不可撓兮明章人極夫何大夫之炳烈兮王不寤夫讒賊卒施快於慓狡兮怛就制乎强國松栢之劉兮蓊茸欣植盗驪折足兮罷駑抗臆鷙鳥之髙翔兮孽狐惴而不食竊畏忌以羣朋兮夫孰病百而伸一挺寡以校衆兮古聖人之所難矧援羸以威慠兮兹固蹈殆而違安殺身之匪予戚兮閔宗周之不完豈成城以夸功兮哀清廟之將殘嫉彪子之肆誕兮彌皇覽以為謾姑舍道以從世兮焉用夫考古而登賢指白日而致憤集疊憤字兮卒頽幽而不列版上帝而飛精兮黮寥廓而殄絶朅馮雲以羾愬兮終冥冥以欝結欲登山以號辭兮愈洋洋以超忽心沍涸其不化兮形凝氷而自慄圖一作思始而慮末兮非大夫之操䧟瑕委厄兮固衰世之道知不可而愈進兮誓不偷以自好陳誡以定命兮侔貞臣以集無此字與為友比干之以仁類集作義兮緬遼絶以不羣伯夷殉㓗以莫怨兮孰克􅁤其遺塵苟誠端之内虧兮雖耆永州本作耉老其誰珍古固有一死兮賢者樂得其所大夫死忠兮君子所與嗚呼哀哉敬弔忠甫弔屈原文已見三百五十六巻弔樂生栁州本作毅文并序前人許縱自燕来曰燕之南有墓焉其志曰樂生之墓余聞而哀之其返也與之文使弔焉大厦之騫兮風雨萃之車亡其軸兮乘者棄之嗚呼夫子兮不幸類之尚何為哉昭不可留兮道不可常畏死疾走兮枉顧彷徨燕復為齊兮東海洋洋嗟夫子之專直兮不慮後而為防胡去䂓而就矩兮卒䧟滯以流亡惜功美之不就兮俾愚昧之周章豈夫子之不能兮無亦惡是之惶惶仁夫對趙之悃欵兮誠不忍其故邦君子之容與兮彌億載而愈光諒遭時之不然兮匪謀慮之不長怨集作跽陳辭以隕涕兮仰視天之茫茫苟偷世之謂何兮言一作信余心之所集作不臧弔道殣文并序獨孤及辛丑歲大旱三吳饑甚人相食明年大疫死者什七八城郭邑居為之空虚而存者無食歿者無柩集作棺殯悲哀之送大抵雖其父母妻子亦啖其肉而棄其體於田野由是道路積骨相枝􅀈枕藉者彌二千里春秋已来不書或謂縣官處師旅饑饉之弊宜禳災於未然既集作本時不時賑恤又苦一有之字以杼軸故及是及以為不然當陽九之厄隂陽俱浙本無此字錯而災沴降天也非人也於是延陵包佶作道殣文盖小雅雲漢之流也及亦裴回集作斐然獻弔且告之運命云八風不知集作和是六氣不均上天疾威大厲荐臻俾災流行殄殱斯人此疑作比自淮沂逹於集作于海隅札瘥夭昏亦既毒痡匪蹈宻網匪罹萑蒲饑饉降䘮淪胥以鋪人生寄世孰非逺客嗟爾賦命天年逼廹生不餬其口死不掩其骼曠野茫茫僵屍纍纍髑髏峥嶸如堆如坻里閭無煙雞犬去之死非爾所鬼其餒而水滔集作䧟厯陽貴賤同傾秦坑趙軍集作卒肉填長平實天不傭謂禍莫京爾復胡為無辜命并將天夭閼之則如勿生司殺之柄孰云孔明伊昔太古上𤣥同之集作之世天無鞠㐫物無癘疪集作疪癘父不䘮子兄不哭弟亦有華胥民夀千年隂陽常和玉燭常燃彼何人斯而生斯時聖人既興大道亦隨外户反閉賢愚相欺我先王乃作五兵固不得已而用之堯舜既沒揖譲不傳黄鉞白旄謂之應天德乃下衰干戈相連陽九祅興災纒㓙年鳥皆夜啼集作鳴人失其全食盡力罷守死道邊不自爾集作我後不自我集作爾先萬世一時運有固然帝在法宫清問下民青旗鑾輅時令惟新協風布和天下皆春爾往莫及委骸窮塵命不可問嗚呼蒼旻弔韓弇没畨中文集題作弔監察御史韓弇沒畨文李觀維唐貞元元年匈奴上欵乞盟天子以其言誠乃命上將往墠於邊文粹隂山而聽其誓言監察御史韓君載筆而随焉我上將杖九廟之信而首盟其間以戎人心為心戎乘我不虞而有有字集作昧受詭謀我計無素成而姦已宿盟二本作姦以宿萌故勇者死奔者追而韓君為之擒文粹有矣字嗚呼有備無患軍志也戎人安所暴其詐千慮一失聖人也韓君所文粹作是以為之虜天其或者將用訓二字作警我非福戎也韓君之為擒其幾文粹作繋命歟五年于今集作兹生死不尋謂之生豈復還期謂之死承承文粹作永永集作往往湮沈或曰死矣惄如是切傷歌者之心一作曽是切商弦之心絶國浩浩窮西亘天二字作極濵強蕃據一本作居之雄視狺狺文粹作齗齗流沙無波隂山無春邊草不緑塞鴻不賔秦有長城漢有遺人死者為鬼生者為臣哀哀集作曽韓君生死窮辛鬼能靈人能語君生其所死其所今两寂然必文粹作心由中阻君初奉使二本作役意氣集作咫尺西道白珪之貺唾掌可保激義文粹作魯陽之虜二本作勇歎典屬之老及文粹作乃即於事不能盡二本作晝竒從軍之籌君固職之可疑不疑事果用危集作固用阽危羣羌文粹作羌戎髬髵坐刄我師擒卒揕胷二本作倉卒閻胷血殷朔陲實死者悲文粹作痛非禽者智集作非生之悲粹作非禽之悲夾谷之會不聞仲尼秦中八集作九月黄葉始下長風西来烈烈飄瓦集作野望君申弔有集作亦懼来者已乎一魂世文粹作時也命也文苑英華巻一千
