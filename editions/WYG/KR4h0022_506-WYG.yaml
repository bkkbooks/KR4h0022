body:
  text: 文苑英華巻五百六宋李昉等編門道闕同前崔瓘鳥鳴亳社燕死吳宫屋室坐焚營魂溘盡下堂待𫝊嘗聞宋女之貞上國同盟亦曰諸侯之義情深怛化亊急災分介之旌綿何嗟及矣求也攝帛如可贖兮豈澶泉左傳㑹于澶淵宋災故既而無歸唐諱淵故作泉之無歸固匍匐而將救歛怨為徳容或干刑贈死及屍昧非懵禮覽公羊之大傳自有明文考縣象之舊章了非昧法人且無罪事固絶倫同前張淵疑丙家非綿上室異廐焚初聞問馬之辭旋至歌龍之斃將救餘燼昧元瑜之舊林言訪遺煨異僖父之前室望人矜兹逝者歌彼蕩乎亦既聚財更其所傷吊生以禮因不違於􅈖贈哀死及屍亦何議於賍物誠以魯策求之宋妻丘既吾無間然預今得為義矣㐫荒判豫州昔嵗人羮芋魁所由得租百姓上狀對賈登則以三壌均乎九賦或愆嵗計之期必降時宜之典荆河惟豫芋區在蜀往有菜蔬之色獲充藜藿之資采葑以菲且存下體如葵非智斯無衛足既而吏作輕税人困薄言雖稱漢代有文頗異堯年作法且所縁嵗損合預申陳六條初不上言百姓無從下免任從收税將謂合宜同前食以為天農固其本幾缺有秋之稔徒有望嵗之憂睇彼荆河實惟菜色豐祥不聞於鳴雀徇急頗見於蹲鴟地雖化於岐山豈臻豐富人已歌於翟氏詎得徵收百姓有詞理固難奪反古脩火利判乙學脩火利合土為之用人言其反古辭云皆從其朔對常無求五帝殊功不相沿襲三王異制各有等衰故汙罇於太素之前合土漸澆醨之代乙雖非火正將效祝融未及漢隂之望遂作河濵之噐俾夫炎上之徳有益陶鈞濟物之功更成埏埴則宫室臺榭為利頗多送死事生于何不有跡雖反古事乃榮今無乖理佐之端妙合隨時之義况稱從朔將執禮經雖致薄言何傷厥理同前張孫憲博考終古厥惟敦龎大智未萌尚質巢窟後聖有作乃教炮燔爾來欽哉孰謂為刺乙或工者舉而修之以火化物豈特鎔金之利若泥在鈞斯從合土之法既埏埴以為用非陶甄而謂何茍學非乖方篤在守業得髙曽之規矩無寙濫之悔尤則彼有虞以協還淳之化紹于上古寧云反古之道從朔者稱其有典薄言者則謂無稽文苑英華巻五百六
