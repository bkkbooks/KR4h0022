body:
  text: 文苑英華巻八百十九宋李昉等編釋氏三佛像下彭城公寫經畫西方像記一首畫西方幀記一首畫彌勒上生幀記一首易州抱陽山定惠寺新造文殊師利菩薩記一首興唐寺毗沙門天王記一首經上大唐金剛般若石經記一首夀州法華院石經堂記一首東林寺經藏西廊記一首華嚴經社石記一首香山寺新修經藏堂記一首佛像下彭城公冩經畫西方像記盧子駿滁州長史盧子駿太和六年十一月十七日自南譙抵鍾離謁太守彭城劉公公以鯫生文苑之舊常無疵瑕歡好同昔年宴游無虚日因及開元佛寺指大乘經藏曰我召傭書人書冩也西墉有西方像焉我俾畫工圖形也鑿户牖以為廟我命梓人庀事也厥功暨秋七月而畢先時公由廷尉評佐畫中書令田公於鎮州田令公將朝天子藉公上請事未訖而田令公遇害從事者皆死白刃毒流於妻孥亂兵相約曰評事國士也議帥一作師前未嘗不忠遇吾儕未嘗不信安可負評事耶駭評事家者衆誅之由是良賤獨無横禍未幾天子震怒命將討賊鎮州阻絶公莫得知其家公曰吾孀姊依我少妻從我姊之子吾之子皆齒稚得脫虎口者非大聖相祐其可保全乎哉遂血淚横下歸誠䖍禱曰吾姊吾妻吾甥吾兒無恙而出㓂境者則丹青極樂世界一鋪冩金剛般若波羅蜜經一千巻以酬焉不則吾終身不禄仕也明年公之長㓜髙下咸自賊中至君子曰劉公起諸生擅名文塲為聖朝博士損益禮樂簮白筆瞻我衣冠者不犯居粉署大彌綸之績收濠梁著来蘇之謡履道坦夷濟物平施加以為弟之悌為夫之義為舅之惠為父之慈其在詩曰允矣君子展也大成公宜延洪我國家康濟乎兆庶有皇天之福祐靈祇之相助化危為安彌禍為福信修身飭行之報矣非祈佛之效也且徴之亂日公之同僚無一免者而公不在亂邦祈佛之辰公之同僚黨屬盡夷滅而公之家恬然無事可以明矣于公獄吏耳守法能平尚慶流後嗣矧公之於家也友愛如此於國也賢明如是鎮之狂㓂其如公何而今公捐清俸鳩衆工毫相嚴備心法闡揚緘之以寳龕邃之以紺殿煌煌焉言言焉斯亦公不欺夙誠而欲復言也子駿辱公之遊于兹二紀熟公之懿範仰公之嘉猷因喜幽顯有答故刋石以祗命云太和六年十二月五日濠州刺史彭城劉闕建畫西方幀文粹作㡧記白居易我本師釋迦如来說一作記言從是西方過一集無一字十萬億佛土有世界號極樂以無八苦四惡道故也其國號净土以無三毒五濁業故也其佛號阿彌陀以夀無量願無量功徳相好光明無量故也諦觀此娑婆世界㣲塵衆生無賢愚無貴賤無㓜艾有起心歸佛者舉手合掌必先嚮西方有怖厄苦惱者開口發聲必先念阿彌陀佛又範金合土刻石織文乃至印本集本文粹作水聚沙童子戲者莫不率以阿彌陀佛為上首不知其然而然由是而觀是彼如来有大誓願於此衆生衆生有大因縁於彼國土明矣不然者南北東方集作東南北方遇見二字二本作過去見在未来佛多矣何獨如是哉唐中大夫太子少傅上柱國馮翊縣開國男二本作侯賜紫金魚袋白居易當衰暮之嵗中風痺之疾乃捨俸錢三萬命工人杜宗敬按阿彌陀無量夀二經畫西方世界一部髙九尺廣丈有三尺彌勒集作陀尊佛坐中央觀音勢至二大士侍左右天人瞻仰眷屬圍繞樓臺伎樂水樹花鳥七寳嚴飾五綵彰施爛爛煌煌功徳成就弟子居易焚香稽首跪於佛前起慈悲心發𢎞誓願願此功徳廽施一切衆生一切衆生有如我老者如我病者皆願集作願皆離苦得樂斷惡修善不越南部便覩西方白毫大光應念来感青蓮上品隨願往生從見在身盡未来際常得親近而供養也欲重宣明二本無此字此願而偈讚云極樂世界清净土無諸惡道及衆苦願如老身病苦者同生無量夀佛所開成五年三月十五日記畫彌勒上生幀集作㡧記南贍部洲大唐國東都香山寺居士太原人白樂天年老病風因身有苦遍念一切惡趣衆生願同我身離苦得樂由是命繪事按經文仰兠率天宫想彌勒内衆以丹素金碧形容之以香火花果供養之一禮一贊所生功徳若我老病苦者皆得如本願焉本願云何先是樂天歸三寳持十齋受八戒者有年嵗矣常日月焚香佛前稽首發願願當今来世與一切衆生同彌勒上生隨慈氏下䧏生生刼刼與慈氏俱永離生死流終成無上道今因老病重此證明所以表不忘初心而必果本願也慈氏在上實聞斯言言訖作禮自為此記時開成五年三月日易州抱陽山定惠寺新造文殊師利菩薩記邵真恒北山之鎮也易朔門之衝也山形東下萬嶺相屬得抱陽之一峯岌然孤標對引雙翼前面豁向陽光抱中故以抱陽名山山有定惠寺建于隋開皇成于今大厯左有精舎上有寳坊憑巖架壑崛起堂殿甃石為趾飛空構梁廽廊盤磴層閣鬱峙陽崖森竦以木秀隂壁沮洳以泉灑可以資䕃庥可以備飲濯朝日上海千巖下平晴雲捲霄百里前盡萬靈之所孕育衆聖之所栖憇賔延真至驅伏魔恠導聾俗於覺路化空山為金界羌難得而畢載也皇帝御天下之十三年至化汪濊被於無垠紹興像法荷䕶釋種我成徳節度使太子太傅尚書左僕射兼御史大夫隴西郡王李公寳臣光膺朝寄主東之諸侯保和師旅一作人康靖方夏民既咸理法亦隨建遺功墜跡悉命修復有若新羅真子曰談藏浮海而至止於山間廽向懇到發其言願乃於寺内建文殊師利菩薩堂焉又於堂内立我隴西王洎夫人邠國夫人谷氏真形於其次所以存相展敬荷恩昭報也規心匠智庀徒蕆事徴工攻木陶瓴窮沙凝礫人隨悦来事與念就乃畢上木乃備丹素綵錯翬飛霞張電烻儼八部以營衛列四天以䕶持如登化城忽入空境作禮端肅則文殊垂教之跡可歸也潔誠趨奉則隴西䕶法之恩可報也夫大雄現世乗化演教隂濟羣動冺而歸無大賢佐世康物毗政協宣元氣退而不有以性一作無相示不以文字成元純𡨕符其理宗一則歸向者不必入毗耶之㑹方受真如之㫖䖍敬者不必趨丞相之府方承文告之令心念目覩隨而應祉於此堂也息真子之心廽是顯績樹為介福固一作故我皇極不騫不崩登我明祚如岡如陵俾我隴西公位尊而夀功業長乆俾我邠國既熾而昌福履穰穰轉輔公朝以作鎮配茲山以等固宜之哉真實掌中軍之記敢拜嘉命書于貞石時大厯甲寅嵗孟冬旣望興唐寺毗沙門天王記盧𢎞正毗沙門天王者佛之臂指也右扼吴鈎左持寳塔其㫖將以摧羣魔䕶佛事善善惡惡保綏斯人在開元則𤣥宗圖像於旗章在元和則憲皇交神於夣寐佑人一作仁濟難皆有隂功自時厥後雖百夫之長必資以指揮十室之邑亦嚴其廟宇戢齊强暴無煩狴牢敏以一作於為政者必因而證樹之興唐寺僧道契者惠智之人也眄隙地得勝槩肇基厥事始唱而求其和焉前刺史范陽盧公周仁薪骨塗肉以立之後刺史河南渾公鋒施丹凝素以完之終而司勲京兆韋公磻揮金致繢以羙之窺三君子同心構物之道顧斯人之肥瘠一作也豈一朝一夕一手一足之功哉𢎞正惴惴兢兢大懼三賢相因之績由我或隳而巳余一作爾視斯像且未有増一毫之力視斯人其獲有所一作其有所獲施為耶撫事及政為之記云時開成三年十二月十五日經上大唐金剛般若石經記釋真言有唐相國寺大徳曰景融建金剛般若石經于大梁當唐氏帝天下百六十有八祀貞元元年龍集乙丑皇帝拜南郊之来月壬戍立于寺奉國報慈從昔願也夫先佛者法法空則境證後佛者教教離則言亡雖至徳而無形亦假名而有後繇是脫靈之源流重華於漢土慧命之懸解載頌於魯文融公宣之與慧命俟疑矣公性惟明敏量秉淳固生而好學㓜則老成孝傳鄉黨名冠緇宿心堅不玷之玉行滿上弦之月為儒之龜鏡則在三之義全紹佛之弓冶則第一之道立加以才髙利用迹著通方掌僧有火光之烈待客有泉水之稱不求虚飾外以浮榮異世同流聮芳並羙公以出塵而不為闕而不為邦之史一作吏常追昊天之報每蓄維桑之敬遭逢世故蕩溺兵間定亂之術非孫吴不可問安之禮非荀趙不大君親之効我復何有遂乃恭已懇志建言有謀以為至聖無私㑹感必通正智無情在幾必兆因疇遺訓歴考故實願欲一作為寫誦章句潛融觀照持三輪空成萬象印禍不却而自抑福不招而自集本無為以寜家體淳化以建國則知刑賞之内權衡制之刑賞之外我法綏之事無績而有忠功不伐而多義斷其今古度以優劣苟折骨刺血于皮紙則節苦而難就欲垂露懸針於竹素則工費而易朽所以徴藍田之羙璞擬繁昌之麗刻庶蹔勞而永固與天長以地乆一作與天地以長乆於是月殿西次雕楹南嚮四序光景六時香煙模可以廣千萬經觀可以更億兆衆公與真言十年之長三紀之故假詞抒意難讓課虚謝命含毫感事題記者也夀州法華院石經堂記李紳如来以萬門萬行普示衆生隨其性根用假方便水月觀像萬泉俱鍳識真如者知非在水慧燈傳照百千同朗識佛智者知燈在覺是以如来開三乗諭演菩薩㫖傳十二輪渡生死海是經之要妙諸佛之心印巻舒萬法一作巻彰示凡聖信觧得入入為真諦無我無我無為無為無生無滅諸佛如来不以寂滅自樂無生自處故現生滅以示羣迷入煩惱中解衆生縛入有相中示衆生滅是以諸佛如来以一切衆生煩惱苦海無明罪垢為觧脫方便故經有火宅窮子以𢎞法諭有衆生有煩惱離煩惱即諸佛有煩惱即衆生煩惱蓋纒不知明覺如寐如病佛為解寐療病衆生昬業不能解釋故如来廣清净教開是經典用曉迷愚以示方便聞是經者發菩提心持是經者入如来智一禮一敬皆資勝因刻于貞石瞻仰常覩表佛慈㫖無言現言刋諸蓮宫永乗福慧太和六年嵗在壬子七月既缺之二日書東林寺經藏西廊記白居易元和初江西觀察使韋君丹於廬山東林寺神運殿左甘露壇右建修多羅藏一所土木丹漆之外飾以多寳相好嚴麗鄰之集作諸鬼功雖兩都四方或未前見一切經典盡在乎集作于内蓋釋宫之天禄石渠也初藏既成南東北廊亦具獨西未作而韋君薨迨今十餘年風日所飄燥雨雪所沾濕西南一隅壊有日矣僧集有坊字衆惜之予亦惜之非不是圖財力不足暨十三年予作景雲律師塔碑成景雲弟子饋絹百疋予法施净財義不已有即日移用作藏西廊因請寺長老演公滿公琳公等經之寺綱維令果集作杲靈達等成之蓋欲䕶前功償始願非布施相功徳心也其集經名數與創藏由縁詳于李肇碑文此但書新作西廊而已十四年月日忠州刺史白居易記華嚴經社石記有杭州龍興寺僧南操當長慶二年請靈隠寺僧道峯講大方廣佛華嚴經至華藏集作嚴世界品聞廣博嚴净事操歡喜發願於白黒衆中勸千萬人集疊人字轉華嚴經一部十萬人中又勸千人集疊人字諷華嚴經一巻每嵗四季月其衆大龢集作聚㑹於是攝之以社齊之以齋自二年夏至今年秋凡十有四齋每齋操捧香跪啓於佛曰願我来世生華嚴藏世界大香水海上寳蓮金輪中毗盧遮那如来前與十萬人俱斯足矣又於衆中募財置良田十頃嵗取其利永給齋用予前牧杭州時見集作聞操發是願今牧蘇州時見操成是功操自杭詣一作之蘇凡三請於予曰操八十二矣朝夕待集作迨盡恐社與齋来者不能繼其志乞為記誡俾無廢墜予即十萬人中一人也宜乎志而贊之噫吾聞一毛之施一飯之供終不壊滅况田千畆齋四時用不竭之征備無窮之供乎噫吾聞一願之力一偈之功終不壊滅况十二部經常出於百千人口乎况十萬部經常入於百千人耳乎吾知操徒必果是願若經之句義若經之功神則存乎本傳若社人之姓字若財施之名數則列于别碑斯石之文但叙見願即来縁而已寳厯二年九月二十五日前蘇州刺史白居易記香山寺新修經藏堂記先是樂天發願修香山寺既就事具前記迨今七八年寺有佛像有僧徒而無經典寂寥精舎不聞法音三寳闕一我願未滿乃於諸寺藏外雜散經中得遺編墜軸者數百巻秩以開元經縁按而校之於是絶者續之亡者補之稽諸藏目名數乃足合新舊大小乗經律論集凡五千二百七十巻乃作六藏分而䕶焉寺西北隅有隙屋三間土木將壊乃増修改飾為經藏堂堂東西間闢四牎置六藏藏二門啓閉有時出納有籍堂中間置髙廣佛座一座上列金色像五百像後畫集作設西方極樂世界圖一菩薩影二環座懸文旛二十有四榻席巾九洎供養之器咸具焉各為道場簡儉嚴净開成五年九月二十五日堂成藏成道場成以香火釁之以飲食樂之以管磬歌舞供養之與閑振源濟釗操洲暢八長老及比丘衆百二十人圍繞讚歎之又别募清净七人日日供齋粥給香燭十二部經次第諷讀俾夫經梵之音晝夜相續洋洋乎盈耳哉忻忻乎滿目集作願哉爾時道場主佛弟子香山居士白樂天欲使浮圖之徒㳺者歸依居者䕶持故刻石以記之文苑英華巻八百十九
