body:
  text: 文苑英華巻九百三十五宋李昉等編皇親酅國公墓誌一首信王墓誌一首鄴國公墓誌一首新平王墓誌一首睦王墓誌一首郭駙馬墓誌一首㑹王墓誌一首酅國公墓誌一首楊烱永昌元年春二月甲申朔酅公薨公諱柔字懐順𢎞農人也縣犯太原王廟諱改為仙掌焉公即隋煬帝之𤣥孫元德太子之曽孫恭帝之孫酅國公行基之子粤若稽古崇德象賢統承先王脩其禮物惟丞相保寧西漢惟太尉亮弼東朝功書王家澤流後嗣亦猶司徒之敬敷五教殷徳日新后稷之播時百穀周有大賚隋髙祖昧旦丕顯齊聖廣淵皇天眷佑誕受顧命恭皇帝遜位明敡能讓天下作賔皇室與國咸休承百代之宗國穪二王之後公山河積氣清白餘基孝友著于閨門信義行於邦國從心妙用不出户庭覃思典墳不窺園圃及其上公傳位命服居前有怵惕之心無驕矜之色漢之平帝猶敬劉歆集作猶封曽侯魯之戴公尚聞商頌大唐貴為辰極富有環瀛用三王之禮以同天地奏八代之樂以答神祇郊上𤣥定泰畤金繩玊匣日觀登封左个西偏明堂布政未嘗不虞賔在列周客來庭禮秩尊于百寮贊拜絶於羣彥集作后猶能小心畏懼恪慎肅恭上帝時歆下人祗恊以為藩屏以訓子孫稟命不融享年五十有五嗚呼哀哉越某月塟于某原嗣子某官生盡其孝集作養死集作没盡其哀學不替於為䘮禮有踰於鑚燧卜其宅兆俾無後艱述其家風謂之不朽其銘曰有客有客乘殷之馬建于上公尹兹東夏有客有客乘殷之輅作賔王家率由典故天之蒼蒼人之云亡柏檟成行魂歸故鄉故開府儀同三司上柱國贈太傅信王墓誌常衮昔周以仁厚之化睦于宗戚而武王之弟有國者三無官者五漢家雖皇子畢王而猶各守疆土不在京師我唐以孝理萬國周親並建至𤣥宗儀制益重寵以留邸罷其歸藩大第連乎北宫高臺接乎雙闕令舊典不易特恩有加所以廣親親之道洽骨肉之愛也王諱望字某𤣥宗至道大聖大明孝皇帝第某子也母曰盧賢妃性與其貞氣合於純君親之際止於孝伯仲之間止於弟重以師傅之教資其賢淑之能實大雅之明哲高陽之恭懿也在開元時則帝子之寵紫殿温凊一作靖彤庭趨拜鳳姿秀發麟趾光華祚于海邦藩我王室在至德時則皇弟之貴駟馬之迎深於友愛三雍之獻益用親禮故詩有行葦勿踐所以昭忠厚也我皇既受命則叔父之尊安平望髙淮南屬長其朝㑹也不在贊拜之列其晏私也特加夀觴之敬故書有分王展親所以美敦敘也至如緑池朱閣素月清風兄弟俱來子孫列侍􅅯蹇叢桂淹留芳草内饔分膳賜藥在庭杳然蓬瀛之外自適天人之樂斯非聖君尊寵之所尚聖王福履之所宜也以大厯九年十月庚午寢疾薨于上京春秋五十皇帝設位哀慟輟朝三日乃命中貴人襄事於内邸宗室屬籍哭於外次既殯又詔司儀備物典䇿追諡命大傅光禄勲持節弔祭京兆尹監護䘮事以其年十一月庚申葬于細栁原妃范陽盧氏祔焉禮也嗣子某郡王某官某乙等孝極其至䘮如不勝故事藩王墓銘别詔論譔微臣惶恐謹而誌之詞曰玉瓚黄流文祖受命金璽緑綬賢王分慶惟此賢王令德孝恭尊事天子翼翼邕邕天子敬異優其賜與大輅之旂𤣥衮及黼如何不永誰察誰補葬我叔父于渭之傍曉下蘭坂夕臨芷陽百官㑹送五校啟行鼓吹悽咽郊原蒼涼御津門外集作上御津門逺睇連岡懐德増慟迴與更傷信王第七子贈太常卿鄴國公墓誌前人維永泰元年嵗在乙已四月壬戌朔十一日壬申有唐信王第七子儔終于西京之内邸春秋一十有八嗚呼哀哉詔贈太常卿粤翌日追封鄴國公以其年五月三十日葬于細栁原禮也公系承霄極慶襲藩維忠肅立身孝恭成性早聨華於武穆能有裕於文孫令範韶閒良才美秀敦以友悌絶其交遊器適四科術通六藝𢎞此素尚暢於黄中宜其夀昌胡不秀實方固盤石遽凋本枝皇上義切友于情深悼徃睦親軫念懐德増悲寵贈太常卿特優恒數仍錫苴茅之命用追棣蕚之榮日月有時卜云其吉送終㶚岸載動津門爰命侍臣碑刋貞石銘曰𤣥宗之孫信王之子性與聦悟天姿韶美始能趨拜即異幼冲觀書魯壁習樂雍宮韞此器能方期光大一朝短折萬事冥昧皇恩寵贈友愛惟深幽扃永閉長夜沉沉奉天皇帝長子新平郡王墓誌維永泰元年嵗次乙已二月十七日新平郡王薨于西京之内邸春秋四十一粤以其年五月七日遷窆于萬年縣龜川鄉細栁原禮也王諱嚴字伯莊睿宗之曽孫𤣥宗之孫奉天皇帝之長子也幼而温良夙乃碩茂動皆執禮言必稱詩皇孫之中德行推美周邦右戚漢典開封代繼讓王之尊親承太伯之嗣先朝友愛奕葉追崇常佳南楚之風每翫西園之月仁者不夀遘疾而終皇上軫棠棣之悲懐鴈行之􅆭輟朝震悼義切天倫鷰􅎬云封龜占從吉俄辭舊邸言向佳城近灞陵之高原當細栁之吉地丹旐将引𤣥甲啟行器備飭終禮有異等嗣子年在童幼執䘮而哀詔塟之儀悲聲先逺禮豐碑之窆疑詞在刋銘銘曰文昭武穆天孫帝子好古推賢樂善歸美親承太伯業繼賢王漢屏斯重周卿有光人閱於水夜遷於壑長坂蘭摧小山桂折細栁之地灞陵之川泉扃一閉幽􅎬千年睦王墓誌銘梁肅王諱某有唐代宗睿文孝武皇帝之第幾子今皇帝之愛弟也某年封睦王春秋若干以貞元七年某月日薨於京師皇上震悼命有司筮宅兆選吉日以明年二月某辰葬王某縣某鄉某原禮也惟天祐序于皇家惟王承慶于祖宗方於集作之有周康叔實文王之子擬諸炎漢河間稱武帝之弟天鍾秀氣幼挺全德清明在中淳耀集作輝發外稟先聖之嚴訓則樂善不倦奉吾王之深愛則敬順日躋至乃因心之孝率性之道集作義温良惠和敏肅端懿學無不探集作深藝無不至固已邈焉殊倫焯集作綽於生知者已洎夫備物典䇿啟土建封桓珪之重盤石之宗守以清淨行以謙冲不然者何名之茂何寵之豐方將明上集作朋三夀以用五福胡乃天不憗而命不融此聖人所以深津門之慟凡伯所以惜東平之終臣肅奉詔銘石寘𤣥壤之中所以紀兹墳之永固以表王德於無窮者也銘曰聖帝介弟於維睦王令問令望于邦有光惟王之賢懿徳日宣受福于天胡不永年東門之路西靡之樹萬有千古賢王之墓㑹王墓誌銘白居易唐元和五年冬十一月四日㑹王寢疾薨于内邸大小殮之日上皆不舉樂不坐朝思也越十二月十八日詔京兆尹王播就監視塟事窆于萬年縣崇道鄉西趙原禮也是日又詔翰林學士白居易為之銘誌故事也王諱纁字某德宗之孫順宗之子陛下之弟幼有仁集作令德早承寵章未冠而王受封于㑹夫以祖考積集作定是徳之慶父兄天日之貴祚集作胙土列藩之寵好徳樂善之賢宜乎夀考福延為王室輔嗚呼降年不永二十一而薨集作終哀哉皇帝厚敦集作惇睦之恩深友弟之愛故王之薨也軫悼之念有加於常情王之葬也追尊之儀有加於常數哀榮兼備斯其謂乎銘曰嵗在寅月窮紀萬年縣崇道里㑹王薨葬於此特進贈兖州都督駙馬都尉觀國公楊公墓誌銘張九齡公諱某字某𢎞農華隂人也其先食采於楊因邑為氏始大於兩漢更盛於周隋司空觀徳王我之高祖也台階論道盟府書勲利建維城澤流後嗣洎右衛將軍贈兵部尚書府君諱某累葉炳靈六轡承祀而皆千里一舉逸翰所推五族集作侯同拜貴戚莫比公即尚書之子也誕保中和克紹前烈幼以美秀兼太叔之文長而嘉聞増季友之業孝悌忠信藴乎生知禮樂詩書成於時習弱冠以門子調補晋州㕘軍中宗之在春宫也妙簡才地將降天孫兼之實難而公惟允以選尚長寧郡主加朝散大夫拜通事舍人累遷左集作右衛郎將神龍元祀中興在運預聞大䇿克樹休勲而貴主宜家既増湯沐列侯傳國復錫山川至是始襲觀國公拜駙馬都尉左千牛衛將軍加上柱國累遷秘書監兼太子賔客増秩金紫光禄大夫又特進右散騎常侍左千牛将軍陜王傳坐事左出巴州刺史入為光禄卿復出為亳襄陳鄧四州刺史左轉鄜亳許綘四州别駕公性明敏有器韻不求虚譽而百行允脩不矜小喜而九能咸事至於入官從政東文西武才既兩可事亦百中且不恃貴而集作以傷義不怙寵而廢公奉以周旋加之撝挹雖在降出無它悔恡此亦公之善自為謀以道終始者也開元十二年四月癸夘遘疾薨於絳郡之官舎春秋五十天子悼焉有制贈使持節都尉兖州諸軍事兖州刺史仍遣使弔問令還葬京師恤禮有加哀榮異數其年秋九月甲申塟于北原其孤曰某等㷀㷀在疚願圖遺後之人亦知范宣之世禄豈獨臧孫之立言銘曰巖巖大華作鎮西土祚我諸楊降生厥祖四代而立為漢元輔爰及𦙍裔克復光集作先古猗嗟觀公不沗前人荷天休寵為國嘉姻王孫作儷帝子來賔瓊敷玉潤暉映紛綸乃登王朝乃尊爵秩禄盈萬鍾賦食千室亦克畏滿亦以戒逸物更盛衰時有得失稟命不融斯人則亡天歸京兆地還連岡于嗟此室徽音不忘銀青光禄大夫檢校左散騎常侍兼宫苑閑厩使駙馬都尉郭公墓誌銘沈亞之府君諱某其先關西鄭人也大父汾陽王始以武集作戎勲著績為朔方軍副使天寳末𤣥宗西巡巴蜀肅宗勞兵于靈武乃率其義虜順夷合兵逐叛得為朔方軍節度既而二駕還都拜為中書令統兵於外初廣德集作代宗初犬戎飲馬昆明至于御溝天子在陜又以擊逐之功益拜尚書令封汾陽王尊稱尚父乃詔子曖尚昇平公主都尉主客皆賢故長安中名人文士自李端司空曙之徒咸遊其門賦詩席酒更日而主生子三人女二人長今為皇太后府君即其少子初憲宗居邸時親臨主家納迎如禮及今上即位皇太后昆弟皆寵錫尊官而府君最少益蒙隆念自汾州刺史入為殿中監尚河西公主嵗餘改宫苑閑廐使府君寛柔和易不守剛决長慶三集作二年七月五日暴疾卒于主家享年三十七太后聞之驚悼悲哀使者自中宮出按問發疾之狀月餘乃解以其年十二月十九日葬于京兆某原之上初西河主前降吳興沈氏生子男一人及郭氏之䘮無後而以沈氏之嗣為之主辦卜葬有期主䘮者使其家吏牽馬操幣至于櫟陽即尉家曰尉之文記事有聞矣願得為之銘以誌其壙於與敘勲典之事表于墟中云銘曰河旌崑崙命源惟長䟦于神葉其來泱泱影響邁㑹披華吐章靈姻氣交彭而興祥陶以精神涵為濃光保我國歩乃生汾陽在户作扃横天為梁息災破難以藥痍瘡帝子入室固如維綱孫為國母沙麓以昌少舅集作為姻臣謙寛汪汪禄而不夀念集作哀彼中傷惟其流慶與唐無疆文苑英華巻九百三十五
