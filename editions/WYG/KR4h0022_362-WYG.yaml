body:
  text: 文苑英華巻三百六十二宋李昉等編雜說三志過一首天說一首䄍說一首朝日說一首乗桴說一首讀韓愈毛頴傳一首畫諫一首代河湟父老奏一首說鳳尾諾一首原晋亂說一首祭祀祈說一首志過權徳輿辛酉嵗予以吏役道于上饒時左司郎中博陵崔公出守郡佐與予語及世道次及人倫大節因曰延州之譲不其至矣集作哉字或者言吳以太伯譲而興季子譲而亡此乃狥於一方而不蹈乎大方也原夫太伯避季歴奔荆蠻以就文武之大業則知太伯因天下之尊周以成周也豈以興吴一作周為念季子因天下之去譲以全譲也豈以亡吳為念然則太伯季子皆以天下之心為心吳之興亡曽不屑慮彼或者之論誠未通其㫖焉予曰誠哉是言然集作况季子之歴聘也聞樂章辯歌詩皆審其盛衰以造乎精㣲明閎建物無所逃數有所極耳又何區區異論于其間哉答曰子之言過矣若季子以興亡必然力不能支乗此而後三譲是利於将亡因以沽名者也豈可為君子言之過矣存之予亡之集作豈可為君子言之也且以吴之存而季子亡之以譲之發集作廢而季子全之嚮使勤一國之理理于勾吴今亦化為古墟鞠為榛蕪曷與夫禮譲之大使千古是式貪以之亷暴以之仁忍垢冐榮者以之知懼其于為理也不其逹集作逺歟予乃拜受其論退書所聞且以志過名篇庶乎聞義能徙之義說天柳宗元韓愈謂柳子曰若知天之說乎吾為子言天之說今夫人有疾痛倦辱饑寒甚者因仰而呼天曰殘民者昌佑民者殃又仰而呼曰何為使至此極戾也若是者舉不能知天夫果蓏飲食既壊蟲生之人之血氣敗逆壅疷為癰瘍􅤞贅瘻痔亦一無此字蟲生之木朽而蝎中草腐而螢飛是豈不以壊而後出耶物壊蟲由之生元氣隂陽之壊人由之生蟲之生而物益壊食齧之攻穴之蟲之禍物也滋甚其有能去之者有功于物者也繁而息之者物之讐也人之壊元氣隂陽也亦滋甚墾原田伐山林鑿泉以井飲窽墓以送死而又穴為偃溲築為墻垣城郭䑓榭觀游䟽為川瀆溝洫陂池燧木以燔革金以鎔陶甄琢磨悴然使天地萬物不得其情倖倖衝衝攻殘敗撓而未嘗息其為禍元氣隂陽也不甚于蟲之所為乎吾意有能殘斯人使日薄嵗削禍元氣隂陽者滋少是則有功于天地者也繁而息之者天地之讐也今夫人之一無此字舉不能知天故為是呼且怨也吾意天聞其呼且怨則有功者受賞必大矣其禍焉者受罰亦大矣子以吾言為何如集作如何柳子曰子誠有激而為是耶則信辨且美矣吾能終其說彼上而𤣥者世謂之天下而黄者世謂之地渾然而中處者世謂之元氣而寒暑者世謂之隂陽是雖大無異果蓏癰痔草木也假而有能去其攻穴者是物也其能有報乎繁而息之者其能有怒乎天地大果蓏也元氣大癰痔也隂陽大草木也其烏能賞功而罰禍乎功者自功而禍者自禍欲望其賞罰者大謬矣集無此字呼而怨欲望其哀且仁者愈文粹作亦大謬矣子而信于之仁義以遊其内生而死爾烏置存亡得䘮于果蓏癰痔草木耶䄍說栁子為御史主祀事將䄍進有司以問䄍之說則曰合百神于南郊以為嵗報者也先有事必質于户部户部之辭曰旱于某水于某蟲蝗于某癘疫于某則黜其方守之神不及以祭余甞學禮盖思而得之則曰順成之方其䄍乃通若是古矣繼而歎曰神之貌乎吾不可得而見也祭之饗乎吾不可得而知也是其誕漫憋怳㝠㝠焉不可執取者夫聖人之為心也必有道而已矣非于神也盖于人也以其誕漫􅐞怳㝠㝠焉不可執取而猶誅削若此况其貌言動作之塊然者乎是設乎彼而戒乎此者也其㫖大矣或曰若子之言集作云則旱乎水乎蟲蝗乎癘疫乎末有黜其吏者而神黜焉而曰盖于人者何也余曰若子之云旱乎水乎蟲蝗乎癘疫乎豈人為之耶故其黜在神暴乎耗乎沓貪乎罷弱乎非神為之也故其罰在人今夫在人之道則吾不知也不明斯之道而存乎古之數其名則存而教之實則隱以為非聖人之意故歎而云也曰然則致雨反風蝗不為灾虎負子而趨是非人之為則何以余曰子欲知其以乎所謂偶然者信矣必若人之為則十年九潦八年七旱者獨何如人哉其黜之也苟明乎教之道雖去古之數可矣反是則誕漫之說勝而名實之事䘮亦足悲乎朝日說栁子為御史主祀事将朝日其僚問曰古之名曰朝日而已今而曰祀朝日何也余曰古之記文粹作說者則朝拜之云也今而加祀焉者則朝旦之云也今之所云非也問者曰以夕而偶諸朝或者今之是乎余曰夕之名則朝拜之偶也古者旦見曰朝暮見曰夕故詩曰邦君諸侯莫肯朝夕左氏傳曰百官承事朝而不夕禮記曰日入而夕又曰朝不廢朝暮不廢夕晋侯将殺竪㐮叔向夕楚子之留乾谿右尹子革夕齊之亂子我夕趙文子礱其椽張老夕智襄子為室美士茁夕皆暮見也漢儀夕則兩郎向𤨏闈拜謂之夕郎亦出是名也故曰大采朝日少集作小采夕月又曰春朝朝日秋夕夕月若是其集作之類足矣又加祀焉盖不學者為之也僚曰欲子之書其說吾将施于世可乎余從之乗桴說子曰道不行乗桴浮集作于海從我者其由也歟子路聞之喜子曰由也好勇過我無所取材説曰海與桴與材皆喻也海者聖人至道之本所以浩然而遊息者也桴者所以遊息之具也材者所以為桴者也易曰復其見天地之心乎則天地之心者聖人之海也復者聖人之桴也所復者桴之材也孔子自以極集作拯生人之道不得行乎其時将復於至道而遊息焉謂由也勇于聞義果于避世故許其從之也其終曰無所取材者言子路徒勇于聞義果于避世而未得所以為復者也此以退子路兼人之氣而明復之難耳然則有其材以為其桴而遊息于海其聖人乎子謂顔淵曰用之則行舍之則藏唯我與爾有是夫由是而言以此追庶幾之説則囘近得矣而曰其由也與者當是歎也回死矣夫或問曰子必聖人之云爾乎曰吾何敢吾以廣異聞且使遯世者得吾言以為學其無悶也揵焉而已矣讀韓愈所著集作作毛頴傳後題自古居夷不與中州人通書有來南者時言韓愈為毛頴傳不能舉其辭而獨大笑以為恠而吾久不克見楊子誨之來始持其書索而讀之若捕龍蛇搏虎豹急與之角而力不敢暇信韓子之恠于文也世之摸擬竄竊取青嫓白肥皮厚肉柔筋脆骨而以為辭者之讀之也其大笑固宜且世人笑之也不以其俳乎且一作而俳又非聖人之所棄者詩曰善戱謔兮不為虐兮太史公書有滑稽列傳皆取乎有益于世者也故學者終日討說文粹作論答問呻吟習復應對進退掬溜播文粹作掩灑則罷憊而廢亂故有息焉游焉之說不學操縵不能安絃有所拘者有所縱也太羮𤣥酒體節之薦味之至者而又設以竒異小蟲水草柤棃橘柚苦鹹酸辛雖蜇吻裂鼻縮舌澁齒而咸有篤好之者文王之昌蒲葅屈到之芰曽晢之羊棗然後盡天下之竒味以足于口獨文異乎韓子之為也亦将弛焉而不虐歟息焉游焉而有所縱歟盡六藝之竒味以足於文粹作其口歟而不若是則韓子之辭若壅大川焉其必决而放諸陸不可以不陳也且凢古今是非六藝百家大細穿穴用而不遺一作匱者毛頴之功也韓子窮古書好斯文嘉頴之能盡其意故奮而為之傳以發其欎積而學者得之集作以勵其有益于世歟是其言也固與異世者語而貪常嗜𤨏者猶呫呫然動其喙彼亦勞甚矣乎畫諌盧碩漢文帝時未央宮永明殿畫古者五物兩漢故事文帝三年于永明殿畫屈軼草進善旌誹謗木敢諌皷獬豸凢有五色物也成帝陽朔中嘗坐羣臣于下指之曰予慕堯舜理故目是以自况大司馬陽平侯王鳳拜舞而賀曰陛下法古為治上稽唐虞仁逺乎哉行之斯至旌皷之屬在陛下建之而已矣至于神草靈獸臣知不日當産于明庭以彰上天之允答也㣲臣不勝鳬藻之抃御史大夫張張忠出次而言曰斯無用之物也臣請即日圬之且是畫肇于太宗之時凢八聖矣開眼而覩之者皆靣一作背靣而違之未聞有禆于治也臣敢為陛下條舉臣嘗聞文帝時雒陽人賈誼為博士能誦詩屬書嘗為上陳古先帝王之道漢朝正朔之法上以公卿之任無以易誼俄絳灌馮敬之伍害其賢而毁之遂踈而不信傅卑濕之國後雖徴還卒不得大用䘮志而死至今負才藏器之徒猶以為憤此則善雖進而不能用也帝又降詔除誹謗之令許人言事迨中宗朝大臣楊惲盖寛饒以譏刺辭語皆坐大辟先帝在東宮言其法太深刻中宗竟不悔此則木雖旁午人不敢書上也初元帝𢎞恭石􅂋専權亂政前将軍望之嫉其姦邪諷上除之不從望之反罹其􅄽過一作廹以自殺此又邪不可觸之之驗也前日安昌侯禹居陛下師傅之尊不能率已以儉而乃决涇引渭廣開田疇便身娱耳多置侈樂平陵朱雲上書請斬其首陛下怒不可忍遽將誅之雲倉卒無㩀乃至䘮膽失魂臣意列聖用此乃類是乎臣之狂瞽欲陛下言而必行丹艧之設不足以留連聖念也且大司馬親勲之望朝野所倚不能因事而諫返以為賀佞孰甚焉臣謹以指之若斧鑕将及是陛下誤屈軼也臣不敢就僇代河湟父老奏陳黯臣等世籍漢民也雖地沒戎虜而常畜歸心時未可謀則俛僶偷生既遭休運詎可緘黙伏思中國之患邉戎其來久矣唐虞夏殷之前則淳風未漓夷夏自判故干戈不興事亦宜矣由周以降或侵或伐無代無之然則享國長久君臣有謀唯是其餘不足徴也周漢討邉之事臣知之矣請較而論之以為國朝比且周之伐獫狁也以斥逐為心不常事之故進則遄征退則息兵致其邉鄙無備壁壘不營此乃周之謀失於不固矣漢之討匈奴也乗時之豐恃兵之雄深入窮荒莫計逺邇故雪山青海皆為内封其後財匱力殫厥功不就遂交和親之好自凂帝屬延法後時斯為漢之謀失于太廣矣唐有天下邁于周漢之道一家其六合一心其兆人唯兹犬戎未能無患當開元中有将臣善于攻戰振張皇威殱殄醜虜自秦地而西有地數千里此則展拓周疆剪截漢域所謂廣袤得其中矣其後國家以内冦時起不遑西顧其蕃戎伺隙侵一作復掠邉州臣等由此家為虜有然雖力不支而心不離故居河湟間世相為訓今尚傳留漢之冠裳每歳時祭享則必服之示不忘漢儀亦猶越翼胡蹄有巢嘶之異噫其怨慕也有是陛下新統寰區以慈仁化育聞之得不惻然而軫念乎夫事有可行勢有必尅苟懈而不為是失古人見幾之義今國家無事三方底寜獨取邉陲猶反掌耳矧故老之心觖望復然儻天兵一臨孰不面化今陛下采臣之言則先選良将不以前負勲業者與更授節制一作刺史者為之何者彼功崇矣彼位極矣復将悉力營之哉以此臨事必多自顧願陛下詔班行之中噐識有殊籌畫可用者踰一資一級授鉞将兵俟見功庸而後一作厚加之爵賞必能摧兇破敵無所愛矣戎翟者亦天地之間一氣耳不可盡滅可以斥逐之伊周漢之事如前所陳今之所取願止于國朝已來所没秦渭之西故地朗畫疆域牢為備禦然後闢邉田飽士卒可以為永逺一作永永之謀􅒯出周漢之右則臣得棄戎即華世世子孫無流離之苦生死幸甚說鳳尾諾陸龜蒙或問予曰鳳尾諾為何䓁物圖耶書耶對曰余之所聞自晉訖于梁陳以來藩邸之書也凡封子弟為王則開府辟僚屬取當時士有學行才藻者中是選其所下書東宮則曰令上書則曰牋諸王下書則曰教上書則曰啟應和文章則曰應令應教下其制一等故也其事行則曰諾猶漢天子肯集作可非臣下之奏曰可也鳳尾則所諾牋之文也綷縩䙰褷然織與繪莫的知既肯其行必有褒異之辭若今之批荅案耳晋元帝為琅邪王時帝美其才令通習外事常使批鳳尾諾南齊江夏王鋒髙帝第十二子甚怜之年五歳使學鳳尾諾下筆便工帝大悦以玉麒麟賜之餘未見其出鳳尾牋當畨薄縷輕其制作想精妙靡麗而非牢固者也殆将五百年必不能保而存之好事者或云織集作識妄矣且傳云仲尼在魯與陳有問缶羊楛矢者皆知之及脩春秋則逺者畧近者詳故曰立於定哀而指隠桓之日逺矣盖聖人作大典不可不慎則前所傳亦一作之妄矣余學聖人之文者求其誠而已矣又安可詐别數百年前事自以為賢哉君子慎所傳無易原晋亂説楊䕫晋室南遷制度草剏永嘉之後囂風未除廷臣中猶以謝鯤輕佻王澄曠誕競相祖習以為高逹卞壼厲色於朝曰帝祚流移社稷傾蕩職兹浮偽致此隳敗猶欲崇慕虚誕汚蠧時風奏請鞠之以正頺俗王導庾亮抑之而止噫西晋之亂百代所悲移都江左是塞一作㓗源端本之日也猶乃翼虚駕偽宗文粹作崇扇佻薄躡諸敗跡踵其覆轍以此剏立朝綱基構王業何異登膠船而泛巨浸操一作拉朽索以馭奔駟乎設使從卞壼之奏黜屏浮偽登進豪賢文粹作淳實左右大法維持紀綱則晋亦未可量也其後王敦作逆蘇峻繼亂余以為晉之亂不自敦峻而稔於導亮祭祀不祈説沈顔夫祭典之興所以奉祖宗而表有功也非所以祈明神而邀福佑也故王者郊天地而立七廟諸侯奉社稷而置五廟士庻人各以其家功施于民則祀之以死勤事則祀之以勞定國則祀之昔列山氏之子曰柱能植百糓夏興也周繼之故祀于稷共工氏為九域其子曰后土能平九土故祀于社舜勤事而野死鯀障洪水而殛死禹勤其官而水死有虞氏禘黄帝而祖顓頊郊堯而宗舜夏后氏亦禘黄帝而祖顓頊郊鯀而宗禹商人禘舜而祖禹郊禹而宗湯周人禘嚳而郊稷祖文王而宗武王故所謂奉祖宗而表有功也非所以祈明神而邀福祐也必以明神可祈福祐可量一作豐則三代不易世秦漢不更氏王者無明暗卿士無賢愚能盡其祭祀則享其福祚矣神必私于禱祈悦于肥腯而降其禧祥則王者盡堯舜也侯者盡桓文也水不為潦也火不為灾也年無夀天也民無貧富也戰無不勝也守無不固也禍無不殄也疾沴不生也國家無危亡也宗祀無廢絶也是皆祈而不得禱而無應明矣然則經百代而不易其俗傳百王而不革其風者誠有以也夫兩國相持必有其勝也萬邦各治必有其康也祈年者必有其豐也祈病者必有其瘳也祈仕者必有其遷也祈貨者必有其饒也有一于此咸以神之佑也而不知人事之起匪成即敗匪得即失用之有巧拙智之有後先嵗有豐儉運有否泰非神之所置也于是廢業而不為非竭産而不為悔姦巫乗之以語禍福竟不能明寖以成俗得非上失其正下效其為者乎文苑英華巻三百六十二
