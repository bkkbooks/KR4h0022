body:
  text: 文苑英華卷六百二十六宋李昉等編遺表遺表一首為王尚書遺表一首權文公遺表一首為昭義李相公作遺表一首代僕射濮陽公遺表一首代彭陽公遺表一首代安平公遺表一首遺表房𤣥齡臣聞兵惡不戢武貴止戈當今聖化所覃無逺不泊一作届上古所不臣者陛下皆能臣之所不制者皆能制之詳觀今古為中國患害者無過一作如突厥遂能坐運神䇿不設一作下殿堂大小可汗相次束手分典禁衞執㦸行間其後延陀鴟張尋就夷戮一作滅鐡勒慕義請置州縣沙漠以北萬里無塵至於高昌叛換於流沙吐渾首鼠於積石偏師薄伐俱從平蕩髙麗歴代逋誅莫能討一作撃伐陛下責其逆亂殺一作弑主虐人親㹅六軍問罪遼碣未經旬日即拔遼東前後虜獲數十萬計分配諸州無處不滿雪往代之宿耻掩崤陵之枯骨比功校徳萬倍於古一作前王此聖主一作心之所自知㣲臣安敢備說且陛下仁風被於率土孝徳彰於配天覩夷狄之將亡則指期周一作數嵗授將帥之節度則決機萬里屈指而推一作假驛視景而望書符應若神算無遺䇿擢將於行伍之中取士於凡庸之末逺夷單使一見不忘小臣之名未嘗再問箭穿七札弓貫六鈞加以留情墳典屬意篇章一作什翰一作筆邁鍾張詞一作辭窮班馬文鋒既振則宫徵一作則管磬自諧輕毫暫飛則花蘤競發撫萬姓以慈恵遇羣臣有一作以禮法褒毫髪一作秋毫之善解吞舟之網逆耳之諌必聽膚受之訴斯絶好生之徳禁障塞於江湖惡殺之仁息鼓刀於屠肆鳬鸛一作鶴荷稻粱之恵犬馬􅂪帷盖之恩降乗吮思摩之瘡登堂臨魏徵之柩哭戰亡之卒則哀動六軍負填道之薪則精感天地重黔黎之大命特盡心於庶獄臣識昏憒豈足論聖功之深逺談天徳之髙大哉陛下兼衆美而有之靡不備具㣲臣深為陛下惜之重之愛之寶之周易曰知進而不知退知存而不知亡知得而不知䘮又曰知進退存亡而不失其正者其惟聖人乎由此言之進者一作有退之義存者一作是亡之機得者一作有䘮之理老臣所以為陛下惜之者盖為此一作此謂也老子曰知足不辱知止不殆謂陛下威名功徳亦可足矣拓土一作地開疆亦可止矣彼髙麗者邊夷賤類不足待以仁義不可責以常禮古來以魚鱉畜之宜從闊畧若必欲絶其種類深恐獸窮則搏且陛下每決一死囚必令三覆五奏進素膳停音樂者盖以人命所重感動聖慈也况今兵士之徒無一罪戾無故驅之於城一作行陳之間委之於鋒刃之下使肝腦塗地魂魄無歸令其老父英華作人非孤兒寡妻慈母望䡺車而掩泣抱枯骨而一作以推心足以變動陰陽感傷和氣實天地一作下之寃痛也且兵一有者字凶器戰一有者字危事不得已而用之向使高麗違失臣節而陛下誅之可也侵擾百姓而陛下滅之可也久長為中國患而陛下除之可也有一於此雖日殺萬夫不足為愧今無三條坐煩中國内為舊王雪耻外為新羅報讐豈非所存者小所損者大願陛下遵皇祖老子知一作止足之誡以保萬代巍巍之名發霈然之恩降寛大之詔順陽春以布澤許髙麗以自新焚陵波之船罷應募之衆自然華夷慶頼逺肅邇安臣老病三公旦殞天地所恨竟無塵露少一作㣲増海岳謹述一作罄殘魂餘息預代結草之誠儻􅂪録此哀鳴即臣死且不朽一作皆唐舊書本傳為王尚書遺表臣某聞死生者天地之常數忠孝者臣子之本心某孝未立於家忠未報於國而桑榆遽廹風燭俄驚雖脩短之分偶然而古今之歎一也臣受性頑疎昧於攝理常服石乳頗歴嵗年始自去冬㣲覺發動皇慈軫念睿渥旁流特賜秘方兼傳要訣王人荐至驛騎載馳竊見聖心宻聞天語方驗君臣之藥旋瞑眩之功碎首㣲軀無階上答將謂載安營魄更長皮膚得霑雨露之慈可延犬馬之命不悟才㣲任重福過災生從此月十二日已後舊疾再發氣緒羸憊心慮沉綿徒加藥餌竟未瘳損自二十二日已後轉覺危惙生意寂寥視陰恐盡渇日不足臣自揣度必難保全雖覆載所容亭育之恩至廣且鬼神不捨膏肓之計已成永辭明聖憂在漏刻臣自荷深恩謬居方鎮三承寵命六變霜星撫俗臨戎幸無敗闕此皆陛下聖謨𢎞貸𤣥貺昭宣誓欲乗此遭逢少施勞効使千載之後知聖代有守土之臣焉永懐楊僕之移關常念子牟之戀闕是以仍嵗抗表備述本誠瞻望軒墀冀獲朝覲儻丹誠曲遂𤣥鑒俯從則臣此生没齒無恨豈意隠慝為咎至誠不通徒一作孰知生也有涯何遽死之將至行潦㣲波望朝宗而先竭衰楊弱質待嵗寒而已凋無由假魯陽之戈空想結杜回之草伏惟聖念俯察哀懐仰天無聲伏表流涕無任感戀歔欷之至權文公遺表臣某言生逢聖時獲事陛下以臣戅朴一作朴備位將相幸免罪戾實無裨補福過災生二年以來脚疾痺緩近自旬日咽喉氣痛漸就危惙慮不支持永辭聖明涕流嗚咽伏惟皇帝陛下繼十一葉休運承二百年景祚平吳定蜀掃蕩淮夷巍巍功徳與天地凖今縱有疥癬不足平夷伏惟以愷悌之仁𢎞寛大之本為九州自愛使萬古同福則臣幽㝠之下同生物受賜無任感恩攀戀悲激之至代僕射濮陽公遺表李商隠臣某言臣聞螻蟻知雨雖通感於𤣥天蒲柳望秋必凋華於厚夜况臣攝生寡要將命無方寒暑頓侵精神坐竭竈乏傳薪之火餘熖幾何隙無留影之駒殘光即盡叩心戀闕忍死集作命封章呌白日而不廻望青天而永訣臣某中謝臣雖忝望族本實將家自先臣出㹅郊圻遇任大國静無師旅被服元化翺翔盛時遂與季弟叅無俱以詞塲就貢久而不調因以上書自薦求通干時願試芸香作吏始筮仕於徳宗瑞節臨戎復分憂于陛下雖性分有限而忠誠不移一作磨固無韓彭為將之能實慕趙竇散財之義兩踰嶺嶠四建牙旗約已潔身絶甘分少良田五頃慮莫及於子孫厚禄萬鍾恵頗霑於賔客恭承詔命以守藩條而掌事者徒以元和中吕元膺留守東都李師古潜謀洛邑託以郡邸入之甲兵臣當時為元膺賔僚值師古竊發藍衫不脫竹簡仍持因為麾兵虜其明師遂以將材相許戎統見期頡頏遐途纂脩舊服光吟以再遷授頻仍昨者分領許昌兼臨河内當上黨阻兵之始是孽童拒詔之初臣方將奮勵疲駑指揮精銳所冀解鞍赤狄息駕晉城大攘蜂蠆之羣以雪人神之憤自前月某日後軍聲大振賊勢稍衰人一其心士百其勇鷰頷有相曽無定逺之期馬革裹尸實負伏波之願而精誠靡著素心集作志望見違㧞抱之意方堅就木之期俄及忽自今月某日疾生腹蔵弊及筋骸藥劑之攻撃愈深神理之禱祠無益固已騰名鬼籙收氣人寰復燃無望於死灰更起難同於仆樹然臣素窺長者曽慕逹人省於變化之端粗識死生之理豈其有貪富貴敢冀延長但以未報國恩未誅賊黨視胄長免對弓莫彎思犬馬以自悲悼集作怛鍾漏之先廹志有所在傷如之何撫節而乏淚以流伏􅋶而無血可衉臣某中謝其行營三軍已舉牒差某官某河陽留務差某官某懐州留務差某官某訖並皆授之方略各有司存至於集作竊計旬日必無逗撓臣又伏思任司農大卿之日授忠武統帥之時紫殿承恩彤庭入對躬瞻堯日親沐舜風獲覩陛下神武之姿獲聞陛下憂勤之旨即北蕃小冦東土㣲妖集作戎亦何足煩陛下之甲兵汙陛下之鈇鑕伏望時推明畧光闡睿圖内則收徳裕讓夷紳絃之嘉謨外則任彦佐允逹宰沔之威力廓清華夏昭薦祖宗然後廢玉勒成鏤金垂烈臣雖百死復何恨焉臣精爽已虧言辭失次氣無復續􅂪以纊而莫勝口不能言飯用貝而何益故園集作國千里明君萬年永將覆載之恩長入幽明之路殘魂不昧雖温序之思歸枯骨有知遇杜回而必抗廻望聖集作照代哀號不能無任荒惙攀戀之至代彭陽公遺表臣某言臣聞逹士格言以生為逆旅古者垂訓謂死為歸人茍得其終何怛於化臣永惟際㑹獲偶昇平鐘鼎之勲莫彰風露之姿先盡雖無非大數亦有負清朝今則舉纊陳詞對棺忍死白日無分𤣥夜何長淚兼血垂目與魂集作雲斷臣某中謝臣早縁儒學得厠人曹克紹家聲不虧士行詞賦貢名於宗伯書檄應聘於諸侯東泛西浮南登北走時惟倚馬人或薦雄西掖承榮得以言之無罪曲臺備位粗明物有其官允謂才難便叨郎選振衣華省履歴名曹髙歩内庭光揚宻命憲宗皇帝以臣行多餘力忠絶他腸進無所因静以有立過􅂪顧問深降褒稱乃於同列之中獨許非常之拜殊恩既浹當路相排旅翮未髙孤根已動河潼為郡盟津統師溺以待援痿而念起憲皇旁集作講求輔相即記姓名果遣急徵仍加大用戴君之力雖弱許國之誠在兹實有㣲衷可裨𤣥化况初誅背叛務活疲羸方伏奏於鳳扆之前忽庀徒於鳥耘之次小吏抵罪邪臣結謀指之有名黙不得訴空甘罪戾仰託聖明粗得生還幾臨死所其後官移賔䕶四年不竭於承華任改察亷一日蹔留於分陜欲舉而墜將安更危頼敬宗皇帝纉乃丕圖是思求舊振於洛宅榮彼夷門自兹以來敢虛其遇周旋五紀鎮守惟切分憂前後两歸闕庭皆非久次拙直不同於衆讒毁每集其躬含意未宣救過不暇伏思自長慶厥後開成之前凡幾忝遷升幾遭退斥若非不欺天地不負君親至於機㣲尋合顛隕伏惟皇帝陛下道超覆載仁極照臨既委銅塩又分端揆逮今控壓亦在重難陛下之恩㣲臣何益㣲臣之節陛下方知興言及兹碎首殊晚然臣從心之年已至致政之禮英華作理非宜遵尋欲拜章以求歸老伏以諸道節制頻嵗更移其於送迎例多積累臣在此雖無一毫侵損亦無纎介集作芥誅求而帑蔵甚殷倉儲有羡特緣行李忍過秋冬而江山之氣候難常蒲柳之蕭衰易見自夏則膝脛無力入冬則集作又膓胃不調對冠冕而始訝儻來指墳墓而已知息處昨今月八日臣已召男國子博士緒左補闕􅀈左武衞兵曹叅軍綸等示以殁期遺之治命使内則雍和私室外則竭盡公家兼約其送終務遵儉約集作所務遵儉勿為從俗以至慮居至十二日夜有僕夫告臣云火星隕地雅當正室洞照一庭臣即端坐俟時正辭無撓臣之年亦極矣臣之榮亦足矣以祖以父皆􅂪褒寵有弟有子並列班行全􅆎領以從前人歸體魄以事先帝此不自逹誠為甚惡但以將掩泉扃不得重辭雲臺重集作更陳尸諌猶進瞽言雖呌呼而不能豈誠明之敢忘伏惟皇帝陛下春秋鼎盛華夏鏡清是脩教化之初是復理安之始然自前年以來敗譴者至多誅戮者不少伏望普加鴻造稍霽皇威没者昭洗以雲雷存者霑濡以雨露自然五稼嘉熟兆人樂康用臣將盡之苦言慰臣永蟄之幽魄臣某云云臣當道兵馬已差監軍使竇千乗勾當其節度留務差行軍司馬趙祝觀察留務差節度判官杜勝訖有舊規模無新革易悉集作必當輯睦決無諠驚臣心雖澄定氣已危促辭多逾切鳴急更哀升屋而三號豈來赴壑而一去無返忠誠直道竟埋没於外藩腐骨枯骸空歸全於故國廻望昭代無任攀戀永訣之至謹奉表代辭以聞臣某誠號集作哀誠咽頓首頓首代安平公遺表臣某言臣聞風葉露華榮落之姿何定夏朝冬日短長之數難移臣幸屬昌期謬登貴位集作任行年五十五歴官二十三念犬馬之常期死亦非夭柰君親之厚施生以無酬是以時及含珠命餘屬纊心猶向闕手尚封章撫躬而氣息奄然戀主而方寸亂矣臣某中謝臣少而覉屑長乃遭逢常將直道而行實以明經入仕王畿作吏非州縣之職徒勞侯國從知愧軍旅之事未學憲宗皇帝謂臣剛決擢以憲司穆宗皇帝謂臣才能登之郎選忝霜威而無所摧拉歴星紀集作叨星經而有紊次躔旋屬皇帝陛下大明御宇至道承乾澄汰之初臣不居有過超躍之際臣獨出常倫髙選掖垣箴規未効入居𤨏闥論駁無聞自去年秋來典河關兼臨甸服唯當静而阜俗清以繩姦粗致豐穰幸逃逋責豈意陛下謂臣奄有三縣未稱其能謂臣出以一麾未足為貴爰降綸綍移之藩方錫以海隅與之嶽鎮將吾君之驍果萬計使得㹅齊聮吾君之牧伯三人以居廵屬時雖相羡臣實深憂既辱聖恩果遭鬼瞰況臣素無㣲恙未及大年方思髙掛英華作卧非饋魚不燃官燭成陛下比屋可封之化分陛下一夫不獲之憂志願未伸大期俄廹忽自今月十日夜暴染霍亂并兩脅氣㾏當時檢驗方書煎和藥物百計療治唐諱一無痊除至十一日辰時轉加困劇漸不支持想彼孤魂已遊岱嶽念兹二竪徒訪秦醫對印執符碎心殞首人之到此命也如何戀深而乏力以言泣盡而無血可繼臣某誠哀誠戀頓首頓首臣當道三軍將士凖前使李文恱例差監軍使元順通勾當訖臣與順通雖近同王事已備見公才假之統臨必能和協其團練觀察兩使事差都團練廵官盧涇勾當訖臣亦授之方略示以規模伏惟聖明不至憂軫臣精神危促言詞爽錯行當窮塵埋骨枯木容身螻蟻卜隣烏鳶食祭黄河兩曲長安幾千生入舊關望絶班超之請力封遺奏痛深來歙之辭廻望昭代不勝荒惙眷戀之至謹差某奉表代辭以聞文苑英華卷六百二十六
