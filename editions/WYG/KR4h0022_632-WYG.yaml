body:
  text: 文苑英華巻六百三十三宋李昉等編謝恩六謝賜衣服狀五首謝賜春衣狀六首謝賜冬衣狀七首謝賜馬狀八首謝集作賀侍講遍賜衣物狀張九齡右高力士至宣稱陛下親講讀毛詩遍賜侍講陳希列三品兼賜衣物等伏以睿思𤣥通超然物表俯臨天下必樹風化既𢎞儒教考覈詩人爰託師資親行講讀章句初畢賞賜集作錫有加明主深恩集作用心誰集作孰不知勸臣謬承任遇實愧經通聖業彌深㣲誠何補方思斆學以助皇明集作明時無任悅豫之至謝賜衣服及絹狀右中使某至特䝉恩曲賜逺别之什又中使某宣口勑賜衣一副并絹一百疋者但柱礎雖下感致於青雲陽燧則㣲昭應於白日在臣孤賤亦荷寵光伏惟陛下御札龍躍八體比之未雄天文鳯章五色對之猶淺况束帛荐至衣服仍臻施重丘山恩深江海實為九族遍有光華匪唯賤陋獨稱榮慶不任云云謝賜衣物狀右高力士宣勑賜臣衣及器物等臣九齡不孝苟存企及禮制天恩以忝樞近賜問再臨衣服珍器殊常寵錫臣有何力可以叨濫渥澤至深誠效已竭唯有㣲命不知所圖無任感戴惶悚之至為盧監被盗衣物謝賜御衣物狀蘇頲内常侍趙元亨奉宣恩㫖以臣被竊盗失物賜臣衣一副臣素以慢藏闕於周備令尹為過尚不可逃太丘有言復不能覺使臣知政未息盗於萑蒲加臣匪服遂増耀於樗櫟顧深􅄽咎翻荷恩慈捧戴循環再三惶懼無任下情之至謝恩賜衣服狀白居易右今日守謙奉宣聖㫖以臣初入院特賜衣服者臣自入禁司纔經旬月未申集作陳薄効累受殊私况前件衣服等獻自逺方降從御府既鮮華而駭目亦輕煖而便身臣實何人堪此榮賜必擬秘藏篋笥傳示孫子何則顧陋質而懐慙貌非稱服撫㣲軀而荷寵力不勝衣因物感恩無任愧懼謹奉狀謝恩賜春衣狀崔行先右中使某至伏奉勑書手詔宣慰臣及将士等兼賜臣春衣等鴻恩濡澤忽降轅門霧縠氷紈猥加介胄臣等謬膺委使徒展寸誠曽無逐獸之功毎懼伐檀之刺捧受祗慄不知所裁仰戴恩光将何上答彌憂不稱其服益用内愧於心無任云云二右中使某至伏奉勑書手詔宣慰臣及将吏等又賜前件春衣臣等駑駘賤品介胄匹夫未彰塵露之功游及雲雷之澤喜抃兢惕怳然失圖捧戴恩私不知所據以御府紈素耀晴景於三春天宫蘭麝襲回風於十歩豈土水之質被服所宜雖灰粉其身上答何極無任云云同前于邵右今月某日中使某至伏奉勑書手詔慰諭臣及三軍等并賜臣及大将春衣者捧戴抃躍實増慙懼臣功効㣲淺寵遇日深霜露適濡恩已承於挾纊清明纔度賜又及於觧衣仰服用於公家罷裁縫於私室已頒分大将訖各盡殪戎之力用申報國之誠同前常衮右今月五日監軍某乙差行營十将某乙送正月十二日書詔并賜臣衣三副軍将二人衣二副跪伏捧承惶悚隕越臣素以愚懦昧於吏能虚受寵私豈堪任使謬承條察吏法非明忝司訓練戎行不肅今之曠職獨有㣲臣宜懲冐榮以勵分鎮豈謂特廻聖睠俯示天書曲降宸慈載加墨詔下頒春服逺被時恩奨飾逾涯兢惶失次載光師旅仍錫偏禆誓以捐軀期於上報無任慶抃悚踴之至謝賜春衣牙尺狀二首為人作令狐楚右中使某至伏奉詔書宣賜前件物臣伏以衣服者身之文章尺寸者王之律度被於四體不􅇆則災考以二分無差為貴伏惟皇帝陛下陶蒸萬類軌物兆人毎及新春皆頒上賞其或才堪國用智代天工福至而驚名成猶懼循省涯分比數藝能臣實無任累承斯寵曳紫光於腰下稱佩黄金操素質於掌中如持白璧窺㸔耀日舉止生風誠聖主全覆育之仁顧㣲臣無秉持之力䝉恩過厚忍愧逾深終申一寸之功用答九重之賜欣榮感惕不勝自任云云二右中使駱元榮至伏奉勑書手詔慰問臣等并賜臣春衣二副牙尺一枝軍将衣二十副者臣伏以行慶于下惟徳所廣受賞于上無功則難臣實何人叨居重任履氷非懼食檗為甘今者伏䝉陛下推漢后觧衣之恩寵錫春服稽有虞審度之典榮頒象尺樂官考正無累黍之差女御裁縫有奪朱之麗而况端平皎潔無慙七寳輕盈綷􅀈不謝六銖此臣所以捧觀而似覩鈞衡服拜而如生羽翼謹便分散諸将傳示衆人感戴欣抃歡與臣同一作感戴欣歡與臣同日所守有限不獲拜謝無任欣躍一作抃之至謝賜冬衣表權徳輿此表移在五百九十三巻表門今存其目謝賜冬衣狀三首為人作令狐楚右中使宋文璨至伏奉勑書手詔慰問臣及将士等并宣恩㫖賜臣等前件冬衣者臣伏以爪牙之寄才實甚難衣裳之賜恩為至厚臣之氣質無所任用誠不足以膺重寄而䝉厚恩今陛下陶以大和葢其多闕及戒寒之月屬授衣之時喻一作倫比賢能頒宣慈惠跪聽清問欽承寵章宛是蠶綿爛如獸錦長皆被土貴實兼金分列校不辨鮮華在㣲臣最為重疊自承天澤不憚風威仰戴恩光有千鈞之重俯循功績無一縷之㣲空知竭誠難以勝徳謹並捧受分給訖所守有限不獲陳謝無任感慶屛營之至二右中使某至伏奉勑書手詔慰問臣及将士兼宣恩㫖賜臣等前件冬衣者伏以綸綍之言出於天澤衣裳之受必以王功臣職在緫戎任當平冦効無絲髮非聖主而豈容施若丘山在愚臣而将壓今者司寒肇至命服載新降自九霄來經千里錯鳥章於襟帶奮龍文於素牋兼并縟麗備極環竒木石之姿過䝉鮮飾氷霜之氣頓減嚴凝曳婁而賤質生光憤悱而懦心増勇終期薄効用答深恩謹凖勑受兼分給諸将訖所守有限不獲陳謝無任感戴之至三右中使吳千金至伏奉勑書手詔慰問臣及将士等并宣恩㫖賜臣冬衣兩副及諸将衣二十副者臣守國之藩荷天之寵名聲績用未有可稱伏惟皇帝陛下仁育四方澤均羣動當𤣥律開冬之候念祁寒用事之初書詔交飛衣裘疊至墨盡龍蛇之妙綾兼龜鶴之竒服翫而衰殘有光拊循而孱懦増氣自臣而下萬口一聲臣並凖勑分配訖不勝歡抃愧戀之至為滎陽公謝賜冬衣狀李商隱右中使某至奉宣恩㫖賜臣冬衣一副大将衣四副兼賜臣手詔一通者八行帝語窅降於重宵一襲天衣俯廻於窮節臣當時凖詔給散訖臣叨䝉重寄適控遐陬地雖五鎮之衝氣得四時之正毎𤣥冥應律顓頊司辰當二日之鑿氷則殊豳英華作幽野及兩楹之飛雪無異朔山重以賨布少温蠻綿乏暖方求麗密以禦嚴凝豈望司服頒衣貴臣傳詔綾裁飛鵠絮集作素裛仙蠶白分椒壁之光紫奪蘭牙之色已均下将仍逮連營晏子狐裘故弊何一作舊飾故彰於國儉王恭鶴􅌁風流不自於君恩被服有輝負戴無力謹當上宣殊渥下拊多寒均大裙於瑯琊變無􅃭於蜀郡粗令康泰以塞貪叨臣與大将等無任望闕感恩抃舞屏營之至為濮陽公涇源謝冬衣狀右某月日中使某至奉宣聖㫖賜臣及大将兼諸鎮防秋兵馬等前件勑書手詔并冬衣者臣並已凖詔㫖宣示給散訖恩極觧衣榮加降蠒戴山未重負日非暄臣謬領藩垣適當戎狄唯憑廟筭粗展集作振軍威絶漠集作塞獵廻幸無警急高烽火過但報平安直以地勢多隂川形稍背三伏常聞於屏箑九秋尋訝於垂繒代馬蹔嘶隴山無葉燕鴻未過涇水先氷是以毎降王臣仍迂御筆緘封垂露寵錫禦冬非玉女裁成即仙人織出徒驚在笥莫匪集作覩因針始顧孱㣲深懼不勝冠帶旋䝉被服便如能執干戈遍逮軍前歴霑麾下逹喜氣而陳根復秀動歡聲而蟄户潜開華楚成行曳婁塞路其山南宣歙三道大将等雖久居炎燠不慣嚴凝亦既更衣皆忘易地賈餘勇而例思盡敵感鴻私而咸願殺身各限征行不獲陳謝臣與大将等無任瞻天戀闕感恩屏營之至謝賜冬衣狀二首張次宗右伏以𤣥律戒時祁寒應候玉人傳詔御府頒衣伏惟皇帝陛下盛徳御天至仁育物每念藩方之任屢加寵錫之恩臣績効未施塵忝兹久捧温密之詔喜若朝天被輕纎之衣暖同就日况撫寒之問下及師人錫服之榮遍周戎校喜氣乍傳於封部陽和先及於荆衡爭馳戀闕之誠各勵酬恩之至云云二右中使劉泰伸至伏奉勑書手詔宣慰臣及将吏僧道百姓等并賜臣手詔及冬衣兩副大将衣十副者清風戒寒𤣥律将至未及嚴凝之候已霑輕煖之衣承寵命而載慙啟緘封而増感伏惟皇帝陛下至徳御時深仁育物光武十行之詔每覩憂勤魏后五時之衣未為寵錫况臣叨榮漸久受賜彌多寒暄之節候驟移新舊之光華相委被服悉頒於御府裁縫僅度於私家挾纊之恩已周於列校維鵜之刺尤媿於㣲躬無任云云謝賜馬狀張九齡右今日高力士奉宣聖㫖賜臣紫騮馬一疋伏以恩覃不次寵遇非常有忝股肱之臣頻奉渥洼之賜况郊壇展禮尚未奠於九宫而雨露深恩反有叨於三接雖鳴珂噴玉朝天永代於臣勞而任重才㣲久歲寧酧於聖造荷負無力答効何階云云謝借馬狀孔戣右中使至奉宣進止将前件馬送臣至京兆路界祗承寵光載兢載惕㣲臣猥以庸𤨏謬分憂寄拜命之日已受賜於龍媒遵路之時復假榮於天驥恩私稠疊渥澤殊常豈謂聖意不遺獨懐軫念輟驊騮於内廐騁逸歩於長衢驅馳忘勞服習如志誓當夙駕奔走所部冀安夷獠以免聖憂無任感恩懇欵之至謝借飛龍馬二疋狀鄭絪右中使某至奉勑㫖借臣前件馬至京兆府界者王人在門天驥臨路寵光荐及行色増輝上感恩私何階答効自臣叨承戎寄累軫皇慈念輸力於外藩䧏逸才於内廐分憂未酧於聖主代勞已及於㣲臣雖駑鈍莫施而疲羸頓觧再馳猶勤於逺道三接已及於帝畿即以某日至京兆府界廻瞻魏闕目斷白雲祗事正程指期丹激無任感戀之至謝借馬狀于邵右今日中使某至以臣朝奏闕廷特借前件馬拜受殊深不任驚懼伏以詔傳中貴馬出内閑恩光自降於九重前疑作剪飾不關於衆口無功無効以懼以慙遂躡權竒方遺欵叚瞻天心喜已馳捧日之誠向闕身輕更遇奔星之足仰丘山而轉重知報効以何階謝賜馬狀常兖右中使某奉宣恩㫖賜臣前件馬臣竊位台司已招官謗未申薄効遽沐殊私捧荷驚惶心魂震越上慙慈睠下愧周行素無逺致疑作致逺之資益懼負乗之咎無任感戴之至為趙相公謝馬狀齊映中使某至奉宣進止賜臣馬一疋并鞍轡者臣官叨上司日荷厚俸固其乗馬足展驅馳宸睠過深聖慈猶軫猥出上駟特賚㣲臣豈徒體合鑄金法相皆備而乃足符歴塊驥徳是稱仍束以銀鞍絡以金轡顧自㣲賤何可服乗拜命驚惶不勝戰汗當攬轡之際思六合於如琴執鞭之辰度三代之得䇿空懐夙夜寧効涓塵無任感激之至為叚相公謝借飛龍馬狀白居易伏以出從内廐行及中途假飛龍之駿駒代跛鼈之蹇歩執鞭拜命借馬喻身取其戀主之心以表為臣之節恩深易感情懇難陳竦踴之誠倍百羣品為中丞滎陽公謝借飛龍馬送至府界狀李商隱右中使某奉宣恩㫖以臣赴任特借飛龍馬一集作兩疋并鞭轡等送至京兆府界者臣謬奉恩榮出叨亷問豈期蹇歩深軫皇慈特命内臣俾騰上駟梁懸蜀鐙几覆吳鞍每多曳練之疑不假着鞭之力倐踰秦甸将復周閑照地廻光瞻天送影長亭欲别未期東道而來䨇闕儻嘶願附北風之思無任感恩戀闕雪涕屏營之至文苑英華巻六百三十三
