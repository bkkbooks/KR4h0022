body:
  text: 文苑英華巻四百五宋李昉等編王府王師授王繢蔡約王師制沈約門下冠軍將軍司徒左長史始平縣五等男繢華宗冠冑器質詳和都官尚書約清源素範體業倫正訓兹藩國僉議攸在繢可隨郡王師加㪚騎常侍男如故約可零陵王師加給事中主者速施行授栁沖兼温王師制蘇頲勑左散騎常侍兼脩國史上柱國平陽郡開國公栁沖族茂汾鼎價珎垂璧雅負通才備聞遺訓探六經之奥如叩鴻鍾窮百氏之源若披明鏡挾輿切問侍從増榮擁篲崇儒師資佇德可兼温王師王傅授楊廉陜王傅制前人門下利建子弟旁求師傅委之訓導必學疑方直銀青光禄大夫前岐州刺史上柱國歸義縣開國子楊廉外示静黙言將發而寡辭内敷條理德不孤而應物故能逰藝聚學脩官辨政臺閣盡清華之選吏人懐撫貸之餘儀刑是􅁛叅議斯在當肄業於鄒衍俾賦詩於韋孟可陜王傅勲封如故主者施行授殷彦方王傅等制孫逖門下中散大夫守忠王府長史兼侍讀上柱國殷彦方等朝廷雅望人物周才或聚學冲深或屬詞清逺頃膺授擇皆侍藩維教導之功既聞於日就温文之德遂涉於春儲國有典章義存褒賞宜進秩於髙位俾升榮於近傅可依前件授張崇俊韓王傅制常衮勑朝散大夫前守彭王府諮議叅軍充内飛龍廐驅使賜紫金魚袋張崇俊敏行資身良才適用列官朱邸早陪文學之車從事玉臺久佐飛黄之皁彊力匪懈清心不渝忠効見􅁛器能可録王門傳道允藉純臣仍進榮階俾超彛序可銀青光禄大夫韓王傅餘如故授薛昌朝絳王傅制元稹勑薛昌朝等國有政職之要其一曰其員所以稽績用而昇秩序也爾等典掌衆務勤歴一作勞歳時無畏一作瘝厥官能舉其政擇才以佐諸邸選士以列東朝亦吾藴崇本枝之意也爾無易之可依前件授太子賔客王牘等諸王傅制薛廷珪勑具官王牘等朕聞王者之子在襁褓中置二公以教訓之由古道也我思成人已來遘此多難師訓之義蔑一作翦焉闕聞南靣􅁛尊愧於寡昧由是言念諸子用疚厥心因擇正人為之傅導今丞相言爾牘等並老於文學雅有德行明君臣父子之道知禮樂詩書之源可使高歩承華入叅望苑琢磨羽翼朕有冀焉或授正卿或加峻級宜旌優異徃傅童䝉邪蒿鮑魚勿俾登俎胄筵講肆為惜分隂使其知東平為善之規喜王褒洞簫之賦承萬代之業固磐石之基斯頼於老成人也可依前件授郭保嗣德王傅依前通事舎人等制前人勑具官郭保嗣等資相法儀宣明號令序鴛鸞之行綴整珩珮之威容蕆事申嚴罔不頼爾予聞舊制常俾兼官用奬勤勞以示優假今保嗣等其勤至矣厥官罷焉宜舉彛章許之序進矧大勲之後舊將之家尚鍳寐以求思豈淹回之不恤兼八座以傅予愛子亞九卿而立我明庭勉揚休聲茂對殊寵可王府諮議授郭元融寜王府諮議制孫逖勑典軍郭元融名列戎昭官升王邸頗經歳序克著勤勞宜更文武之職俾在諮謀之任可朝議郎守寜王府諮議叅軍授李夷吾滎王府諮議制勑朝議郎守青州司馬李夷吾門擅文儒才推幹理從事惟謙在官必達貳于郡職已聞康海之謠官彼王門宜膺背淮之選可守滎王府諮議叅軍散官如故授衞元珪蜀王府諮議制常衮勑攝郡牧都使判官朝議大夫行杞王友上柱國衞元珪頃以勤勞爰從奬授紀官之號有犯聞名俾更他職式叶彛典可守蜀王府諮議叅軍餘如故授王自勵原王府諮議制元稹勑王自勵左右禁旅非材力過人而忠厚謹信者不在壁壘庫樓之地惟爾自勵備吾選中平蔡之師亦有功伐追思舎爵之賞擢授曵裾之寮特示新恩且仍舊職可檢校太子賔客兼原王府諮議叅軍依前殿中侍御史如故授郭皎冀王府諮議制前人勑郭皎材任爪牙姻連肺腑領轅門之右廣假桂苑之元寮夙著威名嘗頒勇爵元戎啓狀慶澤覃恩冝輟豹韜之雄以資鴈沼之畫可行冀王府諮議叅軍餘如故重授李晟通事舎人王府諮議制白居易勑李晟昔管仲云升䧏揖讓進退閑習臣不如隰朋今之通事舎人近此選也而晟常中此選善於其職故相導通奏之節宣揚拜起之儀引之集作而賛之不聞失禮既終䘮紀宜服官常可使束帶曵裾為吾謁者可通事舎人王友授蕭仲預郢王友制勑朝議郎行申王府文學攝賛善大夫兼殿中侍御史借緋魚袋上柱國蕭仲預風裁端莊器識純懿戎王築館禮盛和親漢使出闗事優銜命更列曵裾之寵宜酬杖節之勤可守郢王友散官勲如故授賀蘭忠肅郯王友制黄門正議大夫前檢校郯王友賀蘭忠肅緒業勲華藝能通敏頃陪賔友已光侍楚之名更復班資載允從梁之望可行郯王友散官如故主者施行授王積薪慶王友制孫逖門下朝散大夫前行右領軍衞長史王積薪博藝多能精心敏識久從班秩頗著勤勞俾遷環衞之司宜在從車之列可慶王友餘如故授盧光啓等遂王友制薛廷珪勑君子之風尚摧秀木陽翟之俗必誚秦人古嘗病之今孰免者爾光啓洎賛皆以麗藻雅文獨行當代孤標清峙見譽名臣丹青翰墨之林舟楫文章之海道之將至論者許焉屬爾良知罹其貝錦惑予觀聽罷去鈞衡爾良知等咸被指名置其連坐無辜去國吞恨投荒而聞流落五年窮達一致書空永歎問鵩何之人寔有言用懐愧恧雷雨作觧日月無私今也其時吾將補過徵還朝列將復亨衢階序徽章因仍舊貫光啓洎賛知予意焉可依前件王府長史授崔子源岐王府長史制蘇頲黄門朝散大夫守尚書駕部郎中崔子源地緒清茂風襟亮㧞有如繩之直懐匪石之心學不為人文能飾吏憲曹白簡秋隼曽飛禮闥靑縑晨鳬就列睠于藩邸親則舅甥俾踐端寮宜膺寵命可檢校岐王府長史散官如故仍追赴京主者施行授王守廉申王府長史制前人黄門朝議大夫守忠州刺史上騎都尉王守廉飾躬清苦居心孝悌徃操簡憲已著厥聲洎頒條寄克脩其政俾瑇筵之茂寵叅碣館之元寮可申王府長史散官勲如故主者施行授魏明彭王府長史制前人勑銀靑光禄大夫使持節建州諸軍事行建州刺史鉅鹿縣開國伯魏明才業可稱器能適用恪勤彰於事任綏緝著於公方考績有成班資可進宜從使局之請俾踐藩寮之職可行彭王府長史散官勲封如故授薛昌族等王府長史制元稹勑建邦之王府置長史司馬以紀掾屬之秩序而稽其職業也前寜州刺史薛昌族前泌州刺史烏重儒等皆勲伐之子孫並良能之牧守朕河山在念肯忘奬勞藩邸求才實思高選昔阮孚以嘯詠自樂龎秀有忠烈可嘉更任王宫咸稱國器今之榮授其在兹乎佇移汝理郡之方以助予維城之固昌族可行絳王府長史重儒可守冀王府司馬散官勲如故王府司馬授田幹之温王府司馬制蘇頲門下正議大夫行尚書主爵郎中上柱國田幹之聿脩厥德孝稱於百行無玷斯言慎比於三復文儒每固其業清白用傳其範拜郎仙署已題京兆之名為相寵藩式賛河間之羙可行温王府司馬散官勲如故主者施行授李友信蜀王府司馬制常衮勑正議大夫試秘書監前吉州刺史上柱國蕭縣開國男賜紫金魚袋李友信徃以剖符閩徼頗守官常移鎮廬陵稍遷秩序而晦明生疾寒暑經時久淹海隅尋易藩寄使臣所鞠情實用彰宜降常資之授俾由頥養之適可試蜀王府司馬散官勲封賜如故授王承廸等刺史王府司馬制元稹勑莒王府司馬王承廸恭王府諮議叅軍賜緋魚袋王承慶等乃祖乃父有勞邦家而承廸等亦効忠於我伯仲叔季罔漏恩榮或典方州或昇清貫惟恐未稱豈礙彛章兼秩憲臺勉當優異承廸可守普州刺史承慶可莒王府司馬兼侍御史賜如故授康從固翼王府司馬制杜牧勑新授銀青光祿大夫檢校國子祭酒兼濮州長史殿中侍御史上柱國康從固其父秀榮巉集作實為名將李廣多争死之士竇嬰無入家之金一收七闗易如拾芥念爾跨馬事敵執戈集作戎同仇壯比文鴦勇同李敢子之能仕父教之忠古人之言信不虗設今者願留闕下以奉朝請念其垂誨可見丹集作至誠曵裾憲寮用示恩寵宜思終始上報君親可檢校國子祭酒兼翼王府司馬殿中侍御史散官勲如故文苑英華卷四百五
