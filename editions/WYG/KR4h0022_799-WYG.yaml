body:
  text: 文苑英華卷八百宋李昉等編㕔壁記四藩鎮觀察附河西節度使㕔壁記一首邠州節度使㕔壁記一首黔州觀察使新㕔壁記一首州郡上道州刺史㕔壁記一首江州刺史㕔記一首杭州刺史壁記一首衢州刺史壁記一首常州刺史壁記一首藩鎮觀察附河西節度使㕔記楊炎皇帝肇建節制之任位以上將主四方之兵濟河而西五侯四將十有六縣大海磅礴乎終始山河廻流其左右旄頭虎力之勁劔服穹廬之長煌煌乎長轂千乘横合萬里皆主乎是邦故秦已上為戎都漢已下為巨防有城府襟帶焉有良將大勲焉有五都汚雜焉其風悍其國險鮮車龍服囂然相蕩非古之戰守曷以成其業而樹其風者哉昔在武徳之初上用雄武大才則我隴西李王肅明乎神化大冡宰宇文公駙馬喬公出將我前軍中興之後循吏繼作則館陶侯郭公鷞鳩氏司馬公相國韋公蕭公庶績交脩以被昇平之化當今王室多故雲海沸騰則僕射哥舒公以縱横之竒判緫軍國其意者將復用雄武大才乎君子曰武徳之官神以畧其化咸疑衍中興之政儉以行其俗阜當今之理動以闔其人安宜乎盡天下之才隨質文之變以永來裔大康乎斯時天寳十二年夏六月記邠州節度使㕔記鄭處晦邠為古國其俗質而厚其人朴而易理業尚播種畜擾有后稷公劉之遺風始皇并天下地屬喬輔後漢析為新平郡後魏改置􅃎州國朝因之開元中詔以幽幽為疑因改為邠天寳已前大平嵗乆西通伊凉萬里而逺邠實為近郡申王薛王以親賢之貴居之太尉房公以盛徳之重居之洎逆胡勃起幽朔西戎塵坌蕩湧乘艱難際盗㨿河右蕃兵去王城不及五百里邠由是為邉郡斥候近郊鎮要害大歴中尚父汾陽王始以朔方軍壯其威容後益選武勇驍健有膽决竒謀者繼之今天子三年西戎欵闗獻河湟數州故地西鄙益拓邠為近蕃上念兵戎方息邉備愈逺始詔司空白公由丞相府持節來鎮丞相功成繼命文雅忠恕之風煦然而起邉人若􅃦窹拭目心意蘇醒始知禮讓文化之為急務廷議以我季父尚書公前為夏帥夷甿乂安冦盜弭息儲廪果實兵械果完懋賞休績遷鎮是軍季父又以理夏之政移之於邠邠人嬉嬉薰為太和嘗覩屋壁志前帥是軍者之名氏因曰曩之帥此者豈不知是耶始務公車而角材堅壘末暇及此爾吾既承數君子大理之後敢不勤督吾之未至者况今戎醜既夷不宜獨以鳴皷鼙教擊刺為事因命䟽自開元已來刺是郡帥是軍者追書于屋壁季父尚書公曰吾思將有以警于吾前警于吾後者邠之土實婦人無桑績不能自衣朔方之軍䧺男子勇於公戰無他業以自厚故郡之人以耕稼為事軍之卒以勇敢得賞後之撫于人者宜勉農畆時其徴調人不擾而完富矣師于軍者冝嚴其刑賞時其衣食卒不驕而勇敢矣人既完富卒既勇敢生聚之訓練之吾知青海之西不數年為内郡矣命處誨記其始終序于前後處誨謹以季父之言志于後將允於後之人俾無怠大中二年三月二十日記黔州觀察使新㕔記權徳輿古者諸侯路􅃦成則考之今刺史頒詔條而都府兼支郡辯章命令必有攸處署者位之表也一方之所屬目焉黔中為椘西南徼道在漢為武陵莊蹻循江以畧地唐䝉浮船以制越五溪襟束為一都㑹長人者急之則愁擾以走險緩之則横猾而犯禁故分命者得持節按部而輯綏之視他邦授律之不若也元和二年夏四月制詔商州刺史隴西李君以忠執法剖符兹土凡四使十五郡五十餘城裔夷巖險以州部脩貢職者又數倍焉察廉經理招徠教化以柔逺人以布王澤先是兵火焚如之後公堂庳陋延士接賔禮容不稱君乃規崇搆開華軒西廂集作清東序靚深𢎞厰廣厦翼張長梁翬飛脩廊股引麗譙對起自堂徂庭陟降攸寜耀􅘈爽乎光明宣慈龢以洽平君子謂福黔人於此堂也信矣李君敏肅而才代為宗室吏師先尚書嘗繇大農賦政於此凡七易守臣而君嗣其職老壯感泣猶鄭人宜桓武之世焉君之長夀安也則泉噴玉在湖也則亭白蘋在商也則舘丹水皆得勝槩流為詠謌及兹則興事任力休嘉𢎞大此集作此是物此志惠于集作於斯人其他可知也其陟明可前知也書事以志美其古史記之遺乎三年冬十月兵部侍郎權徳輿記州郡上道州刺史㕔記元結天下太平方千里之内生植齒類刺史能集作乃存亡休戚之天下兵興方千里之内能保黎庶能攘患難在刺史耳凡刺史若無文武才畧若不清亷肅下若不明惠公直則一州生類皆受其集作辱災害於戯自至此州見井邑丘墟生人㡬盡試問其故不覺涕下前軰文粹作政刺史或有貪猥惛弱不分是非但以衣服飲食為事數年之間蒼生䝉以私欲侵奪兼之公家驅廹非奸惡強富殆無存者問之耆老前後刺史能恤飬貧弱專守法令有徐公履道李公廙而已遍問諸公善或不及徐李文粹有二公二字惡有不堪説者故為此記與刺史作戒自置州已來諸公改授遷黜集作絀則舊記存焉江州刺史㕔壁記獨孤及古者國有史氏君舉必書倚相董孤史鰌史嚚集作賀非即其人也秦已集作已來國化為郡史官廢職䇿牘之制􅃦滅記事者但用名氏嵗月書於公堂而春秋檮杌存乎屋壁其來舊矣是州也在荆之域于潯之陽西集作江從岷山東注渤澥洪濤至是𣲖分為九而廬山湓水周乎雉堞洞庭彭蠡為之襟帶故自晉元康訖于梁陳出入五代四百餘載世稱雄鎮且曰天集作大府匪親匪賢莫荷其寄唐自有天下六合一軌設險斯廢惟民是集作之恤則命官擇任與列郡等矣至徳已來戎馬生而椘氛惡猶以是邦咽喉秦呉跨躡荆徐而提封萬井岐路五裂每使臣計郡集作郡縣之財入調軍府之儲峙壐節旁午羽書絡繹集作駱驛走閩禺而馳于越必出此路而防虞供應功倍他郡故亦大其任而難其人今年春渤海封公繼踐厥位夫為政猶工之攻木也得於手應於心則盤曲擁腫迎刃而觧况美材乎故公以發硎之利導勝殘之俗布政三月而人從乂每嘆曰茫茫舊壤千載在目觀乎板築則灌嬰之業朗集作咬或集廊而存焉披乎國集作圖牒則温太真庾元規之車塵若可窺焉義寧已來百四十有九載纂斯位者風聲相聆軌躅相躡前賢後賢纍纍如貫珠善惡成敗我之元龜酌而行之吾師存焉於是徴諸故老鳩其名氏之存者凡若干人躅集作揭而書之以為九江都國誌杭州刺史㕔壁記李華唐虞之代四岳十二牧分掌諸侯宗周有方伯連帥之職秦有監郡漢魏以還初曰部刺史後曰州牧近代罷州牧復為郡太守太守刺史無恒其稱職同九卿假以符節雖親如魯衞貴若周召任切一作切安人往往除拜天寳中朝廷以尚書郎人物之高選二千石元元之性命始以省郎臨大部若密邇京師或控壓衝㑹萬商所聚百貨所殖將擇良吏重難之杭州東南名郡後漢分㑹稽為呉郡錢塘屬隋平陳置此州咽喉呉越勢雄江海國家阜成兆人户口日益増領九縣所臨蒞者多當時名公宋丞相劉僕射崔尚書訏謨大政其間劉尚書裴給事之盛徳逺業魏左丞蘇吏部之公望遺愛在人韋太原崔河南劉右丞侯中丞節制方隅有事已來承制權假以相國元公旬朔之間生人受賜由是望甲餘州名士良將逓臨此部况郊海門池浙江三山動摇於掌端靈濤􅀈激於城下水牽卉服陸控山夷駢檣二十里開肆三萬室近嵗災沴繁興冦盗連起百戰之後城池獨存王師雷動元惡授一作折首乳哺疲人分命賢哲詔以兵部郎中范陽盧公㓜平為之公體仁而清直方簡亮文以輔徳武以静二作清人澄况有清江之姿巍一作魏峩有秋山之狀麾幢戾止未逾三月降者遷忠義歸者喜生育旌次讓利轅門無聲人咸曰休哉以卿佐之才遵王澤敷徳政吾見其為公為侯福履宜之未見其極也刺史冠服印綬甲令載之故不書詞尚體要古史之遺也永泰元年七月二十五日記衢州刺史㕔壁記前人有漢已還州統郡郡或連十城州或部十郡江南多大郡如㑹稽丹陽鎮領遐闊分置部都尉自富春而南太末一縣抵于建安今此州即古㑹稽西部之地也雖官明吏脩如曠阻何厥後相因損益無恒時更亂離罷置紛糅聖朝字育元元納於大中自衞公纍單于英公滅句麗天下和平户口繁衍元聖漙行葦蓼蕭之澤於下廷延公卿議割州邑謂疆與府近則易為理人與吏親則易為安以婺州封畛為廣分置衢州領六縣猶為大郡近嵗析玉山全邑洎湏江南鄉益信州而不為寡去年江湖不登茲境稍穰故浙右流離多就遺秉凡増萬餘室而不為衆呉越地卑而此方高厚居者無疾人斯永年名山大川既麗且清俗尚文學有古遺風國朝不以州領郡郡與州更相為號遷復從宜事之當也置觀察之司而董臨之此州長吏之選甲於他部忠貞之老則威武一作陵非公李僕射傑親賢之望則信安郡王椲遺政行為故事名位光于屋壁開元天寳中始以尚書郎超拜名郡賀蘭大夫為之李郎中為之自逆胡悖天地之慈犯雷霆之誅賀蘭起北海之師郎中佐浙東之幕有文有武家頌户歌元惡天討餘㓙稔罪聖恩示以鐵鉞之威未即大刑以為不教人戰是謂棄之乃分諸州置節度以鎮之州有防禦軍刺史為之使俾與夫持節某州諸軍事名實副焉以此州密邇山隂爰𨽻浙東㕔事馮高㦸户臨江武文左右麾幢成列千夫長百夫長上寮郡掾屬邑官吏進退無聲趨拜風生仕不登州談不為榮凡為州者儒不毅勇則頓威攻守所由敗也勇不儒和則失人邦國所由困也故二千石之任方今為難至尊垂憂勤於兆人延俊乂於高位以蘇州刺史陳郡殷公文可以成政武可以安人明斷良謀忠在王室其理也寛不容怠嚴不拒情清白貫於神明簡易契於黃老徳必有隣歌聲宜繼由是命公典此邦也至若建置城府之年月升降品第之等差風俗貢賦之宜男女隄封之數圖牒備矣老㓜傳之今之所書畧舉勲徳也元年建寅月二十一日左補闕趙郡李華於江州附述常州刺史㕔壁記晉分丹陽為毗陵後改為晉陵隋置常熟縣剏常州理之無何常熟𨽻蘇州始為晉陵置常州當椘越之襟束居三呉之高爽其地恒穰故有嘉稱領五縣版圖十餘萬望高地劇此闗外名邦自狂虜肆亂江湖流毒地荒人亡十里一室天子詔宰政審可以安人者以工部侍郎賛皇公覽允帝俞拜為此邦昔齊人聞石闕至舉國大理賛皇東轅明詔先下吏愉人泰如時之春視之猶身歸者遍野賛皇公以為易簡本乎悠乆乆於其道而化成封章上請求理三嵗詔書寵異進品正議大夫優賢報功於時為盛自呉通上國越盟諸夏秦裂郡國智如伍員才若鴟夷以及我國家賢良臨州者甚衆未有濬河渠引大江漕有餘之波溉一作益不足之川溝延申浦至於城下廢二埭之隘促數州之程海夷浮舶弦發望至出古人剏物之知見君子濟衆之心大矣哉一境清凈無為一作言而理此舉大畧也漢制刺史部領郡國遷為太守太守課最入為公卿及魏晉以來或稱州牧國朝州刺史郡太守更相為名親賢如寜岐弼諧如狄宋皆拜焉在部視侯伯入朝亞卿尹其車服皂盖朱轓華蟲七梳進賢兩梁冠玉佩青綬古有銅獸竹使符太守不假節刺史臨兵則持節今雖無事亦稱使持節戒不虞也降銅魚詔書合之代獸符也夫子門人高第者衆唯稱雍也可為諸侯至哉古之為理本於徳行賛皇公秉心宣猷盡瘁王室愷悌君子民一作人之父母為王者輔冝哉永泰二年二月庚戍賛皇公從子檢校吏部員外郎華述文苑英華巻八百
