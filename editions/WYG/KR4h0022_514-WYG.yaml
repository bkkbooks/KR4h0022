body:
  text: 文苑英華巻五百十四宋李昉等編選舉門三十道舉似已者判六道舉方正者判三道舉嘉遁第判一道自舉判一道舉人倨傲判一道自比管仲判一道貢士不歌鹿鳴判一道鄉貢進士判五道貢士帖經判一道括州貢士判一道獻賢能書判二道舉賢任選判二道被替請選判三道詐假求官判一道知名配社判一道舉似已者判丙充使舉似已者御史紏按丙稱但成三物唯善能之對陳齊卿舉善國經為善身守有觀風俗俾擇賢良故軺轉一作傳一封尚且通於鍾律埋輪八使豈獨懼於豺狼丙以星車達諸天府惟賢能似雖讐不忘御史彈違蒞職肅物臨人謂無失於奉公乃見傷於與善使苟為鬷邁詩東門之枌鬷邁訓總聚而行但其下既引羊舌又疑是鬷蔑畏此簡書則羊舌廢而不興祁奚誰其請老制命為義然暫威扵柏臺察理蒞仁終取連於茅茹欲成三物方建一官所紏之言其細已甚同前屈突滑天生蒸人樹君以牧國有理體得賢其昌丙人伊何縻我好爵發揮王化對揚天休整日馭以觀風駕星軺而問俗方欲庶績其凝伊又九功式序搜遺逸於巖藪訪才能於草澤舉不失徳推皆似已既無替於拔茅亦何慚於擢一作折桂且鯀則廢命禹乃嗣興奚其歸老午也膺職内不子避外惟讎舉建兹一官成彼三物自叶彚征之吉寧失鶴鳴之義憲司所紏誠為妄作不能沮勸忽肆滛刑参則不敏未敢從命同前裴春卿受命觀風光膺耳目停車輟駕是牧疑作收翹楚知之不逺十步自得於芝蘭行之有鄰千里方聞於應㑹惟彼舉善誠為好徳出門無爽於同人投士遂多於似已類祁奚之直道有范滂之逺心建一官而三物克成舉十室而四方知勸皇華允美所謂伊人白簡以聞徒為此紏同前獨孤峻舉賢無私惟善所在苟利社稷無恤其他疑作也故徳能佐時彭仲超於令尹才堪御敵觀父統於三軍唯得其人似已何爽且魏獻舉代祁奚薦讎將利國是資不阻親怨以進賢為務寧問回邪故能建彼一官成乎三物先賢所尚君子韙之事以類分云胡不可瞻言丙也直指是稱舉爾所知何敢没沒良才衆矣多舉何妨御史繡服霜華驄威電發將違執秩言寘僕區曽不知獄也放紛刑乎頗類見左傳昭十六年子産曰刑之頗類滛刑已逞誰則無辜得善誠則可嘉紏按斯為戾也同前房密進賢受賞求善以類苟有狥於㢘能固無嫌於讎黨夫不惡汝句栁􅃋方為於柏人孰可代之伯華旋佐於軍尉事不為謟舉乃斯得以成三物奚獨一官且王命使臣匪躬之故位多君子何限之拘方勵時而激俗寧守文以牽制能舉善也唯其似之大夫之中則聞於祁氏御史之紏無為于魯人宜加爵地之榮勿䧟功賢之議同前李翥父教子忠為臣不易知人則哲惟帝稱難任官惟良底祿以徳莫不進方正之士獻賢能之書詩詠繡裳禮設庭燎衣冠濟濟鳴玉珮而來朝文雅鏘鏘望金門而待詔祁大夫之請老内選其親范文子之譲能豈遺其舊皆舉不失職義不在私晉國建其一官魯史成其一作乎三物士遇知己唯其似之覩星使之來儀長歌棫樸覽霜臺之紏謬反示疑狐裘寧假有辭自然無咎舉方正者制京兆尹舉方正所舉者召見槃辟雅拜有司以詭衆虚矯奏請左遷對張萬頃漢辟賢良周升俊造求我士庶登之于朝咨爾大夫褎然為首以弼余教將沃朕心况張敞尹京孫𢎞待詔軒墀中禁襜褕上謁如咫尺之在顔何槃辟以為禮將三命以必走奚九拜以愆儀然惟才所難與人無備焉可納虚詭之説畏賢能之書苟上第之得人豈左遷之云罪試可乃已吾無間然同前崔珪璋制祿受􅃂以身許國夫不舉賢宜其削地故何武所薦先於宗黨孫𢎞慎擇果得詞林至如官則尹京爵為上秩問馬未能於鈎距推賢乃見於槃辟且不求備寧責於周旋如戎可收豈徴於拜禮應屬天顔咫尺對􅆒失墜楚材儻以堪用卞璞詎宜便捨欲求上賞更俟試時因奏左遷孰云其可聖朝刑尚不濫舉賢理合從寛向觀稽首之儀未成不削之罪同前李伉四方取則西夏為樞九流待問東臺是急若舉不失徳實人所具曕而肅穆清規崇嚴丹陛登清光於霄漢不違顔於咫尺則當進退禮容孰聞槃辟雅拜既無觀於叔氏亦何取于鄒人有司上聞攸資伏念儻使廣成不逺應無北面之尊綺季或存未屈南山之老試可乃已誰謂不然舉嘉遁第判嚴虚應嘉遁科舉試策及第選􅈠為非時進擬經臺有喧訴選司以虚名乖實貶第對徐楚壁嚴虚草澤賢才蒲輪辟命玉臺對問既則登科仙署縻爵誠宜利用抑同選調詎曰非常坐見淪塞行招往訴然則晦其跡也事等鑿坯行其道焉何論負鼎諒出處之有異豈名實之相乖義在優賢理無貶第興言舉主誠則知人賞先茅之地非無故實奪閑田之祿未之前聞循彼功􅈠以為直筆自舉判缺李昇朝舉人據地判揉目作舉人倨傲判頴州常居於本屬舉刺史問所能乃據地而言刺史將為竒才寮吏為詞色倨傲不堪奬仰處分對韋希顔常居汝頴竒才丘園髙士千進二千石自謂五百年陳思王之藝能唯聞自舉馬相如之文藻故且先容蓄鋭門庭審屠龍之已就露才州府望維駒之有期舉善進賢英翹是務負才任氣倨傲何傷計吏猶揖司空處士何卑刺史或是栖遲之侣禮律未閑流宕之夫拘檢不足取優退劣赦過舉賢庶以為宜未敢懸定自比管仲判無是子恒居草廬自比管仲云夢乗舟邑人告其虚誕對李昇朝國家頓網鵷鴻廣羅舟檝人降三傑俾機務允釐天飛五老而元氣清晏猶且弓招嵗下徴拜日聞無是子毓徳郊扉澄神虚白效宣尼之竊比無踰老彭徴武侯之故事終期管晏雖復跡符媒􅃷終是志越儕流或未可量有足嘉尚昔月中見字尚表英童今夣裏乘舟故符玉佐但聖朝以丘園佇秀物色求人乘箕降􅄧之賔金礪玉璜之相必循名實方踐台階今者邑子薄言告以虚誕且鄉人所惡未可即依翁歸自陳亦難慿據言之無罪告上何傷貢士不歌鹿鳴判甲秀才充貢郡送不歌鹿鳴之詩對苖收總目作牧甲才惟國寶秀彼士林孫𢎞適見於贈芻郤詵佇希於擢桂既黍鄉賦將觀國光雖賔薦可嘉而禮容未足鹿鳴不奏鳯徳何衰爾闕其儀我愛其禮乙有言矣郡何詞焉自速其尤誰曰無咎鄉貢一作舉進士判鄉舉一作貢進士至省求試秀才考功不聽求訴不已對趙岊鄉大夫之興贒最疑作能大司徒之論俊造既升司馬又告諸王天府拜而已登内史職為其貳周云進士漢曰秀才在今日之區分非曩時之名數文藝小善進士之能訪對不休秀才之目羙彼良士贒乎我師以窮鄉之莫知徒舉其小庶㑹府之達識即致其大亦猶鯨魚之皷溟海歎蹄涔之暴鱗驊騮之局中庭望雲朔而驤首考功自可表其秀傑拔以殊倫縱常式之文不歲登其尤異急賢之地宜日新於進才聞言不聴斯為蔽矣試可乃已何至是乎公使湮沉坐令求訴同前漢辟賢良堯徴側陋庶見拔茅之彚方資刈楚之才故選彼鄉閭貢之天府始策名於進士誠合明􅆒終求試於秀才一何乖謬既離局以干事方越樽而代庖薄訴雖多厚顔奚甚國章攸著甲令斯存考功不聽誠則無爽同前講信明義脩詞立誠豈唯潤身且以干禄一作以干禄仕徳成而上充歲賦於司徒道在則遷嘉名聞於㑹府叩兩端而入仕慱之以文論二舉之殊條奪之於理尋擇賢之意無遺十室之才詳厯試之規寧隔四科之秀循名責實雖在司存改業惟人何求物議同前權寅獻拔茅稱吉大易至言刈楚飛音詩人起詠進士以鋪翰振藻見舉於鄉閭文麗筆精允光於省闥據才雖稱片玉無狀須依一名出敬梓之鄉但論進士入握蘭之署旋求茂才名異奏名事便迂僻訴非訴禮義甚乖踈瞻乎不已之詞何哉無狀之繆請依鄉舉謂充公途同前髦俊之侣鄉曲有聲閲五車之墳籍光三道之詞翰是得咸充歲賦各騁翹材喧一作暄鶯谷以載飛歌鹿鳴而入薦既臻華省方得甲科但以進秀異名考試殊例不應本舉誠恐非宜考功不聴良為允當訴求不已何大乖踈貢人帖經判漳浦郡貢人景帖策不通所由將坐郡守云未成公仰處分對張慿惟賢是舉慎擇為先明試以言得失斯在惟景策名歲貢待扣禮闈將登甲乙之科翻速主君之戾何則帖兹學圃既謝專經策以詞林仍非善中遂使仙臺清鏡徒訝於才難幽谷遷鶯空悲於歲晩顧惟州將豈曰能官據條雖未成分於事恐非公薦景當冐貢請用逺郊之禮守舉非才宜從削地之罰括州貢士判括州括州即括蒼也大厯十四年改為處州甲貢士少對諸葛若驚諸侯列一貢士有差稱彼地靈登之天府括州水鄉遐服台嶺仙區梓漆標材幾馳聲於俊造竹箭為美亦飛譽於東南頃以充賦上京頗規前古在褰帷而未失何直繩之見欺然則國家獵異搜竒招弓頓綱移鄧林之茂樹接影槐庭掩澤國之環材連芳芸閣既惟新而製典何背禮之云稱廉使此推葢申朝憲州將雖拒有昧隨書獻賢能書判甲歲終致事不獻賢能之書御史紏不能教其所理辭曰待經三年則以禮賔之對宋昱考藝尚實進賢受賞必久於其道乃不失其人甲也齒鄉軄於股引觀其所與以徳行為先察其所安則文理為後縱舉不失選僉曰能賢猶同三年乃賔以旌五物無爽筐篚以將其意笙歌以勸其從儒者為榮詞宗立志始於司徒授法終以大夫獻書俊寵於君舊史每令於續食成賦於國前王肇俾於計偕將慎薦延之儀遂下崆峒之拜登于天府貳於史軄當由致事之歲則匪掄才之時卿則守官諒不愆於侯度臺應懵理頗有乖於紀律有詞不伐無簡可聴同前鄭璲國有地官以帥軄鄉則大夫而列位政無茍貳命在奉初告于鄉里頒司徒之禁令期於歲時登夫家之衆寡眷言甲者斯焉從政既受其法如璽印塗將教所理猶金在鑄是以俊造察本於鄉閭賢能薦登于天府同谷永之舉士不失薛宣類周瑜之貢才無遺魯肅况致事有典大比作程詢衆之謩義存五物禮賔之飲道在三年作良命官是甲未聞失徳賞恭罰否彼憲何其謬繩舉賢任選判得上封事人云吏部計選不得其才請命公卿舉賢而任所司云知人之難恐不絶私非選士之策對鄭察底禄任人惟賢是務居位稱軄無私乃可况爰設天官俾司衡鏡審輪轅之目每得山公表清通之心更推裴楷固不失士將無棄才何必咨爾公卿獲我髦彦雖鄉舉里選則有附於曩時而操柄執權諒難廢於今日且如知人匪易絶私尤難前王以之則哲五倫猶是自疑家官必擇夫至公庶流自息其貪競議乎經久曷可因循愚謂上封未恊中道同前盧貽求賢審官分軄揆務必資慎擇乃罔姦邪惟彼禮闈式蒸髦士固亦品藻而無失夫何銓管而是昧所以懐山濤識量藴毛玠公方擇其琳琅雖云非允刈乎杞梓孰曰謬賢嗟爾伊人議乎取士類匡衡之述古多所引經同谷永之上封屬一作獨將言事教隳邦典政敗豎儒且渉縁情殊非革弊天官嘉是是曰司存月卿薦賢恐成離局被替請選判丁授官累日被奏替請非時選廢置不許云準勑㫖冬已過旬限丁訴云今正在冬當替只在下牒之日且辨論官材不合拘以限約廢置又執賢能以歲時入其書豈可無限對牛聳用行捨藏宣尼所誡難進易退老氏格言伊丁効官先甲入用曽未浹辰見代而觧乎印綬已在後時叅選而趨乎衡鏡雖牽絲失位情有可矜而如綸與能材或無取誠宜委命而去何至滕口與爭但使如珪如璋不僣不濫弓旌自辟仁逺乎哉今則天鑒孔明星郎守法進退不遇斯害也已吏曹引乎周禮前言是徴丁意昧於隨時厚顔何格告令知分用止躁求同前敬寛底禄命賢諒存於考覈懸象班令克定於程期無慢國經必遵王度哿言丁矣庶得人焉登書拔才量能授軄始望政成人化冀及三年而乃裭服抽簮曽不累日屬叅選限勑而詣訴過時徒思揚已露才豈可違文破格然已而靡愠嗟有異于子文畱之物移傷不遇於黄霸誠哉廢置寔曰司存引明周典之文詎黍冡官之列興言不失宜窒有詞同前王沼任良牧官著國典而為重守法立度在所司而靡踰丁筮仕策名掄材受署既而天書荐委寧俟及𤓰之期㑹府陳辭重希刈楚之選官纔登於累日時已後於三冬允哉廢置明乎用捨雖進賢是急冀開取士之門而嚴初不移誠曰在公之義訴而不納信謂得宜况歲其書事有徴於前志不拘以限亦何聽於薄言請俟他年無隳舊典詐假求官判乙詐假求官科其罪訴云求而未得詐偽對蘇寧為官擇人聿求俊義强學干祿必正科名彼乙伊何不求諸已射官明試無聞六義之能藻鏡掄材將辭九流之序况今唐虞御極才子在官王裴持衡至公選士方聽得賢之頌寧容詐假之辜顧三面而闕斯宅既稱未得須議减論知名配社判甲知名早卒郡守配食縣社紏不法曰恨不及之對敬括駿馬雖死猶聞市骨秋蘭縱敗罔或損香詢訐乃甲名器無瑕禀諸葛之美秀㓜敏足稱韞子然之材能早代何速恨疑良者守克尚于賢仰之彌高未經旌其閭巷思而不見聿將配乎縣社俾善政彰聞下人悦勸伊可韙也何其糾之宜高孔氏之言無取使司之見文苑英華巻五百十四
