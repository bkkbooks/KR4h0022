body:
  text: 文苑英華巻一百二十二宋李昉等編舟車二舟賦一首大舟賦一首汾水新船賦一首滯舟賦一首濟河焚舟賦一首虛舟賦一首胡越同舟賦一首刳木為舟賦一首舟賦常暉昔者帝軒君臣道叶刳木為舟剡木為檝洪水以之徑度大川於焉利渉疑夏日之初蓮似秋風之落葉動而必利其物居而必虛其心善蘭桂之得性惡泥滓之陸沉清流澈影岸狹波深直容與而孤運非軌轍之能尋動而何極居而不測以謙虛而受盈尚朴素而思餙為而不有質而能力不以克己辭於功不以利物矜其德夫潜行不離於水有似智焉虛己以濟於物有似仁焉不畏蛟龍之浦不耻魚鼈之泉任規模於匠者隨物理之推遷横不測之流無慙於勇决指送歸之路有類於神仙爾其渡遼按甲伏波受命絶島如雲長川似鏡值衝風之䬃起引孤㠶而髙映榜人竒唱棹聲不一赴海凌川箭馳風疾臨地角而長逝望天涯而逈出飄颻畫鷁决孤影而排風迢逓檣烏轉危竿而就日且夫履有常道濟無不通嘉守義於共伯慙棄人於衛公安而不傾得性江湖之上悠哉獨運託質浮沉之浪為用也大為德也廣操檝則津女輕歌畫土則廪君孤徃㐮城帶其寳劍神亭飛乎銀仗惟傅巖之版築臨巨川而長想大舟賦崇崇大舟内谽谺而坑谷外突兀以山丘長者一無此字百尋受萬斛淺淮泗滯原陸兀若簸大海以出鯨魚邈如漂崑崙而横地軸及縱大壑鼔雄風疊髙濤摩蒼穹連山嶪于天外疾雷吼於地中當此時也忽然湧出謾若乘空挺無何之鄉樹摩天之檣檜檝不舉雲㠶髙張平林倐閃以藏没群島飛動而相望兩儀混沌萬象𣺌茫崇山成秋毫滿月猶隟光一日二日經岷峨而歴扶桑外甚一作乘馳鶩中唯虛閒所以望之者勢同累卵居之者安如泰山借如唐堯洪水大浸桑田包山上陵刮地滔天無巨舟矣人其魚焉有若漢武習戰羽衛雲陳鑿昆明者四十里坐豫章者一萬人夫其為大與世殊倫暨乎巨象初來輪囷其貎錙銖犀兕䘊蠓貔豹向非刻舟鍳其淺深代疑輕重而難較岑彭西伐杜預南征千里江漢三軍甲兵若非廣艘𢎞舸何以蜀滅呉平稽前代之為用信殊途而同軌以古况今相去逺矣何者我后無唐堯洪水懲漢武昆池一作明笑魏家秤象偃晋國興師則大舟之用殊於昔時今乃守在海外化漸無垠浮三海一作江以實倉廪遶四溟以周乾坤既而飛鳳詔宣洪恩或西盡月窟東臨朝暾一作職南國狙遊北極馳奔窮水路以適逺為大舟之用存於戱向者將逝萬里之外滯一曲之内故知德有所長皆以拙於用大今以濟度為功適天下而皆通假其風水之力不離江漢之中向使移舟為人以海為主元首契合大舟夾輔則傳說之濟川同功軒皇之刳木何取客有扣舷而歌曰是舟也非大匠則無以成非大水則膠而傾非大風則道不行此皆大匠之則大海之德一日千里者風之力也汾水新船賦以虛舟濟物利渉大川為韻徐彦伯賢者徹侯求人之瘼分帝之憂以為冀方輪轉病於行輈乃乘素秋鏡清流假道於河伯息肩於呉牛因去彼以取此遂捨車而造舟革故鼎新裁規創制通子房之妙畧運桑羊之潜計則淺深之量將載沉而載浮陳去就之宜則既濟而未濟懿夫席㠶錦䌫蘭橈桂檝不日而成嘉謨一作謀允叶蒲且罔設寧勞漁子之家財用無虧不奪農人之業水之積也厚船之動也㨗回翔竝騖識波上之䨇鳬倐忽孤飛見天邉之一葉伊負重以致逺非卬否而人渉及夫安卑委順外靜中虛混泥沙而閉矣象智者之居諸逐便乘流排難觸物泛波濤之不屈狀勇者之拂鬱船之時義吉無不利向之為材也標挺特之材今之為器也作殊常之器若徃若來無顛無躓奢淫自戒厭殷帝之酒池遊戱無虞耻丹朱之陸地鷁首翩然魚鱗比川映汾隂之寳鼎參漢武之樓船當秋風之擢一作摺唱候明月以扣舷載廪儲而奉國逹方物以朝天可以通河渭可以泝涇瀍斯漸一作暫勞而永逸將冠古而爭先且知君子攸作務於逺大美利亟行莫不繫頼厥聲載路賡歌濟巨川之功史不絶書考課獲疇庸之最别有荷為衣兮蕙為帶鼔輕枻兮張翠蓋杳𦕈煙波之末夷猶區域之外願一渉於龍門接神仙之嘉㑹滯舟賦蕭頴士攝提歲拂衣海嶽應調函洛詠佩服之臯蘭美縶維之塲藿徴良圖以趍事窘中道以摧落昔謬價於當年今後來之不若衆飛下以抵􅇖余矩枘而規鑿悲介直之不可媒想雲林以自託眷眷離憂行行獨愁邅我車而北上朅吾道以東遊愛遲遲之暮春登泛泛之輕舟過巖邑以信次䌫縈波之下流于時丙丁守位恢台肇節朱雲四騰瑶草半歇景冲冲而熾旱風翳翳以歊熱赫中潬大亶功沙堆為潬之平沙滲通川而殆竭則有危檣巨舸長艥廣艘龍翼錦軸雀顱方艚材木蘭兮竹箭紉齒革與羽毛頓修笮於廻塘駢曲岸以戢篙於是迅拏輕㯍河舠漢艇乘時泝洄赴利馳騁混魚商而沸雜期數日而俄頃事也時哉咸適其才于嗟大艦安得而來借如三江五湖之𣺌漫礐石飄沙之汨淈望赤岸以天低臨清波而景没峻艫衝濤以直透髙㠶雲巻而上彗朝發乎荆衡夕止乎楊越晷刻千里之外一何去留之倐忽彼斗筲鍾鬲之餘㨗逕趨時之末曽壓溺以不暇亦何知於歲月材㣲則致逺而自覆量大則俟時而可貴苟或喻於窮通又奚分於器類運之來也賈長淵髙視於三台謀不用焉梅子真近辭於一尉吾將歛䇿以飲氣覩維舟而歔欷濟河焚舟賦高邁昔孟明之載戰載北也空山肉填平地血流匹馬隻輪蕩然不收社稷包羞朝廷隱憂用兵至此不死何求誠以棄瑕之恩未報拜賜之言虛設砥名礪節易地改轍冀桑榆之未晩得雌雄之一决乃復總元戎申薄伐駟馬雲㓕一作屯長劔電掣哮闞一作咆兮前貔後虎威稜兮左霜右雪火千旗而四靣風生一作動雷萬鼔而一道地裂小長平之瓦散一作觧凌不周之柱折朝出乎咸秦夕臨一作濟乎孟津其氣益振其屈欲伸於是指河中之舟示軍中之人曰吾與君子誓雪前恥雪則出一作負則入黄泉之下勝則入青雲之裏吹噓一作咈而霜露變叱咤而風塵弭雖無此舟誰無此舟否則骸骨為異鄉之土魂魄為鄰國之鬼雖有此舟誰有此舟矣乃命焚之夫其火與木相守水與火相煎烘大川焮長湍龍吼乎沸潭魚喁乎湯泉舳艫化而為灰檝棹颺而為煙水聲與軍聲合旁聒乎地火氣與兵氣鬭上衝于天是謂一作以天為我赫怒焉地為我震嶪焉林木為我枯死焉山陵為我崩騫一有馬字千里而髙鳥不過四遐而猛獸莫前况於人乎况於國乎於是晉君臣聞之心攅百箭背負芒刺形神無主手足若墜曰秦師德之修誠之至天將啓吾將避閉城郭而不出潜鋒鋩以自備以五廟苟存為幸以萬人苟免為智敢佑二字一作豈敢䕶其山河而虞其土地于時晉實為一作之主反為客秦實為一作之客反為主不戰而勝不攻而取掠地於大河之北封尸於崤陵之下既而鬼得一無此字償前一作雪耻人得一無此字觧厚顔四顧野清横行而旋譟聲破晉山嘉一作喜氣塞秦闗曹沬復魯之勲自居其下范蠡平呉之力莫厠其間此役也見孟明之臨事暫否終泰圖之大也見子桑之舉人遺麤得精鍳之明也見秦伯之用賢責功捨辠道之在也臣事君不必自致藉主司之公君使臣不必自得藉主司之忠由是觀秦伯之有子桑猶耳目之在躬以其視視一國之明以其聽聽一國之聦自可以翊天子還淳風代一作名與三五比崇身與二八爭功威強晉一作秦覇西戎不亦宜乎明明我后渴賢固久懸無私之境以照六合持一作倚無私之衡以秤九有掇竒拾異葑菲盡取若有一人兮一無此字近文章含堅貞一作近忠貞含文章悔已徃之無成謀大來於此行出蜀郡題橋以見志入函闗棄繻以示誠寧作焚舟而死不為棄甲而生投軍於子桑自比於孟明君謂之何如哉一作君謂如之何言之不可以已也一無此字頌之曰析薪如之何匪斧不克事君如之何匪媒不得是知焚舟之役非孟明之力乃子桑之力也凢一作皆文粹虛舟賦以浩然任觸君子之心為韻樊陽源𤣥理可得真宗可尋惟虛舟之不繫同大道之無心每悠悠而去住恒泛泛而浮沉寂慮為徒必澄淡而方息在物無競信風濤而莫侵體合道樞來慿積水本流謙以處順寧遇坎而斯止類善行之無跡似至人之虛己或沿或泝非假功於檝師載沉載浮亦奚勞於舟子若乃景絶逰氛川息波文蕩漾無阻逍遥不群則鼔枻者未足與議摧撞者不得而云故曰動以貞勝而靜為躁君觀其浮廣川之洋洋混長潤一作瀾之浩浩不拘同放曠之懷無着體希夷之道殊青翰之見重等𤣥珠之為寳惟斯道全誰曰不然任東西之漂蕩隨風水之推遷中含虛而自若外守正以無偏逄流則行靡驚黿鼉之穴安波自徃空思李郭之仙動息靡常去留不禁以虛而受殊乎小器易盈可濟不通非曰不勝其任處靜安卑乗流任時浩然獨逝邈矣誰追想好風於曲岸避巨浪於中坻且没跡於寂寥檝一作鼔棹何從喧矣是無爭於觸擊紼纚焉得維之是則虛其舟川得以寧虛其心人寡於欲既與道而合契亦無情於相觸苟思疑理之未忘諒無驚於寵辱胡越同舟賦以所思同濟寧患異心為韻袁不約胡越異方兮言語不通邂逅相遇兮扁舟之中訝形殊而類别偶泝浪而乗風邈矣兩鄉懷土之情則異飄然一葉濟川之計斯同始也各自天涯俱來波際指遥程於空濶紛逺思而容裔南冠朔服俄泛泛以相親孤棹片㠶杳悠悠而未濟安危目擊休戚心期當波瀾之起處是肝膽之呈時水害若防不獨文身之俗風髙儻便豈惟嘶馬之思去乃夷猶來何處所不逺南北宛為儔侣投足而作隣遥集共軫風濤思鄉而何暇哀吟且虞悠阻迹也既狎心焉匪寧摇煙蕩水泛梗飄萍在浩𣺌之難測况沿洄之不停容與安流每欣欣而㑹意縱横駭浪咸惴惴以忘形蓋以風水多虞因依不間來非類聚雖慙泛洛之仙情匪貎親誠無敵國之患殊方何逺合志何深因託質於刳木遂忘言於斷金向若不同其利無得而尋長嗟綿邈莫嗣徽音則朔野慕射雕與鵰同之悍一有然字炎洲樂拾翠之心復安得同其憂患而計其浮沉哉於是察其事嘉其意諒極暌而乃合非棄同而即異永懷共濟之誠信無徃而不利刳木為舟賦以濟川資舟理國求相為韻羅劭權昔王者以濟衆為先念舟航之未具長川謂運斤之人必能造物選合抱之木遂使攻堅既而削彼鱗皴定兹繩墨短長大小任規模之巧心髙下重輕稱波瀾之巨力原夫造其舟而利其用亦由求其理而安其國剞劂斯休舳艫已流小周穆黿鼉之駕契髙宗舟檝之求德合國風暗動揚㠶之勢人歌帝力爰成鼔枻之謳濟物不得無其舟行化不得無其相運智既由乎明主操舟亦因乎哲匠器無不具實均大造之功道無不通宛叶蒼生之望必也主意𣺌瀰用汝猶疑不顧斧斤之妙不求擁腫之資則思渉之人恨無航而空嘆未濟之士欲行水而何期且刻之求劒者其意細㣲用之稱象者誠非大計曷若濟巨川而是念命良工而立制欲使蠻夷之類慕化而有路斯來啇賈之徒通貨而乗流逺逝利渉之道彌彰拯溺之功潜契以此利物何物不利以此濟人何人不濟由是皇恩逺被鴻化旁流潜通四海之路皆因一葉之舟用之則行豈隨波而上下利有攸徃當與道而沉浮今我后契道臨人端黙求理思通大水濟川之具雖多樂得長材刳木之心未已則知從古之君為舟於水若葦航於河廣之内似芥葉於㘭塘之裏方之於今未足喻其大而擬其美文苑英華巻一百二十二
