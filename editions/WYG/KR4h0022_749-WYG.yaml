body:
  text: 文苑英華巻七百五十宋李昉等編醫勸醫論一首華佗論一首卜相八卦卜大演論一首卜論一首蓍龜論一首相論一首時令時令論上下二首時論一首醫勸醫論梁簡文帝勸醫曰天地之中唯人最靈人之所重莫過於命雖脩短有分夭壽懸天然而寒暑反常嗜欲乖節故虐周禮作瘧寒痟首致斃不同伐性爛腸催年匪一拯斯之要實在良方故祇域醫王明於釋典如太師乃以醫王為號以如來能煩惱病祗能治四大乖為故亦有騷人之詠彭城一作塲非秦國之稱和緩季梁之遇盧氏虢子之值越人爰至九市一作乆視飛仙長生妙道猶變六一於金液改三七於銀丸蓄玉匣之秘研紫書之奥桃膠何是北斗靡遯一作録其刑一作形金漿非逺明珠還耻其價能使業門之下皷響獨聞一作傳雍祝之傍簫聲猶一作獨在周禮疾醫掌萬民之疾凡民之有病者分而治之嵗終則各書其所治而入於醫師知其愈與不愈以為後法之戒也至如研精𤣥理考覈儒宗盡日清談終夜講習始學則負墟尚諛積功則為師乃著日就月将方稱碩學專家之後猶湏劇談網羅愈廣鈎深理見厭飫不窹惟日不足又若為詩則多湏見意或古或今或雅或俗皆湏寓目詳其去取然後麗辭方吐逸韻乃生豈有秉筆不訊而能善詩塞兊不談而能善義揚子雲言讀賦千首則能為賦况醫之為道九部之􅐷甚精百藥之品難䆒察色辯聲其功甚秘秋辛夏苦㡬㣲難識而比之術者未嘗稽合曽無討論多以少壮之時渉獵方䟽畧知甘草為甜桂心為苦便是宴馭自足經方冺棄同庾獃見晉書本傳之讀荘子異孔子之好周易然而疾者求我又不能盡意攻治假使不能為地自可即為巳益所以然者若無隔貴賤精加消息以前驗後自可觧之日知所亡坐成妙術而又告以不能也治疾者衆必以溢一作盂浪酬塞一作賽惡之一作人者多愛之一作人者鮮是則日處百方月為千治一作軸未嘗不輕其藥性任其死生浮華之功於何而得及其愛深親屬情切支肌一作友朋患起膏盲痾興府俞一作俞附雖欲盡其治功思無所出何以故然本不素習卒難改變故也周靡二字一作胡麻鹿藿止一作纔救頭痛之病一作疴麥麹芎窮反救一作止河魚之疾一作腹思不出位事局轅下醫者忘志四字一作欲求反俟者俟疑作死於𤣥都揚已名於緑帙一作藉其可得乎術道困窮於斯實至誠當善思此意更興其羙非直傳名于後亦是功徳甚深比夫脫一鴿於權衡活萬魚於池水不可同日而論焉一作皆初學記華佗論劉禹錫史稱華佗以恃能厭事為曹公所怒荀文若請曰佗術實工人命繫焉宜議能以宥曹公曰憂天下無此䑕軰耶遂考竟佗至蒼舒病且死見賢遍切醫不能生始有悔之之歎嗟乎以操之明畧見㡬然猶輕殺材能如是文若之智力地望以的然之理攻之然猶不能反其恚執柄者之恚真可畏諸亦可慎諸原夫史氏之書於册也是使後之人寛能者之刑納賢者之諭而懲暴者之輕殺故自恃能至有悔悉川文粹作恚非書焉後之或者復川文粹作覆用是為口實悲哉夫賢能不能無過茍寘于理矣或必有寛之之請彼壬人皆曰憂天下無材耶曽不知悔之日方痛材之不可多也或必有惜之之難彼壬人皆曰譬彼死矣将若何曽不知悔之日方痛生之不可再也可不謂川文粹作為大哀乎夫以佗之不宜殺昭昭然不足言也獨病夫史書之義是将推而廣耳吾觀自曹魏以來執死生之柄者用一恚而殺材能衆矣又焉用書佗之事為嗚呼前事之不忘期有勸且懲也而暴者復蜀本作覆藉口以快意孫權則曰曹孟徳殺孔文舉矣孤於虞翻何如而孔融亦以應㤗山殺孝亷自譬仲謀近覇者文舉有髙名然猶以三字集作猶亦可懲為故事矧他人哉卜相八卦卜大演論王勃昔者聖人之作易也始畫八卦以通神明之徳以類萬物之情以為分太極者兩儀也分四象者八卦也成八卦者十六将也司八卦者十二月也分十六将者三十二候也分十二月者二十四氣也分三十二候者六十四卦也司二十四氣者三十六旬也進退於三百六十六日屈伸於三百八十四爻徃來飛伏之理盡矣其孤虚消息之端極矣三才之道不可不及也五行之義不能復過也翕之以幽明張之以寒暑㑹之以生死申之以去就祸福生焉吉凶著焉成敗行焉逆順興焉賢者識其大者逺者不賢者識其小者近者奉之者則順背之者則􅄽圓立者稱聖偏㨿者號賢嘗試論之曰三才昜之門户也八卦者昜之徑路也引而伸之終於六十四卦天下之能事畢矣陳而别之極於三百八十四爻天下之㣲理罄矣夫隂陽之道一向一背天地之理一升一降故明暗相隨寒暑相因剛柔相形髙下相傾動靜相乘出入相藉泯之者神也形之者道也可以一理徴也可以一端驗也故天尊則地卑矣水濕則火燥矣山盈則澤虚矣雷動則風適矣是以天下有風可以姤矣則地中有雷可以復矣天下有山可以遁矣則地上於澤疑作澤上於地可以臨矣天地不變疑作交可以否矣則天地既交可以㤗矣以風行地上可以觀矣則雷行天上可以大壮矣山附地上可以剥矣則火附天上可以大有矣風行水上可謂渙矣則水在地上可以比矣雷出地奮可以豫矣則風行天上可以小畜矣雷之與水作觧矣則風之與火可以家人矣雷在風上可以恒矣則風在雷上可以益矣風在地下可以升矣則雷在天下可以無妄矣風在水下可以井矣則雷在火下可以噬嗑矣風在澤下謂大過矣則一作以雷在山下可為頥矣雷在澤下可以隨矣則風在山下可為蠱矣澤上有水可為節矣則山下有火可為旅矣雷在水下可為屯矣則風在火下可為鼎矣水在火上可為既濟矣則火在水上可為未濟矣澤上有火可以革矣則山下有水可為蒙矣火在地下可以明夷矣則水在天下可為訟矣地下有水可為師矣則山下有火可為賁矣澤上於天可為夬矣則澤下有水可為困矣山下有天可以為大畜矣則澤下有地可以為萃矣以山在澤上可為損矣則澤在山下可為咸矣澤上有火可為暌矣則山上有水可為蹇矣上天下澤可為履矣則地下有山可為謙矣澤上有風可為中孚矣則山下有雷可為小過矣山上有風可為漸矣則澤上有雷可以歸妹矣此天地以對成之義隂陽反合之理故卦相次則反爻以成義昜之八卦是也八八相生則錯卦以興理因而重之是也故聖人之道可縱焉可横焉可合焉可離焉逆而陳之未嘗逆焉順而别之未嘗順焉三畫以變雖天地之數可無韜也九六相推雖萬二千五百之浩蕩不能踰於三百八十四三百八十四之紏紛不能踰於六十四重之以六十四不能過於八卦張之於八卦不能過四象紀之兩儀兩儀之理逹而太極得矣故古徃今來寒進暑退死生亂動是非謄結未嘗非兩儀也而未嘗離太極也故曰有寒有暑則兩儀不廢也無思無為則太極未嘗逺也見之則兩儀忘之則太極夫然故不捨二求一未嘗離動以求靜未嘗離動以逹靜也有可有不可非聖人之謂也無可無不可是夫子之心也然天下之理不可窮也天下之徃疑不可盡也有窮盡之地者其唯聖心乎有窮盡之路者其唯聖言乎故㨿滄海而觀衆水則江河之㑹歸可見也登㤗山而覧羣嶽則崗巒之本末可知也是以貞一徳之極權六爻之變振三才之柄尋萬方之動又何徃而不通乎又何疑而不釋乎故孔子曰必也正名乎名者義之本也非聖人孰能正之哉若抑末執本研精覃思非聖人之書則不讀也非聖人之言則不取也庶㡬乎神明之徳可通乎萬物之情可類乎本末之思也夫何逺之有君子可不務乎哉卜論李華天地之大徳曰生舜好生之徳洽于人心五福首乎夀麟鳯龜龍謂之四靈龜不傷物呼吸元氣於介蟲為長而壽古之聖刳而朘之觀其裂畫以定吉凶殘其生勦其夀既勦殘之而求其靈夫何故愚未知夫天地之心聖逹之謨靈之夀之而夭戮之脫文粹作朘其肉鑚其骸精氣復於無物而貞悔發乎焦朽不其反耶夫大人與天地合其徳與日月合其明與四時合其序與鬼神合其吉凶不當妄也夀而天之豈合其徳乎因物求徴豈合其明乎毒靈介而徼其神豈合其序乎假枯殻而决狐疑豈合其吉凶乎洪範曰爾其大疑謀及卜筮聖人不當有疑於人以筮也夫祭有尸自虞夏商周不變戰國蕩古法祭無尸尸之重於卜則明廢龜可也又聞夫鑄刀劔者不成則屠犬彘血而祭之被髪而哭之則成而利盖不祥器也其神者躍為龍蛇穿木石入泉源以至發烱光聲音人不能自神因天地之氣化天地之物而為神固無悉然是亦為怪古者成宫室必落之鍾皷噐械必釁之豈神明貴殺享膻腥歟今亡其禮未聞屋室不安身而噐物不利用由是而言則卜筮隂陽之流皆妄作也夫潔壇墠而布精意文粹作誠求福之來緬不可致耕夫蠶婦神一草木禱一禽獸鼓而舞之謂妖祥如答實歟妄歟犧文之昜更周孔之述以為至矣揚子雲為太𤣥設卦辯吉凶如易之告若使後代有如子雲又為一書可筮則象數之變其可既乎專任道徳以貫之則天地之理盡矣又焉假夫蓍龜乎又焉徴夫鬼神乎子不語是存乎道義也蓍龜論于邵卜筮生靈之緼耶必遵以信時日畏法令决嫌疑定猶豫者也自伏羲畫卦周公制禮率先斯道以惠其人故立筮人建卜曰卜職或掌三昜以辯乎九筮或開四兆以作乎八命俾吉不相習假爾有常叶乎乾坤調彼昭昧占兆審卦異位同功不其然歟夫以原始要終鈎深索隠則象事知器占事知來蓍辨吉凶則圓神而方知龜窮禍福乃載陽而履隂繇得蒺䔧終驗齊荘之難兆聞鳴鳯便興敬仲之宗然則筮短龜長嘗聞其語義之何者今試論之且其兆體百有二十夫其頌聲千有二百由是其尚也夫龜者著性命之理有好惡之情善出入之端存生死之變冠群甲之長居四靈之間上髙法天下平象地受三千嵗而逰於蓮葉之上吸以沆瀣之精盖通其聖也何彼叢薄之下蘙薈之中生而無靈長而無識奉大衍之數而為凖求元亨之義而為用探頥而知其變審爻而㨿其辭豈與夫灼而專逹居然獨見同年而語矣史偏漢書作篇以之佐昌此其効也墨以之從長又其効也衛人以龜為有知漆雕以為善對又其効也至如管輅卜隣之火孔愉反顧之鑄盖小之也則知靈徳感應觸類而長矣故朔望則灼孟冬命亹盖先王之重者萬事之階也信矣夫折羣疑相論李徳裕夫相之相在於集作乎清明将之相在於集作乎雄傑清明者珠玉是也為天下所寳雄傑者虎兕是也為百獸所伏然清者必得大權不能享豐富雄者必當昌侈不能得大柄兼而有之者在乎粹羙而已余頃嵗莅淮海屬縣有旴􅇇而山多珉玉剖而為噐清明洞澈雖水精明氷不如也而價不及於凡玉終不得為至寳以其不粹也清而粹者天也故髙不可測清而澈者泉也故深亦可察此其大畧也余嘗精而求之多士以才為命婦人以色為命天賦是羙者必将有以貴之才髙者雖孟嘗眇小蔡澤折頞亦居萬人之上色羙者雖鈎弋之拳子夫之賤亦為萬乘之偶然不如清而粹者必身名俱榮福禄終泰張良是也前史言張良質羙予謂諸葛言以子房之清精不釋陳平之濁俗則知清精者雅矣擇士能用此術可以㧞十得九無所疑也相論杜牧吕公善相人言女吕后當大貴宜以配季季後為天子吕后復稱制天下王吕氏子弟悉以大國隋文帝相工來和軰数人亦言當為帝者後簒竊果得之誠相法之不謬矣吕氏自稱制通為后凡二十有餘年間隋氏自簒至滅凡三十六年間男女族屬殺㓕殆文粹作大盡當秦末吕氏大族也周末楊氏為八柱國公侯相襲乆矣且集作一旦以一女子一男子偷竊位號不三二十年間壮老嬰兒皆不得其死不知一女子為吕氏之福耶為禍耶一男子為楊氏之禍耶為福耶得一時之貴㓕百世之族彼知相法者當曰此必為吕氏楊氏之禍乃可謂善相矣今斷一指得四海凡人不欲為况以一女子一男子易一族哉余讀荀卿非相因感吕氏楊氏知卿為大儒矣時令時令論上桞宗元吕氏春秋十二紀漢儒論以為月令措諸禮以為大法焉其言有十二月七十有二候迎日歩氣以追寒暑之序類其物宜而逆為之備聖人之作也然而聖人之道不窮異以為神不引天以為髙利於人傋於事如斯而已矣觀月令之說茍以合五事配五行而施其政令離聖人之道不以集作亦逺乎凡政令之作有俟時而行之者有不俟時而行之者是故孟春修封疆端經術相土宜無聚大衆仲集作季春利隄防逹溝瀆止田獵傋蠶噐季春集無此二字合牛馬百工無悖於時孟夏無起土工集作功無發大衆勸農勉人仲夏班馬政聚百藥季夏行水殺草糞田疇羙土疆土工集作功兵事不作孟秋納材葦仲秋勸人種麥季秋休百工人皆入室具衣裘舉五糓之要合秩芻養犧牲趨人収歛務蓄莱伐薪為炭孟冬築城郭穿竇窖脩囷倉謹盖藏農以休息之収水澤之賦仲冬伐木取竹箭季冬講武習射御出五糓種計耦耕具田噐合諸侯制百縣輕重之法貢賦之數斯固俟時而行之所謂敬授人時者也其餘郊廟百祀亦古之遺典不可以廢使古之為政者非春無以布徳和令行慶施惠養㓜少省囹圄賜貧窮禮賢者非夏無以賛傑俊遂賢良舉長大行爵出禄斷薄刑决小罪節嗜欲靜百官非秋無以選士勵兵任有功誅暴慢明好惡脩法制養衰老申嚴百刑斬殺必當非冬無以賞死事恤孤寡舉阿黨易闗市來商旅審門閭正貴戚近習罷官之無事者去噐之無用者則其闕政亦以繁矣斯固不俟時而行之者也變天之道絶地之理亂人之紀舍孟春則可以有事乎作滛巧以蕩上心舍季春則可以為之者乎夫如是内不可以納於君心外不可以施於人事勿書之可也又曰反時令則有飄風暴雨霜雪水潦大旱沉隂氛霧寒暖之氣大疫風欬􅍠嚏虐集作瘧寒疥癘之疾螟蝗五糓𤓰匏果實不成蓬蒿藜莠並興之異女災胎夭傷水火之訛冦戎來入相掠兵革並起道路不通邊境不寧土地分裂四鄙入保流亡遷徙之變若是者特瞽史之語非出於聖人者也然則夏后周公之典逸矣時令論下或者曰月令之作所以為君人者法也盖非為聰明睿智者為之将慮後代有昏昧傲誕而肆于人上忽先王之典舉而廢之近而取之若陳隋之季是也故取仁義禮智信之事附于時令俾時至而有以發之也不為之時将因循放蕩而皆無其意焉爾於是又為之言五行之反戾相盪相摩妖災之說以震動于厥心古之所以防昏亂之術也今子發而揚之使前人之奥秘布露顯明則後之人而又何憚耶曰聖人之為教立中道以示于後曰仁曰義曰禮曰智曰信謂之五常言可以常行一有之字者也防昏亂之術為之勤勤然書于集作於方册興亡治亂之道永守是而不去也未聞其威之以怪而使之時而為善所以滋其怠傲而忘理也語怪而威之所以熾其昬邪滛惑而為禱禳厭勝鬼怪之事以大亂于人也且吾子以為畏冊書之多孰與畏人之言使諤諤者言仁義利害焯乎列于其前而猶不悟奚暇顧月令哉是故聖人為大經以存其直道将以遺後世之君臣必言其中正而去其竒衺其有嚚然而不顧者雖聖人復生無如之何又何冊書之有若陳隋之季暴戾滛放則無不為矣求之二史豈有復行月令之事者乎然而其臣有勁悍者争而與之言先王之道猶十百而一遂焉然則月令之無益於陳隋亦明矣立大中去大惑捨是而曰聖人之道吾未之信也用吾子之說罪我者雖窮萬世吾無憾焉耳時論牛希濟或曰治亂者天之常也是以十年一小變三十年一大變至於蟲蝗疫癘水旱兵革皆時之數也若其聖人亦不能克疑作免是不然也何者天之於人也至仁而信其資長百糓草木觸類之物皆所以仁於人也故懼物之不生也春以發之物之不成也夏以長之物之不齊也秋以肅之物之不實也冬以堅之物在陽畏其暵也故夜降雨露以潤之在隂畏其終也故伏陽以蓄之人之不之止也故晦明以息之人之不之時也故馳疑時以警之日月星辰雷電風雨霜露之作無不私於人也焉有為蟲蝗之時以害其禾稼為水旱之時以蕩其生物為疫癘之時以毒其性命為兵革之時以流其脂膏者上天垂象昭鑑萬物之情始兆高明之象已著未嘗不丁寧先視之於人俾知者通其變而脩其徳以為之防知而不脩夫何言哉聖人所以觀乎天文以察其變又曰先天而天不違後天而奉天時又曰則天之明斯其㫖也故天子有日官諸侯有日御皆所以達變於其君若聞祥而逸福必為禍必疑禍而懼祲益為善而疑無必定之災桑糓乃中興之道數無可保之福鳥雀為滅亡之運其或有戰争水旱災沴之世皆生民之所感曽無時日之限而及之也且民之所為也繫時君之教化若以忠孝恭儉為治皆可封也暴亂聲色為好皆可誅也居時之和為可誅之教上帝之仁且不能祐膺時之亂為求治之具神明之力必可以恕或者曰三皇之世不能無戰爭堯湯之君不能無水旱豈聖徳有闕歟盖時使之然也夫戰之大者孰踰於版泉不周之後人謀之可與乎兵力之可支乎卒滅於有徳水旱之數豈過於堯湯之代人無饑色國有常嵗若今之世一年之水一年之旱豈惟人不粒食國無儲矣焉能感治水之命有疏鑿之功為桑林之牲契禱祈之願若時數之必然即當數足而後已豈復有中救之道是知天時不能違於聖徳明矣至於長史為一郡一邑之政飛蝗尚不入其境醫門以藥劑之和可以拒時之疾又若時數之一槩寧有擇其地而遺其人哉况宋景一言之善罰星退舍漢之盛徳日馭再中其餘感應之跡布在方冊是以知天道甚逺人事至近又易以疑衍履之說曰素履貞吉幽人之貞所履若吉幽人尚且不懼况聖人乎希濟以為治亂無時為人君所行求治則治忘理則亂雖復求治積年一日違之禍不旋踵國亦如之皆非拘忌之家所能執必矣文苑英華巻七百五十
