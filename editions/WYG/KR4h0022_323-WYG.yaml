body:
  text: 文苑英華巻三百二十三宋李昉等編花木三山花二首刺桐花五首看花四首惜花七首殘花二首雜花二十五首栁花三十二首山花山花錢起山花照塢復燒溪樹樹枝枝盡可迷野客未來枝畔立流鶯已向樹邊啼従容只是愁風起眷戀常須向日西别有妖妍勝桃李攀來折去亦成蹊向日類詩作到日題友人山花方干平明方盡坼集作笑盡為得好風吹不見移來日先愁花去時濃香薫疊葉繁朶壓卑類聚作欹枝來集作坐看皆終夕遊蜂似集作自有期刺桐泉州刺桐花詠五首兼呈趙使君陳陶海曲春深滿郡霞越人多種刺桐花可憐虎竹西樓色錦帳三千阿母家二石氏金園無此艷南都舊賦乏靈材只因赤帝宫中樹丹鳯新銜出世來三猗猗小艷夾通衢晴日薫風笑越姝只是紅芳移不得刺桐屏障滿中都四不勝攀折悵年華紅樹南看見海崖故國春風歸去盡何人堪寄一枝花五赤帝常詩選作嘗聞海上遊三千幢葢擁炎州今來樹似離宮色紅翠斜欹詩選作欹斜十二樓看花韋員外東齋看花李端入花凡幾歩此樹獨相留發艷紅枝合垂烟緑水幽併開偏覺好未落已看愁一到芳菲下空貽兩鬢秋夏日裴尹員外西齋看花楊巨源笑向東一作南來客看花枉在前始知清夏月更勝艷陽天露濕呈粧汗風吹畏火燃蔥蘢和葉盛爛熳壓枝鮮紅彩當鈐閣清香到玉筵蝶棲驚曙色鶯語滯一作殢晴烟得地殊堪賞過時倍覺妍芳非遲最好唯是謝家憐共友人看花羅鄴愁将百一作萬里身來伴看花人何事獨惆悵故園還又春看花前人花開只恐看花遲看了愁多詩選作如未看時家在楚鄉身在蜀一年春色負歸期惜花惜花吟鮑君徽枝上花花下人可憐顔色俱青春昨日看花花灼灼今朝看花花欲落不如盡此花下歡莫待春風總吹却鶯歌蝶舞韶光長紅爐煮名松花香粧成罷吟恣遊後獨把芳枝歸洞房山中惜花王建忽看花漸稀罪過酒醒遲尋覓風來處驚悵夜落時遊絲纒故蘂宿葉守空枝開取當軒地年年樹底期惜花于鵠夜來花落盡偏惜兩三枝早起尋稀處閒眠記落時蘂焦蜂自散􅎞折蝶還稀攀看殷勤别明年更有期荆南陪楚尚書惜落花前人老大看花常不足沿江尋得一枝紅黄昏人散東風起吹落誰家明月中惜落花白居易夜來風雨急無復舊花林枝上三分落園中一寸深日斜啼鳥思春盡老人心莫怪添盃飲情多酒不禁惜落花贈崔二十四前人漠漠紛紛不柰何狂風急雨兩相和晩來悵望君知否枝上稀踈地上多惜花前人可憐夭集作妍艷正當時剛被狂風一夜吹今日流鶯來舊處百般言語泥集作啼空枝殘花翫殘花楊發十月穠芳一嵗程東風初急眼偏明低枝似泥幽人醉莫道無情似有情殘花前人已嘆良時晩仍悲别酒催暖芳隨日薄殘集作輕片逐風迴黛歛愁歌扇粧紅集作殘泣鏡臺繁隂莫矜􅃷終是共塵埃雜花夏日崔中丞宅見海紅摇落後一花獨開前人何事一花殘閒庭百草闌緑滋經雨發紅艷隔林看竟日餘香在過時獨秀難共憐芳意晩秋露未須團集作漙茙葵花歌劉眘虚附見岑參集昨日一花開今日一花開今日花正好昨日花已老人生不得長集作恒少年莫惜床頭沽酒錢有錢向酒家君不見茙葵花雲陽寺詠石竹花司空曙一自幽山别相逄此寺中髙低俱出集作有葉深淺不分叢野蝶難争白庭榴暗讓紅誰憐芳最久春露到秋風同耿緯司空曙二拾遺詠韋貟外東齋花樹盧綸緑砌紅花樹狂風獨未吹光中如有熖宻處似無枝鳥動香重發人愁影屢移今朝數片落為報貟外知花一字至七字張南史花花深淺芬葩凝為雪錯為霞鶯和蝶到苑占宫遮已迷金谷路頻駐玉人車芳草欲陵芳樹東家半落西家願得春風相伴去一攀一折向天涯花戴叔倫花發炎景中芳春獨能久因風任開落向日無先後若待秋霜來蘭蓀共何有宫苑花集作宫怨李益露濕晴花春殿香月明歌吹在昭陽似将海水添宫漏共滴長門一夜長此篇集以宫怨為題語亦相應今英華作宫苑花入此門恐誤與李文仲秀才同賦泛酒花詩楊巨源若道春無頼飛花合逐風巧知人意裡觧入酒杯中香濕勝含露光摇似泛空請君廻首看一作醉眼幾片舞芳叢題花樹楊巨源都無看花意偶到樹邊來可憐枝上色一一為愁開槿前人自用金錢買槿栽二年方始一花開憐紅未許家一作佳人見蝴蝶争知早到來同友人尋澗花白居易聞有澗底花買得村中酒與君來較遲已逄摇落後臨觴有遺恨悵望空溪口記取花發時期君重携手我生日日老春色年年有且作來嵗期不知身健否東坡種花二首前人持錢買花樹城東坡上栽但購有花者不限桃李集作杏梅百果参雜種千枝次第開天時有早晩地方無髙低紅者霞艷艷白者雪皚皚遊蜂遂不去好鳥亦棲來前有長流水下有小平䑓時拂䑓上石一舉風前盃花枝䕃我頭花蘂入集作落我懐獨酌復獨詠不覺日平西巴俗不愛花竟春無人來唯此醉太守盡日不能廻二東坡春向暮樹下今何如漠漠花落盡翳翳葉生初集作初舒毎日領僮僕荷鋤仍鑿集作决渠剗土壅其本引泉溉其枯小樹低數尺大樹長丈餘封植來幾時髙下齊扶䟽養樹既如此養民亦何殊将欲茂枝葉必先救根株云何救根株勸農均賦租云何茂枝葉省事寛刑書移此為郡政庶幾民集作毗俗蘇山枇杷花前人深山老去惜年華况對東溪野枇杷火樹風來翻絳熖瓊枝日出曬紅紗廻看桃李都無色映得芙蓉不是花争奈結根深石底無因移得到人家贈僧院花前人欲悟色空為佛事故栽芳樹在僧家細看便是華嚴偈方便風開智慧花長安花聶夷中種花滿西集作田園花發青樓道花下一禾生去之為惡草晩春花項斯見百家詩選隂洞日光薄花開不及時當春無半樹經晩足空枝䟽與香風㑹細将泉影移此中人到少開盡幾人知苦練花温庭筠院裏鶯歌歇墻頭舞蝶孤天香薰羽葆宫紫暈流蘇晻曖迷青𤨏氤氲向畵圖只應春惜别留與博山爐蓼花鄭谷蔟蔟復悠悠年年拂漫流差池伴黄菊冷淡過清秋晩帯鳴蛩一作蟲急寒藏宿鷺愁故溪歸不得憑仗繫漁舟水林檎花前人一露一朝新簾櫳曉景分艷和蜂蝶動香帯管絃聞笑擬春無力粧穠集作濃酒漸醺直疑風雨集作起夜飛去替行雲槐花前人毶毶金蘂撲晴空舉子魂驚落照中今日老郎猶有恨昔年相虐十秋風歎花崔塗遲遲傍曉隂昨夜色猶深畢竟榮湏落堪悲古與今明年何處見盡日此時心蜂蝶無情極殘香更不尋贈花李羣玉酒為看花醖花湏趂酒紅嗔集作莫令芳樹晩使我緑罇空金谷園無主仙源路不通縱非乗酒興集作露折長短盡隨風對花秦韜玉長與韶光暗有期可憐蜂蝶即詩選作却先知誰家促席臨低樹何處横釵戴詩選作帯小枝麗日多情宜詩選作疑曲照和風得路合偏吹向人雖道渾無語幾勸王孫到醉時庭花羅隠昨日芳艷濃開罇幾同醉今朝風雨惡惆悵人生事南威病不起西子老兼至向晩寂無人相偎墮紅淚栁詠雲陽樓簷栁梁元帝楊栁非花樹依樓自覺春枝邊通粉色隙裏映紅巾帯日交簾影因吹掃席塵拂簷應有意偏宜桃李人栁吳均細栁生堂北長風發鴈門秋霜常振葉春露詎濡根朝作離蟬宇暮成宿鳥園不為君所愛摧折當何言垂栁映斜溪張正見千仞青溪險三陽弱栁垂葉細臨湍合根空帯石危風翻夾浦絮雨濯向流枝不分梅花落還同横笛吹敬和衞尉于卿栁杜之松漢将本屯營遼河有戍城大夫曾取姓先生曽得名髙枝拂逺鴈踈影度遥星不辭攀折苦為入管絃聲春池栁唐太宗見初學記年栁變池䑓隋堤曲直廻逐浪絲隂去迎風帯影來踈黄一鳴哢半翠幾眉開縈雪臨春岸参差間早梅栁許景元春色東來度渭橋青門垂栁百千條垂疑作長楊西連建章路漢家枝苑紛無數榮花始遍合歡真一作宫遊絲半罥相思樹春樓初日照南隅柔條垂緑掃金鋪寳釵新梳倭墮髻錦帯交垂連理襦自憐栁塞淹戎幕銀燭長啼愁夢着芳樹朝催玉管新春風夜染羅衣薄城頭楊栁已如絲今年花落去年時折芳逺寄相思曲為惜榮華難再持題河邉枯栁王泠然隋家天子憶揚州厭坐深宫傍海遊穿地鑿山開御路鳴笳疊鼔泛春流流從鞏北河分口直到淮南種官栁功成力盡人族亾運謝年移樹空有當時彩女侍君王帳殿旌門對栁行青葉交垂連幔色白花飛散染衣香今日摧殘何用道數里曽無一株好驛騎江帆損更多山精野魅藏應老凉秋九月露為霜日夜孤舟入帝鄉河畔時時聞一作時間有落木客中無箇不霑裳栁絮張氏吉中孚妻靄靄芳春朝雪絮起青條或值花同舞不因風自飄過罇浮緑醑拂幌綴紅綃那用持愁翫春懐不自聊庭栁姚係裊裊栁楊枝當軒雜珮垂交隂總共宻分條各自宜因依似永久類詩作夕攬結更傷離愛此陽春色秋風莫遽吹賦得灞岸栁留辭鄭員外楊巨源楊栁􅅤烟灞岸春年年攀折為行人好風儻借低枝便莫遣青絲掃路塵楊花落前人北斗南囘春物老紅英落盡緑尚早韶風澹蕩無所依偏惜垂楊作春好此時可憐楊栁花榮盈艶曳滿人家人家女兒出羅幙静掃玉庭待花落寳環纎手捧更飛翠羽輕裾承不着歴歴瑶琴舞金陳菲紅拂黛憐玉人東園桃李芳已歇獨有楊花嬌暮春勤政樓西老栁白居易半朽臨風樹多情立馬人開元一株栁長慶二年春雨中題衰栁前人濕屈青條折寒飄黄葉多不知秋雨意更遣欲如何楊栁枝詞前人陶令門前四五樹亞夫營裡百千條何似東都正二月黄金枝暎洛陽橋栁二首李紳千條楊類詩作垂栁拂金絲日暖牽風葉學眉愁見花狂飛類詩作飛狂不定還同輕薄五陵兒二陶令門前欲接籬亞夫營裡拂朱旗人事推移無舊物年年春至緑垂絲同前杜牧日落水流西復東春光不盡栁何竆巫娥廟裡低􅅤雨宋玉宅類詩作門前斜帯風不嫌類詩作将榆莢共争翠深感杏類詩作􅀷與桃花相暎紅灞上漢南千萬樹幾人遊宦别離中同前温庭筠楊栁千條拂面絲緑烟金穗不勝移集作吹香隨静婉歌塵起影伴嬌饒舞袖垂羌管一聲何處曲流鶯百囀最髙枝千門九陌花如雪飛過宫墻兩不集作自知同前二首李商隠動春何限葉撼曉幾多枝觧有相思否應無不舞時絮飛藏皓蝶帯弱露黄鸝傾國宜通體誰家集作來獨賞眉以下三篇並見集本二為有橋邊拂面香何曽自敢占流光後庭玉樹承恩澤不信年華有斷腸謔栁前人已帯黄金縷仍飛白玉花長時湏拂馬宻處少藏鵶眉細從他歛腰輕莫自斜瑇梁誰道好偏擬暎盧家評栁薛逢弱植驚風急自傷暮來翻遣思悠揚曽飄綺陌隨髙下敢拂朱欄競短長縈砌乍飛還乍舞撲池如雪又如霜莫令岐路頻攀折漸擬垂隂到畵堂栁絮薛陶二月楊花輕復㣲春風飄蕩一作蕩漾惹人衣他家本是無情物一向南飛又北飛新栁薛能輕輕湏重不湏輕衆木難成獨早成柔性定勝剛性立一枝還引萬枝生天鍾和氣元無力時遇風光别有情誰道少逄知已用将軍因此建雄名詠栁花前人浮生失意頻起絮又飄淪發自誰家樹飛來獨院春朝容榮斷砌晴影過諸鄰亂掩空中蝶還一作繁衝陌上人隨波應到海霑雨或依塵㑹向慈恩日輕輕對此身栁韓琮折栁歌中得翠條逺移金殿種青霄上陽宮女呑聲送不忿先歸學舞腰同前韓喜類詩作溉雪入青雲類詩作雪盡青門㺯影㣲暖風遲日早鶯歸如憑細葉留春色湏把長條繫落暉彭澤有情還欝欝隋堤無主自類詩作亦依依世間惹恨偏饒此可是行人折贈稀同前方干摇曳惹風吹臨堤軟勝絲態濃誰為類詩作觧識力弱自難持學舞枝翻袖呈粧葉展眉如何一攀折懐友又題詩同前鄭谷半烟半雨溪集作江橋畔映杏映桃山路中㑹得離人無限意千絲萬絮惹春風同前二首顧雲帯露􅅤烟處處垂綻黄摇緑嫩参差長堤未見風飄絮廣陌初憐日映絲斜傍畵筵偷舞態低臨粧閣學愁眉離亭不放到春暮折盡拂簷千萬枝二閒花野草總争新眉皺絲乾獨不勻乞取東風殘氣力莫教虚度一年春同前羅隠灞岸晴来送别頻相偎相倚不勝春自家飛絮猶無定争把長條絆得人文苑英華巻三百二十三
