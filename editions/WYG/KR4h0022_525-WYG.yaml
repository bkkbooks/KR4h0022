body:
  text: 文苑英華巻五百二十六宋李昉等編田農門二十道蜡饗不祀判三道授田判一道無溝樹判一道多田判一道工商食貨判二道射田判一道名田判三道列侯實封判一道井田判一道田中種樹判一道屯田官考績判一道修隄請種樹判一道秋雩判一道賑給判一道修耒耜判一道蜡饗不祀判嵗十二月有司行蜡饗不祀司嗇迎猫而祭之御史糾云古之君子使而必報對陸據窮隂殺節流嵗云暮將舉祀典必參故實無忘報本之始敬一作爰用伊耆之禮聚百物以饗息人大義為一日之蜡非賜能知瞻言所司是為之祭八神降止一國期集於焉觀徳必也知古迎猫無闕言除碩鼠之患司嗇不預且有若敖之餒雖祭能如在樂已吹豳而禮尚有疵人多歎魯有鬼或爽誣神若何事乃違經儻受嗤一作黜於草服國有報憲宜見繩於繡衣同前鄭岑大司徒以物地是事小宗伯以人神是圖我稼既同則田祖斯饗爾酒既㫖故嗇夫載馳堯典授時羲氏成於嵗職魯人將事宣父與於蜡賔二三有司是勤執亊奚不薦守自以速尤至如土反其澤之年水歸其壑之暮必合聚萬物而索饗焉欲使仁之深義之盡然後神不乏祀人亦報功今者所由實未敦古且藏氷以閟猶祭司寒何殞霜既成獨遺司嗇雖云迎猫而祭其如避馬有辭且以徳勤人豈三施而無報以庸食䑕將一祭而未忘况主稼則人食田惟獸棄人與獸雖祭何為如或不有是神無足稱者一作爾必也猶能為鬼不其餒而嗟乎主祠何其展事不如林放有問豈得季札無譏卒為漢儒尚見非於齊魯未乖周禮何謬居於滕薛御史執法愚所謂臧同前侯上卿恤祀惟聖頒官有典三冬索饗以蜡昭報日孚皇澤非木賜之知嵗勸農功首炎一作火帝之奠所司恪謹成式厥圖斯永豳詩土鼓且奏和音表貉昆蟲固茲咸秩雖田惡䑕之食在禮遵猫以迎豈可獨忘播時見遺司嗇伊耆氏之作葢不易然大宗伯之聽孰云能守御史以冠雄鐡柱糾繆是彰彼以口異金人餙詞猶費徒稱君子必報曷若明神處前古而强援使亦奚據請從白簡以奏彤廷授田判已見五百二十五巻敬括無溝樹判得甲掌亊所司劾無溝樹之固云任其財器何用勞人對庶官司局共為蕆事各守爾典無廢厥職苟政令之或乖將㑹計而焉取甲理從邦教位列遂師甸稍縣都宜分地域封疆􅅵畆不奪人時而乃闕四井之菑畬廢五溝之種藝女桑不樹見戴勝之徒飛夫田無征望竊脂而何啄既莫喜於田畯又非成於穡人尚阻農功孰供兵器焉見不勞而逸無業而居雖有愛人之詞難恕失官之罪多田判丁多買田至四百頃極膏腴上賈他財物稱是御史糾之云天恩數加賞賜不是贓賄對丁家類封君田成永業是稱近甸亦曰膏腴資貨乃兼於中人沃野自登於上賈義殊不穡頗謂多藏道則惡盈志何自滿必也徳均洙泗學究典墳專經述鄭𤣥之風精義盡丘明之奥學優則仕道尊為師類張禹之置田殊蕭何之遺子况稱恩命豈等平人御史繩之終難糾結工商食貨判得乙為縣令授田不均科之訴云工食功商食貨田故少對三壤異宜四人差給用懲末作示禁滛利乙任當撫字能率典禮以為播植務農實粢盛之備貿遷變業非禮節之本遂用均其利役别以等差類農家之一夫視工商之五口詳夫周禮則異井田之制稽諸漢志是同平土之法兾以無而易有期彼竭而我盈各適所宜足見人而無黨不相僣奪可謂政之有經誠徃訴之有孚將議刑而奚據同前李覿給受有數田畆則差何患不均是亦為政顧惟彼乙親物為務則三壤之典平四人之利以為用貧求富猶或慕於工商化有遷無詎均勞於藨蓘聿修稼政式贍農人㒺愆五口之商俾齊三倍之賈兾使通財易有資殖貨以藩身寒耕熱耘望豐年而潤屋不均致訟且曰未孚罪欲加之今有辭矣射田判或人於京兆府射䕃田對三秦奥壤陸海良田原隰條分溝塍脉散涇渭傍潤鄭白䟽流荷鍤成雲决渠降雨秔稻漠漠黍稷油油無爽蟬鳴之期有至鳯冠之稔其地則上厥價惟一作彌髙凖丁而請則無妨廢據勲來射交爽事宜理既不通地湏追奪名田判乙為列侯名田縣道有司糾云既違新制請沒入縣官乙訴云雖已受封實未之國不伏對李丹捨爵䇿勲必由舉徳撫封胙土皆以報功苟薄厚之失宜在短長而何據乙之所賞是曰通侯皆受名田享其生禄權立四夷之制不殊五等之差經界本出於有司賦稅不闕於主一作之國未知所過徒肆薄言寧虧采地之名以益王官之邑宰之所理事或不然同前韋建錫社啟土開國建侯惟彼占田制無踰等瞻言縣道未可裂封乙實無良不能幅利慙晏嬰之辭邑雖謝能賢非丞相之出闗未宜加罪必也異蕭何之窮僻同王立之占求則漢典可遵殷鑒斯在待於閲實方正爰書同前杜萬庸功制爵以國俾侯司勲是職太常是紀錫周官之彛器分漢家之茅土古之成憲今也則殊乙之所封義符分陜介珪入覲盛君子之威容家田無征備優賢之榮寵何縣道之為僣宜有司之見劾徒用多言是為害政列侯實封判得甲為列侯以名田縣道所由以違新制合没官訴云雖已受封實未之國不伏仰處分對五等䟽封三壤咸則其於疆里各有區分甲忝居列侯且未之國威儀有翼雖委質於清朝日月其除終望嵗於嘉糓爰在芃野是用占田將植油油之苗冀獲芃芃之稼未侵侯甸之服且近蠻夷之郊於典章而莫違取縣道而何害所由未詳漢制恐奪齊人將欲入官無寧非法井田判得縣申嵗十月入人里胥使婦人相從夜績毎月課四十五功聽其歌詠行人善之徇於路按察禁之太師以失職致詞對元稹天廽地旋陽生隂息玉衡指孟冬之野促績鳴寒金昴臨短景之昏厥人當燠相彼同色疑作邑懋哉惟時戒坐塾之里胥稽其既入率同巷之衆婦績以相從素緒霜梁共紛如於永漏紅光炎上俱省費於餘輝夜兼功以日多日存課而年最若亷叔之勸蜀襦袴興謳類古公之居豳茅綯斯誦故令風俗翕習家室乃宜有未得其所然或心傷而發詠則摽梅求吉編王化之音采芑懐征列雅章之内行人掌乎宣布載在搜揚得詠言於此邦將遐徇以遒邁太師典樂允被克諧之恭按察觀風何為失職之禁先王制法寧罰有詞田中種樹判乙於田中種樹隣長責其妨五糓乙乃不伏漢書食貨志種糓必雜五糓以備災傷田中不得有樹用妨五穀力耕數耘收穫如冦盗之至環志作還廬樹桑云云對百草麗地在物雖佳五稼用天於人尤急乙姑勤樹事頗害農收列植有昧於環廬播穡遂妨於終畆雖椅桐梓漆或備梓人之材而黍稷稻粱宜先后稷之穡茍虧冐隴焉用成蹊縱有念於息隂豈可侔於望嵗植之塲圃合奉周官置在田疇殊乖漢制既難償責無或順非屯田官考績判戊為營田使申屯田官考課違常限省司不收辭云待農亊畢方知殿最對要㑹有期誠宜獻狀籍歛未入何以稽功戊也將俟農收方明績用三時㒺害然有别於耗登五稼未終安可議其誅賞當從責實寧俾課虚苟欲考於嵗成姑合畢其田事雖賢能是獻比要宜及於計偕而稼穡其難收功當俟於協入詳徴著令固有常規農扈之政不乖蘭省之非斯在修隄請種樹判乙修隄畢復請種樹功價有司以為不急之務乙固請營繕令諸侯水隄内不得造小隄及人居其隄内外各五歩并隄上種榆柳雜樹若隄内窄狹地種擬充隄堰之用對善防既畢固合程功柔木載施亦將補敗丁之亟請誰謂􅂈求隠椎之役雖終列樹之思尚切有司見阻無備實難苟恡養材之資葢非長利逺求為揵之用豈不重勞當有取於繕完顧何煩於藝植且十年可待五歩足徴防在未萌著之先甲因而致用庶無瓠子之災言之不從恐類匏瓜之繫秋雩判得丙為宰秋雩刺史責其非時辭云旱甚若不雩恐為災對白居易居常授時政則行古恤人救弊道在從宜旱將害於粢盛雩難拘於夏景象雷是職不雨其憂苟旱魃之愆時虐既太甚雖蓐收之戒序雩亦何傷冀有聞於鸛鳴庻無慮於狼顧馨香以一作有感夕且望於月離稼穡其傷時難遵於龍見雖事乖魯史而義合隨時製錦執言是亦為政褰帷致詰未可與權賑給判得丁為郡嵗凶奏請賑給百姓制未下而集無而字散之本使科其專命丁云恐其集無其字人困對臨邦賑乏情本由𠂻為國救災美終歸上丁分條出守求瘼居心嵗不順成人既憂於二鬴公有滯積戸將餼以集作於一鍾是輸濟種之成允叶分憂之政然以事雖上請恩未下流稍違主守之文遽見職司之舉使以未有君命何其速歟郡以苟利國家專之可也恤貧振廪鄧攸雖見免官矯制發倉汲黯不聞獲罪請宥自專之過用旌共理之心修耒耜判得甲為邠州刺史正月令人修耒耜亷使責其失農候訴云邠地寒對教有權節業無易宜地苟異於寒温農則殊其早晩甲分憂率職從俗勉人天時有常農宜先定地氣不類寒則晩成雖愆揉木之時未違把草之候正唯亷使何昧遺風縱稼噐之已修先成焉用苟土膏之不起欲速何為誠宜嘉乃辨方豈可詰其行古稽諸吕集作周禮修耒雖在於季冬訓比豳人于耜未乖於正月責則迂也訴之宜哉文苑英華巻五百二十六
