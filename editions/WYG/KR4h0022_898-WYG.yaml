body:
  text: 文苑英華巻八百九十九宋李昉等編職官七贈秘書監李少康碑一首殿中監張九臯碑一首少府監胡珦碑一首司農卿劉公碑一首贈太常卿韋縝碑一首故睢陽太守贈秘書監李公神道碑獨孤及漢家之建侯親親也以荆燕吳楚為首封而後嗣多材世濟厥美辟强路叔更生子駿比肩而首集無首字出慶鍾故也唐有天下肺腑是依有若江夏淮安河間東平以明畧茂勲左右大業其休德粹氣降為百祥公子公孫或哲或仁勤勞王家焜燿國牒從東平三葉後生睢陽言春秋者謂公族多士與炎漢侔矣公諱少康字某太祖髙皇帝五代孫也太祖生雍王繪繪繪字集作雍王生東平王紹紹紹字集作東平王生髙平王道立道立二字集作髙平王生畢公景淑初畢公娶于太常京兆韋萬石女有才子三人伯曰孟康恭敬直温謙光不燿官至太子左賛善大夫仲曰仲康𢎞毅宻重文敏貞諒由尚書主客郎中剖符楚州楚人到于今由其教而思其躅公楚州之母弟也纂二昭二穆為修二字集作愼身之烈允集無允字迪元方季方為裕蠱之範家貽其謀天終其休故畜為和氣播為盛德年始孩而畢公捐舘七嵗受孝經至喪親章捧書孺慕哀哽不食鄰里集作伍長㓜為之涕泗既冠遭太夫人棄敬集作孝養毁集作苴貌茹毒泣血無聲者三年自是孝稱親集作郷黨名冠宗室㑹垂拱永昌已後天下有鷰啄集作喙非之譖集作謡七廟支庻不絶若綫公正志蒙難危行全德貞厲二十年以俟道長中興後乃筮仕由朝邑縣尉凡七徙官至尚書祠部郎中以大府司集作上佐授潞州司馬用集作因考績彰聞㧞為青州刺史于時海岱貢篚衣履天下俗尚夸侈吏務豪奢集作奪公以德禮示法度以誅賞禁滛怠宣明教化餙行尊師集作餙行帥先使刺繡倚市者悉反耕織於是貪者㢘善者勸海濵之俗變至鄒魯按察使户部郎中宋遥以狀聞璽書褒異遷公于集作於常州賜一子出身常之吏民望公風聲其苛詭集作竒衺僣濫者觧印綬自去比及下車無為而人和復以髙第擢拜徐州刺史先是嵗比大旱集作歉人流者什五六公條奏逋逃之名削去其版然後節用務本薄征緩刑以來之嵗則大穰人不患寡浮墮集作游自占者至數千萬優詔嘉美集作歎賜帛二百疋𤣥宗天寳二字集作後元年改宋州為睢陽郡命公為太守淮湖漕輓刀布輻輳萬商射利姦之所由聚也公謂非勝之艱安之惟艱故峻其侵漁之令𢎞其并容之仁吏或不㢘不恪不惠不迪糾之詰之必誠必信誠信不欺故獄市不擾獄市不擾故集無此五字閭里集作井輯睦由是飲公純固之德者如餒者得哺寒者得纊有司方将計課以聞天不惠於宋乃崇降厲疾三年春賜告歸洛陽是嵗十二月丙午薨春秋六十有四宗室悽欷士友共悲集作失圖宋徐之人輟舂相言明年某月遷宅兆于京兆見子原先塋禮也公雅善屬辭有集二十巻晩節好集作住禪味耽道論嘗傳道德上下經五千言為之訓觧以究㣲㫖其為政貞方㢘靜明達端懿嚴不殘直不訐清不矯時善不狥名交友推誠好惡中節博見强志親仁愛士居儉集作險用晦遭時利往行藏之機與道屈伸未始以去就寵辱繫于懐三字集作瀆其出處而夀位未極其量也故休祐復集於後昆夫人某縣太君廣平程氏生元子曰涵以忠文孝讓儀刑玊室天子謂可内司九法外鎮百城大厯七年夏五月由尚書兵部侍郎為御史大夫蘇州刺史廵省江左邁德貽訓之所及也夫人沛國武氏以繼室生仲子汘季子集作汘弟濃皆卿集作公材而不幸早亡集作世某年月日朝廷建推恩之令追贈公秘書監大夫之孝達於祖禰也及嘗忝禮官之屬知王族集作侯之廟祧昭穆與功烈德善故受命于集作於大夫酌而為志著之樂石以代烝彝云敦叙九族聖風所始公生德門運叶麟趾王曰叔父髙陽才子纉乃祖服以集作似續介祉底績三署舊章孔修赤舄彤幨牧彼四州明照姦訛仁覆隠憂神罔時怨民斯緝集作輯柔民之不幸公夀不永王曰彼天匪憗俾屏仁浹鰥寡道在彛鼎臧孫有後遺烈煥炳殿中監張公神道碑公諱九臯其先范陽人也昔軒轅少子以弦弧受氏别封於張留侯以五代相韓安世以七葉榮漢特生間氣鍾美大賢餘慶遺芳襲于令嗣矣晋末以永嘉南渡遷于江表皇朝以因官樂土家于曲江髙祖守禮隋鍾離郡塗山令唐宰相世系表作丞曽祖君政皇朝韶州别駕祖胄皇朝越州剡縣令烈考𢎞愈皇朝太常卿廣州都督皆世濟明德不隕令名公特禀中和誕生淳懿恭惟色養孝自因心早嵗丁太常府君憂孺慕衘哀欒棘無怙毁能達禮志若成人及日月外除而顧復就養思致逮親之禄方求筮仕之階籯金不珍琢玉成器殖學以明道修身以踐言弱冠孝㢘登科始鴻漸也嶺南按察尚書裴伷先幕府求賢軺車問俗以公後進之秀籍以從車表授海豐郡司户水變貪泉珠還合浦時所稱也其後五溪阻兵郡蠻聚畧帝命按察使裴伷先討焉以公有罇爼之謀韜鈐之用奏授南康郡贛縣令於是坐其帷幄置以戎車公武能宣威文可化俗軍興倚辦供億無留前宣慰使梁勛奏公清白有聞後宣慰使竹承構奏公户口増益其稱尤異褒進上聞特加朝散大夫遷巴陵郡别駕初丞相曲江公則公之元昆自始安郡太守兼五府按察使以為越井殊方廣江剽俗懐柔之寄實在腹心奏公俱行可為内舉遂授南康郡别駕季弟九章亦為桂陽郡長史太夫人在堂賜告歸寧承歡伏臘白華共展於晨夕衣錦時入於鄉閭棣萼美於詩人德星聚於陳氏代所稀也無何丁於内艱柴毁㷀㷀勺飲不納至性聞於州里孝感達於神明白雀馴狎於倚廬黄犬號隨於行哭表其意也服闋除殿中丞又遷尚書職方郎中起草含香停車待漏位髙𤣥象職在彌綸及曲江公翊賛廟謀鹽梅鼎實講德論道求賢審官以職量通明與聞其議故能致君堯舜克濟忠貞公之佐也及元昆出牧荆鎮公亦隨貶外䑓遂歴安康淮安彭城睢陽四郡守所蒞之邦必聞其政作人父母為國循良於是瑞鵲成巢嘉禾合穎祥烏素翟而狎至焉考績議能詔書褒異遂遷襄陽郡太守兼山南東道採訪處置使以聮率之權授以澄清之任化行江漢惠及黎民進封南康縣開國男賞有功也属南夷不襲西蜀騷動掎角之勢連于嶺隅以公有經畧之才委公以干城之任乃除南海太守兼五府節度經畧採訪處置等使攝御史中丞賜紫金魚袋天書盈篋廐馬在庭恩華寵光旁午道路公召募敢勇繕治樓船綏懐逺人安輯獷俗或指劒山之路或出銅柱之鄉以廻舶運糧省汎舟之役以于一作子來授甲寛土著之人寄重務殷用省功倍天子嘉之特賜銀青光禄大夫兼手詔益封開國伯食邑七百户旌其能也且五府之人一都之㑹地包山洞境濶海壖異域殊鄉往來輻凑金貝惟錯齒革實繁雖言語不通而贄幣交致公禁其豪奪招彼貿遷逺人如歸飲其信矣秩滿遷殿中監皇輿盡飾玉食惟精六尚委能一心主辦服御器用必信必誠勤勞不遑積憂成痗以天寳十四載四月二十日疾亟薨于西京常樂里之私第春秋六十有六嗚呼哀哉哲人其萎邦國殄矣皇上哀悼賵贈盈門給遞還鄉首丘歸本遂贈廣陵郡大都督府長史禮儀哀制延素握髪可謂飾終以明年葬于始興郡洪義里武陵原夫人𢎞農譚氏襄陽郡夫人國子博士知幾之子克訓母儀用光閫則粤以永泰三年薨南康郡次以大厯四年合祔焉禮也嗣子十一人長曰捷唐宰相世系表作撩前端州刺史次曰權世系表作擢前右金吾衛兵曹叅軍次曰撝試大理司直康州刺史次曰柷世系表作抗檢校户部郎中兼御史中丞賜紫金魚袋朔方邠寧節度行軍司馬次曰桿世系表作捍前𢎞文生皆王之藎臣國之多士令德之後必大其門公嘗與季弟同泛滄溟舳艫艅艎凡數百軰忽驚飈震發駭浪山連當呀呷之時謂汨没同盡為猿為鶴曷可保焉而中宵還風漂泊孤嶼遲明相視各在津亭同役之人僅有存者則知商丘蹈信入之而不傷吕梁履忠㳺之而莫惴愷悌君子福履綏之宜其克享永年亦既逢吉且公之立身可謂盡美居喪致哀稱其孝也入幕决勝稱其才也列在藩翰則德化之政聞授之斧鉞則式遏之功著佐元昆則潤色王業睦諸季則致美閨門至於推挽忠良揄揚俊乂力行不怠時議髙之夫死生有涯古今同盡殁而不朽君子韙之昕忝跡儒林嘗讀舊史覽賢人之事業知盛德之在焉敢揚休聲以誌貞石銘曰軒轅錫羡百代蕃昌弦弧得姓受邑于張五代相韓七貂居漢平子數術茂先翊賛誕鍾餘慶克享大名爰至我公天姿挺生率禮立身依仁從政學該百氏官踰三命再登幕府四列藩條威行節制化洽謳謡作牧襄陽受兵南越江漢底定要荒胥悦死生有命修短靡長禮贈殊秩魂歸故鄉松檟成列丘陵無改夏日冬夜精靈斯在少府監胡公神道碑韓愈少府監胡公者諱珦字潤博年七十九以官卒明年八集作七月十四日集無此三字葬京兆奉先一有縣字夫人天水趙氏祔焉其子逞迺廵遇述遷造與公婿廣文博士吳郡張籍以公之族出集有處文二字行治歴官夀年為書使人自京師南走八千里至閩南兩越之界上請為公銘刻之墓碑於潮州刺史韓愈曰胡姓本出安定後徙清河集疊清河二字於今為宗城屬貝州大父諱秀武后時以文材徴為麟䑓正字父宰臣用進士卒官平陽冀氏令贈潭州大都督公早孤能自勸蜀本作勤學立節槩非其身力不以衣食凡一試進士二即吏部選皆以文章占上第出集作樂注作所為儉勤自刻削不干人以矯時弊及為富平尉一府稱其斷决建中四年侍郎趙賛為度支使薦公為監察御史主餽給渭橋以東軍洗手奉職不以一錢假人賊平有司覈考郡吏多坐集有貶字死獨公以清苦能檢餙無漏失遷河南倉曹蜀本作督魏公賈耽以節鎮鄭滑以公佐觀察事檢校尚書工部員外郎以剛直齟齬不阿忤權貴除獻陵令居陵下七年市置田宅務種樹為業集有以字自給教授子弟貞元十一年吏部大選以公考選人藝學以勞遷奉先令以治辦集作辯遷尚書膳部郎中改坊州刺史州經亂無孔子廟公至則命築宫造祭器率博士生集作徒字講讀以時如法以祠人吏聚觀歎息遷舒州刺史州嵗大熟麥一莖數穗閭里歌舞之考功以聞遷尚書駕部郎中數以公事犯尚書李巽巽時主鹽鐡事富驕恃勢以語丞集作宰相由是退公為鳯翔少尹巽死遷少大理集注一有改少詹事四字元和十二年朝廷為集作以公年老能自祗力事職不懈可嘉拜少府監兼知内中尚明年以集有病字卒公始以進士孤身旅長安致官九卿為大家七子皆有學守女嫁名人年幾八十堅悍不衰事可傳載可謂成德銘曰朅朅胡公既果以集註作而方挾藝射科每發如望人求於人我已為之自始訖終不降色辭因官立事隨有可載發跡餽軍集作運遭讒府界去居陵下為吏為隠坊舒之政于兹有嘆杭本作靳守官駕部名昇以屈躋于少府甚宜秩物不配其有君子恥之少府古卿公優止之刻文碑石以顯公行維公集作彼後人無怠嗣慶司農卿劉公神道碑蘇頲君子之質則有文也君子之備則有武也藴其材而正直是與行其道而剛柔迭用經一作門立德所以不回稱詩為之立禮一作孔碩碩大之教四字一作故能聞於四海一作國人爵之美闕於百代受天之和疑作祐不其然歟公諱某字某彭城人也皇矣漢祖出自唐堯一作帝始則豢龍為事終而斷蛇著符非卯金而勿王書之甲令有盤石而命第布在方冊於昭慶靈誕發休緒有隋之接統也我曽祖諱某仕至晉州刺史左衛大将軍普安郡公我大父諱某仕至蔚州刺史襲普安郡公皇運之纂圖也我先君諱某仕至江王友上柱國襲普安公追贈陳州刺史者制連五之教以乂其邦攬韜鈐之英以和其衆從師友之訓以崇其術復公侯之業以載其名匪我先人保之孰能後嗣逹者公即陳之集作州府君之元子也純㓗浩素直專靜宻外象威儀内含光耀弗誦於非聖弗言於非法雖迹繫蕪室而心遊坦塗始有逺大之譽矣弱冠修文明經髙第觧褐趙王文學金門之賔就以强學瑇席之士來而好問遷荆州司户叅軍轉汾州孝義益州晉元二唐書地理誌作原之二令養能於掾吏大機未發從政於宰君中孚是用三人為師之地更成乎魏美四子講德之鄉益變乎夷俗以殊績遷左一作右衛長史佐其戎昭欽若軍令属永淳之嵗元元虧稔命公泛舟之役窮於恒一作海岱委公開倉之利濟於幽燕是寧邦本繄頼家給還擢拜朝散大夫遷原州都督府司馬仍統郡牧事西至崆峒之隅北經都盧之峽其人好武賡歌作詠彼乘有駜雅頌成章豫博之連謀也雖七國之勝一作福兵鋒憚於甚鋭而九州之雄地勢當其懸隔拜公為齊州長史以鎮之難平轉沂鄜二州諸軍事二州刺史令以條察風以化遷願冠者載穆其容贏鋤者罔矜其色連課第一遷将作監監字一作少匠尋加銀青光禄大夫司僕卿惟匠有卿考百工之最惟僕有正稱六官之長盖任能之選矣大聖天后崇清廟而尊祖建明堂而配帝作城洫而量土圭圖山川而鑄金鼎縮板以載之置筵以度之三旬以成之百物以備之獨任於公不􅄽厥㫖非􅀶而稽其禮省而精其事則曷能臻於此乎戎羯之縱暴也易之梯衝頗亡其楼堞魏之桑梓尤固於藩籬令公馳傳檢校魏州刺史以威之冦平召之猶領本職復加将作大匠長安東幸洛陽拜公為右衛将軍司農卿轉右金吾大将軍副京師留守出綜金革比上台之禮者四入司帑藏分洪範之政者一轉嗚呼三字疑以盛其義逋僦以清其緒由是採鄼侯之典因營宫室奏齊人之言即廽輿駕至則兼領右一作左羽林軍節愍之舉兵也讒臣構東朝之隙上将膺北門之重難無茍免謀無茍合君則有命若将援一作授於鼔旗士咸有約不可犯其介胄已而特授鎮軍大将軍封舒國公食邑三千户實封三百户賜以金帯衣物重拜司農卿賞厥誠也公以休咎由人動者悔之始盛衰自我息者機之先故在物害盈謙而受福及引年辭事老而得禮於是乞骸骨抗章疏者至于再三一作于再于三朝廷嘉而遂之矣四字一作之門列行馬室懸安車逺寓於汜右一作石近持於越寳閑心用晦物有自親啓足歸全神無所禱享年七十有七以景龍三年太嵗癸酉十二月十五日薨於長安光德里之私第天子輟朝以咨悼都人罷肆以傷惻齊之喪嬰鄭之亡産無以過也乃追贈持節都督兖州諸軍事兖州刺史降使吊祭賜錦衾襚服官給喪事京官六品一人監䕶太常考行諡曰貞夫忠者期於盡命孝者貴於立身義者厚於利物信者多於庇人猶五材行而不可闕五味足而不可廢則安夷險保明哲太社於是乎錫其風太常於是乎旌其事練識而言罔毁譽避榮而交非諂黷以温良恭儉之德知進退存亡之機然後指青門之路美賢於䟽廣登洪波之䑓長立一作泣於周舍於公得之矣粤某年月日葬于某所禮也美哉漢宫𢎞敞承明在其北秦嶺連属太白拒其南思上都之冠盖望先塋之碑表此又臣子之不忘也其孤衛尉少卿曰茂道羣紀為儔荀何句疑是則二世之業代仍其位三年之制喪過乎哀以為有初有終疇庸之道斯逺匪雕匪刻補一作稱是代之圖盖寡荒惟授旐菲也披文乃作銘曰炎漢之靈兮纂堯之德粤若介弟受封南國為侯為王休有其光四牡弈弈赤芾金舄降爾遐福兮邦之仁人昭爾懿行兮朝之藎臣我有忠烈兮以為之寳我有榮華兮何適非道躬清明兮翔廖廓佩金紫兮富圭爵日冉冉兮亟迴薄嵗峥嶸兮其摇落吾将追於祖䟽兮噫何為而葬霍龍山趾兮鳯城端青靄深兮白露漙混羣物以共盡兮揭之豐碑之是刋故朝議大夫中王府司馬上柱國贈太常卿韋公神道碑獨孤及楚元王傅後五世長孺相漢始自魯國徙家杜陵其後十六世孫景略仕魏為青州刺史青州生隋倉部侍郎南皮公瓉南皮公集無公字生三子皆才同時為郎長曰季武實居主爵次曰叔諧典司庫部季曰叔謙歴吏部考功時人號為三列宿考功生而知人以司庫員外郎為職方郎中自長孺至青州二丞相一侍中十一二千石自南皮至職方二葉五尚書郎集有為字世言官婚集作婚官者謂之郎官韋家楩柟瑶琨非崇山濬源不生故公侯卿大夫實鍾德門事業名聲與冠蓋俱四牡龍旂之慶百代彌熾盛矣哉公諱縝字某職方之仲子也忠廉無邪温直好禮用誠明博厚祗若祖考之訓雖顛沛不違仁非得之不茍求言足以成事濟衆行足以居易慎獨鄉舉經行吏部登賢能科集作校授秘書省校書郎親累免集作徒官再遷至亳州臨渙縣令寛信愷悌之政行乎千室朞年而頌聲興遷薛王府文學轉秘書郎王宫圖牒天禄典籍公皆以儒服叅焉藝文修而彛章叙歴佐濮徐仙三州清恪如一入為申王府司馬以逹才居陪臣之列𢎞道以奉職安義以直已諫從政肅繄忠亮是頼掌邦典者謂王門之治可移於公卿方議登之三府㑹􅆍疾終于位是嵗開元十二年嵗在甲子冬十月二十二日春秋若干夫人河南元氏益州唐安縣主簿知柔之女承先祖供祭祀之謂職慜集作閔勤勞勸以義之謂德荘敬恭順婉娩柔惠集作聽從之謂禮顧復勞瘁均養善訓之謂慈夫人兼有焉某年月春秋若干卒某年月日合葬于某原嗚呼才冝貴人冝夀世禄冝冨三者公夫人皆居其地不極集作臻其分鄉黨宗族以命不可説相弔焉唯明德必有後之言也信有若孟子幼成博見利器堅若金石集作鏗若金錫天寳十年自尚書兵部出守漢中兼山南西道採訪處置使移典河内人至于今頌之仲子㓜卿洛陽尉尉字集作縣丞叔子㓜竒宋州楚丘縣令季子幼章有貞幹宻識恭寛而明前後八執憲而再起草自武集作兵部郎中持節其泗楚二州錫金印紫綬咨以屯田入集無入字贍軍食如漢營平侯故事以言以立皆公之教訓也寳應二年春三月以子為大夫故詔追贈公太常卿君子謂公之義方慶及其身而楚州之孝誠格於宗祏禮也猶以為與物集作化俱者人事不我期者丘隴雖大宗小宗可詳諸姓氏之譜命官日時各存乎其集無其字屋壁之誌若遺直與故事非金石刻則無以示後世也繇是楚州稽首于廟見託譔德垂懿萬億孝思罔極其詞集作銘曰肅肅乃祖翼商屏周揔郡集作羣邦兮退傅間生疑扶陽重侯德功集作乃降兮龜組虎符黼衣彤弓世相付兮百代純嘏鍾仁於公德乃集作斯懋兮為邦三年足民知方政之臧兮校文石渠觀書魯堂志自强兮三佐列郡曳裾遊梁道未光兮已矣介福不充景行于嗟命兮一經之遺垂裕果盛哀榮並兮子子孫孫丕承忠敬荷餘慶兮文苑英華巻八百九十九
