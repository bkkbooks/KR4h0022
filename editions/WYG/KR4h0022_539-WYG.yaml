body:
  text: 文苑英華卷五百四十宋李昉等編鹵簿刻漏印鑑枕鈎門十三道差羊車判一道好長鳴判一道引漏水判一道得亡印判一道獲古鏡判一道斫街樹癭造枕判一道造削判一道削金判一道好鈎判一道皮判一道戒豐判一道私製九章判一道衣狸製判一道差羊車判丁被差羊車小吏辭曰籍小年髙對國章攸著人命是懸莫匪黎甿咸憑版籍設令齒貌則長其如名􅂾不踰二十朝之大夫既不登於鴈行十五府之小吏亦何取於羊車徒有訴於髙年終無補於兹日理宜小冠趨事短服駿奔陪晋后之行宫爰紆御女從衞君之過市長觀王人語事不闕於奉公論職豈卑於陳力過為辭費殊謂不然好長鳴判子弟好長鳴隣告是過聲對文物有章威儀以等式昭邦典將紏禮容鼜鼓戒宵發五通於神警金鉦節旅齊七歩於軍氣由是吹豳擊土載享原田奏角鳴鼙爰威疑鹵簿盖偏伍之為用誠子弟之能學籥章且誦古典猶施於樂言長鳴好為今日飜抵於隣告過聲本防於建國吹節何傷於習常肇此刑書終貽滅趾能拾功録過無或噬膚金矢尚艱鍰罰奚詰引漏水判得甲引漏水於衡渠之下乙告違法甲云是金龍口吐轉注入渠法司以為虛妄科不應為不伏對七曜成文二儀不測聖人造理璿衡有用為魯侯之金鐻脗合鬼神窺漢史之銅渾有探造化圭撮不謬玉節斯調晝夜必盡其䂓天地莫逃其筭登臺視朔覩雲物之必書拂琯移灰識權衡之有度惟甲名當典刻職在挈壺望朱鴈之在時見金龍之吐水雨霧時降波結霜盤之中晷刻相仍流泄衡渠之下在金徒之昧職徵玉典而可刑不應為而匪為甲無過也不應告而輙告乙有罪焉請從罰杖之科以明抱箭之士得亡印判丙拾得亡印而用科罪不伏對車書混同聖徳汪濊朝無刻印路不拾遺謫夫主司遂敢亡失靈龜廻顧疑曵尾於途中神散無依遽韜形於私室丙也行用實謂亂常湏寘霜科以懲日拙獲古鏡判甲遊嵩山獲古鏡文彩極異陳於縣縣宰因窺拏忽破甲訴闕進令科誣罔對君子効官豈輕舉措下民編户湏任指揮甲於維嵩得之古鏡宛轉盤龍自多符彩翩翻鳷鵲是懐納用先皇銅印宜照舞鸞旋臨玉掌坐如半月昔年挂竹應寵全形今日飜菱唯㸔碎影裂非因墜是則難誣破不原擊欲尤誰過一作尤誰過愆但空桑之理尚且移人歴陽之都猶聞化鼈况時經厯代固不可量物罕保常能無自損難為照膽理可緘心仍敢浮詞尚論闕進事同慙豕累匪厚顔何得牽迷公為嫁禍令科其妄終非慎罰斫街樹癭造枕判人有告木竒斫街樹癭云擬將造枕進金吾劾之對通衢四㑹竒樹衆欝布夏葉以成帷聳雲柯而似蓋日來月往鳥剥蟲穿或擁腫而不材未施功於匠石或輪囷而載癭疑見題於杜預相彼木竒心䂓草竊揮雪鋒而斯就抵霜簡而何逃事有可通情或宜恕按以刑典恐多違於獻芹原其情志夫何妨於進枕枕雖未造誠即可嘉伊此木竒造進生於意表欲伸芻議賞罰懵於愚衷請更研根以寛抑曲造削判丙居魯造削遷鄭而不良所由科罪訴云非地氣對聖人豐功明著能事作程無資於苦窳為度必禁於回邪俾夫粤鎛燕函人能為也宋斤魯削氣得良焉丙𨽻工人居肆事業鑪開夜火已流朱雀之輝竈發晨煙將視赤龍之術所以洗削之妙精竒於土風遷徙之殊理暌於分地鄭刀豈同於魯削難以厚誣周令將入於漢刑實乖中典觀乎獨斷未息群疑請寛書牘之辭謂審懸衡之要削金判甲為削金居其三或糾之曰欲新而無窮也不伏斷罪對精鋼既鍊噐用爰􅍯或賊斯一鼓或徵乎九金俾人興行其利則博瞻彼甲也居無異聞四人各業夙承於良冶百工居事史列於周官而運思無窮成能有則光如濯雪豈徒陽劍之竒思逸言泉遂入青編之用雖用之日乆若新發於硎妙符鉛錫之宜不假磨礱之助或人相糾深謂無稽而我有辭當從不濫好鈎判睦州刺史齊顗好鈎廣招巧工有能為鈎者賞金五鎰新安縣主簿錢本造鈎殺其二子釁之以致於顗從顗索賞顗不與云蓋是常鈎憑何索賞本乃抱鈎泣呼其子名鈎遂飛著父背刺史科妖妄罪不伏云有節疑作前聞對齊顗承榮梓闕作鎮桐廬化洽循良行聞棨㦸情惟竒古方欲好鈎未宣邵伯之風且效吳王之躅錢本雕鐫擅羙冶鑄標能盡思侔於宋弓窮神等於越劍纎形孕玉疑懸秦女之楼曲影分鈎不若任公之釣於斯殺子何謝燔妻既極巧工言邀重賞彼則識非辨物怪遼豕之從來此乃道渉幽通惜吳鴻之枉逝鍾心之痛纔結著背之應斯彰雖頻㑹於前聞終取驚於即事刺史學殊該博情懼妖訛莫酬呂相之金先寡疑陶公之璧初聞或疑孟浪當察理合推䋲何者䑛犢恩深將雛調切自可慕茲携劍聊追五月之歡豈得同彼釁鈎遽夭百年之命既虧天性湏寘霜科請歸叢棘之曹速按鞭桐之罪皮判鮑人恃財信之而枉一方急有司䋲其不任人云舉直錯諸枉者平急者正何患乎不任對周禮是視鮑人為韋樹之列司成乎致用在革則虎豹斯别為鞹乃犬羊不分眷也云時載理其職將以察其所以觀其所由引之而伸厚薄斯在信之而枉緩急自明或令雀弁之儀其服奚設鳥澗之政取佩寜堪非為合度之資招其不任之責將議其失猶或有辭稱使枉者能平當亦化惡為善更請閲實然定攸宜戒豐判施道安有誡豐人給之是不祥物遂命棄之因取以告縣對惡盈好謙天人同道􅍯物致用噐象攸明作必有孚服以為度有而不珍越人何減於章甫貴而見薄楚國誰信於方暉人之無良巧言斯搆殊魏瓠之竒質何生濩落之嫌異班扇之恩情徒假棄捐之阻且言行之表信徳之符或人給之行可知矣竊物為譽信其謂何愚以見疑施氏有誚於矇瞽取為已有告人當坐於詐欺雖謂可珍得而送縣賞則及爾一作宜及刑其捨諸廢賞則無勸將來置刑則有懲同惡名噐不假斯之謂與私制九章判乙私制九章重等對車服以庸衣裳在笥豈宜鷸冠好聚不可繁纓以朝司服為官制章程而有数司儀辨等顧禮命而無違陳之公朝則斯皇可賦作之私室將有害而家既越人常且非君命妄從重等敢此輕然工歌遄死之詩士寘不應之罰合於至當誰曰不宜衣貍制判或人衣貍製有司云不稱其服對車服以庸威儀有節各得其所無相奪倫戰者先登昔嘗聞於貍製或人匪服今頗同於鷸冠苟慢經以背常固速尤以貽咎身之災也妖實人興刑其恤哉理在無捨文苑英華卷五百四十
