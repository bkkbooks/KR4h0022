body:
  text: 文苑英華巻五百十七宋李昉等編祭祀二祭山川百神門六道不供祭用判三道祭七祀判一道百神判一道疈辜祭不供物判一道祭宗廟門十一道鬯酒不供判五道太廟登歌判一道造禰判一道薦新判一道掃道判一道祀玉判一道犧牲判一道祭山川百神不供祭用判丙奉使沈埋虞人不供其用對國之大事必存乎祀禮有五經莫重乎祭故肅事享薦雖不祈求而歆馨頋德是資昭報主上纂堯丕緒欽虞大孝是卑宫室固非為已用崇享祭其以佑人故臨遣制使聿脩祀典飭躬戒告展事采錯司馬相如封禪書作展采錯事捧玉一作珪幣潔牷牲盛儀宿設嘉樂具舉川先河後得沉浮之儀因方即陰合瘞埋之禮比時具物責成存乎有司虛中慮事先令期於使者彼何為爾而敢闕供夫惟虞人不應無訴同前厚德載物山澤通氣珍恠期産虞衡是職無幽不通在山川而有事至誠則感故鬼神以是依惟丙肅將天威祗若事典式崇望祀之禮用展沉埋之義而虞人不䖍祭物有闕各守爾典奚曠於庶官莫恭其職自貽於伊咎請舉虞人之罪歸於士師之辟同前社稷五祀山川百靈有國有家是尊是奉徧羣神而致享環一作理四時而不忒爰以使臣巡行郡縣職兹望秩之事崇是沉埋之禮或陳典法無替䖍恭况徼福假靈沉璧埋幣罔不祗肅通乎至誠蘋藻方薦粢食不鑿神疑作禮官博士分典斯務庖人尸祝各守是司事或有違罪將何逭且我愛其禮一有而爾二字闕供由一作是其寘罰神歆其潔克誠可以享斯眷彼虞人掌兹山澤不守其祀自貽厥􅄽宜寘平刑以懲不恪祭七祀判甲為鹽人緣祀中霤供祭或告慢神訴云於事無失對邵瓊之國禮在祀先王志其嚴潔神歆惟德執事期於肅恭茍有孚於蘋藻固非馨於黍稷鹽人職列周官事供王祭因潤下之成用備奉上之班司屬夏禴爰臚羣祀咸秩孚薦饗於中霤式䖍誠於内饔五材之味或爽七祭之容遂闕然時有異同事有隨變至信為用且一作誠應明心饗餁不虧何傷介福既異不供之罰難科作笞之刑百神判將祀百神差日有司不舉對講信脩睦禮行於時人和年豐神降以吉屬嵗陰云暮田畯至喜農事不作役車告休於是乎具器孚薦陳粢戒掌答成功於衆神設禋祀於大蜡雖既滌既灌不騫不忒日違精擇神將曷歆吁嗟是司不謹有職昔仲尼觀魯助祭興於喟然今太卜差時儐神失於顒若祝史陳信其多媿詞司存不舉坐寘恒罰疈辜祭不供物判以疈辜祭百物不供對水旱雩禜山川沉埋畢為雨師斗亦司命順四時之序祈萬姓之福疈辜充祀於百物望秩備禮於四方事或闕供罪亦斯得無止風之磔狗同吿朔之餼羊卜而罷郊以著春秋之失祭而廢禮宜投司寇之刑祭宗廟掃道犧牲附鬯酒不供判太常申博士請鬱鬯酒光祿以久無匠人且金草不知所出不造祠部亦以為禮有沿廢不允所請寺執見著唐禮豈得不行祠部云籍田准令兼給廪犧籍田今或不供犧亦廢用酒無鬱鬯於事何闕寺猶固執對趙㞯雍穆清廟苾芬孝祀為酒為醴以蒸以嘗執鬯玉之黄流香鬱金之美草觀灌顒若居歆孔明鬱人是供鬯人聯事司尊彞之築鬻右煑字周禮肆師及果鬻贊宗伯之祼將自周道崩離禮籍咸滅漢儀草創祀典多湮有徐生之為容非如叔氏雖匡衡之復古未及周監其後寖㣲不資沿革奉常執典同制氏之鏗鏘光禄蒞祠無大酋之湛饎莫行其義徒紀斯文皇聖時乗官人則惠禮司皆好古之英博士有表㣲之職將盡善而論德同大道之中行豈可以沿廢為言積習而惑未辨方志不監匠人何荆州之苞茅獨供王祭有盧家之蘭草不入國香惟昔肆師位同祠部無為大祭之佐不若吾子之言又以籍田明乎甲令去禮經之逾逺類俗吏之所為且甸師之給神倉潔粢以供鬼享虢文諫千畆之籍崔寔刺數畆之耕亦曰文存不當禮廢使唐禮不備於周禮比犧牲苟供於廪犧既慢乎粢盛仍拒我鬱鬯宜投棘署俾觧星郎同前祀事孔明必先於酒醴神其戾止亦在於馨香所以實彼樽彛逹其牆屋太常恪勤乃職無忝司存光祿簡慢是彰自貽伊戚且酒人之職素著於周官酧飲之儀頗聞於班史殷因夏禮斯損益之可知漢立秦祠固典章而無墜本經不失前法宜遵何廢禮而速尤欲隳官而招譴包茅不入尚責於齊侯鬱鬯廢供且虧於唐禮既不知於金草期疑作斯自掛於玉條祠部所云奚其不當徒稱沿廢罕顧禮經且千畆陳儀牲牢致用而三清泛薦犧象焉施仙臺所論愚管非測禮虧顒若刑其捨諸同前裴㓜卿郊禘有常春秋匪懈人神足以叶祕禮物於焉致和薦黍惟馨徵茅有典為酒為醴將見供於鬯人或廢或存具生文於甲令至如氣交殷臭法變周因始有襲於焚蕭竟將申於酌鬱灌以香草陳於卣罇備一獻之登歌知百神之受職固當所習寧越禮經况乎祀典有崇太常攸掌制經具陳斯品著令元削此條光祿不供自覺缾之罄矣籍田為喻誰云井有人焉舊章無替於執文王典豈新於改作三覆華省徒且慙於有司再覽太常實未乖於彛典同前權寅獻五帝殊功不相襲樂三王異俗豈同常禮是以因事立制則制施而下從量時署官乃官修而人理茍有其闕誰執其􅄽且祭天饗神太常攸主鬱夫酒正光禄是司率彼舊章博士諸供而有裕顧瞻新職匠人久廢而何慿夫以誠敬無文精靈不測若昭之以明德聽之以和聲則澗谿沼沚之毛可羞宗廟潢汙行潦之水堪薦鬼神且虧季蘭之誠何必鬱金之草况國家光膺駿命克享天心合昭穆以潔精下神祗而誠感酌至𤣥之酒七廟孔脩奏無聲之樂六宗攸序所以鬱鬯之禮見遺而不行金草之司有文而且闕省司含香推妙起草稱工酌一人之心是言沿廢引三推之令遽比兼供籍田既不供犧牲造酒何煩供鬱鬯禮雖見著令式空存請從祠部之言無聽太常之執同前國家大禮畢具無文咸秩聲名赫乎上古享獻周於百神每窮谿澗之毛誰爽粢盛之備太常宗廟攸奉禘祫爰司張君理窟之才王肅儒宗之望請供鬯酒擬實卣罇允得事宜雅符恒典光祿以無匠不造又用靡草為辭有司以沿革不同兼引籍田特比犧牲不廢愛禮斯深鬱鬯莫供司存何劣且鬯人之職須預其材疑醸金草之芳酌充蔓茅之既灌何得不供所務輙替彛章光禄拒之於前祠部送之於後事均齊楚得失疑而兩兼理同臧榖亡羊而一揆况國禮明著安可闕如咸請推窮方結刑憲太廟登歌判冬享太廟登歌擊拊大管不作法司科管者詞云皷轉不奏有所由對邊承斐一作裴蒸嘗有儀霜露是感必先金石之序以降神祗之福故潔粢豐盛年和登也博碩肥腯人力存焉使三獻克終九成斯辨堂上堂下咨樂正而為節載拊載擊播頌聲而有倫大管或虧小轉一作皷避諱攸闕既齊楚以引過奚韶頀以合雅宜寘法司以應伏慝造禰判丙以飴鹽造禰或責以苦鹽有闕對田儀晊䖍稽祀典類造之禮攸陳緬睇齊筵俎奠之儀當潔丙麗名宗伯展事鹽人白黒孔脩錯形飴而在列𤣥纁判一作則備考鹺苦而斯乖雖德之惟馨亦或罔吐而物有奠具謂何獲釐大事闕供小懲非逭薦新判春日薦新乙不送鹽對蒼龍正宿朱鳥方春山梅早花沼萍新葉嘗新傳於楚俗先薦表於周年採蘋奠誠式遵於南澗進櫻追逺首在於西京至若類獸之鹽唯調和於醯醢闓陽之薦恐有隔於蒸嘗請凖恒科以懲其慢掃道判甲主郊道當汜掃反道甲脩故而除無所改昜所由科之不伏對經途九軌列以城國通莊四㑹逹彼川梁廣直如弦有文侯之擁篲脩平若砥見伯也之執殳非據蒺藜將樹桃李無使障塞用絶艱虞嵗祀不除時饗不理甲掌惟郊道侯承司祭䘮者輟哭田燭是為百神以宗方陳明水之薦三條是務式崇新土之宜類築傅巖固將遵於大制殊開京兆亦何更於前名茍雜榛蕪足歆蘋藻誠為獻力匪曰犯刑且汜掃理在恭嚴反道義非變易何必改作方設興功脩故而除足奉䖍誠之節棄核而按永通按獄之明祀玉判甲掌六器不依方色所由加罪訴稱玉人闕供對顧健國有五禮甲主六器或欽若天地或䖍奉廟祧將以降神祗辨方色則必臨之以莊敬守之以豐潔使舊章攸叙靡物不精甲忝曰司存宜其祗肅徒尸此職曽不是省六宗有祀已墜虞章三禮何知載􅄽周典所由加罪亦謂金銘一作金名非勿言文過餙非方推玉人有闕若懲求有志一作至自可預論既臨時有乖欲何逃責闕供之罪定罪非遥未知祠祀所須為復陳設所犯待知本坐庶論如律犧牲判太常申稱充人養供大祀犧牲不如法致瘦損對精靈不測有上下之神祗敬誠無文有春秋之禴祀若昭之以明德聽之以和聲則澗谿沼沚之毛可一脩於宗廟蘋蘩蘊藻之菜可一薦於鬼神若無肅敬之心而有滛昏之祀則卜郊非祀國史由其致譏齋戒不嚴天皇於是流譴充人早霑明化忝曰司存職三犧之純養供六牲之蕃物固調其豢芻之食潔其文綉之衣豈容不整羽毛曾無博碩致令瘦損須寘科條文苑英華巻五百十七
