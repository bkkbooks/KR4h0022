body:
  text: 文苑英華巻九百六十五宋李昉等編婦人三滎陽鄭夫人墓誌一首燕郡夫人李氏墓誌一首上邽縣君李氏墓誌一首鄧國夫人墓誌一首李氏張夫人墓誌一首張氏女墓誌一首涼王妃張氏墓誌一首贈婕妤董氏墓誌一首滎陽夫人鄭氏墓誌銘張説夫人諱某字某滎陽開封鄭氏之女也集無也字有唐銀青光禄大夫行少詹事博陵侯集作曰博陵崔氏之妻中大夫中書舎人湜之母也高祖述祖集無此字北齊吏部尚書太子太保榮陽平集無平字簡公曾祖武叔北齊洛州刺史中牟公祖道援集作授隋宋城令父世基故吉陽令故左僕射安吉公杜淹太夫人之外王父也夫人家世徳門母氏鼎胄衣冠禮樂耳目所徵號之諸生實為女士先夫人以崔出泰集作太岳之􅉙鄭祖周王之穆長源修麓北濬聨宗集作崇故夫人年十有七歸于我氏盡敬愛以安舅姑致友穆集作睦通周以諧娣姒集作姒娣性寛恕尚素雅文而不奢約而不陋故邑號光啟象服是宜博陵侯更事兩朝多歴官序居必大理去有遺愛雖毳衣善聴得非雞鳴之弼乎舎人及三弟長安尉泌藍田尉液左千牛滌咸有當代之名立集作主無過之地滋液徳教集作教訓琢磨禮範雖趨庭善稟得非闈集作䦱是門之誨乎夫樂得好逑關雎義也鞠成衆子鳲鳩仁也采蘋采藻修禮度也如山如河有徳容也婦禮既成内則用貞母儀乃行家道以寧於是春秋髙矣雅好真諦厭斁禪味減撤珍華被服慈衣捐斥集作棄文綉總斯羣懿式是六姻故以嗣徽先姑垂裕來史詩所謂邦之媛也夫人有焉皇天難忱不享偕老年六十四神龍元年十一月九日遘疾終於洛陽之遵化里其明年二集作三月某日塟於富平縣之某原君侯傷神諸子銜恤寘銘幽竁用存終古其詞曰東惟詹府西望綸闈吾夫鶚瞵吾子鵷飛青綬赤茀魚軒翟衣橋梓灌墓堂堂榮輝如何不淑奄永泉扉漠漠𤣥夜容容白日百歲之後同乎此室右豹韜衛大將軍贈益州大都督汝陽公獨孤公燕郡夫人李氏墓誌銘前人夫人諱某字某故代州東治府右果毅都尉幽州高士李感之女也本姓張居於清河郡大父𤣥悊集作誓非官至安東大都䕶長史與太宗有故賜姓李氏仕歴􅀈州司馬始家薊城是則帝寵舊臣乃命王族官平朔野因為郡人偉哉孝友清白之仁基金鈎石印之靈慶集作兆必將光大别族集作業繁衍淑女彩黛粉敷焜燿華􅁮若斯之盛也夫人㓜而韶異長而婉穆金聲玉澤蕣榮蘭茂傳賢莊姜詩美仲氏無以尚也初汝陽公夫人元氏生一男四女而卒繼室以夫人封諸燕郡王元生集無生字立及長孫楊氏二女秉螽斯宜爾之徳著鳲鳩均養之仁色無偏和心無殊厚閨庭之内邕邕如也雖邑中五服之家門下三年集作千之客莫能察其異焉永寧里先人之舊廬也有通渠轉池巨石嶔嵰噴險集作隂淙灂洄潭沈沈殊聲異狀而為形勝遊衍之處者十四五前夫人之孫蘇氏之婦弱集有冠字非歲嬉而墮焉舉家環流憚莫能救夫人投身赴水或沈或浮乆之提挈僅免其行已也實多此類府君更郎將中郎將各一將軍大軍將几四前後領左右羽林二軍禁營青海鴨緑二道總管天子元老白首兵欄腹心爪牙朝無與二外受琱戈文馬之賞集作賚内委金璣寳貝集作玉之飾將軍既頒於部曲夫人亦散於宗姻可謂貴而好禮富而能惠者已及君子晨歌夫人晝哭喪有過戚集作感慕制無越禮其後法吏苛禮集作濫余子逺遷窮荒一訣倚閭集作門三歲炎山瘴海曷云其來施珍玩以奉佛徹滋味以奉道精意入㝠明神與直中興昌厯無廢舊勲先公茂乎飭終愛子榮乎起滯天步方泰家屯適夷宜享南山之壽奄頓西泉之駕神龍元年十二月二十二日寢疾終於洛陽之徳懋里春秋若干國墜邦媛宗集作家傾母儀孤􅉙孝孫哀哀欒棘有詔㫖曰獨孤某妻亡還京日宜給靈輿并遞悼舊褒徳集作功矜孤恤喪朝之大經者粤以明年十一月二十日卜葬於集無於字雍州之某原不從先塋古之道也夫計功伐勒鼎彛非婦人之事撰徳行存國史亦孝子之志乃爲銘曰猗嗟昌兮月出之光如葉莫莫如華皇皇宜啟燕郡作合汝陽尊之象服錦衣褧裳以慈行訓曰仁之綱以命易難曰義之方婦有柔徳亦惟其常女之士行于何是集作不臧彼天蒼蒼胡降百殃捨我媚子捐其髙堂丘隴芒芒集作茫茫風生白楊象物皆盡徳音不忘上邽縣君李氏墓誌前人集無夫人太祖景皇帝之𤣥孫西平郡一作原王普定之女也賦靈隂徳資性柔嘉事舅姑盡其敬與娣姒致其睦茂行充乎内則懿聲溢於外姻雖王家長自傅保而能謙光庶類降心細物手成朝祭之服躬揉酒食之品凢婦人之所能事而夫人莫不備焉府君朱紱之歲也於是乎始受封邑象服盈門魚軒在路姬氏王者之後夫人帝室之親夫貴婦榮於斯為盛及帷堂而哭有敬姜之禮擇隣而處有孟母之教入閭俟信有諸婦之期出言成章有衆女之誡受命不淑以某年月日卒於同州之私第以神龍元年十一月二十日合葬於萬年縣白鹿之舊塋有子愻殿中侍御史檢身承家揚名為孝思我母氏感秦伯之詩祈於府君取周公之禮髣髴心迹志之幽石其銘曰茫茫萬姓朝宗于李婺星分極咸池派水后稷裔孫神貽女士動遵法度居觀圖史輔佐哲夫訓成賢子宜崇徽號以享介祉髙堂奄空霜露方始儉用禮節𦵏非奢美鏡下穸臺衣緘泉笥壠烟不一作長散松風長起摘果人迷侵林獸死永言惟孝事親終矣鄧國夫人墓誌銘前人詩美莊姜傳稱孟母庶姬綿邈千載時有猗嗟邦媛柔明亶厚龜玉毁櫝膏蘭夭壽逺矣皇祖肇自宗伯靈基在晉華胄陵江尹茲西楚宅是南邦髙蓋結轍圓冠比蹤魏館虚待周京長發父對雄風母膺姉集作娣月珠浦瀆集作黷潤玉林清越昆弟三人羽儀雙闕家芳集作芬淑女國茂賢妃具瞻四徳旁通八徽步幛馳辨連環定機調絃魚躍㺯杼鴛飛媧后集作氏創業軒宫多事髙行登聞大家入侍幽贊日月財成天地温室不傳平城盡秘大君命我變禮㫁恩衛妻空誓息媯集作婦無言均養七子劬勞二門始賦樛木終歌采蘩多難啟聖羣凶搆孽明集作朋家作仇脅權相滅臨禍不懼忘生蹈節彼何人斯碎此貞烈氣消日朗既安且平皇心震悼禮備哀榮啟國加等復土陳兵外姻來唁中使臨塋恭惟夫人宿精知集作智刃昭昭開士授之心印古無合𦵏遺言别墳欒欒孝子敢廢前聞服不珍繡􅐻無膩薰室暗泉火松殘隴集作壠雲神合大化誰為小君李氏張夫人墓誌臨淄李伯魚妻者范陽張氏女諱徳性孝悌柔婉能日誦數千言習禮明詩達音妙繢集作􅀈徳言容工蓋出人也伯魚天下善為文擢校書郎出為青州司功而卒夫人寡居無子以歸宗焉長安二年四十有八傾逝於康俗里殯於永通門外景龍三年家疚居貧季弟君集作説鬻詞取給冬十月安厝伯姉於萬安山陽蒼梧不從古之制也比望先隴集作壠西接抹集作妺是丘明靈其嘉永安此室銜哀叙誌嗚呼孔懐銘曰送送集作送我伯姉萬安之墳精靈何處為雨為雲彼臨淄兮千里望倐忽兮夫君張氏女墓誌前人女郎名琰姓張氏洪同丞府君之少女也聰慧孝友蘨條鬚晢集作誓能讀史書善奏絲桐舉族稱集無稱字珍之未集無未字成人而天命也聖厯中隨仲昆集有之字任殞折集無折字於慶州歸殯於藍田别業景龍年屬家艱季兄君集作説徵黄門侍郎哀請不拜詔許終服家貧傭文以取資集作給冬十月獲改集無改字𦵏女弟於萬安山陽差池姉塋顧瞻尊闕不亡孝弟慰爾幽魂含酸屬銘投筆氣索辭集作銘曰陟彼京兮痛同生兮奈何朝露在蕣榮兮共天地之大徳焉早落而無成兮涼王妃張氏墓誌銘常衮古之賢妃四徳六行則在女史彤管記言納聘入於天宫儀刑光於帝閫休有懿範歿而可稱涼王妃張氏族茂清河之原家承七葉之盛紱冕繼代勲華襲門曾祖守貞皇朝遊騎將軍左衛中郎將羅國公食實封三百户職雄戴鶡績茂分茅祖光庭皇朝中散大夫衛尉少集無少字卿位亞八屯榮參九列父安仁皇朝正議大夫涇王府長史曵裾上邸託乗西園俱傳帶礪之封克承閥閲之後妃早習詩禮式遵教義令徳令儀有要有倫既當八月之期允叶良家之選天寳八載納為涼王妃懿範集作徳徽音韶妍婉順恭勤朱邸儼恪丹宵友其琴瑟奉以家室瞻鴈池之閲水嗟駰隙之末光以廣徳二年五月十三日終于上都之内邸春秋三十七旋以其年十月六日遷窆於某原禮也涼王倚歎蘭臺傷神桂苑梧桐半落鸞鳯孤飛永逝不追㗳然增欷詔葬備禮哀榮飾終笳簫在辰旒旂啟路嗣子保定郡王仕攀號孺慕惟切蓼莪誌于幽泉銘以貞石慮佳城之白日識隴樹之青松銘曰清河之邑兮地惟古具毓粹華宗兮賢妃誕載柔順内積言容外彰謀茲淑徳輔佐賢王芳年忽馳夭暮何速積善虚應兮時長運促空餘懿範兮刻在貞玉贈婕妤董氏墓誌銘前人維唐至徳元年歲在癸夘十二月二日美人河内董氏終于閿鄉縣之别館春秋一十有八嗚呼哀哉美人蘭質幽閑苕華婉麗出自漢􅆏之曲降於巫峽之陽栁絮題詩椒花獻頌徳行日集作自成于天性藝能豈假於師資既彰絶代之姿雅叶良家之選瑶臺入集作日寵金屋流芳映月幌而方娥上星樓而比婺恩多不恃顧重無矜讓以同車恭而避寢紫庭著美彤管旌賢屬綵仗巡遊花鈿侍從方執巾於上陌忽䝉被於離宫天道如何泉扄已矣聖上顧懐淑愼言念恩情悲遽夭於先春歎長歸於永夜追加班女之秩式慰魏兒之魂以某年月日葬於某原禮也乃命侍臣紀於貞石銘曰二九之年麗容嫣然春風轉蕙秋水開蓮浣紗選貌納袂求賢承恩玉殿侍宴瓊筵光隂不借闕何偏椒房愛促蒿里悲纒婕妤寵贈女史芳傳丹鳯城外黑龍水邊嗚呼此地永閉神仙文苑英華巻九百六十五
