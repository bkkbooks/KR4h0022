  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0022_WYG_387-1a, image: WYG1336/WYG1336-0519a.png}
body:
  text: 文苑英華巻三百八十七宋李昉等編南省三禮部尚書授韋陟文部尚書制賈至門下周官大冢宰以九軄任萬人三嵗大計羣吏之誅賞選部綜覈時惟厥任非正人表臣齊明敏哲不可處此御史大夫郇國公韋陟代篤惟忠祗勤於徳文可以經國業可以濟時有鄭僑恵主之仁史鰌君子之道頃居小宰翼勤萬務銓鍳而必審其實㧞舉而不失其能秉心塞淵厥有成績可守文部尚書餘如故授韋綬禮部尚書薛放刑部侍郎丁公著工部侍郎等制勅尚書左集作右丞韋綬等朕以集作在東宫時先皇帝垂慈聖之徳念予冲䝉選端士通儒使講貫今古自禮樂刑政暨君臣父子之道博我約我日就月將俾予于集無于字今不至墻面克荷丕訓大揚耿光實綬放公著之力也故朕嗣位未踰時月或自郡邸或自省署徴擢寵用為丞郎給事中官雖超拜職亦具舉師道光而心愈讓人爵貴而身益恭宜更褒升重酧輔𨗳以綬精粹辯博有先儒之風可作秩宗以放端明慎重行君子之道可居憲部以公著檢敬規度得有司之體可貳冬官於戯貞百工平五刑典三禮皆重任清秩予無愛焉葢欲表二三子道不虚行而明予一人徳無不報也綬可禮部尚書放可刑部侍郎公著可工部侍郎餘官並如故授裴休禮部尚書裴諗兵部侍郎等制杜牧勅冉有仲由孔氏門人髙弟也尚曰處於小國可為具臣况今照臨百官撫御四海綰牢籠漕輓之職掌五兵六師之重次第超擢為吾大寮若非僉諧豈敢輕授正議大夫守尚書兵部侍郎兼御史大夫統諸道鹽鐵轉運等使上柱國河東縣開國子食邑五百户賜紫金魚袋裴休仁義禮樂文行忠信積此八者以為成人前宣歙池等州都團練觀察處置等使太中大夫檢校左散騎常侍兼御史大夫上柱國河東縣開國男食邑三百户賜紫金魚袋裴諗在元和代惟帝念功四夷九州文化武伏咨爾先父實著大勲天必祚仁門有令嗣道直才富行備名髙文學而浹洽專精率履而清净恭儉而皆周歴華顯踐更䑓閣處事可法出言成章咸輟自輪闈任寄方伯教訓以禮生聚以康集作仁千里封疆一口歌詠休乃命以取士時稱得人用其公方委之管𣙜事為之制曲為之防鈎校姦贓末减賦取公財不耗疲人樂生望為凖䋲立作據依名實兼偹徳位兩髙漢史曰理行尤異者就加禮曰有功於人者進律秩崇八座官副夏卿舉以授之予亦何惜夫宰相佐天子公卿助宰相股肱指臂任同一身有事必言未為越局無自愛惜勉答寵榮休可守禮部尚書依前充諸道鹽䥫轉運等使諗可權知尚書兵部侍郎㪚官勲封賜各如故工部尚書授建昌郡王攸寜冬官尚書制李嶠鸞䑓事典軄隆禮闈望切自非明徳莫允具瞻具官建昌郡王攸寜道臻八元名髙兩獻行兼為善業茂多才待問七車屢聞獻替叅司百揆多所𢎞益頃以牙璋首路羽檄乗邊委以罇爼之謀籍其股肱之用而卑以自牧成而不居固守鳴謙願離一作辭劇軄重違雅志用成其羙宜遷九法之司囬典百工之任可冬官尚書封如故授劉知柔工部尚書制蘇頲黄門司空之軄以平水土常伯之任尤重臺閣鴻臚卿上柱國彭城郡開國公劉知柔碩徳耆秀行髙才逺文詞有綺績之工望實有珪璋之譽出膺賢守則郡國循良入位名臣則衣冠凖的可謂朝之明哲代之純懿俾遷榮於北斗宜作範於南宫可銀青光禄大夫守工部尚書勲如故主者施行授盧正已工部尚書河南尹東都留守制賈至門下昔成王命君陳分正成周尹兹東郊曰惟爾令徳孝恭􅂶施有政實大其舉俾振厥軄先朝故事以擇舊徳元老貞固之臣毎居守焉今冦逆始平洛師殘弊周南分陜寄莫斯重太府卿盧正已忠肅恭懿仁而愛人專鎮分憂居必致理是用命爾問疲瘵之俗政必以寛化遷習之人謨必以義勸農穡之務事必以静禁浸漁之暴令必以嚴可守工部尚書東郡留守㪚官勲封如故於戯無替朕命主者施行授崔渙工部尚書制常衮勅程品之重有若百工號令之先尤難六軄崔渙學義精洞文詞典麗道髙王佐才茂國華實毎副名言皆顧行頃調鼎餗庶政惟和及典銓衡羣才式序中外更茂搢紳所宗雅有大臣之節光其舊徳之選冬卿命軄汝徃欽哉可工部尚書餘如故授韋貫之工部尚書制白居易勅河南尹韋貫之善馭者齊六轡善理者正六官六官成則百事舉故吾選賢任舊集有以字次第補之而六卿之材吾已得五闕一不可待汝而成汝貫之以正行明誠為先朝輔始以直進終以直退道有消長徳無緇磷及師湘潭尹河洛而亷平清一之政繼聞於京師名簡吾心善入吾耳宜置朝右以鎮集作之厚時風况今之尚書漢之公卿也言動可否屬人之集無字之耳目焉固不專於率四屬程百工備位於冬官而已可工部尚書餘如故授盧宏宣工部尚書制崔嘏勅朕嗣膺寳位繼統洪業思與藩方大臣披其雲霧况中外逓遷勞逸更處當用才之日急病是思及求舊之時任賢斯切而中䑓為政一作致理之本冬卿亦統任之基方籍舊僚以俾新政前易定節度使盧宏宣自薊門陷戎爾以舊族遷于洛京惟是冠婚䘮祭之儀禮讓敬恭之則推於四姓耀此一門而能自以文業吏師驅馳當代歴踐華顯載茂休嘉累登齊壇常領京邑功有成効人無間言及罷將軍之麾幢觧刺史之印綬來朝絳闕益見丹誠是冝正彼六聫昇于八座曵文昌之履通秘殿之香一作書更増北斗之光輝或重南宫之喉舌承我休命爾其敬哉授鄭紹業工部尚書制劉崇望勅具官鄭紹業族掩五侯家多萬石盈數大名之後髙門隂徳之餘兹實生賢聿來佐國而勵精士節炳煥人文韻宇𢎞深智度恢廓比博能於武庫方俊徳於神鋒終始令圗出入大任丹墀絳闕自風體而𢎞多起草掌綸由天才之足用洎揚我休命出守荆門頗聞理聲急於徴請入則思邦家之乆計出則擁旄節之一作於上游良佇忠貞乃期康濟爰從分務曠已歴時如聞舒不疚之懐安無恕之地雖有簞瓢之樂寜無憔悴之容能用善人我實所慕是命進爾於冬官八座乃庶績彛倫之所由焉祗若朕言克邁乃訓吏部侍郎授盧藏用檢校吏部侍郎制蘇頲勅朝請大夫守中書舎人兼知吏部侍郎事脩文舘學士上輕車都尉盧藏用含和育粹直道正身學貫儒墨詞精比興風塵之外獨秀瑶林清白之中常懸氷鏡自四年掌誥九品作程峻而不離一作雜重輕咸當簡而能要浮競斯逺刀尺之委銓衡已歸特選周才更符僉望可檢校吏部侍郎仍佩魚如故授陸景融吏部侍郎制孫逖門下小宰之官乆虚其位至公之用惟才是舉一作與守尚書左丞陸景融珪璋成器禮樂為文剛亦不吐柔而能立恬淡之性足以抑退浮華徽明之識足以􅈭揚掩滯類能而使僉議允屬俾澄清於九流期風俗之一變可守吏部侍郎㪚官勲如故授李彭年吏部侍郎制孫逖門下綜彼天秩亞于邦家易人之舉選衆尤難尚書兵部侍郎李彭年人望時秀雅才清識徳以全誠文而致用操必割之器遇時事無前持不轉之心在公庭難奪必能敷求名實底慎銓衡宜輟七兵之務俾脩九流之法可守尚書吏部侍郎授韋陟逹奚珣等吏部侍郎禮部侍郎制孫逖門下冡卿宗伯均國和人乃立其貳非才莫可正議大夫行尚書禮部侍郎權知吏部侍郎上柱國彭城縣開國男韋陟明斷一堅純鋼百錬中書舍人權知禮部侍郎上騎都尉逹奚珣忠公淑慎白圭三復各推邦直皆擅詞雄峻節彌髙清標不雜頃因時事之委深得選賢之稱如有所試已副於僉諧必也正名宜光於並拜陟可吏部侍郎奚珣可中㪚大夫守禮部侍郎勲封各如故授薛邕吏部侍郎制常衮門下昔禹謂咎繇曰知人其難之魏武又云使吏部用心如毛玠風俗之易差不難矣今之銓綜但抑華崇本鎮以禮譲則庶官羣才不濫於進中㪚大夫守尚書禮部侍郎集賢殿學士判院事上柱國汾陽縣開國子集作男賜紫金魚袋薛邕含和保真莫見其際雄詞秘學徳行之餘信厚可親朝之英逹徃者潤色鴻業煥發絲言之羙又與五經諸儒質正石渠之論擢以公望貳於秩宗豈惟人神之和兼舉孝秀一作悌之目鍳裁髙朗加以直清進退可否歸於精實慎乃服命五年如初擇吏辯言宜當盛選無易前政副予得人可守尚書吏部侍郎餘如故主者施行授楊綰吏部侍郎制常衮門下興化在於官人掄才歸於吏部佐平邦典選重朝倫朝議大夫守尚書左丞集賢殿學士副知院事兼脩國史楊綰澹雅貞亮𢎞其素範學䆒先儒之㫖文髙作者之興三揖而進能守謙光一命而僂不㤀恭敬頃司綸言兼掌史筆嘗亦秉直夙推無對領春卿左轄之任有奏議紀綱之績令猷自洽厚徳彌彰叅我宻啓屬於清鍳當勵濯纓之操不遺刈楚之才敬爾在公無替厥服可尚書吏部侍郎餘如故授桞公綽吏部侍郎制白居易勅京兆尹兼御史大夫桞公綽長吏數易為害甚多邇來都畿未免斯弊或苛急而人重困或懦集作軟弱而姦不息得其中者其公綽乎細大必躬親剛柔不吐茹甚稱厥軄惜而不遷然智者常憂忠者常勞亦非吾以平施御臣下之道也尚書六軄天官首之辨論官材澄汰流品比諸内史選妙秩清詢衆用能無易公綽爾其集作宜飭躬承命以裴王崔毛為心茍副吾言用稱乃軄而今而後亦何徃而不適哉可尚書吏部侍郎文苑英華巻三百八十七
