body:
  text: 文苑英華巻三百七十四宋李昉等編諷諭二鐵鑪歩志一首吏商一首鞭賈一首蝜蝦傳一首農夫禱一首悲剡溪古藤説一首書褒城驛屋壁一首蠧化一首較貪一首鐵鑪歩志桞宗元江之滸凡舟可縻而上下者曰歩永州北郭有歩曰鐵鑪歩余乗舟來居九年往來求其所以為鐵鑪者無有問之人曰盖嘗有鍜鐵者居其人去而鑪毁者不知年矣獨有其號冒而存余曰嘻世固有事去名存而冐焉若是耶歩之人曰子何獨恠是今世有負其姓而立於天下者曰吾門大他不我敵也問其位與徳曰乆矣其先也然而彼猶曰我大世亦曰某氏大其冐於號有以異於兹歩者乎向使有聞兹歩之號而不足釡錡錢鏄刀鐵者懐價而來能有得其欲乎則求位與徳於彼其不可得亦猶是也位存焉而徳無有猶不足以大其門然且樂為之下子胡不怪彼而獨恠於是大者桀冐禹紂冐湯幽厲冐文武以傲天下由不知推其本而姑大其故號以至於敗為世笑僇斯可以甚懼若求兹歩之實而不得釡錡錢鎛刀鐵者則去而之他又何害乎子之驚於是末矣余以古有太史觀民風采民言若是者則有得矣喜其言可采書以為志吏商吏而一作有商也汙吏之為商不若㢘吏之商其為利也博汙吏以貨商資同惡與之為曹大率多減耗役傭工費舟車射時有得失取貨有苦良盗賊水火殺敓焚溺之為患幸而得利不能什一二身敗禄奪大者死次貶廢小者惡終不遂汙吏惡能商矣哉㢘吏以行商不役傭工不費舟車無資同惡減耗時無得失貨無良苦盗賊不得殺敓水火不得焚溺利愈多名愈尊身富而家彊子孫葆光是故㢘吏之商博也苟脩嚴㓗白以理政由小吏得為縣由小縣得大縣由大縣得刺小州其利月益各倍其行不改又由小州得大州其利月益三之一其行又不改又由大州得㢘一道其利月益三倍不勝富矣苟其行又不改則其為得也夫可量哉雖赭山以為章涸海以為鹽未有利大能若是者然而舉世争為貨商以故敗吏相逐於道百不能一遂人之知謀好邇富而近禍如此悲夫或曰君子謀道不謀富子見孟子之對梁惠王三字集作宋硜乎何以利教為也桞子曰君子有二道誠而明者不可教以利明而誠者利進而害退焉吾為是言為利而為之者設也或安而行之或利而行之及其成功一也吾哀夫沒於利者以亂人而自敗也姑設是庶由利之大小登進其心集作志字幸而不撓集作有乎下以成其政交得其大利吾言不得已爾何暇從容若孟子乎孟子好道而無情其功緩以疏未若孔子之急民也鞭賈市之鬻鞭者人問之其賈宜文粹作直五十必曰五萬復之以伍十則伏而笑以五百則小怒五千則大怒必五萬而後可有富者子適市賈鞭出五萬持以夸余視其首則拳蹙而不遂視其握則蹇急集作反而不植其行水者一去一來而不相承其節杇集作朽黑而無文材搯之滅爪而不得其所窮舉之飄集作翲然若揮虚焉余曰子何取於是而不愛五萬曰吾愛其黃而澤且賈者云余乃召僮爚湯以濯之則遫然枯蒼然白嚮之黃者梔也澤者蠟也富者不悦然猶持之三年後出東郊争道長樂坂下馬相踶因大擊鞭折而為五六馬踶不已墜於集作之地傷焉視其内則空空然其理若糞壌無所頼者今之梔其貌蠟其言以求價伎於朝者當其分則善文粹無此苟非一誤而過其分則喜當其分則反怒曰余曷不至於公卿然而至焉者亦良多矣居無事雖過三年不害當其有事驅之於陳力之列以禦乎物以夫空空之内糞壌之理而以責其大擊之効惡有不折其用而獲墜傷之患者乎蝜蝂傳蝜蝂者善負小蟲也行遇物輙持取昻其首負之背逾集作愈重雖困劇不止也其背甚澀物積因不散卒躓仆不能起人或憐之為去其負苟能行又持取如故又好上髙極其力不已至墜地死今世之嗜取者遇貨不避以厚其室亦知為已累也唯恐其不積及其怠而躓也黜棄之遷徙之亦已病矣苟能起又不艾日思髙其位大其禄而貪取滋甚以近於危墜觀前之死亡曽不知戒雖其形魁然大者也其名人也而智則小蟲也亦足哀集作悲夫農夫禱劉軻丙戍嵗大饑楚之南江黃為甚明年予將之舒途出東山見老農軰鳩其族為禱於伍君祠其意誠而辭俚因得其文以潤色之亦以儆于百執事者云農夫某謹逹精誠于明神吁嗟我耕食之人誰非土之人人之有求神得不以聰明正直聽之耶曩者仍嵗薦飢人為鰥􅄔田無耕夫桑無蠶姬癘疫瘡痍一方尤危踵以呉蜀弄兵吏呼其門敺荒餘之人挾弓持㦸女子生别行啼走哭王師有征羣盗繼誅乃歸其居乃復室廬廬壊田蕪亦莫蠲其租今之收合餘燼人百其力幸大成于秋誠慮旱而不雨既雨而潦必不為潦又慮其不苖不秀秀而不實又慮為螟蝗又慮夫廐馬之奪其食贓吏之厚其歛焉嗚呼必馬無厭粟者妾無厭羅紈者吾歛其薄矣亦於何厚其所薄耶伏希神明無有所忽禱曰無瘠農人以肥廐馬無寒蠶婦以暖妓妾無銷耒耜以滋兵刄農人不飢而天下肥蠶婦不寒而天下安耒耜不銷而天下饒妾暖而嬌兵滋而殘馬肥而豪不蹟不駝足食足衣皇天皇天胡忍是為苟不此為民其嘻嘻神其怡怡尚饗悲剡溪古藤説文粹作文舒元輿剡溪上綿西五百里多古藤株枿逼土雖春入土脉他植發活獨古藤氣候不覺絶盡生意予以為本乎地者春到必動此藤亦本於地方春且有死色遂問溪上人人文粹不疊人字有道者言文粹作云溪中多紙工持刀文粹作刀斧斬伐無時擘剥其文粹無其字皮肌以給其業噫藤雖植物者温而榮寒而枯養而生殘而死亦將似有命於天地間今為紙工斬伐不得發生是天地氣力為人中傷致一物疵癘之若此異日過數十百郡泊東雒西雍歴見言文粹無言字書文者皆以剡紙相夸乃文粹作字寤曩見剡藤之死職正由此文粹疊此字過固不在紙工且今九牧士人自專言能見文章户牖者其數與麻竹相多聽其語其自安重皆不啻握驪龍珠雖苟有曉寤者其倫甚寡不勝衆者亦皆歛手無語勝衆者果自謂天下文粹作之文章歸我遂輕傲聖人道使周南召南風􅇧折入於楊白二字文粹作折楊黃華中言偃卜子夏文學䧟入於滛靡放蕩中比肩握管動盈數千百人下筆文粹作筆下動數千萬言不知其為謬誤日日以縱自然殘藤之命易甚桑枲文粹作易其桑葉波波頽呇未見其止文粹作止息如此則妄言文輩文粹作綺文妄言輩誰非書剡紙者耶紙工嗜利曉夜斬藤以鬻之雖舉天下為剡溪猶不足以給况一剡溪者耶以此恐後之日不復有藤生於剡矣大抵人間費用苟得者其理為文粹作則不枉之道在則暴耗之過莫由橫及於物物之資人亦有其時時其斬伐不為沃閼予謂今之錯為文粹有文字文者皆沃閼剡溪藤之説文粹作流也藤生也有涯而錯為文者無涯世世字文粹疊作無涯之損物不直於剡藤而已予所以取剡藤以寄其悲書褒城驛屋壁孫樵褒城驛號天下第一及得寓目視其沼則淺混而茅集作汙視其舟則離敗而膠庭除甚蕪堂廡甚淺集作殘烏覩其所謂宏麗者訊於驛吏則曰忠穆公嘗牧梁州以褒城控三文粹作二節度治所龍節虎旗馳驛奔軺以去以來轂交蹄劘由是崇侈其驛以示雄大盖當時視他驛為壯且一嵗賔至者不下數百輩苟夕得其庇飢得其飽皆暮至朝去者集無者字寧有顧惜心耶至如棹舟則必折篙破舷碎鷁而後止漁釣則必枯泉汨泥盡魚而後止至有飼馬於軒宿隼於堂凡所以汙敗室廬糜毁器用官小者其下雖氣猛可制官大者其下益暴横難禁由是日益破碎不與曩類其集作某曹八九軰雖以供饋之隙葺茸文粹作一二加治之其能補數十百人殘暴乎語未既有老甿笑於旁且曰舉今州縣皆驛文粹作役也吾聞開元中天下富蕃號為理平踵千里者不裹糧長子孫者不知兵今者天下無金革之聲而編户集作户口日益破疆場無侵削之虞而墾田日益寡生民日益困財力日益竭其故何哉凡與天子共理天下者刺史縣令而已以其耳目接於民而政令速於行也今朝廷命官既已輕任刺史縣令而又促數於更易且刺史縣令逺者三嵗一更近者一二嵗再更故州縣之政苟有不利於民可以出意革去者其二字集作其甚者在刺史則曰明日我即去何用如此在縣令亦曰明日我即去何用如此愁當醉饑當飽字文集作愁當醉醲飢當飽鮮囊帛匱金笑與秩終嗚呼州縣者其驛耶矧更代之隙黠吏因縁恣為姦欺以賣州縣者乎如此而欲望生民不困財力不竭户口不破墾田不寡難哉予既揖退老甿條其言書于褒城驛屋壁蠧化陸龜䝉橘之蠧大如小指首負特角身蹙蹙然類蝤蠐而青翳葉仰嚙如饑蠶之速不相上下人或張觸之輙奮角而怒氣色桀驁一旦視之凝然弗食弗動明日復往則蛻為蝴蝶矣力力拘拘其翎未舒䄡黑講蒼集作蒼黃分朱間黃集作蒼腹瑱而橢音墮緌纎且長乆醉方寤羸枝不楊又明日往則倚薄風露攀縁草樹聳空趐輕瞥然而去或隐蕙隙或留篁端翩旋軒虚颺曵紛拂甚可愛也須臾犯蝥網而膠之引絲環纒牢若桎文粹作拲梏人雖甚憐不可解而縱矣噫秀其外類有文也嘿其中類有徳也不朋而游類潔也無嗜而取集作食類廉也向使前不知為橘之􅗜後不見觸蝥之網人謂之鈞天帝居而來今復還矣天下大橘也名位大羽化也封略大蕙篁也苟滅徳忘公崇浮餙傲榮其外而枯其内害其本而窒其源得不為大蝥網而膠之乎觀吾之蠧化者可以惕惕較貪楊䕫𢎞農子遊卞山之陰遇鄉叟巾不完屨不全負薪仰天吁而復號因就訊諸抑䘮而未備乎抑有寃而莫訴乎何聲之哀而情之苦耶叟致薪而泣曰逋助軍之賦男獄于縣絶糧者三日矣今將省之前日之逋已貨其耕犢矣昨日之逋又質其少女矣今田瘠而頻播之莫稔貨之靡售且以為助軍之用豈一一於軍哉今十未有二三及於戎費餘悉為外用又黠吏貪官盈縮萬變去無所之住無所資非敢懐生奈不死何𢎞農子聞其言且助其嘆退而省於世萬類中最為民害者莫若虎之暴將賦之以警貪吏庶少救民病是夕夣鷙獸而人言曰爾欲警于貪將以吾為首雖爾之潔奈辱我之甚乎余曰賊人之畜以自飽腹爾不為貪哉獸曰不豢不農何以給生苟不捕野無實吾嗛吾以其饑而求食之苟或一飽則晏然匿跡不為謀矣豈爾曹智以役物豢之畜之畋之漁之以給其茹也桑之育之經之營之以供其用也一物之可求一貨之可圖汲汲為謀孜孜繫心如壑如溪莫滿莫盈豈與吾獲一飽則晏然熟寢而欲比方哉𢎞農子驚而寤諦而思若然則人不如獸也逺矣文苑英華巻三百七十四
