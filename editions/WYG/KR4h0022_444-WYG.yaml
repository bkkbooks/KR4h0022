body:
  text: 文苑英華巻四百四十四宋李昉等編冊文三諸王冊文封授臨川等五王詔沈約門下神牧帝鄉類集作神州帝城冠冕列岳渚宮樊鄧形勝是歸居中作衞翌宣戎勲類聚作重隆兹或作名寵號寔允舊章竝非親勿居惟賢斯授西中郎将護軍宏朕之外類集作介弟早宣亦集作富德譽董一藩政緝是嘉庸國禮家情瞻寄隆重使持節督南徐兖二州諸軍北中郎將梁書作輔國将軍南徐州刺史秀風頴雋邁識業標簡任居藩翰政以化成使持節都督雍梁南北秦四州諸軍事安北将軍梁書作冠軍将軍寧蠻校尉雍州刺史偉體韻淹穆神寓凝正經綸夷雅類集作經綸夷險參賛王業冠軍右衞将軍恢神檢外洽淵量内湛奉職鈎陳周衞以穆使持節督荆湘益寜南北秦七州諸軍事安按梁書作平西将軍荆州刺史憺秀識冲情允文允武經啓王業寔有厥勤竝契濶綢繆分形竝氣處家盡其匪躬朕承運迭興光宅四海藩維廣樹經朔攸屬出納之宜望實惟允宏可使持節散騎常侍都督揚南徐州諸軍事後将軍揚州刺史封臨川郡王秀可進號征虜将軍餘官如故封安成郡王偉可使持節散騎常侍都督雍梁荆寧南北秦六州郢州之竟陵司州之随郡諸軍事寧蠻校尉雍州刺史将軍如故封建安郡王恢可侍中前将軍領石頭戍事領兵景佐封鄱陽郡王憺可使持節都督荆湘益寧四州諸軍事平西将軍荆州刺史封始興郡王食邑各二千户封衡陽郡王成義為申王等制蘇頲門下古者帝王受命以臨萬國子弟建封用尊五等其所由来尚矣尚書右衞大将軍衡陽郡王成義等敦詩執禮本仁祖義名教之樂得自㡬深温良之容發於忠孝晨趨魏闕則望掩軒霞夕賦曹園則思含澄景朕祗奉厯數旁稽載籍克輔王室所謂通邑大都俾為唐藩故能帶河礪岳分膺徃命咨爾眷歟一作不可慎歟可依前件仍各實封一千户餘竝如故主者施行唐隆元六月卄七日封鄧王等制王言㑹最門下昔周室制法備建宗盟漢室垂統畢封子弟其盛也二南教化首在國風其詳也九國土疆載于侯表朕嗣守丕業惟懐逺圖永言磐石之固宜本介人之重男平原郡王寧等孝友忠敬温文恵和禀其樂善之姿强於好古之學君親之教罔敢失墜保傅之言亦惟佩服由是寡悔至於通方庶可膺兹典章列是藩屏䟽爵以冠于侯伯分茅以賜于山川用明至公且叶前訓南平郡王寧可封鄧王同安郡王寛可封灃王延安郡王宥可封遂王彭城郡王察可封深王髙密郡王寰可封洋王文安郡王寮可封綘王第十男審可封建王宜令有司擇日備禮冊命主者施行元和元年八月七日封周王詔顯慶二年二月詔曰昔周武垂則汾邑啟維城之固漢文承綂睢陽樹磐石之基所以作鎮邦家克隆景業早分茅土第七子顯析派天潢䟽封日觀詔令作毓粹雲峯分輝日觀風儀秀舉神識冲和挺玉質而含章振金聲而發彩夙遵一作停尊非教於詩禮方導一作遵非德於間平既表岐嶷之資宜申珪社之貺可封周王食邑一萬戸封諸郡王勑一作封皇太子大男寕平原郡王等制同前勑王者嗣統必上尊祖廟中立人紀下及諸孫所以光賛鴻猷發揮大典者也皇太子大男寧等温敏茂淑依仁游藝齠齓之嵗自降其心詩書之言夙盈於耳朕初建儲兩永固宗祧既當知子之明彌稱抱孫之慰一作尉是用依方建邑一作辨色籍一作藉土䟽疆俾奉邦家式崇藩屏本支百代冀邁一作叶於周詩子弟畢封更髙一作隆於漢室於􅃧承紫極之慶禀青官之訓惟師友是敬惟忠孝是慿以樂善為心好賢為徳古有成範爾其欽哉真元二十一年四月一作皆唐大詔令封諸王制詔令作封沔王制同前門下朕獲承天序欽若前訓用建藩輔以明親賢斯古先哲王之令典也弟景等孝友寛厚温文肅敬行有枝葉道無緇磷踐君子之中庸究賢人之義理情惟樂善志不近名慕間平之令徳希曾閔之至行是用宜分建茅土衞我邦家叶于展親永固磐石是用舉其成命錫其徽章弟景可封酈王第九弟悦可封瓊王第十弟恂可封沔王第十一弟懌可封婺王第十二弟愔可封茂王第十三弟怡可封光王第十四弟協可封淄王第十五弟憺可封衡王第十六弟悦可封澶王長男湛可封鄂王第二男涵可封江王第五男湮可封頴王宜令有司擇日備禮冊命主者施行長慶元年三月封晉王制同前門下昔周室之興也藩戚竝建式兹於維城漢氏之制也皇子畢封用固於盤石斯所以載宏丕緒惟懷永圖且茂德於本支遂推恩於嗣息詔令後嗣况某詔令無某字祗荷眷祐屬當長賢宜承寵章允膺舊典長男普㓜禀異質夙應嘉祥既表岐嶷之資日慕恭良一作日良恭慕非之性朕以寡昧䖍奉宗祧庻明父子之親以及君臣之義命以樂國錫其介珪用敷可乆之基爰叶至公之道可封晉王宜令有司擇日備儀一作禮冊命主者施行寳慶元年十一月冊梁州都督漢王元昌文岑文本維貞觀元年十二月已卯皇帝使某副使某持節冊命曰於􅃧夫易陳利建道貫三才傳稱夹輔業隆百世是以周之魯衛式固維城漢之梁趙克隆一作昌磐石惟爾使持節都督梁洋集畢四州諸軍事梁州刺史漢王元昌㓜聞教義器識聰明早開土宇禮數優隆一作崇逷矣南郊襟帶西蜀按郡之重茂親是寄持名之譽朞月有聞是用式以茅賦一作土備兹典冊爰誓山河允作藩屏朕聞曰事君盡禮資於孝敬為政以德始於仁厚故士無貴賤由之者揚名時無古今背之者殄行徃欽哉爾其執心於忠孝踐行於儉約無好逸豫以犯非禮無縱嗜欲以邇宵人眀率舊章永保疆土可不慎歟爾其至慎歟四十字一作爾其去奢從儉逺佞尊賢克勤匪懈垂憲乃後可不慎歟一作皆初學記冊潞州都督韓王元嘉文維貞觀十二年四月己卯皇帝使某官某持節冊命曰於戯肇自黄唐洎乎漢晉莫不敦睦詔令作穆親戚任用賢能咸作疆土世為藩翰惟爾使持節潞沁韓澤四州諸軍事潞州刺史韓王元嘉識量沉厚業尚脩整夙禀趨庭之訓早膺折桂之寵上黨奥壤地連秦晉開國之典攸居按部之譽允穆是用率由故實光備寵章式固維城傳之永世朕聞曰詩書禮樂仁義之府也孝友忠信人倫之基也是以河間之賢在於脩學東平之譽成於為善徃欽哉爾其覧載籍之㫖求聖賢之訓戒兹邪僻以仁厚為心朂彼怠荒以重慎為徳乃服明命詔令作明乃服命勿替敬典可不慎歟冊遂州都督彭王元則文於戲盖五等肇於帝軒周殷不改其制六條創於有漢魏晉必修其道是知選賢建戚莫先於藩衞經邦政治允資於刺舉惟爾使持節督遂普果合四州諸軍事遂州刺史彭王元則幼稱岐嶷夙禀義方褰帷汝頴之地聲績可紀建旟巴蜀之境風俗以康是用率由令典錫兹寵命傳爾子孫長為唐輔朕聞為臣子者踐行繼於忠孝處富貴者貽戚在於驕奢故能播名當時垂芳後裔徃欽哉爾其監于經籍詢于蓍龜見善如不及見惡如探湯無違禮以害身無縱欲以敗俗夙夜匪懈罔有後羞可不慎歟冊雍州牧左武侯大将軍越王泰改封魏王文維貞觀某年某月某日甲子皇帝曰於戯昔在哲后受命君臨竝建茂親以為藩衛然則古之列國今之按部循名或異立政是同皆所以共治黎元俱奨王室克隆鼎祚咸悉由之惟爾雍州牧左武侯大将軍越王泰生而韶敏㓜而好學樂善不倦才徳日新地則維城禮優分器惟彼三魏寔號五都非親勿居夹輔攸属是用命爾為使持節都督相衞黎魏洺邢貝七州諸軍事相州刺史改封魏王傳之子孫長為藩翰古人有言皇天無親惟徳是輔民詔令作人心無常惟恵之懐徃欽哉爾其監此詔令作兹格言無自驕奢無邇邪佞兢兢業業以保爾茅土可不慎歟冊洺州刺史郯王惲改封蒋王文前人於戯朕光膺寳圖欽若前典崇睦詔令作穆親之義固惟城之業並錫之以土地授之以刺舉爰誓山河永作藩翰惟爾洺州刺史郯王惲㓜稱岐嶷早聞詩禮式開土宇允備車服惟彼漢地兼舊楚作鎮之重僉議攸歸是用命爾為使持節襄州諸軍事襄州刺史改封蒋王傳之子孫長為唐輔朕聞立身之基曰忠與孝為政之本曰禮與徳行之則成名違之則䘮道詳求大訓莫此為先徃欽哉爾其祗服朕詔敦演詔令作詭經典無奢侈以乖節儉無逸豫以虧謹肅聿修厥徳垂徽於永世可不慎歟冊岐州刺史許王元祥改封江王文前人於戲盖王者受命聖人作則垂法度以經邦選賢戚以布政作屏王室莫先於胙土共治天下寔寄於頒詔令作班條惟爾岐州刺史許王元祥㓜禀義方早有志尚地惟邢晉禮優河裴疑姑蘇奥壤舊吳是宅旣建作牧必侯懿親是用命爾為使持節蘇州諸軍事蘇州刺史改封江王傳之子孫世為唐輔朕聞曰孝敬忠貞人之美行也禮讓仁恕政之善經也是以奉上者戒於邪僻御下者儆於驕傲然後能保其疆土和其民人徃欽哉爾其鍳持身之規求為邦之道尊五美而屏四惡近君子而逺小人祗畏兢兢無替朕訓可不慎歟冊紀王慎為荆州都督文上官儀維顯慶伍年嵗次庚申某月某朔某日甲子皇帝若曰於戯南紀之津上躔翼軫西浮之路旁帶巴巫信形勝之大澤是英􅂕之奥府恤隐之寄懿親攸属頒詔令作班條之美良翰爰歸左衞大将軍澤州刺史上柱國紀王慎漸天潢而含潤資日觀以摛文藝重三雍道優二陕梁地挺秀燕舘趨賢位表衘珠入光蘭猗職華分竹出美棠隂簡恵以孚聲績斯邵是用命爾為使持節都督荆岐岳朗等四州諸軍事荆州刺史上柱國紀王勲封竝如故徃欽哉夫道徳齊禮允布政之化踐孝施仁誠立身之本必宜周旋勿墜雅譽彌髙勉脩廼職對揚休命可不慎歟詔冊虢王鳳為青州刺史文維麟德元年嵗次甲子正月已酉朔二十一日己巳皇帝若曰剪商胙邑寵秩盛於隆周懲秦錫一作啟社徽名崇於有漢况乎爵窮五等榮總六條乃茂徳之攸升固非賢之罕一作而靡擇泌州刺史上柱國虢王鳳履局端嚴襟神秀整道光懿戚望重宗維恭慎之心符小言而緝譽虚凝之度包大雅而揚聲體備剛柔藝殫文武騰芳桂巘動貞韻而鏘金寫照荷池嚮清文而振玉若廼緇源廻跨岱址斜臨人被萊風俗兼齊舊布中和之化申簡恵之風觀政所先建邦斯在一作親是用命王使持節青州諸軍事青州刺史勲封如故徃欽哉王其克邁十倫稽徃賢之峻躅勤宣九德蹈前哲之英規絶浮競之津廣真淳之路光昭淑問可不慎歟一作皆唐大詔令詔冊江王元祥為鄜州刺史維麟德元年嵗次甲子正月已酉朔二十二日庚午皇帝若曰於戯列爵開基資連属而敷化班條馭宇籍藩衞而裁風是以一作知光闡帝猷發揮人極固宗庶而兼列必親賢而竝建鄧州刺史上柱國江王元祥識尚閑偉體局貞凝履順而居真一作自居冲輝一作撝而持一作待物梁臺既啟背淮之裾爰萃燕舘一作宮載闢發洧之駕相趨甄綜掩於河書精通符於沛易無道一作神遺紏察政叶寛平包吐茹之竒逓弦韋之用乃至地隣宗翼俗備一作格於五方壤密廻一作寰封潤沾於九里是用命王為使持節鄜州諸軍事鄜州刺史勲封竝如故徃欽哉懋德惟忠持盈在約思勤躬而景問無弛度以虧名宗簡正之規邁安常之節祗膺寵命可不慎歟一作皆唐大詔令詔冊周王為并州都督文維龍朔元年嵗次辛酉十月癸亥朔十七日己卯皇帝若曰夫騰華星苑崇名器於藩維慿暉日御峻寵章於侯服故本枝增蔚鴻緒滋繁而汾陽奥區鎮龍山而控逺冀方一作北非腴壤接鴈塞而䟽疆連率之寄親賢攸属咨爾洛牧上柱國周王顯風則開秀器彩靈一作虚明識表魏州之象詞掩蘭臺之駕西園孤月秀心鏡而齊鳴小山叢桂偃情田而竝烈温恭夙邵一作紹業尚日新棣萼交芬瑾璋具美是用命爾為使持節都督并汾箕嵐等四州諸軍事并州刺史牧及勲封竝如故爾其克脩天爵事一作聿苞地義方資化敷大夏恵漸京陵必宜缺社鳴桴一作缺社鳴􅀈褰帷廣聴懋宣聲績長綏福履光膺顯命可不慎歟一作皆唐大詔令冊詔殷王旭輪文維龍朔三年嵗次壬戌十二月景戍朔六日辛卯皇帝若曰於戯夫握鏡黄道經邦盛於建侯司契紫宸體國昭於宗翰故廼祚延邳疑作郟鼎之業厯峻豐社之基惟爾第四子旭輪毓景星躔遵源天漢亞重離而接耀承少海而分瀾秀質挺華一作秀實挺華芳聲金潤天人之望夙彰髫綺大雅之規􅃍形襁褓幼智該於𤣥表潜識冠於黄中舟象垂風方慙性與封蟻宣譽終謝生知是用命爾為王上柱國徃欽哉将用齊衡兩獻比迹二南彫藻珪璋粉澤仁義竹池逾浚棣屏增輝一作華受兹茅土可不慎歟一作祗慎一作皆唐大詔令詔冊殷王為單于大都督文維麟德元年嵗次甲子二月己卯朔九日丁亥皇帝若曰於戯帝子之星慿紫潯而啟耀天孫之嶽峙青路而摛光故慶表裁梧德成觀梓皇跗叡屏聲孚地軸之西儲秀英藩颷偃宸街之北冀州大都督上柱國殷王旭輪金精挺秀玉頴層敷姿表淹凝符詔令作器彩閑雅淮南之鏡混冲昭於髫辰睢陽之藻齊洪輝或作耀於綺日綠車就駕朱邸洞開牓道招英賜田期彦蕙獵清風宣芳於大雅盖承流日詔令作月澄華於髙義固以聯崇躅於河楚疊茂軌於酆郇是用命爾為單于大都䕶大都督勲封竝如故徃欽哉爾其緘訓趨庭競懐履薄方資威横鴈塞惠漸龍沙光膺朝奨可不慎歟冊汴王邕文蘇頲維景龍四年嵗次庚戌五月辛亥朔二十八日戊寅應天神龍皇帝若曰易不云乎義崇於利建書不云乎道尚於敦睦故知樹藩屏者以奉先王之言强宗室者乃歸諸父之𦙍咨爾金紫光禄大夫行祕書監檢校太尉殿中監知隴右三使仗内諸閑廐上柱國嗣虢王邕爾門膺魯拜地冠虞封本以忠孝仁義之規成乎宣慈惠和之業思窮占雨東觀漢紀沛獻王輔善京氏易永平五年少兩上以易林占之繇曰蟻封穴戸大雨将至上問輔輔曰蟻穴居知雨将至詔作沾非沛經不測其精詞髙賦月陳詩莫踰其麗匪惟政脩中夏稱於虢叔固以姻連外戚寵則吾姨遂能在位不驕鳴謙自牧造次何者寕㤀服儒從容謂之最樂為善加以望隆才位聲軼典司動則有恒静而無撓載刋三豕厨委於殺青爰捧六龍廐填於伏皁故可以榮絶乎四履位徼乎九就夫陳留者徙梁之邑在浚之郊井邑遂割於鴻溝舳艫逺通於巨壑雖帝堯遺俗國中承重厚之風而王武梁王武一作也賦非舊邦天下擅膏腴之地親既賢矣我圖爾居是用命爾為汴王於戯爾其敏厥行祗厥典思不怠畏不法取則前鍳罔貽後羞行作我唐藩以惠于汴土眷之哉其保朕之休命文苑英華巻四百四十四
