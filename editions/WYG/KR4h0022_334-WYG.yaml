body:
  text: 文苑英華巻三百三十四宋李昉等編音樂上方響二首鍾一首磬二首琴七首筝四首琵琶三首方響歌李沇敲金扣石聲相陵遥空冷静天正澄寶瓶下井轆轤急小娃弄索傷淸氷穿絲透管音未歇廻風繞指驚泉咽季倫怒擊珊瑚摧靈芸王子年拾遺薛靈芸魏文帝羙人也整鬢歩摇折十六葉中侵索光寒玲震月雜珮璫雲和不覺羅餘怨蓮峯一夜啼琴姜急節冩商商恨促秦愁越調逡巡足夣入仙樓戞殘曲飛霜稜稜上秋玉同前牛殳樂中何樂偏堪賞無過夜深聽方響緩擊急擊曲未終暴雨飄飄生坐上鏗鏗鐺鐺寒重重盤渦蹙𣲖鳴蛟龍高樓漏滴金壺水碎雹打著山寺鍾又似公卿入朝去環珮鳴玉長街路忽然碎打入破聲石崇推倒珊瑚樹長短參差十六片敲擊宮商無不遍此樂不教外人聞尋常只向堂前宴聽鍾歌梁豫章王蕭綜聽鍾鳴當知在帝城西樹隠落月東牎見曉星霧露朏朏月分明烏啼啞啞已流聲驚客思動客情客情客思欝縱横翩翩孤鴈何所栖依依别鶴夜半啼今歲行已暮雨雪尚凄凄飛蓬旦夕起楊柳尚翻低氣欎結涕滂沱鄉思無所托強作聽鍾歌華原磬天寶中始廢泗濵磬用華原石代之詢諸磬人具言其故一長老云泗濵磬下調不能和得華原磬考之乃和由是不改白居易華原磬華原磬古人不聽今人聽泗濵石泗濵石今人不擊古人擊古人今人集作今人古人何不同用之捨之由樂工樂工雖在耳如壁不分淸濁即為聾梨園弟子調律呂知有新聲不如古古稱浮磬出泗濵立辨致死聲感人宮懸一聽華原石君心遂忘封疆臣果然胡㓂從燕起武臣少肯封疆死始知樂與時政通豈聽鏗鏘而已矣磬襄入海去不歸長安市兒集作人為樂師華原磬與泗濵石清濁兩音集作聲誰得知慈恩寺石磬歌盧綸靈山石磬生海西波集作海濤平䖏與山齊長眉老僧同佛力呪使鮫人徃求得珠穴沉成緑浪痕天衣拂盡蒼苔色星漢徘徊山有風禪翁静扣月明中群仙下雲龍出水鸞鶴交飛半空裏山精木魅不可聽落葉秋砧一時起梵宮香散集作杳杳響泠泠無數沙門昏夣醒古廊燈下見行道踈柳池邉聞誦經徒使集作壯洪鍾秘高閣萬金費盡工雕鑿豈如全質挂靑松數葉殘雲一片峯吾師寶之壽中國願同却石無終極送尹補闕元凱琴歌張説見本集鳯哉鳯哉琢琅玕飲瑶池棲崑崙之山哉中國有聖人感和氣飛來飛來自歌自舞先王冊府麒麟之䑓羇雌衆雛故山曲其鳴喈喈其鳴喈喈欲徃銜之欲去未去别鸞鷺似徘徊似徘徊明年阿閣梧桐花葉開羣飛鳯歸來羣飛鳯歸來雅琴篇司馬逸客亭亭嶧陽樹落落千萬尋獨抱出雲節孤生不作林影摇緑波水彩絢丹霞岑直幹思有托雅志期所任匠者果􅇔盼彫斵為雅琴文以楚山玉錯以昆吾金虬鳯吐竒狀商徴含清音雅調感君子一撫一弄懐知已不見鍾期百年餘還憶朝朝幾千里馬卿䑓上應蕪沒阮籍帷前空已矣山情水意君不知拂匣調絃為誰理調絃拂匣倍含情况復空山秋月明隴水悲風已嗚咽離鵾别鶴更凄淸將軍塞外多竒操中散林間有正聲正聲諧風雅欲竟此曲誰知者自言幽隠乏先容不道人物知音寡誰能一奏和天地誰能再撫歡朝野朝野歡娛樂未央車馬駢闐盛彩章歲歲汾川事簫鼓朝朝伊水聽笙簧窈窕樓䑓臨上路妖嬌歌舞出平陽彈絃本自稱仁祖吹管由來許季長猶憐雅歌淡無味緑水白雲誰相貴還將逸調賞幽心不覺繁聲論逺意傳聞帝樂奏鈞天儻冀微躬備五絃願持東武宮商韻長奏南薫億萬年宜城放琴客歌并序顧况琴客宜城愛妾也宜城請老愛妾出嫁不禁人之欲而私耳目之娯達者也况承命作歌佳人玉立生此一作北方家住邯鄲不是倡頭髻䰀鬌手爪長善撫琴瑟有文章新妍籠裙雲母光朱絃緑水喧洞房忽聞斗酒初决絶日暮浮雲古離别巴猿啾啾峽泉咽淚落羅衣顔色暍不知誰家更張設絲履墻偏釵股折南山闌干千丈雪七十非人不暖熱人情厭薄一作消歇古共然相公心在持事堅上善若水任方圎憶昨好之今棄捐服藥不如獨自眠從他更嫁一少年琴歌趙摶緑琴製自桐孫枝十年牎下無人知淸聲不與衆樂雜所以屈受塵埃欺七絃脆斷蟲絲朽辨别不曾逢好手琴聲若似琵琶聲賣與時人應已久玉徽冷落無光彩堪恨鍾期不相待鳯轉吟幽鶴舞時撚弄錚摐聲亦在向曾守貧貧不徹賤價與人人不别前廻忍淚却收來泣向秋風两條血乃知凡俗難可名輕者却重重者輕真龍不聖土龍聖鳯凰啞舌鴟梟鳴何殊此琴哀怨苦寂寞沉埋在幽户萬重山水不肯聽俗耳樂聞人打鼓知君立身待分義驅喝風雷在平地一生從事不因人健闕窣雲皆自致不辭重拂絃上塵市㕓不買多讒人莫辭憔悴與買取為君一曲號靑春聽董庭蘭彈琴兼寄房給事文粹作聽董大彈胡笳聲兼語弄寄房給事李頎蔡女昔造胡笳聲一彈一十有八拍胡人落淚向邉草漢使斷腸對歸客古戍蒼蒼烽火寒大荒隂沉飛雪白先拂商絃後角羽四郊秋葉驚槭槭董夫子通神明深沉文粹作山竊聽來妖精言遲更速皆應手將徃復還文粹作旋如有情空山百鳥散還合萬里孤雲閒且淸文粹作浮雲隂且明悽文粹作嘶酸雛鴈失羣夜斷絶胡兒戀母聲川為靜其波鳥亦罷其鳴烏珠部落家鄉逺邏逤沙塵哀怨生幽音變調忽飄灑長風吹林雨堕瓦迸泉颯颯飛木末野鹿呦呦走堂下長安城連東掖垣鳯凰池對靑𤨏門高才脫略名與利日夕望君抱琴至琴歌送别前人主人有一作飲酒歡今夕請奏鳴琴廣陵客月照城頭烏半飛霜凄高樹風入衣銅鑪華燭燭増輝初彈緑水後楚妃一聲似動物皆靜四座無言星欲稀淸懐奉使千餘里敢告雲山從此始聽從叔琴彈三峽流泉歌李季蘭妾家本住巫山雲巫山流泉郊茂倩樂府作水常自聞玉琴彈出轉寥夐直似當時夣中聽三峽迢迢幾千里一時流入幽閨裏樂府作深閨裏文粹作幽闈裏巨石崩崖指下生飛波走文粹作逺浪絃中起初疑噴怒樂府作湧含雷風又似嗚咽流不通廻湍曲瀬勢文粹作意將盡時復滴瀝平沙中憶昔阮公為此曲能使仲容聽不足一彈既罷還一彈願似文粹作比流泉鎮相續李湖州孺人彈筝歌顧况武帝昇天􅇔法曲凄情掩抑絃柱促上陽宮人一作女怨靑苔此夜想夫憐碧玉思婦高樓刺壁窺一作㸔愁猿呌月鸚呼兒寸心十指有長短妙入神處無人知獨把梁州凢幾拍風沙對靣胡秦隔聽中忘却前溪碧醉後猶疑邉草白鄭女彈筝歌鄭女八歲能彈筝春風吹落天上聲一聲雍門淚承睫兩聲赤鯉露鬐鬛三聲白猿臂拓頰鄭女出參丈人時落花惹斷逰空絲高樓不掩許聲出羞殺百舌黄鶯兒宴席賦得姚美人搊筝歌羙人曽在禁中盧綸出簾仍有細筝隨見罷翻令恨識遲微收皓腕纒紅袖深遏朱絃低翠眉忽然高張應繁節玉指廻旋若飛雪鳯簫龍管寂不喧繡幕紗窓儼秋月有時輕弄和郎歌慢䖏聲遲情更多已愁紅臉能佯醉又恐朱門難再過昭陽伴裏最聦明出到人間纔長成遥知禁曲難翻處猶自君王說小名觀李中丞美人軋筝歌時量移湖州長史釋皎然君家雙羙姬善歌工筝人莫知軋用蜀竹絃楚絲淸哇宛轉聲相隨夜静酒闌佳月前高張氷引仍一作何淵淵羙人矜名曲不誤蹙響時時如迸泉趙瑟素所嘉齊謳世稱絶筝歌一動凢音輟凝絃且莫停金罍聲已闋雅聲來㳺魚噞喁鶴徘徊主人高情始為開高情放浪出常格偶世有名道無跡勲業先登上將科文章首冠諸人籍每笑石崇無道情輕身重色禍亦成君有佳人當禪伴於中不廢學飬生愛君天然性寡欲家貧禄薄常知足謫宦無愠如古人交道忘言比前躅不意全家萬里來湖中再見春山緑吳興公舍幽且閑何妨寄隠在其間時議名齊謝太傅更有携妓似東山劉禪奴彈琵琶歌感相國韓公夣顧况樂府只傳横吹好琵琶冩出關山道覉鴈出塞繞黄雲邉馬仰天嘶白草明妃愁一作怨中漢使廻蔡琰愁處胡笳哀鬼神知妙欲収響隂風切切四面來李陵寄書别蘇武自有生人無此苦當時若值霍驃姚滅盡烏孫奪公主琵琶引并序白居易元和十年予左遷九江郡司馬明年秋送客湓浦口聞舟中夜彈琵琶者聽其音錚錚然有京都集作邑聲問其人本是長安倡女嘗學琵琶於穆曹二善才年長色衰委身為賈人婦遂命酒使快彈數曲曲罷憫然集作黙自叙少小時歡樂事今漂淪憔悴轉徙於江湖間予出官二年恬然自安感斯人言是夕始覺有遷謫意因為長句歌以贈之凡六百一十六言命曰琵琶引潯陽江頭夜送客楓葉荻花秋瑟瑟主人下馬客在船舉酒欲飲無管絃醉不成歡慘將别别時茫茫江浸月忽聞水上琵琶聲主人忘歸客不發尋聲暗問彈者誰琵琶聲停欲語遲移船相近邀相見添酒㢠燈重開宴千呼萬喚始出來猶把一作抱琵琶半遮靣轉軸撥弦三五集作兩聲未成曲調先有情絃絃掩抑聲聲思似訴平生不得志低眉信手續續彈說盡心中無限事輕攏慢撚抹復挑初為霓裳後緑腰集作六么從俗大絃嘈嘈如急雨小絃切切如私語嘈嘈切切錯雜彈大珠小珠落玉盤間關鸎語花底滑幽咽泉流水一作氷下灘氷泉冷澁絃凝集作疑絶凝集作疑絶不通聲暫歇别有幽情集作愁暗恨生此時無聲勝有聲銀瓶乍破水漿迸鐵騎突出刀鎗鳴曲終収撥當心畫四絃一聲如裂帛東舩西舫悄無言唯有集作見江心秋月白沉吟放撥挿絃中整頓衣裳起歛容自言本是京城女家近集作在蝦蟇陵下住十三學得琵琶成名屬教坊第一部曲罷曾教善才伏粧成每被秋娘妬五陵年少爭纒頭一曲紅綃不知數鈿頭雲箆擊節碎血色羅裙翻酒汙今年歡笑復明年秋月春風等閒度弟走從軍阿姨死暮去朝來顔色故門前冷落鞍馬稀老大嫁作商人婦商人重利輕離别前月浮梁買茶去去來江口守空船遶船月明江水寒夜深忽夣少年事啼粧淚落集作夣啼粧淚紅䦨干我聞琵琶己嘆息又聞此語重唧唧同是天涯淪落人相逢集作悲何必曽相識我從去年離集作辭帝京謫居卧病潯陽城潯陽小處無音樂終歲不聞絲竹聲住近湓江地低濕黄蘆苦竹遶宅生其間旦暮聞何物杜鵑啼哭猿哀鳴春江花朝秋月夜徃徃取酒還獨集作自傾豈無山歌與村笛嘔啞嘲􅑜難為聽今夜聞君琵琶語如聽仙樂耳暫明莫辭更坐彈一曲為君翻作琵琶行感我此言良久立却坐促絃絃轉急凄凄不似向前聲滿座重聞皆掩泣就中泣下一作淚誰最多江州司馬靑衫濕琵琶行牛殳何人斸得一片木三尺春氷五音足一彈决破真珠囊迸落金盤聲斷續飄飄颻颻寒丁丁蟲豸出蟄神鬼驚秋鴻呌侣代雲黒猩猩夜啼蠻月明潏潏汨汨聲不定胡雛學漢語未正苦似長安月蝕時滿城􅃻鼓聲噒噒靑山飛起不壓物野水流來欲濕人傷心憶得陳後主春殿半酣細腰舞黄鶯百舌正相呼玉樹後庭花帶雨二妃哭處山重重二妃沒後雲溶溶夜深霜露鎻空廟零落一叢斑竹風金谷園中草初緑石崇一弄思歸曲當時二十四友人手把金盃聽不足又似賈客蜀道間千鐸萬磬鳴空山未若此調呦呦􅀆啁啁嘈嘈􅀆啾啾引之於山獸不能走吹之於水魚不能遊方知此藝不可有人間萬事憑雙手若何為我再三彈送却花前一樽酒文苑英華巻三百三十四
