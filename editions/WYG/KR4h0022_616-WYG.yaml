body:
  text: 文苑英華卷六百十七宋李昉等編刑法一刑法表凡三卷英華所編失年代先後今正之諫将殺櫟陽尉魏禮臣表一首論薛子雲等表一首諫侯君集等下獄表一首見六百九十七卷諌大赦後遷配王世充竇建徳黨與表一首論廢宫官屬表一首請更不窮逐竇智純表一首請停春殺高敦禮表一首論刑獄表二首諌将殺櫟陽尉魏禮臣表太子朱子奢臣伏見櫟陽縣魏禮臣為斷河池一作池陽縣令崔文康事失情奉勑解任禮臣不伏詣堂上表稱御史阿曲請更推問若一事有虚乞戮都市大理奉勑更為勘當今大理奏禮臣枉御史不阿勑令依其折辯賜以極法伏尋禮臣斷事乖僻正合解免不知甘罪吞聲更復上聞天聽恩勑重問虚實乃確執不移論其愚蔽朝野同忿然陛下君臨萬㝢子愛蒼生一無失所載懐夕惕矜愚泣罪帝王盛事乃至如此禮臣横訴止當上表不實律有明條今便賜以極刑恐傷過重且死者不可復生斷者不可重續縱欲思諐改謬安可得乎所以矜獄念刑歴代斯重又聞禮臣母氏年齒極髙餘生垂迫前途無幾一旦逢此情何可言伏惟陛下日昃忘勞申理寃屈所以四方士庶咸凑闕庭今欲遂殺禮臣悠悠之徒惟言禮臣上表被誅不知愚昧獲死後有欲自理者必懐此懼恐容納之道或有所虧謹以奏聞伏聽勑㫖論薛子雲等表太宗顔師古臣師古言伏見宣勑别将薛子雲竇善衛二人釋禁引見此實陛下聖徳寛仁垂恩宥過固非愚慮所能測量然臣之區區竊有管見犬馬微志不敢隠黙臣聞殺生威權帝王之所執而憲章法律臣下之所奉子雲等身居五品足知禁令捕獲罪人已就拘執計其本犯又非死刑遂乃違法恣心擅行殺戮是無憚也詐云格殺表奏求賞是罔冒也陛下付法司推窮事須歸實而逓相枝蔓一作雲搜希冀恩澤挾偽于真是要君也自古節義之人亦有讓死之事皆為臨危遇厄事不獲已愛敬君親亡身棄命豈如子雲等明白故犯懐詐藏姦朋黨比周違經亂法於義無所取於禮無所勸其罪不可恕其源不可開且法司之體職當察獄義無縱濫不得阿容二人雖則讓辜主司須定實罪不言殺人之道何者合坐專述相讓之辭以為盛美亦非守職務據正法也若使二人皆承則不知罪之所在如其二人並諱復欲何以斷之臣聞愚者之言聖人擇焉脱有可採伏願許察輕塵聴覽伏増戰慄諫侯君集等下獄表見六百九十七卷岑文本諫大赦後遷配王世充竇建徳黨與表太宗孫伏伽臣聞王言無戲自古格言去食存信傳舊唐書作聞諸舊典故書云爾無不信朕不食言又論語云一言出口駟不及舌以此而論言之出口不可不慎伏惟陛下光臨區宇覆育羣生率土之濱誰非臣妾絲綸一發取信萬方使聞之者不疑見之者無惑陛下今月十唐書無十字二日發雲雨之制光被黔黎無所間然公私蒙賴既云常赦不免者皆赦除之此非直赦其罪亦是與天下斷當許其更新以此言之但是赦後即便無事因何王世充及建徳部下赦後始欲遷之此是陛下自違本心欲遣下人若為取則若欲子細推尋逆城之内誰無罪者唐書作人誰無罪故書云殱厥渠魁脅從㒺治若論渠魁充等為首渠魁尚免脅従何辜且古人云跖一作蹗狗吠堯狗吠二字一作盖非其主在東都城内及建徳部下乃有與陛下積小故舊編髪友朋猶尚有人敗後始至者此等豈忘陛下皆云被擁故也以此言之自外踈者竊謂無罪又書云非知之艱行之惟艱上古以來何代無君所以祗稱堯舜之善者何也直由為天子者實難善名難得故也徃者天下未平威權須應幾而作今四方既定設法須與人共之但法者陛下自作之須自唐書作還須守之使天下百姓信而畏之今自為無信欲遣兆人若為信畏哉故書云無偏無黨王道蕩蕩無黨無偏王道平平罪賞之行逹乎貴賤聖人制法無限親踈如臣愚見王世充建徳下偽官經赦合免責情欲遷配者請並放之則天下幸甚論廢宫官屬表太宗許敬宗臣聞先王慎罪務在一有於字恤刑徃哲寛仁義在一有於字宥過聖人之道莫尚乎一作干兹竊見廢宫官寮五品以上除名棄斥頗歴温寒一作嵗時但庶人疇昔之年身處不疑之地包藏悖逆隂結宰臣所預姦謀多連宗戚禍生慮表非可防萌宫臣一作内官僚逈無關預今乃投䑕及器孰謂無寃焚山燬玉稍同遷怒伏惟陛下至徳欽明哀矜庶類聖情㝠感昭格上𤣥是天監孔明重申靈命神襟喜悆恩加率土爰詔寛鞫覃被普天惟此數人未沾洪造伏尋先典例有可原昔呉國陪臣則爰絲不坐於劉濞昌邑中尉則王吉免縁於海昏譬諸欒布乃䇿名於彭越比乎田叔亦委質於張敖主以兇迷悉陷一作陷其誅夷臣以賢良皆荷一作荷彼收擢歴觀徃代此類尤多近者有隋亦一作又遵斯義楊勇之廢罪止加於佞人李綱之徒皆不預於刑網古今裁其折衷史籍稱為美談而今張𤣥素令狐徳棻趙𢎞智裴宣機蕭鈞等並砥節礪操有雅望於當朝經明行修播令名於天下或以直言而遭箠朴或以忤意因一作而見猜嫌一槩雷同並罹天憲恐於王道傷在未𢎞臣早預藩寮深蒙録舊趨馳左右二十餘年伏見絲言每求輿誦所懐狂狷輕敢以聞一作皆舊唐書本傳請更不窮逐竇智純表太宗褚遂良臣遂良言竇智純不自循名陷於險薄既是陛下近親由來之所詣委然智純戚屬使任女為王妃結髪從戎實惟故舊書言昔在唐堯以親九族陛下憲章前事自須進退以禮方今刑網寛大不以疑罪與民𢎞基所注箭射舎中事已非實智純自藏獨樹狀又難明所以刑部大理各相得失陛下已出智純為開州刺史便是貶責正當處分已畢今之餘事只是窮逐語言但智純戚屬貴望親姻既蒞職居官布在朝野相逢談説言議是常兼復其婦積病在床命懸朝夕即日刑部官司及在朝士皆不欲陛下更窮此事設令實推得智純自藏獨樹誣𢎞基家人刑名指歸殊非重大况又事跡曖昧猶未分明若久窮逐便成苛細生於物議虧損至徳如臣愚見伏願更施天澤赦其所短情存故舊不失善聲即日在外議論如此臣猥居諫職不敢不聞塵黷聽覽伏増戰慄請停春殺髙敦禮表高宗薛元超臣某言臣䝉非分恩澤一朝拔擢至此跼影兢魂惟思報效伏惟天皇開直言之路不棄芻蕘臣之區區敢陳㣲欵伏見近日奏揚州人高敦禮詐宣勅乗驛馬採藥其日奉進去不得至秋即决敦禮犯狀實當萬死但以罪非惡逆據法合至秋分臣聞聖人者徳配二儀則天之為政今既勾芒戒序時屬發生禮稱仲春之月無焚山林言順陽而養物也仲秋之月申嚴百刑亦順隂而肅殺也古人有云姦偽者與造化俱生自然之氣也是知掩義隠賊出自帝鴻毁信廢忠生於少昊以今海内之廣何得全無姦偽天皇踐極以來恒已寛仁被物故中外禔福區宇乂安以太平之時闡和平之化若其政察非所以一作謂上遵𤣥老之風伏請稽諸彛典暫廻聖慮臣識不及逺輙申愚見懼不瓦合伏増戰慄論刑獄表文粹作諌除濫刑䟽武后朱敬則長壽中臣聞李斯之相秦也行申商之法重刑名之家杜私門張公室棄無用之費捐不急之官計日受功一作惜日愛功疾耕急文類作亟戰人繁國富遂一作乃屠諸侯此救弊之術也故曰刻薄可行於進趨變詐可陳於攻戰兵猶火也弗戢将自焚也既而二字作况一鋒鏑既一作已銷石城又毁即一作諒可易之以寛大一作泰潤之以淳和八風之樂以柔之三代之禮以𨗳之秦則不經一作秦既不然淫虐滋甚徃而不返卒至土崩此不知變之禍也陸賈叔孫通之事漢王也當滎陽成臯之間糧饋已窮智勇俱困不敢開一説効一竒惟進豪猾之材薦貪暴之客及區宇適平干戈尚戢金皷之聲未息傷痍之痛尚聞二子顧盼雍容綽有餘態乃陳詩書説禮樂開王道謀帝圖高皇帝忿然曰吾以馬上得之安事詩書乎對曰陛下馬上得之可馬上理之乎髙皇黙然如是陸賈著新語叔孫通定禮儀始知天子之尊方􅁴帝王之貴一無此句此知變之善也向使高皇排二子而不收一作恐非教置詩書而不顧重攻戰之吏尊首級之材複道争功張良已知其變拔劔擊柱吾屬不得無謀即晷漏難踰何十二帝乎亡秦是續何二百年乎故曰仁義者聖人之蘧廬禮經者先王之陳迹然則祝祠文粹作辭向畢芻狗須投淳精已流糟粕可棄仁義尚捨况輕此者乎自文明草昧天地屯䝉三叔流言四㐫搆難不設鈎距無以應天順人不峻一作知刑名不能文類作無以摧姦禁一作息暴故置神匭一作器開告端曲直之影必呈包藏之心盡露神道助順一作直無罪不除人心保能文粹作寧無妖不戮以兹妙筭窮造化之幽深用此神謀盡一作入天人之秘術故能計不下席聴不出闈蒼生晏然紫宸易主大哉偉哉無徳而稱也豈比造功鳴條大戰牧野血變草木頭折不周可同年而語乎然而急趨無善迹促柱少和聲拯溺不規行療饑非鼎食即向時之妙策乃當今之芻狗也伏願鑒秦漢之得失考時事之合宜審糟粕之可遺􅁴蘧廬之須毁見幾而作豈勞終日乎陛下必不可偃蹇太平徘徊中路伏願改法制立章程下恬愉之詞流曠蕩之澤去文粹作㫁萋斐之牙角頓姦險之鋒鋩杜告宻之源絶羅織之跡一作窒羅織之源掃朋黨之跡使天下黎人一作蒼生坦然大悦豈不樂哉一作皆舊唐書本傳同前武后徐堅臣聞上天之道先春而後秋聖人制法外刑而内禮故知三辟之設王者不得已而用之今帝命惟新六合光宅逺無異望邇無異言亦宜安彼反側示以寛典臣竊見神都諸部勘當所尋有勑停勑迄至于今猶尚追攝豈非勘當使等志希僥倖執斯刻薄以為已能哉長姦濫之源傷醇和之化伏願即停之臣又聞書有五聽慮失情實也令著三覆恐致虚枉也比見有勑勘當反逆令使者得實便决然人命至重死不可生儻萬分之中有一不實欲訴無路懐枉誰明飲恨吞聲赤族從戮豈不痛哉此不足以肅姦逆而明典刑適所以長威福而生疑懼臣望絶此處分依法覆奏則死者甘伏知泣辜之恩生人歡悦見詳刑之意又法官之任人命所懸若不簡擇恐招枉濫諸官僚之内有用法寛平為衆所稱者願親而進之處事深酷不允民望者願踈而退之囹圄無寃億兆幸甚臣又聞罰不及嗣虞帝之明規罪不至孥漢君之茂徳故郤芮作亂而郤缺登朝嵇康被刑而嵇紹入用終能立功白狄効死湯隂千載美談斯為稱首父子猶其若此餘親尚何疑哉竊見逆人之親選曹廣責無親無服亦數十條士子之中十將三四今聖人在上寳命惟新有道賤貧實為深恥遂令此等長從遐棄懐才抱器将何望哉是以聖意哀矜頻䧏恩制令同常例各使坦懐姚璹之徒皆逢委任而在下僚列不識天心茍求微疵不𢎞大體又凖勑逆人周堂親不得任京官及兩畿三輔官凖法刑戮緦麻親不得充近侍宿衛臣望申勑有司勑令逆人外不得輙為勘責收其賢能示之曠蕩斯巍巍之徳作範百王穆穆之風垂裕千祀伏惟皇帝陛下二儀合徳百姓為心一物不安納惶興想竊見關西户口負募赴都聖㫖含𢎞不言差送是以樂住之色數萬餘家受使之人茍徼勞効務選高户抑此陪郭然高户之位田業已成安土重遷人之恒性使者强送黽勉進途一人怨嗟或傷和氣數千餘户深宜察之臣望令檢勘先投牒樂住者並令赴都其差定陪郭者各任還貫若神都須人雍同等州先有工商户在洛者甚衆令檢括兼簡樂住之人微有資財情願在洛城者並酬其宅舖之地令漸修立則洛城不少於邑户黎庶得安於本業此管子所謂順於人心施𢎞均養之人則臣希冀痊平有朝覲之望容居散秩免負乗之􅄽無任悃迫之至文苑英華卷六百十七
