body:
  text: 文苑英華巻八百十五宋李昉等編祠廟下唐寳應靈慶池神廟記一首洪州西山風雨池記一首楚州新修吳太宰伍相神廟記一首歙州重建汪王廟記一首茅山白鶴廟記一首新修四皓廟記一首修黄魔神廟記一首祈禱禱河侯廟一首禱聦明山記一首祠廟下唐寳應靈慶池神廟記張濯天有五星辰居其一地有五材水為之首既作鹹以正味亦凝質而成鹽則横目之人生齒之嵗罔不資焉而後食矣鹽之為用大矣哉寳應靈慶池者山海經所謂鹽販之澤也俗稱官號皆曰鹽池供華夏二十餘州宅黄河千里之曲北抱原勢南負山隂涵濡泓澄浸漬舄鹵外無寸草内絶纎鱗水或紫赤鹽皆潔白有自来矣頃大厯丁已秋雨成災凡厥井疆漫為塗潦今京東和糴使兼知河東租庸鹽鐵侍御史清河崔公陲時以監察權領一作顧税是邦憂國卹人籲天有禱乃徴畚鍤集役徒修隄防導溪澗積溜鴻湧白波如山西迤北滙散于􅃿女監一作鹽斯池町畦不沒廬室獲全繄公是頼矣粤翌日亦既開霽紅鹽自生盈掬傾筐或繭或栗形攒伏虎色澈丹砂靈貺休徴古未之有公乃獻状于户部侍郎韓公滉韓公伏奏于代宗代宗俾諌議大夫蔣鎮覆之則編于史册薦于郊廟矣與夫白麟赤鴈之應野蠶穭榖之祥何以異乎冬十月詔錫池名曰寳應靈慶兼置祠焉盖國家祈豐財旌瑞貺也其明年因厥農隙創茲神寢卜津涯六十三之半當安解二大邑之間捄陾陾椓橐槖工惟力競役若子来俄結構以特起􅌂塗塈而斯畢然後審像設煥丹青睟容穆如甲士贔屭則聦明正直之有憑也夫其洞户南豁滄波淼然樹以修槐羅以香草則風凉㑹舞之有所也又来嵗已未夏五月九日天子降中貴人以牲牢祀之制祀光臨衣冠列位秩齊四瀆禮視三公亦為盛矣其後西自闗輔東踰崤澠南馳陜服北走絳臺馬屯雲車流水乞靈報徳可勝紀乎易曰聖人以神道設教而天下服此之謂也遂遷公殿中侍御史京東和糴使逮于斯任豈唯執憲簡頒鹽政三字一作頒鹽之政令必將秉造化應鼎之和羮人皆望焉神所勞矣濯客自東鄙觀藝而来美精誠之動天多築䕶之盡力輙採聞見題于樂石庶丕績不朽與池始終時建中二年秋八月記洪州西山風雨池記權徳輿山林川谷能出雲為集有風字雨皆曰神諸侯在其地則祭之鍾陵風雨池在山西集作西山洪井之北發源山椒𣲖分脉散清淺數里匯歸于兹石壁峭絶泉流其下信乎精氣之所囬復風雨之所蓄池邦人敬嚮相傳名之並山北下二十餘里有望祀之地祠宇以神之蘋蘩以薦之祈農望嵗於是乎在祀之豐約在徳之輕重報之遲速視誠之薄厚大夫李公理江西三年寛仁清浄正徳利用以黄韓篤厚之化易吴楚剽輕之俗里閭之間歌頌集作誦相聞嵗在丁卯六月大旱公廑身焦思所以救之之道撰日潔誠有事于神齋心夕往艤舳宵濟厥明至于山下達于祠亭集作宇精誠旁魄靈貺交感通山澤之氣致隂陽之和和氣薰然蒸為時雨未徹奠而繁隂起不崇朝而甘液遍蕩洒疵癘布之休和自時厥後庶徴咸若茂遂生物登成甫田而所治七諸侯如公之誠各修其封内之祀化彼災沴為釐為福其或散為祥風結為卿雲紛綸葳蕤奔走来告繇是九江之西嵗用大穣昔董仲舒推隂陽啓閉之數相區區江都之地用無饑年前史書之况我公察廉八郡政成化洽人有頑薄之俗以誠革嵗有水旱之沴以徳勝庶富斯民如此之盛也春秋時國有史氏君舉必書徳輿從事于公記事之徒也以公之仁池之神明徳參㑹若合符節是用追琢巖石俾邦人識之時貞元三年八月庚子記楚州新修吳太宰伍相神廟記盧恕捨人事而介福專人事而薄神皆君子不為也茍不以仁惠愛民而止以墮怠理道持甘酌芳饎以交神神在聰明正直豈許之乎若憂勤焦思訪接無怠於賢人且不遺况賢神乎所以大徳君子以厚人故不薄神也楚州以一作比淮壖涘太宰伍相廟置在一作自吴時臨邦溝當伐越時為餽運所開太宰經畫及因讒而沒其神憑大波雄憤無所泄蓄為猛颷駭衆吴人恐之故相與立祠邦溝上歴代皆崇其祠椎牛釃酒小民有至破産者北齊清河王勵刺一作判此州申教部民不冝荒瀆非神之意其風稍革國朝龍朔中為狂人郭行真所焚乾封初凖勅重建大中十載四月十八日上以山陽荐災當宁憂軫曰非朝之顯徳清望有材者不可分吾憂子衆姓於是詔兵部郎中滎陽公守郡立政行道得民之心每雨小差期晴少失候公一至請之靈貺立答連嵗豐穣豈一作得非神之隂賛耶舊廟菆隘淺廹前横岸道塵坌玷䙝公黙圖將顯大之且俟誠化更廣即増張神宇俄有州人蔣容者啓公請合財葺之殆天啓乎何㝠契如是耶於是開其前伸其後重肖神像及儀從等畢新廟之域一作成也面河距淮巖然崇堂蜿然修廊像設新而英姿益明旂旓新而靈衛愈嚴庭可以長布武階可以勞拾級管簫朝奏一何和神也風月夕清一何宜神也祭法曰夫日月星辰民所瞻仰也山陵林谷川澤民所財用也今太宰之髙不啻星辰太宰之利不啻山谷彼青骨而邀食於民者豈得同日而語洎詔徴公為左諌議大夫釋符之日恕䝉公付以留務行及祠前顧謂恕曰有事或誠存太宰其應也如響今去能無感焉君代我編其修建之由恕謹奉教一無偽飾公之始至也承菑沴之後墟一作廬井殘矣廪藏空矣道既殭殍牢亦充塞及公之布徳也四時洽暢千里醉歌帑廥皆溢庭無訟人鄉縣郭邑致十倍之繁富廟宇亭肆興萬堵之宏麗休祥表見仁聲流揚傳車云歸耆少遮道竟夕不得前雖古之良二千石實有慙色素負謙損不先之道至於理功皆不欲人言恕親吏也其可隠而不書巨唐大中十二年七月十一日記歙州重建汪王廟記汪台符天不欲盖地不欲載兩曜不欲凝萬根不欲生玉石一塵賢愚一丘則神人不得不䧏聖人不得不作我唐不得不興越公不得不起起而不失進退存亡者越公得之矣隋鹿無主羣雄率舞公矯翅一鳴聲著千古提山掬海沃沸填危掃平反側之源歸我唐虞之際武徳四年髙祖下制曰汪華往因離亂保㩀州郡新安志作郷鎮静一隅以待寜晏識機慕義志作化逺送欵誠宜從褒寵授以方牧可使持節歙宣杭睦􅄔饒等六州諸軍事感天人知已瞻玉闕言懐龍劔一沉死而不朽貞觀二十三年也有棠樹之詩無良吏之歎固得父老請建祠堂在㕔之西大厯十年刺史薛邕遷于烏聊東峯元和三年刺史范傳正又遷于南阜即今廟是也中和四年刺史吴公圓克荷𡨕應復新棟宇迄今司空潯陽公景慕英塵經始靈宫凡三遷飾物不告勞民惟求舊濟于時死於國功宣教化則祭之其餘不在祀典狄梁公按察江淮焚淫祠七百所朝野韙之所謂能執干戈以衛社稷越公欲盖而彰雖焚不可得矣且湯不乾堯不濕曷顯聖人之政唐歴十有九帝二百八十年其時間有奴狂僕醉觸破王化洎僖皇嵗庚子盗起曹南逆塵犯蹕我淮王大呌義聲千里奔命宣池濠夀滁和六郡統一作繞我馬箠分我君憂茍無將將之雄莫破錚錚之膽我司空潯陽公獨危一作陶雅嘗為歙州刺史二十年仁義禮樂餌舒池常潤於歙最為政第一慰本城之人築乆長大本豈矜莊嚴一作壯麗一祠企望六郡直在乎開物成務遺民金石者也台符越公之裔潯陽之吏祖能神主能賢辭或不直作神之羞辱主之命詔我邦人同歸典實庶可與言文論政矣龍集壬戌十二月十有一日謹記茅山白鶴廟記栁識茅山舊句曲也本記云内有靈府空通五岳其外山形似已因名為句曲自軒轅鼎湖之後世多近智所謀一作漸闇真有故金闕玉清大聖至神一作誠之事真靈時闡於人間以彰道妙則漢元帝世有茅君積襲道徳来受仙任逰内統外澤加幽顯邦人瞻戴因改為茅山𤣥教既漙二弟亦此山得道三峯是三君駐雲鶴之所備詳傳記至明帝永平二年詔勑修崇其廟後代相承一作傳罔敢或替我國家纘承真曹宗奉至教一作𤣥門天寳七載五月十三日於山之西偏制置祠宇度道士三人以修時醮列在祀典夫廟享功徳顯黙殊致以道而言則天地之外亦有覆載隂陽之外亦有生化斯乃虚而有象運而無形盖顯為皇王師範道之形器也隠為貞靈變化道之精微也體雖隠顯心則感通有無交暢化乃大備初真人既受羽節留二弟於句曲而謂之曰吾今去便有局任不得數相往来要當三月十八日十二月二日邀師攜友以来遊紛有好道者待我於是乎吾自當科之有以相教則法之本也内習精真冲寂外行㢘清仁惠每嵗春冬皆有數千人潔誠洗念来朝此山自漢至今宇宙間潛修精感轉自一作相化誘其可勝紀乎若然者我真人𤣥功聖徳隂隲妙用豈言能盡歟夫學道則所見無有不忘得道則所忘無有不在多冺迹於常或標靈引類不顯定一理始曰無方之用孰知終極是知聖人情忘愛存慈勸不已益見道之至也真人昔將輕舉俯視六合虚徐翔翺於是綵雲自異靈鶴自至昔亦如天之運行日月為照星辰為曜則日月星辰為天地光大之用天豈有之自是真富也綵雲靈鶴為真聖昇虚之用聖豈待之自是真貴也世之賢士髙位濟俗乃無意於車輿道之真仙孕元育化寜有意於雲鶴廟者亦如人思邵伯而愛甘棠也道士容行延生法成韋崇珣等經營修奉嵗月乆矣願刻金石以志于山唐大厯十三年太嵗戊午三月十八日記新修四皓廟記國之所以病者在乎名分差賞罰謬賤妨貴孽代宗河决樹顛可拱而俟夫聖人作則必建皇極叙彛倫植禮為防坦順為路使尊有定位下無覦心春秋垂子貴母貴之文年鈞徳鈞之説姪娣審於左右文質殊其後先等威著明條貫纎悉選師保以教之設疑丞而輔之春誦夏絃一物三善故刑于寡妻文王之所以正家道也抗法伯禽周公之所以致頌聲也昔申后黜而小弁賦子朝寵而王室亂獻公從筮晉祀如綫楚建遇讒芊姓累棋列于格言垂作殷鍳漢髙皇帝提三尺劒奮布衣夷秦剪項南靣而帝及乎踈孝惠私趙王本根一摇海内失望向使安車空駕羽翼不来蹈金寒玦離之蹤成母愛子抱之計四百之祚岌乎殆哉非四公之髙名不能割漢祖肌膚之愛非留侯之竒䇿不能振大賢金玉之音然而顯晦異宜語黙殊用塗山玉帛有櫛風沐雨之勞陋巷簞瓢無被髪纓冠之責兼濟獨善相與背馳唯四先生兩有之矣往者明祠頽壊靡有孑遺太傅兼中書令許國公爰命經營不日而就棟宇甚羙神形若生如裁兎鹿之書似指狼羊之喻松凉桂燠雲白霞丹坐視天倪時聞地籟公秀發人瑞雍容國楨一作禎本於忠孝文以禮樂每絶編而嗜學常吐餔一作哺以迎賔至于戡定之懋勲㢘察之殊政則銘於彛器藏在史官宜有如季文子者請之太史克者詩之非昧者所宜造次道也公以為四先生避秦亂逃漢禄而所立利澤如掲日月彼佩金印乗朱軒食萬鍾潤九里而括囊避事全軀保挐一作拏疑作孥聞四賢之風可以有立志矣故公之飾是廟也見聖王固本之制焉有詩人伐檀之志焉豈特燭耀巖穴旌賁隠淪而已光化二年十月一日記修黄魔神廟記袁循咸通末嵗今翰林舎人蘭陵公自右史竄黔南秋八月二十七日泝三峽次秭歸時蜀水方漲横濤蔽目公積悸而寢夣神人赤髪碧眸且云險不足懼公異之再寐一作寢又夣公詰其所自則曰我黄魔神居紫極宫之隅將祐助明公出于北境公曰吾斥去荒徼危殆未巳神能惠我何也以朝夕期幸與我俱遊與我不忘矣亟一作巫言之神許諾自是抵于黔又遷于羅每陟險艱神怳一作况如在洎公遷于朝神夣告歸公曰將設一作移廟列塑于宫之傍丁酉嵗公從弟兟自澧陽尹亞西蜀路出祠下以囊金致公意謂前制不專請别修敬太守清河公承命感異親營之心匠既陳層軒以新神樂来斯靈儀蹲蹲按靈寳經南方有大魔其中央曰黄天魔王横天擔力謂能力扶昊蒼周覆萬有天其或者以公有𢎞濟之業將扶危定傾作鎮天歩俾黄魔䧏鍳為公之兆朕乎噫天為功必藉於大賢神之靈固輔於有徳是必有鴻猷盛績萃于公之心未可知也循以學官涖秭歸奉太守命弗敢譲所記乾符丁酉嵗仲春九日司户叅軍袁循記祈禱禱河侯廟記裴䖏權明皇帝懐柔百神以功躋四瀆蒲股肱郡實祠宗繇是剗舊圖新廟貌甚設國有祀典蒲侯職之然天下郡縣瀕于我者多曲架榱桷廟神乞靈滑臨洪波神有寜宇且曰瀆古侯也故神以侯稱六年夏不雨尚書博陵崔公懼茲農事凡明神靈跡有可以膏稼穡者必命犠牲簫皷以動之卒無應一旦監軍使閻公曰郡瀕河侯廟具存姑用旱禱宜斡流以蘇大田五月庚午公㑹閻公幄河壖列旌斾率府從事合牙門諸將郡縣吏羅為侯拜聲以具樂釃以清觴腥爓燔炙苾芬交錯版書精意以聳侯聽六月辛未雨乙亥始霽自乙亥至於秋七月壬子以烈日下燭南畝復燥公曰時雨難再將奈秋成何閻公曰河侯利吾州前應如答吾且祈且報庶終侯功癸丑公復㑹閻公儀若庚午丙辰雨已未乃霽噫公禱之䖍神應之速禱不䖍無以徼侯貺應不速無以協農時既貺既應多稼織野寒耕熱耘之子其有京坻之望乎昔王尊捨熊軾卧金堤却驚波也公仗戎鉞禱于河濵勤甘雨也驚波縮所以完居邑也甘雨零所以遂嘉榖也則知前賢後賢之推誠濟物脗一作泯若符契矧乎食民天也宜拜侯賜閻公揖曰齋誠以動神者尚書公之徳也公揖曰始謀而獲應者將軍氏之力也於是相與拜宇下或曰昔嵗河流汜濫將魚滑人滑人祝侯駭浪帖息今者拜侯賜未若記侯之感通公乃召從事河東裴䖏權文其功客有博陵崔應書于石㑹昌六年九月一日建一作記禱聰明山記盧頊聰明山之神盖俶落上古不知其始興也一作其所自興也若曰禍淫之謂聰降祥毓物之謂明美稱備焉取名斯在觀夫羣山逶迤自西北而茲鎮秀㧞屹臨東夏揖岱宗於逺邑延旭日於髙標豁開廣平千里如砥靈源森麓廻合窈𡨕禳祈必徴􅆄蠁如覩祀典曰山川丘陵能出雲為風雨有功及物曰神諸侯在其地則祭元和丙戌嵗右僕射范陽王總戎之三年詔自上黨撫廵東封登車誓師講若畫一萬旅齊列千輪北一作比衝振蕩林巒翩翻斾旌雷動雲馳不聞人聲公清明在躬文武是憲翼聖濟俗宣威靖難申伯旋謝太公祖齊華夏具瞻今古榮觀冬仲月生魄至于茲山齋莊廟庭躬執祀事於是大備控掲畢陳犧牲神之格斯歆我明徳君子曰惟精誠通乎神惟聰明應乎人天地交泰而賢人用神人和叶而茂勲立公之舉也神之助也不然何年祀未幾而變化神速臻於是耶故記曰天䧏時雨山川出雲又曰赫赫厥聲濯濯厥靈其在於公乎頊謬職分符今逾一紀獲奉威命舊邦惟新黎庶其蘇邦家之慶祝公夀考永固河山夫言而無文行之不逺乃刻石以紀傳於後人自公及監軍使幕客郡守列將等咸載名氏云元和四年七月九日記文苑英華巻八百十五
