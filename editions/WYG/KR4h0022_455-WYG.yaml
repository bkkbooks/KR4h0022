body:
  text: 文苑英華巻四百五十五宋李昉等編制書八節鎮四授韓𢎞河中節度使制李紳門下王者統馭萬㝢緝熙庶政必有文武全器柱石之臣出壯藩岳入和台鼎使其效彰中外聲播華夷所居而人心自寧所莅而軍令自肅充自任者其惟至公開府儀同三司守司徒兼中書令上柱國許國公食邑三千户韓𢎞受天地凝粹之氣得山川崇深之靈厚其體而壯詔令作莊其容虚其心而宏其量早洞戎韜之學乆膺莭制之權隠然大梁克有成績及功宣盪冦志展勤王懇申戀闕之誠竟遂來朝之禮位髙百辟榮冠一時恩極而愈恭名光而益勵朕方欲樹以垣翰仗乎忠賢乃睠闗河之首詔令作守實惟股肱之郡自昔重寄無非元勲是用命以上公復茲雄鎮於戯頃居東夏父子偕分閫之榮今處近郊伯仲並登壇之貴道茍積於忠實頋何愛於寵章往惟欽哉副我明命可守司徒兼中書令河中尹充河中晉絳慈隰等州節度觀察處置等使散官勲封如故主者施行授栁公綽襄州節度使制蔣防門下江漢之間襟帶之重歴考前載咸稱上游濵七澤之川源為一方之都㑹撫封命帥匪易其人朕所以屬意忠賢達于寤寐思𢎞至理暢合一作洽元元是用選茲㢘平付以疆土允叶僉議庸歸至公銀青光禄大夫尚書左丞相柳公綽儒門令緒文苑𢎞才器含剛堅質抱沉厚臨事有斷龍泉挺霜雪之鋒處身無瑕大玉藴雲虹之氣間者擢居臺閣累守方隅長沙流易簡之風鄂渚肅皷􅎏之令及典司饋運牧長京畿銓綜度官紀綱百度咸能舉其典則奉以周旋顧惟公忠朕所嘉尚今乃命爾仗茲旌旄鎮峴首之城池撫襄陽之耆舊於戯昔羊叔子以寛厚𢎞其化杜征南以文雅播其猷人到于今往往稱歎勉爾終始嗣乎風流罔俾二臣獨輝專羙霜臺峻秩人部榮班載光超擢之恩式崇連帥之拜服我嘉尚爾其欽哉可檢校户部尚書襄州山南東道節度等使授王宰髙承恭田牟三道節度使制封敖門下朕常日出視朝與三四宰臣百辟卿士詳求理本期臻大和矧軍旅之事豈忘念慮古者命將必登壇告廟推轂授脤所以示專征之任也况許昌宜禄鄜疇三鎮之重一時所難誠當注意之求俱承並命之選銀青光禄大夫檢校工部尚書兼御史大夫充邠寧節度觀察處置等使上柱國大原郡開國公食邑三千户王宰誠貫金石秀鍾山河文該禮義之源武服鈐符之奥銀青光禄大夫檢校右散騎常侍兼右金吾衛大將軍御史大夫充右街使上柱國渤海郡開國公食邑二千户髙承恭心澄水鏡嚴奪秋霜㓜知仁義之方壯慕功名之業朝散大夫豐州刺史檢校工部尚書兼御史大夫賜紫金魚袋田牟風雲應兆鵰鴞當秋素懐摶擊之威夙負騫騰之志而皆公台令嗣勲閥才人奉嚴訓以承家推大忠而許國游心百氏有志四方知山川險昜之形識古今興亡之道累更任用咸著聲猷或屏衛四郊而西戎修舉或誰何右仗而緹騎整嚴或安静朔陲而虜塵載息吾之用汝不愧知人今以忠武司徒始終誠節南征北伐每聞盡瘁之誠破敵摧堅必茂䇿勲之典洎乎新平捍疆場之要洛郊當控帶之衝固其金湯利彼牙爪凡為展効皆竭忠誠爾其為吾申惠慈布膏澤懷忠伏順者延其賞窮羸孤瘵者加其恩使人人知吾待爾之心其厚若是勿獨以皷􅎏之壯號令之嚴報於朝廷是曰為政服我休命爾其戒哉舊秩新恩同登八座之貴摇旌展斾分榮十乗之行宰可本官充陳州節度使承恭可檢校工部尚書充邠寧節度使牟可守本官充鄜坊節度使授史憲忠涇原節度使制門下旌善所以勸人毓才所以任事其有誠明夙著績效兼聞舉其風猷以示甄擢况貴擁旄鉞榮分土疆茍非僉諧豈在良選正議大夫檢校左散騎常侍隴州刺史充本州防禦使上柱國賜紫金魚袋史憲忠生知臣節㓜學兵符氣髙風雲聲振河朔許國之心既壯忘家之義以明忠必盡於君臣情可斷於昆弟秉是名節服吾周行使寵滎陽旋歴環衛稱職之論流芳可聽日者輟於牙爪守在邢隴戎事既肅氓心用安求瘼而承醫盡痊折煩而迎刃先解頗謂良牧真為才人今以涇上右軍平原善地左接甸服右連蕃疆固酆鎬之金湯窒犬戎之巢穴是以擢自郡邸陟于齋壇曵尚書之履聲舉將軍之戎律爾其静我邉鄙撫我師徒嚴如秋霜愛若冬日於戯亞夫之營細柳叔度之化頴川彼之何人茲實望爾憲臺華省節制澄清敬服寵光勉揚茂効可檢校工部尚書充涇原等節度使授劉礎鄜坊節度使制門下渭州之北泰山之東乃眷雕陰寔曰鄜畤兵甲完勁賦輿殷繁扼朔塞之咽喉為鎬京之管籥茍非勲賢令嗣術業聞人則不可列彼土疆授之鈇鉞式舉成命其惟至公銀青光禄大夫檢校左散騎常侍兼左金吾衛大將軍御史大夫左街使上柱國彭城縣開國公食邑三百戸劉礎唯爾先父在長慶中自幽陵舉斾歸國志誠白日節髙青雲艱難已來勲績無對果有令嗣何嘗乏賢而礎居然將才蔚有公望孫吳之機變學則能通頗牧之功名企而必及踐歴中外周旋寵榮拖朝服而休問洋洋握郡符而理聲藉藉動有餘裕行多去思洎官奉誰何力勤廵徼有勞夙夜俻竭忠公是用旌其器能爰在推擇寵以維翰坐一作榮以建牙擁紅斾以臨戎宣皇風而問俗十乗在列䨇旌啓行節制連營澄清屬郡長冬官之峻秩冠栢署之崇班無以貴自矜無以善自伐勉樹爾徳克揚家聲敬之戒之無忝休命可檢校工部尚書兼御史大夫充鄜坊等州節度使授崔元式太原節度使石雄河中節度使制前人門下築壇命將在選攸難建斾臨戎為榮斯極况汾有豐沛之舊蒲綘居闗輔之雄擢其才能付我憂寄河中節度使檢校右散騎常侍御史大夫上柱國博陵縣開國男食邑三百戸崔元式族茂鼎甲器合珪璋明當察毫智必周物所蒞之職居然有聲晉綘行營諸軍節度使銀青光禄大夫檢校工部尚書武威縣開國男食邑三百户石雄等業擅韜鈐志堅金石勇無前敵義必忘身所舉之鋒何往不利况佩服榮顯作時津梁或􅇵職名藩累聞於尤績或南征北伐常紀於殊勲龔黄之接武尚優㢘白之差肩無媿爾其懿效吾乃宣言陟明之命是曰彛憲噫并部叛卒已見成擒壺闗狡童尚偷餘息干戈未偃飛輓猶勞爾其外訓甲兵内康黎庶誅祅剪怪勲庸勿讓於他人布渥行恩愷悌俾流於隣壤儀曹起部長憲尹京俱成提劍之榮各重擁旄之任敬服寵命佇聞休聲元式可檢校禮部尚書充太原節度使雄可守本官充河中節度使仍晉綘行營諸軍征討等使授崔龜從嶺南節度使制門下庾嶺之南五諸侯而番禺㧾其襟帶他官之務豈相侔焉琛賮叢湊蕃夷交錯非亷平之操不可以勵其風非幹敏之才不可以齊其俗副我所任惟時之良中散大夫前宣州觀察使崔龜從襟靈坦夷器局沉厚温玉外朗澄瀾中深慎言克保其樞機養徳善周其藩屏早藉重價歴登華資望髙綸綍之工才見版圖之極常鎮闗輔人懷去思試操銓衡刃有餘利洎乎重剖符竹初命亷車江左奥區宣為右地一去臨莅五更炎凉風猷溢聞課第居最陟明之典誰實爾先吾以登齋壇授戎柄百越稽顙䨇旌建牙可謂宦遊峻一作過途儒者極致旌爾懿効服吾寵光况儀曹居八座之榮副相冠栢䑓之首重以朝命崇其使車爾宜廣施惠慈逺去珠玉無使伯周獨擅名於合浦隠之未繼羙於貪泉佇聞淑聲用益休命可檢校禮部尚書兼御史大夫充嶺南節度等使授盧商東川節度使制門下入則掌邦計操利權績雖綿於嵗時事不虧於國用經費之道吾所委焉出則築齋壇授戎柄才可寄於分閫令可信於貞師節制之雄吾將付也茍非全器孰謂當人正議大夫户部侍郎兼御史中丞范陽郡開國子食邑五百户賜紫金魚袋盧商天生才能性禀忠厚心鏡融朗情田坦夷固道徳於藩籬服仁義之干櫓早以文行俻由班資休問溢於臺閣善政行於封部先朝輟自廷尉牧于長洲治成歌謡聲達輦轂亟長憲署委登亷車揔十連之阜殷澄六郡之風俗由是徴自藩服歴居􅇵權貳秋曹而無留獄大京兆而有餘地及授其征賦較其盈虚屬武車在郊軍食繼輓役其心慮所効則勤均以勞逸用旌乆次梓潼㩀梁蜀之險紅斾雜一作餙皷􅎏之嚴仗茲變通允乃文武訓以戎事修其政經逺俗俟爾而安皇風俟爾而暢布政佇聞於盈耳服榮無忝於建牙題劒儀曹持綱憲府用光朝寄式壯戎麾可檢校禮部尚書兼御史大夫東川節度使授李執方陳許節度使盧𢎞宣易定節度使制前人門下節制之重難其任者莫不貴擁旄鉞榮分疆土連營申號令之嚴列郡舉澄清之化况許國為河一作京洛之屏中山當朔漠之衝時維重藩吾實注意將命其帥必資才人義武軍易定節度使銀青光禄大夫檢校吏部尚書上柱國李執方道茂宗枝業光任用武有成算文多㨿經顒顒其資倜儻負丈夫之氣中大夫檢校工部尚書兼秘書監賜紫金魚袋盧𢎞宣名重詞苑價髙朝行青雲有聲名玉無玷落落其壯雍容得君子之風而皆明當察毫智必周物大小惟叩方員靡常求瘼而為吾良醫折繁而宣爾利刃常踐顯任俱流淑聲或執金吾而勤晝廵夜警之績或尹京兆而著擒奸擿伏之名輦轂之下風稜甚舉人有畏矣予常頼之類其勞能擢在推奬比者河橋作鎮𤣥武董戎訓練有律於貞師惠化頗行於問俗囬遷易水入拜蓬山耀武庫之戈矛煥麟臺之圖藉綽有令望宜承寵光建牙三煥其䨇旌授鉞再榮於十乗天官舊貫人部新曹同假正卿分兼大憲式示登壇之貴用申列土之榮勉服官常無忝休命執方可檢校吏部尚書兼御史大夫充陳許節度使𢎞宣可檢校户部尚書充易定節度使授盧𢎞正韋讓等徐滑節度使制李納門下彭城故壤南據長淮滑臺重鎮一作藩西彌嚴邑建牙謀帥於是攸難合得全才式光並命義成軍節度使盧𢎞正識略圓名襟靈倜儻行有枝葉文耀菁華扣洪鍾而自韻宫商挺鋩刃而前無根節檢校左散騎常侍駙馬都尉韋讓機謀通敏誠性端和族茂簮纓望兼賢戚鄙嬴金而必專詩禮挺玉質而不雜風塵並禀粹元精宜符景運或發聲文囿攘臂吏途休功流美於􅇵權理行推髙於良翰經武著安人之略事君堅許國之心或早踐通班騰芳懿行職守交修于列寺出納無愧於有司操刀呈剸割之能馭黠有神明之稱徊翔中外迭振徽聲簡自予心膺茲閫寄揔齊邦事節制王師朕以徐方一軍義勇素著帥臣無狀戎府不寧爾其便道持行一作封著安一作安堵闔境推誠宜先乎必信開懐以朂其後圖使軍城保晏開之安邑居絶夜吠之警然後昭宣號令折𠂻恩威務壯其猷以清厥憝一作慝將俾望風而理豈期朞月有成屬在新規注意彌切於戯訓戎撫俗節用厚生政茍有經人自知禁為邦之道豈易於斯並進秩於六官仍並榮於三事往踐乃職爾惟戒哉可檢校户部尚書工部尚書各兼節度使授薛元賞昭義軍節度使制門下上黨古今之重地也束山東之襟要控河内之封壤擇我良帥屬在全才銀青光禄大夫袁正傳薛元賞性含𢎞厚智識圓方秉忠孝以立身叅文武而為用早俻器使雅聞公才誠明與人寛大懷物再尹京邑威名甚髙㓂攘之徒相視束手旋以長轂臨于彭城嚴而不苛通則有守移斾巨野益恢壯猷將材吏師首出藩服洎揔牢盆之任頗多贍國之能荐分竹符理行居最常慕子文之道爰從賈誼之徽恬然自居物論歸重是用擢於傳導命以土田觧長居於戚藩樹髙牙於重閫爾宜貞厥師律邵其農功訓齊撫綏無墮前志闕職分五兵之重南臺膺副相之榮疊處寵光俟乃成効授陳君從鄜州節度使塞門行營使制門下洛水交波鄜城舊畤地當㓂壘界接王畿外為襟帶之邦中有賦輿之實屬者黠𦍑未戢燔燧猶虞置將或乖征師向老顧一作思得頗牧付之邉疆擢吾材臣式昭竒䇿邠州刺史陳君從學啓玉鈐志昭甲令機符天與信愿生知浸染於勲伐之門奮發為英謀之士特禀雄氣魁然壯猷窮黄石之三編笑長沙之五餌乆服戎旅益通武經遂升外臺俾守栒邑歌􅃭袴而苛慝不作提卒乗而障塞不驚而又累陳表章願展材効雖遵條共理仁風見重於朱轓而授脤分麾將星宜明於紫塞既申引㧞寧繫班資爰思皷􅎏乃錫鈇鉞秉列部察亷之務佐兵車招討之名首戴附蟬之冠位長集烏之府㧾制師旅振揚軍聲往圖休庸勉答殊寵於戯玉闗迢逓定遠收功先零猖狂營平善計建此勲者彼何人哉宜堅盡敵之心以固請纓之志無令直筆有愧前修授李珏揚州節度使制蔣伸門下維揚右都東南奥壤包淮海之形勝當吳越之要衝闤闒星繁舟車露委若非人倫碩望台鼎舊臣則何以鎮撫巨藩允膺僉屬金紫光禄大夫守吏部尚書李珏器量𢎞深襟靈冲粹道光朝彦徳契人師文章窮三變之風學術洞九流之奥莊敬形外温和積中松筠自髙珪玉不耀負經國之䇿藴致君之謨輔弼兩帝始終一心忠直貫於金石節操勵於氷霜邦家克寧毗倚是屬􅆒歴斯乆聲猷益光洎受鉞孟津宣風列郡而能訓齊師旅潤澤蒸黎姦豪懼秋霜之威孤弱懷冬日之愛載膺叅選望洽冡卿銓管無差操鑒惟允惟爾早踐䕫龍之位再分邵武之權儒臣之榮可謂全美式崇端揆之重仍兼亞相之雄勉思令圖副我嘉寵授鄭㳙徐州節度使制門下地控淮沂俗推豐沛將軍處右既膺分閫之權元戎啓行必仗貞師之節爰舉成命屬於信臣平盧軍節度使檢校左散騎常侍鄭㳙峻直無徙堅明有立渾金發彩夷玉不彫屬文能搴其菁英聚學必窮其根本誠同匪石利可刜鍾早踐華資備揚稱述憲府常聞於避馬外䑓亦致其擁轅遂列粉闈旋升𤨏闥彌髙素望深竭忠規洎尹正神州益彰才用不施鈎鉅之術自銷桴皷之鳴論洽縉紳名喧輦轂爰授征鉞出臨全齊先路馳聲下車報政黄霸布理人之績㓂恂推馭衆之材閲乃器能式光委寄今以彭門重鎮禹貢名區兵車素號於精堅舟楫適當其津要求我良翰惟爾僉諧是宜節費通商均勞齊佚剛柔無忘於迭用威惠必在於兼行約已豐財正身率下俾夫三軍畏愛一境澄清􅅷昭厥庸祗服休寵加榮曳履以壯登壇勉副知人佇酬明奬文苑英華巻四百五十五
