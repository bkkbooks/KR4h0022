body:
  text: 文苑英華卷四百六宋李昉等編京府一京兆尹授宋璟兼京兆尹制蘇頲勑惟雍設都實難其理尹京鎮俗不易其才御史大夫上柱國廣平郡開國公宋璟天假直清時歸方正端莊以立姦慝遷於望風果斷而行綱維成於不日衣冠所重人吏攸欽俾承彈糾之餘乃綜浩穰之劇可兼京兆尹餘如故授蕭璿京兆尹制前人黄門九牧之重列為州伯四方之則求於京兆或匪其才莫膺兹任左散騎常侍上柱國東郡留守蕭璿體峻而整氣剛而直慎必兼清文能飾吏慈惠可以應務嚴明可以訓人故當權豪革心貴戚歛手三王迭拜况其甫嗣家聲二鮑相承未若累光朝奬休命斯允僉言所屬可京兆尹勲如故主者施行授孟皥京兆尹制常衮門下天府惟雍神臯作京當四海之㑹同在三輔而尤劇漢以郡國二千石髙第入守而轂下稱之今因其制而選用亦陟明於辨理也正議大夫守汝州刺史兼御史中丞知本州營田上柱國平昌縣開國男賜紫金魚袋孟皡端一簡亮外寛内肅兼文行忠信之羙達禮樂刑政之要在割能斷見事風生歴踐通列偘􅇕肝切剛直也然處正自守梁宋化行山東承大軍荆棘之餘當析骸易子之後苦心精慮夙夜思職淳鹵載作豈止十千之耦流人自占實踰八萬之數可謂大郡表率一時理平移鎮汝墳不易其操懋兹聲績堪委重煩京師化源庻尹之則承平無事統正猶難或多毁傷失名數月輟罷况冦難未靖邉備尚勞率西之師取給畿内戎衣軍餉困竭閭閻姦人豪奪吏氣傷沮屢有申勑未懲其弊思得至公明斷之才曠然大變其俗是用命爾典司劇任勉脩先父之職以繼緇衣之好肅清權右扶養元元無俾趙張專羙有漢可守京兆尹依前兼御史中丞仍充勾當神策軍糧及木炭等使散官勲封賜如故授賈至京兆尹制前人門下方外甫定惟新制度必於根本源流正之以丕式于十有三牧縣内之御萬邦所瞻將自中刑外致一其政化若獨任辦吏何以模楷故前代尹京多用經術之士翟方進雋不疑皆首叅此選稱於轂下今亦因其制而進用也正議大夫行尚書兵部侍郎信都縣開國男賜紫金魚袋賈至髙文典誥合於韶雅五經大義㑹於宗極識畧精技輔之以仁全節致命形於危難歴階要重澹然虛懐宗伯以和人神夏官以糾邦國久於叅貳多所發揮省理持綱亦既詳當朝有大議訪求所得於公卿大夫之間舉漢魏名臣之奏不失其政有補於時加以經務大才堪任煩劇艱虞一紀曠廢百度有司失職京邑尤甚頻有賑救差可條緝今京一作㑹府九卿率由舊典大變風俗以明朝綱統尹之重益難其任仗賢立政叅領南䑓懋乃休績慎乃出令以懲強猾以惠困窮舉能其官則理穪匪其人則敗端本静末爾其誡之可守京兆尹兼御史大夫散官勲封賜如故授京兆府尹魏少逰加御史大夫制前人門下肅清風俗糾正朝廷必求謇諤之才式總紀綱之任金紫光祿大夫行京兆尹上柱國鉅鹿郡開國公魏少逰直方其行簡亮在躬有玉壺之清澄兼龍泉之斷割通變可以成庶務精密可以舉人倫中外累更風聲益振法無所避姦不能欺貳職司徒實平邦教三尹京邑備洽人謡不有兼官豈云重寄宜授趙堯之印俾雄張敞之職可檢校御史大夫餘如故授盧士玟權知京兆尹制勑朕日出而御便殿召丞相已下計事而大京兆得在其中非常吏也誠以為海内法式自京師始輦轂之下盜賊為尤集作先尹正非人則賢不肖阿枉奏覆隔塞則上下不通假以恩威用讋豪右朝散大夫守京兆尹知府事盧士玟自居郎署執政者言其温重不回守法專固副内史行集無行字事物議歸之日者景陵將建龜筮有時予心怛然懼不克濟爾嘗倅職應其供求和而不同儉而不隘峻於已亊朕甚嘉焉試命元僚亦既不撓今圓丘甫及慶澤將施抄剽集作剽攘又作剽掠椎埋必有幸生之者案牘卒吏亦當因縁為姦公費則多而利不下究惟是數者爾司其憂為爾正名無恡操剸可權知京兆尹餘如故授李遜京兆尹制白居易勑近歳京兆長吏數遷誠不便時抑有其故或鈐鍵不謹吏縁為姦或鉤鉅太煩人受其弊既非中道皆不得已而罷之宜求恬智寛猛相濟者親諭斯㫖使久於其職以息吾人浙江東道觀察處置等使兼御史大夫集作中丞李遜十年以來連守四郡或紛擾之際或荒饉之餘威惠所加罔不和輯賞其殊績擢在大藩自臨㑹稽一如舊政况省科禁以便俗通津梁以息征動遵詔條深副朝㫖江南列鎮良師則多集課程功爾為穪首而内史之選久難其人今予所求唯爾可使雖表率州部其委非輕然尹正京師所資尤急宜輟材於浩穰竚觀政於輦轂望爾有成無替厥命可依前件授韋正貫京兆尹制前人勑權知京兆尹韋正貫詩不云乎京邑翼翼四方是則故趙張邉延馳名兩漢而不疑兼以儒學取重當時斯任也吾豈易哉爾敷用政術列為殊科冄昇文字之途一舉雲霄之路近者㧞於郡府以尹京師有抑強扶弱之心得通變適時之用煦若春日肅如秋霜干將淬而投刃皆虗騏驥馭而追風自逺重以郊天盛禮發號鴻恩訖亊而物力安舒設禁而冦攘帖息是用嘉乃成效寵之正名爾其奉上思盡臨事思權轄徤吏而惠窮人簡簿書而提綱目處劇勿紊居閒勿遺俾椎剽絶迹於九衢枹皷息鳴於五夜克揚顯績用繼前脩可河南尹授李傑河南尹制蘇頲黄門廼眷清洛嘗聞舊尹重臨黄霸欽若古人銀靑光禄大夫陜州刺史上柱國武威縣開國子李傑適務宏才狥公清節以言博物貞固幹事當其奉所任罄厥心必欲存於周宻曾不顧於險夷可謂國之良吏朝之藎臣宜廻陜服之委更允河東之借可河南尹勲封如故依舊充水陸轉運使主者施行授畢構河南尹制前人黄門洛陽設都海内均土自非選衆疇能尹宗或作京蒲州刺史上柱國平陽郡開國公畢構純懿篤宻直方清勁積學所以體要道力文所以㑹雅正狥公滅私吏不犯法擒姦擿伏人無間言在邦則聞從政何有六遂分職四方作經思齊李膺之舉宜允袁安之拜可河南尹勲封如故主者施行授崔隱甫河南尹制孫逖門下三川作都四方取則任能而理求舊為先銀青光祿大夫守太子賔客上柱國崔隱甫冠冕碩人朝廷偉量士林之秀公望攸歸直而能温寛以濟猛累踐臺閣備彰德器輦轂之務風化所急鎮兹雅俗俟彼正人宜受任於兼官俾重臨於故府可兼河南尹餘如故授崔希逸河南尹制前人門下制天秩者必在於賞功尹王都者是先於舉德朝散大夫守左散騎常侍持節河西節度經畧支度營田九姓長行轉運等副大使知節度使判凉州事赤水軍使上䕶軍攝御史中丞賜紫金魚袋崔希逸深識宏才清操雅致明無不達懸朗鑑於胷懐斷則有餘錯盤根於掌握頃膺邦選爰委兵權能行上將之謀畧獻西師之㨗寵其命服俾叶於疇庸鎮彼神州更期於表則可銀青光祿大夫河南尹勲如故授裴寛河南尹等制門下風雨所交是稱中土山河之寳斯為近服有能俾乂其在遞遷中大夫使持節蒲州諸軍事蒲州刺史上柱國裴寛髙朗多才懐必割之良器銀青光祿大夫使持節絳州諸軍事綘州刺史上柱國翼城縣開國伯裴伷先貞㢘守道秉不凋之勁節或累拜清秩或頻更劇務三汾作郡各著聲謡八使觀風咸推課最類能而使僉議攸歸宜受任於洛都更移官於蒲坂寛可守河南尹伷先可使持節蒲州諸軍事蒲州刺史散官勲各如故授張延賞河南尹制常衮門下域彼四海尹兹東郊分其三川式是中憲加以舟車之㑹轉輸之殷叅貳保釐責成播殖惣此庻務屬於廉才銀青光祿大夫行中書舎人上柱國河東郡開國公張延賞相府餘慶儒門濟羙德行文學脩身於四科忠肅恭懿齊名於八族綽有純性澹然素懐凡所歴職必聞異政推之以誠信明恕守之以廉能簡約既精練於典常亦陶融於理本故左曹之駮所為平當南䑓之綱斯焉振舉自叅紫垣之列頗擅黄縑之妙然以素更中外可任煩劇河洛凋殘其來自久迭用良吏庻康疲人典領之重眷求無易勞徠安集徃哉汝諧可檢校河南尹兼御史中丞充東都副留守河南水陸轉運使仍充諸道營田副使專知都畿營田事散官勲封如故授李勉河南尹制勑四方取則千里分圻寔惟卜洛之都咨爾尹京之任御史中丞東都畿内觀察使李勉才茂宗枝名推公噐風標自肅操履愈髙智畧可伏於安危忠貞克同於休戚親賢是賴中外必聞屬肆覲觀風三川展義來蘇望積處劇才難實資模楷之良共緝保釐之政可守河南尹兼御史中丞勲封如故授崔倰河南尹制白居易勑河洛千里邦畿在焉俾之乂安屬在尹正鳯翔隴州節度觀察處置等使正議大夫檢校禮部尚書兼鳯翔尹御史大夫上柱國安平縣開國男食邑三百户賜紫金魚袋崔倰有精敏之用潔直之操施于集作於有政由是知名始資州縣之勞卒致公卿之位况刺部有理行主計無愆違尹右輔而鎮西郊盖奬能報勤之㫖也昔吳公為河南守謹身廉平人服教化袁安為河南尹政令清肅號為嚴明誰其嗣之無易倰者徃為士集作表則勿替能名可檢校禮部尚書兼河南尹散官勲封賜如故授許孟容河南尹兼常侍制前人勑昔呉公袁安為河南尹守皆能以廉平清肅駮吏教人孰能繼之我有良吏具官許孟容才志甚大言論甚髙在䑓閣間藹然公望嘗尹京邑觀其器用臨事能守當官敢言不吐剛以茹柔不附上以急下政無煩碎甚合衆心及是轉遷頗有遺愛河洛千里邦畿在焉凡所選任必歸望實考言詢事非爾而誰不㤀舊政可立新績仍以騎省申而寵之京兆少尹授秦守一京兆少尹制蘇頲黄門正議大夫行萬年縣令上柱國南安縣開國公秦守一敏而無滯通則有才刻意深尚於政方立言每求於學術委之京劇時許能聲眷彼州端朝推令聞俾升遷於墨綬佇明察於赭裾可行京兆少尹散官勲封如故主者施行授白知慎河南少尹制黄門正議大夫檢校將作少匠上柱國白知慎博觀墳史祗奉程式吏道尤精公心不轉郎官起草増其應宿之華匠者運斤主其乘風之妙任能結約一作課省費馳聲爰瞻上洛之都宜亞尹河之寵可行河南少尹散官勲封如故主者施行授路嗣恭京兆少尹制常衮勑中散大夫守太子左庶子兼御史中丞充闗内副元帥判官路嗣恭藴其才畧資以幹能中外累更政聲尤異龍樓諭善載實春華烏府持綱克平霜憲三王佐理九扈劭農宜升亞尹之秩兼資大田之務可兼京兆少尹授黎幹京兆少尹制勑朝散大夫前守諫議大夫兼侍御史内供奉賜紫金魚袋黎幹經逺良圗𢎞通敏識典墳聚學風雅成文操守甚貞行歸於正早登近掖見重中朝俊德用彰嘉言罔伏頃有歸閒之志益存難進之誠亞彼尹京眷求公器宜膺奬命俾展多方疑作才可京兆少尹散官勲封如故授張平叔京兆少尹兼知府事制白居易勑商州刺史張平叔為人謙直為政簡惠前後歴府掾邑宰郡守而去思來暮之謡繼聞於人聽焉及副鹽鐵官刺商雒部㑹課報政亦甲於他官自貞元以來用三科取士奉詳明政術可以理人之詔而得其名有其實者幾何人哉平叔居其一也能効若是何用不臧故事内史缺未補間亞尹得行大京兆事或假印綬試可而即真者徃徃有之故其選任日益難重爾宜稱所舉慎厥職無墮大以勤小無急弱以緩強夕念朝行遵吾約束可京兆尹知府事授左司郎中鄭凝吉京兆少尹前龍州刺史韋貽範右一作左司郎中制錢珝勑具官凝吉承執政之門知循法之道升在郎署不㤀公家多稱抱材一作儒林足以集事今京師尹正之大藩后兼之甚理矣貳兹善政期爾必能舉而任之無浼吾命貽範精明不匱𢎞博可觀嘗佐鉅賢愈脩茂行敏求所至通籍必華逺牧罷民朝皆思用都曹郎總率之職次管轄焉吾今舉典用人孰云匪重來居斯秩無効淺為官或有聞何求不達可依前件次府少尹授陸操太原少尹制孫逖門下守洛陽縣令陸操才膺利用官歴清資當斷不疑在公必濟京兆之亞夫官之劇既馳名於洛邑宜佐理於汾州可守太原少尹散官如故授賈躭太原少尹制常衮勑朝散大夫殿中侍御史内供奉充河南度支判官上柱國賜緋魚袋賈躭燕趙環奇士之儒雅才貞循良秉懿冲用經逺著安邉之上策作分閫之中權行達理體精詳法度論兵契要先務於止戈饋運惟難且聞於足食累書嘉績備洽令猷素推兼濟之能允叶至公之舉固可以貳其尹正副我保釐俾叅臺閣之寵仍賜綵章之命可檢校尚書膳部員外郎兼太原少尹侍御史充北都副留守河東度支副使仍賜紫金魚袋散官勲如故授張增鳯翔少尹制勑朝議大夫守鳯翔府天興縣令張増平簡以清心直方以慎行積於政理擅於文詞字人晉陽大變風俗更秩陵邑不阿貴強迭居右輔其政如一屬府兼戎號歳聚軍儲允濟率西之師且無大東之刺賞以勸善官惟任能貳我藩畿仍叅邦憲可守鳯翔少尹兼侍御史散官如故授楊巨源郭同𤣥河中興元少尹制元稹勑具官楊巨源詩律鏗金詞鋒切玉相如有凌雲之勢陶潜多把菊之情朝請郎前守華隂縣令郭同𤣥文戰得名吏途稱最劉超推出納之善王渙著抑挫之名皆用已長各居官守因其滿秩議以序遷稽其器局之良宜叅尹正之亞巨源可守河中少尹同𤣥可權知興元少尹授孟存成都少尹制白居易勑孟存嘗叅極集作劇務亦牧疲人咸有能名得於主帥三蜀征鎮屯於成都雖有忠賢委為尹正至于集作於賛脩庻務通統諸曹承而貳之實資亞理勉勸厥職無累所知可依前件文苑英華卷四百六
