body:
  text: 文苑英華巻八百五十二宋李昉等編釋三廣州寳莊嚴寺舍利碑一首梓州郪縣靈瑞寺浮圖碑一首廣州寳莊嚴寺舍利塔碑王勃昔者萬人疾疫神農鞭草而救之四維凋瘵夏禹刋木以除之豈非物外其性則道功出事􅄽其和則人績著傍稽素篆仰叩元扉即時義而規大覺因彛倫而佇真諦向使三災克殄八正咸脩人握戒珠家藏寳印則三十二相不可得而視也八萬四千法不可得而聞也然則聖人以運否而生神機以䘮而顯况迦維授手摩詰推心髙張妙用之功自極横流之弊盖不獲已豈徒然哉故能業擁大千化形真一由樂惟而起七覺因來蘇而坐三昧發揮五演以寂滅為身常提挈四流用慈悲為化迹黑風宵遁波旬忘反噬之心緑洺晨開天常識問津之所括夷塗於九相蹇歩其安納惠畧於重昏迷方自曉大矣哉應物而起興運而終至自於崑冥復歸於無物雖金沙宴駕雙林無可作之期而玉諜遺文六塵有經行之俗象法不可以無至疑㣲言不可以遂䘮六千羅漢競結香縁五百仙人分開講肆星龕月殿俄盈震旦之墟鳯刹蜺旌坐遍閻浮之域屈伸闔闢其道矣哉夫寳莊嚴舎利塔者梁大同三年内道塲沙門曇俗法師之所立也其琅邪貴族則漢庭峻節祖徳猶傳梁甫髙吟嘉聲未逺法師夙登真地深入惠門照果業於三眀拂塵勞於八觧羊車綺嵗懸欣半月之詞鳯閤觿年已振彌天之響道惟堅固行乃頭陀百結斯安斥羅綃而能疑御十珍雖貴對藜藿而甘心于時以石應天人大𢎞緇侣法師至誠幽感獨歩元宗豈直王公欽振錫之風固亦天子降同輿之禮寳瓶宵注則雨露隨軒玉柄朝撝則風霜滿席既而素懐有在潜擯俗之圖爰定我居首訛疑棲霞之寺爾乃巖開石霤邑跨金陵魚峰多讃咀之懽虎磎有送迎之限紫蘿山徑居藏勝記青松磵户坐諧幽致枕石潄流者乆之原夫見化有縁應身欲謝昊天罔極追懐自逺故有諸天㑹聚共位神光列國交兵闕譯求其致豈不深哉然則麟鳯下靈猶稱瑞貺玉石㣲翫尚勝精彩亦有楚鐸淪照擢紫靄以衝星周鼎沉華吐黄雲而噴景成浩疑作者之述足稱希代之貴况乎釋迦妙相如來真骨雖八萬四千之寳塔散在群方而九十二道之靈虹闕終聞間出立成斯應瞻庭廡而時逄非徳不鄰歴山川而罕致是以優填頓顙思存電下之光波慝投身願奉巖聞之影粤在梁武精求不暇以為秦登碣石而事止尋仙漢索瀛洲而心非好善於是齋筵夙設上祈忉利之宫講帳星垂下請龍王之藏輕齎棹海重賞梯山庶玉匣之全移幸金棺之半啟以法師智遺人我識洞幽闕思假妙因冀通靈感爰承綸紼載踐滄溟過石門而右指歴銅標而左顧乘桴月泝戒楫星沼相彼遐陬寔惟荒裔一音演說本承聽受之郷五日繼眀素隔照臨之域珍竒乃萃聖徳節攸傳則知有感必臻信覃幽闕不行而至豈隔殊方法師既達國城式敷朝命授銑筐而頂禮撫瑶緘而跪發盡收其寳重載而歸亦猶珠匿弊衣須馬鳴而後用金藏陋宇待龍樹而方開梁氏之都妙箕而仰神光家之由也十四字疑有脫誤炎凉可質往反九十旬楫施不輟風潮八千里以大周三嵗届于兹邑法師性豊幽澹質固虚羸綿歴是淹疲疴屢積維摩見病盖伸方便之門道安謝歸思逺朝廷之事願居此刹有詔許焉仍分舍利俾𢎞真福國惟甌駱郡實畨禺爾其封疆跨躡之壯海陸㑹同之壯上當星紀下裂坤維階百越而鄰三呉軹雕題而陬交趾神化氣色汀洲建不死之郷舜禹精靈原隰現行宫之地閭閻霧撲士女雲流謳歌有覇道之餘毗俗得華風之雜蜃樓髙峙猶埋夕帳螺臺峻績尚識朝基信夷夏之奥區而仙靈之窟宅也此寺乃曩在宋朝早筵題目法師聿提神足願啟規模爰於殿前更湏彌之塔因縁盛力人以子來徴日官而正墨集風師而舉草育王莽令掃地户而獻神兵􅆊事馳心感天官而下靈匠崇階遽積寳樹俄周不殊仙造還如湧出故其粉畫之妙丹青之要璿基岌其六時琱關紛其四照仙楹架雨若披雲翳之宫綵檻臨風闕遏扶摇之路散華璫於月徑璧合非遥撥罾網於星潯珠連可騐玉虬承霤傃雲竇而將騫金爵提甍拂烟衢而待翥瑶窓綉户洞逹交輝方井圓泉參差倒景雕鐫備勒飛禽走獸之竒藻繪争開複地重天之奥懸梁九息良馬駿走而未窮疊磴三休闕騁犍而知倦是栖銀槨用府瓊凾採舍衞之遺模得浮圖之故事爰自梁末以迄皇初城邑屢新軒墀若舊雖復百魔蜩沸聽鼓鐸而懐音六賊蜂屯仰椽欒而革面多廽净施罕犯仁宫則知會吹遐斯同偃草慈雲所潤豈直流根故能比蜀守之詞堂長為典制均魯王之秘殿若有眀徴而其作鎮一隅俯炎荒而獨秀盤基有地冠終古而長存者乎國家業擁事初事用皇極髙祖以援其疑撥亂伏紫氣以登三太宗以端拱繼眀自黄離而用九皇上纉乾坤之令業振文武之英風太階平而百度理中國定而兆人樂時和嵗阜邑頌塗歌以五刑不用六械徒設舟車四逹誰論貢賦之差襟帯八荒非復華夷之隔天寳降地符昇木石甄祉飛沉郊慶雖叶和末疑變實類文思之功而持盈守成亦資連闕大中大夫使持節廣韶等州都督李某早登清貫夙踐崇軒嘉猷逈發於天朝善政果行於朞月越谿仙鍔吐光芒而駭人岱嶺寒松排風颷以成性羙哉稱由功著鶻響徹於雲霄方為時湏熊軾疲於道路廣陵單轂如送張綱渤海亂䋲復思龔遂王尊皂盖欣臨拆坂之前吳隠朱軿更集貪泉之右髙名夙著佛化横飛羣盗屏跡而歸農姦吏聞風而去職京坻坐積圄行疑作犴潜廽汲黯之卧淮陽直聞清浄王堂一作啇非之居池郡疑作汝群但舉賢良用能使檻穽不施猛獸廵江而逺竄市㕓無擾商旅倍道而相歡􅄓風寝毒炎埃罷属疑作房人稱有道家實無為加以援翰冩心自契真亷之㫖髙談見意不踰元黙之津學䆒儒林真窮什部知通人事且味禪宗道可以知歸虚物闕由其顯㑹是嵗也忽於此塔重覩神光玉林照灼金山具足倐來忽往類奔電之含雲吐燄流精若繁星之轉闕傾都共仰溢郭周窺士女幾乎􅂾里光景動乎七重實孟冬之日也觀夫至道不私瑞生必由乎樂國慶基有㑹福至必依於善人自非化足動㣲教非餙迹何以發真如之盛契壯實相之輝華在昔鳯集頴川宣后歸功於良守龍游湘浦章帝布徳於賢臣歴選前猷兹為故實然後上和下睦主聖臣良滅火返風雖有辭於進壤母脩子應亦何愧於當仁至於百越衣纓三閠疑作闕耆老或代道篁竹氣推丹桂之城家擅芝蘭名動蒼梧之野出平原而袪甲擁崇闥以鳴鍾並為蕃部之恩親覩招提之瑞同祈介福共潔齊壇聲疑作龍象於南州盡衣鉢於西竺㑹吞方丈供備盂蘭法鼓振而沙界肅供鍾鏘而鐵圍靜妙財爰捨法施争流華轂牣於香城文駟填於寳廐鏹藏巨億更入僧田價直百千還登佛座豈徒照車十乘列隋氏之眀珠盈篚萬金積大顛之寳具而已朝散大夫守長史闕地乘華緒價擅名流豫章擢而成幹騏驥生而躡影山濤天骨無情吏隠之間王衍風神自出塵埃之表自忝榮嶺墜作式瀛幽略其小術包其大體振温良之逸歩得毗賛之宏綱布道移風善寵邦政歸休置驛獨守家聲然則野老行歌雖致功於露冕藩君坐嘯固籍羙於題輿化成異壤抑由同徳故能道揚法教揮斥盖纒家懐方廣之恩人慕韋陀之學傳燈繼廣曵組成隂下逮府寮旁因縣宷並恐疑薰脩同希福惠豈可謂爾之教矣何日忘之者乎時有眀威將軍行禺府折衝都尉李公天子之舊属朝廷之夙將也靈根自逺聖族多竒受睇盻於甘泉奉衣纓於平樂青龍帯劒光超殿閤之榮白武衘珠早陟齋壇之寵自招皇誕作鎮邉城湟水樓船遂勞都尉灞陵車馬尚識將軍魂驚斷鴈之峯恩盡沉鳶之浦濡鱗涸轍處定水而彌勤撫翼香林在窮途而更切頻光法㑹荐委珠珍䕶持攸仰招提是属其兆基也如此經綸黼藻其大矣哉爰自上座實輪等並妙根宿植勝果將圓翰飛般若之林髙歩檀那之舎慈衿宻洞散眀月於談筵智鍔相輝化繁霜於寳刄思琱琬琰式播徽猷弟子家嗣太丘忝閨門之薄宦地連睢渙竊藻繪之餘工爰託下才用旌髙躅豈知仲宣旅泊方衘深井之悲長卿罷歸空負陵雲之氣我之懐矣乃作銘云太息頽運嗟呼失道徳弊為仁物壮則老縶猿情暗求鴞討早赤水沉珠元邱墜寳皇矣妙覺蒸然應朝宗深㣲妙業奥慈悲燃燈匡俗捨栰濟時湼槃不住般若無恩俯迹見生和光不滅色音雖昧規模尚切闕猗歟上人穆彼惟新智傾八藏心超六塵凄凉燬宅觧脫迷津鴻㝠佇想龍蟄存身青蓋遺邦黄旗故服原隰形勢江山重􅃨磵户秋眀巖盤夜燭闕鼓鍾于宫聲聞于外聿求紫闥言尋丹瀬絶域棲遑驚濤顛沛至誠㝠感神珍顕㑹甄陶設險翼軫䟽源尉佗餘國盧循舊邉邑居雄盛人物殷全是惟樂土實曰龍川䕶持靈刹莊嚴寶塔基構鼎新亭欒櫨嶪奔日宵排歸雲曉納架壁三休連甍四合分惟星紀境控天池棟宇綿邈衡津推移神機丕應瑞景潜儀光合玉廡彩動金枝凡我寮庻同嗟權實周顗情勤王濛思逸咫尺幽鍵往來靈室共䕃法堂俱歸惠日四維信受三眀𢎞益貝葉紛綸龍華舄奕講肆宏敞齊筵巨翼供引純陀飯廽香積天人合契幽顕同心傾家奉賄破産移琛軒裳夐䳱纓珮交臨蘭薰習逺檀那意深偉哉連率冲乎徳化職重隼裳秩遵熊駕酌貪貽則還淳息詐道濟香城禎疑寳舍琳琅什種杞梓緇徒調輕僧㑹辨拆文殊奔螭易失令䑕難拘願刋貞琰永冠康衢伊我窮途欣兹勝謁文休泛海中翔逰越尚想知音有懐眀發謬惟雅顧叨陪天骨爰抽弱翰式叙髙蹤孤音易竭獨賞難逄思起王粲悲生蔡邕豈無章甫誰適為容梓州郪縣靈瑞寺浮圖碑若夫神州括地寰中分五嶽之圖巨壑浮天海上擢三山之秀造化之所樞紐靈仙之所窟宅故得闕發揮雲氣牛頭山者即廣漢之名峰也圓裔㡬乎數里直上逾乎百仞若乃巖泉銑石之什風煙草木之狀傾九圍而得雋環四時而競爽蒼岑隠嶙旁分玉砌之階碧洞逶迤下趜疑金陵之苑實羣聖之所託也隋開皇中王秀作牧益州來窺勝地首旌嘉號仍䟽浄域因危裂户就嶺磴之成規跨險分榮借岡巒之廽勢工穹雕鏤妙出丹青飛棟神行廽甍靈一作虚構又於山頂别浮圖隋開皇告運眀皇首出軒䟽疑琱昧基砒堙蕪奄興宣榭之災施及栢梁之燼郷望等馳心妙律夙契禪居悲梵宇之摧梁痛珍䑓之絶搆思𢎞法願重緝竒功黨集且千家惟巨萬以為玉樓星峙稽閬苑之全模金闕霞飛得瀛洲之故亊指香城而聳闕臨火宅而危魂參妙範於神眀騁良工於宇宙飛亷按轡定樞臬於風衢羲和頓䇿撥鈎䋲於日路雕簷􅀞栱龍廽紫漢之間複霤重欒鳯舉丹霄之外瓊扉暮敞推日月於金鋪繡桷晨開落繁星於玉砌每至兩江春返四野初晴山川霽而風景凉林甸清而雲霧絶沙汀送暖落花與新鷰争飛城邑迎寒凉葉共祁疑作初鴻競起則有都人襲賞慿紫檻而延衿野客含情俯丹櫺而極睇穹百年之後樂冩千里之長懐信可以澡雪神襟清踈視聽機竟於紛擾置懐抱於真寂者矣且勃旅遊岷徼漂舉涪鄉年晷一穹時灰七變王陽西上方驚歛轡之心王粲南征實動登樓之思我之懐矣乃作頌曰大塊甄筫名山作絶發地龍盤干霄鳯峙風雪萬邑岡巒千里絶域天成珍臺地起揆刹元嶺圖基丹嶠層棟峥嶸重簷􅌄窱有隋紊歴重眀改照事與時遷迹從原燎義均除舊事切為新如或繼者代有其人聲飛隴蜀望動州隣争開淨施競植靈因控險裁標循危列構巖烟接廡風雲對霤鐸運星衢璫懸月竇紫軒霞合丹梁霧透暮春䟽節新秋戒序照滿暄郊氣銷寒渚樹濃鶯亂川長鴈舉流涕冩懐魂馳意與偉哉靈宇壯矣全摹窮髙極麗逺覧長圖賞因時合筆為神驅有情君子誰為捨乎文苑英華巻八百五十二
