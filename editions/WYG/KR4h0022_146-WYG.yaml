body:
  text: 文苑英華巻一百四十六宋李昉等編草木四竹賦三首慈竹賦二首孤竹賦一首大明西垣竹賦一首竹箭有筠賦一首湘妃泣竹賦一首竹賦許敬宗惟脩竹之勁節偉聖賢之留賞覽山經而逖聽詠周詩而遐想掩寰中而獨秀非庶物之所仰若夫嶰谷著美稽山見知衛國之稱淇澳梁園之賦夾池山陽之翻宻葉江潭之竦喬枝雖有聞於在昔諒無得而標竒乃徙植於廣一作帝庭爰移根於禁苑亘蓂草而界列繞醴泉而右轉脩幹橫於松徑一作嶠低枝拂於蘭畹對紫殿之初旭臨丹樓而向晚望威鳳而來儀佇化龍之為逺爾乃春光變色夏景開松枝藏戯鳥葉間殘虹上便娟一作翳而防露此句見楚詞下檀欒而來風散歸雲之掩翳引落日之玲瓏雖復嚴霜曉結驚飈夕扇雪覆層䑓寒生複殿惟真心與勁節隨春冬而不變考衆卉而為言常最高於歴選第二呉筠惟坤靈之播育何備物之寔繁偉兹竹之標挺得造化之清源契道含靈表貞示節葉森散以翠錯莖鮮脩而瓊潔爾其和風流暢萬彚昭陳揚葩曄其宻苑荑柳藹於通津不郁馥以啓曜但葳蕤而有筠亦未知為異也至如殺氣凌厲凝霜蕭瑟覽平楚之蒼茫窺衆林其如失冒氷霜之涸沍逾青熒以欝宻則殊可重焉故詩曰如苞書稱厥貢猗兹淇園美彼雲夢昔在軒后肇官隂陽俾伶倫於嶰谷伐脩竹之珍篁裁六律以協氣調八風而順常然後成竽籥以備樂其聲濫而彌長笙鏞以間鳥獸蹌蹌諒自然之純粹曷羣材之可方若乃渭川千畆山陽數林㑹稽方潤於碧玉羅浮比色於黄金上㸃㸃以雲翳下泠泠而鳳吟祛赫曦之燠景納凄凉之清隂王子所以嘯詠􅄞生為之幽尋召嘉賔及令友暢綠醖與鳴琴美遊盤之逸趣清寂寞之逺心若乃夾滄江倚丹崿蓄水霧之沉沉摇巖烟之漠漠湘妃有揮淚之感楚謡興防露之作或挺皷吹之嶔崟或垂天門之磅礴皆鸞鳯之所翔集孔翠之所棲託豈獨嬋娟於廣漢之壌亦有璀璨於蓬萊之峰結實珠粒敷花紫茸拂皓一作栁絮以飛雪摧紺莖以韻鍾故列仙之攸翫匪吾人之所從也亦有化雉呉國成龍葛陂容人篔簹育蟲桃枝一笋明其𦙍嗣三節獲乎嬰兒榮燈纂以感孝茂忩櫺以表竒篲家壇以塵滅環石牀以隂滋皆靈變之譎怪良難得而備知爾其衆彚非一則有篥疑作篻呉都賦篻簩有叢簩筋曼疑作蔓筋藝文類聚有筋竹初學記有蔓竹射筒箖箊呉都賦箖箊射筒柚梧呉都賦注柚梧竹出郊址箛筮一作菙初學記竹譜有􅀢竹似桂南都賦篠簳箛箠之橚矗龍鍾雲母之扶踈箬箭浮色以縹燠䈄􅀢綷文而繡攄初學記皮類䈄􅀢竹綉方志之所遺載山經之所闕書安可得而詳矣靡不勁堅其性葱蒨厥色不規而圓不操而直故髙皇製冠以守位孝文剖符以表職博望侯傳於大夏之外穆天子樹於𤣥池之側推此類以彌廣匪斯文之可極也第三總羣籟以擇音歴衆材而簡疑質惟兹竹之珍勁獨懐貞而守一若洗文濃露濯影華池離離嘉實冉冉纎枝含夕氣而拖翠照晨旭以舒猗凌積霜而莫改因虚心而不虧上横桂暉下拂松盖抗脩莖於雲表脱輕花於霞外千仞未極其髙十圍寧申其大既絶羣以標傑亦冠叢而稱最連星影而類珠晚虹掛而猶帶蒙宻柔柯布濩繁葉白日朝映素輪夜接色净潭深影沉攅疊洎乎層隂結長飈起清徴奏鳴弦理金罍溢而未傾玉山儼而猶峙詆訶六籍咀嚼三史窮𤣥熈之根柢極天地之終始此乃至人勝集七子碌碌則安齒故語其用也則五離十析絲剖毫分縈九華於紈扇結雙雉於天文乍摇紈䄂時拂緗裙掩凝鉛之艷逸籠流麝之氛一作氤氲若夫取象制儀激商流雅圓徴有素清亮非假信鳳鳴之可習實龍吟而可寫乃曲絶而和㣲非韻髙而調下豈知分光綺殿散影華軒淡雲霞之逺色霑雨露之餘恩嘉庭樹之蠲忿跂桃一作慕蹊李之無言庶嵗寒而無易常耀節於梁園慈竹賦并序廣漢山谷有竹名慈生必向内示不離本脩莖巨葉攅根㳫柢叢之大者或至百千株焉而縈結踰乎咫歩好事君子徙為堦庭之翫焉吁嗟非此土所有乃有厭流俗之譏動鄉闗之思者盖撫髙節而興感覽佳名而思歸遂為賦曰有竹猗猗生於髙陂左連瑶帶右雜瓊枝恨幽客之方賞嗟君侯之不知徙蔚丹谷遷榮緑池氣凛凛而猶在色蒼蒼而未離屈巖壑之容貌充堦庭之羽儀爾其劃地一作疆分域駢隂抗趾疊榦龍迴攅根鳯峙防碧落於霄末翳紅光於夕始崇柯振而烟靄生繁葉動而風颷起擁涼砌之晨肅屏炎扄之晝滓至若白藏載謝𤣥英肇切塞北河堅江一作閔南地裂觀衆茂之咸悴驗貞輝之獨潔抽勁綠以垂霜􅀈嚴青而負雪葢同類之常稟非殊方之異節若乃宗生族茂天長地久萬柢争盤千株競糾如母子之鈎帶似閨門之悌友恐孤秀而成危每羣居而自守何美名之天屬而和氣之㝠受嗟乎道之存矣物亦有之不背仁以貪地不蔵節以遁時故其貞不自炫用不見疑保夷險之無易哂榮枯之有期我蓬轉於岷徼遂萍流於江汜分兄弟於两鄉隔晨昏於萬里撫貞容而骨媿伏嘉號而心死庶因感而長懐遂策情而勵已第二喬林維竹稱慈㡬乎有知九族敦叙孝友威儀是竹必滋五服相殘骨月攜離是竹必衰苟自家而刑國亦觸類而増思苯尊固䕶檀欒擲一作櫛比如束之稠如挿之宻勁節中聳攅根内實聲唯戞風影不透日類宗族之親比同朋友之造膝至若暮嵗窮律霜凝雲霏陶鈞無發生之理松栢有後凋之期是竹也叢篁劈開芽筍怒長紫籜連披青筠粉上有偕老之情感餽親之養如受制於籬界不旁侵於土壤雨露之澤謝爾衆芳細葉未吐貞心已長耻髙標而逈出斯褭曲而不揚匪趨時於律候寧隨韻於笙簧保無用而以道自將媿不才而與物俱昌苟成隂於隙地作盛景之清凉重曰夫緜緜𤓰瓞兮知有子母邕邕鴻一作鳴雁兮如次弟兄於家則疏附禦侮於國則盤石維城田氏不分庭之荆陳家則應一作聚天之星莫不欝映棠棣急難鶺鴒斯竹也共根連茹一本千莖年深轉宻嵗晩彌榮一可以厚骨肉一可以敦友生於靈䑓而彌信性彰慈孝一作愛而感通神靈孤竹賦有斐君子兮將以自怡藝孤篠於前墀翫以時惬所思且面陛則陽笑猗猗而處渭向砌則燠秘青青之在淇問君何事生乎兹嬋娟抱節而無詞借而東南之美㑹稽千里阻江阻河所貴則那至乃柯葉不二嗟吁此地彼已之子賤目貴耳豈知孤者取稀物莫之依含混元之休氣吸太陽之清暉長則尺準大可寸圍有美遊兮忘其歸更憶朝霞露未晞懸明月而影短帶疎雨而聲㣲觀乎裊娜容與風生其處應知黙定洪鍾律幾日能令童子語實方就而孤鳯疑食來枝或成而一龍飛去天造自然含虚佩堅堅以保名虚以戒盈瞻彼標兮人之程萬類則改千竿二字疑森在其在伊何増氷峩峩瞻彼磷兮不可磨則知天籟竒兮由我起道生一兮得我始得之者非取翫物而已大明西垣竹賦髙無際嶰谷脩篁移植仙堂左聨温室之樹前對鳳池之芳一生孤貞四時青蒨不争麗於夏色不改貞於秋霰保此嵗寒之容得䕃宰衡之院露羃䍥以珠綴風清泠而響繁雜金絲於北掖對髙雲於西垣曉視含烟朝歸捧日挺八柱以獨秀與三槐而交宻若夫制為用也則笙可以下鳯皇笛可以奏宫商筆可以播文章管可以調隂陽信無施而不可若有待而韜光亂曰託根勝地兮擢榦捎雲抱貞節兮葱鬱氤氲若賞七賢之清曠不可一日無此君竹箭有筠賦李程喻人守禮如竹有筠俾脩己以自守同因疑作固本而相因操持二字詳注九十巻㒺兩賦彰於嵗暮勤徳貴乎日新所以取彼後凋之色戒夫行道之人將以禦冬且見檀欒而守節比於藏器詎可湏臾而去身若乃清霜翻𤣥律改彼衆卉之具落同受氣於真宰何蓊茸而自異乃㛹娟而有待苟常其性寒竹何患於時移不易其心志士當懐於道在豈不以和澤自潤表裏相資竹無筠不能固其節人捨禮曷以法於時伊先哲之善喻作後代之元龜企於禮者勤而行之苞本之時已包周身之防踈莖之勢更叶凌雲之期疑當其冒霰停霜雪披風靡諒青青而斯在何冉冉而居彼是知禮之於己如我有徒筠之於竹如我有膚理無特立義必相湏堅剛自持雖貫四時而莫改賞翫不足奚可一日而或無嗟乎皮之不存何以具其體心之不固何以謹其禮所以大戴之記足徴相䑕之詩爰啓君子之道斯其象諸示外以固執中而虚閲寒暑之不變齊榮辱之所如天損不侵地利空積包緑籜而未改交翠葉而不易君子察於此者可學禮而受益湘妃泣竹賦蔣防昔帝舜之南巡不㢠繄二妃兮心傷己摧對三湘之遥兮積水無際望九疑之作疑兮愁雲不開欝丹誠而飲恨攀緑篠以興哀涙浪浪而千里一作重墮睫竹冉冉而萬㸃凝苔斂蛾之怨盈臆如狸之班變色落紅臉而珠影争圓染碧纎兮纈文交織夭紹嬋娟嗚咽潸然瀝青簡兮丹書粲粲灑綠枝兮白露漣漣所謂精神達而理歸其著悲哀集而物謝其堅想夫萬里迎秋重江向夕引蒼翠以歔欷忽闌干而委積杖拳然之手兩㸃垂絲揮宻爾之叢衆痕凝碧是知至哀必感有怨必通竹無情而發外涙有感而從中慷慨成行乍洗龍吟之管斕斒遶節如交鳳食之叢寧類夫聲伯再懐其夣想楊朱徒歎其西東豈無芳菲渝其霜霰豈無浩淼忘其顧眄是以委檀欒寄葱蒨來非鼔瑟玉箸之滴瀝雙流去乃望夫粉籜之淋漓一變懿乎巖巒滿目今古含情事雖遷於嵗月理不昧於堅貞或剪脩竿對潭中而錦落或成長簟施堂上而霞騰豈不以拂水梢雲逾千越萬庶夫知我者謂我㸃㸃而成文不知我者徒曰青青而懐怨文苑英華卷一百四十六
