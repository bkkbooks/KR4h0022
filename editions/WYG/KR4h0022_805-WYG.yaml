body:
  text: 文苑英華巻八百六宋李昉等編㕔壁十簿尉下同州韓城縣西尉㕔壁記一首鄭縣尉㕔壁記一首宴饗相州公宴堂記一首華州新葺設㕔記一首嶺南節度饗軍堂記一首邠州節度使院新建食堂記一首䖍州孔目院食堂記一首盩厔縣新食堂記一首簿尉下同州韓城縣西尉㕔壁記說文曰尉之為言集本無此三字畏也亦尉也主也故字從尸示寸寸者寸量禮度以敬上示者示陳教令以諭下尸者典職司以居位敬上所謂畏諭下所謂慰居位所謂主全兹三者以蒞王爵則仕義周是以古之人嘉用尉字為官號陶唐有太尉周有軍尉秦亦有太尉輿尉東南尉洎漢則復命縣掾曰尉自是以名至于我唐無或易所命善也我唐極天啓宇窮地闢土列縣岀于五千分為七等第一曰赤次赤曰畿曰望曰緊次緊曰上次上曰中次中曰下赤縣僅二十萬年為之最畿縣僅于百渭南為之最望縣出于百鄭縣為之最緊縣岀于百夏陽為之最上縣僅三百韓城為之最上之最次于緊之最非最之緊無與焉緊之最次于望之最非最之望無與焉望之最次于畿之最非最之畿無與焉畿之最次于赤之最非最之赤無與焉最之縣長於餘縣如麟鳯五靈之長於羣靈也數長不數類則韓城之稱與萬年渭南鄭縣夏陽並自緊而上簿尉皆再命三命已徃而受資歴至之而至也上縣而下則自解褐授韓城既上縣之最簿尉解褐之貴者唯三員伺其闕非年年之有或一員之闕天下皆知之授之日亦皆知之曰某人授韓城尉是其人則頌非其人則誹雖一命之官其集有為字人尚也如此則主司慎擇才地精羙縣亦有六曹尉二人一判功户倉其署曰東㕔一判兵法事其署曰西㕔兹㕔兵法事之㕔也根之州則司兵司法司事盡在刑之國則兵部刑部工部盡在兵主武法主刑工主土今武未大威務尚繁刑未大措獄集作訟尚生工與人興無時休州縣司或䨇曹六人分其職國則部屬寮八九十人分其職一人理六人八九十人之理雖小大集作大小有異而揆緒不殊其緒不殊集無此字其官不易集作官其官其官不易文粹作其官不易能至於易者則人無敢易之人無敢易之則國必重之國重之則賦洪鈞大柄所由乎此也貞元十五年春余友人滎陽鄭伯義授焉鄭自上累集無累字葉聲名為天下聞鄭以經明登科又三舉進士屈於命詞學亦流輩推内行第一其受命之年五月余詣焉十月又詣焉見東㕔有記西㕔無記因請書示本㕔三字集作其姓氏序于左其或先于鄭芳馨猶存集作在者亦得之至于鄭繫于鄭皆繫之集無之字若土壌廣狹物産有無尉非得主不敢僭序十月十五日記鄭縣尉㕔壁記梁肅自華而東東距洛師抗雄多臨大道其縣有七若壌接天府號因舊國分鄭為之首又斜隣其陸焉天官每銓士補吏常屬意於此三科之選其人尤精比畿服之偏者難易相隔不啻數等其地望可知也元年春正月集作光正之後賢侯才子曰蘭陵蕭倕以貞敏恪慎再命為尉掌倉曹岀納與工徳修飾之事事舉職修而令名随之暇日謂予曰之邑之作非舊也初在於州東北隅廣徳中以賊臣周智先史作智光以河潼叛放暴兵爇官寺且脇誘將吏生立已祠而棟宇斯崇及王孫集作師是致誅牧民者從便宜而重改作乃刷滅凶慝之遺塵徙二治焉是㕔盖祠之餘也噫曩者慿而為妖今乃即而為政合於大順用鍳將來是宜書之以告昩者予於是著之屋壁且以紀夫人之羙若風俗疆土與置集作立邑之年代分於集作為尉今監察御史黎逢嘗編為鄭志藏在州府中可覆視也故不書時御史中丞董公為邦之三載秋九月定安梁肅記饗宴相州公宴堂記程浩公宴堂昭儉也高平王尚猶侈焉一作為先是王師岀征驛遽告聳百戰俠骨委于溪澗九遷殤魂飛在草莽上聞而憐之詔我薛公為刑部尚書兼御史大夫保釐于東建節于鄴也時兵不滿百馬惟數駟府微棲糧家僅餘堵公乃掃除粃政濟活人命一年而墻宇興二年而耕稼盛日就月將遂臻夫小康崇其宴堂者不得已而營也豈無黕幕尚爾能可乆豈無丹楹受爾不愆素豈無錯石所慮轉他山豈無貨材所重仍舊貫其始也經構侏儒廻移欒櫨率取諸大壯未暇於全模其終也嶷然雲横燦以星鋪禮行於九賔並坐於千夫不設窓户且一作寔防於壅閼不加剞劂且陋夫華睆水之以視其平坦墨之以視其方直役也應時宜其善頌成之匪日所謂恱使若軍中凱樂羣下胥宴六佾咸在三懸既張清醑引淮芳饌羅岳自上而王侯公伯迨下而皁隸庖翟進則酣而不荒退則服之無斁及四賢講徳七子㑹文拂羽扇而納凉揮素琴而待月對水得江湖之性捲簾見天地之心寂寂一作惜惜無譁綽綽有裕相與先評所職次徴他詞驟揚厥懿除攻其短君子以為薛公義誘於衆仁和於物誘進則衆洽和同則物安俾夫聳善觀過罔不由斯堂也向使卑不合度髙不中禮適足尤孟孫之室羙諷夷吾之山節浩躭静辭蒲脂車訪舊入境而七徳有餘及庭而三歎不足幸承君之恵顧又因此闕之操觚斐然於是乎記時大厯三年六月旬有五日也華州新葺設㕔記沈亞之今天下邦郡之望莫與太華等然而公堂讌臺集無此字無别位顧几硯與餼樂之具日更廢置於其間寧地勢然要為守者無乆留於任而經慮莫及此乎隴西公為守未滿嵗郡中既治因窺其庶屋可改集作攻者乃先問其吏曰政之為困何始也吏曰累更其守耳公曰吏知其病哉夫几硯者公事之重器也以宴而遷撤宴而復則居不得常屢更其所政之為困不由此耶且吏入公門望其居則必莊是几硯之處宜其嚴也今朝撤而暮置事之者既勞固以慢矣而况酒行樂作婦女列坐優者與詼諧摇笑集作優隆談謾者與請摇笑機左右侍立或銜哂壊容不可罪也夫狎乆則失集作不敬豈吾之獨患其吏亦醜之明日觧冗宇一構於正寢西南隅壍其外數岀土基之飭故材以輳用垢者磨其淄弱者承其輕决流於其所以塗者補棟續楹不渉旬而功就沼沚之媚随而比矣嗟乎轉疣為安不費而功吾知其由人長慶元年四月甲子呉興沈亞之仰公之跡因請張文其下紀其功焉嶺南節度饗軍堂記桞宗元唐制嶺南為五府府部州以十數其大小之戎號令集作名之用則聽於節度使焉其外大海多蠻夷由流求訶陵西抵大夏康居環水而國以百數則統於押蕃舶使焉内之幅員萬里以執秩拱玉稽時聽教命外粹有境字之羈屬數萬里以譯言摯集作贄寳嵗帥貢職合文粹有外字二使之重以治于廣州故賔軍之事宜無與較大且賔有牲牢饔餼嘉樂好禮以同逺合疏軍有犒饋宴饗勞旋勤歸以羣力一心於是治也閈閎階或作陞序不可與他邦類必厚棟大梁集作杗夷庭高門然後可以上充於揖譲下周於歩武今御史大夫扶風公亷廣州且專二使増徳以來逺人申威以脩戎政大饗宴合樂從其豐盈先是為堂於治城西北陬其位公北向衆賔南向奏部伎于其西視泉地于其東隅奥庳仄庭廡下陋日未及晡則赫炎當目汗眩更起而禮莫克終故凡大宴饗大軍旅則寓于外壘儀形不稱公於是始新集粹作斥其制為堂南靣横八楹縱十楹饗宴之位五字文粹作嚮之宴位化為東序西又如之其外更衣之次膳食之宇列觀以遊目偶亭以展聽集粹作聲彌望極顧莫究其徃泉池之舊増濬益植一作廣以暇以息如在林壑問工焉取則師輿是供問役焉取則蠻隸是徴問材焉取則隙宇是遷或益其闕伐山浮海農賈拱手張目視具乃十月甲子克成公命饗于新堂幢牙茸纛金節析羽旂文粹作餙旗旟旞咸旅集作餙于下鼓以鼖晉文粹作鼔金以鐸饒公與監軍使肅上賔延羣僚將校士吏咸次于位卉裳􅄢衣胡夷蜑蠻睢盰就列者千人以上鉶鼎體節燔炰胾炙羽鱗貍牙之物沉泛醍盎之齊均飫于卒士興王之舞服夷之伎楔擊吹鼔文粹作鼓吹之音飛騰幻或作眩怪之容環集粹作寰觀于逺邇禮成樂遍以叙而賀且曰是邦臨䕶之大五人合之非是堂之制不可以備物非我集無此字公之德不可以容衆曠于徃初肇自今兹大和有人以觀逺方古之戎政其曷用加此華元名大夫也殺羊而御者不及霍去病良將軍也餘肉而士有饑色猶克稱能以垂到今矧兹具羙其道不廢願訪集作勒于金石以永示後祀遂相與來告且乞辭某譲文粹作牢不獲乃刻于兹石邠州節度使院新建食堂記劉寛夫朝廷以新平振東西夏鏁鑰郊圻將帥得人則虜馬不敢東嚮而牧今上注意邉事元年命左僕射河東桞公專䕶塞之任公秪承詔㫖不敢怠遑覧風俗以施化則酌損益以制宜文武交修威和迭用搜刓蠧於積弊張綱維於盡隳完兵甲贅軍糧藥瘡痍粒饑餓以信為囿築法為垣人知嚮方卒乗輯睦我㓗已而貪冐自革我不動而云為曷生表正影端俗為丕變邠之父老重沐皇風仲尼每言為政之道可使三年有成公孫𢎞對漢武且云臣𢎞尚竊遲之始為孟浪今於河東公信之矣既而定名分補廢闕飾賔署𢎞講讌視使院之狹湫顧㑹食之無所因喟然而嘆曰夫為理之本在於得人燕以尊賢是稱衛以多士為羙今鰌瑗在列而堂舘未嚴非所以重罇爼咨幃幄之意也於是從觀馬之舊亭敝公府之新宇増階陞所以示尊威也卜高明所以啓顧慮也大不踰制崇不近奢榱桷礎闥無不中度翼張四簷洞開䨇扉冬霜不到夏日漸却可以備盤飡之品式可以叙主客之威儀可以寄琴樽之笑傲可以籌政令之得失君子是知河東公之為政也必自邇而逮逺自身而及物以理易亂以實易虗以𢎞深易卑犯疑以廣壯易隘陋皆此類也府中僚介無非正人有若司馬韋君節度判官皇甫君皆卿材也無靣從退言之誚無躬厚薄責之嫌其他或幄中號寳或席上稱珍並擅價一時不可徧舉韋君皇甫君以余載筆赤墀粗知舊史可以傳言命為記之時大和二年六月日記䖍州孔目院食堂記蔡詞立京百司至於天下郡府有曹署者則有公尉亦非唯食為謀所以因食而集評議公事者也繇是凡在厥位得不遵禮法舉職司事有疑獄有寃化未洽弊未去有善未彰有惡未除皆得以議之然後可以聞於太守矣冀乎小庇生靈以酧寸一作乎非禄豈可食飽而退羣居偶語而已况䖍居江嶺地扼咽喉有兵車之繁賦役一作農賦之重茍一物為害則萬姓何辜一綱不提則七邑何守同舍諸公得無屬意焉小子承乏每慙尸素志求短拙憂心忘飡一作食或有公事之稽留獄訟之寃滯六曹之臧否百姓之慘舒農桑之失時鄉閭之蠧弊聞見所未及才智所未臻希㑹饌以言之共禆風化院食堂舊基圯陋咸通七年夏前太守隴西公遇時之豐伺農之隙因革􅇬署爰立兹堂環之高樓翼之虗楹有風月之景花木之隂無燥濕之虞蟄陷之慮聚於此者得無愧焉處廣厦宜念巢居露寢者食兼味宜念糊口甑塵者夏清凉宜念曝日而耕者冬温燠宜念卒嵗無衣者茍用心如是則日食萬錢無以為愧豈惟公膳哉自建剏之後于今七年未有紀述深以為缺小子伏役之暇好讀書為文雖顧不才聊用冝録咸通十三年五月三日記盩厔縣新食堂記桞宗元貞元十八年五月某日新作食堂于縣内之右始㑹食也自兵興以來西郊捍戎縣為軍壘二十有六年羣吏咸寓于外兵去邑荒棟宇傾圯又十有九年不克以居由是縣之聨事離散不屬凡其官僚罕或覿見及是主簿某病之於是且掌功役之事集作任俾復其邑居集無此五字廪庫既成學校既修取其餘材以構斯堂其上棟自南而北者二十有二尺周阿峻嚴列楹齊同其飾之文質階之高下視邑之大小與吏之品集無此字秩不陋不盈高山在前流水在下可以俯仰可以宴集作偃樂堂既成得羡財可以為食本月權其贏羞膳以充乃合羣史于茲新堂升降坐起以班先後始正位秩之叙禮儀笑語講議徃復始㑹政事之要筵席肅莊籩豆集作樽爼静嘉燔炮烹餁益以酒醴始獲僚友之樂卒事而退舉欣欣焉曰惟禮食之來古也今京師百官咸有斯制甸服亦王之内邑且官有僚集作聮屬則宜統㑹以齊之也嚮之離而今之合其得失也逺甚我是以肅焉而莊衎焉而和羣疑以亡嘉言以彰㫖乎其在斯集作此堂也不惟其馨香醉飽之謂某之力也夫宜伐石以志使是道也不替于後乃列其事來告使余書之文苑英華巻八百六
