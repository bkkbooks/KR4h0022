body:
  text: 文苑英華卷七百七十三宋李昉等編帝徳中開元紀功徳頌一首龍池聖徳頌一首大唐封禪一作祀壇頌一首華山述聖頌一首開元紀功徳頌并序張九齡臣聞蠻夷猾夏唐虞已然天之所生類不可絶嘗有拓境者矣而固也為患或有欵塞者矣而必也無親是以古之哲王審其若此則限以荒服斷非純臣不貢不王武功居後不庭不率文徳是先三代所以直道百蠻所以向化逮乎春秋之衰諸侯以力征伐自出戎心大啟謀夏亂華干盟偪好王綱弛而若綴天道厭而將革則有彊能攘刼暴息交侵雖雜覇之無成亦反經之所取其負力者乃塹山堙谷盡境而築長城其黷武者則輓粟飛芻窮兵以耗中國又失於下䇿而悔在末年彼王畧之不恢殆千餘載矣夫有其虞而無豫思其患而不圖所謂能國將安貴聖物豈終否道非固窮鍳之者昊天救之者英主𤣥命陰隲付畀集作俾付神武我太宗一戎衣而大定我皇帝再受命而太平不是古而務文不非今而忘戰以時變而消息與天元川粹集本作元興天而合符日月之所照臨陰陽之所陶冶凡有在地莫不禀朔而東夏郡縣北隙山戎先是四十年侵軼數百里自茲氣奪數以病告既威攘之不讋且力制之不可或朝或否為虺為蛇幽鄣未遑以㓕烽邊域安得而弛柝曠日持久兵連禍結一作㓗率由事邊是無寜嵗二十二春乃命右羽林衛大將軍兼御史中丞幽州長史張守珪將中軍都督諸鎮雄名先路夷裔生風載馳信臣繼發精卒戒嚴有赫張皇若神公卿大夫未始測也將校部曲亦莫知也皇帝方淵集作泉又作日避諱靖以慮之乾剛以斷之初决䇿於九重已收功於萬里矣二十二年冬十有二月中貴將命元戎受律三軍疾雷於不時二庭䘮膽於非意欲遁則衆潰不保欲拒則兵鋒莫當因而一作命偽降幸且川粹作以紓禍遽圖反覆將肆鴟張觀釁先入集本川粹作人豈伊負我以間諜而情得乗猜攜而計從或竒兵以嘗或厚利以㗖無何變作果自族誅兇元惡首鬼得集作惑神誘假天威而無前覆鳥巢而何有於是諸部大駭率種二本作衆復歸責以不義之尤捨其不臣之罪既服即序有威且懐載籍以来固未之見也昔我睿祖即句驪於拾遺今茲聖謀易林胡於反掌獻功有續一作績後嗣無忘一作怠百王所廢之勲四夷未賔之俗自我底定巍乎發二本作登皇其若此也於是彼節使與羣帥因東師之凱旋離而族談合而公議以為主上憫一隅之苦垂不伐之畧以計易戰以兵去兵神斷自天虜平不日且軍未血刃敵免膏原宻承無方之謀坐致不陣之㨗有征無戰真王者之師歟而不彰羙於吾君得無臣子之罪不表聖於帝載曷稱文武之時乃率其屬至於固請帝三讓徳而曰俞哉夫曲成萬類者天為而不有下濟兆庶者聖成而不居物無謝生於天雖云至道人無歸羙集作功於聖何以最靈雖無已無名所宜絶於言象而惟忠與義固不廢於頌述大雅曰集作云徐方既同天子之功又曰明明天子令問不已其此之謂也臣拜手稽首集作冄拜頓首敢獻頌曰赫赫天威兮被遐荒蠢茲山戎兮不来享集作王命南仲兮整六師出幽陵兮轥九夷簸赤山兮蕩滄海弔無吿兮伐有罪徒不動集作勤兮車不殆虜震驚兮兵氣倍昔負固兮今安在鬼自殱兮裔既平謀既售集作集兮聖自明我不戰兮獻戎捷俾厥後兮揚天聲聖自明集作聖日月龍池聖徳頌并序臣聞昔者𤣥徳升聞皇天眷命元聖有作上帝何言必見意於休徴不文粹無不字忘象於幽賛惟茲降鍳若曰專精道周萬物者其魄集作神尤功濟生人者其祥大粤若古始肇有君臣巢燧之前寂寥集作寞無紀書契而文粹作之後炳煥可觀若乃鬼神睢盱品彚紛錯性命未正吉㐫不定而太昊氏將通其徳則河為之出圖人食未粒鳥獸又茹時不耕稼器無耒耜而神農氏將教其本則天為之雨栗蚩尤不道炎帝不制銅鐵鑄兵豺狼横厲而軒轅氏將禁其暴則天為之降𤣥女洪水方割下民昏墊堯徳莫能弭厥災舜功不能除其害而夏后氏將底其績則洛為之出書因茲以還文粹作降殆文粹作盖三千嵗矣其間木火更王雲物吿符有若狼銜鉤魚躍舟素靈哭文粹作出黄星見豈不以湯徳有慙武善未盡漢道既雜魏方亦偏唯以一至之應且為興王之兆則未有天錫真符聖受明文粹作休命逺與大禹相續超與上皇比崇如我國家之盛者焉洪惟龍池盖天之所以祚聖即今上卜居之舊里集作真京師爽塏之地集作所傍無竇澤中忽集作無非檻集作濫泉非常而靈液涓流無機而神池文粹作化浸廣榮光休氣若煙若雲所未嘗文粹作曽有則此之出雖清可以鑑而深不見底鱗介瑰詭於牣文粹作充蒲其中時莫知其所然目二本作日徒見其有異中宗採識者之議猒文粹作壓王氣而来逰聖上處或躍之時乗二本作出飛龍而合應臨淄始封也邸第在焉上黨歴試也靈符紹至天其以是永命我唐圖象文粹作國家丁寜有所底止其若茲也夫成數有時而否至理無代而亡固在乎大聖之生也乗運而作皷天下之動安天下之危故奬集作將順成功自古之啟佑之也如彼克定多難自天之恊賛之也如此初中宗違代集作氏非后黨窺隙大盜狃於得志羣慝起而擅朝集作權若綴旌旒然當此時也天與若不取鬼謀或文粹作若不恊則我宗祖之業無乃將墜文粹有而字億兆之命亦猶倒懸聖人感集作蹙之提劍而起雷電一奮妖沴以清内難既衰外虞有謐推戴太上臨照文粹作照臨萬邦寔天之為與人更始系皇統維乾綱决綻補壊蕩瑕滌穢而乃闕典咸備舊章悉舉處窮盡逹在困必通品物資以再生寰區為之一變然後反華偽於朴還澆醨集作漓於淳以大道為原以至仁為根動推是心以御於事人見徳而興行神享誠而介福故不在於刑罰亦不在於禱請大造財文粹作化成𤣥猷允二本作充塞有如陽春播澤觸類皆滋太山起雲無逺不徧雖昆蟲草木與蠻貊要荒樂其所生安其所習在牛羊而勿踐有干戈而載戢又况於衣冠華夏禮樂家邦而不形集作刑於斯湏不久文粹作彰於漸漬者也夫然何教非徳何化非經何能亊之不舉何醇精之未極周漙洋溢成集作於乎緝熈至於太和莫不允若體侔天地之大事出皇王之表豈擎跽曲拳盡禮極力將欲二本作用彦聖不啻其口所能稱誦於吾君所可殆庶於至徳且往者之有開也天感精以降聖聖敬命以奉天此誠有元則欽明文思及茲報本必嚴祗齋慄靈慶以屬之神化以答之與初相明其徴乃著紛集作絲綸先兆非篤信歟由是言之統天者人合符者聖而羙集作差徳序命殊尤篤絶豈多乎哉至如古之興王必有所感五帝更尚五運傍集作旁通土者黄中之精於金為母集作王水者善利之物於土為妃苟應集作配膺期而有来必合徳而為表是則然矣天其或者亦以阜育羣化發揮隤集作茂文粹作畨祉始吿以聖有明徴終成乎帝之神冊因其立象之本㑹以相乗之數則載祀集作代六百厯紀千年變而通之胡可量也宗子宗正卿褒信郡王璆文粹作等若干人伯父伯兄仲叔季弟聚族相與詣闕上言天意昭著固已久矣人事符合亦云至矣而一徳是建太階既平靈臺靈沼赫赫明明天之為大雖莫能名王之在鎬集作皇王之鎬豈無頌聲上初克讓抑而未許至於累請乃曰俞哉史臣不敏敢獻頌曰體侔天地集文粹作包阜育羣化群閩本作肇茫茫元昊載凝載薄在帝庖犧繼天而作浩浩洪水包山襄陵舜亦命禹夏氏以興龍圖龜書二王是膺湯武以下夫何足徵右元命於鑠巨唐乗運而起纉禹之統集作績系堯之紀五聖在天丕命曾孫髙視河洛同符混元亦有黄龍出於靈沼明明穆穆天子之表右聖徳倬彼東井昭彰集作章于天沉精降液下為靈泉靈泉有泚其深無底泌之洋洋其甘如醴清徳之鑑柔道之體洪源濬規實天所集作之啟右靈泉文粹作龍泉濯濯靈泉𡨕二本作洞冥皇祗滋液流衍文粹作行化為神池曰止曰行惟聖之作匪鱣匪鮪惟龍之躍植物斯生動物斯樂天根集作眼非有見曾是不涸右神池靈有休氣紛紛郁郁如山之苞如雲之族潜龍在下瞻烏在集作斯屋兆云其吉周爰咨詢既契我龜又叶我人鎬雖舊京其命維新右休氣蜿蜿集作宛彼黄龍神池自出靈化惚恍集作恍愡噴雲沃日吿帝之符其儀孔佶或潜於泉或見在集作乎田與時順動亦應于集作乎天克配我皇無徳稱焉右黄龍大唐封禪一作祀壇頌張說皇唐六葉開元神武皇帝再受命致太平乃封岱宗禪社首鑿石紀號天文煥發儒臣志羙立碣祀集作祠壇曰厥初生人俶有君臣其道茫昧其氣朴畧因時歘起與運而紛落泯泯沒沒而集作文粹無此字無聞焉爾後聖人取法象立名位衣裳以等之甲兵以怛之於是禮樂出而書記存矣究集作文粹作反其源教集作文粹作致敬乎天地報其本致羙乎鬼神則封禪者帝王受天命吿成功之為也閱曩聖之奥訓考列辟之通術疇若天而不成曷背道而靡失由是推之封禪之義有三帝王之畧有七七者何傳不云乎集本文粹無乎字道徳仁義禮智信順之稱聖哲逆之號狂悖三者何集本文粹無此字一位當五行圖録之序二時㑹四海昇平之運三徳具欽明文思之羙是謂與天合符名不死矣集作已有一不足而云封禪人且未許其如天何言舊史者君莫道於陶唐舜禹文粹作虞舜臣莫徳於臯陶稷卨三臣備徳皆有天下仲尼敘帝王之書繋魯秦之誓明魯祀周公用王禮秦承伯益按周統孔聖㣲㫖不其效歟然秦定天下之功髙享天禄之日淺天而未忘庭堅之徳也故大命復集於皇家天之賛唐不惟舊矣其興之也𤣥靈啟廸黄祗顧懐應歸運以義舉撫来蘇以利見䕶也無放夏之慙武也無伐殷之戰髙祖創業四宗重光有徳集本文粹作徳有格天漏泉蒸雲濡露菌蠢滋育氤氲㴠煦若天地之覆載日月之照臨漙有形而希集本文粹作㲽景罄無外而宅心百有八年于茲矣皇帝攘集作襄内難而啟新命戴睿宗而纉舊服宇宙更闢朝廷始位盖羲軒氏之造皇圖也九族敦序百姓昭明萬邦咸和黎民於變立土圭以歩歷革銅渾以正天盖唐虞氏之張帝道也天地四時六官著禮井田三壤五圻成賦廣九廟以尊祖定六律以和神盖三代之設王制也武緯之文經之聖謩之神化之然猶戰戰兢兢日慎一日約規誨以進徳遂忠良以代工講習乎無為之書討論乎集賢之殿寵勇爵貴經門翼乎鵷鸞之列在庭毅乎貔貅文粹作豹之師居鄙人和傍感神寶㳫至乾符坤珍千品萬類超圖軼集本文粹作益諜未始聞記我后以人瑞為心集本有初字不以物瑞為意王公卿士儼然進曰休哉陛下孝至于天政合於文粹作于道前年祈后土人獲大穰間嵗祀圓丘日不奄朔感祥以祚聖因事以觀天天人交合其則不逺意者喬岳集作文粹作和埽集作域路望翠華之来上帝儲恩俟蒼璧之禮久矣焉可專讓而廢舊勛羣臣固言勤帝知罪至於再至於三帝乃揖之曰欽崇天道俯率嘉話恐徳不類敢憚于勤其撰廵狩之儀求封禪之故既而禮官不誠而備軍政不謀而輯天老練日雨師洒道六甲按隊八神警蹕孟冬仲旬乗輿乃出千旗雲列集本文粹作引萬㦸林行霍濩燐爛飛焰揚精原野為之震動草木為之風生歴郡縣省謡俗問耆年舉百祀興墜典葺闕政攸徂之人室家相慶萬方縱觀千里如堵城邑連歡丘陵聚舞其中垂白之老樂過以泣不圖蒿里之䰟復見乾封之事堯雲往舜日還神華靈鬱爛漫乎穹壤之間是月来至於岱宗祗祓齋宫滌集作亨濯靜室凝神𤣥覧將欵太一議夫㤗山者聖帝受天官之宫天孫㹅人靈之府自昔立國莫知萬數克升中而建號惟七十而有五我髙宗六之而今七矣非夫尊位盛時明徳曠代遼濶難并之甚哉先時將臻夫大封也累封壇集本文粹作疆於髙岡築泰壇於陽阯集作趾夫其天壇三襲辰陛十二咸秩衆靈列座有次崇牙樹羽管磬鏞皷宫懸於重壝之内干戚釵殳鈎㦸戣戵周衛於四門之外伐國重器傳代絶瑞旅之於中庭玉輦金轂翠冒黄屋夾之於端路庶官百辟集作僚羗夷蠻貊褒成之後讓王之客叙立於禮神之塲髦頭拏牙鐡馬金鏃介冑如雪旗幟如火逺匝於清禁之野於是乎以集有夫字天正上元法駕徐進屯千乘於平路留羣臣於谷口皇帝御六龍陟萬仞獨與一二元老執事之人出天門臨日觀次沆壑宿巉巖赤霄可接白雲在下庚寅祀髙祖於上封以配上帝命衆官於下位以享衆神皇帝冕裘登壇奠獻俯僂金奏作集作叶金奏佾羽舞撞黄鐘歌大吕開閶闔與天語請集本文粹作清將信公奉斗布度懋建皇極勤恤蒼生招嘏乎未兆禳災乎未萌上下傳節而禮成樂遍福夀同歸而帝賜神䇿乃檢玉牒於中頂揚紫燎於髙天庶衷誠而上逹若憑焰而駕煙日轡方旋神心餘眷五色雲氣拂馬而集本文粹作以随人萬嵗山呼從天而至地越翌日尊睿宗侑地祗而禮社首遂張大樂覲東后國風惟舊無黜幽削爵之誅王澤惟新有𤯝災火賚之慶不浹日至化洽於人心不崇朝景福遍於天下然後藏金匱於祏室廻玉鑾於上都煌煌乎真聖朝之能事而髙代之盛節者也于斯之時華戎殊俗異音同歎曰岳集本文粹作合多雨山峻多雲一作靈豈有大舉百萬之師尅期千里之外及行事之日則天無㸃翳地無纎塵嚴冬變為韶景寒谷鬱為和氣非至徳孰能動天如此其順者乎昔人云自西自東自南自北無思不服今信知聖人作而萬物覩其心服之謂矣或曰祭泰折主先后非禮歟曰是禮也非宜也王者父事天母事地侑神崇孝無嫌可也且夫柴瘞外事帝王主之烝嘗内事后妃助之是開元正人倫革弊禮起百王之法也故令千載承集本文粹作成末光聆絶韻咀甘實潄芳潤爍𤣥妙之至精流不已之淑聲臣說作頌吿於神明四集作三皇墳而六集作五帝典雖吉甫亦莫能名徒採彼輿人之詩曰大矣哉維天為大維皇則之集作則率我萬國受天之祺子孫百代人神共保綏之云爾而已矣華山述聖頌并序逹奚珣序曰懸象著明莫大乎日月我聖人之文也發祥儲祉莫大乎神祗文之所繇興也原夫天作太華氣雄羣山秉靈伊河受命如響自坤元之所開拓雲帝之所廵逰祀典雖存宏圖盖闕洞陰陽之不測其惟大聖歟於是藻翰自天發揮神化建碑于廟以光寵焉乃命朝英實司其亊經始勿亟庶人子来徒觀其神翰坤珍羙石次玉追琢之際厥聲冷然磨礱之後其光洞納樹之平地嶷巖斷山六龍盤薄紏其上羣神羅集作離立負其下藝事既畢宸章乃開竊以洪鑪大造之時天動地業秘籙聿来之日風摇雲起詞義至廣含元一作光氣而運行翰墨至精吐奎星而飛動剛柔相錯神妙無方合而五光昭離而萬象列宇宙之間粲如也繇是發巖巒之氣色益祠廟之風稜不怒而威有来加敬盖因大君之一顧也寵秩榮幸不其至哉初有司以法駕時廵路直斯地將選巨石先期底功天意若曰夫人神之主也嚴神以為人也今穡事未已工徒復興人儻失業神將何據方待嵗暮以湏後圖粤若碑版嶪乎刋刻通其變則人不倦節其用而財不傷俾夫役者逸於從亊天之臨下其道有赫曲成萬物何往非宜時厥使臣乃昌言曰國之大事在祀神之所歆在徳以徳舉事吾君有光比夫周銘弇山存乎車轍馬跡漢祠少室盖欲遥輿一作興輕舉至誠逮下可同年而道哉頌聲未作詞客之過小人固陋逰聖難名實頼文宗繼其不逮敢託吕補闕向為之頌云天輔聖徳配極而崇帝者祖號神行慈㫖布澤而洽人之父兮叶命髙嶽喻夀其聲招靈祜兮飛文孤標洒翰天類使物覩兮騰雄激烈交夫聲芬􅅯上古兮發潤飄清揔此先一作光氣覆下土兮探異閱妙意力猶懸空作矩兮徴往到近辭聽相援一作受無與伍兮文苑英華巻七百七十三
