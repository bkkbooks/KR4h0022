body:
  text: 文苑英華巻三百四十九宋李昉等編雜歌中江畔老人怨一首鑷白曲一首金銅仙人辭漢歌一首金井歌一首閭里謡一首無可奈何一首馮燕歌一首雜歌一首散人歌一首刈穫行一首天威行一首築城篇一首江畔老人怨崔顥江南少年十八九乘舟欲渡青谿口青谿口邉一老翁􅁂眉皓白已衰朽自言家代仕梁陳垂朱拖紫三十人两朝出將復入相五世疊皷乘朱輪父兄三葉皆尚主子女四代為妃嬪南山賜田接御苑北宮甲第連紫宸直言榮華未休歇不􅁴山崩海將竭兵戈亂入建康城煙火連燒未央闕衣冠士子䧟鋒刃良將名臣盡埋沒山川改易失市朝衢路縱横填白骨老人此時尚少年脱身走得投海邉罷兵嵗餘未敢出去郷三載方流旋蓬蒿忘却五城宅草木不識青谿田雖然得歸到鄉土零丁貧賤長辛苦採樵屢入厯陽山刈稻常過新林浦少年欲知老人嵗豈知今年一百五君今少壮我已衰我昔少年君不覩人生貴賤各有時莫見羸老相輕欺感君相問為君説説罷不覺令人悲鑷白曲薛逢去年鑷白鬢鏡裏猶堪認一作渾年少今年鑷白髪两眼昏昏手戰挑疑作揮滿酌濃酧假顏色顏色不揚翻自笑少年曽讀古人書本期獨善安有餘雖盖長安一片瓦未遑卒嵗容寕居前年依亞成都府月請俸緍六千五妻兒骨肉愁欲來偏梁閣道歸得否長安六月塵亘天池塘鼎沸林欲燃合家慟哭出門送獨驅匹馬陵山巔到官只是推誠信終日競競幸無恡丞相知憐為小心忽然奏佩專城印專城俸入一倍多况兼職禄霜峩峩山妻稚女悉迎到時列緑罇酣酒歌醉來便向罇前倒風月滿頭絲皓皓雖然减得闔門憂又加去國五年老五年老知奈何來日少去日多金鎚鎚碎黄金鑷更唱罇前老去歌金銅仙人辭漢歌李賀魏明帝青龍元年八月詔宫官牽車西取漢孝武捧露盤仙人欲立置前殿宫官既拆盤仙人臨載乃澘然淚下唐諸王孫李長吉遂作金銅仙人辭漢歌茂陵劉郎秋風客夜聞馬嘶曉無跡畫欄桂樹懸秋香三十六宫土花碧魏官牽車指千里東闗酸風射眸子空將漢月出宫門憶君清淚如鉛水衰蘭送客咸陽道天若有情天亦老携盤獨出月荒凉渭城已逺波聲小金井歌劉商文明化洽天地清和氣一作元和氤氲孕至靈一作精瑞雪不散抱層嶺陽谷霞光射山頂薙草披沙石竇開生金曜日明金井虞衡相賀為禎祥畏人採攫持殳戕疑作拆羊馳馬走塵滿道郡邸封章開建章君王儉徳先簡易贍國肥家在仁義山澤藏金與萬人宣言郡邑無專利閭閻少長競奔凑黄金滿䄂家富有驩心蹈舞歌皇風願載謳謌青史中閭里謡効古歌李紳鄉里兒桑麻鬱禾黍肥冬有繿􅃭夏有絺兄鉏弟耨妻在機夜犬不吠開蓬扉鄉里兒醉還飽濁醪初熟勸翁媪一作嫂鳴鳩拂羽知年好齊和楊花踏春草勸少年樂耕桑使君為我剪荆棘使君為我驅􅉘狼林中無虎山有鹿水底無蛟魚有魴父子獵歸白日暮明月處處舂黄粮鄉里兒東家父老為爾言皷腹那知生育恩莫令太守馳朱轓懸皷一鳴盧鵲喧惡聲主吏噪爾門唧唧力力烹鷄豚鄉里兒莫悲咤上有明王頒詔下重選賢良恤孤寡春日遲遲驅五馬留犢投錢以為謝鄉里兒終爾詞我無却巧惠無私舉手一揮臨路岐無可柰何歌白居易無可柰何兮白日走而朱顏頹少日往兮老日催生者不住兮死者不回况乎寵辱豐顇之外物又何嘗不一去而一來去不可挽兮來不可推無可柰何兮已焉哉惟天長而地乆前無始而文粹作兮後無終嗟吾生之幾何寄瞬息乎其中又加太倉之稊米委一粒於萬鍾何不與道逍遥委化從容縱心放志洩洩融融胡為乎分愛惡於生死繫憂喜於窮通倔强其骨髓齟齬其心胷合氷炭以交戰祗自苦乎厥躬彼造物者于何不為而此文粹作此與化者云何不隨闕或吸或吹或盛或衰雖千變與萬化委一順以貫之為彼何非為此何是誰冥此心夣蝶之子何禍非福何吉非㐫誰逹此觀䘮馬之翁俾吾為秋毫之杪吾亦自足不見其小俾吾為太山之阿吾亦無餘不見其多是以逹人静則脗然與隂合迹動則浩然與陽同波委順而已孰知其他時耶命耶吾無柰彼何隨文粹作委耶順耶彼亦無奈吾何夫两無奈何然後能冥至順而合大和故吾所以飲大和扣至順而為無柰何之歌馮燕歌司空圖麗情集作沈亞之歌中亦云為感詞人沈下賢良歌更與分明説下賢沈亞之字也魏中義士有馮燕遊俠幽并最少年避讐偶作滑䑓客嘶風躍馬來翩翩此時恰遇鸎花月堤上軒車晝不絶两靣髙樓語笑聲指㸃行人情暗結擲果潘郎誰不慕朱門别見紅粧露故故推門掩不開似教歐軋傳言語馮生敲鐙䄂籠鞭半拂垂楊半惹煙樹間青鳥知人意的的心期暗與傳傳道張嬰偏嗜酒從此春一作香閨為我有梁間客鷰正相欺屋上鳴鳩空自鬬嬰歸醉卧非讐汝豈知負過人懐懼燕依户扇欲潛迯巾在枕傍指令取誰言狠戾心能集作難忍待我情深情不隠回身本為集作謂取巾難倒柄方知授霜刃馮君撫劔即持集作遲疑自顧平生心不欺爾能負彼必相負假手他人復在誰忩間紅艶猶可掬孰視花鈿情不足唯將大義斷胷襟粉頸初廻集作過如切玉鳯凰釵碎各分飛怨魄嬌魂何處追集作歸陵波如喚遊金谷羞彼椰榆淚滿衣新人藏匿舊人起白晝喧呼駭隣里誣執張嬰不自明貴免生前遭考捶官將赴市擁紅塵掉臂人來擗㸔人傳聲莫遣有寃濫盗殺嬰家即我身初聞僚吏翻憂嘆集作憂翻疑呵叱風狂詞不變縲囚觧縳自猶集作猶自疑疑是夣中方集作云脱免未死勸君莫浪言臨危不顧始知難已為不平能割愛更將身命救深寃白馬賢侯賈相公長懸金帛募才雄拜章朗讀集作清讀馮燕罪千古三河激義風黄河東注無時歇注盡波瀾名不㓕為感詞人沈下賢長歌更與分明説此君精爽知猶在長與人間留烱誡鑄作金燕香作堆焚香酧酒聽歌來雜歌李端漢水至清泥則濁松枝至堅蘿則弱十三女子事他家顏色如花終素漠蘭生當門鶯巢幕蘭芽未吐燕泥落為姑偏忌諸嫂良作婦翻嫌壻家惡人生照鏡湏自知無監何用妬西施秦庭野鹿忽為馬巧偽亂眞君試思伯奇掇蜂賢父逐曾參殺人慈母疑沽酒千日人不醉琴弄一絃心已悲常聞善交無爾汝讒口甚甘良藥苦山雞錦翼豈鳯凰隴鳥人言止鸚鵡向栩非才徒隠􅍳田文有命那闗戸犀燭江行見鬼神木人登席上歌舞樂生東丁終居趙陽虎北轅翻適楚世間反覆不易陳緘此貽君淚如雨散人歌陸龜䝉江湖散人天骨奇短髪柧集作搔來蓬半垂手提孤葟曵寒蠒口誦太古滄浪詞詞云太古萬萬古民性甚野無風期夜棲止與猛獸集作禽雜獨自構架縱横枝因而稱曰有巢氏民共一作相與敬貴如君師當時只效鳥鵲軰豈是有意陳尊卑無端後聖穿鑿破一派前導千流隨多方惱亂元氣死日使文字文粹作父子生姦欺聖人事業轉銷耗尚有漁者存熈熈風波不獨困一士凡百器用皆能施罛踈滬腐鱸鱖脱正失檢馭非讒疵人間所謂好男子我見婦女留眉鬚奴顏婢膝真乞丐反以正直為狂痴所以頭欲散不散冠文粹作弁峩巍所以腰欲散不散珮陸離行一作心散任之適坐散從傾欹語散空谷應笑散春雲披衣散單􅃨便食散酸醎宜書散混真草酒散丼醇醨屋散勢斜直樹散行參差客散忘簮履禽散虛籠池外物一以散中心散何冝不共諸侯分邑里不與天子專隍陴静則守桑柘亂則逃妻兒金鑣具文粹作紳集作具帯未曽識白刃殺我穹生為或聞蕃將負恩澤號令鐵馬如風馳大君年少丞相少當軸自請諸旌旗神鋒悉出羽林仗繪畫日月蟠龍螭太宗基業甚牢固小醜背叛當殱夷禁軍近自肅宗置文粹作置抑遏輔國争雄雌必然大叚剪兇逆湏召勁勇扶軍麾四方賊壘猶占地死者暴骨生寒饑歸來輙擬荷鋤笠詬吏已責租錢遲興師十萬一日費不啻千金何以支秪今利口且箕歛何暇俛首哀惸婺均荒補敗豈無術布在方䇿撑頺􅐵氷霜􅃭袴易反掌白面諸郎殊不知江湖散人悲古道悠悠幸寄羲皇傲官家集作吾皇未議活蒼生拜賜江湖散人號刈穫行一作歌前人自春徂秋天弗雨廉廉早稻裁集作纔通用遮畆芒粒稀踈熟更輕地與集作上禾頭未集作不相住我來愁築心如堵更聽農夫夜深語㐫年是物即為災集作菑通用百陣野鳬千宂䑕平明抱杖入田中十穗蕭條集作然九穗空敢言一嵗囷倉實不了而集作如今朝暮舂天職誰司下民籍苟有區分官析析集作㭊扸通用本作耕耘意若何蟲豸兼教食人食古人為邦湏蓄積魯饑尚貴集作責如齊糴今之為政異當時一任流離恣徴索平生早集作幸遇華陽客向日飡霞亦肥白欲賣耕牛棄水田移田且傍三茅宅天威行顧雲蠻嶺髙蠻海闊去舸廻艘投此歇一夜舟人得夣間草草相呼一時發􅄓風忽起雲顛狂波濤擺掣魚龍殭海神怕急上岸走山靈股慄入石藏金蛇飛状霍閃過白日倒掛銀䋲長轟轟砢砢雷車轉霹靂一聲天地戰風定雲開始望㸔萬里青山分兩片車遥遥馬闐闐平如砥直如弦雲雨八國萬部落皆知此路來朝天耿㳟拜出井底水廣利刺開山上泉若論終古濟物意二將之功皆小焉築城篇前人三十六里西川地圍遶城廓峩天横一家人率一口甓版築纔興城已成役夫登登無倦色饌飽觴酣方暫息不假神龜出指蹤盡慿心匠為籌畫畫閣團團真鐡甕堵闊巉巖一作巉巉齊石壁風吹四面旌旗動火熖相燒滿天赤散花樓晚掛殘虹濯錦秋江澄倒壁西川父老賀子孫從玆始是中華人文苑英華巻三百四十九
