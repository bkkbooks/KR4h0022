body:
  text: 文苑英華巻十四宋李昉等編天象十四喜雨賦一首奉和聖製喜雨賦五首賀雨賦一首秋霖賦一首雨不破塊賦一首宻雨如散􅁝賦一首喜雨賦唐𤣥宗見張説集中仰重華之齊政歩文命之彜倫何天道之云逺亦明徴之在人迄中夏而自春遘􅄽陽而為亢雲重結而復解雨纔滴而還障山祠植珪而不答田畯倚耒而怊悵京兆來奏音官撰曲将土龍而矯首請神巫而頓足彼有慿而可舉予何抑而未許恐嵗凶之及人寧天譴於我身一有爾字乃潔齋壇墠五精是祠暴立炎赫三日為期上帝臨我衷誠不欺重泉蒸潤觸石吐滋平雲黯而鋪幕宻雨森其散􅁝無雷無電不震不眩匪疾匪徐乍合乍踈泛草泊樹垂珠㸃露過闕入樓含烟雜霧或噴薄而攅集或淋漓而灌注亂積水之圓文拂㣲風之斜度寰海浹而康樂畎畆欣而相顧絲管合兮夜将曉芙蓉開兮日未暮原夫雨之為徳也無小大之異情無髙卑之不平無華朽之偏潤無臭薰之隔榮喜夫雨之今應也起一作赴一言而不舍一作捨經累辰一作旬而廣瀉納清隂之浮涼同顥氣之飄灑感作霖於殷命諷其滂於周雅家尚知乎禮節國有望於豐霸小陽䑓之神人却大宛之走馬觀雲行而雨施吾何事乎天下奉和聖製喜雨賦張説愚一作史臣啟先王之册府校絶瑞於祥經樂雲雨之平施齊品物之流形帝王争一作益重而為寳麟鳳自輕而讓靈况愆時之一作而渴望歘一作欲意逹而神聽是月也朱明漸半紫榴未吐恐降災兮此下人一作民罄䖍祈兮我仁主退象龍之禮禱斥持鷺之貌舞屏翳慙其廢職祝融悔其遷怒山泱漭而出雲天霶􅀢而下雨速一言而感應尅三日而周溥氣滃靄一作蓊以黭黮聲颯灑以蕭條漼一作璀如雲一作銀漢之屑落散一作燦似珠泉之歕一作噴澆街㕓漫其潢潦臯壤萋其綠苗舒四溟之清潤巻六合之喧一作煩囂咸澡骨於神液共歡心於聖朝借如五月有梅雨之名三春有榖雨之氣越人以泥牛待沃胡土以賣一作士賣土龍求費出員嶠而石香入成都而酒味彼偏方與小節非大人之所貴復有送地一作山祗於鬱島迎海后於葛川疾雷碎其山裂走電􅈌其海燃天子作愁霖之賦詞人綴苦雨之篇墻屋壊於倒井黍稷沉於下田乃凶祲之不令曷休徴之有焉請言瑞雨之可喜也恊氣交泰嘉生是頼湛覃而不溺衍溢而無害東漸出日之表西被無雷之外南窮火鼠之譯北盡燭龍之㑹天文則雲漢昭回天一作王澤則江河滂沛雖欲談天而窺管孰知堯徳之為大第二韓休聖人調玉燭握金鏡乘正陽而馭六氣之辨考中星而授四時之命所以平三階而齊七政惟十有六祀日躔於南紀火徳方盛炎曛自始主上問飛候之或失徴驕陽之所起未明求衣當食昃晷恐六事之害政引萬方而罪已乃設槱燎奠椒醑豈史巫之紛若惟誠徳之是與稽𤣥穹以誓期樂形影以増佇善言既發靈應無越天垂貫斗之雲神召離星之月有渰淒淒南山朝隮林鳴隂鳥澗隐晴霓九光之霞冠於雲日五色之氣映於巖谿始攅團而未下終颯洒而俱齊合散縈直紛飛驟息肇自千畆周於八極及乎公田我私二字疑長我黍稷我箱既萬我庾惟億人咸謂之神功爾孰知夫帝力若乃拂珠箔含綺䟽㣲霧氣於金掌糅香煙於玉除下碧雲而隂合滴銅池而響餘君王乃倚雲閣慿雨殿臨清署奏繁薦欣大徳之在生知上靈之有睠於斯時也一人有慶萬國歡心羣臣獻華封之夀天子御薰絃之琴昭宸文於合璧式王度其如金乾道兮下濟湛恩兮汪濊四三皇兮六五帝于胥樂兮萬千嵗第三徐安貞惟大君之執象襲先帝之重𤣥體至精而御物用明徳而動天自乘春兮當暑洎三時而不雨何隂陽而併隔瞻雲漢以延佇而雍州之積髙乃神明之舊府君告有司無作淫祠圖應龍兮何召望愚婦兮何期禦􅄽伏之六沴唯蕩蕩之上帝信天道之悠哉固人事之所制爾其圜壇方墠聚以禁林拂瑶席兮列神座藉白茅兮推聖心却華葢而特立當赫曦之正臨幽應如響明徴在今油然作雲鬱山川之氣凄兮為雨變天地之隂乘空離合煙霏霧雜散影㣲㣲清神不稀無雷電之相廹但蕭條而自飛迥颯灑於天聽襲清凉於御衣如泰嶽之朝下似陽䑓之暮歸林籞增飾城池共色八水青田千門紫極洗原隰於龍鱗拂甍標於鳳翼伊萬物之同潤况油油之黍稷匝寰海而為期指咸林而一息吾君乃升玉堂闢金殿既滌炎暑是開清宴聽金石之克諧知神人之合抃濟濟三事稽首而言効靈䕫之鼓舞聮振鷺而飛飜欣復夏王之膳無邀漢后之恩㣲臣束紳國史秉筆階戺仰宸儀之法度聞天韻之宫徴大舜之慶雲已發武帝之秋風莫比欽豐嵗之餘裕􅄨先天之至理陋星斗之占冠靈䑓之紀猶誡奢靡之事信明明天子第四賈登聖人在位體天法地示人以五行應天以五事修其貌也時雨若正其言也時暘至彼氣象之或乖将反身而可致皇哉我君𤣥徳敷聞御極而三才交正乗時而四序平分十有六年以至今載旬有一雨不愆乎晦所謂𤣥化之功行於太平之代粤在春餘而乗夏初或土官以位或火正其居土勝於水午衝於子陽景且曜隂風莫起當天數之適然非嵗行之常紀惟帝念茲聞諸有司或獻舞雩之請或陳齋社之期省而不錄云奪農時直以萬乗之貴躬親三日之祠王言既出聖心惟一天昭厥誠神降之吉霈然為雨不俟終日明明聖后知㣲知彰廸彼炎暑化為清凉恐二氣之相廹於兆人而不臧以身作戒因物考祥當是時也收其威而雷不敢作隐其耀而電不能爍昭其令而風不憒憤布其和而氣不交錯徒以𤣥黙為貞清明惟神簡服用興徳仁如此者上獨感其雲行下獨成其雨施六合雖廣一朝畢被其始至也歴亂希㣲霧雜煙霏其少進也湛覃凌厲泉飛飇逝驚碎滴於瑶池噴懸流於錦砌傳聲竹樹之末濯色菱荷之際乗日用而此多仰豐年而可計帝乃罷薰風之絃奏其雨之篇歸功於大造致美於皇天詞因喜降義以情傳是禮也且髙於商武斯文也復掩於周宣非聖徳之兼濟何以臻於此焉巍乎聖主謙以自輔慮其率土猶稱疾苦申命文武更求多祜又吹之以軒后大風又沐之以殷宗霖雨潤再洽兮恩重溥自朝廷兮至草莽鑠皇篇兮熈帝譜于胥徳兮振萬古第五李宙既五月兮生一隂猶不雨兮思作霖聖自咎兮天同徳誠下荅兮神孔歆臣聞澤不潤下意将乾封豈大明在御而荒嵗或逄禮有旱暵之舞詩有昭回之詠陛下退史巫之紛若追后土之䖍敬以乾坤而合徳何造化之不測當赫曦兮是時與霶􅑛兮為期粤三日而将澍未崇朝而已布霏㣲露立之壇霡霂風旋之歩􅃡察獄以臨幸甞禱林而戒懼曷若不言而順於隂隲曰肅而變其陽數非破塊與鳴條惟滌塲及灑路靈䑓是升斯考休徴渾儀已緯更酌元亨爾乃紫㣲凉夏彤庭景深初泛灔於太液復蕭條於上林傾菡萏而花舞散青葱而葉吟宜刻漏於銀箭雜秋聲於玉琴龍虎飛騰兮多氣色鸛鶴鳴呌兮有清音况田畯之至喜奉聖人以為心惟大君之徳也如雨施於上𤣥如澤漏於重泉浸四溟而無逺洞萬物而無偏喜羣生之遂也山不翦其毛髪河不汚其宫闕思就紺而生虹願從風而移月絶奔雷以無景静行雲以不發願依稀兮其奚多雖三五而可越賀雨賦沈瑱臣聞堯以欽明文思察洪水而其咨湯以布昭聖武綿鑠石而不雨彼穹蒼之災沴豈睿君與聖主我明徳之馨香終時康而俗阜大唐以率俾蠻夏莫非王土主上以光宅君臨粤若稽古以淑徳崇化為乾作輔其廣運也包二儀以覆載其亭育也想羣生之父母聖謨洋洋嘉言孔彰惟精惟一無怠無荒百姓有過引之歸已一物失所納之於隍夫人之所重者食也政之所先者農也近嵗以冬雪不盈春雲少澤綠疇合瘁朱夏将革無西畢之霶􅑛有南威之赫奕我藝闕秀甫田虚闢湘鷰垂翼而不飛應龍矯首而何益爾乃邦人大恐皇念勤眷思轉災以為祥宜樹美而除譴移正寝徹豐膳釋幽寃索遺彦逹聰明目廣視聽於四方恤獄緩刑開網羅於三面誡絶崇慝懲離黨援衮路清泰階平君臣咸一邦家輯寧天方悔咎淪孽垂休降靈雲布族而靄䨴電驚空而煌熒殷雷震而闐闐飛雨零而冥冥夫其森沈散漫颯灑淩亂瀝液汪洋周流津漢疑濯上林之靃靡漲昆明之瀾汗驟繁響於闕庭浮清風於樓觀𤣥澤優而霽止晴光炳兮澄涣奔餘潦於廻塘掛晴虹於霄漢阡陌條暢而增綺黍稷芬榮而若换野老熈熈農人相持嘉廪儲之望歳喜甘霈之流滋鼓腹擊壤賡歌稱詩詩曰有渰凄凄興雨祁祁雨我公田遂及我私皇上睟容有穆神心載怡羣卿大夫濟濟纓緌拜手稽首足之蹈之賀農祥於介福答聖造於休期有諌議大夫沈瑱因進而稱曰臣聞昔者飛雉升鼎用墜殷宗之徳熒惑守心旋移宋景之慝禾苗盡起孺子感動於周公桑榖並生太戊獲相於伊陟夫君人者修已以敬乾乾日昃奉堯舜以為心崇禮譲而為則放黜回佞敷求讜直使人以時用丘明之昏定異物不貴誡老氏之難得哀賑惸嫠勉敦稼穡自然災伏至誠感於天地及當而行湛恩浹於寰瀛珍絡繹瑞縱横海氣蒙晏河光吐榮甘露凝而醴泉湧麒麟遊而鳳凰鳴烟雲蕭索而紛郁日月光華而淑清我后慎終如始用晦為明為而不有冲而不盈向之能事動植由庚秋霖賦盧照隣覽萬物兮竊獨悲此秋霖風横天而瑟瑟雲覆海而沉沉居人對之憂不觧行客見之思已深若乃千井埋烟百㕓涵潦青苔被壁綠萍生道於時巷無馬跡林無鳥聲野隂霾而自晦山幽曖而不明長塗未半茫茫漫漫莫不埋輪據鞍銜悽茹歎借如尼父去魯圍陳畏匡将飢不爨欲濟無梁問長沮與桀溺逢漢隂與楚狂長櫛風而雨沐三字一作以沐雨永悽悽一作栖栖以遑遑及夫屈平既放登髙一望湛湛江水悠悠千里泣故國之長秋見𤣥雲之四起嗟夫子卿北海伏波南川金河别鴈銅柱辭鳶闗山天骨霜露凋年眺窮隂兮斷地看積水兮連天别有東國儒生西都才客屋漏鉛槧家虚甔石茅棟淋淋蓬門寂寂蕪碧草於園徑聚綠塵於庖甓玉為粒兮桂為薪堂有琴兮室無人抗髙情以出俗馳精義以入神論甚一作有能鳴之鴈書成已泣之麟覩皇天之淫溢孰不隅坐而含嚬已矣哉若夫繡轂銀鞍金盃玉盤坐卧珠璧左右羅紈流酒為海積肉為巒視㐮陵而一作與昏墊曾不輟乎此懽豈知乎堯舜一作禹之癯瘠而孔墨之艱難凡一作皆初學記節文雨不破塊賦以㣲雨流潤用表豐年為韻王起國有休徵天作靈雨不為霖以破塊自呈祥而潤土既霑既足克成五稼之豐不疾不徐詎作三農之苦惟雨也映於遥天惟塊也列於大田彼以泛洒為利此以生植為先𤣥雲不開色霏㣲而方宻黒壌相映形磊落以皆全詎為暴於終日自成功於有年觀其散漫初來空濛如振不遺一撮之小不爽一旬之信滋螻蟻之穴何患沾濡帶蚯蚓之形亦懐膏潤其色如晦其飄甚㣲纚連異質優渥同歸如原野之霧合似隴畝之塵飛色潤方圓形沾大小東作之耕斯著西成之功必表青黎不散佇秀麥之芃芃白壤常存冝散絲之皎皎是知妖魃元作魅見也則枯旱為憂商羊舞也則泥塗見修孰若霡霂㣲漬霶􅀢不流所以見太平之美所以彰至聖之休故冝美土疆資播種宣老圃之志作曾孫之頌祁祁美瑞九土之澤克施每每有形三日之霖勿用是知雨無破塊年必屢豐積而不載感之則通何沃土之不浹何瘠壌之不同夫如是則受塊之人共欣其天賜擊壌之老将明其帝功宻雨如散絲賦以㣲宻相續集布如絲為韻李鐸散萬物者莫潤乎雨鈞百貨者莫細乎絲雨将應時既盈空而沃若絲将比宻爰委一作賦質以棼之原夫清畢啟隂夕陽向暮散輕霞以成綺矗𤣥雲而似布於是霡霂郊野霏㣲草樹蔽重霄之靄靄猶委緒風暎逺岫之濛濛乍迷縠霧髣髴将久輕盈匪踈濛蔑浣紗之際浸淫濯錦之餘織婦停梭似曳方經之緒舟人罷釣疑牽或躍之魚由是揚素彩降碧虚忘機别天庭之睆彼拂鬢驚韶髪之皤如徒觀其散影有經分行無匹始斜足以色麗俄交反疑而勢宻輕沾素服懐墨子之悲時遥隔布泉誤詩人之怨日皎皎容潔綿綿體㣲絶而復尋等蛛網而共掛垂之如墜連雪絮以輕飛仰之盈目紛如可矚彼時澤之長懸若天經之恒續秦䑓蟻行豈惟珠曲乃穿湘浦鷰飛不獨鳥方驚觸有以灑炎炎之苦有以慰蚩蚩之俗且晴晦之異圖牒之祥則有雲如繒以遥列星曵練而可望布霑霈而莫能與比齊綿宻而曷足其相彼龍見而方雩與決雲而齊給或流電而未止或破塊而併集曽未若汗漫於率土之濱表王言之澤及文苑英華巻十四
