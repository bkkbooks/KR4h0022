body:
  text: 文苑英華巻六百六十七宋李昉等編太子諸王附答隋太子廣書一首請太子尊賢重道書一首上太子承乾書一首重諫太子承乾書一首諫太子承乾營造曲室書一首諫太子承乾左右非其人書一首諫太子承乾引突厥入宫書一首上節愍太子書四首為李中丞作與虢王書一首為貞陽侯答王太尉書一首宰相上為陳髙祖與周宰相書一首上劉右相書一首太子諸王附答隋太子廣書一首史祥行人戾止奉所賜貺恩紀綢繆形於文墨不悟飛雪増氷之地忽載三陽毳幕韋韝之鄉俄聞九奏精駭思越莫知啓處祥少不學軍旅長遇升平幸以先人緒餘備軄宿衛懼駑蹇無奔走之實朽薄非折衝之才當斷一作豈欲追蹤古人語其優劣曩者王師薄伐天人援桴一作受服絶漠揚旌威震海外當此之時猛將如神一作雲謀夫如雨至若祥者列於卒伍預聞指縱之規得免遲留之責循省一作涯揣分實為幸甚爰以情喻雷陳事方劉葛信聖人之屈已非庸夫之可測川澤之大汙潦攸歸松栢之髙葛蘿斯託㣲心眷眷孟侯所知也仰惟體元良之徳煥重離之暉三善克脩萬邦以正斯固道髙周誦契叶商皓豈在管蠡所能窺測伏承監國多暇養徳怡神咀嚼六經逍遥百氏追西園之愛客眷南波之出逰疇昔之恩無忘造次祥自忝闕載離一作罹寒暑身在邊隅情馳魏闕每至清風夜一作夕起朗月孤照想鳴笳之啟路思託駕一作乗於後車塞表京華山川悠逺瞻仰浮雲伏増澘結一作皆隋書本傳請太子尊賢重道書見六百二十三巻表門劉洎上太子承乾書貞觀十三年張𤣥素臣聞周公以大聖之材猶握髮吐哺一作飱引納白屋而况後之聖賢敢輕斯道是以禮制皇太子入學而行齒胄欲使太子知君臣父子長㓜之道然君臣之義父子之親尊卑之序長㓜之節用之方寸之内𢎞之四海之外者皆因行以逺聞豈一無此字假言以先被伏惟殿下睿質固已崇髙四字一作已隆尚湏學文以餙其表至如孔頴逹趙𢎞智等非惟宿德鴻儒亦兼練逹政要望令數得侍講開釋物理覽古諭今増輝睿德而雕蟲小技之流祗可時命追隨以代博奕耳若其騎射畋遊酣歌伎一作戯翫茍恱耳目終穢心神漸染既乆必移情性古人有言心為萬事主動而無節則亂臣恐殿下敗德之源在於斯矣重諫太子承乾書臣聞孔子云能近取譬可謂仁之方也已然書傳所載其言一作言之或逺尋覽近事得失斯存至後一作如周武帝平定齊梁一作山東卑宫菲食以安海内太子贇舉措無度穢德日著烏丸軌知其不可具言於武帝武帝慈仁望其漸改及其踐阼狂暴肆情區宇崩離宗祀覆滅即隋文帝所代是也文帝因周衰弱憑藉力資雖無大功於天下然布德行仁足為萬姓所頼勇為太子不能近遵君父之節儉而務驕侈肆情今之宫中山池遺址一作跡即太子一無此二字殿下所親覩是也此時亦恃君親之恩自謂太山之固詎知邪臣敢進其說向使動静有常進退合度親君子踈小人捨浮華尚恭儉雖有邪臣間之何能致慈父之隙豈不由積徳未𢎞令聞不著讒言一至遂成其禍竊惟皇儲之寄荷戴至一作殊重如其積德不𢎞何以嗣守成業聖上以殿下親則父子事兼國家所應用物不為節限恩㫖未踰六旬用物已過七萬驕奢之極孰云過此龍樓之下唯聚工匠望苑之内不覩賢良今言孝敬則闕視膳問竪一作安之禮語恭順則違君父慈訓之方求風聲則無愛學好道之實觀舉措則有因縁誅戮之罪忠一作宮臣正士未嘗在側群邪滛巧昵近深宮愛好者皆遊手雜色施與者並圖畫雕鏤在外瞻仰已有此失居中隱宻可勝訃哉宣猷禁門不異闤闠朝入暮出穢聲已彰一作逺臣以德音日損頻上諫書自邇以來縱逸尤甚右庶子趙𢎞智經明行脩當今善士臣毎奏請望數召進與之談論庶廣儲徽一作徽猷今㫖反有猜嫌謂臣妄相推引從善如流尚恐不逮餙非拒諫必招禍敗一作敗損方崇蔽塞之源不慕欽明之術雖挹睿哲之姿一作資終罹罔念之咎古人云苦藥利病苦言利行伏願居安思危日慎一日則天下幸甚謹言一作皆舊唐書此篇按舊唐書係重諫承乾書英華題作諫東宫啟誤編在六百五十一巻今移此諫太子承乾營造曲室書于志寧臣聞克儉節用實𢎞道之源崇侈恣情乃敗德之本是以凌雲槩日戎人於是致譏峻宇雕牆夏禹舊唐書作書以之作誡昔趙盾匡晉呂望師周或勸之以節財或諫之以重唐書并前篇作厚斂莫不盡忠以佐國竭誠以奉君欲使茂實播於無窮英聲被乎物聴咸著簡䇿以為美談今所居東宫隨日營建覩之者尚驚前篇作議唐書作譏其侈見之者猶嘆其華何容此中更前篇作復有修造財帛日費土木不停窮斤斧之工極磨礲之妙且丁匠官奴入内比者曽無監管前篇作關驗唐書作伏監此等或兄犯國章或弟罹王法徃來御苑出入禁闈鉗鑿縁其身槌杵在其手監門本防非慮宿衛以備不虞直長既自不知千牛前篇作守者又復不見爪牙在外厮役在内所司何以自安臣下豈容無懼又鄭衛之樂古謂滛聲昔朝歌之鄉廽車者墨翟夹谷之㑹揮劍者孔丘先聖既以為非通賢將以為失頃聞宫内屢有鼔聲太樂伎兒入便不出聞之者股栗言之者心戰徃年口勅伏請重尋聖㫖慇懃明誡懇切在於殿下不可不思至於㣲臣不可唐書前篇並作得無懼臣自驅馳宫闕己積嵗年犬馬尚觧識恩木石猶能知感所有管見敢不盡言如鑒以丹誠則臣有生路若責其忤㫖則臣是罪人但恱意取容臧孫方以唐書前篇並作之疾疢犯顔逆耳春秋比之藥石伏願唐書作望停工匠之作罷乆役之人絶鄭衛之音斥群小之軰則三善允偹萬國作貞矣此篇五百五十一巻重出已削去諫太子承乾左右非其人書臣聞堯稱稽古功著於搜揚舜曰聰明績彰於去惡然開元立極布政辨方莫不旌賁英賢驅除不肖理亂之本咸在於兹况閹宦之徒體非全氣便蕃階闥左右宫闈托親近以立威權假出納以為禍福昔易牙被任變起齊邦張譲執鈞亂生漢室伊戾為詐宋國受其殃趙髙作奸秦氏鍾其弊加以𢎞石用命一作事京賈則連首受誅王曹掌權何竇則踵武被戮遂使縉紳重足宰司屏氣然順其情者則榮逮㓜冲迕其意者則災及襁褓爰暨髙齊都鄴亦弊閹官鄧長顒位至侍中陳德信爵隆開府外干朝政内預宴私宗枝藉其吹嘘重臣仰其鼻息罪積山岳靡掛於刑書功消塵露一作功無涓塵已勒於鐘鼎富踰金穴財甚銅山是以家起怨嗟人懐憤歎骨鯁之士語不見聴謇諤之臣言必被斥齊都顛覆職此之由向使任諒直之臣退佞給之士據趙魏之地擁漳滏之兵脩德行仁養政施化何區區周室而敢窺覦者哉一作焉然杜漸防萌古人所以逺禍以大喻小先哲於焉取則伏惟殿下道茂重離德光守器憲章古始祖述前修欲使休譽逺聞英聲遐暢臣竊見寺人一色未識上心或輕忽髙班或凌轢貴仕便是品命失序綱紀不立取笑通方之人見譏有識之士然非一無此字典内職掌唯在門外通傳給使主司但縁階闥供奉今乃往來閣内出入宫中行路之人咸以為怪伏望狎近君子屏黜小人上副聖心下允衆望謹啓一作皆舊唐書本傳此篇按唐書係諫承乾第三書英華誤編在六百五十一巻今移此諫太子承乾引突厥逹哥支入宫書前人臣聞上天盖髙日月以光其徳明君至聖輔佐以賛其功是以周誦升儲見匡毛畢漢盈居震取資黄綺周公舊唐書作姬旦抗法於伯禽賈生陳事於文帝莫不殷勤於端士懇切於正人昔鄧禹名臣方授前篇唐書並作居審諭之任踈漢書作䟽受宿望始除輔導之官歴代賢君莫不丁寧於太子者良以地膺上嗣位處副前篇作儲君善則率土霑其恩惡則海内罹其禍近聞僕寺司馭爰及駕士獸醫始自春初迄兹夏晩恒居内役不放分畨或家有尊親闕於温凊或室有㓜弱絶於撫養春則廢其耕墾夏又妨其播植事乖存育唐書作愛人有怨嗟願崇儒敬業訪道稽疑則品物増輝懐生欣忭今司經見無學士供奉未有侍讀伏望時因視膳奏請置人所兾講席談筵務盡忠規之道披文摘句方資審諭之勤臣又聞臣之事主必盡誠慤君之進賢務求忠讜伏惟殿下養徳儲闈理以端静為務恭膺守器必以學業為先經所以立行脩身史所以諳識成敗雅誥旣前篇作所習忠孝乃成傳記方通安危斯辨知父子君臣之道識古今鑒戒之規經史為先斯乃急務至于前篇唐書作於工巧造作僚吏直司實為末事無足勞慮臣以庸賤獻替是司臣而不言負譴聖前篇作無日言而獲罪是所甘心伏願留意經書簡畧細事一䝉採納萬殞無辭乞降儲明俯矜前篇作察狂瞽右四篇六百五十一巻重出前已削去為李中丞作與虢王書蕭頴士某還奉問垂示報魯郡克㨗官軍乗勝進取東平捧對三復實深兼慰逋醜稽誅遂淹氣序芟夷濟濮陵虐洙泗雖淤魂送死所當剪滅而命師授律必俟英威四郎挺雄烈之姿荷專征之任允文允武終古罕儔惟親惟賢方今莫二故能將士憤發忠勇争先遺孽殄殪隻輪不反俾彼危城蔚為强鎮必將長驅許下席巻浚郊觧滑臺之圍刷㐮邑之耻在是行矣此皆明大夫善任才而抑將軍之能用命也豈徒咫尺汶陽而乆勞其師旅哉遲企大㨗預寛憂負天氣漸寒伏惟尊體動止康愈集作勝即日䝉免未由拜覿増以勤係所調兵糧事資軍國唯力是視曷敢差池謹遣江陽令杜萬徃諮禀為貞陽侯蕭淵明答王太尉僧辨書徐陵周尚書𢎞正張廷尉種姜常侍暠等至枉此月二十六日告并遣賢弟子世珍賢子顒等一有彌字具忠欵之至公養孤之恩愛甚鄧侯少子之懐情深張禹豈非憂勞社稷用忍飢膚天下􅅤靈誰無悲愧余遭家不造敬累吳賢言念忠誠益以號咽但皇齊大德過見憂矜微借輕兵以垂將送意謂江東凋弊累積寒暄供膳資儲理當多缺輙白上黨王止請三千人二百疋而已凱衆人殊尚有疑難將恐諸士未喻雅懐今復命周尚書及姜常侍還彼具陳一二夫以一作不受為冦非有晉邦不送為譏終無楚國五千歩卒既謝李陵三千羸兵亦等無忌公之明義理不為嫌行人失辭尚停然諾臨江摠轡企望音郵唯遲來書此不多具蕭某白宰相上為陳高祖與周宰相書昔有天地便有帝王革昊唯農遷虞斯夏莫不三靈所佑五運相推梁徳不造固天攸棄雖復東漢之末區宇沸騰西晉之亡生民蕩覆未足以方其禍亂譬彼䖍劉者也吾謬以庸薄屬當興運自昔登庸清諸百越徐聞浪汨靡不征行銀洞珠宫所在清乂自還麾南極一作拯伐逆東都宣力驅馳亟淹寒暑六延梁社一作祀十剪强冦黄帝與蚩尤七十戰魏祖在軍中三十年方厥劬勞未為勤苦加以百神所感明靈應期萬里徂征虬龍表瑞於是中軍勇銳上將横行承此休符遂興王業梁氏以天禄斯改期運永終欽若唐風推其鼎命吾驚惶三譲一作周惶固譲拜手陳辭盈廷公卿稽顙敦偪眷言潁水徒抱素心尚想汾陽無因髙蹈猥以庸薄遂膺天寵去月乙亥昇禮大壇言念迂徊但有慚愧昔賔門之始境外無交雖遣行人未申嘉好今上天有命光膺寳歴永興周室方同斷金我運惟新宜修朝聘今遣侍中都官尚書周𢎞正衘使長安故指有白陳某白上劉右相書王勃盖聞聖人以四海為家英宰與千齡合運用能不行而至春霆仗天地之威以息相推莊子作吹時雨欝山川之兆故有𤣥蛟晩集憑鶴鼎而先鳴蒼兕晨驚運龍韜而首出並能鳳一作風騰霧躍指揮成烈士之攻蠖屈虬奔談笑坐群卿之右未如越蒼海棄行間排紫㣲謁天子於是遭不諱之主擁非常之位龍章鳳黻照其前鏘金鳴玉疊其後三靈叶賛超然奉天下之圖四海承平髙歩取寰中之託君侯之富貴足矣聖朝之付遇深矣故知陽侯息浪長鯨卧横海之鱗風伯停機大鵬鎩垂天之翼及其投形巨壑觸丹浦而雷奔假勢靈飈指青霄而電擊神氣洋洋謂鱗翮使之然也殊不知两儀超忽動止繫於無垠萬化紏紛舒巻存乎非我是以陳平昔之智士也俯同降卒百里奚曩之逹人也親為餓𨽻當其背强敵轉康衢雄慮耿於風雲危途廹於朝夕豈自期榮稱相府西藩専虎㨿之圖寵冠齋壇東向舉熊一作龍飛之䇿顧盼可以蕩川岳咄嗟可以降雷雨遂令用與不用是非於楚漢之間知與不知得失於虞秦之際故死生有數審窮逹者繫於天材運相符决行藏者定於已君侯足下可不謂然乎借如勃者𦕈小之一書生耳曽無繫鐘鼎石之榮非有南隘北閣一作闕之援山野悖其心迹煙霧養其神爽未嘗降身摧氣逡廵於列相之門竊譽干時匍匐於群公之室所以慷慨於君侯者有氣存乎心耳實以四海兄弟齊逺契於蕭韓千載風雲託神知於管鮑不然則荷裳桂檝拂衣於東海之東菌閣松楹髙枕於北山之北焉復區區屑屑踐名利之門哉至尊以摇河徙岳之威當立地開天之運聖人有作群材畢舉星辰入仕揖譲朱鳥之門風雨稱臣奔走蒼龍之闕方欲停旒金室引成康於已任闢廣瑶林復堯舜於兹日可謂明明穆穆盡天子之容貎矣抑嘗聞之丹山九仞煙峰非數簣之功紫極千門雲䑓俟萬楹之力故天下至曠神器不可獨專天道無私𤣥勲有待而立書曰元首明哉股肱良哉好問則裕自用則小况掌萬國之權受一人之寵動見臧否言知利害君侯足下何時易耶雖有大命不資童子之言而恭此小心敢進狂夫之説伏見遼陽未静大軍頻進有識寒心群黎破膽昔明王之制國也自近而及逺先仁而後罰徴實則效存狥名則功淺是以農䟽千里僅踰重石之鄉禹截九州不叙流沙之境豈才不及而智有遺哉將以辨離方而存正功也雖至人無外甲兵曜天子之威王事有征金鼓發將軍之氣而長城在界秦漢所以失全昌巨海横流天地所以限殊俗闢土數千里無益神封勤兵十八萬空疲帝卒驚烽走傳駭秦洛之甿飛芻輓粟竭淮海之費於是乗奸放命者出䋲纒以生威因公挾私者入閭閻而兢法雖一物失所泰階延旰食之憂而百戰方雄中國鮮終年之樂圖得而不圖失知利而不知害移手足之病成腹心之疾征稅屈於東西威信蹇於表裏語曰勝之不武不勝為辱天下之責四面至矣誠可逺凝髙䇿上薦忠言决人事於去就合天情於終始遂令囬麾轉檄背青丘而騖列障分亭廵蒼波而守昔者齊侯以力方城為楚國之辭虞帝崇文苖人失洞庭之險况乎仗徳綏亂以直乗邪明逆順之端聳華夷之望雖復舳艫沸海旌旗觸天鐡山四面金城千里亦不能為敵人計矣此君侯之未諭一也盖聞星廽日運御洪荒者貞夫一電照風行制寥廓者歸乎静易曰復其見天地之心乎語曰動之斯和綏之斯來一作安是知源潔則流清形端則影直大道起而仁義息神化周而市獄定雖復體元立教眚災耀知逺之書順時宰物宥罪發精㣲之典而况澆風易漸淳化難歸孔明耿介於當朝子輿殷勤於易簀盖有由也伏見邊凶尚梗殊恩屢發亡命山澤者日月相趨朝脫桎梏夕還囹圄奸徒抱􅃑因時立僥倖之謀頑夫頓足中路紆吁嗟之惨皆由寛勝於猛人迷所習勸沮不彰亷耻相冒亦有公􅀸失職耻受珪符之任郎官有疊俯捨銅墨之榮又焉可以𢎞張風流抑揚衆務者也且夫朽索充覊不収奔馬之逸輕緡振網或隨吞丹之勢况非常之化方洽於齊人無妄之思乃及於群小將恐匡衡管仲復靈沼一作詔皆可疑於下泉矣古之善為國者不然信賞而必罰道徳而齊禮澤配雲雨而無曲惠威振雷霆而絶私戮交書聳幣仗慈厚之師投金散璧樹仁明之長故雖開衢室盖明堂亦將四三皇而六五帝矣此君侯之未諭二也盖易曰天地之大徳曰生聖人之大寳曰位何以守位曰仁何以聚人曰財是知發揮地利農桑啓其業振蕩天功泉貝流其用伏覩前制屢擾事非畫一㕓市蕭然人情恠動夫補又一本作稱簡並用未盡交易之宜輕重齊行適啓兼并之路於是連闤掩闠者閉肆而乗其屈布衣韋帯者闔門而受其困五方競爽務淺術以相雄百郡争勝驅末技而成弊田夫織婦衣食鮮終朝之給巨駔洪商輿馬挟封君之勢盖有由來矣故曰國儲闕於九載則公上無所給家廪乏於三年則妻子非其有夫隂陽覆逆天地之常數百六運窮堯湯所不免一旦洪泉决地大旱焦山風雨於一嵗之間霜雹於數州之境繁運廣役首尾於中外沓稅増徭日夕於都鄙爕隂陽者將何以處之一失竊議公之盛徳虧矣愚謂嚴程峻法絶輕陋之貨則奸鎔之源塞矣㳂風正典重耕耘之務則邪嬴之計沮矣然後逺𢎞教㫖大變流俗法立有犯而必施令出唯行而不返違公竊鑄者具五刑之戮因時力田者懸一命之賞不然則賈生晁錯復流涕而言矣此君侯之未諭三也嵩衡不拒細壤故能崇其峻江海不讓纎流所以存其廣是以星䑓曉闢上台忘吐握之勞月殿宵興中宇軫山林之慕知夫御天下者必待人也詩曰濟濟多士文王以寧未見君子憂心如醉伏見皇明逺燭帝采遐宣張樂岱郊騰勲社首徴亷察孝瑶壇虚不次之階署行議年璿檢動非常之詔天下可謂幸甚矣於是友月朋霞之客背青臯而至馮唐顔駟之才排紫閣而集夫豈知終始異數涇渭同流蘿薜失圖簮纓解體惜哉羣英霧散名侯招蔽善之嫌天下雷同太子鮮長鳴之地而欲招絶足致眞龍難矣此君侯之未諭四也易曰㧞茅連茹以其彚征吉豈非順物不若招類報國不如進賢陽事昇而雨露歸隂駕凝而風霜厲莫不觀時有記撫氣相求窮則獨善其私逹則兼善一作濟天下而利己疵物者以自任為身謀知進忘退者謂専榮而得一作不計豈知夫尺波易謝寸晷難留陵谷好遷乾坤忌滿君侯足下出納王命升降天衢激揚鳳扆之前趨歩麟䑓之上亦復知天下有遺俊乎夫心之精㣲口不能言也言之㣲妙書不能文也伏願闢東閣開北堂待之以上賔期之以國士使得披肝膽布腹心大論古今之利害高談帝王之綱紀然後鷹揚豹變出蓬户而拜青墀附景摶風捨薹衣而見諸闕幸甚斯不為難矣庶幾乎麑卵不棄終感𤣥枵之精駿骨時収或致飛黄之錫書生王勃死罪死罪再拜文苑英華巻六百六十七
