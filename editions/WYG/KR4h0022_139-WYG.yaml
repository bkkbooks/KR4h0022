body:
  text: 文苑英華巻一百三十九宋李昉等編蟲魚一黑龍飲渭水賦一首葉公好龍賦一首漢武帝射蛟賦一首窮魚賦一首北溟有魚賦一首魚躍龍門賦一首魚登龍門一首漢武帝逰昆明池見魚銜珠賦一首烹小鮮賦二首魚在藻賦一首黑龍飲渭水賦以出為漢祥下飲渭水為韻白居易龍為四靈之長渭居一作為八水之一飲亹亹之清流浴彬彬之𤣥質翻若一作忽兮下降賁然躍出首蜿蜒以涌煙鱗錯落而㸃漆動而無悔爰作瑞於秦川應必有徵乃效靈於漢日觀其攸止察其所為行蔵不忒動靜有儀睛眸炫燿文彩陸離下泉于焉表異守黑于以標竒一作躍于泉於焉表異守其黑所以標竒不一徒爾異心有以一作或隠或見時行時止順春秋而隠見隨晦明而行止一作順於東下而無乖下一作西應乎昏明而有以於是稽大易按前史叶聖人之昌運飛而上天表王者之休徴見一作下而飲水於是一作爾乃下長流一作降長川俯髙岸狀騤騤以矯矯一作氣㸃㸃以黯黯光燦燦而爛爛紫雲隨而瑞氣氤氲白日照而文章炳煥一無此十六字聞之者心駭而易色一作屏息覩之者目眙一作而改觀呼吸二字一作一呼一吸而聲起風雷宛轉二字一作或躍或騰而勢超雲漢爾其矯首陸梁拖尾廻翔蹈流鳴躍劈波騰驤爾其至騰驤十八字一作觀夫莫智匪常莫黑至祥契昌期於南靣合正色於北方施尾廻翔劈波騰驤飲清瀾之澹澹一作浩噴一作動素浪一作波之湯湯頓頷一作額而碎珠迸落奮髯而細雨飛揚讋水族則一作驚水府兮鱣鮪奔走駭泉室則黿二字一作兮蛟鼉伏藏信可符帝王之度叶邦家之光表三秦之嘉瑞呈二漢之徴祥自信可至徴祥二十四字一作𤣥雲從而淺深一色白日照而左右交光且夫一作彼順氣一作候時出處憑虚上下度若一作弱水而斯馭知一作去鼎湖而是駕同張華一作開茂先之飛劍見長房之竹一作枝化豈若一有此字炎精冥契水徳潜禀黑質黯三字一作𤣥甲臂以凝黛𤣥文斐以摛錦一作文章斐兮摛錦逼而察也類天馬出水以一作而逰逺而望之疑長虹截澗而飲既一作已而跨白雲一作負蒼天騰一作去清渭排冥冥之寥廓度一作反浩浩之元氣則知水物之靈鱗蟲之貴展一作盛矣哉抑斯龍之所謂凡一作皆集本葉公好龍賦以所好非真見而増懼為韻張隨惟彼龍兮潜水府翔天路何葉公之多尚獨神物之是慕假手于繪對蜿蜒以好之其形在堂俄惝恍而反懼初其終朝念茲寤寐求之嗟豢氏之莫遇望雲津之逺而載雕其宇爰冩其姿周屋壁環一有脨字堦墀輝輝之章不離其行坐矯矯之質常在於夣思至於春風啓序自暄而暑則謂仰重隂而可竚雨歇一有兮字雲收杳不知其處所其求雖阻其志無沮及其寒律方凝自霜而氷則謂窺濬壑而可徴天髙一有兮字日朗空有見於泓澄其覩未能其誠益増既而天縱疑作從其欲物應其好龍乃拖其尾而登其堂矯其首而窺其奥垂錦帶張翠鱗光流電轉聲發雷振起雲而棟凝積氣乘水而庭若通津而况於斯人得不撓其性而駭其真觸類而廣可明其徴唯龍也世好之必歸唯士也國招之必依姑務乎辨真去偽寧求乎似是而非故好龍而疑用古字如之通何期真假無變好士如之何在賢愚無眩蜿蜿之狀且逄子髙之儀堂堂之賢莫失哀公之眷勉矣凡今君子必審之於聞見漢武帝射蛟賦以省括能中清除水害為韻獨孤授有漢武帝惟時巡省窮楚之望極江之永舳艫塞川旗甲蕩景洶洶旭旭虬蟠龍騁駐清蹕則洪波可遏赫皇靈則潜怪可怛何彼蛟之夭矯據積水之空濶謂佽飛之劍莫前滅明之璧是奪天子乃戒無譁於羽衛思有用於弦括命舟牧廻清翰清疑作青説苑鄂君乘青翰之舟而止疑作上詔弓人奉烏號以登肅天儀以山立將親發以抗稜隂察變態雄猜跨騰古冶之倫眥裂不敢擅其勇逄䝉之黨技癢不敢專其能我矢則直我弦斯控持滿而英氣頓一作坐飛命處而幽姿必一作心中歘飈颼其電霍則頸亸而胷洞賛履者鼓殷天之雷稱慶者躍如熊之衆始乎發若神兵爆其有聲洪波雪一作雲湧白羽月傾突紫肉裂素纓餘怒蚴蟉上浮泓澄踣質已靡於巨艦流血方走乎東瀛介以鱗莫得捍七札之勁神之化不能保重泉之生萬靈震駭九𣲖徐清然後海若扈蹕陽侯洗兵山川肅其晏如雲霧廓其四除渉者利乎渉漁者安乎漁於是左史趨進執簡以書曰天子幸尋陽也親射蛟而獲諸遂翻龍斾韜象弭篙工奮棹歌起威勵乎斷白蛇氣雄乎絙青兕隘秦皇之觀日追夏后之勤水且夫君以勝殘為大臣以反德為害亦將制於彀中静此宇内俾貫革之藝息垂衣之道㤗豈徒與射夫漁父校勇而論害前已押害字韻疑當作最窮魚賦并序盧照鄰余曽有横事被拘為群小所使將致之深議友人救䕶得免竊感趙壹窮鳥之事遂作窮魚賦常思報徳故冠之篇首云有一巨鱗東海波臣洗静月浦涵丹錦津映紅蓮而得性戯碧浪以全身宕而失水届于陽瀕漁者觀焉乃具竿索集朋黨鳬趨雀躍風馳電徃競下任公之犗一作釣爭陳豫且之網蝼蟻見而丼心獱獺聞而舐掌於是長舌利觜曵綸垂鈎拖鬐挫鬛撫背扼喉動搖不可騰躍無由有懐纎潤寧望洪流大鵬過而哀之曰昔予為鯤也與是逰乎自予羽化之子其孤俄撫翼而下負之而趨南浮七澤東汎五湖是魚也已相忘於江海而漁者猶悵望於泥塗北溟有魚賦以擊水三千摶風九萬為韻獨孤授次天地之量者海為之大首鱗介之雄者鯤靡有敵禀形徒恠其恢詭造物孰根乎朕迹慌北溟之安流考南華之遺跡好竒焉得以心駭乘理可同乎目擊且魚之狀有踰七日之尾而海之深蓋積八紘之水静則髙浪為之中輟動則連山為之四起介一二字疑衍鮮鱗俛首以駿奔𤣥冥捉疑作投足而却視其有適也越孟諸之夕宿其自縱也豈鹽田海賦陸死鹽田之陸死况風濤乍息空水相涵横巨鱗而海分為二赩雙目而日為之三涾沲迆延載回載旋嚇鰓則飛沬疑作沫成雨擊尾乃跳波盪天任公之術靡措龍伯之力徒然生無以傷庸識其長乆大不可度莫知其幾千固非海若之所俟屬天雞之所犯干不呑龍舟以作暴豈貪牛餌而自殘遵坎徳以獨適隨混元而變觀本所疑鱗而孰知終始化為鳥而何足控摶一氣潜融飛沈以通刺天之鬐拂日埀雲之翼從風曜靈韜吷疑作映文選月賦長河韜映以驟晦溟漲豁落而半空方鼓怒於澔漾歘騰凌於鴻濛觀其羽之化也將飛風之積也未厚六翩疑作翮之力相切萬流之波却走恐天衢之不容顧水府其何有嗟鷙鳥之累百異亢龍之上九彼黿鼉之宂處而釣絲或困彼鴻鵠之雲飛而網羅纔逺曷若縱溟渤而摶扶搖其勢固以相萬魚躍龍門賦以揚䰇鼔鱗撇波直上為韻元弼彼龍門之津流水激射斷山嶙峋厥功彰於夏禹斯險際乎蒼旻河源炳靈以峻極水族候時而荐臻副天用也佇龍行兮驤首叅神選也同鯤化兮脱鱗徒觀其向天倪辭水府望霄漢之九越泥沙之五來如及門出若由户雖懸波而千仞終作氣而一鼓我鬛既張彼川何長仰雲路而抑揚終不息而自强我功既奬彼河徒廣揖天衢而直上誠擇利而攸徃變化伊何升沉亦多瀠洄曲渚泛灧長波背蛟室而大集指龍門而逺過至於激厲果决乘陵險絶雖迅湍奔雷駭浪噴雪終瞬息而上膺騰而撇揮其尾而不勞騁其力而不竭於是俄變魚服倐為龍姿志氣自負嵗疑作威靈自持豈同途於㸃額寧較力於掀鬐一作鬛哉於戯道有行藏運有通塞天資性靈神輔正直始有水而呀鰓忽升天而振翼然後隨方受變千里一色風雲際㑹未始有極慕李膺之徃哲孰不願逰追老氏之𤣥蹤而其不測儻真宰之可仰終進徳於君門之側魚登龍門賦以躍白波入青雲為韻苗秀有客有客棲於草澤觀龍門壯禹跡目送跳沫千有餘里心驚懸流千有餘尺氣濛濛而霧蒸聲隠隠而雷激於是呑舟之倫吹潦將適奮泥沙而撥刺簸鬐鬛以投擲鱗櫛比而映水星攅目曈曨而中流月白翔疊浪凌洪波當用一作自取之勢疑衍既逞志而浩汗何徃不可豈失溜而蹉跎遂脱魚服入龍渦上既親於天水下不離於黿鼉天吳旁昧而莫測其以馮夷愕眙而孰知其他出彼處此載騰載躍違任公之釣餌逺漁父之矰繳昔常未逹伏艱難以如茲今則獲伸觀變化之何若既禀受乎靈遂隠見乎形騖寥廓昇窅𡨕却訝泥蟠免翻身於尾赤旋驚意逸摩正色於天青然後知逰濠沉浮在藻出入嗟所處之齷齪恨中區之於邑豈若一朝豹變千古名立當天衢而翺翔近日域而呼吸懸水之人文莫比赤鱗之巨鯉何及永無涸轍之憂寧有窮波之急别有志士卓然不羣名嗟嵗晩寢必夜分思拜手於丹闕願獻賦於明君儻獲比魚而變龍必能行雨而吐雲漢武帝逰昆明池見魚銜珠賦以題為韻王起漢武帝出咸京逰昆明覿潜魚之躍吐靈珠之英珍不藏川是獲媚川之色仁苟及物必能動物之誠先是撥刺巨鱗傍畔水裔或詹何所中或任公所制利釣疑作鈎貫鰓而錯落長絲縈岸而掣曵殘瘁不振沉浮未濟是用脫其鋒解其綴索於枯肆初同患於波臣銜以圖書終乃小於軒帝他日擇良辰鏡清流捨鑾輅登龍舟不徐不疾以遨以逰於是傍臨桂棹逺映珠旒或御或垂似驪龍之頷將吐若明若滅比瓊蚌之胎未収光芒稍逼輝赫難儔實有意於豐報固一作同無情於暗投含幽育明轉煌煌於畫鷁振鬐掉尾時熠熠於牽牛既而千官動色百辟咸覩且曰脩其文耀其武澤之廣恩之溥雖彼池中之物亦懐天下之主報徳而入於隨掌比類蛇銜感一作惑音而失於晉庭彼慙鶴舞况乎燭龍奮艷石鯨獨吐泣鮫人之目固不可倫綴神女之軀曽何足數由是儼天儀俯洪池映噞喁而未出炫的皪而方施然後得亷寸韓詩外傳良珠度寸亷疑作度又文選魏都賦明珠兼寸疑作兼之彩失圓折之規則皎皎駒來自掩白狼之美翩翩鵻疑至徒稱赤雀之竒是知人能叶博施物亦叶幽賛無煩罔象之索詎假闌干之貫向若安其忍棄其難俾頒首長逝刼灰永散安得此樂於江湖見託於河漢則玉殿之側誰綴其玲瓏金輿之傍莫矜其照爛以言于魚也厥道斯存以言于人也如何勿敦則受嘉惠蒙渥恩得不效節於當代而垂名於後昆烹小鮮賦以理大國如烹小鮮為韻王起有冽疑者泉生乎小鮮將成登爼之美必求㸑鼎之妍惟烹也在於不撓惟魚也貴乎克全苟司味之有術諒為政而則然若乃海曲蘆人江潭舟子厭頒首於蒲藻得纎鱗於沼沚常窺潎潎漏於密網之中今則炎炎烹於沸鼎之裏是以激之有度爛而足耻先明水火之濟用契鹽梅之理然後合沓有聲沸騰以烹碎文弱質萬品千名以脞脆之易懐疑作壊當洶湧之方驚觸之則土崩可喻安可疑作之則錦質皆成蓋以小為貴在終和且平乃加以薑桂雜以薪燎同露鑊之白逰束前箸而不擾雖湯騰其内火烈其表惟自然於衆味終不亂於羣小既薦尾而獲珍皆駢首而可曉向若爛之不恤撓之是刺急舒無節乎中躁静不放疑乎外自然成魚餒而不食比水煩而不大空摧鱗而莫分寧去乙而知害則知國喻乎鼎人喻乎魚魚之亂則烹以静人之繁則制以徐鼎中之咸若天下之安如鮮之烹也不撓人之理兮作則將申老氏之戒用假庖人之職既不爽於和羮幸有光於為國第二以理國之道有如烹鮮為韻李蟾力刀之任庖人是司將修火以烹矣取小鮮而將之洶洶之中似有躍泉之勢炎炎之上猶憐漏網之姿則無復㳺小沚奮纎鬐既逄鼎鑊之患永絶江湖之思其始也出彼清瀾委茲敝笱落細鱗於方寸之質煦㣲沫於噞喁之口齊一指而未并事寸刄而纔受驗星星一作腥腥之若無升鼎爼而何有瞻其沉浮若氷洶湧如驚不有大觚莊子大軱從車奚假良庖之妙無容尺素何必呼児以烹是知將善其事亦叶于道若運動之不息則完全而莫保如或罷其紛紜任其顛倒則偶鹽梅之側宛若銜珠映莫疑蕭之中猶如在藻是知至人以魚小者國可喻焉其化而敦夫徳善其烹而委之火傳則味不慝道乃全將成其心齊之化無貴乎獺祭之鮮且夫烹之煩而魚必毁政之撓而為疑不理魚不以煩為貴人不以撓為美反覆無極必為靡潰之道疑簡易不脩自作滋彰之始是知求全者動不如静務理者語不如黙動之則一鼎渾渾語之則萬人惑惑想潎潎之微質不可而求俾浩浩之澆風無由自息今聖人任一意朝萬國盖以體𤣥元而得諸静寰海而晏如豈徒以窮髙極厚之内喻之於一魚者哉魚在藻賦以潜泳水府形諸雅什為韻李夷亮鴻鈞之代兮動植斯慶至徳旁流兮潜魚在泳忻藻荇之是依美陰陽之克正載頒其首將同宴鎬之觀不脱於泉自樂觀濠之性極浦風霽澄潭月虚鮮鱗繚繞聚沫紆徐或在鮫人之室或過陵鯉之居蓮花東西信可逰而可息文竿上下徒欲釣而求諸豈不以當在宥之時處恬然之水乘灝灝之元氣得生生之至理大信波及湛恩草靡無虞竭澤之災自保深泉之美伊𤣥風之扇物物無細而不沾惟廣運之鋪時時或與之發潜文苑英華卷一百三十九
