body:
  text: 文苑英華巻七百五十六宋李昉等編史論三夷惠清和論一首漢將李陵論一首省試顔子不貳過論一首鼎國論一首宋齊論一首張禹論一首夷齊論一首夷惠清和論皇甫湜論曰伯夷不降其志不辱其身非其君不事非其民不使乃至餓死而不顧是以孟子謂之為清集無為字栁下恵辱其身降其志不羞汙君不辭小官乃至屢黜而不去是以孟子謂之為集無此字和若校之聖人則彼之所行皆一方之士也夫聖人之道可以進則進可以止則止是天下之是非天下之非出攣拘之域不凝滯於物通塞若水變化猶集作若龍動之謂權集作聖静之謂道非可以一善目非可以一行稱安肯立惡人之朝黜而不羞耻武王之粟餓而至死故曰彼之所行皆一方之士也即而評焉四字集作若即而秤處在於清和互有長短請列而辨之彼伯夷者掲摽表於不滅蹈臣子之所難行信道之篤執之如山嫉惡之心惡之如鬼清風所激有心必動此其為集作所長也至于傳之汎愛易之隨時聖人之權濟物之義豈止不集作未暇亦將有妨焉栁下恵辱身以求利物潔身以事無道唯斯人是哀唯吾道是存薰蕕雖同河濟不雜此其長也至於無道則隠亂邦不居而飲盜泉水食不仁粟垂傲物之迹近寛身之仁又君子所不由矣則清和之用於與奪為集有功字均雖然清之流矯於前而激於後使萬年亂臣賊子懼貪夫惡人耻且衆人之難行二字集作所難為者也和之迹疑於徃而敝於今使代末偷茍之輩有容貪利之徙得語且衆人之易為者也顔回曰舜何人也孟軻曰謂其身不能是賊其身夫然則士之率性飭躬立志希古當以聖人為準的中庸為慕尚力茍不足寜終止焉則清與和皆非通道不可凖則若循迹而辨以矯俗為心必不得巳願附清者漢將李陵論白居易論曰忠孝智勇四者為臣為子之大寳也故古之君子奉以周旋茍一失之是非人臣人子矣漢一有將字李陵䇿名上將出討匃奴竊謂不死於王事非忠生降於匃奴非勇棄前功非智召後禍非孝四者無一可而遂亡其宗哀哉予覽史記漢書皆無明譏竊甚惑之司馬遷雖以陵獲罪而無譏可乎班孟堅亦從而無明譏又可乎按禮云謀人之軍師敗則死之故敗而死者是其所也春秋所以美狼曋尺甚反者謂一作為能獲其死所而陵獲所不死得無譏焉觀其始以步卒深入虜庭而能以寡擊衆以勞破逸再接再捷功孰大焉及乎兵盡力殫摧鋒敗績不能死戰卒就生降噫墜君命挫國威不可以言忠屈身於夷狄束手為降一作俘虜不可以言勇喪戰勲於前隤集作墜家聲於後不可以言智罪逭於躬禍胎一作移於母不可以言孝而引范蠡曹沬為比又何謬歟且㑹稽之恥蠡非其罪魯國之羞沬必能報所以二子不死也而陵茍免㣲軀受制於强虜雖有區區之意亦奚為哉夫吳齊者越魯之敵國匈奴者漢之外臣俾大漢之將為單于之擒是長㓂讎辱國家甚矣况二子雖不死無陵生降之名二子茍生無陵及親之禍酌其本末事不相侔而陵竊慕之是大失臣子之義也觀答子卿之書意者但患漢之不知己而不自内省其終始一作始終焉何者與其欲刺心自明刎頸見志曷若效節致命以取信於君子一無乎字與其痛母悼妻尤君怨國曷若忘軀一作身守死而紓禍於親焉或曰漢一無漢字武帝不能明察茍一作下聽流言遽加厚誅豈非負徳荅曰設使陵不茍其生能繼以死其一作則必賞延於世刑不加親戰功足以冠當時壯節足以垂後代忠孝智勇四者立而死且不朽矣何流言之能及哉嗚呼予聞之古人云人各有一死死或重於泰山生或輕於鴻毛若死重於義則視之如泰山也若義重於死則視之如鴻毛也故非其義則君子不輕其生得其所則一無則字君子不愛其死惜陵之不死也失君子之道焉故隴西大夫以李氏為愧不其然乎不其然乎大夫京本作士大夫一作皆集本唐文粹省試顔子不貳過論韓愈論曰登孔氏一作子之門者重矣三千之徒四科之目孰非由聖人之道為君子之儒者乎其餘過行過言亦云鮮矣而夫子舉不貳過唯顔氏之子其故何哉請試論之夫聖人抱誠明之正性根中庸之至徳茍發諸中形諸外者不由思慮莫匪規矩不善之心無自入焉可擇之行無自加焉故惟聖人無過集有故字所謂過者非謂發於行形於言人皆謂之過而後為過生于其心則為過也顔子之過此類也不貳者葢能止之於集作于始萌絶之於未形不貳之於言行也中庸曰自誠明謂之性自明誠謂之教自誠明者不勉而中不思而得從容中道聖人集有者字也無過者也自明誠者擇善而固執之者也不勉則不中不思則不得不貳過者也故夫子之言曰囘之為人也擇乎中庸得一善則拳拳伏集作服膺而不失之矣又曰顔氏之子其庶幾乎言猶未至也而孟子亦云顔子具聖人之體而㣲者皆謂不能無生于其心而亦不暴之於外考之於聖人之道差為過耳顔子自惟其若是也於是居陋巷以致其誠飲一瓢以求其志不以富貴妨其道不以隱約易其心確乎不㧞浩然自守知髙堅之可尚忘鑚仰之為勞任重道逺竟莫之致是以夫子歎其不幸短命今也則亡謂其不能與已並立於至聖之域觀教化之大行也不然集有夫字行發於身加於人言發乎邇見乎逺茍不慎也敗辱隨之而後思欲不貳過其於聖人之道不亦逺乎而夫子尚肯謂之其殆庶幾孟子尚復謂之具體而㣲者哉則顔子之不貳過者在是矣鼎國論集作三國論李徳裕魏蜀吳三分天下而亡有先後非形勢有輕重積仁集作文積累粹作積仁義有厚薄察其政柄所歸則亡之先後可知也蜀政在於黄皓皓𨽻人也内不能修武侯之舊典外不能制姜維之黷武綱紀日壊君子不服所以先亡也魏自明帝已集作之後政歸仲逹齊王巳集作以降唯守空宫亡之淹速繫於師文粹作昭昭之志將移神器之重須服天下之心未立大功亦不敢取所以蜀滅而魏亡也孫皓雖驕奢極欲殘虐用刑而自專生殺之柄不牽帷牆之制運盡天亡而後夷滅由是而知人君不可一日失其柄也神龍之脫深泉震雷之無煙氣威靈既露人得制之蔣濟覩魏文帝與夏侯尚詔曰作福作威為亡國之言所謂柄者威福是也豈可假於臣下哉後世集作代覩三國之事可不戒懼哉宋齊論宋齊以降繼體承祧者君徳寖㣲王道寖集作陵替纉緒之初如革大運除舊集作降宥解網以恱衆心仁義之風薄骨肉之情廢前史論之詳矣然未得中改之可也如弓之髙下者抑舉琴瑟之不調者更張此亦天之道也豈獨人事哉唯用其罪人不可甚矣天下之惡一也古人言一心可以事百君百心不可以集無此字事一君豈有不忠於前朝而能忠於後王者哉毁泉臺春秋之所譏先儒之所惡宋齊之君有一於此必為美政泉臺見妖尚不可毁況無妖者乎燕人之思邵伯甘棠勿剪楚人之懐叔子望碑墮淚彼人臣也而見思若此雖時移政改莫匪舊臣昔伯益賛禹稱大舜之徳曹參事惠帝守蕭何之法魏文帝初受漢禪羣臣皆賛蜀本作揚魏徳唯衛臻獨稱漢美文帝曰天下之珍當與山陽共之為人臣者罔念於此可謂有百心矣張禹論夫社稷之計安危之機人君不能獨㫁者必咨於所敬之臣然臣有忠邪時有險易交有淺深義有厚薄范睢山東之匹夫也入虎狼之秦履不測之險可謂情集作交疎義薄矣而能尊昭王去穰侯開秦霸業之基以安固後嗣可謂忠於昭王矣夫能獨斷者英主也古人言謀之欲多而集無此字斷之在獨葢為此矣天有震雷之怒龍有逆鱗之恨蜀作狼所以人君在於能斷耳然親戚之際恩義之重不集無不字斷之於巳不可也張敞所謂明詔以恩不聽羣臣以義固争而後許而令明詔自親其文非䇿之得也漢文帝誅薄昭斷則明矣於義則未安也周宣餞申伯有孔碩之詩秦康送文侯二本作公興如存之感況集無此字太后尚存唯一弟薄昭尚二本作而斷之不疑非所以慰母氏之心也漢成帝車駕至張禹第辟左右親問禹以天變禹以年老子弱於曲陽有隙反二本作乃言新學小生亂道誤人宜無信用帝雅信愛禹由此不疑王氏致漢室之亡成王莽之簒皆因禹而發可謂漢之賊也國之妖也雖蛇鬬於鄭鷁退於宋妖不甚於禹矣朱雲欲以尚方斬馬劒㫁佞臣頭斯為當矣後代有類於此者其臣可以范睢為師表張禹為至二本作鑒戒夷齊論昔夷齊不食周粟餓於集作于首陽之下仲尼稱其仁美其徳孟子稱伯夷聖之清者也葢以取其節而激貪也所謂周粟者周王所賦人之禄是也諌而不從不食其禄可矣至於聞淑媛之言輙飱薇蕨斯可蜀作所謂不智矣夫薇蕨者元氣之所發生四時之所順成日月之所燭風雨之所育周焉得而有之哉若以粟者周人之播植則夷齊得非周人乎反覆其道盡未當理然夷齊之行實誤後人於陵仲子慕夷齊者也乃至不義其兄之禄潔則潔矣仁豈然哉厥後商雒四友畏秦之酷避秦之禍豈止潔身而已然飱紫芝以為粮飲清泉以為漿終老南山以養其夀斯可謂仁智兼矣鼎國論神龍之脫深泉此上袁本有如字宋齊論未得中袁本作政未得中文苑英華巻七百五十六
