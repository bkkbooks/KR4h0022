body:
  text: 文苑英華巻一百十宋李昉等編器用九律筒賦一首河南府試筌蹄賦一首得魚忘筌賦一首錐處囊賦一首處囊錐賦一首濾水羅賦一首鹿盧賦一首桔橰賦一首甕賦一首鐵火筯賦一首律筒賦髙郢碧鮮之竹採而為筒定名以律一式疑厥功厥功伊何所指必捷下彼髙鳥紛如墜葉徒觀夫抱璞見素㫖逺謀深不煩筋角不飾碧金直道而行故外端其體當無有用故内空其心於是步郊原窺林樾律凝其影運一氣以潛通箭戢其芒出數尋而勁發鏃如擊電羽若奔月我命處而精誠彼不虞而殞越亦如毛生耀頴初晦跡以躊躇周氏銜枚竟收功於倐忽煙栖霞宿擇木排空莫不洞胷裂眥奪魄䘮躬朝在林泉之上夕登柈俎之中足使掇蟬失妙彈雀非工潘令慙黄間之弩廐尹賤緑沉之弓有士遇之喟然歎曰律者氣之管法之名竹者材之勁性之貞兼此而用之匪亨向也杍已注在前人不録虞氏不營混樗散而長棄何器用之能成孔父云舍之則藏用之則行信不虚矣河南府試筌蹄賦邵說至道𤣥黙真宗朴素莫究其源孰知其故將假物以明象乃忘言而立喻若筌在魚若蹄在苟或藪澤之内以時而肅設溪澗之間應節而周布乃凌岑壑忘蹄與筌興言薄狩命駕忘旋魚潑潑以隨波樂只爰爰而得性怡然好之者徒發歎於終日觀之者空起羨於臨川斯無虞於即鹿寧有望於烹鮮於戲道有興廢時有通塞羡魚如之何匪筌不得逐如之何匪蹄不克猶蹄在既獲而蹄可以亡猶筌在魚魚既烹而筌可以息亦何異遊道藩者揮郢匠之斤遇道樞者削公輸之墨彼損之而又損故不得而有得是以聖人立教所寳惟真勤求若䘮之㫖逺索忘言之津還淳返朴求於道要絶聖棄智無為實賔故卓立攻始輝光日新夫子將欲論筌蹄於宜觀盍若考前途而後遵得魚忘筌賦以適道知歸言象皆遣為韻陳仲節魚也者重泉之微因筌而索與𤣥珠而同歸筌也者虚舟是依因魚而棄將縁疑木而有違始鈎深以假器於是終釋手而喻指之非詎比弓藏方隨矯木靡因火化奚貴焚機所以乍觀象於十日終遺形於九圍其得也且非貪餌誰曰在藻既涉無而恬鱗斯獲將遺有而虚室是寳其忘也寧捨不材匪投有昊陶唐絶巧棄智故然雖愛必捐若遁圓離方孰謂不由其道故無用者木上之罾則虧有情者在梁之翼何為彼用拙徒觀於進退此情留寧識於推移故曰因動而忘筌為後覺投虚自得魚匪前知豈殊舟既焚而空濶先濟屣將脫而止足由斯于以探幽落焉藏往方之俯拾故何啻於盈筐爰取坐遷義非同於解網必也窺清泚憑浩蕩是務得一不矜牽兩夤縁而來為得魚之象必也祛其意窒其源舟無五覆道遣三幡展轉而棄為忘筌之言使彈鋏嘉賔不樂烹鮮之味投竿公子何勞餌犗之煩若然投者諒非赴澤在虚心而自適諒非巻懐將適道以孔皆然後蟬蛻萬象鴻毛百骸有漁人聞而辨之曰是言也始以神遇終將理遣謂鱗介非掩豆之實以巨浸為覆盆之淺然乎哉吾何必鳴榔而遊衍錐處囊賦以素礪鋒頴居然自彰為韻惟國生賢囊錐喻焉囊之體也柔不能挫其銳錐之資也利自可以疑衍一字攻其堅固脫頴而出矣豈潛芒而蔑然當其組織而備鍜鍊而利既括之而無咎亦藏之而轉祕察其所安觀其所自則錐也遇處囊之日囊也為置錐之地爾其捨之則藏輝然有光匪宣其利將掩其鋩質雖蒙其磨錯鋒已露其雪霜既隠之而斯見亦抑之而復揚笑矢之在櫜潛而勿用殊玉之被褐闇然不彰無謂其利博其功細用每施於補履色更因於作礪彌堅者觸之必通嘗巧者用無不濟是以銛鋒不得而永潛輕縷不得以久蔽其受也含虚其出也有餘柔以外表剛而内居囊若擲於荆卿我殊於藥囊若焚於郭璞我異於書亦當蓄其銳露其頴罔退尺以韜光每進寸而懸影漏禇中之物比之不同爭錐末之人窺之自警誰謂利器密其彌縫用之則行或可執其柄動而逾出不可當其鋒宜掌握而為美豈緘縢而是從别有藏器未遇飾躬有素囊之既處嗟毛遂之未知錐之可方儻平原之一顧處囊錐賦以賢者處代必聞其人為韻獨孤申叔囊之為物也虚受而無遺錐之為器也利用而攸資彼式處焉必將勁而出矣此乃柔止安得固而藏之遂得耀頴於紉縫之處呈銛於挫銳之時諒遏之兮不可非剛克兮何其烱烱乎從革之資纖纖乎徑寸之質露微鋩以外見透虚囊而首出方同人之處晦靜以求伸比達士之奮奇物莫能屈既藏身於不固寧脱頴之無必觀其觸之必徹指之必穿方將動而愈出孰曰鑽之彌堅所以趙氏克明因之而興喻毛生不讓比之而自賢信立徳而法矣誠有待而言焉且賢之在代也或黙或語猶錐之在囊也或出或處囊雖固兮錐必自分代雖溷兮賢罔同羣豈比夫不銳者載繁疑載考而莫出不善者四十五十而無聞是以匪無思乎指地將有望於决雲吐頴呈鋒磨礪而自我投奇擢異提擕而在君嗟乎道之將行也必有用我者彼賢未達雖執鞭而尚從我道有庸寧補履而為下向使無銛鍔之珍為鉛刀之倫縮勁挺於囊橐受頑鈍於陶鈞復何異恍惚之内物鴟夷之中人君子曰是事也可以為鑒戒可以明進退豈獨美於一時蓋垂規於百代濾水羅賦以濾彼水蟲疎而無漏為韻白行簡羅之名兮惟一羅之用兮不同彼以獲禽為利此以救物為功象夫天而圓其外體乎道而虚其中執拯溺之心忘乎雲鳥表好生之徳及其水蟲觀其膺用之初裁成之始利物提挈順時行止夕挂於壁若滿月之在天曉用於人狀圓荷之在水爾乃匪虚實如有無心寧勞於凝滯體非憚於沾濡伊紗燈之護蟲則理齊而功倍彼綸巾之漉酒乃跡同而用殊若夫氣爽秋曉景光春晝臨桐井之銀牀近蓮塘之玉甃於是銅瓶傾瀉金盆俯就迸千㸃之珠光垂一帶之水溜初疑散絲之雨灑緑雲而亂飛又似瀑布之泉穿碧烟而下透且夫環之勁鐵取其堅而不朽羃以輕紗取其疎而無漏彰妙用於不凡表深仁而善救濾顔生之瓢水欲飲而徐清漉范令之釜魚將烹而獲宥然則開三面者其仁未如張一目者其害有餘曷若篩麽蟲而必礙投勺水而皆虚縱醯鷄為解羅之鳥捨井鮒為漏網之魚斯則用資於生不資於殺仁在乎密不在乎疎夫以道存仁恕水何大而不濾物莫隠欺蟲何微而見遺雖焦螟之生必全有以小為貴者江漢之流雖大盡可一以貫之功且知其至矣用寧憂於已而客有撫而歌曰玉卮無當兮安可擬風瓢有聲兮不足比惟濾羅之用也大哉故取此而去彼鹿盧賦以利用汲引為韻仲子陵智者創物以見意立成鹿盧以為天下利木徳摽象金行効事與桔橰之用則同比筍簴之形不異井之勿幕瓶亦汔至當於要路之津存乎兼濟之地忠也陳力而就列孝也致養而不匱圓靜則智士之心通流乃仁者之志故鹿盧之體一有君子之道四觀其得位攸處居中特立從繩以寸工假器以尺汲自上下下者念兹以有成虚往實來者釋此而何執利物不言利急人之所急捨之則其道可巻而懐用之則其功可俯而拾及夫挈瓶所施懸綆所統崇朝以聞乎三捷永日何啻乎七縱為萬人仰與天下共其靜也則無機之機其動也則有用之用徳必不孤賢亦有凖泉蒙者道為之廢井渫者心為之軫無忘乎牽攣蓋存乎汲引斯亦惠而不費乎賢人之業於是乎盡也桔橰賦王契智者濟時以設功強名之曰桔橰何朴斵之太簡俾力役兮不勞作固兮為我之身臨深兮是我之理若虞機張如鳥斯企山有木因工見汲引之能巽乎水自我成潤物之美不羸瓶而上出何抱甕之勤止執虚趨下雖自屈於勞形持滿因髙終見伸於知己鄭圃之側潘園之旁溝塍綺錯畎畆相望帶嘉蔬兮映芳草背古岸兮面垂楊欲建標以取别能舉直而自强若垂竿兮匪釣象爟火兮無光不忘機以棄俗乃習坎而為常隨用捨而俯仰應淺深而短長重泉之水兮不滯九畹之蘭兮益芳雖欲絶學以棄智其若得存而失亡歌曰大道隠兮世人薄無為守拙空寂寞老圃之道可行何恥見機而作甕賦衛棻古人得象兮創經營肇彼羣橐兮疏厥名瞻兹甕之為質乃陶人之所成非耳目之華侈留器用之深情若乃虚以為量滿而戒溢内容乃體外堅其質在埏埴之厥初諒邀奇於斯日濟家人之攸務故陳力乎虚室藏用所資詎可談悉至如原憲貧病蓬戸攸居以甕為牖含風自虚知道而樂其神晏如及夫漢隂抱甕髙情悠邈絶乎澆風敦其至朴同夫大道於焉卓犖若夫吏部既醉乗興來眠漏𫝊永夕酒泛如泉酣飲無度其人在旃考異宏圖微疑奇遐紀條支之鳥卵猶類園客之繭形可擬非心虚之可測徒耳聞而是矣厥品之為用自禮經以疏跡固有順於時須乃全之而不易含虚而稱從宜所適粤若稽古兮聖唐銀甕常滿兮珍光靈液滋兮寳物用呈絶瑞兮詠太康小子同螢爝之微火耿光凝於斯章鐵火筯賦以堅剛挺質用捨因時為韻楊洽物亦有用人莫能捐惟兹鐵筯既直且堅挺剛姿以執熱揮勁質以凌煙安國罷悲於灰死莊生坐得於火傳交莖璀璨並影聨翩動而必隨殊叔出而季處持則偕至豈彼後而我先有協不孤之徳無愧同心之賢至如𤣥冬方沍寒夜未央獸炭初爇朱火未光必資之以夾輔終俟我而擊揚焚如焰發赫爾威張解嚴凝於寒室播温暖於髙堂奪功錦一作綿纊挫氣雪霜夫如是則筯之為用也至矣於何不臧銳其末而去其利端其本而秉其剛信尺箠之莫儔何支䇿之足重專權有􅈔故我獨任而無成雙美可嘉故我兩莖而為用抱素氷㓗含光雪新同舟檝之共濟並輔車之相因差池其道勁挺其質止則疊雙用無廢一雖炎赫之難持終歲寒之可必嗟象筯之宜捨始階亂而傾社鄙囊錐之孤挺卒矜名於露頴伊瑣瑣之自持獨錚錚而在兹佐洪爐而罔忒煩素手而何辭因依獲所用捨隨時儻提握之不棄甘銷鑠以為期文苑英華巻一百十
