body:
  text: 文苑英華巻七百五十一宋李昉等編興亡上北齊興亡論一首後周興亡論一首天命論一首北齊興亡論盧思道或問主人曰徃者魏人失御六合雲擾河朔闕疑作闗右剪為二國永熙西道疑作遁天平北巡兩朝先主分陜而霸龍戰虎争多歴嵗祀既而水運值竭天禄永終齊室比迹於唐虞周人踵武於漢魏齊有五帝周易四王並纔踰二紀相繼而滅若其元首膺期股肱命世立極補天之業銘常鏤鼎之功至於暴君南面孽臣作輔民怨神怒國殄祀絶易世之由雖傳之耆舊載於史䇿通人雅㫖其詳可得聞乎主人應之曰吾少仕齊朝晩歸周室因而學業歴兹永乆雅好博古雖欲擬議近世治亂粤可略陳在魏正光牝雞司旦爾朱榮乗釁内奰滔天泯夏餘燼䟦扈挻禍王城海内生民若崩厥角齊髙祖神武皇帝天縱英明之略神挺雄武之才龍攄豹變投袂而起四明昆弟大會韓陵類蚩尤風雨之兵若新都犀象之陳彼曲我直天寳疑作實賛之日未移晷大殱醜族然後㧞立宗枝入纂皇統羣后成務天下晏如但芒刺成災震逼為梗居鄭流彘去而不入遷鼎舊鄴國命惟新朝章國憲燦然畢舉渭南失律似鳥林之喪師洛北先鳴同官渡之凱入雖天命有歸而盡於北面方之魏武具體而㣲文襄嗣業始踰弱冠􅅛傑之氣足稱負荷賔禮時秀驅駕羣雄内外肅清朝無粃政侯景背恩棄義狼顧汝頴蕭衍失信幸災蟻聚彭汴於是謀臣運䇿猛士推鋒渦陽之役兇渠疋馬南逝寒山之戰具卒隻輪不反王思政入㨿長安淹歴嵗時神旗蹔臨如風掃籜三秦勍敵閉闗自守五湖之長革音請命魏孝静以天歴有在鼎祚將移大禮備物率由舊典允恭克譲推而弗居禍生非慮匕首竊發爾其弗疑作夷㓙剪暴剛斷英峙天崩地折堂搆闕如嗣子幼沖未堪多難文宣雖云外弟少乏令名人望所歸便見推奉于時政有彛倫朝多俊乂爪牙皆韓白之伍心腹盡良平之儔外静方隅内康庶績主之不才四海弗之覺也洎乎受終文祖燎天改物兵強地廣國富刑清發號施令必師古始信賞必罰如有四時年糓屢登災害不作敵人竄迹郊境無虞天保受命迄於五祀黄初泰始不能逺尚爰及中年誕縱昏徳以萬乗之貴為長夜之飲散髪視朝肉袒聽政手行刳剔躬運矛鋋寵狎佞諛親愛凡鄙出入市廛逰走衢路太保髙隆之佐命元功廟廊上宰僕射髙徳政龍潜賔友帷幄重臣衞尉卿杜弼碩學偉才㧞萃出類光禄大夫元景風流儒雅師範縉紳或赤族見誅或丹頸為戮並直言竊歎斃於䜛口自餘名士良臣非罪遭命滛刑以逞不可殚言劉曹以還逮於僣偽受命稱帝未有若斯之慘者也頼有尚書令𢎞農楊遵彦魏太傅津之子也含章秀出希世偉人風鑑俊朗體局貞固學無不縱才靡不通裴樂謝其清吉應劉媿其藻麗温良恭儉讓恕惠和髙行異才近古無二有齊建國便預經綸軍國政事一人而已詰旦坐朝諮請填湊千端萬緒令議如流剖斷部領選舉人物滿室盈庭永無凝滯虚襟泛愛禮賢好士聞人之善若已有之智調有餘尤善當世譛言屢入時寄無改每乗輿四廵恒守京邑凡有善政皆遵彦之為是以主昏於上國治於下朝野貴賤至於今稱之俄而文宣不豫弊於趨疑孽儲君繼體纔歴數旬近習預權小人並進楊公慮有危機引身移疾幼主若䘮股肱固相敦勉乾明之始難起戚藩變成倐忽殞於殿省詩云人之云亡邦國殄悴君子是以知齊祚之不昌也孝昭地乃密親位居元輔有姬公之戚無復子之心亦由主弱時艱慮深家國當陽正位事出權道身長八尺腰帯十圍沈深謹厚實有君人之望時甲卒強盛財力殷阜乃睠西顧恒有吞噬之心兼以天保之後懲其滛縱不邇聲色不事宴遊孝於太后篤於昆季慎惜名噐愛飬黎元後庭嬪嬙皆是藩邸之舊數不盈十竟無私寵特解吏事尤好禮客但政苛碎暗於聽受降年不永朞嵗而崩大漸維幾黜其元子武成母弟之親入主宗祏而少禀㐫徳不孝不仁龍攅在殯淚不承臉太后之喪亦不哀哭纔及公除便衣縫裘縱侈荒淫不知紀極甘酒嗜音夜以繼晝有和士開者素有疑衍和氏之庶孽其面目亦似胡人輕薄凡猥為衣冠所棄武成在田之日引為參將聞好彈胡琵琶亦解歌舞一面之後便大相愛恱恒在卧内同食共寢淫穢之事無所不為天保之世文宣知其如此頓鞭二百徒本傳作徙配長城後遇赦得還武成為右丞相乆别得還恩盼愈厚信宿之間賞賜巨萬及踐大位親顧彌隆爰自黄門漸至端右盡景娛侍畧不休停就令蹔出便追騎相尋士開作威作福畧無顧憚恩寵勢望燻灼朝野恣性貪淫人倫少例心如谿壑行均犬豕甲第當衢侔擬公室冨商大賈朝夕盈門朝士無頼者亦競相謟媚或送婢妾或進子女筐篚苞苴烟聚波屬士開葬母傾朝追送諂諛尤甚者至悲不自勝澆薄邪佞愛踰弟兄名賢素士畧不交言其所薦延奏無不遂榮枯進退定於俄頃于時下陵上替奔競成習士無貴賤風節頓盡趙彦深阿諛順㫖俛首懐禄元文遥器能先見不敢措言此外羣官靡衣媮食齊室大壊其源始於此禳河清之末長彗為災太史奏言須有攘救武成便自稱太上傳位後主胡長粲以從舅之親馮子琮以姨夫之戚俱受寄託並當樞要或性識庸近或意懐險薄皆不學無術智能淺短及天統末年武成即世和士開一相處内自擬伊周太尉録尚書事趙郡王叡明徳茂親聰爽俊悟藩王之内時望隆重以士開凶醜宜加屏黜入踐青蒲讜言規諫而少主聰察不類成昭母后才明異於馬鄧士開禮於疎行長粲為其謀主遂使宻戚賢王絞縊以戮雖遐邇胥怨愚智同憤而依托城社末如之何數載之間肆其穢行與馮子宗夫婦鬻獄賣官三家府藏賄貨山積凶愚子弟並處髙資更相貨疑作貿易擇而後授司徒瑯琊王儼年甫十四兼領憲司憤其所為切齒忿咤執送南臺異其身首子琮以搆扇两端一時依法二凶俱𠞰朝野晏清京師市里儛蹈成羣梁董之慶不足斯比瑯琊心實去惡跡乃陵上不容於時俄而賜盡自兹已後政道彌昏髙阿那以牧圉之勤重其佞媚韓長鸞以韛紲之能恱其趨走又有女奴陸氏出自掖庭凶智狡筭舉世無疋以保母之恩特見尊寵六宫謂之世師人主以為内相舞弄王法掩塞天聽慶賞威刑出於婢口頑嚚弟姪布於列位帝戚皇支不能及也陸子駱提婆者出於皁𨽻本是鞾工愚暗庸短僅辯菽麥與韓髙之徒共持國柄宣淫肆暴甚於和氏窮極冨貴轉日迴天愚薄之倫折枝䑛痔輕者進貨賂甚者結婚婣朝廷混然無復亷恥清貞守道更被嗤怪漢世張趙不能喻其萬一晋朝賈郭未足比其錙銖斛律明月屬鏤之錫寃動天地崔季舒龍逢之戮痛切幽明加以内參年少閹官之屬親狎寵私盈滿宫禁干預政事剽掠生民黔首呼嗟以日為嵗其反道違常速亡趨滅事非一緒不可勝陳後主自生宫闈長於尼媪不接端士不見正人朝夕諮諏罕聞調䕶之客便煩毛詩作蕃左右莫匪刀鋸之餘飛鷹走狗蕩其心慮麗色淫聲亂其耳目論功徳者云羲軒無以尚述欽明者稱堯舜不能踰才智之士棄而不任假有名級備員而已憲章綱紀蕩然無餘魚爛土崩以俟勍㓂周武大㨗平陽乗虚除入將有降心士無鬬志前世耿賈之雄俛眉頓顙先朝貔虎之鋭斂氣重足舉晉陽如拾芥攻鄴宫猶振槁萬里百城交臂屈膝南極江淮北盡砂塞西界凾谷東至滄溟府帑粟帛之饒兵革士民之衆齊之所畜盡為周有不亦哀哉後周興亡論前人周太祖文皇帝幼而機驚疑作警智數過人屬魏末多故召募闗隴值二將相屠三軍未一見推為主遂握兵符俄而魏武西廵奉迎車駕挾天子以㑹諸侯萬世所一時也撫養荒餘鳩聚兵甲同心之旅不滿萬人齊神武以大兵數十萬將清㶚滻雷動雲移萃於渭曲太祖以數千弊卒振旅而還遂基王業竇泰以勁兵深入一戰喪元髙敖曹以銳氣先登臨陣受首兵革一作革車嵗動敗鮮勝多髙氏雖怙其衆力莫敢先至邙山之舉我師敗績收合亡散退守有餘及蕭氏將亡邊服震擾荆郢内附庸蜀來王器械完整貨財充實帯甲百萬驍將如林晏駕之辰國與齊人相埓矣閔帝以嫡嗣承基應天納禪弱齡厭世未及稱皇以庶長見立纂我鴻緒從容文雅亦守文之良主焉二帝景命不融髙祖始登大位于時大冢宰晋公宇文䕶太祖之猶子也負圖作宰親受顧命國柄朝權頓去王室髙祖髙拱深視彌歴嵗年談議儒𤣥無所闗預祭則寡人晋公之不忌也但自下裁物其主不堪累世權強一朝折首其於黨與咸見夷戮惡禽􅀢物掃地無餘爾乃棄奢淫去浮偽施一徳布公道屏重内之饍躬大布之衣始自六宫被於九服令行禁止内外肅然以釋氏立教本貴清浄近世以來糜費財力下詔削除之亦前王所未行一作得非也值齊季失徳取亂侮亡親御戎軒再舉而滅軍令肅然秋毫莫犯數旬而定不戮一人未及下車革其弊政山東士女欣戴如歸但天性嚴忍果於殺戮血流盈前無廢飲噉行幸四方尤好田獵從禽於外非夜不還飛走之類值無免者識者以此少之雖有武功未遑文徳彛章禮教盖闕如也練甲治兵將掃沙漠逺圖不遂暴疾升遐宣帝初在東京巳多罪失髙祖每加嚴訓不能修改嗣位之初飾情自勵踰年巳後變態轉興躭酒好色常居内寢角觗逸遊不捨晝夜分命使人徴求子女積之後宫以千萬數此石虎之淫風也寵姬四人並立為皇后車服節文與内主無别此劉聰之亂政也少在儲宫頗覽經籍臨朝對衆亦有精神但禀猜狂特好詭異衣冠形色皆與舊制不同文武侍臣屏棄遐裔内外門閤皆别令臣耆着守出入去來並録其數殿省以目相視然朋淫於家無所簡擇乃至長樂亦有醜聲大象之末忽焉慘虐鞭撻朝士動至數百背及胷腹一時下手楚毒之理不可忍見祖宗廟號諱不得稱變易官名囘官疑姓族車乗輪輻並有貴賤之殊婦女莊㸃亦為上下之異後庭嬪妾房有數人自旦至夕恒令危坐相對有不如法便即箠楚内外命婦朔望朝謁皆令為丈夫拜伏以示肅恭自號為天不復稱朕此外小事異同不可勝紀狂惑妖僻開闢未之有也客曰齊武成荒悸庸暗怨結人神厥嗣不昌理則然矣周祖聰明神武冠世雄竒因愚子以至顛覆豈人事乎抑天道也䝉有惑焉請聞其説主人曰寒暑晦明二儀之不同也賢愚治亂五勝之相形也是以酒池肉林乃周王之締構坑儒滅學亦漢后之驅除齊自天保受終迄於武平喪國孝昭之外竟無令主河清巳後國基漸墜昏主慢遊於上黎民怨讟於下逮於末葉君弱臣愚外崩内潰周人取之猶坂上走丸也周武任數矩疑情果敢雄斷擁三秦之銳屬攻昧之秋削平天下易同俯拾未及三祀宫車晩駕嗣子披猖肆其㓙慝真人革命宗廟為墟此葢天所以啓大隋非不幸也天命論李徳林粤若䆳古𤣥黄肇闢帝王神器歴數有歸生其徳音者天膺一作應其時承其運命者確乎不變非人力所能為也龍圖鳥篆號諡遺跡疑而難信缺而未詳者靡得而明焉其在典文煥乎緗素欽明至徳莫盛於唐虞貽謀長世莫過於文武大隋神功積於文武一作王天命顯於唐叔昔邑姜方娠夢帝謂已余命而子曰虞將與之唐而蕃育其子孫及生有文在其手曰虞遂以名一作命之成王滅唐而封大叔及唐叔之封也箕子曰其後必大易曰崇髙冨貴莫大於帝王老子謂域内四大王所一無此字居一焉此則名虞與唐美兼二聖將令其後必大終致唐虞之美蕃育子孫用表無窮之祚逮皇帝一作家建國初號大興箕子必大之言於兹乃騐天之眷命懸屬聖朝重耳區區豈足云也有娀𤣥鳥商以興焉姜嫄巨跡周以興焉邑姜夢帝隋以興焉古今三代靈命如一本支種徳奕葉丕基佐髙帝而滅楚立宣皇以定漢東京太尉闗西夫子生感遺鱣之集殁降巨鳥之竒累仁積善天申休命太祖挺生庇民匡主立殊勲於魏室建茂績一作盛業於周朝啓翼軫之國肇炎精之紀爰受厥命陟配彼天皇帝載誕之始一作初赤一作神光滿室流於户外上屬蒼旻其後三日紫氣充庭四鄰望之如欝樓觀人物在内色皆成紫幼在乳保之懐忽覩為龍懼而失抱帝驚動數旬方始痊復又嘗寢於其室家人開户正見一龍闕太祖神異也世塗不測竅比丘尼智先保養智先禪觀靈雅有𤣥䜟云此子方為普天慈父䕶持正法神佛佑助不須憂也帝體貎多竒其面有日月河海赤龍自通天角洪大雙上權骨彎迴抱目口如四字聲若鐘鼓手内有王文及受九錫王生文加㸃乃為主昊天成命於是乎在顧盼閒雅望之如神氣調精靈括囊宇宙威範也可敬慈愛也可親早任公卿聲望自重周齊王憲謂晉蕩公曰觀隋公神彩恐不為人臣晋公徐納其言將加不利頼大將軍侯夀固諫乃止憲及内史烏丸軌各奏周武帝云隋公氣調風流合散敬服竊聞世議慮不在人下武帝云此人頭額但宜為將不須異意待之相者來和謂帝曰觀公骨法必為王者但願保愛聖躬道士張賔亦言公相是帝王名當圖籙龍飛紫極莫忘臣帝憂懼謙退深自晦跡鄴城内學人陸撥大象初入長安謂所親曰周徳巳盡楊氏必興隋公徃自定州南行至鄴當時遥望擬為天子昨在路瞻仰定是不疑但未知如何而得後嵗當來觀耳謂其所親曰爾無輕言為貴人患害撥曰天之所命安可害也明年帝作相於内大象二年夏五月帝初拜揚州總管平晝寢息似睡若見數龍繞身其夜又夢一龍來入被内帝又常出長安城東獵馬上恩懐在濟生民之疑相夜夢一長大人素服冠幘謂帝曰時未至及欲作相夢人云時今至矣天求民主丕顯孳至當晉蕩執國及建徳之時君異則天臣非佐命猜嫌䜛慝何日云忘我皇外總方面入司文武具興王之表藴大聖之能或氣或雲䕃映於廊廟如天如日臨照於冕軒内明外順自險獲安豈非萬福扶持百禄攸集有周之末朝野騷然降志秉鈞一作執鈞鎮衛宗社明神饗其徳上帝付其民誅姦逆於九重行神化於四海于斯時也尉迴㨿舊一作有齊累世之都乗新國易亂之俗驅馳虵豕連合縱横地則一作迺九州陷三民則十分擁六王謙乗連率之威憑全蜀之險興兵舉衆震蕩江山鴆毒巴庸蠶食秦楚此二虜也窮㓙極逆欲割鴻溝之地閉劍閣之門皆將長㦸強弩睥睨宸極窮漳河而逺一作逹負海連岱岳而距華陽廹脅荆蠻吐納江漢佐鬬嫁禍紛若蝟毛曝骨履腸英華作腹間不容礪爾乃奉殪戎之命運先天之畧不出户庭推轂分閫一麾以定三方數句而清萬國蕩滌天壤之速規摹指畫之神造化已來弗之聞也光熈前緒罔有不服煙雲改色鐘石變音三靈顧望萬物影響木運告盡褰裳克讓天厯在躬推而弗有百辟庶尹四方岳牧稽圖䜟之文順億兆之請披肝瀝膽晝歌夜吟方屈箕頴之髙式允幽明之願基命定命一作宥密如亘如升唯一作惟帝居歆創業垂統殊徽號改服色建都邑叙彛倫薄賦輕徭慎刑恤獄除繁苛之政興清静之風去無用之官省相監之職竒才間出盛徳無隱星精雲氣共趨走於階墀山神海靈咸爕理於臺閣東漸日谷西被月淵一作川教暨北溟之表聲加南海之外悠悠沙漠區城萬里百蠻之廣一作蠢蠢百蠻莫之與競五帝所不化三王所未賔屈膝頓顙盡為臣妾殊方異類書契不傳梯山越海貢琛奉賮一作贄欣欣如也窠居穴處化以宫室不火不粒訓以庖厨禮樂極一作合天地之因一作同律吕節寒暑之候制作評垂衣之後淳粹得神農之前遨遊文雅之塲出入杳𡨕之極合神謀一作謨鬼通幽洞㣲羣物嵗成含生日用飲和氣以自得沐𤣥澤而不知也丹雀為使𤣥龜載書甘露自天醴泉出地神禽異獸珍木竒草望雲一作非觀海應化歸風備休祥於圖牒罄幽遐而戾止猶且父天子民兢兢翼翼至矣大矣七十四帝曷可同年而言一作語哉若夫天下之重不可妄㨿故唐之許由夏之伯益懐道立事人授而弗可也軒初四帝周餘六王藉勢一作世因基自取而不得也孟軻稱仲尼之徳過於堯舜著述成帝者之事弟子備王佐之材黒不代蒼泣麟歎鳯栖栖汲汲雖聖逹而莫許也蚩尤則黄神抗衡共工則黑帝勍敵項羽誅秦摧漢宰割神州角逐争驅盡威力而無就也其餘炎起妖妄何足數乎賊子逆臣所以為亂皆由不識天道不悟人謀牽逐鹿之邪説謂飛鳬而為鼎若使四㓙秉一作争非八元之誠三監懐一作同九臣之志韓信彭越深明帝子之符孫述隗囂妙識真人之出尉迴同謳歌之類王謙比獄訟之民福禄蟬聮胡可窮也而違天逆物獲罪人神嗚呼此前事之大戒矣誅夷葅一作烹醢歴代共尤僣逆㓙邪時煩獄吏其可不戒慎哉葢積惡既稔一作或心自絶於善道物類相感理必至於誅戮天奪其魄鬼惡其盈故也大帝聰明羣神正直耳目鑒於率土賞罰參於國朝輔助一人覆育兆庶豈有食人之禄受人之榮也包藏禍心而不殱盡者也必當執法未處其罪司命已除其籍自古明哲慮逺防㣲執一心持一徳立功坐樹上書削藁位尊而心愈下禄厚而志彌約寵盛思之以懼道髙守之以恭克念於此則姦回不至事乃畏天豈唯受一作愛禮謙光滿覆義在知幾吉㓙由人妖不自作衆星拱極在天成象夙沙則主雖愚蔽民盡知歸有苖則始為䟦扈終而大服漢南諸國見一面以從殷河西將軍帶一作率五郡而臣漢故招信順之助保泰山之安彼陳國者盗竊江外民少一郡地減半州遇受命之主逢太平之日自可獻土銜璧乞同普天乃復養喪家之疾一作疹遵顛覆之軌趦趄吳越仍為匪民雖時屬大道偃兵舞戚然國家當混一之運金陵是殄滅之期有命不滔一作蹈斷可知矣防風之戮元龜匪遥孫皓之侯守株難得迷而未覺諒可愍焉斯故未辨𤣥天之心不聞君子之論也一作皆隋書本傳内自流於户外至入司文武五百六十五字傳中節去英華却載全文文苑英華巻七百五十一
