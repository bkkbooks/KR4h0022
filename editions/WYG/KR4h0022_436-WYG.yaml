body:
  text: 文苑英華巻四百三十六宋李昉等編德音三賑恤德音下淄青蝗旱賑恤一作優恤蝗旱諸州詔編制門下朕嗣守丕訓恭臨大寶兢兢業業十有三年何嘗不惠下以愛人克已以利物外無畋遊之樂内絶土木之功浣衣菲食宵興夕惕厚於身者無不去便於人者無不行損羣方之底貢驅時風於朴素將以𢎞祖宗法度致夷夏雍熙心雖勞於九垓道未進於一取顧惟不德慙歎方深今雖遐邇甫寧忠良協志五兵戢其鋩刃百姓絶其征行勤求理道日冀平泰而去秋旱蝗所及稼穡卒痒哀此蒸人懼罹艱食是用順時布令助煦育之深仁施惠覃恩法雨露之殊澤其淄青兗海鄆曹濮去秋蟲蝗害物徧一作偏甚其三道有去年上供錢及斛斗在百姓腹内者並宜放免今年夏税上供錢及斛斗亦宜全放仍以當處常平義倉斛斗速加賑救京兆府諸州縣應有蝗蟲米榖貴處亦宜以常平義倉及側近官中所貯斛斗量加賑賜灾旱之餘撫養尤切眷兹長吏必在得人應遭蝗蟲處刺史委中書門下精加訪察如有煩苛暴虐貪濁懦弱者即湏與替邦畿之内徭役殷繁言念疲人固資矜恤京兆府今年夏青苖錢宜量放一半應遭蝗蟲及旱損州縣鄉村百姓公私債負一切停徴至麥熟即任依前徴理及准私約計㑹其遭蝗蟲及旱損處准勅添貯義倉每畆九升斛斗去秋合徴在百姓腹内者並宜放免其天下州府貸種糧子在百姓腹内者更不要徴閉糴禁錢為時之蠧方將革弊尤藉通商其見錢及斛斗所在方鎮州府輙不得擅有壅遏任其交易必使流行仍委出使郎官御史及所在度支鹽鐵廵院切加勾當兼委轉運使設法般運江淮糙米於河隂積貯以備節給賑濟累時以來水旱時有方隅郡府杼柚屢空厚下所以安人裒多由其稱物至於徴歛亦在寛恤應方鎮州府借使度支鹽鐵户部錢物斛斗經五年以上者並宜放免天下百姓人吏欠太和九年以前官錢斛斗家業蕩盡無可徴納囚繫囹圄動經嵗年者亦宜放免犴獄之重人命所懸將絶寃濫必資慎恤京城百司及畿甸見禁囚徒委中書門下差官䟽理無使寃濫輦轂之下法在肅清奸盗竊發理難容舍親仁坊今年五日賊依前委京兆府左右街使鳳翔邠涇金商同華等州切加捕逐如獲頭首准法科斷其餘支黨一切不問於戲唯此㓙災是彰菲徳情敢忘於罪已惠所貴於及人施令布和期於蘇息凡厥臣庶宜體朕懐主者施行開成三年正月二十四日賑救諸道水災徳音一作優恤水災諸州勅勅朕以寡徳臨御萬邦宵旰憂勤匪敢自暇然仁未及物誠不動天陰陽失和水潦為敗致兹災沴害及生靈江淮之間滁和尤甚當宁軫惕永言疚懐其淮南道滁和兩州應水損縣據所申奏漂溺人户處宜委本道觀察使與本州刺史子細檢勘全放今年秋税錢米仍以義倉斛斗逐便據户賑接一作救其浙西浙東宣歙鄂岳江西鄜坊山南東道並委觀察使與所在長吏據淹損田苖漂壊廬舍及蟲螟所損節級矜减指實奏聞如没溺甚處亦以義倉量事賑救一作賜其京兆府河南府所損縣即據頃畝依常例撿覆分數蠲减州縣牧宰各務撫安必令均濟稱朕意焉一作用稱朕意太和四年十月九日一作皆唐大詔令雨雪賑濟百姓徳音勅朕聞天聽自我人聽天視自我人視朕之菲徳渉道未明不能調序四時導迎和氣乃自去冬以來踰月雨雪寒氣尤甚頗傷天和念兹庶氓或罹凍餒無所假貸莫能自存宵寢一作中宵載懐旰食興嘆悚惕若厲在一作時余之辜思𢎞惠澤以順時令其天下犯死罪已下除官吏犯贓及故殺人者餘並特降從流流罪已下逓降一等應京兆府諸縣宜令以常平義倉斛斗量事賑濟仍先從貧下户給其京城内鰥寡孤獨不能自濟瘖聾跛躄窮無告者亦委京兆尹兩縣令量加賑恤訖具所破數聞奏躬一作湏自省閲務令均贍其諸道雨雪過多處亦委所在長吏量事優恤於戯天生蒸民君以牧之朕憂勤政經思致于理言念赤子視之如傷天或儆余示此隂沴撫躬夕惕余甚悼焉布告遐邇明悉一作知朕意太和六年正月十八日一作皆唐大詔令賑恤諸道遭旱百姓勅詔令作以旱賑救畿内諸道勅編制勅朕承上天之眷佑荷累舊唐書作列聖之丕圖宵旰兢唐書作憂勞不敢暇逸思致康又八年于今而水旱流行疾疢屢作唐書作疾疫作沴兆庶艱食札瘥相仍盖徳未動天誠非唐書作未感物一類失所有唐書作其過在予載懐罪已之心深軫納隍之歎宜敷惠澤式表憂勤如聞自去年以來河東闗輔亢旱為患秋稼不收百姓之中頗甚困窮八年詔令作人甚困窮今方春唐書作春作之時湏務農事唐書作農務又切若無詔令作不賑救恐至流亡其京兆河南河東河中等九州府宜賜粟五十六萬石京兆府賜粟十萬石河南府河中府絳州各賜粟七萬石同華陜虢晋等州各賜粟五萬石並以常平義倉及折糴斛斗充如無本色即與運米折給仍委本州府官長詔令作長吏明作等第差清强官吏對面宣賜先從貧下户起給其京兆府太和六年青苖𣙜酒錢在百姓腹内者並宜放免京兆河中河南同華陜虢晋絳等九州府自太和六年秋税以前諸色逋縣除所由車户已徴得外在百姓腹内者一切放免議獄恤刑前王攸重苟有寃滯即傷陽和應在城諸司諸軍諸使應有囚徒速宜疏理限七日處分訖奏聞河南府等八州府勅到後亦宜准此處分諸色工役非灼然交切者並勒停省應久旱處管内名山大川能致風雨者亦委長吏精誠禱請水旱之數雖云常理導化失節亦致咎灾顧惟寡昧敢忘克責常叅官及外府州長吏如有規諫者各上封事極言得失俟有主詔令作斥正期于阜安咸啟乃誠用致於理無或有隠以忝在公内外官有貪暴殘虐蠧政害人者憲詔令作臺司宜紏察聞奏朕為人父母䖍奉丕業夕惕若厲夙夜匪寜减膳撤縣庶答天誡咨爾長吏實分予憂勉加撫綏用副惻隠庶切救灾之義爰申為上之懐中外臣僚宜體朕意太和七年正月二十四日賑救諸道百姓徳音勅朕以寡徳託于兆人之上雖兢兢業業思理不怠而政道多闕和氣用傷仍嵗水旱黎人艱食為之父母斯心鬱陶如聞魏博六州阻飢尤甚野無青草道殣相望及山南東道陳許鄆曹濮淮南浙西等道皆困於飢疫慮乏種餉其魏博宜賜粟五萬石山南東道陳許鄆曹濮等三道各賜糙米三詔令作二萬石充賑給委度支逐便支遣仍各令本道據飢乏之處賑給淮南浙西兩道委長吏以常平義倉粟賑賜應諸道有飢疫處除出軍糧積蓄之外其屬度支户部斛斗詔令作雜榖並令减價出糶以濟貧人其有牧宰非才貪殘為害及承前積弊湏有條流或寃獄留滯速宜疏决者並委觀察使紏察詳訪具狀聞奏用彌天𤯝以副朕焦勞之慮焉太和九年三月二十二日賑恤江淮遭水旱疾疫百姓徳音編制門下朕以寡昧嗣守睿圖奉列聖之丕訓撫寕四海受一作膺上天之景命司牧兆人敢忘勵志勤身䖍恭寅畏雖動思罪已而隂陽屢愆每念惠人而烝黎尚困是由政教無素王澤不流精誠未達於𤣥穹災沴遂痡於下土是用中宵輟寐未明求衣言念及此良深愧惕近者江淮數道因之以水旱加之以疾癘流亡轉徙十室九空為人父母寜不震悼此乃天之垂誡咎實在予焚灼于懐夙夜增懼當宁興歎遂命使臣乗驛撫廵便宜救恤减上供饋運發諸道倉儲免積嵗之逋租蠲逐年之常貢尚思災疫之後閭里未安湏更申明用示憂軫應揚潤廬夀滁和宣楚濠泗光宿等州其間或貞元以來舊欠逃移後闕額錢物均攤見在人户頻年災荒無可徴納宜特放三年待稍完復却即令依一作仍舊或逋懸錢物斛斗數内先已放免度支却徴收者宜委本司細詳元勅磨勘如合放免不得追徴或先因水旱賑貸欠常平義倉斛斗若終不可徴收亦宜放免或今年合徴兩税錢物量百姓疾疫處各委逐州凖分數於上供留州留使三色錢内均攤放免或收管諸色逋懸錢物等年月深逺但掛簿書空務追徴益生勞擾宜委有司速勘㑹了絶蠲放不得留為應在以資奸蠧之徒其濠泗宿三州大中六年以前所在逋懸宜亦放免或以常平義倉斛斗賑恤者宜委本司收破其賑貸者即待秋熟填納其所减上供運米及州縣諸色斛斗等已令减價糶貸救接百姓用止翔貴以濟周貧或每年進奉茜草藥物紵練貢布等亦宜條流節級停减已前諸色應蠲免節目等或已行勅令或見勒條流並委中書門下各令本州及本司速准此處分仍具各分析聞奏所有諸道放免事例宜委州縣於郷村要路一一榜示遍令閭閻分明知悉又以數道疾疫百姓流亡永言宵旰之勤豈務珍華之貢其淮南宣歙浙西三道今年賀冬及來年賀正所進奉金銀錢帛宜特放免均融仍各委本道觀察使據所放均融貸貧下户填納税祖其逃亡户如賑恤使有所不該者亦以此便宜濟助務令蘇息又江淮數州水旱相繼安南一境冦擾初寜公用之間必常虚竭但縁及時錫賚湏遣使臣其淮南宣潤安南等四道今年冬衣使本道合與常例人事物等亦宜權停於戲天災流行自古未免屬在牧宰為吾撫安豈無惠育之方以濟凋殘之弊如或守法不謹吏縁為奸紀律乖訛刑罰一作法踰濫重繫者因循不省逮捕者追擾滋多或征賦不均或徴科無筭有一於此重困吾人即何以消弭灾譴用康疲瘵宜委所在長吏愼恤刑獄疏决囚徒必務躬親俾無寃滯檢轄暴吏懲殿慢官寛常賦之征罷不急之務詳求利病悉以奏陳顒佇良規用副憂寄苟不遵詔㫖尚務侵欺必正刑書義無容貸宣示中外宜諒予懐主者施行大中九年七月十三日一作皆唐大詔令文苑英華巻四百三十六
