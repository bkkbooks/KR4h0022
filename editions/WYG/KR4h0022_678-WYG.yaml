body:
  text: 文苑英華巻六百七十九宋李昉等編贈答下上權侍郎書一首荅獨孤秀才書一首請符載書一首謝李巽常侍書一首李巽再請書一首再荅李巽書一首李巽又請書一首又荅李巽書一首寄南海王尚書書一首荅澤潞王尚書書一首寄贈于尚書書一首與崔羣書一首文章上與李那書一首李那荅書一首荅李顒之書一首上隋髙祖革文華書一首上權侍郎書獨孤郁載權徳輿集貞元十三年八月日獨孤郁謹上書于舎人三兄閣下郁以世舊遂獲謁文粹有見字叙故人文粹權集並無人字大賢之遇郁也亦不以常交言之際文粹無此字眷意甚露郁𤨏𤨏鬱堙三年無聞摧頽折羽而不喜者非失意之謂非尤人之謂蓋將因事自罪而不喜也借如豫章生於臃腫小木之中樵蘇見之亦以嗟矣一有不嗟則必自與擁腫者亦不多逺也一作矣珠璣混權集作隠文粹作雜一本作産於礫石之中童子弄之亦以驚矣一有不驚則必自與礫石者亦不多逺也一作矣鏌鎁卧於鉛鈍之下文粹作中良文粹作下工覩之固亦知矣一有不知則必自與鉛鈍者亦不多逺也權集作矣毛嬙後於宿瘤而行有目者覩之固即分矣一有不分則必自與宿瘤者亦不多逺也權集作矣茍與乎擁腫礫石鉛鈍宿瘤果無文粹權集並作輩果殊異則不能移凡眼所擇况遇者文粹作逃乎良工巧冶有識文粹有者字之目哉今禮部侍郎之目固亦國之良工巧冶有識者之目也於中再擇再不中是直文粹作真已為臃腫礫石鉛鈍宿瘤矣何止與其文粹作斯不逺哉此所以因事自罪而不喜也或諭之曰今文粹有子字之道尚光子之所以不振者晦遏文粹作遇也子之道豐蔀也子且真有崪天之材而隠植之有照乗之珍而宻櫝之有切玉之利而謹橈如招切劒衣也之有傾都之艷而深帷之雖使離婁左執光而右拭背廹而索之固亦不能知子文粹無子字矣子集無子字何不移植露光披鋒示貌使識者覩文粹有之字而駭之彼之所誨固亦郁所不能焉已必不材也必不寳也必不利也必不姝也且遍過於有識者之目是自揚其短也已必材也必寳也必利也必姝也雖小示其光鋒幹貌於一人驚我亦已多矣所不驚者是子文粹作予四事果不足異於族凡也郁病直拙獨大賢於郁分殊尚不能以亟况悠悠者歟郁常行乎時輩之間多酌其言語善者鄙者而自减盈消息其言權集作㫖稍有可驚不敢不於許言者言之今之後學者或歎曰吁後學何二字權集作來烏乎所歸哉此且非宜長者所當聞也亦非宜長者所不當聞也今朝廷先逹病在不能公也或能公而不能甚文粹作為力也覽其文則贊美積文粹作稱嗟無不至也其間善惡輕重進退則心以别矣此其所以為不能公也鮮有知其必善而風鼔之不啻若自其口出此其所以為公不能甚力致使文粹無使字遑遑之倫其下才者亦曰今夫在位者其無公歟其無心文粹作公歟有一善未嘗肯稱也意曰非我事也又慮與之談者不與我符愛也權集無也字是使諸子竊竊然自以無聞為不辱一作欲遂相與擇㨗趨邪紛屯於主司之跡親者茍能致譽則不詰其所以致譽者之賢不肖而曹趨之矣此實今之躁進茍得之風也在朝廷大賢主而名之驅而正之於其善者扶之摇文粹作持之有善而未具者决之導之使四方學士知嚮方焉何如其曰非我事也若使一人曰非我事也十人曰非我事也舉朝廷皆曰非我事也茍非我事則無所不非我事無所不非我事則天地之間無乃已寂寥乎昔孔子飾詩書禮樂以化齊弟子而至天下使孔子亦曰非我事也則今者集作也安盡聞夫七十子之賢詩書禮樂之盛七十子亦曰非我事也又孰為播孔子之聖如此其大乎今文亦如是朝廷先逹亦如是後之逹者亦如是若文粹作等不相播則人文禮義知己復徃之道不幾乎息乎文粹作矣郁不肖辱承大賢之心深矣非又敢以假喻自薦也意欲以大賢擇衆賢如七十子之徒是亦方孔子於大賢也何如自意欲至何如二十五字文粹作意欲以大賢擇衆賢而使七十子之徒亦方孔子於大賢也何如不宣郁再拜答獨孤秀才書權徳輿損四日書問兼示新文閎博峻異有立言致逺之旨焉其於惠愛纎悉厚重甚善甚善以吾子才志與年三者皆當以家文粹作嘉聲自振若建瓴文粹有决字水大冶良工必有不蘄文粹作期至而至者况以日日新又日新之盛哉夫豫章珠璣鏌鎁毛嬙終不慮隠之櫝之襓之帷之之為患而為臃腫礫石鉛鈍宿瘤之排蔽但發有疾徐耳來問云一人驚之亦已多矣豈與族凡校耶此誠得之又云先逹病不能公或公而不能甚力文粹作病其無力今夫滔滔者或辨之不至而茍善待之及揚聲延譽則鉗口結舌大凡舉世之病也如鄙夫者直力不足耳亦懼招徠奔走為津為岐至有竊所愛者則寡矣又豈能廢事也從古未逹者之望逹者何嘗不如是耶先師七十子所擬豈敢當也三復戁然無言喻懐其他慕重續候㑹話徳輿頓首請符載書李巽數月不面延企為勞夏首漸熱惟動履安勝巽弊屑推遣昨者不揆薄劣輙上薦賢之書恩命拜足下太常寺奉禮郎充南昌軍副使官告已到惟增感慶巽不任忻愜足下義髙徳茂文操一作藻特秀棲遲衡茅之下籍甚寰海之内信儒者之徽猷聖朝之公器而𤣥纁束帛偶未至者蓋匡阜則邇符君甚逺巽謬臨此地間接清風激揚多矣向非章疏上逹則麟足無由絆然奉常之拜亦吾子他日九層之資也但以俯倅吾輩為執事者之累幸當猥降允副夙誠冀即傾展差浣勤矣謹差押衙任進朝奉侍官人馬馳狀進一作奉迎謝李巽常侍書符載某官任進朝至猥賜書札并官告衣服鞍馬等開緘之後伏知常侍不以載懦劣無取飛章上聞䝉授太常寺奉禮郎充南昌軍副使者此所謂天子厚澤下潤林泉諸侯盛禮曲霑固陋斯惟腆薄何緣如是五内慙愧彷徨失從某弱年不自揆妄植强操祖尚名節嘗以為靜既砥礪以修道動即功徳以被世故棲遲不進垂二十年雖跡在丘壑而心非長徃且山木之挺者憂良匠之不來室女之容者憂士夫之不娶某雖孱愚材貌俱微實求知音為之投誠一昨候謁盛府禮數優貸降大人之嚴重涵小生之濶畧顧問采色若有所注居未經時榮命果來變枯槁為美粹易荷衣一作蕙為簪組起締構於平地生翼羽於雛鷇鴻漸之兆始於兹辰與夫尋常感恩不同日而語也誠宜掩山扉别巖松扶策病憊祗赴所職伏以歸山之日嘗於甘子堂中輙以私志上廣一作塵視聽嘗恐道有所未立學有所未周遭值引遇速貽敗累實欲姑務斂退以備見聞况江西為藩鎮之雄常侍負伊咎之資署置賔佐四方傾耳或主客懸絶祗取笑焉故嚮風斂手不敢上道又某童孺酷嗜山水建中初與友生數人自岷蜀結心匡廬貽至甚病困無以贍給偶獲一地蓬陋翳薈茍取便易未遑變合一作更含憤不快如病毒螫近者江州李使君以俸錢四萬為某買山號三澗峯在二林之右孤巖絶壑匡廬之左壊褐破袍一作飢懐渇袍沛然滿篋方將面雲舉構草堂咏歌堯舜綢繆松柏一作桂報償昔年之志而去是有始而無卒有胷而無心必當為谿猿谷鳥側目相視豈止於林慙澗恥而已哉伏惟閣下道極上才之美政布中和之化昭昭徳禮攬接士庶凡在草木尚獲暢逹區區鄙素冀見察納某幼小淪賤胄緒逶迤糟心服道年甫强仕比為四海之諸侯屬意亦勤矣禮則甚厚實未隨之今常侍不問賢否事出沉斷恩寵忽至門户有光銜涕感激不知所措則自兹日至于沒地出於閣下門闌矣菲薄之質已為閣下從事矣夫如是雖千里之外猶趨奉左右也伏計至公大人雅量如淵當見其遐逺樹名異日豈以一召違命遂賜重乎鄙人時此敢存俯仰既乞守蓬蓽未獲奔走其官告人馬輩謹並使還府乆處荒野詞意疎蕪干犯尊嚴但增惶恐狂狷幸甚幸甚再請書李巽使至奉覽來疏何乃華其詞潔其志未酬所獻壹至於是區區之意竊有所未然足下之所然也夫洪鐘遇扣大小必應良劍赴剸泥玉一切知已許與有類於斯細詳足下之旨徒仰矯榮命俯稽誠禮其所難者但慮側猿鳥之目咽澗泉之溜何嘗以阻鄙夫之誠為念辱衆君子之望為意乎且足下之守儒行也亦嘗聞尼父以司冦為汙已俾升堂者細百里而不宰乎然丈夫立身之本正在執徳義樹功業而已今足下徳義已著而功業未樹其在忽歲月而貪疎曠時至而不行也以足下才徳之美僕素髙山仰之豈不能薦足下於朝立可觀之地矯翼霄漢躍鱗清流以成雅志哉意之所趣輙有所在方今聖主聰明春秋鼎盛百王術内六合掌中而近郊跋扈尚或乖化夫主憂臣辱抑所忿憤故僕私心期足下於逺圖大計耳謹當虚心假寐洒掃庭舘奉候而已且今之惠然猶徃之見辱無屑意也屬簡書有畏不果躬詣所居幸垂見悉答書符載今月二十一日謹遣家人楚山專奉狀伏計已逹任押衙至猥賜書示并官告衣服等戴荷之至無任下情孟夏漸熱云云即日某侍奉外䝉恩常侍開長者之懐以國士見遇拔自蓬蓽署職拜官手疏纒綿出於濬發古人云屈於不知已而伸於知己今常侍知我實獲死所捧讀之次涕激肝心假如時命不偶溘死朝露平生志氣已無所恨若齒髮猶壯前途未失即立二字疑之忿庶幾賢逹故前啓求息山林更自磨礪報荅之分正在此矣伏惟曲賜鑒察免貽聽瑩幸甚幸甚其官告衣服鞍馬等欲留告身為與職名相聨欲留白衣又與公服同對捨一取一竊未合度謹令並却附上伏惟委曲鑒照下情懇望第三書李巽再馳狀皆損還答承抗跡未降虚懐猶鬱足下有器業可以資時松筠之質有異蒲柳然白駒驟過良時易晩昔夫子從政亦不待韋編三絶况僕虚薄忝承朝寄懼於覆壓寤寐良賢實冀推明道徳俾助薄劣故延仰之誠有加常旨敢更誠請所望虚副幸甚諸已再具故不煩云謹差散將葉公著敬候并官告衣服僕馬等延首北睇以得為榮惟垂昭省不宣李巽重簡答書符載專使孟温朝至再䝉示及招誘誨喻激切倍劇前書之賜議者云得地千里不如一士閣下以泰山之髙就蟻蛭之卑損折威重一至於此是何節士義夫之不投心服體是何藩臣方伯之不師謙降禮是何澆風弊俗之不易邪蹈正是何奸臣賊子之不悛暴畏義君子動氣小人抃手熙熙相賀如見中古如載之不肖猶夫人也常侍之引遇也如是况今有賢於載者乎是知劇辛趙徃鄒衍齊來抑有以也夫丈夫處世誠宜種道徳樹勲績頺年急節慨如不及然才短而好進者敗謀人而不審己者危三尺童子明詳斯㫖伏覽書示閣下又許與過以逺圖伏計俯示鄙人實恐孤負聰明視聽失所以鉛刀為重器以散木為良材反覆思量益用慚惕是以前後懃懇少求退息欲磨鈍使利拂昏冀明蹄涔之内灌㵼涓滴料新營山居松桂未盈尺圬墁未快乾即閣下已在鳳池矣此不揆懦劣敢希提擕助君治國禆補萬一若素尚飽滿耳某昧於機要識且迂疎敢恃深知累竭肺腑儻允遂鄙志從容林壑野人之誠也敢不歡愉以受賜或固使愚陋周旋幕府諸侯之禮也敢不恭敬以俟命此進退之分繫於主不繫於客也意有䖍切不覺費詞伏惟再垂覽察幸甚幸甚寄南海王尚書書尚書以雄才盛業作鎮南服紆精誠之處疑答天子之寄百越乂清幕士燦然甚善甚善公昔典九江載在匡廬被以淳仁扇以清風中林逋客安樂無横至於敞南軒之勝開北樓之讌纒綿罇斚操觚發詠者可勝言哉爾後榮遷亞尹承江陵之歡好超拜容府展襄陽之慶荷違奉尊嚴不十數年伏以英姿奮登雲霄光華富貴烜赫當世某今藏遁山丘作老書生江湖重阻禮數間絶尚書或眇不寘慮即小子旦暮敢不馳心於旌㦸耶一昨徑理扁舟逺離潯陽不畏道路時伸賀禮屬船隘熱劇飲食江水度廬陵百餘里防䕶無術痁疾動作藥物荒乏鄰於委踣以今月十八日逹南康使醫工診視了未蠲愈自揣氣力不任支持遂祈戎使君致健步持短書并備舊文緘結敬獻閣下運動不偶嬰此疾瘵志意莫申端緒未展然不獲覩節旄之重挹政化之光仰首嚮風愁惋盈膺伏計宣逹聰明悉善下賢幸甚幸甚三月中馮翊嚴謩至山居道楊秀才衡擕挈口累歸心大府此人氣性岐嶷有縱横之才未遭知己乆見堙壓加以蹖一作舛駮聲音不振如鴛雛鎩翮瞻雲興歎况曩昔承歡厚薄齊同一旦流離棲身失圖北逰不可立家無路伏惟尚書大厦𢎞厰能不以蓋覆為意乎伏枕陳露兢惶展轉不宣某再拜答澤潞王尚書書某有舊故為南康郡太守今年夏五月徃逰其門至冬十月歸山下遂於江州盧使君處伏奉書問并覩押衙盧從史所留示委曲重詞異禮一何特逹捧讀慙恐若無憑依伏惟尚書忠厚淳粹發於大造靈姿傑立長材卓然以社稷為生死以勲庸為倚任義感生於慷慨聞望歸於徳禮屬思宏邁逺蹤前人由是天子以山東之利兵廣土授之使長於諸侯蓋有以也夫翊王公之美者莫如賢贊策畫之利者莫如才延納優劣不啻十一作千百如某者一蓬蓽士也癡緩樸訥無可採擇性嗜閒退不求聲利頃在山林中飲泉斸藥保養性命時運不適即覽閱六籍或持竿釣魚以此竟歲人世機事視之懵然不悟髙明横加鄙夫手疏襟素不師文字是所謂嘗蘇草一作蒿蘇而掇蘭蕙簸礫石而揀􅅛璧欲自隗始為天下士君子之先伏知異日截犬戎壹宇宙拯民戴主在此志也念兹菲薄無用禆補况且多病形憊氣衰不任策使實貽敗累未獲趨拜謝恩鈴閣又南歸日晩酬答稽疎瞻望旌麾惶灼無次古人有感一言重一顧期於隕越請報國士即小子平生之㫖豈無是耶伏惟開懐察納不記疵恡幸甚幸甚不宣某再拜寄贈于尚書書朱校書至猥辱書問并示孟處士碑篆端由捧讀彌日忭躍無次夫旌善人採遺美蓋有位君子之所行志豈伊薄劣敢議發揮言輕賜重益用惶駭又於朱校書處恭覩製作約數十篇髙格侔山嶽迅勢擬波濤邁氣薄雲霄逺思躡鴛鴻當世翰墨都無此手臟腑怳怳至今悸動斯可謂煥乎文章也一昨奉辭伐罪統貔虎之師沉謀偉畧洞入神鬼以鎮則有制以戰則有威巍巍赫赫聲振寰海斯可謂盛乎武事也文武吉甫佐天子贊襄使姦臣賊子無萌芽於禍亂者我尚書之謂矣小人君子咸知幸甚某一凡夫也棲遁匡廬垂二十年讀書不及於竪儒把筆纔過於常談冺冺人世鄰乎强仕斯亦不足畏也然徒有愚妄之意愛大名慕大節懸芳竹帛為千古榮懃懃懇懇正為此耳小子聆閣下之事業英姿豪韻迥如古人私心歡喜動作顛沛况前旨稠叠猥賜誘喻令一至峴首一作山追賞風景一作光小生何人當此珍重誠宜奔走拜伏旌麾間識征南之儀觀揖當陽之談話凝襟滯想從兹泄露屬入夏多病氣力衰羸火雲始生道路且逺瞻仰尊重魂爽飄然若望溟海未知濟涉如此誠激何緣上逹唯有簡牘可寄肺腸今故特差祗舎人吕及自潯陽専徃奉狀塵獻鈴閣伏惟鑒察愚朴不責狂瞽幸甚幸甚候問起居之禮謹俟異日此無多談與崔羣書韓愈自足下離東都凡兩度枉問尋承已逹宣州主人仁賢同列皆君子雖抱覊旅之念亦且可以度日無入而不自得樂天知命者固前修之所以禦外物者也况足下度越此等百千輩豈以出處逺近累其靈臺耶宣州雖稱清涼髙爽然皆大江之南風土不並以北將息之道當先理其心心閒無事然後外患不入風氣所宜可以審備小小者亦當自不至矣足下之賢雖在窮約猶能不改其樂况地至近官榮祿厚親愛盡在左右者耶所以如此云云者以為足下賢者宜在上位託於幕府則不為得其所是以及之乃相親重之道耳非所以待足下者集無者字也僕自少至今從事於徃還朋友間一十七年矣日月不為不久所與交徃相識者千百人非不多其相與如骨肉兄弟者亦宜集作且不少或以事同或以義取或慕其一善或以其乆故或初不甚知而與之已宻其後無大惡因不復决捨或其人雖不皆入於善而於己已厚雖欲悔之亦不可得三字集作可乎凡諸一作此淺者固不足道深者止如此至於心所仰服集作伏考之言集作百行而無瑕尤窺之閫奥而不見畛域明白淳粹輝光日新者唯吾崔君一人僕愚陋無所知曉然聖人之書無所不讀其精粗巨細出入明晦雖不盡識抑不可謂不渉其流者也以此而推之以此而度之誠知足下出羣拔萃無謂僕從何而得之也與足下情義寧須言而後自明耶所以言者懼足下以為吾所與深者多不置白黑於胸中耳既謂能粗知足下而復懼足下之不我知亦過也比亦有人說足下誠盡善盡美抑猶有可疑者僕謂之曰何疑疑者曰君子當有所好惡好惡不可不明如清河者人無賢愚無不說其善服其為人以是而疑之耳僕應之曰鳳凰芝草賢愚皆以為美瑞青天白日奴𨽻亦知其清明譬之於食物至於遐方異味則有嗜者有不嗜者至於稻也粱也鱠集作膾也肉也豈聞有不嗜者哉疑者乃解解不解於吾崔君無所損益也自古賢者少不肖者多自省事以集作已來又見賢者恒不遇不賢者比肩青紫賢者恒無以自存不賢者志滿氣得賢者雖得卑位則旋而死不賢者或至眉夀不知造物者意竟如何無乃所好惡與人異心哉又不知無乃都不省記任其死生夀夭耶未可知也人固有薄卿相之官千乗之位而甘陋巷菜羮者同是人也猶有好惡如此之異者况天之與人當必異其所好惡無疑也合於天而乖於人何害况又時有兼得者耶崔君無怠崔君無怠杭蜀集本並作崔君崔君無怠無怠僕無以自全活者從一官於此轉困窮甚思自放於伊潁之集作水上當亦終得之近者尤衰憊左車第二牙無故摇動脫去目視昏花尋常間便不分人顔色兩鬂半白頭髮五分亦白其一鬚亦有一莖兩莖白者僕家不幸諸父諸兄皆康强早世如僕者又可以圖於乆長哉以此怱怱思與足下相見一道其懐小兒女滿眼前六字集作兒女滿前不能顧念足下何由得歸北來僕不樂江南官滿便終老嵩山下足下可相就僕不可去矣珍重自愛慎飲食少思慮唯此之望愈再拜文章上與李那書徐陵籍甚清徽常懐虚眷山川緬邈河渭像於經星顧望風流長安逺於期日青要一作葽詩四月秀葽漢書禮樂志蘴草葽皆草也淮南子青女降霜疑用此章戒節白露為霜君子惟宜福履多愈雍容廊廟獻納便繁一作蕃留使催書駐馬成檄車騎將軍賔客盈座丞相長史瞻對有勞脫惠箋繒慰其翹想吾栖遲茂陵之下卧病漳水之濱廹以崦嵫難為砭藥平生壯意竊愛篇章忽覿髙文載懐勞佇此後殷儀同至止王人授館用阻班荆常在公筵敬祈名作獲殷公所借陪駕纔南入重陽閤一作閣詩及荆州大乗寺宜陽石像碑四首鏗鏘並奏能驚趙鞅之魂輝煥相華時瞬安豐之眼山澤晻靄松竹參差若見三􅉄之峯依然四皓之廟甘泉鹵簿盡一作備在清文扶風輦路悉陳華簡昔魏武虚悵韓王故臺自古文人皆為詞賦未有登兹舊閣歎兹幽宫標句清新發言哀斷豈止悲聞帝瑟泣望羊碑一詠歌梁之言便掩盈懐之淚至如披文相質意致縱横才壯風雲義深淵海方今二乗斯悟同免化誠疑作城六道知歸皆踰大一作火宅宜陽縣名之作特㑹幽衿所覩黄絹之詞彌懐白雲之頌但恨賒逺二字一作耆閣逺嶽擅特髙峯開上羅浮康公懸溜不獲銘兹雅頌耀彼幽巖循環疑缺二字用忘飢渇握之不置恒如趙璧翫之不足同於玉枕京師長者好事才人爭造蓬門請觀髙製軒車滿路如看太學之碑街巷相填無異華隂之市但豐城兩劒尚不阻來韓子雙環必希皆見莫不以好龍無别木鴈可嗤載望瓊瑶因乏行李金風已勁玉質宜調書不盡言但聞爻繫徐陵頓首答書李那繁霜應管能響豐山之鐘𤣥雲觸石又動流泉之奏矧伊物候且或㝠符况乃衿期相忘道術楚齊風馬吳㑹浮雲行李無因音塵不嗣殷御正銜命來歸嘉言累禮江南橘茂薊北桑枯隂慘陽舒行止多福足下泰山竹箭浙水明珠海内風流江南獨步扶風計吏議折祥禽平陵李㢘辦詶文約况復麗藻星鋪雕文錦縟風雲景物義盡緣情經綸憲章辭殫表奏久以京師紙貴天下家藏調移齊右之音韻改河西之俗豈直揚雲藻翰獨留千金嗣宗文雅唯傳好事僕世傳經術才謝劉歆家有賜書學匪班嗣弱年有意頻愛雕蟲歲月三餘無忘肄業户牖之間時安筆硯嚬眉難巧學步非工恒經枚孺之譏屢被陳思之誚羞逢仲子類居山之鼓琴屢見子將同本初之車服不謂殷侯虚談成價遂同布鼓輕嚮雷門燕石空雕終慙比徳楚軍雖拂實愧棲桐豈若邯郸舉袖唯聞變曲協律飛塵必應不顧是以日南寳貝遥望歸秦合浦文犀更希還漢芳春行獻鸎其鳴矣懸豫章之床置長安之驛厚築墻垣思逢鄭僑之聘工歌周頌佇奏延陵之樂書繒有復道意無伸李那頓首答李顒之書徐陵近謬枉清音無申窮眷忽辱來告文製兼美君山西盛族素挺風流河北辭林一作人本所嗟賞子桓虚座寧不敬期伯喈倒屣固以相屬一日復其草土思弊衣裾披素清顔但覺形穢公輔之量不負髙名王佐之才信表天骨孺子之榻雖其可懸仲康之車彌軫恒眷孤子皆緣素乏叨簉皇華今日形容無闗天壤殘光炯炯慮在昏明餘息綿綿待盡鐘漏安可以樹揚名士遊處盛賔來喻泰髙如為善謔文艷質寡何似上林華而不實將同桂樹但忘年之欵昔有張裴一作華鄰國之交非無嬰札儻哀駘可恱甕盎非疑方願投衿庶比傾蓋頃陳陽之疾歲月增深羊祜之痾秋冬彌劇且年光遒盡觸面崩心扶力含毫諸不申具孤子徐陵頓首白上隋髙祖革文華書李諤臣聞古先哲王之化民也必變其視聽防其嗜慾塞其邪放之心導一作示以淳和之路五教六行為訓民北史作人之本詩書禮易為道義之門故能家復孝慈人知禮讓正俗訓風莫大於此其有上書獻賦制誄鐫銘皆以褒徳序賢明勲證理茍非懲勸義不徒然降及後代風教漸薄一作落魏之三祖更向文詞忽君人之大道好雕蟲之小藝下民一作之從上有同影響争一作競騁文華遂成風俗江左齊梁其弊彌甚貴賤賢愚唯務吟詠遂復遺理存異尋虚逐微競一韻之竒争一字之巧連篇累牘不出月露之形積案盈箱唯是風雲之狀世俗以此相髙朝廷據兹取一作擢士祿利之路既開愛向之情愈篤於是閭里童昏貴逰總丱未窺六甲先製五言至如羲皇舜禹之典伊傅周孔之說不復闗心何曾入耳以傲誕為清虚以緣情為勲業一作績指儒素為古拙用詞賦為君子故文筆日繁其政日亂良由棄大聖之軌模構無用以為用也捐本逐末流遍天一作華壤逓相師祖乆而逾一作愈扇及皇一作大隋受命聖道聿興屏黜輕浮北史作浮詞遏止華偽自非懐經抱質志道依仁不得引預縉紳參厠纓冕開皇四年普詔天下公私文翰並宜實錄其年九月泗州刺史司馬幼之文表華豔付所司治北史作推罪自是公卿大臣咸知正路北史作道莫不鑽仰墳素棄絶華綺擇先王之令典行大道於兹世如聞外州逺縣仍踵弊風選吏舉人未遵典則宗族稱孝鄉里歸仁學必典謨交不茍合則擯落私門不加收齒其學不稽古逐俗隨時作輕薄之篇章結朋黨而求譽則選充吏軄舉送天朝蓋由縣令刺史未行風教猶挾私情不存公道臣既忝憲司軄當紏察若聞風即效恐挂網者多請勒有司普加搜訪有如此者具狀送臺一作皆隋書本傳文苑英華巻六百七十九
