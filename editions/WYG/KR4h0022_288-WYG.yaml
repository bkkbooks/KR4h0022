body:
  text: 文苑英華巻二百八十八宋李昉等編留别三釋靈一三首釋䕶國一首釋法震一首釋皎然一首楊衡三首歐陽詹二首韓愈二首孟郊四首張籍四首白居易三首姚合一首于武陵一首盧肇一首賈島六首朱慶餘一首釋無可一首周賀二首温庭筠三首許渾四首項斯一首顧非熊一首馬戴八首趙嘏五首喻坦之一首陳陶四首鄭谷四首杜荀鶴四首張喬一首張蠙二首羅隠二首留别忠州故人釋靈一一身無定處萬里獨銷魂芳草迷歸路春流滴淚痕㡬時休旅食何夜宿江村欲識相思苦空山啼暮猿贈别皇甫曽前人幽人從逺岳過客愛春山高駕能相送孤遊且未還紫苔封井石緑竹映柴關若到雲峯外齊心去住間歸岑山留别前人禪客無心憶薜蘿自然行徑向山多知君欲問人間事始與浮雲共一過别盛安釋䕶國情人取次㡬淹留别後南州與北州月色為憐今夜客砧聲却似去年秋欲除豺虎論三畧莫對雲山詠四愁親故相逄且借問古來無種是王侯别盧使君歸故栅村釋法震歸風白馬引嘶聲落日猶堪楚客情塞口竹縁空戍沒潮頭沙擁慢岡成松田且欲親耕種郡守何偏問姓名東道宿程投故栅依依漁父解相迎别山并序釋皎然時因主人寄風溪蘭若與道士石脇風相隣禪僧仙師時得道㑹至秋中值外縁有請别山懐舊遂有是詩山翁亦好禪借我風溪樹採藥多秋蓬汲泉有春渡幽僧時相遇仙子或與晤自許戰勝心彌高獨遊歩如何區中事奪我林棲趣辭山下復上戀石行仍顧宿昔情或乖庻㡬跡無誤松聲莫相誚此心冥去住桂州與陳羽念别楊衡慘戚損志抱因君時解顔重歎今夕念復在㡬夕間碧桂水連海蒼梧雲滿山茫茫從此去何路入秦闗夷陵郡内叙别前人禮娶嗣明徳同牢夙所欽況䝉生死契豈顧蓬蒿心鴈幣任野薄恩愛縁義深同聲若鼓瑟合韻似鳴琴将迓空未立就贅意難任皎月託言誓滄波信浮沈荆臺理晨轍巫渚疑宵􅁭憫憫百慮起回回萬恨深侯更促徒侣先曉徹夜禽燈彩凝寒風蟬思噪宻林留念同心帯贈逺芙蓉簮撫懐極投漆感物重黄金分鸞豈遐阻别劍念相尋儻甘蓬户賤願俟故山岑將之荆州南與張伯岡馬總鍾陵夜别前人荆臺别路長宻緒分離狀莫訴杯來促更籌屢己唱燭花侵霧暗瑟調含風亮詎念曉帆開黙睇參差浪蜀中將歸留辭韓相公歐陽詹寧體則雲構方前恒玉食貧居豈及此要自懐歸憶在夢關山逺如流嵗華逼明晨首鄉路迢逓孤飛翼江夏留别華二集作别辛三十時自襄陽同舟而下予歸關從此赴舉前人彌棹己傷别不堪離緒催十年一心人千里同舟來鄉路我集作予尚遥客逰集作程君未回將何慰兩端未免集作互勉臨岐杯醉中留别裏州李相公韓愈濁水汙泥清路塵還曽同制掌絲綸眼穿長訝雙魚斷耳熱何辭數爵頻銀燭未銷忩送曙金􅁫半醉一作墜座添春知公不久歸鈞軸應許閒官寄病身此詩二百五十七巻重出今已削去注異同為一作韶州留别張使君前人來往再逢梅栁新别離一醉綺羅春久欽江總文才妙自嘆虞翻骨相屯鳴笛急吹催落日清歌緩送感行人己知奏課當徵拜那復淹留詠白蘋汴州留别韓愈孟郊不飲濁水瀾空滯此汴河坐見繞岸水盡為還海波四時不在家敝服斷線多逺客獨顦顇春英各婆娑荒陂集作汴水饒曲流野桑無直柯但為君子心歎息將匪他下第東歸留别長安知已前人共照日月影獨為愁思人豈知鶗鴂鳴瑶草不得春一片兩片雲千里萬里身雲歸嵩之陽身寄江之濱棄置復何道楚情吟白蘋長安留别李觀韓愈因獻張徐州前人富别愁在顔貧别病銷骨懶磨舊銅鏡畏見新白髪古樹春無花子規啼有血離絃不堪聴一聴三四裂集作四五絶世途非一險俗慮有文粹作各千結有客步大方驅車獨迷轍故人韓與李逸翰雙皎潔哀我摧折歸贈詞縱横設徐方國東樞元戎天下傑禰生投刺遊王粲吟詩謁高情無遺照朗抱開曉月有土不埋寃有讐皆為雪願為直草木永向君地列願為古琴瑟永向君聴發欲識丈夫心曽將寶集作孤劍說怨别前人一别一回老志士髪白早在富易為容居貧難自好沈憂損性靈服藥亦枯槁秋風客集作遊子衣落日行逺道問君去何之賤身寧集作難自保襄州集作國别友張籍晩集作曉色荒城下相看秋草時獨遊無定計不欲道歸集作來期别處去家逺愁來集作中驅馬遲歸人渡烟水葉落集作遥映野棠枝春日留别前人遊人欲别離醉復看花枝看却春又晩莫輕年少時臨行記分處回首是相思各向天涯去重來未有一作可期留别江陵王少府前人迢迢山上路病客獨行遲況此分襟日一作手處當君失意時寒林露逺驛晩燒過荒陂别後空回首相逢未有期蘇州江岸留别樂天前人銀泥裙映錦障泥畫舸停橈馬簇蹄清管曲終鸚鵡語紅旂影動驌驦嘶漸消酒色朱顔淺欲語離情翠黛低莫忘使君吟詠處汝墳湖北武丘西郢州别王七使君白居易昔日詩狂客今為酒病夫强吟翻悵望縱醉不歡娛鬢髪三分白交親一半無郢城君莫歇猶較近京都别韋薊前人百年愁裏過萬感醉中來惆悵城西别愁眉兩不開留别㣲之前人干時乆與夲心違悟道深知前事非猶厭勞形辭郡印那能趂伴著朝衣五千言裏教知足三百篇中勸式㣲少室雲邉伊水畔比君較老合先歸别友人姚合病僮將瘦馬難筭徃來程野寺僧相送河橋酒滯行足愁無道性乆客㑹人情何計羇集作窮貧盡同居不出城夜與故人别于武陵白日去難駐故人非舊容今宵一别後何處更相逄過楚水千里到秦山萬集作㡬重話一作語來天未一作又曉月落滿城鐘别宜春赴舉盧肇秋天草木正蕭踈西望秦關别舊居筵上芳罇今日酒篋中黄巻古人書辭鄉且伴集作離山且作銜蘆鴈入海終為戴角魚長短九霄飛直上不教毛羽落空虗留别徐明府賈島抱琴非夲意生事偶相縈口尚袁安節身無子賤名地寒春雪盛山淺夕風輕百戰餘荒野千夫漸耦耕一杯宜獨夜孤客戀交情明日疲驂去蕭條過古城二月晦留别鄠中友人前人匹馬桞花裏别君當酒酣春風漸向北雪鴈不飛南明曉日􅀄一今年月已三鞭羸去暮色逺岳起烟嵐却赴南巴留别蘇䑓知已前人人集作又過梅嶺上歳歳北風寒集作枝寒落日孤舟去青山萬里看猿聲湘水静草色洞庭寛已料生涯事只集作唯應持集作把釣竿劉長卿曽貶南巴尉此詩已載本集今英華誤作賈島詩下第别人前人下第鬢毛蒼徘徊戀帝鄉鶯聲寒食後人醉曲江傍淚落故山逺病來春草長知音豈易别孤棹復三湘留别光州王使君前人杜陵千里外期在末秋歸既見林花落湏防木葉飛楚從何地盡淮隔數峯㣲回首餘霞失斜陽照客衣欲遊嵩岳留别李少尹前人孤䇿遲回洛水湄孤禽嘹喨集作唳幸人知嵩岳望中常待我河梁欲上未題詩新秋愛月愁多雨古觀尋集作逄仙看盡棋㣲眇此來将敢問鳯凰何日定歸期將之京别李侍御朱慶餘心疑作此地偶相見語多為别難詩成公府晩路入翠㣲寒逄石自應坐有花誰共看唯當隨去鴈雪盡到長安金州别姚合釋無可日日西䑓上春流到夏殘言之離别易勉以道途難山出一千里溪一作江行三百灘松間樓裏月秋入五陵看辭杭州姚郎中周賀波濤千里隔抱疾亦難集作相尋㑹宿逄高士燒山值積霖藂桑山店逈孤火海雲集作船深尚有重來約知無省閣心京口别崔固前人積雨晴時近西風葉滿泉相逄嵩岳客共聽楚城蟬宿舘横秋島歸㠶漲逺田别君還寂寞不似剡中年江上别友人温庭筠秋色滿葭菼離人西復東㡬年方暫見一笑又難同地勢蕭陵歇江聲禹廟空如何暮灘上千里逐離鴻與友人别前人半醉别都門含悽上古原晩風楊葉社寒食杏花村薄暮牽離緒傷春憶晤言年芳夲無限何况有蘭蓀曉别前人翠羽花冠碧樹雞未明先上短墻啼忩前謝女青蛾歛門外蕭郎白馬嘶殘曙㣲星當户沒澹烟斜月照樓低上陽宫裏鐘聲動不語垂鞭過桞堤留别韋處士見二百三十一巻許渾下第别友人楊至之前人花落水潺潺十年離故集作舊山夜愁添白髪春淚感朱顔孤劔北逰塞逺書東出關逄君話心曲一醉㶚陵間留别裴集作劉秀才前人三獻無功玉有瑕更携書劔客天涯孤㠶夜别瀟湘雨廣陌春期鄠杜花燈照水螢千㸃滅棹驚灘鴈一行斜關河迢遞秋風急望見鄉山不到家𤓰洲留别李詡前人泣玉三年一見君白衣顦顇更離羣桞集作楊堤惜别春潮落花榭留歡夜漏分孤舘宿時風帯雨逺㠶歸處水連雲悲歌曲盡休重奏心遶關河不忍聞省中留别項斯省中重拜别兼領寄人書已念此程詩選作行逺不憂相問踈禁詩選作子城西並宅御水北同渠要取春前到乘閒候起居舒州酬别上卿顧非熊故交他郡見下馬失愁容執手向殘日分襟在晩鐘鄉心隨皖水客路過廬峰衆惜君材器何為滯所從下第别令狐員外馬戴論文期雨夜飲酒及荒晨坐歎百花發潜驚霜鬢新舊交多得路别業逺仍貧便欲辭知已歸耕海上春将别寄友人前人帝鄉歸未得辛苦事羈遊别舘一罇酒客程千里秋霜風紅葉寺夜雨白蘋洲長恐此時淚不禁和恨流留别定襄郡盧軍事前人行行與君别路在鴈門西秋色見邉草軍聲戍鼓鼙銜杯㸔寳劔躍馬上荒堤歸去咸陽里平生心不迷江行留别見二百九十四巻攄情留别并州從事前人淺學常自鄙謬承賢達知才希漢主召玉任楚人疑年長慙漂泊恩深惜别離秋光獨鳥逝暝色一蟬悲鶴髪生何速龍門上苦遲彫蟲羞朗鑒干禄貴明時故國誠難返青雲致未期空将感激淚一自灑臨岐下第别友人前人金門君待問石室我思歸聖主尊黄屋何人薦白衣年來御溝栁贈别雨霏霏下第别郜扶前人窮途别故人京洛泣風塵在世即應老他鄉又欲春平生空志學晩歳拙謀身静話歸林計唯将滄海親酬田卿送西遊前人華堂開翠簟惜别玉壺深客去當煩暑蟬鳴復此心廢城喬木在古道濁河侵莫慮西遊逺西關絶隴隂旅舘聞鴈别友人趙嘏路遶秋塘首獨搔背羣燕鴈正呼號故關何處重相失碧落有雲終自高旅宿去緘他日恨單飛誰見集作誰訝此生勞行衣濕盡千山雪腸斷金籠好羽毛别麻氏前人曉哭呱呱集作鳴鳴動四鄰於君我作負心人出門便渉東西路集作便作東西水回首􅀄驚枕席塵滿眼淚珠和語咽舊忩風月更誰親分離集作傷離況值花時節從此東風不似春代人贈别前人月自斜忩夣自驚衷腸中有萬愁生清猿處處三聲盡碧落悠悠一水横平子定情詞麗絶詩人匪石誓分明㑹湏携手乘鸞去簫史樓䑓在玉京留别前人水邉秋草暮萋萋欲駐殘陽去馬蹄曽是管絃同醉伴一聲歌斷各東西寒食新豐别友人前人一百五日家未歸新豐鷄犬獨依依滿樓春色傍人醉半夜雨聲前計非繚繞溝塍含緑晩荒凉樹石向川㣲東風吹淚對花落憔悴故交相見稀留别友人書齋喻坦之相見不相暌一留日已西軒凉庭木大巷僻鳥巢低背俗修琴譜思家話藥畦卜隣期太華同上上方梯湓城贈别陳陶楚岸青楓樹長隨送逺心九江春水濶三峽暮雲深氣調桓伊笛才華蔡琰琴迢迢嫁湘漢誰不重黄金将歸鍾陵留贈南海李尚書前人楚國有田舍炎州長夣歸懐恩似秋燕屢遶玉堂飛越酒豈不甘海魚寧無肥山裘醉歌舞事與􅀄心違􅈌􅈌文昌公英靈世間稀長江浩無際龍蜃皆歸依賤子感一言草茅發光輝從來鷄鳬質得假鳯凰威常欲討𤣥珠青雲報巍巍龍門竟多故雙淚别旍旂贈别前人海國一尺綺氷壺萬縷絲以君西攀桂贈此金蓮枝高鳥思茂林窮魚樂洿池平生握中寳無使歳寒移贈别離前人碧玉飛天星墜地玉劍分風交合水楊桞聽歌莫向隅鷄鳴一石留髠醉一作晞蹄輪送客溝水東月娥揮手崦嵫峯蠻天列嶂儼相待風官掃道迎遊龍天姥剪霞鋪曉空漴漴大帝開明宫文鯨掉尾四海通分明瀑布收靈桐山妖水魅騎旋風厭夣齧魂黄瘴中借君朗鑒入崆峒靈光草照閒花紅别同志鄭谷所立共寒苦平生同與逰相看臨逺水獨自上孤舟天澹滄浪晩風悲蘭杜秋前程吟此景為子上高樓贈别前人南遊曽共遊相别倍相留行色回燈曉離聲滿笛秋穏眠彭蠡浪好醉岳陽樓明日逄佳景為君成白頭别修覺寺無夲上人前人松上江雲石上苔自嫌歸去夕陽催山門握手無他語秪約今冬看雪來宗人作尉唐昌官署幽勝而又博學精富得以言談将欲他之留書屋壁前人公堂瀟洒有林泉祗隔苔墻是渚田宗黨相親離亂世春秋聞論戰争年逺江驚鷺來池口絶頂歸雲過竹邉風雨夜長同一宿舊游多共憶樊川雪中别詩友杜荀鶴酒寒無小户請滿酌行杯若待雪銷去自然春到來出城人跡少向暮鳥聲哀未遇應關命侯門處處開别從叔前人立馬不忍上醉醒天氣寒都縁在門乆集作易直自集作似别家難世路既如此客心湏自寛歸期亦羇束集作江村亦饑歉争及問集作䧟長安辭座主侍郎前人一飯尚懐感況攀髙桂枝此恩無處報故國逺歸時只恐兵戈隔再趨門舘遲茅堂拜親後特地淚雙垂辭鄭員外入關赴舉前人男兒三十尚蹉跎未叙青雲一桂科在客易為銷歳月到家難住似經過㠶飛楚國風濤濶馬度藍關雨雪多長把行藏信天道不知天道意如何江南别友人張喬勞生故白頭頭白未應休闕下難孤立天涯尚旅遊聽猿吟島寺待月上江樓醉别醒惆悵雲㠶滿亂流邉逰别友人張蠙欲别不止淚當杯難强歌家貧隨日長身病渉寒多雨雪迷燕路田園隔楚波良時未自致歸去欲如何将之京師留别親友前人達命何勞問西遊且自期至公如有日知我豈無時野逈蟬相答堤長桞對垂酣歌一舉袂明發不堪思商於驛與于韞玉話别羅隠多病仍踈拙唯君與我同帝鄉年共老江徼業俱空燕冷辭華屋一作室蛩凉恨曉叢白雲高㡬許全属採芝翁羅隠集中别有一篇其題目同而詩異今並載于此南朝徐庾流洛下憶同逰酒採閒坊菊山登逺寺樓相思勞寄夣偶别已經秋還被青青桂催君不自由奉使宛陵别二三從事前人梁王雪裏有深知偶别家鄉隔路岐官品共傳勝曩日酒杯争肯認當時豫章地暖矜千尺越嶠天寒愧一枝還有釣魚蓑笠在不堪風雨失歸期文苑英華巻二百八十八
