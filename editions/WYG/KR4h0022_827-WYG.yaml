body:
  text: 文苑英華巻八百二十八宋李昉等編宴遊六堂下潭州楊中丞作東池戴氏堂記一首永州新堂記一首泉瀑附恵山寺新泉記一首杜城郊居王處士鑿山引泉記一首王處士鑿山引瀑記一首池上厨院新池記一首賀遂貟外藥園小山池記一首長沙東池記一首堂下潭州楊中丞作東池戴氏堂記栁宗元𢎞農公刺潭三年因東泉為東集無此字池環之九里丘陵林麓距其涯坻島洲渚交其中岸之突而出者水縈之若玦焉池之勝於是為最公曰是非離世樂道者不宜有此卒授賔客之選者譙國戴氏曰簡為堂而居之堂成而勝益竒望之若連艫縻艦集作檻與波上下就之顛倒萬物遼廓眇忽樹之松柏杉櫧被之菱芡芙渠鬱然而隂粲然而榮凡觀望浮逰之美專於戴氏矣戴氏嘗以文行累為連帥所賔禮貢之澤宫而志不願仕與人交取其退讓受諸侯之寵不以自大其離世歟好孔氏書旁及荘文莫不總統以至虚為極得受益之道其樂道歟賢者之舉也必以類當𢎞農公之選而専兹地之勝豈易而得哉地雖勝得人焉而居之則山若増而髙水若關集作闢而廣堂不待飾而已奐矣戴氏以泉池為宅居以雲物為朋徒攄幽發粹日與之娱則行宜益髙文宜益峻一有以字道宜益懋交相贊者也既碩其内又揚于時吾懼其離世之志不果矣君子謂𢎞農公刺潭得其政為東池得其勝授之得其人豈非動而時中者歟於戴氏堂也見公之徳不可以不記永州新堂記將為穹谷嵁巖淵池於郊邑之中則必輦山石溝澗壑凌絶險阻疲極人力乃可以有為也然而求天作地生之狀咸無得焉逸其人因其地全其天昔之所難今於是乎在永州實惟九嶷之麓其始度土者環山集無此字以為城有石焉翳于蜀本作乎奥草有泉焉伏于土塗虵虺之所蟠狸䑕之所逰茂樹惡木嘉葩毒卉亂雜而争植號為穢墟韋公之來既逾月理甚無事望其地且異之始命芟其蕪行其塗積之丘如蠲之瀏如既焚既釃竒勢迭出清濁辨質羙惡異位視其植則清秀敷舒視其蓄則溶漾紆餘恠石森然周于四隅或列或絶集作跪或立或仆竅穴委䆳堆阜突怒乃作棟宇以為觀逰凡其物類無不合形輔勢效伎於堂廡之下外之連山髙原林麓之崖間厠隠顯邇延野緑逺混天碧咸集本如此是英華作或非㑹於譙門之内蜀本作外已乃延客入觀繼以宴娱或贊且賀曰見公之作知公之志公之因土而得勝豈不欲集本如此是英華作以非因俗以成化公之擇惡而取羙豈不欲除殘而祐仁公之蠲濁而流清豈不欲廢貪而立㢘公之居髙以望逺豈不欲家撫而戸饒集作曉夫然則是堂也豈獨草木谷谷字集作土石水泉之適歟山原林麓之觀歟將使繼公之理者視其細知其大也宗元請志諸石措諸屋漏零陵石刻作壁編以為二千石得集作楷法泉瀑附慧山寺新泉記獨孤及此寺居吳西神山之足山小多泉其髙可憑而上山下有靈池異花載在方志山上有真僧隠客遺事故跡而披勝録異者淺集作賤近不書無錫令敬澄字深源以割雞之餘考古按圖葺之集作而築之乃飾乃圬有客竟陵陸羽多識名山大川之名與此峯白雲相與為賔主乃稽厥創始之所以而志之談者然後知此山之竒方掩他境集作此山之方廣勝掩他境其泉伏湧潛潗泄潺舎下無沚無竇蓄而弗集作不注深源順集作因地勢以順水性始雙墾袤丈之治疏為懸流使瀑布下鍾甘溜湍激若醴濃乳噴集作若釃醴乳噴及集作發于禪床周于僧房灌注于徳池集作地經營于法堂潺潺有聲聆之耳清濯其原飲其泉能使貪者讓躁者静惰集作静者勤道道者堅固境净故也夫物不自美因人美之泉出於山發於自然非夫人疏之鑿之之工則水之時用不實濟猶無錫之政頗集作煩民貧深源導之則千室襦袴仁智之所及功用之所格動者嚮集作若嚮答其揆一也余飲其泉而恱之乃志美於石杜城郊居王處士鑿山引泉記杜佑佑此莊貞元中置杜曲之右朱陂之陽路無﨑嶇地復密邇開池水積川流其草樹蒙茸岡阜擁抱在形勝信美而躋攀莫由爰有處士琅邪王易簡一作居易字髙徳經術探於壼祕文章擅於風雅精識窮於治理奥學究於天人棲遲衡茅粃糠爵禄旁洽他藝尤精術數短褐或弊簞笥屢空守道安貧不求不競素多山水乗興逰衍踰月方歸誠士林之逸人衣冠之良士佑景行仰止邀屈再三恵然肻來披榛周覽因發歎曰懿兹佳景未成具美蒙泉可導絶頂宜臨而面勢小差朝晡難審庸費不廣日月非延輿識無不為疑佑獨固請執事於是薙叢莽呈修篁級詰屈步邐迤竹逕窈窕藤隂玲瓏勝槩益佳應接不暇登陟遺倦逹於髙隅若處煙霄頓覺神完終南之峻嶺青翠可掬樊川之清流逶迤如帶藏役春仲成功秋暮其煩匪病不􅄽於素開雙洞於巖腹當鬱燠於生寒交清泉於巘上遭旱暵而淙注止則澄澈動則潺湲宛如天然莫辨所洩懸布垂練摇曵晴空定東西之方隅正子午之晷度境象一變賔侣咸驚矧其流觸灣環曲池奫淪美景良辰賢英迭臻泛方舟而騁懐聽清商而怡神寜知景之将曛勝事嘉趣諒難偹陳逺祖西漢建平侯家於杜陵綿歴千祀佑實虚薄謬竊公台作相兩朝空尸髙秩初過從心之嵗即陳歸老之誠渥澤猥流皇慈未替特優筋力之禮俯念朝謁之勤仕適田廬恣尋山水荷天地之大徳蒙亭育之厚恩上答何階競慙是積而枌榆之敬恭肅敢虧每出國門未嘗公服導從輩悉令簡省芻蕘者莫止唐突及栖弊陋時㑹親賔野老衰宗嗇夫㳺徼亦同列坐或與銜盃由是盡得歡心庶將協比鄉黨其城曲墟落緇黄童艾杜名杜氏遍周川原羣情既用光榮老夫唯増祗懼或曰兹地頗堪逰翫深慮勢家􅇒奪佑以為不然聖主明君固當制抑神龍中故中書令韋公嗣立驪山幽栖谷荘實為勝絶中宗愛女安樂公主恃一作恬寵懇求竟不之許曰大臣産業宜傳後代不可奪也恭惟聖徳載在史䇿貞元中族叔司空相國黄裳時任太子賔客韋曲荘亦謂佳麗中貴人復以公主賞愛請買賜與徳宗不許曰城南是杜家鄉里終不得取仰奉聖言布於人聴則二后皆切禁止所冀常以保安在子孫但履孝資忠謹身奉法無疑欽逹節克守素風復何虞也司徒平章事岐國公京兆杜佑記王處士鑿山引瀑記武少儀琅邪王易簡今之獨行士也雖承冠冕之緒不踐名利之途怡心曠澹篤志㢘直精識雅鑒洞元鏡微司徒相國好山水之㳺深吏隠之興啓沃多暇不孤勝賞遇良辰麗景必載酒攜賔将陶性情屢造郊野每車馬麏至簮裾蒲席布褐之客唯王生焉得賢而親亦可知矣岐公有林園亭沼在國南朱陂之陽地名樊川郷接杜曲却倚峻阜舊多細泉縈樹石而散流瀝沙壤而潛耗注未成瀑浮不勝杯王生睨之歎而言曰天造斯境人有遺功若能疏鑿控㑹始可見其佳矣公乃命僮使具畚鍤稽度力用而請王生主之生於是周相地形幽尋水脉目指頥諭浚微導壅穿或數仞通如一源竇巖腹渠摠引㳙溜集為一作于澄潭始旁决以淙瀉復湧流而環曲觴斚徐泛自符洛汭之飲管絃乍舉若試舒姑之泉映碧甃而夏寒間蒼苔而石净懿夫曩滴瀝以珠墮今潺湲而練垂又何以助清瀾於荷池滋雜芳於藥囿不易舊所别成新趣岐公乗閒留玩畢景忘疲優㳺宴適更異他日矣王生之靈襟巧思不其至歟在昔神龍景龍之間故人中書令韋公嗣立有别業在驪山之下雲松泉石竒勝幽絶中宗皇帝嘗親幸焉既而第從臣之篇詠為國朝之盛美因詔瓊其谷名幽栖谷賜韋公號逍遥公渥恩稠叠時罕為比上之愛女一有曰字安樂公主恃寵驕恣求無不得遂奏請買韋公此荘以為逰觀之地上不許之一作之許曰大臣所置宜傳子孫不可奪也公主竟慙而止信足以輝焕史筆作程将來况兹池臺林圃密邇舊廬所居之别舘也貽厥百代保之無窮猗彼瀑泉亦與慶流而不竭矣少儀忝公門客竊迹翰苑謬當授簡俾紀王生之能事因獲略而叙焉其餘則已具奉常權公之記述故復重列云池上㕑院新池記李元卿遇知己而用者匪唯於人物亦有之初㕑院因前池餘𣲖浸潤㘭堂數步及霤纔供㕑飪滌器而已邑大夫南陽范愔迹累人羣心在遐曠每休沐之暇訪道山林見其有天造池沼之形而遂為溝瀆乃命黄冠等頥指廣袤鑿周於下駢石以涯之蓄流以深之清瀾忽平秋隂滿院執㸑無欲清之僕挈瓶無汲深之勞不造機事而功贍於物范公實所謂新池知己矣靜勝則道純境幽則神完予與吳天師采真洞府朝夕窺臨瑩澈心膽滑昏潛遁事茍惬於心則與登姑蘇望五湖而齊矣故因碑籀餘地刻而誌之猶詩人有泌泉之作大厯五年嵗號閹茂八月一日記賀遂貟外藥園小山池記李華恱名山大川欲以安身崇徳而獨往之士勤勞千里豪家之制殫竭百金君子不為也賀遂公衣冠之鴻鵠執憲起草不塵其心夢􅄰以青山一作谿白雲為念庭除有砥礪之材礎礩之璞立而象之衡巫堂下有畚鍤之㘭圩􅀈之凹陂一作随而象之江湖種竹藝藥以佐正性華實相蔽百有餘品鑿井引汲伏源出山聲聞池中尋竇而發泉躍波轉而盈沼支流脉散而滿畦一夫躡輪而三江逼戸十指攒石而羣山倚谿智與化謀至人之用也其間有書堂琴軒置酒娱賔卑庳而敞若雲天尋丈而豁如江漢以小觀大則天下之理盡矣心目所自不忘乎賦情遣辭取興兹境當代文士目為詩園道在抑末敦元可以扶教趙郡李華舉其畧而記之長沙東池記符載諸侯之封茅受土荷天子心膂之寄者有旌旗車服之盛有生殺賞罰之重宜有以鼔鐘池榭而張大之况長沙大郡也江山亘千里道途控百越有主人焉有大賔焉渾渾四來擊檝磨軒主人茍不以享讌觀逰而禮之者即詩人以為褊故我有東池之製焉壬午嵗皇帝命御史中丞楊公領湖南七郡之地公方厚簡重氣岸恢大以文章禮樂藻績徳義踐右史歴文昌登少常伯朝廷之休聲茂績沛然也以素望膺盛拜故捧詔之日公卿賀登車之日道路喜下車之日童老慶朞月而苛細去周嵗而兵食足三年而風俗清即觀㳺池沼之作出於餘力矣先是佛廟之旁有泉沚焉隂流沮洳不能措杯於其上加以隙田數百畝磽瘠滲漏不産嘉榖莞莎一作葴沙蒲稗狼藉組織公以重價償僧而求之僧滿志也於是相地形鑿水路掘卑壤築髙岸盡東其勢停深注淺公以羙利僦民而營之民恱隨也居是累月池成大水既瀦長江一作坻平澄無邉天空境眀一來窺臨百骸以清江湖思逺一作逺思著人襟靈右有青蓮梵宇巖巖萬構朱甍寳刹錯落清晝左有灌木叢林隂靄芊眠不究幽深一作深源四時蒼然柯葉吟風聲若哀絃自北徂南夐邈悠悠鸛一作鶴鷺鳬鷖差池淹留太陽晨曦金波暝浮氣象詭怪恍惚瀛洲湘西有山黛色沈沈或時無風影墮池心中間乃背城闉之扄東追風物之遐曠盛笑賔客泛舟而逰駐彩旌動蘭橈逍遥逺去興隨趣往縈涯繞嶼不記沿泝晤言始歡間以壺觴絲桐縁雲以凄切羅綺從風而翠燦疑作綷􅀈有美一人娥眉嬋姢綺袖自障清歌采蓮聲發波中宛宛神仙當是時憂者泰褊者曠勞者逸惛者爽豁七情之底滯蕩百齡之痾恙豈比夫髙陽習家之醉同年而語哉何長沙之卑濕貽搢紳君子之樂一作慮也夫賢逹之藴才智也不得其時即騰凌宇宙鼓鑄萬物且兹地也朝為蹄涔夕為蓬壺茫茫乎一作平是地波瀾在我識者覩公之為事也量細以度大詳近以徴逺伏知異日必能成天下之務利天下之物斡運元化燮調正氣致君雍熈與咎䕫為徒者於此而見之矣載頃年廬岳嘗辱公顔閱一作閔之顧賀榮拜寵自舊山已一作以來拂拭孱陋屢陪逰泛覩盛美而不書者君子或以為固一作闕也乃抉諛才頌賢能以耀乎将來者也文苑英華巻八百二十八
