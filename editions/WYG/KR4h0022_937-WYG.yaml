body:
  text: 文苑英華巻九百三十八宋李昉等編宰相三丞相太子少保牛僧孺墓誌一首東川節度使周墀墓誌一首丞相太子少師竒章郡開國公贈太尉牛公墓誌銘杜牧唐佐四帝十九年宰相牛公諱僧孺字思黯八代祖𢎞以德行儒學相隋氏封竒章郡公贈集作諡文安侯文安後四世集州刺史贈給事諱休克於公為曽祖集州生太常博士贈太尉諱紹太尉生華州鄭縣尉贈太保諱幼聞太尉生孤始七嵗長安南下杜樊鄉東文安有隋氏賜田數頃書千巻尚存公年十五依以為學不出一室數年業就名聲入都中故丞相韋公執誼以聦明氣勢急於褒收如栁宗元劉禹錫輩以文學秀少皆在門下韋公亟命栁於樊鄉訪公曰願得一相見公乗驢至門韋公曰是矣東京李元禮為後進師隋竒章公仁徳禄位二者包而有之登進士上第元和四年應賢良直諫制數强臣不奉法憂天子熾於武功詔下第一授伊闕尉以直被毁周嵗凡十府奉取不下伊闕滿嵗郄公士美以昭義軍書記辟凡三上請詔除河南尉拜監察御史丁母夫人憂制終復拜監察御史知雜事改考功員外郎集賢殿直學士庫部郎中知制誥賜五品命服半嵗遷御史中丞宿州刺史李直臣以賊數萬敗穆宗聴二本集德偏詞於中稱直臣寃且言有才宰相言格不用公以直臣獄奏上曰直臣有才可惜公曰彼不才者無飽食以足妻子安足慮本設法令所以縳束有才者禄山朱泚是才過人而亂天下上因可其奏曰善賜章服金紫遷户部侍郎掌財賦事上益親重欲相之㑹中書令韓𢎞男公武謀曰大人守大梁二十年齊蔡誅後始來朝今不以財援中外設有飛一詞者誰以二本作與保白公武齎𢎞書獻公錢千萬公笑曰此何名為公亟持去明年𢎞公武繼卒主藏奴與吏訟於御史府上憐𢎞大臣父子併死稚孫將家事走中使至第盡取財簿自閲視凡中外主權多納𢎞貨獨朱勾細字曰某年月日送户部牛侍郎錢千萬不納上大喜以指歴簿遍視旁側曰果然吾不謬知人殿上皆再拜呼萬嵗尋以本官平章事明年正位中書侍郎加銀青三品兼集賢殿大學士監脩國史敬宗即位與武士畋宴無時徵天下道士言長生事公亟諫曰陛下不讀𤣥元黄帝五千言以清淨養生彼道士皆庸人徒誇欺虚荒豈足師法未一歲請退不許連四月日間以疾辭乃以鄂岳六州建節號武昌軍命公為禮部尚書平章事為節度使公始至問民疾二本作衣苦皆曰城土棘惡嵗輸簑竹為苫具姦吏旁縁主為侵取費與税等嵗久前後政欲畫計䇿訖無所施公即除去冗長用公私錢陶塼成城文粹作凡五年乃就明年文宗即位就加吏部尚書明年急徵拜兵部尚書平章事再二本作重拜中書侍郎𢎞文館大學士鄭注怨宋丞相申錫造言挾漳王為大逆狀跡牢宻上怒必殺公曰人臣不過為宰相今申錫已為宰相假使如所謀豈復欲過宰相有他圖乎臣為中丞愛申錫忠良奏為御史申錫之心臣敢以死保之上意改由是宋不死太和六年西戎再遣大臣摯二本作贄寶玉來朝禮倍前時盡罷東嚮守兵周明臣附李太尉德裕時殿劔南西川上言維州降今若㓂文粹作史生羗三千人燒十三橋𢷬戎腹心可洗久耻是韋臯二十年至死恨不能致事下尚書省百官聚議皆如劔南奏公獨曰西戎四面各萬里來責曰何事失信養馬茹蔚州在平凉部西上平涼坂萬騎綴回中怒氣直詞不三日至咸陽橋西南逺數千里雖得二本作百維州此時安可用棄誠信有利無害匹夫不忍為况天子以誠信見責於夷狄且有大患上曰然遂罷維州議太和六年檢校僕射平章事淮南節度使經六年至開成二年連上章請休官詔益不許公曰臣唯退罷可以行志夏五月以兵付監軍使拜疏訖就道除檢校司空留守東都明年拜右二本作左僕射上恐公不起詔曰朕比有疾良已思一面敘公不得已至闕下一拜謝閉門不出明年檢校司空平章事襄州節度使出都門賜黄尋蹲龍杓凡六器名出周禮詔曰精金古器用以比况君子非無意也襄州七年假饒軍人入賦不一公至據地造籍免貧弱四千萬均入豪强皆曰甘心不出一怨言明年武宗即位就加司徒㑹昌元年秋七月漢水溢堤入郭自漢陽王張柬之一百五十載二本作嵗後水為再大李太尉徳裕挾維州事曰脩利不至罷為太子少保二本師未幾檢校司徒兼太子太集作少保明年以檢校官兼太子太傅留守東都劉稹以上黨叛誅死時李太尉專柄五年多逐賢士天下恨怨以公德全畏之言於武宗曰上黨扼二本作軛左京控山東劉從諫父死擅之十年後來朝加宰相縱去不即二本無此字留之至積叛竭天下力乃能取此皆公與李宗閔宰相時事從諫以太和六年十二月十七日拜闕下公實以某月十九日節度使淮南明年正月從諫以宰相東還河南少尹呂述公惡其為人述與太尉書言禎破報至公出聲歎恨上見述書復聞前縱諫去壘二怒不一㕘校自十月至十二月公凡三貶至循州員外長史天下人為公挼手咤罵公走萬里瘴海上二年恬泰若無一事今天子即位移衡州汝州刺二本作長史遷太子少保少師凡四年復位大中二年十月二十七日薨于東都城南别墅年六十九天子恫傷不朝兩日再集作冊贈太師二本作尉天下善人執手相弔哭公忠厚仁恕莊重敬慎未嘗不以此八者自勉而終身益篤為宰相急於銓品凡名清官不忍持一資以假非其人以道徳謨於天子每指古義為據有言機利克追必鈲音華㓢力功各使之摧破三大邦去苛碎條約除民二本無此字大患其輕巧吏欲試公愛惡希售所為渾然終不能見故所至必大治衣冠單窮出俸錢嫁其子女月與食嵗與衣資送其死䘮凡數百家李太尉志必殺公後南謫過汝州公厚供具哀其窮為解説海上與中州少異以勉安之不出一言及前事鎮武昌時軍容使仇士良為監軍使公律以禮敬暑甚大合軍宴拱手至暮一不摇扇亦自儉克平居非公事不出内屏周三嵗語言舉止率有常度仇軍容開成末首議立武宗權力震天下每言至公必合手加額二本作顙曰清德可伏二本作服人但過恡官財與人無一毫恩力二本作分耳不肯引譽不敢怨毁淡居其中公始自河南薦鄉貢士為郎官考吏部科目選三開幕府中丞相外凡取六十餘人上至將相次布臺閣皆當時名士每暇日讌語寮吏必言古人修身行事旁誘曲指微警教之不以已所長人所不及裁量高下以生重輕後進歸之承望聲光行一言許可必自矜重夫人辛氏以公封張掖郡贈僕射袐之長女士林稱為婦師凡二十年前公八年殁五男六女長曰蔚監察御史次曰叢浙東諸本並作南府協律郎皆以文行登進士第不籍公勢次曰奉倩河南府洛陽尉二人皆稚齒長女嫁户部郎中上黨苗愔次女嫁河中節度使檢校郎中范陽張洙次女嫁河南府集賢校理常山張希復次女嫁前進士鄧淑次女未笄一人始數歲以某年月日葬少陵南某鄉某里銘曰道既訛衰必有以扶厥公之生以隆其汚二本作幽以燭明暵以雨濡以教其徒以佐天子滅絶覇駮如有樞柅標揭文粹作謂峙倚巍乎二紀臣宗德老鉅傑魁礨孰為忌畏譛去南海不校不辨旋文粹作牽復顯大百行渾圓隣於及年以歸其全東川節度使檢校右僕射兼御史大夫贈司徒周公墓誌周平王次子烈封汝墳侯秦以汝墳為汝南郡侯之孫因家焉遂姓周氏自烈十八世至西漢周仁繼烈封侯其後逃西晋亂南去黄岡靈起仕梁為桂州刺史生冕在陳為車騎將軍靈生法明年十二月命巴州刺史陳滅臣隋為趙之真定令隋亂歸黄岡起兵取蘄安沔黄武德中籍四州地請命授緫管蘄安十六州軍事光禄大夫封國於道太宗命虞世南銘書墓碑相國為六代孫曽祖惲汝州梁縣令祖沛左拾遺王一作皇考頲右驍衛兵曹㕘軍贈禮部侍郎公少孤奉養母夫人以孝聞舉進士登第始試秘書正字湖南團練巡官母夫人亡哭泣無時里人過公廬曰無驚周孝子後自留守府監察真拜御史集賢殿學士李公宗閔以宰相鎮漢中辟公為殿中侍御史行軍司馬後一年復以殿中書職徵歸時太和末注訓用事夏六月始逐丞相宗閔立朋黨語鈎挂名人凡百日逐朝士三十三輩天下悼懾以目受意附􅇯者屢以公為言注訓曰如去周殿中恐人益驚竟不敢意注訓取公為起居舍人文宗復二史故事濡筆立石螭下丞相退必召語旁側窺帝每數十顧遷公員外郎帝曰周某不可不見宜兼前官數月以考功掌言事帝曰就試翰林公辭讓堅懇帝正色以手三麾之遂兼學士遷職方郎中中書舍人政事細大必被顧問公終身不言事故不傳武宗即位以疾出辭為工部侍郎華州刺史領禁軍二十四内司居華下諸集作者藉没等百姓不敢妄出一詞李太尉徳裕伺公纎失四年不得知愈治不可蓋抑遷公江西觀察使兼御史大夫公既得八州施展教令申明約束發䖍守陳弇賍坐弇以法死吏手膠拳窮鄉逺井如公在旁縳出洞冦劉太朴徒數百人斸發根脉無有遺失彭蠡東口戍五百人上下千里無一賊跡遷禮部尚書鄭滑節度使老将某項領不如教約公鞭背降為下卒聲北入魏皆曰周尚書文儒能治百姓仁愛兵士而復敢爾是豈可一集作十犯九一作朞嵗入拜兵部侍郎節度支兼户部東集作吏曹事積邊糧榖九十萬石今天子即位二年五月以本官平章事後一月正位中書侍郎兼脩國史就加刑部尚書因河湟事議不合㫖以檢校刑部尚書出為劔南東川節度使明日入謝面加檢校右僕射公自舉進士第非其人不交一集無一字言旁睨後進鐫心鏤志及為將相乃推挽悉置于位李太尉德裕㑹昌中以恩撰元和朝實録四十篇益美其父吉甫為相事公上言曰人君猶不改一作觀史人臣可改乎元和實録皆當時多士自書事實今而不信信德裕後三十年自名父功衆所不知者而書之此若垂後誰信史竟廢新本并帥王宰􅀈所部財貨承事貴倖自請來朝聲言我取平章事鎮大梁公上言曰宰破太原取汴州不知天下治所凡幾得如太原汴之大者可飽宰欲乞宰還鎮自補其殘後二日還宰詔下駙馬都尉韋讓求為京兆尹公言曰尹坐堂上階下拜二赤縣令屬官將百人皆可笞辱非有徳者京兆不可為豈止取吏事讓議竟寢自此非道求進者鼠遁自屏及鎮東蜀一歲欲歸閒洛師微得風恙公曰我今去是以疾去疾愈去非晩大中五年歲在丁未二月十七日薨于位享年五十九訃至廢朝三日冊贈司徒命諫議大夫盧懿弔恤其家公信於朋友公於為官事親出告還必面家事不敢自專同曽祖兄弟入門呵笞奴婢衣服飲食無二等免相位西去送公還者雖武將散秩歎惜咨嗟曰周相公無私我惜其去六字一作存日無戎惜私其去有私乎夫人義興蔣氏先公某年終生二男一女長曰寛饒崇文校書次曰咸喜京兆㕘軍皆孝謹有文學女嫁起居舍人薛䝉大中六年嵗次壬申二月十二日歸葬先塋河南府河南縣穀陽鄉立行里銘曰姬之支封國自為姓以周為氏入唐而盛烈後幾世厥生賢孫當唐中興為唐相臣文思天子誇古為治提起王道以公為倚迒音剛蹊巢竅出者鳥鴃誰塞誰棘勞分碎指三屏大邦駿壯武事哺撫稚耋集作老父母赤子曰將曰相公其愧幾指古為比公其無愧以公遺去聲唐而後公死不錫夀考誰其辨之此篇元在九百三十九巻職官門今移于此文苑英華巻九百三十八
