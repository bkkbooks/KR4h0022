body:
  text: 文苑英華巻八十九宋李昉等編符瑞六進白烏賦一首白烏呈瑞賦二首京兆府獻三足烏賦二首白雀賦一首越裳獻白雉賦一首上林白鹿賦二首白鹿夾輈賦一首白兎賦一首進白烏賦張説咨大鈞之播氣在品物而流形有莫黒之凡族忽一作亦變白而効靈感上人於孝道合中瑞於祥經若夫事出神妙理以一作包舒巻既集王屋飛随帝輦捧日髙翥迎風細轉識句句於招呼毎啞啞於吻一作啄吮以其雪羽霜毛氷清一作精玉狀㧞竒緑林之下賞異紫臺之上瞰鳷鵲之妙窻把一作抱鳯凰之衣桁恐同類之見嫉畏不才之速謗期委二字一作願悉命於渥恩豈願思二字一作顧思於閒放維聖君之靈囿物何逺而不臻有能言而可重或善舞而取珍若随驅一作羞隨驅而入獻與寳羽而為隣採一作探朝噪之聲樂眷夜啼之曲新無芒距而躍武不鈎觜以懐仁謝先容而特逹却假飾以全真鑒深心於反哺終一作移報徳於君親凡一作皆集本白烏呈瑞賦裴度翩彼靈烏賁然効質披圖牒而㒺二叶邦家而得一備體有光至真無匹宗廟薦敬帝王之孝克孚天地感仁潔朗之容可述恥受彩以相混故莫黒而獨出上瓊樹而若無下瑶階而乍失懐恩反哺方去去以凌雲飬素來儀且翻翻而就日觀夫載飛載止厥狀粲然不染而成因心之孝以立匪召而至感物之道遐宣向皇風而自舞與麗景而相鮮人具爾瞻既含章而効祉我無爾詐乃見素以守全乃知王澤竭而退飛帝道通而無遏彼明心兮不妄至知大節兮不可奪象潔白而攸歸知愛敬之傍逹懿夫不汙其色㒺違斯道秀質安倚凝光净好美仁慈之及物故易色於昭昭惡赤黒之眩人乃成形于皓皓且夫應圖咸若鄙臯澤之鳴鶴瑞聖不還陋江湖之白鷴諒飲啄於仁義豈逃潜於阻艱所以其出無常其來有素雲凝標於羽族玉潤合於王度常從碧海随杲日而悠揚今在華林偶盛時而瞻顧實由我后敬之昭假皇矣光宅垂拱而燭幽以明禽鳥乃化𤣥為白逗祥光而聿至望休氣以來格時哉時哉奮翹英於紫陌第二孟簡驗白烏之祥牒告皇家之寳􅍈盖由天子張至仁本太素享宗廟而無爽薦孝敬而有度何嘗日浴翻皓體以來儀曾異火流奚丹羽之可慕凌翯翯之白烏類振振之翔鷺禀純徳而自甄誠衆色之難汙觀其皎皎竒狀明明麗質霜毳潔朗玉姿閒逸不愛其瑞嘉載飛之可瞻思効其祥見莫黒之如失寧爰企於徃代可俯窺於今日原乎孝理通𤣥格皇至䖍惟烏感應其容昭宣抱正色而道洽徒一作從反哺而名全不然則有威鳳之可紀何白烏之是傳樂而有聲且不棲于楚幕潔而成質故自協於靈篇出林而日華亂動繞樹而月影相鮮嚮至化而逺集想皇風而戾焉衆而何為悲子生之八九大而無慮笑水擊之三千爾其超遥髙翥來不可遏見歸飛之薦臻誠愷悌之四達諒深仁之所化固至性之難奪若乃載鳴嗷嗷浮彩皓皓受西方之精氣自洪爐而鎔造遐想其蒼赤呈祥豈與乎霜雪同縞且夫仰稻粱而自若彼徒寵之仙鶴待馴狎而不還何必招於白鷴且養素而委質非取容而强顔故下臣賀瑞而歌曰素徳式昭兮何舄奕𤣥質從化兮為潔白符仁孝兮叶佳册見祥瑞兮流聖澤京兆府獻三足烏賦以平上去入周而復始為韻李雲卿杲杲靈烏萃于神都耀彼殊彩呈兹異軀披拂四氣翺翔九衢恥祥鸞之止棘慕儀鳳之棲梧瑞表孝紀名標祕圖將有感而必集豈獨殷周與有虞觀其隣一作降自日域戾于天府音諧雅頌動中規矩頡頏其質差池其羽歩芳草而三趾徐來遡祥風而六翮㣲舞珍竒莫測觀者如堵諒兹禽之禎祥告我皇之福祜於是羅者既獲虞人是薦貯以瑶筐登于玉殿凝睿想迓神眄孤飛砌上似於雲際而遊獨立君前疑乎日中而見聖情不極念兹莫黒彼應感而至我有道而得狎以馴擾安其棲息夜啼玉壘聲雖入于舜聰曙喚瑶堦心豈知夫帝力不然者曷足以昭我皇之𤣥化表吾君之恭黙是知國將昌則降而為祥政或缺則歸彼扶桑天道不昧神心孔彰豈有情在於斯烏固靈應昭乎彼蒼闕之㫖既集吾君之福祉與天地而終始儻不翦其毛羽願長飛乎帝里第二王顔夫何赫赫之太陽忽降精於烏鳥乃呈瑞於皇王足應乾之三數日曜日之九芒降天邑而于我李浴咸池而自扶桑嘗空聞於前牒今實觀於殊祥天既無私祥何能隐一作信昭聖代之有應垂休徴之無盡瑞于帝室表大孝於天衷獻自尹京驗長安之日近始至也衆羽駭集伊人驚萃邁麟鳯之時見何鷹隼之能畏如深就日之誠不效搏風之志願委質而入貢終依仁以馴致入銅籠而戢翼向金殿而矯翅將告于休似對以臆由是憐楚人之迷鳯陋越裳之獻翟小哉棲棘之鸞蔑矣應風之鶂未如我陪日馭之出入遊天居之岑寂曩有赤而呈美白以効靈俱非應乎殊貺亦或載於祥經二字一作嘉祥終未如符孝理之永錫昭寳運之康寧則如堯舜登極䕫龍夾輔布政無偏惟賢是取故得感陽精於上帝賛隂陽於下土光昭萬葉輝映千古良史當載美而記時謏才顧賡歌而蹈舞白雀賦彼白雀兮降靈朱方羽皎皎而氷净光紛紛而雪光既無日浴不假雲翔馴階除兮玉彩相照向庭際而花影飄揚皓然自居賁以為飾與物無競随時游息知有文而賈害則純素保光知惡紫之奪朱則大白呈色叶我皇之金運旌我皇之道極又何貴乎黄以為名赤以為翼然後銜丹書以告祉執玉環以述職所以異其類不能同塵所以随其俗將以順人不假倉以耗國不穿屋以擇隣刺穆公之將死以人為殉雪冶長之無罪示人有親無以為凡鳥也不摭其實無以為珍禽也不利於物庻考言以察用時有得而無失若以酒成禮我則能近取諸身若以農命官我則能將委其質百揆有序萬物咸秩豈不知鴻鵠之志與尺鷃而為匹悲夫未處大厦閑疑作閉于雕籠心眷戀兮猶期拂日羽摧落兮半巳從風望銅䑓而路逺想瑶池而宴終儻吾君兮為開一面呈瑞兮還飛紫宫越裳獻白雉賦以周徳方興逺夷入貢為韻謝觀憬彼越裳南之一方感皇化於蠻貊獻白雉於周王原夫獲皎潔之姿奉鴻私之徳閉靈質於雕玉馳星使於絶域夕辭南土形迷夜月之光曉向北風影混朝霜之色嗟乎䟦渉空闊江山阻修途呈萬里星嵗㡬周過吳門而練影光透惹曹風而麻衣色浮然後逹成周之大庭陳本國之所執歴雉門而捧進随鴻臚而坌入俯雕題而就位拱䟽趾以前集利觜玉植修領一作頸縞戢風摇細尾當軒而練帶長垂日照輕毛在手而雪花孤立以其耿介無比貞明可稱距列瑶刺身摛鶴翎徘徊而隟駒其轉奮迅而振鷺將興其净珉潔其神露凝皎皎敷粉亭亭卓􅖅自禀時清之化誠非日浴之能勿以臣之賤所獻無徴勿以禽之㣲所來自逺蒙恩覃而化及似風行而草偃是以齎此嘉瑞唯憂後時欲以明誠上答敢以遐阻為詞作獻靡遼東之豕不緇殊墨子之絲一以見澤兼鳥獸一以彰徳被蠻夷王乃愀然色動沈然念兹發明南國之忠汝之逺矣舉奏殊方之瑞予甚嘉之方知雉之潔兮可珍士之潔兮殊衆可珍猶尚於夷俗殊衆可標於嵗貢儻援引而不遺願舉白之一送上林白鹿賦以君徳至天珍物充為韻李䝉仰彼𤣥化稽乎典墳驗休徴於列辟知至理於有君逺方圖物不寳旅􅋙之貢靈契潜感豈惟鳴鳯之聞降百祥之昭晰和四氣之氛氲粤有竒獸言彰聖徳賁然來思載白其色才麌麌以呈貺不呦呦於野食謝僊家之騰倚歸御苑而棲息於是上囿幽閒禁林清祕烱如玉立皎若霜萃場町疃於池沙影光芒於山翠皇心愉兮徳所感衆目駭兮榮其至􅀞輻疑作轓為飾能随太守之車緑繢稱珍可薦王侯之位且夫勁角昭勇縞色呈鮮應皇家之盛徳當聖運之承天足使殷帝之狼恥擅衘鈎之瑞吳門之馬慙當曵練之妍其來也則天祚明徳神推有仁故知以竒質表瑞非為育珍其擾也則一人有道四海無拂故知以惠性含和寧將翫物宜其禎祥逺暢聖範光充保康功於勿伐彌大命於無窮重曰𤣥化凝兮神一作聖功就瑞獸格兮充君囿質皜耀以霜潔角淋漓大人賦作林離而玉秀恥射於東遊笑獲麟于西狩惟皇靈之介福固永命而何究第二同前韻蕭昕大哉聖徳望之如雲苑囿期廣動植惟分匪狙獷之獝狘將煦育於氤氲伊生靈之遂性實咸若於吾君為白鹿之呈瑞時或友而或羣夫其克牣禁苑喜樂王國庇豐草而擇隂感食苹而懐徳奮角觡以共觝粲珪璋而混色將攸處以寢興非鋌走而畏逼既而濯濯不羣呦呦慕類狎威鳯以來格侣騶虞而必萃笑𤣥豹以深藏哂飛黃而逺致貞姿麌麌若皓鶴之羣驚逸足駸駸齊素翬而䴢至然後飲刷銅沼咆哮瓊田忽徃顧以騰倚時决驟以周旋分形雪散曵影霜懸豈有虞之可即將不羇於永年嘉禎祥之肹蠁知君徳之届天大矣哉固當不愛其道不藏其珍我澤如浸我惠如春矧㣲貺之不腆豈足彰乎至仁者哉伊兹獸之匪陋亦大塊之品物感陶冶之相甄㑹禎祥之駿發將因質以受彩豈不緇而自伐與芻狗之陶甄光圖牒之剪拂泱泱大風盛徳惟充嗟不識之狂簡願賡歌於帝功歌曰徳由庚兮羣物凑恊嘉祥兮擾靈獸感訢合於天符遂充塞於君囿白鹿夾輈賦以行春布和瑞獸來格為韻許季同政洽于下物惟表神彼奔走之絶類忽馴擾而歸仁爾夾於輈豈陳力以効感我行其野將勸農以務春眷芳林之躍躍偶大車之轔轔觀其頓足髙歩㢠廻還左顧參熊軾而左右分光望隼旟而疾徐有度惟徳是擇惟賢是輔觀皓影之來儀諒和風之克布暠皛真明霜濃雪輕標玉質貫金精始呦呦而雙止終麌麌而偕行載馳載驅軼輕塵於後乗乍騰乍倚驚逸騖於前旌映丹帷之暉煥一作暎陪露冕之光榮懐仁於衛君之轂亡疑作㤀味於食野之苹則福履攸綏神休是格翼戴髙駕徜徉廣陌不驚不懼彰爾性之閒和克皎克明契我躬之潔白躑躅徘徊飲化而來政言可矣人詠康哉表靈慶而有同神鳯狎馴養而不異龍媒懿彼僊都誕兹靈獸勁角昭勇鮮光挺秀行而擇地恒町疃於道途出或以明靡棲息於園囿老耼之御徒迷王母之乗何陋剪去煩苛敷陳惠和皇疑作蝗出境而奚爾珠還浦而其何曷若兹鹿擾于明義覈其理而莫窮求其類而罕譬無心而應感不言而表瑞豈止其効於賤微樂驅馳於仁智而己白兎賦以至仁垂化靈物表祥為韻蔣防聖理遐逺圓穹二字一作毛羣効靈有兎爰止載白其形乗金氣而來居然正色因月輪而下大叶祥經豈不以應至道之神化彰吾君之徳馨皎似霜輝温如玉粹毫素絲而可擬足瓊枝而取類與三窟以殊歸將五靈而共至潔朗貞質聨綿雅致名殊東郭韓盧不敢趨前迹近中林蒼鷹無由得鷙其容炳真其性懐仁飲玉池而氷光不散食瑶草而雪影長新理符守黒事異文身儻使銜鈎殷帝之狼不若如令受彩江生之筆非神載寢載興或馴或擾仰天鑒以昭晰託御林而皎皛為太白之材用作殊祥之標表原夫隂隲所為不識不知賁然練被烱若星馳白則西方其理且同於服順兎為明視其義取鑒於安危豈惟跧伏于林藪騰躍於堂垂者哉觀其閑暇沐浴鴻化笑魯殿之浮名恥梁園之舊價俾夫守株之士㡬恨窮通過隙之駒空悲代謝是知隐霧而憂者其文蔚反袂而嗟者其道屈曷若保貞白以暉映承聖靈之剪拂同瑞牒而登髙異周書而玩物所以充福應富禎祥事資朴素匪亞文章知獸用之不擾審天符之允臧伴祥烏於苑囿隣瑞鴈於池塘懿夫以道徳為蹄者其可㤀文苑英華巻八十九
