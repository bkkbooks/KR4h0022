body:
  text: 文苑英華巻三百十宋李昉等編悲悼十挽歌八十六首彭城王挽歌盧思道旭旦禁門開隠隠靈輿發纔㸔鳳樓迥稍視龍山没猶陳五營騎尚聚三河卒容衞儼来歸空山照秋月以下三篇並見初學記樂平長公主挽歌粧臺一作樓對馳道吹臺臨景舍風入上春朝月滿凉秋夜未言歌笑畢已覺生榮謝何時洛水濵芝田觧龍駕樂大夫挽歌二首駱賔王蒿里誰家地松門何代邱百年三萬日一别㡬千秋反照寒無影窮泉凍不流居然同物化何處欲蔵舟以下四篇並見集本二一旦先朝菌千秋掩夜臺青鳥新兆去白馬故人来草露當春泣松風向夕哀寧知荒壠外淚集作弔鶴自徘徊丹陽刺史挽詞二首前人百齡嗟倏忽一旦向集作附山阿丹桂消亡盡青松哀思多薫風應聽曲薤露反成歌自有藏舟處誰憐隙駟過二惻愴恒山羽留連棣萼篇佳城非舊日京兆即新天集作阡城郭三千歳丘陵㡬萬年惟餘松栢壠朝夕起寒烟故北平公主挽歌上官儀木落園池集作林曠庭空風露寒北里清音絶南陔芳草殘逺氣猶生初學記作摽劍浮雲尚冩冠寂寞琴臺晩秋隂入井幹上高宻長公主挽歌前人湖渚韜靈跡娥臺静瑞音鳳逐清簫逺鸞隨幽鏡沉霜處華英落風前銀燭侵寂寞平陽宅月冷洞房深永泰公主挽歌二首吴兢穠華從婦道釐䧏適諸侯河漢天孫合瀟湘帝子逰闗雎方作訓鳴鳳自相求可嘆凌波迹東川遂不流二舜華徂北渚宸思結南陽盭綬哀榮備遊軒寵悼彰三川謀逺日八水宅連岡無復秦樓上吹簫下鳳凰户部尚書崔公挽詞崔融八座圖書委三台章奏盈舉盃常有勸曳履忽無聲市若荆州罷池如薛縣平空餘南斗劍天子署高名韋長史挽歌前人日落桑榆下寒生松栢中㝠㝠多苦霧切切有悲風市兆新阡濶扶陽甲第空郭門從此送荆棘漸朦朧馬武騎挽歌二首李嶠五日皆休沐三泉獨不歸池臺金闕是罇酒瑇筵非巷静逰禽入門閑過客稀惟餘昔年鳳尚遶故樓飛二昔下天津舘常過帝子家夜傾金屋酒一作盃春舞玉臺花試馬依紅埒吹簫弄紫霞誰言東郭路翻作北門車武三思挽歌前人玉匣金為縷銀鈎石作銘短歌傷薤曲長暮泣松扄事往昏朝霧人亡折夜星忠賢良可惜圖畫入丹青天官崔侍郎夫人盧氏挽歌前人寵服當年盛芳魂此地窮劍飛龍匣在人去鵲巢空簞愴孤生竹琴哀半死桐惟當青史上千載仰嬪風梁宣王挽詞三首宋之問貴藩堯母族外戚漢家親業重興王際功高復辟辰愛君惟報國樂善不防身今日衣冠送空傷置醴人二金精何日閉玉匣此時開東望連吾子南瞻近帝臺地形龜食報墳土燕銜来可嘆虞歌夕紛紛騎吹廻三像設千名在平生萬事違綵斿翻寳一作葆吹圭翣奠靈衣壠日寒無影交一作郊雲凍不飛君王留此地駟馬欲何歸魯忠王挽詞三首前人同盟㑹五月歸𦵏出三條日慘咸陽樹天寒渭水橋稍㸔朱鷺轉尚識紫騮驕寂寞泉臺恨從茲罷玉簫二邦家錫寵光存没貴忠良遂裂山河地追尊父子王人悲槐里月馬踏槿原霜别向天京兆悠悠此路長三樹羽迎朝日撞鍾望早霞故人悲宿草中使惨晨笳氣有衝天劍星無犯斗槎惟餘孔公宅長接魯王家范陽王挽詞二首前人賢相穪邦傑清流舉代推公才掩諸夏文體變當時賔弔翻成鶴人亡惜喻龜洛陽今紙貴猶冩太冲詞二贈衮徽章洽求書秘草成客隨朝露盡人逐夜舟驚蒿里衣冠送松門印綬迎誰知楊伯起今日重哀榮故趙王属贈黄門侍郎上官公挽詞二首常門旌舊徳班氏業前書謫去因丞相歸来為媫妤周原烏相塚越嶺鴈隨車㝠漠辭昭代空憐賦子虚二緑車隨帝青鎖翊宸機昔往朝歌騎今虚夕拜闈枊河悽挽曲薤露濕靈衣一厝一作昔窮泉壤一作閉雙鸞遂不飛同前李乂暮歸泉壤幽一作隔朝發城池戀漢疇結愁隂秦川一作陵下悲霰駸駸百駟馳憫憫羣龍餞石馬徒自施玉人終不見故西臺侍郎上官公挽歌前人㝢内文儒重朝端禮命優立言多啓沃論道盛謀猷顧日琴安在衝星劍不留徒懐東武襚更掩北原邱高安公主挽歌二首前人湯沐三千賦樓臺十二重銀鑪稱貴子一作幸玉輦盛過逢嬪則留中饋娥輝没下舂平陽百嵗後歌舞為誰容二賔衞儼相依横門啓曙扉一作暉靈隂蟾兎缺仙影鳳凰飛一水秋難渡三泉夜不歸况臨青女節瑶草更前衰淮陽公主挽歌玉顔生漢渚金縷化邙塵湯沐榮天女哀榮感路人鳳凰曽作伴螻蟻忽為親疇日成蹊處穠華不復春天官崔侍郎夫人盧氏挽歌沈佺期偕老言何謬香䰟事果違潘魚從此隔陳鳳宛然飛埋鏡泉中暗蔵燈地下㣲猶憑少君術髣髴覩容輝章懐太子靖妃挽詞前人彤史佳聲載青宫懿範留形將鸞鏡隠魂伴鳳笙遊送馬嘶殘日新塋落晩秋不知蒿里曙空見壠雲愁秦州薛都督挽詞前人十里綘山幽千年汾水流碑傳門客建劒是故人留隴樹烟􅅤夕山門月對秋古来鍾鼎盛共盡一蒿邱崔尚書挽歌張説相宅隆坤寳承家占海封庭中男執鴈門外女乘龍鳴玉遊三省摐金待九重一朝賔客散留劔在青松以下四篇並見集本右丞相蘇公挽詞前人王宰丹青化春卿禮樂才緇衣傳舊職華衮贈新哀路泣羣官送山嘶駟馬迴佳城無白日賔閣有青苔崔司業挽詞前人像設存華舘威儀下墓田鳳池傷舊草麟史泣遺篇帷盖墟烟没干旌壠日懸古来埋玉樹流恨盡集作滿山川李工部挽詞前人宅兆西陵上平生雅志從城臨丹闕近山望白雲重㑹𦵏知元伯㸔碑識蔡邕無由接神理揮涕向青松贈司徒豆盧府君挽詞蘇頲寵贈追湖廣親臨比賀循㡬聞投誄客多㑹服緦人草閉墳将古松隂一作深地不春二陵猶可望存没有忠臣故右散騎常侍侍讀舒國公禇公挽歌陽翟䟽豐構臨平演慶源學筵尊授几儒服寵乗軒審諭留中宻開陳與上言徂輝一不惜空有賜東園故高安大長公主挽詞前人彫一作彤管承師訓青圭備禮容孟孫家代寵元女國朝封柔軌題貞順閑規賦肅雍寧知落照盡霜吹入悲松故徐州刺史贈吏部侍郎蘇公挽詞張九齡韋元方繼相荀爽復齊名在貴兼天爵能賢出世卿學聞金馬縱集作詔神見玉人情藏壑今如此為山遂不成故滎陽郡君蘇氏挽詞二首前人門緒公侯列嬪風詩禮行松蘿方有寄桃李忽無成劔去雙龍别雛哀九鳳鳴何言嶧山樹還似半生情二永嘆芳魂斷行㸔草露滋二宗榮盛日千古别離時竟罷生香集作芻贈空留畫扇悲客車候曉發何處是歸期眉州康司馬挽歌前人家授専門學人稱入室賢劉楨徒有氣管輅獨無年謫去長沙國魂歸京兆阡終集作繼来匣中鏡埋没罷衝天故太常卿贈禮部尚書李公及夫人挽歌二首蔣溪白簡常持憲黄圖復尹京能標百郡則威肅一朝清典秩崇三禮臨戎振五兵更聞傳世業才子有高名二封樹遵同穴生平此共歸鏡埋鸞已去泉掩鳳何飛薤挽疑笳曲松風思翟衣易名将寵贈泉路滿光輝故太子太師徐公挽歌四首王維功徳冠羣英彌綸有大名軒皇用風后傅説是星精就第優遺老来朝詔不名疊押名字留候常集作嘗辟榖何苦不長生以下五篇並見集本二謀猷為將相翊賛奉宸集作乗輿履劔升前殿貂蟬託後車齊侯䟽土宇漢室頼圖書僻處留田宅仍纔十畆集作頃餘三舊里趨庭日新年置酒辰聞詩鸞渚客獻賦鳳樓人北首辭明主東堂哭大臣猶思御朱輅不惜汙車茵四久踐中台座終登上将壇誰将斷車騎空憶盛衣冠風日咸陽慘笳簫渭水寒尤人當思闕應罷太師官故西河杜太守挽詞前人天上去西征雲中䕶北平生擒白馬将連破黒鵰城忽見芻靈善徒聞竹使榮空留左氏傳誰繼卜商名吏部逹奚侍郎夫人㓂氏挽詞二首前人束帶将朝日鳴環映牖辰能令諌王主相助識賢人遺挂空留壁廽文日覆塵金蠶将畫柳何處更知春二女史悲彤管夫人罷錦軒卜營瞻二室行哭度千門愁日光能淡寒川浪自翻一朝成萬古松栢暗平原故右丞相贈太師燕文貞公挽詞二首孫逖海内文章伯朝端禮樂英一言興寳運三入濟蒼生命與才相偶年将位不并台星忽已折流慟軫皇情二甲第三長㦸高門四列侯已成冠蓋里更有鳳凰樓人􅕊方為樂生涯遽若休空為一作餘掌綸地傳慶與千秋故陳州刺史贈兵部尚書韋公挽歌前人奕葉金章貴連枝鼎位尊台庭為鳳穴相府是鴒原世閲空悲命泉幽不返魂惟餘漢臣史經術賛韋門故程将軍妻南陽郡夫人樊氏挽歌前人徳配程休甫名高魯季姜寵縈蒼玉佩宴曼欎金堂白日期偕老幽泉忽悼亡國風猶在詠江漢近南陽故女道士婉儀太原郭氏挽歌二首劉長卿作範宫闈睦歸真藝業集作道藝超馭風仙路逺背日集作月帝居集作宫遥鸞殿空留處霓裳已罷朝淮王哀不盡松栢但蕭蕭以下十篇並見集本二宫禁恩集作思長隔神仙道已分人間驚早露天上失朝雲逝水年無限佳城日易曛簫聲浮薤曲哀斷不堪聞玉清公主挽詞張謂學鳯年猶少乘龍日尚賖初封千户邑忽駕五雲車地接金人岸山藏玉女家秋風何太早吹落禁園花故僕射裴公挽歌三首岑參盛徳資邦傑嘉謀作􅕊程門瞻駟馬貴時仰八裴晉人八裴一作龍榮罷市秦人送還鄉綘老迎莫埋丞相印留着付元成二二府一作五府瞻高位三台䘮大賢禮容還故綘寵贈冠集作過新田氣歇汾陽鼎魂飛京兆天一作阡先時劔已沒壟樹久蒼然三富貴徒言久鄉閭沒後歸錦衣都未着丹旐忽先飛哀挽辭秦塞悲笳出帝畿遥知九原上漸逺弔人稀故國相公挽歌二首李嘉祐文若為全徳留侯是重名論功長不宰因病得無生大夣依禪定高墳仰化成自應憐寂滅人世但傷情二共美持衡日皆言折檻時蜀臣集作侯供廟畧漢主缺一作闕台司車馬行仍止笳簫咽又悲今年杜陵栢集作陌殄瘁泣遲遲集作百花遲故吏部韋郎中贈給事中挽歌前人神理今何在斯人竟若斯顔淵徒有徳伯道且無兒白髪今悲老青雲數有竒誰言夕郎拜翻向夜臺悲故相國苖公挽歌錢起㶚陵誰寵𦵏漢主念蕭何盛業留青史浮雲逐逝波壟雲仍作雨薤露已成歌愴悽平津閤秋風弔客過􅈶公合祔挽歌顧况草露前朝事荆茅聖主封空傳餘竹帛永絶舊歌鍾清鏡無雙影窮泉有㡬重笳簫最悲處風入九松原相國晉公挽歌二首玉節朝天罷洪爐造化新中和方作聖太素忽収神盛徳横千古高標出四隣欲知言不盡處處有遺塵二凝笳催曉奠丹旐向青山夕照新塋近秋風故吏還本期光漢代從此掃胡闗今日天難問浮雲滿世間晉公魏國夫人桞氏挽歌前人魚軒海上遥鸞影月中銷雙劔来時合孤桐去日凋夕陽迷隴隧秋風咽笳簫畫翣無留影銘旌已度橋義川公主挽詞前人弄玉吹簫後湘陵鼔瑟時月邉丹桂落風底白楊悲雜珮分泉户餘香出繐帷夜臺飛鏡匣偏共掩娥眉張丞相挽歌李端素斾低寒水清笳出曉風烏来傷賈傅馬立禍滕公松栢青山上城池白日中一朝今古隔唯有月明同西河郡太原守張夫人挽歌李峰一作岑鵲印慶仍傳魚軒寵莫先從夫元凱貴訓子孟軻賢龍是雙歸日鸞非獨舞年哀榮今共盡悽愴杜陵田故太尉兼中書令贈太師西平郡王挽歌權徳輿翊戴推元老謀猷合大君河山封故地金石表新墳劔履歸長夜笳簫咽暮雲還經誓師處薤露不堪聞以下十一篇並見集本故司徒兼侍郎贈太傅北斗郡王挽詞前人授律勲庸盛居中鼎鼐和佐時調四氣盡集作宣力静三河忽訪天京兆空傳漢伏波今朝麟閣上偏軫聖情多贈梁國惠康公主挽歌前人外舘嬪儀貴中參睿渥深初笄横白玉盛服縷集作鏤黄金鳳度簫聲逺河低婺彩沉夜臺留册謚悽愴有集作即徽音贈魏國憲穆公主挽詞前人漢制榮儀集作申服周詩美肅雍禮尊同聖主恩賜大明封外舘留圖史隂臺集作堂閟徳容睿慈歌薤露千古仰芳蹤湖南觀察史故相國袁公挽歌二首前人五驅龍虎節一入鳳凰池令尹自無喜羊公人不疑天歸京兆日葉下洞庭時湘水秋風至凄凉吹素旗二丹旐發江臯人悲鴈亦號湘南罷亥市漢上改詞曹表墓雙碑立尊名一字褒常聞平楚獄為報里門高恭王故太妃挽歌二首元稹燕姞貽天夣梁王盡孝思雖從魏詔𦵏得用漢官儀集作藩儀曙月殘光歛寒簫度曲遲平生逄恩地哀挽欲何之二文衛羅新壙仙娥掩暝山雪雲埋隴合簫鼔望城還寒樹風難静霜郊夜更寒哀榮深孝嗣儀表在河間元相公挽歌三首白居易銘旌官重威儀盛騎吹聲繁鹵簿長後魏帝孫唐宰相六年七月塟咸陽二墓門已閉笳簫逺惟有夫人哭未集作不休蒼蒼露草咸陽壟此是千秋第一秋三送塟萬人皆慘澹反虞駟馬亦悲鳴琴書劔佩皆収拾三嵗遺孤新學行文苑英華巻三百十
