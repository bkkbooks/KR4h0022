body:
  text: 文苑英華卷二百八十六宋李昉等編留别一梁元帝二首何遜一首任昉一首呉均五首劉顯一首劉孝綽一首宗史一首庾抱一首賀力牧一首孫萬夀一首孔紹安一首王勃三首盧照隣四首駱賓王三首禇亮一首崔融一首陳子昻六首宋之問四首崔湜一首張説五首蘇頲一首王維二首孟浩然五首杜甫三首李白三首祖詠二首常建一首別荆州吏民二首梁元帝寄言謝桀黠無乃氣干雲安知㶚陵下復有李将軍二莫言江漢逺烟霞隔數千何必黄丞相重應臨潁川從鎮江州與故逰别何遜歴稔共追隨類聚作遊一旦辭羣匹復如東流水未有西歸日夜雨滴空堦天曉類聚作曉燈暗離室相悲各罷酒何時更促膝别蕭諮議衍任昉離燭有窮輝别念無終緒岐言未及申離白一作目已先舉揆景巫衡一作荇蕪阿臨風長楸渚浮雲難嗣音徘徊悵誰與儻有關外驛聊訪狎鷗嶼一作鷺凡一作皆藝文類聚贈别新林吳均僕本幽并兒抱劔事邉陲風亂青絲絡霧染黄金羈天子既無賞公卿竟不知去去歸去來還傾鸚鵡杯氣為故交絶心為新知開但令寸心是何湏銅雀䑓發湘州贈親故别三首前人相送出江潯淚下霑衣襟何用叙離别臨岐贈好音敬通才如此君山學復深明哲遂無賞文華空見沉古來非一日無事更勞心二雲生曉靄靄花落夜霏霏問余何意别荅言倦遊歸徒勞易水布空負洛陽衣懐金無人别抱玉遂成非安得乆留滯商山饒白薇三君留朱門裏我至廣江濆城高望猶見風多聽不聞流蘋方繞繞落葉尚紛紛無由得共賞山川間白雲壽陽還與親故别前人故人來送别帳酒臨行阡露繁秋色慢氣愴蟪聲煎鴈渡章華國葉辭洞庭天復有向隅淚中腸皆涕漣但願千丈松結景雲之峰山高日華早枝多風彩疑重我還愛芳杜君住揖驪龍發新林浦贈同省劉顯見類聚回首望歸塗山川邈離異落日懸秋浦歸鳥飛相次感物傷我情惆悵懐親懿發建興渚示到陸二黄門劉孝綽見類聚扁舟去平樂還顧極川梁猶聞棗下吹尚識杏間堂洛橋分曲渚官寺隠回塘客行裁跬歩即事已多傷况復千餘里悲心未遽央别蕭諮議衍宗史别酒正參差乖情将陸離悵焉臨桂苑愍然瞻華池輕雲流惠彩時雨亂清漪耿耿類聚𦕈𦕈追蘭徑悠悠結芳枝眷言終何托心寄方在斯别蔡參軍庾抱人世多飄忽溝水易西東今日歡娯盡何年風月同悲生萬里外恨起一杯中性靈如未失南北有征鴻亂後别蘇州人賀力牧徘徊睇閶闔悵望極姑蘇慨矣嗟荒運悲哉惜覇圖子常終覆郢宰嚭遂亡呉石隕星方暗山崩川自枯周京摧棫樸漢社落枌榆宫毁無巢燕城空餘樂烏兹邦號端委多士自相趨照廡同燕石光車等魏珠言離已惆悵念别更踟蹰若訪任公子求余東海隅贈别孫萬壽昔我遊雲閣及爾謬同官髙歩參師友長裾接綺紈索居方十載相思勞萬端不言今夕遇得盡故人歡酒隨彭澤至瑟即武城彈高齋屏餘熱珍簟宿輕寒葉落霜威重蓂踈月色殘将歸動離恨彌傷行路難别徐永元秀才孔紹安金湯既失險玉石乃同焚墜葉還相覆落羽更為羣豈謂三秋節重傷千里分促離絃易轉幽咽水難聞欲識相思處山川間白雲秋日奉别王長史公王勃别路千萬里深恩重百年空悲西候日更動北梁集作北京篇野色籠寒霧山光歛暮烟終知難再奉懐徳自澘然别薛升華前人明月沉珠浦秋風濯錦川樓䑓集作關山臨絶岸洲渚亘長天旅泊集作飄泊成千里棲遑共百年窮途唯有淚還望獨澘然秋日别薛升華前人送送多窮路遑遑獨問津悲凉千里道悽斷百年身心事同漂泊生涯共苦辛無論去與住俱是夣中人西使兼送孟學士南遊盧照隣地道巴陵北天山弱水東相看萬餘里共以疑一征篷零雨悲王粲清罇别孔融徘徊聞夜鶴悵望待秋鴻骨肉胡秦外風塵關塞中唯餘劔鋒在耿耿氣成虹還赴蜀中貽示京邑遊好前人籞宿花􅀄滿章䑓栁尚飛如何正此日還望集作喜昔多違悵别風期阻将乖雲㑹稀歛衽辭丹闕懸津陟翠㣲野禽喧戍鼓春草變征衣回顧長安道關山起夕霏晩渡渭橋寄示京邑逰好前人我行背城闕驅馬獨悠悠寥落百年事徘徊萬里憂途遥日向夕時晩鬢将秋滔滔俯東逝耿耿泣西浮長虹掩釣浦落鴈下星洲草變黄山曲花飛清渭流迸集作逆水驚愁鷺騰沙起狎鷗一赴清泥道空思𤣥㶚逰從蜀還京贈别己見二百六十七巻盧照鄰秋日别侯四得彈字駱賔王我留安豹隠君去學鵬摶岐路分襟易㠶潮集作風雲促膝難夕漲流波急秋山落日寒唯有思鄉集作歸引悽斷為君彈西行别東䑓詳正學士前人意氣坐相親關河别故人客似秦川上歌疑易水濵塞荒行辯玉䑓逺尚名輪洩井懐邉将尋源重漢臣上苑梅花早御溝楊桞新秖應持此曲别作邉城春别李嶠得勝字芳樽徒自滿别恨轉難勝客似遊江岸人疑上㶚陵寒更承夜永凉景向秋澄離心何以贈自有玉壺氷晩别樂記室産褚亮窮途屬歲晩臨水忽分悲抱影同為客傷情去此時霧色侵虗牖霜氛冷薄帷舉袂慘将别停杯悵不怡風嚴征鴈逺雪暗去蓬遲他鄉有岐路遊子欲何之留别杜審言并呈洛中舊遊崔融斑鬢今為别紅顔集作塵昨共遊年年春不待處處酒相留駐馬西橋上回車南陌頭故人從此隔風月坐悠悠落第西還别魏四懔陳子昻轉蓬方不定落羽自驚弦山水一為别歡娯復㡬年離亭暗風雨征路入雲烟還因北山逕歸守東陂田以下六篇並見集本落第西還别劉祭酒髙明府前人别舘分周國歸驂入漢京地連函谷塞川接廣陵集作陽城望逈樓䑓出途遥烟霧生莫言長落羽貧賤一交情春夜别友人二首前人銀燭吐青烟金樽對綺筵離堂思琴瑟别路遶山川明月隠高樹長河没曉天悠悠洛陽道此㑹在何年二紫塞白雲斷青春明月􅀄對此芳罇夜離憂悵有餘清泠花露滿滴瀝簷宇虗懐君欲何贈願上大臣書遂州南江别鄉里集作曲故人前人楚江復為客征棹方悠悠故人憫追送置酒此南州平生亦何恨夙昔在林丘違此鄉山别長謡去國愁别李參軍崇嗣前人四十九變化一十三死生翕忽𤣥黄裏驅馳風雨情是非紛妄作寵辱坐相驚至公集作人獨幽覽窈窕隨昏明咫尺山河道軒牕日月庭别離焉足問悲樂固能并我軰何為爾栖遑猶未平金䑓可攀陟寳葢絶将迎户牖觀天地階基上杳冥自超三界樂安知萬里征中國要荒内人寰字宙縈弦望如朝夕寧嗟蜀道行留别之望舍弟宋之問同氣有三人分飛在此晨西馳巴嶺徼東去汶陽濵强飲離前酒終傷别後神雖集作誰憐散花蕚獨赴日南春漢江宴别前人漢廣不分天舟移杳若仙秋虹映晩日江鶴弄晴烟積水浮冠葢揺風逐管絃嬉遊不可極留恨此山川積水集作積氣端州别袁侍郎前人合浦塗未極端溪行蹔臨淚來空泣臉愁至不知心客醉山月净猿啼江樹深明朝共分手之子愛千金渡呉江别王長史前人倚棹望兹川銷魂獨黯然鄉連江北樹雲斷日南天鈎别集作劔别龍􅀄沒書成鴈不傳離舟意無限催渡復催年贈蘇少府赴任江南余時還京崔湜丈夫不歎别達士自安卑攬泣固無趣銜杯空爾為流雲春窈窕去水暮逶迤行舟忽東泛歸騎亦西馳秦地多芳草江潭有桂枝誰言阻遐闊所貴在相知南中别王陵成崇張説握手與君别岐路贈一言曹卿禮公子楚媪饋王孫倐爾生六翮翻飛戾九閽常懐客鳥意㑹答主人恩以下五篇並見集本石門别楊六欽望前人燕人同竄越萬里自相哀影響無期㑹江山此地來暮年傷汎梗累日慰寒灰潮水東南落浮雲西北廻俱看石門逺倚棹兩悠集作悲哉端州别高六戩前人異壤同羇竄途中喜共過愁來時舉酒勞罷或長歌南海風潮壯西江瘴癘多於焉復分手此别傷如何南中别蔣五向青州己見二百六十七巻前人南中别陳七李十二年共遊處一旦各西東請君聊駐馬看我轉征蓬畫鷁愁南海離駒思北風何時侣春鴈䨇入上林中陳倉别隴州司户李惟深蘇頲京國自携手同途欣觧頥情言正的的春物宛遲遲忽背雕戈星疑旋瞻獲寳祠蜀城余出守呉岳爾歸思歡愜更傷此春殷殊念兹揚麾北林徑跂石南澗湄中作壺觴餞回添道路悲數花臨磴日百草覆田時有美同人意無為行子辭高歌㧞劔起吾是答恩私留别温古上人兄幷示弟縉王維解薜登天朝去時集作師偶將集作時哲豈唯山中人兼負松上月宿昔同遊止致身雲霞末開軒臨潁陽卧視飛鳥没好依盤石飯屢對瀑泉歇一作渇理齊狎小隠道勝寜外物舍弟官崇髙宗兄比削髪荆扉但灑掃乗閒當過拂集作歇留别丘爲前人歸鞍白雲外繚繞出前山今日又明日自知心不閒親勞簮組送欲趂鸎花還一歩一回首遲遲向近關將適天台留别臨安李主簿孟浩然枳棘君尚栖匏𤓰吾豈繫誰念離亭下集作當夏淡一作飄泊指炎裔江海非惰逰田園失歸計空山既早發漁浦亦宵濟汎汎隨波瀾行行任艫枻故林日已逺羣木坐成翳羽人在丹丘吾亦從此逝東京留别諸公前人吾道昧所適驅車還向東主人開舊舘留客醉新豐樹繞温泉緑塵遮曉日紅拂衣從此去高歩躡華嵩留别王侍御前人寂寂竟何待朝朝空自歸欲尋芳草去惜與故人違當路誰相假知音世所稀秪應守索寞還掩故園扉遊江西留别富陽裴劉二少府前人西上遊江西臨流恨解携千山疊成障萬水瀉為溪石淺流難泝藤長險易躋誰憐問津客歲晏此中迷適越留别譙縣張主簿申屠少府前人朝乗汴河流夕次譙縣界幸因集作值西風吹得與故人㑹君學梅福隠予隨集作從伯鸞邁别後能相思浮雲去集作在呉㑹暮秋將歸秦留别湖南幕府親友杜甫水濶蒼梧晩集作野天髙白帝秋途窮那免哭身老不禁愁大府才能㑹諸公徳業優北歸衝雨雪俱集作誰慜弊貂裘留别嚴賈二國老兩院遺𥙷諸公前人田園湏暫徃戎馬惜離羣去逺留詩别愁多任酒醺一秋常苦雨今日始無雲山路晴吹笛集作角那堪處處聞别董頲前人窮冬急風水逆浪開㠶難士子甘旨闕不知道里寒有求彼樂土南適小長安到我舟檝去覺君衣裳單素聞趙公節兼盡賔主歡己結門廬望無令霜雪殘老夫纜亦解晩粟朝未飡飄蕩甲兵際㡬時懐抱寛漢陽頗寧静峴首試考槃當念著白㡌采薇青雲端夜别張五李白吾多張公子别酌酣髙堂聽歌舞銀燭把酒輕羅裳横笛弄秋水集作月琵琶彈陌桑龍泉解錦帶為爾傾千觴江夏别宋之悌前人楚水清若空遥將碧海通人分千里外興在一杯中谷鳥吟晴日江猿嘯晩風平生不下淚於此泣無窮出金門後書懐留别翰林諸公前人好古笑流俗素聞賢達風方希佐明主長揖辭成功白日在青天回光照㣲躬恭承鳯凰詔欻起雲蘿中清切紫霄迥優㳺丹禁通君王賜顔色聲價凌烟虹乗輿擁翠葢扈從京城東寳馬麗絶景錦衣入新豐倚巖望松雪對酒鳴絲桐因學揚子雲獻賦甘泉宫天書美片善清芬播無窮歸來入咸陽談笑皆王公一朝去金馬飄落成飛蓬賔從日踈散玉罇尋己空才力猶可倚不慙世上雄聞作東武吟曲盡情未終書此謝知已滄浪集作波尋釣翁留别裴聰盧象祖詠朝來已握手宿别更傷心㶚水行人渡商山驛路深故情君且足謫宦我難任直道皆如此誰能淚滿襟歸汝墳山荘留别盧象前人淹留歲將晏乆廢南山期舊業不見棄還山從此辭漚麻入南澗刈楚向東菑對酒雞黍􅍄閉門風雪時非君一延首誰慰遥相思潭州留别常建賢達不相識偶然交已深宿㠶謁郡佐悵别依禪林湘水流入海楚雲千里心望君杉松夜山月清猿吟文苑英華巻二百八十六
