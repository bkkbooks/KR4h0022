body:
  text: 文苑英華卷九百四十九宋李昉等編職官十一葛郎將威徳墓誌一首臧羽林墓誌一首劉驃騎海賔墓誌一首梁冠軍慎初墓誌一首閻金吾用之墓誌一首馬將軍實墓誌一首贈郎將葛君墓誌張說公諱威徳字某曰集無此字葛氏本梁國寧陵人也因遷徙今居京兆涇陽縣父寳未仕早世公室無陶白之資朝無金張之援不承過庭之訓不漸鼔篋之術而能􅁬飛喬木獨㧞深濟冨忠孝而由已善射馭而聞天早以武藝妙選供奉每扈逰别館侍蹕禁林何甞不左發五豝傍連雙兎嵗乆拜元城府左果毅都尉尋加上柱國入陪内伏思馬期才出典外軍握兵之要所謂白珪集作桂非特逹青雲自致者也其用未展其生有涯神功二年某月日終於東都私第殯於北邙山之原夫人太原郡太夫人郭氏從夫有禮以子而貴開元八年十一月薨於京師之脩真里有子福順克家用孝開國推集作惟忠泣風樹之無追痛榮禄之不逮哀戚之情上感餙終之澤下流窀穸有期祖奠將設有詔贈右驍騎集作衞郎將開元九年二月七日合塟於長安縣龍首鄉禮也鬱鬱宰樹蒼蒼墓田恐佳城之見日秘銘石於重泉詞曰都尉武逹夫人禮封令徳髙行譽偶榮集作名雙自古迄今仁賢同盡唯傳忠者集作孝餘慶不冺羽林大將軍臧公墓誌銘李邕夫纒兵者㝢内所苦用武者朔漠所懸粤若董戎三軍司帥萬里未易為也是以累戰必勝所謂興國每守必固所謂扞邉英雄歟忠公歟不然曷以分命山河書勲竹帛者也公諱某字某莒人也其先周公之祚𦙍自僖伯哀伯正詞魯史太傅太守理迹漢朝克揚厥休不冺于代所從来逺矣公即隋銀青光禄大夫海州㧾管上柱國東海公府君之曽孫皇朝請大夫靈州長史上柱國襲東海公寵府君之孫皇朝散大夫原州司馬贈銀州刺史上柱國徳府君之子少而習書長而事武特禀間氣雅伏一作持大名暗合孫呉自比管樂移家共用乃出孝首公用仁足以子人崇義足以開物弱冠應穿葉附枝舉擢弟授長上再遷果毅都尉三除即將加銀青光禄大夫莅歴單于安比靈勝洮鄯安東七州都督䕶擁旄豐安河源莫門朔方朔州平虞六軍經畧節度營田大使三入羽林大將軍加冠軍大將軍上蔡縣開國公至若設竒兵勦勍敵智出人境事揚天聲經之三邉倐忽四紀舉無遺䇿動有成功雖李牧十年武侯五月罔足以議及乎此禁旅直嚴更遏周墻之禍明增鉄障之安國又何加焉自頃卧疾時扶力强飯嘗以匃奴未滅家國所讎長吟朔風太息秋序嗚呼陵谷者地之險有時而遷日月者天之光有時而異况於人乎風瘵彌留以開元十七年八月二十二日薨于平康里之私第時春秋六十有八親友揮淚朝廷歎息逝川歸海長城復隍悲夫以明年七月卜地於白鹿原禮也嗣子定逺將軍前左驍衞翊府左郎將兼檢校左監門衞中郎將上柱國敬亷次子中大夫前安北都尉上柱國希莊三子前左金吾衞中侯賜紫金魚袋上柱國公四子前左司禦率府長史賜紫金魚袋内供奉上柱國奉忠五子前殿中省進馬上柱國敬泚等並棘風茹茶薤露泣栢號天自毒負土空寃用紀石銘將符竹簡自承訪舊逺託馳誠亊梗槩於豐碑情辛勤於絶筆其詞曰周公錫𦙍魯國因名矢魚興諌納鼎飛聲家傳禮樂代有賢英才子間出武功特興提兵北壘救敗西鄙保界七州彌曠四紀無堅不䧟無强不却三邉風清萬里雲廓謀慮縱横威名昭灼物莫能又運何以長邉也不幸人之云亡風沙未息松栢已行哀哀孝思冥冥泉壤髙山或遷其詞爰疑作妥仰庶石銘之可託或蒿里之無爽驃騎大將軍劉公墓銘穆員公諱海賔彭城人也祖滔皇朝散大夫徐州别駕父𤣥銀青光禄大夫澤州刺史公以義俠聞于汧隴之間洎天下兵興以身許國累功百戰全生萬死歴官十七政至于開府儀同三司御史中丞樂平郡王食實封五千户充涇原節度兵馬使建中初逆將劉文喜竊涇州叛皇上以神武肅毅齊一四海欲使亂臣賊子作誡于涇六月興戎群帥奔命前事之日公挈長子光國度文喜將叛而不攴也始以奏請造于帝庭敷露姦慝陳獻忠欵期以父子為其膏肓上撫而還之嗚呼天地啓公之謀果有雷電之誅假于光國之手梟磔文喜獻其元于蠻夷之邸城池師旅與功全焉天子御正殿朝百辟引公父子同日封拜公拜驃騎大將軍左驍衞大將軍依前兼御史中丞又賜實封一百五十户封光國五原郡王是時軒陛之下龍驤虎賁之士相賀且勸不旬時而名布天下宿衞中禁為王爪牙後二年長安有朱泚之亂公與故大尉叚秀實約曰公為曹沫我為荆卿期以一劔而復大駕故公先機而發有害其成叚公與公是日并命君子謂二公之死千古如生一作萬古如今時建中四年十月十日享年六十有二明年鑾輅還宫於公有未及下車之詔追贈太子太保又賜實封五百户所以􅈖禭之品禮極數殫而宸􅇆群望猶未之塞先是淮夷叛命光國東征厥後王事龜筮差池未叶盖不遑五月同盟之㑹者七年于茲矣貞元七一作六年六月四日夫人鴈門郡太夫人田氏夀若干棄養于東都安國光國衘恤卜兆得北邙山之南原西逺國門三十許里乃以日月有時之亊請于居守吏部尚書杜公公列狀以聞而餙終之典如初禮十月乙卯太保公之䘮至自京師十月已已啓太夫人之殯壬申遷而合祔焉夫人承夫以禮訓子以義享其豐報鍾慶於身然而太保有命代之勲寵位未半光國有日躋之孝色飬遽違各從其䇿不極其分悲夫光國以太子詹事兼御史中丞襲樂平郡王充東都防禦左廂兵馬次子某試太常卿清國太子通亊舎人潤國未仕皆大夫之特也光禄繼忠襲貴終以哀報願奉不朽銘之墓門其詞曰赫赫太保自天降忠見危致命有終有始佐戎于涇涇帥不龔父心子手震踣元兇皇家中否大盜遘逆偉哉叚公與我同徳將滅妖彗載清宸極天之方稔運奪其力悠悠青史異代悽惻抑抑夫人率禮無違夫忠子孝寵禄由之九原何許雙劔同歸鼔吹晨發霜清風咽生榮死哀加等備物于嗟後人無忘忠烈冠軍大將軍檢校左衞將軍開國男安定梁公墓誌銘前人公姓梁氏諱慎初字智周其先安定烏氏人髙祖曰集無此字冝春郡公諱某當隋末䘮亂豪傑並興集作王其宗人師都雄據朔方自號梁王置百官以宜春為宗正有唐貞觀初梁亡梁集無此字冝春首謀率其黨來降拜金紫光禄大夫右金吾大將軍衞贈凉集作梁州牧梁州生左千牛衞集無此字諱叔裕千牛生太子司議郎諱穆之議郎生頓邱令名犯肅宗廟諱頓邱生公少孤家貧落魄不得就經學既冠有勇力以弧矢為事性嚴簡直方不苟合於時博物集無此字渉史書一集無一字覽歴代成就山川地形攻守竒正之術已而天寳末凾夏冦亂西平王哥舒翰之守潼關也公上書論兵勢且勸深壁不戰以挫賊鋒西平異之命居戱集作越下表授左武衞胄曹四遷至左衞郎將時賊臣當國而與幕府不恊公曰難將至矣遂間行而南無何西平潰敗公嘗善祁二唐書作岐國公魯炅炅方守襄鄧乃徃從之表遷右羽林中郎將屢以果銳一作敢為軍前鋒而搴旗䧟堅者四五敷奏岐下帝甚嘉之録前後功超拜左衞軍加號冠軍封鶉觚縣開國公既拜命而告人曰徒以蠢爾材力遭亂乗勢以獲爵位傳曰無得而禄殃也吾懼及焉遂移疾請告觧印綬退耕于野春秋若干以寳應二年秋八月寢疾于河内薨于五字集作終于河間私館没顧命𦙍子賁曰始愛夫太行山之陽將營而老焉又常懼蹈白刄不獲墓墳今幸以天年終冝從吾志薄塟于此縱汝不忍為𤣥晏故事當歛以時服有棺而無槨可也是嵗卜筮不吉至大厯九年冬十二月賁始奉先公之裳帷以安宅宅字集作窆焉夫陳力就列之謂忠見幾不仕之謂智名遂身退之謂逹全而歸之之謂孝夫如是冝刻一作刋貞石遺集作告于後嗣是吾宗也實能言之銘曰肅肅鶉觚敬義直方履柔履剛出處行藏與時弛張弧矢之利以從王事乃行其志允焯厥位帝命將軍受茲蒲璧鞗革金􅫓乃蔚乃嚇人鮮克終獨守謙冲集作公獨守冲繒繳不及㝠冥髙鴻于嗟鶉觚生也有涯令聞無窮右金吾衞將軍閻公墓誌銘獨孤及公諱用之逺祖曰文周昭王瑕之後集作昭也昭集無此字生而手有文曰閻康王竒之命封閻城王主二字集作文是四十五代孫蒲仕後魏太祖為諸曹大夫自馬邑家河南其裔孫慶在隋為少司空慶生毗毗生立本立徳唐永徽中立本為中書令立徳為工部尚書立徳生𤣥邃以司空尚書之餘裕也官至澤州刺史邃生巨源嘗宰射洪有仁政射洪人詠歌之射洪第二子也温毅遜直亷恪寛信讀論語老子周易被服其教初仕彭州叅軍嘗攝督郵一日紏按本州諐謬不法數十事大守徐知人以為材後有詔擇舎人以公魁偉爽悟集作晤有醖籍乃登其選㑹戎師集無此字侵我天子方愛人息戰將以辭讓屈之詔公使西戎集作域以王命喻禍福戎人頓首請罪介馬不汗戈鋋不用而虜軍却遷右衞郎將知引駕伏金吾將軍李質上殿不觧佩刀公呵下殿陛請按以法左右皆振集作震悚自是環衞加肅先是有司以三衞執扇登殿引蹕公奏曰三衞皆趫悍有材力不當升階陛邇御座請以官者代上曰可遂為故事天寳三年册拜公長女為皇子義王玭唐書作玭妃加公左驍衞將軍遷義集作榮王傳初𤣥宗懲諸侯王之國任事或集或率多驕蹇不奉法度而受其害故開元之後皇子皇孫雖荷封建之命未嘗離阿保之手悉無出宫闕集作閣任卿大夫者公以為王居深宫則傳相職廢上䟽陳古義謁諸侯王四字集作請諸侯王申輔導之禮議雖廢格上以為忠公以集無此字已白首位為將軍諸侯傳太夫人尚無恙以銀印赤紱侍朝夕膳色難無違時人榮之太夫人捐舘舎禮五十不毁公泣血三年集作死孝既免䘮天子復因以宫端事五字集作目以端士俾傳夀王加朝散大夫上在集作幸温泉經時未還宫京師人望属車咸惟集作懷怨思公獻四十言二四字集作四言詩十一章諷諌優詔褒歎後遷左金吾將軍天寳十五載二京覆没公為虜所獲明年戎陳集作師奔然後以初秋集作服歸主主字集作至徳後二年十二月終于京師春秋五十九夫人雍州司倉叅軍博陵崔眘言之女專静冲懿慈惠而明用從集作徳禮以佐君子有古風烈亦天終其仁不逺其筭年若干月日没於私第殁六載而公薨俱權厝集作窆少陵原有四子定彚二字集止作信寧世系表止作定宷宰宣以家之不造然改二字集作世故之無定集作寧嵗也衘恤茹血不克䘮事者九載廣徳中宷以監察御史領髙陵令明年辭縣職始卜筮集作塟於故原吉乃嵗在丙午十一月日遷兆合祔焉嗚呼惟音形事業悉知集作如化徃獨陳迹可知二字集與丘墓存焉非金石則無以示乆逺故表而銘之孝子之志也其辭曰郁郁金吾洵美且静集作温事君之忠賢集作資於愛敬集作親以徳資身其祉冝繁彼美輔佐儀刑閨門禮樂是恱孝慈是敦百嵗之後令集作合徳九原獨以令範集作軌垂諸後昆輔國大將軍兼左驍衞將軍御史中丞馬公墓誌銘歐陽詹墓有誌誌有銘誌記也銘名也名之記墓庶髙岸為谷幽懐或呈情當掩者有所歸認斯馬公之墓也公諱實集作寔字某其先扶風人生於幽州髙祖某某官祖某某官父某某官若干子皆以雄謀果斷稱公則第三人長八尺有羡鵰姿鶚靈霜嚴壁峻樂而後笑時而後言孝悌忠信分義節槩覩容可見好史學厯代英豪得失皆覈其有不正不直辦論慷慨若加諸已明隂符善司馬法起家為范陽軍要籍本軍疑政畫多自出遷千夫長萬夫長三軍兵馬使莫州近邊戎數為害本軍元帥請統鎮之戎逺逃遁莫人大义拜御史中丞莫州刺史俄薊州之患如莫州移鎮集無此字薊州薊人繼康攝州刺史貞元初本軍之事有大者合議於天子自管内二千石已下擇賢能以公當其選天子異其議竒其詞决所議荅於本軍而留近侍拜左驍衞將軍宿衞十一年長松在林利錐處囊森踈頴脫鋒幹獨見天子儲而將用未有所當貞元十四年􅃦疾其年七月十一日終于京師常樂里之私第出身從事若干年署職蒞官若干政春秋五十一當時俊傑懐材抱噐者無不驚呼歎息嗚呼騏驥有騰千騁萬之足伏乎􅌴干將有剚犀截象之鋩閉乎匣將用未用一朝變化為骨燕市入泉延平為知人之痛惜公其比歟夫人鴈門田氏鴈門郡王某之女哭泣之墓痛而終集作中禮子六人男五人一人先公卒四人在曰綬曰縝曰某曰某綬年三十八縝年十六集作五其餘㓜稚不言可知女二人一人先公卒一人在四嵗皆集作此字至性攀號感動飛走以某年十一月一日塟于京兆府萬年縣洪固鄉延信里司馬村之少陵原禮也其承眷長沙歐陽某執紼及墓就誌而銘曰骨肉歸土賢愚共門英英馬公亦封此原大節大誠一作成平生所志貞心壯氣松孤壁峙掄擇雖致材成則未岑崟蒼翠俄摧忽墜脩短無涯傷如之何文苑英華卷九百四十九
