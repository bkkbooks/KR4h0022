body:
  text: 文苑英華巻三百五宋李昉等編悲悼五哭人十五首哭僧道三十首哭妓十四首送𦵏十二首哭人崔珏二首張喬二首張蠙二首曹松二首周朴二首杜荀鶴四首羅隠一首哭僧道楊烱一首孟浩然二首釋皎然一首嚴維一首劉長卿二首張謂一首錢起一首耿緯一首司空曙一首于鵠一首李端一首元禛一首賈島一首劉得仁一首李洞二首張祜一首方干一首項斯一首周賀一首温庭筠一首張喬一首李逺一首陳陶一首裴説一首沈佺期一首劉長卿一首劉禹錫一首哭妓楊烱一首宋之問四首張祜一首温庭筠一首皇甫冉一首李羣玉一首韋荘五首送𦵏張正見一首庾信一首王褒二首唐太宗一首顧况一首劉長卿一首皇甫冉一首權徳輿一首陳羽一首唐彦謙一首羅隠一首哭人哭李商隠二首崔珏成紀星郎字義山適歸髙壤又𤣥集作黄壌抱長歎詞林枝葉三春盡學海波瀾一夜乾風雨已吹燈燭滅姓名長在齒牙寒只應物外攀琪樹便著蜺裳上綘壇又𤣥集作蜺衣上玉壇二虚負凌雲萬丈才一生襟抱未曽開鳥啼花落人何在竹死桐枯鳯不来良馬是因無主踠舊交心為絶絃哀九泉莫嘆三光隔又送文星入夜臺哭陳陶三百四卷重出題作哭張籍司業張喬弔前水部賈員外籠中江海禽日夕有歸心魏闕長謡久吳山獨往深别時羣木落終處亂猿吟李白墳前路溪僧送入林哭建州李員外張蠙詩名不易出名出又何為㨗到重科早官終一郡卑素風無後裔遺迹集作遺愛有生祠自罷羊公市溪猿哭舊時弔孟浩然前人每年疑樵家説孤墳亦夜吟若重生此世應更苦前心名與襄陽逺詩同漢水深親栽鹿門樹猶盖石牀隂哭建州李員外曹松銘旌歸故里猿鳥亦悽然已𦵏桐江月空廻建水舡客傳為郡日僧説讀書年恐有吟魂在深山古木邉弔李翰林前人李白雖然成異物逸名猶與萬方傳昔朝曽侍𤣥宗側大夜應歸賀監邉山木易高迷故壠國風長在見遺篇投金渚畔春楊栁自此何人繫酒舡哭陳庾周朴繫馬向山立一杯聊奠君野煙孤客路寒草故人墳琴韻歸流水詩情寄白雲日斜休哭後一作處松韻一作吹不堪聞哭李端前人三年剪拂感知音哭向青山永夜心竹在曉煙孤鳳去劔荒秋水一龍沉新墳日落松聲小舊宅春殘草色深不及此時親執紼石門遥想淚沾襟哭方干杜荀鶴何言寸禄不沾身身殁詩名萬古存况有數篇闗教化得無餘慶及兒孫漁樵共壘墳三尺猿鶴同棲月一村天下未寧吾道喪更誰将酒酹孤䰟哭劉得仁前人賈島還如此生前不見春豈能詩苦者便是命覊人家事因吟失一作盡時情礙國親多應銜骨恨千古不為塵經謝公青山弔李翰林前人何為先生死先生道日新青山明月夜千古一詩人天地空銷骨聲名不傍身誰移耒陽􅊘来此作吟鄰哭陳陶前人耒陽山下傷工部采石江邉弔翰林兩地孤墳各三尺却成開觧哭君心哭張博士太常羅隠前軰倐云殁媿君曽比方格卑雖不稱言重亦難忘諫草猶青𤨏悲風已白楊只應移埋窟泉下對真長哭僧道和旻上人傷杲禪師楊烱净業初中日浮生大小年無人本無我非後亦非前簫鼔旁喧地龍蛇直映天法門摧棟宇覺海破舟舡書鎮秦王餉經文宋國傳聲華周百億風烈破三千蕪没青園寺荒凉紫陌田徳音殊未逺拱木已生煙悼正宏禪師集作過景空寺故融公蘭若孟浩然池上青蓮宇林間白馬泉故人成異物過憇獨潸然既禮新松㙮還瞻舊石筵平生竹如意猶挂草堂前傷峴山雲袁觀主前人少小一作子學書劍秦吳多嵗年歸来一登眺陵谷尚依然豈意飡霞客溘隨朝露先因之問閭里把臂幾人全一作憐哭覺上人時絆剡中釋皎然憶君南適越不作買山期昨得耶溪信翻為逝水悲神交如可見生盡杳難思白日珠林下空懐歩影時哭靈一上人嚴維一公何不住空有逺公名共誰岑山路今時不可行舊房松更老新塔草初生經綸傳緇侣文章遍墨卿禪林枝幹折法宇棟梁傾誰復脩僧史應知傳已成齊一和尚影堂劉長卿一公住世忘世紛暫来復去誰能分身寄虚名如過客心将生滅是浮雲瀟散集作浮雲浮雲往不還悽集作凄凉遺教没仍存舊地愁㸔雙樹在空堂只見一燈懸一燈長照横河沙雙樹猶落諸天花天花寂寂香深殿苔蘚蒼蒼閉閑一作深院昔余精念訪禪扉常接微言清集作親道機今来寂寞無所得惟共門人淚滿衣題靈祐和尚故居院前人歎逝翻悲有此身禪房寂寞見流塵六時行逕空集作容秋草幾日浮生哭故人風竹自吟還入磬雨花隨淚共沾巾殘經忩下依然在憶得山隂問許詢哭䕶國上人張謂昔喜三身净今悲萬刼長不應歸北斗多是向西方舍利衆生得袈裟弟子将䑕行殘藥碗蟲網舊行牀别起千花塔空留一草堂支公何處在神理竟茫茫空寂集作少林寺哭元集作暉上人錢起悽然雙樹下垂淚逺公房燈續生前火爐添没後香隂階明片雪寒竹響空廊寂滅應為樂塵心徒自傷璿公房懐舊耿緯逺公傳教畢身没向他方弔客来何見門人閉影堂紗燈臨古砌塵杌在空牀寂寞踈鍾後秋天有夕陽哭麴上人前篇題作哭上象見三百三巻司空􅍼哭陵霄山光上人于鵠身没碧峯裏門人改𦵏期買山尋主逺壘塔化人遲鬼火穿空院秋螢入素帷黃昏溪路上聞哭竺乾師過堅上人影堂逄司空曙李端我與雷居士平生事約公無人知是舊共到影堂中僧如展及韋載同遊碧澗寺各賦詩余落句云他生莫忘靈山座滿壁人名後㑹稀展共吟他生之句因話釋氏縁㑹所以莫不悽然久之不十日而展公長逝驚悼反覆則他生豈有兆耶其間展公仍賦黄字五十韻飛札相示余方属和未畢自此不復撰成徒以四韻為識元稹重吟前日他生句豈料踰旬便隔生㑹擬一来身塔下無因共繞寺廊行紫毫飛札看猶濕黄字新詩和未成縱使得如羊叔子不聞兼記舊交情哭栢巖禪師賈島苔覆石牀新師曽占幾春冩流行道影焚却坐禪身塔院闗松路集作雪經房鎖隙塵自嫌雙淚下不是觧空人題山中故静禪師劉得仁寂滅身何在門人隔此生影懸塵已厚塔種栢初成溪院秋先雪山堂古有精當時挂錫劍樹老數枝傾弔草堂禪師李洞杖履疑師在房闗四壁蛩貯瓶經臘水響塔隔山鍾集作生鍾乳鴿沿苔井集作樵客収林果齋猿散雪峯如何不見性倚遍寺前松集作星下哭雙松哭栖白前人聞説孤忩卧化時白莎蘿雨滴空池吟詩堂裏時闗影禮佛燈前夜照碑駕雪已成金殿夣看濤終負石樓期逄山對月還惆悵争得無言字祖師題徑山大覺禪師影堂張祜超然彼岸人一逕謝微塵見想應非想集作見相即非相觀身豈是身空門性未滅舊里化猶新漫指堂中影誰言影似真經曠禪師故一作舊院方干谷鳥散啼如有恨庭花含笑似無情更名換面集作變貎難無休息去去来来第幾生題永忻寺影堂項斯不遇脩寺日無錢入影堂故来空禮拜臨去重添香僧得名難一作雖近燈傳火已長發心依止後借住有隣房哭閒霄上人周賀林逕西風急松枝講鈔餘凍髭亡夜剃遺偈病時書地燥焚身後堂空著影初弔来頻落淚曽憶到吾廬重遊東集作圭峰宗宻禪師精廬前篇作哭盧處士温庭筠百尺青崖三尺墳微一作𤣥言已絶杳難聞戴顒今日稱居士支遁他年識領軍暫對山松如結社偶因一作同麋鹿自成羣故山弟子空回首葱嶺還集作唯應見彩雲此詩三百四巻重出今已削去注異同為一作弔造微上人張喬至人隨化往磨滅自堪傷白塔収真骨青山閉影堂鐘殘含細韻印滅有餘香松上齋烏在遲遲立夕陽友人寄道上人逝却酬道字人𤣥集作道明李逺蕭寺曽過最上房碧梧濃葉覆西廊逰人縹緲紅衣亂坐客從容白日長别後旋成荘舄夣書来忽報惠休亡他時若肯相隨去只是含酸對影堂西廊又𤣥集作西廂莊舄又𤣥集作莊叟哭寳月三藏大禪師陳陶五峯習聖罷乾竺化身歸帝子傳真印門人哭寳衣一囊窮海没三藏故園稀無復天花落悲風滿鐵圍哭處黙上人裴説凄凉繐幕下香吐一燈分鬬老輸寒檜留閑與白雲挈盂曽幾度傳衲不教焚泣罷重回首暮山鍾半聞哭道士劉無得沈佺期聞有𤣥都客成仙不易祈蓬莱向清淺桃杏欲芳菲縮地黄泉下昇天白日飛少㣲星夜落高掌露朝稀吐甲龍應出銜符鳥自飛國人思負􅈰天子惜披衣花月留丹洞琴笙閣翠微嗟来子桑扈爾獨返於幾杪秋洞庭中懐亡道士謝太虚劉長卿漂泊日復日洞庭今更秋清集作青楓亦何意此夜催人愁惆悵客月中徘徊江上樓心如楚天逺日送滄波集作浪流謝客久已没微言無處求空餘白雲在容與隨孤舟千里杳難望一身常獨逰故園復何許江海徒集作此淹留傷桃源薛尊師一作道士劉禹錫壇邉松在鶴巢空白鹿閑来集作行舊徑中手植紅桃千樹發滿山無主任春風哭妓和崔司功傷姬人楊烱昔時南浦别鶴怨寳琴絃今日東方至變消珠鏡前氷流衝砌咽月影向忩懸粧匣棲餘粉薫爐滅舊烟晩庭摧玉樹寒帳委金蓮佳人不再得白日幾千年傷曹娘四首宋之問可憐寂寞去何之獨立丰茸無見期君看水上芙蓉色恰似生前歌舞時二前溪妙舞今應盡子夜新歌遂不傳無復綺羅嬌白日直将珠玉閉黄泉三鳳飛樓妓一作伎絶鸞死鏡臺空獨憐脂粉氣猶著舞衣中四昔日河陽縣氛氲香氣多曹娘嬌態盡春樹不堪過感王将軍柘枝妓没張祜寂寞春風舊柘枝美人休舞曲停吹集作舞人休吹曲休鴛鴦鈿帶抛何處孔雀羅衫付阿誰畫鼓不聞招節拍錦靴虚集作空想挫腰支今来座上翻如醉集作偏惆悵曽見梨園集作堂前教徹時和王秀才傷歌妓集作姬温庭筠月缺花殘莫愴然花須終發月終圓更能何事消芳念亦有濃華委逝川一曲艶歌留宛集作婉轉九原春草𦵏集作妬嬋娟王孫莫學多情客自古多情損少年此詩三百十三巻重出前已削去奉同李蘇州傷美人皇甫冉玉珮石榴裙當年嫁使君專房獨見寵傾國衆皆聞歌舞長無對幽明忽此分陽䑓千萬里何處作行雲和吳中丞悼笙妓李群玉麗質仙姿煙逐風鳳凰聲斷吹樓集作䑓空多情草色怨還緑無主杏花春自紅堕珥尚存芳樹下餘香漸滅玉堂中唯應去抱雲和管從此長歸阿母集作姚宫悼亡姬五首韋荘鳳去鸞歸不可尋十洲仙路彩雲深若無少女花應老為有姮娥月易沉竹葉豈能消積恨丁香空觧結同心湘江水濶蒼梧逺何處相思弄舜琴獨吟前人黙黙無言惻惻悲閒吟獨旁菊花籬只今已作經年别此後知為幾嵗期開篋毎尋遺念物倚樓空綴悼亡詩夜来孤枕空腸斷忩月斜暉夣覺時悔恨前人六七年来春又秋也同歡笑也同愁纔聞及第心先喜試説求婚淚便流幾為妬来頻歛黛每思閒事不梳頭如今悔恨将何益腸斷千休與萬休虚一作靈席前人一閉香閨後羅衣盡施僧䑕偷筵上果蛾撲帳前燈土蝕釵無鳳塵生鏡少菱有時還影響花葉曳香繒舊居前人芳草又芳草故人揚子家青雲容易散白日等閑斜皓質留殘雪香魂斷逐霞不知何處笛一夜呌梅花送𦵏和楊侯送袁金紫𦵏張正見𤣥泉開隧道白日照佳城一朝嗟此路千載㡬傷情秋氣悲松色凄風咽晩聲歸雲回谷散初學記作向谷晩還桞背山輕唯當三五夜壟月暫時明送靈法師𦵏庾信龍泉今日掩石洞即時封玉匣摧談柄懸河落辯鋒香爐猶是栢麈尾更成松郭門未十里山廻已數重尚聞香閣梵猶聽竹林鐘送客風塵擁寒郊霜露濃性靈如不滅神理定何從送觀寧侯𦵏王褒䝉羽高峻極淮泗導清源邢茅廣列地跗蕚盛開蕃紛綸彤雘彩從容瓊玉温衝飈闕栢幹烈火壯曾崑疇昔同覉旅辛苦渉凉暄觀風方聽樂垂淚􅃍傷魂造舟虚客禮高閈掩賔垣桂樹思公子芳草惜王孫今辰向郊郭猶似背轘轅丹旐書空位素帳設虚樽楚琴南操絶韓書舊説存西靡傷新樹東陵惜故園自憐悲谷影彌愴玉關門餘輝盡天末夕霧擁山根平原㸔獨樹亭臯類聚作臯亭望别村寂寞還蓋靖荒茫歸路昏挽鐸已流歇歌童行自喧睠言千載後誰将遊九原送劉中書𦵏前人昔别傷南浦今悲去北邙書生空託夣久客毎思鄉寒近邉雲黑塵昏野日黃陵谷俄遷變松栢易荒凉題名無復迹何處騐龜長望送魏徴𦵏唐太宗見初學記閶闔揔金鞍上林移玉輦野郊愴新别河橋非舊餞惨日映峯沉愁雲隨盖轉哀笳時斷續悲旌乍舒巻望望情何極浪浪淚空泫無復昔時人芳春共誰遣送桞宜城𦵏顧况鳴笳已逐春風咽匹馬猶依舊路嘶遥望栁家門外樹恐聞黄鳥向人啼送開府姪隨故李使君旅櫬却赴上都劉長卿征西諸将莫如君報徳誰能不顧勲身逐塞鴻来萬里手披江草訪孤墳擒生絶漠臨集作經胡雪懐舊長沙哭楚雲歸去蕭條㶚陵上幾人看葬李将軍送魏六侍御𦵏皇甫冉哭𦵏寒郊外行将何所從盛曹徒列栢新墓已栽松海月同千古江雲復㡬重舊書曾諫獵遺草議登封疇昔輕三事常期老一峯門臨商嶺道忩引洛城鍾應積泉中恨無因世上逄招尋偏見厚踈慢亦相容張范唯通夣求羊求仲羊仲二人也永絶蹤誰知長卿疾歌賦不還卭觀𦵏者權徳輿塗芻隨晝哭數里至松門貴盡人間禮寧知逝者魂笳簫出廣集作古陌煙雨閉寒原萬古皆如此傷心反不言觀朱舍人歸𦵏吳中陳羽翩翩綘旐寒流上行引東歸萬里魂㡬㡬州人臨水哭共看遺草有王言咸通中始聞禇河南歸𦵏陽翟是嵗上平徐方大肆慶賞又詔八品錫其裔孫追叙風㮣因成二十韻唐彦謙册府藏餘烈皇綱正本朝不聽還笏諫㡬覆綴旒祧咫尺言終直愴惶道已消淚疑心傳位日揮涕授遺朝飛燕潜来趙黄龍豈見譙既迷秦帝鹿難問賈生鵰穆卜緘縢祕金根轍跡遥北軍那奪印東海漫難橋羅織黄門訟笙簧白骨銷炎方無信息丹旐竟淪漂邂逅江魚食凄凉楚客招文忠徒謚議子卯但簫韶未見公侯復尋傷嗣續凋流年隨水逝高誼薄層霄柱石林公逺縑緗故國饒竒蹤天驥活遺軸錦鸞翹近者淮夷戮前年作馬調始聞移北𦵏兼議䕃山苖聖澤覃将溥真魂喜定飄異時窮巷客懐古設成謡淮口軍𦵏羅隠一陣孤軍不復廻更無分别只荒堆莫言賦分湏如此曽作文皇赤子来文苑英華巻三百五
