body:
  text: 文苑英華巻八百七宋李昉等編公署上御史臺新造中書院記一首邠州進奏院記一首滑州節堂記一首宛陵公署記一首開州刺史新宅記一首宣州響山新亭新營記一首杭州場壁記一首御史臺新造中書院記舒元輿王者執生殺之柄造天下使百度順而已矣其或不順與順而不得其度者皆屬於御史府府之動静為朝廷紀綱之職與百司絶類盖百司坐其署但專局而已矣入於朝與啓事於丞相府亦不岀乎其位是以朝罷而各復其司以無事於朝堂與中書也若御史臺每朝㑹其長㧾領屬官謁於天子道路誰何之聲逹于禁扉至含元殿西廡使朱衣從官傳呼促百官就班遲曉文武臣僚列於两觀之下使監察御史二人立於東西朝廷甎道以監之鷄人報㸃監者押百官由通乾觀象入宣政門及班於殿廷前則左右廵使二人分押於鐘鼓樓下若两班就食於廊下則又分殿中侍御史一人為之使以蒞之内謁者承㫖唤仗入東西閤門峩冠曵組者皆趨而進分監察御史一人立於紫宸屛下以監其出入爐烟起天子負斧扆聴政自螭首龍墀一作池南屬於文武班則侍御史一或作二人盡得專彈舉不如法者由是五府之屬得入殿内其職益繁其風益峻故大臣由公相而一作已下皆屛氣竊息注萬目於吾曹吾曹坐南臺則綜覈天下之法立内朝則糾一作約繩千官之失百官有滯疑之事皆就我而質故乗輿所在下馬成府釐朝廷之綱目與坐臺之判决者相半是以御史府故事於中書之南常有理所先時唯中丞得專寓於尚或作南舍一院若雜事與左右廵使則寓於西省小胥之廡下遇大朝㑹時吾屬皆來則分憇於雜事廵使之地既寓於小胥則我實客也每亡事而去則主人必坌而入諠譁狼籍其態萬變向之霜稜盡為涕涶矣豈吾君以天下綱紀屬之於我一有之字意邪上元二年侍御史劉孺之作直㕔記初拜儀云謝宰相訖向南入直省院候端長又入中書儀云到直省院入門揖端公訖各就房嗚呼以御史之貴一無此字重而一作以前時作者之記恬然以直省院為記君子未嘗有非之者神羊之神何其翳而不光耶聖唐大和三年已酉嵗天子擢尚書吏部郎中河南宇文公為御史中丞詔下之日不仁者相弔御史府新例知雜事一人中丞得以選於廷臣河南公既拜之日上言請尚書司勲郎中瑯琊王君以自輔識者曰河南瑯琊同心異質之人也心茍同雖堅金可㫁於御史乎何有他日雜事累一作果以寓直省院為歎廼議於中丞中丞深樂之即時一作持啓於中書曰此前日之闕也中丞能革一作為之豈直栢署之光乎實羽衛一作羽儀五府之多也皆佐其意事得聞於上上曰良有是乎俞其請如響應即詔度支岀錢百萬以資焉廼以一作於政事堂南一無南字直阡之南選地以作之中書之南實天下㑹計之地不容咫尺之隟非雄重清切之司於此豈容足乎我是以得規制為之焉舊中丞院在西與西院相絶遂以其地易大京兆院合三院為一作為三院一東西四十六歩南北四十歩由東為首其一為中丞其二為雜事其三為左右廵使若中丞升為大夫改官不改院若三院畢朝集臺院附於雜事殿察附於廵使其名㧾號為御史臺中書南院院門北闢以取其嚮朝廷也其製一作制自中書南廊架南北為軒入院門分東西廂為拜揖拆旋之地内外皆有廡蟠回詰曲矚之盈盈然梁棟甚宏柱石甚偉椽欒楶梲麗而不華門窓户牖華而不侈名木脩篁新姿如舊一作竒葩秀實若升緑雲若編青簫以至於几案筆硯簾幌茵榻果籩茗噐皆新作也從官胥士役夫馬走一作走馬勾稽案牘飲食休息之地皆得其所若百官之請事羣吏之來一作桊謁入吾門將祗伺於屏者見吾軒堂階闥之嚴固不俟戒而自肅焉為此者何尊天子也吾府為天子耳目宸居堂陛未有耳目聦明堂陛峻整一作正而天子不尊也天子尊未有姦臣賊子而不滅也姦臣賊子盡滅矣可以自朝廷至于海隅蕩蕩然何所不理哉吾之作豈是志小者近者之心耶謹按高祖大皇帝一作高宗天皇大帝是按唐㑹要高宗龍朔二年修大明宫改名蓬萊是年嵗在壬戌至太和庚戌巳二百二十九年英華作高祖大皇帝則年代愈逺恐非作大明宫將二百年矣當時有司經度曽不是思將以待我而作我之所以作盖前補二百年之遺事後貽千萬年之不朽縉紳觀者命為御史北臺聞者謂之知言君子曰移中丞雜事令之心於大柄天下豈有遺事哉某備于寮屬得聞君子之論且承公命其記於是乎書仍乃作題中丞雜事洎三院至一作主主簿官封名氏於其後以為一時之盛事大和四年嵗次庚戍八月十六日丁巳記一作皆唐文粹邠州一作寕進奏院記桞宗元凡諸侯述職之禮必有棟宇建于京師朝覲為修容之地㑹計為交政之所其在周典則皆邑以具湯沐其在漢制則皆邸以奉朝請唐興因之則皆院以備進奏政以之成禮於是具由舊章也皇帝宅位十一載悼邉甿集作萌之未乂惡㐫虜之猶阻􅀶求群僚集作臣以朗寧王張公為能俾其建節剖符鎮集作守又作部股肱之郡統𤓰牙之職董制三軍撫柔萬人乃新斯院𢎞我舊䂓集作制高其閈閎壯其門閭以奉王制以修古典至敬也以尊朝覲以率貢職至忠也執忠與敬臣道畢矣公嘗鳴珮執玉展禮天朝又嘗伐叛獲醜獻功魏闕其餘歸時事脩常職賔屬受辭而來使旅賁奉章而上謁稽疑於太宰資集作質政於有司下及犇走之臣傳遞之役川流環運以逹教令大凡展采於中都率由是焉故領斯院者必獲歴閶闔登太清仰萬乗之威而通内外之事王宫九闗而不聞蜀本作開轅門十舍而如近斯乃軍府之要㑹蜀本作樞朗寧之能政也唯公端持集作明而厚温裕而肅宏略特岀大志高邁施徳下邑而黎人咸懐捍敵蜀作設揄西郵而戎虜伏息茂功溢於集作于太常盛烈動於人聽則斯院之設乃他政之末者也贊公於他政之末故詞不周德稱公於天子之都故禮不稱去聲位斯古道也貞元十二年十月六日河東桞宗元為之集無之字記滑州節堂記劉三復諸侯之升壇胙土服天子休命者有弓矢鈇鉞之賜生殺刑賞之柄其為任也盖重矣而受脤之日常疑節者得以王命傳信俾先啓行至則考善地庇豐屋麾斾以異之歌鐘以樂之非征伐宴犒申威行令未嘗出此其大端也是鎮服膺一作服臂疑作股臂梁洛咽喉齊魏其氣强以勁其人勇而忠我連帥贊皇公以全才上略標柄中外輟為霖於將命膺作翰之攸寄嵗直己酉擁旄來斯公以明誠報一人以大信示三軍膏潤滋恵風馳教化未洽旬而羣甿愛戴纔越月而五校訓齊及踰年也則鰥惸咸樂業豪奪不敢犯戰備具而軍聲振矣顧謂募吏曰君之寵授偉此瑞節所處不嚴人何以瞻於是建宏規模大壯去屑宻圗宏敞隥道廻廊繚其下翬飛鱗葺攢其上孑孑然倚静深而相合渠渠然拂埃􅅽而孤峙隣墻藩而儷公署實轅門之藴抑外間之雄歟舉事必書春秋之義繇是秉筆硯於公之門者承命􅆲述謹誌于堂隂宛陵公署記顧况博陵崔公端憲臺岀九江渉呉换虢三牧作乂仁聲上騰上褒之以宣歙等州團練觀察採石軍使内棲一作建茂行外傳純徳徳鋪生人生人受賜所部無事緝乎井屋高棟大廡樓傳高亭署以崇牙䖍君命也略五千架圬墁赭堊燭乎一川竹釘木屑皆適所用前鎮未之有也其辟一士一作生未嘗不當其任其裁一簡未嘗不以憂人為心兵馬使南陽張伯陽承公指揮應接不暇廣而不費華而中儉堡有嚴柝封有巨防巢洞之冦化為平民銅宫一作官是戰馬牛渚姑孰之隘籠波絡谷莫不帖焉夫宣户五十萬一户二丁不待募於旁郡而宣男之半已五十萬矣蹠勁弩耀雄㦸吞敵如脯戎心不啓其或有啓戎心備銳而襲之淮海之援過賔之寵亦所以補凡例也庚辰年正月下旬日前秘書著作郎顧况記開州刺史新宅記權徳輿記曰目巧之室則有奥阼况吏者人之師宅者章之次君子之所寧體諸侯之所賦事宜以車服視其等威漢中支郡曰盛山所理阨陿乾元上元之間嵗比㐫災萑蒲相聚戕害燒夷州壌蕭然後之長人者姑葺蓬茨僅蔽風雨而已貞元八年夏四月北海唐侯文編承詔為郡既至則敷宣化條簡易亷平居者胥恱流者自復集作占朞月有成三年大穣獄有茂草野無棄地既均而安既阜而藩官修其方物有其容乃喟然顧其屋曰是之不修政將安寄度農功之隙因恱使之衆合于古常得其時制殖殖廣庭渠渠中堂堂下布武席間函丈工徒不勞里旅不煩攸介攸止為仁為義君子多之邦人宜之其集有於字㓗而中禮儉以成徳與夫臧文之山藻趙武之輪奐異矣先是地無井泉人汲江流挈瓶懸綆力憊用寡乃並北山之下習坎䟽蒙肱集作股是而引之于闤闠之東順其性而流不竭通其變而人不倦廕以新亭漻然而清州閭㓜艾得以齊飲食而蠲疵癘矣便安之政觸類而長始於郡齊洽於封内初文編以文行馨香為左史儀曹郎記事而為春秋含章而陳奏議及是則推誠以愛人條鬯而休嘉連帥丞相以為表率裕於才者其無方乎盖陟明翰飛將激而逺之於是邦也古之成室主人落之賔亦發焉徳輿與文編游乆聆其功善寓此直書用代發禮且以釃泉之智因而廣之時十三年冬十月文編居部之六嵗也宣州響山新亭新營記元和二年十月宣城長師中執法㐮陽郡王路公作新亭新營凡周月而厥功成書時且便於人故也先是郡城之南阨陋磽确山木不剪譙門不開公因暇日觀視原野直南一里所得響山焉兩崖聳峙蒼翠對起其南得響澤集作潭焉清泚可鑑縈廻澹集作澄淡又其南則博敞平夷澶漫逶迤從古之隟地是邦之休利目與心㑹闇然自得悉以條陳實蒙可報乃量日力計徒庸闢於弇内成是夷道掲東西二亭於雙峰之上相距二百歩華軒峻宇皆據勝勢廣厦䟽窓集作寮可棲顥氣碧山亘目清流在下跨以虹梁抵茲近郊因其爽塏乃列營署度野以歩度堂以筵上棟下宇各有區處規地之廣袤分左右營部隷焉牙門親軍而下左至八右至七既而左次莽平採石之師與宴設堂又在焉廣場間舘􅌄窱縈帯可以閱軍實可以容宴豆度羡財則不費因恱使則不勞巽之申命師之畜衆楚莊之匏居衛文之楚丘得其時制而不煩官業盡在是矣初輿師所處在郡之北偏地􅀈墊下水泉沮洳積弊不遷介夫病焉至是則修武備建長利寢興得安其室處坐起以觀其習變而公又饗士於斯娯賔於斯公之心太則神王神王則中和旁逹士之體寧則氣全氣全則餘勇可賈夫然則不岀楹階爼豆之間而威惠交修上下浹洽在此物也以公之平粹淑均天資吏師昔嘗四剖符一司武皆有利澤施于州壌及是則貴為元侯䟽以大封推心術而行於理所繇屬城而流于支郡程功底績觀發知智亭與營之制宜乎哉前賢之以循政聞者有矣而遺羙於是豈徯公之為而裕斯人耶集作也凡由此塗出者東南抵于歙西北抵于涇肩摩轂擊徃復自便絶東溪有浮橋過西亭則蓮池觸類滋長皆為絶境公以鄙夫春秋之徒也繪而傳焉使實録于石時三年夏五月記杭州場壁記沈亞之國家始以輸邉儲塞不足於用遂以鹽鐵𣙜酤為助使吏曹計其入於郡縣近利之地得為院場之署以差高下之等顧杭州雖一場耳然時南𣲖巨流走閩禺甌越之賔貨而鹽魚大估所來交㑹每嵗官入三十六萬千計六字一作以億計近嵗淮河之間頗聞其費自是汲利之官益重矣前年京兆韋子諒官始縣主簿有能名及秩謝當歸是時尚書職方郎中崔稜為揚子留後使聞其行遂邀署之既到滿嵗利𣙜大登吏無敢怠與其為縣主簿加勤也或謂亞之學史詞無茍故用是記焉文苑英華巻八百七
