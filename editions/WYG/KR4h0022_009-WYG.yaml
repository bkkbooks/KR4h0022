body:
  text: 文苑英華巻九宋李昉等編天象九泰階六符賦三首北斗賦一首二氣合景星賦二首天晴景星見賦三首景星見賦一首泰階六符賦以元亨利貞為韻錢起考星象之躔次探瑞氣之奥源得泰階於前史總六符以為言既出没以候君德又熒煌以麗乾元𤣥德升聞慶一人而祥發白雲夜巻映九霄而色繁爾其祥德而發觀瑞而明德正則正俗平則平何君王之播理俾品物以咸亨股肱掩于稷契輔翌賢於阿衡人迹其卑慿至誠而上感天象守黙因列宿而下呈配兩曜以齊美非衆宿之敢争豈比夫聚彼德星潁上賢人所感托於箕尾巖間傅說之精而已哉故符之燦兮有明義符之爛兮有深意其形昭晰其理奥秘朝發於天而應於地向夜月而㓕没拂曙光而蒼翠上通其象分三台而為六下應於人感一德之不二皆英主之所有匪常君之能致原其所出将表上帝之心考其所歸實惟天子之利爾其臨大國懸太清德之所感符乃無情既依高以託質亦以數而為名與物無競避太陽之光色相時而作表明王之利貞火映𤣥天似燭龍之衘吐珠沉漢水無巨蚌之虧盈豈光輝之足異亦感應之可驚忝觀光於上國仰霄漢以屏營第二同前韻婁𤣥頴倬彼垂象悠哉混元列泰階而有曜應洪化而無言歴歴映天連光於維斗昭昭初月接影於軒轅總而言之三台之號攸著詳而察也六符之騐斯存聖人有以仰觀於變其教彌敦今上握符正位出震居尊宫壼肅穆巖廊政分奉其三無庶欽崇乎道徳致其五至洵光被乎乾坤此上台所以曜而不昏也若乃山川降精卜夢斯并野無遺彦朝滿羣英稷契䕫龍謀謨乎三署龔黄卓魯鎮撫於百城上下以之和睦品物以之咸亨此中台所以烱然而明矣夫其羣甿是頼一藝必精農無事而狎野仕有禄而代耕康衢之童乆閑於歌詠擊壤之老無謝於生成此下台所以皎爾而晶矣故能通燭寰瀛交泰天地信景鑠兮物有序降休徴兮靈必至曷比夫兩曜合璧作祥瑞之一端五星連珠為太平之一致况其照耀熠熠其精純粹分輝既象於六爻比影復侔於三事盛其德而高其色通乎微而洞其秘大易所謂自天祐之吉無不利者也乃作歌曰君臣穆兮純化清玉衡正兮泰階平嘉厯數兮無極配乾坤兮永貞第三同前韻房寛天垂象其徒實繁聖作則克叶元元故六符之効祉同五星之可言匪侵名於傅說不奪彩於軒轅有道則見熲然以明示萬物之咸若表三階之砥平歴歴珠貫煌煌弁横高以視卑八表仰其不忒低而能燭四海恱其光榮昔昧者謂前王之淫縱今明者彰我后之元亨既歸仁於垂拱亦叶政於阿衡寧不以燮理詣極耿光莫京麴糵以之作醴鹽梅於是調羮近取諸身長乎庶類率土雖廣至德遐備救旱則霖雨為先濟川則舟楫是利不然者奚得與南極而齊出拱北辰而為次跂彼無報既織女之多慙晥爾服箱知牽牛之増媿繼東井之應福何潁川之足懿事契其誠萬邦以貞亦既啓瑞終然永清且逢時而不隐猶牧謙而作程每避日以照曜孰與月而争晶順秋冬以廻斡隨河漢以低傾寧直降龍駟之特禀應仙郎之羙名信可乆而可大等無臭而無聲謬窺管以體物幸芻蕘之見并北斗賦以成象在天維北有斗為韻崔損倬垂象以昭回惟帝居之曰斗壯魁台以立極建衡杓而為首齊七政而均序五行臨四海而横制九有所以附乾樞壓坤紐携龍枕參左槍右棓總列宿而環衛中宫體羣臣而輔弼元后範圍六合紀綱四維其道不昧其照無私若乃銅渾作式未央取則其變可考其動可測履端於始當獻嵗以指南舉正於中在隂方而主北觀夫峥嶸纚聮若綴若懸氷散珠圓乍似㧞長劍而倚天掲西柄以戒滿拱北辰而處偏乗三台而斡運齊七曜而廻旋酌天地之心豈酒漿之可挹分寒暑之氣較鈞石而罔愆躔次靡失厯數斯在晝其隐也不争曜於太陽昏必見焉能藏暉於真宰照萬國兮猶魚從網宗百川兮比朝於海參差北斗闌干太清環帝座之焜耀薄河漢之縱横不應豐以中見每居次而自明總五緯于天統行四時而嵗成非止雄橋梁於巴蜀壯都邑於咸京而已於是萬人攸仰萬物取象寔星之長二氣合景星賦以其狀無常出有道之國為韻裴度星麗天中君居人上觀星文之高朗見君德之洪暢矧乎景以為君氣之可望徒亘其二方之色靡知其千變之狀故隐不可思見無與期必潜拱而𤣥感乃粲然而著之諒精誠之盡逹若影響而相追且夫浩浩隂隲昭昭元吉匪乗運而生将俟時而出方今統三才而不爽叶一德而無失所以列其數而惟三等其色而如一既參差而比相亦錯落而為質非烟非霧相羃䍥以氤氲散彩耀芒逺精明而成實懿其燭彼天衢同日月之列於三無瑞我元首旌號令之敷於九有不然何以渾青赤之悠揚掩斗牛之熒煌或助月於晦朔或偶聖而昭彰昔在周公之攝賛幼主周武之肆伐大商皆立功而本政亦効祉而垂光未若明庭而治國無事而降康斯時也豈虚其應斯瑞也則惟其常是以瑩霏㣲之中形璀璨之色仰嘉氣之来輝煥喻他方之歸道德陋虞舜之近加於房小唐堯之纔出於翼瞻之踴躍如北面之事一人照之清明若南向之觀萬國豈同乎嘒彼躔次行諸嵗時昏在昴中示春物之将蠢爾申為斗建兆秋風之欲凄其雖窮運數於晷刻未甄邦國之清夷窅綿邈兮𤣥造在休徴兮載考何􅂱煜於重霄信恢宏於治道手抃目駭兮載賡歌於大寳第二同前韻國家握乾符定天保禮樂修而叶德星辰行而軌道是以南方之氣共列色於少陽北斗之靈乃垂衣於𤣥造是時玉燭調律攝提司方巽為發生我則青而呈瑞離為正位我則赤而啓祥其數也合三才而列曜其色也表一德而中黄雖感而匪逺亦見不于常所以合天地之貞觀明教化之昭彰應朱鳥之精生而垂翼躔踆烏之道出則加房觀其氤氲映空光明在上乍元氣之肇分若連珠之逺狀是以覩天道因德而祐符我皇乗土而王乃知惟天為大惟聖則之聖觀象以立極天應聖而無私故星合度於三統氣不奸於四時者也若乃鎮之所加嵗之所守則合氣而出有精淪五老台坼六符則乗氣而入無豈惟繫隐見於虚實定躔舍之徐疾瞻寳玉而非獨衝斗俾滂沱而徒云離畢所以掩萬代而莫類超百祥而獨出不然者何以表至化之文明見𤣥象之隂隲於是天子占太史命有司諒修德而無怠在降福而不遅是必隐於凶孽是必耀於孝思嗚呼後代不敬曷其太史退乃書曰于時君臣同德蠻夷率職道合上帝信孚下國於是二氣正而叶和三星黄而合色承清問而載言俾洪裔而作則天晴景星見賦以有道之邦德星昭見為韻夏方慶煥彼景星麗于蒼昊其隐也隂魄晦而氛霧作其見也夜景明而欃槍掃敷大信以何言抑殊祥而是考所以叶天經符帝道既表應而無欺亦照臨而不私祚聖而德斯至矣懸象而人皆仰之向晦且殊於中見在天寧比乎明夷垂至精而契至理宏蕩蕩而播巍巍不然出房孰稱乎舜德居翼何貴乎堯時今我皇齊七政以作則奉三無以御極上天降祥景星昭德固云其道不逺孰謂其神不測晦明始見助皇化之惟明動息靡常類乾健而不息應陽精乃三其數彰土德乃黄其色既不孤而有隣信元吉而柔克時也雲歛遥素天澄逺青纎塵不起㣲露斯零掩映孤月乗陵衆星回燭北辰似将朝乎帝座傍窺南極疑欲覲乎天庭激高風以熠熠耿斜漢之熒熒青赤以辨其方合散以通其變連二氣而初吐混三光而乍見否泰之運式孚天地之心可見景星之瑞也曷與為雙俾具瞻於萬邦景星之德也配乎悠乆粲熒煌於九有于以賛高明于以示休咎察無聲之載非我何知彰有道之邦非我何守不私其用胡繼明於月晦之時克保其謙故騰輝於日入之後是時天鑒匪遥德聲孔昭煥赫綿古光揚聖朝豈徒並連珠而邁同色流碧落而耀青霄第二同前韻陶拱我皇以化洽四夷德應昌期能使嘉祥昭於國典景星耀於天維豈徒呈光芒而出矣遇精彩而見之于時𤣥穹正清白日初匿爛景星之効質絢佳氣以競色起青方者縈瑞彩以葱蘢發赤位者統祥光而翕赩比懐珠而其狀匪異等抱珥而其儀不忒懿吐黄以争光矧聚三而表德莫不熒煌於碧漢焜燿於青霄照下土而乍朗掩繁星而自昭或半虧其形類蟾魄而當晦朔或中虚其狀疑金環之在泬寥故得為帝王之羙作祥符之首信歴代之罕見既今辰而方有稽徃牒之隐見騐前經之休咎則天下和平域中殷阜佐朗月而其色惟盛臨安邦而其羙不朽所以呈祥帝室効祉天庭表我皇之道泰彰我君之德馨豈比夫漢代稱竒空聞乎再中之日堯年紀異徒傳乎入昴之星而已乎則知天賛巨唐神依至道必著明於𤣥象寔垂曜於蒼昊叶妙理於上德表鴻休於大造不然者何為効靈莫匹具羙無雙駭逺目於千里播英聲於萬邦是以綏厥黎庶垂諸史傳德匪星而不著星匪德而莫見盖應運於英精亦叶時之靈變雖云瑞之衆祥之多未可比兹星之獨擅第三同前韻李子蘭君德惟馨天文効靈於是廓氛霧掃青冥發彼嘉氣浮兹景星南有光而霞赤東有色而烟青合彼氣之郁郁渾此色之冥冥昭然在天明乎有德仰其狀而可嘉究其靈而莫測君有至道不間𤣥以韜光時無纎埃必在天而發色或出或處念兹在兹占莫知其常度出必應乎盛時所以當今夕而彰矣向青霄而仰之乗乎方色遵彼天逵泰階正其位五星守其維然後見兹星之昭燭經彼天以逶迤晴空寥寥列星炫炫紛乎二氣始若烟而非烟烱彼羣星初乍隐而乍見並我質之惟黄緫彼氣而成絢霏㣲類干吕之雲輝赫如繞樞之電星氣合㑹光華動摇二氣之色交至三星之狀孔昭曭朗惟明疑沐其雲露光芒振曜若擊夫天飇明麗太極遐映青昊呈貺遥對乎三台効祥何慙於五老克表王德信由𤣥造在翼常瑞於堯年居房永叶乎舜道載美徃牒今祥我邦觀兹瑞之尤異知景福之攸降當其次天關歴牛斗既應道而昭格豈越度於前後出無常處向樂土以是臨仰之彌髙登靈臺而可偶是知景星之為德也必得瑞一時光九有乃傳芳而永乆景星見賦以垂象含輝有道則見為韻皇天有知明命不疑既何言而守黙亦懸象而髙垂彼星之見者下符睿哲上麗圓規将旌德之治亂必審時而推移故行藏克叶乎道盈縮不失其宜於是稽其義觀其象色煥炳光烱晃挂青漢粲粲其輝連白榆歴歴其狀天以祚聖垂𤣥精而臨下聖以應天慿至誠而感上覩其貌美天文之昭昭原其本知王道之蕩蕩盖以瑞本斯表祥光是含五緯知讓七紀懐慙與時俱明兮皇化齊美将聖共出兮𤣥德相參豈同夫入蜀而使臣應其二在戸而詩人詠其三徒觀其象高而逺質明而㣲如曙燈之欲㓕若秋螢之不飛夜則出焉麗乾元以發彩晝而隐也讓太陽而藏輝不然則安知國家無為無事垂拱垂衣乎我唐至德可乆立功不朽澤及四海化被九有繄彼景星契我元首俾千品萬類仰而知其太平四夷八蠻瞻而慕乎聖后若然則其騐可徴其事可考伊星之叶聖如風之偃草其靈也在乎或出或處其應也彰乎有道無道彼漢祖之聚五星唐堯之感五老未若帝命是錫生靈載造天禄無疆鴻業永保者也原夫莫大匪天莫明匪德天也惟德是輔德也惟天是則是以垂一星而呈萬國其明孔彰其儀不忒至若雲開天碧昭然可覿炳如金粟燦若銀礫煌煌其明爛爛其色九霄静而載揚光芒千里望而不違咫尺客有觀天文察時變惟景星之所在信有道而則見羙盛德之形容懐斯文而願薦文苑英華巻九
