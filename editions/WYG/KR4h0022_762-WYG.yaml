body:
  text: 文苑英華巻七百六十三宋李昉等編宗廟太原寢廟議一首定宗廟議一首七廟議二首廢隠太子等四廟議二首太廟遷祔議一首論肅明皇后請别立廟議一首遷廟議二首重修伍員廟議一首太原寢廟議顔師古貞觀九年議曰伏奉詔㫖欲太原立高祖寢廟博逹卿士詳悉以議聞伏惟聖情感切永懐纒慕思廣烝嘗事深追逺但究唐志作傍觀祭典考驗唐志作遍考禮經宗廟皆在京師不于下土别置至若二字唐志作昔周之豐鎬並唐志作寳為遷都乃是因事更唐志作便營非云一時俱唐志作别立其郡國造廟爰起漢初率意而行事不稽古源流漸廣大違典制是以貢禹韋𤣥成匡衡等招聚儒學博謀㑹要作詢廷議據此陳奏遂從廢毁自斯以後彌歴年代輟而弗㑹要作不為迄今永久按禮記曰祭不欲凟凟則不敬書云禮煩則亂事神則難斯並睿哲之格言皇王之通訓况復導揚素志實招擬作昭懿則俾遵儉約無取豐殷今若増立寢廟别安主佑有乖先古㑹要作㫖靡率舊章垂裕後昆理謂不可誠以天衷不遺至性罔極固宜勉割深衷俯從大禮則刑于四海式光萬代列採縉紳僉曰惟允謹議定宗廟議岑文本貞觀九年議曰臣聞揖譲受終之后革命創制之君莫不二字一作何嘗不崇親親之義篤尊尊之道䖍奉祖宗爰致一作致敬郊廟自義乖闕里學滅秦廷儒雅既䘮經籍堙一作湮殄雖兩漢纂修絶業魏晉敦尚斯文而宗廟制度典章散逸習所傳而競偏説是所一作執淺見而起異端自昔迄兹㑹要作今多歷年代語其大畧兩家而已祖鄭𤣥者則陳四廟之制述王肅者則引七廟之文貴賤混而莫辨是非紛而不定陛下至德自然孝思罔極孺慕踰匹夫之志制作窮聖人之道誠宜定一代之宏規為萬世之彛典臣等奉述睿㫖討論徃載㑹要作載籍紀七廟者實多稱四廟一作祖者盖寡校其得失昭然可見春秋榖梁傳及禮記王制祭法禮噐孔子家語並云天子七廟諸侯五廟大夫三廟士二廟尚書咸有一德曰七世之廟可以觀德至於孫卿孔安國劉歆班彪父子孔晁虞喜干寳之徒或學推碩儒或才稱博物商較古今咸以為然故其文曰天子三昭三穆與太祖之廟而七是以晉宋齊梁皆依斯義立親廟六豈非有國之茂典不刋之休烈乎若使違羣經之正説一作明文從累代之疑議背子雍之篤論遵康成之舊學則天子之禮下逼於人臣諸侯之制上僣於王者非所謂尊卑有序名位不同者焉通典作也况復禮由人情非自天墮大孝莫重於尊親厚本莫先於嚴配數盡四廟非貴多之道祀建七世得加隆之心是知德厚者流光乃經世之高義德薄者流卑實不易之令範臣等叅議請依晉宋舊典一作故事立親廟五一作六其祖宗之典一作制不在此數一作式遵舊典庶承天之道興於治一作理定之辰尊祖之義成於孝洽之日謹議一作皆舊唐書志七廟議張齊賢議曰昔孫㑹要作荀卿子云有天下者事七代有一國者事五代則天子七廟古今逹禮故商一作尚書稱七代之廟可以觀德祭法稱王立七廟一壇一墠王制云㑹要作曰天子七廟三昭三穆與太祖之廟而七莫不尊始封之君謂之太祖太祖之廟百代不遷祫祭之禮毁廟之主陳於太祖未毁之廟主皆昇合食於太祖之室㑹要作廟太祖東向昭南向穆北向太祖者商之𤣥王周之后稷是也太祖之外更無始祖但商自𤣥王已後十有四代至湯而有天下周自后稷已後十有七代至武王而有天下其間代數旣逺遷廟親廟皆出太祖之後故得合食有序尊卑不差其後漢高受命無始封祖即以高皇帝為太祖太上皇高帝之父立廟饗祀不在昭穆合食之列為尊於太祖故也魏武創業文帝受命亦即以武帝為太祖其高祖㑹要作皇太皇處士君等並為屬尊不在昭穆合食之列晉宣創業武帝受命亦即以宣帝為太祖其征西豫章潁川京兆府君等並為㑹要作亦以屬尊不在昭穆合食之列歴兹已降至于一作於有隋宗廟之制斯禮不易一作改故宇文氏以文一作武字皇帝為太祖隋室以武元皇帝為太祖國家誕受天命累洽一作葉重光景皇帝始封唐公實為太祖中間大一作代數旣近列在三昭三穆之内故皇家會要作圖太廟唯有六室其𢎞農府君宣光二帝尊於太祖親盡則遷不在昭穆合食之數今皇極再造孝思匪寧奉二月二十九日勅宣光以下一作七室以下依舊號尊崇續又奉三月一日勑旣立七廟須尊崇始祖速令詳定者伏尋禮經始祖即一作則是太祖太祖之外更無始祖周廟㑹要作朝太祖之外以周文王會要作皇為始祖不合禮經或有引白虎唐諱通義云后稷為始祖文王為太祖武王為太宗及鄭𤣥注詩雍序太廟一作祖謂文王以為説者其義不然何者彼以禮王者祖有功而宗有德周人祖文王而宗武王故謂文王為太祖耳非祫祭羣主合食之太祖今之議者或有欲立涼武昭王為始祖者殊為不可何者昔在商周稷卨始封湯武受命湯武之興祚由稷卨故以稷卨為太祖即皇家之景皇帝是也凉武昭王勲業未廣後主失守一作國國土不傳景皇帝始封實基明命㑹要作德今乃捨封唐之盛烈崇西凉之逺搆考之前古實乖典禮魏氏不以曹叅為太祖齊梁不以蕭何為太祖晉氏不以胡公殷王卬為太祖宋氏不以楚元王為太祖陳隋不以胡公楊震為太祖則皇家安可以凉武昭王為太祖乎漢之東京大議郊祀多以周郊后稷漢當郊堯制下公卿議議者僉一作多同帝亦然之唯杜林正議獨以為周室之興祚由后稷漢業特起功不縁堯祖宗故事所宜因循竟從林議又傳稱欲知天上事問長人以其近也武德貞觀之時主聖臣賢其去凉武昭王盖亦近於今矣當時不立者以必不可立故也今旣年代深逺方復立之豈是一作是非三祖二㑹要作三宗之意實恐景皇失職而震怒武昭虛位而不答非社稷之福也宗廟事重禘祫禮崇先王以之觀德或者不知其說旣灌而徃孔子不欲觀之今朝命惟新宜應慎禮祭神如一作如神在理可不㑹要不可誣請凖勑加太廟為七室享宣皇帝以備七代其始祖不合别有尊崇之議謹議一作皆舊唐書志同前劉承慶尹知章同議議曰謹按王制天子七廟三昭三穆與太祖而七此載籍之明文古今之通稱一作制皇唐稽考前範詳探一作採列辟崇建宗靈式遵斯典但以開基㑹要作國之主受命之君王迹有淺深太祖有逺近湯武祚基稷卨六字㑹要作昔湯武受命祚因稷卨太祖代逺出乎㑹要作于昭穆之上故七廟可合若夏繼唐虞功非由鯀漢除秦項力不因堯及魏晉經國周隋撥亂皆勛隆㑹要作崇近代祖業非逺受命始封之主不離昭穆之親故肇立宗祊罕聞别一作制夫太祖以功建昭穆以親崇有功百代而不遷親盡七葉而當毁或以太祖代淺廟數非備更㑹要作至於昭穆之上逺立合遷之君曲從七廟之文深乖迭毁之制皇家千齡啟旦四㑹要作六非葉重光景皇帝濬德基㑹要作啓唐代數猶近號雖稱一作崇於太祖親尚列於昭穆且臨六室之位未申七代之尊是知太廟當六未合有七故先朝惟有宣光景元神堯文武六代親廟大帝登遐神主升祔於廟室以宣皇帝代數當滿凖禮復遷今還止有光皇帝以下六代親廟非是天子之廟數不當有七本由太祖有逺近之異故初建有多少之殊敬惟三后臨朝代多儒雅神祊事重禮豈虛存規模可沿理難變革宣皇旣非始祖又廟無祖宗之號親盡旣遷其廟不合重立若禮終運徃建議復崇實通典作恐違王制之文不合先朝之㫖請依貞觀之故事無改三聖之宏規光崇六室不虧古議謹議一作皆舊唐書志廢隠太子等四廟議裴子餘開元三年議曰謹按前件四廟等並前皇嫡嗣一作𦙍殞身昭代聖人一作上哀骨肉之深錫烝嘗之厚憲章徃昔垂法一作範将來今欲使陵廟有慿神靈是享故禮曰禮從宜又曰夫孝者善繼人之志善述人之事禮從宜者明可置也善繼志者不可改也我太宗文武聖皇帝功成理定制禮作樂太上皇能事斯畢窅然高視皆以禮順於情情通則類應樂感於物物感則德和所以深悼友于敬申孝享範圍􅁤躅潤色鴻名昔嫄廟列周戾園居漢並位非七代置在一時斯並前史一作代宏規後賢令範固知父子之愛兄弟之恩情有所殷㑹要作殺方從大教又按春秋狐突適下國遇太子使登僕曰予将以晉畀秦秦将祀予此則太子之言無後明矣對曰神不歆非類人不祀非族君祀無乃殄乎此則晉有其祀立廟必也一作矣雖史有詳畧而㣲㫖見存又定公元年立煬宫經傳更無異說鄭𤣥注云煬公伯禽之子季氏禱而立其宫也竊以宫廟國號建立不殊季氏陪臣煬公逺祖因禱立廟尚不為嫌豈與夫睿聖深恩㑹要作因心闡揚至化篤惟親之祀垂可㑹要作永久之法考之漢儲晉嫡則如彼言乎周廟魯宫則如此豈可使晉求秦祀戾匪漢思所枉者深所直者鮮黷神慢禮理必不然昔炎德滅秦自以功高百代天下郡國皆立高廟二祧不遷九祖並享三分國用四海共違徒議廢興竟無得失旣而疾因夢譴嗣闕承祧雖天道有因亦人事何補旣非此例不假推揚但樂有差等禮亦異數恭聞正議䖍訪有司金石取象於軒懸牢禮不虧於乾豆談樂廢廟絶恩棄德神之無形亦可欺也又按周禮官有其職修其事若廢官去職何以敬神失敬與誠何以降福且尊以儲后位絶諸侯諡號旣崇官吏有典去羊存朔非理所安狥利忘禮何以為國謹議一作皆通典同前段同泰議曰古先哲王作範貽訓不背時而立矩必隨俗而裁規由是因人以設教從宜而制禮苟反經以合禮膠柱以調絃故三代所以損益不同百王所以昇降斯别伏據隠太子章懐節愍懿徳等皆禀殊恩式創陵寢一羞蘋藻驟移檀柘豈非睦親繼絶悼徃推恩者歟况漢置戾園晉修虞祀書稱咸秩禮記舊唐志作紀㑹要作祀百神紛綸葳􅅋可畧言矣按陳貞節奏狀云伏見隠太子章懐節愍懿德太子等四廟逺則從祖近則堂昆並非有功於人立事於代而寢廟相屬祼獻連時又引漢元帝朝貢禹奏及丞相韋𤣥成匡衡等議以為先王典禮不可越者臣愚以為貢禹上書匡衡奏記理異於此事匪其倫何者上述祖宗逺論壇墠徃復於商周之際徘徊於遷毁之間隠太子等並特降絲綸别營祠宇義殊太廟恩出當時如逝者之錫蘋蘩亦猶生者之開茅土寵章所及誰謂非宜且自古帝王建封子弟寄以維城之固咸登列郡之榮豈必有功於人立事於代生者曽無異議逝者輙此奏停雖存殁之迹不同而君親之恩何别此則輕重非當情禮不㑹要作宜均神道固是難誣人情孰云其可又奏狀云合樂登歌有同列帝者隠太子等廟比來祼享皆禀舊章牲止少牢舞纔六佾進無季氏之僣退用諸侯之禮恭惟故實未為乖謬自兹以降斷亦可知又㨿匡衡議思戾太子后園親未盡謹檢㑹要作案隠太子是皇帝曽伯祖本服緦麻章懐是伯父本服周年懿德節愍咸是堂昆本服大功親並未盡廟不合廢又凖禮有以舉之莫敢廢也故劉歆以為德薄者流卑德盛者流光禮無所不順故無廢廟又漢司徒掾班彪云貢禹毁宗廟匡衡改郊兆皆數復紛紛不定者何禮文缺微古今異制名為一家未易可偏定也考觀諸儒之議劉歆博而篤矣㨿班彪之言足明古今異制禮合從宜按匡衡之議戾太子等以親未盡不毁斯則逺窺青史無可廢之文上固皇枝有深根之美一朝罷廢竊為不可隠太子陵廟等權與建立素非禮官詳定盖是恩從中來斯事非外奬至如漢置戾園睦親也晉修虞祀繼絶也索神以祭則旁洽百靈咸秩無文則逺霑累代且匱神乏祀春秋所非陟岡在原詩人攸歎國家仁及草木孝通神明澤旣漏於三泉恩亦覃於九族豈有逺則堂伯祖近則堂諸昆服未絶於緦麻情見遺於黍稷臣愚以為置之則綏族廢之則收恩綏族則廟存收恩則享絶事關聖慮奏定為宜謹議太廟遷祔議陳貞節蘇獻等議開元四年議曰禮天子三昭三穆與太祖為七昭穆迭毁而太祖常存聖人之大典也若禮名不正則奠獻無叙矣謹按孝和皇帝在廟七室已滿今睿宗大聖真皇帝是孝和之弟甫及仲冬禮當遷祔但兄弟入廟古則有焉逓遷之禮昭穆湏正謹按禮論晉太常賀循議云禮兄弟不相為後也故殷之盤庚不序陽甲而上繼於先君漢之光武唐志如此英華作武宣非不嗣於孝成而承於元帝又曰晉惠帝無後懐帝承絶一作統懐帝自繼於世唐諱祖而不繼於惠帝其晉惠帝當同陽甲孝成别出為廟又曰若兄弟相代則共是一代昭穆位同不可兼毁二廟此盖禮之常例也荀卿子曰有天下三字一作位天子者事七代謂從禰以上也尊者統廣故恩及逺祖若傍容兄弟上毁祖考此則天子有不得全事於七代之義也孝和皇帝有中興之功而無後嗣請同殷之陽甲漢之成帝出為别廟時祭不虧大祫之辰合食太祖奉睿宗神主昇祔太廟上繼高宗則昭穆永貞獻祼長序禮也此萬代之典敢不颺言謹議一作皆舊唐書志論肅明皇后請别立廟議議曰禮宗廟父昭子穆皆有配座毎室一帝一后禮之正儀自夏殷而來無易兹典伏惟昭成皇太后有太姒之德以配食於睿宗則肅明皇后無帝舊唐書志作啓母之尊自應别立一廟謹按周禮云奏夷則歌小吕以享先妣者姜嫄也姜嫄是帝嚳之妃后稷之母特為立廟名曰閟宫又禮論云晉伏系之議云晉簡文鄭宣后旣不配食乃築宫于外嵗時就廟享祭而已今肅明皇后無祔配之位請同姜嫄宣后别廟而處四時享祀一如舊儀謹議遷廟議權德輿貞元十五年九月今年夏四月禘享于太廟太祖景皇帝東嚮之位并遷廟之位右伏准今月十六日勑禘祫之祭禮之大者先有衆議猶未精詳宜更令百僚議限至二十六日内聞奏者臣聞禮有五經莫重於祭祭稱百順實受其福故曰萬物本乎天人本乎祖以太祖始封之重當殷祭東向之尊百代不遷下統昭穆此孝享嚴禋之極制也周自后稷十六代至武王毁廟遷主皆太祖之后故序列昭穆合食無嫌漢之太上皇主瘞于園寢尋置别廟是為屬尊故周漢皆太祖之位正自魏至隋則虚其位魏明帝初以太上集無上字皇别廟未成故權設對祫後有司定七廟之制太祖以下為昭穆二祧旋至三少帝運移於集作于晉晉不以兄弟為代數故元帝上繼武帝簡文上繼元帝至安帝時然後征西至京兆四府君遷盡未及殷祭運移于宋初永和中疑四府君主所藏之禮詔公卿博議范宣請文粹有特字築一室韋泓請室朽乃止蔡謨亦請改築别室若未展者當入就太廟以征西府君東嚮議竟不行宋齊梁陳北齊周隋悉虛其位以待太祖皆以短祚其禮不申則自魏以降太祖列昭穆之位非通例也武德中親廟四自宣簡公而下貞觀中立七廟六室自𢎞農府君而下開元中始制九廟追尊獻懿祖故自武德至于開元太祖在四廟七廟九廟之數則東向之虛又非例也廣德二年将及殷祭有司以二祖親盡當遷太祖九室旣備其年冬祫於是正太祖於東向藏二主於夾室凡十八年矣建中二年冬祫有司誤引蔡謨征西之議以獻祖居東向懿祖為昭太祖為穆此誠乖儀一作疑倒置之大者也議者或引春秋禹不先鯀湯不先契文武不先不窋以為證且湯與文武皆太祖之後理無所疑至於禹不先鯀安知説者非啟與太康之代而左丘明因而記之耶向者有司以二主藏夾室非儀文粹集本作宜則可闕殷祭非敬則可處東向之位則不可是以貞元七年冬太常上奏請下百寮僉議詔可其奏八年春有于頎等一十六狀至十一年又詔尚書省集議有陸淳宇文炫二狀前後異同有七家之説至於藏夾室虛東向逺遷園􅃦分饗禘祫如集作加幣玉虞集作虚主而枚卜瘞埋援集作膚引滋多皆失禮意臣等審細討論惟置别廟及祔于德明興聖二説最為可據德明興聖之廟從集作猶别廟也等于集作於創立此又易行伏以德明皇帝於舜禹之際與稷契同功契後為殷向五百年稷後為周逾八百年德明流光無窮啟皇運于后景福靈長與天地凖又獻懿二祖於興聖皇帝為曽𤣥猶周人祔於先公之祧也此亦亡於禮之文粹無此二字禮者也明尊祖之道正大祭之儀集本文粹作義禮文祀典莫重於是凡議同者七狀百有餘人其中名儒禮官講貫詳熟臣於貞元八年䝉聖恩以博士徴至京師屬當㑹議時與崔儆劉執經同狀十一年臣官備近侍不在議集本文粹作議禁中乃今累叨睿奬獲貳宗伯職業所守典禮是司研考古今罄竭愚管豈敢以疑文虚説黷陛下嚴敬重難之心其夾室等五家不安之説謹具條上伏惟聖慮裁擇謹議同前元稹謹按禮官以順宗至德大聖大安孝皇帝神主升祔則中宗太和大聖昭孝皇帝神主為代數當遷之廟議者云中宗復辟中興當為百代不遷之廟臺省官等又議云則天為居攝則中宗非中興之主不得為不遷之廟以愚所裁皆非得禮之中也按禮官為臺省官等議但以為中宗非中興故不得為不遷之宗皆曽不知雖實為中興亦不得為不遷之廟何則祖有功而宗有德盖為始有功者為祖始有德者為宗非謂後代有功有德者盡為祖宗也按禮緯云唐虞立二昭二穆與太祖之廟為五夏不立太祖之廟四廟而已至後代以禹為宗亦立五廟其餘仲康復厥位少康代寒浞豈非嗣夏中興哉並無祖宗之號至殷以契為始祖初立五廟後代以湯為宗遂立六廟太戊武丁之徒雖有中宗高宗之名盖子孫加之懿號而已亦無不祧之説周人以后稷為始祖後代又祖文王而宗武王遂立七廟唐虞殷周雖立廟之數不同其實親親之廟皆以四為凖禮記王制云天子七廟三昭三穆與太祖之廟而七盖后稷文武三廟為不遷其餘成康已降盡為祧廟故周禮守祧註云先公之祧祔於集作于后稷之廟先王之祧祔於文武之廟若以為後代有功有德者盡為不遷之廟則成康刑措宣王中興平王東遷集作周之始王並無集作盡為不祧之説豈非有功有德哉盖以為七廟之數既定若親盡之廟不毁則親親之昭穆無所設矣故不得不祧耳至漢承秦滅學之後諸儒不通大義匡衡貢禹之徒遂建議云高帝為太祖孝文為太宗孝武為代宗孝宣為中宗惠景已下為遷廟適值漢祚不永昭成已降德不逮於四君向若漢有八百之祚繼德之君有若孝文孝武者七人盡為不遷之廟豈可後代遂為不祀其祖禰哉不經之言孰甚於此又有以七廟之外别立祖宗之廟為説者以理推之尤為不可借集作假如聖朝以景皇帝為太祖神堯大聖大光孝皇帝為高祖文武大聖大廣孝皇帝為太宗别立昭穆之廟六合不遷之廟為九盡以為積厚者流澤廣故以増親親之廟六矣夫傳無窮者為萬代計國家以聖生聖以明繼明無非有德之宗盡是有功之祖則有祖有宗集作百祖千宗盡居集作歸别廟於禮又可乎必若俟其褒貶然後定祧遷則是臣子有輕議之非萬代無可傳之法考殷周則無據言情集有酌字禮則兩乖酌集作考古宜今孰云可者曷若削漢朝不經之説徴殷周可乆之文從親盡則遷之常規為百集作萬代不朽之定制集作計不易親親之祀終無它惑之疑誠一王盛典也謹議重修伍員廟議李善夷伍相公員也廟在澧江之渚自為冦所擾為兵火所焚為野火所燎為風雨所壊為江浪所侵垂二十年向為墟矣雖有鍾山蔣侯之驗其神亦無所依止澧守欲重建廟宇里人曰不可員楚之仇也鞭我死君其過也甚又曰員孝於父者其廟廢之則無以旌其孝建之則無以勸其忠太守不决一日問余愚曰太守不知伍員非不忠於君者楚平王非員之君也書曰普天之下莫非王土率土之濵莫非王臣楚之君即非天子也當平王之時君上乃周景王也楚子實天子之臣員即楚之陪臣呉楚之君乃五等封以其國迫近蠻夷地雖廣不得為侯伯而為子男故仲尼修春秋呉越楚雖大而不稱王止稱呉子越子楚子而已王乃彼之自僣則欺天欺天則安得其下不逆夫覆載之内天子為君上固不可異二諸侯賜弓矢然後征賜斧鉞然後殺楚之諸子觀兵滅國無代無之子胥周之臣也君在上不欺天者忠也復父仇者孝也忠孝旣備安得無馨香之祀乎文苑英華巻七百六十三
