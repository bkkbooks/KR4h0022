body:
  text: 文苑英華巻七百三十一宋李昉等編餞送十四送浮屠師文暢序一首送廖道士序一首送石洪處士赴河陽叅謀序一首送温造處士赴河陽軍序一首送權秀才序一首送何堅歸序一首送王塤秀才序一首送齊皡下第歸序一首送牛堪登第歸序一首送進士王含序一首送張童子序一首送陳宻序一首同呉武陵送前桂州杜留後序一首送邠寧獨孤書記赴辟命序一首送薛判官量移序一首送李判官徃桂州序一首送寧國范明府序一首送薛存義之任序一首送詩人廖有方序一首送澥序一首送李渭赴京師序一首送浮屠文暢序韓愈人固有儒名而墨行者問其名則是校其行則非可以與之游乎如有墨名而儒行者問其名則非校其行則是可以與之游乎楊子雲稱在門牆則揮之在夷狄則進之吾取以爲法焉浮屠師文暢喜爲文章其周游天下凡有集有所字行必請於搢紳先生以求詠歌其所志貞元十九年春將行東南柳君宗元爲之請集作序解其裝得所叙詩累百餘篇非至篤好其何能致多如是耶惜其無以聖人之道告集有之字者而徒舉浮屠之說贈焉夫文暢浮屠也如欲聞浮屠之說當自就其師而問之何故謁吾徒而來請也彼見吾君臣父子之懿文物禮樂集作事爲之盛其心必有慕焉拘其法而未能入故樂聞其說而請之如吾徒者冝當告之以二帝三王之道日月星辰之所以行天地之所以著鬼神之所以幽人物之所以蕃江河之所以流而語之不當又爲集作就浮屠之說而瀆告之也人集作民之初生固若禽獸夷狄然聖人者立然後知宫居而粒食親親而尊尊生者養而死者藏是故道莫大於集作過乎仁義教莫正集作大乎禮樂刑政施之於天下萬物得其宜措之於其躬體安而氣平堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武文武以是傳之周公孔子書之於册中國之人世守之今浮屠者孰爲之而孰傳之耶夫鳥俛而啄仰而四顧夫獸深居而簡出懼物之爲已害也猶且不免焉弱之肉疆之食今吾與文暢安居而暇食優游以生死與禽獸異者寧可不知其所自耶夫不知者非其人之罪也知而不爲集有之字者惑也悅乎故不能即乎新者弱集作溺也知而不以告人集作之者不仁也告而不以實者不信也余既重柳請又嘉浮屠能喜文辭於是乎言送廖道士序五嶽於中州衡山最逺南方之山巍然髙而大者以百數獨衡山爲宗最逺而獨爲宗其神必靈衡之南八九百里地益髙山益峻水清而益駛其最髙而横絶南北者嶺郴之爲州在嶺之上側南二字集作測其髙下得三之二焉中州清淑之氣於是焉窮氣之所窮盛而不過必蜿蟺扶輿磅礴而欝積衡山之神既靈而郴之爲州又當其集無其字中州清淑之氣蜿蟺扶輿磅礴而欝積其水土之所生神氣之所感白金水銀丹砂石英鍾乳橘柚之包竹箭之羙千尋之名材不能獨當竒蜀本無竒字也意必有魁竒忠信材德之民生其間而吾又未見也其無乃迷惑没溺於老佛之學集作教而不出耶廖師郴民而學於衡山氣專而容寂多藝而善遊豈吾所謂魁竒而迷惑没溺者耶廖師善知人若不在其身必在其所與游訪之而不吾告何也於其别申以問之送石洪處士赴河陽叅謀序河陽軍節度御史大夫烏公爲節度之三月求士於從事之賢者有薦石先生者公曰先生何如曰先生居嵩邙瀍糓之間冬一裘夏一葛集有食字朝夕飯一盂蔬一盤人與之錢則辭請與出遊未嘗以事免勸之仕則不應坐一室左右圖書與之語道理辯古今事當否論人髙下事後當成敗若河决下流而東注若駟馬駕輕車就熟集作夷路而王良造父爲之先後也若燭照數計而龜卜集作兆也大夫曰先生有以自老無求於人其肯爲某來耶從事曰大夫文武忠孝求士爲國不私其集作於家方今冦聚於垣師環其疆農不耕收集作牧財粟殫亡吾所處地歸輸之塗治法征謀宜有所主集作出先生仁且勇若以義請而疆委重焉其何說之辭於是譔書詞具馬幣卜日以授使者求先生之廬而請焉先生不告於妻子不謀於朋友集作其朋冠帶出見客拜受書禮於門内宵則沐浴戒行事集作李載書䇿問道所由告行於嘗集作常所求徃者晨則畢至張筵於上東門外酒三行且起有執爵而言者曰大夫眞能以義取人先生眞能以道自任决去就一無此三字爲先生别又酌而祝曰凡士之去就出處何常惟義之歸遂以爲先生夀又酌而祝曰使大夫恒無變其初無務富其家而饑其師無丼受佞人而外敬正士無味於諂言唯先生是聽以能有成功保天子之寵命又祝曰使先生無圖杭本作固利於大夫而私便其身圖先生起拜祝辭曰敢不敬蚤夜以求從祝規於是東都之人士咸知大夫與先生果能相與以有成也遂各爲歌詩六韻遣集作退愈爲之序云送温造處士赴河陽軍序伯樂一過冀北之野而馬羣遂空夫冀北馬多於天下伯樂雖善知馬安能遂空其羣耶解之者曰吾所謂空非無馬也無良馬也伯樂知馬遇其良輙取之羣無留良焉茍無留其良雖謂無馬不爲虚語矣東都固士大夫之冀北也恃集作懐才能深藏而不賈集作市者洛之北涯曰石生其南涯曰温生大夫烏公以鈇鉞鎭河陽之三月以石生爲才以禮爲羅羅而致之幕下未數月也以温生爲才於是以石生爲媒以禮爲羅又羅而致之慕下東都雖信多才士朝取一人焉㧞其尤暮取一人焉㧞其尤自居守河南尹以及百司之執事與吾軰二縣之大夫政有所不通事有所可疑奚所諮而取焉士大夫之去位而巷處者誰與嬉游小子後生於何考德而問業焉搢紳之東西行過是都者無所禮於其廬若是而稱曰大夫烏公一鎮河陽而東都處士之廬無人焉豈不可也夫南靣而聽天下其所託重而恃力者唯將與相耳相爲天子得人於朝廷將爲天子得文武士於幕下求内外無理集作治不可得也愈縻於兹不能自引去資二生以待老今皆爲有力者奪之其何能無介然於懐耶生既至拜公於軍門其爲吾以前所稱爲天下賀以後所稱爲吾致集作致字私怨於盡取也留守相公首爲四韻詩歌其事愈因推其意而叙焉送權秀才序伯樂之厩多良馬卞和之匱多羙玉卓犖瓌恠集作竒之士宜乎游於大人君子之門也相國隴西董公既平汴州天子命御史大夫呉縣男爲軍司馬門下之士權生實從之來權生之貌固若常人耳其文辭引物連類窮情盡變宫商相宣金石諧和一作聲寂寥乎短章舂容乎大篇如是者閱之累日而無窮焉愈常觀於皇都每年貢士至千餘人或與之遊或得其文若權生者百無一二焉如是而將進於明有司重之以呉縣之知其果有成哉於是咸賦詩以贈之送何堅序何於集作與韓同姓爲近堅以進士舉於吾爲同業其在太學也吾爲博士堅爲生生與博士爲同道其識堅也十年爲故人同姓而近也同業也同道也故人也於其志不得願而歸其可以無言耶堅道州人道之守陽公賢也道於湖南爲屬州湖南楊公又賢也堅爲民堅又賢也湖南得道爲屬道得堅爲民堅歸唱其州之父老子弟服陽公之令道亦唱其縣與其比州服楊公之令吾聞鳥有鳯者恒出於有道之國當漢時黄覇爲潁川集有守字是鳥也實集而鳴焉若史可信堅歸吾將賀其見鳯而聞其鳴也已送王塤秀才序吾嘗集作常以爲孔子之道大而能博門弟子不能徧觀而盡識也故學焉而皆得其性之所近其後離散分處諸侯之國又各以所能授弟子源逺而末益分集作引盖子夏之學其後有田子方子方之後流而爲莊周故周之書喜稱子方之爲人荀卿之書語聖人必曰孔子子弓子弓之事業不傳唯太史公書弟子傳有姓名字耳一作有姓名耳曰馯音韓姓也臂子弓子弓受易於商瞿盖孟軻師子思子思之學盖出曽子自孔子殁羣弟子莫不有善獨孟軻集有氏字之傳得其宗故吾集作余少而樂觀焉太原王塤示余所爲文好舉孟子之所道者與之言信悅孟子而屢賛其文辭夫沿河而下茍不止雖有疾遲集作遲疾必至於海如不得其道也雖疾不止終不得集作幸而至焉故學者必愼其所道道於楊墨老莊佛之學而欲之聖人之道者猶航斷港絶潢以望至於海也故求觀聖人之道者必自孟子始今塤之所由既㡬於知道如又得其船與檝知沿而不止嗚呼其可量也哉送齊皡一作曎升下第序古之所謂公無私者其取捨進退無擇於親䟽逺邇唯其宜可焉其下之視上也亦唯視其舉黜之當否不以親䟽逺邇疑乎其上之人也故上之人行志擇誼坦乎其無憂於下也下之人剋已愼行確乎其無惑於上也是故爲君不勞而爲臣甚易見一善焉可得詳而舉也見一不善焉可得明而去也及道之衰上下交疑於是乎舉讎舉子之事載之傳中而稱羙之謂之忠見一善焉若親與邇不敢舉也見一不善焉若䟽與逺不敢去也衆人之所同好焉矯而黜之乃公也衆人之所同惡焉激而舉之廼忠也於是乎有違心之行有怫志之言有内愧之名若是者俗所謂良有司也膚受之訴集作愬不行於君巧言之誣不起於人矣嗚呼今之君天下者不亦勞乎爲有司者不亦難乎爲人集作亡嚮道者不亦勤乎是故端居而念焉非君人者之過也則曰有司焉則非有司之過也則曰今舉天下人焉則非今舉天下人之過也盖其漸有因其本有根生於私其親成於私其身以已之不直而謂人皆然其植之也固乆其除之也實難非百年必世不可得而化也非知命不惑不可得而改也已矣乎其終能復古乎若髙陽齊生者其起予者乎齊生之兄爲時名相出藩于鎭南朝之碩臣皆其舊交齊生舉進士有司用是連枉齊生齊生不以云乃曰我之未至也有司其集作豈枉我哉我將利吾噐而俟其時耳抱負其業東歸於家吾觀於人有不得志則非其上者衆矣亦莫計其身之短長也若齊生既不得志矣五字集作既至矣而曰吾未至也不以閔於有司其不亦鮮乎哉吾用是知齊生後日誠良有司也能復古者也公無私者也知命不惑者也送牛堪登第歸序以明經舉者誦數十萬言又約通大義徴辭引類旁出入他經者又誦數十萬言其爲業也勤矣登第於有司者去民畆而就吏禄由是進而累爲卿相者常常有之其爲獲也亦大矣然吾未嘗聞有登第於有司而進謝於其門者豈有司之待之也抑集作御以公不以情舉者之望於有司也亦將然乎其進而謝於其門也集無也字則爲私乎抑無乃人事之未思或者不能舉其禮乎若牛堪者思慮足以及之材質足以行之而又不聞其徃者其將集無將字有以哉違衆集作俗而求識立竒而取名非堪心之所存也由是而觀之若堪之用心其至於集作爲大官也不爲幸矣堪太學生也余博士也博士師屬也於其集無其字登第而歸將榮於其鄉也能無說乎送進士王含秀才序吾少時讀醉鄉記私恠隠居者無所累於世而猶有是言豈誠㫖於味耶及讀阮籍陶潜詩然後乃知彼雖偃蹇不欲與世接然猶未能平其心或集作不爲事物是非相感發於是有託而逃焉者也若顔氏之子集作子之操瓢與簞食曽參歌聲若出金石彼得聖人而師之汲汲若不可及其於外也固不暇尚何事麴蘖之託而昏𡨕之逃耶吾又以爲悲醉鄉之徒不遇也建中初天子嗣位有意貞觀開元之丕績在朝廷之臣争言事當此時醉鄉之後世又以直廢吾旣悲醉鄉之文辭而又嘉良臣之烈思識其子孫今子之來見我也無所挾吾猶將張之况文與行不失其集作於世守渾然端且厚惜乎吾力不能振之而其言不見信於世也於其集作是行姑與之飲酒送集作贈張童子序天下之以明二經舉於禮部者嵗至三千人始自縣考試定其可舉者然後升於州若府其不能中科者不與是數焉州若府摠其屬之所升又考試之如縣加察詳焉定其可舉者然後貢於天子而升之有司其不能中科者不與是數焉謂之鄉貢有司者揔州府之所升而考試之加察詳焉第其可進者以名上於天子而藏之屬之吏部嵗不及二百人謂之出身能在是選厥惟艱哉二經章句僅數十萬言其傳注在外皆誦之又約知其大說繇是舉者或逺至十餘年然後與乎二千之數而升於禮部矣又或逺至十餘年然後與乎二百之數而進於吏部矣班白之老二字蜀本作者半焉昬塞不能及者皆不在是限有終身不得與者焉張童子生九年自州縣逹禮部一舉而進立於二百人之列乂二年益通二經有司復上其事繇是拜衛兵曹之命人皆謂童子耳目明逹神氣以靈余亦偉童子之獨出於等夷也童子請於其官之長隨父而寧母嵗八月自京師道一作届陜南至虢東及洛師北過大河之陽九月始來及集作仄鄭自朝之聞集作文人以及五都之伯長羣吏集作群縣皆厚其餼賂或作歌詩以嘉童子童子亦榮矣雖然愈將進童子於道使人謂童子求益者非欲速成者夫少之與長也異觀少之時人唯童子之異及其長也將責成人之禮焉成人之禮非盡於童子所能而已也然則童子宜暫息乎其已學者而勤乎其未學者可也愈與童子俱陸公之門人也慕回路二子之相請贈出趙德本無出字與處也故有以贈童子送陳宻序太學生陳宻請於余曰宻承訓於先生今將歸拜集作覲其親不得朝夕見願先生賜之言宻將以爲戒宻來太學舉明經者累年不獲其選是弗利於是科也今將易其業也三禮是習願先生之張之也宻將以爲鄉榮余媿乎其言遺之言曰子之業信習矣其儀容信合於禮矣抑吾所見者外也夫外不足以信内子誦其文則思其義習其儀則行其道則將謂子君子也爵禄之來也不可辭矣科寧有利不利耶同呉武陵送前桂州杜留後序栁宗元觀室者觀其隅隅之巍然直方以固則其中必端莊宏逹可居者也人孰異夫是今若杜君之隅可觀而中可居居之者德也贊南方之理理是以大摠留府之政政是以光其道不撓好古書百家言洋洋滿車行則與俱止則相對積爲義府溢爲髙文慤而和肆而信豈詩所謂抑抑威儀惟德之隅者耶今徃也有以其道聞於天子天子唯士之求爲急杜君欲辭爭臣侍從之位其可得乎濮陽吳武陵直而甚文樂杜君之道作詩以言余猶吳也故於是乎序焉集無焉字送邠寧獨孤書記赴辟命序僕間嵗驟遊邠疆今戎帥楊大夫時爲候奄盡䕶羣校用笞法箠令不吐强禦下莫有逗撓陵暴而犯令者沉斷壯勇專志武力出麾下取主公之節鉞而代之位鶡冠者仰而榮之今又能旁貴文雅以符一有檄字召文士之秀者河南獨孤宻署爲記室俾職文翰翕然致得士之稱於談者之口盖朝廷以勇爵論將帥豈濫也哉獨孤生與仲兄實集作實連舉進士並時管記於漢中新平二連帥府俱以筆硯承荷舊德位未逹而榮如貴仕其難乎哉噫自犬戎陷河右逼西鄙精集作積兵備虞縣道告勞内匱中府太倉之蓄僅而獲饜投石而賈勇者思所以奮力論者以爲天子且復河壖故疆拓達西戎而罷諸侯之兵則曵裾戎幕之下專弄文墨爲壯夫捧腹甚未可也吾子歴攬古今之變而通其得失是將植宻畫於借筯之宴發羣謀於草集作章奏之筆上爲明天子論列熟計而導揚威命然後談笑罇爼賦從軍之樂移書飛文諭告西土刼脅之伍俾其簞食壺漿犒迎王師在吾子而已徃愼辭令集有無字使諭蜀之書燕然之文炳列於漢史眞可慕也不然是𤨏𤨏者惡足置齒牙間而榮吾子哉送薛判官量移序仕於世有勞而見罪凢人處是鮮不怨懟忿憤列於上愬於下此恒狀也異於恒者其道冝顯薛生司貨賄於軍興之際兵亂不去然得以不犯由太行以東皆傳道之可以爲勞矣而竟連大獄以至於放不慼集作戚於貌不悱於心樂以自肥而未嘗尤於物其有異於恒矣哉朝廷施恩澤集有大字凢受謫者罪得而未薄乃命以近壤薛君去連而吏於朗是其漸於顯歟君子學以植其志信以篤其道有異於恒者充而大之茍推是以徃雖欲辭顯難矣送李判官徃桂州序士之習爲吏者恒病於少文故給而不肆餙於華者恒病於無斷故放而不制今李生學於詩有年矣吟詠風賦頗聞乎人至於是州惟州之牧咨焉以贊戎亊而紏郡集作群吏甚直且武豈所謂吏而華者耶以府䘮罷去擇而之乎有禮之邦推是道也以徃然而不際於禮則吾不知也送寧國范明府序永本詩序近制凢得仕於王者嵗登名於吏部兵部則必叅其等列分而合之率三十人以爲曹謂一甲名書爲三其一藏之有司其二藏之中書洎門下每大選置大考績必關决㑹驗而視其成有不合者下有司罷去甚衆由是吏得爲奸以立威賊智以集作而弄權詭竊竄易而莫有集作示其實必求端慤而習於事辯逹而勤其務者命之官而掌之居三年則又益其官而後去其職有范氏傳眞者始來京師近臣多言其美宰相聞之用以爲是職在門下甚獲休問初命京兆武功尉旣有成績復於有司爲宣州寧國令人咸曰由邦畿而調者命東西部尉以爲美仕范生曰不然夫仕之爲美利乎人之謂也與其給於供備孰若安於化導故求發吾所學者施於物而已矣夫爲吏者人役也役於人而食有集作其力可無報耶今吾將致其慈愛禮節而去其欺偽陵暴以惠斯人而後有其禄庶可平吾心而不愧於色茍獲是焉足矣季弟爲殿中侍御史以是言也告於其僚咸悅而尚之故爲詩以重其去而使余爲序送薛存義之任序河東薛存義將行栁子載肉于爼崇酒于觴追而送之江蜀本有之字滸飲食之且告曰凢吏於土者若知其職乎盖民之役非以役民而已也凢民之食於土者出其什一傭乎吏使司平於我也今我集無我字受其直怠其亊者天下皆然豈唯怠之又從而盗之向使傭一夫於家受若直怠若事又盗若貨噐則必甚怒而黜罰之矣以今天下多類此而民莫敢肆其怒與黜罰何哉勢不同也勢不同而理同如吾民何有達於理者得不恐而畏乎存義假令零陵二年矣蚤作而夜思勤力而勞心訟者平賦者均老弱無蜀本作寧懐詐暴憎其爲不虛取直也的矣其知恐而畏也審矣吾賤且辱不得與考績幽明之說於其徃也故賞以酒肉而重之以辭送詩人廖有方序交州多南金珠璣瑇瑁象犀其産皆竒恠至於草木亦殊異吾常恠陽德之炳耀獨發於紛葩瓌麗而罕鍾乎人今廖生剛徤重厚孝悌集作道信讓以質乎中集作内而文乎外爲唐詩有大雅之道夫固鍾於陽德者耶是世之所罕也今之世恒人其於紛葩瓌麗則凢知貴之矣其亦有貴廖生者耶果能是則吾不謂之恒人矣是集作實亦世之所罕也送澥序人咸言吾宗冝碩大有積德焉在髙宗時並居尚書省二十二人遭諸武以故衰耗武氏敗猶不能興集注有不能二字非爲尚書吏者間十數嵗乃一人永貞元年吾與族兄登並爲禮部屬吾黜而季父公綽更爲刑一有吏二二字部郎則加稠焉又觀宗中爲文雅者炳炳然以十數仁義固其素也意者復興乎三字集作復其興乎自吾爲僇人居南鄉後之頴然出者吾不見之也其在道路幸而過余者猶集作獨得澥澥質厚不諂敦朴有裕若噐焉必隆然大而後可以有受擇所以入之者而已矣其文蓄積甚富好慕甚正若墻焉必基之廣而後可以有蔽擇其所以出之者而已矣勤聖人之道輔以孝悌復嚮時之美吾於澥焉是望汝徃哉見諸宗人爲我謝而勉焉無若太山之麓止而不得升也其唯川之不集作似已乎吾去子終老於夷矣送李渭赴京師序過洞庭上湘江非有罪左遷者罕至又况踰臨源嶺下灕水出荔浦名不在刑部而來吏者其加少也固宜前余逐居永州李君至固恠其棄美仕就醜地無所束縳自取瘴癘後余斥刺栁州至於桂君又在焉方屑屑爲吏噫何自苦爲集作如是耶明時宗室屬子當尉畿縣王師連征不貢二府方汲汲求士李君讀書爲詩有幹局乆遊燕魏趙代間知人情識地利能言其故以是入都於丞相益國事不求獲於集作乎已而已以有獲予嫉其不爲是乆矣今而曰將行請余以言行哉行哉言止是而已文苑英華巻七百三十一
