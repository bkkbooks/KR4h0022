body:
  text: 文苑英華巻三百二十七宋李昉等編花木七草附藥五首茶二首蘭九首萱三首衆草九首苔三首蘆葦四首萍三首枸把二首雜詠七首木葉十首藥採藥大布山吳筠我本此一作北山北縁澗採山麻九莖日反照三葉長生花可以蠲憂疾聊持駐景斜景斜不可駐年來果如驅安得崑崙山偃蹇樹三株三株樹始一作闕荄絳葉陵朱臺玉壺白鳳肺金鼎青龍胎韓衆及王子何代無仙才安期倘欲顧相見在蓬萊一作皆藝文類聚採石上菖蒲江淹瑶琴乆蕪沒金鏡廢不看不見空閨裡縱横愁思端緩歩遵行波一作汙渚揚栧泛春瀾竇赤煙流綺水緑滔輕一作挂㴠丹憑酒意未悦半景方自歎每為􅁨見集杜若詎能寛冀採石上草得以駐衰顔赤鯉儻可乗雲霧不復還一作皆藝文類聚採藥王績野情貪藥餌郊居倦蓬蓽青龍復集作䕶道符白犬遊山述集作要鐮戊已月集作旦負挿庚集作丙辛日時時斷障遮集作横徃徃孤峯出行披葛仙注坐騐農皇帙集作坐檢神農帙龜蛇採二苓赤白尋雙术地凍根難盡藂枯苗易失蓯蓉肉作名薯蕷膏成質家豐松葉酒蕉集作噐貯參花蜜且復歸去来刀圭輔集作飬衰疾春泉洗藥宋之問今日遊何處春泉洗藥歸悠然紫芝曲晝掩白雲扉魚樂偏尋藻人間音閑屢採薇此中無俗事身世兩相違藥前人有嘉疑祕神仙君臣有禮焉忻當苦口喻不晨疑入腸偏扁鵲功成日神農定器然疑丹成如可待鷄犬自聞天茶喜園中茶生韋應物潔性不可汙為飲滌塵煩此物信􅂕味本自出山原聊因理郡餘率爾植荒園嘉集作喜隨衆草長得與幽人言峽中嘗茶鄭谷蔟蔟新英摘露光小江園裏火前嘗呉僧謾說鴉山好蜀叟休誇烏集作鳥觜香入集作含座半甌輕泛緑開緘數片淺含黄鹿門病客不歸去酒渇更知春味長蘭賦得蘭澤多芳草梁孝元帝春蘭本無艷春澤最葳蕤燕姬得夣罷尚書奏事歸臨池影入浪從風香拂衣當門已芬馥入室更初學記作復芳菲蘭生不擇逕十歩豈難稀以下四篇並見初學記蘭後梁宣帝折莖聊可佩入室自成芳開花不競節含秀委㣲霜賦新題得蘭生野逕張正見披襟出蘭畹命酌動幽心鋤罷還開路歌諠自動琴華燈共影落芳杜雜花深莫言閒逕裏遂不斷黄金芳蘭唐太宗春暉開禁初學作紫苑淑景媚蘭場映庭含淺色凝露泫浮光日麗参差影風傳初學記作和輕重香㑹湏君子折佩裏作芬芳園中時􅂼盡加鋤理唯秋蘭數本萎集作委而不顧彼雖一物有足悲者遂賦二章張九齡場藿已成嵗園葵亦向陽蘭時獨不遇集作偶露節漸無芳㫖異青為蓄甘非蔗有漿人多利一飽誰復惜馨香二幸得不鋤去孤苖守舊根無心羡㫖蓄豈欲近名園遇賞寧充佩為生莫礙門幽林芳意在非是為人論蘭和人釋無可蘭色結春光氛氲掩衆芳閉門階覆葉尋澤逕連香畹静風吹亂亭秋雨引長􅂕均曽搴擷紉珮桂荷裳余昔自西濵得蘭數本移蓺於庭亦既逾嵗而芃然蕃殖自余遊者未始以芳草為遇矣因悲夫物有厭常而返不若混然者有之焉遂寄情於此温庭筠寓賞本殊致意幽非我情吾常疑有流疑淺外物無重輕各言藝幽深彼美香素莖豈為賞者設自保孤根生易地無赤株䴡土亦同榮賞際林壑近泛餘煙露清余懐既欝陶爾類徒縱横妍蚩茍不信寵辱何為驚真隐諒無迹激時猶簡集作揀名幽叢靄緑畹豈必懐歸耕種蘭陳陶種蘭幽谷底四逺聞馨香春風長養深枝葉趂人長智水潤其根仁鋤䕶其芳蒿藜不生地惡鳥弓已藏椒桂夾四隅茅茨居其一作中央左隣桃花塢右接蓮子塘一月薫手足兩月薫衣裳三月薫肌骨四月薫心腸幽人饑如何採蘭充餱糧幽人渇如何醖蘭為酒漿地無青苖租白日如散王疑不嘗仙人藥端坐紅霞房日夕望美人佩花正煌煌美人久不來佩花徒生光劉穫及葳蕤無令見雪霜清芬信神鬼一葉豈可㤀舉頭愧青天鼓腹詠時康下有賢公卿上有聖明王無階答風雨願獻蘭一筐萱萱草陽休之開跗幽澗底散彩曲堂垂􅄖柔清露濕㣲穆恵風吹朝朝含麗景夜夜對華池詠階前萱草魏彦深緑草正含芳靃靡映前堂帶心花欲發依籠葉已長雲度時無影風來乍有香横得㤀憂號余憂遂不㤀萱草李嶠履一作屣歩尋芳草一作日㤀憂自結叢葉舒春夏緑花吐淺深紅一作黄英開養性緑葉正依籠色湛仙人露香傳少女風含貞一作還依北堂下曹植動文雄衆草除草杜甫草有害於人曽何生阻脩其毒甚蜂蠆其多彌道周清晨歩前林江色未散憂芒刺在我眼焉能待髙秋霜露集作雪一霑衣集作凝蕙葉亦難留荷鋤先童稚日入仍討求轉致水中央豈無雙釣舟頑根易滋蔓敢使依舊丘自移集作兹藩籬曠更覺松竹幽芟夷不可闕疾惡信如讎樹中草李白鳥銜野田草誤入枯桑裏客土植危根逢春猶不死草木雖有情因依尚可生如何同枝葉各自有枯榮春草謡顧况春草不觧行隨人上空城正月二月色綿綿千里萬里傷人情草張南史草草折宜看好滿地生催人老金殿玉砌荒城古道青青千里遥悵悵三春早毎逄南北離别乍逐東西傾倒一身本是山中人聊與王孫慰懐抱庭草曹鄴庭草根自淺造化無遺功低廻一寸心不敢怨春風賦得池塘生春草陳潤謝公遺詠䖏池水夾通津古徃人何在年來草自春色宜波際緑香爱雨中新今日青青意空悲行路人曲江春草鄭谷花落江堤簇暖烟雨餘江集作山色逺相連香輪莫輾青青破留與愁人一醉眠芳草二首羅鄴廢苑墻南淺雨中似袍顔色正蒙茸㣲香暗惹行人歩逺緑纔分闘雉蹤三楚溪頭長恨見五侯門外却難逢年年縱有春風便馬足車輪一萬重二芳草和烟暖更青閒門要路一時生年年檢㸃人間事唯有春風不世情苔詠青苔沈約見初學記縁階已漠漠汎水復綿綿㣲根如欲斷輕絲似更聫長風隠細草深堂没綺錢榮欝無人贈葳蕤徒可憐同舍弟佶班韋二員外秋苔對之成詠包何每看苔蘚色如向簿書閒幽思纏芳樹髙情寄逺山雨痕連地緑日映出林斑却笑興公賦臨危滑石間苔錢鄭谷春青秋紫繞池䑓箇箇圓如濟世財雨後無端滿窮巷買花不得買愁來蘆葦友人池上詠蘆曹松秋聲誰種得蕭瑟在池欄葉澁栖蝉稳叢踈宿鷺難歛烟宜下闕颯吹省先寒此物生蒼島令人憶釣竿蘆葦王貞白髙士想江湖湖閒疑庭植蘆清風時有至緑竹興何殊嫩喜日光薄踈􅁨雨㸃麤驚蛙跳得過鬭雀裊如無未識巴籬護幾䑓疑卭竹扶惹烟輕弱栁蘸水嫩清蒲溉灌情偏重琴樽賞不辜穿花思釣叟吹葉少𦍑雛寒色暮天映秋聲逺籟俱朗吟應有趣瀟洒十餘株叢葦張蠙叢類詩作葦叢寒水邊曽折掃魚船忽類詩作或與亭䑓近翻嫌島嶼偏花明無月夜聲急正秋天遥憶巴陵渡殘陽一望烟使院栽葦薛能戞戞復差差一叢千萬枝格如僧住處栽得吏閒時笋自㕔中出根從府外移從軍無宿例空想夜風吹萍賦得池萍庾肩吾風翻乍青紫浪起時踈宻本欲嘆無根還驚能有實萍呉均一作南齊劉繪可憐池裏一作内萍葐蒀草盛貎一作氛氲紫復青工一作巧隨浪開合能逐水低平㣲根無所綴細葉詎湏莖飄蕩一作泊終難測流連如有情同前李嶠二月虹初見三清单題詩作春蟻正浮青蘋含吹轉紫葉帶波流屢逐明神薦恒隨旅客遊既能甜似蜜還復繞单題詩作繞楚王舟枸杞楚州開元寺北院枸杞臨井繁茂可觀羣賢賦詩因以繼和劉禹錫僧房藥樹依寒井井有香泉樹有靈翠黛葉生籠石甃殷紅子熟照銅瓶枝繁本是仙人杖根老新成瑞犬形上品功能甘露味還知一勺可延齡枸杞寄郭使君集作和郭使君題枸杞白居易山隂集作陽太守政嚴明吏静民集作夜静人安無犬驚不知靈藥根成狗怪得時聞吠夜聲雜詠烹葵昨臥不夕食今起乃朝饑貧厨何所有炊稻烹秋葵紅粒香復軟緑英滑且肥饑來止於飽飽復何所集作飽後復何思憶昔集作思憶榮遇日迨今窮退時今亦不凍餒昔亦無餘資口既不减食身又不减衣撫心私自問何者是榮衰勿學常人意其間分是非和李君鍾種葛戎昱弱質人皆棄唯君手自栽藟含霜後竹枝惹臘前梅擬託凌雲勢湏憑接引材清隂如可惜黄鳥定飛來茅李嶠見單題詩楚甸供王日衡陽入貢年麏包青野外鴟嘯綺楹前堯帝成茨罷殷湯祭雨旋方期大君錫不懼小巫捐芳蓀生茅山東溪陶隐君謂之溪蓀花紫色生淺水中李徳裕楚客重蘭蓀遺芳今未歇葉抽清淺水花照暄妍節紫艶映渠鮮輕香含露發集作潔離居若有贈暫與幽人折移莎唐彦謙移徙杜城曲置在小齋東正是髙秋裏仍兼細雨中結根方迸竹踈䕃説髙桐冉冉齊芳草飄飄笑斷􅅾片時留静者一夜響鳴蛩野露通宵滴溪烟盡日蒙試才卑庾薤求味笑周菘只此霜栽好他時贈伯翁西明寺威公盆池新稻前人為笑江南種稻時露蝉鳴後雨霏霏蓮盆積潤分畦小藻井垂隂擢秀稀得地又生金象界結根仍對水田衣支公尚有三呉思更使幽人憶釣磯草木言陳陶何生我蒼蒼何育我黄黄草木無知識幸君同三光始自受姓名葳蕤立表疑作衣裳山河既分䴡齊首乳青陽甘辛各有榮好醜不相防嘗憂刀斧刼竊慕仁夀鄉願天雨無暴願地風無狂雨足因衰憊風多因夭傷在山不為桂徒尋君髙岡在水不為蓮徒占君深塘勿輕培塿阜或有竒棟梁勿輕䝉蘢澤或有竒馨香涓毫可蔍差疑朝茵夀為長擁腫若無取大椿命為傷婆娑不材生苒苒向秋荒幸遭薫風日有得皆簸揚所愧雨露恩願效幽㣲芳希君頻採擇勿使枯雪霜木葉題落葉司空曙霜景催危葉今朝半樹空蕭條故國異零落旅人同颯岸浮寒水依階擁夜蟲隨風偏可羡得到洛陽宫集作城中衞明府寄枇杷葉以詩答傾筐呈緑葉重疊色何鮮詎是秋風裏猶如曉露前傳僑方見重消疾本應便全勝甘蕉贈空投謝氏篇落葉孔紹安早秋驚葉落飄零似客心翻飛未肯下猶言惜故林一葉落白居易煩暑欝未退凉飈潜已起寒温與盛衰迭相為表裏蕭蕭衆林下一葉忽先萎勿言一葉㣲摇落從此始同前薛能輕葉獨悠悠天髙片影流隨風來此地何樹落先秋變色黄應近亂枝緑尚稠無雙浮水面孤絶落闗頭乍减誠難覺将凋勢未休客心空自比誰肯問新愁隕葉釋無可遶巷夾溪紅蕭條逐北風别林遺宿鳥浮水載鳴蟲石小埋初盡枝長落未終闕霜書䴡什閒讀白雲中題桐葉杜牧去年桐葉故溪上把筆偶集作把葉因題歸燕詩江樓今日送歸燕正是去年題葉時葉落燕歸今集作真可惜東流𤣥髪且無期笑筵歌席反惆悵朗月清風愴集作見别離荘叟彭殤同在夢陶潜身世兩相遺一丸五色成虗席集作語石爛松薪更莫疑哆天也切侈不勞文似錦進趨何必利如錐錢神任爾知無敵酒聖於吾亦庻幾江畔秋光蟾閤鏡檻前山萃茂陵眉樽芳集作香輕泛數枝菊簷影斜侵半局棋休指宦途論巧拙祗将愚直禱神祗三呉烟水平生念寧向閒人道所之和杜録事題紅葉白居易寒山十月旦霜葉一時新似燒非因火如花不待春連行排絳帳亂落剪紅巾觧駐籃舁集作輿看風前唯兩人紅葉羅隠不奈荒城畔那堪晩照中野晴霜裛緑山冷雨摧紅游子灞陵道美人長信宫等閒俱集作居嵗暮摇落意無竆同前唐彦謙無處闕髙樓臨道旁素娥前夕月青女夜來霜宿雨隨時潤秋晴着物光幽懐長若此病眼更相妨蜀紙裁深色燕脂落靚粧低叢侵小閤倒影入囘塘謝朓留霞綺甘寧棄錦張何人休逺道是處有斜陽薜荔垂書幌梧桐墜井牀晩風生旅館寒箒近僧房桂緑明淮殿楓丹照楚鄉鴈踈臨鄠杜蝉急傍瀟湘樹異桓宣武園非顧辟疆茂陵愁臥客不自保危腸丈苑英華巻三百二十七
