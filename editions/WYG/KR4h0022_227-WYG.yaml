body:
  text: 文苑英華巻二百二十七宋李昉等編道門三宫觀三十三首送僧道人二十六首宫觀早冬遊至王屋自靈都抵陽臺上方望天壇偶成一章寄温谷周尊師中書李相公白居易霜降山水清王屋十月時石泉碧深深集作漾漾巖樹紅離離朝為靈都遊暮有陽臺期飄然塵世外鸞鶴如可追忽念公程盡復慙身力衰天壇在天半欲上心遲遲常聞此遊者隠客與損之各包貴仙骨俱非泥垢姿二人相顧言彼此稱男兒若不為松喬即湏作臯䕫今果如其語光彩雙葳蕤一人佩金印一人翳玉芝我來髙其事詠嘆偶成詩為君題石上欲使故山知宿簡寂觀前人巖白雲尚屯林紅葉初隕秋光引閒歩不知行逺近夕投靈洞宿卧覺塵機泯名利心既忘市朝夣亦盡暫來尚如此况乃終身隠何以療夜飢一匙雲母粉華陽觀桃花時招李六拾遺飲前人華陽觀裏仙桃發把酒㸔花心自知争忍開時不同醉明朝後日即空枝此詩三百二十一巻重出今已削去宿張雲舉院前人不食胡麻飲杯中自得仙隔房集作離招好客可室致芳筵美集作家醖香醪嫩時新異果鮮夜深唯畏曉坐穏不集作豈思眠碁罷嫌無敵詩成愧在前明朝題壁上誰得衆人傳題上皇觀章孝標五雲集作烟霞深盖七星壇想像先朝駐禁鑾輦路已平栽藥地皇風猶在歩虚寒樓臺瑞氣晴蕭索杉檜龍身老屈蟠感惠休言并李郭劍門空處望長安題魚尊師院賈島老子堂前花萬樹先生曽見幾廻春夜煎白石平明喫不擬教人哭此身過陽道士居前人先生脩道處茅屋逺囂氛叩齒坐明月榰頥望白雲精神含藥色衣服帶霞紋每語瀛洲路多年别少君古觀朱慶餘仙觀曽過知不逺花藏石室杳難尋泉邊白鹿聞人語㸔過仙壇漸入深一作林玉芝觀章道士房周賀四面杉松合空堂畫老仙蠧根停雲水曲角積茶煙道至心機盡宵清琴韻全獨嫌來又去不得坐經年題終南麻先生寂禪師石室劉得仁同居石室貧五十二廻春擁褐㝠集作忘心客窮經暮齒人翠沉空水定雨絶片雲新危細秋集作草峯徑相隨到頂頻題呉先生山居前人先生此幽隠便可謝人羣潭底見秋石樹間飛片雲山居心已慣俗事耳憎聞念我自多疾開爐藥許分題上皇觀薛逢狂冦窮兵犯帝畿上皇曽此振戎衣門前衞士傳清警砌下奚官掃翠㣲雲駐夀宫三洞啓日廻仙仗六龍歸當時丹鳯銜書處老栢蒼蒼已合圍題春臺觀前人殿前松栢晦蒼蒼杏遶仙壇水遶廊垂露額題精思一作專院博山爐褭降真香苔侵古碣迷陳事雲到中峰失上方便擬尋溪弄花去洞天誰更待劉郎重遊蘇州玉芝觀許渾髙梧一葉下秋初迢逓重來寄舊居月過碧忩今夜酒雨淋集作昏紅壁舊年書玉池露冷芙蓉淺金井烟分集作瓊樹風髙薜荔踈從此扁舟集作明日揚㠶更東去仙翁應笑憶集作為鱸魚早出洞仙觀趙嘏露濃如水灑蒼苔洞口烟蘿宻不開殘月色低當户後曉鍾聲逈隔山來春生藥圃芝猶短夜醮齋壇鶴未廻愁是獨尋歸路去人間歩歩是塵埃宿王屋天壇馬戴星斗半沉蒼翠色紅霞逺照海濤分折松曉拂天壇雪投簡寒窺玉洞雲絶頂醮廻人不見深林磬度鳥應聞未知誰與傳金籙獨向仙祠拜老君謁仙觀二首前人我生求羽化齋沐造山集作仙居葛蔓汲丹井石函盛集作開道書寒松多􅅯側靈洞遍清虛一就泉栖嶺集作飲雲中採藥蔬二山空蕙氣香乳管折雲房願值壺中客親傳肘後方三更禮星斗寸匕服丹霜黙坐樹隂下仙經横石牀宿陽臺觀前人玉洞仙何在爐香客獨薰集作芬醮壇圍古木石磬響寒雲曙月孤霞映懸流峭壁分心知世上集作人世隔坐與鶴為集作成羣題龍瑞觀兼呈徐尊師方干或雨或雲常不時定地靈雲雨自知世人莫識神方宇仙鳥偏棲藥樹枝深壑度年如晦暝隂溪入夏有凌澌此中唯是集作有師知我未得尋師即夣師叙龍瑞觀勝異寄于尊師前人混元融結致功難山下平湖湖上山萬頃涵虚寒㶑灔千尋聳翠秀斕斑集作孱顔芰荷香入琴棊處雷雨聲離棟牖間但有五雲衣鶴嶺曽無陸路向人寰夜溪潄玉常堪聽仙樹垂珠可要攀若棄榮名便居此自然集作浮清濁不相關尊師前年三十從評事棄官入道題天柱觀魚尊師舊院前人早識吾師頻到此芝童藥犬亦相迎師今一去無來日花洞石壇空月明真觀李羣玉髙情帝女慕乗鸞紺髪初簮玉葉冠公主玉葉冠時人莫計其價秋月無雲生碧落素渠寒露出清蘭層城烟霧將歸逺浮世塵埃乆駐集作住難一日集作自簫聲飛去後洞深空探集作洞宫深掩碧瑶壇餘姚集作杭縣龍泉觀張祜四明集作廻山一靣臺殿倚嵯峨中路見江集作山逺上方行石多山集作天晴花氣漫地暖鳥聲集作音和徒潄葛仙井此生真奈何華山李鍊師所居皮日休麻一作花姑古貌上仙才謫向蓮峯管玉臺瑞氣染衣金液啓香烟映靣紫文開孤雲盡日方離洞雙鶴移時只有苔深夜寂寥存想歇月天時下草堂來終南白鶴觀鄭谷歩歩景通真門前衆水分檉蘿洞口集作諸洞合鍾磬上清聞古木千尋雪寒山萬丈雲終期掃壇級來事集作伴紫陽君題終南山白鶴觀憶契虚真人張喬上徹鍊丹峯求𤣥意未窮古壇青草合往事白雲空仙境日月外帝城烟霧中人間足煩暑欲去戀松風書梅福殿壁二首前人梅真從羽化萬古是湏㬰此地名空在西山雲亦孤井痕平野水壇級上春蕪縱有雙飛鶴年多松已枯二一自白雲去千秋壇月明我來思往事誰更得長生雅韻磬鍾逺真風樓殿清今來為尉者天下有仙名題古觀前人急景遽衰老此經誰飬真松留千載鶴碑隔六朝人洞水流花草壺天閉雪春其如為名利歸踏五陵塵王覇壇周朴王君上昇處信首古居前皂樹即湏朽白龜亦應全雲間猶一日塵裏已千年碧色壇如黛時人誰可仙聖真觀劉真師院十韻羅隱簾下嚴君卦忩間少室峰攝生門已盡混跡世猶逢山藪師王烈簮纓友戴顒魚跳介象二字見三國呉書十八巻註鱠飯吐葛𤣥蜂紫飽垂新椹黄輕堕小松塵埃金谷路樓閣上陽鍾野鶴鳶肩寄仙書鳥爪封支牀龜縱老取箭鶴何慵别久曽牽念閒來肯厭重尚餘青竹在試為剪一作誰為來成龍亂後經表兄瓊華觀舊居唐彦謙一去仙居似轉蓬再經花謝倚春叢醉中篇什金聲在别後音書錦字空長憶映碑逄若士未曽携杖逐壺公東風狼藉苔侵徑蕙草香銷杏帶紅送僧人道士荅句曲陶先生范雲終朝吐祥霧薄晩孕竒烟洞澗生芝草重崖出醴泉中有懐真士被褐守中𤣥石户棲十秘金壇謁九仙乗鵷方履一作屐漢轡鶴且騰天贈學仙者前人採藥層城逺尋師海路賖玉壺横日月金闕斷烟霞仙人何處在道士未還家誰知彭澤意更覔一作道歩兵家一作那春釀煎松葉秋盃浸菊花相逄寧可醉定不學丹砂山居晩眺贈王道士王郭金壇踈俗宇玉洞侣仙群花枝棲晩露集作霧峯葉度晴雲斜集作落日移山影廻沙擁籕集作溜文琴樽方待興竹樹已迎曛贈李榮道士有序不録盧照隣錦節銜天使瓊仙駕羽君投金翠山曲奠璧清江濆圓洞開丹鼎方壇聚綘雲寳貺幽難識空歌逈易分風摇十洲影日亂九江文敷誠歸上帝詔應在明君獨有南冠客耿耿泣離群遥看八㑹所直氣曉氛氲秋日餞陸道士陳文林得風字駱賔王青牛遊華岳赤馬走呉宫玉柱離鴻怨金壘浮蟻空日霽崤陵雨塵起洛陽風唯當𤣥度月千里與君同遊青都觀尋沈道士得仙字劉孝孫紛吾因暇豫行樂極一作亟留連尋真謁紫府披霧覿青天􅃡懐金闕外遐想玉京前飛軒俯松竹抗殿接雲烟熖熖清夏景嘒嘒早秋蟬横琴對危石酌醴臨寒泉聊祛塵俗累寕希龜鶴年無勞生翼羽自可狎神仙同前得清字許敬宗幽人蹈箕潁方士訪蓬瀛豈若逄真氣齊契體無名既詮衆妙理聊暢逺遊情縱心馳貝闕怡神想玉京或命餘杭酒時聽洛濵笙風衢通閬苑集作嶽星使下層城蕙帳晨飇動芝房夕露清方叶棲遲趣於此遂鍾聲同前得都字凌敬聊排青瑣闥徐歩入清都青溪㝠寂士思𤣥徇道樞十芒一作芝生藥笥七熖發丹爐縹袠桐君籙朱書王母符宫槐散緑穗日堇落青柎矯翰雷門鶴飛來葉縣鳬凌空自可御安事廹中區方追羽化侣從此得𤣥珠同前得陽字趙中虚清溪阻千仭姑射藐汾陽未若遊兹境探𤣥衆妙塲鶴來疑羽客雲汎似蜺裳一作翔寓目雖靈宇遊神乃帝鄉道存真理得心灰俗累忘煙霞凝抗殿松桂肅長廊早蟬清暮響崇蘭散晩芳即此翔寥廊非復控榆枋和梁王衆傳張光禄是王子晋後身崔融聞有冲天客披雲下帝畿三十上賔去千載忽來歸昔偶浮丘伯今同丁令威中郎才貌是柱一作藏史姓名非祗召趨龍闕承恩到虎闈丹成金鼎獻酒至玉杯揮天仗分旄節朝容間羽衣舊壇宫處所新廟坐光輝漢主存仙要淮南愛道機朝朝緱氏鶴長向洛城飛𤣥化一作元觀尋李先生不遇魏知古見初學記羽客今何在空傳伊洛間忽聞歸舊縣復想入函關未作千年别猶應七日還神仙不可見寂寞返蓬山同工部李侍郎送司馬白雲歸天台沈佺期紫㣲降天仙丹地投雲藻上言華頂事中問長生道華頂居最髙大壑朝陽早長生術何妙童顔後天老清晨朝鳯京夜静思鴻寳慿崖飲蕙氣過澗摘靈草人非冡已荒海變田應燥昔嘗遊北郡三霜弄溟島緒言霞上開機事塵外掃湏來抛世務清曠未云保﨑嶇待漏恩怵惕司言造軒皇重齋拜漢武愛祈禱順風懐崆峒承露在豐鎬泠然委輕馭復得快幽抱關下留伯陽儲間登四皓昔有參同訣何時一探討寄天台司馬先生崔湜聞有三元客祈丹九轉成人間白雲返天上赤龍迎尚惜金芝晩仍攀琪樹榮何年緱嶺上一謝洛陽城寄天台司馬道士宋之問卧來生白髪覽鏡忽集作已成絲逺媿飡霞子童顔且集作常自持舊遊惜踈集作彌曠㣲尚日磷緇不寄西山藥何由東海期送田道士使蜀投龍前人風馭忽泠然雲臺路幾年蜀門峰勢斷巴字水形連人隔壺中地龍遊洞裏天贈言廻馭日圖畫彼山川送司馬道士遊天台前人羽客笙歌此地圍離筵數處白雲飛蓬萊闕下長思憶桐栢山頭去不歸送楊道士往天台張九齡鬼谷還成道天台去學仙行應松子化留與世人傳此地烟波逺何時羽駕旋當湏一把袂城郭共依然祭南嶽事畢謁司馬道士前人將命祈靈嶽廻策詣真士絶迹尋一逕異香聞數里分庭八桂樹肅客兩童子入室希把袖登牀願啓齒誘我棄智訣迨兹長生理吸精反自然鍊藥求不死斯言𦕈霄漢顧予嬰紛滓相去九牛毛慙歎知何已集作何知已贈東嶽焦鍊師王維先生千載集作嵗餘五嶽遍曽居遥識齊侯鼎新過王母廬不能師孔墨何事問長沮玉管時來鳯銅盤即釣魚竦身空裏語明目夜中書自有還丹一作丹砂術時論太素初頻䝉露版詔將降軟輪車山静泉逾響松髙枝轉踈搘頥問樵客世上復何如贈焦道士前人海上遊三島淮南遇八公坐知千里外跳向一壺中縮地朝珠闕行天使玉童飲人聊割酒送客乍分風天老能行氣吾師不飬空謝居徒雀躍無可問鴻䝉送張道士歸山前人先生何處士王屋訪茅君别婦留丹訣驅鷄入白雲人間數剰住天上復離群當作遼城鶴仙歌使爾聞送王尊師歸蜀中拜掃前人大羅天上神仙客濯錦江頭花栁春不為碧雞稱使者唯令白鶴報鄉人送方尊師歸嵩山前人仙官欲住九龍潭旄節朱幡倚石龕山壓天中半天上洞穿江底出江南瀑布杉松常帯雨夕陽彩一作蒼翠忽成嵐借問迎來雙白鶴已曽衡岳送蘇躭寄天台道士孟浩然海上求仙客三山望幾時焚香宿華頂裛露採靈芝屢踐莓苔滑將尋汗漫期儻因松子去長與世人辭尋悔道士張山人前人彭一作陵澤先生栁山隂道士鵝我來從所好停䇿夏雲一作漢隂多重以觀魚樂因之鼔枻歌崔徐跡未朽千載揖清波越中逄天台太一子前人仙穴逄羽人停艫向前拜問予渉風水何事逺行邁登陸尋天台順流下吳㑹兹山夙所尚安得問集作間靈恠上逼青天髙停臨滄海大雞鳴見日出當與仙人㑹集作毎與神仙㑹諸本皆重押㑹字惟一本常覿仙人斾來去赤城中逍遥白雲外莓苔異人間濕布作集作當空界福庭長不死勝境集作華頂舊稱最永願從之遊何當濟所届文苑英華巻二百二十七
