body:
  text: 文苑英華巻一百二十一宋李昉等編舟車一指南車賦一首大章車賦一首乗石賦一首洗乗石賦一首炙輠賦一首蒲輪賦一首墨子廻車朝歌賦一首下車泣罪人賦一首以德為車賦二首車同軌賦一首指南車賦張彦振緬窺皇始傾聽巢風時儀朴畧化跡冥蒙結繩云謝徽章漸通乃服牛而乘馬爰斵木而觀蓬故聖人因象以制器隨物而興功北斗在天察四時而行度司南在地表萬乘之光融爾其法制竒詭神妙無窮見其指而皆知其向覩其外而莫測其中輪湏藉於奚子妙乃發於周公觀夫作也扄闗脉凑衡樞星設烟縈電轉鬼聚神㓕離朱目亂計然思絶公輸服其心工王爾慙其手拙雖詞給而口敏終難得而縷說至疑而帝容順動王途允泰二月東廵萬國南㑹羽衛出而天動笳鼔鳴而雷磕司南於是備屬車引行斾候薰風而進指仰卿雲而乘蓋超摇光景之中縹緲煙霞之外同夫越鳥常有意於南枝異彼魯人竟無情於殿㝡惟皇明之逺矚驅八駿以遐舉既訪道於襄城亦尋仙於海渚豈湏老馬之智寧藉小童之語頼我司南不迷其所伊司南之用薄逄國道之昌平就日月於天路聞簫韶於玉京常使朝朝承北闕何辭歲歲指南行大章車賦以上方所造間次羽儀為韻舜為君兮禹為相七政齊兮八風暢備禮容兮和樂章同車書兮一度量龍樓恭已則無為以垂衣鸞蹕豫遊或有時而端望伊大章之攸作冠輪一作轉輿而為上其始也委材質於資斧授規模於梓匠其終也授桴鼔於天街動輗疑於霜仗乃畫界䟽疆正位辨方候之以節歩先之以啓行象雷而鳴曽不聞其霆轟如蓬之轉終不見其飄揚遵彼坦途違兹險阻勿忘情而習靜殊不知其處所類智者之行藏同至人之黙語歴代傳寳鼔車逾好有異人謀宛同靈造行不由徑動能合道向使貴賤混并髙卑不間應無迷逺之疾詎有窮途之患則是大章為器國容之利指方位於遥空數田里於厚地節六鼔以鼉駭首五輅而鱗次望塵不及初非千里之遥聽響爭先終欣一日而至夫然則可以式序秩宗發揮樂府扶侍輦轂隱翳干羽以家形國何一二之能談自邇陟遐雖萬億而可數墨客胡為來攀桂枝懸鼔待鳴仰淳淳之風俗尅車就駕識穆穆之威儀伊可大而可久諒斯焉而取斯乘石賦李昻觀彼乘石體自孤貞得崐山之片字掩糓城之偉名青苔備色堅確符情列群峯而無語縱衆溜而有聲爾其崔嵬岑絶㴠霜貯雪竹徑煙曛松門景㓕愜野叟之幽意抱山人之勁節横碧岫以霞張噴紅泉而水咽借如巨形矗嶪勢若將飛隨匠人之採斵入天子之宫闈故得削跡青澗端容紫㣲幸至尊之踐履嘉菲陋之因依於是皇帝穆然乃登珍臺乘玉輅帷弸彋其拂汨鱗雜沓以駢布甸師清畿野廬掃路流星旄以燭日儼雲旌而彗霧徃來斯登升降必歩取其磨而不杇貞而無蠧不然此荒藪之㣲石何遭逄之多遇請言其本也生必深山峯壯自閑電烻霞駮樹雜苔斑竒形異質紛拏不一屹特立以樹空倚崩崖而構室銜箭羽而横卧聳蓮蓬而半出龍吟應物觸紫岩而吐雲虹梁中斷駕滄海而觀日故石之為物也不奢不僣無競無猜偶山水而長往因和璞而俱來考之雲籍則建名古昔貫億祀而長存經百王而不易胡一作何施而不可何用而不適願上吾君千萬年地久天長履兹石洗乘石賦以王者順動有司先戒為韻王起瑟彼乘石履於聖王每寒水而濯色俾堅容而有常一作光當宸駕之未嚴貞姿或翳及天歩而將踐麗質斯彰於是五輅載轄六龍齊首森天仗而既列儼翠華而已久𨽻僕乃故實是諮舊章克守取彼流惡滌兹含垢兢兢兮映金車而鞠躬翼翼兮汲銀瓶而運手發璀錯之色莓苔染之而不能注清泠之聲埃􅅽集之而何有皎爾鏡徹爛然氷鮮承玉趾而増麗拂衮衣而更妍磷磷於清淺之波自慙奪彩鑿鑿於激揚之水莫敢爭先匪琢匪磨不淄不磷求一作欲藴玉之色彰候和鸞之聲振成吾皇獻替之義我則如水之投叶吾皇啓沃之心我則如流之順四海是奉百禮所一作斯總兹石既㓗一人由是而日輝兹石未晞萬騎不戒而雷動君惟度義官則庀司將滌瑕而蕩穢在挹彼而注兹于以昭卜征之候于以明望幸之期潺湲既臨似石磴㵼泉之狀流離欲散有山雲潤礎之姿有翼有嚴既敬既戒去淟涊之色由是砥平吐新鮮之輝用光時邁乘石之洗也列周經乘石之履也合周雅内可以訪道海内外可以觀風天下故曰有扁斯石見於王者炙輠賦以才美潤身喻兹為韻喬琳惟輠以積膏而潤惟人以積學而才潤則浸之所致學則脩之乃來亦猶山輝蓋玉之處石川媚乃珠之在胎則炙輠之義斯焉在哉原乎其始方我髦士言物也火及則潤滋言士也用之則邦理喻研朱則其色不奪方扣鍾而其音不已故可以與理窟而爭深配智囊而共美炙之不竭夫豈同於瓶罄用之不窮固有殊於罍恥且國以賢興車以輠進車非輠而安徃國非賢而莫鎮脂膏内實宜誡盈於撲滿滋液旁露信同功於河潤豈比薰以香而自燒玉遇火而不燼向非外取其物内滋其身則一炙可以執一作就燥再乃於焉中貧亦何潤色無斁輝光日新比至道動而愈出君子磨而不磷原夫伊輠也照身以取路伊賢也開物而成務亦何近取諸身願借秦而為喻喻如何其惟良在兹希德澤而惠物在脂膏以無私若然者豈止滯輶軒以聼察因鈞軸以為期増雨露之濡洽霑草芥而滋熈者哉蒲輪賦以安車禮賢者為韻王起王者崇招隱之禮作徴賢之車既斵輪而合度亦安蒲而用諸將使丘園共賁巖穴皆虛則必旌其重貺建此大輿輪合大一作天規取邁而行陸蒲兼柔質取坐以安居罔覆其軌轍可歴於丘墟載以歸朝盡是漸鴻之翼駕而出野方隨繫鶴之書恒翹翹而隱隱諒求士之本歟若乃山騁疑異人林栖隱者鳥獸之群方雜薜蘿之衣未捨或屠釣而忘名或版築而在野耻戔戔之帛厥禮未崇笑孑孑之旌好善猶寡然後時主仄席哲匠精研載脂載轄既攻既堅蒲也採陂澤之叢有車之用輪也斵隂陽之木如日之圜轞轞兮出中朝之禮盛轔轔兮入外野而光宣疑於是經營草澤轥轢雲煙瞻其儀無虧乎翼翼聆其響且異乎闐闐可以出嘉遁之碩德可以載傲俗之遺賢空谷有駒自爾而方縶鳴臯者鶴假我而聞天豈獨邀申公於是日徴釣叟於昔年則知輪之設蒲巖扄是啓將毗王者之政先保賢人之體至萬里之安安成百僚之濟濟豈比夫織而為席表臧孫之不仁緝以成宫昭令尹之非禮方今雋已在官輪猶未安旁搜叢桂逺掇幽蘭士不病於邁種賢盡出於峯巒是蒲輪之禮也乃王化之端而已哉墨子廻車朝歌賦墨子慮厥居慎所如轉華轂遊殷墟疾朝歌為名知非良邑惟時邁有度用廻德車將以擇樂國重盛則舉足為龜鏡立身乎繩墨每自西而自東咸作範而作式始其命駕徘徊發軫一作軔聿來豈半途而有廢將由逕而無猜雜彼行人初儦儦而同造一作邁問於及境終轞轞而獨廻乃曰歌樂者人必有度朝夕者天之所賦苟名而不臧曷邑之足顧由是反征輪遵大路比危邦之不入同覆轍之是懼載脂載轄却新逕而不疑如輊如軒乃舊蹊而是遡諒無阻於寸進實自懲於跬歩借如不戒乎謡不恒乎朝自然哀樂失節威儀莫昭何足以枉君子之車瞻夫翼翼來長者之轍美以翹翹是用處身於克正示衆以不佻雖大道甚夷崪如九州之險大都孔邇邈成千里之遥足以戒居人警行子革詠歌之俗作道途之紀改轅不爽於歸歟反路自忘於勞止亦將趨樂土走仁里彼邑之士莫得式其軒彼邑之塵莫得及其軌宜乎非禮勿動惟貞是履與孔門而齊教將宋國而專美莫不始於廻輪而彰乎勵已嗟乎車之攸避也尚戒乎歌身之攸指也矧至於頗則懼栢人之不宿耻勝母而不過比車之㫖也未足居多下車泣罪人賦以萬方之過在予一人為韻人惟有罪罪實在予將恤刑於荷校遂責己而駐車頋法令之未平滋彰甚矣儼冕旒而興念涕泣漣如始也備羽衛而行因廵狩而出遇兹拘繫將伏斧鑕王乃止翠華駐清蹕恐法吏之苛暴嗟刑網之峻密稽鳳輦而惻隱再三愍禠帯而幽囚非一於是降玉輅下朱輪議獄緩死拖黻垂紳出轅箱而欷歔交睫顧桎梏而汍瀾滿巾雖囹圄之中自罹有國之典恐網羅之内時陷無辜之人於戱法議難逃過亦有在致狴牢未空之事乃教化不明之罪初猶掩抑見天顔之慘悽漸覺滂沲濕衮衣之文彩承顔熠熠滿眼浪浪情將同於肆眚義有軼於納隍是以顧盻悲泣徘徊感傷希聖㫖於方輿之間必先一物推睿情於圜扉之下以及四方故得法制備疑修獄訟無怨由𠂻而感於黎庶自已而朂於億萬涕洟猶在宥物之義已彰縲紲未收率土之人知勸行道而道斯逺矣愛人而人亦懐之何天網之自入使皇情以興悲蓋假其人為邦家之本因其事為慈惠之資不然何一降車而開二十世之業一灑淚而成四百年之基然後刑法永清威懐逺播是知夏后之得天下也能恤人而引過以德為車賦以至德之人有同車載為韻白行簡人之藴德兮唯車可同載諸身兮運轉無窮苟規模之不紊在夷險以皆通遊必有方靡假顔生之御成之在我寧煩奚仲之功原夫雕斵何勞周旋不礙得亨衢古道以方駕將璞玉渾金而共載廓情田而作路終自東自西調意馬以服箱任或進或退且見其制非假手用不由人馳懿範而深疑軋軋聽嘉聲而乍認轔轔如榮晝錦之衣便同華轂儻被懸鶉之服豈異椎輪是何輗軏無施脂膏莫有學海深而濡軌無慮詞林秀而養材自久誨人不倦初訝其役車不休見賢思齊豈憚乎挾輈而走莫不乍行乍止載疾載徐究其理而大矣較其功而忽諸程君之夢捧陽精還同照乘黄覇之惠如時雨宛是隨車乃知德以餙身為規車將載物是致苟執德之不惑故慿車而取類善行而所去無跡遵道而雖逺必至功能救旱喻流水以寧慙美播惟馨嫓七香而何異大矣哉妙才難問良工在兹曝腹而那殊炙輠書紳而乍認執綏此車也價雖擅於五雲應難比矣數徒多於百兩未足方之士有軌轍無踰威儀靡忒逄時斯牽駕之用抱素乏丹青之餙儻題品之未遺願為車而比德第二以國家道通逺邇為韻白行簡皇帝守位以仁為車以德將喻夫博載庶物取象夫經行萬國垂衣而退與人謀結旌而克陳帝力因樂推以發軔任不言而慿軾始効駕於情田之内不驅不馳終挂轊於王道之中自南自北夫改奢即儉尚質去華量包覆載迹逹幽遐行乎道而四方是則同乎軌而六合為家是知乘玉輅者又何足比駕金根者失其所誇爾其伐輻於自然之材斵輪用無為之道鍳馭朽以作訓念輶毛而是保前覆後誡諒成敗之足徴殊途同歸信始終之可考伊至化之所備一作被如風令之偃草道德仁義配弨弓以致賢孝敬温恭代輭輪而養老萬邦攸同九有克通樸斵在心詎比質於流水周行任道豈觀象於轉蓬以得賢為輪轅之助以守信為輗軏之功動天而善行無跡持重而利用不窮且工為車兮脆而易破德為車兮勞而成晩哂摧輪於太行憫困驥於呉坂域中咸頼功超乎大輅小戎天下皆肥力竭乎引重致逺澤可鍳而招損美不稱而崇侈爾則速禍以宣驕我則去彼而取此靡自家而刑國俾視逺而若邇豈徒與奚仲造父之徒論功而効伎車同軌賦以君德遐布夷夏同道為韻白行簡倬彼皇道大哉聖君躬厚載於宇宙俾咸駕於海濆故得遥遥之形周八埏而匪間彭彭之響經萬國而俱聞所以義在知方理資從式見軫轉而不阻諒輻輳而有則𢎞濟之利既均美於三無順動之端方齊功於一德是故逹於疆場踐彼幽遐表合蹤而道廣知轍跡而路賖亦由誡於險去其邪推善御於有截被至治於無譁殊途同歸方見域中之大引重致逺是睹天下為家然則將利於時必徴所措既同轍而異履爰發軔而循度周流勿越誠轉蓬之足施轥轢非逾將挂轊而可布至若偈兮詩匪車偈兮偈起竭切無外隱爾如斯念微至而必繼嘉大同而在兹固將混區宇㑹華夷始曳輪而寧虧逺邇終推轂而不失毫釐觀其政之大者道亦斯假苟慿軾而知風矧擊轅而合雅顧踐履之所至豈獨不東信應用之無疆寧唯諸夏原夫建皇極開帝功三才既美九有攸同可使循環如貫運動不窮四㑹五逹之莊悠然盡届島夷卉服之俗逖矣皆通爾乃庶政聿修遐方可討俾守位者將順其理利轉者必㑹其道故車書而混同誠鴻業之斯保文苑英華巻一百二十一
