body:
  text: 文苑英華巻一百六十一宋李昉等編地部三山雜題二十首洞六首峽十首石七首孤石五首太湖石四首雜題七首山雜題露際中峰一作中峯居喜見苖發祖詠一作李端自得中峰住深林亦閉關經秋無客到入夜有僧還暗澗泉聲小荒園一作岡樹影閒髙窓下一作南窓不可望星月滿空山此詩二百一十八巻重出今已削去遇有異同註為一作風凉原上作王昌齡隂岑宿雲歸煙霧集作霧露濕松柏風凄日初曉下嶺望川澤逺山無遺明集作晦明秋水千里白佳氣盤未央聖人在凝碧關門阻天下信是帝王宅海内方晏然廟堂有竒䇿時貞守全運罷去逰説客余忝蘭䑓人幽尋免貽責此詩三百十八巻重出今已削去秋山夕興陶翰山月松篠下月明山景鮮聊為髙秋酌復此清夜絃晤語方獲志栖心亦彌年尚言興未逸更理逍遥篇登趐頭山題儼公石壁包融晨登翅頭山山曛黄霧起却瞻迷向背直下失城市暾日銜東郊朝光生邑里掃除諸煙氛照出衆樓雉青為洞庭山白是太湖水蒼茫逺郊樹倐忽不相似萬象以區别森然共盈几坐令開心胷漸覺落塵滓北巖千餘仭結廬誰家子願陪中峯逰朝暮白雲裏季夏入北山林璠整駕俟明發逶迤歴險途天形逼峯盡地勢入谿無樹遶圓潭宻雲横叠嶂孤誰憐後時者六月未南圖獨往覆釜山寄郎士元錢起賞心無逺近芳月好登望勝事引幽人山下復山上将尋洞中藥復愛湖外嶂古壁苔入雲隂溪樹穿浪誰言世縁絶更惜知音曠鶯啼緑蘿春廻首還集作逺惆悵棲霞山夜坐僧靈一山頭戒壇路幽映雲巖側四靣青石牀一峯苔蘚色松風髙僧詩作風松静復起月影開還黒何獨乗夜來殊非書髙僧詩作晝所得春晩山行詩選無春晩二字殷遥寂歴青山晩山行趣不稀野花垂子落江鷰引鶵飛暗草薰苔渚一作徑晴楊拂石磯俗人語話一作猶語此我一作余亦轉忘歸買山吟于鵠買得幽山屬漢陽槿籬踈處種桄榔唯有獼猴來往熟弄人抛果滿書堂春山夜月于良史春山多勝事賞翫夜忘歸掬水月在手弄花香滿衣興來無逺近欲去惜芳菲南望鳴鐘處樓䑓深翠㣲奉和裴相公假山韓愈公乎眞愛山㸔山旦連夕猶嫌山在眼不得著脚力往語山中人丐集作與我澗側石有來應公湏歸必載金帛當軒乍駢羅隨勢忽開坼有洞若神剜有巖類天劃終朝巖洞間歌吹集作皷宴賔戚孰謂衡霍竒近在王侯宅傅氏築已卑磻溪釣何激逍遥功德下不與事相摭樂我盛明朝集作時於焉傲今昔此詩二百四十五巻重出今已削去早春題少室東巖白居易三十六峯晴雪銷嵐翠生月留三夜宿春引四山行逺草初含色寒禽未變聲東巖最髙石唯有我題名尋山于武陵到此絶車輪萋萋草樹春青山如有利白石亦成塵水闊應無路松深不見人如知巢與許千載跡猶新奉和盧大夫新立假山許渾巖谷留心賞為山極自然孤峯空迸笋攅蕚旋開蓮黛色朱樓下雲形繡户前砌塵凝積靄簷溜掛飛泉樹暗壺中月花香洞裏天何如謝康樂海嶠獨題篇與郭二十四同㸔朱審山水時郭二十四将逰廬山集作送郭秀才逰天台并序余甞與郭秀才同翫朱審畫天台山圖秀才因逰是山題詩贈别焉前人雲埋隂壑雪凝峯平碧集作半壁天台已萬重人渡碧溪疑輟棹僧歸蒼嶺似聞鐘煖眠鸂鶒晴天集作灘草髙掛獼猴暮澗松曽約共逰今獨去香爐山下集作赤城西靣水溶溶經西塢偶題温庭筠見集本摇摇弱桞黄鸝啼芳草無情人自迷日影明㓕金色鯉杏花啑一作唼喋青頭鷄㣲紅柰蔕惹蜂粉㓗白芹芽入一作穿鷰泥借問含嚬向何事昔年曽到武陵溪長安一有月夜二字與友生話舊一作故山趙嘏見王安石詩選宅邉秋水舊一作浸苔磯日日持竿去不歸楊桞風多潮未落蒹葭霜在鴈初飛重嘶匹馬吟紅葉却聽踈鐘憶翠㣲今夜秦城滿樓月故人相向一沾衣山行偶作馬戴縁巴路忽窮投宿值樵翁鳥下山含影蟬鳴露灑空石門斜月入雲竇暗泉通寂寞生愁思心疑舊隠同尋山李頻一逕入雙崖初疑有幾家行窮人不見坐乆日空斜石上生靈草泉中落異花終湏結茅屋向此學飡霞出山杜荀鶴病眼見集作㸔春牓文塲公道開朋人登第盡白髪出山來處世曾無遇唯天合是媒長安不覺逺期遂一名廻洞題合溪乾洞于鵠渡水傍山尋絶壁白雲飛處洞天開仙人來往行無迹石徑春風長緑苔題武陵洞四首曹唐此生終使此身閒不是春時且要還寄語桃花與流水莫辭相送到人間二溪口回舟日已昏却聽雞犬隔前村殷勤重與秦人别莫使桃花閉洞門三却恐重來路不通殷勤廻首謝春風白鷄黄犬不将去且寄桃花深洞中四桃花夾岸杳何之花滿春山水去遲三宿武陵溪上月始知人世有春時桃源洞李羣玉我到瞿童集作真上昇處山川西一作四望使人愁紫雲白鶴去不返唯有桃花溪水流峽琵琶峽梁簡文帝由來歴山川此地獨廻邅百嶺相迂蔽千崖共隠天横峯時礙水斷岸或通川還瞻已迷向直來復疑前夕波照孤月山枝歛夜煙此時愁緒宻闕九遷廣溪峽三峽有序不録楊炯廣溪三峽首曠望兼川陸山路遶羊腸江城鎮魚復喬枝百丈偃飛水千尋瀑驚浪廻髙天盤渦轉深谷漢氏昔云季中原争逐鹿天下有英雄㐮陽有龍伏常山集軍旅永安興版築池臺忽已傾邦家遽淪覆庸才若劉禅忠佐為心腹設險猶可存當無賈生哭巫峽前人三峽七百里唯言巫峽長重巖窅不極疊嶂陵蒼蒼絶壁横天險莓苔爛錦章入夜分明見無風波浪狂忠信吾所蹈泛舟亦何傷可以涉砥柱可以浮吕梁美人今何在靈芝徒自一作有芳山空夜猿嘯征客淚沾裳西陵峽前人絶壁聳萬仭長波射千里盤薄荆之門㴞㴞南國紀楚都昔全盛髙丘烜望祀秦兵一旦侵夷陵火潜起四維不復設關塞良難恃洞庭且忽焉孟門終已矣自古天地闢流為峽中水行旅相贈言風濤無極已及余踐斯地懐竒信為美江山若有靈千載深知已湞陽峽作張九齡行舟傍越岑窈窕越溪深水暗先秋冷山晴當晝隂重林間五色對石集作壁聳千尋此物集作惜此生遐逺誰知造化心峽中作盧象髙唐幾百里雲樹接陽臺晩見江山霽宵聞風雨來雷從三峽起天向數峯開靈境信難見輕舟那可廻經端溪峽中楊衡隂岸東流水上有㣲風生素羽漾翠澗碧苔敷丹英重林宿雨晦逺岫孤霞明飛猱相攀牽白雲亂縱横有客泝輕檝閱勝匪覊程逍遥一息間糞土五侯榮搴茗庻蠲熱潄泉聊析酲禮樂志秦尊柘漿析朝酲寄言絲竹者詎識松風聲過巫峽李頻擁棹向驚湍巫山直下看削成從地底聳出在雲端暮雨晴歸少啼猿渇下難一聞神女去風竹掃空壇滄浪峽羅鄴門向紅塵日日開入門襟袖逺塵埃晴香惹歩澗花發晩景逼簾溪鳥廻不為市朝行路近有誰車馬㸔山來可憐嚴子持竿處雲水終年鎻緑苔巫峽曹松巫山蒼翠峽通津下有仙宫楚女貞不逐綵雲歸碧落却為暮雨撲行人年年舊事音容在日日誰家夣想頻應是荆山留不住至今猶得覩芳塵石賦得翠石應令蕭推依峰形似鏡構嶺勢如蓮映林同緑桞臨池亂百川壁苔終不落丹字本難傳有邁東明上來遊皆羽仙石隂鏗天漢支機罷仙嶺博棊餘零陵舊是鷰昆池本學魚雲移蓮勢出苔駮錦文踈還當糓城下别自觧兵書奉和周趙玉初學記作王詠石崔仲方玉繩隨月落金碑映日鮮入江疑濯錦出峽似開蓮文馬河西瑞兵符濟北篇㑹逐靈槎上還歸天漢邉賦得臨階危石岑德潤當階聳危石殊状實難名帶山疑似獸浸波或類鯨雲峯臨棟起蓮影入簷生楚人終不識徒自藴連城賦得石虞茂蜀門欝遐阻燕碣逺參差獨標千丈峻共起百重危鏡峯含月魄蓋領初學記作嶺逼雲枝徒然抱貞介填海竟誰知石蘇味道濟北甄神貺河西濯初學記作瑞錦文聲應天池雨影觸岱宗雲鴈歸猶可候羊起自成羣何當握靈髄髙枕絶囂氛同前李嶠宗子維城固将軍飲羽威巖花鏡裏發雲葉錦中飛入宋星初隕過湘鷰早歸儻因持補極寕復羡支機孤石孤石朱超侵霞去日近鎮水激流分對影疑雙闕孤生若斷雲遏風静華浪騰煙起薄曛雖然近七嶺獨立不成羣同前標法師中原一孤石地理不知年根含彭澤浪頂入香爐煙崖成二鳥翼峯作一芙蓮何時發東武今來鎮蠡川同前髙麗定法師廻石直生空平湖四望通巖根恒灑浪樹杪鎮摇風偃流還清影侵霞更上紅獨㧞羣峯外孤秀白雲中同前劉長卿孤石自何處對之如舊遊氛氲峴首夕青翠剡中秋迴出竒峰當殿前雪山靈鷲慙貞堅一片孤雲長不去莓苔古色空蒼然同前戴叔倫逈若千仭峰孤危不盈尺早晩他山來猶帶煙雨跡貞堅自有分不亂和氏璧太湖石李蘇州遺太湖石竒状絶倫因題二十韻奉呈夣得樂天牛僧孺胚渾何時結嵌空此日成掀蹲龍虎鬭挾怪鬼神驚帶雨新水静輕敲碎玉鳴攙义鋒刄簇縷絡釣絲縈近水摇竒冷依松助澹清通身鱗甲隠透穴洞天明醜凸隆胡凖深凹刻兕觵雷風疑欲變隂黒訝将行噤㾕㣲寒早輪囷數片横地祗愁墊壓鼇足困支撑珍重姑蘇守相憐嬾慢情為探湖裏物不怕浪中鯨利渉餘千里山河二字疑僅百程池塘初展見金玉自凡輕側眩魂猶悚周觀意漸平似逄三益友如對十年兄旺興添魔力消煩破宿酲嫓人當綺皓視秩即公卿念此園林寳還湏别識精詩仙有劉白為汝數逄迎奉和牛相公題姑蘇所寄太湖石見示兼寄李蘇州劉禹錫震澤生竒石沈潜得地靈初辭水府出猶帶龍宫腥發自江湖國來榮卿相庭從風夏雲勢上漢古查形拂拭魚鱗見鏗鏘玉韻聆煙波含宿潤苔蘚助新青嵌穴神工鑿纎鋩蟲篆銘孱顔傲林薄飛動向雷霆煩熱近還散餘酲見便醒凡禽不敢宿浮壒莫能停静稱垂松蓋鮮宜映鶴翎忘憂常目擊素尚與心冥眇小欺湘鷰團圓笑落星徒然想融結安可測年齡採取詢郷老搜求按舊經垂鉤入空隙隔浪動晶熒有獲人争賀歡謡衆共聽一州驚閱寳千里逺揚舲覩物洛陽陌懐人呉御亭寄言垂天翼早晩起滄溟奉和思黯相公以李蘇州所寄太湖石竒状絶倫因題二十韻見示兼呈夣得白居易錯落復崔嵬蒼然玉一堆峯駢仙掌出罅拆劔門開峭頂髙危矣盤根下壮哉精神欺竹樹氣色壓亭臺隠起磷磷状疑成瑟瑟胚亷稜露鋒刄清越叩瓊瑰岌嶪形時動嵬峩勢欲摧竒應潜鬼怪靈合蓄風雷黛潤沾新雨斑明㸃古苔未曾棲鳥雀不肯染塵埃尖削琅玕筍窪剜馬腦罍海神移碣石畫障簇天台在世為尤物如人負逸才渡江一葦載入洛五丁推出處雖無意升沉亦有媒㧞從水府底置向相庭隈對稱吟詩句㸔宜把酒杯終随金礪用不學玉山頽疏傅心偏愛園公眼屢廻共嗟無此分虛管太湖來居易與夣得俱典姑蘇而不獲此石也太湖石前人逺望老嵳峩近觀怪嶔崟纔髙八九尺勢若千萬尋嵌空華陽洞重疊匡山岑邈矣仙掌逈呀然劔門深形質冠今古氣色通晴隂未秋已瑟瑟欲雨先沈沈天姿信為異時用非所任磨刀不如礪擣帛不如砧何乃主人意重之如萬金豈伊造物者獨能知我心雜題南海亂石山作杜審言漲海積稽天羣山髙嶪地相傳稱亂石圖典失其事懸危悉可驚大小都不類乍将雲島極還與星河次上聳或如飛下臨仍欲墜朝暾赩丹紫夜魄烟青翠穹崇霧雨蓄幽隠靈山閟萬尋掛鶴巢千丈垂猿臂昔去景風渉今來姑洗至觀此得詠歌長時想精異戱題盤集作磐石王維可憐盤石臨泉水復有垂楊拂酒盃若道春風不觧意因何吹送落花來織女石童翰卿一片昆明石千秋織女名見人虛脉脉依水更盈盈苔作輕衣色波為促杼聲岸雲連鬢濕沙月對眉生有臉蓮同笑無心鳥不驚還如朝鏡裏形影兩分明泰山石兖州從事所寄李徳裕鷄鳴日觀望逺與扶桑外集作對滄海似鎔金衆山如㸃黛遥知碧峯首獨立煙嵐内此石依五松蒼蒼幾千載海上石笋前人常愛仙都山竒峯千仭懸迢迢一何迴不與衆山連忽逢海嶠石稍慰平生憶何以慰我心亭亭孤且直疊石前人潺湲桂水湍潄石多竒狀鱗次冠煙霞蝉聮疊波浪今來碧梧下逈出秋潭上嵗晩苔蘚滋懷賢益惆悵興平縣野中得落星石移置縣齋韓琮的的墮蒼芊茫茫不記年幾逢疑虎將應逐犯牛仙擇地依蘭畹題詩間錦錢何時成五色却上女媧天文苑英華巻一百六十一
