body:
  text: 文苑英華卷五百十一宋李昉等編教授文書門二十一道愽士教授判一道釋菜爭論判一道持論湯武判一道持論攻擊判二道無鬼論判三道注書判二道丹書判一道學書判二道讀書判一道䜟書判二道文章判一道傭書判二道冩告身判一道故紙判一道博士教授任太學博士或告教授失所云不知輕清在何時叙對宗伯建官成均務學本乎風化爰立庠序人惟教首義在通經所授無據禮文有誤深非儒者講信之道自闕師資齒胄之儀曽非挑逹四時訓誘事乃蔑如三月違仁豈無尤矣且如迷復未曉輕清儻舞樂或乖問䕫則可如論詩不足在鼎何觀既投刃而非虚宜稱一作兕觥而見罰釋菜爭論判得胡甲許乙俱任一作在直講因釋菜爭論遂形於顔色各持捶以相打法司科罪對膠庠之設國容在焉禮樂既陳王教兹始學之不講儒者為憂道或未行逹人增歎皇上崇大文教褒進儒書屬澗蘋可採爰奠祭於先師壇杏初開將發明於古學胡甲許乙說禮談經異議既生爭論斯起操持捶朴恐學業之不明顛墜衣裳見朝儀之有失四方從學華荒並凑百寮觀禮簮紱成行不慎于儀何所取則既􅄽規矩合寘刑科持論湯武判乙開筵講湯武事弟子丁曰無食馬肝乙撻之不伏折師麈尾事對君子為儒學以致道聖人立教言無非法乙惟廣業義取精嚴函丈席間未述唐虞之際開筵講肆遽言湯武之非符彼黄生之談爰有青襟之刺不能伏義故為逹人喻以馬肝足為知味折之麈尾嘖有煩言一抶何傷將子無怨持論攻擊判慎到遇接子於路因持論遂攻擊人謂之狂生自云非狂生對常從心講學崇儒語郊先禮詩書之奥以佇言揚𤣥妙之門方求理辨初聞慎接具析精㣲既遇於途詎為傾盖之厚各持其論以爭重席之功湯池鐵城取言詞而自困焚舟夷竈庶攻擊而無廻設喻指之縱横不聞三倒語折角之勝負方持兩端孔丘聼歌知接輿之有德漢髙揮洗見酈生之不狂拘繫之端冶長何在言談之下寗越無辜恭論兩賢請從一釋同前賈承暉淹中闡教揔三墳以昭彰稷下馳聲籠百家而紛紏是以陶冶代俗脂粉寰中事鬱不刋之書理貫無疆之美惟慎與接契叶情忘忽遇諸途乃相問道探頥致逺飛辨交馳索隠鈎深𤣥談競瀉如磋如切頻登更僕之筵無體無方屢動起予之對公超山北吞九八於辭場伯起闗西咀數千於辨囿孰謂寡識莫測髙人輙此拘之誠為未可無鬼論判甲執無鬼論俄而鬼忽來取求乞免鬼云誰似汝者甲云乙似而便死後乙弟知告甲謀死兄不伏對鄭績神理茫昧幽期肸蠁揆之於有演象渙於周經覈之於無持論標於晉史甲也持離堅之辨乙也遘无妄之災人謀鬼謀殊預能之迹一生一死等交情之見雖在原有急難之忿而徙壑無可返之魂不降錫齡之神忽怨淫昏之鬼且當其變起倉卒事兼夭枉茍寧我之是圖豈恤人之有責况泛詳昭典靡及幽途讓以偷生方期耻格抑之謀殺稍渉淫刑菲見所窺事宜從記同前趙不疑惟恍惟惚甄巨匠於無名一陰一陽鼓鴻鈞而不息是知天道𤣥逺子所不言甲以志尚縱横心懷貞正振談端於海嶽抗髙議於雲天取類阮瞻疑書生之自屈有符宗岱遇使者之方求乙以才貌畧同稱其似是殊仲偕之昆弟於此相推異張衡之後身斯焉見取生乎公府無聞鶴板之徵㝠寞幽途忽見鵲衣之召弟以鴒原義切雁序情深惜棣萼之無春恨泉扄之不曙告稱謀殺未逹幽明語事雖云代命至理終當溘盡捨而不鞠實謂為宜同前張景明幽變生物惟㣲有象演伏羲之卦式載鬼一無鬼字一車修魯人之冊文一無文字時生二竪永言其事豈獨前聞而甲道在自專情非傳應仲舒徃記則謂知言于寳舊書斯為妄作爰非有象持成論衡徒析理以致詞終忤㝠而速戾恍惚而見始慮阮瞻之疾髣髴有言仍多杜畿之請惟乙不弔奄及兹㐫以蔡邕之形初聞有似負莊叟之患溘然無疑一作冥滅昆既求徃於隙駒季實悲鳴於原鳥雖死同無地情切於懷而生乃有涯欲將誰咎薄言謀殺理謂無慮注書判斛律丙注書為長孫乙所竊遂行於代丙男訟之對自鳥跡垂文龜圖渙彩經文光乎歎鳯詩叶粲乎歌鸞由是百氏分門九師殊見詞義紛雜褒貶莫同針彼膏肓起兹廢疾杜元凱先鳴於麟史王輔嗣推雄於象繫一作經髙山景慕何莫由斯斛律丙投斧誓心題橋表志研精覃思温故知新採摭羣言遂立訓傳實求貽厥埀範將來長孫乙宅心典墳先無書籍習使迷於逐老窺字感於陰陶黄金滿籝罕有一經之譽白珪無玷不聞三復之言而猶借韻李竒竊名州黨今丙男有訟方覺是非理須更為昌言美惡自然明白同前卦演龜文書分鳥字左言右史紛綸於圖諜帝典皇墳昭彰於篆籕自非沉鬱澹雅以居業修辭立誠以進德則未能䆒精㣲之奥窮闔闢之源惟彼長孫器劣才窶竊沉冥之號求著述之能覽向郭二莊其為可及見虞王兩史自謂過之殊不知道不虛行名不茍得蜩甲蛇蛻有似之而非真寳玉大弓亦得之而便失厚顔之甚實謂伊人丙男之訟誠曰未逹聴訟吾猶人也必也使無訟乎慢藏致盗則又誰咎請更詳審待至量斷丹書判甲以經多謬乃自丹書碑使工鐫刻立於大學門外其親友一作觀及摹寫者日千餘人兩京尹以其聚衆笞之訴稱有故對李希定去聖久逺㣲言將絶人用其私各安所見闕文不及大義已乖非有獨見之明誰觧僻儒之患甲總覈六藝研精百氏紕繆必考朱紫斯分既祖述於魯儒升我堂矣自光揚於漢䇿職爾之由竹簡之書且或朽蠧金碑之字道兹鐫刻魏文典論起列鴻都揚子𤣥經虛傳麟閣觀者如堵且聞紙貴將萬古而不刋於千兩而何有京尹之罰其或病諸既無索於杜季庻息威於寗越學書判丁學盤盂書庚相為引重後丁云遂學或止之舉庚或止之丁云以此報德對員狎學貴愽通九流異軫書稱秘奥四㣲收藏必温故而知新方不朽而致逺丁服勤罔倦考古斯多精孔甲之書方求筮仕獲鄭莊之薦終聞推轂登朝有譽常懷報德之心司敗在官遂致無私之罰此乃韓厥之舉郤詵其人旌國史而無慙訪朝英而罕軰彼或止者何其小哉請息挽弩之言以錫來一作乗車之寳同前郭立丁本諸生弱齡有志操觚遊藝負笈從師服膺孔甲之書留心田蚡之業精窮小學聲洽大成庚有親仁之風乃思延譽之美為薦揚於左右得推擇於簮􅅂不以引重之恩而忘奏舉之義眷言報德在此奉公韓厥之故事非遥郤詵之前蹤可襲行諸則仰推故典止之則未識通方自得盡忠之規何聽無稽之説讀書判甲讀周書陰符或告違法對孫逖所習有業著在前典不讀非聖聞諸昔賢甲知敬學之為先遂發憤而忘食既而下帷之時不學明訓張燈之際乃習陰符徒成仲舒之滛不如元凱之癖或稱違法誠則伊咎欲將議獄其或有詞至於太公傳符蘇秦佩六國之印黄石授記張良珥七葉之貂茍如斯失無寘于辟䜟書判乙家有論語䜟隣告其畜禁書科徒一載郡斷無罪未知合否對薛邕幽家𤣥苞秘書赤制賈逵是擿且未能言鄭興不為孰云有學倘在法而斯禁寧當刑而可捨丕惟斯乙嗜學可嘉仰惠施之藏書得蔡邕之舊業通德惟異未聞北海之族里仁是依遽致西隣之責有論語之䜟則稱私畜禁書覽天官之文豈曰潜窺𤣥象將循名以責實何加少而為多使以牽傍是非舉直聞言是信雖吾子之有猜執德不回終匹夫之為諒請從郡斷以黜隣告同前孫宿先聖立言蓋非為已後學敬教可以潤身且匪亂常如何議辟乙門殊闕里室有儒書雖則家藏未違邦禁同原伯之不悅或可見非比韋氏之能傳實惟濟美隣人誠為妄糾彼已未越彛倫遽欲論刑何縣吏之從昧不寘于理知郡司之有孚文章判鄭景才學髙邁郡牧使求其文章景扶醉揮毫書於几上令使者寫之而去法司以為失禮欲科傲慢罪縣令以文同宿搆堪為薦舉對康子元鄭景學邁八千自髙天爵郡牧賢求五百式賁人文而磥磈無拘忽醉厨中之酒崩騰有作便題几上之文使者操􅒀寫而旋去法司執憲訊以剛來雖疾惡之誠初疑可爾而優賢之道良或未然邑宰政尚儒風事符茅茹以為詞同宿搆無慙孫綽之金德應敷敭堪薦郤詵之玉眷兹兩議須遵一理昔嗣宗酩酊曽不寘以科條今鄭景含毫何遽繩於傲慢請輟埋桐之事㣲申樹李之風傭書判甲居道周以傭書自業乙侮之折箠以笞其背甲告他物毆人對鄭少㣲禮訓成俗負販有尊明義在躬德威不侮講學修業固無取於筆耕興義輔仁事必資於善誘而由𠂻靡及旁狎是崇疑宓子之引肘類徒人之袒背藏諸私室雖一抶之何傷列在公庭抵三尺而誰咎他物毆繫法所難逃同前李休烈士生於代各安其業或削觚成學或握槧求工道既多門藝非一揆甲言自巷黨爰居道周雖殊蘭蕙之遊且託桑榆之蔭傭書自給道有類於班超因侮見罪迹方均於寗越汗簡之責既不見稱折箠之尤理宜從譴寫告身判麴紹違法寫告身邀勒選人為選人所告對龍首髙居揔羣材以成務鴻翼漸陸入㑹府以叅名既而樂鏡晨披山書密奏或連輝於喬木乍忝迹於場苖九流多材百司職廣既深隨牒理藉符文麴紹窮巷無資傭書有素兩臺之妙雅善於銀鈎什一之求近通於金市挂廻鸞之健筆徇鳬鏹之輕資事既叶於私求迹已論於明憲一作論於昭憲况籖授之法本在職司擅鳴既逹一作違且無條貫惟公書寫終自利刑既紊三章須窮兩造但選人以輕酬致怨麴紹以茍得生嫌若使不食先言便招後訟寘之嚴典惟㑹直繩故紙判州申逺年故紙請賣充公廨支用對六合為家萬方同貫用人文以成化藉鳥章而理物由是簿書嶽峙文帳波流酬答極於嵇康沉迷昏於公幹按牘之理義在隨時曹局之資固宜適用即有年代寖逺事跡淪沒寘諸幽閣疑孔壁而生塵納以嚴扄同汲書而有蠧桃花之色對春園而欲曉魚網之彩俯秋水而將沉羊續則不任補􅂁揚雄乃纔堪蓋醬令式既標年嵗州縣自有凖繩何事强申方來取决請以狀下任依彜途文苑英華巻五百十一
