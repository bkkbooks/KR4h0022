body:
  text: 文苑英華巻一百二十五宋李昉等編道釋玉書賦一首列子御風賦一首太清宫觀紫極舞賦二首求𤣥珠賦一首惚恍中有象賦一首鑿混沌賦二首盂蘭盆賦一首興唐寺聖容瑞光賦一首玉書賦以泥丸百節皆說有神為韻吕鑄上清中元聖立教存書示人以玉為至精之寳諭道於疆名之真使其復歸於本近取諸身保長生於氣母通不死於谷神妙哉靈訣虚皇之說清紫府之内瑕瑜不藏洗丹田之中瓊瑶比潔蓬萊有夀配金石姑射有顔如氷雪訝其與天地相終而莫知寒暑易節時所未諭兹焉在列我是以紀庭廬之位論藏府之官得之於此甚易求之於彼則難噓吸可以自審性命于焉内觀專氣致柔則順途而同轍適性任欲將背馳而走丸五氣理於先後三闗啓其户牖精粹自成於渣滓寵辱不驚於紛糾同美玉之韞匵我其善守以隨珠而弹雀爾於何有以取諸其懷致於道孔皆目可通於兩耀神相應於百骸乃知化自仙冊形為真宅傳此希言服之無斁神明不見指象帝於虛無𤣥覧可尋捧斯文而探賾代所貴人受益不然何道德竝經於五千靈仙自古而累百雖羽化之獨躋於國理而無暌用以修真則致虛抱一移於砥行乃立節思齊故錬質者慕凌厲飛騰於碧落致身者以詩書禮樂為丹梯俾克躬以服道乃潔已而如珪懸觧上智之性指南下愚之迷客有仰黄庭之秘録空自嘆於塵泥列子御風賦以至人御風契心𤣥寞為韻紇干俞列子占風之自履道而至澹㬭若以輕體每冷然而意遂感時之候臨大塊以栖真與化為徒諒成形之分類美夫應彼飄舉隨乎屈伸如假羽翼逈離埃塵必俟乎轉綠蕙摇青蘋穆以絶俗清乎便人摩九霄以騁望遵一氣而逰神是知本於無營且曰何思何慮超然獨徃疇為我徒我御瞻徐疾之匪差杳徜徉之有功誠之所待因嘯虎以孤騫為用不疲偶化鵬而並翀欽若扇物資乎在躬此焉靜騖于以𤣥同冝其經隠坌遭鴻濛它書多作蒙莊子作濛肅以潜暢髙而不窮期則罔􅄽虞皇載美於觧愠德之為貴軒后必聞乎順風其或倒影虧蔽振衣容裔莫逞乎逺孰睹其際方出谷於來宂縹形騰以神契善行無跡顧綏䇿以何施乘化而㳺信道途之不繫伊在御之有則曷躡虛而可尋明上士以離代啓至言以修一作條心斯氣也激濁常全接虛固然初習習以遐邁卒諄諄以思𤣥候不奸兮節之八音而咸應福能致矣旬有五日而方旋想乎上下無間乘凌有託既冲天而輕舉亦觀徼而惟寞鄙蕭史蘭臺之鳳軼王子緱山之鶴道之云逺將自保於逍遥時不再來因以翔於寥廓太清宫觀紫極舞賦以大樂與天地同和為韻張復元樂者所以諧萬國舞者所以節八風故𤣥宗致紫極之舞朝太清之宫俾觀舞以知徳徳以容備省風以作樂樂以文同吾君纉道紀修祖功將有事以朝獻必斯舞之是崇方其一人在庭羣后列位奉常執禮以恭命太樂陳儀而蕆事望聖主以龍升見舞童而麇至舞之作矣應其度而展其容樂乃變焉動於天而蟠於地其始也顧歩齊進蹁躚有序既乍抑而復揚遂將墜而還舉始躡跡以盼䀳毎動容於取與陳噐用之煌煌曳衣裳之楚楚觀乎俯仰廻旋乍離乍聨輕風颯然杳兮俯虹霓而觀列仙飄颻遷延或却或前清宫肅然儼兮若披雲霧而覩青天惟紫也取紫宫之清唯極也明太極之先用之則邦國之光備施之則中和之氣宣徐而匪濁比上帝鈞天之樂静而不過小圜丘雲門之和亦何必持彼羽旌方聞乎得禮執其干戚然後必止戈彼延陵空歎于象箾宋玉徒美其陽阿詎能合天地之大徳調隂陽之大訛者乎洪惟我后遵祖為大道一作遵其樂使萬物無不宣餙其容使兆人無不頼客有觀而作頌願播之於九域之外第二同前韻李絳開元中賜海内以正朔示天下以禮樂舞紫極於宫庭饗𤣥元於雲幄乃樹以旌旃設以宫懸由中出以表靜用上薦於告䖍盛德之容昭之於行綴至和之節奉之以周旋激乎流音之下存乎大樂之先八佾以敷肅然舞於清廟九奏之作杳若享乎鈞天如是則文始不得盛於漢日大章未可比於堯年振萬古而獨出豈百王之相㳂洎乎秉翟而叙候樂以舉協黄鍾歌大吕乍陽開於簫管忽隂閉於柷敔淹速以度正直是與若中正而離立復徐動而進旅和之感物應鳥獸以蹌蹌禮以成文垂衣裳之楚楚由是俾有司夙夜在躬候吉日鼔鍾于宫方將萬舞爰節八風于以易其俗于以告厥功因乎所自制在其中申敬也其恭翼翼宣滯也其樂融融齊無聲於合莫感有情而統同則其業之所肄習之則利作兹新樂著為故事享當其時舞于此地退而成列周廟之干戚以陳折而復施魯宫之羽籥斯備美乎冠之象以峩峩舞其容以傞傞合九變之節動四氣之和散𤣥風以條暢洽皇化之𢎞多是時也天地泰人神㑹舞有容歌無外故曰作樂以象德有功而可大求𤣥珠賦以𤣥非智求珠以真得為韻白居易至乎哉𤣥珠之為物也淵淵綿綿不知其然存乎視聽之表生乎天地之先亘古不改一作其中有象與道相全求之者刳其心俾損之又損得之者反其性乃𤣥之又𤣥𤣥無音聽之則希珠無體摶之甚㣲一作摶之則㣲故以音而求者忘以體而得者非倐爾去焉將窅㝠而齊徃忽乎來矣與罔象而同歸是以聖人之求𤣥珠也捐一作損明聖薄仁義索之唯艱失之孔易將在乎三字一作莫不以心忘心以智去智其難得也劇乎剖巨蚌之胎其難求也甚乎伺一作待驪龍之睡妙乎哉一作夫不皎不昩至明至幽將一作欲致之於馴致豈求之於躁求性滑一作失則遺若合浦之徙去心虛潜至同夜室一作光之暗一作闇投然則一作斯乃動為道樞靜為心符至明一作光不耀至真不渝察之無形謂一有其字有而非有應之有信謂一有其字無而非無是以二字一作故立喻將為二字一作此夫至寳彊名謂之𤣥珠名不徒爾喻必有以以不凝滯為圓以不炫耀二字一作無假疵為美蓋外明者不如内明之義一作理純白者不若虛白之㫖藏於身不藏於川在乎心不在乎水夫唯一作然則外其心順其神韜其光寳一作保其真雖無脛而求之必臻若乃勞其智役其神肆其志徇其惑雖没齒而求之弗得則知真宗無秘妙本冥黙珠者無形之形𤣥者無色之色亦何必遊赤水之上造崑丘之側苟悟漆園之言可臻𤣥珠之極一作皆集本比本書反有脫句第二以道德非智求珠以真為韻趙宇𤣥者道之真宗珠者物之至寳南華醜去聖之昏惑因立言以探討將依物以見真故假名以喻道豈不以精理冥黙妙體希㣲任𤣥覽而自契運無涯而返違共趣於真所觀皆指齊軀於苟何適不非是以遺之者異跡得之者同歸若乃軒轅之理蓋以心中正天下肥猶復築特室靜端闈思營之而英華不冺懸之而日月齊輝於是捐聦塞明離形去智兀然而心無所適漠一作溟然而體無所寄在宥而同乎太和守靜而成乎簡易不自矜伐而人受其賜斯則不違黄屋之間而得𤣥珠之義豈同夫無脛而走有纇一作數可收百金擬價徑寸無儔焉假物而則是在身心而自修摶之不得何􅀈詬二字以註第一百巻穿楊葉賦之能致視之不見豈離婁而足求且夫珠以精真比道道以圓澈比珠豈瓦礫之能雜一作維反聲固聖賢而不殊是以似之者將千里之逺照懷之者如三光而莫逾况國家騰凌羲軒鬱映文史重光累聖抱一而理自𤣥元而得之傳我皇而未已傳之謂何無為是紀得之曷若徴賢選士契漆園之寓言悟𤣥珠而有以况人能𢎞道道豈逺人體之則是任之則淳獨逰於崑崙之側臨乎赤水之濵而在於彼獨疑得其真夫珠之為義豈只喻道亦以比德將求價而不收同君子之否塞况其勞於翰墨握而為則懷恩欲報照乗斯得料明哲之深知冀投之而不忒惚恍中有象賦以形象無實全在精至為韻謝觀惚不可視無臭無聲恍不可聽希夷杳冥於不可為之内有不可狀之形則可徇其惚恍於無是無非之間見有若存若亡之象似菖蒲之秀聞之而不見其形同合浦之珍知有而難期入掌且夫視之不見將謂虛聽之不聞將謂無則虛無之内有罔象之珠及夫視之可見以為真聽之得聞以為實則真實之外有彊名之質故執無而求者理則謬焉執有而求者理亦不然寄精於從無之地韜光於入有之權其象也虛其體也𤣥謂皦兮尚黙謂虧兮復全其方不中於矩而規不中於圓自索隱於心契可忘形於意筌靜以神觀黄帝得之於三月反於目聽列子寤之於九年然後含兮如容浩兮如海體一作期混沌而不殆成胚渾而不宰先天地之始已塊然而生後天地之終尚澹然而在何者為在何者為生生萬物兮吾象不顯成萬物兮吾象不呈謂之有兮無朕謂之無兮有精故道我者非常道名我者非常名及夫清有形而為天濁有形而為地列而為九疇八卦播而為五行六位此皆非其象此乃象之器自可外廢其境内存其至一諭老氏之言曷無為之不致鑿混沌賦以清濁忽分物來傷已為韻薛逄有物混成先天地生言乎地兮不濁謂乎天兮不清物我俱亡莫究希夷之際𤣥黄未判因標混沌之名有南海之帝曰倐北海之帝曰忽胥遇於兹一言相發伊人以視聽食息滋養觀爾則耳目口鼻俱闕將欲擿爾聽以寘音聲抉爾明以分日月䟽爾凖而通氣翕爾喙而容齕厥議既臧厥臂用攘揕顙舂脰真隨手傷一之二之日視之茫茫三之四之日聽之鏘鏘六日而窮鼻韝一作齁息七日而巨口箕張於戱偽兹始回邪作矣中明役神外物攻已一彼一此無終無已痛乎道德䘮而仁義生亦由形兆分混沌死嗜欲悲哀聲牽響來蘧然寐覺劃爾形開日月星辰彊配隂陽之數輪轅榱桷爭標曲直之材徒觀夫執仁斤横義斵剖圭角析清濁投伊礪乃之器入彼敦弓之樸勢騰凌聲瀺灂靜者地而動者天融為河而結為嶽則知樸能成器器成樸分木能生火火盛木焚蓋所為聦明著而勝負交戰智勇昭而是非紏紛夫如是又安得二氣凝而不流萬有來而不拂吾欲寂唱和於聲響縵文章於黼黻然後棄爾見而阻疑爾聞復歸於無物盂蘭盆賦楊烱粤大周如意元年秋七月聖神皇帝御洛城南門㑹十方賢衆蓋天子之孝也渾元告秋羲和奏曉太隂望兮圓魄皎閶闔開兮凉風嫋四海澄兮百川皛隂陽肅兮天地窅掃離宫清重閣設皇邸張翠幕鸞飛鳳翔晱暘倐爍雲舒霞布翕赫忽一作胷霍陳法供飾盂蘭壯神功之妙物何造化之多端青蓮吐而非夜一作夏頳果摇而不寒銅鐡銀錫一作銅鐡錫璆琳琅玕映以甘泉之玉樹冠以承露之金盤憲章皇一作三極儀形萬類上寥廓兮法天下安貞兮像地殫恠力窮神異少君王子掣曳曳兮若來玉女瑶姬翩躚躚兮必至鳴鷫鸘與鸑鷟舞鶤鷄與翡翠毒龍拏一作恕兮赫然狂象奔兮沉醉怖魍魎潜魑魅離婁明目不足見其精㣲匠石洗心不足徴其奥秘繽繽紛紛氛氛氲氲五色成文若榮光休氣發彩於重雲蒨蒨粲粲燠燠爛爛三光啓旦一字一作壯觀若合璧連珠耿耀於長漢夫其逺也天台傑一作起繞之以赤霞夫其近也削成孤峙覆之以蓮花晃兮瑶臺之帝室赩兮金闕之仙家其髙也出諸天於大梵其廣也遍諸法於恒沙上可以薦元符於七廟下可以納群動於三車者也於是乎騰聲明列部伍前朱雀後𤣥武左蒼龍右白虎環衛匝羽林周雷鼔八靣龍旂九斿星戈耀日霜㦸含秋三公以位百寮乃入鳴佩鏘鏘髙冠岌岌規矩中威容翕一作習無族談無錯立若乃山中禪定樹下經行菩薩之權現如來之化生莫不汪洋在列歡喜充庭天人儼而同㑹龍象寂而無聲聖神皇帝乃冠通天佩玉璽冕旒垂目黈纊塞耳前後正臣左右直史身為法度聲為宫徴穆穆然南靣而觀矣人伎初㑹四影髙懸上妙之座取於燈王之國大悲之飯出於香積之天隨藍寳味舎衛金錢麫為山兮酪為沼一作洛花作雨兮香作煙明因不測大福無邉鏗九韶撞六律歌千人舞八佾孤竹之管雲和之瑟麒麟在郊鳳凰蔽日天神下降地祗咸出於是乎上公列卿大夫學士再拜稽首而言曰聖人之德無以加於孝乎散元氣運洪鑪斷鰲足受龍圖定天寳建皇都至如立宗廟平圭臬繡栭文楣山楶藻梲昭穆叙樽罍設以覲嚴祖之耿光以揚先皇之大烈或作明孝之盛烈集作大宗之盛烈孝之始也考辰耀制明堂廣四修一上圓下方布時令合蒸嘗配天而祝文考配帝集作地而祝髙皇孝之中也宣大乗昭群聖光祖考登靈慶發深心展誠敬刑於四海加於百姓孝之終也夫孝始於顯親中於禮神終於法輪武盡美矣周命維新聖神皇帝於是乎唯寂唯靜無營無欲壽命如天德音如玉任賢相惇風俗逺佞人措刑獄省逰讌披圖籙損珠璣寳菽粟罷官之無事恤人之不足鼔天地之化淳作皇王之軌躅太陽夕乗輿歸下端闈入紫㣲興唐寺聖容瑞光賦以天地澄齊高相輝燭為韻李子卿中國之至聖兮西方之大仙凝旒為出代之日立極是分身之年不然者何以垂其拱而鏡清四海建其象而燭耀三天故知有相無相而䨇合前聖後聖而兩全不儀形乎何以表三身之義不鎔範乎何以塞萬人之意乃命鳬氏立法冬官藏事寫真於㑹玉之庭皷鑄於布金之地炎帝司火飛亷扇吹九天下觀百神一作鍊旁伺聲激射氣慿凌殷爾而風雷怒囂然而雲霧蒸波旬下囬禄昇爍寳刹炘金繩忽星透而泉噴遂煙消而氣澄圓相鏡開謂太陽新吐真質山立乃胚渾初凝怡然花臺耀此金髻晬容若動兹眼如睇清凈而青蓮始春圓明而白月新霽光然照夜瑞有應於周王像乃見時夢豈慙於漢帝既營珠額仍輝玉毫見之者宜知極樂之近仰之者誰識湏彌之髙心遂得於真正身豈有於塵勞乗流者於焉捨筏滯縳者於此操刀夫其發靈光凝瑞相異色旁射晴暉逺暢陽烏自耀於陽疑谷之中燭龍㓕焰於鍾山之上自有頂而咸覩歴恒山而逺望赤光照室而多慙紫氣度闗而應譲於是百辟奔走萬姓知歸拂塵而香雲自遍着人而花雨如飛莫不請施瓔珞願觧寳衣期誓心於相好聿求福於光輝由是我皇之作也與聖同軌與道合躅降其象使天下有所觀播其光使天下有所燭不言而人化不欲而人足泛兮墊溺之濟巨川煥乎重昏之照初旭至矣哉法王之教將萬代而嗣續文苑英華巻一百二十五
