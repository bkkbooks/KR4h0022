body:
  text: 文苑英華巻三百八宋李昉等編悲悼八懐古四十八首郢城懐古李百藥客心悲暮序登墉瞰平陸林澤窅芊眠山川鬱重複覇功文粹作王君資設險名都距江澳方城次北門溟海窮南服長䇿挫吳豕雄圗競周鹿萬乘重沮漳九鼎輕伊糓大蒐雲夣掩壮觀章華築人世更盛衰吉凶良倚伏遽見隣交㫁仍覩賢臣逐南風忽不競西師日侵蹙運圯属驅除時屯恣敲朴莫救夷陵火無復秦庭哭鄢郢遂邱墟風塵俄慘黷狐兎竟文粹作時逰踐霜露日沾沐釣渚曲文粹作故池平神臺層宇覆陣雲埋夏首窮隂慘荒谷悵矣舟壑遷悲哉年代倐雖異三春望終傷千里目金陵懐古唐堯臣晉末英雄起神器淪荒服胡月蝕中原白日昇𤾉谷金陵實形勝関山固重複巨壑隍北壖長江塹西隩鑿山擬嵩華穿地象伊糓草昧席羅圖華路戴黄屋一時因地險五世享天禄禮樂何煌煌文章紛郁郁多士春林秀作頌清風穆出入三百年朝事㡬翻覆攙搶如雲勃鯨鯢旋自曝倦聞金鼎移驟覩靈龜卜吁嗟王氣盡坐悲天運倐天道何茫茫善滛乃相復行路偏疑衣半逐疑亡大梁族日隠汀洲上艫􅑳登川陸月迥吳山樹風聞楚江鵠因依蘭蕙聚採襭不盈掬峴山懐古陳子昂秣馬臨荒甸登高覧舊都猶悲堕淚碣尚想卧龍圖城邑遥分楚山川半入吳邱陵徒自出贒聖㡬凋枯野樹蒼烟㫁津楼晩氣孤誰知萬里客懐古正踟蹰白帝城懐古前人日落滄江晩停橈問土風城臨巴子國臺沒漢王宫荒服仍周甸深山尚禹功嵓懸青壁㫁地險碧流通古樹生雲際孤㠶出霧中川途去無限客思坐何窮洛川懐古劉希夷萋萋春風緑悲歌牧征馬行見白頭翁坐泣青竹下感歎前問之贈余辛苦詞嵗月移今古山河更盛衰晉家都洛濵朝廷多近臣詞賦歸潘岳繁華稱季倫紫一作梓澤春草菲河陽亂花飛緑珠不可奪白首同所歸高楼倏㝠滅茂林久摧折昔時歌舞臺今成狐兎穴人事互消亡世路多悲傷北邙是吾宅東岳為我鄉君㸔北邙道髑髏縈蔓草闕碑塋或半存荆棘歛幽魂揮涕棄之去不忍聞此言巫山懐古前人巫山幽隂地神女艶陽年襄王伺容色落日望悠然歸来高堂夜金釭㷔青烟頽想卧瑶席夣魂何翩翩摇落殊未已榮華倏徂遷愁思瀟湘浦悲凉雲夣田猿啼秋風夜鴈飛明月天巴歌不可聼聽此益潺湲蜀城懐古前人蜀土遶水竹吳天積風霜窮覽通表裏氣色何蒼蒼舊國有年代青楼思艶粧古人無嵗月白骨㝠邱荒寂歴彈琴地幽流讀書堂𤣥龜埋卜室米鳳滅詞塲陣圖一一在栢樹雙雙行鬼神清漢廟烏雀叅秦倉歎世已多感懐心益自傷一作歎逝日已多感懐心自傷頼蒙靈邱境時當一作釣明月光商洛山行懐古張九齡園綺直秦末嘉遁此山阿陳迹向千古荒途始一過碩人久淪謝喬木自森羅故事昔常覽遺風今豈訛泌泉空活活樵叟獨皤皤是處清輝滿從中幽興多常懐赤松意復憶紫芝歌避世辭軒冕逢時觧薜蘿盛明今在運吾道竟如何廣武懐古楊浚河水城下流登城望彌惬海雲飛不㫁岸草緑相接龍門無舊場武牢有遺堞扼喉兵易守捫指計何㨗天奪項氏謀卒成漢家業鄉山遥可見西顧淚盈睫再登河陽城懷古朱延客逰倦旅思憇駕陟崇墉元凱標竒跡安仁擅羙蹤逺近濁河流出沒青山峯佇想空不極懐古悵無從瞿唐懐古杜甫西南萬壑注勍敵兩崖開地與山根裂江從月窟来削成當白帝空曲隠陽臺䟽鑿功雖美陶鈞力大哉登廣武楚漢古城集作登廣武古戰場懐古李白秦鹿奔野草逐之若飛蓬項王氣盖世紫電明雙瞳呼吸八千人横行起江東赤精斬白蛇叱咤入闗中兩龍不並躍五緯與天同楚滅無英圖漢興有成功按劍清八極歸酣歌大風伊昔臨廣武連兵决雌雄分我一杯羮太皇乃爾集作汝翁戰争有古跡壁壘頽層穹猛虎嘯洞壑饑鷹獵集作鳴秋空翔雲列曉陣殺氣赫長虹撥亂属豪聖俗儒安可通沈湎呼竪子狂言非至公拊掌黄河曲嗤嗤阮嗣宗月夜金陵懐古前人蒼蒼金陵月空懸帝王州天文列宿在覇業大江流緑水絶馳道青松摧古邱臺傾鳷鵲觀宫沒鳳凰楼别殿悲清暑芳園罷樂逰一聞歌玉樹蕭䬃集作瑟後庭秋一作千古不勝愁秋夜獨坐懐古前人少集作小隠慕安石逺逰學子平天書訪江海雲卧豈一作起咸京入侍瑶池宴出陪玉輦行誇胡新賦作諌獵短書成但奉紫霄顧非邀青史名荘周空説劍墨翟耻論兵拙薄遂踈絶歸閑事耦耕顧無蒼生望空愛紫芝榮牢集作寥落暝霞色㣲茫舊壑情秋山緑蘿月今夕為誰明此詩集以懐故山為題語亦相應今英華作懐古故入此門恐誤登敬亭山南望懐古贈竇主簿前人敬亭一廻首目盡天南端仙者五六人多集作常聞此逰盤溪深集作流琴高水石聳麻姑壇白龍降陵陽黄鶴呼子安羽化騎日月雲行翼鵾集作鵷鸞下視宇宙間四溟空集作皆波瀾决絶目下事從之復何難百年集作嵗落半途前期浩漫漫強食不成味清晨起長嘆願隨子明去煉火燒金丹鄴中間氣集作城懐古孟雲卿朝間氣集作欲發淇水南将盡北燕路魏家舊城闕寂寞無人住伊昔天地閉曹瞞一作公獨守一作中㩀羣臣将北靣白日忽西暮三臺竟寂寞一作寥萬代良難固一作萬事難長固雄豪一作圖安在哉衰草沾霜露崔嵬長河北尚應想劉墓古樹藏乖龍一作龍蛇荒茅伏秋兎永懐故池館數子連章句逸興驅山河雄辭變雲霧我行覩遺跡精爽如可一作相遇斗酒将酧君悲風白楊樹出蕭闗懷古陶翰驅馬擊長劍行旅至蕭邉悠然五原上永眺闗河前北虜三十萬此中常控弦秦城亘宇宙漢帝理戎旃刁斗鳴不息羽書日夜傳五軍計莫就三䇿議空全大漠横萬里蕭條絶人烟孤山常瀚海白日照祁連愴矣苦塞奏懐哉式㣲篇更悲秦城月夜夜出胡天南楚懐古劉長卿南國久蕪漫我来一作生空欎陶君㸔章華宫處處生黄蒿但見陵與谷豈知賢與豪精䰟託古木寳玉捐江臯倚棹下晴景廻舟隨晩濤碧雲暮寥落湖上秋集作青天高往事那堪問此心徒自勞獨餘湘水上千載聞離騷春草宫懐古前人君王不可見芳草舊宫春猶帶羅裙色青青向楚人金陵懐古司空曙輦路江楓盡詩選作暗宫潮野草春傷心庾開府老作北朝臣湘中懐古戴叔倫昔人從逝水有客弔秋風何意千年隔論心一日同楚亭方作亂漢律正酹功倏忽桑田變讒言亦已空京口懐古前人大江横萬里古渡渺千秋浩浩波聲險蒼蒼天色愁三方歸漢鼎一水限吳州覇國今何在清泉長自流湘州懐古釋清江瀟湘連泪羅復對九疑河浪勢屈原塚竹聲漁父歌地荒征騎少天暖谷禽多脉脉東流去古今同奈何蕪城懐古李端風吹城上樹草没城邉路城上明月時精靈夜来去金陵懐古劉禹錫潮滿臺城渚日斜征虜亭芳洲新草緑幕府舊烟青興廢由人事山川空地形後庭花一曲幽怨不堪聼西塞山懐古前人西晉樓舡下益州金陵王氣漠一作黯然収千尋鐵鎖沉江底一片降幡出石頭人世㡬回傷往事一作荒苑至今生茂草山形一作古城依舊枕寒流今逄四海為家日故壘蕭蕭蘆荻秋一作而今四海歸皇化兩岸蕭蕭蘆荻秋一作皆唐宋類詩荆門道懐古前人南國山川舊帝畿宋臺梁館尚依稀馬嘶古樹行人歇麥秀空城野雉飛風吹葉落填宫井火入荒墳化寳衣徒使詞臣庾開府咸陽終日苦思歸西江懐古杜牧上吞巴漢控瀟湘怒似連山静鏡光魏帝縫嚢真戱劇符堅投箠更荒唐千秋釣艇集作舸歌明月萬里沙鷗弄夕陽范蠡清塵何寂寞好風唯属往来商汴口集作河懐古前人錦纜龍舟隋煬帝平臺複道漢梁王逰人還集作閑起前朝念折桞孤吟㫁殺腸姑蘇懐古許渾宫館餘基輟棹過黍苖無限獨悲歌荒臺麋鹿争新草空苑鳬鷗占淺莎江上集作吴岫雨来虚檻冷海邉風起集作楚江風急逺㠶多可憐國破忠臣死日月東流生白波金陵懐古于濆舘娃宫畔顧國變生嬌妬勾踐膽未嘗夫差心已誤吴亡甘已矣越勝今何處當時二國君一種邉江墓金谷懐古前人黄金嬌石崇與晉争國力更欲住人間一日買不得行為忠信住身是文章宅四者俱不聞空傳墮樓一作墜楼客楚江懐古三首蒼葭又𤣥集作蒼山馬戴露氣寒光集㣲陽下楚邱猿啼洞庭樹人在木蘭舟廣澤生明月蒼葭夹亂流雲中君不降竟夕自悲秋二驚鳥去無際寒蛩鳴我傍蘆洲生早霧蘭隰下㣲霜列宿分窮野空流注大荒看山候明月聊自整雲装三野風吹蕙帶驟雨滴蘭橈屈宋魂𡨕寞江山思寂寥隂霓侵晩一作反景海樹入廻潮欲折寒芳薦明神拒可招釣臺懐古劉駕澄流可濯纓嚴子伹垂綸孤坐九層石逺笑清渭濵潜龍飛上天四海豈無雲清氣不零雨安使澆詩選作洗埃塵我来吟高風髣髴見斯人江月尚皎皎江石亦磷磷如何臺下路明日又迷津建鄴懐古楊乘故城故壘滿江濆盡是干戈舊苦辛君見即湏知帝里一作力生来便作太平人秣陵懐古李羣玉野花黄葉舊吳宫六代豪花一作華燭散風龍虎勢衰佳氣歇鳳凰名在故臺空市朝遷變秋蕪緑墳壠高低落照紅覇業鼎圖人去盡獨来惆悵水雲中汴河懐古二首皮日休萬艘龍舸緑絲間載到揚州盡不還應是天教開汴水一千餘里地無山二盡道隋亡為此河至今千里頼通波若無水殿龍舟事共禹論功不較多金陵懐古崔塗葦聲蕭䬃水天秋吟對金陵古渡頭千載是非輸蝶夣一罇風雨属漁舟若無仙分應湏老幸有青山即合休何必登臨更惆悵比来人世只如浮青山集作山歸比來人世集作本來身世南海石門戍懐古陳陶漢家征百越落疑地喪貔貅大野朱旗没長江赤血流鬼神尋覆族宫廟變荒邱唯有朝臺月千年照戍楼塗山懐古前人落拓書劍晩清秋鷹正籠塗山間来上敬愛如登龍覽古覺神王翛然天地空東南更何有一醉先生風惟昔放勲世隂晦徹一作亂成洪皇圖化魚鱉天道漂無蹤帝乃命舟檝掇芳儒素中高陳九州力百道驅歸東舊物復光明洪爐再埏鎔經門不私子足知一作示天下公亮曰疑那並生唐虞禪華蟲茲山朝萬國一賦寰海同十載有區㝢秋毫皆帝功垂衣不驕徳子桀如何聾握髮聞禮賢葺茆見卑宫凡夫色難事神聖安能一作龍恭道隠三千年遺芳播笙鏞當時執圭處佳氣仍童童海嶼儼清廟天人盛祗供𤣥恩及花木丹䜟名崆峒異代草澤臣何由樹勲庸堯階未曽識誰信平生忠恨不當際㑹預為執鞭僮勞歌下山去懐徳心無窮春日秦國懐古周朴荒郊一望欲消魂涇水縈紆傍逺村牛馬放多春草盡原田耕破古碑存雲和積雪蒼山晩烟伴殘陽緑樹昏數里黄沙行客路一作路客不堪回首思秦原望中懐古前人齊心楼上望浮雲萬古千秋空姓名堯水永消天際去姬風一變世間平高蹤盡共天一作烟霞在大道長将白日明一作日月從此安然寰海内後来無復謾相傾謝公亭懐古張喬謝家烟徑長莓一作蒼苔牢落虚櫩一作欄竹上開流水不将山色去閑雲時帯角聲来六朝舊跡遺詩在三楚空江有鴈廻逹理始應惆悵盡因僧清話憶天台咸陽懐古韋荘城邉人倚夕陽楼城上雲凝萬古愁山色不知秦苑廢水聲空傍漢宫流李斯不向倉中死徐福應無物外逰莫怪楚吟偏㫁骨野烟踪跡似東周金陵懐古王貞白恃險不種徳興亡歎數窮石城幾換主天塹謾連空御路疊民塚臺基聚牧童折碑猶有字多記晉英雄文苑英華巻三百八
