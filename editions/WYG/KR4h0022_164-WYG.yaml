body:
  text: 文苑英華巻一百六十四宋李昉等編地部六泉一十四首瀑布十首雜題二十五首曲江五首昆明池十首温湯三首泉聽夜泉張籍細泉深處落夜乆漸聞聲獨起出門聽欲尋當澗行還疑隔林逺復畏有風生月下堪留此無人亦到明僧院引泉姚合泉眼髙千丈集作尺山僧取得歸架空横竹引鑿石透渠飛洗藥溪流濁澆花雨力㣲朝昏長逺㸔䕶惜似持衣方山寺松下泉章孝標石脉綻寒光松花噴曉霜注瓶雲母滑漱齒茯苓香野客偷煎茗山僧惜净牀三禪不要問孤月在中央憶四明山泉施肩吾愛彼山中石泉水幽聲夜夜落空裏至今憶得卧雲時猶自涓涓在人耳聽夜泉劉得仁静裏層層石潺湲到鶴林流迴出幾洞源逺歴千岑寒助空山月清兼此夜心幽人聽逹曙難罷蘚牀吟和鄭校書夏日遊鄭泉前人太虛懸畏景古木蔽清隂爰有泉堪挹閒思日可尋來聞鳴滴滴昭竦碧沉沉幾脈成溪壑何人測淺深澄時無一物分處歴千林净溉靈根藥凉浮玉翅禽飲疑蠲宿疾見自失煩襟僧共雲前瀨龍聽月下吟疊光輕吹動徹底曉霞侵不用頻遊去令君少進心秋晩日少陵原遊山泉之什楊發喧濁侵肌性未沉毎來雲外恣幽尋塵衣更喜秋泉㓗倦跡方依竹洞深暫過偶然應繫分有期終去但勞心唯憐一夜空山月似許他年伴獨吟山泉前人半空飛下水勢去響如雷静徹啼猿寺髙陵坐客臺耳同經劒閣身若到天台濺樹吹成凍隣祠觸作灰深中試楖栗淺處落莓苔半夜重城閉潺湲枕底來經漢武泉趙嘏芙蓉苑裏起清秋漢武泉聲落御溝他日江山映蓬鬢二年楊桞别漁舟竹間駐馬題詩去物外何人識醉逰盡把歸心付紅葉晩來隨水向東流青鳥泉張喬秪此沉仙翼瑶池似不遥有聲懸翠壁無勢下丹霄净瀨煙霞古寒原草木凋山河幾更變幽咽到唐朝石門山泉鄭谷一脉清泠何所之縈莎潄蘚入僧池雲邉野客窮來處石上寒猿見落時聚沫遶槎殘雪在迸流穿樹墮花隨烟春雨晩閒吟去不復逺尋皇子陂題東林寺虎跑泉周繇勝致通幽感靈泉有虎跑爪擡山脉斷掌托石心坳竹藹疑相近松隂蓋亦交轉令棲遁者真境愈難抛野泉張蠙逺出白雲中長年聽不同一作窮清聲縈亂石一作石亂寒色入長空挂壁聊成雨穿林别起風温泉非爾類源發在深宫商山夜聞泉曹松㵼月聲不斷坐來心益閒無人知落處萬木冷空山逺憶雲容外幽疑石縫間那辭通曙聽明日度藍關瀑布湖口望廬山瀑布張九齡萬丈洪泉落迢迢半紫氛奔飛下雜樹灑落出重雲日照虹蜺似天清風雨聞靈山多秀色空水共氤氲入廬山仰望瀑布前人絶頂有懸泉喧喧出烟杪不知幾時嵗但見無昏曉閃閃青崖落鮮鮮白日皎灑流濕行雲濺沫驚飛鳥雷吼何噴薄箭馳入窈窕昔聞山下䝉今乃林巒表物情有詭激坤元曷紛矯黙然置此去變化誰能了翫廬山瀑布李白西登香爐峯南見瀑布水挂流三千丈噴壑數十里歘如飛練來隠若白虹起初驚河漢落一作銀河落半灑雲天裏仰觀勢轉雄壮哉造化功海風吹不斷江月照還空空中亂潨射左右洗青壁飛珠散輕霞流沫沸穹石而我樂名山對之心益閒無論漱瓊液還得洗塵顔且諧宿所好永願辭人間廬山瀑布前人廬山上與星斗連日照香爐生紫烟飛流直下三千尺疑是銀河落九天瀑布泉冷朝陽潺湲半空裏霜落石房邉風激珠光碎山欹練影偏急流難起浪迸沬秪如烟自古惟今日凄凉一片泉廬山瀑布徐凝瀑布瀑布千丈直雷奔入海不暫息今古長如白練飛一條界破青山色瀑布章孝標秋河溢長空天曬萬丈布深雷隠雲壑孤電掛巖樹滄溟曉噴寒碧落晴盪素非趨下流急勢使不得住東山瀑布方干遥夜看來疑月照平明失却集作去被雲迷掛巖逺勢穿松島落地集作擊石殘聲注稲畦素色噴成三伏雪餘波流作萬年溪若非真宰能開决應向前山雜淤泥天台瀑布曹松萬仭得名云瀑布逺看如織掛天台休疑寳尺難量度直恐金刀易剪裁噴向林梢成夏雪傾來石上作春雷欲知便是銀河水墮落人間合却廽廬山瀑布裴説静景慿髙望光分翠嶂開嶮飛千尺雪寒撲一聲雷過去雲衝斷旁來燒隔廻何當住峯下終嵗絶塵埃雜題賦得曲澗劉孝威澗流急易轉溪水暗難開近樓俄已失前洲忽蕩廻石岸生寒蘚沈根漬水苔菱舟失道去歸鳬迷逕來嚴陵瀬任昉羣峯此峻極參差百里嶂清淺既漣漪激石復奔壯神物徒有造終然莫能状夕逗繁昌浦劉孝綽日入江風静安波似未流崖廻知舳轉䌫解覺船浮暮煙生逺渚夕鳥赴前洲隔山聞戍皷傍浦喧棹謳疑是辰陽宿於此逗孤舟晩出新亭隂鏗大江一浩蕩離悲足幾重潮落猶如蓋雲昏不作峯逺戍惟聞皷寒山但見松九十方稱半歸途詎有蹤詠浮漚已見一百五十五巻鄭縉進船泛洛水薛慎惑禁園紆睿覧仙棹叶時逰洛北風花樹江南彩畫舟芳生蘭蕙草春入鳯凰樓興盡離宫暮烟光起夕流泛前陂王維秋空自明一作明月迥况復逺人寰集作間暢以沙際鶴兼之雲外山澄波集作陂澹将夕清月皓方閒此夜任孤棹夷猶殊未還牛渚磯李白絶壁臨巨川連峯勢相向亂石流洑間廻波自成浪但驚羣木秀莫測精靈状更聽猿夜啼憂心醉江上尋龍湍孫逖仙穴尋遺迹輕舟愛水鄉溪流一曲盡山路九峯長漁父歌金洞江妃舞翠房遥憐葛仙宅真氣共㣲茫石頭瀬崔國輔悵矣秋風時余臨石頭瀬因髙見逺境望盡此州内羽山一㸃青海岸雜花碎離離樹木少淼淼湖波大日暮千里帆南飛落天外湏㬰遂入夜埜色有㣲靄尋逺路已窮遺榮事多昩一身猶未理安得濟時代且泛朝夕潮荷衣蕙為帶宿范浦前人月暗潮又落西陵渡蹔停村煙和海霧舟火亂江星路轉定山遶塘連范浦横鴟夷近何去空山臨滄溟泊楊子津祖詠纔入維楊郡鄉山此地遥林殘初霽雨風退欲歸潮江火明沙岸雲帆礙浦橋客衣今正薄寒夜昨來饒横龍渡劉長卿空傳古岸下曾見蛟龍去秋水晩沈沈猶疑在深處亂聲沙上石倒影雲中樹獨繫一扁舟樵人往來渡與鄧縣郡官泛渼陂集作與鄠縣羣官泛渼陂岑參萬頃浸天色千尋窮地根舟移城入樹岸濶水浮村閒鷺驚簫管潜蛇傍酒罇􅊕來呼小吏列火儼歸軒西陵渡寄一公皇甫冉西陵遇潮處自古是通津終日空江上雲山若待人汀洲寒事早魚鳥興情新回望山隂路吾心有所親酬皇甫冉西陵渡見寄釋靈一西陵潮信滿島嶼入中流越客依風水相思南渡頭寒光生極浦暮雪映滄洲何事揚帆去空驚江上鷗㳺元象泊釋泚空水潮色净澹然湖上心舳艫輕且進汀洲如可尋秋風洄泝險落日波濤深寂寞武侯去中流方至今泊楊子津盧綸山影南徐暮千帆入古津魚驚出浦火月照渡江人清鏡悲雙鬢滄波寄一身空憐芳草色長接故園春滁州西澗韋應物獨憐幽草澗邉生上有黄鸝深樹鳴春潮帶雨晩來急野渡無人舟自横淮上秋夜劉方平旅夣何時盡征途望毎賖晩秋淮水上新月楚人家猿嘯空山近鴻飛極浦斜明朝南岸去定折桂枝花早發夀安次承濟集作永夀渡許渾東西車馬塵鞏洛與咸秦山月夜行客水烟朝渡人樹凉風浩浩沙淺石磷磷㑹待功名就扁舟寄此身長洲趙嘏扁舟殊不繫浩蕩路纔分范蠡湖中樹呉王苑外雲悲心人望月獨夜鴈離羣明發還驅馬關中見日曛夜入湘中馬戴洞庭人夜到孤棹入湘中露洗寒山遍波摇楚月空宻林飛暗狖廣澤發鳴鴻行抵揚帆者江分又不同渼陂鄭谷昔事東流共不回春深獨向渼陂來山前别業依稀在雨裏梨花寂寞開却展魚絲無野艇舊題詩句沒蒼苔潸然回顧難消遣秪有佯狂泥酒盃秋浦羅隠晴川倚落暉極目思依依野色寒來淺人家亂後稀乆逰身不逹多病意常違還有漁船在時時夣裏歸曲江曲江早秋白居易秋波紅蓼水夕照青蕪岸獨信馬蹄行曲江池四畔早凉晴後至殘暑暝來散方喜炎燠銷復嗟時節換我年三十六冉冉昏復旦人夀七十稀七十新過半且當對酒笑勿起臨風歎曲江前人細草岸西東酒旗摇水風樓䑓在花杪鷗鷺下煙中翠幄晴相接芳洲夜暫空何人賞秋景興與此時同曲江春張喬尋春與送春多遶曲江濵一片鳬鷖水千秋輦轂塵岸凉隨衆木波影逐逰人自是逰人老年年管吹新春逰曲江喻坦之誤入杏花塵晴江一看春菰蒲雖似越骨肉且非秦曲岸藏翹鷺垂楊拂躍鱗徒憐汀草色未是醉眠人曲江春感羅隠江頭日暖花又開江東行客心悠哉髙陽酒徒半凋落終南山色空崔嵬聖代也知無棄物侯門未必用非才一船明月一竿竹家住五湖歸去來昆明池和靈法師逰昆明池二首庾信逰客重相懽連鑣出上蘭值泉傾蓋飲逢花駐馬㸔平湖泛玉舳髙堰歇金鞍半道聞荷氣中流覺水寒二秋光麗晩天鷁舸泛中川宻菱障浴鳥髙荷没釣船碎珠縈斷菊殘絲繞折蓮落花催斗酒栖烏送一絃和春日晩景宴昆明池前人餘春足光景趙李舊經過上林栁腰細新豐酒徑多小船行釣鯉新盤待摘荷蘭臯徒税駕何處有凌波秋日逰昆明池江總靈類聚作𤣥沼蕭條望逰人意緒多終南雲影落渭北雨聲過蟬噪金堤桞鷺飲石鱗波珠來照似月織處冩成河此時臨水歎非復採蓮歌同前薛道衡㶚陵因静退靈池暫徘徊新船木蘭檝舊宇豫章材荷心宜露泫竹徑重風來魚潜疑刻石沙暗似沉灰琴逄鶴欲舞酒遇菊花開覊心與秋興陶然寄一杯賦昆明池一物得織女石虞茂隔河圖列宿清漢象昭回支機就鯨石拂鏡取池灰船疑海槎渡珠似客星來所恨雙蛾歛逄秋遂不開秋逰昆明池元行恭旅客傷覊逺樽酒慰登臨池鯨隠舊石岸菊聚新金陣低雲色近行髙鴈已初學記作影深欹荷㵼圓露卧桞横清隂衣共秋風冷心學古灰沉還似無人處幽蘭入雅琴和許侍郎逰昆明池李百藥神池望北極滄波接逺天儀星似河漢落景類虞泉年深平舘宇道泰偃戈船差池下鳬鴈掩映生雲烟浪花開已合風文直且連税馬金堤外横舟石岸前羽觴傾緑蟻飛日落紅鮮積水浮深智明珠曜雅篇大鯨方逺擊沉灰獨未然知君嘯儔侶短翮徒聮翩和七月七日臨昆明池任希古秋風始摇落秋水正澄鮮飛眺牽牛渚激賞鏤鯨川岸珠淪曉魄池灰歛曙烟泛查分㵼漢儀星别構天雲光波處動日影浪中懸驚鴻絓蒲弋逰鯉入荘筌萍葉疑江上菱花似鏡前長林代輕幄細草即芳筵文華開翠㶑筆海控清漣不挹蘭罇聖空仰桂舟仙昆明池晏坐答王兵部珣三韻見示蘇頲􅀞舸疾如飛遥遥泛夕暉石鯨吹浪隠玉女步塵歸獨有衘恩處明珠在釣磯温湯浴温湯劉逖驪岫猶懐土新豐尚有家神井堪消疹温泉足蕩邪紫苔生石岸黄葉擁金沙振衣殊未已翻能使停車同崔員外温泉即事郭汭輦輅移雙闕宸逰整六師天廻紫㣲座日轉羽林旗霜氣寒戈㦸軍容壮虎貔弓鳴射鴈處泉暖躍龍時惠化成觀俗謳謡入賦詩同歡王道盛相與詠雍熈温湯即事前人天仗星辰轉霜冬景氣和樹含温液潤山入繚垣多丞相金錢賜平陽玉輦過接輿來自楚朝夕值行歌文苑英華巻一百六十四
