body:
  text: 文苑英華巻九百六十九宋李昉等編婦人七河東縣太君盧氏墓誌一首趙郡夫人李氏墓誌一首裴海州夫人李氏墓誌一首賢妃韋氏墓誌一首元長史夫人鄭氏墓誌一首岐陽公主墓誌一首先太夫人河東縣太君盧氏歸祔誌栁宗元先夫人姓盧氏諱某世家涿郡壽止六十有八元和元年嵗次丙戌五月十五日棄代于永州零陵佛寺明年某月日安祔于京兆萬年栖鳯原先侍御史府君之墓其孤有罪銜哀待刑不得歸奉喪事以盡其志姪洎夫人兄之子𢎞禮承事焉嗚呼天乎太夫人有子不令而陷于大僇徙播癘土醫巫藥膳之不具以速天禍非天降之酷將不幸而有惡子以及是也今又集作又令無適主以𦵏天地有窮此寃無窮既舉葬紖猶以不孝集作肖之辭擬述先徳且志其酷焉嘗逮事伯舅聞其稱太夫人之行以教曰汝宜知之七嵗通毛詩及劉氏列女傳斟酌而行不墜其有集作㫖汝宗大家也既事舅姑周睦姻族栁氏之孝仁益聞嵗惡少食不自足而飽孤㓜是良難也又嘗侍先君有聞如舅氏之謂且曰吾所讀舊史及諸子書夫人聞而盡知之無遺者某始四嵗居京城西田廬中先君在呉家無書太夫人教古賦十四首皆集注作日諷誦之以詩禮圖史及剪刺緯結集作剪製縷結授諸女及長皆為名婦先君之仕也伯母叔母姑姊妹子姪雖逺在數千里之外必奉迎以來太夫人之承之也尊已者敬之如臣事君下已者慈之如母畜子敵已者友之如兄弟無不得志者也諸姑之有歸必廢寢食禮既備常有勞疾先君將改𦵏王父母太夫人泣以蒞事既具而大故及焉不得成禮既得命於朝祇奉教曰汝忘大亊乎吾冢婦也今也宜老而唯是則不敢暇抑將任焉茍有日吾其行也及命為邵州又喜曰吾願得矣竟不至官而及於罪是歲之初天子加恩羣臣以宗元任御史尚書郎封太夫人河東縣太君八月㑹册太上皇后于興慶宫禮無違者既至永州又奉教曰汝唯不恭憲度既獲戾矣今將大儆于后以蓋前惡敬懼而已茍能若是吾何恨哉明者不悼往事吾未嘗有戚戚也而卒以無孝道不能有報焉喪主子宗婦七歲而不果娶竄窮徼人多疾殃灾集作炎暑熇蒸其下卑濕非所以養也診視無所問藥石無所求禱祠無所實蒼黄呌呼遂遘大罰天乎神乎其忍是乎而獨生者誰也為禍為逆又頑狠而不得死逾月逾時以至于集于字作於靈車逺去而身獨止𤣥堂暫開而目不見孤囚窮縶魄逝心懐一作壊蒼天蒼天有如斯耶有如是耶而猶言猶食者何如人耶已矣已矣窮天下之聲無以舒其哀矣盡天下之辭無以傳其酷矣刻之堅石措之幽隂終天而止矣伯祖妣趙郡李夫人墓誌銘前人夫人姓李氏辯族姓者曰趙郡贊皇之東祖祖某為某官父沖為單父尉夫人生於良族嶷然殊異及笄徳充於容行踐於言高朗而不傷其柔嚴恪而不害其和特善女紅剪製之事又能為雅琴奏聲操縵之具婦道既備宜為君子之配偶焉我伯祖臨邛令府君諱某受夫人於李氏之廟而歸于正室臨邛府君之先曰我曾王父清池府君諱從裕清池之先曰徐州府君諱子夏又其先曰常侍府君諱楷常侍之兄曰中書令諱奭自中書以集作已上為宰相四世噫我伯祖以宗冑碩大而濟其德厚夫人以族屬清顯而修其禮範合二姓以承先祖為士者榮之故佐奉養承祭祀婦徳用光家道甚宜無何伯祖終于臨邛而窆焉夫人從子而返于淮滸嗚呼我先府君每得仕未嘗不奉迎供養必誠必親男既立必使之有禄仕女必使之有家將嫁已子必先擇良士可以配諸姑者定然後議焉仲父殿中侍御史府君由是志也夫人生男一人諱某不幸終於宣州旌德尉女三人皆得良婿隴西李伯和為揚子丞病痺癈痼而没太原王紓今為右補闕潁川陳萇為校書郎渭南尉知名貞元十六年王氏始定省扶持自揚州至于京師道路遇疾遂館于陳氏以諸婿之良諸女之養無不得意焉享年八十一是歲六月二十九日終于平康里自小斂至于大斂比及葬則二婿實參主之有孫二人長曰曹郎奉之以縗而正于位八月二十四日葬於萬年縣之少陵原實栖鳯原介于我先府君仲父二兆之間神心之所安也嗚呼嗣子早夭臨卭萬里以歲之不易未克合祔哀孰甚焉諸姑命栁州本作合宗元崇本無此二字以為斯志以從人之道内夫家外父母且又葬于我志于我故叙栁氏為備銘曰藹其芳壽且康大梁鶉火沈幽光夙淪夫子嗣又喪平聲蒲集作輤帷不復岷之陽兆靈趾栖鳯里艮之山兑之水靈之車當返此子孫百代承靈祉誰之言者青烏子海州刺史裴君夫人李氏墓誌銘白居易夫人贊皇縣君李氏趙郡髙邑人也六代祖素立安南都䕶五代祖休烈趙州刺史高祖諱志逺天官侍郎曽祖諱畬國子司業祖諱承工部尚書湖南觀察使考諱藩門下侍郎同平章事贈戸部尚書夫人諱娥相國長女也適河東裴君克諒諒今為海州刺史一子曰鐬左衛騎曹參軍一女適隴西李遂遂為壽州刺史參軍由此而上得於國史家諜云夫人為相門之女邦君之妻不以華貴驕人能用恭儉克已撫下若子敬夫如賔衣食之餘旁給五服親族之饑寒者又有餘散活集作沽先代僕使之老病者又有餘分施佛寺僧徒之不足者澣衣菲食服勤禮法禮法之外諷釋典持直言棲心空門等觀生死故治家之日欣然自適捐館之夕恬然如歸寳厯三年三月一日疾終于海州官第其嵗十一月十四日歸祔于某所先塋享年五十有四夫人之從裴君也歴官九任凡三十一年族睦家肥輔佐之力也由此而上得於裴君狀云夫源逺者流長根深者枝茂噫李氏之世禄也德有所從來矧相國端方亷雅孝友忠肅自從事彭城登庸宰府不以夷險而遷其道宜乎居極位享賢名也夫人敬恭勤儉柔順慈惠自女於室歸於家不以初終而怠其行宜乎啟封邑光德門也裴君脩文達政潔已愛人自佐邑從軍連牧二郡不以寒暑而易其心宜乎荷百禄號良二千石也嗚呼非此父不生其集作此女非是夫不稱是妻斯所謂類以相從合而具美者也論譔表誌其可闕乎銘曰高邑之祥降於李氏相門之慶鍾于女子女子有行歸老集作我裴君君亦良士宜賢夫人夫人雖殁風躅具存勒銘泉户作範閨門賢妃京兆韋氏墓誌銘前人德宗聖文神武皇帝元妃韋氏諱某字某京兆人也曾祖某某官祖某某官父某某官妃即某官府君第某女也母曰永穆公主元和四年四月某日妃薨于某所以其年四月某日詔葬于萬年縣上好里洪平原上悼焉哀榮之禮有以加等集作焉嗚呼惟韋氏代德宦業族系昏戚有國史家諜存焉今奉詔但書地及時與妃之所以曰賢之義而已貞元中沙麓集作鹿上仙長秋虚位凡六御集作六十未詳九御之政多聴於妃妃先以采蘩之職集作成奉於上故能助霜露之感薦于九廟次以樛木之德逮于下故能分雲雨之澤洽于六宫其餘坐論婦道行贊内理服用必中度故組紃有常訓言動必中節故環佩有常聲二十七集作七十二非年禮無違者册命曰賢不亦宜哉永貞中集作貞元中非號奉宫車誓留園寢麻衣告朔蓬首致哀執匪懈之心侍集作視奠於靈座脩無上之道薦福于崇陵殆茲殁身不衰其志故塟之日掌文之臣白居易得以無愧之詞誌于墓而銘曰京兆阡兮洪平原兮歲己丑兮日丁酉兮惟土田兮與時日龜兮蓍兮偕言吉峩峩新墳兮葬者誰德宗皇帝韋賢妃河南元府君夫人鄭氏墓誌銘前人有唐元和元年九月十六日故朝集本文粹並作中散大夫尚書比部郎中舒王府長史河南元府君諱寛夫人滎陽縣太君滎陽二本無此二字鄭氏年六十寢疾殁于萬年縣靖安里私第越明年二月十五日權祔于咸陽縣奉賢里洪瀆源從先姑之塋也夫人曾祖諱逺思官至鄭州刺史贈太常卿王父諱􅀈朝散大夫易州司馬父諱濟睦州刺史夫人即睦州次女也其出范陽盧氏外祖諱平子京兆府涇陽縣令夫人有四子二女長曰泝集作沂蔡州汝陽縣尉次曰秬京兆府萬年縣尉次曰積同州韓蜀本作韋非城縣尉次曰稹河南府河南縣尉長女適吳郡陸翰為監察御史次為比丘尼曰二本作名真一二女不幸皆先夫人殁府君之為比部也夫人始封滎陽縣君從夫之二本無之字下同貴也稹之為拾遺也夫人進封滎陽縣太君從子之貴也天下有五甲姓滎陽鄭氏居其一鄭之勲德官爵有國史在鄭之原𣲖婚姻二本作源流婚媾有家諜在比部府君世禄官政文行有故京兆尹鄭雲逵之誌在今所敘者但書夫人之事而已初夫人為女時事父母以孝聞友兄姊睦弟妹以悌聞發自生知不因師訓其淑性有如此者夫人為婦時元氏世食貧然以豐潔家祠二本作祀傳為治訓二字二本作貽燕之訓夫人每及時祭則終夜不寢煎和滌濯必躬親之雖隆暑沍蜀作祈寒之時而服勤親饋面無勞色其誠敬有如此者元氏鄭氏四字集作元鄭皆大族合而為親二本無此二字姻表滋盛二本作多凡中外吉凶之禮有疑議者皆質於夫人夫人從而酌之靡不中禮其明達有如此者夫人為母時府君既没積與稹方髫齓家貧無師以受業夫人親執詩書誨而不倦四五年間二子皆以通經入仕積即二本作既第判入等授秘書省校書郎屬今天子始踐祚策三科以拔天下賢俊中第者凡十八人而稹冠其首焉由校書郎拜右二本作左拾遺不數月讜言直聲動于朝廷以是出為河南尉長女既適陸氏陸氏有舅姑多姻族於是以順奉上以惠逮下二紀而殁婦道不衰内外六姻仰為儀範非夫人恂恂孜孜善誘所至則曷能使子達於邦女宜其家哉其教誨有如此者既而諸子雖逮事二本作迭仕禄秩集作稍甚薄每至日二本作月給食時給衣皆始自孤弱者次及疎賤者由是衣無常主厨無異膳親者悦疎者來故傭保乳母之類有凍餒垂白不忍去元氏之門者而况臧獲輩乎其仁愛有如此者自夫人母其家殆二十五年專用訓誡除去鞭朴常以正顔色訓諸女諸集無此字婦其心兢兢戰戰四字二本作戰兢如履于氷常以正辭氣誡諸子諸集無此字孫諸子諸集無此字孫其心愧恥若撻于市由是納下於少過致家於太和婢僕終歲不聞忿爭童孺成人不識檟楚閨門之内熙熙然如古時人也其慈訓有如此者噫昔漆室緹縈之徒烈女也及為婦則無聞伯宗梁鴻之妻哲婦也及為母則無聞文伯孟氏之親賢母也為女為婦時亦無聞今夫人女美如此婦德又如此母儀又如此三者具美可以冠古今矣嗚呼惟夫人之道移於他則何用不臧乎若引而伸之可以肥一國焉則闗睢鵲巢之化斯不逺矣若推而廣之可以肥天下焉則姜源文母之道集作風斯不逺矣豈止於訓四子以聖善化一家於仁厚者哉居易不佞辱以集本文粹作與夫人之㓜子稹為執友故聆夫人之美最熟稹泣血孺慕哀慟他人託為譔述書於墓石斯古孝子顯父母之志也嗚呼斯文之作豈直為二本作若是而已哉亦使文粹作欲百代之下聞夫人之風過文粹作覩夫人之墓者使悍妻和嚚母慈不遜之女順云爾銘曰元和歲丁亥春咸陽道渭水濱云誰之墓鄭夫人岐陽公主墓誌銘杜牧憲宗皇帝即位八年出嫡女册封岐陽公主下嫁于今工部尚書判度支杜公悰始憲宗時宰相權德輿有婿獨孤郁為翰林學士帝愛其材因命宰相曰我有集無此字嫡女既笄可嫁德輿得婿獨孤郁我豈不得耶可求其比後丞相吉甫進言曰前所奉詔臣謹搜其人因名我烈祖司徒岐公曰有孫兒悰年始弱冠有德行文學秀朗嚴整臣嘗為司徒吏熟其家事官族世婚習尚守治臣一皆忖量集作度疑悰可以奉詔帝即召尚書見與語大悦授殿中少監服章金紫以元和八年某月日主下嫁于杜氏上御正殿禮畢由西朝堂出節幡鼓鐸儀物畢備引就昌化里賜第上御延喜樓駐止主輪尚書及賓侍酒食金帛奏内樂降嬪御送行賜第堂有四廡繢椽藻櫨丹白其壁𣲖龍首水為沼主外族因請願以尚父汾陽王大通里亭沼為主别館當其時隆貴顯榮莫與為比主實憲宗皇帝嫡女穆宗皇帝母妹敬宗皇帝今天子親姑尚父汾陽王子儀外曾孫太皇太后始以正妃事憲宗以太后太皇太后愛一作受養三朝凡四十年德厚慈恕化充六宫主以一女之愛降于杜氏逮事舅姑杜氏大族其他宜為婦禮者不翅數十人主卑委怡順奉上撫下終日惕惕屏息拜起一用集作同家人禮度二十餘平人未嘗以絲髮間指為貴驕始與尚書合謀曰上所賜奴婢卒不肯窮屈奏請納之上嘉歎許可因錫其直悉自市寒賤可制指者自是閉門落然不聞人聲尚書讀書考今古治亂主職婦事承奉夫族時歲獻饋吉凶賻助必親自經手池塞館侈直爾反闢毬場種樹不數十年縉紳間雜然稱尚書為賢主婦尚書旋出為灃州刺史主後為尚書行郡縣聞主且至殺牛羊犬為數百人供具主從從字集作至後不二十人六七婢乗驢闒葺約所至不得肉食驛吏立門外舁飰食以返不數日集有間字聞于京師衆諜説以為異事尚書在灃州三年主始入後出中間不識刺史㕔屏尚書治灃州考理行為天下第一後為大司農集作徒非京兆尹鳯翔節度使朝廷屈指比數以為凡有中外重難非尚書不可主賢益彰雖至宫闈貴號亦加尊敬姑涼國太夫人寢疾比喪及𦵏主奉養蚤夜不解帶親自嘗藥粥飯集作飲不經心手一不以進既而哭泣哀號感動他人尚書後為忠武軍節度使所治許州創為節度府五十年南迫於蔡屋室庳陋主居無正堂處東攴屋恬然六年許軍强雄且撑劇冦自始多用武臣治各出已部曲家人疵政肔代爾反集作弛法習為循常有司用此集無此字比邊障逺地擲置不問民亦甘心尚書再治之老民相率两走闕下遮丞相馬叩頭乞畱請樹生祠及詔追去攀縁攜扶哭於道路尚書治外主治内尚書所至必稱崱崱士力切為名公偉人主實有内助焉穆宗以太集無太字皇太后故集作敬主尤為親信俯首益卑車服侍使愈自貶抑覲謁温凊外口不言他事訖穆宗朝人不以親貴稱當貞元時德宗行姑息之政王武俊王士真張孝忠子聨為國壻憲宗初寵于頔來朝以其子配以長女皆挾恩佩勢聚少俠狗馬為事日遮集無此字截馳道縱擊平人豪取民物官不敢問戚里相尚不以為窮四字集作不以為窮弱自主降于尚書壁絶外之初怒中笑後皆敬畏累聖亦指示主德以誡警之至于今日集作以主尚書顯重於中外戚里亦皆自檢斂隨長短為善於是舊俗滅不復有尚書自許奉急追詔主有疾小愈强不肯留曰去朝興敬集作慶是宫縱死於道吾無恨以開成二年十一月某日薨於汝州長橋驛亭集作享年若干上廢朝三日某年十二月某日主喪至京師比及葬兩宫弔問相繼於道開成三年某月日上御正殿詔丞相嗣復攝中書令正衙宣册諡曰莊淑大長公主某年月日祔葬于萬平縣洪源鄉少陵原尚書先塋禮也生男二人長曰輔九年十歲次曰楊十始二歲女二人某於尚書為從父弟得以實銘銘曰章武皇帝唐中興主刑于正妃教及嫡女婉婉帝子下嫁時賢影逐響答隨順纏綿杜氏大族枝蔓蟬聮上有舅姑髙堂儼然螭綬龜章玉佩金軒養色悦意侍後承前人不我貴敬不集作我敬我䖍始終盡禮大小周旋餘二十年誰興間言貴不召驕富不期侈具集作是此四者倐相首尾自古名士或泥於此孰謂帝子超脱擺棄婦職是勤夫言是指池荒館陊屏外不履淑德柔風天下傾耳宜乎壽考婦女婚子不錫全祉孰提神紀幽石有誌顯筆有史流于千祀文苑英華巻九百六十九
