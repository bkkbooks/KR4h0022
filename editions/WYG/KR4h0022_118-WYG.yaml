body:
  text: 文苑英華巻一百十八宋李昉等編寳四金賦二首金精百鍊賦一首披沙揀金賦四首金受礪賦一首河上姹女賦一首黄冶賦一首金賦夫五氣降於五行五星均於五徳助天地而為政體隂陽之有則犧圖八卦之文所以化成禹錫九疇之道由其平直分宗别序正位辨方春青夏赤羽黒宫黄育龜麟之體貌煥鸞鳳之文章物庶幾而盡善然後從革而能剛若夫寅亮隂德發輝秋令帝少昊而為主神蓐収而在正生水剋木非無父母之儀承土㐲火亦有謙卑之性爾其於乾道則使候入青女光垂白陸寒隂作而霜露濃殺氣横而風雨肅此金之節也爾其於坤道則使麥苗含秀一疑二粒同稃既收成於萬物復摇落於千株此又金之功也爾其於王事則使出軍行師擁旄仗鉞所以征叛逆而敷明伐此又金之威也爾其於人事則使農夫業就商旅貿遷儲蓄邦家之重錢刀布泉之先此又金之利也彼觀其山川含育之秘採掇工取之程鎔鑄陶鈞之術雕鐫磨礪之形非一途而共貫實萬象而殊名用之為鼎天下之至寳用之為劔天下之至精用之為量天下之至信用之為鏡天下之至明亦有金河金瀬金潭金穴金谷金陵金城金埒紫山重夷吾之對光石訝胡人之别渤澥水之仙宫西北荒之神闕魚龍雀鳥之玩鐘皷樓臺之列皆具美於明圖豈能窮於縷説余復何為長貧若斯掦雄之産非廣季布之諾無移嫌衆口之銷鑠嘉同心之見知命舛時泰將通復否徒効拙於凌霄實勞工於畫水無體物之竒筞失縁情之妙㫖太冲三都分從陸雲之笑孟堅兩京甘受張衡之鄙第二以至寳堅剛無所争也為韻韋岫山有良金世名重寳當用事於素節實稟靈於𤣥造由是司嵗之士叙秋之道其神曰蓐收其帝曰少昊相與搜瑰異發鏗鏘取我於麗水淬我以輕霜用爾之寒可以革溽暑之候用爾之勁可以摧烈火之剛遂重其珍遂宣其利披沙之狀咸出從革之形悉至含宇宙則範之以景名壓寰區則鑄之以神器其難得也黍累不棄分銖是争約人以懸市遺子以滿籯國用築臺之禮賦掦擲地之聲或三緘而永保或一諾而必行斷以同心斯為盡善鑠於衆口喻彼相傾是以王者之時令修彛倫序泥封是用職貢有所垂衣守滿堂之誡一作誠命相興作礪之語則金為世出用示天與乃懷貪以恣攫重諾而不捐鑽山䂮石斷朴攻堅大有鎔範小有雕鐫玩物既奢其器用窮兵又縦於戈鋋則地將愛矣君胡得焉又尅木之意深輔火之功寡傷水之閲世疾土之處下以勁挺司一方以滅裂視四者曰吾常卓爾子不知也况有百鍊之秀三品之殊藏之則潤屋可恃鍛之則切玉如無子豈能馳善價入巨冶隨我躍於洪鑪金精百鍊賦以良冶所求在於精鍊為韻周渭有攻金之工兮求百鍊之精鋼渉越水之表登楚山之陽目渺渺而有待心摇摇而不遑工曰礦斯得鍊斯力夫何器之不良乃召風胡邀歐冶計日淹速商功衆寡我心天縦我力神假鼔焱槖以喧豗轟雲鎚而上下金火惟序載離寒暑光融融而焰焰疑雷擊以星流聲有往而有還若唱予而和汝始於一而終於百鍊既存而鍛乃舉成利器兮為國珍自私家兮獻公所于是礪以越砥淬于江流燦龜文於夐絶射龍藻於清浮將四海而是震豈千金而可求當赤帝之所提常之疑逐鹿為庖丁之所得未見全牛金從鍊兮白受采知成形之所在士中選兮史亦書念逢時之不居故鍊金者非鎚爐而勿用選士者非考覈而何於且金生土土効禎鍊於代代作程豈上決則凜然霜鍔下麾而炯若水精為邦如之何莫大於通變為金如之何必資於鍜鍊雖蹈刄以垂範諒申威而去戰俟袁宏之片言符薛燭之一見披沙揀金賦以求寳之道同乎選才為韻李程貞元十二年宏詞物有感者其沙之同流韜至精之未吐俟明鑒以來求披隤沲文選江賦碧沙遺施五臣作隤沲歴汀州説文水中可居曰州居髙土故曰九州引詩在河之州加水陋矣期徃而有覿必専而是謀若不克見何逺不討大無間於洪流細寧忽於潢潦必因目擊信夫川則効珍不假鏡臨所謂地不藏寳於戲未分美惡必左妍媸當有期於慎簡幸無見於忽遺經營乎永昌之日徘徊乎麗水之湄初若決浮雲摇星光之的的又似剖羣蚌貫珠彩之纍纍充一鎰而有待貫三品而方期一作來左傳于思于思棄甲復來來力知切出輕漣而沈潛自照别麗景而光炅生姿洎乎沙之汰之此韻未見之字官韻雖有沙之汰之而不入韻不叶似與八十三巻歐陽詹春盤賦日惟上春之句同當考既堅既好斷之則同心斯得用之則従革是寳必資作礪自同選衆以求仁曽是滿籯未若觀學而知道伊昔識真者寡罕遇良工遺我於一撮之内混我於衆流之中純固一作周空知夫自守精英不得而外融與砂磧而雜居則如雲積處礦璞而自異詎可雷同寳既有矣况於人乎夫辨之掌握尚辱在泥塗則將排碧沙涉清淺雖有懷於揀金庶不遺於片善未見選字官韻今則藻鑒既朗庸將自媒興公雅符於通論士衡猶患於多才不然者則懷寳而退矣曷為體物而來哉第二同前韻柳宗元沙之為物兮眎汚若浮金之為物一作寳兮恥居下流沉其質兮五材或闕耀其徳而一作兮六府孔修然則抱成器之珍必將有待當慎擇之日則又何求配珪璋而取貴豈泥滓而有一作為儔披而擇之斯焉見寳盪浸淫而顧盼指炫炅而探討動而愈出將去幽以即明湼而不緇實既堅而且好潛雖伏矣獲則取之翻渾渾一作混混之濁質見耀耀一作熠熠之殊姿乆暗處固一作未彰亦冀將君是望先迷後得孰謂棄余如遺其隠也則雜昏昏淪浩浩晦英精一作姿兮自寳一作保和光同塵兮合於至道其遇也則散奕奕動融融煥美質乎其中明道若昧兮契彼𤣥同儻或俯二字一作俯捨而不棄諒致美於一作于無窮欲葢而彰故一作將炯爾而見素不索何獲遂昭然而發䝉觀其振彼一作㧞汙塗積以錙銖研一作碎清暉一作光而競出暉一作耀真質而將一作待殊錐處嚢而纎光乍比劍拭土而異彩相符用之則行斯為美矣求而必得不亦悦乎豈徒媚旭日以晶熒帯長川之清淺皎如珠吐類一作疑剖蚌而乍分粲兮一作若星繁似流雲之初巻是以周詩作二字一作徳思比而祈招即三字一作岐昌即詠陸文可侔而昭明是選若然者可以議披沙之所託明揀金之所裁良工何逺善價員來拂以増光寧謝滿籯之學汰之逾朗詎憑擲地之才客有希採掇于求寳之際庻斯文之在哉凡一作皆集本第三同前韻席䕫寳之至者金實難儔何混質於㣲細每隨沙以沈浮不耀其光誠觀而莫辨退藏於宻故披而可求𤣥鑒在人至人斯一作光保察晶熒於磧礫視隠映於潭島澹以冥搜静而窮討飜混濁酌澄浩得之為利雖云貨以藩身揀必於一作在精終是不貪為寳道以之至行無越思研精既辨取捨奚疑浩浩同流詎謂衆難分矣専専匪惑盡可汰而出之信多雜而不混何在小而見遺故得方以選才比諸振藻符至人和光之徳明君子知㣲之道豈止匪固于窮思濫于中懷至寳竊𤣥功披隤沲而不厭積貨産以未豐則情惟盗比而業與商同也徒觀夫敷一作毓彩汙塗湼而不渝外濁如汨中明自殊養正以䝉潛雖伏矣從人之欲道豈逺乎彼荆山採玉河上求珠刖雙足而未偶冒萬死而乎疑作争趨匪曰能智是為至愚曷若隠而自彰㣲而可辨常保質於堅重匪淪精而展轉以是為徳則和而不同以是求賢則舉不失選况今至珍必見朗鑒恒開細無不察大無不該在沉潛而未耀求揀錬而斯來亦何必披鄱陽之沙方見為寳覽士衡之賦然後稱才第四同前韻張仲方披流沙之至寳惟良金而可求諒稟質以相混信韜光而莫儔處其汙而含潔潛其剛以産柔將陶甄以入用在晶熒而必收爾乃發彼衆彩瑩然祕寳砂礫之下自守其堅剛茫昧之中我得其精好逺邇必取纎㣲罔遺泛隤沲以吐色洗䝉垢以呈姿匪塵泥之足亂豈玉石以生疑既乍明而乍滅在沙之而汰之同至人受汚以不吝等君子藏光以俟時且流形厚地晦質𤣥造厥貢取象於不貪旁求必歸於有道然後百寳惟斥三品惟崇美價初炫㣲明内融每一作晦沉潛而不雜秉熠爚以潛通將耀質而有異豈藏山之與同鑒裁無疲期必分於醜好拂拭相借固不假於磨礱俾精鍊以作範庶從革以成功亦何異夫才為物表道出常途標百行以卓爾摛繁丈而煥乎每和光而不昧居衆流而有殊善惡猶兹必分真偽於焉可辨雖知己而見録本良工而妙選將永隔於下流且不遺於片善故明因特逹道靡邅廽乍披之而可玩亦求之而乃來同無脛而斯感豈衆口以為猜今振藻以作賦而愧乎擲地之才金受礪賦以聖無全功必資佐輔為韻李程惟礪也有克剛之美惟金也有利用之功利乆斯尅猶或失其銛鋭剛固不磷是用假於磨礱不然何以興喻殷鑒譬后之聖金將有缺必假石以磨穎耀芒后若有遺必資匠而礪節砥行使貌疑鋒無白圭之玷令徳有黄軒之盛取譬於攻金之工方期於政罔不正且夫利器乆翳銛鋒不全參差永疑作氷缺奄冉苔聨價減千金之直文滅七星之躔非夫堅石之鍛乃礪乃巧匠之藏焉修焉又安得而昭宣若乃君上初臨徳聲未溥令不盡一名不減疑作咸五筮㣲子牙之兆衮闕仲山之補非夫忠臣之扶危持顛英俊之左弼右輔又安得而稽古乃知君與臣兮相符金與礪兮相須離之而道斯逺全之而徳不孤故為金也光乎九牧為君也配彼三無是以工必利其器君先擇其佐佐明則有融器鋭則不挫光芒乎擬之必斷恬澹乎立於無過亦何必俾鈍質不可礪俟昏徳以將衰如鈷刀罔能斂其鍔如朽索無或紐其維然後乃知利重乎磨損之乂損為貴君冝乎諫善人不善之資况今聖上欽明英髦迭出恭黙思道曷髙宗之可侔輔弼納忠豈傅巖之攸匹冝乎哉超義疑作義而越䕫勗而自必河上姹女賦以隂陽變化靈而最神為韻獨孤授坤載靈物母之者金稟清英乎元化耀方色乎少隂將善利以𢎞博豈難得而迥深河之水配融衍以表性女之質齊婉潔而為心無脛而將無翼而翔静波空而鏡朗動星駭而珠光體之則剛柔可易形之則大小無方爛其春氷莫能解之以明庶東方風也炯爾秋露孰能晞之以朝陽以登真者尚其變我色則為黄為丹彼神則九鍊九轉驗此金訣求諸大化理契斯伏可得而長存致乖而飛莫知其所舍乃有志翹鴻寳心繫紫庭閟響岑寂棲真窅冥赫珠光之炎上陶素質之隂靈苟還丹可以變其骨非有力所能制其形飄然將駕夫雲螭渺然或觴於瑶池望三山以増逝顧九野而興悲後天之術兮曽莫勤斯朝菌之秀兮不其殆而夫以見索隠以明推晦䆒精理其必然玩常情以多昧伊姹女之為美諒山經之所最且其受制黄牙牙芽通用可効於物寜若虚聞絳雪莫耀於代是將渉天潢者我道其津首雲路者我清其塵方乘化以適道孰知夫所以能神黄冶賦并序李徳裕蜀道有青城峨嵋山皆隠淪所託辛亥嵗有以鑄金術千余者竊歎劉向累世懿徳為漢儒宗其所述作根於聖道猶愛信鴻寳幾嬰時戮况流俗之士能無惑於此乎因作賦以正之漢武帝遭世界承平百蠻以寧自謂德盛堯禹功髙湯武聞昇龍于鼎湖乃甘心于虛佇有方士李少君譎詭否誕乘邪進取盛稱化丹砂為黄金可以登青霄而輕舉時董大夫侍側帝曰子嘗知其術乎仲舒進曰臣唯聞天地變化聖人鎔範方士之言以為紿誕一作臣以為諂至如圓方為鑪造化為冶鼓風為槖熾陽為火𤣥黄之氣絪緼和粹禀而生者為仁為智是以生寳實蕃終古不匱天地之鎔範二字一作鼓鑄也若一作如是及夫堯舜之化大道為鑪中和為冶聲教為槖文明為火以法天為造以積一作得賢為寳是以得其鴻名後天難老至於仲尼為佐二字一作無佐大莫能致猶鑄顔與冉抵於極摯一作智聖人之鎔範一作鑄也取類二字一作如是若乃不務逺徳營信袐籙祈年永久以絶嗜欲斯則不由於正道無益於景福帝曰善乃罷方士而去之故得漢道隆盛令名不虧凡一作皆集本文苑英華巻一百十八
