body:
  text: 文苑英華巻八百三宋李昉等編􅈦壁記七幕職下浙西觀察判官􅈦壁記一首常州軍士判官􅈦壁記一首徐泗濠三州節度掌書記􅈦壁記一首州上佐江州司馬􅈦壁記一首州官上錄事汴州糾曹􅈦壁記一首亳州糾曹􅈦壁記一首江州錄事㕘軍􅈦壁記一首湖州錄事㕘軍􅈦壁記一首幕職下浙西觀察判官􅈦壁記李觀觀聞國朝置觀察判官故事於今之老成人則曰邇乎哉乃本而言之厥自兵興上憂天下列郡無綱紀文章是用命忠臣登車為觀察使而鎮撫其民人今集作其來亦三紀於茲古者所謂山集作出是連城守今則大者或十數集作數十城或七八城小者或四五城觀其所以察其所由使亂不能集作得長使理不得渝集作逾猶川之有防猶户之有樞其繫厚矣其臨髙矣其下賔佐實有常任其大者曰觀察判官一員集無此字人謀而集作以濟羙佐而集作以成能必求賢者禮而居之無則闕如不茍其人允集作乆矣乎浙右之疆包流山川控帯六州天下之盛府也國之盈虗於是乎在太原王公亷察之七年署監察御史李公士舉為觀察判官公從事浙右十有餘年能事備乎㳺童光烈灼乎簡書始從韓公多辨疑獄多釋寃囚疑似得昭糾紛得寧四方翕然籍甚於公後從王公盛徳自新六州人殷姦宄易俗集作容民不醇集作淳良吏不清亷集作亷清無日無之公乗軺車日徃月還剖斷善惡明白可觀六州之士集作人為頌作歌天下名賢罕不咨嗟九年冬蘓州刺史有丁憂去官連城命公來撫呉人徳之盖務五字集作徳羙矜人化變憸人如春之和呉人樂康嗟乎夫有其任無其事十有八九豈虗耳哉非其任有其事自公作故四字集作如公之作者百無一二焉議者以為視公之為佐可謂忠於佐矣視公之斷獄可謂敏於獄矣視公之理人可謂逹於理矣諒哉有以頌連城之表賢有以見呉人之多幸有以見李公之攸宜矣集作哉從姪觀拜命而書愧公之差集作愧為公羞九年十一月十四日記常州軍事判官㕔壁記常州列郡也天下有緊我一作望居其一焉軍事亟務也天下有三我備其屬焉於是求厥人任厥事觀厥能不亦難乎則汝南袁徳師今在選焉夫三軍稱帥萬夫之望誠不若也其於輯睦亦何貳焉夫大臣開幕多士委質誠不若也其於裨補亦何貳焉袁生恢恢然晳晳然寛而有紀曠而無隣行飾以貞言飾以温始韋公以給事匪躬之故岀釐是邦生方尉於義興褎然見嘉乃殊常寮軍事之機議之堂上軍事之宜開之府中誠舊制也韋公答其人以禮盛其居以華揚一作餙其智以文羙焉哉韋公遇生以善生報韋公以誠某嘗聞生南陽公之孫也夫維嵩之於天下乃非常之山也黄河之於地中非常之川也南陽之於時非常之人也嵩以喬天盖之河以流地載之以南陽大忠子孫嗣之六年冬皇帝郊昊天理百神修廢繼絶求舊惟新生以尋南陽之孫一命兹官九年冬復命襲爵南陽公某以為古人曰賞延於世又曰善人雖十世又將社之其是之謂也是年十一月某赴京師自蘓州至常州㑹袁生引㕔前軒如翬斯飛植竹新欄如鳯斯食乃白府君留為記韋公驩然不見逆且自天下稱兵三四十年間擁旄曰使持節曰州使曰節度曰團練有副使判官大厯中宰臣常公以為費不能去其大而去其細乃罷團練今之軍判官猶是也命其記書其事實始於今請以生之官氏冠乎將來非以媚生也願以光乎非常之人之後也記之年月在乎記中徐泗濠三州節度掌書記㕔壁記韓愈書記之任亦難矣元戎整文粹作揔齊三軍之事集作士統理所部之甿以鎮守文粹作定邦國贊天子施教化而又外與賔客四隣交其朝覲聘問慰薦祭祀祈蜀本作所祝之文與所部之政下三軍之號令升黜凡文辭之事皆岀書記非閎辯通敏兼人之材莫宜居之然皆元戎自辟然後命於天子茍其帥之不文則其所辟或不當亦其理宜也南陽公自御史大夫濠文粹作豪壽廬三州觀察使受節移鎮徐州歴十一文粹作二年而掌書記者凡三人其一集本文粹有人字曰高陽許孟容入仕於王朝今為尚書禮部郎中其一二本有人字曰京兆杜兼今為尚書禮部員外郎觀察判官其一二本有人字曰隴西李慱自前鄉貢進士授秘書省校書郎今方為之南陽公文章稱天下其所辟實所謂閎辯通敏兼人之才者也後之人茍未知南陽公之文章吾請觀於三君子茍未知三君子之文章吾請觀於南陽公可知矣蔚乎其相章二本作扶炳乎其相輝志同而氣合魚川泳文粹作伏而鳥雲飛也愈樂是賔主之相得也故請刻石以記二本作紀之而陷置於壁間俾來者得以覽觀焉州上佐江州司馬㕔記白居易自武徳以集本文粹作已來庶官以便宜制事大攝小重侵輕郡守之職摠於諸侯帥郡佐之職移於部從事故自五大都督府至於上中下郡司馬之事盡去唯員與俸在凡内外文武官左遷右移者遞二本作弟居之凡執役集作伎事上與給事於省寺軍府者遥署之凡仕乆資高耄昏懦二本作軟弱不任事而時不忍棄者實蒞之蒞之者進不課其能退不殿其不能才不才一也若有人畜器貯用急於兼濟者居之雖一日不樂若有人飬志忘名安於獨善者處之雖終身無悶官不官繫乎時也適不適在乎人也江州左匡廬右江湖土高氣清富有佳境刺史守土臣不逺觀逰羣吏執事官不敢自暇逸惟司馬綽綽可集有以字從容於山水詩酒間由是郡南樓山北樓水湓亭百花亭風篁石巖瀑布廬宫源潭洞東西二林寺泉石松雪司馬盡有之矣茍有志於吏隠者捨此官何求焉按唐六二本無此字典上州司馬秩五品嵗廪數百石月俸七六萬官足以亢文粹作庇身食足以給家州民康非司馬功郡政壊非司馬罪無言責無事憂噫為國謀則尸素之尤蠧者為身謀則禄仕之優稔者予佐是郡行四年矣其心休休如一日二日何哉識時知命而已又安知後之司馬不有與吾同志者乎因書所得以告來者時元和十三年七月八日文粹有題字記州官上汴州糾曹㕔壁記劉寛夫郡府中一作之有録事參軍猶文昌之有左右轄南臺之有大夫中丞也糾正邪匿提條舉目俾六聮承式屬邑知方致上於坐嘯舉綱維之未振俾側者不敢挾其側姦者不敢萌其姦法令修明典章不紊此其任也大梁當天下之要㧾舟車之繁控河朔之咽喉通淮湖之運漕丞相治所鵷鷺成列池闢土沃兵多甲堅人尚矜豪氣率驕蹇有梁園兎苑之遺事當四㑹五逹之通莊雜燕趙悲歌之人邇呉楚剽輕之俗為吏之道不論他邦滔滔來徃斷斷阡陌任剛毅則失於突犯守謙卑則病於委隨剛則害身随則弛法貞元以來戎帥自擅威令已岀無後疑作復國章隄防不完徽墨蕩失調補斯任者但疊跡歛手以脫禍為心何有意於勾稽而敢思其職業者哉大和二年瑯邪郡葛公元方由天長令而蒞焉至則以為當今聖上務治丞相鎮静以至肅清羣下以至公奉朝廷凡所建啓唯道是適茍踵弊於斯日不分畫於兹辰則縁姦積蠧無時而去於是端誠守職以正束邪以儉慎律同僚以直方吹屬邑綽綽自立職分随來故得上下叶和逺近修整法有刋定之制軍無侵漁之患人存政舉其在於斯㳺刄恢恢肯綮無滯主畫諾而克勝其任司凖繩而無忝厥官從容其間進退不茍其惟葛君乎元和中憲宗皇帝勵進理道注意法律特設科以招士欲問明廷一作庭後詔有司覈其妍否先君僕射公時為司績外郎實専斯寄絶因縁之舉以公共為先於數十人中得君充詔故君之行實敢不詳知夫公署有記其來自逺燦名氏於屋壁示成敗於將來俾善惡克彰韋絃斯在此盖春秋之㫖也豈可闕哉葛君以余從事斯文叨官倚相見託論撰無愧直書大和三年記亳州糾曹㕔壁記陳章甫漢官儀郡主簿秩四百石綱紀一郡糾整不法岳牧無道蒼生有瘼則天子責我汙吏侵人姦聲載路則使臣責我吏不述職曹有留事則二千石責我役奪人時官有虐典則黎元怨我由此觀之録事參軍待責之府也所以天官署吏獨難其人觸邪外臺禮隔宜矣由斯賞㧞多至重官譙亳都上應星火禹貢屬徐州分野隴西李公負王佐之才所以顧盻㕔壁歎曰官猶四序功成者去屋壁無紀一作記吾將安仰始編舊一作書政令余叙之天寳九載七月十日記江州録事參軍㕔壁記符載録事參軍之於郡縣紀綱也車轄也綱弛則目踈轄抗則載輸政之成敗亦繇是也自漢魏已還歴江左郡有督郵主簿後魏北齊後周隋文州有録事參軍煬帝時罷州置郡有東西曹掾主簿國朝省椽主簿復為録事參軍其於勾稽失糾􅄽謬省抄自守符印一州之能否六曹之榮悴必繫乎其人也其人强其一作必務舉其人困其務削循名考實豈容易哉况潯陽古郡也地方千里江涵九𣲖緡錢粟帛動盈萬數加以四方士庶且多一作旦夕環至駕車乗舟疊轂聮穡威猛則騰口以飛訕阿懦則腹非而生誚重輕之得尤難其人隴西李尹少昌切玉刜鍾之利也恪勤强毅當官而行其於公家也不掩善以蔽才不隠過而貸非不苛細以作煩不濶略而破方剛柔踈緻雅得其度繇是官府有程凖案牘無留閒逰我宇下清風凛然是時郡守李公以鉅鹿超異之政來領此郡内用六條外理百姓使人人門户興行孝睦井賦均一然後從容郡閤時與羽衣縫掖講黄老言其餘枝葉節目委於有司而不領故李君得以息心奉法上事牧守下督寮吏暢於中發於外人無間言也夫士無貴賤尊有道也位無大小觀有政也茍素飱碌碌俾躬處厚禄雖多亦奚以為是宜書録事之羙於壁間聳善而儆不肖盖春秋之㣲㫖矣先是此庭此宇荒凉䙝黷端士不履今前後有脩竹左右有廊廡穆然清邃皆自我焉聊紀述之序遂以李君為首亦所以重績而新㕔也湖州録事參軍新㕔記楊䕫度材者定曲直於繩較物者决輕重於衡盖繩無欺衡無私故人所取鏡也今使五邑之吏枉正無所逃千里之情毫釐無所差束其内外必蹈乎規矩戢諸桀黠知攝一作懾於刑憲斯郡主簿有繩衡之無私為得其任矣高陽許鎕以前秋曹掾端於讞獄詔寵之遷陟斯在一作任自兵興十五載事隳宿貫守國之法制禀朝之政令者由關而東郡亦無㡬唯呉興遵國經體舊章上下謙敬確然不渝然此數萬衆兵之所給固繫於土賦俾其役不重斂不煩吏不苛民不疲萬目自正者全在提其綱乎君制事以義制心以禮節不為勢易志不為强奪静以督其下故其下肅恪以蒞其事故其事簡由是衆吏畏而庶務集僅致干訟獄而刑置矣廣明中妖巢掲竿以犯帝閽遂俾翠華有西南之狩梁鄭周秦之甲皆閤手無所敵凡五改火鑾駕外駐甲辰年今太守以彭門之師擒巢於萊蕪提其顱薦於成都明年春玉輦還闕遂以功牧於呉興帝念殊庸位不配徳詔加防禦以高其位始開幕延賔増吏拓制度是取督郵之所署為防禦使院然後合功廪户三掾之㕔移居視印繩堕於此夫簷楹廹則耳目泥居處蕪則思慮昬今兹視於前則淺而露覘於後則湫而陋得無泥與昏乎而又藂蓧雜卉䕃翳堦序列衙者亂其次授事者䘮其局交有駢足䙝禮虧敬君乃命梓人擇􅅛材敝前楹豁南榮砥中唐嚴層扄設外屏以肅其入一作人也構環廊以莊其位也撤舊増新擁隘咸革列目之物罔不完羙覩其顯敞則夏奪其暑居其奥宻則冬却其寒地斯清境斯勝足以豁聽視爽精神導中和之性増冲澹之趣矣君子是以知藴智者於事敏負才者應用周如水於器方員無所滯如絲於色𤣥黄無不入如是則化圯為完易卑為高盖岀於餘力乎况君行已之道及物之利其察也鑑焉臧否無匿其信也潮焉朝夕不忒俗茹其正吏飫其直一作道叔向所謂明察之官忠信之長者於此而見矣斤塗畢役君以䕫業於文且謂記年表事春秋之􅇮志也兹㕔之立既始於我而載祀莫紀無乃取議於將來乎其為我書之無虗美無加飾惟實是編足以貽後遂謹而日之請題於東墉以記㕔之始文苑英華巻八百三
