body:
  text: 文苑英華巻四百十宋李昉等編郡牧一諸州刺史授成善威等刺史制李嶠鸞臺壯武將軍行定王府典親亊典軍上柱國成善威効績藩邸宣功戎陣新除中大夫守甘州刺史上柱國卜處冲久叅武衞夙奉文貔一作􅔊張掖遐陬老綿故俗地連荒憬人藉撫循寄以皇華一作厚城佇觀美績善威可使持節甘州諸軍事守甘州刺史處冲可使持節龍州諸軍事守龍州刺史散官勲如故仍並馳驛赴任主者施行授坊州刺史豆盧志静等官制鸞臺太中大夫坊州刺史上輕車都尉郢城郡開國公豆盧志静等登朝受服咸積歲年蒞職當官並有聲稱與我共理實存咨岳代天無曠受任得人分命良材佇觀羙績可依前件主者施行授源復等諸州刺史制孫逖門下太中大夫使持節徐州諸軍事守徐州刺史上柱國源復等雅才清識踐行立名政表於良康一作惟良歌聞於是頼或歲年滋久必在於更遷或風俗異宜各期於適用俾膺俞徃以副僉諧可依前件授韓朝宗等諸州刺史制門下朝請大夫使持節都督洪州諸軍事守洪州刺史上柱國長山縣開國伯韓朝宗等開濟宏才𢎞深雅量或累升清要常展用於高資或頻膺刺舉久馳名於列郡振其淹滯任以器能宜遞遷於逺近俾更踐於中外可依前件授元彦冲等諸州刺史制門下理人之吏深誡於數易度才而遷必憑於久次朝議大夫使持節都督越州諸軍事守越州刺史元彦冲等幹能自達政術有聞化行一郡並逾四稔克愼終始不􅄽名實宜有遞遷更膺分命書不云乎三載考績黜陟幽明舊章則然古制斯在今所進轉皆為限約並須畫一無相奪倫庶懲欲速之人將致有常之化凡厥共理宜悉其心可授崔翹等諸州刺史制門下中散大夫前使持節滑州諸軍事守滑州刺史上柱國崔翹等詞學為門貞廉作吏並久從官序能効公心禮及既祥皆聞於俯就才有所適宜在於分官可依前件授宋樽等諸州刺史制門下朝議大夫前使持節仙州諸軍事守仙州刺史上柱國宋樽等或郡國良吏或朝廷吉人咸勵厥躬克勤于位循名考行揆務量能宜受命於分官俾呈才於庻績可依前件授張敬輿等諸州刺史制門下太中大夫使持節鄭州諸軍事守鄭州刺史上柱國張敬輿等克脩名操久踐衣冠咸適用於當時各効能於列郡風謡具舉歳序皆深曽是移官用叶平分之義或因去職宜承並命之恩可依前件授翟璋等諸州刺史制門下中散大夫守將作少匠上柱國翟璋等名跡脩謹藝能該博或累升清秩或久踐通班三年有成各呈才於外郡庶官無曠咸勵節於中朝重寄所難分憂是屬宜膺稍遷之舉用叶汝諧之命可依前件授秦昌舜等諸州刺史制勑中散大夫守常山郡太守秦昌舜等器能足用政術多方頃在列藩皆聞致理或居官已久或去職當遷長史缺官中朝慎擇宜膺並命更委親人可依前件授劉體㣲等諸州刺史制門下太中大夫前使持節鄭州諸軍亊守鄭州刺史上柱國博陽縣開國男劉體㣲等器能具舉言行兼資嘗踐郎官頻更吏職令名無替成績有聞宜受任於藩邸俾榮遷於郡國可依前件授裴煒等諸州刺史制門下中大夫前守安定郡太守裴煒等位分中外名著朝廷或課績多年或招輯成政禮云終服官以授人舊章斯在新命宜及俾膺藩岳之任更展循良之稱可依前件授魏哲等諸州刺史制門下前歙州刺史魏哲等以能入仕以疾廢官頃曽罷歸亦云淹久勿藥有喜既善攝生之術度才而用宜承舉滯之恩可依前件授李昇朝等諸州刺史制門下亳州刺史李昇朝等並膺時選俾踐官資才器則殊行能皆著或居䘮之禮俯就於外除或同氣之親有妨於聮事或近停郡職或久滯王門宜各稍遷俾從分命可依前件授季良等諸州刺史制門下守太子中允季良等早推言行兼有幹能從官必聞服勤斯久分憂是屬慎擇為難宜副恤人之心俾諧良吏之選可依前件授韓察等明通沔三州刺史制元稹勑朕子育兆人懔乎懼一物之不至將我德澤流布於集作于逺邇者其惟良二千石乎朝議郎前守京兆府富平縣今賜緋魚袋韓察等久於吏職皆著能名或常奉詔條風聲尚在或歴居郊甸惠養有方命汝臨人勿違其俗夫明近於海懦則姦生通邇於巴急則吏擾沔當津㑹滯則人怨集作怨起推是三者引而伸之然後可以分吾二字集作憂人之憂矣爾其勉之可依前件授蕭睦鳯州周載渝州刺史制勑前劒南三川榷鹽判官殿中侍御史内供奉蕭睦前知鹽鐵轉運山南東道院事殿中侍御史周載等田文學古施於有政三驗所至莫匪良能河池近藩南平東險綏戎阜俗必藉長才副我虗求一作懐牧兹凋廢事時農勸用節人安三年有成惟乃之效睦可鳯州刺史載可渝州刺史授元輿集作藇下同等杭濠歙泗疑作興諸州刺史制前人勑朝散大夫守饒州刺史元輿等自天子至于侯甸男邦小大之勢集作勞非不同子育黎元其揆一也是以郎官出宰百里牧守入為三公此所以前代稱理古也近俗偷末倒置是非省寺以地望自高郡縣以勢卑自劣盤牙不觧稂莠不除比比有之患皆由此起今餘杭鍾離新安順政乃興州三有財賦集作用一隣戎狄將有所授每難其人以輿之理謀甄明以𢎞度之奏議詳允以學亮之學古從政以達集作公逵之守道立身僉命為邦庶可以勝殘集作庶可勝殘而去殺矣各奉詔條用慰㷀獨可依前件授楊濳洋州刺史李繁遂州刺史史備濠州刺史等制白居易勑朝散大夫守尚書金部郎中上柱國楊濳温厚静專有端士之操朝議大夫前使持節吉州諸軍事守吉州刺史上柱國襲鄴縣開國侯李繁精強博敏有才子之稱將仕郎前使持節光州諸軍事守光州刺史雲騎尉史備變通健决有能集作良吏之用而皆集作能本於文學輔以政事為郎見其行為郡聞其聲夫洋束梁之險遂居蜀之腴濠搤淮之要三者皆名郡也今吾提三郡而委之三吏得不思勤儉教導勞來安輯膏雨吾土而襦袴吾人者乎濳可使持節洋州諸軍事守洋州刺史散官勲如故繁可使持節都督遂州諸軍事守遂州刺史散官勲封如故備可使持節濠州諸軍亊守濠州刺史充本州團練渦口西城等使散官勲如故授周愿衡州刺史尉遲銳漢州刺史薛鯤河中府少尹等制勑前復州刺史周愿等夫勞者之思休息病者之思救療人之本情也今兵戈甫定物力未豐如聞湘衡巴漢之間人猶疲困宜擇良二千石俾休息而救療之而愿銳鯤等前以符竹分領三郡皆有善政達于朝廷舉課考能無愧是選息勞救病其有望於汝乎河中吾之股肱郡也貳尹職而佐府事者亦在得人命鯤處之無荒厥職可依前件授韋彪王府長史楊歸厚唐州刺史劉旻雅州刺史等制勑韋彪等善官人者先考其能然後授以事任使輪轅鑿柄各適其用則郡職庻政得以交脩今以彪官久年髙勌於為政俾從優逸入補王宫以歸厚文行器能辱在巴峽勵精為理績茂課高區區方集作萬州豈盡所用宜移大郡稍展其集作竒才以旻早著戎功通詳吏事西南物土㒺不周知習俗從宜冝守嚴道分命以職各用所長庻乎咸脩乃官同底于理可依前件授鄭公逵王府長史李循興州刺史制前人勑鄭公逵等或以行稱或因集作以才舉進脩所致班秩不卑改命序遷各適其用且乗朱輪於國集作郡邸曵長裾於王門士夫之子名官至斯亦不為不遇也立朝案部各敬爾官可依前件授李諒泗州刺史兼團練使當道兵馬留後兼侍御史賜紫金魚袋張愉岳州刺史制前人勑扼淮壓湖之列城曰泗與岳州車㑹焉軍戎屯焉是二郡守不易為政先是守領者多㑹有故歲時罷去長吏數易人必重困宜擇良二千石救而養之以諒自登城長訖尚書郎中間又再為州牧三宰劇縣皆苦心䘏隱煦嫗及物操刃決滯砉騞有聲而愉亦學古入仕甚自脩餙河西有政次於諒焉故命愉守岳命諒守泗仍以戎職留事憲簡章綬一加於諒諒其聽之哉異日吾將以重官劇職處爾爾安得不副吾所急用爾所長更宜以難理之郡自試耳可依前件授灃州刺史李肇中散大夫郢州刺史王鎰朗州刺史温造竝朝散大夫等制前人勑朝請大夫使持節灃州諸軍事守灃州刺史上柱國賜紫金魚袋李肇等乃者李景儉使酒獲戾而肇等與之㑹合飲失於檢慎宜有所懲由是左遷分為郡守今首坐者既復班列縁累者亦當徴還但以長吏數易為集作其弊頗甚况聞三郡皆有政能人方便安不宜遷換故吾以采章階級並命而就加之盖漢制進爵秩降璽書慰勞良二千石之㫖也爾當是命得不勉哉可依前件授李諒壽州刺史薛公幹泗州刺史制前人勑壽州刺史李諒等詩云愷悌君子人之父母朕三復斯言徃徃興歎安得循吏俾父母吾人乎吾前命諒為泗州未即路㑹壽守植卒因改諒守壽命公幹守泗諒之理課前詔詳矣而公幹自尚書郎連領二郡政平法一甚便於人加以有理戎之材可付留事故輟軍保一作倅仍憲秩而兼寵之夫壽與泗皆郡之大者也諒與公幹皆二千石之良者也以大郡委良吏不亦宜乎噫諒無忘澄城之理公幹無替毫城之政則愷悌之化吾有望於二郡焉各依前件授王計萊州刺史吳暐蓬州刺史制前人勑吳暐等咸以材畧載筆從戎集作軍藝學智謀霈然足用多歴年紀一作祀備嘗艱危進退周旋不聞失道司徒𢎞正詳奏以聞因以竹符分命試吏而萊蓬二郡各介一方牧人者但不擾其心不奪其力則雖華夷南北土物不同皆可以自足自遂矣宜有集作用此道徃安闕可依前件除郎官分牧諸州制勑漢宣帝云與我共理者其唯良二千石乎誠哉是言也集無也字朕每三復安得循吏副吾此心今之臺郎一時妙選嘗經任歴率有才用雖典曹庀事其務非輕而䘏隱分憂所寄尤重是用竝命分牧吾人歲時之間期於報政户部郎中某可某州刺史吏部郎中某可某州刺史朕髙懸爵賞佇期酬効咨爾夙夜其念之哉無俾龔黄專羙前代可授裴浰郭曥等諸州刺史制李虞仲勑朝散大夫前守蓬州刺史上輕車尉裴浰朝議郎前守通州刺史賜緋魚袋郭矑等夫上之化下猶泥之在鈞唯甄者之所為耳以爾等前所為政皆播能名人多袴襦之謡理有綏定之績衡陽苞湖賦繁地闊尤藉良牧以扇仁風勉奉詔條陟明斯在浰可守衡州刺史散官勲如故曥可守利州刺史散官賜如故授王承休等諸州刺史制勑致果校尉守右監門衞將軍兼御史中丞王承休朝議郎守太子少尹賜紫金魚袋王𢎞質等咸以事勞顯於中外或武稱和義環衞有嚴或吏能適時長征攸佐循其履歴頗謂優深寵以郡符俾洽條理夫以巴賨雜俗山谷異宜必在通其有無繕其征賦勉兹勤䘏用表分憂承休可朝請郎使持節陵州諸軍事陵州刺史散官如故𢎞質可使持節澤州諸軍事守澤州刺史散官賜如故文苑英華巻四百十
