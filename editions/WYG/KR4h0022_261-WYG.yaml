body:
  text: 文苑英華巻二百六十一宋李昉等編寄贈十五周賀二十一首溫庭筠二十四首杜牧十八首許渾十八首曹汾一首寄寧海李明府周賀山縣風光異一作羙公門石水清一官居外府㡬載别一作日到東京故疾梅天發新詩雪夜成家貧希一作思减選時靜憶歸耕抱疾窮一作把䟽尋書義澄心得獄情夢靈邀客一作韶觧劍一作鏡古揀人一作覔僧呈守月通一作閔宵坐尋花廻路一作傍徑行從来知愛道何慮白髭生投江州張郎中前人要地無集作多閒日仍容集作容仍冐謁頻借集作買山年渉閏寢郡月踰旬驛徑曽衝雪公泉省滌塵隨行溪路細接話草堂新减藥痊餘一作全除癖飛書問苦集作苦問貧噪蟬離宿集作抛壊殻吟客寄秋身鍊句盈箱箧懸圖視蜀閩静居集作使君匡阜近終作社中人出關寄賈島一作送客前人舊鄊無子孫誰共老青門迢逓早秋路别離深夜村伊流偕逺客岳響答啼集作清猿去後期招隠何當復此言此詩二百七十九巻重出今已削去贈胡僧前人瘦闕無血色草履着行穿閒話似持咒不眠同坐禪背經来漢地袒膊過冬天情性人難㑹逰方應信縁贈然上人前人竹逕瓶水新深稱北窓人講罷見黄葉詩成尋舊隣錫陰迷集作連坐石池影露齋身苦作南行集作逰約勞生始問津春日山居寄友人前人春居無俗喧時立澗門前路逺少来客山深多過猿帶集作倚巖松色老臨水杏花繁除憶文留役集作外何人更可言贈朱慶餘校書前人風泉盡一作夜結氷寒夢一作入徹西陵越信楚城得逺懐中夜興樹停沙島鶴茶㑹石橋僧寺閣連官舎行吟過一作到㡬層贈緱氏集作山李明府前人貴邑清風滿唯集作誰通上宰心杉松出郭部集作杉檉出外部雨雹下嵩陰度鴈方當壘来僧始到岑西池月色逈集作孤月色㑹接一宵吟寄杭州姚合郎中前人轉海移集作轉刺来山郡連年别省曹分題得客集作惠少着價買書髙暮集作晩栁蟬和角寒城燭照濤鄱陽集作溪卧疾乆集作者未暇集作不及從乗艘寄朱慶餘已見二百三十一巻贈李主簿前人稅時兼主印毎日得閒稀對客放科吏為官亦典衣案遲吟坐待宅近歩行歸見說論詩道應愁斷是非贈厲元侍御前人山松徑與瀑泉通巾舄行吟想越中塞鴈去經華頂末鄊僧来自海濤東關分河漢秋鍾絶露滴獼猴夜岳空抱疾因尋周柱史杜陵寒葉落無窮贈姚合郎中前人望重来為守土臣清髙還似武公貧道從㑹觧惟求静詩造𤣥㣲不趂新玉帛定知難撓思雲泉終是得關身兩衙向後無餘事門舘多逢請益人晩秋江舘書事寄姚郎中前人病寄西州居帶城倚門孤桞一蟬鳴澄江月上見魚擲荒逕葉乾聞犬行越島夜無侵閣色寺鍾寒有隔源聲故園賣卜休歸去湖水秋来空自平上陜府姚中丞前人此心長愛狎禽魚仍候登封獨著書領郡只嫌生藥少在官長恨與山疎成家盡是經綸後得句應多諫諍餘見說養真求退静溪南泉石許同居贈道人前人布褐髙眠石竇春迸泉多濺黒紗巾摇頭説易當朝秀落手圍棋對俗人自算天年窮甲子誰同雨夜守庚申擬當太華何時去他日相尋乞藥銀寄韓司兵前人多病十年無舊識滄洲戰後始逢君已知罷秩辭瀧水相勸移家近岳雲泗上旅郵侵疊浪雪中歸路踏荒墳若為此别終期老書札何曽寄北軍夏日寺居寄楊侍御前人雨過北一作碧林空晩景院閒人去掩斜陽十年多一作苦病度寒一作落葉萬里亂愁生夜牀終欲反耕甘性拙多一作夕慙他一作多事與身忙還一作遥知謝客名先重肯為詩篇問一作接楚狂寄金陵僧前人水石致身閒自得平雲竹閣少炎蒸齋牀㡬减供禽食禪徑寒通照像燈覔句當秋山落葉臨書近臘硯生氷行登揔到諸餘寺坐聽蟬聲滿四稜寄長孫中丞前人潯陽却到是何日此地今無舊使君長憶窮冬宿廬岳瀑泉氷折共僧聞寄潘緯前人楊栁垂絲與地連歸来一醉向溪邊相逢頭白莫惆悵世上無人長少年寄山中人温庭筠月中一雙鶴石上千尺松素琴入爽籟山酒和春容幽瀑有時斷片雲無所從何事蘇門嘯携手東南峯旅泊新津欲寄一二知已前人維舟息行役宵景近江村併起别離恨思聞歌吹喧髙林月初上逺水霧猶昏王粲平生感登臨㡬斷魂初秋寄友人前人閒夣正悠悠凉風生竹樓夜琴如欲雨曉簟覺新秋獨鳥楚山逺一蟬關樹愁慿將離别恨江水問同一作東逰贈僧雲棲前人麈尾與笻杖㡬年離石壇梵餘林雪厚碁罷岳鍾殘開巻喜先悟潄瓶知早寒衡陽寺前鴈今日到長安雪夜與友生同宿曉寄近隣已見一百五十四巻前人鄠郊外墅寄所知前人持頥望平緑萬景集所思南塘過新雨百草生容姿幽鳥不相識美人何可期徒然委摇蕩惆悵春風時贈盧郎中前人白首方辭滿荆扉對渚田雪中無陋巷醉後似當年一笈負山藥兩瓶携澗泉夜来風浪起何處任漁船贈盧長史前人移病欲成隠扁舟歸舊居地深心事少官散故交疎道直更無侣家貧惟有書東門煙水夢非獨為鱸魚寄渚宫遺民𢎞里生前人桞弱湖堤曲籬疎水巷深酒闌初促席歌罷欲分襟波月欺華燭江雲潤故琴鏡閒花共葉牀冷簟連心荷疊平橋暗萍稀敗舫沉城頭五更鼔窓外萬家砧異縣雨投浪當年鳥共林八行香未减千里歎難尋未肯暌良顧空期嗣好音他時詠懐作猶得並南金春日將欲東歸寄新及第苖紳先軰一作下第寄司馬禮前人㡬年辛苦與君同得䘮悲歡盡是空猶喜故人先折桂自憐覉客尚飄蓬三春月照千山路集作道十日花開一夜風知有杏園無路一作計入馬前惆悵滿枝紅贈李將軍前人誰言荀一作家荀羡愛功勲年少登壇衆所聞曽以能書稱内史又因明易號將軍金溝故事春長在玉軸遺圗火集作文華半焚不學龍驤畫山色集作水醉鄊無迹似閒雲寄盧生前人遺業荒凉近故都門前堤路枕平湖緑楊隂裏千家月紅藕香中萬㸃珠此地别来雙鬢改幾時歸去片㠶孤他年猶擬金貂換寄與黄公舊酒壚贈袁司録即丞相淮陽公之猶子與庭筠有舊也前人一朝辭滿有心期花發楊園雪覆一作壓枝劉尹故人諳徃事謝郎諸弟得新知金釵醉就胡姬畫玉管閒留洛客吹記得襄陽耆舊語不堪風景峴山碑寄清凉寺僧已見二百三十三巻贈蜀將蠻入城都頗著勲勞見三百巻邊將門前人春暮宴罷寄宋夀先軰前人斜掩朱門花外鍾曉鸎時節好相逢䆫間桃葉集作蕋宿粧在雨後牡丹春睡濃蘇小風姿迷下蔡馬卿才調似臨卭誰憐芳草連集作生三徑參佐橋西陸士龍寄岳州李外郎逺一作肱前人含嚬不語坐榰頥天近樓髙宋玉悲湖上殘碁人散後岳陽㣲雨鳥来遲早梅猶得回歌扇春水還應理釣絲獨一作唯有袁安一作宏正憔悴一樽惆悵落花時投集作上翰林蕭舍人前人人間鴛鷺杳難從猶恨集作獨恨金扉直幾集作九重萬象曉集作晩歸仁夀鏡百花春滿集作隔景陽鐘紫㣲芒動詞初出紅臘香殘詔未封毎過朱門愛庭樹一枝何日許從容秋日旅舎寄義山李侍御前人一水悠悠隔渭城渭城風物近柴荆寒蛩乍響催機杼旅鴈初来憶弟兄自為林泉牽曉夣不關砧杵動秋聲子虚何處堪消渇試向文園問長卿却歸集作徑商山寄贈同行友人前人曽讀逍遥苐一篇爾来何事集作無處不恬然便同南郭能忘象兼笑東林學坐禪人事轉新花爛熳驛集作客程依舊水潺湲若敎猶作當時意應有垂絲在鬢邉逰南塘寄王知白前人白鳥梳翎立岸莎藻花菱刺泛㣲波煙光似帶侵垂栁露㸃如珠落黯荷楚水晩凉催客早杜陵秋思傍蟬多劉公不信歸心切聽取江樓一曲歌晩坐寄友人前人九枝燈在瓉窓空希逸無聊恨不同曉夣未離金夾睞早寒先到石屏風遺簮可惜三秋白蠟燭猶殘一寸紅應巻鰕簾㸔皓齒鏡中惆悵見梧桐西江寄友人集作貽釣叟騫生前人碧天集作晴江如鏡月如鈎泛灧蒼茫迷客愁夜淚潜生竹枝曲春灘遥聼集作上木蘭舟事隨雲去身難到夢逐煙銷水自流昨日歡娱竟何事集作在一枝梅謝楚江頭寄河南杜少府集作尹前人十嵗集作載歸来鬢未彫玳簮珠履見常僚豈闗名利分榮路自有才華作慶霄鳥影不飛集作參差經上苑騎聲相續過中橋夕陽亭下集作畔山如畫應念田歌正寂寥許七侍御棄官東歸瀟洒江南頗聞自適髙秋企望題詩寄贈十韻杜牧天子繡衣吏東吳羙退居有園同庾信避事學相如蘭畹晴香嫩筠溪翠影疎江上九秋後風月六朝餘錦肆開詩軸青囊結道書霜巖紅薜荔露沼白芙蕖睡雨髙梧宻碁燈小閣虛凍醪元亮秫寒膾季鷹魚塵意迷今古雲情識巻舒他年雪中棹陽羡訪吾廬於義興縣近有水榭除官行至昭應聞友人出官因寄前人賤子行集作来千里明公去一麾不能揮集作休涕淚豈獨感恩知草木窮秋集作秋風後山川落照時如何望故國驅馬却遲遲江上雨寄崔碣已見一百五十三巻贈張祜前人詩韻一逢君平生稱所聞粉毫惟畫月瓊尺只裁雲黥陣人人懾秋霜集作星歴歴分數篇留别我羞殺李將軍寄張祜見三百十三巻寄李起居四韻前人楚女梅簮白雪姿前溪碧水凍一作水醪時雲罍心凸知難捧鳳管簧寒不受吹南國劒眸能盼睞侍臣香袖愛僛垂自憐窮律窮途客正刼孤燈一局碁李給事前人一章緘拜皁囊封集作中懔懔集作慄慄朝廷有古風元禮去歸綸氏學李膺退罷歸綸氏教授生徒給事論鄭注告滿歸頻陽也江充来見犬臺宫鄭注對於浴堂中紛紜白晝驚千古鐵鑕朱殷㡬一空曲突徙薪人不㑹海邉今作釣魚翁李膺事載後漢本傳今杜集誤作緱氏寄宣州鄭諫議前人大夫官重鎮江東瀟洒名儒振古風文石階集作陛前辭聖主碧雲天外作𡨕鴻五言寧謝顔光禄百嵗湏齊衛武公再拜宜為集作同丈人行過庭交分有無同豫章中丞業深韜畧志在功名再拜集作奉長句兼有諮勸前人檣似鄧林江泊天越香巴錦萬千千滕王閣上柘枝鼔徐孺亭前鐵軸船八郡元侯非不貴萬人師長豈無權要君一作知嚴重踈歡樂猶有河湟可下鞭時收河湟初春雨中舟次和州裴使君見迎李趙秀才同来因書四韻兼寄許渾前人芳草渡頭㣲雨時萬株楊栁拂波垂蒲根水暖鴈初浴梅徑香寒蜂一作蝶未知詞客倚風吟暗澹使君廻馬濕旌旗江南仲蔚多情調惆悵春隂㡬首詩途中寄友人前人道傍髙木盡依依落葉驚風處處飛未到鄉關聞早鴈獨於客路受寒衣煙霞舊想長相阻書劔投人乆不歸何日一名隨事了與君同採碧溪薇贈李處士長句四韻前人玉函怪牒鎻靈篆紫洞香風吹碧桃老翁四百爪牙利擲史萬里精神髙靄靄祥雲隨歩武纍纍秋塜嘆蓬蒿三山朝去應非乆姹女當窓織羽袍贈李秀才是上公孫子前人骨清年少眼如氷鳳羽參差五色層天上麒麟時一下人間不獨有徐陵寄揚州韓綽判官前人青山隠隠水遥遥秋盡江南岸草集作草木凋二十四橋明月夜美集作玉人何處坐集作敎吹簫冬至日寄小姪阿宜前人小姪名阿宜未得三尺長頭圓筋骨𦂳兩臉明且光去年學官人竹馬遶西廊指揮羣兒輩意氣何堅剛今年始讀書下口三五行隨兄旦夕去歛手整衣裳去嵗冬至日拜我立我傍祝爾願爾貴仍且夀命長今年我江外今日生一陽憶爾不可見祝爾傾一觴陽徳比君子初生甚㣲茫排隂出九地萬物随開張一似小兒學日就復月將勤勤不自已二十能文章仕宦至公相致君作堯湯我家公相家劒珮常丁當舊第開朱門長安城中央第中無一物萬巻書滿堂家集二百編一作三百篇上下馳皇王多是撫州冩今来五紀強尚可與爾讀助爾為賢良經書刮根本史書閲興亡髙摘屈宋艷濃薰班馬香李杜泛浩浩韓桞摩蒼蒼近者四君子與古爭強梁願爾一祝後讀書日日忙一日讀十紙一月讀一箱朝廷用文治大開官職場願爾出門去取官如驅羊吾兄苦好古學問不可量晝居府中治夜歸書滿牀後貴有金玉必不為爾藏崔昭生崔芸李兼生窟郎堆錢一百屋破散何披猖今雖未即死餓凍幾欲僵參軍與縣尉塵土驚劻勷一語不中治笞箠身滿瘡官罷得絲髮好買百樹桑稅錢未輸足得米不敢嘗願爾聞我語歡喜入心腸大明帝宫闕杜曲我池塘我若自潦倒看汝争翺翔揔語諸小道此詩不可忘赴京初入汴口曉景即事先寄兵部李郎中前人清淮控隋漕北走長安道檣形櫛櫛斜浪態迤迤徒何反好初旭紅可染明河淡如掃澤闊鳥来遲村饑人語早露蔓蟲絲多風蒲燕雛老秋思髙蕭蕭客愁長裊裊因懐京洛間宦逰何戚草什伍持津梁澒湧争追討翾便詎可尋幾秘安能考小人乏馨香上下將何一作祠禱唯有君子心顯豁知幽抱題安州浮雲寺樓寄湖州張郎中見三百十三巻前人贈宣州元處士見三百三十一巻前人寄題南山集作商洛王隠居許渾近逢商洛客知爾住南塘草閣平春水柴門掩夕陽隨蜂收野蜜尋麝採生香更憶前年醉松花滿石床留贈偃師主人前人孤城漏未殘徒侣拂征鞍洛北去愁逺淮南歸夢䦨曉燈囬壁暗晴雪巻簾寒強盡集作更盡主人酒出門行路難贈梁將軍前人曽經黒山虜一劍出重圍年長窮書意時清隠戰機集作釣磯髙僧集作齋雲外住瘦馬月中歸唯說鄊心苦春風鴈北飛贈桞璟陶馮二校書前人霄漢兩飛鳴喧喧滿集作動禁城桂堂同日盛芸閣隔年榮香掩蕙蘭氣韻髙鸞鶴聲應憐茂陵客未有子虛名寄友人集作寄袁校書前人新嵗集作貧居樂㳺北江海思迢迢雪夜書千巻花時酒一瓢獨吟集作愁秦樹老孤夢楚山遥有路應相念風塵滿黒貂將歸茅山兼寄李叢時兩河用兵集作聞兩河用兵因貽友人前人故人日已逺身事與誰論氣直集作性拙難趨世心孤易感恩晨歌集作秋悲憐宋玉夜舞笑劉琨從此歸山去無因更出門集作徒有干時策青山尚掩門長興里夏日寄南陵避暑前人侯家大道傍蟬噪樹蒼蒼開鎻洞門逺下簾髙舘凉欄圍紅藥盛架引緑蘿長永日一欹枕故山雲水鄊舟行早發廬陵郡郭寄滕郎中前人楚客停橈太守西集作知露凝丹葉自愁集作秋悲蟹螯只恐相如渇鱸鱠應防曼倩饑風巻曙雲飄角逺雨昏寒浪挂㠶遲離心可羡髙齋夢集作夕巫峡花深醉玉巵京口閒居寄兩都親友集作京洛友人吳門煙月昔同逰梧葉蘆花並客舟聚散有期雲北去浮沉無計水東流一樽酒盡青山暮千里㠶集作書回碧樹秋何處相思不相見鳳城宫闕楚江頭集作樓郊園秋日寄洛中友人一作親友前人楚水西来天際流感時相一作傷别思悠悠一樽酒盡青山暮千一作萬里書一作春回碧樹秋日落逺波驚一作低宿鴈風吹輕浪起眠鷗嵩陽親友誰相念一作如相問潘岳閒居欲白頭此詩第二聫與前篇同未喻獻鄜坊邱常侍前人詔選將軍䕶北戎身騎白馬背彤弓桞營逺識金貂貴榆塞遥知玉帳雄秋檻鼔鼙驚朔雪曉階旗纛起邊風蓬莱毎望平安火應奏班超定逺功寄當塗李逺前人賦擬相如詩似陶雲陽煙月又同袍車前驥病駑駘逸架上鷹閒鳥雀髙舊日樂貧能飲水他時隨俗願餔糟不湏倚向青山住詠雪題詩用意勞寄殷堯藩前人十年聞君集作名翰墨林為從知已信浮沉集作沉沉青山有雪諳松性碧落無雲稱鶴心帶月獨歸蕭寺逺翫花頻醉庾樓深尋思集作思君一見如瓊樹空把新詩盡日吟移攝太平寄前李明府前人病移巖邑稱閒身㡬集作何處風光貰酒頻溪桞遶門彭澤令野花連洞武陵人嬌歌自駐壺中日集作景艷舞長留海上春早晩髙䑓更同醉緑蘿如帳草如茵春日思舊逰寄南徐從事劉三復前人風暖曲江花半開忽思京口共銜盃湘潭雲盡暮山出巴蜀雪消春水来懐玉尚悲迷楚塞捧金猶羡樂燕䑓薊門髙處極歸思隴鴈北飛雙鷰廻贈河東虞押衙前人吳門風水各集作洛萍流月滿花開懶獨逰萬里山川分曉夢四隣歌管送春愁昔年顧我長青眼今日逢君已集作盡白頭莫向樽前更惆悵古来投筆盡集作揔封侯移攝太守集作陵陽春日寄汝洛舊逰許渾百年身世學集作似飄蓬澤國移家疊嶂中萬頃碧波魚戀釣九重青漢鶴愁籠西池水冷春巖雪南陌花香晩集作曉樹風縱有芳樽何處集作心不醉故人今集作多在洛城東寄友人集作寄示汝都許渾朱檻煙窓集作霜夜坐勞羙人南國舊同袍山長水逺無消息瑶瑟一彈秋月髙望九華寄衡陽杜員外曹汾載月早辭三秀舘遲明初識九華峯差差玉劒寒鋩利裊裊青蓮翠葉重竒状却疑人􅀞出嵐光如為客添濃行春若到五溪上此處褰帷正面逢諸夲兩巻皆作二百六十一其篇數雖合緫目而詩多重複㦯全異者如周賀十二首重者三温庭筠十五首重者五杜牧九首皆不同許渾十四首前巻闕其九後巻増其一所贈者許集又無之而總目却有曹汾一首疑是汾詩今合為一巻去其重複注異同為一作文苑英華巻二百六十一
