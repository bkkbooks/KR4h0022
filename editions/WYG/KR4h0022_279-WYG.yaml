body:
  text: 文苑英華巻二百七十九宋李昉等編送行十四厲元二首劉三復一首釋無可十七首劉得仁十五首于武陵二首周賀十三首温庭筠十二首紀唐夫一首李羣玉二首張祐九首陳陶四首送顧非熊及第歸茅山厲元故山登第去不似舊歸難㠶巻江初夜梅生洞少寒採薇留客飲折竹掃仙壇名在儀曹籍何人肯掛冠送黄曄明府岳州湘隂赴任前人恩霑譴雪㡬人同歸􅈗湘隂六月中商嶺馬嘶殘暑雨席㠶髙掛早秋風貢名頻向書闈失飛檄曽傳朔漠空西省尚嗟君宦逺水雞啼處莫聴鴻同前劉三復擬占名塲第一科龍門十上困風波三年䕶塞從戎逺萬里投荒失意多花縣到時銅墨貴葉舟行處水雲和遥知布惠蘇民後應向祠堂弔汨羅送姚中丞赴陜州釋無可三陜周分地恩除左掖臣門䦨開幕重搶甲下天新夾道行霜騎迎風滿草人河流銀漢水城賽鐵牛神意氣依違許上陳何妨向紅斾自與白雲親送李使君赴瓊州兼五州招討使釋無可分竹䧺兼使南方到海行臨門雙斾引隔嶺五舟迎猿鶴同枝宿蘭蕉夾道生雲垂前騎失山豁去㠶輕雨露蒸秋岸潮濤震夜城政閑開逈閣欹枕島風清送李郎中赴海州前人出守滄州去西風送斾旌路遥經集作過㡬郡地盡到孤城拜廟千山緑登集作開樓遍海晴何人共東望月向積濤生夏日送田中丞赴蔡州前人出守海南城應多戀闕情地遥人乆望風起斾初行楚廟繁蟬斷淮田細雨生賞心知有處蔣宅古津平送薛重中丞充太原副使前人中書華省外集作出華省副相晉陽行書答偏州啟籌叅上將營踏沙寒馬細收集作吹雨曉笳清正報胡塵滅桃花汾水生前人送靈武李侍御前人靈州天一涯幕客似還家地得江南壤塵分磧裏沙鹽調上味貢集作禁塩調上味麥穗集作貢結秋花前席因籌畫清吟塞日斜冬夜姚侍御宅送李廓少府前人王事圭峰下將還禁漏餘偶歡新嵗近惜别後期踈雪罷見来吏川昏聊整車獨吟多暇日應寄栢䑓書送喻鳬及第歸陽羡前人姓字載科名無過子最榮宗中初及第江上覲難兄月向波濤沒茶連洞壑生石橋髙思在且為㸔東坑送人罷舉東遊前人東堂今巳負復此逺行難兼雨風聲過連天草色乾鴻嘶荒壘閉兵燒廣川寒若向龍門宿懸知拭淚㸔送姚明府赴招義縣前人濠梁古縣城結束赴王程道路携家去波濤隔月行車臨芳草下吏踏落花迎暮郭山遥在春洲鳥不驚風煙譙國逺桑柘楚田平何似書能化長淮澈海清送阮江宋明府即開府景之孫前人初聞從事日鄂渚動芳菲一遂鈞衡薦今為長史歸人臨沅水望鴈映楚山飛唯有傳聲政家風重發輝送宜春裴明府是將軍旻之孫前人垂白方為縣徒集作從知大父䧺山春南去棹楚夜北飛鴻疊嶂和雲滅孤城與嶺通誰知持惠化一境動清風送李少府之臨卭前人卭南方作尉調補一何卑發論唯公幹承家乃帝枝山長風裊棧江䕃石和澌舊井王孫宅過尋獨有期送王集作姚明府之任安福前人落絮滿衣裳携琴問水鄉掛㠶南入楚到縣半浮湘吏散翠禽下庭閑斑竹長人安知逺泛沙上薰蘭芳夏日送崔秀才前人南方山水地念子為貧遊縱是逢佳境那能緩旅愁夕陽行逺道煩暑在孤舟莫向巴江過猿聲蹙淚流送杜司馬再遊蜀中前人為客應非願愁成欲别時還遊蜀國去不惜杜陵期劍水啼猿在闗林轉棧遲日光低峡口雨勢出峨眉川逈遲集作山逈逢殘角山集作雲開識逺夷勿令雙鬢髪併向錦城衰前人送薛秀才遊河中兼投任郎中留後前人詩古賦縱横令人畏後生駕言遊禹跡知已在蒲城月集作日射雲煙散風吹草木榮孤吟臨㓂境莫欲請長纓送鄂州崔大夫赴鎮劉得仁㢘問帝難人朝廷輟重臣入山初有雪登路正無塵去國鳴騶緩經雲住斾頻千峰與萬木親聴雨情新送錢給事赴虢州前人帝心憂虢俗暫輟掖集作諌垣臣疲瘵初承制鄉閭似得春化成應有瑞位重轉聞貧用作塩梅日争廻卧轍人送雍陶侍御赴兖州裴尚書幕前人綸閣知孤直翻論北巷賢且縻蓮府集作幕裏會致玉堦前洙泗秋㣲動龜䝉月正圓元戎軍務息清句待君聨送姚合郎中任杭州前人水陸中分程㸔花一月行會稽山隔浪天竺樹連城候吏齎魚印迎船載斾旌渡江春始半嶼嶼草初生送新羅人歸本國前人鷄林隔巨浸一往一年行日近國先曙風吹海不平眼穿鄉井樹頭白渺瀰程到彼星霜換集作變唐家語却生送靈武朱書記前人靈師與誰善得君賔幕中從容應盡禮賛畫致元集作殊功連虜雲長慘纔秋樹半空相如偏自惬掌記復乗騘早春送湘潭李少府之任前人栁新春水湄春岸草離離祖席酒忽盡集作席酒愁言盡行人淚自垂業文傳不乆集作朽作尉豈多時公退琴堂上風吹集作来斑竹枝送越客歸前人霜薄東南地江楓落未齊衆山秋楚上孤棹宿吳西渚客留僧語檻猿失子啼到家冬即是荷盡若耶溪送河池李明府之任前人河池安所理種栁與彈琴自合清時化仍資白首吟程餘行片月公退入遥林想得除民瘼長施父母心送車濤集作儔罷舉歸山前人朝是暮還非人情冷暖移浮生只如此强進欲何為要路知無援深山必遇師憐君明厥集作此理休去不遲疑送蔡京侍御赴大梁幕集作辟同城各多故會面亦稀踈及道須相别臨岐恨有餘梁園飛楚鳥汴水走淮魚衆説裁軍檄陳琳逺不如送王書記歸邠州前人陳琳輕一别上馬意超然来日行煩暑歸時早聴蟬隂雲翳城郭細雨紊山川從事公劉地元戎舊禮賢送謝觀之劍南從事前人迢逓從知己他人敢更言離京雖未臘到府巳應暄飛急奔行鴈啼酸憶子猿江山無限思君擬共誰論送周鉞往江夏前人東西南北郡自説遍曽遊人世終多故集作欲皇都不少留郢城㠶過夜漢水月集作漢月水方秋此謁親知去集作後聞猿空有集作豈觧愁前人送顧非熊作尉旴􅇇前人一名兼一尉未足是君伸歷數為詩者多来作諫臣路翻平楚鳥草帶古淮薪天下雖云大同人有㡬人送客東歸于武陵一聼遊子歌秋計覺蹉跎四海少平路百川無定波共驚年巳暮俱向客中多又駕征輪去東歸將若何送鄼縣董明府之任前人南北行巳乆憐君知苦辛萬家同草木三載返陽春東道聽遊子夷門歌主人空持語相送應恠不沾巾送唐紹歸建業周賀南朝秋色滿君去思如何帝業空城在民田壊塜多月圓䑓獨上栗綻寺頻過籬下西江濶相思見白波送客見二百六十一巻送陸判官防秋前人疋馬無窮地三年逐大軍筭程淮色一作涯色逺起帳夕陽曛瀑水行時潄邊笳語次聞要傳詩一作書禮去應到磧西一作東雲送從兄南遊前人山水疊層層吾兄渉復集作又登掛㠶春背鴈尋磬夜逢僧雪溜懸衡岳集作嵓色江雲盖秣陵評文来集作永不妄此説是中興長安送鄉人前人上國多離别年年渭水濵空將未歸意欲説向行人雨度池塘草山連井邑春臨岐惜分手日暮一沾巾送楊嶽歸巴陵前人何處得鄉信告行當雨天人離京口日潮入集作送岳陽船孤鳥背林一作秋色逺㠶開浦煙悲君唯此别不肯話廻年送張消疑之陸州前人遥憶新安舊扁舟往復還淺深㸔水石来往逐雲山到縣餘花在過門五栁閑東征闕俱隠薜蘿間送省己上人歸太原前人惜别聼邉漏窗燈落燼重寒僧回絶塞夕雪下窮冬出馬聞殘角休兵見壊鋒何年更来此老却倚堦松送朱慶餘前人彈客行無定全家在浦東寄眠僧閣静贈别槖金空舊里千山隔歸舟百計同藥資如有分相約老其中送友人前人彈琴多去情浮檝皆潮行人望豐壖宿蟲依蠧木鳴檣煙連浦色蘆雨入船聲如疾登雲路憑君寄此生送石協律歸吳前人僧窗夢後憶歸耕水渉應多半月程幕府罷来無藥價沙中戴去有山情夜随静渚離蛩語早過寒潮背井行巳讓辟書稱抱疾滄洲便許白髭生送韓評事前人門枕平集作重湖秋景好水雲松色逺相依罷官餘俸租田種送客廻船載石歸離岸遊魚逢浪退望巢寒鳥逆風飛嵩陽舊業集作隠多時别閑月行吟入翠㣲送郭秀才歸金陵前人夏後客堂黄葉多又懐家國起悲歌酒前欲别語難盡雲際相思心若何鳥下獨山秋寺磬人随大舸晩江波南徐舊業㡬時到門掩殘陽積翠蘿送人遊淮海温庭筠背橋燈色暗宿客夢初成半夜竹忩雨滿池荷葉聲簟凉秋閣思木落故山情明發又愁起桂花溪水清送渤海王子歸本國前人疆理雖重海車書本一家盛􅈴歸舊國佳句在中華定界分秋漲開㠶到曙霞九門風月好囘首是天涯送人東遊前人荒戍落黄葉浩然離故闗髙風漢陽渡初日郢門山江上㡬人在天涯孤棹還何當重相見樽酒慰離顔送洛南尉之官集作李主簿前人想君秦塞外因見逺集作應見楚山清槲葉曉迷路枳花春滿庭祿優仍侍膳官散得專經余亦還愚谷歸心在翠屏送北陽袁明府前人楚鄉千里路君去及良晨葦浦迎船火茶山候吏塵桑濃蠶卧晩麥秀雉聲春莫作東籬興青雲有故人送李生歸舊居前人一從征戰後故社㡬人歸薄宦離山乆髙談與世稀夕陽當板檻春日入柴扉莫却嚴灘意西溪有釣磯送淮隂縣令前人隋堤楊栁煙孤棹正悠然蕭寺通淮戍蕪城枕楚田魚鹽橋上市燈火雨中船故老青葭岸先知宓子賢早春滻水送友人前人青門煙野外渡滻送行人鴨卧溪沙暖鳩鳴社樹春殘波青有石幽草緑無塵楊栁東風裏相㸔淚滿巾送襄州李中丞赴從事前人漢庭文彩有相如天子通宵愛子虚把釣㸔碁髙興盡焚香起草宦情踈楚山重疊當歸路溪月分明到直廬江雨蕭蕭㠶一片此行誰道為鱸魚送崔判官集作郎中赴幕前人一别黔南集作巫似斷弦故交東去更􅏰然集作悽然心遊目斷集作送三千里雨散雲飛二十年發跡豈勞天上桂屬詞還得幕中蓮相思莫集作休道長安逺江月随人處處圓西江上送漁父前人却逐嚴光向若耶釣綸菱棹寄年華三秋梅雨愁楓葉一夜蓬舟宿葦花不見水雲應有夢偶随煙鳥便成家白蘋風起樓船暮江燕雙雙正雨斜送李憶東歸六言前人黄山逺隔秦樹紫禁斜通渭城别路青青桞弱前溪漠漠苔生和風澹蕩歸客落日殷勤早鶯㶚上金樽未飲讌歌巳有餘聲送温庭筠尉方城紀唐夫何事明時泣玉頻長安不見杏園春鳳凰詔下雖沾命鸚鵡才髙却累身但飲緑􅙩消積恨莫辭黄綬拂行塵方城若比長沙逺猶有千山與萬津送陶少府赴選李羣玉陶公官興本蕭踈長傍青山碧水居乆向三茅窮藝術仍傳五栁舊琴書跡同飛鳥栖髙樹心似閑雲在太虚自是葛洪求藥價不闗梅福戀簮裾送于少監自廣州還紫邏前人鳴臯山水似麻源謝監東還憶舊集作故園海嶠烟霞輸集作輕遶翰洛川花木待廻軒宦情薄去詩千首世事閑来酒一樽明日途中見顔范始應通籍入金門送王昌渉侍御張祐十里指東平軍前首出征諸侯青服舊御史紫衣榮入陣梟心死分集作衡圍虎力生畫時安楚塞刻集作尅日下齊城號令朝移幕偷蹤夜斫營雲梯曽險上地道慣深行舉斾招降將投戈趂敗兵自慙居虜者當此立功名送劉崇德尉睦州建徳縣前人一命前途逺雙曹公邑閑夜潮人到郭春霧鳥啼山淺瀨横沙堰髙嵓峻石斑不堪曽倚棹猶復夢昇攀送蘇紹之歸嶺南前人孤舟越客吟萬里曠離襟集作衿夜月江流濶春風嶺路深珠繁楊氏果翠耀孔家禽無復天南夢相思空樹林送韋正字集作貫赴制科前人可愛漢文年鴻恩蕩海壖木雞方備徳金馬正求賢大戰希遊刃長途在着鞭佇聞晁董䇿偏集作便向使中傳送楊秀才遊蜀前人鄂渚逢遊客瞿唐上去船峽深明月夜江浄集作静碧雲天舊俗巴歈舞離情集作新聲蜀國絃不堪揮慘恨一涕自􅏰然送沈下賢謫尉南康前人秋風江上草先是客心催萬里故人去一行新鴈来山髙雲緒斷浦逈月波頺莫恠南康逺相思不可裁送徐彦夫南遷前人萬里客南遷孤城漲海邊瘴雲秋不斷隂火夜長然月上行虚市風廻望舶船知君還自潔更為酌貪泉送韋整尉長沙前人逺逺長沙去憐君利一官風㠶彭蠡疾雲水洞庭寬木客提􅂼束江烏接飯丸莫言卑濕地未必乏新歡送李長史歸涪州前人涪江江上客嵗晚却還鄉暮過髙唐雨秋經巫峽霜急灘船失次疊嶂樹無行好為題新什知君思不常南海送韋七使君赴象州任陳陶一鶚韋公子新恩領郡符島夷通荔浦龍節過蒼梧地理金城近天涯玉樹孤聖朝朱紱貴從此展䧺圖送沈次魯南遊前人髙䑓贈君别滿握軒轅風落日一揮手金鵞雲雨空鰲洲石梁外劒浦羅浮東兹興不可接翛翛煙際鴻送江西周尚書赴滑䑓前人楚謡襦袴整三千喉舌新恩下九天天角䧺都分節鉞蛟龍舊國罷樓船崑河巳在兵鈐内棠樹空留鶴嶺前多病無因酬一顧鄢陵千騎去翩翩閩中送任畹端公還京前人燕䑓上一作下榻玉為人月桂曽輸次第春㡬日酬恩座炎瘴九秋髙駕拂星辰漢庭鳳進鵷行喜隋國珠還水府貧多少嘉謀奏風俗斗牛孤劒在平津文苑英華二百七十九
