body:
  text: 文苑英華巻四百六十六宋李昉等編批答一答上尊號答百寮上尊號第四表内制省表具知前上三章皆有報㫖推本帝王之道研究天人之際可謂盡矣能無亮一作諒哉朕辭愈堅來奏愈懇考蓍龜之意酌卿士之心義貴從人事難狥志然體未濟之象敬慎居方一作警慎将然復大畜之文模法往行虞舜勤人以恭已文王事帝而小心自勵則鑒乎殷湯盤銘持盈則戒乎周廟欹器還珠却馬使無媿於前修一作賢菲食罷臺冀有示於來代率是道也庻無悔乎勉狥一作遂羣心祗循祖訓敬允誠請愧惕良深寳厯元年四月三日一作皆唐大詔令答元和南省請上徽一作尊號表常衮省表具知朕纉嗣鴻業託於王公之上常恐陟道猶淺燭理未明夙夜祗畏㒺或一作敢寜逸至於法天象以垂制順人心而平亂立刑辟而不峻興禮樂一作教而不倦簡出澆浮延納忠直思濟于道保合太和今寰海削平載櫜弓矢皆頼於輔弼之誠一作臣盡規於左右將帥之畧宣力於邦家循省表章請崇徽號武功文徳揚美於予用愧于懐何以及此尚以昆夷未叙邊鄙猶虞不果一作敢允從宜斷來表元和十四年一作皆唐大詔令答請上尊號第三表省表具知昔我祖宗毎崇徽號皆以道侔天地澤被生靈故請之不疑而受之不愧是謂典禮鴻光赫然朕以寡昧祗承寳位寅恭詔令作䖍躬惕勵不敢荒寜常懼理化未敷非以自尊為善詔令作意若蕩清冦孽修舉政刑此乃中外英賢叶心所致况復前䟽亦已言之卿等善則稱君過陳功徳表章三至益愧于懐豈大體之必然何懇言之不已沉吟終日未果允從永貞元年答宰臣請上尊號表編制省表具知伏以髙祖太宗接千載之統垂無疆之休太上皇承九聖之烈傳莫大之慶嗣徳纉業允武允文宏帝堯之欽明宗𤣥元之清静付朕天下頥神保和至道光於唐虞至仁合於天地卿等虔述休徳祗獻鴻名循省再三允符朕志詔令作意朕獲守寳位丕承睿訓雖嚴恭寅畏不敢怠遑而澤未洽於群生理未臻於皇極遽言徽號何以當之雖嘉乃誠難遂來請其上獻太上皇尊號宜依所奏凡百卿士當體至懐元和二年答宰臣請上尊號第二表編制省表具知朕獲承丕緒以撫萬邦照臨無日月之明膏潤無江海之浸常恐吉蠲雖備未享於天心教導雖勤未諧於人欲諒慙菲徳敢議鴻名而鼎臣宗公群后庻尹上引祖宗之丕矩下述黎獻之深誠誡予以處泰而思勞告予以受名而務實陳以懇迫至於再三先典不可以固違群情不可以屢阻與其牢讓而繁飾不若納規而狥公遂抑至懐勉從來請顧惟不稱兢惕殊深十二月二十二日元和十四年答宰臣請上尊號第四表編制省表具知建崇名加大號必自盛徳而因全功苟非其時難以擬議朕紹十皇一作聖之統緒尊百代之憲章冕而事天憂慄一作懼不暇乃者忠臣敦化良將策勲有冦難而必殄必平用兵戈而不蝗不旱此乃多士叶力成茲小康豈予一人獨運而致卿等四陳章䟽毎瀝肺肝同一作表士庻之誠心徴朝廷之故實願飾虚美皆為過談諭而復來勢不可止雖重煩典禮殊不自安而深念奏陳亦當從欲一作允勉依所請良用愧懐六月七日一作皆唐大詔令大中元年答宰臣請上詔令作百寮請加尊號第三表省表具知朕獲承丕業詔令作緒奄有萬方憂物之心常懐惕厲荷天之力漸至底寧此皆中外元僚文武庻政咸有一徳以匡冲人而卿等猥以鴻名加於菲薄拜章瀝懇至於再三伏念自列聖以來何嘗無今日之請然卒不能讓者上慰宗廟之靈下廹群臣之願粤予小子豈敢乆勞卿士大夫之心哉敬允乃誠良深自媿所乞宜依十月長慶元年批宰臣請上尊號第二表元稹省表具知朕聞天職生植聖職教化天職舉則四時行聖職修則萬方理然而天不以行四時而為徳故蕩蕩無名聖不以理萬方而為功故謙謙不宰顧朕小子獲承丕圖上頼祖宗之靈下託股肱之力先定鎮冀次來幽燕皆吾日月之所照臨車書之所轍跡失之則有以自愧得之則何足自多况今四海雖清物力方困六戎雖伏邊備尚勞百吏雖存官業詔令作守多曠萬目雖設紀律未張有此四者不敢遑寧思與卿等夙夜俾乂卿宜為我提振大法修明政經讋集作懾竄戎夷阜康黎庻四者既理名焉用之朕方以臯夔之務委卿卿宜以堯舜之事教我詔令作朕驟加徽號深耻近名循省表章難遂集作狥來請四月批第三表省表具知昔齊桓議封禪管仲詔令作叔非驟諫其未宜晉武平江東何曾深惟於詔令作其遠馭彼二臣者居安思危之志明而有隠無犯之誠切也况朕寡徳謬膺集作應昌期頼先帝削平之威蒙列聖浸漬之澤聿來燕冀甫詔令作克靖華夷既無徳而有成實以祥而為懼卿等所宜朝夕納誨警予荒寧雖休勿休日慎一日而乃過為溢美頻上鴻名諒多丹集作志赤之誠殊非藥石之愛汝為予礪為朕揣磨集作摩汝為予舟為朕康濟強我懿號不若使我為有道之君加我虚尊不若居我於無過之地宜罷來請用副廼懐批第四表省表具知朕以正月元日祗見於九廟對越於上𤣥千官在前萬乗在詔令作居後覩聲明文物之盛望城社宫闕之尊尚念髙祖太宗艱難於經營徳宗憲考殷勤集作憂於丕纉復懼不克負荷以羞前人寅畏嚴恭式冀無過而燕趙底定戎獯和寧實惟列聖之休安集作焉敢自大其意左右輔弼庻尹師長猥以鴻名願加薄徳三詔執事抑而不詔令作未行物議逾詔令作彌堅予衷未信四陳章表備引詔令作列古今且曰告虔之時寧忘繼志問安之下胡不慰心事有切於顯榮理難從於封執於戱允恭克讓既見奪於群情克已為仁庻自勤於三省勉依來奏深用愧懐五月答元義等請上尊號表白居易省表具知朕自君臨運逢休泰嵗時豐稔兇醜殄夷此皆宗社降靈忠賢宣力顧惟寡徳敢受鴻名卿等發于集作中發懇誠上尊美號雖屬人望難貪天功宜悉所懐勿固為請答黄裳請上尊號表省表具知朕以薄徳嗣守丕圖不敢遑集作荒寧以𢎞理道幸屬嵗時豐稔兇冦梟夷風雨不愆祀集作禮圜丘以報集作而致本雷霆未震釁太社而服刑斯皆十聖降靈幽賛寡昧百辟叶徳馴致和平永惟鴻名實懼虛美卿上稽祖訓下酌羣情陳獻表章請加徽號洎于公卿士庻集作王公卿士降及耆艾緇黄咸一乃心各三其請朕嘗以宰元化者曲成於物法天道者從欲於人雖恤隱泣辜未臻三五之化而樂推忻戴難違億兆之心徳非稱焉讓不獲已勉從所請深媿于懐答李扞等謝許上尊號表省表具知朕自臨萬邦僅經三載位雖託於人上化未洽於域中永念𦕈身敢當大號卿等義深宗室忠盡君親一其精誠三有陳獻廹於人望厭於天心遂抑所懐勉從其請固辭而亊非獲已撫徳而何以堪之再省謝章彌增惕慮集作屬答賀赦答朱仕明賀册尊號及恩赦表前人省表具知朕以寡徳嗣承睿圖俯從衆情集作誠勉受鴻稱慶之大者豈在予一人推而廣之宜及爾百姓爰因受册之禮遂施作觧之恩俾與群生同斯大慶卿盡忠訓旅推美奉君省茲賀陳深見誠至批宰相賀赦王承宗表省表具知先臣武俊功不可忘後嗣承宗過而能改朕所以捨其罪悔議以勲親垂宥善集作過之恩尚宜及爾十代引泣辜之責誠合在予一人與其黷武而取威不若匿瑕而務徳卿等重居台輔密賛謀猷發於忠集作衷誠有此稱賀省閲章表集作奏嘉歎乆之答賀徳音答王承宗謝洗雪及復官爵表前人省表具知帝者之道藹然無私唯推赤心以牧黔首故一夫不獲若納之於隍一物歸誠則容之如地况卿家聨懿戚􅃂自先朝祖立茂功賞延後嗣因人詿誤不汝疵瑕浸集作滌以恩波煦之􅃂澤撫舊封而察亷六郡進新律而統制三軍蕩穢加恩何以過此及觀集作覩來表乃見深誠言必由𠂻事皆知感承家襲慶誓繼力於前修補過酬恩願指期於後効永言爾志甚叶朕懐勉思始終用副眷矚所謝知答李嗣賀處分王士則等徳音表前人省表具知朕臨馭天下以懲勸為先有惡必誅無功不念顧承宗之罪誠合討除思武俊之勲宜令嗣襲况墳墓禁其剪伐將校許以歸降庻明用師盖非獲已卿職修卿寺誠奉宗枝省茲賀章備見忠藎答王鍔賀賑䘏江淮徳音表省表具知水旱流行江淮艱食朕明申詔㫖親遣使臣蠲其逋租賑以公廩爰興利物之利用表憂人之憂庻俾疲氓均沾惠澤卿克勤所集作乃職共理為心省茲賀陳深見誠意答宰相杜佑等賀徳音表二首前人省表具知古先聖王既託集作託子人上與百姓同其欲與天下同其憂唯是推集作推是心可底於道朕臨御萬國迨茲五年惕厲之懐雖勤於夙夜伏臘集作愆伏之候猶害於嵗時思革弊以救災在濟人而損己是用欽刑緩死責已恤貧罷郡國之貢珎省宫廐之煩費延春令而布仁行惠先南風而解愠阜財庻憑歡心以召和氣卿等或匪躬獻替或悉力弼諧啓沃之間已申霖雨之用燮理之際佇見隂陽之和各宜勉之以輔予理所賀知二省表具知朕以春候發生嵗功資始順陽和而布政賑貧乏而勸農載念罷集作罪非人因除弊事隨其所利施以為恩富庻之端實漸於此卿等義敦宗戚誠揭君親省茲賀陳用增嘉歎答宗正卿李詞等賀徳音表省表具知朕統承鴻緒子育蒼生累嵗有秋今春不雨在隂陽之數雖有盈虛為父母之心敢忘惻隱俾除人弊以盪嵗災卿等任重宗卿恩連屬籍省茲陳賀深見忠誠答將軍方元蕩等賀徳音表省表具知朕以時暘舛候春澤愆期思備旱之方無如貶省務動天之徳莫若精誠是以修已恤人去煩節用冀答天戒以致時和卿志竭邦家職修軍衛省茲章表深用嘉之所賀知批宰臣賀下誅廻鶻徳音表封敖省表具知廻鶻背棄恩親犯擾邊鄙梟音不息獸性難馴自號天驕常為國患比者雖聞困弱尚肆猖狂朕念以親姻隱忍而已良思忌器難决用師曾無悔禍之詞屢有干誅之狀戎臣奮志甲士齊心用竒而果建殊勲决勝而且無遺策今則公主歸止元兇遁逃罪惡既盈誅夷難逭用頒制命以正典刑毎思除害之言豈以佳兵為念故非獲已有愧賀章文苑英華巻四百六十六
