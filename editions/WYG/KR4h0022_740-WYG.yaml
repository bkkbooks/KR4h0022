body:
  text: 文苑英華巻七百四十一宋李昉等編封建封建論一首五等論一首漢祖吕后五等論一首吳季札論一首天性論一首反五等六代論一首本論一首封建論并序李百藥貞觀二年朝廷議將封建諸侯百藥於是上封建論以諫之太宗竟從其議論曰臣聞經國庇民王者之常制尊主安上人情之大方思闡治定之規以𢎞長世太宗實錄作久之業者萬古不易百慮同歸然命厯有賒促之殊邦家有理實錄作治亂之異遐觀載籍論之詳矣咸云周過其數秦不及期存亡之理在於邦舊唐書作論國周氏以鑒夏殷之長久遵黄唐之並建維城盤石深根固本雖王綱廢弛而枝幹相持故使逆節不生宗祀不絶秦氏背師古之訓棄先王之道踐華恃險罷侯置守子弟無尺土之邑兆庶罕共治之憂實錄作共人之功故一夫號呼唐書作澤七廟隳圮唐書作祀臣以為自古皇王君臨宇實錄作海内莫不受命上𤣥飛名帝錄遘遇二字諸本作締構遇興王之運殷憂實錄有屬字啓聖之期雖魏武携飬之資漢高徒實錄作厮役之賤非止意有覬覦推之亦不能去也若其獄訟不歸菁華己竭雖帝堯之光被四表大舜之上齊七政非惟唐書作止情存揖讓守之亦不可固焉以放勛重華之徳尚不能克昌厥後是知祚之長短必在天時政或盛衰有闗人事宗周卜世唐書作隆周卜代三十卜年七百雖淪胥之道斯極而文武之噐猶存斯則龜鼎之祚已懸定於杳冥也至使南征不返東遷避逼禋祀如綫郊畿不守此乃陵夷之漸有累於封建焉暴秦運距唐書作短閏餘數鍾百六受命之主徳異禹湯繼世實錄作業之君才非啓誦借李斯王綰之輩咸唐書作盛開四履將閭子嬰之徒俱啓千乘豈能逆帝子之勃興抗龍顔之基命者也然則得失成敗各有由焉而著述之家多守常轍莫不情忘今古理蔽實錄作昧澆淳欲以百王之季行三代之法天下五服之内盡封諸侯王畿千乘貞觀政要作理之間俱為采地是則以政要作將結繩之化行虞夏之朝用象刑之典治劉曹之末紀綱弛唐書作既紊斷可知焉刻唐書作鍥船求劔未見其可膠柱成音唐書作文彌所多惑徒知問鼎請隧有懼勤唐書作霸王之師白馬素車無復藩籬實錄作維之援不悟望夷之釁未甚羿浞之災既罹高貴之殃寧異申繒之酷此乃欽明昏亂自革安危固非守宰公侯以成興廢且數世之後王室浸微始自藩屏化為仇敵家殊俗國異政強凌弱衆暴寡彊塲彼此干戈日尋實錄政要作侵伐臺駘左傳作孤駘之役女子盡髽崤陵之師隻輪不返斯盖畧舉一隅其餘不可勝數陸士衡方􅒑􅒑然云嗣王委其九鼎㐫族㨿其大實錄作京邑天下晏然以治待亂何斯言之謬也而設官分職任賢使能以循良唐書作吏之才膺共治之寄刺舉唐書作郡分竹何代無人至使地或呈祥天不愛寳民稱父母政比神明曹元首方區區然稱與人共其樂者人必憂其憂與人同其安者人必拯其危豈容委以侯伯則同其安危任之牧宰則殊其憂樂何斯言之妄也封君列國藉慶門資忘其先業之艱難輕其自然之崇貴莫不世增淫虐代益驕侈自離宫别舘切漢凌雲或刑左傳作形人力而將盡或召諸侯而共落唐書作樂陳靈則君臣悖禮實錄作亂共侮徴舒衛宣則父子聚麀終誅壽朔乃云為已思治豈若是乎内外羣官選自朝廷擢士庶以任之澄水鏡以鑒之年勞優其階品考績明其黜陟進取事切砥礪情深或俸祿不入私門妻子不之官舍頒條之貴食不舉火剖符之重衣唯補褐實錄唐書並作葛南郡太守政要作南陽郡守幣布裏身莱蕪縣長凝塵生甑專云為利圖物何其爽歟緫而言之爵非世及用賢之路斯廣民無定主附下之情不固此乃愚智之唐書作所辯安可惑哉至如滅國殺唐書作弑君亂常干紀春秋二百年間畧無寧嵗次睢咸秩遂周玉帛之君魯道有蕩每等衣裳之㑹縱使西漢哀平之際東洛桓靈之時下吏淫暴闕必不至此為政之道唐書作理可以一言蔽焉唐書作可以一言以蔽之伏惟陛下握紀御天膺期啓實錄作開聖救億兆之焚溺掃氛祲於寰宇創業垂統配二儀以立徳發號施令妙萬物以唐書作而為言獨照宸衷永懐千古將復五等而脩實錄作循舊制建萬國以親諸侯竊以漢魏以還餘風之弊未盡勛華既往至公之道斯革政要作乖況晉氏失馭宇縣崩離後魏乗時一作時乘華夷雜處重之以闗河分阻吳楚實錄作越懸隔習文學諸本無此字者尚唐書作學長短縱横之術習武藝諸本無此字者盡干戈戰爭之心畢為狙詐之階彌長澆浮之俗開皇在運因籍外家驅御羣英任雄猜之數坐移時運非克定之功年踰二紀民不見徳及大業嗣文實錄作主世道交喪先王唐書作一時人實錄作文物掃地將盡雖天縱神武削平冦虐兵威不息勞止未康自陛下仰順聖慈嗣膺寳厯情深致理唐書作治綜覈前王雖至道難唐書作無名言象所絶唐書作紀非畧陳梗概實所庶幾愛敬蒸蒸勞而不倦大舜之孝也訪安内豎親嘗御膳文王之徳也毎憲司讞罪尚書奏獄大小必察枉直咸舉唐書作申以唐書作舉斷趾之法易大辟之刑情必唐書作仁心隠惻貫徹幽顯大禹之泣辜也正色直言虛心受納不簡鄙訥無棄蒭蕘帝堯之求諫也𢎞奬名教敦勸唐書作勸勵學徒既擢明經於青紫將升碩儒於卿相聖人之善誘也羣臣以宫中暑濕寢膳或違唐書作乖請徙御高明營一小閣遂惜十家唐書作家人之産竟抑子來之願不紊隂陽所感以安卑陋之居去政要作頃嵗㐫唐書作荒實錄政要作霜儉普天饑饉䘮亂甫爾倉廪虛空聖情矜憫唐書作慜通用勤加賑唐書作惠䘏竟無一人流離道路猶且食㗖藜藿樂撒簨􅒶言必悽動貎成臞瘦唐書作癯瘠公且喜實錄作嘉於重譯文命矜其即序陛下每見四夷欵附萬里歸仁必退思進省凝神勤慮恐妄勞中國以求唐書作事逺方不藉萬古之英聲以存一時之茂實心切憂勞跡絶遊幸毎旦視朝聴受無倦智周於萬物道實錄作功濟於溥天唐書作天下罷朝之後引進名臣討論是非傋盡肝膈唯及政事更無異辭纔及日昃必命才學之士賜以清閑高談典籍雜以文詠間以𤣥言一夜忘疲中宵不􅄰此之四道獨邁往初斯實生民以來一人而已𤣥兹風化昭示四方信可以期月之間彌綸天壤而淳朴唐書作粹尚阻浮詭未移此由習之已店書作未乆難以卒變請待琢琱唐書作斵雕成朴以質代文刑措之教一行登封之禮云畢然後定疆理之制議山河之賞未為晩焉易稱天地盈虚以時消息況於人乎羙哉斯言也五等論李公緒盖為天下任勢而不任人任勢者諸侯是也任人者郡縣是也五等之制始於黄唐郡縣之治剏於秦漢守令為政小理察而大勢危諸侯牧民近多違而逺慮固聖人苞彼小違以㨿大安然後足以藩固内外為千百年計得失成敗備在典謨是以其詳可得而說也三代所以長而且治者積仁義又任勢故也秦氏所以短而亂者積刑罰而維持者也漢兼置郡縣雜而任之所以兩代皆二百年自魏晉以降謀不圖逺唯事任人不復任勢是故易代殺伐皆不永年易曰恱以使人人忘其勞孫卿有言不利而利之不如利而後一作復非利之之利世知其為人不如厚已利物不如圖身安上在於恱下為已存乎利人然跡其衰亡恒在同姓失職諸侯㣲弱也故劉頌上書陸機五等論皆欲建立成國令復古制則不可也何者昔舜禹奠九州然後揖讓契棄修仁義二三十世下至湯武然後滅漢書作放弑秦自非子襄穆蠶食諸侯六七百年始皇之時乃并六國以徳者如彼用力者如此甚難故億兆之所咸以為凡帝者必須天人感應世所不測綿歴代序經數十世乃可得耳故絶希望僥倖之心及漢祖起於布衣忽成大業古則承聖王之烈漢祖起於秦之弊不因父祖所資天地提三尺之劔而取天下夫鐫石者難為功摧朽者易為力其勢然也韓英之徒見漢取天下之易故數年之中反者六七王莾之亂南面者蜂起漢獻之時稱制者三國又光武曹馬皆自閭閻而升帝位孫劉二族各㨿一方逮晉之失御九服分崩以迄于今二三百年跨州連郡者二十餘姓皆擅假符璽列置百辟或至數世或盡一身前車雖覆後迹不懲觖望之心死而無悔其懐不遜之意挾無君之心而日致湮滅者不可勝紀今若借之以成國假之以勢權則人欲帝王矣若欲建萬國則宗室功臣朝士外戚亦不至千人矣其無功徳者則無容望封如置數百千國便力强起於驕奢違度之則反漢氏之初可為殷鑒若盡建諸侯興滅繼絶是永無亡國一世之後又有子弟功臣無置之地如此則疎逺者㨿強國親勲者無尺土此周之所以衰自漢以來海内士子官京師編名天朝耻為藩職今一旦令背皇闕趨外邦為諸侯陪臣必不可也其雄俊之人負才之豪當生奸計競尊其主是所謂時移勢異萬國雖賢不可復建設使黄帝更出亦不議之矣是故孔子曰周因於殷禮所損益可知當擇宜於今者而用之耳竊謂宜如漢初置郡國度其強弱逺近領之以牧伯節之以綱紀大都偶國並后匹嫡皆亂之道也其嗣子之立也詔㫖師旅之興當咨牧伯以防未然若有妄舉者而皆國除又天朝之威制其越逸子弟之力足為扞屏選其賢者能者入為公卿出為侯伯此周召晉鄭朱虚齊梁之為也然則骨肉世疎亦不可久令強盛宜法主父推恩分封漸次黜之而受封之君輙屬州牧不可繼於父兄每封世建號使親者恒強疎者稍弱其王侯無子親嗣大功不得及有過皆從國除還屬郡縣更立子第親者以君之則朝廷有恃維城有固此萬世之利也漢祖吕后五等論李翰或稱漢祖建五等封異姓其計得乎高后立王非劉氏其事順乎嘗試論之曰夫思治惡亂體國之常理去危就安宅生之大域然而制業圖逺随化㑹機是非較於毫釐得失差於興㓕可不謂然乎揆夫高祖造漢殷鑒亡秦宗族無尺土一作寸之封子弟立空虚之地故衆枝莫助而孤根易㧞封建之心肇於此矣又為大業可以力取神噐推於命歸思得攬一作包四海以獨富舉百郡而一作以從欲而外誘異端内疑成計及見羣心交阻偶語間興適悟天下不可獨理專欲不能盖衆分利推恩先封雍齒然後將士歛手不懐反覆豪俊息意一作慮知難於一作摇動五等之制於是行焉既而鑾輅龍旗一作旂皆王室穆昭黼衣朱黻即功臣子孫君利世祚人安定主上敦子愛之情下結體信之志羣后固犬牙之勢匹夫絶烏合之舉此所以為計之是也何創五等之議不遵三代之典境土踰溢隄防漏下權敵上都制方偶國過當啓陵僣之端怙強速交爭之兆賈誼痛其將亂晁錯憂其必危卒使諸侯失節朝廷忿忌此所以為計之非也且夫中興之主不讓肇基之勲成務之臣有高一作咸有佐命之力故禮樂大偹取維新之格言琴瑟不調除仍舊之弊法觀乎孝惠既崩高后稱制侯王諸吕何不可哉當若早一作卑署祿産之位宜序親疎之節小其國以圖全薄其勢以逺害而陳平周勃亦分茅錫土將相之後誓同山河舅甥之國穆若唇齒預閉覬覦之心不踐嫌猜之路克復明辟决自我躬高謝夀陵不一作無負先帝安有齊兵之觀變代邸之危疑哉此所以為計之得也神害久盈物無兩大以吕氏之盛跨漢朝之權專禁兵以候疑秉大政以速謗趦趄異姓畜姦俟隙刺促大臣側目相視自投機穽實履憂虞此所以為計之失也嗚呼物有益之而損損之而益凡人臨事多惑視往則明向使高祖吕后觀既徃之勢折一作析當時之疑斷必全之䇿杜未萌之禍則惠文之間無劉吕之難哀平之末有晉鄭是依況復周陳諸家休戚連漢黎獻思徳謳歌未改雖天命興廢孰能明之然人謀叶宻必無悔矣一作皆唐文粹吳季札論獨孤及謹按季子三以吳國讓而春秋褒之余徴其前文於舊史氏竊謂廢先君之命非孝也文粹無也字附子臧之義非公也文粹無也字執禮全節使國簒君弑非仁也文粹無也字出能觀變入不討亂非智也文粹無也字左丘明太史公書而無譏余有惑焉夫國之大經實在擇嗣王者慎徳而文粹作之不建故以賢則廢年以義則廢卜以君命則廢禮是以太伯之奔勾吳也盖避季歴季歴以先王所屬故纂服嗣位而不私太伯知公噐有歸亦斷髪文身而無怨及武王繼統受命作周不以配天之業讓伯邑考官天下也彼諸樊無季歴之賢王僚無武王之聖而季子為太伯之讓是狥名也豈曰至徳且使爭端興于上替禍機作于内室遂錯命於子光覆師於夫差陵夷不返二代而吳㓕以季子之閎集作宏逹博物慕義無窮向使當夀夣之眷命接餘昧之絶統必能光啓周道以覇荆蠻則大業用康多難不作闔廬文粹作閭安得謀於窟室專諸無所施其匕首嗚呼全身不顧其業專讓不奪其志所去者忠所存者節善身牧矣謂先君何與其觀變周樂慮危戚鍾曷若以蕭墻為心社稷是恤復命哭墓哀死事生孰與先釁而動治其未亂棄室以表義挂劔以明信孰與奉君父之命慰神祗之心則獨守純白不義于集作于義嗣是潔己而遺國也吳文粹作國之覆亡君實階禍且曰非我生亂其孰生之哉其孰生之哉天性論論太子李徳裕余開成中作鎭淮服聞東宫為人所構天子赫然大怒召宰相及公卿大僚議於内殿其時諫者僉曰太子㓜年思慮未至亦曰太子之年足以改過徃復移時大畧不出於此夫明主可以理奪其要在於聞所未聞昔千秋上書言子弄父兵罪當笞耳武帝一言而窹盖以簡而當理魏太祖常謂諸子曰吾必不用左右之言以理汝曹何者使左右君子也必不離人父子之間使左右小人也小人之集無此三字言必不可用其時無人以此言窹主因問主上太子之過得於何人言之者與太子㤙愛厚薄何如哉如文宗聰明睿智聞之必窹既窹之後太子必安以余揣之不三數月則父子如初矣盖以父子之愛發於天性言之必當易窹況又一子乎是以漢高覩四皓上夀悲歌鴻鵠宣帝以𤣥成退讓令傳淮陽元帝聞史冊稱噐人於絲竹皷􅎏之間黙然而笑皆屈已捨愛可不謂之天性哉惜乎文宗竟不得一聞是言豈太子之命也歟反五等六代論李谿魏曹元首六代論稱夏殷周與人共治歴世數十秦王獨制二世而亡亦言周氏陵夷侵弱大底非秦廢五等之爵置郡縣之官至晉陸士衡著五等論陳八代秦漢興亡之由言五等之制始於黄唐郡縣之治創自秦灌以為周制萬邦思治羣后圖身及承㣲積弊王室遂卑猶保名位祚埀後嗣秦棄道任術顛沛之釁實由孤立夫百世非可懸御善制不能無弊侵弱愈於殄祀土崩庸於陵夷欲權其多福取其小禍緫二家之㫖皆是五等而非郡縣徒苟救於疾顛而未免於陵夷也譬猶醫者茍欲救人之死而不能愈其病苦豈謂知經脉藥石之本決存亡禍福之機乎且陵夷土崩二患俱免者豈無通論哉但二家不能知耳故皆引五等之長說郡縣之短元首則言五等藩衞引春秋勤王之事以為證欲使秦人割裂州國分王子弟使土有常君人有定主士衡又謂五等之國為己土衆皆我人人安我受其利國傷家嬰其病故為己思制郡縣之長進趨文選作取之情銳安人之譽遲是以侵百姓以利己損實事以飬名故為利圖物以為諸侯享食茅土萬國受世及則南靣之君各務其治九服之人知有定主此皆不知之說也夫春秋之時諸侯擅相攘伐茍欲求霸則以正王室為事故曰求諸侯莫如勤王外雖詐忠以邀名内實包藏禍心以圖神噐此老子所謂將欲弱之必固强之也豈所以為藩衞哉所謂為己思治者誠憂其國傷其家病而致治矣且若國不富兵不强則未出於傷病也若富國彊兵彊陵弱衆暴寡蹙而為九并而為七是豈非古制耶故知雖少其力猶益也比身臂則不同矣夫身手者大小常定也諸侯之土變易者也向使臂指能變而為大小於身又烏可得而使耶是知五等之制不計於大小强弱皆得擅權獨斷自有卿相恣之則不遜削之則怨陵夷逆節固必有矣且士衡云勢足者反疾土狹者逆遲夫土狹既不免逆豈過正境土者之災耶假令小制七國則反有遲速者之小異耳不足稱也豈知郡縣之主權弱勢輕跨有千里負阻山嶠奸謀未畢而身已遷代然而强兵練甲足以禦四夷之患人徒租稅足以濟家國之急則未必無土崩之事而秦漢俱敗豈由此耶元首又徴秦之敗於委政趙高誅夷宗族西漢則王氏擅朝排擯宗室後漢則閹豎執衡孤立於上此乃㓕君親臣强之殃而非郡縣之失也設有侯伯之國則亦助亂而已焉足頼哉由是觀之五等與郡縣其利害相去逺矣向使早覺悟廢五等世及之法立郡縣可制之符以矯周枉威靈不假於臣下及刑戮强兵耶此句疑則必脩文武之業設霸王之術設業固則帝位危矣雖各安其國致天子於何地豈可以為思治哉今郡縣或侵百姓損實事然而升降黜陟在於一人比之侯伯固不為大患也又且奉京師之法禀宰輔之威雖職官遷轉不一而法己定矣五等者世及相承擅更法令如魯作丘甲晉立六軍鄭鑄刑書如此者實繁天下所以安上之國土非愛事身與子孫也安與不安在於立教化正法令國雖一姓而法已萬變豈所以為知有定主哉由是知曹陸之論所謂藩衞者乃簒逆之萌也思治者乃禍亂之萌也定主者乃不定也夫如是則焉有不為患也昔漢有吳楚七國之患元首乃懲之於高祖封建地過古制引賈誼之言欲衆建諸侯而少其力使海内若身之使臂臂之使指則下無背叛之心上無誅伐之事士衡亦謂漢大啓侯王境土踰溢以七國為過正之災若然者則班固漢書賛言周制千八百國載記分天下為九州二百一十國則千八百九十國也公侯百里伯七十里子男五十里其為褊小以極矣其卒也強不一一於骨肉以懲秦失去其弊政用其上䇿如此則可歴世長逺而支𣲖強大矣豈有周室陵遲羸氏土崩之釁乎本論牛希濟周文之先自公劉后稷積徳累仁以至於文王天下之心歸焉猶服事於商武王從兆庶之心順歴數之命以取天下既而有疾嗣王㓜弱乃命周公旦以輔相成王周公以弟之親叔父之尊公其心而不疑焉攝天子履萬乘車輅朝諸侯於明堂以施教化召公不恱四國流言伐四國戮管蔡以安社稷然後制禮作樂七年之後成王齒長徳懋乃歸其政公亦不離王室乃命伯禽受封於魯思不變四海之望逺乎哉君子即周防也若是武王獨知周公之才之美兄弟之國天下之人皆不知也向非周公則非成王之天下也天下疑矣然武王之心公乎哉知子之弱而私之知弟之徳而讓之且憂後世兄第相及豈周之盛徳為不及歟曰是知之深也所以能明輔相其子若有疑焉則與之天下希存其子亦難矣周公雖不為王者然其道則與大王王季文王為同徳矣成康以降名仁者多矣孰可與之為伍盖姬周之得天下未幾而武王崩紂之子祿父猶存若委少主無聖人之助則少康之舉嗣夏左傳作杞夏配天不其偉歟此周公所以孜孜焉為而不有夫其聖徳過於武王逺矣今後王之嗣君也亦莫不蔽於私愛忘其善惡曰彼長也冡嫡也天下之本也莫之可易至有不離襁褓之中童嬰之列而即大位焉亦使強臣而為之輔其詔制之㫖曰周公然也成王然也豈惟政亂國危殆宗廟不血食者有之矣曹馬之君即其人也自征伐以來受命創業之主或起自布衣之中亭長之役部尉之列大夫之家卿相之位或歴試諸難或十年軍中足以知厯數在躬時運興廢經始之艱難臣下之忠良人情之巧偽是以出一言舉一事易一法必使合於典誥埀於後世守文之君也生於深宫長飬於作婦人之手慈愛之鍾焉世子之教不行焉身軀則安於玉堂金殿輿服之盛耳目飽於聲色靡曼之樂曷能知君臣父子之道忠信邪佞之屬農桑艱難之本故小人易欺焉況㓜稚乎且人君之心為天下之晦明仁者樂於明而匪仁者便於暗故時之晦也盗竊興焉魑魅行焉君之晦也賢良死焉邪佞用焉是以小人奸臣唯樂於㓜君少主若保姆之態也以提其耳目導其言語教其喜怒行則行止則止易為之使欲求天下之治可乎況近世之嗣王也始自誕生厥月無問名之禮至於婚冠無金石之樂告廟之儀非莫聞焉春誦夏絃秋詩冬禮上庠齒胄之道或縱不知封爵之命掌言者亦不知其誰師保之道正其身乎左右之人賢與處乎其即位也降先君之冊冡宰與百執事延頸内面而朝新君焉衮冕端拱之黙于殿上雉扇熒煌香煙蓬勃一作起左右紛紛然莫之知也班列千百稱慶而退至於積年之中宰執大臣延英入閤稱述聖徳舞蹈而己使有言者皆申有司徒空言耳敢及於時乎敢及於執權亂政之人乎設有一言明日之制行矣不復用矣歴觀前代明王賢后未嘗不與名臣賢士厚享宴之禮接見之儀俾其忠信相親亡於畏憚通於商較以正先王之得失以窮聖人之能事故兩漢金馬石渠文章之選以備顧問為侍從之臣至有大臣武帳之前亦奏謁或排闥於危疑之際以問安否以圖後事太宗文皇帝貞觀之初比門之選舉十六族也皆建功定策有布衣之交非天下文行之士不預焉既久與遊處非唯知民間之疾苦時之否臧從而更之以熈帝載至於臣下之情性好惡無不悉焉他日之任用莫不適其材矣近世朝廷豈無忠信謇諤之士徒欲致身之危救時之弊指陳千百於上前敷揚其逹乎諫章其賢乎若復稍挂聖慮左右心天顔得之矣又有以惑之矣其朝退也黄門伎女聲樂駢羅俳優之人調笑相雜擁衞以至於内殿又日幸於兩軍遊於其所其從樂乎斷可知矣故自乾符之亂至於今日莫可救止盖少主奸臣之所為也或曰冡嫡之㓜善惡未知思欲易之以卜長世廢嫡立庶聖人所惡未知其可也曰君人者上以安宗廟下以庇蒸人雖長嫡之義其不善易之可矣且仲雍王季之長子讓西伯之聖徳斷髪文身以避於吳為吳太伯盖成父之志也隠公魯之賢君居位稱攝欲讓其弟後疑其長矣吾將與之桓公聴羽父之譛以疑其兄致於簒弑又晉襄公之薨也子周有兄而不慧不能辨菽麥羣臣迎公子周以立政是以治三駕而楚不能爭又穆公之亡也君無長子趙盾思立長君乃迎公子雍於秦將欲立之穆嬴朝夕抱太子以朝且泣曰先君以此子之賢吾受子之賜此子不才唯子是怨今君雖終言猶在耳此子何罪而外求君趙孟懼大義於衆人遂背秦好立靈公㓜而好虐竟為所殺國是以亂漢高帝遷都長安也以吕后爐於糟糠其子盈為太子上以趙王如意似我知盈懦弱卒不能易及惠帝之世幾為吕嫗所㓕非平勃之不能加誅及擇諸王之賢者迎王於代邸是為文帝不十年幾致刑措又昌邑之亂霍子孟定廢立之冊立宣帝遂獲中興衞伯玉之於晉武也君臣之交矣知主鬯之不惠必傾世祚撫其床而歎曰此座甚可惜也帝心不悟終以正度為君果致元海倡四方之亂宗廟焚毁兩京版蕩懐愍二帝俱為俘執而崩晉祚中絶國分為十六普天之下皆墜爐炭比惠帝之所為也是知冡嫡賢而臣擇立者必亡若立嫡為亂執古之道乎擇善為治曰亂嫡庶之制乎且天子之孝以安宗廟克荷祖考之業卜世於長久豈以擇善廢不肖為罪乎至唐虞之君知其子朱均不肖不可付以宗廟之重又懼其流毒於生民乃棄其子而禪於有徳若次子之賢遽以配天之業授於他人乎是知君惟其明不必拘伯仲之制易曰明兩作離洊雷震若不明不法此覆國亡家之罪人也何長之為若君明於上小人比周之黨其能進乎其獲用乎其寘於亂乎主少不明者亂之本也故曰元良者天下之本也莫若先以正之正之者非在廢長擇善而己無使叔孫之禱曰主少國家多難祝我者使我速死無及於亂此憂之深也悲哉文苑英華巻七百四十一
