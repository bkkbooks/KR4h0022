body:
  text: 文苑英華巻六百七十五宋李昉等編諫諍上諫陳後主書一首諫唐太宗詰難公卿書一首諫靈駕入京書一首諫政理書一首論時政書一首諫陳後主書書奏即日斬之章華見陳書本傳昔髙祖南平百越北誅逆虜世祖東定吳㑹西破王琳湘州刺史王琳不應命世祖平之髙祖克復淮南闢地千里三祖之功亦至勤矣陛下即位于今五年不思先帝之艱難不知天命之可畏溺於嬖寵惑於酒色祀七廟而不出拜妃嬪而臨軒老臣宿將棄之草莽謟佞讒邪昇之朝廷今疆場日蹙隋軍壓境陛下如不改絃易張臣見麋鹿復遊姑蘇臺矣諫唐太宗詰難公卿書已見六百二十三巻劉洎諫靈駕入京書中宗即位初年陳子昻梓州射洪縣草莽愚臣陳子昻謹頓首冒死獻書闕下臣聞明主舊唐書作王不惡切直之言以納忠烈士不憚死亡之誅以極諫故有非常之策者必待非常之時有一作得非常之時者必待非常之主然後危言正色抗議直辭赴湯鑊而不廻至誅夷而無悔豈徒欲詭代誇俗厭生樂死者哉實以為殺身之害小存國之利大故審計定議而甘心焉况乎得非常之時遇非常之主言必獲用死亦何驚千載之蹟將不朽於今日矣伏惟大行皇帝遺天下棄羣臣萬國震驚百姓屠裂陛下以徇齊之聖承宗廟之重天下之望喁喁如也莫不冀䝉聖化獲唐書作以保餘年太平之主將復在於今一作兹日矣况太后又以文母之賢叶軒宫之耀軍國大事遺詔决之唐虞之際於斯唐書有為字盛矣臣伏見詔書梓宫將遷坐京師一作西京鑾輿亦欲陪幸計非上策智者失圖廟堂未聞一有有字骨鯁之謀一作謨朝廷多一有見字有順從之議愚臣竊惑唐書無此字以為過矣伏自思之生聖日沐皇風摩頂至踵莫非亭育不能歴丹鳳抵濯龍北面玉階東望唐書作面金屋抗音而正諫者聖王之罪人也所以不顧萬死乞見唐書作陳一言願蒙聽覽甘就鼎鑊伏惟陛下察之臣聞秦據咸陽之時漢都長安之日山河為固天下服矣然猶北假胡苑一作宛之利南資巴蜀之饒自渭入河轉闗東之粟踰沙絶漠致山西之寳然後能削平天下彈壓諸侯長轡利策横制宇宙今則不然燕代迫匈奴之侵巴隴嬰吐蕃之患西蜀疲老千里運一作嬴糧北國丁男十五乗塞歲月奔命其弊不堪秦之首尾今為闕矣即所餘者獨三輔之間爾頃遭荒饉人被荐飢自新唐書作薄河而西無一作莫非赤地循隴已集作以北罕逢青草莫不父兄轉徙妻子流離委家䘮業膏原潤莽此朝廷之所備知也賴以宗廟神靈皇天悔禍去歲薄稔前秋稍登使羸餓之餘得保沉一作性命天下幸甚可謂厚矣然而流人未返田野尚蕪白骨縱横阡陌無主至於蓄積猶可哀傷陛下不料其難貴從先意遂欲長驅大駕按節秦京千乗萬騎何方取給况山陵初制穿復未央土木工匠必資徒役今欲率疲弊之衆興數萬之軍徴發近畿鞭朴羸老鑿山採唐書作載石驅以就功但恐春作無時秋成絶望凋瘵遺噍再罹飢一作艱苦儻不堪其弊有一一作必有逋逃子來之頌其將何詞以述六字一作將何以述之此亦宗廟之大機不可不深一作審圖也况國無兼歲之儲家鮮匝時之蓄一旬不雨猶可深憂忽如水旱人何以濟陛下不深察始終獨違羣議臣恐三輔之弊不止如前日矣且天子以四海為家聖人包六合為宇歴觀邃一作逺古以至于今何嘗不以三王為仁五帝為聖故雖周公制作夫子著明莫不祖述堯舜憲章文武為百王之鴻烈作千載之雄圖一作貞規然而舜死陟方葬蒼梧而不返禹㑹羣后歿稽山而永終豈其愛蠻夷之鄉而鄙中國哉實欲將一作將欲示聖人之一無之字無外也故能使墳籍以為美談帝王以為髙一作懿範况我巍巍大聖轢帝登皇日月所照一作臨莫不率俾何獨秦豐之地可置山陵河洛之都不堪園寢陛下豈一有可字不察之愚臣竊為陛下惜也且景山崇麗秀冠羣峯一作岑北一作南對嵩邙西望汝海居祝融之故地連太昊之遺墟帝王圖跡縱横左右園陵之美復何加焉陛下曾未察之謂其不可愚臣鄙見良足尚矣况瀍澗之中天地交㑹北有太行之險南有宛葉之饒東壓江淮食湖海之利西馳崤澠據闗河之寳以聰一作聖明之主養淳一作純粹之人天下和平恭已正南面而巳陛下不思瀍洛之壯觀闗隴之荒蕪遂唐書作乃欲棄太山之安履焦原之險忘神器之大寳徇曾閔之小節愚臣暗一作䦣昧以為甚也陛下何不覽諫臣之策採行路之謡諮謨集作謀太后平章宰輔使一作協蒼生之望知有所安天下豈不幸甚昔者平王遷周光武都洛山陵寢廟不在東京宗社墳塋並居西土然而春秋美為始王漢書載為代祖豈其不願孝哉何聖賢褒貶於斯濫矣實以時有不可事有不然蓋欲遺小存大去禍歸一作存福聖人所以為貴也夫小不忍則亂大謀仲尼之至誡願一作伏惟陛下察之若以臣愚不用朝議遂行臣恐闗隴之憂無時休也一作息臣又聞太原蓄鉅萬之食洛口積天下之粟國家之寳唐書作資斯為大矣今欲捨而不顧背以長驅使有識驚嗟天下失望儻䑕竊狗盗萬一不圖西入陜州之郊東犯武牢之鎮盗敖倉一杯之粟陛下何以遏之此天下之至機不可不深懼唐書作料也雖則盗未旋踵誅刑巳及滅其九族焚其妻子泣辜雖恨將何及焉故曰先謀後事者逸先事後圖一作謀者失然而一無此字國之利器不可以示人斯言不徒設一作云也願陛下念之臣西蜀野人本在林藪幸屬交泰得逰王國故知不在其位者不謀其政亦欲退身巖谷滅跡朝廷竊感婁敬委輅干其非議圖漢策於萬全取鴻名於千古臣何獨怯而不及之哉所以敢觸龍鱗死而無恨庶萬有一中或垂察焉臣子昻誠惶誠恐頓首頓首死罪死罪一作皆文粹諫政理書武后垂拱初月日梓州射洪縣草莽愚臣陳子昻謹冒死稽首百集作再拜獻書闕下臣子昻西蜀草茅賤臣也以事親餘暇得讀書竊少好三皇五帝王覇之經歴觀丘墳旁覽代史原其政理察其興亡自伏羲神農之初至于周隋之際馳騁數百年雖未得其詳而略可知也莫不先本人情而後化之過此以徃亦無神異獨軒轅氏之代欲問廣成子以至道之精理于天下臣雖竒之然其說不經未足信也至殷髙宗亦延問傅說然纔救弊未能宏逺自此之後殆不足稱臣每在山谷有願朝廷常恐沒代而不得見也豈知霑沐聖化未天天年幸得逰京師覩皇風親逢大聖之詔布于天下問于賢士大夫曰何道可以調元氣賤臣孤陋誠未足知然臣竊觀自古帝王問政之原備矣未有能深思逺慮卓絶今古集作古今如陛下者也故賤臣不勝區區願竭固陋以聞見言之雖未足對揚天休然或萬一有可觀者敢冒昧闕廷奏書以聞伏惟皇太后陛下少加察焉臣聞之於師曰元氣者天地之始萬物之祖王政之大端也天地之道莫大乎隂陽萬物之尊莫大新唐書作靈乎黔首王政之貴莫大唐書作先乎安人故人安則隂陽和隂陽和則天地平天地平則元氣正矣是以古先帝代見人之通於天也天之應乎人也天人相感隂陽相和災害之所以不生嘉祥之所以作遂一作遂作則觀象於天察法於地財成天地之道輔相天地之宜以左右民於是養成羣生奉順天徳故人得安其俗樂其業甘其食美其服隂陽太和元氣以正天瑞降地符昇風雨以時草木不落唐書作茂遂龜龍麟鳳在郊藪矣洎顓頊唐虞之間不敢荒寧亦克用理故其書曰百姓昭明協和萬邦黎民於變時雍乃命羲和欽若昊天歴象日月星辰敬授人時亦能和也唐書作和之得也至夏徳衰亡殷政微䘮桀紂昏暴亂于天道殺戮無罪放棄忠良遂竭天下之力殫天下之貨作為瑶臺起乎瓊室極荒娛之樂窮耳目之玩傾宫之女至數千人竒技淫巧以億萬計信巫鬼聽讒邪遂為糟丘酒池炮烙之刑一朝牛飲者三千人龍逢不勝其憂諫而死箕子不堪其憤囚為奴於是隂陽大乖唐書作乖行天地震怒山川鬼神發見災異唐書作發妖見災疾疫大興妖孽並作而桀紂不悔卒以滅亡此集無此字和之失也逮周文武創業順天應人誠信忠厚加于百姓徳澤休泰興乎頌聲成康之時刑措三唐書作四十餘年天人之道始和矣幽厲之末復亂厥常苛慝暴虐詬黷天地百川沸騰山冡崒崩人以唐書作用愁怨疾癘為作故其詩曰昊天不傭降此鞠凶昊天不惠降此大厲唐書作戾不先不後為瘥唐書作虐為瘵天地生人之理復悖於兹矣嗚呼豈不哀哉豈不哀哉近者有隋氏亦不克終厥初隋髙帝之有天下也以六合為家方將對越天人傳之萬代至煬帝承平自以貴為天子富有四海欲窮宇宙之觀極逰宴之樂以為人主之急務也於是乃鑿御渠决黄河自伊洛之間而屬之揚州生人之力既弊天地之藏又洩煬帝方欣然以為得計將後宫綵女數百千人遂泛龍舟逰三江五湖之間當其得意也視天下如脫屣耳其後百姓搔弊災變數興吏人貪暴其政日亂隂陽感怒彗孛以出煬帝不悟自以為天下安於泰山方率百萬之師以事遼東當時山東父子不得相保也天厭暴政人懐亂亡故遼東之役未歸而中國之難已起身死逆唐書作人手宗廟以隳唐書作為墟其故何哉逆天人唐書作元氣之理也是以臣每察天人之際觀禍亂之由跡帝王之事念先師之說昭然著明信不欺爾不意陛下以大聖之慮見天人之心將欲調元氣之綱返淳和之治自非陛下合唐書作含天地之徳有日月之明誰能渺然逺思欲求太和於元氣哉此昔日伏羲氏之所以本天人而為三皇首也愚臣暗昧不勝大願願陛下為大唐建萬代之策恢三聖之功傳乎子孫永作鴻業千百年間使繼文之主有所守也非甚無道不失厥嗣陛下可不務之哉臣伏見天皇大帝得天地之統封于太山盛徳大業與天比崇矣然尚未建明堂之宫遂朝唐書作享上帝使萬代鴻業今猶闕然臣愚意者豈非天皇大帝知陛下聖明必能起中興之化留此盛徳發揮陛下哉不然何所與讓而未作也今陛下欲調元氣睦人倫躋俗仁夀興風禮讓捨此道也于何理哉故臣不勝區區螻蟻之誠思願陛下念先帝之休意恢大唐之鴻業於國南郊建立明堂使宇宙黎元遐荒夷貊昆蟲草木天地鬼神燦然知陛下方興三皇五帝之事與天下更始不其盛哉昔者黄帝合宫有虞總章唐堯衢室夏后代室羣聖所以調元氣理隂陽於此教也臣雖未學竊嘗聞明堂之制也有天地之則焉有隂陽之統焉二十四氣八風十二月四時五行二十八宿莫不率備故順其時而為政也則風雨時寒暑平萬物揚茂五榖豐稔元氣不錯隂陽以和逆其時而為政也則水旱興疾疫起蟲螟為害霜雹成災隂陽不和元氣以錯故昔者聖人集有所字以為政教之大業也是以臣願陛下為大唐建萬代之策者意在兹乎陛下若不以臣微而廢其言乞以臣此章與三公九卿賢士大夫議之於朝集作廷儻事便於今道不逺古即請陛下徴天下鴻生鉅儒賢良豪俊之士博通古今皇王政理之術與之按周禮月令而建之臣必知天下庶人子來不日而成也乃正月孟春陛下乗鑾輅駕蒼龍載青旂佩蒼玉三公九卿賢士大夫鴻儒碩老衣冠之倫朝于青陽左个負斧扆憑玉几南面以聽天下之政於是遂發大號宣布四方各順十二月之令無敢有逆乃命太史守典奉法司天日月星辰之行無失經紀以初為常陛下遂躬籍田親蠶以勸天下之農桑養三老五更以教天下之孝悌明訟恤獄以息天下之淫刑除殘去暴以致天下之仁夀脩文尚徳以止天下之干戈察孝興㢘以除天下之貪吏鰥寡孤獨疲癃羸老不能自存者賑恤之後宫美人非三妃九嬪八十一御女之數者出嫁之珠玉錦綉雕琢伎巧之飾非益於理者悉棄之巫鬼淫祀誑唐書作營惑良人者禁殺之陛下務以至誠躬服質素以為天下先愚臣以為不出數年之間將見太平之化也天人之際既洽鬼神之望允塞然後作雅樂潔粢盛宗祀天皇於明堂以配上帝使萬國各以其職來祭豈不休哉臣伏惟陛下至徳明聖未有能越行此道者也故臣竊以為此化一成則人倫之道自睦刑罰之原自息兵革之事不興還淳之途可見仁夀禮讓稼穡農桑不言而自致也是以賤臣未得為陛下一二論之何者聖人之教在於可大可久者故臣欲陛下振領提綱使天下自理也然臣竊獨有私恨者恨陛下方欲興崇大化而不知國家太學之廢積歲月矣堂宇蕪穢唐書作皇堂埃蕪殆無人蹤詩書禮樂罕聞習者陛下明詔尚未及之愚臣所以有私恨也臣伏聞天子立太學可以聚天下英賢為政教之首故君臣上下之禮於是興焉揖讓罇俎之節於此生焉是以天子得賢臣由此道也今則荒廢委而不論而欲睦人倫興禮讓失之於本而求之於末豈可得哉况君子三年不為禮禮必壊三年不為樂樂必崩奈何天子之政而輕禮樂哉臣所以獨竊有私恨者也陛下何不詔天下胄子使歸太學而習業乎其集作斯亦國家之大務也臣愚䝉所言事未曲盡者恐煩聖覽陛下恕臣昏昧請賜他日别具奏聞論時政書睿宗景雲中柳澤頃者一有因字韋氏險詖新唐書作蠱亂姦臣同惡賞罰紊弛綱紀紛淪政以賄成官因寵進言正者獲戾行殊者見疑海内寒心實將莫救頼神祗舊唐書作明祐徳宗廟降靈天討有罪人心不休諸本作人用不保陛下睿謀神聖勇智聰明安宗廟一作社於巳危拯新唐書作振黎庶於將溺今龎眉鮐背歡欣踴躍望聖朝之撫輯聽聖朝之徳音今陛下蠲煩省徭法明徳舉萬邦愷樂室家胥慶臣又聞危者安其位也亡者保其存也亂者有其治也危者至理也十八字一作危者安其位者也亂者有其治者也伏惟陛下安不忘危治不忘亂存不忘亡則克享天心國家長保矣一作也詩曰罔一作靡不有初鮮克有終伏惟陛下慎厥終惟其初非禮勿視非禮勿聽非禮勿言非禮勿動書曰爾一無此字惟徳罔小萬邦惟慶爾一無此字惟不徳罔大墜厥宗甚可畏也甚可懼也伏惟陛下慎之哉夫驕奢起於親貴綱紀亂於寵倖願陛下禁之於親貴則天下風隨唐書作隨風矣制之於寵倖則天下法明矣詩云刑于寡妻至于兄弟以御于家邦若親貴為之而不禁寵倖撓之而見從是政之不行令之不一則姦詐斯起暴亂生焉雖嚴刑峻政朝戮新唐書作施暮戮而法不行矣十四字一作雖嚴刑制戮而法不行矣縱陛下親之愛之莫若安之福之寵祿之過罪之漸新唐書作階也非安之也驕奢之淫危之本新唐書作梯也非福之也前事不忘後之師也伏惟陛下精新唐書作敷求俊哲新唐書有使字朝夕納諫一作誨縱有逆于耳謬于心者無速之以罰姑籌之以道省于厥躬雖木樸妄誤唐書作忌忤一作忌諱願恕之以直用開諫諍之路也或有順於耳便於身者無急之以賞當求諸非道稽之典訓其不叶於徳必寘之以法用杜側媚之行也有進一作羞淫巧於陛下者遽黜之則淫巧息矣有進忠讜於陛下者遽賞之則忠讜進矣臣又聞生於富者驕生於貴者傲石碏曰臣聞愛子教之以義方弗納于邪驕奢淫逸所自邪也書曰罔淫於逸罔逰於樂穆王有命曰實頼前後左右有位之士繩愆糾謬格其非心今儲宫肇建王府初新唐書作復啓至於僚友必惟妙擇今驕奢之後流遁未變慢逰之樂餘風或存夫小人弄臣易合於意竒伎淫巧多適於心臣恐狎於非徳滋為奢怠書曰慎簡乃僚無以巧言令色便僻側媚其惟吉士僕臣正厥后克正僕臣諛厥后自聖伏願採温良博聞之士恭儉忠鯁之人任用一無用字以為東宫及諸王府官仍請東宫量署拾遺補闕之職令朝夕講論出入侍從受以訓誥交修不逮臣又聞馳騁畋獵令人心諸本無心字發狂名教之中自有樂地承前貴戚鮮克由禮或打毬擊皷比周伎藝一作術或飛鷹奔犬盤逰藪澤此甚為不道非進徳修業之本也書曰内作色荒外作禽荒又曰無若丹朱傲惟慢逰是好朋淫于家用殄厥世伏惟陛下誕降謀一作謨訓敦勸學業示之以好惡陳之以成敗以義制事以禮制心圖之於未萌慮之於未有則福遐祿厚一作福禄常享與國並休矣臣又聞富不與驕期而驕自至驕不與罪期而罪自至罪不與死期而死自至信明語可誡之矣一作信矣斯語明哉至誡頃者韋庶人安樂公主武延秀等可謂貴矣可謂寵矣權侔人主威震天下然怙侈滅徳神怒人棄豈不謂愛之太極富之太多不節之以禮不防之以法終轉吉為凶變吉一作福為禍諺曰千人所指無病自死不其然歟書曰殷鑒不逺在彼夏王今陛下何勸之諸本無之字豈非皇祖謀訓之則也今陛下何懲之諸本無之字豈非中宗一作孝和寵任之甚也禮曰愛而知其惡憎而知其善可不慎哉夫寵愛之心人則不免一作則不能免去其太甚閑之禮節適則可矣今諸王公主駙馬亦陛下之所親愛也驕狂二唐書作矯枉之道在於厥初鑒戒之義其則不逺使觀過務善居寵思危庶夙夜惟寅聿脩厥徳經曰在上不驕髙而不危所以長守貴也制節謹度滿而不溢所以長守富也富貴不離其身然後能保其社稷書曰制官刑警于有位敢有恒舞于宫酣歌于室時謂巫風敢有徇一作殉于貨色恒于逰畋時謂淫風敢有侮聖言逆忠直逺耆徳比頑童時謂亂風惟兹三風十愆卿士有一于身家必䘮邦君有一于身國必亡甚可畏也甚可懼也伏惟陛下必察而明之必信而勸之有奢僭驕怠者削其禄封有樸素脩業者錫以車唐書作紳服以懲諸本作朂其非心使奉其命無使乆而忽之無使逺而墜之臣聞非知之難一作知之非艱行之惟難一作艱又曰常厥徳保厥位厥徳匪常九有以亡伏惟陛下慎之哉前車之覆實惟明證先王之訓誡一作可以終吉若陛下奉伊尹之訓崇傅說之命不作無益不啓私門刑不差賞不濫則惟徳是輔惟仁二唐書作人之懐天祿永終景福是集儻陛下忽唐書作忘精一之徳開恩倖之門爵賞有差刑罰無當則忠臣正士亦不復談矣一作皆唐文粹文苑英華巻六百七十五
