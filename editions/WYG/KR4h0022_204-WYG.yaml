body:
  text: 文苑英華巻二百四宋李昉等編樂府十三長門怨二十首長信宫五首西宫秋一作愁怨二首昭君怨三十五首班婕妤怨九首銅雀臺七首銅雀妓九首湘妃怨二首長門怨喬備秋入長門殿木落洞房虚妾思宵徒静君恩日更疎墜露清金閣流螢㸃玉除還將閨裏恨遙問馬相如同前沈佺期月皎風泠泠長門次掖庭玉階聞墜葉羅幌見飛螢清露凝珠綴流塵下翠屏妾心君未察愁嘆劇繁星同前崔顥君王寵初歇棄妾長門宫紫殿青苔滿髙樓明月空夜愁生枕席春意罷簾櫳泣盡無人問容華落鏡中同前劉長卿何事長門閉珠簾只自垂月移深殿早春向後宫遲蕙草生閒地梨花發舊枝芳菲似恩幸看著一作却被風吹同前岑參君王嫌妾妬閒妾在長門舞袖垂新寵愁眉結舊恩緑錢侵一作生履跡紅粉濕啼痕羞被夭桃一作桃花笑看春獨不言同前賈至獨坐思千里春庭曉景長鸎喧翡翠幙栁覆欝金堂舞蝶縈愁緒繁花對靚粧深情託瑶瑟絃斷不成章同前盧綸空宫古廊殿寒月落斜暉卧聽未央曲滿箱歌舞衣同前釋皎然春風日月閉長門摇動春心似夢䰟若遣花開只笑妾不如桃李自一作正無言同前戴叔倫自憶専房寵曽居第一流移恩向他處一作向處去又作向何去暫妬不容收夜静一作夕管絃一作絃管絶月明宫殿秋空將舊時意長望鳯凰樓同前裴文泰一作交太自閉長門經㡬秋羅衣濕盡淚還流一種蛾眉明月夜南宫歌吹一作管北宫愁同前齊澣宫殿沉沉月欲分昭陽更漏不堪聞珊瑚枕上千行淚不是思君是恨君一作半是思君半恨君同前劉臯營營孤思逼寂寂長門夜一作夕妾妬亦知非一作君君恩那不借一作惜携琴就玉堦調悲聲未諧將心寄一作記明月流影入君懐同前劉言史獨坐爐邊結夜愁暫時恩去亦難收一作留手持金筯垂紅淚亂撥寒灰不舉頭同前耿緯聞道昭陽宴嚬蛾落葉中清歌逐寒月遙夜入深宫同前楊衡絲聲繁兮管聲急珠簾不捲風吹入萬遍凝愁枕上聽千廻候命花間立望望昭陽信不來廻眸獨掩紅巾泣同前劉緩雨滴梧桐秋夜長愁心和淚一作雨到昭陽啼痕不學君恩斷拭却千行更萬行同前劉得仁争得一人聞此怨長門深夜有妍姝早知雨露翻相誤只挿荆釵嫁匹夫同前張喬一作劉駕御泉長繞鳯凰樓自一作只是恩波别處流閒蝶舞衣歸未得夜來砧杵六宫秋同前二首王貞白寂寞故宫春殘燈曉尚存從来非妾過一作妬偶爾失君恩花落傷容鬂鶯啼驚夢魂翠華如可待應免老長門二葉落長門静苔生永巷幽相思對明月獨坐向空樓鑾駕迷終轉蛾眉老自愁昭陽歌舞伴此夕未知秋右長門怨詩劉臯耿緯楊衡劉緩王貞白第二首皆用昭陽字按昭陽乃趙飛燕事與陳后長門宫不相闗此所未詳長信宫一作婕妤怨崔國輔長信宫中草年年愁處生為一作時又作故侵珠履跡不使玉堦行同前一作長信怨王昌齡金井梧桐秋葉黄珠簾不捲夜來霜薰籠一作金爐玉枕無顔色卧聽南官一作宫中清漏長二奉箒平明秋一作金殿開且一作暫將團扇共徘徊玉顔不及寒鴉色猶帶昭陽日影來右三首此集元在長門怨中今以文粹及郭茂倩樂府改作長信宫同前田氏團圓手中扇昔為君所持今日君棄捐復值秋風時悲將入篋笥自嘆知何為同前劉方平夢裏君王近宫中河漢髙秋風能再熱團扇不辤勞同前王昌齡芙蓉不及美人粧水殿風來珠翠香誰問一作分含啼掩秋扇空懸明月待君王二西宮夜静百花香欲捲珠簾春恨長斜抱雲和深見月朧朧樹色隠昭陽昭君怨梁簡文帝玉艶光瑶質金鈿婉黛紅一去葡萄觀長别披香宫秋檐照漢月愁帳入胡風妙工偏見詆無由情恨通同前沈約朝發披香殿夕濟汾隂河於兹懐九折自此歛雙蛾霑粧如一作凝湛露繞臉一作臆狀流波日見奔沙起稍覺轉蓬多胡風犯肌骨非直傷綺羅銜涕試南望關山鬱嵯峨始作傷春曲終成苦寒歌唯有三五夜明月蹔經過同前武陵王塞外無春色邊城有夙霜誰堪覽明鏡持許照紅粧同前何遜一何妥昔聞别鶴弄已自軫離情今來昭君曲還悲秋草并同前梁王叔英妻劉氏一生竟何定萬事良一作最難保丹青失舊儀玉匣成秋草想妾辭關淚至今猶未燥漢使汝南還殷勤為人道同前二首梁范静妻沈氏早信丹青巧重賂一作貨洛陽毛延夀長安人作洛陽非師千金畫一作買蟬鬢百萬寫蛾眉二今朝猶漢地明旦入胡關髙堂歌吹少逰子夢中還一作情寄南雲反思逐北風還同前梁施榮泰重羅下椒閣舉袖拂胡塵寂寞一作唧唧撫心嘆蛾眉誤殺人同前張正見塞樹暗胡塵霜樓明漢月淚染上春衣憂變華年髮同前隂鏗一作陳昭跨鞍今永訣垂淚别親賔漢地随行盡胡關逐望新交河擁寒霧一作露隴日一作首䦣沙塵唯有孤明月猶能送逺一作逺送人同前二首庾信拭啼辭戚里廻顧望昭陽鏡失菱花影釵除却月梁圍腰無一尺垂淚有千行緑衫承馬汗紅袖拂秋霜别曲真多恨哀絃須更張二斂眉光禄塞遙望夫人城片片紅粧落雙雙淚眼生氷河牽馬度雪路抱鞍行朔風入骨冷夜月照心明方調琴上曲變作胡笳聲同前陳後主圖形漢宫裏遙聘單于庭狼山聚雲暗龍沙飛雪輕笳吟度隴咽笛轉出關鳴啼粧塞一作寒葉下初月愁眉生一作愁眉初生月只餘馬上曲猶作别時聲同前薛道衡我本良家子充選入椒庭不䝉女使進更失畫師情蛾眉非本質蟬鬂改真形専由妾命薄一作蹇誤使君恩輕啼霑一作落渭橋路嘆别長安城夜依一作今夜寒草宿朝逐一作朝朝轉蓬征却望闗山逈前瞻沙漠平胡風帶秋月嘶馬雜笳聲毛裘易羅綺氊帳代帷屏自知蓮臉歇羞看菱花明釵落終應棄髮一作髻解不須縈何用單于重詎假閼氏名駃騠聊强食桐酒未能傾心随故鄉斷愁逐塞雲生漢宫如有憶為視旄頭星同前盧照隣金殿思中絶交河使漸稀肝腸随一作辭玉輦形影向金微漢宫草應緑胡庭沙正飛願逐三秋鴈年年一度歸同前駱賔王斂容辭豹尾緘恨一作怨度龍鱗金鈿明漢月玉筯染胡塵粧一作古鏡菱花暗愁眉栁葉顰唯有清笳曲時聞芳樹春同前張文琮我途飛萬里廻首望三秦忽見天山雪還疑上苑春玉痕垂淚粉一作粉涙羅袂拂胡塵為得夣中曲還悲逺嫁人同前二首董思恭琵琶馬上彈行路曲中難漢月正南逺燕山直北寒髻鬟風拂亂一作散眉黛雪沾殘斟酒紅顔改一作盡徒勞握鏡看一作何勞鏡裏看二新年猶尚小那堪逺聘秦裾衫沾馬汗眉黛染胡塵舉眼無相識路逢皆異人唯有梅將李猶帶故鄉春同前三首陳方虬漢道今一作初全盛朝廷足武臣何煩一作湏薄命妾辛苦逺和親二揜涕辭丹鳯銜悲向白龍單于浪驚喜無復舊時容三塞外無青草一作胡地無花草春來不似春自然衣帶緩非是覔一作為腰身同前郭元振聞有河南一作南河信傳言殺畫師始知君念一作恵重更復惜一作遣盡蛾眉同前銜悲出漢闗落淚洒胡鞍闗榆三夏凍塞栁九春寒眉任愁中結腰随帶裏寛别曲易悽斷哀絃不忍彈同前顧朝陽莫將鉛粉匣不用鏡花光一去邊城路何情更畫粧影銷胡地月衣盡漢宮香妾死非關命都一作抵緣怨斷腸同前上官儀玉關春色曉一作晩金河路㡬千琴悲桂條上笛怨栁花前霧掩臨粧鳯一作月風驚入鬢蟬緘書待還使淚盡白髙一作雲又作日天同前二首李白漢家秦地月流影送明妃一上玉關道天涯去不歸漢月還從東方出明妃西嫁無来日焉支長寒雪作花娥眉顦顇没胡沙生乏黄金枉圗畫死留青塜使人嗟二昭君拂玉鞍上馬啼紅頰今日漢宫人明朝胡地妾同前二首儲光羲日暮驚沙亂雪飛旁人相勸易羅衣强来前帳看歌舞共待單于夜獵歸二胡王知妾不勝悲樂府皆傳漢國詞朝来馬上箜篌引稍似雲一作宫中閒夜時同前釋皎然自倚嬋娟望主恩誰知美惡忽相翻黄金不買漢宫貌青塜空埋胡地魂同前梁氏瓊自古有一作無和親天移一作貽到妾身朔一作胡風嘶去馬漢月弔行輪衣薄狼山雪粧成虜塞春回看父母國生死畢胡塵同前白居易明妃風貌最娉婷合在椒房應四星只得長一作當年備宫掖何曽専夜奉帳一作幃屏見踈從道迷圖畫知屈那教配虜庭自是君恩薄如紙不湏一向恨丹青同前二首時年十七滿面胡沙滿面風眉銷殘黛臉銷紅愁苦辛勤顦顇盡如今却似畫圗中二漢使却廻慿寄語黄金何日贖蛾眉君王若問妾顔色莫道不如宫裏時班婕妤怨梁孔翁歸長門與長信日暮九重空雷聲聽隠隠車響絶籠籠一作瓏瓏恩光随妙舞團扇逐秋風鉛花誰不見一作慕人意自難同一作終同前梁劉孝綽應門寂已閉非復後庭時况在青春日萋萋緑草滋妾身似秋扇君恩絶履綦誰一作詎憶逰輕輦徒令一作從今賤妾辭同前梁何思澄寂寂長信晩雀聲愁洞房蜘蛛網髙閣駮蘚􅀍長廊虚殿簾帷寂小堦花蘂香悠悠視日暮還復守一作拂空床同前梁徐俳妻劉氏日暮應門閉愁思百端生况復昭陽近風傳歌吹聲寵移真一作終不恨讒枉太無情抵言爭分理非妬一作獨舞腰輕同前陳隂鏗栢梁新寵盛長信昔恩傾誰為諸人巧一作詩書重翻為歌舞輕花月分窓進苔草共堦生睫一作妾又作憶淚衫前滿单眠魂一作夢裏驚可惜逢秋扇何用合歡名同前崔湜不分君恩斷新粧視鏡中容華尚春日嬌色已秋風枕席臨燈一作窓曉屏帳一作帷屏向月空年年後庭樹榮落在深宫同前王維宫殿生秋草君王寵一作恩幸疎那堪聞鳯吹門外度金轝同前女郎劉雲君恩不可再一作見妾豈如秋扇秋扇尚有時妾身永微賤莫言朝花不復落嬌容㡬奪昭陽殿同前陳標掌上恩移玉帳空香珠滿眼泣春風飄零怨栁凋眉翠狼籍愁桃墜臉紅鳯輦秪應三殿北鸞聲不散五湖中笙歌處處廻天睠獨自無情長信宮銅雀臺荀仲舉髙臺秋色晩銅雀一作直置又作直望已淒然况復歸風便松聲入管一作斷絃淚逐梁塵下心随團扇捐誰堪三五夜空對月光圓同前張正見荒凉銅雀晩摇落墓田通雲慘當歌日松吟欲舞風人疎瑶席冷曲罷繐帷空可惜年年一作將淚俱盡望陵中同前劉廷琦銅雀宮觀委灰塵魏主園陵漳水濵即今西望猶堪思况復當時歌舞人同前賈至日暮銅臺静西陵鳥雀歸撫絃心斷絶聽管淚霏微一作霏霏靈柩臨期奠空床巻寢衣蒼蒼川上月應照妾魂飛同前馬戴魏宫歌舞地蝶戱鳥還鳴玉座人難想一作到銅臺雨滴平西陵樹不見漳浦草空生萬恨盡埋此徒懸千載名同前女郎張琰一作瑛君王冥漠不可見銅雀歌舞空徘徊西陵憤憤悲宿鳥髙殿沉沉閉青苔青苔無人跡紅粉空自哀同前女郎程長文君王去後行人絶簫竽不響歌喉咽雄劒無威光彩沉寳琴零落金星滅玉堦寂寂墜秋露月照當時歌舞處當時歌舞人不廻化為今日西陵灰銅雀妓何遜秋風木葉落蕭瑟管絃清望陵歌對酒向帳舞空城寂寂庭一作簷宇曠飄飄帷幔輕曲終相顧起日暮松栢聲同前劉孝綽雀臺三五日絃一作歌吹似佳期况復一作更對西陵晩松風吹繐一作飄素帷危弦斷復續一作更接妾心傷一作心傷於此時誰言留客袂還一作翻掩望陵悲同前喬知之金閣早一作惜分香鉛華不重粧空餘強歌舞一作歌舞地猶是為君王哀絃調已絶曲艶不湏長共看西陵暮秋烟生白楊同前髙適日暮銅雀逈秋一作幽深玉座清蕭森松栢望委鬱羅綺一作綺羅情君恩不再得一作再重妾舞為誰輕同前李邕西陵望何及絃管徒在兹誰言死者益但令生者悲丈夫有餘志兒女焉足私擾擾多俗情投迹互相師直節豈感激荒滛乃淒其潁水有許由西山有伯夷頌聲何寂寥唯聞銅雀詩君舉良未易永為後代嗤同前釋皎然強開鐏酒向陵看憶得君王舊日歡不覺餘歌悲自斷非關艶色一作曲轉聲難同前朱放恨唱歌聲咽愁飜舞袖遲西陵日欲暮是妾斷腸時同前劉方年遺令奉君王嚬蛾強一粧嵗移陵樹色恩在舞衣香玉座生秋氣銅臺下夕陽淚痕沾井幹舞袖為誰長同前歐陽詹蕭條登古臺廻首黄金屋落葉不歸林髙陵永為谷粧容徒自麗舞態閱誰目惆悵繐帷空一作鳴咽練帳前歌聲苦於哭湘妃怨陳羽二妃愁一作怨處雲沉沉二妃怨一作哭處湘江一作水深商人酒滴廟前草蕭索一作颯風生斑竹林同前王貞白舜欲省蠻陬南巡非逸逰九山沉白日二女泣滄洲目極楚雲斷恨深湘水流至今聞鼔瑟咽絶不勝愁文苑英華巻二百四
