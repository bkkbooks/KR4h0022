body:
  text: 文苑英華巻一百五十八宋李昉等編天部八秋三十首七夕十九首九日十六首冬九首除夜十四首秋初秋梁簡文帝羽翣晨猶動珠汗晝恒揮秋風忽嫋嫋向夕引凉歸巻幌通河色開忩望月輝晩花欄下照初學記作晩照花欄下疎螢簟上飛直至猶如此何况送將歸浮隂即染浪清氣始乗衣類聚有此二句秋夜梁簡文帝盲風度函谷墜露下芳枝緑山倒雲氣青潭銜月規花心風上轉葉影樹間移外遊獨千里夕歎共誰知秋夜沈約月落宵向分紫烟鬱氛氲曀曀螢入霧離離鴈出雲巴童暗理瑟漢女夜縫裙新知樂如是乆要詎相聞秋日鮑泉露色未成霜梧楸欲半黄燕去簾初學記作簷恒静蓮寒池不香夕鳥飛向日類聚作夕鳥飛向月餘蚊聚逐光旅情恒自苦秋夜漸應長和初秋庾信落星初伏火秋霜正動鐘北閣更初學記作連横漢南宫暎鑿龍祥鸞棲竹實靈蔡止初學記作上芙蓉自有南風曲還來吹九重秋日此乃王胄奉和悲秋應令十韻詳具一百七十九巻庾信晩秋前人淒清臨晩景疎索望寒階庭濕初學記作濕庭凝墜露摶風巻落槐白氣斜還冷雲峰晩更霾可憐數行鴈㸃㸃逺空排和潁川公秋夜前人泬寥空色逺葉黄淒序變洞浦落遵鴻長飈送巢燕千秋流夕景百籟含宵囀峻雉聆金柝曽臺切銀箭悲秋隋煬帝故年秋始去今年秋復來露濃山氣冷風急蟬聲哀鳥擊初移樹魚寒欲隠苔斷霧時通日殘雲尚作雷度秋唐太宗見初學記夏律昨留灰秋箭今移晷峨眉岫初出洞庭波漸起桂白發幽巖菊黄開灞涘運流方可歎含毫屬微理秋日二首唐太宗見初學記爽氣澄蘭沼秋風動桂林露凝千片玉菊散一叢金日岫高低影雲空㸃綴隂蓬瀛不可望泉石且娱心二菊散金風起荷疎玉露圓將秋數行鴈離夏幾林蟬雲凝愁半嶺霞碎纈高天還似成都望直見峨眉前秋夜初學記作日翠微宫前人秋光凝翠或作紫嶺凉吹肅離宫荷葉疎一葢缺樹冷半空初學記作荷疎一葢缺樹冷半帷空側陣移鴻影圓花釘菊叢攄懐俗塵外高眺白雲中秋夜獨坐王維獨坐悲雙鬢空堂欲二更雨中山果落燈下草蟲鳴白髮終難變黄金不可成欲知除老病唯有學無生秋興杜甫聞道長安似奕棋百年世事不勝悲王侯第宅皆新主文武衣冠異昔時直北闗山金鼓振征西車騎集作馬羽書馳魚龍寂寞秋江冷故國平居有所思秋夜獨坐袁朗危絃斷客心虚彈落驚禽故人百慮静一作盡獨夜九愁深枯蓬唯逐吹墜葉不歸林如何悲此曲坐作白頭吟秋興王昌齡日暮西北堂凉風洗脩木著書在南窓門館常肅肅苔草延古意視聴轉幽獨或問余所營刈黍就寒谷立秋日司空曙律變新秋至蕭條自此初花酣蓮報謝葉在柳呈疎淡日非雲暎清風似雨餘巻帷百家詩作簾凉暗度迎扇暑先除草静多飜燕波澄下露魚今朝散騎省作賦興何如秋夜作韋應物暗窓凉葉動秋齋寢席單憂人半夜起明月在林端一與清景遇每憶平生歡如何方惻愴披衣露轉寒秋夜前人高閣漸凝露凉葉梢飄闈憶在南宫直夜長鐘漏稀秋夜早行戴叔倫山曉旅人去天高秋氣悲明河川上没芳草露中滋此别又千里少年能幾時心知剡溪路聊且寄前期秋暮賈島北門楊柳葉不覺已繽紛值鶴因臨水迎僧忽背雲白鬚相並出暗淚兩行分黙黙空朝夕苦吟誰喜聞秋夕即事劉得仁永夕坐暝乆不聞猿狖啼漏微砧韻隔月朗斗星低危葉無風落幽禽並樹棲自憐無援者甘與路岐迷秋思周賀楊柳已秋色楚田方刈禾歸心疾所切敗葉夜來多細雨城鵶噪殘陽嶠客過古都餘業在杳隔洞庭波秋夕聶夷中日往無復見秋堂暮仍學𤣥髮不知白曉入寒銅覺為材未離羣一作樹有玉猶在璞誰把碧桐枝刻作雲門樂同前劉駕促織燈下吟燈光冷於水鄉魂坐中去倚壁身如死求名為骨肉骨肉萬餘里富貴在何時離别今如此出門長嘆息月白西風起同前張喬春恨復秋悲秋悲難到時每逢明月夜長起故山思巷僻行吟逺蛩多獨卧遲溪僧與樵客動别十年期中秋鄭谷清香聞晩蓮水國雨餘天天氣正得所客心剛悄然亂兵何日息故老幾人全此際難消遣從來未學禪秋晩羅鄴殘星殘月一聲鐘水際巖根爽氣濃不向碧堂驚醉夢但求清鏡促愁容繁金泣露荒籬菊獨翠凝烟逺澗松閒步幽林與苔逕漸移栖鳥息鳴蛩秋深周朴柳色尚沉沉風吹秋更深山河空有道鄉國自鳴砧巷有千家月人無萬里心長城哭崩後寂絶至而今七夕七夕梁武帝白露月下圓一作團秋氣一作風枝上鮮瑶臺含碧霧羅一作翠幕生紫烟妙會非綺節佳期乃凉年玉壺并一作承夜急蘭膏依曉煎昔悲漢難越今傷河易旋怨咽雙目斷悽切初學記作到兩情懸一作皆藝文類聚望織女前人類聚作左雲盈盈一水邊夜夜空自憐不辭精衞苦河流未可填寸情百重結一心萬處懸願作雙青鳥共書類聚作舒明鏡前七夕穿針栁惲代馬秋不歸緇紈無復緒迎寒理衣一作夜縫暎月抽纎縷的爍愁睇光連娟思眉聚清一作液露下羅衣秋風吹玉柱流景對秋夕一作流隂稍已多餘光亦難取一作誰與七夕何遜仙車駐七襄鳯駕入天潢月暎九微火風吹百和香來一作逢歡暫巧笑還淚已沾一作帝粧依稀猶洛汭倐忽似高唐别離未一作不得語河漢漸湯湯一作皆雜詠織女贈牽牛沈約紅粉一作粧與明鏡二物本相親用持施㸃畫不照離居人往秋雖一照一照復還塵塵生不復拂蓬首對河津冬夜寒如此一作是寧遽道陽春初商忽云至暫得奉衣巾施衿已成一作識已故每恥輙一作如新一作皆藝文類聚牽牛答織女王筠新知與生别由來儻相值豈如寸心中一宵懐兩事歡娱未繾綣倐忽成離異終日遥相望秪憶雜詠作益生愁思猶想類聚作憶今春悲尚有故年淚忽遇長河轉獨喜良飈至奔精翊鳯軫纎阿雜詠作珂警龍轡七夕庾肩吾玉匣巻懸衣針縷類聚高樓開夜扉姮娥隨月落織女逐星移離前㸔促夜别後對空機得類聚作情雜詠作請語凋翎雜詠類聚並作彫陵二字出荘子鵲填河未可飛同前江總漢曲天榆冷河邊月桂秋婉孌期今夜飄颻度淺流輪隨列宿動類聚作轉路逺綵雲浮横波翻瀉淚束素反緘愁此時機杼息獨向紅粧羞同前王眘見初學記天河漢欲曉鳯駕儼應飛落月移粧鏡浮雲動别衣歡逐今宵盡愁隨還路歸猶將宿昔淚更上去年機同賦山居七夕李嶠明月青山夜高天白露秋花庭開粉席雲岫敞斜樓雜詠作雲影斜針樓石類支機影池似泛槎流暫驚河女鵲終狎野人鷗七夕張文恭鳯律驚秋氣龍梭静夜機星橋百枝動雲路七香飛暎月回彫扇凌霞曳綺衣含情向華幄流態入重闈歡餘夕漏盡怨結曉驂歸誰言類聚作念分河漢還憶兩心違同前杜審言白露含明月青雲斷絳河天街七襄轉閣道二神過袨服鏘環珮香筵拂綺羅年年今夜盡機杼别情多同前祖詠閨女求天女更䦨意未䦨玉庭開粉席羅袖捧金盤向月穿針易臨風整線難不知誰得巧明旦試尋㸔同前楊衡漢浦常多别山一作星橋忽重遊向雲迎翠輦當月拜珠旒寢幌凝宵態粧奩閉曉一作晩愁不堪鳴柳一作杼日空對白榆秋七夕二首劉禹錫河鼓靈旗動姮娥破鏡斜滿空天是幕徐轉斗為車機罷猶安石橋成不礙查寧集作誰知觀津女竟夕集作終日望雲涯二天衢啓雲帳仙馭上星橋初喜渡河漢頻驚轉斗杓餘霞張集作開錦幛輕電閃紅綃非是人間世還悲後㑹遥七夕温庭筠鵲歸鸞雜詠作燕去兩悠悠青瑣西南月似鈎天上歲時星又轉世間離恨雜詠作别水東流金風入樹千門夜銀漢横空萬象秋蘇小回塘通桂楫未應清淺隔牽牛同前曹松牛女相期七夕秋相逢俱喜鵲横流彤雜詠作寒雲縹緲廻金輅明月嬋娟掛玉鈎翠雜詠作燕羽幾曽添别恨花容終不更含羞更殘便是分襟處曉箭東來射翠樓同前唐彦謙露白風清夜向晨小星垂珮月埋輪絳河浪淺休相隔滄海波深尚作塵天外鳯凰何寂寞世間烏鵲漫辛勤猗蘭殿北斜樓上多少通宵不睡雜詠作寐人九日九日賦韻梁簡文帝是節協陽數高秋氣已精簷類聚作蟾芝逐月啓帷風依夜清逺燭成歌黛斜橋聞履聲梁塵下未息共愛賞年類聚作心并衡州九日江總見雜詠秋日正淒淒茅茨復蕭瑟姬人薦初醖㓜子問殘疾園菊把黄華庭榴剖珠實聊以著書情暫遣他鄉日九日至微山亭許敬宗心逐南雲逝影隨北鴈來故鄉籬下菊今日幾花開蜀中九日王勃見雜詠九月九日望鄉臺他席他鄉送客杯今日已厭南中苦鴻鴈那從北地來九日張諤秋來林下不知春一種佳遊事也均絳葉從朝飛盡夜黄花間初學記作開日未成旬將曛栢樹頻驚馬半醉歸途數問人城外初學記作逺登高併九日茱萸凡作幾年新九日作王縉見初學記莫將邊地比京都八月嚴霜草已枯今日登高樽酒裏不知能有菊花無重九日懐襄陽孟浩然去國似一作已如昨倐然輕杪秋峴山望一作杳不見風景令人愁誰採籬下菊應閒池上樓宜城多一作名美酒一作醖歸與葛疆逰九日杜甫舊與蘇司業兼隨鄭廣文採花香泛泛坐客醉紛紛野樹歌還倚秋砧醒却聞歡娱兩冥寞西北有孤雲九日藍田崔氏莊前人老去悲秋强自寛興來終集作今日盡君歡羞將短髮還吹帽笑倩旁人為整集作正冠藍水逺從千澗落玉山高並兩峰寒明年此會知誰在集作健醉把茱萸仔細㸔九日登梓州城前人客心驚暮序賔鴈下襄一作滄州共賞重陽節言尋戱馬遊湖風秋一作扶戍柳江雨暗山樓且酌東籬菊聊祛南國愁九日陪崔郎中北山醼嚴維見雜詠上客南臺至重陽此㑹文菊芳寒露洗杯翠夕陽曛務簡人同醉溪閒鳥自羣府中官最小唯有孟叅軍九日登青山朱灣昔日惆悵處一作地繫馬又一作共登臨舊地一作處烟霞在多時草木深水將空含一作合色雲共一作與我無心緬想一作相見龍山會良辰亦似今觀衛尚書九日對中使射破的戎昱盛宴傾黄菊殊私降紫泥月營開射圃霜斾拂旌霓出將三朝貴彎弓五善齊腕廻金鏃滿的破緑弦低勇氣干牛斗歡聲震鼔鼙忠臣思報國更欲取闗西九日李羣玉玉醴泛金菊雲亭蔽黛集作玳筵晴山低畫浦斜鴈逺書天謝眺離都日殷公出守年不知瑶水宴誰和白雲篇近見去年聖製黄菊聨句重陽夜旅懐鄭谷强挿黄花三兩枝還圖一醉浸愁眉半床斜月醉醒後惆悵多於未醉時冬大同十年十月戊寅梁簡文帝喧塵是時息静坐對重巒冬深柳條落雪後桂枝殘星明霧色盡天白鴈行單雲飛乍想閣水浩類聚作結逺疑紈晩橘隠重屏枯籐帶廻竿兵初學記雜詠並作岳類聚作壯隂連水氣山峰深水寒初學記雜詠並作添月寒類聚作染月寒𤣥圃寒夕前人洞庭門類聚作洞門扉未掩金壺漏已催曠類聚作曛烟生澗曲暗色起林隈雪花無有蔕氷鏡不安臺堦楊始倒挿浦桂半新栽陳根委落蕙細葉類聚作蘂發香梅鴈去銜蘆上猿戱遶枝來冬夕初學記無夕字類聚作大同十一月庚戌前人茲園植藝積山谷乆紆葳初學記作歲類聚作威貴與初學記作興最多緒類聚作直興轉多緒真事亦因依是節嚴冬景類聚作暮寒雲曳類聚作掩落暉逺聞風瑟瑟亂視雪霏霏浪起川難渡林深人至稀山禽背逕走野鳥歴塘飛冬夜隋煬帝不覺歲時初學記作將盡已復入長安月影含氷凍風聲淒夜寒江海波濤壯崤潼阪險難無因寄飛翼徒欲動和鑾孟冬杜甫殊俗還多事方冬變所為破柑霜落爪甞稻雪翻匙巫岫寒都薄黔溪集作烏沙瘴逺隨終然减灘瀨暫喜息蛟螭至日遣興寄北省舊閣老兩院故人前人憶昨逍遥供奉班去年冬至集作今日侍龍顔騏驎不動爐烟上孔雀徐開扇影還玉几由來天北極朱衣只在殿中間孤城此日堪腸斷愁對寒雲雪滿山冬夕張籍寒蛩獨罷織湘鴈猶能鳴月色當窓入鄉心半夜生不成高枕夢復作遶堦行廻首嗟淹泊城頭北斗横冬日後作裴説寂寞掩荆扉昏昏坐欲癡事無前定處愁有併來時日影纔添線鬢根已半絲明庭正公道集作論應許苦心詩冬日作前人糲食擁敗絮苦吟吟過冬稍寒人却健太飽事多慵樹老生烟薄墻隂貯雪重安能只如此公道會相容除夜守嵗唐太宗見雜詠暮景斜芳殿年華麗綺宫寒辭去冬雪暖帶入春風堦馥舒梅素盤花卷燭紅共歡新故歲迎送一宵中前題前人歲隂窮暮紀獻節啓新芳冬盡今宵促年開明日長氷消出鏡水梅散入風香對此歡終宴傾壺待曙光於西京守歲駱賔王見雜詠閒居寡言宴獨坐巻風塵忽見嚴冬盡方知列宿春夜將寒色去年共曉光新耿耿他鄉夕無由展舊親歲除夜來張少府宅集作除夜樂城逢張少府作孟浩然雲海訪集作泛甌閩風濤集作潮泊島濵何知歲除夜得見故鄉親予是乗桴客君為失路人平生復能幾一别十餘春除夜有懐前人五更鐘鼓欲相催四氣推遷往復廻帳裏殘燈纔有雜詠作猶去焰爐中香氣盡成灰漸㸔春逼芙蓉枕頓覺寒銷竹葉盃守歲家家應不集作未卧相思那得夢魂來除夜宿石橋館戴叔倫旅館誰相問寒燈獨可親一年將盡夜萬里未歸人寥落悲前事覊雜詠作支離笑此身衰顔與愁鬢雜詠作衰髮明日去逢春嶺外守歲李福業冬共雜詠作去更籌盡春隨斗柄廻寒暄一夜隔客鬢兩年催歲暮白居易窮隂急景暗集作生相催壯齒韶顔去不回舊病重因年老發新愁多是集作待夜長來膏明自爇縁多事鴈黙先烹為不才福禍細尋無會處不如且進手中盃客中守歲在柳家庄前人守歲樽無酒思鄉淚滿襟始知為客苦不及在家貧畏老偏驚節懐集作防愁預惡春故園今夜裏應念未歸人除夜王湮今歲今宵盡明年明日催寒隨一夜去春逐五更來氣色空中改容顔暗裏廻風光人不覺已著後園梅同前曹松舊厯不足卷東風還坐聞一宵有幾刻兩歲欲平分臘盡傾時斗春通綻處雲明朝遥捧酒先合祝吾類詩作堯君江外除夜前人千門庭燎照樓臺總為年光急急催半夜臘因風巻去五更春被角吹來寧無好鳥思花發應有遊魚待凍開不是多岐漸平穏誰能呼酒祝昭回歲除對王秀才作韋莊我惜今宵促君愁玉漏頻豈知新歲酒猶作異鄉身雪向寅前凍花從子後春到明追此㑹俱是隔年人除夜羅隠官厯行將盡村醪强自傾厭寒思暖律畏老惜殘更歲月已如此寇戎猶未平兒童不諳事歌吹待天明文苑英華巻一百五十八
