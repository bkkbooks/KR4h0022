body:
  text: 文苑英華巻四百二十一宋李昉等編赦書二改元赦書改天監元年赦詔沈約門下五精逓襲皇王所以受命四海樂推殷周所以改物雖禪代相舛遭會異時而微明迭用其流逺矣莫不振民育德光被黎元朕以寡闇命不先後寧濟之功屬當期運乘此時來同梁書作因心萬物遂振厥弛維大造區夏永言前蹤義均慙德齊氏以代終有徵厯數云改欽若前載集大命于朕躬顧惟菲德辭不獲命寅畏上靈用膺梁書作應景業執禋柴之禮當與能之祚繼迹百王君臨四海若涉大川罔知攸濟洪基初兆萬品權輿思俾慶澤覃被率土可大赦天下改齊中興二年為天監元年賜民爵二級文武加位二等鰥寡孤獨不能自存者人糓五斛逋布口錢宿債勿復收其有犯鄉論清議贓汙淫盗一皆蕩滌洗除前注與之更始長從勑繫之身特皆原遣亡官失爵禁錮奪勞一依舊典開元元年赦書蘇頲黄門朕聞聖人無心同於吹萬上皇有道契於明一居天下之尊者莫大體其大以照臨成天下之務者至公順其公以康濟故能稽昌厯考元符通于神祗格于上下鴻名不可以深拒盛典不可以固違斯豈在予而徇於物也朕以菲德丕承聖訓掃除欃槍保衛宗稷内問安以承志外聽理以推誠始自朝廷納之以軌物終加蠻貊洎之以聲敎欲令跂行喙飲含齒戴髪去其夭札蠲其疵癘每兢兢於紫座寧自貴於黄屋而凢我羣辟顧斯兆庶以為人謀協從天意欽若王者人所歸也帝者天之號也歸之者以德號之者以功然號以功成則功不可以不表歸以德厚則德不可以不勵朕猥屬與能之運遂忘冲讓之私將逮臨一作建寅之歲首甫擇建子之天統是用發揮景命受兹禮冊夫循名者責實謀始者慮終勉而全之非敢自滿所以克己思政惟懷永圖懼弗勝荷用多慙惕赦令所作其來尚矣是則姦人之幸嘗思奔馬之喻朕但欲令其畏惡化之為善庶比屋可封豈開羅為惠朕之此志每用形言頃屬一作自填冬序頗愆農功一作澤洎簡辰練日有司備禮則上天同雲北風雨雪意者將乘廣慶必待湛恩宜行一作憑宥過之典以叶隨時之義可大赦天下改先天二年為開元元年十二月一日昧爽已前大辟罪已下已發覺未發覺已結正未結正繫囚見徒咸赦除之云云禮尚於儉書誡於奢朕方闕敦朴以存勸沮至於乘輿服御及土木之功蠲除樽節貴從簡省王公已下宜識此心欲將先自朕躬冀能化行海内薛伯陽以㐫魁之子合寘嚴刑縁尚主之恩特令逺貶旋念從夫之禮深矜自我之出宜復舊婚再承新命可唐州别駕員外郎置同正員郭元振往立大功保䕶於朕頃因閱武頗失軍器容責情放逐將收後效可饒州司馬員外置同正員朕聞罪不相及先王之制叔向豈同一作坐於㐫弟展禽見稱於哲兄劉廙不以劉偉獲辜王導不以王敦廢職崔滌為其兄湜構禍每進欵誠事朕有年心則無隱忠邪既判賞罰宜均俾踐儲卿式彰臣節可太子僕員外置同正員國初以來宰相及實封功臣子孫一房沉翳未承恩者令所司訪擇有可一作才用者量加擢用周朝酷吏來俊臣周興之徒殘害宗枝毒害良善永言及此深所痛一作歎恨其酷吏有身在及酷吏身後有子孫亦令所司勘會甄别處公諸軍將士有年歲深久所由要籍或不得選集及未叙勞効咸委軍將據實奏聞仍令所司早賜處分及諸軍將佐緫管以上自今已後冬正束帛一凖京官例給亡命山澤挾藏軍器百日不首復罪如初敢以赦前事相告言者以其罪罪之赦書日行五百里布告遐邇咸使知聞主者施行一作皆唐大詔令改元天寶赦内制門下古先哲王之致理也皆上順天心下稽人事時令賛發生之重一作德祥一作靈符叶紀年之稱考彼前載斯為一作焉大猷恭惟烈祖𤣥元皇帝天寶錫慶象帝之先垂裕後人重光五聖自朕嗣守丕業洎三十年實頼宗社降靈昊穹孚祐萬方無事六府維脩寰宇晏然一作如庶臻于理然則乾元在上仁覆為首皇王臨下惠化攸先恩𢎞善貸用廣滋一作慈育尊道寶之一作而建元暢𤣥風於不宰况屬陽和布氣獻歲發生宜覃在宥之恩式降維新之澤可大赦天下改開元三十年為天寶元年自天寶元年正月一日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不原者咸赦除之諸色左降官并其流人未經量移者亦與量移禁麛卵以遂生成自今已後每年春天下宜禁弋獵採捕如聞百姓之内或有户高丁多苟為規避父母見在乃别籍異居宜令州縣勘會其一家之中有十丁已上者放兩丁征行賦役五丁以上者放一丁即令同籍共居以敦風敎天下侍老八十以上者宜委州縣官每加存問仍量賜粟帛侍丁者令其養老孝假者矜其在䘮此王政優容俾申情理而官吏不依令式多雜役使自今後不得更然國之急務莫若求才頃者雖屢搜揚士庶尚慮遺逸更宜精訪以副虚懷其前資及白身人中有儒學博通及文詞秀逸或有軍謀越衆或武藝絶倫者委所在長官具以名薦若乃𢎞我風化實惟方岳必佇其人以膺共理其京文武官五品以上清資并郎官㨿資歷人才堪為刺史者各任封狀自舉但文宣垂訓事必正名而黄鉞古來以金為餙金者應五行之數有肅殺之威去金稱黄理或未當其黄鉞宜改為金鉞符威武之義焉内外文武九品已上各賜勲兩轉前王重典在乎祭祀况屬維新事宜昭告五嶽四瀆名山大川諸靈迹及自古帝王忠臣義士並令所由本州縣致祭一作皆唐大詔令奉天改元大赦制陸贄門下致理興化必在推誠忘已濟人不恡改過朕嗣守詔令作服丕構君臨萬方詔令作邦失守宗祧越在草莽不念率德誠莫追於既往永言思咎期有復詔作補於將來明徵厥初舊唐書作其義以示天下惟我烈祖邁德庇人致俗化於和平拯生靈於塗炭重熈積慶垂二百年伊爾卿尹庶官洎億兆之衆代受亭育以迄于今功存于人澤垂于後肆予小子獲纉鴻業懼德不嗣罔敢怠荒然以長于深宫之中暗于經國之務積習易溺居安忘危不知稼穡之艱難不察唐書作䘏征戍詔令作戍役之勞苦澤靡下究情不上通事既壅隔人懷集作情疑阻猶昧省已遂用詔令作致興戎徵師四方轉餉文粹作運千里賦車籍馬逺近騷然行齎居送衆庶勞止或一日屢交鋒刄或連年不解甲胄祀奠詔令作典乏主室家靡依生死流離怨氣凝結力役不息田菜多荒暴命唐書作冷峻於誅求疲甿空於杼軸轉死溝壑離去鄉閭邑里丘墟人煙斷絶天譴於上而朕不寤人怨於下而朕不知馴致亂階變興都邑賊臣乘釁詔令作僚肆逆滔天曽莫愧畏敢行陵逼萬品失序九廟震驚上辱於詔令作累于祖宗下負於詔令作于黎庶痛心靦貎詔令作面罪累在予永言愧悼詔令作悚若墜泉谷頼天地降祐人神唐書作祗叶謀將相竭誠爪牙宣力屏除詔令作逐大盗載張皇維唐書作屏皇維郡盗斯載張將𢎞永圖詔令作丕猷必布新命詔令作令朕晨興夕惕惟念唐書作省前非乃者公卿百寮累詔令作類抗章䟽詔令作表猥以徽號加於朕躬固辭不獲俯遂輿議昨因内文粹作循省良用矍唐書作瞿集作懼然體陰陽不測之謂神與天地合德之謂聖顧惟淺昧非所宜當文者所以化成武者所以定亂今化之不被亂是用興豈可更徇羣情苟膺虚美重余不德秪益懷慙自今以後中外所上書奏不得更稱聖神文武之號夫人情不常繫於時化大道既隱亂獄滋豐朕既不能𢎞德導人又不能一法齊衆苟設宻網以羅非辜為之父母實増愧悼今上元統厯獻歲發生唐書作祥宜革紀年之號式敷在宥之澤與人更始以文粹作用答天休可大赦天下改建中五年為興元元年自正月一日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不原者咸赦除之李希烈田恱王武俊李納等有以忠勞任膺將相有以勲舊繼守藩維朕撫馭乖方信誠靡著致令疑懼不自保安兵興累年海内騷擾皆由上失其道而下罹其灾朕實不君人則何罪屈已私物余何愛焉庶懷引慝之誠以洽好生之德其李希烈田恱王武俊李納及所管將士官吏等一切並與洗滌各復爵位待之如初仍即遣使分道宣諭朱滔雖與賊泚連坐路逺未必同謀朕方推以至誠務欲𢎞貸唐書作永念勲務在𢎞貸如能効順亦與維新其河南河北諸軍兵馬並宜各於本道自固封疆詔令作土勿相侵軼朱泚大為不道棄義蔑詔令作滅恩反易天常盗竊名器暴犯陵寢所不忍言獲罪祖宗朕不敢赦其應被朱泚脅從將士官吏百姓及諸色人等有遭其扇誘有迫以兇威苟能自新理可矜宥但官軍未到京城以前能去逆效順及散歸本軍本道者並從赦例原免一切不問天下左降官即與量移近處已經量移者更與量移流人配𨽻及罰藩鎮効力并縁罪犯與諸使驅使官兼别勑諸詔令作於州縣安置及得罪人家口未得詔令作許歸者一切放還應先有㾗累禁錮及反逆縁坐承前恩赦所不該者並宜洗雪亡官失爵放歸勿齒者量加收叙未復資者更與進叙人之行業或未必兼構大厦者方集於羣材建竒功者不限於常檢苟在適用則無棄人沉黜免之人沉鬱既文粹作頗久朝過夕改仁何逺哉流移降黜亡官失爵配𨽻流人等有才能著聞者特加録用勿拘常例諸軍諸使諸道赴奉天及進收京城將士等或百戰摧敵或萬里勤王扞固全文粹作金城驅除大憝濟危難者其節著復社稷者其業崇我圖爾功特加彛典錫名疇賦永永無窮宜並賜名奉天定難功臣身有過犯逓减罪三等子孫有過犯逓减二等當户應有差科詔令作偶使役一切蠲免其功臣已後雖衰老疾患不任軍旅當分糧賜並宜全給身死之後十年内仍回給家口其有食實封者子孫相繼代代無絶其餘收録及功賞條件待收京日並凖去年十月十七日十一月十四日勑處分諸道諸軍將士等久勤扞禦累著功勲方鎮克寧惟爾之力詔令作績其應在行營者並超三資與官仍賜勲五轉不離鎮者依資與官賜勲三轉其累加勲爵仍許回授周親内外文武官三品已上賜爵一級四品已下各加一階仍並賜勲兩轉見危致命先哲攸貴掩骼埋胔禮典詔令作經所先雖効用而詔令作之或殊在惻隱而何間諸道兵士有死王事者各委所在州縣給逓送歸詔令作赴本管官為葬祭其有因戰陣殺戮詔令作捕獲伏辜暴骨原野者亦委所在逐近便收葬應縁流貶及犯罪未葬者並許其家口各㨿本官品以禮收葬自頃軍旅所給賦役繁興吏因為姦人不堪命咨嗟怨苦道路無聊汔可小康與之休息其墊陌及稅間架竹木茶漆𣙜鐵等諸色名目悉宜停罷京畿之内屬此冦戎攻刼焚燒靡有寧室王師仰給人以重勞特宜减放今年夏稅之半朕以兇醜犯闕遽用于征爰度近郊息駕兹邑供儲克辨師旅攸寧式當褒旌以志吾過其奉天宜昇為赤縣百姓並給復五年尚德者敎化之所先求賢者邦家之大本永言兹道夢想勞集作増懷而澆薄之風趨競不息幽棲之士寂寞無聞盖誠所未孚故求之不至天下有隱居行義才集作道德髙逺晦跡丘園不求聞達者委所在長吏具姓名聞奏朕當備禮招致諸色人中有賢良方正能直言極諫其愽通墳典逹於敎化并識洞韜鈐堪任將帥者委常叅官及所在長吏聞薦天下孤集作耆老鰥寡惸獨不能自活者並委州縣長吏量事詔令作加優恤其有年九十已上者刺史縣令就門存問義夫節婦孝子順孫旌表門閭終身勿事大兵之後内外耗竭貶食省用宜自朕躬朕當損詔令作節乘輿之服御絶宫室之華餙率已師儉集作率以節儉為天下先諸道貢獻自非供宗廟軍國之用一切並停應内外官有冗員及百司有不急之費委中書門下即商量條件停减聞奏布澤詔令作恩行賞抑惟舊章今以餘孽未平帑藏空竭有乖慶賜深愧于懷赦書有所未該者委所司類例條件聞奏敢以赦前事相言告者以其罪罪之亡命山澤挾藏軍器百日不首復罪如初赦書日行五百里布告遐邇咸使聞知興元二年改為貞元元年正月一日大赦天下制門下王者體立元極欽若乎天地纂業承統嚴奉乎祖宗所以敬事修誠務本敦孝尊其上以御于下謹其身而訓于人百神允諧詔令作懷兆庶永頼立國之本斯其大經詔令作國之大典莫重於斯朕燭理不明違道招損往遭大集作多難淪陷國都天地宗祧曠而莫主是則欽若嚴奉之義缺矣朕甚懼焉洎再集無再字復京師遽將告謝有司以人力耗斁禮物廢墜詔令作隳日居月諸歲聿云暮卜其近日俯詔令作甫在上春齊心永懷坐以待曙而百辟卿士抗䟽詔令作表上言咸謂人心未寧不足以盡敬冦孽猶在不足詔令作可以造功迫於羣情俯仰詔令作抑誠願郊廟孔邇瞻言莫定悼心慙顔胡寧自處重以和平未洽灾沴荐臻去歲旱蝗兩河為甚人流不息師出靡居加之以徵求因之以荒饉困窮餒殍轉死丘墟而又關輔之間冬無積雪土膏未發宿麥不滋詳思咎徵有為而致詔令作其失安在豈兵戎之後餘梗詔令作祲尚存將獄犴之中深寃未釋詔令作息又河左詔令作中淮右逆將詔令作賊阻兵汙脅齊人陷之死地雖欲自雪厥路無由抱義銜寃足傷和氣此皆由集作自朕爽詔令作寡德播災于人為之父母實用愧耻今𤣥陰已謝春日載陽勾萌畢伸幽蟄咸震思與海内同心自新發號詔令作布澤更元用符天意宜改興元二年為貞元元年自正月一日昧爽以前大辟罪已下已發覺未發覺已結正未結正繫囚見徒罪無輕重咸赦除之應在河中脅從將士多是奉天赴難功臣本居朔陲夙尚忠節豈以一夫詿誤棄其累代勲庸朕於此軍尤所不忍特宜洗滌待以初誠自非與官軍决戰死於鋒刄其餘雖臨戰詔令作陣擒獲亦並詔令作便釋放如舍集作棄逆歸順者在身先有官爵實封一切如舊仍凖前後制勑所在便給賞錢并與甄叙如有因危効節建立殊庸量其事蹟特加奬擢李懷光若能翻然悔詔令作改過束身赴闕詔令作朝念其嘗有大勲必當終始全䕶仍凖前勑授之官封朕於功臣庶亦無負淮西將吏百姓等有被刼制久為匪人詢事原情諒非獲已今王師四合計日誅夷玉石同一作俱焚用増惻憫宜令諸道進軍之日唯罪首惡一人自餘徒黨悉從原宥如有歸明詔令作順及立功者並凖河中將士例褒奬為國之要在於審官共理分憂守宰彌切闔境性命繫乎其人將使里閭無愁苦之聲風俗興廉讓之敎得不慎柬髦彦寄之化源自今已後諸州刺史有闕中書門下於朝官中精擇有理人才術者授之如刺史縣令在任頻年課績尤異詔令作著者擇授給舍郎中詔令作擢侍郎給舍官御史中外迭處用觀其能賞罰必行期于競勸自頃選曹署吏唯以書判求人務騁浮華莫詢詔令作稽實行且能言者不必適用藴用者或未能言為官擇人其在精覈宜令清資常㕘官每年於吏部選人中各舉所知一人堪任縣令録事㕘軍者所司依資叙註擬便於甲厯之内具標舉主名銜仍牒報御史臺如到任後政理尤異及有贓犯事蹟明著者所司録舉官姓名聞奏以為褒貶其内外官員及京城諸使名目委御史審勘會商量并省停减仍集百寮定議務從詔令作欲簡約息費便人其京官外官職田及利息官錢等或黠吏詆欺移易壃畔或貧人從徙捕繫親隣日月滋深耗弊彌甚亦令百寮議其折𠂻擇善而行往以賦役殷繁人不堪命定為兩稅事頗易從比屬兵興或踰始制法無所守吏益為姦哀我勞人汔可小息其諸州府除兩稅外應有權宜科率差役一切悉停京畿及側近州縣所欠百姓科詔令作和市和糴價直委度支即勘會支給諸道非臨冦賊州縣自去冬已來新㸃召詔令作名官健子弟等並宜放散任營生業應經陷賊州縣百姓屋宇被焚毁并貧病老弱及遭傷損之類所在量加優䘏使得安存天下名山大川并自古聖帝明王賢臣烈士祠廟墳墓各委當處長吏擇日致祭必資精㓗以達至誠班爵有差所以叙賢也廪秩有等所以明勸也今或高卑失次中外相踰至於卿士之家尚羅凍餒之患忠信重禄豈其然耶内外官禄及俸錢手力雜給等委中書門下與度支即叅詳定額聞奏應赴奉天及收城將士等並功存社稷節著艱危中心藏之豈忘酬報頃縁府藏空竭賞給未周集作充乃眷勲臣實用増愧應凖元勑合請賞錢人等委所司節减宫内及百司費用據所支集作有財物速與給付集作支給應在京城及諸道立功將士等先有詔㫖並許甄昇所司勘會淹歷時月委中書門下即與處分諸軍行營并河中朝邑被脅從將士家口在京及諸州府者宜令本道節度觀察使常存賑䘏各令優給應諸軍諸使立仗見在城將士等共賜物七萬疋云云文苑英華卷四百二十一
