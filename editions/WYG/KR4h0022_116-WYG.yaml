body:
  text: 文苑英華巻一百十六宋李昉等編寳二青玉案賦一首玉斗賦一首庾氏子碎玉賦一首被褐懷玉賦一首以玉抵鵲賦一首白環賦一首黄雀報白環賦一首握中有𤣥璧賦一首藺相如秦庭返璧賦一首藺相如全璧賦一首澹臺滅明斬龍毁璧賦一首青玉案賦以報之貞亮因物營心為韻張餘慶當羣物之具陳唯玉案而是珍青瑩自乎天産追琢資於匠人呈形而色有温潤成器而道無緇磷由是功倍几杖質殊琳珉當施設之不倦幸發揮而有因顧瞻之時愛苔色之増麗拂拭之後覺花文之轉新振彼髙價膺茲美名潔其内而氷徹虚其中而砥平嘉韞積之資忽雕鐫而有立以出藍之色作疑作乍治瑩而斯成美乎充玩好守堅貞小大合度髙卑有程諒當人而可託信在物之惟精厠彼華筵雲母之屏邊色麗置乎虚室瑠璃之牕下寒生玉貌宜臨丹心可瑩成其高而有足歴其逺而有脛將以表青骨傳素心既捧執以來此亦保持而在今甘寝之時虚色而空憐角枕閒居之處凝光而但對瑶琴是冝君子之好用資端操質美而㣲瑕莫容色浄而纎埃不到况能坦蕩而為物以俟依憑而寄傲伊錦繡之叚誠可見投此瓊玖之珍是宜相報平居之時忠心甚夷當卓爾而空承簡牘忽藏諸而遂映簾帷見賢之眼惟永日而觀矣比徳之心可終朝而用之則知瑰麗之狀物無以尚欲隨時而共美因體物而先唱空附識真之人將一鑒其瀏亮未見物字官韻玉斗賦以他山之玉琢成寳器為韻敬括玉以至寳見珍斗以至平為器聚圭合而成量􅉷瑜瑕以表異藴石而山谷增輝握樞而春秋定位秘以重璞攻以他山中虚有待旁達無間内倍殊璧外圓若環用之則稱物平施運之則含照自開疑作關燕石既分楚圭未剥平準獻度良工就琢剡則為璋合而成㲄口應吐納棲疑作柄隨把握有異擊刀漢營進綴趙幄史記趙世家襄子使厨人操銅枓食代王以枓擊殺之議其逺邇曽是悠邈特達垂名切磋有成烱光月皎洞徹氷清揣磨律度比較權衡法帝車之杓如軒如輊校嘉量之趾不縮不盈至若劉項争帝龍蛇起陸楚塞瞻烏秦原逐鹿羽輕㶚上之敵漢厄鴻門之酷亞父按劒張良獻玉雖碎斗以稜威終㧞山而取辱比徳者何邀功則多佩服惟允闗石用和既執契而不逺諒求仁而靡他爾以至公秉彜我以不貪為寳扣之則清越流響秘之則含𢎞守道光照廡以如虹價連城而無考豈徒玉巵無當氷壺見杲而已是以在天成象在物可師立身而温潤無匹應用而盈虗有時嘗為國器藏諸有司若暴新之所執用王莽威斗事吾何以則而象之庾氏子碎玉賦以聖人捐寳以息爭端為韻韋充人無善惡利乃交争故懲忿者無如於立義感物者必在於推誠所以庾氏子能捐片璧遂息兩情誠聖人之閫一作同域見智士之縦横當其愛惡所逼長短相賊意各是非事難姑息乃曰碎我此寳成君之徳苟可易心固無難色傍窺利害遂生一决之心下視錐刀不顧千金之直於是置諸厚地投此攻堅隨刑疑作形騞若應手琤然萬㸃星分善價之心俱死二疑氷釋力争之意都捐斯乃大讓所加連城非寳棄此十徳欲求諸道不然安得勵不貪之志在彼斯湏堅必斷之謀於予懷抱卓哉竒士克已喻人解分一作紛以道出義於身故得割所愛成乃仁不以利為用而以徳為鄰况乎雪彩飛揚霜華奔迸拆裂無幾堅貞失性散如天之氣忽若斷虹碎合璧之圓皆如破鏡此既棄寳彼焉息競則當路者誠可以稽疑立教者固宜於希聖彼機忘於絶絃難解於弄丸亞父碎斗而増恚海客鍛珠而成難徒生一理未息兩端曷若格物於恥勸人焉一作為美究其道不徒然想其心非率爾誠哉莊生之説吾固知其有以被褐懷玉賦以君子藏器待時為韻王起玉者貴而絶倫褐者賤而無文何祕質之用晦空寘懷而不分蓋以潛錯落蓄氛氲善價斯待韞光莫聞詎見識於和氏而包羞乎楚君當其組織初成彌縫已備馬褐同色牛衣齊類徒觀代藍縷配顦顇為卒嵗之資有禦寒之利殊不知雪影斯積氷光所萃温潤潛穎特達藏器自同藴疑櫝之深莫發連城之貴青蠅欲㸃礙羽翼而却還白虹始騰隔領袖而猶秘是知玉人獲也用之而彰褐父得也捨之則藏外不婁而不曵中如璧而如璋隨於人誰謂無脛映于體乍若凝肪自有同夫藴石亦何虞於越鄉我亦思古人展矣君子既效此而比徳亦念兹而行已固將匿彩於圭瓚合音於宫徴懼秦趙之奪我則掩荆山之輝恥虞虢之爭我則藏垂棘之美宜乎琢磨是頼清貞勿改映胷襟而發光雜山水而騰彩成器而服之無斁開袵而沽諸有待信可以價奪衆珍名髙四海然後被其惡衣懷以待時有老氏之誡無司城之辭苟釋褐之茲始當獻玉而無疑以玉抵鵲賦張環夫何荆山之崔嵬而美玉之在哉匿精輝於朗璞浮煙潤於崇一作墻隈連壤石以熠熠雜氷霰之皚皚未登光於瑞府畏委質於瑶臺嗟野人之屢獻而楚王之猶猜此昭昭焉曽不識寳之為寳彼黙黙者焉知乎才與不才於戯亂玉者珉奪朱者紫以斯為賦一作賤亦孔之恥含白虹而靡察偶烏鵲而爰抵徒嬉戯以起予非特達而知已向使早遇鄭客先逢罕氏則必待價而沽命工而理剖以為寳有珪璋之秉焉握而為珍胡瓦礫之投矣然後式我王度比於君子其故何哉用之而已類傅板築以滅跡吕垂緡而退趾忽殷帝以賚予復周王之至爾由匹夫以登良弼自孤叟而参多士豈非貴本於賤泰更於否觀彼玉之屈伸實伊人之行止則玉累形者璞人厄才者命投沙有去國之賢懷寳為問津之聖苟或秉屯受蹇雖異物而同病然而人韜素徳我獨文行用晦可以為明以䝉可為飬正將有待於潛隠夫何取於奔競姑用仰衣冠之駿徳美銓藻之鴻柄清鑒雲披虚懷氷映大拾遺寳髙懸明鏡典我權衡於斯為盛别有被褐藴真而立伊投人之或誤乃按劍而遄及昔同六鷁過宋都而退飛今隨乗雁赴陸海而遥集振羽翰而有待摶扶摇而髙戢慙巧媚以為容恥空言而取級之疑宜不迨敢當𤣥圃之中玷則可磨希復白圭之什倘或傾五都以置一作買珍獻萬乗而為執則玉乎玉乎無復向時之泣白環賦杜顔羣玉之山兮居帝臺之列仙采瓊華兮永乆事雕琢兮窮年青熒若水白氣如天剖以崑山之石洗以瑶池之泉弄影長嘯薫風飈然知東夏有徳而虞舜之賢受穆清以出震服中和以御乾乃馳縞鹿與使者奉白環而獻焉玉華温潤玉理精堅英光千疑以旁達肉好一以虚圓皛皛霜皎田田月懸分清輝於綺殿失皓質於瓊筵賞三朝之盛禮恒五玉而來覿彼昭華之珍兮焉往延喜之珪兮誰錫亦所謂歸有虞之理功告大禹之成績美矣哉撫運兮天寳至大素皓兮聖人之瑞非天則莫之與非聖則莫之致琬無芒而未匹璧有美而奚類以和柔剛以配忠義亂曰白羽之白輕只白雪之白消矣未若茲環之有用縝如栗而未已至徳竭而閟質帝道亨而薦趾疑豈我隨時斡運與物終始滋大政兮揚大徳使吾君佩兮千萬祀黄雀報白環賦以靈禽感徳報以白環為韻張仲素徴晦明於異域聞庶類之酬徳彼黄雀之罹害遇青衿而見惻有纎㣲之陋體無彩翠之竒色投林苦鴟鳶之患隨地逢螻蟻之食情懷舊匹尚有啁噍之音自戀故枝難舉翩翾之翼感之奚一作爰止曰楊氏子取於步武之内寘彼巾箱之裏全而育之焉知所以洎養羽之再就方銜恩而决起黄花受哺寧同食椹之懷白璧來酬用記封公之趾疑言徴其事載赫厥靈表齊諧之異志合漢史之祥經倐去之時既入羣而多類重來之夕方詭狀以呈形稱仙使而報德何倖喜之可稱質乍隠於恍惚環既受而晶熒且賁然之好瑞以神告其潔白而就封諒生成之是報想夫初飛葉際忽墜花隂空城樂府鮑昭有空城雀詩路逺穿屋譏深化未及於遥海聲似愁於北林焉知鴻鵠之秉志實頼兒童之有心未見禽字官韻是知好生自中神貺𤣥格贈祥符之數四勝兼金之累百皛皛月圓規規霜白温其之色且異隨侯之珍皎若之形自類有虞之獲嗟夫靈異之跡出於無間或鵲緘玉印或樹藴金環曽未若稚子懷仁祥禽致感彼君子之出處實濟物於迍坎環兮四代五公垂竹帛之可覽握中有𤣥璧賦以希代之珍耀乎掌握為韻李為璧為至寳握以藏輝與似月之色異俾如虹之氣㣲斂外之容豈曰寘予于暗𤣥中之理尚乎知我者希故其性比内融跡同反照拱形若將乎力素疑㸃影似因乎墨妙見心之後任欲葢而彌章窺指之間縱有光而不耀退雖於宻徳亦不孤方期發色於斯矣豈務掩瑕而已乎初疑捧匣將投尚韞如漆或若横肱未抵已怪得烏懿夫藏㸃㸃而獨青映纎纎而有象或㣲疑其手澤竟空勞於目想同錫𤣥之後不暫去身驗守黒而居則先指掌不然何以乆而不磷蔽而惟新雖未能如雪亦足以賤珉既剖乎石幸依乎人似守中而隠影若居外以藩身攬之為盈手之玩出也為連城之珍圓而琢之而能全璞温而執之可以不濯雖黙黙而沉潛每熒熒乎把握始同乎懷而披褐恐乆而袖化為緇雖存已之雕鏤實頼君以保持言揚者或是色取者猶疑苟能執而無失豈得棄之如遺深潛越石之拳明則誠矣固望荆山之目黙而識之斯蓋見美一時同珍百代諒閟兮懷寳多斯兮若昧幽矣握中之璧實清流而可愛藺相如秦庭返璧賦以題為韻有和氏兮曠代之珍有藺生兮非常之人全重寳以藩趙在輕生以抗秦既獲我心信卓哉於千古不辱君命能使乎於四鄰相如于是詠東山之詩考西郊之役巾車脂轄匪朝伊夕徘徊悵望沉吟感激誓殺身而報主欲張膽而吞敵蹈虎尾而若門過鯨口而無惕期一言以復命得連城而致璧苟大信之或虧豈㣲躬之是惜授使遄征不遑底寜望紫氣之函谷出黄沙之井陘既臻天府之地一作城遂告雲龍之庭秦君方臨丹陛按青萍耀國華振朝經建翠鳳之旗則天收光景伐靈鼉之皷若地出雷霆然後命謁者先告令使者後進將恃威以逞暴欲愛疑寳而損疑信曷英勇而知機弗詭詞以恭順温如之質既美嶷然之姿乃振且勍敵之見欺將殺身而不恡西鄰之言是責南山之節斯峻何大國之無良為匹夫之取俊不然者何以遭賈傅之過秦為相如之慕藺連城棄諸良玉歸歟且告秦言已矣復為趙寳焉如潔誠求之何晩被褐懐之已逺生芻之質空存白虹之氣不返未見相字官韻藺相如全璧賦以智勇雙髙功名永著為韻獨孤授昔日趙氏且衰為暴秦所易徒稱割城以求璧然必背約而棄義將受其禍敢圖其利安定存乎變通得失繫乎愚智籌量未决君臣大恐頼繆子之薦賢得藺生之餘勇語之不怍觀者咸悚庶將城入而璧留焉使趙輕而秦重夫其壯節惟一至寳無雙奉草芥之使至虎狼之邦於是秦王自以强可臨弱志揚氣髙謂我匹夫不難以制謂璧無足尚安得逃方坐章臺之中列萬乘之雄群臣陪位使者趋風因發檢以求璧陳結疑觀而表衷浮光爛兮鏡吐潤色皎以氷空語未及於前約寳方傳於後宫果無有償城之意欲坐收獲璧之功藺君乃探物揣情沉機内萌譎指瑕以復取遂立言而未平攄壯心而激發抗英辯以縦横怒髪竿聳瞋目電驚且使辱命將焉用生請以臣之頭璧俱碎君之軒楹我合詭以全變彼示詐而望誠九賔之禮徒設間道之使已行義必付於知己色無懼於就烹卒能成兩國之勝負駭千古之威名然則寳也且所據神異取之不可以僥倖幾星碎以棄秦庭終月圓而還趙境復得曜藂臺之瑰麗増昂宿之輝影於物也善價斯存於國也懿圖惟永是知興衰之大畧社稷之逺慮必假賢豪用能輔助何全璧之事立亦全國之功著誠乎得士且昌惟其善馭澹臺滅明斬龍毀璧賦以璧惡苟求人難力制為韻白行簡璧之為寳也至珍龍之為物也至神藴彼堅貞由是見希於代神其變化胡可不畏於人苟以力奪我寳則必害及爾身原夫被褐而來艤舟以濟懷白璧為利涉佩青虵而自衛光連曉日若明鏡之髙懸影落深潭狀白虹之初霽孤棹纔移於渡口二龍歘見於波際將至寳因此可求謂匹夫於焉易制徒觀其迅雷鏗鍧狂電翕赩轉晴疑輝而陽景滅曜噴風雨而晴空變色拖尾乃無所遁逃矯首則方將荐食朱萍莊子朱萍漫學屠龍焉能施其術佽飛莫得用其力滅明乃挺利劍整扁舟驅天吳比疑陽侯壯志奮一作鳶而髪植冠聳瞋目張而眥裂血流白刄下耀於淵室紫氣上衝一作衡於斗牛左絶其脰右舂其喉擢疑錦繢之鱗觸驚波而乍聚乍散灑𤣥黄之血隨奔流而或沈或浮既風恬而雨絶俄霧廓而煙收龍實最靈孰可以威而讋璧帷重寳豈得不義而求既而弭波瀾濟江干璧非人願保全而莫可人非劍思耀武而誠難然後韞神丘即長路持拱璧而歎息眄中流而廽顧豈不以懷寳者為物所求恃力者為人所惡且龍實恃力人惟懷璧爾實我欺我非爾惜雖在時之攸重諒於人而何益聞老氏之誡莫守乎滿堂考聖人之清不貴乎盈尺遂投之河而神罔敢受毁於岸而人莫敢有紛然電散謂齊后之碎連環騞爾星分同亞父之撞玉斗則知動不可妄求不可苟始則將害於人終乃自貽伊咎胡不伏水府而藏珠於頷照崑山而銜耀於口故貪而斃也誠罹有悔之凶毁而棄之安能無脛而走嗟乎仁必有勇信千古而不朽文苑英華巻一百十六
