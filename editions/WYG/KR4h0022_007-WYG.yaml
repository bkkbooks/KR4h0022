body:
  text: 文苑英華巻七宋李昉等編天象七秋月賦一首華月照方池賦一首瑶臺月賦一首月映清淮流賦一首月明星稀賦一首明月照積雪賦一首月中桂樹賦二首玉鈎賦二首秋月賦以至明周照為韻歐陽詹粤惟日行於翼風發於庚白露下降鴻鴈來征野䬃䬃而木落天寥寥而氣清獨孤亭之不寐見凉月兮東生上迢迢之霄漢掩冽冽之恒星出江山之磅礴豁閶闔之峥嶸皎皎摇摇晶晶盈盈映階墀以歴歴對窓戸以亭亭雖他時之並照何斯夕之為明異夫白鶴翩翻不分其色寒泉洒落空聞其聲乃遥夜以虚燭實純風之至精於是照曜必周通冥洞幽其色也潤林巒之卉物其影也瑩江湖之亂流益池亭之寂寂増氣候之颼颼起離家之逺恨生去國之繁憂何處而不見何人而不愁豈謂征客懐歸徘徊於黄榆之塞佳人怨别蕭條於紅粉之樓已矣哉信知宇宙之中光明為至非凄凉之獨感亦清貞之可類臨照者足以倣有德之君潔白焉宜将匹無瑕之士傷哉不肖徬徨嶺徼時雨露兮未沾自形影兮相吊願窮經兮取老恐用人兮尚少幸君子兮如月冀餘光兮一照華月照方池賦以凝素光净寒氷為韻李濋天開圓月水净方塘月則桂華初滿水則蘋風不揚徘徊委照㶑灔交光素魄将臨合浦之珠乍吐清漣同映玉壺之氷始藏契禪心之寂寂發郢思之蒼蒼何兹景之逾麗信終夜之難忘况乃萬里無埃三秋罷霧始朣朧之啓夕已奫淪之納素前臨不測姮娥下入於河宫永望長空明鏡上騰於天歩碎蟾影於龍鱗之浪混瓊華於雪毛之路天泉合而益空毫芒鑒而必具故夫秋以為節氣以宵凝紅蕖落而渚净白露降而波澄泳之㳺之始方舟而取翫今夕何夕若乗槎而上升豈獨發清管滅華燈思凄切於阮戸光漾蕩於玉繩而已哉觀乎麗天者月習坎者水水以柔而居月月以輝而垂美一鏡合而内外澄鮮䨇影分而上下相似驚夜聲於鳬鵠鋪皓彩於蘋芷規沉泉底豈魚目之能倫勢出波中乍洛妃之可擬異乎纎纎樓上的的雲端未若麟不鬬於天宇魚不驚於釣竿舟蕩漾而烟空轉麗風淅瀝而桂影生寒佇以取鑒適夫情性寂以喻道斯道也逾深色以喻空其空也逾净故體上善之為德中含光而不競既彰𤣥教之樞用播詩人之咏瑶臺月賦以仙家帝室皎潔清光為韻王淮素月宵凝寒空逈徹照瓊樹以増麗煥瑶臺而共潔逺而望也浮皎皛之精光近而察焉帶巍峩之積雪美其清熒互映絢練相鮮洞玉砌以周設對金波而正圓増構參差逈出林巒之表光輝照燭還同崐閬之前覩重璧以發地瞻百常之造天乍動乍摇難審詳於衆目若明若㓕疑陟降於羣仙顧兎凄凉崇臺􅌄窱惵爾意駭倐然䰟悄駢階級以雲矗粲瓊瑛之霄皎徒引耀之可觀豈懐材之足表若見仙闕如逰玉京月映臺而九天共霽臺照月而萬里俱明含氷霰而逾潔軼氛埃而更清斯可以滌鄙夫之幽抱暢達士之髙情皎皎寒光悠悠清質凝精以降委照而出玩浮光而神竦炫㣲輝而皆溢視乎外美清瑩乎瑶華鑒乎中致齋莊於虚室由斯可保亦既有光始激射以内照忽飛騰而外揚璧彩遥分奪氷壺以的的桂華中映同日觀之煌煌於是天地朗然纎埃不翳九成由其直上八表可以旁睨将以象清都朝玉帝豈徒恣遐想窮逺睇徘徊於臺榭之間悵望於蟾蜍之際而已哉吟翫既乆規圓已斜歎将傾於桂魄思復搴於瓊華庶竭精於册府寧逺慕於仙家月映清淮流賦以題為韻楊諫地有四瀆其一也惟淮天有兩曜其一也惟月月至明而不阻遐邇淮至清而可鑒毫髮故澄澈而相暉况埃壒而初歇泛灔多象朣朧交映類藏氷之在玉壺如臨水之懸明鏡引清潤而介若自潔和素光而終然不競千里伴孤舟而浮百丈動纎鱗之泳此所謂物至净而増其净也如其孕靈納影委照淪精徐而匪濁攬之不盈蟾蜍下沉對蠙珠而増美璿源圓折混金波而更清皓鶴奪彩玉砂迷明如分舟子之望終起漁歌之聲此所謂物無情而感有情者也古人有引類為贈因物傷懐風雲欲别琴酒相乖念居者已賦乎露濕寒草悲行者則想乎月映清淮盖㫖哉月以隂而合德水為坎而處柔或麗天而成象或紀地而引流契仁者之理静含道門之清幽有二美矣允孚于休将以求古之情多聞是務一則以紀其善一則以垂為裕以灰厭暈不學淮王之方進牘抽毫空作謝莊之賦月明星稀賦以大明流光羣曜自戢為韻韋琮伊圓光之未呈觀列象之繁星忽昇輪以委照齊掩縟而韜精天宇無雲意姮娥之可覩金波出海覺婺女之迷明爾其兎影高輝榆光潜靄冲融者寥落或存隐映者蒼茫自昧仰著明而下分融朗驚有爛而全迷光大美矣夫星沉四裔月麗中央以合璧之華彩掃連珠之衆光有北㣲分於辰極維南屢失於昊蒼奕奕三台既暫容於出沒熒熒五緯亦具體而㣲茫時則俯燭地隅斜臨海嶠寫碧落以増麗拂金風而引耀使占蜀國當曖昧而何知賢聚潁川豈低昻而自照的的悠悠蟾孤桂秋離離兮弄影如晦皎皎兮澄明不流萬家盈手之時望牛女而纔見千里同心之際美烏鵲而追逰且樂彼無私失乎躔次焜煌河鼔羃䍥天駟初朣朧出地似懐德以増輝忽粲爛經天知畏威而有自既而夜乆凝澈時無埃氛銀華炫晃以将落珠彩蕭踈而掩羣且共歎於隂靈因悲鵲化如欲觀其分野豈辨天文儼若咸賔稀然且集知至明之難競故不耀而相襲則水朝宗未足以為喻火就燥孰云其可及吐皓魄以流空掩繁光而載戢明月照積雪賦以孤光上燭寒彩下凝為韻月麗天而配陽雪抱隂而體剛輪合太虚類呈祥於徃漢尺盈平地亦表瑞於我唐清虚洞照皓質練張配金精而可乆禀水德而為常月吐危峯自掩瑶階之跡雪凝平野誰分玉兎之光高卑交映動静有方一則向晦而引曜一則候明而昭彰同聖人之潔白類君子之行藏俯而察之謂履玉山之玉逺而望也謂覩燭龍之燭影能相扶德且不孤朣朧相映若有若無虧盈足為物鑒朴素可與道俱夜乆彌明鵲遶林而就侣室虚生白人味道以自如當其雲巻天高氛銷鏡朗曠碧霄明媚之色失白鷴飛舞之狀臨北堂而可鑒曵穿履以遐望姢姢若晝高臨舊井之中淅淅驚風疑落孤松之上光臨皓璧氣引凝寒混金波而曜潘室交素彩而鄙齊紈入秦臺且不慙於清鏡彈楚曲寧有愧於幽蘭懿夫夜已深兮月猶在雪未消兮夜将改照曜氷壺之質掩映瓊林之彩月之德也明而升雪之體也白以凝圓虚色澈柔祗氣澄故得二美相貫兩氣含𢎞謝莊翫而成詠袁安寐而莫興原夫象在於上形成於下德無不施物無不假比同塵之叶美異投珠而見捨倘委照以無私願不遺於㣲者月中桂樹賦以中秋夕望光彩扶踈為韻趙蕃圓月如霜有仙桂兮宛在中央映澄澈之素彩逗葳蕤之冷光杳杳低枝拂孤輪而挺秀依依宻樹侵滿魄而含芳觀其皓爾方凝翛然不改隨昇沉而自若貫盈缺而長在夐羃羃而臨空杳萋萋而發彩同蟾蜍之片影似濯瑶池異珊瑚之幽藂徒生滄海埃壒初歇闗山正秋空泬寥而逾净色冉弱而彌幽謂扇花薄如珪玷浮望玉露之初垂遥疑滴瀝聽金風之乍起逺若颼飀皎皎孤懸亭亭相向纔分杳靄之質㣲辨輪囷之狀諒攀援而莫及寧欲淹留歎音塵之未期空勞曠望嘉其竦本無地分輝有餘轉低影於穹碧擢幽姿於顥初訝姮娥之繪成文逾靃靡並秦鏡之照出勢自蕭踈斯所以亘雲路委天衢弱質中植纎條外扶亂彩時摇起飛飛之驚鵲澄波靡隔掩歴歴之高榆是故邈彼輕霄呈兹永夕紛敷逺􅉷偃蹇旁射夾餘霞而暫丹經斜漢而彌白臨紫極而天香不散指北斗而仙花可摘况其逺象朣朧桂子𡨕空惜迢遰而遐想况嬋姢而内融素色不彫自挺雪霜之外清隂廽泛頻移霄漢之中何必詠招隐卧幽藂庶高枝兮可折願逍遥於蟾宫第二同前韻楊真宏月滿於東桂芳其中因澄輝之皎潔見幽茂之玲瓏炫凝冷於清夜寫濃纎於碧空逺莫致之詎攀折以盈手光可鑒也覺清明之在躬夫擢本隂靈流形永夕禀玉燭之和氣潤金波之滋液枝徘徊而若垂葉靃靡以如積同作繢於團扇想孚尹於尺璧悠悠歴歴宜乎凛秋滿虚輪而挺秀瑩白暈以含幽天邉無風孕香氣而不散草上有露泛花光而若浮異夫高謝地靈妙融真宰籠𤣥兎以不動映素娥而如在太陽讓羙収若木之餘暉列宿懐慙掩白榆而沉彩既寒暑無變亦古今不殊是知託其所終乃異顛而不扶二氣初分誰見哉生之質三光不息斯無朽蠧之虞與燃薪之殊患同瑞草之共舒事相傳於摭實勢終類於慿虚樓上含華映網軒而列耀園中委照益嘉木之蕭踈千里共瞻九霄之上春冬無清浄之景朒朓闕婆娑之狀及素秋之節信謂逢時當明德之年何憂掩望耻片玉以齊價笑三珠之可尚彼藂生因地森挺陵霜驗植物之斯美杳神功之可量垂䕃何方乃傳天之下界結根何處宛在月之中央又安能較其小大齊其短長冀一枝兮可得故驤首以觀光玉鈎賦以常恊政經故無朓朒為韻張仲素月以隂德玉聞夜光伊在天而成象杳如鈎而可望毎映樓而皎皎類照廡之煌煌隐見以時兮不愆其候虧全有節兮此惟其常當其霽景方晩清飇既凉瑩迢遰之初魄出西南之一方韜皎皎之輝尚潜𤣥兎呈纎纎之狀詎假白狼矧乃就盈之姿曲成是愜從三讓而載吐表四序之克恊侔雕瓊之異象契舒蓂之數葉臨洞房之内猶隔𤨏窓隐遥城之隅乍明粉堞觀夫媚霜烟掛遼夐悟如珪之有始知合璧之将聖既麗天而作則亦順辰而為政彎環而素彩未流蕭散而丹霞始浄所以増思婦之獨愁發詩人之興咏豈止生彼海澨煥乎天經况於玉以比德復如鈎而效靈落魚浦之間偏宜泛影垂朱簾之側宛似分形思其逈出隴隂漸登雲路每因躔而進晷乃就新而去故沉澄寥之碧空麗柔明之㣲素曷蛾眉之足儔豈玉璜之能喻然而合其道也則圓景不渝順其化也而盈缺或殊當未光之時所明若昧自哉生之外其有如無且色依㣲於林表晦見西方之謂朓光掩映於暘谷朔出東隅以為朒今異此而守度諒君明而臣肅故其賦玉鈎之輝輝誠可増金波之穆穆第二同前韻紇干俞日云莫矣月出之光始如鈎而可辨亦方蛾而乍揚太隂表精知就盈之所漸司厯紀候見哉生之有常原乎内職既修隂事允叶故得啓臨照於品類彰運行於紀牒上迷山桂之藂稍應階蓂之莢沉碧水以輝動掛珠簾而影接孤懸亳野狼衘虚貴於殷年逈燭汾隂鼎見方慙於漢葉高凝雪映朗若氷浄懐逺戍於虚弓望征人於破鏡将以洞纎芒而並深鑑符隂德而昭聖政豈比夫空驚思婦之心載發詩人之咏彼鏘珮鳴環之侣瑶階玉砌之庭徘徊瞻乎爽朗晼晩俟其清熒披霧纔昇綃幕誤傳於盈手流天未滿璅窓徒訝其分形奚必効重輪之慶表三珥之靈然後可以光帝典而耀祥經者哉是知淪精蟾兎亦此之故比質瑾瑜其羙何無所以澄清景於天杪蕩浮埃於物表倐周流於皓璧漸泛濫於靈沼千門始麗以㳙㳙午夜俄分而皎皎禮有讓遂成其魄政以齊勿謂之朓昔也示冲於朏謫見乎朒諒無徴於次舍斯有斁乎遅速今聖后垂統纎阿為僕本其位于西方正其居於北陸明大易致逺之義合升歌向中之目夫然則罔差於常度所以集帝臺之祉福文苑英華巻七
