body:
  text: 文苑英華巻六百八十八宋李昉等編交友下答侯高書一首與微之書一首答知已書一首道釋部隠逸附與逸人徐則書一首與逸人王真書一首與道士徐鴻客書一首答馮子華書一首答程道士書一首答杜松之書一首與侯山人書一首答泗州開元寺僧書一首與濟法師書一首交友下答侯高書文粹作第二書李翺足下復書來㑹與一二友生飲酒甚樂故不果以時報三讀足下書感歎不能休非足下之愛我甚且欲吾身存文粹作在而吾道光眀也則何能開難出之辭如此之無憂乎前書所以不受足下之說而復闢之者將以明吾道也吾之道非一家之道是古聖人所由之道者也吾之道塞則君子之道消吾之道明則堯舜禹湯集作二字文王孔子之道未絶於地集作世也文粹作矣前書若與足下混然同辭是宫商之一其聲音也道何由而明哉吾故拒足下之辭知足下必將憤予而復其辭也集作而字足下再三教我適時以行道所謂時也者乃仁義之時乎將沉浮集作浮沉之時乎集有時字茍仁且義則吾之道何所屈焉爾如順浮沉之時則必乗流望風髙下焉九字文粹作則是乗流望風而髙下焉集作則必乗波随流望風髙下焉茍如此雖足下之見我且不識矣况天下集有之人二字乎不脩吾道而取容焉其志亦不遐矣故君子非仁與義則無所為也如有一朝之患故君子則不患也吾之道學孔子者也盖孔子集有尚字畏於匡圍於文粹作于蒲伐樹於桓魋逐於魯絶糧於陳蔡之間文粹作師夫孔子豈不知屈伸之道耶文粹無故字賢不肖在我者也貴與富貧與賤道之行否則有命焉君子正已而須之爾雖聖人不能取其容焉故孔子謂子路子貢曰詩云匪兕匪虎率彼曠野吾道非耶吾何為至于此子路對曰意者吾未仁且智也集作耶而人之不信也與四字集作不我與何也子曰有是乎使仁者而必信安有伯夷叔齊使智者而必行安有王子比干子貢對曰夫子之道至大故天下莫能容盍少貶夫子之道子曰良農能稼而不能為穡良工能巧而不能為順君子能修其道綱而紀之綂而理之而不能為容爾不修爾道而求為容賜集有也字而志不逺矣謂顔淵如謂由也賜也顔淵對曰夫子之道至大故天下莫能容雖然夫子推而行之不容何病不容然後見君子集無此二字夫道之不修也是吾醜也道既已大修而不用是有國者之醜也不容集作夫子何病不容然後見君子孔子盖歎之也以孔子其門人三千其聖徳如彼之至也而知孔子者獨顔囘爾其他皆學焉而不能集有者字也然則僕之道天下人安能信而行耶足下之言曰西伯孔子何等人也皆以柔氣汚辭同用明夷也以避禍患斯人豈浮世邪人乎夫西伯聖人也羑里之拘僅不免焉孔子聖人之大者也其屈厄如前所陳惡在其能取容於世乎故曰危行言遜所以逺害也其道則集有不字爾其能逺之與否而不容焉則吾不敢知也非吾獨爾孔子亦不知也僕之道窮則樂仁義而安之者也如用焉則推而傳之于天下者也何獨天下哉將後世之人大有得于吾之功者爾集作云爾天之生我也亦必有意矣將欲愚生民之視聼乎則吾將病而死尚何能伸其道也如欲生民有所聞乎則吾何敢辭也然則吾道之行與否皆運也吾不能自知也天下人安能害於我哉足下又曰吾子夷齊之道也如僕向者所陳亦足以勉矣故不復有所說若韓孟與吾子之於我親集作心故知我者也茍異口同辭皆如足下所説是僕於天下衆多之人而未有一知已也安能合集作動於吾集有之字心乎吾非不信子之云云者也信子云云則於吾道不光也吾欲黙黙則道無所傳云爾子之道子宜自行之者也勿以誨我與㣲之書白居易四月十一集無一字日夜樂天白微之不見足下面已三年矣况以膠漆之心置於胡越之身進不得相合退不能相㤀牽攣乖隔各欲白首㣲之微之如何如何天實為之謂之柰何僕初到潯陽時有熊孺登來得足下前年病甚時一札上報病集作疾狀次序病心終論平生交分且云危惙之際不暇及他唯收數帙文章封題其上曰他日送達白二十二郎便請以待盡集作代書悲哉㣲之於我也其若是乎又觀集作覩所寄聞僕左降詩云殘燈無熖影幢幢此夕聞君謫九江垂死病中驚起坐暗風吹雨入寒忩此句他人尚不可聞况僕心哉至今毎吟猶惻惻耳且置是事畧叙近懐僕自到九江巳渉三載形骸且徤方寸甚安下及集作至家人幸皆無恙長兄去夏自徐州至有諸院孤幼集作小弟妹六七人提挈同來頃所牽念者今悉致在目前得同寒暖饑飽此一泰也江州風候稍凉地少瘴癘乃虵虺蚊蚋雖有甚稀湓魚頗肥江酒甚集作極羙其餘食物多類北地僕門内之口雖不少司馬之俸雖不多量入儉用亦可自給身衣口食且免求人此二泰也僕去年秋始遊廬山到東西二林間香爐峯下見雲水泉石勝絶第一愛不能捨因置草堂堂前喬松十數株脩竹千餘竿青蘿為墻垣白石為橋道流水周於舍下飛泉落於簷間紅榴白蓮羅生池砌大抵若是不能殫記毎一獨徃動彌旬日一作月平生所好者盡在其中不唯㤀歸可以終老此三泰也計足下乆不能得僕書必加憂望今故録三秦以先奉報其餘事况條冩如後云云㣲之㣲之作此書夜正在草堂中山窓下信手把筆随意亂書封題之時不覺欲曙舉頭但見山僧一兩人或坐或睡又聞山一作巖猿谷鳥哀鳴啾啾平生故人去我萬里瞥然陳念此際暫生餘習所牽便成三韻云憶昔封書與君夜金鑾殿後欲明天今夜封書在何處廬山菴裏曉燈前籠鳥檻猿俱未死人間相見是何年㣲之㣲之此夕此心君知之乎居易頓首答知已書集作謝舊恩詩劉蛻蜕嘗感近世知巳集作友隳離交道沈集作曠廢不忍終日疚之於心思出其門閭上謁於公卿水行吳楚之城陸走商周之甸旁聼天下嵗晩而歸卒無所遇是十六國之故墟四瀆之隅落未足為大也卒不能副蛻也區區之望况有一言解相印一見爵上卿者乎斯不無人晩乃遇之不自紹介之口不因媒属之勢纓綏車佩下入蓬蒿一言而膠附不離有憂其終始出處之事者况蜕之遇執事於南康也其來六月而餘無不得日奉論議欲變隂谷為生植之地起死人為奔走之夫返覆集作徃返踰時將止復動雖人有昆弟親戚之愛哭其死憂其病榮其逹則或過於執事之心至於誘掖殷勤不遽以違命見絶者則昆弟親戚相强一不相從則終身不復意之蜕前日來求人為知已交道之心一旦得遇昆弟親戚之愛又自思之而夫人集作盡此之身宜如何以報謝將報謝復與執事何所補哉然而有意益厚違命固難者則不敢書且試託之於韓繁秀才風雪滿硯不獲多書道釋部隠逸附與逸人徐則書隋晉王庚夫道得衆妙法體自然包㴠二儀混成萬物人能𢎞道道不虚行先生履徳養空空𤣥相濟一作宗𤣥齊物將一無將字深明義味曉逹法門悦性冲和恬神虚白餐松餌栢栖息煙霞望赤城而待風雲遊玉堂而駕龍鳯雖復藏名台嶠一作岳猶且騰實江淮籍甚喜其嘉名四字一作嘉猷有勞窹􅄰欽承素道乆積虚襟側席幽人夢想巖穴霜色一作風已冷海氣將寒偃息茂林道體休逸一作念念昔商山四皓輕舉漢庭淮南八公羽一作來儀藩邸古今雖異山谷不殊市朝之隐前賢徃説遵凢述聖非先生而誰故遣使人徃彼延請想無勞束帛賁然來思不待蒲輪去彼空谷希能屈也一作已竚望披雲一作皆隋書徐則傳與逸人王真書隋齊王暕夫山藏羙玉光照廊廡之間地藴神劔氣浮星漢之表是知毛遂頴脱義感平原孫惠文詞來干東海願循寡薄有懐髦彦籍甚清風為日久矣未獲披覿良深延佇一作佇遲比髙天流火早應凉颷陵雲仙掌方承清露想攝衛攸宜與時休適前園後囿一作圃從容丘壑之情左琴右書蕭散煙霞之外茂陵卧一作謝病非無封禪之文彭澤遺榮差一作先有歸來之作優遊林雅何樂如之屬當藩屏宣條揚越坐棠餘一作聼訟事絶詠歌攀桂摛詞眷言髙遁至於揚旌北渚飛盖西園託乗乏應劉置醴闕申穆背淮之濵徒聞其語趨燕之客罕值其人卿道冠鷹揚聲髙鳯舉儒墨泉海詞章苑囿栖遲衡泌懐寳迷邦狥兹獨善良以於悒今遣行人且宣徃意側望起予甚於饑渴相便輕舉副此虚心無信投畨一作石之談宣慕鑿坯之逸書不盡言更慚詞費一作皆隋書王真傳與道士徐鴻客書李宻夫天地閉而賢人隠少㣲光而處士見是以崆峒之上軒轅問於廣成汾水之陽唐帝從於齧缺是知肥遁為羙齊物攸歸雅節與蘭桂俱芳髙風共雲霞競逺宻未遇𤣥女思逢黄石誰有啓沃謀猷弼成韜鈐者也尊師八風五星之候玉臺金匱之書莫不洞曉於心若指諸掌今龍戰于野鵬翔廖廓或出或處且變星霜猶未闕授道是曰仁人隣集作除暴静亂方稱君子賛我興運今也其時尊師宜躡缺擔簦用虞卿之禮披榛輓輅襲婁敬之風引領瞻望拂席相待遲聼酈生之談方聞左車之説桂樹出幽嵗云暮矣桃花源穴一作隐處想見其人早赴六軍孤巳勒彼州令以禮相送冀面披述書不盡言書至鴻客晦迹不知所之答馮子華處士書王績乖别甫爾已十餘年誦采葛之詩增其慨詠夫人生一世忽同過隙合散消一作動息周流不居偶逢其適便可卒嵗陶生云富貴非吾願帝鄉不可期又云盛夏五月跂脚東一作北忩下有凉風暫至自謂是羲皇上人嗟乎適意為樂雅㑹吾意一作心吾河渚間集有先字有先人故田十五六頃河水四繞東西趨岸各數百歩古人云河濟之濵宜黍况中州之腴乎家兄鑒裁通照知吾縱恣散誕不閑拜揖糠粃禮義錙銖功名亦以俗外相待不拘以家務至於鄉族慶吊閨門婚冠寂然不與集作預者已五六嵗矣親黨之際皆以山麋野鹿相畜性嗜琴酒得盡所懐幸甚幸甚近復都盧棄家獨坐河渚結構茅屋并厨廐總十餘間奴婢數人足以應役用天之道分地之利耕耘薦蓘黍秫而已春秋嵗時以酒相續兼多養鳬鴈廣牧集作壯鷄豚黄精白术茍集作狗杞薯蕷朝夕採掘集作掇以服供餌床頭素書數帙莊老及易而已過此已徃罕嘗或披忽憶弟兄則渡河歸家維舟岸側興盡便返毎遇天地晴朗則於舟中詠集作誦大謝亂流趨孤嶼之詩𦕈然盡陂澤山林集作山林陂澤之思覺瀛州方犬森然在目前或時與舟人漁子方集作分潭並釣俛仰極樂戴星而歸歌詠詠集作賦詩以㑹意為巧集作功不必與夫閑人更相唱和十字集作不必與夫悠悠閑人相唱和也孤住河渚傍無四鄰聞犬聲望煙火便知息身之有地矣近復有人見贈集有以字五品地黄酒方及種薯蕷茍杞等法用之有妙集作効力省功倍不能腵都玩切脯也脩渾沌並常行之裴孔明雖是異名教物然風月之際徃徃有髙人體氣兼特受巧性思若有神自作素琴一張云其材是嶧陽孤桐也近擕以相過安軫立柱龍脣鳯翮實與常琴不同發音吐韻非常和朗吾家三兄生於隋末傷代集作世擾亂有道無位非汾亭操盖孔子龜山之流也吾嘗親受其調頗為集作謂曲盡近得裴生琴更習其操洋洋乎覺聲器相得今便留之恨不得使足下為鍾期良用耿然集作耿耿吾所居南渚有仲長先生結菴獨處三十載非其力不食傍無侍者雖患瘖疾不得交語風神肅肅集作蕭蕭可集無可字無俗氣携酒對飲尚有典刑先生又作集作著處集無此字獨遊頌及河渚先生傳開物寄道懸解之作也詩取翫讀便復江湖相㤀吾徃見薛收白牛溪賦韻趨髙竒詞義晦集作曠逺嵳峩蕭瑟真不可言壯哉邈乎揚班之儔也髙人姚義嘗語吾曰薛生此文不可多得登太行俯滄海集作溟髙深極矣吾近作河渚獨居賦為仲長先生所見以為可與白牛連類今亦冩一本以相示可與清溪諸賢共詳之也亂極則治集作治至王途漸亨天災不行年數集作榖豐熟賢人充其朝農夫滿於野吾徒江海之士擊壤皷腹輸太平之税耳帝何力於我哉又知房李諸賢肆力廊廟吾家魏學士亦申其才公卿勤勤有志於禮樂元首明哲股肱為良何慶如之也夫思能獨放湖海之上一作士才堪濟世主者所須所恨姚義不存薛生已殁使雲羅天網者有所不該以為歎恨耳吾比風痺發動常劣劣不能住然煙霞山水性之所適琴歌酒賦不絶於時時遊人間出入郊郭暮春三月登於集作于北山松栢羣吟藤蘿翳景意甚樂之箕踞散髪與鳥獸同羣五字集作同羣烏獸醒不亂行醉不干物賞洽興窮還歸河渚蓬室甕牖彈琴誦書優哉一作悠㳺哉聊以卒嵗首夏漸集作方熱足下何如也願動息多宜黄頰之聚何時暫㤀偶因集作見南風畧示所懐敬願珍集作彌厚不一一王君白答程道士書徐道士至獲書詞義懇切具受一作愛之也吾嘗讀書觀覽數千年事久矣有以見天下之通一作幽趨識人情之大方語黙紛雜是非淆亂夸者死權烈士殉名貪夫溺財品庻毎集作安生各是其所同非其所異焉可勝校一作數哉故吾師曰莫若俱任而兩㤀仲尼所以無可否於人集作其間莊周所以齊大小於自適是謂神而化之使民宜之百姓日用而不知也夫君子所思不出其位道有不同不相為謀盖為此也足下欲使吾適人之適而吾自適其適非敢非足下之義也且欲明吾之心一為足下陳之昔孔子曰無可無不可而欲居九夷老子曰同謂之𤣥而乗闗西出一作棄出關西釋迦曰色即是空而建立諸法此皆聖人通方之𤣥致𢎞濟之秘藏實寄冲鑒君子相期於事外豈可以言行詰之哉故仲尼曰善人之道不踐迹老子曰夫無為者無不為也釋迦曰三災彌綸行業湛然夫一氣常凝事吹成萬萬殊雖異道通為一故各寧其分則何異而不通茍違其適則何為而不閔故夫聖人者非他也順適無閔之名即分皆通之謂即分皆通故能立不易方順適無閔故能遊不擇地其有越分而求皆通違適而求無閔雖有神萬將獨柰何故曰鳬脛雖短續之則悲鶴脛雖長截之則憂言分之不可違也夢為鳥唳於天夢為漁沒於泉言適之不可違也吾受性潦倒不經世務屏居獨處則蕭然自得接對賔客則樂集作㳟然思寢加性又嗜酒形骸所資河中黍田足供嵗釀閉門獨飲不必須偶毎一甚醉便覺神明一作情安和血脉通利既無忤於物而有樂於身故常縱心以自適也而同方者不過一二人時相徃來並棄禮數箕踞散髪𤣥譚虚論兀然同醉悠然便歸都不知聚散之所由也昔者吾家三兄命世特起先擇集作先宅一徳續明六經吾嘗好其遺文集作書以為匡扶之要畧盡矣然嶧陽之桐以集作必俟伯牙烏號之弓必資由基茍非其人道不虚行吾自揆審矣必不能自致台輔㳟宣大道夫不渉江漢集作海何用力舟不思雲霄何用集作事羽翮故頃一有爾字巳來都復散棄雖周孔制述未嘗復窺何况百家悠悠哉去矣程生非吾徒也若足下者可謂身處江海之上心遊魏闕之下雖欲行志不覺坐馳若以此見輕議大道將恐北轅適越所背彌逺矣吾頃者加有風疾劣劣不能住但欲乗化獨徃任所遇耳不能復使離婁役目契后集作􅀈詬莊子作喫詬口獬反詬口豆反多力也勞精怵心蔽焉一作用以物為事也朂哉夫子勉建良圖因山僧還畧此逹意也王君白答刺史杜之松書月日博士陳龕至奉處分借家禮并帙封送還請領也又承欲相招講禮聞命驚笑不能已已豈明公前眷或徒集作陡與下走相知不熟也下走意踈體放抑集作性有由焉集作然兼棄俗遺名為日久矣集作與日已久淵明對酒非復禮義能拘叔夜携琴唯以煙霞自適登山臨水邈矣㤀歸談虚語𤣥忽焉終夜僻居南渚時來北山集作庇兄弟以俗外相期鄉閭以狂生見待歌去來之作不覺情親詠招隐之詩唯憂句盡帷天席地友月交一作朋風新年則栢葉為罇仲秋則菊花盈把羅含宅内自有幽蘭數叢孫綽集作楚庭前空對長松一樹髙吟朗嘯挈榼擕壺直與同志者為羣不知老之將至欲令復整理簪屨一作履脩束精神揖讓邦君之門低昂刺史之坐逺談糟粕近棄醇醪必不能矣亦將恐芻狗貽夢櫟社見嘲去矣君侯無落吾事王君白與侯二山人書于邵侯二山人足下所示三論鈎深索隐俾夜作晝殆浹辰矣如登太山徒仰其髙若渉大水不測其深㫖哉斯言盖不可得而儔矣以此究天人何道不𢎞以此圖戰伐何敵不尅以此養精神何夀不長可謂通幽洞㣲垂代作教寧止士林争效求道趨風乎予復何才敢承末學巳今繕冩藏諸袖中刳心寳持不敢失墜幸甚恐須舊本謹勤専送猶賴發䝉何當訪及閑宵對酒斯以為榮不復一一于邵頓首答泗州開元寺僧書李翺前日見命作開元寺鍾銘云欲藉僕之辭庻㡬不朽而傳於後世誠足下相知之心無不到也雖然翺學聖人之心焉則不敢讓乎知聖人之道者也當見命時意亦思之熟矣吾之銘是鍾也吾將明聖人之道焉則於釋氏無益也吾將順釋氏之教而述焉則紿乎下人集作天下甚矣何貴乎吾之先覺也吾之辭必傳於後世集本文粹作後有聖人如仲尼者之讀吾辭也則將大責於吾矣吾畏聖人也夫銘古人多有焉湯之盤銘其辭云云衛孔悝之鼎銘其辭云云秦始皇帝之嶧山銘其辭云云皆可以紀功伐垂戒勸銘於盤則曰盤銘於鼎則曰鼎銘於山則曰山銘盤之辭可遷之於鼎鼎之辭可移集作遷之於山山之辭可書集作遷之於碑唯時之所紀爾及蔡邕作黄鉞銘亦文粹作以紀功于黄鉞之上爾或盤或鼎或嶧山或黄鉞其意與言皆同非如髙唐上林長楊為之作賦云爾近代之文士則不然為銘為碑大抵詠其形容有異於古人之所為其作鍾銘則必詠其形蜀本有容字與其音聲文粹作都與其財用之多少鎔鑄之勤勞耳非謂勒功徳垂戒勸於器也推此類而極觀之其不知君子之文也亦甚矣然其所為文亦皆有盛名於時天下之人咸謂之善焉吾不知吾所獨知其能賢於他人他人皆不知乎十二字集本文粹作其能賢於人之皆不知乎天下人咸以不知者云善則吾之獨知又何能云善乎雖然吾亦順吾心以順聖人爾阿俗從時則吾不忍為也故當時甚未敢承教八字文粹作久未承教為其所懐也如前所云足下欲吾之必銘是鍾也當順吾心與吾道則足下之名必傳於後代矣如欲從俗之所云則天下屬辭之士願為之者甚衆矣何藉於李翺之辭哉幸思之也日中時將過淮而南書以通意且為别也與濟法師書白居易月日弟子太原白居易白濟上人侍者集作左昨者頂謁時不以愚䝉言及佛法或未了者許重討論今經典間未諭者其義有二欲面問答恐彼此卒卒語言不盡故粗形於文字願詳覽之敬佇報章以開未悟所望所望佛以無上大惠集本文粹作慧觀一切衆生知其根性大小不等而以方便智説方便法故為闡提説十善法為小乗説四諦法為中乗説十二因縁法為大乗説六波羅宻法為對病根投以良藥此盖方便教中不易之典也何者若為小乗人説大乗法心則狂亂狐疑不信所謂無以大海内於牛跡也若為大乗人説小乗法是以穢食置於寳器所謂彼自無創一作瘡勿傷之也故維摩經總其義云為大醫王應病與藥又首楞嚴三昧經云不先思量而説何法随其所應而為説法正是此義耳猶恐説法者不随人之根性也故又法華經戒云若但讃佛乗衆生沒在罪苦不能信是法破法不信故如此非獨慮説者不能救病亦懼聞者不信沒入罪苦也則佛之付嘱豈不叮寧耶何則法王經云若定根基為小乗人説小乗法為大乗人説大乗法為闡提人説闡提法是斷佛性是滅佛身是説法人當歴百千萬刼堕諸地獄縱佛出世猶未得出若生人中缺辱無舌獲如是報何以故衆生之性即是法性從本以來無有増减如集本文粹作云何於中分别病藥又云於諸法中若説髙下即名邪説其口當破其舌當裂何以故一切衆生心垢同一垢心净同一净衆生若病應同一病衆生須藥應同一藥若説多法即名顛倒何以故為妄分别拆善惡法破一切法故随機集作基説法斷佛道故此又了然不壊之義也又金剛經云是法平等無有髙下是名阿耨多羅三藐三菩提又金剛三昧經云皆以一味道終不以小乗無有諸雜味猶如一雨潤據此後三經則與前三經義甚相戾也其故何哉若云依維摩詰謂富樓那云先當入定觀此人心然後説法又云不觀人根不應説法夫以富樓那之通慧又親奉如来為大弟子尚未能觀知人之集本文粹無之字心况後五百年集本文粹作嵗末法中弟子豈能盡觀知人心而後説法乎設使觀知人心若彼發小乗心而為説大乗法可乎若未能觀彼心而率已意説一本有法字又可乎既未能觀與嘿然不説又可乎若云依義不集作又依語則上六經之義互相違反其將孰依乎若云依了經義則三世諸佛一切善法皆從此六經出孰名為不了義經乎况諸經中與維摩法華首楞嚴之説同者非一也與法王金剛三昧之説同者亦非一也不可遍舉故於二義中各舉三經此六經皆上人常所講讀者今故引以為問必有甚深之㫖焉今且有人忽問法於上人上人或能觀知其心或未能觀知其心將應病與藥而為説耶將同一病一藥而為説耶若應病與藥是有髙下是有雜味即反法王等三經之義豈徒反其義又獲如上所説之罪報矣若同一病一藥為説必當説大乗大乗則佛乗也若讃佛乗且不随應集作心字且不救病即反維摩等三經之義豈徒反其義又使衆生沒在罪苦矣六者皆如來説如來是真語實語不誑語不異語者今随此則反彼順彼則逆此設有問者上人其將何法以對焉此其未諭者一也又五藴集作隂者色受想行識是也十二因縁者無明縁行行縁識識縁名名縁色色縁六入六入縁觸觸縁受受縁愛愛縁取取縁有有縁生生縁老死病集本文粹有苦字憂悲苦惱是也夫五藴集作隂十二因縁盖一法也盖一義也畧言之則為五詳言之則為十二雖名數多少或殊而而集本文粹作其於輪次轉遷合同條貫今五藴集作隂中則色受想行識相次而十二一本有因字縁中則行識色入觸受想集作相縁一則色在行前一則色次行後正序之既不類逆倫之又不同若謂佛次第而言則不應有此雜亂若謂佛偶然而説則不當名為因縁前後不倫其義安在此其未諭者二也上人耆年大徳後學宗師就出家中又以説法而作佛事必能研精二義合而通之仍望指陳著於翰墨盖欲藏於篋笥永永不㤀也其餘疑義亦續咨開集本文粹作問居易稽文粹作頓首文苑英華巻六百八十八
