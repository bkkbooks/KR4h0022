body:
  text: 文苑英華卷五百六十九宋李昉等編雜賀一爲杭州崔使君賀尊號表一首賀加天寳尊號表一首賀冊尊號表一首爲河南盧尹賀上尊號表一首賀新樂表一首爲雍州父老賀鑾駕停幸洛邑表一首爲何舍人賀於梁王處見御書文表一首爲韋右相賀拜洛表一首賀納諫表一首爲秋官員外郎李敬仁賀聖躬新牙更生表一首賀聖躬痊復表三首賀聖體平復御紫宸殿受朝賀表一首爲安平公華州賀聖躬痊復表一首爲杭州崔使君賀尊號表武后李嶠延載元年臣某言伏奉五月十一日制書陛下俯順羣情懋膺大典垂光休於百代被鴻恩於萬族凡在含生孰不慶幸臣某中賀臣聞太朴既謝帝皇之迹已殊聖道不追王覇之風且雜雖崇號廣溢遞享於隆名而徳薄政衰不光於神器一作氣伏惟越古金輪聖神皇帝陛下承大雲之法記應榮河之寳籙以天上天下之尊爲隆平太平之主不言而理三階正而六氣調不怒而威萬㝢清而百蠻服延富夀於和平制雍熈於易簡慕義嚮化之黨候雨占風疇徳瑞聖之符非烟若霧青􅁭蹈舞於庠塾黄髪謳吟於衢路固可使堯舜擁篲禹湯扶輪超塵刼而首唱邈梵天而髙視豈登三减疑作咸五邁昔殊今而已哉嘉號初登殊章備舉鋪帝容而建皇極大寳聿承旋乾軸而正坤維洪鑪再造仙渙與祥風俱動湛恩共天威並作緩姬文之獄既削爰書錫漢后之酺且班戎律覃敷之澤出九掖而浸羣方抃躍之音自三川而周四海遂乃崇祇肅於梵宇致嚴恭於清廟申寃舉滯而有善畢升崇徳報功而無文咸秩䂓模粲而洋溢道徳紛而布濩豈直朝野稱慶觀羙化之維新故亦神祗降祥見鴻基之載固臣叨延龜組繆分虎符千年有遇更逄開闢之初百辟承歡不預趨馳之末瞻雲路而式怍仰天庭而載佇踴躍之懐企聳無極無任鳬藻悦豫之至謹遣某官奉表陳賀以聞賀加天寳尊號表李邕天寶元年臣邕言伏奉今月日恩㫖萬方士庶九土軍戎昭洗宸波光被聖渥臣誠歡誠喜載欣載躍頓首頓首死罪死罪臣聞沐雨露者草樹自樂荷陶鈞者動植皆春故知則而象之守而行之所謂則天之明立人之極有慶斯大無得而名者也伏惟陛下尊崇聖祖肅㳟道教子物天徳序位代工惣三五之妙勲統億兆之全業戈甲謐息華戎底平故得真容慶應潛通帝夣寳符靈貺允叶神心加號所以發祥郊天所以昭報大禮盛事光赫旬時作解周仁廓開宇宙天禀類表作京褒稱雲紀變名風物光華再馳暉於日月河山保界重賦質於乾坤同一氣之逮類表作建初與四時而浸逺天長地久呼萬嵗於太平國泰朝歡舞一作職九韶於聖主臣忝私守郡常荷載天空馳就日之誠未盡歌雲之慶無任欣躍竦抃之至賀冊尊號表憲宗韓愈元和十四年臣某言伏聞宰相公卿百官及關輔百姓􅂄集作耋老等以陛下功崇徳鉅天成地平冝加號於殊常以昭示於来代載陳情欵懇至再三陛下仰稽乾文集作符俯順人志乃以新秋首序令月吉辰發揚鴻休膺受􅂋冊天人交慶日月揚光寰海之間含生之類抃歡踴躍以歌以舞誠歡誠喜頓首頓首臣聞體仁長人之謂元發而中節之謂和無所不通之謂聖妙筭無方之謂神經緯天地之謂文戡定禍亂之謂武先天不違之謂法天道濟天下之謂應道伏惟元和聖神文武法天應道皇帝陛下子育億兆視之如傷可謂體仁長人矣喜怒以類刑賞不差可謂發而中節矣明照無私幽隠畢逹可謂無所不通矣發號出令雲行雨施可謂妙筭無方矣三光順軌草木遂長可謂經緯天地矣除剗冦盜宇縣清夷可謂戡定禍亂矣風雨以時祥瑞輻湊可謂先天而天不違矣國内無飢寒四夷皆朝貢可謂道濟天下矣衆羙備具名實相當赫赫巍巍超今冠古方當講明堂辟雍之事撰太山梁父之儀搜三代之逸禮補百王之漏典時乗六龍肆覲東后微臣幸生聖代觸犯刑章假息海隅死亡無日瞻望宸極心魂飛揚有斥集作永棄之非集作悲無自新之望曽不得與鳥獸率舞蠻夷縱觀爲此啣酸抱痛負集作且恥且慙無任感恩戀闕懇逼徬徨之至謹奉表陳賀以聞爲河南盧尹賀上尊號表武宗李商隠㑹昌五年臣某言臣得本道進奏院狀知宰臣某等奉上尊號以光洪休耀列聖之睿圗表三宫之慈集作義訓凡在生物孰不歡心臣某中賀臣聞善言天者必推功於廣覆善言日者必詠徳於大明然後物仰𤣥穹人知景曜皇王擬象今古同規伏惟仁聖文武章天成功神徳明道大孝皇帝陛下體天垂䕃法日輪輝𢎞上徳以纉戎啟下武而膺運頃從臨御旋致治平雨塊風條時推順適苖螟葉􅀈坐致消亡是以銀甕石碑非煙浪井神而告瑞史不絶書且獯鬻爲災周秦之䇿金行火運不絶於侵陵瀚海隂山幾渝於約誓而敢乗衰運來犯昌朝陛下乃赫以天威授之宏畧一伐而單于僅免三鼓而貴主来還滅大邦之仇讐攄累聖之忿憤及晋陽逐帥代馬新羈陛下又濬發宸襟委諸廟畫浹辰而前軍就路逾月而元惡膏碪浄豐沛之遺疆舉陶唐之故俗蕞爾潞子復生孽童脱縗冀恩止柩拒詔據九折之險有五州之人藪澤逋逃糞土租税陛下又逺揚神㫁深詔徂征合鎮魏之強藩出韓彭之鋭將夷其巢窟去彼根株清明皇之舊宫復金橋之故地曽非曠嵗集此丕功固已至化潜融事光於玉板𤣥機獨運理溢於瑶編况又志切希㣲道存冲漠慕遺蹤於姑射載動堯心思順請於崆峒欲勞軒拜逺惟集作掦聖祖載佇神孫俾異法皆袪多門就掩麟殿正𤣥元之座鳯書招黄老之徒將以休有萬齡臨茲兆衆使咸踐夀昌之域俱逰富庶之鄉巍乎煥乎盛矣羙矣故得人祗叶欲華夏均懐願加尊􅂋之稱以報財成之羙宰臣等果能陳大義允建鴻名伊尹暨湯咸有一徳咎繇謨禹克讃九功述至善於王猷標具羙於帝籙南山稱夀北辰降光永終一作於無極之年長奉上清之號臣幸丁昌運方守洛京空深戀闕之誠不在稱觴之列舉頭見日雖悲千里之遥測管窺天且慶百生之幸無任徘徊望闕蹈舞踴躍之至賀新樂表周武帝庾信臣等言臣聞天地順動則雷出爲豫聖人功成則風行有節故六徳在咸池之官山谷可調八風入承雲之奏人神不雜我大祖文皇帝體國經野設官分職變魏作周移風正雅衣裳而朝萬國珪璧而㑹諸侯至如經綸圗籍校讐煙燼樂正無缺章秩宗無廢典豈但商頌十篇得諸太師之室虞書五禮取於恭王之宫伏惟皇帝以下武嗣興中陽繼業運日月之明動淵泉之慮律厯著微無煩於太史隂陽晷度躬定於天官故得叅考八音研精六代封晋魏爲二王序殷周爲三恪雖復朱干玉戚尚識典刑素韍纁裳猶因雄據未若山雲特起八卦成形鳯凰于飛九州觀徳改金奏於八佾合天元於六舞聲含擊石更入登歌調起初鐘還叅玉管足以感天地而通神明康帝徳而光𤣥象昔者齋居𤣥扈爲曲在於雲門師度盟津習舞歸于山立遂乃包括三名克諧一代作者之謂聖天之所啟乎豈惟路皷靈鼗空桑孤竹廣矣大矣輪焉奐焉是知零陵孝亷空傳玉管始平太守虛稱銅尺臣等並預鈞天同觀張樂軒墀𢎞敞欄檻眺聽崇牙業業猛簴趪趪翠鳯掦旌靈鼉樹鼓杳𡨕雲霧蕩薄丘陵醴泉與甘露同飛赤鴈與斑麟俱下聘魯請觀理當見其盛徳適齊忘味定是知其盡羙昔淵魚聽曲尚得聳鱗櫪馬聞絃猶能仰秣臣等誠愧知音敢忘悦豫若使詳其音律是所邈然但能記其鏗鏘於茲爲幸不勝慶悦之誠謹詣朝堂奉表以聞爲雍州父老賀鑾駕停幸洛邑表髙宗李嶠臣等某言伏奉今月日詔書鑾駕停幸洛邑臣等輕生多幸淺識逢時青􅁭遊聖人之國白首觀太平之化常恐㳙涘難效溝壑易期所以眷戀軒宇徘􅆦霄極日者農秋蹔缺庶政微勤天皇損上益下忘身循物便欲移鑾徙蹕望河洛之封畿削賦蠲徭罷咸秦之力役臣等仰銘𤣥造退揆愚心誠以天府膏腴帝畿殷實雖菑畬之務稍闕於千箱而衣食所資尚豐於累載况惸嫠賙給家室乂安何容使扆座鳴謙聖躬服劬勞之事衡門髙枕臣等蒙過差之澤是用低徊跼蹐抒抽慙惶方且選議蓬茨推中􅁭於白屋囚言槐棘外下情於紫路不謂乾心俯應聖徳潜融降六璽而紆紱廻三光而改照人欲天從既通誠感禀靈含氣疇非慶躍竊惟政途非一朝務有恒國彛不可以思疑廢家征不可以事闕天皇愛精頤壽荅兆庶之歡心臣等畢力窮年供黍稷之餘税庶得百度無曠九功惟叙伏望皇明乃睠輿輦少安則海甸蒸人撫耕鑿而知勉渭濱遺老仰雲天而識庇無任踴躍之至爲何舍人賀梁王處見御書雜文表前人臣彦先等言臣於梁王三思處見御書雜文尺牘凡九十卷跪發珍藏肅承瑶檢天文景鑠璧合而珠連聖理雲廽鸞驚而鳯集究黄軒鳥跡之巧殚紫府結空之勢偃波垂露㑹寳意而咸一作成新半魄全曦象天形而得妙固已竒蹤絶俗羙態入神掩八體而擅規模冠千齡而垂楷法重以語成四教文揔六詩聲咀徴而含宫㫖懲違而動疑作勸徳用之於國敦風俗而厚人倫行之於家習雍和而崇孝敬惟彼良翰特蒙殊奬銘厚渥而歡悚竭深誠而奉戴是用編之玉軸勒以銀繩盡罄梁珠特裝瑇􅀈之匣惣攻一作收陶璧用餙瑠璃之笥雕鏤千品緹巾萬襲芸香却蠧芝體爲封珍寳之精下燭西崑之岫文章之氣上纒東壁之象實可謂天下之妙迹域中之竒觀者焉臣等幸遇休明叨近簮笏駭矚非常之瑞欣逄不世之寳足蹈手舞徒懐鑚仰之心夕死朝聞豈識名言之地無任抃躍歡忻之至謹奉表陳賀以聞爲韋右相賀拜洛表武后闕名垂拱四年臣某等言伏奉五月九日制書將拜圗温洛肅事南郊御朝堂列群后恭聞大禮不勝慶躍臣某中賀微臣泛覧金冊詳窺玉板商較於七十二代下上一作上下於數百千年以羲軒稱皇所貴者河圗龍出以堯舜稱帝所尊者洛書龜負猶未聞緫集靈命𢎞敷聖業籠大勛於萬古盡能事於一朝非天下之至神其孰能與此乎伏惟皇太后陛下肅膺遺託光踐丕基皇業髙於補天母徳隆於配地東西浹洽窮八制而流河海南北貞明洞六幽而懸日月淹中訪禮汶上披圗情每留於布政義不忘於宗祀於是全謀聖造異制神行迎四象而疏圍向八風而闢牖上圎法天而煙雲爲之動色下方象地而龜玉所以呈姿𤣥功叡範洋溢於歌頌秘采靈文昭彰於篆刻豈白雲青玉唯傳地理之經黄魚黒鳥但播一作稱天乙之號可以答上𤣥之命可以光累聖之隆制有司陳法駕用禋柴之典採沉璧之儀然後負黼扆而朝百神垂衣裳而㑹萬國不亦休哉不亦盛哉臣忝預出征恨深流滯河西弔影啣珠之託未申洛北馳心拊石之歡何極不任悚懼之至賀納諫表代宗常衮臣某言伏以補闕姚南仲和仕幹等上封事恩命特與改官及進階兼賜章服又内常侍吳承倩奉聖㫖令两省供奉官數論得失無有隠諱者徳音霈然公讜知勸羣情震喜中朝動色易曰感人心而天下和平今之所感可謂深矣臣謬當丞弼之任不能有所啟聞踧踖自慙惶汗失次然以聖徳之𢎞納天聽之宏博欣奉踴躍不勝大慶中賀臣聞從諫則聖帝之徳也有犯無隠臣之分也故上聞逆耳之忤受而不疑下有殺身之益死而無悔禮曰天子齋戒受諫又曰近而不諫則尸利帝道莫盛於有虞書之羙舜則曰嘉言罔攸伏萬邦咸寜王道莫過於有周詩之頌文則曰思皇多士惟周之楨漢家雜之以霸亦詳延極諫訪求得失國朝稽合皇道肇脩人紀貞觀故事布政典章危言正論聞於天下陛下以欽明御厯紹休祖業仁聖廣大天覆地容求賢進善有如不及每覧群臣奏議日旰忘勞穆然嘉納不令夙退順顔者必逺忤㫖者必容而芻蕘之可擇庶藜藿之兼採少有所補從之如流雖委輅論都即日西行伏車頓首路廽乗輿方之於今未云其速而又渙發宸㫖宣𨗳近臣直言者賞之於朝罷奏者責其所職以明沮勸大悦人心則太平雍熈之化溥將四表矣可以動天地可以服一作伏戎夷雖上古至理納諫逹聦坦然不諱未覩今日之盛也望請宣付史官光垂帝録臣職任潤色敢揚鴻休無任欣躍之至爲秋官員外郎李敬仁賀聖躬新牙更生表武后李嶠臣敬仁言昨因奉事蒙恩入對伏見陛下所御湛露殿三間兩間雨漏無所修葺又因顧問之次伏承聖㫖云去年口中生一齒今年又生一齒臣伏以聖徳謙冲躬自菲薄富有四海尊居萬乗而中堂外扉不閲一作關於寒暑上棟下宇未離於燥濕降紫宸而齊白屋屈帝力而用氓心雖昔之采椽土階茅茨蒿柱漢皇之儉用夏后之卑宫六籍之所讃揚百家之所記述曷足以希風上聖仰帝道之崇髙擁彗後塵望皇輿之軌躅臣又聞之易有四營金牙爲夀考之象詩有六義玉齒載神仙之謡還年而編貝不虧却老而瓠犀仍出亦有堅而不脱聞於𨗳養之方落而更生得自靈飛之散斯並道藏幽記術隠上情誠福力之所招匪勤求而可致陛下端莊静黙寛惠仁慈抑嗜欲而省煩勞恤飢寒而甘敝陋宜其延貺宗社受報黎元集天地之休和享靈祗之介祉故得百祥䕶體五福登年同鎬邑之夣齡邁鑣宫之錫夀豈徒一人有慶常居北極之尊實乃萬姓同歡共仰南山之固臣謬以庸賤獲奉宸嚴欣聖夀之延長願稱大慶見宸居之挹損思揚至徳乞宣示海内仍録付史官庶使六合之中知寳筭之方永百代之後頌休風而不絶無任抃躍之至謹詣闕奉表陳賀以聞賀聖躬痊復表代宗常衮臣某言臣親一作見奉聖㫖伏承御膳過時微似煩熱臣等退用兢悸不安寢興齋居潔誠思獲休問適中使吳承倩至奉宣徳音今已校退卿等不須憂者恭承睿㫖俯協歡心欣抃失容蹈舞不足伏以陛下裁成二氣聴斷萬方每積憂勞載勤旱暵一作宵旰所以下祈人命上黷聖躬責在微臣退増兢懼今溽暑過候凉秋戒期方助穆清上滌𤣥慮伏惟簡臨庻政保合太和以答天地穣穰之福以慰臣子顒顒之望天下幸甚無任喜慶踴躍之至同前于公異臣某言今月十七日衙官吏萬項奏事回伏奉手詔伏審聖躬頃暫乖理今悉康平凡在臣子不勝抃躍中賀伏惟皇帝陛下自天生徳紹聖垂衣類表作休運啟握符已慶無疆之夀疾稱勿藥果從有喜之辭歡初洽於朝廷慶旋周於海内臣伏以天心恭順庶政殷繁既當痊愈之初宜加頤攝之道然猶日旰對奏未明求衣理或至於憂勤事終干於思慮恐乖將候竊未遑寜伏乞朝廷之宜付之宰相伐討之任仗彼戎臣從容聖心消息𤣥化爲宗社自愛委諸有司幸甚幸甚臣蒙國寵榮輙露誠懇伏惟察納表臣愚衷同前臣某言今月七日中使至進伏奉敕書手詔慰諭臣者伏以聖躬頃乖頥攝少有不安景福無疆旋以康泰屏營奉詔且喜且驚臣聞子之事親出告反面臣之事主移孝爲忠君親之間其體無異自宜問安内竪増憂寢門平居之時猶無闕禮乖理之後豈合遑寜又臣聞勤則近憂憂則生疾豈陛下以萬方黎庻尚未和平三輔甲兵猶從征討此皆臣下之過遂煩君上之懐臣特荷國恩超踰儕軰死生不係於已命休戚實同於國家况聖夀日躋皇符永固雖禎祥合慶祚必夀於南山臣子馳誠心豈離於北闕類表作極伏以聖謀思振邉徼正安輕騎無信宿之程郵館無兼金之費臣欲旬日之内輕行入朝陪列庶官恭承􅌖㫖審聖質之安否布微臣之欵誠伏乞矜允遂臣愚懇賀聖體平復御紫宸殿受朝賀表元稹臣某言今日得上都進奏官報稱昨日陛下御紫宸殿受群臣賀表伏審聖躬萬福親見百寮率土皆歡溥天同慶臣某中賀臣聞兩曜有明晦所以成其不已四瀆有盈縮所以成其不竭不有燎火無以辨玉質不有霜霰無以驗松心是以軒轅神仙然後夣華胥之逰秦穆疾寢然後享鈞天之樂堯以癯瘠而爲聖禹以胼胝而稱功斯皆因疾成妍以勞逢福非臣臆度敢進瞽言昨者聖體不安纔經旬日穆不卜吉勿藥有喜此所以表北極而長尊配南山而永固者也况日臨黄道萬物皆榮帝御紫宸千官畢賀臣恨以守符外郡不獲稱慶明庭空懐皷舞之心莫備賡歌之末臣某無任跳躍徘徊瞻望歡欣之至謹差知衙官劉宗奉表陳賀以聞代安平公華州賀聖躬痊復表文宗李商隠臣某言今月某日得本道進奏院報以聖躬痊和右僕射平章事臣涯等奉見聖躬訖社稷殊祥生靈大慶臣沗分朝寄四奉國恩無任抃舞踴躍之至臣聞天普覆也應運而健若龍行日至明焉有時而氣如虹貫伏惟皇帝陛下道超普覆跡邁至明思社稷集作宗社之靈惟徳是輔念蒸黎至廣以位爲憂求衣未明觀書乙夜夀域既勤於躋俗大庭㣲闕於怡神是以自北陸送寒蹔停禹㑹及東郊迎氣爰復堯咨四海方来百辟咸在六幽雷動萬夀山呼惟臣獨以一麾載離雙闕犬馬之㣲誠空切鴛鴻之舊列難階提郡印而通霄九驚對使符而一食三起今幸以俗臻富庶年比順成伏惟稍簡萬幾以迎百福託燮調於彼相責綏撫於列藩承九廟之降祥副兆人之允望臣某不勝慺慺慊慊之至謹差某奉表陳賀以聞文苑英華卷五百六十九
