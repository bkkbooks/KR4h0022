body:
  text: 文苑英華巻八百二十七宋李昉等編宴遊五居處盧郎中齋居記一首㑹稽虚上人石帆山靈泉北塢記一首司徒岐公杜城郊居記一首廬陵所居竹室記一首堂上草堂記一首虢州三堂記一首廬山草堂記一首尉遲長史草堂記一首居處盧郎中齋居記李華鴻鵠遡清風陵顥氣翺翔自得於冥冥之間故虞衡矰繳不能為患甘芻豐秣羈縶駿驥首冠鑁錫身被纓纕力方盛也騁於康逵及其殆也困於鞭策由是智者高鴻鵠而卑駿驥豈妄而論之一無之字哉今兇渠假息五兵未偃廟堂有風力之臣征鎮皆方召之老則仁人静士戢伏自持各其志也尚書左司郎中嗣漁陽公盧振字子厚奉世徳而聿修之味道風而㳺泳之處于九江南郭荒榛之下不貽害於身不假力於人夷堆墆填一作實窪穽尋尺無遺材草木不移植書堂齋亭成於指顧高松茂篠森於門巷晏然燕居勝自我得君子出則行其志也公以瑚璉之器為郎官以干將之斷宰赤縣君子入則善其身也公就鴻鵠之冥冥捨騏驥之馳騁况大江在下名山當目嘉賔時来拱手長望可以頥神養一作逺夀暢其天和浴乎沂風乎舞雩吾與㸃也潯陽僑舊推仁人焉推智者焉廣徳二年四月五日趙郡李華記㑹稽虚上人石㠶山靈泉北塢記權徳輿靈泉北塢之主人曰大苾蒭虚公於諸佛㣲言義味之中深入圓净之集作以是辯才實智離於二邊嘗經行於邪溪稽山之下初石㠶山侣有頴川陳公表乆挂法冠抗迹塵外既以自適為適且悦虚公之風乃捨其北塢為公禪誦之地公既至則䟽翳薈刳擁腫隨其汙崇作為勝勢先是此山無泉逺汲溪流人既勞止而水之為用不足公乃黙以心集以作然感怳若有通崖隒集作隙之下㣲得泉脉及薙草轉石凖潛集作潗濬是沮洳畚之鍤之决之濬之噴若玉竇泄為瑶池净如醍醐瑩若琉璃疑青蓮可植金沙在下恵風天籟相為虚寂然後代集作殖碧鮮以相接引清流而備用以盥以潄以糜以茗或以助火化或以袪熱惱日用無窮不知其功使夫後學趨道之徒至於此者則澣濯纓塵漸漬法味還源復往以聲容為類不其至哉貞元初州牧左常侍王君行春訪道因以泉名塢又前代隠賢多逰踐於兹自東晉而下謝敷王子敬支遁白道猷洪偃皆有遺跡集作趾留於巖中今兹公宗本之外又牙以勝槩標品徐㑹稽公李渤疑海則命其溪曰五雲諫大夫齊君避舉則命其山曰玉笥其餘冠柱後恵文者有王氏張氏陸氏率用仁智樂兹清輝嘉名競爽以傲軒轂日至泉下為公宗雷雖匡山之社錫杖所叩不足集作是過也毎𤣥闗道機演暢㣲妙聞其一音皆攝妄言以趨静性居常淡然與靈泉為侣集作伍盖戒本其潔定因其止恵取其用然後觀身及泉二具集作俱無得清浄洄澓無入而不自得焉問法者又因泉以見虚公之道斯為至矣三年春獲與公遇俾予傳信故不敢沒其美又不敢蔓其辭時嵗在丁卯二月甲子記司徒岐公杜城郊居記司徒岐國公以盛徳相三朝以大中敷五教帝載協龢太階躋平既致用於方内亦宅心於事外神京善地啓夏南出凡十有六里而仁智之居在焉縈迴巗巘左右勝勢徑術逶迤於木杪臺亭􅑬嵼於山腹下崇岡冒青蒼步履平夷以至於堂皇四敞賔榻中容宴豆孤齋閑舘幽槩随之乃䦕洞穴以導泉脉其流泠泠或決或渟激而杯行瀑為玉聲初䝉於上下終滙於池際白波淪漣繚以方塘輕艫緩棹沿洄上下見煙霞澄霽之狀魚鳥飛沉之適濯于潺湲風于碧鮮紅葩火燃素英雪翻芊眠葱倩杳窱廻合含虚籟以四逹遡清輝而交映故其休休集作休沐燕息盍簮投轄則有鳴佩拖紳宗公雋人金閨集作闕玉堂之賔淑姿脩態流光含睇㢠廻風遏雲之藝中飲笑抃交歡擊莭不知公相之為貴適其適故也易坤之説曰君子以厚徳載物詩曰愷悌君子求福不回惟公以徳受福故光明昌大毎温室宴見一人尊禮而不名故其代天工斷國論卓爾以冠羣后暨夫暇日之戾止於斯也則暢天理棲顥氣翛然以遺萬物其無方與其不器與昔子房赤松子之逰且非代教安石東山之賞僻在下國豈若公宻贊化育内諧恬曠如春之仁如樂之和以君臣之交感兼動静之極摯從古以還無公比焉公之華宗自漢延平侯徙杜陵三守本封幾乎千祀故城南墟里多以杜為名逮今郊居不忘厥初又以見積厚流澤此焉囘復且公之心無町畦夀若岡陵昭融烜赫未始有極徳輿謬陪衆君子升公之堂嘉招盛集無間弦晦以衆美之不可以不紀也承命遽數文粹作書刻于巖石云廬陵所居竹室記房千里凡天地之氣煦嫗乎春曦彤乎夏凄乎秋而冽乎冬楚之南當冬而且曦燕之北當夏而且慄一作冽是皆不得氣之中正人之百骸上陽而下隂陽戒於焮故膏肓欲寒隂戒於溺故腎脇欲燠人之外好欲軒冕文彩以為榮似若動且陽焉人之内好欲寡慮恬黙以為泰似若静且隂焉其門外一作外門欲肥馬大車以為熱者其室内欲虚堂廣厦以為清者果反是必為災且妖且病且亂且窮矣天地之性一作氣當夏而冽當冬而曦其嵗時惡人之百骸上陽而不能寒下隂而不能煦其一有形字神瘵外飾文采不能動而榮一作且陽而必慊其心躁一無此字内思恬黙不能静且泰而必汨其志亂一無此字外門凄凄而寒者内室彤彤而熱者其士一作事窮予三年夏待罪于廬陵其環堵其棲者率用竹以結其四周植者為柱楣撑者為榱桷破者為霤一作寅非削者為障臼者為樞篾者為繩一作􅅶絡而籠土者為給一作級横而格音各空者為梁方大暑火烘爆霤坼壤者一作此字若墜于鑪若燎于原舌呀而不能持支墮而不自運赫赫爞爞一作熖熖如列千萬炬于室内視其門即寂寥虚閴一作間若清秋之山焉若寒浦之波焉予乃知嚮所謂天地之氣人之百骸與其心形之内外居室之寒燠反是果為災且妖一作妖且災且病且亂且窮也今予方窮不能奮果窮也其處于是亦宜矣天地之氣不能易者也鄒子有吹律之變人之生死不可制者也俞扁有鍼砭之術是二者尤不可革且有道而得一作革之今予室之曦予門之寒予亦姑思其治之之道將爇其廬而斬其工竹室一無此二字其能永永以爍予書其詞于壁一作皆唐文粹堂上草堂記栁識海昬縣東北一二里有澄陂永泰初檢校左司郎中蘭陵蕭公置草堂于陂上偶然疏鑿從其易也虚楹東向清曠十里傍有古樹宻竹一如籬落澄漪風篁終日不厭非出非處優㳺中道于兹三年矣紫篠為門蔬圃取給怡愉色充止足於斯士君子皆仰其清逹也清而多愛達而彌約曩昔持憲仁徳恤刑進退之道道皆可勸予學史者也得而紀述思簡予天下之士往嵗天子自鳳翔歸于上都大兵之後秦人䧟法抵冒者衆疑似詿誤者倍之皇綱初振國典未一公職在畿甸位卑才露京尹器之委以決獄惟刑之恤上簡帝心向三年遷以持憲歴臺三院折獄如初或如絲棼因我繩直盖亦多矣不其才難未止於此當此之時冦逆雖却而猶金方播氣事多隂勝公仁勇中發忘危與衆前後按乎舊獄察色見情疑似當刑口伏心怨果斷出之者數百人去其智足飾非盤根難狀為無辜之害者亦數十人持憲如此仁乎至哉向使生全愛養之心不備乎隂陽運用之才則視人殘傷空歎息而已焉能密網之中多所濟活昔人有生全之功髙眀待封者欲人行之所以彰其善也知止足者委順志之所以誨一作晦是其善也其意不同同歸於徳其徳雖異觀各有宜詩曰愷悌君子民之父母此之謂也予家於脩江之上十年矣兹地阻逺兵戈不至而猶日見乎罷人貨鬻之怨時聞乎豺狼􅇒肆之殘春對乎凄風苦雨之音暮秋經乎炎燠札瘥之氣又見野有此當益感歎而已大厯二年正月七日左拾遺栁識述虢州三堂記吕温應龍乗風雲作雷雨退必蟠蟄以全其力君子役智能統機劇退必宴息以全其性力全則神化無窮性全則精用不竭深山大澤其所以蟠蟄乎髙齋清地集作池其所以宴息乎虢州三堂者君子宴息之境也開元初天子思二南之風並選宗英共持理柄虢大而近匪親不居時惟五王出入相授承平易理逸政多暇考卜唯一作佳勝作為三堂三者明臣子在三之節堂者勵宗室克構之義豈徒造適實亦垂訓居徳樂善何其盛哉然當時漢同家人魯用王禮棟宇制度非諸侯居後刺史馬君錫因其頽陊始革基構豊而不侈約而不陋以琴筑詩書之幽素易綺紈鐘鼔之繁喧雖林池煙景不讓他日觀其廣踰百畝深入重扄廻塘屈盤水集本文粹作杏島交映溟渤轉於環堵蓬壺起於中庭浩然天成孰謂一本作曰智及春之日衆木花折岸浦島織沉浮照耀其水五色於是乎襲馨擷竒方舟逶迤樂魚時翻飄蘂雪飛泝沿廽環隠映差池咫尺迷路不知所歸此則武􅁜仙源未足以極幽絶也夏之日石寒水清松密竹深大栁起風甘棠垂隂於是乎濯纓漣漪解帶升堂晨景火雲隔林無光虚夢沉沉皓璧如霜羽扇不摇南軒清凉此則楚襄蘭臺未足以滌炎鬱也秋之日金飈掃林蓊鬰洞開太華爽氣出闗而來於是乎絃琴端居景物廓如月委浩素水涵空虚鳥驚寒沙露滳髙梧境隨夜深疑與世殊此則庾公西樓未足以澹神慮也冬之日同雲千里大雪盈尺四眺無路三堂虚白於是乎置酒褰帷憑軒倚楹瑶階如真玉樹羅生日暮天霽雲開月眀水集作氷泉潺潺終夜有聲此則子猷山隂未足以暢吟嘯也於戲不離軒冕而踐夷曠之域不出戸庭而獲江海之心趣近懸解跡同大隠序閲四時之勝莭宣六氣之和貴而君子可謂一本作日厚矣若知其身既安而思所以安人其性既適而思所以適物不以自樂而忽鰥寡之苦不以自逸而忘稼穡之勤能推是心以恵境内則良二千石也方今人亦勞止上思乂息州郡之選重如廷集作庭臣由是南陽張公輟揮翰之任受剖符之寄逰刃而理此焉坐嘯静政令若水木閑人文粹作全戸民如魚鳥馴致其道闇然日章大人以公執友也小人奉命幸來祗謁十五字一本止作小子以通家之好集作愛獲拜床下且齒諸子侍坐於三堂見知惟文不敢無述捧筆避席請書堂隂俾後之人知此堂非止燕逰亦可以觀清静為政之道廬山草堂記白居易匡廬竒秀甲天下山山北峯曰香爐峰北寺曰遺愛寺一無此字介峯寺間其境勝絶又甲廬山元和十一續廬山記無此字年秋太原人白樂天見而愛之若逺行客過故鄉戀戀不能去因面峯腋寺作為草堂眀年春成草堂集本文粹集草堂成三間兩注集本文粹作柱二室四牗廣袤豊殺一稱心力洞北戸來隂風防徂暑也敞南甍納陽日虞祁寒也木斵而已不加丹墻圩而已不加白磩階用石羃忩用紙竹簷集本文粹作簾紵幃率稱是焉堂中設木榻四素屏二素諸本無此字漆琴一張儒道佛書各數數字文粹作三两巻樂天既來為主仰觀山俯聽泉旁睨竹記作草樹雲石自辰及酉應接不暇俄而物誘氣隨外適内和一宿體寧再宿心恬三宿後頹然㗳然不知其然而然自問其故答曰記無此字是居也前有平地輪廣十記作一丈中有平臺半平地臺南有方池倍平臺環池多山竹野卉池中生白蓮泉集作白魚又南抵石澗夾澗有古松老杉大僅十尺集作人圍髙不知㡬許許字集作百尺脩柯戛雲低枝拂潭如竪幢如張盖集作如幢竪如盖張如龍蛇走松下多灌叢蘿蔦葉蔓駢織成翳日月光不到地盛夏風氣如八九月時下鋪白石為出入道堂北五步據層崖積石嵌空垤堄雜木異草盖覆其上緑隂濛濛朱實離離不識其名四時一色又有飛泉植茗就以烹燀好事者見可以銷諸本無此字永日堂東有瀑布水懸三尺瀉階隅落石渠昏曉如練色夜中如環佩琴筑聲堂西倚北崖石諸本作右趾以剖竹架空引崖上泉脉分綫懸自簷注砌纍纍如貫珠霏微如雨露滳瀝飄灑隨風逺去其四旁耳目杖屨可及者春有錦繡谷花夏有石門澗雲秋有虎溪月冬有爐峯雪隂晴顯晦昏旦􅅤吐千變萬狀不可殫記集作紀覼縷而言故無甲廬山者噫凡人豐一屋華一簣而起居其間尚不免有驕矜諸本作穏之態今我為是物主物至致集作知知各以記作有類至又安得不外適内和體寜心怡諸本作恬哉昔永逺宗雷輩十八人同入此山老死不返去我千載我知其心以是哉矧予自思從幼迨老若白屋若朱門凡所至集本并記作止雖一日二日輙覆簣土為臺聚拳石為山環斗水為池其喜山水病癖如此一旦􅏝剥來佐江集本并記無此字郡郡守以優容撫我廬山以靈勝待我是天與我時地與我所卒獲所好又好求焉尚以冗貟所羈餘累未盡或往或來未遑寜處待予異時弟妹昏嫁畢司馬嵗秩滿出處行止得以自遂則必記無此字左手引妻子右手抱琴書終老於斯以成就我平生之志清泉白石實聞此言時三月二十七日始居新堂四月九日與河南元集虚范陽張允中南陽張深之東西二林長老凑公諸本無此字朗滿晦堅等凡二文粹無此字十有二人具齋施茶果以樂記作落之因為草堂記尉遲長史草堂記李翰吾友晉陵郡丞河南尉遲緒節闊逹志遐逺􅅤和而不暇文粹作假脩推誠而不詭行外若可渾其中甚清外如可雜其中甚静夫求賢逹之趣當考其中若然夫子其逹者歟而境或超詣心或獨得飄飄然不知冠冕之在己浩浩然不知天地之為大其宜文粹作㝠機慎道迹繫心廣人或未覩吾能知之大厯四年夏乃以俸錢構草堂於郡城之南求其志也材不斵全其樸墻不雕分其素然而規制宏敞清泠􅅤風可以却暑而生白矣後有小山曲池窈窕幽徑枕倚於髙墉前有芳樹珍卉嬋姢脩竹隔閡於中屏由外而入宛若壺中由内而出始若人間其幽䆳有如此者夫子又有雄辭奥學潤色其事階上何有有羣書萬巻階下何有有空林一瓢非道統名儒不登此堂非素琴香茗不入兹室是知草堂之貴夫子之静天下茫茫人未易悉吾與夫子昔同賔賦三十四年於兹矣吾則棄於世矣歎夫子下位每求其故而有疑焉今觀夫子之志乃鄰於道寥寥草堂自致之資書於壁微吾非俟其嵗秋八月乙丑朔記文苑英華巻八百二十七
