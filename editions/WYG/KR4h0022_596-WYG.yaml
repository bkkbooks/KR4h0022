body:
  text: 文苑英華卷五百九十七宋李昉等編謝追贈官䘮葬此卷英華所編失年代先後今正之謝贈官表一首為寧王謝亡兄贈太子太師表一首謝贈亡妻鄭國夫人表一首謝贈姊隴西郡夫人表一首謝賜男絹等物并贈亡妻晉國夫人表一首謝追賜父母官表四首代韋令公謝先人贈官表一首代路中丞謝先人贈官表一首為杜司徒謝追贈表一首代兵部崔相公謝追贈三代表二首為宗舍人謝賻贈表一首初七謝恩表一首遷祔謝恩表一首為義興公求拜掃表一首為義興公陳請終䘮表二首為田僕射薨謝制使問表一道為田神玉謝賜錢供兄葬表一首為田神玉母太夫人謝男神功葬賜錢及神玉領節度表一首為田神玉謝兄神功於京兆府界擇葬地表一首為田神玉論疑作謝不許赴上都䕶䘮表一首為田神玉謝詔葬兄神功畢表一首謝贈官表常衮臣衮言伏奉今日恩命臣亡祖故慶王宰相世系表作雍王文學先臣楚珪贈兵部尚書亡祖母王氏贈齊國夫人亡父故京兆府三原縣丞贈給事中先臣無為贈太子太保亡母南陽縣太君張氏贈鄧國夫人仍賜立私廟三室慈旨忽臨憫册加等哀榮頓極感涕交流今日殺身此生分足臣衮中謝臣聞德及於人功濟於物然有光昭祖考特加追命之榮崇嚴廟室俾展奉先之敬臣授任非據尸位已淹合上叩公朝退身私第固以未禆神化誓答皇慈尚塵青𤨏之闈猶汚玉堂之署乾坤施厚嵗月恩深趨進崇階坐封故郡如臣之比罕見其倫今又念及先臣旌其内訓寵以六官之長榮極三師之列魚軒表於東海翟茀賦于南都宗柘有儀春秋有祀變其士祭之禮被其公服之章昭穆偕昇感懷泣血永惟臣之祖父業茂文儒夙荷重名不躋通列微夫小子實忝前人才薄位髙上慙無地夙夜感切啓處不寧豈謂寵靈荐加志願俱畢人子之道聖睿曲成情禮之間私門獲遂屬當禁火歸省先塋便奉除書以時昭啓洒雨露於松柏懸日月於丘封閭里相榮故老埀泣不圖存殁頓極於斯寵渥殊常戴荷失次於家出望於國無勞惶赧踧踖不知所報無任感慶屏營之至謹奉表陳謝以聞為寧王謝亡兄贈太子太師表元稹臣琳言伏奉今月七日制書贈亡兄特進汝陽郡王太子太師澤下天中寵被哀次昭告且畢摧絶失圖臣某中謝臣自掇咎釁復此悲苦更蒙餙終恩倍盈先逺之痛無任屏營哽塞之至謝贈亡妻鄭國夫人表臣某言某月日中使某至特蒙聖慈追贈妻單氏鄭國夫人捧拜絲綸載光窀穸臣某中謝臣亡妻所生男憑見任御史中丞充張孝忠軍職務臣頃應援易定之日屬京師變亂之初臣方誓死廻軍星言赴難孝忠敵強勢弱切欲相留稍住則臣子不安徃來則懷撫交闕男憑年甚幼小留定婚姻恭行廟勝之謀克覩中興之運憑雖昧稚似可憂矜陛下猥賜寵章贈延聖善因子及母恭承孝理之風念徃慰存為屈哀榮之典既申翟茀追詠鵲巢恩光既洽於幽明霈澤永流於泉壤憑縁所職乆在定州殊私豈止於邱山感激實深於内外臣無任謝贈姊隴西郡夫人表臣某言伏奉詔命贈王氏之姊隴西郡夫人恩澤送終寵賁中錫感戴無力幽冥有光臣某中謝臣少遭閔㓙長姊覆育中限王事動成遠辭奉迎纔至殂謝已及臣頃者近當劇賊遠候蕃戎方勤公家遂殺一作豈暇私禮瞻言痛慕有踰常品豈意詔書下降聖澤旁流念微臣之𤨏功封及其一作亡姊廻聖代之茂典榮彼重泉未知何階仰答殊造庶將友愛之分用酬愷悌之恩臣無任謝賜男絹等物并贈亡妻晋國夫人表代人作令狐楚臣某言臣特進奏官狀報三月二十五日本道監軍李輔光奉宣進止賜臣男公敏絹五十疋衣一副著蓋椀一并合發遣徃東都辦護䘮事至二十六日伏奉勑賜臣妻博陵郡夫人崔氏晉國夫人欽承明命以悲以歡臣某中謝臣某帝枝末屬天壤微生幸偶升平叨居要劇生成之德無以奉於君親封賞之榮豈望及於妻子今者一門之内二日之中王澤浹於幽門天光蟠於髙下受恩過厚忍愧逾深且剪葉為珪晉封所以稱其大織縑如雪班女由是詠其妍既耀溢於親踈實感纒於存沒未知所答難以自陳空知想泉路以傷心仰天衢而稽首所守有限未獲陳謝無任謝追贈父官表韓翃臣某言伏奉恩制追贈臣亡父通直郎行京兆府醴泉縣尉成名禮部郎中者渥澤流於幽隧哀榮集於私門兢惶拜命涕咽無措臣某中謝先臣素履貞白早謝昌時臣雖叨竊班榮不及禄養每懷風樹之痛莫報蓼莪之恩伏惟皇帝陛下深一作源宏孝理澤被存沒特降殊私爰加褒贈幽靈知感結草有期微臣戴恩畢命思報不任荷懼懇悃之至謝贈母官表臣某言伏奉詔書追贈臣亡母李氏楚國太夫人者承命祗感哀榮罔極臣某中謝臣年甫強仕禍積靡恃痛吹棘之莫諭瞻風樹以永懷雖忝分茅之榮實由斷織之訓動興怵惕感戴劬勞豈謂陛下推恩成仁廣孝致理寵延隴隧秋開國封使微臣沒地有辭終天無恨既申欲報之志更切匪躬之誠餘生萬死豈答𤣥造無任受恩屏營哀感之至謝追贈父表臣某言伏奉詔書追贈臣亡父先臣司空者慶因出震澤及重泉禮命式加哀榮兼極臣某中謝臣遭家不造過庭無聞仰先聲而彌髙勤遺訓而靡及徒因積善率勵小心位忝統戎寵加錫賞此誠陛下孝理為本德教所先因作觧之明威布追遠之厚德禮降幽壤位崇上公遂使展罔極之哀受恩感於庶物襲有後之慶撫事愧於揚名既申報養之懷載竭移忠之孝臣子誠願備極於斯無任哀感之至謝追贈父母官表權德輿臣德輿言伏奉今日恩制臣亡父贈太子少傅先臣某追贈太子太保寵靈所及徽數特加捧承命書感奉酸咽臣某誠惶誠荷頓首頓首伏以先臣在天寳末年筮仕幽朔艱貞特立忠孝兩全名節冠於古今風聲激乎天下以執憲載筆逮事肅宗禀命不融早違昭代臣齠齓之歳孤苦零丁遭逢昌運漸履名級過叨睿奬忽至台司無能受禄莫與臣比以先臣之名噐未稱餘慶或鍾蒙陛下之寵秩逾涯此生何幸所建家廟實稽國章時及春祀禮從祔饗豈謂聖慈曲被孝理集作思是崇當啓匵題主之時有告第漏泉之命感悲集作深霜露禮盛蒸嘗自葉流根寔荷非常之澤摩頂至踵難酬不次之恩交感之情集作幽明交感山岳非重無任祗荷隕越之至謹奉表陳謝以聞臣某誠惶誠荷頓首頓首謹言元和七年二月一日代韋令公謝先人贈官表臣某言伏蒙天恩贈臣父尚書右丞司農卿先臣某揚州大都督禮極哀榮感戴増懼臣某中謝臣父受教儒門宣力王室雖典司綱轄而未及崇班臣殃咎所鍾早失嚴䕃恭守遺訓致及人倫逮事休明謬登清貫常恐不克負荷忝辱祖宗豈謂陽和之仁因下炎上雨露之澤自葉流根大府名藩位秩崇重授之庶姓罕有其倫是臣父著績於先朝蒙寵於今日臣事君之節未効㳙塵為子之方已榮松檟感恩思報豈謂為忠覆族殞身孰云非孝方任有限拜謝無由徬徨海隅進退哀懼不任荷恩之至代路中丞謝先人贈官表臣某言伏奉某月日恩制追贈亡父先臣某司空積感昭靈肅膺嘉命捧戴綸㫖哀號靡及追榮衮章没世無覩先臣某䇿名昌運不待聖明録功上台載彰忠烈陛下以臣兄應治行有聞擢居連率光賁重渥慶流三泉此皆陛下代天永錫論道成於故事俾臣兄弟私疑作移孝歸於盡忠悲喜交心拜舞以泣不勝感咽崩摧之至為杜司徒謝追贈表劉禹錫臣某言伏奉制書褒贈臣亡父冠臣某官尚書左僕射者時逢霈澤禮極徽章臣某中謝臣家受國恩至臣累葉常懼不克負荷以忝前人豈意多幸遭逢獲居台輔集作髙位陛下應乾御極作解庇人恩浹寰區禮崇集作成宗廟埀仁布德自葉流根紫書忽輝黄壤多幸八字集作紫書忽降於重霄宻印榮加於厚夜星霜増感蒸嘗有輝非臣隕越所能上報代兵部崔相公謝追贈三代表錢珝臣某言伏奉某月某日制命追贈臣亡曾祖某贈某官亡祖某贈某官亡父某贈某官伏以恩深逝水澤及重泉哀極失圖感惟増懼伏念先臣實封聖代寵被乘軒之數名傳汗簡之書而隙駟難留隴樹斯拱積感既深於霜露叨榮復忝於陶甄陛下重顧台臣爰加贈典隂陽未序寧施報國之功霈澤遽臨空激承家之志仰惟追命唯自省躬臣某無任荷聖感恩哀榮懽一作摧懼屏營之至同前臣某言伏奉今月某日制書追封一作贈臣亡曽祖母亡祖母亡母某國夫人者典常重舉渥澤下流臣某中謝伏以尊號皇帝陛下動法天經用宏王道繼降追榮之命若酬輔政之功竊念微臣謬持魁柄計月日則四時來疑作未半調隂陽則六氣未知疑作和而聖造曲臨彛章俯及上公端揆已承褒飾之恩大國贈封更荷顯揚之賜康化權而無力顧家諒而有光祗戴睿慈臣某無任哀感激懼屏營之至為宗舍人謝賻贈表陳子昻草土臣某頓首稽顙言今月日中使某官集作至奉宣勅㫖以臣母喪贈物若干以給㓙事孤臣鞠㓙禮辱天贈集作貺稽顙拜命號絶迷圖臣某中謝孤臣不天早失覆集作父䕃兄弟孤藐並未成人亡母哀惸鞠育見保不墜于地以及於兹煢煢私門幽顯為慶榮泰集作忝之望非有始圖陛下親親敦念末屬憫臣單賤惠降恩休孤門再集作載昌實始天造母子之賴以喜以惶兢兢孤人未知攸答陛下又恢大運崇號寵章特復私臣弟兄超登顯位母子光寵榮養以申集作全豈臣單微官能及此早誓集作逝先沒以為親榮而天不禍臣延及先母集作延于老母號訴集作愬無及荼毒煩寃陛下降哀又見憫悼惠賜禮物過越典章生榮死哀重疊若此孤臣殘喘胡顔日月集作冐德而臣之迷塞荒謬禮經先遠之期又勞聖問有無之禮憂若家人天實為之臣復何及即此殞絶期以謝恩號慟集作兆崩摧一作哽伏表迷塞不勝荒迫之至初七謝恩表草土臣某頓首稽顙言今月日伏奉恩勅以臣亡母初七特降上宫若干人給事黄門若干人并賜物若干段以給設一作獲齊事天命集作恩過禮伏命集作念號惶以臣㓙殃集作孤臣殃釁尚未殞滅荼毒如昨奄將一旬崩號無及肝心靡集作縻潰陛下慈惻哀念孤窮復憂齊祭恐有闕禮既賜束帛又降上宫恩慈再三若猶未足自國家寵貴不集作未聞此榮草茅孤臣何以堪處不日銷滅永負聖恩泣血號天集作號泣旻天以崩以愬不勝荒迫之至遷祔謝恩表草土臣某頓首稽顙言伏奉某月日恩勅以臣亡母遷祔特降勅給人夫若干車牛及服用物若干以護送靈柩至京祗奉恩私頓首崩殞臣未亡滅假息苫廬日月永往奄及先逺荒迷在疚不知禮儀陛下哀矜憫其不逮恐有顛沛憂及亡靈備物象設並自天錫集作賜祖載營集作塋送又遣集作悉官供威儀不遺集作在途魂魄光寵行路延竚而以為榮孤臣窮㓙何圖至此盛集作天德彌厚殘喘待終泣血扶靈方滅歸路號感恩造窮絶迷圖不勝號噎戀恩殞絶為義興公求拜掃表陳子昻臣禍釁所鍾早日孤露墳塋莫掃松栢凋荒臣之不天實有由集作攸咎死罪死罪昔先臣下代遺訓未亡集作忘而殃罰不圖家禍漸遘集作潜構兄弟無故並為參商中冓之言所不可道孤臣不孝萬死餘責死罪死罪然臣之負譴實䧟無辜吏議不明以投魑魅自泣血去國守命南荒歴年被病再以生死炎山漲海氣瘴窮天戴白之老俗無間者孤臣疲􅒒豈望須臾分謂委骨滄集作窮溟餌身魚鱉狼荒之鬼永悲長逝不意慶雲垂澤天渙横流集作宏流拂拭露霜集作霧露生見白日踴躍昭泰情何以堪集作勝死罪死罪而餘殃未冺㓙故仍集作荐臻亡兄濟江合家淪溺嫂姪俱沒一不生存尋途未中臣妻又殞重疊亡殁契闊山川至止之日生意盡矣誓將守死陵墓殁齒家園不圖恩幸曲成寵章仍及題輿别駕職是恩州再造生涯天實為德死罪死罪臣自歸日淺塋廟未修荆棘荒然祭祀無主今則便祗王命遠職邊夷嵗月方賖拜掃何日瞻言出涕感咽崩摧伏惟陛下仁養群生孝理天下萬物感遂各得其冝臣獨向隅有以長戚伏願天慈愷悌憐憫孤窮寛以簡書之刑賜其告歸之請使其駿奔西土長號北陵獲申存殁之悲生謁園塋之樹稽顙松闕謝不睦之辜肉袒山門祈自新之路誓刻肌骨奉以周旋然後退死蠻夷沉骸糞土甘心朽滅庶無遺恨儻昊集作上天鑒照孤誠可哀則臣之鯫生志畢今日不勝崩廹之至為義興公陳請終䘮第二表草土臣某言去年某月日奉哀陳請乞終䘮制今某月日奏事官賫臣所奏表廻伏讀報詔不勝悲懼陛下為臣累有政能特見任用使臣移孝為忠即斷來表臣内愧不孝外慙無能汚辱聖聰措身無地臣某中謝臣聞時方媮薄勸人以孝時方趨競勸人有禮有不至者誅而教之臣今不病固合辭避况臣疾發日乆亡母未葬忍偷餘生望畢家事敢汙人倫以傷風俗昔山濤與時主有舊温嶠亦功存當代濤起應禮嶠不歸葬守禮法者議而薄之臣於國家無濤嶠之功舊必依詔命兼濤嶠之可薄俛仰人間豈獨羞耻聖朝用法合置誅殛前者直省賫勅勒臣赴任使司准勅移責州縣所由官吏畏懼威嚴臣所經行停留不得待臣出界然後奏報臣氣力羸憊奔波道路悲憂惶恐舊疾加極半身不遂手節拘急行步飲食湏人扶助近又兩目昏暗如有瘴冒雖生猶死不堪力強特望聖慈乞臣骸骨歸奉几筵及葬州里在臣私情死生願足臣今病在桂州俯伏待命臣風昏謬妄舉動失常頻犯天威不勝震恐謹遣某官奉表陳乞以聞第三表草土臣某言臣先患風疹并兩目昬闇右手不能制物一足不自運動前後頻有表狀請停官職臣自到桂州病轉増劇更加瘴瘧卧在床枕兩目漸不見物起動皆須扶引死在朝夕敢偷禄位伏恐陛下謂臣尚顧禮教以疾辭讓遷延嵗月待畢喪紀臣除官已來向欲闕嵗頻違詔命合正典刑陛下縱不忍罪臣闕乞臣餘生固不可闕臣曠官闕臣痛損特望天恩即為臣替不任荒懼哀懇之至為田僕射薨謝制使問表于邵臣某言左金吾將軍吳凑至奉聖㫖兼賜臣母趙國太夫人臣嫂夫人并臣及將士等勅書以臣亡兄某特承憫問捧對哀咽摧裂肝心臣某中謝臣兄報恩未畢抱恨黄泉陛下俯聽鼓鼙永悲簮屨哀痛之詔並歸一門撫存之恩將宥十世載悲載躍感戴無階以亡兄既忝信臣寡嫂則惟近屬偏承恤慰曲被恩慈義同家人禮絶朝典喻臣老母保養髙年念臣諸孤俾全餘喘無大無小上煩聖慈寵光親降於重臣優問必先於宿將殞身難報拜手増悲臣無任荷恩哽咽之至為田神玉謝賜錢供兄葬事表韓翊臣神玉言伏奉手詔兼奉勅牒賜錢五千貫文給臣亡兄神功葬事用拜手感恩闔門悲戴臣某中謝臣兄始終効節存殁御恩智悼在堂已加朝禮滕公居室又荷天慈錫其九府之錢寵以重泉之路多踰千萬榮冠一時去病飾終空陳𤣥甲孔光送徃薄賜黄金在臣私門寵極前古但盡哀號之禮寧憂窀穸之儀臣無任感戴悲躍之至為田神玉母太夫人謝男神功塟賜錢及神玉領節度表前人妾張氏言奏事官潘洽廻伏奉手詔以妾亡男贈司徒神功葬日有期特承哀問兼賜神玉手詔所賜本道錢四萬貫並令妾以下聖慈曲被感戴哀絶妾中謝妾隨子東征御恩北闕累承雨露載啓山河同顗之親幸及貴登僕射異一作非勤之母不見生拜司徒何一作忽荷聖慈寵加存殁𢎞疑作敬姜年暮俯矜哭子之哀庾翼才微尚使領兄之衆殊悲望外且慰目前况將通疑作逼遠期特垂渥澤更切撫存之義兼廻贈徃之資赤仄滿庭紫泥在篋痛而受賜哀以為榮庶神功有知應感安親之道䰟其無昧更酬報國之誠載號載悲不勝感絶妾無任悲戴之至為田神玉謝兄神功於京兆府界擇葬地表臣神玉言今月三日得上都留後報稱伏奉勑牒臣亡兄神功宜令所司於京兆府界擇地安葬仍令京兆尹充監䕶使勾當恭承渥澤俯及遠期拜手感恩摧心増慟臣某中謝臣亡兄任崇寄重方報聖恩祚薄釁深早違昭代天慈悼徃朝典飾終日月有時乾坤曲施榮加昭葬寵荷官給榮如曹氏京兆開阡貴比霍家祁連象冡義光前古禮極哀榮在臣一門盡出望外載悲載躍無階上酬臣願號赴私門親䕶喪事縁總留務不敢自專今見催促行裝伏待進止為田神玉論疑不許赴上都䕶䘮表臣某言奏事官潘洽廻伏奉勅書手詔兼宣進旨不許臣輙離所部又以臣脚弱無力伏奉批表以軍府政殷藉卿鎮緝不赴上都也懇誠莫遂祗命哀惶臣某中謝臣兄永辭昭代俯及葬期臣請解戎章歸䕶䘮事義雖聞上恩不聽卑掩泣轅門飛䰟隴樹外慙形影内切肝腸千兩送車臣空瞻望九原臨穴臣不躬親一呌骨驚三時心死伏以大君有命重鎮無人俾臣割哀朂臣留務宣恩拜手祗事撫膺又荷聖慈追懷前効俯悲簮屨軫念松楸更使改期貴先遠日幽明御荷感謝無階不任哀感之極此篇元誤編在六百二十五卷雜諌門今移于此為田神玉謝詔葬兄神功畢表臣某言臣亡兄某以今月二十日詔葬永畢感恩追慟肝心如裂臣某中謝臣亡兄俯歸幽穸更軫皇慈易以大名賜夫祕噐王人加贈京兆䕶䘮道備哀榮念深勲舊霍光故事斯則為優一作方斯為優謝安殊禮彼何足貴臣限總留務虔恭聖私不及親扣泉扄盡哀號之義廻趨陛下謝褒寵之恩慟哭轅門五情分潰臣無任感激之至文苑英華卷五百九十七
