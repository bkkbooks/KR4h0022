body:
  text: 文苑英華巻六百三十一宋李昉等編謝恩四夀昌節謝酒食狀一首嘉㑹節宰相謝酒食狀一首中和節謝賜尺狀一首清明謝賜火狀一首為人端午謝賜物等狀四首社日謝賜羊酒海味及茶等狀一首重九謝賜餻酒等狀一首臘日謝賜物狀八首夀昌節謝酒食集作茶酒狀宣宗生日杜牧右臣某等言伏以大慶吉辰榮霑錫宴鴻恩繼至王人荐臨㫖酒名肴集作茶玉食仙果來於御府莫匪天慈適口忘憂已滿小人之腹殺身粉骨難酬聖主之恩臣無任感恩抃躍之至嘉㑹節宰相謝酒食狀昭宗生日錢珝右伏以香火至誠祝後天於萬歲弦匏飾喜㑹率土於三春敢望宸𠂻恩隆輔弼王人逓一作遽降寵錫爰加酒醖既陳炮燔兼至名茶馥郁嘉果駢羅甞珍而食指先驚敢忘盈滿竊位而憂心已醉寧待獻酬仰望睿慈臣某等無任兢感懽抃屏營之至中和節謝賜尺狀白居易右今日奉宣賜臣等前件紅牙銀寸尺各一者伏以中和戒集作届節慶賜申恩當晝夜平分之時頒度量合同之令况以紅牙為尺白金集作銀為寸美而有度煥以相宣逮下明忖度之心為上表裁成之徳慶澤所及歡心畢同臣等塵忝日深寵錫歲至雖恩光下濟咫尺之顔不違而尸素内慙分寸之功未効捧受愧畏倍萬恒情謹具奏聞謹奏清明謝賜火狀右今日高品官唐國珍就宅宣㫖賜臣新火者伏以節過藏煙時當改火助和氣以發滯表皇明而燭幽臣顧以賤微荷兹榮耀就賜而照臨第宅聚觀而光動里閭降實自天非因榆柳之燧仰之如日空傾葵藿之心徒奉恩輝豈勝欣戴為人謝端午賜物等狀令狐楚右中使王進卿至伏奉詔書慰問臣兼宣恩㫖賜臣及諸将衣并百索銀器等者臣伏以夏之為仁實由乎長養王者所寳莫重於賢能故事将錫長年皆於今月因頒珍翫遐及庶方誠上帝之殊私信天朝之盛典臣才無所取政不足稱獲守司存已為尸忝豈意九天之慶賜毎歲必來五日之祥期一作祺祥無年不受衣裳霧疊詔書雲繁篋中盈綵絲之索案上滿真金之器方圓通用紅紫交光命輕而服拜難勝身賤而鋪塵不稱以榮為懼當喜而憂終無補於成功空有慙於僣賞並凖勑奉受兼分給諸将訖所守有限不獲陳謝為安平公謝端午賜物狀李商隱右今月某日中使某至奉宣恩㫖賜臣手詔一通兼前件端午紫衣銀器百索并大将衣者乾文昭融睿賜稠疊恩生望外榮積懼中臣已當時宣布給散訖伏以正陽令月端午佳辰渥澤合止於勲賢錫賚宜先於戚屬臣逺臨東魯久去上京豈望仁時同躋夀域八行明詔伏讀而不啻千鈞一襲輕衣跪捧而若無三伏况又綵縷出仙蠶之蠒貞金凝姹女之魂持可戒盈帶堪延筭豈微臣獨忝在列校不遺華楚成行永願千春而奉聖綿長共保常期五日以霑恩臣與大将等無任感激懇悃之至為滎陽公端午謝賜物狀右中使某至奉宣恩㫖賜臣端午紫衣一副百索一軸銀器二事大将衣三副并賜臣手詔一通者伏以五神定位祝融司長養之功六律鈞和蕤賔有酧酢之義故節推戴禮日著漢儀彼艾人逺具於歳時角黍近標於風土乃耆舊傳聞之末亦集作是君親慶賜之原伏惟皇帝陛下克協樂章允符時訓恩集作仁霑近戚惠浹元僚臣守介蠻圻程遥鳯闕敢希瘴嶠特降乾文輕縞染衣真金備器海綃掩麗渠盌藏珍拜受若驚跪捧如失嘗衣國僑之紵被服多慙久携顔氏之瓢捧持未慣當晝而不假交扇向日而唯宜飲氷况又将以綵絲縈諸畫軸用禳故炁兼續收齡爰自微臣頗流諸校鞠躬被寵全踰錫帶之榮覩物傳輝實動請纓之思唯當仰承帝力粗舉藩條誓相率於明時庶同登於夀域臣與大将等無任望闕感恩抃舞屏營之至謝賜端午衣物狀張次宗右伏以中暑良時沐蘭令節王人乗驛初降於九霄内府頒衣遽霑於千里臣忝膺寄任未展涓埃節候每移尸曠増懼陛下殊私荐及寵賜不忘天書覩經緯之文麗服見裁縫之妙捧其珍玩價重於兼金賜以綵絲恩深於延筭况寵周将校問及偏禆爭馳就日之誠益勵酧恩之節社日謝賜羊酒海味及茶等狀常衮右中使某至伏䝉聖慈賜前件羊酒等臣謬塵重任已積歲時日有餐錢月受高俸過䝉温飫常愧有餘内省謀猷實慙不足益彰尸忝深誡滿盈屬上戊御辰勞農報社賜兼海陸品極珍鮮上減御飱一作饔下豐私室何功而受承寵若驚惶恐拜恩戰懼交集無任戴荷欣抃之至重九謝賜餻酒等狀右中使劉君夀等至伏奉恩命賜臣前件餻酒等仍令樂飲者伏以𤣥月戒時清風應律宜於長久欣聖祚之夀昌復見芳華喜陽數之重合時恩忽降節賜荐加王人寵臨御膳分㫖膏以粉餌蒸以餹䬾緑芋金茅紫蔗筠節茱茰清酒嘗聞舊俗之傳薏苡調腸今覩靈珍之味此饔人苑吏上獻嘉辰豈伊凡品㣲生下霑殊貺賜宴既聨於伯仲覃恩更及於室家稠疊寵光低迴隕越一門同慶萬死何酧臘日謝賜口脂厯日狀鄭絪伏以王人戾止天書逺降於閩川星躔既回蓂􅔦猥頒於遐服推歩允符於聖祚先天克合於歲功三百六旬斯須而咸覩二十四氣瞬息而可知一作回又賜以蘭膏錫之絳雪衆香流澤芳潤忽光於悴容五藥蠲痾瘴癘潜銷於腠理仰榮知忝承寵益驚閶闔九門歲時結戀於䨇闕方隅萬里展効期激於丹誠敷惠未洽於逺人拜賜濫同於重鎮觀風察俗志有立於涓塵比物省躬恩何酧於覆載臣某不勝歡躍屏營之至為昭義李相公謝賜臘日口脂狀崔行先右中使某至伏奉勑書墨詔縁大禮後慰問臣及将士官吏等又縁近臘日便賜臣前件藥物臣謬履鈞衡守兹戎鎮星霜屢改渥澤逾深内悚外慙不知所措文明啟運殷荐告成郊廟展嚴禋之儀蒸黎洽時雍之化大宥五刑之典廣霑萬物之恩自天有慶與人更始臣名器俱忝宸睠曲臨節近嘉平恩延寵錫香膏凝潤於寳器上藥秘重於仙方澤變衰顔不知老之将至光生憊質空驚疾乃有瘳祗奉舊章式披新厯想天長而地久㸔日往而月來無任云云臘日謝賜口脂紅雪等狀右中使某至伏奉手詔慰問臣及将士等又縁臘日賜臣口脂紅雪并新􅔦日等伏以蜡節嘉辰載於六籍皇恩隆洽賚及萬方金膏不秘於上清蘭澤逺傳於中禁加以𤣥霜絳雪素能愈病一作疾析酲顧惟賤庸承此恩造隕越無地惶悚失圖縱知死所豈答𤣥造載頒新厯永傳億萬斯年欣奉明時獲辨七十二候無任云云為王大夫謝恩賜口脂厯日狀前人右中使某至伏奉手詔慰拊臣及将士等又賜臘日口脂并新厯日等伏以清祀嘉名載於前典實追歡之盛節亦和樂之良辰况天休光臨聖慈遐布顧臣賤陋竊奉明恩感戴周全不知所措蠲邪愈疾驗絳雪於仙方却老駐顔覩瓊膏於寳器式頒聖厯仰賛皇猷永為四海之尊更續千齡之夀臣不勝歡躍云云為人謝賜口脂等并厯日狀令狐楚右中使吳千金至伏奉勑書慰問臣并賜前件口脂臘脂紅雪紫雪各一合并厯日一巻等者伏以歲将更始節及嘉平陛下凝香為膏聚藥成散頒日月於厯上奮龍鸞於筆端星分九天之使雲布一日之澤此誠無私之殊造均養之深仁而臣空抱愚忠曽無方畧一居藩鎮三度受恩朱奩忽開鮮膩與芳馨相雜素編既列閏餘将分至不差披尋而齒筭延長塗傅而口容芳潤油雲之覆逾廣無以勝任綿地之封粗安未為報效捧受嘗翫形神渙然無任感戴之至謝賜臘日口脂紅雪紫雪厯日等狀右中使董文蕚至伏奉詔書慰問臣并宣恩㫖賜臣前件物等者臣伏以天書垂露御厯頒年靈膏有瓊液之容仙散擬雪花之狀司天推歩定分至於四時尚藥煎和辨君臣於百品無不關於睿想發自宸衷下錫勲烈之臣猶無一作獨不過分幸霑庸微之質實所難勝况乏潤身之資欣䝉苦口之利謹當奉揚節候下告于萬人宣播光輝旁誇於九族殊私未答渥澤逾深夙夜寢興不任感戴為人謝賜男歲節料并口脂臘脂等狀右臣得男公敏狀稱伏奉恩㫖賜歲節料麵兩石羊一腔酒五㪷口脂臘脂紅雪各一合者臣謬以庸虚叨塵一作庸任使陛下前因蜡日已降使臣既霑澤口之膏又賜雪煩之散一從捧受實未遑寧豈疲病小男復䝉寵賜一作錫酒漿口腹充溢於盃盤藥餌脂膏馨香于懐袖雖君父用賞延之義㣲細不遺而臣子非立功之人光輝斯極豈徳澤之私於一物俾恩波之重若三山夙夜寢興以榮為懼珹守有限不獲陳謝無任感慶屏營之至臘日謝賜口脂集作蠟狀白居易右今日䝉賜臣前件口脂集作蠟及紅雪澡豆等仍以時寒特加慰問者伏以時逢臘節候屬祁寒豈意聖慈不忘㣲賤念嚴凝而加之煦嫗慮皸瘃而潤以脂膏嘉集作喜氣動中歡容發外挾纊之恩甫及集作所勉和則體舒不龜之澤既霑感而手舞臣等省躬懐愧因物喻情豈止飲徳縈心空集作唯驚寵賜必擬澡身勵節以答鴻私感躍之誠倍萬恒品謹具奏聞謹奏文苑英華巻六百三十一
