body:
  text: 文苑英華巻七十五宋李昉等編樂五簫韶九成賦一首聞韶賦一首樂九成賦一首洞庭張樂賦三首樂理心賦一首樂出虚賦一首齊人歸女樂賦一首塤篪相湏賦一首簫韶九成賦以曲終九成百獸皆舞為韻失名聖人順天道防人欲布和以調其性宣樂以察其俗氣将道志五聲發以成文化盡歡心百獸率而叶曲茫茫大空樂生其中聲隨化感律與天通交四氣之溥暢貫三光乎昭融将君子以審樂故先王以省風致同和於天地諒難究其始終惟樂之廣于何不有包隂陽兮不集不散降神靈兮或六或九故季札聆音而感深宣尼忘味於耳盈昭覆幬兮煦嫗召㳺泳以飛鳴演自窅𡨕發於性情将不動而為動自無聲而有聲五者通三我則貫三才而作陽數有九我則至九變而成不然者何以調大中何以繼光宅作終樂於數四歴君子之凡百其聲轉融其道彌赫大哉至樂于以洪覆收之而合乎希夷張之而散乎宇宙感天神與地祇格靈禽與仁獸扇風化而以贊則雍熈之可就大韶命曲大章同儕既和且樂亦孔之皆且簫為器之所細鳯為王之所懐若惉懘之音感清浄之化乖則歌已而於狂客孰来儀於克諧恭惟我君配天作主命工典樂考法師古浃聲教之汪濊合堯禹之規矩士有聞韶嘉於藴道擊壤希乎可取同鳥獸之歸仁承徳音而率舞聞韶賦以宣父在齊三月忘味為韻失名韶則盡美徳何可忘况至徳之斯過聆竒音之孔揚天縱多能信以嘉乎擊拊神資博學知具美於典章用而不匱樂亦無荒若充乎四門之術不離乎數仞之墻驗則足徴用之可貴聖者妙而合道志者仰而自慰恱五音而肆直孰謂其聾致六府之和平自忘於味省風而八風叶暢觀徳而九徳昭宣季子慙遊於魯地穆公徒饗於鈞天曷若觀率一作干舞聆薰絃變態罔已周流自然可以深骨髓而期富夀豈徒資視聽而娱聖賢至若清磬虚徐朱絃䟽越鼗鼓以之迭奏笙鏞於焉間發以感隂陽於宇宙耀光眀於日月自表虞徳之不衰豈效文王之既沒是知武也未善濩也有慙鈞化歸於二八讓徳眀乎再三所以其道不窮厥監斯在驗率舞於百獸想同和於四海如其樂正非闗自衞而来儻俟風移有異從周而改愔愔不極杳杳乍迷俄将復矣抑又揚兮夢周公而不見想聖徳而思齊聞斯行諸厥不踰矩感心駭目是何其覩悠然而往三歎如在夫寥天滌爾而施萬籟已吟於九土詎忘味於三月諒永懐於千古幸賦韶樂之遺音美哉尼父樂九成賦李瓘唐在六葉将修封禪想與靈接乃冠顥色佩朝陽瑱瑶碧之眀潤屑桂椒之芳香曰予意夫放勛光眀重華風聲髣髴兮陽靈之宇嬋娟兮介丘之平先大樂緝正聲更恊五變親和九成均鳴絲於金竹参雲門與咸英使子野奪意伶倫䘮精帝於是摇翠竿於東國翳華芝而遂行然猶左却宓妃右屏西子寵罷金屋歡辭瑶水豈脩蛾之敢廻匪清矑之能視飛鷰心折毛嬙色沮朝雲之姣兮不能呈其妍絶代之冶兮無所施其美况肯選無限情未央将與昭陽比盛傾宫相望仍復斥鄭衞捐倡優靡曼無取淫哇不留淮南兮激楚荆歌兮趙舞長袖更進新聲自許嬌彩雲之徘徊拂錦茵而容與能使秦帝熒惑漢皇延佇度曲東城横黛北渚莫不巻襞而索無處所庾疑射兕之騁騖役誇胡之豫逰去翠被與豹舄戢鳥唬疑及驊騮復想像雲夢彷徨青丘麋麞熊羆之藪灌莽陵岡之幽於中為樂驕矜未休荒淫震蕩其誠不修将穆然儲思粹清髙想意援招摇兮往若而至乃建玉旃之光耀動金根之逶迤丹虬翊輦白武衞蕤後舞𤣥鵠前鳴長離清壇下蔚高烟上馳故能決地閫開天維降青𤣥兮来斯登黄靈兮遲遲江畔之茅抽三脊北里之禾滿芳席睢上之黄龍兮瑞以多願持朱鴈兮薦天歌眀徳既享靈心每和宜其日炷中降雲烟上帝光五色聲萬嵗氣非烟風若蕙勲侔成山碣石澤比漲海洪波一作河兹所以庶髙宗之美豈七十二君之足多孰與雄奢驕貴逞慾矝意貪靈好竒恃力誇資惑方士之說邀羡門之期果為風雨所中神仙見期歴瑯琊兮徒逺望蓬莱兮㡬時者哉洞庭張樂賦以八音克諧天地充滿為韻李子卿洋洋乎軒轅之作也陶𤣥化以發生運神武之不殺張至樂之純備播皇風之坱圠舉端於素得太始之自然克成於和蕩生靈之夭札何必管聲為五羽數惟八然後合夫大戛請言斯樂也不振而其聽博不眩而其意深大而不摦樂而不淫将使儉者得中和之紀奢者已醉飽之心君子曰是樂也不朽之徳音於是一僨一起于彼南國真聲暢和氣塞其静也洞庭安波其清也楚山霽色百蠻以之神化六狄由斯仰徳是樂也乃不朽之徳音於是柔克可以上享天心可以蕃屏人則知武也美而未盡濩矣猶有慙徳觀其妙矣則天地盛而氣不乖隂陽感而六律諧惟精惟一嗤萬舞之弈弈無荒無怠見鐘皷之喈喈觀其皦矣則合於自然施之無邉輝綽發越行流散遷事髙太古功儷鈞天其曲直其音至飾諸喜以平諸心極乎天而蟠乎地率其樂也何享而不利原夫樂之契道也在心而心正在聽而聽聰故至人定和而守一合愛而流通必以濟刑政之理行山川之風豈徒耳目是翫情性克充而已哉當是時也太虚遏雲寒谷生煖三光昭晰八極充滿何淳風之泱泱諒千古之纂纂吹伶倫之律惜彼時移繼炎氏荘子焱氏或作炎之頌媿兹才短第二同前韻蔣至聆黄帝之遺音澹乎至察天非私覆稱其徳以無三國有𤣥風應其方以宣八所以合徳樞之幽鍵率至人之大戛當其存乎象用酌彼鈞深將合之於萬籟故稽之於八音非剽之以耳寧聽之以心風師拊石雲將摐金弃園客之絲彈為鶴舞辭羌人之竹擫以龍吟雖不擊而不考或習習而愔愔坐㤀斯得旋歸静黙其始也懼其終也惑廻日月之運行㑹鬼神之柔克凄清廣莫之野曼衍華胥之國奔夷貊於蟠木之東聳鱗翰於幽陵之北和容逺被休氣充塞邦用榮懐人之克諧何以鼓靈鼗之坎坎撞猛簴之喈喈至乃起於無朕調之自然張洞庭兮聽咸池同嶰谷兮合鈞天昭炎氏之作頌寓荘生之外篇是則成象者樂之餘希聲者樂之器舞妙有為八佾懸至和為二肆觀其妙叩以𤣥闗動無方覃於厚地貫隂陽而不測庸詎識其純粹吾君纘戎始酌遺風集端虚於黄屋攘靡曼於𤣥宫理代之音兮蹈而不厲不言而化兮美以能充今以視昔寔由𤣥同受靈命之誕敷窅希夷之自滿考徵音於天樂謝能賦於窺管第三同前韻失名昔軒帝出震用率大戛三才以貞萬人以察戰蚩尤於涿鹿之墟登飛龍九五張咸池於洞庭之野舞𤣥鶴二八遂使素女緘瑟昭文綴琴塤篪協韻笙磬同音始鏗鏘以拊石終訇隠而摐金雷出地中以成奮豫之象風行水上油生子諒之心包混茫之廣大含元氣之髙深不知不識順帝之則無視無聽至道之極三月㤀味思在齊而攸聞七旬格苖非得雋而為克所以事與時並名與功偕群方既睦庶尹允諧且如碩人褎然萬舞在前秉翟奕奕象九奏於鈞天后䕫爰至三歩既次夹振蹮蹮率百獸於厚地諒人神之在和何匏竹之足備况乎皇上降衷以符徳充理七音於周雅歌五絃於舜風仁親是務車軌攸同信敷草木澤被昆蟲在坑谷而何有與幬載而齊功故得萬屬宅心四夷脩款音無惉懘義取觀盥聞政始之頌聲足誡傾以持滿空歌時以獻賦若窺天之以管樂理心賦以易直子諒油然而生為韻獨孤申叔心為靈府樂有正一作和聲感通而調暢之理自得訢合而邪僻之慮不生翕如𡨕契混若化成孕和平於徳宇保純粹於元精故先王立極受命制民作則脩匏土革木之器備干戚羽旄之飾將以恱萬人康四國動蕩其心志推移於道徳薰然而煦日以和悠爾而躋之夀域成文不亂知至樂之有融從律弗姦見王道之甚直聲之所感性罔不悛致和易於無象禁奸邪於未然希夷自適鬱結攸宣苟斯湏之不去何嗜慾之能遷况乎大樂同和至音交暢聽寂寞而何求視窅㝠而無狀將欲革驕志以純仁化貪心為貞諒在乎思不惑兮心不流安至樂兮優而柔順至性之蕩蕩符大道之油油純如皦如足飬浩然之氣融融洩洩寧抱悄爾之憂是知以徳音為音則合於仁義以淫樂為樂則比於慢易咸濩作而理亦隨之鄭衞興而時乃殆而信至化之所繫實和樂之攸資是以重華眀兮簫韶若此獨夫靡兮顛沛若彼忘味興歎於宣尼觀風見稱於季子則知樂之為用也不獨逞煩手讙俚耳正心術而導淳源非聽其鏗鏘而已第二同前韻吕温道無象天無聲聖人不有作曷以觀化成由一作於是鼓吹大塊鏗鏘元精因乎心而式是理本形乎器而强為樂名以齊五方之俗以厚萬物之生始積中一有而字發外率充性與情一作足充性而養情樂與心冥則所謂固天之縱心由樂理亦得夫自眀而誠至若樂在朝廷君臣叶義一發而陽唱隂和九變而雲行雨施上以見為君之難下以知為臣之不易有國者理心以此必覩一作獲儀鳳之一有嘉字瑞若乃樂在閨閫父子静専盖取諸無荒而樂有節而宣和以嚴濟愛由敬全有家者理心以此必返天性於自然且夫樂之作也一動一息心之理也惟清惟直然後一有能字在聽而必聰無入而弗克一作不得節有序觀貫珠而匪珠聲成文見五色而一作於無色其或惟邪是念惟慝是廋一作蒐則雖琴瑟在御管磬聿脩立樂之方既失理心之術何求亦焉望變淳一作澆風之浩浩致和氣之油油徒觀其心尚元通樂資交暢眀則贊天地之化育幽則索鬼神之情狀㑹節有極象之則發而時中應變無方擬之則貞而不諒大矣哉至樂希夷侯其褘而聽之以思固不資一作専於子野作必在聽一作不在聽亦無俟於后䕫方今敦和統同反本復始别一作辨六律以分聽一作職納八風而齊軌一作齊八風而同軌洪鐘虚受我則開其直言朱絲一作絃遺音我則戒夫専美此吾君之以樂理心也宜乎貴為天子樂出虚賦以聲從響際出自虚中為韻吕温和而出者樂之情虚而應者物之聲或洞爾以形受乃泠然而韻生去默歸喧始兆成文之象從無入有方為飾喜之名其始也因妙有而来向無間而至披洪纎清濁之響滿絲竹陶匏之器根乎寂寂故難辨於將萌率爾熙熙亦不知其所自故聖人取象於物觀民以風闢嗜欲之由塞决形神之未通欲使和氣潛作𤣥闗暗空與吹萬而皆唱起生三而盡同自我及人託物於未分之表蟠天極地開機於方寸之中於是澹以無倪留而不滯有非象之象生無際之際是故實其想而道升窒其空而聲蔽洞乎内而笙竽作刳其中而琴瑟制波騰悅豫風行於有道之年派别商宫雷動於無為之世杳杳徐徐周流六虚信闐爾於始寂乃譁然而戒初鏗鏘於百姓之心於斯已矣鼓舞於一人之徳知彼何如是則垂其仁有其實樂因之祖述究其形實其質聲因之洞出理在無二情歸得一塞雲谷而響絶疏天籟而音逸未隨於物絪緼乎七政八風忽變其和剖判於五聲六律由是遷為草木散作笙鏞群分自此而焱起九奏因之而景從道薄風漓莫究簫韶之本聲銷韻息空傳干戚之容今則素扆垂休清懸繼響平心已立於皇極率舞猶虚於睿想如是則薰然洩洩將生於象罔齊人歸女樂賦以題為韻昔齊人饋魯傾城者八十人瑰艶絶代綺羅嬌春洞横波於慢臉回流風於嫋身盖以仲尼定魯禮樂制齊君臣斬倡優於夹谷之㑹復土田於汶水之濵故遏雲與廻雪實内圖而外親將敗魯之政弱齊之鄰魯君臣果不端操迷不先覺聞進淫哇之聲皆忘聖人之學城南於是考雷鼓黕雲幄結齊魯之歡受鄭衞之樂感煩音之惉懘成正聲之蹖一作舛駮夫子則不可救其失復其迷望龜山以命操觀鳳凰而銜悽痛王綱之蕩蕩順天命之栖栖魯侯若盛徳是樹古道是稽抑麗靡而不納見聖性以思齊知季孫之僭惟仲尼是與足以受無疆之休足以振將墜之緒何敵國之敢抗良霸功之可佇悲夫任權臣之傾國納文馬與美女薦神祇之所歆誘耳目而不拒荒笑語之啞啞一作呢呢溺衣裳之楚楚由是齊日以長魯日以微見鄰國之侵地聞志士之沾衣雖代祀則逺而徳音不違往者不可諫来者猶可追若監魯道之有蕩放鄭衞而不歸則可以得域中之大致天下之肥者矣塤篪相湏賦以樂和同聲然後致理為韻許堯佐彼塤篪兮謂何同律吕兮相和苟論功於衆樂孰有徳而同科遂使手之足之候清音而屢舞伯氏仲氏諧雅韻於升歌疾徐共節長短同㫖感肅雍兮一貫伺戛擊兮雙起為合雅而諧聲故殊形而共理然則大篪諧奏美矣徳音之音鳴塤獨聞同乎以水濟水是故變通可象節奏斯呈爾韻方舒我則厲之以疾我音斯濁爾必懲之或清苟同方而助化故異氣而成聲信可以發揮韶夏協贊和平故得舞獸呈姿豈繫於拊石嘉賔展禮不讓於吹笙且塤資土以辨類篪假竹而成器土容質可以符素心竹聲清可以滌煩志是則相從以和律相因以成事苟洋洋而在聽諒醇醇而自致且彼鼓鐘于宫未足論乎異同鳴琴自手且何議乎先後豈若宫商並奏律吕相宣調五聲不資於繁細應八佾無違於折旋樂則既爾臣亦宜然塤之得篪載期於有輔臣之奉主必致乎無偏唱和之功備矣獻贊之道存焉故能振三代之風合九成之樂彼衆器之雕飾此羣聲之煩數又安足擬塤篪之純質論聲韻之清濁一作以清文苑英華巻七十五
