body:
  text: 文苑英華巻八百八十八宋李昉等編將相六故丞相尚書左僕射贈太尉王公神道碑一首故丞相太子少師贈太尉牛公神道碑一首故丞相尚書左僕射太尉王公神道碑李宗閔上即位五年正月丞相左僕射太原王公以癸已一作未發疾其明日遂薨於位天子震悼慜惻􅃍命内謁者詣其室索其所以飲食寢作之端既詳其無他狀遂贈一作賻布帛菽粟率用峻等旣又不塞痛軫之意加内府之絹千疋以賜之為之罷朝三日命兵部侍郎一人持節駕駟馬一無馬字簫皷出自正殿直抵柩前冊公為太尉塟有日官給秘噐及就途遣王人亟臨視之命羽葆旂常輅車之餙皆及墓俟其返虞鼓聲四節於里第而還示不與常制等也其子鎮以宗閔晩陪公於相位之末稍窺公之行請銘其烈以垂其後且不宜拒遂鋪其犖犖所能言者於金石云於公諱播字明􅆒太原人周靈王太子晉之後以歴世爲王因而受氏髙祖滿汾州長史生大璡嘉州司馬給事中司馬生昇一作昇非咸陽縣令太子少師少師生恕揚州倉曹叅軍尚書左僕射公僕射元子也忠敬而本仁寛明而有制内􅂋而敏外肅而和貞元十年舉進士第是嵗䇿賢良以直言校書於集賢殿其言平戎經國之術粲然可舉調尉􅉦厔㫁獄首出御史中丞李汶愛之奏為監察御史闕雲陽丞源咸季以贓免用疑文不冝調而調因謁於臺遂捕劾之追奸胥窮律㫖奏流咸季刑曹郎一作部罷所居官給事中以省詔非是奪俸縁而坐罪者甚衆自是風聲不可遏矣為侍一無侍字御史時京兆李實文皇寵一作所委能禍福卿士凡其榮衰繫所附背舉朝迎避其鋒公在途而實來揖公移文詆之其詞可羞實遂奏公為三原令求其不足於禮以持之公至尹署洎群吏之舘還其邑敬府之禮無不具實旣出其筭反加畏焉縣之編於戸者多中貴人前令率不能自爲其政施一作馳張牽之公悉召所謂貴人入坐堂中一當作其拜曰敬桑梓宜如是也邑人大駭從其所指爲長安令朝廷方恩于頔而以帝女嫁其子民有與于氏蒼頭同盗人馬者前令捕民而縱其蒼頭公始至縣即立取其奴與民均其法知御史雜事京師饑糓起價京西諸侯相率閉粟公移之簡書徵秦晉泛舟之説西鎮惴惴收去條令粟流于秦元和四年為御史中丞嵗中知京兆尹六年為刑部侍郎充塩鉄轉運使上言流人㑹赦而歸獨豐一作配囚爲隔遂無還者請率以七嵗爲竟至今用之尋加福部尚書益以御史大夫又以戸部尚書節度西蜀長慶初覲穆宗言中外之事遂留為刑部尚書復幹塩鐡冬拜中書侍郎平章事仍其職匡維激發始以進賢為急上方有意河朔以財賦始出於下一作方十一二年公用相印為淮南節度使以其職隨之四年言事者謂塩運之設宜留京師用制方上加檢校司空去其使未幾上念公成法又以使属公加司徒今上踐祚急詔徵公至即拜左僕射同中書門下平章事仍其使尋兼太清宫使累進爵至太原郡開國公食邑二千戸進階至金紫光禄大夫年七十二而薨公入官三十二政逮事六帝出綂楚蜀之師入極台宰之尊前後三惣塩鐵旣出一作去又復幾二十年天之所覆地之所載寕有獨私於公耶必有以當其然也一署吏苟不犯無能奪其任者嵗時奏課至於榮太史胥次遷亦如之故人用安其為善莫有欺公者雖逺至海裔若惣轡笞捶窮年不死一吏貶一職而羣務自濟凡朝廷平淮取鄆屠汴下滄景干戈不息者十五六年饋餉資費隨其緩急而立辦沛然若神給其間溝琵琶導頴河以漕輕舟師人坐受其飽䟽三門挽沉石以濟巨艫關中遂亡其饑薦皇甫鏄之強敏而鏄反短公於上公猶不知上謂其長者論景忠信矯制釋一無此字逗撓之将期必抵於罪時服其敢深渉徐境導齟齬而為忠槩人曰真宰相噐也權征之外有雜緍率貢内帑號爲羡進貞元中嵗不過十二萬緍及公嵗貢百萬緍凡國有大征伐不慮其費之有無洎丞相晉公專征討之事兵食悉出於公公方一無方字從容以賛其成及滄景平公有叶力之助自御中丞京兆尹惣賦秉政未嘗書笏為記善於啓奏天子不能自守其喜怒公以專志持務宻匡於上行已寡徒不喜伐露由是數帝任遇多被恩澤權利去晋如在諸已人多意公能詭合於時及公􅄪持相印與晋國洎一二公同輔於上趨嚮甚直雅符於道苟所舉公是公必扶之即非是公遂嘿嘿不和由是上知公厚重而同列亦聳待之乃見公之所為與嚮之不知者期公盖甚戾也公旣屈於名而伸於富貴豈非盛德君子神明之所祐耶故夫人清河崔氏給事中銳之女嗣子鎮一作式前一前無字秘書丞砥服名教不以丞相子自居其身次曰冰始叅一作授京兆府叅軍事其噐甚逺一作宏噐度逺公之仲弟曰炎季弟曰起與公三人俱用文學奮於江左西逰長安七中甲乙時議偉之公向一無向字歿不㡬日而起以戸部尚書司國之計門闥之士交一作咸來哭賀群吏之執籍繁夥一如公之時其亦於世難求也其從事故相國程公异今荆州相國叚公文昌其他分居中外羅于一作諸臺閣者不啻三十人銘曰在嵗太和惟帝聖神圖任舊台一作臣乃相太原維是太原福禄其奔再持化權樞揆聮聮兩綂劇藩楚淮蜀坤始自元和公秉貨泉歴憲穆敬一作憲穆敬文洎一作頃茲聖君四帝財征去公孰親惟煑惟鑄惟範惟聚或作惟聚惟輓東掃北殄上之所怒帶甲百萬唯一作餱食唯巨俾公尸之不勞而具變通以時物無滯遺一作阻綱條一施莫越其規御衆以仁中控其機信行恩馳罔有詐欺公之惟揚漕務其將公之留庭職與公并首尾貫聮已二十年相府使符隨其興殂公之敏智顯爵自至不紛其外姑真一作直其裏始承其風畏公之䆳及與之同泳公之義一作易仁人之跡殁而乃熾掲於兹碑不仆不倚故丞相太子少師贈太尉牛公神道碑李珏天球河圖有國之大寳麒麟鳳凰王者之嘉瑞方於賢彦即又次焉天佑我唐才傑間出輔時興化代有其人公諱僧孺字思黯隴西狄道人本子姓漢有牛崇為隴西主簿因家焉代為西州豪族八代祖𢎞仕隋為吏部尚書封竒章公佐佑文帝有重名於時高祖鳯及一無及字中宗時為春官侍郎掌國史曽祖休克集州刺史贈給事中祖父紹太常博士贈太尉父幼聞華州鄭縣尉贈太保公七嵗而孤依倚外族周氏嶽嶽卓卓有老成之風以䘮禮自處未嘗戱弄年十五知先竒章公城南有隋室賜田數頃書千巻乃辭親肄習孜孜矻矻不捨蚤夜洎一作自四五年業成舉進士軒然有聲時韋崖州闕網羅賢雋知公名願與交公䄂文徃謁一見如舊由是公卿籍甚名動京師得上第聮以賢良方正舉又冠甲科䇿中盛言時事無有隠避持權者深忌之出為伊闕尉名府賢侯羔鴈繼至封章屢薦每為中執事所阻皆不滿秩從潞帥郗士羙簡授管記三奏不得請竟除河南尉㑹有次對大寮因言事觧於上前遷監察御史丁太夫人憂服闋除本官轉殿中公以文高氣直累嵗堙屈問望所属推羙於臺閣間入省拜禮部員外郎時孟尚書簡有重望以地官貳卿兼領綱憲薦公知雜轉都官員外兼侍御史免憲職授考功員外郎集賢學士穆宗即位宰相稱其能遷庫部郎中掌書命召對與語上德之面賜五品服未幾遷中丞每對延英必移時盖言天下事有武將直臣為宿州刺史豪奪聚歛以貨數百萬厚結權貴公按之為有力者排㡬不免竟以詞堅理直上意廻直臣乃得罪由是上以清直知又面賜金紫拜戸部侍郎時望允一作允塞中書令韓𢎞以財投分公拒而不受上因他事得一作知之愈賢公遂作相持重顧大體不言細事嘗謂同列諸相曰致理之本流品為先彛倫攸叙盖謂此也每惜名噐力與同列争方鎮以不亷聞一作問者輙奏貶以賄賂求進者必阻之先是李司徒逢吉與杜循州元頴同作相穆宗寢疾議建儲貳與公不恊後元頴出鎮井絡逢吉衘之思有釋憾於政事堂謂公曰西川前有廢邱謀上熟知之來日延英發其事公不知慎勿沮議公曰王導有言吾雖不殺伯仁伯仁由我而死正近此耳又安得不言哉逢吉喑嗚而止敬宗年少嗣位公雅善敷奏每言一事必本末陳之上甚倚愛同列挾中助力赫赫妬公之賢公亦思避其鎽三上䟽求外任上以武昌善地建節幢兼相印以授之旣至問人所病害咸言鄂土踈薄嵗一脩城役工誅茅人用咨怨公黙許心計埏泥範塼未及三年盡換舊制崇墉堅壁人到于今頼之文宗嗣位二年公入覲詔復相位上雅知公名一見恨得之晩㑹宋相申錫以亷介聞巨姦鄭注挾北軍勢卜射取財貨富侔於國忌宋之直隂畫詭計誣與藩邸通因内臣而上其變造作似是衆皆符㑹上驚聞激怒下法吏議其罪諫官伏閣争不得公入侍宻啓上意乃寛止於郡佐公實右力今李崖州鎮劔南西川上言西蕃别屯以維州降帶甲之士甚銳其地要害得之足以壯邉部徐圖河湟此其漸也上疑不决下南宫議百執事皆是西川奏公獨曰國家近與昆夷軟血四鎮晏然今若自虧大信犬戎恃衆見詰渝盟彼直我曲未可量也上曰丞相之言是詔還維州初德裕承籍地勢自負機術公介特素不與之交及是大不平遂成宿憾公與李尚書宗閔同輔政出入殿省進退有度上偏目公曰卿才類霍光異日可属大事公懼滿辭位再陳封章寵加端寮出鎮淮海不改相印再登将壇揚州當江淮之衝習偷薄之俗公清净簡易化人易風俾及五年臻於一作于至理倉廪實禮義行刑措政成脫屣歸洛優詔屢降雅志不囬拜檢校司空東都留守文宗將有大制置大除授必降中使假於他方入皇城宣宻㫖獻可替否如在君前其信重也如此俄以左僕射徵王人就賜官告特明異禮公感恩雖厚退身愈堅一對而歸不詣相第亦有中阻未諧人情又加相印出為漢南節度使制出上悔之􅁒追成命公固辭上曰且不與卿周嵗别出都門特賜清廟噐六事皆範金餙玉如古時制宣曰以卿精忠用以貺别寵待之禮當時無儔公到㐮州均井稅薄地征人用胥悅咸歌來暮武宗初纉極聴信未一行險者乗時而起凶德參㑹倒置天下事清賢名被斥逐惟公位髙德重最難摇撼􅀈齟齬㡬至二年屬大水壊居人廬舍公以實上聞仇家得以逞志舉两漢故事生災異䇿免降授太子少師時議不平又還檢校司徒兼太子太保俄又改太傅再臨東郊劉從諌死劉禎自擅以招義軍阻命天兵誅討五年方尅上喜甚素忌公者媒孽鍜錬誣公與從諌交上怒下詔旬日三貶公至循州長史鑿空指鹿四海之士咸寃之公推運逹命恬然如得好官時踰嶺越險二年在海上無所苦今上即位大明善惡三遷至少保轉少師牽復髙位分司東洛池臺琴酒逍遥自娛賢士大夫尚其軌躅未半嵗遘疾薨于東都城南之别墅自嬰疾至于捐舘譚笑語言寔居自若口占理命纎悉無遺上聞為之軫悼聮日不視政公卿相吊正人雪涕册贈太尉遣大僚吊祭公端明啇重忠厚誠慤平居私室如見一作對大賔不喜釋老唯宗儒教早與韓吏部皇甫郎中為文章友其名相上下晩與白少傅劉尚書為詩酒侣其韻無髙卑前後作鎮皆佩相印辟署多名難其一作於進而勇於退儉必中禮貴而不奢知命逹理保和居易三領大鎮接䕶軍以禮貎不至交歡再入中書待樞一本有宻字使以公平不容請托有恩必報有讐不校韋崖州於公恩也嫁二女歸名士薦長子豋用行李崖州於公讐也恤竄譎之窮途厚供待於逆旅其厚德歟亦難能也夫人同郡辛氏贈僕射秘之女賢明懿淑稱於族􅊚有子五人曰叢曰蔚能嗣其業皆擢進士第蔚監察御史叢使府恊律曰奉倩洛陽尉二人未知名公以大中戊辰嵗十二月二十九日薨以大中已已嵗五月十九日塟小子不佞早棲門墻考選第叨殊等之科開賔筵忝入幕之吏國士相遇筆札見知周旋欵眷垂三十載刋石表墓一作德分也難辭公歴官三十一政作相一十九年逮事六宗光輔四帝承主恩必由直道觧相印實無罪名自少及長不失色於人佐時理家無悖入之貨持身斤斤一作不撓履道甚夷嘗病在髙位者不知止足終日抗論尅期拜章竟不及年俾孤羙志銘曰公之生兮禀星辰公之道兮侔古人一無此句公之才兮渾而真公之性兮威且仁公之文兮班馬隣公之藝兮游夏均公之儉兮自我身公之簡兮無雜賔公之貞兮肅人倫公之愼兮質鬼神公之相兮平如均公為邦兮政如春公不幸兮罹數屯公無辜兮介于循天開日明兮堯舜為君舉直措枉兮幽寃必伸牽復髙資兮言旋洛濵逍遥琴筑兮無異隱淪屈指懸車兮歉一作􅌚然十旬數懐未遂兮羙疹來臻悲纒冕旒兮哀慟縉紳寵贈加等兮冠于台臣有司軄䘮兮歸塟咸秦觀者歎息兮國人酸辛袁安餘慶兮令嗣兟兟陳寔道廣兮門生振振乃纉徽猷兮刻干貞珉碑闕字兮名德長新文苑英華巻八百八十八
