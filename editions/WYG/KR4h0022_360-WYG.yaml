body:
  text: 文苑英華巻三百六十宋李昉等編明道金鏡一篇讀荀卿子一篇訟忠一篇雜説一通儒道説一篇儒義説一篇相孟子説一篇寓衛人説一篇仲由不得配祀説一篇鍼子雲時説一篇詰鳯一篇大儒評一篇明道金鏡唐太宗朕以萬機暇日遊心前史仰六代之髙風觀百王之遺跡興亡之運可得言焉每至軒昊之無為唐虞之至治未嘗不留連讃詠不能已已及於夏殷末世秦漢恭君使人懔懔然兢懼如履朽薄然人君在上皆欲永享其萬乗之尊以垂百王之後而得失異趣興滅不同者何也盖短於自見不聞逆耳之言故至於㓕亡終身不悟豈不懼哉覩治亂之本源足一作是為明鏡之鑒戒亂未嘗不任不肖治未嘗不任忠賢任忠賢則享天下之福用不肖則受天下之禍臨危之主各師其臣若使覺悟社稷安有危亡之覆一作憂特由不留心於任使翻屬意於遨遊豈不哀哉若以遨遊將為任使以任使將為遨遊豈不善哉古人言舜禹不愛於聲不貪于色予謂不然將為愛也人云桀紂躭于聲色予將為不好也何以知之然桀紂命不終于天年樂不終于一世以此為不好也舜禹夀命於終樂畢於世予謂之愛也夫人有強躁寛弱之志愁樂貪慾之心思情有聰哲之才此乃天命其性有善有不善者也由是觀之堯舜禹湯躬行仁義治致隆平此禀其善性也幽厲桀紨乃為炮烙之刑刳孕婦剖人心斮朝渉脯鬼侯造酒池糟丘為長夜之飲此其受於天不善之性也夫立身之道在乎折衷不在乎偏射一作邉忱呉起曰昔桑氏之君修徳廢武以滅其國有扈氏之君恃衆好勇以喪社稷仲尼曰寛以濟猛猛以濟寛仁義之道猶不得偏何况於左道乎何况於不仁乎為君之道處至極之尊以億兆為君以萬邦為意理人必以文徳防邊必以武威孔子曰夫文之所加者深則武之所服者大徳之所施者博則武之所制者廣不可以威武安民不可以文徳備塞大鯨出入必廢遊波之功鴻鵠沈泥定無陵空一作雲之効若使各令遂志不失其能一作若使各令遂心並不失其志古人云欲構大厦者先擇匠然後棟材為國家者先擇佐然後定民大匠構屋必以大材為棟梁以小材為欀橑一作桷所有中三字亦作苟有所患尺寸之木無棄此善治木者也非獨屋有棟樑國家亦然大徳為宰相亦國家之棟樑也予思三代以來君好仁人必從之一作君有所好民必從之在上留心䑓榭竒巧之人必至致精遊獵馳騁之人逺臻存意管絃鄭衛多進降懐粉黛燕趙斯來塞切直之路為忠者必少一作亢開謟諛之道為佞者必多古人云君猶器也民猶水也方圎在於器不在於水以是而言足為永誡夫玊不琢不成器人不學不知道仲尼師於郯子文王學於虢叔聖人且猶如此何况於凡人者乎治主思賢若農夫之望歳哲后求才若旱苖之思雨亂君疾勝已如讎視不肖如子懐之中心何日蹔忘王莽偽行仁義之道有始無終孫皓權施恩惠之風有初無末二子猶膠船之泛巨浪一作流四海毁在不遥若駑馬之奔千里困其將至古人云升不盛石小智不可謀大一作小升不可以盛石小智不可以謀大巧詐不如拙誠信非謬矣有明主有闇主髙祖攝衣於酈生比干剖心於辛紂殷湯則留情於伊尹龍逄則被誅於夏桀楚莊暇隙而懐憂武侯罷朝而含喜闇主䕶短而永愚明主思短而長善觀髙祖殷湯仰其徳行譬若隂陽調四時㑹法令均萬民樂則麒麟呈其祥漢祖殷湯豈非麒麟之類乎觀夏桀啇辛嗟其悖惡之甚猶時令不行寒暄失序則猛獸肆毒蟊螟為害夏桀啇辛豈非猛獸之儔乎予以此觀之豈非大道之類也雖曰天時抑亦人事成湯之世有七年之旱剪爪為犧千里降雨一作雨降太戊之時桑榖生朝懼而修徳遂使十有六國重譯而來此豈非人事者也一作哉或云為君難或云為君易人君處尊髙之位執賞罰之權用人之才用人之力何為不成何求不得此言之實易論之實難何者輕陵天地衆精顯其妖忽慢神靈風雨應其暴一作異是以帝乙有震雷之禍殷紂致飛沙之焚多營池觀逺求異寳民不得耕耘女不得蠶織田荒業廢兆庶凋殘見其饑寒不為之哀覩其勞苦不為之感苦民之君也非治民之主也薄賦輕徭百姓家給一作給是上無暴令之徴下有謳歌之詠屈一身之欲樂四海之民憂國之主也樂民之君也此其所以為難也且用人之道又為未易已之所謂賢未必盡善衆之所謂毁未必全惡知能不舉則為失材知惡不黜則為禍始又人才有長短不必兼通是以公綽優於大國之老一作臣子産善為小邦之相絳侯木訥卒安劉氏之宗嗇夫利口不任上林之令捨短取長然後為美一作善夫人剛柔之情各異曲直之性不同古今奔馳貴賤不等為上之孝與下豈均上則匡國寧家志存崇禮下則承顔悦色止存敬飬虞舜孝也不為慈親所安曾參仁也不為宣尼所善孔子曰子從令者不得為孝臣苟順者不得為忠如斯之例不可不察也逆主耳而履道戮孔懐以安國周公是也順上心而安身隨君情以殺子易牙是也棄已之命安一作有君之身紀信是也挾國謀事以報私讐袁一作爰盎是也子一作挺身而執節孤直一作立而自毁屈原是也外顯和睦之端内懐湯火之意宰嚭是也忠謟之道以此觀之足為永鑒一作鏡白起為秦平趙乃被昭王所殺亞夫定七國之亂卒為景帝所誅文種設䇿滅吳翻遭越王所戮伍胥一作員竭力一作誠為國終罹賜劔之禍乃是君之過也非臣之罪也至若趙髙韓信黥布陳豨之儔此則自貽厥釁非君之濫刑也髙祖失於存功之能光武獲於置將之妙臣安君社稷之固一作國君處臣危亡之地豈是相酬之道也為天下之君處萬民之上安可易乎背道違禮非惟損已乃為賢人之所笑卑身勵行實為君子又為庸夫之所譏越品進官其類必為深怨偏與人語衆望以為曲私任使賢良則為偶得委仗庸夫則言愚闇言數則謂一作為太繁辭寡則講道薄恣情忿怒則朝野戰慄留心寛恕則法令不行民樂則官苦官樂則民勞四海之内莫非王土要荒為枝葉畿内乃根本古人云皮之不存毛將安傅當使本固根深委之内相而伊尹傅説人一作世所希逄至如鎮積水之塞守飛雪之邊而魏尚李牧當今罕遇遣人逺撫則眷戀而不忍愍而不遣則枝葉落而不存二宜之間致心何所一作在是用晨興夕惕無忘斯事為上猶然何况臣下易云書不盡言言不盡意今畧陳梗槩以示心之所存耳古語云勞者必歌其事朕非故煩翰墨以見文藻但學以為已聊書下所盡所懐想逹見羣賢不以為嗤也讀荀卿子説韓愈始吾讀孟軻然後知孔子之道尊聖人之道易行王易王覇易覇也以為孔子之徒没尊聖人者孟子而已矣晩得揚雄書盖尊信孟子因雄書而孟子益尊則雄也者亦聖人之徒歟聖人之道不傳乎世周之衰好事各以其説干時君紛紛籍籍相亂六經與百家之説錯雜然老師大儒猶在火于秦黄老于漢其存而醇者孟軻氏而止耳揚雄氏而止耳及得荀氏書於是又知有荀氏者也考其辭時有若不醇粹要其歸與孔子異者鮮矣仰其猶在軻雄之間乎孔子删詩書筆削春秋合於道者著之離於道者黜之故詩書春秋無疪予欲削荀氏之不合者附于聖人之籍亦孔子之志歟孟氏醇乎醇者也荀與揚大醇而小疪集作孟氏醇如也荀與雄文大醇而小疪訟忠牛僧儒春秋周大夫萇𢎞之城成周也晉女叔寛謂𢎞違天不免也國語衛彪徯又云萇叔支天有咎也攴天壊違天也人道補天反常也誘人城周誑人也左邱明皆然其言某以為一言䘮邦其例由斯矣若是則帝王不務為政而務稱天命下不務竭忠而務别興衰矣雖欲不亡其亡固翹足而俟矣必謂天壊不攴自古無中興之君乎衰運不輔自古無持危之臣乎殷太戊周宣王胡以承天壊而興乎殷傅説周吉甫胡以持襄運而夀乎二君二臣天豈私之乎且徯謂臣謀其君為違天則危而不扶為順天乎人道補天為反道則舎人徴天為合道乎誘人勤王為誑人則勸人叛王為信人乎辭之悖亂有至是者夫人道邇也忠者人倫紀綱也天道逺也談者人倫虚誕也假天道以助人倫猶慮論誣於失也况舍人事徴天道棄邇求逺無禆於教者也又謂不得終果由支天壊也則趙髙秦之助壊者也董賢漢之助壊者也曹爽魏之助壊者也賈謐晉之助壊者也咸家族身戮者天不夀之夫天之所與豈有親者以道承天則天無壊者以亂承天則天無支者故支壊非天也興衰由人也但有人不支而敗無天不可支也嗚呼𢎞無殷宗周宣以任之位卑大夫不為王卿士卒令強晉廹脅非道殘勦士死難於𢎞為得矣奈何丘明不譏周殺忠臣所以國危也晉殺王臣所以國分也但紀𢎞之戮死是神彪徯叔寛反常之説也謹按魏子賞賈辛以定王室也夫子曰其命也忠當有後于晉國也賞忠有後則身終不謂反一作支天戮也是知丘明謬聞偏見失聖之㫖甚逺恐史冊乆謬誣惑為臣者將求事之得不以文字申訟哉雜説一通儒道說李觀古今儒家多棄黄老豈必乎天徳未必者道上聖存於中而外施訓凡仁義禮智四者流於道道外而流於道以四化外俱復于天下為羲農不道而上徳則堯舜並知至徳則不列於聖教决無四數矣凡駢行之為仁為義為信為禮并行之為徳愈徳臻靖為道故二為儒之臂四為徳之指若忘源而决沠薙莖而掩其本樹難矣則冲虛利害于本末然老氏摽本孔氏囘末不能尤過者自中而息豈前無路哉及列氏莊氏展而針之空清泊中非典經與家風鄙而窺外俱逹誼也儒義說來鵠天下之命修文士曰儒士其言書曰儒書是謬乆矣夫儒者可器之士之號矣何者以其不逹於事濡滯焉且以詩書之法未嘗言以周易春秋之文未嘗載斯明矣唯論語言當為君子儒毋為小人儒禮記儒行篇如是非仲尼之言也夫聖人言君臣父子夫婦兄弟朋友賔主之法而已矣是儒者無定不約其事而制之何必曰儒苟若是則曰儒曰佛曰道何恠耶夫士之出也進道徳行禮樂以治其身心能語言明仁義則曰儒士不善而為武夫夫控弦荷戈賤𨽻之徒也苟修其文而不知武烏得為君子孔子曰有文事者必有武備有武備者必有文事夫文所以遵乎忠孝若武所以戢乎叛逆二事之用以求于是而已某是知古今之人慮或未精故也輙建斯議以為世式相孟子說孟子之愛人也細縁其言而不精以為習而有利則心唯恐其利至於傷人則曰術不可不愼也嗚呼術焉得愼愼則情背也心則可愼愼則惟術之惡而不利其傷也為仁人之心由術使之可動則咎繇之術治黥割也而咎繇豈利人之刑周公之術治縗絰也而周公豈利人之䘮以為愛人者必有其備故也術善可以化其心歟則師之術所以遵善也潘崇因師以殺楚子醫之術可以治生也晉人因醫以酖衛侯是師醫之所術豈不愼歟然而亦何嘗心之善歟果以利能固人心而唯禁其術則函不衛無敵之體是亦利其敵也巫不祝非病之人是亦果利其病也豈矢匠之心而已矣既以為不利而動心則矢匠一作人之利亦不欲殺凾人之利亦不欲死已有心矣然良其工不得不有其時而利其殺與死也以弧矢所以威天下則征不義而後可殺也棺槨所以封中野降殺有禮而後死可利也嗚呼為臣而倍叛為臣而倍𦵏其家人之心畏其情背也故術烏可使民愼古人濟其備所以教天下之愛也故尊生送死愛道盡此而孟子之愛也細為誅矢匠之意歟聖人所以使匠人一作函人也愛盡其道何如寓衛人説李甘於衛有人焉汙羣㓗獨師聖友賢不明於諸子間或從孟軻游在貧逃官將仕不妻宜若狂然鄉之君子以言譎曰若雖不明於諸子然且從軻軻為書曰仕非為貧也而有時乎為貧娶妻非為飬也而有時乎為飬今聞若推飬於弟避媒竄祿聖邪孟軻邪俱不識也對曰此吾母也吾母教我曰無以貧故不擇官滋汝以偷也無以飬故不擇婚滋汝以累也孝在便吾心也孝不在便吾身也愉愉授枕者便吾身也孶孶受道術者便我心也若便然汝不見馬牛羊狶乎同費芻豢也馬牛則免也羊狶則不免無他牛以耕免馬以駕免豈惟芻豢為然人有大焉汝當勤其道者也我對曰某聞㑹盟則牲馬宗廟則犧牛如此不以免奈何吾母嗟曰汝誠得列於㑹盟薦於宗廟雖不免吾言讙我固受教於吾母矣不然我何以得專此如牽人言而戾母心不知其子也鄉之君子退曰吾聞曾子能飬志者也若人曾子哉仲由不得配祀説來鵠語曰民生於三視之如一父生之師教之君食之惟其所在則致死焉孔氏之徒囬聖也賜辨也商賢也子我才也曾閔孝也及諸子言志夫子皆信而從之唯由教而勵之以成也故夫子訓由而功倍始衣戎服則攝齊始衛以劒則衛以仁為蒲宰勞民以簞食壺漿孔子恐私以食饋民是明君之無惠使子貢止之其於教亦至矣由也誠宜葆死焉以俟乎致保身以全乎用何取臨於衛門非召忽之死而至盡疑作盡聖人之心嘆曰自吾有由惡言不聞於耳嘗圍於陳蔡胡以不如衛之於夫子邪且諸侯有相滅亡者桓公不能救則耻之夫諸侯有塹壘以遏冦有甲兵以禦侮而小白猶能為辭其耻而終為覇主以救之矧夫子纍然若䘮家之狗無塹壘無甲兵脫載為宋衛所暴匡季陵刼則由也不得施其後浪死於燔䑓何齊桓能救異侯之耻而由反不能終緩孔子之窮使夫子以由在則曰惡言不聞於耳今日一作由也豈惡言不日聞乎又奚用白羽若月赤羽若日之多為哉祭法曰捍大患則祀之素王道窮患非大乎由不終捍豈為祀乎賜曰商汝何無罪今由也而汝亦何無罪宜貶其祀以觀來者鍼子雲說或曰揚子雲不思堯舜成康之世而自論以不遭蘇張范蔡之時豈儒者之為邪曰雄誠得素臣之事矣夫居四海之安處九層之高上鑒冲漠下瞰苑囿既其静息則必思事云亭追軒穆者矣列多士之朝齒無用之秩才畧不用名表莫聞既其静息則必思征虜功效雍丘者矣斯皆君臣居位之高下而所思則治亂亦不同盖位之極者思冲漠而欲無為也位之下者思功伐而欲有為也無為誠君之體有為誠臣之事如孔子曰大道之行也與三代之英丘未之逮也而有志焉揚雄則自論以不遭蘇張范蔡之時噫孔子真素王揚雄真素臣哉孔子思三代之英是猶處尊位而道極事云亭追軒穆者也雄之論不遭蘇張范蔡之時是猶居散秩而才閒思征虜功效雍丘者也素王誠得王體素臣誠得臣事然臣事何事邪曰子貢使吳越孟軻闢楊墨皆事也今不知雄思蘇張范蔡之時者其欲自為蘇張范蔡之人邪其欲折以正道使弭兵擴文歸吾域邪苟自為蘇張范蔡之人則叛矣又何臣事哉詰鳯陳黯嘗得揚雄云君子在理文粹作治若鳯在亂亦若鳯謂隠見之得宜也將欲神之以為鑑逮覽其劇秦美新則有異乎是句雄仕漢遇新室之亂既不能去之又禍及文粹作反乃為斯文以媚而取容嗚呼鳯固若是邪果若是則鳯遇矰繳而猶回翔其間邪夫君子之仕也所以行其道道之不行也則可以明其節彼莽之不臣雄時在列宜以君臣之義興亡之理匡救之以行其道苟畏其威愛其死則可投簪高謝以明其節詎有苟禄貪生狥非飾詐廣引秦過以譽惡徳是稔其簒逆也與古之持顛扶危死名節者背而馳也則向者所著若鳯之説得不為誣鳯也哉雞常禽也晦曉而不昧其候鳯靈鳥也理亂而不知其時邪噫言之不思有如是邪或曰古之人臨危制變亦有權焉雄知莽之不可臣也故矯為其辭姑務脫禍是亦權也子何過之深歟曰不然夫權者聖人有焉所以不失其道未見捨其道而從其權昔仲尼仕魯以季桓子荒齊樂知其不可匡也乃去之曾不聞矯為其辭以求庸於是文粹作魯雖仲尼日月其徳人之不侔然揚亦慕仲尼之教者以著書立言為事得自易哉夫立言者豈不欲人放從文粹作從教邪且已不能信人况求信於人乎語曰君子先行其言而後從之豈斯言可欺也哉大儒評陸龜䝉世以孟軻氏荀卿子為大儒觀其書不悖孔子之道非儒不可文粹作而何然李斯嘗學於荀卿入秦干始皇帝并天下用為右丞相一旦誘諸生聚而坑之復下令集作禁曰天下敢有藏百家語詣守尉燒之偶語詩書者棄市昔孔子之於弟子自仲由冉求以下皆言其可使之才及其仁則曰不知也斯聞孔子之道於荀卿位至丞相是行其道得其志者也反焚滅詩書坑殺儒士為不仁也甚矣不知不仁孰謂况賢知而傳之以道是昧觀聽也雖斯且五刑而况况字集作荀矧得稱大儒乎吾以為不如孟軻文苑英華巻三百六十
