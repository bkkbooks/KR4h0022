body:
  text: 文苑英華巻二宋李昉等編天象二日賦三首日中有王字賦二首黄人守日賦一首二黄人守日賦二首太陽合朔不虧賦一首日賦李邕惟元氣之播儀式景曜之騰烈倚崇盖而西轉駿流光之東晰豈盈縮兮彌嵗亦畏愛兮異節暾淑色而布和赫炎氛而生熱所謂純精至高至明燭龍照灼以首事踆烏奮迅而演成開天地之司目為帝王之我兄文思以之寅餞神武以之揭行是以節朝有政逮昃未飡揚暉而四方動色霽景而萬物聳觀豁雲霧之凝暗觧雪霜之沍寒願揮戈兮再晝俟傾藿兮長安至若瑞氣浮烟休徴抱戴乍出海而融朗忽飛天而光大千里發乎主明五色見於時泰将閉閣兮永言豈覆盆兮貽悔則有懐人惆悵酌醴獻酬𡨕一醉兮千日渇一日兮三秋昔定鼎兮卜洛彼昇天兮上遊處立觀於溟渤遂測景於嵩丘借如夸父棄䇿奔走何益夫子重隂道業所欽嘆遅遅之春日阻悠悠之宿心惜落照於崇木重遥思於竹林粤若飛箭易及長繩難駐知息影之未寧喜傾盖之相遇始曝書兮多暇復炙背兮成趣見蘭蕙之有暉想桃李之可樹别有誓以期皦至以憂長既中時而必熭亦後甲而見陽與聖人兮齊朗宜君子兮借光卜在地而占吉說通夢而尋昌匪直燭之滅私行之惟則若御車之有輪豈摶空之無翼固斡運兮誰使諒周行而不息重光起於一人合璧旋於八極觀乎翠萍生實赤羽從軍倘一編之欲授曷三餘之敢聞夕沒衘於黛巘朝隮夾於火雲何白駒之激急致華髮之繽紛若乃江湖積氣霧雨經時莓苔連於枕石泥濘汨於川坻仰蒼蒼而不見俟杲杲而常欺将遣慰兮安適每沉冥兮自悲借如謫居海上喟息天間有哀猿兮斷續無飛鳥兮徃還事填膺於瘴癘情滿目於雲山未回光於東闕猶屈指於南蠻乃舉手而歌曰披雲覩日兮目則明就日瞻雲兮心若驚日爾一日兮何道時哉幾時兮此生第二李為仲春上日率公卿大夫朝日於東郊祗祀畢太史進曰夫日統七紀周旋天地國家災祥之至也惟唐文明日徳不愆今陛下又親設弟禮天下煥爛上曰朕不足以配日然國經在乎上爾即司之於日有見可使朕聞之乎太史曰臣聞天高無程日為大明天為至陽日為陽精則日於天為子象也在人為主在天為日其高明一也日之初将出兮東方霍爌烘煌地外洩光隂雲含明閃閃熒熒火炬縱横漸高如懸或若輓上於天而傍倚諸山海水血色龍魚騰翻上浮焦烟創業之象也日之中聚焰成珠攢劍成輪青天而白白雲而赤赩赩奕奕曽不得定目太虛為之晃惑萬物依乎地無不自識太平之象也春之日葱蘢通曨霍爍晴空赫為大笑滿天地喜江風晴起錦文出水采錯斕斑花樹之間新橤粉融萬燈無烟一拂雕梁嬌霞溢乎殿堂繢壁連光温焰生旁仁恩之象也夏之日烘彤坌勃六合焚炙風不能為氣天地變色不勝其猛乍摇紫影所照之穴化為火井草木如燒而未乾焦泉池如炊若将涌沸炎威逼人疑欲附地或透入室壁潜蒸簟席威怒之象也其於小則草芥逰蟲戸網隙塵各示其容其為大則東而引千萬里不見其近出西而引千萬里不見其逺及将暮也爍乎而低淡乎而頺忽乎變容赤盖下空埃塵濛籠渾渾黄黄漸無精光黯湛疑作黮殷顔不留山巔即墜乎窮泉丹霞染雲焰焰半天暝隂夕靄薈蔚霮䨴餘光無采暫明乎千里之外烏鵲尚鳴新月已生長夜自清今昔頓成良可悲乎夫日之不永也甚矣人之言卯比及㸔已可食人之言午比及㸔已欲昃是故聖人寸隂而惜願陛下朝視之思創業之難暮視之感淪革之易春夏視之調喜怒之節中視之将偃乎太平之地又何求焉臣又聞之聖人為君日祥屢臻五色煜煜天地同文昏弱之代吞蝕不暇列宿不沒晝而為夜可不務乎故天有日不能自靈日有光不能自明待聖人而明之也第三王捧珪杲杲太陽昇自扶桑既移晷而高下亦候時而短長其沒也天地為之黯色其出也逺近為之生光及夫春景初動寒威始歇煦百川以氷開煖千林而花發行乎赤道應其朱明􅋩緑潭而水沸爛青雲而火生于斯之時誠可畏也既而暑退凉進烟歸霧返懸净影以悠揚度斜暉而晼晩送秋景之已末屬冬隂之方盛融晴雪而曭朗曝晨霜而温映于斯之時誠可愛也故能明以成象高以臨空有形必鑒無幽不通在七政雖擅其長照萬物不競其功抱三足之靈烏挂五彩之輕虹魯陽揮戈而三舍漢皇握鏡而再中曜凝霜而輕白帶飛霞而淡紅皎兮潔每守團圓不虧缺曈兮曨暮落西山朝海東誰復知其動静安能察其始終徒羙其委質上浮流光下濟不擇好惡不遺巨細葵藿向之傾心旂常畫以増麗匪杖䇿之能及豈長繩之可繫至若螢火聚燃魚燭並􅅡明月高映繁星逺列争散彩以炫晃競騰暉以照晰見白日之一臨總光沉而影滅則知赫然作色無物不憚温然為容有情皆翫終而復始既明且煥自非造化之至精焉能作羣生之壯觀日中有王字賦以題為韻次用鄭錫至陽之精内含文明成命宥宻神化隂隲倬元聖而緯天爍靈符之在日人文變見𤣥象貞吉煥爾殊容昭然異質三陽並列契乾體以成三一氣貫中表聖人之得一當是時也河清海晏時和嵗豐車書混合華夷㑹同皇帝乃率百吏禋六宗登䑓視朔候律占風祀夕月於禮神之舘拜朝日於祈年之宫霽氛霧掃烟虹地涯静天宇空隂魄既沒大明在東吐象成字昭文有融法科斗以為體並踆烏以處中馮相未覿疇人發䝉此乃聖人合契至化𤣥通不然者何得曜靈啓瑞明被於有截垂光燭地運行而無窮聖人以不宰成能日月以無私可乆偶聖則呈祥逢昏則顯咎貞觀契無為之功休祥應無疆之夀沒於地我則取誡於明夷登乎天我則呈形於大有其初見也昭昭彰彰流晶曜芒若神龍負圖兮呈八卦於羲皇其少登也發色騰光乍見乍藏状靈龜衘書兮錫九疇於夏王蔽虧若木隠映扶桑曈曨五雲之表輝煥重輪之旁臨紫宸兮千門洞照出黄道兮八極増光惟徳化成惟王正位兄其日兮姊其月父事天兮母事地罄六合以為王綂三才而制字道不藏寳神開奥秘王在日兮垂文日在天兮重懿豈徒色映合璧光連抱珥三舍廻魯陽之戈再中羙漢文之志皇上以為命不于常惟徳是據災逐祥啓福隨禍著知微知彰一喜一懼因嘉瑞以増徳合元符而降祚客有上國觀光金門獻賦覩日中有字之感成天下至公之務傾心太陽企踵雲路願回光以暫燭庶千載之一遇前題喬琮登科記作喬深至尊者王至明者日處其位兮無二配其徳兮惟一制服以象必圖之而並臨視朝以時方候之而俱出懿夫日實也厥生于東王徃也厥居于中其呈祥以下燭必布徳而上通然則日中之有王字者豈不以昭宸聦彰國風煥乎黄道赫矣蒼穹表皇綱之不紊延聖祚於無窮者哉且天垂三光日當其首人執六藝書列于後此神功之所成彼人力而何有况乎烏為鳥矣無慚蒼頡之能日匪扇焉寧假右軍之手稽圖緯與載籍信可大而可乆豈比夫龜麟龍鳯徒在乎宫沼郊藪適足以勞於使臣未可以濟乎不朽夫運行不已者天地之常臨照無私者日月之光羙之則配於太昊惡之則比夫夏王是以逆其時則休亦成咎順其道則否亦為臧故昔王者莫不觀天文兮順隂陽授人時兮正紀綱而人用康而邦其昌如此者厥鑒不逺實歸羙乎我皇信所謂承天之序兮襲於休祥者也是知君能則天天必呈瑞明海内之四目瞻日中之一字士有仰止雲路苦心詞賦戰欲酣兮日将暮儻魯陽之修戈可借冀和仲之餘暉可駐願傾葵藿之心希成桃李之樹黄人守日賦以四聲為韻嚴維聖人之在運也上天為之降祥将以示徳逺告時康火精始凝初臨於嵎谷陽徳用事首出於東方作大明兮其彩白有善守者其人黄惚兮恍兮見於為物之體窈兮冥兮來於無何之鄉豈惟有徳動天影再中於漢帝至誠感物運疑作退三舍於魯陽所謂人者臣之稱日者君之象三光可得居尊衆靈於焉稱長人所以守日叶伊臯之弼亮天所以垂休明億兆之所仰實王化之基格諒神功之肹蠁則知唐虞之代羲和之最蕭索糺紛如烟如靄又况夫兆慶於合璧告祥於抱戴嘉其氣象地表雲收天外出暘谷而輪開當亭午而光大映眞人之麗質爛霓裳與羽斾離婁夐夐以喪明周文咄咄而延昧屬宇宙以廓清表隂陽以交泰我君如日之昇惟天是則君臣合體符瑞允塞以太古而望今齊哲聖以同徳二黄人守日賦以君徳同明逺人來附為韻滕邁一氣絪緼宛成形而擎跽相向儼守日而昭彰可分其色惟黄雖配位乎下土其形有二如輔明於大君原夫左之右之以引以翼雖髣髴而異體乃焜煌以同色理殊執熱寧濯曽泉之隅事近負暄杳在離宫之側兩分夾臨下之照偕出契不孤之徳爾其從炎漢以賦象能環衛以成功白駒乍留守之而無荒無怠踆烏不駐隨之而自西自東届赤霄而烟雲靡雜循黄道而光彩混同容裔斯呈交相可名幸因時以融結得託質於昭明契同心之言是以契合潤通理之飾吾非染成其或杲杲初晨悠悠云晩曽不斯須而離何虞運行将逺鄙魏臣捧而在夢笑夸父追而莫返嘉夫儀形似是想像歸眞離立環乎兩珥聮影遶於重輪遂使慕有道之風歸我一徳奉無私之照惟予二人受其采豈無異色呈乎瑞不待他辰所以禀中央正氣當四夷咸賔誠宜陽景廓開翼戴徘徊昇扶桑孰云孑立厠羲和乍若朋來觀其輝煥瑞牒昭晰雲路委疾徐而不更其守循躔次而罔􅄽于度信可以端拱道泰遐荒恱附今所以賦守日之祥表稱君之裕前題同前韻闕名日觀天文彼黄人之離立是守麗紫霄而規模乍分揖杲杲之光豈勞披霧舉駸駸之足詎假慿雲孕靈自禀於眞宰肖貌方瑞於明君觀其異體同心雙形合力如左右之司局以扶持而受職樂天成象豈殊連璧之文就日無私特比鑄金之色所以煥人寰彰土徳髙尋罔差其晷度廻騖靡􅄽于頃刻類聚炎上朋來熱中遥集丹極廻翔碧空援四彗而克資煩手斵重輪而叶賛𤣥功發祥光之照爛将徳煇而綂同不然者何以挺兹妙有倬彼輕清夾輔躔次周旋運行通理之形容可辨和光之顔色混成當烏采甫臨之初則温温而引耀遇鷄人未唱之際亦專專以在明髣髴如蘭之契逍遥若木之程及夫曈曨既昇昭晰将晩厥瑞皆見斯人甚逺宵依愕夢伴程昱以少留書遇揮戈感魯陽而俱返恭已無怠旁行有隣化天隅之一氣為日邊之二人乆照不疲匪迷陽於上帝四夷云格方取契於援神所以靈貺克開容裔徘徊非其時則抱影長徃偶乎聖則差肩並來隨冬曦之煦嫗與夏日之恢台然後竦輕軀恣遐歩分明天表雙羙雲路願将守黒之心望離宫而景附太陽合朔不虧賦以聖徳𤣥通陽精洞照為韻楊發懸象告祥垂衣表聖隂慝将作而潛滅陽光當虧而更盛羲和率職徒降物以宵興堯舜臨軒方並明而曉映上方以憂勤御極睿哲承天聲教既昭乎下土災蝕固消於上𤣥景麗髙雲已臨照於物外位移正寝空警戒於事先曉次箕中時惟冬仲天子夕惕而慙慮太史先期而誓衆於是霧霽閒原雲歸幽洞圓規杲耀發瑞彩於踆烏愛景冲融動和鳴於彩鳯是月惟朔昇輪自東煥大社之晨氣照清朝之曉風幣奚假於詞祝皷寧煩於奏工遂使皆仰之人既無虞於薄蝕惜隂之士咸有望於再中諒天聽之自邇信宸心之遂通仰稽聖謨遐考天則運行雖由於黄道應感自符於𤣥徳輝華増煥觀光必達於幽隂氛祲皆消揆影無差於晷刻道敷陽教徳叶炎精麟効祉而不鬭葵向影而皆傾觀臺登望之時漸欣光被史冊退書之際益訝文明至乃揚彩宫闈増華廊廟人動佳色物含清照若合璧之無瑕比重輪而有曜黄琬之巧言莫啓由此緘詞叔輒之望歎無聞徒兹載笑道契𤣥化禎回太陽躔次罔虧於順晷貞明以合於重光固齊天而比徳垂永永於皇唐文苑英華巻二
