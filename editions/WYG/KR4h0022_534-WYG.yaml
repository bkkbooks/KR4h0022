body:
  text: 文苑英華巻五百三十五宋李昉等編縣令曹官小吏門十九道縣令有客判一道立生祠判一道叅軍鶻子判一道卒史有文學判六道小吏持劍判三道省官員判四道成都令勸學判一道縣令祭名山判一道吏曹判一道縣令有客判縣令有客吏賀皆往或遺賀錢萬人告其受贓辭云其實不持一錢對王緯賔實有禮將存執贄之儀相在于堂爰司主進之務惟彼縣尹是亦為政詩愷悌以字人需飲食而肅客宓琴多暇􅅯室常閒將有四方之賔用致萬錢之賀彼吏人而迭進伊或者以遺來財非摭實詞作一作則誇誕稽諸漢史且曰大言詳乃吕刑寕聞黷貨哂無狀而即可驗受贓以謂何立生祠判甲有惠政被立生祠百姓祈禱因而獲福或告有妖術訴云非所能致對李宣考龔黃之跡窮卓魯之化不孤良吏可謂能賢甲惠訓聿修仁政所舉丕變舊染化居恒風歎歌邵之徒勤想借寇之無及冀全遺愛遂建生祠殁無媿於張蒼存不謝於王渙因心所感縱獲福而何傷唯道是從豈為術之能致告之誠謬訴乃有孚㕘軍鶻子判西州人逯鶻子先任沙州叅軍永淳二年赴選冬集歸至甘州病經二年今於沙州取選觧不於京􅄗銓試直赴神都選曹司判不許稱鄉路阻逺既有田牧合便赴選對康子元域中有道天下無外雖在戎落亦挂周行鶻子運偶南薰地濵西域乆沐唐虞之化獲叅州郡之班萬里牽絲俄畢子荆之任九流懸鏡行披彦輔之雲未果登龍旋一作先驚退鷁金㣲絶徼將還敬梓之鄉玉塞遥途尚轉飄蓬之陌風霜之疾忽遘於虵杯寒暑之期亟環於鳯律瞻彼故里歸路仍懸載撫身名銓衡復及本州文觧難以希求往地官曹易為憑託遂蒙申送但事奔波不就京邑仙臺直指神都覽觀辭官歴稔不可妄託田牧明勑垂文無宜越來此選二途咸爽百慮空馳請精詭隨之人無黷清通之鑒卒史有文學判有司選擇卒史以文學掌故􅍯員有比百石已上誦多者先求之不得訟如功令對李庭暉學以從政位將禄賢必考㣲言以登稱疑作稍食詢諸漢制或漸通班按彼周官湏當下秩若業同晁錯才比匡衡多聞闕疑果行育徳三墳五典顧倚相而無慙七略九流仰劉歆而可繼固宜虗位允應旁求實乖與善之情而啓多訟之訴含光易退則醜歸於訟者推誠應物復過在於有司儻其誦過萬言加以通識千古與能從事可不務乎同前賀蘭恒學古入官選才署吏以賢制爵無替舊典必加明試抑有前聞惟彼司存綜乎推擇課以經藝節其通敏或奉常以述職乍春坊而視事遂使晁錯通經將智囊而見擢東方荅客議雄辨以登難然則服勤滿嵗人實勞心纔補卒史報亦何輕無儒雅之超昇孰刀筆之叨㨿訟如功令誠謂有孚同前賈季良與能賛國于以敷求噐人弼政聿先精擇有司審才無遺曲藝雖厮役之未劇亦文學以是徵列彼卒史典新掌故將適時而給務蓋從事以􅍯員百石伊何九流清品禮秩式叙因等夷而不易干求無稽雖誦多而奚取欲加重典之科難取薄言之訴請詳漢道方議吕刑同前史溆學古入官議事以制既叙功而論徳將按名以責實眷乃卒史寔惟王人爰從推擇以膺明試同馬遷之有論望絶為郎異晁錯之登科才非一作無掌故進取棄於鳬短擇先得於龜長雖漢制四科先於徳行而孔門十哲稱以文學求之者何方倚相之能讀有司奚失俾平津之下第且一言體國珪爵斯分片善不遺草萊靡滯薄言之訟功令式昭舉事之􅄽有司彌逺同前費光俗懿文聚學以期致逺難進易退必在從誠且晁錯多才亦先於掌故東方答客豈望於侍郎茍有求於叙進亦何同於卒史受禄不誣致貴有漸陟遐由邇楊園必倚於畝丘在著從㣲増氷有成於積水方進寧辭於計食陶潜不耻一作喜於折腰矧兹百石之比乃是上農之秩誦多為美誠有司之合甄先求見黜宜功令之致訟罪自已招誰可怨咎同前鄭務縣官凝命化天下以人文一作字有司慎舉闡大猷以儒行雖司徒既有詞客當國豈無髦士掌故帶經傳業射䇿㣲庸歐陽生之代業自昔斯授孔安國之家書居常時習刺六經以逹士就百石以代耕曩者植杖而耘未常釋巻今茲栫棘而訊豈廢傳儒由是䇿名廷尉公門惟其自訟􅍯員文學卒史實以次敦以命求之自貽不得嫉詞多而有訟誣功令而不公寧假爰書宜從告詰小吏持劒判得乙為小吏持劍執燭事功曹後忽帶劍於槐棄炬於地功曹將罰之乙不伏對天生小人以事君子各徇所守式恭爾位恪勤或懈法罰必施居官之恒雖細不宥既署名於小吏則委質於功曹持劒為儀執炬行夜乙誠微品猥搆無良徒効激節慕竒不知安卑守道遂使披蓮寳鍔向春樹而棄捐􅅡桂華熖委宵途而撲滅執御洋洋不爽伊善為物諤諤果貽其傷空思强梁罪欲何逭同前趙頥真王爵髙懸惟才是與君子陳力必厠周行雖士庶區分固有限於流品而忠信之道是無隔於胥徒乙也鯫生職司小吏業非地望有殊代禄之家才同懐寳頗異名人之子念荆璧之未斷惜連城之莫知吾道不行斯命也已一作命斯其也執鞭之事抑亦為之遂僶俛於下寮俄鞠躬而從役持劍曠久執炬斯勤竟無自明之効莫騁鉛刀之割掃丞相之門忠貞未表􅍯功曹之卒日月其除無徐君之知已追延陵之挂劒爾位其曠誠逃王者之規嚴罰將加恐有蔽賢之責司徒尚猶不拜主吏更欲何尤不伏之辭恐為妄作同前翟禹錫周曰胥吏漢稱轓幹既别府中之位仍標軨下之曹所以安其計食從於負版乙忻逢有造幸預可封不學竒童俄為小吏既而心勤左右荏苒驅馳慕郭太之平生有蕭何之志業帶昆吾之寳寕慙挂樹之人棄囬禄之煙誰賞移薪之客功曹班同許邵才謝山濤未見優容飜聞致罸情有所急罪不合加省官員判有司議户口減耗請省州縣百姓訴云州縣廢則所𨽻濶逺罷人益困請省官員對司馬滔時康官僃所藉為理户減務煩則害於政有司縻我王爵思立國體知師旅之後版籍徒懸念閭里之空州縣宜省誠有可尚議未得中雖在濟物之規實亦勤人於逺請依百姓之訴用減庶寮之員省事省官晋朝髙其論從人從欲魯史異其文自古以然孰謂非允同前杜顗列地之圖辨邦之数制以􅌀里設其井田居無遊人地不曠土頃因群寇且有大軍既為患於凶年毎屬想於美嵗方今國歩將泰人心盡歸乆悲風土之殊咸戀枌榆之舊則百堵皆作三農聿修既富之教已興食貪之惡一作貧之怒將息故郊遂絶不毛之地郛閈鮮無名之人商旅厚生無屑心於倚市黎甿樂業必食力於代田然後地不耕耘税以三家之粟宅無樹藝罰其一里之泉何必具以寮寀而欲省其州縣與其削邑寧愈減官是為政先實亦教本咨爾户部恤我人言將以攻乎異端不如坐進此道同前盧偘度土居人是齊勞逸列官撫俗亦藉忠良茍適於宜寕求改作頃者三苖未􅅯萬人靡安遂令麗土之甿多困轉蓬之役今寰瀛有截率土無虞稽版籍而多虗望喬木而未復有司爰憂爾爵式保我人議併州閭庶節賦役眷夫白屋是啓丹誠請減職員以規省約且廢州則邑居不接聽訟實難省吏則權制可遵恤隠何害况官不必備標之典經人之告勞豈忘惠廸同前禹别九州秦稱百郡非無沿革屡有廢興茍損益之或差亦因循而是務頃者暫遇奸宄人或流亡軍旅是加荒饉仍及遂使黔黎失業喬木罕見於人煙井邑為墟壊垣寜聞於畎畆洎乎皇威逺被寰宇肅清頻霑利澤之私遂忘干戈之患省司以罷人是恤議廢置於州縣百姓以遐路告勞難駿奔於𨽻屬衆以减員是請或願取新官以省邑為謀盍宜仍舊從人欲也無或違之成都令勸學判得成都令江延調縣中子弟二十以上除其吏徭各率環刀一宻布十令詣大學府司科擅賦斂録事批放仍舉科諸生謀殺之罪對李乂郎官上應列星惟帝稱難邑宰下宣風化得人斯委江延材膺訓俗功寄臨人拜職周京銅章之秩六百隨班蜀國劍門之路五千兾行鄒魯之風思變彭岷之俗上琴􅄗而訓翟依石鏡而翔鸞將𢎞富教之宜用廣文儒之業爰調子弟是蠲徭賦環刀宻布聚糧求任土之資裂裳負笈函席就横經之道惜乎英靈莫嗣曽靡尚於摳衣剛悍猶傳遂有歌於剚刃不漸文翁之化有逾原壤之愆擅賦之條在江延之何負謀殺之狀顧諸生而已彰上藩之斷頗乖録事之批為得縣令祭名山判乙為邑宰祭其封内名山州將按其非法訴稱旱暵甚所以祈之茍利於人不敢避也對王重華山川咸秩嘉其以靈雪霜不時於是乎禜庪懸斯設典禮孔明乙職惟奉公思不出位百里行善且在子男之列十倫展祭爰僣諸侯之封孰謂鄹人不如林放固宜按法曽是簡􅂜必也驕陽害時司嗇憚暑詩歌太甚義救如焚信靡神而不宗在精祈而則可用寕旱暵難責䂓為雖欲正名如其恤隠不乏吾事湏旌墨綬之賢空惜爾無允為彤䄡之舉吏曹判得甲之周親執工伎之業吏曹以甲不合仕甲云今見修改吏曹又云雖改仍限三年後聽仕未知合否對業有四人職無二事如或居肆則不及仕門甲爰有周親是稱工者方執伎集作耻役以事上且思禄在其中有慕九流雖欲自遷其業未經三載安可同升諸公雖違甲令之文宜守吏曹之限如或材髙㧞俗行茂出羣豈唯限以常科自可登乎大用以斯而議誰曰不然文苑英華巻五百三十五
