body:
  text: 文苑英華卷二百九十四宋李昉等編行邁六李紳二首姚合一首袁不約一首朱慶餘一首于武陵六首賈島四首釋無可一首劉得仁一首温庭筠四首方干四首李洞二首杜牧六首許渾六首雍陶二首李商隠三首薛逢一首姚鵠一首項斯一首趙嘏七首馬戴八首顧非熊三首薛能五首李羣玉一首張祜三首過鍾陵余長慶三年除江西觀察使奉詔不之任李紳龍沙江尾抱鍾陵水郭津橋晚景澄江對楚山千里月邨連漁浦萬家燈省抛雙斾辭榮寵遽落丹霄起愛憎惆悵舊逰同草露却思恩顧一沾膺初出淝口入淮前人東風五日雪初晴淝口氷開好濯纓野老擁途知意重病夫抛郡喜身輕人心莫厭如弦直淮水長憐似鏡清廻首夕嵐山翠逺楚郊煙樹隱襄一作憶層城客行姚合客行無定處多在路岐間馬是賖來貴僮縁借得頑詩書愁觸雨店舎喜逢山舊業嵩山下三年不得還離家袁不約歩歩逺晨昏悽心出里集作獨出門見烏唯有淚㸔集作問鴈更傷魂宿酒寧辭集作添愁醉廻書諱苦言野人應恠笑不觧愛田集作樂丘園嶺南路朱慶餘越嶺向南風景異人人傳説到京城經冬來往不踏雪盡在刺桐花上行南逰于武陵窮秋㡬日雨處處生蒼苔舊國寄書後凉天逢鴈來露繁山草濕洲暖水花開去盡同行客一㠶猶未廻南逰有感前人杜陵無厚業不得駐車輪重到曾逰處多非舊主人東風千里樹西日一洲蘋又渡湘江水湘江水復春西歸前人不繫與舟閑悠悠吳楚間羞將新白髪却到舊青山一葉忽離樹㡬人同入闗長安有家住秋至又西還早春山行前人江草暖初緑鴈行皆北飛異鄉那乆客野鳥尚思歸十載過如夢素心應已違行行家漸逺更苦得書稀客中前人楚人歌竹枝逰子淚沾衣異國乆為客寒宵頻夣歸一封書未返千樹葉皆飛南過洞庭水更應消息稀夜泊湘江前人北風吹楚樹此地獨先秋何事屈原恨不隨湘水流凉天生半月竟夕伴孤舟一作南行客無成空白頭旅逰賈島此心非一事書札若為傳舊國别多日故人無少年空巢霜葉落踈牖水螢穿留得林僧宿中宵坐黙然以下四篇並見集本早行前人早起赴前程鄰鷄尚未鳴主人燈下别羸馬暗中行踏石新霜滑穿林宿鳥驚逺山鍾動後曙色漸分明巴興作前人三年未省聞鴻呌臈月何曾見草枯寒暑氣均思白社星辰位正憶皇都蘇卿持節終還漢葛相行師自渡瀘鄉味朔山林果别北歸期掛海㠶孤上谷旅逰前人世難那堪恨旅逰龍鍾更是對窮秋故園千里數行淚隣杵一聲終夜愁月到寒忩空皛晧風翻落葉更颼飀此心不向常人説倚識平津萬户侯竹溪水晩次神灘阻風釋無可驚風山半集作半山起舟子忽停橈岸荻吹先亂灘波落更跳闕今欲暮過島忽明朝若盡平生趣東浮㸔石橋早行劉得仁萬類半已動此心寧自安月沉平野盡星隱曙空殘馬渡横流廣人行湛露寒還思猶夣者不信早行難商山早行温庭筠晨起動征鐸客行悲故鄉雞聲茅店月人跡板橋霜槲葉落山路枳花明驛檣因思杜陵夣鳬鴈滿廻塘利州南渡前人澹然空水帶斜暉曲島蒼茫接翠㣲坡上馬嘶㸔棹去栁邉人歇待船歸數叢沙草羣鷗散萬頃江田一鷺飛誰觧乗舟尋范蠡五湖煙水獨忘機經集作過五丈原前人鐡馬雲鵰共集作鵰乆絶塵栁隂高壓漢宫集作營春天清殺氣屯闗右夜半妖星照渭濵下國卧龍空寤主中原得集作逐鹿不由人象床錦集作空帳無言語從此譙周是老集作舊臣過分水嶺前人溪水無情似有情入山三日得同行嶺頭便是分流處惜别潺湲一夜聲旅次錢塘方干此地是鄉國堪為終日集作朝夕吟雲藏吳相廟樹引越山禽潮去集作落海人散鍾遲秋寺深我來無舊識誰見寂寥心金州客舎前人卷箔雲集作羣峯暮蕭條未掩闗江流嶓冡雨㠶集作路入漢隂集作家山落葉欹眠後孤砧倚望間此情偏耐醉難遣酒罍閒東陽道中作前人百花香氣傍行人花底垂鞭日易曛野火不知寒食節穿林轉壑自燒雲蜀中前人逰子去逰多不歸春風酒味勝餘時閑來已伴巴児醉荳蔲花邉唱竹枝河陽道中李洞衝風仍躡凍提轡手頻呵得事應湏早愁人不在多雪田平入塞煙郭曲隨河翻憶江濤裏船中睡葢蓑蕃冦侵逼南陽道中前人雲陽三萬騎南赴疾飛鷹廻磧星低鴈孤城月伴僧敲闗通漢節傾府守河氷無處論邉事歸溪夜結罾途中作杜牧緑樹南陽道千峯勢逺隨碧溪風慢集作澹態芳樹雨隂姿野渡雲初暖征人袖半垂殘花不一醉行樂是何時泊秦淮前人煙籠寒水月籠沙夜泊秦淮近酒家商女不知亡國恨隔江猶唱後庭花秋浦途中前人蕭蕭山路窮秋雨淅淅江風一片蒲為問寒沙新到鴈來時還在杜陵無汴河阻風絶句前人千里長河初凍時玉琦瑶珮響參差浮生一似氷底水日夜東流人不知春盡途中前人田園不事來逰宦故國誰交爾别離獨倚闗亭還把酒一年春盡送春時自宣城赴官上京前人瀟洒江湖十過秋酒盃無日不封侯集作遲留謝公城畔溪驚夣蘇小門前栁拂頭千里雲山何處好㡬人襟韻一生休塵冠掛却知閑事終把蹉跎訪舊逰南逰泊松江渡許渾漠漠故宫地月凉風露幽鷄鳴荒戍曉鴈過古城秋楊栁北歸路蒹葭南渡舟去鄉今已逺更上望京樓洛陽道中前人洛陽多舊迹一日㡬堪愁風起林花晩月明陵樹秋興亡不可問自古水東流晚泊七里灘前人天晩日沉沉歸舟繫栁隂江村平見寺山郭逺聞砧樹宻猿聲響波澄鴈影深榮華暫時事誰識子陵心晚集作曉發鄞江渡寄韓訢集作崔韓二先輩前人南北信多岐生涯半别離地窮山盡處江泛月集作水寒時霧曉集作霧晚蒹葭重霜晴橘柚垂無勞促廻棹千里有歸集作心期曉發天井闗寄李師晦前人山在水㴞㴞流年欲二毛湘潭歸夣逺燕趙客程勞露曉紅蘭重雲晴碧樹高逢秋正多感萬里别同袍早發洛中次甘水前人帶月飯行侣西逰闗塞長晨雞鳴逺戍宿鴈起寒塘雪集作雲巻四山雪霜集作風凝千樹霜停驂一廻首隱隱見嵩陽蜀路倦行因有所感雍陶亂峯碎石金牛路過客應騎鐡馬行白日欲斜催後乗青雲何處問前程飛蝇一一皆先去度鳥雙雙亦逺鳴蹇歩不惟傷旅思此中兼見宦途情到蜀後記途中經歴前人劒峯重疊雪雲漫憶昨來時處處難大散嶺頭春足雨褒斜谷裏夏猶寒蜀門去國三千里巴路登山八十盤自到成都燒酒熟不思身更入長安昭州李商隱桂水春猶早昭州日正西虎當官渡集作路鬬猿上驛樓啼䋲爛金沙井松乾乳洞梯鄉音呼集作吁可駭仍有酒集作醉如泥商於前人商於朝雨霽歸路有秋光背塢猿收果投巖麝退香建瓴真得勢横㦸豈能當割地張儀詐謀身綺季長清渠州外月黄葉廟前霜今日㸔雲意依依入帝鄉東還前人自有仙才自不知十年長夣採華芝秋風動地黄雲暮歸去嵩陽尋舊師曉發姚鵠旅行宜早發况復是南歸月影縁山盡鍾聲隔水㣲殘星螢共失落葉鳥和飛去去渡南曉村中人出稀曉發昭應項斯行人見雪愁初作帝京逰野店開偏早鄉魂去未收燭殘催巻席手冷怕梳頭是物寒無色湯泉秪自流經無錫縣醉後吟趙嘏客過無名姓扁舟繫栁隂窮秋南國淚殘日故鄉心京洛衣塵在江湖酒病深何湏覔陶令乗醉自横琴東歸道中二首前人平生事行役今日始知非嵗月老將至江湖春未歸傳家有天爵主祭用儒衣何必勞知已無名亦息機二未明喚僮僕江上憶殘春風雨落花夜山川驅馬人星星一鏡髪草草百年身此日念前事滄洲情更親旅次商山前人役役依山水何曾似問津斷崖如避馬芳樹欲留人日夕猿鳥伴古今京路塵一枝甘已失辜負故園春集作惆悵故園春發剡中武徳中置嵊州前人正懷有謝俯長流更覧餘封識嵊州樹色老依官舎晚溪聲凉傍客衣秋南巖氣爽横郛郭天姥雲晴拂寺樓日暮不堪還上馬蓼花風起路悠悠江上絶句詩選作西江晚泊前人茫茫靄靄失西東栁浦桑村處處同戍皷一聲㠶影盡水禽飛起夕陽中度商山晩靜集作净前人和如春暖靜如秋五月商山是勝逰當晝火雲生不得一溪分作萬重流夕發邠寧寄舒從事闕半酬走白馬又𤣥集作飲酬走馬别馬戴半酣走白馬别後鎻邉城日落月未上烏棲人獨行方馳故國戀復愴長年情入夜不能息何當閑此生夜下前篇作入湘中已見一百六十四巻前人入夜别前篇作人夜到鳴棹下前篇作孤棹入嘶鴻前篇作鳴鴻行值前篇作行抵客行前人路岐長不盡客恨杳難通蘆葉晚汀雨栁花南浦風亂鍾鳴鳥一作嘶馬急殘日半㠶紅却羡漁樵侣閑歌谿谷中旅次夏州前人嘶鴻發相國行次夏王臺鎻郡雲隂暮鳴笳燒色來霜繁邉上宿鬢改磧中廻悵望湖沙曉驚蓬朔吹催夕次淮口前人天涯孤光盡木末羣鳥還夜乆逰子息月明岐路閑風生淮水上㠶落楚雲間此意竟誰見行行悲故闗早登故山作前人雲門夾峭石石路䕃長松谷響猿相應山深水復重飡霞人不見採藥客猶逢獨宿靈潭側時聞岳頂鍾江行前人吳楚半秋色渡江逢葦花雲深㠶影盡一作落風逼鴈一作鳥行斜赤燒開峯翠一作夕照開峯翠寒潮蕩一作漾浦沙余將何住海一作自將何所往孤嶠擬一作海嶠欲營家早發故園前人論别在中夜登車離故鄉曙鍾寒出岳殘月􅒯凝霜風篠條多折沙雲氣盡黄行逢海西鴈零落不成行經杭州顧非熊郡郭遶江濆人家近白雲晚濤臨檻㸔夜艣隔城聞浦轉山初盡虹斜雨未一作半分有誰知我意心緒逐鷗羣秋日陜州道中作前人孤客秋風裏驅車出陜西闗河午時路村落一聲鷄樹勢標秦逺天形到岳低誰知我名姓來往自凄凄經河中前人一望蒲城路闗河氣象雄樓臺山色裏楊栁水聲中思起懷吳客行斜向磧鴻我來尋古跡唯見舜祠一作遺風分水嶺望寶集作靈峯作薛能勞集作干尋萬仞峯靈寶號何從盛立同吾道貪程阻聖蹤嶺竒應有藥壁峭盡無松那得休於市集作是蹉跎亦卧龍初發嘉州寓題前人勞我是犍為南征又北移唯聞杜䳌夜不見海棠時在闇曾無負含靈合見集作有知州人若愛樹莫損召南詩彭門道中作前人嗚嗚吹角貳師營日落身閑笑傲行盡覺文章尊萬事却嫌官職剰雙旌終休未擬降低屈遇便還湏致太平頻向水樓誰㑹我泗濵浮磬好同聲將赴鎮過太康縣有作前人纔入東郊便太康自聽何暮豈龔黄晴村透日桑榆影晚露濕秋禾黍香十萬旌旗移巨鎮二三輗軏負孤莊時人欲識征東將㸔取攙搶落大荒褒斜道中作前人十驛襃斜到處慵眼前常似接靈蹤江遥放詩選作定入傍來水山豁猶藏向後峯鳥徑惡時應立虎畬田閑日自燒松行吟却誚公車使集作役夜發星馳半不逢雲安李羣玉灘惡黄牛吼城孤白帝秋水寒巴字急歌逈竹枝愁樹暗荆王館雲昏蜀客舟瑶姬不可見行雨在高丘旅次石頭岸張祜行行石頭岸身事兩相違舊國日邉逺故人江上稀水聲寒不盡山色暮相依惆悵未成語數行鵶又飛將之衡陽道中作前人萬里南方去孤舟泛自一作自貶身長年無愛物深話少情人醉卧襟長散閑書字不真衡陽路猶逺獨與鴈為賔江上旅泊集作江南楚塞南行乆秦城北望遥少年花已過衰病栁先彫客淚收廻日鄉心寄落潮殷勤問春鴈何處是煙霄文苑英華巻二百九十四
