body:
  text: 文苑英華巻三百二十五宋李昉等編花木五竹五十二首笋二首竹梁元帝嶰谷管新抽淇園節復脩作龍還葛水為馬向并州柯亭臨絶澗桃枝夾細流冠學芙蓉勢類作様花堪威鳯遊卭王若有獻張騫應拜侯竹劉孝先竹生荒野外捎雲起類集作聳百尋無人重類集作賞髙節徒自抱貞心恥染湘妃淚羞入上宮琴誰能制長笛當為作類集作吐龍吟竹蕭放懐風枝轉弱防露影逾濃既來丹穴鳯還作葛陂龍侍宴賦得夾池竹詩隂鏗夾池一叢竹青翠不驚寒葉醖宜城酒皮裁類詩作治薛縣冠湘川染别淚衡嶺拂仙壇欲見葳㽔色類集作凌冬質當來兎苑看賦得山中翠竹張正見脩竹映巖隈類詩作垂乗風異夾池複澗藏髙節重林隐勁枝雲生龍未上花落鳯將移莫言棲嶰谷伶倫不復吹賦得夾池竹賀修緑竹影参差㛹姢帶曲池逢秋葉不落經寒色詎移來風韵晩逕集鳯動春枝所欣髙節類聚作蹈客來待伶倫吹賦得臨池竹虞世南葱翠捎雲質垂彩映清池波泛􅅤風影流摇防露枝龍鱗漾嶰谷鳯翅拂漣漪欲識凌冬性唯有嵗寒知竹李嶠髙幹楚江濆蕭條􅅤翠氛集作娟娟􅅤暑氛白花摇鳯影青節動龍紋葉拂集作掃東南日枝捎西北雲誰知湘水上流淚獨思君奉和徐侍郎中書叢篠蔣煥一作盧象中禁夕沉沉幽篁别作林色連鷄樹近影落鳯池深為重凌霜節能虚爽一作應物心年年承雨露長對紫庭隂此詩二百四十二卷重出今已削去沈十四拾遺新竹生讀經處同諸公作王維閒居日清静修竹復集作自檀欒嫩節留餘籜新叢出舊欄細枝風響亂踈影月光寒樂府裁龍笛漁家伐釣竿何如道門裏青翠拂山壇慈姥竹李白野竹鑚集作攅石生􅅤烟映江島翠色落波深虗聲帶寒早龍吟曽未聼鳯曲吹應好不學蒲栁凋貞心常自保同郭叅謀題崔令公㕔前竹劉長卿不學媚清瀾能依上将壇䝉蘢低冕過青翠捲簾看得地移根逺經霜抱節難閒花成鳯實嫩笋長魚竿肅肅軍容静蕭蕭郡宇寛細音和角暮踈影上門寒阮巷何人在梁園幾樹殘空餘軒屛側嵗晩伴任安晩春歸山居題窗前竹劉長卿溪上殘春黄鳥稀辛夷花盡杏花飛始憐幽竹山窗下不改清隂待我歸寒竹釋皎然褭褭孤生竹獨立山中雪蒼翠摇勁風嬋娟帶寒月狂花不相似還共凌冬發竹張南史竹竹被山連谷出東南殊草木葉細枝勁霜停露宿成林處處雲抽笋年年玉天風乍起争韵池水相涵更緑却尋庾信小園中閒對數竿心自足竹戴叔倫卷籜正離披新枝復䝉宻翛翛月下聞褭褭林際出豈獨對芳菲終年色如一竹朱放青林一作竹何森然沉沉獨曙前出墻同淅瀝開户滿嬋娟籜巻初呈粉苔侵亂上錢踈中思水過深處若山連疊夜常栖露疑作鷺清朝乍有蝉砌隂迎緩䇿簷翠對欹眠迸笋雙分箭繁梢一向偏月過驚散雪風動極聞泉幽谷添詩譜髙人欲製篇蕭蕭意何限不獨住湘川池上竹楊巨源一叢婵姢色四面清泠波氣潤晩烟重光閒秋露多翠筠入踈栁清影拂圓荷嵗晏瑯玕實心期有鳯過和令狐舍人酬峰上人題山欄孤竹前人滿院氷姿粉籜殘一莖青翠近簾端離叢自欲親香火抱節何妨共嵗寒能讓繁聲任真籟觧将孤影對芳蘭范雲許訪西林寺枝葉湏和彩鳯看庭竹劉禹錫露滌鉛粉節風摇青玉枝依依似君子無地不相宜郡齋左偏栽竹百餘竿炎凉已周青翠不改而為墻垣所蔽有乖愛賞假一作暇日命去齋居之東墻由是俯臨軒階低映帷户日夕相對頗有翛然之趣令狐楚齋居栽竹北窗邊素壁新開映一作見碧鮮青藹近當行藥處緑隂深到卧帷前風驚曉葉如聞雨月過春枝似帶烟老子憶山心暫緩退公閒坐對嬋娟和宣武令狐相公郡齋對新竹劉禹錫新竹翛翛韵曉風隔窗依砌尚朦朧數間素壁初開後一片清光入座中欹枕閒看知自適含毫朗詠與誰同此君若欲長相見政事堂東有舊叢和汴州令狐相公新於郡内栽竹百竿拆壁開軒旦夕對翫偶題七言五韻白居易梁園脩竹舊傳名園集作久廢年深已集作竹不生千畝荒凉栽集作牽未得百竿青翠種新成墻開乍見重添興窗静時聞别有情烟葉䝉籠侵夜色風枝蕭索集作䬃欲秋聲更登樓望尤堪重千萬人家無一莖汴州人家並無竹題盧秘書夏日新栽竹前人湘竹初封植盧生此考槃久持霜節苦新託露根難等度雖當户集作湏當砌踈稠要滿欄買憐分薄俸栽稱作閒官葉剪藍羅碎莖抽玉琯端幾聲清淅瀝一蔟緑檀欒未夜青嵐入先秋白露漙集作團拂樓集作眉摇翡翠熨手㺯琅玕韻遶集作透窗風起隂鋪砌月殘炎天聞覺冷窄地見疑寛梢動勝摇扇枝低好挂冠碧籠烟羃羃珠灑雨珊珊曉籜晴雲展隂牙蟄虺蟠愛從抽馬䇿惜未截魚竿松韵徒頻集作煩聼桃夭不足觀梁慚當家杏䑓陋本司蘭古詩云盧家蘭室杏為梁又秘書府即蘭䑓撑撥詩人興勾牽酒客歡静連蘆簟滑凉拂葛衣單豈止銷時暑應能保嵗寒莫同凡草木一種夏中看和東川李相公慈竹十二韻元稹慈竹不外長宻比青瑶華矛攅有森束玉立無蹉跎纎粉妍膩質細瓊交翠柯亭亭霄漢近靄靄雨露多氷碧寒夜聳簫韶風晝羅烟涵朧朧影月泛鱗鱗波鸞鳯一以顧鷰雀永不過幽姿媚庭實顥氣陵集作爽天涯峻節髙轉露貞筠寒更佳託身仙壇上靈物神所呵集作何時與天籟合音閣日聞陽春歌應憐孤生者摧折成沉集作病又作卧疴郵竹庭有蕭蕭竹門有田田騎囂静本殊途因依偶同寄亭亭乍干雲褭褭亦垂地人無集作有異我心我無異人意南庭竹李紳東南舊美陵霜操五月凝隂入座寒煙惹翠梢􅅤玉露粉開春籜聳琅玕莫令戲馬童兒見試引為龍道士看湏信結根香實在鳯皇終擬下雲端題鄭常侍㕔前竹賈島緑竹臨詩酒嬋娟思不窮亂枝低積雪繁葉亞寒風蕭䬃疑泉過縈廻有逕通侵庭根出土隔壁笋成叢踈影紗窗外清音寳瑟中卷簾終日看欹枕幾秋同萬頃歌王子千竿伴阮公露光憐片片雨潤愛濛濛嶰谷蠻湖北湘川灀水東何如軒檻側蒼翠褭長空隣人自金仙觀移竹李逺新居移竹已堪看斸破莓苔得幾年圓節不教傷玉粉低枝猶礙拂霜壇墻頭引動如烟緑枕上風来送夜寒第一莫教漁父問且從蕭䬃滿朱欄昊天觀新栽竹劉得仁清風枝葉上山鳥已栖來根别古溝岸影生秋觀苔遍思諸草木唯此出塵埃恨為移君晩空庭更擬栽酬人雨後翫竹薛濤南天春雨時那鑒雪霜姿衆類亦云茂虗心寧自持多留晉賢醉早伴舜妃悲嵗後君能賞蒼蒼勁節竒題諸塘館竹集作秋日白沙館對竹許渾蕭蕭陵雪霜濃翠異三湘踈影月移壁寒聲風滿堂卷簾秋更早髙枕夜偏長忽憶南遊集作溪路萬竿今正凉題新竹方干青苔斸破植貞堅細碧竿排鬰眼鮮小鳯皇聲吹嫩葉短蛟龍尾褭輕烟節環膩色端勻粉根㧞秋光暗長鞭怪得入門肌骨冷綴風粘月滿庭前越州使院竹前人莫見凌風飄粉籜湏知礙石作盤根細看節集作枝上蟬吟處猶是笋時蟲蝕痕月送緑隂斜上砌露􅅤集作凝寒色濕遮門列仙終日逍遥地鳥雀潜來不敢喧碧鮮亭春題竹薛能竹少竹更重碧鮮彊一作猶更名有欄常凭立無逕獨穿行夕月隂何亂春風葉盡輕已聞圖畵客兼寫薛先生竹逕前人盤逕入依依旋驚幽鳥飛尋多苔色古踏碎籜聲㣲鞭節横妨户枝梢一作苖動拂衣前溪聞到處應接釣魚磯新竹前人栁營茒土倦粗材因向山家乞翠栽清露便從終夜滴好風疑自一作是故園來欄邊匠去朱猶濕培後蟲浮穴暗開他日㑹應威鳯至莫辭公府受塵埃竹鄭谷宜煙宜雪集作雨又宜風拂水藏村復間松移得蕭騷從逺寺洗來踈净見前峰幽堦蘚坼春芽迸繞徑莎㣲夏䕃濃無賴杏花多意緒數枝穿翠好相容題僧院紫竹陳陶喜遊蛟井寺復見炎州竹杳靄萬丈間嘯風清獨速江南正霜散吐秀弄顓頊似瑞驚堅貞如魔試金粟笋非孝子泣文異湘靈哭金碧誰與隣蕭森自成族新聞赤帝種子落毛人谷逺祖賜鷦鵬遺芳遍南陸對烟蘇麻醜夾澗篔簹伏羙譽動丹青瓌姿艶秦蜀因縁鹿苑識想像虵丘斸幾葉别黄毛何年依白足龍樹蟄一花砌瑶掃雲屋色静曼仙花名髙給孤獨青葱太子樹灑落觀音目法雨毎沾濡玉毫時照燭離居鸞節變住冷金顔縮豈念葛陂榮幸無祖父一作欠辱光摇水精串影送蓮花軸江霧日相尋野鶚時寄宿幽香入茶竈静翠直碁局肯羡垣上蒿自多籬下菊從來道生一况伴龜藏六棲託詎星廻檀欒已雲矗霞杯傳縹葉羽管吹紫玉久絶釣竿歌聊裁竹枝曲愧生黄金地千秋為師緑竹五首前人不厭東溪碧玉君天壇雙鳯有時聞一峰曉似朝仙處青節森森倚絳雲二萬枝朝露學瀟湘杳靄孤亭白石凉誰道乖龍不行雨春雷入地馬鞭狂三嘯入新篁一里行萬竿如甕鎻龍泓驚巢翡翠無尋處閒倚雲根刻姓名四青嵐箒疑亞思吾祖緑潤偏多憶蔡邕長聼南園風雨夜恐生鱗甲盡為龍五迸玉閒抽上釣磯翠苗番次脱霞衣山童泥乞青騘馬騎過青一作春泉掣手飛竹韓溉緑色連雲萬葉開王孫類詩作王家不厭滿庭栽凌霜盡節無人見終日虚心待鳯來誰許風流添興詠自憐瀟洒出塵埃朱門處處多閒地正好移隂覆類詩作結翠苔竹羅鄴翠葉纔分細細枝清隂猶未上堦墀蕙蘭雖許相依日桃李還應笑後時抱節不為霜霰類詩作雪改成林終與鳯凰期渭濵若更徴賢相好作漁竿繫釣絲竹崔涯領得溪風不放廻傍窗縁砌遍庭栽湏招野客為隣住看引山禽入郭來幽院獨驚秋氣早小門深向緑隂開誰憐翠色兼寒影静落茶甌與酒杯新栽竹杜荀鶴斸破莓集作蒼苔地一作色因栽十數莖窗風從此冷詩思當時清酒入杯中影碁添局上聲不同桃與李瀟洒伴書生新竹張蠙新鞭暗入庭初長兩三莖集作一莖莖不是他山少無如此地生垂梢叢上出柔葉籜間成何用髙唐峽風枝掃月明竹羅隠籬外清隂接藥欄曉風交戞碧琅玕子猷沒後知音少粉節霜筠漫嵗寒江南竹許晝江南瀟灑地本自與君宜固節還同我虗心欲待誰澗泉傍借響山木共􅅤滋粉膩蟲難篆叢踈鳥易窺盡應逄野渡中忽見村祠葉掃秋空静根横古壍危影迷寒靄裏聲出夜風時客棹深深過人家逺逺移遊邊曽結念到此數題詩莫恨成龍晩成龍㑹有期竹秦韜玉削玉森森幽思深一作清阮家髙興尚分明巻簾隂薄漏山色欹枕韵寒宜雨聲宜類詩作疑斜對酒缸偏覺好静籠碁局最多情類詩作舒情却驚九陌輪蹄外獨有溪烟數十莖笋籬笋李頎東園長新笋映石復穿籬近出依青嶂攅生伴緑池宻一作色因林向背行逐地髙卑但恐春將老青青獨爾為笋白居易此州有集作乃竹鄉春笋滿山谷山翁集作夫折盈把集作抱將来入集作抱来早市鬻物以多為賤雙錢易一束將歸安集作置之炊甑中與飯同時熟斑殻拆集作柴籜拆故錦素肌擘新玉只此一蔬飡集作每日遂加飡經旬集作時不思肉乆為京洛客此味常無集作不足速集作且食勿蜘蹰南風吹作竹文苑英華巻三百二十五
