body:
  text: 文苑英華巻四百三十四宋李昉等編徳音一宣慰徳音劉晏宣慰河南淮南制常袞勅書曰元后作人父母又曰一夫不獲則曰時集無此二字予之辜政或不平訟或不理則人受其弊氣生其灾噢咻連聲愁苦無告州縣長吏莫知省憂念兹疚懐中夜三嘆朕以不集作否徳託於人上永言理道敢不勵精然自兵亂一紀事殷四方耕夫困於軍旅蠶婦病詔令作疲於餽餉欲求無事豈可得乎致令户口减耗十無一二而河南淮南又甚諸道得非蒐乘補卒之數急賦横税之煩致使惶駭匪寜流庸不復兼亦親人之職少有政術稱者其於賦役多患不均靡室靡家皆籍其榖無衣無褐亦調其庸雖節制亷察皆務令條理而貪官冐法未絶姦源誅求無厭鰥寡重困永歎遐想過實在予廵撫之寄資於碩徳某官某相府之舊道在安人自河之南天下之半底慎財賦衣食京師久於倚任多所𢎞濟因其旋南將命攸屬所至之處宣示詔書撫將校之勤勞問黎元之疾苦事有不便法或不行委之釐革歸於允當或収集作後其征徭私有聚歛或托以貢獻公然乾没厚取於人歸怨於上虧損時化朕甚懼焉宜委某與節度觀察切加䟽理勿令寃濫以副憂勞其官吏有犯便禁身推問具状聞奏當峻刑典以息貪殘宣慰嶺南制勅理天下者先務於逺安本人情者必令其上達或刑罰不中徳信未孚則生怨咨是有申諭朕以嶺服之表方隅之大南盡百越專制萬里擇將置守常亦難之至於臨遣屢有明誡俾施惠政以恤疲人而長吏議法不平作威以逞因其猜阻䧟我忠良馮季康何如瑛等南方右族累代純臣協其義烈之心積有艱危之効惑於所譖虐用其刑無狀致辟遂生邉患朕自托人上每勞日昃法天地之生成𢎞父母之慈愛聞此濫罰惕然疚懐尋亦辯明特令昭雪如聞溪洞尚有紛擾哀我庶士勞於甲兵豈不求安良有以也所以更謀良帥先用舊徳兼御史大夫徐浩歴典中外長於撫綏素所親信俾其往緝𤣥冬之首當至彼方必能大布風化永清麾管仍命尚書比部員外郎莫藏用往嶺南宣慰問以疾苦弔其死䘮其季康等遇害之家躬自存撫切加贍恤務令得所以慰遺孤其軍州所有結聚明申中㫖懸示大信但能歸附即是平人豈唯復業安居亦當隨才命職兼至桂州宣慰應水旱所損或湏蠲免宜與觀察使商量處置勉膺朝寄以慰朕懐宣慰湖南百姓制勅震澤之南數州之地頃以水潦暴至沱潛潰溢既敗城郭復瀦原田連嵗大歉元元重困餒殍相望流庸莫返加之以師旅煩之以賦役哀我矜人何以堪命朕君臨之道猶鬱牧養之政未𢎞咎之所降諒在於此雖天災流行則有恒數而夕惕若厲豈忘責躬夫振人育物大易之明義也自漢魏已來水旱之處必遣使廵問以安集之國朝因其制焉亦命近臣慰撫俾喻求瘼之意用紓科集作將泛方勇切覆也之急宜令中散大夫給事中賀若察往湖南宣慰處置其百姓遭損不能自存者應湏賑給蠲免宜與本道觀察使商量處置訖聞奏仍齎詔書體問周恤集作躬自問恤宣示郡邑令悉朕懐宣慰魏博徳音玉堂遺範勅奉君親竭忠孝人倫之大端也賢智可一作所以盡心賞功勞懋名節國家之急務也皇王可一作所以致理朕嗣守一作朕丕業恭臨萬邦每念政之未孚化有不暨怵惕惟厲􅔔一作載勤于懐常以為育質禀靈皆思嚮善亦在甄明撫導推示信一作至誠樹績必使其光揚敷惠一作罹患必圖其安緝永言及此終食豈忘魏博大藩東夏雄屏軍戎勇於見義黎庶懐於有仁自中原始兵革之虞河朔為用武之地抱才器者或慮思一作感恩而盡力申節効者果因事而彰明時將大寜斯獲予志昨者季安薨謝其子㓜童姦邪憑依妄肆威福一境危慄懼致覆亡比屋凋傷疲於杼軸田興杖義奮發剪去憸人大安方隅屢獻忠懇達三軍奉上之志激千里望闕之誠誓遵典彛丕變舊俗忠諫指切感于朕心是用特授旌旄俾靖封略言念將士同徳叶謀守正如金石之堅凌寒挺松栢之操垂令名於不朽示臣節於將來清風載揚丹誠一作欵可鑒嘉尚歎息勞於寢興賞不踰時式示旌勸其管内百姓等身勞耕稼力竭征徭毎念于懐用當憂憫宜令司封郎中知制誥裴度往魏博宣慰親諭朕意仍賜錢一百五十萬貫以河隂院諸道合進内庫綾絹絁等支送充賞給將士及六州縣百姓科差宜給復一年使之蘇息州縣之中或有殘破偏甚者委田興逐便宜處分朕以布澤之時務從人欲好生之徳期洽衆心魏慱管内宜赦見禁囚徒其與叶心立功大將及判官等委田興具名銜聞奏當有甄升如有父母在别加優恤當道從前已來官吏將校等或忠義可嘉而刑戮濫及如有此色委田興條録聞奏當加贈如有家口見存宜厚加優䘏管内高年惸獨或天寳遺人夙沾皇化或孤獨廢疾不能自存田興差官存問仍量給粟帛管内有清勤奉職為衆所知者田興具事蹟奏聞當加進改如身在丘園行義素著或才兼文武名節可稱亦委田興具名聞奏贈太尉季安姻戚舊臣常任將相餙終之典宜示優崇其葬事委田興差官勾當禮物之間務從周厚田懐諫在疚之初政出羣小因致軍府騷然不寜以其㓜年嗚呼聳一作賚善念功惟恐不及䘏人厚下惟恐不豐庶洽雍熈遂􅐤弓矢為仁由已其道信然樹徳務滋在乎終始凡百多士宜悉朕懐一作皆唐大詔令放减徳音减徴京畿夏麥制常衮勅夏后氏五十而貢殷人七十而助周人百畝而徹其實集作税皆什一也故謂之天下中正而頌聲作矣廼者因三代之制定其税典務於行古庶以便人屬外攘四夷嵗㑹戎事軍國用度公儲匱乏役費荐至近於倍征而吏或奉法不謹失我字人之意孤惸者恣其厚歛豪富者貸以集作其輕徭動而生奸浸以流弊謂之什一其實太半致有去父母之邦甘傭保之役流離逋蕩靡室靡家或阽於死亡而莫之省每一念至良深憫惻頃亦釐革集作改從其便安量沃瘠之差寛賦歛之重今邦畿之内宿麥非稔去秋墾田又减常嵗昨者徴税其數頗多朕以萬姓不安三農將廢憂勤鬱悼中外以興思有康濟未集作庶臻其道每欲悉免量入息其重困而未解兵嚴猶資日費用蠲恒數以恤疲人其京兆府今年所率夏麥宜於七萬石内五萬石放不徴二萬石容至晩田熟後取雜色斛斗續納仍委京兆府崔昭差少尹李椅于頎等分縣廵撫必躬親宣示朝章令知朕意大歴三年六月减徴京畿丁役等制勅天下集作之所命俾朕字集作子人豈敢怠荒集作遑期於康濟勞精極慮十有四年集作載務崇省約以訓天下方其疾苦屢有蠲除公税之差僅從盍徹宫衛之備仍罷踐更兼損服御用資軍國大去煩弊以休邦畿逰食之人悉歸南畝墾田之數漸復平時神降嘉生嵗乃大熟震于珍物景福紛委盖上𤣥列聖之儲祉也豈寡昧之徳而臻此耶夙夜祗惕永懐增懼然以令有緩急物有輕重故粟輕而易散錢重而難聚古人所謂糴之至賤與貴其傷一也如聞閭閻未免告疾集作病至乃以粟數斛易錢一緡雜以他徭難以集作於償費轉用所寶念之惻然深可重惜所宜節省其京兆府諸色畨役等訪聞諸司或有徴課比縁時儉資數稍多估折集作物估皆賤不仍舊貫集作不可仍舊其掌閑彍騎三衛及橋堰丁匠等如本詔令作有司湏徴資並納錢三千米六斗其青苖地頭天下諸州每畝率錢十五頃以京師煩劇供應頗多苟從權宜遂倍其數自今已後宜准諸州例徴率朕以帝王之教人如父母之訓子所以至纎至悉必躬必親苟或便之豈憚煩也宣示百姓集作中外知朕意焉京兆府减税制勅三代之時籍而不税降及近古或至倍征承平則省於經入有事則煩於荐費亦古今之常也朕勵精憂人夙夜勤約至如王制之定集作度國用人曹之制地征必視豐穰與之上下然以邊未徹警十年於集作于兹連五兵七萃之屯有賦輿調食之重徴求横作空耗吾人所以征地之數有踰常典頃者躬自節儉勵于三軍歛從其輕以减太半今舊榖既没宿麥未登尚使餒殍相望流庸不返邦畿千里編户大殘慮集作縱有自存之人未喻詔書之意臨時科率或恐增加以兹躊躇多不墾闢行及春暮田萊益荒属膏雨霈然慮失農候故重明朝㫖更减田租盖畿内移軍所餘全少山東加運其助頗多朕又親統六師大閲戎籍事必精實自然蠲省京兆府夏麥上等每畝税六升下等每畝税四升荒田開佃者每畝税二升秋税上等每畝税五升下等每畝税三升荒田開佃者每畝税二升比集作昔者百姓不安皆因税重據其减數漸復平時頗有優當兼罷徭役加之誡勅又絶侵漁所宜鑿井畊田各勤生業自今已後必致康寜仍委京兆尹及令長分明宣示以勸集作勸之東作躬親慰撫稱朕意焉放京畿丁役及免税制勅王者承天命以養人也愛之如身豈止如子餒者食之寒者衣之猶恐仁之不至愧悼之心惻隠於内而不能已也故天下有道藏於百姓古之使人不過三日可以長孺齒可以養孤老盖太平至理之化何施而集一作臻於此乎朕承奉大業于兹八載不能恢𢎞王道被之六合雖徳之寡昧未燭於理常亦憂勤損節以濟元元豈不知乾坤以易簡成物帝王以惇儉守位從賦歛之薄省哉然時或多故事非獲已属外攘夷狄連嵗備邊兵車之㑹不下十萬餉饋耗竭邦畿大殘又郊社宗廟之祀府庫賜與之用庶事之費皆仰給焉急賦暴徴日益煩重加以水旱相乗嵗非豐一作善熟方冬之首榖已翔貴又宿豪大猾横恣侵漁致有半價倍稱分田刼假於是棄田宅鬻子孫蕩然逋散轉徙就食行者甚衆念之疚心夫安土重遷人之常性向非誅求之數豈去父母之邦哉盖以朕不敏不明鬱於教化徳之寡薄以至於斯傳曰百姓不足君孰與足書曰民非后何戴后非衆罔與守邦今縣内告病流亡不已失於撫育之道得不愧于心乎哀痛勤一作懃約一作灼明發不寐在予之情一作責懼惕良深宜有蠲除以惠貧弱其京兆府今年秋税於所徴數内减一作放十萬石百姓應納諸色物等比縁朔方軍糧輸轉勞弊又時方収歛從便省其草粟等並於中渭橋東渭橋納仍各隨當縣道路穏便如法一作湏般入苑南及於苑北面貯積及檢納等宜委中書門下與所由計㑹處置百官及府縣官職田嵗月深久多被换易縱有本主皆是蒿荒虚配户人令出苖子閭閻之内其弊至深今年宜四分徴一餘並放免其諸司諸使丁役及夫匠掌閑三衞彍騎等户多非正丁皆率貧弱頃雖减省猶慮艱辛宜委中書門下即各與本司計㑹如灼然湏役正身者具所要色目事由聞奏除此之外商量和雇并百姓先出資者並官出錢充資畿内至來年五月已來一切停差遣來年准㫖及勅并度支符應年支諸色雜物合各徴科百姓等宜據所由供數並官出錢置使依市糴三字一作和市和糴供所徴百姓宜停應供往來郵逓從來年正月至麥熟已來並官出給百姓應有欠負一物已上及諸雜夫役庸課一作調未酬納者一切容至麥熟填還所由不得輙有干擾如官典隠盜在腹内及有欠負者不在免限且風化之由繫於長吏黜陟之典所宜大明宜令御史臺切加糾察其户口有减田萊不除或流庸稍歸農畝加闢即宜具名條奏當峻刑賞庶使凋瘵之人便於蘇息憂勤之志上達神明宣示詔書令知朕意一作皆唐大詔令减淮南租庸地税制大厯七年十一月勅王者以冡宰制國用以司㑹質嵗成必視豐荒之年以均輕重詔令作賦入之數自近古以來天下郡縣亦有水旱之處則亦减其田租休其力役不急之務不便於時亦皆節省以惠窮乏上天眷命屬朕黎元敢不敬承勵於勤儉集作䘏躬自菲一作儉薄刑于一作於家邦非上薦宗廟下資師一作軍旅未嘗私於所奉更有徴求藏之於人孰謂不足廼者屢减邦賦以勸耕農而四時罔愆九扈皆叙近自闗右達于一作於海隅溥其百榖之穰寜止三年之積非朕寡徳所能臻兹盖祖宗景靈被此嘉貺仰荷殊慶兢懐益深而淮南數州獨罹災患秋夏無雨田萊卒荒閭閻艱食百賈皆震永念於此尤一作良增憮然我心憂傷終夜不寐宜有蠲貸用安流亡其淮南今年租庸地税所集作㫖支米等宜三分放二詔令有分字楊洪宣等三州作坊往以軍興是資戎器既屬嵗歉頗殘吾人徴材役工荐費尢甚惟務省約以息困窮亦宜并停宣示百姓知朕意焉自既属至意焉三十六字詔令作既属嵗時大歉慮乎人不寜居徴夫役工損費尤甚務從省約以息疲人亦宜并停朕精誠奉天誠懼臨下惟恐明有所不照聰有所不達百辟卿士咸弼予違宣示百姓令知朕意减京兆府秋税制勅頃以蕃冦猶虞王師未戢所資軍費皆出邦畿征調荐興日加煩重閭閻困竭人轉流亡念之疚懐旰食增懼近者省月更之役减嵗入之租務於惠養冀有蘇息尚聞告病終未安居深用悼懐一作愧悼更思優䘏今闗輔諸屯墾田漸廣江淮轉漕常數又加在一作計一年之儲有大半之助其於税地故可從輕其京兆府來年秋税宜分作兩等上下各半上等每畝税一斗下等每畝税六升其荒田如有能開佃者宜凖今年十月二十九日勅一切每畝税二升仍委京兆尹及令長明申詔㫖分牓鄉閭一一存撫令知朕意免京兆府税錢制勅守位聚人有賦有税所以奉宗廟之祀備水旱之災事之大經古今不易國家計其户籍俾出泉貨著在令典謂之兩税天下通制行之久矣自師旅荐興征調煩數法度多峻一作改遂廢其名近舉舊章用遵薄賦施于中外其法一也属嵗㑹戎事聚於邦畿以鰥寡孤獨之人當征徭力役之重久於供費皆至匱竭蕩然流散言念傷懐比之四方此實尤甚思其蠲貸庶令蘇息其京兆府見科差百姓今秋税錢特宜放免减京畿秋税制勅周以司㑹立經制漢以丞相校簿書兩句舊唐書作古者量其國用差其集作而立税典必以省費唐書作必於經費由之重輕公田之籍可謂通範唐書作制履畝而税斯誠弊法將期唐書作所期集作期於折中以便於時億兆不康君孰與足故愛人之體先於詔令作以博施富國之源必在均節唐書作必均節用朕自臨宸極比属艱虞唐書作艱難集作外虞亦常慕淳朴詔令作敦朴唐書作常欲闡淳朴之風守冲儉之道每念黎庶思致和平而邊事猶殷戎車屢駕軍興取給皆屬邦畿九伐之師尚勤王畧千金之費重困吾人乃者遵冉有之言守周公之制什而税一務於行古今則編户流亡墾田减耗計量入之數甚倍征之法納隍之懼當宁軫懐慮失三農憂深萬姓務從省約稍冀蠲除用申勤䘏之㫖以救惸􅄔之弊其京兆府所奏今年秋税二字唐書作合徴税八十二萬五千石斛斗數内宜即减詔令作减放一十七萬五千石委黎幹據諸縣户口地數均平放免仍分明榜示百姓令知當户所减斛斗數訖聞奏其應徴青苖地頭錢亦宜三分放一其先次永㤗元年地頭錢一十四萬九千一百四十一貫並宜放免除丁匠掌閑正畨外至來年麥熟以來府縣一切更不得輙有科税朕當躬儉節用以贍黎元中夏漸寜庶有康濟宣示百姓知朕意焉永泰二年十月减放太原及沿邊州郡税錢徳音門下朕思三五已降誰能去兵文武之道叅用為理况以寡昧獲承丕構環四海九州之大子圓首方足之多一夫之疾痛必軫其憂一士之忠勞必思其報一風一雨之愆候必申其祈一作所祝一士一役之横費必念其所來業業兢兢如即深薄雖興兵動衆非予素懐而伐罪弔人有國常憲干戈一舉飛輓是勞縁路徴輸指期調發耕夫不遑於壠畔織婦有輟於機中予之疚懐豈忘終食頃以虜騎犯塞王師戒一作戍邊今以路冦阻兵靈旗指晋一作境始無虞於塞北復有征于山東勞者未安居者寜逸一作遽擾盖不獲已且多懼焉念其徴發師徒道路供給地素貧褊物力已窮今欲及徴秋税之時宜有蠲免用布慈仁之澤冀為疲瘵之醫勉副曲恩永安生業其太原管内忻雲汾代蔚朔六州振武天徳及河中晋絳陜沿路州縣今年秋税及地頭錢宜放免河南府亦是供頓往來道路比晋絳太原即免編併其沿路畿縣及河陽汜水縣秋税地頭錢量放上供一色其合留使留州錢物各委本道觀察使具放欠額數聞奏當與商量於戯朕君臨萬方子育兆庶務將去害豈謂佳兵上天鑒予𤣥功福善佇聞掃殄共樂清平未閒之心憂愧而已凡百多士宜體朕懐㑹昌三年七月八日雨災减放税錢徳音編制門下朕恭臨寶位祗嗣丕圖勤䘏憂兢夙夜匪怠懼天下之目專專然以觀予動懼天下之耳顒顒然以聽予言何嘗發一言不遵祖宗之法制動一事不副卿士之羣心雖克已甚勞誡心無逸驅時風於朴素絶進取於争馳便於人者無不為厚於身者無不去然而惠化猶缺懲勸未行殘虜在邊尚煩饋餉一作餫狂童叛潞猶擾干戈盖不得已而用之事有違其志者顧惟寡昧慙歎方深今朝野叶心忠良同志共除氛祲日冀清平而秋雨經旬有妨収積一作刈穫雖云苖稼未害亦恐隂沴為灾慮生人之疾苦未蠲刑獄之滯寃未理勵堯舜敬天之志當夕興嗟䖍禹湯罪已之心詰朝下詔衆貧國何云富人瘠君安得肥况畿甸差科終年無已百司取給供億實多其京兆府秋税及青苖錢共放八百萬便委張賈與諸縣令同商量各據所損多少作等第减一作矜放更不用檢苖覆損煩於申奏其合徴納物仍量與寛限容待路通後輸納如聞貧人未及種麥仍委每縣量人户所要貸與種子寛限至麥熟日填納如京兆府自無種子即據數聞奏太倉給付其御史臺京兆府所有囚徒委宰臣一人與左僕射王起御史中丞李回就都省疏理如情狀可矜者便委决遣其諸州府囚徒亦委長吏親一作躬自疏理勿令寃滯於戯水旱之災陰陽定數實當菲徳合恤疲人施令布恩期於蘇息凡厥臣庶宜體朕懐㑹昌三年九月二十一日一作皆唐大詔令文苑英華巻四百三十四
