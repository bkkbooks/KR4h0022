body:
  text: 文苑英華巻一百二十八宋李昉等編逰覧二登故宜城賦一首汝州薛家竹亭賦一首出門賦一首將歸賦一首泛渭賦一首洛川晴望賦一首登呉嶽賦一首過驪山賦一首登故宜城賦丙申嵗避地襄陽見召掌節度書記陪幕府源公赴江陵作蕭頴士升彼墟兮遐眺荆江邇矚樊沔頽沲以隱嶙欹缺而㟞嵼野茫茫其靡極何人户之单尠悵青春集作陽兮始交又白日兮其集作將晩悲世事之艱阻慨征途之未返慿寒臯以盡目究林莽之深淺烟迥起於殘燎鳥群飛於絶巘曽是感時而戀舊孰不酸辛而僶俛也矧乎㝢縣乖刺闗河阻遏去枌榆兮地表離集作望骨肉兮天末涕横墮以集作臆而若注懷永痛其集作兮如割悠悠蒼天不日不月曷其有佸撫艱勤之此土偶四海集作絶而承平方神武之君臨尚未遑於戢兵警山戎之外虞重燕代之專征罄帑藏之實窮干甲之精陸隘幽冀水填滄溟集作瀛其為盛也入師長於庶僚出董率於連城冡婦降於集作乎王姬餘子超乎正卿睚眦則浹日誅夷攀附則累歲尊榮玉帛車輿鍾鼔臺亭煥赫而鏗鍧三十年中初不戒其滿盈終大都之偶國逸漏網之奔鯨潰亂集作横潰河淇䖍劉汴滎覆東洛隳陜坰抗靡堅陣守無完營呼吸三旬遂至至字集作陵慿乎上京爟燧燭於王宫潼闗為之晝扄暨而將吏逋竄烝民駭散崩騰郡邑空闃閭閈荒凉我汝潁牢落我睢渙傳置載馳於商鄧兵符薦集於淮漢彼邦畿之尹守藩牧之垣翰莫不光膺俊選踐履清貫榮利溢乎姻族繁華恣集作極其侈翫或拘囚就戮或胥附從亂曽莫愧其愚懦又奚聞於殉難甚乎昔先王之經國仗文武之二事苟兹道之不墜實經天而緯地邦家可得而理禍亂無從而至今執事者反諸而儒書是戱蒐狩鮮集作罕備忠勇翳鬱澆風集作浮横肆蕩然一變而風雅殄瘁故時平無直躬之吏世難無死節之帥其所由來者尚矣不其哀哉變之始也予旅寓於淇園初提挈而南奔崩波滑臺逼迸夷門亡車徒於鼎城集作域擯圖籍於轘轅背維嵩遵汝濆集作墳迴環乎郟葉飄泊乎穣宛嗟歲聿集作律之云暮結窮隂之涸沍市集作野蕭條以罕人盗充斥以盈路㣲奔走之僕御有啼呼之幼孺川層氷而每渉塗積雪而猶歩晝兮夜兮魯莫觧於集作于馳騖惟寢與食曷嘗忘於集作其恐懼略南鄉之左鄙凌北津之勁集作而徑渡偉夫峴首之為鎮也峻隅百雉危甍萬井森松篁之薈蔚劃􅆵街以周整前山縈依而秀㧞集作聳斜漢杳映以清逈秔稌蔗橘雜荆衡之蓄桑麻黍粟侔冀魏之境漢之盛也侈集作稱南國之冠蓋晉之衰也為北門之捍屏今方嶽之仁明惠久要於平生幸羈旅而獲宥旋載筆於戎旌陪後車乎南紀儼四牡以專征歴隤墉而訊諸乃楚鄢之遺城昔集作在漢皇之標季間諸侯之釋位聞景升之是牧歎興廢於兹地其後綏懷勁楚抗折集作衡强魏雄九域以髙視為一方之所集作大庇亦謀猷所賴而致也于時㓂盗蜂聚生民失土賢雖避世才亦擇主有卧龍之竒英集作英彦視江漢而胥宇遭劉后之側席聿疇咨於草莽若㳺魚之在集作有水尚三顧而後語其始也亦將稜威漢沔用武荆楚俟時觀釁終然義舉然後包并集作并包河洛盪滌陳汝迎帝配天不失厥序既中流之顛覆故宏筭而乖集作遂阻信關侯之忠勇亦天心之所與猶復廓卭峨之險奮賨濮之旅鋪敦隴阺震懾集作疊闗輔致中原於旰食振衰集作炎漢之遺緒洸洸乎俾千祀而景慕宜其易名於忠武不其偉歟方其躬耕漢渚獨詠梁甫輕夫管樂莫之云許伊唱髙而和寡亦惆悵於前古道不同不相為謀斯之謂矣荆雲兮蔽虧朔鴈兮差池雲有迴兮鴈有歸嗟予行兮愴遲遲諒窮愁兮莫諼雖九醖兮奚施汝州薛家竹亭賦王泠然梁疑作汝潁多士聞來久矣出伊洛以南遊登嵩峴以頋視信乎精華實息恢怪森起惟萬户與千門咸帶山而傍水畿甸殷壯閭閻密邇當天象之西郊近皇居之百里其人和而賢俊其地厚而淳美則吾先文王行化之始烈祖成王定鼎於此宜其蕃我良能誕生君子世序雖逺英靈不窮其氣渾渾其光雄雄横古今而特秀者惟我薛公卜幽棲於汝北夷疑舊業於河東夫其禮樂成器清明在躬官非一作百官稱才吾不謂之仕宦人非克己吾不謂之交通處未全隱和而莫同且欲墀岞崿苑蒙籠閒亭一所修竹一叢蕭然物外樂自其中其竹也初栽尚少未長仍小雜以喬木環為曲沼遵逺水以澆浸編長欄而䕶遶向日森森當風嫋嫋勁節迷其寒燠繁枝失其昏曉踈莖歴歴旁見人交葉重重上聞鳥其亭也溪左巖右川空地平材非難得功則易成一門四柱石礎松櫺泥含椒氣瓦覆苔青纔容小榻更設短屏後陳酒器前開藥經薛公謂予曰自造此亭未有兹客跪而應曰自從為客未見此亭既而物且遍好多能所造亭間坐卧清户開而向林門下徃來翠隂合而無草禁行路使勿伐命家僮使數掃逰子見而忘歸居人對而遺老余何為者累載棲遑學應成癖走則非狂宇宙至寛顧立錐而無地公卿未識久弹鋏而辭鄉一見竹亭之美竟嗟嘆而成章出門賦歐陽詹出門辭家兮人有志而思一作斯逞予紛然以逺逰别天性之至慈去人情之好仇嚴訓誡予以勿久指蒲桞以傷秋弱室咨予以遄歸目女蘿而起愁心眷眷以纒綿淚浪浪而共流愓懷安以敗名曽何可以少留於是驅忠信以為車執藝業以為贄越三江踰五嶺望堯旌以求試庶以程功取爵建德揚名獲甘㫖以報勤光晝錦以廻衡如弧斯張如鳥斯征射百歩而期中非一作飛三年而不鳴一作必鳴􅮠飋天寒崢嶸歲晩鵲聨翩而一作以不定蓬悠揚而自轉逮前程之尚遥顧所離而日逺事紛拏以爭校一作㧞情交戾而不和退藩籬則弱羽戀於雲路激龍門則纎鱗限乎尺波身違日日之晨昏懷戀戀而莫遣親益年年之羸老思摇摇而若何慜靈輙於困窮舉冀缺於壠畆一仁聲之永大一孝德之兹久伊錫類以拯窮豈今無而昔有爾乃循否泰而俟命㸃一作黙風塵以食一作愴艱苟䟽溟而納流願覆簣以成山路實多岐絲無定色任𤣥黄之濡染信疆理之南北管因媒而觧縳越自遇而升車虞先榮而後悴美一作姜始巻而終舒傷哉數子之稅駕吾末知其所如將歸賦歐陽詹憶求名于薄藝曽十稔以别離纔還鄉以一作之半齡又三年于路岐紅顔始一作匪長白日如馳苒苒皆盡悠悠為誰親有父母情有閨闈一作帷居唯一作雖苦饑行加相思加相思兮寧苦饑辭家千里兮欲一作心與偕歸南陔一作省之蘭北一作東山之薇一芳一菲何是何非歸去來兮秋露霑衣凢一作皆集本泛渭賦并序白居易右丞相高公之掌貢舉也予以鄉貢進士舉及第左丞相鄭公之領選部也予以書判拔萃選登科十九年天子並命二公對掌鈞軸朝野無事人物甚安明年春予為校書郎始徙家於一無此字秦中卜居於渭上上樂時和歲稔萬物得其宜下樂名遂官閒一身得其所既美二公佐清淨一作朝之理又荷二公垂特逹之遇一作恩發於嗟嘆流為詠歌于時泛舟於渭因作一作為泛渭賦以導其意詞曰亭亭華山下有人跂兮望兮愛彼三峯之白雲泛泛渭水上有舟沿兮泝兮愛此一作被百里之清流以我為太平之人兮得於斯而優逰又感陽春之氣熈熈兮樂天和而不憂曰予生之幸一作年兮時哉時哉當皇唐受命之九葉兮夷與華而無氛埃及皇帝纉位之二紀兮命髙與鄭為鹽梅二賢兮爰立四門兮大開凢讀儒書與履儒行者率充賦而西一作四來雖片藝而必收兮故不棄予之小才感再遇於知已心慙怍以徘徊登予名於太常兮一無此字署予職於蘭臺臺有蘭兮閤有芸芸芳菲一作芳菲菲兮其可襲備一官而無事又不維而不縶家去省兮百里每三旬而兩一作一入川有渭兮山有華澹悠悠兮一無此字其可賞目白雲兮潄清流且一作共或偃而或仰門去渭兮百歩長一日而三徃夜分兮扣舷天無雲兮水無煙遲遲兮明月波灔澹一作澹灔兮棹夤縁日暮兮舟泊草萋萋兮沙漠漠習習兮春風岸桞動兮渚花落發浩嘆一作歌以長引舉濁醪而緩酌春冉冉其將盡予何為乎不樂鳥樂兮雲際鳴嚶嚶兮飛裔裔魚樂兮泉底鬐撥撥兮尾潎潎我樂兮聖代心融融兮神泄泄伊萬物各得其樂者由賢聖之相契賢致聖於無為聖致賢於既濟凝為和兮聚五福發為春兮銷六沴不我後兮不我先適當我兮生之世彼鱗蟲兮與羽族咸和樂而不知惠我為人兮最靈所以愧賢相而荷聖帝樂乎樂乎浴一作汎于渭兮詠而歸聊逍遥以卒歲洛川晴望賦以願拾青紫為韻金商應律玉斗西建加旬雨之時晴叶秋成而適願是用歩閭里詢黎獻皇風演溢歌且聽於昇平聖澤汪洋誦不聞於胥怨爾乃命親懿㑹朋執賦邙山眺洛邑天泬寥而雲靜氣肅殺而風急山川浩浩以奔流雙闕峨峨而屹立飛梁徑度訝殘虹之未消翠瓦光凝驚宿雨之猶濕嘉三時之是務觀五榖之斯入覧滌塲之在勤知滯穗之見拾及夫日色黯黯寒光熒熒逺水澄碧羣山結青山水隱映花氣一作氛氲㝠疑氤瞻上陽之宫闕兮勝仙家之福庭望中嶽之林嶺兮似天台之翠屏宜其廻鑾輿兮檢玉牒朝千官兮御百靈使西賔之誇少弭東人之思攸寧不亦盛哉客有感陽舒詠樂只揮毫翰獨徙倚願得採於芻蕘終期拾乎青紫登呉嶽賦以崇巒險固永鎮西疆為韻周鍼吾嘗文戰將北羇逰極西覩呉嶽之孤峭計群山之莫齊由是邈崖谷遂攀躋入雲靄出塵泥既臻頂上用疑作明視天倪鴈塞殊小峨眉甚低蓋以氣壯神扶雄標國祚揖白帝兮不見抱皇城而自固嵐光擁翠拓開霄漢之心岫色横空鎖斷戎夷之路嵽嵲旁竦岧嶤上干碧草春含清風夏寒遥瞻魏闕逈立煙巒疑超洞府謂在天壇中隱深溪日月之光不到外連層阜龍蛇之勢斯蟠當其區宇正寧氛埃初見覽造化之宏制識乾坤之設險汧水縈盈而線走隴山峛崺而螺掩西窺劔閣霜地表之千鐔東瞰蓬萊黛波間之數㸃遐徴衆嶽式竝嶐崇彼皆受封於百代此獨不視於三公森笋立以削成寧慙太華黯雲凝而化出豈譲維嵩况乎萬仭凌虛千里倒影虎踞華裔鯨吞遐境疊巘攅壁廻巖列屏捍絶域以増隘固中原之甚永直使以禮賔九有仁服八荒臂一作嬖賢以為輔弼宅道以作封疆亦湏假我嚴衞慿我巨防邇藩垣於都邑逺隔閡於氐羌吾唐重其功業疑作崇其鎮爰升成德之號用補極天之峻小儒是以竟日興感抽毫賦韻登詠畢兮嶔岑指長安而後進過驪山賦以陵摧國殁永紀窮塵為韻徐寅六國血于秦秦皇還化塵塵驚而為楚為漢路在而今人古人但見愁雲黯惨疊嶂嶙峋時遷而金石非固地改而荆榛旋新愚聞周衰則避債登臺秦暴則焚書建國貴螻蟻於人命法豺狼於帝德兩曜昏翳九圍傾側扶桑幾里我鞭石以期通溟海幾重我驅山而要塞慘慘𤣥穹嗷嗷七雄三農百糓以休務淬鐡磨金而獻功九州病萬室空韓趙魏以文疑㓕楚燕齊而坐窮家有子兮誰得孝國有臣兮爭敢忠九野分將焉作兆民之主諸侯吞盡方行天子之風星隕九霄城長萬里血染草木肉肥蛇豕將欲手挂天刃足挑地紀拙虞舜而短唐堯汚殷辛而長夏癸禍從疑殃催川摇嶽摧金陵之王氣頓起蓬島之宫娥不來黔首求主蒼旻降災天疑漢之龍髯倐斷沙丘之鮑臭誰猜魑魅諸夏腥羶九垓於是宅彼岡巒兆斯陵闕猶驅六宫以殉葬豈言蔓草之縈骨嫌示儉於當時更窮奢於既殁融銀夜雪䟽下地之江河帖玉懸珠皎窮泉之日月嶫嶫層層不騫不崩斯髙之喉舌方滑劉項之雲雷忽一作化興軹道一朝璽獻漢家之主驪山三月火燒秦帝之陵今則草接平原煙蒙翠嶺想秦史以神竦弔秦陵而恨永華清宫觀鏁雲霓作皇唐之勝景文苑英華巻一百二十八
