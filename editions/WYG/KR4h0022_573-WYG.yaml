body:
  text: 文苑英華卷五百七十四宋李昉等編宰相讓官三代杜司徒讓平章事表一首為鄭相公讓中書侍郎平章事表一首為齊相公讓修國史表一首代人讓宰相表一首為杜相公讓河南等道元帥表一首代裴相公讓平章事表一首為集賢崔相公讓大學士表三首為蕭相公讓官表一首代杜司徒讓平章事表吕温臣某言伏奉恩制授臣檢校司徒充度支使兼鹽鐵轉運等使依前同中書門下平章事恩奬殊常授任非據承旨慶忭省躬慙惶中謝臣素無異能幸逢昌運頃因人舉累荷國恩聲績靡聞塵忝增懼陛下丕承景命光闡鴻猷理財阜人尤所注意臣竊位時久妨賢愧深柄用之地甘心自絶豈謂大明私照𤣥造曲成俾叅論道兼領經費當至化鼎新之日在微臣遲暮之年將何以上副宸衷外弭官謗負乘為盜一作寇冰炭在懷庶遵周任之言敢飾范宣之讓伏惟睿鍳俯亮愚誠特降殊私賜寢嚴命則聖朝無虚授之議微臣遂審已之宜遐邇之間孰不知勸無任懇迫屏營之至為鄭相公讓中書侍郎平章事表權德輿臣某言伏奉今日恩制授臣中書侍郎同中書門下平章事詔書自天受命惶悸俯伏循省不知所容中謝臣聞宰理中樞從古所重貞敎化之本導陰陽之和外撫四夷内循百職或乖於是則謂曠官臣志在服儒才非經遠爰自筮仕期於代耕而遭時踰量踐歴朝序自奉禁中之職累叨望外之恩超貳冬官兼司選部流品未序銓綜乖方以榮為憂伏待譴責豈謂特延睿渥叅列廟謀以瓶筲之資當柱石之重况臣自去夏尚守臺郎周月之間遂懸相印承陛下厲精之切副陛下則哲之明循量省躬必知不可伏乞俯廻詔命别選公才敢瀝血誠上黷天鍳無任惶懼懇迫之至謹奉表陳讓以聞貞元十四年七月二十五日為齊相公讓修國史表前人臣某言臣去月九日於延英對陛下勤求理本語及史官遂命崔損承旨令臣兼修國史臣省已無取受恩殊常蒼黄震驚未及陳露今日中使某乞奉宣進止授臣此職竊自思忖非所克堪感戴屏營不知所據伏以褒貶善否裁成義類直辭是繫往哲攸難臣謬踐台司無補皇化每憂覆敗上負聰明豈足以再紆宸慈累忝榮渥稽前古之彛訓昭聖朝集作明聖朝一作聖明之法誡立言載筆豈易其人量力循涯自知不可又自貞元四年李泌後宰臣遂不兼此職蓋以論著慎重留於聖心自非時謂全才何以遠循故事用此内省以榮為憂況君舉必書時同堯舜之理任人以器顧無遷固之能所覬殊私特寢成命無任感恩惶懼之至貞元十八年五月十八日代人讓宰相表白居易為徽之作臣某言伏奉今日制書授臣某官同中書門下平章事者寵擢非次憂惶失圖蹐地跼天不知所措臣某誠兢誠惕頓首頓首臣聞上理陰陽下平法度外撫夷狄内親黎元使百官各修其職一物不失其所此宰相之任也臣有何功德有何才能越次超倫忽承此命下乖人望上紊朝經致冦速尤無甚於此臣謬因文學忝列班行先朝乏人擢居内職星霜屢改爵秩驟加未逾十年忽登相位名浮於實任過其才豈唯覆餗是憂實累知人之鍳况陛下肇開厯政將致升平輔弼之臣尤宜愼擇臣粗知古今敢言本末若樞衡要地初不得人則理化勞心終無成日此所以重陳手疏再瀝血誠乞廻此官别授能者臣若得其請便不負恩情見於辭非敢飾讓皇天白日實鍳臣心無任懇欵屏營之至謹奉表陳讓以聞為杜相公讓河南等道元帥表一首常衮此篇見五百七十六卷代裴相公讓平章事表杜牧臣某言臣伏奉今月日制書除臣某官同中書門下平章事者祗奉成命進退失圖捧詔兢惶銜恩戰慄臣誠惶誠恐頓首頓首臣本書生仕逢聖代掌綸言於西掖作藩守於名邦自顧才能已是踰越陛下奬遇不次㧞擢過分春闈典貢地官掌財咸無政能粗免愆闕及擢為莞榷累受寵榮雖竭盡疲駑欲禆萬一而才疎智拙不効涓塵夫宰相之任前賢有言如涉川有舟如幽室有燭代天理物為人具瞻豈伊小臣而膺大任今朝廷髦雋並集集作髦俊並作名德森然或多歴庶官或皆有功實或四方屏翰或已著勲勞舉而用之無不可者如臣凡淺豈宜委任伏乞俯廻天鍳更擇時賢必能丹青帝圖金玊王度使微臣無尸位集作祿之誚聖王有得賢之名非唯微臣獲安實亦天下幸甚無任悃懇血誠之至為集賢崔相公讓大學士表錢珝臣某言臣昨奉恩命加臣某官者非常之澤禀命實難今月某日已奉表讓訖伏慮聖慈所注宸旨未廻累足屏躬自逃無地遂敢再傾肝膈仰告睿明臣雖至愚非敢飾讓一則副陛下用臣之公道保陛下知臣之遠圖一則惜朝廷之典章重朝廷之爵秩永惟矜鍳在我聰明伏以顯賞之恩殊勲是稱凡施君命必合國章昨者逆將興妖急兵一作稱構變災匪同於天作患實過於主憂咎在輔臣理當昭憲但臣久罹强刼莫扈出居走間道以獲歸乃王靈之所被免致陷身之禍得陳拜首之容伏蒙陛下特閔驚危盡寛罪戾收雷不振就日復安尚處弼諧空知慙感至於遽停輦輅近駐郊圻廟貌不遙園陵可望是陛下孝通祖考所以不遠京師也又能庇茅茨抵臨草莽潛施英畧使殄逆徒坐待梟夷風行號令然後决乘輿之反正慰父老之怨思謀夫自多睿志先定是陛下精感社稷所以不移節序重啓昌期咸資聖斷臣將何力可助𤣥功比者殊渥遽臨莫知所以為賞之僭懼及淫人春秋正言國家大事聖朝行之則有損微臣受之則無名且臣叨荷休明貴為宰物兢兢守道尚懼僭尤汲汲經邦未能報効今伐叛之地實非近藩虜馬方飲於渭川戎帳頗施於秦甸農商半收貢賦鮮通中外未安宵旰多慮凡􅂷恩澤先布瘡痍次及勲功方為闕元和聖武乃顧淮西宰臣裴度總統全師削平宿寇勤勞忠烈史䇿昭煥獻㨗還都書勲行賞持衡之地但加金紫之階詎是憲皇之恩澤不深裴度之勲名不盛此乃愛重彛憲保持大臣遂令賞薄於功欲使衆稱其美列祖遺法陛下聿修在臣感恩欲增聖德中書故事常欲兼官雖當叙進之間亦在歲時稍久錫之有度拜者則安臣又非宜朝將何論奠食之命令典俱存求而論之斯事非細軍儲方困公聚正虚郡國凋殘乃陛下殷憂之本臣僚艱窘是陛下軫䘏之秋而宰臣獨以膏腴贍其封邑人情頗惑事理不通承命以來連宵審度粗能祗荷皆欲寵光何敢進犯天顔尚煩俯察誠憂赫怒其可苟安不言則負任使之恩有讓則違奬擢之旨有違無負明主必容情激辭多憂緣寵過伏乞特廻霈澤且使燮調息致寇之危疑合興邦之理道臣某無任死請迫切懇悃之至第二表前人臣某言臣昨蒙聖恩加臣某官實封等瀝誠雖切天鍳未回今月某日又奉宣命賜臣持危匡國致理功臣者寵光踰溢俯僂驚惶昨已奉表陳讓訖恩出一時事非常典衆方興論内不自容是以伏紙寫心累干睿鍳未蒙俞允匪獨驚危朝省夕思且涕且激臣腐材弱質叨列公台何施尊主之能未立為臣之節而艱難之後陛下待遇愈優食必分甘言皆動色𢎞慈厚禮前代所無比及今兹適當反正斷一作頓自不疑之旨遽行非次之恩則臣竊驚孤心兼量愚分仰酬萬一且合如何至使堅讓未休蓋亦深知不可上惟聖德恐有失中受詔之難血誠在此陛下以歸復之慶謂臣有參贊之功嘉謀既出於𤣥機勝畧必資於英决恭惟茂實前已備論上聖推不宰之心而具臣乏可書之績則甄賞之命遵行及私唯增鄉校之言兼致匈奴之笑否臧足驗損益可知况臣在中書又殊同列彥若與博執政在臣之先或累歲燮和或踰年鎮撫弼違斯切成效固彰臣自再忝秉鈞初當變律未調鼎餗徒辱車茵遂罹向闕之兵莫救燎原之火至于今日無補立朝寵奬重恩臣實非稱伏以奠食之命雖著舊章蓋上將平戎大勲卓立超酬特賞始可勝任行於文臣此事固少况在今日不並往時天下編氓殆無膏血筋力盡疲於戰伐經營多廢於耕桑所在聚兵肆為厚斂不免者痛侵刳剥可免者患至流亡鄉敝家殘不勝條説寧於此際更可重傷兼計百户之封歲當五百餘萬軍儲常廢國用急須以此校之所濟非少今陛下焦勞睿算臣等涸竭智謀蓋為朝廷日憂匱乏曷若廻非宜之恩命救急務於公家聖慮既寛臣心自泰生人不加於怨苦經費自濟於艱危𢎞陛下為國之資伸微臣代天之極幸以是竊度實敢固違加臣之名本加疑武將伏自先帝興復之後宰臣特授殊恩且類權宜何光定制况臣執政為日未多安可輙冐憲章當此多數伏自陛下光承丕搆實耀英謀如秦權黃鎬之凶徒及近歲逋誅之大寇載揚我武克致明刑此外凡有兇渠未嘗漏網聖功神畧可謂赫然去年公卿等合彼兆庶之心遂有鴻名之請封章四上伏奏累陳陛下以時未戢兵人多言病不循令典不顧羣情久執至謙畢奪衆懇作聖有歸於公堂上言敢犯於聖明夫元首股肱闕陛下讓懿號於去年臣則受鉅名於今日闕不同一體之榮與之則臣蒙姑息之愛矧於事實未合便宜近者國之名器多假諸侯法度久踰改張何暇宰臣謹畏再務率先尚慮驕矜不能儆戒陛下若於朝廷未安之際藩方難一作臨制之時忽使輔臣併加殊事則勲侯戎帥越例貪求中書自思無以奏奪空煩聖慮益壞政經是因今日之恩復作他時之患諒非細故得不極言累陳切讓之辭庶獲洞開之鍳上祈聖哲備識愚衷寵渥未收憂心如灼生惟富貴誰無崇盛之謀禍在滿盈臣有顛危之懼方承任使必覬哀矜伏乞聖慈速降明詔允許臣某無任瀝血輸懷祈恩俟命激切惴悸之至謹奉表陳讓以聞第三表臣某言臣叨膺殊渥特越常倫一縷千鈞非能比重累棊加卵何足為危是以繼獻封章靣陳肝血宸衷益注寵數不移未允愚私如中狂疾伏以皇帝陛下恢張天覆優遇宰衡流澤而唯恐不深錫爵而惟恐不重欲行君德更邁古皇茂典畢申睿慈未足内惟感激旁有神明則臣報効之端合識安危之道臣昨者辭讓繼具鋪陳不敢更俟煩文上干聖覽但以陛下大崇儒術多悅羣書經誥之間講論尤切察臣子去就之分考生人禍福之源固以精辯否臧盡詳炯戒今臣之懇激尚敢披陳夫貴而知懼者春秋所書祿不期侈者尚書之訓苟忘斯論何以全身况臣之年歲當丙子四十强仕血氣方剛求之族類之間初在簪裾之列而臣亨逢廣運夙忝重官爰自前年已居台輔至于今日復列鼎司享於極位之中處在羣寮之上潛憂弔者已在臣門凡有寵光每宜畏避則官無厚謗天祐微躬上可以永保陛下之恩次可以善守先臣之嗣是非之際物理甚明如或終自昏迷仍貪寵利害盈之罰更在何人太盛之災不到他日今陛下以崇名重器豐祿殊榮併壓臣身必速天咎倘此期未至尚或苟容而焚灼常苦於寸心芒刺日加於四體精神紛擾疾疹交侵便至乞骸何能充位雖臣欲陳綿力粗補萬㡬更䇿懦才何康庶政固無門於立效徒抱恨以自尤且臣在同列之間擢用最近等衰之制輕重有宜今臣所蒙制命授集賢殿大學士序遷彛典寵飾新恩難有固違謹當祗受其功臣名號官階爵賞實封等深思僭溢必致邅災敢激飾讓之名願擇常存之福且將勤勵獲佐盛明直露情私寜欺君父伏乞聖慈終賜矜允臣某無任迫切泣請恐悸之至為蕭相公讓官表元稹臣某言伏奉今日制書授臣某官者恩加望外寵過憂深魂魄驚翔手足失墜臣某中謝臣猥以凡材謬居重任當陛下維新之始辱陛下爰立之恩有累樞衡無裨衮職外致匈奴之哂内失蒼生之心推換炎凉因循德澤妨塞賢路塵忝台階自顧疲驂方求息駕豈謂陛下特迂神鑒曲盼凡材集作曲用朽材再生集作提腹背之毛重委股肱之地大辜集作孤人望猶簡帝心雖君父深恩莫知其惡而駑駘力竭何以自安豈敢退而生光集作全實願求其死所伏望再移天眷重選時英特廻加膝之恩别受沃心之相全陛下始終之道成微臣生死之榮無任懇迫慚懼之至文苑英華卷五百七十四
