body:
  text: 文苑英華巻六百三十四宋李昉等編謝恩七謝賜宅狀二首謝賜内園花藥狀一首謝賜氷狀一首謝賜弓箭狀一首謝為宰相賜吐蕃信物狀一首讓勑賜蕃口狀一首謝賜毯價絹狀一首謝賜尺詩狀一首謝賜撰鄭夫人碑羅絹狀一首謝賜宣行哀冊文狀一首謝令撰田𢎞正碑文狀一首謝許受韋丹送撰碑綵絹狀一首集賢謝示道經狀一首謝御書大通禪師碑額狀一首謝賜寺額狀三首為五臺僧謝賜袈裟狀二首為薛岌謝賜宅狀于邵右件宅先賜臣亡弟嵩比縁空閑臣遂權住某月日中使某至奉宣進止轉以賜臣并勑所司改給公驗臣素空行藝久遭扞脇疑作汗脇陛下特存要領更齒班榮以非常之恩以超等之賜自典環列職在警廵歲月徒深㳙塵罕録豈謂叨承後命曲被殊私賜以廕庇之地永為子孫之業生輕施重内省知慙捐軀報徳實臣志願無任感戴代謝賜未崇宅并賜酒食錦綵器物等狀右今日中使某至伏奉恩㫖令臣移入所賜宅并賜前件者慈㫖曲䧏驚抃難容臣以㣲生幸逢休運上公政本既荷殊私治第頒田特超恒數且居爽塏又賜歡娯芳膳出於天厨喜疑作嘉賔傾於朝彦金石諧座珍竒爛庭况棟宇輪囷近加朽塓林塘秘邃潜蓄清涼素以衡茅特驚𢎞敞周履既増於魂悸眄睞殊覺於心慙臣實何人遘兹多幸飲恩知愧受賜輕生誓将灰粉百身償國家之恩遇拂磨一劒弭一作殄兇醜於邉疆區區寸誠仰答萬一不任戴荷之至謝内園果栽并令府縣供花藥狀疑是代郭子儀作右臣得男曜狀稱伏奉聖㫖縁臣莊栽蒔賜内園果樹又令府縣與竹及同栽花藥等今月十日仍令開府魚朝恩已下到莊檢校者謬承大眷累沐恩私事有至㣲亦關聖慮顧唯别業封植未成特降明命賜臣甘木移根上苑擢秀中園發輝池館之勝實荷生成之力侍臣中貴接武員來虚落生光里閭増慶况内園所賜品類已多府縣更供竊憂煩擾在臣諸已先有不敢重此勞人望停府縣所供曲遂㣲臣至願無任云云謝賜氷狀白居易右今日奉宣聖㫖賜臣等氷者伏以頒氷之儀朝廷盛典以其非常之物用表特異之恩况春羔之薦時始因風出當夏蟲之疑日忽自天來煩暑迎銷清集作凉颷隨至受此殊賜臣何以堪欣駭慙惶若無所措但飲之慄慄常傾受命之心捧之兢兢永懐履薄之戒以斯惕勵用答皇恩集作兹謹奉狀陳謝以聞代人作昭應獵謝賜弓箭狀于邵右中使某至伏䝉賜前件弓箭跪捧殊私抃躍無地伏以彤弓出韔利鏃離方月滿星流皆承御物摧剛服猛便假天威慙無矯控之能庶盡追擒之狀無任云云為宰相臣謝恩賜吐蕃信物銀器錦綵等狀白居易右臣等才愧庸虚職叨輔弼遇天下削平之日當西戎即叙之時遂使殊方致兹逺物此皆率由𤣥化感慕皇風人臣既絶外交問遺敢為集作言已有今䝉重賜益荷聖慈况來自外夷知徳廣之所及降從中㫖仰恩深而不勝感戴悚惶倍萬恒品讓勑賜蕃口狀此是讓狀英華誤編于此張九齡右高力士宣聖恩賜臣等蕃口執訊自邉釋囚為𨽻誠宜供國次及賞功臣等無庸以何集作何以受賜殊恩俯逮集作降循涯自失伏望俯停渥澤存以至公矜遂懇誠許歸官寺則上有無偏之道下無苟得之責無任悃欵之至謝賜毯價絹狀令狐楚右監軍使李輔光廻奉宣恩㫖賜臣前件絹者臣當道比年未豐經費不足懼乏供億慙無智能陛下散燭幽之光垂逮下之徳絲綸既出縑帛員來數至累千價盈巨萬廣狹中量鮮明如氷足以贍三軍之賜予充百工之餼廪捧受欣抃不知所裁無任云云謝賜尺詩狀張九齡右今日高力士宣勑賜臣等御製詩并寳尺伏以尺者紀度之數宜麗天文詩者律吕之和是生節物聖恩下逮天㫖旁流因物寓言以言垂象臣雖􅎩陋伏見宸􅇆竊謝良工徒秉刀尺終期死力取配鈞衡而未副所圖退省知罪臣等不勝負荷感懼之至謝賜撰鄭國夫人碑羅絹狀張說右内侍尹鳯祥宣口勑得所進鬬羊表及鄭國夫人碑令賜卿綵羅二十疋絹一千疋鬬羊薄伎恩感戰士之心雕蟲陋詞媿稱賢母之徳効輕賞重戴厚慙深臣子之情豈望天報謝宣行哀冊文狀令狐楚右臣先凖勑撰成封進訖奉某月日勑㫖敬依典禮不任號慕者伏以範天地之大者難為狀鐫金石之堅者難為工况先皇之武烈文明逈超前古而㣲臣之􅎩言懵學不及中人顧惟庸虚謬獲紀述叨䝉恩奨特賜宣行竊文士之名誠有慙色彰聖人之徳實荷經綸云云謝凖朱書撰田𢎞正碑文狀元稹魏博節度使李愬請與田𢎞正立徳政碑右臣伏凖集作奉今月二十四日勑令臣撰前件碑文伏以田𢎞正首變魏俗彰先帝之睿謀近入鎮州宣陛下之神武積成忠懇大有勲勞人懐去思願刻金石陛下所宜外詔台席内委翰林妙選雄文式揚丕績豈謂天光曲照御札特書猥付㣲臣實非常例且臣頃以特恩㧞擢便欲効死仰酧遂竭愚誠累䝉召對自去年九月以後横遭謗毁無由集作因再覩天顔分隨枯朽而凋永絶恩波之望豈料聖慈長在記憶姓名無人奏請撰碑便自宸衷宣付㣲臣忝非木石粗有肺腸集作肝空懐感激集作涕之心未獲殺身之所無任感恩思報鏤骨銘肌之至謝許受江西送撰韋丹碑綵絹等狀杜牧右今月十六集作九日中某至奉宣聖㫖令臣領受江西觀察使訖千衆所寄撰韋丹遺愛碑文人事綵絹共三百疋恩隨幸至榮與利并抃躍慙惶罔知所措伏惟皇帝陛下皇天縱聖赫日資明大奨功勞不計存殁舉韋丹江西之績特令㣲臣撰碑墮淚之恩豈慙羊祜黄絹之妙實媿蔡邕今者更䝉恩私廣受綵帛捧戴兢惕無地容身不勝感恩慙惶之至集賢院謝示道經狀張說右臣伏見聖札金字八分冩道經兩巻以為惠文太子三七追福天毫發彩宸翰騰輝色麗風雲光逾日月伏惟陛下孝悌之至通於神明俯念天倫用資幽賛當兹炎暑服此勤勞事絶古今感深名教臣忝司舊職載考前王未有親親之至楷𨽻之美如此之備也足以作則貽範垂之無窮伏望宣付史館以光典䇿無任誠懇慙惶之至謝賜御書大通禪師碑額狀右内侍尹鳯祥宣示御書大通禪師碑額六字畫起平雲㸃蹲芒玉戈茅攅倚鸞鶴交飛神功發於至想睿思成於𤣥徳實謂天龍捧持虚空稱賛逝者如在荐福知歸臣栖志禪門撰碑靈塔幸遇聖情崇道天書假貸刻星辰於嘉石爛日月於封丘感極悲生恩深無答臣無任望外殊澤之至謝賜天寳寺額狀釋嗣安右臣㑹覺等言臣聞皇天以平分四時聖人以亭育萬物僧等何幸頓沐殊私但以王者封畿乃稱鄠杜之邑諸候近甸是惟酆鎬之濵頃者靈符發兆聖號輝煥百神慶答萬國惟新不謂惠澤旁流降仙毫之瑞札宸慈下被賜天寳之嘉名普潤緇黄齊霑寺觀而魚龍起伏來從日月之宫束帛戔戔更賁金繩之界䨇林戴色绀苑増榮臣等不勝抃躍之至謝賜貞元寺額狀崔行先潞府羅城南面臣故使李抱真先用料錢脩置山亭并改造立五龍神院等右臣昨奏前件亭子及五龍院等伏望天恩賜額為寺於當府抽有道行僧二十七人住持脩理為國崇福者伏奉勑㫖允臣所奏賜額為貞元寺者特沐殊私俯遂愚懇採實厯之二字開浮域之一名演皇刼無窮之期示蒼生廻向之路莫大之福實在於斯且上黨古郡先皇舊藩星辰曽降於謳謡符瑞見存於圖諜昔為盤石之地新作布金之園廣梵宇於城中資聖祚於天上闔境臣庶歡抃難勝臣忝列藩維戴荷何極謝賜僧尼告身并華嚴院額狀令狐楚右中使王進卿至奉宣恩㫖賜臣前件僧尼告身并院額等臣伏以有為功徳莫大於化人無上菩提亦先於奉國臣以前因慶誕輙貢敷陳期降福於上天庶効祥於今古伏䝉陛下用至真之印轉不退之輪寵錫僧名榮頒院額仰窺金榜跪捧瑶緘龍翥四維鸞廻三㸃憑大悲之力便至道塲承上聖之仁必成菩薩光生十地歡動一方荷天眼之昭一作照明願法身之清淨所守有限不獲陳謝無任欣戴之至為五臺山僧謝賜袈裟等二首令狐楚右中使蘇明俊至奉宣聖㫖賜臣巾襪香茶念珠袈裟等伏以推恩之義法雨露而必均受施之深一作心戴丘山而不墜伏惟皇帝陛下為人心印得佛髻珠垂衣于空寂之門倒屣於清涼之境每因令月常降信臣輦珍寳於九天散芳馨于十地巾裁吳紵靡不輕盈帔衲齊紈無非麗宻臣某等名非長者跡在凡夫既結襪以經行又焚香而宴坐啜楚山之新茗煩惱頓除持越海之名珠聖賢可數而煎和百品週遍萬僧覩奕葉以重光知分畦而疊慶豈大雄慈悲之力盡上帝福徳之田誓當潔已禱天䖍誠報國以無疆為聖夀以常樂為昌期長承覆䕶之仁永助清平之理限以脩習不獲匍匐陳謝無任感戴之至同前右中使蘇明俊至奉宣聖㫖賜前件袈裟蓮子念珠等物均散五臺山諸寺伏以稻畦可製降自九天蓮菂親規生於八水或光浮眼界或香滿鼻根豈意凡夫今䝉寵錫山積於樓臺之下無不装嚴雲散于林嶺之中悉皆週遍咸承覆露孰不欣榮誓将傳印之功以助垂衣之慶謹並凖勑分散訖無任感戴之至文苑英華巻六百三十四
