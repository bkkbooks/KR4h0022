body:
  text: 文苑英華巻三百六十五宋李昉等編辯論三復性書三篇君子無榮辱解一首知道一首復性書上篇李翺人之所以為聖人者性也人之所以惑其性者情也喜怒哀懼愛惡欲七者皆情之所為也情既昏性斯匿矣非性之過也七者循環而交來故性不能充文粹作統也水之渾也其流不清火之煙也其光不明非水火清明之過沙不渾流斯清矣煙不欎光斯明矣情不作性斯充文粹作統矣性與情不相先也雖然無性則情無所生矣是情由性而生情不自情因性而情性不自性由情以明性者天之命也聖人得之而不惑者也情者性之動也百姓溺之而不能知其本者也聖人豈其無情也集作耶聖人者寂然不動不徃而到不言而神不耀而光制作叅乎天地變化合乎隂陽雖有情也未嘗有情也然則百姓者豈其無性耶百姓之性與聖人之性弗差也雖然情之所昏交相攻伐未始有窮故雖終身而不自覩其性焉火之潜于山石林木之中非不火也江河淮濟之未流而潛于山非不泉也石弗集作不􅃻木不磨則不能燒其山林而燥萬物泉之源弗䟽則弗集作不能為江為河為淮為濟東匯大壑浩浩蕩蕩為弗測之深情之動弗息則弗能復其性而燭天地為不極之明故聖人者人之先覺者也覺則明否則惑惑則昏明與昏謂之不同明與昏性本無有則同與不同二皆離矣夫明者所以對昏昏既滅則明亦不立矣是故誠者聖人之性集作性之也寂然不動廣大清明照乎天地感而遂通天下之故行止語黙無不處于極也復其性者賢人循之而不已者也不已則能歸其源矣易曰夫聖人者與天地合其徳日月合其明四時合其序鬼神合其吉㓙先天而天弗違後天而奉天時天且弗違而况于人乎况于鬼神乎此非自外得者也能盡其性而已矣子思曰唯天下至誠為能盡其性能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以賛天地之化育可以賛天地之化育則可以與天地參矣其次致曲曲能有誠誠則形形則著著則明明則動動則變變則化惟天下至誠為能化聖人知人之性之皆善可以循之不息而至于聖也故制禮以節之作樂以和之安于仁集作安于和樂樂之本也動其中集作動而中禮禮之本也故在車則聞和鸞之聲行歩則聞珮玉之音無故不廢琴瑟視聼言行循禮法而動所以教人忘嗜欲而歸性命之道也道者至誠而不息也至誠而不息則虗虗而不息則明明而不息則照一疊照字天地而無遺非他也此盡性命之道也哀哉人人皆可以及于集作乎此莫之止而不為也不亦惑耶昔者聖人以集作之字傳于顔子顔子得之拳拳不失不逺而復其心三月不違仁子曰回也其庶乎屢空其所以未到于聖人者一息耳非力不能也短命而死故也其餘升堂者盖皆傳也一氣之所飬一雨之所膏而得之者各有淺深不必均也子路之死也石乞盂黶以戈擊之㫁纓子路曰君子死冠不免結纓而死由集有也字非好勇而無懼也其心寂然不動故也曽子之死也曰吾何求焉吾得正而斃焉斯已矣此正性命之言也子思仲尼之孫得其祖之道述中庸四十七篇以傳于軻軻曰我四十不動心軻之門人逹者公孫丑萬章之徒盖傳之矣遭秦焚集作滅書中庸之弗焚者僅有集作一篇存焉于是此道廢缺其教授者唯節文章句集作節行文章章句威儀擊劔之術相師焉性命之源則吾弗能知其所傳矣道之極于剥也必復吾豈復之時耶吾自六嵗讀書但為詞句之學志于道者四年矣與人言之未嘗有是我者也南觀濤江入于越而吾郡陸参集作傪存焉與之言之陸参集作傪曰子之言尼父之心也東方集有如字有聖人焉不出乎此也南方集有如字有聖人焉亦不出乎此也唯子行之不息而已矣嗚呼性命之書雖存學者莫能明是故皆入于荘列老釋不知者謂夫子之徒不足以窮性命于集作之道信之者皆是也有問于我我以告之所知而傳焉遂書于書以開誠明之源而缺絶廢棄不揚之道幾可以傳于時命曰復命書以治集作理乎其心以傳乎其人於戯夫子復生不廢吾言矣復性書中篇或問曰人之昏也久矣将復其性者必有漸也敢問其方曰弗慮弗思情則不生情既不生乃為正思正思者無慮無思也易曰天下何思何慮又曰閑邪存其誠詩曰思無邪曰已矣乎曰未也此齋戒其心者也猶未離于静焉有静必集有有字動有動必集有有字静動静不息是乃情也易曰吉㓙悔吝生乎動者也焉能復其性耶曰如之何曰方静之時知心無思者是齋戒也知本無有思動静皆離寂然不動者是至誠也中庸曰誠則明矣易曰天下之動貞于一者也問曰不思不慮之時物格于外情應于内如之何而可止也以情止情其可乎曰情者性之邪也知其為邪本無其心寂然不已四字集作心寂不取邪思自息惟性明照邪何所生如以情止情是乃大情也情之集作互相止其有已乎易曰顔氏之子其殆庻幾乎有不善未嘗不知知之未嘗復行也易曰不逺復無祗悔元吉問曰本無有思動静皆離然則聲之來也其不聞乎物之形也其不見乎曰不覩不聞是非人也視聴昭昭而不起于見聞者斯可矣無不知也無弗為也其心寂然光照天地是誠之明也大學曰致知在格物易曰無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與于此曰敢問致知在格物者何謂也曰物者萬物也格者來也至也物至之時其心昭昭然明辨焉而不應于物者是致知也是知之至也知至故意誠意誠故心正心正故身脩身脩而家齊家齊而國理國理而天下平此所以能参天地者也易曰與天地相似故不違智周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神無方而易無體一隂一陽之謂道此之謂也曰生為我說中庸曰不出乎前矣曰我未明也敢問何謂天命之謂性曰人生而静天之性也性者天之命也率性之謂道曰集無此字何謂也率循也循其源而反其性者道也道也者至誠也至誠者天之道也誠者定也不動也脩集作修道之謂教曰何謂也曰教也集作誠之者人之道也誠之者擇善而固執之者也循集作修是道而歸其本者明也教也者則可以教天下矣顔子其人也道也者不可湏㬰離也可離非道也説者曰其心不可湏㬰動焉故也動則逺矣非道矣集作也變化無方未始離于不動故也是故君子戒慎乎其所不睹恐懼乎其所不聞莫見乎隱莫顯乎㣲故君子慎其獨也説者曰不覩之覩見莫大焉不聞之聞聞莫甚焉其心不集作一動是不覩之覩弗聞之聞也其復之不逺矣故慎其獨慎其獨者守其中也問曰昔之注解中庸者與生之言皆不同何也曰彼以事解者也我以心通者也曰彼亦通于心乎曰吾不知也曰如生之言修之一日則可以至于聖人乎曰十年擾之一日止之而求至焉是孟子所謂以一杯水而救一車薪之火也甚哉止而不息必誠誠而不息必明明與誠終歳不違則能終身矣造次必于是顛沛必於是則可以希于至矣故中庸曰至誠無息不息則乆乆則徴徴則悠逺悠逺則博厚博厚則高明博厚所以載物也高明所以覆物也悠久所以成物也博厚配地高明配天悠久無彊如此者不見而章不動而變無為而成天地之道集有故字可一言而盡集有之字也問曰凡人之性猶聖人之性歟曰桀紂之性猶堯舜之性也其所以不覩其性者嗜欲好惡之所昏也非性之罪也曰為不善者非性耶曰非也乃情所為也情有善而集無此字不善集有而字性無善而集無此字不善焉孟子曰人無有不善水無有不下夫水搏而躍之可使過顙激而行之可使在山是豈水之性哉其所以導引之者然也人之性皆善其不善亦猶是也問曰堯舜豈不有情耶曰聖人至誠而已矣堯舜之舉十六相非喜也流共工放驩兠殛鯀竄三苖非怒也中于節而已矣其所以皆中節者設教于集作於天下故也易曰知變化之道者其知神之所為乎中庸曰喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之逹道也致中和天地位焉萬物育焉易曰唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至聖人之謂也問曰人之性猶聖人之性嗜欲愛惡之心何由而生也曰情者妄也邪也曰邪與妄則無所因矣妄情滅息本性清明周流六虚所以謂之能復其性也易曰乾道變化各正性命又集作論語曰朝聞道夕死可矣能正性命故也問曰情之所昏性則文粹作即滅也何以謂之猶聖人之性也曰水之性清激其文粹作而渾之者泥沙也方其渾也清性既遂無有耶久而不動泥沙自沉清明之性鍳于集作於天地非自外來也故其渾也性本不失及其復也性亦不生人之性亦猶水之性也問曰人之性本皆善而邪情昏焉敢問聖人之情将復為嗜欲所渾乎曰不復渾矣情本邪也妄也邪妄無因人不能復聖人既復其性矣知情之為邪邪既為明所覺矣覺則無邪邪何由而一無此字生也伊尹曰天之道以先知覺後知先覺覺後覺也予天民之先覺者也予将以此道覺此民也非予覺之而誰也如将復為嗜欲所渾是尚不自覺者也而况能覺後人乎曰敢問死何所之耶曰聖人之所不明書于䇿者也易曰原始反終故知死生之説精氣為物游䰟為變是故知鬼神之情状斯盡之矣子曰未知生焉知死然則原其始而反其終則可以盡其生之道生之道既盡則死之説不學而自通矣此非所急也子脩之不息其自知之吾不可以章章然言非集作且書矣復性書下篇晝而作夕而休者凡人也作乎非集無此字作者也集無此字與萬物皆作休乎非集無此字休者也與萬物皆休吾則不類于凡人晝無所作夕無所休作非吾作也作有物休非吾休也休有物作耶休耶二者皆離而不存予之所存者終不亡且離矣集作也人之不力于道也集作者昏不思也天地之間萬物生焉人之于萬物一物也其所以異於禽獸蟲魚者豈非道徳之性全乎哉受一氣而成形一為物而一為人得之甚難也生乎世又非深長之年也以非深長之年行甚難得之身而不専専于大道肆其心之所為則其所以自異于禽獸蟲魚者亡幾矣昏而不思其昏也終不明矣吾之生二十有九年矣思十九年時如朝日也思九年時亦如朝日也人之受命其長者不過七十八十年九十百年者則稀矣當百年之時而視乎一作其九十集無此字年時也與吾此日之思于前也逺近其能大相懸耶其又能逺于朝日之時耶然則人之生也雖享百年若雷電之驚相激也若風之飄而旋也可知矣况千百人而無一及百年之年者哉故吾之終日志于道徳猶懼未及也彼肆其心之所為者獨何人耶君子無榮辱解韋端符所謂榮與辱者賢不肖之辨也朝暮之所存也君子小人所以異道而殊名也君子無榮辱小人有辱而無榮志意脩術業明徳行備飾是榮之自内者也由之而爵列尊榖禄厚無擇而不宜是榮之自外者也君子有諸内而外者至焉猶是藝之耨之鎛之水澤以時而苖之猥大者也而世謂之榮是果不足為君子榮也以至貴于天下立國家偃然若固有之者彼脩之非一日也得之誠有術也吾所以待之無愧也又何榮乎哉阨窮詈侮暴怒横逆以至于繋一作擊捽逐磔世所謂之辱者是又果不足為君子辱也問其逄何物也其遭何時也吾之所以不容用吾之所修可于堯禹孔子而不可于斯時也吾又何辱乎哉君子無榮非不榮也所以為榮者出于吾道耳異乎世之所謂幸而榮者也謂種而收者幸可乎君子無辱非不辱也吾之道大彼不足用吾之説粹彼不足聞辱誠有所在也猶河海之不可内于􅉾涔也是豈河海辱哉故曰君子無榮辱由是為説也小人有辱無榮曲哆險詭突誕嫉賊是辱自内者也由之而得刑殺流放是亦有諸内而外者至焉是猶薉蕪之欝澁之而蓬亂疽結也謂飯肉一作茹死者不幸可乎幸而集一作售姦容邪盗有位勢則當時之賢者隂指而黙笑之憤之甚者筆之于書以示戒于後視其所處如䑕之肥肆于廪也豕之腯澤于欄也其榮乎哉故曰小人有辱無榮也小人之有辱無榮内外備至而不容説焉然則就是説吾又有明焉君子非有榮者有仁義之榮而無勢仕一作任下同之榮也在吾之修者堯禹孔子吾将坦蕩蕩而君師之立其朝躋其堂悟一作恬而有之流千萬世鼻口吾芳醲故曰有仁義之榮也若勢與仕吾又惡取哉得之吾不屑也流千萬世不遂者稱道而自信焉惡在乎得與否也故曰無勢仕之榮也若小人則無適而不辱也學者述道行吾説而審取焉君子小人分矣知道房千里世之所以為逹者貴爵富禄威刑不勝其用珠玉不勝其計耳熟聲口飫味目厭色斯所謂常情之大欲也世所以為窮者秩不足以庇身禄不足以充用侮不能威辱不能刑聲色不足于耳目滋味不甘于口舌斯所謂常情之大不欲也然而聖人汲汲于禄仕者豈文粹有不字為是耶曰非也聖人為人者也恒人為已者也聖人負其資得其地逢其時有其禄然後因其鎡基流其徳澤猶水之居高者决而溉之其浸必廣聖人之所以為榮者導人于仁誼然後使千萬年載其烈光為巍巍之徳功以浹于生人者也恒人之為已者期于厚禄貴位位以私尊禄以私富益尊而愈驕益富而愈汰以滛快一日之欲纔放肆于氣未絶之間者也聖人有其時有其位行其道以及于文粹作於人無其時無其位奉其道以自飾故聖人進不為榮退不為戚而常得其道恒人幸其時竊其位恣其所為文粹無此四字竭人以自足無其時失其位任其愚以自困故恒人進以為已榮退以為已辱而常失其道孔子曰鳳鳥不至河不出圖吾已矣夫孔子歎行已之道足以致是而時王不用已之道道無所施非歎其身食不方丈衣不文繡也恒人之所悲不逹者率曰吾妻不能羅􅃭吾兒不能文粹作得肉食耳豈常少及于外物哉聖人以徳澤流于人雖九命崇錫不以為厚以其所賞文粹作償果當或作賞外其身而公于天下非已幸也恒人無毫毛以禆于人茍幸得禄仕即逸豫以自怡以竊取偷得為大黠其所得幸也孔顔聖賢也豈常聞伐樹瓢飲以為已辱哉姬旦亦賢文粹作聖人也豈常聞受封攝理以為已幸哉是知聖人之樂也内而恒人之樂也外内故常有餘外故常不足有餘故推于人不足故取于人有道之人雖鹿裘帶索而人不鄙之者取其内而忘文粹作而不取其外也豪民俠士紫衣金鈎而人不貴之者文飾于外也若然者冨貴文飾于外也彼之所以仁誼者質充于内也西子不華嫫母錦縠是不能易其美惡後之君子窮于時者當思負其内以文粹作而自篤無以其外而謟人逹于時者當思勉其内以自飾無以其外而驕人茍如是庻幾乎知道矣文苑英華巻三百六十五
