body:
  text: 文苑英華卷七百八十六宋李昉等編㙮廟下唐故東京安國寺契微和尚㙮銘一首唐故洪州開元寺石門道一禪師㙮銘一首唐杭州靈隱山天竺寺故大和和尚㙮銘一首唐蘇州開元寺律和尚墳銘一首唐杭州華嚴寺大律師㙮銘一首唐東都奉國寺禪徳大師照公㙮銘一首楚三閭大夫屈先生祠堂銘一首廬山東林寺故臨壇大徳㙮銘一首唐故東京安國寺契微和尚㙮銘并序權徳輿和尚俗姓權氏法諱契微天水略陽人十代祖安丘敬公翼為前秦僕射事備載記曾祖文誕皇銀青光禄大夫涪常二州刺史荆州都督府長史平凉郡開國公祖崇本皇朝散大夫滑州匡城縣令與兄户部郎中崇基水部員外郎崇先皆以文學政事顯名於貞觀永徽之際考同光皇河南縣尉長安縣丞翰林詳定學士與伯兄益州成都縣尉無待仲兄歙桂梓三州刺史若納三人同以大名舉進士擢第文章之美為當時冠首然其世徳鍾慶若後無達者則有以清淨住世故和尚生而悔悟超然𤣥覺年九嵗於薦福寺金剛三藏發心入曼茶羅道塲傳持聖印悟入之速發於岐嶷然其徳容具舉家族敬異將必擇卿士之良者以嬪之時勇於出世至欲刃其膚以自免翰林府君既捐舘母兄竟不能抑遂以初笄之年四字集作笄年被服緇褐至天寳元年始受具於福先寺定賔律師𨽻東京安國寺師事苾芻尼無勝受心門方便之學以為心實境化眞由妄遣遣之而真亦隨盡化之而心乃湛然故外示律儀内循禪悅集作内修禪說因初心而住實智離有相而證空法乃通四部經於𢎞正大師尤精楞伽之義而後住無住證洗六妄離二邊遵大道以坦蕩入法流而洄澓以深惠善誘誨學徒或權或實為歸為趣亦猶净名之隨機攝道蜀嚴以忠孝為言故中外族姻徧沐其化漸漬饒益可勝道哉初以廣徳中隨其家南渡安居于蘇州朱明寺以建中二年九月六日㝠然化滅報年六十二經夏四十一弟子尼惠操又其兄子也故探其義味最為深入乃率籲緇俗號捧金身建塔于東武丘寺之東北岡從其教也姪孫徳輿以為宣父有西方聖人之說東漢有浮圖仁祠之教以其教言之自菩提達摩七葉至大照祖師皆以心法祕印迭相授受故戒生定定生惠得第一義者冲而詣之嗚呼今其詣之矣桑門紀述多不分系緒今備書者亦所以無忘先徳故其文也繁銘曰教㫖清净戒珠圓映識浪情塵還源反性彼一切見皆妄想生精修密詣湛爾融明示現者何此身非父强為之銘以悼于後唐故洪州開元寺石門道一禪師㙮銘并序前人鍾陵之西曰海昬海昬南鄙有石門山禪宗大師馬氏㙮廟之所在也門弟子以徳輿嘗游大師之藩俾文言而揭之曰三如來身以大慈為之本六波羅密以般若為之鍵非上徳宿殖者惡乎至哉大師法諱道一代居徳陽生有異表幼無兒戲嶷如山立湛如川渟舌廣長以覆準足文理而成字全徳法器自天授之嘗以為九流六學不足經慮局然理世之具豈資出世之方惟度門正覺為上智宅心之域耳初落髮於資中進具於巴西後聞衡岳有讓禪師者傳教於曹溪六祖貞一作直心超詣是謂頓門䟦履造請一言懸集作𤣥解始類顔子如愚以知十俄比净名黙然於不二又以法惟無住化亦隨方嘗禪誦於撫之西裏山又南至于處之龔公山攫搏者馴悍戾者仁瞻其儀相自用丕變刺史今河南尹裴公乆於稟奉多所信嚮由此定惠發其明誠大厯中尚書路冀公之為連帥也舟車旁午請居理所貞元二年成紀李公以侍極司憲臨長是邦勤䕶法之誠承最後之說大抵去三以就一捨權以趨實示不遷不染之性無差别次第之門常曰佛不逺人即心而證法無所著觸境皆如豈在多岐以泥學者故夸父喫㖃莊子作契詬求之愈踈而金剛醍醐正在方寸於是解其結發其覆如利刃之破罥索甘露之洒稠林隨其義味快得善利者可勝道哉化緣既周趺坐報盡時貞元四年二月庚辰春秋八十夏臘六十前此以石門清曠之境為宴黙終焉之地忽謂入室弟子曰吾至二月當還爾其識之及是委化如合符節當夾鍾發生之候叶拘尸集作户薪火之期緇素㓜艾失聲望路渡涸流而法雨滂泗及山門而天香紛靄天人交際集作交感之際昧者不知沙門惠海智藏鎬英志賢智通道悟懷暉惟寛智廣崇泰惠雲等體服其勞心通其教以為吾師眞心集作性湛然與虚空俱唯是體魄化為舍利則西方之故事傳焉不可已也乃率籲其徒從茶毗之法珠圓玉潔煜燿盈升建兹嚴事衆所瞻仰至七年而功用成竭誠信故緩也徳輿徃因稽首粗獲擊䝉雖飛鳥在空莫知近逺而法雲覆物已被清凉今兹銘表之事敢拒衆多之請銘曰達摩心法南為曹溪頓門巍巍振㧞沉泥禪師𢎞之俾民不迷九江西部為一都㑹亦既戾止𤣥津横霈慈哀攝䕶為大法礪五滓六觸翳然相䝉直心道塲决之則通隨器受益各見其功眞性無方如道不竭顧兹夢幻示有生滅微言密用煥炳昭晰過去諸佛有修多羅心能悟之在一刹那何以寘哀兹窣堵波唐杭州靈隱山天竺寺故大和和尚㙮銘并序釋皎然水之性不動而鑒得非夫實相之體耶維積為洪溟而未嘗變亦眞我自在之妙致也如來大師獨秉至教羣聖拱手俾寘㝠到識破堅氷之惑豈逾一念之中哉靈隱大師雖外精律儀而第一義諦素所長也故小子誌之大師生縁錢塘范氏諱守眞字堅道齊信安太守瑝之八葉禮既冠衆君子器之夙有丘園之期不顧𤣥纁之錫遂詣蘇州支硎寺圓大師受具足戒是夜眼中光現長一丈餘乆而方没蓋得戒之禎也後至荆府依眞公三年苦行尋禮天下二百餘郡聖教所至無不至焉無畏三藏受菩薩戒香普寂大師傳楞伽心印講起信宗論三十餘遍南山律鈔四十遍平等一兩小大雙機在我圓音未嘗異也乃發殊願誦持華嚴遂於中宵夢神人施珠一顆及覺惘然如來在握是嵗入五臺山轉華嚴經二百遍追宿心也又轉大藏經三遍廣正見也至開元二十六年有制舉髙行道俗請正名𨽻大林寺後移籍天竺徃一作住靈隱峯時大歴二年也至五年三月寓于龍興净土院謂左右曰夫至人乗如而來亦乗如而去亦其必然也而愚夫欲以長繩繫彼白日安可得乎吾非至人豈逃其盡以此月二十九日告終于兹地春秋七十一僧臘四十五其間臨壇既多度人無數今不復紀也顯明弟子蘇州辨秀湖州惠普道莊越州清江清源杭州擇隣神偃常州道進如彼鸑鷟之彩共集旃檀之枝江淮名僧難出其右晝之身戒亦忝門人幸叅四子之科獨許一時之學斯文在我何敢讓焉詞曰房星在天降為應眞好爵縻我視如埃塵既投其簪亦壞其服戒日纔佩禪秀乃沐四十餘夏振振盛名大江東南為法長城宣尼既沒微言乃絶我師云亡眞乗亦輟靈隱峯上春日秋天風生松柏如師在焉持教門人楚英吳傑儒方荀孟道比文列宿習未盡妄涕猶雪宿已忘一作志眞如水一作餙眞如月古之君子名書彞器大師不書將墜于地紀功者銘傳心者燈藏諸名山不騫不崩唐蘇州開元寺律和尚墳銘并序至人於生死一也物有之我亦有之若日月可蝕虚空可洿乎在至人為宅心之勝地誠瞽夫不返之瀑流哉於戯我法自五天揚于漢廷八俊四賢横世傑出後之學者聆休風企髙躅何吾師之穆其芬馥歟吾師諱某字某先劉氏之子漢楚王交三十一代孫烈祖某永嘉南遷為丞相掾四代祖逺隨東陽守顯其遺榮之跡畧載本枝全㧞俗之髙不書後葉蓋亦垂訓之意乎吾師㓜孤伯父哀字如禮名因教立孝自天生而宿植縁深心田欲稔因請伯父哀而捨之亊靈隱某禪師因問師入道之次師語曰夫爝火明乎虚以爝火之心當太虚之境境非心外心非境中兩不相存兩不相廢今我所證是爾所知曷有萬法之深淺優劣乎語畢如凉風入懷醒然清悟天寳四年受戒於東海大師鑒眞傳講於㑹稽大師曇一至徳中舉髙行𨽻名開元乾元中有詔天下二十五寺各定大徳七人長講戒律一作律戒吾師其選也頃年净土一門不愆于念嘗謂人曰昔聞西方之行是有相大乗此乃蓬心不直達之說何者夫出言即性發意皆如而一色一香無非中道泥我正念乎于時六十七天年三十六僧夏一十六壇塲孤制律樞正持僧綱自胥湖南北皆宗仰焉以建中元年六月十五日寂疾而逝其時有庭樹一本枝葉扶踈及吾師將亡之朝花正拆而遽萎條始繁而方折亦恒河水上旃檀樹枝榮枯之意也其年七月五日遷靈龕於武丘西寺松門之右嗚呼青山不歸白林長謝秋原之上萬境皆悲雨㝠㝠而晝隂水浼浼而東逝門人道亮道該清㑹亮以毗尼繼其行㑹以才學儔其賢該以詞物蹤其美三子之外居廊廡者充江漢焉故觀察使韋公元甫觀察李公栖筠今虢州刺史李公紓今御史中丞李公道昌林下之跡可追山隂之逰尚想懷人撫事相顧泫然實䕶才曷足揄揚盛美以吾釋門之事安敢讓焉詞曰本師示終兮𤣥綱絶香山崩兮香海竭大地動兮旃檀折人天㝠兮千光滅我師出嗣兮遺教張如何斯人兮天不臧星既兩兮地亦霜生涯昧兮四流長捧遺言兮循徃跡庭無人兮月寂寂百年遐夀兮日長夕萬春上服兮塵已襞門前慟兮世人悲瞻影㙮兮山之垂宿百經兮舊路岐雲𦕈𦕈兮雨霏霏方城芥盡兮長乘移樂石香名兮不騫不虧唐杭州華嚴寺大律師塔銘并序魏晉中頴邁之士多尚出塵白足髙歩於海隅青目遐視於湘表千有餘祀禪律師宗吾知若人出秉伊說之鈞躡黄綺之躅亦躬珪之與和璞隠顯之殊乎哉律師其人也法諱道先俗姓褚氏踰齓出家方冠受具詣光州和尚學通毗尼于時夏淺徳崇壇塲屬望蓋天賚眞士為東南義虎雲雨慈味笙鏞道聲常持法華兼創佛廟洎沒身不怠也世夀七十九惠夀五十八上元庚子嵗秋仲月示滅于本寺是日馳陽昧昧淫雨颸颸烈風崇朝嘉木為折乃東土福盡之徴也俄然喜氣五色亭亭如蓋移晷不一有能字散徧映精廬即西方徃生之意也初吾師未歿其月三日質明交疾凝神視色觀身彌陀具相忽現師前滿庭碧花昔所未有一作覩其四日昧爽有異人請師謂師為和尚一作上遂開目彈指曰但發菩提心五之日曼陀羅華自天而雨悲夫非哲匠去世安至是耶門人神烈義精一作律等攝齊何仰繞㙮徒哀履名跡而可師書琬琰之不墜詞曰我法未季哲人是生眞慈在物澤灑飈清髙戒嚴身佩月與瓔貽訓徒張逝不可作瑞花㝠濛卿雲縈薄靈轜何止于此山椒寒鼯斷續影㙮蕭寥五峯諸子泣望終朝唐東都奉國寺禪徳大師照公㙮銘并序白居易大師號神照姓張氏蜀州青城人也始出家於智凝法師受具戒於惠蕚律師學心法於惟忠禪師忠一名南印第六祖之法曾孫也大師祖達摩宗神㑹而父亊印其教之大㫖以如然不動為體以妙然不空為用示眞寂而不記集作說斷滅破計著而不壞假名師既得之揭以行化出蜀入洛與洛人有縁用開六壇僅三十載隨根說法言下多悟由是裂疑網㧞惑箭漸離我人相者日月有焉起正信見本覺頓發菩提心者時時有焉其餘退惡進善隨分而增上者不可勝紀夫如是可不謂煩惱病中師為醫王乎生死海中師為船師乎嗚呼病未盡而醫王去海方渉而船師失粤以開成三年冬十二月示滅於奉國寺禪院以是月遷葬於龍門山報年六十三僧夏四十四明年傳教主院上首弟子沙門清閑糾門徒合財施與服勤弟子志行等營度䘮亊卜兆於寳應寺荷澤祖師塔東若干歩窆而塔焉示不忘其本也其諸升堂入室得心要口訣者有宗實在襄復儼在洛道益在鎭知逺在徐曰建在晉道光在潤道威在潞雲眞在磁集作慈雲表在汴歸忍在越會幽齊經在蔡智全景𤣥紹明在秦各於一方分作佛亊咸鼔鐘鳴吼龍象蹴踏斯皆吾師之教力集作立也不其盛歟衆以余忝聞法門人結菩提之縁甚熟請於塔石序而銘曰伊之西北洛之南一作西東法祖法孫歸全於中舊塔㑹公新塔照公亦如世禮祔于本宗楚三閭大夫屈先生祠堂銘并序王茂元按史記本傳及圖經先生秭歸人也姓屈名原字靈均一名平字正則本實楚之苗系大父瑕受屈為卿遂以命氏先生義特百夫文横千古其忠可以激俗其清可以厲貪仕楚為三閭大夫屬君懷不惠與靳尚等夷尚嫉原才譖漏憲令構成舋狀錮絶恩私由是忠言如風不入主聽險黨若鐡斥為窮人始楚與齊連衡以弱秦秦以商於之地六百里為河外五城以餌楚楚嗜張儀之紿不納先生之諫子蘭鄭袖内奰于朝虵秦豕齊外披封畧原為放臣王卒客死離騷始作徒冀幸君之一悟汨羅終赴痛皆醉而獨醒嗚呼忠在禍先功成罔貴洎成忠死世責何深蓋有國有家之所大病志士仁人之所悼歎也嗟乎先生君辱身死周旋存歿之際感慨今古之心宜乎上與比干夷齊携手作華胥羲軒之遊假靈於遺芳而因於佞幸者也安可為䑕肝蟲臂魚腴鼈趾而已哉元和十五年余刺建平之再一作載嵗也考驗圖籍則州之東偏十里而近先生舊宅之址存焉爰立小祠憑神土偶用表忠貞之所誕卓犖之不冺也銘曰麟出非時終困于人劔有雄鋩不用無神矯矯先生不緇不磷舉世皆醉抱忠沒身汨水悠悠言問其濵歸山髙髙獨揖清塵誕靈是所粤秭歸土義風敬承廟貌無睹庭而可修予期負拏死不可作余構其宇聳忠來者載陳清酤乞靈臧氏非愚所取已矣先生蘋誠其吐廬山東林寺故臨壇大徳塔銘并序劉軻維元和十年冬十月己亥我具夀大師歸於廬山東林寺既庀一作已事門弟子道深如建等以銘誌為急白一作曰彭城劉軻軻一不疊軻字嘗執吾大師之巾錫大師行業徳狀轉能言之乃走其徒持事狀於山陽草堂具道其所以來軻既受事仰而哭且曰軻何心遽忍銘吾大師俄而曰我而不銘而誰為於是衘涕漣漣作石塔銘誌云大師諱上𢎞俗饒姓其先臨川人祖公悅一作帨父知恭世為南城聞一作門儒故大師自童子耳熟家訓故風流舉動造次必於儒者年十五脫然有方外之志遂依舅氏出家暨二十二嵗具戒於衡岳大圓大師大厯八載勑配本州景雲寺後依南昌璡律師學四分毗尼既覃精研究或從我駕說而通者日有百數時謂景雲且在無患無律貞元三年止南昌龍興寺四方風聞者塵至時江州峯頂寺長老法眞台州國清寺法裔荆州慶一作度門寺靈裕並有大名於時㑹有事於靈壇故三長老攝大師以臨之至四十年春九江守李公康以東林逺公舊社不可以無主固請住焉前後蒞事凡一十八㑹彼域之男女繇我而作比丘者萬有五千五百七十二人大師既通明大教祖述毗柰耶憲章修多羅心同曹溪事同南山故及我門而陞我堂者未嘗虚返我所以駕白牛以驅羊鹿孰謂我為小乗者乎繇是薦紳先生若顔魯公姜相公並願依遺民萊民舊事侍一作待大師於虎丘鴈門之上故游二林者謂生逺猶在將大去乃遺言於二三子曰吾生七十有七臘五十有六年非不耆臘非不髙今則去矣爾無謂吾死門人道深懷縱如建冲契宗一智則智明雲臯圖信行允等長號無愬廼相與立石塔於香爐峯下是月丙寅歸舍利于塔從故事也軻不得讓薦誠於銘銘曰塔有徳功有銘一作銘有功功可祖徳可宗宗可師師有資嗚呼千載而下資而後者知是塔有毗柰耶之宗師一作皆馬玕所編續廬山記文苑英華卷七百八十六
