body:
  text: 文苑英華巻八百三十一宋李昉等編紀事下京兆府司録西㕔盧氏世官記一首河南同官記一首邠寧節度饗軍記一首鄂政記一首夀州䕶軍大夫梁公創制功績記一首東陽縣五紀總目作絶記一首闕京兆府司録西㕔盧氏世官記梁肅御史中執法范陽盧公用直清之徳掌中邦憲恭睦之道用宏家法常謂其屬監察御史梁肅曰我王父廣陽公以明徳懿識嚮用休福羽儀於中朝我伯父嗣公以文學政事載揚茂集作休烈光績于前人皆肇乆史集作吏職發于京兆紀綱之任洎予之季曰偘亦能恪慎不懈踐修其官繼處于廨之右堂惟二代㣲集作徽是在兹偘也允迪在兹吾子嘗號史臣宜存于篇以示後裔肅辭不得已集無已字命以為在昔司馬氏世序天地鄭武莊世為卿士宋魚氏之左師晉籍父之司典下洎乎樂之制氏厯之疇人俱以傳業彰乎集作于舊史故傳稱善守先代雅詠維其有之雖大細不倫職事或異其纂修一也惟京之大惟兆之衆天子之都四方之極糾而轄之是稱司録其地劇其選精常與殿中蘭䑓南宮郎位旋相出入初廣陽公諱齊卿由司倉掾為之驟登郎官更貳本府布澤于彭滑幽徐之人端䕶春宫崇贈少保開元初嗣公諱成務罷録岐下軍事實居其任其後作牧于夀于杭于濮于洺于魏繼受𤣥社以處太原誠集作咸有嘉績藏在冊府今户部郎偘始逺哲聫事之嫌詔觧柱後惠文以就斯職中丞之拜也又有䑓府臨察之避在官之屬其為人簡而亷文而不害在選部辯集作辨論三登試言第考兹任也詳敏稱一時之最薦紳先生詳集作評是天下之事謂如廣陽之家風施于子孫中丞之仁徳至于兄弟斯盡美矣若三世居一官同一署逓以全徳物于當時又難能也噫古人所稱方斯其類乎爾小子拜命著紀書于本㕔之東序用闡夫廣陽之宗且為名臣世官之表時貞元庚午閏四月記河南同官記韓愈永貞元年愈自陽山移江陵府集無府字法曹叅軍獲事河東公公嘗與其從事言建中初天子始紀年更元命官司舉貞觀開元之烈羣臣惕慄奉職命材登良不敢私違當時自齒朝之士而上以及下百吏職事官闕一人將補必取其良然而河南同時於天下稱多獨得將相五人故於府之叅軍則得我公於河南主簿則得故相國范陽盧君集作公邁於汜水主簿則得集有故字相國今太子賓客滎陽鄭公餘慶於陸渾主簿則得相國今集作今相國吏部侍郎天水趙公宗儒於登封主簿則得故吏部尚書東都留守吳郡顧公少連盧公去河南為右補闕其後由尚書右集作左丞至宰相鄭公去汜水為監察御史佐山南軍其後由工部侍郎至宰相罷而又為趙公去陸渾為右拾遺其後由給事中為宰相顧公去登封為監察御史其後由京兆尹至吏部尚書東都留守我公去府為長水尉其後由膳部郎中為荆南節度行軍司馬遂為節度使自工部尚書至吏部尚書三相國之勞布在史冊顧吏部慎軄小心于時有聲我公愿潔而沉宻開亮而卓偉行茂於宗事修于官嗣紹家烈不違其先作帥蜀本作扞荆南集作南荆厥聞休顯武志既揚文教既蜀本作亦熈登槐賛元其慶且至故好語故事者以為五公之始迹也同其後進而偕大也亦同其稱名臣也又同官職雖分而功徳有巨細其有集無有字忠勞於國家也蜀本有亦字同有若將同其後而先同其初也有聞而問者於是焉書既五年始立石刻其語于集無于字河南府叅軍舍庭中於時集作是河東公則為右三字集作為左僕射宰相出藩大邦開府漢南鄭公以兵集作工部尚書留守東都趙公以吏部尚書鎮江陵漢南地連七州戎士十萬其官宰相也留守守集作之官居禁省中嵗時出旌旗序留司文武百官于宫城門外而衙之江陵故楚都也戎士五萬三公同時千里相望可謂盛矣河東公名均姓裴氏邠寧集有慶三州三字節度饗軍記李觀朗寧郡王張公擁七尺之節臨三州之師牧我邠荒藩我雍疆德邁乎龔黄文粹作威厲乎廣漢聲稱文粹作及集作陵乎四隣戎無南侵國無西憂師嚴民釐文粹作整封守晏如聖上聞之曷二本作何嘗不負扆而咨文粹作嗟之因乃寵以彤弓嘉以墨書乃慰乃止曷日而無哉二本有於是仗鉞揔戎之臣咸望公而歡懼能無稱嘻二本作于維朗寧之率文粹作卒一作師已杖文粹作仗誠而自獲集作而曰䕶文粹作而言曰䕶拜錫之光聖上之寵崇朗寧足以勵集作厲不戮力之臣然斯事也君臣之殊尤敢不集作弗述之而己焉文粹無此字哉越春王二月五字文粹作越三月河澌未流東風始凑集作輳優柔委蛇二本作逶迤公被二本作被公軍容文粹作令公曩奉詔親率師備敵乗虛君命未復不自議還雖閫外得専文粹作顓下同亦大有所不専也於文粹作于是軍吏之職事者進伏於戱文粹作鉞集作麾下曰舊文粹作實以是月賞功息勤惠老及疾哀死及孤厥死無怨厥生而愉所以觀文粹作被集作數軍實賚師徒實舊典也違之不孚公從之乃揀文粹作練令辰豁連城皷於四門聲二本作斾於四墉日既登塵不騰窮隂開文粹作閉淑氣升軍聲歡康儲輿靁硠翕乎萬文粹作衆民凑二本作輳乎互疑羗空山之木春近塞之草芳朗寧乃鳩文武之吏列而為行東南文粹作西集作面向闕而再拜如蒙上之命命之然後申號而惠周升堂而澤溥集作鋪賁育之倫列於軍集作于公之宇校師之士次於軍集作于公之堂進如風行文粹作進猶風趨坐如雲屯旌旗蔽虧二本作日刀文粹作刄㦸交光公於文粹作于是衆食而食衆安而安士盡感之緩緩字集作優用醉飽而御酒餚是日饗軍二字二本作朗寜軍中無滛樂文粹作聲無亂音左二本作右金皷名二本作左羽旄是二本作所以奮武之烈二本作觀壯軍之容其餘管磬之歡集作讙絃匏之繁罔不合奏二本作簡節配文粹作諧雅音俾三文粹作重軍之士文粹作夫集作衆毅其氣龢其心羣羌之長釋我俘歸我侵少壯薰薰集作重鋭老疾謳吟䘲化為祥虜趨為擒洪矣偉矣朗寧之理明徳惟深二本二字作遐被者乎乃知夫文粹作于致饗者不止乎味能集作張樂者不止乎聲則人二字二本作仁可以碩其膚和可以齊文粹作暢其情故朗寧之饗士兼其威以和二本作兼以仁龢彼之饗士從其羶以腥九字集作彼之饗士獨以羶腥文粹作被之豈以羶以腥猗之哉武之徳二本作武有七徳朗寧其一二二字一本作繇二三焉于時嵗紀協洽國家郊上帝二字二本作禮之明年觀布衣來逰賔公之筵宗盟兄侍御史益有文行忠信而從朗寧之軍惡羣小之日取媚也故不自書命觀書之曰子之文直長於記事益知之乃題曰邠寧節度饗軍記鄂政記舒元輿髙平公以今皇帝三年春出鎮鄂實澤國地連大别雲夣洞庭穆陵控扼勝勢號為東南巨鎮與江陵會府不侔來臨者茍能惠百姓軍旅必咨怨茍能富軍旅百姓不堪命二徳既不易備朝廷亦難其材自髙平公為政顓以誠信惠和撫下軍旅受其撫勇知方百姓受其撫耻且格繇春到秋政與稼且成至明年公知民心安軍心雄乃次視閭井城隍有陋狹不快人心者皆開張治本鄂城置在島渚間土勢大凹凸凸者頗險凹者瀦浸不可乆宅息不可議制度公命削凸堙凹廓恢閭巷修通衢種嘉樹南北繩直㧞瀦浸者升髙明湖澤瘴癘勿藥有愈郡城舊制陋屋駢聫自十二㦸南直土地隘塞若人胷闕不開將佐序宇次第甚牢落州佐掾署亦牢落公正立㦸間指吏徒折去陋屋南抵城墉下南面北嚮立射侯軍容佐西翼東嚮立牙門料將院東翼西嚮立州佐六掾院長廊聯軒萬門呀呀中央廣除得以講校戎律班布等列霜㦸洞啓公堂耽耽每至朔望日三字一作朔日之二望日之二軍吏畢謁威容大修有以見堂堂儀觀不可觸犯也然後知皇唐諸侯王之為貴耶鄂之軍實三萬先時營宇皆曲陋低下嵗有墊溺師徒患之公心亦患之引車出郡壘東門之外良地伏在莽下公自得心識手開畫之創新營凡一十五所合三千間瓦鱗鱗檐盈盈軒門對開欲疑作欱呀風雷若有神物借助其功觀人駭目目不前見居人廬舎先不如法者皆自我如法肯與𤨏𤨏胷臆經營細碎不副大君一作軍委重柄之意者齊肩乎則知公之為政不専於鄂枝郡亦猶鄂復明年廵封畧問遐邇一若門門有公猶疑將校僚吏卒伍元元咸不勝公惠熈熈相賀自謂長庇公徳宇下道路合聲王人中貴聞政聲到闕下天子聞至五年冬十二月下詔徴公尹河南河洛人賀聲動河洛江漢人唁聲動江漢天子又聞二地人賀唁聲愈知公仁深不三月復遷公福上黨上黨父老喜躍擕壺漿簞食逾太行迎太行素險巇鄂人聞上黨父老迎我公過太行去若火入腸臟相與自相尤曰我曹皆公庇䕃貽惠父母生我公實活我今公去郡恨無史氏記不書我公徳不光照本邦是我曹負公也非公負我曹也胡不率大宣聲音詠思我遺愛使溢衢陋巷㡬採教化者聞必寓於風雅立疑則天子史官得詳載史策遺愛遺惠豈謝古人耶是心愈見公徳如卿雲景星所出必為國瑞所至必為人福不顓在一方而己某聲名陋小未縻人爵不敢擅斷石懼累公徳但直錄鄂人詠思之言將上告天子史官厭塞鄂人望若河南遺愛洛多君子因以為民疑詳矣上黨新政方大未可測酌非陋文褒述也夀州䕶軍大夫梁公創制功績記劉恭伯大中戊辰嵗帝命侍臣梁公承又䕶軍戎於夀陽郡其至之日乃言曰兹地之廣控淮淝之川壓荆楚之要兵多而稼稀俗薄而人囂非通於吏理者曷能保和之今常侍渾公政成而理平俗㤗而人安消灾沴為和氣變凶荒於夀域上下胥悦人其㤗寧公之致政也如是我之撫戎思有其力一作立乃曰士卒之有貧者若吾之不足於身也有不安其居者若吾之無其室家也顧力無以恤將何以字之不欲勞於下而成已之私害於人而就己之欲雖有經度何成厥功忖度日深乃得其畫曰廢寺之材年乆而腐用無所堪我將拆而為薪以貨之於是得錢六十萬置樓邸於旗亭之衝嵗收其利以助用摭拾其餘貨以創軍營二所度木於山價必賤鳩傭於外賞必厚就使以悦人忘其勞量其有無節費就省減私儲而足食添月俸而酬工率已儉身乃著成績士卒之富者樂其業貧者安其居歌謡諠愉令美充塞公曰軍旅之士既安且寧吾之署曹宜革其舊乃恢其垣墉髙其閈閎崇廊四注以廻合層構中開而崷崪易隘陋為輝煥化卑庳為宏敞浹旬之間創制斯成掲焉中闢豁若天造完葺既備周視其間曰水程無送迎之所何以遲嘉賓而申揖讓之禮是乃擇勝槩之地立逰觀之亭斬伐而竒勢出芟夷而佳境見南軒翼舒飛陛雲聳導流泉於砌下植嘉木於庭中遥峯疊嶂屏列在目郡邑之人日逰其下輪跡荐至不絶於路是知兹地自然而生其為景象也因公而成以為廢興在人而不在時在於營搆出我心匠以其介直聞於時創制也勤而功不宣威以役人不狥己以使下郡邑不擾而厥功成其大將官僚纍而請曰公之撫戎也三年而人無犯於今朝闕有期再欲陳乞保留周嵗以副羣心常侍公乃拜章上聞允叶誠請俄而天書下降褒讃其功詔曰委以腹心是資信實有勞可奬即懋新恩宜加内府局令歡聲溢衢逺近咸慶遂使覩事者增榮聞風者益勸公之才識敏達恪勤公忠猶居外藩未展寵畧付之戎旅可以夷静邉塵委以中樞可以肅整天禁而今而後必見大用之有期矣恭伯幸以筆札佐于常侍公之門日熟政能觀其成績顧惟不敏敢不承命而書大中五年正月二十四日記文苑英華巻八百三十一
