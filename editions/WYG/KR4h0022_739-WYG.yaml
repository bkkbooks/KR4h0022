body:
  text: 文苑英華巻七百四十宋李昉等編隂陽五行禄命葬書論一首折滯論一首隂陽不測之謂神論一首善惡無餘論一首㝠數有報論一首禱祠論一首隂徳論一首五行禄命葬書論吕才叙宅經曰易曰上古穴居而野處後世聖人易之以宫室盖取諸大壮逮乎殷周之際乃有卜宅新唐書㑹要作擇之文故詩稱相其隂陽書云卜惟洛食此則卜宅吉凶其來尚矣至於近代師巫更加五姓之說言五姓者謂宫商角徴羽等天下萬物悉配屬之行事吉凶依此為法至於舊唐書作如張王等為商武庾等為羽欲以同韻相求及其以栁姓為宫以趙姓為角又非四聲相管其間亦有同是一姓分屬宫商復有複姓數字徴羽不别驗於經典本無斯說諸隂陽書亦無此語直是野俗口傳竟無所出之處唯按堪輿經云黄帝對於天老乃有五姓之言且黃帝之時不過姬姜數姓暨於後代賜族者多至如管蔡郕霍魯衞毛􅆅郜雍曹滕畢原鄷郇並是姬姓子孫孔殷宋華向蕭亳皇甫並是子姓苖裔自餘諸國準例皆然因邑因官乃分枝葉舊唐書㑹要並作分布根葉未知此等諸姓是誰配屬宫商又檢春秋以陳衛及秦並同水姓齊鄭及宋皆為火姓或承所出之祖或繋所屬新唐書作分之星或取所居之地亦非宫商角徴羽共相管攝此則事不稽古義理乖僻者也叙禄命曰謹按史記宋忠賈誼誚舊唐書作譏司馬季主云夫卜筮者髙人會要作談禄命以恱人心矯言禍福以盡新唐書作規人財又按王充論衡云見骨體而知命禄覩命禄而知骨體此則禄命之書行之久矣多言或中人乃信之今更研尋本非實録但以積善餘慶不假建禄之吉積惡餘殃豈由刼殺之災皇天無親常與善人禍福之應新唐書作天人之交莫要會作其猶響影故有夏多罪天命勦新唐書作剿絶宋景修徳妖孛夜移新唐書作妖星退舍學也禄在豈待生當建王憂勤損夀不關月值空亡長平坑卒未聞共犯三刑南陽貴士何必俱當六合歴陽成湖非獨河魁之上蜀郡炎燎豈由災厄之下今時亦有同建舊唐書作年同禄而貴賤懸殊共命共胎而夭夀更異按春秋魯桓公六年九二唐書作七非月魯荘公生今檢長歴荘公生當乙亥之嵗建申之月以此推之荘公乃當禄之空亡依禄命書法合貧賤又犯勾絞六害㑹要作空背驛馬生身尅驛馬驛馬三刑當此生者並無官爵火命七月生當病鄉為人尫弱身合短諸本作矬陋今按齊詩譏莊公云猗嗟昌兮頎而舊唐書㑹要作若長兮美目揚兮巧趨蹌兮唯有向命一條法當長命依檢春秋荘公薨時計年四十五矣此則禄命不驗一也又按史記秦荘襄王四十八年始皇帝生宋忠注云因正月生為此三字舊唐書作乃名政依檢襄王四十八年嵗在壬寅此年正月生者命當背禄法無官爵猳當諸本作得禄合奴婢尚少始皇又當破驛馬生驛馬三刑身尅驛馬法當望官不到金命正月生當絶下為人無始有終老而彌吉今驗史記始皇乃是有始無終老更彌凶唯違命生法合長夀計其崩時不過五十禄命不驗二也又檢漢武故事武帝以乙酉之嵗七月七日平旦時生亦當禄空亡下禄命書法無官爵唯向驛馬尚隔四辰依禄命法少無官榮老而方盛今檢漢書武帝即位年始十六末年己後户口減半禄馬不驗三也又按後魏書云髙祖考文皇帝皇大興元年八月生今按長厯其年嵗在丁未以此推之孝文皇帝背禄背命並驛馬三刑身尅驛馬依禄命書法無官爵命當父死中生法當生不見父三十七字英華作其命背父今檢魏書孝文皇帝身受其父􅂋祖之禪禮云嗣子位定在於初䘮踰年之後方始正號是以天子無父事三老也孝文皇帝受禪異於常禮躬為天子新唐書作躬率天下以事其親而禄命例云不合識父禄命不驗四也又按沈約宋書云宋髙祖癸亥嵗三月生依此而推禄之與命並當空亡依禄命書法無官爵又當子墓中生唯宜嫡子假有次子法當早死今檢宋書髙祖長子先被簒殺次子義隆享國多年髙祖又當祖禄下生法得嫡孫財禄今檢宋書其孫劉劭并劉濬並為簒逆㡬失宗祧禄命不驗五也叙葬書曰易曰古之葬者厚衣之以薪不封不樹䘮期無數後世聖人易之以棺槨盖取諸大過禮云葬者藏也欲使人不得見之㑹要作欲人之不見也然孝經云卜其宅兆而安厝之以其復土事畢長為感慕之所窀穸禮終永作鬼神之宅朝市遷變豈得先舊唐書作不得豫測於將來泉石交侵不可逆㑹要作先知於地下是以謀及龜筮庶無後艱斯乃備於慎終之禮曽無吉凶之義暨近代以來加之隂陽塟法或選年月便近或量墓田逺近一事失所禍及死生巫者利其貨賄莫不擅加防害遂使塟書一術乃有百二十家各說吉凶拘而多忌且天覆地載乾坤之理備焉一剛一柔消息之義詳矣或成於晝夜之道感於男女之化三光運於上四時通於下斯乃隂陽之大經不可失之於斯須也至於䘮塟之吉凶乃附此為妖妄傳曰王者七日而殯七月而塟諸候五日而殯五月而塟大夫經時而塟士乃逾月而己六字舊唐書作士及庶人逾月而己此則貴賤不同禮亦異端會要作數欲使同盟同軌赴弔有期量事制宜遂為常式法既一定不得違之故先期而塟謂之不懐後期而不塟譏之殆禮此則塟有定期不擇年月其義一也春秋又云丁已塟定公雨不克塟至於戊午襄事禮經善之禮記云卜塟先逺日者盖選月終之日所以避不懐也今檢塟書以已亥之日用塟最凶謹按春秋之際此日塟者凡有二十餘件此則塟不擇日其義二也禮記又云周尚赤大事用日出舊唐書㑹要作平日殷尚白大事用日中夏尚黒大事用昏時鄭𤣥注云大事者何謂䘮塟也此則直取當代所尚不擇時之早晩春秋又云鄭卿子産及子太叔塟鄭簡公於時新唐書作是司墓大夫室當塟路若壊其室即日出舊唐書作平旦而堋舊唐書㑹要作空下同不壊其室即日中而堋子産不欲壊室欲待日中子太叔云若至日中而堋恐久勞諸侯大夫來㑹塟者然子産既云博物君子太叔乃為諸侯之選國之大事無過䘮塟必是義有吉㐫斯等豈得不用今乃不問時之得失唯論人事可否曽子問云塟逄日蝕舍舊唐書㑹要作捨於路左待明而行所以備非常也若依塟書多用乾艮三時並是近夜半舊唐書㑹要作半夜此則交與禮違今檢禮傳塟不擇時其義三也塟書云富貴官品皆由安塟所致年夀舊唐書㑹要作命延促亦由墳隴所招今按孝經云立身揚名於後世以顕父母易曰聖人之大寳曰位何以守位曰仁是以日慎一日則澤及於無窮苟徳不建而人無據舊唐書作後㑹要作援援字是出左傳文五年此則非論舊唐書㑹要作由安塟吉㓙而論福祚延促臧孫有後於魯不關塟得吉日若敖絶祀於荆不由遷厝失所此則安塟吉㐫不可信用其義四也今之䘮塟吉㓙皆依五姓便利古之塟者並在國都之北兆域既有常所何取姓墓之義趙氏之塟並在九原漢之山陵散在諸處上利下利蔑爾不論大墓小墓其義安在及其子孫富貴不絶或與三代同風或分六國而王此則五姓之義大無稽古吉㐫之理何從而生其義五也且人臣名位進退何常亦有初賤而後貴亦有始泰而終否是以子文三已令尹展禽三黜士師安舊唐書㑹要作卜塟一定更不囬改冡墓既成曽不革易則何因名位無時暫安故知官爵𢎞之在人不由安塟所致其義六也野俗無識皆信塟書巫者誑舊唐書作祚其吉㐫愚人因而㑹要作此徼倖遂使擗踊之際擇塟地而希官品荼毒之秋選塟時以規財禄或云辰日不宜哭泣遂莞爾而受弔問三字舊唐書作對賔客受弔或云同屬忌於臨壙乃吉服而不送其親聖人設教豈其然也塟書敗俗一至於斯其義七也折滯論盧藏用藏用常以俗多拘忌有乖至理乃著折滯論以暢其事詞曰客曰天道𤣥微鬼神一作神理幽化聖人所以法象衆庶由其運行是故太昊一作大撓造甲子容成著律厯黃公裁變𤣥女啓謨八門御時六神直事從之者則家一作兵強國富違之者則輔一作将弱朝危有同影響若合符契先生亦嘗聞之乎主人曰何為其然也子所謂曲學所習懦儒一作昧所守徒識偏方之小一作詭說未究大道一作亨衢之通論盖易曰先天不違傳稱人神之主範圍不過三才所以虚中進退非邪百王所以無外故曰國之將興聴於人將亡聴於神又曰祻福無門唯人所召人無釁焉妖不自作由是觀一作言之得失興亡並關人事吉㐫悔吝無渉天時且皇天無親惟徳是輔為善者天降之福不善者天降之殃髙宗脩徳桑榖以變宋君引過法星退舍此天道所以從人者也古之為政者刑獄不濫則人夀賦歛蠲减一作省則人富法令有恒則國静賞罰得中則兵強所以禮者士之所歸賞者士之所死禮賞不倦則士争先赴一無赴字苟違此途雖卜時行刑擇日出令必無成功矣自季代一作叔世遷訛俗多徼倖競稱恠力争勝一作誦詭言屈政教而就孤虚棄信賞而從推歩附㑹前史變易舊經依託空文以為徴驗一作據覆軍敗將者則隐秘無聞偶同幸中者則共相崇一作文餙豈唯聴之増感亦乃學人自是嗚呼時俗訛謬一至此焉夫夫一作著者甲子興師非成功之日往亡用事異制勝之時一作辰苟脩其徳一作人事苟脩何往不濟夫夫一作至若環城自守接陣重圍無闗一作關地形不乖天道若兵強将智粟積城堅八字英華作兵強智積甲堅雖復屢轉魁剛頻移太嵗坐推白虎行計貪狼自符鷄鬪之祥多移蟻附之困故曰任賢使能則不時日而事利法審令正一作明法審令則不卜筮而事吉養勞貴功則不禱祀而得福此所謂天時不如地利地利不如人和故一無故字太公犯雨逆天時也韓信背水乖地利也並存人事俱成大業削樹而斬龎㳙舉火而屠張郃未必暗同嵗徳𡨕㑹日逰俱運三門並占四殺杜郵齒劔抑唯計沮垓下悲歌實階刓印若以並資厭勝不事良圗則長平盡坑固須恒濟襄城無噍亦可常保是知拘而多忌終䘮大功百姓與能必違小數金鷄樹上一作玉鶴方為楚國之殃髙畢枕中適搆淮南之禍刻符止一作指盗反更亡身被髪邀神翻招夷族吁嗟一作嗟乎威斗闕不􅓙赤伏之運築城斷岡何救素靈之哭火災不驗禆竈無力以窺天超乗階㐫王孫取監於觀徳九徴九變是曰長途人謀鬼謀良歸有道此並經史陳迹聖賢通規人逺乎哉詎宜滯執客乃蹙然避席曰鄙人困䝉不階至道請事斯語歸于正途而今而後方焚蓍龜毁律厯廢六合斥五行浩然清慮則将奚若答曰此所謂過猶不及也夫甲子所以紀一作配日月律厯所以通嵗時金木所以備法象龜蓍所以前人用一作筮吉㓙聖人以是神明徳行輔助謀猷存之則叶賛成功執之則凝滯於物消息之理一作義其在兹乎客于是循墻匍匐帖然無氣口喑一作坎心醉不知所以答矣一作皆舊書本傳隂陽不測之謂神論顧况黃帝建立甲子考定星厯於是有天地神人之官少昊既衰神人雜擾顓頊命羲和以司之天地三苗九黎不復亂逆周室既壊君不告朔漢道隆興方定餘閏世時昭昧一作方定大餘隨世昭昧君平季生張衡索紞陳訓韓友卜珝京房管輅郭璞干寳樂房班固云隂陽抱多忌以為無益嗟乎古論隂陽以和神人以順風雨以播稼穡以除災害後之學者但張恢譎不自戒慎以固親踈一作規親之道不精逆順之理不達性命之分而裁衣拜官沐浴剪爪徴於厯日豈不悖一作謬哉左道亂政先王無赦往見術者序卜筮之書及諸家秘訣七曜九宫六壬三五一作百復返十精飛鳥一作烏天目地耳計神漢厯以天赦母倉為吉祥厯以雲漢宻莫為吉各生異氣天竺聿法復與大演有差吾誰歸矣又以姓配音以音配墓以墓配殺此莊惠以荒唐舛駮之論且黄帝二十五子得其姓者十三人或以地為姓或以官為姓或以諡為姓或以王父字為姓士㑹在虞為陶唐氏在夏為御龍氏在商為豕韋氏在周為唐杜在晉為范宣子在隨為隨武子在秦為劉氏女嫁欒黶為祁氏焉此一人之身改一有正字姓三改氏五范蠡在陶為朱公在齊為鴟夷子范睢稱張禄先生第五倫王伯二字疑齊鮑永本姓包京房本姓李張良之後為留氏田横之後為王氏姓有兩字三字四字五字孰先孰後孰是孰非長平同坑南陽同封時日或同吉㐫或異行年本命其事安在周時玉尺漢代黃鐘河汾鼎氣沉埋自久不可仰則其道多門行則無盡不如疑也是故文字非上學上學神聴原其性也集觧非宗師宗師受授扶於理也端心静一神明將至黄帝遺𤣥珠罔象得之漢主心動獲貫髙襄子心動得豫讓披髮祭野野人之遺魂非有隂陽算術之功渉津無涯安濟所届􅇚氏五䕃輪為四生或居人中以為鬼神唯代有佛法獨能䆒竟白雲依山出入自得飛以疑鳥滅虚空不礙清明在躬志氣如神隂陽不測唯佛而己善惡無餘論牛僧孺易曰積善之家必有餘慶積不善之家必有餘殃則其善惡之迹俱無餘也不者善人之子不必皆惡若慶必加於善人殃必加於不善人予恐慶殃之謬加也力人而已余固曰善惡慶殃俱無餘也餘慶勸人之善餘殃誡人之惡則善人之子能有不恃慶怠於善者惡人之子能有不恣惡俟其殃者乎末代之君世禄之人先見萬乗之尊我八音之娯我五味之飽我黄金白璧之富我不知兄弟得道而傳之一有矣字己行不善而失之乃至乎萬乗為匹夫世家為皂𨽻烏謂餘慶之可恃乎父善及子乎子不善而父伐之石碏是也兄善及弟乎弟不善而兄殺之周公是也父母與兄弟不能令子弟之不善又可以恃餘慶於天下乎父惡殃子乎父出之而堯貴之虞舜是也母惡殃子乎母惡之而父好之鄭荘公是也兄惡殃弟乎兄伐而齊立之桓公是也父母兄弟不能攻子弟之善而况餘殃可累於天下乎且善者天下好之常道也惡者天下惡之亦常道也豈有將好惡先必稽其所自哉必不然矣若以勸善懲惡為意則當懲報復於身猶慮其不信况欲逺懲於身後而取人之信者乎又不然矣昔夫差信伍員初善也任宰嚭終惡也初善覇天下終惡滅全呉前慶後殃者皆身也太甲放桐宫初惡也任伊尹終善也初惡受拘囚終善復天下前殃後慶亦身也呉之嗣可以前慶後殃殷之嗣可以前殃後慶乎予固謂殃慶皆復於身也不復乎子孫也然予敢謂善必慶而貴惡必殃而賤也所以貴者道貴也所以賤者道賤也道之貴乎孔父素王也道之賤乎殷辛獨夫也餘慶餘殃吾則不信之矣㝠數有報論李徳裕宣父集作尼罕言性命不語恠神非謂無也欲人嚴三綱之道奉五常之教脩天爵以致人爵不欲信集作言富貴在於天命福禄由於𡨕數昔衞卜協於沙丘為諡己久秦塞屬於臨洮名子不寤朝歌未滅而周流丹鳥矣白帝尚在而漢斷素蛇矣皆兆發於前而符應於後不可以智測也集作矣周孔與天地合徳與鬼神合契將來之數無所遁情而狼䟦於周鳯衰於楚豈親戚之義不可去也人倫之教不可廢也條侯之貴鄧通之富死於兵革可也死於女室可也唯不宜以餒終此又不可以理得也而命有時來盗有名器者謂禍福出其集作於胷懐榮枯生其一作於口吻沛然而安嗑集作溘然而笑曽不知黃雀逰於茂樹而挾彈者在其後也余乙丑嵗自荆楚保釐東周路出方城聞有隐者居於泥塗不知其所如也姓姜不知其名徃謂方城長曰居守後三集作二年南行萬里則知憾余者必因集作自天譴譛余者必自鬼謀雖抱至寃不以為恨矣集作也余嘗三遇異人非卜祝之流皆遁世者也初掌記北門有管涔山隐者謂余曰君明當在人君左右為文翰之職然須值少主余聞之􅌓集作愕眙洒然變色隐者似集作亦悔失言避席求去余徐問曰何為而事少主對曰君與少主己有累世因縁集作縁業是以言之余其年秋登朝至明年正月穆宗纉緒召入禁苑及為中二字集作尸丞御史有閩中隐者叩門請見余因下榻與語曰時事非久公不早去冬必作相禍将至矣若亟請居外代公者受患公集無公字後十年終當作相自西南而入是秋出鎮呉門嵗經八稔英華作經嵗入覲尋又杖鉞南燕秋暮有邑子于集作王生引鄴郡道士而至纔升賔階未及命席謂余曰公當為西南節制孟冬望舒前符節至矣三者皆與言協不差嵗月自憲闈竟十年居相由西蜀而入代余執憲者俄亦竄逐唯再謫南服未嘗有前知之士士字集作者為余言之豈禍患不可前告集作移者神道所秘莫得預聞乎自古銜寃殁世者多矣冥報之事或有或無遂使好亂樂禍者以神道為茫昧余嘗論之仁人上哲皆集作必達生知命如顔氏之子犯而不校􅇚門達摩了空喻幻必不思報矣其下柔弱無心者力不能報所能報者乃中人耳集作矣強悍任氣如伯有灌夫之流亦在其臨殁之際方寸不撓魂魄不散唯結念於此是以能報夫人之捨生也如薪盡火滅溘然而散則無能為矣其達於道集作理者使心不亂則精爽常存終始集無此二字不生不滅自可以超然出世升濟神明其次精多魂強則能為厲𡨕報之事或有或無理在此也禱祠集作祝論聖人二字集作語曰某之禱久矣又曰祭則受福豈非聖人與天地合徳與鬼神合契無所請禱而禱必感通唯牧伯之任不可廢也失時不雨稼穡将枯閉閤責躬百姓不見若非遍走羣望則皆謂太守無憂人之意雖在畎畆不絶歎音余前在江南毁滛祠一千一十五所可謂不諂神黷祭矣然嵗或大旱必命集作令掾属祈請積旬無效自躬行未嘗不零雨隨車或當宵而應其術無他唯至誠而已将與祭必閒居三日清心齋戒雖禮未申於泂酌而意己接於神明所以理郡八年嵗皆大稔江南集作左黎庶謳謡至今古人乃有剪爪致詞積薪自誓精誠集作意上達雨必滂沱此亦至誠也苟誠能達天信能及物焉用以肌膚自苦焦爛為期動天地感鬼神莫尚於至誠故備物不足報功禴祭所以受福余以為人患不誠天之去人不相逺矣隂徳論陳平稱吾多隂謀道家之所禁吾世即廢亦己矣不能復起七字蜀本作終不復興以吾多隂禍也至曽孫何國絶班生著陳平之言以為世戒理當然矣而邴丞相纔及子顕黜為關内侯至孫昌乃絶國絶三十二嵗復續而張湯杜周子孫世有令名皆在􅂋位其故何哉邴丞相於漢宣之徳可謂至矣晉荀息以忠貞之故不敢負獻公程嬰以託孤之義不忍欺趙氏所以繼之以死終不食言邴丞相於史皇孫㣲君臣之分無親戚之情而保養曽孫仁心惻隐置於閒燥給以私財介然拒天子之使因是全四海之命漢書稱因赦天下郡邸獄繋者是恩及四海也又奏記霍光决定大策既而顕徴卿英華作君非之美削士伍之辭其深厚不伐古所未有夏侯勝以為有隂徳者必饗其樂以及子孫是宜篤生賢人世濟其美古所謂有後者良謂是矣焉在傳爵邑而己哉張杜有後者豈用法雖深而所治者或能去天下之惡除生人之害所以然也文苑英華巻七百四十
