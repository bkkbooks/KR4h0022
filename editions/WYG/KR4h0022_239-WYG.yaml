body:
  text: 文苑英華巻二百三十九宋李昉等編寺院七塔附姚鵠二首馬戴六首顧非熊一首薛能五首李頻三首李郢一首皮日休三首鄭谷九首杜荀鶴三首張喬八首周繇四首楊夔二首張蠙三首曹松四首周朴六首羅隠四首裴説五首野寺寓居即事二首姚鵠南山色當户初日半簷時鶴去卧看逺僧來嫌起遲忩明雲影斷庭曉樹隂移何處題新句連谿密葉垂二古寺更何有當庭唯折幢伴僧青蘚榻對雨白雲窓暝色坐前嶺離魂隔逺江沙洲半藜草飛鷺白䨇䨇題石甕寺馬戴僧室並皇宫雲門輦路同渭分䨇闕北山迥五陵東脩緶懸林表深泉汲洞中人煙窺蛭蟻鴛瓦拂冥鴻蘚壁松生峭龕燈月照空稀逄息心侣獨禮竺乾公題静住寺欽用上人房前人寺遶朝天路多聞玉佩音鑒人開慧眼歸鳥息禪心磬接星河曙窓連夏木深此中能一作閒宴坐何必在雲林宿翠微寺前人處處松生滿樵開一逕通鳥歸霜集作金磬盡僧語石樓集作橋空積翠含微集作明月遥泉韻細風經行心不厭集作已似在集作憶故山中宿無可上人房集作宿翠微寺前人稀逢息心侣細話逺集作故山期河集作雲漢秋生集作深夜杉梧露滴時風傳林磬久集作響月掩集作螢掠草堂遲坐卧禪心在浮生皆不知題興善寺英律師院前人虗室燃集作焚香久㸔心悟㡬生濾泉侵月起掃徑避蟲行樹隔前朝在苔滋廢渚平我來風雨夜像設一燈明題盧山寺前人白茅為屋宇編荆數處堦墀石疊成東谷笑言西谷響下方雲雨上方晴鼠驚樵客縁蒼壁猿戱山頭撼紫檉别有一條投澗水竹筒斜引入茶鐺姚巖寺路懐友顧非熊路向姚巖寺多行澗壑間鶴聲連塢静溪色帶村閒踈葉秋前渚斜陽雨外山憐一作羡君不得見詩思最相闗夏日寺中有懐薛能亭午四隣睡院中唯鳥鳴當門塞鴻去欹枕世人情地燥春苔裂天凉晩月生歸家豈不願辛苦未知名夏日蒲津寺居二首前人日日閒車馬誰來訪此身一門兼鶴静四院與僧隣雨室牆穿溜風窓筆染塵集作茵空餘氣長在天子用平人二故國有如一作餘夣省來長逺逰清晨起閒院踈雨似深秋宿寢書稜疊行吟杖跡稠天晴豈能出春暖未更裘北都一作京題崇福寺寺即髙祖舊宅前人此地潜龍寺何基即帝臺細花庭樹䕃清氣殿門開長老多相識旬休暫一來空空亦擬解干進幸無媒題龍興寺前人髙户列禪房松門到上方像開祗樹嶺人施蜀城香地遍磷磷石江移孑孑檣林僧語不盡身役集作後事梁王秋宿慈恩寺遂上人院李頻滿閣終南色清秋獨倚欄風髙斜漢動葉下曲江寒帝里求名老空門見性難吾師無一事不似在長安暮秋宿清源上人院前人野客愁來日山房木落中微風生夜半積雨向秋終證道方離法安禪不住空迷途將覺路語黙見西東秋夜宿重本上人院前人却憶凉堂坐明河㡬度流安禪逄小暑抱疾入髙秋水國曽重講雲林半舊逰此來㸔月落還似道相求宿憐上人房李郢重公舊相識一夕話勞生藥裹闗身病經函寄道情嶽寒當寺色灘夜入樓聲不待移文誚三年别赤城逰栖霞寺皮日休不見明居士空山但寂寥白蓮吟次缺青靄坐來銷泉冷無三伏松枯有六朝何時石上月相對論逍遥題潼關蘭若前人潼津罷警有招提近百年無戰馬嘶壯士不言三尺劔謀臣休道一丸泥昔時馳道洪波上今日宸居紫氣西關吏不勞重借問棄繻生擬入耶溪題興善寺寂上人院鄭谷客來風雨後院静似荒凉罷講蛩離砌思山葉滿廊臘髙興故疾爐煖發餘香自說匡廬側杉隂半石床題興善寺前人寺在帝城隂清虚勝二林蘚侵隋畫暗茶助越甌深巢鶴和鍾唳詩僧倚錫吟煙莎後池水前跡杳難尋十才子詩集多有興善寺後池之作今寺在池蕪沒毎用追歎舟次通泉精舍前人江清如洛汭寺好似香山勞倦孤舟裏登臨半日間樹凉巢鶴健巖響語僧閒更共幽雲約秋隨絳帳還時谷將之盧州省拜恩也宿澄泉蘭若前人山半古招提空林雪月迷亂流分石上斜漢在松西雲集寒庵宿猿先曉磬啼此心如了了抵此是曹溪題莊巖寺休公院前人秋深庭色好紅葉間青松病客殊無着吾師甚見容踈鍾和細溜孤塔等遥峯未省求名侣頻於此地逄慈恩寺偶題前人徃事悠悠添浩歎勞生擾擾竟何能故山嵗晩不歸去髙塔晴來獨自登林下聽經秋苑鹿江邊掃葉夕陽僧吟餘却起䨇峯念曽㸔庵西瀑布氷次韻和秀上人長安寺居言懐寄渚宫禪者一作師前人舊齋松老别多年蓮一作鄉社人稀䘮亂間出寺只知趨内殿閉門長似在深山卧聽秦樹集作甸秋鍾斷吟想荆江夕鳥還唯恐興來飛錫去老郎無路更追攀少華甘露寺前人石門蘿徑與天隣雨檜風篁逺近聞飲澗鹿喧䨇𣲖水上樓集作登山僧踏一梯雲孤煙薄暮闗城沒逺色初晴渭曲分長憶集作欲燃香來此宿北林猿鶴舊同群七祖院小山前人小巧功成雨蘚斑軒車日日扣松闗峨嵋咫尺無人去却向僧窓㸔假山題戰島僧居在江之心杜荀鶴師愛無塵地江心島上居接船求化慣登陸赴齋踈載土春栽竹集作樹抛生日餧魚入雲蕭帝寺畢竟欲何如題兠率寺閑上人院前人人間寺應諸天號真行僧禪此寺中百嵗有涯頭上雪萬般無染耳邊風挂帆波浪驚心白上馬塵埃翳眼紅畢竟浮生謾勞役筭來何處不歸空中山臨上人院觀牡丹寄諸從弟集作事前人閒來吟遶牡丹叢花艷人生事略同半雨半風三月内多愁多病百年中開當韶景何妨好落向僧家即是空一别竟無唯有此忍教醒坐對支公題山僧院張喬谿路曾來日年多與舊同地寒松影裏僧老磬聲中逺水清風落閒雲别院通心源若無礙何必更論空逰靈山寺前人樹凉青島寺虚閣敞禪扉四靣閒雲入中流獨鳥歸湖平幽徑近船泊夜香微一宿秋風裏煙波隔𢷬衣逰歙州興唐寺前人山橋通絶境到此憶天台竹裏尋幽徑雲邊上古臺鳥歸殘照出鍾斷細泉來為愛澄溪月因成隔宿廻題詮律師院前人院凉松雨聲相對冇山情未許谿邊老猶一作還思嶽頂行紗燈留火細石井灌瓶清欲問吾師外何人得此生金山寺空上人院前人已老金山頂無心上石橋講移三楚遍梵譯五天遥板閣禪疑秋月銅瓶汲夜潮自慙昏醉客來坐亦通宵題廣信寺前人亭北敞靈溪林梢與檻齊野雲來影逺沙鳥去行低晩渡明村火晴山響郡鼙思鄉值摇落頼不有猿啼逰少華山甘露寺前人少華中峯寺髙秋衆景歸地連秦塞起河隔晉山微晩木蟬相應凉天雁並飛殷勤記巖石只恐再來稀甘露寺僧房前人臨水登山路重尋旅思勞竹隂行處宻僧臘别來髙逺岫明寒火危樓響夜濤悲秋不成寐明月上千艘登甘露寺周繇盤江上㡬層峭壁半垂藤殿鎖南朝像龕禪外國僧海濤樁砌檻山雨灑牕燈日暮踈鍾起聲聲徹廣陵甘露寺東軒前人毎日憐晴眺閒吟只自娛山從平地有水到逺天無老樹多封楚輕煙暗染吳雖居此廊下入户亦踟蹰甘露寺北軒前人曉色宜閒望山風逺益清白雲連晉閣碧樹盡蕪城水静沙痕出煙消火野平最堪佳此境為我長詩情題金陵栖霞寺贈月公前人出家不要買山錢施作清池一作花宫種白蓮松檜老依雲外地樓臺深鎖洞中天風經絶頂廻踈雨石倚危屏挂落泉欲結茅庵伴師住肯饒多少薜蘿煙題甘露寺楊䕫髙殿拂雲霓登臨想虎溪風匀帆影衆煙亂鳥行迷北倚波濤闊南窺井邑低滿城塵漠漠隔岸草萋萋虚閣延秋磬澄江響暮鼙客心還惜去新月挂樓西題宣州延慶寺益公院咸通中入講極承恩澤前人嘿坐能除萬種情臘髙兼有賜衣榮講經舊說傾朝聽登殿曽聞降輦迎幽逕北連千嶂碧虚窓東望一川平長年門外無塵客時見元戎駐斾旌題紫閣院張蠙上方人海外苔徑上千層洞壑有靈藥房廊無老僧古巖雕素像喬木挂寒燈毎到思脩隠將廻欲不能宿山寺前人中峯半夜起忽覺在青冥此界自生雨上方猶有星樓髙鍾尚集作獨逺殿古像多靈好是潺湲水房房伴誦經宿開照寺光澤上人院前人静室譚𤣥㫖清宵獨細聽真身非有像至理本無經鍾定遥聞水樓髙别見星不教人觸穢偏說此山靈書翠巖寺壁曹松何年話尊宿瞻禮此堂中入郭非無路歸林自學空濺瓶雲嶠水迸磬雪川風時說南廬事知師用意同題甘露寺前人禪集作香門接巨壘集作疊非畫閣本作角間清鍾北固一何峭西僧多此逢天垂無際海雲白久晴峯旦暮燃燈外濤頭振蟄龍宿溪僧院前人年少雲溪裏禪心夜更閒煎茶留静者靠月坐蒼山露白鍾尋定螢多户未闗嵩陽有集作大石室何日巻經還山寺引泉前人劈碎琅玕意有餘細泉髙引入香厨山僧未肯言根本莫是銀河漏泄無題甘露寺周朴層閣疊危壁瑞因一作因成千古名㡬連揚子路獨倚潤州城雲共銜江色鵰髙背磬聲僧居上方久端坐見營營題元公院前人院深塵自外集作幽深自塵外如佛值元公常跡集作䟽或非集作悲次志門因得中衣巾離暑氣床榻向凉風是事不逾分祗應明德同福州一作唐東禪寺集作院前人甌閩在郊外師院號東禪物得居來正人經綸集作論後賢瓟集作絶槽柳塞馬蓋地月支綖集作筵鸛鵲尚集作更巢頂唯堪舉世傳宿玉泉寺前人野寺度殘夏空房欲暮一作卧時夜聽猿不睡秋思客先知竹逈煙生薄山髙月上遲又登塵路去難與老僧期福州神光寺塔前人良匠用材為塔了神光寺更得集作裏更髙名風雲㑹處千尋出一作直日月中時八靣明海水旋集作即流倭國野天文方戴集作載福州城相輪頂上望浮世塵裏人心應總集作早晩平福州開元寺塔前人開元寺裏七重一作層塔遥對方山影擬齊雜俗人㸔離世界集作境孤髙僧上集作坐覺天低唯堪片片紫霞映集作雲外不與濛濛白霧迷心若無私羅漢在參差免向日虹西春日獨逰禪智寺羅隠逺樹連天水接空㡬年行樂舊隋宫花開花謝一作落長一作還如此人去人來自不同蠻鳯調高何處酒吳牛蹄健滿車風思量只合騰騰醉煑海平陳盡夢中蠻鳯調京本作鸞鳯詞封禪寺居前人盛禮何由覩嘉名偶寄居周南太史淚蠻徼長一作子卿書砌竹摇風直庭花滴集作泣露踈誰能賦秋興千里隔吾廬金山僧院前人根盤蛟蜃路藤蘿四靣無塵輟棹過得似吾師始惆悵眼前終日有風波春日湘中題嶽麓寺僧院集作舍前人蟾宫虎穴兩皆休來凭危欄送逺愁多事林鶯還謾語薄情邊雁不廻頭春融只恐集作待乾坤醉水濶深知世界浮欲共髙僧話心跡野花荒集作芳草柰相尤道林寺裴説獨立凭危欄髙低落照間寺分一𣲖水僧鎖半房山對靣浮世隔垂簾到老閒煙雲與塵土寸步不相闗般若寺前人南嶽古般若自來天下知翠籠無價寺光射有名詩一水湧獸跡五峯排鳯儀髙僧引閒步晝出夕陽歸一作髙僧閒引步畫出夕陽時兠率寺前人一片無塵地髙連夣澤南僧居跨鳥道佛影照漁潭朽枿雲斜映平蕪日半涵行行不得住廻首望煙嵐鹿門寺前人鹿門山上寺突兀盡無塵到此修行者應非取次人鳥過驚石磬日出礙金身何計生煩惱虚空是四隣題岳州僧舍前人喜到重湖北孤州一作舟横晩烟鷺銜魚入寺鵶接飯隨船松檜君山逈菰蒲夢澤連與師吟論處秋水浸遥天文苑英華巻二百三十九
