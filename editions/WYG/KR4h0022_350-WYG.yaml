body:
  text: 文苑英華巻三百五十宋李昉等編雜歌下麗人行一首白絲行一首憶惜行一首百憂集一首徒歩歸行一首偪仄行一首負薪行一首最能行一首狂歌行一首扶風豪士歌一首君不見一首老去也一首追昔行一首醉春風一首隣相反行一首馬嵬行一首麗人行杜甫三月三日天氣新長安水邉多麗人態濃意逺淑且貞肌理細膩骨肉匀繡羅衣裳朝暮春蹙金孔雀銀麒麟頭上何所有翠為匌集作葉垂鬂脣背後何所見珠壓腰支集作衱穏稱身就中雲幕椒房親賜名大國虢與秦紫駝之峯出翠釡水精之盤行素鱗犀筯厭飲乆未下鑾刀縷切空紛綸黄門飛鞚不動塵御厨絲絡集作絡繹送八珎簫皷哀吟感鬼神賔從合呇集作雜遝實要津後來鞍馬何逡廵當道集作軒下馬入錦茵楊花雪落覆白蘋青鳥飛去衘紅巾炙手可熱勢絶倫慎莫向集作近前丞相嗔白絲行前人繰絲湏長不湏白越羅蜀錦金粟尺集作矜赫燡象床玉手亂殷紅萬草干花動凝碧已悲素質隨時改集作染裂下鳴機色相射羙人細意熨帖平裁縫㓕盡針線跡春天衣着為君舞蛺蝶飛來黄鸝語落絮遊絲亦有情隨風照日冝集作疑輕舉香汗清塵似㣲汙集作輕塵汙顔色開新合故置何許君不見志集作才士汲引難恐懼棄捐忍覊旅憶昔行二首前人憶昔先皇廵朔方千乗萬騎入咸陽隂山驕子汗血馬長驅東胡胡馬藏鄴城反覆不足怪闗中小兒壊紀綱張后不樂上為忙至今今上猶撥亂勞身集作心焦思補四方我昔近侍叨奉引兵出集作出兵整肅不可忘集作當為留猛士守未央致使岐雍防西羌犬戎直來坐御床百官跣足隨天王願見北帝傅介子老儒不用尚書郎二憶昔開元全盛日小邑猶藏萬家室稻米流脂粟米白公私倉廪俱豐實九州道路無豺虎集作狼逺行不勞吉日出齊紈魯縞車班班男耕女桑一作蠶不相失宫中聖人奏雲門天下朋友皆膠漆百餘年間未災變叔孫禮樂簫何律豈聞一絹值萬錢有田種榖今流血洛陽宫殿焚燒集作燒焚盡宗廟新除狐兎穴傷心不忍問耆舊復恐初從亂離説小臣魯鈍無所能朝廷記識䝉禄秩周宣中興望我皇灑血一作涙江漢身衰疾百憂集行前人憶年十五心尚孩徤如黄犢走復來庭前八月梨棗熟一日上樹能千廽即集作只今倐忽已五十坐卧只多少行立强將笑語供主人悲見生涯百憂集入門依舊四壁空老妻覩我顔色同痴兒未知父子禮呌怒索飯啼門東徒歩歸行見三百四十巻偪仄行贈畢耀未敢前篇作不敢已令請給㑹通籍集作已令把牒還諸假速宜集作經湏此詩合入歌行門縁英華誤編在二百一十巻今不重録負薪行前人夔州處女髪半華四十五十無夫家更遭䘮亂嫁不售一生抱恨堪集作長咨嗟土風坐男使女立應門當户女出入十猶集作有八九負薪歸賣薪得錢應集作當供給至老雙鬟只垂頸野花山葉銀釵並筋力登危集市門死生射利兼塩井靣装首飾雜地痕地􅄶衣寒困石根若道巫山女麤醜集作澁何得此有昭君村最能行前人峽中丈夫絶輕死少在公門多在水冨豪有錢駕大舸貧窮取結行艓子小兒學問止論語大兒結束随商旅欹㠶側柂入波濤撇旋梢濆無險阻朝發白帝暮江陵頃來目擊信有徴瞿唐漫天虎鬚集作眼怒歸州長年與集作行最能此鄉之人噐集作氣量窄悞競南風踈北客若道土無英俊才何得山有屈原宅狂歌行贈四兄前人與兄行年校一嵗賢者是兄愚者弟兄將富貴等浮雲弟功切名好權勢長安秋雨十日泥我曽集作曹鞲馬聽晨鷄公卿朱門未開鎻我曹已到肩相齊吾兄睡穏方舒膝不韈不巾踏曉日男啼女哭莫我知身上湏繒腹中實今年思我來嘉州嘉州酒重一作香花繞樓樓頭喫酒樓下卧長歌短歌集作詠還相酬四時八節還拘禮女拜弟妻男拜弟幅巾鞶帯不掛身頭脂足垢何曽洗吾兄吾兄巢許倫一生喜怒長任真日斜枕肘寢已熟啾啾唧唧何為人扶風豪士歌李白洛陽三月飛胡沙洛陽城中人怨嗟天津流水波赤血白骨相撑如亂麻我亦來奔溧溪上集作東奔向呉國浮雲四塞道路賖東方日出啼早鵶城門人開掃落花梧桐楊栁拂金井來醉扶風豪士家扶風豪士天下竒氣意相傾山可移作人不倚將軍勢飲酒豈顧尚書期彫盤綺食㑹衆客呉歌趙舞香風吹原嘗春陵六國時開心冩意君所知堂中各有三千士明日報恩知是誰撫長劔一揚眉清水白石何離離脱君集作吾㡌向君笑飲君酒為君吟張良未遂集作逐赤松去圯橋集作橋邉黄石知我心君不見薛逄君不見馬侍中氣呑河朔稱英雄君不見韋太尉二十年前鎮蜀地一朝㝠漠歸下泉功業聲名两憔悴奉誠園裏蒿棘生長興街南沙路平當時帯礪在何處今日子孫無地耕或聞覊旅丼常調簿尉文參各天表清明縱便天使來一把紙錢風樹杪碑文半缺碑堂催祁連塜象狐兎開野花似雪落何處棠棃樹下香風來馬侍中韋太尉盛去衰來片時事人生倐忽一夣中何必深深固權位老去也前人惆悵人生不滿百一事無成頭雪白廻㸔㓜累與老妻俱是途中逺行客匣中舊鏡照膽明昔曽見我髭未生朝巾暮櫛不自省老皮皺皺文縱横合掌髻子蒜許大此日方知非是我暗數七旬能㡬何不覺中腸熱如火老去也争柰何敲酒盞唱短歌短歌未竟日已沒月映西南庭樹柯追昔行前人朝光如飛猶尚可暮更如箭不容卧揵為穿城更漏頻一一皆從枕邉過一夕凡㡬更一更凡幾聲青春枉向鏡中老白髪虚從愁裏生曽窺帝里東隣女自比桃花鏡中許一朝嫁得征戍兒荷戈千里防秋去去時只作旦暮期别後生死俱不知風驚粉色入蟬鬂愁送鏡花潜堕枝前年因出長安陌見一女人頭雪白日中扶杖憇樹隂髣髴形容認相識向予吁嗟還獨語曽與君家隣舍住當時妾嫁與征人幾向墻頭誚夫主花開葉落何推遷屈指數當三十年頭眉薤葉同枯葉琴上朱絃成斷絃嫁時寳鏡依然在鵲影菱花滿光彩夣裏長嗟離别多愁中不覺顔容改歎息人生能幾何喜君顔貎未蹉跎因君下馬重相顧請奏青門腸斷歌醉春風前人去年春似今年春依舊野花愁殺人犍為縣裏古城上開是好花飛是塵戱蝶狂蜂相徃返一枝花上聲千萬時節先從暖處開北枝未發南枝晩江城太守鬚髯蒼忽然置酒開華堂歌兒舞女亦隨後暫醉始知天地長頃年曽作東周掾同舍尋春屢開宴斗門亭上栁如絲洛水橋邉月如練洛陽風俗不禁街騎馬夜歸香滿懐坐客争吟雲碧句羙人醉贈珊瑚釵日徃月來何草草今年又校三年老槽中駿馬不能騎惆悵落花開滿道為報時人知不知㸔花對酒定無疑君㸔野外孤墳下石羊石馬是誰家隣相反行前人東家有兒年十五只向田園獨辛苦夜開溝水遶稻田曉叱耕牛墾塉土西家有兒纔弱齡儀容清峭雲鶴形渉書獵史無早暮坐期朱紫如拾青東家西家两相誚西兒笑東東又笑西云養志與榮名彼此相非不相調東家自云雖辛苦躬耕早暮及所一作莫及親男舂女㸑二十載堂上未為衰老人朝機暮織還充體餘者到兄還及弟春秋伏臘長在家不許妻孥暫違禮爾今二十方讀書十年取第三十餘往來途路長離别幾人便得昇公車縱令得官一作貴身湏老衘恤終天向誰道百年骨肉歸下泉萬里枌榆長秋草我今躬耕奉所天耘鋤刈穫當少年面上笑添今日喜肩頭薪續厨中煙縱使此身頭雪白又有兒孫還稼穡家藏一巻古孝經世世相傳皆得力為報西家知不知一作不何湏謾笑東家兒生前不得供丼滑歿後揚名徒爾為馬嵬行劉禹錫緑野扶風道黄塵馬嵬驛路邉楊貴人墳髙三四尺乃問里中兒皆言幸蜀時軍家誅佞幸天子捨妖姬群吏伏門屏貴人牽帝衣低徊轉羙目風日為無暉貴人飲金屑倐忽蕣英暮平生服杏丹顔色真如故属車塵已逺里巷來窺覷共愛宿粧妍君王盡眉處履綦無復有履組光未㓕不見巖畔人空見凌波韈郵童愛蹤跡私手解鞶結傳㸔千萬眼縷絶香不歇指環照骨明首飾敵連城將入咸陽市猶得賈胡驚文苑英華巻三百五十
