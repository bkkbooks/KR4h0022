body:
  text: 文苑英華巻四百二十四宋李昉等編赦書五禋祀赦書一赦書沈約門下朕昧旦一作爽夙興念兹治道而明不燭逺𢎞之未易仰尋先烈思致隆一作升平日頃多故戎役一作車代有軍政國容事緒非一刑禮叅用未臻和簡向隅之情永言増歎今郊禋載洽幽明允從思隆一作崇嘉祉被之兆庶可大赦天下主者施行一作皆初學記南郊恩詔門下卜日禋饗政道莫先厚下布澤哲王是務朕仰祗靈眷俯臨億兆嵗象廻環恭事亡及牲玉必荐感敬備申升煙燎於穹昊致精誠於太一思霑颽可亥切南風也潤惠兹窮生應天監三年内犯奪勞及左降可悉原降繼市職不充人身及家口質繫悉散還私家督備前嵗三五犯譴因及隨曹景宗授司州委叛應讁役者並量所蠲降尚書所檢巧陳滛辭普更開恩百日各聽自首不問徃罪京師三縣尤窮之民詳加賑恤主者速條格施行南郊恩詔門下朕肅膺乾貺君臨率土雖日晏劬勞而仁恕未洽星琯驟廻履端告始禋饗云備誠敬廉一作兼申宣和布澤情深待旦凡内外文武可各賜勞一年叛亡未擒若百日内自首還役不問徃罪女子質繋悉且散遣文書輕重坐罪並皆從原主者詳為條格疾速施行南郊赦書張九齡門下朕獲主三靈于今一紀聼政中昃每不敢康觀書乙夜將求諸道頻年已來每思至理詔令作為理思至或逺人不率或嗣嵗不登淳朴未還惕厲斯在為人上而慙德奉天明以畏威故祝史宣辭必期於陳信郊丘備禮將俟於昇平今正宗廟降靈克開厥後乾坤交泰保合太和麟鳳龜龍𤣥符黄瑞之祉蠻夷戎狄梯山航海之琛莫不日月以聞道路相属顧惟不德承兹休運欽若昭報疇咨故實所以今年獻春恭祠詔令作祀后土季秋吉日追崇九廟採必先於魯集作曽經稽肆類於虞典爰因長至欽謁上𤣥告受命之元符昭嚴配之成績大典云備至誠克展諸侯駿奔來於穆之相百神受職率咸秩之文六變已陳三獻斯畢盖春秋之大事莫先乎祀王者之盛禮莫重於郊柴燎克終感慶罔極豈予一人之福亦爾萬邦之頼宜因咸和之際俾承厚下之澤可大赦天下自開元十一年十一月十六日昧爽已前罪無輕重已發覺未發覺已結正未結正繋囚見徒大辟罪已下咸赦除之其十惡死罪造偽頭首刼賊殺財主在不赦例就中仍慮有寃濫者所司具狀送中書門下盡理詳覆奏聞朕將親覽其有亡命山澤挾藏軍器百日不首復罪如初敢以赦前事相告言者以其罪罪之升壇行事官及供奉官三品已上賜爵一級四品已下加一階諸獻官并凖此升壇例内外文武官及致仕并前資陪位者賜勲一轉縁大禮有職掌并押當者更加一階齋郎並放出身皇親諸親陪位未出身者並放選已出身者賜勲一轉親王公主各與一子官三品衛監門黄衣長上飛騎萬騎并仗内雜色人在齋宫宿衛及諸色人有資勞人縁大禮有職掌并流外行署預見大禮者亦賜勲一轉其充香爐執扇及禮生祝史賛者賜勲外簡日選優與處分兵士宿衛齋宫并諸色無資勞縁大禮職掌及京兆府百姓縁南郊祗應者各免其家一年雜科差南北衛將軍率中郎將宿衛齋宫者並同升壇例其諸軍節度大使及三都留守雖不陪位委寄既重特宜同升壇官例百嵗老人賜綿帛五叚粟五石縣令至其家存問給付孝子順孫義夫節婦旌表門閭終身勿事已旌表者量加優恤諸州百姓或因逢水旱流寓未安者宜令所司與朝集使即作賑乏一作恤安輯法奏聞其單貧衛士畨鎮久次令州府長官簡擇灼然者放免畨役征行人家州縣檢校勿使侵欺磧西鎮人途路懸􅊬一作逺特宜賜勲一轉鰥寡惸獨亦令州縣倍加矜恤使得存濟元置義倉救人不足承前貸百姓糧及種子未納者並放免不得却徵自古聖帝明王忠臣烈士名山大川並令所􅃹致祭其已得賛官人并輕詔令作轉累未得處分非老弱疾病猶堪處事者量加收叙使免失職其左貶官非逆人五服内親及犯贓賄名敎者所司實勘奏聞量移近處其官人有清白政術堪任刺史縣令及抱器懷才不求聞達者州長官具以名薦宗室中有孝悌才術為衆所知仍在卑任者委宗正具以名奏君臣一體休戚共焉朕欽承天命恭傳大寶盖慿累祖餘業得一之符亦由群公舊勲不二之力永言繄頼其敢忘之自武德已來實封功臣知政宰輔有身無大故而亡官失爵子孫淪屈者所由勘實具以狀聞存者可籌其官榮逝者當録其𦙍嗣使幽明同慶知有今辰亞獻邠王守禮終獻寧王憲各賜物一千疋捧爼申王撝夾侍岐王範薛王業各賜物㭍百疋侍中源乾曜中書令張說兵部尚書同中書門下三品王晙各賜物伍百疋正衣駙馬都尉王守一王繇温曦宗正少卿崔澄各賜物三百疋二王後賜物一百五十疋壇塲使京兆尹孟温禮賜物二百疋脩造羽儀使賜物一百疋脩撰儀注官五品已上賜物一百疋六品已下賜物七十叚自餘陪位預宴官一品賜物一百疋二品三品八十疋四品五品六十疋六品七品四十疋八品九品三十疋鴻臚諸蕃使與見大禮及在本蕃王侯大酋長並同宴會例給賜郡主縣主各賜物八十疋縁大禮數處有職掌者任於一頭從高叙天下州府賜酺三日京城五日前任所在百姓村坊宴樂不得科率聚歛其有處分未該者令所司及本使比類奏聞赦書日行五百里主者施行東封赦書門下朕聞天監惟后后克奉天既合德以受命亦推恩而復始厥初作者七十二君道洽德集作跡著時至符出皆用事于介丘升中於上帝人神之望盖有以塞之皇王之序固可得而言也朕接統千嵗承光五葉惟宗祖之德在人惟天地之靈作主往有内難幽賛而集大勲間無外虞守成而纉舊服未嘗不乾乾終日思與公卿大夫上下叶心聿求至理以𢎞我列聖其庶幾乎馨香今九有大寧群氓樂業時必敬授而不奪物亦順成而無夭懋建皇極幸致太和洎乃幽遐率由詔令作皆感被戎狄不至集作軌唯文告而來庭麟鳳已臻將覺悟而在藪以故凡百執事亟言大封顧惟不德初欲勿議伏以先聖儲祉與天同功荷傳符詔令作慶以在今敢侑神而無報大節斯在朕何讓焉遂奉遵高祖太宗之業憲章乾封之典時邁東土柴告太岳詔令作岱岳集作岱宗精意上達肸蠁來應信宿行事雲物呈祥登降之禮斯畢嚴配之誠詔令作義獲展百神群望莫不懷柔四方諸侯莫不來慶斯事天道之介福邦家之耿光也無窮之休祉豈獨在予非常之惠澤宜其逮下可大赦天下自開元十三年十一月十三日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繋囚見徒咸赦除之唯十惡死罪不在此限詔令作例流人未逹前所者放還其有挾藏軍器亡命山澤百日不首復罪如初敢以赦前事相告言者以其罪罪之内外文武官三品已上賜爵一等詔令作級四品已下加一階邠王守禮寧王憲岐王範薛王業各與一子三品官公主嗣王郡主縣主各與一子官其應文武行從官加階之外並賜勲兩轉三衛引詔令作司駕細引黄衣長上飛騎彍騎先有武散官者加兩階未給武散官者各賜勲兩轉衛士馬主戎車主幕士掌閑供膳太常及仗内音聲人行署及蕃官七色并别勑雜色定名行從人亦賜勲兩轉縁大禮登山守行侍從行事轝脚等官三品已上特賜一階仍與一子生上品已下特賜一階仍賜勲兩轉量與進改其四軍别抽出山宿衛及諸司上山執當官三品已上賜爵一等仍與一子出身四品已下加一階賜勲兩轉亦量進改其白身人及行署蕃官放蕃選其山下昇壇行事官三品已上加爵一等賜勲一轉四品已下加一階賜勲一轉選日稍優諸獻官及宿衛齋宫將軍率中郎并郎將并兩京留守諸軍節度使並同昇壇例諸有職掌押當非昇壇例諸有職人加一階選日優量其加階應入三品五品人非特賜者並依十一年三月二十八日勑節限齋郎禮生見任官前資官已上人並依資量材與處分未出身者放出身皇親别勑承勑詔令無此字恩陪位者亦凖此諸州岳牧四府長史朝覲陪位者泛階之外各賜勲一轉諸方使人及諸州父老宗姓并從家子孫至岳不得陪位者並賜勲一轉賜物五叚諸州及兖州道僧至岳見大禮者並賜物五叚孔子後褒聖侯量才與處分天下致仕官各依本品賜一季禄并束帛其陪位者仍賜勲一轉諸蕃侯王酋長來㑹禮者各加一官至都節級並與賜物其入朝留在邉軍人亦凖此其蕃中知一作秪候衙官刺史縣令並賜物及袍帶突厥可汗小殺等諸國王守䕶塞垣嵗月朝貢並宜賜物副使將往侍老年百嵗已上者版授下州刺史婦人版授郡君年九十已上者版授上州司馬婦人版授縣君年七十已上者版授縣令并婦人版級量賜粟帛其預見大禮侍老各别加侍下一人孝子順孫義夫節婦旌表門閭終身勿事行人之家及鰥寡惸獨并疾病不能自存者委州縣長官倍加存䘏諸軍行有文武散官已上者加一階白身者賜散勲一轉欠負官物逋懸租調並宜放免其行過州縣供頓劬勞并貼頓百姓有雜差科并車馬夫役者並免一年租賦詔令作稅兖州免二年租賦詔令作稅當頓官人始末不絶者與中上考仍賜勲一轉朕永惟王業繄頼舊勲元首股肱其猶一體自武德已來功臣宰輔或名存王府遺嗣沉淪或身無大故銜屈泉壤宜令所司訪擇申理唐元六年六月二十六日按唐書唐隆元年六月十日𤣥宗定内亂睿宗二元景雲今赦文避𤣥宗諱隆故作改唐元是也復増六年六月字則非立功官人往属艱難能盡忠義今成大禮何日忘之宜各與一子出身無子者任回與周親之人有司試䇿三道等第收奬朕躬陟天門宿齋日觀時属嚴冬雪後初夜風寒朕因露立祈恩誓欲代人當咎俯仰之際頓息霜颷奠獻之晨變同韶景誠荷上天垂祐亦頼靈山吐祥詩云無德不報宜封太山神為天齊王禮秩加三公一等宜令所􅃹崇餙祠廟環山十里宜集無此字禁其樵採給近山二十户復以奉神祠率土之内賜酺五集作七日任於村坊内宴樂不得聚詔令作率歛煩勞其節文有未霑及者所詔令作有司比類奏聞其封祠集作祀有數處行事者從一處叙赦書日行五百里主者施行后土赦書門下昔者巡狩所至柴瘞所在盖取誠享以遵告類朕恭承祖宗之烈獲主神祗之祀夙夜祗畏不敢荒寧故勒兵朔陲先展義於汾詔令作扮社廻斾睢上遂有事於郊壇王者父事天母事地漢氏祈糓未始正名周禮降神乃為徼福而已朕以天命之重子道為先惟兹精誠在乎敦孝庶䝉福於四海期永康於兆人是以率由舊章敬恭明祀嚴配之誠既展奠獻之禮又終且春秋之義大事在祀齋祭之福庶品維祺豈獨在予而有斯慶可大赦天下自開元二十年十一月二十一日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繋囚見徒常赦所不免者咸赦除之官人犯贓及有罪詔令作事被推者本罪雖原不得更令却上仍别與處分自先天詔令作奉先非已來有雜犯流移人等并配𨽻人等各量移近處左降官未經量移及經量移未復本資者奏聼進旨詔令作止天下遭損免州應損户成詔令作减一分已上者及供頓州無出今年地稅如已徵納賜折來年地稅逋租懸調貸糧種子欠負官物在百姓腹内者並宜放免其不損處一作免州自開元十七年已前所有貸糧種子負欠官物在百姓腹内者亦宜凖此諸州縁供頓所差貼助夫亦放其家今年地稅孝子順孫義夫節婦旌表門閭終身勿事諸州侍老百嵗已上賜粟七石九十已上賜粟五石八十已上賜粟三石所由速付勿淹旬日太原潞府侍老等先已加恩不在此例亞獻皇太子鴻賜物二千疋終獻慶王澤賜物一千疋邠王守禮寧王憲薛王業各賜物一千疋忠王浚已下各賜物三百疋夾侍正衣進珪捧珪汝陽郡王淳等各賜物三百疋皇太子夾侍正衣各賜物一百五十疋裴光庭蕭嵩弼亮朕躬𢎞益斯逺不有優異何殊等夷詔令作倫加階賜爵之外各與一子官無子者任與周親仍各賜物三百疋二王後各賜物二百疋長公主各賜物三百疋嗣王郡主縣主各賜物二百疋行從文武官三品已上賜物八十疋四品五品賜物六十疋六品七品賜物四十疋八品九品賜物二十叚昇壇官三品已上特賜一階四品已下各加一階應入三品五品官階相當不限考數聼得入知頓使及判官修禮儀官撰玉冊文官知頓御史加一階脩壇塲州刺史及書冊詔令作脩壇官各賜物一百疋其已有昇壇職掌從一頭處分縁大禮有職掌官賜勲三轉行從官首末不絶及陪位官各賜勲兩轉内外文武官三品已上賜爵一等四品已下各加一階致仕官三品已上賜物七十疋四品五品各五十疋行從蕃客鴻臚安置陪位見大禮者宜賜物五十疋節級分付南北衙應宿衛齋宫官及左右廂知兵馬虞候㹅管已下詔令作及判官詔令作司别奏兼孔目官等更加勲一轉前資官選日稍優與處分自守身三字一作白身人有資勞者簡選之日優與處分無資蔭者賜勲兩轉南北衙行從三衛飛騎萬騎引駕細引一作伏及監門直長主帥黄衣長上各賜勲兩轉仍各賜物五叚兩營弩一作弓手六畨併行宜各賜勲兩轉物五叚仍量折畨役諸衛彍騎及兵角弓手官馬主掌閑幕士駕士供膳主習馭工人樂詔令作築人雜户官户白身有職掌人合行從人等各賜勲一轉物三叚其齋郎既是見任官凖壇上壇下有職掌官例處分執彈三衛及禮生賛者各减二年勞無勞可减者簡選日稍優與處分流外行署從者各賜勲一轉有職掌者各賜勲兩轉供頓州刺史同陪位官例始末專知頓官各與一中上詔令作上中考蒲州刺史寶鼎縣官同昇壇官處分管壇一鄉百姓給復二年蒲州侍老等凖太原潞州例降一等處分武德初功臣每有大慶必存追逺業叅運始義合賞延其子孫沉翳無在朝者宜令勘實即與一子官唐元初立功臣一作官等艱難之際誠效亦深言念其初豈忘終始其三品已上各賜一品官五品已上各賜紫金魚袋有亡殁者優贈一官仍與一子官一子先一作已得官者選日優與處分兩京留守京兆河南尹四大都督府長史諸軍節度副大使凖行從官例處分諸方通表䟽使人預見大禮凖陪位官處分諸道戰詔令作陣亡人家仰州縣存恤不周濟者量事賑給諸軍詔令作道徤兒别勑行人各賜勲一轉仍令所司速勘會團奏官冩告身送付諸道行人或有身死被詔令作波逃猶徵課役累及親隣即宜審勘為其除削皇親中有文武才用堪任使者委宗正具薦詔令作具以合上當與奨擢五岳四瀆名山大川自古聖帝明王忠臣烈士輔相各令致祭務盡誠潔赦書有所不該者所司比類聞奏亡命山澤挾藏軍器百日不首復罪如初敢以赦前事相告言者以其罪罪之率土之内賜酺三日赦書日行五百里布告天下詔令作遐邇咸使聞知主者施行文苑英華巻四百二十四
