body:
  text: 文苑英華巻七百六宋李昉等編文集八太尉衛公㑹昌一品制集序鄭亞見李德裕集綸綍文集蜀集並作紼之興載籍之始先王發號施令明罰勅法蓋本於此也唐虞之盛二典存焉夏殷之隆厥有訓誥自𦙍征甘誓乃有誓命之書皆三代之文一王之法也虞夏之際代祀綿逺其代王掌制之名氏莫得而知至于成湯太甲則有仲虺伊尹為之訓誥髙宗得傅説則有説命之篇周公召公相成王則有洛誥酒誥周官顧命秦始皇帝并一區宇丞相李斯實掌其言漢興當秦焚書之後侍從之臣皆不習文史蕭曹之輩又乏儒墨之用每封功臣建子弟其辭多天子為之縱委於執翰者亦非彰灼知名之士武帝使司馬相如視草率皆文章之流以相如非將相之集本文粹並無之字器也厥後寖以微長集本文粹作寖㣲寖長下于魏晉亦代有其人我髙祖革隋文物大備在貞觀中則顔公師古岑公文本興焉在天后時則李公嶠崔公融出焉燕許角立於𤣥宗之朝常楊繼美於代宗之代集作世洎憲宗皇帝英武啟運雄圖赫張中興之業髙映前古其時則先太師忠公翺翔内署有宻勿贊佐之績平吳定蜀時文粹作實唯其功及登樞衡作霖雨尊王室卑諸侯圖蔡料齊外定内理顯王言於典誥彰帝範於圖籍紀在徽冊播於無窮特進太子少保分司東都衛公長慶中事惠皇為翰林學士訓誥之業彰於傳聞昭肅皇帝統握乾符寤寐良弼詔自淮海復升台庭盡付𤣥機允厭神度每彤墀集作彤庭奏罷别承天睠帝亦講伊尹傅説集本文粹作伊訓説命之㫖定元首股肱之契以太平之制度上古之文教咸屬於公焉㑹先太后懿號未立帝明發有永懐之痛公述沙麓神井之瑞贊繞樞懐日之慶懋遵聖緒光慰孝思於是承命有宣懿祔廟之制及武宗郊昊天拜清廟文物胥備朝廷有禮華夷述職河朔修貢乃顯神庥薦徽號奉揚一德以示萬方於是撰仁聖文武至神大孝之冊封域無虞天子翛然有求𤣥之思乃範貞金模聖表隆凖日角燭于宫庭中外臣僚咸欲以頌山河而褒日月也公於是有聖容之贊天街之北獯鬻攸居因饑慿陵怙衆强禦嚴之以刁斗而勃爾無懼申之以文告而腆集作坦然不率天子震怒旋命征之公獨運沉機上資宸斷萬里勝負决於帷中雷霆既震犬羊遽集本文粹作遂潰疣贅披抉腥羶解離遁其名王復我貴主公於是有討北狄之詔天寶末薊門為首亂之地瘡痏榛棘襲世未平至於漁陽帥師仲武掃除妖孽臧獲仇讐奉揚威神乃底康靖仍願勒石於盧龍之塞以叙聖功飛章上聞帝用允若公祗膺文粹作應非明命舒展格言呼嘯神祗吐納嵩華當晝而文星現不寐而白鳳来成諸侯不朽之勲尊元后無私之化公於是有幽州紀功之碑潞帥劉從諫死其子因關河之嶮恃甲兵之衆請爵爭地屢聞王庭中外疑迷互撓天聽帝將耀神武公累罄文粹作獻忠集作竒謀且言曰重耳在䘮不聞利父雄渠受戮祗以拒君况明皇舊宫天井内地跨摇集本文粹作連河北脅倚山東豈可行有一作宥匪人坐為汚俗若是可忍孰不可容沃心無疑躡足乃定又曰上黨居天下之脊當河朔之喉今漳水雄兵常山勁卒是為唇齒寔懼因依不若乗其文粹作於未萌制其將動帝俞其奏乃妙選使臣以勞諭之嚴立刑賞以勸戒之魏侯鎮侯戮力從命絶壺關之右臂收泜水之上游獲兹渠魁在此成筭又轅門叛將潢水餘兇竊上相之旌旗盗晉陽之管鑰帝怒斯赫人心愈疑咸以師老于郊梟巢尚固議罷兵者蚊聚請宥過者雷同公又揚笏而言曰彼地則義師帥介集作師分宗室是𤣥祖英華作文王恐非勤商之邑后稷造周之邦𤓰瓞具存堂構斯在茍虧䇿畫不襲仇讐則是奬彌牟逐主之風長冒頓射親之俗詩稱築室于道書謂疑謀勿成由是洞啟宸衷大破羣議運籌制勝舉無遺䇿防㣲慮逺必契神機授鉞之臣服膺承命謝安之圍碁尚拗曹叅之飲酒方酣果有軍書繼聞戎捷砥磨周鉞水集本文粹作兵淬鄭刀萬里来袁紹之頭顱二塜葬蚩尤之肩髀歡聲雖震於朝市喜氣不見於形容何其纂立功勲鎮定風俗若是之重也集本文粹無也字公於是有伐上黨之制平晉陽之勅宗英可汗獻琛輸賮越自絶漠集本文粹作域通於本朝文畢伯士之𦙍呼韓谷文粹作鹿蠡之師或執玉而朝靈囿或解辮而拜甘泉並垂於䇿書集作史冊光彼明命公於是有諭廻鶻之命五慰堅昆之書四文章等於訓傳機事出於神明固將偃仰邳石之符傲睨鬼箝之録聞之者可以祛聾聵得之者可以弼邦國每牙管既㧞芝泥將熟一作乾嘗於前席親授筆札公亦分隂可就落簡如飛時有急宣關於宻畫内庭外制皆不與聞或勢切疾雷機難終日宣室未召武帳莫開公則手疏集本文粹作疏于封章達於旒扆集本文粹作衮當乙夜觀書之際未嘗不稱美爾三此又豈可與傳集作賦洞簫而諷於後庭聞子虚而嗟不同世者論功校集作較德耶嵗在乙丑羣公常伯以天子之道貫於神祗一年而風雨攸序災沴不作二年殱醜虜興北伐之詩四年誅狡童詠東征之歌而又移集本文粹作伐摩尼之風壊浮圖之俗偃兵反樸四海胥定思欲増鴻名光下武公乃觀東序之圖按西崑之牒鋪舒名實藻縟文采集作質類于上帝為唐神宗公於是纂章天成功神德明道之冊文號位既畢華夷㑹同方將命禮官召儒者訪匡衡后土之議採公玉明堂之圖考肆覲之禮於梁生取封禪之書於犬子盡皇王之盛事極臣子之殊功而軒鼎將成禹書就掩然猶進先嘗之藥獻髙手之醫藏周旦請代之書追漢宣易名之美作為大誥祈于昊天始終一朝紹續九德其功伐文粹作攻伐集作攻閥也既如彼其制作也又如此故合武宗一朝冊命典誥奏議碑讃軍機羽檄凡兩帙二十巻輙署曰㑹昌一品制集紀年追聖德也書位旌官業也嵗在丁卯亞自左掖出為桂林九月公書至自洛以典誥制命示于幽鄙且使為序以集成書尋𤣥珠莫究其集本文粹作不究於倪域聽希聲莫窮於髙下承命震恐集本文粹作惴幾移朝夕援筆而復止者三四念江陸修盪辭讓不及因齋㓗以序焉夫全功難持大名難兼集作堅日赫於晝而乏清媚月皎於夜而無温煦冬之為候也則雪霜飄暴凍入肌髪夏之為用也則金流石爍火走膚脈如陽春髙秋者稀焉南則瘴風毒虺之為厲也北則獯戎黠虜之為患也如洛邑咸秦者幾焉鵰鷲不傅之以馳騁驊騮不授之以鶱翥如應龍者鮮焉仲尼聖賢之宗也位止於司㓂老集本文粹作師聃道德之祖也官不過柱史如姬旦者幾焉是以保衡傅説左右殷宗集作左右殷王召公畢公寅亮周室咸著大訓克為元龜書契已文粹作以来未之多有李斯以刻石紀號之文勝而不在休明之運又何足數哉周勃霍光雖有勲伐而不知儒術枚臯嚴忌善為文華而不至巖廊文粹作巖廟集作廊廟自是以降其類寔繁惟公藴開物致君之才居元弼上公之位建靖難平戎之業垂經天緯地之文萃于直躬集本文粹作萃于厥躬慶是全德蓋四序之陽春九州之咸洛品彚之應龍人倫之姬旦集本此下有也字後之學者其景行之云爾集本文粹無云爾二字同前代桂府滎陽公李商隠唐葉十五帝諡昭肅始以太弟茂對天休遂臨去聲西宫入髙廟將以凖則九土指麾三靈乃顧左右曰我祖宗並建豪英範圍古昔史卜宵夣震嗟不寜是用能文惟睿掌武以永大業今朕奉承天命顯登乃辟庸不知帝賫朕者其誰氏子焉左右惕兢威靈迷撓章指周訥揚吃不能仰酬既三四日乃詔曰淮海伯父汝来輔予霞披霧消六合快望四月某日入覲是月某日登庸淵角竒姿山庭異表為九流之華蓋作百度之司南帝由是盡付𤣥機允厭入聲神度左右者咸不知其夣耶卜耶金門朝罷玉殿宴餘獨銜集作含日光静與天語帝亦幽闡徴召誥説命之㫖定元首股肱之契曰我將俾爾以大手筆居第一功麒麟英華作凌煙恐非閣中霍光且圖於勲伐𤣥洲苑上魏牧集作収别議於文章光映前修允兼具羙我意屬此爾無讓焉公拜稽首曰臣某何敢以當之在昔太宗有臣曰師古曰文本髙宗有臣曰嶠曰融𤣥宗有臣曰説曰瓌代宗有臣曰衮至於憲宗則有臣禰廟曰忠公並禀太白以傳集作傳精神納非煙而敷藻思才集作材可以淺深魏邴道可以升降伊臯而又富僧孺之新事識庾持之竒字清風濯熱白雪生春淮南王食時之工裴子野昧爽之獻疑王粲之夙構無禰衡之加㸃然後可以𢎞宣王畧輝潤天文豈伊乏賢可纂集作纉舊服帝又曰舜何人也回何人也朕思丕承汝勉善繼無忝辱乎爾之先公復拜稽首曰易曰中心願也詩曰集作云何日忘之臣敢不夙夜在公以揚鴻烈㑹一日上明發於法集作清宫之中念兆人之衆顧九州之廣永懐不逮之痛式重如存之敬公伏奏曰唯先后懋守丕基允集作永資内助秀南頓集作頴非嘉禾之瑞開烈山神井之祥德駕河洲淑肩沙麓將顯降媯之配未𢎞褒紀之恩渝集作論美椒塗掩華蘭掖縁山破芿夙聞齊主之悲採石傳形早降漢皇之慟繞樞有慶鳴社承輝而懿號未彰貞魂莫祔恐無以懋遵聖緒光慰孝思公於是承命有宣懿祔廟之制初文宗皇帝思宗社之靈祧祖之重傳於夏啟既不克終歸於余左傳作與夷又集作亦未能立乃推帝堯敦叙九族之道𢎞魏文榮樂諸弟之志集作意嘗曰潁邸吾寜忘耶及武宗讓踰三四位當九五出潛離隠躍泉在天揚八彩於堯眉挺二肘於湯臂故外則上公列辟内則常侍貴人咸願擬議形容依稀彩飾公搢圭歸美吮墨摛詞詠日月之光華知天者之務也贊乾坤之易簡作易者之事乎公於是有聖容之贊天寳季年物豐時泰骨鯁者慕周偃武肉食者效晉清談豕不豶牙蠆因摇尾氛興燕易駕狩巴梁九十年鑾輅不東三千里華戎遂隔日者上𤣥降鑒元聖恢竒遂於首亂之邦先有納忠之帥復我疆理平我仇讐集作疆理我邉鄙臧獲我仇讐負羽䝉輪已聞於深入赤芾邪幅將事於駿奔陳萬集作方賄以展儀備四旂集作駟介而告㨗仍願集無願字於箕星之分巫閭之旁追琢貞珉彰灼来葉以文上請屬意宗臣公乃更夣江毫重吞羅鳥町疃集作畦河濟呼嘯神祗述列集作烈聖之英猷荅藩維集作大藩之深懇既事苞理亂思屬安危不惟嵩岳降神固亦文星助彩螭蟠龜戴集作載蟲篆鳥章構思而君苗硯焚灑翰而元常筆閣公於是有幽州紀聖功之碑天街之北獯鬻攸居結以閼氏集作支降我皇女奉春君婁敬嘗為逺使下杜集作社是人揚望長作􅀞工乗以無年遂忘舊好分偵邏於甌脱遺祭酹集作酹祭於蹛林俾我刁斗晨驚兠鈴夜設公乃上資宸斷旁輝集作耀軍謀心作靈䑓手為天馬充國四夷之學此日方知薛公三䇿之徴他時未爽既而鬼箝飛辨邳石降籌不使郭門仍讒於段熲寜教李邑更毁於班超勢叶聲同火熸水灌遂得朝還貴主暮遁名王轄栁塞之歸車復梅粧而向闕及晉成赤狄䘮師歸珪有閼伯之弟兄誕景升之兒子將憑蜀閣欲恃吳錢姑務連雞靡集作不思縛虎既乗集作埀是文誥尚有羣疑公乃挺身而進曰重耳在䘮不聞利父衛朔受貶祗以拒君今天井雄藩金橋故地跨摇河北脅倚山東豈可使明皇舊宫坐為汙俗文宗外相行有集作宥匪人忠謀既陳上意旋定俄又埃昏晉水霧塞唐郊殊懿公之東渉集作徒渡河若紀侯之大去其國稽于時議憚在宿兵公又揚笏而言曰彼地則義師帥唯宗室乃𤣥集作文非王勤商之邑后稷造周之邦𤓰瓞具存堂構斯在茍虧䇿畫不習仇讐則是奬夙沙縳主之風長冒頓射親之俗昔武安君用戕坑卒四十一萬齊桓公受胙立功一十二國今真將軍為時而出賢諸侯代不乏人况其俗産代地之名駒富管涔之良璞有抱樹辭榮之節有漆身報德之風耶躡足以謀屈指而定謝安之圍棊尚拗曹參之飲酒正酣適有軍書果聞戎㨗邯牛謝衆丕豹出奔樂毅不歸鄒衍已去砥磨周鉞水淬鄭刀萬里来袁紹之頭顱二塜葬蚩尤之肩髀何其纂立大効集作功樹建嘉績若是之速歟宗英可汗既畏皇威遂聞請吏留黎徑路對湩酪以知羞毳幕氈裘望衣冠而有慕文畢集作大異伯士之範呼韓單于之師或執玉而朝靈囿或解辮而拜甘泉並垂於冊書光彼明集作名命百王共貫三代同規公於是奉命有討北狄之詔伐上黨之制諭廻鶻之命五慰堅昆之書四每牙管既㧞芝泥將乾集作熟上輙曰爾有獨斷朕集作我無疑謀固俟沃心不可假手公亦分隂可就落簡如飛故每有急宣關於宻畫内庭外制皆不與聞此又豈可與美洞簫而諷於後庭聞子虚而嗟不同世者論功而校德耶其有勢切疾雷機難終日屬宣室未召武帳不開公莫暇昌言且陳宻疏賈太傅之憂國故動集作洞深誠山吏部之論兵詎因夙習凡所奏御罕或依違及武下言其升遐英華作宣非宗下武重光崇名再易公又觀圖東序按諜西崑率億兆同心列公卿定議以一十四字垂百集作億千萬年藻縟詞華鋪舒名實秦晉於玉檢瑶繩之内平勃於緑疇讒鼎之間方將命禮官召儒者訪匡衡后土之議採公玉明堂之圖考肆覲之禮於梁生取封禪之書於天子盡皇王之盛事極臣子之殊功而軒鼎將成禹書就掩然猶進先嘗之藥獻髙手之醫藏周旦請代之書追漢宣易名之義作為大誥祈于昊天始終一朝紹續九德其功伐也既如彼其制作也又如此故合詔誥奏議碑贊等凡一帙一十五巻輙署曰㑹昌一品集云紀年追聖德也書位旌官業也不言制禁崇論道也惟公字文饒姓李氏趙郡人盖大鼎集作昻是中丘有風雨翕張之氣藂䑓髙邑名集作有山河隐軫之靈萃于直躬慶是全德許靖廊廟之器黄憲師長之姿何晏神仙叔夜龍鳳宋玉閒麗王衍白晢馬援之眉宇盧植之音聲此其妙水鏡而為言託丹青而為裕至於好禮不倦用和為貴敬一人而取説謙三集作六位而無咎意集作㸃以黙識確乎寡詞車集作連非匠胡奴罔迷於半靣背碑覆局無俟於專心聿承儉訓不有長物昔猶卑官端坐心齋江革分謝朓之舊襦便為卧具周正得袁憲之談柄常集作嘗在講筵五車自娛三箧能識麗則孔門之賦清新鄴下之詩重以多能推於小學王子敬之𨽻法道媚皇休明之草勢沉著異代集作時相逼當世集作代罕儔不妄遇人集作不忘過人非慎於取友與李杜齊名者少願集作湏僑札交貺者稀故能應是昌時媚於天子憲章皇極爕理𤣥穹燭耀家聲粉飾國史侔帝典之灝灝噩噩尊王道之蕩蕩平平而又不節怨嗟知進憂亢張良竟稱多病王允方務頥神無潁陽之善田乏好畤之巨産何曽之食既疏集作疏去虞悰之鮓方嘗憂其厚味有爽和氣肴簌疑作荻無在集作任琴鶴有餘成萬古之良相為集作作一代之髙士繄爾来者景山仰之某昔在左曹每集作實事先帝雖詭詞望利不接於言話而申義約文庻窺於風采代天之言既集蟠地之樂難忘盖屬才華用為序引以鄒衍之迂恠將潁嚴之淺近忽焉承命何所措辭吾領幽遐八桂森爽莫逢博約寜遇切磋處無價之塲率然占玉登集作立不枯之岸粗爾論珠雖嘗有意焉亦不知量也某叩頭再拜上集無此六字右李德裕集兩序前篇鄭亞為桂帥時所撰今集用之其後篇疑亞先委判官李商隠代作亞復改定故有異同文苑英華巻七百六
