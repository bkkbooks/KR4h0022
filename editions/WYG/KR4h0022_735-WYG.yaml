body:
  text: 文苑英華巻七百三十六宋李昉等編雜序二續書序一首四分律宗記序一首揚州㸔競渡序一首神龍厯序一首忠州江亭喜重遇吳叅軍見牛司倉序一首喜遇冀侍御崔司議二使序一首衡嶽十八髙僧序一首開元大衍厯序一首續書序王勃叙曰書以記言其來尚矣越在三代左史職之百官以理萬人以察揚于王庭用實大焉茍非可以燮理情性平章邦國敷彛倫而叙要道察時變而經王猷樹皇極之綱維資生靈之視聽皆可略也昔者仲尼之述書也將以究事業之通而正性命之理故曰吾欲托之空言不如附之行亊道德仁義於是乎明刑政禮樂於是乎出非先王之德行不敢傳非先王之法言不敢道紀千數百歲斷自唐虞迄于周漢風一無此字流所存百篇而已以此見聖人言約理舉神明不勞一作營而體時務之撰矣故能法象天地同符易簡借前箸於筌蹄驅後主於軌物宻而顯宏而奥久而彌新用而不竭非古之聦明聖智𤣥覽博達孰能為此哉孔安國曰帝王之制坦然明白可舉而行嗟乎其言甚大可使南面稱聖人之後矣自時以降史述陵遲人自為家標指失中陳事亂而無當制理參而不一由是大典散而人文乖是非繁而取舍謬與夫古先哲人制述之意不其疎乎我先君文中子實秉睿懿生於隋末覩後作之違方憂異端之害正乃喟然曰宣尼既没文不在兹乎遂約大義刪舊章續詩為三百六十篇考偽亂而脩元經正禮樂以旌後王之失􅄒易讚以申先師之㫖經始漢魏迄于有晉擇其典物宜於教者續書為百二十篇而廣大悉備嗟乎賢聖之述豈多為哉噫亦足垂訓作則冒天下之道如斯而已矣當時門人百千數董薛之徒並受其義遭代䘮亂未行于時歴年永久稍見殘缺貞觀中太原府君考諸六經之目則亡其小序其有錄而無篇者又十六焉嗚呼兹不可復見矣家君欽若丕烈圖終休緒廼例六經次禮樂叙中說明易讚永惟保守前訓大克敷遺後人勃兄弟五六冠者童子六七祗祗怡怡講問伏漸之日久矣躬奉成訓家傳異聞猶恐不得門而入才之不逮至逺也是用厲精激憤宵吟晝詠庶幾乎學而知之者其脩身慎行恐辱先也豈聲祿是殉前人之不繼是懼聞疑者承命為百二十篇作序而兼當補脩其闕爰考衆籍共參奥㫖泉源浩然岡識攸濟嗚呼小子何敢以當之也其盡心力乎始自緫章二年泊乎咸亨五年刋冩文就定成百二十篇勒成二十五巻昔者文中子曰漢魏之禮樂未足稱其書不可廢也尚有近古之對議存焉制詔冊則幾乎典誥矣後之達晤者將有得於斯文乎于時龍集閹茂勉踵前脩在大唐御天下之五十七祀也四分律宗記序前人昔在調御利見迦維光宅净都撫臨法界仰揚垢路之業以疆理情田闡導毗尼之藏以隄防性海二邊雲徹方知實相之尊十刹風行乃識真如之貴將使龍象緇服維明克允鶖鷺𤣥明有耻且格五篇垂範豈同訓夏之科七聚分宗寧比歌虞之制功存離欲道在降魔仙苑創基因善果以調物提河㓕跡慿淨戒以為師誠拯溺之舟航而禦黠之銜䇿者矣故能莊嚴百福粉繪三身摧憍慢山㧞生死樹覆簣菩薩之道濫觴正覺之源除惑箭而斷愛枝銷恚刀而解疑網自銀棺揜耀金杖殊珍五師烟騰四分雲譎波離睿㫖明而更明飲光妙跡盛而愈盛其後卑摩覃思猶沉赤水之輝惠逺研精尚玷𤣥巖之彩遂使瓊編浩汗利渉迷於要津瑶軸紛綸登髙暗於飛陛熟習者博而寡用志學者勞而少功七衆所以遲廻八部由其大息丕應冥發睿感潛融爰挺異才式扶象訓有西京太原寺索律師俗姓范氏其先南陽人也殷覇洪𦙍周藩茂族八鸞與四牡競馳紫繪與青蝸叠照六軍卿胄績著於鐘彛三傳儒門業流於訓詁律師冲襟霞映峻局霜凄筠抱顯於髫齡蘭芬凝於丱齒由是糠粃禮樂錙銖名教以堯舜為塵勞以周孔為桎梏爰依白法遂托𤣥徒探鷲嶺之㣲言得龍宫之秘藏咸亨之祀椒房諒隂捨槐里而構菴一作芳園因金穴而開銀地伽藍肇建號曰太原明陽一作湯所及咸収時望自價隆康㑹譽重摩騰竺法猷之苦節支道林之逺致將何以發明禪宇光應綸言律師乃以道衆羽儀釋門棟幹粤自𢎞濟來逰太原經行德人於斯為盛既而懼六和之紊緒悼三聚之乖宗稽法令之遺文討惠猷之舊業網羅一作網維近䕶吞含覺明原始要終探􅄨索隱芟夷􅤞贅剪截駢枝収絶代之精㣲詰往聖之紕繆葭灰屢變槐燧驟遷聞遮持犯之異同廢立止作之輕重故以該象牙之扇窮貝葉之圖鑽研刋削五載而就名曰開四分律宗記凡十巻三十七萬六百三十言律師又以為仲尼述易申妙典於繫辭元凱談經託餘文於釋例爰因多暇更輯舊章牢籠秘宻之宗發揮沉欝之㫖名曰開四分律宗拾遺鈔凡十巻四十萬餘言所以禆助三明抑揚四諦𢎞八正之道成一家之言庶使衆善雷奔羣疑霧歛照歡戚之兩鏡蕩欣憂之二瓶慿此戒田方躋定境豈直功周沙甸道制鐵圍而已哉弟子才非𤣥度識劣真長本乏凌雲之詞虚荷彌天之眷揄揚盛烈顧孫綽而多慚歸依勝侣仰郄愔而自勵輙牽庸陋輕序德音豈比夫公理昌言資繆實之引太冲作賦假士安之談蓋所謂觀博而識班聞樂而竊抃者矣故曰四分律宗記序揚州看競渡序駱賔王夏口江干駕言臨眺于時桂舟始泛蘭棹初逰鼔吹沸於二字集作咽江山綺羅蔽於集無於字雲日便姢舞袖向淥水而集作以全低飄颺歌聲得集作聽清風而更逺是以臨集作眼波笑臉艶出浦之輕蓮映渚蛾一作娥眉麗穿波之半月服集作靚粧舊飾此日増竒絃管相催兹辰特妙能使洛川廻雪獨美集作猶賦陳思巫嶺行雲專稱宋玉凡諸同好請各賦詩云爾神龍厯序李嶠昔者龍負河圖八卦列明時之象龜呈洛字九疇開協紀之文青巖啓而六甲飛黄壤堙而五行缺故知乾筴逺坤符靈秘法効用常邀乎聖期研幾測深必貫於神道皇軒於是乎合而不死帝皡於是乎推而致福自重黎並命叔仲分官理八節而調四時部三元而齊七政權衡度律在虞夏而兼脩正朔隂陽及殷周而備舉既而王風版蕩戰國縱横瞽史忘三家之言疇人失二字之業履端闕而歸餘壞攝提差而孟陬殄廢時亂日非直羲和􅊺滛亡甲䘮子豈唯商辛暴虐漢興草創肇謀紀綱而方士異詞天官横議張蒼從甲乙之術未叶變通鄧平用丁丑之元旋聞疎濶當塗圮隔典午陵遲戎狄升僭偽之壇㝢縣乏神祇之主三辰九野壓析景而分躔二象七衡孰當期而合度建元髙而不競沿木火而無譏興百代之闕文復千齡之大統匪我昌運疇能離此國家草昧區夏權輿品物萬方同㑹獄訟之往河南五緯運謀神靈之入東井然𤣥珪受命紫籙登樞白一作回玉斗而察璿璣把珠囊而膺厯數勤於水土大禹之平滌山川禮乎方圓髙辛之迎送日月應天神龍皇帝大横纂極元良繼體乃神乃聖三王接袂而扶轂允武允文五伯連衡而擁篲於是乎東明捧日西掖占風南震雄王之㕓北清驕子之落粟同水火人類胥庭犴圄徒旋干戈不用上庠講道而宣化比屋畊田而鑿井功成理定之業協律登歌疇德瑞聖之符陳郊謁廟萬官咸事百度已康猶且存省闕遺徵求典故以為欽若厯象哲后之恭天事神敬授人時明君之勸農闢土自麟德創紀四十餘年雖斗憲未移而渾儀漸變蔡伯喈所謂術無恒是洛下閎所謂厯後當差昔太初肇規便易髙皇之制元和新造旋移孝武之法因時通變厥有前聞爰命典司更從刋正金紫光祿大夫行秘書監駙馬都尉上柱國楊慎交鐘鼎貴逰山河寶氣赤泉疏社軒裳接于五公朱輪贈言翰墨連於七子資玉環之舊德擁金埓之新慶簫吹鳳管朝昇烏鵲之樓漸疑閱龍章暮下麒麟之閣臨西山典籍之府揔束壁文章之事九源百氏之說盡入胷襟六家三統之書咸歸掌握永言董率實竚詳明左散騎常侍兼脩國史上柱國陳留縣開國公栁冲望重簮纓才髙瑚璉家風推其直道帝範藉其謨明吐白鳳而草𤣥言垂紫貂而歩黄閣叅司國典時望允諧副掌天書朝寄斯在鎮國一作軍大將軍右驍衛將軍知太史局事迦行志中散大夫守禮部侍郎上騎都尉嚴善思正議大夫行太史令上䕶軍傅志忠等或禮閤一作閣兵鈐以賢才而入用或天門地理緣道術而見知皆學富偃韋藝超甘石窮神盡智之妙闇落銅凡測逺窮髙之方懸裁玉表朝請大夫行太史局令瞿曇悉達朝請郎行司歴徐保文承議一作奉郎行司歴南宫說等或善分天部或工言筭法稽長短之效無煩於驗䜟被圖察休咎之徵非假於登臺上庫凡此衆哲各承朝委悉達等則專司課務據覈其真志忠等則監共討論用裨其闕雖異禮而各術並用心而合契於是精研六位遍考十端立東西之定儀一作定東西之令儀採南北之遺事㑹數於天九地十起元於子二丑三追日暮之行按星分之度以推四時之發生以歩三元之盈縮然後分至啓閉無愆於玉衡弦望躔離必應於銅史纔窺幽室已見飛灰雜候清臺仍看合璧追論古法師驗前章八十一寸為日分徒言精宻六百八年為歲紀終非允當歴祀之所紕繆異端之所穿鑿莫不裁之繩凖格以銓衡究天道之精㣲開日官之軌憲容成再出不能添累黍之功壽王重生無以議分毫之失豈比夫時乖兩閏始載鄒人之語亥有二首方聞絳老之年序臨安寧歲次强圉皇帝撫天下之三載也珍圖改御寳厯初調授以丹鳳之官頒以𤣥鳥之署候耕耘之節非藉杏花亶昏夕之期詎須蓂葉叅幽明而制術邁古今而垂範玉儀既正金鏡逾明知聖祉之無疆識懐生之永泰元符允合可以觀天地之心能事畢甄可以為帝王之式盛矣美矣無得而稱紀次勒成名曰大唐神龍厯云爾忠州江亭喜重遇呉叅軍見牛司倉序陳子昂日月交分春秋代謝昔歲居單閼適言别於兹都今龍集昭陽復相逢於此地山川未改容貎俱非叙名宦而猶嗟問鄉關而不樂雲天遂解琴酒還開新交與舊識俱歡林壑共煙霞對賞江亭迴瞰羅雜樹於堦基山榭遥臨列羣峯於户牖爾其丹藤綠篠俯映長筵翠渚洪瀾交流合坐神融興洽望直情髙覺清溪之仙洞不遥見滄海之神山乍出既而行舟有限嗟此㑹之難留别日無幾嘆分岐之易逺徘徊北渚惆悵南津江陵之道路方賖巴徼之雲山漸異嗟乎離言可贈所願保於千金别曲何謡各請陳於五際喜遇冀侍御崔司議二使序前人余獨坐一隅孤憤五蠧雖身在江海而心馳魏闕歲時仲春幽卧未起忽聞二星入井四牡臨亭邀使者之車乃故人之駕隱几一笑把臂入林既聞朝廷之樂復此琴樽之事山林幽寂集作疾鐘鼎舊逰語黙談集作譚通用詠今復一得况北堂夜永西軒月㣲巴山有望别之嗟洛陽無寄載之客江關離㑹三千餘里名位寵辱一百年中歡娛如何日月其邁不為目前之賞以増别後之思蟋蟀笑人夫子何嘆衡嶽十八髙僧序盧藏用夫理存於業理契則業忘心宅於形心寂則形勝豈不以體㑹機化通同我人馳無役有而脗合出生入死而無際古之懸解者懐挾海岳提挈天地掌擲千界身没一絲前際後際其非動無去無來而常樂豈支離其德孟浪其言哉蓋同體大非而物不能自物也則有詠疑作泳其洪波志其小行指𤣥源以驤首和疑作扣幽鍵而少留亦能押闔形神度越兹數則衡嶽思海之列可得而稱矣衡嶽寺者梁天監三年立本名善思一作果暨陳改為大明有隋號為衡嶽則衡山之心也二十八宿上飛翼軫之晶三十六都下蟠呉楚之紀赮駮舒蔚燦爛炳煥以萬殊松標玉聳清蒼璀錯以億尺水碧嚴霜而育粹雲一作露芝佇秀以孕直幽岫㓕氣絶頂無跡逰其質者一作也則蘧廬清明挹其静者則營魄淵澹信神明之所棲遲也故異人接踵於此焉逰靈迹葳蕤道風綿􅊬自鷲巖西閟象教東流勝躅雖多宗𤣥或替至於仗智慧劍壊煩惱軍理以意傳階惟神遇者未有斯美之盛也然而年代攸邈故老或遺真詮緬㣲後生何述有沙門惠日俗姓慶氏濮陽人也息心達道利見觀方自北徂南爰憇兹嶽入空寂舍覺今昔常然到清凉池知我人非逺備聞衆異祗覿前脩而山間朴畧簡編無次遂覃思翰墨博采遺風事無虚美務存摭實自思大師凡一十八人著之于傳藏用早逰斯道頗渉藝文承日公之恩奬聞衆真之故事心存目想若見斯人倘兹理或存亦旦暮之期也遂懐鉛秉翰序其傳焉開元大衍厯序張說特進集賢院學士脩國史上柱國燕國公臣張集無張字說言厯者先王以明時授人敬天育物者也辰極恒居斗運不息晦朔相催而變月寒暑往來而成歲日月右轉集作進周天之度啓星辰左旋正時之氣合積餘分而置集作致閏配甲子而設蔀鳳鳥為司疇人受職分分而加之者百圖集作鈞必過毫毫而减之者千里必差何則古法存而其人異也不有集作見大聖孰集作誰能起之伏惟開元神武皇帝陛下欽崇天道眘徽月令受命再新改制創厯十有三祀詔沙門一行上本軒頊夏殷周魯五王一侯之遺式下集太初至于麟德二十三家之衆義比其異同課其疎宻或前疑而後定或始㑹而終乖振古未探之象必發揮於神筭大鈞不測之氣盡覼縷於天聦乃更審日晷集作晷度之短長覆星間之廣狹繩九道之脁朒糾五精之進退叅大衍天地之數綜八卦六爻之序一轍於文王也覆文粹作覈春秋交蝕之辰研九疇五紀之奥同符文粹作同文集作有同於孔子也杼軸萬象優㳺四載奏章集作草朝竟一公夕落臣說奉詔金門成書䇿府先有理厯陳景善筭趙昇首尾叅𤣥之言接承轉籌之意因而緝合編次勒成一部名曰開元大衍厯經七章一巻長厯三巻厯議十巻立成法十二巻天竺九執厯一巻九執厯名出西域集本文粹無天竺九以上十七字今古厯書二十四巻畧例奏章一巻凡五十二巻唐㑹要作經章十巻長厯五巻厯議十巻立成法天竺九執厯二巻古今厯書二十四巻畧例奏章一巻凡五十二巻唐藝文志作大衍厯一巻又厯議十巻厯立成十五巻厯草二十四巻七政長厯三巻心機筭術括一巻二書與英華互有異同當考所以貫三才周萬物窮數術先鬼神稱制曰者即聖人顧訪之㫖標謹按者是厯家進對之詞非軒后至聖不啓履端之業非容成詣極不就歸餘之經據其圖也七政之天心不逺守其術也千歲之日月可知蓋中黄之寶符大文粹作太紫之神器者也謹以十六年八月端午赤光照室之夜皇雄成紀之辰當一元之出符獻萬壽之新厯伏望藏之書殿錄於記言掌之大史頒於司集作日厯制曰可文苑英華巻七百三十六
