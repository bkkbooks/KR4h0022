body:
  text: 文苑英華巻三百三十三宋李昉等編紀功七德舞一首城西行一首平齊行二首平蔡行三首征戍大漢行一首老將行一首兵車行一首疲兵篇一首古遊俠歌一首木蘭歌一首新豐折臂翁一首紀功七德舞白居易七德舞七德歌傳自武德至元和元和小臣白居易觀舞聽歌知樂意樂終稽首陳其事太宗十八舉義兵白旄黄鉞定兩京擒充戮竇四海淸二十有四功一作王業成二十有九即帝位三十有五致太平功成理定何神速速在推心置人腹亡卒遺骸散帛收貞觀初詔收天下陣死骸骨致祭而瘞埋之俘擄者又散錢帛以購贖之饑人賣子分金贖貞觀二年大饑人有鬻男女者詔出御庫金帛盡贖之以還其父母魏徵夣見子夜一作天子泣魏徵疾亟太宗夣與徵别既寤流涕是夜徵卒故御製碑云昔殷宗得良弼於夣中今朕失賢臣於覺後張謹哀聞辰日哭張公謹卒太宗為舉哀有司奏日子在辰隂陽所忌不可上言君臣義重如父子也情發於中安知辰日遂哭之慟怨女三千放出宮太宗嘗謂侍臣曰婦人幽閉深宮情實可憫今將出之任求伉儷於是令左丞戴胄給事中杜正倫於掖庭簡出數千人盡放歸死囚四百來歸獄貞觀六年上親錄囚徒放死罪者三百九十四人歸家令明年秋來就刑應時悉至遂悉原之翦鬚燒藥賜功臣李勣嗚咽思殺身李勣嘗疾亟醫工云得龍鬚灰方可療太宗自翦鬚燒灰賜之服訖而愈勣叩頭涕泣而謝含血吮瘡撫戰士思摩奮呼一作身乞効死李思摩嘗中弩太宗親為之吮血則知不獨善戰善乘時以心感人人心歸爾來一百九十載天下至今歌舞之歌七德舞七德聖人有作垂無極豈徒耀神武豈徒誇聖文太宗意在陳王業王業艱難示子孫城西行劉禹錫城西簇簇三叛族叛者為誰蔡吳蜀中使提刀出禁來九衢車馬轟成雷臨刑與酒杯未覆仇家百官先請肉守吏能然董卓臍饑烏來覘桓元目城西人散太街平雨洗血痕春草生平齊行二首前人胡塵昔起薊北門河南地屬平盧軍貂裘代馬繞東岳嶧陽孤桐削為角地形十二虜意驕恩澤含容歴四朝魯人皆科帶弓箭齊人不復聞簫韶今朝天子聖神武手握元符平九土初哀狂童襲故事文告不來方震怒去秋詔下誅東平官軍回合猶嬰城春來羣鳥噪且驚氣如壊山堕其庭牙門大將有劉生夜半射落攙搶星帳中虜血流滿地門外三軍舞臂盟驛騎亟首過黄河城中無賊天氣和朝廷侍郎來慰撫耕夫滿野行人歌二泰山沉㓂六十年旅祭不饗生愁烟今逢聖君欲封禪神使隂兵來助戰妖氣一作氛掃盡河水淸日觀杲杲卿雲見開元皇帝東封時百神受職爭奔馳千鈞猛簴順流下洪波涵淡浮熊羆侍臣燕公秉文筆玉檢告天無愧詞當今睿孫承聖祖岳神望幸河宗舞靑門大道屬車塵共侍葳蕤翠華舉平蔡行三首前人蔡州城中衆心死妖星夜落照壕水漢家飛將下天來馬箠一揮門洞開賊徒崩騰望旗拜有若羣蟄驚春雷狂童靣縛登檻軍大帛夭矯重㨗書相公從容來鎮撫常侍郊迎負文弩西人歸業閭里閒小兒跳浪健兒舞二汝南晨雞喔喔鳴城頭鼓角音和平路傍老人憶舊事相與感激皆涕零老人收泣集作淚前致辭官軍入城人不知忽驚元和十二載重見天寳承平時三九衢車馬渾渾流使臣來獻淮西囚四夷聞風皆失據集作失筋天子受賀登高樓祅童擢髪不足數血汚城西一抔土南峯無火楚澤潤夜行不鏁穆陵關䇿勲禮畢天下泰猛士按劔㸔恒山時唯恒山不庭征戍大漢行胡皓單于犯薊堧虜騎畧蕭邉南山木葉飛下地北海蓬根亂上天蝌蚪連營太原道魚麗合陣武威川三軍遥倚伏萬里相馳逐旌斾悠悠靜潮源鼙鼓喧喧動盧谷窮徼出幽陵于嗟倦寢興馬蹄凍溜石湖毳暖生氷雲沙泱漭天光閉河塞隂沉海色凝崆峒此國誰能託蕭索邉心常不樂近見行人畏白龍遥聞公主愁黄鶴陽春半岐路間瑶臺苑玉門關百花芳樹紅將歇二月蘭臯緑未還陣雲不散魚龍水雨雪猶飛鴻鵠山嶂綿連那可極路逺辛勤夣顔色北堂萱草不寄來東園桃李長相憶漢將紛紜攻戰盈胡冦蕭條幽朔晶韓昌拜節偏知送鄭吉驅旌坐見迎火絶煙沉在西極谷靜山空自北平但得將軍能百勝不須天子築長城老將行王維少年十五二十時歩行奪取胡馬騎射殺山中白額虎肯數鄴下黄鬚兒一身轉戰三千里一劔曽當百萬師漢兵奮迅如霹靂虜騎崩騰畏蒺藜衛靑不敗由天幸李廣無功縁數竒自從棄置便衰朽世事蹉跎成白首昔年飛箭無全目今日垂楊生左肘路傍時賣故侯𤓰門前學種先生柳蒼集作茫茫古木連窮巷寥落寒山對虚牖誓令踈勒出飛泉不似潁川空使酒賀蘭山下陣如雲羽檄交馳日夕聞節使三河募年少詔書五道出將軍試拂鐵衣如雪色聊持寳劔動星文願得燕弓射大將耻令越甲鳴吾君見劉說苑莫嫌舊日雲中守猶堪一戰取功勲兵車行杜甫車轔轔馬蕭蕭行人弓箭各在腰爺娘妻子走相送塵埃不見咸陽橋牽衣頓足攔道哭哭聲直上干雲霄道傍過者問行人行人但云㸃行頻或從十五北防河便至四十西營田去時里正與裹頭歸來頭白還集作猶戍邉邉庭流血成海水武集作我皇開邉意未已君不聞漢家山東二百州千村萬落生荆杞縱有健婦把鋤犂禾生隴畆無東西况復秦兵耐苦戰被驅不異犬與雞長者雖有問役夫敢伸恨且如今年冬未休關集作隴西卒縣官急索租租稅從何出信知生兒惡反是生女好生女猶得集作是嫁比隣生兒埋没隨百草君不見靑海頭古來白骨無人收新鬼煩寃舊鬼哭天隂爾濕聲集作悲啾啾疲兵篇劉長卿驕虜乘秋下薊門隂山日夕煙塵昏三軍疲馬力已盡百戰殘軀一作兵功未論陣雲泱漭屯塞北羽書紛紛來不息孤城望處曽斷腸折劔㸔時可霑臆元戎日夕且歌舞不念關山久辛苦自矜倚劔氣凌雲却笑聞笳淚如雨萬里飄颻空此身十年征戰老胡塵赤心報國無片賞白首還家有幾人朔風蕭蕭動枯草旌旗獵獵榆關道漢月何曽照客心胡笳只解催人老軍前仍欲破重圍閨裏猶應愁未歸小婦十年啼夜織行人九月憶寒衣飲馬滹河集作沱晩更淸行吹羌笛逺歸營只恨漢家多苦戰徒令遺鏃滿長城古遊俠歌見三百巻崔顥木蘭歌韋元甫郭茂倩樂府不知名韋元甫續附入唧唧何力力或作歴歴樂府作唧唧復唧唧注作促織何唧唧木蘭當户織不聞機杼聲唯聞女歎息問女何所思問女何所憶女亦無所思女亦無所憶昨夜見軍帖可汗大㸃兵軍書十二巻巻巻有爺名阿爺無大兒木蘭無長兄願為市鞍馬從此替爺征東市買駿馬西市買鞍韉南市買轡頭北市買長鞭旦辭爺娘去暮宿黄河邉不聞爺娘喚女聲但聞黄河流水鳴濺濺旦辭黄河去暮至一作宿黒山頭不聞爺娘喚女聲但聞燕山胡騎鳴啾啾萬里赴戎機關山度若飛朔氣傳金柝寒光照鐵衣將軍百戰死壯士十年歸歸來見天子天子坐明堂䇿勲十二轉賞賜一作賜物百千强可汗欲與木蘭官一作可汗問所欲又作欲與木蘭賞不用尚書郎願得鳴一作借明駞千里足一作願馳千里足送兒還故鄉爺娘聞女來出郭相扶將阿姊聞妹來當户理紅粧小弟聞姊來磨刀霍霍向猪羊開我東閣門坐我西閣床脫我戰時袍着我舊時裳當牎理雲髪一作鬢挂一作對鏡帖花黄出門㸔火伴火伴驚忙忙一作始驚忙又作皆驚忙同行十二年不知木蘭是女郎雄兎脚撲握一作朔雌兎眼彌一作迷離雙兎傍地走安能辨我是雄雌新豐折臂翁白居易新豐老翁八十八頭鬢眉鬚皆似雪元孫扶向店前行右集作左臂慿肩左集作右臂折問翁臂折來幾年兼問致折何因縁翁云貫屬新豐縣生逢世代無征戰唯聽驪宮歌吹聲集作慣聽棃園歌管聲不識槍旗集作旗槍與弓箭無何天寶大徴兵户有三丁㸃一丁里胥驅向集作㸃驅何處去五月萬里雲南行傳集作聞道雲南有瀘水椒花落時瘴煙起大軍徒渉水如湯未戰集作過十人二三死村南村北哭聲悲集作哀兒别爺娘夫别妻皆云前後征蠻者千萬人行無一廻是時翁年二十四兵部牒中有名字夜深不敢使人知自把集作偷將大石搥集作鎚折臂張弓簸旗俱不堪從兹始免征雲南骨碎筋傷非不苦且圖揀退歸鄉土此臂折來六十年一肢雖廢一身全至今風雨隂寒夜猶集作直到天明痛不眠痛不眠終不悔所集作且喜老身今獨在不然當時瀘水頭身死魂孤集作飛骨不收應作雲南望鄉鬼萬人塜上哭呦呦雲南有萬人塚即鮮于仲通等覆軍人之所老人言君聽取何集作君不聞開元宰相宋開府不賞邉功防黷武開元初突厥數冦邉時天武軍牙將郝靈荃出使因引時勒廻鶻部落斬突厥黙啜獻首闕下自謂有不世之功時宋璟為相以天子年少好武恐邀功者生心痛抑其賞逾年始授郎將靈荃遂慟哭嘔血而死又不聞天寶宰相楊國忠欲求恩幸立邉功邉功不集作未立生人怨請問新豐折臂翁天寳末楊國忠為相重搆閣羅鳯之役募人討之前後發三十餘萬衆去而無反者後又捉人連枷赴役天下怨哭人不聊生故禄山得乘人心而盗天下元和初折臂翁猶存因備歌焉文苑英華巻三百三十三
