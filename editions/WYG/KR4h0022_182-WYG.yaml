body:
  text: 文苑英華巻一百八十二宋李昉等編省試三青雲干呂四首白雲起封中二首立春日曉望三素雲三首春雲三首山出雲四首南至日太史登臺書雲物二首華山慶雲見一首上黨奏慶雲見一首梢雲一首寒雲輕重色一首白雲向空盡一首望禁門松雪一首都堂試貢士日慶春雪三首望終南春雪一首春雪映早梅一首墻隂殘雪一首早春殘雪二首春雨如膏一首清露被臯蘭一首宿煙含白露一首風草不留霜一首白露為霜二首薦氷五首府試水始氷一首履春氷二首觀藏氷一首青雲干吕林藻類詩作吳泌應節偏干吕亭亭在紫氛綴雲初度類詩作綴空初布影捧日已成文結盖祥光逈爲樓類詩作為峯翠色分還同起封上更似出横汾作瑞來藩國呈形表聖君徘徊如有託類詩作知有謂誰道比閒雲同前令狐楚郁郁復紛紛青霄干吕雲色令天下見候向管中分逺覆無人境遙彰有德君瑞容驚不散冥感信稀聞湛露羞依草南風耻帶薫恭惟漢武帝餘烈尚氛氲同前王履貞異方占瑞氣干呂見青雲表聖興中國來王見六君類詩作謁大君迎祥殊大樂叶慶類横汾自感明時起非因觸石分映霄難辨色從吹乍成文湏使留一作流千載垂芳在典墳同前彭伉祥輝上干吕郁郁又紛紛逺示無為化將明至道君勢凝千里静色向九霄分已見從龍意寧知觸石文狀烟殊散漫捧日更氛氲自使來賔國西瞻仰瑞雲白雲起封中張嗣初英英白雲起呈瑞出封中表聖寧因地逢時豈待風浮光彌皎㓗流影更冲融自叶堯年羙誰云漢日同金泥光乍掩玉檢氣潜通欲與非烟並亭亭不散空同前李正辭類詩作陳希烈千年㤗山頂雲起漢皇封不作竒峯狀寧分觸石容為霖雖易得表聖自難逢冉冉排空上依依疊影重素光非曵練靈貺是從龍豈學無心出東西任所從立春日曉望三素雲李季何貞元十一年見雜詠靄靄青春曙飛仙駕五雲浮輪初縹緲古今共用此二字或疑韻書不収緲字遂改作眇下同承盖下氤氲薄影隨風度殊容向日分羽毛紛共逺環珮杳猶聞静合煙霞色遥將鸞鶴羣年年瞻此御應許從元君同前陳師穆晴曉仲疑春日高心望素雲彩光浮玉輦紫氣隠元君縹緲中天去逍遙上界分鸞驂攀不及仙吹逺難聞禮候於斯覩明循二字疑在觧紛人歸懸想處霞色自氛氲同前李應𤣥鳥初來日靈仙望處雜詠作裏分氷容朝上界玉輦擁朝雲碧落流輕豔紅霓間彩文帶煙時縹緲向斗更氤氲髣髴隨風馭迢遥出曉雲兹辰三見後希得從元君春雲鄧倚摇曵自西東依林又逐風勢移青道裏影泛緑波中夕霽方明日朝陽復蔽空度闗隨去馬出塞引歸鴻色任寒暄變光將逺近同為霖如見用還得助成功同前焦郁漫漫天涯色乗春四望平不分殘照影何處斷鴻聲繚繞先經塞霏㣲近過城因風低未歛帶雨重還輕干吕知時泰如膏候嵗成小儒同品物無以荅皇明同前裴澄漠漠復溶溶乗春任所從映林初展葉觸石未成峯旭日消寒翠晴煙㸃净容霏㣲將似滅深淺又如重薄彩臨溪散輕隂帶雨濃空餘負樵者嶺上自相逢山出雲陸暢靈山蓄雲彩紛郁出清晨望樹繁花白㸔峯小雪新映松張盖影依澗布魚鱗高似從龍處低如觸石頻濃光藏半岫淺色類飄塵玉葉開天際遥憐占早春同前張復山静雲初吐霏㣲觸石新無心離碧岫有葉占青春散類如虹氣輕同不讓塵陵空還似翼映澗欲成鱗異起臨汾鼎凝隨出峽神為霖終濟旱非獨降賢人同前李紳杳靄祥雲起飄颺翠嶺新瑩峯開石秀吐葉間松春林静翻空少山明度嶺頻廽崖時掩鶴幽澗或隨人姑射朝凝雪陽臺晩伴神悠悠九霄上應坐玉京賔同前張勝之片雲初出岫孤逈色難親盖小辭山近根輕觸石新飄颻經緑野明麗照晴春拂樹疑舒葉臨流似結鱗從龍方有感捧日豈無因㸔取為霖去恩霑雨露均南至日太史登臺書雲物裴逹圓丘纔展禮佳氣近初分太史方一作新簮筆高臺起一作紀彩雲天容一作煙空和縹緲曉色共氛氲道泰資賢輔年豐荷聖君恭惟同一作司國瑞兼用察人一作天文應念懐鉛客終朝望碧雰一作皆雜詠同前于尹躬至日行時令登臺約禮文官稱伯趙氏色辨五方雲晝漏聽初發陽光望漸分司雜詠作用天為歲備持簡出人羣惠愛周微物生靈荷聖君長當有嘉瑞郁郁復紛紛華山慶雲見失名聖主祠名岳高風發慶雲金柯初繚繞玉葉漸氛氲氣色含珠日光明吐翠雰依稀來鶴態髣髴列仙羣萬樹流光影千潭寫錦文蒼生忻有望祥瑞在吾君上黨奏慶雲見李紳飛龍久馭宇真氣尚興雲五色傳嘉瑞千齡表聖君從風忽蕭索依漢更氛氲影徹天初霽光鮮日未曛表祥近自逺類詩作來自逺垂化聚還分寧作無依者空傳陶令文梢雲羅讓類詩作曹松殊質資靈貺陵空發瑞雲梢梢含樹彩類詩作樹影郁郁動霞文不比因風起全非觸石分葉光閒泛灔枝杪静氛氲隐見心無宰徘徊慶自君飜飛如可託長願在横汾寒雲輕重色張仲素佳期當可許託思望雲端鱗影朝猶落繁隂暮自寒因風方嫋嫋間石已漫漫隠映㸔鴻度霏㣲覺樹攅凝空多似黛引素乍如紈每向愁中覽含毫欲狀難白雲向空盡周存類詩作焦郁白雲生逺岫摇曵入晴空乗化隨舒巻無心任始終欲銷仍向日類詩作帶日將斷或因類詩作更因風勢薄飛難定天高色易窮影収元氣表光㓕太虚中况若從龍去一作出還施潤物功類詩作儻若從龍去還施濟物功望禁門松雪王涯宿雲開霽景佳氣此時濃瑞雪凝清禁祥烟羃小松依稀鴛瓦出隠映鳯樓重金闕晴光照瓊枝瑞色封葉鋪全類玉柯偃乍疑龍詎比寒山上風霜老昔容都堂試貢士日慶春雪李衢錫瑞來豐嵗旌賢入貢辰輕搖梅共笑飛嫋栁知春遶砌封瓊屑依階噴玉塵蜉蝣吟更古科斗映還新鶴吹疑迷難辨氷壺鑒易真因歌大君德率舞詠陶鈞同前李景宻雪分天路羣才坐粉廊靄空迷晝景臨宇借寒光似暖花消地無聲玉滿堂灑詞偏誤曲留硯忽因方幾處曹風比何人謝賦長春暉早相照莫滯九衢芳同前李損之春雪晝悠颺飄飛試士場綴毫疑起草沾字共成章匝地如鋪練凝階似截肪鵝毛縈樹合栁絮帶風狂息疫方殊慶豐年已報祥應知郢上曲高唱出東堂望終南春雪李子卿山勢抱西秦初年瑞雪頻色搖鶉野霽影落鳯城春皛耀瓊一作輝曜銀峯逼晶明玉樹親尚寒由氣勁不夜為光新荆岫全疑近崑丘宛合隣餘輝儻可借廻照讀書人春雪映早梅庾敬休清晨凝雪彩新候變庭梅樹愛春榮徧䆫驚曙色催寒光添粉壁積潤履青苔分明六出瑞隠映幾枝開聞笛花疑落揮琴興轉來曲成非寡和長使思悠哉墻隂殘雪可頻瑜積雪還因地墻隂久尚殘影添斜月白光借夕陽寒皎潔開簾近清熒歩履㸔狀花飛着樹如玉不成盤氷薄方寧及霜濃比亦難誰憐高卧處嵗暮嘆袁安早春殘雪裴乾餘霽日彫瓊彩幽庭减夜寒梅飄餘片積日堕晩光殘零落偏依桂霏微不掩蘭隂林披霧殻一作縠小沼破氷盤曲檻霜凝砌踈篁玉碎竿已聞三徑好猶可訪袁安同前施肩吾春景照林巒玲瓏雪影殘井泉添碧甃藥圃洗朱欄雲路迷初醒書堂映漸難花分梅嶺色塵减玉堦寒逺稱棲松鶴高宜㸃露盤佇逢春律後隂谷始堪㸔春雨如膏喻鳬羃羃歛輕塵濛濛濕野春細光添栁重幽㸃濺花匀慘淡游絲景隂沉落絮辰廻低飛蝶翅寒滴語禽身洒岳摧餘雪吹江疊逺蘋東城與西一作南陌晴後趣何新清露被臯蘭孫顧九臯蘭葉茂八月露花清稍與秋隂合還將曉色并向空羅細影臨水泫㣲明的皪添幽興芊綿動逺情夕芳人未採初降鶴先驚為感生成惠心同葵藿傾宿烟含白露失名㭊㭊有新意㣲微曙色幽露含踈月静光與曉煙浮逈野遥凝素空林望已秋著霜寒未結凝葉滴還流比玉偏清潔如珠詎可収徘徊阡陌上瞻想但淹留風草不留霜王景中繁霜當永夜寒草正驚風飄素衰蘋末流光晩蕙叢悠揚方泛影皎潔却飛空不定離披際難凝蘙薈中低昻閒散質肅殺想成功獨感𤣥暉詠依依此夕同白露爲霜顔粲悲秋將嵗晩繁露已成霜徧渚蘆先白霑籬菊自黄應鐘鳴逺寺擁鴈度三湘氣逼襦衣薄寒侵宵夣長滿庭添月色拂水歛荷香獨念蓬門下窮年在一方同前徐敞早寒青女至零露結為霜入夜飛清景陵晨積素光駟星初晳晳葭菼復蒼蒼色冐沙灘白威加木葉黄鮮輝襲紈扇殺氣掩干將葛屨那堪履徒令君子傷薦氷鮑溶西陸宜先啓春寒寢廟清厯官分氣候天子薦精誠已辨瑶池色如和玉珮鳴禮餘神轉肅曙後月殘明雅合氷容潔非同雪體輕空憐一掬水珍重此時情同前趙蕃仲月開凌室齊心感聖情寒姿分玉坐皎質發丹楹積素因風壯虚空向日明遥涵䆫户冷近映冕旒清在掌光逾澈當軒質自輕良辰方可致由此表精誠同前盧鈞薦氷朝日後闢廟曉光清不改晶熒質能彰雨露情且無霜比耀豈與水均明在捧摇寒色當呈表素誠凝姿陳俎豆浮彩映􅋛珩皎皎盤盂側稜稜嚴氣生同前范傳質乗春方啓閉羞獻有常程潔朗寒光徹輝華素彩明色凝霜雪静影照冕旒清肅肅將崇禮兢兢示捧盈方圓陳玉座小大表精誠朝覿當西陸桃弧每共行同前陳至凌寒開固沍寢廟致精誠色静澄三酒光寒肅兩楹形鹽非近進玉豆為潜英禮自春分展堅從北陸成藉茅心共結出鑑水漸明幸得來觀薦靈臺一小生府試水始氷馬戴南池寒色動北陸歲隂生薄薄流澌聚灕灕集作㣲㣲翠㶑平暗霑霜稍厚廻照日還輕乳竇懸殘滴湘流减恨聲即堪金井貯㑹映玉壺清潔白心誰識空期飲此明履春氷張蕭逺一歩一愁新輕輕恐䧟人薄光全透日殘色半消春蟬想行時翼魚驚踏處鱗底虚難動足岸闊怯廻身豈暇躊蹰久寧容顧盼頻願將矜慎意從此越通津同前舒元輿投跡清氷上凝光動早春兢兢愁䧟履歩歩怯移身鳥照㣲生水狐聽或過人細遷形外影輕躡鏡中輪咫尺憂偏逺危疑懼已頻願堅容足分莫使獨驚神觀藏氷張彚征寒氣方窮律隂精正結氷體堅風帶壯影素月臨凝冬賦凌人掌春期命婦升鑿來壺色澈納處鏡光澄魯史曽流問豳詩舊見稱同觀里社享王道頌還興文苑英華巻一百八十二
