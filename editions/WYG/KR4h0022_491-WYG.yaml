body:
  text: 文苑英華卷四百九十一宋李昉等編直諫直言極諫䇿一道茂才茂才異等策一道直言極諫䇿建中元年正月十五日問朕聞古之善為國者未嘗不求正士博採直言勤而行之輔成教化者也朕臨御日淺政理多闕每期忠義切投藥石子大夫戢翼蔵器思奮俟時今啓乃沃予當有犯而無隠朕竊不自揣敢慕前王上法羲軒下遵堯舜還一作返已散之淳朴振將頽之紀綱使禮讓興行刑罰不用而人猶輕犯吏尚徇私為盗者未奔不仁者未逺豈臣非稷契而致是乎為君謝禹湯使之然也設何謀而可以西戎即叙施何化而可以外户不扄五諌安從三仁誰最周昌比漢高於桀紂劉毅方晉武於桓靈但見含容兩無猜怒故君不失聖臣不失忠子既其儔應詳往行四賢優劣佇辨深疑在於朕躬所有不逮條問之外委悉書之必無面從以重不德對姜公輔對臣聞堯舜之馭㝢也以至理理萬邦以美利利天下百姓猶懼其未化也萬邦猶懼其未安也乃復設謗木詢讜議不敢滿假不敢荒寧伏惟陛下𤣥德統天文思居業慎重光之丕緒返淳古之休風光啓憲章疇咨菅蒯錫臣之䇿思以啓沃臣狂簡不知化源謹昧死稽顙輙陳愚慮制䇿曰朕竊不自揣敢慕前王欲上法羲軒下遵堯舜還一作返已散之淳朴振將頽之紀綱使禮讓興行刑罰不用而人猶輕犯吏尚徇私為盗者未奔不仁者未逺豈臣非稷契而致是乎為君謝禹湯使之然也大矣哉陛下之言乎臣聞禹稱善人不善者逺矣伏見陛下徵隱逸於空山拔夔龍於下位聘名士禮賢者善無欲之徒發惟新之詔使吏肅人恱法明令張而猶曰君謝禹湯臣非稷契此陛下讓之至也臣何敢間焉夫中於道者易以興化失其道者難以從宜事爽其分則一毫以乖事審其分則殊途同歸計嵗者非一時而可用致理者非一日而成功但立法於制事之初望化於經年之外使損益鍳於興替寒暑漸於春秋何憂不均理於羲軒同光於堯舜制䇿曰設何謀而可以西戎即叙施何術而可以外户不扃者陛下孚惠心和戎狄相彼君長重譯來庭應以地僻遐荒未知聖造伏以西戎輕而寡信貪而無親視邉戍申嚴則請通國好覩疆場無備則屢啓貪心固難可以禮義和難可以恩澤撫取今之要莫過於智将悍卒設險邉隅臣伏以陛下且以恤下為心不以西戎為慮今請制其邉兵有常數邉將有常務分其土而居之給其畜而業之因其業也而為之城池因其將焉而為之牧守又申嚴其令使獲虜馬者賞以馬使獲虜羊者賞以羊人皆固業戰自力倍則可少安今積甲日深興戎嵗廣黎人抏弊未可勤師伏望利物之原息人之道使廣庶類農桑以時𢎞濟濟之士於朝盛洋洋之化於野使其來也慕斯文物之盛居其邉也杜其利欲之求然後欵塞而可即叙矣夫姦邪生於豪傑亷恥生於禮義禮義立孰有不恥且格乎衣食足孰有背義趨利者乎臣以為遂其富利之業申其仁義之化則外户不扃矣制策曰五諌安從三仁誰最者夫諌者以諷為先亂國非無直言也直言不用故謟諛勝矣理國非無謟諛也謟諛不用則直言勝矣時逢否閉仲尼或守其主文今日昭明微臣請從其直諌臣之職也敢二事乎昔商紂不君虐棄天物三仁弼諌藩捍宗彛退八百之師抑三分之衆均其憂亂俱可稱仁較其持危或非同徳比干知死亡之義且曰䧟君微子去父母之邦或云智免進退不失其正在於太師乎制䇿曰周昌比漢髙於桀紂劉毅方晉武於桓靈俱見含容兩無猜怒故君不失聖臣不失忠子既其儔應詳往行四賢優劣佇辨深疑臣聞君明則臣直二聖以乘時開國叅佐昌圖二臣以委質造邦克扶興運開忠讜之路成不諱之朝固擬議失倫比方不怍將以感君之未寤致理於昇平絶好惡之門傳和睦之代名高終古傳在䇿書巍巍三代斯為盛美臣素無學術謬竊對敭若變其微斯言之玷使臣以禮晉武寧劣於漢髙皷怒抗辭周昌不優於劉毅制䇿曰在乎朕躬有所不逮條問之外委悉書之必無靣從以重不徳者臣固凡陋越在側微仰天地之大全空忻化育體隂陽之廣運每荷陶甄豈意聖詔荐臨猥垂下問心慮殞越夏蟲不覩於春冰曲士寧知於天道欲申微素進退憂惶伏見陛下以道生成以徳覆載賞以春夏刑以秋冬捐金玉於江湖反珍竒於藪澤委符瑞為草莽用忠良為靈慶臨羣下以正徳恵兆人以厚生誠太平之道也刑措之漸也臣不勝其忭願陛下俯仰必於是寤寐必於是詩云靡不有初鮮克有終抑臣以為知終終之可以存義者其惟聖人乎伏惟陛下終之臣不勝葵藿傾心之至謹對茂才異等䇿問大禹求賢而夏徳長茂文王多士而周道緝熈然則為政在人人存政舉朕徳薄化淺嗣膺寳業夙興寅畏若渉大川求思至謨庶荅天誡子大夫志行修潔學術通贍儲思於天下之際研精於大道之極儼然就辟良用嘉焉廼者夷夏多虞烽鞞屢警因之以荒饉生人蕩析比屋榛蕪今八表甫清萬兵未戢朕㳟承丕緒寔濟横流期致和平維新制度而成湯受夏周武定殷劉矯嬴弊魏乘漢俗以亂為理以安易危必有至政存乎令典同符今日可舉而行精辯所長著之於䇿禹謨之六府三事周法之八政五紀有守有為是彛是訓經綸逺古用彰得失國志詳載天官必書成務濟時莫斯為急並宜明勅功利别白條流較聖王之損益揆今代之用舍沿革之要茂對所宜今欲廢關市之征輕什一之法一作賦歸踰年之戍罷無事之官則國用靡資軍食尚歉人多胥怨邉有侵軼匠無良畫明示謀謨其法令或不便於時吏人將未適其任賢士見沉於負俗遺綱有補於化源可以均沃塉於原田便工商於市肆改制徵物釐創建正復務官曹澄清流品使朝有濟理之士邉有死難之臣而返俗亷隅還風朴略必書効實指陳利害授簡之外尚有令圖各罄所聞備申讜議虚懷固乆勿隠予違對杜元穎對臣元穎案周易君道下濟臣志上通謂之泰其繇曰小往大来臣歴觀書契以還君德定位未有遺斯道而能逹聰明目光極鴻業者也伏惟陛下誕膺明命克敷文徳親降大問詢於微臣愚臣智識庸鄙經術短淺不足以充明詔之言而隠罪大矣敢不俯罄愚衷仰謝萬一制䇿曰朕躬䇿問作恭承丕緒寔濟横流期致和平維新制度且䇿問作而成湯受夏周武定殷劉矯嬴弊魏乘漢俗必有至政存乎令典者臣聞湯革夏政野以質一無此三字武革殷政鬼以文一無此三字秦暴以亡漢寛以矯此皆古王之令典也比東漢既衰皇綱幅裂曹操挟天子以令諸侯用漢法以取威權中原粗平遂偷神器其政刑典禮蠢駮前世固非蕭曹畫一文景更令之比也雖曰革命固無足採陛下承匕鬯以取大器赫雷電以掃羣兇功髙一戎業定再造欲維新制度躬救生靈幽明動植罔不稱慶實天下幸甚然臣之私心有願獻替不憚斧鉞以干龍鱗伏惟陛下少留意焉臣聞自古王者易姓受氏告成於天則維新制度以改人視聽所以示亡王之驕僻也所以揚造邦之耿光也其餘少康復夏武丁興殷武王興周光武紹漢則皆舉用舊典以昭其先朝之休德淳茂也以辯其兇逆之滔天干紀也以志其昭前之光而纂􅁱其徳也我髙祖勤恤人隱始除暴亂而建王業我太宗叶賛經綸増輝先聖皇天眷祐祚以名臣於是酌之人心叅之典禮立我王度為萬代業陛下誠宜恭以守之勤以行之克配彼天立我人極矧乎周秦漢魏造邦之事非臣一作今之所宜言也臣又伏見去嵗徵臣等詔書聖㫖殷勤憂天謫見今制書首章則曰求思至謨以䇿問作庶荅天誡次曰期致和平維新制度下曰改制徵物釐創建正臣伏念聖上豈不以彗有布新之道明欲承順天意旌于國章乎臣愚以為自古災眚多矣大者天地震裂次者日月薄蝕小者星辰變謫皆或應或否繋於其君之徳也夫嚴風不能凋翠葉凝寒不能冰醇酎何則不當凋者風則何有不當冰者寒亦胡為然則災眚者天道之常無德者當之不為有道者害亦已明矣陛下若欲寅畏上天大為恭禦則德為之實而禳為之華居其實不居其華此社稷之景福也制䇿曰禹謨之六府三事周法之八政五紀有守有為是彜是訓經綸邃䇿問作逺古用彰得失國志詳載天官必書成務濟時莫斯為急宜明勅功利别白條流者臣聞夏禹之弼成五服也肇謨六府三事周武之誕敷明命也寔成八政五紀語其功利其六府者人仰以生三事者德據以成八政為經國之用五紀為成天之道别其條流則曲直木也從革金也水以潤下育物火以炎上同天土順則五稼阜滋穀登則烝人乃粒直已以正徳理財以利用務本以厚生此九功所以惟叙也八政食所以生人也貨所以聚人也祀所以仁鬼神也司空實平水土司寇實詰姦慝司徒實敷五教賓以叶多方師以具七德此先王保乂萬有也周星者嵗之紀合􅃋者月之紀信旬者日之紀星辰以察乾象厯數以授人時此先王所以合徳二儀也得其道者王失其道者亡古今雖殊其致一也陛下執古之道馭今之有降此彛訓以及於臣但禀師說難副睿問制䇿曰較前䇿問作聖王之損益揆今代之用舍沿革之要茂對所宜者臣聞貫古今蔽天壤而不可易者道與徳也時損益而皆便於理者名與物也所以無體之禮無聲之樂倚道之主莫不襲行其餘正朔服色聲名文物則三代已降逮乎陳隋各從其所尚爾伏惟陛下視其善者用之其不善者舍之此沿革之要也制䇿曰廢關市之征輕什一之賦者臣以征關市稅什一者古今通典苟不踰轍無害於人誠宜取之以資國用陛下明欲廢之輕之以息黔首甚大恵也然臣以為百姓之患者不生一作在於此生一作在於法令不一賦斂迭興名目滋彰杼軸皆盡爾今王畿之内外地州縣亦不當賦穟者何有鎮守團練等使數州又置節度度支使皆多聚强兵増置部伍車禾斗米皆出於人計其誅求十倍王府至於睚眦之際不戢自焚殺長吏夷城郭者又亦多矣卒然邉陲有難羽檄交馳必不得一人尺鐵以資天討伏望陛下下曠然之詔使内地州縣悉依平時舊帥故老盡罷以息疲人則天下賦稅十減七八矣制䇿曰歸踰年之戍罷無事之官者臣聞王卒以舊楚子所以敗也將驕卒惰項梁所以亡也今縁邉將士功已髙位已重進不求賞退不畏刑伏望申命將帥言於軍中有思歸者因以新卒代之願充軍者復以師律整之夫如是則軍政必行軍政必行則邊無侵軼矣臣又聞賞功以貴任能以職古之道也伏見比嵗詔㫖諸員外兼試等官才者能者改授正員其餘並依本資數進陛下已得八柄馭功之道矣微臣又何間焉制䇿曰法有或不便於時吏有或不䇿問作人将未適其任賢士見沉於負俗遺綱有補於化源者此皆經國大體則當與朝之衆君子議焉臣位卑職疑寡何足裨補然臣以為令合於經而人恱之者可存也令為救弊而作行已乆而猶未安之者可省也若乃申黜幽陟明之典則吏人砥節矣遵棄瑕錄能之義則俊乂勅職矣若王綱者布於方册顧在陛下行與不行何謂之遺矣制䇿曰均沃塉於原田便工商於市肆者臣聞度土功因地利所以恵衆人也禁末作絶竒貨所以恵工商也其要在於申明田令與不擾市人耳制䇿曰改制徵物釐創建正者伏以國家受命向二百年憲章典禮并吞千古今陛下嗣聖御極孝理君臨華夏既平臨欲改制此皆先聖舊典臣竊惜之臣又聞夏以木德王而正以人統殷以金德王而正以地統周以火徳王而正以天統孔子曰夏正為得天此不易之道也制䇿曰復務官曹澄清流品者臣聞設官分職以蕆王事猶列宿定位同拱北辰也伏見艱虞以来増制使額類官有二事人無底從銷錢銷食十場十擾今陛下欲使復務於官人志所底此為政之本也臣聞政以賄成則亷者貪匪疑直其道則貪者亷此仕進之情也今聖慮及此孰不潔其源而浚其流乎制䇿曰朝有濟理之士邉有死難之臣者臣聞舜舉臯陶湯舉伊尹則仁者至矣今賢才夹輔俊乂揚庭猶滄海之富珠璣崑山之積瓊玉但恐未察耳伏望聽政之暇引備顧問則十六相相字亦作才子不専美於堯代矣臣又聞子驕者不志孝臣驕者不志忠伏望陛下訓將帥以禮示師徒以義則伏節犯難者孰變其功乎制䇿曰致䇿問作返俗亷隅還風樸略者臣以為非理疑作難也其化也疑作始於朝廷公卿大夫孰不尚退讓崇節儉而率土之士疇不從風而靡乎制䇿曰授簡之外儻有令圖者臣以為當今所務者生一作在於興禮樂務耕稼禁游食抑奢侈其餘則詔書所以問臣纎悉矣謹對文苑英華巻四百九十一
