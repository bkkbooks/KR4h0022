body:
  text: 文苑英華巻六百六十九宋李昉等編宰相下為人上宰相書一首上宰相書一首復宫闕後上執政書一首北省與黜陟使栁諫議書一首與裴諫議書一首與陳給事書一首賀友人拜右拾遺書一首宰相為人上宰相書白居易二月十九日某官某謹拜手奉書獻於相公執事古人云以水投石至難也某以為未甚難也以卑干尊以賤合貴斯為難矣何者夫尊貴人之心堅也强也不可轉也甚於石焉卑賤人之心柔也弱也自下也甚於水焉則其合之難也豈不甚於水投石哉然則自古及今往徃有合者又何哉此盖以心遇心以道濟道故也茍心相見道相通則水反為石石反為水其合之易也又甚乎以石投水焉何者石之投水者水也猶觸之有聲受之有波心道之相得也則貴者不知其貴也賤者不知其賤也當其㝠同訢合之際但脗然而已矣其合之易也豈不甚於石投水哉噫厥道廢墜不行於代乆矣故貴者自貴耳賤者自賤耳雖同心同道不求相合也今某之心與相公之心愚智不侔也今某之道與相公之道小大不倫也矧又尊卑貴賤之勢相懸如石焉如水焉而欲強至難為至易無乃不可乎然則知其不可而為之者抑有由也伏以相公方今佐裁成之首當具瞻之初竊希處集作變天下水石之心自相公始也通天下貴賤之道自某始也不然者夫豈不自知其狂進妄動哉伏望少留聼而畢辭焉幸甚幸甚伏覩先皇帝之遇相公也雖古君臣道合者無以加也然竟不與大位不授大權不盡行相公之道者何哉識者以為先皇父子孝慈之間亦古未有也盖先皇所以輟已知人之明用賢之功致理之徳以留賜今上也亦猶太宗黜李勣而使髙宗寵用之也故今上在諒隂而特用也相公自郎官而特拜也推此二者有以見識者之言信矣斯則先皇知遇之恩貽燕之念今上速用之㫖倚頼之誠相公寵擢之榮托寄之重自國朝以來三者兼之其亦二字集作甚鮮矣故某竊惟相公自拜命以來八九日間得食不暇飽得寢不暇安行則􅌶然居則惕然思所以答先皇之知副今上之用允天下之望哉某竊以為必然矣况今主上肇撫蒼生初嗣鴻業雖物不改舊而命宜布新是以百辟傾心慺慺然以待主上之政也萬姓注目專專然以望主上之令也四夷側耳顒顒然以聼主上之風也豈直若此而已哉盖待其政者勤惰邪正繫其中焉望其令者憂喜親踈生其中焉聼其風者畏悔動静出其中焉而將來理亂之根安危之源盡在於三者之中矣如此則相公得不匡輔其政緝熈其令宣和其風乎然則匡輔緝熈宣和之道某雖不敏嘗聞於師焉曰天子之耳待宰相之耳而後聰也天子之目待宰相之目而後明也天子之心識待宰相之心識而後聖神也宰相之耳待天下之耳而後聰也宰相之目待天下之目而後明也宰相之心識待天下之心識而後能啓發聖神也然則下取天下耳目心識上以為天子聰明神聖者此宰相之本職也而為匡輔緝熈宣和之道也若宰相唯以兩耳聼之兩目視之一心思之則朝廷之得失豈盡知見乎必未集作不盡也而况於天下之得失乎宰相之耳目得聰明乎必未也而况於上為天子聰明神聖乎然則天下聰明心識取之豈無其道耶必有也在乎知與不知行與不行耳噫自開元以來斯道寖衰鮮能行者自貞元以來斯道寖㣲鮮能知者豈唯不知乎不行乎又將背古道而馳者也何哉集作者古之宰相以危言危行扶危持顛為心今即集作則敏行遜言全身逺害而已矣古者宰相取天下耳目心識為用今即集作則専任其兩耳兩目一心而已矣古者宰相以接士為務今則不接賔客而已矣古者宰相以開閣為名今則鎖其第門而已矣假集作致使天下之聰明盡委棄於草木中焉天下之心識盡沉溺集作没於泥土間焉則天下聰明心識萬分之中宰相何嘗取得其一分哉是故寵益崇而謗益厚嵗彌乆而愧彌深至乃上負主恩下斂人怨行止寢食自有慙色者矣豈非不得天下聰明心識之所致耶然則為宰相者得不思易其轍乎是以聰明損於上則正直銷於下畏忌慎黙之道長公議忠讜之路塞朝無敢言之士庭無執咎之臣自國及家寖以成弊故父訓其子曰無介直以立仇敵兄教其弟曰無方正以賈悔尤先逹者用以養聲集作身後進者資而取仕日引月長熾然成風識者腹非而不言愚者心兢而是効至使天下有目者如瞽也有耳者如聾也有口者如􅅤鋒刄也如此則上之得失下之利病雖欲匡救何由及之嗟乎自古以來斯道之弊恐未甚於今日也然則為宰相者得不思變其風乎是以慎忌積於中而集作則政事廢於表因循茍且之心作强毅久大之性虧反謂率職而舉者不逹於時宜當官而行者不通於事變故殿最之書雖申而不實黜陟之法雖偹而不行欲望惡者懲善者勸誠難矣三字集作誠恐難矣古之善為宰相者豈盡得賢而用之乎豈盡知不肖而去之乎盖在乎集作於秉鈞軸之樞握刀尺之要剗邪為正削觚為圓能使善之必遷不謂善之盡有能使惡之必改不謂惡之盡無成此功者無他懲勸之所致耳然則為宰相者得不思提其綱使群目皆張乎是以懲勸息於此則賢能乏於彼故岳鎮闕而不知所取臺省空而不知所求今則尚書六司之官暨於百執事者大凡要劇者多虚其位閒散者咸備其官或曰所以難其人重其禄也嗟乎徒知難其人而闕之不知邦政日歸於下吏也徒知重其禄而愛之不知稍食日費於冗員也損益利害豈不明哉古之善為宰相者虚其懐直其氣茍有舉一賢者必從而索之茍有薦一善者必隨而用之然後明察否臧慎集作精考真偽得人者行進賢之賞謬舉者坐不當之辜自然審輪轅以相求謹闗梁以相保故才無乏用國無廢官豈可疑所舉之未精而反失其善重所任之不茍而反廢其官與其廢官寧其虚授與其失善寧其謬升但在乎明覈是非必行賞罰則謬升虚授當自辨焉然則為宰相者得不思振其領使衆毛皆舉乎是以庶政闕於内則庶績集作事斁於外至使天下之户口日耗天下之士馬日滋㳺手於道途市井者不知歸托足於軍籍釋流者不知反計數之吏日進聚歛之法日興田疇不闢而麥禾集作粟之賦日増桑麻不加而布帛之價日賤吏部則士人多而官員少姦濫日生諸使則課利少而羡餘多侵削日甚舉一知十可勝言哉况今方域未甚安邊陲未甚静水旱之災不戒兵戎之動無期然則為宰相者得不圖將來之安補既徃之敗乎若相公用天下之目觀而救之夫豈無最逺之見乎用天下之心圖而濟之夫豈無最長之策乎策之最長者見之最逺者在相公鑒而取之誠而行之而已取之也行之也今其時乎時之用大矣哉古者聖賢有其才無其位不能行其道也有其才有其位無其時亦不能行其道也有其才必待集作必待有其才有其位有其時然後能行其道焉某竊見相公曩時制䇿對中論風化澆淳之源明天人交感之道陳兵災救療之術可謂有其才矣又伏見今月十一日制詞云其代予言允屬良弼必能行集作刑四方之風成天下之務可謂有其時矣今相公有其才有其位有其時則行道由已而由道乎哉某又聞一徃而不可追者時也故聖賢甚惜焉方今拭天下之目以觀主上之作為也側天下之耳以聼相公之舉措也如此則相公出一言不終日而必聞於朝野主上發一令不浹辰而必逹於華夷盖主上輯百辟和萬姓服四夷之時在於此時矣相公充人望代天工報國恩之日在於今日矣或者君臣之道至大也可以漸合不可以速合也天下之化至大也可以漸行不可以速行也賢人之事業至大也行之以枉直而尺尋也某以為殆不然矣夫時之變事之宜其間不容息也先之則太過後之則不及故時未至聖賢不進而求時既來聖賢不退而讓盖得之則不啻乎事半而功倍也嗟乎或者徒知漸合其道而不知啟沃之時失於漸中矣徒知漸行其化而不知爕理之化失於漸中矣徒知枉尺而直尋而不知易失於時則難生於漸中雖枉尋不能直尺矣近者宰相道不行化不成事業不光率由乎有志於漸矣請以前事明之某嘗聞太宗顧謂群臣曰善人為邦百年然後能勝殘去殺當今大亂之後將求致理寧可造次而望乎魏徴集作魏之真曰不然夫亂後易理猶饑人易食也若聖哲施化人應如響期月而至集作可信不為難三年成功猶謂其晩太宗深納其言時封徳彛軰共非之曰不可三代以後人漸澆訛皆欲理而不能豈能理而不欲魏徴書生不識時務信其虚説必亂國家於是太宗卒從文貞之言力行不倦三四年間天下大安戎狄内附太宗曰惜哉不得使封徳彛見之斯則得其時行其道不取於漸之明效也况今日之天下豈弊於武徳之天下乎相公之事業豈後於文貞之事業乎在於疾行而已矣所以主上踐阼未及十日而寵命加於相公者惜國家之時也相公拜集作受命未及十日而某有獻於執事者惜相公之時也夫欲行大道樹大功貴其速也盖明年不如今年明日不如今日矣故孔子曰日月逝矣嵗不我與此言時之難得而易失也伏惟相公惜其時之易失集作也而不失焉慮其漸之難也而不取焉抑又聞濟時者道也行道者權也扶權者寵也故得其位不可一日而無其權得其權不可一日而無其寵然則取權有術也求寵有方也盖竭其力以舉職而權必自歸忘其身以狥公而寵必自至權歸寵至然後能行其道焉伏惟相公詳之而不忽也抑又聞不棄死馬之骨者然後良驥可得也不棄狂夫之言者然後嘉謀集作謨可聞也茍某管見之中有可取者俯而取之茍蒭蕘之中有可採者俛而採之則智者必曰如某者七字集作知之者必曰至如某之見猶且不棄况愈於某之徒歟則天下精通逹識之士得不比肩而至乎聞之者必曰如某之言猶且不棄况愈於某之徒歟則天下謇諤敢言之士得不繼踵而來乎伏惟相公試垂意焉則天下之士幸甚某㳺長安已集作僅十年矣足不踐相公之門目不識相公之面名不聞相公之耳相公視某何為者哉豈非介者耶狷者耶今有一旦卒然以數千言塵瀆執事者又何為哉實不自揆欲以區區之聞見裨相公聰明萬分之一也又欲以濟天下顦顇之人萬分之一也相公以為如何如何上宰相書劉蛻天下固有良時既去而悲歌嘆泣之不同故當時則嘆已去而泣過時而歌然君子居其位則耻聞之不在其位則耻不能言之其為士君子之心不忍聞之與聞之而不忍棄之則一也夫思慮可以精安危歩驟可以負戈殳强勁壯勇持乆有守臨事不亂然而良時不與斯不得不歎既而信不見任智不見謀周㳺而晩歸風雨相半苦其精力良時不集而畏事之不成斯不得不泣及其田園已暮始反鄉里白頭無事或有自疑斯不得不歌是其為人皆有憂天下而欲用其道者也不私其身之安佚而休者也既不私其身則公於悲歌者歎泣者也而是人豈以富貴而後天下之心哉蛻也歌之則已太早泣之則不得不豫計嘆之則正當其時而君子未聞雖然閣下及其少壯而用之無使後時泣歌恥累君子幸甚太𤣥曰當時則貴己用則賤其不可後也已矣况當今巖無人矣溪無人矣佐王活人集作治民之術一皆以文學進茍文學進而君子不動心則蛻也不知其所集作所以得罪復宫闕後上執政書楊䕫子雲有言曰琴瑟鄭衛調俾䕫因之亦不可以致簫韶故董仲舒云琴瑟不調甚者必改而更張也舜承堯禪當太平至理之後猶且放四兇舉八元八愷而後百揆四門方克調序當今承百王衰弊之末繼萬法隳散之餘皇綱不序事無舊貫閣下掌國之鈞提人之柄將循其舊而就為治乎將擇其善而漸以化乎將新其轍而革其弊乎某誠不敏粗逹利病之源常欲得布露藴蓄於執政以助教化則與躅人之喜愠隨聲而是非者固不同其軌矣夫廣引古事以黷左右盖類庸醫不審疾病掊聚衆藥合為一法希有或申耳况今下筆者言登庸之善則臯䕫蕭曹語字牧之能則龔黄卓魯此亦閣下飫於聽視矣今不敢逺為徴譬請質而言之閣下將循其舊而就為治耶且四海生靈久䧟宻網舉手摇足如在桎梏其懐革弊剗訛之政如旱苖之待甘雨若循其舊不為之制信其治不為之憂蠧不剔則壞及根本毒不抉則疽及骨肉矣以此知循舊之難也閣下將擇其善而化以漸耶且知人之道聖哲猶難故仲尼有以貎以言之失則閣下所為善者其欲詢於人乎其欲取於言乎取於言言未必信詢於人人未必誠盖澆競日乆煽為朋黨内則巧詐萬變外則絜矩自任同於已者互推互挽出於已者擠辱如仇訪於人有是有非聼於人有端有曲雖秦鑑之明堯羊之觸未免其撓且惑此以見擇善之難也閣下欲將新其轍而革其弊耶在今日時之訛俗之壊况大兵乆役之後救其衰殘未有首於此也前車已覆後車豈可躡而行之固當改轍易塗以取其不傾不蹷道路之人亦知此為至計况廊廟帷幄之畫豈不以是為急哉然民困己乆如涸澤窮鱗噞喁餘喘更沃之沛澤則有蘇活之望若顧而哀之曰吾未能卒致其澤命貫而挈之俟有水之地則捨而放諸則是魚之反不如噞喁於涸澤矣此以見新轍之難也然則為政之道固在乎人其人存則其政舉其人亡則其政息今大兵之後主民䧟於塗穽九州四海固仰首於吾君吾相以待其脫塗出穽也使吾君為堯為舜固在吾相之左扶右翼齊桓公任管仲九合諸侯一匡天下任竪刁易牙則國亂而無主身殁而不殯如此則匡持裨賛繫於臣不繫於君也今閣下莅事以來以為天下安乎危乎賈誼居漢文昇平之代猶言今所安者抱火而厝於積薪之下而寢其上况今日生民首未去其壓足未釋其縳乃欲循常之轍以安輯還定猶為饑仆者譚一作擇翊日之膳將何所濟哉夫欲安其民則莫若擇守宰夫欲固其本則莫若去奢侈夫欲官之治則莫若為官而擇人夫欲弊之革則莫若限田而定賦夫朝廷之立在固本根本根固則兆庶安兆庶安則盗賊息盗賊息則基於太平矣欲安其兆庶莫若擇守宰守宰良則人民安人民安則無逋逸如抱沉痼者偶所親之衛養焉肯捨其親而從踈乎茍不精擇其守慎選其宰信虚聲狥請謁是致禍於民而思其安如挾弹以驅林惡禽之驚也决防以涸泉怪魚之逝也故漢宣帝詔曰與我共治天下其惟良二千石乎故承平之代號為得人内外肅穆時風一變如是則守宰之任其可容易乎其可輕受乎今逺方郡邑民抱愁痛嗷嗷然如嬰兒之望父母也朝廷命牧守選邑宰以何道而取耶其有忘慈惠之心藴聚斂之志不思疾痛但恣刻剥役尫瘵以從欲餙厨傳以邀名天路髙邈呌訴無所居者以逺而吞氣行者以賂而設譽縱使貪過桀跖亦可髙枕夷抑如此則流毒於下豈有既乎故曰欲安其民者莫先於擇守宰也夫世態驕奢競相扇習生民益痛時風益訛昔有諫舜用漆者以其漆不已至於象象不已至於珠玉夫塞其源絶其流猶有浸漬潰防之穴而况抉其源䟽其流其可罪諸洋溢乎且古者車服僕𨽻悉繫於位上不得踰制下不得僣上故貞觀開元之初位至丞相其𨗳從不過十數人而已迨林甫秉政内挾邪以固寵外託勢以立威勝已者巧法以誅之異已者倚公以斥之内外畏惡林甫亦自審其曲由是出入嚴其兵衛如見大敵自後執政者嗣其餘風至今不衰下至散班冗職但力可致者即前有驅後有殿固莫問於品秩矣至於崇徳雅望亦不能復其本縱心有所惡皆有類聚者瞽惑不得固其節矣且月俸即有限餘給即無數以有限之入供無度之費俾其分一職當一位不掊不斂者亦鮮矣車服僕𨽻之為費上且如此况復後庭曳綺羅餙粉黛者其費如何哉故因賂一作賄而仕由賄而逹牛驥皂𨽻汨為一流居外者恃内之權資其刻削居内者恃外之遺益其侈靡耗民之生如城之狐蠧民之力如社之䑕枯骸朽皮盡取後已閣下其不痛心乎其不收泣乎夫四方程式自輦轂出儻閣下尅己以行俾四海知所法則其為革弊剗訛不啻沃湯於砌雪也故曰欲固其本莫若去奢侈也自大駕南廵官失其守冀販繒織畚之伍有安劉滅項之才於是爛羊續貂首尾顛倒茍無董正是紊國經𤣥宗平内難有功者多横行自負姚梁公當國引光武故事請不任功臣以政優其禄秩寘於散地使不干禁忌無韓彭葅醢之戮保子孫爵禄之慶閣下不以是為慮乎書曰官不必備唯其人國家設庠序之官盖閱禮敦詩之本也茍非其人焉可妄授今貴逰豪胄耻言國庠凡受其官意若獲譴故朝廷職事亦以為尋常莫知大學為國之本本顛則枝葉從之矣焉有文明之代輕易儒學齒其位者曽不知書之顛倒而欲以此發明大義闡揚大道是猶責瞽者以𤣥黄詰聾者以律吕舉是一隅則百辟之選豈可不摭其名責其實也故曰欲官之治莫若為官一有守字擇人也今天下黔首不憚征賦而憚力役明勑屢降非不丁寧州縣奉私曽不遵禀既因循未用亦有所未盡焉盖僑寓州縣者或稱前賢或稱衣冠既是寄住例無徭役且勑有進士及第許免一門差徭一作役其餘雜科止於免一身而已今有僥倖軰偶忝㣲官便住故地旣云前曽守官州縣湏存事體無厭軰不惟自置庒田抑亦廣占物産百姓懼其徭役悉願與人不計貨物只希影覆富者稱物産典貼永絶差科貧者以富籍擠排助湏從役利入私室害及疲民無利潤者轉見沉淪有膏腴者坐取安逸衣冠户以餘慶所及合守清亷既恃其不差不科便恣其無畏無忌且古盡一作畫地之數限人名田一則量其貧富一則均其肥瘠今凡稱衣冠罔計頃畝是奸豪之軰輻輳其門但許借名便曰納貨既托其權勢遂恣其苞囊州縣熟知莫能紏摘且州縣所急莫先科差富貴者既黨䕶有人貧困者即竄匿無路上逼公使下窘衣資怨嗟之聲因傷和氣茍權利之路絶請託之幸除即民必泰俗必阜矣何以塞其門杜其隧在定其稅額而已自一品至九品各限其田田有定即賦有限無路廣占矣既絶其廣占既富者無茍免之徭貧者無非次之役則凋瘵何有夫不蘇時俗何有夫不安故曰欲弊之革莫若隨一作限田而定賦也是四者固為政之綱也將欲安其人豐其俗是未有先於此道也復有急於是者盖朝廷之法也夫法者士庶之所以共固不以士則廢庶則用所以一而行之者欲人之鮮過也茍輕者以賂而重曲者以勢而直縱朝廷示於人雖一子不為信而况有勢有賂者焉肯凛畏哉今朝廷之法不及州縣之條州縣之條違者必有刑所以人知懼朝廷之法犯者未必罪所以人莫畏是以冠履雜處首尾倒置國君之威不行於世牧伯之令反信於時如此則風俗日已漓國柄日已陵不其痛歟不其惜歟今為政者未嘗以此為痛葢各急於私不計於法設有其行一作行其典者悉貧而寡援俾其受罰而興怨蓄憤而不能訴鬼神有知固納其訴則伏隂􅄽陽繁霜苦雨豈不職於此哉且石碏殺其子君子以為義叔向戮其弟仲尼以為直今閣下當此大柄豈有捨其義與直而混其名與齷齪者為偶哉今法不患不制而患不行事不患不立而患不公茍以用法必公不以豪强而曲直則不出户可以見四方之承禀不下席可以知兆庶之休戚矣代宗朝用楊綰為相綰性清儉時論推之及為相郭汾陽為河中節度使憚之妓樂減半騐於此即四方凛畏當國者操守耳陳平對漢文云宰相者上佐天子爕理隂陽内親附百姓外鎮撫四夷使御史大夫各得其職今隂陽調乎百姓親乎四夷柔乎内外之職各得其任乎欲隂陽之調也獄無滯訟官無濫政農桑無失時公府無加賦則里有歌巷有頌和聲逹於上休氣屬於下隂陽何有於不調哉欲百姓之親也不奪其力以營䑓榭不刼其才以具土木不掠其糧以給犬馬不賦其財以資交結聞民之病如子之病聞民之飢如已之餒百姓何有於不親哉欲四夷之柔也省刑罰薄賦斂謹庠序之教申孝悌之義鄉里識尚齒之敬道路知事長之禮然後固其關防禁其侵掠槖其戈革示以恩信四夷何有於不柔哉欲内外之職得其任也命各舉所知隨材引用不以位㣲而不録其言不以地寒而不取其行稱文者授以文學之任然後考其文之臧否稱武者授以兵衛之任然後騐其武之勇怯稱理者授以親人之任然後責其理之優劣稱錢榖者授以度支管𣙜之任然後課其錢之盈虚實者升之不副者黜之其升黜皆及其所舉故人不以黨而進亦不以獨而退故内外之職何有不得其任乎自元和以集作已降宰相閉關不接士夫㳺其門升其室者非有世故非有媒薦固不可偶頃刻之語周公一握三沐髪公孫𢎞開東閣邴吉不以吐車茵為過而乃致治平故太平之基非一士之功也借如大厦崇崇誠柱石棟梁之力然捨其欒櫨榱桷此為何室哉今天下有倒懸之急實閣下日以繼日籌其事坐以待旦思其用忘寢食以待徃來捐金帛以給貧困之秋也某家且貧讀書著文之餘以漁獵奉甘滑今閣下居宻勿啓沃之地輙以漁獵為諭焉夫漁於澤徧水而布罟獵於林被野而設罝不徧不被是闕其具也及其獲魚得兎非一日之力今内外百執事亦罝罟之衆目焉焉可一一責其獲又不得以不獲而不設也然能不縱其躍不漏其走亦足助為漁獵矣茍或不掩其走不蔽其躍即捕之無虧其綱紀則後日之漁獵不患於遺矣惟不以詞之繁試一二垂省幸甚幸甚北省與黜陟使桞諫議書權徳輿某月日試秘書省校書郎權徳輿上書閣下徳輿材術無聞集作材實無能重以拙訥雖星軺徃復皆獲趨拜竟未得粗承餘論少盡下情伏䝉以彌集作邇世之舊將獻狀上録感戴循環不知所措或有所見敢布愚𠂻何者今皇帝馭天下之初將欲㧞才俊延幽滯綜覈名實覽觀風俗故分詔近臣省問四方將天之命其㫖不細則閣下舉一士用一賢必當窮騐聲實精䆒終始一旦以愚當薦士之目誠衆多所未喻也凡以故舊之私不能忘情與夫推賢類能其事則異今者澄清省察以得人為功直道公議天下屬目此時而失則所失多矣徳輿伏膺儒行三十未立拊躬責已知不如人候他時進修與諸生齒方冀當大君子眷念之至申鄙夫報効之分今者有集作若以貲用所逼茍進一官則傭書販舂亦足自給必不敢以區區之身上累名器敢拒黔敖之食徐受山濤之恩下情所守在此而已是以竟未獲拜謝者以必所不敢當也伏惟宴閒之餘俯察愚朴文章鄙畧不足以煩省覽用此陳露慙畏伏深不宣徳輿再拜與裴諫議虬書于卲閣下昨日愚子臯謩起居廽䝉以放鷹度隴二賦及宗儒銘自發東甌至安南諸作見示隋掌明珠忽䝉分惠一作玩秦䑓重璧不間旁臨是何衰暮偶此殊觀幸甚幸甚自㣲言中絶大義復乖歴戰國縱横之後遭亡秦煨燼之末四始不作斯文無紀漢興總輯馳騖稍復詩騷之體訖建安之間皆可垂訓風流更代紛然殽雜迨有髙下不可勝論齊梁陳隋至乃流遁矣國家受命煥乎文明開元天寳於斯為盛格髙體正者君臣之義天人之際畢偹於斯矣先覺後進其誰間焉屬三十年來兵戈不息所務者急所貴者異過一作遇之則進不過一作遇則墜考之文章東不流於海南不集於江萬方行紀安可考哉某性乏天假學非専門徒以菲薄少有謬膺清切特用潤色鴻業頗承渥私孤奉明恩競速官謗謫居之地闕猶佐大藩承府公廕庥忝下榻清讌風亭月觀美景良辰未嘗不接髙興陪嘯詠雖唱髙和寡未能𢎞道雲從風感時頼起予如此之眷者如此之樂者嵗不我與星廽四周而不知老之將至累之在已餘生之幸斯亦厚矣閤老心無所負神保其真冒南氣之炎鑠泛重溟之湍􅗭清光可鑑素履惟精雲天意長復此與合有足歡也今網羅俊乂渴日為勞明詔屢下旁求四逹未有天生棟梁而不構大厦時遭覇王而不先受器者也在姑務修徳而已前日之命情實未盡燭不見䟦露不稱晞區區主人有所慙遜信宿而未獲拜賜者實以沉瘵之故旦暮為劇况南面梧疑北背瀟湘嵗聿云暮於焉遷客心折骨驚復何言哉所得四巻繕寫已畢致之篋笥為藏馳遣臯謩送本不復一與陳京給事書韓愈愈再拜愈之獲見於閣下有年矣始者亦嘗辱一言之譽貧賤也衣食於奔走不得朝夕繼見其後閣下位益尊伺候於門牆者日益進夫位益尊則賤者日隔伺候於門牆者日益進則愛博而情不專愈也道不加修而文日益有名夫道不加修則賢者不與文日益有名則同進者忌始之以日隔之踈加之以不專之望以不與者之心聼忌者之説由是閣下之庭無愈之跡矣去年春亦嘗一進謁於左右矣温乎其容其若加其親也厲乎其言其若憫其窮也退而喜也以告於人其後如東京取妻子又不得朝夕繼見及其還也亦嘗一進謁於左右矣邈乎其容其若不察其愚也悄乎其言其若不接於集作其情也退而懼也不敢復進今則釋然悟飜然悔曰其邈也乃所以怒其來之未繼也其悄也乃所以示其意也不敏之誅無所逃避不敢遂進輙自䟽其所以并獻近所為文復志賦以下十首為一巻巻有標軸送孟郊序一首生紙寫不加粧餙皆有楷註字處急於自觧而謝不能俟更寫閣下取其意集作言而畧其禮可也愈恐懼再拜賀友人拜右拾遺書自外府恊律召拜劉蛻今日街東見詔書以執事拜右拾遺朝廷之意將有在擇能言者而使之言哉雖執事材氣壯健他日無不乗之若驟以地一作他遷耶一作即未嘗有也故蛻謂朝廷之意將有在也魯欲用樂正子為政孟子聞之喜而不寐僕不止為執事且為天下不寐也丞相致主上復貞觀之業自此敢伺察者必得伺察敏集作敢口舌者必得口舌所嫌忌出棄者稍稍引用蛻幸未老一二年得見朝廷治平著歌謡為訓詁也然人世幾何時不可遭伏惟執事飲食起居無忘丞相意文苑英華卷六百六十九
