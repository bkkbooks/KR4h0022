body:
  text: 文苑英華巻五百宋李昉等編厯運五運一道厯數一道災祥祥瑞一道議祥瑞辨祅災一道興五福銷六極一道辨水旱之災一道養動植之物一道五運見四百八十二巻題作賢良方正策第二道吳師道厯數問𤣥龜效祉鼎命昭夏王之祚赤烏呈祥金徳總商君之業白魚躍而周道隆丹雀來而秦徳覇殷因夏禮損益可知秦盛周衰天人何昧若水滅火起殷周之運匪人若桀暴紂昏廢興之期自我然而龍鬬興於夏日黿祅發於周年災祥兆於前成荒敗形於後政蕩蕩之徳何所加焉佇爾揚名為余張目對馮萬石對臣聞天地草昧洪鈞列五運之期雲雷始屯大德分一人之位莫不時来命偶人迪一作遊天將白環昭虞后之功𤣥珪錫夏王之徳空桑負鼎遇為牲之君渭水張羅得非熊之相伏惟陛下化光坤載道叶乾行總五氣以發生籠百王而亭育粤若稽古推厯數之存亡感而遂通酌天人之符命明揚側陋典採芻詞開闡大猷旁求雅問則天文幽逺誠匪管窺然人事昭彰敢陳壅塞原夫興亡有數符命無差遽啓丹書俄逥白璧君臣道合則遐邇乂安上下情乖則邦家板蕩水火革而天人順暴亂行而桀紂亡百六為霖旱之災七九非湯堯之運厯數斯在惟徳動天禍福無門惟人所召故徳者五行之義也人者兩儀之心也人心動而悔恡生徳義形而隂陽謝必乗金運則殷不及於期果歴木行則周不及於數龍鬭黿祅之發人與事并白魚丹雀之符徳將時應一作神契神道設教金土之運匪他人文化成狂聖之來自我蕩蕩之徳何敢不通翼翼之心爰疑作奚施不可天也人也坦然克分時乎命乎昭文斯辨臣優柔理道一作致理杳同河漢或躍文江懼深氷谷謹對祥瑞見四百八十二巻題作賢良方正䇿第三道吳師道議祥瑞辨祅集作妖災白居易問國家將興必有禎祥國家將亾必有祅孽斯豈國之興滅繫於天地之災祥歟將物之妖瑞生於時政之昬明歟又天地有常道災祥有常應此必然之理也何則桑穀之妖反為福於太戊大鳥之慶竟有集作成禍於帝辛豈吉凶或僣在人將休咎不恒其徳儆戒之徵安在改悔之效何明又祥必偶聖妖必應昬何則明時不能集有為字無災亂代或聞集有其為二字有瑞報應之道何謬盭集作濫哉此下四篇並於白居易集凖備制科七十五門中摘取其問答皆居易擬作對對臣聞國家將興必有禎祥國家將亡必有妖孽者孽生而後邦䘮非祥出而後國興盖瑞不虚呈必應聖哲妖不自作必候淫昬則昬聖為災祥集作祥孽之根妖瑞為興亾之兆矣文子曰陰陽陶冶萬物皆乗一氣而生然則道之休明徳動乾坤而感之者謂之瑞政之昏亂腥聞上下而應之者謂之妖瑞為福先妖為禍始集作生非將興將廢實先啓焉一作瑞為福始將興必先示焉妖為禍始將廢實先啓焉然有人君徳未及於休明政不致於昏亂而天文有異地物不常則為瑞為妖未可知也或者天示儆戒之意以悟君心俾乎徳集作君脩改悔之誠以答天鍳如此則轉亂為理變災為祥自古有之可得而考也臣聞髙宗不聰飛雉雊于鼎宋景有罰熒惑守于心及乎懋懿徳以脩身出善言而罪已則升耳之異自殄退舍之慶自臻天人相感可謂明矣速矣且高宗三代之賢主也有一徳之違亦謫見于物宋景列國之常主也有一言之感亦宜應于天則知上之鍳下雖賢王也苟有過而必知下之感上雖常主也茍有誠而必應故王者不懼妖之不滅而懼過之不悛不懼瑞之不臻而懼誠之不至足明休咎集作徴在徳吉凶由人矣失君道者祥反為妖悟天鍳者災亦為瑞必然而已矣抑臣又聞王者之大瑞在乎天地泰陰陽和風雨時寒暑節百穀熟萬人安賦斂集作役輕服用儉兵甲集作革偃刑罰措賢者出不肖者退聲教日被謳歌日興此之謂休徴此之謂嘉瑞也王者之大妖在乎兩儀不泰四氣不和風雨不時水旱不節五穀不稔百榖不藏徭役繁集作煩征税集作賦重干戈動刑獄作君子隠小人見政令日缺怨讟日興此之謂咎徵此之謂妖孽也至若一星一辰之理一雲一露之祥一鳥一獸之妖一草一木之怪或偶生於氣象或偶得於陶鈞信非休咎之徵興亾之兆也何則隠見出處亦不于常明聖之朝不能無小災小沴衰亂之代亦或有小瑞小祥固未足質帝王之疑明天地之意爾王者但外思其政内省其身自謂徳之不脩誠之不著雖有區區之瑞不足嘉也自謂政之川文粹有不字能立道之川文粹有不字能行雖有瑣瑣之妖不足懼也臣竊謂妖瑞集作祥廢興之由實在於此故雖辭費不敢不備而書之興五福銷六極問周著九疇之書漢述五行之志皆所以精究天人之際窮探政化之源然則五福之祥何從而作六極之沴何感而生將欲辨明可行本末又今人財耗費既貧且憂時沴流行或疾而夭思欲銷六極興集作致五福敺一代於富夀納萬人於康寧何所施為得至於此也五字集作可致於此對對臣聞聖人興五福銷六極者在乎立大中致大和也至哉中和之為徳不動而感不勞而化以之守則人以之用則神巻之可以理一身舒之可以濟萬物然則和者生於中也中者生於不偏也不邪也不過也不及也若人君内非中勿思外非中勿動動静進退皆得其中故君得其中則人得其所人得其所則和樂生焉是以君人之心和則天地之氣和天地之氣和則萬物之生和於是乎三平之氣訢合絪緼積為夀蓄為富舒為康寧敷為攸好徳益為考終命其羡者則融為甘露凝為卿集作慶雲垂為徳星散為景風流為醴泉六氣叶乎時七曜順乎軌迨于巢穴羽毛之物皆煦嫗而自蕃草木鱗介之祥皆叢萃而繼出夫然者中和之所致也若人君内非中是思外非中是動動静進退不得其中故君不得其中則人不得其所人不得其所則怨歎興焉是以君人之心不和則天地之氣不和天地之氣不和則萬物之生不和於是乎三不平之氣交錯堙欝代為凶短折攻為疾聚為憂損為貧結為惡耗為弱其羡者潜為伏陰淫為愆陽守為彗星發為暴風降為苦雨六氣失其序七曜亂其行迨于襁褓􅆑胎之生皆夭閼而不遂木石華蟲之怪皆雜糅集作糅雜而畢呈夫然者不中不和之氣所致也則天人交感之際五福六極之來豈不昭昭然哉臣伏見比者兵賦未減人鮮無憂時沴所加重或有疾徳宗皇帝病人之病憂人之憂於是救之以廣利之方恱之以中和之樂將使易憂為樂變病為和恵化之恩莫斯甚也然臣竊聞善除害者察其本善理疾者絶其源伏惟陛下欲紓人之憂先念人憂之所自欲救人之病先思人病之所由知所自以絶之則人憂自弭也知所由而去之則人病自瘳也然後申之以救療之術則人易康寧鼓之以安樂之音則人易和恱斯則必應疾而化速利倍而功兼六極待此而銷五福待此而作如此集作是可以陶三才繆盭集作濫之氣發為休祥敺一代鄙夭之人臻乎仁夀中和之化集作氣夫何逺哉辨水旱之災明存救之術問狂恒雨若僣恒暘若此言政教之道必感於天地又堯之水九年湯之旱七年此言陰陽定數不由於人也若必繫於政則盈虚之數徒言如不由於人則精誠之禱安用二義相戾其誰可從又問陰陽不測水旱無常欲均嵗功於豐凶救人命於凍餒凶歉之嵗何方可以足其食災危之日何計可以固其心將備不虞必有其要歴代之術可明徵焉對臣聞水旱之災有小有大大者由運小者由人由人者由君上之失道其災可得而移也由運者由陰陽之定數而其災不可得而遷也然則大小本末臣粗知之其小者或兵戈不戢軍旅有强暴者焉或誅罰不中刑獄有寃濫者焉或小人入用讒佞有得志者焉或君子失位忠良有放棄者焉或男女臣妾有怨曠者焉或鰥寡孤獨有困死者焉或賦斂之法無度焉或土木之功不時焉於是乎憂傷之氣憤怨之誠積以傷和變而為沴古之君人者逢一灾遇集作偶一異則收視反聼察其所由且思乎軍鎮之中無乃有縱暴者耶刑獄之中無乃有寃濫者耶權寵之中無乃有不肖者耶放棄之中無乃有忠賢者耶内外臣妾無乃有幽怨者耶天之窮人無乃有困死者耶賦入之法無乃有過厚者耶土木之功無乃有屢興者耶若有一於此則是政令之失而天地之譴也又洪範云集作曰狂恒雨若僣恒暘若言不信不乂亦水旱應之然則人君茍能改過塞違率徳脩政勵敬天之志虚罪已之心則雖踰月之霖經時之旱至誠所感不能為灾何則古人或牧一州或宰一縣有暴身致雨者有救火返風者有飛蝗去境者郡邑之長猶能感通况王者為萬乗之尊居兆人之上悔過可以動天地遷善可以感神明天地神明尚且不違而况於水旱風雨蟲蝗者乎此臣所謂由人可移之災也其大者則唐堯九年集作載之水殷湯七年之旱是也夫以堯之大聖湯之至人於時徳儉人和刑清兵偃上無狂僣之政下無怨嗟之聲而卒有浩浩滔天之災炎炎爛石之沴非君上之失道也集無也字盖陰陽之定數也集作矣此臣所謂由運不可遷之災也然則聖人不能遷災能禦災也不能違時能轉集作輔時也將在乎廪積有常仁恵有素備之以儲蓄雖凶荒而人無菜色固之以恩信雖患苦而人無離心儲蓄者聚於豐年散於歉嵗恩信者行於安日用於危時夫如是則雖陰陽之數不可遷而水旱之災不能害故曰人強勝天盖謂是也集作矣斯亦圖之在早備之在先所謂思危於安防勞於逸若患至而方備災成而後圗則雖聖人不能救矣抑臣又聞古者聖王在上而下無凍餒者何哉非家至而日見衣之而食之盖能均節其衣食之源也夫天之道無常故嵗有豐必有凶地之利有限故物有盈必有縮聖王知其必然於是作錢刀布帛之貨以時交易之以時斂散之所以持豐濟凶用盈補縮則衣食之費穀帛之生調而均之不啻足矣盖管氏之輕重李悝之平糴耿夀昌之常平者可謂不涸之倉不竭之府也故豐稔之嵗則貴糴以利農人凶歉之年則賤糶以活餓殍若水旱作沴則資為九年之蓄若兵甲或動則餽為三軍之糧上以均天時之豐凶下以權地利集作財之盈縮則雖九年之水七年之旱不能害其人危其國矣至若祈禱之術凶荒之政歴代之法臣粗聞之則有雩天地以牲牢禜山川以圭璧祈土龍於𤣥武舞羣巫於靈壇徙市修城貶食撤樂綏刑省禮務穡勸分殺哀多昏弛力舍禁此皆從人之望隨時之宜見集作勤恤下之心表㳟天之罰但可以濟小灾小弊未足以救大困集作危大荒必欲保邦邑於危安人心之集作於困則在乎儲蓄充其腹恩信結其心而已盖羲農唐虞禹湯文武皆由此道集作塗而王也問養動植之物以豐財用以致麟鳯龜龍對臣聞天育物有時地生物集作財有限而人之欲無極以有時有限奉無極之欲而法制不生其間則物必暴殄而財乏用矣先王惡其及此故川澤有禁山野有官養之以時取之以道是以豺獺未祭罝網不布於野澤鷹隼未擊矰弋不施於山林昆蟲未蟄不以火田草木未落不加斤斧漁不竭澤畋不合圍至於麛卵蚳蝝五穀百草集作果不中殺者皆有常禁夫然則禽獸魚鼈不可勝食矣財貨器物集作用不可勝用矣臣又觀之豈直若此而已哉盖古之聖王使信及豚魚仁及早木鳥獸不狨胎卵可窺麟鳯効靈龜龍為畜者亦由此塗而致也文苑英華巻五百
