body:
  text: 文苑英華巻九百一宋李昉等編軄官九東宫官二太子少傅竇希瑊碑一首贈太子太保伊慎碑一首太子少保韋君碑一首太子少傅竇希瑊神道碑李堪然若夫懸象著明保傅繋三台之位厚徳載物公侯分五嶽之尊環耀魄而布隂陽佐林蒸而平水土斯所以寅亮天地寧濟寰區自匪氣稟英靈藝兼文武發揮成務之本模楷具寮之徳則何以弼諧邦教調䕶元良粤惟纂懿前修追蹤上哲總淳粹以秀出偶㑹昌而挺生贒戚載彰寵光崇賁者其在我司空豳國公乎公諱希瑊字美玉扶風平陵人也昭成皇太后之介弟開元神武皇帝之元舅即隋工部侍郎左右武侯大將軍納言司空上柱國陳國公抗之曽孫皇朝駙馬都尉工部禮部二尚書右領軍大將軍殿中光禄大夫上柱國莘國公誕之孫太常卿潤州刺史贈太尉荆州大都督上柱國豳國公孝諶之元子也而自祥生石紐祚啓金刀盛葉與塗山比崇長發將觀津方永文昭武穆帝載矢之於典謨累將重侯后族布在於方冊故得國華人傑躡振古以騰芳服冕乘軒迄昌辰而益茂莫不歌鍾繼響喧喧連北里之音邸舘相望藹藹並東都之盛歴代之所推挹豈可一二談哉公鼎伷標華公門争秀一作祉仰庇軒星之曜傍通間氣之英天生仁智之姿日用温㳟之性弱齡志尚卓爾多竒阮瑀之朗朗無䨇黃憲之汪汪不測豈可同年而語也年十有五補修文舘學生鼓篋上庠橫經太學中年考檢僉我大成屬穹昊䧏災髙宗厭代白雲方馭攀鳯駕而無追素幘為郎翊龍輴而暫往既調授潞州叅軍尋遷常州司兵叅軍事上黨關山毗陵郡邑既承君子之命又叅從事之班夫惟濫觴盖兹而始秩滿入拜安國相王府功曹叅軍乆之遷為屬時睿宗之藩潜龍徳在田猿巖尚啓累接曵裾之侣屬陪飛盖之逰樂善載歡承恩莫二唐景雲元年睿宗登極加朝散大夫除殿中尚食奉御黄金兼錫朱紱増榮調九沸於宸羞薦八珍於帝膳景龍元年又遷為太府少卿兼知尚食事司帑藏之珍奉雲天之宴樂㡬承恩奬増峻寵章二年加銀青光祿大夫殿中監乗輿服物御府斯殷纂慎日宣𤓰牙尢寄曽未踰朔又拜左右千牛衞將軍而帝謂公曰朕昔在藩嘗居此軄而其宿衞親近今故授卿其承寵私有若是也衞鉤陳於北極應上將於南蕃榮冠等夷地兼勲戚雖古之位踰九卿班同三府者亦無以方焉先天元年遷金紫光祿大夫右散騎常侍兼檢校光祿卿無何又正除光祿侍中同掌印毦一作珥貂蟬郎中改名攸司殿掖豈有髙堂擅青龍之疏張湛推白馬之名兼而有之不其榮矣開元二年遷太子少傅襲爵豳國公加賜食實封二百户以六行之姿翼千鈞之務琢磨光乎玉裕輔導整於銅樓有華廙之清簡富匡衡之法義庶常儀刑八一作帝座通籍二宫福履有綏䧏年惟永而過隙之影背閶闔以言旋但閱川之波辭少海而無返開元五年嵗在丁巳冬十月丁巳朔十六日甲戌暴薨於東都章善里之私第春秋五十有四嗚呼哀哉慟感宸旒有切渭陽之念哀纏士庶逾深鄭國之悲粤翌日聖上舉哀於洛城南門輟朝三日贈司空荆州大都督賻八百段米粟八百石及東園秘器㓙事葬事官給務令優厚仍令將作大匠韋凑充使監護河南少尹秦守一為副鴻臚少卿李顒持節齎壐書弔祭儀仗送至墓所并為立碑發引之日令工部尚書劉知柔祖祭有司考行謚曰某禮也渥命優洽事越彛典惟公䧏靈純嘏禀秀中原風範自髙衣冠甚偉雖地稱金宂外家之罷克崇位翊瑶山儲輔之尊斯在而謙以約已徳以潤身九列重其章眀百寮仰其忠儉夫所謂貴而不驕志眀而晦者無廼踰於公乎名命雖臨濛暉莫駐佳城欝欝遽開京兆之阡詔葬紛紛即赴畢原一作酆之路旌旐飛飜而笳皷噎恩容衞動而行路悲嗣子朝散大夫行太子典設郎錬次子太子内直郎鋼等衘恤哀毁退一作進而不及粤以開元六年夏四月九日癸酉歸葬於京兆咸陽縣洪瀆川之北原八水分流五陵交對星辰照爛於東井烟景宻邇於西岳龜言筮告此地攸安萬古千春徳音何託惟披文與相質恪奉絲綸冀地乆而天長永昭徽範下才不敏敢述銘曰昭昭茂族赫赫崇庸石紐疏系金刀建封軒皇代稟間氣時鍾鳴隂必嗣嘯谷相從越洎我公秉心貞吉肇逰庠序歴代天秩東郡勞人西都賦質龍飛偶運鵬圖匪日絲綸驟委章紱増榮既典六尚俄昇九卿鉤陳任切武衛資英左右惟允於斯作程獻替嘉猷載司光祿琢磨儲範方調鼎餗懵矣神心宜㢤一作載非倚伏曽不遐壽奄焉薨覆帝念元舅情深渭陽輟朝興慟詔葬哀傷亟峻典禮逾崇寵章鼎門南出畢陌西長旐引輤軒笳隨魂輅容衞哀咽山川廻互秦塞從指漢原已暮紀盛烈於豐碑庶有旌於武庫故光禄大夫檢校尚書右僕射兼右衛將軍南充郡王賜太子太保伊公神道碑權徳輿昔伊尹相湯伊陟相大戊咸有一徳格于上帝其後伊籍以敏辯仕蜀為將軍伊馥以勇力佐魏為司空曠遼集作僚綿代復纉休緒者曰南充郡王諱慎字寡悔剛毅勇悍鷹揚鶚立勞勤四朝終始一心渉覧春秋戰國䇿太史天官五行之書用善射中正集無正字鵠補廣州綏南府折衝都尉丁太夫人之集無此字憂以毁瘠聞初公之孤也㓜不知先子之殯將祔二尊日號于天䰟交神遌肹蠁誠感壤而樹之率禮無違大厯中嶺南禆將哥舒晃盗殺其帥吕崇集作嵩賁以亂竊據府中南方蕭然江西連帥路嗣㳟承詔出師命將孟瑶暨公討之集作以討公以水陸士徒分道皷行晃之謀主蘇渙騎將王眀恱鴟張蟻聚皆據扼害公曰㓂不可翫勝無幸焉毒之酒集作酋腊盡在是矣疾力作集作交捽必亟吾中乃舂其喉而潰其腹斬首三千級下韶州其眀年戰于把江口水道湍悍戈船赼趄公浮筏寘薪迎風縱熖㓂之燋没於水火者終夕有聲又眀年軍于濬集作渭口于端州戰集無戰字于潮陽次于交廣集作廣州冬十月斬晃渙于泔溪掲其首以徇幕府上功拜連州長史授撫處江三州别駕建中初徳宗訓齊萬方端正百度以梁崇義負阻江漢未嘗㑹朝詔東諸侯分道問罪公實領江西偏師歸集無此字而統于希烈希烈以牒書署公漢南漢北兵馬使公眀置集作智牢讓獨率所部兵大破翟輝於蠻水俘徒三萬以至于斬崇義平江漢厥功居多希烈愛公愈深而公懼之愈切一旦决與數騎遁歸既而希烈以急上集無此字變聞且賂公以堅甲善馬為之反間宻詔嗣曹王即訊因俾論公如法公方握兵符在境上㣲聞有命歛手就召曹王挹公名義偉公姿材取酒為壽交歡感泣手疏上列辯其寃誣委之先偏激以自效乃略黄梅次長平遇劇賊韓霜露引滿中股斃於萬衆之前其徒相蹂蹈死者十七八投蔡山集作州非取蘄州䧏山㓂李良領蘄州刺史剖符為王加御史中丞興元廵狩之嵗使臣底貢次于蘄口時希烈已屠䧟大梁遣其腹心杜少誠引勁兵絶江流公行師七千列樹三柵破之於黄崗少誠遁走斬騎集無此字將許少華封其尸為萬人冡進圖安州希烈遣其甥劉介靈二唐書作介虛來援迎集無迎字擊於應山生得介靈與郭嵩李廷玉䧏七千人收户一萬四千人夫婦男女耕桑安堵乃督安州加御史大夫真食百户集作室二年五月引兵攻段集無此字隨走康叔於厲鄉獲馬牛輜重以益軍實表偽署刺史李惠登為之刺史終以理行聞十二年用乆次就加右散騎常侍後三嵗天子以公積功勞使中貴人持命書金印即授公節度觀察使且裂齊安為之集無之字支郡尋詔公兼統荆洪潭三道之兵討叛於蔡敗之於三州港營於義陽戰于申斬級千數有詔班師就加刑部尚書進右僕射今天子嗣位拜章入覲真授右僕射俄檢校左僕射兼右金吾衞上將軍坐細故退為右衞將軍眀年復檢校右僕射兼右衛上將軍元和六年十二月晦􅃦疾薨于光福里不及懸車者二嵗追賜集作錫太子太保同盟諸侯皆使其命介來弔祠視䘮事眀年夏五月庚申葬于萬年縣某原鹵簿騎吹加集作如彛禮初公之曽王父皇太子通事舍人澄生左衞長史恱恱生贈太子太保衡公之祖穪也積善餘裕追崇以大惟公以武毅通文理硯席餘餘字集作楷𨽻師心自得感慨出倫談辭如雲起南方禆校履集作屢䧟軍陣發若猛鷙不辭劇昜急病而益裕其才履危而不怵於邪悃愊忠直為中興名將以至於授英蕩題龍泉有功烈勲勞於天下脫劔薦紳從容漢廷徼循師長文武二品啓禮歸全追榮宫師豈徒然㢤公之息男十六人其冢嗣曰宥左領軍衞將軍押右神䇿軍牙門之軄能率義順集作訓以揚家聲初公來朝也詔宥以侍御史領安州刺史繇二千石入筦南北軍教忠移孝情禮盡在宥以鄙夫與太保居同里閈具以理命遺緘辱徵其集作斯文表諸神道不敢誣也銘曰在殷保衡負鼎而相惟唐南充推轂為將泔溪之刑嶺表乃平蠻氷之揵漢南以清蔡兇滔天曹邸皷行公率武旅迅如風霆蘄春安陸連下劇城集作地專地集作城建牙𢎞大名器交修威惠較著功利秉集作介圭㑹朝脫躧師帥南宫端右武侯緹騎沐浴休眀保完富貴嵗䧏婁兮月大吕一氣散兮無處所鼈甲車兮馬鬛封九原夕兮閟音容掲此介石厥聲無窮故太子少保贈尚書左僕射京兆韋府君神道碑吕温山之大者匿峯巒含氣象積髙無倪而不見其險孕粹有物如集作而不知其神此其所以為大也徳之全者毁圭方黜集作㸃皎厲靈機宻運如集作而智不驚愚遐摽特立而迹無變俗此其所以為全也然則太山髙而可陟全徳近而難知我求其倫見之於少師公矣公諱某字某京兆杜陵人其先帝堯光宅讓徳儲慶建國命氏列于夏商相胄卿族繁于漢魏代濟不殞煥焉集作為盛門大王父諱某皇朝主客郎中萊濟商三州刺史王父諱某倉部郎中大原少尹贈秘書監烈考諱某檢校都官郎中嶺南節度行軍司馬贈同州刺史或以瑚璉之器纔施郡政或以巖廊之姿僅及戎佐與時俱息從道而汚屈不試於當年啓莫京於身後公生而岐嶷弱而老成渾粹不散清眀虛映朱絃遺音而宫商自韻大圭不琢而符彩溢發邈矣集作是天爵爛乎人文皷鐘之聲日逺卿典之譽來逼釋褐太子正字與仲弟正卿以賢良偕徵䇿入異等冥鴻集作鴻冥䨇舉當代榮之授髙陵主簿遷監察御史改殿中内供奉東都留守判官即拜東臺殿中集作此二字侍御史叅畫惟允持繩不回河洛之間風聲尚在徳宗躬决庶政本於尚書責成曹郎綜練材實薦出方伯時超貳卿二十年間斯為極遷集作選是公由是前後遷刑部吏部員外郎吏部郎中奏議推羙彌綸成績南宫之故事存焉于時戡復日近勲勤者衆都市惰㳺盡垂金紐邦畿豪奪半賜丹書輕禽逸於踈網悍馬駭於柔轡上思懲抑必假集作挨良能公由是前後歴奉天長安二縣令仁護鰥惸智鈐豪右輿人之道集作遺詠在焉望由實濟任以望重選曹未㡬遷給事中既居駮正之司不撓當官之論屬東南嵗歉俾乂惟難出為常州刺史天寳之後中原釋耒輦越而衣漕呉而食一隅重困五紀于兹公臨之清貞結以忠恕固存集作固給惠寡務嗇勤分一法以去其侵渙多方以備其灾患以逸道而使繕完允濟以與道而取賦入先期聲聞天朝考績連最轉蘇州刺史二境之間百里而近靈源自出殊𣲖共清膏澤所霑異壤同潤下車朞月報政如初加秩賜金借留累嵗無何彭沛䘮師兵驕地偪安危所繫朝論集作議難之乃以公檢校秘書監兼御史中丞賜紫金魚袋充徐泗節度行軍司馬重其威望將委旄鉞而未命程伯徐方之軌既同不見賈生宣室之徵遽至擢吏部侍郎倫品甄眀通簡節適勢有探湯之熱我以静濯衆有皷簧之喧我以心聽馴致其羙闇然日彰不求無失職之人人自以為不失職矣輟拜京兆尹徳刑交修寛猛相濟匪設鉤距物無遁情匪曜鋒鋩機無滯斷浩穰之理不肅而成不求無不欺之吏吏自以為不能欺矣俄改太子賔客辭劇就閒圖南之勢一息選徳求舊居東之命惟重遷檢校工部尚書兼御史大夫充東都留守東都畿汝州都防禦使自盗起幽陵兵屯諸夏渉淮而北軍國異容分陜以東古今殊寄公講信修睦外張保釐之政完備訓戎内寓折衝之令矛㦸不露徳耀藹然遐邇頓首以承風強暴革心而知懼今上嗣統就加檢校吏部尚書方入諧僉屬毗賛大化不幸嬰疾表求退頥集作歸優詔除太子少保冀其休復將有後命神祗竟昧藥禱無真集作􅑙以元和元年三月十二日薨於東都履信里之私第享年六十有四寵贈尚書左僕射輤車西歸制使賻弔太常褎議謚曰某公哀榮備矣夫人河東裴氏侍中耀卿之孫給事中臯之女徳門一作行鍾羙淑問集作聞充塞蕣華集作榮早落蓍兆叶期即以是年五月二十一日合葬于萬年縣髙平鄉少陵原禮也公孝悌天至行有餘力仁義性徳匪俟服膺不餙表以近眀集作名是每集作恒縱心如集作而中矩清虛簡淡而應物不倦通曠夷昜而及門無雜不尚意氣而然諾篤志不好臧否而鍳識超倫與故相國齊江西映穆宣州賛賛弟侍御史員為文章道義之友可以視其所親矣今吏部郎中扶風竇羣杭迹毗陵退身進道公三揖郡榻之上一振天墀之下不數嵗間蔚為重器可以視其所與集作舉矣分正東郊開府辟士則有今右司郎中燉煌叚平仲倉部員外郎安定皇甫鏄禮部員外郎清河張賈泊集作此字京兆尹韋詞集作嗣隴西李景儉中山衞中行平陽路隨皆羣彦之秀出一時之髙選可以觀其所任矣加以志尚幽逺冥搜好古所居第必有松石之致退公暇日常以圖籍自娯一字愜心金玉不顧片言同趣布褐無間亹亹然若見道之所存陶陶然不知嵗之云晏於戱䇿名從事四十餘年朋友罕聞得䘮之言家人莫見喜愠之色坦懐以處推分而行無怨集作恩於人人亦無怨無集作不無猜於物物亦無集作不猜履信順以優㳺保福祿而終始其名敎之大雅者歟有九子長曰元貿前常州義興縣尉次曰榖前邠州司倉次曰璋郷貢進士能修詞立誠克家致羙茂揚風訓休有令問集作聞其次某某等皆殊資異識登於闕齡集作齒慶善之餘也以某獲窺墻仭見託篆述䆒賢人之業信而無媿申孝子之志直而不文其詞曰利建于商介圭作寳爰立於漢緇衣改造克昌厥𦙍奕世載考亞尹擅名郎中懐道莫躋貴仕莫享難老藴靈儲休以啓少保丕一作不顯少保其徳愔愔有綽集作悼遐姿曠哉靈襟顯仁山立藏用淵沉煦如冬陽藹若春隂白圭三復克保眀心黄鍾九變莫匪和音静專動直謙進柔克宜踐公輔以楨王國促路頓軌中天墜翼少陵右集作古是原拱樹寒色窮壤可弊唯名不失金石垂之以慰罔極文苑英華卷九百一
