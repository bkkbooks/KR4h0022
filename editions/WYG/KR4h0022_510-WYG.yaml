  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0022_WYG_510-1a, image: WYG1337/WYG1337-0675a.png}
body:
  text: 文苑英華巻五百十宋李昉等編勤學惰敎師歿直講門十六道勤學求隣壁光判二道於途墜坑判一道躭書穿牀判一道惰教投諸棘寄判二道師歿立廟藏衣判一道着服六年判二道事貌相似判二道貌似温敏判一道吊服加麻判二道直講直講無他伎判二道勤學求隣壁光判郗珍性好讀書家貧隣家富乃穿隣壁取燭光隣告為盗對郗珍黄冠野客白屋寒生仰桂林之一枝猶思對策掩蓬門之三逕無忘偷光但學以資身行不踰志一作矩因人之利尚或不為竊隣之光何居而可必欲三餘不棄百遍無疲原憲弊衣杖藜而非病顔囬陋巷飲水而多歡既知讀書應聞對馬與其鑿壁何如聚螢若觀過知仁推情决獄束緼之婦尚未過於黄沙懸梁之夫庶獲哀於丹筆違禮入律理或難容居法徇私斯焉有在同前康廷之郗珍荷衣横帶緝桞編蒲有賤籯金將希片玉南阮自富北郭實貧殊謝梁鴻不求因熱乃如蘇季願借餘光已接武於匡衡方齊蹤於寗越室仞非邃未窺夫子之墻紡績可兼輙鑿隣人之壁情非竊伏事渉穿窬一作情非竊盗事渉穿窬抑有前聞宜徵故實從按記過不合論辜於途墜坑判寗子讀書於途墜坑來晩師行檟楚令以罰非其罪令師謝過俱不伏對學古入官不學將落聖人所以留範君子誰非用心猗哉寗生勤亦至矣手䋲口誦何劉實之能匹負書擔笠豈蘇秦之可加悠悠長途是諷是詠舞中襟而始勵經巨嶮而方歸師以來晩見嫌聊申檟楚令以罰非其罪乃起異端在師雖則傷嚴遣謝又乖通論且尊無謝卑之禮卑有順上之心䝉雖不才此未為允躭書穿牀判孔安家貧躭書一座數載不移故穿牀邑宰以為惰農遂䝉笞責㢘使謂髙賢附狀對崔融孔安家承闕里訓習淹中黄叔度之平生朱買臣之故事康成進徳斯覽巻於八千士安行道願加年於數百邑宰職當訓俗務在化人管㓜安之藜牀莫欽髙義王君公之板榻靡尚真規縲絏冶長昔聞其事鞭撻寗越今見其人徒有望於勤農終致慙於勵學㢘使親承聖㫖肅事澄清一字之褒人知激節片言之貶士識愧心附狀稱不優賢據理自須慙徳更懐文過須是提刑惰教投諸棘寄判得國子監稱諸胄子不親師教將棘寄之省讓其侵冒刑章寘之於理監固論不已對于峴有教無類下學上達春詩秋禮日就月將必復象賢之規以光齒胄之訓喻玊成器符金滿籯渥赭觀其屢舞拾青嘉其載擇况乎服勤多闕仰止徒虛温故知新未之已也進徳脩業此其謂何是朽木之難雕非檟楚之能及造士選士匪曰伊人左鄉右鄉攸稱往誥雖迂夫棘寄斥之遐邈且渉禦魑之罰將有招魂之詞㑹府以近滿刑章言投法理監司以逺探經義事合禮文亦既將一作狀申復奚科抑同前蘇倇聖人設教克勤于學胄子從師罕能由禮惟彼成均奉職宗伯分官將舞樂以持旄俾歌詩而序齒進而函丈知拾紫之華一有經字終一作退字且負墻識滿金之喻一有訓字不傳其習或失于多嗟爾寡聞孰云功倍叩之勿應則罰於從容發然後禁何驚於扞格誠宜扑作二物吾與其進焉用棘寄四夷若斯見罰伺行父之逐鳥豈待庶乎徵楚子之奪牛理固深也不帥之教雖載於禮經侵冒之刑合歸於司寇仍為多訴無乃厚誣師歿立廟藏衣判甲脩絜矩之道歿後其弟子以師所居立廟藏衣冠琴書人告越禮對就賢體逺稱以動衆親師觀奥知乎成植甲允廸厥訓克懋存誠𢎞道惟人脩詞在已視博習之志初遊焉息焉觀絜矩之心後不寢不食况早承函丈常忝儒林讀夫子之微言習門人之正義學而已講吾其不憂嵗月之微一作徵梁木斯壊子在川上歎逝者之如斯人之云亡痛吾徒之安仰常時講位乍起於悲風他日荒墳俄懸於苦月輪奐斯在歌哭還升仰生前之令名存歿後之遺象上棟下宇不革故而廟成自堂徂軒咸鼎新而貌立藏衣冠而不墜委琴書而宛在且心䘮三年是則是效亭傳四序有嚴有翼彼猶薄訴此實厚誣道雖謝於周書理亦殷於魯典誡彼言者不亦可乎着服六年判兖州人平辯受業於田才才亡辯着服六年廬於墓側刺史以為違經越禮妄造異端禁錮三年辯妻遣小女上䇿稱寃㢘察彈刺史刑獄不當對田才地居鄒魯家習文儒業擅籯金道光珍席夙漸昇堂之教早傳藏壁之書學市攸開几筵爰設故得詢疑請益還如北海之前函丈摳衣更似西河之上平辯雩川童子闕里諸生常因閉户之勤豫受専門之業庶祈榮於青紫希變采於朱藍日就月將罰一作菽水之恩何極陵夷谷徙頺山之痛已深舊宅凄清空聞絲竹遺壇寂寞無復琴歌嗟二物之長收願百身而奚贖方思重服用表深衷一對松楸六遷檀柘曩時儒肆喜遇祥鱣今日㐫廬悲逢吊鶴論情雖㑹於寧戚據理未允於通途刺史職在宣風政乖道俗沉憂六載亦可驚嗟積禁三年固其未得少女以銜寃伏奏雅叶於鷄鳴大使以紏慝彈豪正諧於隼擊即冝録奏伏聽宸衷同前不學墻面先哲之格言以徳潤身前賢之令軌孔丘要道逐楊震以西來馬融門生隨鄭𤣥而東去田才地隣鄒魯俗富詩書水接沂川家傳禮樂白圭無玷孤一作禮標席上之珍黄金可輕獨貴林中之寳平辯伏膺道術企足風猷訪顔子於淹中得田生於稷下葉抽槐市皷篋笥而踐緇帷花發杏壇整襟裾而趨絳帳一登閫閥㡬積寒暄知十之業既𢎞在三之敬尤重専門春誦髙臺於是忽傾負一作扶杖晨歌梁木由是遽壊荒階積雪徒規東廊之蹤逝水驚波無復西河之氣師資之禮痛貫幽靈伏道之誠悲深卉木葺苫廬於墓側製麻服於塋前檀木遷移葭灰屢變墳抽細草撫書帶而増悲牖挂殘絲拂琴絃而永慕刺史褰帷魯國剖竹雩壇馮熊軾以宣風樹隼旟而展化以為非禮將作異端不樹甘棠之隂翻行叢棘之酷昔門人子貢廬於孔氏之墳弟子叔然制彼鄭生之服六年不釋於禮稍乖三載錮身在情何忍但以事符公冶繋犴獄而多年命彼緹縈仰鳳闈而長呌㢘使垂星整俗驛傳宣威正豸冠以觸邪下烏臺而肅物女既陳請使又彈非霜簡載馳雪身無路兩頭今既發覺一面何使一作所逃刑宜降朱轓用直一作申丹筆事貌相似判甲容貌與乙相似甲歿後門人事乙隣人讓其非禮對康季子容貌相似陽貨惑於仲尼徳義可尊門人師于有若嵗丁辰巳甲遂云亡一作七儒月亦居諸乙方傳學實䘮予於東魯復疑汝於西河已寂琴歌詎聞金石思其笑語寧忘罰一作菽水之恩慕彼威儀一作循誘爰動頺山之戀不墜吾師之業還昇弟子之堂惟爾嗣音専之可也讓其非禮於已不然一作何諸有事古風未驚今聽同前道在則業金籯非寳學而時習珍席為儒甲業擅專門勤茲閉户夙漸淹中之訓方傳壁裏之書絳帳談經䝉求者雲集緇帷講道鑚仰者電趨濟濟祈祈升堂入室夏弦春誦未厭于青藍閲水頺山遽悲於壊木歿而不作逝者何追道無常師未宜膠柱貌有相似自可摳衣昔夫子門人見師於有若馬融弟子或從於鄭𤣥故事非遥讓之未可貌似温敏判儒生温敏歿或有貌似敏者弟子共師之縣令責其無知對唐昭明温敏果行育徳依仁游藝道鬱黄中聲芬白賁才克夢烏一作筆針左氏之膏肓學綜成麟傳聖人之糟粕既而生也有涯嵗聿其逝情殷埋玉迹一作逃必應金類宣父之云亡還思有若同蔡邕之已歿更重虎賁雖其人已還而典刑可想或欽遺韻用展師資唯彰好道之誠何寘無儀之論縣令奉子男之秩守韋弦之戒非欲使提耳流訓掣肘無譏錯節盤根抑亦殊道移風易俗何妨異代縱有科罰未累徳音無㸃一作玷憲章並宜告記吊服加麻判甲乙二人所受學師亡皆吊服加麻出有所之則絰乙居則絰出則否縣司科甲乙不合為師制服並不伏對顔勝理範通明國圖惟逺班和正本式古崇風訓學興文當今是教甲乙同志偃化從師春誦夏弦自得西河之美摳衣函丈無非北海之遊道叶雩壇聲髙闕里鴻都盛業方列義於儒堂電隙流年奄生悲於泉户兩楹之夢豈廻景於西山二竪之災竟遊魂於北斗壊木之悲一作怨師也何追頺山之哀吾將安仰因情定禮自可䖍於心䘮吊服加麻實無虧於聖政甲出而絰是依古也乙居則否奚所咎焉既不異於門人信無徵於魯禮欲加之罪其有辭乎同前盧昌惟甲惟乙夙庇唐封如琢如磨服勤師訓自凝情於竹素將比色於朱藍既而逝水方驚梁木其壊微言已絶先師從召於鶴書素業無憑弟子空思於鱣序閒階寂歴泣對履綦舊宅凄清愁聞絲竹爰制衰絰以報師資雖乖心䘮之儀未失禮經之意何如宣尼既沒子貢一作夏非為廬鄭生云亡叔然制服徃哲不貽伊誚縣司何遽見䋲請寛二公之􅄽無濫五刑之法直講直講無他伎判丁專經直講每無他伎進考或人告濫對王靈漸丁以聚學立身脩詞果行從師氏之六藝當孔門之四科淑行惟新鱣魚巳落清言如屑塵尾先摇既珍席之有光亦經笥之攸屬籯金奪價琢玉成功皆取判於一經葢不資於他伎誣其善誘生此薄言由也兼人常聞於片折參則不敏必造其兩詞請更推尋然議斷割同前常無欲典禮之興講經為要安人和衆學古入官丁以専經直講精師訓廸藝成重席業固專門歌詠先王頌聲以光於講肆討論文義徳化籍甚於談筵考課攸歸勤效斯在以無他伎䝉竊惑焉且州縣徒勞自拘於常式庠序爰設亦著於彞章妄告之人須科反坐文苑英華巻五百十
