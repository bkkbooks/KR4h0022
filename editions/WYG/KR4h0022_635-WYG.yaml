body:
  text: 文苑英華巻六百三十六宋李昉等編賀中賀祥雲見狀二首賀上仙公主靈應狀一首賀昭陵徵應狀一首辯日傍瑞氣狀一首賀太陽不虧狀二首為宰相論月應蝕狀一首為政事賀雨狀一首賀祈雨有應狀一首賀雨晴狀一首賀麥登狀一首為政事賀苗稼狀一首賀祥雲見狀張九齡右臣等伏見道門威儀司馬秀表稱今月十日夜陛下親臨同明殿道塲為宗社蒼生祈福有祥雲見伏惟聖徳以精意集作至動天天意以肸蠁符聖其感甚速豈云𤣥逺集作其應豈逺陛下肅集作聖敬之深勤恤所至靈心如答神道何言自表休期以介景福生人大頼天下幸甚臣等忝居近侍倍百恒情謹奉狀陳賀以聞伏望宣示史館賀彩雲見狀張說右伏奉恩㫖今日屬下元賜臣等侍從昇降聖闕禮謁大聖尊容行香之際日西南有彩雲見者伏以大道無形至誠斯應上𤣥降福感而遂通歩輦陟於齋宫䖍脩香火彩雲生於曉日遽發祥光是知聖徳與天心合符萬靈與羣仙叶賛臣叨陪侍從如昇汗漫之遊承恩禮謁更覩氤氲之瑞榮華之極千載一時無任欣慶之至賀上仙公主靈應狀張九齡右臣等伏奉今月八日上仙公主靈座有祥風瑞虹之應爰至啟殯乃知屍集作尸觧又承特禀清靈薄於滋味素含真氣自不食鹽洎乎集作于遷神更標竒跡伏惟聖系本於道源妙有所鍾靈異必降不然者何得㓜而能悟性與非常適來以時且契於𤣥運超然而脫集作蛻復昇於丹籙杳冥雖逺髣像如存則知仙路有歸慈念已釋理絶今古事昭聞見况臣等親侍軒墀幸聞仙觧無任感慰之至伏望宣付史館以昭靈異仍望宣示百官謹奏賀昭陵徴應狀右御史中丞徐惲從京使還向臣等說妖賊劉志誠四日從咸陽北向面集作原向南見昭陵山上有黒雲忽起志誠謂其凶徒云此雲将有暴風若衝頭立恐有破敗志誠久從軍伍頗觧雜占其言未畢飃風果至直衝行首莫不昏迷衆心驚惶不知所出及至便橋之際竝即散走又見父老云往年權梁山之徒将逞不軌當時亦有烈風暴雨發自昭陵北集作比至京城賊還破滅謹參往事與今同符者伏以閭閻賤類竊敢猖狂而祖宗威靈亦已𤣥鑒昔年感召若命蚩尤今日驅除更徴集作假風伯所以妖炁集作氣自殄狡計莫施頃集作晷刻之間逃形無路此皆神功潜運昌厯無窮将俾孫謀用昭聖徳事堪懲惡可以垂後無任慶悅之至仍望宣付史館集作官并示朝列謹録奏聞謹奏辯日旁瑞氣狀元稹今月二日日旁瑞氣右奉宣其日日上有横赤五色氣鮮明黄潤日兩邉各有嘉氣内赤外青宰相稱賀云是五色雲見不知是否者臣謹按乙已占有赤氣横在日上謂之戴其分當益土進爵推戴人君之象又人君當立王侯封建親戚以為福祐之徴竊見其日除王潜郭釗田布等官則陛下凡有舉措盡合天心㣲臣所引占書悉皆明驗伏請以戴氣宣付史官不可誤書五色雲又云青赤短小在日旁謂之珥㣲曲向日謂之抱珥者纓珥之象天子有喜兼集作并有和親之事又當拜将抱者扶抱向就之象隣國臣佐來降天子有喜賀之事子孫之慶臣下忠誠輔主國中歡喜和合今北狄和親西戎通好時者承允請命其日三将同昇萬姓歡呼四方來賀亦可謂陛下凡有舉措盡合天心㣲臣所引占書悉皆明驗伏乞集作請亦以抱珥宣付史官不可誤書五色雲見以前件圖籍作載如右伏以五色慶雲葢是小瑞戴氣抱珥所謂殊祥宰臣怱遽之間未暇精究其事此皆陛下禮行郊廟誠逹神祗展百拜而忘疲入九室而流涕近臣興感上帝垂休克呈捧日之祥以展集作表動天之徳㣲臣同霑侍從别感恩慈方當鼓舞之時恨不呌呼而賀然臣以為陛下特宣手勑宰臣云今月二日卿等所言日旁五色雲見叅驗圖書葢是戴珥之象此皆祖宗積慶特示子孫之祥豈冲耿㣲誠能致昊穹之貺宜令所司擇日告廟上以奉高祖無窮之祐次報憲宗有截之功誕告華夷竝令知悉若此則陛下感通之徳已見九霄推讓之風将傳萬葉爛然宸翰手勑以示於天下集作宰臣煥乎天文撰詔自生於聖㫖事超萬古道冠百王伏惟天恩密賜裁察賀太陽不虧狀張九齡右今月朔太史奏太陽虧據諸家厯皆蝕十分已上仍帶蝕出者今日日出百司瞻仰光景無虧臣伏以日月之行值交必蝕筭數先定理無推移今朔之辰應蝕不蝕陛下聞日有變齋戒精誠外寛政刑内廣仁惠聖徳日慎災祥自弭若無表應何謂大明臣等不勝感慶之至謹奉狀陳賀以聞仍望宣付史官以垂來裔同前蘇頲臣等伏承太史奏昨一日太陽虧陛下爰發行宫不御常服聖慮淵唐諱黙天情寅戒頓于行在不可榮社以責隂凡厥觀瞻不殊登臺而視朔自亭午過晡申寒沍成春一作温陽光轉大伏惟皇帝陛下纉千歲之統擁三神之休道洽功成増高益厚金繩玉檢􅞂跡於前聞日觀雲封降祥於即事且疇人察序太史宣職以厯而推式聞常度至時不蝕乃自殊祥陛下昭事於上天上天昭答於陛下若是之速其何響㑹非常之祉孰不忻懼臣等忝預從臣無任踴躍慶抃之至為宰相論月應蝕狀臣近者特奉玉階親承聖㫖伏知今月十四日夜月蝕當盡此驗非逺即胡滅之祥臣以為太隂之蝕必在於望太史司占不言邇日聖人同契果應先天而不測為一作為謂神前知者聖臣昨宵将暝精慮仰觀初則桂魄正圓俄見蓂枝遂缺乙夜之後所蝕便既臣載欣載躍聞所未聞但恐黙啜禍盈命危勢蹙百年之運晷刻當窮三象之㣲蔽虧先肇一作見臣等忝階近侍喜萬恒情無任欣躍之任為政事賀雨狀頃者西郊不雨南陸􅄽陽上動聖情下憂農事一人以禹湯罪已百姓以堯舜為心知天人之合符非土龍之可致徳音朝降纔出於巖廊膏澤晩飛已周於城闕麥宜蚤秀日助晴光禾欲潤成歲知秋獲惟皇建極天且弗違用爾作霖臣復何補既叶夢魚之吉預占鳴鶴一作爵之期抃躍之誠萬萬恒品賀祈雨有應狀張九齡右臣等昨面奉恩㫖縁秋稼有望時雨蹔􅄽念及黎元見于顔色方躬自祈請誠勤夙夜上靈昭鑒嘉瑞必臻昨日申酉之間雲物果應初含五色正覆於壇場未及終宵更洒於城闕遂使炎埃宿潤虐暑蹔清實冀膚寸之資必集作畢致普天之澤臣等多昧徒仰於成造蒼生何幸毎及於聖私無任欣慶集作戴抃躍之至謹奉狀陳賀以聞既有殊應仍望宣示集作付史館賀雨晴狀右今月十日高力士宣聖㫖以霖雨淫集作方滯有害稼穡之憂将親禱上陽三日内不坐精意朝發而重隂夕霽乃數日已來遂致開朗誰謂天逺其應甚速遂得麥秋有望蠶事且登則知至人無心與天地合契神功潜運豈隂陽不測伏惟陛下明徳自廣兢業載懐所致休徴必加謙慎天聖相合福施羣生日用不知年和在此臣等無功集作能翊佐徒忝近密毎有大猷承奉不暇無任欣戴慶躍之至賀麥登狀右今日高力士宣垂示臣等皇太子表以嘉麥有成陛下躬執勞事率先兆庶皇太子以集作已下繼美聖功臣聞勤於稼穡必有麰麥之慶著在春秋則非他榖之比伏惟陛下致敬宗廟屬意集作念黎元春郊順時則千畝在御禁園測候則萬㝢皆豐况云立訓天人降尊農務上靈昭徳已聞瑞日増輝當夏集作暑不疲則有祥雲自覆是彰敦本之化式旌造物之功人謡在兹天意可鑒且禹之盡力堯實用心史冊美談帝王成集作為範未有休徴神應若斯之盛者也以今况古千載未聞請付史官天下幸甚臣等叨榮近侍倍百恒情無任感戴抃躍之至為政事賀苗稼狀蘇頲右臣等昨面奉聖㫖以近日暴風雨恐麥有損陛下務農在候輟膳終朝憂勞之甚起居不懌臣等聞重華之徳闕發用心夏禹則為人先成湯自以身禱求諸往事未或前聞天與聖符風将雨止杲杲之日吐扶桑而已霽芃芃之野合岐麥而皆秋仍滋北里之禾更潤南山之豆京城可望不知日用之功旒扆注懐尚切在予之念臣叨陪近侍親奉徳音上貽慮於納隍下増憂於折鼎無任惶悚之至文苑英華巻六百三十六
