body:
  text: 文苑英華巻三百八十一宋李昉等編北省二給事中授于惟謙給事中制李嶠鸞臺文昌右司郎中于惟謙局量宏深理識精逺幹能兼備詞學並優㑹府提綱雖佇才用鎻闥待問更資𢎞益宜登侍從之職以光清切之署可朝請一作議大夫守給事中授于經野給事中制蘇頲門下尚書兵部郎中上柱國于經野雅量端實閒機宻静有恒其操無擇斯言理必中於䋲墨才見推於扎翰中臺奏草已承更直之榮左曹顧問宜接雙逰之美可朝請大夫守給事中勲如故授李懐讓給事中制黄門朝議大夫尚書兵部郎中上柱國李懐讓直方自守貞獨不羣理可析於毫芒文可成於藻繪雖手揮繁綜而心寄閒逺絲綸所屬嘗推起草之能駮正是司更接逰蘭之寵可守給事中散官勲如故授桞渙給事中制勑朝議郎守尚書司門郎中桞渙學思優博禮容莊敬藴公直之志有亷正之風早以聲華亟從推擇丹墀列侍必遷英髦青闥命官宜叅顧問可守給事中散官勲如故授褚廷誨給事中制孫逖門下朝議大夫守諫議大夫上柱國禇廷誨師臣舊業官序良才文儒實百行之資翰墨當一時之妙駮正為務疇咨所難宜遷左禁之榮式允中朝之望可守給事中散官如故授裴遵慶給事中制賈至勑禮部郎中裴遵慶清正介直公才雅望智能利物行可檢人今東夏務􅇻宰臣任重是資髦士以佐輶軒宜居駮議之職仍領銓衡之務可給事中授崔㝢給事中制門下㑹稽太守崔㝢識敏而周器清而直有冉季之政事兼應劉之詞藻累昇臺省咸以才遷驟歴藩僚時惟徳舉左曹樞近爰司駮正宜擇士林之秀俾參鸞渚之榮可給事中授張孚給事中制勑司膳郎中張孚果行育徳疏通知逺是瑚璉之良器抱豫章之美才文以藻身屢得詞塲之雋公而持操更推吏道之能譽洽禮闈風清憲簡宜擢拜於青𤨏俾駮議於黄樞可給事中授賀若察給事中制常衮門下中散大夫行尚書吏部郎中賀若察講求學術藻餙藝文顧言行以檢身酌知能以經務任叅六典選重一時從容管劇每識通而理當逹練起草亦體大而思精聲猷並茂公望惟允分曹殿中職在論駮尚書奏議俾爾平之可給事中散官如故主者施行授崔侁蕭直給事中制門下銀青光禄大夫御史中丞東都留臺崔侁峻而能通和而有節朝議郎守太子左庻子賜紫金魚袋蕭直性資髙朗識詣冲妙各以文儒致用貞亮處心集作自處持綱憲府必執其中贊事宫坊允歸於正彰聞望於公器振英華於士林顧兹掖垣素用髦彦文昌奏議多所論駮俾承並命式副良選侁可行給事中㪚官如故直可守給事中㪚官賜如故主者施行授趙㳙給事中制門下朝議郎檢校尚書吏部郎中兼御史中丞賜緋魚袋趙㳙純白髙朗儒林表儀炳文揚彩時謂清㧞早以賢良茂異服我周行歴踐三臺之列嘗叅二陜之佐其於事典多所精詳頃毗荆舒尋罷戎務近侍方缺選才正難評南宫之上書次東廂之奏事夙夜思職爾無面從可守給事中散官賜如故授韋諤給事中制門下通議大夫行尚書吏部郎中彭城郡開國公韋諤在人之徳承家積厚先致羙以施政終秉彛以存誠朝之清序多所階歴叅我六典冠於諸曹學以辨異文以决滯五年勤職時謂淹才宜守集作侍從殿中以平臺議詔書未當實得封還官能守常事尠失中是有選用爾其揚之可行給事中散官封如故主者施行授鄭覃給事中制白居易勑給事中之職凡制勑有未集作不便於時者得封奏之刑獄有未合於理者得駮正之天下寃滯無告者得與御史糾理之有司選補不當者得與侍中裁退之率是而行號為稱職故不專於掌侍奉讃詔令而已中大夫行諌議大夫雲騎尉滎陽縣開國男食邑三百户鄭覃清節直行正色審詞集作寡言先臣之風藹然猶在自居首諌益勵謇諤擢領是職必有可觀亦欲天下聞之知吾奨骨鯁之臣來諌諍之道也可行給事中㪚官勲如故授孔戣等給事制勑渾金璞玉方圭圓珠雖性異質殊皆國寳也是故能官人者亦辨而用之諌議大夫孔戣静專貞白不渉聲利執言守事無所依違駕部郎中薛存誠亷潔直方飭以詞藻中立不倚介然風規吏部員外郎王涯端明精實加之以敏懿文茂學尤推於時並歴踐朝行恪勤官次諌垣郎署藹其休聲宜加公奨擢在近侍左右禁闥可以同升必能評奏臺議發揚綸誥臨事有立屬詞可觀各隨所長分命以職祗奉乃事無替厥猷戣存誠並可給事中涯可兵部員外郎知制誥授竇易直給事中制勑前御史中丞竇易直器質識智厚重開敏文合法要學通政經累踐䑓郎擢司邦憲寛猛舉措甚得其中官不易方府無留事前因病免今以才遷俾升𤨏闈用集作以備顧問凡制令奏議官獄典章茍有依違皆得駮正所任不細宜敬乃官可給事中授崔璹給事中等制崔嘏勑𤨏闈冠三省之髙太常列九寺之右凡所選擢必俟才賢惟爾璹以賔筵雅度早踐霜䑓儔以正殿雄詞超昇省署文雅當於題柱列郡洽於褰帷迭居二尹之雄並處亞卿之列而皆本以明敏發為文學玉在湼而不緇金投火而彌勁眷言乆次一作春闈既乆是用遷昇我有絲綸期汝論駮我有金石資爾諧和無沗官常自貽公譲一作議璹可給事中儔可太常少卿諌議大夫授薛稷諌議大夫制蘇頲門下中散大夫行尚書禮部郎中脩文館直學士河東縣開國男薛稷奕代雄詞身濟其羙光時雅量士慕其風故能懸帳絶倫昇堂覩奥掖垣宻勿字列黄縑仙闥從容文一作雲飛赤管箴闕之任惟賢是擇俾登才子式寵諌臣可諌議大夫餘如故主者施行授吳競諌議大夫制黄門朝議大夫前行尚書水部郎中兼脩國史上柱國長垣縣開國男吳競雅思周宻素風清曠著書微婉東觀是稱起草閑逹南宫所重宜列諌臣之位復膺良史之才可守諫議大夫兼脩國史㪚官勲如故主者施行授尹愔諌議大夫制孫逖門下右省署掌諌之官立司過之史所以書君舉箴王闕不次而授唯才是與道士尹愔識洞微妙心逰淡泊袛服𤣥言𢎞敷聖教雖渾齊萬物獨詣於清真而博通九流兼逹於儒墨朕方貴無名之璞期不言之化資其妙道寘彼周行宜居納誨之職仍存記言之地可朝請大夫守諌議大夫集賢院學士兼知史官事授宋渾諫議大夫制門下朝議大夫前行尚書駕部郎中上柱國襄國縣開國男宋渾清才敏識人望時英未可易量將其必復頃辭省闥言侍庭闈雖私心則然而公用乆闕筞名委質非無古人之訓移孝為忠宜在諍臣之列可守諌議大夫㪚官如故授楊慎矜諌議大夫制門下太子右贊善大夫兼御史專知大府出納權知御史中丞事楊慎矜堅正有才通明足用乆持天憲兼掌國泉竭忠公之一心杜訛偽之千變爰升獨坐用肅具寮而潜懇固辭執謙難奪願收恩於後命祈盡節於前功得失不驚將敦薄俗始終如一以勤守官特遂由􅇆之誠仍居出納之任一作納諌之職可行諌議大夫兼侍御史仍依舊知大府出納授髙適諌議大夫制賈至勑監察御史髙適右一作立節貞峻直躬髙朗感激効一作懐經濟之畧紛綸瞻風一作文雅之才長䇿逺圗可云大體讜言毅一作義色寔謂忠良一作臣宜廽紏逖之任俾超諌諍一作風諭之職可守諌議大夫一作皆舊唐書授張鎬諌議大夫制門下侍御史南汝疑節度判官張鎬崇徳廣業宣慈恵和主善為師志古之道或直而温可以居諌諍之任或强而誼可以在凖䋲之職或理而敬可以司草奏之繁官得其人鮮有敗事列於鴛鷺僉曰惟允可諌議大夫授暢璀總目作楊璀諌議大夫制勑為川者决之使𨗳為臣者宣之使言故堯有敢諫之鼓誹謗之木此其所以聖也楚靈稱凡百箴諌吾盡知之無怫吾慮此其所以敗也朕嗣守鴻業時方艱難實頼有位之士匡其不及故注意諌臣必求諸道關内鹽河判官暢璀頥真餋正精潔恵和有質直而無流心秉忠信而持讜議頃嵗去職晦跡丘園愛其身以有待餋其志以有為厥徳不囬允諧司議可兼諌議大夫餘如故於戲宫之竒懦不能强諌春秋以為之失常臧僖伯繼論納郜鼎君子稱必有餘慶予違汝弼汝無面從舊唐書有暢􅗕傳嘗為諌議大夫授王延昌諌議大夫兼侍御史制前人門下古者天子有諍臣七人而事君有犯無隠故能獻可替否從諌則聖京兆少尹知雜王延昌學於古訓秉心塞淵以文藝之資飭幹時之器頃者彌綸省闥綱紀䑓憲舊章克舉雅望攸歸貳政浩穣雖藉其條理列職䂓諷更思其讜直諌大夫之宻侍御史之雄爾宜兼之以匡予理可諌議大夫兼侍御史知雜餘並如故授宋晦諌議大夫制常衮勑通議大夫檢校尚書兵部郎中兼侍御史上柱國宋晦忠潔簡恵和而不流理暢思精適於羣務位以才逹政以禮成徃者理軍岐陽贊我戎事集無此字重艱貞之操義有可懐䑓閣更拜乆於清秩外掌邦賦任居其艱集作難底慎均節以資經費事皆求當慮不及私積勞可書責實當進加以亮直行之有恒屬諌臣之髙選叅髦士之大用以匡不逮無伏嘉言可行諌議大夫㪚官勲如故授李收諌議大夫制勅書曰后徳惟臣不徳惟臣實頼左右前後有位之士匡其不及天子有諍臣職在司過若有犯無隠獻可替否則曠然丕變時惟休哉中㪚大夫前行尚書兵部郎中贊皇縣開國男李收敏而好學文以彰之清澹寡欲不以得䘮千慮徃屬時難保兹艱貞事君之節足以存勸歴踐郎署率由舊章而仗雅居正可叅諷議無或尸官以㒺聞當闕見以箴闕也可諌議大夫㪚官封如故授崔郾諌議大夫制元稹勅朝㪚大夫守尚書吏部郎中上䕶軍崔郾昔我太宗文皇帝以魏徴為人鏡而姦膽形於下逆耳聞於上及徴沒而猶嘆過失之不聞夫以朕之不敏不明託於人上月環其七而善惡蔑然豈諌議之臣未盡規於不徳耶朕甚懼焉以爾郾端愿集作厚誠明濟之文學柔而能立謙而逾集作愈光命汝弼予式冀無過於戱宋景公一諸侯耳尚感列星集作而陳星退之詞齊威王獨何人哉能辨日聞之候爾其極諌無隠朕不漏言可守諫議大夫㪚官勲如故授元晦諌議大夫制李徳裕勅昔汲黯薄一作為淮陽守願出入禁闥補過拾遺則諌諍之任實資諒直我求其比今得正人吏部郎中元晦徃在内庭甞感先顧奮發忠懇不私形骸伏俯青蒲至於雪涕數共工之罪不蔽堯聦辨垣平之詐益彰文徳近因旌别邪正宰弼上言以魯公藏罟莫如寘革於左右漢后輯檻孰若列於公卿是用命爾登於文陛其副我寵擢不替初心勿沽小名以枉大節勉服官業期於有終可諌議大夫授李方右諌議大夫等制崔嘏勅居諌納之地副銓綜之司致予聦明適彼倫要自非端方正直之士檢身御衆之才則何以輸及霤之忠誠奉提衡之藻鍳爾等皆擢秀瑶林飛華桂苑早登俊造共許清貞入憲府而自竦孤標歴文昌而更光列宿分符茂績逺稽於龔黄視草雄詞舊推於賈馬是用擢居右省陟彼首曹爾宜徴五諌之司佐三銓之任無疑逆耳必在精心勉服寵光益揚善價可依前件授姚朂右諌議大夫等制勅朕髙居穆清端拱思理尚慮旒纊蔽吾聦明故精求諌納之臣投我藥石之語而天官正郎地連藻鏡職佐銓衡必資明幹之才以副經通之目以朂端方雅厚正以操心以簡求和易周旋敏於臨事而皆富文奥學早昇俊造之科利用長才累處重難之任是用擢於粉署置在禁垣昇自外郎膺兹首選爾其詳求五諌左右三銓勉思及霤之志更致提衡之羙朂可右諌議大夫簡求可吏部郎中授董禹左諌議大夫制薛廷珪勅朝廷具位之臣得直言天子過失太平之基也矧司我諌議列吾軒墀啓乃心而沃我心盡爾言而攻我過眷求之道時惟艱哉具官董禹疊中詞科優有藝文西漢故事甘泉遺儀聞其討論多所詳悉逮事先帝頗揚直聲徴還周行歴踐䑓閣靡所附麗能精典墳公論推其才術鄉校言乎淹恤今擢爾為諌議大夫置朕左右勉揚厥職徃副旁求夫立肺石挹獸樽扶將顛祛未寤在履正直務去將迎爾或推公朕豈憚改書紳銘座服我訓詞佇稱人情勿闕可右諌議大夫文苑英華巻三百八十一
