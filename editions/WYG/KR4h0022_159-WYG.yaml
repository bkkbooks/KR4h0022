body:
  text: 文苑英華卷一百五十九宋李昉等編地部一山三十五首終南山十首泰山三首華岳八首山遊鍾山沈約靈山標文選作記地徳隂險資岳靈終南表秦館少室邇王城翠鳯翔淮海襟帶繞坤坰北阜何其峻林薄杳葱青發地多竒嶺干雲非一狀合沓共隠天參差分文選作互相望鬱律搆丹巘崚嶒起青嶂勢隨九疑高氣與三川壯即事既多美臨眺殊復竒南矚文選作瞻儲胥觀西望昆明池山中咸可悅賞逐四時移春光發隴首秋風生桂枝多值息心侣結架山之足八解鳴澗流四禪隠巖曲窈㝠終不見蕭條無可欲所願從之遊寸心於此足君王挺逸趣羽斾臨崇基白雲隨玉趾青霞雜桂旗淹留訪五藥顧步佇三芝於焉仰鑣駕歲暮以為期遊金華山前人逺策追風集作夙心雲山協文一作乆要天倪臨紫闕道地一作地道通丹徼未乗琴高鯉且從一作縱嚴陵釣若䝉羽駕迎得奉金書召高馳入閶闔方覩靈妃笑登鍾山下峯望虞騫冠者五六人携手岩之際散意百仞端極目千里睇疊岫乍明昏一作昏明高一作浮雲時巻閉遥㸔野樹短逺望行一作樵人細賦得山庾肩吾層雲霾峻嶺絶澗倒危峰刻削臨千仞嵯峨起百重行曦上杳杳結霧下溶溶仁心留此屬休愧奉羣龍遊甑山前人子平去已乆餘光聚類作風今復追未必遊春草王孫自不歸路高村返出林長鳥更稀寒雲開類聚作間石起秋葉下山飛西河方閱訓詎得解朝衣登夀陽八公山吳均逺澗自傾注曲石溆戔戔集作逺澗百頃曲石溆復戔戔含珠岸恒翠懐玉浪多圓疎峰時吐月密樹不開天瑶繩盡𤣥秘金檢上竒篇是有琴高者波陵去水仙奉和登景陽山任昉物色感神遊升高悵有閲南望銅駞術一作街北走長楸埒别苑間一作澗滄溟疏土一作山駕瀛碣神鯉一作鯨吐華浪司南動輕枻日下千一作重門照雲開九華徹觀閤隆舊恩奉圖愧前哲上蓮山蕭揮見初學記獨邁青蓮嶺探竒紫葢峰挂流遥似鶴挿石近如龍沙崩聞韻鼔霜落似鳴鐘飛花滿叢桂輕吹起脩笻石浦一作蒲今尚有深一作採摘更相逢遊山庾信聊登𤣥圃殿更上増城山不知高幾里低頭㸔世間唱歌雲欲聚彈琴鶴欲舞澗底百重花山根一片雨婉婉藤倒垂亭亭松直竪山二首釋惠標見初學記靈山藴麗名秀出寫蓬瀛香爐帶煙上紫葢入霞生霧捲蓮峰出巖開石鏡明定知丘壑裏併佇白雲情二峨眉信重險天目本仙居金華抱丹竈玉笥藴神書幽人披薜荔怨妾採蘼蕪紫巖無暮雨何時逢故夫小山崔仲才崑丘本難步軒臺不易朝還往麟洲上時聴鳯凰簫霞觀文犀簟香臨碧玉條且學燒丹甑何假摘靈桃山李徳林登嶺望重闗腰珮且鳴環天河臨易飲月桂近將攀王母西山至夫人南岳還何必陽臺下要待夢容顔同前李嶠山嶺鬱氛氲一作地鎮標神秀峩峩上翠氛泉飛一道帶峰出半天雲古壁丹青色新花錦綉文已開封禪禮一作所希謁聖明君登襄州峴山張九齡昔年亟攀踐征馬復來過信若山川舊誰如集作知歲月何蜀相吟安在羊公碣已磨令圖猶寂寞嘉會亦蹉跎宛宛樊池集作城岸悠悠漢水波逶迤春日逺感寄客情多地本原林秀朝來煙景和同心不同賞留歎此巖阿白鹽山杜甫卓立羣峰外蟠根積水邊他皆任厚地我集作爾獨近高天白牓千家邑清秋萬里集作估船詞人取佳句刷錬始堪集作刻畫竟難傳閬山此詩見三百四十二巻歌行中前人丈人山前人自為青城客不唾青城地為愛丈人山丹梯近幽意丈人祠西佳氣濃縁雲擬住最高峰掃除白髮黄精在君㸔他時氷雪容天門山李白逈出江上山雙峰自相對岸映松色寒石分浪花碎參差逺天際縹緲晴霞外落日舟去遥回首沉青靄靈墟山前人丁令辭世人拂衣向仙路伏錬九丹成方隨五雲去松蘿蔽幽洞桃杏深隠處不知曽化鶴遼海歸幾度登峩眉山前人蜀國多仙山峨眉邈難匹周流試登覽絶恠安可息青㝠倚天開彩錯疑畫出冷然紫霞賞果得錦囊術雲間吹瓊簫石上弄寳瑟平生有微尚歡笑自此畢煙容如在顔塵累忽相失倘逢騎羊子携手陵白日獨坐敬亭山前人衆鳥高飛盡孤雲獨去閒相㸔兩不厭只在一作有敬亭山南山賀朝清湖北雨初晴湖南山盡見嵒嵒石帆影如得海風便山宂茅山峰彩雲時一見邀君共探此異籙殘幾巻洞陽山浮丘公舊隠處劉長卿舊日仙成處荒林客到稀白雲將杖去芳草任人歸空谷無行徑深山少集作多落暉桃源幾家住誰為掃荆扉石菌山前人前山帶秋色獨住集作往秋江晩疊嶂入雲多孤峰去人逺夤縁不可到蒼翠空在眼渡口問漁家桃源路深淺斑竹巖前人蒼梧在何處斑竹自成林㸃㸃流殘淚枝枝寄在集作此心寒山響易滿秋水影偏深欲覔樵人路朦朧不可尋寒山僧皎然侵空撩亂山獨愛我中峰無事負輕策閒行躡幽蹤衆山摇落盡寒翠更重重玉山嶺上作權徳輿悠悠驅疋馬征路上連岡晩翠深雲竇寒苔净石梁荻花偏似雪楓葉不禁霜愁見前程逺空郊下夕陽仙娥峰下作白居易我為東南行始登商山道商山無數峰最愛仙娥好參差樹若挿匼匝雲如抱渴望寒玉泉香聞紫芝草青巖屏削碧白石牀鋪縞向無如此物安足留四皓感彼私自問歸山何不早可能塵土中還隨衆人老玉山李商隠玉山高共集作與閬風齊玉水清流不貯泥何處更求廻日馭此中兼有上天梯珠容百斛龍休睡桐拂千尋鳯要棲聞道神仙有才子赤簫吹罷好相携杭州孤山此詩見二百三十八卷張祐望巫山張嶠溪疊雲深轉谷遲暝投孤店草虫悲愁連逺水波濤夜夢斷空山雨雹時邊海故園荒後賣入闗𤣥髮夜來衰東歸未必勝覊旅况是東歸未有期商山王貞白商山名利路夜亦有人行四皓卧雲處千秋疊蘚生晝煙籠澗黒殘雪隔林明我待酧恩了來聴水石聲西塞山在武昌界孫吴以之為西塞羅隠吴塞當時指此山吴都亡後緑集作水孱顔嶺梅乍暖殘粧恨沙鳥初晴小隊閒波濶魚龍應混雜壁危猿狖奈驕集作奸頑會將一副寒簑笠來與漁翁作往還霍山曹松七千七百七十丈十丈藤蘿勢入天未必展來空似翅不妨開去也成蓮月將河漢分巖轉僧與龍蛇共窟眠直是畫工湏閣筆况無名畫可流傳終南山陪駕幸終南山庾信玉山乗四載瑶池宴行類聚作八龍黿橋浮少海鵠葢上中峰飛狐横塞路白馬當河衝水奠三川石山封五樹松長虹雙瀑布圓闕雨芙蓉戍樓鳴夕鼓山寺響晨鍾新蒲節轉促短笋蘀猶重樹宿含櫻鳥花㽞釀蜜蜂迎風下列缺灑酒召昌容欣陪北山上類聚作且欣陪此上方欲待東封同前宇文昶堯葢臨河潁漢蹕踐華嵩日旂廻北鳯皇一作星斾轉南鴻清一作青雲過宣曲先驅背射熊金桴拂泉底玉琯吹雲中古轍稱難極新途或易窮煙生山欲盡潭浄水恒空文一作交松上連霧脩竹下來風仙才道無别靈氣法能通東棗羞朝座西桃獻夜宫詔令王子晉出對浮丘公登終南山擬古胡師耽結廬終南山西北望帝京煙霧亂鳥道劣見長安城宫雉互相映雙闕雲間生鐘皷沸閶闔笳管咽承明朱閤臨槐路紫葢飛縱横望望未極已甕牖秋風驚巖岫草木黄飛鴈遺寒聲墜葉積幽徑繁露垂荒庭甕中酒新熟澗谷寒蟲鳴且對一壺醉安知世間名寄言朝市客同君樂太平望中南山詩注中南山即周之終南山唐太宗見初學記重巒俯渭水碧嶂挿瑶天出紅扶嶺日入翠貯巖烟疊松朝若夜複岫缺疑全對此恬千慮無勞訪九仙終山行集作終南山行王維太一近天都連天集作山到海隅白雲廻望合青靄入㸔無分野中峰變隂晴衆壑殊欲投人處宿隔浦集作水問樵夫晩晴見終南諸峰賈島秦分積多峰連巴勢不窮半旬藏雨裏此日到窓中團魄將昇兎高虚欲呌鴻故山思不見碣石泬寥東懐紫閤山杜牧學他趨世少深機紫閤青霄半掩扉山路逺懐王子晉詩家長憶謝𤣥暉百年不肯疎榮辱雙鬢終應老是非人道青山歸去好青山曽有幾人歸終南山張嶠帶雪復銜春横天占半秦勢竒㸔不定景變寫難真洞逺皆通岳川多更有神白雲幽絶處自古屬樵人同前王貞白終朝異五岳集作千山凝黛色列翠集作今古滿長安地去搜楊近人謀隠遁難水穿諸苑過雪照一城寒為問紅塵裏誰同駐馬㸔集作太華遥相望晴樓幾處㸔同前裴説九衢南靣色蒼翠絶纎塵寸步有閒處百年無到人禁林寒對望太華浄相隣誰與羣峰竝祥雲瑞露集作靄頻泰山遊泰山三首李白四月上泰山石平御道開六龍過萬壑澗谷隨縈廻馬跡遶碧峰于今滿青苔飛流洒絶巘水色集作急松聲哀北眺㠋嶂竒傾崖向東摧洞門閉石扇地底興雲雷登高望蓬瀛想像金銀臺天門一長嘯萬里清風來玉女四五人飄颻下九垓含笑引素手遺我流霞盃稽首再拜之自愧非仙才曠然小宇宙棄世何悠哉二清齋三千日裂素寫道經吟誦有所得衆神衞我形雲行信長風颯若羽翼生攀崖上日觀伏檻窺東溟海色動逺山天雞已先鳴銀臺出倒影白浪翻長鯨安得不死藥高飛向蓬瀛三平明登日觀舉首開雲闗精神四飛揚如出天地間黄河從西來窈窕入逺山憑崖覽八極目盡長空閒偶然值青童緑鬢盈雲鬟集作雙雲鬟笑我晩學仙蹉跎凋朱顔躊蹰忽不見浩蕩艱集作難追攀華岳行經太華孔徳紹見初學記紛吾世網暇靈岳展幽尋寥廓風塵逺杳冥川谷深山昏五里霧日落二華隂疎峰起蓮葉危寒一作塞隠桃林何必東都外此處可抽簮扈從出西岳作沈佺期西鎮何穹崇壯哉信靈造諸嶺皆峻秀中峰特美好旁見巨掌存勢如拓東倒頗聞首陽去開拆北集作此河道磅礴壓洪源嵬峩壯初學記作載清昊雲泉紛亂瀑天磴矻横抱子先呼其巔宫女世不老下有府君廟歴載傳洒掃皇明應天遊十月戒豐鎬微末忝閒從兼得事蘋藻宿心愛茲山意欲拾靈草隂壑已承集作水初學記作永閉雲竇絶探討芳集作芬月期再來廻策思方浩春初送吕𥙷闕往西岳勒碑孫逖刻石記天文朝推谷子雲箧中緘聖札巖下揖神君語别梅初艶為期草欲薰往來春不盡離思莫氛氲華岳王維西岳出浮雲積翠在太清連天凝黛色百里遥青㝠白日為大集作之寒森沉華隂城昔聞乾坤開變化生巨靈右足踏方山左手推削成天地忽開折大河注東溟遂為西岳﨑集作峙岳雄雄鎮秦京大君包覆載至徳被羣生上帝佇昭告金天思奉迎人祇望幸乆何獨禪云亭觀華岳祖詠西入秦闗口南瞻驛路連彩雲生闕下松樹倒祠邊作鎮當官道為雄控大川蓮峰逕上處彷髴有神仙經太華衞光一太華五千尋重嵒才疑沓起勢飛白雲外影倒黄河裏上有千葉蓮服之乆不死山高採難得歎息徒仰止華山張喬青蒼河一隅氣狀杳難圖卓傑三峰出高竒四岳無力疑擎上界勢猶厭集作獨壓中區衆水東西走羣山逺近趨天廻諸宿照地聳百靈扶石壁烟霞麗集作藤蘿細龍潭雨雹麤澄凝集作清凉臨甸服險固束神都淺覺川原異深應日月殊鶴歸青靄合仙去白雲孤濁瀑斜飛凍長松倒掛枯每來探洞穴不擬返江湖儻有芝田種商巖老一夫集作巖間寄野夫華山上方裴說獨上上方上立高聊稱心氣衝雲易黒影落縣多隂有雲疑作雪草不死無風松自吟㑹當求大藥他日復追尋文苑英華卷一百五十九
