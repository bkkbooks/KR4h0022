body:
  text: 文苑英華巻三百九十宋李昉等編南省六兵部郎中授李懐讓兵部郎中制蘇頲黄門朝議大夫行大理正上柱國李懐讓直方在心一作公清而轉勁通明應務吏必兼文故能譽滿簮纓望華䑓署鷞鳩作士雖叅聽棘之言司馬訓兵重踐握蘭之任可行尚書兵部郎中㪚官勲如故主者施行授李􅱫兵部郎中等制孫逖勅朝議大夫二字一作郎行兵部員外郎李􅱫等清才雅器人望時英咸以令名光于俊選自膺推擇乆効彌綸宜甄滿嵗之勤俾進為郎之秩可依前件授張顒兵部郎中丘㩀兵部員外郎制賈至門下上應列宿尚書郎所以稱羙也中持風憲侍御史所以推雄也况兼之藩翰加以師旅宜求全一作異才允廸厥職澤州刺史張顒有一作以貞固之資為幹時之器澤潞司馬殿中侍御史邱據秉温良之質多利物之才咸提綱憲府佐理戎幕以示修直展其謀猷必將大耕戰之圗𢎞䑓閣之務式加新秩俾修舊政顒可守兵部郎中懐州刺史㩀可兵部員外郎依前行軍司馬授邵說兵部郎中制常衮勅宣徳郎前守尚書司勲郎中賜緋魚袋邵說學致其道文逹其變沉静有用貞純秉彜藹然盛名光我華省長於奏議多所損益佐夏官之劇參戎事之􅇻膺此俊選佇揚休聞可守尚書兵部郎中㪚官如故授李深兵部郎中制常衮勅朝議大夫郎守衢州刺史賜紫金魚袋李深忠義之門懋昭前烈文儒之道𢎞著休問經通以濟於用亷介以約其心早擅吏能偹更官序藩條之重理行尤彰亦既休閑頗聞淹乆宜膺郎署之選式允公才之拜可守尚書兵部郎中㪚官勲賜如故授蕭祐兵部郎中制元稹勅兵部郎中佐夏官理邦國以平不若辨九法九伐之重輕稽五兵五楯之衆寡非踐更䑓閣從容聞望者不在兹位流品既清選任彌重朝議郎守尚書考功郎中上䕶軍賜緋魚袋蕭祐才行忠信逹於予聞課吏陟明誕若攸職拾青紫於儒術擅金石之揮毫允謂賢能宜當慰薦可守尚書兵部郎中㪚官勲賜如故授楊嗣復兵部郎中制元稹勅吏部郎中楊嗣復官天下之文武重事也兵部郎中二員一在侍從不居外省旁求其一頗甚難之而執事者皆曰近以文章詞賦之士為名軰由此者坐至公卿閑逹憲章用是希少而吏曹郎嗣復州里秀異議論宏博宜其所長自多然而操剸吏事細大無遺用副簡求允謂宜稱其試守兹任為予簡稽苟能修明旋議超陟可權知尚書兵部郎中餘如故授栢耆兵部郎中等制李虞中勅夏官之屬以九法平簡稽司冦之列以三典詰邦禁選用郎吏斯為重難朝議郎前使持節婺州刺史上柱國騎都尉賜紫金魚袋栢耆勁正誠明冨以材識揚聲禮閣直筆諌垣徴事郎使持節蘄州諸軍事守蘄州刺史驍騎尉賜緋魚袋狄兼謩舊徳在人文風擅價興起憲署勞徠疲甿有以恬退自安遇事而後發有以昭融羙稱非道而莫遷顧兹缺員宜乎並拜懋承寵擢以奉彌綸耆可守尚書兵部郎中㪚官勲賜如故兼謩可守尚書司門郎中㪚官勲賜如故授王政雅等兵部郎中制李虞中勅朝議大夫郎守尚書户部郎中兼侍御史知雜事上輕車都尉賜緋魚袋王政雅朝議郎守尚書户部郎中上柱國賜紫金魚袋豆盧曙等御史府紀綱中外事雜而繁故常以侍御史一人綜其庻務政無大小罔不關决繇是得叅舉中䑓郎之可者以兼領焉既而第其課績以勸能吏陟明者必載遷於省閣當選者復繼入於憲闈此其可以為重也爾等皆以簡愿端明修詞踐行發強可以守直開敏可以適中甞逰刃於京邑亦坐籌於戎閫䑓閣之上聲華益髙賛均輸於財征表明慎於郵罰分曺左右其用惟新是宜舉武部之雄以奨成績授都曹之重以勵兼才佇觀稱服之能式副有司之請正雅可守右司郎中兼侍御史知雜事㪚官賜如故豆盧曙可職方郎中職方郎中授杜集作源下同寂職方郎中制常衮勅朝議郎守尚書度支郎中賜緋魚袋杜寂端一其誠周通於事乆於膳部頗有敏才亦既詳逹不㤀恭慎掌我方志宜從序遷可守尚書職方郎中㪚官賜如故駕部郎中授韋翹司駕部郎中制常衮門下武部員外郎韋翹貞固幹事達理明權績惟著於在公才必聞於處劇逓遷郎署俾膺榮寵可為司駕郎中庫部郎中授衢州刺史鄭群庫部郎中齊州刺史張士階祠部郎中制白居易勅具官鄭群等今之正郎班望頗重中外要職多繇是遷故其所選不得不慎必循名實而後命之群與士階乆典名郡謹身化下有循吏之風㑹課陟明宜當是選國之大事在祀及集作與戎一掌祠曹一司武庫各湏集作領其要爾宜敬之群可庫部郎中士階可祠部郎中授杜致羙太常少卿楊拙庫部郎中制薛廷珪勅朕以至公掄才時致用乂周行進秩公論為人如聞右司郎中杜致羙以吾上台實爾猶子深自抑損不求聞逹隠几端居不言時事閉關却掃深味道腴夫何山濤魏舒校爾優劣而户部員外郎楊拙始以籍甚之稱洽於名埸歴聘侯藩亟踐䑓省彊學務本履正居中夫何顔駟楊雄侔爾専静奉常典樂建禮含香詢爾清閑明我搜選克敬乃事交修厥官各謂當才無忝並命可依前件刑部郎中授許季同刑部郎中杜羔户部郎中制白居易勅前長安縣令許季同前萬年縣令杜羔等軰自郎署分宰京邑而長吏待之小乖常禮雖同辭託疾一作故動未得中然逺恥以退道不失正各從免職亦既踰時况文行政能皆推於衆詢諸時議宜有遷授尚書郎缺方選才良憲部人曹俾膺並命季同可刑部郎中羔可户部郎中都官郎中授髙仲舒都官郎中制蘇頲黄門通議大夫行太子洗馬髙仲舒洽聞殫見履直居温士慕清暉人推至行崇賢企徳已膺洗馬之榮建禮求才宜拜乗鳬之寵可行尚書都官郎中散官如故主者施行授劉崇彜都官郎中制薛廷珪勅具官劉崇彜朕聽政之暇躭翫群書毎讀考槃之詩常軫遺逸之慮訪於輿論得爾崇彛聞其常抱業試於有司才優數竒十上不第言行修整文學該通儒雅之聲著於洛下而以爾令弟秉予大鈞鴻飛𡨕𡨕不近賢路從軍試吏亦曰疆名苟狥爾私其如公議是用陟居華省寵以郎曹典制六官之重伏奏清蒲之上疇爾夙志予㤙不輕凢百未申宜體朕樂善興能之意無患不知也可比部郎中授比部郎中制劉禹錫勅周以司㑹質嵗成漢以計相經國用或考百官之要或制三年之期稽以簿書辨其名物俾夫㑹筭必得經費無差充選望郎以臨計吏可司門郎中授桞渙司門郎中制蘇頲勅朝議郎前行左司員外郎栁渙色莊心勁贍學能文堅守憲章務從條理為時所重滿嵗當遷冝罷䑓轄更司門鍵可守尚書司門郎中㪚官如故工部郎中授京畿制置使判官兼中丞賜紫李巨川工部郎中制錢珝勅具官李巨川夫彊學者始自為已移於事人君齊羙儒先登志士之場優入群書之域中權之佐前著實髙多務講論直歸翼戴爾所自比我能知之推共奨王室之心慕不以兵車之力文翰之樂迅捷若飛雖觀者已煩而作者甚暇陪臣盡善賢帥盛稱上既䇿勲下難遺賞且升郎位如事所知理在庶官勉興墜典常聞好古當念陟明可依前件屯田郎中授屯田郎中制劉禹錫勅詩云雨我公田遂及我私葢羙大田之盛思賢主之詩人必先公而後私者借力而耕其來尚矣周以司徒蒞職漢以侍郎訓田今則務切如雲任専列宿揔於豫政克藉公才可虞部郎中授王踐睦虞部郎中制蘇頲黄門中㪚大夫檢校太子左賛善大夫王踐睦明敏練習雍容閒雅聲馳在公政曉為吏徃還䑓閣已叶於初從今掌衡虞俾光於重入可行尚書虞部郎中㪚官如故主者施行授李䎖虞部郎中制白居易勅金州刺史李䎖雅有文藝飾以政事早從吏職乆領郡符謹慎亷平頗副所任虞曹郎缺命以序遷敬兹寵命勉守厥位可尚書虞部郎中水部郎中授河中節度判官温緒水部郎中制薛廷珪勅天子省方藩后述職睦鄰事大允執厥中偃革崇儒行成於内我知之矣彼有人焉具官温緒懿祖考為朝廷大臣偉望威名皆烜赫信史而爾砥節礪行修詞立誠抱終身之憂脱屣科第伎四方之志服勤官途束帶公朝曵裾侯府刃有餘地人無間言朕以釁結萑胡官切蒲兵纒封域藏書之府煨燼罕存爰委藩宣為我採摭而爾能奉綸㫖來貢之書欲以先王之格言廣我視聽思列聖人之行事規我怠荒實嘉乃心斯騐夙志爾帥具舉予其懋遷升之文昌授以清署用酧稱職以勸事人凢百賔階無㤀幕畫可尚書水部郎中文苑英華巻三百九十
