body:
  text: 文苑英華巻一百六十五宋李昉等編地部七池二十五首游泛三十八首池和山池庾信樂宮多暇豫望苑暫回輿鳴笳陵絶浪飛蓋歴通渠桂亭花未落桐門葉半踈荷風驚浴鳥橋影聚行魚日落含山氣雲歸帶雨餘𤣥圃濬池王褒長沙春水滿臨汎廣川中石壁如明鏡飛橋類飲虹垂楊夾浦緑新桃縁樹紅對樓還泊岸迎波蹔守風漁舟釣欲滿蓮房珠半空於兹臨北閣非復坐墟東山池應令徐陵畫舸圖仙獸飛艎挂采斿榜人事輕槳釣女理銀鈎細萍時帶檝低荷乍入舟猿啼知谷晩蟬思覺山秋奉和山池前人羅浮無定所鬱鳥屢遷移不覺因風雨何時入後池樓臺非一勢臨翫自多竒雲生對户石猨掛入欄枝經豐城劔池隂鏗清池自湛淡神劔乆遷移無復連星氣空餘似月池夾篠澄深谷類聚作渌含風結細漪唯有連花蕚還想匣中雌唐都尉山池崔湜曲渚颺輕舟前溪釣晩流鴈飜蒲葉起魚撥荇花遊金子懸湘柚珠房坼海榴幽尋惜未巳清月半西樓萍池王維春池深且廣㑹待輕舟廻靡靡緑萍合垂楊掃復開題榮二山池孟浩然甲第開金穴榮期樂自多櫪嘶支遁馬池飬右軍鵝竹引携琴入花邀載酒過山公來取醉時唱接䍦歌題沈東美員外山池前人仙郎偏好道鑿沼象瀛洲魚樂隨情性船行任去留秦人辨鷄犬堯日識巢由歸客衡門外仍憐反景幽觀崔郎中漲新池盧綸引水春山近穿雲復遶林纔聞籬外響已覺石邉深滿處侵苔色澄來見桞隂㣲風明月夜知有五湖心題興善寺後池前人隔牎棲白鳥似與鏡湖隣月照何年樹花逄幾遍人岸莎青有路苔徑緑無塵永願容依止僧中老此身秋池二首白居易身閒無所為心閒無所思况當故園夜復此新秋池岸闇烏栖後橋明月出時菱風香散漫桂露光參差净境多獨得幽懷竟誰知悠然心中語自問來何遲二朝衣薄且徤晩簟清仍滑社近燕影稀雨餘蟬聲歇閒中得詩境此境幽難說露荷珠自傾風竹玉相戞誰能一同宿共翫新秋月暑退早凉歸池邉好時節新池前人數日自穿鑿引泉來近陂尋渠通咽處繞岸待清時深好求魚飬閒堪與鶴期幽聲聽難盡入夜睡常遲南池前人蕭條㣲雨絶荒岸抱清源入舫山侵塞分泉道接村秋聲依樹色月影在蒲根淹泊方難遂他宵關夣䰟宿池上前人泉來從絶壑亭敞在中流竹宻無空岸松長可絆舟蟪蛄潭上夜河漢島前秋異夕期深漲携琴却此遊池上宿劉得仁事事不求奢長吟省歎嗟無才甘世棄有句向誰誇老樹呈秋色空池浸月華凉風白露夕此境屬詩家宣義池上前人脩篁夾緑池幽鳥此中飛何必青山逺仍将白髪歸當時亦有恨是日緫無機樹起秋風細西林磬入㣲官池上僧無可逈䟽城闕内寒㵼出雲波岸廣山魚到汀閒海鷺過泛溝侵道急流葉入宫多移舸浮中沚青宵徹曉河京兆公池上作温庭筠稻香山色疊平野接荒陂蓮少舟行逺萍多釣下遲壞隄泉落處凉簟雨來時京口兵堪問何因入夣思宿友人池前人背墻燈色暗宿客夣初成半夜竹窓雨滿池荷葉聲簟凉秋閣思木落故山情明發又愁起桂花溪水清于秀才小池方干一泓㶑灔復澄明半日功夫斸小庭占地無過四五尺浸天應入兩三星鷁舟草際浮霜葉魚火沙邉駐水螢纔見規模識方寸知君立意象滄溟池上鄭谷池樹愜幽獨狂吟學觧嘲露荷香自在風竹冷相敲䘮志嫌孤宦忘機愛澹交仙山如有分必擬訪三茅興州東池前人南連乳郡流濶碧浸晴樓徹底千峯影無風一片秋垂楊拂蓮葉返照媚漁舟鑒貌還惆悵難遮兩鬢羞盆池張蠙圓因陶化功外絶衆流通選處離松影穿時減藥叢别疑天在地長對月當空毎使登門客烟波入夣中遊泛首夏泛天池梁武帝薄遊朱明節泛漾天淵池舟檝互容與蘋藻相推移碧沚紅菡萏白沙青漣漪新波拂舊石殘花落故枝葉軟風易出草密路難披北寺寅上人房望逺岫翫前池王筠安期遂長往交甫稱髙讓逺跡入滄溟輕舉馳崑閬良由心獨善兼且情遊放豈若狥幽棲即日窮清曠激水周堂下屯雲塞檐向閒牖聽奔濤開窓延疊嶂前階復虛㳂濔迤成洲漲雨㸃散圓文風生起斜浪遊鱗互瀺灂羣飛皆哢吭蓮葉蔓田田菱花動摇漾浮光曜庭廡流芳襲帷帳匡坐足忘懐詎思江海上春日臨池温子昇光風動春樹丹霞起暮隂嵯峨映連璧飄摇下散金徒自臨濠渚空復撫鳴琴莫知流水曲誰辨遊魚心同㑹河陽公新造暗山池聊得寓目庾信横階仍鑿澗對户即連峯暗石疑藏虎盤根似卧龍沙洲聚亂荻洞口礙横松引泉恒數􅉽開巖即十重北閣聞吹管南隣聽擊鐘菊寒花正合杯香酒絶濃由來魏公子今日始相逄和濬池初成清晨臨泛前人千金髙堰合百頃浚源開翻逢積草浪更識昆明灰猿嘯風還急鷄鳴潮即來時㸔青雀舫遥逐桂舟迴安德山池宴集李百藥朝宰論思暇髙宴臨方塘雲飛鳯臺管風動令君香細草開金埒流霞泛羽觴虹橋分水態鏡石引菱光上才同振藻小伎謬連章懷隂自蘭室徐歩返山荘同前劉洎平陽擅歌舞金谷盛招携何如兼往烈命賞叶幽棲已均朝野致還欣物我齊春晩花方落蘭深逕漸迷蒲新節尚短荷小蓋猶低無勞拂長袖自待夜烏啼同前岑文本甲第多清賞芳辰命羽巵書帷通竹逕琴臺枕槿籬池疑夜壑徙山似鬱洲移雕楹網蘿薜激瀬合塤篪鳥戱翻新葉魚躍動清漪自得淹留趣寧勞攀桂枝同前楊續狹斜通鳯闕上路抵青樓簮紱啟賔館軒蓋臨御溝西城多妙舞主第出名謳列峯疑宿霧䟽壑擬藏舟花蝶亂風影蘋藻含春流酒䦨髙宴畢自反山之幽同前許敬宗戚里歡娯地園林矚望新山庭帶芳杜歌吹叶陽春臺榭疑巫峽荷蕖似洛濵風花榮少女虹梁聚美人宴遊窮至樂談笑畢良辰獨歎髙陽晩歸路不知津同前褚遂良伏檻丹霞外遮園煥景舒行雲泛層阜蔽月下清渠亭中奏趙瑟席上舞燕裾花落春鶯晩風光夏葉初良朋比蘭蕙雕藻邁瓊琚獨有狂歌客來承歡宴餘同前上官儀上路抵平津後堂羅薦陳締交開狎賞麗席展芳辰密樹風烟積迴塘荷芰新雨霽虹橋晩花落鳯臺春翠釵低舞席文杏散歌塵方惜流觴滿夕鳥已城闉于長史山池三日曲水陳子昻摘蘭藉芳日集作月被宴坐廻汀汎灔清流滿葳蕤白芷生金絃揮趙瑟玉柱弄秦筝巖榭風光媚郊園春樹平烟花飛御道羅綺照昆明日落紅塵合車馬亂縱横和元舍人萬頃臨池翫月戱為新體沈佺期春風摇碧樹秋霧巻丹臺復有相宜夕池清月正開玉流含吹動金魄度雲來熠爚光如沸翩翻景若摧半環投積草碎璧聚流盃夜乆平無渙天清皎未隤鏡将池作匣珠以岸為胎有美司言暇髙興獨悠哉揮翰初難擬飛名豈易陪夜光珠在握了了見沈灰和韋承慶遊義陽公主山池五首杜審言野興城中發朝英物外求情懸珠集作朱紱望契動赤泉遊海燕巢書閣山鷄舞畫樓雨餘清晩夏共坐此巖幽二逕轉危峯逼橋斜缺岸妨玉泉移酒味石髓換粳香綰霧青條弱牽風紫蔓長猶言宴樂少别向後池塘三携琴繞碧沙摇筆弄清霞杜若幽庭草芙蓉曲沼花宴遊成野客形勝得山家往往留仙歩登攀日易斜四攢石當軒倚懸泉渡牖飛鹿麛衝妓席鶴子曳童衣園果甞難遍池蓮摘未稀捲簾惟待月應在醉中歸五賞翫期他日髙深愛此時池為八水背峯作九山疑地静魚常逸人閒鳥欲欺清溪流别興更與白雲期甞與大理丞袁公太府丞田公偶詣一所林沼尤勝因並坐其次相得甚歡遂賦詩焉以詠其事張九齡方駕與吾友同懐不異尋偶逄池竹處便㑹江湖心夏近林方密春餘水更深清華兩暉映閒歩一窺臨蘋藻復佳色鳬鷖亦好音韶芳媚洲渚惠氣襲衣襟蕭散皆為樂徘徊從所欽謂子集作予成夙志嵗晩共抽簮過崔駙馬山池王維畫集作書樓吹笛妓金埓酒家胡錦石稱貞女青松學大夫脫貂貰桂酌射鴈與山厨聞道髙陽㑹愚公谷正愚靈雲池送從弟前人金盃緩酌清歌轉畫舸輕移艶舞廻自嘆鶺鴒臨水别不同鴻鴈向池來鄭駙馬池臺喜遇鄭廣文同飲杜甫不為生戎馬何知共酒盃燃臍郿塢敗握節漢臣回白髪千莖雪丹心一寸灰别離經此地披冩忽登臺重對秦簫發俱過阮巷來留連春夜舞淚落更徘徊同族姪評事黯遊昌禪師山池李白逺公愛康樂為我開禪關蕭然松石下何異清凉山花将色不染水與心俱閒一坐度小刼觀空天地間奉和苑舍人宿直曉翫新池亭寄南省友沈東美傳聞閶闔裏寓直有神仙史為三墳博郎因五字遷晨臨翔鳯沼春注躍龍泉去似登天上來如看鏡前影摇宸翰發波净列星懸既濟仍懷友流謙欲進賢彈冠聲實貴覆被渥恩偏温室言雖阻文塲契獨全玉珂光赫奕朱紱氣蟬聮興逸潘仁賦名髙謝眺篇青雲仰不逮白雪和難牽苒苒胡為此甘心老嵗年蘇著作山池賈彦璋水榭子雲家蓬瀛宛不賖芥舟浮是葉蓮岫發為花酌蟻開春瓮視魚慿海查遊蘓多石友題贈滿瑶華陪中書李紓舍人夜泛東池盧綸看月復聽琴移舟出桞隂夜村機杼急秋水芰荷深石静龜潛上萍開果一作葉暗沈何言盃酒興得見五湖心宴楊駙馬山池韓翃垂楊拂岸草茸茸繡户簾前花影重鱠下玉盤紅縷細酒開金瓮緑醅濃中朝駙馬何平叔南國詞人陸士龍落日泛舟同醉處廻潭百丈映千峯池上早春即事嘲集作招夣得白居易老更驚年故集作改閒先覺日長晴薫榆莢黒春染桞梢黄雪破山呈色氷融水放光低平穏船舫輕暖好衣裳白角三升榼紅茵六尺牀偶遊難得伴獨醉不成狂我有中心樂君無外事忙經過莫慵嬾相去兩三坊池上閒詠前人青莎臺上起書樓緑藻潭中繫釣舟日晩愛行深徑裏月明多在小橋頭暫嘗新酒還成醉亦出中門便當逰一部清商聊送老白鬚蕭颯管絃秋酬裴相公題興化小池見招長句前人為愛小塘招散客不嫌老監與新詩山公倒載無妨學范蠡扁舟未要追蓬斷偶飄桃李徑鷗驚誤拂鳯凰池敢辭課拙酬髙韻一勺争禁萬頃陂遊宣義池亭姚合春入池亭暖風光老更鮮尋芳行不困逐勝坐還遷細草亂如髮幽禽語似蟬集作鳴似絃苔文翻古畫石色學秋天花落能漂酒萍開觧避船暫來猶愈疾乆住合成仙迸筍支堦起垂藤壓樹偏此生應借㸔自料買無錢金州晩夏陪姚員外南池僧無可桞暗清波漲衝萍復潄苔張帆髙僧詩作筵白鳥起掃岸使君來洲島秋應沒荷花曉髙僧詩作晩盡開髙城吹角罷騶馭尚徘徊與諸公池上待月楊發樹密雲縈岸池遥水際空芰開方吐鏡蘋動欲含風漸映沙汀白㣲分渚葉紅金波宜共賞仙棹一宵同陪王尚書泛蓮池舟許渾蓮塘移畫舸泛泛日華清水暖魚頻躍烟秋鴈早鳴舞疑廻雪態歌轉遏雲聲客散山公醉風髙月滿城和沈叅軍招友生觀芙蓉池温庭筠桂棟坐清曉瑶琴雙鳯絲况聞楚澤香適與秋風期遂使棹萍客静嘯烟草湄倒影回澹蕩愁紅媚漣漪湘莖乆蘚澁宿雨増離披而我江海意楚遊動夣思北渚水雲蔓南塘烟露枝豈亡池榭芳獨與鷗鳥知珠墜魚迸淺影多鳬泛遲落英不可搴返照昏澄陂泛觴池薛能通咽逺華罇泛觴名自君净看籌見影輕動酒生紋細滴隨盃落來聲就浦分便應半酣後清冷漱兼雲春盡獨遊慈恩寺南池趙嘏竹外池塘烟雨收送春無伴亦遲留秦城馬上半年客潘鬢水邊今日愁氣變晩雲紅映闕風含髙樹碧遮樓杏園花落遊人盡獨為圭峯一舉頭文苑英華巻一百六十五
