body:
  text: 文苑英華巻二百九十三宋李昉等編行邁五盧綸五首戴叔倫六首嚴維一首孟雲卿一首權德輿三首朱放一首賈宗一首衛葉一首余延夀一首竇叔向一首閭丘曉一首栁仲庸二首胡浩一首劉復二首釋清江一首釋靈一一首李益一首李端二首章八元一首歐陽詹四首韓愈四首劉禹錫四首李宣逺一首孟郊四首吕温二首張籍四首白居易六首江行次武昌縣盧綸客寄五湖間扁舟往復還年年生白髪處處上青山去國空知逺安身竟不閑更悲江畔桞長是北人攀夜泊金陵前人圓月出高城蒼蒼照水營江中正吹笛樓上又無更洛下仍傳箭闗西欲進兵誰知五湖外將吏更爭名集作諸將但爭名泊揚子江岸見一百六十四巻前人山映前篇作山影鏡催前篇作鏡悲沙草前篇作芳草晩㳄鄂州至徳中作前人雲開逺見漢陽城猶是孤㠶一日程估客晝眠知浪靜舟人夜語覺潮生三湘愁鬢逢秋色萬里歸心對月明舊業已隨征戰盡更堪江上鼓鼙聲至徳中途中即事寄李僴前人亂離無處不傷情况復㸔碑對古城路逺寒山人獨去月臨秋浦鴈空驚顔衰重喜歸鄉國身賤多慙問姓名今日主人還共醉應憐世故一儒生過栁州戴叔倫地盡江南戍山分桂北林火雲三月合石路九疑深暗谷隨風過危橋共鳥尋覉魂愁似詩選作以愁絶不復待猿吟經巴東嶺前人巴山不可上徒馭亦徘徊舊棧欹難度朝雲濕未開瀑泉飛雪雨驚獸走風雷此去無停候征人㡬日回過中州前人萬人曾戰死㡬處見休兵井邑初安堵兒童未長成凉風吹古木野火入殘營牢落千餘里山空水復清次下牢韻前人獨立荒亭上蕭蕭對晩風天高吳塞濶日落楚山空猿呌三聲斷江流一水通前程千萬里一夕宿巴東夜發烏詩選作猿江作前人半夜回舟入楚鄉月明山色共蒼蒼孤猿更發詩選作叫秋風裏不是愁人也斷腸宿灌陽灘前人十月江邊蘆葉飛灌陽灘冷上舟遲今朝未遇高風便還與沙鷗宿水湄自雲陽歸晩泊陸澧宅嚴維天隂行易晩前路故人居孤棹所思乆冐寒相見初閑燈忘夜永清漏任更踈明發還須去離家㡬嵗除汴河阻風已見一百五十六巻孟雲卿新安江路前人深潭與淺灘萬轉出新安人逺禽魚靜山深水木寒嘯起青蘋末吟矚白雲端即事遂幽賞何必掛儒冠次下三篇竝見集本夜月江行前人扣船文粹作舷不能集作得寢浩露清衣襟彌傷孤舟夜逺結萬里心幽興惜瑶草素懷寄鳴琴三奏月初上寂寥文粹作寞寒江深奉使宜春夜度新淦江陵路至黄蘖館路上遇風雨作前人草草理夜裝渉江又登陸望路殊未窮指期今已促傳呼戒徒馭振轡轉林麓隂雲擁巖端霈集作􅑛雨當山腹震雷如在耳飛電來照目獸跡不敢窺馬蹄惟務速䖍心若齋禱濡體如沐浴萬竅相怒號百泉暗奔瀑危梁慮足跌峻坂憂車覆問我何以然前日受㣲禄轉知人代事纓組乃徽束向若家居時安枕春夢熟遵途稍已近候吏來相續曉霽心始安林端見初旭亂後經淮隂岸朱放荒村古岸誰家在野水溪雲處處愁唯有河邉衰栁樹蟬聲相送到揚州旅泊江津言懷賈宗征途㡬迢逓客子倦西東乗流如泛梗逐吹似驚蓬飄颻萬里外辛苦百年中異縣心期阻他鄉風月同雲歸全嶺暗日落半江紅自然堪併淚非是泣途窮晚投南村衛葉客行逢日暮原野散秋暉南陌人初斷西林鳥盡歸暗蓬沙上轉寒葉月中飛村落無多在聲聲近𢷬衣南州行余延夀摇艇至南國國門連大江中州兩邉岸數歩一垂楊金釧越溪女羅衣胡粉香織縑春捲縵採蕨瞑提筐弄琴嬌垂幌迎人笑下堂河頭浣衣處無數紫鴛鴦過擔石湖竇叔向曉發漁門戍晴㸔擔石湖日銜髙浪出天入四空無尺寸分州島纎毫指舳艫渺然從此去誰念客㠶孤夜渡淮閭丘曉舟人自相報落日下芳潭夜火連河市春風滿客㠶水窮滄海畔路盡小山南且喜鄉國近言榮意未甘揚子途中栁仲庸楚塞望蒼然寒林古戍邉秋風人渡水落日鴈飛天江行前人繁隂乍隱洲落葉初飛浦瀟湘集作瀟瀟楚客㠶日暮秋江雨山峽胡浩巴東三峽盡曠望九江開楚塞雲中出荆門水上來魚龍潛嘯雨鳬鴈動成雷南國秋風晩客思㡬悠哉出東城劉復歩歩東城門獨行已徬徨伊洛泛清流宻林含朝陽芳景雖可矚懷憂在中腸人生㡬何時苒苒隨流光願得心所親樽酒坐髙堂一為浮沉隔㑹合殊未央雙戱水中鳬和鳴自翺翔我無此羽翼安可以比方經楚城前人日没路且長逰子欲涕零荒城無人路秋草飛寒螢東南古邱墟莾蒼馳郊坰黄雲晦斷岸枯井臨崩亭昔人竟何之窮泉獨冥冥蒼苔沒碑板朽骨無精靈俛仰寄世間忽如流波萍金石非汝夀浮生等臊腥不如學神仙服食一作藥求丹經夕次襄邑釋清江何處成吾道經年逺路中客心猶向北河水自歸東古戍鳴寒角踈林振夕風輕舟難載月那與古人同自清山詣於潜道中作呈元八居士已見二百三十巻釋靈一早發破訥砂見二百九十九巻李益晚次巴陵招水集作邀水客李端雪後栁條新巴陵城下人烹魚招水客載酒奠山神雲去低斑竹風來動白蘋不堪逢楚老日暮正江春晩疑作曉發𤓰洲前人曉發悲行客橈停獨未前寒江半有月野戍漸無船棹唱離南岸鴻嘶發逺田誰知避徒御對酒一澘然新安江行後篇作亭章八元江源南去野永飯暫維梢古戍懸魚網空林露鳥巢雪晴山脊見沙淺浪痕交自笑無媒者逢人作解嘲益昌行并序歐陽詹貞元中天子以工部郎中興元少尹吳興陸集作次公長源牧利州其為政五年予旅逰于利覩人安俗阜欽所以美作詩一章利故益昌郡也目之曰益昌行驅馬至益昌倍驚風俗和耕夫隴上謡負者途中歌處處川復原重重山與河人煙遍餘田時稼無閑坡問業一何脩太守徳化加問身一何安太守恩懷多贒哉我太守在古無以過愛人堪愛身集作子治郡如治家集作理邦如理家雲雷既奮騰草木遂萌芽乃知良二千足徳集作得足為國華今時故集作固精求漢帝非徒嗟四氣有青春衆植佇揚葩期當作説霖天下同霶􅑛以下三篇竝見集本自淮中却赴洛途中作前人惆悵䇿疲馬孤蓬被風吹昨東今又集作與西冉冉長路岐嵗晚樹無葉夜寒霜滿枝集作衣旅人恒辛苦􅁳寞天何知晨装行前人村店月西出集作入山枝鴨鵊聲永疑燈徹夜席束囊事晨征寂寂人常眠悠悠天未明豈無偃息心所務前有程新都行前人縹緲空中絲蒙籠道傍樹翻兹葉間吹惹破花上露悠揚絲意去苒蒻花枝住何計脱纒綿天長春日暮晩泊江口韓愈郡城朝觧纜江岸暮依村二女竹上淚孤臣水底魂雙雙歸蟄鷰一一呌羣猿廻首那聞語空㸔别袖翻以下四篇並見集本次弄集作巫冠峽韓愈今日是何朝天晴物色饒落英千尺堕逰絲百丈飄泄乳交巖脉懸流掲浪標無心思嶺北猿鳥莫相撩同李二十八夜次襄城前人周楚仍連接川原乍屈盤雲垂天不暖塵漲雪猶乾印綬歸台室旌旗别將壇欲知迎候盛騎火萬星攅次峽石前人數日方離雪今朝又出山試慿高處望隱約見潼闗晚泊牛渚劉禹錫蘆葦晚風起秋江鱗甲生殘霞忽改色逺鴈有餘聲戍鼓音響絶漁家燈火明無人能詠史獨自月中行途中早發前人中庭望啟明促促事晨征寒樹鳥初動霜橋人未行水流白煙起日上綵霞生隱士應高枕無人問姓名初至長安時自在外郡授郎官劉禹錫左遷凡二紀重見帝城春老大歸朝客平安出嶺人每行經舊處却思似前身不改南山色其餘事事新秋江早發前人輕隂迎曉日霞霽秋江明草樹含逺思襟懷有餘清凝睇萬象起朗吟孤憤平渚鴻未矯翼而我已遐征因思市朝人方聽晨雞鳴昏昏戀衾枕安身元氣英納爽耳目變翫竒筋骨輕滄洲有竒趣浩蕩吾將行并州路作李宣逺秋日并州道黄榆落故闗孤城吹角罷數騎射鵰還帳幕遥臨水牛羊自傍山行人正垂淚􅇏火起雲間逺逰孟郊慈烏不逺飛孝子念先歸而我獨何事四時心有違江海戀空積波濤信來稀長為路旁客集作食着盡家中衣别劔不割物離人難作威逺行少僮僕驅使無是非為長集作性玩好盡積愁心緒㣲始知時節駛有夏集作愛日長暉夣澤中行前人楚山爭蔽虧白日無全輝楚路多集作饒違感旅人有迷歸騏驥思北首鷓鴣願南飛我懷京洛逰未厭風塵衣渭上思歸前人獨訪千里信廻臨千里河家在吳楚鄉淚寄東南坡過分水東嶺前人山壯馬力短馬集作路行石齒中十歩九舉轡廻還失西東溪水變為雨緑集作懸岸隂濛濛客衣飄颻秋葛花零落風白日捨我役征途忽然窮道州途中即事吕温零桂佳山水營陽舊日同經途㸔不暇遇境説難窮疊嶂青時合澄湘漫處空舟移明鏡裏路入畫屏中巖壑千家接松蘿一逕通漁燈集作煙生縹緲犬吠隔葱籠戱鳥留餘翠幽花悦晚紅光翻沙瀬日香散橘園風信美非吾土分憂屬賤躬守愚資地僻䘏隱望年豐且保心能靜那求政必工課終如免戾歸養洛城東經河源軍漢村作前人行行忽到舊河源城外千家作漢村樵採未侵征虜墓耕耘猶就破羗屯金湯天險長全設伏臘華風亦暗存暫駐單車空下淚有心無力復無集作何言江行夜投漁家已見二百十七巻張籍路逺前篇作路暗薊北春思集作懷前人渺渺水雲外望來鄉集作别來音信稀因逢過江使却寄在家衣問路更愁逺送人空説歸今朝薊城北又見塞鴻飛舟行重寄李湖州已見二百九十五巻前人宿江店前人野店臨寒集作西浦門前有橘花停燈待賈客賣酒與漁家夜靜江水白路廻山月斜閑尋舟泊集作船泊處潮落見平沙夜入瞿塘峽白居易瞿塘天下險夜上信艱哉峯似雙屏合天如疋練開逆風驚浪起㧞􅜺暗船來欲識愁多少高於灔澦堆途中感秋前人節物行摇落年顔坐變衰樹初黄葉日人欲白頭時鄉國程途逺親朋處處辭唯殘病與老一歩不相離途中作前人早起上肩􅐝一盃平旦醉晚憇下肩􅐝一覺殘春睡身不經營物心不思量事但恐綺與紈只如吾氣味臼口阻風十日前人洪濤波集作白浪塞江津處處邅廻事事迍世上方為失途客江頭又作阻風人魚鰕遇雨腥盈鼻蚊蚋和煙癢滿身老大光隂能㡬日等閑臼口坐經旬九江北岸遇風雨已見一百六十二巻前人初出藍田路前人停驂問前路路指集作在秋雲裏蒼蒼縣南山集作道險集作去途從此始絶頂忽上盤衆山皆下視下視千萬峯峯頭如浪起朝經韓公坂夕次藍橋水潯陽近集作僅四千始行七十里人煩馬蹄阻勞苦又如此集作已文苑英華巻二百九十三
