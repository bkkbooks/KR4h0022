body:
  text: 文苑英華巻三百十七宋李昉等編居處七園齋八十五首遊後園梁元帝暮春多淑氣斜景落髙舂日照池光淺雲歸山望濃入林迷曲徑渡渚隔危峯晩景有遊後園前人髙軒聊騁望焕景入川梁波摇類聚作横山度影雨罷葉生光日移花色異風散水紋長山齋庾信寂寥尋靜室䝉宻就山齋滴瀝泉遶一作澆路穹窿石卧堦淺槎全不動盤根惟半埋殘珠墜曉菊細火落空槐直置風雲慘彌憐心事乖同前徐陵桃源驚往客鶴嶠斷來賔復有風雲處蕭條無俗人寒山㣲有雪石路本無塵竹徑朦朧巧茅齋結搆新燒香披道記懸鏡壓山神砌水何年溜簷桐幾度春雲霞一已絶寜辯漢將秦敬酬楊僕射山齋獨坐薛道衡相望山河近相思朝夕勞龍門竹箭急華岳蓮花髙嶽髙嶂重疊鳥道風煙接遥原樹若薺逺水舟如葉葉舟旦旦浮金波夜夜流露寒洲渚白月冷函闗秋秋夜清風發彈琴即鑑月雖非莊舄歌吟咏常思越重酬楊僕射山齋前人寂寂無與晤朝端去總戎空庭聊歩月閒坐獨臨風臨風時太息歩月出泉側朝朝散綵霞暮暮澄秋色秋色遍臯蘭霞綵落雲端吹旌朔氣冷照劔日光寒光寒塞草平氣冷咽笳聲將軍獻凱入藹藹風雲生郊園即事王勃煙霞春旦賞松竹故年心斷山疑畫障懸溜瀉鳴琴草遍南亭合花濃北院深閒居饒酒賦隨興欲抽簪冬日過故一作友人任處士書齋駱賔王神交尚投漆虛室罷遊蘭網結集作積窓文亂苔深履跡殘雪明書帳冷氷靜墨池寒獨此琴臺夜集作上流水為誰彈此詩三百七巻重出前已削去南山家園林木交暎盛夏五月幽然清凉獨坐思逺率成十韻陳子昻寂寥守窮巷幽獨坐集作卧空林竹松生虛白堦庭横集作懐古今鬱蒸炎夏晩凉宇閟清隂軒窓交紫靄簾一作簷户對蒼岑鳳蘊仙人籙鸞歌素女琴忘機委人代閉牖察天心蛺蝶憐紅藥蜻蜓愛碧潯坐觀萬象化方見百年侵擾擾將何息青青長苦吟願隨白雲駕龍鶴相招尋田假限疾不獲還莊載想田園兼思親友率成短韻用寫長懐贈林一作杜幽素兄見二百四十九巻李嶠郡宅中齋宋之問郡宅枕層嶺春湖遶芳甸雲甍出萬家卧覽皆已遍漁商汙成雨廨邑明若練越俗鏡中行夏祠雲表見茲都信盤鬰英逺常棲眄王子事黄老獨樂恣遊衍謝公念蒼生同憂感推薦靈越多秀士運濶無由靣神理翳青山風流滿黄巻揆余謬成疑奬自昔從纓弁瑶水執仙覊金閨負時選晨趨博望苑夜直明光殿一朝罷臺閣萬里違鄉縣風土足慰心况恱年芳變淮廩佇茲實沂歌非所羡訟寢歸四明齡頽親九轉微上本江海少留豈交戰惟餘後凋色竊比東南箭同李員外春園崔湜落日啼連夜孤燈坐徹明捲簾雙鷰入披幌百花驚隴水寒應晩閨中織未成管絃愁不意一作記粧梳懶無情去嵗聞西伐今年送北征容顔離别盡流恨滿長城崔禮部園亭得深字張說窕窈留清館虛徐歩晩隂水連伊闕近雲集作樹接夏闗集作陽深柳蔓憐垂拂藤苖愛上尋訝君軒葢偶一作侣非復俗人心小園納凉即事蘇頲煩暑避蒸鬱歸閒習髙明長風自逺來層閣有餘清散灑納凉氣蕭條遺世情奈何誇大隠終日繫塵纓先是新昌小園待獻嵗羣物期京兆尹一訪兼郎官數子自頃沉痾年復寒食兹願不果率然成章前人獨好中林隠先期上月春閒花傍户落喧鳥逼簷馴寂寞東陂叟傳呼北里人在山琴易調開甕酒歸醇佇望應三接彌留忽幾旬不疑丹火變空恠緑條新鬬蟻聞常日歌龍值此辰其如衆君子嘉㑹阻清塵晨坐齋中偶而成詠張九齡寒露結秋空遥山紛在矚孤頂乍倄聳微雲復相續人茲賞地偏鳥亦愛林旭結念憑幽逺撫躬曷覊束昻集作仰霄謝逸幹一作翰臨路嗟疲足徂嵗方暌携歸心亟躑躅休閒儻有素豈負南山曲郡内閒齋前人賔集作郡閣晝常掩庭蕪日復滋簾集作簷風落鳥毳忩葉掛蟲絲拙疾集作病宦情少機集作覊閒秋氣悲理人無異績為郡但經時惟有江湖意沉㝠獨集作空在茲郡舍南有園畦雜樹聊以永日前人為郡久無補越鄉空復深茍能乗素節安用叨華簮却歩園畦裏追吾野逸心形骸拘俗吏光景頼閒林内訟誠知止外言猶匪忱成蹊謝李逕衛足感葵隂榮達豈不幸集作偉孤心一作生非所任江城何寂歴秋樹亦蕭森下有比流水上有南飛禽我願從歸翼無然空自一作自在沉春園即事王維見集本宿雨乗輕屐春寒著敝袍開畦分白水間柳發紅桃草際成棊局林端舉桔橰還持鹿皮几日暮隠蓬蒿春中田園前人屋上春鳩鳴村邊杏花白持斧伐逺揚荷鋤覘泉脉歸燕識舊巢舊人㸔新厯臨觴忽不御惆悵思逺集作逺行客題梧州陳司馬山齋孟浩然南國無霜霰連年對物華青林暗换葉紅蘂亦開花春去無山鳥秋來見海槎流芳雖可恱㑹自泣長沙題張逸人園廬前人與君園廬並微尚頗亦同耕釣方自逸壺觴趣不空門無俗士駕人有尚皇風何必先賢傳惟稱龎徳公家園夜坐寄郎微祖詠前堦微雨歇開户散窺林月出夜方淺水涼池更深餘風生竹樹清露薄衣襟遇一作寓物遂遥嘆懐人滋逺心依稀成夣想影響絶徽音誰念窮居者明時嗟陸沉巴陵劉處士東齋作王昌齡劉生隠岳陽心逺洞庭水偃㠶入山郭一宿楚江裏竹暎秋舘深月寒江風起煙波桂陽接日夕數千里嫋嫋清夜猿孤舟坐如此湘中有來鴈雨雪候音㫖同姜濬題裴式微餘干東齋劉長卿世事終成夣生涯欲半過白雲心已矣滄海意如何藜杖全吾道榴花養太和春風騎馬醉江月釣魚歌散帙㸔蟲蠧開門見雀羅逺山終日在芳草傍人多吏體莊生傲方言楚俗訛屈平君莫弔膓斷洞庭波贈大理黄主簿湖上髙齋前人閉門湖水畔自與白鷗親竟日忩中岫終年林下人俗輕儒服弊家厭法官貧多雨茅簷夜空洲草逕春桃源君莫愛且作漢朝臣田園觀雨兼晴後作孟雲卿貧賤少情欲借荒種南陂我非老農圃安得良上宜秋成不亷儉嵗餘多餒饑顧視倉廩間有糧不成炊晨登南園土疑莫歇清蟬悲早苖既芃芃晩田尚離離五行孰堪廢萬物當及時賢哉數夫子開翅慎勿遲題從弟制疑官竹齋張謂羡爾方為吏衡門獨晏如野猿偷紙筆山鳥汚圖書竹裏藏公事花間隠使車不妨垂釣坐時鱠小江魚春題劉相公山齋時相公初除太子賔客錢起能以功成疎寵位不將心賞負雲霞林間客散孫宏閣城一作壇上山宜綺季家蝴蝶晴憐池岸葉黄鸝曉出柳園花集作山蝶成羣争遶蕙黄鸝禽子暗移花日陪鯉也趍文苑誰道門生隔絳紗題右集作暮遏龜谷溫處士園林前篇作送溫逸士見二百三十六巻隠几前篇作垂白田園前篇丘園闗心前篇作縈心集作嬰心晒藥前篇作曝藥支頥前篇作榰頥勅和元相公家園即事寄王相公韓翃共列中台貴能齊物外心廻車青閣晩觧帶碧芳深寒水隨畦入晴光度竹尋題詩更相應一字重千金題張逸人園林前人藏頭不服見時人愛此雲山奉養真露色㸃衣孤嶼月一作曉花枝妨帽小園春一作時悶携㓜稚諸峯上閒濯鬚睂一水濱興罷歸來還對酌茅簷掛著紫荷巾題裴固新園又𤣥集作裴二十一新園皇甫冉東郊訪先生西郊尋舊路久為江南客自有雲陽樹已得閒園心不知公府歩開門白日晩倚杖青山暮菓熟任霜封籬踈從水渡窮年無牽綴往事惜淪誤惟見獨一作耦耕人朝朝自來去舊路又𤣥集作隠路題李沆園林盧綸古巷牛羊出重門接柳隂閒㸔入竹路自有向山心種藥齊幽石耕田到逺林願同詞賦客得與一作興謝家深題耿拾遺春中題第五四郎新􅁱書院前人得接西園㑹多一作皆因野性同引藤連樹影移栢集作移石間花叢學就晨昏外歡生禮樂中春遊隨墨客夜宿伴潛公散帙燈驚燕開簾月帶風朝朝在門下自與五侯通春日同諸公過兵部王尚書林園權徳輿休沐君相近時容曳履過花間留客久臺上見春多松色明金艾鶯聲雜玉珂更逢新酒熟相與藉庭莎春日山齋釋靈一野逕東風起山扉度日開晴光拆紅蕚流水長青苔逋客殊未云芳時已再來非闗戀春草自是欲徘徊程評事西園之作釋法震誰向春鶯道名園已共知簷前廻水影城上出花枝摇拂煙雲動登臨翰墨隨相招能不厭山舍為君移題鄭容江畔桐齋鄭先生好琴性廉兼寡欲釋皎然客齋開别住坐占緑江濆流水非外物閒雲長屬君浮榮未可累曠達若無羣風起髙桐下清絃日日聞和翰林吳舍人兄弟西齋顧况君家誠易知易知復難同新裁尺一詔早入明光宫西齋何其逺一作髙上與星漢通永懐洞庭石春色相玲瓏又懐巴峽泉夜落君絲桐信是怡神所迢迢蔑華嵩鳥飛晴雲滅疊嶂盤虚空君家誠易知易知意難窮安邑王校書房耿緯秋來池館清夜聞宫漏聲迢遞玉山逈泛灧銀河傾琴上松風至忩裏竹煙生多君不家食孰云事巖耕題孝一作李廉書房前人商瞿長易教一室向青山業就三編絶心通萬象閒鸎啼春水上草遍暮陽間莫道符繻在來時棄故闗題鮮于秋林園集作鮮于映竹園司空曙雨後園林好幽行迥一作向野通逺山芳草外流水落花中容醉悠悠慣鶯啼處處同夕陽集作傷春自一望日暮杜陵東秋園戱題前人傷秋不是惜年華别憶春風碧玉家强向衰叢見芳意茱萸紅實似繁花題崔端公園林李端上士愛清輝開門向翠微抱琴㸔鶴去枕石待雲歸野坐苔生席髙眠竹掛衣舊山東望逺惆悵暮花飛南園韋應物清露夏天曉荒園野氣通水禽遥泛雪池蓮拂披紅幽林詎知暑環舟似不窮頓酒塵喧意長笑滿襟風題沈八齋暢當江齋一入何亭亭因寄淪漣心杳𡨕緑綺琴彈白雪引烏絲絹勒黄庭經春日過闕前人帝里陽和日一作早遊人到御園暖催新景氣春認舊蘭蓀詠徳先臣沒成蹊大樹存見桐猶近井㸔柳尚依門獻地非更宅遺忠永奉恩又期攀桂後來賞百花繁秋過龍武李將軍書齋王建髙樹蟬聲秋巷裏朱門冷净似閒居重裝墨畫數莖竹長着香薰一架書語笑侍兒知禮數吟哦野客任狂踈就中愛讀英雄傳欲立功勲恐不如和元員外題昇平里新齋楊巨源因知休沐諸幽勝遂肯髙齋枕廣衢舊地已開新玉圃春山仍展緑雲圖心源邀得閒詩證肺氣宜將慢酒扶此外惟應任真宰同塵最是道門樞題表丈二大夫書齋復覽文集前人盛府自蓮花羣公是嵗華蘭姿丈人圃松色大夫家素巻堆瑶席朱絃暎絳紗詩題三百首髙韻照春霞春園即事陳羽水隔羣物外花一作夜深風起頻霜中千樹橘月下五湖人聽鶴忽忘寢見山如得隣明年還到此共㸔洞庭春過張老村園于鵠身老無􅁱餙頭巾用白紗開門朝掃逕輦水夜澆花藥氣聞深巷桐隂到數家不愁還酒債腰下有丹砂南溪書院楊發茅屋住來久山深不置門草生垂井口花發接一作擁籬根入院將鶵鳥攀蘿抱子猿曾逢異人說風景似桃源春園醉醒閑卧小齋前人酣醉送餘春醒來恨更頻花殘蜂蠧物葉暗鳥欺人簾閉髙眠貴齋空浩氣新從今北忩蝶長是夣中身小園秋興一作晩前人誰言帝城裏獨作野人居石磴晴㸔疊一作疊山苖晩自鋤相慙五秉粟尚癖一車書昔日揚雄宅還無卿相輿題從叔園林吕温阮宅閒園暮忩中見樹隂樵歌依野草僧語過長林鳥下花間井人彈竹裏琴自嫌身未老已有住山心道州夏日早訪苖參軍林園敬酬見贈前人髙眠日出始開門竹逕傍通到後園陶亮横琴空有意任棠置水竟無言松忩宿翠含風薄槿援朝花帶露繁山郡本來車馬少更容相訪莫辭喧和李僕射西園張籍過午歸閒處西亭敞四簷髙眠着琴枕散帙檢書簽印在休通客山晴好捲簾竹凉蠅到少藤暗蝶争潛曉一作晩鵲頻驚喜疎蟬不許拈石苔生紫㸃欄藥吐紅尖虛坐詩情逺幽探道侣兼所營當勝地雖儉復誰嫌松齋偶興白居易置心思慮外滅跡是非間約俸為生計隨官換往還耳煩聞曉皷眼醒見秋山頼此松簷下朝廻半日閒郡中西園前人閒園多芳草春夏常集作春靡靡深樹足佳禽旦暮鳴不已院門閉松竹庭徑穿蘭芷愛彼池上橋獨來聊徙倚魚依藻長樂鷗見人蹔起有時舟隨風盡日蓮照水誰知郡府内景物閒如此始悟喧静縁何嘗繋逺邇題崔集作鄭駙馬園林集作林亭姚合東園連宅起勝事與心期幽洞自生藥新篁迸入池宻林行不盡芳草坐難移石翠疑無價集作質鶯歌似有詞莎臺髙出樹蘚壁盡題詩我獨多來此九衢人不知西園許渾西園春已一作欲盡芳草徑難分静語惟幽鳥閒眠獨使君宻林生雨氣古石帶苔文雖去清朝逺朝朝見白雲山齋秋晩前人殘月皓煙露一作霧掩門深竹齋草蟲鳴曲檻山鳥下空階清鏡曉㸔髮素琴秋寄懐因知北忩客日與世情乖題裴處士園林集作題鄒處士居前人桑柘滿江村西齋接集作對海門浪衝髙岸響潮入小池渾巖樹䕃棊局山花落酒樽相逢每集作歡更留宿還似識王孫同張處士題李隠居園林見三百十六巻前人荒齋賈島草舍徑微微終南對掩扉晩凉踈雨絶初曉逺蟬集作山稀葉落無情地閒身着白衣樸愚由本性不是學忘機題號州三堂吳郎中前人無窮草樹昔誰栽新起臨湖白石臺半岸泥沙孤鶴立三堂風雨四門開荷飜圓集作團露驚秋近柳轉斜陽過水來昨夜北樓堪郎詠號城初鎖月徘徊田將軍書院前人滿庭花木半新栽石自平湖逺岸來笋迸隣家還長竹地經山雨幾層苔井當深夜泉㣲上閣入髙秋户盡開行背曲江誰到此琴書鎖着未朝廻齋中前人耽静非偽集作謬為本性實踈索齊中一就枕不覺白日落低扉礙軒轡寡徳謝接諾藂菊在墻隂秋窮未開蕚所食集作飡類病馬動影似移岳欲駐廹逃衰豈殊辭綆縛已見飽時雨應豐蔬與藥題從伯舍人道正里南園劉得仁帝里餘新第朱門靣碧岑曙堂增爽氣喬木動清隂直去親瑶陛朝廻在竹林風流才子調好尚古人心薜荔遮忩暗莓苔近井深禮無青草隔一作鎖詩有一作共白衣吟軒静留孤鶴庭虛到逺砧掩闗裁鳳詔開鏡理瓊簮種植今如此塵埃永不侵雲奔投刺者日月待為霖初夏題叚郎中􅁱竹里南園前人髙人遊息處與此曲池連宻樹纔春後深山在目前逺峯初絶雨片石欲生煙數有僧來宿應縁静好禪西園前人夏圃秋一作晩凉入樹低逢幘欹水聲飜敗堰山翠濕疎籬緑滑莎藏徑紅連一作繁果壓枝幽人更何事旦夕與僧期錢塘青山題李隠居西齋李郢小隠西亭為客開翠蘿深處遍青苔林間掃石安棊局巖下分泉遞酒盃蘭葉露光秋月上蘆花風起夜潮來湖山遶屋猶嫌淺欲棹漁舟近釣臺園居前人暮雨揚雄宅秋風向秀園不聞砧杵動時㸔桔橰飜釣下魚初食船移鴨蹔喧橘寒才弄色須帶一作待早霜繁春晩東園曉思薛逢劔外春餘日更長東園留醉樂髙張松杉露滴無情淚桃杏風飄不語香鶯戀葉深啼緑樹燕窺巢穩坐雕梁也知留滯年華晩争那罇前樂未央宿陳生山齋見二百十七巻溫庭筠扶持山州避難冬夜二三禪侣吟茅齋李涸四海通禪客搜吟葉擁扃撚髭孤燭白閉目􅅍山青壁掛敲氷杖爐溫注月瓶獨愁衙舊斾笏冷立殘星花園即事呈常中丞集作侍郎趙嘏煙煖池塘柳覆臺百花園裏㸔花來燒衣熖席三千樹破鼻醒愁一萬盃不肯為歌隨拍落却因令舞帶香廻山公仰爾延賔客好傍春風次第開延賔集作留賔春風集作春城南園前人雨過郊原綠尚微落花惆悵滿塵衣芳罇有酒無人共日暮㸔山還獨歸郊園鄭谷相近復相尋山僧與水禽蓑衣集作煙蓑春釣静雪屋夜碁深雅道誰開口時風未醒集作省心恩集作溪光何以報祗有醉和吟題友人林齋張喬喬木帶源疑作凉蟬來吟暑雨天不離髙枕上似宿逺山邊簟冷忩中月茶香竹裏泉一作煙吾廬近溪島憶别動經年和崔監丞春遊鄭僕射東園張蠙春興隨花盡東園自養閒不離三畝地似入萬里山白鳥穿籬去清泉抵石還豈同秦代客無位隠商山次韻和友人冬日書齋前人四季多花木窮冬亦不凋薄氷一作雲行處斷殘火睡來消象版簽書帙蠻藤絡一作落酒瓢公卿有知己時得一相招南園題羅隠摶擊路終迷南園且灌畦敢言逃俗態自是樂幽棲葉長春松濶科圓早薤齊雨沾虛檻冷雪壓逺山低竹好還成徑桃夭亦有蹊小忩奔野馬閒甕養醯鷄水石心愈切煙霄分已暌病憐王猛畚愚笑隗囂泥澤圃潮平岸江村柳覆堤到頭乗興是誰手好提携文苑英華巻三百十七
