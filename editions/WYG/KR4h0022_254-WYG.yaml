body:
  text: 文苑英華巻二百五十四宋李昉等編寄贈八韋翃十首顧况六首耿緯六首司空曙十首章八元三首王建十五首寄武陵李少府韋翃小縣春生日一作山口公孫吏隠時楚歌催晩醉蠻語入新詩桂水遥相憶花源暗有期郢門千里外莫恠尺書遲贈張建前人結客平陵下當年倚侠逰傳㸔轆轤劒醉脱鷫鸘裘翠羽雙鬟妾珠簾百尺樓春風坐相待曉集作晩日莫淹留寄上田僕射前人家封薛縣異諸田報主榮親道兩全僕射臨戎謝安石大夫持憲杜延年金裝晝出羅千騎玉案晨飡值萬錢應念一身留闕下闔門遥寄魯西偏寄令狐尚書前人立身榮貴復何如龍節紅旗從板輿妙畧多推霍驃騎能文獨見沈尚書臨風髙㑹千門一作人帳映水連營百乗車他日感恩慙未報舉家猶似涸池魚贈鄭員外鄭時在熊尚書幕府前人風流不减杜陵時五十為郎未是遲孺子亦知名下士樂人爭唱巻中詩身齊吏部還多醉心顧尚書自有期要路眼青集作㸔知已在不應窮巷乆低眉寄劉太真前人長安道上落花朝羡爾當年賞事饒下筯已憐鵝炙羙開籠不奈鴨媒嬌春衣晩入青楊巷細馬初過皂荚橋相訪不辭千里逺西風好借木蘭橈梁城贈一二同幕前人五營河畔列旌旗吹角鳴鼙日暮時曽是信陵門下客兩廻相弔不勝悲贈張千牛前人蓬萊闕下是君集作事天家上路新廻白鼻騧急管盡吹平樂酒春衣夜宿杜陵花雜言贈哥舒僕射前人萬里長城家一生唯報國腰垂紫艾縵集作綬手控黄金勒髙視黒矟翁遥吞白騎賊先麾牙門將轉閗黄河北帳下親兵皆少年錦衣承日繡行纒轆轤寳劍初出鞘宛轉角弓爭上絃歩义抽箭大如笛前把兩矛後雙㦸左盤右射紅塵中鶻入鵶羣有何敵殺將破軍白日餘廻船舞斾北風初郡公楯鼻好磨墨走馬為君飛羽書贈别太常李博士兼寄兩省舊遊前人兩年戴武弁趨侍明光殿一朝簮惠文客車信陵君簡異當朝執香非寓直熏差肩何記室携手李將軍玉鐙初廻酸棗館金鈿正舞石榴裙忽驚萬事隨流水不見雙旌逐塞雲感舊撫心多戚戚與君相遇頭初白暫誇五首軍中詩還憶萬年枝上客昨日留歡今送歸空披秋水映斜暉閑吟佳句對孤鶴惆悵寒霜落葉稀一作惆悵寒天霜葉落從江西至彭蠡入浙西淮南界道中寄齊相公顧况大賢舊丞相作鎮江山一作上雄自鎮江山一作上來何人得如公處士待徐孺仙人期葛洪一身控上逰八郡趨下風比屋除畏溺林塘曳烟虹生人罷䖍劉井稅均且一作以充大府肅無事歡然一作言接悲翁心清百文泉目送孤飛鴻數年鄱陽掾抱責栖㣲躬首陽及汨羅無乃褊一作偏其衷楊朱并阮籍未免哀途窮四賢雖得仁此怨何怱怱老氏齊寵辱於陵一窮通本師留度門平等寃親同能依二諦法了逹三輪空真境靡方所出離内外中無邊盡未来定惠雙脩功蹇歩慙寸進餙装隨轉蓬朝從楚水隂夕宿吳洲東吳洲復白雲楚水飄丹楓晩霞燒廻潮千里光曈曈蓂開海上影桂吐淮南叢何當翼明庭草木生春一作昭融寄上兵部韓侍郎奉呈李户部盧刑部杜三侍郎前人道路五千里門闌三十年當時携手人今日無半全詠題官舍内賦韻一作贈僧房前公登略彴橋况榜龍集作􅧼􅞤船逺寺吐朱閣春潮浮緑烟鵷鴻翔鄧林沙鳵飛吳田諸子紛出祖中宵乆留連坐客三千疑人皆稱主人賢國士分如此家臣亦依然身在一作從薜蘿中投刺文案邊故吏已重疊門生從聨翩得罪為何名無階問皇天出門多岐路命駕無由縁伏承諸侍郎顧念一一作猶迍邅聖代逢三宥營魂空九遷謝王郎中見贈琴鶴前人此琴等焦尾此鶴方胎生赴節何徘徊理感物自并獨立江海上集作日一彈天地清朱絃動瑶華白羽飄玉京因想羡門輩眇然四體輕子喬翔鄧林王母遊層城忽如集作然啟靈署鸞鳳相和鳴何由玉女床集作女床山去食琅玕英贈朱倣前人野客歸時無四隣黔婁别乆按常貧漁樵舊路不堪入一作中住何處空山猶有人望初月簡于吏部前人泬寥中秋夜坐見如鈎月始從西南升又欲西南沒全移河上影蹔透林間缺縱待三五時終為千里别上湖至破山贈文周蕭元植前人一别二十年依依過故轍湖上非徃態夢想頻虗結二子伴我行我行感徂節後人應不識前事寒泉咽一别二十年人堪㡬回别春日書情寄元校書伯和相國元子耿緯數嵗平津邸諸生出門時覉孤力行早踈賤託身遲芳草㸔無厭青山到未期貧居悲老大春日向茅茨衛玠瓊瑶色元成鼎鼐資友朋漢相府兄弟謝家詩律合聲雖應勞歌調自悲流年不可住惆悵鏡中絲贈苖員外前人為郎日賦詩小謝少年時業繼儒門後心多道者期晩迴長樂殿新出夜明祠行樂西園暮春風動桞絲贈嚴維前人許詢清論重寂寞住山隂野客集作閣接荒寺閉集作雲門當古林海田秋熟早湖水夜漁深世上窮通理誰能奈此心寄錢起前人草長花落樹羸病強尋春無復少年意空餘華髮新青原髙見水白社静逢人寄謝南宫客軒車不見親上裴行軍中丞此詩又見第三百巻已詳註其下前人胡塵已滅天山外閉閣隂隂日復曛櫪上驊騮嘶鼓角門前老將識風雲旌旗四面髙秋見絲竹千家靜夜聞莫道古来多計筞功成唯有一作是李將軍許州書情寄韓張二舍人前人謫宦軍城老更悲近来貧夜夢丹墀銀盃乍滅中心火金鑷唯多兩鬢絲繞履緑苔聞鴈處滿庭黄葉閉門時故人髙歩天一作雲衢上肯念前程杳未期贈庾侍御司空曙年少身無累相逢憶此時雪過雲寺宿酒向竹園期白髮今催老清琴但起悲唯應逐宗炳内學願為師秋思呈尹植裴沉鄭銅前人静與嬾相偶年將衰共催前途歡未集徃事恨空来晝影委紅葉月華消緑苔沉思竟何有坐結玉琴哀獨遊寄衛長林前人草緑春陽動遲遲澤畔逰戀花同野蝶愛水劇江鷗身外唯湏醉人間盡集作半是愁那知鳴玉者不羡集作作賣𤓰侯贈李端前人共憶南樓日登髙望若何楚田湖草逺江寺海榴多載酒尋山宿思人帶雪過東西㡬回别此㑹各蹉跎謝李端集作酬李校書端見贈已見二百四十三巻前人長安晩望寄程補闕前人迢逓山河擁帝京參差宫殿接雲平風吹曉漏經長樂柳帶晴烟出禁城天凈笙歌臨路奏集作發日髙車馬隔塵行獨有淺才甘未逹多慙名在魯諸生早夏寄元校書前人獨逰野景送集作自芳菲髙竹林居接翠㣲緑岸草深蟲入遍青叢花盡蝶来稀珠荷薦果香寒簞玉柄揺風滿夏衣蓬蓽永無車馬到更當齋夜憶𤣥暉發渝州却寄韋判官韋空曙紅燭津亭夜見君一作輝髙夜送君繁絃急管兩紛紛平明分或作携手空江轉唯有猿聲嘯一作滿水雲此詩二百九十二巻重出今已削去注異同為一作江園書事寄盧綸前人種栁江南邊閉門三四年艷花那勝竹凢鳥不如蟬嗜酒漸嬰集作因非渇讀書多欲眠平生故交在白首逺相憐閑居寄苖發前人漸向浮生老前期竟若何獨身居䖏静永夜坐時多厭逐青林客休吟白雪歌支公有遺寺重與謝集作戴安過寄都官劉員外章八元舊宅平津邸槐隂接漢宫鳴騶馳道上寒日直廬中白雪歌偏麗青雲宦早通悠然一縫掖千里快一作限清風歸桐廬舊居寄嚴長史前人昨辭夫子棹歸舟家在桐廬憶舊邱三月暖時花競發兩溪分處水争一作東流近聞江左一作老傳鄊語遥見家山减旅愁或在醉中愁雪夜懐賢應向剡川遊初到昭應呈同僚王建白髮初為吏有慙年少郎自知身上拙不稱世間強集作忙秋雨縣墻緑暮山官樹黄同官若容許長借老僧房上武元衡相公前人旌旗坐鎮蜀江紅集作雄帝命重開舊閣崇褒貶唐書天厯上捧持堯日慶雲中孤情􅒯出鸞凰逺健思潛搜海岳空長得蕭何為相國自西流水盡朝宗上張宏靖相公前人傳封三世盡河東家占中條第一峯早集作旱嵗天教作霖雨明時帝用補山龍草開舊路沙痕在日照新池鳯跡重卑散自知霄漢隔若為門下賜從容上李吉甫相公前人聖朝齊賀説逄殷霄漢無雲日月真金鼎調和天膳羙瑶池沐浴賜衣新兩河開地山川正四海休兵造化仁曽向山東為散吏當今竇憲是賢臣寄上韓愈侍郎前人重登太學領儒流學浪詞鋒壓九州不以雄名殊集作䟽野賤唯將直氣折王侯詠傷松桂青山瘦取盡珠璣碧海愁序述異篇經緫核集作别鞭驅險句物先投碑文合遣貞魂謝史筆應令諂􅇧羞清俸探將還酒債黄金旋得起書樓客集作參来擬設官人禮朝退多逢月下集作閣下逰見向雲泉求住處若無知薦一生休贈王内侍樞宻前人三一作先朝行坐鎮相隨今上春宫見長集作小時脱下御衣先得集作偏賜着進来龍馬毎教騎長承宻㫖歸家少獨奏邊情集作機出殿遲不為集作自是姓同偏集作親向説九重爭遣外人知上裴舍人度前人小松忩對鳳池開履跡衣重集作香逼上台天意皆從彩毫出宸心盡向紫烟来非時玉案呈宣㫖毎日金階賜對集作謝賜廻仙侣何因記名姓縣丞頭白走塵埃上杜元頴學士前人學士金鑾殿後居天中行坐侍龍輿承恩不許離床謝宻詔長教倚案書馬上喚遮紅嘴鴨船頭看釣赤鱗魚閑曺散吏無相識猶記荆州拜謁初贈盧汀諫議前人青娥不得在床前空室焚香獨自眠功證詩篇離景象藥一作樂成官位屬神仙閑過寺觀長衝夜立送封章直上天近見蘭臺諸吏説御詩一作題新集未教傳贈華州鄭大夫前人此官出入鳳池頭通化門前第一州少華山雲當驛起小敷溪水入城流空閑地内人初滿詞訟牌前草漸稠報状折開知足雨赦書宣過喜無囚自来不説雙旌貴恐替長教百姓愁公退晩凉無一事歩行携客上南樓賀楊巨源博士拜虞部員外郎前人合歸蘭署已多時上得金梯即未遲兩省郎君開道路九州山澤属曹司諸生拜别收書巻舊客㸔來讀制詞殘着㡬九仙一作丹藥在分章還遣病夫知贈郭將軍前人承㤙新拜上將軍當直廵更近五雲天下表章經院過宫中語笑隔墻聞宻封計筞非時奏别贈衣裳到處薰向晩臨階㸔號簿眼前風景任支分上胡證將軍前人書生難得是金吾近日登科記揔無半夜進儺當玉殿未明排仗到銅壺朱牌上面集作面上分官契黄紙頭邊押勑符恐要番中新道路指揮重畫五城圗贈賈島前人盡日吟詩坐忍饑萬人中覔似君稀門當古巷風偏入鶴放秋原夜不歸迎暖併收新落葉欲寒重着舊生衣曲江北鴈時時到為一作尤愛鸕鷀兩翼一作水裏飛從軍後寄山中友人前人愛仙無藥住溪貧脱却山衣事漢臣夜半聽鷄梳白髮天明走馬入紅塵村童近去嫌腥食野鶴髙飛避俗人勞動先生逺相視别来弓箭不離身文苑英華巻二百五十四
