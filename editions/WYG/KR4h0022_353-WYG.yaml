body:
  text: 文苑英華巻三百五十三宋李昉等編問答三釣磯應誥文一首進學觧一首釋言一首答問一首學觧嘲對書一首釣磯應誥文駱賔王余以三伏晨行至七里灘此地即新安江口也有嚴子陵釣磯焉澄潭至清洞徹見底徃徃有羣魚戱歴歴如水行耳人有釣者試取餌而投之或有㳺集作浮而不顧者或有含而復吐者或有亷隅莫之近者或有貪暴集作而輙吞之者引竿而舉因以獲焉其始出也掉尾揚鬐有若恃力而自免集作勉其小退也則皷鰓濡沫有似屈體而求哀嗟乎勢牽于人道窮乎我將欲以下座而歌馮子又安能中轍而呼莊周哉余乃祝之曰猛獸搏也拘於檻穽鷙鳥攖也縶於籠樊素龜靈也被髮阿門莊子宋元君夢人被髮向阿門即白龜也白龍神也挂豫且網白龍為豫且所網事具説苑集作置非何不潜泥而沉處何故貪餌而吞釣乎於是放之江流盡其生生之理時同行者顧誥余曰夫至人之處世也擬迹而後投隠心而後動始終不易其業集作道悔吝不生其情而吾子沉緡於川登魚於陸烹之可以習政術羞之可以助庖厨曩求之將何圖今捨之將何欲余笑而應之曰聖人不凝滯於物智士必推移於時知幾之謂神舎生之謂道殷乙聖人也囚於夏孔子賢人也畏於匡且夫明哲之賢尚罹幽憂之患况乎鱗羽之族寧無弋釣之累哉故曩吾有心也恐求之而不得今吾無心也使集作既得之而亡求夫求與捨不亦雙美乎烹與羞不亦兩傷乎况療饑者半菽可以充腸為政者一言可以興邦亦何必因小鮮而後明三異之規勦大命而後冀一飡之飽擒而不殺可不謂仁乎獲而不饗可不謂亷乎且夫垂竿而為事者太公之遺術也形坐磻溪之石兆應渭集作滋水之璜夫如是者將以釣川耶將以釣國耶然後知古之善釣者其惟太公乎又有妙於此者其惟文王乎夫文王制六合為釣懸四履而為餌筮之於清廟投之於巨川一引而獲太公再舉而登尚父由此觀之蹲㑹稽而沈轄者鮑肆之徒也踞滄溟集作海而得鼇者漁父之事也斯盖集作並𦕈小者之所習安知大丈夫之所為哉進學觧韓愈國子先生晨入太學招諸生立館下誨之曰業精於勤荒於嬉行成於思毁於隨方今聖賢相逄治具畢張㧞去兇邪登崇俊良占小善者率以錄名一藝者無不庸爬羅剔抉刮垢磨光盖有幸而獲選孰云多而不揚諸生業患不能精無患有司之不明行患不能成無患有司之不公言未既有笑於列者曰先生欺予哉弟子事先生於茲有時集作日矣先生口不絶吟於六藝之文手不停披於百家之編記事者必提其要纂言者必鈎其𤣥貪多務得細大不捐焚膏油以繼晷恒矻矻以窮年先生之於業可謂勤矣觝排異端攘斥佛老補苴罅漏張皇幽𦕈尋墜緒之茫茫獨旁搜而逺紹障百川而東之一作走廻狂瀾於既倒先生之於儒可謂勞矣沉浸醲一作釀郁含英咀華作為文章其書滿家上窺姚姒渾渾亡涯周誥殷盤佶屈聱牙春秋謹嚴左氏浮誇易竒而法詩正而葩下逮莊騷太史所録子雲相如同工異曲先生之於作集作文可謂宏其中而肆其外矣少始知學勇於敢為長通於方左右具宜先生之於人可謂成矣然而公不見信於人私不見助於友䟦前㚄後集作躓動輙得咎暫為御史遂竄南夷三年博士冗不見治命與仇謀取集作其敗幾時冬暖而兒號寒年登集作豐而妻啼饑頭童齒豁竟死何禆不知慮此而反教人為先生曰吁子來前夫大木為杗細木為桷欂櫨侏儒椳闑扂楔各得其施集作宜施於成室者匠氏之工文粹作功也玉札丹砂赤箭青芝牛溲馬勃敗鼔之皮俱收並蓄待用無遺者醫師之良也登明選公雜進巧拙紆餘為妍卓犖為傑校短論集作量長唯噐是適者宰相之方也昔者孟軻好辨孔道以明轍環天下卒老於行荀卿宗王集注一作守正大倫是𢎞一作倫以興逃䜛於楚廢死蘭陵是二儒者吐辭為經舉足為法絶類離倫優入聖域其遇一作進於世何如也今先生學雖勤而不繇其統言雖多而不要其中文雖竒而不濟於用行雖脩而不顯於衆猶且月費俸錢歳靡集作糜廩粟子不知耕婦不知織乗馬從徒安坐而食踵長途之促促文粹作役役窺陳編以盗竊然而聖主不加誅宰臣不見斥此非其利哉文粹作幸歟動而得謗名亦隨之投閒置散乃分之宜若夫商財賄之有亡計班資之崇庳忘已量之所稱指前人之瑕疵是所謂集作猶詰匠氏之不以杙為楹而訾醫師以昌陽引年欲進其豨苓也釋言韓愈元和元年六月十日愈自江陵法曹詔拜國子博士始進見今相國鄭公公賜之坐且曰吾見子某詩吾時在翰林職親而地禁不敢相聞也今為我盡冩子詩書為一通以來愈再拜謝退録詩書若干篇擇日時以獻於後之數月集作日有來謂愈者曰子獻相國詩書乎曰然曰有為讒於相國之坐者曰韓愈曰相國徵予文予不敢匿相國豈知我哉子其慎之愈應之曰愈為御史得罪徳宗朝同遷於南者凡三人愈為先收用相國之賜大矣百官之進見相國者或立語以退而愈辱賜坐語相國之禮過矣四海九州之人自百官以下欲以其業徹相國左右者多矣皆憚而莫之敢獨愈辱先索相國之知至矣賜之大禮之過知之至是三者於敵以下受之宜以何報况在天子之宰相乎人莫不自知凡適於用之謂才堪其事之謂力愈於二者雖曰集作日勉焉而不近束帶執笏立於士大夫之行不見斥以不肖幸矣其何敢傲於言乎夫傲雖兇徳必有恃而敢行愈之族親鮮少無攀集作夕聯之勢於今不善交人無相先相死之友於朝無宿資蓄貨以釣聲勢弱於才而腐於力不能奔走承機抵􅇖以要權利夫何恃而傲若夫狂惑喪心之人蹈河而入火妄言而罵詈者則有之矣而愈人知其無是疾也雖有䜛言集作此字者百人相國將不信之矣愈何懼而慎歟既累月又有來謂愈者曰有䜛子於翰林舎人李公與裴公者子其慎歟愈曰二公者吾君朝夕訪焉以為政於天下而階太平之治集作理居則與天子為心膂出則與天子為股肱四海九州之人自百官以下其孰能一作此字不願忠而望賜愈也不狂不愚不蹈河而入火病風而妄罵不當有䜛者之說也雖有䜛者百人二公將不信之矣愈何懼而慎既以語應客夜歸私自尤曰咄市有虎而曽參殺人䜛者之效也詩曰取彼䜛人投畀豺虎豺虎不食投畀有北有北不受投畀有昊傷於䜛疾而甚之之辭也又曰亂之初生僣始既涵亂之又生君子信䜛始疑而終信之之謂也孔子曰逺佞人佞人不能逺則有時而信之矣今我恃直而不戒禍其至哉徐又自觧之曰市有虎聴者庸也曽參殺人以愛惑聰也巷伯之傷亂世是逢也今三賢方與天子謀所以施政於天下而階太平之治聽聰而視明公正而敦大集作尾下同夫聰明則聽視不惑公正則不邇讒邪敦大則有以容而思彼讒人者孰敢集作散進而為讒哉雖進而為之亦莫之聽矣我何懼而慎二字集作為既累月上命李公相客謂愈曰子前彼言於一相今李公又相子其危哉愈曰前之謗我於宰相者翰林不知也後之謗我於翰林者相國不知也今二公合處而㑹言若及愈者集作此字必曰韓愈亦人耳彼傲宰相集作相國又傲翰林其將何求必不然吾乃今知免矣集無此字既而讒言果不行答問栁宗元有問栁先生者曰先生貌類學古者然遭有道不能奮厥志獨被罪辜廢斥伏匿交遊解散羞與為戚生平嚮慕毁書滅跡他人有惡指誘増益身居下流為謗藪澤罵先生者不忌陵先生者無讁遇揖目動聞言心惕時行草野不知何適獨何劣耶觀今之賢智莫不舒翹揚英推類援朋疊足天庭魁壘恢張羣驅連行竒謀髙論左右抗聲出入翕忽擁門填扄一言出口流光垂榮豈非偉耶先生雖讀古人書自謂知理道識事機而其施為若是其悖也狼狽擯僇何以自表於今之世乎先生答曰敬聞命然客言僕知理道識事機過矣僕懵夫屈伸去就觸罪受辱幸得聯支體完肌膚猶食人之食衣人之衣用人之貨無耕織居販然而活給羞媿恐慄之不暇今客又推當世賢智以深致誚責吾縲囚也逃山林入江海無路其何以容吾軀乎願客少假聲氣使得詳其心次其論客曰何敢先生曰僕少嘗學問不根師説心信古書以為凡事皆易不折之以當世急務徒知開口而言閉目而息挺而行躓而伏不窮喜怒不究曲直衝羅䧟穽不知顛踣愚惷狂悖若是甚矣又何以恭客之教而承厚徳哉今之世工拙不欺賢不肖明白其顯進者語其徳則皆茫洋深閎端貞鯁亮苞并涵養與道俱徃而僕乃蹇淺窄僻跳浮嚄胡陌切唶側伯切抵瑕䧟厄固不足以趦趄批捩力結切而追其跡舉其理則皆謨明淵沉剖㣲窮深劈析是非校度古今而僕乃緘鉗塞黙耗眊窒惑扶異探怪起幽作匿攸攸恤恤卒自旤即禍字賊固不足以睢盱激昻而效其則言其學則皆揔攬羅絡横竪雜博天旋地縮鬼神交錯而僕乃單庸撇莩離䟽空虛竊聽道塗顓嚚䝉愚不知所如固不足以抗顔摇舌而與之俱稱其文則皆汗漫輝煌呼嘘隂陽轇轕三光陶鎔帝皇而僕乃朴鄙艱澁培塿潗湁丑入切毫聮縷緝塵出坱入固不足以攄摛踊躍而渉其級茲四者懸判雖庸童小女皆知其不及而又裹以罪惡纒以覊縶客從而擠之不亦忍乎且夫白蟻騄耳之得康莊也逐奔星先飄風而跛驢不出泥滓黄鐘元間之登清廟也鏗天地動神祗而鳴嗚咬哇不入里耳西子毛嬙之蹈後宫也皎朝日煥浮雲而無鹽逐於鄉里蛟龍之騰於天淵也彌六合澤萬物而蝦與蛭不離尺水卓詭倜儻之士之遇明世也用智能顯功烈而麽𦕈連蹇顛頓披靡固其所也客又何怪哉且夫一渉險阨懲而不再者烈士之志也知其不可而速已者君子之事也吾將竊取之以没吾世不亦可乎乃歌曰堯舜之修兮禹益之憂兮能者任而愚者休兮蹮蹮蓬藋樂吾囚兮文墨之彬彬足以舒吾愁兮已乎已乎曷之求乎客乃笑而去學觧嘲對書沈亞之客有以今廩食之不充漕輓不勝於弊是勞逺而惰近以為問者余於是發憤數日故縷言而對曰昔漢徙山東豪富兼并之家以奉園邑凡百二十四萬户又有南北東西軍及匈奴雜虜以國衆來歸者仰給於漢未聞嘗俟漕輓於呉越而後給也今以三十集作此千人食勞輸江淮嵗貢三十萬斛迎流陵集作越險覆􅀈敗軛集作軏不得十半自渭以東督稽之官凡四十七署署吏不下數百歳費錢千集作十萬為大數而部吏舟傭相踰為姦鞭榜流血酸苦之聲相聞禁錮連嵗不觧嵗千餘人雖赦宥而獄死者不可勝多矣甚非聖人集作仁聖之所以牧人也乃者燕人叛𤣥宗南渉巴蜀肅宗勞兵於靈武及二集作三駕神逰代宗臨陜關中流離羸牛一韁當市錢二百千故有轉輸之法雖救一時然終轉入於禍誠可以痛今雖未可暴去且冝以三輔粟為貢重資於農則耕稼自勤耕稼自勤則甸服無曠土游人矣如此九年之蓄可以儲又何勞輸輓於逺哉客曰敬聞其㫖文苑英華巻三百五十三
