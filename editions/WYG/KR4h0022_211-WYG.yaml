body:
  text: 文苑英華巻二百十一宋李昉等編樂府二十登名山篇一首秦王巻衣二首上留田二首古挽歌七首怨歌行五首悲哉行五首懐哉行一首獨不見五首定情篇一首雜曲五首憶昔行一首偪仄行一首胡笳曲六首雲中行一首長干行一首小長干行一首江風行一首登名山篇李巨仁名山稱地鎮一作本鎮地千仞一作迢遞上凌霄雲開金闕逈一作雲披金澗近霧起石梁遥翠微横鳥路珠澗入一作樹拂星橋風急青溪晩霞散赤城朝寓目幽棲地一作客駕言一作尋追綺季避世一作跡絶桃源士忘情漆園吏抽簪傲九辟脱屣輕千駟沉𡨕負俗心蕭灑一作疎索凌雲意蒼蒼聳極天伏眺盡山川疊峰如積浪分涯若斷一作斜煙淺深聞渡雨輕重聽飛泉採藥逢三島尋真值一作遇九仙藏書凡㡬代看博已經年逝將追羽客千載一来旋秦王巻衣吴均咸陽春草芳秦帝捲衣裳玉檢茱萸匣一作帶金泥蘇合香初芳熏一作動複帳餘輝曜寶一作玉牀當須晏一作晏又作早朝罷一作須臾朝晏罷持此贈華一作龍陽同前陳標秦家漢闕靄春煙珠樹瓊枝近碧天御氣馨香蘇合啟簾光浮動水精懸霏微羅縠隨芳袖宛轉鮫綃逐寶筵從此咸陽一囘首暮雲愁色已千年上留田梁簡文帝正月土膏初欲發天馬照曜動農祥田家斗酒群相勞為歌長安金鳳凰同前李白行至上留田孤墳何峥嶸積此萬古恨春草不復生悲風四邊来腸斷白楊聲借問誰家地埋沒蒿里塋古老向余言言是上留田蓬科馬鬛今已平昔之弟死兄不塟他人扵此舉銘旌一鳥死百鳥鳴一獸走百獸驚桓山出家語之禽別離苦欲去囘翔不能征田氏倉卒骨肉分青天白日摧紫荆交讓之木本同形東枝顦顇西枝榮無心之物尚如此參商胡乃尋天兵孤竹延陵讓國揚名髙風緬邈頺波激清尺布之謡塞耳不能聽古挽歌祖孝徴昔日一作時驅駟馬謁帝長楊宮旌懸白雲外騎獵紅塵中今来向漳浦素蓋轉悲風榮華與歌笑萬事盡成空同前王烈郭茂倩樂府作趙微明寒日髙不一作蒿上明凄凄郭東路素車誰家子丹旐引將去原下荆棘叢叢邊有新墓人生病長一作間痛傷別此是長別處日暮一作曠野何蕭蕭風悲一作青松白楊樹同前孟雲卿草草閭一作門巷喧塗車儼成位㝠寂一作㝠㝠何所須盡我生人意北邙路非遠此別終天地臨穴頻撫棺至哀反無淚爾形未衰老爾色猶一作息纔童穉骨肉安一作不可離皇天若容易房帷即靈帳一作虚張庭宇為哀次薤露歌若斯人生盡如寄同前白居易丹旐何飛揚素驂亦悲鳴晨光照閭巷轜車儼欲行蕭條九月天晩出洛陽城一作哀挽出重城借問送者誰妻子與弟兄蒼蒼古原上一作上古原峩峩開新塋含酸一悲一作慟哭異日同哀聲舊壠轉蕪絶新塋日羅列春風秋草北邙山此地年年生死别同前三首于鵠雙轍出郭門綿綿東西道送死多扵生㡬人得終老見此切肝腸一作肺肝唯有一作不如歸山好不聞哀哭聲黙黙安懐抱時盡從奄終一作物化又免生憂𢷬一作擾世間夀者稀盡為悲傷早一作惱二送哭誰家車靈車紫帶長青童抱何物明月與香囊可惜羅衣色看舁入水泉莫愁埏道暗燒漆得千年三隂風吹黄蒿挽歌渡秋水車馬却歸城孤墳明月一作月明裏怨歌行梁簡文帝十五頗有餘日照杏梁初蛾眉本多嫉掩鼻特成虚持此傾城貌翻為不肖軀秋風吹海水寒霜依玉除月光臨户映荷花依浪舒望簷悲隻翼窺沼泣王餘魚名苔生履䖏沒草合行人疎裂紈傷不盡歸骨恨難袪早知長信別不避後園輿同前張正見新豐妖冶地逰侠競驕奢池臺間羅綺桃李雜煙霞蓋影分連騎衣香合並車艷粉驚飛蝶紅粧映落花舞衫飄冶袖歌扇掩團一作圓紗玉帳一作牀珠簾捲金樓鏡月斜還疑蕭史鳳不及季倫家同前虞世南紫殿秋風冷雕甍落一作白日沉裁紈悽斷曲織素引一作別離心掖庭若一作羞改畫長門不惜金寵移恩稍薄情疎恨轉深香銷翠羽帳弦斷鳳凰琴鏡前紅粉歇階上緑苔侵誰言掩歌扇翻作白頭吟同前吳少微城南有怨婦含愁傍芳一作倚蘭叢自謂二八時歌舞入漢宮皇恩數流盼承幸玉堂中緑栢黄花催夜酒錦衣羅袖逐春風建章西宮煥若神燕趙美女三千人君王厭徳不忘新况群艷冶紛来陳是時別君不再見三十三春長信殿長信重門晝掩關清房曉帳幽且閑綺窓蟲網氛塵色文軒鶯樹一作對桃李顔天王貴宮不貯老浩然掩淚一作淚隕今来還自憐春色轉晩暮試逐佳逰芳草路小腰麗女奪人竒金鞍少年曽不顧歸来誰為夫請謝西家婦莫辭先醉解羅襦同前曹鄴丈夫好弓劒行坐説金吾喜聞有行役結束不待車官田贈倡婦留妾侍舅姑舅姑皆已死庭花半是蕪中妹尋適人生女亦嫁夫何曽寄消息他䖏却有書嚴風厲中野女子心易孤貧賤又相負封侯意何如悲哉行孟雲卿孤兒去慈親逺客䘮主人莫吟苦辛曲此曲誰忍聞可聞不可説去去無期別行人念前程不待參辰沒朝亦恒苦饑暮亦恒苦饑飄飄萬餘里貧賤多是非少年莫逺逰逺逰多不歸同前王昌齡每聽白頭吟人間易憂怨若非滄浪子安得從所願北上太行山臨風閲吹萬長雲數千里倐忽還膚寸觀其微滅時精意莫能論百年不容易是䖏生草蔓始悟海上人辭君永飛遁同前陳陶中嶽仇先生遺余餌松方服之一千日肢體生異香步履如風旋天涯一齎糧仍云為地仙不得朝虛皇狡兔有三穴人生又何常悲哉二廉士餓死扵首陽懐哉行薛據明時無廢人廣厦無棄材良工不我顧有因寧自媒懐策望君門嵗晏空遲廻秦城多車馬日夕飛塵埃伐鼔千門啟鳴珂雙闕来我聞雲雨施天下罔不該何意斯人徒棄之如死灰主好臣必效時禁權必開俗流實驕矜得志輕草莱文王頼多士漢帝資羣才一言拜將相片善咸居台丈夫何不遇為泣黄金臺獨不見劉孝威夫壻結纓簪偏蒙漢寵深中人引臥内副車遊上林綬染瑯琊草蟬鑄武威金分家移甲第留妾住河隂獨寢鴛鴦被自理鳳凰琴誰憐雙玉筯流面復流襟同前柳惲別島望風一作雲臺天顔一作泉臨水殿芳草生未積春花落如霰出從張公子還過趙飛鷰奉箒長信宮誰知獨不見同前王訓日晩宜春暮風軟上林朝對酒近初節開樓當夜嬌石橋通小澗竹路上青霄持底誰見許長愁成細腰同前戴叔倫前宮路非逺舊苑春將遍玉户看早梅雕梁數飛一作歸鷰身輕逐舞袖香暖傳歌扇自和秋風詞長侍昭陽殿誰信後庭人年年獨不見同前武元衡荆門一柱觀楚國三休殿環珮儼一作仰神仙輝光生顧盼春風細腰舞明月髙堂宴夢澤水連雲渚宮花似霰俄驚白日晩始悟炎凉變別鳬異波潮一作濤離鴻分海縣南北斷相聞嘆嗟獨不見定情篇喬知之共君結新婚嵗寒心未卜相與逰春園各隨性一作情所逐君愛菖蒲花妾感苦寒竹天一作菖花多艷姿寒竹有貞葉此時妾比君君心不如妾簪玉步河堤夭一作妖韶援緑荑鳬雁將子逰鶯鷰從雙棲君向一作念春光好妾對一作向春光啼君時不得意棄妾還金閨結言本同心悲歡何未齊怨咽前致辭願得申所悲人間丈夫易世路婦難為始如經天月一作始經天月照終若流星馳天月恒終始流星無定期長思一作信佳麗人失意非蛾眉廬江小吏一作史婦非關織作遲本願長相對今以一作已長相思復有宦逰子結綬從梁陳燕居崇三朝去来歴九春誓心妾終始蠶桑奉所親歸願未克從黄金贈路人潔婦懐明義從沈河之津于今千萬年誰當問水濵更憶倡家樓夫壻事封侯去時思照灼去罷心悠悠不矜一作憐妾嵗晏十載隴西頭以兹常惕惕百慮恒盈積由来共結褵㡬人同匪石故嵗雕梁鷰雙去歸一作今来隻今日玉庭梅朝紅暮成碧碧榮始芬敷黄葉已淅瀝何用念芳春芳春有流易何用重歡娛歡娛俄戚戚家本巫山陽歸去路何長叙言情未盡采菉已盈筐桑榆日反景物色盈髙岡下有碧流水上有丹桂芳一作香桂花一作枝不須折碧水自清一作碧流清且潔贈君比芳菲愛一作受恵常不歇一作滅贈君比一作淚潺湲相思無斷絶妾有秦家鏡寶匣裝珠璣鑑来年二八不記易隂暉妾無光寂寂妾至鄙一作委照影依依今日特為贈相識莫相違雜曲二首王筠烏還夜已逼蟲飛曉尚賒桂月徒留影蘭燈一作臺空結花二可憐洛城東芳樹摇春風丹霞映白日細雨帶輕虹同前傅縡新人新寵住蘭堂翠帳金屏瑇瑁牀叢星不如珠簾色度月還同粉壁光從来著名推趙子復有丹唇發皓齒一嬌一態本難逢如畫如花定相似樓臺宛轉曲皆通絃管逶迤徹下風此殿笑語恒長共旁省歡娛不復同訝許人情太厚薄分恩賦念能斟酌多作綉被為雙鴛一作鴛鴦長弄綺琴贈別鶴人今投寵要須堅㑹使嵗寒恒度前共取星辰作心抱無轉無移千萬年同前徐陵傾城得意已無儔洞房連閣未消一作閤未消愁宮中本造鴛鴦殿為誰新起一作為起新粧鳳凰樓緑黛紅顔兩相發千嬌百態情無歇舞衫囘袖勝春風歌扇當窓似秋月碧玉宮妓自翩妍絳樹新聲最可憐張星舊在天河上從来張姓本連天二八年時不憂度旁邊得寵誰相妬立春厯日自當新正月春幡底舊故流蘇錦帳桂香囊織成羅幔隠燈光祇應私將琥珀枕暝暝来上珊瑚牀同前江總行行春逕蘼蕪緑織素􅃚復解琴心乍惬南階悲緑草誰堪東陌怨黄金紅顔素月俱三五夫壻何在今追虜關山隴月春雪深一作冰誰見人啼花照戸憶昔行杜甫憶昔北尋小有洞洪河怒濤過輕舸辛勤不見華蓋君艮岑青輝慘么麽千崖無人萬壑静三步回頭五步坐秋山眼冷魂未歸仙賞心違淚交墮弟子誰依白茅室盧老獨啟青銅鎖巾拂香餘搗藥塵階除灰死燒丹火懸圃滄洲莽空濶金節羽衣飄婀娜落日初霞閃餘映倏忽東西無不可松風磵水聲合時青兕黄熊啼向我徒然咨嗟撫遺迹至今夢想仍猶左秘訣隠文須内教晩嵗何功使願果更討衡陽董錬師南浮早鼓瀟湘柂偪仄行贈畢四燿偪仄何偪仄我居巷南子巷北可恨鄰里間十日不一見顔色自從官馬送還官行路難行澁如棘我貧無乗非無足昔者相過今不得實不是愛微軀又非關足無力徒步翻愁官長怒此心炯炯君應識曉来急雨春風顛睡美不聞鐘鼓傳東家蹇驢許借我泥滑不敢騎朝天已令請急㑹通籍男兒信一作性命絶可憐焉能終日心拳拳憶君誦詩神凛然辛夷始花亦已落况我與子非壯年街頭酒價常苦貴方外酒徒稀醉眠速宜相就飲一斗恰有三百青銅錢此詩三百五十巻重出今已削去胡笳曲二首江洪藏器欲邀一作逢時年来不相讓紅顔征戍兒白首邊城將二落日慘無光臨河獨飲馬飋䫻夕風髙聯翩飛雁下同前陶宏景負扆飛天厯與奪徒紛紜百年四五代終是甲辰君同前鄭愔漢將留邊朔遥遥嵗序深誰堪牧馬思正是胡笳吟曲斷關山月聲悲雨雪隂傳書問蘇武陵也獨何心同前王昌齡城南虜已合一夜㡬重圍自有金笳引能霑出塞衣聽臨關月苦清入海風微三奏髙樓曉胡人掩淚歸同前王貞白隴底悲笳引隴頭鳴北風一輪霜月落萬里塞天空戍卒淚應盡胡兒笑未終争教班定逺不念玉關中雲中行薛童雲中小兒吹金管向晩因風一川滿塞北雲髙心已悲城南木落腸堪斷憶昔魏家都此方凉風觀前朝百王千門曉映山川色雙闕遥連日月光舉杯稱夀永相保日夕歌鐘徹清昊將軍汗馬百戰場天子射獸五原草寂寞金輿去不歸陵上黄沙塵路飛河邊不語傷流水川上含情歎落暉此時獨立無所見日暮寒風吹客衣長干行李白妾髮初覆額折花門前劇郎騎竹馬来遶牀弄青梅同居長干里兩小無嫌猜十四為君婦羞顔未曽開低頭向暗壁千喚不一囘十五始展眉願同塵與灰常存抱柱信豈一作耻上望夫臺十六君逺行瞿塘灔澦堆五月不可觸猿聲天上哀門前遲一作舊行跡一一生緑苔苔深不能掃葉落秋風早八月蝴蝶来一作黄雙飛西園草感此傷妾心坐愁紅顔老早晩下三巴預將書報家相迎不道逺直至長風沙小長干行前人類詩作張潮憶昔深閨裏煙塵不曽識嫁與長干人沙頭候風色五月南風興思君下江一作巴陵八月秋一作西風起看一作想君發揚子去時一作多悲如何見少別離多湘潭㡬人一作日又作月到妾夢常一作越風波昨夜狂風度吹折江頭樹淼淼暗無邊行人在何䖏好乗浮雲騘佳期蘭渚東鴛鴦緑蒲上翡翠錦屏中自憐十五餘顔色桃花紅􅃚作商人婦愁水復愁風江風行一作長江行張潮壻貧如珠玉壻富如埃塵貧時不忘舊富貴多寵新妾本富家女與君為偶匹恵好一何深中門不曽出妾有綉衣裳葳蕤金縷光念君貧與賤易此從逺方三千路役思發竟一作去悔不已日暮情更来空望去時水孟夏麥始秀江上多南風商賈歸欲盡君今尚巴東巴東有巫山窈窕神女顔常恐逰此方一作山果然不知還文苑英華巻二百十一
