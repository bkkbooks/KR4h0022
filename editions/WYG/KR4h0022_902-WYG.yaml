body:
  text: 文苑英華卷九百三宋李昉等編軄官十一王府官邠王府長史隂府君碑一首慶王府司馬徐堅碑一首滕王府諮議杜寛碑一首邠王府長史隂府君碑張說集無公諱某字某武威姑臧人也昔㳟王之裔别封于管有夷吾者能覇桓公則平周辭上卿之禮適楚踐大夫之軄以地命氏授于隂城新野之凉皆為著族貴則重􅊚二后榮則一門四侯道則山紀神仙行則里題忠義建名崇徳世有其人公髙祖湘東内史鏗梁州之子屬詞比事天下宗之曽祖江州刺史通道舘學士顥祖朝請大夫國子博士𢎞道考某官景眀貽範清白纂烈文史累善所徵及公而盛公承禮樂之峻胄稟清眀之異姿天生粹靈氣合真素下帷專思重席擅業至人藏用有道徳之鄉君子為儒無榮辱之境尚東郭以自逸與南容之不廢調補陳州司倉一作馬徵其志也以為非足利時不俟終秩遂優游初服述祖移年嘿志𤣥言洞心清律常手操經籍耳練宫商澹有怡神坦無嬰慮是可忘機造化豈徒屑意公卿而已哉故徳充以外形才全以内濟委懐從運與道無名尋拜命宜城王府記室叅軍退一隅而無悶進三府以交辟署宰長可曲資而往曰惠人無小吾所從之其至也去惡如救焚急賢如濟渇遇物風􅅯推心理裕平其志而異物不遷一其誠而萬情咸括清猷羙績克存餘詠飛狐之地戎馬生郊俾公為蔚州别駕則惠化所存勇且知方肇建天人懋官靈器入為慶王友轉太子中允又拜國子司業邠王府長史或舉徳以進或尚閑而退不失其正達識推髙某年月日􅃦疾東都終於永豐第春秋七十有五惟公率心經於義徳一作徳義檢口絶於臧否秉禮樂而視正直藴文藻而含清真可不謂才全而蹈道者歟位不兼濟惜也夫人范陽縣君張氏丞相燕公之妹𤣥思妙徳嬪風女師梁氏義輕於前志曹門克貽於後範府君之䘮紀纕將縞晝哭成疾恐流年之易除慟累月而云逝殁而不朽者非禮節絶倫之謂一作道乎春秋若干以某年月日合葬於龍門南陵原禮也公無子有二女咸以淑行著於通門成一作䘮葬克家感戚行路子婿吏部郎中呉興張珦度支員外郎隴西李愷永懐清水緬託貞石庶乎時遷陵谷猶徵少女之詞道在宗親不昧諸姑之徳大人為頌俾小子序焉冏哉隂侯孝友仁信符彩外發清真内鎮史門文宗國子儒𦙍克家踵武金聲玉振結髮筮仕利用勸心雉馴風化鹿賦文章凾杖禮樂雷門紀綱㣲言教胄直道匡王年惟大耋克茂精爽疾不彌留怡然長往世比過隙生猶絶嚮疑契均范張㑹阻天壤通家自昔永懐厥初昏姻之故言就我居富同鼎食窮共園蔬動心規戒言成著書奪我良友天其䘮余南望龍門東都九原萬籟酸骨千霜斷魂琴瑟都盡塤箎半存葬收子婿碑傳外孫人生到此天道何言慶王府司馬徐府君碑李華君諱堅字某唐宰相世系表作名倫字堅名與宗人同故以字稱東海郯人也象徳所自如山積髙佐人施澤如水鍾下三代以􅑙仁賢不絶至宋齊間位望益尊三公令僕常伯卿將追贈衮司􅑙嬪帝女南朝衣冠宗正國子博士東筦男諱文逺有盛名於國朝東筦生王屋令士安柝城以東人受其賜王屋生大理卿贈越州都督諱有功社稷之衞也髙宗棄萬國太后臨朝宗室元臣以猜受釁頑虐一作虎非阿指扇成大獄海内懍懍不保其生凶殘朋黨嚼牙頓翼起于上國延及諸夏不止於此將圖我國家三分烝人其一為血宗社垂靈而生大理俾幹刑典扞敝疑作蔽本朝元惡憚其義烈人鬼衞疑作御其愷悌惟身與族隨正而行争性命於豺狼之口解威怒於雷霆之下大者完州郡小者活門閭累為群兇所排阽一作活非於破㓕神佐貞獨終以真合昔咎繇事唐虞釋之定國當盛漢赫赫大理而丁此時功倍古人聲動百代是之謂也君即大理之元子直温秉廉深於徳行祖考之訓叢乎厥躬以䕃宿衞調臨郎疑主簿親累故也歴懐州叅軍邵王府户曹陜州司法清方知名朝廷以先父之勞超拜大理司直聞者皆垂泣而喜平端讞議果振家風皇舅太尉希瑊以先大理嘗㧞家寃表讓官於君以申蓼莪罔極之感拜㳟陵令除陳州别駕改陜州入為岐王府司馬轉慶王府階朝議大夫襲封東筦侯開元十六年四月二十九日終于洛陽南郊居春秋六十八不登期頥不至大官嗚呼惜哉天地之於物順也君子如之窮達之於人命也君子安之為疑作惟君徳性與是相凖執親之䘮哀毁逾禮迨啓手足不貽憂於墳墓孝也守官廉平未嘗違道干譽奉長臨下小大悉心一夫得罪則為之損容色有可緩者忻忻然出之仁也惠文太子之在岐邸膚敏好學上最器念四時鍾一作終非渥澤賔客多詞人君每引道書滿盈之誡以扶俊徳忠也仁孝與忠雖無位為貴禮所謂以道得人而已况承前人之烈光被聖代之冕服乎夫人賛皇縣君趙郡李氏北州望族左司郎中公掩一作淹之孫杭州刺史自抱之女左司博古杭州知人訓成懿淑光配有徳後君六嵗而終合祔于濟源之燕川南原龜從筮後兆因徳叶嗣子光祿少卿瑴前蜀郡兵曹叅軍殷句容尉毅出言舉足不墜孝慈瑴行備忠厚辭無枝葉朗而不華直而容衆有古人之情君子之度為大理正負荷前猷歴宰三縣牧守一郡人感懐之刋石繼起再蒞京邑不求名聲推心而理盛徳有後曷其崇髙神道聦眀豈曠人欲君從父弟惲御史中丞陳留太守河南採訪清㢘有威所向霽一作震肅大理殁而有中丞中丞殁而有光祿徐氏之興將在一作左裔乎爰族幽兆與天地極是文也華闕媿詞銘曰三命益㳟慶祚猶鍾矧我大理金人門宗扞蔽皇家枝梧群兇百族感慕大哉勲庸克生茂徳山鎮泉塞卷以道風舒為士則如何喆人終始藩國在昔偃王仁義逌興㳂源而下勲徳相承或西討濟河或北義延陵又有達者魯連服膺綿綿世祀奕奕髦士晉宋齊梁名臣繼起薦躡公府連嬪帝子東莞以􅑙羽儀清朝美矣哉如金如玉如翰如翹君子踐修徳音孔昭抑抑仁人宜於進退合符黄老不皦不昧推心無方我徳用大建世何居松門已藹永言孝思光祿有之式播芳烈為將來師故滕王府諮議杜公神道碑孫逖公諱義寛字某姓杜氏東都濮陽人也其先在周者為侯在漢者為三公在魏者以許昌居守在晉者以荆州作鎮則杜氏之世祿厥惟舊㢤若乃其澤雷夏其州河濟顓頊起焉昆吾理焉則濮陽風化所馮厚矣不有純嘏孰生大賢公則魏陳留郡守亮之曽孫北齊膠州刺史竟陵縣開國侯保唐系表作伽之孫隋本郡中正鴈門郡守伽世系表作保之子承邁種之遺訓體清醇之上姿童而典學冠而好古於是東渉汶泗北登鄒嶧講周公之徳觀孔氏之藝則易之變詩之風樂之和禮之節書之政春秋之理人一以貫之達其本矣繇是大業九年以孝㢘髙第授河東郡法曹已而隋氏弗綱世充竊命我太宗文武聖皇帝是以有陜東之師公轉餉如役贏糧從徑軍無後㸑士有餘勇鄭是以殞唐是以興帝將策勲公乃辭賞既不獲命請從叙遷因授虞州司倉叅軍貞觀二年改授普州安康令稍遷合州待疑中轉恒州别駕雍州髙陵令拜朝散大夫饒州長史遷蘇州司馬兼滕王府諮議凡宰二邑做疑作佐六郡大小必誠逺近如一其所在也使者昇聞其所去也邦人頌徳且有兼官之拜實固太宗之屏宜享三壽以諧百工天難忱斯不可黷已春秋七十有二永徽六年某月日終於蘇州某月日乃葬濮陽疊城之舊原禮也噫公之為人應變當理有慶卿之善晝疑作畫徴考祥有董生之博覧威敵附有穰苴之大略摧剛為柔有季布之髙義雖運逢版蕩而才偶經綸而或出當騁竒干賞蹈利託風雲之㑹邀日月之光則萬户之封不足致也三旌之位曷云貴也而能卷其舌塞其兊實居疑作若虛眀若昧不貪驟雨之福以逺浮焱之害斯大雅之保身亦君子之向晦也泊天衢開泰皇運清眀從官以養人而不為禄謹身以報主而不近名回翔郡邑三十餘載出處之際優㳺自得其古之恬勢利者歟初公之裔祖始宅帝丘時更大亂室無遺堵公因謂所親曰吾之世業為郡中正遺愛不冺隂徳在人施于子孫闕者于公髙門之事可不務乎用是改卜鮮原大起層構垣墉既曼棟宇斯飛輪焉奐焉爰笑爰語及公之後斯事果徵一世其昌既開方國再世而大遂為相門論者以為知言矣爾其郷黨之行閨門之徳孝乃天繼仁為己任蒸嘗盡敬宴喜無荒祿利必賙於外姻譙讓不行於私屬故子弟趨敎州里嚮風雖有嚴刑峻法不如公之潜道也詩所謂行歸於周萬人所望有令名矣夫令徳矣夫有四子長曰儉早世次無忝終於朝散大夫梓州塩亭令次曰慎行終於益州長史建平縣開國男贈蜀州刺史次曰惟志二在唐書承志終於吏部員外郎贈吏部咸以大名克紹前烈豐碑未樹梁木先摧孝孫户部尚書暹國之故相也儉徳為輔正身立朝以伯夷之直清兼張仲之孝友是用秪率理命奉揚祖風作頌稱代刋石表墓留侯大父已傳班固之書陳氏先生何愧蔡邕之述詞曰昔公之先於周為祖及公之𦙍於唐為輔一徳貽孫千齡續祖身隔徂謝名存憲矩在濮之陽居河之滸畇畇原濕濟濟榛楛别業年深先塋地古豐碑頌徳式是東土文苑英華卷九百三
