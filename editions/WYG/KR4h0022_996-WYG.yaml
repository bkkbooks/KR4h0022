body:
  text: 文苑英華巻九百九十七宋李昉等編神祠三報賽賽江文一首賽西岳文一首賽木𤓰神文一首賽舜廟文一首賽越王神文一首賽城隍神文五首賽北源神文一首賽曽山蘇山神文一首賽白石神文一首賽龍幡山神文一首賽陽朔縣名山文一首賽海陽神文一首賽堯山廟文一首賽古㰖神文一首賽蘭麻神文一首賽江文張説年月日朔具官某敢昭告于大江之神王有百谷禮尊四瀆善利維神朝海作賔發源岷山駕福来臻率此荆土明靈是主已成嘉榖垂敗霖雨聽我䖍祈福我農畆既暵既穫既埸既庾忻忻衆心願答神祜㓗牲明酌寅奠江浦為楊右相賽集作祭西岳文獨孤及維年月日司空兼右相楊國忠禮集作吏部尚書同中書門下平章事韋見素等謹以少牢之奠敬祭於集作于西岳金天之神頃獻歲逹於三月畜極不雨屯膏未光元元其咨滌滌是懼國忠等是用䖍奉睿謨集作慮聿遵祀典謹遣鳴臯山人韋朝真敢徼福於大神之靈精意纔申而休祐肸蠁宸衷遥逹而瑞澤霶集作滂霈非神之幽贊叶於國非集無此字神之景命符於人則疇能降祥薦祉如此其速故簠簋犧牲集作象敬脩享禮雖冥應無方非馨香所答而神感如在庶明靈惟歆尚饗賽木𤓰神文杜牧維㑹昌六年歲次丙寅某月日某官某敬告於集作于木𤓰山之神惟神聰明格天能降雲雨郡有災旱必能救之前後刺史祈無不應去歲七月苗將萎死禱神之際甘雨隨至稿然凶歲化為豐年仰神之靈感神之徳願新祠宇以崇祭祀今易卑隘變為華敞正位南靣廟貎嚴整風雷雲雨師伯必備侍衛旗㦸羅列森然惟神繫雲在襟貯雨在缶視人如子渇即與之不容㐫荒集作邪不降疾疫千萬年間使池之人敬仰不怠伏惟尚饗賽舜廟文李商隠年月日昭賽虞舜之祠伏以帝狩南方神留下土翠華莫返積怨望於他年大麓不迷烜集作炟威靈於終古比憂嘉種少冒􅄽陽抗簡陳詞㓗樽引咎果䝉憑離掣電跨巽揚風布沾渥於九臯起焦枯於一瞬敢布瑶席輙事蘭羞帝其罷奏南琴停吹西琯使東皇太一兼預於靈逰俾山鬼江婓無藏於沴氣庶將善政以奉明輝賽越王神文前人年月日賽於集作于越王之神惟神耀焯殊姿抑揚竒表秦魚既爛則聊帝南荒漢鹿有歸則􅁛臣北闕覧英雄之載籍信王覇之朋逰言念遺祠猶存鹿集作屬邑尚興甘雨以救公田敢陳沼沚之毛用報京坻之積神其永司此土長庇吾人福祐柔良驅除疾癘今来往古常教威著越城萬嵗千秋勿使魂歸真定神乎不昧来鍳斯言賽永福縣城隍神文前人年月日賽於集作于永福縣城隍之神夫考室立家先在户竈聚人開邑首起城池固有明靈降而鍳治惟神克揚嘉霔廣育黎民聊薦粢粱集作聊為茨梁少申殽醖神其節宣四氣扶祐三時勿使畢星但稱於好雨無令田祖獨擅於有神永歆蘋藻之誠長挟金湯之勢為中丞滎陽公桂州賽城隍神文前人維大中元年歲次丁卯六月甲午朔十四日丁未都防禦觀察處置等使桂州刺史兼御史中丞鄭某謹遣登仕郎守功曹參軍陸秩以庶羞之奠祭於集作于城隍之神夫大邑聚人通都設屏將英集作比字雄走集必假高深不惟倚杖風雲兼用翕張神鬼某初䝉朝奬来佩藩符既禦冦於西原亦觀風於南國始惟畫鷁將下伏熊属楚雨蔽空湘雲塞望晦我中軍之鼓濕予下瀬之師遂以誠祈果䝉神應速如激矢勢等却河及兹薦報之時敢怠馨香之禮神其干霄作峻習坎為防合􅇏櫓以保民道川途而流惡使言言堅壘集作壁侔地道以無疆活活深溝如井徳之不改勿違丘禱以作神羞尚饗賽靈川縣城隍神文前人年月日賽於集作于靈川縣城隍之神高壘深溝用資固䕶興雲渫集作泄雨諒俟威靈惟聖能感至誠將成大稔逐清泠之耕父不使揚光廻沮澤之蟠龍皆令灑潤式陳㣲報願鍳惟馨賽荔浦縣城隍神文前人賽於集作于荔浦縣城隍之神嗟我疲民每虞囏食寒耕熟耨始望於秋成鑠石流金幾傷於歲事逺資靈顧式布層隂無煩管輅之占不待欒巴之噀竊陳薄奠集作具用答豐年神其據有高深主張生植同功田祖比議集作義雨師無假怒於潜龍勿縱威於虐魃守兹縣邑富我京坻賽城隍神文前人年月日賽於集作于城隍之神惟神踞雉堞以為雄導溝池而作潤果成飄注以救惔焚敢恡斯牲用報嘉種神其永通靈感長茂𤣥功道楚子之餘波霈普國之膏雨苟能不昧報亦隨之賽北源神文前人年月日賽於集作于北源之神惟神雖臨南服實號北源湘浦降神近驚於騷客滮池浸稻逺叶於詩人果能橐籥風頭索綯雨脚不資畎澮將致倉箱聊申信於澗毛庶通靈於水府神其揖揚蘭珮麾掉桂旗拍川后之肩􅄃波神之􅃑共来於此饗報留思賽曽山蘇山神文前人年月日賽於集作于曽山蘇山之神惟神守在出雲職惟通氣果從望歲載潤嘉生將申昭報之儀敢闕馨香之獻神其遐瞻惟岳廣納逰塵勉揚少女之風勤詠曽孫之稼無令渥澤盡歸濕集作涇水之湫泉勿使威靈下集作不是及歴山之仙室我辭有激神儻聽焉賽白石神文前人年月日賽於集作于白石之神惟神載烜集作炟明靈克標懿號軒珠耀彩儻非瑶水之源荆漢流輝即是玉山之路一昨俯憂旱歲俾禱遺祠果能愛我大田貺余膏澤不俟于公之折集作雪獄無煩洛令之曝身敢命子男爰脩蘋藻神其仰濟集作流天澤俯祐歲功無萌可轉之心以負惟馨之禮賽龍幡山神文前人年月日賽於集作于龍幡山之神惟神降治山川濟集作流思縣道龍幡鳯盖克懋于靈司蟻穴鵲巢式揚於利澤至誠有逹昭報無虧神威集作其叱咤飛亷鞭驅屏翳向集作尚是令吾土屢有豐年不無行潦之羞以請油雲之惠賽陽朔縣名山文前人年月日賽於集作于陽朔縣名山之神惟神受命上𤣥奠兹南服雲臺日觀逺譲於高標蓬島崑邱遐通於爽氣峻若藏刀之嶺榮如倚劒之門是冝銓管隂司拘囚異物為神仙之下府開龍虎之神庭屬歲之集無之字不寧旱既太甚馳誠疊嶂託意通波果聞雷出地中電濟集作流巖下既兹霑足敢薦香集作聲芬願終如響之靈無怠集作失孔明之鍳尚饗賽海陽神文前人年月日賽於集作于海陽之神頃傷多稼將困驕陽未逄玉女之披衣空見土龍之矯首式祈嘉霔果降明輝神其享彼蘭羞挹兹桂酒輔成於多黍多稌助施集作調於好雨好風庶厲業官以酬𤣥澤賽堯山廟文前人年月日賽於集作于堯山之廟伏以帝廵遐徼天作高山既比敬於軒臺亦分功於農井是留遺廟以慰斯民昨者時雨忽􅄽秋陽稍亢永言嘉霔實自𤣥恩大驅蟠澤之龍盡發潜泉之介集作蜧倉箱興詠將慶於農夫灌浸呈功不愆於竪集作壯子敢兹昭報冀降明靈賽古㰖神文前人年月日賽於集作于古㰖之神惟神爰因碩果遂啟靈祠𤓰美邵平且傳舊志李標朱仲亦茂前經昨者瘴暑為災油雲不起式存心禱慮作神羞神能感氣蜧泉傳祥鸛垤使宋生抒賦始恱於雄風高氏讀書忽驚於暴雨化太甚旱為大有年將見助於歡康敢忘懐於昭賽賽蘭麻神文前人年月日賽於集作于蘭麻之神頃者杲日揚威融風扇暴禾乃盡偃人何以堪神能倐忽應時逡廵布潤雲旗直集不資秦地之决渠雨陣斜飛更甚成都之救火永懐靈祐敢薦嘉肴神其與蕙同芳為蓬扶直茍集作勿虗嘉號以累豐年文苑英華巻九百九十七
