body:
  text: 文苑英華巻三百四十六宋李昉等編愁怨怨四首棄婦一首苦婦一首緑珠篇一首飛鷰篇一首春女歌一首静女歌一首情人玉清歌一首盧姬篇一首䔄草春一首鄭櫻桃歌一首絶纓歌一首李夫人一首鄭姬歌一首長恨歌一首姬人怨江總天寒海水慣相知空床明月不相冝庭中芳桂憔悴葉井上踈桐零落枝寒燈作花羞夜短霜鴈多情恒結伴非為隴水望秦川真置前篇作至思君腸自斷姬人怨服散篇薄命夫婿好神仙避類聚作逆愁髙飛向紫煙金丹欲成猶百錬玉酒新熟㡬千年妾家邯鄲念類聚作好輕薄時逢類聚作時忿仙童一丸藥自悲行處緑苔生何悟啼前篇作不悟悌多紅粉落莫輕年少類聚作小婦狎春風羅韈也知類聚作得歩河宫雲車欲駕應相前篇作冝待羽衣未去幸湏前篇作華胥同不學蕭史還樓上㑹逐前篇作與姮娥戱月中此巻英華二百五十六巻與此巻皆重出前已削去其江總姬人怨二詩本集及藝文類聚共是一篇今題目既有増减當以英華為正分為二首閨怨篇前人寂寂青樓大道邉紛紛白雪綺忩前池上鴛鴦不獨自帳中蘇合還空然屏風有意障明月燈火無情照獨眠遼西水凍春應少薊北鴻來路㡬千願君闗山及早度念妾桃李片時妍後庭怨王諲君不見紅閨少女端正時夭夭桃李仙容姿幸得君王憐巧笑披香殿裏薦蛾眉蛾眉雙雙人共進常恐妾身從此擯甄妃一作后為妬出層宫班女因猜下長信長信宫門閉不開昭陽歌吹風送來夣中魂魄猶言是覺後精神尚未廻念君嬌愛無終始使妾長啼後庭一作宫裏獨立毎㸔斜日盡一坐直至孤燈死秋日聞蟲翡翠簾春晴照靣鴛鴦水紅顏舊來花不勝白髪如今雪相似傳聞紈扇思一作恩未歇預想蛾眉上初月如君貴偽不貴真還同棄妾逐新人借問南山松葉意何如此砌槿花新棄婦詞前人古人雖棄婦棄婦有歸處今日妾辭君辭君欲何去本家零落盡慟哭來時路憶昔未嫁君聞君甚周旋及與同一作君結髪值君適幽燕孤魂託飛鳥两眼如流泉流泉咽不燥萬里闗山道及至見君歸君歸妾已老物情棄衰賤新寵方妍好拭淚出故房傷心劇秋草妾已顦顇捐一作貌羞將舊一作故物還餘生欲有寄誰肯相留連空床對虛牖不覺塵埃厚寒水落芙蓉秋風堕一作脆楊栁記得初嫁君小姑始扶床今日君棄妾小姑如妾長廻頭語小姑莫嫁似兄夫右棄婦辭李白集中亦有之比顧况甚詳未知竟誰作今註於後古來有棄婦棄婦有歸處今日妾辭君辭君遣何去本家零落盡慟哭來時路憶昔未嫁君聞君却周旋綺羅錦繡叚有贈黄金千十五許嫁君二十移所天自從結髪日未㡬離君緬山川家家盡歡喜孤妾長自憐幽閑多怨思盛色無十年相思若循環枕席生涙泉流泉咽不噪獨夣闗上道及此見君歸君歸妾已老物華􅁖衰賤新寵方妍好掩淚出故房傷心劇秋草自妾為君妻君東妾在西羅幃到曉恨玉貌一生啼自從離别乆不覺塵埃厚常嫌瑇瑁孤猶羡鴛鴦偶嵗華逐霜霰賤妾何能久寒沼落芙蓉秋風散楊栁以此顦顇顔空持舊物還餘生欲何寄誰肯相攀牽君恩既斷絶相見何年月悔傾連理杯虛作同心結女蘿附青松貴欲相依投浮萍失緑水教作若為流不歎君棄妾自嘆妾縁薄憶昔初嫁君小姑纔倚床今日妾辭君小姑如妾長廻頭語小姑莫嫁如兄夫苦婦詞劉言史地逺易驕崇用刑匪精研哀哉苦婦身夫死百殃纒草草催出門衣堕髪披肩獨隨軍吏行當夕余一作途欲遷來時已猒生一作坐到此自不全臨江卧黄砂二子死在邉氣噦不發聲背頭血涓涓有時强為言秪是尤青天藁蓐無一枝冷氣两懸懸窮荒夷教卑骨肉病棄捐况非本族姻肌露誰為憐事痛感行賔住得貪程船必當負嚴法豈有胎孕篇遊畋復釋麛羔兎尚免鸇何處擯逐深一罪三見顛校尉勲望崇幕府才且賢蘭裙間珠履食玉處花筵但勿輕所暏莫慮無人焉緑珠篇喬知之石家金谷重新聲明珠十一作萬斛買娉婷此一作昔日可憐君自許此時可喜得人情君家閨閤未曽難常將歌舞借人㸔意氣雄豪非是許一作分理嬌矜一作奢勢力横相干辭君去去終未忍徒勞掩袂傷鉛粉百年離别在髙樓一代紅顏為君盡飛鷰篇王翰孝成皇帝為嬌奢行幸平陽公主家可憐女兒三五許一作年三五丰茸惜一作借是一園花歌舞來時由不貴一旦逄君感君意君心見賞不見忘姊妹雙飛入紫房采女不得見專榮固寵昭陽殿紅粧寳鏡珊瑚䑓青鎻銀簧雲母扇日夕風傳歌舞聲只擾長信憂人情長憂人氣欲絶君王歌吹終不歇朝弄瓊簫下綵雲夜踏金梯上明月月下薄蝕陽精昬嬌妬傾人惑至尊已在白虹横紫極復聞飛鷰啄王孫王孫漢書作皇孫不死鷰啄折女弟一朝如火絶明明天子咸戒之赫赫宗周褒姒滅古來賢聖歎狐裘一國荒滛萬國羞安得尚方斷馬劔斬取木門公子頭春女歌郭茂倩樂府作春女行前人紫䑓穹跨連緑波紅軒鉿匝垂纎羅中有一人一作名金作靣隔幌玲瓏遥可見忽聞黄鳥鳴且悲鏡邉含笑着春衣羅䄂嬋娟似無力行拾落花比容色落花一度無再春人生作樂湏及辰君不見楚王䑓上紅顏子今日皆成狐兎塵静女歌張南容静女樂於静動合古人則妙年工詩書弱嵗勤組織端居愁若癡一作愁廢禮又作似愁癡誰復理容色十五坐幽閨四隣不相識天夭隣家子百花一作家装首餙日日淇上遊笑人不踰閾河水自濁濟自清仙䑓蛾眉秦鏡明為照齊王門下醜何如漢帝掌中輕情人玉清歌張南容郭茂倩樂府作畢耀洛陽城中有一人名玉清可憐玉清如其名善踏斜柯能獨立嬋娟花艶無人及珠為裙玉為纓臨春風吹玉笙悠悠滿天星黄樂府作萬金閣上曉粧成雲和曲中為曼一作慢聲玉梯不得踏摇􅃑两盈盈城頭之日復何情盧姬篇崔顥盧姬少年魏王家緑􅁂紅脣桃李花魏王綺樓十二重水精簾箔繡芙蓉白玉欄杆金作柱樓上朝朝學歌舞前堂後堂羅䄂人南牎北牖花發青翠幌珠簾鬬絲管一奏一彈雲欲斷君王日晩下朝歸鳴環珮玉生光輝人生今日得嬌貴誰道盧姬身細㣲䔄草春并序顧况隴西李迅者别宅監奴為刺史配嫁監奴投井而死因作䔄草春麗情集作隴西李迅者納别宅監奴出不喜迅欲訪故人為刺史强而配焉既歸而不合監奴投井而死因作䔄草春歌以悲之䔄草春杳容與江南艶歌京一作凉西舞執心輕子都信節冠秋胡議以腰支嫁時論自有夫蟬􅁂蛾眉明一作洞井底燕裙一作下趙􅃑一作趙帯又作越帯縈轆轤李生聞之淚如綆不忍廻頭㸔此井月中桂樹落一枝池上鵁鶄唳孤影露桃穠李自一作日成蹊溪一作流水終天不向西翠帳緑忩寒寂寂錦茵羅薦夜凄凄䔄草春丹井逺别後相思意深淺鄭櫻桃歌李頎見郭茂倩樂府石季龍僣天禄擅雄豪羙人姓鄭名櫻桃羙顏香且澤娥娥侍寝專宫掖後庭巻衣三萬人翠眉清鏡不得親官軍女騎一千疋繁花照耀漳河春織成花映紅綸巾載記季龍以女騎一千為鹵簿皆著紫綸巾五文織成鞾紅旗掣曳鹵簿新鳴鼙走馬接飛鳥銅釱琴瑟隨去塵鳯陽重門如意舘百尺金梯倚銀漢自言冨貴不可量女為公主男為王赤花雙簟珊瑚床盤龍斗帳琥珀光滛昏偽位神所惡㓕石者陵終不誤鄴城蒼蒼白露微世事飜覆黄雲飛絶纓歌前人楚王宴客章華䑓章華羙人善歌舞玉顏艶艶空相向滿堂莫逆不得語紅燭滅芳酒闌羅衣半醉春夜寒絶纓觧帯一為歡君王捨一作赦過不之罪暗中珠翠鳴珊珊始愛賢不愛色青娥買死誰能識果却三軍全社稷李夫人李賀紫皇宫殿重重開夫人飛入瓊瑶䑓緑香繡帳何時歇青雲無光宫水咽翩聮桂花逐一作墜一作堕秋月孤鸞曉集作驚啼啇絃集作綵發空集作紅壁䦨珊懸珮璫歌䑓小妓遥相望玉蟾滴水雞人唱露華蘭葉參差光許公子鄭姬歌鄭園中請賀作前人許史世家外親貴宫錦千端買沉醉銅駞酒熟烘明膠古堤大栁煙中翠桂開客集作精聞容花名鄭䄂入洛聞香鼎門口先將芍藥獻粧䑓復醉集作後觧黄金大如斗莫愁簾中許一有作合歡清絃十五為君彈彈聲咽春弄君骨骨興牽人上馬鞍两馬八蹄踏蘭苑情如合竹誰能見夜光玉枕棲鳯凰祫羅當門刺純綫長翻一作糊蜀紙巻明君轉角含商破碧雲自從小靨來東道曲裏長眉少見人相如塜上生秋栢三秦誰是言情客蛾眉一作鬟又作􅁂醉眼拜諸宗為謁皇孫請曹植長恨歌白居易漢王重色思傾國御宇多年求不得楊家有女初長成養在深閨人未識天生麗質難自棄一朝選在君王側廻頭一笑百媚生六宫粉黛無顏色春寒賜浴華清池温泉水滑洗凝脂侍兒扶起嬌無力始是新承恩澤時雲鬢花冠集作顏金歩摇芙蓉帳裏暖一作度春宵春宵苦短日髙起從此君王不早朝承歡侍寢一作宴無容一作閑暇春從春遊夜專夜後一作漢宫佳麗三千人三千寵愛在一身金屋粧成嬌侍夜玉樓宴罷醉和春姊妹弟兄皆列土可憐光彩生門戸遂令天下父母心不重生男重生女驪宫髙處入青雲仙樂風飄處處聞緩歌慢舞凝絲竹盡日君王聽集作㸔不足漁陽鞞皷動地來驚破霓裳羽衣曲九重城闕煙塵生千乘萬騎西南行翠華摇摇行復止西出都門百餘里六軍不發知一作無奈何宛轉蛾眉馬前死花鈿委地無人収翠翹金雀玉搔頭君王掩面救不得廽㸔血淚相和流黄埃散漫風蕭索雲棧縈廻登劔閣蛾眉山上川文粹作下少行人旌旗無光日色薄蜀江水碧蜀山青聖主朝朝暮暮情行宫見月傷心色夜雨聞鈴腸斷聲天旋地轉廻龍馭到此躊躇不能去馬嵬坡下塵一作泥土中不見玉顏空死處君臣相顧盡沾衣東望都門信馬歸歸來池苑皆依舊太液芙蓉未央栁芙蓉如靣栁如眉對此如何不淚垂春風桃李花開日一作夜秋雨梧桐葉落時西宫南内一作苑多秋草落葉集作夜滿階紅不掃棃園弟子白髮新椒房阿監青娥老夕殿螢飛思悄然秋一作孤燈挑盡未成眠遲遲鍾漏初長夜耿耿星河欲曙天鴛鴦瓦冷霜華重舊枕故衾集翡翠作衾寒誰與共悠悠生死别經年魂魄不曽來入夣臨卭方一作道士鴻都客能以精神致魂魄為感君王展轉恩一作思遂教方士慇懃覔排空集作雲馭氣奔如電昇天入地求之遍上窮碧落下黄泉两處茫茫皆不見忽聞海上有仙山山在虛無縹渺間樓殿一作閣玲瓏五雲起其間綽約多仙子中有一人名玉妃川文粹作字玉真一作字太真雪膚花貌參差是金闕两集作西廂叩玉扃轉教小玉報雙成聞道漢家天子使九華帳下夣中一作䰟驚攬衣椎枕起徘徊珠箔銀鈎一屏作迤邐開雲髻半偏新睡覺花冠不整下堂來風吹仙袂飄飄一作颻舉猶似霓裳羽衣舞玉容寂寞淚闌干梨花一枝春帯雨含情凝睇謝君王一别音容两渺茫昭陽殿裏恩愛絶蓬萊宫中日月長廻頭下問集作望人寰處不見長安見塵霧空持一作唯將舊物表深情鈿合金釵寄將去釵留一股合一扇釵擘黄金合分鈿但教一作令心似金鈿堅天上人間會相見臨别慇懃重寄詞詞中有誓两心知七月七日長生殿夜半一作半夜無人私語時在天願為一作作比翼鳥在地願為連理枝天長地久有時盡此恨綿綿無盡集作絶期文苑英華巻三百四十六
