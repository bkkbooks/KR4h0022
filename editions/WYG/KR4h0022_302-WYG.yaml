body:
  text: 文苑英華巻三百二宋李昉等編悲悼二哭人三十八首沈約一首陶𢎞景一首何胥二首庾信二首薛徳音一首張正見一首隂鏗一首江揔二首劉斌一首孔紹安一首禇亮二首王勃一首盧照隣三首駱賔王一首沈佺期一首崔融一首鄭愔一首杜審言一首趙彦昭一首李乂一首喬知之一首宋之問二首蘇頲二首張九齡一首王維六首悼亡沈約去秋三五月今秋還照梁一作房今春蘭蕙草来春或作明春復吐芳悲哉人道異一謝永銷亡簾屏既毁撤一作屏筵空有設帷席更施張遊塵掩虚座孤帳覆空牀萬事無不盡徒令存者傷此詩三百一巻重出今已削去注異同為一作和約法師臨友人陶𢎞景我有數行淚不落十餘年今日為君盡併灑秋風前傷章公大將軍何胥百萬横行罷三千白日新短簫應出塞長笛反驚隣槐庭慘芳樹舞閣思陽春所悲金谷妓坐望玉關人哭陳昭前人思人適舊舘寂寞非一源無復酣歌樂空餘燕雀喧落暉隠窮巷秋風生故園撫孤空對此零淚欲奚言傷王司徒褒庾信昔聞王子晉輕舉逐神仙謂言君積善還得嗣前賢四海皆流寓非為獨播遷豈意中台裂君當風燭前王君鍾鼎族江東三百年寶刀仍世載琱戈本舊傳緑紱紆槐綬黄金侍餙蟬地建忠臣國家開孝子泉自能枯木潤足得流水圓以君承祖武諸侯無間然青衿已對日童子即論天頴隂珠玉麗河陽脂粉妍名高六國共價重十城連辯足觀秋水文堪題都年切説文曰走頓也馬鞭廻鸞抱書字别鶴繞琴絃擁旄裁甸服垂帷非被邉静亭空撃馬閑烽直起煙不發披書按無妨坐釣舡茂陵忽多病淮陽實未痊侍醫逾黙黙神氣遂綿綿永别張平子長理王仲宣栢谷移松樹陽陵買墓田陜路秋風起寒堂已䬃焉邱陽一摇落山火即時燃昔為人所羡今為人所憐世途旦復旦人情𤣥又𤣥故人傷此别留恨滿秦川定名於此定全徳以斯全唯有山陽笛悽余思舊篇和王少保遥傷周處士前人㝠漠爾遊岱悽凉余向秦雖言異生死同是不歸人昔余仕冠盖值子避風塵望氣求真隠伺關待逸民忽聞泉石友芝桂不防身悵然張仲蔚悲哉鄭子真三山猶有鶴五桞更應春遂令從渭水投弔往江濵悼亡薛徳音鳳樓簫曲斷桂帳瑟絃空畫梁纔照日銀燭已隨風苔生履跡處花没鏡塵中唯餘長簞月永夜向朦朧傷韋侍讀張正見懐經傳北海藴義盛西河高峰落廻照逝水沒驚波桞下悲風急山陽秋氣多宿草摧書帶寒松脆女蘿無復華隂市空餘蒿里歌和悼亡樊晉陽傷妾類聚陽作陵隂鏗畫梁朝日盡芳樹落花辭忽以千金笑長作九泉悲鏡前塵劇粉機上網多絲户餘雙入燕牀有一空帷名香不可得詎見反魂時在陳旦觧酲共哭顧舍人江總見類聚獨酌一罇酒高詠七哀詩何言蒿里别非復竹林期階荒鄭公草户閴董生帷人隨暮槿落客共晩鶯悲年鬢兩如此傷心詎㡬時和張記室源傷往集作傷佳人前人少類聚作小婦當壚夜夫壻凱師集作歸年正歌千里曲翻入九重泉機中未斷素瑟上本畱絃空帳臨忩掩孤燈向壁燃還悲寒壟曙集作樹松短未生煙和許給事傷牛尚書宏劉斌見初學記名臣不世出百工之所求况乃非常器遭逄興運秋符彩昭千里銓衡綜九流經綸資博物樽爼寄皇猷韶濩傾復理典禮紊還脩雖貞棟梁任兼好藝文逰佇聞和鼎實行當奉介邱高衢翻稅駕閲水遽遷舟傳呼更何日曳履聞無由歸魂藐修路征棹艤䢴溝林薄長風慘江上寒雲愁夜臺終不曙遺芳徒自􅇔傷顧學士孔紹安迢遰䨇崤道超忽三川湄此中俱失路思君不可思遊人行變橘逝者遽焚芝憶昔江湖上同詠子衿詩何言陵谷徙翻驚隣笛悲陳根非席卉繐帳異書帷與善成空説殱良信在兹今日嚴夫子哀命不哀時傷始平李少府正已禇亮勞息本相循悲歡理自均誰能免𤣥夜惜爾正青春邁徳誰家寳生才諒國珍高文綴翡翠茂學掩麒麟述作紛無已言談妙入神斷腸雖累月分手未盈旬輔嗣俄長往顔生即短辰聲華滿昭代形影委窮塵禪草廻中使生芻引弔賔同遊秘府日方駕直城闉並拜黄圖右分曹清渭濵風期嵇吕好存没范張親虚座懐王述遺篇慟景純精靈與豪翰卜祀夀何人在隴頭哭潘學士前人隴底嗟長别流襟一慟君何言幽咽所忽作死生分轉蓬飛不息悲松斷更聞誰能駐征馬回首望孤墳傷裴録事喪子闕焚芝集作芝焚王勃蘭堦霜候早松露穸臺深魄散珠胎没芳銷玉樹沉露文晞宿草烟照慘平林焚芝空歎息流恨滿籝金哭金部韋郎中盧照隣金曹初受拜玉地始含香翻同五日尹遽見集作是一星亡賀客猶扶路哀人遂上堂歌筵長寂寂哭位日蒼蒼嵗時賔徑㫁朝暮雀羅張書留魏主閣魂掩漢家牀徒令永平地千載罷撞郎哭明堂裴主薄前人締歡三十載通家數百年播揚稱代穆秦晉忝姻連風雲洛陽道花月茂陵田相悲復相樂交騎共交筵始謂調金鼎如何掩玉泉黄公酒壚處青眼竹林前故琴無復雪新樹但生煙遽痛蘭襟斷徒令寳劍懸客散同秋葉人亡似夜川送君一長慟松臺路幾千同崔錄事哭鄭員外前人文學秋天逺郎官星位尊伊人表時彦飛譽滿司存楚席光文雅瑤山謂瑤山玉彩侍討論鳳詞陵漢閣龜辨罩周園已暗東岳駕将逝北溟鯤如何萬化盡空嘆九飛魂白馬西京驛青松北海門夜臺無晩集作曉箭朝奠有虚樽一代儒風没千年隴霧昏梁山送夫子湘水吊王孫僕本多悲淚沾裳不待猨聞君絶絃曲吞恨更無言傷祝阿王明府駱賔王洛川貞氣上重泉惠政融􅍭章光後烈繼武嗣前雄與善良難騐生涯忽易窮翔鳬猶化履狎雉尚馴童錢滿荒堦緑塵生集作浮虛帳紅夏餘将宿草秋近未驚蓬煙晦泉門閉集作夕日盡夜臺空誰堪孤隴外獨聼白楊風哭蘇眉州崔司業二公并序沈佺期侍郎裴公集作同時郎裴懐古者作牧潭府神龍三集作二年秋八月雲卿集作佺期承㤙北歸路接寒温集作途中覯止問集作訪及親故適集作遽知眉州蘇使君味道國子崔司業融集作有馳旋間三字相次而逝蘇往任鳳閣侍郎雲卿集作佺期忝通事舍人崔重為鳳閣舍人雲卿遷給事中集作佺期又遷給事並承集作衘疇昔之眷俱荷提奨之㤙前年負譴南荒集作流二公先移官守迨此㐫問情復集作理何堪所恨集作嘆遷竄有期集作此四字行邁在逺哀不展舊禮不申卑流慟斯文冀通幽路渙汗天中發伶俜海外旋長沙遇太守問舊幾人全國寶亡雙傑天才喪兩賢大名齊弱嵗高徳並中年風鑑王夷甫文章謝惠連集作禮樂羊叔子文章王仲宣相看尚𤣥鬢集作髮相次入黄泉流放蠻陬濶鄉闗地里偏親朋雲霧擁生死嵗時傳崔昔揮宸翰蘇嘗濟巨川絳衣陪下列黄閣謬差肩及此俱冥昩云誰叙播遷隼旗集作旟懐故集作舊轍鱣舘想虚筵家愛方休杵皇慈更撤懸銘旌西蜀路騎吹北邙田隴樹應秋矣江㠶固集作故杳然罷琴明月夜留劍白雲天涕泗湘潭水悽集作凄凉衡嶠烟古来脩短分神理竟難全哭蒋詹氏事儼崔融見集本江上有長􅄐從容盛羽儀一鳴百獸舞一舉羣鳥隨應我聖明代巢君阿閣垂鈎陳侍帷扆環衞奉旌麾雅量滄海納宏才廊廟施飬親光孝道事主竭忠規貞節既已固殊榮良不訾朝逰雲漢省夕宴芙蓉池汲黯言當直陳平智本竒功成喜身退時往惜年馳鎮國山基毁中天柱石移将軍空有頌刺史獨留碑蕪謾藏書壁荒凉懸劍枝昔余参下位數載忝牽覊置榻㤙逾重迎門禮自卑竹林常接興黍􅂖每逄吹逸翰金相發清談玉柄揮不輕文舉少深歎子雲疲遺愛猶如在殘編尚可窺即今流水曲何處俗人知哭郎著作鄭愔詩禮康成學文章賈誼才已年人得夢庚日鳥為災書草藏天閣琴聲入夜臺荒階羅駮蘚虚座網浮埃白馬賔徒散青烏隴隧開空憐門下客懐舊㡬遲廻悼亡集作代張侍御傷美人杜審言二八泉扉掩帷屏寵愛空淚痕消夜燭愁思集作緒亂春風巧笑人疑在新粧曲未終尚憐脂粉氣留集作猶著舞衣中哭僕射鄂公楊再思趙彦昭兩揆光天秩三朝奉帝熙何言集大鳥忽此喪元龜坐歎公槐落行聞宰樹萎壑舟今已去寧有濟川時同前李乂端揆凝邦績台階闡國猷方崇大厦棟忽逝巨川舟白日銘安在清風頌獨􅅏死生㤙命畢零落掩山邱哭故人喬知之生死久離居凄凉歴舊廬歎兹三徑斷不踐十年餘古木巢禽合荒庭愛客疎匣􅅏彈罷劔牀積讀殘書玉没終無像蘭言強問虚平生不得意泉路復何如傷王七秘書監寄呈揚州陸長史通簡府寮以廣好事集作廣陵好事宋之問王氏貴先宗衡門棲道風得心集作傳心晤有物乗化遊無窮學奥九流異機𤣥三語同書乃墨塲絶文稱詞伯雄白屋藩魏主蒼生望謝公一祗賢良召遂謁承明宫補衮望奚塞尊儒位未充罷官七門裏歸老一邱中嘗忝長者轍㣲言私未通我行㑹稽郡路坐廣陵東物在人已矣都疑淮海空使至嵩山尋杜四不遇慨然復傷田洗馬韓觀主因以題壁贈杜侯前人洛橋瞻太室期子在雲烟歸來不見靣孤賞弄寒泉與君濶松石于兹二十年田公謝昭世韓子秘幽埏憶昔同携手山棲接二賢笙歌入𤣥地詩酒坐寥天舊友悉零落罷琴私自憐逝者非藥誤飡霞意可全為余理還䇿相與事靈仙蜀城哭台州樂安俞少府蘇頲逺遊躋劍閣長想属天台萬里隔三載此邦余重来音容曠不覩夢寐殊悠哉邉郡饒籍籍晩庭正回回喜傳上都封因促傍吏開何悟海鹽客已而梁木摧變衣寝門外揮涕少城隈却計分明得猶持委曲猜師儒悉訓奨仲季時童孩服義陳書箧邀歡泛酒杯蹔令風雨散仍迫嵗時廻其道惟正直其人信美偲白頭還作尉黄綬固非才可歎懸虵疾先貽問鵬災故鄉閉窮壤宿草生寒荄零落九原去蹉跎四序催曩期冬贈橘今哭夏成梅執禮誰為賵居常不狥財北登㙗􅀈坂東望姑蘇䑓天路本懸絶江波空泝洄念孤心易斷追往恨難裁不遂卿将伯孰云陳與雷衰殘集作吾衰亦如此夫子復何哀夜聞故梓州韋使君明當引紼感而成章前人惻矣南鄰問冥然東岱幽里聞寧相杵朝歎忽遷舟君闕惟伯仲吾人復欵遊對連時亦早交喜嵗纔周序發扶陽贈交因司㓂酬詎期危露盡相續逝川流卧疾無三弔居閑有百憂振風吟鼔夕明月照帷秋蘚駮題詩舘楊疎奏妓樓共将歌哭歎轉為弟兄留感物存如夣觀生去若浮余悲忘情者雪涕報林邱和姚令公哭李尚書乂張九齡貴賤雖殊等平生竊下風雲泥勢已絶山海納還通忽歎登龍者飜将吊鶴同琴詩猶可託劔履獨成空疇昔嘗論禮集作體言每匪躬人思崔琰議朝憶祭遵公作善神何酷依仁命不融天文虚北斗人事罷南宫上宰既傷舊下流彌感衷無因報國上徒欲問𤣥穹哭殷遥二首王維人生能㡬何畢竟歸無形念君等為死萬事傷人情慈母未及𦵏一女纔十齡訣别集作决漭寒郊外蕭條聞哭聲浮雲為蒼莾飛鳥不能鳴行人何寂寞白日一作日色自凄清憶昔君在時問我學無生勸君苦不早令君無所成故人各有贈又不及生平負爾非一途慟哭返柴荆二送君返𦵏石樓山松栢蒼蒼賔馭還埋骨白雲長已矣空餘流水向人間哭孟浩然前人故人不可見漢水日東流借問襄陽老江山空蔡州哭禇司馬妄識皆心累浮生定死媒誰言老龍吉未免伯牛災故有求仙藥仍餘遁俗杯山川秋樹苦忩户夜泉哀尚憶青騾去寧知白馬来漢臣修史記莫蔽禇生才過沈居哭沈居士前人楊朱来此哭桑扈返於真獨自成千古依然舊四鄰閑簷喧鳥雀故榻滿埃塵曙日孤鶯囀空山五栁春野花愁對客泉水咽迎人善巻明時隠黔婁在日貧逝川嗟爾命丘井歎吾身前後徒言隔相悲詎幾晨哭祖陸自虗時年十八前人否極嘗聞泰嗟君獨不然憫㓙纔稚齒羸疾至中年餘力文章秀生知禮樂全翰留天帳覧辭入帝宫傳國訝将軍少人知賈誼賢公卿盡虗左朋識共推先不恨依窮轍終期濟巨川才雄望高鴈夀促背貂蝉福善聞前錄殱艮昧上𤣥何故鎩鸞翮底事碎一作失龍泉鵩起長沙賦麟終曲阜編城中君道廣海内我情偏乍失疑猶在沈思悟絶縁生前不忍别死後向誰宣為此情難盡彌令意更纒本家清渭曲歸𦵏舊塋邉永去長安道徒開京兆阡旌車出郊甸鄉國隠雲天定作無期别寧同舊日旋候門家屬苦行路國人憐送客哀終一作難進征途哭復前贈言我挽曲奠席是離筵念昔同携手風期不暫捐南山俱隠逸東洛類神仙未審音容間那堪生死遷花時金谷飲月夜竹林眠滿地傳都賦傾朝看藥舡羣公一作英咸属目㣲物敢齊肩謬合同人㫖而将玉樹連不期先挂劍長空後施鞭為善吾無矣知音子絶焉琴聲縱不没終亦斷悲絃文苑英華巻三百二
