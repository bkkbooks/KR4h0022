body:
  text: 文苑英華卷六百二十一宋李昉等編諫寺觀佛像都邑此卷英華所編失年代先後今正之諌白司馬坂營大像表二首諌多造寺觀及王主邸第表一首諌造金仙玉真二觀表一首諌開拓聖善寺表一首諌營建中都表一首諌白司馬坂營大像表武后張廷珪久視元年臣廷珪言夫佛者以覺知為義因心而成不可以諸相見也故經云若以色見我以音聲求我是人行邪道不能見如來此明真如之果不外求也陛下信心歸依發𢎞誓願壯其塔廟廣其尊容已遍於天下久矣盖有住於相而行布施非最上第一希有之法何以言之經云若人滿三千大千世界七寳以用布施及恒河沙等身命布施其福甚多若人於此經中受持及四句偈等為人演說其福勝彼如律所言則陛下傾四海之財殫萬人之力窮山之木以為塔極冶之金以為像雖勞則甚矣費則多矣而所獲福緣不愈於禪房之匹夫沙門之末學受持精進端坐思理亦明矣臣竊為陛下小之今陛下廣樹薰脩又置精舎則經云菩薩所作福徳不應貪着盖有為之法不足髙也况此營建事殷土木或開發盤礴峻築基陛一作階或填川澗一作或塞宂洞通轉採斫碾一作輾壓蟲蟻動盈巨億豈佛標坐夏之義愍蠢動而不忍害其生哉今陛下何以為之又役鬼不可唯人是營通計工匠率多貧窶朝驅暮役勞筋苦骨簞食瓢飲晨炊星飯饑渇所致疾疹交集豈佛標徒行之義愍畜獸而不忍傷一作殘其力哉今陛下何以為之又營築之資僧尼是稅雖乞丐所致而貧闕猶多郡一作州縣徵歛一作輸星火逼廹或謀計靡所或鬻賣以充怨聲載路和氣未洽豈佛標隨喜之義愍愚民而不忍奪其産哉今陛下何以為之且邊朔未寧軍旅一作裝日給天下虛竭海内勞弊伏惟陛下慎之重之思菩薩之行為益一切衆生應如是布施不住聲香味觸法布施故一作則其福徳若東南西北四維上下虛空不可思量矣何必懃懃於住相凋蒼生之業崇不急之務乎臣以時政論之則宜安一作先邊境蓄府庫養人力以釋教論之則宜救苦厄滅諸相崇無為伏願陛下察臣之愚行佛之意務以理為尚一作上不以人廢言幸甚幸甚謹言一作皆舊唐書本傳第二表中宗前人臣某言臣奉勑河北道宣勞今發都下從白司馬坂所遇見轉運材木顧役人夫臣勘問檢校官左蔵置監事馮道得狀奉今月八日勑於坂所脩營臣竊以天后朝僧懷義營剏大像并造天堂安置令王𢎞義李昭徳等分道採斫大木虐用威勢鞭捶官寮鑿山填溪以夕繼晝傷殺丁匠不可勝言費散錢數動以億計其時百姓愁苦四海騷然皇天孔明實兹降鑒凡所營構並為災火所焚懐義之徒相次伏法而死自此之後停􅃦十年近者狡竪張易之昌宗昌儀等將欲潜圖大逆為國結怨下人兼售私木以規官利遂又與僧萬壽等設計移此坂營建今暨逆竪夷滅皇運中興陛下先發徳音頻下明制除不急之務罷土木之功所以少監楊務亷逺徙屏黜頒示天下凡在中外不勝忭躍若此像閣重復脩營則與制書義殊乖越尚令二逆遺惡未除臣雖至愚固知不可且窮土木之作竭倉庫之資將非崇樹勝緣求諸福徳者也今則興起營造採木作坂蠕動含生因緣致死每遇一日之内筭數尚不可知比及累嵗而成譬喻豈復可一作能及廣殺而求福徳所獲焉補所亡慈悲之理深未𢎞暢方今仲春作候當務農業臣今在路經過全未見人耕種訪聞咸稱乏絶茍求朝夕米糧此則百姓切急誠若倒懸矣陛下受天明命作民父母可不先觧倒懸之切而方罄財竭力脩營不急之務乎特乞即日停造大像等仍量抽其錢賑濟窮乏如天恩允臣等所請天下蒼生幸甚謹遞表奏聞伏聽勑旨諫多造寺觀及王主邸第表見六百九十八卷疏門題諫中宗置公主府官疏辛替否諫造金仙玉真二觀表睿宗裴漼太極元年臣某言臣謹案禮記春夏月令曰無聚大衆無起大役不可興土功恐妨農事若號令乖度役使不時則人加疾疫之危國有水旱之變一作災此五行之必應也今自春及一作至夏時雨􅄽期下人憂心莫知所出陛下雖降哀矜之旨京一作兩都仍有寺觀之役一作作時旱之應寔此之由且春令告期東作方始正是丁壯就功之日而土木方興臣恐所妨尤多所益尤少耕夫蠶妾饑寒之源故春秋莊公三十一年冬不雨五行傳以為嵗三築䑓僖公二十一年夏日大旱五行傳以為時作南門勞人興役陛下每以萬方為念睿旨殷憂一作勤安國濟人防㣲慮逺伏願陛下下明制發徳音順天時副人望兩京公私營造及諸和市木等並請且停則蒼生幸甚若農業失時户口流散縱寺觀營構豈救黎元饑寒之弊哉諫開拓聖善寺表宋務先臣聞有國有家者以恤人為務節用為先故唐堯至化采椽不斵漢文深仁露䑓罷構西方之聖道貴融心使下人不寧匹夫竊歎豈菩薩無相布施如來慈悲本旨哉陛下孝思罔極崇建明固疑作因土木之功莊嚴斯畢僧房精舎宴坐有餘禪寺道塲經行已足若開拓奪人便利貧者有擠壑之憂富者無安堵之所幸非急切何至於斯况陽和發生播植伊始興役丁匠廢業農功一夫不耕必有饑者三時之務安可奪焉臣聞失鬼神之心可因巫祝而謝失君長之心可因左右而謝失父母之心不可解也陛下以萬方為念何欲傷一物之心臣雖至愚猶有所惑方今西戎尚梗北虜未覊戰士老於邊亭役車屯於塞下甿户流散府蔵空虛卒然􅇏候興一面之虞水旱虐數州之地乗其不意何以禦之伏惟陛下體唐堯父母之用心思菩薩如來之本意傷邊卒艱勤之弊察下人勞怨之聲董逋逃休役力實倉庫急農桑杜邪枉之門正尚耻之路諸不急務一切總停應湏拓寺請俟農隙如此則國用充足黎元幸甚諫營建中都表韓覃臣聞古者明王之制也史書過瞽誦詩公卿諫士傳言庶人謗於道商旅議於市然後君得聞其過失而後改之見義而從之所以永有天下者也陛下不以臣不肖忝在學士敢不竭忠盡節有隐避乎詩曰靡不有初鮮克有終老氏曰慎終如始則無敗事曩者韋氏稱制萬邦憂惶實頼陛下神武克復社稷其初也賤珍寶禁奢華罷土功敦朴素革衆弊代天工垂拱無為削疑心闕虛静追踪堯舜比徳羲軒天下顒顒傾耳注目喜遇非常之主復在於今日矣康哉之歌復聞於黎庶矣柰何簡易未幾而又興建中都乎蓄於閑廐數倍乎溺於聲色無極乎躭於遊畋不節乎營為繕造衆多乎都邑課稅煩劇乎不省亡國之風因循覆車之軌天下失望四海驚嗟朝野心知而懼罪鉗口以斯綂御天下豈所謂可乆可大之業耶且自歴代之君皆欲建萬代之業使子孫長有天下者也豈使子孫傾覆天下者哉子孫若覺所行必將敗亡則必恐懼不敢為之矣以亡國之主自謂必不亡也然後至於敗亡也存國之君恐懼必將亡也然後至於不亡也易曰知進退存亡得䘮而不失其正者其惟聖人乎又曰其亡其亡繫于苞桑此言懼亡獲堅固也管仲曰古之隳國家失社稷者非故且為之也有樂焉不知其䧟於惡也陸凱曰有道之君以樂樂人無道之君以樂樂身樂人者其樂彌長樂身者不久而亡惟陛下居安慮危在得圖失防患於無形之始慎禍於纎㣲之初念管仲之至言棄少樂而存社稷覽陸凱之篤論思樂人而彌長也禮記曰孟夏之月無有壊隳無起土功無發大衆無伐大樹昔魯夏城中丘春秋書之垂為後戒今建國都乃長久之大業也犯天下之大禁襲春秋之所諱詩曰敬天之怒無敢戲豫孝經曰治國者不敢侮於鰥寡而况於士人乎今不恤庶人之擾而建都國不畏上天之怒而長戲豫棄安就危棄存就亡棄易就難棄約就奢而欲永有天下恐不可得也但恐頃年已來水旱不節天下虛竭兆庶困窮戸口逃散流離艱苦鞏洛暴水所䘮尤多江淮赤地饑餒者衆加以東北有不賔之冦西凉有䘮失之軍干戈嵗増疆場騷動近又胡羯逆命徵發不寧料事度宜豈應更建中都乎至若兩都雖舊制矣然而分守官衆多矣費耗用度尚以為損豈况更建中都乎夫河東者國之股肱郡也勁鋭强兵盡出於是其地隘狹今又置都十萬之戸將安投乎夫惟所造城闕爰及苑囿毁拆閭閻令其别創損壊冡墓令其改卜殷富者破其産業貧窶者莫知所從外廹威詔内懐湯火怨嗟之聲驚惶之擾盈于途路逮於鬼神老小孤惸茫然無計憂悲苦惱不可勝說此甚不可也且陋東都而幸西都自西都而造中都取樂一君之欲以遺萬人之患務在都國之多不恤危亡之變恱在遊幸之麗不顧兆庶之困非所以建深根固蔕不抜之長策矣昔漢帝感鍾離意之言息事徳陽之殿魏主採續咸之諫止造鄴都之宫臣職非其位言發微細然聖主不以人廢言不以㣲擯人矣臣愚誠願陛下發徳音垂明詔深恤黎庶罷事中都則福履無疆天下幸甚謹言文苑英華卷六百二十一
