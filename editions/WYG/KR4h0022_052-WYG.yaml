body:
  text: 文苑英華卷五十二宋李昉等編宫室六登姑蘇臺賦一首古銅雀臺賦一首朝元閣賦三首􅀄日見朝元閣賦一首大厦賦二首柱礎賦一首階賦一首中堂逺千里賦一首登姑蘇臺賦任公叔司馬遷世掌天官才稱良史探禹穴之遺跡紀吴國之覆軌乃憮然而嘻曰登此姑蘇之墟淹留兮躊躇感斯宇之基為沼而仲雍之祀忽諸我聞周道既衰諸侯狎主中無覇王蠻戎振旅始闔閭以信威終夫差以極武左與勁越同壤右與强楚為鄰内有髙臺之築外有逺畧之勤積如莽而暴骨亦如讐而視人是以疆場日駭版築未弭方五載而厥成造中天而特起因土累以臺髙宛嶽立而山峙或比象於巫廬之峯或倒影於滄浪之水悉人之力以為榮觀厚人之澤以為侈靡斯實累卵於九層天何見乎三百里俚語有之曰川壅則潰月盈則匡善敗由已吉凶何常矧謀主之賜劍若渉川兮無梁以為棲越以求覇卒見豢吴而受殃客自南鄙觀乎江濆徘􅆦舊徳惆悵前聞試逰目於寥廓曽巋然而參雲聽逆虐而翳諫竟麋鹿而為羣髙天放曠平湖泱漭奕奕孤嶼茫茫極浦悲早鴈於海風嘯寒鴟於江雨况復關梁坐隔覊旅増愁山木將落汀葭亂秋思美人兮何處獨懐邦兮逺逰彼名遂以身退顧與范蠡而同舟東吴王孫有睟其容因少為唱曰中心不必兮子胥何為懐直道而驟諫遭重昏之見危將漁父以杭跡且垂釣於江湄髙臺既傾夕露沾衣感蒞國之不及冀來人之與歸者也古銅雀臺賦張鼎伊昔三方列峙惟魏宅中五都分設因鄴為宫北走邯郸燕薊南馳􅅠衛河潼於是聖武欽若啓戎締經國之初構立濟世之元功受命而創洪業取威而定羣雄土徳王始炎靈告終天滅漢厯國封魏公黄星徵於分野素秋建於茅社諏良日兮御靈壇坐千乗兮馳六馬錫彤弓兮張海外授金印兮安天下不飭不美無以壮哉營宫營室是為王者乃僝梓匠掄􅅛材伺農隙悦子来六府垂象制文昌之廣殿百工獻藝造銅雀之髙臺壮閶闔於昭回軼沆瀣於烟埃俯臨而漳􅇭水合仰觀而宇宙天開返道截梁兮漫延紅䔟縞璧兮徘徊連雙闕於日表飛累榭於雲㟪崪如五岳干霄而岌立􅦳若三山出海而崔嵬金雀踶甍而欲翥玉螭盤柱而將廻召詞人於華屋留舞客於瑶杯登髙必賦無逺不該洎乎鞠旅卭筰反斾咸洛雖納漢以吞江終頽山而擠壑遷神於建始之殿返葬於夀陵之郭慷慨遺文凄凉舊閣罇盈玉座燈映蘭幕婕妤妓人皷舞歌唱當春月而朝臨悵日暮而西望見松栢之成行愁歌舞之相向异哉戰雖必克愛亦有捐戰可以力勝愛難以威全撫四子兮魂斷念六宫兮涕漣何壯圖之夭閼而閨思之婵娟紆曲念於弊履昏盛徳於繁絃非達人之所繫豈至尊之宜然嵗月其除君王安在出入三國芟夷四海號諡殊徽質文異彩及石氏之謀帝位髙歡之竊神器雖修舊而增崇竟移時而改代銅龍噴水似落九天金鳳銜珠終淪五綵我君遑遑行指鄴旁弔古太息馮髙獨傷東郊道兮蕪漫西原樹兮㣲茫露窋兮泣蒼蘚風蕭梢兮悲白楊粧樓歇艶􅀞閣銷香陂陀巖屼巋峞摧蔵井榦滅兮有遺甃殿垣毁兮無華構但見蓁蓁蒿棘生復㸔觺觺饑鼯鬪雨嘯幽渠希切又居希舉豈二切月哀離狖宿莽撑骨危巢覆鷇平臯晩兮拱木生寒紫陌昏兮黄埃奪晝人夀㡬何留恨日多追士衡以投弔效明遠以作歌歌曰銅雀蒼蒼對古馗清風切切有餘悲試憶望陵三五夜便是西園明月時朝元閣賦以髙抗山頂升覧清逺為韻錢起上將恢帝宇壯神臯斷景山之松用而有節感子來之衆役不告勞成仙閣之𢎞敞配紫極之崇髙先是徵規模宏大壮經始聖迹責成梓匠當桂户而八水悠逺植玉堦而千巖相抗升陽烏於赤霄之表棲玉兎於翠㣲之上可以吞貝闕壓崑閬盛矣哉亦神明之化也不可得而稱状觀乎儉以示徳髙即因山虹梁天近丹陛雲還漢武求仙望蓬萊於海上吾君有道致方士於人間厥構既崇其寧惟求正色深沉於木末浮光嶙亂於山頂如翬斯飛獨出于熲農務暇霜氣澄天門闢龍輅升俯人烟於萬井小雲樹於五陵天臨宇宙日照黎蒸是時也靈仙響集品物交感因髙載著於人風有象寕遺於睿覧聖人垂一作之化稽古上清彼㑹昌之構宇得朝元之美名不奪穡地知庶心胥悦髙標靈阜表聖夀長亨襟懐動植指掌寰瀛将九圍載廣與三光克明斯乃棟宇之大也雖前史莫之與京夫如是古之濬城隍飭宫苑孰比我君居髙而致逺朝元閣賦同前韻孫翊仁神之本也以朝為大乾之徳也以元為髙合二美以制閣俾萬人兮不勞何哉彼朝元之為状厥髙因於嵓嶂岌嶪兮初謂湧於山巔崔嵬兮又謂居于天上崇崇之勢博敞宏壮斜窺渭北笑玉樹而徒空俯對終南與金闕而相抗逈出象外信非人間陽烏乍轉以廻翼翔鵾不逮而空還七聖同逰罷還㐮野萬國以㑹自是塗山既而𤣥冬啓景六合清逈法駕行幸於溫泉羽斾駢羅於髙頂帝乃躋稜層考休徵天之動日之升馳繚垣以望􅌄窱開閶闔而越凌兢視逺如邇臨髙可慿于以旁眺于以廻覧忩前桃實在方􅃋之深知閣上鳳巢表帝軒之聖感昔秦皇學道漢主長生祈年既築望仙復營人既勞止事卒無成豈比夫向背山澤宻邇王城池八水而下臨無地階重巖兮上摩太清至若早霜啓色積雪初晴壯太山之日觀比天台之赤城信我后之攸處與神仙之混并嗟乎登髙作賦十上何晩題陸雲之閣吾道應行薦揚子之文其事不逺朝元閣賦同前韻失名皇帝於驪山之上起仙閣於神臯得凌雲之體勢彰考室之劬勞冠千峯而迥出聳百尺之彌髙蓋取惟清惟净而藉乎以遊以遨干碧霄而宏壮依絶頂而髙抗仰之者目眩心驚俯之者興逸神王納烟霞於袖裏㸔日月於掌上改山為㑹昌之號建福無疆題閣取朝元之名升天有望徒觀其出地表俯人寰飛重簷之日下疊千栱於雲間金鋪燭耀玉磶苔斑蓮井雕梁之彩錯綺忩網户之虚閒屹屹然下臨千仞亭亭然逺對黄山若乃初旭澄霽則勢能孤逈早霞初照如赤城在天台之峯積雪未消若銀臺處蓬莱之頂毎嵗農務隙寒事興聖人之玉輅是動金梯是凌限三休而爰至歴重檻而方慿寒鴈正來下秦山之八水暮烟初起繞漢家之五陵以人心為心則遇物多感以真趣為趣則放情𤣥覧豈不由登此而存所誠處此而無所營方抗隠而述物覺山空而益清七聖不迷勝軒轅㐮野之遊豫萬靈畢集若夏禹塗山之㑹成昔周日之中天擅美秦代之阿房著名既煩費於徭役復荒滛於性情豈與夫險不恃兮髙不傾囂塵絶兮虚白生光一人之息偃歴千載而彌逺者同日而言哉初日見朝元閣賦以赫臨曉雲髙出蒼翠為韻郭遵新豐之路兮朝元有歸客見初陽于東嶺照層閣於南陌惟閣也慿髙不傾惟日也臨下有赫既曈曚而延燭曷埃壒之能隔陽烏之翼兮若駐禁林羲和之轡兮若頓髙岑蒼蒼之質纔辨杲杲之光稍臨發璇題之麗色開玉户之宿隂浮輝外融峻勢無不呈其壮引耀中朗邃宇無以閟其深于原之表揭雲之杪暎朱檻以充一作彤融凝粉垣而皛皎司晨而見異星樓之麗霄質明乃光殊日觀之生曉陽彩舒文昭然可分晞拂簷之夜霰辨出棟之朝雲類列仙降真祥光綿幕疑大君臨御瑞氣氤氲諒清旭之初起非反照之猶曛日惟至麗閣亦蓋髙竦莫大之標洪纎奚比委無私之照巨細何迯是以詭狀摩天殊姿詳悉欒虬欲動謂起蟄於春光井蓮倒披若争開於夏日的皪交映岧嶤上軼不殊南榮之明奚獨東方之出閣之峙矣于彼髙崗閣之麗矣于彼朝陽據厚載於秦雍隣顥氣於穹蒼豈比崑崙之山俟燭龍銜耀鳷鵲之觀俟金波寫光孰若列皇都之次鎮王畿之位近白日之貞明總離宫之蒼翠祥雲不散意往仙如存耀景毎臨誠望幸可冀因徘徊而寓目遂􅍭毫而寫意大厦賦以君子用吉為韻彭殷賢遐觀邃古逖聼前聞北辰居正南面為君莫不茅茨土階以恭儉而為度上棟下宇避燥濕以為文聲芳訏謨乎五典徳廣兆暎於三墳迨乎纉戎天秩啓迪人羣以為百堵仄陋不足以光先正九筵迫狄不足以垂景勲於是資奥區而寫城闕慿大壮而列宫棼杞梓庀匠于季穉林衡僝木於毫分既而工用其法人來以子鼛鼓逢逢版築儗儗離婁督繩以為度一作用般輸削墨而為砥侔造化以制作越埃壒而資始珠網滴瀝而露垂丹刻翬飛而霞起危簷矗以露斷髙閣立而雲倚逺而望之莫測其端倪迫而察之但驚其峻峙仰鵾鵬之不逮豈燕雀之能擬於是發禮以釁之勵樂以樂之可謂休以令聞垂之億秭者也既而馮陳就閒是逰是縱笑語卒獲聲色攸重邀觀一作歡則環拜興舞命賞則夾道羅從以為一生之歌斯哭斯千載之善禱善頌豈知海縣則天下所有帝王則黔黎攸共固惟不節之嗟蓋不知其所用也豈與夫明主君臨邊鄙静謐儉以足用貴在無佚尚菲陋卑宫室為無為以自保事無事以終日故得國家載寕帑藏充實福祚乃於萬斯永子孫則百而逢吉屢降哀矜之詔頻優耆老之秩斯可謂皇哉唐哉唐哉皇哉而天地長久何三五之能匹也大厦賦同前韻郝名逺昔者天地氤氲洪氣始分穴居野䖏獸聚鳥羣逮乎聖人演卦垂文上棟下宇信宫室之取則紫㣲黄屋表巗廊之在君爰制廣厦克崇景勲崛起黄道孤横翠氛巋峞穹崇若巨鰲負山出大壑巍峩岌嶪似神龍飛漢矗長雲原其本也蕆事作圗成終慮始命班倕召王爾鏟崱嶷平邐迤斬豫章之楩楠伐雲夢之杞梓關山百轉水陸萬里江妃析藏捧明月而時来泉客辭波薦夜光而至止於是規模具工徒庀經之營之載考載擬版築既畢剞劂將已邈矣層構仡然獨起觀其萬栱交穿千櫨叢倚連甍軒昻以鳳翥飛龍夭矯而虹指麟次翼張岑立岳峙綺䟽齊列洞户相似翕赩殿烻一作雷電煥爛倚􅀢山梁藻梲蟠蛟螭於上楹方井圓泉姹芙蓉於倒水壯而且麗豐不踰軌輪焉奐焉美矣盛矣懿其梁棟之任固非斗筲之子夫成大海者百川所歸構明堂者多材是共亦猶一人出兮百寮從爰建股肱而作輔當其無而有室之用張公獻禱奚子作頌蓋亦美上古之淳朴防後代之驕縱皇矣上帝臨下有秩六合清晏八荒夷謐方將抑末敦本斵雕歸質異茅茨而立宇惡其飾以取卑宫之名削土階而度堂起其厚而崇破觚之實猶且明敭沉隠寤寐英逸燕雀聞而相賀鸞鳯来而應律思與羣公卿士衆官庶匹議經濟之法度籌安危之得失優哉㳺哉日慎一日斯乃國家之盛事嗟難得而賦述獨有間迹林野洗心蓬蓽想芳桂以淹留撫寒松而未出希薦之於大厦保柱石之終吉柱礎賦王諲稽古太初穴處巢居則大壯之垂象上棟下宇成其室廬迨于中葉僣奢違道木衣緹緗土被文藻列蟠螭於欄檻拖長虹於欀橑謂桂柱之不堅施柱礎以侔其夀考相萬祀而一人偕天地而相保其始也徵士尚方聚徒嵓畔經迴溪之紆欝梯嵳峩於天半披林離之脩蘿刮莓苔之爛漫曜雲霞之彩駮嘉錦章之輝焕圖嵌空設妙筭或攻或鑿呌嘯相賛磓山成雷擊石火散初髣髴而縷析忽砰􅗟以氷泮五丁力殫九牛流汗自彼幽藪登庸華觀乃命王爾操繩公輸削墨規上成範方下為則錯坎缺之參差開青熒之古色入紅璧對朱扉廊迴月皎殿廣星稀随風起潤逐日呈輝扣逶迤之環珮拂迴旋之舞衣及夫荏苒時移峥嶸嵗久堂惟荆棘塵埋户牖嗟建章之火流何金石之可守礎則不易人將誰夀礎兮礎兮金堅固曽見深宫㡬人故夫礎之為徳既堅且貞華而尚素晦而尚清象君子之待問扣之則鳴誠在位之有式居必底平平則可久久則不傾無靳固而守樸非昭章而昡明庶夫人之鋭意覽兹物而篤誠階賦樊晦昔在軒后棟宇惟新摹諸大壮頼及萬人修宫室以齊列起忩户而相因然後横髙階於左右次危級之相巡上嵳峩而山起下崱屴而龍鱗生蓂莢於堯日舞干戚於舜辰亦可以望聖帝升降觀享頥賓若乃憶趙妃之嬌妬窮漢武之寵慾昭陽特起麗飾繁縟梁纒藻繡窓綴丹綠砌鉛黄金階闐白玉使宫女而攅望聊優㳺以自足下朱履而影亂參差度羅衣而香飛斷續亦有珍物旁秀瓌竒四燭珊瑚碧樹弄晴風明月随珠耀初旭及夫陳后長信獨遭弃捐塵駮紫蘚庭鋪緑錢望金屋而魂絶對玉階而愁連至其戰國云亂七䧺相躔秦兵大起圍邯郸而已合趙楚同㑹運籌䇿而未宣嗟兩君之不决歎毛公之獨賢歴髙堦而直上挺長劍而無前豈不以斯階之見陟光厥事而能全既而衆狀叢開竒勢難纂或干天而上峻或盤空而不斷望之則意悦升之則􅇍緩對謝庭而玉樹中榮臨兎園而芳薇上滿睹臺殿之要者實莫過於兹階美峥嶸之壮麗故作賦以攄懐中堂逺千里賦以心曲聲光此時勿阻為韻謝觀峻宇沉沉朱門阻深豈為遥逺有蔽徽音跬􅇍之中易在一言之地踰時之逹難於千里之心莫不佇立盤桓曕風躑躅或恃穹崇以懈傲或麗欺誣之阨束遂使阼階之上迢遰於天子之田蕭墻之間綿邈於黄河之曲且夫百里之逺一日致之中堂之近經旬履之而所以借淹留之喻等邂逅之期豈君子同風之地在小人革面之時瞻廊廡之不遥便成燕宋念庭除之匪邈差若毫釐是絶音塵有暌言語非入室之士過作脱巾之阻布武之中疲赤􅂹於崇朝及肩之牆困鴻鵠之一舉唾井之路寥夐及門之子廻翔希日日以見徳尚朝朝以觀光毎望恩波如桂水之流淼淼時瞻徳宇若金城之路茫茫似蔽黄雲纔同明月髙深起於顧盼山岳生於倐忽於是以南軒北宇之嶔岑作河東河西之間越如此禮譲無成薰蕕不明東閣苔滿西園草平倒屣之餘風頓削握髪之清規不行自杜其匡諫之路詎聞乎哀樂之聲是使咫尺蕭條人遐室邇空施棖闑之横壮但見樓臺之邐迤則可以自勵於已寕求於彼君子勿嗟行路難古来如此文苑英華卷五十二
