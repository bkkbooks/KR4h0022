body:
  text: 文苑英華巻八百八十七宋李昉等編將相五齊成公神道碑一首左僕射賈耽神道碑一首故中書侍郎同中書門下平章事太子賔客贈戸部尚書齊成公神道碑權德輿有唐文學政事之君子曰相國齊成公諱抗字遐舉清方粹温絜矩秉懿明誠盡性切磨集作劘化育之道精義入神旁魄天人之際以忠事君以病乞身乃去台宰乃儕商皓然後徹琴瑟啓手足殁齒無違德以從先大夫於九原易名曰成不亦宜乎公定州義豐人自太公表東海桓公匡天下為國為家或哲或仁烈祖贈太師府君諱澣歴給事中中書舍人吏部侍郎止於平陽太守出入陟降中行山立至今言開元名臣者稱公有遺直遺愛焉實生先公贈國子祭酒府君諱翧履道貞厲仕至左龍武軍倉曹積厚於上流光於下其位不克故大受於公公既齔而孤哀過成人屬幽陵横潰中夏如燬奉太夫人安輿違難於越得子州支伯之故地而偕隠焉誅草茅以順居息悦山水以資仁智方茂天爵用觀靈龜嘉招重問奔走以狎至虛已𢎞道從容而翔集吳郡張相君鎰方以仁義理濠上得君為榮及進律于成師于岐累為命介若驂有靷建中中戎王謀大和㑹以休寧西方右扶風綿亘汧隴地當甌脫且有成命正其經界公實佐中權登壇蒞盟得其情數與之約結克就衣裳之㑹用銷邉鄙之警自觧巾三遷至殿中侍御史俄屬涇旅竊發群兇挺災天兵展義於甸内王公死難於理所百舍奔問至于行宫拜侍御史有詔以蕭黄門復布愷澤于東夏命公為工部員外郎以賛焉復命轉倉部郎中李懐公阻命于滿連兵未觧關中飢旱經費不足轉粟饋軍濟時之艱患求才急病命使以轉達遷兵部郎中兼御史中丞以董其任俄拜諌議大夫當軸者不相容坐婚親細故出為處州刺史先是山越冦攘蕩覆城寺公乃卜勢勝之爽愷因習俗之便安三時不害百堵皆作朝典陟明拜蘇州刺史吳實劇部大田多稼浮滛冐没吏禁或弛占著名數戸版不均公乃閱其生齒書其比要強家大猾不得蓋藏公特單騎與之紓息己日乃孚厥猷茂焉遷潭州刺史御史中丞湖南觀察使以嚮時二郡之理而𢎞大之其仁可知也左曹理本徵爲給事中周郊寄重擢為河南尹盗有宋瞿曇者白晝椎剽為郡偷囊槖三川病之幾三十年公法令嚴具網絡張設名文粹作潜捕魁宿使無遺􅁼指顧之間擒擿如神乃作秘書章明文雅脩舊以起廢乃作太常統和神人節事以辨志便蕃大僚其道乃光德宗皇帝方以堯舜氏聦明之道馭天下用賢人克相位拜中書侍郎同中書門下平章事熈九功之歌質百官之成損益文獻化裁形器精㣲以折𠂻宻静而不伐或事隠於造膝或言行於沃心初天官氏每嵗表他曹郎二人閱多士試言第其甲乙春官氏俾考功郎文粹有中字選考秀之親故者而進退之公以冡宰少宗伯為官人取士之本蓋天子有司之重一有寄字至於避小嫌亂舊章適滋岐旁孰謂扄鐍蹇蹇坦坦之道豈如是耶然後闢康莊付文粹作衡尺遵公是之路去自便之私天下之人謂之理道尋有詔脩國史昔孔父無位以空文為一王法公當盛聖之代用宰司惣直筆其於褒貶勸懼明焉勤慮盡瘁積成􅃦恙累章乞告改太子賔客遭罹不淑贈戸部尚書時貞元甲申嵗夏四月春秋六十有五夫人河南獨孤氏某官某之女賢明蚤夭繼夫人蘭陵蕭氏某官某之女仁順有禮法嗣子餗䘖恤毁瘠侍公裳帷以某月日祔于東都某原䘮祭哀敬君子以為有後惟公深而通肅而寛出處動静必以中正敬用五事暢於四支資性儼恪尤長鍳裁在岐也薦齊忠公映佐蕭也薦盧恭公邁皆至丞相其他推轂下士為朝廷臣成天下重名碩望者不可勝書凡所論者皆研幾析理𢎞雅夷逺洪州文宣王廟碑張蕭盧三相國碑誌本聖人敎化之蹟推大政謩明之道固其性術講貫而發舒乎斯文文集二十巻中倫體要盡在是矣公薨五年餗調為洛陽尉永惟先烈未刻豐碑以德輿夙承湖海之舊中忝掖垣之属他日舉代靡形話言獲於遺編實見隂德顧兹無似有玷知人濡涕含毫以表幽宅銘曰昔在營邱大風泱泱有倬平陽令聲章章不踐宰政貽慶子姓含曹含光大學追命厥生中書秉悊集作哲通用居政集作正鵬起扶摇鸞翔慶霄乃登紫㣲以瑞清朝吉凶糺纒寒暑結轖其生有涯其用無極夀堂冥寞冡樹森植掲茲馨香終古是式左僕射賈躭神道碑鄭餘慶公諱耽字敦詩其先長樂人也七代祖元楷因葛榮之亂避地始徙家於浮陽隋開皇中改浮陽為清池今為清池人也烈祖逺則皇德州長河尉祖知義皇沁州沁源主簿贈揚州大都督考琰之唐宰相世系表作元琰贈尚書左僕射皆才光道溢噐位非偶積善有遂鍾于魏公公天寳十載明經高第乾元中授貝州臨清尉州縣之職與公非宜兵戈甫興時不韜才公詣闕獻書授絳州太平尉太原節度王思禮察公噐重識高涵泳萬頃署度支判官轉試左驍衛兵曹試大理司直監察殿中侍御史職並如故遂遷檢校繕部員外郎兼太原少尹侍御史北都副留守仍賜金章紫綬就加檢校禮部郎中凡歴數使賔待益重竒才愈茂𢎞噐日彰天下士君子推公為棟梁遷汾州刺史在郡七年􅉃怛之愛忠利之敎序四噐導五常百姓日用而不知熈然致於仁夀烏足語其𤨏細歟徵拜鴻臚卿兼左右威逺營使通夷狄之情序賔客之位其有素矣是嵗拜梁州刺史兼御史中丞山南西道節度觀察度支營田等使加朝議大夫封廣州男時守臣梁崇義恃漢水峴山之險負固闕強公受詔領麾下㳂江東討降均州屯榖城所向皆㨗以功加銀青光禄大夫上以慎理軍旅以信夷夏邉封謐清而百姓晏安是時故山南西道節度使相國鄖公震洎邠寕節度使張僕射獻甫或為部刺史或為都將皆雄毅宏逹常流不及忌能飛語危疑是懼軍帥之例罕有全度公前推信誠中發坦蕩咸以事曉加之慰薦竟垂忠勲兼佩將相引張推轂受脤㣲公之恢朗洞識二人曷能臻歟在鎮三年遷檢校工部尚書襄州刺史御史大夫山南東道節度觀察使㑹李希烈亂常朝廷致誅詔公為司徒梁公勉招討副使以公懿德懐姿不冝為副冦難未平徵拜工部尚書職崇喉舌闕俄以本官兼御史大夫東都留守判東都尚書省事闕東都畿汝州都防禦使又加東都畿唐汝鄧州都防禦觀察使舊例居守不出王城公以射藝絶倫氣闕霜德宗知公信在言前優詔特許薄狩郊甸允所謂闕特逹之德也遷檢校尚書右僕射充義成軍節度鄭滑等州觀察處置等使属有鄰師戍兵護邉魚服鶡冠異軍三千公弛柝罷警門闥洞開慮其未安重延廊廡坦易信誠挺出今古海渟山峙闕屹屹培塿畎澮安得不服其洪濤峻嶠歟凡更四鎮踐履如一尋以風疾懇形封章御札名方與十金之醫馳賜不允陳讓俄而護瘳貞元九年入覲拜尚書右僕射同中書門下平章事朝廷為之寳巖廊為之重天下以之信向蠻夷以之懐來加金紫光禄大夫轉左僕射依前平章事遷檢校司空依前左僕射平章事遂嬰風疾四表陳讓不俞朝㫖御醫盈門中使填路嗚呼有盛衰也有晝夜也聚㪚之理常也死生之變大也愚智同塵賢不肖共轍孰能䆒之哉公爲御史先府君追贈太子中允先夫人鞠氏贈東萊縣太君歸本郡遷葬鄉邦榮之先府君累贈尚書左僕射鞠太君贈齊國太夫人祖贈揚州大都督祖妣崔氏累贈博陵郡太夫人廟貎觀德豐碑紀烈奉君親而載劬啓手足而免夫始卒之道侯具韙而以永貞元年十月一日薨于長安光福里之私第享年七十六輟朝四日冄贈太傅詔鴻臚卿渾錬持節備禮賻絹一千匹米粟一千石詔葬長安高陽原夫人贈扶風郡夫人武功蘇氏駕部郎中守忠之孫處士珣之女先公二十五年而殁至是而合𦵏焉秉周禮也長子疇太常寺恊律郎凋於青春次子疄太子議郎少子㽥京兆府叅軍公好古在汾州時於戒行尼寺家童院得晉西河王分司馬斌碑太康中尚郎索靖八分書翳薈蕪薉之下字可辨者猶存太半有割太原四縣以為邦邑之語公冄建於寺殿之前為尚書時懐魏鄭汴軍聲未輯詔公宣遏而两家之難觧抑推君命且曰服寛信也公翫習經籍老而不倦九流百氏靡不該覧通夷裔之風俗盡山川之險易歴代沿革之自百王廢置之由關塞通塞之因牧圉盛衰之異道程踈宻之凖要荒享獻之數聚米畫闕於指掌矧夫丹青神化縑緗纂述數十年來西戎闕我河湟其圖籍志録泯絶㪚落非公強力精專蹂躪貫穿靡書不探雖賤必訪則自汧隴而西傳疑唱謬紛紛不己巳化為竒昧天意若曰降公之聦逹精博拯厥將墜一作墮歟興元元年詔公撰國圖貞元十四年先獻關中隴右及山南九州等圖又撰别録六巻吐蕃黄河録其四巻優詔褒異賜馬一匹銀噐數事綿綵三百疋十四年冬撰海内華夷圖成幷撰古今郡國縣道四夷述四十巻貞元十道録四巻賜馬两匹銀噐數事綿綵五百疋又内出銀榼二蓋殊渥也於戱渤海左湧洪河前激泱􅐯其地氣必將有以孕育哲賢謨明盛時為紀為綱為棟為樑體貳為一作如仁萬夫之望豈特河海地理云乎哉亦將上動昭囘下降星精為忠為孝為聦為明為君子為𢎞噐公有大度容物也浩無津涯而恪慎競畏不有怠也有明哲保身也孰云肯綮而端方肅祗未嘗離也公奉親以孝事主以忠待天下以信博識以強力亷隅以砥礪居台座十三年秉戎律四鎮垂十五年産不過中人日給有不暇之意非夫脫落塵機翺翔青冥孰能然哉夫郄縠之閱禮樂敦詩書祭遵雖在軍旅不忘爼豆邴吉之不過汙丞相車茵劉寛之無爛汝手叔度之涯涘元陽之不伐衞玠之理遣情恕公咸頡頏恢博得其兼備者已公考求六藝張弓挾矢允謂殊倫連墮㝠㝠之羽䨇貫五采之翬殪豶豕之獸圖畫歌詠噫嘻君子多乎哉文章之製博逹而清約盛矣著述有未就者殁有遺一作餘恨痛疄等知公歟疑作與餘慶有忘年之眷見託紀徽烈俾鴻代芬芳不歇表唐得賢臣之目焉銘曰圓方旣明渾淪粹精辰耀騰溢降為賢英郁郁魏公薰然淑清脫落𤨏細胷吞長鯨其一天寳之季前塵荐起懐䇿上謁言塵可止少年下位事不行矣命官綘䑓渥澤伊始其二車騎開府司空晉陽萃賢揚幕優游抑揚惟公聳然落落堂堂群議乃曰允膺巖廊其三剖竹西河衆蘇情結風俗丕變載欣一作胥載悅六鈞服猛䨇鴻一發式是威武洸洸烈烈其四入掌九賔羽儀清都四夷荒職貢畫地圖帝曰漢中實惟爾區廷授龍節䨇旌碩儒其五惟轂漢南乃司冬官保釐成同白馬登壇更踐數鎮撫人以寛或三四年遂成勝殘其六徴弼中樞朝廷為實謀不外揚功宣造膝與物宥過意工言質天下日用曷由窺室其七知命兮死生齊松楸列兮埏􅎬成蹊海胷兮渾渾浩浩一指兮和天倪謬知言之重顧銘藥石兮悽悽萬物或幾乎息矣惟公德兮竟隮其八文苑英華巻八百八十七
