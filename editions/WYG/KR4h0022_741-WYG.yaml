body:
  text: 文苑英華巻七百四十二宋李昉等編文雕蟲論一首偃武修文論一首質文論一首文論一首編年紀傳論一首人文化成論一首文章論二首章表論一首雕蟲論并序裴子野宋明帝博好文章才思朗㨗常讀書奏號稱七行俱下毎有禎祥及幸讌集輙陳詩展義且以命朝臣其戎士武夫則託請不暇困於課限或買以應詔焉於是天下向風人自藻􅎖雕蟲之藝盛於時矣梁鴻臚卿裴子野論曰古者四始六藝緫而為詩既形四方之風且彰君子之志勸羙懲惡王化本焉後之作者思存枝葉繁華藴藻用以自通若悱惻芳芬楚騷為之祖靡漫容與相如扣其音由是随聲逐影之儔棄指歸而無執賦詩歌頌百帙五車蔡應等之俳優揚雄悔為童子聖人不作雅鄭誰分其五言為家則蘇李自出曹劉偉其風力潘陸固其枝葉爰及江左稱彼顔謝箴繡鞶帨無取廟堂宋初迄于元壽多為經史大明之代實好斯文高才逸韻頗謝前哲波流相尚滋有篤焉自是閭閻少年貴游緫角罔不擯落六藝吟詠情性學者以慱依為急務謂章句為專魯淫文破典斐爾為功無被於管絃非止乎禮義深心主卉木逺致極風雲其興浮其志弱巧而不要隠而不深討其宗途亦有宋之風也若季子聆音則非興國鯉也趨室必有不敢荀卿有言亂代之徴文章匿而采斯豈近之乎偃武脩文論李竦國有二柄以濟人天有四時以成嵗文武者君之威惠春秋者天之生成故人君法天時順人望人歸於徳天應以時莫不奉此而寧災由斯而康俗所謂文者足以經邦國所謂武者足以定禍亂故武在合變不可一黷文貴經久可守為常請借前事而明之庶斯得矣夫以堯舜揖讓湯武干戈干戈在乎止武揖讓資乎偃武故得享國日久多歴年所三王既徃霸者是繼晉文伐原以示信齊桓勤王以稱徳宋殤好戰以殞越徐偃專文以喪亡王霸陵夷列於秦漢始皇威懾六國建萬代業隳城郭焚詩書卒使宗廟為墟身殞下國黷武之徴也高皇夷秦項誅韓彭陸生著書叔孫制禮脩文之漸也光武以長者戡難孟徳以應變即戎故得擒樊崇破袁紹雖未悉於至理道亦存乎息戈晉文之對何曾不聞經國惠皇之溺賈后竟至破家吳王石頭之都劉備益州之地但區區於守險曽不暇於修文後魏則多難臨朝後周則經國日淺雖孝文崇禮制服衣冠未能倒載干戈休放牛馬武帝降高緯戮晉公甲兵未寧中道而殞武則不可文則不如東晉之僅保江山宋祖之草創社稷道成以殷憂啓祚蕭衍以戡定興王陳主以好内亡隋皇以征遼喪皆不明於文武適足為我驅除況高祖端拱無為太宗大功繼統高宗致位於𤣥黙中宗御俗以康寧睿宗之恭膺大寳𤣥宗之克清海内肅宗之收復二都皇帝之光有六合方今四夷向化萬姓歸心緫七聖之殊勲正百王之墜典然干戈未息瘡痍未瘳修文之期取則不遠偃武之義今則時哉質文論李華天地之道易簡易則易知簡則易從先王質文相變以濟天下易知易從莫尚乎質質弊則佐之以文文弊則復之以質不待其極而變之故上無從暴下無從亂記曰國奢則示之以儉國儉則示之以禮禮謂易知易從之禮非酬酢裼襲之煩也儉謂易知易從之儉非茅茨土簋之陋也盖逹其誠信安其君親而己質則儉儉則固固則愚其行也豐肥天下愚極則無恩文則奢奢則不遜不遜則詐其行也涸瘠天下詐極則賊亂故曰不待其極而變之固而文之無害於訓人不遜而質之艱難於成俗若不化而過則愚之病淺於詐之病也無恩之病緩於賊亂之極也故曰莫尚乎奢也奢而後化之求固而不獲也利害遲速不其昭昭歟前王之禮世滋百家之言世益欲人專一而不為詐難乎哉吉㓙之儀刑賞之級繁矣使生人無適從巧者弄而餙之拙者眩而失守誠偽無由明天下浸為陂池蕩為洪荒雖神禹復生誰能救之夫君人者脩徳以治天下不在智不在功必也質而有制制而不煩而己太康啓子禹孫當斯時有堯舜遺人親受禹之賜國有羿奪内則夏之六卿外則夏之四岳而羿浞愚弄鬭爭内外黙然一以聴命至少康艱難而後復原由一無由字是觀之則聖有謨訓何補哉漢高除秦項煩苛至孝文恭黙仁儉斷獄幾措及武帝脩三代之法而天下荒耗則文不如質明矣漢氏雖歴産祿吳楚之亂而宗室異姓同力合心一舉而安且漢徳結於人心不如夏家諸吕吳楚之強倍於羿浞安漢至易而復夏至難何也周徳最深周公大聖親則管蔡為亂逺則徐奄並興四一無此字夷多難復子一無子字明辟兼虞夏商之典禮後王之法備矣太平之階厚矣至成王季年而後理唯康王垂拱囹圄虛空逮昭王南征不返因是陵夷則郁郁之盛何為哉周法六宫備職六宫備數四時盛祭車服盛􅎖至於下國方五十里卿大夫士之多軍帥之衆大聘小聘朝覲㑹同地狹人寡不堪覲謁大何得不亂小何得不亡記云周之人強民一作仁窮賞罰故曰殷周之道不勝其弊考前後而論之夏衰失於質而無制周弱失於制而過煩故也愚以為將求致理始於學習經史左氏國語爾雅荀孟等家輔佐五經者也及藥石之方行於天下考試仕進者宜用之其餘百家之說䜟緯之書存而不用至於䘮制之縟祭禮之繁不可傋舉者以省之考求簡易中於人心者以行之是可以淳風俗而不泥於坦明之路矣學者局於恒教因循而不敢差失一作失於毫釐古人之說豈或盡善數骨肉之罪而褒叔向不忍聞之言而書昭伯敬龜筴之信而陳僂句使不仁之人萌芽賊心而仁義之士閉目掩巻何如哉其或曲書常言無禆世教不習可也則煩潰日亡而易簡日用矣海内之廣兆民一作億兆之多無聊於煩彌世曠久今以簡質易煩文而便之則晨命而夕周踰年而化成蹈五常享五福理必然也孔子言以約失之者鮮矣與其不遜也寧固傳曰以欲從人則可記曰大樂必易大禮必簡顔子曰無施勞經義可㨿也如是為政者得無以為惑乎一作皆唐文粹文論顧況周語之畧曰孝敬忠信仁義智勇教惠讓皆文也天有六氣地有五行此十一者經緯天地叶和神人名之為文其實行也文顧行行顧文文行相顧謂之君子之文為龍為光上古云言之無文行之不遠堯之為君聦明文思文王既没文不在兹乎文王之代草木鳥獸皆樂文王之沼曰靈沼文王之臺曰靈臺虞芮不識文王入文王里所見耕者讓畔行者讓路班白不提挈自相謂曰吾黨之小子不可治於君子之庭詩人羙之云文王斷虞芮之訟晉文與楚子戰而霸謚曰文公夫以伏羲之文造書契黄帝之文垂衣裳重華之文除四㐫舉八元周公之文布法于象魏夫子之文木鐸狥路此其所以理文也伊尹之文放太甲霍光之文廢昌邑吕尚之文殺華士穰苴之文斬莊賈毛遂之文定楚從藺相如之文奪趙壁西門豹之文引漳水沉女巫建安正始洛下鄴中吟詠風月此其所以亂文也夫以文求士十致八九理亂由之君臣則之舜堯禹湯有文桀紂幽厲無文太顛閎夭有文飛亷惡來無文昔霍去病辭第曰匈奴未㓕無以家為於國如此不得謂之無文范蔚宗著後漢書其妻不勝珠翠其母唯薪樵一厨於家如此不得謂之有文且夫日月麗於天草木麗於地風雅亦麗於人是故不可廢廢文則廢天莫可法也廢天則廢地莫可理也廢地則廢人莫可象也郁郁乎文哉法天理地象人者也周易賛乾曰大哉乾元萬物資始賛坤曰至哉坤元萬物資生唯大者配乾至者配坤幽者賾鬼神明者賾禮樂不失於正謂之文編年紀傳論皇甫湜論曰古史編年至漢史司馬遷始更其制而為紀傳相承至今無以移之歴代論者以遷為率私意盪集本文粹作蕩古法紀傳煩漫不如編年予二本作湜以為合聖人之經者以心不以跡得良史之體者在適不在同編年紀傳繫於時之所宜才之所長者耳何常之有故二本作夫是非與衆人同辯善惡得聖人之中不虛羙不隠惡則為紀為傳為編年是皆良史矣若論不足以折星極辭不足以壯二本作杜無窮雖為紀傳編年斯皆罪人且編年之作豈非以事繫日以日繫月以月繫時以時繫年者哉司馬氏作紀以項羽承秦以吕后接之亦以歴年不可中廢年不可闕故書也觀其作傳之意將以包該事跡叅貫話語纎悉百代之務成就一家之說必新制度而騁二字集作然後馳才力焉又編年之史二本作紀事束於次第牽於渾并必舉其大綱而簡於叙事是以多闕載多逸文乃别為著錄以備時二本作書之語言而盡事之本末故春秋之作則為尚書左氏二本作傳之外又為國語可復省左史於右合外傳於内哉故合之則繁離之則異削之則闕子長病其然也出太古之軌鑿無窮之門作為紀傳世家表志首尾具叙錄表裏相發明庶為得中以是無媿太初以來千有餘嵗史臣按躅文人比踵卒不能有所改張奉而遵行傳以相授斯亦竒矣自出太古至竒矣七十一字二本作于是草舊典開新程為紀為傳為表為志首尾俱叙述表裏相發明庶為得中將以垂不朽自漢至今代以更八年幾歴千其間賢人摩肩史臣繼踵推今古之得失論述作之利病各擢聞見競誇才能改其規模殊其體統傳以相授奉而遵行而編年之史遂廢盖有以也唯荀氏為漢紀裴氏為宋畧強欲復古皆為編年然其善語嘉言細事詳正二本作說所遺多矣如覽正史方能備明則褒貶三字二本作則其宻漏得失章章於是矣今之作者苟能遵紀傳之體裁文粹作制同春秋之是非文敵遷固直蹤二本作如南董亦無上矣儻謬乎此則五字二本作儻捨源而亊流棄意而徴跡雖服仲尼之服手握二本無此字絶麟之筆等古人之章句署王正之月日謂之好古則可矣顧其書何如哉人文化成論吕温易曰觀乎人文以化成天下能諷其言盖有之矣未有明其義者也嘗試論之夫一二相生大鈞造物百化交錯六氣節宣或隂闔而陽開或天經而地紀有聖作則寔為人文若乃夫以剛克妻以柔立父慈而教子孝而箴此室家之文也君以仁使臣臣以義亊君予違汝弼獻可替否此朝廷之文也三公論道六卿分職九流異趣百揆同歸此官司之文也寛則人慢紏之以猛猛則人殘施之以寛寛以濟猛猛以濟寛此刑政之文也樂勝則流遏之以禮禮勝則離和之以樂與時消息因俗變通此教化之文也文者盖言錯綜庶績藻繪人情如成文焉以致其理然則人文化成之義其在兹乎而近代謟諛之臣特文粹作將以時君不能則象乾坤祖述堯舜作化成天下之文乃以旂常冕服章句翰墨為人文也遂使君人者浩然忘本沛然自得盛威儀以求至理坐吟詠而待升集作太平流蕩因循敗文粹作闇而未悟不其痛歟必以旂常冕服為人文則秦漢魏晉聲明文物禮縟五帝儀繁三王可曰煥乎其有文章矣何衰亂之多也必以章句翰墨為人文則陳後主隋煬帝雍容綺靡洋溢編簡可曰文思安安矣何㓕亡之速也覈之以名義硏之以情實既如彼較之以今古質之以成敗又如此傳不云乎經緯天地曰文禮不云乎文王以文理文粹作治則文之時義其大矣哉焉可以名數末流雕蟲小伎厠雜其間也文粹作乎文章論李徳裕魏文典論稱文以氣為主氣之清濁有體斯言盡之矣然氣不可以不貫不貫則雖有英辭麗藻如編珠綴玉不得為金集作全璞之寳矣皷氣以勢壯為羙勢不可以不息不息則流蕩而忘返亦猶絲竹繁奏必有希聲窈眇聴之者恱聞如川流迅激必有洄洑逶迤觀之者不厭從兄翰常言文章如千兵萬馬風恬雨霽寂無人聲盖為是也集作矣近世詔命唯蘇廷碩叙事之外自為文粹作謂文章才實有餘用之不竭沈休文獨以音韻為切重輕為難語雖甚工㫖則未逺夫荆璧不能無瑕隋珠不能無纇文㫖高妙豈以音韻為病哉此可以言規矩之内未集作不可以言文章外意也較其師友則魏文與王陳應劉討論之矣江南唯於五言為妙故休文長於音韻而謂靈均已文粹作以來此秘未覩不亦誣人甚矣古人辭高者盖以言妙而蜀本作言妙工文粹作言妙而工適情不取於音韻曹植七哀詩有徊泥諧依四韻王粲詩有攀原安三韻班固漢書賛及當時詞賦多用協韻猗歟元勲包漢舉信是也包文粹作左意盡而止成篇不拘於隻耦文選詩有五韻七韻十一韻十三韻二十一韻考今之文字四韻六韻以至一百韻類皆䨇韻無有隻韻者故篇無足蜀本作定曲詞寡累句譬諸音樂古辭如金石琴瑟高於至音今文如絲竹鞞皷廹於促節則知音文粹作即知聲律之為弊也甚矣世有非文章者曰辭不出於風雅思不越於離騷模寫古人何足貴也余曰譬諸日月雖終古常見而見而光景常新此所以為靈物也余常為文箴今載於此曰文之為物自然靈氣恍惚文粹作惚怳而來不思而至杼柚得之澹而無味琢刻藻繪珍集作彌不足貴如彼璞玉磨礱成噐奢者為之錯以金翠羙質既雕良寳斯棄此為文之大㫖也同前牛希濟聖人之徳也有其位乃以洽化為文唐虞之際是也聖人之徳也無其位乃以述作為文周孔之教是也纂堯舜之運以宫室車輅鐘皷玉帛之為文山龍華蟲粉米藻火之為章亦已鄙矣師周孔之道忘仁義敎化之本樂霸王權變之術困於編簡章句之内何足大哉況乎澆季之下淫靡之文恣其荒巧之說失於中正之道兩漢以前史氏之學猶在齊梁以降國風雅頌之道委地今國朝文士之作有詩賦䇿論箴判賛頌碑銘書序文檄表記此十有六者文章之區别也制作不同師模各異然忘於教化之道以妖艶為勝夫子之文章不可得而見矣古人之道殆以中絶頼韓吏部獨正之於千載之中疑作下使聖人之㫖復新今古之體分而為四崇仁義而敦教化者經體之制也假彼問對立意自出者子體之制也屬詞比事存於褒貶者史體之制也又有釋訓字義幽遠文意觀之者久而方逹乃訓誥雅頌之遺風即皇甫持正樊宗師為之謂之難文今有司程式之下詩賦判章而己唯聲病忌諱為切比事之中過於諧謔學古之疑作文者深以為慙晦其道者揚袂而行又屈宋之罪人也且文者身之餙也物之華也宇宙之内㣲一物無文乃頑也何足以觀且天以日月星辰為文地以江河淮濟為文時以風雲草木為文衆庶以冠冕服章為文君子以言可教於人謂之文垂是非於千載殁而不朽者唯君子之文而己且時俗所省者唯詩賦兩途即有身不就學口不知書而能吟詠之列是知浮艶之文焉能臻於理道今朝廷思堯舜洽化之文莫若退屈宋徐庾之學以通經之儒居爕理之任以楊孟為待從之臣使仁義治亂之道日習於耳目所謂觀乎人文可以化成天下也表章論人君尊嚴臣下之言不可達於九重表章之用下情可以上達得不重乎歴觀徃代策文奏議及國朝元和以前名臣表疏詞尚簡要質勝於文直指是非坦然明白致時君易為省覽夫聰明睿􅈒之主非能一一奥學深文研窮古訓且理國理家理身之道唯忠孝仁義而己苟不踰是所措自合於典謨所行自諧於堯舜豈在乎屬文比事況人君以表疏為急者竊以為稀況覽之茫然又不親近儒臣必使傍詢左右小人之寵用是為幸儻或改易文意以是為非逆鱗發怒畧不為難故禮曰臣事君不授其所不及盖不可援引深僻使夫不喻且一郡一邑之政訟者之辭蔓引數幅尚或棄之況萬乘之主萬機之大焉有三復之理國史以馬周建議不可以加一字不可以减一字得其簡要又杜甫嘗雪房琯表朝廷以為庾辭儻端明易曉必庶幾免於深僻之弊夫僻事新對用以相誇非切於理道者明儒尚且杼思移時豈守文之主可以速達竊願復師於古但寘於理何以幽僻文煩為能也文苑英華巻七百四十二
