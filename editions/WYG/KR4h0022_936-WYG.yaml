body:
  text: 文苑英華巻九百三十七宋李昉等編宰相二相國義陽郡王李抱真墓誌一首相國武昌節度元稹墓誌一首相國義陽郡王李公墓誌銘穆員皇唐九葉天啟元聖運并中否蓋有苖不恭舜德於是乎盛獫狁孔熾周道於是乎興而我相國太保義陽王文武命代經綸應期柱石將傾舟楫未濟腹心王畧爪牙天罰芟夷大憝覆冐生人公諱抱真字太真本姓安氏世為凉州盛族高祖修仁佐太宗征伐益大其家寵位本州啟封申國曽祖興表作永達開府儀同三司左驍衛大將軍祖恪表作懐恪陳州司馬贈兵部尚書考濟管贈太子太保或才光一作克于時或道屈于命從父兄司徒凉國公抱玉事肅宗代宗勲著王室錫以天姓代宗之初僕固懐恩怙兵犯順公時再命汾州别駕隨州陷焉懐恩雅竒公才而懼公之不同所以待公與衛公者偕切公竟以勇智自脫投身京師上方以懐恩為憂不啻於禄山思明之難遣公進討公曰郭子儀領朔方之衆人多思之懐恩因人之心以邀其勢紿其衆曰子儀為魚朝恩所戮刼而用之今若復子儀之位可不戰而克上嘉而納之其後懐恩父子皆敗朔方有衆洎西北兩蕃望子儀而頓伏皆如公䇿拜殿中少監擢綏清列澤盛當時卿大夫賢者從之遊朝論美價於斯為重大駕幸陜欲遂都洛陽公入陳婁敬子房之説且曰臣見犬戎今已遁去翌日長安告至如公之言代宗器公之才將試其用詔兼御史中丞充陳鄭澤潞節度留後公以所奉之主則從父兄司徒公乃深惟大雅明哲之義罷請留府願効列郡優詔從之拜澤州換覃懐二邦之人得公失公皆如父母未幾復統留府之政累加御史中丞左散騎常侍并領磁邢二州増秩加邑國之報也今上即位用聦明神武照臨不庭命方叔召虎鎮衛四國是用授以黄鉞俾以專征而方命之徒畏威先舉田悦以暴兵五萬冦我東鄙却邢州圍臨洺守將乘城如山不㧞忿志且恥既悉索境内且乞師於隣掘地于雲壕疊數合上絶飛鳥下及黄泉公躬執鉦鼔屢挫其銳詔命太原節度使今侍中馬公與公合縱且曰盡敵非疑是摧堅陣於雙岡釋重圍於二城殲逆徒於洹水凡三戰三北退伏于魏窘如囚拘逆將朱滔誘今司徒王公合范陽恒山之衆來為悦援公與馬公洎郡帥屯于魏橋相持卒嵗無何京師有朱泚之亂鑾輿外次郡率失圖蒼黄還師唯恐在後公徐統士馬退次洺州旋奉詔書俾勤所職于時將卒倦戍乆矣及其還也如川壅而潰勢不可遏公以至誠大義發為號令俾四郊激勤王之志三軍忘思歸之心進師漳河獨壓强冦先是與公戮力太原朔方盟津洎神䇿四帥十萬之旅一朝雨散孤軍特立天下危之公忠貫天地機先鬼神動如雷霆峙若山岳銷難於未朕成功於無戰氛祲四廓豺狼坐馴上在奉天躬禹湯勃興之德曰萬方有罪罪予一人發號改元與人更始公奉揚天澤浹于四隣増日月之明廣雷雨之施由公而復爵位者今司徒王公洎魏博青齊三帥凡三道數十州百萬旅歸于聖理公之功也朱滔以幽燕勁卒獯虜驍騎將欲横行咸洛崛強中原輔其兄泚窺伺神器公以竒謀正義間説成德成德與滔契重婚姻事同艱阻與公交鋒對壘積為敵讐乃為國為公忿滔如響將欲自竭先誠於公投我以可疑報之以必信公與王公之相見也王公旌斾車騎亘如長雲晦日蔽天風驅而至公以數騎徑造其前王公叱去左右躍鞍而下交臂號謼聲聞昊天即日兩軍億萬之師悉如兄弟公遂入其壘授之以畫明日合勢大破滔軍于涇城之西滔䑕竄舊巢至死不振逆泚折臂羣􅇯奪魄諸將聞風益壯踵武獻功既而妖彗滅星纒復鯨鯢戮九字一作妖慧滅光星纒復覩恐非海水清而振曜靈威興復昌運自我而始其天啟歟公使将如臂使卒如指决勝于千里之外者則河中㧞淮夷殄分彼成功什三四焉初臨洺之解遷工部尚書洹水之勝轉兵部魏橋之勤加右僕射漳濵之固轉左僕射同中書門下平章事朱滔之敗遷司空食實封五百户貞元初上有事于上帝列祖公得請㑹朝宣室受釐明堂布政對揚丕顯錫命藩庶方寄股肱而藩屏是切方屬周召而桓文是賴數月受命還鎮公之鎮于潞也垂三十年撫五郡四封之人作之醫作之師生成之富庶之耆老詣闕願刋金石詔俾時宰揚其頌聲迺者大梁東平二帥交惡僉使上介質正於公公以天道助順神明與直裁而辨之司徒王公以不二心合公一德資稟明畧有如元龜議者謂上黨之俗地狹而力氣寒堅水蓋戰國武卒之餘也故長於歩冀之地土馬之所生故長於騎而公與王公天下之傑也各因其俗之所長以伯諸侯嗚呼使公將歩王公將騎以征四方以奬王室亂臣賊子誰敢萌心上天為何而降公疾願守謙遜固辭崇高請罷三公拜章七還天子重違宗臣之請又迫蒼生之望退授僕射而安危注意之任猶以煩之十年六月一日薨于位春秋六十有二皇上震悼輟朝三日所以贈襚之品禮極數殫中貴護䘮達于洛泗冬十月九日葬於澠池祔先君太保之塋禮也公自生勲門幼被儒術長覽太史公班孟堅書服從衡之言至於兵法尤其天性而體乾之剛利坤之貞煦春之仁厲秋之義蹈禮之節包樂之和是以文昭扶翌武著戡靖行備九德政成百度忠與勲偕業與時并兵符相印與身終始開國傳家與國無窮盛矣哉公再娶于鄭華宗令德其偶而一前夫人榮陽郡夫人皇洛陽令汲之子也不幸早世後夫人沂國夫人皇洛州壺關令鞏之子也昔以賢輔貴今以哀報榮既大公門且肥公室初公之棄三軍也嗣子前殿中侍御史緘為墮淚所迫俾嗣公位緘曰為先人之嗣者茍生非忠冒死非孝深惟自免之計既而忠孝全焉次子幼成季子幼清次女適清河崔𢎞雅有幹父裕母之美長女幼女並從西方之教各得其㫖緘等以公成功盛德列于史策流于歌頌傳于故老之口巍巍乎其不朽矣若邱壑遷化嵗序超忽則貞石是賴不可以不識焉爰假菲詞俾鋪𤣥壤銘曰隂陽成嵗百物以生聖賢撫運天下以平神武嗣統朝陽啟明照臨萬邦震曜不庭蠢彼昏迷為國未詳乃命徂征風行王化雷動天聲靡守不固何攻不傾狺狺一作咆哮材武率循忠貞茫茫氛祲於變廊清入覲于王惟周疑作國之禎帝念藩翰復我長城宜錫難老以主夏盟柰何昊穹天㭬一作謝壯齡善積存没報窮哀榮勒勲王府遺業生靈歸我真宅封山表塋永閉泉户與天壤并此篇元在九百三十八巻職官門今移于此相國武昌軍節度觀察處置等使正議大夫檢校户部尚書鄂州刺史兼御史大夫賜紫金魚袋贈尚書右僕射河南元公墓誌銘白居易公諱稹字微之河南人六代祖巖隋兵部尚書封平昌文粹如此是英華作武平集作昌平並非公五代祖𢎞隋北平太守高祖義端魏刺史曽祖延景岐州㕘軍祖悱南頓縣丞贈兵部員外郎考諱寛比部郎中舒王府長吏贈尚書左集本文粹作右僕射妣滎陽鄭氏追封陳留郡太夫人公即僕射府君第四子後魏昭成皇帝十九代孫也公受天地粹靈生而岐然孩而嶷然九歲能屬文十五明經及第二十四調判入四等署祕書省校書郎二十八應制䇿入三等拜左拾遺即日獻教本書數月間上封事六七憲宗召對言及時政執政者疑忌出公為河南尉丁陳留太夫人憂哀毁過禮杖不文粹作而能起服除之明年授監察御史使於蜀按任敬仲獄得情又劾奏東川帥違詔條過籍税又奏平塗三輔等八十八家寃事名動三川三川人慕之其後多以公姓氏名其子朝廷疾二本作病東諸侯不奉法東御史府不治事命公分臺而董之時有河南尉離局從軍職尹不能止監察御史死其柩乘傳入郡二本無此二字入郵郵吏不敢詰内園司械繫人踰年臺府不得知飛龍使匿趙氏亡命奴為養子主不敢言浙右帥一作使封杖杖一作結决吉安令至死子不敢愬凡此者數十事或奏或劾或移嵗餘皆舉正之内外權寵臣無奈何咸不快意會河南尹有不如法事公引故事奏而攝之甚急先是不快者乘其便相噪嗾坐公專達作威黜為江陵士曹掾居四年徙通州司馬又四年移虢州長史長慶初穆宗皇帝二本無此二字嗣位舊聞公名以膳部員外郎徴用既至轉祠部郎中賜緋魚袋知制誥制誥王言也近代相沿多失於巧俗自公下車俗一變至於雅雅一二本字作二三變至於典譽時謂得人上嘉之數召與語知有輔弼之才二本作知其有輔弼才擢授中書舍人賜紫金魚袋翰林學士承㫖尋拜工部侍郎旋守本官同中書門下平章事公既得位方將行已志答君知無何有憸人以飛語搆同位詔下案騐無狀上知其誣全大體與同位兩罷之出為同州刺史始至急吏緩民省事節用嵗收羨財千萬以補亡户逋租其餘因弊制事贍上利下者甚多二年改御史大夫浙東觀察使将去同同之耆幼鰥獨泣戀如别慈父母遮道不可遏送詔使道集作導呵麾鞭有見血者路闢而後得行先是明州嵗進海物其淡蚶非禮之味尤速壞課其程日馳數百里公至越未下車輟奏罷自越抵京師郵夫獲息肩者萬計道路歌舞之明年辨沃瘠察冨貧審二本作均勞逸以定税籍越人便之無流庸無逋賦又明年命吏課七郡人冬築坡䧜春貯雨水夏溉旱苗農人賴之無凶年二本無此三字無餓殍在越八載政成課高上知之就加禮部尚書降璽書慰諭以示旌寵又以尚書左丞徵還旋改户部尚書鄂州二本作鄂節度使在鄂三載其政如越太和五年七月二十二日遇暴疾一日薨于位春秋五十三上聞之軫悼不視朝贈尚書左二本作右僕射加贈賜二本作轉贈焉前夫人京兆韋氏懿淑有聞無禄早世生一女曰保子適校書郎韋絢今夫人河東裴氏賢明知禮有輔佐君子之勞封河東郡君生三女曰小迎未笄道衛道扶齠齔一子曰道護三嵗仲兄司農少卿程二本作積姪御史臺主簿某等銜哀襄事裴夫人韋氏長女聚諸孤等號護廧翣以六年七月十二日祔葬于咸陽縣奉賢鄉洪瀆原從先宅兆也公著文一百巻題為元氏長慶集又集古今刑政之書三百巻名類集並行於代公凡為文無不臻極尤工詩在翰林時穆宗前後索詩數百篇命左右諷詠宮中呼為元才子自六宮兩都八方至南蠻東夷國皆冩傳之每一章一句出無脛而走疾於珠玉又觀其述作編纂之㫖豈止於文章刀筆哉實有心在於安人治集作活國致君堯舜致身伊臯耳抑天不與耶將人不幸耶予嘗悲公始以直躬律人行而勤之則坎􅇄而不偶謫瘴鄉凡十年髪斑白而來歸次以權道濟世變而通之又齟齬而不安居相位僅三月席不煖而罷去通介進退卒不獲心是以法理之用止於脩二本作舉一職不布於庶官仁義之澤止於惠一方不周於四海故公之心不足也逢時與不逢時同得位與不得位同富貴與浮雲同何者時行而道不行身遇而心不遇也執友居易獨知其心以泣濡翰書銘於二字作于墓曰嗚呼微之年過知命不謂之夭位兼將相不謂之小然未康吾民未盡吾道在公之心則為不了嗟乎哉二字文粹作惜或惜哉道廣而俗隘時矣夫心長而運短命矣夫嗚呼微之已矣夫文苑英華巻九百三十七
