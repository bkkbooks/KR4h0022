body:
  text: 文苑英華巻九百四十八宋李昉等編職官十周大將軍桞遐墓誌一首周大將軍蕭太墓誌一首周大將軍趙廣墓誌一首唐邢國公李宻墓誌一首周大將軍聞嘉公栁遐墓誌庾信君諱遐周書作霞字子昇河東觧縣人也秦始征晉之地漢開平越之鄉律中夷則星居鶉首况復荘謀於衞既為社稷之臣喜對於齊無廢諸侯之職祖叔珍宋員外散騎常侍義陽内使有徐邈之應對居於散騎之省有汲黯之正直理於淮陽之郡父季逺臨川王諮議叅軍冝都太守蘭臺石室是所洽聞白馬飛狐逾髙詞氣西都呉一作英融擅名江表言談相㑹宛如舊焉君膺令徳之靈禀冲和之氣齠齓䯻髪夙智早成愛敬自天䖍㳟得性含仁抱義履信居貞世父儀同忠惠公特加噐異乃謂公曰吾昔逮事伯父太尉公見語云我昨夣汝登一髙樓樓盡峻麗吾以坐席乞汝汝或冨貴恨吾不及見耳吾向􅂓復晝􅃦又夣將昔時坐席還復賜汝汝位官當復見及王祥佩刀世為卿族鮑永騘馬家傳司𨽻以此連類差無慙徳輕車西昌侯作藩襄漢君時年十二以民禮脩謁進止端詳神情雅正侯目送之不輟試遣左右踐君衣􅅂欲視舉動君徐歩稍前曽無顧眄魏侯之見劉廙不覺歛容漢主之觀田鳯遂令題柱比之今日曽何足云驃騎廬江周書作陵王帝子出藩懸衡髙選以君華望召為主簿張坦直諫既稱荀令之香鄒湛知言彌見羊公之徳諮議府君於都薨背君奔赴六日即届京師形骸毁瘁不復可識靈柩泝江中川薄晩亂流乗選廻風反㠶舟中之人相視失色抱棺號慟誓不求生俄爾之間風波即静咸以君精誠所致成都孝子自赴江流桂陽先賢身彰野火並存靈柩咸可傷嗟太夫人乳間發瘡醫云惟得人吮癑血或望可差君方寸已亂應聲即吮旬日之間遂得痊復君之事親可謂至矣從兄右衞擁旌嶺表若疑作苦相携致昔焉逰志氣為馬援所知班嗣才學為班彪見賞復聞於今日矣乃除永化縣令静尋欹案或吟長岑之逺乍撫鳴琴不以河陽為陋日南金柱合浦珠泉莫肯一作曽莫經懐未嘗留目觧巾平西邵陵王法曹叅軍仍轉尚書工部侍郎始入禮闈既登蘭閣尚書僕射陳郡謝舉人望國華引君言論謂同位坐曰江漢英靈見於此矣西中郎岳陽王以綠車之重臨西河之牧敕用君為本州治中尋遷别駕王叔理以品物流名陳仲舉以題軒馳譽君之展驥兼而有之及乎大盗移國王室騷然月動星摇雲平虹直岳陽王承制硤左當壁漢南天綱所頓英賢必集授君散騎侍郎吏部員外郎散騎常侍兼太子侍講監儲甲觀事重史冊侍講桂宫名髙張禹俄遷車騎大將軍侍中開府儀同三司餘如故方之驂乗霍去病為侍中譬彼將兵公孫敖為驃騎足以照曜六府謨明九徳豈直允諧上將匡賛中軍而已哉既而言從梁國服政鄷都管仲有詞即受下卿之禮臧孫見徳還奉嘉賔之宴有詔授使持節驃騎大將軍開府儀同三司霍州諸軍事霍州刺史犀節去關衮衣馳傳迎郊則文學前驅賔衞則邦君負弩直以五溪遼逺馬伏波之思歸三湘卑濕賈長沙之不願是以冝城刺史直㑹鹿門白沙故地仍留龍種天厲弗戒奄然終極天和某年歸窆於襄陽白沙之舊塋君噐宇詳正風鍳𢎞敏澡身浴徳㳺藝依仁汝南令望扶風長者不言財利王夷甫之為徳不談人物阮嗣宗之為人從容亂離之機保此令徳舒巻風雲之際無妨貴仕張衡渾儀之後即賦歸田杜預沉碑已来遂停鄉里王仲宣有讀書之樓諸葛亮有彈琴之宅實欲因此謝病閑居終焉鳴琴在膝或對故人寳劔自随時過稚子百年俄頃嗚呼哀哉遂使君子之陵止埋銅劔賢臣之墓唯銘石凾銘曰有莊有惠居魯居衞義是随時才堪濟世比部尚書東京司𨽻必復其始侯君相繼華盖一岳文昌一星青衿辯志童子離經義朂非馬書勤映螢徃年靈柩漂泊江沲以君哀慟川后停波揚名北海馳譽西河誰登九折不入朝歌蔚炳胥變攀陪遂逺白塵随軒丹暈附冕位參上將榮兼本選蛇盤綬結龜廻印轉来朝平樂歸政咸陽蕃維即啓軍幕仍張起茲禮數峻此戎章長離宛宛刷羽陵江世急奔流年催驚隼滅没頓轡扶桑摇軫智士石折賢人星殞西鄂芝枯南陽菊盡愴焉啓首疑作手生榮終極相杵輟舂鳴機罷織㷀㷀𦙍子視隂餘息霜露履之哀哉欒棘龍巢北望鳯闕前觀松長風逺地厚泉寒書埋簡落琴覆絃寛贈行之册書而納棺故周大將軍義興公蕭公墓銘前人昔司徒之敷五教當堯讓之初丞相之惣萬機值秦亡之後若殷人受氏乃承㣲子之封梁運應圖實啓延陵之國公諱太周書南史並作泰犯周太祖諱改作太字世怡蘭陵人也太祖文皇帝之孫鄱陽忠烈王之子𣲖别天潢支分若木直幹自髙澄源已逺茂親明徳是稱毛畢之功宗子維城乃建邢茅之國大同元年年十六封豐城縣開國食邑五百户山臨鶴塞非無陶侃之賔氣連斗牛即有張華之劔觧褐給事中仍太子洗馬公子出身非郎官而同品中朝洗馬異式道而前驅以丘疑居之誠為髙選大同元年入直殿省其年轉太子中書舎人周書作太子中舎人南史止作中書舎人疑並厯二官南宫宿衞職司蘭錡北閣從班榮叅顧問通籍两宫得賢斯在大同三年授持節仁威將軍譙州刺史褰帷祥氣之境刺舉消憂之地南陽風俗文學更多美稷相迎童兒逾逺既而亂離瘼矣王室騷然大夫有行役之悲君子有無期之怨背關懐楚扁舟而行江漢奉當壁之君張華歸中興之主承聖元年拜侍中無雙對問實踵武於丁鴻多識舊章足齊衡於王粲二年除持節平西將軍臨川内史仍轉平南將軍桂陽内史尚方鑄劔再轉金龜御史分符雙封銅虎豈直鄧攸清白見稱五鼔之歌劉寵亷能名為一錢之郡遂以天保未定王途多梗還呉不可歸蜀無路臨淄負海飜然改途竄身清漳垂趐渤海蒙授車騎大將軍散騎常侍仍為持節都督永州刺史而秦亭厭境邾柝聞城鼔角地鳴將軍天落雖復瓶缶聽聲無防於地道冠䋲柴疑結不却於雲梯請命受降翻歸都䕶周朝以楚材晉用不停於平章趙壁秦求無論於覊逺以保定五年降使持節驃騎大將軍開府儀同三司義興郡開國公食邑一千三百户天和二年授使持節都督蔡州諸軍事蔡州刺史楚頃襄之愛子既布衣而戍谷魏安釐之母弟亦羇旅於邯鄲憂既傷人降年不永春秋五十有一薨於蔡州之鎮送故入關空餘衮服歸軒在道還更垂帷嗚呼哀哉有詔贖官周書作贈本官加并洛衣三州刺史贈諡禮也五年十一月塟於長安北原摴里子之墳正臨武庫太史公之墓直對臯門銘曰𤣥鳥逺烈相土宏謨東封宋社西歛秦圖人承佐漢國紹開呉有美令徳茂親藩邸建國皇支承家帝弟率由冥㑹亮直天啓轅固聞詩唐都習禮博望之逺金華之宫文林講徳武帳參戎名書柱上䇿滿帷中託身淄右蒞政淮東秦降西逼楚澤南窮時驚獵火或懼秋風属期逺畧逢茲應變陣横十里兵圍一靣月暈孤城塵驚虚援春筍非糧秋蒿無箭垂趐卧虎夷矜輟戰時值懐来恩加始賞王爵愈峻戎章更上朱鷺才飛虞歌即響泣子留恨藏書長徃炎涼迭運一作送零落山丘霜芬幕月松氣陵秋嗟南國之王子成東陵之故侯周故大將軍趙公墓銘前人公諱廣字乾歸邵惠公之元孫豳孝公之長子若木拂日長虵委天龍圖幕河之光神鼎連雲之氣六辯搆字五運徴祥是以維嶽降神自天生徳凝脂㸃􅃮日角珠庭為子則名髙五都為臣則光照千里華盖中天之峰未階其峻虞淵浴日之水不盡其源嵗在琱車年方竹馬月内桂樹切問能訓石上木生懸思即悟年十一孝公薨㷀㷀在疚孺慕過禮泉驚孝水竹動寒林三行克宣八翼斯舉大周建國宗子維城設壝封人分司典命開國天水郡公食邑二千户元年授使持節驃騎大將軍開府儀同三司其年四月授都督秦州刺史孝公乆牧汧隴遺愛在人今見撫我君之子豈獨司𨽻之臺鮑宣累葉丞相之府韋賢重代二年拜大將軍方衞青之張幕册重元勲譬韓信之登壇榮髙獨拜武成元年遷都督興梁等十九州諸軍事梁州刺史嶓冡導􅃞乃濟漢之東流蔡蒙旅平實華陽之西極其年九月改封蔡國公食邑萬户地接韓城關隣楚鄣户封八縣恩深冦恂之功邑啓萬家事極曹叅之賞保定元年授少司冦犴户苔生囹關䈁動載酒属車幸無寃氣觀囚軍府或聽鳴琴二年轉一作勅守蒲城都督潼關等六防諸軍事其年閏月遷都督秦渭等十二州諸軍事秦州刺史公亟牧冀城頻藩隴坻豪桀歛手貪殘觧印加以上谷一作國精兵漁陽噪鼔北臨髙栁南望長榆匃奴下馬之山貴相藏酒之谷莫不逺慕威聲遥承風化二年奉詔向丼州迎皇后有文書手仲子之歸紀裂繻来卿為君逆自非名髙絶國威被和隣豈得稱族而行尊君之命四年授柱國大將軍昭陽以功髙見用項梁以名將當官以今方之彼有慙徳天和三年授都督陜虞等八州甘防諸軍事陜州刺史屈産垂棘既有滅虢之兵王官覊馬非無絶秦之路公以正正鼔旗閑閑車軌服叛威邉筭無遺䇿但以中外乆勞積斯災疾山川則並走群望賔客則諸侯在門是以請謁承明言歸湯沐方詢夏郊之祀或辯桑林之祟更除秦州刺史仍襲父爵􅃎國公分流之嶺未登晩塞之城空望大夫人以公羸􅇤悲泣相守胷氣交衝奄捐舘舎公頓伏苫􅃦水漿不入雖王人勸奪瘡鉅愈増母死於子子死於親慈孝之道一朝惣集大漸之辰春秋二十有九四關罷市三軍行哭言尋聽訟猶見寒棠還顧空營唯餘衰桞謚贈某官禮也六年六月歸塟於秦州之某原𤣥甲啓路追旌一作於驃騎之功龍旂贈行深悼東平之逺公亮直惟忠温㳟惟孝居之仁義􅎖以禮樂風神機警聦叡精明有仭於宫牆無形於喜愠金版玉䇿之記枕籍忘疲蘭葉芝花之圖膏映必舉碣石秋雲昭陽落月思風含臆言泉流吻翩翩書記則阮瑀陳琳荏荏風流則王濛謝眺語其百發弓絶於猿吟論其百中劍深於鴈陣枚乗之望梁苑不憚棄官樂毅之求燕路無辭千里至如應變將畧雷電立成帷帳謀猷孫呉闇合有品藻人理之志有清平天下之心鵬路忽催龍津遂壅嗚呼哀哉大宰早茂三荆長辭萬始撫飬遺孤連枝同氣馬援之誡兄子義存謹􅅚王况之事世叔情深愛敬同徳比義此之謂乎乃為銘曰御乾從紀乗離作聖白環讓徳𤣥珪受命平一地紐増輝天鏡傍􅄻數國前臨七政地属先登一作平隂時逢下武玉璜撥亂金縢光輔刋晉承家邢茅祚土波分建木𣲖流𤣥滬景命寅序徽猷淵塞忠有令圖孝為全徳山節蒞政桓珪守國瀚海將臨燕山行勒平樂髙宴金華說一作經論儒壁水親禮明庭相風待賦承露須銘乗舟向日䇿馬随星徳舉克明能賢允淑上將授脤元戎推轂趙失東漁敵亡南牧箭下遼城泥封凾谷衮衣頻露丹䄡亟卷約法情推繁辭理遣盗烏懸察疑蛇立辯人共官園家同野􅗀籋雲推轉風落仭星裂中台山傾左鎮夏楹舎爵殷階啓殯縿幕躐行明旍庭引秦川直望隴水分飛山河滿目容衞靈歸陵圖石馬車畵衮衣小山摇落長林變衰凄愴原隰荒凉宅兆樹宻人稀山多路小十里松城千年華表夜臺方寂窮泉無曉唐故邢國公李宻墓誌銘魏徴觀夫天造草昧之初有聖經綸之始原鹿逐而猶走瞻烏飛而未定必有異人間出命世挺生負問一作扛鼎之雄圖鬱㧞山之壯氣控御英傑鞭撻區㝢志逸風颷勢傾海岳或一丸請封凾谷或八千以割鴻溝夏殷資以興亡楚漢由其輕重懋功隳乎既立竒䇿敗於垂成仰龍門以摧鱗望天池而墜翼求之前載豈代有其人者哉公諱宻字𤣥邃隴西成紀人自種徳降祉𢎞道垂風導碧海之長瀾踈閬峰之遥構家傳餘慶明哲繼軌諭文徳則弼諧舜禹語武功則經綸秦漢其餘令望且公且侯垂翠緌拖鳴玉者盖亦耆舊未得盡傳良史莫能詳載矣曽祖弼周太師八柱國衞公祖曜周太保魏公父寛隋上柱國大將軍凉州緫管蒲山郡公並匡周之美吕望愧其嘉謀平呉之功杜預慙其逺畧公渥洼龍種丹穴鳯鶵降列象之𤣥精禀成形之秀氣雲生五色一日千里起家左親衞府東宫千牛備身趨馳武帳暉映廊廡出入龍樓光生道路隋文帝精華已竭義不斷恩始開凌長之源將致覆宗之禍公見機而作謝病言歸優㳺經史晦明藏用風塵靡雜賔友簡通交必一時之俊談必覇王之畧尚書令景武公楊素崖岸峻峙天資宏亮壁立千仭直上萬尋嗣關西之孔子追陜東之姬旦深謀逺鑒獨歩當時公年甫弱冠時人未許景武一見風神稱其傑出乃命諸子從而友焉並結以始終之期申以死生之分暨有隋二世肆虐黔首三象霧塞五岳塵飛妖災所臻匪唯血落星隕怨讟所動寧止石言鬼哭轍迹遍于天下徭戍窮于海外寃䰟塞宇宙白骨蔽原野墳壟發掘城郭丘墟萬里蕭條人煙斷絶公與楚公叶契共拯横流未息溟海之波㡬及昆岡之火亡自道中竄身草澤􅁬臂大呼群雄嚮起豹變梁楚鳯翔鞏洛據敖庾而塞轘轅登太行而臨白馬九服諸侯四方豪傑或跨州連郡或稱帝圖王合從締交争亡秦族者莫不驅茲青犢背彼黒山擊長轂以雷奔望髙旗而電集不期而㑹者以百千數遂大開幕府肇啓覇一作雄圖敷七徳以宣威掩八紘而取俊鱗羽畢萃草澤無遺於是發人文以化之播仁義以乗之應時機以鼔之惣群䇿以决之九野風馳六合雷駭彈壓趙燕震驚江漢世充甚昆陽之敗煬帝同望夷之禍化及師殱於黎陽建徳稽顙於河朔七國之地四為我有五都之所三在域中敵騎千群長戰百萬飲馬則河洛可竭作氣則嵩華自飛近無不懐逺無不肅聲溢寰宇威懾中外屬人神乏主以天下為已任荒裔佇来蘇之望遺離疑作黎有息肩之所雖寔下民伊頼然非上帝所臨壯志展於人謀雄圖屈於天命始先鳴於大樹終垂趐於群孽乃眷西顧舉茲東夏載驅周道来謁承明帝曰念功降茲休命上柱國邢國公拜光禄卿公雖威未振主自為謀盖當世舊部先附多出其右故吏後来或居其上懐漁陽之憤憤耻從呉耿後列同淮隂之怏怏羞與絳灌為伍負其智勇頗不自安俄属元帥秦王經營瀍洛亦親承祕䇿率卒先行既出鷄鳴之關方次休牛之塞詔命施號更盡嘉謀公想雲夣之偽遊慮青衣之詐反心辭魏闕之下志在江湖之上慕范蠡之髙蹈追赤松之逺逰熊耳峰危羊腸徑險降呉不可歸蜀無路短兵既接脩途已窮隂陵失道詎展㧞山之力騅馬不逝徒切虞兮之歌臨陣䘮元時年三十有七故吏上柱國黎陽緫管曹國公徐世勣等表請収塟有詔許焉體質貞明機神警悟五行一覽半靣十年雅善書劔尤精文史輕字一夫之勇學萬人之敵至于三令五申之法七縱七擒之功出天入地之奇拔幟擁沙之䇿莫不動如神化應變無窮負縱横之才遇風雲之㑹望紫氣以驤首凌扶摇而振翮䆫不召之衆問獨夫之罪從我如流三分將二遂有囊括四海之志併吞六合之心既而神噐有歸朝宗天闕率以從義之旅為勤王之師更名作望重自疑功髙是懼將逺遊以逃難飜途窮而及禍惜乎髙鳥未盡良弓遽折敵國猶梗謀臣已䘮天子過細桞以興嗟聞鼔鼙而軫慮雅重事人之節方申詔塟之禮粤以武徳二年某月日塟於黎陽山西南五里之平原禮也故吏徐世勣等或同嬰世網共渉難艱感意氣於一言託風雲於千載所恨並發唐代不列元凱之功俱為漢臣獨漏山河之誓是以慟深欒布悲甚向雄慮陵谷之推移勒斯銘於泉户庻使神逰楚國無慙項羽之臣䰟徃齊都不愧田横之冡乃為銘曰如馬唐臣猶龍周史宏道百世邁徳千祀帯地深一作長源極天峻峙玉種逾作俞潤蘭芳不已成形騰氣成象降精餘慶鍾美惟公挺生少表竒智早擅英聲符采發越志畧縱横隋道方衰始開陵長覩兹兆亂􅃡然長想閉關晦跡招弓莫徃盤桓利居不嬰世網運居道消時逢改卜朱旗爰止素靈已哭野戰群龍馳走原鹿競窺周鼎争亡秦族時遭蠖屈運偶鳯翔劬勞百戰經營四方振蕩六合牢籠八荒始聞楚覇終基漢皇群雄並起莫恢王度聖人既作皇天乃顧爰自東夏言遵西路来擬竇融寵逾英布爵窮五等位登九棘帷幄叅謀髙衢騁力海運方逺圖南未極縱壑擢鱗摩天墜翼熊耳失路新安殞身長男䘮楚少女留秦驚魂靡託反塟何因列樹松檟唯餘故人文苑英華卷九百四十八
