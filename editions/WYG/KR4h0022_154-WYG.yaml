body:
  text: 文苑英華巻一百五十四宋李昉等編天部四詠雪三十三首對雪十七首喜雪七首詠雪同劉諮議詠春雪梁簡文帝晩霰飛銀礫浮雲暗未開入池消不積因風堕類聚作隨復來思婦流黄素張載四愁詩何以報之流黄素温姬玉鏡臺㸔花言可挿類聚作折定自非春梅雪朝前人同雲凝暮序嚴隂屯廣隰落梅飛四注飜霙舞三襲實斷望如連恒分似相及已觀池影亂復視簾珠濕和謝朏花雪任昉土膏候年動禎類聚作積雪表辰暮散蘤似浮玉飛英若總素東序皆白珩西雍盡翔鷺山經陋宻榮騷人貶瓊樹花雪庾肩吾瑞雪墜堯年因風入綺錢飛花洒庭樹凝瑛結井泉寒光晦八極同雲暗九天已飄黄石類聚作竹路還類聚作共慶白渠田詠雪呉均微風過初學記作摇庭樹細雪下簾隙縈空如霧轉凝階似花積不見楊柳春徒㸔桂枝白零淚無人道相思空何益同前前人雪逐春風來過集巫山野爛熳雖可愛翻揚詎堪把問君何所思一作知思昔一作昔日同心者坐湏風雪霽相期洛城下此詩一百五十六巻重出今已削去注異同為一作同前裴子野飄飄千里雪倐忽度龍沙從雲合且散因風捲復斜拂草如連蝶落樹似飛花若贈離居者折以代瑶華同前何遜凝階夜似月拂樹曉疑春蕭散忽如盡徘徊已復新暫蔽巻紈質無漸施粉人此二句以集本添入若逐微風起誰言非玉塵同前徐陵瓊林𤣥圃葉桂樹日南華豈若天庭瑞輕雪帶風斜三農喜盈尺六出舞崇華明朝闕門外應見海神車雪董思恭天山飛雪度言是落花朝惜哉不我與蕭索從風飄鮮潔凌紈素紛糅下枝條良書類聚作良詩竟何在坐見容華銷同前駱賔王龍雲玉葉上鶴雪瑞華集作花新影亂銅烏吹光銷玉馬津含輝朗集作明素篆隠迹奉集作表祥輪幽蘭不可儷徒自繞陽春同前李嶠瑞雪驚千里從風下一作同雲暗九霄地疑明月夜一作龍沙風正逺山似白雲朝一作玉馬地還銷逐舞花光動臨歌扇影飄大周天闕路今日海神朝同前王烈雪飛當夢蝶風度幾驚人半夜一牕曉平明千樹春花園應失路白屋忽為隣散入仙厨去還為雲母塵同前一字至七字張南史雪雪花片玉屑簇隂風凝暮節高嶺虚晶平原廣潔初從雪集作雲外飄還向空中噎千門萬户皆静獸炭皮裘自熱此時雙舞洛陽人誰悟郢中歌斷絶雪中作韋應物空堂歲已晏宻室獨成集作安眠壓條集作篠夜偏積覆閣曉愈集作逾妍連山暗古郡驚風散一川此時騎馬出忽憶集此省京華年雪夜下朝呈省中一絶前人南望青山滿禁闈曉陪鴛鷺正差池共愛來朝何處雪蓬萊宫裏拂松枝春雪前人春雪滿空來觸處是花開不知園裏樹若箇是真梅雪二首司空曙樂遊春苑望鵝毛宫殿如星樹似毫漫漫一川横渭水太陽初出五􅁜高二王屋南崖見洛城石龕松寺上方平半山槲葉當牕下一夜曽聞雪打聲春雪韓愈觀雪乗清旦無人坐獨謡拂花輕尚起落地暖初消已訝凌歌扇還來伴舞腰洒篁留宻節着柳送長條入鏡鸞窺沼行天馬度橋徧階憐可掬滿樹戯成摇江浪迎濤日風毛縱獵朝弄閒時細轉争急忽驚飄城險疑懸布砧寒未𢷬綃莫愁隂景促夜色自相饒詠雪贈張籍前人祗見縱横落寧知逺近來飄颻還自弄歴亂竟誰催座暖消那怪池清失可猜􅉾中初葢底垤䖏遂成堆慢有先居後輕多去却回度前鋪瓦壠奔發積墻隈穿細時雙透乗危忽半摧舞深逢坎井集早值層臺砧練終宜𢷬階紈未暇裁城寒粧睥睨樹凍裹莓苔片片匀如剪紛紛碎若挼定非燖鵠鷺真是屑瓊瑰緯繣觀朝蕚𡨕茫矚晩埃當牕恒凛凛出户即皚皚潤野榮芝菌傾都委貨財娥嬉華蕩漾胥怒浪崔嵬磧迥宜集作疑浮地雲平想輾雷隨車翻縞帶逐馬散銀盃萬物漫汗合千株照耀開松篁遭挫抑糞壤獲饒培隔絶門庭遽擠排階級纔豈堪禆嶽鎮强欲効鹽梅隠匿瑕疵盡包羅委瑣該誤鷄宵呃喔驚雀暗徘徊浩浩過三暮悠悠匝九垓鯨鯢陸死骨玉石火炎灰厚慮填溟壑高愁㨖斗魁日輪埋欲側坤軸壓將頺堰似長虵擾陵猶巨象豗水宫誇傑黠木氣怯胚胎着地無由巻連天不易推龍魚冷蟄苦虎豹餓號哀巧借奢豪便専繩困約災威貪凌布被光肯離金罍賞玩捐他亊歌謡放我才狂教詩硉矹興與酒陪鰓惟子誰集作能諳耳諸人得語哉助留風作黨勸坐火為媒雕刻文刀利搜求智網恢莫煩相屬和傳示及提孩春雪前人片片驅鴻急紛紛逐吹斜到江還作水着樹漸成花越喜非排瘴胡愁原一作厚葢沙兼雲封洞口助月照天涯暝見迷巢鳥朝逢失轍車呈豐盡相賀寧止力耕家同前新年都未有芳華二月初驚見草芽白雪却嫌春色晩故穿庭樹作飛花雪夜對酒招客白居易帳小青氊暖杯香緑蟻新醉憐今夜雪歡憶去年人暗落燈花燼閒生草座塵殷勤報絃管明日有佳賔江州雪前人新雪滿前山初晴好天氣日西騎馬出忽有京都意城柳方綴花簷氷纔結穗湏㬰風日暖處處皆飄墜行吟賞未足坐歎銷何易猶勝嶺南㸔雰雰不到地小雪釋無可片片下玲瓏飛揚玉露中乍微全滿地漸宻更無風集物圓方别連雲逺近同作膏凝􅇤土呈瑞下深宫透漏推牕隙紛紜失藥叢飄秦増舊嶺發漢攪長空迥冐巢松鶴孤鳴穴島蟲過三知臘盡盈尺賀長集作年豐委積休聞竹稀踈漸見鴻葢沙資澶漫洒海助冲融草木潜加潤山河更益雄因知天地力覆育有全功雪前人松亞竹珊珊心知萬井歡山明迷舊逕溪滿漲新瀾客醉瑶臺曙兵防玉塞寒紅樓知有酒誰肯學袁安和賔客相國詠雪詩前人集無此詩近臈千巖白迎春四氣催雲隂連海起風急度山來盡日隋堤絮經冬越嶺梅艶疑歌處散輕似舞時廻道韞詩傳麗相如賦騁才霽添松篠媚寒積蕙蘭猜暗漲宫池水平封輦路埃燭龍初照耀巢鶴乍徘徊簷日瓊先挂墻風粉旋摧五門環玉壘雙闕對瑶臺綺席凌寒坐珠簾逺曙開靈芝霜下秀仙桂月中栽巻幌書千帙援琴酒百盃垂休編太史呈瑞表中台皓夜迷三徑浮光徹九垓茲辰是豐歲歌詠屬良哉雪夜與友人同宿曉寄近温庭筠閉門羣動息積雪透踈林有客寒方覺無聲曉已深正繁聞近鴈併落起棲禽寂寞寒塘路憐君獨阻尋集作履跡行當滿依依欲阻尋此詩二百一十七巻及二百六十一巻重出今已削去雪二首前人硯水池先凍牕風酒易消雅即鴉字聲出山郭人跡過村橋稍急方縈轉才深未寂寥細光穿暗隟輕白駐寒條草静封還新疑松欹堕復摇謝莊今病眼無意坐通宵二羸驂出更慵林寺已踈鐘踏緊寒聲澁飛交細㸃重圃斜人過跡階静鳥行蹤寥寂梁鴻病誰人代夜舂同前李洞迢迢來極塞連闕謂疑風吹禪客呵金錫征人擘凍旗細填蟲穴滿重壓鶴巢欹有影晴飄野無聲夜落池正繁秦甸暖漸厚楚宫飢凍把分泉澁光凝二閣癡踏遺蘭署跡聴起石門思用表豐年瑞無令掃玉墀同前羅隠細玉羅紋下碧霄杜門顔集作傾巷落偏饒巢居只恐高柯折旅客愁聞去路遥撅凍野蔬和粉重掃庭松葉帶蘇燒寒牕呵筆尋詩句一片飛來紙上銷對雪對雪劉孝綽見初學記桂華殊皎皎柳絮亦霏霏詎比咸池曲飄颻千里飛耻均班女扇羞儷曹人衣浮光亂粉壁積照朗彤闈此下集有全篇今並録于此鶺鴒摇羽至鵯鶋拂翅歸相彼猶有得嗟余獨有遺終朝守玉署方夜勞金扉未能奏緗帙何由辨國闈坐銷風霧質遊聮珠璧暉偶懐笨車是良知高葢非寄言謝端本無為陳巧機洛濵對雪憶二兄弟駱賔王旅思𦕈難裁衝颷憤集作恨易哀曠望洛川晩飄飄瑞雪來積彩明書帳流韻響集作繞琴臺色奪迎仙羽花遍集作避犯霜集作雪梅謝庭賞方逸袁扉掩未開高人儻有訪興盡詎湏廻立春日晨起對積雪張九齡忽對林庭雪瑶花處處開今年迎氣始昨夜伴春廻玉潤牕前竹花繁院裏梅東郊齋祭所應見五神來冬晩對雪憶胡處士王邵寒更傳唱晩清鏡覽衰顔隔牖風驚竹開簾雪滿山洒空深巷静積素廣庭閒借問袁安舍翛然尚閉闗和張丞相春朝對雪孟浩然迎氣當春至集作立承恩喜雪來潤從河漢下集作落花逼艶陽開不覩豐年瑞焉集作安知爕理才撒鹽如可擬願糝和􅃵梅省中對雪寄判官拾遺昆季集作省中對雪寄謝舎人昆季錢起萬㸃瑶臺雪飛來錦帳前瓊枝應比净鶴髮敢争先散影成華月流光透竹煙今朝謝家興幾䖏郢歌傳淮海對雪贈傳靄李白朔雪落吴天從風度溟渤海樹成陽春江山集作沙皓明月興從剡溪起思繞梁山發寄君郢中歌曲罷心斷絶對雪杜甫北雪犯長沙胡雲冷萬家隨風且開集作問葉帶雨不成花金錯囊徒罄銀壺酒易賒無人竭浮蟻有待至昏鴉何遜詩云城隂渡塹黒昏鴉接翅歸同前戰國多新鬼愁吟獨老翁亂雲低薄暮急雪舞廻風瓢棄罇無綠爐存火似紅數州消息斷愁坐正書空對雪贈徐秀才韋應物霏霏寒欲收靄靄隂還結晨起望南端千林散春雪妍光屬瑶階亂緒陵新節無為掩扉卧獨守袁生轍滁州對雪前人晨起滿帳集作闈雪憶在集作朝閶闔時玉座分曙早金爐上煙遲飄散雲臺下陵亂桂樹姿厠跡鴛鷺末蹈舞豐年期今朝覆山郡寂寞復何為對雪許渾飛舞北風凉玉人歌玉堂簾帷増曙色珠翠發寒光柳重絮微濕梅繁花未香茲辰賀豐歲簫皷宴梁王和叚學士對雪喻亮盈尺知豐歲開牕對酒壺飄當大野匝洒到急流無宻際西風盡凝間朔氣扶乾摧鳥棲枿冷射夜殘爐替月澄斜漢兼沙攪北湖慙於郢客坐一此調巴歈對雪二首李商隠寒集作爽氣先侵玉女扉清光旋透省郎闈梅花大庾嶺頭發柳絮章臺街裏飛欲舞定隨曹植馬有情應濕謝莊衣龍山萬里無多逺留待行人二月歸二旋撲珠簾過粉墻輕於柳絮重於霜已隨江令誇瓊樹又入盧家妬玉堂侵夜可能争桂魄忍寒應欲試梅粧闗河凍合東西路腸斷斑騅送陸郎對雪杜荀鶴風攪長空寒骨生先於曉色報窓明江湖不見飛禽影巖谷時集作唯聞折竹聲溝壑本深無復滿集作巢穴幾多相似處路岐兼得一般平擁袍公子莫言冷中有樵夫跣足行對雪裴說大片向空舞出門肌骨寒路岐平即易溝壑滿應難兎穴歸時失禽枝宿處乾豪家寧肯厭五月畫圖㸔喜雪奉酬辛大夫喜湖南臘月連日降雪見示之作劉長卿長沙耆舊拜旌旗喜見江潭積雪時柳絮三冬先北地梅花一夜遍南枝初開窓閣寒光滿欲掩軍城暮色遲閭里何人不相慶萬家同唱郢中詞喜雪上竇相公陳羽千門萬户雪花浮㸃㸃無聲落瓦溝全似玉塵銷更積半成氷水結還流光添曙色連天逺輕逐春風繞玉樓平地已沾盈尺潤年豐湏賀富人侯類詩作湏待富人侯氷水類詩作氷片連天逺類詩作清天苑喜雪獻裴尚書韓愈宿雲寒不巻春雪墜集作堕如簁騁巧先投隙潜光亂集作半入池喜深將策試驚宻仰簷窺自下何曽汚増高未見危比心明可燭拂靣愛還吹妬舞時飄袖欺梅併壓枝地空迷界限砌滿接高卑浩蕩乾坤合霏微物象移為集作驗祥矜大熟布澤荷平施已分年華晩猶憐曙色隨氣嚴當酒暖洒急聴窓知照耀臨初日玲瓏滳晩漸聚庭㸔岳聳掃地集作路見雲披陣勢魚麗逺書文鳥篆竒縱歡羅艶黠列賀擁熊螭履敝行偏冷門扃卧更羸悲嘶聞病馬浪走信嬌兒竈静愁煙絶絲繁念鬢衰擬鹽吟舊句授簡慕前規捧贈同燕石多慙失所宜西樓喜雪命宴白居易宿雲黄慘淡曉雪白飄颻散麵遮槐市堆花壓柳橋四郊鋪縞素萬室甃瓊瑶銀榼携桑落金爐上麗譙光凝舞妓動寒近醉人銷歌樂惟集作雖盈耳慚無五袴謡春夜喜雪寄王二十二前人夜雪有佳趣幽人出書帷微寒生枕席輕素對集作封階墀坐罷楚絃曲起吟班扇詩明宜滅燈集作燭後静愛巻集作褰簾時窓引曙色早庭消春氣遲山隂應有興不卧待徽之早過梨嶺喜雪書情呈崔判官張起渡嶺逢朝雪行看馬跡深輕標南國瑞寒慰北人心皎潔停丹嶂飄颻映緑林共君歌樂土無作白頭吟奉賀王詩選作徐相公喜雪皇甫冉春雪偏當夜暄風却變寒庭深不復掃城曉更宜看命酒閒令酌披裘晩未冠連營皷角動忽似戰桑乾此詩二百三十巻重出今已削去文苑英華巻一百五十四
