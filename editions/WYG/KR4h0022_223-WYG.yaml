body:
  text: 文苑英華巻二百二十三宋李昉等編釋門五六十五首温庭筠九首方干十首李洞七首張祜七首許渾四首雍陶二首李商隠二首姚鵠一首項斯四首趙嘏五首馬戴六首顧非熊三首李頻五首贈楚雲上人温庭筠松根滿苔石盡日閉禪關有伴年年月無家處處山煙波五湖逺瓶屨一身閒岳寺蕙蘭晩幾時幽鳥還贈越僧岳雲集作雪二首前人蘭亭舊都講今日意如何有樹闗深院無塵到淺莎僧居隨處好人事出門多不及新春鳥集作鴈年年鏡水波二世機銷已盡巾屨亦飄然一室故山月滿缾秋澗泉禪庵過㣲雪鄉寺隔寒煙應共白蓮客相期松桂前宿白盖峰寺寄僧前人山房霜氣晴一宿遂平生閣上見林影月中聞澗聲佛燈銷永夜僧磬徹寒更不學何居士焚香為宦情渚宫晩春寄咸秦上人前人風華已渺然獨立思江天鳬鴈野塘水牛羊春草煙秦原晩重疊㶚浪夜潺湲今日思歸客愁容滿鏡前送僧東逰前人師歸舊山去此别已悽然燈影秋江寺篷聲夜雨船鷗飛呉市外麟卧晉陵前若到東林社誰人更問禪盤石寺留别成公前人槲葉蕭蕭帶葦風寺前歸客别支公三秋岸雪花初白一夜林霜葉盡紅山疊楚天雲壓塞浪遥吳苑水連空悠然旅榜頻㢠首無復松忩半偈同寄清源一作凉寺僧前人石路無塵竹逕開昔年曽伴戴顒來忩間半偈聞鐘後松下殘碁送客廽簾或作簷向玉峯藏一作籠夜雪砌因藍或作流水長秋苔白蓮社或作㑹裏如相問為説或作説與遊人是姓雷此詩二百六十一巻重出今已削去注異同為一作訪知元上人遇暴經因有贈前人縹帙無塵滿畫廊終山弟子静焚香惠能未肯傳心法張湛徒勞與眼方風颺檀煙銷篆印日移松影過禪牀客児自有翻經處江上秋來蕙草荒送鏡空上人逰江南方干去住如雲鶴飄然不可留何山逢後夏一食在孤舟細雨蓮塘晩踈蟬橘岸秋應懐舊溪月夜過石忩流贈雪竇峯禪師前人飛流集作泉濺禪石瓶屨每集作注亦生苔海上山不淺天邊人自來度年隨檜栢獨夜任風雷獵者聞踈磬知師入定廽贈瑪瑙禪師歸京集作贈瑪瑙山禪者前人蒲集作芿草不停獸因師山更靈村林朝乞食風雨夜開扄井味兼松粉雲根著藻缾塵勞如醉夣到此暫能醒寄石湓清越上人前人寺處唯髙僻雲生石枕前静吟應集作因得句獨夜不妨禪忩接停猿樹嵒飛浴鶴泉相思有書札俱倩獵人傳贈詩僧懐觀集作静前人多生餘習在時復却㣲吟坐夏莓苔匝集作合行禪檜栢深入山成白首學道是初心心地不移變徒勞集作云寒暑侵贈鏡公前人幽獨迢遥夜夜清神更閒髙風吹越國集作樹細露濕湖山月皎㣲吟後鐘鳴不寐間如敎累簪組此興定集作豈相關贈乾素上人前人苦用貞心傳弟子即應低眼㸔公卿水中明月無踪跡風裏浮雲可計程庭際孤松隨鶴立忩間清磬學蟬鳴料師多刼長如此豈筭前生與後生贈式上人前人縱居􅎏角喧闐處亦共雲溪䆳僻同萬慮全離方寸内一生多一作多生半在五言中芰荷葉上難留集作停雨松桂集作檜枝間自有風莫笑旅人終日醉吾將大醉與禪通思桐廬舊居便送鑒上人前人莫道東南路不賖思歸一步是天涯林中夜半雙䑓月嚴光釣䑓渚有東西䑓洲上春深九里花桐廬有九里洲綠樹遶村含細雨寒潮背郭巻平沙聞師却到鄉中去為我殷勤謝酒家送僧歸日本前人四極雖云共二儀晦明前後即難知西方尚在星辰下東域已過寅卯時大海浪中分國界扶桑樹底是天涯蒲㠶若有歸風便到岸猶湏隔嵗期送僧逰安南李洞春往海南邊秋聞半路蟬鯨吹洗鉢水犀觸㸃燈船島嶼分諸國星河共一天長安却回日松偃舊房前聽白公話舊前人險倚石屏風秋濤夢越中前朝吟㑹破故國講流終北地聞巴狖南山㸔磧鴻樓髙驚雨濶木落覺城空兎滿期姚監蟬稀别塞公净瓶光照客拄杖朽生蟲平地塔千尺半天燈一籠祝堯譚幾句旋㵼海濤東喜鸞公自蜀歸前人禁院閉生䑓尋師到緑槐寺髙猿㸔講鐘動鳥知齋拂石月盈箒濾泉花滿篩歸來逄聖節吟歩上堯堦寄翠㣲無學禪師前人逺近衆心歸禪居占翠㣲展經猿識字聽法虎知非泉注城池夢霞生侍衛衣𤣥機不可學何以一作似總無機題贈逺上人前人海岳一作島兩無邊去來都偶然齒因吟後冷心向静中圓蟲網花宫井鴻鳴一作嘶雨夜天葉書歸舊寺應附載鐘船寄淮海慧澤上人前人海濤浪滿舊征衣長憶初程宿翠㣲竹裏橋鳴知馬過塔中燈露見鴻飛眉毫一作毛别後應盈尺巖木歸来已㡬圍集作歸来定數圍他日願師容一榻煎茶掃地習忘機集作學忘機叙舊逰寄棲白前人老著重袍坐石房竺經休讀白眉長省衝鼇沒投江島曽㸔魚飛倚海檣曉炙凍盂原日氣夜挑蓮碗禁燈光吟詩五嶺尋無可倐忽如今四十霜贈仲儀集作義上人張祜星霜幾朝寺香火静中集作居人黄葉不驚意青山無事身抛生䑓上月結座履中塵自説一乗果集作詩課别來時更新以下十首並見集本髙閒上人前人座上辭安國禪房戀沃洲道心黄葉集作蘖老詩思碧雲秋巻軸朝廷餞書函内庫収陶欣入社叟生怯論經儔日色屏初掲風聲筆未休長波溢海岸溢集作浮大㸃出嵩丘不絶羲之法難窮智永集作禪知流殷勤一牋在􅅏著㸔銀鈎贈慧昌上人前人半巖開一室香穗細氤集作氛氲石上潄秋水月中行夏雲律持僧講䟽經譯集作誦梵書文好是風廊下飄飄挂褐裙寄靈徹上人前人老僧何處寺秋夣遶江濵獨樹月中鶴孤舟雲外人榮華長指幻病乆不一作自觀身應笑無成者滄洲垂一綸此詩二百六十二巻重出今已削去題集作寄靈隠寺師一上人十韻前人八十空門子深山土木骸片衣閒自衲單食老長齋道性終能遣人情少不乖樔枸居上院薜荔俯層階洗鉢前臨水窺門外有集作掩柴朗吟揮竹拂髙揖曵芒鞋迸笋斜穿塢飛泉下噴崖種花忻土潤撥石慮沙埋舊住師招隠初臨集作徴我詠懐何當縁集作聊當因興翫更為表新牌贈志凝上人前人悟色身無染觀空事不生道心長日笑覺路幾年行片月山房静孤雲海棹輕願為塵外契一就智珠明毁浮圖年逄東林寺僧前人可惜東林寺空門一作閒失所依翻經謝靈運畫壁陸探㣲隙地泉聲在荒途馬跡稀殷勤話僧輩未敢保儒衣早發中巖寺别契真上人許渾蒼蒼松桂隂殘月半西岑素壁寒燈暗紅爐夜火深厨開山䑕散鐘盡嶺猿吟行役方如此逢師懶話心和友人送僧歸桂州靈巖寺前人楚客送僧歸故鄉海門㠶勢落瀟湘碧雲千里暮愁合白雪一聲春思長滿院草花平講石遶龕藤葉盖禪牀憐師不得隨師去已戴儒冠事素王許渾集有詩二首其一題作和浙西劉三復送僧南歸其一作和友人送僧歸桂州靈巖寺今文苑英華既誤以送僧南歸為歸靈巖寺又兩詩前四句同後四句異今注于下楚客送僧歸桂陽海門㠶勢極瀟湘碧雲千里暮愁合白雪一聲春思長栁絮擁堤添衲軟松花浮水注瓶香南宗長老幾年别聞道半嵓多影堂送元晝上人歸蘇州兼寄張厚前人三年無事客呉鄉南宅春深集作南陷春園碧草長共醉八門廻畫舸還尋集作獨還三徑掩書堂前山雨過池塘滿小院秋歸枕簞凉經嵗别離心盡苦何堪紅葉集作黄葉下清漳泊蒜山津聞東林寺光儀上人物故前人雲齋曽宿借方袍因説浮生大夢勞言下是非齊虎尾宿來榮辱比鴻毛孤舟千棹水猶濶寒殿一燈夜更髙明日東林有誰在不堪秋磬拂煙濤贈宗静上人雍陶世上方傳教山中未得歸閒花飄講席馴鴿汙禪衣積雨誰過寺殘鐘自掩扉寒來垂頂帽白髪剃應稀憶山寄僧前人塵路誰知踏雪蹤到來空認出雲峯天晴逺見月中樹風便細聽煙際鐘閲一作慢世數思僧並院憶山長羡鶴歸松新愁舊恨都難説半在眉間半在胷送臻師二首李商隠昔去靈山非佛席今來滄海欲求珠楞伽頂上清凉地善眼仙人憶我無二苦海迷途去未因東遊過此幾㣲塵何當百億蓮花上一一蓮花見佛身送僧歸新羅姚鵠淼淼萬餘里扁舟發落暉滄溟何嵗别白首此時歸寒暑途中變人煙嶺外稀驚天巨鼇起集作闊蔽日大鵬飛雪入行沙履雲生坐石衣漢風深習得休恨一作去恨本心違寄石橋僧項斯逄師入山日道住石橋邊别後無人見秋來幾處蟬溪中雲隔寺夜半雪添泉生有天台約應無却一作冄出縁日東一作本僧前人雲水絶歸路來時風送船已無身後念猶坐病中禪深壁藏燈影空忩出艾煙要人知是客白日指生縁送僧前人靈山巡未遍不作住持心逢寺暫投宿是山皆獨尋有時過静界在處想空林從小即行脚出家來至今送僧逰南岳前人心知衡岳路不怕去人稀船裏猶鳴磬溪頭自曝衣有家從小别是寺却言歸料得逢寒住當船雪滿扉贈天卿一作郷寺神亮上人師不下寺已五年趙嘏五㸔春盡此江濆花自零風日自曛空有慈悲隨物念已無蹤跡在人羣迎秋日色簷前見入夜鐘聲竹外聞笑指白蓮心自得世間煩惱是浮雲此篇二百三十八巻重出今已削去題崇聖寺簡雲端僧録前人暮塵飄盡客愁長來扣禪關月滿廊宋玉逢秋空雪涕净名無地可容牀髙雲覆檻千巖樹踈磬含風一夜霜廽首故園紅葉外只将多病告醫王尋僧前人溪户無人百一作谷鳥飛石橋横木挂禪衣看雲日暮倚松立野水亂鳴僧未歸越中寺居寄上主人前人野寺初容訪静來晩晴江上見樓䑓中林有路到花盡一日無人一作愁㸔竹廻自曬詩書經雨後别􅅏門户為僧開苦心若是酬恩事不敢吟春憶酒盃此篇二百三十八巻重出今已削去送僧歸廬山前人禪棲忽憶五峯逰去著方袍謝列侯花啓樓䑓千葉曙錫含風雨一枝秋題詩片石侵雲在洗鉢泉香覆菊流却憶前年别師處馬嘶殘月虎溪頭送僧歸金山寺馬戴金陵江色裏蟬急向秋分迥寺横洲島歸僧度水雲夕陽依岸盡清磬隔潮聞遥想禪林下鑪香帶月焚集作對月焚寄終南真空禪師前人閒想白雲外了然清净僧松門山半寺雨夜佛前燈此境可長往浮生自不能一從林下别瀑布幾成氷齋後寄白閤僧前人蒼翠霾髙雪西峯鳥外看乆披山衲壊孤坐石床寒盥手水泉滴燃燈夜燒殘終朝老雲嶠煑藥伴中飡贈禪僧前人弟子人天遍童年在沃州開禪山木長浣衲海沙秋振錫揺汀月持瓶接瀑流赤城何日上鄙願從師遊贈别空公前人雲門秋却入㣲徑乆無人後夜中峯月空林百衲身寂寥寒磬盡盥潄瀑泉新履跡誰相見松風掃石塵集姚殿中宅期無可不至見二百十七巻前人送僧歸洞庭顧非熊江山萬萬重歸去指何峰未入連雲寺先齋越浪鐘島香廻棧栢一作橘秋䕃出庵松若救吾人病湏降震澤龍贈覺真上人前人長安車馬地此院閉松聲新罷九天講舊曽諸岳行能詩因作偈好客豈關名約我中秋夜共來看月明寄太白無能禪師前人太白山中寺師居最上方獵人偷佛火櫟䑕戱禪牀定乆衣塵積行稀徑草長有誰來問法林杪過殘陽冬夜山中尋僧李頻夜山深雪後月下獨尋師若得長閒日應無暫别時葉寒凋欲盡泉凍落㣲遲即此天明去重來又未期贈立規上人前人竹向空齋合無僧在四隣去雲離坐石斜月到禪身樹老風終夜山寒雪見春不知諸祖後傳印自何人送元遂上人前人白衣遊帝鄉已得事空王却返湖山寺髙禪水月房雨中過岳一作月黒秋後宿船凉廻顧秦人語他僧宿上方送清江上人歸東林前人風濤幾千里歸路半乗舟此地難相别何人更共􅅏坐經嵩頂夏行值洛陽秋到寺安禪夕江雲過石樓送僧之天台前人一錫隨縁起天台又去登長亭舊别路落日獨行僧夜燒山何處秋㠶浪幾層他時授巾拂莫説老無能文苑英華巻二百二十三
