body:
  text: 文苑英華巻二百三十二宋李昉等編隱逸三山人三十三首隱士四十二首山人送侯山人赴㑹稽崔峒仙客辭蘿月東来就一官且歸滄海住猶向白雲看猿呌江天暮蟲聲野浦寒時逰鏡湖裏為我把魚竿禁中送任山人此人自青城獻伏火諸石恩命令於本山更取大還李泌子去非長逺君恩取大還補天留彩石縮地入青山獻夀千春一作年外來朝數月間莫抛殘藥物竊欲駐童顔行藥前軒呈董山人盧綸不覺老將至瘦來方自驚朝昏多病色起坐有勞聲體一作腠暖苦肌癢藏虛唯耳鳴桑公富靈術一為保餘生早行寄朱山人放戴叔倫山集作風曉旅人去天髙秋氣悲明河川上沒芳草露中衰集作滋此别又萬集作千里少年能㡬時青冥詩選作心知剡溪路集作逺心與謝公期詩選作聊且寄前期贈李山人唐前人此意無所欲集作静無事閉門風景遲柳條將白髮相對共垂絲酬秦山人出山見呈釋皎然手携酒榼共書幃廻語長松我即歸若是出山機更一作亦息嶺雲何事背君飛尋李山人不遇王建上客長閒少在時溪中放鶴洞中碁生金有氣尋還逺仙藥成窠見即移莫為無家陪寺宿一作食應縁將米寄人炊從頭石上留名去獨向峯前問老師太山集作白老人張籍日觀東邊集作峯幽客住竹巾藤帶亦逄迎暗脩黄籙無人見深種胡麻共犬行洞裏仙家常獨往壺中靈藥自為名春泉四面遶一作西遶南非茅屋日日唯聞杵臼聲池上贈山人韋君白居易新竹夾平流新荷拂小舟衆皆嫌拙好誰肯伴閒逰客為忙多去僧因飯暫留猶憐韋處士盡日共悠悠題施山人野居前人得道應無着謀生亦不妨春泥秧稻暖夜火焙茶香水巷風塵少松齋日月長髙閒真是貴何處覔侯王贈王山人前人聞君減寢食日聽神仙說暗待非常人潜求長生訣言長本對短未離生死轍假使得長生纔能勝夭折松樹千年朽槿花一日歇畢竟共虛空何湏誇嵗月彭殤徒自異生死終無别不如學無生無生即無滅送孫山人姚合山人言語質住世恨多時集作山翁來帝里不肯住多時塵土衣裳重腥羶僕𨽻肥林中愁不到城外老應遲諠寂一為集作離别相逄未有期寄崔之仁山人前人百門陂集作坡上住石屋兩三間日月難教化集作老妻兒乞與閒仙方集作經揀客示集作問酒價集作藥債煑金還何計能相引集作訪終身得在山贈王隱山人于武陵石室掃無塵人寰與此分飛來南浦樹半是華山雲浮世㡬多事先生應不聞寒川滿西日空照鴈成羣送褚山人歸日本賈島懸帆待秋色人去杳冥間東海㡬年别中華此日還岸遥生白髮波盡露青山隔水相思在無書也是閒贈劉山人前人二十年中服集作餌茯苓致書半是老君經東都舊住商人宅南國新脩道士亭鑿井集作石養蜂休買蜜坐山秤藥不爭星古來隱者多能卜欲就先生問丙丁送朴山人歸日本釋無可海際晩帆開應無鄉信催水從荒外積人指日邊廻望國乘風久浮天絶島來儻因華夏使書禮疑作札轉悠哉送耿山人歸湖南周賀南行隨越僧别業㡬池菱兩鬢已垂白一作雪五湖歸挂罾夜濤鳴柵鎖寒葦露船燈去此已無事却來知未能曉别吕山人劉得仁曉鐘兼漏盡曙色照青氛棲鶴出髙樹山人歸白雲月盈集作明期重宿丹熟集作就約相分羨入秋風洞幽泉子細聞别王山人前人㫖甘雖集作廿㫖遂自足未是禄榮親尚逐趨時伴多離有道人山居衣以集作似草生計藥隨集作兼身不食長無疾集作病年知出一作過十旬集本皆不及此詩贈陶山人前人處士例營營唯君縱此生閒能資夀考健不换公卿藥圃妻同耨山田子共耕定知丹熟後無姓亦無名送祖山人歸山前人偶來朝市笑浮雲却憶烟霞出帝城不說金丹能㸃化空教弟子學長生壺中㵼酒看雲飲洞裏逄師下鶴迎料得仙家玉牌上已鐫白日上昇名贈王山人許渾貰酒携琴訪我頻始知城郭集作市有閒人君臣藥在寧憂病子母錢成豈患貧年長每勞推甲子夜寒初共守庚申近來聞說燒丹處玉洞桃花萬樹春送徐山人歸睦州舊隱雍陶君在桐廬何處住草堂應與戴家隣初歸山犬飜驚主久别沙集作江鷗却避人終日欲為相逐計臨岐集作當時空羡獨行身秋風釣艇遥堪集作相憶七里灘西片月新送朴山人歸新羅集作海東馬戴浩渺行無極揚帆但信風雲山過海畔集作半鄉樹入舟中波定遥天出沙平逺岸窮集作蒙離心寄何處目斷曙霞東題桐廬謝逸人一作題廬峯謝山人江居方干少小髙眠一作民無一事五侯勲盛欲如何湖邊倚竹寒吟苦石上横琴夜醉多鳥自樹梢隨果落人從窓外卸帆過由來朝士為真隱可要棲身向薜蘿贈唐山人李洞垂鬚長我髮七十黑如黳醉眼青天小吟情太華低房烘離海日舟陷落潮泥卭蜀路無限往來琴自一作獨携送劉山人歸洞庭李頻去意無人㑹唯應道是從半湖乘早月中路入踈鐘秋盡户蟲急夜深山雨重當時將隱者分得㡬株松題簡山人張喬名利了無時何人暫詣師道情閒外見心地興來知竹落穿忩葉松寒䕃井枝匡山許同社願卜挂帆期贈别李山人前人分合老西秦年年夢白蘋曽為洞庭客還送洞庭人語别惜殘夜思歸愁見春滄浪濯纓處應念滿衣塵集作遙知泊舟處沙月自相親送謝山人歸江夏陳陶黄鶴春風三千里山人佳期碧江水携琴一醉楊柳堤日暮龍沙白雲起尋九華王山人楊䕫下馬扣荆扉相尋春半時捫蘿盤磴險疊石渡溪危松夾莓苔逕花藏薜荔籬卧雲情自逸名姓厭人知題鄭山人郊居前人谷口今逄避世才入門瀟洒絶塵埃漁舟下釣乘風去藥醖留賔待月開數片石從青嶂得一條泉自白雲來竹軒相對無閒語盡日一作肆日南山不欲廻隱士招隱士逍遥公韋夐周明帝六爻貞遁世三辰光少㣲頻陽讓逾逺一作潁陽去猶逺滄洲去一作遂不歸坐石窺仙洞乗槎下釣磯嶺松千仭直巖泉百丈飛香動秋蘭佩風飄蓮葉衣聊登平樂觀遥想首陽薇詎一作儻能同四皓來㕘余萬幾一作皆藝文類聚奉和趙王隱士王褒鳬鵠均長短鵬鷃共逍遥清襟藴秀氣虛席滿風飈斷絃唯續葛獨酌只傾瓢菖蒲九重節桑薪七過燒同前庾信洛陽徴五隱東都别二賢雲氣浮函谷星光集潁川㶚陵採樵路一作徑成都賣卜錢鹿裘披稍裂藜床坐欲穿阮籍推類聚作唯長嘯嵇康訝一絃澗險無平石山深足細泉低松猶百尺一作丈少鶴已千年野鳥繁絃囀山花焰火然洞風吹户裏石乳滴忩前雖無亭長識終見野人船奉報窮秋寄隱士前人王倪逄齧缺桀溺耦長沮藜床負日卧麥隴帶經鋤自然曲木几無名科斗書聚花聊飼雀穿池試養魚小徑類聚作村治澁路低田補壊渠秋水牽沙落寒藤抱樹踈空枉平原騎來過仲蔚廬留贈山中隱士周宏讓行行訪名嶽處處必留連遂至一巖裏灌木上參天忽見茅茨舍暖暖類聚作曖曖有人煙一士開門出一士呼我前相看不道姓誰類聚作焉知隱與仙䇿杖尋隱士王績䇿杖尋隱士行行路漸賖石梁横澗斷土室映山斜孝然疑集作縱有舍威輦遂無家置酒燒枯葉披書坐落花新垂滋水釣舊結茂陵罝嵗嵗長如此方知輕世華春日與裴廸過新昌里訪吕逸人不遇王維桃源一向絶風塵柳市南頭訪隱淪到門不敢題凡鳥看竹何湏問主人城外青山如屋裏東家流水入西隣閉户看集作著書多嵗月種松皆老作龍鱗集作皆作老龍鱗尋白鶴巖張子容一作顔隠居孟浩然白鶴青巖半幽人有舊集作隱居階庭空水石林壑罷樵漁嵗月青松老風霜苦竹餘集作踈覩兹懐舊業杖集作回策返吾廬望終南山寄紫閣隱者李白出門見南山引領意無限秀色難為名蒼翠日在眼有時白雲起天際自舒巻一作捲心中與之然託興毎不淺何當造幽人滅跡栖絶巘尋龍井楊老劉長卿柴門草舍絶風塵空谷耕田學子真泉咽豈勞經隴地集作坻山深不覺有秦人手栽松樹蒼蒼老身卧桃源寂寂春唯有胡麻當鷄黍白雲來往未嫌貧山行尋一作尋西山隱者不遇丘為絶頂一茅茨直上三十里叩闗無僮僕窺室唯案几既一作若非巾柴車應是釣秋水差池不相見僶俛空仰止草色新雨中松聲晩忩裏及兹契幽絶自足盪心耳雖無賔主意頗得清浄理興盡方下山何必見一作待夫子一作皆文粹送温逸人錢起垂白集作隠几無名老何年此陸沈丘園應得性婚嫁不縈心歳計因山薄霞棲在谷深設罝連草色曝藥避松集作背松隂觸興雲生岫隨耕鳥下林搘頤􅀏來客頭上有朝􅆪此詩三百十七巻重出今已削去送韋逸人歸鍾山郎士元逸人歸路逺弟子出山迎服藥顔猶駐耽書癖已成柴扉多嵗月藜杖見公卿更作儒林傳應湏載姓名五老峰大明觀贈隱者姚係見文粹雲觀此山北與君携手稀林端渉横水洞口入斜暉乍覺鸞鶴邇忽為煙霧飛故人清和客黙㑹琴心微丹術幸可授青龍當未歸悠悠平生意此日復相違隱士孟郊本末一相返漂浮不還真山野多餒士市井無飢人虎豹忌當道麋鹿知藏身柰何貪競者日與患害親顔貎嵗嵗改利心朝朝新孰知富生一作者禍取富不取貧寳玉忌出璞出璞先為塵松栢忌出山出山先為薪君子隱石壁道書為我隣寢興思其義一作載源淡泊味始珍陶公自放歸尚平去一作正有依草木擇地生禽鳥順性飛青青與冥冥所保各不違和盧常侍寄華山鄭隱者張籍獨憶集作坐三峯下年深學錬丹一間松葉屋數片蘓集作石花冠酒待山中飲琴將洞内集作裏又作口彈開門移逺竹剪草出幽蘭荒壁通泉架晴崖曬藥壇寧知騎省客長向白雲看寄紫閣隱者前人紫閣氣沉沉先生住處深有人時得見無路可相尋野集作夜鹿伴茅屋秋猿一作園非守栗林唯應採靈藥更不别經心集作營心又作相侵贈隱者前人先生已得道市井亦容身救病自行藥得錢多與人問年常一作長不定傳法又非真毎一作常見隣家一作翁說時聞一作時使鬼神此詩二百二十九巻重出今已削去注異同為一作贈新辟穀者前人學得飡霞法逢人與小還身輕堪集作曽試鶴力弱未登集作離山無食犬猶一作常在不耕牛自閒朝朝唯盥漱集作空漱水叩齒草堂間寄邢逸人鄭常羡君無外事日與世情違地僻人稀一作難到溪深鳥自飛儒衣荷葉老野飯藥苖肥疇昔江湖意如今憶共歸贈隱者已見二百二十八巻于鵠懐西峰隱者周賀萬木藏峰色天寒望即愁髙源何日去逺瀑入城流臘近音一作溪書絶燈殘雪霰一作夜雪稠還當相憶處枕上苦吟休送孫逸人賈島衣屨集作履猶同俗妻兒亦宛然不飡能累月無病已多年是藥皆諳性令人漸信仙杖頭書數巻荷入翠微煙懐紫閣隱者前人寂寥思隱者孤竹集作燭坐秋霖梨栗猿喜熟雲山僧說深寄書應不到結伴擬同尋廢寢方終夕迢迢一作沉沉紫閣心題隱者居前人雖有柴門長不闗片雲孤木伴身閒猶嫌住久人知處見擬移家更上山題孫逸人山居杜牧長懸青紫與芳枝塵刹一作世無因免别離馬上多於在家日罇前堪憶少年時關河客夢還鄉逺雨雪山程出店遲却羡髙人終此老軒車過盡不知誰送隱者前人無媒逕路草蕭蕭自古雲林逺市朝公道世間唯白髮貴人頭上不曾饒寄題商洛王隱士居許渾近逢商洛客知爾住南塘草閣平春水柴門掩夕陽尋蜂收野蜜隨麝拾集作採生香更憶前年别集作醉松花滿石床題終南山隱者居姚鵠開門絶壑旁躡蘚過花梁路入峯巒影風來芝术集作草香夜吟明雪牖春夢閉雲房盡室更何有一琴共一觴寄終南山隱者薛能海日東南出應開嶺上扉掃壇花入篲科竹露霑衣飯後嫌身重茶中見鳥歸相思愛名者難說與親違贈隱者前人自得髙閒性平生向此棲月潭雲影短集作斷山葉雨聲齊庭樹人書匝欄花鳥坐低相留永不望集作㤀經宿話丹梯嵩陽隱者李頻當門看少室倚杖復披衣毎日醒還醉無人是與非架書抽讀亂庭果摘嘗稀獨有江山客思家未得歸贈隱者温庭筠茅堂對薇蕨爐煖一裘輕醉後楚山夢覺來春鳥聲採茶溪樹緑煑藥石泉清不問人間事㤀機過此生贈華山集作隂隱者方干少微夜夜當仙掌更有何人在此居花月舊交看浴鶴松蘿本主集作自伴刪書素琴醉後集作去經宵枕衰髮寒來向日梳故國多年歸未遂因逢此地憶吾廬送隱者歸羅浮李羣玉春山杳杳日遲遲路入雲峯白犬隨兩巻囊一作素書留貰酒一柯樵斧坐看碁蓬萊道士飛霞札清逺仙人寄好詩自此塵寰音信斷山川風月永相思題嵩髙隱者居鄭谷豈易訪仙蹤雲蘿千萬重他年來卜隱此境願相容亂水林前集作中路深山望集作雪裏鐘見君琴酒樂廻首興何慵送張逸人前人人間踈散更無人浪兀孤舟酒兀身蘆笋鱸魚抛不得五陵珍重五湖春避世翁陳陶海上一蓑笠終年垂釣絲滄洲有深意冠蓋何由知直鈎不營魚蝸室無妻児渴飲寒泉水飢飡紫靈一作术芝鶴髮披兩肩髙懐如澄陂嘗聞仙老言云是古鴟夷石竇閟雷雨金潭養蛟螭乗槎上玉津騎鹿逰峨嵋以人為語黙與世為雄雌兹焉乃磻溪豹變應湏時自古隱淪客無非王者師題袁溪張逸人所居羅隠蒲梢獵獵鷰差池數里溪光日落時芳草集作樹文君機上錦逺山孫夀鏡中眉雞忩夜靜開書巻魚檻春深展釣絲若使浮名拘絆得世間何處有男児寄南城韋逸人前人杜甫詩中韋曲花至今無頼尚家家美人曉折露沾袖公子醉歸香滿車萬里丹青傳不得二年風雨恨無涯羡他南澗髙眠客春去春來任物華寄喬逸人前人南經湘水集作浦北揚州别後風帆㡬度逰春酒誰家禁爛漫野花何處最淹􅇔欲憑尺素邊鴻懶未定雕梁海鷰愁長短此行湏入手更饒君占一年休集作秋羅浮山下書逸人壁曹松海上亭臺山下煙買時幽䆳不爭錢莫言白日催華髮自有丹砂駐少年漁釣未歸深竹裏琴壺猶戀落花邊就中更踐無人境知是羅浮第㡬天文苑英華巻二百三十二
