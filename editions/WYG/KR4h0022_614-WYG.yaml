body:
  text: 文苑英華卷六百十五宋李昉等編邉防二爲崔僕射遣髙正平論邉事表一首爲杭州李使君李藏用守杭州功表一首爲郭令公請停親征表一首奏投降吐蕃表一首爲王尚書奏洛州事冝并進翻城副將李澄表一首爲王大夫奏元誼防秋表一首爲趙侍郎論兵表一首代李侍郎論兵表一首請赴行營表一首論西戎表一首爲崔僕射遣髙正平論邉事表代宗于昭臣某言去五月日已差知衙事袁遥獻狀露誠工塵聖德猶恐帳下之士未盡對􅆒邉隅之要不復専達今害馬己去時政鼎新期於昇平天下屬望臣叨榮冒寵十有二年雖夙興夜􅄰將補不足智小任大其缺實多臣某誠惶誠恐頓者頓首伏惟寳應元聖文武皇帝陛下纂戎立極俯鑒下人思無不周明必以察故得迷道自返横波易流搜遺逸以在庭叶夢卜而作相頒命布德奉天順人海隅蒼生孰不遂性臣僻守三蜀跼􅐲一方想通籍而轉踈望賡歌而莫及頃者正月之役中路詔還雖迫外懐之虞頗貽膚受之愬嘗膽空知其有苦剖心無足以自明未知此生朝拜何日臣本道度支判官檢校虞部員外郎髙正平佐臣理戎積有年嵗文學政事不忝前脩應緣三軍逺支近費無臣無細一與臣同陛下初擇宰臣旁求利害勒赴庭闕以代臣行近日山西將軍頻執蕃邏詢其動静確有所傳必擬横分劔門圖䧟全蜀其勢甚大必在防虞正平此行臣意兼切伏乞聖鑒俯垂聽納則内獻心腹外執干戈王室有開萬死無恨心馳魏闕不爲身謀望斷玉闗終期生入無任奉國忘家之至奉表陳懇以聞爲杭州李使君論李藏用守杭州功表武宗獨孤及臣某言臣聞當逆賊劉展擁兵過江之日變起倉卒鋒不可當人心動摇物情危殆集作駭五道節制望風潰散自淮而南至於海隅遂無敢保一城能守一節者惟少府少監李藏用以宗室近屬憂國如家臨危抗憤忠勇奮發收聚散卒紏合義士集作師挺身履險出萬死一生之地與賊轉戰堅守蘇州相持經月殺獲過當使㐫賊徒集作徒逆黨鋒銳挫衂自此王師始集作載張賊衆知懼其後以外援不至衆寡懸絶遂移師就嶮集作險退保杭州當此之時江淮諸軍已散平盧之師未至三分全吳賊有其二藏用且募戰士集作且戰獨守孤城以忠義感激令驍雄樂用旬月之内致死士三千賊遣僞將張景超孫待封等盡鋭率衆分道來攻藏用與士卒等戮力一心義形於色殊死决戰奮不顧身遂能兵鋒所加無不摧陷皆一舉盡敵覆而屠之前後俘斬虜獲至數萬計向使微夫人之力扞此州之境則江介土宇盡爲戎疆海隅蒼生非復我有由是浙江之西集作外南至閩嶺士庶免有波迸道路窮冦不能集作敢搪突藩籬集有屏息二字風波宴然百姓樂業父不䘮子兄不哭弟藏用之功也今都統使停本職已罷孤軍無主莫知適從將士嗷嗷未有所𨽻天聽髙邈無人爲言遂使殊勳見委忠莭未録口不言賞賞亦不及伏恐非聖朝旌有德表有功之義今逆賊雖殄人心猶携山洞海島徃徃結聚睦州草竊爲蠧尤深惟憚藏用之兵是以未敢進逼若此軍一散必群盗交侵則臣此州危亡是懼伏望早降恩㫖以荅其勤惕之勲榮委以集作之一戎政俾揔統所領以鎮遏江表實江東萬姓顒顒之望艱難之際人多異言集作二心以宗子維城智勇如此必能使冦賊姦宄不敢窺伺間隙江淮足以髙枕而卧陛下無有集作可無東顧之憂臣屬忝葭莩任居牧守安危之分臣實預焉無任懇欵之至爲郭令公請停親征表代宗前人臣某言經畧副使太子右諭德傅濤至伏承鑾駕欲有親征恭聞聖㫖載惶載懼臣以薄劣謬揔元戎受命於朝成師以出雖志期靖難而力未摧兇邦甸多虞有貽聖慮遂使六軍雷動七萃天行臣實無能萬死餘責然臣面辭之日已具奏聞假令冦賊猖獗猶願陛下務於持重内安宗廟外固人心臣之素懐正在於此縱微臣智力淺短終無所成陛下仍湏别擇英才授之師律豈有事非至切便欲親戎誠恐上國衣冠自生震恐逺方士庶更有驚疑以臣觀之竊謂非便兇虜傷沮其勢式遏集作其運已窮天威赫赫所向皆靡陛下責成之日愚臣死難之秋伏望付臣以専征委臣以集事囬鑾上國端拱中朝豈惟微臣受賜抑亦萬方幸甚謹奉表以聞奏投降吐蕃表于公異臣某言臣聞夏禹興師西戎即叙漢宣嗣位北狄稱藩則知自古帝王未有不先文德而後甲兵撫諸華而柔荒服然後一作則列在墳籍號爲昇平伏覩今月某日吐蕃東道節度南奔息下吐蕃浪斯多斯獵人并馬十五疋投降者此皆聖澤昭宣太和廣被夷狄一作戎狄左袵邉徼無虞臣某中謝伏惟皇帝陛下以至聖統業以大明乗時休戰伐於阪泉布風敎於宣室化無不洽俗無不賔獨西蕃累犯邉疆自爲崛强多從戰敗少有生降今者之來實異於昔蓋以違天己久負約頗深竊盜河湟震驚邊鄙神既惡稔時將可誅漸開離析之端是叶恢張之運臣獲受榮遇方揔藩維當臨斬戎王將置藁街之下提封漢境願窮葱嶺之西萌兆在兹不敢不賀無任喜抃之極爲王尚書奏洛州事宜并進翻城副將李澄表德宗前人臣某言自元誼亂常已經寒暑王師討逆久未凱旋臣待罪轅門若臨泉谷渠魁未滅􅃦食不寧臣某中謝臣自春初以來便爲持久之計控引洛水環繞賊城築室反耕示其安堵冀憑廟略克剪兇徒臣所設隄防頗爲堅厚秋來軍用又勝常年壠畝之間不知賊在臣與弟五守進商量且務撫綏蕞爾一城偷安晷刻今水勢滋漲營壘安閑惟務訓師未嘗徹警賊城之内是物皆竭狡計已窮頻有降人審知實事臣若四面谿一作豁水一向取城量力校功計日當克􅄸其日數以待地乾須至冬中水凍然後可事集或慮亡命之賊伺隙奔馳兼恐猖狂之儔爲之聲援若但以水力爲灌澍不停旬月之閒賊城必壊中則促其急變外則伐其異謀不假梯衝不費戈甲竊思上策實謂萬全况秋風漸髙寒氣已至城中士健懸望冬装其元誼等無可支持惟行誑惑既以廹其凍餒仍更苦其勤勞㨿此事情即當變潰昨者將軍劉南華等溺死臣己奏聞訖臣縁得城中欵䟽皆願歸降前後尅期非止一度臣若不使人接應有似拒其輸誠若不激其義心即何以勸其効命所以事湏赴約有此差池伏惟聖鑒俯賜詳覽其城所與計㑹前後帛書謹録白并元本同封進所謀翻城人四面知敵副將李澄臣已補充衙前十將伏恐皇情憂軫要親問事宜臣謹令隨崔烈入奏云云爲王大夫奏元誼防秋表德宗王行先臣某言洛州元誼等防秋將士以今月日盡一作教發上道訖氛沴清廓藩維底寧臣某中謝伏惟皇帝陛下𤣥德昇聞鴻猷允洽致生靈於富壽均覆載於乾坤舞兩階之干而苗民有格收三面之網而庶類知歸頃者元誼等竊㨿城池載經寒暑䧟危疑之死地抵逗撓之刑草逭業逋誅視隂假息臣統兹卒乗臨問郊坰不能執桴皷於行間盡敵而反擁旌旗於閫外胡顔自安每貽宵旰之憂實負春秋之責伏以陛下好生宥過軫悼發哀許其悛心納其請命俾遵向闕之路使足勤王之師祅星見日而自銷喜氣乗春而乃發凡在率土孰不歡心况臣所部實増忭躍臣恨以職拘戎旅不獲稱賀闕庭無任悚戀屏營之至爲趙侍郎論兵表代宗此表當在德宗之前臣某言臣聞慰理之代不無逆節軒轅用師於中冀唐堯出征於丹浦啓戰有扈文王伐崇以至聖除至兇至順除至逆或小戰而勝或因壘而降誠審於用兵得其道也伏見承嗣旅拒倐已再嵗靈曜䟦扈今又踰時天兵四合竟未殱殄得非千慮一失未盡制敵之方乎臣常終夜不寢詳推其故不敢膚引逺古安危之體請以天寳至德以來成敗言之夫以禄山隂深姦矯真巨猾也兇詐逆謀之計亦無元海石勒之流當其發幽燕陷洛陽渉淆函傾秦雍當國家理平之運忘戰日深初命將出師若封常清髙仙芝哥舒翰程千里遇冦必敗奔北相望此則未究敵情小之而不設備以至於是也先聖寤既徃之失苦心焦思發號靈武觀兵鳯翔良將勁卒風馳景附勇者爲之用智者効其謀命陛下爲元帥以儲貳之重威四逺俾子儀爲副以節制之任鎮九軍卒能恢復咸洛削平㝢縣此先聖之雄略陛下之有憾也其後相城之役陛下不行衆無適從竟以潰奔洎思明繼逆毒甚禄山狡筭猖狂抑又有次光弼守河陽以挫其勢朝恩鎮陜服以制其侵陵竟未能覆其巢穴屬陛下紹興皇極乂命元子爲帥俾懐恩爲副以討之復能梟夷巨逆抵定東夏始自先聖與二兇相持無帥則無功有帥則有克士庶之所深知今河北河南更唱迭和然其用兵暴急與曩者二兇懸殊非惟才之不逮抑亦事之有異禄山思明之卒死而無退今承嗣靈曜之衆豈有是耶禄山思明之馬既多而且逸今承嗣靈曜之騎豈可方耶禄山思明横行而無懼今承嗣靈曜深居而入保臣竊料其非不欲也蓋違天道失人心歸之退而自固其滅亡之兆了然可知幸北有寳臣朱滔與承嗣合勢西有忠臣李俛與馬燧連衡惟正已小有逗遛未肯戮力此正當陛下命帥專征之日豈可持疑而不㫁哉儻陛下採臣愚計時有臨遣忠淳者必叶心競進携二者必遷善來同未踰旬時當有成績如或務於含垢偷以過時不立元帥寄之諸將乗吐蕃冦盜囬紇敺侵人心動摇賊勢滋蔓事冝一失無可柰何則吐蕃囬紇四支之病承嗣靈曜腹心之病四支不理未足爲憂腹心或病此則爲患若内外受敵膏肓已成雖逢和扁計疑作針藥無及又聞二賊奏請言詞不恒河北則數云請降河南則云今已翻賊豈遷延晷刻以候一作至西郵有虞伏惟與公卿大夫審圖利害在於神速不可遲囬昔諸葛亮聞孫權破曹休軍因上䟽蜀主云群疑滿腹衆難塞胸今嵗不征明年不戰使孫策坐大併有江東蜀主深感其言終以覺寤臣忝六官之貳待罪朝行内慙塵忝無補毫髮近者抵冒輙上封章已歴兩旬未䝉召見伏以君臣之際家國共同君安臣榮國危家敗此臣所以竟夕不寢伏敢再陳其愚伏願省臣前章覽臣此䟽天下幸甚天下幸甚無任惶懼之至代李侍郎論兵表集作代論伐劍南更發兵表憲宗吕温元和元年臣某言臣伏見某月日詔㫖更發太原鳯翔及神策諸鎮兵赴劒南東川者陛下睿算無遺神武必斷與人除害順天行誅奮如霆之威乗破竹之勢期於久逸無憚一勞大正國經永清時祲百王盛事千古英聲天下幸甚然或時事之可否兵家之利害集作病道途之險易將帥之宜稱不可不深圖逺計原始要終狂夫有可擇之言愚者有一得之慮管窺所至願効微誠集作忠臣竊以爲古今用兵皆在將勇師和政齊計勝不必多兵廣衆然後成功今髙崇文等諸將所統已約一萬五千餘人以整擊亂以順討逆授以集作之廟算假之天威馘醜挫兇霈有餘力若更多徴征鎮廣命師旅集作合師臣竊計之其患有五一則髙崇文素非大將㧞自偏鎮忠勇雖著威聲未振集作洽本兵既少兼統則多將皆權𨽻士非素撫雖是銳師勢同烏合居常則猶可脅制臨敵則何以指揮非惟崇文才分有限此亦自古兵家所難臣不敢廣引載籍上煩聖聽請直以近事明之哥舒翰潼闗之守郭子儀相州之圍韓全義激水之役皆以兵多將雜而致敗衂許叔冀之保靈昌李光弼之全河陽李晟之收復京邑皆以兵少將一而建大功成敗昭然布在人口二則貞元以來天下無事四方節將人各懐安陛下覆燾惟新理先清静今以西南小醜久稽天誅自春徂夏集作冬非徴發已廣見在兵力破賊有餘若更務濟師屢聞動衆山嶮集作劔深阻暑濕爲沴北人南役誰不憚行去土離家動生愁怨往年涇州叛卒職此之由事繫安危不可不察三則吐蕃約盟集作盟好未定窺伺在心間諜徃來急於郵傳又必持兩端之計與劉闢交通若聞發兵西南多亂集作取邉鎮秋風即至虜馬已肥冒隙乗虚必有侵軼事出萬一悔何可追四則劉闢窮冦保險逃死雖禍淫助順天道甚明而兵凶戰危人事難必脫或貔虎之師少不如意蜂蟻猶聚假息旬時攻守之間動湏應援固當潜鋒養鋭以逸待勞今便悉兵後將何繼五則劍川磽塉居人食且不充蜀路險艱餉運無由多致今屯兵日費何啻萬金數州麥粟貴糴集作糴且將盡千里飛輓所濟幾何若更加兵實難供贍一夫脱有菜色三軍無復鬭心幸可少以成功何必多而爲集作成非患今太原及神策等軍已上道者其數頗多足辦戎事其鳯翔等鎮未發之兵伏乞聖恩且勒權停續候事宜以議行止臣謬膺重任過䝉恩遇輙率狂瞽輕黷宸嚴茍利國家甘心鼎鑊無任兢惶懇廹之至謹奉表陳奏以聞請赴行營表為淮南杜相公憲宗劉禹錫臣佑言臣自守淮濆已周星紀虔奉朝典粗安遐方素効未聞新恩荐及身曵兩綬寄深一隅蚊蚋負山力誠不足鷹鸇逐鳥志則有餘臣再授兵符夙叅軍幕被堅執鋭雖未經於戎行受制集作制勝伐謀亦嘗習於事業自忝藩翰屬時清平無施汗馬之勞但詠鞬櫜之什今則遭遇殊奬委之専征以臣率先是臣素志况聞徐州士衆本無叛心倉卒之間危疑至此臣請自臨疆場親領紀綱裂帛繫書諭其禍福椎牛饗士養以威聲冀宣皇風照兹蠢類以忠義感脅從之伍以含𢎞安反側之徒革面悛心期乎不日其揚州留務請令行軍司馬路應權知伏乞聖慈俯賜照鑒論西戎表為淮南杜相公憲宗前人臣佑言臣一辭闕庭已經二載官當重任身受厚恩既懐子牟戀闕之心又負臧文竊位之責所以歌頌聖德禆補箴規塵露至微不任懇迫臣逺祖詩顯名漢代出牧南陽讜言善策隨事獻納忠醇之至聞於中外遺風可襲有激愚衷臣是以輙竭聞見粗陳梗概雖不盡陛下聖明萬分之一然臣子之心有直必獻伏唯皇帝陛下徳合天地道躋文武弛張普博上集作事法隂陽氣均生成人霑亭育凡是氛沴覆以春和銷除容納皆如聖意寛宥肆赦實賴皇明河中誅鋤不勞兵革淮右底定不戮一人慶浹萬邦事出千古近又西戎背約冦犯王師陛下𢎞貸集作貸其豺狼矜其兇悍布以恩澤果此知慚功因徳成不以兵革集作制故詩云獫狁孔熾書稱蠻夷猾夏臣觀自古帝王不忍小忿貽大患故竭耗中國盡心邉陲至必滅昆明之城平大宛之種豈足發揮皇猷增榮簡冊故賢哲之論薄衛霍之功陛下鏡歴代無益之端脩大君文德之教遂得北狄深藏五城晏閉百蠻嚮化四海無虞惟此小蕃尚迷聲教陛下示之大信𢎞以舊恩雖闗防暫驚而􅇏燧旋罷臣負恩方鎮初懼冦戎正於憂廹之時果聞仁聖之諭攘却兇孽不勞干戈臣静思逺圖爲國久計莫若存信施惠多愧其心嵗通玉帛待以客禮昭宣聖德擇奉誼之臣恢拓皇威選謹邉之將積粟塞下坐甲闗中以逸待勞以髙御下重其金玉之贈結以舅甥之歡小來則慰安大至則嚴備明其斥候不撓不侵則戎狄爲可封之人沙塲無戰死之骨若天下無事人安嵗稔然後訓兵命將破虜摧衡原州營田靈武盡復舊地通使安西國家長筭悉在於此計熟事定舉必有功茍未可圖豈冝容易此皆陛下朝夕倦談之事前後立驗之謀臣質性頑踈籌畫庸近受恩非㨿敢忘獻忠犬馬之心實所罄盡謹遣某官奉表云云文苑英華卷六百十五
