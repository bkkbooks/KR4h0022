body:
  text: 文苑英華巻三百十一宋李昉等編居處一上陽宫二首九成宫二首華清宫十一首宫十七首苑三首殿六首樓十首上陽宫上陽宫王建上陽花木不曽秋洛水穿宫處處流畫閣紅樓宫女笑玉簫金管路人愁幔城入澗橙花發玉輦登山桂葉稠曾讀列仙王母傳九天未勝此中遊同前羅鄴春半上陽花滿樓太平天子昔巡遊千門雖列一作對嵩山在一笑還隨洛水流深鎖笙歌巢燕聽遥瞻金碧路人愁翠華却返昇一作自登仙去長使一作腸斷宫娥望不休九成宫夏晩九成宫呈同寮前人碣舘分襄野平臺架射峯英藩信煒􅈌勝地本從容林引梧庭鳳泉歸竹沼龍小軒恒昔處長坂屬相從野席蘭琴奏山臺桂酒濃一枰移晝景六著畫宵疑作盡宵鍾枚藻清詞律鄒譚曜辨鋒結歡良有裕聮宷愧無庸蹔悅丘中賞還希物外蹤風煙逺近至魚鳥去來逢月澗横千丈雲崖列萬重樹紅山菓熟岸緑水苔濃願以西園柳長間北巖松九成宫前人蒼山入百里崖斷如杵臼曾宫憑風廻岌嶪土囊口立神扶棟梁鑿翠開户牖其陽産靈芝其隂宿牛斗紛披長松倒嵑􅠣怪石走哀猿啼一聲客淚迸林藪荒哉隋家帝製此今頽朽向使國不亡焉為巨唐有雖無新增修尚置官居守廵非遥水逺跡是雕墻後我行集作來屬時危仰望嗟嘆久天王守一作狩太白駐馬更搔首華清宫蚤秋望華清宫樹以成詠集作因以成詠盧綸可憐雲木叢滿禁碧濛濛色潤虛泉集作靈泉近隂清輦路通玉壇標八桂金井識雙桐交映凝寒露相和起夜風數枝盤石上幾葉落雲中燕拂宜秋霽蟬鳴覺晝空翠屏更隠見朱綴共玲瓏雷雨生成早樵蘓禁令雄野藤髙助緑仙果迥呈紅惆悵繚垣暮兹山聞暗蛩華清宫感舊王建塵到朝元天一作火照巾原邉使急千官夜發六龍廻輦前月照羅衣一作衫淚宫裏一作馬上風吹蠟燭灰公主粧樓金鎖澁貴妃湯殿玉蓮開有時雲外聞天樂即集作知又作應是先皇沐浴來華清宫三十韻杜牧繡嶺明珠殿層巒下繚墻仰窺雕一作舟檻影猶想赭袍光昔帝登封後中原自古强一千年際㑹三萬里農桑几席延堯舜軒墀立集作接禹湯雷霆驅號令星斗煥文章釣築乗時用芝蘭在處芳北扉閑木索南面富循良至道思𤣥圃平居厭未央鈎陳裹巖谷文陛壓青蒼歌吹千秋節樓臺八月涼神仙髙縹緲環珮碎釘鐺泉暖㴠牎鏡雲嬌惹粉囊嫩嵐滋翠葆清渭照紅粧帖泰生靈夀歡娛嵗序長月聞仙曲調霓作舞衣裳雨露偏金穴乾坤入醉鄉玩兵師漢武廻首倒干將鯨鬛掀東海胡牙掲上陽喧呼馬嵬血零落羽林槍傾國留無路還魂怨有香蜀峯横慘淡秦樹逺微茫鼎重山難轉天扶業更昌望賢餘故老花蕚舊池塘往事人誰問幽襟淚獨傷碧簷斜送日殷葉半凋霜迸水傾瑶砌踈風罅玉房塵埃羯鼓索片段荔枝筐鳥啄摧寒木蝸涎蠧畫梁孤煙知客恨遥起泰陵傍同前樓閣參差倚夕陽年年花發滿山香重門閒鎖青山晩深院垂簾白日長草色􅇗綿侵御路蟬聲嗚咽遶宫墻先皇一去無回駕紅粉翠鬟空斷腸望華清宫感事前人聞說先皇㸔集作醉碧桃日華摇動集作浮艷鬰金袍風隨玉輦笙歌逈雲捲珠簾劔珮髙雙鳳集作鳳駕北歸山寂寂六龍西去集作龍旟西幸水滔滔娥睂没後廵遊少瓦落宫墻見野蒿華清宫二首李商隠華清恩幸古無倫猶恐蛾睂不勝人未免被他褒女笑只教天子暫蒙塵二朝元閣轉羽衣新首按昭陽第一人當日不來髙處舞可能天下有胡塵過華清宫二十二韻溫庭筠憶昔開元日承平事勝遊貴妃專寵幸天子富春秋月白霓裳殿風乾羯皷樓鬭鷄花蔽膝騎馬玉搔頭繡轂千門妓金鞍萬户侯薄雲欺集作欹雀扇輕雪犯貂裘過客聞韶濩居人識冕旒氣和春不覺煙煖霽難收澁浪和􅌦甃集作怨浪涵瑶甃晴陽上綵斿巻衣輕􅁂懶窺鏡淡蛾羞屏掩芙蓉帳簾搴瑇瑁鈎重瞳分渭曲纎手指神州御案迷萱草天袍妒石榴深巖藏浴鳳鮮隰媚潜虬不料邯鄲蝨俄成即墨牛劒鋒揮太皥旗熖拂蚩尤内嬖陪行在孤臣預坐籌瑶簮遺翡翠霜仗駐驊騮艷笑雙飛斷香魂一哭休早梅悲蜀道髙樹隔昭邱朱閣重霄近蒼崖萬古愁至今湯殿水嗚咽一作惆悵縣前流華清宫和杜舍人前人五十年天子離宫仰峻集作舊粉墻登封時正泰御宇日何集作初長上位先名實中興事憲章起集作舉戎輕甲胄餘地復集作取河湟道帝𤣥元祖儒封孔子王因縁百司署聚㑹一人湯渭水波摇緑秦郊集作山草半黄馬馴金勒細鷹健玉鈴鏘集作馬頭開夜照鷹眼利星芒下箭朱弓滿鳴鞭皓腕攘畋思獲吕望諫秪避周昌兎跡貪前逐梟心不早防幾添鸚鵡勸先集作類賜荔枝嘗月鎖千門靜天吹集作髙一笛凉細音摇羽集作翠珮輕歩宛霓裳脱二字基集作根潛結昇平意遽忘衣冠逃大虜鼙皷動漁陽外戚心殊廹中途事可量血集作雪埋妃子豔集作貌刃斷禄兒腸近侍煙塵隔前蹤輦路荒益知迷寵佞遺集作惟恨䘮賢集作忠良北闕尊明主南宫遜上皇禁清餘鳳吹池冷睡集作映龍光祝夀山猶在流年水共傷杜鵑魂厭蜀蝴蝶夣悲莊雀卵遺雕栱蟲絲罥􅀞梁紫苔侵壁潤紅樹閉門芳守吏齊鴛瓦耕民得翠璫登年昔酺樂集作昔時歡康樂講武舊兵塲暮草深巖翠集作靄幽花墜逕香不堪垂白叟行折御溝楊華清宫二首前人風樹離離月稍明九天龍氣在華清宫門書集作深鎖無人覺半夜雲中羯鼓聲二天闊詩選作闕集作閤沉沉夜未央碧雲仙曲下霓集作舞裳一聲玉笛向空盡月滿山中集作驪山宫漏長宫贈許左丞從駕萬年宫盧照隣聞道上之廻詔蹕下蓬萊中樞移北斗左轄去南臺黄山聞鳳吹清蹕侍龍媒曳日朱旗巻參雲金障開朝參五城柳夕宴栢梁杯漢畤荒如月秦祠聽似雷寂寂芸香署離思獨悠哉玉華宫杜甫溪回松風長蒼鼠竄古瓦不知何王殿遺構絶壁下隂房鬼火青壞道哀湍瀉萬籟真竽瑟集作笙竽秋光極集作秋色正蕭灑美人為黄土況乃粉黛假當時侍金輿故物獨石馬憂來藉草坐浩歌淚盈把冉冉征途間誰是長年者南原望漢家宫前人荒原空有漢宫名衰草茫茫雉堞平連鴈下時秋水在行人過盡暮煙生西陵歌吹何年絶南陌登臨此日情故事悠悠不可問寒禽野水自縱横隋宫鮑溶御街行客路集作行客行客悲春風野老幾代人種田煬帝宫零落池臺勢髙低禾黍中呉宫殷堯藩吳王愛歌舞夜夜醉嬋娟見日吹紅燭和塵掃翠鈿徒令勾踐覇不信子胥賢莫問長洲草荒涼無限年古行宫章孝標瓦煙踈冷古行宫寂寞朱門反鎖空殘粉水銀流砌下墮環秋月落泥中鸎傳舊語嬌春日花學嚴粧妒曉風天子時清不廵幸祗應鸞鳳集梧桐溫泉宫王建十月一日天子來青繩御路無塵埃宫前内裏湯各别每箇白玉芙蓉開朝元閣向山上起城繞青山龍暖水夜開金殿㸔星河宫女知更明月集作月明裏武皇得仙王母去山鷄晝嗚宫中樹溫泉泱泱出宫流宫使年年修玉樓禁兵除集作去盡無射獵日西麋鹿登城頭梨園弟子偷曲譜頭白人間教歌舞古集作故行宫前人寥落古行宫宫花寂寞紅白頭宫女在閒坐說𤣥宗和李司勲過連昌宫韓愈夾道踈槐出老根髙甍巨桷壓山原宫前遺老來相問今是開元幾葉孫陳後宫二首李商隠茂苑城如畫閶門瓦欲流還依水光殿更起月華樓侵夜鸞開鏡迎冬雉獻裘從臣皆半醉天子正無愁二漢武開新苑龍舟燕幸頻渚蓮參法駕沙鳥犯勾陳壽獻金莖露歌飜玉樹塵夜來江令醉别詔宿臨春隋宫前人紫泉宫殿鎖煙霞欲取蕪城作帝家玉璽不縁歸日角錦㠶應是到天涯於今腐草無螢火終古垂楊有暮鴉地下若逢陳後主豈宜重問後庭花楚宫二首前人複壁交青鎖重簾掛紫繩如何一柱觀不礙九枝燈扇薄常窺月釵斜只鏤冰歌成猶未唱秦火入夷陵二湘波如淚色漻漻楚厲迷魂逐恨遥楓樹夜猿愁自斷女蘿山鬼語相邀空歸腐敗猶難復更困腥臊豈易招但使故鄉三户在綵絲誰惜懼長蛟深宫前人金殿銷香閉綺櫳玉壺傳㸃􅍋銅龍狂飈不惜蘿隂薄清露偏知桂葉濃斑竹嶺邊無限淚景陽宫裏及時鍾豈知為雨為雲處秪有髙唐十二峯漢宫前人通靈夜醮逹清晨承露盤晞甲帳春王母西歸方朔集作何處去更湏重見李夫人蘭昌宫劉駕宫蘭非瑶草安得春常在廻首春又歸翠葉不能待悲風生輦路山川寂已晦邊恨在行人行人無盡嵗苑奉和立春遊苑盧藏用天遊仰疑輦駐城闉上苑遲先晩更新瑶臺半入黄山路玉檻傍臨𤣥㶚津梅香欲待歌前落蘭氣先過酒上春幸預栢臺稱獻夀願陪千畝及農辰同前沈佺期東郊暫轉迎春仗上苑初飛行慶盃風射蛟冰千片斷氣衝魚鑰九闗開林中覔草才知荔雜詠作纔生蕙殿裏爭花併是梅歌吹銜恩歸路晩棲烏半下鳳城來長洲苑吳黄武中此地校獵孫逖吳王初鼎峙羽獵騁雄才輦道閶門出軍容茂苑來山從列陣轉江自遶林回劒騎縁汀入旌門隔嶼開合離紛若電馳逐溢成雷勝地虞人守歸舟漢女陪可憐夷漫處猶在洞庭隈山靜吟猿父城空應雉媒戎行委喬木馬跡盡黄埃攬涕問遺老繁華安在哉殿預麟趾殿校書和劉儀同庾信止戈興禮樂修文盛典謨壁開金石篆河浮雲霧圖芸香上延閣碑石向鴻都誦書徵博士明經拜大夫璧池寒水落學市舊槐枯初學記作踈韻不同髙譚變白馬雄辨塞飛狐月落將軍樹風驚御史烏子雲猶初學記作方汗簡溫舒正削蒲蓮雲雖有閣終欲想江湖重陽殿成金石㑹竟上詩張正見周王興露寢漢后式甘泉共知崇壯麗迢遞與雲連抗殿䟽龍首峻階一作陛激天泉東西跨凾谷左右矚伊瀍百常飛觀竦三休複道懸拱烏遥造日攑虬逺架煙雲棟疑飛雨風窻似望仙玉女臨方鏡金鐺映彩椽梅梁横發蘂玉井倒披蓮榮光開御宿佳氣屬祈年霜鴈排空斷寒花映日鮮負扆憑霄極台司列象躔登臺諠大厦御氣響鈞天北斗承三獻南風入五絃鸞歌鳷鵲右獸舞射熊前翔鶤仰不見疑鷰雀徒聮翩冬至乾陽殿受朝隋煬帝北陸隆一作𤣥冬盛南至晷漏長端拱朝萬國守文繼百王至徳慙日用治道愧時康新邑建嵩嶽雙闕臨洛陽圭景正八表道路均四方碧空霜華凈朱庭皎一作曖日光纓珮既濟濟鍾鼔何鍠鍠文㦸翊髙殿彩旄分脩廊元首乏明哲股肱資一作貴惟賢良舟檝佇一作行有寄庶此王化昌宣政殿退朝晩出左掖杜甫天門日射黄金牓春殿晴薰集作曛赤羽旗宫草霏霏集作微微承委珮鑪煙細細駐遊絲雲近蓬萊常五集作好色雪殘鳷鵲亦多時侍臣緩歩歸青鎖退食從容出每遲元日含元殿下立仗丹鳳樓門下宣赦相公稱賀四字一作上相公二首楊巨源天垂台耀掃欃槍夀獻香山雜詠作山青祝聖明丹鳳樓雜詠作闕前歌九奏金鷄竿下鼓千聲衣冠南面薰風動文字東方喜氣生從此登封資廟略兩河連海一時清二臨軒啓扇似雲收率土朝天劇水流瑞色含春當正殿香煙捧日在髙樓三朝氣蚤迎恩澤萬嵗聲長繞冕旒請問漢家功第一麒麟閣上識酇侯樓奉和登北顧樓見一百七十五巻梁簡文帝登烽火樓前人聳登柳類聚作聳樓排樹出却堞帶江清陟峯試逺望鬰鬰盡郊京萬邑王畿曠三條綺陌平亘原横地險孤嶼𣲖流生悠悠歸棹入渺渺去㠶驚水煙扶類聚作浮岸起遥禽逐霧征登𤣥暢樓沈約危峯帶北阜髙嵿出南岑中有陵風榭迴望川之隂崖險每増減湍平互淺深水流本三𣲖臺髙乃四臨上有離羣客各有暮歸心落暉暎長浦煥景燭中潯雲生嶺乍黑日下溪半隂信美非吾土何事不抽簪登陽雲樓劉孝綽吾王一作士陽臺上非夢髙唐客回首望長安千里懷三益顧惟慙入楚殊一作降私等申白西沮水潦收瑕一作照丘霜露積龍門不可見空暮陵寒栢和晩日登樓劉綏所以登臺榭正重接煙霞長絲觸欄斷歸鳥避忩斜俯巢窺暝宿臨檻摘髙花百雉時方晩九層光尚賖和侯司空登樓望鄉隂鏗懷土臨霞觀思歸想石門瞻雲望鳥道對柳憶家園寒田淵裏凈野日曉中昏信美今何益傷心自有源秋日登廣州城南樓江總秋城韻晩笛危榭引淒風逺氣疑埋劒驚禽似避弓海樹一邊出山雲四靣通野火初煙細新月半輪空塞外離羣客顔鬢早如蓬徒懷建業水復想洛陽宫不及孤飛鴈獨在上林中登東陽沈隠侯八詠樓崔融旦登西北樓樓峻石墉厚宛生長定缺俯壓三江口非階銜疑鳥衡交䟽過牛斗左右㑹稽鎮出入具區藪越巖森其前浙江漫其後此地實東陽由來山水鄉隠侯有遺詠落簡尚餘芳具疑物昔未改斯人今已亡粤余添藩左束髪事文塲悵不見夫子神期遥相望登澤州城北樓宴陳子昂平生倦遊者觀化久無窮復來登此國臨望與君同坐見秦兵壘遥聞趙將雄武安君何在長平事已空且歌𤣥雲曲銜酒舞薰風勿使青衿子嗟爾白頭翁登薊邱樓送賈兵曹入都前人東山宿昔意北征非我心孤負平生願感涕下霑襟暮登薊樓上永望燕山岑遼海方漫漫胡沙飛且深蛾睂杳如夢僊子曷由尋擊劒起嘆息白日忽西沉聞君洛陽使因子寄南音文苑英華巻三百十一
