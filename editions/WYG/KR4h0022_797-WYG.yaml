body:
  text: 文苑英華卷七百九十八宋李昉等編㕔壁記二尚書省吏部尚書壁記一首兵部尚書壁記一首吏部郎中㕔壁記一首吏部員外郎南曹㕔壁記一首司門員外郎壁記一首御史臺御史大夫壁記一首監祭使壁記一首諸使兼御使中丞㕔壁記一首尚書省吏部尚書壁記孫逖吏部尚書在周為太宰之職其建設徒屬敷陳事典則周官備之矣秦滅古法始置尚書漢増其制創立選部故靈帝以梁鵠為選部尚書是矣魏改選部尚書為吏部尚書自晉宋至於北齊皆因之宇文朝依周官置大冢宰卿一人蓋其任也隋革周制復曰吏部尚書皇朝龍朔二年改為司列太常伯咸亨元年復為吏部光宅元年改為天官尚書神龍元年又為吏部尚書綜九流之要為六官之長位尊任重實在于此自武徳已來多以宰相兼領一彼一此更為出入才難不其然乎皇帝在位一有宥之二十二年缺其官選于衆乃命武都公自兵部尚書拜焉公地惟宗英才則人傑忠孝自律矜嚴成憲式是軌度諒于衡石國之利也所及逺哉天監有唐俾多吉士踐此位者四十八人嘉名已著於國史故事宜存於臺閣繫以日月自得春秋之義記其代遷更是公卿之表以備官學列為壁記焉兵部尚書壁記杜頠周官大司馬即今兵部尚書官屬掌邦國之政以九法封國以九伐正邦以籍我畿以倡我牧𢎞有萬類阜成兆民訏謩戎馬之事密勿鈞衡之地自我唐受命迄于今居夏官者衆焉或列於台階者蓋寡矣所以任必以親以徳以勲以賢穆如清風翼我𤣥化率惟茲有典用保乂有邦三十一年冬十二月詔工部尚書李公典之政敷於時道濟於物優㳺學府蔚為詞宗以公族之英受親賢之寄屬冡宰虚位官吏要才載委天衡是掌理邦政東廵嵗夏四月皇帝將崇厥徳報厥功乃命再從兄開府儀同三司持節朔方節度副大使兼禮部尚書上柱國信安郡王禕禮樂天付衣冠人秀忠以匡濟文以經綸謀明道高功格化洽昭乃王度簡于帝心九命可以見其賢四征可以觀其績鎮朔方以無名之討八年而北虜平攻右堡以不陣之師一旬而戎狄服榆闗之役用兵以竒故仗鉞而兵勝大河之戰戒軍以嚴故坐帷而軍健建奉常之禮則神人恊上下和從夏卿之政則萬國平六卿睦辦九州之國一作圖知其姦宄同其貫利掌六馬之物駕理以則講獻以時握五兵之要以辦功理以待軍事此九職司馬政之所統也王勤政以和是以戎翰允輯振旅以蒐舍禽周禮作茇舍以苖理治周禮作治兵以獮大閲以狩此四田司馬教之所被也王敦教以就禮是以祀典孔明初則以法示其令也終則以伐則其徳也九功惟叙九叙惟歌是用陳既往之烈繫今來之羙以書于壁吏部郎中㕔壁記獨孤及太㣲五帝星座後十五星曰郎位秦漢之君則而象之乃建郎中集作官至魏世祖分尚書曹為六郎各六人今之吏部魏之選曹也掌選舉銓覈以正公卿大夫士郡吏之品位凡廢置之柄官府之序嵗終令天下郡縣㑹計致事而郎官起草立議操而成之然後尚書受成於郎中郎中之選非椘金百錬顔集作旋弓六鈞弗與也故居官者不由選曹郎而進罔以見其才之餘地亦猶刀劒之刃未嘗屠大牛集作刲大軱切大玉則雖曰我且必為鏌鎁人猶疑之由其途而升驟必環周三臺翰飛兩掖登喉舌秉刀尺者什七八集作七文諸曹郎莫敵也嵗在乙巳河南賀若公用貞幹諒直實蒞厥任往嵗公為集有員字外郎也東曹朗然如得水鏡治餘杭也呉人熈熈若逢陽春今也來思集作斯八法在手操割成務彌綸舊章厥集作悉如初政嘗以前哲軌躅我之韋絃而武徳以來􅇬署鼎新者數官曹易名者五若姓不表年不紀是廢徳也將來何觀故謹而列之俾我曹之春秋存乎座右其選部司列天官文部之目各因其所革時之先後冠於其首以為志云吏部員外郎南曹㕔壁記權徳輿漢廷尚書郎辨章制度主文書起草之任東漢方冠以曹名用諸曹功次超卓者轉遷選部魏晉已還其任䆮劇國家紀律昭明官脩文粹作循其方凡薦紳之倫未命為大夫者滿嵗皆調於轂下啟事賦祿必先有司初上元中天官趙郡李敬𤣥號為稱職以覆視官簿差次裁成端本肇末不得不重文粹作得不重煩乃請外郎一人顓南曹之任其後或詔同曹郎分主之或詔他曹郎權居之皆難其才而慎斯文粹作其舉也大抵膺是二字集作受命者多士必屬耳目焉以其公私集本文粹作是能否之間集作問不可遏集作過也以亊之委㑹吏之竒袤因縁詭故或作詐中或作故若市道居之者通則闊畧守或深刻苟成績於是則翰飛不暇登二掖賛六職得之夷易疾若傳置太原王仲舒字𢎞中温毅㢘直清方敏實風槩資才邁乎群倫貞元十年冬繇諸侯部從事賢良對策歴左右諫列議曹考功郎十八年實受斯命類能故也於是用心堅明忠恕循理官業程品具舉尤違自絶然後以狀之成質於冡宰小宰罷遣者不讟受禄者不誣恢恢然投其虚而芒刃不頓君子以𢎞中之道為折中矣昔春秋書士糓曰堪其亊也魯語曰署所以朝夕䖍君命也令因官署而舉事任春秋丘明之志也至若龍朔咸亨改闕之説此皆不書司門員外郎壁記前人周官司門為司徒之屬今為司冦之屬貟外郎於周為上士後數更其名至隋為承務郎武徳初定為今制秩從六品上大凡自漢魏已還典曹理事雖時有汙崇官有輕重或百職耗廢雜而多端而即位皦然未嘗有鹵莾進越非其任者蓋宗公貴任多由此塗出所以儲時集作明才練官業必於是焉方今車書尉侯通道旁午而斯任尤劇彭城仲子陵脩詞而筮仕説經有師道自博士祠部郎稍遷于茲且以南輟集作轅銓藻之勤乆次而後至脩性自牧闇然君子之道也况大雅之匪懈孔門之政事古誼家法乆於講貫遵脩砥礪其可量邪至若門闗出入之籍設險閑邪之義譏而不征守而不紊列在令典集作書端如貫珠故可畧於此仲侯以故志屋壁之隙欲集無此字壊磨滅使鄙夫書而補之貞元辛已嵗夏六月記御史臺御史大夫壁記李華君以文明照臨百官官糾其邪職有文集作在邦憲由京師而端下國王化所繫不唯威刑御史夫夫其任也用捨决於天心得失震於人聼舉直措枉果而不撓則公卿屏氣道路生風率其屬以正于朝瞻我衣冠不仁者逺苟異於是為君子羞政之雄雌與徳輕重故名公在位天下仰頼焉秦官有御史大夫在漢為三公職副丞相闕則大夫遷或名司空或復舊號史足徵也議大政必下丞相御史其廷署古曰府近曰臺其衣冠章綬品秩所規載於甲令聖朝臣唐虞高尚之賢内周漢不賔之俗登人於五福薦樂於九歌帝徳廣運而瑞草生天威震動而神羊至故柱石骨鯾之老更拜焉距義寧至先天登宰相者十二或作一十人以本官叅政事者十三人故相任者四人藉威聲以稜檄外按戎律者八人官或改稱大司憲臺或分為左右肅政罷置不恒從所宜也開元天寳中刑措不用元元休息由是務簡益重地清彌尊任難其人多舉勲徳至宰輔者四人宰輔兼者二人故相任者一人兼節度者九人異姓封王者二人尊號加孝徳之明年樂成公自尚書左丞兼文部遷崇徳也昭融禮經嗣續文雅張仲孝友山甫將明風度可以師長人倫動靜可以訓齊天下喬岳鎮定嘉量平均心為百行之宗體備四時之氣雅有之曰文武吉甫萬邦為憲樂成有焉至若教行於無訟之前慮辨於未萌之始未萌而慮則求煩不獲無訟而教則何用不臧寛細瑕為大體復故事為新政小人畏法君子夷心無隠情於國家無愧辭於神道堂堂乎大雅之素也初㕔壁列先政之名記而不叙公以為艱難之選將俟俊粹後人謂華嘗備屬僚或知故實授簡之恩至屬詞之藝寡無以允副非常之待所報者直質而少文天寳十四年六月十四日記御史中丞壁記前人皇帝受天明命埀五十年大道成俗黎民於變百官設而無事三辟存而不論振古未然也猶以為成嵗資於降霜律人本於持憲憲司之拜尤覈名實王猷其逺乎夫察風俗平寃滯踣邪佞延俊一作睃賢云誰司之職惟御史亞長曰中丞二大夫以領其屬士丐為伯㳺之佐司馬乃令尹之偏古之制也漢儀大夫副丞相以備其闕叅惟國綱鮮臨府事故中丞專焉意者殄兇人之豪扶一作挾君子之道各行其志無所牽束行止與大臣絶位指顧則周行振聳政體宜之晉宋元魏以還無御史大夫由是中丞威望愈尊禮有加等如火烈烈如霜肅殺不可犯也屬時清無獄朝尚寛政行葦忠厚王化根源周室仁及草木而愷悌流乎頌聲漢文雅一無雅字好黃老而公卿恥言人過舉盛徳而儀刑著矣焉用察察闕闕以恟主人哉欲以此道行於軍旅故東西幕府皆兼大夫餘軍多假憲司之號聖皇之志也天寳中君臣於道徳之間又新其化一作他非以尚書左丞張公為大夫少府大卿庾公為中丞天下翕然名教知勸大夫睦中丞也羽翮得清風之助中丞奉大夫也律吕本黄鍾之宫耆儒碩老罕云遇此盛矣公中和備體沉潜經徳易直且武温文而清遵王路以整多方由夫身而貞百度此外盡余事也古之制記者先諸徳而後諸事至若命官之始省復之代名號冠緌之差禄秩位員之數辭尚體要况皆知之今不書省文也華昧學淺藝承命維谷一作俗非羣言之首非所克堪然故吏一作史也勉以酧徳天寳十四年九月十日記監祭使壁記凡制依本作制九栁宗元禮檀弓曰祭禮與其敬不足而禮有餘也不若禮不足而敬有餘也是必禮與敬皆足而後祭之義行焉周禮祭僕視祭祀有司百官之戒且誅其不敬者漢以侍御史監祠唐開元禮凡大祠若干中祠若干咸以御史監祠蜀本作視祠官有不如儀者以聞其刻印移書則曰監祭使寳應中尢異其禮更號祠祭使俄復其初又凡制供祠之吏雖當齋戒得以抶集作决罰由是禮與敬無不足者聖人之於祭祀非必神之也蓋亦附之教焉事於天地文粹有者字示有尊也不肅則無以教敬事於宗廟文粹有者字示廣孝也不肅則無以教愛事於有功烈者是報徳也不肅則無以勸善凡肅之道自法制始奉法守制由御史出者也故將有亊焉則祠部上其日吏部上其官奉制書以來告然後頒于有司以謹百事太常脩其禮光祿合其物百工之役先一日咸至於祠而考閲焉御史㑹公卿有司執簡而臨之故其粢盛牲牢酒禮菜果之饌必實于庖厨鍾皷笙竽瑟琴戞擊之樂簨簴綴兆之數必具於庭内樽彛罍洗爼豆醆􅕌之噐必㓗于壇堂之上奉奠之士賛禮之童樂工舞師洎執役而衞者咸列數其實一作成列若其貫設箠朴于堂下以作官刑而群吏莫敢不備物羅奏牘于几上以嚴天憲而衆官莫敢不盡誠而祭之日先升立於西階之上以待卒事其禮之周旋樂之節奏必周知之退而視其燔燎瘞埋終之以敬也居常則􅅚四方祀貢之物以時登于王府服噐之脩具祠宇之繕理牛羊毛滌之節三宫御廪之實畢備而聽命焉舊以監察御史之文粹無之字長居是職貞元九年十二月御史多闕余班在三人之下進而領焉明年中山劉禹錫始復舊制由禮與敬以臨其人而官事益理制令有不宜于時者必復于上革而正之於是始為記求於文無於粹字簿書得為是職者若干人書焉諸使兼御史中丞㕔壁記古者交政一作脩於四方謂之使今之制受命臨戎職一有而字無所統屬者亦謂之使凡使之號蓋專焉而行其道者也開元以來其制愈重故取御史之名一作循而加焉至於今若干年其兼一有御史二字中丞者若干人其使絶域統兵戎按州部專貨食而柔逺人固王畧齊風俗和闗石其大者戡復于内拓定于外皆得以壯其威張其聲其用逺矣一作威聲用張壯其道矣假是名一作官以蒞厥職而尊嚴若是况乎㧾憲度於朝端樹風聲於天下一作于闕下其所以翼于一作於君正于一作於人者尤可以知也武公以厚徳在位甚宜其官視其署有記諸使兼御史中丞者而多闕漏於是求其故於詔制一作制詔而又質於史氏増益備具遂命其屬書之且曰由其號而觀其實後之居於斯者有以敬于事文苑英華巻七百九十八
