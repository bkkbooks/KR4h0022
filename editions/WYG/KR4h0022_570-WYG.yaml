body:
  text: 文苑英華卷五百七十一宋李昉等編遷祔慰賀代人賀遷獻懿二祖表二首為代宗告謝九廟表一首代百寮慰七廟追崇先祖表一首為于侍中請赴山陵表一首為崔冀公請赴山陵表一首為裴尚書慰山陵事畢上表一首代中書門下賀八陵脩畢表一首賀脩八陵畢表一首慰過山陵表一首為福建閻常侍奉慰德宗山陵表一首為羣官固請公除表三首將加神龍尊號羣官請公除表一首為羣官請虞䘚哭表一首為李僕射慰義章公主薨表一首為杜司徒慰義陽公主薨表一首為王侍御瓘謝宣弔兼賻贈表一首為令狐博士緒補闕綯謝宣祭表一首賀順宗諡議表一首代齊賈二相賀遷獻懿二祖表吕温臣某言伏見今月十四日制命以尊尊親親之義䖍祔獻祖懿祖於德明興聖廟室正太祖景皇帝東向之尊者十五日奉遷事畢十六日祫饗禮成日月貞曜乾坤定紀稱情靡忒合敬有歸百神得受職之方萬國知來祭之本中賀臣聞國有事莫大於嚴祀禮有經莫大集作崇於尊祖夏殷得之以繁祉周漢用之以集作而休明爰自魏晉迄于隋氏或以祚短而不及祧正或以時艱集作難而未遑討論紛綸興謝綿曠載祀竟虛盛典類表作美允屬昌期陛下道冠前王慶殷累聖奉無競之烈克廣鴻休瞻有赫之靈思正大典精誠感念旰食疇咨内斷皇明俯裁羣議奉祖宗於常尊之地定昭穆於式序之宜清廟肅雍𤣥英華避諱改作昊今從集本穹保祐奔走夷裔鼓舞生靈煥乎觀一代之光盛矣接千年之統臣等自鍾舛薄坐嬰衰瘵不獲躬執籩豆稱慶闕庭誠仰聖敬英華避諱改作敎今從集本感深孝理形留神往倍百恒情無任竊忻之至代京兆李尹賀遷獻懿二祖表劉禹錫臣某言伏見詔書以今月某日奉遷獻祖懿祖神主祔於德明興聖皇帝廟盛禮云畢宗祧永安誠感誠悦頓首頓首伏以太祖景皇帝膺期撫運啓封于唐為百代不遷之宗開三靈眷命之兆頃以本類表作聖朝初建清廟備儀二祖冠西室之先景皇闕東向之位諸儒獻議歴載未行陛下濬發睿謩旁延正論爰詔多士會于中臺酌三禮之前文參百王之故事講貫斯定詢謀僉同備物類表集本作撰日展儀至立視履配貴神於遠祖正尊位於始封廟貌有嚴補之太穆示人以孝得禮之中既觀秩秩之容必降禳禳之福同職為内史屬忝本枝躬遵盛儀獲申誠敬無任感悦屏營之至為代宗告謝九廟表常衮臣某言臣纂承丕圖懼忝鴻業宵衣旰食寅畏增深未戢難於寰區恐獲戾於宗廟明發惕厲祈哀聖靈夢寐承顏如親左右謂臣曰知爾孝敬憫臣而降以恩私福及冲人祐其後嗣德音所誨歎息如聞睿㫖慈仁再三眷命追攀不逮哀慕難任欲報之恩昊天罔極無任荷恩摧咽之至謹奉表陳謝以聞臣某誠悲誠喜頓首謹言代百寮慰七廟追崇先祖表李嶠臣某等言臣聞享帝立廟陳乎太極之典尊祖配天載乎厥初之頌蓋用嚴宗䖍祀敦孝睦親以脩海内之職以崇天下之訓斯千帝百王之所因襲也四學三雍之所講論一作肄也伏惟大周繼天作聖踵武嗣徽湛恩洎於行葦崇構興於綿瓞陛下纂祖宗之洪緒資聖神之睿問乾坤合德日月在躬利澤浹幽顯光明燭宇宙用能誕膺休厯丕臨大寶近惟神祗福祿之祚遠想稼穡艱難之業后稷以弼諧大舜隆姬錫受命之符太皇以翼亮有唐聖武當樂推之運七百之鴻基不墜九五之尊位以光天休荐委靈命再集豈非積善累慶深仁厚德之致歟夫源長者流深道悠者利博是以商廟觀德享祀彌乎七代牧野追尊行號光於三葉今者徽章改物鍾石變音神靈扶更始之運億兆慶維新之業宜其憲章典禮損益質文奉嚴祀之恒事採褒崇之故實三昭三穆對于不遷之祖八簠八簋存乎如在之敬然後上以化下卑不臨尊𢎞詩人永錫之義合周易大觀之象豈惟祖考來格實懷安樂之心故亦夷夏式瞻載佇雍熙之福伏願浚發皇鑒時流天璽考經籍哲王之典雜縉紳先生之議涓時擇日冊祝備禮臣等得參陪振鷺洗滌大牲承奔走之下列觀肅邕之盛典則一人有慶子孫承永保之祥四海宅心臣下得自安之地無任懃懇之至為于侍中後篇作郎請赴山陵表上官儀臣某言伏以塗宮方撤祖載有期後篇作辰蹐厚地而靡容跼高穹而標絶臣昔逢開運委質藩朝荏苒迄茲後篇作今年將一一作數非紀位非德漸榮以後篇作自恩滋顧視後篇作循涯分何階致此而今谷林啓隧宸衞將移衽席遺簪纒哀罔極方願整素類表作網絲後篇作隨緌翿而攀慕奉劍舄類表作弓劒而崩號後篇作摧送往已後篇作茲窮事居方永特希宸鍳曲遂荒襟伏紙失圖罔知攸措此篇六百七卷重出今已削去為崔冀公請赴山陵表于公異臣某言臣聞臣之事君盡於追遠子之事父禮在送終忠至苟全死且無悔後篇作恨臣某中謝臣本山東布衣耕于後篇作於淇澳弓裘陵替無以庇身屬天寶中𤣥宗聖明河海類表後篇作海㝢清晏臣始忝宿衞入侍丹墀合門歡榮長㓜同慶洎祿山叛命慶緒西侵𤣥宗以玉輅南巡肅宗以金輿北幸諸侯避狄天子蒙塵臣當此時有死無貳於是執殳荷㦸漸拜偏裨逮肅宗克復兩京再安九廟臣遂東征西伐式遏蕃蠻荷寵承榮稍遷將帥先皇以臣頗經統領久鎮方隅天渙曲臨授臣節制後篇作遐方授節一辭雲陛十載守邊空懸魏闕之心未展子牟之戀徒慙保障有愧繭絲後一篇作璽書肇自一官累登三事兢惶罔措悲駭失圖荷戴恩榮不勝號絶且諸侯五月同盟至天子七月同軌至今先皇厭代已歴四旬臣妾攀號哀纒六合况臣一身授任九族霑榮華轂朱輪留蟬滿路永惟恩寵答荷後篇作効何階豈謂先皇後篇作帝升遐臣不得執紼陵隧陛下登極臣不得後篇作遑稱慶闕庭吉凶二途禮制皆闕伏乞皇類表作聖慈曲被天澤俯臨許臣匍匐𤣥堂稽首黄壤攀穹永訣跼地長號獲申罔極之哀用畢終天之願無任殞絶崩迷後篇作迫之至此篇六百八卷重出今已削去為裴尚書慰山陵事畢上表崔融臣某等言自遏密纒悲山陵啓卜陛下情深撤帳戀切遊冠至於鹵簿吉凶途程日月莫不親􅂷睿旨顯發宸衷由是川后兢馳山祗荐委雲物澄霽景氣清和靈驂電轉非因下人之力神輦風行自有上天之助山河道路曾不艱虞木石犬馬咸當感悦豈非大孝所洽通於神明至聖所𢎞動於天地者矣伏以某日吉辰永安神寢郊原四合門闕九重傍奉園林近瞻京邑𤣥宮一閟紫禁長辭萬國同軌五情分裂伏惟皇太后陛下哀慕永往聖懷難居臣等早侍軒墀謬霑簪履攀龍不及顧慕軒轅之臺耘鳥相驚屏營會稽之野限以歸從末由詣闕無任悲感之至謹遣某奉表以聞代中書門下賀八陵脩復畢表德宗權徳輿臣某等言臣聞宗廟之享以致吉蠲山園之制以極嚴敬國朝祀典盡集作參用漢法寢宫便殿永集作䖍奉衣冠日往月來久未脩復伏惟皇帝陛下繼明恭已大孝因心丕承祖宗對越天地薦馨香於九廟崇經構於八陵庶民子來百堵皆作人神協吉龜筮告猶用成弈弈之新實自蒸蒸之孝行宫盡復神御以安掌禮之官䖍於受命奉陵之縣但覩成功慮財用而靡集作不賦於人量事期而不愆于素罔極之感交於神明奚斯閟宫徒頌諸侯之事叔孫原廟蓋匪先王之法孝彰禮備豈比於今列聖在天萬方受祉春秋匪懈超冠百王臣等謬叅集作忝台司獲承詔旨無任誠賀之至貞元十四年八月十七日賀修八陵畢表令狐楚臣某言得進奏院狀報八月十五日百寮於宣政類表作和殿賀脩八陵畢伏惟陛下行通神明孝彰天地深懷遠慕嚴奉諸陵台階元臣展敬以祗命甸服蒸庶忘勞而陳力芟類表作薙青蕪以疏徼道掃紅腐而浄藩園崇固䕶於岡陵增肅清于松栢漢朝充奉徒見其遷人魏時向望空聞夫作樂方今大禮彼實缺然天下臣妾不勝幸甚况臣名編竹籍屬忝葭莩感慶之誠倍百恒品奉慰過山陵表伏承順宗至德大聖大安孝皇帝奄過山陵率土臣庶不勝號慕伏惟陛下孝思天類表作之至祗事薦誠精貫昊穹禮備園寢攀慟類表作號罔極聖情難居臣謬列藩條限於守職不獲奔走陪慰内庭無任感惕兢越之至為福建閻常侍奉慰德宗山陵表前人臣某言伏見制書大行皇帝靈駕尅以某月日遷座崇陵先太后梓宫自靖陵啓發同時合祔萬邦永慕悲纒於弓劒七月有期痛延於蠻貊伏惟皇帝陛下孝思罔極至性自天攀奉山園聖情難處中慰先朝臨御悠長威靈遐被儲祉傳聖以福四方今祗祔禮終清廟如在率土臣庶實謂一作為哀榮臣職沗方隅分憂地遠不獲仰陪下列奉慰外朝無任瞻戀哀惶之至為羣官請公除表蘇頲臣某等言伏奉今月二十日敕違此終喪未從權禮恭惟聖旨相顧失圖臣某中謝臣聞孝德稱三事親之道不貳喪禮有五權制之儀居一雖霜露增惕君子有終身之悲而日月其除達人無追遠之義故大賢抑情而俯就不肖庶幾而企及百王同範千古不刋此所以定通喪此所以明大孝陛下欲乖前訓獨展因心棄易月之制申再期之禮臣何人斯輙敢裁議然凡聖殊貫尊卑異等情則無别服則不同漢朝故事行之自久是以先后遺旨具刋節制率土之濱孰不哀奉陛下若違衆慮循私情想欒棘以纒悲服苴枲而增慕此則非先后之遺意也異通賢之達節也伏願俯依慘制以順權宜屈小節而存至公抑冲􅁭而明大禮則下願上達人欲天從陛下不違於先㫖微臣得申於公議不任悲迫之至謹詣朝堂奉表陳請以聞此篇原編在六百七卷今移入于此為羣官固請公除表臣某等言臣聞以日易月著自不刋之典以臣事君竊惟有争之義羣心累切聖感未廻臣等焦惶不安啓處中謝臣又聞之高宗諒隂三年不言百官總已以聽於冡宰斯則求古之人自殷宗行之矣但事有通變時有損益或循古法多昧遠圖孝文由是創禮孝景因之從令故漢之帝王獨高文景孝者先於百行豈欲違而致美誠以神器之重天下至公所直小所枉大加百姓而刑四海作程於後罔不率由陛下纂大橫之繇開中興之業每旰食坐朝求衣視事不可得不言也不可得總已也固不可如殷之時也臣請以近事為明是云典故豈三聖追遠曷不甚哉三年制服蓋未然矣先后一作王所以末一作未顧之深一作除者欲順成先志不改其道乎若遂乖於所奉固於執見寧獨神祇之望缺億兆之心阻必當太宗有恨於昭陵之仙寢高宗不悦於梁山之𤣥宮先后徒勤於憑几之言陛下是忘於綴衣之日矣今禮云衷後聖不宜獨善今禮云非前王故以􅂷訓其可專之乎况敬於宗廟四時之感斯在廢於禮樂萬邦之化安寄不薦不享久矣其如奉先何禮壞樂崩久矣其如致理何懼非大孝之意也頃公除有數臣等祗若今攅塗又畢時月已遠而陛下廷則簪裾之序居尚苴葈之容至有百蠻入覲千官在列仰晞太陽俾見羣下便謂君臣之禮舉而有二遐邇之人感且非一彼數事者伏惟熟計之臣等輙以悃悃之忠願抑蒸蒸之孝陛下當廻思遷慮從權達禮思代天理物之大惟愛人治國之機上則遵於累聖禀於遺旨下則順此誠祈因而俯就顒然所戴罔不知幸無任悲迫惶悚之至謹詣朝堂奉表以聞第二表臣某等言臣以易服之禮著之前訓從權之義聞諸格言遂乃披瀝肝血願埀昭亮天心彌固日慮徒勤是用怔惶但深憔懼臣中謝臣聞通喪之制差等不同天子絶朞故云自達此孝情之奥㫖不疑作非喪服之遺事故雍言致惑子張發問於殷宗除服不疑元凱具陳於晉主此則家國殊禮君臣異貫前帝軌儀備之方冊况皇朝典故駿命斯在祖宗奉先不違茲躅陛下若以庸言不信上則請按於周禮陛下若以今古異途此則請詢於唐典雖聖情多感臣不忍言而有義可憑終期俯察復以四海無外萬機事大國望時宗猶有權奪則陛下為天下主作人父母司牧羣方纂膺寶業何忽以冕旒之貴而行布衣之禮也且臣等一作子公除䖍奉明訓陛下若素帟未卷縞衣仍服使吉凶殊於内外丹素雜於宮寢無乃哀樂乖宜乎無乃情禮失衷乎又臣以奉君為忠子以奉親為孝孝必順於先志忠必期於助禮今先后遺制服紀具存陛下小不忍行動而愈失陛下則固執儻違於大孝愚臣不請先陷於不忠臣何心顏敢安視息是以不勝慺慺崩迫之至謹詣朝堂固請以聞將加神龍尊號羣官請公除表臣某等言臣聞君親之義臣子同極陛下至孝純深將固三年之典臣等盡忠懇到佇廻三舎之暉是則陛下違先后之遺命臣等忤聖人之嚴旨違命幾於過戚不可以稱孝忤旨嫌於必諍不可以稱忠所以莫顧犯鱗共甘碎首臣等中謝臣又聞之王者代天理物為天所子循至公以臨大寶非獨善以崇小節由是漢之國章始從權以變禮晉之廷議故屈已以因除擁萬乘之尊有萬機之政者示不得同於凡也前王著於不刋其來久矣四聖則常追遠俯而就之陛下罔極之思通喪是執所不忍言莫之省奏遂令霜露多變日月其除皆臣之至愚誠未感聖天意若曰助陛下以非常之功人謀協從尊陛下以非常之號者欲陛下司龍紀受龍圖祗分祉而建皇極擁神休而奉清廟者也故天有景貺不可拒者審矣國有茂典不可廢者明矣鐘鼓不擊不足以旅庭冕旒不施不足以端扆未有膺其冊缺其儀乎臣等茫然悉未能喻况哀戚有制故非同日變通適道甫及載朞誠宜奪因心之慕稽順時之請當建鴻名以承上帝則所直者大所枉者小罔不格于上下通於神祇晞太陽之光曜乘和氣之充塞伏願陛下全之臣等昧死以聞期於必遂此篇元編在六百八卷今入于此為羣官請虞卒哭表臣某等言臣等伏見有司撰既葬反虞之禮陛下當以今月二十七日公除卒哭聖情感慕所未忍言衆慮焦惶罔知攸寘中謝臣等謹按晉書杜預議畧曰天子之位至尊萬機之政至大羣臣之衆至廣不得同於凡人故大行既葬祔祭於廟則因而除之不除羣臣莫敢故屈已而除之天下之人皆曰我王仁也我王孝也此乃聖制移風易俗之本於是盧欽魏舒等從其奏議莫不厭服臣等歴選列辟頗徵前史王者為天所子受天明命代天育物先天弗違居大寶之位行至公之道故沿革而致理變通以成政况先后之永願聖朝之舊式簡冊備矣方􅂷無窮君親臨之寧愛非禮而陛下愈遲見禮記三年問之痛孝思罔極履曾參之小節遺漢文之故事闕貫於神明粤自開闢天子之德未有如睿宗孝之純深也至使慶雲湧浪井出嘉木連理神芝三秀蓋其效歟要不可以情過哀而所枉斯大矣臣又聞七月而葬既葬縗除其月而虞既虞吉祭為之降殺用斷喪服示不得踰之今合於山陵祔於宗廟詢之典訓嘗有稽矣而終不師古始不易月考之事宜又無謂矣舉而書此將何以法陛下昧旦聽朝戚容深視庶官所以環拱近臣莫之利見戴九天之仁覆渴十景之清光顒然之情蓋未能諭且追遠興感君子有終身之憂以權制服聖人思屈已之重何必三年之禮稱為百行之端若天無卑聽固違於獻欵臣敢先除今附於不義豈司牧黎獻作人父母之意乎伏惟陛下可羣司之奏順剛日之請去獨行以致美闡大猷以光濟勿使鴻生鉅儒廢一作發書而鬱悒下學上達空草議以屏營臣等至懷期必俯就則凡在動植無任悲幸謹昧死詣朝堂拜表以聞代太原李僕射慰義章公主薨表令狐楚臣某言得進奏官類表作院狀報義章公主今月九日薨輟朝七類表作三日者臣伏聞公主分輝帝籍擢秀皇闈麗有掩於舜華纔成下嫁慶初傳於螽羽奄見一作有上仙伏惟陛下仁愛方深恩慈所屬始其凋謝軫以悲傷臣限守邊陲忝聯枝葉不獲陪位奉慰無任哀塞悽愴戀結之至為杜司徒慰義陽公主薨表劉禹錫臣某言伏承義陽公主薨伏惟聖懷傷悼增切伏以公主妍姿令則冠絶天人禀敎皇宫已挺柔嘉之德降嬪卿族益彰貞粹之儀方期作範壼闈長榮邸第豈意遘兹短壽奄謝昌辰慮陛下軫念未捐類表作損深慈莫遣有虧常膳罷設宫懸臣子之情不任惕戀况聖凡禮異家國制殊伏願道齊彭殤理達修短割肌膚之愛慰寰海之心率土人臣孰不相賀集作慰無任懇欵屏營之至為王侍御瓘謝宣弔並賻贈表李商隱草土臣瓘言今月某日某官呂述某官任疇等至奉將聖旨以臣父某官某亡殁賜弔臣等并賻贈臣亡父布帛三百疋米粟二百石者大夜銜輝窮泉漏澤以殞以越終哀且榮臣某中謝臣先臣某託體元侯䇿名任子象賢傳劒餘力攻書歴七朝而在公秉二道而非墜氛興赤狄兵聚晉城先臣受律臨戎忘家狥衆士卒均食罔媿於前修廊廡散金遠齊於舊説上憑王畧下振軍威旬月之間慶㨗相繼並親桴三鼔躬運九章如臣弟兄皆冐矢石豈意竒功􅂷立大願莫從傳飱失時衉血成疾奄至凋落長違盛明此皆由臣等抱釁既深就養無素遂延家難仰惻宸襟尚偷生於晷刻亦何顏於天地伏惟皇帝陛下悼深撫扤悲軫聞􅎏降憫冊於上公厚賻禮於遺體昔魏優死事止分食邑之餘漢養孤兒但有羽林之聚方於今日彼媿推恩呌號失容戴履無所軍前結草必自於幽靈石上澆集作生松敢忘於遺訓無任感恩荒殞之至為令狐博士緒補闕綯謝宣祭表前人草土臣某言今月某日中使某至奉宣恩旨致祭臣亡父贈司空臣某者存殁願終哀榮禮備荒迷觸地號呌瞻天臣某中謝臣先臣某生遇昌期早司國柄没留懿德上惻宸襟特降王人迂臨私第陳其醆爵潔以豆登招集作擅遺魄於幽陰旋歸莫覩視殘生於晷刻報効無期臣等無任戴恩荒殞之至謹附中使某奉表陳謝以聞賀順宗諡議表為人作令狐楚臣某言伏奉六月十四日敕旨太常奏大行大皇尊諡曰至德大聖安孝皇帝廟號曰順宗臣某誠感誠慶頓首頓首臣聞入廟觀德載在前言聞諡知行傳於故志伏惟順宗大聖安孝皇帝統承九聖保乂萬邦繼耀大明合符真宰方同天以下覆俄厭代以上僊伏惟皇帝陛下哀慕未忘孝思罔極痛衣冠之永閟攀弓劒而無階殷薦鴻名光昭懿德廟號非徵於漢魏帝圖自掩於羲軒百代見聖人之功四方知君子之孝率土臣子以欣以感臣限於鎮守遠在方隅不獲奔赴闕庭陪位稱賀無任踴躍之至此篇元誤編在六百三十五卷狀門今移入于此文苑英華卷五百七十一
