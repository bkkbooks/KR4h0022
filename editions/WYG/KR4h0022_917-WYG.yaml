body:
  text: 文苑英華卷九百十八宋李昉等編職官二十六留守少尹附東都留守韋虚心碑一首東都留守顧少連碑一首河南少尹竇府君碑一首東都留守韋虚心神道碑孫逖夫作春秋者必見於行事論將帥者蓋知其為人余為郎時南皮公實掌小司馬之職接武官次亟聞話言故思其人詢其事可知而見之矣公諱虚心字某京兆杜陵人也甄六氣之純粹協九疇之正直沉靜端慤仁慈隱厚忠之屬也清貞本於至公孝之終也毀瘁過於寧戚斯所以行成於內名揚於世者已越在童冠升于膠序介然獨立異於諸生國子博士范頤嘗與均禮然疑考功員外郎李迴秀擢以高第及夫岐下參卿河東主吏能於細謀其長御史賈虚舟舉以勸中丞侯令徳與從常辨習于學也如彼材諸位也若此欲無顯得乎明明天法廷尉攸序命公作大理司直大理丞以至于卿肅肅王度憲臺是式命公作侍御史以至于中丞長人之官以視百姓命公作歙曹二州刺史荆潞揚三州長史以至于太原尹司會之府允釐庶績命公作倉部左司二員外户部兵部右司三郎中左右丞兵部侍郎以至于工部尚書其餘掌吏部選採訪處置使東都留守皆丈疑作大任也又能兼之清風暢於臺寺隂雨膏於郡國所居致理所去懐徳徳以處事事以度功功成而義不愆事正而名不悖故今之任職者祖南皮焉初景龍中西域羌胡或謀背誕天威逮捕吏義疑作議咸劉公理其獄旬時伏念以為刑者所以明徳除害也誅其桀黠可以除害捨其脅從可以明徳繇是全活者千有餘人洎皇帝二十四年鑾駕還長安之月一作日有坐殊死在繇繫者時迫季冬將寘嚴法公為之請曰攸徂之慶方喜來蘇好生之徳宜加在宥上可其奏咸許從流此則蘇公之繇獄釋之之聽理也曩者竇懐貞奸佞之尤欲行私惠劉幽求勲庸既茂將復私讎各有愛憎公嘗按驗皆舉直以明枉不詭隨而曲從秉心惟一蹈尾無懼其後荆有大賈利合權門揚有貪吏婚連相國公亦既條察先訐奸家或命出其罪給郵置於三舍或撻記其過啓刑書於五宅此即山甫之不吐石奢之無避也爾其富人興利導俗閑邪於夀春則引芍陂以溉田於廬江則縣舒城以止盜茭牧之地實藝稻􅆝萑蒲之澤遂均廬井此即信臣之方畧少卿之理化也若乃擇賢親仁度材委政謂唐林璟盧從愿先逹之宗也故輯寧關右嘗與偕行謂趙良器劉琯後來之選也故亷問淮濆舉以為介此則欒武之從善趙宣之任使也疇若予工實諧俞往上方倚相適㑹云亡享年七十以開元二十九年某月日遘疾薨於東都寧仁里之私第皇帝悼焉揚州大都督府印綬贈物一百五十疋米粟一百五十石賜諡曰貞明年某月日葬貞公於京兆之高陽原祔先塋禮也昔者豕韋作伯扶陽仍相寘徳于後莫之與京公曽祖叔謙事太宗為考功郎中與兄叔諧季武同在郎署時人謂三列宿大父曰知人事高祖歴司庫員外郎贈職方郎中公烈考曰維事睿宗歴户部郎中終于左庶子贈絳州刺史季弟曰虚舟事皇帝歴户部司勲郎中今移左司唐興已來歴華省析薪齊美棠棣同升於述職為奉先在嘗僚為克友人物之盛凡今莫儔先是庶子府君之為户部郎署天庭之內首種行柳公及令弟能業其官曽是封殖益以蕃廡比行年而不朽將樹徳之偕滋僊臺譽之棠歌勿翦君子有以知韋氏之昌阜未可量也貞公之軌度所可逺也有美如是可無述焉肆其孤有方増永世之業先人之志俾余論綴故作是銘曰龍旂翼商勲績惟光祚𦙍其昌簪紱斯皇東郊處守北里居方時清任大運促人亡貞公之徳柔和諒直始終不忒存歿為則高墳有平豐石有勒芳名可久永永無極東都留守顧公神道碑杜黃裳韋夏卿撰銘昔康王以成周之衆命畢公保釐東郊承二后之業周禮以天官卿為冡宰漢以大司馬為將相國朝以尚書僕射師長百揆此四者人臣之極公盡更之有不至追而命之公之徳盛羙公諱少連字夷仲呉郡人也夏后少康以禹葬㑹稽次子為越王以主祀漢封裔孫其為顧侯纘禹之緒厥後蘞蔓世居河南中原戰爭復徙呉㑹自晉司空和洎梁給事中耀至公十三代矣衣冠禮樂為江左著族曽王父諱君卿皇朝柳一作郴州司馬大父諱克忠縉雲郡司倉參軍贈邠州刺史烈考諱望贈祕書監祕書府君慕梁伯鸞於陵仲子安貞履道不辱其身該通六經旁貫百氏究天人之際盡性命之端公藴山岳粹靈承祖考休慶瓌姿偉度識達行方志存逺大道契先覺每躬率耕稼厲精墳典齒列上庠升堂覩臭時小宗伯薛公邕深所歎異以為東南之美盡在廊廟之器不孤擢進士甲科猶謝詩人錯薪之義丁祕書府君憂居喪柴毀殆至滅性既祥而哀未忘也久之以書判高第典校祕文秩滿授登封主簿時議以皇居在鎬砥名之士登近甸者俗不為東畿殊不知樂嵩少之遊奮鴻鵠之翼先是邑有暴虎公以為天道一作神祗可以誠感猛鷙可以仁服乃堙塞陷穽移檄靈岳於是人安其居獸不為害其通理遂性也如是及休告東洛居守鄭公叔則辟為從事非其所好終以疾辭其明年書判超絶登第亞相于公頎推義行詔拜監察御史京師内亂鑾輅時巡公節見艱危步至行在陳少康滅澆之計墨翟設拒之宜帝納其忠拜水部員外郎翰林學士隨難南梁遷禮部郎中加朱紱銀綬學士如故贊絲綸之密命參帷幄之謀猷屢獻嘉言克昌天業乘輿反正疇勞計功退保冲謙口不言禄以東呉播越叶於方墓表求遷奉辭志哀懇徳宗以公職在近署重違其請乃命長男主喪中使監護水陸縣道斂禭之飾悉令仰給葬于偃師縣高邑鄉邙山之趾澤漏泉壤哀榮莫儔尋以本官知制誥賜紫疑衍金印紫綬遷中書舍人公在翰林僅將一紀富平以周密自著萬石以謹審見稱故造膝而言詭辭而出讜言碩畫人莫得聞帝深嘉之方將大任以文昌理本歴試其能凡三踐列曹再登八座一為散騎常侍一為左丞雖分職各殊領者數矣公之在地官也辨土地之名物稽夫家之衆寡四人不瀆五教允敷斂施以時貴賤有節所以法通制而濟經費也公在秩宗明典禮以正威儀變樂府而和上下錯綜經術辨論俊造黜浮偽而尚敦素所以觀人文而化天下也公在天官綜六典以佐邦理糾八柄以馭羣司登降庸勲權衡流品抑貪冒而進賢能所以代天工而立人極也珥貂騎省以直方備顧問以謇諤處朋儕時有權臣怙寵人多附麗公面折其短數而絶之羣臣為危正色不撓旋持左轄旁惣機曹之事凡三典賔貢三掌銓衡藻鑒表於知人情通播於令問萬邦輻輳五都浩穰命公尹京兆以為設鈎距塗赭衣前人一作使之所為不足以為四海式於是布和平尚簡易始務仁人之惠無取赫赫之名政𢎞大體去有餘慕遷吏部尚書復行太宰之職轉兵部尚書兼御史大夫東都留守處納言之位儀亞相之府行二南之化申九伐之威以洛苑閒田汝墳曠土乞田積粟務穡勸分貞我師律載清東夏孟元陽有溵水之功為當時所掩公密薦于先帝言雖不情一作成識者美之嗚呼昭假其功馨香其徳冝升玉鉉而底太階天不慗遺梁木斯壊以貞元癸未年一作歳十月四日薨于洛陽讓里之私第春秋六十三都人罷市而洒泣皇上廢朝以興悼乃命有司葬日給鹵簿簫皷追贈尚書右僕射飾終之義備矣太常考行諡曰敬夫人同郡陸氏常川司馬綺之女也藴中饋内弼之美女儀之徳冝配君子光我閨門石窌未封先公而謝有子曰師閔克家光烈早歳繼明以㧞萃甲科歴咸陽尉次曰師安太常寺太祝次曰宗彧宗憲志文好學不墜先業凱風之思有感人聲一作聽師閔等考卜先逺以明年二月十五日奉公洎夫人之裳帷合葬于亳邑附先塋禮也以黃裳陪南宮之班列接西掖之周行忝於史官頗知系録叙事詢於故老銘徳孝疑作存於碩儒追琢豐碑一作珉永播徽烈其詞曰洪惟哲人含道研幾大方不器正得疑作徳思惟磅礴山立危昻鳳姿耽耽廣厦浩浩澄陂元化及物聖主為時嘉猷式贊密誥是司十餘年間造膝詭詞顯仁藏用孰得而知天地有公輔相其宜綜綱清轄揭禮高闈貂蟬峨峨親侍玉墀帝思其人則曰汝為乃齊九賦乃張四維清濁是分集於靈龜祈祈名一作多士天一作在下觀頤正直摧剛誠明㓕私孰云𢎞烈一作强禦禦一作視若嬰兒量人氣折觸角用羸因智圖難尹正邦圻無念鰥寡克宣明夷一作威尼父有言栽者培之無赫斗樞迭為官師重光疊耀近古攸希分政于東𢎞訓保釐方俟元宰韋來膺斯一作期嗚呼不淑棟幹其萎神昧於仁胡可度思寵贈端右恩覃澤􅂷𤣥宇深邃龍光逶迤徳音孔昭視我豐碑河南少尹竇府君碑張九齡叙曰正其本集作身君子所以慎徳敏於行吉人所以寡辭或道之或處之是亦正命之將行利有攸往則時不家至而人勸言不面命而事濟不為跡而實以阜蕃不務集作沽名而聲以遹駿夫如是者存乎其人故河南少尹竇公蓋有之矣公諱某扶風平陵人自後魏大將軍侍中永富公至烈考瀛州刺史贈刑部尚書莘國公六葉矣皆贈華卿族見重公朝四國于藩四方于宣龍旂承祀六轡耳耳公所謂盛徳必祀承簡子之始大積善餘慶是僖伯之有後故生則靈和一作知長而純固既白而受采亦黃以通中天假不器之性人服自然之理而况於文雅縁飾志業孔修引伸足以長人動用足以利物既學從政其歸易簡形有萬殊道以一貫人致一意而已我乃萬目盡張故其始也以明經上第授彭州參軍事詢謀郡將器異甚厚所遇深一作森然其言固矣一作巳如山之為始於覆簣如江之導終以方舟於是累遷至于薛王友贊善大夫燕王築館以待士漢儲立苑以招賔當其推擇莫非賢俊議者惟允而公在焉然猶韞匵隨和十城空其價踡跼驥騄千里未之騁及其用也再入尚書郎遂為洛陽令三臺雅望一時精選舊章資以彌綸利器呈於盤錯出宰百里實惟集作曰三河其賦政則必反於其身亦既誠信被之於物是為惠懐故雖二州餘弊憸巧而難理五都集作郡尤劇權顧而多姧莫不可使由之令自求之善處中於下韝能合于遊刄至於釐舉風俗之謬裁正人倫之經務勸衣食之原調均徭賦之事本為巳任無間人言故視事踰四年通而不倦遺徳在百姓乆而益彰非夫明允宣和優柔博約自我之不忒為人之攸暨亦曷由臻兹厥有洛陽所謂賢令者則周紆王渙孔翊祝良公實續之誰其似之屬天子建中都營新邑咨爾亞尹俾其董司朝選其人公首斯舉以故稍選河中少尹且有後命廢府而復遷河南焉以公之歸從人之望官則改次政無易方以佐理王都以表則天地而年不克祚位不光寵遇暴疾而卒悲夫是歳有唐開元之九載春秋五十六公以孝友為體一變而迪忠信以明恕為用再變而至循良故所行無擇所事無巧有恒其徳終且温温不伐其功昭然赫赫所以遺愛固結必在何武之去稱誦思深惟恐子産之死已而神道欺而不福物情喪其所頼人之不辜今也云亡及喪之西歸則人吏致哀道路相屬得人心如此其㫖可知集無此句冬十一月葬于北原後之人或者遊於斯歎於斯彼其與歸我乃不朽矣其子八人長曰某次曰某家有太邱之徳里以高陽之名夙遘閔㓙能哀傷以殆㓕匪躬革其道懼功伐之不傳俾予為文以叙孝子之志銘曰綿綿瓜瓞少康遺烈靈則長兮莫莫葛藟王孫承祀世其昌兮而我實續如金如玉載錫光兮咨亞尹之徳柔嘉維則惟一作揚令問兮惟别駕之功邦國不空甿胥詠兮不競不絿不剛不柔以成政兮徳之攸好神之所勞實降祥兮有美無度曷不𦙍祚今則亡兮我著名節俾無冺㓕惠無疆兮文苑英華巻九百十八
