body:
  text: 文苑英華巻八百九十二宋李昉等編王爵三涇原主帥南川郡王贈司空劉昌神道碑一首武陵郡王馬公神道碑一首南平郡王髙崇文神道碑一首故四鎭北庭行軍兼涇原等州節度支度營田等使開府儀同三司檢校尚書右僕射使持節涇原諸軍事涇州刺史兼御史大夫上柱國南川郡王贈司空劉公神道碑權德輿惟南川郡王諱昌字公明貞師于安定十六嵗嵗直鶉火夏五月甲子寝疾病考終命制詔襚以司空印綬而弔祠法贈集作賻稱焉於是内子諸孤宗姻家老盡誠信於内從事大吏倫侯亞旅展匍匐於外叶志㑹事拂龜露蓍象數皆得以條陳纖微必蒙於可報以冬十月丁酉還眞宅於京師其原禮也公之先彭城人楚元王交之後䕫國公𢎞基之族孫也大王父全慶皇汴州别駕王父逹徐州長史父庭玉試太常卿贈徐州刺史三代醇靜不躋豐禄故天爵覆露發祥於公公角犀鷰頷魁岸碩大思謩泉深盛氣陽禮記作揚註讀為陽休清明以虚受荘重而强立禀於端誠之謂義發於慮憲之謂仁集有顯字揚天聲之謂武節修方任之謂文事再居陪卿三佐列藩以宫尹中執法以騎省亞丞相冬官宗伯比踐六職再受鉞而一撫封列王爵而食眞賦終於端右餙以論道其初守商丘授彭城下濮陽闕寧陵釋陳圍復梁地集作野皆急病肆力威功自著起沮傷以奮擊化匡駭為休寧其守不可㧞其功不可遏投難而智勇俱殖酣戰而竒正合發兵法曰有必勝之将書曰存亡在所用其信然乎始從河南集作東非節度張介然東討林胡殺畧居多次從宋州刺史李岑扞城半嵗劇賊遁去又從臨淮王光弼汧國公勉每用上効揚于軍鋒洎劉司徒𤣥佐始擁節旄錫宣武之號以族属勲力賈餘勇無前凡希烈之自寧陵走汴走蔡以至于死皆公之為貞元三年以偏師八千承詔䕶塞亦既旋斾俾營甸圻有尤違者連斬以狥天子壮其忠槩未幾徴還沃心前席饗醴命宥建行師之節制自禀新書分上相之賦輿留屯便地明年正月進律作藩彤弓𤣥甲物采備厚因六郡之氣俗用十連之教理入覲宣室請城平凉屹為巨防乃拓故地而乂險走集以禦冦徙邑居以便人夷墝埆而制井疆斬荆棘以列逵市貨力具舉農戰交修邉闗棄地宴然富殖長㓜養老沛然生聚隣有墜師者濟之棄甲者納之凡涇人之所未習者皆優為之涇土之所未産者皆茂遂之昆夷攝一作懾讋爟火訖息彼西土軌道繄吾謀實然理命不忘於信實遺章備見其忠悃年止於六十五未極夀寵皇帝之所以恤然加等良有以焉夫人吳國夫人陸氏柔嘉綢直婦道明備長子殿中侍御史贈潁州刺史均教忠能仕不幸蚤夭嗣子右威衛騎曹叅軍士涇慤善有馴行與支子右衛率府兵曹叅軍士傪洎士良及士和等以德輿嘗受面命類涇人聲詩馨香始終其傳信也熟将篆樂石載徴菲詞中郎二碑竊善頌於無愧春秋五例冀終義於後經銘曰亹亹南川得時經武大君有命式是西土西土濯征衆心成城夀甲琱戈涇師以貞隼旗鷩冕涇俗以寧肆厥忠力秉兹義程凡在五符至於白徒制為田廬亦有賈區寔墉寔畝交賛令圖嘉生油油比屋愉愉昔誓偏師士皆致果如使臂指可蹈水火孰云危事决勝在我狂猰内訌惡氣濛濛濁河而南或守或攻陳壁既㨗夷門乃通時惟南川實冠群公乃分兵符乃鏤彛器服物昭庸天休兹至勞勤心力𢎞大功利師則嚴終公惟盡瘁智氣𡨕𡨕發揚昭明下平水土上助神靈輅葆參差丘封崢嶸立此堅石於昭厥聲武陵郡王馬公神道碑熊執易大唐将軍能扶賛神武斬艾不王者曰太尉扶風王薨二十二年而長子蔚州牧御史大夫武陵王鉞自朔易歸葬于萬年銅人原貞元戊寅嵗五月六日克定焉禮也嗚呼自代宗末洎今上貞元二字一作第三元二紀之間所求乎髙明昌盛之家伯仲肯構之力而能保勲烈於上繼事業於下包前慶以滋大食舊德而日新者蔚州有焉公諱某字某其先茂陵人在堯舜揖讓之盛則庭堅作士而五刑五流克明伯益作虞而草木鳥獸咸若在殷周質文之極則造父啓風疑作封而秦始大宣孟作忠而晉蕃衍此其泉源之奥焉洎炎靈反動伏波為漢室天柱文教中興南郡為孔門一作聖木鐸此其祖宗之表焉在皇朝松安嶲鄯四府都督隴右節度加郿鄜三州刺史右武左武二衛大将軍扶風公食邑千户贈光禄卿府君諱正會公之曽祖也左司禦率府兵曹叅軍贈太子少保府君諱晟公之皇父也四鎮北庭涇原鄭潁等節度使開府儀同三司尚書左僕射知省亊兼御史大夫扶風郡王贈司徒太尉府君諱璘公之烈考也於戯在𤣥宗時太尉仗劒萬里建績二府實獵邉陲振揚公閫塞外諸蕃莫不内侮盖神貺靈慶公生伊西寔忠精是感也在肅宗時太尉乃唱大義以踰絶域提一旅以應王師既清西夏乃定有洛功盖郡帥勲在二京公與母弟績戀于大荒來寧上國覩兹盛業寔勲烈有嗣也在代宗時太尉乃總大兵居上将載雲旗控朔陲旄頭銷于舁糓蟻聚遁于虎落業揮而載氣讋戎旃火烈其威金聲方革北敵不敢邇邉者十年公實耳目旌門手足閨壼萬鍾之賦自我以財成七校之雄多予以暢遂寔父蠱裕而天寵浹内行積而公議歸也故公自初命四遷至太子左賛善大夫歴光禄少卿左驍衛将軍從祖司徒節制太原奏綂中軍兵馬拜左衛将軍武陵王尋加御史丞丁内艱起復右衛将軍兼雲州刺史大同軍使遷代州刺史石嶺鎮北兵馬使代北軍使為本道所請復将中軍兼御史大夫遷蔚州刺史横野軍使代北都知兵馬使嗚呼公之致身也以言乎天性則挺竒表於勁俗叶嘉慶於神州狥國可以彰忠克家可以明孝以言乎朝容則階貴冑以綂環衛著通籍以履周行仍朱户可稱赫翼宸居是謂嚴重以言乎邦正則本慈惠以撫三郡導滋殖以厚萬人乗塞寝柝智也告終罷市仁也以言乎戎律則盡瘁以被乎戰陣戮力以承其師帥書功在代郊一作書功代從叛可不曰勇哉啓手足歸全可不曰果哉總衆美而可覆恤平昔其故一作如在方一作藹有茂實諗無媿辭夫人南陽郡樊氏故侍御史衢州别駕晁之女之死之歎母天莫移嗣子前汾州平遥尉澹次泳湘漸汭深免喪之哀心目皆瞿長女歸濮陽吳曽次服沙門之教次歸汝南周邕泊㓜女三人婉稚年以室處公之令弟皓右神武軍将兼御史中丞禀天䇿以警紫垣綂禁旅而環黄屋貞忠一德向力帝家存沒永違茹哀天壤次晞前太常寺奉禮郎次曄前揚州參軍並耀𢎞文館明經盛矣夫光禄之威憺西陲少保之道髙齊俗太尉之神扶聖祚君侯之惠敷朔郊将軍之忠衛宸極君子曰田宗三王彼可全矣石氏萬石我何謝焉嗚呼非夫人明柔慈愛孰撫吾室非愛弟仁厚忠肅孰昌吾族而諸孤能承佐先軌懼隕厥問周爰叔父之仁㫖載王景行之遺烈敢稽代緒以表道周銘曰将星有耀燭天煌煌武庫多材我宗最良在昔光禄登壇保疆乃擁節旄以扼河湟左袵畏慕右地雄張降及司徒其道大彰遭德孔艱致命一匡既復區夏乃軌豺狼彤弓專征元戎啓行實倡九牧以定四方賢哉長嗣居焉廟堂庸勲是承父子皆王再秉龍韜中軍以揚出援魚符北地周康古人有言遏逸前光令子罔愆繼序不忘精騰魄復天望地藏髙墳揭然豐碑在旁雨露既濡松栢蒼蒼獨有代功著于縑緗南平郡王髙崇文神道碑韋貫之唯聖奉天刑奮神武振起隆平之運者非得臣無以成其業唯賢抱英略任艱難垂鴻不朽之績者非偶聖無以展其材故欲理之主興則佐命之臣出天人之際厥有明之一作祗應期感發若合符契皇唐十一葉明天子受位将懲禍于四方天錫以忠武之臣登翊鈞衡賛揚威烈此聖賢相遇者以其天人合發之運歟侯誰膺之則南平王其人也公諱崇文其先齊太公之胄自敬仲得姓而望於渤海及容止齊髙止字子容奔燕或家於范陽今則為幽潞人也奕世以禮義傳家法至公七葉無分居異財化行於鄉黨開元降制使存慰及旌表門閭者咸至於再曽祖藝朝散大夫試汴州長史祖䕫試梁州司馬贈梁州都督考行暉正議大夫試懐州别駕贈户部尚書咸晦名垂裕慶不在其身公鍾天之靈發地之秀膺時之傑起聖之期㓜觀儒書不屑章句雅尚義節制存功名遂學兵鈐習騎射術窮秘要藝擅國能天寳末安史之難因投筆硯事平盧軍偏禆隨鎮淮右寳應中代宗避亂陜服公從戎師父赴難行營扈蹕還京䇿勲居最其後智光之稱亂隂晉靈曜之俶擾大梁崇義之負固襄漢常卒疑作率别部為前鋒功冠諸軍累官執金吾太常貞元初始授陳許節度都侯及領所部隨韓全義鎮長武城神䇿淮南陳許浙右四軍同戍公總其侯奄之任臨下簡肅士衆悦而歸之尋加開府儀同三司始受蒲璧啓封渤海五年敗犬戎於寧州軍師書勲授節制之號公亦遷職而進封為王及全義還朝委以留務四遷至御史中丞十四年遂為長斌大使卒伍貫于素𨽻紀律明於先令劃壤為寨風塵不驚徹田為糧榛荒盡闢訖五六載昆夷不敢東顧邊城晏閉二十一年就遷御史大夫自至德已還天下多壘擁旄守土者至五十餘鎮每主帥就世将吏有得其柄者多假衆怗力以求代襲朝廷每不得已因而命之是嵗也西蜀戎師相國韋公其佐劉闢将踵武前事乃拒詔命逼脇使臣圍逼梓潼爭㨿劒門之險今上深惟宿弊将一戎衣以正四方謀於廟堂宰臣杜公黄裳賛定其䇿因薦公可任大事元年正月拜工部尚書右神䇿行營節度總䕶諸将便道南征公之在鎮繕甲兵勵士卒常如待敵及奉詔而至即日進路三革五刃無不完具前軍剋劒閣遂觧重圍危城載邑失地全復即授東川節制轉兵部尚書左丞奮師敗衂之餘當芟夷焚爇之後拊廵創痏懷輯逋離敷愷悌之仁起常傷之氣義勇爭奮羸餓者來蘇賊衆退保鹿頭我師進至羅江縣相拒半舍自五月至於仲秋小戰則小利大戰則大利奪其險要挫其鋭氣賊乃堅壁不敢爭鋒然而憑髙阻深綿亘十里我攻彼守衆寡相懸候便宜曠嵗月則傷財留費稽我靈誅乃表請濟師以圖大舉及軍繼至則分命勇鋭入其心腹絶其餱糧介於連壘之中而軍焉且俾申諭前詔開約降之路其大将􅄷良輔等執送闢子方叔及婿蘇强率一作衆四萬餘人束手候一作俟命公乃俘二孽以獻釋将卒之縛復授以兵俾還龍壘無彼我之虞軍吏咸有獻疑謂非受降之道公曰彼逆以廹兇威父母妻子為其刼質今既窮歸貫死夫何懼哉遂使降衆先驅連營旅進闢率餘黨奔於西山公遣大将髙霞寓酈定進以輕騎追捕及位疑于陽二唐書作羊灌田闢弃馬投江二将倒㦸而出之遂擒以至械送闕下行獻告之禮而戮焉公入成都申􅃊禁令無敢侵掠市不改肆農不易畝百姓感悦如霽重隂而熈愛日也又以天子恩澤布于一方脅從詿誤者咸宥其罪斬賊将邢泚以狥曰莫如此偽効誠欵隂持兩端三軍接龢如振塵埃而濯江漢也粤以十月遷檢校司空領全蜀十有三州外逹諸蠻成泉安武一作撫賜實封三百叚本傳作户封南平王侍從之臣紀功篆石建碑于鹿頭之下盖今相國裴公之詞斯為不朽矣是役也師人貨費皆仰給有司量估僦直歸于幕府凡計緡百四十餘萬其用未半而冦難平主者請私贏公曰有土實可以奉軍國財非所宜隠盡命列上歸之縣官時蜀之府藏竭無以賞功佐吏請重税編户公曰恩未及而遽徴歛人将不堪但命閲簿書籍逋責得以備用甿不益賦闕無敢欺公常欲斥西戎復凉隴自居益部亟以急病為請願守邉陲天子壮其忠且将附以一面之寄乃授相印仗鉞於邠京西諸軍都受綂制邉城動洽威惠故以不約而信不令而嚴居三嵗戎政允理将朝於京既而有疾猶扶强首路則以展軨効駕而大病至焉以元和四年九月二十有五日薨于官享齡六十有四軍府哀慟如喪親戚皇情震悼不聽朝者三冊贈司徒􅈖以米粟布帛有加常等禮官考行諡曰威武明年正月二十日葬我司徒南平王於萬年縣設奠於國門之外百官成位弔哭以送君臣之義厚矣哀榮之禮備矣夫人董姓汝州長史同彌一作珍之女正位中閫佐佑仁賢翟茀未榮鵲巢空在春秋三十有一以大厯十有四年五月一日終元和三年追封郇國洎兹啓殯淮右從公于居嗣子金紫光禄大夫行思王傅上柱國上谷郡開國公食邑二千户士政次子檢校秘書監兼御史中丞士榮季子左衛率府胄曹參軍士明漸漬義方事由忠孝保持門户克纉家聲君子知南平之業為不忘矣惟公氣勇烈行易直内器劒距外不矯餙其治戎也持重有節制信賞以勸之明罰以齊之嚴不近苛竒必合一作含正每臨敵制變勵如猛獸一作鷙迅如風雨啓行助雷霆之威斷後保阿山之阻故攻無不剋守無不固其牧人也使之蠶而衣稼而食不奪其時不竭其力載其清净一與休息故不能親舉而濳飲其得蜀川隆富首冠藩服我以功而居有之是宜保尊榮安暇豫矣然而不屑寵利狥國損躬振髙風激時弊子文逃禄去病辭第訂之於我彼何𤨏細四紀事軍旅百戰成勲庸遭逢盛明升受鼎鉞有賢人可大之業張聖后神武之威獨立一時我無慙德自廽餙南藩作扞西鄙朝廷以之倚仗四國以之瞻仰貪亂稔禍者竊視惕息徹其邪謀嗚呼天不憗遺奪我何速公之冡嫡以貫之常學斯文謬掌書命授以不刋俾傳信詞採遺烈於世家無慙實録奉孝思之誠託有愧當仁式表新阡永昭神道銘曰幽朔之都浸遼鎮碣氣象盤鬱英靈峻發克生南平挺為人傑㓜秉忠壮蹈兹武節韜畧懸觧藝能貫疑作冠絶天寳季嵗安史猖獗爰執干櫓遂從征伐屢僨豺牙頻探虎穴勲名克樹爵禄有列惟天因人惟人奉天惟賢希聖惟聖資賢靈命隂隲有開必先自昔多難方隅擅權操兵襲位四紀之年光爍我后雅斷精堅将致武訓俾夫頑遷蠢爾庸蜀負險專地帝謂南平總戎為帥式遏亂畧輔成吾志南平秉鉞如火烈烈取彼兇孽獻于天闕式其怙亂必寘夷㓕萬邦震驚九截荒札樂土全蜀任雄一方南平蒞止匪居匪康我懷急病整守西疆帝庸嘉信于邠斯鎮受委戎綂登榮相印鼎餗方餁干戈未衅任重道逺時行運窮舟移巨壑日下髙舂摧藏壮氣惻愴遺忠縟禮歸厚明思有融哀哀令嗣克孝惟終篆記樂石昭明世功奮乎千載式是英風文苑英華巻八百九十二
