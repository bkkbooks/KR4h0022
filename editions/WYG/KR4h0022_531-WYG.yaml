body:
  text: 文苑英華卷五百三十二宋李昉等編封建拜命請命職官門二十一道封建賜則出就判六道拜命拜命布武判三道請命請命服判二道小國附庸判一道職官三公佩刀入閣判一道方領為衣判一道問羊知馬判一道鈎距為業判一道大匠拜將改㕔判二道員外郎讓題劍判一道錦衣狐裘判一道太守步歸郡邸判一道封建賜則出就判甲賜則有司令其出就訴云未成對王者制義所以禄賢能人臣奮庸於是受錫命甲自天祐實勞王爵大邦吉士小雅藎臣崇其徽章假其禮物漢詔求士寵錫惟重周官賜則命數未𢎞既曰不如守官且能辭不失舊宻邇侯服公卿采地非成國之制無出就之義魯叔孫之朝王賜之先輅鄭豊叚鄭有豊叚英華作假非之如晉受以周田豈可比諸侯之撫封等功臣之就國薄言之訴誠謂有孚慎乃攸司寜宜假噐同前肆覲群后事資班瑞疇庸千乘義取朝宗等威有正位之常名噐無假人之道甲以榮叅賜則齒列建侯位若附庸僣東蒙而為主地非成國異南面而稱孤虚揖五玉之班徒承四時之事闗内受賦獨申恩於萊田丘中食采未延賞於茅土恩齊國典方期率職眷言彼甲何顔就封皮弁守官寜拒有司之命毳衣知禮無違先正之書同前蘇綰欽若典章丕承政道九州封域始昭於禹訓五等爵土終叶於殷謨馴致者何率由斯在聖朝恢國本建方位才優者䟽以爵號功永者頒以邑田是則秩子男而靡出帝畿介藩屏而用崇王室惟徳是宅非賢孰居甲以克搆承宗疇庸錫社雖荷封茅之寵猶居食采之列成功覽分一簣尚缺於為山賜則加榮九等未膺於就國因而勇退殊匪躁求陳力就列先賢攸重惟刑與禮循理何傷同前沈興宗王者建徳是啓苴茅諸侯象賢必異名數噐服將施於九命蒲榖攸彰於五等惟甲筮仕當年弹冠上國梓材晉用羔鴈周方方叅叔豹之名未就伯禽之典稽諸載策閲以等威元士本視於附庸賜命不同於列國異唐侯之桐葉未剪叅􅇕如鄭武之緇衣尚勤周政提封匪盈萬井旌旗猶闕九斿丞相出闗昔聞其語綘侯就國今則未宜請詳訴者之詞無縱有司之紏同前崔譚天地設位聖人成能任良列官以同而異故周分六職懸教理之文禮辨九儀正邦國之典惟甲位荒王爵寵受公車賜則當五命之差等威陳七就之數既圖龍鵠之象亦分金玉之飾大赤以朝闗一作闕諸異姓之伍太白爰即崇乎四位之封彼已之詞誠組緫之未􅍯有司之令意彛倫之是疑國容此欺爾瞻何在子有車馬不馳不驅禮尚威儀不軌不物寘以典憲允乎清明當是負霜之凶非為遇雨之吉同前劉為輔度土居人量地制邑政不求􅍯官惟其能故周設六卿辨方正位禹敷九土俾乂底績將以緝綏黎獻作乂都鄙是崇錫命之儀爰求則柄之法靖言伊甲生也逢時禄以代耕榮冀登於一命朝以拜錫位何辭於小國必若才惟致理道可濟時則所告必聞何始乎就列昇高自下宜忘於擇地况堯舜在上車書必同莫非王臣咸仰天秩未能敬恭君命曷得遐棄厥司宜褫帯以受服奚薄言而有訴咎自作也刑其渥凶庶片言之可懲一作徵慙兩端而斯扣拜命拜命布武判王季拜命堂下布武王人謂失恭肅正以簡書季云其儀得中對爵禄馭賢在乎典禮侯伯之秩厥有成命惟彼王季紀名太常對茲王人拜命堂下心則隕越若天威之不違躬行俯偻信魯史之無替禮實宜之徳用稱者為臣不易時觀布武之儀事君盡節寜及簡書之政言以得中季其信然刑乃正邪法固難捨同前長孫憲拜有九命光錫之道長人有十等尊卑之位殊今者王人斯來王季拜命固宜鞠躬以進安得布武而行天威咫尺異齊桓之盡敬綸命渙汗無考父之益恭實以乖儀柰何文過簡書既正噬腊空勤同前郭納國有燕饗使存聘覲茍趨歩失容豈外臣倨禮王季秩班王爵位叅朝㑹拜命之辱則崇布武之儀肅恭之容旋被簡書之正故知取禮則非爽謂失則深文肆無稽之薄言責有恒之大典眷言彼季頗習禮經得中之儀固無乖於揖讓同惡之恤爰匪臧於訟詞誰謂王人不如林放請命請命服判庚為伯有拓境之功而請命服所由以舊有不許曰非新命未敢自安請受其衣未知合不對盧藻列爵有等是稱分地厥功惟茂爰加命服惟庚廓茲疆宇却彼戎夷若置朔方如通西域同一作用秦襄之績寜徵舊有羙晉文之勲實茲新命以斯而請誰曰不然方今文教式敷武功載闡將趨衛霍屢飲月氏之頭謨葢賈終㡬係單于之頸絶漠無驚縁邉罷候無聞茅土之封寜止衣裳之錫所由不許胡以自安豈曰無衣受其六而或可顧茲拓境聽彼伯而為宜同前鄭昉爵無及惡必在賞功服以旌禮豈忘褒徳茍忠誠之不匱則禮命之可嘉惟庚五等受封九命作伯懐賛國之義一作利無忘盡忠申拓境之謀是為罄節既而敢忘錫命以循已榮功則成焉賞宜及矣一作也雖名噐所慎不欲假人而車服以庸是宜一作何庅勸善所司將為賞僣難為書勞彼庚自為功能敢為固請榮之不報善欲何歸宜褒晉武之六衣佇羙吉甫之三㨗必也爵無踰等道在守官未可新加請從舊制臧否之理其在茲乎小國附庸判甲有子男之爵田四十餘里修附庸之禮於諸侯所司以違禮科之不伏對列爵惟五肇侯伯而成䂓分土為三自夏殷而立制為之中上次以卿士式序代耕之禄攸均列國之田任土歸餘則聞恒政朝宗㑹正豈得踰閑惟甲䇿名膺茲利建朱羽入貢一作朱縣入仕漸飛鴻以成儀白茅致封均錫馬之蕃庶子男為秩雖居尊爵一作號之榮井邑分疆爰在閒田之列里不充於五十國誠在於附庸文軌則同朝覲非及禮不合於天子事將託於諸侯抑惟典常孰為乖越科之不伏誰謂非宜職官三公佩刀入閣判乙為三公佩刀入閣門下監門不覺法司論罪俱至死辭云錯誤請減議論法司執云君上之前不容有誤議之則可減之則非對宸居宅中元輔就列蘭錡襲固必表九重之尊槐位辨官以崇八命之禮旋觀彼乙從事於斯當竭奉上之誠飜畜不祥之噐未聞擒敵徒有孟勞之寳踐歴一作既踐榮班遂得吕䖍之贈况趨於清切佩以周旋誤作匪宜入閤固當伏罪守之不謹監門自可論辜請從司敗之科以戒事君之㫖徒云議貴湏正刑名方領為衣判甲為方伯以黃紈方領為衣丁告不伏對分土建邦地方千里擇賢受職榮加九命將以大煒一作焯時憲欽奉國儀惠康庶績宣揚大化甲為方伯實佩儀章既剖竹以分憂佇坐棠而行政理宜潜潤徳教廣扇仁風用申象闕之儀以副專城之望何得異文翁之簡化昧朱邑之廉平擅易長裾忽為方領効韓延之東郡有制黃紈比胡質之南荆曷無清譽且簮紱之節禮有等威踰矩不祥僣奢斯咎服之不稱一作𠂻身之為災自投三尺之書湏免六條之秩問羊知馬判甲問羊知馬隣人告其左道主司科之訴稱鈎距對裴興天地設位聖賢成能一人垂衣百官承事瞻言京邑實曰帝都必舉忠良是則率土聿求俊乂司牧黎甿猗哉彼甲俾茲從事賔王利用學古入官必誅群妖以静矯慝於是彛倫各序軌物不􅄽將採績字人勿使失性終廣術察罪必欲懲非乃取赭汙衣息桴鼓而清盜因問羊知馬為鈎距以得情斯亦多聞攸稱罕測且正色率下類夫韓氏之名勵節執忠同彼李公之譽必欲人安俗理在為法以繩之擿伏擒姦於從政乎何有比諸製錦事且審於操刀語以烹鮮理必明於逰刃恪居爾職無俾我虞念茲隣人昧於典憲徒為狂狷之説雖尚口以見窮誰聽蒭蕘之詞終噬腊而致譴窒其多訟無逞逰詞是非相䑕之尤寜知爽鳩之罰彼廣漢者吾其與之鈎距為業判甲以鈎距為業郷人告不詞對上智利人遵乎古道下愚樂業勤是貿遷且貨殖乃資政之由龜貝作為生之本所以五行嘉於權量九府鑄其圓䂓𢎞羊筭金充物少府夀昌論􅂖興利大農文馬有權幣分輕重之價青鳬致凖物辨錙銖之則當較固而有禁在乾没而難容甲也探情善諮鈎距欲贏其貨寜惡其囂閑諸駔􅀈之言曉彼質劑之契縱使鉤顱去賣先窺卜式之羊縈蹄來鬻預問李斯之犬叅伍不失毫釐匪差實廣漢之為能非釋之而不調里仁為美夫復何言大匠拜將改㕔判姚先意拜將作大匠以父曾任此官請改易㕔事坐處對員峴先意多才入仕直道登朝權上路之衣冠光大君之寵命周官有序既標將作之名漢制無差還視列侯之秩家聲克紹門閥載昌京兆地靈韋氏之繼為丞相姑臧人物張家之歴踐武威前史不以為非通方不以為累事可師古何必循常然遺劍可悲喬木有感名教之地動息増懐隔以屏風昔聞其㫖易其坐處今見斯人茍遺芬而在􅏧豈夫君之可誚同前崔訟先意夙傳餘慶生亦逢時章綬斯榮位崇多士箕裘不替代掌百工韋丞相之髙風鬰然繼軌顧侍郎之嘉植貽厥有憑既而事因地勢言從天爵雖於公府之間疑作問尚有私庭之禮父子不宜同席古典有諸居官宜欲易㕔今則何禀員外郎讓題劍判員外郎陳景居官清謹上親以宸一作神筆題劍賜之有龍泉字景揆無功不敢當受遂表奉讓御史弹故違勑不伏對季子康陳景門接聚星望髙披霧香含紫帳舄下丹墀待漏南軒依玉壺而轉潔書章北闕映金波以自清趨簡要之司握蘭任重出神仙之路題柱恩深電影分龍星芒自轉霜毫冩鳳神筆俄飛事頗叶於韓稜寵方同於漢主慙無功最固有謙辭奏草輸忠初聞賜劍吹毛入罪忽見弹珠然而鴻澤旁流將崇懋賞烏臺典法欲寘深文郎官未越常䂓御史到疑同違勑既無負犯並宜告記錦衣狐裘判有錦衣狐裘者或舉之違僣稱取地受服對袁令問命者則何諸侯錫服封之所謂天子胙土列爵馭貴班瑞等官紀律有常紕繆無籍彼食舊徳實光象賢引之表儀用服臧禮分之彩物有文庇身無剡圭之削土是獻劍疑作細以當室淹恤草莽乃徵褰之與襦恭承匕鬯宜錫裘以用錦斯委曲以趨禮何譎詐而見尤無聽偏辭使叶中典太守歩歸郡邸判甲歩歸郡邸掾史大呼曰妄誕耳所由責其失禮訴云懐其印綬初不知實對張何帝念分憂國資共理慎擇股肱之守以為藩屏之臣甲遇明時偏承重寄湏榮晝錦焉可歩歸未聞叔度之歌空効買臣之事自可奉乎新命剖之分符而乃襲以故衣懐其印綬况從大夫之後不可徒行而於掾史之間誠為誕妄車曽不下匪黃覇之臨人吏乃疾呼類陳遵之驚座以為失禮其若有詞捨而勿詰於古何愧文苑英華巻五百三十二
