body:
  text: 文苑英華巻五宋李昉等編天象五黄雲捧日賦二首日五色賦三首日載中賦三首冬日可愛賦二首夏日可畏賦一首黄雲捧日賦以黄雲捧日佳氣充塞為韻闕名吾君朝黄圖坐甲乙禮元吉觀慶雲之飛來暈長空以夾日日明而麗雲潤而黄隨輪已入乎青陸抱影長依於正陽磅礴不散氛氲呈祥暖萬物則草木春色涵一氣則天地黄光推而言之則君為日臣為雲君非臣則股肱斯廢雲非日則光耀難分故上下同體表裏成文樓形遥景於東戸葉影潜扇於南薰由教有所至朝無可昏是日王三朝躔五緯杲杲然無幽不燭飄飄然何逺不暨白主喪氛黑為兵氣将閉陽和動令人畏又奚能勢均抱戴色不嚴毅似龍虎之宛轉傍檐楹之髣髴是日也風不霾時正佳雲日輪盛光隂克諧入房焉可以擬議干吕何足以為懐帶祥雲而共羙與淑氣而同儕天有日兮晨光重日有珥兮黄雲捧亦如東海大而百川朝北辰髙而衆星拱雲初繚繞日亦曈曨合三光而為一混五色而居中於是彰國祚表年豐應履端之時令識來事之殷充察天象兮陽烏奮翼稽瑞圖兮人望充塞使無階而可乗敢不慙於帝力第二正月初吉觀大明之東吐間瑞氣而曉出初混色於青山之上猶謂䕶霜漸凝華於黄道之中分明捧日與抱珥而偶方守人為匹原夫皇帝御紫宸垂至仁恩覃日域澤被雲津居其中得通理之體察其外想維城之親然後蔚亭亭之彩環杲杲之輪左之右之擁榮光於碧漢或先或後敷正色於青春懿乎日者君之徳雲者臣之状彼無私以臨下此竭誠而奉上故得配陽精而為煥符土徳而標王以此圖國國乃豐盈以此示人人知揖讓既而呈彼瑞暾曜于天門似佐無為之化如承煦嫗之恩自東徂西異衆星之拱極陳力就列同萬品之尊元其瑞如之何以慶其主其色如之何非聖人不覩象伊臯之羽翼同周召之夾輔麗焉成象非徒負舟之龍照也騰文盡若苴茅之土蕭索籠光徘徊效祥抱一輪而匪烏莫黒散九野而何草不黄是日也乾坤交泰霄漢熒煌風以動之謂奉中央之帝人皆仰也如披元吉之裳識我者寡遇我者衆思飄飄而有託目眇眇而遥送飛烟下接乍廻屏翳之姿喜氣上浮疑繞羲和之控信乎聖徳所加禎祥不遐天道恱人謀嘉故得無心之雲出山川而變色有耀之瑞應圖牒而増華日五色賦以日麗九華聖符土徳為韻李程徳動天鑒祥開日華首三光而效祉彰五色而可嘉騐瑞典之所應知淳風之不遐禀以陽精體乾爻於君位昭夫土徳表王氣於皇家懿彼日昇考兹禮斗因時而出與聖為偶仰瑞景兮燦中天和徳輝兮光萬有既分羲和之職自契黄人之守舒明耀符君道之克明麗九華當帝業之嗣九時也寰宇廓清景氣澄霽浴咸池於天末拂若木於海裔非烟捧於圓象蔚矣錦章餘霞散於重輪煥然綺麗固知疇人有秩天紀無失必觀象以察變不廢時而亂日合璧方而孰可抱珥比而奚匹泛草際而瑞露相鮮動川上而榮光亂出信比象而可乆故成文之不一足使陽烏迷莫黑之容白駒驚受彩之質浩浩天樞洋洋聖謨徳之交感瑞必相符五彩彰施於黄道萬姓瞻仰於康衢足以光昭前古照臨下土殊祥著明庶物咸覩名翬矯翼如威鳯兮鳴朝陽時藿傾心状靈芝兮耀中圃斯乃天有命日躋聖太階平王道正同夫少昊諒感之以呈祥異彼夏王徒指之而比盛今則引耀神州揚光日域設象以啓聖宣精以昭徳彰燭逺於皇明乃偹彩於方色故曰惟天為大吾君是則第二同前韻湛賁聖日呈貺至徳所加布璀璨之五色被輝光於四遐纎塵乍收爛彼雲間之彩清漣既動煥乎川上之華且夫徳惟純一瑞符祚九彼合璧而未方顧抱珥而何有豈若青赤以之彩錯光芒屏其氛垢星同色而莫儔露成文而曷偶至乃天衢将曙春雨新霽廓彼長空斂其纎翳煥羲車而逾媚映彤庭而轉麗同象徳于金天陋再中於漢帝于時宸睠屢廻聖心方契恒旰食以為慮豈浮雲之能蔽觀其徃復黄道隐見非一彰有徳而天下文明照無私而海内清謐馴翬對而沮色儀鳯臨而委質光浮石壁謂媧皇之補天影入詞林疑江淹之夢筆彼連珠之代王字之日雖得以載其圖牒實難以為其儔匹未若光分五色徳合三無明天道以下濟與人事而同符較兹嘉祉超於邃古杲杲而五色成文郁郁而萬物咸覩祥光旁燭偏宜連畛之𤓰瑞彩下臨更竝建社之土于以光被四表昭彰元聖播頌聲於管絃流喜氣於歌咏矧其堯舜為理羲和奉軄仰以陽精象于我徳不然何以照曜六合𤣥黄五色出乎震位煥夫皇極仰其耀希煦嫗以資成傾其心比葵藿之生植儻餘光之可借庶分隂之有得第三同前韻崔䕶陽精之瑞兮惟瑞之嘉首三光而委照備五色以連華繁彩遥分叶二數於聖運祥光下燭賛元吉於皇家且夫天之降禎昭示羣有日之效慶丕應元后軼圖牒而稱靈著䇿書而不朽徑惟千里表年厯而當千麗彼九華彰帝業之在九懿其廓烟霄而朗霽歛天宇之氛曀出暘谷之方融歴離宫而増麗羲和疑而愕立疇人駭以横睇循黄道以遅遅爍青𡨕而晰晰觀其瑞景中煥浮晶外溢所以告昌期符聖日結金天以標異掩羣祥而首出仰其衆色比河上之榮光徴彼謡言異江中之萍實景麗天衢明均八區知神光之有宰信𤣥化之潜敷媚韶陽於紫陌混佳氣於皇都於是見土行之善應識帝載之珍符君一徳兮格于上天日五色兮臨于下土寔有感而斯見固惟仁而是輔乗虚散彩状朝烟之曖空縁隙通輝若晴虹之入戸燦爛同耀𤣥黄交映彚藻繪於金輪聚雲霞於寳鏡當道泰以垂貺契河清之表聖諒四彗之莫儔豈再中而攸競則知天意非昧人情可測所以異其彩示輝光之日新所以呈其祥慶文明之允塞偉夫彼日之瑞可以象君之徳謬膺薦於春闈幸觀光於上國日載中賦以漢文帝時數如此為韻許堯佐聖徳上通陽精下賛經太虚之寥廓赫流光之耀煥皇矣廣運徳用邁於陶唐日歟載中瑞克符於炎漢其始也昇扶桑以昭晰拂若木兮氛氲灼麗景開祥雲羲仲命官敬導之功式著夸父整䇿競驅之勢斯分雖馳騁於靈馭終感通於聖君故歌休明者徴於陽位察符瑞者觀乎天文於是翠烟澄霽白日増麗流景弭節飛輪頓勢踆烏矯翼而却翔驤龍擁駕而廻逝端乎晷遽乖測景之司表乎祥必俟垂衣之帝盖所以應仁聖叶昌期曽泉既逾異晨陽之杲杲昆吾再舍嘉日馭之遅遅是則天垂象兮不昧日輔徳兮無私既載中呈瑞亦太和効時逺以變化同諸掌握苟夙夜而致理在禎祥而欲數伊靈氣之潜通豈天聴之𤣥邈日之為羙也無徳而言歟日之為瑞也有時而効諸運行必隨乎圓盖昏曉式經乎方輿昃而復中在明君兮則爾中而斯昃雖壮士兮焉如我皇播徳於彼表瑞於此不肅而康哉無為而樂只躔次可覿豈假垣平之片言昭明有融寧匹魯陽之三徙然鑒於人事兮諒天道而伊邇第二同前韻關構日以運行時維貞觀騐載中之照燭表一徳之恊賛至誠則感寔所應於皇家偶聖必呈豈獨符於炎漢既退舍以廻薄又増明而輝煥且夫天地絪緼日月垂文始将傾而復正願何鑒而不分當下委之碧落又上排之青雲經紀回旋乃暉晶而射耀次舍中正則澄霽而銷氛何麗天以昭晰諒觸物而繽紛然而日乃陽徳光于四裔陽為君徳配以上帝既居中而有感亦臨下而罔替昔連珠而合璧或五色而四彗咸逐物而遷移並隨時而啓閉曷若此将旰而復昭昭無際則知隂陽冥通乃與仁聖符契徒觀其炫熀在兹氣肅風追合人君以乗時又觀其昭回綿邈霞張雪駮羙嘉祥之欲數時以我既再我則盈縮而自持時以我當中我則清明而不濁既照臨於率土信叶和而反朴夫日也變動不居周流六虚天垂象以咸若精可貫而皎如既匪虧焉比皇明以無極斯呈瑞也諒至化之有餘且神功而不測乃駐晷其實徐所謂懸鑑在彼觀光由是仰靈曜之載中知積清而率俾因徴今以賦事諒舍彼而取此第三同前韻赫矣陽精瑞色融爛輪既側而復正景将曛而重煥考祥厯於休明識天心之叶賛信遐荒丕耀而品物貞觀夫其耀烟空耿霄漢始由度而方映忽移躔於已旰長空斂雲爌朗烟煴考殊祥於瑞牒軼衆象於天文燭乎幽同無私於聖代鑒乎下将比耀於明君宜穹蒼之朗霽屏黄道之氛曀踆烏翻翼以廻翔羲和弭節以容裔亭亭兮直午位而逾正杲杲乎爍離宫而増麗休徴屢發於漢皇徳感更侔於唐帝雖日官奉職疇人展藝異廻戈之所麾非長繩之能繫是則𤣥貺告祉皇明受釐日之杲兮靡虧於常度日復中兮叶慶於昌期土圭不能測其晷玉漏焉足定其時照委晴空曖祥光之郁郁時當春盡添麗景之遅遅惟我后之至化騐靈符而斯數懸金鏡於天衢提璿衡於掌握不然何以表昌期之㑹廻倒景之車澄清光而烱若扇炎盛而赫如徙倚遥漢徘徊太虚夸父之奔於焉少息垣平之對難以比諸信可以遵祀典委裘而拜命太史以望而書日麗天兮運行而未已日再中兮表慶於遐邇每同葵藿之誠冀流光而及此冬日可愛賦齊映閉天地成四時者𤣥冬麗乎天明萬方者白日至若斗杓移指寒氣入律霜涵氷以凝沍風落木兮蕭飋始成乾以運行乃宅巽而是出明在地上望杲杲於扶桑光摇水中疑泛泛而萍實故日出暘谷衆人熈熈苦寒者自我而燠若即幽者自我而明之将所鑒而並鑒故無私而不私懿夫吾君之威可畏可愛象嚴凝以神武配耀靈於光大是以愚智必仰頼者也又如殘夜猶昧破積隂以重光晨霜正繁濟輿民於附火聖人納諫亦替否而獻可同彼天象發陽明以自東觀乎道經體人庶而居左君法日也申文明於九重臣諫君也扇和氣於三冬故時以泰嵗以豐方䕫龍而並騖與歩驟而追蹤第二以陽徳淳耀消暢寒氣為韻席䕫冬實窮節日為至陽節窮而栗冽凝慘陽至而焜耀舒光方傷竹彫松之嚴物無不懼覩麗天出地之旭愛何可忘觀其昇曭朗以自東蕩沉隂於有北不赫矣以難向誠温然而可即依巢之鳥感㣲煦而和鳴帶雪之林假餘光而改色所以就之稱堯帝之聖比之成晉臣之徳彼谷隐巖居之子無衣無褐之人照臨遵夫和氣偃曝得夫天真慘怛潜収戚戚之容咸革温仁逺被熈熈之化斯淳故得廓開曀霾洞達遐徼融液氷渚依稀雪嶠散九陌以無氛委千門以通照彼繩樞甕牖既臨砌而樂我無私雖熊席狐裘亦捨爐而欣夫有耀且四月歌其烈烈雨雪苦其瀌瀌既飄風而忽至何見晛而聿消豈若儲精在於宣明舒徳本乎洪暢異春晝暄姸之色無夏天赫曦之状㣲温椒寢之中稍暖秦樓之上是知時當則慘物鮮其歡非愛景而斯出處窮冬而固難躔次不留志士徒争于短晷輝光可附小人寧怨於祁寒故曰太上化人徳之為貴咸欣欣而可恱不炎炎以求畏當垂煦嫗之仁以釋幽隂之氣所以賦冬日之事歌徳政之謂夏日可畏賦以昔聞宣子之於政也為韻賈嵩赫爾陽精當朱仲兮厥狀難明杲杲而威稜四序炎炎而火烈羣生九野飛塵破氛昏而下燭六龍衘耀亘天地而横行其初也隂魄落彼離明生矣踆烏洶洶以飛來蒼龍黯黯而光死輾烟霞而炎駕旁轉洞寰海而紅輪徐起烟勃乎扶桑之津鼎沸乎咸池之水八紘疑火井之内六合若炎丘之裏路岐難處傷哉行役之人稼穡堪憂嗟爾耕耘之子始驚出地漸見摩天曈曨逾盛翕赩彌宣赫曦而光碎波濤血殷江海蓬勃而氣蒸林鬱焰起山川然則居上克明當中益熾想羲氏於執熱當亢龍之用事照丘陵而恐是焦元蒸壠畆而皆成赤地仰之者目眩精眊處之者神昏體悸草木為之生烟峯巒以之減翠千里無雲炎風不聞木而棲者翕其翼泉而躍者伏其羣不黨黎甿有異恩覃之士無私蠻貊終同炎徳之君可流金而爍石可焦頭而爛額浩浩兮坌紅埃融融兮過虚壁遂使無生禪子愛其孤鶴片雲休影逸人戀此幽松古栢斯則晉卿執法於前代魯史立言於徃昔於戯猛以濟威剛而馭下牧於外而㓂亂咸戢升於朝而諂諛斯寡如夏日之赫焉孰云不足畏也文苑英華巻五
