body:
  text: 文苑英華巻四百五十七宋李昉等編制書十節鎮六授朱崇節河陽節度使制陸扆門下朕聞天垂星緯王者象之以設官地裂山河歴代定之以建國所以咽喉中夏藩屏皇家非威望不足以鎮寧非仁惠不足以撫養其有勲勞夙著宜申胙土之恩韜略素精屡委殿邦之任二者兼備斯為得人國有彛章我復何愛前昭義軍節度使潞慈刑洺等州觀察處置等使特進檢校司空兼潞州大都督府長史御史大夫上柱國沛縣開國子食邑五百户朱崇節雄略縱横忠誠貫直夙著一作抱揔戎之術常韜靖亂之謀臨危不屈於壯心多難益全其大節去病辭第誓彰鍾鼎之勲王翦請田非為子孫之計日者平陽求瘼馮翊頒條隰川竟保於孤城汝海將䋲一作綏其弊俗其後孟津分閫上黨臨戎智謀潜契於蓍龜義烈彌堅於金石擁衆而出陳兵以行指揮而神氣激揚叱咤而冦讎惕息今則鄉閭顧慕士卒謳歌廡金咸佇於竇嬰竹馬思迎於郭伋是用再兼五敎重委雙旌既資董衆之能仍舉疇庸之典於戯功名易守自伐者必顛富貴可圖懷驕者難保失道則禍生旋踵守義則福貽後昆勉爾令圖服我明訓可依前檢校司徒充河陽節度使散官如故授周岳嶺南西道節度使制門下夫山結川融皆予之㝢縣蠶衣租食悉我之黎元慘舒雖繋於陰陽覆燾豈殊於逺邇自頃中原搔擾遐裔阻難或王澤不流或國章靡及念茲黔首系一作昌疑我皇風聿求養理之仁兼藉鎮寧之略訪于執事果得能臣武安軍節度湖南觀察處置使特進檢校右僕射食邑三百户周岳黄石傳符豐城得劔倜儻挺義夫之節縱横抱名將之才擐甲執兵閫外以雄豪見許絶丼分少江東以信義相推嚴武備而不喜戰争頒吏術而每先恩惠遂致塵清四鄙農勸三時鄉閭阜安卒乗雄富是用疇其懿績仗以英謀輟乳哺於賦鴟之鄉壯藩垣於獲象之郡爾其克膺重寄更茂嘉猷必令嶺嶠蠻陬欽我之風化無使黄金翠羽累爾之清亷然後馬援威聲孟嘗介㓗茍能礪操諒可齊名仍推疑百越之封俾進三槐之秩恩不虚受爾其欽哉可檢校司空充嶺南道節度使餘並如故授陳珮廣州節度使制門下漲海奥區番禺巨屏雄藩夷之寳貨冠吳越之繁華茍非令人難著清節列聖睠念必求賢良故宋璟播美於前李勉垂芳於後朕初君臨㝢縣方以武定藩維獨命卿往鎮茲土而崇龜果以清净為理謳謡日聞固追詠於夷齊豈慙名於宋李代其任者不亦難乎爰求勲舊之間别得英竒之士左軍都指揮使前静江軍節度使開府儀同三司檢校司徒平章事頴川食邑三千户實封一百户陳珮雄姿岳聳俊氣鷹揚家傳忠孝之風代襲韜鈐之術愛士卒而更逾吳起敬君子而不讓張飛位以功髙名由義振先皇帝荐臻難運再新侯封挺身於版蕩之中竭力於阽危之際或警廵於西蜀或侍從於南梁殄岐陽兵火之災爾功居最戡京國宗祧之難爾効復多皎㓗忠誠貫黄河而不濁堅貞壯節冐烈火而寧焚雖衛鼎銘勲韓壇受律未臨列土豈答豐功是命殿彼大邦授其峻秩仍示優崇之㫖再兼台衮之榮於戯吳隠之昔號清亷英聲未冺馬伏波嘗推功業厥跡猶存茍能視糠粃於翠羽明珠張紀律於遐陬異俗吳馬之政今古寧殊無使璟勉崇龜獨誇於前哲也勉服丕訓無替令猷可檢校太保同平章事充嶺南道節度使餘並如故授李籌盧龍節度使制門下召奭舊邦燕昭故國其地廣而要其俗勁而雄儻非英偉之才孰控臨戎之任詢于執政爰有良臣具官李籌刜鍾利噐搆厦宏材負頗牧之威名藴闗張之節槩夙明軍志妙一作預揣敵情訓戎兼務於詩書養士必加於觴豆日者咸推友悌實卒元戎屢叅必勝之謀常賛在和之義泊專庶務益洽羣情貔貅仰愛日之恩疆場頼仁風一作長城之固是用寵其龍節榮被鴒原俾登韓信之壇仍進王祥之秩爾其禀我王度振乃家聲推信義以睦鄰封謹法令以威蕃落武有備而不用士使樂而不驕四者聿脩七徳斯在服我明訓厥惟欽哉可檢校太保幽州大都督府長史盧龍軍節度使餘並如故授周岳湖南節度使制門下荆渚懷仁陶侃昔嘗再理潁川思乂黄霸於是重臨茍狥人情何傷國體而况干戈乆試宵旰為憂將蘇塗炭之災俾復旌旄之任詢于執政僉曰嘉謀具官周岳早洞武經兼通政術嘗鎮湘中之地克揚閫外之威執紀律以不踰播謳謡而甚遠拊封彌謹述職惟勤垂竹帛之功名委旌幢之貴寵一作尋垂竹帛之功方委旌幢之貴而遽因疑間遂致遷移適五嶺之遐荒奪重湘之奥壤乃使軍戎憤悱黎庶怨咨煙塵不絶於累年瘡痍偏傷於一境旋聞軍吏之衆耆老之徒咸詣䕶戎借留賢帥遭權臣之擁遏致明命之稽延今我朝政惟新庶事思理雪爾肺腸之憤申予雨露之恩俾殿舊邦用諧衆志爾其速蘇凋瘵無念仇讎戢矛㦸之連營勸農桑於列郡布予惠澤服我徽章茂繼前勲永膺重寄可依前檢校司徒武安軍節度使餘並如故授張鐇彰義軍節度使制門下隴陰重地涇上雄藩勵控弦帯甲之徒資䕶塞和戎之略爰自動知邉事夙練兵機加以制彼西陲屏于中夏愽採輿人之論果聞良帥之才爰降命書式諧衆欲具官張鐇雷霆勁氣鵰鶚竒姿秉孝愛以承家挺忠直而事主玉鈐金匱弟兄咸繼於孫吳雪嶺蕭闗蕃虜逺懷於頗牧矧示令委殿于是邦著勲烈於兩朝耀威名於一紀訓兵積粟述職安邉城隍元固於金湯士卒必均於觴豆功垂竹帛政洽謳謡並馳一作大張賢將之名仰自元昆之訓豈為疑作謂降年不永閱水興悲將既疑作繼前脩是資同氣設齋壇而錫命馳瑞節以頒恩式光十乗之雄不改三槐之秩爾其奉予紀律固乃封疆推誠信以睦隣竭忠勞而報國自可委安禄位益茂功名於戯爾鐇服我明訓可檢校司徒彰義軍節度使餘如故授趙凝檢校太尉開府制門下王者裂土疆以任材臣下推腹心以報主能任其材則國理能報其主則功髙其有鎮拊巨藩訓齊義旅克展忠貞之效每遵紀律之條斷自予懐將頒殊渥具官趙凝倜儻雄材縱横奥略奮垂天之羽翰聳發地之巖巒頃纂舊封克承先訓嚴武備而不矜戰伐緩軍令而不虐惸􅄔鄉閭阜殷卒乗輯睦顧峴首漢陽之地實四㑹五達之莊扼咸鎬之咽喉遵荆吳之貢賦途路無梗䑯航若流不有咸聲孰能通好一作齊朕以姦兇構患都邑縱兵爰避艱虞出居巖險而能徑馳專使來達臣誠乃陳底貢之儀備驗輸忠之節况爾先父寔余藎臣前勲尚煥於􅀢鍾令嗣克傳於弓冶永言念舊尤在賞新一作延俾升掌武之班益重拊封之寄仍遷峻級式示隆恩爾其保禄位以榮家竭忠勞而許國勉欽明訓無忝厥官可開封府儀同三司檢校太尉平章事充忠義軍節度使餘並如故授石善友鎮武節度使滕從免邕州節度使制前人門下朔野雄藩地臨於強虜海濵巨屏境接於諸蠻茍非威略不足以鎮寧非惠和不足以綏撫其有久專留務具著能名雅稱分閫之才宜賜登壇之命具官石善友夙知邉事素練戎韜驊騮騁風無逺不適具官滕從免早習兵機常推忠欵豪曹出匣其鋭難當而能誓建功名克遵紀律一作克律紀法洎膺試用咸務恪恭封疆逺憚其威聲溪洞每懷其信義固可以静茲絶塞阜彼遐陬使風煙罷警於北陲琛賮逺臻於中土方資重委宜洽優恩俾真旄鉞之權用壯藩宣之寄或榮遷端揆或寵陟秋官勉竭厥誠貳則有辟善友可檢校右僕射充鎮武節度使兼安北都䕶從免可檢校刑部尚書嶺南道節度使餘如故授武臣邠寧節度使制鄭畋門下推轂㧾戎朝廷之重寄登壇受鉞將帥之殊榮况地接燕集作囬山境連京甸兵雄俗阜拱我宸居宜擇英賢以壯垣翰具官某乙雷泉禀氣邳石降籌習我集作起翦之兵書用闗張之戰略雄嚴可憚忠赤無疑彰勇藝於轅門顯勤勞於禁旅言皆許國志在忘集作不謀家驊騮豈戀於縶維鵰鶚常思於振擊今故錫集作委之旄鉞集作節授以土田俾使于邠用示殊寵爾其申嚴斥候訓習師徒増疇壠以竢豐穰飾噐甲以圖精利蒐乗補䘚無惑於二字集作或惰㳺禦㓂安人必集無必字期於静謐尚父之英威未殄古公之風化猶存勉揚政經無負憂寄可檢校某官充邠寧節度使主者施行授李師望定邉軍節度使制門下全蜀之南封部遐廣屏限蠻貊嶲為要衝間者守將不嚴冦兵來䧟蕭條故地寂寞有年與其黷武開疆孰若屯師固圉况精甲可用腴田可耕茍得其人豈復翫冦是用割分州里崇建翰垣思其長才付以重事更求中外格于旬時果得良臣式契朕志朝議大夫前鳯翔少尹上柱國賜紫金魚袋李師望早以才榦彰于吏途縱横不覊沉毅有斷頃嵗王師伐叛命爾供軍糗糧相繼於路岐兵士皆忻於飫飽裘甫之役爾守天台克以偏師大挫狂孽厥後繼領符竹咸推器能二尹岐山既從休罷鷙羽豈閑於韝上柛鋩終躍於腰間朕以荒服未寧坤維多慮式當經制尤渇英竒知其可行召與之語嘉謀響荅雄論風生奏刀而髖髀皆虚聚米而山河盡覩築壇驟拜余無悔焉於戲初造之邦詎有堅敵種落雜處兵糧未殷全資智謀克在威愛爾其投醪共味立法推誠理軍猶家養士如子闢汙萊以務稼穡籌險阻以制闗防弓矢戈矛當嚴鍜礪風雲氛祲無忽視瞻熟孫武之韜鈐慕孔明之事業使逰咩城下常驚鼓鼙之威大度河南永保金湯之固勉思報國勿負知臣擢握兵符衘榮憲印統諸軍之鈇鉞兼六郡之賦輿上應星辰貴為侯伯將旌殊渥匪限彛章敬之戒之無忝休命可嶲州刺史兼御史大夫充定邉軍節度使眉蜀卭雅黎等州觀察處置統押近界諸蠻并統領諸道行營兵馬制置等使授龎從武寧平難軍節度使改名師古制張𤣥晏門下沛澤遺封􅀈漢書作芒山奥壤俗稱雄富人本質良古為用武一作物非之鄉今乃優賢之地况自嬰多難極廹挻災蒸黎嘗困於流離全材久專於綏撫已觀試可爰議正名時舉寵章用申奬勸具官龎從夙懷明略早負壯圖精專能習於豹韜瓌偉素推其鷰頷襟靈豁逹氣宇剛嚴居然將領之才邈爾深沉之度差肩頗翦接武韓彭揚閫外之休聲富幄中之嘉畫自委之留事頒我詔條惠愛行於鄉閭威望揚於士伍克成謡詠逺副憂勤臨戎既耀於雄稜撫俗備揚其善政遄移歳月足洽寵靈是宜錫以旌幢進其官秩奄有徐夷之一境爰撫大彭之故都膺吾眷求永作藩翰於戲敬敷五教光㧾十連踐論道之華資加御貴之榮級無忘惕勵以奉恩光可某官仍改名師古主者施行授王敬蕘武寧軍張珂彰義軍節度使制前人門下錫以土田付之旌鉞必擇非常之士載𢎞不次之恩况沛澤雄藩涇川巨鎮委用咸彰於試可節制宜膺其正名爰舉徽章式一作並分戎閫具官王敬蕘夙號將才早探軍志襲淮流之積慶挺山立之雄姿勇實兼人智能周物藴變通之茂用懷經濟之逺圖具官張珂閥閱名門韜鈐祕略孝友克宣其遺羙忠勤㓜闡於令名劍氣干霄鳯音合律撫士則能均丼苦推誠而可貫神明頃者頒我詔條各成政化一作郡政惠愛亟沾於疲瘵威聲益布於鄉閭爰自主留彌觀奉上既播褰帷之美勉承建節之榮仍俾䟽封用光裂鎮噫硭漢書作芒碭壓境種落連營握兵符而皆是通侯掀大斾而具為上將當思報効以服恩榮敬蕘可某官珂可某官主者施行授馮行襲昭信軍節度使制門下分節制之任所以嚴我翰垣膺亷問之權所以宣吾風化矧夫界連梁楚襟束咸秦據廣漢之上㳺振終南之巖險昔為禦侮之地用固神州爰升連帥之雄以疇丕績言從人欲乃降朝恩昭信軍防禦使特進檢校太子太保使持節金州諸軍事守金州刺史兼御史大夫上柱國長樂縣開國伯食邑七百户馮行襲决雲利刃逐日竒蹤禰衡重一鶚之名闗侯蓋萬人之敵御衆布投醪之徳禮賢懷比飯之恭智略出羣忠果成性造次不違於遵奬周旋備覩於公勤自委以頒條命之剖竹蒞事繼懸魚之美臨人宣建隼之威疲薾既成其息肩豪右屢聞於破膽獻奉無闕賦租罔􅄽况頃者荆襄路途兵戈驟起而能遽開間道俾達上京盡通江嶺之貢輸來助朝廷之經費尋彰績效今有甄酬而一境緇黄數邑耆艾咸陳章䟽請降節旄膺吾入保之榮茂彼登壇之寵往服休命無忘敬恭可某官主者施行授李思敬武軍李繼顔保大軍節度使制前人門下洋源奥區鄜畤重鎮近境深聮於甸服長川古號於塞門念斯節制之雄睠尸察廉之寄必資才傑用副選求乃者雕隂實維戎事壁壘且勞於九拒干戈僅徧於四封姑務安人爰從易地具官李思敬練達韜鈐振揚威望保風雨不渝之操得寛猛相濟之機奉上誠專一作深康時績茂常蓄持危之志雅推御衆之能具官李繼顔驍果馳聲剛柔藴用負致君之全畧逞邁俗之宏規克禀義方㓜知忠孝發黄間而破敵麾白羽以臨戎並早沐恩榮俱分憂寄不乏循良之稱亟彰持重之大繼成襦袴之歌顯著山河之誓今則俾之迭處用叶厥宜公台不改其華資終始各思其竭節於戯土田其疑廣爵秩互崇當遜志以保家勉輸誠而佐國勿恃險以生事宜恭己而守常服我寵光無忘敬慎思敬可某官繼顔可某官主者施行授王潮威武軍節度使制門下朕言念蒸黎常勞旰食其在遐徼尤所注懷况閩越之間島夷斯雜非威望不足以懾伏匪仁恕詎可以惠綏某言善政己成殊庸未陟則宜假之鈇鉞錫以麾幢俾兼節制之權式寵察亷之寄具官王潮術深金匱學富玉鈐彎弧傳百戰之名撫劍號萬人之敵才髙御衆志本勤王風雲暗合於機謀霜雪不移其節槩為仁由已重士逾山雅負將材尤精夷理自撫寧列郡振舉六條疲甿懷愛戴之心漓一作裔俗仰亷㓗之徳集是休烈溢於聽聞而職貢交脩賦輿靡闕尊主之誠可見勝殘之踐疑無踰是用負海建牙踰閩錫社狥彼逺人之懇慰其闔境之情爰壯中權仍遷左揆爾其守茲舊貫服我新恩勿恃貴以驕人無作威以生事更勵奉公之節益堅惠下之規别俟寵靈罔虧績効可某官主者施行授李繼徽秦州節度使制門下邠土雄藩西郊故壘封境克連於甸壤城池近接於昆夷爰膺節制之榮兼奉察亷之寄向非雄傑孰稱選求况仍歳干戈未蘇惸獨鎮静允先於良將拊循尤藉於通賢得不因彼士心一作忠宣茂茲朝委我有休命人其聽諸具官某生知武畧夙號將材得黄石之沉機揔青萍之利用貞心貫日壯氣凌雲藴豐財和衆之名遵抱義戴仁之事自四郊多壘一劍臨戎推誠明以奉君親仗忠信以為甲胄處衆每觀其自奮遇敵雅號於無前茂著功庸動彰節槩乃者剖符隴坻建隼吳山頒條早振其休聲守土載揚其善政委之鈇鉞錫以土疆撫成紀之遐封治秦川之拓地投醪布徳减竈傳謀憂國忘家赤心可見飲氷食蘖清操難儔今則再寵緑徽是光黒矟増其好爵廣彼爰田用分宵旰之憂式狥疲羸之請爾其將我惠澤施於一方簡以臨人寛而整衆可推養理之志用宏輯睦之規無怠親隣勉思稼穡奉於公者必舉渉於私者勿為副此虚懷更圖明陟文苑英華巻四百五十七
