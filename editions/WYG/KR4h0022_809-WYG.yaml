body:
  text: 文苑英華巻八百十宋李昉等編樓下新修夏邑縣城門樓記一首五福樓記一首黄鶴樓記一首懷崧樓記一首朝陽樓記一首望雪樓記一首閣下茅閣記一首新修滕王閣記一首重修滕王閣記一首樓下新修夏邑縣城門樓記孫公輔昔左丘明書梁亡嫌其亟城而至溝宫也書莒潰責其恃陋而不重閉也然則懲惡勸善之義信可不遺於後代矣方今生人震越虓虎啖嚼凡為侯大夫者孰得不鑒於梁而悼於莒哉夏邑縣城樓圖經即西漢栗鄉侯之故墟闍闉陂陊不可以禁滛佚臺觀崩弛不可以示軌儀訊諸鄉人云此地有隠慝焉縱其神姦慄若大忌故前後令長皆昵於神而廢禮也去年夏聖人戒師於東方宣武軍守臣劉公慮以軍興勢危賦重人困易置官屬紀綱事法遂假參佐范陽盧士宣字伯通為茲邑長伯通勤勞於民旋即真命以朱服示王命也愴夫先賢雖立譙門譙門必能將將雖作爾墉爾墉必能言言繇是正其小以及先王宫隅之制飾其儉用倅諸侯臺門之尊百工告利多福紛萃則嚮時妖異之說無復徴據神不神矣君何神耶茍無馨香曷肯變化是故直拔埃􅅽譬一賢之挺生介然堅彊同五福之壽考端穆大壯發揚斯干用而不和一作知我則為植其經費也自柿一作度材至捽土一作卒土不礙疋夫之膏澤必因庶役之餘羡其博施也自賀燕至翔鶤尚貽終世之咸若寧止吾屬之遐覽然後命閽人以守之揭靈鼉以鼔之嵗時則懸法於其前災眚則禜祭於其下禦大冦則未足抑小戎而有餘且周文緩而靈臺成漢文約而露臺捨惟彼喆王睿后猶懼若此况人臣乎誾誾伯通可謂知禮至如板築之氣勢磨礱之固䕶塗塈之滑澤采章之藻麗則存諸詠歌非紀體所載時公輔館於伯通之署願記其善敢私於人乎黄鶴樓記閻伯里石本作埕州城西南隅有黄鶴樓者圖經云費禕登僊嘗駕黄鶴返憇於此遂以名樓事列神仙之傳迹存述異之志觀其聳構巍峩髙標巃嵸上倚河漢下臨江流重簷翼舘四闥霞敞坐窺井邑俯拍雲烟亦荆吳形勝之最也何必賴鄉九柱東陽八詠迺可賞觀時物㑹集靈僊者哉刺史兼侍御史淮西租庸使鄂岳沔等州都團練使河南穆公名寧下車而亂繩皆理發號而庶政其凝或逶迤退公或登車石本作送逺遊必於是極長川之浩浩見衆山之纍纍王室載懐思仲宣之能賦僊蹤可揖嘉叔偉之芳塵迺喟然曰黄鶴來時石本作時來歌城郭之並是浮雲一去惜人世石本作代之俱非有命抽毫紀兹貞石時皇唐永泰元年嵗次石本無次字大荒落月孟夏日庚寅也五福樓記符載人之氣剛而直靈而無方欲其全一作王也唯其所養故處卑陋則痾恙慘怛而邪僻淫戾生焉居髙明則遐矌博大而和平康樂生焉其或將移志氣張耳目聳形體使百祥九德沛然洋溢臺觀不作孰為起予是以我尚書劉公有麗譙之制建嘉名者其有旨乎曰太一五福遊乎神宫之三年也先是兹樓北嚮之㕔也穹崇𢎞敞實惟古制公之家毎斷大事行大宴威儀四設必在於是縉紳籩豆陳乎上麾幢鍾鼓羅乎下雖庭階燦爛誠則偉矣而直視南墉雲物悠然蒼茫雉堞若生逺思以聰明幹材智以光華照城壁百堵之上忽生飛樓連甍沓拱攢倚碧空離坎之地新陳對列相與饒借赫然公府自下而望之也若鰲山冠雲蜃氣横天霓裳鶴駕縹緲髣髴及其登也居顥氣之中坐青霞之側惝怳自顧謂生羽翼二江東注萬井如畫耳聞天語目視鳥背雪山嶔岑山與雲齊風從中來肌骨凄凄於戲勝不終屈必有伸也天作蜀國殆萬餘祀前人厥陋我能補之恢賢豪之軌躅成藩閫之雄觀其英特也公涯岸氣業傑出無侣成用迅宻㕘乎化機嘗以至公篤信佐故太尉之幕二十年矣賔主神交中無猜腸薨落之際以柄授手居無幾今天子雙旌千乗而褒寵之熊羆井絡實為天府號令政化風行雷動自纓弁至于椎髻鮐背至于稚齒莫不冠帯其法制飲食其恩信曽未周歲炎炎休聲然後結構之興出我餘力况其新棟宇重威容也陳享宴均慈惠也肆觀覽省風俗也采謳謠禆政教也豈止窮歡娛供視聼臨江遲客當宵待月而已哉有部從事符載揚盛迹刻貞石鎮梁益使百世君子知五福之巍巍也朝陽樓記皇甫湜嶺南屬州以百數韶州為大其地髙其氣清南北之所同朝貢之所途先時此州無政有聞土穢水煩人創吏侵田畆莠而不墾城郭牢一作字而不實時惟李君奉集作俸詔而來一年粗洽二年稱理三年大成顧郡之城既狹而專門牆枳扄庭除湫底秋之澍雨沉氣乃上暑之燂爍清風不下人慢吏䙝無嚴諸侯於是掠旁入之利乘可為之時端景相勢凝土度木經營未幾興就嶷然登閎豐崇髙明朗融耽耽盡飾沉沉生白改集作若積隂於多陽散温沴為祥風宫庭若虛炎天如集作若秋兹焉觀游其政優優宻親嚴容一作客嘉肴㫖酒兹焉宴喜其樂亹亹一作朱一作成衡旅楹君子攸寧飛撜雲基君子攸隮乃及月春乃擇清辰一作辰清宴豆旣陳賔僚有客肅肅纍纍訖昇集作聲以止天地若開江山如新原隰成文雲霞相陵蕩逺目集作日於天涯叢一境於階端四座洗然若夜行之曄于光煩痾一作嬰煩之脱于身畢夕皆下一作而下仍有皆字熙熙滿足以其直城之東目為朝陽詩云鳳凰鳴矣于彼朝陽前代之良二千石若東萊頴川是鳥咸集兹樓可以樹修竹列髙梧矣僉以君朝之望也而出刺是州不已屈以事髙不心望以卑逺夙夜一作蒞其官聲績用明羽儀之拜日月以數嗣而屋集作居者致逺清集作請標疇克於將來懷崧樓記李徳裕懷崧思解組也元和庚子歲余獲在内庭常僚九人丞弼者五而十數二字集作數十年間零落將盡今所存者惟余與集無此二字三川守李公而已已殁者西川杜公武昌元公中書韋公鎮海路公吏部沈公在丞庾公舍人李公暨太和己丑歲復接舊老聞集無聞字同升台階或纔嘆止興已協白鷄之夢未聞稅駕遽有黄犬之悲則集無則字向之榮華可以悽愴况余憂傷所侵疲薾多病當驚北叟之伏集作福豈忘東山之歸此地舊施集作隠曲軒旁隠集作旁隠壀堄竹樹隂合簷楹晝昬喧雀所依凉飈罕至余盡去危堞敞為虚樓剪榛木而始見前山除宻篠而近對佳集作嘉樹㕔前舊有太辛夷樹亦為草木所蔽延清輝於月幌集作觀留美景於寒薨集作榮晨憇宵遊皆有殊意集作致周視原野永懷崧峰肇此佳名且符夙尚盡庾公不淺之意寫仲宣極望之心貽於後賢斯乃無愧丙寅歲丙申月庚辰日集無此三字銀青光祿大夫守滁州刺史李德裕記望雪樓記鄧衮上纘位年京兆公繇亞荆牧彭搜鯁治蠧化者耘而革之不易節而政成旣而府署亭臺之弊壊者咸理新之明年秋作望雪樓訖功俾進士鄧衮銘之圍蜀之鄙截如巨砥厥郡維彭北西天屏危碧峭青戛霄磨冥鯨跳虬奔限蠻隔畨上排雪峰延疊萬重鶴甃瑶駢一作駢非月積綃鮮振古不泐四節一色皎皎披飄寒錮隂膠光涵二水冷射千里往哲所嘉名之玉壘公來未朞畢完瘵凋乃於崇墉作為麗譙長材羨工不伐不徭趾故規新不僭不驕經之浹辰翬飛迢迢三伏赫曦九野如燒斯焉一登神滌煩銷他日徵黄羊碑郡棠下客貢銘永播德芳先是王僕射潛蕭桂州祐繼守斯郡二公陶奇撰幽不乏心匠於西湖臺島花竹列植布置㒺不宛妙維雪山彭之殊觀獨莫經意豈非天待我公作賞跡乎昔西漢進儒術臣多貞方魏晉扇虛𤣥吏乎一作采風流孰若公精六籍練衆務藴張趙之幹敏兼王謝之清雅辨辭盈庭奮毫電飛具牘百幅歴眸氷什前可以折穆之之角近可以挫戴胄之鋭則不止有逸暇覽眺盖雄節大斾師長列侯方鈞平衡粛和神人廹期矣衮不佞鑱公奇績覬識士和一作事和望雪不取於澄心瑩目將以思潔白登樓不取於櫛清氷曠在㨿上睨下察人之利病亦敷政之嘉術也大和元年九月記閣上茅閣記元結已巳中平昌孟公鎮湖南將二歲矣以威惠理戎旅以簡易肅州縣刑政之下則無撓人故居一作君方多閒時與賓客嘗欲因髙引望以抒逺懷偶愛古木數株垂集作重覆城下一作上遂作茅閣䕃其清隂長風寥寥入我軒楹扇和爽氣滿於閣中世傳衡陽暑濕鬱蒸休息於此何為不然今天下之人正苦大熱誰似茅閣隂而庥之於戲賢人君子為蒼生之庥䕃不如是耶諸公詠歌以長一作美之俾茅閣之什得系嗣於風雅者矣新修榺王閣記韓愈愈少時則蜀本作嘗聞江南多臨觀文粹一作登臨之美而滕王閣獨為第一有瑰偉絶特閤本作時之稱及得三王所謂序賦記等王勃作游閣序王緒作賦今中丞王公為從事作修閣記並題在閣也壯其文辭益欲徃一觀而讀之以忘吾憂繫官于朝願莫之遂十四年以言事斥守揭集作潮陽便道取疾以至海上又不得過南昌而觀所謂滕王閣者其冬以天子進大號加恩區内移刺袁州袁集無袁字於南昌為屬邑私喜幸自語以為當得躬詣大府受約束於下執事集作文粹有及其無事且還儻得一至其處十二字竊寄目賞適所願焉方崧鄉韓文舉正云文苑如此集本文粹作竊寄目償所願焉至州之七月詔以中書舍人太原王公為御史中丞觀察江南西道洪江饒䖍吉信撫袁悉屬治所八州之人前所不便集本文粹有及所願三字欲而不得者公至之日皆罷行之大者驛聞小者立變春施集作生秋殺陽開隂閉令修於庭户數月文粹作日之間而人自得於湖山千里之外吾雖欲出意見論利害聴命於幕下而吾州乃無一事可假而行者又安得捨己所事以勤館人則滕王閣又無因而至焉其歲九月人吏浹和公與監軍使燕於此閣文武賓士皆與在席酒半集本文粹作席酒合辭言曰此屋不修且壞前公為從事此邦適理集本文粹作治新之公所為文實書在壁今三十年而公來為邦伯適及期月公又來燕於此公烏文粹作乎得無情哉公應曰諾於是棟楹樑桷板檻之腐黒撓折者文粹有易新之三字盖瓦級甎之破文粹作故缺者赤白之漫漶不鮮集註一作至者治之則已無侈前人無廢後觀工既訖功公以衆飲而集本文粹有賞焉二字以書命愈曰子其為我記之愈既以未得造觀為歎竊喜載名其上詞列三王之次有榮耀集有者字焉乃不辭而承文粹公命其江山之好登望之樂雖老矣如獲從公遊尚能為公賦之元和十五年十月某日袁州刺史韓愈記重修滕王閣記韋慤鍾陵郡控連山大江環合州城揭起樓榭遊之者莫不目駭魂褫號為一方勝槩先是背郛郭不二百步有巨閣稱滕王者懿夫峻修廣袤非常製所能擬及考尋結構之始盖自永徽後時滕王作蘓州刺史轉洪州都督之所營造也距今大中歲戊辰亦將垂三百年徒嘉乎飛翬疊欒虎倨龍盤發地呈形與山同安曽不知盪滌不必繫於天災興廢自叶於時數將利恢復果憑智謀故我雁門公按節廉問方頒條詔令肅而兵戎讋服政和而疲瘵昭蘇妙撫循則有袴襦成雙一作咸獲之謠寛賦歛且無杼軸皆空之嘆歳比善熟俗臻治平故州民相與稱賀繼而歌曰自公之來闔境讙咍飲公之化若乳嬰孩雖國僑理鄭圃一作國多方長孺緝淮陽而布效方公今一作之日不足過也宜乎享亨跡居全功無何值祝融發其災回禄扇其焰曽未竟夕煤侔秋蓬則斯閣之製盪無餘矣其他廩廥之地接續郵亭薨棟纚連疾飈一驚遂至延及公至是領徒夜出俾撤屋開道毒燄方熾逡廵不能救翌日公乃往觀焉召將校謂之曰吾幸得備位廉察不能懇求人瘼敬避天戒致火之患時予之辜遂審量日力詳度費務役不加重而烝徒凑事協于中而公用省衆謂難集我方指期遂得鼛鼔不勝而築之閣閣梓材並構而勢己耽耽自非智用周敏政齊畫一則安能剏規模之豐麗如彼程制造之速疾如此不有廢絶孰能興耶今按舊閣基址南北濶八丈今増九丈三尺其峻修北自土際達閣板髙一丈二尺今増至一丈四尺濶板闕長一丈今増至一丈三尺中柱北上聳於屋脊長二丈四尺今増至三丈一尺舊正閣通龜首東西六間長七丈五尺今増至七間共長八丈六尺闊三丈五尺固可謂宏廓顯敞殊形詭狀革弊鼎新有如是乎况前通舟車迴瞰江嶺毎值美景讌集笙歌散遞逺凝霄漢上軼雲雨即未知三山之靈仙窟宅五湖之賢達沉浮其於歴賢勝負果又何如耳故自焚􅅡之後又建是閣廣其郵驛㕔事接以飛軒累榭復架連樓小閣對峙髙揭旁通江亭津館致巧衒能廻廊并抱以交映䆳宇相縈而不絶則是閣也冠八郡風俗之最包四時物候之異春之日則花景鬭新香風襲人憑髙送歸極目蕩神夏之日則鸎舌變哢葉隂如棟紈扇罷搖綺忩堪夢秋之日則露白山青當軒展屛涼風逺來沉醉易醒冬之日則簷外雪滿幄中香暖耐舉罇斚好聼歌管則斯閣之盛縱遊之美賞心樂事庸可旣乎夫易舊圖新樹非常之績天其或者必將候魁岸博達負出人智能而俾張大其所為不然何當瘡痍未復之前而妙於救藥煨燼已成之末而遽及經營况不奪農時不勦人力帑藏免竭日時免賒觀之者咸謂神化翕忽殆非人力之所為也噫夫環璚特殊巍峩相扶似乗靈濤湧出方壺壽一作華厦峥嶸開闔睢盱用鎮遐俗尢光奥區是必知後千百年閣之名焉與公之政俱垂不朽矣至如江山之重復物産之殷充亭臺増葺以雲蔓廨署繕完而櫛比布在圖籍孰能該詳愚今所以為異者但舉乎閣之廢矣自公復興而已其他壯麗形勝已備列諸公述作故不能一二覼縷時大中執徐歳秋八月哉生明記文苑英華巻八百十
