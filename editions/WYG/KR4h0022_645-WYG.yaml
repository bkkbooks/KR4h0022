body:
  text: 文苑英華卷六百四十六宋李昉等編檄二為李宻檄洛州文為李宻檄竇建徳文為竇建徳檄秦王文為李宻檄滎陽守郇王慶文代徐敬業傳檄天下文為濮陽公檄劉稹文為李宻檄洛州文後篇作移郡縣書祖君彦自元氣肇改一作闢厥初生人樹之帝王以為司牧是以羲農軒頊之后堯舜禹湯之君靡不祗畏上𤣥愛育黔庶一作首乾乾終日翼翼小心馭朽索以同危履薄一作春冰而為一作是懼故一物失所若納隍而愧之一夫有罪遂下車而泣之謙徳軫於責躬憂勞切於罪已普天之下率土之濵蟠木距於流沙瀚海窮於丹穴莫不鼔腹擊壤鑿井耕田致之昇平驅之仁夀所一作是以愛之若父母敬之若神明固能享國多年祚延長久一作世未有暴虐臨人克終天位者也隋氏徃因周末預奉綴衣狐媚而圖聖寳胠篋而一作以取神器及纉戎一作承負扆狼虎其心始曀明兩之暉終干少陽之位先皇大漸侍疾禁中遂為梟獍便行鴆毒於是罪一作禍深於莒僕釁酷於商臣天地之所不容神明之所嗟憤一作天地難容人神嗟憤加以州吁安忍閼伯日尋後篇作尋戈劒閣所以懐㐫晋陽於焉起亂一作所以興亂甸人為罄禮記作磬淫刑斯逞夫九族既睦唐帝闡其欽眀百世本支文王表其光大况乃一作復隳壊磐石剿絶後篇作滅維城唇亡齒寒寕止虞虢欲其長久其可得乎其罪一也禽獸之行在於聚麀人倫之禮一作體别於内外而蘭陵公主逼幸告終誰謂敤音課首舜女弟名敤首之賢翻見齊襄之耻逮於先皇嬪御並進銀環諸王子女咸貯金屋牝雞鳴於詰旦雄雉恣其于一作羣飛衵服戱陳侯之朝穹廬同冒頓之寢爵賞之後篇作不出女謁遽一作遂成公卿宣淫無復綱紀其罪二也平章百姓一日萬幾未曉求衣昃晷忘一作不食是以大禹不重一作貴於尺璧光武無一作不隔於反支體此一作是憂勤深慮幽枉而荒湎後萹作腆於一作于酒俾晝作夜或號或呼一作式號且呼酣一作甘嗜聲伎常居窟室毎藉糟丘朝謁罕見其身羣臣希覩其面斷决自爾一作此不行敷奏於焉一作是停壅中山千日之酒一作飲酩酊無知一作名襄陽三雅之盃留連詎比又廣召良家充選宫掖潜為九市親駕四驢自比商人見邀一作要逆旅殷紂一作辛之譴為小漢靈之罪更輕内外驚心遐邇失望其罪三也上棟下宇著于一作在易爻茅茨采椽陳諸史籍聖人本意唯避風雨詎待珠玉之華寜湏綈錦之麗故瓊宫一作春室崇構商辛以之滅亡阿房崛起秦族以之一作二世是以傾覆而不遵古典不念前車一作章廣立池臺多為一作营宫觀金鋪玉户青𤨏丹墀蔽虧日月隔閲寒暑窮生人之筋力罄天下之資財使鬼尚難為之勞人罔知一作其不可其罪四也公田所藉一作徹不過十畆人力所供才一作纔通用止三日是以輕徭薄賦不奪農時寕積於人不藏府庫一作無藏於府而課一作科稅繁猥不知紀極猛火屢燒漏巵難滿頭㑹箕歛逆折十年之租杼軸其空日有萬一作損千金之用一作費父母不保其赤子夫妻相棄於匡牀萬邦一作户則城郭空虚千室一作里則煙火斷絶一作滅西蜀王孫之室翻同原憲之貧東海糜竺之家俄成鄧通之鬼其罪五也古先哲王卜征巡狩唐虞五載周則一紀本欲親問疾苦觀省方俗乃復廣積薪芻多聚一作備饔餼年年歴覽處處登臨從臣疲敝供頓辛苦而飄風凍雨聊竊比於前一作先驅車轍馬蹤一作跡遂周行於天下秦皇之心未已周穆之意難窮宴西母以一作而歌雲浮東海以一作而觀日家苦納秸之勤人阻來蘓之望且夫天子有道守在海外英華作内夷不亂華在徳非險長城之固一作役戰國所為乃是狙詐之風非闗稽古之法而乃追踪秦代版築更興廣營一作襲其基趾延袤萬里遂使屍骸遍一作蔽野血流成川一作河積怨比於丘山一作滿於山川號哭動於天地其罪六也遼水之東朝鮮之地禹貢以為荒服周王棄而不臣示以覊縻逹其聲教苟欲愛人非求拓土又強弩末矢不能一作理無穿於魯縞衝風餘力非敢一作詎能動於鴻毛石田得而無堪雞肋食一作啖而何用而恃衆怙强一作力窮一作強兵黷武務在吞併一作唯在并吞不思後篇作務長䇿夫兵猶火也不戢則一作將自焚遂使億兆夷人隻輪莫返夫差䘮國實為黄池之盟苻堅滅身良由夀陽一作春之役欲捕鳴蟬於前不知黄雀於後一作挾彈在後復矢相顧髽弔成後篇作連行義夫切齒壯士扼腕其罪七也直言啓沃王臣匪躬唯木從䋲若金湏礪唐堯建鼔思聞獻替之言夏禹懸鞞一作鞀時聼箴規之美而乃愎諫違卜妬一作蠧賢嫉能直士正人皆由屠戮一作害左僕射齊國公高熲上柱國宋國公賀若弼或文昌上相或細栁功臣暫吐良藥之言飜加屬鏤之賜龍逄無罪遂一作更遭夏癸之誅王子何辜濫被商辛之戮遂令君子結舌賢人鉗一作緘口指白日而為一作比盛射蒼天而敢欺不悟國之將亡不知死之將至其罪八也設官分職貴在銓衡察獄問刑無聞賂一作販鬻而錢神起論銅臭為公梁冀受黄金之蛇孟佗薦蒲萄之酒遂使彛倫攸斁政以賄成君子在野小人在位積薪居上驗一作同汲黯之言囊錢不如傷趙壹之賦其罪九也宣尼有言無信不立用命賞祖義豈食言自獨夫一作昬主嗣位每歲行幸南北巡狩東西征伐至於一作如浩亹陪蹕東都固守一作守固閿郷野戰鴈門被一作解圍自外征伐一作夫不可勝紀既立功勲湏酬爵賞一作官爵而志懐翻覆言行浮詭臨危一作危急則勲賞懸授克定則絲綸不行異商鞅之賚一作頒金同項王之刓印芳餌之下必有懸魚惜其重賞求其一作人死力走丸逆坂譬一作匹此非難凡百驍雄莫一作誰不讐忿至於匹夫蕞爾宿諾不虧况一作既在乗輿二三其徳其罪十也有一於此未或不亡况四維不張三空三空見後漢陳蕃傳揔萃一作三靈揔萃無小無大愚夫愚婦共識殷亡咸知夏滅罄南山之竹書罪無窮决東海之波流惡難盡是以窮竒災於上國猰㺄暴於中原三河縱封豕之貪四海被長蛇之毒百姓殲亡殆無遺類十分之一作為計才一作纔同一而已蒼生凛凛一作慄懐咸憂杞國之崩赤縣一作子嗷嗷俱愁歴陽之䧟且國祚將改必有常期六百喪殷一作殷亡之年三十終姬之數一作姬終之事故䜟録皆云隋氏三十六年而滅此則厭徳之象已彰代終之兆先見皇天無親唯徳是輔况乃欃槍竟天申繻謂之除舊歲星入井甘公以為義興兼以朱雀門燒正陽日食狐鳴鬼哭川竭山崩並是宗廟為丘墟之狀荆榛是庭旅之事一作宗廟為墟之妖荆榛旅庭之事夏后一作氏則災釁非多殷人則咎徴更少牽牛入漢方知大亂之期王良䇿馬始騐兵車之㑹今者順人將革先天不違大誓孟津陳盟一作命景亳三千列國八百諸侯不謀而同辭不召而自至轟轟隐隐如霆如雷雕虎嘯而谷風生應龍驤而景雲起我魏公聦明文一作神武齊聖廣淵備七徳而在躬包九有一作功而挺秀一作出周太保魏國公之孫上柱國蒲山公之子家傳盛徳武王承季歴之基地啟元勲世祖嗣元皇英華作皇室之業篤生白水日角之相更一作便彰載誕丹陵天表之文斯著加以姓符圖䜟一作緯名恊歌謡六合所以歸心三靈於焉一作所以改卜文王厄於羑里赤雀方來高祖隐於碭山彤雲自起兵誅不道赤伏至自長安從篇作安平非鋒銳難當黄星英華作屋非出于梁宋英華作苑非九五龍飛之始大人豹變之初歴試諸艱大敵彌勇上柱國司徒東郡公翟讓功宣締構翼亮經綸伊尹之賛一作佐成湯蕭何之奉一作輔髙帝上柱國揔管齊國公孟讓柱國歴城公孟暢柱國絳郡公裴行儼上大將軍左長史邴元真等並運籌千里勇冠三軍擊劒則斬蛟截鰲一作截蛟㫁鰲彎弧則啼一作吟猿落鴈韓彭絳灌成沛公之基冦賈吴馮奉蕭王之業復有䝉輪挾輈之士㧞距投石之夫冀馬追風吴戈照月一作日魏公屬當期運撫兹後篇作拯斯億兆躬擐甲胄䟦渉山川櫛風沐雨豈辭勞倦遂興一作起西伯之師將問南巢之罪百萬軍一作成旅四七為名呼吸則河渭絶流叱咤則嵩華自㧞以此攻城何城不克一作䧟以此擊陣何陣不摧譬猶决滄海而濯殘熒英華作澇舉崐崘而壓小卵鼔行而西一作進百道俱進一作前以四一作今月二十一日届于東都而昏朝文武㽞守段達韋津等昆吾惡稔飛廉奸佞尚一作久迷天數敢拒義師一作兵驅率醜徒衆有十萬迴洛倉北遂來舉斧於是熊羆角逐貔虎争先因爾一作其倒戈之心乗我破竹之勢曾未旋踵瓦觧氷消坑卒則長平未多積甲則熊耳為小逹等助紂一作桀為虐嬰城自固梯衝亂舞徒設九拒之謀皷角潜一作將鳴空凭一作憑百樓之險鷰巢衞幕魚逰宋池殄滅之期匪朝伊夕然興後篇作迴洛虎牢國家儲積我並一作已先㨿為日久矣又一作既得迴洛復一作又取黎陽天下倉廪後篇作倉儲一作之倉盡非隋有四方起後篇作赴義萬里如雲足食足兵無前無敵裴光禄仁基雄才上略一作將受命東一作專征遐邇攸憑安危是託乃識機知變遷虞後篇作既事夏袁謙擒於藍水張須陁獲在滎陽竇慶戰沒於睢陽一作淮南郭絢授首於河北隋之亡歿一作候斷可知也清河公房彦藻近秉戎律畧地東南師之所臨風行電擊安陸汝潁一作南則隨機蕩定淮安濟陽英華作淮南濟北則俄然送款徐圓朗已平魯郡上柱國東平孟海公久一作又破齊隂於是海内英雄咸来嚮應封民瞻取平原之境郝孝徳據黎陽之倉李士才一作雄虎視於長平王徳仁鷹揚於上黨滑郡公李景考功郎中房孝基發自臨榆一作渝劉興祖起於北一作白朔崔白駒自一作在潁川起房一作方獻伯以譙郡来各擁數萬之兵俱期牧野之㑹滄溟之右函谷之後篇作以東牛酒溢於軍前壺漿迎一作盈於道左諸君等並衣冠華一作世胄杞梓良材歆神靈澤一作神鼎靈澤之秋裂地封侯之始豹變鵲起今正其時鼉鳴龜應見機而作各宜鳩率子弟共建功名耿弇後篇作門之赴光武蕭何一作宗之奉髙帝當以一作豈止金章紫綬軒一作華葢朱輪富貴以重當年珪璋一作忠真以傳奕葉豈不盛哉若隋代官人同夫桀犬一作同吠堯之犬尚荷王莽之恩仍懐蒯瞶之禄英華作詐審配死於袁氏不如張郃歸曹范曽漢書作増困於項王未若陳平從漢魏公推以赤心當加好爵擇木而處幸一作令不自疑脱其猛虎猶與舟中敵國夙沙之民共縛其主彭寵之僕自殺其君髙官上賞即以相授如暗於成事守迷不返崐岡縱火玉石俱焚義等噬臍悔將何及黄河帶礪眀余旦旦之言皎日麗天知我勤勤之志一作意布告天下一作海内咸使聞知一作皆舊唐書李密傳此篇六百八十三巻書門重今已削去為李宻檄竇建徳文房彦藻公逸氣縱横鷹揚河朔引蘭山之驍騎驅易水之壯士跨躡燕齊牢籠趙魏好通戎夷聲振華夏昔隗囂之居隴上非不險也項籍之據彭城非不強也然而援無所恃躬違厯數遂使楚徒歔欷于垓下秦泥不封於函谷故託身得地竇融保西河之功協契非人劉表䘮漢南之業魏公英雄電逝類晨風之拂北林率土星奔甚涓流之赴東海今隋主拘囚於世充身制於朱燦白旗之首已懸烏江之船未艤去月二十日總管兵馬㑹同黎陽莫不投盖蒙輪賈勇求敵逺懐歸義分討不庭公能觀火鹿臺枉道垂報或以冀方猶梗願協力齊盟南臨則黄河可清北指則幽雲自捲公之逺度宏規髙勲茂績必將俯盼伊吕吞併韓彭自餘碌碌復何足數絳灌尚警干戈未戢想軍旅之事各有司存指蹤之勞無疲於眀鏡也内懐悃欵形于翰墨情之所寄言不能適為竇建徳檄秦王文孔徳紹建徳師衆渡河與王世充相援船運軍糧泝河而上舳艫相繼首尾不絶水陸並進築城營壘于成臯之東見號三十餘萬隂令人與王世充相約乃遺秦王書夏王敬問唐秦王彼朝發跡太原奄有闗内鄭氏光啓伊洛崇建宗社予則創基燕趙包舉山東鄭國何辜興師致討深懐固存不憚濡足方今千乗雷動萬騎雲屯投石㧞距蒙輪擊劍統三燕之義勇驅六齊之雄傑制勍敵如拾遺殄髙墉若摧朽鄭都鞠旅誓衆雪讐我師躍馬礪戈克蕩氛祲彼則外無救援内絶軍糧將聴楚歌之聲方見崤陵之哭若能反鄭國之侵地守秦川之舊邦更修前好不乖来請為李宻檄滎陽守郇王慶文魏徵宻既屯鞏洛東得黎陽河南郡縣莫不響應惟滎陽不下王即隋之宗室故鄭疑宻以一城之地不足以動大兵先命行人開陳禍福早挹芳猷未諧披展甚為翹佇興寢増勞寒勢轉嚴比得清吉及處危城無乃憂悴自猜隋書作昏狂嗣位多歴嵗年剥削黔黎隋書作生民塗毒一作炭天下瓊室瑶臺之麗未極驕奢糟丘酒池之荒非為滛亂加以違忠臣之諌從婦人之言殺戮忠良一作多科稅無已是以蝟毛而起豹變其文共舉義旗同隋書作戡翦凶虐今者屯營鞏洛開發大倉賑恤饑羸咸從充健吴戈電照𨽻首算而無窮冀馬雲屯𢎞羊計而難盡是以八方並凑隋書作同徳萬里俱来莫不期入闗以亡秦争渡河而滅紂東窮海岱南洎江淮凡厥遺黎隋書作人承風慕義唐公起兵黎疑作晉陽兵一作軍臨㶚岸三秦父老千里犒師叶義同心共為犄角元寳藏武陽興義即取黎陽燕趙之郊来蘇成詠唯滎陽一郡仍隋書作王獨守迷愛疑以宗盟尚疑銜璧敬陳鍼藥冀愈膏肓夫㣲子紂之長隋書作元兄親隋書作族實為重項伯籍之季父戚乃非踈然其隋書作猶去朝歌而處周背西楚而歸漢豈不眷戀宗祊留連骨肉但為識寳鼎之遷隋書作將移知神器之先改河決不可壅樹顛不可維所謂𤣥覽通人眀鍳君子者矣而王之先代家住山東本姓郭氏乃非楊族只隋書作止為宿與隋朝頗隋書作先有勲舊遂得預沾磐石遂隋書作名在葭莩婁敬之與漢髙殊非血𦙍吕布之於董卓良異天親芝焚蕙歎事不同此又王之昏主心若虎狼讎忿同胞乃甚隋書作有逾沉閼惟勇及諒咸罄禮記作磬甸師魏文之毒任城漢武之鴆河獻假使宗祧是一踈不間親况乃族類為非有何疑阻隋書作何能自保王之為臣無所獻納不能曲突徙薪除煩去惑致令四海鼎沸百姓亂麻髙壘深溝自固而已藩屏之寄豈若是乎欲免大責其可得也為王計者莫若舉城從義開門送欵識機知變足為美談乃至子孫長守富貴十六字隋書作安若泰山髙枕而卧長守富貴足為美談乃至子孫必有餘慶今王世充屢被摧破偷存漏刻段達守東都窘廹自救無聊隋書作今王世充屢被摧蹙自救無聊偷存晷刻詎能支乆叚逹韋津東都自守何暇圖人世充朝亡彼隋書作達便夕死又東都荒酣酒色六字隋書作江都荒湎流􅊺忘歸内外崩離人情隋書作神怨憤上江米船皆被抄截士卒饑餒半菽不充事切析骸義均煑弩舉烽火於驪山諸侯莫至浮膠船於漢水還日未期近得朱粲啓詞鋭師百萬以破襄陽總帥熊羆沿流東下尅期指日定滅江都分項籍於五侯切王莽於千段王獨守孤城援絶隋書作絶援千里餱糧之計僅有月餘敝卒之多才隋書作纔盈數百何以隋書作何有恃賴欲相抗拒飛隋書作求枯魚於市肆即事未遥因歸鴈以運糧竟知何日然城中雄隋書作豪傑王之腹心思殺長吏將為内應隋書作啓只恐禍生七首釁起隋書作發蕭墻枉隋書作空以七尺之形隋書作軀徒隋書作懸償千金之購可為寒心可為酸鼻者也今貔豹百萬馬首欲東惟待王世充破了鼓行東邁梯衝亂舞鼓角潜鳴笑虢叔之死馬疑作焉左傳制巖邑也虢叔死焉在隋屬滎陽郡悲襄陽疑作城漢書襄城無噍類之噍類南陽首疑作守齮封侯之事杳然東門逐獵臨刑之歎何晩深相愛惜裂帛裁書幸可三思自求多福慶得書懼召父老計乃出降宻代徐敬業傳檄天下文駱賔王偽臨朝豺豕行武氏者集本文粹並作偽周武氏者人文粹作性非和順舊唐書作温潤地實寒㣲昔充太宗下陳曽唐書作㑹以更衣入侍洎乎晩嵗諸書作節穢亂春宫宻文粹作潜隱先帝之私隂圖後房唐書作庭之嬖入門見嫉蛾眉不肯讓人掩袖集作袂工讒狐媚偏能惑主踐集作蹈元后於翬翟䧟集作致吾君于聚麀加以虺蜴為心豺狼成性近狎邪僻殘害忠良殺姊集作子屠兄弑君酖母人神之所同集作共嫉天地之所不容猶復包藏禍心窺竊神器君之愛子幽之于唐書作於别宫賊之宗盟委之以重任嗚呼霍子孟之不作朱虚侯之已亡燕啄皇孫知漢祚之將盡龍漦帝后識夏庭之遽衰敬業皇唐舊臣公侯冡子奉先君之成業荷本朝之舊文粹作厚恩宋微子之興悲良有以也袁君山之流涕豈徒然哉是用氣憤風雲志安社稷因天下之失望順宇集作遂海内之推心爰舉義旗誓文粹作以清妖􅖈南連百越北盡三河鐡騎成羣玉軸唐書作舳相接海陵紅粟倉儲之積靡窮江浦黄旗匡復之功何逺邉唐書作班聲動而北風起劍氣衝而南斗平喑嗚則山岳崩頺叱咤則風雲變色以茲一作此制敵何敵不摧以此圖功集作以斯攻城何功一作城不克公等或居漢地或叶周親唐書作或家傳漢爵或地叶周親或膺重寄於爪牙或受顧命於宣室言猶在耳忠豈忘心一坏之土未乾六尺之孤安在文粹作何託儻能轉禍為福送往事居共立勤王之功文粹作啚無廢舊文粹作大君之命凡諸爵賞同指唐書作裂山河若其集作或眷戀窮城徘徊岐路坐昧先幾之兆必貽後至之誅請看今日之域中復文粹作竟集作合是誰家之天下移檄州郡咸使知聞為濮陽公檄劉稹文集作書李商隱足下前以肺肝布諸簡素仰承復命猶事枝詞夫豈告者之不忠抑乃聴之而未審擇福莫若重擇禍莫若輕一去不廽者良時一失不復者機事噫嘻執事誰與為謀延首北風心焉如灼是以再陳禍福用釋危疑言不避煩理在易了丁寧懇欵至于再三者誠以某與先太師相國俱沐天光並為藩后昔云與國今則親隣而大年不登同盟英華作門望非未至飯貝纔畢禭衣莫陳乃睠後生遽乖先訓遷延朝命迷失臣職不思先轂左傳作縠之忠將覆欒書之族此僕𨽻之所共惋集作惜兒女之所同悲况某擁節臨戎援集作㧞旗誓衆封疆甚邇音㫖猶存忍欲賣之以為已功間之以開戎役將祛未寤欲罷不能願思苦口之言以定束身之計昔先太尉相公常蹈亂邦不從逆命翻身歸國全家受封居韓之西為國之屏棄代之際人情帖然太師相公集作國以早副軍牙乆從征斾事君之節已著居䘮之禮又彰故乃集作前奬其象賢仍以舊服納職貢賦十五餘年於我唐為忠臣於劉氏為孝子人之不幸天亦難忱纔加壯室之年奄有壊梁之歎主上深固義烈是降優恩盖將顯足下之門為列藩之式不欲劉氏有自立之帥上黨為辜恩集作姑息之軍㑭之還朝以聴故集作後命其義甚著其恩莫偕昨者祕不發䘮已踰一月安而拒詔又歴數旬祕䘮則於孝子未聞拒詔則於忠臣已失失忠於國失孝於家望此用人由茲保族是亦坐薪言泰巢幕云安智士之所寒心謀夫之所齚舌矧於僕者得不動心竊計足下之懐執事之論當以趙氏傳子魏氏襲侯欲以逡廵希恩顧望謀立耳夫事殊者趣異勢别者跡暌胡度其始而議其終搴其華而尋其實願為足下一二而陳之趙魏二侯於其先也親則父子於其人也職則副戎賞罰得以相恭恩威得以相抗故朝廷推而與之今足下之於太師也地則相近職非副戎賞罰未嘗相叅恩威未嘗相抗稽䘮則於義爽拒詔則於事乖此趙魏二侯信事殊而勢别矣此施之於太師趙魏則為繼代象賢之美施之於足下足下則為自立擅命之尤得失之間其理甚白又計足下未必不恃太師之好賢下士重義輕財吴國之錢往往而有梁園之客比比而来將倚以為墻藩託以為羽翼使之謀取使以數求細而思之此又非計山髙則羝羊自至泉深則沉玉自來已立然後人歸身正然後士附語有之曰政亂則勇者不為鬬徳薄則賢者不為謀故吴濞有奸而鄒陽去燕惠無徳而樂生奔晉寵大夫卒成分國之禍衞多君子孰救渡河之烖此之前車得不深鏡代憲四祖文眀繼興當時燕趙中山淮陽齊魯連結者幾姓旅拒者幾侯咸逆天用人背惠忘徳據指掌之地謂可逃刑倚親戚之私謂能取信一旦地空家破首裂支分闇者不能為謀明者固以先去悔而莫及末如之何先太尉與李洧尚書齊之宻戚楊太保與蘇肇給事蔡之懿親並據要地方州領精甲銳卒及其王師戾集作蒞非止我武惟揚則割地驅人以降送欵輸忠以入非不顧宻戚非不念懿親非不思恩非不懐惠直以逆順是逼死生實難能與其同休不能與其共戚故也况足下大未侔齊蔡乆未及李吴將以其人動於不義僕固恐夙沙之國縛主之卒重生彭寵之家不義之侯更出又計足下當恃太行九折之險部内數州之饒兵士尚強倉儲且足謂得支乆謀而使安危哉此心自棄何速昔李抱真相國用彼州之人破朱滔於燕國困田悦于魏郊連兵轉戰綿嵗經時而潞人夫死不敢哭子死不敢悲何者李相國奉討逆之命為勤王之師義著而誠順故也及盧從史釋䘮就位賣降冀功將乗討伐之時欲肆兇邪之性計未就而人神已怒事未立而兵衆已離以萬夫之長困一卒之手驅轞北闕棄屍南荒而潞之人猶老者捫胷少者扼腕謂朝廷不即顯戮深為失刑其故何哉以從史不義不暱去安就危衆黜其謀下不為用故也二帥去就非因傳聞鳩杖之人鮐背之叟知其本末尚能言之則太行之險固不為渤疑作悖者之守數州之衆固不為邪者之徒此又其不足恃也由此言之則何以敗名譽六字集作則以何名隳家聲何事捨君命何道求死士何計得集作固人心此僕之所以對案忘飡推枕不寢為足下惜為足下危而不知其所以然也况太師比者養牛添卒畜馬訓兵旁招武幹之材中舉將軍之令然而經集作聴於逺近頗有是非雖朝廷推赤心𢎞大度然而不逞者已有乖異集作異圖之説横議者屢興悖惡之歎人之多言亦可畏也誰為来者宜其弭之今足下背季父引進之恩失天朝文誥之令則是實先太師之浮議彰昭義軍之有謀為人姪則致叔父於不忠為人孫則敗乃祖於無後亦何以對燕趙之士見齊魯之人耶又計足下旬日之前造次為慮今茲追改懼有後艱此左右者不明而咨詢之未盡也近者李尚書祐董常侍重質之軰並親為賊將拒我官軍納質於匪人効用於戎首乆乃来復尚䝉殊恩皆受郡符咸領旗鼓不能悉數厥徒實繁豈有足下藉兩代之餘資弄集作委數萬之舊旅俛首聴命舉宗効誠則朝廷又豈以一日之稽遲片辭之疑異而致足下於不測沮足下於後至集作圖故事具存可以眀驗幸請自求多福無辱前人䕶龍旐以歸洛師秉象笏而朝魏闕必當勲庸繼代富貴通身無為隣道所資使作他人之福儻尚淹歸欵未整来軒集作轅戎臣鼓勇以争先天子赫斯而降怒金玦一受牙璋四馳魏衞壓其東南晉趙出其西北㧞距投石者數逾萬計科頭擊手者動以千羣兼驅挽虎之材官仍率射鵰之都督感義則日月能駐拗憤則砂石可吞使兵用火焚城將集作兼水灌魏趣邢郡趙出洺州分二大都之間是古平原之地車甲盡輸於此境糗糧反聚於他人恃河北而河北無儲倚山東而山東不守以兩州之殘集作餓殍抗百道之竒兵比累卵而未危寄孤根於何所則老夫不佞亦有志焉願驅敢死之徒以從諸侯之末下飛狐之口入天井之闗巨浪難防長颷易扇此際必當驚地底之皷角駭樓上之梯衝喪貝躋陵飛走之期既絶投戎集作戈散地灰釘之望斯窮自然麾下平生盡忘舊愛帳中親信即起他謀辱先祖之神靈為眀時之哂集作戮笑静言其漸良以驚集作兢魂今故再遣使車重申丹素惟鍳前代之成敗訪歴集作用事之賔寮思反道敗徳之難念順令畏威之易時以吉日蹈茲坦途勿餒劉氏之魂勿汙潞人之俗封帛增欷含毫益酸延望還章用以上表成敗之舉慎惟圖之不宣河陽三城節度使王茂元頓首文苑英華巻六百四十六
