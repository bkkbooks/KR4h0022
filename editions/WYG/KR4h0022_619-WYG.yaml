body:
  text: 文苑英華卷六百二十宋李昉等編諫畋獵逰宴上諫獵表二首諫馬射表一首諫格猛獸表一首諫畋獵表一首諫拜舞人安叱奴為散騎常侍表一首諫作乞寒胡戲表一首諫安福門酺樂表一首諫江南採捕諸鳥表一首諫停市犬馬表一首諫不許突厥入仗馳射表一首諫不夜飲表一首諫内宴至夜表一首上諫獵表高祖褚亮臣亮言臣聞堯皷納諫舜木求箴茂克昌之風致昇平之道伏惟陛下應千祀之期捄一作拯百王之弊平壹天下劬勞帝業旰食思理一作政廢寢憂民一作人用農隙之餘遵冬狩之禮軨一作獲車之所逰踐虞旗之所涉歴網唯一面禽止三驅縦廣成之獵士觀上林之手搏廻玊鑾而藉豐草引金陣而滿平原盡心目之娯翫罝罘之樂發雕弓而迫狡兎飛勁矢而摧高鳥斯固畋弋之恒規而皇王之壯觀至於親逼猛獸臣竊惑之何者筋力驍悍爪牙輕㨗强一作連弩一發未必挫其凶心長㦸纔撝不能當其憤氣雖復孟賁在一作抗左夏説居前卒然驚竄一作軼事生慮表如或近赴一作起林藂未塡坑谷駭屬車之後乗犯宫一作官騎之清塵小臣怯懦私懐戰慄陛下以至聖之姿垂将來之教降情納下無隔直言臣叨逢明代一作時逰官藩邸身漸榮渥日用不知敢縁天造冒陳丹懇上觸宸嚴伏増戰越一作皆舊唐書本傳同前見六百九十四卷疏門虞世南諫馬射表太宗貞觀元年孫伏伽臣聞千金之子坐不垂堂百金之子立不倚衡以此言之天下之主不可履險乘危明矣臣又聞天子之居也則禁衛九重其動也則出警入蹕此非直尊其居處乃為社稷生靈之大計耳古人云一人有慶兆民賴之臣竊聞陛下猶自走馬射帖娯樂舊唐書作悦近臣此乃無急唐書作禁乗危竊為陛下有所不取也何者一則非光史冊二則未足顯揚又非所以遵養聖躬亦不可以垂範後代此祇是少年諸王之所務豈得既為天子今日猶行之乎陛下雖欲自輕其奈社稷天下何如臣愚見竊謂不可諫格猛獸表太宗魏徴貞觀十四年臣徴言臣聞書美文王不敢盤于逰畋傳述虞箴稱夷羿以為誡昔漢文臨㶚坂欲馳下袁盎攬轡曰聖主不乗危不徼倖今陛下騁六飛馳不測如有馬驚車敗陛下縱欲自輕奈高廟何孝武好格猛獸相如諫力稱烏獲捷言慶忌人誠有之獸亦宜然卒然遇逸材之獸駭不存之地雖烏獲逢䝉之伎不得用而枯木朽株盡為難矣雖萬全而無患然本非天子所宜近孝元郊泰畤因留射獵薛廣徳奏稱竊見關東困極百姓罹災今日撞亡秦之鐘英華作今接亡秦之踵非歌鄭衛之樂士卒暴露従官勞倦顧如宗廟社稷何憑河暴虎未至之誡也臣竊思此數帝心豈木石獨不好馳騁之樂而割情屈已從臣下之言者志存為國不為身也臣伏聞車駕近出親格猛獸晨徃夜還以萬乗之尊闇行貞觀政要作投荒野政要作村踐深林涉豐草甚非萬全之計願陛下割私情之娯罷格獸之樂上為宗廟社稷下慰羣僚黎庶則天下幸甚諫畋獵表𤣥宗開元五年呉兢臣兢言伏見明制來年五月五日幸東都道路皆以陛下至長春宫及沙苑當有畋獵之事今東土耆艾關河士女莫不欣躍舞忭翹望帝車延頸企踵所思者徳伏願陛下舉無失禮動則有章詩云敬愼威儀惟民之則愚臣以山陵始畢甫及逾年陛下縗服雖除心喪未已四海之内八音尚遏豈可遽将犬馬為娯鷹隼是務必或如此則恐傷人子之道虧天地之經欲令萬方何所取則况禮經云三年之喪自天子逹之陛下既俯順當時之請唯行易月之制奈何更盤于逰畋以徇從禽之樂豈可謂明王之孝理天下乎而望徳敎加於百姓必不可得也昔魯侯觀魚于棠春秋尚列其戒陛下若既葬而獵後代豈不為刺且馳騖山澤之間經過林薄之下水谷之危未逺銜䇿之變不恒伏願陛下重慎防微湏為社稷自愛老子曰我無為而人自化我無欲而人自朴詩云爾之教矣民胥效矣由是觀之居上者必慎所好愚臣職居待問兼掌史筆竊以君舉必書位一作法在無隠既聞衆所流議實恐有玷聖猷區區之誠惟在於一作為此輙敢冒死上陳伏願留神省察恕此狂斐之罪云云諫拜舞人安叱奴為散騎常侍表見六百九十三卷疏門李綱諫作乞寒胡戲表睿宗韓朝宗臣聞之傳曰辛有適伊川見被髪於野者曰不及百年此其為戎乎其禮先亡矣後秦晉遷陸渾之戎於伊川其中國之人習戎狄之事一言以實百代可知竊惟王公貴人國之藩翰凡所舉措湏合彛典今之乞寒濫觸胡俗臣叅聴物議咸言非古作事不法無乃為戎伏願陛下三思籌其以道又道路籍籍咸云皇太子微行觀此戲且元良國本蒼生繄賴輕此馳驟能無蹔蹶况匈奴在邸實繁有徒刺殺宻發何限夷夏卒然奔呼掩襲邂逅驚擾則憂在不測白龍魚服取困豫且深可畏也惟陛下愛人活國憂勤庶政今所施為豈徒然矣豈不以𤣥象變見疫癘相仍厭兵甲之災助太隂之氣臣誠愚瞽以為無益臣聞皇天無親惟徳是輔未聞兆亂以來多福太戊修政而桑榖自萎景公善言而熒惑退舎彰善罰惡天之道也伏願去邪勿疑昭徳以待豈區區末法而能定其休咎哉諫安福門酺樂表睿宗先天二年嚴浚字挺之臣浚言微臣竊惟陛下應天順人發號施令躬親大禮昭布鴻澤孜孜庶政業業萬幾盖以天下心為心深戒安危之理此誠堯舜禹湯之德教也奈何親御城門以觀大酺累日兼夜臣愚竊所未喻夫酺者因人所利合醵為歡無相奪倫不致糜費一作弊且臣卜其晝史冊攸傳一作存君舉必書帝王重慎今乃暴衣冠於上路羅伎樂於中宵雜鄭衛之音縦倡優之樂陛下還淳復古宵衣旰食不矜細行恐非聖徳所宜臣以為一不可也誰何警夜伐鼓通晨以備非常古一作存之善教今陛下不深惟戒慎輕違動息重門弛禁巨詐一作猾多徒儻有躍馬奔車厲聲一作流言駭呌一塵聽覽有軫一作累宸衷臣以為二不可也且一人向隅滿堂不樂一物失所納隍増慮陛下北宫多暇西墉暫陟一作臨青春日長已積埃塵之弊紫微漏永重窮歌舞之樂儻令有司跛倚下人饑倦以陛下近猶不恤而况於逺乎聖情攸聞豈不懍然祗畏臣以為三不可也一作四不可恐少一叚且元正首祚大禮頓先一作頻光百姓顒顆徳咸一作咸謂業盛配天功垂曠代今陛下恩似薄於衆望酺即過於徃年王公貴人各承㣲㫖州縣坊曲競為課税呼嗟道路貨易家産損萬人之力勞百戲之資適欲同其歡而乃遺其患復令兼夜人何以堪臣以為四一作五不可也書曰罔咈百姓以従已之欲况自去夏霖淫經冬一作今亢旱農乏收成市有騰貴損其實崇其虚馳不急之務擾方春之業前代聖主明王忽於微細而成過患者多矣陛下豈可効之哉伏望晝盡娯一作晝則歡娯暮令休息惡斯一作要令兼夜恐無益於聖朝惟陛下裁擇一作皆舊唐書本傳諫江南採捕諸鳥表倪若水臣若水言臣伏以方今九夏時忙三農作苦田夫擁耒蠶婦持桑而以此時採捕竒禽異鳥供園池之翫逺自江嶺逹於京師水備舟船陸倦擔負飼舊唐書作飯之以魚肉間之以稻粱道路觀者豈不以陛下賤人貴鳥也陛下方當以鳳凰為凡鳥麒麟為凡獸即鵁鶄鸂鶒曷足貴也陛下昔龍潛藩邸備歴艱虞今氛祲廓清高居九五玉帛子女充於後庭職貢珍竒盈於内府過此之外復何求哉臣承國厚恩超居重任草芥殘命常欲殺身以効忠葵藿㣲心常願隳肝以報主瞻望闕庭敢布腹心直言忤㫖甘從鼎鑊諫停市犬馬表𤣥宗張廷珪臣廷珪言伏見發使及典傔等大齎繒錦将於石國和市犬馬臣聞書曰犬馬非其土性弗畜珍禽竒獸不育於國者故明王欲極於徳忠臣願畢於議偕䕶於細行保於大猷冀無間然能致盡善也今以陛下之明何失不見以陛下之斷何欲不懲復禹順於走丸法堯易於廻掌誠可却走馬訓旅獒聖心通於兆人徳言應於千里一感則法星退舎一解則亢陽出雲豈宜勞逺人玩異物有従禽之漸無恤下之先使明詔遐臨聖意昭布上非治唐諱國之要下匪即戎之功將恐新麥未穫舊穀已空飢饉薦臻邉荒速冦昭告則然上帝赫矣大君無以解其倒懸續于請命邇不自給逺不能輸户口流離公私懐懼此臣之所以憂陛下順天之心從人之願省無益之用救必然之急先社稷後犬馬此天下之幸國家之福豈獨微臣哉無任竭忠竭誠之至謹録奏聞伏聽勑㫖諫不許突厥入仗馳射表𤣥宗吕向臣聞鴟梟不鳴未為瑞鳥猛虎雖服文粹作伏豈齊仁獸是由醜性毒行久務常積故也今夫突厥者正與此類安忍殘賊莫顧君親陛下持武義臨之修文徳來之既慴威靈又沐聲教以力以勢不得不庭故稽顙稱臣奔命遣使陛下乃能收其頃文粹作傾効雜以従官赴封禪之禮叅玉帛之㑹此徳業自盛固不可名焉因復詔許侍宸逰召入禁仗仰英姿之四目送神藝之百發恩㫖文粹作意俱極誠無得踰焉乃更賜以馳逐使操弓矢競飛鏃於前同獲獸之樂是屑畧大過猶獨未敢取也雖聖胷豁逹遇文粹作與物無猜而愚心徘徊與時加慄儻此等各懐犬吠交肆盗憎荆卿詭動何羅竊至蹔逼嚴蹕稍冒清塵縱即殪𤣥兕墟幽土單于為醢穹廬為洿何塞過眚特願陛下勿復親近使有分限待不失常歸於得所此謂廻兩曜之鑒祛九宇之憂孰不幸甚文粹自縦即以下節去却有悔将何及四字諫不夜飲表太宗褚遂良臣遂良言臣聞三爵獻酬所以成禮七升為限謂之無度書之雅誥其慎在酒伏見去月二十七日為太子成婚訖北門賜三品已上宴自日辰時連至三更疲勞聖躬尤非盛事有識者云云皆言非是昔孫權漢后酒敗其徳昔陳完謂齊景公曰臣卜其晝未卜其夜白日傾酌是陶神情伏願陛下更無夜飲臣以虚薄拾遺是故不辭嚴誅輕敢聞奏謹陳庸淺不勝戰越諫内宴至夜表一作論災異表張説臣聞上天示下災祥将以誘𨗳人主先王仰觀休咎亦以順修政教易曰天垂象聖人則之言天人之際感通必矣臣伏見去年十月十七日月滿猶望應虧不虧今月十七日亦未少虧集作月亦未虧此易常之異也夫月者至隂之氣臣下之象當助天作明順期一作時盈缺若一作今過盛逾時盈縮乖度得非臣下之咎而上天之誡耶一作也伏願陛下深察熟思而預防之臣又見近日内宴夜深方罷小臣無識抑所未安王在在鎬一作周王在鎬凱一作愷樂飲酒此誠大樂一作雅之美也臣卜其晝未卜其夜此盖春秋之義也伏願陛下宴樂之餘一作終不及於夜臣職忝補闕昧死陳愚謹言文苑英華卷六百二十
