body:
  text: 文苑英華巻四百九十八宋李昉等編刑法下恤刑二道刑法得失一道往代為刑是非一道眚災肆赦一道止獄措刑一道論刑法之弊一道使人畏愛恱服一道議肉刑一道刑禮道一道恤刑問易稱議獄書載恤刑人命所懸於兹為重然姬旦制三典之宜蕭何定九章之律漢文除肉刑之科孝景減笞箠之令互相沿革雖復不同意在明威終資慎罰今既道符太古徳侔往初化越可封時當刑措専欲道徳齊禮纔畫衣冠反朴還淳肌膚不􅆭復恐隨時之義草艾不足懲其􅄽揆事立方赭墨無以防其偽歴代輕重舍用之規幸為陳之何者便俗對辛崇敏對某聞天播四時資寒暑而成歳國持二柄愼賞罰而稱權然逖聽上皇異冠鞸而知禁洎乎後葉廼黥刖以懲非故議獄緩刑著乎易象欽哉惟恤勒在虞書姬旦佐周量國政而為三典蕭何輔漢取秦法而定九章逮文景仁明㡬稱刑措減笞箠之令除肉刑之科降及當塗至於典午或逓相輕重筆削異端雖變易隨時各殊塗而並駕禁邪助禮乃一揆而同歸我皇睿哲欽明丕承寳祚道髙連陸績邁羲軒𤣥徳潜通神功侔於造化損已利物恵澤洽於含靈馭俗調風布春官之大禮明威止殺削秋荼之繁刑任臯陶以士師命定國為廷尉惟明克允人自不偷比屋有可封之人道路無赭衣之伍納黎元於仁夀反甿俗於淳和蕩蕩巍巍無徳而稱矣五刑八議金科玉條沿革合其規模損益得其輕重較如畫一法無二門用化洽於時雍將行之而不犯循之為美改作非宜謹對同前劉藏器對結繩以往闕文字而不傳觀跡以來煥圖書而可矚日温月冷既暢之以隂陽左春右秋亦効之以生殺方之四序取則二儀震雷霆以曜威象天討而明罰至如赭衣艾筆管子治古無肉刑而有象刑供艾畢設赭衣注畢與韠同又古字筆畢通用之制用於唐虞之朝劓刖宫割之刑施於夏殷之日既申之以三刺亦放之以五流鄭産鑄書吕侯訓贖秦吹鼎鑊漢調菹醢變三章而制九章減五百而笞二百歴當塗而互用涉典午而兼行今徳冠往初功髙䆳古既反真淳之俗還歸仁義之衢解網泣辜惟刑是恤斷而難續夙采緹縈之言議獄緩刑乆納温舒之奏不輕不重非省非繁既合時宜無勞横議謹對刑法得失問象五星七宿法壅水勝金是何刑焉深惑其義賣爵緡錢之令越官朝㑹之律見知腹誹之法直指夏蘭之使不知誰制莫委所由因戱加杖其人絶命解鬬觸刃從子殞躬有若此流將欲何斷夫杖妻面致大辟之科婦搏姑耳從減死之論斯之所決於禮安乎鮑昱赦東海之殺人陳忠縱穎川之請代如其得失亦可聞諸對對某聞弧矢以威用刑之迹遂兆雷電皆至折獄之義仍明乃有金朴異儔行乎舜日劓刖殊類施於姬年莫不䟽宻隨時輕重沿事語其數各有像焉土壅水而不流宫條斯凖火勝金而逾墨黥法是依於疑作放七宿異節之精實惟臏罰則五星應改之變爰在劓科上郡罹旱孝景復循漢食貨志作修賣爵南畆不出武帝遂下緡錢越官起於一作自張湯朝㑹興於趙禹公孫生見知之漸顔異為腹誹之初直指夏蘭之輩出於慘刻之日斯並虚生疑作虐主所得一作行佞臣攸致至若因戯杖而絶命觸鬬刄以亡身既有誤致之由斷取罰金之議妻則為室夫亦稱天雖云杖面陷一作詎容大辟良為情疑後主肆其不敬由斯之故方致極刑婦之承姑嚴於子道豈此陵辱以從減論然則鮑昱之科於義失矣仲逺之駁與禮符焉赦子母之情非無髙趣縱昆季之代已在前譏謹對往代為刑是非問乾靈著象聖人仰則左生右殺天之道也先寛後猛王之度焉何則反魯删詩下車而誅少正入闗約法締構而封雍齒為往迹之浮言為後塗之令則若云刑法不施於淳朴殺戮必用於凋訛則感電前皇不應染刃望雲後帝方示草纓沉吟乆之未知孰是至於宜獄宜犴五刑九刑清室黄沙之肇基執秩僕區之創迹墨幪抵罪㸃服記刑誤法理而揮刀謬刑名而伏劔咸晦胎祖側佇根由方聽安于之言復迓疑作訝温舒之奏景慕埋桐之術欣聞觀璧之規欲揆何人得階斯理鍾繇王朗尚且相持叔向鄭僑猶疑競爽度長絜大誰最指南勝躅髙縱音蹤何代為是對對天道未醨混彼我於非馬上徳云失迫聚散於驅鷄所以聖照㡬先賢圗事始創禮崇敬攸開揖讓之端設法明威用杜姦邪之路然則昌户受厯斬凶殘於鳯墟夀丘馭圗剪姦回於鹿野將銜勒以控奔馬興隄防以給羣流既繫事以惨舒亦隨時而賞戮遂使仲尼反魯先誅少正髙祖入秦遽封雍齒上如黄神攝運丹陵纂厯歩驟之軌髣髴殊塗亭毒之規依稀一致况乎時屯競逐理便於干戈道秦疑作泰讓夷義歸於玉帛斯則銅兵玉玦固可舉於軒皇艾服草纓豈謬施於唐帝至於宜獄宜犴詩人因賦以誡時五刑九刑晉臣貽書以訓俗卯金啓漢詔青室以懲奸典午承曹建黄沙而肅物晉疏執秩楚設僕區令尹之調馭長安㸃服化探丸之子唐侯之光宅天下墨幪致鑿頂之夫法或謬加李離伏劔刑疑濫及勾踐揮刀屬以安于絶簡之詞温舒緩刑之奏候埋桐以察理擬觀璧以照姦擅彼髙蹤雖云可尚自我作古夫復何逺且魏朝御史議駁鍾繇之疎晉室大夫書譴鄭産之醜荷校滅耳迷悔吝於六爻騁轍荒心垂欽恤於三鍰欲允時須議將安属未若踐臯陶之勝躅詔于公以度長詳彼刑書無溺情於愛惡揣兹心稱不撓法於重輕自然束影還淳並三皇以比迹削彫歸朴局一作並五帝而遐蹤謹對眚災肆赦禮部試第二道問書曰眚災肆赦又曰宥過無大而禮云執禁以齊衆不赦過若然豈為政以徳不足耻格峻立必罰斯為禮乎詩稱既明且哲以保其身易稱利用安身以崇徳也而論語云無求生以害仁有殺身以成仁若然則明哲者不成仁歟殺身者非崇徳歟對白居易對聖王以刑禮為大竇集作憂理亂繫焉君子以仁徳為大竇集作寳死生一焉故邦有用禮而不集作大理者有用刑而小康者古人有崇徳而逺害者有蹈仁而守死者其指歸之義可得而知焉在乎聖王乘時君子行道也何者當其王道融人心質善者衆而不善者鮮一人不善衆人惡之故赦之可也所以表好生惡殺且臻乎仁夀之域矣而肆赦宥過之典由兹作焉及夫大道隠至徳衰善者鮮而不善者衆一人不善衆人效之故殺集作赦之不可也所以月日懲惡勸善且革其澆醨之俗矣而執禁不赦之制集作文由兹興焉此聖王集有所以二字隨時以立制順變而致理非謂徳政之不若刑罰也然則君子之為君子者為能先其道後其身守其常則以道善乎身罹其變則不以身害乎道故明哲保身亦道也巢許得之求仁殺身亦道也夷齊得之雖殊時異致同歸於一揆矣何以覈諸觀乎古聖賢之用心也茍守道而死死而集作且不朽是非死也茍失道而生生而不仁是非生也向使夷齊生於唐虞之代安知不明哲保身歟巢許生於殷周之際安知不求仁殺身歟盖否與泰各繫於時也生與死同歸於道也由斯而觀則非謂崇徳者不為成人殺身者不為明哲矣鳴呼聖王立教同出而異名君子行道百慮而一致亦猶水火之相戾同根於冥數共濟於人用也亦猶寒暑之相反同本於元氣共濟於嵗功乎則用刑措刑之道保身殺身之義昭昭可知歟謹對止獄措刑在富而教之問成康御宇囹圄空虚文景繼統刑罰不用太宗化下而人不犯成此功者其效安在桀紂在上比屋可誅秦氏為君赭衣滿道致此弊者其故安在今欲鍳桀紂秦氏之弊繼周漢太宗之功使人有集無有字耻且格刑措不用備詳本末著之於篇自此至巻終並於白居易集凖備制科七十五門中摘取五篇其問荅皆居易擬作對對臣聞仲尼之訓也既庶矣而後富之既富矣而後教之管子亦云倉廪實知禮莭衣食足知榮辱然則食足財豊而後禮教所由興也禮行教立而後刑罰所由措也盖前事之不忘後事之元龜臣請以前事明之當周成康之時天下富夀人知耻格故囹圄空虚四十餘年當漢文景之時節用勸農海内殷實人人自愛不犯刑法故每嵗決獄僅至四百及我太宗之朝勤儉化人人用富庶加以徳教致于升平故一嵗斷刑不滿三十雖則明聖慎刑賢良恤獄之所致也然亦由天下之人生厚徳正而寡過也當桀紂之時暴征讐斂萬姓窮苦有怨無耻姦宄並興故是時也比屋可戮及秦之時厚賦以竭人財逺役以殫人力力殫財竭盡為冦賊羣盜滿山赭衣塞道故每嵗斷罪數至十萬雖則暴君淫刑姦吏弄法之所致也然亦由天下之人貧困思邪而多罪也由是觀之刑之繁省繫於罪之衆寡也教之廢興繫於人之貧富也聖王不患刑之繁而患罪之衆不患教之廢而患人之貧故人茍富則教斯興矣罪苟寡則刑斯省矣是以財産不均貧富相併雖堯舜為主不能息忿爭而省刑獄也衣食不充凍餒並至雖臯陶為士不能止姦宄而去盗賊也若失之於本求之於末雖聖賢並出集作生臣竊以為難矣至若察小大之獄審輕重之刑定加減於科條得情偽於聲集作察色此有司平刑之要也非王者恤刑之徳也至若盡欽恤之道竭哀矜之誠使生者不怨死者不恨此王者恤刑之徳也非聖人措刑之道也必欲端影於表澄流於源則在乎富其人崇其教開其亷耻之路塞其寃濫之門使人内樂其生外畏其罪則必過犯自省刑罰自措斯所謂致羣心於有耻立大制於不嚴古者有畫衣冠異章服而人不犯者由此道素行也論刑法之弊升法科選法吏問今之法貞觀之法今之官貞觀之官昔何為而大和今何為而未理事同效異其故何哉將刑法不便於時耶而官吏不得其人耶對對臣伏以今之刑法太宗之刑法也今之天下太宗之天下也何乃用於昔而俗以寧一行於今而人未和平集作休和臣以為刑法不便於時是官吏不循其法也此由朝廷輕法學賤法吏故應其科與補其吏者率非君子也其多小人也盖刑法者君子行之則誠信而簡易簡易則人安小人行之則詐偽而滋章滋章則俗敝此所以刑一而用二法同而理殊者也矧又律令塵蠧於棧閣制勑堆盈於案几官不徧覩法無定科今則條理輕重之文盡詢于法直是使國家生殺之柄假手於小人小人之心孰不可忍至有黷貨賄者矣有怙親愛者矣有陷讐怨者矣有畏權豪者矣有欺賤弱者矣是以重輕加減隨其喜怒出入比附由乎愛憎官不察其所由人不知其所避若然則雖有貞觀之法茍無貞觀之吏欲其行善無乃難乎陛下誠欲申明舊章剗革前弊則在乎高其科重其吏而已臣謹按漢制以四科辟士其三曰明習法集作律令足以決狐疑能按章覆問文中一作任御史者辟而用之伏惟陛下懸法學為上科則應之者必俊乂也升法吏為清列則授之者必賢良也然後考其能奨其善明察守文者擢為御史欽恤用情者遷為法官如此則仁恕之誠廉平之氣不散於簡牘之間矣掊尅之心舞文之弊不生於刀筆之下矣與夫愚詐小吏竊而弄之者功相萬也臣又聞管仲奪伯氏之邑沒無怨言季羔刖門者之足亡而獲宥孔明黜廖立之位死而垂泣三子者可謂能用刑矣臣伏思之亦何代無其人乎集作哉在乎求而用之考而奨之而已伏惟陛下再三察焉使人畏愛恱服理大罪赦小過問政不可寛寛則人慢刑不可急急則人殘故失於恢恢則漏網而為弊務於察察則及泉而不祥將使寛猛適宜疎宻合制上施畏愛之道下有恱服之心刑政之中何者為得對對臣聞聖人在上使天下畏而愛之悦而服之者由乎理大罪赦小過也書曰宥過無大况小者乎刑故無小况大者乎故宥其小者仁也仁以容之則天下之心愛而恱之矣刑其大者義也義以糾之則天下之心畏而服之矣臣竊見國家用法似異於是何則糾察之政急於朝官而寛於外官懲戒之刑加於小吏而縱於長吏是故權輕而過小者或反繩之寄重而罪大者或反赦集作舍之臣伏思之恐非先王宥過刑故之道也然則小大之喻其猶魚耶魚之在泉者小也察之不祥魚之吞舟者大也漏之不可刑煩猶水濁水濁則魚喁政慢集作寛猶防決防決則魚逝是以善為理者舉其綱疎其網綱舉則所羅者大矣網疎則所漏者小矣集作也伏惟陛下舉其綱於長吏疎其網於朝官舍小過以示仁理大罪而明義則畏愛恱服之化暗集作闇然而日彰於天下矣議肉刑可廢不可用問肉刑者其來尚矣其廢乆矣前賢之論是非紛然今欲棄而不行法或乖於稽古若舉而復用義恐失於隨時取舍之間何者為可對對臣伏以漢除肉刑迨今千有餘祀其間博聞逹識之士議其是非者多矣欲廢之者則曰刻膚革斷支體人主忍而用之則愷悌惻隠之心乖矣此緹縈所謂雖欲改過自新其道亡繇者也其欲復之者則曰任箠令用鞭刑酷吏倚而行之則専殺濫死之弊作矣此班固所謂以死罔人失本恵者也臣以為議事者宜徵其實用刑者宜酌其情若以情實言之則可廢而不可復也何者夫肉刑者盖刵劓㧻黥刖之類耳書所謂五虐之刑也昔苖人始淫為之而天既降咎及秦人又虐用之而天下亦離心夫如是則豈無濫死者耶漢文帝始除去之而刑罰以清我太宗亦因而棄之而人用不犯夫如是則豈有罔人者耶此臣所謂徵其實者也臣又聞聖人之用刑也輕重適時變用舍順人情不必乎反今之宜復古之制也况肉刑廢之乆矣人莫識焉今一朝卒然用之或絶筋或折骨或傷面集作面傷則見者必痛其心聞者必駭其耳又非聖人適時變順人情之意者徵之於實既如彼酌之於情又若集作如此可否之驗豈不明哉傳曰君子為政貴因循而重改作又曰利不百不變法臣以為復之有害而無利也其可變而改作乎刑禮道迭相為用問聖人之致理也以刑糾人惡故人知勸懼以禮道人情故人知耻格以道率人性故人反淳和三者之用不可廢也議者將偏舉而行耶將並建而用耶從其宜先後有次耶成其功優劣有殊耶然則相今日之所宜酌今日之所急将欲致理三者奚先對對臣聞人之性情者君之土田也其荒也則薙之以刑其闢也則蒔之以禮其植也則穫之以道故刑行而後禮立禮立而後道生始則失道而後禮中則失禮而後刑終則脩刑以復禮脩禮以復道故曰刑者禮之門禮者道之根知其門守其根則王化成矣然則王化之有三者猶天之有兩曜集作㬬嵗之有四時廢一不可也並用亦不可也在乎舉之有次措之有倫而已何者夫刑者可以禁人之惡不能防人之情禮者可以防人之情不能率人之性道者可以率人之性又不能禁人之惡循環表裏迭相為用故王者觀理亂之深淺順刑禮之後先當其懲惡抑淫致人於勸懼莫先於刑剗邪窒慾致人於耻格莫尚於禮反和復朴致人於敦厚莫大於道是以衰亂之代則弛禮而張刑而平定之時則省刑而𢎞禮清浄之日則殺禮而任道亦如祁寒之節則疎水而俯火徂暑之候則逺火而狎水順嵗候者適水火之用逹時變者得刑禮之宜適其用逹其宜則天下之理畢矣王者之化成矣將欲校集作較其長短原其始終順其變而先後殊備其用而優劣等離而言之則異致合而理之則同功其要者在乎舉有次措有倫適其用逹其宜而已方今華夷有截内外無虞人思休和俗已平康是則國家殺刑罰之日崇禮樂之時所以文易化成道易馴致者由得其時也今其時得矣伏惟陛下措而不失焉文苑英華卷四百九十八
