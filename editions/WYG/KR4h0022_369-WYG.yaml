body:
  text: 文苑英華巻三百六十九宋李昉等編諌刺雜説畫諌一首見三百六十二卷代河湟父老奏一首見三百六十二巻禦暴説一首木猫説一首文道元龜一首禦暴説陳黯或問為物之暴者出於狼虎也何暴攫摶於山藪之間耳權倖之暴必禍害於天下也狼虎焉得而類諸夫虎狼之暴炳其形猶可知也權倖之暴萌其心不可知也自口一作形者不過於噬人之腥咋人之膏血自心者則必亡人之家赤人之族為害其不甚乎然則權倖之暴不能抑亦有國者不能設備以禦之俾民罹其害曰虎狼吾知其能禦者弓矢也權倖如之何能禦也曰刑法曰彼秦漢其弛刑法耶何趙高王莾之肆暴而不能禦哉曰彼秦之高漢之莾得肆其暴者皆由刑法之不明也苟明暴何自矣噫田鄙者由能執弓矢以弭其暴耳有國者反不能施刑法而禦一作移其暴豈存國者重其民不若田鄙者重其生哉木猫説昔有兎類而小食五糓於田及糓熟農者穫而歸之兎類而小者亦隨而至遂潜於農氏之室善為盗每竊食能伺人出入時主人惡之遂題曰䑕乃選才可捕者而舉言其人曰莽蒼之野有獸其名曰狸有牙爪之用食生物善作怒才稱捕䑕遂俾徃須其乳時探其子以歸畜既長果善捕而遇之必怒而搏之為主人捕䑕既殺而食之而群䑕皆不敢出宂雖已食而捕人獲頼無䑕盗之患即是功於人何不敬其狸之名遂號之曰猫猫者末也莽蒼之野為本農之氏為末見馴於人是陋夲而榮末故曰猫猫乃生育於農氏之室及其子已不甚怒䑕盖得其母所殺䑕食而食之以為不殺而能食不見捕䑕之時故不知怒又其子則疑與䑕同食於主人意無害䑕之心心與䑕類反與䑕同為盗農遂歎曰猫本用汝怒為我制䑕之盗今不怒䑕已是誠失汝之職又反與䑕同室遂亡乃祖爪牙之為用而有䑕之為盗失吾望甚矣乃載以復諸野又探狸之新乳歸而養既長遂捕䑕如曩之者文道元龜并序天寳初適于平陽平陽太守稷山公則衡之從考舅雅好古道門尚詞客當今文人相與多矣嘗歎曰取士之道才其難乎或精文而薄於行或敦行而薄一作淺於文斯乃有失其道一至於此顧衡曰吾嘗謂一作語爾知言爾其言之衡私門以文塲而進五世鄙雖不詞忝藉餘訓一作休敢著元龜以叙其事元龜曰文道之興也其當中古乎其無所始乎且天道五行以别緯地道五色以别方人道五常以别徳易曰觀夫一作乎天文以察時變觀乎人文以化成天下非五緯孰可以知天非五方孰可以辯地非五常孰可以化人文之為道斯亦逺矣天人之際其可得於是乎夫卦始乎三畫文章之閫大抵不出乎三等斯乃從人而有焉工與不工各區分而有之君子之文為上等其徳全志士之文為中等其義全詞士之文為下等其思全其一無此字思也可以綱紀一作紀物義也可以動衆徳也可以經化化人之作其唯君子乎君子之作先乎行行為之質後乎言言為之文行不出乎言言不出乎行此廼一無此二字質文相半斯乃化成之道焉志士之作介然以立誠憤然有所述言必有所諷志必有所之詞寡而意懇氣高而調苦斯乃感激之道焉詞士之作學古以杼情屬詞以及物及物勝則詞麗杼情逸則氣高高者求靖一作清麗者求婉耻乎質貴乎清而忘其志或作至斯乃頽靡之道焉古人之貴有文者将以飾行表徳見情著一作署事杼軸乎天地一作人之際道逹乎性命之元正復乎君臣之位昭感乎鬼神之奥苟失其道無所措矣君子也文成而業著志士也文成而徳䘮然今人一無此字之作其多詞士乎代由尚乎文者以斯文而欲範一作軌物範衆輕一作安邦叙正一作政其難致乎化成悲夫敢著元龜庻觀文章之道得䘮之際悔吝之所由者也二字作焉一作皆文粹文苑英華巻三百六十九
