body:
  text: 文苑英華巻三百六宋李昉等編悲悼六墳墓五十五首經孫氏陵何遜見類聚在昔炎靈厭神器若無依逐争先㨗掎鹿競因機呼吸開霸道咤叱掩江畿豹變分竒畧虎視肅戎威長虵衂巴漢冀馬絶淮淝交戰無内禦重門豈外扉成功終已棄凶徳愎而違水龍忽東鶩青盖乃西歸碣來易永乆年代曖微微苔石疑文字荆墳失是非山鸎空曙響壠月自秋輝銀海終無浪金鳬㑹不飛閴閴今如此望望沾人衣悲行路孤墳前人行路一孤墳路成墳已毁空疑年嵗積不知陵谷徙幾經秋葉飛初學記作黄驟見春流瀰金蚕不可織玉樹何曽蕋陌上驅馳人笑歌自侈靡今日非明日所念誰憐此遊朝山悲古塚虞騫見初學記長林帯朝夕一作霧孤嶺枕江村踈松含白水密篠滿平原荒墳改凍葉低壟變年根西光長檟落促爾膝前樽經陳思王墓庾肩吾公子獨憂生丘壟擅餘名採樵枯樹盡犁田荒隧平寧追晏平樂詎想謁承明且余來錫命兼言事結成飄颻河朔逺䬃一作飈䫻風郊鳴鴈與雲俱陣沙将蓬共驚枯葉落古一作故社寒鴉歸一作思孤城壠水哀葭曲漁陽慘鼔聲離家未逺客安得不傷情行經古墓隂鏗見初學記偃松将古墓年代理當深表柱應堪燭碑書欲有金逈墳由路毁荒隧受田侵霏霏野露合昏昏隴日沉懸劒今何在風楊空自吟遇徐君墓周無名法師延陵上國返枉道訪徐公死生命忽異懽娱意不同始往邙山比聊踐平陵東徒觧千金劍終恨九泉空日盡荒郊外烟生松柏中何言愁寂寞日暮白楊風聘齊經孟嘗君墓陳昭薛城觀舊跡征馬屢徘徊盛徳今何在唯餘長夜臺蒼茫空隴路顦顇古松栽悲隨白楊起淚想雍門来泉户無闗吏鷄鳴誰為開春夕經行留侯墓盧思道少小期黄石晩年遊赤松應成羽人去何忽掩高封踈蕪枕絶野邐迤帯斜峯墳荒隧草没碑碎石苔濃徂秦懐猛氣師漢挺柔容盛烈芳千祀深泉閉九重夕風吟宰樹遲光落下舂見淮南子遂令懐古客揮淚獨無從過張平子墓駱賔王西鄂該通理南陽擅徳音玉巵浮藻麗銅渾積思深忽懐今日昔非復昔時今日落集作往豐碑暗風来古木吟唯歎窮泉下終欝羡魚心邙山沈佺期北邙山上列墳塋萬古千秋對洛城城中日夕歌鍾起山下唯聞松柏聲比干墓徐彦伯大位天下寳維賢國之鎮殷道微而在受辛纂頺􅉙山鳴鬼又哭地裂川亦震媟黷皆佞諛䖍劉盡英雋孤卿帝叔父特進貞而順玉牀逾皜潔銅柱方敲焮奉國歴三朝觀竅明一瞬季代猖狂主蓄怒提白刄之子彌忠讜憤然更勇進撫膺逝隕越知死故不恡已矣竟剖心哲婦亦同殉驪龍暴雙骨太岳推孤刄周發次商郊寃骸悲莫殣劍鋒􅀈遺孽報復一何迅駐罕歌淑靈命徙封旅櫬自爾銜幽酷于嗟流景駿邱墳被宿莽壇所縁飛燐貞觀戒卜征維皇念忠信荒墳護草木刻桷吹煨燼代逺思更崇身頺名益振帝詞書藥石國饌羅芳衅偉哉列士圗竒英千古狥題東山子李適碑隂并序前人噫嘻李公生自號東山子死𦵏東山豈其䜟哉神交者歌薤露以送子歸東山焉人三章章八句合一十五章鐫于碑隂云序云人三章合十五章則當有五人姓名今止存徐詩又止二章隴障縈紫氣一作氛金光赫氤氲美人含遥靄桃李芳一作方自薫圗高黄鶴羽寳奪驪龍羣忽驚薤上露曲掩一作曀東山雲回也實夭折賈生亦脆促今復衰若人危光迅風燭曙臺淪清鏡窮塵掩結緑何以贈下泉生芻唯一束過懐王墓張説喔吚集作吚嚘不可信以是集作似此敗懐王客死嶢闗路返𦵏岐江陽啼猿一作狖抱山月饑狐獵野霜一聞懐沙事千載盡悲凉和黄門盧監望秦始皇陵張九齡秦帝始求仙驪山何遽卜中年既無効兹地所宜復徒役如雷奔珍恠亦雲蓄黔首無寄命赭衣相馳逐人怨神亦怒身死宗遂覆土崩失天下龍闘入函谷國為項籍屠君同華元戮始掘既由楚終焚乃因牧上宰議一作義揚賢忠阿感桓速一聞過秦論載懐空杼軸郢城西北邉有大古塚數十觀其封域多是楚諸王而年代乆逺不復可識唯直西有樊妃塚因後人為植松柏故行路盡知之前人蘋藻生南澗蕙蘭秀中林嘉名有所在芳氣無幽深楚子初逞志樊妃嘗獻箴能令更擇士非直罷從禽舊國皆湮滅先王亦莫尋唯傳賢媛壠猶結後人心牢落山川意蕭條松柏隂跛牂集作破墻時直上荒徑或斜侵惠問終不絶風流獨至今千春思窈窕黄鳥復哀音過始皇墓時年二十集作十五王維古暮成蒼嶺幽宫象紫䑓星辰七曜隔河漢九泉開有海人寧渡無春鴈不廻更聞松韻切疑是大夫哀行次昭陵十二韻杜甫舊俗疲庸主羣雄問獨夫䜟歸龍鳯質威定虎狼都天属尊堯典神功恊禹謨風雲随逸集作絶足日月繼高衢文物多師古朝廷半老儒直詞寧戮辱賢路不﨑嶇往者災猶降蒼生喘未蘇指麾安率土盪滌撫洪鑪壮士悲陵邑幽人拜鼎湖玉衣晨自舉石集作鉄馬汗嘗驅松柏瞻虗集作靈殿塵沙暗集作立暝指途寂寥開國日流恨滿山隅適思顔胄芳嵗不我與颯然凉風生繁華掃地歇蟋蟀充堂鳴感物増憂思奮衣出遊行行值古墓林白骨下縱横田竪鞭髑髏村童掃一作摇精靈精靈無柰何像設安所榮一作營石人徒暝目表柱燒無聲試讀碑上文乃是昔時英位極君詔𦵏勲高盈忠貞寵終禁樵採立嗣脩墳塋運否前政缺羣盗多蚊虻即此邱壠壊鐵心為霑纓當其崇樹日豈意侵辱併𠖇漠生變故淒凉結幽明悲端豈自我外物紛相縈所適非所見前登江上城倚樓臨緑一作浸水一望觧傷情王龍驤墓賈彦璋昔擅登壇寵爰光典午朝刀懸臨益夣龍啟渡江謠茂績當年舉英魂此地銷唯餘孤壠上日夕起松飈昭君墓常建漢宫豈不死異域傷獨没萬里䭾黄金蛾眉為枯骨廻軍夜出塞立馬皆不發共恨丹青人墳上哭明月長沙桓王墓下别李紓張南史已見二百八十七巻劉長卿經漂母墓劉長卿見集本昔賢懐一飯兹事已千秋古墓樵人識前朝楚水流渚蘋行客薦山木杜鵑愁春草茫茫緑王孫舊此遊驪姬墓下作夷吾重耳墓隔河相去十三里岑參驪姬北原上閉骨已千秋澮水日東注惡名終不流獻公恣耽惑視子如仇讐此事成蔓草我来逢古邱蛾眉山月苦蟬鬢野雲愁欲弔二公子横汾無輕舟虹縣嚴孝子墓劉灣堂孝教因心一作不及天然得一作因天心所資禮聞三年喪爾一作汝獨終身期下由骨肉思上報母父慈禮聞哭有卒爾一作汝獨哀無時前有松柏林荆蓁一作棘結朦朧墓門白日閒一作閉泣血黄泉中草服被枯骨垢容戴飛蓬舉聲哭蒼天萬木皆悲風經徐侍郎墓作顧況不知山吏部墓作石橋東宅兆鄉闗異平生翰墨空夜泉無曉日枯樹足悲風更想幽𠖇事唯應有夣同路􅅖墓耿緯石馬雙雙當古樹不知何代公侯墓墓前菲菲春草深唯有行人㸔碑路周平西墓權徳輿英威今寂寞陳跡對崇邱壯志清風在荒墳白日愁窮泉那復曉喬木不知秋嵗嵗寒塘側無人水自流蘇小小墓前人萬古荒墳在悠然我獨尋寂寥紅粉盡㝠漠集作寞黄泉深蔓草映寒水空郊暖夕隂風流有佳句吟眺一傷心宫人斜絶句前人一路斜分古驛前隂風切切晦秋煙鉛華新舊共㝠寞日暮愁鵶一作鴟飛野田去嵗自刑部侍郎貶潮州刺史乗驛之官其後家亦譴逐小女道死瘞之層峯驛之山下今過其墓留題驛梁韓愈數條藤束木皮棺草殯荒山白骨寒驚恐入心身已病扶舁沿路衆知難繞墳不暇號三匝設祭惟聞飯一盤致汝無辜由我罪百年慚痛淚闌干弔友人李元賔墓孟郊曉上荒凉原吊彼寂寥集作㝠寞魂眼咽此時淚耳悽在日言𠖇𠖇集作寂寂千萬年墳鏁古集作孤松根題梁宣皇帝陵二首吕温即讎終自剪覆國豈為䧺假號孤城裏何如在甬東二祀夏功何薄尊周義不成悽凉庾信賦千載共傷情真娘墓其墓前乃邱寺也白居易真娘墓虎邱道不識真娘鏡中靣唯見真娘墓頭草霜摧桃李風折蓮真娘死時猶少年脂膚荑手不牢固世間尤物難留連難留連易銷歇塞北花江南雪過京索先生墳賈島京索先生三尺墳秋風漠漠吐寒雲從来有恨君多哭今日何人更哭君經李白翰林墓許渾氣逸何人識才高舉世疑禰生狂善賦陶令醉能詩碧水鱸魚興集作怨青山鵬鳥悲不堪遺集作至今孤塚在荆棘楚江湄經李白墓項斯夜郎歸未老醉死此江邉𦵏闕官家禮詩殘樂府篇逰䰟應到蜀小碣豈旌賢身没猶何罪遺墳野火燃過北海墓二十韻温庭筠撫事如神遇臨風獨涕零墓平春草緑碑折古苔青珪玉埋英氣山河孕炳靈發言驚辨囿揮翰動文星藴策期干世持權欲反經激揚思壮氣集作志流落歎頹齡惡木人皆息貪泉我獨醒輪轅無匠石刀几有庖丁碌碌迷蔵器規規守挈瓶憤容陵鼎鑊公議動朝廷故國将辭寵危邦竟緩刑上卿亷集作鈍工磨白璧凡石礪青萍揭月昭東夏摶風滯北溟後塵遵軌轍前席詠儀刑木秀當憂悴絃傷不底寧矜誇遭尺鷃光彩困飛螢草羽留談柄清風襲徳馨鸞凰嬰雪刃狼虎犯雲屏蕙蘭荒遺址榛蕪蔽舊坰羡君雖不禄猶得到明庭集作轘轅逺沂水何事戀明庭過陳琳墓前人曽於青史見遺文今日飄蓬過此集作古墳詞客有靈應識我覇才無主集作此始亦憐君石麟埋没蔵春草銅雀荒凉對暮雲莫恠臨風倍惆悵欲将弓劍學從軍過蔡中郎墓前人古墳零落野花春聞説中郎有後身今日愛才非昔日莫抛心力作詞人始皇陵下作曹鄴見詩選千金買魚燈泉下照狐兎行人上陵過却弔扶蘇墓纍纍壙中物多於養生具若使山可移應将秦國去舜殁雖在前今猶未封樹過比干墓聶夷中殷辛帝天下厭為天下尊乾綱既一斷賢愚無二門佞是福身本忠作喪已源餓虎不食子人無骨肉恩日影不入地下埋寃死魂腐骨集作肉不為土應作石木根余来過此鄉下馬弔此墳静念君臣間有道誰敢論一作有誰敢抗論真娘墓在虎邱西寺内張祜佛地𦵏羅衣孤魂此是歸舞為蝴蝶夢歌謝伯勞飛翠髪朝雲斷集作在青娥夜月微傷心一花落無復戀春暉題蘇小小墓前人漠漠窮塵地蕭蕭古樹林臉濃花自發眉恨柳長深夜月人何待春風鳥為吟不知誰共穴徒願結同心長江縣經賈島墓鄭谷水繞荒墳縣路斜耕人訝我乆咨嗟重来兼恐無尋處日落風吹鼓子花經徐稚墓陳陶郏鄏妖興炎漢衰先生南國卧明夷鳯凰屢降𤣥鍾禮瓊石終蔵烈火詩禁掖衣冠加宋􅍎湖山耕釣没堯時一作師千年壠樹何人哭寂寞蒼苔内史碑宫人斜陸龜蒙草樹愁烟似不春曉鸎夜怨問行人須知一種埋香骨猶勝昭君作虜塵燕昭王墓羅隐戰國蒼茫難重尋此中踪跡想知音强停别騎山花曉欲吊遺魂野草深浮世近来輕駿骨高䑓何處有黄金思量郭隗平生事不殉昭王是負心經未陽杜工部墓前人紫菊馨香覆楚醪奠君江畔雨蕭騷旅魂自是才相累閒骨何妨塚更高騄驥喪来輕蹇蹶芝蘭衰後逺集作長蓬蒿屈原宋玉憐居處幾駕青螭緩欝陶蘇小小墓前人魂兮檇李城猶未有人耕好月當年事殘花觸處情向誰曽艷冶随分得聲名應侍吴王宴蘭橈暗送迎始皇陵前人花堆無草樹無枝嬾向行人語集作問昔時六國英䧺漫多事到頭徐福是男兒王濬墓前人男兒未必盡英䧺但到時来即命集作命即通若使吴都猶旺氣将軍何處立殊功孟浩然墓前人數歩荒榛接舊蹊寒郊集作江漠漠雨凄凄集作草萋萋鹿門黄土無多少恰到書生塚便低古塚曹松代逺已難問纍纍次古城民田侵不盡客路踏還平作穴地分蟄依岡鹿遶行唯應風雨夜鬼火出林明長陵唐彦謙長陵高闕此安劉附𦵏纍纍盡列侯豐上舊居無故里沛中原廟對荒丘耳聞英主提三尺眼見愚民盜一抔千載䜿儒騎瘦馬渭濱斜日重廻頭文苑英華巻三百六
