body:
  text: 文苑英華巻三百六十四宋李昉等編辯論二設漁者對智伯瑶一首復吾子松說一首夀顔子辯一首私辯一首華心一首塞廢井文一首祀竈解一首春秋决疑十篇設漁者對智伯瑶集無此字柳宗元智氏既滅范中行志益大合韓魏圍趙水晉陽智伯瑶乗舟以臨趙且又徃來觀水之所自務速取焉群漁者有一人坐漁智伯恠而集作之問焉曰若漁幾何曰臣始漁于河中漁于海今主大兹水臣是以來曰若之漁何如曰臣㓜而好漁始臣之漁于河有魦鱮鱣鰋者不能自食以好臣之餌日收者百焉臣以為小去而之龍門之下伺大鮪焉夫鮪之來也從魴鯉數萬垂涎流沫後者得食焉然其饑也亦返吞其後愈肆其力逆流而上慕為螭龍及夫抵大石亂飛濤折鰭秃翼顛倒頓踣順流而下宛委冒懵環坻溆而不能出嚮之從魚之大者幸而啄食之臣亦徒手得焉猶以為小聞古之漁有任公子者其得益大于是去而之海上北浮于碣石求大鯨焉臣之具未及施見大鯨驅群鮫逐肥魚于渤海之尾震動大海􅉫掉巨島一啜而食若舟者數十勇而未已貪而不能止北蹙于碣石槁焉嚮之為食者反相與食之臣亦徒手得之集作焉猶以為小聞古之漁有太公者其得益大釣而得文王于是捨而來智伯曰今若遇我也如何漁者曰嚮者臣已言其端矣始晉之侈家若欒氏祁氏郤氏羊舌氏以十數不能自保以貪晉國之利而不見其害主之家與五卿嘗裂而食之矣是無異魦鱮鱣鰋也腦流骨腐于主之故鼎可以懲矣然而猶不肯寤又有大者焉若范氏中行氏貪人之土田侵人之勢力慕為諸侯而不見其害主與三卿又裂而食之矣脱其鱗鱠其肉刳其腸㫁其首而棄之鯤鮞遺育莫不備爼豆是無異夫大鮪也可以懲矣然而猶不肯寤又有大者焉吞范中行以益其肥猶以為不足力愈大而求魚愈無饜驅韓魏以為羣鮫以逐趙之肥魚而不見其害貪肥之勢将不止于趙臣見韓魏懼其将及也亦幸主之蹙于晉陽其目動矣而主乃慠然以為咸在机爼之上方磨其舌抑臣有恐焉今輔果舎族而退不肯同禍叚規怨深集作深怨而造謀主之不寤臣恐主為大鯨首解于邯郸鬛摧于安邑胷披于上黨尾斷于中山之外而腸流于大陸為鱻藁以充三家子孫之腹臣所以大懼不然主之勇力強大于文王何有智伯不悦然終以不寤于是韓魏與趙合滅智氏其地三分復吾子松說子之疑木膚有恠文與人之賢不肖夀夭貴賤果氣之寓歟為物者裁而為之歟余固以為寓也子不見夫雲之始作乎勃怒衝涌擊石薄木而肆乎空中偃然為人拳然為禽敷舒為林麓嵑􅠣為宮室誰其傳文粹作摶而斵之者風出洞窟流離百物經清觸濁呼召竅宂與夫草木之儷偶紛羅雕葩剡芒臭朽馨香采色之赤碧白黄皆寓也無裁而為者又何獨疑兹膚之竒詭與人之賢不肖夀夭貴賤参差不齊者哉是固無情不足窮也然有可恨者人或權褒貶黜陟為天子求士者皆學于聖人之道皆又以仁義為的皆曰我知人我知人披辭窺貎逐其聲而覈其所蹈者以升而降其所升恒多䝉瞀禍賊僻邪罔人以自利者其所降率恒多清明沖淳不為害者彼非無情物也非不欲得其升降也然猶反戾若此逾千百年乃一二人幸不出于此者徴之猶無以為告今子不是病而木膚之問為物者有無之疑子胡横訊過詰擾擾焉如此哉夀顔子辯皇甫湜土與水火風雜為千品萬殊大凢太虗之中形而有者皆主于土揮而動者皆主于風液而通者皆主于水躍而養者皆主于火天地之與稊米醯雞之與集作于應龍雖殊大小必質四者具四者之性然後為一物動焉不動焉抑四者能為質不能為知者也集作動焉四不動焉四者能質不能知有虚而靈者合焉以為物知凡四者之合而有也而一無此字合乎是為知若角若鱗若飛若走舉為其属不合乎是為無知若草若木若金若石舉為其属最靈者人人之中知為心心之知為神人之生也質乎土風水火而心乎知集作主其于死也氣旋乎集作于虚而反于土風水火之性各旋其所質固化而無矣若心之知則未知其處焉而人見其質之化也謂知亦從而亡豈不過集作愚甚矣哉彼繇心所以知者虚而靈其不可為無也較然矣三字集作如其質也游冥而化遷者乎集作也夫心猶水也水清則撓而不濁濁則不清集作撓而濁者不存存則不清心猶鏡也鏡明則塵埃不止止則不明聖與愚受于一作乎初一也聖人瑩其心而濶于集作窒其誘是以能照天下之理故其心清而定愚者負其心而薄于外是以閉天下之理故其心塵而結清而定者離其質也玲瓏乎集作兮太虚之中動而合則為文王仲尼止而安則必終始集作始終天地塵而結者離其質也狂攘乎集作兮太虚之中轉而合乎集作于有則為禽為獸其于人也為愚為凡于草木者無所不為矣雖欲少安得乎集作安得于理推是而言則彭祖為夭而顔子為夀盗跖為殺而比干為終私辯牛僧孺近古之人所謂私者為文粹作謂茍萃一作牟于利茍處于逸茍潤其屋者也僧孺以為斯皆小人之私非聖人之私也夫聖賢無私而不自知其私也何者必公其身而私一作以利于人是不私一身而使天下私之一作之私也胡以言之夫嬰兒見保傅之母則咤然而識非有知而親之利其乳而私之也櫪馬見厮養之夫則奮然而嘶非有知而親之利其芻粟而私之也夫天下之人非復乳孩櫪馬之愚也茍有公其身而利之者孰不利而私之乎故賢君良相必私天下而公其身故天下之人皆私而親之暗君愚臣必公天下而私其身故天下之人皆公而踈之人踈之者多故天下任其亡也親之者多故天下欲其昌也二十四字文粹作踈之者多天下欲其昌也難矣恐非昔大禹之手足胼胝是公其身于理水也咎繇之謩明弼諧是公其身于規諫也傅說之對揚王庭是公其身于輔佐也周公之吐握勤儉文粹作拳是公其身于禮賢也宣父之作春秋刪詩書是公其身于垂教也故有夏之人思大禹之功有虞之人思臯陶之直有殷之人思傅説之政有周之人思周公之勤有道之人思宣父之教或開國之尊其嗣一作祠又作道而私之或建祠崇文粹作飾其像而私之至于殷辛之聚財鹿臺是以一作私天下之利私于已也故天下公而踈之秦始皇之廢棄諸侯是以天下之爵私于身也故天下亦公而踈之故武王公天下之財而散之而天下之兆庶皆私而親之高皇帝公天下之爵而封之而天下之英雄亦皆私而親之是以自私者人公而亡也自公者人私而昌也夫聖賢非必公其身私在其中不得不公也天下非必私于一人公在其中不得不私也余謂亡國之君亡家之臣亡身之人俱不得私之道也非聖賢之無私也華心陳黯大中初年大梁連帥范陽公得大食國人李彦昇薦于闕下天子詔春司考其才二年以進士第名顯然常所賔貢者不得擬或曰梁大都也帥碩賢也受命于華君仰禄于華民其薦人也則求于夷豈華不足稱也耶夷入獨可用也耶吾終有惑于帥也曰帥真薦才而不私其人也茍以地言之則有華夷也以教言之有華夷乎夫華夷者辯在乎心辯一作夫心在察其趣嚮有生于中州而行戾乎禮義是形華而心夷也生于夷一作外域而行合乎禮義是形夷而心華也若盧綰少卿之叛亡其夷人乎金日磾之忠赤其華人乎由是觀之皆任其趨嚮耳今彦昇也來從海外能以道祈知于帥帥故異而薦之以激夫戎狄俾日月所燭皆歸于文明之化蓋華其心而不以其地也而又夷焉作華心塞廢井文杜牧井廢輒不塞于古無所據一作稱今之州府㕔事一作署有井廢不塞居第在堂上有井廢亦不塞或匣而䕶之或横木以土二字文粹作上覆之至有歳久木朽䧟人以至于死世俗終不塞之不知出何典故而井不可塞井雖列在五祀在都邑中物之小者也若盤庚五遷其都若社稷宗廟尚毁其舊而獨井豈不塞耶古者井田九頃八家環而居之一夫食一頃中一頃樹蔬鑿井而八家共汲之所以藉齊民而重泄地氣以小喻大人身有瘡不醫即死木有瘡久不封即亦死地有千萬瘡于地何如哉古者八家共一井今家有一井或至大家至于四五井十倍多于古地氣漏泄則所産脆薄人生于地内今之人不若古之人渾剛堅一寜不由地氣泄漏哉易曰改邑不改井此取象言安也非井不可塞也天下每州春秋二時天子許抽常所上賦錫宴其刺史及州吏必廓其地為大宇以張其事黄州當是地有古井不塞故為文投之而實以土祀竈解陸龜䝉竈壊煬者請新之既成又請擇吉日以祀告之曰竈在祀典聞之舊矣祭法曰王為群姓立七祀其一曰竈逹于庶人庶士立一祀或立户或立竈飲食之事先自火化以來生民頼之祀之可也説者曰其神居人間伺察小過作譴告者又曰竈鬼以時録人功過上白于天當祀之以祈福祥此近集作僅出漢武帝時方士之言耳行之惑耶集作也茍行君子之道以謹集無以謹二字養老以集作而慈撫集作撫字幼寒同而飽均䘮有哀祭有敬不忘禮以約已不忘樂以和心室闇不欺屋漏不媿雖歳不一祀竈其誣我乎茍為小人之道盡反君子之行父子兄弟夫婦人執一㸑以自餬口専利以飾詐崇姦而樹非雖一歳百祀竈其私我乎天至高竈至下帝至尊嚴鬼至幽仄果能欺而告之是不忠也聴而受之是不明也下不忠上不明又果可以為天帝乎春秋决疑十篇皮日休夫趙盾弑君莒僕弑父春秋顯書其過何則楚公子圍弑其君郟敖子駟弑其君僖公齊人弑其君悼公各以疾赴春秋皆書曰卒評曰人之生也上有天地下集作次有君父君父可弑是無天地也乃生人之大惡有識之宏耻亦由漢書二律無妻母之文聖人所不書是也且趙盾反不討賊董狐謂為弑君莒僕以其寳來奔里革謂其一作之弑父斯二者罪名已彰仲尼承彰而書耳斯三逆者説云子圍鄭人子駟齊人也弑君以疾赴仲尼非可誣也據赴而書者不忍也故不忍也者耻在其中焉懲在其中焉夫春秋弑君三十六其餘之逆亦據赴而書耳夫趙孟以無辭伐國把伯以夷禮來朝春秋皆貶之曰人曰子何至其罪大者為之隱謂弑君者其過小者必以書曰伐國無辭専君之命也君而可專孰有其國得不貶之乎若集有夫字罪大者為之隱推亡也其罪小者必以書固存也夫齊茶野幕之弑事起陽生楚靈乾谿之縊禍因常夀而春秋歸罪于陳乞公子比者齊之陳乞楚之公子比不其逺乎曰野幕之弑罪歸陳乞陽生之罪可知矣乾谿之縊罪歸子比常夀之罪可知矣春秋之㫖譬酷吏决獄髠鉗之刑尚猶不捨刀鋸之僇何自而逃夫齊桓救衛不書狄滅晉文召王而云狩于河陽曰狄實滅衛因桓救而獲全斯不滅矣文實召王因王來而稱狩斯不召矣茍桓不能救衛文不能匡王必書狄滅衛晉人召天王于河陽矣故春秋之時滅人國者衆救人國者鮮仲尼旌其䘏患也背文粹作侮周者衆朝周者鮮仲尼旌于一作其勤王也夫哀八年及十三年公再與吳盟皆不書八年註云不書盟耻吴夷十三年註云盟不書諸侯耻之故不錄也桓二年公及戎盟于唐則書曰吴實華族其道夷也以强要盟不曰夷乎戎實夷族其道華也以道好盟不曰華乎故耻而不書懲也以戎而書勸也夫桓二年書曰宋華督弑其君與夷及其大夫孔父僖十年又書曰里克弑其君卓及其大夫荀息夫君者稱弑也而云及者是君臣無别也曰弑之者罪臣下也夫孔父以奪室見殺荀息以立君被誅是無辜之怨一作死是以及一作反褒之者一作也何自臣及君也一作君及臣者蓋貶華父與里克也俾孔父之死如與夷之死荀息之死如卓子之死及之者貴之也夫姜氏滛奔子般夭酷魯之醜也諱之可也至如公送晉塟為齊所止為邾所敗皆諱之者何曰周之有塟魯送可也如晋以盟主而臣魯諱之者諱乎以諸侯而事諸侯也諸侯有過則削地有逆則夷宗齊魯一體諱之者諱乎以諸侯而止于諸侯也夫天下有道小國事大國邾小國也而魯大國也諱之者諱乎以大國而敗于小國也夫定一有公字六年鄭滅許以許男歸而哀元年又書許男與楚圍蔡曰鄭實滅許而後或復之當復之時其赴不至于魯故不書耳凡國有來赴者雖小必書宋之六鷁退飛是也國無來赴雖大亦闕晉之滅狄滅霍滅魏是也夫楚實滅陳後復封之狄實滅衛後復全之斯亦許之類是也夫春秋之㫖獲君曰止誅臣曰刺殺其大夫執我行人鄭棄其師隕石宋五其事出竹書紀年鄭棄其師出璅語也若斯者即古史之全文也奚在其筆削乎曰仲尼因魯史而脩春秋足明不誣于人也又曰知我者亦以春秋罪我者亦以春秋其是之謂乎若揚子之草𤣥其數則易其文則𤣥是也夫宋襄執滕子而誣之以得罪春秋則承赴而書何至魯之君也弑者五逐者二弑者隱閔般赤惡逐者昭襄也竝闕而不書茍如是懲惡勸善何以為的亂臣賊子何以知懼曰夫仲尼修春秋而依㣲其㫖固有俟爾茍無丘明發决其奥廓通其𤣥亦赴來而責實也非可誣也如自書其魯之弑逐者則魯人攘羊仲尼證之矣集作也文苑英華巻三百六十四
