body:
  text: 文苑英華卷九百四宋李昉等編軄官十二諸將軍一周大將軍崔説神道碑一首周大將軍司馬裔碑一首周大將軍崔説周書作神道碑庾信公諱說字某博陵郡安平縣人也昔者華陽之野䧏龍首之神烈山之都啓龜文之繇匡周則盟津有㑹佐夏則龍門始鑿西逰則起家秦相東入則載世齊卿備乎史籍可得言矣祖辨中軍將軍魏書北史並作安南將軍定州刺史父楷鎮北將軍司馬魏書周書北史並作驃騎將軍開府儀同三司烈侯並厲風霜俱張鋒頴邸史疊迹官曹凜然是謂鮑恢都官百城振懼葛豐握節京師歛手公特稟英靈偏鍾山岳雄姿俊茂眉目踈朗觀虎於檻齠髮不驚稱象於船勝衣能對至於拉虎覊一作押熊摧班碎掌忘歸繁弱落鴈吟猨故得氣盖關中威申河外解褐領軍府録事轉諮議叅軍時當塗失御政在權門始論函谷之兵即起韓陵之戰太師賀㧞勝作牧西荆公為假節冠軍將軍防城都督夫疑作及南陽失守卷甲奔梁樂毅覊旅猶思燕路陳軫愴悽終戀秦聲幸值和隣言歸舊國授衞將軍都督封安昌縣開國子食邑三百户𢎞農尅復沙苑揮鋒進爵為侯増邑并前一千一百户信珪則更受司勲糓壁則還輸典瑞鐵馬有河橋之戰戈船有汾水之兵除京兆太守移民下邑未學邉韶走馬章臺不同張敞遷帥都督持節撫軍通直散騎常侍大都闕使持節車騎大將軍儀同三司都官尚書定州大中正五曹奏事有朱穆之忠九品論人見楊喬之直改卦安國縣侯益邑合前一千四百户賜姓宇文改名為説漢王改婁敬之族事重論都魏后變程昱之名恩深捧日遷車周書北史作驃騎大將軍開府儀同三司加侍中竇憲連官單于之寳鼎可致張寛固位渭橋之流星可識司木七工既掌邱陵之賦司㑹六典乃均邦政之才居官得人於斯為盛進爵為公改卦萬年縣通前二千四百户除隴州刺史都督隴州諸軍事隴坻路遥秦川望逺鄧仲華之不去馬文淵之願歸尋除凉州刺史總督河西丼𤓰諸軍事地似伏龍城如飛鳥燉煌實録宛在胷襟玉門亭障無勞圖畫有馬如羊不以入厩有金如粟不以入懐柱國齊王今上之介弟龔行薄伐問罪河陽以公為行軍長史叅謀帷幄中軍之司既舉魏絳上卿之佐實用荀林以公方之差無慙徳周書有軍還二字除使持節大將軍大都督崇徳安義建忠九曲安樂三泉伏流周張平泉固安蠻通俗凡十三防禦熊和中周書如此按隋地理志陸渾日和州新安置中恨今北史志後周時宜陽曰熊作能和中未詳英華作天和中非三州黄蘆起谷王晏供超牽羊温狐交河大嶺避雨木柵寺一十戍諸軍崇徳防主宜陽上地更有秦兵熊耳山前還逢積伏用是連營凾谷獵騎黎陽威振兩河名陵三晉改封安平縣公淮隂一國韓信之故人户牖萬家陳平之鄉里公此衣錦足為連類建徳四年正月十日薨於長安之永貴里私第春秋六十有四詔贈敷周書作鄜下同延丹綏􅁪周書作長五州諸軍事敷州刺史謚曰莊公禮也即以其年二月二十四日葬于京兆平原郷之吉遷里北陵追逺大司馬有賜綬之恩西京贈行冠軍侯有詔葬之禮嗚呼哀哉世子儀同衍生事以禮死葬以禮愛親有王祥之孝同氣有姜肱之睦百行之本於斯備焉况復松檟深沉既封青石之墓丘陵標榜湏勒黄金之碑乃為銘曰華陽之神厲山之祖鳯野匡周龍門佐禹日浴溟池山浮海浦甫穆覇國營丘樂土𦙍斯宗邑承此壤王移封東武就君安陽中軍節目鎮北鋒芒商飈獵草電火驅霜公之輪煥繼體貞幹儀表邱墟風神墻岸孝有至徳忠能臣賛不廢横琴無妨歌案既班三事又貳六官衞青受詔韓信登壇長城馬窟廣武兵欄軍吏無犯營民不寒乃用六謀乃論三䇿城壘向背星辰主客劔起沉犀弓開伏石楚后讓盟秦君還璧百齡危脆千仭摧藏諸侯地裂邊將星亡輕車騎士𤣥甲黄腸杜如齊地廟似桐郷銘功賛徳碑闕相望周大將軍司馬裔碑前人公諱裔字遵𦙍河内温人也昔顓頊之命始則南正司天重黎之後又以羲和掌厯夏陽適晉得隨㑹而同奔東海避秦與毛公而俱隱其後金行受命王筍南遷帝系極於闕圖中朝至于江表曽祖楚之晉太傅録尚書揚州牧㑹稽文孝王之次子元顯之㓜弟也元顯見害之後桓𤣥簒逆之初爰自齠齓客身屠釣河内道左抱劔長號代郡城前慟悲靈祭江淮志節之士汝頴風塵之客感激一言咸多依附既而雲生伏龜星出鯨魚太白經天蚩尤映野公乃收合餘燼泣血登陴臨武牢之闗據成臯之坂擁衆萬家歸于魏室魏眀元皇帝遥授平南大將軍荆州刺史襲封瑯琊郡王尚河内公主命王承制從賔國之儀于時宋兵慿凌旗皷侵逼虎牢不封金墉無援魏太武皇帝授王使持節侍中安南大將軍開府儀同三司給前後部皷吹元戎啓行志雪寃恥登壇慷慨三軍掩泣黄河漕粟已出石門士馬連旗將臨野坂既而雲中柝起代郡烽燃反斾南轅途窮北略贈征西大將軍都督梁益秦寧荆兖青豫郢洛十州諸軍事揚州牧司徒謚貞王祖金龍封瑯琊鎮西大將軍儀同三司吏部尚書贈司空謚康王父恱鎮南將軍豫州刺史漁陽莊侯周書北史並作子以荆河刺舉時值亂離釁起蕭墻遂終非命公遺腹載誕流離冦逆複璧襁負深山擁樹程嬰之匿趙武從役家臣王成之藏李爕為傭酒市遭太夫人憂苫草墳塋以終灰燧形骸毁􅇤逾於䘮禮年十有五始幹家事楹前鑿柱即取遺書石上開松仍求故劔出身司徒府叅軍除中堅將軍員外散騎常侍值魏室多難所在蜂起孟津以北無復封畿嵩山已南即為鋒鏑公建議脩武立柵温城凾谷西封河橋北斷長亭籍馬並入武城百里祖車咸輸温縣太祖文帝締構關都經綸夷阻招携以禮懐逺以徳馬文淵之擇主去壠坻而歸身竇周公之入朝在河西而奉詔大統七年蒙授平東將軍北徐州刺史十年河内故義四千餘家願立忠誠湏公衣錦乃授使持節領河内太守加前將軍懐州拓境兩鎮奔波柳泉轉戰三城授首十三周書北史並作五年太祖召山東諸立義之將能率衆入關者有加重賞公率先而至領户千室即以為封固辭不受其菽粟之賜或以指囷馬牛之賞將同量谷朝廷以華陽西極漢水東流歎孟逹之奔兵恠劉封之失䇿魏前元年移鎮漢中除白馬城主領華陽郡守者昔稱導漾今聞上瀦烟沉􅖅井雨歇雲門其年授大都督加散騎常侍柱國蜀國公開金牛之道通牧馬之關公卷甲北塞懸軍束馬遂得䇿預葭萌勲叅綿竹封龍門縣開國子蒲州刺史仍領新州尋授使持節車騎大將軍儀同三司大中正隆周授圖天保大定以公才望仍為舊臣遂乃義深追逺恩隆繼絶即改封瑯琊縣公邑五百户仍遷驃騎大將軍開府儀同三司都督巴州諸軍事巴州刺史武成二年被勅赴援信州魚復道阻屢却岑彭荆門水急㡬沉吳漢公乃月峽先登瞿唐直上天子以公操履忠勤儀刑亮直乃徴為大御伯尋轉大御正邑一千一百户樞機近侍出納絲言所謂多識舊章殿中無雙者矣四年大將軍東討公所領義衆先守枳關授都督懐州諸軍事懐州刺史偃師張幕河陽牧馬雖接戰於富平已連營於官渡五年詔追還拜始州刺史更封信州賊山彰尋寳渝恃憸岐路五尺絙約纔通縣水三門橋飛濟渡既而風行草偃谷静山空前後平十一城獲九千餘口馬歸平樂金輸水衡天保二年除信州刺史都督信州諸軍事朝發白帝暮宿江陵氣振巴邱之兵威警建平之戍五年遷潼州刺史益州柱國公􅑙帝子之重鎮天井之星延閣擬於叢臺岷山方於代郡公仰稟雄謨叅謀逺略故得身預舞陽之功位極長平之寵六年授使持節大將軍大都督西寧州諸軍事西寧州刺史方欲關沬若徼䍧牱見夜郎之候習昆彌之戰而飛鳶墮水馬援去而無歸金馬騁光王褒行而不反嗚呼哀哉七年正月十日薨春秋六十有五詔贈使持節大將軍懐邠汾晉四州諸軍事懐州刺史夫人襄城公主魏獻帝之曽孫趙穆王季女王姫肅㳟榆翟禮典四敎競一作兢莊三星令淑有光隆慮之賢足表平陽之盛生則從夫以秩死則同穴以禮建徳元年八月十二日合葬於武公三時原大夫墓樹以栢諸侯墓髙於雉于嗟滕公來居此里詔謚定公禮也公資忠履孝藴義懐仁直幹千尋澄波萬頃逢蒙射法力牧兵書星辰髙下之占風雨逢迎之氣故得師出以律天幸將軍者也至如官曹案牘未常煩壅戎馬交馳不妨餘裕足使四岳彌峻三台更眀在朝四十一年身經一百餘戰凡任四郡歴八州未甞以貨殖經懐去如始至渭南千畆之竹更懼盈滿池陽二頃之田常思止足身殁之日家無餘財素車白馬狹室﨑嶇黄腸𤣥甲堦庭仄陋有詔冬官為營􅃦室朱邑祭酹無所漢后是以賜金陳表妻子露立吳王為之開舘嗚呼哀哉世子侃孝家忠國揚忠顯親是以勒此豐碑懼從陵谷殖之松栢不忍淍枯銘曰欽若厯象平秩寅賔少梁奔華地入咸秦族夷興馬書窮獲麟玉鏡云始金行乃構象浦通關龍沙開候上糝石起河陽水鬬五馬南浮三星東宿大傅作牧奄有江沲司徒避亂承制荆河南勞推轂猶思枕戈龍媒被野蒼哭凌波莊侯季年禍機相接誕公遺嗣﨑嶇懐挾山竄趙武家藏李爕伍員道阻燕丹路遥南奔楚塞北避秦橋水流登壠寒風度遼有功都䕶則重嫖姚懐書上馬習禮從戎陣圖六甲兵占八風藏松寳劔射柳琱弓推誠賈復屈節㢘公八翼頻飛六循疑作條亟秉勇此仁義行兹寛猛持印山開沉黎盗静取甲無邱均田不井懋功賜爵上將賞官軍中受詔塞外登壇方屠叅合更鏖臯蘭渝川毒水􅈎道灾氛地亡都尉灘悲使君谷寒無日山空足雲北風吹旐秋霖泣軍遣奠雙設銘旌兩布泌水同墳平陽合墓悲哀嗣子攀號靡訴慟甚風枝悲深霜露自此何世從斯幾年麒麟欲鬬華表中燃地形樓起松心盖圓茫茫邱壠代代英賢文苑英華卷九百四
