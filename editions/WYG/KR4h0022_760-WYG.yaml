body:
  text: 文苑英華巻七百六十一宋李昉等編封禪封禪議一首封禪射牲議一首郊祀皇后不合祭南效議一首駮祝欽明請南郊皇后充亞獻議一首南郊先燔後祭議一首廟樂定宗廟樂議二首論立對破陣慶善二舞議一首魯議一首封禪封禪議顔師古貞觀十一年将封先祭義在告神且備欵謁舊唐書作謁敬之儀方展慶成之禮固當為唐書作於壇下距唐書作趾預㑹要通典作先申齋潔賛饗已畢然後登封旣表重慎之深兼示行事有漸今請祭於山下封於山上四出開壇道塲通議南面入升於事為允今請山上圜壇廣五丈髙九尺用五色土為唐書作加之四面各設一陛唐書作階御位在壇南升自南陛唐書作階而㑹要作宜就行事二字唐書作上封玉牒舊藏玉牒止用石函亦猶書盛篋笥所以或呼為石篋然其形大質重轉徙非易岱宗儻無此石皆應取自他山所以不為混成累輯而作大要在於周固稽其縝㑹要作緝宻而近代儀注更名石䃭䃭非稽古之文㑹要作稱本無義訓可尋贏㑹要作盈縮之間貴在折中㑹要作衷不煩紛議更増疑惑今請方石三枚以為冊累其十枚石檢刻方石四邊而立之纒以金繩用備檢約凡言封者皆是積土之名利建分封亦以班社立號謂之封禪厥義可知今若置牒壇上止因累石不加繕築即以為封匪唯嚴秘之道有如簡率亦乃名實不副理恐乖爽今請於圜壇之上安置方石封印唐書通典作璽緘旣訖㑹要作畢加五色土築以為封髙一丈二尺而廣二丈金玉重寳質性堅貞宗祀嚴禋皆充噐幣豈嫌華靡寔貴精確况乎三神壯觀萬代鴻名禮極殷崇事資藻縟玉牒玉檢式韞靈琦㑹要作事韜靈琦傳之無窮永存㑹要作在不朽至于廣袤之數足以載文辭緘束之方務在申膠固今宜立制隨時損益豐功厚德旣以跨躡前蹤盛典宏規無勞一遵曩式今請玉牒長一尺三寸廣厚各五寸玉檢厚二寸唐書有長短濶一如玉牒七字其印齒踈宻隨印大小距石之設意取牢固本資實用豈云巧唐書作雕飾今旣積土厚封更無差動天長地久寧假支持斜設横安請並弗㑹要作不置勒石紀號垂裕後昆美盛德之形容闡后王之休烈其義逺通典作大矣其事尚焉我皇聲暢九垓威横八極靈祗不愛其寳兆庶無得而稽但當賛述希夷以攄臣下之至具㑹要作其祭壇之例㑹要作制登封之所肆覲萬國受記㑹要作職百神固宜刻頌顯㑹要作播通典作明揚功業至如小距環壇㑹要作圜石闕别樹唐書作廻建事非經據無益禮儀煩而非要請從減省神靈璽寳而弗用由來無所施行其六璽雖以封書莫不披于羣下受命之璽登封則用昭事上𤣥表兹介福休徴緯兆豈因常貫又封檢之璽分寸不同即事而言請並更造旣順肅䖍之理永垂創制之名禪壇制度請從新禮行事儀式亦並依之自外委細不載於文者職在所司隨事量定議曰謹率愚管其録如前庸疑之言不足觀採但封禪大禮舊典不存秦漢以來頗有遺跡闕而不備難可甄詳昔在元封倪寛專賛其决逮乎光㑹要作建武梁松獨尸其事縉紳雜議不知所裁至如流俗傳聞記注臆說未嘗從事徒有空言乖殊不一曷足云也且夫沿革不同著之前誥自君作古聞諸徃册方今台鉉佐時逺超風后秩宗典職追邁伯夷究六經之妙㫖畢天下之能事納于聖徳禀自宸𠂻果斷而行文質斯允詔㫖集公卿及儒生學士議登封事謹依訪聞具件如右但封禪大禮舊典不存秦漢以來頗有遺跡闕而不備難可甄詳昔在元封時主博採羣論建武有司亦禀成規至如記注近書委巷浮說不足憑據無所取材且夫沿革不同著於徃冊自君作古寔惟令範聖朝丕業方貽萬載臣下庸蔽不取專决請垂鍳察克斷宸衷謹録奏聞伏聽裁擇謹議封禪射牲議高宗裴守貞永淳元年議曰據周禮及國語郊祀天地天子自射其牲漢武唯封太山令侍中儒者射牛行事至於餘祀亦無射牲之文但親舂射牲雖是古禮久從廢省難以施行據封禪禮祀日未明十五刻宰人以鸞刀割牲質明而行事比鑾駕至時牢牲揔畢天皇通典作陛下唯奠玉獻酌而已今若祀前一日射牲事即傷早祀日方始射牲事又傷晩若依漢武故事即非親射之儀事不可行請從減罷謹議郊祀皇后不合祭南郊議中宗禇无量景龍三年議曰夫郊祀者明王之盛事國家之大禮行其禮者不可以臆斷不可以情求皆上順天心下符人事欽若稽古率由舊章然後可以交神明可以膺福祐然禮文雖衆莫如周禮周禮者周公致太平之書先聖極由衷之典法天地而行教化辨方位而叙人倫其義可以幽賛神明其文可以經緯邦國備物致用其可忽乎至如冬至圓丘祭中最大皇后内主禮甚尊崇一作禮位甚尊若合郊天助祭則當具著禮典今遍檢禮經一作周官無此儀制盖由祭天南郊不以地配惟将始祖為主不以祖妣配天故惟皇帝親行其禮皇后不合預唐䇿作助㑹要作同也謹按大宗伯職云若王不與祭祀則攝位注云王有故代其行祭事下文云凡大祭祀王后不與則攝而薦豆籩徹若皇后合助祭承此下文即當云若不祭祀則攝而薦豆籩今於文上更起凡明一作則是别生餘事夫事與上異則别起凡凡者生上起下之名不專繫於本職周禮一部之内此例極多備在文中不可具録又王后助祭親薦豆籩而不親徹案九嬪職云凡祭祀賛后薦徹豆籩注云后進之而不徹則知中徹者為宗伯生文若宗伯攝祭則宗伯親徹不别使人又案外宗掌宗廟之祭祀王后不與則賛宗伯此之一文與上文相證何以明之按外宗惟掌宗廟祭祀不掌郊天足明此文是宗廟祭也又按王后行事揔在内英華作外非宰職中檢其職文唯云大祭祀后祼獻則賛瑶爵亦如之鄭注云謂祭宗廟也注所以知者以文云祼獻祭天無祼所以一作以此得知又祭天之噐則用陶匏亦無瑶爵注以此得知是宗廟也又内司服掌王后六服無祭天之服而巾車職掌王后之五輅亦無后祭天之輅祭天七獻無后亞獻以此諸文叅之故知后不合助祭天也唯漢書郊祀志則有天地合祭王后預唐䇿作助㑹要作同享之事此則西漢末代强臣擅朝㑹要作權悖亂彛倫黷神謟祭不經之典事渉誣神故易傳曰誣神者殃及三代太誓曰王稽古立功立事可以永年承天凝丕天之大績斯史䇿之良誡豈可不知今南郊禮儀事不稽古臣忝守經術不敢黙然㑹要作緘黙請旁詢碩儒俯循一作摭舊典遵一作採曲臺之故事行圓丘之正儀使聖朝叶昭曠之塗天下知文物之盛豈不幸甚唐䇿作美歟謹議一作皆舊唐書本傳駮祝欽明請南郊皇后充亞獻議蔣欽緒議曰周禮凡言祭祀享三者皆祭之互名本無定議何以明之按周禮典瑞職云兩珪有邸以祀地則祭地亦稱祀也又司几筵云設祀先王之昨讀作胙席明一作則祭宗廟亦稱祀也又内宗職云掌宗廟之祭祀此又非獨天稱祀地稱祭也又按禮記云惟聖人為能享帝此即祀天帝亦言享也又按孝經云春秋祭祀以時思之此即宗廟亦言祭祀也經典此文不可備數㨿此則欽明所執天曰祀地曰祭廟曰享未得為定明矣乂周禮凡言大祭祀者祭天地宗廟之揔名非一作不獨天地為大祭祀也何以明之按欝人職云大祭祀與量人受舉斚之卒爵按尸與斚皆宗廟之事則宗廟亦稱大祭祀又欽明狀引九嬪職大祭祀后祼獻則賛瑶爵㨿天無祼亦無瑶爵此乃宗廟稱大祭祀之明文欽明所執㑹要作云大祭祀即為祭天地未得為定明矣又周禮大宗伯職云凡大祭祀王后有故不預㑹要作赴則攝而薦豆籩欽明惟執此文以為王后有祭天地之禮欽緒等㨿此乃是王后薦宗廟之禮非祭天地之事何以明之按此文凡祀大神祭大祗享大鬼臨一作帥執事而卜日宿視滌濯涖玉鬯省牲鑊奉玉齍制一作詔大號理其大禮二字一作禮制相天王之大禮若王不與㑹要有大字祭祀則攝位此已上一㑹要作云凡直是王兼祭天地宗廟之事故通言大神大祗大鬼六字英華只作大祗㑹要作大祭今以舊唐書祝欽明傳増入之祭也已下文云凡大祭祀王后不與則薦豆籩徹此一凡直是王后祭宗廟之事故惟言大祭祀也若云王后合助祭天地不應重起凡大祭祀之文也為嫌王后有祭天地之疑故重起後凡以别之耳王后祭宗廟自是大祭祀何故取上凡相天王之禮以混下凡王后祭宗廟之文此是本經科段明白又按周禮外宗掌宗廟之祭祀佐王后薦玉豆凡王后之獻亦如之王后不預則賛宗伯按此王后有故不預則宗伯攝而薦豆籩外宗賛之内宗外宗所掌皆佐王后宗廟之薦本無佐祭天地之禮但天地尚質宗廟尚文玉豆宗廟之噐初非祭天所設請問欽明若王后助祭天地在周禮使何人賛佐若宗伯攝后薦豆祭天又命一作合何人賛佐並請明徴禮文即知攝薦是宗廟之禮明矣按周禮司服云王祀昊天上帝則服大裘而冕享先王則衮冕内司服掌王后祭服無王后祭天之服按三禮義宗明王后六服謂褘衣摇周禮注及唐史並作摇英華皆作摇翟闕翟鞠衣展衣褖衣也禕衣從王祭先王則服之摇翟從王祭先公則服之闕翟饗諸侯則服之鞠衣以采桑則服之展衣以禮見王及見賔客則服之褖衣燕居則服之王后無助祭於天地但自先王已下又三禮義宗明王夫人之服云后不助祭天地五岳故無助祭天地四望之服按此則王后無祭天之服明矣又三禮義宗明王后五輅謂重翟厭翟安車翟車輦車也重翟者后從王祭先王先公所乘也厭翟者后從王享諸侯所乘也安車者后宫中朝夕見於王所乘也翟車者后採桑所乘也輦車者后遊宴所乘也按此則皇后無祭天之車明矣又禮記郊特牲義賛云祭天無祼鄭𤣥注云惟人道宗廟有祼天地大神至尊不祼圓丘之祭與宗廟祫同朝踐王酌泛齊以獻是一獻后無祭天之事大宗伯次酌醴齊以獻之是為二獻按此則祭圓丘大宗伯次王為獻非攝王后之事欽明等所執王后有故不預則宗伯攝薦豆籩更明攝王后宗廟之薦非攝天地之祀明矣欽明建議只及引禮記祭統曰夫祭也者必夫婦親之按此是王與后祭宗廟之禮非關祀天地之義按漢魏晉宋後魏齊梁周陳隋等歴代典一作史籍興王令主郊天祀地代有其禮史不闕書並不見徃代王后助祭之事又高祖神堯皇帝太宗文武聖皇帝南郊祀天無皇后助祭處高宗天皇大帝永徽二年十一月辛酉親有事于南郊又總章元年十二月丁卯親祀南郊亦並無皇后助祭處又按大唐禮亦無皇后助祭南郊之禮欽緒等幸忝禮官親承聖問竭盡聞見不敢依隨伏以主上稽古志遵舊典所議助祭實無正一作明文若以王者制禮自我作古明主立斷非臣所敢言謹議一作皆舊唐書祝欽明傳南郊先燔後祭議唐子元徐堅同議開元年中議曰臣等謹按顯慶年修禮官長孫無忌等奏改燔柴在祭前狀稱祭祀之禮必先降神周人尚臭祭天則燔柴者臣等按禮迎神之義樂六變而一作則天神降八變而一作則地祗出几變則鬼神可得而禮矣則降神以樂周禮正文非謂燔柴以降神也按尚臭之義不為燔之先後假如周人尚臭祭天則燔柴容或燔臭先以迎神然則殷人尚聲祭天亦燔柴何聲可燔先迎神乎又按顯慶中無忌等奏稱晉氏之前猶遵古禮周魏以降妄為損益者今按郭璞晉南郊賦及注爾雅祭後方燔又按宋志所論亦祭後方燔又檢南齊北齊及梁郊祀亦先飲福酒訖燔燎一作後方燔又按後周及隋郊祀亦先祭後燔㨿此即周遵後燔晉不先燔無忌之奏一作事事一作義乃相乖又按周禮大宗伯職以玉作六噐以禮天地四方注云禮為始告神時祭一作薦於神坐也又又一作下文云以蒼璧禮天以黄琮禮地皆有牲幣各放一作如其噐之色又禮噐云有以小一作少為貴者祭天特牲是知蒼璧之與蒼牲俱合奠之神座理即一作節不惑又云四珪圭珪通有邸以祀天旅上帝即明祀昊天上帝之時以旅五方天帝明矣其青珪赤璋白琥𤣥璜自是立春立夏立秋立冬之日各於其方迎氣所用自分别矣今按顯慶所改新禮以蒼璧與蒼牲蒼幣俱用先燔蒼璧旣已燔矣所以遂加四珪有邸奠之神座牲旣已燔矣所以更加騂牲充其寳一作實爼混昊天於五帝同用四牲失特牲之明文加為二犢深乖禮制一作意事乃無憑請依貞觀舊禮先祭後燔庶允經義謹議一作皆舊唐書禮儀志廟樂定宗廟樂議二首此篇英華題作太宗廟樂舞名議非顔師古貞觀十四年六月一日詔曰􅇻薦祖考以崇功德比雖加以誠潔而廟樂未稱宜令所司詳諸故實制度一作定奏聞秘書監顔師古議曰近奉德音俾令釐革嘉名創立實宜允副㑹要有此十六字伏惟皇祖𢎞農府君宣簡公懿王並積德累仁重光襲􅁤化覃行葦慶崇㑹要作出𤓰瓞詩云濬哲惟一作維商長發其祥言殷之先祖久有深德四字一作久而有深智㑹要作久而深智虞夏二代發禎㑹要作祺祥也三廟之樂請同奏長發之舞其登歌則各為辭太祖景皇帝迹肇漆沮一作沮漆教漸􅃎岐胥宇之志旣勤靈臺之萌始附詩云君子萬年永錫祚𦙍言遐逺之期惟天所命以長一作長與福祚流于子孫也廟樂請奏永錫之舞代㑹要作世祖元皇帝丕承鴻緒克紹宏猷實啓蕃昌用集寳命易大有彖曰其德剛徤而文明應乎天而時行言德應天道行不失時剛徤靡滯文明不犯也廟樂請奏大有之舞高祖太武皇帝膺期馭厯揖譲受終奄有四方仰齊七政介以景福申兹多祐一作祜式崇勿替誕保無疆易曰大明終始六位時成謂其終始之道皆能大明故不失時成六位也詩有大明之篇稱文王有明德廟樂請奏大明之舞文德皇后厚德載物凝輝一作暉麗天易曰含𢎞光大品物咸亨言坤道至静柔順利貞資生庶類皆暢逹也廟樂請奏光大之舞謹議一作皆通典二許敬宗議曰臣聞七廟觀德義冠於宗祀三祖在天式彰於嚴祀致敬之情允洽大孝之道克一作宜宣是以八佾具陳肅儀形於綴兆四懸備展被鴻徽於雅音著一作考作樂之明義擇皇王之令典前聖所履莫大于兹伏惟皇帝陛下天縱感通率由𡨕極孝治一作理昭懿光被於八埏愛敬純深追崇於百世一作葉永言錫祚思一作願𢎞頌聲鍾律革音播鏗鏘於享一作饗薦羽籥成列申蹈厲於烝嘗爰制一作詔典司加隆㑹要作崇稱號一作加隆循聲覈實敬闡尊名竊以皇靈滋慶濬源長委邁吞鷰之生商軼擾龍之肇漢咸一作盛韜光於九二漸發迹於三分高祖紐地補天重張區宇返魂肉骨再造生靈恢恢帝圖與二儀而合大赫赫皇道共七曜以齊明雖復聖迹神功不可得而窺測經文緯武敢有寄於名言敬備樂章式昭彛範具列如左皇祖𢎞農府君宣簡公懿王三廟樂請同奏長發之舞太祖景皇帝廟樂請奏大基通典作階之舞世通典作代祖元皇帝廟樂請奏大成之舞髙祖太武皇帝廟樂請奏大明之舞文德皇后廟樂請奏光大之舞七廟登歌請每室别奏謹議一作皆舊唐書音樂志論立對破陣慶善二舞議高宗永淳元年裴守貞見舊唐書并㑹要議曰竊惟二舞肇興謳吟攸屬賛九功之茂烈叶萬國之歡心義均韶夏用兼賔祭皆祖宗盛德而子孫享之詳覧傳記未有皇王立觀之禮况升中大事華夷畢集九服仰垂拱之安百蠻懐率舞之慶甄陶化育莫匪神功豈於樂舞别申嚴敬臣等詳議每奏二舞時天皇不合起立謹議魯議高郢周公居攝七年致政而殁成王康王追思其德命魯侯代代一作代之祀以天子禮樂魯君得乘大輅建太常外祭郊社内祭嘗禘虞夏商周之服噐與官一無此字兼而用之以廣魯於天下郢竊謂自天子至庶人尊卑貴賤待禮而别豐者不可殺殺者不可豐成康過賜非禮也魯君受賜亦非禮也何則郢聞有其一無其字位而後行典禮仲尼不臣門人非君也季札不嗣呉爵非長也周公不王而禮樂以王者是以非禮誣周公也設若誣周公以非禮魯謂昊天上帝亦可以一無以字誣乎奈何使魯人郊昔孔子憤歎於衰周而欲求禮於魯及觀其僣乃言曰魯之郊禘非禮也周公其衰乎魯用天子禮樂者本以郊上帝旣非聲明文物之當用可知矣又恐未來一作來者以杞宋用王禮為疑一作從因言杞之郊也禹也宋之郊也契也是天子之事守也杞宋二王之一無之字後得守先祖禮樂魯何守而用之耶猶恐其未能又言曰天子祭天地諸侯祭社稷祝嘏莫敢易其常古是謂大嘏此乃申言名位不同禮樂一無此字亦異數之定分也夫子之言昭昭如揭日月而學者或以為事更聖人未聞可否難措辭於魯議者於謙黙之道則可矣於發揮之義恐未盡也詩曰爾之教矣人胥效矣魯侯用王禮其臣亦用侯之禮故季氏舞八佾旅㤗山三一無此字設公廟歌雍徹嗟乎禮之不早辯也如此古者父為天子諸侯子為士祭禮從子不得從其父邘晉應韓武王之穆得用備物享武王乎若享非禮之褒是周公不得為聖也如一作知其不享是成康祗以王者禮樂餒周公於一作于魯矣安在其為成康乎且周公之績孰與伊尹一有佐商二字成康之明孰與太戊崇異伊尹不過號為保衡至于沃丁太戊亦不加以王禮或謂周公叔父也於伊尹而為親故尊而異之夫太伯太王之長子三以天下譲於王季王季得之以傳祚於文武故孔子曰太伯其可謂至德也已矣及武王克紂追一有大字王王季文王而不追王太伯豈武王忘太伯之德而不親乎盖以等威之禮名分之别為萬代之凖不為一人之私也夫人情無常以禮為常以禮從情動則有悖且如王者祖有功而宗有德祖宗之廟代代不毁大凡繼體之君皆欲尊崇其父至于德功未著則不敢妄加廟稱者情非不欲限禮而已矣故禮之行于宗廟父子不得遂其私而况成康又得以天下之公噐大典獨私于一作予周公乎周公有大勲于周土田附庸以益之則可秬鬯圭瓉以賜之則可若天子禮樂成康所恃以為尊也胡可以假人成康雖欲尊於周公伯禽其忍受之以出僣其君入䧟其父乎若周公躬制禮樂墳土未乾而子孫弗克負荷首一無此字亂王者之度孔子稱其衰不亦宜乎一作皆唐文粹文苑英華巻七百六十一
