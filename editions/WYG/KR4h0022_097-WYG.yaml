body:
  text: 文苑英華巻九十七宋李昉等編志一小園賦一首脩心賦一首述志賦一首逰北山賦一首小園賦庾信若夫一枝之上巢父得安巢之所一壺之中壺公有容身之地况乎管寧藜牀雖穿而可坐嵇康鍜竈既煗而堪眠豈必連闥洞房南陽樊重之第緑墀青𤨏西漢王根之宅余有數畝弊廬寂寞人外聊以擬伏臘聊以避風霜雖復晏嬰近市不求朝夕之利潘岳靣城且適閒居之樂况乃黄鶴戒露非有意於輪軒爰居避風本無情於鐘皷陸機則兄弟同居韓康則舅甥不别蝸角蚊睫又足相容者也爾乃窟室徘徊聊同鑿坯桐間露落柳下風來琴號珠柱書名玉杯有棠梨而無舘足酸棗而非䑓猶得欹側八九丈縱横數十歩榆柳三兩行梨桃百餘樹撥䝉宻兮見忩行欹斜兮得路蟬有翳一作翕兮不驚雉無羅兮何懼草樹混淆枝格相交山為簣覆地一作水有堂坳藏狸並窟乳鵲重巢連珠細菌長柄寒匏可以療饑可以棲遲㩻䧢㩻丘奇切説文㩻䧢也藝文類聚作崎嶇兮狹室穿漏兮茅茨簷直倚而妨帽户平行而礙眉坐帳無鶴支牀有龜鳥多閒暇花隨四時心則歴陵枯木髪則睢陽亂絲非暇疑作夏日而可畏異秋天而可悲一寸二寸之魚三竿兩竿之竹雲氣䕃於叢蓍金精養於秋菊棗酸梨酢桃榹李薁藝文類聚無雲氣至李薁四句却添離披落格之藤爛漫無叢之菊落葉半牀狂花滿屋名為野人之家是謂愚公之谷試一作誠偃息於茂林迺久羨於抽簪雖有門而長閉實無水而恒沉三春負鋤相識五月披裘見尋問葛洪之藥性訪京房之卜林草無忘憂之意花無長樂之心鳥何事而逐酒魚何情而聽琴加以寒暑異令乖違徳性崔駰以不樂損年吳質以長愁養病鎮宅神以薶石厭山精而照鏡屢動莊舄之吟㡬行魏顆之命薄晩閒閨老幼相擕蓬頭王覇之子椎髻梁鴻之妻燋麥兩甕寒菜一畦風騷騷而樹急一作樹搔搔而風急天慘慘而雲低聚空倉而雀噪驚懶婦而蟬嘶一作啼昔草濫於吹嘘藉文言之慶餘門有通德家承一作藏賜書或陪𤣥武之觀時參鳯凰之墟觀受釐於宣室賦垂楊於直廬遂乃山崩川竭氷碎瓦裂大盜潛移長離永滅摧直轡於三危碎平途於九折荆軻有寒水之悲蘇武有秋風之别關山則風月悽愴隴水則肝腸斷絶龜言此地之寒鶴訝今年之雪百靈一作齡兮倐忽精一作菁華兮已晩不雪鴈門之踦先念鴻陸之逺非淮海兮可變非金丹兮能轉不曝骨於一作兮龍門終低頭於一作兮馬坂諒天造兮昧昧嗟生民兮渾渾凢一作皆藝文類聚脩心賦并序江總太清四年秋七月避地於㑹稽龍華寺此伽藍者余六世祖宋尚書右僕射州陵侯元嘉二十四年之所搆也侯之王父晉護軍將軍彪昔涖此邦卜居山隂都陽里貽厥子孫有終焉之志寺域則宅之舊基左江右湖靣山背壑東西陵跨南北紆縈聊與苦節名僧同銷日月曉脩經戒夕覽圖書寢處風雲憑棲水月不意華戎莫辨朝市傾淪以此傷情固可知矣啜泣濡翰豈攄欝結庶後生君子憫余此槩焉嘉南斗之分次肇東越之靈秘表檜風於韓什著鎮山於周紀藴大禹之金書鐫暴秦之石字太史來而探穴鍾離去而開笥信竹箭之為珍何碔砆之罕直奉盛徳之鴻祀寓安禪之古寺實豫章之舊圃成黄金之勝地遂寂黙之幽心若鏡中之逺尋靣曽阜之超忽邇平湖之迥深山條偃蹇水葉侵淫挂猿朝落饑鼯夜吟菓叢藥苑桃蹊橘林捎雲拂日結暗生隂保自然之雅趣鄙人間之荒雜望島嶼之邅廻靣江源之重沓泛流月之夜迥曵光烟之曉匝風引蜩而嘶噪雨鳴林而修颯鳥稍狎而知來雲無情而自合爾廼野開靈塔地築禪居喜園迢遞樂樹扶疎經行藉草宴坐臨渠持戒振錫庇影甘蔬堅固之林可喻寂滅之塲蹔如異曲終而悲起非木落而愁如豈降志而辱身不露才而揚已鍾風雨之掩藹倦鷄鳴之聒耳幸避地而髙棲憑調御之遺㫖折四辯之微言悟三乘之妙理遣十纒之繫縛祛五惑之塵滓久遺榮於勢利庶忘累於妻子感意氣於疇日寄知音於來祀何逺客之可悲私自憐其何已之逺尋陳書作而逺尋庇影陳書作度影掩藹陳書作如晦私自陳書作知自述志賦并序隋蕭皇后帝每逰幸后常二字一作未嘗不隨從時復一作后見帝失徳心知不敢措言一作心知不可不敢措言因為述志賦以自寄其詞曰承積善之餘慶備箕帚於皇庭恐脩名之不立時一作將負累於先靈廼夙夜而匪懈實寅懼於𤣥冥雖自然作一强而不息亮愚懵一作䝉之所一作多滯思盡一作竭節於天衢才追心而弗逮宴庸薄之多幸荷隆寵之嘉惠頼天髙而地厚属王道之昇平均二儀之覆載與日月而齊明廼春生以一作而夏長等品物而同榮願立志於恭儉私自兢於戒盈孰有念於知足苟無希於濫名惟至徳之𢎞深情不邇於聲色感懐舊之餘恩求故劔於宸極叨不世之殊眄謬非才而奉職何寵禄之踰分兮一無兮字撫胷襟兮一作而未識雖沐浴於恩光内慚惶而累息顧微躬之寡昧思令淑之良難實不遑於啟處將何情而自安若臨深而履薄心戰慄其如寒夫居髙思危持滿防溢一作夫居髙而必危每處滿而防溢知恣夸之非道乃攝生於沖謐嗟寵辱之易驚上無為而抱一履謙光而守貞一作志且顧一作願安乎容膝珠簾玉箔之奇金屋瑶臺之美雖時俗之崇麗蓋吾一作哲人之所鄙何一作愧絺綌之不工豈絲竹而喧耳知道德之可尊明善惡之由已屏一作蕩囂煩之俗慮乃伏膺於經史綜箴誡以訓心觀女史而作軌遵古賢之令範冀福禄之能綏時脩經一作躬而三省覺今是而昨非嗤黄老之捐一作損思信為善之何依一作可歸慕周姬之遺風美虞妃之聖則仰先哲之髙才貴一作慕至人之休徳質菲薄而難蹤心恬愉而去惑乃平生之耿介實一作寔禮義之所遵雖生質之不敏庶積行以成仁懼逹人之蓋寡謂何求而自陳誠素志之難冩同絶筆於獲麟凢一作皆北史本傳遊北山賦并序王勣吾一作余周人也本家於祁永嘉之際扈從江右一作扈遷江右地實儒素人多髙烈穆公感一作衘建元之耻歸於洛陽同州悲永安之事退居河曲始則晉陽一有之字開國終乃安康一有之字受田墳壟寓居倐焉五葉桑榆成䕃一作列俄將百年勣南山故情老而彌篤東坡餘業悠哉自寧酒甕多於歩兵黍田廣於彭澤皇甫謐之心事壟畝終焉仲長統之規模園林幸足獨居南渚時遊北山聊度世一作日以為娛忽經年而㤀返西窮馬谷北逹牛溪丘壑依然風烟滿目孫登獨坐對嵇阮而無言王覇後漢逸民幽居與妻孥而有興二字一作共去忩臨水石砌遶松篁類一作歌田叟一作園之去來亦已久矣望山林之故道何其樂一作悠哉詩者志之所之賦者詩之流也式抽短思即為賦云四字一作而賦焉天道悠悠人生若浮古來賢聖皆成去留八眉四乳龍顔鳯頭殷憂一世一作代零落千秋暫時南靣相將北遊玉殿金輿之大業郊天祀一作祭地之洪休榮深貴二字一作情厚重樂不供愁何况數十年之將一作宰相五百里之公侯兢兢業業長懼一作思長憂昔怪燕昭與漢武今識圖仙之有由人誰不願直是難求聞鼎湖之一作而欲信怪橋山之遽脩玉臺金闕大海水之中流瑶林碧樹崑崙山之上頭不得輕飛如石燕終是徒勞乘土牛已矣哉世事自此而可見又何為乎惘惘棄卜筮而不占一有餘字將縱心而長往任物孤逰遺情直上覺老釋之言繁一作煩恨文宣之技癢彼事業之遷斥豈明神一作神明之宰掌物無待而成章一作物無往而感彰生有資而必養嗟大道之泯没見人情之委枉禮費日於千儀易勞心於萬象審機事之不息知澆源之浸長鳥何事而嬰羅魚何為而在網生物詭隔精靈惚恍莊周三月而不朝瞿曇六年而遐想有是夫况吾之不如先達乎請息交而自逸聊習静而為娛遂披林樾一作槭進陟㩻䧢一作嵓區連峯雜起複嶂環紆歴丹危而尋捷一作絶徑攀翠險而覔脩塗聳飛情於遐一作霞道振逸想於烟衢重林合沓以齊列崩崖磊砢而相扶覩森沉於絶磵視晃朗於髙嵎自謂摶風飈而出埃壒邈若朝𤣥宫而謁紫都碧巒之下清溪之曲望隱隱而纔通聽微微而不屬眷然引領茲焉頓足歩擁石一作路而邅廻視横烟而斷續古藤曵紫寒苔布緑洞裏觀書巖邊對局髣髴靈蹤一作應依稀仙躅竈一作爐何代而銷金杯何年而溜玉石室幽藹沙塲照燭松落落而風廻一作回桂蒼蒼而露溽月未側而先隂霞方昇而後一作已旭喜方外之浩蕩嘆人間之窘束况乃幽谷藏真傍無四鄰紫房半掩𤣥壇尚新逄閬風之逸客直蓬萊之故人忽遽梧而䇿杖亦披裘而負薪荷衣薜帶藜杖葛巾出芝田而計畝入桃源而問津昆丘一作山若礪渤澥揚塵栽碧柰而何日種瓊𤓰而㡬春自然詭異非徒隱淪乃有上元仙骨太清神手走電奔雷耘空蒔朽河間之業不齊貫淮南之術無虚受一作靈受後有伊林間而虚受祝一作呪動南極符廻北斗偓佺贈藥麻姑送酒青龍就食一作養於甲辰𤣥牛自拘於乙丑永懐世事天長地乆瞻顧一作顧瞻流俗紅顔白首儻千秋一作嵗之可營亦何為而自輕昔時君子曽聞上征忽逄真客誡一作試問仙經談九華之易就叙三英之可成拭丹鑪而調石髓裛翠釜而出金精珠流玉結雪耀霜明咸謂刀圭暫近足使雲車下迎紛吾人之狹見覺羣疑而自拂使捉足而咸一作相安亦何為乎此物彼赤城與𤣥圃豈憑虚而搆窟但水月之非真譬聲色之無佛過矣劉向于嗟葛洪指期繋影依方捕風誰能離世何處逃空假使遊八洞之金室坐三清之玉宫長懐企羨豈出樊籠徒勞海上何事雲中昔日蔣元詡之三徑陶淵明之五栁君平坐卜於市門子真躬耕於谷口或託閭閈或歴一作潛山藪咸遂性而同樂豈違方而别一作列守吾無所徒一作余無所求斯焉獨遊屬天下之無一作多事遇山東一作中之可留聊將度日忽已經秋菊花兩岸松聲一丘不能役心而守道故將委運而乘流伊林間而一作之虚受固樵隱之俱託逄去老於中溪一作逄故客於中流遇還童於絶壑雲峯龜甲而重聚霞岫一作璧龍鱗而結絡水出浦而潺潺一作淺淺霧含川而漠漠是忻是賞爰遊爰豫結蘿幌而迎宵敞茅軒而待曙爾其雜樹相糾長條交茹葉動猿來花驚鳥去起公子之殊賞瞻一作談王孫之逺慮山水幽尋風雲路深蘭忩左闢一作辟菌閣斜一作邪臨石當堦而虎踞泉映一作度牖而龍吟月照南浦烟生北林閲丘壑之新趣縱江湖之舊心道集吾室風吹我襟松花栢葉之醇酎鳯翮龍唇之素琴白牛溪裏峯一作岡巒四峙信茲山之冝一作奥域昔吾兄之所止許由避地張超成市察俗刪詩依經正史康成負笈而相繼根矩摳衣而未已組帶青衿鏘鏘儗儗堦庭禮樂生徒把梓山似尼丘泉疑洙泗吾兄通字仲淹生於隋末守道不仕大業中隱居此溪續孔氏六經近百餘巻門人弟子相成故此溪今號王子溪焉自相成而下一作相趨成市故溪今號王孔子之溪也沫泗一作泗溪忽焉四散於今二紀地猶如昨人今一作多已矣念昔日之良遊憶當時之君子佩蘭䕃竹誅茅席􅊉一作芷樹即環林一作曲門一作林成闕里姚仲由之正色薛莊周之言理此溪集門人常以百数惟河南董恒南陽程元中山賈瓊河東薛収太山姚義太原温彦愽京兆杜淹等十餘人相為後來題目而姚義慷慨方之仲由薛収理識方之莊周薛實妙𤣥理耳慷慨下一有同濟二字理識方之四字一作以理逹稱方耳一作也觸石横肱逄流洗耳取樂經籍忘懐憂喜時挾䇿而驅羊或投竿而釣鯉何圖一旦邈成千紀木壊山頽舟移谷徙北岡之上東巖之前講堂猶在碑書一作石宛然想問一作聞道於中壼一作室憶横經於下筵壇場草樹院一作苑宇風烟昔文中之僻處諒遭時之䘮亂局逸歩而湏時蓄竒聲而待旦旅人小吉明夷大難建功則鳴鳯不聞脩書則獲麟為斷惜矣吾兄遭時不平殁身之後天下文明坐門人於廊廟瘞夫子於佳城死而可作何時復生式瞻虚舘載歩前楹眷眷長想悠悠我情爼豆衣冠之舊地金石絲竹之餘聲没而不朽我何所營吾兄仲淹以大業十三年卒於鄉余時年三十三門人諡為文中子及皇家受命門人多至公輔而文中之道未行于時吾因遊此溪周覧故迹葢傷髙賢之不遇耳文中下一有子字吾一作余耳一作也臨故墟而掩抑指歸途而歎惜一作息徃徃溪横時時路塞忽登崇岫依然舊識地迥心遥山髙視直望烟火於桑梓辨溝塍於鄉國前臨一作斜連姑射之西正是汾河一作河汾之北悵矣懐抱悠然川域憶昔過庭童顔稚齡何賞不極何遊不經弄春風於磵户詠秋月於山扃北忩照雪南軒聚螢綵衣扇枕緇布問一作聞經何斯樂之易失倐衘哀而茹恤天未悔禍遭家不秩子敬先亡公明早卒吾自此而浩蕩又逄時之不仁天地遂閉雲雷漸屯與沮溺而同趣一作往共夷齊而隱身幸収元吉坐一作生偶昌辰容北海之嘉遁許南山之不臣養拙辭官全一作含和保真豈若馮敬通一作生之誹一作訓世趙元淑之尤人殷憂耻賤憔悴傷貧探井臼之一作而無樂歴山河而苦辛豈知一作如我家身一作生事都盧一作廢棄置不念當歸寧圖逺志坐青山而方一作非隱遊碧一作緑潭而已一作似喜舊之出處二字一作山裏絶氛埃登髙日暮心悠哉子平一去何時返仲叔長遊遂不來幽蘭獨一作燭夜之琴曲桂樹陵晨之酒杯丘園散誕窟室徘徊坐等梧一作枯木心同死灰亦有山羞野饌蘭漿木一作水麨把葉煎羮松根溜醥既採藥而為食諒隨情而不矯負鍤春前腰鎌嵗杪草漸密而饒蟬一作黙樹彌髙一作深而足鳥地寂寞而森深一作沉路縱横而窈窕野亭鶴唳山梁雉鷕逺遊之所幽棲之次或抱犢而新來乍聞鷄而始至藋畦一兩茅齋數四山為險而無人嶺時平而有地石菌抽葉金芝吐穗鏡執一作厭山精刀驅水魅泉繞砌而魚躍樹横忩而鳥萃天網何寛人生㡬難一作人心豈難飲河知足巢林必安亦何榮於拾紫亦何羨於還丹紅藜促節之仗緑籜斑文之冠野飡二簋園蔬一盤送阮籍而長嘯得劉靈而甚懽曉入柴户暮歸藥欄老萊地僻鄒生谷寒楊柳則條垂鍜沼杏樹則花飛坐壇賦或一作成皷吹詩如彈丸擕始醉之鳴鶴對新婚之伯鸞我有懐抱蕭然自保古人則與子二字一作難與同歸紛吾則此焉將老磵溪沼沚一作者之蘋艾丘陵坂險之桑棗接果移桑一作棠栽苗散稻不藏無用之器不愛非常之寳抵玉驚禽揮金薙草接朋友於盃案弄兒童一作孫於襁褓樂山澤之浮遊笑江潭之枯槁戒非佞佛齋非媚道無譽無功形骸自空坐成老圃居成一作為下農身與世而相棄賞隨山而不窮披衣竈北逐食墻東儻有白頭四皓龎眉八公小童乘日仙人馭風鄉老則杖頭安鳥邦君則車邊畫熊心期闇合道術潛同解來相訪愚公谷中文苑英華巻九十七
