body:
  text: 文苑英華巻四百十五宋李昉等編宰邑外縣令授元素履忠州臨江縣令制李嶠勑奉議郎行涪州隆化縣元素履綰銅兩穴遊刃三巴府推其能人便其政賔寮戀仰蠻漢謳吟宜遂所祈以終美績可忠州臨江縣令授李承嘉并州太原縣令制勑通議大夫前守文昌司勲員外郎李承嘉擢秀士林昇榮禮閤公勤無怠幹制有餘既脩太原是惟舊國爰製美錦實佇良材宜錫崇班佇聞異績可檢校并州太原縣令散官如故仍馳驛赴任授趙崇嗣南由縣令等制勑朝議郎前行慶州同川縣丞趙崇嗣儒林郎守蓬州寅縣丞陳義全等或典農朔陲致京庾之積或驅驛巴徼有綏輯之功宜敘成勞俾無遺賞崇嗣可行隴州南由縣令義全可守潼關令散官並如故授竇慈遜岐山縣令制蘇頲勑朝議郎行司農寺竇慈遜爰以幹用歴登班秩憲曹農府星籥未深雍畤岐山絃歌所屬宜遷子男之邑佇聞人吏之謠可岐山縣令散官如故授畢懐亮清流縣令制勑前常州晉陵縣丞畢懐亮踐言立行希髙慕古弓旌之禮方議於徵辟軒冕之榮每聞於退譲厥聲則逺斯道不渝須嘉賢良可鎮浮競遂其彭澤之志用表太丘之徳可滁州清流縣令授呉太𤣥宋城縣令制勑朝議郎行監察御史呉太𤣥清以立身嚴以持法謠成避馬實憚於霜威政佇遷蝗俾聞於風教可行宋州宋城縣令散官如故授王璬栁城縣令制勑朝議郎前行營州都督府倉曹叅軍上柱國王璬早聞幹用兼擅籌畫龍城逹邑俾居銅墨之班鯨海安波仍掌舳艫之事可行營州栁城縣令散官如故仍充海路押運糧使授陽洽安邑縣令制黃門朝請大夫新除河南府司録叅軍事陽洽慎則能宻清而又公任之養人特疑作時曰循吏朱鉤應務迹豈滯於中京墨綬宣風才可臨於大邑可蒲州安邑縣令散官如故授于光庭聞喜縣令制黃門朝議大夫前行鄧州長史上柱國臨淄縣開國男于光庭早聞詩禮兼著詞學歴職有聲在公無撓宛潭菊水未旌理劇之能漢邑桐鄉式佇宣風之最可行絳州聞喜縣令散官勲封如故授韋由太原縣令等制孫逖門下朝議大夫守太子中允韋由太常丞長清縣開國男程若水等或業擅鄉族恩延將相或以人才累升官叙北京理劇東朝駮議宜膺並命以叶類能由可守太原縣令若水可守太子中允散官如故授徐鈞南海縣令制勑行晉州神山縣徐鈞幹以立身果於從政頻更所職頗効其能言念逺人實資良吏既有使臣之薦宜遷宰邑之榮可廣州南海縣令授崔綸鄆縣令制勑益州大都督府倉曹叅軍崔綸頃為郡掾兼佐軍麾清幹有聞公勤亦著名當嵗調才應時須宜遷宰邑之榮式允使臣之薦可益州鄆縣令授銀州刺史劉頗河中府河西縣令制元稹勑劉頗朕以自鄜而北夷夏雜居號為難理乃詔執事求所以綏懐控壓之者皆曰頗在兹選且言其伐蔡之役嘗叅事集作軍非於懐汝之師部分弛張允叶軍政遂命試領州郡事衆果寧阜邊人宜之連帥以聞議請甄奬河西近邑擇吏惟精無恡牛刀為我烹割可依前件授齊煦崔諷等鄭縣剡縣令制前人勑前横海軍節度判官監察御史裏行齊煦前衢州須江縣令崔諷等今一邑之長古一國之君也刑罰紀綱約略受制於朝廷大抵休戚予奪之間盡專之於令長矣然而天下至大百吏至衆吾安能以一耳一目觀聽其短長耶䎖等皆奉詔條為人求瘼剡薦於爾豈其欺予各勉厥誠以臻于理煦可華州鄭縣令諷可越州剡縣令授元公度華隂縣令制白居易勑元公度吾欲理化萬方故自近始前授大宗正䎖印綬使牧華人䎖能副吾此心選吏責課言公度㢘明有守乞宰華隂噫華隂當道東西往來先是為邑者多飾廚傳奉賔旅以沽名譽而不親吾人爾能革之足為良宰敬長果法無慢乃官可華隂縣令餘如故授薛元賞華原縣令制勑前大理丞薛元賞甸服之制也樹以尹正承以令長上下有統而理化行焉以元賞前為廷尉丞察獄平刑頗聞敬慎寺卿奏課邑宰缺員故移欽恤之心使布惠和之政上承爾長下字吾人無或越思而乖統理可華原縣令授辛弁文淄州長山縣令制勑趙州臨城縣令辛弁文既有吏材又知臣節遁逃宼難奔走道途言念忠勞宜加恩奬俾換銅墨移宰長山可依前件授裴克諒權知華隂縣令制勑華隂令卒非選補時調租勉農官集作政不可闕前鎮國軍判官試大理評事裴克諒乆佐本府頗有勤績屬邑利病爾必周知宜假銅墨試其材理待有所立方議正名授崔郁南鄭縣令等制崔嘏勑前藍田令崔郁前登封令鄭倚前陸渾令李元夔前京兆尹户曹李廡等撫鰥惸奉陵寢本於㢘白藉彼恪勤爰因叅調之資是奉選求之命銓衡之下雖欲掄材資品之間固難專授勉膺奬任無俾蔑聞郁可興元府南鄭縣令倚可鳯翔府天興縣令元夔可莊陵令廡可髙陵令授李瑤雲陽縣令等制勑李瑤等京縣理劇綱曹糾違書殿讎校之清閒光禄膳饈之承副從容於蓮蓬之下籌畫於雲幕之間茍非才能不預斯選以瑤等或職任脩舉或文業優長用是披之寵光旌此休問各從其適無忝已知可依前件授楊鎰西水縣令張廷濟永清縣令盧軺新政縣令孫球下邳縣令等制劉崇望勑昔魏郡十五城獨繁陽有異政漢史書之以其為縣之才未易得也今我擇官憂人之際一朝以難得之才待鎰等四子其何如哉將責試功亦宜申命為政如御不可改轍而行為政如農唯在勤思其事無或窮人使為盗也書稱以庸本朝旌賞遽以印綬光命之球盖延徐師溥之所舉乃為之酬當務其實可依前件授楊𢎞範郿縣令制勑楊𢎞範能以下位伸于上聞諒屬驅馳不避繁劇郿大邑也有民人焉勉揚仁風無辱公舉可依前件授薛璫新鄭縣令賈希弼汧源縣令李牢麟遊縣令等制勑薛璫等我聞焦贑之伺奸邪虞詡之推盤錯皆屏盜之迹為治縣之先盜既不興縣是用保今其時也勉思齊之其於政之善惡人之理亂賞罰甚明足以自擇璫得銀章無忘兢惕授于荷雙流縣令制薛廷珪勑具官某等嗟乎爾荷丞相之子也栖遲府縣汨沒風塵美蔭成蹊孤根委地矧吾戚屬兹用軫懐聊效牛刀式遂雞口顔而下則轅之門吏也自陳去職乆困家食俾佐方州各均禄仕而荷峻其階序飾以章服吾不能無私於親親之道也可依前件授沈正言南鄭縣令李登趙縣令楊守節永樂縣令等制勑宣尼薦弟子之能曰由也果於從政乎何有朕懲兵革之後念疲瘵之人富而教之令長為急具官沈正言等或納圖籍於書府或稱勞績於本官皆不因依明自論列執政詳驗功狀昭然皆可謂果矣夫南鄭亞赤永樂次畿及晉之趙城皆名邑也俾爾各為之宰冀乎有成嗚呼無成果於自謀而殆於從政可依前件授劉廷温華原縣令丘景元分水縣令制前人勑華原甸服之重分水呉境之清宰宇至于屬僚不可輕往以廷温在官有績罷退稍乆景元侯表奏舉其才能資次命之各勤于職可依前件授李昌偉岐山縣令王羣白石縣令杜蕘曾口縣令等制勑昌偉等宣宗皇帝命明法吏刪刑書為統類十編盡去繁詞而獨著元結縣令箴其間是於養人之官殷勤深切矣岐山右輔之名邑固所重也而壁之白石邑之曾口委以養人之任豈以僻陋而輕哉以昌偉等勲臣所薦跡其勤効咸可寵嘉用爾大小等衆俾其並為令長噫風俗雖異户口雖殊茍無忽於元箴則皆可副吾㫖矣可依前件授盧蟾富平縣令郭諲武寧縣令李嗣業曲沃縣令馮珙山隂縣令等制勑盧蟾等十年兵戈兆人流散朕延執政與百執事問所以聚人之方皆慎選令長而已夫畿赤之富平可謂大邑而洪之武寧絳之曲沃越之山隂亦皆著名者也爾蟾等或稱華胄或曰才人華胄以禮譲為本才人以政術為宗而珙嘗於佛寺有遷明皇真像避賊火之功可謂忠敬矣以爾四人為縣庶可聚吾人乎勉端爾能以稱其用可依前件授孔競隂平縣令張標湖州録事叅軍王振蓬溪縣令等制勑孔競等或連帥奏請或郡守薦揚或勞績可稱罷免斯乆能自陳列動我聽聞宰邑糾曹皆其任也可依前件主簿授髙昌首領守蒲類縣主簿制李嶠勑麴𤣥福㧞跡輪臺䇿名㑹府宜受芝泥之命往叅蒲海之邑可將仕郎守北庭蒲類縣主簿授鄭枋河中府河西縣主簿白居易勑鄭滑州觀察推官試太子通事舍人鄭枋材集作名列士林職叅軍府脩身無闕從事有勞既展効於即戎宜試能而補吏俾之糾邑庶有可觀可依前件授楊彦奉國縣主簿尚殷美萬嵗縣主簿制劉崇望勑楊彦等主簿之官大要在其勾稽一同百里不亦難乎無言小官而忘幹事黜陟勸沮勉自為謀可依前件縣尉授侯丕壽州霍丘縣尉制白居易勑試太常寺奉禮郎翰林侍詔上護軍侯丕夫執藝以事上奉詔而處中其於出入謹身夙夜祗命比他局署實倍恭勤既寵之以職名又優之以禄俸盖先勞後食之義也汝其承之可守壽州霍丘縣尉依前翰林侍詔勲賜如故魏兖二州所薦田夷吾曹璠二人凖勑試詩日終百首授以所貢郡縣尉制前人勑乃者魏兖二帥以田夷吾曹璠並善屬文貢置闕下有司奉報明試以詩五言百篇終日而畢藻思甚敏文理多通賢侯薦延宜有升奬因其所貢郡縣各命以官而倚馬貢來衣錦歸去以文得禄亦足為榮可依前件湖州烏程縣尉李忠等授官仍量留等制薛廷珪勑具官某等青社霅溪之守各脩職貢俾爾來朝實冒險艱所宜酬奬有以兼廷評之命而許留於官有以移掌庾之秩而與夫掾臨海者皆遂爾晝錦之榮也可依前件授張謩端陵丞李頊虹縣主簿裴昇新井縣尉等制李磎勑張謩等或園陵攝官屬籍吉士宗正以其事跡貢表薦揚裴昇等各以去任在官勞績深自論列情有可依丞簿陵邑各從資序可依前件授宋郁廣都尉黃去惑臨安縣主簿顔温鳯翔文學等制勑太宗文皇帝論學書骨力喻政化根源朕既逹微言則思觀真跡又欲廣書籍之府以正是非存忠烈之家以勵風俗三者皆吾夢想也而宋郁等進獻論列有以副焉丞簿文學用酬其意可依前件文苑英華巻四百十五
