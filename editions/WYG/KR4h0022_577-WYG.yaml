body:
  text: 文苑英華卷五百七十八宋李昉等編藩王讓官為杞公讓宗師表一首為定王讓官封表一首為定王讓兼知司禮寺事表一首為臨川王讓千牛將軍表一首為安平王讓揚州都督府長史表一首為建安王讓羽林大將軍兼司賔卿表一首為岐王讓太常卿表一首為安國相王讓東宫第三表一首代宣王誦讓皇太子表一首雜讓為梁王妃讓封表一首益州父老請攝司馬鄧公為真表一首為僧普潤辭公封表一首為道士馮道力讓官封表一首為郭子儀讓華州請立生祠堂及碑表四首為杜司徒讓淮南立去思碑表一首代公主讓起新宅表一首代公主辭家人畜產官給料表一首為裴駙馬讓官與父表一首藩王讓官為杞公讓宗師表庾信臣某言伏見詔書以臣為使持節驃騎大將軍開府儀同三司宗師中大夫伏奉綸言心魂震讋臣聞堯分四岳是以望秩山川舜命九官是以光華日月必須易一作儀刑以德明試以功乃可協和萬邦咸熙庶績臣㓜無學植長闕財成鴻都之門不能定其章句雞鹿之塞無以名其碑碣慿天漢之𣲖水附若木之分枝東岳則朝宿有名南宮則門闌有籍在臣庸劣久知滿盈武陽以功臣之重特拜宗師東平以母弟之尊超登上將臣有何德能兼此榮臣早傾廷蔭曾未扶墻母氏慈訓哀矜勞苦甫及成人復垂捐棄几筵如在忍離鞠養之恩終天無報叩地難任欲草土丘陵終身塋域霜露申履時之感鷰雀展㢠翔之心不悟天澤沛然謬垂提拔當今玉燭調和既非金革之世璿璣齊政豈亡梧檟之材况復一枝踡曲終危九層之臺一股涔蹄必傷千里之駕皇帝欽明文思光宅區宇禮格四方無容奪臣此志孝治天下自當哀臣此情大宗為師更求同姓之國元戎叅乘别選能賢之臣伏願覽青蒲之奏曲允微誠詔鳳凰之池特收嚴召則天慈無濫私願獲從臣之容身便當有地不任荒悚戰懼之誠謹詣朝堂奉表以聞為定王讓官封表李嶠臣某言臣頻布欵誠庶蒙矜遂而由衷之請空竭於肝膽臨下之鑒未察於庸愚集木非兢臨淵罔懼臣某誠惶誠恐頓首頓首死罪死罪臣歴窺前志詳考舊聞莫不以有道興邦家不才替社稷漢武帝網羅羣士唯佇俊賢周成王訓廸庶官不求庸保臣行能近淺識性凡陋難化之質非八音所陶不移之愚豈六藝能飾往緣戚屬叨奉恩私遂得地列齊封門開魯館承敦叙於九族被徽章於五等今光華始旦品物維新三代典章理遵於舊式二京恩澤宜革於權制方就散秩之輩幸沾朝請之流寧可以冒踐槐廷更增茅土况班彛錫瑞執揆提衡法垂象於三台視隆班於四瀆實司邦敎是曰藩維豈臣餘喘殘生所合尸忝非臣荒情菲質所宜叨據陛下懸旌訪逸刻象求才朝有白駒之賢野無黃犢之彥方使思皇多士必明於至公豈令棫樸能官近廢於親昵臣自審量實所不堪蔀室之災豈唯於身咎折鼎之責方貽於國患伏冀回光斂靄寢綍收綸察臣不移之心矜臣非飾之請特停過誤改命才良則白馬丹書不慙於異姓和羮作礪不逮於凡庸無任慙懼屏營之至謹重詣朝堂奉表陳請以聞為定王讓兼知司禮寺事表臣攸暨言伏奉恩制一作旨命臣兼知司禮寺事臣本無操履素乏藝能憑藉葭莩遂叨冕笏畫龍刻鵠一作鶴非有天才簪犀紐龜但因地勢鑒空虛微𦕈之質驗庸闇不逮之姿素簡神衷豈勞銓叙幸得攀光日月藉寵侯王祿比萬鍾爵窮五等備梁園之車服司周室之典經朝夕起居出入陪奉在生多幸於臣已足豈可重叨非據更竊隆班上虧國章下速身謗昔漢疇稷嗣將冠九卿虞昇伯夷實掌三禮奉烝嘗祈祀之典有匏土笙鏞之節匪徒移風易俗兼且尊事神祇一作尊天事神豈於凡庸所可叅議况此司禮分職見有二卿並在官聯事且無缺更叅駑蹇之足徒亂鵷鴻之序伏乞聖慈回鑒天造曲成矜其慊切之心念其尸曠之責怡然俯察霈乎􅂷許則至公之道實𢎞於聖朝多幸之災不累於凡識無任慙懼屏營之至謹詣朝堂奉表以聞為臨川王讓千牛將軍表臣嗣宗言臣學藝無稱才行兼闕幸一作得延慈䕃遂歴通班花萼同榮依上林而發彩鶺鴒交賀仰大厦而相歡恩比丘山效微塵露叨榮席寵荷愧承羞臣嗣宗中謝臣嗣宗夙奉皇明已忝銜珠之秩兄懿宗近承天澤又當執金之位弟兄齊列伯仲分曹咸典禁戎並叅宸衛匪唯官崇一作尊祿厚思滿盈而增憂固亦秉勢操權顧章程而自惕况臣素抱愚拙更纒疴恙牽羸引憊竊位妨賢内懷尸素之慙外負朝廷之謗豈可以多塵聖化久累能官伏乞收迹丹墀歸骸素里庇堯雲之光彩浴舜海之波瀾栁蔚桃濃聽南隣之鐘磬茅舒桂滿陪北闕之簪纓飡厚渥而忘飢樂太平而愈疾則涵養之德瞻大造而斯𢎞􅌤冒之譏在微臣而知免輙陳固陋輕黷威嚴授紙彈毫驚魂悚魄臣嗣宗誠惶誠恐頓首頓首死罪死罪謹言此篇五百八十一卷重出今已削去注異同為一作為安平王讓揚州都督府長史表臣某言伏奉恩制以臣為揚州大都督府長史光寵載臨震悸交集臣某誠惶誠恐頓首頓首死罪死罪臣蒙蔽有素非陶染所移磨礪無成豈鑽仰能及斯並久塵聖鑒不逮更伸愚欵陛下降猶子之愛忘具臣之譏乘以軒車佩以璽綬射榮席寵瞻歲月而徒深結課疇庸在涓埃而莫取何曾不外慙赤紱内負素飡是以前布腹心辭禁衞之重後竭誠懇歸殿省之榮豈欲娯志養高實願遺身體國不為疑作謂聖情重疊恩旨綢繆更錫隆章重紆顯命刷燕雀之毛羽求其奮飛飾駑駘之銜轡徵其滅没雖願盡智力而終難勉强陛下宵衣待旦仄席思賢必欲無曠庶官克諧共理臣智慙一割政乏四科豈足以恭副虛求𢎞宣美績况三楚舊壤一都之會永言作鎮匪易其人伏願遵尚德之彛躅杜推恩之妄舉以公滅私簡才授職則武皇得士不慙於曩歲文王能官復在於茲日無任慙悚之至謹詣朝堂奉表以聞臣所讓人具如别狀為建安王讓羽林大將軍兼司賔卿表張說臣某言伏奉集作承月日制書除臣右羽林衞大將軍兼檢校司賔卿朝榮對及恩露洪垂罄仰驚抃環揆失圖集作慙失臣某中謝臣席慶皇支辱司天衞素官成責久盈人口頃屬山戎自擅王師震加謬當推轂之禮竟空汗馬之績實賴睿謨幽贊靈兵潛討滅犬羊於遼海卷旌麾於燕薊臣得歸功北闕待罪東藩沐泳休貺生死榮幸安敢賣要塞而告勞貪天功以為已又况羽林清禁上則星辰主客命卿下法河海蓋文武具美方議望僉歸豈臣弊劣所堪尸忝伏乞特回睠鑒更擇能賢俾朝興薪槱之歌臣免伐檀之刺非敢飾讓實披誠請無任悚戴之至謹詣朝堂奉表陳讓以聞為岐王讓太常卿表蘇頲臣某言伏奉制書以臣為太常卿兼檢校左羽林將軍䖍奉恩命罔寘心顔臣某中謝臣托䕃宸極分暉景緯從學多滯不足對於三雍為文益疎不足齊於七步日者自天有命裂地而封盛亨岐之井邑比從梁之驂駕旋省慙惶益增忝越不悟前榮始拜後寵仍加且彛倫攸叙百官所以象物方䇿不墜二柄所以濟時苟非其才將汨于政况上卿之任中尉之重自非膠庠告老桓榮列於東靣藩邸求舊宋昌總於北軍臣何妄庸兼此叨竊類表作冐伏惟皇帝陛下夙祗圖籙光宅區㝢凡厥在位喜聖朝之得人獨此曠官塵睿鑒之知子將何以典司禮樂綜理韜鈐伏乞太陽廻光慶雲灑澤俯察蒙鄙旁求賢俊則冀受授無失謀謨有倫無任下情愧悚之至謹詣朝堂奉表陳乞以聞為安國相王讓東宮第三表崔沔臣某言前累表自陳披瀝肝膽懇誠所守期在不移而天聽邈然未垂矜納屏營跼蹐罔措類表作寘心顏臣竊觀帝王支庶進以寵私雖假恩靈必詒禍咎親如梁孝尚非正議所容才同季札猶為長亂之本况臣朽懦將何忝竊且承先建極當可推恩作範惟親宜崇以正伏願陛下雄畧潛明皇威誕發熏逐狐䑕梟剪鯨鯢上慰祖宗之心下保元元之命大位既定丕業重光再造四海之基方流萬代之福至於守器允屬元良非聖賢無以厭天下之心非典禮無以為後嗣之法臣地非冡嫡才實昏庸一旦干冒大倫亂越皇統近為身患遠成國恥將何以措身闕廷將何以歸骨山陵是用專固不回繼之以死特希慈造俯垂聖諒一作諒察臣某中謝臣跡非飾讓言實由衷區區之心敢不披罄素所蓄積塵黷上聞嗟臣不天一作才夙遭險釁哀􅑏孤藐百罹是攻嗣聖之後天步艱難逼迫﨑嶇措身無地既冒儲貳又塵尊極正名罰罪合當萬死忝曰臣子豈所晏安殞首滅身無以塞責臣某中謝臣當此際之心豈貪生而憂死誠以身居類表作處不容之地命盡危疑之辰上適可以增國羞下未足以明臣節是用冒罪假息忍死苟全尚祈宗廟之靈庶覩返正之運使臣得退保先朝所命歸死藩邸之下則雖灰滅良無遺恨惓惓所守神明知之既而天啓聖期興運伊始明兩出震九二在田臣克遂誠祈獲返舊國私願雖果而皇猷未忝每以釁萌城社將傾宗稷常慮奄忽禍出非常夙夜憂惶罔知攸濟幸屬陛下光啓休烈克復中興長信高居供養有地明堂正位忻戴知安抃舞謳歌稱慶未己不意陛下復將置之非據迫以奪宗前憂未忘後懼仍及臣之膚剥胡寧斯甚今天地交㤗朝野歡娯獨在微臣殷憂昭代念及同氣願􅂷憐察代宣王誦讓皇太子表臣某言臣自奉明命累表陳乞懇誠無感聖慈未回進退兢惶如履冰谷臣誦誠惶誠恐頓首頓首臣聞少陽之重嗣守宗祧故傳曰年均擇賢義均以卜為國之本繼奉休明臣質惟愚蒙未經師類表作保傅問安侍膳夙乖奉養之規秋籥夏弦昧於類表作素昧齒胄之訓無以上承匕鬯展敬粢盛内省多慙類表作内多慙赧豈敢飾讓未蒙諒察惶怖失圖臣所以累獻封章備陳丹懇伏望俯回天眷曲遂愚衷臣無任懇欵之至雜讓為梁王武三思妃讓封表宋之問妾言妾聞天與才多地居外戚理乖謙益一作不患無位患在寵盈妾亡夫三思頗讀聖賢之書夙知止足之分在先朝錫漢藩之社位亞上台陛下流渭陽之思室嬪愛主常恐官高祿厚福極禍來閨門之談顛覆存戒但以願施塵露之効尚鬱山林之遊詎謂呉楚指有寵為名父子以無辜同枉良以崇高取忌退讓未形事雖噬臍言猶在耳妾夫埋黃壤子夭青春唯知哀訴神明號泣天地妾之殘命稱曰未亡更何心顏享茲豐厚况三思久謀謙退人所未知實恐士庶遊談是非相半既未能辯明高義豈復忍貪吝餘資雖則伯宗已亡獻誡者聞乎奸盜尚冀黔婁宿意見知者因乎寡妻今墳土未乾繐帷猶設妾所以廢寢忘飡瀝欵披誠未允前祈更陳後請伏願俯矜賤妾遠念幽魂收彼白茅之封表其赤松之節光陛下有任賢之德明三思無冒寵之譏妾之區區意盡於此無任感切之至謹遣某詣朝堂上表以聞再黷威嚴伏深戰越妾死罪謹言益州父老請攝司馬鄧公為真表閭丘均此篇合在六百九卷雜上請門今已移入姑存其目為僧普潤辭公封表張說僧普潤言伏奉甲寅制書以普潤加榮沐秩授邑封公聖恩無涯將變枯朽佛法有敎誠願住持普潤自剃落緇衣五十餘載心不見是口不言俗因誡證業慿禪悟理幸逢皇祚將集作特啓大運有歸皇太子逼畏兇讐永懷興復憂虞之際一作始始一作特蒙顧問貧道起廣救之悲决必成之䇿奉符命之旨贊無畏之心今得衆生乂安羣魔消伏在於法侣所願為多視身本無何功受祿天位有德陛下享之天討有罪太子行之豈貪天之功以為已力賣佛之法而求身利必若冒榮背律返俗違真亦恐乖陛下崇誠之情集作崇信之誠失如來付囑之義凡所稱述諸佛證明伏願聖慈亦垂開領乞停恩授以幸法門無任䕶戒傳道之至願謹詣朝堂奉疏陳情一作請以聞為道士馮道力讓官封表李嶠臣道力言叨緣幸會謬奉渥恩隨簪笏之九班列山河之三土王言如綍敢不欽承人好惟星願披誠欵道力本厭囂滓夙躭閒曠潛形草澤不將臯鶴並聞浪性雲霞惟慕一作共海鷗相狎十步徒歡於飲啄一官匪尚於榮華幸屬聖期謬廻天奬承軒冕之賜列是樊籠踐繩墨之途更成維縶尺鷃但慙於鐘鼓鶢鶋空費於牲牢故欲瀝膽輸肝一作誠披誠一作肝進欵倘蒙却收匪服改命如絲不一作矜以尸曠之交免其負乘之責則物情輿論誰不謂宜如將衆列疑作例難違微功必叙仍優附鳳之賞遂假濡鵜之衣則望賜以宫名還其道服仲虞懷八座之祿未入朝廷之推列五等之封尚居山藪所冀資此俸秩永修齊供庶玉清垂貺增寶祚於三光一作元金籙開祥固珍圖於萬刼上隆紫極之統下遂清溪之逰在於微生實為幸甚道力昨已陳請未蒙處分重此干祈伏增戰越道力誠惶誠恐頓首頓首死罪死罪謹言為郭子儀讓華州及奉天縣請立生祠堂及碑表邵說臣子儀言臣得同華節度使刺華州刺史周智光牒稱得耆壽薛遠等將以華州是臣所生之地奏請與臣立紀功頌德碑天慈曲臨已蒙聽許又得奉天縣令程暹狀得百姓仇廷珍及僧山海等狀亦請與臣立碑及生祠者伏以皇家受命祚運延昌雖妖孽暫興而天地終㤗收兩京之際陛下親總元戎臣忝職驅馳躬執鞭弭指蹤逐寇皆聖主之雄圖靜難夷兇且微臣而何力四句類表作指踪逐寇幸克有成皆聖主之雄圖顧微臣而何力又奉天之役大挫渠魁亦仗天威以集戎事必欲紀之金石摇美無疆理合昭宣聖功垂於不朽豈臣薄劣輙敢當仁寤寐兢惶莫知死所瘡痍之後凋瘵未平更屬春時實妨農業乞回成命一切勒停庶老臣無貪天之責疲人有息肩之望懇欵追切之至謹奉表陳讓以聞第二表臣子儀言伏以華州及奉天耆壽等請與臣立碑及生祠昨已奉表請停未蒙允納夙夜省究一作度不勝戰悸臣某中謝臣以孱庸謬承驅䇿雖東征西伐莫顧微軀而保大定功皆憑睿算今欲刋諸貞石永播徽猷實為貪天之功難勝􅐲地之愧况今兵革未息瘡痍未平忽此勞煩必有妨奪顧臣薄劣將何自安臣雖至愚深知不可再陳旒扆伏用兢惶所望聖慈遂臣誠請無任懇迫之至第三表臣子儀言臣聞人臣事君禀命而已若君有非常之畧則臣成佐命之勲象彼四時運行實因於上帝配諸百谷廣大在宗於滄溟頃陛下監國撫軍則再安宗社及飛龍踐阼又克清夷狄所有成績莫匪雄圖臣雖在行何力之有今奉天華州耆壽請為臣建碑立祠且陛下聖功已書簡䇿微臣薄效何足褒稱耆艾之徒昧於事體謬請刋紀殊乖名實昨已再表懇辭冀達誠慊陛下未察令斷來章奉詔兢惶若墜泉谷况今畿内百姓日益凋殘糧無半菽室如懸磬以不急之務擾至疲之人竊顧心顏益增􅌤懼又比來耆壽陳狀是官吏指麾恐以臣備位台司妄為希附縱有勤請或非矯飾所祈聖造特遂愚衷區區之誠敢以死請無任懇迫之至第四表臣子儀言伏以奉天華州耆壽請為臣立碑及生祠臣自揣功業至薄不足以當刋紀百姓至敝不可以興力役歴獻愚欵至于再三言不動天未蒙允納夙夜兢懼不遑寧止臣非有馬援南征之績竇憲北伐之功安敢飾詞以陳謙讓但以兵革不息十年于茲天下之人未獲其所臣幸備相位尚負憂責頃歲之克復京都去冬之小却夷醜所有微效皆禀聖謀然未能使其干戈盡銷郊甸罷警北有亡命之虜西有無厭之戎公卿大夫未免肝食臣幸而獲宥其榮已多豈可竊功僥名以圖不朽其若千古何昔漢為霍去病理第辭以匈奴未滅何以家為况今殘孽尚存而敢播美金石臣雖才不逮名竊慕古人之志所望再効駑蹇遠斥兇渠三虜之首必懸四海之波自定從茲偃伯可以息人然後紀功亦未為晚臣以誠願實在於斯伏乞聖恩特遂勤請無任惶怖懇迫之至為杜司徒讓淮南立去思碑表劉禹錫臣某言伏見淮南節度使王鍔一作諤下同所奏當道將吏僧道耆老集作壽等請為臣立去思碑伏奉聖旨允其所奏内惟菲薄聲績無聞祗荷恩私慙懼交至臣某誠惶誠恐頓首頓首臣伏蒙先朝過奬累典方隅頃鎮江都十有四載數周星紀水旱備經境接淮濆兵戈時起至於邑里粗免流離非臣所能悉禀聖化在唐堯可封之日奚假吏才集師作當漢宣責實之時皆承詔旨王鍔與臣交代輙有上聞况以去思為名慙無可紀之績伏以建碑示後集作有制甲令􅂷文苟非至公則翻集作翻益貽誚臣伏覽故事宋璟自廣州都督入拜集作為尚書南海之人請刋樂石璟自懸集作遜讓至於再三雖勒其文竟從降制在於國史集作著在國典舉集作垂為美談璟非苟榮人益見德臣才誠不逮心實慕之伏乞聖慈賜寢前命情非飾讓義在狥公無任懇欵之至謹奉表陳讓以聞代公主讓起新宅表六百五卷重出今已削去李嶠臣妾言伏承聖慈以妾居處􅄶狹欲開拓宅北更起新第恭聞睿旨不勝慙惕陛下骨肉之愛天至而溟深敦叙之風日隆而月厚乃復推心連萼結念同胞方欲廣沁水之庭除增常山之版築雖殊恩曲奬惠澤實浸於肌膚而妨公害私謗訕恐盈於道路况臣妾承靈天妹藉寵王姬輿服亞於椒宫土田方於茅社甲第之當衢向術並列三區别廬之帶水連山將盈萬畝深埓則可乘騏驥高樓則唯待鳳凰常憂瞰室之易災實懼滿堂之難守寧可更求輪奐别構崇深擾閭里之甿黎傾國家之府藏且鬼神所福常矜於缺隅賢聖􅂷箴必誡於豐屋孫叔辭良沃之土晏嬰求湫隘之居妾雖愚蒙頗聞訓典實願歸一作遐師老氏以止足自防仰慕周公將逸豫為戒但希安分於容膝非敢攀榮於潤身且坊為要衝地當貴里畝賃二三十貫居人四五百家奪其近市之門閭生其破家之怨讟雖下人之不語豈愚妾之能安又妾之平生每存捨施屈身濟物心所願為益已害人情豈能處今麥苗雖盛榖價未豐家少糧儲人多菜色但可勸耕耘之業未宜興土木之功伏乞俯察愚誠傍詢衆望體東作之尤要知西第之非急收茲霈澤惠被黎蒸則天下蒼生孰不欣幸無任悾欵屏營之至謹遣某官詣朝堂奉表陳請以聞謹言為公主辭家人畜産官給料表臣妾等言妾聞賢相防微格一作杜盈門之車騎通人酌損忌滿堂之金玉尚子平之讀易富不如貧孔宣尼之立言奢也寧儉永言故實此為明鑒妾等並承靈坤載荷䕃中樞或天妹申慈忝扶桑之瑞萼或王姬藉寵竊穠李之奇秀開沁水之園苑賜常山之湯沐牓懸金字分衢離巽之宫路夾銀河並列星辰之位通秘籍於龍廷之内枉仙輿於鳳樓之下殊私曲奬以日而繫年縟禮崇徽夸今而邁昔兼復别隆朝旨猥存家務輿臺供𨽻之衣食棧廐豢牢之秣養並廻中府俱出大農聚終歲之儲但慿絲紱供闔門之費不煩機杼仰祗鴻澤退省微躬生以地高徒竊雲霄之幸寵非德進曾微纎芥之勞何義而虛受渥恩何功而謬延賞賜是用每積慙悚常憂顛沛敢忘周公逸豫之誡深念老氏止足之言乞留聖慈俯鑒愚懇使榮無過腆滿不至溢國邑田租之常料既已豐殷馬牛陪𨽻之雜供並希停減庶得無耗府實稍清朝謗長轂逺馭不逢於致寇之人高門洞開無怯於害盈之鬼不任兢悚愧懼之至謹遣某官詣朝堂奉表陳請以聞為裴駙馬讓官與父表臣某言臣聞善則歸君臣之報主功推於父子所榮親臣本愚賤幸承門閥擢自弱齡得尚公主耀一作輝宗榮黨向已七十年成名效能曾未之有得是以昧死旒扆陳情控告臣某中謝臣聞情隱而言不吐者事君之罪人心孝而迹未行者事親之逆子臣擢自泥滓起登上第受國之寵負親之恩情所隱而言未吐者敢奏於今日臣門閥少薄冐因遺緒父叔昆弟忝列朝班唯臣一身特拜都尉然駙馬之位因天所封寺卿之階何功受賞富過宗祖榮過棠棣無德而祿將何以堪臣父正議大夫前太子少詹事臣居士夙預周行早規陳力頃以天波溥洽許順懸車然朝命先霑已三十載累年効職復十數遷金紫末階爰從致仕桑榆尚早實願榮班臣亦何人獨多勲賞臣聞父子罪不相及而官獨踰於父雖爵因天假不限高卑而官入私門自多伊愧每用責躬晨省􅌤惡疑作靣朝端臣子之情祗所不忍伏乞以臣在身三品并見在進讓臣父本品降賜於臣貴得秩祿相次承寵朝聞夕死實所甘心伏願陛下容臣恭讓允臣愚懇非直聖朝高孝理之風抑亦微臣盡為子之道文苑英華卷五百七十八
