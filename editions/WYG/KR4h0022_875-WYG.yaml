body:
  text: 文苑英華巻八百七十六宋李昉等編陵廟梁宣帝眀帝二陵碑一首栁州羅池廟碑一首白楊神新廟碑一首野廟碑一首梁宣帝眀帝二陵碑韓休有梁拓跡開統建邦立號皇業始於憂勤霸功成於海縣乃昭事上帝惠綏逺人文軌通於四表正朔繼乎三代属天歩未夷皇綱中圯巨猾開釁大盗潜移宗廟鞠為禾黍衣冠淪于塗炭則我梁之業将墜於地國之郊禋葢無主矣而天未絶商鼎猶祀夏炎精翳而復揚文徳懿而方肇眀命斯在神休允歸則我中宗宣皇帝代宗眀皇帝乗彼樂推撫其歸運者矣宣皇帝諱詧眀皇帝諱巋姓蕭氏蘭陵中都里人也房雲祚商大火封宋功昭革夏之業徳盛明周之禮故能慶緒崇􅃡哲源浩濬樂叔之封既命遂列於諸侯髙辛之祚克昌俱有於天下始宋公子食采於蕭國以得氏其後居于豊沛自漢丞相何侍中彪奕世載羙不忝前烈洎于裔孫整東晉淮隂令始渡江居于南徐州之蘭陵焉整生雋及鎔雋曾孫道成是為齊髙帝鎔以四代孫丹陽尹順之生髙祖武皇帝衍髙祖生昭明皇帝統宣皇即昭眀皇帝之子眀皇即宣皇帝之子也降元精之吉乗正陽之氣星斗發祉日衡兆祥徳叶於天地之和名書於帝王之籙故其本枝崇慶歴試肇迹勿用而履夫重剛明夷而蒙彼大難乃鞠旅樊沔投戈雍梁政始東國化行南紀取長沙而兵不血刃戰江夏而舉無遺䇿推賢用之而如不及委政授之而心不疑一作不疑心誅􅜦羿而廓天闗掃欃搶而清帝座遂撫方夏用膺徽號訓兵同於一旅申命式于九圍克祗上靈之睠光啓中興之業于斯時也飛鴻滿野戎馬生郊庭旅荆棘室同煨燼由是躬大禹之菲薄同衛文之節儉千里襁負一年成都適其樂國歸我有道者葢同于遷豳而居此也於是蒐夣澤朝渚宫五徳配天二郊在國不失舊物重覩漢官之儀叶于新命還秉宗周之禮用能布令結援脩好申盟我譽延乎四方人心洽於一徳始則誕受多福終亦繼明重熈豈維敵國挫師克申威武信亦強隣結好芬若椒蘭謹其外虞𢎞我邦本孝心䖍於紱冕儉徳過於茅茨立教以至仁為宗𢎞風以清浄為樂豈非古之聰眀神武而不殺者夫方欲觀兵上國清蹕中壤混一區宇削平四方而乾道臨於大過雄圗屈於知運霸功則肇王業未𢎞雖慷慨於當年竟遲回於卒嵗者矣嗚呼陵谷驟改市朝無處荒墳巋然蔓草蕪沒孟嘗尊貴獨愴雍門之言魏武英威空留士衡之吊有可悲矣嗣子琮属金陵畢氣天禄永終山川不出於伯符歴數有同於歸命終我梁祚是為虞賔其天意也豈人事也次子珣梁南海王隋左光祿大夫梁國公食邑三千户贈遷州刺史承百祀之重禀二宗之慶恩昭異代禮崇備物子鈞皇朝中書舎人率更令崇賢𢎞文兩館學士鈞子灌皇朝渝州長史贈吏部尚書疇其慶靈俾爾戩榖盛名昭於海内髙秩謝於人寰實彰燕翼之宜克享褒崇之禮嗣子曰嵩金紫光禄大夫吏部尚書兼中書令河西節度經畧度支營田九姓長行轉運等副大使知節度事判梁州事赤水軍使檢校天下諸軍兵募徤兒使集賢院太學士上柱國徐國公秉靈迪哲體道𢎞正自我人秀惟其國禎亮采而三階已平疇咨而九功式序紏易王慝緝熈邦政文武體用清眀在躬地奉紫垣之寵門延絳河之貴永言孝思式是前烈雖大統云集而鴻芬莫記時逢䘮亂跡昧於亡隋之年運属光華功盛於有唐之日邱墟遂逺碑表莫存豈使配天之功不勒於金石終古之羙永翳於邱山式繼武於烝夷俾披文於大隧􅃡思至道俯課虚懐幸陪論政之餘空愧知音之託乃為銘曰天祚我梁受命而王於穆烈祖昭惟武皇徳配華夏功成剪商克受丕祉𢎞兹太康隂極為剥泰終而否九伐未脩四郊多壘戎州孔熾王室如燬不有繼眀孰彰代祀四子有命二宗代興歴數攸在天人叶徴靈心允洽𤣥徳昭升奄有成命其歸與能長江作限上京未復永念殊邦思同比屋拔山雖壮逝水何速嗣王不辰終我天祿洪惟徳門卓彼孝孫弼我王道𢎞其政源式播前烈貽厥一作将貽後昆勒兹琬琰永馥蘭芬一作蓀已矣焉哉昭邱一望盡煙埃楚塞斷兮荆門開􅃡千里以環繞一作迴見二陵之崔嵬銅臺虛兮繐帳暗金扃閟兮黄鳥哀嗚呼百年人畏其神者豈獨軒轅之臺栁州羅池廟碑韓愈羅池廟者故刺史栁侯廟也栁侯為州不鄙夷其民動以禮法三年民各自矜奮集有曰字兹土雖逺京師吾等亦天氓今天幸惠仁侯若不化服我則非人於是老少相教語莫違侯令文粹作命凡有所為於其鄉里及於其家皆曰吾侯聞之得無不可於意否莫不忖度而後從事凡令之期文粹作凡期之令民勸趨之無有後先必以其時於是民業有經公無負租流逋四歸樂生興事文粹作讓宅有新屋歩文粹作渉非有新船池園潔脩猪牛集注作羊鴨鷄文粹作鷄鴨肥大蕃息子嚴父詔婦順夫指文粹作教嫁娶𦵏送各有條法出相弟長入相慈孝先時民貧以男女相質久不得贖盡沒為𨽻我侯之至按國之集注有經字故以傭除本悉奪歸之大脩孔子廟城郭巷道文粹作道巷皆治使端正樹以名木栁文粹作而民既皆悦喜與其部将四字石本作嘗與其部将文粹作嘗與郡将魏忠謝寧歐陽翼飲酒驛亭謂曰吾棄於時而寄於此與若文粹作君等好也眀年吾将死死而為神後三年為廟祀我及期而死三年孟秋辛夘侯降于州之後堂歐陽翼等見而拜之其夕夣翼而告文粹有之字曰館我於羅池其月景辰廟成大祭過客李儀醉酒慢侮堂上得病諸本作疾扶出廟門即死眀年春魏忠歐陽翼使謝寧来京師請書其事于石余謂栁侯生能澤其民死能驚動禍福之以食其土可謂靈也巳作迎享送神詩遺栁民俾歌以祀焉而并刻之栁侯河東人諱宗元字子厚賢而有文章嘗位於朝光顯矣已而擯不用其辭曰荔子丹兮蕉黄雜肴蔬兮進侯堂侯之船兮兩旗渡中流兮風泊之待侯不来兮不知我悲侯乗駒兮入廟慰我民兮不嚬以笑鵝之山兮栁之水桂樹團團集作如此是英華作團圓非兮白石齒齒侯朝㳺兮暮来歸春與猿吟兮秋鶴與飛文粹作秋與鶴飛北方之人兮為侯是非千秋萬嵗兮侯無我違福我兮夀我驅癘鬼兮山之左下無苦濕兮髙無乾秔稌充羡兮虵蛟結蟠我民報事兮無怠其始集注一疊始字自今兮欽于世世白楊神新廟碑令狐楚道太原而北列郡數十鴈門為大在周秦時與山戎林胡犬牙其疆國家以文徳柔惠而驅去之北跡距塞口猶千里而逺若内地控于通都秩二千石者非休勲懿徳則名王旄士乙亥嵗今尚書隴西李公㢘刺并部選第郡政之尤異者得昌化守南康郡王河南元韶首表其名遽聞于天璽書勞勉移理於代惟南康以壮事老謀逮事先侍中平王則尚書郎寧王勤於君惠於人而敬恭於神由是神降之福人懐其徳是嵗夏五月赤車彤襜至自石州初一日㑹計于官次察掾吏之勤惰次二日存問于里閭求人民之利病既三日徧祭于山川神祗葢無停隂鑾不輟聲于郡東凡四十里白楊有祀實代之主也嘑水旁注鴈門山前峙䃲礴相抵為堆為阜蘙薈柯條如虬如龍廣僅百畆厥髙又倍信可以回薄日月而避逃風雨豈朔漠之氣凝結於此乎坤元之精决泄于此乎不然其何以巍巍蒼蒼将欲戞若木稍扶桑卑大椿於漆園小蟠桃于東方與夫古墓多悲蕪城早落者不同品矣按諸經記且曰昔元魏髙祖孝文由一成而宅九有起雲中而馭天下損益三代憲章百王厥初經營由此途出繫馬其下歇鞍于枝威靈所憑别白而在既偃頓以附土又跳騰而架空如有髙掌蹠為鳥勢形洎今朝中書令燕公説摹詠其事張公白楊篇之本章云欲識前王塔鞍處正北苖抽一小枝户部侍郎吉公中孚申而眀之建中初吉公以萬年尉為黜陟判官至此為之歌序具載其事焉故迹彌顯髙名益大為屏為圗播于海嵎代人神之是以祠也而舊規相襲未甚𢎞麗簷牖東嚮椽欒内有祅蠱之氣無尊嚴之威式車馬者以避禍非以致敬奠蘋蘩者惟徼福不惟饗徳猶此祀也不亦涹疑孝文於代乎南康其孫也大懼夫祖徳之墜于地因愀然而言曰於古有召公奭以區區陕服為周二伯行野聽訟憇於廿棠後之必思其人猶愛其樹其在詩曰勿剪勿伐召伯所茇矧我烈祖有開國之武麗天之文撫正萬方照臨四海而又儲祉降徳于後子孫俾不佞起家而王專城為守愧不能顯揚先羙使若黄帝幸君之使使理此土敢黷於祭祀是􅀢于功烈而速其罪戾也一年因農之隙而易其地二年乗嵗之豊而改其製不三四年得請于上而新廟成南面衮服所以稱尊也兩楹阼階所以定位也築墉于外所以禦侮也設屏于前所以修容也耽耽沉沉顯敞靚深不風而清無雲而隂前王戾止之儀於是乎在裔孫聿追之孝於是乎舉不唯禁淫祀廢非禮抑亦開眀徳摛耿光欲使異日觀者不俟請書問俗而知樹之所由植廟之所由崇諗於有知僉曰非頌聲不可初南康之典化顧嘗客焉迨今剖符則又備位于隴西公之府相得最舊見䋲為文故敢徴成之功與作之義篆刻貞石立于前楹庶擬衛悝彛鼎之銘敢同魯僖閟宫之什銘曰蔚彼白楊叢生鴈門䝉暑翳寒晴天色昏巨抵交柯龍翔虎眠從古強名莫知其原惟昔魏帝于枝息鞍懸垂低昻厥迹猶存大畏其力小懐其恩爰有靈祠號為神眀二扉不扄四簋不陳樵蘇所往雉兎為隣於鑠良牧時惟孝孫下車之初致敬而言蔽芾甘棠猶思其人綿綿葛藟下庇於根乃正名居式崇藩垣山立當宁翼張重軒有赫斯皇既嚴且尊允矣君子孰如其仁大椿之年細栁之軍吾與元也人誰間然欲載其功莫先於文編詞琢石終古不遷野廟碑陸龜蒙碑者悲也古者懸而窆用木後人書之以表其功徳因留之不忍去碑之名由是而得自秦漢以降生而有功徳政事者亦碑之而又易之以石失其稱矣余之碑野廟也非有功徳政事文粹作政事功徳可紀直悲夫甿竭其力以奉無名之土木而己矣甌粤間好事鬼山椒水瀕文粹作濵多淫祀其文粹有廟字貎有雄而毅黝而碩者則曰将軍有温而愿哲而少者則曰某郎有媪而色文粹作尊嚴者則曰姥有婦而容艶者則曰姑其居處則敞之以庭堂峻之以階文粹作陛級左右老木攅植森拱蘿蔦翳其集作于上梟鶚集作鴻鶚室其間車馬徒𨽻集作從叢雜恠状甿文粹作農作之甿怖之大者椎牛次者擊豕小不下犬鷄浙本作鷄犬魚菽之薦牲酒之奠􅆙於家可也􅆙於神不可也一日文粹作廟懈怠禍亦隨作耋􅐐畜牧慄慄然病疾㓕蜀本作减浙本作死䘮甿不曰適丁其時耶而自感而集作其生耶文粹無此字悉歸之於神雖然若以古言之則戾以今言之則庶乎神之不足過也何者豈不以生能禦大災捍大患死死字文粹作其死也則血食於生人無名之土木不當與禦災捍患者為比是戾於古也眀矣今之雄毅而碩者有之温愿而少者有之升階級坐堂筵耳絃匏口梁肉載車徒集作馬擁僕文粹作徒𨽻者皆是也解民之懸清民之暍未嘗術浙本作貯于胷中民之當奉者一日懈怠則發捍吏肆淫刑敺之以就事校浙本作較神之禍福孰能浙本作為輕重哉平居無事指為賢良一旦有大夫之憂當報國之日則恇撓脆怯顛頓文粹作躓竄踣乞為囚虜之不暇此乃纓弁言語之土木耳又何責文粹有其字真土木耶故曰以今言之則庶乎神之不足過也既而為詩以亂其刑曰二字集粹作末土木其形竊吾民之酒牲固無與集粹作以名土木其智竊吾君之祿位宜如何集粹作如何可議祿位頎匕酒牲甚㣲神之饗也孰云其非視吾之碑知斯文之孔悲文苑英華巻八百七十六
