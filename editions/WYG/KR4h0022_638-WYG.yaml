body:
  text: 文苑英華巻六百三十九宋李昉等編薦舉下為濮陽公舉人自代狀一首為尚書渤海公舉人自代狀一首為懐州刺史舉人自代狀一首為滎陽公奏一作舉王克明等充縣令主簿狀一首為滎陽公舉人自代狀一首為鹽州奏李孚判官狀一首為濮陽公奏韓琮等四人狀一首為安平公奏杜勝等四人狀一首薦前漢州刺史薛元賞狀一首薦前淮南節度掌書記殿中御史狀一首薦澧州刺史崔雲狀一首薦觀察判官陸暢請章服狀一首為薦濮陽公陳許舉集作請人自代狀李商隱右臣伏準某年月日勑内外文武官上後三日舉一人自代者臣伏見前件官欒郤舊族鄒魯名儒鏡納無私集作疫山髙不讓而又循牆戒切銘座規深蘭省辭榮竹符出守漢悲來暮晉有去思晦而轉明集作彰浼而尤白既還綸閣復掌禮闈人驚吞鳯之才士切登龍之譽集作望及司版籍以副地官比按西羗孤忠靡失集作按比罔差初終靡失居然國器實映朝倫今沔水無兵武昌非險用為亷問尚鬰廟謀臣所部乃秦韓戰伐之鄉周鄭郊圻之邑軍踰千乗地控三州若以代臣必為名将敢希睿澤曲遂愚𠂻俾寛竊位之譏冀受集作獲進賢之賞干冐陳薦無任兢越謹録奏聞伏聼勑㫖某官崔蠡在前為懐州刺史舉人自代狀右臣伏準建中元集作一年正月五日勑内外文武官到任三日舉一人自代者臣伏見前件官汾陽啓胄沙麓遺芳佩觽之辰平居不戲加冠已後出言成章本以詩書綽有機斷奉隂郭之良躅集作徹御集作御非馬鄧之明集作成規臣以集作與其祖禰已來藩宣相接雲臺髙議同承鍾鼎之餘麟閣舊圖共著河山之誓交深志見年齊道均今河内名邦覃懐巨郡南蕃鳯闕平分晉鄭之交北控羊腸方有干戈之役推讓雖循於故事薦聞實切於私誠伏乞聖恩特允臣志無任感恩推賢之至謹録奏聞伏聼勑㫖為尚書渤海公舉人自代狀某官周墀右臣伏準某年月日勑内外文武官上後舉一人自代者伏以京邑為四方之極咸秦乃天下之樞必命英髦以居尹正臣謬䝉抽擢素乏材能将何以風彩章臺羽儀華囿集作省况又方營咸集作凾鄗畢肇集作肇建園陵苟推擇之不先則顛覆而斯在前件官莊栗以裕簡嚴而寛玉無寒温松有霜雪頃居内署實事文皇引􅅂而外朝莫知視草而中言罔漏洎分符近甸亷印雄藩不狥物以沽名善推誠而立斷渾集作藹若全器宜乎在庭儻召以急宣被之眷渥必能明張條目峻立隄防肅千里之封畿惣集作殷五都之貨殖軒英華作燕非臺禹穴無虧充奉之儀漢苑秦陵盡絶椎埋之黨特乞俯廻宸斷用授當仁免今日之叨恩冀他時之上賞干冐陳薦兢越伏深某官崔龜從伏以内史故事例帶銀青尹正舊儀平揖令僕必資髦碩方備次遷臣特以鯫儒猥丁昌運位崇八座官紹三王况駕有上僊居當晏出務煩廐置役重津途儻讓爵之不思則敗官而斯疚前件官荆岑挺價赤堇揚鋒禀松筠四序之榮包金石一定之調由中及外自誠而明昨者故鄣利遷朝臺受律隱之清節無媿於投香江革歸資唯聞於单舸必能集同軌之㑹奉因山之儀使桴鼓稀鳴建瓴流化伏乞特廻鳯詔以命龜從成聖朝棫樸之詩減㣲臣維鵜之刺干黷旒扆伏用兢惶為滎陽公舉王克明等充縣令主簿狀前人以前件狀如前伏以臣所部控聨谿洞叅錯蠻髦水接重湖山當五嶺縱有天官注集作恣非擬多縁地理幽遐或不出上京已發徒勞之歎或蹔來屬邑即聞歸去之辭既經久而不謀亦柔良而曷寄臣謬膺亷部慮在曠官儻旬朔以無言則賦輿而必闕前件官或膏梁遺胄或英俊下僚雖寓遐陬久從試吏假之銅墨有意於鳴琴委以簿書不羞其棲棘既聞績用合有甄昇一則復逺俗之凋殘一則輕㣲臣之憂責苟事因請託跡渉貪殘将有負於斯人豈敢逃於舉主伏乞希卑聼咸賜即真干冐宸嚴無任兢越為滎陽公桂州舉人自代狀某官裴俅右臣伏準某年某月日勑内外文武官上後舉一人自代者伏見前件官􅘌鄉茂族洛下名生處家國以必聞善兄弟而無瘉而又南翬耀彩東箭含筠身先較藝之場首出觀光之籍從外府而允稱賢佐立中臺而克號清郎洎時急昌言官登大諌楊阜常規於法服陳羣盡削其封章實於不咈之朝能守勿欺之㫖臣所部俗分蠻徼地控越城藉威畧以靖封隅資簡惠而安疲瘵願廻殊渥以授當仁豈㣲敬仲英華作豈為敬重非之才兼有伯游之長俯從牢讓方免曠官特冀宸嚴曲垂矜許干冐陳讓惶越無任為鹽州刺史奏舉李孚判官狀前人某官李孚右件官克生公族早履宦途器實幹時辯能専對加之夙明韜畧久逐旌旃頃為己知屈從吏議許休文之流浪萬里非賖王仲宣之播遷三年未遇儉而不懟困且能通雖何恤於無家良可悲其絶籍去歲以惟新之命大洽鴻私亦既旋還合從叙用開成五年十一月十三日吏曹已注右威衞倉曹叅軍授官未謝又䝉挾名除替初云牽復仍迫屢空京口劉生方思鵝炙洛陽蘇子已弊貂裘方今崇唐集作帝堯敦厚之恩推魏文光榮集作榮樂之㫖豈令棄良材於散地化王孫為英華作於非旅人臣素乏器能叨膺任使控緑池之要地守清澤之堅城将以宣布威靈彈壓氛祲苟咨謀失所佐理非材豈惟墮此軍聲兼且傷於朝寄臣深自計孚實當仁况又得於諸宗且兼通舊諸葛均有因依之分龎士元多鍳裁之恩是敢輙黷宸階乞榮賔席使得盡其風力佐彼邉陲錐處平原之囊必將頴脫劒拭華隂之土粗雪幽沉請依資賜授一官充臣防禦判官干冒冕旒無任戰越為濮陽公陳奏韓琮等四人充判官狀韓琮右件官早中殊科榮推雅度絃柔以直濟伏而清頃佐憲臺且丁家難當䘮而齒未嘗見既祥而琴不成聲逮此變除未䝉抽擢臣頃居闕守琮已列賔僚謀之既臧剛亦不吐願稽中選榮借外藩伏請依資賜授憲官充臣節度判官叚環右件官言思無諂集作邪學就有道屢為從事甞佐正人加以富有文辭精於草𨽻雋而且檢通亦不流臣所部稍逺京都每繁章奏敢兹上請乞以自隨狀請依資賜授憲官充臣節度掌書記裴蘧右件官魯國名儒􅘌鄉右族松寒更翠馬老不迷臣昔忝鑿英華作監非門辟為記室屬辭而夙構無異論兵而故校多歸畫集作委以前籌見其餘地伏以前任大理評事已三十三箇月比於流輩已是滯淹伏請特授憲官充臣觀察支使夏侯曈右件官藏器於身為仁由已齊莊難犯勁挺不摇臣任切循良集作拊循務繁稽勾思留仙尉以重賔階伏請依資改授一官充臣節度廵官以前件狀如前臣四朝受任三鎮叨榮慕碣石之築宫廣延儒雅効西河之擁篲樂得賢才韓琮等竝無所因依不由請託久諳才地堪列幕庭伏希殊私盡允誠請謹録奏聞伏聽勑㫖為安平公兖州奏杜勝等四人充判官狀杜勝右件官流慶相門榮名詞苑當仁罕讓見義敢為符彩極高涯涘難挹臣前任已奏為判官臨事而每見公方與語而必相𢎞益今臣寄分團結集作練任切訓齊将奉廟謨實在賔彦賜守本官充臣團練判官趙䀸右件官洛下名生山東茂族仁實堪富天爵極高妙選文場亟仕侯國珪璋特達蘭杜芬馨今臣亷問大藩澄清列部籍其謩畫共讃朝經伏請賜守本官充臣觀察判官李藩右件官文囿馳聲賔階擅美口含言瑞身出禮門前任已奏為判官馭集作遥下而和易不流臨事而貞方有執今臣移叅國用務切軍須實假平均以同計畫伏請賜本官充臣觀察支使盧涇右件官博渉典經該覈流畧自魯壁所壊汲家之藏三篋能知五車盡究加之文采兼以器能前者為臣屬僚甞在州推獄明斷而不容吏黯哀矜而莫有人寃今者團練之司稽廵是切每集作直思奨勑集作効非敢用情伏請依資賜授法官充臣都團練廵官以前件狀如前伏以長人者必以吏分勞逸開幕者亦用士為重輕若不樹人何以報國况臣素無勲効謬竊寵榮至於賢才敢恡筐篚前件官竝推賔彦堪賛藩條伏希殊私盡允誠請謹録奏聞伏聽勑㫖薦前漢州刺史薛元賞狀張次宗右件官明敏多才幹能有用甞列班行之任亦専繁劇之司廣漢在蜀川之中最為大郡凋瘵之後為理甚難流庸自占者過九千家田業開闢者踰五百頃修兵甲則戎備斯足置什器則公用有餘事無不周去有遺美臣任當亷察備覩政能伏望聖恩特垂甄奨薦前淮南節度掌書記殿中御史李躔狀前人右件官禀性端方臨事果毅有清介之節擅文華之名操心不回居約可久臣去年有狀已具薦論累月在京未䝉奨擢儻置之諫署或授以憲官視一作迹其為人必能稱職輙再具論奏伏望天恩俯賜裁酌謹奏薦前澧州刺史崔雲狀右伏以前件官業尚儒學才通吏事言行無玷終始可觀有古人歲寒之心得君子時中之道所歴五郡去皆見思或在危疑之中能全名節或當徵發之際不擾疲人自理澧陽課績尤異得賦歛變通之法置郵館供待之資創立隄防修繕城洫事必可久政皆有經臣任忝宣風諳其履行若在郡無此實効豈敢輙有薦論伏望聖恩特加奨擢薦觀察判官陸暢請章服狀右件官植性謹和蒞事周敏詞賦中第篇什成名應物而精力有餘處煩而變通靡滯所委公事按牘雖一作甚多巨細無遺部斷尤速領刑獄之重人自不寃頒亷察之條法皆可久凖勑文使下檢校官凡至五品便得賜緋今陸暢前任秘書丞已是登朝五品即頗與格文相當又職事脩舉合當甄奨臣先已有狀未䝉允許今輙敢再具論奏伏望天恩特賜章服文苑英華巻六百三十九
