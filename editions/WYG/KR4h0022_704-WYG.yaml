body:
  text: 文苑英華巻七百五宋李昉等編文集七相國李公集序一首相國韋公集序一首禮部員外郎栁君集序一首衡州刺史吕君集序一首白氏長慶集序一首京兆元少尹集序一首著作佐郎顧君詩集序一首相國李公集序劉禹錫天以王集作正氣付偉人必餙之使光耀于世粹和絪緼積于中鏗鏘發越形乎外文之細大視道之行止故得其位者文非空言咸繋于訏謨宥宻庸可不記惟唐以神武定天下羣慝既讋驟示以文韶英之音與鉦鼓相襲故起文章為大臣者魏文貞以諌諍顯馬髙唐以智謀集作畧奮岑江陵以潤色聞無草昧汗馬之勞而任遇在功臣上唐之貴文至矣哉後王纂承多以國柄付文士元和初憲宗遵聖祖故事視有宰相噐者貯之内廷繇是釋筆硯而操化權者十八九公實得時而光焉公諱絳字深之趙郡人在貢士中傑然有竒表既登太常第又以詞賦外甲科授秘書省校書郎歳滿從調有司設甲乙問以觀决斷復居髙品補渭南尉擢拜監察御史未㡬以本官􅂶翰林學士居中轉尚書主客員外郎歴司勲郎中知制誥遷中書舍人風儀俊整敷奏讜切言事感動上輙目送之一旦召至浴堂門與語半日將移集作柄用于大寮稔熟民聽遂拜一字集作送出為非户部侍郎明年遷中書侍郎同平章事毅集作殷然有直聲及冊免而聞望益大周旋公卿間五為尚書歴御史大夫左僕射一以三公領太常刺近輔居保釐登齋壇皆再焉太和三年以司空鎮南鄭居二歳坐氣剛而折海内寃惜之後三年嗣子前京兆府户曹掾璆次子前監察御史裏行頊等泣持遺草請編之筆集作肇自從試有司至于宰天下詞賦詔誥封章啓事歌詩贈餞金石颺功凡四百餘篇勒成二十巻上所以知君臣啟沃之際下所以備風雅詩聲之義洪鍾駭聽瑶瑟清音其在翰苑及登台庭亟言大事誠貫理直感神動集作通神祗龍鱗收怒天日廻照古所謂一言興邦者信哉始愚與公為布衣游及仕畿服幸同邑其後雖翔泳勢異而不以名數革初心今考其文至論事䟽感人肺肝毛髮聳然集作昏聳嗚呼其盛唐之遺直歟相國韋公集序漢庭以賢良文學徴有道之士公孫𢎞條對第一席其勢鼓行人間取丞相且侯使漢有得人之聲伊𢎞發也皇唐文物與漢同風故天后朝燕國公說以詞標文苑徴𤣥宗朝曲江公九齡以道侔伊吕徴德宗朝天水姜公公輔杜陵韋公執誼河東裴公垍以賢良方正徴憲宗朝河南元公稹京兆韋公惇以才識兼茂徴隴西牛公僧儒李公宗閔以能直言極諌徴咸用䇿甲科文粹集作對䇿甲於天下繼為有聲宰相古今相望落落然如騎星辰與夫啓版築飯牛者異矣公本名惇舉進士登賢良既仕方更名䖏厚字德載漢丞相扶陽侯之裔孫後周逍遥公敻之八代孫右僕射某之元子生而聰明絶人在提孩發言成詩未㡬能賦受經於先君僕射學文於伯舅許公孟容及壯通六經旁貫百氏咨天人之際遂探厯數明天官窮性命之源以至於佛書尤所通逹四字集作尤䆳初為集賢殿校書郎宰相李趙公監修國史引公直東觀就改咸陽尉遷右拾遺轉左補闕世稱有史才而能諌諍入尚書為郎歴禮部考功皆人望所在上方用威武以讋不庭宿兵寢乆韋丞相貫之酌人情上言不合意册免因歴詆所善公在伍中出為開州刺史居二集作三年執友崔敦詩為相徴拜户部郎中至闕下旬歳間以本官知制誥穆宗新即位注意近臣召入翰林充侍講學士初授諌議大夫續換中書舍人侍遊蓬萊池延問大義退而進六經法言二十篇優詔荅之賜以金紫尋遷權知兵部侍郎知制誥翰林侍講史館修撰長慶四年春敬宗踐祚以公用經術左右先帝五年稔聞其德尤所欽倚内署故事與外庭不同凡言翰林集作内翰學士必草詔書有侍講者專備顧問雖官為中書舍人或它官知制誥第用其班次耳不竄言於訓詞至是上噐公且有以寵之乃使内謁者申命去侍講之稱慮未諭于百執事居數日降命書重舉舊官以明新意尋直拜夏官貳卿由是内庭辭臣無出其右者凡宻㫖必承乎權輿故號承㫖學士上富有春秋未親庶政有疑集作凝滯視公如蓍龜寳厯季年宫壺間一夕生變人情大駭雖鼎臣無所關决惟内署得預叅畫四字集作叅焉群議悶集作開然俟公一言而定戡難纉服再維乾綱今上繼綂集作明䇿勲第一擢拜中書侍郎同中書門下平章事以髙才遇英主功顯人伏言無不從筆端膚寸澤及天下盡罷冗食請歸才人事先有司物止常貢城社無犯集作託巖廊益尊感恩盡瘁不嗇神用太和二年十二月上前言事未及畢辭疾暴盛文集文粹作疾暴作集作疾暴僨以朝服委地同列白奏搢笏扶持之不能起上命中貴人左右翼負文粹作輔歸於中書如大醉狀上震驚咨嗟徴醫賜藥旁午疊委㑹暮肩輿至第詰旦以疾集無疾字不起聞贈禭加常禮後十年嗣子蕃以太子舍人直𢎞文館編次遺文七十通衘哀貢誠乞序以冠其首謹按公文未為近臣以文粹作已前所著詞賦文粹無此二字讃論記述銘誌皆文士之詞也以才麗為主自入為學士至宰相以往所執筆皆經綸制置財成潤色之詞也以識度為宗觀其發德音福生人沛然如時雨褒元老諭功臣穆然如景風命相之冊和而莊集作壯命將之誥昭而毅薦賢能其氣似孔文舉論經學其博似劉子駿發十難以摧言利者其辯似管夷吾噫逄時得君奮智謀以取髙位而令名隨之豈不偉哉初蕃既纂修父書咨於先執李習之請文為領袖許而未就一旦習之悄然謂蕃曰翺昔與韓吏部退之為文章盟主同時倫輩栁儀曹宗元劉賔客夣得直韓栁之逝乆矣今翺又被病慮不能自述有孤前言賫恨無已將子薦誠於劉君乎無何習之夣奠於襄州蕃具道其語余感相國之平昔且嘉文粹作憐蕃之䖍䖍孝敬四字集作䖍敬庶㡬能世其家故不敢譲云爾六字集作固不譲云禮部員外郎栁宗元文集序八音與政通而文章與時髙下三代之文至戰國而病渉秦漢復起漢之文至列國而病唐興復起夫政龎而土裂三光五嶽之氣分扶問切太音不完故必混一而後大振初貞元中上方嚮文章昭回之光下飾萬物天下文士争執所長與時而奮燦焉集作然如繁星麗天而芒射集無射字寒色正人望而敬者五行而已河東栁子厚斯人望而敬者歟子厚始以童子有竒名於貞元初至九年為名進士十有九年為材御史二十有一年以文章稱首入尚書為禮部員外郎是歳以踈雋少檢獲訕出牧邵州又謫佐永州居十年詔書徴不用遂為栁州刺史五歳不得召病且革留書扺其友中山劉禹鍚曰我不幸以謫死以遺草累故人禹鍚執書以泣遂文粹作因編次為三十二文粹作四十五集作三十通行於世子厚之䘮昌黎韓退之誌其墓且以書來吊曰哀哉若人之不淑吾甞評其文雄深雅徤似司馬子長崔蔡不足多也安定皇甫湜於文章少所推讓亦以退之言為然凡子厚名氏與仕與年暨行已之大方有退之之誌若祭文在今附于第一通之末云退之言集作退之之言衡州刺史吕君集序五行秀氣得之居劉集作若非多者為雋人其色㶑灔於顔間其聲發而為文章天之所與有物來相彼由學而致者如工人染夏以視羽畎有生死之殊矣初貞元中天子之文章煥乎垂光慶霄在上萬物五色天下文人文粹作人文為氣所召其生乃蕃靈芝萐莆吕集作脯與百果齊拆然煌煌翹翹出乎其類終為偉人者㡬希矣東平吕和叔實生是時而絶人甚逺始以文學振三川三川守以為貢士之冠名聲四馳文粹作名都西馳速如羽檄文粹作翼長安中諸生咸避其鋒兩科連中鋩刃愈出德宗聞其名自集賢殿校書郎擢為左拾遺明年犬戎請和上問能使絶域者君以竒表有專對材膺選轉殿内史錫之銀章還拜尚書户部員外郎轉司封遷刑部郎中兼侍御史副治書之職㑹中執法左遷縁坐出為二字吕集作謫劉集無此二字道州刺史以善政聞改衡州年四十而歿後十年其子安衡泣奉遺草來謁咨余叙文粹作伸吕集作紬之成一家言凡二百篇勒成十巻集本無此四字和叔名温别字化光祖考皆以文章至大官早聞詩禮於先侍郎又師吴郡陸贄文粹作李質通春秋從安定梁肅學文章勇於藝能咸有所祖年益壯志益大遂撥去文學劉集作學與雋賢交重氣槩覈名實欽劉集作歆吕集作忻然以致君及物為大欲毎與其徒講疑考要皇王霸強之際臣子忠孝之道出入上下百千年間詆訶角逐疊發連注文粹作中得一善吕集無此三字輙盱衡擊節揚袂頓足信容得色舞于眉端以為按是言循是理合乎心而氣將之昭昭然若掲日月而行孰能閼其勢而争天光者乎劉集無乎字嗚呼言可信而時異道甚長而命窄精氣為物其有所歸乎古之為書者先立言而後體物賈生之書首過秦而荀卿亦後其賦和叔年少遇君而卒以謫似賈生能明王道似荀卿故余所文粹無所字先後視二書斷自人文化成論至諸葛武侯廟記為上篇其他咸有為而為之始學左氏書故其文㣲為冨豔夫羿之關弓唯巴蛇九日乃能盡其彀而廻注鷃爵亦要中於尋常之間非羿之手弓有能有不能所遇然而然也後之逹觧者推而廣之知余之素交不相索於文字之内而己白氏長慶集序元稹白氏長慶集者太原人白居易之所作也白集元集文粹並無也字居易字樂天始年二歳未白集元集無此字却疊樂天二字始言試指之無二字能不誤事具樂天與余書内始既言讀書勤敏與他兒異五六歳識聲韻十五志詞諸本作詩賦二十七舉進士貞元末進士尚馳競不尚文就中六籍尤擯落禮部侍郎髙郢始用經藝為進退樂天一舉擢上第明年中㧞萃甲科由是試諸本無試字性習相近逺求𤣥珠斬白蛇文粹有劔字等賦洎百道判新進士競相傳於京師矣㑹憲宗皇帝䇿召天下士樂天對詔稱㫖又中白集文粹作盛甲科未㡬選白集文粹無選字入翰林掌制誥比比上書言得失因為喜白集文粹作賀雨詩秦中吟等數十章指言天下事人比之風騷焉予始與樂天同校秘書前後諸本作之名非多以詩章相贈答㑹予譴掾江陵樂天猶在翰林寄與百韻律體白集文粹作詩及雜體前後數十軸詩本作章是後各佐江通復相酬寄巴蜀江楚間洎長安中少年逓相傚競作新詞自謂為元和詩而樂天秦中吟賀雨諷諭閑適等篇時人罕能知者然而二十年間禁省觀寺郵堠墻壁之上無不書王公妾婦牛童馬走之口無不道至於繕冩模勒􅃷賣於市井或持之以交酒茗者處處皆是杭越間多作碑模勒樂天及予雜詩賣於市肆中杭白集文粹並作揚其甚者白集文粹有有字至於盗竊名姓苟求自售雜亂間厠無可奈何予常於平水市中鏡湖旁草市名見村校諸童競習歌詠諸本作詩召而問之皆對曰先生教我樂天微之詩固亦不知予之為微之也又鷄林賈人求市頗切自云本國宰相每以百金換一篇其甚偽者宰相輙能辨别之自篇章巳來未有如是流傳之廣者長慶四年樂天自杭州刺史以右庶子詔還予時刺郡文粹作部白集無郡字㑹稽因得盡徴其文手自排纉成五十巻凡二千一百九十一首前輩多以前集中集為名予以為皇帝白集元集作陛下文粹作國家明年當改元長慶訖於是因號曰白氏長慶集大凡人之文各有所長樂天之長可以為多矣夫以諷諭之詩長於激閑適之詩長於遣感傷之詩長於切五字律詩百言以白集文粹作而上長於贍五字七字百言而下長於情賦賛箴誡之類長於當碑記叙事制詔長於實啓奏表狀長於直書檄詞䇿剖判長於盡揔而言之不亦多乎哉至於樂天之官族景行與予之交分淺深非叙文之要也故不書長慶四年冬十二月四白集作十日微之叙白氏長慶集五帙都五十巻通後集七十巻三千七百餘首京兆元少尹集序白居易天地間有粹靈氣焉萬類皆得之而人居多就人中文人得之又居多盖是氣凝為性發為志散為文粹勝靈者其文冲以恬靈勝粹者其文宣以秀粹靈均者其文蔚温雅淵凝䟽朗麗則檢不阨集作扼逹不放古常而不鄙新竒而不恠吾友居敬之文其殆庶㡬乎居敬姓元名宗簡河南人自舉進士歴御史府尚書郎訖京兆亞尹凡二十八年著格詩一百八十五律詩五百九賦述銘記書碣賛序七十五總七百六十九章合三十巻長慶三年冬遘疾彌留將啓手足無他語語其子途云吾平生酷嗜詩白樂天知我者我歿其遺文得樂天為之序無恨矣既而途奉治命號而告予無㡬何㑹予自中書舍人出牧杭州歳餘改右庶子移疾東洛明年復刺蘇州四年間三換官往復奔命不啻萬里席不遑煖矧筆硯乎故所托文乆未果就其刺蘇州又劇郡治數月政方暇因發篋閱睹居敬所著文集其間與予唱和者數十首燭下諷讀憯惻乆之怳然疑居敬在傍不知其一生一死也遂援筆草序序成復視涕與翰俱悲且吟曰黄壤詎知我白頭徒念君唯將老年淚一灑故人文重曰遺文三十軸軸軸金玉聲龍門原上土埋骨不埋名嗚呼居敬若職業之恭慎居䖏之莊潔操行之貞端襟靈之擴澹骨肉之郭愛丘園之安樂山水風月之趣琴酒嘯吟集作咏之態與人乆要遇物多情皆布在章句中開巻而盡可知也故不序時寶厯元年冬十二月乙酉夕在吳郡西園北齋東牖下作序著作佐郎顧君集序英華分文粹序詩集序作兩門按皇甫湜集題作顧况詩集序則當在七百十三巻英華既編入文集門或恐不專是詩姑仍其舊皇甫湜吴中山泉氣象文粹作壯英淑恠麗太湖異石洞庭朱實華亭清唳與虎丘天竺諸佛寺鈞錦繡絶君出其中間翕輕清以為性結泠汰以為質呴鮮榮以為詞偏得文粹無得字於逸歌長句駿發踔厲往往若穿天心出月脇意外驚人語非尋常所能及最為快也李白杜甫已死非君將誰與哉君諱况字逋翁以文入仕其為人類其詞章甞從韓晉公於江南為判官驟成其磊落大績入佐著作不能慕顧集作順為衆所排為江南郡丞累歳脱縻無復北意起屋於茅山意飄然若將續古三仙以夀九十卒湜以童子見君揚州孝感寺君披黄衫白綃集作文粹作絹鞈頭眸子瞭然燦燦集作文粹作炯炯清立望之真白珪振鷺也既接歡然以我為揚雄孟軻顧恨不及見四文粹作三十年於兹矣知音之厚曷甞忘諸去年從丞相凉公襄陽有曰集作白顧非熊生者在門訊之即君之子也出其詩果工䄂君集八字集作出君之詩集二十巻泣請集作示余發之凉公適移蒞宣武軍余裝歸洛陽諾而未副今又稔矣生來速文乃題其集之首為叙文苑英華巻七百五
