body:
  text: 文苑英華巻五百二十九宋李昉等編戸貫帳籍門二十三道大比判一道登夫家判二道造帳籍判二道書齒判一道兩貫判四道附貫五年復訖判二道移貫判一道戸絶判一道移鄉判三道徙鄉判一道樂土判三道移貫判一道還墳判一道大比判乙因大比有橘奴不書於版三老罪之云賦不闕對鄭韶貢賦有差彰乎昔典貧贍斯别煥彼前書故地之居人因俗而理制以廬舎為之井田考市籍而有倫工商式叙稽版圖而作範衆寡必登斯道或􅄽彞倫攸斁乙産均猗頓術得計然忝列編甿有虞常賦雖貞筠十頃稍異渭濵之饒而木奴千頭自擅江陵之富爰因大比用奉舊章隠而不言國有彞憲籍為大信命出惟行三尤論辜宜察鄉人之惡五刑必審是詰所由之科庶書橘有差自甘於屈法坐棠流惠克念於徇時登夫家判乙以嵗時登其夫家辨其可任者甲免訴云服公事不伏對魏季邁天子六官司徒九比稽其徴令登以嵗時力役於是必均弛一作施舎自當率理有國之要無相奪倫乙職彼鄉師何速官謗或虧我道孰守爾法且四人分任所以定乎等衰一切從徭何以彰乎貴賤甲乃為吏有别夫家辨任必欲執文復除自慮蒙幸與同夫者君役不及於支離長服事焉爾政何傷於滅裂苟欲逹於鄉黨豈辱在於泥塗訟則有孚理合無撓免之或可誰曰不然載徴司馬之書難舉鷞鳩之典同前都鄙攸創郊畿是畫聚之以廬井統之以師長且用稽衆寡差夫賦役爰别夏制備詳周官務欲先稽逸勞載量輕重乙為何者登彼夫家不能種之以徳而乃辨其所任若使名𨽻黨正事職鄉人尚宜式著平均允釐升降明練九比之數不害三時之理歸市籍者出乎筭從王政者息其徭奚一作畧無恤人之心聿興從欲之訴服公事以求免甲誠有詞倚公法而取削乙則無妄造帳籍判户部符下諸州令造帳籍州司以百姓艱辛人未歸復請待兵散後造省司不許云人為國本賦在均平户若不知軍何取給對宋全節國之彞倫資於版籍儻或廢闕是長姦囬頃者寰海㣲波編戸失業枌榆暫别蓬籜無歸聖朝提象握符再造區夏矜百姓之流蕩廢三年之典故且量地出稅據丁授田法在畫一事宜經乆永言州府恤此疲人曾無革弊之規徒徇隨時之義昔漢朝倉卒猶或先收今歴代升平寧容後造租賦所繫不可憑虚豪右主藏湏從摭實欲施小惠亂我大猷人有憚於暫勞國遂忘於固本州司所見頓昧通途爰扣两端敢申獨見同前蘓倩之四海既清萬人求理在乎平均井賦議計師田條閭里之政役辨夫家之名數是分衆寡無失重輕必當按彼版圖稽其勞逸故三年大比國有彞倫百役小差人其胥怨由是周官克崇於大閱蕭相先務於圖書瞻言諸州不克致理未能洗舊汚之俗開新政之源使懐土知歸起邑如市而乃拒省司之命紊軍國之經此而可容孰不可忍書齒判乙合書生齒之數遂闕法司罪云未及三嵗對楊成象秋官聫職司人其位克守爾典用承天休所以辨九土之廣輪紀萬方之衆寡生齒之日必載版圖弱冠之年將均征賦况隂陽殊氣性有剛而有柔男女異倫齒或七而或八以小大斯比生死必登爰稽五刑罪也難離未及三載詞之有孚兩貫判甲先有兩貫一延州一屬鄯州為定甲訴云先屬延州對版圖一作籍隄防生靈紀綱用收一作悛不道是禁姦慝為政之要莫先此途若能守之人無散逸甲闗西男子隴水遊客從沙塞之荒澤棄田園之故鄉先為流民近為編户同狡之三穴匪王人之一心或因官遷數竒以建莊舄以班崇一作榮吟越鍾儀以幽繫思楚編彼樂土歌於歸來蘭署以鄯州臨戎人稀地曠留實邉户公利實一作心為多割近甸之有餘助遐陬之不足依省為定又何可疑若從訴端詐道滋蔓同前王翰淳維不虞塞門多事險其走集雖稱有典當其有衝安得無戰或逃或死家無康業且人戸平分文昌之舊也邉郡以實先王之制也甲無一徳遂編兩貫禮不忘本延州宻邇於京轂武以戒嚴鄯府逺鄰於河縣詳其動静徇欲茲深違之則苦從之則樂國有大事在戎為急邦之榮懐阜人斯可益疑其逺也不亦宜乎同前人則懐土狐乃首邱然蕩析離居罔能定極且甲義殊三徙編貫兩鄉作可封之比屋名標鄯部尋本枝之百代籍掛延州所以舊里馳誠是混新豐之犬故鄉摇思不食武昌之魚想邑呻吟深嗟變橘瞻闕敬止實慕維桑欲遣一作違三緘終無二見仙䑓制則方闡長途匹夫之志信難可奪同前庾光先國正封略甿編邑閭定要荒之制莫非王土開版圖之職司於下人甲惟常流迹齒編庶居先零之地早及戎風近燒當之俗乆覃宏化既因流寓終是播遷失延州之故鄉𨽻鄯部之外郡亦猶宰嚭辭宋陶朱去越蓬飄萍轉曽何足以少留維桑及梓固不忘於袛載省司既定誠合三緘甲且有詞湏分二里至若軍於一作落闗右地濶流沙總六部之兵馬當三邉之要害戎羯時抄邉人屢聳事資捍禦安可輙移如或身列榮班苟非規免情有深於懐土人何繫於匏瓜扣其两端宜不然矣附貫五年復訖判丙於㑹郡附貫給五年訖差隴外鎮戍訴不伏所由以為無據對韋著令出惟行人知所向苟不執一將何適從丙為行人得被聲教言附邉土而成樂郊聖上哀矜萍流是用安輯厚以富業期乎固心所司為何不廣天澤再有騷動其誰克堪將使戍葵而得年若及𤓰而有代五年之復謂盡殊私三徙之人難可奪志俾不滕口庻無怨言同前宇文暹瞻彼丙也是何人斯逋逃故鄉離逷爾土苟不家食常懐旅遊比巢幕之未安如轉蓬之不定聿來茲郡奠厥攸居爰歴星霜載罹寒暑河源沙塞地鄰戎狄必資膂力以鎮疆場惟丙伊何當是役也自可有死無退為主將之先鋒結袵抽戈斷賢王之右臂不聞為力翻事遊詞孰有沐君之恩食君之土偏蒙五稔之復不徇六尺之軀人之無良罪宜從重當復滅鼻無或噬膚移貫判乙移貫所由以軍府州不許訴云今不簡㸃對桑梓必敬版圖是崇先王所以制萬國仲父所以居四人農商不遷首尾相援乙里親走集貫實軍府已習金皷之聲誠堪晝夜之戰何得不懐吾土將樂他鄉雖四海為家孰匪斯人之適然九章作律元止所由之見縱使飛塵既静裔土無虞猶存晁錯之實邉有慮宣王之薄伐訴無簡㸃深覺詞遊戸絶判丙身死戸絶資財將没官出嫁女請除葬外悉收之叔復請分所由不决仰斷對王説丙沗彼齊人生此王土逐什一之利既富家財服畎畆之勤方編戸籍既而溘先朝露遂卜佳城逺日新封已供葬偹昔時餘業可議官收相彼薄言將分厚産且弟惟同氣女有從人鳯兆於飛既歸他族鴈行以序自合保家繼絶請復一作從於叔兮論財難專於女也以茲丕蔽庻叶其宜移鄉判丁適他邑伍謂其叛追之遽出旌節以徇一作詢伍訴諸邑吏將内之圜土曰來有授也對張欽敬典禮是興訓導為本俗以遷善從乎樂郊生而在勤克有寧宇今丁之適無乃是諸鄰伍以追且昧愛一作受於旌節邑吏之罰胡不恤於宜岸縶茲行者類厥罷人雖徇一作詢等閒門曽不忍於為厲内於圜土且未見於虧財終是迷而妄作輙利動以生悔瑜瑕既不相掩齊楚豈能均得誨人不倦其若是乎遂使信不可知義無所立薄刑猶可誤作徃訴何太詞游爰扣两端且知三失况率土無外曷謂他邦當官以行何非已任免戾實由勤職結罪終無正條寧其利淫是亦為政同前席晉天下一家王土萬里呉蔡齊秦之客憧憧徃來東西南北之人靡靡行邁食矣二字疑遊子將道他邦喬木坐違飄蓬日逺同仲尼之去魯方事問津異伯鸞之適越詎能登岳若使符繻不給行者乃逋逃之流今則旌節有憑伍人何逐捕之有空効重丘之徇楚則失之便為圜土之囚齊亦未得誠宜俾其專逹豈可徴於有授事同違於周典理難投於吕刑同前劉庭誥前王列土各有疆埸司徒典邦敷陳禮教苟違近以適逺必咨官以辨族彼已之子是何人斯罔協厥居越在他邑動而有悔速訟所以成愆行而有由鄰人於何告攝離其鄉居彞倫或紊逞其旌節有授而來信既由𠂻何徃不濟伍實妄訴宜其詬諸徙鄉判甲徙於他鄉無旌節津吏輙以圜土内之彼告非法對楊慎金貿遷不倦人且知徃奔亡或生政亦嚴禁是以變而惟適時政任疑於磽肥行必有由誠取驗於旌節惟甲素非地著身同梗泛橋水淼在忽辭違於舊居斷蓬孤飛方行邁於他國行則無驗動而見一作有疑津途以驗寧遇長沮之問獄戸旋開一作閑行逄士師之鞫且夫為政以簡貴清澆訛職司其居務取懲察雖率土之内莫非王臣而遷人之中或有姦者旌節雖且云復闗山如何得踰詰其所由方盡於理致之獄吏夫何有違竊惟至公之道難加津吏之罰樂土判人進素衣朱襮欲從于沃或告擅去云我聞命不可告人對徳以綏人逺來邇悦服以旌禮上衣下裳苟政刑之不修則顛倒而成刺今者素衣見進白石作詩是曰無良因知暴政類桓叔之從沃若太王之有邠自可責以無歸豈得告其擅去且信美非好如登王粲之樓寧食興謡猶思建業之水訴以聞命抑難有詞既無善閉之能任從樂土之適同前楊總目作温佚建都立邑本大末小苟或假名必將兆亂相彼人也其有意焉既榮朱襮之進旋興白石之行一作什亦欲適彼樂土及於寛政義有渉溱之興業在揚水之章既侵陘庭方崇曲沃姑務修徳自感子來悦以忘勞寧科擅去人苟利矣豈同邾子之遷兄其替乎已聞師服之歎既聞命而攸徃雖或告而何傷同前寵辱若驚名器不假亮采有國欽若明憲知繁實之必披誠滋蔓而難除衣襮者何抑乃邦族桐圭錫寵晋國受其明命椒聊盈掬曲沃得其熾昌盍獻可持以匡乃辟胡棄即異取戾厥躬爰將樂於樹檀苟取徴於揚水遽聞有命擅彼適從未可告人且宜安土天工不曠王政有經懐逺附離則上克用乂勞謙匪懈使下無覬覦人而無良不率大戛或者之告允協舊章移貫判甲居两鄉偏儉一作險下同人請徙之甲訴是糓伯不合移貫對鄭少㣲賦命多途勞生各業或務農而敦本或易地以求安潘岳閒居且樂丘園之事樊遲學圃寧忘稼穡之勤惟甲平人名編比屋和風不應地罕膏腴百糓不登两鄉偏儉嵗聿云暮年儲屢空苟貧賤而焉欲在窮途而周流適彼樂土雖美擇鄰之詞宜敬維桑將悟詩人之戒稱為糓伯難更邑居還墳判劉亨稱元是并州人因隋季而遷長安今請還就墳陵長不許去對頃者江濵鹿走道䘮隋風晉水龍興祚開唐運干戈忽起自下都而入上都鷄犬亂馳辭舊國而入新國劉亨爾日正喜攀龍忽念此時旋悲去鶴顧惟舊浦偶咽水而分聲遷念故鄉共行雲而動色秋林葉下遽失維桑春圃花飛俄傷故梓以為生金翠石黄絹仍存掛劔青松貞枝尚欝四時節物供薦無由萬里蕭條歸寧莫遂氷狐夜聽首丘之戀不窮翔鳥晨驚懐土之悲寧輟披肝上請思切來歸零淚下霑悲深去國雖越吟楚奏幽顯頗殊而移尊就卑禮律通許宜依所請庻叶平反冀南國之禽罷思閩越東平之樹不靡咸陽文苑英華巻五百二十九
