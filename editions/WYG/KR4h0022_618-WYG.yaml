body:
  text: 文苑英華卷六百十九宋李昉等編刑法三執奏裴景仙獄表二首論夷州刺史楊濬决杖表一首論刑法不便表二首請替李邕死表一首為夫謝罪表一首代郭令公請雪安思順表一首論王去榮打殺本部縣令表一首為呉王請罪表一首論潘炎表一首論御史臺誣謗表一首河南府論被謗表一首執奏裴景仙獄表𤣥宗李朝隠時為大理卿臣某言伏見武强縣令裴景仙犯乞取贓至五千疋事發逃走奉勑令集衆殺刼伏以景仙縁乞取犯贓罪不至死又其曽祖故司空寂徃屬締構首預元勲載初年中家陥非罪凡其舊唐書作有兄弟皆被誅夷惟景仙獨存今見承嗣據贓未當死坐雖唐書作凖犯猶入請條十世宥賢功實宜録一門絶祀情或可哀願寛暴市之刑俾就投荒之役則舊勲不棄平典斯允第二表前人臣某言臣伏以有斷自天處之極法生殺之柄人主合專輕重有條臣下當守枉法者枉理而取之十五疋便抵死刑乞取者因乞為贓數千疋止當流坐今若乞取得罪便為斬刑後有枉法當科欲加何辟所以為國惜法期守律文非敢以法隨人曲矜仙命射兎魏苑驚馬漢橋初震皇赫竟従廷議豈威不能制而法貴有恒又仙曽祖寂草昧忠節定為元勲位至台司恩倍常數載初之際枉被破家諸子各陷唐書作犯非辜惟仙孑然猶在且又承嫡繼封主祀若寂勲都棄仙罪特加則叔向之賢何足稱者若敖之鬼不其餒而捨罪念功乞垂天聴况應勑决杖乃有犯配流近發徳音並唐書作普標殊澤杖者既聴减數流者仍許給程天下顒顆孰不幸甚瞻彼四海已被深恩豈於一人獨峻恒典伏乞採臣之議致仙於法則國典有常率土幸甚幸甚制景仙决杖一百流嶺南惡處論夷州刺史楊濬决杖表開元二十四年裴耀卿臣某言臣伏見夷州刺史楊濬犯贓處死勑决六十配流者伏以聖恩天覆仁育品舊唐書作庶類死罪之責不欲尸諸市朝全其性命流竄而已所以政致刑措獄無寃人曠古已來未有斯美臣愚以為全生免死誠為至化有恥且格為訓将來茍有未安不敢緘黙臣以為刺史縣令與諸吏稍别人之父母風化所瞻一為本部長官即合終身致敬决杖者五刑之末品施於秩扑徒𨽻之間官䕃稍髙即免鞭撻今决杖贖死誠則已優解體受笞事頗為辱法至於死天下共之刑至於辱或有所恥况本州刺史百姓所崇一朝對其人吏背脊加杖屈辱頓挫唐書作屈挫拘執人或哀矜唐書作憐忘其免死之恩且有傷心之痛恐非敬官長勸風俗之意又雜犯死法唐書作罪本無杖刑奏報三覆然後行决今非時不覆决杖便發儻獄或未盡又暑熱不耐杖唐書無杖字因杖或死即是促期處分不得順時将欲生之却夭其命又恐非聖心唐書作明寛宥之意臣前後頻在州縣或縁雜犯决人毎大暑盛夏之時决杖多死秋冬已後至有全者伏望凡刺史縣令於本部决杖及夏暑生長之時所是杖刑並乞停减即副陛下好生之徳於死者皆有再生之恩也臣無任論刑法不便表李彭年臣聞明王之理人也設法立制不私喜怒與天下共之忠臣之事主也竭誠盡節不顧榮辱欲天下利之故得上下同心法令明一寛而有制従容以和此盖刑措太平之道也今陛下作人父母勤憂庶政従諫不咈居安慮危臣所以敢進逆耳之言忘忤㫖之罪伏願陛下少垂照察幸甚臣聞書曰罪疑惟輕功疑惟重與其殺不辜寧失不經好生之徳洽于民心竊見紫㣲主書趙誨為取蕃人末河利刀子趂文書特勑處盡趙誨受贓罪不枉法又異監臨貪以敗官事雖挂網議而定罪國有常條若必責之以極典假有罪重倣此者陛下復何以加之於法乎臣又聞政之所興事資賞罰賞罰必信人心乃安輕重或虧手足無措陛下若以借趙誨之命勵貪吏之心以臣之愚又将未益疑夫法存畫一不啓二門者盖示人以信也先敎後罰寧僣無濫者不陷人以罪也若有犯必死則非薄刑之意同罪異罰又非畫一之道何必殺之示信臣非愛人命也惜陛下之法也昔者渭橋驚馬空見罰金髙廟盗環惟聞棄市漢幾刑措職此之由釋之之言可以為喻伏惟陛下少㽜意焉抑臣聞之死者不可復生雖欲改過自新其道無由及也殺氣方深嚴刑在近一物失所聖心不安臣忝諍臣不敢不奏又典律所制輕重各殊笞杖是輕徒死是重爰自近日此道便乖凡所决囚例多非命此乃徒刑有必生之理杖刑為致死之條既紊國經有傷和氣又凡曰造偽例是死囚伏凖條格先决一首既要之以斬罪何更加以杖刑臣雖至愚猶将不可凡百逹識孰謂其宜又周禮論刑刺之典一曰訊羣臣二曰訊羣吏三曰訊萬民陛下若以臣所言非可用則願陛下訊以羣吏詢諸宰臣擇善而行國之利也夫古之人臣干救危犯者非一人也然遇主榮逹者萬無一也一作焉其遭咎羅一作罹禍者不可勝數以此觀之豈臣之利也誠為主也伏惟陛下深察之臣識謝中庸才非上逹猥以承乏叨居諫官既無涓埃之効實多尸素之責謹獻愚直輕觸威嚴儻益萬分甘之九死第二表前人臣某言臣伏見詔書内外官取受一疋以上科本罪外放歸田里五疋以上仍於犯處便附貫者臣聞國之大禮必存其故不易其宜循其教不易其俗故禮曰刑者侀也一成而不可變此則百代常行之道也周禮曰刑新國用輕典刑平國用中典刑亂國用重典此又三等用刑之意也然設三槐九棘之吏入鈞金束矢之條盖又慎之至也故祥刑則死者不恨而生者不怨怨恨不生則災害不作災害不作則太平之理也以堯舜之聖猶曰惟刑恤哉以成康之賢故稱明徳慎罰為政之道可不慎歟自周室浸微穆王荒耄作五刑之屬立三千之條度時而用所謂刑亂者也春秋之時王道浸壊征伐交起教化不行子産鑄書見疵扵叔向荀寅設法獲毁於仲尼偷薄之政自是滋矣秦至始皇專任刑罰赭衣塞路姦邪並生囹圄成市天下愁苦劉項一呼土崩瓦解降自魏晉至于陳隋歴代興亡莫不因此故孔子曰禮樂不興則刑罰不中刑罰不中則民無所措手足誠哉是言也當今天下有道庶政惟和四方無虞萬邦従政正可勝殘去殺道徳齊禮大革前非淳風一變今乃下明勑峻刑書深非元元之望也夫刑罰者御人以威法令者示人以信若成而數變則人之心不安嚴而必行則獄訟滋起先王所言議事以制不為刑辟者懼民之有争心也伏惟陛下取鑒前典率由舊章國用常刑俯收嚴典則政經有序徳洽人心萬姓咸曰大哉王心兹用不犯於有司矣且臣聞寛者仁也政者正也上正其道下必従之陛下居無為之時行不嚴之化則如風偃草日用而不知豈待威之以深刑而欲革之以貪性茍縱免而無恥亦何益於政哉臣又聞之至刑無所用至政無所理故楊泉物理論曰姦與天地俱生自然之氣也人主以政御人政寛則姦易禁政急則姦難絶今法雖大設犯者逾多臣愚以為持政之急老子曰法令滋章盗賊多有此盖急刑非止姦之意伏願陛下深思之臣識見近淺才非匡濟謬叅列侍忝齒諍臣敢不竭誠以速官謗儻裨政化雖死猶生請替李邕死表𤣥宗孔璋山東布衣臣某言臣聞明主御宇捨過取舊唐書作用後篇作舉能舉唐書作取材棄行烈士抗節勇後篇作奮不避死見危致後篇唐書作授命晉用林父豈念過乎漢用陳平豈念行乎禽息殞身豈惜唐書作愛生乎北郭碎首豈愛死乎向若林父死後篇唐書作誅陳平棄後篇唐書作死百里不用晏嬰見逐是晉無赤狄之利後篇唐書作土漢無皇極之尊秦不兼後篇唐書作并西戎齊不覇東海矣臣伏見陳州刺史李邕學成師範文堪經國剛毅忠烈難不茍免徃者張易之弄唐書作用權人畏其口而邕折其角韋氏恃後篇作持勢言出禍應唐書作則禍而邕挫其鋒雖身受謫屈終姦謀中損後篇作殞然則二字後篇作即邕有大造於我邦家二字後篇作國也前宋璟毎厚遇者豈以才重抑嘉其忠於國矣今聞坐贓醜敗厥行且斯人所然唐書作能者拯孤恤窮救乏賙患唐書作賑惠積而能唐書作便散家無私聚陛下下吏訊之聞諸道路執法者将極加之以刑噫天之将䘮斯文死在朝夕永辭聖代臣聞生無益於國不如唐書作若殺身以明賢臣顧朽材輪轅唐書作朽賤庸夫無取後篇作用徒獸視禽息後篇唐書作獸息禽視雖生何為况賢為國家之寳社稷之衛若喪國家之寳失社稷之衛哲人云亡國将若之何是臣痛惜深矣臣願以六尺之軀甘受膏斧以代邕死臣之死所謂落一毛邕之生有足照千里然臣與邕生平不欵臣知有邕邕不知有臣是臣不逮邕明矣夫知賢而舉仁也代人任患義也臣獲二善而死死亦後篇唐書作且不朽則又何求陛下若以臣之賤不足以贖邕鴈門縫腋後篇唐書作掖有足効矣伏惟陛下寛邕之生速臣之死令邕率徳改行全後篇唐書作想林父之功使臣得明後篇作瞑目黄泉附北郭之跡臣之大願畢矣陛下若以陽和之始難於用斧鉞俟天成命敢忘伏劔豈煩大刑然後歸死皇天后土實鑒唐書作照臣之心昔呉楚七國叛周唐書作國亞夫得劇孟以為二字後篇作則冦不足憂矣夫以一賢之能敵七國之衆伏惟陛下敷含垢之道存棄瑕之義逺思劇孟近取李邕豈惟成愷悌之澤實亦歸天下之望臣先君孔子曰鄉人皆惡之未可也况大禮之後天地更新捨之後篇唐書作赦而復論人誰無罪惟明主深思之臣聞士為知已者死且臣不為死者所知而甘於死者豈獨為惜邕之賢亦成陛下矜能之徳惟明主圖之臣璋死罪死罪此表六百七十四卷重出題作救李邕書内或節畧今已削去為夫謝罪表李邕妻温氏妾温氏言邕効職不謹狀涉貪狼逼迫囹圄獲罪以聞誠宜不待刑書便當殞滅然事有所隠恐負明時天聞夐逺號訴不敢倉卒之際分從嚴誅豈謂天鑒仁明邕得生竄荒外再造之幸上答何階死罪死罪邕少習文章薄竊時譽疾惡如讐徃任拾遺奏張昌宗之黨後叅憲府劾武三思之罪坐此為累不容于衆秉邪佞者切齒攻文章者側目由是頻謫逺郡削跡朝端不見闕庭何啻十載嵗時凝戀聞者傷懐屬國家有事東岳大禮告成法駕西旋路遵近境邕奉牛酒之獻各展臣子之心不意天澤曲垂恩私屬沐邕當再躍何以為心懇至夙誠冀遂申効妾聞正直見用邪佞生憂邕之禍端自此為始且邕比任外官竟無一議天顔暫顧罪則旋生諺云士無賢不肖入朝見嫉伏惟陛下明察此言妾之㣲軀萬死無恨死罪死罪邕初䝉勘當即便禁身水不入口向逾五日孤直援寡邪黨相趨窘急至深實不堪忍氣㣲息奄惟命唐書作吏是聽遺邕手書事生吏口貸百姓蠶糧唐書作種抑稱枉法市羅以進令作贓私吏以為能守此加罪當時匭使朝堂潛皆守捉號天訴地誰肯為聞嚴命将行恭徃奔逐泣血去國没唐書作投骨炎荒長任欽州示以無用願邕充一卒之用効力明時膏塗朔邉骨糞沙壤使得身死王事成邕夙心妾則碎首粉身萬死為足妾夫婦義重當見其志不避罪責冒死上聞儻天光垂照即當殞滅妾之榮幸實荷再生謹奉表投延恩匭代郭令公請雪安思順表肅宗邵説臣某言臣聞郤宛之死罪由無極申侯之戮譖起濤塗惡直醜正其來自逺伏見故開府儀同三司兼工部尚書安思順并弟羽林軍大将軍兼太僕卿元真等竭心聖代宣力先朝或任重疆塲或寄深環列刈單于之壘殿天子之邦播筭竹帛圖形文素既稱名将實為勲臣哥舒翰與之不叶因謀䧟害云共禄山通應兄弟盡誅二字一作盡受誅夷寃痛之心殁而猶在安禄山牧羊小醜本實姓康逺自北畨來投中夏思順亡父波主哀其孤賤收在門闌比至成立假之姓氏及禄山擁旄薊北思順授鉞朔方雖則兄弟而情非黨與禄山未反之日思順屢已陳聞朝廷百僚無不委悉豈意姦人罔上成此盗憎生為盡節之臣死為御寃之鬼趙母以先請免坐思順以變告覆宗死而有知飲恨何極伏惟陛下以至聖之徳紹休帝圖蕩定妖氛肅清寰海軫納隍之念深解網之仁陷賊衣冠咸蒙齒列豈令思順兄弟獨隔恩私忠義之臣所為流涕此臣所以特祈昭洗昧死上聞但雪此一家必萬方感惠何則逝者抱屈尚䝉見申則存者謀安故無寃濫雖有不賔之俗将聞風而悦服蓄疑之将當委質而來朝豈惟天下歸仁實亦幽明欽徳無任懇願之至論王去榮打殺本部縣令表肅宗賈至至徳中臣某言伏見宰臣奉宣聖㫖将軍王去榮擅打殺富平縣令杜徽其罪将合寘殊死縁新收陜郡防遏要人特宜免死削除在身官爵白身配陜郡展効者臣等既忝職司主在行下伏以聖人誅暴亂定王業必先明新唐書作示法令崇禮義於是百姓戮力賢愚悦隨是以漢祖之始入關約法三章殺人者死不易其則然後能戡定秦項而帝天下今陛下将欲清雲雨之屯掃攙搶之冦不自約其法恐異漢祖向時之事将何以成功業哉謹按王去榮是富平縣百姓朔方偏裨無專殺之權有犯上之逆且擁唐書作提數千之衆不能整齊行列外攻强冦翻乃無状挾怨内唐書作私怨殺縣尹易曰臣弑其君子弑其父非一朝一夕之故其所由來者漸矣若縱去榮可以生漸臣聞去榮善放抛石能守城邑曩者陜郡初復非其人不可守之李光弼太原程千里上黨許兼唐書作叔冀靈昌魯炅南陽賈賁雍丘張廵睢陽無去榮抛石之能未聞賊能下之也其糧不足者自拔矣何獨陜郡非去榮不可哉陛下若以抛石一能所犯上者復何止之若曰上答去榮而誅将來之犯者則是法令不一而招罪人也今惜一去榮之才而殺十倍去榮之才者不亦其傷益多乎夫去榮亂逆之人也焉一作烏有逆於此順於彼亂富平而治陜郡悖於縣尹而不悖於君乎况今之律令太宗之律令也陛下不可惜小才而廢祖宗之法也伏惟明主棄瑣瑣之能全其逺者大者則禍亂不日而定師旅因兹整齊矣天下幸甚臣等不勝云云為呉王請罪表代宗于邵臣祗言臣長男岵受國恩榮出典藩翰不能昭宣聖理協和上下爰抵憲章自貽勦絶臣年過嵗制識謝平人徒以宗親昧於名教罪因兇悖之子敢望全生之分臣誠惶誠恐頓首頓首臣一自停務因兹杜門瞻闕庭而待命佇荒陬以投俾疑作畀頃者未明去就私喪心魂近以獲奉刑名公聞信宿尚廻天鑒免肆市朝因其所流許以自决且身首不異豈足謝於方隅而禮律所均尚未論於家屬遂使九泉之下猶荷全歸三族之中欣承在宥㣲臣朽老無階上答縦塡溝壑雖死猶生無任感恩負徳之至謹詣朝堂并領男前梓州刺史某等束身請罪輕黷宸嚴兢惶無地論潘炎表徳宗前人臣某言伏見今月一日制命以劉晏殊死之責連及前禮部侍郎潘炎貶授禮州員外司馬天鑒孔明善惡懸别比諸子壻猶佐上藩凡所見聞莫不欣荷知徳刑無頗而行於代也但臣比見潘炎為性貞純致身無過介然特立自為一時之選名不為晏稱官不由晏進自晏處權掌要未嘗以毫髪受遺未嘗以親戚請求頃自晏居外使而安禮致書疏知而寒温通意都不為之開緘凡此之類盖非一二所以海内修崇名節者莫不歎伏以為古人之中罕有儔對自晏伏誅衆望炎免况二年風疾手足拘攣氣息奄奄藥餌未復奉詔奔波即日登路籃輿卧載生死難圖臣愚識炎日乆知炎至行伏恐斃一吉士為代所悲冒責上聞庶幾下逹儻䝉聖人廻聽恤以守道不回賜其殘生許歸田里免隨道殣俯叶羣心将勸清貞之士以勵貪浮之俗炎之幸也臣愚不識忌諱干犯湯鑊塵黷宸嚴陷身無地不勝知賢請命之至謹詣東上閣閤奉表陳列以聞論御史臺誣謗表徳宗齊暎臣某言前月十七日八陵禮畢臣議以為不合不賀宰相御史臺罰臣一月俸至十九日宰相奉宣聖㫖不湏罰者臣以愚直守職造次執文憲司班列失儀委典書罰聖慈照鑒特恩釋放兢懼戰越不知所圖臣某中謝臣伏以昨者八陵之禮百王未行一作明特由陛下發於孝思成此盛典祉歸聖祚慶屬皇家惟當稱賀殿庭豈合推美臣下事關諂凟禮近嫌疑臣忝職司豈敢茍且又詳郊廟之禮與臣愚見亦同但縁李汶性褊而剛不敢對衆陳白所以入諮宰相冀其無跡而停豈圖智小慮深竟以徇公招咎陛下察臣等守直免臣罰俸懲勸斯在隕越何酬臣某中謝臣素庸虚叨䝉奨擢身則誠為賤品官是陛下九卿臺司理在持綱臣則職當執禮綱失是一時之誤禮失為經疑古所非書罰已擅臺威放罰特關一作聞聖造誠合各守職分上答恩私𢎞陛下太和之仁示朝廷至公之道豈以蓄憤未洩求過轉深數日已來衆情共悉臣昨一有十字自縁公事頻詣延英李汶疑臣别有披陳遂欲曲生瑕釁責臣不賀宰相則上引班列失儀惡臣專守禮文則旁説河南殘破其牒已公行組織欲杜臣之口近聞又有譛説擬陷臣之身不敢縷有塵煩自當漸布行路臣孤立無援行公奉職惟聖明在上㣲臣必不及寃但恐誣搆日深慈母亦當動聴臣今不避李汶之怒惟懼失人臣之和夙夜不寧憂惕成病若更請對轉恐生疑戰汗彷徨不知所處無任兢懼感恩之至河南府論被謗表前人臣某言臣聞修身止謗君子之道尚口自理小人常情臣雖駑劣不才竊服師父之訓縱有謗讟未嘗辯明久必自孚庶無所愧况釋謗於已則必過於人棄讓違謙何醜之甚然命之所切不縁臣身伏以受陛下命官之初直自聖心所擇遽致遺闕上累皇明此臣不得不辯一也聞謗臣之詞以驚聽為務或云父子相食或云盗賊公行山谷之間已有結聚或云坊市之内亦至流亡儻或上逹天聽則貽憂聖慮又臣不得不辯二也臣某中謝臣伏以鄰近數州去年皆同水旱惟當府一境前年先有水災既已積憂又加再歉其間數縣人户頃者實多逃移據兩税案所有未歸人户尚有一千五百已下有負奨任不勝憂惶自䝉陛下恩慈特發倉儲賑貸安業者無不懽忻逐食者漸以遷還幸災之人騰謗益甚致兹嫌怒實此根由蓋縁臣自到任已來事有不幸曽正寃獄嘗奏貪官且獄是聖衷所明幽魂知感贓是疫人之害疎網不容當官而行於臣何有今則彛章雖舉衆怒遂深乃於道路郵亭造其飛語又於徃來使客揚此虚聲轉至沸騰布於逺近且謗臣者以去臣為限臣不去不休臣若尚安居謗亦滋甚向念時雨未降人心易摇乞罪微臣以安百姓今月十九日又得南市署承張斌状送㽜守牒市之意似欲慰人户詳其牓内之詞却慮摇動愚下其牒云户口流散村落空虚恐依山林變為狂冦攘竊道路隔硋徃來者今地即王畿有事尚令宻啓人皆服化虚詞豈可牓陳敢言不利府司又恐惑於逺聴臣伏以俱承寄任貴務和同今日故就皇城自取商議既至門首又不見臣臣憂懼轉深不敢不奏其市牓諸縣見擬移牒請其且收臣既昧通方輙陳事體兢懼戰越不知所裁今東都幸有臺省之官悉是朝廷所擇職為耳目身在都城固諳纎微望委勘察庶事責實甘待刑章無任惶懼懇迫之至文苑英華卷六百十九
