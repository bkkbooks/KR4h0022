body:
  text: 文苑英華巻二百五十八宋李昉等編寄贈十二劉禹錫十七首白居易二十三首殷堯藩一首分司東都蒙襄陽李司徒相公書問因以奉寄劉禹錫蚤忝金馬客暮集作晩為商洛翁知名四海内多病一生中舉世徃還盡何人心事同㡬時登峴首恃舊揖三公以下十七篇並見集本元和癸巳嵗仲春詔發江陵偏師問罪蠻徼後命宣慰釋兵歸降凱旋之辰率爾成詠寄荆南嚴司空前人蠻水阻朝宗兵符下渚宫前籌得上筞無戰已成功漢使星飛入夷心草偃同歡謡開竹棧拜舞擲桑弓就日知氷釋投人念鳥窮網羅三面觧章奏九重通卉服聫操袂雕題盡鞠躬降幡秋練白驛騎晝塵紅火號休傳警機橋罷亘空登山不見虜振斾自生風江逺煙波静軍廻氣色雄佇㸔聞喜後金石賜元戎贈澧州髙大夫司馬霞寓前人前年牧集作收錦城馬踏血泥行千里追戎首三軍許勇名殘兵疑鶴唳空壘辨烏聲一誤雲中級南逰湘水清請告東歸發㶚橋却寄諸僚友前人征徒出㶚涘廻首傷如何故人雲水集作雨散滿目山川多行車無停軌流景同迅波前歡漸成昔感歎益勞歌思歸寄山中友人前人蕭條對秋色相憶在雲泉木落病身起潮平歸思懸凉鍾山頂寺暝火渡頭船此地非吾土閒留又一年途次華州陪錢大夫登城北樓春望因覩李崔令狐三相國唱和之什翰林舊侣繼踵華城山水清髙鸞鳳翔集皆忝夙眷遂題是詩前人城樓四望出風塵見盡闗西渭北春百二山河歸集作推上國一雙旌斾委名臣壁中今日題詩處一作句天上同時草詔人莫恠老郎呈濫吹宦途離别舊情親蘇州白舍人寄新詩有歎蚤白無兒之句因以贈之前人莫嗟華髮與無兒却是人間乆逺期雪裏髙山頭白早海中仙果子生遲于公必有髙門慶謝守何煩曉鏡悲幸免如新分非淺祝君長詠夢熊一作羆詩河南王少尹宅讌張常侍白舍人兼呈盧李二副使時充弔册烏司徒使至洛中此詩見二百十六巻滿地此篇作滿院前人覽董評事思歸之什因以詩贈前人㡬年油幕佐征東却泛滄浪狎釣童欹枕醉眠成戱蝶抱琴閒望送歸鴻文儒自襲膠西相倚伏能齊塞上翁更説扁舟動鄊思青菰已熟柰秋風蚤春對雪寄澧州元郎中前人新賜魚書墨未乾賢人暫屈逺人安朝驅旌斾行時令夜見星辰憶舊官梅蘂覆階鈴閣暖雪峯當户㦸枝寒寧知楚客思公子北望長吟澧有蘭䝉恩轉儀曹郎依前充集賢學士舉韓潮州自代因寄七言前人翔鸞闕下謝恩初通籍由来在石渠暫入南宫判祥瑞還歸内殿閲圗書故人猶在三江外同病凢經二紀餘今日薦君嗟乆滯不唯文體似相如竇朗州見示與澧州元郎中蚤秋贈荅命同作前人隣境諸侯同舍郎芷江蘭浦恨無梁秋風門外旌旗動曉露庭中橘柚香玉簟㣲凉宜白晝金笳入暮應清商騷人昨夜聞鶗鴂不歎流年惜衆芳贈致仕滕庶子先軰時及第人中最老前人朝服歸来晝錦榮登科記上更無兄夀觴每使一作許曽孫獻勝境長携衆妓行矍鑠據鞍能騁健殷勤把酒尚多情凌寒却向山隂去衣繡郎君雪裏迎時令子為御史主務在越中美温尚書鎮定興元以詩寄賀前人旌旗入境犬無聲戮盡鯨鯢漢水清從此世人開眼目始知名將出書生寄陕州姚中丞前人八月天地肅二陵風雨收旌旗闕下来雲日闗東秋禹跡想前事漢臺餘故丘徘徊襟帶地左右帝王州留滯悲昔老恩光榮徹侯相思望棠樹一寄商聲謳為郎分司寄上都同舍前人籍通金馬門身在銅駝陌省闥書無塵宫樹逺凝碧荒堦蘚淺深集作荒街淺深轍古渡潺湲石唯有嵩丘雲堪誇蚤朝客裴祭酒尚書見示春歸城南青松塢别墅寄王佐丞髙侍郎之什命同作蚤宦閱人事晩懐生道機時從學省出獨望郊園歸野彴渡春水山花映巖扉石頭觧金章林下歩緑薇青松鬰成塢脩竹盈尺圍吟風起天籟蔽日無炎威危逕盤羊腸連甍聳暈飛幽谷響樵斧澄江集作潭環釣磯因髙見帝城冠蓋揚光輝白雲難持寄清韻投所希二公如長離比翼翔太㣲含情謝林壑酧唱迸一作酬贈駢珠璣顧予久郎潜愁寂對芳菲一聞丘中趣再撫黄一作再聼撫金徽寄獻北都留守裴令公白居易天上中台正人間一品髙中書令上應中台司徒官一品休明值堯舜勲業過蕭曹始擅文三㨗進士及第博學制䇿連登三科終兼武六韜動人名赫赫憂國意忉忉伐集作盪蔡擒封豕吴元濟平齊斬巨鰲李師道也兩河收土宇四海定波濤寵重移宫籥自東都留守授北京留守恩新换閫旄保釐東宅静周公召公東治洛宅守䕶北門牢晉國封疆闊幷州士馬豪胡兵驚赤幟邊雁避烏號令下流如水仁沾澤似膏路喧歌五袴軍醉感單醪將校森貔武賔僚儼雋髦客無煩夜柝吏不犯秋毫神在臺駘助魂亡獫狁逃徳星銷彗孛霖雨滅腥臊烽戍髙臨代闗河逺控洮汾雲時集作晴漠漠朔吹冷颾颾豹尾交衙㦸虬髯捧佩刀通天白犀帯照地紫麟袍𦍑管吹楊栁燕姬酌葡萄葡萄酒出太原銀含鑿落線集作盞金屑琵琶槽遥想從軍樂應忘報國勞紫㣲留北闕中書令即紫㣲令也緑野寄東臯緑野堂在東都午橋庄也忽憶前時㑹多慙下客叨清宵陪讌話美景從逰遨花月還同賞琴詩雅自操朱絃拂宫徵洪筆振風騷近竹開方丈依林架桔槹春池八九曲畫舫兩三艘徑滑苔粘屐潭深水沒篙緑絲縈岸柳紅粉映樓桃皆午橋庄中景物之佳者為穆先陳醴居易毎十齋日在㑹常蒙以三勒湯代酒招劉共藉糟劉夢得也舞鬟金翡翠歌頸玉蠐螬盛徳終難退明時豈易遭公雖慕張范張良范蠡帝未捨伊臯眷戀心方結踟蹰首已搔鸞鳳上寥廓燕雀住蓬蒿欲獻文狂簡徒煩思鬰陶可憐四百字輕重抵鴻毛以下二十三篇並見集本錢侍郎使君以題廬山草堂詩見示以戱之集作見寄因酬之前人殷勤江郡守悵望掖垣郎慙見新瓊什思歸舊草堂事随心未得名與道相妨若不休官去人間到老忙贈江州李十使君員外前人我本江湖上悠悠任運身朝隨採樵集作賣藥客暮伴打集作釣魚人跡為燒丹隠家縁嗜酒貧經過剡溪雪尋覔武陵春豈有疎狂性堪為侍從臣仰頭驚鳳闕下口觸龍鱗劒珮辭天上風波向海濵非賢虚偶聖無屈可集作敢求伸昔去曽同日今來即後塵元和末余與李員外同日黜官今又相次出為刺史中年俱白髮集作鬢左宦各朱輪長短才雖異榮枯事略均殷勤李員外不合不相親初到郡齋寄錢湖州李蘇州聊取二郡一哂故有落句之戱前人俱来滄海郡半作白頭翁謾道風煙接何曽笑語同吏稀秋稅畢客散晩庭空霽後當樓月潮來滿座風霅溪殊冷僻茂苑太繁雄唯有集作此錢塘郡閒忙恰得中初冬蚤起寄夢得前人起戴烏紗㡌行披白布裘爐温先煖酒手冷未梳頭蚤景煙霜白初寒鳥雀愁詩成遣誰和還是寄蘇州春盡日天津橋醉吟偶呈李尹侍郎前人宿雨洗天津無泥未有塵初晴迎蚤夏落照送殘春興發詩随口狂来酒寄身水邊行嵬峩橋上立逡廵䟽傅心情老吳公政化新三川徒有主風景屬閑人洛下閒居寄山南令狐相公前人已收身向園林下猶寄名於禄仕間不鍜嵇康彌懶静無金䟽傅更貧閒支分門内餘生計謝絶朝中舊徃還唯是相君未忘得時思漢水夣巴山元㣲之新除浙東觀察喜得相一作杭隣前人稽山鏡水歡逰地犀帯一作角金章榮貴身官職比君雖校小封疆與我且為隣郡樓對望一作翫千山集作峯月江界平分兩岸春杭越風光詩酒主相㸔更合與何人花前有感兼呈崔相公劉郎中前人落花如雪鬢如霜醉拾集作把花㸔益自傷少日為文集作名多檢束長年無興可顛狂四時輪轉春常少百刻支分夜苦長何事共同集作同生壬子嵗老於崔相及劉郎余同崔劉同年獨蚤衰白侍中晉公欲到東洛先䝉書問期宿龍門思徃感今輙獻長句前人昔䝉興化池頭送太和三年春居易授賔客分司東京時蒙侍中於興化里池上宴送今許龍門潭上期聚散但慙長見念榮枯安敢道相思功成名遂来雖久雲卧山逰去未遲聞說風情筋力在只如初破蔡州時寄荆集作山南淮南二相公前人故交海内只三人兩集作二座巖廊一卧雲老愛詩書應是集作還似我榮兼將相不如君百年膠漆􅀄心在萬里煙霄中路分阿閣鸞凰一作阿鸞彩鳳野田鶴誰集作何人信道舊同羣縣西郊秋寄贈馬造集作逹前人紫閣峯西清渭東野煙深處夕陽中風荷落一作老葉蕭條緑水蓼開一作殘花寂寞紅我厭宦逰君失意可憐秋思兩心同見于給事暇日上直寄南省諸郎官詩因以戱贈此詩已見一百九十一巻夜宿江浦聞元九集作八改官因寄此什前人君逰丹陛已三遷我泛滄浪亦二年劍珮曉趨雙鳳闕煙波夜宿一漁船交親盡在青雲上鄊國遥抛白日邊若報生涯應笑殺結茅栽芋種畬田江樓晩眺景物鮮竒吟翫成篇寄水部張籍員外前人澹煙踈雨間斜陽江色鮮明海氣凉蜃散雲收破樓閣虹殘水照㫁橋梁風翻白浪花千片鴈破晴天字一行好着丹青圗畫集作冩取題詩寄與水曹郎立秋夕凉風忽至炎暑稍消即事詠懐寄汴州節度李二十尚書前人嫋嫋簷樹動好風西南来紅缸霏㣲滅碧幌飄颻開披襟有餘凉拂簟無纎埃但喜煩暑退不惜光隂催河秋稍清淺月午方徘徊或行或坐卧體適心悠哉美人在浚都旌旗繞樓䑓雖非滄溟阻難見如蓬莱蝉迎節又換鴈送書未迴君位日寵重我年日摧頹無因風月下一與共持杯集作一舉平生杯同夣得暮春寄賀東西川二楊尚書前人龍節對持真可愛鴈行相接更堪誇兩川風景同三月千里江山屬一家魯衞定知聫氣色潘楊亦覺有光華予與二公皆忝姻戚應憐洛下分司伴冷宴閒逰老㸔花寄贈元九前人自我從宦逰七年在長安所得唯元九集作君乃知定交難豈無山上苖徑寸無嵗寒豈無要津水咫尺有波瀾之子異於是久要集作處誓不諼無波古井水有節秋竹竿一為同心友三及芳嵗蘭花下鞍馬逰雪中杯酒歡衡門相逢迎不具帶與冠春風日髙睡秋月夜深看不為同登第集作科不為同署官所合在方寸心中集作源無異端贈吳舟前人巧者力若集作苦勞智者心若愁集作憂愛君無巧智終嵗閒悠悠嘗登御史府亦佐東諸侯手操紏繆簡心運决勝籌宦途似風水君心如虛舟汎然而不有進退得自由今来脱豸冠時徃侍龍樓官曹稱心静居處隨跡幽冬負南榮日支體甚温柔夏卧北窓風枕席如凉秋南山入舍下酒甕在床頭人間有閒地何必隱林丘顧我愚且昧勞生殊未休一入君集作金門直星霜三四周主恩信難報近地徒乆留終當乞閒官退與夫子逰潯陽嵗晩寄元八郎中庾三十三員外前人閱水年將暮燒金道未成丹砂不肯死白髮事湏生病肺慙杯滿衰顔忌鏡明春深舊鄉夢嵗晩故交情一别浮雲散雙贍列宿榮螭頭堦下立龍尾道前行封事頻聞奏除書數見名虛懐事僚友平歩取公卿漏盡雞人報朝回女使集作㓜女迎可憐白司馬老大在湓城醉贈劉二十八使君前人為我引盃添酒飲與君把筯撃盤歌詩稱國手徒為爾命壓人頭不柰何舉眼風光常寂寞滿朝官職獨蹉跎亦知合被才名折二十三年折太多初到忠州贈李大夫前人好在天涯李使君江頭相見日黄昏吏人生梗都如鹿市井疎蕪只抵村一隻葉舟當驛歩百層石蹬上州門更無平地堪行處虛受朱輪五馬恩歎春風兼贈李二十侍郎前人樹根雪盡催花發池畔集作岸氷消放草生惟有鬢霜依舊白春風與我獨無情醉贈劉十二一作寄嶺南張明府殷堯藩春草正萋萋知君過惡溪鸎將吉日語猿共猓然啼别路魂先斷還家夢㡬迷定尋雷令劍應識越王笄樹色多於北潮聲少向西椰花好為酒誰伴醉如泥文苑英華巻二百五十八
