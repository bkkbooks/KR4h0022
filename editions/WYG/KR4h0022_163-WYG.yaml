body:
  text: 文苑英華巻一百六十三宋李昉等編地部五河四首湖十一首潭八首水二十七首泉七首河渡黄河范雲河邉類聚作流􅌺且濁湯湯不可陵檜檝難為榜松舟纔自勝空亭偃舊木荒疇餘故塍不覩行人跡但見狐兔興寄言河上老此水何當澄渡河北王褒秋風吹木葉還似洞庭波常山臨代郡亭障遶黄河心悲異方樂腸絶隴頭歌薄暮臨征馬暮臨一作暮驅失道北山河此詩二百八十九巻重出今已削去注異同為一作渡黄河江總葱山淪外域鹽澤隠遐方兩京分際逺九道𣲖流長未殫所聞見無待驗詞章留連嗟太史惆悵踐黎陽導波縈地節䟽氣耿天潢憫周沉用寳嘉晋肇為梁渡河北薛道衡連旌映溆浦疊鼔沸汀洲桃花長新浪竹箭下奔流塞雲臨逺艦胡風入陣樓劔㧞蛟将出驂驚黿欲浮鴈書終立效燕相果封侯勿恨關河逺且寛邉地愁湖治西湖范雲史氏導漳水西門溉河潮圖始未能恱克終良可要擁鍤勸年首提爵勞春朝平臯草色嫩通林鳥聲嬌已集故池鶩齊蒔新田苖何吁畚築苦方驩魚稻饒汎宫亭湖劉刪廻艫承𣲖水舉帆逐分風滉瀁疑無際飄颻似度空檣烏排鳥路船影沒河宫孤石滄波裏匡山苦霧中寄謝千金子安知萬里蓬渡青草湖隂鏗洞庭春溜滿平湖錦帆張沅水桃花色湘流杜若香穴去茅山逺初學記作近江連巫峽長帶天澄逈碧映日動浮光行舟逗逺樹度鳥息危檣滔滔不可測一葦詎能航此詩二百八十九巻重出今已削去洞庭湖宋之問地盡天水合朝及洞庭湖初日當中涌莫辨東西隅晶耀因何在瀅熒心欲無靈光晏海若㳺氣耿天樞張樂軒皇至征苖夏禹徂楚臣悲落葉堯女泣蒼梧野積九江潤山通五嶽圖風恬魚自躍雲夕鴈相呼獨此臨泛漾浩将人代殊永言洗氛濁卒嵗為清娯要使功成退徒勞越大夫别㴩湖張說念别㴩湖去浮舟更一臨千峯出浪險萬木抱煙深南郡延恩渥東山戀宿心露花香欲醉時鳥囀餘音涉趣皆留賞無竒不遍尋莫言山水間幽意在鳴琴泛太湖書事寄㣲之白居易煙渚雲帆處處通飄然舟似入虛空玉盃淺酌廵初匝金管徐吹曲未終黄夾纈林寒有葉碧琉璃水净無風避旗飛鷺翩翻白驚皷跳魚撥刺紅澗雪壓多松偃蹇巖泉滴乆石玲瓏書為故事留湖上吟作新詩寄浙東軍府威容從道盛江山氣色定知同報君一事君應羡五宿澄波皓月中憶東湖李紳菱歌罷唱鷁舟廻雪鷺銀鷗左右來霞散浦邉雲錦截月昇湖面鏡波開魚驚翠羽金鱗躍蓮脫紅衣紫菂摧淮口值春偏悵望數株臨水是寒梅和唐中丞開淘西湖暇日逰泛朱慶餘萍岸新淘見碧霄中流相失忽成遥空餘孤嶼來詩景無復横槎礙桞條紅斾路幽山翠濕錦帆風起浪花飄共知浸潤同雷澤何慮川源有旱苖南湖温庭筠湖上㣲風小檻凉翻翻菱荇滿廻塘野船著岸入春草水鳥帶波飛夕陽蘆葉有聲疑霧雨浪花無際似瀟湘飄然蓬艇東歸客盡日相㸔憶楚郷鏡湖西島言事方干慵拙幸便荒僻地縱聽猿鳥亦何愁偶斟藥酒欺梅雨却著寒衣過麥秋嵗計有餘添橡實生涯一半在漁舟世人若便無知已應向此溪成白頭洞庭湖曹松東西南北各連空波上唯留小朶峯長與岳陽飜鼓角不離雲夣轉魚龍吸廻日月過千頃鋪盡星河剰一重直到劫餘還作陸是時應有羽人逢潭旦發漁浦潭丘遲漁潭霧未開赤亭風已颺櫂歌發中流鳴鞞響㳫障村童忽相聚野老時一望詭怪石異象嶄絶峯殊状森森荒樹齊析析寒沙漲藤垂島易陟岸傾嶼難傍信是永幽棲豈徒暫清曠坐嘯昔有委卧治今可尚秋日題南陽潭壁劉希夷獨坐秋隂生悲來從此滴行見汝陽潭飛蘿䝉水石懸瓢木葉上風吹何歴歴幽人不耐煩振杖閒歩寂廻流清見底金沙覆銀礫錯落非一丈空朧幾千尺江湘魚鱗紫鴨毛自然碧吟詠秋水篇渺然忘損益秋水隨形影清濁混心迹嵗暮歸去來東山余宿昔萬山潭孟浩然埀釣坐盤石水清心益閒魚逰潭樹下猿挂島藤間神女昔觧珮傳聞於此山求之不可得沿月棹歌還萬丈潭杜甫青溪合𡨕寞神物有顯晦龍依積水蟠窟壓萬丈内跼歩凌垠堮側身下煙靄前臨洪濤寛却立蒼石大山危一徑盡岸絶兩壁對削成根虛無倒影垂澹􅀈黒如灣澴底清見光炯碎孤雲倒來深飛鳥不在外髙蘿成帷幄寒木疊旌斾逺川曲通流嵌竇潜洩瀬造幽無人境發興自我輩告歸遺恨多将老斯逰最閉藏脩鱗蟄出入巨石礙何當炎天過快意風雨㑹龍潭韋應物激石懸流雪一灣九龍潜處野雲閒欲行甘雨四天下且隠澄潭一頃間浪引浮槎依北岸波分晩日見東山垂髯儻遇穆王駕閬苑周遊應未還宿潭上二首暢當夜潭有仙舸與月當水中嘉賔愛明月逰子驚秋風二青蒲野波白水露明月天夜中秋風起心事坐茫然潭上作張喬竹島殘陽映翠㣲雪翎禽過碧潭飛人間未有關身事毎到漁家不欲歸水登隄望水梁孝元帝驅馬河隄上非謂城隅逰懐山殊未巳徒然勞九愁旅泊依村樹江槎擁戍樓髙岸翻成浦曲港反通舟棗野良知歎瓠河今可儔願假宣尼術泗水却横流太子洑落日望水劉孝綽川平落日迥落照滿川漲復在淪波地𣲖别引沮漳耿耿流長脉熠熠動㣲光寒鳥逐槎泛驚鵜拂浪翔臨流自多羙况此還故鄉榜人夜理檝櫂女闇成妝欲待春江曙争塗向洛陽賦得臨水沈君攸開筵臨桂水携手望桃源花落圓文出風急細流翻光浮動岸影浪息累沙痕浪清自可恱濯纓何用論望渭水庾信樹似新亭岸沙如龍尾灣猶言吟暝浦應有落帆還詠水釋慧標曾添踈勒井經湧貳師營玉津花色亮銀溪錦磧明舟如空裏泛人似鏡中行持将符上善利物動髙情同前祖孫登驪泉紫闕映珠浦碧沙沈岸隔蓮香逺流清雲影深風潭如拂鏡山溜似調琴請君看皎潔知有澹然心二長川落日照深浦漾清風弱桞垂江翠新蓮夾岸紅船行疑泛逈月映似沉空願逐琴髙戱乗魚入浪中同前張文琮標名資上善流𣲖表靈長地圖羅四瀆天文載五潢方流含玉潤圓折動珠光獨有䝉園吏栖偃玩濠梁賦得方塘含白水李巨仁白水溢方塘淼淼素波揚疊浪摇鳬影連漪冩鴈行長堤桞色翠夾岸荇花黄觀魚自有樂何必在濠梁王澤嶺遭洪水孔德紹地籟風聲急天津雲色愁悠然百川滿俄爾萬頃浮還似金堤溢飜如碧海流驚濤遥起鷺迥岸不分牛徒知懐趙景終是倦陽侯木梗誠無託蘆灰豈暇求思得乗槎便蕭然河漢遊日暮望涇水徐珩導源經隴阪屬汭貫嬴都下瀬波恒急廻澌溜亦紆毒流秦卒斃泥糞漢田腴獨有迷津客懐歸軫暮途水駱賔王列名通地紀踈𣲖合天津波隨灰集作月色净態逐桃花春照霞如隠石映桞似沉鱗終當挹上善屬意淡交人春水杜甫三月桃花浪江流復舊痕朝來沒沙岸碧色動柴門接縷垂芳餌連筒灌小園不知無數鳥何意更相喧望水司空曙髙原晴見水楚色藹相和野極空如雪天遥不辨波永無人跡到獨有鳥聲過况是蒼茫外殘陽照更多分流水前人古時愁别淚滴作分流水日夜東西流分流幾千里通塞兩不見波瀾各自起與君相背飛去去心如此逺水于武陵悔作望南浦望中生逺愁因知人易感為見水東流欲附故鄉信不逄歸客舟萋萋兩岸草又度一年秋御溝水釋無可鑿禁䟽雲數道開垂風岸桞拂青苔銀波玉沫空池去曾歴千巖萬壑來大水薛逢暴雨隨驚雷從風忽驟來浪驅三島至江坼二儀開勢恐圓樞折聲疑厚軸摧𡨕心問元化天眼幾時回逺水馬戴蕩漾空沙際虛明入逺天秋光照不極鳥影去無邉勢引長雲斷波凝片雪連汀州杳難到萬古覆蒼煙同前項斯渺渺浸天色一邉生晩凉濶含萍勢逺寒入鴈愁長北極連平地南流接故鄉扁舟當宿處髣髴似瀟湘西蜀净衆寺題水鄭谷竹院松廊分數􅉽不空清泚亦逶迤落花相逐向何處幽鳥獨來無限時洗鉢老僧臨岸乆釣魚閒客巻綸遲晩晴一片連莎緑悔與滄浪舊有期水韓喜方圓不定性空求東注滄溟早晩休髙截碧塘長耿耿逺飛青嶂更悠悠瀟湘月浸千年色夢澤煙含萬古愁别有嶺頭嗚咽處為君分作斷腸流潯陽觀水李羣玉朝宗漢水接陽臺唅呀填阬吼作雷莫見九江平穏去還從三峽嶮􅇖來南經夣澤寛浮日西出岷山劣泛杯直至滄溟涵貯晝深沈不動浸昭回流水羅鄴漾漾悠悠幾􅉽分中浮短艇與鷗羣天街帶雨含芳草玉洞飄花下白雲静稱一竿持處見急愁孤舘覺來聞隋家桞畔偏堪恨東入長淮日又曛歎流水前人人間虛謾惜花落花落明年依舊開却最堪悲是流水便同人事更無廻御溝水王貞白一帶御溝水緑槐相䕃清此泉涵帝澤無處濯塵纓鳥道來雖險龍池到自平朝宗本心切願向急流傾水邉羅隠野水無情早晩早晩集作去不迥水邉花好為誰開秪知事逐眼前過不覺老從頭上來窮似孔顔休歎息逹如周召亦塵埃思量此理何人㑹䝉邑先生最有才泉答長安崔少府叔封遊終南翠㣲寺太宗金沙泉見寄李白河伯見海若傲然誇秋水小物昧逺圖寧知通方士多君紫霄意獨往蒼山裏地古寒雲深巖髙長風起初登翠㣲嶺復憇金沙泉踐苔朝霜滑弄波夕月圓飲彼石下流結蘿宿溪煙鼎湖夣渌水龍駕空茫然早行子午關却登山路逺拂琴聽霜猿滅燭乃星飯人煙無明集作同異鳥道絶徃返攀崖倒青天下視白日晩既遇石門隠還唱石潭歌涉雪搴紫芳濯纓想清波此人不可見此地君自過為余謝風泉其如幽意何一公新泉劉長卿東林一泉出復與逺公期淺石春集作石淺寒流處空山暮落時夣閒歸集作聞細響慮淡對清漪動静皆無意唯應道者知同前嚴維山下新泉出泠泠此發源落池纔有響漬石未成痕獨映孤松色殊分衆鳥喧唯當清夜月觀此啓禪關宜豐新泉釋靈一泉源新涌出洞徹映纎雲稍落芙蓉沼初淹苔蘚文了将空色净一作素将空意合素一作净與衆流分毎到青霄月泠泠夣裏聞山下泉皇甫曾漾漾帶山光澄澄倒林影那知石上喧却益山中静泉一字至七字句張南史泉泉色浄苔鮮石上激雲中懸津流竹樹脉亂山川扣玉十聲應含風百道連太液併歸池上雲陽舊出宫邉北陵井深鑿不到我欲添淚作潺湲山下泉李端碧水映丹霞濺濺度淺沙暗通山下草流出洞中花浄色和雲落寒聲遶石斜明朝更尋去應到劉郎家集作阮郎文苑英華巻一百六十三
