body:
  text: 文苑英華巻六百八十宋李昉等編文章中報三原李少府書一首荅員半千書一首與常侍御書一首贈李舎人使君書一首贈包中丞書一首荅楊湖南書一首代李侍郎與徐州張尚書書一首代辛將軍與普閏劉尚書書一首與劉評事伯芻書一首寄李翺書一首答崔立之書一首答皇甫湜書一首報三原李少府書崔融僕去夏遄征徂秋戾止於舎弟圓處辱吾子贈書徹函敷紙恬神靜諷龍文陽發居然異氣射人鳳律雄鳴自有竒音震物是何詞裁清雅興㫖奥深一作𤣥奥黄縑白鍜吐其文玉篆銀鈎艷其彩超超美論上陵於八十五篇婉婉成章不疑作下該於五十六字心靈宻㑹許予以煙霄鸞鳳之交景氣潜通博我以風雨魚龍之感雖曰不敏竊所庶幾下走材不逮於中人名謬參於下士頗亦希逹者之陳跡慕君子之遺風何不勤勤於接賢汲汲於結善見一才庶褰裳千里聞一徳期負笈七州而心跡相妨竟未之致也且僕之於君早欽風素子未知僕載勞翰墨同聲相應可謂知言庸詎知哉是何言也善乎東方生有言曰士大夫相知何必垂髮齊年拊手塵逰僕每覽此嘉其㫖氣重其逹識斯可謂之知言矣足下博聞强學豐才贍思以為魏蜀名逰吳鄭竒節不獨於古可生於今若髙明之禮樂大器足并吞於八九若下走之瓶筲小才豈與言於萬一也然才器雖不足揆風尚或可思齊區區之誠有望於此耳夫黄金之為寳也重矣而衆或礫之白圭之為璞也真矣而衆或非之木秀於林堆出於岸者卒為風波所擊材出於衆行髙於人者必為時俗所議以孔宣之徳也而招毁於武叔以周公之徳也而見疑於管叔此古而有之子何為恠者若吾子之蘭薰雪白冰清玉潤變通古今一作思周變通識貫終始而不免於讒口者斯亦可以痛心哉然則霜雪增加然後知松栢之勁也隂陽薄蝕然後知日月之明也湼而不淄磨而不磷者此非其效歟嗟乎王事不遑行役無定及君降止伊余載馳庶將自過黄叔度不意求尋陳仲舉參差不展踧踖為勞而吾子泛交直造余室弱季愚者因此得聞夕飽儒珍朝充道味南指有資於先覺北面頓廓於初䝉成人之美君子之務也遂令齊聲五對嗣美一枝名登甲乙之科身預賢良之末此非師資之效歟僕志尚幽閒體業疎放自拘文墨屢學栖遲院草侵堦而不薙惜其十步有芳也庭樹當軒而不徙重其一枝可巢也素琴委篋絃上之聲勿取也道書􅄹架物外之情足徵也此僕之不能忘懐聊復爾耳而子矜余以傲吏誇我以髙人多見其玩人長徳者也僕少乏文章長微學藝緣情體物誠所不工彫朽礪鉛有時牽拙直將歌其勞事豈欲冐彼知音而吾子廣肆褒揚深加提飾上揆飛龍之奏旁援儀鳳之音語人必於其倫在僕何可一作階至此足下徳擅宗師名推雄伯文髙積玉昇學日以照天光韻警鏘金激思風而吹地籟至若山柱河官之作珠胎鼎氣之篇並登作者之心每諷詞人之口竊霑餘論乆已懐音重勞賜簡殊深荷戴謹當藏之於篋書之於紳奉以周旋期諸永乆僕自恭承綵札握玩瓊章筆硯俱焚神氣都盡所以遲廻曠日俛仰窮年者抑由於此矣亦將性不好書徃賢之通論言非盡意前哲之美談茍意得而言忘冀神交而道合耳而競疑作竟不能以已者恐爽無言不讎之美一作義云耳一作幸相知心期要以㑹面景山足下勿我棄遺敬慎徳音邀君歲暮耳當今六月頗暑二時隆赫敬想出忠入孝自公及私養親以祿効官以智邕邕然致足樂也僕拙於札翰行復推遣未卜清言良深太息不具崔某白答員半千書駱賔王張評事至止辱所惠詩乃書把玩無厭暫如有叙上言離恨下朂交情篤以猛風乾蘇之談𢎞以驟雨濕薪之喻雖聞義則死道存於起予而擬人則失事均乎翫物借如誠說蓋足下之不知言倘或劇談豈吾人之仰望矣夫鯤之為魚也潜碧海泳滄流沉鰓於渤澥集作海之中掉尾乎風濤之下而濠魚井鲋自以為可得而齊焉鵬之為鳥也刷毛羽恣飲啄戢翼於天地之間宛頸乎江海之畔而雙鳬隻集作乗鴈自以為可得而䙝焉及其化羽垂天摶風九萬振鬛集作鱗横海擊水三千寧假力於搶榆在藻集作寧肯借翰於搶榆假力於在藻資汀濘集作江濱涓流之水俟窟集作堁堁揚塵之風哉故張子房之逹人也擊水摶風之適焉朱買臣之屈已也戢翼沉鰓之致焉足下雅得古人之致不乏先賢之適自守莊筌無嬰魏網亦寧不知在藻搶榆之力非擊水摶風之助哉而詞㫖勤勤深所未諭盍言爾志豈若是乎夫人生一作間百年物理千變名利寵辱之情立矣愛憎毁譽之迹生焉其道在則尊徳成而上幽貞為虚白之室靜默為太𤣥之門知軒冕是儻來之物悟榮貴集作華非作力所致茍斯道不墜集作墮亦何患無成而圖僥倖於權重之交養聲利集作譽於衆多之口斯所以楊朱徘徊於岐路阮籍怵惕於窮途嗟乎露徃霜來歲華不待山髙河廣離意無時桂樹寒花公子去而忘返松巖春草王孫逰以不歸去矣員生逺離隔矣音塵不嗣情甚集作其勞矣畏容藏谷靜深殊矣惠而好我無宻爾音與常侍御書于邵近承書問兼示新書清心滌靈廻視易聴靜以究微婉有義可激恱以觀殊姿外容奚施徒見風雲相馳金玉交映曾不旋踵澤人之思一至於此甚大惠也真翰林之所可法豈不才而獨寳耶尋呈康子初云未見繕寫將送適遇有來遍示幕中無不嘉歎緣家累詣府求醫重陽之前當復北縣旬日之後便赴上都良覿無因此唯歎叙珍重珍重人使不斷絶也轉憑司錄馳白不一于邵頓首贈李舎人使君書釋晝即皎然自湖上一辭十有餘載公貴為方伯晝跡在空林出處殊疎音塵不接蓋理然也晝從辭後自謂年多志固名疎道親惟慕空門若有所詣然未曾遇一知已嘗戱為一章自詠曰樂音落禪心似蕩吾道不相妨獨悟歌還笑誰言老更狂昔謝太傅每賞支公善標宗要若九方堙之相馬略其𤣥黄而取其駿一作俊逸晝今日於公即道林逢太傅之秋也又晝於文章理心之外或有作意在適情性樂雲泉亦何能方健羡於其間哉頃自目疾相嬰濛濛如隔煙霧兼患脚氣行李不進昨承至止病士不獲躬詣門闌披叙離闊形礙神徃有所恨也謹馳狀兼簡雜文晝性野思拙機淺忽若偶中風律於期匠者賞鑒不遺幸甚幸甚釋晝白贈包中丞書改年伏惟永感罔極晝之理心本在忘情及經節序惘然悲愴去歲馬某一作三徃已奉狀計上逹孟春猶寒伏惟中丞尊體萬福即此晝䝉免一昨見秋晩離披菊一章使晝却顧鄙拙盡欲焚燒凝思三復彌得精㫖中丞寄重任大堆案日盈而言詩至此豈非凝心悉到耶今海内詩人以中丞為龍門賢與不肖雷同願登仰測中丞之為心固進善而拒不工也晝無西施之容不合輙議西施之美然心之服矣其敢蔽諸今之馳疏實有所薦有㑹稽沙門靈澈年三十有六知其有文十餘年而未識之比則聞於故秘書郎嚴維隨州劉使君長卿前殿中皇甫侍御曾嘗所稱耳及上人自浙右來湖上見存並示製作觀其風裁味其情致不下古手不傍古人則向之嚴劉皇甫所許疇今所覿則三君之言猶未盡上人之美矣讀其道邉古墳詩有松樹有死枝塜上唯莓苔石門無人入古木花不開荅范秘書作則有緣竹歲寒在故人衰老多雲門雪夜作則有天寒猛虎呌巖雪松下無人空有月千年像教人不聞燒香獨為鬼神說石帆山作則有月色靜中見泉聲深處聞題李尊師堂則有古廟茅山下諸峯欲曙時真人是皇子玉堂生紫芝題曹溪能大師蔣山居則有禪門至六祖衣鉢無人得登天姥岑望天台山作則有天台衆山外歲晩當寒空有時半不見崔嵬在雲中傷古墓作則有古墓碑表折荒壠松柏稀福建還登黎嶺望越中作則有秋深知氣正家近覺山寒九日作則有山僧不記重陽日因見茱萸憶去年宿延平津懐古作則有今非古獄下莫向斗間看又有山邉水邉待月明暫向人間借路行如今還向山邉去惟有湖永無路行此僧諸作皆妙獨此一篇使晝見欲棄筆硯伏惟中丞髙鑒𢎞量其進諸乎其捨諸乎方今天下有故人大賢勤王輙以非急干諸視聽亦昭愚老不逹時也然上人秉心立節不可多得其道行定惠無慙要逺嘗著律宗引源二十一巻為緇流可疑歸至於𤣥言道理應接靡滯風月之間亦足以助君子髙興也晝疾弊未期奉展伏深瞻望近應府三五首謹憑靈澈上人呈上年暮思蹇多慮迷錯所希宗匠一為指瑕幸甚幸甚晝白答楊湖南書權徳輿使至䝉惠寄制集序發函煥然􅄹耳溢目𢎞麗博厚坦夷章明如黄鍾大玉慶霄天籟竒采正聲鏗鏘照燿文粹作燭真可謂作者之表方駕古人忻懽駭悚咏歎無斁甚盛甚盛但根本不稱奬飾非宜以此為雄文至鑒之累如何如何書命者古先哲王之所以發徳音而賦百職也在易曰后以施命告四方書曰誕告萬方詩曰訏謨定命逺猶辰告故君陳君牙畢命冏命之作皆直而文簡而誠含章而不流漢廷亦云文章爾雅訓辭深厚其重如是而鄙人忝焉使盛聖之文明不登於典謨訓誥罪在菲薄其敢逃責於多士耶昔顔氏之子有不善未嘗不知知之未嘗復行愚雖竊知之之道而職命所拘不能不一無此字俟終日而勇退日踐復行之過至于九年暴於四方為所觀笑此所以慙愧於古人也亦思人生世間當志於逺者大者豈數數然刓文粹作損精耗神攘竊文字而猶力不足意不逮雖三益直諒之道久廢獨不愧於心者文粹作乎昨休沐之餘愚子呈閱且以有大朝中外之授受士友遷除之歲時遂不計妍蚩相從以類初不敢以制集自命但全其文而已因其猥多分列巻第又靦然以序引奉煩者誠以承眷之深而心仰雄伯使夜光冠於魚目永為子孫秘藏非敢効太冲三都而求𤣥晏發之道也及覽鴻麗之作無非溢集本文粹作逸言追思内訟已無所及使鄙人涉敝帚自見之患陷作者於玉巵無當之嫌一不敏而相交䘮何可言也伏以門人忠節叙述周詳因小生之無似揚先徳於不朽伏讀感咽何階仰酬結於肺腑沒齒無極又徳音宥宻皆出自中禁而西掖所掌止於命官今序中所言霈王澤燭幽滯振刑典申肅殺揄揚𢎞大務極其言則虚美之中又為虚美所冀盡去過談方敢受賜耳故吏部李員外三丈寓書於柳秘書求為後集序此賢逹所不能忘懐也但侈言失實如楚越之相遼異時見譏於通人則復為累也亦輒為閣下良規非止於自謀也左曹許公範二紀以來過於賞愛鄙人每以逐臭况之今又遇閣下此作素多昧理忽復自疑幸無泥於眷私而滅裂公是二字一作之是所望也載之再拜六月二十五日代李侍郎與徐州張尚書書吕温奉别紙示諭眷待殊異規畧端明究忠義之苦言揚經通之雅㫖皆足以感動朝野光映古今一字之貴可懸於千金終身佩之何啻於三復甚善甚善伏以尚書才膺間出識藴生知地承勲徳行在詩禮自家逹國移孝為忠受任先朝克荷崇構控喉襟之地成節制之師動必勤王志皆憂國忠實彰於行事義聲感於旁鄰布在人謡溢于時論鳴鶴有和鐘鼓必聞聖上神武聰明維新覆幬勵精戎事注意藩隅方仄陋以旁求况勲賢之自著何患乎誠不上逹道不大光宣太阿之利用窮彛鼎之盛烈者乎某以寡薄謬膺寄集作重任成賦之重撫事知慙徒欲盡愚衷悉集作陳鄙見策朽磨鈍庶効涓涘竭誠捐軀少酬恩遇知我者寡同志實難頃在江西過辱厚意常懐慕仰頗歴歲時昨者以私鹽干禁漸耗公利汴州滯運屢稽軍期忝當軄司每積憂負輙率誠懇粗申條例網羅盗販集作糴節宣通渠實託衆賢敢專獨見果䝉𢎞至公之量推急病之心率先侯伯首贊王度許以别設方畧大為隄防究絶姦源通利國漕神之聽之言可復於天地有始有卒事必立於邦家佇觀莫大之功以成不朽之美諸侯師表天子腹心千載一時誠無以讓某奉職之分受賜𢎞多拳拳寸誠夙夜欣企幸甚幸甚徐傪宜並在使者口述伏惟照悉代辛將軍與普閏劉尚書書前人某性質鄙昧智能無取承藉門緒早䝉驅策盡瘁軍府備嘗險艱徒竭犬馬之勞詎濟弓裘之美家構未克國恩未酬而謬典禁司軄惟侍衛良時自晩宿志莫申憤血猶剛憂髮先白加以禀性寡合知音實難甘心此生長鳴靡託豈料尚書推𢎞深之量啓特逹之心愛念不遺眷知益重昨者四牡來覲萬乗虚襟旁求將帥之臣佇清至公之鑒然則蕭何之稱必在韓信孝友有問宜薦雲中而丹墀對敭首及庸瑣敷陳本末奬飾逾涯逹其忠義之誠許其逺大之致雖躬論志業自瀝肺肝纎悉周詳豈能及此遂使鬱堙之志允逹於宸聰樗朽之材式孚於帝念言發九天之上聲聞四海之中行得舟航坐生羽翼雖管鮑在齊載深知我之感王貢仕漢有切彈冠之善方諸今日未足為喻不圖知己之至於斯義激血誠恩纒骨髓每一念至不覺涕流殞首糜軀豈能報徳唯當竭誠砥節服義懐仁奉以周旋居之造次貞集作青松得地方見於歲寒皦日在天願明集作聽其心誓死生集作生死幸甚幸甚屬有負薪之疾未申拜賜之禮瞻荷之至感懼兼深拳拳下情未知所措稍任行李即冀趨謁伏惟照察云云此二篇英華舊本合而為一故其首尾不全今用集本足之但寘之文章門亦所未喻與劉評事伯芻書符載聆夫子之善聲滿盈矣世且多故無緣㑹覿開襟嚮風勞止如何余友蘭陵蕭易簡篋中獲足下所製窮逹一作通述髙韻孤峙詞趣淵宻探聖賢性命之際究天地否泰之理因知殷紂之黄屋不為通也顔子之陋巷不為窮也使百世君子之知道益明守道益堅不汲汲不戚戚從容中道斯立言之由也顧惟短才謬嘗為文伸紙始竟百骸清快欽挹既乆無可自道因豫章王兵曹徃聊寫梗概不盡慨詠之萬一耳寄李翺書裴度前者唐生至自滑猥辱致書札兼獲所貺新作二十集本文粹作十二篇度俗流也不盡窺見若愍女碑烈婦傳可以激清集作揚教集作勸義煥於史氏鐘銘謂以功代名於器為銘與弟正辭書謂文非一藝斯可謂救名之失廣文之用之文也甚善甚善然僕之知弟也未知其他直以弟敏於學而好集本文粹作至於文也就六經而正焉故每遇名輩稱弟不容於口自謂彌乆益無愧詞竊料弟亦集有當字以直諒見待不以恱媚相容故不惟嗟悒集作挹亦欲商度其萬一耳若弟擯英華作掲落今古脫遺經籍斯則如獻白豕何足採取若猶有祖述則願陳其梗槩以相參㑹耳愚謂三五之代上垂拱而無為下不知帝力其道集作澤文粹無此字漸被於天地萬物不可得而傳也夏殷之際聖賢相遇其文在於盛徳大業又鮮可得而傳也厥後周公遭變仲尼不當世其文遺於冊府故可得而傳也於文粹無此字是作周孔之文文粹有也字荀孟之文左右周孔之文也理身理家理國理天下一日失之敗亂至矣騷人之文發憤之文也雅多自賢頗有狂態相如子雲之文譎諫之文也别文粹作自為一家不是正氣賈誼之文化成之文也鋪陳帝王之道昭昭集作然在目司馬遷之文財成之文也馳騁數千載若有餘力董仲舒劉向之文通儒之文也發明經術究極天人其實集作餘擅美一時流譽千載者多矣不足為弟道焉然皆不詭其詞而詞自麗不異其理而理自新若夫典謨訓誥文言繫詞國風雅頌經聖人之筆削者則又至易也至直也雖大彌天地細入無間而竒言恠語未之或有意隨文而可見事隨意而可行此所謂文可文非常文也其可文而文之何常之有俾後之作者有所裁凖而請問於弟謂之何哉謂之不可非僕敢言謂之可也則大學之道在明明徳在止至善矣能止於止乎集本文粹作能止乎若遂過之猶不及也觀弟近日製集本文粹作制作大㫖常以時世之文多偶對意集作儷句屬綴風雲覊束聲韻為文之病甚矣故以雄詞逺志集本文粹作致一以矯之則是以文字為意也且文者聖人假之以逹其心逹則已理窮則已非故髙之下之詳之略之也愚欲去彼取此則安步而不可及平居而不可踰又何必逺闗經術集作籍然後騁其材力哉昔人有見小人之違道者恥與之同形貌共衣服遂思倒置眉目反易冠帯以異也不知其倒之反之之非也雖非於小人亦異於君子矣故文之異在氣格之髙下思致之淺深不在其磔裂章句隳廢集作壊聲韻也人之異在風神之清濁心志之通塞不在於倒置眉目反易冠帯也試用文粹作庶幾髙明少納庸妄若以為未幸不以苦言見革無文粹作其惑唯僕心慮荒散百事罷息然意之所在敢隠於故人耶昌黎韓愈僕識之舊矣中心愛之不覺驚想然意之集本文粹作其人信美材也近或聞諸儕類云恃其絶足徃徃奔放不以文立制而以文為戱可矣乎可矣乎今之作者不及則已及之者當大為防焉耳弟素居多年勞想深至窮隂凝沍動息如何入奉晨昏之歡出參帷幄之内集本文粹作畫字固多適耳昨弟來集有字字欲度及時干進度昔歲取名不敢自服集本文粹作髙今孤煢若此遊官謂何是不復能從故人之所朂耳但寘力田園茍集作省過英華作遇朝夕而已然待春氣微和農事未動或當策蹇謁賢大夫兼與弟道舊未爾間猶希尺牘珍重珍重力書無諭集本文粹作餘從表兄裴度奉簡答崔立之書韓愈斯立足下僕見險不能止動不得時顛頓狼狽失其所操持困不知變以至辱於再三君子小人之所憫笑天下之所背而馳者也足下猶復以為可教貶損道徳乃至手筆以問之扳援古昔辭義髙逺且進且勸足下之於故舊之道得之矣雖僕亦固望於君一作吾子不敢望一作問於他人者耳然尚有似不相曉者非固一作故欲發余乎不然何子之不以丈夫期我也不能默默聊復自明僕始年十六七時未知人事讀聖人之書以為人之仕者皆為人耳非有利乎已也及至二十時苦家貧衣食不足謀於所親然後知仕之不唯為人耳及來京師見舉進士者人多貴之僕誠樂之就求其術或出禮部所試詩策等以相示僕以為可無學而能因詣州縣求舉有司者好惡出於其心四舉而後有成亦未即得仕聞吏部有以博學宏詞選者人尤謂之才且得美仕就求其術或出所試文章亦禮部之類也私怪其故然猶樂其名因又詣州府求舉凡二試於吏部一既得之而又黜於中書雖不得仕人或謂之能焉退因自取所試讀之乃類於蜀本作乎俳優者之詞顔忸怩而心不寧蜀本作安者數月既已為之則欲有所成就書所謂恥過作非者也因復求舉亦為一作無幸焉乃復自疑以為所試與得之者不同其程度及得觀之余亦無甚愧焉夫所為博學者豈今之所謂者乎夫所謂宏詞者豈今之所謂者乎誠文粹作設使古之豪傑之士若屈原孟軻司馬遷相如揚雄之徒進於集作于是選僕必知其懐蜀本作愧慙乃不自進而已耳蜀本作矣設使與夫今之善進取者競於䝉昧之中僕必蜀本作固知其辱焉然彼五子者且使生一作出於今之世其道雖不顯於天下其自負何如哉肯與夫斗筲者决得失於一夫之目而為之憂樂哉故凡僕之汲汲於進者其小得蓋欲以具蜀本作完裘葛養孤窮也其大得蓋欲以同吾之所樂於人耳其他可否自計已熟誠不待人而後知今足下乃復比之獻玉者以為必俟良工集作工人之剖然後見知於天下雖刖兩集作兩刖足而不為痛集作病且無使勍者再刖集作剋誠足下相勉之意厚也然仕進者豈固舎此而無門哉足下為我必待此而後振集作進者尤非集作非先相悉之辭也僕之玉固未嘗獻而足固未嘗刖足下無為我戚戚也方今天下風俗尚有未及於古者邉境蜀本作地尚有披甲執兵者主上不得怡而宰相以為憂僕雖不賢亦所集作且潜究其得失致之乎吾相薦之乎吾君上希卿大夫之位下猶取一障而乗之若都不可得猶將耕於寛閒之野釣於寂寞之濵求家國之遺事考賢人哲士之集有所字終始作唐之一經垂之於無窮誅奸䛕於既死發潜徳之幽光二者將必有一可足下以為僕之玉凡幾獻而足凡幾刖也又所謂勍者果誰哉再刖集作尅之刑信如何也士固伸於知己微足下無以發吾之狂言愈再拜答皇甫湜書李翺辱書覽所寄文章詞髙理直歡恱無量有足發予者自别足下來僕口不曾言文非不好也言無所益衆亦未信祗足以招謗忤物於道無明故不言也僕到越中得一官三年矣行能寡薄文粹作材能甚薄澤不被物月費官錢自度終無補集有益字累求罷去尚未得以為愧僕性不解諂佞生文粹作復不能曲事權貴以故不得齒于士林而足下亦抱屈在外故畧有所說凡古賢聖得位於時道行天下皆不著書以其事業存於制度足以自見故也其著書者蓋道徳充積阨摧於時身卑處下澤不潤物恥灰冺而燼滅又無聖人為之發明故假空言是非一代以傳無窮而自光耀於集作于後故或徃徃有著書者僕近冩得唐書史官才薄言詞鄙淺不足以發揚髙祖太宗列聖明徳使後之觀者文彩不及周漢之書僕以為西漢十一帝髙祖起布衣定天下豁逹大度東漢所不及其餘唯文宣二一作兩帝為優自惠景以集作已下亦不皆明於東漢明章兩帝而前漢事跡灼然傳在人口者以司馬遷班固叙述髙簡之工故學者恱而習焉其讀之詳也足下讀范曄漢書陳夀三國志王隠晉書生熟何如左丘明司馬遷班固書之温習哉故温習者事跡彰而罕讀書者事跡晦讀之疎數在詞之髙下理必然也唐有天下聖明繼於周漢而史官叙事曾不如范􅁮陳夀所為况足擬望左丘明司馬遷班固之文哉僕所以為恥當兹得於集作于時者雖負作者之材其道既能被物則不肯著書矣僕竊不自度無位於朝幸有餘暇而詞句足以稱贊明盛紀一代功臣賢士行迹灼然可傳於後代自以為能不滅者不敢為讓故欲筆削國史成不刋之書用仲尼褒貶之心取天下公是公非以為本羣黨之所謂為非者僕未必以為非使僕書成而傳則有富貴而功徳不著者未必聲名於後貧賤而道徳全者未必不烜赫於無窮韓退之所謂誅奸䛕於既死發潜徳之幽光是翺心也僕文彩雖不足以希左丘明司馬子長足下視僕叙髙愍女楊烈婦豈盡出班孟堅蔡伯喈之下耶仲尼有言不有博奕者乎為之猶賢乎已僕所為雖無益於人比之博奕猶為勝也足下以為何如哉古之賢聖當仁不讓於師仲尼則曰文王既沒文不在兹乎又曰予欲無言天何言哉孟軻則曰予之不遇魯侯天也臧氏之子安能使予不遇哉司馬遷則曰成一家之言藏之名山以俟後聖人君子僕之不讓亦非大過也幸無怪翺再拜文苑英華巻六百八十
