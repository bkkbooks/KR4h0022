body:
  text: 文苑英華巻二百六十六宋李昉等編送行一梁簡文帝四首沈約三首吳均十首何遜一首朱超二首王僧孺一首庾肩吾一首范雲二首徐陵三首隂鏗二首王褎三首庾信三首陳後主一首江總三首孔德紹二首釋智才一首鄭公超一首曾範一首劉夢予一首尹式二首陳子良一首崔信明一首王胄一首李百藥一首王勃五首楊烱七首餞别梁簡文帝行樂出南皮讌餞臨華池籜解篁開節花暗鳥迷枝忩隂隨影度水色帶風移徒命銜盃酒終成憫别離送别前人行行異沂海依依别路岐水苔隨䌫聚岸柳拂舟垂石菌生懸葉江槎流卧枝燭盡悲當一作宵去酒滿惜將一作暌離傷離新體前人傷離復傷離别後情鬱紆悽悽隠去棹憫憫愴還途還途一作慼慼意不申轉顧獨霑巾前驅經御宿後騎歴河漘胡香翼還幰清笳送後塵落日斜飛盖餘暉承畫輪柳影長横路槐枝深隠人桂宫夕掩銅龍扉甲館宵垂雲母幃朧朧月色上的的夜螢飛草香襲余袂露灑霑人衣帶堞凌城雲亂聚排枝度葉鳥争歸盆類聚作盌中浮蟻不能酌琴間玉徽調别鶴别鶴千里别離聲絃調軫急心自驚試起登南樓還向華池逰前時篠生今欲合近日栽荷尚不抽猶是銜杯共賞處今兹對此獨生愁樓髙望曖曖山川自分態􅅯師雖北連轘轅已南背逺聽寂無聞遥瞻目有礙含毫意不迷長歎情無頼餞臨海太守劉孝儀蜀郡太守劉孝勝前人碣石臨東海峩眉距西候兩社昔夾河二龍今出守方夜無犬驚向昔神牛鬪凉風繞輕幕麥雨交新溜念此一銜觴懷離在惟舊送别友人沈約君東我亦西啣悲涕如霰浮雲一南北何由展言宴方作異鄉人贈子同心扇遥裔發海鴻連翩出簷燕春秋更去來參差不相見别范安成前人平生少年日分手易前期及爾同衰暮非復别離時勿言一樽酒明日難重持夢中不識路何以慰相思别謝文學前人漢池水如帶巫山雲似盖瀄汨背呉潮潺湲横楚瀬一望沮漳水寧思江海㑹以我徑寸心從君千里外同柳呉興烏臺集送柳舍人呉均河陽一悵望南浦送将歸雲山離掩曖花霧共依霏集作霏依流連反舌哢下上集作上下陽禽飛桂舟無掩枻玉軫有離徽願君嗣蘭杜時拂集作採東臯薇同柳呉興何山湖州山名集送劉餘杭前人王孫重離别置酒峯之畿逶迤川上草參差澗裏薇輕雲紉一作劒逺集作晩岫細雨沐山衣簷端水禽息忩上野螢飛君隨緑波逺我逐清風歸送柳呉興竹亭集前人平原不可望波瀾千里直夕魚汀下戯暮羽集作雨簷中息白雲時去來青峯復負側躑躅牛羊下晦昧崦嵫色王孫猶未歸且聽西光匿酬别江主簿屯騎前人有客告将離贈言重蘭蕙泛舟當泛濟結交當結桂濟水有清源桂樹多芳根毛公與朱亥俱在信陵門趙瑟鳳凰柱呉醥金罍樽我有北山志留連為報恩夫君皆逸翮摶景復凌騫白雲間海樹秋日暗平原寒蟲鳴趯趯落葉飛翻翻何用贈分首自有北堂萱贈王桂陽别三首前人昔聞楊伯起拖玉振清風髙華積海外名實滿山東自有五都相非無四世公臨忩驚白日倚匣曳輕虹願持鷦鷯羽歳暮依梧桐二客子慘無歡送别江之干白雲方渺渺一作眇黄鳥尚闗闗糺紛巫山石合沓洞庭瀾行衣侵曉露征船犯夜湍一作征舠犯夜湍無因停合浦見此𤣥一作去珠還三樹響浃山來溪類聚作猿聲繞岫急旅㠶風飄揚行巾露霑濕深浪闇蒹葭濃雲沒城邑不見别離人獨有相思泣贈鮑舂陵别前人落葉思紛紛蟬聲猶可聞水中千丈月山上萬重雲海鴻來倐去林花合復分所憂别離意白露下霑裙别王謙前人嚴光不逐類聚作遂世流轉任飛蓬欲還天台嶺不狎甘泉宫離歌玉絃絶别酒金巵空儻遺故人念僕在東山東酬别前人故人杯酒别天清明月亮露下寒草一作葭中風起秋江上衣染潺湲泣棹犯參差浪匕首在千金七寳雕華装側亮切已注在前類聚疑平聲改作杖生離何用表頼此持相餉與胡興安夜别何遜見類聚居人行轉軾客子暫維舟念此一筵笑分為兩地愁露濕寒塘草月映清淮流方抱新離恨獨守故園秋别劉孝先朱超疲疴積未瘳伏枕倦長愁復念夜分手江上值徂秋隂凝變逺色落葉泛寒流繁霜積曉䌫輕氷繞夜舟曳裙出兎苑引領望龍樓勿念荆臺側無為戚情逰情一作成道别席中兵前人數年共棲一作逰息一日一作旦各聫翩莫言或作論行近逺終是隔山川長波漫不極髙岫鬱相連急風亂還鳥輕寒静暮蟬扁舟已入浪孤㠶漸逼天停車對空渚悵一作長望轉依然送殷何兩記室王僧孺見類聚掩袖出南浦驅車送上征飄飄曉雲駛瀁瀁旦潮平不肖余何惜無貲爾勿輕儻有還書便一言訪死生新林集作亭送劉之遴庾肩吾斾初學記作車轉黄山路舟纚類聚作䌫白馬津送輪時合幰分驂各背塵常山喜臨岱初學記作代隴頭悲望秦欲持漢中策還以寄一作贈征人送沈記室夜别范雲桂水澄夜氣楚山清曉雲秋風兩鄉怨秋月千里分寒芝寧共採霜猿行獨聞捫蘿勿類聚作忽憶我折桂方思君别詩前人孤煙起新豐候鴈出雲中草低金城霧木下玉門風别君河初滿思君月屢空折桂衡山北摘蘭湘水東蘭摘心焉寄桂折意誰通别毛尚書一作永嘉徐陵顧子厲風規一作願子勵清規歸來振羽儀嗟余今老病此别畏一作恐長離白馬君來哭黄泉我詎知徒勞脫寳劍空掛隴頭枝秋日别庾正員前人征途愁轉斾連騎慘停鑣朔氣陵疎木江風送上潮青雀離㠶逺朱鳶别路遥唯有當秋月夜夜上河橋新亭送别前人風吹臨伊水時駕出河梁野燎一作老村田黑江秋岸荻黄隔磯一作城聞上鼔回舟一作洲隠去檣神襟愛一作憂逺别流涕極清漳江津送劉光禄不及隂鏗依然臨送渚長望倚河津鼓聲隨聽絶㠶勢與雲隣泊處空餘鳥離亭已散人林寒正下葉釣類聚作晩欲収綸如何相背逺江漢與城闉廣陵岸送逺使見二百九十六卷前人送别裴儀同王褎河橋望行旅長亭送故人沙飛似軍幕蓬卷若車輪邉衣苦霜雪愁貌損風塵行路皆兄弟千里念相親别陸子雲類聚作才子前人解䌫出南浦征棹且凌晨還看分手處唯餘送别人中流摇盖影邉江落騎塵平湖開曙日細柳發新春滄波不可望行雲聊共因别王都官前人連翩憫流客類聚作落悽愴惜離羣東西御溝水南北㑹稽雲河橋兩隄絶横岐數路分山川遥不見懷袖逺相聞别周尚書宏正無詩庾信重别周尚書前人陽闗萬里道不見一人歸唯有河邉鴈秋來南向飛别張洗馬樞前人别席慘無言離悲兩相顧君登蘇武橋我見楊朱路闗山負雪行河水乗氷渡顧子着朱鳶知余在𤣥兔幸𤣥武湖餞呉興太守任惠陳後主寒雲輕重色秋水去來波待我戎衣定然送大風歌贈别洗馬袁朗江總賈誼登朝日終軍對奏年校文升廣内撫劍入崇賢竒才與殊艷集作殊逸将别愛留連集作更留聫一作愛攀聫驅車命饒一作絃管拱坐面林泉池寒稍下鴈木落久無蟬霧侵山扉一作上月霜開石路煙髙談無以一作興慰遲爾報華篇此詩三百四十卷重出今已削去注異同為一作别袁昌州前人河梁望隴頭分手路悠悠徂年若驚電别日欲成秋黄鵠飛飛逺青山去去愁不言雲雨散更似東西流别南海賔化侯前人石闗通越井蒲澗邇靈洲此地何遼敻羣英逐逺逰髙才袁彥伯令譽許文休逰焉值君子復此映芳猷崤函多險澁星琯壮環周分岐泣世道念别傷邉秋斷山時結霧平海若無流驚鷺一羣起哀猿數處愁是日送歸客為情自可求終謝能鳴鴈還同不繫舟其如江海泣惆悵徒離憂英華及類聚節去八句今以集本添入全篇送蔡君知入蜀二首孔徳紹金陵已去國銅梁忽背飛失路還相送他鄉何日歸二靈闗九折險蜀道二星遥乗楂若有便希泛廣陵潮送别釋智才鏡中辭舊識㶚岸别新知年來未應老祗為數經離送庾羽騎抱鄭公超舊宅青山逺歸路白雲深遲暮難為别摇落更傷心空城落日影迥地浮雲隂送君自有淚不暇聽猿吟送别魯範去留雖有異失路與君同如何拔心草還送斷根蓬送别秦王學士江益劉夢予百年風月意一旦死生分客心還送客悲我復悲君送晉熈公别尹式太行君失路扶摇我退飛無復紅顔在空持一作将白首歸色移三代服塵化兩京衣道窮方識一作體命事去乃知非西候追孫楚南津送陸機雲薄鱗逾細山髙翠轉㣲氣隨流水咽淚逐斷絃揮但令寸心宻隨意尺書稀别宋常侍前人逰入疑作人杜陵北送客漢川東無論去與住俱一作悉是一飄蓬秋鬢含霜白衰顔倚酒紅别有相思處啼烏雜夜風送别陳子良落葉聚還散征禽去不歸以我窮途泣占疑作沾君出塞衣送金敬陵入蜀敬疑作竟崔信明金門去蜀道玉壘望長安豈言千里足一作逺方尋九折難西上君飛盖東歸我挂冠猿聲出峽斷月影落江寒從今與君别花月㡬新殘别周記室王胄五里徘徊鶴三聲斷絶猿何言俱失路相對泣離樽别意悽無已當歌寂不喧貧交欲有贈掩涕竟無言送别李百藥眷言一杯酒悽愴起離憂夜花飄露氣暗水急還流鴈行遥上月蟲聲迥應秋明月河梁上誰與論仙舟送臨盧盧主簿王勃窮途非所恨虚室自相依城闕居年滿琴樽俗事稀開襟方未已分袂忽多違東巖富松竹歳暮幸同歸餞韋兵曺前人征驂臨野吹别袂慘江垂川霽浮煙歛山明落照移鷹風凋晩葉蟬露泫秋枝亭臯分逺望延想間雲涯白下驛餞唐少府前人下驛窮交日昌亭旅食年相知何用早懷抱即依然浦樓低晩照鄉路隔風煙去去如何道長安在日邉送杜少府之任蜀州集作川前人城闕輔三集作俯西秦風煙望五津與君離别意同集作俱是宦逰人海内存知己天涯若比隣無為在岐路兒女共霑巾覉逰餞别前人客心懸隴路逰子惓江干槿濃朝濃集作豐砌静篠宻夜忩寒琴聲銷别恨風景駐離歡寧覺山川逺悠悠旅思難送梓州周司功楊烱御溝一相送征馬屢盤桓言笑方無日離憂獨未寛舉杯聊勸酒破涕暫為歡别後風清夜思君蜀路難送李庶子致仕還洛前人此地傾集作石城日由來供帳華亭逢李廣騎門接邵平𤓰原野炎氛匝闗河逰望賖白雲斷巖岫緑草覆江沙詔賜扶陽宅人榮御史車㶚池一相送流涕向煙霞送臨津房少府前人岐路三秋别江津萬里長煙霞駐征盖絃奏促飛觴階樹含斜日池風泛早凉贈言未終集作終未竟流涕忽霑裳送豐城王少府前人愁結亂如麻長天照落霞離亭隱喬樹溝水浸平沙左尉才何屈東闗望漸賖行看轉牛斗持此報張華送劉校書從軍前人天将下三宮星門召五集作啟戎坐謀資廟畧飛檄佇文雄赤土流星劍烏號明月弓秋隂生蜀道殺氣繞湟中風雨何年别琴樽此日同離亭不可望溝水自西東送鄭州周司功前人漢國臨清渭京城枕濁河居人下珠淚集作泣賔御促驪歌望極闗山逺秋深煙霧多唯餘三五夕明月蹔經過夜送集作餞前人趙氏連城璧由來天下傳送君還舊府明月滿集作照秦川文苑英華卷二百六十六
