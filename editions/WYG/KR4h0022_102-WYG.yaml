body:
  text: 文苑英華巻一百二宋李昉等編器用一鼎賦一首寳鼎賦一首豐城寳劒賦一首劒賦一首秦客相劒賦一首太阿如秋水賦一首斗間見劒氣賦一首斗牛間有紫氣賦一首切玉劒賦一首延陵季子挂劒賦一首鼎賦趙良器夫君所以為天下重者以其寳位鼎所以為天下貴者以其神器則君得鼎以祚長鼎應君以時昌故黄帝徴大匠稽舊章異國貢物逺人來王鏟銅於雷首之下合冶於荆山之傍聲沓沓以海沸氣曈曈而電光乾坤於是震動日月於是昭彰歘然烟收而燼滅卓爾成功而効祥煥以雕文錯虬龍之鱗介騰乎瑞色雜天地之𤣥黄蓋聖人所以享帝養賢烹餁薦祉重以安國利以出否納之不以其道則君失其人聽之不以其聰則雉鳴於耳是以囊括衆彚恢模崇深苞木火於六爻之象鏤山川於九牧之金於是總百靈之異見萬國之心然美其影射金晶光飛玉鉉論者徒議其小大觀者寧識其深淺故道歸天命無勞楚子之言徳自休明實賴王孫之辨爾其法剛柔之節順行藏之志乃有道則見生於汾水之隂無道則隠没於彭城之地可以斥奸慝可以禦魑魅應時而動吉無不利故曰作者之謂聖述者之謂明何明聖之至神契陰陽之至精徳表先知火不燃而自沸量含光大水不汲而自盈既去故以元吉終取新而利貞則知執虚以待物者正乎位體柔而進已者宜乎亨故能應皇家之至徳垂不朽之鴻名寳鼎賦梁徳裕昔軒皇之有天下也鑠至範恢崇謨用建皇極永康帝圖徴鐵於晉國之野鑄鼎於荆山之湖以隂陽作炭以天地為爐下碎礦而星入鼓長扇而風驅炎氣旁飛寒雪影消於玉馬紅光四照晴日色掩於丹烏於是以泄以竇以鎔以模故寳鼎之芳跡斯可得而聞乎爾其為狀也下實上虚外圓内朗玉鉉金耳之飾巽木離火之象法三台之位均九州之壤鏤厥奇狀文有鸞鳳蛟龍禦其不若恠無魑魅魍魎故夫長子主之而祭聖人饗之而養徒觀其闡微洞幽崇徳辨義作域中之寳通天下之利不汲而盈不炊而沸輕重自隨於徳元亨克保於位楚問伊川表周王之至徳齊求榖水豈人功之可致當今鼎命翹車鼎刑措獄道徳以為矩敦龎以淳俗不敢疑作取法於六籍不徴金於九牧自獲汾水以定郟鄏邁軒后於往圖遺夏王於後籙况伊尹作相由巢為僕乃傴僂其身不覆餗於足朗日月於金鏡調風雨於玉燭庶績其凝百姓無欲愚雖復望於其道欲負之而跼躅二字出史記韓信傳豐城寳劒賦達奚珣劒之利者有豐城之寳鍔夫其始也赤山破耶溪涸洪爐洞融金景煽爍雖發揮於人事乃兆朕於天作其為狀也鍛霆電明秋水殺氣森暎光輝四起歐冶失律風胡愕視豈徒決浮雲絶地紀若斯而已矣爾其大運迴薄陵谷推遷東南地一作此没不知夫數千百年騰精動地直上衝天斗牛之間夜雄雄然異金陵之浮王氣同寳鼎之在汾川本知浮精粹剛牛疑必備明而用晦者君子之時義窮而待達者丈夫之志事兼此數徳難乎見棄知我者寡大賴張公每讀舊書多兹感通不覺毛髪盡樹起雷息於胷中迨乎發蒙泉開祕匣文積幽翳上藏鱗甲磨礪畢兮見文章摇白日兮星煌煌鋒稜可畏動人膽表裏分明照眼光黄金裝兮緑龜飾荷提擕兮耿霜色豈辱命於洪造冀成能於武力君其試將倚天外不日為君清絶塞苟軍國之用在豈能雌伏於一代劒賦達奚珣代有劒兮物之至珍精鋼百鍊處匣千春含光匿耀守靜全真藴切玉之姿咸稱往歲呈斬龍之銳幸在今辰至如歐冶素藴風胡久委許提抜而非遙期磨礱而在邇蓮鍔熒煌思緑水之是投霜鋒煜爚諒碧天之可以疑作倚孰云巨闕亦曰龍泉借衞身而用光眉夀將行佩而永保流年俯而察乃白光畧地仰而觀則紫氣射天若乃取捨從人沉淪委質埋厚地之聲有年望司空之來何日擊兕之名已彰決雲之勢不失大哉寳劒之神用等天地而齊畢秦客相劒賦以決浮雲清絶域通題為韻有懐其寳而未别候一作後以其時而自絶始藏用而有疑終因人而一決蓋時有遇否非事有工拙願一二而擊轅之歌左右以相劒之說於越之君以五劒聞方潜神以閉匣非有意乎決雲且切白玉其猶泥斷絶蛟龍忽若篲泛夫以中庸之近者惡識天下之良劒有客來越其至自秦心以通於物理鑒有邁於人倫昔也聞風而恱今為觀國之賓以天機之見明利器之因天氣得中而不易金精順理而無逆翼乎秋水之欲波渙乎春氷之將釋陽散隂漫霜鍔雪脊好勇者不能禦其折衝善說者不能離其堅白滿谷之馬未可齊乎此價傾城之金安得賣乎此客况非景罕匹流星莫闕歐冶之術為優未見浮字官韻此名噐因而有作明至寳不得無妄劒非人而何識人非劒而何相雖鍜鍊於良工皆等襄於哲匠劒之能寳疑以相著士之用可以劒明抱識者闕乎牽復藏噐者以其彚征願以小人之道而進期君子之鑒惟清重曰析薪如之何匪斧不克求劒如之何非相不得純鈞之器秦客所識非常人之區域此賦多疑誤姑闕之太阿如秋水賦以如彼秋水容色為韻賈餗黯然若秋水者楚王有太阿之鋒窮其原則三尺成狀窺其底如百尺無蹤可以照魑魅鑒形容涵空而表裏泓澄詎私毫髪騰氣而風雲慘澹如隠蛟龍原其極良冶之功出洪爐之裏薛燭增駭風胡􅌓視千里萬里之斜漢耿耿方侔八月九月之洞庭沉沉相似深淺難測精光不死磨越砥疑穿石之泉淬葛溪如貫河之水氣晶熒而不息質瑩徹而難比流影耀金精之上涯涘皆空凉飈鳴玉匣之中波濤不起韜暎無慝疑作匿埃塵不居澄曉峽黯清渠俯視則孤光溢目横窺而一帶澄虚勞疑旁作臨挾刃之徒疑開别𣲖近暎腰金之士似躍游魚比練之流奚匹容舟之所寧如其文也流而無極其清也掬之不得短長如任器之狀蕩漾有盈科之則似無雲之溪澗徑挺其形如落木之江湖深沉其色龍泉非偶巨闕難儔蓮影如植龜文若遊星綴明珠孰辨懐珠之浦環分圓月終疑暎月之流洎乎霜露冷天地秋繇是勡勍敵决寃讎故得名溢古今聲流逺邇解晉鄭於紛若掃欃槍於嘒彼予一智刃於胷中其精如此斗間見劒氣賦以神物下潛精光上射為韻王起彼玉斗兮列乎太清此寳劒兮埋於豐城遥天式瞻諒闌干以成象厚地斯祕遂熠爚而騰精若非五山錯秀六合含英則何以下藏鋒於頴銳上作氣於貞明伊昔雷氏未占張公莫訪祕龍淵之奇彩射斗牛之異狀或雄雄於曲柄之末或冉冉於斗杓之上金陵之王氣莫齊函谷之紫氣應讓可大可久乃聖乃神嗟日月之逾邁怨土石之湮淪劒也氛氲連白榆與紫貝星為疑作焉昭晰應龜甲與龍鱗下埋照以煌煌上和光於歴歴何寳鍔兮斯隠在璇璣而必覿鋒惟切玉處玉匣以逾深氣則決雲每雲路而相射匪捨之則藏實闇然而彰仰九霄而遊目知百鍊之雄鋩乍滅乍明有扶於佳氣若離若合更類乎神光靈氣則浮利用猶鬱當繚繞而縈斗自表至珍倘陸離而佩身寧逢異物可以察三尺之滯淹可以見七星之沉潜石藴玉而騰輝未専其美鼎居汾而見氣徒有其占固宜仰層穹求外野延瞰於寰城之裏冥搜於古獄之下則可以論國都驅駿馬是知劒氣之在斗間所以求伸於知者斗牛間有紫氣賦以平吴之後異色逾朗為韻陳章天空原清劒氣方呈始象奪朱之色未知埋獄之情氛昏乍歇淮海初平貫斗牛於九霄正當吳分藏轆轤於午夜逺在豐城歴彼歲時間於躔次雄芒既表乎潜感靈物且悲乎遐棄增華台室方期猶疑作獨見之明流彩天階乍惑衆人之意思上徹而既久欲旁求而未遂謂繞樞之電郁郁彌彰想干吕之雲亭亭自異殊祥可驗直質不渝委照自歸乎有晉藏鋒若避於亡吳對西揭之皇疑作星望何勞於尹喜臨北走之塞相寧藉於風胡觀其出以標奇凝而成象既蜿蜒而久鬱亦曈曨而再朗陋日中之青暈每駐寥空掩天際之非煙潜通惚恍光而不耀昏以為期漠漠而淪精詎滅昭昭而黙識猶而疑東方未明始訝乎氣之聚也地不愛寳益見乎天將假之仰觀列位之中俯叶偃兵之後利刃猶鬱清時幸偶宣精溢目乍殷銀漢之流侔色衞身未配金章之綬其象也甚殊其明也則逾憤陸沉於江表結一彩於天衢凌夾月之霞徘徊碧落透靄空之露隠暎白榆永夕猶存其光未匿一作奇光尚匿齊効珍之金景鄙如虹之玉色不因槎客之犯如遇雷公之識儻觀此以見求冀龍泉兮可得切玉劒賦以天之利刃切玉如泥為韻王起彼神劒兮出昆吾之溪既成形而若水遂切玉以一作而如泥玉則貞堅誠齟齬而難入劒惟銛利將脫頴而莫齊是以從心剖判應手提攜入水蒼之文乍同夫淬水破雞冠之赤且異乎割雞當其琬琰外來球琳畢萃磨而不磷用之不匱以藏乎密地出匣而宣利遊恢恢之刃瑕不掩瑜剖琭琭之形刃有餘地是知不貪其寶不愛其資苟作礪而斯驗將匿瑕而可遺異匵之毁焉斯為過矣同斗之撞也于以碎之璨彼瓊華煥如縷切匪流血以為害將凝肪而必截觸可磨之玷片片氷開縱不鈍之鋒重重瓦裂應機則斷投刃皆虚可以斷珪瓉可以判瓊琚雄雄兮化龍之後璨璨兮抵鵲之餘苟在鎔之金不慙於歐冶則指瑕之璧何愛於相如温潤乍分陸離交燭於以慰良冶之至疑作志於以窒貪夫之慾耀芒而赫奕六金律刃而熒煌五玉是知斯劒之用也按之無下直之無前以刜鐘之聲乍移水碧以擊柱之勢時入山𤣥星文每臨夫藴石虹氣若斷於晴天然則干將所營風胡所狥或剸犀稱利或截鴻所疑進未若周王切玉之刃延陵季子挂劒賦脩脩隴樹兮挂劒于兹所以表徐君之所欲明季子之不欺予取予求昔藏心而可測一生一死終棄寶而如遺蓋烈士孤標之節而神明幽感之時當其昔結歡娛從容不阻孤鋒乍㧞密坐之所彼眷眷於目擊此黙黙而心許諒他日而來思非伊人而誰與及夫歴聘上國言旋東吳訪舊友遵舊塗亦當開寳匣獻轆轤何閱水兮不待弔荒埏兮已蕪由是執龍泉而慷慨望馬鬛而蜘蹰想間歲之披雲忽然而在撫今辰之切玉視之若無且曰器可謀新室寧欺暗解腰間之善結仰樹杪而延瞰乃脫白刃推赤心耀宿草之煌煌懸拱木之森森錯落金鐶疑夜月而生壠晶熒霜鍔謂春氷之在林龍形蜿蜿而未化蛟枝亭亭而欲尋解珮義廣脫驂感深英聲遂騰於萬國善價不顧其千金嗚呼劒之擲也無前人之行也必果誠去彼而取此非祈君之祐我無宿諾匹之以庸庸不食言方之以璅璅向若蔑𤣥壤恡青萍重提擕於掌握輕耿介於心靈則三尺之中空騰雲而漫漫重泉之下將愧色於冥冥無言者道之𢎞不約者信之大峻節卓以特立義風紛而繁㑹盛矣㢤挂劒之名將萬古而不昧文苑英華巻一百二
