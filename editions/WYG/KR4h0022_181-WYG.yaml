body:
  text: 文苑英華巻一百八十一宋李昉等編省試二州府試附冬日可愛二首日華川上動一首日南長至一首白日麗江臯一首夏日可畏一首秋日懸清光二首初日照華清宫一首初日照鳯樓一首日暮碧雲合一首日暮天無雲一首日暮山河清一首三讓月成魄一首月照冰池一首海上生明月一首璧池望秋月一首秋月懸清輝一首月映清淮流二首圓靈水鏡二首京兆府試殘月如新月一首玉繩低建章一首七月流火一首壽星見一首老人星一首府試觀老人星一首虹藏不見一首閏月定四時五首玉燭一首新陽改故隂一首迎春東郊二首東郊迎氣一首立春一首春從何處來一首長安早春二首春色滿皇州五首首夏猶清和一首冬日可愛陳諷貞元十年及第寒日臨清晝寥天一望時未消埋逕雪先暖讀書帷屬思光難駐舒情影若遺晉臣曾比德謝客昔言詩散彩寧偏照流隂信不追餘輝如可就廻燭幸無私同前庾元亮貞元八年及第宿霧開天霽寒郊見初日林踈照逾逺冰輕影微出豈假陽和氣暫忘𤣥冬律愁抱望自寛覉情就如失欣欣事幾許曈曈狀非一傾心儻知期良願自兹畢日華川上動石殷士曙霞攅旭日浮景弄晴川杲曜曾潭上悠揚極浦前岸高時擁媚波逺漸澄鮮萍實空隨浪珠胎不照淵早暄依曲渚微動觸輕漣孰假咸池望幽情得古篇日南長至獨孤鉉元和年吏部玉厯頒新一作窮律凝隂發一陽輪輝猶惜短圭影此偏長晷度經南斗流星一作晶盡北堂乍疑同一作周户耀可愛逗林光積雪銷微煦初萌動早芒更昇臺上望雲物已昭彰白日麗江臯陳昌言遲景臨遥水晴空似不高清明開曉鏡昭晰辨秋毫欝欝長堤土離離淺渚毛烟銷占一候風静擁千艘獨媚青春栁宜看白鷺濤何年謝公賞遺韻在江臯夏日可畏張籍類詩作丘為赫赫温風扇炎炎夏日徂火威馳逈野畏景爍一作鑠遥途勢矯翔陽翰功分造化鑪禁城千品燭黄道一輪孤落照頻空簟餘暉巻夕梧如何倦遊子中路獨踟蹰秋日懸清光陶拱一作洪秋至雲容歛天中日景清懸空寒色净委照曙光盈泫泫看彌上輝輝望最明煙霞輪乍透葵藿影初生鑒下應無極升高自有程何當廻盛彩一為表精誠同前王維寥廓凉天静晶明白日秋圓光含萬象碎影入閑流逈與青㝠合遥同江甸浮晝隂殊衆木斜影下危樓宋玉登高怨張衡望逺愁餘輝如可託雲路豈悠悠初日照華清宫柴宿靈山初煦澤逺近見離宫影動參差裏光分縹緲中鮮飈收晩翠佳氣滿晴空林潤温泉入樓深複道通璇題生烱晃珠綴引曈曨鳯輦何時幸朝朝此望同初日照鳯樓李虞仲旭日煙雲殿朝陽燭帝居斷霞生峻宇通閣麗晴虗流彩連朱檻騰輝照綺䟽曈曨晨景裏明㓕曉光初户牖仙山近軒楹鳯翼舒還如王母過遥度五雲車日暮碧雲合許康佐日際愁隂生天涯暮雲碧重重不辨盖沉沉乍如積林色黯疑暝隟光俄已夕出岫且從龍縈空寧觸石餘輝澹瑶草浮影凝綺席時景詎能留幾思輕尺璧日暮天無雲熊孺登杳杳復蒼然無雲日暮天象分青氣外景盡赤霄前漸吐星河色遥生水木烟從容難附麗顧歩欲澄鮮但見收三素何能測上𤣥應非暫呈瑞不許出山川日暮山河清失名天高爽氣晶馳景忽西傾山列千重静河流一帶明想同金鏡徹寧讓玉壺清纎翳無由出浮埃不復生縈紆分漢苑表裏見秦城逸興終難繫抽毫仰此情三讓月成魄不得泛説鄉飲之事劉􅞓為禮依天象周旋逐月成教人三讓羙為客一宵生初進輪猶暗終辭影漸明幸陪賔主位取捨任虧盈月照冰池葉季良霽夕雲初歛棲娥月未虧圓光生碧海素色滿瑶池天逈輪空見波凝影詎窺浮霜玉比彩照像鏡同規皎潔寒偏净徘徊夜轉宜誰憐幽境在長與賞心隨海上生明月朱華皎皎秋中月團圓一作團海上生影開金鏡滿輪抱玉壺清漸出三山㞯將凌一漢横素娥嘗藥去烏鵲遶枝驚照水光偏白浮雲色最明此時堯砌下蓂莢自將榮璧池望秋月張子容凉夜窺清沼池空水月秋滿輪沉玉鏡半魄落銀鈎蟾影摇輕浪菱花渡淺流漏移光漸潔雲歛色偏浮似璧悲三獻疑珠怯再投能將千里意來照楚鄉愁秋月懸清輝蔣防秋月沿霄漢亭亭委素輝山明桂花發池滿夜珠歸入牖人偏攬臨枝鵲正飛影連平野净輪度曉雲微晶晃浮輕露徘徊映薄帷此時千里道延望獨依依月映清淮流徐敞遥夜淮彌净浮空月正明虗無含氣白凝淡映波清見底深還淺居高缺復盈處柔知坎德持潔表隂精利物功難並和光道已成安流方利渉應鑒此時情同前失名淮月秋偏静含虚夜轉明桂花窺鏡發蟾影映波生澹灔輪初上徘徊魄正盈遥塘分草樹近浦寫山城桐栢流光逐蠙珠濯景清孤舟方利渉更喜照前程圓靈水鏡徐敞浮光上東洛揚彩滿圓靈明滅淪江水盈虗逐砌蓂不分沙岸白偏照海山青練色臨䆫牖蟾光靄户庭成輪疑璧影初魄類弓形逺近凝清質姢姢出衆星同前張聿鳯池開月鏡清瑩寫寥天影散微波上光含片玉懸菱花凝泛灔桂樹映清鮮樂廣披雲日山濤巻露疑作霧年濯纓何處去鍳物自堪妍廻首㸔雲液蟾蜍勢正圓京兆府試殘月如新月鄭谷見集本榮落何相似初終却一般猶疑和夕照誰信墮朝寒水國輝華别詩家比象難佳人應悞拜栖鳥反求安屈指期輪滿何心謂影殘庾樓清賞處吟徹曙鐘㸔玉繩低建章張仲素迢迢玉繩下芒彩正䦨干稍復臨鳷鵲方疑近露寒微明連粉蝶的皪映仙盤横接河流照低將夜色殘天榆隨影没宫樹與光攅遐想西垣客長吟欲罷難七月流火敬括前庭一葉下言念忽悲秋變節金初至分空一作寒火正流氣含凉夜早光拂夏雲收助月微明散沿河麗景浮禮標時令爽詩異一作興國風幽自此觀邦正一作邪正深知玉葉一作王業休壽星見失名𤣥象今何應時和政亦平祥為一人壽色映九霄明皎潔埀銀漢光芒近十疑作斗城含規同月滿表瑞得天清甘露盈條降祥煙向日生無如此嘉祉率土荷秋成老人星趙蕃太史占南極秋分見壽星增輝延寳厯發曜起祥經灼爍依狼地昭彰近帝庭高懸方杳杳孤白乍熒熒應見光新吐休徵徳自形既能符聖祚從此表遐齡府試觀老人星李頻良宵出户庭極目向青冥海内逢康日天邊見壽星臨空遙灼灼竟曉獨熒熒春後先依景秋來忽近丁垂休歸有道作瑞掩前經豈比周王夣徒言得九齡虹藏不見徐敞迎冬小雪至應節晩虹藏玉氣徒成象星精不散光羙人初比色飛鳥罷呈祥石澗収晴影天津失彩梁霏霏空暮雨杳杳映殘陽舒巻應時令因知聖厯長閠月定四時羅讓月閠隨寒暑疇人定職司餘分將考日積筭自成時律候行宜表隂陽運不欺氣薫灰琯騐數扐卦辭推六律文明序三年理暗移當知嵗功立唯是奉無私同前許稷玉厯窮三紀推為積閏期月餘因妙筭歲徧自成時乍覺年華改翻憐物候遲六旬知不忒四氣本無欺月桂虧還正階蓂落復滋從斯分厯象共仰定毫釐同前杜周士得閏因貞歲吾君敬授時體元承夏道推厯法堯咨直取歸餘改非如再失欺葭灰初變律斗柄正當離寒暑功前定春秋氣可推更憐幽谷羽鳴躍尚須期同前徐至積數歸成閏羲和職舊司分銖標斗建盈縮正人時節候潜相應星辰自合期寸隂寧越度長厯信無欺定向銅壺辨還從玉律推高明終不謬委鑑本無私同前樂伸聖代承堯厯恒將閏正時六旬餘可借四序應如期分至寧愆素盈虚信不欺斗杓重指甲灰琯再推離羲氏兼和氏行之又則之願言符大化永永作元龜玉燭平字員南溟厯象璿璣正休徵玉燭明四時佳氣滿五緯太階平律呂風光至烟雲瑞色呈年和知嵗稔道泰喜秋成寰海皇恩被乾坤至化清自憐同野老帝力詎能名新陽改故隂紇干諷律管才推候寒郊忽變隂微和方應節積慘已辭林暗覺餘澌斷潜驚麗景侵禁城佳氣換北陸翠煙深有截知遐布無私荷照臨韶光如可及鸎谷免幽沉迎春東郊張濯顓頊時初謝勾芒令復陳飛灰將應節賔日已知春考厯明三統迎祥受萬人衣冠宵執玉壇墠曉清塵肅穆來東道回環拱北辰仗前花待發旂處栁凝新雲歛黄山際氷開素滻濵聖朝多慶賞希為薦沉淪同前王綽玉管潜移律東郊始報春鑾輿膺寳運天仗出佳辰睿澤光時軰恩輝及物新虬螭動旌斾烟景入城闉御栁初含色類詩作搖日龍池漸啓津誰憐在隂者得與蟄蟲伸東郊迎春皇甫冉曉見蒼龍駕東郊春已迎綵雲天仗合𤣥象太階平佳氣山川秀和風政令行鈎陳霜騎肅御道雨師清律向韶陽變人隨草木榮遥歡上林苑今日遇遷鶯立春冷朝陽見雜詠玉律傳佳節青陽應北辰土牛呈歲稔綵鷰表年春臘盡星廻次寒餘月建寅風光行處好雲物望中新流水初銷凍潜魚欲振鱗梅花將栁色偏思越鄉人春從何處來白行簡欲識春生處先從木德來入門潜報栁度嶺暗驚梅透雪銀花散消氷水鑑開曉迎郊祀發夜逐斗杓廻淑氣空中變新聲曲裏類詩作雨後催偏能調律吕應是候陽臺長安早春前人杳靄三春色先從帝里芳折楊猶恨短測景已忻長鸎和紅樓樂花連紫禁香躍魚驚太液佳氣接温湯風送飛珂響塵䝉翠輦光熈熈晴煦逺徒欲奉堯觴同前張子容開國移東井城池對北辰咸歌太平日共樂建寅春雪盡黄山樹氷開黒水津草迎金埓馬花伴玉樓人鴻漸㸔無數鸎遷聼欲頻何當桂枝濯還及栁條新春色滿皇州沈亞之何處春歸一作輝好偏宜在雍州花明夾城道栁暗曲江頭風軟遊絲重光融瑞氣浮鬬鷄憐短草乳鷰傍高樓繡轂盈香陌新泉溢御溝行一作廻㸔日欲暮廻騎似川流同前滕邁類詩作薛能藹藹復悠悠春歸十二樓最明雲裏闕先滿日邊州色媚青門外光摇紫陌頭上林榮舊樹太液鏡新流類詩作汎新流暖帶祥烟起清一作晴添瑞景浮陽和如啓蟄從此事芳遊同前裴夷直寒銷山水地春遍帝王州北闕晴光動南山喜氣浮夭紅粧暖樹急緑走隂溝思婦開香閤王孫上玉樓氛氲直城北駘蕩曲江頭今日靈臺下翻然却是愁同前封敖帝里春光正䓤蘢喜氣浮錦鋪仙禁側鏡寫曲江頭紅蕚開蕭閤黄絲拂御樓千門歌吹動九陌綺羅遊日近風先滿仁深澤共流應非顦悴質辛苦在神州同前張嗣初何處年華好皇州淑氣勻韶陽潜應律草木暗迎春栁變金堤畔蘭抽曲水濵輕黄垂輦道微緑映天津麗景浮丹闕晴光擁紫宸不知幽逺地今日幾枝新首夏猶清和張律類詩作黎逢早夏宜初景和光起禁城祝融將御節炎帝啓朱明日送殘花晩類詩作日映林花麗風過類詩作風高御苑清郊原浮麥氣池沼發荷英樹影臨山動類詩作山爽禽飛入漢輕幸逢堯禹化全勝谷中情文苑英華巻一百八十一
