body:
  text: 文苑英華巻四百十四宋李昉等編上佐長史授張元福勝州都督府長史制李嶠鸞臺寧逺將軍守右衛彭池府右果毅都尉張元福素閑武略兼有吏能荷㦸臨戎屢陪蒼兕之陣題輿撫俗庶清白羊之黨可朝議大夫行勝州都督府長史仍馳驛赴任主者施行授陳璲凉州都督府長史制鸞臺刑部司馬上柱國陳璲知足禦戎才堪理劇題輿趙北未展器能分乗河西佇清邊徼假以優命行觀成績可朝散大夫守凉州都督府長史勲如故主者施行授艾敬直仙州長史制蘇頲勑朝議郎守豫州司上柱國艾敬直恪勤官次精練文法往持憲簡共惮清嚴頃擁使車旌别淑慝好龍遺迹乗鳬舊壤俾州閭之創建佇邦國之誠謠可守仙州長史散官勲並如故授盧朔萊州長史等制孫逖門下朝散大夫行太原府太谷縣令容一作任城縣開國子盧朔朝請大夫行太原府榆次縣令薛重輝等咸以班列遷于令長雖恭所職或異其能工則度材人無求備宜從近邑俾佐逺藩朔可行萊州長史重輝可行括州長史散官如故主者施行授楊行審靈州長史制門下朝散大夫守凉州都督府司馬河西轉運判官柱國楊行審雅推幹術兼有權謀頃在武威克脩官政類能而舉宜增郡佐之秩從帥而遷仍統軍城之務可守靈州都督府長史仍充六城水運使散官勲如故授楊戬華州長史制門下岐州司馬楊戬脩身自乆從政亦淹凡所効官皆聞著稱三輔之郡貳職為難宜易務於汧岐俾遷榮於河華可華州長史散官如故授韋景逺犍為郡長史等制門下益州蜀縣令韋景逺鄆縣令韋履言等各因常調俱在親人雖清白自持而方圓未適使者所奏應非百里之才官政式殊俾佐六條之職景逺可行犍為郡長史履言可行仁壽郡長史授楊進亳州長史制元稹勑楊進頃者師道潜遣兇徒將焚京洛姦謀指日忠告先期俾無頳尾之災實賴赤心之効雖居禁衛未免食貧言念前勞宜沾厚秩式佐郡府仍壯軍容尚旌撲滅之功以示優崇之賞可守亳州長史仍令宣武軍節度收隨要中驅使授盧犍深州長史制勑前成徳軍節度巡官盧揵朕以鎮冀數州之地刑賞廢置盡委之於𢎞正度爾才能宜為長佐且願兼榮允吾台臣是用兩可饒陽大邑無陋厥官可依前件授董昌齡許州長史制白居易勑將仕郎權知泗州長史兼殿中侍御史賜緋魚袋董昌齡頃為邑宰今賛郡符皆聞約已之名每展在公之節稽其器局允謂㢘明議以稍遷用彰勤効可守許州長史兼侍御史散官如故授楊孝直滑州長史制勑楊孝直早以材力從戎冀方專習武經通知吏事承元移鎮孝直實來詢謀驅馳有所裨助軍郡之佐寵秩非輕用答忠勞以明勸奬可滑州長史授張嘉泰延州長史制勑前丹州司馬張嘉泰一從戎旅多歴嵗時奉職有勞率身無過軍郡長佐資秩不卑自丹轉延頗為優豫題輿便道往守乃官可延州長史授桞師𤣥衢州長史國從瑜邢州司馬制杜牧勑夏州節度押衙知進奏朝議郎前權知杭州長史并監察御史上柱國栁師𤣥等將軍䕶塞師𤣥主留邸之職從瑜繼怤以墨縗狥公䘮塟告滿珪專書府叢委之務咸有勞能遷奬正名亦其常也各宜專勤勿罹悔尤可依前件授賴師貞懐州長史周少􅅠虢州司馬王桂直道州長史等制勑鳯翔府節度押衙知進奏銀青光禄大夫檢校秘書監前兼亳州長史殿中侍御史上柱國賴師貞等師貞主大藩留邸之事少􅅠專史閣錯雜之務皆公謹嵗乆官次當遷𤣥爽俾佐郡符亦有可取湖外饑人相聚為㓂蕩覆鄉縣勢如燎火盖不得已遂至剪伐桂直用命一舉滅之言念功勤宜有褒賞名郡上佐帖以憲秩耀爾軍旅可增義勇可依前件授田宻相州長史等制崔嘏勑田宻等並以才識聞於所知主帥上言計司有請各從所便分以命之仍假憲官式彰優寵授楊知權袁州司馬陳錫温州長史楊澄端州司馬等制錢珝勑具官某等凡臨戎有勇知其能為將成務有材知其能為吏然則有勇有材者置之不遷使其興旅食之歎非所以激為將勸為吏也各命敘升無忽吾典可依前件授侯藴賛善大夫李仁誨棣州長史蘇汾坊州長史制劉崇望勑某官某等或以忠勤彰於侯正或以奏獻著彼勞能况侯藴李仁誨親奉禁營始陪輦路不有遷命將何勸人可依前件授鄜州判官王堅檢校兵部尚書王彦懐翟州長史程佩思州司馬制薛廷珪勑廼眷雕隂仍嵗征討厥土既塉薄土也秦昔切其人用勞誠節是圖貢輸無怠而堅等能奉連帥來為使臣不有超昇孰旌優異五兵重秩式耀賔階下與夫進典午丞郡之榮者皆㧞茅連茹之謂也可依前件别駕授李守一别駕等制蘇頲黄門皇三從兄前洺州司馬守一等自登官序並穆政聲趙際燕陲漳濵淇上控河朔之風土盡山東之郡國宜膺别乗往佐專城可依前件主者施行授韋抱貞虢州别駕制黄門通議大夫前行剡王府諮議叅軍事上柱國韋抱貞早以才地乆登班序清徽藹然素風罔墜頃遊朱邸嘗寵於背淮俾騖緹軒往之於封虢可依虢州别駕散官勲如故主者施行授韋表玘泗州别駕制黃門朝議大夫前行襄州司馬員外置同正員韋表玘風韻融朗文詞富贍故得朝列著聞選曹甄擇漾流為漢嘗籍美於珠臯泗逹于河爰馳聲於磬水可守泗州别駕散官如故主者施行授張景順原州都督府别駕制前人黃門朝議郎殿中尚乗奉御兼隴右南牧使張景順襟期俊爽識具甄明代嗣僕臣家傳馬政慎言且聞於舉莢能養曾靡於缺銜惟在坰之可稱彼量谷之伊佇既叶抽奬仍循職事可守原州都督府别駕餘如故主者施行授李踐由安州别駕等制孫逖門下朝議大夫前使持節房州諸軍事守房州刺史上輕車都尉李踐由朝議大夫行蘄州司馬護軍李惟可等出自士林頻遷官序或方圖疑異用道有變通或昆友同官法宜迴避俾從新命用協舊章踐由可守安州都督府别駕散官如故惟可可鄂州别駕官勲如故授李裕鄧州别駕等制門下正議大夫前使持節海州刺史上柱國啻疑山縣開國子李裕朝議大夫前使持節泗州刺史上柱國開國男魏滉等咸資舊徳早踐通班頃坐微瑕因從免職賢哲之後可以勸能邦國之功期於補過裕可行鄧州别駕滉可守徳州别駕勲封如故授蕭誠𢎞農郡别駕制勑朝請大夫南陽郡長史員外置同正員上柱國蕭誠早因才藝乆踐榮班頃渉微瑕未為深累佐郡之職冗員頗多既有命於省官俾稍遷於近服可守𢎞農郡别駕散官如故授張正度汾州别駕等制杜牧勑中散大夫前守青州别駕上柱國張正度等各以才能入仕謹慎脩身積日累時咸有知己或有序進或狥所請皆佐别郡無怠官常可依前件授王叔政洪州别駕制崔嘏勑前綿州刺史王叔政等罷專城之印題别駕之榮休摧虜之䇿遷計掾之任此朝廷所以舉才而振滯也政縁吏昇珩以文進分符得理人之術佐賦有羨入之績随薦實來有司上奏爰因所舉各類所能厚禄髙名無忘効用可依前件授魏州别駕張景裕等四人正授制錢珝勑具官某等任人其難古有試可之説爾等為吏嘗試於魏中矣今藩臣信正其秩是必有試可之材皆命與之亦惟常典可依前件授虞岫常州别駕温羅濠州長史制李磎勑虞岫等凡别駕長史務簡俸優故在京百司諸侯留邸所以勸勤事之吏邸疑奉職之勞今以命爾等即循例也可依前件司馬授杜從則雍州司馬制闕名鸞臺中大夫檢校尚方少監杜從則體業端固器識通敏驅䇿自乆績効有聞作貳神州實資幹用兼司劇署載佇公勤宜踐新榮仍兼舊職可雍州司馬兼知尚方少監事主者施行授吉義福等荆州都督府司馬制闕名鸞臺檢校河源軍營田游擊將軍守左衛杜陽府左果毅都尉員外置上柱國吉義福等勤績兵欄効申田祖五戎既戢萬庾斯殷宜輟掌於連營俾收功於别乗可鄯州都督府司馬授温慎微揚州司馬制蘇頲門下中散大夫守興州刺史輕車都尉温慎微門遺清白家傳詩禮外鳴謙而益光中造理而能宻書工懸帳賦掩馳輪閒逹彰其起草仁明最于分竹乃睠維揚之藩是稱重江之奥端寮所擇僉議攸歸可守揚州大都督府司馬散官勲如故授樊偘總目作侃益州司馬制黃門大中大夫前守榮州都督借紫金魚袋上柱國樊偘早負文詞累遷省闥頃揚才智受任軍州敏以邀功斷而臨事峨眉作鎮鼈靈開國惟巴蜀之險接西南之夷式遏撫循尤擇時望端寮副職俾承朝委可行益州大都督府司馬餘如故仍知蜀川防禦副使即馳驛赴任授馮光嗣揚州都督府司馬制前人門下朝散大夫使持節黄州諸軍事守黄州刺史馮光嗣忠信立名見推人物朝散大夫守相州别駕上柱國鄭國公楊獻通明應務雅有吏能頃在中朝各登清貫自居外郡頗聞政績連率之府貳職為難宜膺並命之榮以副缺官之選光嗣可守揚州大都督府司馬散官如故獻可守潞州大都督府司馬散官封如故仍並馳驛赴任授李廷珎沂州司馬制孫逖勑朝議郎行右領軍長史李廷珎爰以疇人遂居先職不脩其任是曠於官歴象之司既非適用海沂之佐俾効所能可行沂州司馬員外置同正員授李庭芝絳州司馬制門下行櫟陽縣令李庭芝行能通敏政術優長有士族之令名是王畿之良吏在官既乆成効則多宜佐雄藩俾增榮秩可行絳州司馬散官如故授梁炫郢州司馬制勑潘州司戸叅軍員外置同正員江南西道採訪使判官梁炫才堪應物累則因人近佐澄清頗彰勤苦以兹補過因可收長宜遷貳郡之榮式允連率之薦可郢州司馬員外置伺正員授嚴正誨博州司馬制門下朝散大夫行司農寺丞攝殿中侍御史專知太倉出納使借緋魚袋嚴正誨頗有吏能累遷官守况所効職必聞其政出納之吝或未當才邦國之功期於佐理可博州司馬借緋魚袋如故文苑英華巻四百十四
