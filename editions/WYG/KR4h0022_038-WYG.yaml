body:
  text: 文苑英華巻三十八宋李昉等編水七氷賦二首氷泉賦一首初日照氷池賦一首氷池照寒月賦二首氷將釋賦一首氷泮曲池賦一首履春氷賦一首氷賦陸環大哉洪鈞賦象觸類而生或分氣四序配位五行惟彼氷之堅質包履霜之漸成夫其體含上善色侔晴雪妍媸自明表裏虚澈原其物也則昏危應位覘其時也則𤣥㝠御節隂氣盛陽晶㓕殺氣鴻洞嚴飇栗烈當此時也何水不凝何潭不結瞻山則萬壑俱閉歸海則百川潜泄諒造化之自然羗難得而備說佳其空冷愈堅風凄益壯汗漫稜層委積亭嶂交河則戰士加守合浦乃漁人迷望况乎天道無私所應多姿雲禽下覆彰后稷之聖德泉魚出躍表王祥之孝思然而題周官順時令皎皎雪聚皚皚山淨盤重澗而疑璧瀉圓池而若鏡與海鏡而混輝將玉壺而相映何層氷峩峩形埋奔浪勢壓衝波坎位臨時則慎於馬窟離光再誕示合於滹沱豈直若斯而已哉固見羙於將來其藏之也黒牡秬黍以享候其出之也桃弧棘矢以除災取順則人不夭札用逆則時多震雷故以北陸而收西陸將啓冬鑒秋􅀈識寒暑之情大盤夷盤表君臣之禮徒觀其謙也每避燥而就濕其讓也亦背陽而向隂偉何㸃之入喻著􅃎詩而見欽皎爾自安同逹人之守節渙乎將觧若天道之無心故先賢取危於履薄作戒於臨深或曰衆雖類而多名曷方兹而至妙明隂陽之本爲適時之要可以羞之於王公可以薦之於宗廟儻水鏡之一察猶希暫於廻照重曰深山窮谷凌人鑿頒賜從來天下聞別有川池捐棄者終思采斵獻明君第二劉長􅀸水無心而清氷虚已而明始則同體終然異名水之動我變以静水之柔我變以貞任方圓而能處其順在高下而不失其平北陸初凝結而爲氷東方始起融而爲水與時消息一作合散隨物行止水也不一作莫知其所然氷也不知一作莫分其所以何推運而有恒乃忘情而合理觀乎外示貞堅内含虚澈一作澄澈無受染以一作無染塵能保其素無一作不納汙以一作能全其㓗比玉而白不爲蠅玷一作㸃比月而明不爲蟾缺瓊樹色奪瑶池光發變寒日三字一作寒日爲之清瑩帶隂天一作隂天爲之肅殺爰自止水遍於山一作大川山一作萬穴俱閉長波寂然皎皎彌靜峩峩遠連如雪覆地若雲被一作披天雲之凝兮佇長風而可掃一作拂雪之積兮向太陽而莫全豈同夫氣之所感物莫能遷勁飇夕寒我力増壯晴一作愛景朝暖我心一作力猶堅其堅伊何履霜斯至其薄伊何臨泉是畏君子用之以馴致其道覩之而不驕於貴一有者也二字二之日始鑿命虞官三之日始納享司寒一有四之日三字天子陳禮容賦􅃎風大啓氷室獻於王宫氣肅雲陛寒生衮龍闢九門於月下列千官於鏡中頒聚一作衆位取飲以受命御至尊得象於朝宗若君莫之求臣莫之見則深山窮谷詎可得而加薦苟藏之不周用而不徧則災霜害雹如有待而爲變人或愛我二字一作好下同清人或愛我凈既㓗其跡亦堅一作虚其性水之氷生於寒人之氷生一作出於正無一作不棄其道吾將何病凢一作皆集本氷泉賦以應陽氣而發蒙爲韻陳廷章衆潤將行一陽初勝剛柔合德逺近潜應動能依節自契周書之言流未入淇豈若衞詩之興時也蓋氷填井甃日冷池塘蹔無聲於短景終有騖於靈長於是微消涸沍稍變潜藏既聞乎下能順上豈聞乎隂不承陽深且異於潢汙孰云咸竭用堪和於酒醴誰見必香居壅鬱而將聽聲潺湲而尚未雖幽深之可則終逺大而爲貴未知所適願添滄海之流必得其宜無俟黄鍾之氣㶑灔如彼清泠注兹其道也誠於逺矣其深也可以述而望朱夏而龍文生定四時而不惑當𤣥冬而麈角觧後五日以爲期暗漾懷珠之媚潜抽潄玉之姿鄙借勢而爲瀾每遇秋風之冽冽待流聲而觧凍必由春日之遲遲全其性以守柔相其時而忽越思玉溜之纔吐若岷江之初發出陽岸之下潜潤澗毛涌隂溪一作凌之中輕摇石髪决諸可見其澹淡冽彼詎同夫汨滑兾雷驚之蟄猶若陸沉當治疑理之時不虞乾没當今化源畢啓時令皆同覩陽光之下逹昭帝澤之潜通浮帶地之功暫留坎窞運知天之德終異童蒙儻或導於外發其中冀有禆於江漢得流善於無窮初日照氷池賦以鮮彩明澈寒光入座爲韻馮宿日生東方氷滿池塘以涸沍之寒質承亭曈之曉光其象斯㓗其容可閱炳爾昭渙朗然澄澈可愛之德已聞左氏之經如履之心更憶詩人之說即合體而光輝且負暄而昭晰全嗤嶺北之梅詎比墻隂之雪美其林煙早晴寰宇凄清池有水兮氷合天無雲兮日明凝隂尚積暖氣潜盈淋漓兮向陽和而未泮皎㓗兮覩津潤之將生所謂當此嚴景昭兹陽彩上下相融貞明共在斯乃元化所結𤣥功不宰日有曜而必臨氷無心而有待不然何大明兮方懸凝質惟堅斜景自高而來照素耀相向而俱妍曲岸増媚平沙更鮮豈西陸之中候朝覿而方出東海之上泮隂火之潜然是知清興攸集氛埃不入隨陽而孤鴈初飛向暖而羣鷗乍立且日者分乎兩曜氷者生乎沍寒既清貞而可賞信温煦之咸懽足使勵志求鑒探幽就觀何必挹瓊漿於丹竈思夕露於金盤曷若色映朝户光陵曉座氷生池上豈羡玉壺之明日下池中全遇隙駒之過聊賦之以體物庶同白雪之難和氷池照寒月賦以寒净光㓗瑩心目爲韻林藻瑶池洞澈兮堅氷始攅𤣥天皎皛兮皓月初團氷含虚以凄冷月委照而光寒既合體以凝質故清輝而可觀爾其氣肅而勁色虚而净俯視則湛若玉壺仰觀則爛如金鏡履之者可以慎其矩歩翫之者可以滌其情性嘉乎清熒旁逹曈曨交映間樓臺則素色彌分出河漢則清光寥夐良吏觀我以思飲墨客覽我以興詠懿夫鑒照無隠盈積有方纎埃翳而必見衆象照而難藏晃兮奕奕耀兮彰彰奪銀河之曉色掩水鏡之秋光于時羣動已息寒夜未央㣲雲度月以澹蕩細影拂池而悠揚晶耀兮環林之際朗練兮孤亭之旁月周天兮有虧池擁氷兮難决月在則光瑩月沉則光㓕彼氷也非無自然之色我取映月而増㓗此月也非無自然之光我取籠氷而加澈斯乃以凈臨凈不瑩自瑩精氣交而上浮光彩融而入暝夫如是至人遇之而暢襟貪夫對之以勵心豈徒皎皎然罔象烱烱爾照臨而已哉向若月隠西峯氷藏深谷焉得觧吾人之昏滯恱志士之心目第二同前韻王履貞至矣哉𤣥冬之季兹池可觀臨方塘而霜容既肅照圓月而素色兼寒凝爲水碧浄若琅玕廹而窺乍驚飛於繞鵲俯而察寧失顧於廻鸞若乃日暮雲晴蒼然色正水彩旁射蟾輝下映的皪兮地布明璫曈曨兮天垂朗鏡則雖隨侯之珠皎而㓗和氏之璧光且浄曷比夫動資文士之興載恱吾人之性觀夫寒空若晝清漏且長透珠簾而庭户増媚浮玊樹而園林借芳攬之則無誠偶形於顧兎視之若有徒積素於飛霜故能㓗通宵之寒氣凝徹底之清光既而空色相鮮餘華昭晣嚴風吹而不散沍隂生而轉潔偏使閨婦増思征人愴別望隴上之嬋娟怨池中之凛冽又能使空門禪客除昏滌暝對之而虚白生襟觀之而神形自瑩嗟乎時之革物物感人心俾閒放者取而適性勤苦者對以愁吟則知氷月之宜靡極沿變之趣彌深原夫幽院添池晴峯繞竹幾處堪賞千般寓目加之以清氷素魄復何媿深山窮谷佇月令之必賦冀同出乎西陸氷將釋賦以和風既至遲日初臨爲韻侯喜春入寒水氷驚淺潯照遲遲之早陽色將無定度習習之回吹勢欲難任渙若分彩濡如在隂如應勾芒之節將成老氏之心非其漸焉何以知仁氣之徐至不曰釋也何以表陽光之有臨稍露沙痕似分苔翠在形開而可觀因罅發而増媚動其中矣將有日而然開必先焉若知風之自澹引晴色洞含春意曩之能久曽殊見晛而流今則不堅轉失履霜之至當嵗華之既好變水緑之云初暗轉而光摇已薄輕流而影動惟虚觀夫宵以涆涆晝必徐徐净以當融稍驚北徂之雁輕而未散猶觀上越之魚如此則消積凍發㣲波西陸當出東風已和湛兮而平劔開幽匣黙然而運雲歛晴河方催皚皚之白漸㓕昭昭之多則知道貴無質我之釋兮以日不徐不疾與真源匹政尚得中我之釋兮以風洩洩融融與皇澤同事有可貴用非可既懼乎裂尚保質於地寧就其流始收光於神氣潰然當觧熙哉此時幸照臨之必及豈開泮之云遲日已不寒正難於鳥覆數當有盡轉使於蟲疑吾亦慕斯氷之不擇不知所以裁之氷泮曲池賦以春日風暖之候爲韻王起𤣥英變律青陽報春伊曲沼之方燠始氷泮於斯辰北陸初凝惜峩峩而色閉東風忽觧驚片片之光新所以將延軒騎稍媚咸秦散亂瓊岸離披玉津開碧潭之漾漾如白石之磷磷豈必積窮谷而與競塞長河而見倫則知煦嫗有待沍寒無必將辭烈烈之風漸映遲遲之日或竹破而瓦裂或鏡華而玉質帶宿草而猶霑添新泉而更溢小大惟錯方圓不一臨深之戒稍窺履薄之危漸失蠶之績也必見其淪胥鯉或感焉匪勞於剖出璀錯騰外淋漓積中隨波響激遵渚光融下魚竿而不隔泛仙舟而已通渙渙初流自同夫溱水沖沖罔鑿奚取於􅃎風是知氷在池而合散池與氷而虚滿腹堅難俟於星廻磔裂必因乎風暖皎潔不私清明在兹殊玉壺而覩止異凌室而藏之䑕無德而潜伏狐由是而决疑和而不同始堅然而固節積而能散終渙爾以隨時客有覽名都之秀盼廻塘之溜知迷津而可通在觧凍之斯候履春氷賦以戒慎之心如履氷上爲韻陳岵履道有本戒之在氷毎翹翹於進守如凛凜之不勝累足有懼旁行可矜識安危之在德豈顛越之或承不敬其心敢徴所以本之於有既漸乎履霜戒在不虞罔輕於狎水方保心於慎獨焉敢測乎涯涘人之所畏豈造次而可忘道之將行非中和而勿履敗或聞於旋踵義無輕於舉趾不處其薄君子之行固然若居下流詩人之戒深矣其始也陽律掩耀隂飇戒時因潤下而生德由寒沍以成姿皎若澄虚而體合上善𡨕然沉響而跡不能欺苟戒之而不履是以履之而不疑事異渉溱匪裳之褰也德猶如羽知行可蹈之則知視險無必素誠可諒罔違日慎之心無易春氷之上投足而衆流不測委順而中懷是廣惄焉如𢷬知大患之在躬生也若浮敢慿虚而用壯孰曰堅乎匪同介如結寒波而暫聚湛清質以含虚怳若有亡似乘空於月宇退然如失猶奉身於玉除且異夫莫來莫徃何遵於匪疾匪徐必若懷以勵貪飲以明信如臨之戒如履之慎則知水德可保氷力可任匪氷不薄匪水不深彼之蹈者委乎足我之蹈者本於心又焉能料其薄厚而計於升沉則執德罔愆持危不戒意平澹之可翫在清夷之可懷豈知蹈之有道行之在德而忽乎淪溺之敗文苑英華巻三十八
