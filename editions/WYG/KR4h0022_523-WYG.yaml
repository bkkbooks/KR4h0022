body:
  text: 文苑英華巻五百二十四宋李昉等編田農門二十四道祈年判二道糞田判四道命農判二道學耕判二道圭田判一道履畆税公田判一道不受征判五道津吏告下方傷水利判五道軍士營農判一道税畆多於什一判一道祈年判甲擊土皷祈年榖於田祖司察以禮不下庻人寘于罪不伏對闕名先王教人貴賤有等常籍為重躬青耜於靈壇終畆惟勤法朱紘於御典候鳥星之仲月闢龍鱗於上腴祥應豳詩祈嵗功於土榖疑生魯禮罪越命於金章甲即非辜擊之可也且援枹而進聲坎坎於田郊嘉粟佇登福穣穣於嵗報司察此舉未曰合宜甲之不伏固當其理同前姚重成饁彼南畆田畯興至喜一作饎之歌平秩西成丁壯起務農之事國家風雷順動黍稷惟馨幸春籍於三推佇年登於百榖野鷄五色先呈必稔之期銅鵲再鳴即告將豊之騐千箱萬庾實所荷於聖人土皷汙罇徒有祈於田祖况祠祀禮也考擊脩焉司察即是妄稱惟甲固應無罪糞田判或以齋月屠犬縣科殺生曰為輕爂孚照切見周禮輕爂用犬所用對衛棻三壌克辨兆民允殖必廣地財式崇土訓載芟載柞爰盡力乎汙萊既方既皁俾恪勤乎稼穡伊趙爾鎛有畧其耜荒度厥功寔函斯活是以茨梁嘉積曽孫作庾于斯箱畎畆歌豐婺婦栖糧於滯穗率由兹道萬邦乃粒眷彼草人兼脩稼政無忝厥職分厚塉之規靖恭爾司省髙卑之制雖陽和布始亟聞乎禁殺嗣嵗將興必觀其行令苟能成憲犬則是屠將周禮之彞章功均物土資漢臣之舊業事取糞田叶緹赤以陳宜相爂彊而有旨雖云齋月法欲爰加且八政食乃為先五牲犬實居後以牲廢食其傷孔多棄猶務農斯利則博縣道書罰誠為昧禮或者張皇冝其窒惕同前春鳸促農黎人務穡用冝穜稑取化原防苟磽确之不滋將彊㯺之須糞或以今兹齋月言叶上春東作乃興咸持錢鎛南畆斯饁必漬蕡麻時疑作待噐所以勸民興鋤由其阜俗我疆我理庻㡬芃芃之秀或耕或耘思播茫茫之迹九天取歡於嵗稔十千期給於公征貪我上腴陷兹中典且農為理本法在禁弛有利輕爂誠冝重榖何擊之屠犬而謂殺生應稽諸草人將勤浸種縣司麗法詎曰優農或且犯齋期於宥獄同前趙良玉國著九賦農分三壌將助鳴鳩之稔是同磔犬之法時惟上月德在發生爰取則於周官遂興功於魯胥使我疆我理開膴膴之郊原如京如坻藹芃芃之稼穡藝或若此業乃可慿彼何為政義守常典徒嚴止殺之方豈曰利人之術且成物之急濟時攸重苟能敦本孰謂不經禮合時冝尚發犬羊之歎農為政本爰停屠殺之罰同前袁自求地邑人居必叅相得樂功勸事然後相親不易之田畆百而尚逸再易之地倍三而猶倦漆林之征輕重是舛園􅆵之稅等差斯别欲均沃塉必資改更故載芟載柞澤澤其耕不稂不莠芃芃其稼且輕爂用犬彊㯺用蕡在禮經而可遵於憲章乎何有禹貢成賦標乎上中之宜周籍立規備設牛鹿之制况明君為政動植以安田祖有神螟螣不作科之屠罪恐涉流言寧益國以利時豈棄人而愛犬食舊德能保全而不懽據訟卦注當作怍田有禽利執言而無咎小狐汔濟未出險中即鹿無虞徃而見恡刑云不濫君子盡心有孚匪終渙汗何惕命農判得習壌常命農夙駕桑田採茅為索人訴遇雨不充其役對為天者食分地而利惟兹習壌命彼老農庻夫四體克勤三事就緒廼脂車以秣馬及零雨以星言芃野是臨桑田攸税冝其荷蓑荷笠載惜光隂爾茅爾綯不虧晝夜何乃當既泥而自廢假若濡以為詞使七月遺風將乖陳業三時務穡有闕成功既不昏於作勞誠可繩其惰役同前博懷海農為國本本固邦寧人生在勤勤則不匱爰以習壌夙駕命農匪鷄則鳴已驅人於里巷白駒未照方執耒於疆埸克始克終惟掇惟採綿蕝豈禮儀之用縮酒非祭祀之須彼茅所資桑田為事時若見奪不利於人宵爾索綯惟彼南畆田畯至喜意在東臯將以息末取源還淳反朴致君於堯舜貽厥於孫謀農人性未適時智非及逺苟徒沮事妄作薄言豈遇雨而可慿欲將雪而無理學耕判得甲於善田者學耕種養苗狀後期里父老罰之云告力牛少無以趨事對楊暕惟農望嵗勤穡則稔彼夫失時不畜何獲苟無備於噐用實謂惰於作勞甲之務分寔亦敦本同我婦子歸田畯是司聞於仲尼善樊遲學稼祈養苗之狀將盡地之力惟先疇克服何後期有差雖畢逹餘萌行春已膏乎隂雨而不穡招刺有秋胡取夫斯箱小懲其宜徃訴誰聽况犢惟不佩則爾牛足餘人有耦耕則我農可理竟不趨乎時澤固難免乎罪戾同前劉貺唯農是務經國之令典日服其鎛長人之美訓皇上躬耕千畆儀刑萬邦天報嘉祥風雨時若人惟善誘逺近咸勸甲也思趙過之有誨比樊遲之請學爰屬農政條興土膏脉起家徒四壁文無五牸是藨是蓘既失於協風或耕或耘載愆於零雨實差龍見之序謬以牛少為説漢史著區種之術唐臣首代田之教長沮故事則非假於服箱勝之遺文亦無資於負輾既推司里之禁冝處惰農之刑圭田判得甲受圭田所由什一收税不伏對鄭楚容禹别山河周開井邑諸侯建國錫土之義載光大夫稱家食采之文攸著甲因門緒得賦圭田傳冀鈌之封襲耏班之賞外繇取給私室是殷雖居五等之尊猶均什一之税縣司情以一作深奉法志在優人庻貢賦之取均冀上下之攸利權豪罔避貧弱是優所俾無得其人今訴誠難為理履畆税公田判渭南縣履畆税而御史劾之曰公田不善恐乏軍儲對兵惟静難食以聚兵儻嵗計之無虞必軍湏之不繼縣司以職其日給科彼倉儲薿薿公田嗟不登於晩嵗嗷嗷士卒慮縣罄於糗糧厚斂之旨豈坐於冉求盍徹之税己聞於有若情非徇己事或從權請霽霜簡之威庻獲雨田之稔一作庻叶國經之體不受征判甲有賜田不受征税對王智明王者制田庻人計畆徴孟子之説徹故難移讀公羊之書禁皆不可然則食土之子與執圭之人按籍既有常法加田固冝不税此乃行古之道誠非今之宜甲之所執或未為允同前賀蘭賁分畫郊圻敬愼封守必正其經界均其牧井故上行其理而下得其和雖分制之有常盖貴賤之異等夫畆不税所以備公私圭田無征所以潔禋祀理具昭著禮有明文豈以伐氷之家同於擊壌之伍甲之不受誠謂其宜同前盧禧農之制地征不過籍徳將見優賞莫為税伊甲也之介福承賢者之餘慶樹勲公家列爵王冊既未封於列土方受賜於加田爰及後昆克奉先業責其徴税徒稱聚斂之臣守以莫從是謂博通之士請依周典無撓戴經同前盧象惟甲受兹明命允膺舊德公侯之勲著在盟府恩澤不泯傳之子孫錫圭田以厚賢在王制而無税徴斯什一頗涉無稽之言議以三章終發有孚之訟同前李喬年王者之制加田無征盖欲崇徳厚賢安人薄賦眷言彼甲王室作藩既褒德而受圭亦班朝而錫壌且什一而税周之通法緡筭是資漢之舊典萬姓殷阜中外康寧有大夫之家尚苦於征税法令爰著不稽舊章片言可折斯之謂矣津吏告下方傷水判得津吏告下方傷水請毁左右堤水工丙固争對魏烜决河之虞備聞前載隄防之設厥務匪輕故得其冝則俗除陻墊如失其道則人受沉淪由是禹得𤣥珪漢陳白璧古來所愼寧其怠諸且將毁右隄則左隄不理下方之弊為患將深漢代成規自宜遵奉不逹舊載昧於物宜輕此毁除未聞其可水工之議謂得通方同前梁渶逺通漕引近切河渠擁左右之連隄隨淺深之積態屬流水之至長河杳起桃花淼淼實類迷牛之闕一作開竹箭滔滔方比鑿龍之迅委輸無限傷害為虞既為長堤固全豈使下方傷水導之則可毁之匪冝無從津吏之言請依水工之見同前鄭遂初九土之冝髙卑異等百川之勢面背殊源所以堤設沉薪以防其溢河流酸棗竟被其災今者津吏所陳水浸方盛請毁堤而取便遂抑強而扶弱考古頺傾之異前後乖奉之冝未爽河渠之篇深荷疑溝洫之記工人有諍即事雖通請更辨於今刑方可遵於古典同前盧韞價覆釜遐源濫觴遥𣲖龍門激浪飛竹箭於千里馬頰驚流擁桃花於三月尺波不住素序或臨霧逐牛迷查隨客至維舟不易航葦稱難洪濤之委無涯下方之傷遄及隄防是制啓塞隨時固之則兩傷毁之乃䨇美津吏宅生禹迹行偶堯封名厠水官位居河右使廽天之浪遥注百川濺日之波滂流九𣲖水工末品真買公心筭垂栁之懸堤借瓠子之成詠雖守挈瓶之智還貽膠柱之責依津吏之請杜水工之疑不俟終日於是乎在同前李仲和潤下斯弊漂流是虚欲崇堙塞必藉隄防津吏以下方致灾冀應除毁水工以長堤作務不可依慿競有兩端事難䨇允請闢千里無虧五詞則拯溺不待於規行聞諸徃説而塞川頗類於防口得以今辰方見河渠之書自閑標凖溝洫之志以㑹規模左毁則右傷右傷則左弊左右俱毁便沉下方津吏之言雖陳水工之志難奪既不合毁咸冝告知軍士營農判得丁上書請令軍士自營農隙而教戰節度使稱疲兵於隴畆緩急非可用也對先王教人必資農本諸侯振旅實因事隙苟法度之不率豈黔黎之克安彼丁以阜俗為心類夷吾之寓政節度以疲兵是恤爽充國之嘉謀昔楚宋理戎尚反築耕之士魏蜀堅壁猶分上下之軍方今九服賔王四夷即序冝脩文以化俗豈黷武而屯師既車書之大同何緩急之争用兩端之要片言可知税畆多於什一判得縣官税畆多於什一御史糾其増賦斂訴稱盡供軍旅二猶不足對當官而行必議徴斂賦里以入冝均有無政或違於小康税乃行於大桀是以我疆我理分上下之田有國有家建中正之術不是過也皆將取焉伊惟縣官昧爾為政誠合酌於古訓量其經入使榖不過籍人斯樂輸今乃將多徴於前復重斂其後所謂莫益或擊徒聞浚我以生雖億兆是謀用給如貔之士而徴求失道寧忘碩䑕之詩且九年之儲常聞冨國二猶不足匪曰能言請從避馬之繩庻叶公羊之訓文苑英華巻五百二十四
