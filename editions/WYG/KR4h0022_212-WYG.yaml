body:
  text: 文苑英華巻二百十二宋李昉等編音樂一樂八首琴二十九首筝十首笙四首琵琶三首箜篌一首簫一首笛十四首雜樂六首樂觀樂應詔王􅌔趙瑟含清音秦筝凝逸響參差陳九夏依遲紛四上從風繞金梁含雲映珠網遞奏豈二八繁絃非一兩幸叨東郭吹厠陪南風賞忘味信鏗鏘飡和終俯仰輕塵已飛散逰魚亦翻蕩恩光實難遇詠言寧易放奉勑於太常寺脩正古樂何妥見初學記大樂遺鐘鼓至樂貴忘情俗乆淳和變年深禮教生嶰谷調孤管崙山學鳳鳴浮雲成武曲白雪作歌名聞詩六義辨觀漏八風平肅穆皇威暢淪漣河水清鈞天動絲竹䀨地響錞鉦盡美兼韶濩威徳總咸英寥亮鳬鍾徹飄揚翟羽輕小臣属千載時幸預簪纓行欣負蒼璧衢壇聽九成樂部曹觀樂前人東海餘風大陶唐遺思深何如觀徧舞奏鼔間摐金清管調絲竹朱絃韻雅琴八行陳樹羽六徳審知音至道兼韶濩充庭總韎任髙天度流火落日廣城隂百神諧景福萬國仰君臨大樂非鐘鼓且用戒民心奉和月夜聽軍樂應詔薛道衡旌門臨古堞徼道渡深隍月冷凝秋夜山寒落夏霜遙空澄暮色清景散餘光笳清喧隴水鼓曲噪漁陽沉鬱興神思聎聽發天章嵩岱終難學丘陵徒自强觀太常奏新樂孔徳紹大君膺寶歴出豫表功成鈞天金石響洞庭絃管清八音動繁㑹九變叶希聲雲和留睿賞薰風悦聖情盛烈光韶濩易俗邁咸英竊吹良無取率舞抃輕生同前卞斌一作孫萬夀昔人夢上一作之帝尚一作常喜預鈞天况兹一作荷開景業作樂武功宣大雅一作子廢還理乗風毁更懸中和誠易擬韶夏詎相􅆓犍為一作泗濵磬響徹嶰谷管聲傳小臣濫清耳長奏南風絃此詩二百四十巻重出今已削去注異同為一作於太常寺聽陳國蔡于元所教一作校正聲樂許善心維揚盛禮樂治定昔君臨充庭觀樹羽上一作之帝仰摐金既因鍾石變將隨河海沉湛露廢還序承一作乗風絶復尋衮章無舊迹韶夏有餘音澤竭英莖散人遺憂思深悲来未減瑟淚下正聞琴詎似文侯睡聊同微子吟鐘奏殊南北商聲異古今獨有延陵聽應知亡國音三層閣上置音聲唐太宗見初學記綺筵移暮景紫閣引宵烟隔棟歌塵合分階舞影連聲流三䖏管響亂一作扎一重絃不似秦樓上吹簫空學仙琴秋夜詠琴劉孝綽見集本上宮秋露結上客夜琴鳴幽蘭暫罷曲積雪更傳聲同前初學記作詠琴劉溉寄語調絃者客子心易驚離泣已將墜無勞別鶴聲日晩彈琴馬元熙見初學記上客厰前扉鳴琴對晩暉掩抑歌張女淒清奏楚妃稍視紅塵落漸覺白雲飛新聲獨見賞莫恨知音稀賦得為我彈清琴沈烱為我彈清琴琴鳴傷我襟半死無人覺入竈始知音空為貞女引誰達楚妃吟類聚作心雍門何假説落淚自淫淫聽琴蕭慤洞門凉氣滿閒館夕隂生絃隨流水急調雜秋風清掩抑朝飛弄凄斷夜啼聲至人齊物我持此一作時與悦髙情賦得詠琴江總可憐嶧陽木雕為緑綺琴田文垂睷淚卓女弄絃心戲鶴聞應舞逰魚聽不沉楚妃幸勿嘆此異丘中吟賦得坐彈鳴琴楊希道北林鵲夜飛南軒日斜進調絃發清徴蕩心祛褊恡變作離鴻聲還入思歸一作相思引長嘆未終極秋風飄素鬢咏琴楊希道見初學記久擅龍門質孤竦嶧陽名齊娥初奏弄趙女正調聲嘉客勿遽反繁絃曲未成同前劉允濟昔在龍門側誰想鳳鳴時雕琢今為器宮商不自持巴人緩疎節楚客弄繁絲欲作髙張引翻成下調悲夏彈琴劉希夷文粹作劉戩碧天本岑寂素絲何清幽彈為風入松崖谷颯已一作以秋庭鶴舞白雪淵魚躍洪流余欲娛世人明月難暗投感歎未終曲淚下不可收嗚呼鍾子期零落歸山一作荒丘死而若有知魂兮從我逰琴前人隠一作名士竹林隈英聲一作鳴琴寶匣開風前緑綺弄月下白雲来一作風前中散至月下步兵来淮海多為寶一作淮海曽為寶武丘山有琴室近淮海梁岷舊作臺子期如可聽山水響餘哀寶琴唐釋彪吾有一寶琴價重雙南金刻作龍鳳像彈為山水音星從徽裏發風来弦上吟鍾期不可遇誰辨曲中心江上琴興此詩已見一百六十二巻常建張山人彈琴前人居士芳草緑西峰留玉琴豈惟丘中賞兼得清煩襟朝從山口還出嶺聞幽音了然雲霞意照見天地心元鶴下澄空翩翩舞松林改絃和一作扣商聲又聽飛龍吟稍覺此身妄漸知仙事深其將鍊金鼎永矣投吾簪琴王昌齡孤桐秘虚鳴朴素傳幽真髣髴絃指外遂見初古人意逺風雪苦時来江上一作山春髙宴未終曲誰能辨經綸聽琴彈風入松贈楊補闕前人商風入我琴夜竹深有露絃悲與林寂清景不可度寥落幽居心颼飀青松樹松風吹草白谿水寒日暮聲意去復還九辨待一顧空山多雨雪獨立君始悟秋夕聽羅山人彈三峡流泉岑參皤皤岷山老抱琴鬢蒼然衫袖拂玉徽為彈三峡泉此曲彈未半髙堂如空山石林何颼飀忽在窓户間纖指弄鳴咽清絲激潺湲演漾怨楚雲虛徐韻秋煙疑兼陽臺雨似雜巫山猿幽引鬼神聽静令耳目便楚客腸欲斷湘妃淚斑斑誰裁清桐枝亘以朱絲絃能含古人曲遞與今人傳知音難再逢惜君方老年曲終月已落惆悵東齋眠同張參軍喜李尚書寄新琴司空曙新琴傳鳳凰晴景稱髙張白玉連徽净朱絃集作絲擊爪長輕埃隨拂拭雜集作新籟滿鏗鏘暗想山泉合如親蘭蕙芳正聲銷鄭衞古狀掩笙簧逺識賢人意清風願激揚冬夜陪丘侍御先輩聽崔校書彈琴楊巨源雪滿中庭月映林謝家幽賞在瑶琴楚妃波浪天南逺蔡女煙沙漠北深顧盼何曽因誤曲殷勤終是感知音若將雅調開詩興未扺丘遲一片心宿藏公院聽齊孝若彈琴前人禪思何妨在玉琴真僧不見聽時音離聲怨調秋堂夕雲向蒼梧湘水深夜集汝州郡齋聽陸僧辨彈琴孟郊康樂寵詞客清宵意無窮徵文北山集作窓外惜月南樓中千里寂然静集作愁併盡一樽歡暫同胡為戞楚瑟淅瀝起寒風聽琴前人颯颯微雨收翻翻橡集作桐葉鳴月沉亂岑西寥落三四星前溪忽調琴隔林寒琤琤聞彈正弄聲不敢枕上聽㢠廻燭整頭簪潄泉立中庭定步屐齒深久彈月集作貌禪目㝠㝠微風吹衣襟亦集作猶認宮徵聲學道三十年未免憂死生聞彈一夜中㑹盡天地情好彈集作聽琴白居易本性愛集作好絲桐塵機聞即空一聲来耳裏萬事離心中清暢堪銷疾恬和好養蒙尤宜聽三樂安慰白頭翁夜調琴憶崔少卿今夜調琴忽有情欲彈惆悵憶崔卿何人解愛中徽上秋思頭邊八九聲聽琴集作清夜琴興前人月出烏棲盡寂然坐空林是時心景閒可以彈素琴清泠由木性恬淡隨人心心積和平氣木應正始音響餘羣動息曲罷秋夜深正聲感元化天地清沉沉廢琴前人絲桐合為琴中有太古聲古聲淡無味不稱今人情玉徽光彩滅朱絃塵土生廢棄来已久遺音尚泠泠不辭為君彈縱彈人不聽何物使之然𦍑笛與秦筝聽段䖏士彈琴方干㡬年調弄七條絲元化工夫集作分功十指知泉迸清集作幽音雜石底松含細韻在霜枝忩中集作東顧兎初圎夜竹上寒蟬盡散時唯有此時集作中心更浄集作静聲聲堪集作可作後人師聽琴張喬清明轉琴一作静軫弄中湖一作湘水寒能令坐来客不語自相㸔静一作净恐鬼神出急疑風雨殘㡬時歸嶺嶠更過洞庭彈同前一作蜀琴羅隠寒雨蕭蕭落井梧夜深何䖏怨啼烏不知一盞臨卭酒救得相如渴疾無筝和彈筝人二首梁孝元帝横筝在故帷忽憶上絃時舊柱離移䖏銀帶手輕一作經持悔道啼將别教成今日悲二瓊柱動金絲秦聲發趙曲流徵含陽春美手過如玉詠彈筝人梁昭明太子故筝猶可惜應度新人邉塵多澀移柱風燥脆調絃還作三州曲誰念九重泉詠筝沈約秦筝吐絶調玉柱揚清曲絃依髙張斷聲隨妙指續徒聞音繞梁寧知顔如玉同前王臺卿依歌時轉韻按曲動花鈿促調移輕柱亂手度繁絃唯有髙秋月秦聲獨可憐𤣥圃宴各詠一物得筝陸瓊三五併時年二八共来前今逢泗濵樹定減琴中絃鶴別霜初緊鳥一作烏啼月正懸聽筝張九齡端居正無緒􅃚復發秦筝纎指傳新意繁絃起怨情悠揚思欲絶掩抑態還生豈是聲能感人心自不平筝柱子朱灣散木今何幸集作在良工不棄捐力微慙一柱材薄仰集作命羣絃且喜聲相應寧辭跡屢遷知音如見賞雅調為君傳筝白居易雲髻飄蕭緑花顔旖旎紅雙眸剪秋水十指剥春葱楚艷為門閥秦聲是女功甲鳴銀玓瓅柱觸玉玲瓏猿苦啼嫌月鶯嬌語泥風移愁来手底送恨入絃中趙瑟情集作清相似胡琴調集作閙不同慢彈㢠廻斷鴈急奏轉飛蓬霜珮鏘還委氷泉咽復通珠聯千拍碎刀截一聲終倚麗精神定矜能意態融歇時情不斷休去思無窮燈下清歌集作青春夜罇前白首翁且聽應得在老耳未多聾贈彈筝人溫庭筠天寶年中事玉皇曾將新曲教寧王鈿蟬金鳳集作細蟬金鴈皆零落一曲伊州淚萬行笙笙陸罕管清羅袖拂響合絳脣吹合情應節轉逸態逐聲移所美周王子弄羽一參差同前沈約彼美實孤枝孤篠定參差鵾雞已嘲哳棗下復林離本期王子晉初學記作宴寧待洛濵吹同前楊希道短長挿鳳翼洪細摹鸞音能令楚妃歎復使荆王吟切切孤竹管来應雲和琴嵩嶽聞笙劉希夷月出嵩山東月明山益空山人愛清景散髮臥秋風風止夜河清獨夜草蟲鳴仙人不可見乗月近吹笙絳脣吸靈氣玉指調真聲真聲是何曲三山鸞鶴情昔余落塵俗願言聞此曲今我集作来臥嵩岑何幸承幽音神仙樂吾事笙歌銘夙心琵琶琵琶唐太宗半月無雙影金花有四時摧蔵千里態掩抑㡬重悲促節縈紅袖清音滿翠帷駛彈風響急緩曲釧聲遲空餘關隴恨因此代相思聽鄰人琵琶陳叔達本自龍門桐因妍入漢宮香由一作縁羅袖裏聲逐朱絃中雖初學記作離有相思韻翻將入塞同關山臨却月花蘂散廻風為將金谷引添令曲未終鄂渚聽杜別駕彈胡琴劉長卿文姬留此曲千載一知音不解胡兒語空愁楚客心聲隨邊草動意入隴雲深何事長江上蕭蕭出塞吟箜篌箜篌梁簡文帝捩遲初挑吹弄急持摧類聚作時推舞釧響逐絃鳴衫廻半鄣柱欲知心不平君㸔黛眉聚簫簫劉孝綽一作儀危聲合歌鼓類聚作鼔吹絶弄混笙箎管饒和氣促釵動覺脣移仙史安為貴能令秦女隨笛賦長笛吐氣清周宏讓商聲傳後出龍吟鬱前吐情斷山陽舍氣咽一作吐平陽塢胡騎争北歸偏知引一作別鄉苦羇旅情易傷零淚如交雨同前賀徹胡關氛霧侵𦍑笛吐清音韻切山陽曲聲悲隴上吟栁折城邊樹梅舒嶺外林方知出塞虜不憚武溪深詠笛姚察作曲是佳人制名由巧匠鵾絃時莫並鳳管還相向隨歌響更發逐舞聲彌亮宛轉度雲窓逶迤出黼帳長隨畫堂裏承恩無所讓同前劉孝孫凉秋夜笛鳴流風韻九成調髙時慷慨曲變或淒清征客懐離緒隣人思舊情幸以知音故千載有竒聲同前李嶠羌笛寫龍一作餘聲長吟入夜清關山孤月下来向隴頭鳴逐吹梅花落含春栁色驚行觀向子賦坐憶舊鄰情清溪半夜聞笛李白羗笛梅花引吳溪隴水清寒山秋浦月腸斷玉關情與史郎中飲聽黄鶴樓吹笛前人一為仙客去長沙西望長安不見家黄鶴樓中吹玉笛江城五月落梅花觀胡人吹笛前人胡人吹玉笛一半是秦聲十月吳山曉梅花落敬亭愁聞出塞曲淚滿逐臣纓却望長安道空懐戀主情江中聞笛王昌齡横笛怨江月扁舟何䖏尋聲長楚山外曲繞胡關深相去萬餘里遥傳此夜心寥寥浦嶼寒響盡唯幽林不知誰家子復奏邯鄲音水客皆擁棹空霜遂盈襟疲馬顧北走遷人悲越吟何當邊草白旌節龍城隂塞上聽吹笛髙適雪净胡天牧馬還月明羌笛戍樓間一作胡人𦍑笛戍樓間樓上蕭條明月閒借問梅花何䖏落風吹一夜滿關山聞笛李益囘樂峰前沙似雪受降城外月如霜不知何䖏吹蘆管一夜征人盡望鄉寄岷笛與宇文舍人杜牧調髙銀字聲還側物比柯亭韻較竒寄與玉人天上去桓將軍見不教吹寄澧州張舍人前人髮勻肉好生春嶺截玉鑽星寄使君檀的染一作深時痕半月落梅飄䖏響穿雲樓中威鳳傾冠聽沙上驚鴻掠水分横想紫泥封詔罷夜深遙隔禁墻聞夜上受降城一無此五字聞笛李益一作戎昱入夜思歸一作歸思切笛聲清更哀愁人不願聽自到枕前来風起寒一作塞雲斷夜深關月開平明獨惆悵落一作飛盡一庭梅雜樂詠鐘李嶠既接南鄰磬還同一作隨北里笙平陵通曙響長樂徹單題詩作驚宵聲秋至含霜動春歸應律鳴豈惟恒待扣金簴有餘清夜聞􅓋篥杜甫夜聞􅓋篥滄江上衰年側耳情所向鄰舟一聽多感傷塞曲三更歘悲壯積雪飛霜此夜寒孤燈急管復風湍君知天地干戈滿不見江湖行路難窟磊子人梁鍾刻木牽絲作老翁雞皮鶴髮與真同須臾弄罷寂無事還似人生一世中樓中閲清管韋應物山陽遺韻在林端横吹驚響迥慿髙閣曲怨繞秋城淅瀝危葉振蕭瑟凉風生始遇絲一作兹管賞已懐故園情詠拍板朱灣赴節心長在從繩道可集作自觀須知片木用莫向集作作散材看空為歌偏苦仍愁和即難既能親掌握願得接同歡聽杜山人彈胡笳戎昱緑琴胡笳誰妙彈山人杜陵名庭蘭杜君少與山人友山人沒来今已久當時海内求知音囑付胡笳入君手杜陵工琴四十年琴聲在音不在絃座中為我奏此曲滿堂蕭飋如窮邊第一第二拍淚盡蛾眉沒蕃客更聞出塞入塞聲穹廬氊帳難為情胡天雨雪四時下五月不曾芳草生須臾促軫變宮徵一聲悲兮一聲喜南㸔漢月雙眼明却顧胡兒寸心死回鶻數年收洛陽洛陽士女皆驅將豈無父母與兄弟聞此哀情皆斷腸杜陵先生證此道沈家祝家皆絶倒如今世上雅風衰若箇深知此聲好世上愛筝不愛琴誰明此調難知音今朝促軫為君奏不向俗流傳此心文苑英華巻二百十二
