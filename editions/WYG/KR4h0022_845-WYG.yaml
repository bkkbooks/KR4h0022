body:
  text: 文苑英華巻八百四十六宋李昉等編儒二兖州曲阜縣孔子廟碑一首陳留郡文宣王廟堂碑一首許州文宣王新廟碑一首柳州新修文宣王廟碑一首處州孔子廟碑一首書處州韓吏部孔子廟碑陰記一首兖州曲阜縣孔子廟碑李邕嘗觀元化隂藏上帝𤣥造雖道逺不際而運行有符揚𣙜大抵宣考神用逮一作建人綂之可復補天秩之將頺其揆一也昔蚩尤怙賊厥弟驕兵巨力朋徒合緒連禍則黄帝興聖首一作重出群龍推下濟以君人儆勤畧以勘亂逮至横流方割包山其咨轉死為魚鱻食不粒則堯禹並跡振拔殷一作隠憂導百川康四國粤若殷禮缺周德微宋公用鄫楚子問鼎則夫子卓立燦然成章闢邦家之正門播今昔之彛憲此天所以不言而成化聖所以有開而必先其若是者乎故夫子之道消息乎兩儀夫子之德經營乎三代豈徒小說盖有異聞夫亭之者莫如天藉之者莫如地敎之者莫如夫子且沐其亭而不識其道則不如勿生荷其藉而不由其德則不如勿運故曰消息乎兩儀者也夫博之者莫如文約之者莫如禮行之者莫如夫子且會其文而不揚其業則不如勿傳經其禮而不啓其敎則不如勿學上代有以焯序中代有以宗師後代有以丕訓故曰經營乎三代者也噫唐虞之美不必至是贊而大者進聖君也夏桀之惡不必至是擠而毁者激庸主一作君也伊尹之忠不必至是演而數者勉誠節也趙盾之逆不必至是抑而書者誅賊臣也至若論慈廣孝輔仁寵義職此之由於是君臣之位序父子之道明朋友之事興夫婦之倫得雖朗日開覺膏雨潤澤和風清扇安足喻哉借如九皇繼綂而政醇千聖同年而道合雖事業廣運而理濟一作齊一時未有薄逰大夫僻居下國德敎既往言滿方來廟食列邦不假手於後續君長萬葉必歸心於素王若此之盛是以騰跨百辟孤絶一人曷成名而可稱盖取興而為大者也我國家儒敎浹宇文思啓或作戾天仲吏曹以追尊建禮官而崇祀侯褒聖於人爵尸奠享於國庠是用大起學流錫類孝行敦悦施於萬一作方國光覆彌於𦙍宗三十五代孫嗣褒聖侯璲之子一作芝子藏暉洎族賢元亨等或専門碩學一作儒罔墜于緒或餘波明哲載揚厥聲乃相與合謀曰夫墟墓之地禮曰自哀聽訟之樹詩云勿翦一則遇事遺愛一則感物允懷矧乎大聖烈風吾祖鴻美故國封井舊居川岳歟宜其悚神馳魄膝行膜拜陳齋祭奠嚴祠樹繚垣以設坊刋豐石一作碑以為表兖州牧京兆韋君元一無元字珪王國周親人才懿德明啓風績一作俗休有政或作名敎長史河南源晉賔字光國賢操孤興清節特逺納人以禮成俗於師司馬天水狄光昭一無昭字字子亮相門開祥或作祚雅道踵武聞義必立從事可行錄事參軍東海徐仲連功曹成陽盖寡疑倉曹太原王道淳𢎞農楊萬石户曹博陵崔少連𢎞農揚履𤣥一無此五字兵曹太原王光超一無此五字范陽張博望法曹安定皇甫佺東海徐彦光士曹滎陽鄭璋參軍扶風竇光訓及曲阜縣令鴈門田思昭主簿吳興施文蔚清河晏𢎞楷等宦緒通徳儒林秀士升堂覩奥逰聖欽風僉同演成乃共經始其銘或作詞曰元天隂隲大明靈一作虚鏡神不利滛物將與正凡曰投艱在此逢聖吞沙薦虐軒皇一作黄底定襄陵兆灾夏禹文命周道失序夫子應聘刪一作刋詩述史盛禮張樂雅頌穆清訓詞昭灼片言一字勸善懲惡誘進後人啓明先覺六順勃興四維一作敎皆作元一作茂功濟古至道維來首出列聖席巻羣才大名震耀廣學天開蒸嘗匝㝢一作宇誦習一作聲窮垓帝念居室以光壽宫建侯于嗣環封厥中孫謀不泯祖德斯崇乃刋聖烈用廣休風一作皆唐文粹陳留郡文宣王廟堂碑前篇作記陳兼又見獨孤及集唐天寶十有一載歲次壽星陳留改文宣王宫七字前篇作陳留郡重建文宣王廟郡守河南道採訪處置使元公彦冲所以崇德樹風敬敎勸學也初公以三務前篇作農之隙分命前篇作務有司修廢功舉墜前篇作墮禮而此堂也舊規僵前篇作偪陋下宇將壞我是以有經始之制冬十月丙午新宫成凡天下有道則文敎大洽為政者克廣舊典以尊先聖禮也浚儀令河東裴勝叶恭大猷祗奉成績乃立石于前篇作扵朝廷以旌盛德所庇云有三才然後有剛柔剛柔交而利害作乎其中於是横目蚩蚩天不能節黄帝堯舜氏始以仁義拯溺其流及乎夏商而周監二代有明堂之禮樂敎之首也逮周集無周字德下衰王室卑而五覇起彛倫墜而六學缺天將持其木鐸以授後聖繇是周公沒五百嵗而夫子生雲從龍風從虎大道既作天下化成故夫子修詩書以酌虞夏殷周之損益而國風帝典備約魯史記以書二百四十二年之廢典而亂臣賊子懼嗚呼集作嗚戯前篇作於戯不前篇有有字大壞何以見聖人之全功乎粤若中都之制立民極也以匡頺風防不為曲兩觀之法用重典也以去姦雄集作宄政不為苛夾谷之會誅無禮也以尊兩君刑不為僣三預是邦之政而魯至於道向使鳯鳥來河圖出東周之化其在魯乎嗚呼明王未興亢龍無輔運匪我與德兮何衰盖𢎞其敎前篇作道以救物處其順以安時行藏屈伸與化推移集有也字其世衰也掲仁義於天下其世平集作大來前篇作世衰也啓土宇于前篇作於身後出入百代波流萬方孰不日用聖猷欽若祀典然後知素王之德與天地並或曰夫子栖栖於魯衞陳蔡之間或者其未智歟君子曰是智也聖人與時消息同彼憂患不有匡蒲前篇作人之難麟鳯之感何以戒集作誡茍合安蒙求前篇作亨使達者順時窮者知命然則巻舒之跡其可究乎弈弈新廟庶人成之有以建誕敷之前篇作文德勿亟之化盖黝堊其楹𤣥端其服加釁器之等前篇作數正當宁之位王命所以寵舊章也兩楹之下四科以班兖公東序前篇作房下同西向集作嚮下同費侯鄂前篇作按會要冉耕封鄲侯侯薛侯徐侯衞侯黎侯吳侯魏侯西序東向其餘未入前篇作於室者畫衣冠於四墉集本作篇作西牖配祭所以辨等威也議者謂我邦君於是乎建宏規而播新命修令典而崇明祀講義以度功前篇作軌度懋功以從時訓人以成德昭德以合禮六者禮之善物而時有遷邑有改不銘考父之鼎紀奚斯之功是廢名也何以示後嗣遂命客卿前封邱縣丞泗上陳兼志之此篇見獨孤及集而梁肅作及集後序亦云述聖德以揚儒風則陳留郡文宣王廟碑而碑末乃云命陳兼志之肅出及門必不誤書疑及命兼代作英華總目明言及作而八百十四巻并此巻重出却病作陳兼未詳前巻已刪今存于此許州文宣王新廟碑劉禹錫歲在丙辰元日開成許州牧尚書杜公作文宣王廟暨學舍于兊隅革故而鼎新也前年公受社與鉞董淮陽汝南之師八月上丁釋菜于宣父之室陋宇荒堦不足迴旋已事而歎乃詢黄髮有鄉先生前致辭曰自盜起幽陵許為兵衝連戰交椊集作枰率無寧嵗耳恱鉦鼓不聞絃歌目不知書不害為智邇來生聚敎養起居祖習一出於軍容今幸天子憐許民為擇賢侯此人人思治之時也公曰諾吾當先後之於是元年修戎律以通衆志次年成郡政以蠲民瘼季年崇敎本以厚民風我言既從乃卜新宫瀷水之瀕城池在東登登其杵坎坎其斧繩之墨之鑿柄枝梧載塗載奐集作載塈載塗黝焉集作黟焉陵虚寢廟𢎞敞齋宫嚴閟軒墀廂廡儼雅清潔門庭墻仭望之生敬外飭觚稜中設黼幄嚮明當宁用王禮也堯頭禹身華冠象佩之容取之自鄒魯及門覩奥偶形畫像之儀取之自太學宗彛籩豆青黄規矩之器秉周禮也犧牲制集作時非幣薦獻升降之節遵國章也藏經于童檐斂器于處櫝講筵有位鼓篋有室授經有博士督課有助敎指蹤有役夫洒掃有廟幹公又割隟地為廣圃蒔其柔蔬而常菹旨蓄之御備捨己俸為子錢權集作𣙜其孶贏而鹽酪釭膏之用給濟濟莘莘化行風驅家慕恭儉户知敬讓父誨其子兄規其弟不逰學堂與撻市同繇是縻勇爵戴鶡冠者往往弭雄姿而觀習禮義矜甲胄者知根於忠信服縵胡者不敢侮縫掖敎化之移人也如置郵焉冬十一月許人以新儒宫成來告且乞辭欲行乎遠也公名悰字永裕故丞相岐國公之孫岐公弼諧二帝碩學冠天下嘗著書二百餘篇言禮樂刑政古今損益綂名曰通典藏在石室副行人間今孝孫聿修集有之字形乎事業播于聲詩懿哉能世其家也禹錫昔年忝岐公門下生四參公府近年牧汝州道許昌躬閱其政故不得讓遂銘于麗牲之碑銘曰許介韓魏四征之地兵興已還其鬭㘖㘖亦有儒宫軋于兵間賢侯戾止思樂泮水俾人嚮學王化之始便地爰相新規鬱起廟貌斯嚴堂皇一作堂堂有煒秩秩禮物祁祁冑子入于門墻如造闕里春詠集作誦夏絃載颺集作揚淑聲風于閭閻浹于郊坰途讓班白家尊父兄與化而遷其猶性成昔之委巷相詬交侮今逢親戚不道媟語昔之連營誇力使酒今遇賔客欽容集作相對拱手魯有泮林鳥革其音許崇學斆民恱其敎鐫于圭石以志新廟柳州新修石本有𤣥聖二字文宣王廟碑柳宗元仲尼之道與王化逺邇惟柳州古為南夷椎髻卉裳攻刼鬭暴雖唐虞之仁不能柔秦漢之勇不能威至于有國始循法度置吏奉貢咸若采衞冠帶憲令進用文事學者道堯舜孔子如取諸左右執經書引仁義旋辟唯諾中州之士時或病焉然後知唐之德大以遐孔氏之道尊而明元和十年八月州之廟屋壞幾毁神座石本作位刺史柳宗元始至大懼不任以墜敎基丁未奠薦法齊時士一本作事禮不克施乃合初亞終獻三官衣布洎乎一本作于嬴財取土木金石徵工僦功完舊益新十月乙丑王宫正室成乃安神棲乃正法庭秪會羣吏卜日之吉虔告於王靈曰昔者夫子嘗欲居九夷其時門人猶有惑聖言今夫子去代千有餘載其敎始行至於是邦人去其陋而本於儒孝父忠君言及禮義又况巍然炳然臨而灸之乎惟夫子以神道設敎我今罔敢知欽若茲敎以寧其神追思告誨如在于前茍神之在曷敢不虔居而無陋罔貳昔言申陳嚴祀永永是尊麗牲有碑刻在廟門處州孔子廟碑前篇作記韓愈自天子至郡邑守長通得祀而徧天下者唯社稷與孔子為前篇作焉然前篇有而字社祭土稷祭穀而勾龍與棄乃其佐享非有石本前篇並作其専主又其位所不屋而壇豈如孔子用王者事文粹集註並作禮巍然當座以門人為配自天子已或作以集本前篇作而下北面跪薦二字集作拜跪薦祭進退誠敬禮如視石本作親弟子者勾龍棄以功孔子以徳固自有次第哉自古多有以功德集註作續得其位者不得常祀勾龍棄孔子皆不得位而得常祀然其祀事前篇作者皆不如孔子之盛所謂生人已集作民以來未有如孔集作夫子者其賢過於堯舜逺者此其效歟郡邑皆有孔子廟或不能前篇作得修事雖設博士弟子或役於有司名存實亡失其所業獨處州刺史鄴侯李繁至官能以為先既新作孔子廟又令集作命工改其石本無其字顔子四字集作改為顔囘至子夏十人像其餘六十前篇有二字子及後大儒公羊髙左丘明孟軻荀况或作卿伏生毛公韓生董生髙堂生揚雄鄭𤣥等數十人皆圖之壁選博士弟子皆如集本文粹作必省其人又為置三字集作說講堂敎之行禮肄習其中前篇有又為二字置本錢廪米令可繼處以前篇有守字廟宇集本文粹作守廟成躬率前篇有羣字吏及博士弟子入學行釋奠集本文粹並作菜禮耆老嘆嗟其子弟皆興於學鄴侯尚文其於古記無不貫達故其為政知所先後可歌也已詞曰二字前篇作乃作詩曰維此廟學鄴侯所作厥初庳下神不以宇先師所處亦窘寒暑乃新斯宫神降其獻講讀有常不誡前篇作戒用勸掲掲元哲為集本前篇作有師之尊羣聖嚴嚴大法以存像圖孔肖咸在斯堂以瞻以儀俾不惑忘集作碑不惑忘後之君子無廢成美琢辭碑石以賛攸始此篇八百十四巻重出前已削去書處州韓吏部孔子廟碑隂記杜牧天不生夫子於中國中國當何如曰不夷狄如也荀卿祖夫子李斯事荀卿一日宰天下盡誘夫子之徒與其集本文粹無其字書坑而焚之曰徒能亂人不若刑名獄吏治世之賢也彼商鞅者能耕能戰能行其法基秦為强曰彼仁義蝨官也可以置之置之言不用也自董仲舒劉向皆言司馬遷良史也而遷以儒分之為九曰博而寡要勞而無功不如道家者流也自有天地以來人無有不死者海上迂恠之士時二本作特出言曰黄帝鍊丹砂為黄金以餌之晝日乘龍上天誠得其藥可如黄帝以燕昭王才二本作才賢破強齊幾於覇秦始皇漢武帝之雄才滅六強擗四夷盡非凢主也皆甘其說耗天下捐骨肉而不辭至死而不寤二本作悟莫尊於天地莫嚴於宗廟社稷梁武帝起為梁國者以筍脯麵牲為薦祀之禮曰佛之敎牲不可殺以天子之尊捨身為其奴散髪布地親命其徒踐之有天地日月為之主隂陽鬼神為之佐夫子巍然綂而辯之復引堯舜禹湯文武周公為之助則其徒不為劣其治不為僻彼四君二臣不為無知一旦不信背而之他仍族滅之儻不生夫子紜紛冥昧百家鬭起是已所是非己所非天下隨其時而宗之誰敢非之縱有非之者欲何所依據而為其辭是楊墨駢慎已降百家之徒廟貌而血食十年一變法百年一改敎横斜髙下不知止泊彼夷狄者為夷狄之俗一定而不易若不生夫子是知其必不夷狄如也韓吏部夫子廟碑曰天下通祀唯社稷與夫子社稷壇而不屋取異代為配未若夫子巍然當門文粹作座用王者禮以門人為配自天子至于庶人親北面而師之夫子以德社稷以功固有次第因引孟子曰生人以來未有如夫子者也自古稱夫子者多矣稱夫子之德莫如孟子稱夫子之尊莫如韓吏部故書其碑隂云文苑英華巻八百四十六
