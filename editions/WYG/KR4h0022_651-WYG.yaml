body:
  text: 文苑英華巻六百五十二宋李昉等編勸學上東宫勸學啟一首上東宫請講學啟一首薦士上桂州李中丞薦盧遵啟一首薦韓乂啟一首薦王寧啟一首賀官雜賀附賀陸相公拜相啟一首賀趙相公拜相啟一首賀趙江陵宗儒辟符載啟一首賀裴相公破淮西啟一首賀門下裴相公啟一首賀門下李相公啟一首賀中書門下平澤潞啟一首賀相國汝南公啟一首賀髙相公除荆南啟一首勸學上東宫勸學啟𤣥宗為太子時劉憲臣以今月二十二日侍從外叅親奉令㫖令臣勾當所進書随了随進并語臣云當今閒暇正好讀書臣自承殿下之好尚私心歡喜不能自勝伏惟天縱神武生知睿􅈒誠時與理會固無待勤求然自古及今皆重于學至於光輝盛徳發揚令聞安靜身心保寧家國除此之外更無以加常人讀書擬干爵禄事湏精熟乃堪試練殿下居副君之位有絶世之才豈假尋章摘句哉蓋應略知大意而巳用功甚少為利極多伏願克成美志無棄暇日上以慰至尊之心下以答庶寮之望幸甚幸甚侍讀禇無量經明行脩在朝罕匹是以皇帝簡擇令侍殿下謂宜時䝉召問而察其言臣以愚劣忝迹端士區區之誠莫不罄竭謹啟上東宫請講學啟𤣥宗為太子時張說臣某等啟臣聞安國家定社稷者武功也經天地緯禮俗者文教也社稷定矣固寧輯於人和禮俗興焉在刋正於儒範順考古道率由舊章故周文王之為太子也崇禮不倦魏文帝之在春宫也好古無怠博覽史籍激揚令聞取髙前代垂名不朽伏惟皇太子殿下英睿天縱聖敬日躋神算宻發雄威立斷廓清氛祲用寧國家兆人由是歸徳六合所以推功主鬯青宫固本也分務紫極觀政也副羣生之望作累聖之儲殿下之於天下可謂不輕矣監國理人可謂至重矣莫不拭目而視清耳而聽冀聞異政以裨聖道臣愚伏願崇太學簡明師重道尊儒以養天下之士今禮經殘缺學校陵遲歴代經史率多紕繆實殿下闡揚之日刋定之秋伏願博採文士旌求碩學表正九經刋考三史則聖賢遺範粲然可觀况殿下至性神聰留情國體幸以問安之暇應務之餘引進文儒詳觀文典商略前載討論得失降温顔開讜議則政途理體日以增益繼業承祧永垂徳美臣等行業素輕藝能寡薄顧慙端士叨侍宫闈日夜祗懼無以匡輔區區㣲誠願効塵露輕進芻鄙庶垂採擇臨啟如失伏用兢惶謹啟手令答曰經史脫誤事資刋理自非通儒孰詳大義侍讀等升堂觀集作覩奥能定闕文今司經崇文皆有舊籍敬承来教即令考序項日以来未暇數集作接對何嘗少選而忘徳音尋當叙進羣英集作公冀聞餘論仍令集作今仍錄留啟本以代書紳薦士上桂州李中丞薦盧遵啟栁宗元某啟凡士之當顯寵貴劇則其受賜於人也無徳心焉何也彼將曰吾勢能得之是以所出者大而其報也必細居窮厄困辱則感槩捧戴萬萬有加焉是以所出者小而其報也必巨審矣故凡明智之君子務其巨以遺其細則功業光乎當時聲名流乎無窮其所以激之於中者異也若宗元者可謂窮厄困辱者矣世皆背去顦顇曠野獨頼大君子以明智垂仁問訊如平生光耀囚錮若被文繡嗚呼世之知止足者鮮矣既受厚遇則又有不巳之求以黷閣下之嚴威然而亦欲出其感槩捧戴而效其巨者伏惟閣下留意裁擇幸甚幸甚伏以外族積徳儒厚以為家風周齊之間兄弟三人咸為帝者師孝仁之譽髙於他門伯舅叔仲咸以孝徳通于鬼神為文士所紀述相國彭城公嘗號于天下名其孝以求其類則其後咸宜碩大光寵以充神明之心今乃彫䘮淪落莫有逹者豈與善之道無可取耶獨内弟盧遵其行類諸父靜専温雅好禮而信飾以文墨逹於政事今所以聞於閤下者無怍於心無愧於色焉以宗元棄逐枯槁故不求逹仕不務顯名而又難乎其進也竊髙閤下之舉賢容衆故願委心焉則施澤於遵過於厚賜小人也逺矣以今日之形勢而不廢其言使遵也有籍名於天官獲禄食以奉養用成其志一舉而有知恩之地地集作士焉可不謂務其巨者乎伏惟試詳擇焉言而無實罪也其敢逃大譴七字集作罪其敢逃進退恐懼不知所裁不宣謹啟薦韓乂啟杜牧某啟昨日所啟言韓拾遺事非與韓求衣食救饑寒也御史亦豈為救饑寒之官乎中丞必曰大梁奏取韓以救饑寒何不去夫幕吏乃古之陪臣以人為北面雖布衣無耻之士亦宜訪其樂與不樂况有耻集作道之君子乎韓以旅寓洛中非不樂汴集作梁也不甘不告之請耳韓及第後歸越中佐沈公江西宣城府罷唐扶中丞辟於閩中罷府歸路由建州妻為元晦同髙祖妹惡晦為人不省之及晦得越乃棄産避之居常州殷儼者仰韓之道自閩寄百縑遺之及門不開書緘而斥去之牧比两府同院但見其亷慎髙絜亦未知其道太和八年自淮南有事至越見韓居集作君於境上三畆宅兩頃田樹􅂼釣魚唯召名僧為侣餘房究易嬉嬉然無日不自得也未嘗及身名出處之語未嘗入公府造請與幕吏宴逰因此不為縉紳所相見禮蕭髙二連帥至即日造其廬詢以集作其政事稱先人梓材有文學髙名沒於越之府幕故不願復為越賔及髙至許下厚禮辟之其為人也貞絜芳茂非其人不與逰非其食不敢食蕭舎人考功崔員外是趨於韓交者牧復趨於蕭崔二君子者即韓之去牧其間不啻容數十人矣亦安得知其賢而言之復不僣乎伏恐中丞謂韓求官以衣食干交朋者中丞初在憲府固宜慎選御史御史固非救饑寒之官某乆承恩知但欲薦賢於盛時雖至淺陋亦知不可以交友饑寒求清秩以干大君子者伏恐集作慮未審誠懇故此具陳本末伏惟照察謹啟薦王寧啟某啟前渭南縣令王寧前件官實有吏才稱於衆口年少强力一也遇事必能裁割二也既藴智能無頭角誇誕三也亷直可保四也處於驕將内臣之間必能和同五也今者邉將生事雜虜起戎不憂兵甲唯在饋運某過承恩奬輙敢薦才伏惟取捨之間特賜恕察謹啟賀官雜賀附賀陸相公拜相啟吕頌某啟伏見詔書相公拜上台之位寅亮天工登翊王室弼成大化佇致和平叶一人夢卜之求副四海具瞻之望凡在中外孰不慶幸方今聖主文明天下思理兵革不舉于兹十年黎元有再安之望戎馬有歸牧之勢夫物應有兆機生其㣲制動者守乎靜求直者端乎表秉鈞者慎始而圗其終也相公天實生徳錫我皇家顒顒蒼生延首以望蠻夷左袵亦仰無窮某受任遐荒職在邉鎮瞻戀欣忭無任下情賀趙相公拜相啟某啟伏見某月日詔書伏承相公膺啟沃之心登輔弼之任人望巳久天意下從休聲飈馳浹洽海内凡在士庶不勝慶幸伏以陛下文徳聿脩武功克靜祲沴不作昇平漸階正可乗天時以創制因人事以立法天其或者必以相公乗啟聖之運致仁壽之期自然百度以貞九流式叙霜露所墜罔不開化蠢動含生皆遂其性致君堯舜何獨古人某受命荒服職在天涯瞻望喜躍無任下情賀趙江陵宗儒辟符載啟栁宗元某啟伏聞以武都符載為記室天下立志之士雜然相顧繼以歎息知為善者得其歸嚮流言者有所間執直道之所行義風之所揚堂堂焉實在荆山之南矣幸甚幸甚夫以符君之藝術志氣為時聞人才位未會盤桓固久中間因縁䧟在危邦與時偃仰不廢其道而為見忌嫉者横致唇吻房給事以髙節特立明之於朝王吏部以清議自任辨之於外然猶小人浮議困在交㦸凡諸侯之欲得符君者城聮壤接而惑於騰沸環視相讓莫敢先舉及受署之日則皆開口垂臂悵望悼悔譬之求珠於海而徑寸先得則衆皆怏然罷去知竒寳之有所歸也嗚呼巧言難明下流多謗自非大君子出世之氣則何望焉瞻望清風若在天外無任感激欣躍之至輕黷陳賀不勝戰越不宣謹啟賀裴相公破淮西啟元稹某啟伏見當道節度使牒伏承相公生禽吳元濟歸斬闕下功髙振古事絶稱言億兆讙呼天下幸甚某聞舉世非之而心不惑者謂之明羣疑未亡而計先定者謂之智日者天棄淮蔡蓄為汙瀦五十年間三后垂顧𦕈爾元濟繼為凶妖謂君命可逃以父死為利聖上以睿謨神筭方議剪除羣下守見習聞咸懐阻沮公英猷獨運卓立不囬内排疑惑之詞外輯異同之旅三軍保任一意誅鋤投石之卵雖危拒輪之臂猶奮頼閤下忠誠憤激親自拊廵靈旗一臨餘沴電掃此所謂俟周公而後淮夷服得元凱而後吳冦平凡在陶甄孰不忻幸况某早趨門館抃躍尤深僻守遐荒不獲随例拜賀無任踴躍徘徊之至賀門下裴相公啟劉禹錫某啟伏以相公含道傑出降神挺生坐籌以弼睿謩秉鉞以行天討風雲助氣山岳効靈制勝於罇爼之間指蹤於韝緤之末蕭斧既定衮衣以歸君心如魚水人望如風草一徳交暢萬方集作邦和平運神思於洪爐納生靈於壽域文武丕績冠于古今某恪守遐荒不獲随例拜賀瞻望抃躍無任下情賀門下李相公啟自西川入為大夫拜相某啟伏以聖君當功成愷樂之日而求賢愈切思治益深是上𤣥垂休欲速致太平之明效以相公事業而逢此時天下之人視仁壽之域其猶尋尺故命書所至徳風随之㣲材片善咸自磨拂况同主國柄如吹塤箎含生之倫唯所措置日月亭午物無邪隂聖賢合徳人識正道雖居畎畆足以詠歌某遐守要荒不獲随例拜賀私感竊忭實倍恒情賀中書門下平澤潞啟杜牧某啟伏以上黨之地肘京洛而履蒲津倚太原而跨河朔戰國時張儀以為天下之脊建中日田恱名曰腹中之眼帶甲十萬籍土五州太行夷儀為其扃闗健馬强兵為其羽翼自逆黨専有僅及一世頗聞教育實曰精强昨者凶豎専地之請初陳聖主整旅之詔將下中外逺邇皆疑難攻蜂蠆螳蜋頗亦自負伏惟相公上符神斷潜運廟謀仗宗社威靈驅風雲雷電掌上必取彀中難逃纔逾周星果梟逆首周公東征之役㨗至三年憲皇淮夷之師尅聞四嵗較虜冦之强弱曾不等倫考攻取之敗亡何至容易若非睿筭英略借箸深謀比之前脩一何逺出自此鞭笞反側洒掃河湟大開明堂再振儒校窮天盡地皆為壽域之人赤子秀眉共老止戈之代某謬分符竹實由恩知慶快歡忭之誠倍百常品不宣謹啟賀相國汝南公啟李商隠某啟日者慶屬中興運推常武仰窺金版遐考瑶圗順祖之孝思丹青曾閔憲皇之武力刀机彭韋聖上初九潜淵登三佩契以后稷岐嶷為小慧故人莫得知以漢皇雲物為下祥故神無所豫洎陟元后洪惟長君固必降非常之人輔惟新之政伏惟閤下昭回降彩沆瀣融精徃執靈鉟正星辰之分野今調鏤鼎猶日月之得天昔軒后師臣成集作商王畏相殷奉伊尹則謂之元聖周事吕尚則命為太公此王者之所以尊賢傑而不以為疑也至于姬旦金縢不與燕召同列仲尼麟史不令游夏措辭甘盤尊舊學之名夷吾居仲父之位此又賢傑之所以自負其道而不以為讓也上下交感人祗叶從是我后夷姦秉􅈒之辰是閤下宰物康時之夕清廟係心矣蒼生延首矣允也無間樂哉惟時某早奉輝光嘗䝉咳唾牛心致譽麈尾交談而契闊十年流離萬里扶風歌則劉琨抱英華作跪膝白頭吟則鮑昭撫膺重至門闈空餘皮骨方從初服無補大鈞穿履敝衣正同北郭槁項黄馘乃集作仍類曹商未知伏謁之期徒切太平之賀下情無任抃賀踴躍之至謹啟賀髙相公除荆南啟胡曾伏以相公承家業峻開國勲髙術妙六竒圗精八陣生民皎日聖主迅雷才成破趙之功旋告下齊之㨗故得威宣破竹力號㧞山弛張七徳之中舒巻五車之内東周士庶咸遊沸鼎之中西蜀蒸民悉在春臺之上蓋由人事豈屬天時昔漢得韓信而興楚失陳平遂滅今者江騰海沸山動岳摇荆門告累卵之危淮楚陳剖胎之難赤眉巻地黄巾滔天公侯無匡合之才藩鎮乏縱擒之術若不預咨賢􅈒早託英雄則何異魚逰宋池鷰巢衞幕崑岡火發玉石俱焚歴陽水来智愚同䧟雖思嘗膽何補噬臍且擘斷華山冝假巨靈之力決平洪水湏憑大禹之才是以上自一人下同百辟僉云非相公不能定荆楚非相公不能綰貨泉既無易於肩堯遂有成於命說伏計即離犀浦遽赴龍山銷唐堯旰食之憂解黎庶倒懸之急某家在湖外郡出關中遂假道於荆闗獲起居於梅鼎仰將軍之大樹敢議營巢窺丞相之巨川唯希在藻伏惟照鑒文苑英華巻六百五十二
