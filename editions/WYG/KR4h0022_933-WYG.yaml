body:
  text: 文苑英華巻九百三十四宋李昉等編婦人下鄭國夫人碑一首頴川郡太夫人陳氏碑一首汾陽王妻霍國夫人王氏碑一首谷夫人碑一首鄭國夫人神道碑張説鄭國夫人者𢎞農楊氏之女也開元神武皇帝惠妃之母也曽祖諱諶以禮樂習文為越州司馬祖衍以折衝學武為游擊將軍父宏以門才入仕為雍縣丞而早卒初則天之代夫人言歸武氏曰恒安郡王生惠妃及家令忠僕疑大子僕信開元十年三月終于通化里其四月卜宅于少陵原哀子䘖血號旻仰訴怨報德之不待託思齊以集作於永慕皇帝挹鑾殿之内寢悵鶴池之外惨揚淑聲而金石刻揭髙行而天地感國史司文命為鄭志若清明下濟岳瀆上升祥惠德門慶育邦媛神授孝徳集作理之性天啟聦達之心加以潤澤詩書游玩圖傳伯宗好直預誡集作識將亡重耳羈遊先穪必霸豈知漢廷章奏假借仲長之才周官禮儀資禀宣父集作文是之學昌言嘉論有如此者螓首蠐領修眉横波既工嚬嘆易為容止肅恭而不跼舒和而不倨商周革命遇屯有怡懌之顔桑藿儆如在貴無矜驕之色端容一貌有如此者紘綖祭服闕翟朝衣纂組入神剪制驚國雕葫之飯露葵之羮五齊六清三臡七醢咸一見而洞理或不習而知和女主中饋有如此者惠妃載誕皇子在者四人驪泉多龍丹穴多鳳克岐克嶷預見元凱之才實覃實訏早聞宵燭之艶亦關隂德之潛襲胎教之宻傳乎又名子以義成家以禮忠者以令德為忠信者以不欺為信傳云去食存信信而有徵經云移忠為孝孝則不匱周宗咸服集作復是紀季獨存至徳深圖有如此者辟司徒之妻邑其合禮南城侯之婦封其舊功况夫人集無人字慎徽四德四德咸舉經綸二儀二儀克從匿武收繼趙之勲産姚承配夏之慶吹凱風於椒掖外王母於梧宫盛徳大業窮光極寵集作榮啟國西鄭不亦宜乎十數年間二子榮立每至四時令節六参嘉㑹魚軒照門龜艾一作艾綬交室為夀則珠貝山積侑幣則錦綺霞舒集作聚白玉滿堂聚姻親而同有黄金作穴散隣里而無餘君子欽其市集作布義聖人嘉其寳儉故寢疾則飲食天厨湯藥御府匪日伊夕上官駱驛於閨庭送終則威儀傾都車騎曀日自宫徂野中使相望於道路哀榮之盛書記罕聞猗歟所謂小君之遺美聖善之髙烈者也如使後代考南史議西陵披簡牘而嘆息臨山原而茫昧旌賁之道不期闕而然則外甥之碑武擔之石非明淑之壟其何所設焉辭成進御帝稱曰善顧謂尚札我其書之於是西翰黄縑縷字青琬雲横波蹙神變艶爛於山門鶴倚鸞翔生氣宛延於松路禮尊事絶恩崇迹逺斯又𤣥德動天幽誠迴日之竒致也誰昔見毛詩未覩名言莫逮銘曰代有母德厥氏揚兮祖考為士夫為王兮聖后中葉惣萬方兮天命未改復歸唐兮賢淑啟祊繼絶亡兮宗周雖滅神女昌兮建號西鄭榮舊鄉兮魚軒翟茀盛寵光兮二子雙飛華綬章兮朱輪魚廷煒煌兮集作出入魚輪庭煒煌兮是去此昭昭即茫茫兮何處詔葬少陵阜兮貴妃慈親侯王舅兮寒暑流易山川久兮古墳坡陁老樹朽兮夀宫靈百代守兮頌石光華千載後兮潁川郡太夫人陳氏神道碑潁川郡太夫人者諱某字某雷州大首領陳𤣥之女羅州大首領楊歴之妻驃騎大將軍兼左驍騎大將軍虢國公思最之母也陳氏家富甲兵世奠嶠外夫人誕靈豪右淑問幽閒六行天至不因師氏之學四德生知無待公宫之教原夫陳本媯水楊承赤泉九貞為郡良吏集作史出守集作乎中國五馬浮江僑人占守集作呼南海兩州接縣集作畛二門齊望卜妻鳴鳳擇對乘龍楊翁集作公有聘玊之祥應姬獲探金之慶虢翁弱冠昇士鞠躬禁闈正性本乎胎教剛膓形乎義色神龍三年七集作六月五日北軍難作西華大集作失守騎入宫壼兵纒御樓公孤劍凌鋒羣凶奪氣倉卒之際安危是屬既立殊常之勲遂蒙超次之命受銀青光禄大夫上集作無上字柱國𢎞農縣公行内常侍其後改拜將軍太夫人是加爵邑堂髙九仞禄重萬鍾朝廷美其揚名州黨尊其逺聴夫人富而好儉貴而能勤身却錦綉手親紡績公每昏定晨省夫人必誡之忠孝勤學文武常謂汝口稱思朂當心念其義父母名之欲汝三思而朂勵也故虢公便習干戈漁獵書史致命伐罪擒叛獠於百越冩誠誓衆破狂蠻於五溪鬬子弟如使手足請風雷若應期契聖朝答高秩於驃騎酬大封於虢略豈非以辭弟之懇忠誠斷織之明訓臣節立矣君恩厚矣子孝成矣母慈著矣備此四者善孰加焉抑神道祐心而人倫興行詩曰母氏聖善又曰宜爾子孫斯實頴川太君之有也享年若干開元九年四月八日薨于長安之翊善里先公早世邱墳故域古無合葬有禮一有其文二字從宜夫以體歸下地萬里豈殊乎黄壤魂何不之雙棺幸同乎𤣥宅集作室以其年十一月十六日招魂附葬于萬夀縣龍首鄉神鹿里申孝子不忍隔親之情也恩勅賜錢十萬緡布皆百段日磾忠厚漢武知其母教馮勤寵貴世祖稱其母德克軫天情頗為連類虢公生盡其禮没盡其哀嗟閱水之日逝懼藏山之夜徙追鏤碑版逺貽圖傳烝烝至意有足感人悾悾信言故無愧色銘曰陳公舜後楊侯周裔去國何人南遷幾世􅀈渌嶂表朱岸海際兩族相高材集作財雄兵銳猗歟邦媛儷兹國士友善集作若琴瑟華如桃李心契法度容和愠喜資敬從夫移忠訓子嘉此令子南滇北歸于天鶴唳㧞集作支湔鴻飛朱宫退散銅柱來威國家安寵魚軒翟衣子封虢略集作國五宫前宇母邑頴川三君舊土感激榮慶踟蹰今古高堂夜空弔客朝聚龍首山前前臨㶚川招魂五嶺合葬三泉山山邱暮樹樹風烟孝碑不滅兹墳永傳汾陽王妻霍國夫人王氏神道碑楊綰鵲巢配德合好之義深象服建封寵光之至極况動循法度躬事蘋蘩揭四德而表儀髙門秉一心而輔佐君子則有夫人王氏有唐元輔汾陽王之伉儷本其盛族著於太原髙祖長諧皇左武衛大將軍秦州都督平原郡公贈荆州大都督陪葬獻陵曽祖德𤣥銀青光禄大夫唐州刺史祖士㑹河南府陸渾縣令父守一寧王府掾贈兖州大都督或勲閥可稱或理行尤異積仁儲慶奕葉聨華夫人即兖州府君之長女敏悟生知孝慈天性誕含柔範光起韶儀親執組紃備詳圖史女宗之美燦然有光年既及笄禮從納幣言告師氏歸于汾陽汾陽時寵禄未崇盛業猶晦夫人從節儉之行服澣濯之衣祗事舅姑恪恭朝夕視庖主饋未嘗假人下氣怡聲率由至性生既極其養歿又過乎戚慎徽衆善敦敘六宗睦娣姒以仁接中表以義由是閨門以穆婦道有聞天寳中汾陽分鎮河中䇿勲王府夫人從夫之義封瑯琊縣君尋又進封太原郡君其後冦盜横厲風雲𤣥感汾陽乃首啟戎行宣力王室出則統一師旅入則燮賛台階元勲既崇殊賞斯至内訓之功其子或位列通侯或室嬪公主姻連右戚榮冠中朝門通河漢之津地成冠蓋之里每令節嘉賞長筵高㑹青紫照庭環珮盈室燻灼人代莫之與京然約已尚柔從夫體順服仁不倦率禮無為揔是具美允應多福亦嘗排鳳闕謁龍顔及承制曰汾陽郡王妻太原郡君王氏婉娩淑德齋荘令容稟訓母師友于琴瑟作賔君子宜爾家室克著艱難之勲實由輔助之力可封霍國夫人初汾陽受命東征長驅河朔夫人處於西土三徙其居導諸子以義方規衆女以典則用能聿尊禮度伊加等之顧問奉殊常之寵錫容止合度威儀可觀帝嘉其賢尤所稱重宜其阜昌盛業蕃衍華緒荷恩渥於上天保榮耀於當代而夫人藴高世之度抱出塵之節以為致盈必損理有固然誓棄浮華願歸正覺於是損其服玩斥其愛染思契理於勝因將息心於了義乃捨京城西别業奏置法雄寺又於法雲寺冩藏經修塔院置經行之室立禪誦之堂景福所憑斯焉茫昧遐齡未及奄爾薨殂享年七十三以大歴十二年正月辛未終於平康里之私第皇慈興歎中使臨弔汾陽以暌偕老之期深遺掛之恨撫襟長慟悼亡何及即以其年六月二日卜葬於萬年縣鳳棲之原恩詔贈􅉠率加常典哀榮之盛今昔罕儔有子六人長曰銀青光禄大夫太子詹事上柱國太原郡開國公曜次曰開府儀同三司行左散騎常侍趙國公瞻次曰開府儀同三司行尚書吏部司封郎中上柱國樂平郡開國公晤次曰銀青光禄大夫守殿中監駙馬都尉曖次曰銀青光禄大夫守殿中少監曙幼曰朝散大夫守秘書省著作佐郎映有女八人長女適成都縣令盧讓金次女適鄂州觀察使吳仲孺次女適衛尉卿張浚次女適殿中少監李洞清次女適司門郎中鄭渾次女適邠州别駕張邕次適和州刺史趙縱幼女適太常寺丞王宰並衘恤在疚是宗窀穸帝女降天人之貴從主婦之儀手制衣衾親臨祖載自宫徂野徒行號擗此又盛德所感明靈永慰者也汾陽屬當出鎮瞻望不及思刻金石以紀徽猷綰顧無讃美之能虚承敘德之命式揚茂實以副永懐銘曰赫赫崇勲鬱為元臣峩峩淑德奄有方國夫貴妻尊恩深寵極聿脩閫政以懋嬪則妥自中年嘉聲克宣魚軒昭曜翟一作狄同茀嬋娟嬪從如雲歌鐘沸天永言浮世載悟貞筌𤣥夜何速青鳥斯卜惻蒼笳簫蒼茫陵谷惟貞石之不朽庶斯言之可復故義武軍節度度支營田易定等州觀察處置等使檢校司空同中書門下平章事贈太傅上谷郡王張公夫人鄧國夫人谷氏神道碑權德輿皇帝以文明御方夏以德禮序人倫貞元十二年秋九月詔侍臣德輿以故義武節度檢校司空同中書門下平章事贈太傅上谷郡王張孝忠夫人谷氏之淑行内則俾刻金石臣聞風有采蘋采蘩易曰中饋貞潔所以表柔明於内子昭節信於元侯宣力獻功抑有其助夫人之先魏都樂昌縣人也在漢元成之代衛司馬吉以勲勞致命於絶域大司農永以文學盡規於本朝前史書之以勵臣節四代祖那律皇朝諫議大夫𢎞文館學士正直之道播于清時曽祖輔衮左羽林軍長史祖倚相秘書省正字仍代藏器晦而不耀考崇義天寶末有行師北鄙之勞累書勲伐至左金吾衛大將軍兼殿中監贈特進夫人即特進府君之第八女也稟是門風鍾于女士淑閒之度中外宜之初太傅始自軍校建功河朔克彰婦順敬賛宗事正位于内尚柔有儀洎太傅自易部領常山遂分節旄以至公相上略兼資于明智中壼載揚其惠和二姓有輝六姻是憲盡䄖翟之飾動珩璜之聲建中元年封魏郡夫人三年進封鄧國夫人旌淑哲也鵲巢之均一家人之悔勵籩豆敬齋之色琴瑟靜好之儀夫人備有焉帷堂晝哭良兮繼志上慈下厚就養無方此又令嗣之能致其敬也貞元十一年冬以門承勲績之崇恩有選尚之貴方築外館聿來上京十二年二月丁夘以疾終于萬年縣安仁里私第年四十九遺章上陳敬而得禮皇情憫惻恩贈集作賻有加嗣子茂昭義武軍節度易定等州觀察處置等使趙復左金吾衛上將軍檢校工部尚書定州刺史兼御史大夫延徳郡王博陵上谷之師以續休緒戎車委重優詔抑情次曰茂𢎞雅王府司馬茂宣舒王府長史嗣雍杞王府諮義㕘軍嗣慶試将作少監兼御史丞幼曰茂宗銀青光禄大夫行光禄少卿員外置同正員駙馬都尉皆以純孝裕蠱居䘮執禮以其年冬十月甲戍奉夫人之輤車葬于京師少陵原不祔舊封式遵古道恩延戚里有命從之初夫人之兄從政實傳戎韜之訓以中執法剖符定州有妹四人所天皆貴異姓之社從夫以尊公宫之教率性而中象服交映魚軒並馳其後婚親一作姻無非勲德故太尉中書令西平王今太尉中書令瑯琊王夫人之姻也納徵佐餕焜耀于一時此又閨門之盛而積善有類也柔正之風本於王化愷悌之澤洽于幽泉此臣之所以拜受德音銘諸樂石也銘曰在漢子雲偘然中正昌言獻可逺緒傳慶降及特進䇿勲斯盛乃生夫人如玉之温婉彼淑質宜乎盛門金絃石窌所從益尊亦既晝哭道彰訓育中權之貴克繼藩服下嫁之榮方承湯沐生也有涯夀胡不遐奄然冥寞䘮此柔嘉遽還黄壤空悲白華秦原隠嶙丹旐徐引此焉幽宅自昔同盡追琢徽音終古不冺文苑英華巻九百三十四
