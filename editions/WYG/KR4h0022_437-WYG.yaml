body:
  text: 文苑英華巻四百三十七宋李昉等編徳音四招撫徳音長慶元年徳音詔令作討鎮州王庭湊徳音元稹門下朕嘗讀𤣥元書至於佳兵者是樂殺人因念自孩名之逮于羈丱不三十年不能為成人豈忍以一朝之忿驅而殺之然而田𢎞正首以六州之衆歸於朝廷開先帝之雄圖變河朔之舊俗除去苛暴昭宣惠和愛人如身養士如子拊循教訓必以忠孝為先是以魏之師徒一年而知恩二年而知禮三年而相與讓於道矣故南征淮蔡東伐青齊北定趙地元勲茂績皆自魏師肆我憲宗付之心膂入則輔弼出則藩宣推誠不疑近實無比顧朕小子獲受丕圖嗣守不遑何暇恢復而承元請覲冀部擇才苟非勲賢不敢輕授是用咨我元老臨於是邦而又寵諸將以懋官加三軍以厚賜集作賞復其租入惠彼烝黎於此一方之人可謂無有不至而鴞音未革狼顧猶存忍害忠良恣為殘賊臨軒震悼撫几驚嗟天乎不仁一至於此朕下為君父上奉祖宗毁舟楫於鯨鯢䧟股肱於蛇豕尚欲因循忍耻僶俛偷安非惟傷心於田氏之子孫亦將何顔謁先帝之陵廟人神共憤卿士協謀咸願誅夷用申寃痛便合興師進討以剪奸兇尚念一軍之中豈無義勇倉卒變動必非衆謀苟得其魁餘復何罪集作苟得罪人其餘何過宜令魏博横海昭義河東義武等軍各出全軍以臨界首仍各飛書檄具諭朝㫖如王庭湊能執首謀為亂扇動三軍者送赴隣道或就鎮州處置然後束身歸朝必當升一作超奬授三品正員官並與實封二一作五百户其餘三軍將士一切不問其中大將等或有能相喻勸翻然改圖者各隨事跡便當集當作加寵擢如王庭湊仍遂迷不寤諸道宜便進軍以時剪滅苟不得已至於用師其有效忠則宜懸賞如有能梟斬兇渠者先是六品以下官宜與三品正員先是五品以上官節級升進仍與實封三百户庄宅各一區錢二萬貫以一州歸順者便與當州刺史仍賜實封二百户如先是本州刺史以一州歸順者升集作超三資與官仍賜實封三百户以一縣歸順者升一作超兩資與官仍賜實封一百户如有能率所管兵馬及一作并以城來降者並升一作超三資與官仍賜實封一百户賜錢一萬貫以身降者亦與轉改仍賜錢帛應付行營將士如有能梟斬兇渠者亦准前例處分其有城鎮將士百姓等守節拒賊身死王事者各委長吏優給其家仍具事跡聞奏當加褒贈其有潛謀誅斬渠魁被其屠戮者宜一作便便加追贈并賜錢帛仍與一子官諸軍所至不得妄加殺戮及焚燒廬舍掠奪資産并有拘執以為俘馘其管内州縣有能自置義營堡柵王師所至能相率來歸各加酧奬時當秋候務切農功近界之人懼廢耕織應縁軍務所湏並不得干擾百姓如要車牛夫役及工匠之類並宜和僱湏各情願仍優給價錢賊平之後應立功將士並與升資改官節級賜物其長行官健歸降者亦當優厚褒賞幽陵變擾誠為亂常以其旁及詔令作害賔寮有異上品台鉉較其輕重示以招擕尚開迷復之門用廣自新之路如聞賊中文牒妄作異端皆云一作指朝廷徴兵欲戍邉塞此皆狂詐扇動人心况今邉上甲兵足以備禦欲令悉知一作委故重宣明仍委所在即時一作節將以此告諭昔者堯舜之俗比屋可封虞芮之人讓畔可感仁義則水火可蹈忠信則蠻貊可行由是言之亦在化之而已逮我理長何其逺哉豈朕之滿假荒寜自聖而不可教耶將朝之魁梧骨鯁自持而莫我念耶二者之來皆朕不敏内省終夕其心浩一作歉然於戲封域之中干戈作矣廊廟罇爼無忘弭寜布告朕懐以湏良畫主者施行八月十四日長慶三年徳音一作破汴州李㝏勅編制勅理天下者務安於一作於安逺邇致康濟者資懐於一作於懐兆人朕統馭萬邦式敷王度任藩方以俾乂冀干戈之載戢䖍恭惕勵一作厲未始暫忘推予是心布及中外昨者夷門逆將遽遂興師一作夷門逐帥遂將興師蒼皇變生士庶無告逆賊李㝏驅掠忍害流離毒痛在浚之郊若鼎將爨逼脅我軍士盜竊我戈鋌驅馳外坰敢肆蜂蠆朕所以丕降明命未即誅夷一作未行天誅容其革心以俟迷復盖以一方軫念三面開羅將𢎞愛物之私用表好生之施而鴞音恣醜狼顧憑兇危巢已焚禽息猶若光顔韓充曹華智興等感激忠勇揮戈誓師雷奮鼔旗所向風靡逆黨殱殄郊原霧清熊羆之師漸及摩壘夫疾風斯來而勁草方辨熾火將燎而良金益明果聞義烈之臣奮起轅門之内一揮斬首三令無喧嚴城洞開以候來師永言忠效是賜寵章其梟斬逆賊李㝏宣武軍都知兵馬使李質已從别勅處分忠武兖海汝寜鄭滑等軍將士等感主帥之忠誠忘身赴敵視冦仇而忿嫉决命争登高承簡以睢陽一郡之師當蛇豕奔衝之勢咸能勦其醜類如刈草菅各振軍聲用宣武畧其忠武兖海汝寜鄭滑應赴行營及宋州將士等並節級各有賞物已别處分支遣一作給委本軍據功勞額例給散歸還之時仍加宴勞朕念彼無辜墜兹塗炭横為凶險驅脅傷夷其汴州管内州縣官吏軍鎮將健及諸色職掌人等皆罹脅汙自㧞無由撫事量情亦可矜恕除同惡巨蠧者其餘一切不問仍加牓示如或妄有恐嚇言告者科其反坐之罪干戈暫興里閭必害眷言農畝是廢耕桑其汴宋鄭三州罹此兇逆士馬屯集供給一作繫併繁雖事乃旬一作狥時而人亦勞止予懐軫念豈忘憂矜其三州府一作界内有兵馬所到縣百姓或被驚擾處宜於今年秋税内三分量放免一分仍委州縣長吏切加綏撫其賊中雜差㸃子弟夫役並宜放還郷里俾安生業其中有不能自存者量事優恤應百姓中有被分外無名賦歛者並當時勒停義士忠臣見於死節賞功褒美冀及傷魂惠恤其孤庶明報効官軍有陣亡將士等并李㝏為亂已來有潛謀孝順誠節可嘉并因此遇害者並委本道一作軍審勘具名銜事跡申奏當與甄奬及加褒贈仍令本軍優賞一作給其家三年不停衣糧并委所在州縣速於收葬量事致祭其將士有因戰陣傷損尤甚以至一作致殘廢者各委本軍加厚優恤仍勿停解掩骼埋胔國之令典逼於兇醜誠可傷嗟念其本亦吾人盖亦事非獲已經戰陣處所有賊中遺骸並委所在州縣隨時收瘞勿令暴露於戲弔伐之道予遵格言靖冦安人豈忘終日朕載􅐤弓矢思保黎元而雨露所均動植所繫一夫竊歎朕每興懐况兹浚郊都邑之㑹所以慎擇將帥期於乂安今冦孽已清封壤寜息師之所處用軫予𠂻將申宥恤之恩庶息瘡痍之後布告中外咸使聞知八月二十五日一作皆唐大詔令叙用勲舊武臣徳音勅朕聞昭徳示威先王所以用武禁暴夷難後代安能去兵故文徳誕敷武備宣耀外以環禦四海内以底靖中原則軍旅之制有經師律之能必表朕纂承鴻業䖍奉丕圖宵分永懐何以康濟豈獨鼓鼙有感方思將帥之臣征伐為心乃寵干戈之士况文武並用古之格言勲舊不酬勞者何勸惟我高祖太宗以晉陽之旅平一海内肅宗以靈武之衆收復二京代宗有郟郊元從之臣徳宗有奉天戡難之士每念勲伐無忘寢懐如聞近日武班之中淹滯頗久雖負才畧無由足一作是又作自明又有諸道薦送大將或隨節度歸朝自今已後宜令神策大將軍軍使及南衙常叅武官各具由歴授官年月前後功績一作勲牒送中書門下若勲伐素高人才特異者候有相當用處即具聞奏量加奬擢其常叅武官資考深久未得遷轉者准具員年月與改轉不得令有滯淹其先授文官者亦宜凖此使幕賔僚皆有年限一作代改轉軍府一作將大將豈可獨不序遷自今已後諸道節度都團練經畧等使下各隨本處是大將名目已曽授監察已上官者並限三周年量與改轉如有功效合非時與改轉者不在此限其職名是兵馬使都虞候押衙已上前後並未曾奏官者亦仰量績効奏官轅門委質營壘分師有役干戈無由耕稼一作稼穡况自天寶已後屯兵七十餘年皆成父子之軍不習農桑之業一朝罷歸壠畆頓絶衣糧言念饑寒深用嗟憫應天下節度都團練防禦經畧等軍所置軍數各委本道據守舊額以度一作為定數不得輙有减省其有逃亡病死及過犯解退當時揀擇有武力藝能者添補奮於行陣决命殞一作損軀不顧危亡每嘉忠烈官健有死王事者三周年不得停本分衣糧如有父兄子弟試其武藝堪在軍中承名請衣糧者先湏收補孝本安親深惟一作惟深養老敷恩惠以慰耆年應軍將及官健有父母年及九十以上委本道本州每至節嵗量與酒麵優養守塞備邉固不可廢烟塵既静亭障無虞諸道舊有防秋兵馬已在邉上者自依年限替代近者師旅屯集饋餉頗多不免於諸道留州留使錢内每貫量留三百文以充國用幽鎮既已洗雪供費亦漸有常其河北諸道及山一作河東兖鄆淄青汴宋陳許徐泗澤潞河陽鄭滑等道并邉上諸鎮並不用抽一作尊刁斗晨嚴烽烟夜謹勤勞沙塞寒苦邉陲其沿邉鎮戍䧏子等並委所管節度及城鎮使量與優賞仍與交畨上交使其勞逸得均使命往來本於傳達軍期𦂳急遂至繁多非惟郵傳不供抑亦號令難一自今已後應縁山東行營兵馬未歸本道已來進退事機並宜轉委節度使仍仰條疏舊弊一一奏聞除事闗廹切湏遣專使外其餘書詔文牒一切分付度支入遞發遣制使中使到諸道行營不得輙受人事錢帛及行非理鞭扑當加訪察義不優容𣙜筦之設誠為救弊隨方適變所貴便人其河南河北鹽法宜委鹽鐵使與節度使審度㑹計商量務以便人為法閱習土宜則通吏理既因試效可驗政能應河北諸道宜委觀察使訪察管内見攝官中如有實一作或字清强有才能課績者具前後所攝年月并事跡聞奏當與正一作改授從政之方必原風俗視人相土乃合所宜弛張在達於無私法令所期於不擾一作撓應河北諸道并鄆兗青等州道應有新舊科條有不便於人不宜於俗者委宣慰使與所在長吏商量廢置務從人欲於戲朕戴天子人操執重器不以四海之富而恃其力每以百姓為念而兢于心慮文教之未敷思武畧之多闕所以輟食當宁求衣未明揣摩萬幾寜止三省頃以馭一作御宇之嵗藩方乂安委于廟謀以輯軍政而有司不達苟以惜費為心致滋停減之名無裨毫釐之用使軍中老㓜愁歎無歸朕博聽羣言用革前弊舉其指一作㫖要冀協羣一作人情庶乎侯伯列城與我師旅勵精撫士用副憂勤中外布宣明知朕意長慶三年三月十日一作皆唐大詔令長慶三年徳音一作赦鎮州徳音門下仲尼有言詩云執轡如組審此言可以為天下也盖為聖人組脩其身而成文於彼故伯益贊禹則曰滿招損謙受益所以服有苖夏后啟亦云吾徳未至教未善故能克有扈苟齊俗有禮化人以躬尚可感於神明柔於蠻貊况累聖遺教昇平舊風堅金在鎔惟人之所鑄猛獸在柙由人之所馴因而撫之敢忘前訓朕以菲徳纂承鴻緒屬先皇掃刷中㝢康濟兆人八表晏然五兵咸息常兢懐於繼述思致理於和平豈以樂戰為心佳兵在念而鎮州以承宗云亡自歸誠欵幽州以劉總懇志願釋兵符相繼來同無思不服非朕勤於逺畧力以致之亦既綏柔咸加霈澤不愛金帛以惠我戎士不恡爵賞以寵其偏禆復以一二台臣常推謹厚一作愿庶將朕志以靖方隅而佚於既安莫能思患曾未累月旋聞叛離朕亦欲因其人心命將興師顧念𢎞正盡忠先朝身嬰陷一作伐害受於一作家受屠戮為之元首能不痛心是用下制先申告諭求其兇惡冀釋幽寃仍令四面節制各守封境不欲遽加誅討所望自效忠誠而將士等懼罪以相保王庭湊為衆所逼固其封壤捍以兵鋒每聞戰爭永念黎庶為之君父乂何忍乎是用輟食忘寢晝夜萬慮恭惟烈祖之訓必用兼愛之心務以安人為國本不以窮武為威力顧予寡昧敢忘遵承為追念而一作以興師已極君臣之分為一作以軫憂而捨罪豈非帝王之道况王庭湊倉卒之際固一作本非始謀接之以恩榮自當展其志義委之以戎鎮必冀效於勲庸禍福無門行之則是弛張在我用亦何常苟推信誠便保忠順苟得其衆孰非吾人擢而任一作用之式示光一作榮寵宜特原雪仍授檢校右散騎常侍兼鎮州大都督府長史御史大夫充成徳軍節度鎮冀深趙等州觀察處置等使應成徳軍將士官爵一作吏一切依舊待之如初仍令兵部侍郎韓愈充宣慰使於戲朕於彼三軍惠非不至於彼闔境恩非不周今𢎞寛大之典以應陽和之令使離散者見親愛之樂暴露者歸室家之安各宜感悦以就寜㤗布告中外體朕意焉主者施行一作皆唐大詔令朝元御正殿徳音勅朕以寡昧獲守重器兢勵一作厲畏惕于兹五年皇王之事罔不脩備而大典有闕舉而補一作行之粤以元正朝一作御于正殿百辟咸序萬方來庭思欲推至仁以布和奉天時以一作而施令况上𤣥貽慶列聖垂休輔于予躬以致寜復思與臣庶同被慶靈俾兹囚𨽻亦洽流澤自今年正月一日已前犯死罪者並降從流流罪以下遞减一等其故殺官典犯贓犯十惡者並不在降等之列左降官未曾經量移者與量移近處流人各據本年限與减一年如本限止一年者放還朝賀之禮國之盛事肅恭班位敷贊威儀俾申慶典以示𢎞普其應元日縁朝賀行事官三品以上賜爵一級四品以下加一階文武常叅官并六品以下及宗子應陪臣者并諸道賀正使各賜勲一轉先已至上柱國者任廻與周親諸藩陪位賜物有差今兵革甫寜典常未一作粗舉雖慙至理可謂小康唯水旱猶虞黎元一作烝黎重困公私蓄積頗有未豐宜令諸道觀察使刺史各具當處利害其有弊事可革有便一作益於人者并言何術可以漸致富庶附驛以聞亦不用專使詣闕以為煩費其封畿之内百姓利病令一作委京兆河南尹具以條奏於戲束帶立朝必咨忠讜濟時利物式佇謨猷其文武百寮各上封事極言得失無有所隠如有事可施行者便委中書門下量加奬用朕以執契馭時任賢興化孜孜王道期致太和凡在官寮宜悉此意長慶四年正月一日一作皆唐大詔令文苑英華巻四百三十七
