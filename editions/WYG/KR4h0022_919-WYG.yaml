body:
  text: 文苑英華卷九百二十宋李昉等編職官二十八刺史二後周青州刺史齊貞公宇文彪碑一首唐贈荆州刺史成知禮碑一首唐維州刺史安附國碑一首唐河州刺史冉寔碑一首後周青州刺史齊貞公宇文公神道碑楊烱惟黄帝大電之精以太清而張樂惟高辛招摇之象以人事而紀官於是乎生我司徒敬敷五教翼贊虞帝而咸熙庶績惟殷湯受天明命以統九有之師惟微子崇徳象賢以為萬邦之式於是乎生我丞相約法三章光輔漢室而威加四海大齊宣皇帝商周之日號西伯以稱臣太祖高皇帝堯舜之朝避南河而革故司空臨川獻王懿親明徳論道經邦中庶子平樂侯開國承家丹書白馬於是乎生我齊貞公惟魏之寳惟周之幹開上帝而格天地集作皇天變隂陽而平水土詳求典載歴選台衡或大澤而康帝圖或高丘而濟王業諸侯五百伊尹出於庖厨甲士三千太公起於屠釣未有上從軒后下及今集作全齊聖主明君三居域中之大帝師王佐累極人臣之重古所謂歿而不朽者抑斯之謂與集作乎公諱彪字明俊蘭陵人也即宣帝之𤣥孫高帝集作皇之曽孫臨川王之孫平樂集作陵非侯之子禀神河岳藉慶王侯攀兩曜之末光乘集作得五行之秀氣温厚亷集作恭厚讓當時以為達人宣慈惠和天下謂之才子屬三方鼎立九土星分禄去公朝失諸侯之盟㑹政由梁國建天子之旌旗士女同歎於商墟鬼神共謀於曹社公杜門屏跡心不自安與門生故吏數百人歸於後魏宣武皇帝以客禮待之詔除給事中假龍驤將軍正光五年兼彭城府長史假節則將軍比於王濬長史兼於杜襲龍驤可畏晉后任之於集作以渡江騏驥不集作所非乘魏氏集作皇託之於集作以留府六年除通直郎散騎常侍中書侍郎永安三年帝北巡遷撫軍將軍銀青光禄大夫散騎常侍散騎通直起於天興之元中書侍郎始自黃初一作延和非之代宣王撫軍之號僕射光禄之名竒才惣於文武重任歸於將相徐方叛逆以公為行軍長史兼統别部仍加皷節彭城宋邑海岳徐州嶧陽孤桐羽畎夏翟昔稱都㑹今實邊陲魯伯禽始得專征周穆王遂行天討公手執旗皷坐謀集作入侍帷幄以陶偘部分之明當阮孚戎旅之重有如荀美獨負逸羣之才不學江逌空有連雞之稱集作喻徐州平遷黃門侍郎揚州大中正黄扉藹藹集作赫青𤨏沉沉有若張公之萬户千門博觀圖籍太湖為浸㑹稽為山若有荀朂之十郡一州詮藻人物累遷大司農秦稱內史漢曰司農管夷吾陳不涸之名耿夀昌立常平之議時播百穀后稷讓於虞集作唐書阜成兆民集作人列卿拜於周典普泰元年遷車騎將軍加右光禄大夫永熙二年出為潁川太守人集作地稱汝潁俗尚申韓有鄭伯集作國之别都有周公之朝邑教之徳化無囚歴於八年集作三年任於集作以賢能旁潤踰集作餘於九里于時齊武王居中作相實有遷鼎之謀周太祖在外持兵深懐事君之道昭公失位由季氏之執權襄王出居成晉文之霸業三年秋八月武帝幸長安以義兵從順大統元年授開府儀同三司封靈縣開國子邑三百户金堤石印清濟濁河爰賜土田以為藩屏漢之宰相始開封邑周之列辟集作侯實兼卿士二年拜車騎大將軍九年遷五兵尚書十年遷中書監領驃騎大將軍加開府儀同三司進爵為公増邑一千户天子有詔不入軍門匈奴未㓕不營私第蔡謨兼五兵之署集作省鄧隲比三台之儀掌中書之綸翰加上公之冕服十六年遷侍中驃騎大將軍以下並如故昔惟常伯今則侍中切問近對拾遺補闕冕旒無象先問顧和玉佩集作佩玉不存即徴王燦廢帝後二年公不賀出為使持節華州刺史侍中並如故桃集作成林國邑太荔城隍三秦六輔之奥區五岳四瀆之襟帶倪寛之為內史唯事溉田薛宣之守馮翊但知拱黙集作埀拱尋加特進餘如故官品第一朝廷集作當朝所敬辟吏如五府之間班列在三公之後唐虞之繼文徳也稷契謨明於兩朝魏晉之順大名也裴王建功於二代周武成三年進封青州齊郡公邑二千户賜號東岳先生詔曰堯有四岳朕惟公一人賜雜彩二千段甲第一區雍州良田百頃其優禮如此堯命羲仲星鳥嵎夷之官周賜姜牙穆陵無棣之境三王不襲同盟固於泰山百代相因舊國傳於負海惟保定四年公薨於長安私第天子罷朝羣臣赴吊喪用官給嗚呼哀哉五年贈少保使持節揚光桂三州諸軍事揚軍事揚州刺史諡曰貞公禮也公少丁外艱州黨稱其孝齊武皇帝見而歎曰可謂吾家曾閔外祖太尉公王儉謂其子侍中騫曰成汝宅相者在此孫乎公之北歸也後魏宣武帝勑曰昔微子去殷項伯歸漢卿又得之於今公泣涕橫流跪而對曰臣家國不造鼎祚淪亡進不能匡正退不能死節今復集作故託身有道何敢比徳古人帝因此重之及周太祖作相西朝王侯之下皆望塵而拜公與之抗禮太祖尤相敬待屢有諮詢集作問嘗從容曰國家之子房也公體淳和之至性負廊廟之大才孝通神明忠定社稷馬伏波來遊二帝晏平仲能事百君在魏則賈詡茍攸在周則太顛閎夭惟司徒克慎厥始惟丞相克和厥中惟公載徳克成厥終三后同其政道子孫訓其成式輝光助於日月徳積廣於宇宙以某年月日葬於少陵原國遷三代年移十紀杜當陽之碑石沉漢水而無聞仲山甫之鼎銘入匈奴而不出曽孫皇朝右金吾將軍同州刺史得照宏才大節玉振金聲入當天子之右軍出臨帝京之左輔承積善之餘慶襲大宗之不遷願述家風思傳祖徳是用勒銘刻石一作勒刋豐石相質披文載於景鐘大夫稱伐之義書於太常諸侯計功之道追題瓦屑鄭康成北海之門重刻碑隂張平子南陽之墓其詞曰黃帝攝政勤勞耳目舉于版泉集作居于軒轅戰于涿鹿咸陽黜夏登壇受福表正萬邦纘禹舊服其一逮乎微子周之國賔降及蕭叔宋之懿親高祖丞相王迹是因宣皇御史社稷之臣其二太隂所立皇齊誕聖既創元基仍集大命謀孫翼子重熙累盛天禄永終南風不競其三惟公載誕克嗣家聲千丈多節三年一嗚待時而動以族而行才歸晉國璧入秦庭其四符堅拜首降天之使陶豫策名勤王之事任隆起草榮高近侍赫奕禁門雍容貂珥其五日暮青𤨏夕郎之職法駕畢陳黃門次直帝王之盛成集作咸在農殖如京如坻我黍我稷其六呉王舊國採山鑄錢公為中正佩以韋絃夏禹遺跡今來潁川公為太守示以蒲鞭其七齊稱東帝周稱西伯諸侯謀王天子下席公子忠義如彼松栢其八發自新邑歸于陸海魏徳雖衰天命未改功成晉鄭為而不宰寵茂山河於是乎在其九亞夫真將去病元勲持兵對揖絶漠行軍尚書武庫抑有前聞待中重席曾何足云其十當途遜位有周經野三集作二是國唐虞集作衢非兩朝裴賈出守馮翊人無訟者受封于齊實匡天下其十一晨占赤烏集作鳥夜辨黃熊曽參易簀期於令終子囊城郢沒有遺忠明君集作主輟祭羣臣㑹同其十二黃屋左纛輕車介士朝發桐鄉暮歸蒿里積善餘慶由來尚矣公侯集作之子孫必復其始其十三唐贈荆州刺史成公神道碑前人成氏之先有周之後姬文受命三十八王郕伯象賢二十一代漢之少府國家維城晉之廣楊王室藩屏公諱知禮其先上谷人也子孫避地徙闕曽祖休寧後魏汾州刺史齊特進左右衛大將軍宇文朝江州刺史隋成陽郡公諡曰武勲格皇天澤充區域該備寵榮兼包命賜祖少遐北齊民曹郎中宇文朝地官上士襲城陽公建國之屬以訓五品以親百姓君父綽隋金紫光禄大夫唐深州刺史上柱國天子大夫金章紫綬天王使者皂蓋朱輪公誕保靈和受兹介福講之以學合之以和純粹以積其中文明以宣其外出於口者必是先王之言萌於心者莫非君子之徳戒慎乎其所不覩恐懼乎其所不聞豈時止時行左宮右徵在朝濟濟在家雍雍祗服𢎞業克丕堂構襲城陽公歴箕州平城洛州邯鄲二縣令武鄉里閈榆社隄封公宰平城日宣三徳悲歌相聚袨服成羣分宰邯鄲雷震百里儀刑嘉誨範乎人倫令問廣譽塞乎天壤將蹈九列平三階豈意一作郡生或作茂遂並非太和交薄而天道難諶降年不永春秋若干以某年月日終於某所夫人宜城縣主聖神皇帝之堂姊王姬外館之長女夫人道峻於閨房名輝於邦國我大周叙洪範作武成大賚而萬姓悦􅂷拱而天下理法號惟舊制贈荆州刺史生則唐堯不用沒則周武追封為龍為光有始有卒立名於後以顯其親反葬於周不忘其本以某年月日歸葬於碣石恒山燕南趙北禮儀光被宗族相臨大夫弔桓子之喪天子歸惠公之賵蘧瑗之葬不害良田孔子之塋不生荆棘長子司衞少卿兼檢校魏州刺史太辨中子左鷹揚將軍太方少子朝議大夫行司漢主簿太琬等門承四代徳盛三賢有終身之憂盡生人之本璽冊褒贈宜宣無窮景鍾勒銘若古有訓嗚呼哀哉其銘曰神岳之英大川之精如山之峻如流之清行之斯立言之斯成登車發耀在邦有聲傳於舊國舊國惟平宰于二縣二縣惟寧余聞舊説天鑒孔明誰謂靈誕喪落淑貞永錫不匱克揚其名冊書光寵沒有餘榮系曰列星􅂷象兮昞天光白露為霜兮沾人裳彼蒼天兮殱我良列星􅂷象兮昞天暉白露為霜兮沾人衣九原可作兮吾與歸唐維州刺史安侯神道碑李至逺夫招摇東指寰區識天下之春溟漲北臨川谷有朝宗之地况乎皇明發而萬物覩天衢亨而四隩宅故以驟險浮深同文協軌者也若乃壤隣驕子家號名王握葱野之瑰竒潄蒲源之粹液井蛙自許既累嗤於越子風鴻且遇仍嗣美於秺侯則大將軍安侯其人矣侯諱附國其先出自安息以國為姓有隋失馭中原無何突厥乘時籍雄沙漠侯祖烏喚為頡利吐發畨中官品稱為第二王庭雖跼方冠射鵰之勇帝鄉何逺空鬱衝牛之氣父朏汗望日月於中衢奮羽毛於邊服勢同鵲起功隨豹變貞觀初率所部五千餘人入朝詔置維州即以朏汗為刺史拜左武衞將軍累授左衞右監門衞二大將軍封定襄郡公寄等連城榮起合壘析圭胙土時議稱之侯運偶千年才標一日服太阿而善斷覽介石以知機有顧鶉籠實懐先覺迺心鳳扆奚歎後予於是㧞跡泥沙翻飛霄漢亦以貞觀四年與父俱詣闕下時年一十有八太宗見而異之即擢為左領軍府左郎將尋令與鴻臚丞趙徳楷諭旨於吐谷渾虜安鸋鴂之巢敢恃螳螂之斧旅拒成命逼迫行人遇困加威脅舉步逢艱阻侯以命有所繫靜以體之節不可失貞以守之雖弦矢屢移而鐵石無改既而加兵一盪凶氛四徹竟獲全歸僉以為蘇武鄭衆不獨高於前代矣壐書歎述遷本府中郎將賚布帛五百段又加秩為忠武將軍行本職十九年太宗揚鑾蹔撫清海俗於三韓駐蹕聊麾駭天聲於六漢侯公參末將績預深涓一作元戎詔論功授上柱國封騶虞縣開國男食邑三百户永徽元年拜右領軍將軍餘如故荷元天之廣運承湛露以晞陽蒲璧開南面之尊蘭錡盛北軍之寵門驅駟馬匣紐雙龜薄暮歸來輝光不獨於三子辨色而入前後方參於五侯疊蓋流軒徽枝岌嶪足以震輝都鄙謳謡氓庶尋丁定襄公憂執喪無替於少連讓爵自先於季札及其字人按部和風布政使幼艾不懐酋渠不驚非樹其長莫諳其俗以此高乎兼本官復拜為使持節維州諸軍事維州刺史朝咨良牧之能物喜吾君之子入䖍戎政縟共宿於星廬出變夷歌扇重暉於日域龍朔中隨府易名政疑作改為左戎衞將軍總章年進為右戎衞大將軍刺史勲封並如故日觀崇巖雲封峻霄三五之聲已邈八九之跡難追天子㓗壇場䟽圭璧報功崇徳騰茂實於石間侯亦勵熊羆從金皷前清後禦罄忠勤於玉帳咸亨初追討斯閥仍本封進爵為子加邑四百户方當降錫上罇行昇右地嘯洪崖而自狎揖浮丘以曾舉而殷相肇夢晉寢成妖古謝今形仙禽致是非之難寒凝暑退大椿屬摇落之期哀哉奄以調露二年二月十八日寢疾終於神都春秋八十有三永隆二年二月二十三日葬于雍州長安縣孝悌鄉之原禮也惟侯緒茂膏粱基循鼎胄絳河潜潤毎孕傾都之寳丹野成章必矯冠羣之翼弱便英邁長實𢎞逺劒連三術道䝉史一作吏是以前驅徳包五善揖楚臣於下席從吾所好方盡鋭於戈矛在物或遺故無資於筆硯加以動㑹規楷性非因習泣畫象於離宫真資孝敬感飛泉於異域雅蹈忠誠利以義通功以濟物故能夙攀閶闔函奉鈎鈐効心膂於中年享高明於暮景左右深率從之竒始終無纎芥之隙行師則訓兵以律受任則執禮無違非才優體二道恭感一惟微惟熙至公至平者疇能與於此哉悲夫琴心輟奏去高堂而不留筮氏觀龜創幽穸而期兆皷秋風於古樹誰識將軍思白日於荒隣空懐中散賔御膂兮寒野暮池館靜兮浮雲隂可作無時與歸何想長子故右玉鈐衞將軍北平縣公思祗一作斌藻身淑慎流聲奕葉繁滋遽委危露先飄次子魯州刺史思恭等趨表闕以擗心涉禮庭而收泗薦蘭之誠徒切集蓼之哀永萃思所以髣髴一作心訴形容揄揚清懿託問詞於廣陌播雄名於大隧迺為銘曰閬風透迥河氣靈長於昭化毓實延英芳稜飛玉塞勢軼沙場家承有土祚厯無疆分源何從揚飈南入一作急削祍荒庭殺凶大邑孝乎何取忠焉是襲花綬遥遥雲冠岌岌敷命河首逢覊海裔雲天變色鄉關無際虎噬徒交壯心益勵卒延裒謙豈嗟拘滯作固蘭陛仍分竹符盟申帶礪禮盛傳呼巖廊夕警祕宇晨趨還便後殿出必前驅本枝隱蔽宣條求瘼惠起人謡清惟主諾野乃聞勞門非藉惡是聽夏聲諳知戎落旋増厚秩亦追崇封逸豫斯扈一作邑車服以庸庭紛舞籥室韻歌鐘寧悲昃景遽落高峯梁木一作李應悲井田俄殞廣川去楫修途廢軫倐兮已喪蕭兮而盡神乎不測天乎何忍永背青臯既安𤣥夜泉臺構壤山門反駕野吹方噎榮輝不借徳雖隆於九原神豈奄於萬化唐河州刺史冉府君神道碑張説昔者堯舜既沒文武將墜天縱孔聖誕敷皇極於是乎恢六藝而正王道舉十哲而闡微言雍也為徳行之目求也為政事之首吾見乎龍翰鳳音集作雛百代而共貫虎符犀節重世而増華明徳之後知其必大公諱寔字茂實其先魯國鄒人也古天子有相氏宅于相土實曰冉姓蓋氏族之興舊矣不常厥所今為河南人焉五代祖雎陽公諱道周尚齊南康公主位平南將軍散騎常侍荆州刺史信州都督高祖諱軫仕梁太子左内率荆州刺史齊梁之間荆巫重鎮世善其職江漢宜之曽大父義城公諱黎在梁雲麾將軍湖州刺史入周拜驃騎開府儀同至隋開皇中為旭州刺史大父黃國莊公諱安昌隋啓平城祚之穀璧唐分蜀國瑞以桓珪其後改封於黄授信州刺史歴潭州惣管贈䕫州都督烈考天水郡果公諱仁才秩金紫光禄大夫婚皇室漢南縣主涇浦疑作蒲灃表江集有陵字永凡六州刺史偉矣哉承家善慶歴代名臣風流載於史官勲業藏於王府公即果公季子天王自出内禀胎教混成之姿外被門風式瞻之訓從容合度次造皆法生而知之孝悌也學而知之禮樂也徳義如山文章如泉縉紳之士仰焉宗焉弱冠太學生進士擢第遭家不造府君捐館五日絶漿三年泣血雖麻葛就禮而欒棘加人服闋調并州大都督府參軍事丁太夫人憂過哀終喪有如前制應八科舉策問高第授綿州司户參軍轉揚州大都督府倉曹參軍又舉四科敷言簡帝除益州導江縣令鴻漸二鎮翰飛三蜀府中之孫子荆郡内之岑公孝用能據淮距海我庾如坻岷山導江入境先歎加朝散大夫除鄜州長史仍加關內道支度使去青城之洞府來白帝之鄜祠命服有輝使車何重除􅄔州司馬入謝于武成殿主上以邊庭有事喜問陳湯宣室清言思逢賈誼公集作召上對醖籍謀慮深長眷甚前席恩加後命因改恒州長史于時四鎮未復三集作二蕃猶梗屯田遶塞戎馬生郊代郡藏符臨冀北而誠重漢家張掖比西河而還輕乃徙拜凉州都督府長史仍知赤水軍兵馬河西諸軍支度使地壯伏龍城雄飛鳥位居半刺史惣全邊公仍利溝洫懋藨蓘庤茭藁積糗糧均轉輸程力役寛御悦使授方任能人胥忘其久勞兵不逺其長戍集作道雖金方氣候集作映風雨集作雨雪不交之地磧路沙霾草木不植之所莫不豐滯穗於坰牧厭甘瓜於戍時朝廷頼之遷使持節河州諸軍事河州刺史仍知營田使崆峒連五郡之壤積石控九河之源公夙奉皇華政聞行路集作露高車未至闔境相歡既見君子温其如玉率性仁愛由衷易簡推是心也物感斯應覩肅恭而無競見禮義而興行不言而庶事熙非教而羣下順故得大田多稼人知歳豐餉軍廪師處勤餘裕計偕入朝侍宴於長夀殿上謂公曰河州軍鎮要衝屯田最多卿以足食為心朕無西顧之憂矣侑以綵幣錫以文袍集作衮及公還州也壐書勞勉王人相繼國家經集作徑流沙梁弱水收西域䕶南庭連百里之兵以濟事於外不一日而乏者則公之力也無駭入極可謂費㾉父勝之杜預平呉蓋知羊叔子功爾冝登元老作貳大朝止于邊服實孤人望享年七十有一證聖元年二月十日寢疾終官舍天子悼焉凶費喪歸悉命官給是日河湟耆老山谷羌夷反首􅋇面號奔州邑雖國亡子産吏哭祭遵豈能集作云過也愷悌之化人之父母及其沒也哀亦如之信矣夫夫人金城郡君隴西李氏江夏王道宗之女也冝此象服爛其盈門嗣先姑之徽音立庶姬之範則蕣華前落藁瘞城隅以證聖二年正月合葬於河南之定鼎原禮也天使馬悲啓滕公之室人㸔鶴舞閉玉女集作王母之墳松栢接於邙山丘陵對於伊闕石麟將鬬華表何年有子曰祖雍景龍初擢給事中兼侍御史内供奉追惟皇考孝于奉親忠于事君恭於立身惠於臨人惣是四行旁通具美貽厥孫謀以燕翼子故老之口既絶竹帛之文又㓕揚名兮柰何刋石兮來裔詞曰倬哉冉氏世有仲弓鐵冠繡服給事於中克昭遺懿樹之家風於皇嚴孝高明有融徳罔不遵藝何不涉嗣武先正思文載叶建旟千里逮君六葉龜顧印房虵盤綬篋官以勤積業因時峻宰號神明掾稱親信驥足既展軒即集作亦軔邦國海康京師河潤出車西域我君謨集作謀之屯田北假我君穫之六軍有饋其誰度之一人無憂其誰樂之猛獸避徳均遷所涖靈鳥依仁霸昇執事以今視古名齊績類天不憖遺山頺此位隴首回望秦川斷腸吏人攀綍哀厲隨喪虚靈奠野行臨帷堂廟立邊郡魂歸故鄉王姬祔葬禮之終也水合蛟龍墳同石馬地積霜露烟攢松檟千載九原高碑淚下文苑英華巻九百二十
