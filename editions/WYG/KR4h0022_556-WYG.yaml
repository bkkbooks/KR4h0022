body:
  text: 文苑英華卷五百五十七宋李昉等編后妃賀冊皇太后表四首百僚賀册皇太后禮畢表二首鄭尚書賀册皇太后表一首賀冊皇太后及徳妃表一首中書門下請冊貴妃表一首太子賀𫝊位於皇太子表一首請冊皇太子表二首代宗讓皇太子表一首為楊州李長史立皇太子表一首賀冊皇太子表四首賀皇太子知軍國表牋二首后妃賀冊皇太后表常衮臣某言伏見八月二十六日制冊上皇太后尊號凡在生靈不勝慶幸臣聞天地之因一作經所由一作因者本聖人之徳無加於孝故紹休以受命榮號以歸尊是用慶善奉慈因親教愛也伏以皇太后法象太極是生兩儀光昭上元以母萬物塗山降瑞華渚呈符照臨典禮示天人之慶一作訓範裁成風化表戚屬之宗師詩云思齊太任文王以聖則知祚我仁慶誕與睿哲穆穆明明有自来矣伏惟聖神文武皇帝陛下以皇道還淳以文明致理行三代之典一作極教備兩漢之威一作盛儀逾年改元謁告清廟永言配命殷薦圎丘大孝通於神明至化被於寰宇瞻戀慈訓尚未遑安處奉徽章以崇位號嚴恭前殿陳布外朝萬國在庭千官執禮冕旒端拱翼翼烝烝候一作俟金冊以拜興承瑞寳而俯受聖理之至其道大光朝野同歡臣妾有恃言念舊黨遂及姻聮褒徳以殊榮推恩以序進華胄増貴外家益尊固可以感動靈祗懐服戎狄豈止徳教加於百姓仁厚及於九族而已冝其煥列青史昭播鴻猷億萬斯年以承多福臣所守有限不獲稱慶闕庭無任抃躍忻悦之至謹遣某官奉表陳賀以聞一作皆唐類表同前劉禹錫臣某言伏見制書以二月二十五日冊立皇太后盛禮畢陳徳音逺被一人有慶萬國同歡中賀伏以集作惟皇太后禀靈作合集作配誕聖表祥徽號極域中之尊至仁為天下之母陛下君臨有國子道無違長樂宫中永獻南山之夀濯龍門上再揚東漢之風率土臣子不勝歡集作欣抃同前楊於陵臣某言伏奉月日制書奉太上皇后尊號曰皇太后坤儀鎮定孝徳昭升大義冠於人倫盛徳類表作禮光於史冊凡在臣子不任抃躍中賀臣聞周室興王文母同其經理漢皇嗣聖明徳贊其徽猷伏惟陛下𢎞闡睿圗誕膺昌厯皇太后宣明懿範超邁前脩家國慶靈慈孝交感堯門薦祉延寳祚於無疆長信頥神播歡心於率土由我爱敬致茲雍熈何幸萬邦之人親逢千載之運臣叨承奬任職守藩條阻拜彤庭雖違於常典載馳丹懇倍過於恒情同前羊士諤伏以某日誥命爰以令辰太上皇后光膺典冊盛化既行中外同慶臣某中賀皇太后隂靈類表作母徳降祥坤儀垂訓堯門誕聖時逢寳厯之典彤管紀言道光内輔之業九族承序萬國乂安伏惟皇帝展禮南宮奉觴北極榮超簡冊慶浹寰區凡在生靈孰不傾戴臣以逺守藩鎮不獲稱賀二字類表作抃舞闕庭百寮賀册太上皇后禮畢表栁宗元臣某等言今月日太上皇后冊禮云畢率土臣妾慶抃無窮臣某等誠慶誠賀頓首頓首伏以太上皇后著嬪虞集作虞嬪之至徳嗣母周集作周母之徽音表率六宮明彰萬國陛下克脩理本以暢化源神道知事地之方人倫識尊親之大豈為婦道集作順斯備隂理集作禮用脩足以播正始於王集作國風致時雍於帝典臣等謬叨集作塵榮位獲覩盛儀踴躍之誠倍萬恒品鄭尚書賀冊皇太后表令狐楚臣某言伏聞制冊皇太后七字一作臣伏奉五月二十八日勅㫖尊太上皇后恩覃日下歡動中天一作天中臣伏以皇太后坤徳合符隂靈表慶化光宮職道贊國風伏惟皇帝仁聖宅心文明恭已遵承孝理嚴奉慈顔獻寳綬於内朝宣玉冊於中禁彰明順徳知陛下就養之勤表正母儀見陛下歸安之盛萬國所繫四方是刑人一作召臣之懇願既申品物之歡心斯洽臣叨承寄任限守藩一作方隅不及一作獲陪位闕庭抃舞稱賀無任聳慶踴悦之至一作皆唐類表賀冊太上皇后及徳妃表栁宗元臣某等言伏奉今月日誥良姊王氏冊太上皇后良媛董氏册太上皇徳妃宜令所司備禮冊命者母儀有光坤道克集作成順隂教方行於萬國内理克和於六宫臣某等誠慶誠賀頓首頓首伏惟皇帝陛下對若天休奉揚睿㫖長秋既登其品集作正位揄狄亦洽集作被於恩光奉養見三朝之安周旋有四星之輔豈徒配乾稱大事集作助日為明所以表王化之源知孝理之本冠映千古儀刑四方臣等捧戴施行踴躍無地無任蹈舞忻喜之至中書門下請冊貴妃表常衮臣等言臣聞天文次星配以妃位帝宫内職守在一作守於王化視公卿而命秩思賢才以審官盖五禮之宗一作定非六義之本也伏惟寳應元聖文武皇帝陛下紹興下一作典文武屬當多難一日萬務親紆聖心初定羣兇尚多闕典紫庭分理頃刻未遑彤管記言因茲而缺然則一作以奉若天道以隂而助陽御于家邦由中而及外今既三靈叶泰四海永清冝舉舊章以行盛禮竊承一作以壼制未正等威當熊之徳或聞於蘭殿貫魚之序無列一作别於椒房固以一作已叶周南之風參虞汭之化豈使坤儀曠其取法隂教闕而不修雖則簡在宸衷安敢黙於誠請伏冀大明禮秩俾率宫庭以厚人倫以風天下庶得外朝均政羣望獲從無任懇欵屏營之至臣某誠惶誠恐頓首頓首謹言一作皆唐類表太子賀𫝊位於皇太子表庾信臣某言伏見二月十九日詔傳位於皇太子昔者降居弱水登庸有優劣之殊来朝櫟陽繼體有君臣之異不得與夫天之兩日日之再中並曜聮輝重明雙照同年而語矣伏惟天元皇帝惟聖作聖惟親尊親降意於與能鳴謙於神器欲令百二相和先聞揖讓之風天下無為早識吾君之子是以運獨見之明行非常之事先天不違後天而奉皇太子身貞萬國道照四門夙膺再命之符實允基天之命非闗復子明辟異於遷虞事夏既損既益尚或二天為離為火何妨兩日且平陽蒲坂賢臣則二十五人顓頊髙辛才子則一十六族與此計事何遽無成鼚丑艮切皷聲乎皷之軒乎舞之自當八風通慶雲聚五老同逰三星運曜豈直雙龍再賜九雉重飛而已哉皇帝藐然姑射正當乗雲馭龍問道崆峒豈復先秋木落臣生預堯年時逢舜日覩惟新之慶實倍萬恒情請冊皇太子表二首于邵臣聞立天下之本故受之以震明兩承綂慶元有光期一作斯萬國以貞而一人有慶也伏惟皇帝陛下受天明命尊祖嚴配聖謨廣運禮秩咸若六親承式而理六合不論而定伏以儲宮未立人望猶勤奉天順人事不可曠夙聞宣王天資孝敬訓禀詩禮可以奉宗祧之重可以當匕鬯之主朝三命宰則以安親前師後傅則以齒胄伏乞以時冊命報慶天人然後啓承華以論道起博望而養徳天下幸甚天下幸甚臣等㕘跡樞宥一作宻倍萬恒情謹奉表陳請以聞二臣炎等言今月十六日敢以古儀請建皇儲伏奉恩命未垂允答受命競􅋺怳然失圗臣炎等惶恐頓首臣聞帝王之理必先體統而後正百度以臨四方修人紀以符天道則居震守噐重離繼明是先代行於天下也况尊宗廟而奉君親乎此而不先孰可先者陛下尚執謙徳方勤庻政畧至公之務慎翼子之私是何小嫌而廢前訓今臣等不敢以歴代為據且以國朝以來言之有若髙祖義寜二年五月即位六月立建成為皇太子太宗武徳九年八月即位十月立中山王為皇太子髙宗貞觀二十三年六月即位七月立陳王為皇太子按新舊唐書并㑹要髙宗永徽三年七月立陳王忠為皇太子則祖宗垂範如示諸掌今抑而不立豈塞天下之望十一字一作今抑而不奉而當何奉之伏乞考百代不刋之典遂萬國元良之望天下幸甚伏聞宣王以子則嫡以家則孝天姿玉裕雅性冲深足以奉粢盛之重視朝夕之膳然則行一物而三善皆得者建儲之謂也臣等不勝大願懇請之至代宗讓皇太子表常衮臣某言臣聞君父之命誠不合辭臣子之心固無所隠隠之則有累天鑒辭之則有負國貞在無隠而不言雖禀命而非孝臣所以省躬審分讓徳推賢瀝懇上聞冐嚴亟請丹誠罔感皇睠來疑作未昭戰兢失圖精爽飛越臣某誠惶誠恐頓首頓首伏以國之上嗣古曰元良觀象于天應前星之環極取法于地視少海之朝宗必訪蓍龜以承主鬯臣幼非樂善長未好儒慈奨特深愚蒙不易教之羽籥有昧樂章訓以詩書終迷義府逰虧四老才乏五官人莫係心徳非守噐頃者外統羣帥内録尚書竊懼任榮以憂官謗今謬塵博望猥辱夀春位登青宮禮絶朱邸且􅆾人望載黷朝經循名責實未足承天之序捨長立賢亦猶行古之道伏惟陛下博求公議允納㣲誠更擇温文俾膺繼紹逺想伯夷之讓用升季歴之材至公大行天下幸甚無任懇廹屏營之至謹奉表陳讓以聞臣誠惶誠恐頓首頓首為揚州李長史賀立皇太子表蕭頴士臣某言伏奉制書皇太子以今月嘉辰肅膺典冊少陽輔徳前星耿耀凡在生靈預増慶幸臣聞立嗣必子爰徴古訓惟賢乃建式固宗祧周漢以還憲章未改伏惟開元神武皇帝陛下嚴祗寳祚光啓睿圗則哲其難至公有在惟天為大萬邦所以作貞如日之昇重離所以増煥况瓊枝挺秀玉葉資神允釐監撫儀形雅頌春華秋實嘗俯俟於嘉言一物三善諒行稱於至徳固以靈祗叶贊景命昭宣馳道之前猶應著令寢門之外方候問安臣忝貳藩條局守官次不獲預陪大禮稱慶闕庭延首承華以忺以抃賀冊皇太子表張九齡臣言伏奉今月二十日制冊立皇太子者伏以皇太子天實生徳睿哲夙備爰以吉辰光膺盛典伏惟開元神武皇帝陛下建儲固本體天合聖萬方之心永貞是屬一人有慶大賚斯在臣某待罪南郡不獲稱慶闕庭欣躍之誠實百恒品無任悚躍慶抃一作躍之至謹遣所部官宣義郎行枝江縣尉楊崇先奉表陳賀以聞臣誠喜誠抃類表作誠歡誠喜頓首頓首死罪死罪謹言同前吕温臣某言伏見十月十二日勅伏承皇太子以四月二十一日册命禮畢光紹前典惟懐永圗神人允諧動植咸頼臣某誠歡誠抃頓首頓首臣聞燕翼貽謀帝王之大孝立嫡主器禮易之明訓伏惟皇帝陛下克明駿一作俊徳恢纂鴻休武功有成文理既定然後𢎞三王之教諭建萬國之元良凡在生靈孰不慶幸臣守官荒服稱賀無階竊抃嶺隅倍萬恒品無任感悦屏營之至謹奉表陳賀以聞同前劉禹錫臣某言伏見冊皇太子盛禮斯畢徳音遐宣萬國以貞庶類咸悦中賀伏惟文武孝徳皇帝陛下體元立極垂訓御時既闡王猷思安國本前星位定拱宸極以昭彰蒼震氣宣與天地而長乆禮光匕鬯澤被華夷宗社有無疆之休生靈懐莫大之慶臣恪居官次遐守巴南不獲稱慶二字稱賀集作闕庭臣無任踴躍之至百寮賀冊皇太子表栁宗元臣某等言伏奉今月二十四日制廣陵郡王冝冊為皇太子改名某仍令所司擇日備禮冊命者天序有奉皇心載寧臣某等誠慶誠賀頓首頓首臣聞商書載以貞之文漢史傳早建之義不惟立愛其在繼明陛下奉率前規敷揚盛典顧茲守噐之重爰正承華之位尊義方之教載錫嘉名崇建樹之禮式光典命以長而立自符於慎擇必子而選遂合于至公邦本不摇王業彌固此皆宗社垂祉啓佑皇心乾坤叶集作合謀保安聖運足以播休氣於四海洽太和於萬靈食毛含齒所同歡慶臣等奉承制命蹈舞周行不任歡抃之至六字集作踊躍之誠倍百恒品無任慶抃感悦之至謹奉表陳賀以聞此篇元誤編在六百三十五卷狀門今移入于此賀皇太子知軍國表令狐楚臣得上都進奉官狀報伏承七月二十八日詔㫖軍國政事權令皇太子勾當者中賀伏惟皇帝陛下大明御㝢至孝自天霜露既濡想園陵之漸近雲霞是仰悲弓劔之方遥内感深闕外勉類表作煩庶政由是推赤心於俊乂委寳厯於元良宣明兩曜之光崇重萬國一作邦之本與夫逰神姑射義豈同風養道大庭禮誠異日天下臣子不勝慶幸臣限以所守不獲拜候闕庭無任屏營之至賀皇太子知軍國牋臣某牋伏見七月二十八日皇帝宣詔後篇作詔㫖軍國政事並權委皇太子殿下勾當者後篇有右字伏以皇帝陛下躬勤黼扆志奉山陵後篇作園字恭後篇類表作思慕積中殷憂發外瞻九廟之重湏有纘承以萬機後篇作方為煩期在宴息伏惟皇太子殿下日躋睿􅈒天縱欽明繼丕業而堯厯重昌嗣鴻名而文功累盛事有光於徃古慶類表作思實被於殊方率土臣心後篇作子不後篇作無任欣戴臣限以後篇作於鎮守逺在方隅不後篇作未獲陪慶後篇作位宫庭抃舞稱賀瞻戀踴躍之至謹奉牋以聞此篇六百二十七卷重出今已削去文苑英華卷五百五十七
