body:
  text: 文苑英華卷五百七十宋李昉等編雜賀二爲宰相賀趙郡鑄天尊及佛有諸瑞表一首爲宰相賀開元寺鑄釋迦牟尼佛有白光等瑞表一首爲宰相賀宫人夣𤣥元皇帝應見表一首賀新殿鍾鳴表一首賀感夣聖祖表一首百官賀佛放光表一首百官賀朔且冬至表一首爲汝南公賀元旦御正殿受賀表一首賀大衍厯表一首賀示厯書表一首代百僚賀放浙西租賦表一首爲杜相公賀恩賜淮西粟帛表一首中書門下賀抑情復膳表一首代李侍郎賀徳政表一首爲宰相賀趙郡鑄天尊及佛有諸瑞表𤣥宗孫逖臣等伏見趙郡奏鑄等身元始天尊其日天氣晴和祥雲散彩又開模未畢先出白光尊容漸見毫光圓滿其花冠耀白色如玉遍身衣帔自然雲霞眉上有两㸃白光流轉照耀又鑄等身釋迦牟尼佛螺髻兼遍身自然玉色唯頂至面爲紫金色聖情敦道天心䕶法爰降宸儀將崇寳相鑄寫之際禎祥屢臻初法止一作正於上京遂呈祥於外郡金姿玉色不假琢磨霞帔霓裳非因藻繪見祥光於眉宇生瑞氣於雲端曲示明徴宛如合契𤣥貺稠疊周彰萬億之期蒼生何幸盡登仁夀之域臣等忝奉一作侍軒墀倍深欣慶無任抃躍之至謹奉表陳賀以聞仍望宣示朝廷編諸簡册爲宰相賀開元寺鑄釋迦牟尼佛白光等瑞表𤣥宗臣等伏見開元寺所鑄釋迦牟尼佛身現金色頂含白光發濃紫於聖容散純黄於佛體未加瑩飾已成相好殊祥異應昔所未聞伏以聖人爲心𤣥妙莫測至誠所感靈變無方陛下子育群生𢎞脩正教冩真容於法界傳寳相於恒沙洎崇建以来禎祥一作符畢集自有神通之助豈資人妙之功超絶瑞於千古表昌期於萬邦凡曰士庶不勝慶幸况於臣等倍切常情無任抃悦之至謹奉表陳賀以聞爲宰相賀宫人夣𤣥元皇帝應見表𤣥宗前人臣等昨因奏事親承徳音宫中有一婦人性頗好道然未通悟數日以前忽夣𤣥元皇帝慇懃教誡道法尚未盡解遵承無何又依前夢見大被呵責遂以水噀其两目因而䘮明比覺後都無所見然始責躬罪已情祈至真又夣𤣥元皇帝教之曰汝可見吾孫自立愈其婦人曰不知吾孫是何人曰汝皇帝是也汝至酉時可見當施其法使汝知驗至時宫中教人共扶見朕朕爲潔誠作道法使救療其目須臾自開平復如舊聖祖靈感昭然合符與卿等同慶者伏以混成莫測𤣥元闡其教衆妙難名陛下光其業二聖表徳千古叶符將告天休遂慿宫女乗恍惚而爲夣在希㣲而有聲不因其言孰報貽孫之慶不開其目何彰救物之慈法事既陳靈徴果騐能使病者復歸其明當聖躬本命之時合烈祖𤣥通之契事且符於久視理仍叶於常存殊尤之祥載籍未有臣忝跡樞近親奉徳音慶悦之情實倍恒品無任抃躍之至謹奉表陳賀以聞賀新殿鍾鳴表𤣥宗李邕臣邕等言伏見昨宣示於新殿爲萬姓祈禱神鍾自鳴是知聖作昇聞天意下降道開皇極潤及生人臣等中賀臣聞光覆動植者莫如天臨照幽遐者莫如日自非齊聖妙用曷以則而象之𤣥化至徳曷以感而通之伏惟陛下道心冲叶神教昭宣以四海為家萬人爲子常恐水旱逓有干戈蹔勞所以供祀百神用祈五福徳澤被物聖靈動天􅌖情注於一時景鍾鳴於别殿夫衆者萬有也廣者四維也今陛下惣萬有一四維潜運方寸之間充塞宇宙之外則何聖不鍳何神不昭豈唯一鍾乎况南面之位屈陛下之至尊西方之金啟陛下之本命非無情之應是有由而来自然羣龍扶持九天欣戴保億兆之元后登千萬之永年時觀雍熈代偕一作階仁夀此天所以告鍾所以鳴臣等幸朝上京欣遭大慶一舞一蹈未極臣子之心再詠再歌徒知天地之徳無任抃躍之至賀感夢聖祖表𤣥宗臣邕言伏奉今月日制書至徳感神通夢聖祖一作聖祖通夢告以莫大之福示以無疆之期上賀國觀下敷人願以抃以躍且舞且歌臣某中賀臣聞百川所歸者謂之大海萬有所仰者謂之聖人今四海獲安聖人致夀臣子之願允塞乾坤之應克諧粤自書籍以来感慶之深福祐之盛未有如斯者也伏惟陛下道用御天徳心子物事無事以集休明至明以𤣥悟人天乃接福貺爰臻故得真仙見靈異相昭應言皆合天心證非外將恢𢎞聖慮照自宸衷啟之大年授以元祐麻姑觀海歴嵗彌長王母記桃與時無準則幽明所載宗廟所鍾兆庶子孫百靈齊集知億年之永託沐萬代之延休草樹自榮魚鼈咸若五風異色四氣同和皷天地之大鑪鑄邦家之鴻業八極猶小不足受其禎符萬物每輕不足答其成造卹獄宥死符以再生寵賢逹人宴以旬日耆艾衢陌工賈旗亭髙興太平之時歡言上古之化撫家族以自慰詣州邑以相誇官不驕人人不畏吏識天之覆熈焉如春惟聖之慈陶然如醉無任抃躍慶喜之極謹附表陳賀以聞臣邕誠歡誠喜頓首頓首百官賀佛放光表常衮臣等言今日董秀奉宣文成殿御功徳佛放光明六宫及諸王公主并近侍等並觀其光從三更四㸃直至四更猶在臣聞明主之理本以庇人大聖之教先於及物合皆符契感而遂通伏惟陛下以道法天以心證佛措六合於無事納羣生於慶聞薰然慈心在宥天下滌慮恭黙齊於穆清以四海之尊勤三乗之法故得大雅應見變化無方毫光破昏金殿如晝照恒星而奪彩混圓魄而一色曠代之瑞天人咸覩玉漏將盡銀河以􅊠仰光明而無際知皇刼之彌逺臣等謬忝樞近倍萬恒情無任慶抃之至百官賀朔旦冬至表許敬宗貞觀十四年臣聞乾坤資始上元開厯象之端日月還流朔旦正璿衡之本事韞有形之表理遂無物之先故能運彼𤣥樞財成庶類䴡兹黄道孕育羣生惟聖則天允執在躬之厯惟皇作極必叶履端之契所以書稱敬授易曰明時克正降平無非此道伏惟皇帝陛下聲凝祕籙功𢎞造化縱如神之𤣥覧體不言於四海發就日之光華同無私於七曜階蓂循晷阿鳯吟辰元精究開闢之初握先窮名數之始裁炎凉於玉管節雨露於金渾道格彼蒼仁霑無外八紘受朔盡入封疆九譯承風逺遵文軌昆蟲涵於凱澤草木汎於榮光由是上感天而下漏泉不愛道而効其寳肇一元於甲子致希世之貞符挾五始於長至播光前之茂禮伏見宣義郎李淳風表稱竊見古厯分日起於子半勘得今嵗十一月甲子朔旦冬至而故太史令傅仁均欲苟異張曹𤣥法減餘稍多子初爲朔遂差三刻用乖天正然自初及半日月全未相離筭與太初事皆符合奉敕付有司及經術者詳加考定以議奏聞於是鴻生碩儒咸稽茂典研精覃思俱考舊文國子祭酒臣孔穎逹十有一人與尚書八座叅議得失咸以爲仁均定朔事有微差淳風推校理尤精宻謹按漢書云古者黄帝合而不死應邵云厯合天心而得僊也又按益部耆舊傳云洛下閎改顓頊法更作太初厯自云後八百嵗此厯差一日有聖人出定之斯乃差日濫觴久著之於𡨕兆聖出之騐叶當今之有徴俯㑹八百之期逺叶九仙之道臣等緬維􅃉古歴考前王若乃萌氣黄鐘兆根𤣥牝闡其幽而藏其用窺其奥而開其文列聖存而不論故無得而稱也自圗書爰始三統騰鑣皇王以来六家分軫帝軒垂憲大撓汨其洪源伯禹嗣興小正窮其至賾命羲叔於唐厯考箕子於周年或以𤣥乙司分翠虬定箭登清臺而索隠揆圭表以知微事緒多途無聞感應猶且各稱書契並擅鴻名改年號以應元符禮日觀而爲稱首豈與夫两儀同徳五緯齊明景延南正星纒北流聨珠候朔的皪清漢之間合璧規天徘徊紫霄之上校先代之優劣豈同年而語哉庶當玉輅徐輪金泥祕檢塗山之下㑹百神而合符介丘之側朝萬玉而光輝天人交際不亦休歟臣等生屬夀昌累逢祉福至於今慶曠古無儔何幸如之親承旦暮不任欣躍之至爲汝南公賀元日御正殿受朝賀表臣某言臣得州本進奏院狀稱報元日皇帝陛下御含元殿受朝賀者上正三辰下臨萬國事雖舉舊命則惟新中賀臣聞聖祖垂訓王者處域中之尊公羊紀時春者爲一歳之始載稽故實抑有典章近嵗以来此禮多闕或事因惜費或時屬告休伏惟皇帝陛下道被無垠政敷有截全取發生之徳無非訢合之仁蒼旻降符黄輿告瑞石碑既見文作太平銀甕旋臻字成萬嵗而又憂勤不輟克責方深精誠旁照於八紘懇惻上通於九廟仙厨撤味獸舘休畋遂使化妖宿爲夀星變小戎爲餓殍慶由聖感令屬神行爰在新正式脩闕典彤庭列位丹陛陳儀凝旒而天啟其門服衮而日升於觀巽風發越兊澤滂沱左右賢臣駿奔多士國無諛佞擢靈草而不指朝絶奸邪儼神羊而莫動禮成而退物有其容一作官况一作只以光耀瑶圗丹青玉版輝前映後邁五登三臣竊訪碩儒逺徴舊典帝堯華封之祝唯止匹夫神禹塗山之儀且非元㑹然猶堯有多憂之戒禹存一作行後至之誅在和平而尚乖孰歡呼之可致豈與兹日而得同年臣方守河潼正分符竹不獲躬陳玉帛首率梯航况又嘗以藝文叨居禁宻雖逺離天上猶近關西抃賀空深就望無所心馳紫闕非夢寐而不通魂繞皇闈羨歸飛而莫及無任賀恩祝夀戀闕屏營之至賀大衍厯表𤣥宗張説臣說言伏以開元大衍厯天㫖裁其紀綱日官考其精密履端更始敬授惟新加以辨五行之序推七政之數明散聖期實光土徳臣又見梁天監中陶𢎞景著玉匱記云盛徳木子以肇来運頃者僧一行推璿衡厯得皇家天命成數千年古今祥兆若合符契厯數既在於聖躬卜年仍表於長厯莫大之慶獨冠前王臣沗跡儒林預聞昌運無任抃躍之至謹奉表陳賀以聞賀示厯書表𤣥宗臣某等言内侍尹鳯翔至奉宣聖㫖内出新撰厯書二十五卷以示臣等竊窺深奥仰觀英華渉海登山罔知攸際臣聞唐堯光宅順昊天而定四時虞舜登庸在璿衡而齊七政伏惟開元聖文神皇帝陛下至徳廣運文明睿哲道冠生知與神合契備往聖之能事紹昔王之闕典發揮易象以應乗乾之時考正厯書更表履端之始上包二帝下括三王徴晷運之盈虛究推歩之踈宻備稽氣象載纒坎離一作載覆纒離三辰順軌而更明五緯合度而増煥是使天地貞觀神人允諧唐虞舊章於斯重覩臣等幸陪書府得預朝門抃躍之情實萬恒品奉表陳賀以聞代百寮賀放浙西租賦表吕温臣聞等言伏見今月十五日制命以天下經賦首於東南浙右諸州荐罹災歉全以逋債大敷湛恩人謡勃興朝聽震動中賀臣聞三王以降綿曠千祀爲邦之政盡在欲理之主甚衆莫不知傳戒獨豐語稱與足至於愛人節用之際約躬紓國之時則必情隨事遷以欲忘道故曰人鮮克舉行之惟難伏惟皇帝陛下濬發睿圗紹休聖緒躬行慈儉子育困窮皇明燭幽惠訓不倦撫臨萬國曽未再周深求疾苦之源屢下蠲除之詔裁戎祀之經費減乗輿之服御雖邦計之有羨入憂於未憂雖生人之所樂輸損之又損風行號令日貫精誠明神聼其徳音和氣生於文字將舟車所及咸升至理之期豈江湖下方獨被曲成之澤臣等尸素有日獻納無聞尚勞聖心軫恤人隠甘同凡品不敢望於清光竊與疲甿共謝生於𤣥造無任感抃之至為杜相公賀恩賜淮西粟帛表符載臣某言今月某日使某官至伏知聖㫖賜淮西節度使吳少誠米若干石鹽若干石絹若干疋雨露之潤忽沾於焦旱生育之徳忽被於飢寒凡在臣庶孰不慶幸臣某誠歡誠喜頓首頓首日者少誠迷誤興兵淮蔡陛下開日月之耀霽雷震之威洗其瑕穢復賜珪爵使螻蟻重安於窟穴草木再浹於恩光大一作忠義易兇邪之心和平銷悖亂之氣今復恤其歉儉賜之粟帛聖澤灑危疑之地皇慈周反側之人合救時之宜塞未萌之釁㣲禽食椹尚懷好音萬夫載恩豈不知感此所謂睿圗宏逺神武深沉善戰於仁施之中伐謀於茫昧之際武何戈而不止物何化而不從増七徳之輝華動八紘之踴躍臣叨居將相職守藩維不獲奔走稱慶宫闕無任歡抃懇欵之至謹奉表陳賀以聞中書門下賀抑情復膳表常衮臣某等言中使吳承倩至奉宣進止以臣等所奏華陽公主初薨聖慈深悼抑情復膳保御至和伏惟類表作承陛下初以愛主㓜冲純性聰敏類表作達恩念之厚有過於成人疾病之憂非止於一日早齡遽失流痛兼哀臣等不安下情惶燭上請㣲誠感逹蒙降徳音而不以至憂類作愛之私忘於所寳之重推必然於大分割無益以遣懐用復常禮以勤庶政致此陛下齊親踈於一致和福夀類表作𢎞覆幬於萬邦契睿類作聖祖𤣥元之符實天下蒼生之福臣等累日兢怖焦心失圗承命釋憂倍百慰幸無任感悦之至謹奉表陳賀以聞代李侍郎賀徳政表徳宗吕温臣某言臣聞上蒼垂象當分野者先知元后用心奉職司者方見是以堯稱光被四岳得於疇咨舜號文明九官禀其集作於分命豈非隨方表志因事立言陳力自叅於化源造膝難迷於日用伏惟皇帝陛下睿圗濬發𤣥徳廣運恢纂鴻緒允升大猷振十聖之遺休復百王之墜典至如崇陵盡瘁率禮無違長信歸尊因心則感内成則仁叙九族外平則義協萬邦厚俗則寵及髙年廣孝則榮加錫類能刑則朝無隠慝善任則野不遺才修文則戎蠻来威集作王整武則南北繼捷此皆事懸集作光日月聲洽寰區黔首之所謳歌縉紳之所抃蹈集作歡其或機參造物意兆先天事隔於人謡功隠於朝聼者若非奉職之臣官業所及諒無得而稱焉臣以庸劣謬膺寄任調盈虛而馭輕重關成敗而繫安危職思其憂夕惕若厲每因罄率披竭愚衷集作忠出奉温顔累承睿㫖有以知造化之意有以見天地之心曠若發蒙折一作浙如愈疾管窺所至可得而言昨者臣以潮州刺史李璿放縱私鹽耗散公利請從免職以儆慢官陛下以爲法令改更且一作宜當申諭道塗悠逺容或未知俾爲後圗用緩前責𢎞恕包於廣大明察貫於精微此則羣臣不可望清光者一也江南西道觀察使楊憑奏以支郡旱歉經賦不充請征居地之羨且循稅茶之法陛下以天災流行以時而息人怨滯結貽患則深縱無日新之羙忍復已除之弊特令寢奏姑務通商有司知畫一之方負販有昭蘇之望此又群臣不可望清光者二也臣嘗使推官殿中侍御史崔太素奉使淮南臣以太素二字集作其名秩甚卑濬決務重徴令郡縣釐集作整訓役徒須示等威請賜章服陛下以爲職任伊始勤効未成必有可觀乃申後命臣再陳所切方可其奏雖事從權與且濟物之宜而賞不僣行已見永圗之㫖此又群臣不可望清光者三也臣對敭之日親奉徳音知臣使司支計闕少必擬昭明儉徳振起素風謹身率天下之先節用自中宫而始又曰集作云臺殿舊制已當惕慮經營改作非所措懐將不崇三尺之階豈復議十家之産發自宸念形於天顔意開而河海自清言出而神祗知感此又群臣不可望清光者四也陛下光臨大寳星嵗將周貴戚之賜與無聞恩倖之霑霈殆絶至於贍軍供國行賞報功則必鴻毛府庫糞土金玉遂使夏州諸將恨効淺而恩深劍外三軍知生輕而義重此又群臣不可望清光者五也夫唐虞盛烈文武餘風莫不傳諸聲詩布在方冊且匹夫匹婦片善必書飛羽沉鱗一祥皆紀况陛下動關教化言在政刑理叅至道之精躬行盛徳之事而冲虛謙讓欝而未發將何以光掦藝祖昭示後昆伏請宣付史官永爲大法臣幸蒙恩遇獲奉昌期言必親聞事皆目覩分深骨髓義激血誠輕黷宸嚴魂宇集作首飛越無任屏營之至文苑英華卷五百七十
