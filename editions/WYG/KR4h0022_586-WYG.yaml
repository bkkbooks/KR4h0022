body:
  text: 文苑英華卷五百八十七宋李昉等編藩鎭謝官四為滎陽公桂州謝上表一首為懷州李中丞謝上表一首刺史謝上表十首為滎陽公桂州謝上表李商隱臣某言臣奉違禁掖祗役遐陬雖懸就日之誠懼曠宣風之寄柔轡載揚於永路輕船利濟於大川即以今月九日到任上訖臣某中謝臣係承儒訓生屬昌期初掛弁髦即親筐篋嘉樹無忘於封殖青氊不落於冦偷再擢詞科一登冊府徂遷歳律浮泛軍装忽彯華英俄列通籍極望郎於南省備給事於左曹中間帖掌臺綱分脩國史旋植孽童拒詔集作召狂虜亂華副中憲以急宣佐威城而遥䕶督晉氏遷延之後絶戎人值邏之奸敢伐善以攘羭固盡誠於養赤集作弱伏惟皇帝陛下武推時夏文號欽明方将䖍奉紫泥恭拜青璅豈意遽分専席叨賜再麾首南服以稱藩控西原而遏寇褰帷廉部猶恐墜於斯文横槊令軍實致憂於不武雖期竭力終懼敗官况俗雜華夷地兼縣道文身椎髻漸尉佗南越之餘叩皷鳴鐘𫝊士爕交州之態網疎則魚漏繩急則麏驚欲經緯以合宜顧韋弦而匪易伏願陛下務修儉徳廣扇㢘風拾翠採珠不勤異物驅犀逐集作返象用示深仁始於問俗之時便獲稱君之美臣亦當求規水薤取戒脂膏冀少息於羣集作疲黎庶免拘於司敗集作𨽻三梁路阻九嶠山集作封遥浮江遇一作過楚澤之萍望國隔畨禺之桂遐思白鳥鎮颺音於周囿之中逺羨仙蓂永固本於堯階之上無任感恩望闕結戀屏營之至為懷州李中丞謝上表武宗臣某言臣伏奉某月日制書授臣某官者天㫖下臨星言東騖即以今月某日到任上訖臣某中謝臣聞漢分刺舉之條三河最重唐制郊圻之數五宅唯均况蘇公舊田懷侯故邑太行會險徳水通津在申畫之間素為清地語翕張之勢號一作實曰要區自河南致軍以幕中分理地雖宻邇事異躬親伏惟仁聖文武至神大孝皇帝陛下神以運機聖而制變将鎮頑梗更務恢張由是開三壘之新規復數朝之故事齋壇将節重加亷郡之雄皂葢朱幡各有為州之貴逺徵三紀間有兩人陶某以吏理當材鄭某以名家正授清塵不逺餘烈猶存頒條之寄繼祖為難若臣者品以勲昇官因賞逹徒慕益恭之美以承猶宥之恩過奨在朝承乏充使将聖代懷柔之徳率昆一作外夷畏慕之心萬里以遥三時而復副介不離於痼疾一作疾故故人一作人從免難於凋零敢於䟦涉之勞自被生成之賜豈謂皇帝陛下謂能専對遽委牧人仍其栢署之雄錫以竹符之重遂使霍氏固辭之第早建䨇旌于公必大之門更屯五馬賢無所象分可自量入祖廟而歘驚瞻父堂而益懼况潞潜逆孽許出全師繫集作軗此州兵横制賊境兼聲勢之任有資屝之須謹當懋舉詔書聴求人瘼思理行之第一誠愧昔賢奉忠孝於在三亦唯先訓苟􅄽素誓則有神明伏逺雲天已逾旬朔獻封人冨壽之祝未卜其時懸子牟江海之思莫知其極無任感恩攀戀闕庭之至蘇州刺史謝上表元錫臣某言伏奉十一月七日恩敕授臣持節蘇州諸軍事守蘇州刺史以今月六日到州上訖臣績用無聞寵章非次恩崇効淺任過憂深承命震惶不知所措臣某中謝伏惟睿聖文武皇帝陛下道符乾元功配坤徳盛明參於兩曜休烈冠於百王覆幬羣生憂勤庶政至於牧人長吏簡在宸衷然後明視逹聰奨勞懲過俗臻壽域該疑靡窮人是以列郡庶尹莫不甘於殞首以答𤣥造臣藝術非工吏能罕立累因過幸嘗忝官榮所歷衢婺兩州皆屬荒殘之後侵漁積疑作稍息是朝廷法令之明饑饉不生属年歳豐稔之運績無異等恩被殊私累貪天功以竊身寵况東吳繁劇首冠江淮自非良能豈可妄處受任踰重兢慙失圖獨不汰侈於法程宴安於寢食誓刻肌骨用申㳙毫無任受恩慚懼之至福州刺史謝上表臣某言臣才不一作無過人位忽踰量跼蹐無措憂慙不容臣某誠惶誠懼頓首頓首臣歷忝方州誠無異効至如俗幸不擾人懷小安是属天時實非臣力况自永貞以來陛下毎降䘏隱之澤則惸嫠保安發賑救之仁則癘災不起法令昭著姦類表作貪邪已清時嵗豐穰流庸類表作亡自占比屋日用豈臣之功陛下勸奨道崇葺一作輯綏念切採擢凡品統臨列城将何以表正一方肅清羣吏庶竭微力仰酬天慈力不足則繼之以死是臣職分所當奉行秉茲一心敢有貳事以今月二十八日到所部上訖謹奉表陳謝以聞衢一作婺州刺史謝上表臣某言伏奉九月二十一日恩旨授臣衢一作婺州刺史以今月十八日到州上訖祗承寵光魂首飛越臣已嘗試任績用無聞荐沐恩私兢惶靡措臣本諸生行能罕立徒以親知謬舉踐履踰涯常叨省署之榮亟歴萬方之重事懷靦冐恩戴生成伏以浙東諸州衢一作婺為大郡累經荒險切在保綏憂勤所分簡求非易臣自量智力懼不勝任守信偷安踰年受代當此益重實昧寵章頃属旱灾相繼天䘮過半生聚長育理難卒平賦斂徵求物有常數自前年以來陛下以覆育之慈深布吊憫賑貽口食蠲復地征人用昭蘇氣消疪瘼竊以匹夫遂性天下懷仁况江表獲安動踰百萬臣職當撫字倍切常情欲宣明詔條通逹幽隱敦實務本者勸之以農開通明敏者進之以學奉朝廷法制守使府規模克勵小心庶無大悔有渝此志敢逭明刑宣州刺史謝上表臣某言中使王文朝至伏奉六月六日恩制授臣宣州刺史兼御史中丞充宣歙池等州都團練觀察處置等使以七月二十九日到鎮上訖臣謬承寵章顧影慙灼祗奉眀詔撫心震驚臣某中謝伏惟元和聖文神武法天應道皇帝陛下嗣承大寶光啓中興徳洽生靈道超今古平逆亂之本建太平之階将澄化源先正理道詳授一作擇長吏撫綏疲人冀厚生成用頒敎化以臣庸昧何以表率一方以臣孱微何以訓齊百姓始懼貪冐終思悔尤伏以人之性命懸在衣食衣食所繫蠶農為先使蠶不失時農無愆候其在姦豪屏息賦役均平既絶侵漁雖灾害不困既均物力雖貧乏亦安不困而安可成富庶臣累叨重任願効一作立微功嘗所粗知猶勉懼一作強不至况有未達豈昏愚可任竊自思惟不遑寢食一作處至若鉛刀一割之用駑馬再馳之勤所願酬恩更期効命旬歳無補刑章敢逃無任受恩惶恐之至一作皆唐類表忠州刺史謝上表憲宗白居易臣某言臣以去年十二月十二日伏奉敕㫖授臣忠州刺史以今月二十八日到本州當日上訖殊恩收一作時奨非次遷榮集作昇遷感戴驚惶隕越無地臣某誠喜誠懼頓首頓首臣性本踈愚識惟􅄶狹早蒙採錄擢在翰林僅歴五年毎知塵忝竟無一字上答聖眀及移秩宫寮卑冗踈賤不能周慎自取悔尤猶蒙聖慈曲賜容貸尚加祿食出佐潯陽一志憂惶四年循省晝夜寢食未嘗敢安負霜枯葵雖思向日委風黃葉敢望霑春豈意天慈忽加詔命特從佐郡寵授専城喜極魂驚感深泣下方今淮蔡底定兩河乂寧臣得為昇平之人遭遇已極况居符竹之寄榮幸實多誓當負刺慎貞履氷勵節下安凋瘵上副憂勤未死之間期展微効跼身地逺仰首天高螻蟻之誠伏希憐察無任感激懇欵彷徨之至謹遣某官某乙奉表陳謝以聞臣某誠惶誠恐頓首頓首謹言元和十四年三月二十八日杭州刺史謝上表臣某言去年七月十四日蒙恩除授杭州刺史屬汴路未通取襄漢路赴任水陸七千餘里晝夜奔馳以今月一日到本州當日上集有任字訖外憂重寄集作上分憂寄内省庸虚仰天戴恩蹈集作跼地失次臣某誠感誠懼頓首頓首臣謬因文學早忝集作忝厠班行自先朝黜官以來六年放棄逢陛下嗣位之後數月徵還生歸帝鄉集作京寵在郎署不踰年擢知制誥未周歳正授舎人出泥登霄從骨生肉惟有一死擬将報恩旋屬邊集作方隔不寧朝廷多事當陛下旰食宵衣之日是微臣輸肝寫膽之時雖進獻愚衷敢集作或期有補而退思事理多不合宜臣猶自知况在天鑒忝非土木若集作如履氷淵合當鼎鑊之誅尚忝藩條集作宣之寄才小官重恩深責輕欲荅生成未知死所惟當夙興夕惕焦思苦心恭守詔條勤恤人隱集作庶下蘇凋瘵上副憂勤萬分之恩冀一作莫酬一二仰天舉首望闕馳心葵藿之志徒仰螻蟻之誠難達無任感恩懇一作激切之至謹奉表稱謝以聞長慶二年蘇州刺史謝上表敬宗臣居易言伏奉三月四日恩制授臣使持節蘇州諸軍事守蘇州刺史臣以某月二十九日發東都今月五日到州當日上訖時當眀盛寵在藩條祗命荷恩以感以懼臣某誠懽誠幸頓首頓首伏惟皇帝陛下嗣膺厯數重造寰區将致昇平在先政化詢求牧守勤恤黎元實陛下慎選惟良之秋責成共理之日也臣以微陋早忝班行首自中書舎人出為杭州刺史茍集作幸免敗缺實無政能已蒙寵榮入改宫相今奉恩寄又分郡符奨飭具載於詔中慶幸實生於望外况當今國用多出江南江南諸州蘇最為大兵數不少稅額至多土雖沃而尚勞人徒庶而未富宜擇循良之吏委以撫綏豈臣𤨏劣之才合當任使然既成命敢不誓心必擬夕惕夙興焦心苦節惟詔條是守惟人瘼是求諭陛下憂勤之心布陛下慈和之澤則亭育之下疲人自當感恩而嵗時之間微臣或希報効塵黷皇鑒吐露赤誠寵至空驚恩深未答無任慚惶懇激之至謹差軍事散将某乙奉表陳謝以聞臣誠惶誠恐頓首頓首謹言連州刺史謝上表劉禹錫此篇合入五百八十六巻今已移入姑存其目同州刺史謝上表元稹臣稹言伏奉今月三日制書授臣使持節同州諸軍事守同州刺史兼本州防禦使臣罪重責輕憂惶失據慮為臺府逼逐不敢徘徊闕庭便自朝堂匍匐進發謹以今月六集作九日到州上訖臣稹辜負聖朝唐書作眀辱累恩奨便合自求死所豈謂集作宜尚忝官榮臣稹誠恐誠慙死罪死罪臣八歳䘮父家貧無業毋兄乞丐以供資養衣不布體食不充腸㓜學之年不蒙師訓因感隣里兒稚有父兄為開學校涕咽發憤願知詩書慈母哀臣親為敎授年十有五得眀經出身由集作自是苦心為文夙夜強學年二十四登吏部乙科受校書郎年二十八歳蒙制舉首選授左拾遺始自為學至於升朝無朋友為臣吹嘘無親黨為唐書作戚臣援庇莫非苦已實不因人獨立性成集作成性遂無交結任拾遺日屢陳時政蒙先皇帝召對集作召問舊書作召問於延英旋為宰相所憎貶唐書作出臣河南縣尉及為監察御史又不敢規避専心糾䋲復為宰相怒臣不庇親黨因以他事貶臣江陵判司廢棄十年分死溝瀆元和十四年憲宗皇帝開釋有罪始授臣膳部貟外郎與臣同省署者多是臣初登朝時舉人任卿相者半是臣同諫院時拾遺補闕愚臣既不能低心曲就流輩亦以此望風怒臣不料陛下天聽過卑知臣薄藝朱書授臣制誥延英詔臣賜緋宰相惡臣不出其門由是百方集作計侵毁陛下察臣無罪寵奨逾深召臣面授舎人遣充承㫖翰林學士金章紫服光飾陋軀人生之榮臣亦至矣然臣益遭誹謗日夜憂危惟陛下聖鑒照唐書作昭臨彌加保任竟排羣議擢授集作備台司臣忝有肺肝豈並尋常宰相况當行營退散之後牛元翼未出之間毎聞陛下軫念之言愚集作徼臣恨不身先士卒所以問于方計策遣王友眀等救解深州葢欲上副聖情豈是別懷他意不料奸人疑臣殺害裴度妄有告論塵黷聖聰媿羞天地臣本待辨明示集作未了便擬殺身謝責豈料聖慈尚加集作在薄貶同州雖違咫尺之顏不逺郊畿之境伏料必是宸衷獨斷乞臣此官若遣他人商量乍可與臣逺處方集作藩鎮豈有集作㫖遣臣俯近闕庭臣所恨今月三日尚蒙召對延英此時不解泣血仰辭天顔便唐書作乃至今日竄逐臣自離京國目斷魂銷毎至五更朝謁之時臣實制淚不得已臣若餘生未死他時萬一歸還不敢更望得見天顔但得再聞京城鐘皷之音臣雖黃土覆面無恨九泉集作原臣某無任自恨自悲集作慙攀戀聖慈之至然臣一日未死亦合有所陳論或聞党項小有動摇臣今謹具手疏陳奏伏望恕臣死罪特留聖覽今集作臣此表並臣手疏並望集作講留中不出謹差知衙官試殿中監馬𢎞直奉表謝罪以聞黄州刺史謝上表文宗杜牧臣某言臣奉某月某日敕㫖自某官授臣黄州刺史以某月日到任上訖臣某誠惶誠恐頓首頓首臣自出身以來供職使府雖有官業不親治唐諱人及登朝四任皆參臺閣優㳺無事止奉朝謁今者蒙恩擢授刺史専斷刑罰施行詔條政之善惡惟臣所繫素不更練兼之愚昧集作昧愚一自到任憂惕不勝動作舉止惟恐罪悔伏以黄州在大江之側集作北雲夣澤南古有夷風今盡華俗户不滿二萬稅錢纔三萬貫風俗謹朴法令明具久無水旱疾疫人業不耗謹奉貢賦不為罪惡臣雖不行亦能守之然臣觀東漢漢光武明帝稱為眀主不信集作任徳敎専任刑名二主相繼聨五十年當時以深刻刺舉號為稱職治唐諱古之風廢俗吏之課高於此時循吏衞颯任延王景魯恭劉寛陳寵之徒止一縣宰獨能不狥時俗自行敎化惟徳是務愛民如愛子廢鞭笞責削之文用忠恕撫字之道百里之内勃生古風凡違衆背時狥古非今王者公侯尚難其事豈一縣宰能移其俗此蓋人為治古之人法為一時之法以治古之敎敎之即治古之人以一時之法齊之即一時之人國家自有天下以來二百三十餘年間専用仁恕毎後刑罰是以内難外難作者相繼土地甲兵權柄號令盡非我有終能擒之此實恩澤慈愛入人骨髓俗厚風古不可動摇今自陛下即位以來重罪不殺小過不問普天之下蠻貊之邦有罹艱㐫一皆存䘏聖明睿哲廣大慈恕逺僻隱阨無不歡戴受十四聖之生肓張二百四十年之基宇臣於此際為吏長人敢不遵行國風彰揚至化小大之獄必以情恕孤獨鰥寡必躬問撫庶使一州之人知上有仁聖天子所遣刺史不為虚受蒸其和氣感其歡心庶為瑞為祥為謌為詠以禆盛業流乎無窮在臣心之則然豈材術之能及無任感激悃懇血誠之至文苑英華卷五百八十七
