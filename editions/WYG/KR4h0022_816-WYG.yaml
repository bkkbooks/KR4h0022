body:
  text: 文苑英華巻八百十七宋李昉等編釋氏寺九華山化成寺記修香山寺記成都府新修福成寺記柳州復太雲寺記復戒業寺記院上潭州法華院記梵閣寺常凖上人精院記寺九華山化成寺記費冠卿九華山古號九子山崛起大江之東揖灊廬於西岸儼削成於天外旁臨千餘里高峯峻嶺臣焉連岡走隴子焉自元氣凝結幾萬斯年六朝建都此為關輔人視山而天長山閱人以波逝其間聖后賢臣詠歌迭興言不及者茲山屈焉開元末有僧檀號張姓自郡舒至為鄉老胡彦請住廣度男女時豪所嫉長吏不明熒疑其居而廢之時有僧地藏則新羅王子金氏近屬頂聳竒骨軀長七尺而力倍百夫嘗曰六籍寰中三清術内唯第一義與方寸合落髪渉海捨舟而徒睹茲山於雲端自千里而勁進披榛援藟跨峯越壑得谷中之地靣陽而寛平其土黒壤其泉滑甘巖棲澗汲以示高潔曽遇毒螫端坐無念有美婦人作禮饋藥云小兒無知願出泉補過應視坐石石間潗㵫二字一作逕過不視疑時人謂九子神焉素願寫四部經遂下山至南陵有俞蕩等寫獻焉自此歸山跡絶人里逮至徳初有諸葛節等自麓登峯山深無人雲日雖鮮明居唯一僧閉目石室其旁折足鼎中唯白土少米烹而食之羣老投地號泣和尚苦行若此某等深過已出泉布買檀公舊地敢冒死請大師從之近山之人聞者四集伐木築室煥乎禪居有上首僧勝諭一作瑜等同建臺殿楩柟豫章土地生焉斷而斵之珷玞琪瓊不求他山肆其磨礱開鑿澞一作溪澗盡成稻田相水攸瀦為放生池乃當殿設釋伽文像左右備飾次立朱臺掛蒲牢於其中立樓門以冠其寺丹素交彩層層倚空嵒巒隊起於前靣松檜陣横於後嶺日月晦明以増其危雲霞聚散而變其狀松聲猿嘯相與斷續都非人間也建中初張公嚴典是邦仰師高風施捨甚厚因移舊額奏置寺焉本州牧賢者到寺一作終嚴師之敬西江估客於雲外見山施帛若干疋錢若干緡焚香作禮遥以祈祐師廣徳焉况親承善誘感悟深哉旁邑豪右一瞻一禮必獻桑土豈諸牧不合禮焉富商大族一作旅輕其産哉道徳感也本國聞之相與渡海其徒寔衆師憂無糧發石得土其色青白不墋如麵夏則食兼土冬則衣半火無少長畬田採薪自給中嵗領一從者居于南臺自緝麻衣其重兼鈞堂中榻上唯此而已池邉建臺厝四部經終日焚香獨味深㫖時年九十九貞元十年夏忽召衆告别罔知攸適但聞山鳴石隕感動無情及將㓕有尼侍者来未及語寺中古鐘無聲墮地尼来入室堂椽三壊吾師其神歟趺坐函中經三周星開將入塔顔狀亦如活時舁動骨節若撼金鎻經云菩薩鈎鎻百骸鳴矣基塔之地發光如火其圓光與其佛廟羣材締構衆力保䕶施一金錢報一重果下為輪王上登聖地昔有䕶法良吏洎施力僧檀越等具刻名于石士疾殁代不能立殊績以濟衆又不能破餘財崇勝因縁啄腥羶顧兒婦生為人非死為鬼責悲哉時元和癸巳嵗予閒居山下㓜所聞見謹而録之孟秋十五日記修香山寺記白居易洛都四郊山水之勝龍門首焉龍門十寺觀遊之勝香山首焉香山之壊乆矣樓亭騫崩佛寺集作僧暴露士君子惜之予亦惜之佛弟子耻之予亦耻之頃予為太集作庶子賔客分司東都時性好閒逰靈跡勝㮣靡不周覽每至茲寺慨然有完葺之願焉迨今七八年幸為山林一作水主足償初心復始願之秋也似有縁㑹果成就之噫予早與故相國元公四字集作元相國㣲之定交於生死之間𡨕心於因果之際去年秋㣲之將薨以墓誌文見託既而元氏之老狀其臧獲輿馬綾帛洎銀鞍玉帶之物價當六七十萬為謝文之贄来致於予予念平生分文不當辭贄不當納自秦抵洛往返者再三訖不得已乃集無乃字囬施茲寺因一作固請悲智僧清閒主張之命謹幹將士一作仕復掌理之始自寺前亭一所登寺橋一所連橋廊七間次至石樓一所連樓廊六間次東佛龕大屋十一間次南賔院堂一所小大屋共七間凡支壊補缺疊集作壘隤覆漏圬墁之功必精赭堊之飾必良雖一日必葺越三月而就譬如長者壊宅鬱為道師化成於是龕像無燥濕陊泐之危寺僧有經行宴坐之安逰者得息肩觀者得寓目關塞之氣色龍潭之景象香山之泉石石樓之風月與往来者耳目一時而新士君子佛弟子豁然如釋憾刷耻之為者集無者字清閑上人與予及㣲之皆宿舊也交情願力盡得知之感往一作性非念来歡一作歎且賛曰凡此利益皆名功徳而是功徳應歸㣲之必有以滅夙殃薦𡨕福也予應曰嗚呼乗此功徳安知化刼不與㣲之結後縁於茲土一作西方乎因此行願安知他生不與㣲之復同遊於茲寺乎言及於斯漣然集作而涕下唐太和六年八月一日河南尹太原白居易記成都府新修福成寺記劉禹錫益城有集無有字右門街集作御大逵坦然西馳曰石笋街街之北有仁祠形焉直啓曰福成寺寺之殿臺與城之樓交錯相輝綉干碧霄望之如崑閬間物太和四年蜀帥非將材不修邊備南詔君長諜得内空乗隙坌入鬭于城下或縱火以駭衆此寺乃焚高門修廊委為寒燼集作爐如是者再嵗帝念坤維丞相復来山川如迎父老相識環視故地寺為燋墟遹興起廢之歎爰有植因之願乃命主俸吏以吾緡錢三十萬為經營之基自公来思蜀號無事時康嵗稔人樂檀施公言既先應如决川乃傾囊禇乃出懐袖勝因化愚惠集作慧力攝慳男奔女驟急於徴令匠者度材以指衆徒藝者運思以役衆技斤鋸磨礱丁丁登登陶者儲精圬者効能歘自火宅復為金䋲沿故鼎新因毁成妍華夷縱觀萬目同聳既告訖役公来闕雲鮮日潤輝映前後於是都人舞抃而謡曰昔公去此福成以燬今公重還福成復宇民安軍治亦如此寺庸可勿紀乎公實聞斯言遂折簡見命謹月而日之時太和某年某月日大檀越具官封爵叚氏其他發大願者程功董事者自中貴人及賔介一作僚將吏若僧徒偕籍之而刻于石柳州石本有重字復大雲寺記柳宗元越人信祥而易殺傲化而偭仁病且憂則聚巫師用鷄卜始則殺小牲不可則殺中牲又不可則殺大牲而又不可則訣親戚飾死事曰神不置我已矣因不食蔽面死以故户易耗田易荒而蓄字不孳董之禮則頑束之刑則逃唯浮圖集作屠事神而語大可因而入焉有以佐教化柳州始以邦命置四寺其三在水北而大雲寺在水南水北環治城六百室水南三百室俄而水南火大雲寺焚而不復且百年三百室之人失其所依歸復立神而殺焉元和十年刺史柳宗元始至逐神于隠逺而取其地其傍有小僧舎闢之廣大逵逹横術北屬之江告于大府取寺之故名作大門以字掲之立東西序崇佛廟集作室為學者居㑹其徒而委之食使擊磬皷鍾以嚴其道而傳其石本無其言而人始復去鬼息殺而務趣於仁愛病且憂其有告焉而順之庶乎教夷之宜也凡立屋大小若干楹凡闢地南北東西若干畝凡樹木若干本竹三萬竿圃百畦田若干塍治事僧曰退思曰令寰曰道堅後二年十月十六日寺皆復就復戒業寺記沈亞之皇都左輔其屬縣朝邑縣令王鄆言能改作便民嘗集作當有緇衣遷寺戒業民不便鄆復之初蒲㓂李懐光既虜其屬將收其㪚卒聚之長春宫城圜朝邑室廬皆殘燼寺宇益毁其後緇衣以為居近郭苦遊兵乃聚黨與謀遷之西岡縈垣侵社地又治殿廡諸墓墳壠當其下者輙平去是時鄆為尉固止之緇衣之魁得他吏與交通為助故尉終不能制日一作因縱其徒於民間為禍福語以動惑之民無老㓜男女争相率以奉所欲顧尉集作畏已後耳及鄆為令乃元和七年也明年召緇衣宿老師弟子與語曰緇衣之道非能逾仁義以無害故天子許留國中前者緇衣無狀徙其居西岡之上侵社地壊丘塚夫社國之尊祭也丘塚人之反本也今爾集作而曹自為其居侵壊之是寜無害耶某昔争之不得身一作故常慄慄抱痛願得自効以快意今能亟復幸善不能亦且論擊矣民聞之皆大喜故以其年十一月悉還其故九年余東適邯鄲走蒲關朝邑令為具闕前奉酒於余因請以其事次於集作于文院上潭州法華院記于頔長沙郡之安國寺寺之北偏法華院結構始畢光明𢎞敞依之者有其㫖乎即我湖南伯御史中丞楊公竭孝思追大福報罔極于所恃也於戲萬法性離也言説非法也然捨言説無以辯了義詮實相繇是經教生焉佛說九部法華為最其逗機也韜靈珠於髻上指衆寳於藏内藥草沐莖葉之雨諸子恱羊鹿之車其㑹真也以開示悟入誘羣迷令得佛知見以㑹三歸一為上乗令知法真際至於如是性如是相了縁起叩寂滅億刼諸佛乃能知之其餘聲聞辟支如稻麻竹葦不得其㣲宻也若有受持讀誦勇猛堅固我為勝因果亦隨之即揚州龍興寺阿闍梨靈祐鑽研嵗乆深解義趣常為寳函以授信心仍大署其背曰功滿三千其道乃圓百福萬善充塞沙界中丞先太夫人滎陽鄭氏以閨門尊重之徳奉西方清净之教歸命道士且業是經是一作時有明晦我無間斷居無幾實盈其數焉常願極精慮罄泉貝大依佛事共揚光烈嗚呼風樹之感霜露之悲入肺肝者可勝道耶今位登方伯輕千乗之貴捐萬鍾之禄隳心裂膽䖍紹前志此所不敢一日而忘其親也先是此地松竹葱蒨含絶世之異觀者百軰曽無頌聲公乗時多暇髙歩廊廡宻獲勝勢其心快然因心計手指付于匠吏經時而成之堂殿崔嵬以切雲軒廊䆗窱而䟽風皎嚴净而無塵若釋梵之天宫大徳僧懐逺秀掩珪璧操陵霜雪是故啓請為其主張加之以田産因之以臧獲受用具足無遣乏相嘗聞於經曰造塔廟建形像旃檀沉水彩畫裝鉸如是功徳福不唐捐伏知必有以資窈冥闢往路揮斥萬有騰陵三界巍巍尊識補賢聖處信决定矣其或否者我教其誣乎恭惟先太夫人誠敬齋莊髙明惠和道可以裨補隂教禮可以綢繆婦則早居穆伯之器有賢子三人始在童孺則自教誨非雅言正味不道不食使中和淳粹之氣飽飫其腑藏焉故中司洎令弟兵部郎中凝大理評事凌皆擢進士髙第以清風累徳文學政事振休聲于宇内議者謂玉昆金友如三山峙立三川横流焉後之君子非但寳地覩此誌可以知上有聖謨之美下有大孝之嗣矣公永懐慟絶不忍握管濡墨以文字自導其意見托序述乃惕然而書之梵閣寺常凖上人精院記符載峯巒不巉峭無以為泰華院宇不嚴麗無以為梵閣此寺之有此院猶頭之載冕弁目之懸眸子有闕是者謂之顒昂丈夫其實誣之矣蜀郡豪也其民侈而夸者有之其土腴而譁者有之偶得静地黄金以梯一作賤疑作棧梵閣據龜城犀浦之間背郭六七里而遥擺喧傲俗已有真趣及履吾之精院也非天雲而髙非川澤而深非江海而逺非山林而静滿庭多修竹古樹喬柯宻葉扶踈膠轕其下向有茅齋洞啓晨朝日出光照屋棟一聞鍾磬焚香掃地其心泠然也亭午無人經行林中凡鳥不来時聞一作雲非天風其形飄然也沉沉子夜清宵夐絶唯餘皓月鋪軒洞牖其氣凝然也夫人之神不靈者耳目泥也居處蕪也思慮昏也苟身棲清静一作净之域目睇澄鮮之境心遊寂寞之地雖妄想有金城湯池之固不得與吾為敵矣余為六塵組織困於懴洗嘗與一二善友跳身此来高僧逹客㣲言相誘刹那之下我得一作得我本性况復主人棲處偃仰動淹星嵗哉院主姓瞿氏真釋種也行業如圭璧標韻如松鶴毗尼大藏啓其關鎻壇塲之上鬱有風稱弟子以羸漏之質入旃檀之林嗅聞馨香身意快樂故書美以示於道流欲使後之君子逰其地覩其文明其人知余詞之不鹵莽也丁亥嵗正月辛卯國家郊天之日也試太常寺協律郎攝監察御史符載厚之記文苑英華巻八百十七
