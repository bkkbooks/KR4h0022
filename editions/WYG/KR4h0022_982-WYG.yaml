body:
  text: 文苑英華巻九百八十三宋李昉等編交舊六祭包秘監文一首祭吕給事文一首祭梁補闕文一首祭韓祭酒文一首祭盧華州文一首祭户部崔侍郎文一首祭獨孤常州文一首祭獨孤台州文一首祭張工部文一首祭賈魏公文一首祭唐舎人文一首祭杜岐公文一首祭秘書包監文權德輿維貞元八年嵗次壬申五月朔日故吏部員外郎蕭存太常博士權德輿大理寺丞王純等謹以清酌庶羞之奠敬祭于故秘書包七丈之靈在漢鴻臚蔚為名儒以續簮裾乃生秘書純誠伉直古訓是式納忠宣力有勞王國昔自秀造翰飛扶摇彌綸劇曹領袖清朝出入諷議嘉聲孔昭道集作昭塞時通乃領藩條俄復郎署俾均繇賦經費委輸待公而具受命匪躬于汴之東秩宗之貳司憲之雄鑾輅時廵關梁永通每以貞勝行於險中登賢求舊入佐司㓂中和直清望與實并乃惣師氏三德興行又領秘丘六藝章明偃息文囿優游漢庭雅韻㧞俗清機入㝠立言大㫖為經為紀行中集作中行文質不華不俚魯史一字詩人四始泝其源流用制頽靡以誼藩身與道為隣虚中皎然不棲緇塵動静専直儀刑縉紳得䘮虧成靡滑吾真宜介遐福宜受戩榖未及下夀胡為不淑遺孤藐然銜恤茹毒善慶不誣期於必復某等劣薄嘗承討論通世宿好嘉招厚恩舞雩春遊昔實童子峴首良㑹俄叨知己嵗月遄邁或行或止慰薦難忘音徽不已各忝官命集作一官来歸帝里話舊語新悲歡未㡬驚疾癘之潜遘冀無妄而有喜信宿之間格言在耳精識不亂達生大觀謝醫禱於門人順一氣之聚散大鈞無期化往何之邦國殄瘁古今悽其虚室寥寥繐帷披披哀從中来雪涕交揮柔嘉列籩清沽集作酌滿巵神之聽之噫嘻格斯尚饗祭吕給事文前人維貞元九年嵗次癸酉正月庚申朔二十一日庚子右諫議大夫陽城給事中徐岱李衡中書舎人奚陟尚書駕部郎中知制誥張式左補闕權德輿謹以清酌庶羞之奠敬祭于故給事中吕公之靈君子之道貴乎艱貞公用踐履剛中粹精文學政事蔚然時名出處屯夷用晦而眀命佐戎車集作君命佐戎于彼淮甸方國多虞妖氣一作氛潛煽每以眀誠冀其革面外䝉耻以枉尺中飛章而告變白刃臨前丹心炳然貞其困而後濟忘其生而後全祲沴既平忠勞亦著草奏南宫嘉聲載路出領符竹澄清逺部夕拜黄扉昭宣王度獻嵗朝天侍立君前華纓玉珮行止鏘然周旋陟降接踵差肩如何日奄閟重泉嗚呼哀哉寓形此世無非大夢寢門之外莫甚斯慟交歡㡬時踰月于兹每冀休沐相從讌私孰謂奄忽俄生癘疵醫禱不及形神已離某等或辱在嘗集作常寮或忝陪下列嘉集作喜雲霧之初披恨幽㝠集作明之遽訣瞻彼塗芻言旋洛都平昔志集作智氣復歸虚無酒殽静嘉盈俎滿壺何以道意澘然涕濡尚饗祭梁補闕文前人維貞元九年嵗次癸酉十一月朔日左補闕權德輿等謹以清酌庶羞之奠敬祭于故右補闕贈禮部侍郎集作郎中梁君之靈我思古人乃得敬之今則不見嗚呼噫嘻賢哲之生作瑞于時中立不倚大道甚夷人或多方以取世資君懼其至泊然靈龜游夏逺矣文章運衰風流不還作者盖希君得其門獨泝澆醨遐蹈古始六經為師初冠章甫在江之滸忘形交臂或出或處久要之契脗然相與直諒切劘曠懐無沮漢庭虚左尺一旁午心與雲閑翼随風舉恬漠虚白環中之樞篤厚誠明君子之儒精義入神英華發舒人所景行君之緒餘乃補衮職乃侍皇儲北宫密命東觀直書致用無方迎刃皆虚漸漬教化闇然而孚文武憲章堯舜典謨空結時望莫申令圖宜錫華皓以極其道鍾美實多歸全太早子淵之仁叔度之賢皆厚其才而奪之年吁嗟敬之今亦已焉孰司化工不與其全凡我同人官次周旋微言嘉話恍若目前吾欲問蒼蒼而訴㝠㝠索夫子於重泉末如之何從古以然平生一樽哭奠靈筵魂氣何往空傷絶絃尚饗祭韓祭酒文前人維貞元十年嵗次甲戌三月朔日徵事郎守左補闕權德輿謹以清酌庶羞之奠敬祭于故國子祭酒韓十四丈之靈伏惟德厚流光炳靈發祥傳慶於集作于公鬱為珪璋宣力中外道光明代動必有裕直而無悔從容諫垣密勿絲言炳然憲章潤色化源天集作六官之貳京劇之貴四方取則九賦不匱蓬山秘書大學遵儒選重前代非賢勿居率是明德便藩右職宣其馨香昭其物則四科難並全才乃克利用無方沛然餘力再世金鉉確乎匪躬光輔帝道是為門風緇衣棣華宜復於公終缺人望天乎不傭顧惟小子夙承先友骨肉之契嵗寒逾久爰自齠丱深仁善誘恤此殘生均其所有衣而食之祿而仕之闔門仰給纖悉無遺仁惻之道曲盡其宜二十年間完安保持比肩多士忝跡清時必由念慮敢不知思秦原蒼蒼丹旐遲遲精魄何往音容莫追沉哀激中雪涕交揮神鍳如在含酸託詞尚饗祭虜華州文前人維貞元十六年嵗次庚辰四月已巳朔越八日景子從表弟朝議郎守中書舎人雲騎尉賜緋魚袋權德輿謹遣使以清酌時羞之奠敬祭于故華州刺史御史大夫盧六兄之靈詩謂君子温其如玉書稱正人既富方榖明靈比徳清議所屬未極全才如何不淑追憶曩嵗鍾陵嘉招兄時左遷屈佐乗軺幕庭山郭並榻連鑣心同則親敢曰嘗集作常寮俄奏郡課復升郎位左掖斯密教官已貴殘骸被病土梗蓬累謝交辟以未能方屏居以自遂㧞茅推轂遐輸集作蹈古義七發粲然八行狎至詔下江干猥登禮官故集作顧蓬茨之鯫生忽束帶於朝端遐曰良夜清言舊歡再披雲霧永契金蘭帝念長人出臨左輔河潼襟要復此居部乃亞丞相金龜映組美利休聲和風甘雨弱植何幸累叨禁垣諌曹集作署右史以至司言因緣踐履根本推援恐累知人上負明恩一違晤語九變凉温日夕音徽切劘討論發函亹亹如見君子或忠言以規過亦善謔而溢美方集作冀登柄用以永介祉每驤首於公朝期盍簪於仁里俄驚感疾方俟有喜志切乞身恩深卧理神道與善胡然不起寢門一哀孰甚知己素車莫遂雪涕何已樽酒簋貳深誠在此尚饗祭户部崔侍郎文前人維貞元十九年嵗次癸未十月戊寅十二日己丑中書舎人楊於陵禮部侍郎權德輿謹以清酌庶羞之奠敬祭于故户部侍郎贈右散騎常侍崔君之靈古之大觀推理以逹謂生為勞於化不怛茍非至人哀樂云云一欣一慼松茂芝焚遐想深契在於夫君素履無玷黄中有文卓爾堅明皎然貞醇夙以聲實邁於羣倫伊昔宦遊風塵不雜聯簮法冠並列賔榻夷道可久淡交相合亦既府除索然離居或憩循江或旋練湖君初巻懐寓彼群舒四年之間集作三四年間聨奉詔書分曹士師議禮太予中臺奏議並列哀烏道舊放懐話言于于三登首曹乃貳師徒相顧飛翻接影天衢顯允德業大僚是都凡我四人交歡靡渝直諒是程中庸是經或㑹公朝猶疑幕庭孰謂夫子奄然㝠㝠交臂相失汍瀾涕零入室皦皦孀孤之聲追懐悼心痛我友生密印左貂以哀以榮嗚呼哀哉命之所賦豈有其數乃如之人洵美無度常日謂我文昌連集作聨歩如何今兹已隔泉路亹亹良話依依平素晦明再朞冥寞大暮萬事風燭九泉草露魂之来兮歆此薄具尚饗祭獨孤常州文前人維貞元二十年嵗次甲申十一月戊申朔禮部侍郎權德輿謹以清酌庶羞之奠敬祭于故常州刺史獨孤憲公十四丈之靈嗚呼德充而位不配才大而年不遐稽於賦命從古太息伏惟藴大雅之愷悌遵六二之直方作為文章律度當世燦如日星炳若龜龍施於政事表率萬國三郡洽和四方鼓舞而不得𢎞大志業歿於中年豈洪鈞造物使才命相盭先師罕言末如之何伏以夫集作先子篤忘形之契小人展無容之敬去世二紀清風凛然顧以息女歸公愛子雖不獲逮事而備承家法况兹菲薄實忝眷私辨方之年違難於江徼志學之嵗伏謁於郡齋典司禮職嘗奉易名之義嚮仰德門令承合姓之重話言誘掖造次敢忘德容碩姿髣髴在目自為聲舉之舊今則潘楊之歡二孤純孝遺烈鍾美鮮原改卜日月有時酒殽静嘉式薦靈位尚饗祭獨孤台州文前人維貞元二十年嵗次甲申十一月戊申朔禮部侍郎權德輿謹以清酌庶羞之奠敬祭于故台州刺史獨孤七丈之靈洪範五福古人所貴伏惟道樞德機涵泳交鬯解龜隠機讌息東吴嗇神而去物累觀化以順天理終始貞吉歸全返真不登期頤者十數嵗而已可謂康寧而夀以至考終命𢎞條集作脩政事遵職居部泝沿淛河四為二千石朱轓暢轂所至洽平率誠理身以化封内可謂攸好德其所以異者富於義而逺於利以祿直賙姻族集作㛰以清白遺子孫故即逺之日輤裧纔具孤嗣藐然以賻布襄事蹈道如是君子以為難介弟憲公挺此文德含章炳章與三代同風先門友善義比金石猶子秀茂申以婚姻引進琢磨居為雅器永懐感悦冀奉話言女子有行得奉門訓竟迫道途之阻未申供養之禮用此歎慟結於中腸轜車東来大􅎬斯啟柔嘉清滌用寄單誠尚饗祭張工部文前人維貞元二十一年嵗次乙酉七月戊辰朔四日辛未禮部侍郎權德輿謹遣男璩以清酌庶羞之奠敬祭于故工部侍郎兼御史大夫禮部尚書張二十九丈集作兄之靈士君子之所以暢其業者文也學也士君子之所以植其本者正也忠也綽綽工部實由於斯起集作超於逢掖乃執簡記章明義類振起褒貶博物洽聞時稱良史可不謂文乎誕章成式變禮疑議稽合於古節適於中羣士屬目一言以决可不謂學乎處燎原盜泉之中不焚不濡終然違難皎潔貞厲狺狺權幸惡厥中立一罹讒鑠遂去清近祕丘十年不得自足可不謂行己之正乎出彊専對照耀原隰天覆之内無逺近集作邇君命之下無險夷再叶翟土乃龢戎索暢威靈於大荒之外啓手足於野幕之下可不謂事君之忠乎年纔逾耳順官止貳起部於兄之量二者皆屈彼大耋大僚孰宜之哉頃陪禁掖俄接仁里觴酒歌詩清言善謔靡日而間彌年以歡一瞬之間奄成今古以此思哀如何可忘跌傷左足未任趾歩鼔吹臨門涕洟如霰集作雨平生風味今日永訣伏枕口占寄懐斯文尚饗祭賈魏公文前人維永貞元年嵗次乙酉十月景申朔二十三日戊午朝散大夫守尚書户部侍郎雲騎尉權徳輿謹以清酌庶羞之奠敬祭于故司空相國贈太傅魏國賈公之靈覆載之間肖形必化惟令德淑問與天壤俱存伏惟以含一之量叶休嘉之運四征授律勲在盟府二揆居中勤宣宰政注意體國繄公是圖始自黄綬至于𤣥衮率由坦夷以極光大浩若溟海熙如春臺歸全之日朝野相弔窮琱戈金鉉之寵可以言貴過懸車貳膳之年可以言夀中和博大之度可以言君子知命順化之理可以言至人三朝告老終不得請法􅉠弔祠禮嘉常數鄙薄無似辱公之知奬進切劘逮兹一紀獲居里閈亟踐堂奥㧞俗之韻忘年之歡疑在視聴忽成今古嗚呼魏公可勝慟耶潔此觴豆奠于㝠寞髣髴風采公其降靈尚饗祭唐舎人文前人維元和元年嵗次景戌正月景寅朔十九日甲申户部侍郎權德輿謹以清酌時羞之奠敬祭于故禮部郎中知制誥唐君之靈嗚呼文編行茂才全弱冠知名時推雋賢含章振藻金玉在懸緣情放言采組相鮮憶昔淮湖與君覯止忘形合志造適通理瓜歩邦溝吴山楚水芝蘭之室三十年矣君自江左集作左史進居臺郎予叨禮官亦忝周行熙春至止休沐相將纔盍簮於上國俄出守於遐方盛山雲安風水迢遞屈此二郡俄然半世文章煥發書札相繼辛酸苦言欵曲嘉恵集作㑹顧我忝曠愧君淪滯屢封薦章輒以人廢每與公範交脩宿契不進不止中心自誓大君繼明元凱持衡方開宣室以待賈生裁成訓命所謂文炳詔君居之士友相慶遲遲征軒来自荆門凡我同集作周非人載勞夢魂屈指繼日候集作俟居西垣不及百里俄歸九原嗚呼文編此痛難言夀堂野土一别終古平昔風姿杳無處所樽酒簋貳涕零如雨㝠寞之間神其聴否尚饗祭杜岐公文前人維元和八年嵗次癸巳三月甲寅朔二十八日辛巳禮部尚書權徳輿謹以清酌庶羞之奠敬祭于故太保太傅岐國公之靈伏集作夫惟體温厚之氣協休和之運五常用仁九徳在寛六朝􅆒歴三后相公契作司徒奭居太保致位遂志晏閑顯尊極人倫之夀寵備君上之恩禮傳曰行道有福詩曰求福不回考祥視履惟公是已至若徜徉化元保合太和扶遵嘉㑹將明利澤漸漬於生民而隠於視聴者可勝道哉早辱招羣仕纔初命頃沐鴻休職聨大任周旋恵愛僅三十年集作三十餘年公府閎議郊居盛集滄溟沃日之量清廟禮神之噐四教五福明哲始終話言風采疑在夢想變化糺紛何可勝論常日賔榻今兹靈位常日歡言今兹聲淚常日精爽今兹魂氣常日鳴騶今兹騎吹永去昭代言歸厚地平生一樽拜奠歔欷尚饗文苑英華巻九百八十三
