body:
  text: 文苑英華卷五百三十一宋李昉等編商賈傭賃門十七道商賈立功執商判一道斷屠判一道同賈分利判一道權衡判一道太倉耳缺判一道㮚氏為量判一道度判一道斗秤判一道傭賃傭賃判一道剉草誤斬指斷判一道官户判一道奴判一道買奴云是良人判一道奴死棄水中判一道婢判一道部曲判一道奴婢過制判一道商賈立功執商判乙立軍功合授官或告親執商賈業對天子授鉞將軍運籌廣練精兵數道深入壯哉乙者屬當戎行攘臂專征負羽經戰警勵部伍張皇武威宻爾元兇尚懐旅拒甘泉火起初疑減竈之餘朔野風髙已得摧枯之勢既而凱歌還國疇庸武勲漢不孤恩方錫班超之職商乎見議詎奪弦髙見左傳之詞或人盈庭是相喧聒既而斟酌典憲採摭群言樊噲擢於屠沽𢎞羊起於賈豎以今况古其誰不然今之游詞一何狂簡有功之賞理請必行無稽之言事宜勿用斷屠判京兆府申奏勅斷屠百姓造罧不止未知合不對聖上徳合乾坤情深惻隠將廣厚生之道爰崇去殺之文受純禮於前經懲噬乾於成象三􅆵鼓刃有禁班行百姓造罧無令止息京兆以人多結網即謂臨河以皇上之任深見寰中之信及論設網之子即云盡欲求魚得鑄劍之夫何必皆縁斷馬事煩言上夫復奚疑同賈分利判得丙與乙同賈丙多收其利人刺其貪辭云知我貧也對白居易仁無貪貨義有通財在潔身而雖乖於知已而則可丙乙竒贏同業氣類相求競以錐刀始聞小人喻利推其貨賄終見君子用心情表深知事符往行如或貧富必類自當興讓立廉今則有無相懸固合損多益寡是為徇義豈曰竭忠受粟益親孔氏用敦吾道分財損已叔牙嘗謂我貧無畏人言俾彰交態權衡判丙造權衡以百黍之重為一銖以三兩為一大兩所由科違令訴云調律仰正斷對丙軄此權衡性諧鍾律八音由茲遂播五聲從此克諧掌類羲和主同尹氏錙銖無失於毫末斤兩匪差於黍累顓頊火正虞典銅衡茍有罪一作非宜誠合科結况三兩為一大兩未爽於通䂓百黍以為一銖頗合於古制將科違令事乃近於深文訴以非辜理亦宜從告免太倉耳缺判太倉申左右耳缺大農不稱其任對正月吉日國命既懸於兩觀同律度量聖典毎均乎四時况天子有司多方取則如或失墜其謂法何但不戒而具有虞何闕縱令噐有隳毁亦宜隨事脩補既缺左右何成出入太倉乾没不恪將射隼於高墉大農叨忝厥官失庖魚於下局且如古今命官都邑一作都署聮屬沿革既異主掌斯殊不可歸罪一官責成一職重詰所謂庶符一作乎恤刑㮚氏為量判㮚氏為量容鬴令人概而不税所司科之對謹其權量義叶順時範彼金錫道成厥噐信斗筲而均制乃鍾鼎而齊功施之以平萬商立之而觀四國罔不以法貴諸合儀㮚氏職在為量功期永啓既改煎而不耗亦自權而凖之莫不審以方圓容之鬴豆炎煙散彩浮紫氣之光芒洞響函䂓應黃鍾之宫律深模正典實利生民唐諱可以垂範將來可以行之天下概而不税雅符師古之蹤按而將科殊紊平反之道㮚氏既無遺失圄囚一作梓匠理合審詳罰乃有詞刑宜用恤度判内官以竹為引髙廣之數法隂陽宗正以為不中度請科之辭稱事所宜也非故無實對律厯攸司丈尺有凖度必慎於圭撮高一作廣寧失於分寸茍昧斯義則非其人惟此内官聮於宗正權量法度無黍累之差墨丈尋常豈毫釐之謬允酌故實克循前典既法隂陽之數固因銅竹之宜科之則非訴者為是斗秤判太府寺去秋追三市斗秤踰月不送寺以市司違時徵銅四斤丞梅福訴云九月上旬平校畢對太府官惟度量務切權衡驗寳貝之充盈察泉貨之輕重校量斗秤甲令有時事屬司存不當踰月瞻言稽緩湏寘科條梅福跡淪下列志追前古蹔輟九江之仙來從三市之任詞有所屈恐獲戾於錙銖道或可遵豈論􅗅於圭撮薄言未息紛紜一作紛紜猶多宜躬五聽之情方按三章之律傭賃傭賃判有客户閒人請移執事許之恐因有流散不許則見無常職欲允其請仍立案牒為其限約州以為擾具請省裁對閒人者五列在周官雖去家而不歸終寓世而無職喬木空在乗白雲而不見㫁蓬斯飄待凉風而未得今乃請移執事願効劬勞誠自强而不息復知一作卸疑迷而可尚必也末遊是恣浮迹難悛許之而行未敢聞命如或恪居爾職無俾我虞遂其由𠂻是亦奚擾况復存乎案牘置以隄防自可定於職司亦何請於華省剉草誤斬指斷判甲顧乙剉草乙睡誤斬指斷請保辜不伏對變古易俗因物造噐蓋取諸用有適於時六職五材既攻金而攻木服牛乗馬亦秣之而策一作莝之甲有顧求乙為傭保徇乎輕篋式供朝夕之資摧以生蒭無乖阜養之事人或因􅄰譬驪龍而自失指致見傷瞻螮蝀而誰敢遂令食黿不効空怒子公喻馬元非豈齊莊叟談疑作誤由彼已歸全既謝於垂堂損乃自貽在理孰當於毁櫝保辜之請法未可依官户判官户灸面送掖庭舊有疹疾所由以非五十已上不許對倬彼舊章聞於白粲嗟夫賤妾𨽻我丹書當年且欲於役身稱疾式曕乎灸面平陽白髪既乏子夫之容應門緑苔爰閇掖庭之恨薄言之訴情或可哀壯齒之年且殊知命嘉所由之直筆執法不回想官户之循涯吞聲未爽奴判下士有僮指干為隣人所告縣斷不應云遇亷賈五一作金之所致州覆無罪對爵以馭賢禄以頒士去嫌守職雖殆亦榮捨道成富在官所醜况位霑下士利掩上農千指家僮等江陵之橘樹萬金賈子均洛陽之富啇畜伎既埓於卓孫遇業頗同於翁伯財之所積但覺浮雲訟之所興果為鳴鼓雖州縣兩斷片折未分而隣人一言商亦可玷士且同於賈豎州頗昧於正刑是可忍焉孰為過者買奴云是良人判王丙於趙丁處買奴勤心至家一月餘日乃自云是良人丙告縣勘是良人科趙丁及奴罪申州州斷科趙丁其奴無罪對美言可市老經之格言聚人曰財彖象之明義王丙室贏龜具指貨蒼頭雖挾諸龎之䂓終成教子之競經三十日非闗買者之􅗅依三千條湏結鬻良之罪丙丁宜從縣斷勤心難聽州裁彼此攸同斯為可矣奴死棄水中判丙奴死不埋棄水中人告之對丙為不道魚鱉何親情之不良僮僕是棄愛其有力未聞削舟之恩欺其逰魂更比懐沙之慘雖不封不樹家僮無𦵏送之儀而載沉載浮甲令有棄屍之禁告言不謬刑典宜申婢判命官婦女阿劉氏先是蔣恭家婢被放為客女懐阿劉娠出嫁恭死後嫂將劉充女使劉不伏投匭訴對阿劉母先從侍兒放為客女夣虵納慶先合一作含候月之胎附馬申觀一作歡即就行霜之禮纔欣執盥仍誕弄塼既而李善主君俄驚闞室孔丘兄子欲契宜家遽擁妖妍將充媵婢徒為枉柳終見稱張望彼劉閨寜甘誦賦均夫鄭室聊事薄言論母既謝萱枝按女即非桃葉方欲指腹稱賤憑胎索婢自可以大匹小將古明今劉氏若屬蔣家秦政湏歸呂族據斯一節足定百端部曲判已男凖格不合取部曲妻違者被䋲訴云強榦弱枝竊將益利未知合利否對國家毎軫納隍偏憂邉徼在庸㣲之俗隔良賤之婚千頭之奴具傳其號百姓之女罕聞其卜故為罔冐取䧟刑書何强榦而弱枝非愛人而治唐諱國議事以制非我博哉斯之謂宜確乎不㧞奴婢過制判得丁上言豪富人畜奴婢過制請據品秩為限約或責其越職論事不伏對品秩異倫臧獲有數茍踰等列是紊典常丁志在作程惡乎集作失過制爰陳誠於白奏俾知禁於素封將使豪富之徒資雖積於鉅萬僮僕之限數無喻於指千抑滛義叶於隨時革弊道符於漢日責其論事無乃失辭若守職以集作而越思則為出位將盡忠而陳計難伏嘉言楚既失之鄭有辭矣文苑英華巻五百三十一
