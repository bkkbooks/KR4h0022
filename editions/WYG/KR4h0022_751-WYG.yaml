body:
  text: 文苑英華巻七百五十二宋李昉等編興亡中魏武帝論一首晉髙祖論一首宋武帝論一首北齊髙祖論一首北齊文襄論一首北齊文宣論一首魏武帝論朱敬則皇漢失圖網漏䜛慝賊臣承間摇蕩宸居宗廟焚燒天子播越於是九州幅裂四海横流釋位勤王天下雲集初平元年後將軍袁術冀州牧韓馥豫州刺史孔伷兖州刺史劉岱河内太守王匡渤海太守袁紹陳留太守張邈東都太守喬瑁山陽太守袁遺濟北相鮑信長沙太守孫堅等同時俱起以討董卓為名然包藏禍心以暴易亂竊命矯制結黨樹朋觀釁待時莫敢先犯唯魏太祖有汴水之戰孫討虜有陽人之師矣觀曹公明銳權略神變不窮兵折而意不衰在危而聽不惑臨事决機舉無遺悔近古已來未之有也故梁國橋𤣥南陽何顒皆云天下將亂非命世之才不能濟也能安之者其在君乎雖復名㣲衆寡地小力窮官渡受圍濮陽戰屈然天下精明之士拓落之材趨若百川之宗巨海遊塵之集髙嶽故有茍彧郭嘉邢顒程昱賈詡朱雲等或斂風長感或一見盡懐然後覽英雄之心騁熊羆之勇挾天子以崇大順扶幼主而顯至公旌賁忠良芟夷叛逆神道輔徳百姓與能武功赫然霸業成矣若乃獲魏种而有疑作宥之髙祖之封雍齒也降張繡而不怨光武之全朱鮪也感臧覇之言以成其氣重闗侯之義抑而不追王霸之術也然後法令嚴峻賞罰必行惟材是求惟力是視縱夷齊滿路顔閔並居未暇存也救弊即可仁則未知且以術臨人力無餘地用智濟物迹若容身欲使蕩蕩𤣥波涯而不竭飂飂薰風周徧草木𤣥雲蔭而方雨黄葉衰而木落不可得也荀文若首預經綸提挈草昧清神昭乎物表妙識出乎機先造我魏邦繄其是頼一言不合五毒將施無詞寄文空器見志可不劇哉加以孔文舉與道翺翔盡忠漢室崔季珪天骨髙爽志在扶傾豈大盜之所安也嗚呼欲盜之子見錦而不見人弭謗之君尤人而不尤已豈知羣鷗不下衆雀遥驚者乎故隂謀未洩天下已知毒志潜行忠良前懼何䕫所以帶藥楊彪由是不出雲長受恩而不謝𤣥徳失箸而思奔席上有懐疑之人閫外少自信之士良可恥也固知曹公不能用天下之材成天下之務也昔周武之澤及昆蟲不能感食薇之士漢髙之功濟草木未能屈歌芝之賢猶且遂其孤貞容其怨讟況功未半古徳異樂推遭神器之流離問寳鼎之輕重欲使庶人不識宜疑心寧可得乎翻乃疾走惡迹掩耳畏聲讎匹夫念平素殺桓邵斃婁珪道路以目天下鉗口豈不惜哉楊徳祖才雖清秀志非逺圖託事行誅死非其罪司馬懿雄材大度勇而有謀審其狼顧知而不剪若言天下疑也則吾未知若言人事也其智安在故知忌小怨而忘逺圖料目前而忽身後豈所謂旁求哲人俾輔後嗣者哉或問曰天厭漢徳海内分崩三雄鼎立俱受眷命乃至控御豪傑削平區宇英圖逺筭何者為先君子曰孫仲謀藉父兄之資負江海之固未敢争盟上國競鹿中原自守未餘何足言也蜀先主抱英濟之器無角逐之材逺竄荆蠻畏曹公神武奄有庸蜀乗劉璋之政衰國小人夷風頹俗陋山川險澁異崤凾之奥區江漢通流殊河洛之朝市豈得抗衡中夏齊足當途乎前賢易地之談全是不闗胷臆且夫度徳而處量力而行劉備豈薄先王之舊居輕齊魯之故俗若泰伯之適吳越孔子之入九夷哉葢不得巳也是知才雄者地廣國大者兵强地既由才才寧可易也晉髙祖論王業不同其來尚矣若乃待辛癸之禪湯武不得稱仁要西伯之資髙光無由濟世或寧亂以得志或興禍以取威遭遇雖殊天命一也宣帝聰豪明允博學洽聞敏而好謀寛而能斷其未得志也服勤王事夙夜在公知無不為芻牧必履取信嚴主所謂能臣也及勲徳日隆雄材漸著權略不世合變如神受命崇華竭股肱於明帝忍死嘉福遂無君於沖人所謂姦臣也及内難既平外㓂斯殄威力翕赫指麾風飛遂乃臨神器以徘徊戮公族以顧望雖大業初稱人望斯存若格以名神請罪不暇歸諸天命則前代有辭美哉未盡善也且成湯之在夏世行仁以動諸侯文王之處殷朝好讓以懐鄰國髙祖以豁逹容物光武以長者得人未有專伏隂謀每行詭計寄何晏以鞠獄示李勝以謬言請戰以見威指水以表信乞襦不與懼有陳恒之譏封墓釋囚不嫌武王之事媿情負理掩耳避聲狼顧以噬魏人狐媚以取天下亦前史所醜也宋武帝論前人葢聖人不能為時亦不能失時歴觀帝王之祚一作作未有不因人墜塗炭而得志或天下嗷嗷新王之資也是知秦有閻趙之隟漢罹莽卓之災晉由曹氏之專宋實桓𤣥之簒始得奮其智力救此倒懸陳浞羿之辜問滔天之罪況劉裕天鍚神勇雄略命世不得疑思漢之謳未暇假從可之㑹同盟二十七願從一百人雷動朱方風發竹里龍驤虎步獨决神襟長劍一呼義聲四合蕩亡楚已成之業復遺晉乆絶之基祀夏配天不失舊物雖古人用兵不足加也至乃網羅俊異待物知人動必應時役無再舉西盡庸蜀北劃大河自漢末三分東晉拓境未能至也或問前史云克敵得雋竒迹多於魏武此𣙜一作權論乎君子曰得雋雖多前非大敵若乃黄帝斬蚩尤髙祖制項籍光武抗尋邑曹公挫本初此是竒迹也至若慕容超政不在躬奴僕下品姚泓宗枝猜貳借手於人盧循佚㓂之餘譙縱新造之國因釁取亂何足可稱至乃潜筭樽俎之間明見千里之外揣機料日不爽錙銖亦古之智士何以加焉但禮樂文明日不暇給垂風邁徳盛疑所未能人望不逮於建安天命乃光於魏武又問曰棄徳非道捨舊無親有宋功臣多不及嗣豈理須然乎請聞其要君子曰且夫奸雄者非淳徳之稱謀勇者乃果決之辭故昔之同盟擬覆前敵故無材不露無心不披譬若同舟遇風寧有隱哉及髙鳥盡盡一作巳死狡兎死死一作復烹其材能我之儔也我非積行累能彼之知也思已之所行恐彼之已叛是以雄猜内發釁兆易萌韓彭以之葅醢劉葛由之覆亡然則髙談堯舜之道不忍論桀紂之行思燕齊之血食見漢宋之不仁故尉繚畏秦王之屈節范蠡識勾踐之忍人綺季不出於商山嫌漢王之侮慢嚴光潜形於草澤知劉秀之未𢎞有㫖哉又問曰宋祖入闗老相駕為此句疑赫連畏逼姚氏淫昏中原士庶恥為臣妾王師衆整頗有禮焉所以扣馬攀車請住闗右宫室陵寢是大漢之遺蹤闗山重復乃有周之長世人與不取違衆獨歸昔項籍見哂於韓生宋髙又失於父老其㫖可得聞乎君子曰論項即非在劉為是以項王之材天下可以力制人心可以勢奪因宫室之嚴守山河之固此九州之上腴何彭城之足筭劉裕家本江南全軍逺克未能制命夏魏施號秦涼雖曰闗中實是邉地鞭長不及馬腹風末不闕王買徳曰貪歸受禪所留不過愛子待歸一舉而可取卒如其䇿智士哉北齊髙祖論昔張譲段珪濁亂天下漢召董卓將顯其誅竟有小平之奔曹氏因之乃創霸業鄭儼徐紇㸃辱皇猷魏收爾朱榮欲洗濯宫掖遂至河隂之禍齊人藉此用承明命故曰亂者理之源機者命之兆不可失也神武崖岸髙疎器宇深沈望之儼然風塵自逺聽之愈厲雷霆或聞至乃足踐列星聲振原疑地赤色映團一作圓焦之外青闕立旅宿之門漢髙由之自負徒屬以之増畏此所謂厯數在躬推之不可去也于時魏徳巳衰羣小得志孝莊殞於賊臣節閔潔疑於兇徒義士痛心壯夫瀝血結黨求同盟之㑹杖劔想勤王之師者徃徃而聚焉所以因天下之心覽英雄之議以普泰元年六月建旗於信都以討爾朱兆為名當時趙魏之豪有髙䖍本傳作乾邕髙敖曹封隆之李元誠本傳作元忠以諱作成盧文緯一作偉崔祖禽疑等盡其死力葢代之傑有尉景段榮彭樂竇泰匹婁昭薛狐廷本傳作狐延等共其奔走然後數亂常之罪顯安忍之辜發義帝之喪三軍縞素承傕汜之逼萬里同心莫不精勇感人神雄略出天地檄詞未草聲巳馳於賊庭王誅欲加乃命懸於鬼籙但天光世與兆同惡大戰韓陵然始得志既而龍驤虎步髙下在心開幕府以臨外藩分腹心而統京邑雖生我者父母立我者髙王既懐震逼之威易為芒刺之説周鄭交惡衍殖構氣趙鞅畏䜛遂起晉陽之甲襄王失㨿乃有居汜之悲雖表數疑相仍公怒未怠紫宸不可乆曠丹穴難以更燻遂應飛來之謡乃議遷都之便闗西河北剪為冦讐天平永熈便成敵國於是疆塲大駭鉦鼓相聞邙山之師扶扶一作杖馬捶而自免砂苑之役跨驝駞以遁歸勝負相參波瀾不定豐功厚利各有可觀者焉昔魏祖西征中道不豫晉景南伐迴兵乃殂此並業未半而意窮功垂成而景促是以留連末命委曲臨終不可盡也尋髙祖其辭魏帝之表可謂其言也哀顧太子之言可謂其事也盡方諸前代各一時也若乃推誠與人懐舊不捨擇子如之蝨㸔尉景之肱本傳作胝喻髙昻於肝膽委侯景於半體此明達也牽馬麥田不飲杜酒此嚴斷也放李穆之歸使其冨貴感虎兕之對以勸事君此宏量也故能廢立雖多不失臣節兵鋒屢折人望攸存即與夫嬖賈充忌荀彧不同時也北齊文襄論神武云日為我蝕今死亦掩本紀作死亦可恨觀其和勑勒之歌哀來何極覽太子之色仍有别憂此豈悲促齡而怨昊蒼哉但强冦在鄰奸臣不附以此為恨也文襄克纂丕基堪負大業追成曩志不忝逺圖故能委任紹宗外平侯景借假貞節内察權豪沙汰衆流釐正羣務紀綱具舉朝野肅然況乃嘉思政之忠遥接其手寤陸生之直更賞其能此亦可稱也且夫為人上者當不忝威儀慎名器先王以之革弊逹人因此垂風是故立其章程明其限節水火可蹈禮教難逾今天䕃甫傾洪基靡構國有大難未可三年不言髙宴後園豈得一朝盤舞此不慎爾儀也若乃命天子為癡人比尊名於狗脚恨崔陵之語不念元勲忿孫騰之儀寧思佐命此不惜名器也加以任情蕩思率意以之紅綺如花妖顔若玉決池而弄淫女下獄而罪貞姬叛髙慎於洛陽幾傾其父蒸鄭妃於内寢乃繫乎親詩曰人而無儀胡不遄死此之謂也嗟乎楚莊絶纓不顯婦人之節鄭人獻㨗尚禮南冠之賢所以盡俘囚之材得醉者之力今者䧟孝騫之罪賞王儀之心拒蘭欽之慈闕專諸之劍非不幸也北齊文宣論文宣承父兄之資㨿巳成之業屈竒不測内剛外柔屬變起不圖禍機竊發臨事而懼警疑作驚而後行故使逆黨無遺兇徒必盡自得政二世樹恩百寮司馬公之養汝只在今日陳恒子之好施惟取一時由是腹心不散勲貴自隨大會晉陽共叙哀酷神彩英颺風調清閑既而人固難知始推天授故曰今日左僕射不減大將軍由是感光禄之言不俟終日聽倉丞之諫理故無歸然逺邇之心赫虎之變爪牙夙將帷幄舊臣足使鄰國寖謀殊邦側席況屬梁運道銷江淮家無疑周室厭闗函谷封泥故得北柔沙漠之陲東懐遼海之際政尚明直時實豐盈膏澤始流菁英已竭中山廹於漢獻髙洋劣於魏文但禮樂未施冠履不假髙論王道此實多慚或問曰夏桀無道殷辛虐政舉烽而求一笑擊鼔而飲三千雖曰荒淫未窮鄙穢猶稱有夏多罪天命殛之皇天震怒命我文考今者顯祖狂昏中酒而作莫不手自支解躬行刺斫大集婬嫗為笑目前廣命宗親聚麀座上鄴城無自保之容當軒有供御之困或臋行以罵衆寮或擘凥以示羣下加以土木不息金鳯臨雲徴斂日増長城千里仍得快樂世以保乂豈天地不仁降災萬姓之疑將多僻適與相逢岐路無歸我心如醉此即甘酒嗜音之談盖成虚論三風十愆之説併是髙談君子曰源深者流長徳盛者祚逺黶之汰雖著書之徳在人齊神武伐暴勝殘有大功於天地其嗣雖復失道仍未殛於神明故書曰天惟五年須夏湯之子孫是也問曰神武之初基實多佐命文宣應籙共匡霸圖其間文武髙材略不世出風流名士㧞萃逸羣屬主暴政荒時艱路澁未有裂裳逺竄行從近闗聞者尚足動心遇者曽不驚慮此復何哉君子曰逹人之道布在方冊顯晦之迹理同可尋若乃色斯舉矣翔而後集則仲尼去衛夷齊讓國清風流長髙節逺列固絶倫矣其次則南山之叟東門之賢范蠡泛江湖尉繚去城市此又見幾而作也亦有貞不絶俗隱不違親冥黙園林巻舒人事八月羊酒聘之而不來四時束帛徴之而不屈亦可與語上矣過此以徃何足言哉良為道喪已乆亷恥不追崩騰闇主之朝淪没驕君之世何足怪乎悲夫嚴尚既殁誰與為言俗物滿塗彼衆我寡俾將來不昧知其志焉哉文苑英華巻七百五十二
