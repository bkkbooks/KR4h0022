body:
  text: 文苑英華巻七百三宋李昉等編文集五右拾遺朱君集序一首監察御史儲公集序一首相公李公集序一首秘書監包府君集序一首常州刺史獨孤公集後序一首補闕李君前集序一首崔處士集序一首右僕射姚公集序一首右拾遺吳郡朱君集序顧况因都國出麟角鳯喙為續斷之膠與本無異朱君能以煙霞風景補綴藻繡符於自然山深月清中有猿嘯復如新安江水文魚彩石歴歴可數其杳瓊翛颯若有人衣薜荔而隱女蘿立意皆新可創離聲樂友之什情思最切雖有諌職心遊江湖謝病而來慕出塵之侣精好涅槃維摩經愛人為善有志未就終於廣陵舟中識與不識聆風嚮義相與興歎我主人延陵包君兵部李侍郎禮部劉侍郎皆有託孤之舊子郁襲其先行敬事父友泣捧遺文祈余冠序監察御史儲公集序光羲聖人賢人皆鍾運而生述聖賢之意亦鍾運盛衰矣開元十四年嚴黄門知考功以魯國儲公進士髙第與崔國輔員外綦母潜著作同時其明年擢第常建少府王龍標昌齡此數人皆當時之秀而侍御聲價隱隱轥轢諸子其文篇賦論凡七十巻雖無雲雷之㑹意氣相感而扶危拯儲集作急病綽有賢逹之風㧞身虜庭竟陷危邦士生不融可以言命然窺其鴻黄窈窕之學金石管磬之聲如登瑶臺而進玉府靈篇􅃉宇景物寥映緑流翠草佳木好鳥不足稱珍嗣息曰溶亦鳯毛駿骨恐墜先志泝洄千里泣拜告余曰集作云我先人與王右丞伯仲之歡也相國縉雲甞以序冠編次㑹縉雲之謫亡焉後軰據文之士風流不接故小子獲忝操簡伏恐魂遊無方􅅓責造次茫茫古道不見來者豈以龍戰害乎鹿鳴集作門齊竽競吹燕石争寳嗚呼薄遊之士未躋一峯己代其峻登閬風者乃知其迤邐昏明掩豁將盡復通之者其若是乎丞相鄴侯李泌文集序梁肅唐興九世天子以人文化成天下王澤洽頌聲作洋洋焉與三代同風其輔相之臣曰鄴侯李公泌字長源用比興之文行易簡之道賛事盛聖辨章品物踈通以盡理閎麗而合雅舒巻之道必形於辭其偉矣夫予甞論古者集作之聰明睿智之君忠肅恭懿之臣叙六府三事同八風七律莫不言之成文歌之成聲然後浹於人心人心安以樂播於風俗風俗厚以順其有不由此者為理則粗在音則煩粗之弊也悖集作朴煩之甚也亂用其道行其位者歴選百千不得十數嘻才難不其然乎開元中公七嵗見丞相始興張公九齡張駭其聰異授以屬辭之要許以輔相之業洎始興末不六十載公果至宰相封侯有文集二十巻其習嘉遯則有滄浪紫府之詩其在王庭則有君臣賡載之歌或依隱以翫世或主文以譎諌歩驟六義發揚時風觀其詞者有以見上之任人始興之知人者己初太上當陽公以䖏士延登内殿實敷黄老之訓至德初宣皇以元良受禪公則獻太階頌昭纂堯之道睿文以廣平伐罪公則握中權之柄叅復夏之功大德不官既追五嶽之隱大用不噐終踐代天之職方將熙庶工以成邦教載直筆以修唐書命之不融凡百興歎既薨之來載皇上負扆之暇思索時文徵公遺編藏諸御府於是公之文辭光大一門四字集作大光近嵗集作間一嵗肅以監察御史徴詣京師始得集録於公子繁且以序述見託公之執友諌議大夫北平陽城亦謂予曰鄴侯經邦緯俗之謨立言垂世之譽集無此六字獨善兼濟之畧藏在册牘載於碑表唯斯言不可以不傳於後甞謂肅曰集無此四字吾子辭直盍存乎篇序既咏嘆之不足因著其所以然貽諸好事者凡詩三百篇誌表記集作頌賛序議述又百有二十其五十篇缺獨著其目云秘書監包府君集序文章之道與政通矣世教之汚崇人風之薄厚與立言立事者邪正臧否皆在焉故登髙能賦可以觀者與圖事誦詩三百可以將命可與專對若子産入陳以文辭為功仲尼弟子用文學命科文學者或不偹德行德行者或不兼政事於戲才全其難乎有唐故秘書監丹陽公包氏諱佶字㓜正烈考集賢院學士大理司直贈秘書監諱融實以文藻盛名揚於開元中洎公與兄起居何又世其業競爽於天寳之後二字集作末其後一動一静必形於文辭由是議者稱為二包孝友之美聞於天下擬諸孔門則何居集作得德行公居政事而偕以文為主不其偉歟諷諭其從政則執度行志率誠㑹理不苟簡晦昧以撓其守故其言體要而動有事功易稱君子之光傳羙忠文之實公之謂也集作矣常州刺史獨孤及集後序大厯丁已嵗夏四月有唐文宗常州刺史獨孤公薨于位秋九月既塟集無此五字門下士集作客又作生安定梁肅咨謀先逹稽覽故志以公茂德映乎當世美化加乎百姓若發揚秀氣磅礴古訓則在乎斯文斯文之盛不可以莫之紀也於是綴其遺草三百篇為二十巻以示後嗣且集作乃繫其辭曰夫大者天道其次人文在昔聖王以之經緯百度臣下以之弼成五教德又下衰則怨刺形於歌詠諷議彰乎史册故道德仁義非文不明禮樂刑政非文不立文之興廢視世之治亂文之髙下視才之厚薄唐興接前代澆醨之後承文章顛墜之運王風下扇舊俗稍革集作作者迭起不及百年文體反正其後時寢和溢而文亦隨之天寳中作者數人頗節之以禮集無其後至以禮二十三字洎公為之集作之為於是集作則又操道德為根本揔經籍集作禮樂為冠帶以易之精義詩之雅興集作訓春秋之褒貶屬之於辭故其文寛而簡直而婉辨而不華博厚而髙明論人無虚美比事為實録天下凛然復睹兩漢之遺風善乎中書舍人崔公祐甫之言也曰常州之文以立憲誡世褒賢遏惡為用故議論最長其或列于集作於碑頌流於詠謌峻如嵩華浩於集作盛如江河若賛堯舜禹湯之命為誥為典為謨為訓人皆許之而不吾試論道之位宜而不陟誠集作哀哉公諱及字至之秘書監府君之中集作第四子道與之粹天授集作付之德聰明博逹剛毅正直中行獨復動静可則孝弟集作仁厚積為文本文藝成乎餘力凡集作其立言必忠孝大倫王霸大畧權正大義古今大體其中雖波騰雷動􅁸伏萬變而殊流㑹歸同志於道故於賦逺遊頌嘯䑓見公放懐大觀超邁流俗於仙掌凾谷二銘延陵論八陣圖記見公識探神化智集作理合權道於議郊祀配天之禮吕諲盧奕之謚見公闡明典訓綜覈名實若夫述聖道以揚儒風則陳留郡文宣王廟碑福州新學碑成功以旌善人則張平原頌李常侍姚尚書嚴庶子緯給事頴叔墓銘集作誌鄭氏孝行記李睢陽楊懐州碑纂世德以貽後昆則先秘書監靈表陳黄老之義於是有對䇿文演釋氏之奥於是有鏡智禪師碑於論文變之損益於是有李遐叔集序稱物狀以怡情性集作稱物狀之羙而暢其性情於是有瑯琊溪述盧氏竹亭記抒久要於存歿之間則祭賈尚書相里侍郎元郎中集作員外李叔子文其餘紀物叙事一篇一咏皆足以追蹤徃烈裁正狂簡噫天其以述作之柄授夫子乎不然則吾黨安得遭遇乎斯文也初公視肅以友肅亦仰公猶師毎申之話言必先德禮集作道德而後文學且曰後世雖有作者六籍其不可及已荀孟朴而少文屈宋華而無根有以取正其賈生史遷班孟堅云爾吾子可以集作唯子可與共學當視庶子成名四字集作當視斯文肅集作鄙承其言大發䝉惑集作用發吾覆今則巳矣知我者其誰哉遂衘涕為叙俾來者於是集作有以觀夫子之志若立身行道始終出䖏皆載昜銘之狀故不備之集作於此篇補闕李君前集序文之作上所以發揚道德正性命之紀次所以財成典禮厚人倫之義又其次所以昭顯義類立天下之中三代之後其流𣲖别炎漢制度以覇王道雜之故其文亦二賈生馬遷劉向班固其文博厚出於王風者也枚叔相如揚雄張衡其文雄富出於覇􅂗者也其後作者理勝則文薄文勝則理消理消則言愈繁繁則集作斯亂矣文薄則意愈巧巧則集作斯弱矣故文本於道失道則博集傳作之以氣氣不足則餙之以辭盖道能兼氣氣能兼辭不當則文斯敗矣唐有天下㡬二百載而文章三振初則廣漢陳子昻以風雅革浮侈次則燕國張公說以宏茂廣波瀾天寳已集作以還則李員外蕭功曹賈常侍獨孤常州比肩而出集作作故其道益熾若乃其氣全其辭辨六字集作其辭源辨博馳騖古今之際髙歩天地之間則有左補闕李君君名翰趙郡賛皇人也天姿朗秀率性聰逹博渉經籍其文尤工故其作叙治亂則明白坦蕩紓餘集作徐條暢端如貫珠之可觀也陳道義則游泳情性探㣲豁冥渙乎春氷之將泮也廣勸戒則得失相維吉凶相追焯乎元龜之在前也頌公羙則温直顯融恊于大中穆如清風之中人也議者又謂君之才若崇山出雲神禹導河觸石而彌六合隨山而注巨壑盖無物足以導其氣而閱其行者也世所謂文章之雄捨君其集作而誰歟弱冠進士登科觧褐補衛縣尉其後以奏集作書記再叅淮南節度軍謀累遷大理司直天子聞其才召拜左補闕俄加翰林學士夫士之䖏世用捨計集作乎才進退牽乎時始君筮仕值蔽善者當路故屈於下位天寳末房公琯韋公陟薦公充史官諌司之任當國者不聽乃已中歳多難時方用武故屈於外藩及夫入宣室而揮宸翰也方用人文以餙王度則因疾罷免嘻昔之君子賢人運與事并得信其志者稀集作寡矣集作病其餘屬雅道䘮缺黄鐘棄本集作毀棄若孟子撼坷士安多病亦何可勝論唯斯文足以振當世餘烈足以遺後嗣此之謂不朽君既退歸居於河南之陽翟家愈貧而禄不及志逾集作愈邁而文益壯暇日以嘗所述作三十巻目為前集命予序之君與予實有伯喈仲宣之義故書于篇崔處士集序王仲舒帝唐綏珮之士年未壯其文老成者曰博陵崔秀文峻亮而堅剛貞而和止疑立而毅其行也不邇聲利其文也文質相制才氣相發於古人立意中往往振起風雅知君者謂君得詩禮之際自然之機故也方將逞詞縱翰為邦國之聞人遭命否厄若干年而夭嗚呼惜哉甞曰文之難為乆矣世有執異端為公是驅法政為利物或雕刻雪月以趣佻巧或侈􅃷奇詭以新聞見或拘實而忘雄或餙辭而契本使曲直亂次褒貶錯行作者以壓溺䖏之未甞吊也深而通簡而茂華而不流純而不朴仁義物體之序屬辭興事之端於大化也粲而不殊作者之教吾其奉哉由是治帝王之制度以啓箴諌則漢宣中興頌作焉諷前史之闕以貞黜陟則翟儀賛形焉較英雄之功伐以傳後世則三傑頌存焉其餘暢賢人之德評一時之事不附於彼而立於才纍然貫珠於遺體不可備舉與君游者猶是文揆人人在於餘地則君妙識深行又足徴矣噫夫彼化工醇其噐堅其志而不使之遂豈將惑於從善者之心乎余於君從母之昆弟也甞為碣銘志君之文篇目遺逸乃綜而次之叙而引之翟儀疑作翟義王莾時人右僕射贈太子太保姚公集序權德輿見集本文章者其士之藴耶㣲斯文則士之道不彰不明又况宗公大君子綱紀百度琢磨九德以至於經大猷斷大事不由此塗出者猶瞽之無相歟盖修之有本末得之有厚薄耳至若推於心術暢於事業行顧言言中倫者太保有焉太保姓姚氏諱南仲吳興人博究古今安舒方重外清和而内剛明有直質而無流心學於詩之愷悌昜之貞厲且曰史魚仲山甫吾之師也故以之修身以之懿文其遜志肄業通逹強立則博約以明義類郊居宴息勇退肥遁則吟咏以逹情性詳延特起對有明法拾遺補闕在帝左右義激於中書陳於前肝膈悃愊以盡規為已任切於時病者皆精為上言之䟽兩河安危夷門要害盍建元侯以屏東夏疾吏道雜而多端條陳選部官人之法轂下饑旱舉成湯六事凡如此書數十上請改卜貞懿皇后陵地一篇尤深切著明武皇嚮納被以命服因詔侍臣極言得失宰司上賀百執事聳視以為雖神爵黄龍炎漢紀年之瑞不若是也周旋䑓閣損益文憲由左馮翊理陜州教化清平分閫東郡閑邪秉直志氣所伸勇若諸賁天下之人稱焉竟以貞勝而登端右是皆以立誠居業言而履之之効也故其含章匪躬諷議居多其他則歌詩有逸韻叙事為實録皆据根抵而無枝葉愔愔然君子大儒之言其在是乎昔公之理海塩而介浙右也德輿方僑於吳辱忘年之歡暨叨貳六職而公入踐師長馨香茂實耳目聞知公嗣子太僕主簿衮孝謹而文永懐罔極捧公述作二百篇列為十編以論次見授故粗舉公之所履與為文之㫖而叙之云爾文苑英華巻七百三
