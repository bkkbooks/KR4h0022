  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0022_WYG_427-1a, image: WYG1337/WYG1337-0006c.png}
body:
  text: 文苑英華巻四百二十七宋李昉等編赦書八禋祀赦書四寶厯元年正月七日赦文編制門下朕以𦕈薄纂承洪構祗見九廟肇祀二儀外飾備物中惟盡敬一作志昆蟲草木一作水草之實致豐於蠲潔哀樂和愉之感庶交平一作於神明四海駿奔衆祗受職兾下觀而化皆内誠乎心百王之禮樂在陳列聖之聲詩合奏敬極嚴配道備饗親䖍奉成式惕然惴懼而今而後不敢滿假庶無大悔以貽祖考之羞因體元以統厯遂頒一作洽恩而大宥可大赦天下改長慶五年為寶厯元年自寶厯元年正月七日昧爽已前大辟罪已下罪無輕重已發覺未發覺已結正未結正繫囚見徒常赦所不原者咸赦除之其官典犯贓不在免限左降官自長慶四年三月三日制後未經量移者與量移近處已經量移者更與量移如復資者即任依常調選丁憂去任服闋日亦與量移如有親故在上都任於所司陳狀便與處分不必更待本州府申請别勑因責授降資正員官未經改轉者亦與進改亡官失爵放歸不齒者加收叙縱元勑云終身不齒者亦量與收叙流人未到所在及已到者量移近處如已收叙者量才録用并僧尼道士移𨽻者亦與量移近處得罪人已亡歿家口未許歸家者一切放歸如自情愿住者亦任諸色得罪人中如先有勑云縱逢恩赦不在免限者并别勑安置者亦並宜委中書門下量事狀輕重節級處分左降官及流人先有官者如已亡歿各還本官流貶人所在身亡任其親故收以歸葬仍仰州縣量給棺櫬優當發遣諸色人中有痕累禁錮及反逆縁坐等一切並無洗滌常叅官及諸州刺史有先因停替及因病假觧官并終制未授官者委中書門下量才進録勿令稽滯致仕官未經改轉者量改官依前致仕諸軍先擒獲吐蕃生口配在諸處者宜委本道資給放還本國毋許因循所在停住國家與吐蕃舅甥之好彼此無虞自今已後邊上不得授納投降人并擒獲生口等天下諸州府縣官應行鞭捶本罪不至死者假以責情致令殞斃每念於此良増惻然宜委御史臺及出使郎官御史等切加覺察一作察訪仍具事由聞奏澄清教化莫尚乎太學揔一作明治心術必本乎六經天下諸色人中有能精通一經堪為師法者委國子祭酒選擇具以名奏天下州縣各委刺史縣令招延儒學明知訓誘名登科第即免征徭刑罰不清不足以言理職官不重不足以棲賢開一作閑出入之文束上下之手必資慎選庶叶詳平大理寺官屬比來吏部所授多非其才宜令精選有志行文一作詞學兼詳明法律者注擬其有課績特殊堪在朝奨者臺省有闕宜先選擢一夫不獲時予之辜茍有向隅之悲遂軫納溝之慮如聞去冬吏部三銓選人駁放者衆或文状夙昔一作粟錯或書判差池主司守文不得不爾既施惠澤亦有一作在霑恩其長名及雜駮放選人如有未離京城者委吏部今月内檢勘畢除涉踰濫者餘並却收以地逺殘闕量才注擬如不情願受地逺官亦不可强之仍速處分不得出選限内比者法一作下令懸科彰示大信法既無守人何適從赦命不行因循成俗誕告四方為虚設開施庶政為虚文豈吾德之未明為有司之見負永言歎息中夜疚懷朕即位之初已有赦令至如損徹服御止絶他獻限䘮葬以息淫費禁竒靡以專女工隱實版圖謹守儲備及從他徭擅賦閉糴禁錢吏行姦欺人冐依庇僧道踰濫流貶重輕錢幣利害軍屯侵占車馬衣服之制度公座入已之贓私悉令條䟽貴欲該備頒宣未幾廢格已多或職司堕慢而不能將明或誥命纔行而下已不守以此求理不亦難乎其元和已來詔書并長慶四年三月三日赦令委廢不行事在朕躬者諫官一作自極言得失無有所隱其系一作在䑓閣者左右丞據詔條司額重加分配勿容推倚若因循寢廢無所申明及雖曽宣下不能一作明提舉者具事由聞奏量加沙汰其在有司州郡者委御史䑓及分察使郎中御史一作分察使出使郎官御史度支鹽鐵巡院准前後詔勑切加訪察各具犯狀移勘奏聞其本判官及刺史已下必加貶責用懲不恪如舉察之司循黙自守事狀泄露者亦據容庇量加殿黜仍並委中書門下重有舉明去年三月三日赦令及今年赦文一事已上切加懲督責據時限量官吏勤惰具科殿重輕聞奏京西京北邊上諸軍州鎮自今年已後如有中使及郎官御史奉使到所管並不得與人事物應天下典人莊園店地一作莊田園店便合祗承户稅本主贖日不得更引令式云依私契徵理組織貧人虞氏建官必明黜陟漢朝置吏皆長子孫政成簡用咸登右職近代遷除過速資給轉繁扇為時風莫有固志親人之職為弊尤深甿俗土宜未及週悉迎新送故已聞代換更易一作閱雖遽資望如初善否不分升降莫驗一作辨徒為煩擾無益公私自今已後刺史縣令若無所犯非滿三周年不得除替如理行尤異但議就加其有才宜他職灼然要籍者中書門下先具事由及授上年月奏聼進止滿嵗遷代無闕敗者即與進改磐石維城義深麟趾穠華下嫁禮次椒塗縉紳文武之良才執事恪居之奉職克叅祼獻載叶肅雍亞獻嘉王運終獻循王遹等各賜物一百疋夾侍正衣進珪捧珪各賜五十疋亞獻終獻正衣各賜物四十疋大長公主嗣王郡主縣主各有賜物内外文武見任及致仕官三品已上賜爵一級四品已下加一階合入三品五品欠考未合叙者待考足日聼叙斯文未墜降聖克昌道逾三代之英化立百王之範象賢崇徳垂裔作賓教儀斯崇憲章無改文宣王二王三恪各與一子官其祠廟委所司量加修餙克稱敦一作淳叙周述本枝睦族是先觀親斯在皇五等已上親三品以上賜爵一級五品已上加一階六品已上及前資常選散官簡選日優與處分未有出身陪位者每家放一人出身應陪位者皇儲五等以上親及太皇太后皇太后三等已上親三品已上賜爵一級四品已下加一階諸親四等及諸州賀正官并諸色陪位官等五品已上加一階六品已下及白身人並賜勲兩轉其前資及有出身者各减一選締構興王弼成昌運勲藏冊府烈冠史編九原推可作之風百代凛如生之氣載懷丕績何日敢忘武德以來配饗功臣及將相名節尤著長慶四年三月三日制未霑甄叙者委中書門下條䟽聞奏量加優奨故尚父汾陽王贈太師晟贈太尉秀實子孫中未曽經甄奨者每家與一人正員官元和已來有因戰伐死於王事其名跡顯著未有優贈者各委本道節度使條録聞奏如勘覆詣實當有處分其有骸骨暴露者宜令所在埋瘞𢎞教愛之典一作理爰命推恩念追逺之懷用頒徽贈常叅官及諸州府長官父母見存未有官封者並量與五品致仕官及階并邑號父母亡歿未經追贈者量與贈官及邑號已經追贈者更與改贈如贈官已至一品邑號已至國夫人者不在此限中書門下及節度使帶平章事者宜與一子正員七品官祖父母父母先亡殁各與追贈經追贈者更與改贈官已至一品邑號已至國夫人者不在此限節度使與一子正員八品官東都留守度支鹽鐵使觀察處置都團練都防禦經畧招討等使及神䇿金吾六軍將軍大將軍上將軍統軍威逺鎮國軍等使皇城留守各與一子正員九品官京兆尹特加一階父母先亡歿未經追贈者各與追贈職脩祀事禮奉嚴禋既洽殊恩宜加異等應郊廟升壇升殿行事官普恩之外宜更加一階如合入三品五品者任待考足日聼叙尚書省三品四品已上中書門下五品已上特加一階便蕃殿省給事郊丘顧以忠勤是宜甄奨内行事官三品已上更賜爵一級四品已下更加一階内侍省及内侍省内坊官四品已上各賜勲五轉五品已下各賜勲三轉應從駕至郊廟者普恩之外三品已上賜爵一級四品已下各加一階品官白身賜勲兩轉環列師營服勞扞衛申威攸属敷惠是膺神䇿六軍金吾威逺皇城及諸道將士等三品已上賜爵一級四品已下加一階無官者賜勲三轉在城神䇿六軍威逺營在右金吾及皇城將士應大禮移仗宿衛御樓立仗等普恩之外三品已上賜爵一級四品已下加一階仍凖舊制賜物有差其神衛將士賜加一階仍凖舊例賜物有差神䇿將士應在京畿諸縣者亦各有賜物應縁大禮職掌行事官并修撰儀注及留守副留守倉庫卿等普恩之外三品已上賜爵一級四品已下各加一階䖍奉職貢載觀致仕官及郊禋俾覃錫賚之恩用廣懷來一作柔之義鴻臚禮賔院應在城内蕃客等各有賜物翰林待詔供奉及諸色直見任及前資并員外試官三品已上賜爵一級四品已下各加一階無官者賜勲兩轉導藩服之誠承帝庭之命忠勤既著勲賞宜周諸道知上都進奏院官在城者各賜勲兩轉應縁大禮四方進表䟽及賀正官各賜勲三轉敬承禋祀賛執豆籩列庶位以觀光酌多儀而中矩誠在儼肅一作恪理叶褒升郊廟行事齋郎减二年勞室長掌座禮生賛者减一年勞無勞可减者便放出身崇𤣥館行事學生及齋郎禮生畨考已滿所司縁大禮却追入行事各减一選國子監學生陪位者賜勲一轉中書門下儀制官各特賜一階應縁祗供作官直司長上諸州行綱考典兩縣耆壽諸色畨役當上在城并量留十二月畨者各賜勲兩轉飛龍閑厩宫苑典引掌扇内園緫監栽接少府將作内中尚武徳軍器内外弓箭庫等諸司諸使下白身人及無品直司定額長上雜匠巧兒黄衣長上監門直長雜使三衛七色引駕細引執扇角手弩手彍騎武士天文觀生厯生漏生典皷典鍾工人樂人主衣主膳主酪典食胡食手宰手掌閑幕士御士醫士獸醫門僕藥僮御書手楷書手典書流外行署等各賜勲兩轉尚年貴老所以教孝也聳義嘉節所以貞俗也天下百姓髙年者上縣以上每縣十人中縣五人下縣三人並以縣界年最髙者充數并孝子順孫義夫節婦先經旌表行義不虧者人各賜米三石絹兩疋仍版受上佐縣君並委令長齎粟帛就家宣賜訖具名本道一併聞奏其未及絹仍於上供數内申破神配峻極德稱靈長秩既升於王公禮合加於牲幣五岳四瀆宜委本州府長吏備禮致祭當極豊潔以副如在之誠書稱望秩禮著不封仰堯舜之聰明慕文武於方冊遐想忠貞之跡緬懷義烈之風能禦大灾咸申祀典名山大川及自古聖帝明王忠臣烈士各令所在以禮致祭亡命山澤挾藏軍器百日不首復罪如初赦書有所不該者所司具作條例聞奏敢以赦前事相告言者以其罪罪之赦書日行五百里布告天下咸使聞知主者施行一作皆唐大詔令文苑英華巻四百二十七
