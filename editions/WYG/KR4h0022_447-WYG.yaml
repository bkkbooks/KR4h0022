body:
  text: 文苑英華巻四百四十七宋李昉等編冊文六九錫文冊陳王九錫文徐陵大哉乾元資日月以貞觀至哉坤元憑山川以載物故惟天為大陟配者欽明惟王建國翼輔者齊聖是以文武之佐磻溪蘊其玉璜堯舜之臣滎河鏤其金版况乎體得一之鴻姿寧陽九之危厄援陳書作拯横流之南史作於碣石撲燎火於崑岑南史作岡驅馭於韋彭跨蹍於齊晉神功行而靡用聖道運而無名者乎今将授公典䇿其敬聽朕命日者昊天不弔鍾亂于我國家漏網吞舟强胡内贔茫茫宇宙惵惵黎元方趾陳書一作足圓顱萬不遺一太清否亢橋山之痛已深大寶迍如平陽之禍相繼上宰膺運康救兆民南史作黔黎鞠旅於滇池之南揚旌於桂嶺之北懸三光於已墜謐四海於羣飛屠猰㺄於中原斬鯨鯢於蒙汜功滿上國光啓中興此則公之大造於我皇家者也旣而天未悔禍夷醜荐臻南夏崩騰西京蕩覆羣胡孔熾藉亂乘間推納藩枝盗假神器冡司昏撓旁引㓂讎旣見貶於桐宫方謀危於漢閣皇運已殆何殊贅旒中國摇然非徒如綫公赫然投􅃑匡救本朝復莒齊都平戎王室朕所以還膺寳厯重履宸居挹建武之風猷彰南史作歌宣王之雅頌此又公之再造於皇家者也應務之初登庸惟始三川五嶺莫不窺臨銀洞珠宫所在寧謐孫盧肇舋越貊為羣南史作災畨部阽危勢将淪殄公赤旗所指祅壘洞開白羽纔撝凶徒粉潰非其神武久䘮南藩此又公之功也大同之末邉政不脩李賁狂迷竊我交愛敢稱大號驕聲陳書作恣甚於尉佗據有連州雄豪熾於梁碩公英謩雅筭電掃風行馳御樓船直跨滄海新昌典徹陳書作澈備履艱難蘇歴嘉寧盡為京觀三山獠洞八角蠻陬逖矣水㝢南史作寓之鄉悠哉火山之國馬援之所不届陶璜之所未聞南史作開莫不懼我王靈争朝邉候歸賝天府獻状鴻臚此又公之功也自冦虜清南史作陵江宫闈幽辱公枕戈嘗膽提劒折心陳書作推氣涌清霄神飛紫路陳書作闥而畨禺連率本自諸夷言得其朋是懷同惡公仗此忠誠乘機勦定執沛令而釁鼓平新野而據鞍此公之功也世道多艱方隅多難勲門桀㸃作亂衡山兵切池隍衆兼夷獠公以國盗邉警知無不為䘏是同盟誅其醜類莫不魚驚鳥散面縳頭懸南土黔黎重保蘇息此又公之功也長驅嶺嶠夣想京畿縁道酋豪逓為榛梗路養渠率全據大都蓄聚逋逃方謀阻亂百樓不戰雲梯之所未窺萬弩各張髙墉陳書作輣之所非敵公龍驤虎歩嘯陟風雲一作雲從風生山靡堅城野無强陣清妖氛於灨石滅沴氣於雩都此又公之功也遷仕凶慝屯據大臯乞活類馬騰之軍流民多杜弢之衆推鋒轉鬭自北阻南頻嵗稽誅實惟勍虜公坐揮三畧遥制六竒義勇同心􅆛貅騁力雷犇電擊谷静山空列郡無犬吠之驚藂祠罷狐鳴之盗此又公之功也王師討虜次届淪波兵乏兼儲士有飢色公廻麾彭蠡積穀巴丘億庾之詠斯豐壺漿之甿陳書作迎是衆軍民轉漕曽無砥柱之難舳艫相望如運敖倉之府犀渠貝胄顧蔑雷霆髙檻層樓仰捫霄漢故使三軍勇恱南史作銳百戰無前承此軍糧遂殄凶逆此又公之功也若夫英圖邁俗義旅如雲湓壘猜擕用淹戎略公志唯同奨師克在和鵠塞非虞鴻門是㑹若晉侯之誓白水如蕭王之推赤心屈禮交盟人祇感咽故能使舟師並路逺近明心南史作逺邇崩心此又公之功也姑熟􅁭要崤函所陳書作阻慿㓂虜據其闗梁大盗負其扃鑰公五南史作一校裁撝三雄並奮右角沙潰左廣土崩南史作左賢右角沙潰土崩木甲殪於中原氊裘赴於江水他他藉藉萬計千羣鄂坂之隘斯開夷庚之道無塞此又公之功也義軍大衆俱集帝京逆豎凶徒猶屯皇邑若夫表裏山河金湯險固䟽龍首以抗殿剪華岳以為城雜虜慿焉强兵自若公廻兹地軸抗此天羅曽不崇朝俾無遺噍軍容甚穆國政方脩物重覩於衣冠民還曕於禮樂楚人滿道争歸於葉公陳書作覩漢老銜恩俱歡於司𨽻此又公之功也天子内難南史作内難初静諸侯出闗外郡傳􅇏鮮卑犯塞莫非沮渠當户中貴名王冀馬迾於淮南胡笳動於徐北公舟師坐南史作步甲亘野横江殱厥羣羝逐殫封狶莫不絓木而止戎車靡遺遇濘而旋歸駿陳書作􅆖盡殪此又公之功也公克黜禍難劬勞皇室而孫寗之黨翻啓狄人陳書作心伊洛之間咸為虜戍雖金陵佳氣石壘天嚴或作巖朝闇戎塵夜喧鉦鼔公三籌旣畫八陣斯張裁舉靈鉟亦抽金僕咸俘醜類悉反髙墉異李廣之皆誅同龎元之盡赦此又公之功也任約叛换梟聲不悛戎羯貪婪狼心無改穹廬氊幕抵北闕而為營烏孫天馬指東都而成陣公左甄右落箕張翼舒掃是欃槍驅其玁狁長狄之種埋於國門椎髻之酋烹於軍市投秦坑而盡沸噎滍水而不流此又公之功也一相居中自折彛鼎五湖小守妄懷同惡公夙駕兼道秉羽杖戈玉斧将揮金鉦且戒妖冦南史作酋震慴遽請灰釘爇櫬以表其含𢎞焚書以安其反側此又公之功也賊龕凶横陵虐具區阻兵安忍慿災怙亂自古蟲言鳥跡渾沌洪荒凡或䖍劉未此殘酷公雖宗居汝頴世寓東南育聖誕賢之鄉含章挺生之地眷言桑梓公私憤切卓爾英猷承規奉筭戮此大憝如烹小鮮此又公之功也亂離未久陳書作永羣盗孔多浙右凶渠連兵搆逆豈止千兵五校白雀黄龍而已哉公以中軍無率選是親賢姦㓂途窮自豈止至途窮二十七字見陳書而南史及英華但云勢窮力蹙而已漼然氷泮刑唐陳書作溏又注作塘之所文命動其天陳書作大威雷門之閫陳書作間勾踐行其嚴戮英規聖跡異代同風此又公之功也同姓有扈頑凶不賓憑藉宗盟圖危社稷觀兵滙澤勢震京師威廹蠻夷陳書作驅率南蠻已為東帝公論兵於朝堂之上决勝於樽爼之間㓂賈樊滕浮江下瀨一朝翦撲無待甸師萬里澄清非勞新息此又公之功也豫章祅㓂依憑山澤繕甲完聚多歴嵗時結從連横爰洎交廣吕嘉旣獲吴濞已摐命我還師征其不恪連營盡㧞偽黨斯擒曜聖武於匡山廻神旗陳書作旌於蠡𣲖此又公之功也自八紘九野𤓰割一作剖豆分竊帝偷王連州比縣公武靈已暢文徳又宣折簡馳書風猷斯逺至於蒼蒼浴日杳杳無雷北洎丈夫之鄉南踰女子之國莫不屈膝拜手陳書作膜拜請陳書作求吏欵闗此又公之功也京師禍亂亟積寒暄䨇闕低昻九門寥豁寧秦宫之可視豈魯殿之猶存五都簪弁百僚卿士胡服縵纓咸為戎俗髙冠厚履希復華風宋微子麥穟之歌周大夫黍離之詠較於斯日未足為悲矣公求衣昧旦昃食髙舂興構宫闈具瞻遐邇郊庠宗稷之典六符十等之章復南史作還聞太始之風流重覩永平之遺事此又公之功也公有濟天下之勲南史作重加之以明徳成性合道盛徳符天南史作凝神體道合徳符天用百姓以為心隨萬機以成務恥一物非唐虞之民歸含靈於仁夀之域上徳不徳無為以為夏長春生顯仁藏用忠信為寳風雨弗騫陳書作無􅄽仁惠為基牛羊勿踐功成治定南史作化合樂奏咸雲安上治民南史作御人禮兼文質物色丘園衣裾里巷朝多君子野無遺賢菽粟同水火之饒工商富猗頓之旅是以天無蘊寳地有呈祥潏露卿雲朝團晩陳書作曉映山車澤馬服馭金閑陳書作登旣昺煥於圖書方葳蕤於史牒髙勲踰於象緯積徳冠於嵩華固無徳而稱者矣朕又聞之前王􅈗世茂賞尊賢式樹藩長揔征羣伯二南崇絶四履遐曠泱泱東南史作表海祚土維齊巖巖泰山俾侯于魯抑又勤王反鄭夾輔遷周召伯之命斯隆河陽之禮咸備况復經營宇宙寧唯斷鼇足之功𢎞濟蒼生非直鑿龍門之險而疇庸報徳寂爾無聞朕所以垂拱當宁載懷慙悸者也今授公相國以陳留等十郡六字南史作以南豫州之陳留南丹陽宣城揚州之吴興東陽新安新寜南徐州之義興江州之鄱陽臨州十郡封公為陳公錫茲青土苴以白茅爰定爾邦用建冡社昔姬南史作旦奭分陜俱為保師晉鄭諸侯咸作卿士兼其内外禮實攸宜今命使持節兼司空王通授相國印綬陳公璽紱使持節兼司空王㻛授陳公茅圡金獸南史作虎符第一至第五左竹使符第一至第十相國秩踰三鉉任揔百司位絶朝班禮由事革其以相國揔百揆除録尚書之號上所假節侍中貂蟬中書監印章中外都督太傅印綬義興公印䇿其鎮衛大将軍揚州牧如故又加公九錫其敬聽後命以公禮為楨幹律等䘖䇿四維皆舉八柄有章是用錫公大輅各一𤣥牡二駟以公賤寳崇糓䟽爵待農室富京坻民知榮辱是用錫公衮冕之服赤舄副焉以公調理隂陽燮諧風雅三靈乆降萬國和同是用錫公軒縣之樂六佾之舞以公宣導王猷𤣥南史作𢎞闡風教光景所照鞮象必通是用錫公朱户以居以公抑揚清濁褒徳進賢髦士盈朝幽人虚谷是用錫公納陛以登以公嶷然廊廟為世鎔範折衝四表臨御八荒是用錫公虎賁之士三百人以公軌陳書作執兹明罰期在刑厝象恭無赦干紀必誅是用錫公斧鉞各一以公英猷逺量跨厲嵩溟混一作包一車書括囊寰宇是用錫公彤弓一彤矢百盧弓十盧矢千以公天經地義貫徹幽明春露秋霜允供粢盛是用錫公秬鬯一卣圭瓉副焉陳國置丞相以下一遵舊式徃欽哉其恭循朕命克相皇天𢎞建邦家允興洪業以光我髙祖之休命唐王以相國揔百揆并九錫詔王言㑹最詔曰於戯惟爾假黄鉞使持節大都督内外諸軍事録尚書大丞相新除相國揔百揆唐王夫乾道貞觀四象所以運行坤徳含𢎞萬有憑其載育是以天地交泰資始由乎聖人隂陽順成揔已歸其元輔故能陶甄百物代彼天工息四海之羣非㢠廻三靈之掩耀百揆時叙五典克從伊尹格于皇天公旦光於四表方諸蔑如也今将授王典冊其敬聽朕命上天不造降禍于我國家髙祖棄盛業而昇龍太上釋寳圖而委御王室如燬喪亂𢎞多數屬道消時鍾世季郊廟絶主有若綴旒則我祖宗之基已墜于地矣王應幽明之道從兆民之欲奉七璽於代邸飛六轡於周京此則綱我絶紀為有大造於皇家者也曩者塞表省方羣胡反噬矢流君側圍甚平城淪陷有期阽危莫恤王釋位同謀揔戎千里晨炊蓐食倍道兼行匈奴逺跡乘輿反正此又王之功也歴山飛稱兵燕趙妄假名號河朔響應山西屯結王道啓戎行大殱醜類此又王之功也夷狄貪婪屢犯闗塞逼脇良善殺掠吏民王鞠旅治兵巻甲長騖追奔逐北掃地無遺此又王之功也威王徒黨潜謀逆亂外交邉裔内騁姦回實繁有徒将傾宗社王収戮凶渠罪人斯得此又王之功也四郊多壘三輔倒懸黄圖示宫闕之名赤眉刼園陵之禍凶荒仍嵗荆棘旅庭王投袂義舉星言電邁取霍邑若摧枯舉秦闕如反掌尅清河渭志存匡復此又王之功也北荒獯鬻事藉覊縻比者中原多故龍堆道絶王式遏有方􅍁闗請吏更敦隣睦復我舊藩此又王之功也汾晉地險逋逃攸聚山藏川量負罪稽誅類馬騰之乞活同􅃊尤之盡赦王懷柔伏叛杖信示威交臂屈膝申其正旦此又王之功也河潼轉漕宻邇闗畿京坻委積由來尚矣羣凶保據一鼓而崩此又王之功也京師危逼姦臣放命異一象之居内同四凶之扇禍王大誓師旅興言感慨蕩清上國拯厥贅旒暴骨焚屍並勦羣惡此又王之功也上天貽愛莫甚乎民爰作聖哲弼于冲㓜官守司存社稷有奉濟方割於下墊爍圓光於上墋此又王之功也唐弼凶豎草竊岐陽吞噬舊邦侵逼都鄙王制以銜䇿觀其携貳新疑作親衆叛離我盡収之此又王之功也華陽黒水控接岷峨山川阻深盡為逋藪義風所麾行化江漢此又王之功也薛舉崇姦同惡相濟僣擬輿服滔天泯夏西土游魂秦川肆毒赫斯授律咸俘醜類岐隴齊其京觀汧渭為之不流此又王之功也三蜀隩區一都之㑹夷民雜糅蠻陬荒梗王發一介之使降咫尺之書而靈闗洞開劔閣無隘此又王之功也𢎞農甸服襟帯河洛鞠為㓂場連城阻亂長䇿逺振不征而服此又王之功也王有濟天之勲重之以明徳爰初發迹肇自鴻基峻極於嵩華潤連於溟渤體兹将聖道被如仁在物不失其宜含靈咸安其所春生夏長信及四時地平天成義兼一徳揔萬機之務因百姓之心保乂我皇家𢎞濟其多難者也是以濟濟多士庶政緝熈穆穆四門要荒式叙敦澆風以勵俗暢和氣以調元神功侔於造化積徳髙於垂象朕又聞之先王之􅈗世也尊賢尚徳茂賞疇庸五侯專征九命作伯周襄光錫桓文是膺大啓南陽以表東海况今業冠伊稷功髙晉鄭酬勲蔑爾朕甚懼焉今進授相國以河内汲郡清河武安魏郡信都髙陽平原趙郡襄國通前二十郡増封唐國錫以黑土苴以白茅爰定爾邦用建宗社一作冡昔周邵分陜咸為保傳毛畢諸侯入作卿士内外之任禮實攸宜今授相國印綬唐王璽紱茅土金獸符第一至第五竹使符第一至第十相國體絶羣臣任揔百司朝班彛數宜與事革其以相國揔百揆去録尚書之號上所假黄鉞中外都督丞相印綬又加王九錫其敬聽王命以王䋲紀禮度哀矜折獄罔不用情無或遷志是用錫王大輅戎輅各一𤣥牡二駟以王分地敦本民天是頼䟽爵務農所寳惟榖是用錫王衮冕之服赤舄副焉以王風雅所被獯戎咸格隂陽順理遐邇宅心是用錫王軒縣之樂六佾之舞以王翼宣黄道義齊疑遐暢三才所運四海攸歸是用錫王朱户以居以王登賢命世褒徳昇朝思帝所難能官流詠是用錫王納陛以登以王正色持衡鎔範御下式遏姦宄蕩滌華裔是用錫王武賁之士三百人以王威同夏日厲等秋霜刑有其章寛而不漏是用錫王鈇鉞各一以王明罰信賞折衝無外是用錫王彤弓一彤矢百旅弓十旅矢千以王霜露履踐禋祀恭􅃊天地幽通孝思至感是用錫王秬鬯一卣珪瓉副焉唐國置丞相以下官一遵舊式徃欽哉祗奉大禮用膺多福以光我髙祖之休命可不慎歟文苑英華巻四百四十七
