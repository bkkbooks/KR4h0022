body:
  text: 文苑英華巻三百十九宋李昉等編居處九村墅二十首山莊二十四首田家二十首村墅題王村山叟屋壁錢起谷口好泉石居人能陸沉牛羊上山小集作去煙雨集作火隔林集作雲深一逕入溪色數家連竹隂藏虹辭晩雨驚隼落殘禽渉趣皆傷集作留目將歸羡在林却思黄紱事辜負紫芝心石門暮春集作藍田春暮前人自哂鄙天多野性閒集作貧居數畝半臨湍一作村端溪雲雜雨來茅屋山雀集作鳥將鶵到藥欄仙籙滿床閒不厭隂符在篋老羞㸔更憐童子宜春服花裏尋師指杏壇秋日冬郊作皇甫冉閒㸔秋水心無事卧對寒林手自栽盧岳髙僧留偈别茅山道士寄書來燕知社日辭巢去菊為重陽冐雨開淺薄將何稱獻納臨岐終日自遲回晩到盩厔耆老家盧綸老翁曾舊識相引到柴門苦話别時事因尋溪上村數年何處客近日幾家存冒雨㸔禾黍逢人憶子孫亂藤穿井口流水到籬根惆悵不堪住空山月又昏朱陳村白居易徐州古豐縣有村曰一作名朱陳去縣百餘里桑麻青氛氲機梭聲軋軋牛驢走紛紛集作紜女汲澗中水男採山上薪縣逺官事少山深人俗淳有財不行商有丁不入軍家家守田集作村業頭白不出門生為陳村民死為陳村塵田中老與㓜相見何欣欣一村惟兩姓世世為婚􅊚其村惟朱氏陳氏二姓而已親踈居有族少長遊有羣黄鷄與白酒歡㑹不隔旬生者不逺别嫁娶先近隣死者不逺葬墳墓多遶村既安生與死不苦形與神所以多夀考往往見𤣥孫我生禮義鄉少小孤與貧徒學辨集作辯是非秪自取辛勤世法貴名教士人重冠婚以此自桎梏信為大謬一作天僇人十嵗解讀書十五能屬文二十舉秀才三十為諫臣下有妻子累上有君親恩承家與事國望此不肖身憶昨旅遊初迨今十五春孤舟三適楚羸馬四經秦晝行有饑色夜寢無安魂東西不暫住來往若浮雲一作飄作風中雲離亂失故鄉骨肉多散分江南與江北各有平生親存者終日别逝者隔年聞朝憂卧至暮夕哭坐逹一作遲晨悲火燒心曲愁霜侵鬢一作髮根一生苦如此常羡陳村人山村姚合喜得山村住閒眠夣不驚曉泉和雨落秋草上堦生因客始沽酒借書方到城新詩聊自遣豈是趂聲名村中閒歩劉得仁閒共野人臨野水新秋髙樹掛晴暉不知塵裏無窮事白鳥雙飛入翠微再經三叟居周賀停橈因舊識白髮問波濤以我往來倦知君耕稼勞渚田臨舍盡坂路出簷髙愛此還南去終期㑹爾曹題村舍杜牧數樹稚桑春未劘扶牀乳一作兒女午啼鷄潜銷時鑠歸何處萬户集作指侯家自不知村行前人春半南陽西柔桑過村塢娉娉一作裊垂楊風㸃㸃過塘雨蓑唱牧牛兒籬窺舊裙女半濕解征衣主人饋鷄黍題春日韋曲席野老村舍二首許渾背嶺枕南塘數家村落長鶯啼中一作㓜婦嬾蠶出小姑忙煙草近溝濕風花臨路香自憐非楚客春望亦心傷二遶屋遍桑麻村南第一家林繁樹勢直溪轉水紋斜竹援晝㸔笋藥欄春賣花故園歸未得到此是天涯馮叟居劉駕天作馮叟居山僧尚嫌僻開門因兩樹結宇倚翠壁溪南有微徑時遇採芝客往往白雲生對面千里隔機忘若童僕常與猿鳥劇曬藥上小峯庭深無日色自從忘歸鄉一作歸鄉里不見舊親戚纍纍子孫墓秋風吹古栢宿江叟島居張喬一家煙島隈一作上竹裏夜忩開數𣲖分湖一作潮去千檣聚月來石樓雲斷續澗渚鴈徘徊了得平生志還歸築釣臺潯陽村舍前人荒林寄逺居坐卧見樵漁夜火隨船逺寒更出郡踈雪迷登岳路風阻轉江書寂寞髙忩下思鄉嵗欲除江村前人貧遊無定蹤鄉信轉難逢寒渚暮煙濶去㠶歸思重湖平低戍火木落逺山鍾况是漁家宿踈籬響夜舂書村叟壁鄭谷草肥朝牧牛桑綠晩鳴鳩列岫簷前見清泉石下流春蔬和雨割社酒向花篘引我南臨水一作陂去籬邊有小舟旅寓洛南村舍前人村落清明近鞦韆稚女誇春隂妨柳絮月黑見梨花白鳥窺漁綱青帘認酒家幽棲雖自適交友在京華宿島徑夷山舍陳陶百里遵島徑逢征信邅廻暝依漁樵宿似過一作遇黄金臺缺齧心未理寥寥夜猿哀山深石牀冷海近腥氣來主人意不淺屢獻流霞盃對月撫長劔愁襟紛莫開九衢平如水胡為渉崔嵬一飯未遑飽鵬圖信悠哉山濤謔細君吾豈厭蓬萊明登又驅馬客思一徘徊東一作陳韋曲野思唐彦謙澹霧輕隂匝四垂緑塘秋望獨顰睂野蓮隨水無人見寒鷺窺魚共影知九陌要津勞目擊五湖閒夣誘一作有心期孤燈夜夜愁欹枕一覺一作覽滄洲似昔時山莊和從弟祐山家二首王褒採藥名山頂時節無春冬散雲非一色連嵓異衆峯合㳫似無徑間闗定有蹤山忩臨絶頂檐溜俯危松空林鳴暮雨虛谷應朝鍾仙童時可過羽客屢相逢若值韓衆藥當御長房龍二結交非俗士山侣自招携少華隠日月太乙尋虹一作雲霓衆林積為籟圍林茂成裨一作拱成枅幽谷曙無景荒途晝欲迷滴瀝寒泉溜呌嘯秋猿啼白雲帝鄉起神禽丹穴栖箭篠時通徑桃李復成蹊今身得其所羣物可令齊田一作山家三首王績阮籍生平一作涯嬾嵇康意氣踈相逢一飽醉獨坐數行書小池聊養鶴閒田且牧猪草生元亮逕花暗子雲居倚杖一作牀㸔婦織登壠課兒鋤廻頭尋仙一作㸔代事併是一空虛二家住箕山下門枕潁川濵不知今有漢惟言昔避秦琴伴前庭月酒勸後園春自得中林士何忝上皇人三平生惟酒樂作性不能無朝朝訪鄉里夜夜遣人酤家貧留客久不暇道精麄抽簾持益炬拔簀自燃爐恒聞飲不足何見有殘壺和石侍郎山莊楊炯煙霞排俗累嵓壑只幽居水浸何曾畎荒郊不復鋤影濃山樹宻香淺澤花踈濶塹防斜徑平堤夾小渠蓮房若箇實竹節幾竿一作重虚蕭然隔城市酌醴焚枯魚春晩山莊率題二首盧照隣田家無四隣獨坐一園春鶯啼非選樹魚戱不驚綸山水彈琴盡風花酌酒貧年華已可樂髙興復留人二顧歩三春晩田園四望通遊絲横惹樹一作􅇢樹戱蝶亂依藂竹嬾偏宜水花狂不待風惟餘詩酒意當了一生中和夏日幽莊前人聞有髙蹤客耿介坐幽莊林壑人事少風煙鳥路長瀑水含秋氣垂藤引夏凉苖深全覆隴荷上半侵塘釣渚青鳧沒村田白鷺翔知君振竒藻還嗣海隅方山莊休沐一作和夏日山莊前人蘭署乗閒日蓬扉狎遁栖龍柯踈玉井鳳葉下金堤川光摇水箭山氣上雲梯亭幽聞唳鶴忩曉聽鳴鷄玉軫臨風奏瓊漿暎月携田家自有樂誰肯謝清溪初至陸渾山莊宋之問授衣感窮節策馬陵伊闗歸齊逸人趣日覺秋琴閒寒露衰北阜夕陽破東山浩歌歩榛越栖鳥隨我還陸渾山莊前人歸來物外情負杖閱嵓耕源水㸔花入幽林採藥行野人相問姓山鳥自稱名去去獨吾樂無能一作然愧此生藍田山莊前人宦遊非吏隠心事好幽偏考室先依地為農且用天輞川朝伐木藍水暮澆田獨與秦山老相歡春酒前别之望後獨宿藍田山莊前人鶺鴒有舊原一作曲調苦不成歌自嘆兄弟少常嗟别離多爾尋北京路余卧南山阿泉晩更幽咽雲秋尚嵳峩藥欄聽蟬噪書幌見禽過愁至願甘寢其如鄉夣何僕自湯還都經龍門北溪莊宿張左丞崔禮部崔光禄並枉垂光顧數公宿敦道義雅尚林壑謂急於幽尋故此命駕遂不知别有勝賞偶然相過寒暄未周神意已往雲霞之致蔑而不存逸轡放驅清塵徒企耿歎不已而贈是詩韋嗣立附見張說集栖閒有愚谷好事枉朝軒樹接前驅擁嵓傳後騎喧褰簾出野院植杖候柴門既拂林下席仍携池上樽深期契幽賞實謂展歡言末眷誠未易佳遊時更敦俄㸔嘯儔侣各已共飛騫延睇盡朝日長懐通夜魂空聞岸竹動徒見浦花繁多慙春鶯曲相求意猶存奉酬韋祭酒自湯還都經龍門北溪莊見貽集作贈之什張說聞君湯井至蕭灑戱集作憇郊林拂曙携清賞披雲親綠岑歡然遊覽意欵曲望歸心是日期佳客同山忽異尋桃花集作源迂路轉楊柳間門深汎舟伊水漲繋馬香樹隂繁絃弄水族嬌吹狎莎禽春滿汀色􅆺景斜嵐氣突踈簮切懐仁殊未逺重徳匪輕臨來藻敷幽思連詞報所欽春日山莊韋述初嵗開韶月田家喜載陽晩晴摇水態遲景蕩山光浦净漁舟逺花飛樵路香自然成野趣都使俗情忘秋雨輞川莊作王維積雨空林煙火遲蒸藜炊黍餉東菑漠漠水田飛白鷺隂隂夏木囀黄鸝山中習静觀朝槿松下行集作清齋折露葵野老與人争席罷海鷗何事集作處更相疑題李十四莊兼贈綦毋校書孟浩然聞君息隂地東郭柳林間左右瀍澗水門庭緱氏山抱琴來取醉垂釣坐乗閒歸客莫相待緑原集作尋源殊未還陸渾山莊即事見三百十五巻祖詠題趙孟莊楊巨源管鮑化為塵交友存如線昇堂俱自􅆺得路難相見懿君敦三益頽俗期一變心同襲芝蘭氣合廻霜霰石門雲卧久玉洞花尋遍王濬愛旌旗梁竦勞州縣煙鴻秋更逺天馬寒愈健願事郭先生青囊書幾卷王侍御南原莊賈島買得足雲地新栽藥數窠峯頭盤一逕原下注雙河春寺閒眠久晴臺獨上多南齋宿雨後一作夜仍許重來麽過山家張蠙避暑得探幽忘言遂久留雲深忩失曙松合徑先秋響谷傳人語鳴泉洗客愁家山不在此至此可歸休興元沈氏莊唐彦謙清淺縈紆一水間竹岡藤樹小躋攀露沾荒草行人過月上髙林宿鳥還江遶武侯籌筆地雨昏張載勒名山異鄉一笑因酣醉忘却愁來鬢髮斑田家還田舍周捨薄遊久已倦歸來多暇日未鑿武陵嵓先開仲長室松篁日月長蓬麻嵗時宻心存野人趣貴使容吾膝况茲薄暮情髙秋正蕭瑟山林休日田家盧照隣歸休乗暇日饁稼返秋塲徑草䟽王蔧嵓枝落帝桑耕田虞訟寢鑿井漢機忘戎葵朝委露薺草一作齊棗夜含霜南澗泉動冽東籬菊正荒還思北忩下髙卧偃羲皇晩憇田家駱賔王轉蓬勞逺役披薜下田家山形類九折水勢急三巴懸梁接斷岸澁路擁崩查霧嵓淪曉魄風溆漲寒沙心迹一朝舛闗山萬里賖龍章徒表越閩俗本殊一作非華旅行勞一作悲泛梗離贈折一作斷踈麻惟有寒潭菊獨似故園花田家作王維舊榖行將盡良田米可希老年方愛竹卒嵗且無衣雀乳青苔井鷄鳴白板扉柴車駕羸㹀草屩牧豪豨舊雨紅榴坼新秋緑芋肥餉田桑下憇傍舍草中歸住處名愚谷煩君集作何煩問是非渭水集作水田家前人斜陽集作先照墟落窮巷牛羊歸野老念牧童倚杖候荆扉雉雊麥苖秀蠶眠桑葉稀田夫荷鋤至相見語依依即此羡閒逸悵然歌集作吟式㣲田家即事祖詠見集本舊居東臯上左右俯荒村樵路前傍嶺田家遥對門歡娛始披拂愜意在郊原餘霽蕩川霧新秋仍晝喧攀條憇林麓引泉開水源稼穡豈云倦桑麻今正煩方求靜者賞偶與潛夫論集作言鷄黍何必具吾心知道尊田家雜興四首儲光羲田家趨隴畝當晝掩虚闗隣里無煙火兒童共幽閒桔橰懸虛圃鷄犬滿桑間時來集作須臾農事隙採藥遊名山但願所採多不言路險難人生如蜉蝣一往不可攀君㸔西王母千嵗集作載芙蓉顔二梧桐隂去聲我門薜茘綱我屋迢迢兩夫婦朝出暮還宿稼穡既自務集作種牛羊還自牧日旰嬾耕鋤登髙望川陸空山足禽獸墟落多喬木白馬誰家兒聮翩相馳逐三平生集作平時養情性不復計集作知憂樂去家行賣畚留滯南山集作陽郭秋至黍苖黄無人可刈穫稚集作孺子朝未飯把竿逐鳥雀忽見梁將軍乗休出宛郤意氣軼道路光暉滿墟落安知負薪者咥咥笑輕薄四楚山有髙士梁國有遺老築室既相隣向田復同道糗糒常共飯兒孫每集作日更抱忘此耕耨勞愧彼風雨好蟪蛄鳴空澤鶗鴂生集作傷秋草日夕寒風來衣裳苦不早田家書情集作即事前人蒲葉日已長荷集作荇疑作杏花日已滋老農要㸔此貴不違天時迎晨起飯牛雙駕耕東菑蚯蚓集作螾土中出田鳥隨我飛羣合亂啄噪嗷嗷如道饑我心多惻隠顧此兩傷悲發食飼集作撥食與田鳥日暮空筐歸親戚更相誚我心終不移江上田家包何近海川源薄人家本自稀黍苖期臘酒霜葉是寒衣市井雖相識漁樵夜始歸不須騎馬問恐畏狎鷗飛贈田家翁耿緯老人迎客處零集作籬落稻畦間蠶屋朝寒閉田家晝雨閒門閭新薙草樵採舊青山自道誰相友邀人集作余試往還觀田家韋應物見集本㣲雨衆卉新一雷驚蟄始田家幾日閒耕種從此起丁壯俱在野塲圃亦就理歸來景常晏飲犢西澗水饑劬不自苦膏澤且為喜倉廩無宿儲徭役獨未已方慚不耕者祿食出閭里田家即事權徳輿閒卧藜牀對落暉翛然便集作更覺世情非漠漠桃花資旅食青青荷葉製裳集作儒衣山僧相訪期中飲集作飯漁父同遊或夜歸待學尚平婚嫁畢渚煙溪月共忘機田家司空曙田家喜雨足隣老相招携泉溢溝堰壊麥髙桑柘低呼兒催放犢邀集作宿客待烹鷄搔首蓬門下知將軒冕齊田家楊顔小園是生事尋勝日傾壺蒔蔬利於鬻茶青摘已無四隣依野竹日夕共樵枯田家心適時春色遍桑榆南野逢田客楊發桑柘悠悠水蘸堤晩風晴景不妨犂髙機猶織卧蠶子下坂未饑逢飼妻杏色滿林羊駱熟麥凉浮壠雉媒低生時自樂死由命萬事在天管不迷張谷田舍鄭谷見集本縣官清且儉深谷有人家一徑入寒竹小橋穿野花碓喧春澗滿梯倚緑桑斜自說年來稔前村酒可賖田舍曲王貞白古今利名路只在儂門前至老不離家一生常晏眠牛羊晩自歸兒童戱野田豈思封侯賞惟只待豐年征賦豈辭苦但願時官賢時官茍貪濁田舍生憂煎文苑英華巻三百十九
