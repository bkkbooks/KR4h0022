body:
  text: 文苑英華卷四百九宋李昉等編諸使二防禦使授韓洪山南東道防禦使等制賈至勑襄陽太守韓洪左補闕韓絃等令德之後象賢而立克光代業不墜家聲或謀府冲深才膺鎮禦或文律典麗詞叶絲綸今冦虐未清邦家多事用武之地宜徴竒傑掌翰之職故一作政擇英髦洪可山南東道防禦使絃可考功員外郎知制誥授竇紹山南東道防禦使等制門下永王傅竇紹侍御史崔伯陽等強學立名檢身從政實有忠貞之操仍兼鎮禦之才荆州上逰襄陽衝要北據漢沔利盡南海連綴吳蜀非才勿居永思諸葛之謀佇振祖生之任紹可江陵防禦使伯陽可襄陽防禦使餘並如故授李廣璨江南防禦使制勑前蜀郡長史李廣璨閑邪存誠貞固幹事或因旁累徃從遷謫凶逆未翦江介多虞式遏冦戎是仗才傑建康巨鎮長洲右苑使臣之選咸曰其難朂乃謀猷佐斯旄鉞可守丹陽太守授魯冕襄陽郡防禦使制勑成允成功者才也確乎不㧞者節也惟才與節可以戡禍亂定邦家南陽太守魯冕忠肅懿文仁而能武歴危難之隙見貞固之誠自翰守南陽載離寒暑城孤師寡負户以汲虜不得進江漢賴寜古之忠賢無以加也夫功崇者則授以髙位才大者必委之厚權漢水方城國之要害宜加亞相之任兼收御衆之功一作兼收南雍之人可依前件授元載豫章防禦使制勑荆呉之交撫之以連率貢賦所入董之以使臣非通才多可曷稱斯任守職方員外郎元載識度明允幹能貞固懐龍泉之利器抱鴻羽之榮姿彌綸典章能練南宫故亊精詳政理嘗聞五府交辟豫章雄鎮襟帶江湖干戈始寜安人是切俾爾藩守緝熈厥政可豫章太守授杜濟東川防禦使制常衮勑在疑作左綿之東地方千里有被山帶江之險藉安人禦侮之能太中大夫檢校尚書駕部郎中兼侍御史充山南劍卭副元帥判官勾當劍南東川事賜紫金魚袋杜濟明敏通識達於政理本以忠信飾之文學利器能斷長才多可累佐戎幕勤宣武經於蜀之疆積有邉效九伐之謀必勝三軍之士多師選在人望委兹藩守用能訓其師旅惠此閭閻俾叅中憲之任兼懋臨戎之績可使持節梓州諸軍事守梓州刺史兼御史中丞充劍南東川防禦使散官賜如故授栢貞節䕫忠等州防禦使制勑開府儀同三司試太常卿使持節卭州諸軍事兼卭州刺史御史中丞南防禦使及卭南招討使上柱國鉅鹿縣開國子栢貞節雅有器幹深於戎律藴三畧以經武秉一心而事君蜀之西疆久典戎務惠和馭衆義勇安邉克勵公忠尤彰名節令聞休績良深嘉重山硤雄重一作鎮江關要衝實藉兼才俾膺兹任佇申禦遏之用仍懋緝綏之術可使持節都督䕫州諸軍事兼䕫州刺史依前兼御史中丞充䕫忠萬歸涪等州都防禦使本官勲封如故授髙重同州刺史兼防禦使制李虞仲勑漢號左馮翊分理浩穰近者非清名顯秩不在兹選正議大夫行給事中上柱國渤海縣開國男食邑三百户賜紫金魚袋高重沉厚守道貞介操身以禮法為踐履之途以學行為游泳之地堅金不耗止水無波穆然士風休有羙論屬者侍周禁署駮議𤨏闈重席有戴憑之名通經得陳邵之羙侍從之暇附益𢎞多移於牧人宜有善政吾以商原故地灃水攸同襟帶山川接畛甸服掌離宫之管鑰領近關之式遏俾揚風化思得兼材爾宜提舉政經蘇息物力清静率下以奉詔條用答寵榮勿替休問可使持節同州諸軍事同州刺史充本州防禦長春宫等使散官勲封賜如故授李偲隴州刺史兼防禦使制崔嘏勑隴陜之西地連蕃境雖舅甥和好絶塞無虞而邉徼撫循長才以藉爾武能禦冦智可圖功早推奉國之誠共許統戎之畧及位分六校職長千夫彌彰夙夜之勞益盡爪牙之用是思寵擢委以疆場爾宜推赤心以任人勵𤣥甲而訓士約以奉已忠以報君無興踴虜之功更許一作起事邉之計静能制動安亦慮危勉而行之富貴可保將表戎旌之盛仍兼專席之榮可隴州刺史兼御史大夫充本州刺史防禦使授李繼文隴州防禦使制錢珝勑旁據汧陽横當隴首地有提封之盛軍多帶甲之雄既用良材宜膺正秩具官李繼文久從戎旅深達機謀忠信交脩德刑並務御衆而推勞必報狥公而約法甚明元帥上聞朝章可舉兼進祝鳩之命更揚建隼之威夫牧伯之居憂寄寔重使功名之充位在冨貴而可圗已列諸侯勉為政事可依前件授潁州刺史充本州防禦使王敬蕘加檢校太子太保制勑書云若網在綱有條而不紊故國家化條施於天下者牧伯謹而舉之政不紊矣具官王敬蕘始學司馬法克勵諸侯劒奮之以果敢之氣濟之以練達之謀自握郡符頗圖成績潁水則清年數且深理濟彌逺耕桑滿地一作野不奪農時卒乗在軍未忘武備遂得見稱元帥是當善舉化條保民之崇増秩甚貴吾用漢家之典爾登循吏之名更務克終斯為守貴可依前件授齊州刺史充武肅軍防禦使朱玭加檢校司空制勑歴下名地也司空貴秩也處名地而増貴秩者非夫稱推澤洽物情焉得獨受寵章重宣王化具官朱玭當年思立學武有經固忠順之本根以機權為枝葉且能刺部兼務睦隣酌寛猛以守常就變通而處衆為善難掩不伐愈彰見求福於自謀信唯人之可召乃行茂典用叶公言可依前件授鹽州刺史李太直充本州防禦使制前人勑有土之寄帶夫一作虜鄣者不其難乎鞠旅所以謹提防揚威所以遏滛蕩試材既可正秩無疑具官李太直昔爾伯氏嘗居五原以塤箎相和之勞致邉境無虞之樂而天倫有戚戎律可歸乃自人情繼臨軍政勇則匪恕智必好謀知金湯不在乎城池而耳目不專於旗皷勤於宣礪一作勵又作力别用壯心去假守之舊名當諸侯之髙位更圖善最無恃寵休勿使漢家獨稱魏尚可依前件授前河西防禦押蕃落等使馮繼文檢校工部尚書依前充河西防禦招撫等使制薛廷珪勑廼眷西梁為吾右地襟帶河曲屏制蕃使厥土豊穰其俗信厚委之鎮撫率仗勲勤不有奇材孰膺妙簡具官馮繼文傳符圯上擅價山西敦詩書設預備之謀脩禮樂為戰争之器能知軍誌雅有戎容明斥候而辨孤虗恤士伍而愛君子決戰百勝彎弧六鈞動惟鷹揚静則山立乃者仗其韜畧錫以土疆旌旗啓行虵豕當路既沮已成之命能安静勝之謀欽屬久勞名噐斯在爰昇喉舌再統貔貅復我舊恩成爾夙志防禦西夏控壓三州爾其敷我憂勤宣我教化無禮必敗好戰則亡戢兵而善撫疲人殷備而自求多福祗予恩寄佩我訓詞報政可觀陟明斯在可團練使授辛德謙丹延團練使制常衮勑上郡北地義渠故國臨制戎狄屏于闗中當此襟要難於鎮守前朔方留後左廂兵馬使同節度副使開府儀同三司試太常卿兼御史中丞單于副都䕶充振武軍使上柱國辛德謙山西出將代有勲業長才偉畧主之以忠峻節明斷服之以禮頃者職貳留府朔重一作垂分鎮横絶大漠堅守孤城能詳武經載討軍實推以恩信濟其威懐士卒知方羌夷服化休有茂績著於北邉用觀勞臣俾膺重任委以藩事捍兹戎疆列在儲寀之右叅於憲臺之長中外兼榮服我嘉命可試太子詹事兼御史大夫持節都督延州諸軍事兼延州刺史充丹延兩州都團練使守捉使散官勲封如故加韋之晉御史大夫制勑古有牧伯連率所以大明黜陟其後廉使監郡亦其任也奉六條詔書察二千石已下風化綱紀實所繫焉時居部稱最則當遷復留以德授賜今或増秩存於令典銀青光祿大夫檢校秘書監兼衡州刺史御史中丞充湖南都團練守捉觀察處置等使上柱國扶陽縣開國男韋之晉以道自處行成乎身言合精理文多雅興學以潤政當孔氏之徒忠而好謀得兵家之要委在方靣實叅戎重鎮衡陽之一都刺湘中之諸郡清静廉簡以禮化之三老孝悌遵其德訓百城強猾服其威懐薄刑名以宣慈均賦役而恤隱地臨南越溪洞伏戎能清篁竹之風屢入苞茅之貢事各條理俗皆便安非大信至公何以臻此處風憲之長旌理行之尤彰善勸能允兹休命可兼御史大夫餘如故授崔昭宣州團練使制勑宣城彰一作附郡有牛渚介石之險江左多以䕶兵之臣鎮焉國家舊制即廉使之部任兼將守寄功於今始一作姑務靖人中符朝羙銀青光祿大夫守右散騎常侍博陵縣開國子崔昭長才大畧濬發無前納忠事君強學濟吏何劇之不處何難之不居嘗領雍洛屬當殘弊令簡訟平官曹肅給懲姦攝暴都鄙以清風化可行於四方歌謡豈止於千里敬事憂國始終端誠再列貂行久承顧問從容喻旨軒闥増華方頼於左右羽儀以之匡益外中委遇其分一也急在要重時而迭之察俗訓戎歸於辨理叅執閑邪之憲仍加馭貴之爵奉法遵職俾人易從可使持節宣州諸軍事宣州刺史兼御史中丞􅂶宣歙池等州都團練守捉及觀察處置等使并採石軍仍進封博陵縣侯食邑一千户散官如故授陳少逰浙江東道團練使制勑東南一尉在吳越之境海隅蒼生連甌閩之俗既分八使兼督諸戎祿勲任良以濟煩重朝散大夫宣州刺史兼御史中丞宣歙池等州都團練守捉及觀察處置等使上柱國賜紫金魚袋陳少逰清亮肅敬識通才達度於禮而舉得其中積於理而動必歸當叅考經術交脩政刑歴三臺之郎吏首四方之俊選左輔内史嘗寄風化中軍大夫實毗鎮撫事任皆適聲華朗然自彰疑郡分憂于湖申儆悉心以周務忘已以愛人舉綱條之目繕完守之備忠敏内緝服而不離威畧外懐親而不暴載清苛慝盡復流庸雖膠東之户口八萬潁川之理行第一殆無以過也明試以功允兹章陟稱遷大鎮用表懋能仍副丞相以戒羣岳可使持節都督越州諸軍事守越州刺史兼御史大夫充浙江東道都團練守捉觀察處置等使散官勲賜如故授魏少逰洪吉等州團練使制門下東分九江南控百越緫兵車之㑹當水陸之衝式遏澄清實難其任金紫光祿大夫行尚書刑部侍郎上柱國鉅鹿郡開國公魏少逰當官而行直道而進有剛毅能斷之性予之以冲和有精宻至察之才濟之以仁恕三尹京邑四方承流不私身以餙名多去思之遺愛秋典貳職夏臺無寃海隅蒼生疇咨俾乂眷求良吏出守雄藩宜兼亞相之重式光連率之寄可使持節都督洪州諸軍事守洪州刺史兼御史大夫江南西道洪吉䖍撫信袁江饒等州都團練守捉觀察處置及莫傜等使散官勲封如故授象武感疊宕等州團練使制勑開府儀同三司試光祿卿使持節扶州諸軍事兼扶州刺史攝節度副使扶文兩州招討團練使兼綿劒龍遂渝合普漢扶文等一十一州行營兵馬都虞候上柱國交川郡王象武感器幹識畧資之以經逺公忠廉謹守之而有常早探黄石之符久列朱轓之任外鄰戎境内撫疲民誠信不渝威懐相濟克懋分憂之化尤彰式遏之勲右地數州尚多艱阻將論疑朝㫖以綏邉虞不有兼才孰能成務俾叅戎重之副仍錫賞延之寵可試殿中監使持節疊州諸軍事兼疊州刺史充本州團練守捉使兼充疊宕兩州招討使同隴右節度副使仍與一子六品官賜緋魚袋勲封如故授獨孤問俗鄂岳等州團練使制前人勑荆呉邉帶之口江漢朝宗之㑹尚有戎備難於任人外攘内撫文武迭用銀青光祿大夫試秘書監壽州刺史兼侍御史本州團練守捉使及諸道營使下疑本州營田使上柱國獨孤問俗才暢於理識通於政居之以簡敬濟之以廉能中朝清秩更於奬拔外臺雄鎮多所典領嘉績休聲較然明著壽春之課尤最當時守於一郡未展其用可以倚辦煩重保綏險要督數郡之戎事叅中司之憲列陟明増秩懋爾在公可使持節都督鄂州諸軍事鄂州刺史兼御史中丞充鄂岳沔等三州都團練守捉使散官勲如故授李昌岠辰錦等州團練使制勑彊楚之裔古之蠻方雜武谿之種落通夜郎之邉壤唐䝉開道馬援南征即其地也國朝舊制方數千里悉統於連帥今以遐闊難守遂分督以綏之正議大夫試光禄卿前兼海州刺史李昌岠素有識畧達於事體剛柔相濟文武中立居職可紀實浮於名廼者以幹時之才刺瀕海之郡惠和簡潔所謂理平思我逺人眷求良吏撫辰陽之舊俗攘縣道之多虞訓戎數州俾爾專任叅領中憲式榮按部可試秘書監使持節都督辰州諸軍事辰州刺史兼御史中丞􅂶辰溪巫錦業等五州都團練守捉使散官如故文苑英華巻四百九
