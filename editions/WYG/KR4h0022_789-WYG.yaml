body:
  text: 文苑英華卷七百九十宋李昉等編雜銘思舊銘一首唐故凉州長史元君石柱銘一首座右銘一首幾銘一首廬山故女道士梁洞微石碣銘一首廬山𤣥徳先生碣銘一首續座右銘一首佛衣銘一首文塜銘一首隋鼎銘一首書銘一首陋巷銘一首卜肆銘一首思舊銘庾信嵗在攝提星居監徳一作鶉首梁故觀寧侯蕭永卒嗚呼哀哉人之滅一作戚也既非金石所移士之悲也寧有春秋之異髙臺已傾稷下有聞琴之泣壯士一去燕南有擊筑之悲項羽之晨起帳中李陵之徘徊岐路韓王孫之質趙楚公子之留秦無假窮秋于時悲矣况復魚飛武庫預有棄甲之徴鳥伏翟泉先見横流之肇一作兆星紀吳亡庚辰楚滅紀侯大去鄅子無歸原隰載馳輠一作轘轅長别一作徃甲裳失矣餘皇棄焉河傾一作流酸棗杞梓與樗櫟俱流海淺蓬萊魚鼈與一作共蛟龍共一作並盡焚一作燃香複道詎假遊魂載酒屬車寧消愁氣芝蘭蕭艾之秋形殊而共一作並瘁羽毛鱗介之怨聲異而俱哀所謂天乎乃曰蒼蒼之氣所謂地乎其實摶摶一作慱慱之土怨之徒也何能感焉彫殘殺翮無所假於風飈零落春枯不足頌於霜露幕府昔開賢俊翹首為覊終嵗門人謝焉至於一作反乎東首告辭西陵長徃山陽車馬望别郊門頴川賔客遥悲總一作私路嵇叔夜之山庭一作廬尚多楊桞王子猷之舊徑唯餘竹林王孫𦵏地方為長樂之宮烈士埋魂即是將軍之墓昔嘗歡宴風月留連追憶平生宛然心目及乎垂翅秦川關河覉旅降于悲谷之景實有憂生之情羙酒酌焉猶思建鄴之水鳴琴在操終思華亭之鶴重為此别嗚呼甚哉麟亡星落月死珠傷瓶罄罍恥芝焚蕙歎所望鐘沉徳水聲一作望出風雲劒沒豐城氣存一作連牛斗澘然思舊乃作銘云風雲上慘舟壑潛移駸駸霜露君子先危紀侯大去懷王不返玉樹長埋風流遂逺荀伯舊一作鄉故縣慶封餘邑萬里歸一作傷魂脩門詎入墳横一作城連武庫山枕盧龍思歸道逺返葬無從徒留送鴈空靡長松平陵之東無復梧桐松聲蕭瑟長起秋風疇昔隆貴提携一作慘舒語黙託情稽阮一作琴風雲相得有酒如澠終温且克朝陽落鳳大野傷麟佳城欝欝流寓于秦山陽相送唯餘故人孀機􅄔緯獨鳯一作鶴孤鸞閨深夜静風髙月寒一作風月俱寒生平已矣懷舊一作故何期匣中絃絶一作斷隣人笛悲昔為幕府今成繐帷一作皆藝文類聚唐故凉州長史元君石柱銘張説公諱仁惠字某河南洛陽人也昔帝軒命子爰宅幽都天神降祚遂荒北岳其後日月運行風雲經始壇塲鄴洛㨿天地之圖帶礪山河建侯王集作王侯之國公即魏昭成皇帝之十世孫中書令濮陽王順之曾孫也大父雄魏濮陽王後改封武陵王昆吾伯嗣越在濮陽之墟琅琊王子别封武陵之郡孝集作宇是文朝降為武陵公太府卿秦州總管微子去國不替舊章薛侯來朝於焉降等父胄隋毫集作濠豫二州刺史右衛大將軍襲封武陵公翼亮隋室𢎞濟王業有佐命之元勲承異朝之世禄文武籍甚詒燕深長公受金行之正性承冠代之隆烈幼見岐嶷夙聞噐局集作聲噐靈臺雲秀繩墨之宰無施雅韻天成金石之師何力屬隋綱弛紊神棄不歆卿族衣冠日失其序獨寐寤宿永懷槃澗之人藏噐待時未射髙墉之隼唐祖龍飛天宇鶴板巖林授公右千牛録事黌閈之恩舊也髙皇邑子既與盧綰同衣世祖學徒則有嚴陵共宿乆之以公事免為嶲州法曹又歴循州河源滑州靈昌二縣令克已為政蠻貊化忠信之言直道與人仕已無喜愠之色永徽在歴石眞構難羣渠集作兇既剪江界蕭條帝念疲甿疇兹俾乂乃授公睦州雉山縣令乘驛而徃下車作則江連集作逋是海盜革面未集作來是威然後簡集作間非綱鳩人峻策覊吏閑田盡闢鰥寡一作孤委犬彘之餘絶澗無遊豪猾屏蠶漁之氣我有禮樂逹於山川鬼神物應休貞孚於鳥獸草木朝廷異之拜朝散大夫行隆州閬中令未至改授雍州渭南令觀人設教異邑同風遷隆州司馬尋加朝請大夫守凉州都督府長史分乘兩蕃人康頌作化澄巴濮無侵橘柚之園教溢河湟不飲蒲萄之酒離歌就具嵗夢臨辰命躓脩途榮慙厚徳總章二年終於官舍春秋七十有三夫人安定梁氏文伯之妻君子以為知禮孟軻之母良史述其能賢齊徳茂於昭途合祔期於幽隧有子懷貞斧藻詩禮佩踐義方承家有馥芝蘭如也歴官右司員外郎太子舍人而罹事徙居復歸舊土履霜露于三紀無改素冠之行違桑梓於十載還守青門之田勤孝在乎追逺豐感思乎備物武陵公之塋域今順陵栢城之内也山園有禁奉瞻靡及粤以聖歴二年嵗次月朔别卜宅於咸陽縣肺净集作浮原合葬焉公孝友純深風標峻起門無雜客家有嚴君而佐郡為邦𢎞風邁徳執法不撓去邪勿疑仲由之政事叔向之遺直豈稱論之典有闕範則之容將墜仰推集作惟代姻㳟承哀託郭有道之故事無媿蔡邕趙文子之將遊永懷隨㑹寓詞楹石式題賢壟其銘曰大哉乾元我族資始有國伊魏曰天之子皇犧姓風帝姬氏水剏業垂統欝乎舊史崇徳象賢允也重軌貞􅉼玉性潤結璇源武公之子平王之孫川流長直光氣能渾孝深栢顙義重荆潘白珪比節黄金敵言行實剛簡遊無謟瀆學妙神教書能鬼哭避彼屯運盤桓空谷四海有王一旦明目佩此芳草遷于喬木亦既從政淑問克宣秉心如水臨事如絃歴宰四邑髙芬屬天元僚兩郡汪化流泉江河秦蜀嘉聲在焉三光西沒百川東度天道運廻人隨代故倐忽三紀悲凉千露帝葬橋山傍壖祖墓天斷舊城集作域地開新路路即咸陽阡惟京兆地氣雲矗長岡龍抱竁掩銅人塋留石鳥塵歇徑滅山飛海少篆刻揚名亭亭華表座右銘陳子昻事父盡孝敬事君端忠貞兄弟敦和睦朋友篤信誠從官重公慎立身貴亷明待士慕謙讓蒞民尚寛平理訟惟正直察獄必審情謗議不足怨寵辱詎須驚處滿常憚溢居髙本慮傾詩禮固可學鄭衛不足聽幸能脩實操何俟釣虚聲白珪玷可滅黄金諾不輕秦穆飲盜馬楚客報絶纓言行既無擇存沒自揚名幾銘權徳輿太和熙熙酌而用之旁魄變化皆生乎幾上合乾道萬物隂隲下為人紀百工咸秩游泳虚無合集作含體渾區乃卷乃舒與羣有居冲用為工方寸為鑪周行不殆造物可集本文粹作何侔一人文粹作以制動寡以理衆或行其道或藏其用盤桓利貞得時大行燮贊裁成粲然文明舒亘八極藏之無形山川出雲元氣㝠㝠故曰知幾其神孔父周文去聖逺矣時無其人見幾而作造形斯悟則文粹無則字蘧生可卷顔子殆庶物至知之文粹作物知至至節宣好惡無愆五事無汨百度静之如淵運之如環得䘮糾纒集作互相望其間不見其朕莫知其然審而用之吾道常全廬山故女道士梁洞㣲石碣銘符載有形必盡至精不死黙黙順道歸根復始靈龜或昏解得造彼仙師獨覺閉跡山水巖巖廬峯上承太空紫雲深處石堂在中靈以静生境因圓一作澹融神氣無路與天渾同道昭成毁時則代謝人皆惡遷我不拒化鶴飛塵外壇寄松下唯餘天風蕭瑟晝夜廬山𤣥徳先生碣銘五帝已逺道則寖微眞氣蕭索淳風不歸愛惡糾訐遂成妍媸鑽鑿正性潰為瘡痍邈哉先生體尚無為爰自東岳汎然來兹宴坐空山照本㝠思萬累去矣視身如遺時時輔和醇酒一巵谿聲松籟盡為塤箎天有晦明形亦遷移頹然委順與化相推𤣥徳素風敦薄扶衰瞻望廬岳煙霞凄其勒堅一作銘巖頂與山並垂續座右銘并序白居易崔子玉作座右銘予竊慕之雖未能盡行常書于屋壁然其間似有未盡者因續為座右銘云勿慕貴與富勿憂賤與貧自問道如何集本文粹作何如下同貴賤安足云聞毁勿戚戚聞譽勿忻忻自顧行如何毁譽安足論無以意傲物以逺辱於人勿以色求亊以自重其身遊與邪分岐居與正為鄰於中有取捨此外無踈親脩外以及内静養和與眞養内不遺外動率義與仁千里始足下髙山起微塵吾道亦如此行之貴日新不敢規他人聊自書諸紳終身且自朂身沒貽後昆後昆苟反是非我之子孫佛衣銘并序劉禹錫吾既為僧珠文粹作琳撰曹溪第二碑且思所以辯文粹作辨六祖置衣不傳之㫖作佛衣銘曰佛言不行佛衣乃争忽近貴逺古今常情尼父之生土無一里夢奠之後履存千祀惟昔有梁如象之狂達摩文粹作磨救世來為醫王以言不痊因物乃遷如執符節行乎復關民不知官望車而畏俗不知佛得衣為貴壞色之衣道不在兹由之信道所以為寳六祖未彰其出也微既還狼荒憬俗蚩蚩不有信噐衆生曷歸是開便門非止傳衣初必有終傳豈無已物必歸盡衣胡乆恃先終知終用乃不窮我道無朽衣於何有其用已陳孰非芻狗梓州兠率寺文塜銘并序劉蛻文塜者長沙劉蛻復愚為文不忍棄其草聚而封之也蛻愚而不銳於用百工之技天不工蛻也而獨文蛻焉故飲食不忘於文晦明不忘於文悲戚怨憤疾病嬉遊羣居行役未嘗不以文為懷也適當無亊而天下將以文為號文明代生植文粹作殖明晦皆効文用集作明故日月星辰文乎旂常昆蟲鳥獸文乎彞噐徐方之土文於侯社夏翟之羽文於旗二本作旌旄登龍於章升玉於藻百工婦人雕礱染練文粹作塗以供宗廟祭祀之用二本作文豈獨蛻也生集作固知効用不及時文哉然而意嘗文粹作常獲助於天而不獲助於人故其窮雖窮無憾也當勤意之時不敢嚏不敢咳不敢唾不敢跂集作跛倚嗜欲躁競忘之於心其祗祗畏畏如臨上帝故有粲如星光如貝氣如蛟宮之水又有黯集作暗如屯雲如乆隂如枯腐熬燥之色則有如春陽如華川逶逶迤迤則有如運海如震怒動蕩恠異夫十為文不得文粹作滿十如意少如意則豈非天助乎常欲使天下聞之而必行勸文粹作覩之而必蹈散之茫洋以為道演之浸潤二本作遥以及物然後為農文之使風雨以時兵文之使戎虜以順文於野文於市使得二本無此字其所幽隱之士以出口者使之言材者使之用然而自振者無力終知者甚稀豈非不獲於人助乎嗚呼十五年矣實得一文粹作二千一百八十紙有塗者乙者有注揩者有覆背者有硃墨圍者於是以周易筮之遇復坤上震下之同人乾上離下筮者曰鳴于地中殷殷隆隆七日不文粹作而復復來其文粹作而天下昭融乎它日更召龜而令文粹作合之將聽襲吉卜於火如秦兆惟曰不吉卜於水不成乎河洛兆則亦惟曰不吉卜於木而悶悶集作閟之土叶吉累累文粹作纍纍為塜則汲之兆乎峭峭為壁則魯之兆乎且其占曰土之文為阿山二本作山河為華英將不崩不竭為滋味而傳乎結為丘陵為其設險乎融為川瀆率其朝宗乎華為百穀以潔祭禮之粢盛乎不然使其速腐為墟集作丘壤集有乎字生芻槀以食牛羊乎化塗泥為甄陶以作器乎將塊為五色而分封茅社文粹作茅社分封乎流為樂為土皷為凷古塊字桴以泄其和聲乎夷為都邑以興宮廟坎為洿池以澤生植一作殖乎祀為壇竈乎窽為井墓乎吾皆不得而知也嘗文粹作當既不得為吾用唯速化為百工之用愼毋朽為芝菌以恠人自媚愼毋堅為金鐵以作貨起争愼毋潏為醴泉以味乎謟口愼毋禱為城社以狐䑕慿妖愼毋聳為良材以雕斵傷性愼毋萌為蘭茝以佩服見䙝文粹作爇非嗚呼介而為石使之服文粹作能言舒而為螾使之飲泉既而他年遊魂之未返者亦命巫以巾七字文粹作亦命巫師而吊三招之號曰在几閣而來歸兮奄為塵垢在耳目而來歸兮視不一作奄視汝醜在口吻而來歸兮譽不汝乆噫筆絶之年而麟見祟文其無祟乎唅非珠玉歛無裙襦後世詩禮之儒無驚吾之幽墟其塚也在莾蒼之野大塊之丘時大唐大中之丁夘而戊辰之季秋銘云一本作曰文乎文乎有鬼神乎風水惟貞將利其子孫乎隋鼎銘皮日休隋氏有鼎其噐非古以詐為金以賊為鑄以虐火煎四海以毒氣蒸九土天假唐力扛之仁地以澤撲虐火以徳銷毒氣既折其足又齧其耳噫嘻集作戯聖王無畜兹噐書銘陸龜䝉太古之時何嘗有欺逮于結繩民始相疑畫卦造書聖人之為國載文字厥初弗知惟簡惟牘斷蜀本作折竹析木累必充庭負必折軸韋絙集作編一絶錯亂名目寖務輕省𢷬枲剥穀膠綴畨畨恣其所便蟲篆更𨽻形模易宣上下古今卷舒蟬聮薰曝蠧欝疵集作觕乎不堅又取珉石琢磨雕鐫由簡牘下其存四遷壐印章號殷勤識音志焉其巧益甚其訛集作說益繁盟契質要朝成夕反音翻誥誓制令尾達集作違首言牋檄奏報離方就圓錄注傳記集作傳錄注記醜讎羙憐銘誄牌表虚功望賢歌咏賦頌多思謟權在簡牘者埋沒爛壞無遺一編詞集作副以枲縠其留最延錯謬集作謬戾顚倒龍䝉弗刪在珉石者固寵納賂惟辭是妍鑱鑿既畢名聲冺然堯舜之道以人為傳有死必繼流乎億年宜斥詐偽焚燒棄捐復以太古結繩之前陋巷銘魯國千乘豈無康逵傳載陋巷以顔居之鄙委側僻樞松江夲作翳桑覆茨簞瓢屢空其樂怡怡聖人之言終日不違易讚獨入云顔庶幾門直大道堂如飛翬粱肉在御狼貪豕肥陋巷相去不其逺而我實狂狷蓬蒿所宜勒于柴荆賢哉是思卜肆銘蜀嚴之託蓍龜也以忠孝仁義後來之託蓍龜也以媮侫險詖羙之使怡愉怛之使駭畏小人惟惡是嗜松江本作視惟禍是避惟福是覬惟瞽言二字集作聲是媚曾不究得失之所自故幽贊之蓍前列之龜乃化為庸妄集作妄庸之噐嗚呼成都吾不知古為市之地况集作矧君平之卜肆耶强為之銘以刻其意文苑英華卷七百九十
