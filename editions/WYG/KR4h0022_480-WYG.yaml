body:
  text: 文苑英華巻四百八十宋李昉等編方正賢良方正科䇿二道沉謀沉謀秘畧科䇿三道賢良方正科䇿神龍二年問妙盡黄間期於一作乎百發術該一作竆𤣥女寧無七縱聲茍中律不憚撞鍾之求服必稱儒何辭觧衣之試况今徴工意匠搴秀談叢梟鸞即事於分區牛驥佇從於别皁謂其凌厲顧盼以雪陳琳之耻一作陳侯之疑何乃罔敞遷延不答馬卿之難豈時英所病共設於翟酺将高尚在懐不屈於周黨薦舉之法抑有多途取捨之方莫能折𠂻何則含光隱迹不盗處士之名介立寡徒安獲知已之薦舉逸之法應有通規取捨之言非為一作無盡善文武之道方冊所不墜徳怨之報人情之大綱射為諸侯杜預無穿札之力士為知已崔洪有挽弓一作弩之悔相圃澤宫失之逺矣子皮鮑叔夫何言哉一作夫何有哉舉賢受賞非才有罰國柄一作秉所加期乎必當驗之從政效無限斷之年試以一作之文才智有遲速之别知而不舉聞譏竊位舉而非一作非其人寧當顯戮臧孫之犯既是虚刑子聞之辜復當何典内外齊舉援親豈不致嫌師錫具陳行慶又誰為首凡此岐路罔識攸從遲冀如律或作知津𢎞其利涉此題四百七十三巻重出前已削去注異同為一作對蘇晉對物以類昇方以類降故小大趨捨未始離乎類也所謂同聲相應同氣相求雲從龍風從虎當作武時其效歟矧惟生人懐五常含好惡自然之勢也安可處非其類乎斯固士君子砥行立名伸首抗迹思欲奮迅泥滓凌邁雲漢與鸞鳯為伍矣豈不能折其鋒沮其目誠謂類有聚羣有分下流不可乆居且無其時猶欲干進之若此况乎師曠傾耳卞氏拭目將欲察異音求竒彩苟有留者誰肯遷延於觧衣之試哉䇿曰薦舉之法抑有多途取捨之方莫能折衷何則含光隱迹不盗處士之名介立寡徒安獲知已之薦舉逸之法應有通規取捨之言非無盡善者夫人洪疑然則淵其心飾其状不可知以貎不可窮以言将為辨者不可也求乎其端或有可知矣夫天之巖乎其上者施人以氣地之坎乎其下者成人以形高下之間不可逃者形氣而已矣氣之積者彰乎形形之動者感乎物彰於形故可以象察感於物故可以類求察其象長短之材可量矣求其類邪正之氣可識矣雖則含光隠迹介立不羣終不能以形逃不能以氣隱明矣子曰視其所以觀其所由察其所安人焉廋哉人焉廋哉古聖王之觀人也未嘗越於是取捨之言非不盡善也但夫懐詐飾偽舉世有之干禄者不盡善舉人者不盡智或以勢逼或以利興觀象察言以難其識附威籍利一作藉利諛媚其心有於此者則取捨之方何所施矣嗚呼負舟登山誠難事也䇿曰文武之道方冊所不墜德怨之報人情之大綱射為諸侯杜預無穿札之力士為知已崔洪有挽弓之悔相圃澤宮失之逺矣子皮鮑叔夫何有哉夫射者先王所以定人之心和人之志亦以示其威儀耳以為諸侯分我茅土育我黎蒸撫有威衡持秉生殺當審心定志敷德遵和故為其立飲射之法以導逹其志不在穿札貫的矣子曰射不主皮即其義也則夫麗龜貫石者将武夫之伎耳非不侮鰥寡保其社稷之業夫有大功者獲大賞异哉當陽誠無間然矣古之君子冠業而立於朝則必有益於時矣以為益時者莫先於進賢苟得其人則没齒無怨矣又何可顧望黙識乎子曰定其交而後求夫古之人定其交者将𢎞濟時務克清世㡬恐夫道不吾行才為時棄是用定其交求其達豈徒跼促存於情之所好哉若以情之所好相求則是便僻比周之人豈得為文雅君子乎崔侯必不以挽弓為悔假使子皮薦國産叔牙舉夷吾終不能光興鄭邦匡合齊社亦未足以紛昭載籍矣䇿曰舉賢受賞非才有罰國柄所加期乎必當驗之從政效無限斷之年試以文才智有遲速之别知而不舉聞譏竊位舉非其人寜當顯戮臧孫之犯既是虚刑子文之辜復當何典内外齊舉援親豈不致嫌師錫具陳行慶又誰為首夫天之平分萬物體不俱舉有其才疑者童其首揮其翼者兩其足德不必備才難盡善其人善於政者不必有其文工於詞者不必敏其事書曰無求備於一人詳矣先王均其曲直任之事宜物各有所長工拙不相害矣故書曰明試以言車服以庸則堯試其人以官備在方冊矣夫政有序化有漸時有險夷功有隱顯為政者當責其嵗晩不可中道而廢也施政立德不過乎三年人情大可見也孔子曰朞月而化成書曰三載考績何得無限斷之年歟夫文者貴其能書理論四字疑宣道其業非得意之實乃無意之筌歟夫傳曰言以足志文以足言又曰非文無以自逹苟欲考之文詞求之遲速則志有可得在政斯亨言之無文用亦何害且夫官爵者至公之噐也薦賢者至公之道也君子持至公之道守至公之噐進思盡忠何可回隠復俛薦嫌疑親讎之間哉昔者先王之立制進賢受上賞蔽賢蒙顯戮舉非其實寘其阿黨之誅薦得其人介以彚征之賞行慶之典不偏于師錫矣時理則德存世亂則道䘮難乎魯無君子楚不足徴使子文安居臧氏無咎痛哉政不難矣不有仲尼蔿賈之喻千載之後何知其過焉謹對又賢良方正科第一道問朕聞䖏域中之大㩀天下之圖莫不設簴以思賢觧琴而願化雖君唱臣和而明鮮晦多所任者或非其人所行者儻乖其道歸於浸弊罔弗由兹朕寅畏上𤣥負荷先構静言為國有若渉川風俗未淳政教一作聲猶欝黎元寡遂鸞鳳不臻當佇永懐良深愧歎子大夫講聖人之高議明王事之大綱蓄憤謀忠歴年載矣何施而反本於古何用而救末於今何術而人物阜安何德而神靈滋液爾其無隠無忽悉之究之通其條貫朕當親覽對闕名對臣聞聖人法天而理察道而行心膂俊賢子惠黎獻使恭爾位人樂其業朝無粃政俗詠康哉書曰惟天聦明惟聖時憲惟臣欽若惟人從乂此其謂也雖根英異轍火木殊途革去故而鼎就新變咸池而歌大夏然而無易兹典其故何哉蓋以因天人之和順陰陽之数不可替也皇上道高西聖德邁南薰黄龍薦圖翠鳳為寳至於膺正厯享靈符朗七曜於銅儀安萬人於寳厯延祥降福陟酌疑登封八表黎元歌皇風而周地絡四夷酋長頌𤣥化而建天樞此皆以刻於玉版載於金匱為帝者之祖宗與乾元而始終至於坐衢室端冕旒寂然不動感而遂通赫赫明明之美無聲無臭之化固以榮竟宇宙發揚神人振古以來未有如斯之盛矣猶復寅畏上帝憂念下人思反朴於鶉居佇遷訛於鴻古夕惕勤止良以一作已深焉爰降綸言俯詢輿議此陛下冲謙之道也愚臣何足以知之然而忝跡明時敢忘披露臣聞帝王之道藉英彦以張風邦國之圖資謨明以垂化故能庻徴有序美政無虧當今制禮作樂懸章布憲可謂文物大備刑政中和而紫宸𢎞巻舒之風黔首罕阜安之業者良以官僚空曠守宰荒寜不能宣裕皇明洗蒸徒之耳目發揮神化變澆薄於閭閻夫遷物化人著誠去偽豈惟君上之道實亦官聨之軄故文翁好儒蜀學比於齊魯毛玠崇質魏士素其裘裳是知易俗移風使天下廻心而嚮道者非俗吏之所能為也故董生云黎人未濟皆吏不明使至於此也賈誼亦云下之有過吏之罪也夫聞伯夷之風者貪夫以亷見桞下之跡者鄙人能恭故曰教人莫若垂範垂範必仰良材阜俗莫若興農興農必由循吏且擇賢而䖏其弊猶濫負乘為政何以克堪今若選英傑而實百僚自朝廷而及州縣咸令法易簡之道慎德刑之教賞以春夏慎其濫矣罰以秋冬敬其刑矣夫賞刑中則庶人安庶人安則財用足財用足則百志誠百志誠則天人和天人和則神靈滋液矣然後垂訓而理勤法而行宣九式以均財脩六禮以節性明七教以興德齊八政以興邦道格元亨風還太古時雍之和可致濟俗之義可𢎞唐虞之美可逾文景之聲可越謹對沈謀秘畧科䇿第一道問西自臨洮東洎滄海延袤萬里控扼三邉林胡不賔犬戎猶􅠹守之衝要備其窺窬聚多則戍卒不充布少則敵人莫禦用捨之理揚㩁而言立鎮屯兵其來非乆懸道分列自昔猶安李牧守邉匈奴竄伏魏尚為郡郊壘乂寜今欲悉罷軍城委之牧宰敬逹嘉話將獻吾君對䇿王昻對昔者大刑甲兵陳諸原野次刑鞭扑致之市朝将以閑邪防滛禁暴禦亂乃覿千古兹率厥常我后光膺寳命誕敷文德建皇王之中協時雍之化聲教逺洎無思不洽猶恐至道未孚邊亭或聳爰招集謀畫之士議諸疆塞之虞斯誠居安慮危之深策也顧以蒙陋庻能無聞将何以副沈祕之求奉對揚之列恭承清問敢不薦其聞矣臣聞夫為國之道必在任賢保境之方必先擇将國家授武秩設邉防東自榆林西連蒲海可謂制度秘逺典章大備而猶以遼靄未清湟烽或照者但未得其人耳今若垂旌揚之期崇奨激之道用不求備任惟其材舉吴起則捨其貪推穰苴則畧其賤務升智術勿限資年則将得其人矣既得其人必能撫其衆必能盡其力将得其材以之東鎮則林胡清以之西征則犬戎息何憂乎制禦之不足多少之為患也若乃布化宣威實資牧宰守全保固亦在城池則知牧者邦國之先而疆塲之主也疆塲無主則啓戎心戎心之生人慢其政國之患也今者選建良牧委之臨人脩緝軍城足以禦敵則可以捍我中宇緩彼邉甿何以廢城然後為得謹對第二道問用兵制敵先資良将搜竒掇異昔賢病諸厚貎深情最為難辨受金善盗終而有益至如清言要理行之則違強力暗通口不宣意臨問定軄何以分之李将軍簡易便人程不識刁斗嚴衛張飛勤於禮士闗侯接於常流四子所施幸甄優劣兩適為用何斯短長今邉烽未亡善将懸急試可淹於嵗月㧞萃昧於𤣥黄子其直言以祛未悟且三全五事十過九差何所廢興何所施用理國之貴何首愛人之道何為各書名數佇濟邦國對對登壇分閫之傑行已應物之際顧雖愚䝉嘗聞之矣莫不蹈仁履義以脩其身奉公㓕私以樹其政但人無求備用各有宜十哲分科八能殊術吳漢則訥於詞理衛玠則善於清言今若取陳平之謀湏捨盗金之行用杜預之智豈資穿札之能雖厚貎深情古人所病而收長棄短先逹格言伏願徴之以九徴求之於五德甄其操履行以智謀雖言貎難分而華實不昧擇能而用斯則可矣亦何憂良材之採掇官軄之不分者哉夫簡以臨人嚴以應物嚴則勞而後濟簡則逸而能通勞逸既殊得失斯在孟德擇士而禮雲長接於常流為道不廣固宜劣於張飛出門重禮誠合優乎關侯各隨時而任用夫何擇於先後當今邉隅尚警征役未息必資良将方立竒功若拾竒傭保之中㧞異淪滯之位則𤣥黄可辨衛霍斯在夫兵之術語聖人所止後代故作譎書以寄勝於天道也故曰天地鬼神視之而不見聼之而不聞指虚無之形不足以制勝故人存而不務也則知吉㐫之兆盡在乎人今若任皓皓之良收斷斷之善使明法審令貴功養勞則不時日而事吉不卜筮而事利亦何必訪韜鈐之謀孫吳之訣然後為得哉亦敢不陳其梗槩至若軍國著三全之稱天地操五事之名勇急㢘智將之十過也十百萬千一疑之九差也理國貴於仁禮愛人在於不勞昔霍驃騎不讀兵書猶言暗合項將軍素閑兵法亦歎天亡况事渉𤣥微藝殊經誥豈伊䝉淺所能詳哉謹對第三道問料敵多途應變無算覧去病之對顧在方畧讀孔明之書虞於備預至如烈風猛火煙燄赫然雨水奔流彌漫無際脩何人事以却天時或有暴兵卒來我則未暇敵人非逺静然無聞何法以知敵情何方以収我衆如其爭先不逺我怯湏勇列軍甚嚴彼強使弱善戰不陣抑有前人未戰屈人佇聼嘉話四輕二重於將謀而何施三禮五才於兵形而何要幸存昇降曲盡所宜對對觀夫古之良將之行兵也莫不救災恤患以和其人先謀後動而制其敵軍有渴而不飲軍未飯而不食舉不失德賞不失勞故人悦忘疲士感知死夫如是以之守則固以之戰則克安有不肯蹈兹烈火遏彼奔流斥堠素明暴兵安可卒至法制素習敵人何由能邇我將賈疑勇寜見士怯我固常勝安有敵強未戰屈人謀其所以善戰不陣夫何逺矣至四輕二重之施三禮五才之入所用斯並事關幽秘理絶探求徒罄䝉襟豈酬髙問謹對文苑英華巻四百八十
