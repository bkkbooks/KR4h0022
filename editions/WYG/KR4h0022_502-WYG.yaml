body:
  text: 文苑英華巻五百二宋李昉等編求賢求賢三道髙潔之士二道請以族類求賢一道尊賢一道請行賞罰以勸舉賢一道文學議文章一道採詩一道救學者之失一道黜子書一道書史百家三道射御射御一道求賢問選賢舉能秀造叅用今之所薦誠為得人未聞含聲待扣乃有不耕而穫十室忠信理亦難誣若遂踐於清朝仗何材而一作於濟物又二老歸周見稱何徳八元佐一作仕舜見述何功兹泉以何術見稱莘邑以何辭作相雲臺畫象述其先麟閣稱名標其道對對昔者聖人之立極也選衆舉能列官分職以通天地之徳以類亭毒之功臣哉隣哉時用逺矣主上重光纉曜紹開中興拜輶軒於受命之初希俊賢於御極之日兹乃義軒之志堯禹之心勤求道要闕所望於清光哉故鄧林有必至之才崑山無藏價之寳可不謂然乎走一作臣以妄庸藝無兼採繆從卑列應此嘉薦誠非鈍朽所能塞充然天休一作光震動虚求秀逸揚於王庭亦僶俛矣顧當叅明試獻嘉猷竭謏聞敷大體言用身退以酧萬一豈所謂不耕而穫邀名幸時而已哉今見屬有司恭承下問懋陳常務自謂無竒若得飭躬召見對揚天休下學上達舒憤竭情則亦引諭隂陽較明時政之要感激狂直甄摭授受之宜效其涓埃以増海岳耳若遂踐清朝濟時成務其道甚大惟變所適俾聞後命則藏器而動顧以更僕亦何盡言曲學鯫生居今志古若乃忠為令徳功實佐時披巻懐人恨為異代雖慙非博物敢不揚言則夫西伯善養夷齊以讓國歸老帝舜舉能元凱以通才授職維師尚父韜鈐乃適道之功相時阿衡鼎飪為獻君之術雲臺紀績吳鄧懿其元勲麟閣圖功衛霍流其茂實謹對求賢見四百八十二巻題作賢良方正第二道策吳師道同前問棘津登輔不因階於尺木莘郊作相豈憑資於累遷葢道有攸存時無可廢爰暨澆訛必修一作循班序先容乃器因地㧞萃共相沿襲遂成標凖今聖人務切懸旌心摇啟繇一作斾雖衣冠華𦙍已喬遷於周列而衡泌幽人罕遥集於魏鼎豈英靈不孕於山澤將物理自係於古今無蔽爾辭切陳其致對上官儀對鳳徳方亨必資英輔龍光未聘實俟明君既藏器以須時亦虛襟而待物莫不理符靈應道叶冥通類霜降而鍾鳴同雲蒸而礎潤秘策赴之如投水神心應之若轉規用能感㑹一時抑揚千古是以沉鱗暫躍遂游泳於天漢墜羽纔遷乃騰驤於日陸𢎞心體之妙㫖播舟水之嘉謨義列丹青徳融金璧迨乎時鍾季叔化漸澆訛㧞萃之惠罕流因地之階愈篤使西都金一作陳子奕葉稱榮東國袁生八公為貴廷尉之明窮識理十載無知黄門之妙極摛文八遷寧進徒使干星秀氣永翳窮塵照廡竒光長湮幽石自可循風市馬襲軌求龍三年不虧七年無廢戔戔束帛指丘園而畢陳翹翹車乗望林泉而載轄則材標海若霧集丹墀徳表星精雲飛紫闕豈直髙尚之士遥集於台司衡泌之儔喬遷於鼎職謹對髙潔之士問惟堯則天全頴陽之節惟禹奠州遂滄州之美然則髙潔之士出於盛明亷恥之賔不生澆季自皇唐受命驅駕前古貞遁不聞風軌莫繼豈端操之範獨秘於往辰將奔競之徒頓騁於兹日緬懐長往有懵深衷貯聽離一作諸賢以袪心疚對對則天分命箕山多長往之賔濬畝劬勞滄州有肥遁之客是以北荒孤竹甘一作隠草澤而輕周南岳紫芝翫林泉而恥漢此葢為匹夫小節未達汾陽之㫖獨行幽姿寧動少微之宿豈若大風在夢非熊入兆下箕尾而稱師委旄頭而作傅自大君有命逺頓天紘盡岩穴之英竒揔濠梁之薖軸脱荷裳而襲朱􅌧觧薜蘿而綰青綬五尺童子羞稱荷篠三事大夫耻觀瓢飲將使鄭君谷口擅不言之謡曹相府門多清净之化方知聖人在上真隐不獲全其髙淳風所偃幽真不能固其節麛卵一作麛貍得性麟鳳所以呈姿山林不夭風雲以之通氣物既禀和而適變士亦感類而相從調餁自可怡神烹鮮足堪養性猶謂寒泉獨善未臻授手之仁薪槱兼濟有􅂇興王之道謹對同前田備總目作田恪對聖人出震博訪芻蕘大帝登庸詢謀師相是以周稱尚父吕望擢自磻溪殷曰得賢傅說求諸版築莫不舟梁羽翮鼎實鹽梅表區㝢之明明成朝廷之濟濟自隆周洎乎幽厲朝政在於諸侯炎漢至于哀平威權任乎卿相貂蟬耀彩雄俊遍五侯之門劔履生光賔客滿四豪之第吹竽彈劔犬吠鷄鳴用才各任所能取士不求其備弓旌之命非道徳之門蒲帛之徵乖有道之室方今前疑後丞龍翰鳳翼左輔右弼岳氣星精加以徵逸璞於岩廊索遺珠於窮海丘園之下羔鴈成行閭巷之中軒軺相次𤣥纁之禮既備巢父長謝山林珪璧之問不空夷齊豈食薇蕨請以族類求賢白居易問自古以來君者無不思求其賢賢者罔不思效其用君賢兩不相遇其故何哉今欲求之辨之集無此二字其術安在此下七篇並於白居易集備制科七十五門中摘取問答皆居易作對對臣聞人君者無不思求其賢人臣者無不思効其用然而君求賢而不得臣効用而無由者豈不以貴賤相懸朝野相隔堂逺於千里門深於九重雖臣有慺慺之誠何由上達雖君有孜孜之念無因下知上下茫然兩不相遇如此則豈惟賢者不用矧又用者不賢所以從古已来亂多而理少者實此之由也臣以為求賢有術辨賢有方術者各審其族類使之推薦而已矣近取諸喻其猶線與矢乎線因針而入矢待弦而發雖有線矢茍無針弦求自致焉不可得也夫必以族類者盖賢愚有貫善惡有倫若以類求必以類至此亦猶水流濕火就燥自然之理也何則人以徳義立身者必交於徳義不交於險僻以正直克已者必朋集作用於正直不朋於頗邪以貪冐為意者必比於貪冐不比於貞㢘以悖慢肆心者狎於悖慢不狎於恭謹何者事相害而不相習集作利性相戾而不相從此乃天地常倫人物常理必然之勢也則賢與不肖以此知之伏惟陛下欲求而致之也則思因針待弦之勢欲辨而别之也則察流濕就燥之徒得其勢必彚征而自來審其徒則集作必羣分而自見求之於集作之人術辨之於集作之人方於是乎在集有此字矣尊賢用厚禮以致大賢也問國家嵗貢俊逸集作造日求賢良何則所得者率尋常之才所來者非師友之佐豈時無大賢乎將求之不得其道乎對對臣聞政理之先先於行道行道之本本於得賢得賢之由由乎審禮若禮之厚薄定於此則賢之優劣應於彼有集作故黜位而朝西面而事則師之才至矣先之以身下之以色則友之才至矣展皮幣之禮盡揖讓之儀則大臣之才至矣南面而坐使者先焉則左右之才至矣凭几據床以令召焉則厮役之才至矣是以得師者帝得友者王得大臣者覇得左右者弱得厮役者亂然則求師而得友求友而得臣者有矣未有求臣而得友求友而得師者也是故圖帝而成王圖王而成覇者有矣未有圖覇而成王圖王而成帝者也夫以夷吾之賢為不可召之臣桓公所以覇齊也孔明之才為非屈致之士劉氏所以圖蜀也夫欲覇一國圖一方猶審其禮行其道焉况於開帝王之業垂無疆之休茍無尊賢之風師友之佐則安能𢎞其理恢其化乎國家有天下二百年政無不施徳無不備唯尊賢之禮未與三代同風陛下誠能行之則盡善盡美之事畢矣請行賞罰以勸舉賢問頃者累下詔㫖令舉所知獻其狀莫匪賢能授以官罕聞政績將人不易知耶將容易其所舉耶對對臣伏見頃者徳宗皇帝頒下詔㫖令舉所知自是内外百寮嵗有聞薦有司各詳其狀咸命以官語其數誠得多士之名考其才或非盡善之實何則得賢由舉擇慎審慎審由賞罰必行自十年以來未聞有司以得所舉賞一人以失所舉罪一人則内外之薦恐未專精出處之賢或有遺集作違濫斯所以合陛下尚有未得賢之嘆也伏唯申命所舉深詔有司量其短長之才授以小大之職然後明察臧否精考課最得人者行進賢之賞謬舉者坐不當之辜自然上下精詳逺近懲勸謹闗梁以相保責輪轅以相承集作求俾夫草靡風行達於天下則天下之耳盡為陛下聽天下之目盡為陛下視明其視則舉不失徳廣其聽則野無遺賢而後官得其才事得其序如此則陛下但凝神端拱而天下理矣議文章碑碣詞賦問國家撫天下以文明奬多士以文學二百餘載文章炳集作化焉然則述作之文久而生弊書事者罕問於直筆褒美者多覩其虛詞今欲去偽抑淫芟蕪剗穢黜華於枝葉反實於根原引而求之其義集作道安在對對臣謹按易曰觀乎人文以化天下記曰文王以文理則文之用大矣哉自三代以還斯文不振故天以將䘮之弊授我國家國家以文徳應天以文教牧人以文行選賢以文學取士二百餘載煥乎文章故士無賢不肖率意於文矣然臣聞大成不能無小弊大美不能無小疵是以凡今秉筆之徒率爾而言者有矣斐然成章者有矣故歌詞賦頌讃誄碑碣之製往往有虚美者焉集作矣有愧詞者焉集作矣若行於時則誣善惡而惑當世若傳於後則混真偽而礙將來臣伏思之恐非先王之理化成之教也其古之為文者上以備王教繫國風下以存警誡通諷諭故懲勸善惡之柄執於文士褒貶之際焉補察得失之端操於詩人美刺之間焉今褒貶之文不覈實則勸懲之義缺矣美刺之詩不稽政則補察之義廢矣雖雕章鏤句將焉用之臣又聞稂莠稗秕生於糓反害於糓者也淫詞麗藻生於文反傷於文者也故耘者耘稂莠稗秕所以飬糓也王者刪淫詞麗藻所以養文也伏唯陛下詔主文之司諭養文之㫖俾詞賦合警誡諷諭者雖質雖野採而奬之碑誄有虛美愧詞者雖華雖麗禁而絶之若然則為文者必當尚實抑美者誠宜去偽小疵小弊蕩然無遺矣則何慮乎文章不與三代同風哉集作同風歟採詩以補察時政問聖人之致理也在乎酌人言察人情而後行為政順為教者也然則一人之耳焉集作安得遍聞天下之言乎一人之心安得盡知天下之情乎今欲立採詩之官開諷刺之道察其得失之政通其上下之情大夫以為何如對對臣聞聖王酌人之言補已之過所以立理本道一作遵化源也將在乎選觀風之使建採詩之官俾乎歌詠之聲諷刺之興日採於下嵗獻於上者也所謂言之者無罪聞之者足以自戒大凡人之感於事則必動於情然後興於嗟嘆發於吟咏而形於歌詩矣故聞蓼蕭之詩則知澤及四海也聞禾黍之詠則知時和嵗豐也聞北風之言則知威虐及人也聞碩䑕之刺則知重歛於下也聞廣袖髙髻之謡則知風俗之奢蕩也聞誰其穫者婦與姑之言則知征役之廢業也故國風之盛衰由斯而見也王政之得失由斯而聞也人情之哀樂由斯而知也然後君臣親覽而斟酌焉政之廢者修之闕者補之人之憂者樂之勞者逸之所謂善防川者决之使導善理人者宣之使言故政有毫髪之善者下必知也教有錙銖之失者上必聞也則上之誠明何憂乎不下達下之利病何患乎不上知上下交和内外胥悦若此而不臻至理不致升平自開闢以來未之聞也老子曰不出户知天下斯之謂歟救學者之失禮樂詩書問學者政之根理之本國家設庠序以崇儒術張禮樂而厚國風師資肅以尊嚴文物煥其明偹何則學詩書者拘於文而不通其㫖習禮樂者滯於數而不達其情故安上之禮未行化人之學將落今欲使工祝知先王之道生徒究聖賢之心詩書不失於愚誣禮樂無聞於盈減積之為言行播之為風化何為何作得至於斯對對臣聞化人動衆學為先焉安上尊君禮為本焉故古之王者未有不先於學本於禮而能建國君人經天緯地者也國家刪定六經之義裁成五禮之文為學者之先知生人之大惠也故命太常以典禮樂立太學以教詩書將欲以集作使四術並舉而行之萬人相從而化之集無之字然臣觀太學生徒讀集作誦詩書之文而不知詩書之㫖太常工祝執禮樂之器而不識禮樂之情遺其㫖則作忠興孝之義不彰失其情則同敬同愛之誠不著所謂棄本而從末棄精而得粗至使陛下語學有將落之憂顧禮有未行之嘆者此由官失其業師非其人故但有脩習之名而無訓道之實也伏望審官集作工師之能否辨教學之是非講詩者以六義風賦為宗不專於鳥獸草木之名也讀書者以四代典謨為㫖不專於章句詁訓之文也習禮者以上下長㓜為節不專於俎豆之數裼襲之容也學樂者以忠和孝友為徳不專於節奏之變綴兆之度也夫然則詩書無愚誣之失禮樂無盈減之差積而行立者乃升之於朝廷習而事成者乃用之於宗廟是故温柔敦厚之教疏通知逺之訓暢於中而和於外矣荘敬威嚴之貌易直子諒之心行於上而流於下矣則覩之者莫不承順聞之者莫不率從管乎人情出乎理道欲人不化上不安其可得乎問子書對對臣聞仲尼沒而微言絶七十子䘮而大義乖大義乖則小說興微言絶則異端起於是乎岐分派别而百氏之書作焉然則六家之異同馬遷論之備矣九流之得失班固序之詳矣是非取舍較然可知今陛下將欲抑諸子之殊途遵聖人之要道則莫若𢎞四術之正義崇九經之格言故正義著明則六家之異見不除而自退矣格言具舉則九流之偏說不禁而自隠矣夫如是則六家九流尚為之隠退况百氏之殊文詭製得不藏匿而消蕩乎斯所謂排小說而扶大義斥異端而闡㣲言辨惑嚮方化人成俗之畧也伏惟陛下必行之書史百家問卦分江使荘子神龜為清江使河伯之所圖演天文文籍於是濫觴書契以之抽緒皇墳帝典述紀言以聨鑣五傳六經貯禮樂而齊騖斯並懸諸日月煥乎文章至如諸子相騰小説奔競有慚屑玉之化無異雜鉛之寳請用於火恐招傅奕之譏將扇其風復爽芟夷之義上塗交戰一為觧環百兩之篇孰關其善七分之術孰著其能誰求天下之書誰决塜中之籙識二簡者何子觀四轍者何人京兆耆舊之篇起於何代陳留神仙之傳創自何人誰先孝子之圖誰首逸人之記倘無談於雕棘將有薦於㧞茅對許南容對夫皇王範物經籍訓人澆浮之說漸列文質之規斯變故九流異軫一作軼百氏齊鑣枝分葉布千門萬户雖復言有蹐駮理或叢殘時招屑玉之譏闕起雜鉛之議妨工惑善招惡左傳昭徳今作招惡疑塞違比夫群岳參差各有蔽虧之勢衆川浩蕩俱資潤澤之功且夫三代之道未能無弊六經之教尚皆有失其於子史何獨尤之若以失而便廢則書禮之法可捨短而從長去泰而除惡咸用於火竊未為得各言其志亦何傷乎乃好尚不同撰述各異並流鉛槧咸著蓬山京房惟善於七分張覇心明於百兩荀朂决塜中之籙陳農求天下之書識二簡者廣微束晳字也觀四轍者周穆京兆耆舊光武創其篇陳留神仙阮蒼述其事梁鴻作逸人之傳一作記劉向修孝子之圖斯並賢者傳之不朽謹對同前李令琛對日月經天星辰􅂇其明耀江河紀地畎澮資其廣深俱麗於乾綱同歸於坤一作坎軸况六經既出百子並騖萬巻五車七畧四部組織仁義琢磨道徳雖非全璧之珍亦是連珠之寳當有求書之官逺探禹穴近聞汲塜之文具修蠧簡或隂陽不謬朱紫自分仲任叢殘之譏並非通論稚用翡翠之喻實得大方豈重以芟夷加之翦截敢申直筆以塞異端則有百兩之篇張覇所善七分之術京房獨精陳農訪天下之書荀朂决塜中之䇿識二簡者束晢觀四轍者穆王京兆耆舊之篇創於光武陳留神仙之傳起自阮蒼劉向修孝子之圖梁鴻首逸人之記謹對同前對自龍馬出河爰分八卦靈龜薦洛乃見九疇文字以興典謨斯起即有姬公秀出制禮樂以匡周宣父挺生刪詩書而反魯莫不憲章文武祖述唐虞開兆庶之心靈啓群主之耳目洎乎尼山落構梁木興歌大義云亡諸子爰一作漫起於是墨承諸廟孟繫司徒八字一作承請廟係司徒文子開教於五神范蠡逞能於千樹孫武絢其韜畧䝉叟混其鵬蜩葛洪述内外之篇劉安論黄白之秘楊託思於全性鄒銳想於談天商君既擅於刑書尹文亦諒於名實吕韋博識載摛懸市之文鬼谷多才爰初飛籕之作自兹以後其流甚繁雖云有異於微言亦可觀於小道或激揚仁義或囊括政刑或富國成家或懲惡勸善進既資於助國退亦取於理身實翰墨之泉源信文章之隆藪故馬遷修史列之九流班固叙書著之七畧今欲議其刪削語以芟夷便是絶學者之多聞爽國家之廣畧學雖不敏未敢從命謹對射御問五曹演妙六轡騰英吹虀延竒貫葉騁術眷茲兼藝理國曰資取要適時何者為急然則旁觀往籍逖聽前規六藝之道同歸十哲之流必習何則書數之事獨列於學官而射御之利不分於師氏今欲鳴鸞逐水落鴈穿楊並列膠庠可乎不可至若魏臺漢帳誰擅其能三正一侯孰當其禮軒轅訪道驂其乗者何人夏禹奠山究其理者奚是近從曹馬逺逮羲軒所創之功並宜别白對對觀天察地必籍於四時奠主安人莫先於六藝若乃九官筭法六藝數也秘法六範轡也六藝御也竒功懸針垂露六藝書也之能落鴈啼猿六藝射也之妙永言四術咸濟於時譬以五行理難廢一至於出入軍國之謀道達隂陽之氣取要適時射御為急者先王建國正位辨方順文武以分官仰星辰而布教使僕者知其五御射者掌其六耦各班師氏咸有司存此則垂範將來為國要道何必附輿執轡同歸鴈序之庭七禮五豝射也並列鴻都之學亊資仍舊無或改焉爾其仲將之署魏臺梁鵠之題漢帳聲傳千載能抗兩朝三正實諸侯之儀一侯乃大夫之禮軒轅訪道昌㝢驂其乗夏后奠山竪亥窮其理紛綸前史逖聽可尋竊以逺覽羲軒近觀曹馬心計不過於𨽻首善御孰若於王良史籕飛毫鍾繇騁翰后羿持箭李廣張弦所創之人所工之亊畧陳一二固難悉備謹對文苑英華巻五百二
