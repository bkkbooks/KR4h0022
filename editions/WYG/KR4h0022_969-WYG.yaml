body:
  text: 文苑英華巻九百七十宋李昉等編墓表張法曹墓表一首獨孤秘監墓表一首權少監墓表一首吕秘監墓表一首栁侍御墓表一首栁明府墓表一首陸給事墓表一首河南府法曹參軍張公墓表獨孤及有唐逸士呉郡張師沖和純粹辯博閎達卓犖好古儻蕩逸羣官不近名唯代耕是媒集作謀貞不絶俗以忘機為心秀才髙第起家臨濮縣尉歴馮翊伊闕二縣主簿貞元元年拜監察御史御史中丞鄭旻集作昊之擁旄濟江辟為從事轉河南府法曹參軍凡歴官五政享年五十八忘懷樂道終始以之攘臂於壽集作爵禄聲利得喪虧盈之間如浮雲無心野鶴獨立形全神全身與化俱上元二年八月辛卯終于呉郡私第其孤惟儉惟靜能稟謩訓弱歲皆精左氏穀梁春秋藐爾在疚零丁何怙季弟祕書省正字曰從申迺茹天倫之哀謀及卜筮以是歲九月二十八日權窆于虎丘山之西原禮也初公祖捐之隋大業中進士甲科位至御史尚書水部郎捐之生烈考法集作復以碩學麗藻名動京師亦舉進士自監察御史為㑹稽令文雅之慶施於集作于後昆故擢秀才而衣繡衣者及公三葉君子以為榮少好學集無此字黄老且修禪慧晩節傳集作持六經㣲言以遺三子三聖之學不墜於地君子以為博恢諧不羈頡頏傲世視軒冕纓紱無非二字集作如塵埃必也臨事能㫁義形於色推賢達善不進不止君子以為達當伊川啟戎歴陽為魚公力窘身陷者至於再涵泳沸鼎厲揭横流而跡無緇磷憂患不能及君子以為智宜享黄髮而升青雲天乎降凶殱我仁人嗚呼先生往無返期談藪清風詞林逸韻墨池真草三事永絶凡今友朋可勝慟集作痛乎恐後代丘壠將平川澤相失求遺跡者莫知德音之所始乃志之以石永為靈表朝散大夫潁川郡長史贈祕書監河南獨孤墓表前人公諱某其先劉氏出自漢世祖光武皇帝之裔世祖生沛獻王輔輔生釐釐生定定生節節生丐丐生長子廣嗣王位少集作次子廙仕漢為洛陽令廙生穆穆生進伯為度遼將軍擊匈奴兵少援不至戰敗為單于所獲遷居獨孤山下生尸利單于加以谷蠡王之位號獨孤部尸利生烏和烏和生二子長曰去卑為右賢王建安中獻帝自長安東歸有李傕郭汜之亂左賢王率其部衛車駕還洛陽集無陽字遂徙遷集無遷字許後集後復歸國卒次弟猛代立生富集作嗣下同論富論生路孤路孤生眷眷生羅辰從魏孝文帝遷都洛陽為司州洛陽人始以獨孤二字集作其部為氏氏用勲伐賜爵永安公位征東將軍定州刺史征東生萬齡官至廷尉諡曰貞廷尉生稽字延平善左右射學窮金匱之奥魏世祖初從平滑臺以功授散騎常侍歴守冀定相三州時新定律令慎選廷尉徵公拜焉再世為法官俱以亷平不苛顯名當時榮之加鎮東將軍薨諡曰文鎮東生歸辯聰而才又為鎮東薨贈太尉太尉生冀希顏以博學侍講東宫歴安南將軍定州刺史贈司徒司徒生永業以文武為備佐齊王集作主入洛定鄴都督幽洛二州由行臺尚書令升司徒封臨川郡王語在齊史臨川王生子佳在齊為勁武集作弩將軍在周為儀同三司在隋守懷朔集作清逺鎮握節死難贈并州刺史并州生義順武德中歴户集作民部侍郎尚書左丞光禄大夫封洛南郡公生左千牛備身諱元慶公之祖也千牛生朝散大夫定州長史諱思陳公之禰集作父也二十三葉之德善鍾其仁集作人於公公剛方亷清貞信𢎞寛德充集作厚性和與四時氣侔非天下直道不行非先王之法言未嘗言當出處去就之間非抑與不茍求與朋友交非同道不茍合至若集無若字守王事臨大節非其正雖臨以大兵不懼恪德危行居易中立不可得而親不可得而疎讀書觀忠孝大略不探賾索隠五字集作不索隠賾屬詞止乎禮義不主集作止詠情性而已太極元年詔舉文可以經邦國者宣勞使源乾曜以公充賦時對策者數百人公與滎陽鄭少微特冠科首起家拜同州郃陽縣尉歲滿授好畤縣尉開元十四年𤣥宗初登封太山注意二千石令長以煦嫗下民授公益州温江令公治縣如治家明不至察威不至猛去煩苛繳繞之政施德信禮刑以訓齊之温江人飲公之風化逋者復疲者悦善者勸而不善者知恥益州刺史張敬忠以狀聞詔授監察御史轉殿中侍御史㑹權臣惡直斥去不附已者貶公廬州長史明年惡直者罷位公稍移武功令未到官病免二十三年除寧州司馬二十八年遷潁州郡長史初公為御史嘗以直忤吏部侍郎李林甫至是林甫當國常欲騁憾於我而五府三署每有髙選羣公皆昌言稱公全才且各以臧文竊位自引由是免咎然十年再選不離郡佐或勸公卑其道可以取容於世公曰可卑非道也屈伸天也非人也人如予何天寳元年加朝散大夫二年二月七日寢疾終于位春秋五十七位不尊壽不遐志不行善不報與集作其直虚語守道者相弔以為痛是歲八月殯于郡東至德二年歲次癸酉按通鑑目録當作丁酉十月十四日權遷窆于洛陽龍門山西岡大厯四年五月十二日詔贈祕書監命卿之位錫於身後嗚呼哀哉夫人河南洛陽人也薛國長孫公覽之𤣥孫咸陽丞諱頲集作頓府君之女右集作左金吾將軍諱子哲府君之妹稟天元和生知孝慈含德之厚與坤體合執笄助祭四十餘載人莫見夫人喜怒之容躬勤集作歡非順承動合集作叶禮經宗族以睦長㓜以敘無言無為化成于家公之加命服也夫人封雍集作封丘縣君汜等既孤夫人棄采蘋之度修釋氏教授正觀法于長者比丘尼六字集作於長老比丘上方服勤一年得四念處三昧視去諸結猶棄涕唾至德二年隨子東征明年歲在甲戌集作戊戌七月二集作此二十四日終于㑹稽享年六十有四八月某日權殯于雷門之南泥巨及正等遭天不弔無怙無恃以世故坎壈不克遷祔者十一年矣欲報顧復天胡有極今年問宅兆于前都水使者張係係卜甘泉東伊水西甘泉鄉之原吉謹以歲次巳酉秋七月壬午遷公夫人靈坐合安厝于此原猶懼人世陵谷集作陵谷世人之不我期也故不敢不志抆集作收血勒石以遺後嗣祕書少監權君墓表李華君姓權氏諱皋字士繇天水人苻秦尚書僕射之後世為著姓祖某某官父某某官咸有令德君既冠進士及第試臨清尉時節將三字節浙本文粹作持節兼本道使籍君髙名表為薊縣尉充判官無何主將以逆節露君乃詐死使一作株親涉江既免禍累知幾其神先帝聞而歎之除評事御史方議大用屬太夫人病危將侍奉憂勞因中痼疾無何太夫人終君泣血三年厥疾用加外一作服除遷起居舍人著作郎大厯元年四月某日不幸逝于丹徒因殯焉享齡四十二嗚呼識者慟哭聞者痛心君有大節不可奪大名不可掩大才不可及大行不可名天與之仁不與之年哀哉自開元天寳以來髙名下位華方疾不能備舉然所憶者曰河南元君徳秀元終十年而南陽張君有略張没二年而君失君一作元是之志如其道徳張之行如其經術君之才如其聲望其人淪其瘁乎六字一作人倫其瘁公素與昌黎韓㓜深京兆王鎮卿洎華友善韓評君曰可以為宰輔王評君曰可以為師保華評君曰可以分天下之善惡一人而己矣夫人隴西李氏仁賢有一子某生七年矣哀禮成人嗚呼有後哉朝廷贈君以祕書少監悼賢也華因病風扶曳浙本文粹作曳杖而往哭之嘗聞師乙之言温良而能㫁者宜歌齊權君可為一作謂温良而能㫁者也故為齊風表君之墓云忠於其一作而國孝於其一作而家潔而不滓瑜而不瑕仁胡不壽為善者何君不幸耶時不幸耶外王父贈祕書少監東平吳公神道表銘梁肅公之先出自姜姓太公之􅉙也唐虞之際佐治洪水有功以能為禹股肱心膂命曰有吕氏洎太公誓蒼雉集作矩平商牧桓公責包茅匡周道傳國七百列于春秋漢興以勲戚在侯服者二十人臨泗侯之孫通封于東平其後國除為郡著族元魏末有汶陽公思禮者扶翼周文開霸闗右歴行臺右丞兵部尚書時魏分為西東中夏擁隔遂居于河東今為蒲人也從尚書四葉生璡皇朝晉陽令贈郴州刺史郴州之嗣曰仁誨以文學稱以從父兄太一俱用射䇿科太一歴御史尚書郎中書舍人户部侍郎右庶子仁誨由成王文學轉岐王府屬累遷右庶子金吾中郎將資州刺史除許州未拜而甍以集無此二字孝行聞仕至太僕丞加朝散大夫太僕生公公諱某字某少淳茂有志行居太僕府君憂泣血三年鄉黨稱之制終治古文尚書左氏春秋二十舉孝亷補博昌主簿歴任營丘文安二丞宣勞使以清白薦試守洺水令公為政務仁恕去苛察密化旁流邑中移風再歲正除加朝散大夫公性簡退不以善自名且不樂為吏秩未滿移疾罷去居于濟源王屋山之陽常言君子之道不從俗不離羣㓜安抗跡而傲世慈明濡足以救民曷若中行以全吾真由是逍遙樂道以漆園鶡冠之言為師時閲歴代史究興敗治亂之端恭以立身行道之義著書千餘巻集作篇號續吕氏春秋草藳未就屬寢疾捐館享年若干時開元二十五年也永泰中嗣子某位朝散大夫右贊善兼陳州刺史尋遷檢校祕書少監兼徐州别駕因詣闕拜章乞迴所授賜命于先人詔追贈公太子中允謝恩之際又以公所著書上聞遂改贈祕書少監後十有三載歲在某辰某月日龜蓍襲吉始安宅于某鄉里之原江夏郡夫人黄氏祔焉夫人漢太尉琬之裔孫皇朝大將軍淮州都督虢國公君漢之孫沂王府長史虢國公承源之女洪州刺史京兆韋同之甥有温仁孝愛之德觀義垂訓之美後公七歲而終公之追命于是有江夏之贈嗣子祕書痛先君先夫人厭世寖逺音徽將昧常欲立貞石傳德風蓄誠未申先是祖謝小子再拜受命於太夫人且成伯舅集作陽之志恭論外祖之烈以示後嗣楊惲傳太史之書乆慙庸陋韓康感中軍之愛空想生平道道字集作遺塵在茲乎集作于以表墓文曰赫赫有吕肇發于姜既協大禹亦亮武王營丘門地東平傳嗣書之勲册集作尚書之勲有焯名位中郎伯仲允迪斯集作思貴實生祕書含道藴粹仁為巳任孝亦天至論經一作㫁八覽文參六義三邑之佐清恭廉貞鳴絃作宰休有清聲退謀於道爰晦其明體順集作柔保和遺榮集作身入㝠春闈中允蓬山二軄運往時來退榮隱德集作守黒振彼集作振德江夏光敷内則不及象服空垂燕翼太行之右清濟之北外孫紀辭以志兆域殿中侍御史栁公墓表栁宗元唐貞元十二年十二月庚寅葬我殿中侍御史河東栁公於萬年縣之少陵原公諱某字某邑居於虞鄉曾王父某官王父某官皇考某官奕世餘慶叢而未稔濟德流祉其後宜大秀而不實為善者惑嗚呼哀哉惟公敦柔峻清恪慎端莊進止威儀動有恒常一作度英風超倫孤厲貞方居室孝弟與人信讓當職强毅遊刃立㫁自少耽學頗工為文既窮日力又繼以夜鄉里擇推敦迫上道乃與計偕來遊京師親集作觀藝靈臺貢文有司射策合程遂冠首科休有令問羣士羨慕居數年授河南府文學教勵生徒進擇貢士儒黨相賀庶人觀禮秩滿渭北節度延為參佐總齊軍政甚獲能稱加太常寺協律郎既喪主帥罷歸私室方將脱遺紛埃退與道俱沖漠保神優柔肄儒四方聞風交馳鵠書載筆乗軺乃作參謀出入朔方陪佐戎車遷大理評事又加章綬朱裳銀印宗黨有耀權略密勿潛機理集作埋照完彼亭堡時其講教實從我謀鄰國是俲改度支判官轉大理寺司直出納府庫頒給軍食下無横斂黔首休息月校歲㑹莫不如畫軍集作庫豐財羨制成計得又遷殿中侍御史度支營田副使分閫之寄參制其半柔以仁撫剛以義㫁戎臣坐嘯公堂無事朝端延首方待以位既而禄不及伐氷政不獲專達以其年正月九日遇疾終于集作於私館享年五十嗚呼痛哉奔驥騁力中途踠足髙鴻輕舉在雲墜翼凡我所知哀痛無極本道節度尚書朔寧王張公震悼涕慕不任于懐臨遣牙將試殿中監李輔忠監備㓙禮賵賻甚厚行軍司馬侍御史韋中規等匍匐救助事用無闕丹旐素車歸于上京撰期定宅莫有􅄽素故友諸生宗人外姻號慟㑹葬哀禮咸申克窆𤣥堂掩坎廣輪顧盼無依徘徊増哀願勒休聲延垂後賢於是汝南月君集作公相巢等相與琢石書德用圖不朽文曰抱元淳稟粹和既强毅又柔嘉登儀曹耀文章司學徒儒風揚自渭北來朔方戎政閑黔首康冠惠文垂朱裳才不施天茫茫刋樂石篆遺芳集作德延休烈垂憲則於萬年長無極𢎞農令栁府君墳前石表辭前人少陵原栁氏之大墓唐貞元十九年某月日孤某奉其先府君洎夫人之喪祔于其位由新墓而南若干步曰高祖王父蘭州府君諱某字某之墓又東若干步曰曽祖王父邠州府君諱某之墓西若干步曰祖王父司議郎府君諱某之墓咸異兆而相望昭穆之有位序壤樹之有豐殺皆如律令府君諱曰集無曰字下同某字曰某由父任為太廟齋郎更許昌陽武伊闕華原尉王屋丞汝隂令為𢎞農二年推其誠格于其人闢土生穀若有天相之道衣食給足故人不札夭教厲明具故俗不爭奪遂以洽于太和事理克彰刺史盧把加禮褒旌考績絶尤推君之政風于下邑命為吏部尚書郎庾河南授命黜陟狀君理績殊異宜升天朝帝有歎焉方圖優昇命用不長年五十五建中二年某月日卒于官以其素亷家之蓄不足以充㓙事遂殯于是邑仍㑹危難至于今乃克返葬孤某常為黔州録事參軍今無禄仕而集有志字不敢緩初君娶司農少卿京兆韋山之子集作孫涇陽主簿迴智之女德容溫良大厯二年某月日卒于越而假葬焉孤某徒行自越舉夫人之喪至於虢舉𢎞農君之喪咸至於墓窆焉既窆立石表於壙集作墳前示後之人以無忘孝敬嗚呼世有難仕于外而葬其族者希矣孝子之心有待駟馬五鼎而卒不至者焉若今之殺衣黜食寒妻子饑僕御終身由之而志益不懈為旅人徒跣萬里以厄困終事孝之難者歟五十而慕者舜也禄三集無此字千鍾而悲者曽子也聖且賢難之若是今之人有由其道者得不立於世乎給事中皇太子侍讀陸文通先生墓表前人孔子作春秋千五百年以名為傳者五家今用其三焉秉􅒀牘焦思慮以為論註疏説者百千人矣攻訐狠怒以辭氣相擊排冒没者其為書處則充棟宇出則汗牛馬或合而隠或乖而顯後之學者窮老盡氣左視右顧莫得而本則專其所學以訾其所異黨枯竹護朽骨以至於父子反集作傷夷君臣詆悖者前世多有之甚矣聖人之難知也有吳郡人陸先生質與其師友天水啖助洎趙匡能知聖人之旨故春秋之言及是而光明使庸人小童皆可積學以入聖人之道傳聖人之教是其德豈不侈大矣哉先生字某既讀書得制作之本而獲其師友於是合今古散同異聨之以言累之以文蓋講道者二十年書而志之者十餘年其事大備為春秋集註十篇辯疑七篇微㫖二篇明章大中發露公器其道以生人為主以堯舜為的苞羅旁魄膠轕上下而不出於正其法以文武為首以周公為翼揖讓升降好惡喜怒而不過乎物既成以授世之聰明之士使陳而明之故其書出焉而先生為巨儒用是為天子爭臣尚書郎國子博士給事中皇太子侍讀皆得其道刺二州守一本無此字人知仁一本作化永貞年侍東宫言其所學為古君臣圖以獻而道達乎上是歲嗣天子踐祚而理尊優師儒先生以疾聞臨問加禮某月日終于京師某月某日葬于某郡某里嗚呼先生道之存也以書不及施於政道之行也以言不及繩集作覩其理門人世儒是以增痛動將葬以先生為能文聖人之書通于後世遂相與諡曰文通後先生集作先生後若干祀有學其書者過其墓哀其道之所由乃作石以表碣一本無碣字文苑英華卷九百七十
