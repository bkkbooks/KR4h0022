body:
  text: 文苑英華卷七百三十四宋李昉等編贈贈陳八秀才赴舉序一首贈復州崔使君序一首贈孫生序一首别秋晩入洛於畢公宅别道王宴序一首别盧主簿序一首春夜桑泉别少府序一首秋夜於綿州羣官席别薛昇華序一首還冀州别洛下知己序一首别李八騎曹序一首夏初别宋三少府之豐城序一首别冀侍御崔司議序一首别中嶽二三眞人序一首别韋侍御使蜀序一首禹廟别韋士曹序一首卧病舟中相里范二侍御先行贈别序一首别韓方源序一首别王佐卿序一首别崔曼序一首贈贈集作送陳八秀才赴舉序歐陽詹諸侯歲貢俊秀集作才於天子故陳侯今年有觀光之舉白露肅物青天始髙雲迥鴻磐集作盤言遵永途吾觀夫雄心銳志將領能事則夷山堙谷不盡其心力何東堂一枝南荆一片足塵土集無土字其慮耶勉哉陳侯有其才奏其試知有成矣贈復州崔使君序韓愈有地數百里趨走之吏自長史司馬以下數十人其禄足以仁其三族及其朋友故舊樂其集作乎心則一境之人喜不樂乎心則一境之人懼大丈夫官至刺史亦榮矣雖然幽逺之小民其足跡未嘗至城邑茍有不得其所能自直於鄉里之吏者鮮矣况能自辨蜀本作辯下同於縣吏乎能自辨於縣吏者鮮矣况自辨於刺史之庭乎由是刺史有所不聞小民有所不宣賦有常而民産無恒水旱疫癘集作癘疫之不期民之豐約懸於州縣二字杭本作前縣令不以言連帥不以信民就窮而歛愈急吾見刺史之難爲也崔君爲復州其連帥則于公愈以爲崔公集作君之仁足以蘇復人于公之賢足以庸崔君有刺史之榮而無其難爲者將在於此乎愈嘗辱于公之知而舊逰于崔君慶復人之將蒙其休澤也於是乎言贈集作送孫生序皇甫湜浮圖之法入中國六百年天下胥而化其所崇奉乃公卿大夫野益荒人益饑教益頽天下將無而始渾然自上下安之若性命固然也孫生天與之覺獨曉然於厚夜聦然於大醉發憤著書攻而指斥之其詞委備痛入肝血乃忘力之不足以死爲斷庶幾萬一悟主救人者嗚呼不得古人而與之必也生乎遂集作道非除肉刑一女言也能移髙山一翁願也彼髠褐雖翳地其無足憂乎西江之涯値生盡出其說以爲贄集作摯而見余余既悲異之乃約其言别秋晩入洛於畢公宅别道王宴序王勃下官才不曠俗寵一作識不動時充皇一作帝王之萬姓預乾坤之一物早師周禮偶愛儒一作愛神宗晩讀老莊動諧眞性進非干物自疎一作跡朝市之機退不邀榮誰識王侯之貴散琴樽於北阜喜耕鑿於東陂野老披荷暫辭幽澗山人賣藥忽至神州驚帝室之威靈偉皇居之壯麗朝逰魏闕見軒冕於南宫暮宿靈臺聞絃歌於北里交情獨放己厭人間野性時違一作馴少留都下道王以天孫之重分曲阜之新基畢公以帝室之華擁平陽之舊舘迹塵鐘鼎思在江湖居榮命於中朝接風期於下走緑縢朱紱且混以蘿裳列榭崇軒坐均於蓬户賔主由其莫辨語黙於是同歸終大王之樂善備將軍之揖客是日也雲繁雨驟氣爽風馳髙秋九月王畿千里髙扄向術似元禮之龍門甲第臨衢有當時之驛騎英王入座牢醴一作醋酒還陳髙士臨筵樵蘇不㸑是非雙遣自然天地之間榮賤兩忘何必山林之下𤣥談清論泉石縱横雄筆壯詞煙霞照灼既而神馳象外宴洽寰中白露下而南亭虚蒼烟生而北林晩鶢鶋始望不及牲牢麋鹿長懐非忘林藪先生負局倦城市之塵埃逰子横琴憶汀洲之杜若况乎迹不皆遂時不冄來屬宸駕之方旋値羣公之畢從洛城風景此㑹無期戚里一作維嶺笙竽浮驩昜盡仰雲霞而道意捨塵事而論心夏仲御之浮舟願乘春水張季鷹之命駕思動秋風䇿藜杖而非遥勅一作整柴車之有日青溪數曲幽人長徃白雲萬里帝鄉難見安貞抱朴已丼心於下走全忠履道是所望於羣公倘心迹克諧去留咸遂廟堂多暇返身滄海之隅軒冕所辭廻首箕山之路尋赤松而見及泛黄菊以相從雖源水桃花時時失路而幽山桂樹往往逢人庶公子之來逰幸王孫之畢至茅君待客自有金壇王烈迎賔還開石架惟恐一邱風月侣山水而忘年三徑蓬蒿待公卿之來日對光陽之易晩惜雲霧之難披羣公鄴縣鳬飛入朝廷而不出下走遼川鶴去謝城闕而依然敢抒重襟爰踈短引式命離前之筆希存别後之資凡我故人其辭云爾别盧主簿序前人林慮主簿清靈士也逹于藝明乎道詮柱下之理駁河上之義撮其綱統成其卷軸吾儕服其精博時議稱其典要可謂賢人師古一作古言老氏不死矣夫靈芝既秀蘭蕙同薰仙鳳于飛鵷鸞舞翼何則物類之相感也况乎同得此義目擊道存此僕所以望風投欵披襟請益展轉於寤寐殷勤于左右詩不云乎中心藏之何日忘之然變動之不居乃聚散之恒理琴樽暫離一作㑹山川有别惟髙明之捧檄屬吾人之解帶王事靡盬良時易失盍陳雅志各叙幽懐人賦一言同疏四韻云爾春夜桑泉别少府序前人下官以窮途萬里動脂轄以長驅王公以傾餞百壺别芳筵而促興是以青陽半序明月中宵離亭擁花草之芳别舘積琴歌之思去留歡盡動息悲來惜投分之幾何恨知音之忽間他鄉握手自傷關塞之春異縣分襟意切悽惶之路既而星河漸落煙霧仍開髙林静而霜鳥飛長路曉而征驂動含情不拜空佇聽於南昌揮涕無言請投文於西候因探一字四韻成篇秋夜於綿州羣官席别薛昇華序夫神明所貴者道也天地所寶者才也故雖隂陽同功宇宙勠力山川崩騰以作氣星象磊落以降精終不能五百年而生兩賢也故曰才難不其然乎今之羣公並受竒彩各仗異氣或江海其量或林泉其識或簮裾其跡或雲漢其志不可雙得也今並集此矣豈英靈之道長而造化之功倍乎然僕之區區常以為人之百年猶如一瞬非不知風月不足懐也琴樽不足戀也事有切而未能忘情有深而未能遣故僕射羣公相知非不深也相期一作愛非不厚也然義有四海之重而無同方之感分有一面之深而非累葉之契故與夫昇華者其異乎嗟乎積潘楊之逺好同河汾之靈液目置良友相依窮路是月秋也于時夕也他鄉怨而白露寒故人去而青山逈不其悲乎盍各賦詩云爾還冀州别洛下知己序東西南北丘也何從寒暑隂陽時哉不與河陽古樹無復殘花合浦寒煙空驚墜葉王生賣藥一作畨入天子之中都夏統乘舟屬羣公之大㑹風煙匝地車馬如龍鐘鼔沸天美人似玉芳筵交映旁徼一作徴豹象之胎華饌重開直報疑蛟龍之髓季鷹之思吳命駕果為秋風伯鸞之適越登山以求渌水辭故友謝時人登鄂坂而紆廻入邙山而北走何年風月三山滄海之春何處風花一曲青溪之路賔鴻逐暖孤飛萬里之中仙鶴隨雲一作書直去千年之後悲夫光隂難再子卿殷勤於少卿風景不殊趙北相望於洛北鴛鴦雅什俱為贈别之資鸚鵡竒杯共盡忘憂之酒别李八騎曹序駱賔王夫人生百齡促膝是忘言之契丈夫四海交頥非贈别之資然而想山川之遽遥送歸將逺惜歲華之不待行樂無時是用輟征驂以少留敞離亭之集作而多暇山芳襲吹坐疑蘭室之中水樹含春宛似楓江之上加以御溝新溜近入離絃賔舘餘花遥催别酒既而榮波東注㶚岸南登緑蟻空集作傾而髙宴終金烏落而離言促雖相思有贈終結想於華滋而素賞無暌盍申情於麗藻人為四韻各賦一言夏初别宋三少府之豐城序前人􅀢然銷䰟者豈非生離之恨歟况帝里天津槐衢分黒龍之水巴陵地道楓江遥集作連白馬之門親友俳徊締歡言於促膝故人樽酒掩離涕於交頥于時晩吹吟桐疑奏離别之曲輕秋入麥一作夜似驚摇落之情白日將頽青山行暮想姑蘇之地夕露霑衣望吳㑹之郊斷雲集作風飄蓋嗟乎岐路是他鄉之恨溝水非明日之歡雖集無此字玉斗臨吳太阿之氣可識金陵背楚小山之路行遥盍各賦詩式昭離緒云爾集無此二字别冀侍御崔司議序陳子昻朝廷歡娛山林幽晦集作毒思魏闕䰟已九飛飲岷江情復三樂進不忘匡救於國退不慙無聞集作悶在林冀侍御崔司議至公至平許我以語黙於是矣夫逹則以公濟天下窮則以大道理身嗟乎子昻豈敢負古人哉蜀國酒醨無以娛客至於挾清琴集作瑟登髙山白雲在天清江極目可以散孤憤可以逰太清爲一世之逸人寄千里之道友吾欲不謝於崔冀二公矣所恨酒未醉琴方清王事靡盬驛騎遄逺集作連不盡平原十日之飲又謝叔度累日之歡雲山悠悠嘆不及也載想房陸畢子為軒冕之人不知蜀山有雲巴水可渉集作興暌闊良㑹我心惄然請以此酣寄謝諸子為巴山别引也陳子昻醉詞曰有道君匡國無悶予在林白雲峨嵋上歲晩來相尋二十字英華作王仲烈知吾此情示之可笑别集作送中嶽二三眞人序夫愛名山歌長往世有之矣文粹有若夫二字放身霄嶺宴景雲林卑俗不可得而聞時士不可得而見則吾欲髙視終古一笑昔人嵩山有二仙人自浮丘公王子晉上朝玉帝遺跡金壇鳳簫文粹作笙悠悠千載無響吾毎以是臨霞永慨撫膺嘆息文粹作増嘆常謂煙駕不逢羽人長往去囂世走青雲登玊女之峯窺石人之廟見司馬子㣲馮太集作大和霓裳眇然㝠壑獨立真朋羽㑹金漿玉液則有楊仙翁𤣥黙洞天賈上士幽棲牝谷玉笙吟文粹作吹鳳摇裝集作文駐鶴方且迷軒轅之駕期汗漫之逰吾亦何人躬接兹賞實欲執青節從白蜺陪飲崑崙之庭觀化𤣥元之府宿心遂矣𡨕骨丼焉文粹作矣豈知瓊都命淺金格文粹作籙道㣲攀倒景而迷途顧中峯而失路塵縈俗累復汨吾和仙人真侣永幽靈契翳青芝而延佇遥㑹何期結丹桂集作砂而徘徊逺心空絶紫烟去黄庭極仰寥廓而無光視寰區而寡色悠悠何往白頭名利之交咄咄誰嗟𤣥運盛衰之感始知楊朱岐路墨翟文粹作子素絲尚平辭家而不歸鮑焦抱木而枯死可以慟可以悲古人之心吾今得之也文粹作矣别韋侍御使蜀序張九齡予之友曰韋侯始以才進中而遇坎自廷尉評為益州刺史行欲美也玉藴集作映而山輝善無小也鶴鳴而天聽俄自謫官假其察視奮飛泥蟠皇華原隰為持斧之使集作史受負弩之禮非其明義清節髙邁卓絶時軰所美朝議推多亦焉得利其往蹇而振其廢滯而今而後予有以見舉德之輶為神之介雖不本於利而終享其實者有矣夫火中暑徂使車云邁心同道合㫖酒有餞或席次林藪集作授或觴臨郊岐風流相從日夕以繼者於若人如此其厚也僉以為無欲而自致韋子之謂道有善而不揚朋友之為過然則今之所至莫善於詩盍賦一章以美吾友故有斯作也禹廟别韋士曹序孫逖世稱命祠者禹廟之謂矣初少康以一旅之衆復禹之績祀夏配天不失舊物立祠制位兹其始也炳靈不測潛德有孚東南方土罔不祗若故自班白至于童㓜駿奔走執籩豆相望道路歲無虚日郡掾韋公諸侯之良也掄才慮行秉秀騰實清明在躬造次於是夫率人以歛邦賦之重簡才備行郡事之急撰功底績者非韋公而誰詩曰鴻鴈于飛哀鳴嗷嗷維此哲人謂我劬勞韋公有焉練日明發沐芳祠宇邀祝史以陳信宴朋徒而寵行川澤紆餘棼棟膠葛天與澄霽神助幽隂萬象皆清百籟非俗蓄洞澤以東匯亘連岡而南指嵐氣沉沉陽景不入神光爛爛隂堂自明吁其駭人也韋公乃挹瓊芳酹𤣥酒倚余棹兮中洲君不行兮夷猶令洞庭兮無波使江水兮安流要言既招神具斯醉宴樂愷悌初自明而逹幽景福興作終出無而入有祭典不黷王事其勤餙覉紲之徒旅想京闕之雲物東園有洛西河惟雍歴金門觀象闕則知聲明之盛也登鄠杜躋崤函則知形勝之美也詩人所以適樂國君子所以操土風及君此行二者備矣則傴僂下土欝湮一作湮沉外邦者尚有何言哉凡我同人賦詩贈别云卧病舟中相里范二侍御先行贈别序李華華與二賢早相得偕脩君子之儒而獨無成偕勵人臣之道而獨失節偕遇文明之運而獨衰病天寳中奉詔亷軍政北至朔垂駐車隂山辱司徒公太尉公一盼之恩先時為伊闕尉忝相公尚書約子孫之契不幸孤負所知虧頓受汙流落江湖于今六年大明升於陽谷幽蟄附於光輝一作耀元惡掃除泰階如砥天下衣冠謂華為相府故人詔書屢下促華赴職稽首震惶恨無毛羽左司員外郎張公侍御史相里公殿中侍御史張公監察御史范公嚴公望髙職雄持斧登車江湖霜清道路風起華也潦倒龍鍾百疾叢體衣無完帛器無兼蔬以妻子為童僕以笠履為車服並轂無由呻吟舟中大别之陽有焞龜之父揲蓍之老華請占命之厚薄乃裹龜囊蓍而言曰三靈人為宗則人過於蓍龜也耳目主於心則心過於視聽也足下被儒者之服讀先聖之書與身消息足知性命胡為而煩予予之二物不足占足下華病不能拜拳拳扣顙一作頭敬承先生况服勤西方之教久齊生死之域言其外者則儒不成矣與匹夫同敗名節矣與墨􅀈同既衰病矣與廢疾同雖牽率危憊匍匐顛沛君父含𢎞宰政不遺適為朝廷之穢相府之羞也又安得恃為故人哉其内者則大師㣲㫖幸遊其藩丼露灌注於心源寳月照明於眼界無得之分可與進矣負薪之憂忍不為言江亭慿檻平視漢臯武昌栁暗湓城花發一榮一枯有懽有慼離别之念又焉得不悲乎四言詩雅之遺也以貺雅士盍以雅為贈乎則知車馬佩玉之多反為末也病夫李華序别韓方源序元結昔元次山與韓方源别于商餘約不終歲復相見於此山忽八年於今始獲相見悲懽之至言可極耶次山與方源昔年俱順於山谷全然之意今方源得如其心次山汙在集作其冠冕次山一顧方源再之慙羞時復引酒求其安我今方源欲安家肥陽次山方理兵九江相醉相辭一作相辭相留不必如昔年之約此情豈易然者耶乙未之前次山有元子乙未之後次山有猗玕子戊戌中次山有浪說悉贈方源庶方源見次山之意别王佐卿序癸卯歲京兆王契佐卿年四十六河南元結次山年四十五時次山頃日二字集作須浪逰呉中佐卿頃日集作須日去西蜀對酒欲别此情易耶在少年時握手笑别雖逺不恨以天下無事志氣猶壯今與佐卿年近五十又逢戰争未息相去萬里欲强笑别其可得乎與佐卿去者有清河崔異與次山住者有彭城劉灣相醉集作辭相留幾日江畔主人鄂州刺史韋延安令四座作詩命余為序以送逺云别崔曼序漫叟年將五十與時世不合垂三十年愛惡之聲紛紛人間博陵崔曼惑叟所為逰而辨之數月未去㑹潭州都督張正言薦曼為蜀邑長將行叟謂曰叟異時乃山林之集無之字一病民耳宜不相罔行矣勿惑吾子有才業且明辨又方年少必能樹勲庸垂名聲若求先逹賢異能相􅋞拭正在張公張公往年在西域主人能用其一言遂開境千里威振絶域寵榮當世集無此四字公往在淮南逡廵指麾萬夫風從遭逢猜疑弛而不為今海内兵革未息張公必為時用吾子勉之所相規者宜緩歩冨貴從容謀畫少節酒平氣槩耳文苑英華巻七百三十四
