body:
  text: 文苑英華巻九百四十六宋李昉等編職官八京官附杜牧自撰墓誌一首馬少監墓誌一首栢蒼部宗回墓誌一首尹四門守貞墓誌一首房正字凛墓誌一首獨孤校書申叔墓誌一首李校書元賔墓誌一首自撰墓誌銘杜牧牧字牧之曽祖某河西隴右節度使祖祐司徒平章事岐國公贈太師考從郁駕部員外郎累贈禮部尚書牧進士及第制䇿登科𢎞文舘校書郎試武衞兵曹叅軍江西團練廵官轉監察御史裏行御史淮南節度掌書記拜真監察御史以弟病棄集作去官授宣州團練判官殿中侍御史内供奉遷左補闕史舘脩撰轉膳部比部員外皆兼史職出守黄池睦三州遷司勲員外郎史舘脩撰轉吏部員外郎以弟病乞守湖州入拜考功郎中知制誥周嵗拜中書舎人牧平生好讀書為文亦不出人曹公曰吾讀兵書戰䇿多矣孫武深矣因注其書十三篇可集作乃曰上窮天時下極人事無以加矣後當有知之者去嵗七月十日在呉興夣人告曰爾當作小行郎復問其次曰禮部考功為小行也禮部集無此二字言其終曲集作典耳今嵗九月十九日歸夜㣲集無此字困亥初就枕􅃦得被勢乆酣而不夣有人郎告曰爾改名畢十月二日奴順来言炊將熟甑裂予曰皆不祥也十一月十日夣書片紙皎皎白駒在彼空谷旁有人曰空谷非也過隙也予生於角昴畢於角為第八宫曰病厄宫亦曰八殺宫上星在焉火星繼木星工楊晞曰木在張於角為第十一福徳宫木為福徳大君子救於其旁無虞也予曰自湖守不周嵗遷舎人木還福於角足矣土火還死於角冝哉復自視其形視流而疾鼻折山根年五十斯夀矣某月某日終于安仁里妻河東裴氏朗州刺史􅅯之女先牧若干時卒長男曰曹師年十六次曰祝柅年十二别生二男曰蘭曰興一女曰貞皆以某月日葬于少陵司馬村先塋銘曰後魏太尉顒封安平公及予九世皆葬少陵嗟爾小子亦克厥終安于爾宫秘書少監史舘脩撰馬墓誌李翺公諱某字盧符宣州刺史𤣥慶集作度之曽孫著作郎贈少府監恬之子公九嵗貫渉經史魯山令元徳秀行髙一時公徃師焉魯山令竒之號公為馬孺子為之著神聦賛由是名聞中書令郭公子儀奏為懐州叅軍充四鎮伊西庭節度廵官從事河陽三城河東三集作二是府累轉試大府丞因得太原府倉黜陟使裴伯言謂公堪為諌官薦之於朝井殿中御史充昭義軍節度叅謀召為太子左賛善大夫遷主客員外郎使於集作于海東復命授興元少尹入為將作少監改國子司業遷祕書少監又加史舘脩撰元和十三年十一月己酉􅃦疾卒公博覽多藝弈碁居第三品家貧未嘗問生業祗以纂録自樂為事撰厯代紀録類史鳯池録纂寳折桂録新羅紀行將相别傳及所集無所字為文緫四百八十八卷年登八十官貳祕書職領太史雖不極於冨貴亦儒者之難及也夫人潁川陳氏贈潁川郡君先公終三十年餘矣有子七人曰文則由進士補錢塘尉第二第四子文範並早卒曰文同曰文約讀書著文有名於進士塲曰文輿曰溪郎皆恭守家法女五人其存者三人未笄文同等奉公之䘮以明年二月祔葬于偃師從先塋謂翺嘗從於史氏之列来請為誌倉部栢郎中墓誌銘羅衮近代科學之家有栢氏倉部府君諱宗回字㡬聖祖士良忠州司馬父暠毛詩博士贈國子司業君踵父學開元禮咸通中考官第之尚書落之不勝壓屈因罷取家䕃出身選為州縣官厯數任從軍幕為判官皆有聞相國文昭公甚重之授著作郎于蜀行朝上即位數年承反正之後將脩太廟時見饗九廟十二室而實七代議者以為天子七廟六經無九廟文又欲以穆宗宣宗為二廟僖宗為一廟出敬宗文宗武宗為别廟文武百官參議不能定或薦君於相國徐君遂擢授太常博士及進議請脩奉九廟十四室於是援引經籍研校今古發出九廟九代之議追祔代宗徳宗二廟穆宗宣宗通為一廟以僖宗添為一室敬宗文武徳懿宗為一廟親不可出其推次代室分齒昭穆為晳然矣又下百官赴尚書省叅詳咸以為允奏請行之天子嘉奬敬依其議然其徴㨿乃尚書正文而不用鄭𤣥之說其法制乃殷周逺事而不取漢魏已下故時人多疑之遂與數家争論雖未行其議而亟加寵秩始遷虞部員外郎賜緋魚袋嵗中轉虞部郎中明年遷倉部郎中加朝散大夫年六十一以光化二年二月二日卒官京師某月日歸葬先人之塋于邠州夫人清河張氏子廷徽開元禮登科廷鸞尚㓜君撰王公家廟録五卷奏議論難宗廟之書萬有餘言銘曰㡬聖之道予實親之㡬聖之言予固聞之宗廟之事一何專竒一作乎非討摘奥冥不由於師乃鄙鄭𤣥乃恱湯伊今世之人安得不疑賜服熒熒省行屢征兀􅀈裒一作影褒華雖死不瞑親見夫子其勢不行夫子既没庶㡬乎明茍如斯言遺恨可平尚或有知時觀吾銘四門助教尹先生墓誌銘張元先生諱守貞一作真天水冀人盖好學博古者也本乎官族稱為尹氏昔有尹佚司周太史既乃吉甫勤於宣王格言大勲布在詩傳逺祖緯魏僕射曽祖欣隋開府大父珍唐棣州蒲臺令父文唐通州三岡令先生積徳餘慶天錫純嘏愿而克恭情與理合七嵗誦爾集作三雅能通書契訓誥集作詁之義識草木禽獸之名十五誦三禮明乎君臣父子之道定郊廟吉㓙之制二十誦春秋尚書能精五行九疇之别集作數斷褒貶㑹盟之節二十五誦詩書及易能辯政教雅頌之始極變化生生之至又能誦古史百家之書文章草𨽻之則耻夫流俗背實嚮聲飾華褰末故每外和内厲元元本本學者如斯不舎晝夜垂拱四年以明經髙第遂授大成自延載之後條限賔薦長安之初大開貢舉考功是嵗千五百餘人召先生課覈淑慝時稱無滯矣天子聞其進通經術乃下制曰成均大成尹守貞業隆時習功宣日新集作就既有厲於分隂俾參榮於杖席可四門助教詵詵青襟有所仰矣長安二年六月十日晝􅃦忽夣麟臺两局争召脩行文覺而嘆曰十二日稷吾當徃矣因命親族序訣至日安枕俟期俄然而卒春秋四十可謂古之逹化知命者嗚呼天與之徳而不永其年天與之才而不大其位何乎粤七月十七日葬于髙陽原先君子之舊塋銘曰尹氏之子其殆庶㡬為仁由巳三月不違謙成徳柄學也身基辟雍洋洋可以療饑環林之下可以棲遲我實道貴人言位㣲脩文地下前哲同歸子之知命將殁先期朝衣東首精魂髙飛人之云亡胡不悽而髙陽之原有匪集作悱其側郭門直視松栢一色丘隴累累阡陌誰識浮焉休焉我心惻惻集作為我心則房正字墓銘梁肅闕唐長安令思晦之孫殷城令齊公之子相國贈太尉清河公琯之族子也興元元年十月終于監官縣之族集作旅次旋窆于楚州寳應之某原孟子云雖有鎡基不如逢集作待時揚雄亦稱李仲元不詘其志不累其身時無仲尼惡乎聞若敬叔以五常為師六學為友行年五十八而動不一合艱屯臲危没於道路噫孟軻揚雲集作雄其知言者歟集作如敬叔十嵗好學十五年能屬文二十餘值陸渾為戎遯于東南劉僕射以賢良薦授秘書省正字常黄門崔中書繼持國柄方待以儒者之職屬二相薨免其他時政集作當路君又不能附離乃卷道退歸每言五經之首其道大備而去聖窮逺義類繁滋博而寡要學者罕究乃撮其異同各集作名以彚聚凡三百餘篇草藁未就遘疾集作厲而殁冉耕廢疾申公胥靡世道下衰仁人随之然歟通人趙郡李遐叔常云我思古之人房行古之道房哉房哉集本此下又有哀哉哀哉四字嗣子某泣序遺烈請予為誌文曰儒為徳本徳實教源不有逹學孰纂群言恂恂房君行直而温一匡六藝獨立顓門冝登師席啓廸䝉昏今也則亡来者何云荆棘滋茂芝蘭燒焚命集作今不可問于嗟房君祕書省校書郎獨孤君墓誌集作碣桞宗元嗚呼有唐仁人獨孤君子集無子字之墓祔於其父太子舎人諱助之墓之後自其祖贈太子少保諱問俗而上其墓皆在覇水左今王后集作父營陵於其側故再世在此嗚呼獨孤君之道和而純其用端而明内之為孝外之為仁黙而智言而信其窮也不憂其樂也不淫讀書推孔子之道必求諸其中其為文深而厚尤慕古雅善賦頌其要咸至集作歸于道昔孔子之世有顔回者能得于孔子後之仰其望集作賢者辟之如日月而莫有議者焉嗚呼獨君之明且仁而集作如遭孔子是有两顔氏也今之世有知其然者乎知之者其信於天下乎使夫人也夭而不嗣世之惑者猶曰尚有天道嘻乎甚耶君諱申叔字子重年二十二舉進士又二年用博學宏詞為校書郎又三年居父䘮未練而没盖貞元十八年四月五日也某集作是年七月七集作十日而葬鄉曰某鄉原曰某原嗚呼君短命行道之日未乆故其道信於其友而未信於天下今記其知君者于墓韓泰安平南陽人李行諶元固其弟行敏中明趙郡賛皇人桞宗元河東觧人崔廣畧清河人韓愈退之昌黎人王涯廣津大原人吕温和叔東平人崔群敦詩清河人劉禹錫夣得中山人李景儉致用隴西人嚴休復𤣥錫馮翊人韋詞致用京兆杜陵人太子校書李元賓墓誌銘韓愈李觀字元賔其先隴西人也文粹集作本並無也字始来自江之東二本有實大學之禄五字年二十四舉進士三年登上第又舉博學宏詞得太子校書又一年二十九客死于石本作于京師既歛之無之三日其友人博陵崔𢎞禮買地以葬之于六字集作賣馬葬于文粹止作葬之于國東門之外七里鄉曰慶義鄉原曰嵩原昌黎韓愈其友人也集作友人昌黎韓愈書石以誌之其銘集作辭曰已乎元賔夀也者吾不知其所慕夭也者吾不知其所惡生而不淑孰為石本作謂其作之夀死而不朽孰為其大已乎元賔文髙乎當世行過石本作出乎古人已乎元賔集無此四字竟郡伯温次子􅀶字公濟續父書號聞見後録謂實本作意為妙方崧卿舉正信之大抵前軰文字多自改於刻石之後而實本真贗尚未可知况邵氏父子所録差誤非一端不可盡信以理觀之竟亦勝意何為哉竟何為哉文苑英華卷九百四十六
