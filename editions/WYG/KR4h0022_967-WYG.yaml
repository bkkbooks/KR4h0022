body:
  text: 文苑英華巻九百六十八宋李昉等編婦人六王使君夫人崔氏墓誌一首許縣丞夫人韋氏墓誌一首何少府夫人盧氏墓誌一首李少府夫人盧氏墓誌一首栁贊府夫人權氏墓誌一首王侍郎太夫人劉氏墓誌一首裴府君夫人栁氏墓誌一首亡妻楊氏墓誌一首朝議大夫洋州刺史王君夫人博陵縣君崔氏祔葬墓誌銘權德輿夫人姓崔氏博陵安平人皇鳯閣侍郎平章事博陵郡𤣥暉集作暐是之曾孫禮部侍郎璩之孫侍御史賁之息女洋州刺史瑯琊王君澄之嘉偶崔氏自漢濟北長岑代為文宗王氏自晉睢陵即丘繼生元臣二族之茂范蔚宗沈休文推本言之矣重以母后中宗之際石泉博陵二先正有經綸代命之材推戴格天之業延耀濟美為祥為祉為君子為士女合姓好逑與他族不侔夫人未笄累失恃怙旁無兄弟泣血襄事奉二尊裳幃間闗道途自鍾陵抵洛邑哀敬與禮三者無違神祐純孝為宗姻所歎某年從父兄縱盛選卿才故王君納采焉王君以才器政事連辟公府歴御史司直為河南紀綱掾改陽翟令入為尚書屯田郎出刺洋州柔嘉左右叶是休徳初洋州同氣八人名居集作位焯於當時冢婦介婦必華宗淑詰夫人贊宗事供先祀鼔琴誦詩姿操閑集作嫺雅奉上以誠羣居用和外言内言不越於閫朝服祭服必成於手洋州捐館二十年而夫人殁於櫟陽之别墅時貞元十九年秋七月某甲子蓋年五十一初洋州娶滎陽鄭氏生子曰造而夭夫人以繼室生子三人曰廼曰逵曰邁母儀均養皆為良士造仕至藍田尉迺修詞與計偕逵邁咸以門資分佐環列哀號罔極泣問龜䇿二十年冬十月某甲子祔于洋州之舊封先是洋州猶子興平尉源長受夫人之理命曰吾與爾二門積徳奕代銘表必咨時文先舅之碑吏部趙郡李公實為之先君之誌從翁太傅文貞公實為之且以德輿於夫人有通世之舊猥求論譔泣狀遺懿實而不華是用采獲以銘内則銘曰安平臨圻右族蕃滋仁賢是儀好合嘻嘻乃封故地象服斯貴諒無攸遂亦勸以義婦順彰聞母儀可尊肅肅閨門四男晨昏吁嗟風樹奄閟泉路魯人之祔皇辟之墓鏤茲淑聲永識㝠㝠湖州武康縣丞許君夫人京兆韋氏墓誌銘前人夫人姓集無姓字韋氏京兆杜陵人楚傅漢相之後分封競美以至周鄖襄公孝寛為宗門龜龍曾祖某某官祖某某官父楚器皇太子宫門郎其外族隴西李氏涼武昭王𤣥盛後魏司空文穆公沖隋絳郡公禮集作李成之世德輿之從母姊集作娣也中外華閥乃生淑喆㓜失恃怙先太君保而養之猶女子子焉既笄歸于某郡許授授循里喻義調常州義興尉湖州武康丞滿歲葺田廬於霅溪之上忘懷進取夫人贊家道以供先祀誡宗伯而饁冀缺許君之動靜無悔抑有助焉所從之禄甚薄不及偕老徙宅教子宜家佐餕閨門之禮有同嚴君才識所及過人逺甚雖内外之言不越於閫而人事物理皆能折中焉凡結褵二十五歲而稱未亡人又十五歲而不舉火時元和二年正月某甲子春秋五十九其子士儉謹敏屬詩書未與計偕者不忍違養故也泣訪蓍蔡得十月某甲子吉權祔于皇辟之封惟夫人有姿操徽範不得被魚軒翟茀之飾獨振内則而傳母儀孝子冢婦居喪率禮無違而哀有餘姻黨稱焉嗚呼孩提相長實均同氣今視士儉猶吾之出焉士儉緘哀詞治集作理命請刻圓石屑涕直書寄茲沈痛銘曰士之積集作贊行未必豐禄有美夫人不登象服從夫也有德有儀訓子也恩斯勤斯勸以義兮道之慈養未及兮命奪之服在緦兮心若朞刻琬琰兮涕鉛洟集作流涕洟洛陽尉何君夫人范陽盧氏墓誌銘前人夫人姓盧氏范陽人曾祖仁皇相州録事參軍祖不勤皇壽州霍山縣丞父隨皇太原府祁縣丞三世沖晦皆不至大官故夫人鍾其粹美生為嬪則以既笄之年歸廬江何君官至洛陽縣尉夫人有輔贊之美柔明之行誠順孝慈以内則為師故得六姻之和而禮無違者乾元中何君早世夫人訓字諸孤動必以方長子士程為蘇州嘉興尉㓜子士乂儒行修明或史集作吏或文克荷先構有女二人長適河東裴氏次適博陵崔氏皆奉母之訓宜其家室非導之教之之至其及此歟以興元元年三月日考終命于嘉興年六十一士程士乂等謀及龜筮以某月日權厝潤州未克返塟故也夫人即考功員外郎士幹之世母也予嘗接考功遊獲聞行實故不敢辭二孤之請刻石以銘之辭曰婉彼夫人淑明柔克周旋動用率由四德不享蕃祉不躋壽域二連之哀哀何有極潤州丹陽縣尉李公夫人范陽盧氏墓誌銘前人夫人姓盧氏范陽人北齊黄門侍郎思道之五代孫也曾祖悌皇髙道不仕祖綱皇城門郎父侑皇太原縣尉雖仕皆數命以至淪謝而皆飾行懿文有當時之譽明德奕世誕生夫人既笄嬪于李公李公為烏程丹陽二縣尉夫人居貧守約動必由禮謙敬以睦中外吉蠲以奉蒸嘗甘糲梁服澣濯中饋式敘和樂嘻嘻有嘉聞而無攸遂一紀于茲矣嘗聞善餘慶謙受益豈前志之謬歟將有必定之數歟既而奄忽遘疾不翌日而大漸以大厯十一年月日殁于丹陽之私第享年若干某月日權厝于縣之五里原從宜也生子數人早歲夭落今之存者女子三人長者生纔六霜其次差以㓜矣雖禮所未及而號不絶聲􅈱􅈱然行路為之憯戚公以為鼓盆傷神兩不中節而鍾情之哀可勝既乎且虞陵谷之變也乃命權氏甥德輿為之銘曰去夏屋之渠渠兮即孤丘之峩峩往不可復兮沈痛如何薤露蒿里兮古有哀歌睦州桐廬丞栁君故夫人天水權氏墓誌銘前人夫人姓權氏天水洛陽人十二代祖翼前秦僕射安丘敬公其後至周隋間有佐命功代荷茅土者三葉以至曾王父滑州匡城縣令崇本王父益州成都縣尉無待集作侍烈考許州臨潁縣令伋成都以太學進士擢第臨潁判入甲科皆以文學著名粹行純氣有以鍾下夫人生而敏異姿性端明懿行全識發於天授而和敬以事長慈惠以祔下窈窕德象動成儀度機鑑精辨而深自晦黙伯仲甥姪等每有疑理滯義多所咨訪夫人不得已而後言言必中倫誠順之道自中形外外内族姻之中瞻其儀形剛戾者順不仁者化以貞元二年三集作正月歸河東栁君君為睦州桐廬丞方謂有魚軒象服之慶偕老宜家之壽不幸遘疾癘以其年七月日終于桐廬之官舍享年若干自設帨至于屬纊九族無間言終食無違德宜乎綏福履而介眉壽備祭服以參蠒館而迫阨終身莫申其道六姻安仰為善者惑豈善慶昭報之言妄作耶將壽夭淹速之度固有所定耶栁君奉其喪以某月日權厝于丹陽縣某原竇氏伯娣之塋次從遺㫖也從父兄子德輿一二羣從銜茹永痛書實録于墓石銘曰采蘩采蘋列于詩人恭惟淑明與古為鄰嘉玉粹温蕣英氛氲集作芬蒀凄風夜壑銷鑠堙淪命不可問兮從古云云追琢淑德兮用識幽墳户部侍郎王公集作君先太夫人河間劉氏墓誌銘栁宗元夫人劉姓集作姓劉其先漢河間王王有明德世紹顯懿至于唐有文昭者為綿州刺史號為良牧其嗣慎言為仙居令光州長史克荷于前人光州一有君字夫人之父也夫人既笄五年從于北海王府君諱某府君舉明經授任城尉佐金吾衛兵曹修經術以求聖人之道通古今以推一王之典㑹世多難不克如志卒以隠終夫人生二子長曰􅂜倫舉五經早夭少曰叔文堅明直亮有文武之用貞元中待詔禁中以道合于儲后凡十有八載獻可替否有匡弼調䕶之勤先帝棄萬姓嗣皇承大位公居禁中訏謨定命有扶翼經緯之績由蘇州司功參軍為起居舍人翰林學士将明出納有彌綸變通集作通變之勞副經邦阜財之職加户部侍郎賜紫金魚袋重輕開閉有和鈞肅給之効内贊謨畫不廢其位凡執事十四旬有六日利安之道將施于人而夫人終于堂蓋貞元集有之字二十一年六月二十日也知道之士為蒼生惜焉天子使中謁者臨問其家賻以布帛嗚呼夫人之在女氏也貞順以自處孝謹以有奉其在夫族也祗敬以承上嚴肅以涖下事良人四十有九年而勤勞不懈生戸部五十有三年而教戒無闕年七十有九而户部之道聞于天下為大僚垂紫綬以就奉養公卿侯王咸集集作造于門既壽而昌人集作世用羨慕然而天子有詔俾定封邑有司稽於論次終以不及時有痛焉是年八月某日祔于兵曹府君之墓銘曰夫人之德温柔敬直承于隂教式是嬪則克生良子用揚懿美有文有武𢎞我化理天子是毗邦人是望金章集作若若紫綬榮于髙堂惟昔孟氏號為母師在漢稱賢有戒不疑懿懿一作哉夫人維其似之山北之里集作中神禾之原問于靈龜閟此顯魂勒石垂休永永萬年亡姊前京兆府參軍裴君夫人墓誌前人栁氏至于唐其著者中書令諱奭中書之弟之子曰徐州府君諱子夏實有孝德世其家業清池府君諱從裕繼之以茂實德清府君諱察躬承之以善政以至于侍御史府君諱鎮用貞信勁正達于邦家克生賢女以女集作配于裴氏裴氏至于唐其著者禮部尚書諱行儉禮部之子曰侍中諱光庭嗣用忠肅書于國史祠部府君諱貞業之以真直以至于金吾府君諱敬用純懿端亮聞於天下實生良子以配夫人焉集無焉字嗚呼夫人與仁孝偕生以禮順偕長始於家純如也終於夫族穆如也其為子道也孝以和恭以惠取與承順必稱所欲先公集作君與慈尊恩遇尤厚故夫人侍側無威怒之教焉天禍弊族夙遭大故我諸孤奉太夫人之養不敢圖死至于復常夫人三歲無湯沐無鹽酪頓踴呌號哀徹天地外除髮不勝笄體不勝帶太夫人泣而命之内集作固猶不食朝夕諭誨僅而濟焉其為妻道也貞順之宜恒服於身體疑忌之慮不萌於心術忿懥之色不兆於容貌同焉而合於禮婉焉而得其正其為婦道也惟聴順謹敬睦姻任集作仁恤之行甚備常以不幸不及舅姑之養用為大恨是故相春秋之亊眂滌濯羞簠簋勞以待旦每怵惕之感至焉則又移其孝于兄公安公集作裴氏之門而以睦于冢婦介婦必敬必親上以不失其赤子之心姻族歸厚率由是也嗚呼我之大譴歟裴氏子之大不幸歟以夫人之德行宜貴壽宜康寧然而年始三十不克至于壽良人官為參軍不及偕其貴骨髓之疾實鍾于身以貞元十六年三月十三日甲子終于光德里第痛矣夫始夫人之疾也夫人之族視之如已宗其家老長妾臧獲之微皆以其私奔謁於道路禱鬼神問卜筮者相及也既病太夫人在側尚慮積憂傷于尊懷猶持形立氣紿以少間故二稚未齓良人在逺不及有緒言遺念以傳于一作於後則我呼天之痛宜有加焉嗚呼天胡厚是懿德而闕其報施獨何心集作咎歟余一集無此字非不知天之忍也既逾月良人至自洛師望門而哭曰無以立吾家成吾身矣凡生三子㓜曰崔七先夫人八月而殞魂氣無不之也次曰崔六後夫人五旬而夭因祔焉今其存者曰崔五幸無恙託于乳媪似虞水火哀哉其年八月十八日甲子安厝于長安縣之神禾原從于先塋祔于皇姑宜也母弟號哭而為之志毒痛慿塞略不能具敢告無愧辭無溢美庶用正直克安神心嗚呼至親集作哀無文至敬不飾故無其辭亡妻𢎞農楊氏墓誌前人亡妻𢎞農楊氏諱某髙祖皇司勲郎中諱元政司勲生殿中侍御史諱志𤣥殿中生醴泉縣尉諱成名醴泉生今禮部郎中凝世集作代濟仁孝號為德門郎中娶于隴西李氏生夫人夫人生三年而皇妣即世外王父兼居方伯連帥之任歴刺南部夫人自㓜及笄依于外族所以撫愛視遇者殆過厚焉夫人小心敬順居寵益畏終始無驕盈之色親黨難之五歲屬先妣之忌飯僧於仁祠就問其故保傅以告遂號泣不食每及是日必遑遑涕慕抱終身之戚焉及許嫁于我柔日既卜乃歸于栁氏恭惟先府君重崇友道於郎中最深髫稚好言始於善謔雖間在他國終無異辭凡十有三嵗而二姓克合奉初言也夫人既歸事太夫人備敬養之道敦睦夫黨致肅雍之美主中饋佐蒸嘗怵愓之儀集作義表于宗門太夫人嘗曰自吾得新婦増一孝女况又通家愛之如已子崔氏裴氏二姊視之如兄弟故二族之好異于他門然以素被足疾不良能集作能良行未三嵗孕而不育厥疾増甚明年以謁醫救藥之便來歸女氏永寧里之私第八月一日甲子至于大病集作疾年始二十有三嗚呼痛哉以夫人之柔順淑茂宜延于上壽端明惠和宜齒于貴位生知孝愛之本宜承于餘慶是三者皆虚其應天可問乎衰門多舋上天無佑故自辛未逮于茲嵗累服齊斬繼纒哀酷其間冠衣純采朞月者三而已矣無乃以是累夫人之壽歟悼慟之懐曷月而已集有已矣哀夫遂以九月五日庚午克葬于萬年縣栖鳯原從先塋禮也是嵗唐貞元十五年龍集已夘為之誌云坤徳柔順婦道肅雍惟若人兮婉娩淑姿鏘翔令容委窮塵兮佳城鬱鬱閉白日兮之死同穴歸此室兮文苑英華卷九百六十八
