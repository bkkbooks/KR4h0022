body:
  text: 文苑英華巻六百六十三宋李昉等編投知六投前夏口韋尚書啟一首投禮部鄭員外啟一首投永寧李相公啟一首投湖南王大夫啟一首謝崔舍人啟一首投湖南于常侍啟一首謝大理薛卿啟一首投秘監韋尚書啟一首上太常房博士啟一首投鹽鐡裴郎中啟一首投鄿州裴員外啟一首投同州楊尚書啟一首河中辭令狐相公啟一首投鄭尚書啟一首投前夏口韋尚書啟羅隠某啟某今月二日輙以近文一通上憑閽侍辭違既久僣越是虞勒蹇歩以戴恩捨醫門而奚適伏念随計渚宫之日求聞漢浦之年王儉望髙芙蓉比幕陳琳筆健瑇瑁為簮因務窺豹之能遂竊登龍之譽習池侍讌峴嶺從游許之以向者為文頗勝張詡戒之以偶然成事恐似李滂其後嵗月煎熬輪蹄頑秃僅逾十上幸免一鳴角羸而只有困時矢盡而未知降處間者尚書理兵夏汭栽桞武昌文聘江山粗資吟玩費禕欄檻聊奉登臨某此時甞駐征橈仰趨畵㦸方知叩洪鍾而待教指墜履以明恩而疾恙所牽衣投不暇伏枕而初慙數蹇揚帆而竟歎途窮今則潁水政成旋為故事中台位缺己副急徴風雲將騁於康衢神鬼肯論於宣室輙預提勃箒先立丘墻雖哲匠掄材固須良木而洪鍾許叩豈獨兼金謹啓投禮部鄭員外啓某啓某前月十八日輙以所薦惡文上干嚴重尋嬰疾劣遂曠門墻伏以皎鏡無私雖容屢照醫門多病應倦施功忍随翔鳥之姿更望不龜之術某滄州捨釣紫陌迷塵徒欲信書不能知命道薄而魚腮易曝計踈而鳬脛難加所以寗戚叩歌不惟長夜魏舒對䇿近至中年丹霄無獨上之期䨇􅁂有相輕之色而員外芝田飬秀桂苑摛華口裏雌黄旋成典故座中薤白早避風流敢因誘善之初仰冀嘘枯之便儻一掬華隂之土聊拭蘇文則數升漢唐作斗涇水之泥永依清濟謹啓投永寜李相公啓某啓某去今月三十日獲遂起居伏以黄闥尊崇雖容展敬白衣卑賤不敢興言今則輙於隕穫之間聊舉證明之事晉代則司空試劍漢朝則丞相問牛彼或以頑滯幽姿或以瘦駑下乗猶能動摇至化感逹深仁而況生禀五常早知恩義跡居十等不至輿臺伏思癸邜年中維揚城畔謝傅裂土疆之日羊公分節制之時珠履瑇簮朝盈望府鷄香豸角暮出行臺轉輸則萬井魚鹽統御則九州侯伯當時務重難之際是籌謀閑暇之初南國佳辰長聞賦詠東山勝賞屢見篇題為教化之笙鏞作經綸之彩繪所以漢陽計吏得詣軍門厭次狂生叨䝉客禮憫之以轉蓬之質安之以負米之心進趨獲奉於麾幢俸入仍資於甘㫖其後何武捧詔平陽趣裝恭佐􅇬中方虞浪跡新城埭下忽受温言嗟其未了之身勉以難遷之性且憐色目猶可發揚是以不揣狂愚重萌躁妄出則祝趙衰之日永冀流暄入則禱傅説之星惟希借耀今者風雨得生成之候鑪鎚升皷鑄之司郭令軍前潜抽妓樂崔寜城外暗毁池臺登庸之時序未遥反斾之鎡基己兆若某者族惟單緒藝即中流旋以佩服殊私緘藏厚㫖假昆蟲而禀信指簮履一作屨以輸懐竊以浪逼龍津風催律管魚皆五色禽必九苞揚錦鬐彩羽之姿俟啟蟄吹葭之便獨某行迷要路坐守窮株九品班資略非親舊六街車馬莫接聲塵捫心而一寸寒灰泣淚而萬行清血良時易失司馬遷猶是再三知己難逄越石父於焉感激相公儻或俯廻衡柄曲賜褒稱雖朽蠧不凋則推常理而孤寒無命祗繋洪鈞謹啟投湖南王大夫啟某啟某聞元亮苦貧姑求彭澤戴顒多病遂乞海虞茍物役之是牽亦人情而斯見某族惟卑賤品在下中三篋亡書幸無漏略一枝仙桂甞欲覬覦十年慟哭於秦庭八舉摧風於宋野近者以調甘軫慮負米嬰心毛義前賢尚猶奉檄鯫生何者焉可守株勒氣馬以徐廻解藩羊而適願前使常侍遽憐此志遂以奏官藉俸入於衡陽専表章於使府雖元榆書記不足愈風而處士衣裘未甞換雪斯亦寃鳥尚思於衘石愚公猶鋭於移山尋遇大夫輟夢軒宫吹暄楚嶠手中扇在何必袁宏天上才髙寜惟公輔間者龍門掌貢馬帳搜遺泉客號咷只憂寳盡地靈惆悵不覺山空而某適限徐兵逺留呉㑹不得少將鱗鬛側望風雷指凾谷以馳誠遥知氣紫上蘇臺而送目空羡河清今者輙奉危心来干畫㦸大夫或俯廻趙印下煦一作照疑避諱韓灰更於茶藥之中重假勾留之便所冀猶縻禄食逺救朝昏跡稍免於屢空心尚期於妄動百生可卜式占郭㤗之龜一字為褒全繋宣尼之筆謹啟謝崔舍人啟某啟某鏤氷伎短縁木計踈去年舍人俯念窮迷猥垂慰薦竟以梁危易折氣俗難醫負麈尾之髙譚困龍津之駭浪雖懐感激長抱憂慙今月八日見某官伏知徳水廻波重霑涸鮒靈丹减粒己救傷虵當谷鸎刷羽之秋是海鷰窺梁之日豈謂舍人未容祈禱遽賜保明樹立孤株栽培弱蔓跪聽而淚霑胷臆仰承而背負丘山而況俗漸輕訛時交勢利或朝遊夕處或貴族華宗至於取事之時與能之際猶湏必成桃李方許扶持若某者跡未及蕭階一作齊陳榻之嚴目未覩巢閤栖梧之瑞門寒於光逸命薄於黔婁縱饒委曲所私其奈纎毫無取必舍人知其殺青廢業二紀於兹垂白倚門一生顒望乃施隂徳以慰歸心言念徘徊不知所處謹啟投湖南于常侍啟某啟某聞淮王鍊跡於真仙含靈盡去鄒衍移暄於寒谷衆卉皆芳豈羽毛可從於霓旌豈凋枿盡闗於葭律蓋以至道無遺於一物殊私必及於羣生某甞佩斯言請陳丹懇間者豹藏不穏魚躍無成浼山公啟事之書累王衍雌黄之口捫天莫及跼地興慙向浮世以傷懐拊勞生而自喟光隂不駐齒髪漸髙當家貧親老之時是失一作值岐路亡羊之日淚將欲盡口不敢開直以非漢代之簮裾困晉朝之流品物彚雖逃於芻狗孤寒竟䧟於蟲沙所以仰蟾桂之髙髙恐無仙骨覩魚鬐之歛斂忽有癡心竊希常侍從来許與之言作此改張之計俾其七郡與奏一官致之於髯叅短簿之間責之以駑馬鉛刀之用所冀内資骨肉外罄筋骸但繋受恩何湏及第必若終憐薄伎尚憫前途則科號三篇判稱六部早甞留意頗亦偪人將今晨禱祝之詞為異日覬覦之路情雖可恕僣亦堪誅對膠柱以軫懐願漆身而在此謹啟謝大理薛卿啟某啟某聞宋濟之困名塲空餘坦率唐衢之昇軍宴但益號咷斯人以當年不偶於良知晩嵗遂成其永恨況某卑將此事以戒前車至願蹉跎年光老大向秦庭而屢泣抱楚足以頻傷中間輙以所著讒書上干閽吏近見某官伏知閣下爰哀弱植俯降深仁迴日月於壺中展方書於肘後欲使徐甲之屍必起蔡經之骨重生仰嘉音而背若負山承厚㫖而身知有翼既容託迹竊敢興言某動不知機進惟招敗忌王隐之名者虞預暴蘇秦之過者張儀羣居不出一言彼則謂某矜才傲物痛飲不逾三爵彼則謂某恃酒凌人何争名競利之塲有蠧節食苗之類茍非令君側耳於車上中郎注目於亭間則随趙軛以長嗚與呉椽而共朽者也謹啟投秘監韋尚書啟某啟某月日以所著讒書一通寓於閽吏退量僣越伏積憂惶某聞樊子昭之處屠沽發光輝於許劭本傳有子昭事郭林宗之㳺鞏洛振聲價於符融其後物態乖訛風流委敗下有自媒之誚上無相汲之由某由是反袂興懐捫心注恨又安得不屬耳於輿人之論傾懐於長者之談而尚書以盛名鎮乎當時以盛徳傳乎奕世不趦趄於闒茸不浮泛於姦回動則致聖主而活蒼生以為已任静則導冲襟而飬和氣以守家聲恭惟大朝屬在吾道若某者燎薪就學擲楯攻文一則以神氣低凡不足動王侯之瞻視一則以家門寒賤不足辱卿相之搜揚十年索米於京都六舉随波而上下永言浮世堪比多岐所以覽嵇叔夜之書則伏膺户外讀張季鷹之傳則大嚼忩間長恐一旦月桂情衰江瀕思起不得揖兖國山庭之相不得窺漢朝王佐之才是以重拂塵衣聊希藻鑒儻尚書以孺子可教則随洛下之書生儻尚書以斯人若狂則訪江東之釣叟靈蓍神蔡惟禱所從謹啟上太常房愽士啟某啟某前月二十五日以所著讒書一通上獻近見某官某乙伏承愽士曲垂題品俯及孤危某聞孫陽以一顧之恩騏驥不為駑馬宣父以一言之重夷齊不作餓夫茍吾道之末忘諒斯人而何逺某也爇薪就學閲市成功偶不自量因思妄動捨五湖之髙蹈事九陌之窮逰一作途為良工不度之才為要路不容之物所以嵇康奏樂忿魑魅以争光劉子營生柰鬼神之相笑那官不幸一至於斯㳟惟咸通之初大中之末故荆南余正字以愽士為軒鏡庖刀今渭北徐端公以愽士為靈蓍神蔡但言薄伎合在殊私其後某則困躓於龍津愽士則徊翔於鴛侣雖心祈目禱不忘斯湏而天上人間慿何訊問寜知此日屬在明思疑作恩豈一旅人之遭遇有時而二作者之語言斯中永為負荷適足憂慙況復風訛俗敗之初轍亂旗奔之際講學則衛刀削樹論文則嬴火燒人家家無相保之心處處有自媒之口而愽士獨持大斾髙坐危城招既㪚之師徒復已亡之土地顧兹隆替尤屬尊嚴某也雖賦命以多竒或因人而成事願將所贄以賀明時謹啟投鹽鐡裴郎中啟某啟某聞大道五千所制者莫先於躁浮生七十所傷者莫甚於情某所以反袂興嗟一作懐支頥浩嘆顧両端而若是持萬緒以奚歸爰念齠年即偕時軰胷中馬駿握内虵靈入公孫龍之闗不惟逞辯叱東方朔之御且欲獻書其後濩落單門蹉跎薄命路窮鬼謁天奪人謀營生則飽少於饑求試則落多於上東經海嶠受下館於諸侯西出劍門泣危途於丞相光景但銷於杯杓貨財不入於槖裝傳書而黄耳增勞久客而黒貂兼弊間者郎中丹青演潤咳唾成音薦光逸之材以地寒為累舉仲宣之賦以體弱見遺既興奔北之懐因指在東之念江夏則舖名池口毗陵則堰號銅墩皆有主張以生鹽米郎中儻或言泉晩浹未忘淘灑之功譚柄時廻别借牙齒之助一作使俾得内資柔滑外救困窮然後驅淮陽入趙之師更謀背水整秦將渡河之卒重議焚舟目禱心祈言狂意廹其餘罪戾不敢逭逃謹啟投蘄州裴員外啟某啟某月六日輙以著讒書一通貢於客次遂歸逆旅載軫危途必恐員外以其姓氏單寒精神鈍滯汨在衆人之下遺於繁務之中某懷璧經穿壯年見志仲舒養勇何啻三年安世補亡寜惟一篋其後因從計吏遂混時人憤龍尾以不燋念魚腮之屢曝嵇康骨俗徒矜養性之能李廣數竒豈是用兵之罪闕徃難問天髙不言去年牽廹㫖甘留連江徼雖傷弓之鳥誠則惡弦食薑之蟲未能忘苦所以逺辭蝸舍来謁龍門黍谷棠隂方諧志願荷衣蕙帯不柰風霜負所業以長嗟向良工而有謂昔也松苗各性已知難進之由今則火木相生未測自焚之理謹啟投同州楊尚書啟某啟某聞足歴屠門尚能大嚼力疲呉坂亦解長鳴而況覩棠隂教化之原入黍谷暄和之景茍不能自提由瑟直犯丘牆則其人生為無益之徒死作無知之鬼某譙鄉賤族釣瀨遺氓鉅下二卿素非朋執於陵一叟或與交㳺偶然䝉郭泰之言歘爾厲蘇秦之志遂得麥漂風雨門長蒿莱旋慕題橋因吟入洛三秋旅寓身居計吏之先萬里徒行家匪大夫之後孰謂九街浪闊䨇闕雲浮姜維之膽有破時李陽之拳無下處由是潜傷鲋轍暗泣牛衣賈誼長纓雖猶自運張儀健舌亦擬何為前窺而四海清平内顧而一身流落輙復徘徊鄭驛睥睨秦醫敢言􅀞虎之勤但有傷蛇之望謹啟河中辭令狐相公啟某啟某聞歌者不繋聲音惟思中節言者不期枝葉所貴逹情茍抑揚之理或差則流一作荒誕之辭亦棄而況委病鵲門之下一作外窺光龍燭之前上方於趙臺若用後漢趙岐字卿臺為曹操孔融舉辟事則當如字或疑作壹蓋臺壹字相近亦有羊陟袁逄稱薦爾遭逄下比於陸機榮顯雖倜儻不侔於二子而輝華敢讓於伊人今則住踰負嶽之蛟去㘦戀軒之馬輙復重將越調更唱燕臺以為京兆王章三冬有淚淮隂韓信一飯無門惟憂委骨窮塵敢望横戈要路加以輕蹄逸軌猶祈公子王孫同窺萬頃波瀾各有一時顔色而某短袖難舞危條易風禱祠則天或未從號泣則人皆不弔由是餙裝增欷攬䇿興嗟指棨㦸以凝神望鑪鎚之借便雖琳琅杞梓盡歸梁棟之間而藻荇蘋蘩亦戀池亭之内殷凾軫念劉紙懸緘無言誓天有死銘徳投鄭尚書啟某啟某前月某日輙以所為讒書一通貢於客次尚書俯憐覉旅遽賜霑濡既受厚恩則宜前去然而疆境有牽於感慨風烟或軫於追思所以公子亭邉重嘘懦氣侯嬴闗畔再轉危腸何昔時有殉義之人而今日無死恩之士輙復更彈馮鋏上指膺門某也江左孤根闗中滯氣强學早亡其皮骨趨時久困於風塵福星不照於命宫旅火但焚其生計徘徊末路惆悵危途覽八行之詔書空仰聖人在上詠五言之章句未知游子何之興言而幾至銷魂至袂而自然流涕尚書藴稷契臯䕫之事業負卿軻遷固之文章入則藻鏡氷壺品量人物出則油幢瑞節控御山河固已藏雷於伺蟄之時待夣於驅羊之際茍有一物未登其所一夫不遂其懐亦宜上下聰明旁摇憫惻儻或王衍之雌黄借潤仲尼之日月廻光則其人也三千里之别離免為虚滯十五年之勤苦永有所歸發自門闌百生知感謹啟文苑英華巻六百六十三
