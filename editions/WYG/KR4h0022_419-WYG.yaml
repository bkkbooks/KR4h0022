body:
  text: 文苑英華巻四百十九宋李昉等編命婦國夫人封姚崇妻鄭國夫人制蘇頲黃門兵部尚書兼紫㣲令監脩國史上柱國梁國公姚崇妻滎陽郡夫人鄭氏滎河地緒簮組家聲輝相門以才淑冠邦族而婉嫕蘭儀蕙問式備言容習禮聞詩載兼圖史金彛作輔爰開土宇之封石窌承榮宜表珩璜之盛可封鄭國夫人主者施行封牛仙客妻王氏􅃎國夫人制孫逖門下卿之内子實著於禮經國有舊章亦褒於淑徳銀青光禄大夫守工部尚書同中書門下三品持節朔州節度使度支營田鹽池押諸蕃部落副大使上柱國􅃎國公知門下省事牛仙客妻瑯琊郡夫人王氏道膺圖史言成箴誡賢明自逺柔惠兼資作配台臣能修壼教寵其車服已膺命婦之榮錫以山川更表從夫之貴可封􅃎國夫人主者施行封李愬妻韋氏魏國公夫人制元稹勑夫尊於朝婦貴於室由古道也安有邦君之妻而無湯沐之地乎况魏博等州節度使特進檢校左僕射同中書門下平章事凉國公李愬妻韋氏徳宗皇帝之外孫也笄年事愬克有令儀夫䕃雖髙猶執婦道持其門户使愬有姻族之和奉其蘋蘩使愬有蒸嘗之㓗愬當分閫之際終無内顧之憂者由此婦也今愬積行累功以致爵位六遷重鎮名列上台而韋氏猶限彛章未嘗開一作思命國甚不稱也因愬大名之邦式建小君之號可封魏國夫人封烏重𦙍妻張氏鄧國夫人制勑古者夫為大夫則妻為命婦况在小君之位未加大國之封豈唯有廢徽章是無以集作抑亦無勸忠力也某官烏重𦙍妻張氏以鳴鳩之徳作合邦君輔成勲猷馴致爵位雖從夫貴未授國封今以南陽本邦善地錫為湯沐加號夫人兹乃殊榮足光閨閫可封鄧國夫人封石雄妻索氏凉國夫人制崔嘏勑西川貴族南國華容代有功勲門多閥閲早以懿徳嫓于元臣既推内輔之才頗藴中閨之徳是宜䟽封表貴開國旌賢蘭儀永配於金夫蕙問更光於石􅐎勉思健婦以佐良人可封凉國夫人中書侍郎同中書門下平章事陸扆妻渤海郡夫人髙氏進封燕國夫人制錢珝勑命婦之寵數有四而國邑居其首主爵郎舉職勑請必有舊章因以勸焉朕何敢愛具官陸扆妻渤海郡夫人髙氏髙國族大稱於古者乆矣冠冕就列尚想前脩閨室有婦令聞令望一作門配君子而相敬承宗事以無違鏘然和鳴信可偕老考祥之應已屬台臣守貴之謨方資内助主爵之請孰云不宜他日中宮受朝則與伯婦俱至佩玉相顧爾家盛哉非獨榮吾相之小君亦以勸天下從夫之道也可依前件内中齊國夫人扶風髙陽郡夫人竝封婕妤樂安郡新秦郡廣陵郡太丘郡雲安郡五夫人竝加封秦晉楚越燕國夫人制前人勑朕既建中宮將聽内理法度方形於四徳等威宜越於九嬪齊國夫人某氏柔和有禀閑雅自持椒蘭譲薰環珮争㓗近輦見欲辭之色攬衣懐必澣之心用是謙勤保我恩澤重惟漢制逺采周官與名而大國重開錫號而舊章復振勉脩懿範俾稱寵休共承隂教之端永輔長秋之盛可依前件封魏博節度使羅𢎞信妻越國夫人某氏進封燕國夫人代州刺史傅瑶妻丘氏封呉興縣君等制勑具官某妻越國夫人某氏等㨿地圖緫兵籍處邦君之位與夫持使節頒化條當牧守之任者理軍為政皆執善經而褒寵之謨亦多内助女師禀訓夫族稱賢不違柔順之規且習閑和之性或功庸克備風法有承或環珮之音周旋可聽是宜增大名之國開初命之封亦所以榮外臣而勉内助也可依前件淛西節度使錢鏐燕國夫人呉氏進封晉國夫人制勑齊之壁司徒左傳壁司徒主壘壁者武力之臣也其妻有禮尚獲錫地於君今師長萬夫提封千里内資淑媛助我勲侯國進大名是惟舊典具官錢鏐妻燕國夫人呉氏肅雍之美箴戒不忘聞雞鳴而致敬事姑諷鵲巢而思齊有徳輔成功烈諒屬柔明爰舉寵章載加常等勉承膏澤以耀閨門可依前件襄州節度使趙匡凝妻豫章郡君羅氏可進封燕國夫人制勑隨夫之爵考禮有文冊勲既集於藩維流澤可榮於閨室一作壼具官趙匡凝妻豫章郡羅氏肅雍有美柔順不違爰自和鳴克融懿範旁濟中權之盛實資内助之勞致我良臣表于諸夏眷言淑徳䟽封未稱於宜家越被舊章用典俾光於開國勉脩婦式無忽人倫可依前件武昌軍節度使杜洪妻晉國夫人進封秦國夫人制勑經夫婦之本者莫近於詩故宜爾室家言稱也如鼓瑟琴言和也具官杜洪妻晉國夫人王氏賛洪守土宣力爰致顯爵爾以嘉耦之道遂能居而有之助彼藩條賴兹閨室宜室家而何媿鼓琴瑟以有聞仍命增封用旌柔順因吾肆赦是謂典常可依前件鳯翔節度使李茂貞妻秦國夫人劉氏進封岐國夫人制勑封邑之制當列國甚貴矣其或舉兹重典進受大名俾增伉儷之光以稱侯王之爵𢎞之在我宜者則行具官李茂貞妻秦國夫人劉氏能脩懿範潜助元勲福雖盛而心益恭封既大而勤不匱内言必正同奬自多賛武幄之忠謀保魚軒之寵數而茂貞宣力守土在岐以是加恩用彰有禮必使事君之節相勉克終則不獨宜爾室家兼明報國可依前件楊行密妻朱氏進封燕國夫人制薛廷珪勑具官楊行密妻朱氏作嬪藩翰宜爾室家六姻以寧四徳具美俾我行密為吾藎臣統戎有方述職無怠繄爾輔佐致之輯柔慶澤所加序進惟允全燕列壌大國䟽封式示寵榮以旌賢淑可進封燕國夫人秦寧軍節度使葛從周母廣平郡太君宋氏進封廣平郡太夫人制錢珝勑具官某母郡太君宋氏古者事親竭力而養樂於負米信有其人今從周秩帶三公貴享十乗實賴嚴明之訓以成忠信之名爾既承顔必盡無違之志吾方敦孝遂加有典之勲一作榮可依前件中書舍人苖深母瑯琊郡太君王氏封瑯琊郡太夫人祠部郎中知制誥張文蔚母扶風郡太夫人蘇氏封馮翊郡太夫人等制劉崇望勑具官苖深等母瑯琊郡太夫人王氏等本於仁原於禮保於和處於順故圖史素學風法不衰立我彦臣率由貞訓而識者服儒之道不使忿言加已以羞其親深與文蔚有之矣乃子弟謹身之行履危懼辱之恩以承其志渙等有之矣且皆賦禄於朝相戒以養俾榮報徳當貴䟽封慶集而家教行吾國古之孝理不在兹乎可依前件許州節度使王藴母趙氏進封楚國太夫人制李磎勑古之為將言有老母而三戰三北者朕每讀其書而非之夫為將者皆然則何以同在三之義勵士衆之心而逃無勇非孝之譏哉苟如斯亦其母之未賢爾忠武軍節度使王藴方榮色養既孝而忠委以節旄遂稱名將賈勇而力過投石臨陣而義不聞金得非其母趙氏賢以善訓耶豈特築朱序之城寧陳嬰之族而已嘗錫以郡夫人之號今藴功業益進爵位益隆宜加大國之封以助南陔之慶可依前件郡夫人進封賀蘭琬母楊氏𢎞農郡夫人制蘇頲門下太僕卿員外置同正員賀蘭琬母楊氏家臨桃塞門映蓮峰賦蕡實於周詩承累葉於台相言成箴戒淑慎其儀徳憲圖史閑和其性正家貽則徙宅成規姻親載隆寵章猶闕宜比絳紗之學用膺青綬之命可封𢎞農郡夫人主者施行封劉悟妻馮氏長樂郡夫人制白居易勑古者有冊名命婦賜號夫人盖積善於閨門而受封於國邑也澤潞節度使劉悟妻馮氏傳芳茂族作合良臣成此忠貞之功因於輔佐之力禮從夫貴慶叶家肥俾開大郡之封以正小君之命可封長樂郡夫人封宋叔康妻房氏河東郡夫人制杜牧勑詩稱鵲巢禮榮翟茀既彰爪牙之效宜齊伉儷之榮左神䇿軍護軍中尉兼左坊功徳使特進左領軍衞大將軍知内侍省事上柱國廣平縣開國侯食邑一千户宋叔康妻清河縣君房氏懿慈柔淑作配忠勲能㓗蘋蘩克叶姻族成此内則穆其壼風稱為令人實光婦道爰䟽封爵用舉典章可服寵榮勉於輔佐可封河東郡夫人封吐突士曄妻鴈門郡夫人制前人勑詩美夫人禮稱内子允膺腹心之任宜崇家室之榮弓箭軍器等使特進行右領軍衞大將軍知内侍省事上柱國隂山縣開國公食邑一千五百户吐突士曄妻咸陽縣君田氏生於富貴作配忠貞柔婉自卑儀範可則職勤賔祭道睦姻親既諧閨門克成婦徳爰加禮秩之貴以彰輔佐之勤榮我䟽封無忘内助可封鴈門郡夫人主者施行翰林學士兵部侍郎盧說妻慱陵郡君崔氏進封博陵郡夫人制錢珝勑為人之婦能從其爵以益貴者是必宜其家矣而階品在三等之設有銀印青綬之崇則從爵之名所增益貴具官盧説妻博陵郡君崔氏族大多聞多聞者風法性成不易不易者柔和勉説代我之言必能恪居其職助於内者足以彰焉是謂宜家可當用典展衣之飭不其盛哉可依前件郡君泰寧軍節度使葛從周妻清河縣君張氏進封清河郡君制勑具官葛從周妻清河縣君張氏生自良家配吾戎帥頗能佑助克濟功名柔順睦親内則有聞於宗族温恭近禮外言不出於閨房既屬推恩是宜用典進之郡邑俾稱蕃侯可依前件太君石門扈駕功臣六都指揮使檢校司空孫徳威母博陵崔氏封博陵縣疑太君制劉崇望勑具官某母崔氏夫為人者能以忠勇之謨勞于國戎旅之權既重上公之秩仍髙而母氏之封寵章未稱則於王化有所不𢎞方屬推恩是宜用典以光孝養且厚勲臣可依前件縣君封竇澣等母邑號制崔嘏勑古者男子生則射以桑弧蓬矢盖取欲使有事天地四方也及長而貴則光其六姻况堂髙有親當室自立不有嘉命曷彰令儀具官竇澣等母某氏或以衣冠胄𦙍或以勲績緒餘皆知訓子之方早識從夫之義爰因濡澤各俾增封式示恩榮用光閨閫可依前件文苑英華巻四百十九
