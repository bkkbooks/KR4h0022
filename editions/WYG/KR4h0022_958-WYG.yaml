body:
  text: 文苑英華巻九百五十九宋李昉等編職官二十一李眀府嘉墓誌一首楊眀府靈崱墓誌一首楊眀府鷗墓誌一首權眀府有方墓誌一首白眀府季康墓誌一首隰川縣令李公墓誌銘楊炯公諱嘉字大善隴西成紀人也趙郡太守雍州大中正上開府永康公之孫幽州都督鎮軍大將軍上柱國丹陽公之子重華以文眀允塞謨九徳於臯陶仲尼以恭儉温良繙六經於柱史將軍李牧人主願其同時河尹李膺天下思其執御况乎衣冠代美祖考集有時續二字家聲占於日月可宗集作謂周之姻集作姬姓誓以山河則炎集作大漢之劉氏公門承將相地積英靈望之儼然横斷山而欝起聽其言也注懸河而不竭玉則秦王所見天照白虹劔則殷帝所傳星浮雲集作紫是氣假使蔡中郎之博學郭有道之人倫何嘗不聞迎王粲而例屣為茅容而下拜起家為太子左千衛以調升也按河圖於玉版震一索而為長男考天象於銅渾心前星而為太子直城霞遶曲障雲平出入青牓之門周旋黒衣之列稍遷越王府户曹叅軍越之建國也地居南斗之躔王之受封也禮極東門之拜郎爵集作郕霍所以隆懿親恭和所以資眀徳一言而干楚后即從集作收雲夣之畋三見而説趙王仍襲上卿之印又遷隰川令川原爽塏風俗和平晉獻公之𦙍夷吾是邑代恭王之子郢容為侯漢書代恭王子義嗣其父為王楚元王子郢容止為侯今英華云代恭之子郢容為侯未詳而炯集乃云楚代恭王之子郢非容為侯尤不可曉陽泉依六璧之城孟津合三溪之水公以輜車就列墨綬當官有蠶績於郕人用牛刀於魯邑市􅆵無競不假鞭絲學校方興唯聞擊石諸侯取其軌則四海瞻其儀表為杜陵之男子誰繼集作詣後曹篾鄉里之小人願辭彭澤於是退歸初服就養私門戲嬰児於階下扶老生於井上尋丁外難集作艱哀毁踰制加人一等俯就三年服闋襲封丹陽公勲上騎都尉公以安車禮盛賜杖年髙集作侵被服先王之道游優太平之化左琹右書謀孫翼子居常飽徳不言何氏之萬錢直置當仁豈特于公之駟馬清風可賞必有鸞鳯相期白雪時遊多以神仙見屬義形於金石節貫於松筠西山五日之朝將化羽而生翼北海眀年之一作大明而驗便展集作度辰而至已以永淳元年八月二十一日終于京師道政里之私第享年七十二嗚呼哀哉長子隨州光化縣令守節等哀纒弔鶴痛結鄰人孝之始也則身體髮膚所以全其性孝之終也則衣裳棺槨所以成其禮天髙八萬想京兆而可集作何從地闊三阡對佳城而有恨越𢎞道二年嵗次甲申正月甲申朔二十六日已酉陪葬於昭陵東南之平原炯樗櫟庸材瓶筲小集作淺器仰惟先友叨雅契於金環俯逮婚集作嘉姻荷深知於玉潤南容有道僅聞將聖之言東武建塋俄述安仁之賦集作誄嗚呼哀哉乃作銘曰愛初帝子堯之大理降及真人國之柱史衣冠百代慶靈千祀吉兆占熊嘉名贈鯉聿􅁱厥徳必復其始大孝因心至仁由已肅成門内章華宫裏父任為郎學優則集作從仕陽山之曲蜀江之涘集作汜月旦乗鳬田間狎雉其心若鏡其直如矢亟改炎凉罷歸桑梓象賢舊國安車暮齒忽愴池臺俄悲生死郭門一望郊煙四起夫復何言平生已矣滑州匡城縣令楊君墓誌銘常衮嘗讀東觀漢記至楊公四世大尉咸有清徳泱泱乎鄒魯之風盡在丞相府矣百有餘年論道王室宜哉自後卿大夫洎二千石史不絶書以及於公公諱靈崱字靈崱𢎞農華隂人也髙祖兵部尚書髙都公尚希尚希生宜州别駕丹川公夀旻夀旻生司農少卿徴徴生正議大夫漢州金堂縣令務道光昭先君之懿範其有後于闗西乎公金堂第二子也㓜以五經上第參卿博陵貳軄郿鄔孫楚長揖桓譚不樂一録州事㑹稽稱之再領縣尹自范至匡化行衛濮公易直子諒之心根於始矣加以好學止於盖棺徳行孝悌温良博愛故宗族稱其仁朋友稱其信鄉黨稱其敬盖君子之道歟及長從吏以寛服人官刑不行軄事益辨及與之邑亦尅用乂和氣充塞於百里頌聲洋洋乎至今其良吏之政歟赤紱在股下大夫事知止足之分有終焉之志懸車告老飾巾待期浮雲身世脱屣軒冕追先生於彭澤繼徴士於太丘斯達者之流歟天寳十四年十二月十日寢疾於匡城縣歸休之私第春秋七十有三屬賊臣以山東叛乃公殁之眀日也且告車来甚衆徹子少殯故有闕在邑南鄙於堂西序啓足牖下上周於身十年于兹百戰之所折棟餘燼荒墳茂草柱下史能秀武公之嘉客衮之姻友廣徳元年夏四月本詣河外假道於匡訪郗公之舊邑歸戴侯於故里以其年十月一日合祔於少陵原禮也夫人河東縣君薛氏婦道母儀六姻取則於我歸處葛之覃兮及公而終木已拱矣子環在外不及主喪其誰尸之曰有三女無天何戴無地何履誓合泉壤感通神眀終還營丘竟同防墓空悲蔡女之孝有媿潘郎之詞銘曰夫物云云老子作芸芸各復其根事有必至理有固然少陵古原京兆新阡匡城夫人河東小君同居此地豈恨重泉誌於方石庸有賢人犀浦縣令楊府君墓誌銘符載唐益州犀浦縣令𢎞農楊府君春秋三十九以大厯十四年冬十月卒於郫縣之私第且迫多故權窆於是縣之近郊有才子衡進士擢第官曰左金吾衛倉曹叅軍為桂陽部從事以貞元十五年十月某日啓護於成都以十六年春二月某日歸葬於鳯翔之陳倉某鄉某原從先塋也府君諱鷗字叔儀漢太尉次子復之裔羽林衛大將軍襲闕國公之曾孫金吾衛大將軍漢潤䕫濮等六州刺史令深之孫朝請大夫絳州司馬昭獻之子發緒洪流丕承和粹世嗣厥徳休有光耀府君涵五氣之英華挺九流之上才端睦孝慈勇義而文年甫弱冠儔朋推揖鄉里舉考士未果銓試遭司馬捐舘崩迫歸絳營邱三年服除承順遺命再射羿穀㑹大盜入國太上皇南巡以制科登第補修前績怏怏有遺意也解褐授隴州汧隴縣尉地衝賊要方急完禦公以一尉之柄捱挽令長驅徒走吏摧沮横猾用張我師天于聞而嘉之詔授大理評事參佐汾陽公幕府謩猷碩畫實詢我焉是時公年未三十聲華隠發青萍出匣霜鋩照人人既心畏我之自負繇是有貝錦之詩焉遂除成都府户曹叅軍事太夫人在堂公養志氣奉遺體動無違顔唯疾之憂故州閭稱其孝也孤寡稚弱族居百口饘褐齊一莫名我爾故朋友尚其義也有從祖父誤淪罪網家為奴𨽻宗屬顧視咄嗟而已公破鬻田産露坐佛寺不計旦夕悉以資贖世母與太夫人重聨娣姒之歡眇焉室妹奮出泥滓嘉偶於吉士故鄉黨服其仁也於風流興詠髙標夐逺妻嫂姑姊妹羣從子弟又雅為文每良辰美景指烟月眄琴酒未嘗不操觚拂硯搜拾竒麗不出庭户璨如瓊瑶亦一門之盛永泰三載蜀將亂迫公不從之築塞門户視死不應相國杜公鴻漸景行操履奏授犀浦縣令闕之鼎用烹小鮮一邑之理固不待歌頌而知矣時視僚友杜員外甫岑郎中參郗舍人昻聞公風聲望公飛翔謂青冥寥廓舉翼而至不幸殞落鄰乎短祚遠邇承風失聲咨嗟與善降祥其安在哉夫人李氏趙郡之望族也祖崇饒州司馬考譔成都府法曹夫人貞懿文淑風度眀茂奉上撫下閨門穆然天寳十四載春秋十七而歸於我在蜀前公二嵗而殁故至二是合祔焉倉曹少孤露始在齠孺荼蓼辛螫厚自砥礪攻文種譽樹身須時克荷嘉聲君子以為孝嗣矣某與倉曹為山林之友二十年矣迢遞萬里見託為誌故一作為非得備采風烈衘恤為銘刻於墓門之石銘曰寳雞古地欝穹崇兮髙山大澤氣所鍾兮神歸卜宅安其中兮延休發祉方未窮兮再從叔故試大理評事兼徐州蘄縣令府君墓誌銘權徳輿府君諱有方字某天水略陽人集有也字曽祖崇本皇朝散大夫滑州匡城縣令祖若訥皇右補闕起居郎桂歙梓三州刺史考倣皇杭州紫溪縣令代以儒門四科為家法故發於文則菁華施於政則恵龢公承是休徳飭躬踐行得詩之無邪易之通理凡五授命皆以推擇曰左清道率府兵曹叅軍太子通事舍人陳州司法叅軍亳州司士叅軍以集有至字大理評事兼徐州蘄縣令滿嵗南浮集作游遘疾於途以貞元十六年夏五月殁於楚州之旅館春秋若干夫人河間劉氏樂城公仁軌之元孫也眀智才淑有子曰長孺弱冠舉進士甲科文行清修苴枲其容水漿不入以某集作其年某月日得吉卜於某地其引也盖殯也以輿師繁興未遑歸窆於東周之大􅎬姑刻圓石書其略云公夷通直信睦姻任恤位卑而志宏居約而家肥有為有守不疾集作疚是不跲其初命再命宫衛贊謁雖未居真秩而四方之嘉招狎至其後掾二邦奉六條受禄不誣實聞其政或攝領通邑或分乗軺車皆有裕人之仁急病之義及理於蘄也能遂物之宜不奪人之時嘉恵善利洽於千室猶即墨桐鄉之理無不及也又嘗饋師於囘中從事於夷門皆有功利稱於其府其去蘄也西方節將議委以謀猶介撰之重且謂弓旌之未稱也將以柱後恵文之冠招公章既上而公大病斯可歎也集作已猶子族子自朞及緦侍疾承計崩波塗潦又以見公夙訓慈仁之所逮也噫噫集作噫嘻是自匡城至公四代而三為縣大夫皆用循政聞且以兩漢邴曼容陳仲弓為凖故不至豐禄加以梓州之懿文盛徳排抑於時道未光大終於郡節或者蕃祉必復其在後裔乎此宗門所以有望於公之孤之昌大也既而緘公理命命以論譔小子愀然涕洟而為之銘曰恭惟叔父信厚清厲有車翹翹將事匪懈椽吏二部文而無害施化一同蘄人以乂易象視履謂耆而艾奄然不淑力命相盩楚挽虞殯風烟晦昧屬詞貞珉寧此厚載溧水縣令太原白府君墓誌銘白居易公諱季康字某太原人秦武安君起之裔胄北齊五兵尚書建之五代孫也曽祖諱士通皇朝利州都督祖諱志善尚衣集作醫奉御父諱鏻揚州録事叅軍公即録事府君次子厯華州下邽縣集無縣字尉懐府河内丞徐州彭城令江州潯陽令泗集作宿元和四年始析泗州之虹置宿州太和三年廢七年復置州虹縣令宣州溧水令某年月日終集作殁於溧水官舍眀年某月日歸葬於華州下邽縣某鄉某原享年若干嗚呼公為人温恭信厚為官貞白嚴重友于兄弟慈于子姪鄉黨推其行交游讓其才自尉下邽至宰溧水皆以㢘潔通濟見知於郡守流譽於眀寮才不遇集作偶時道屈於位而徒勞於州縣竟不致於青雲命矣夫哀哉公前夫人河東薛氏先公若干年而殁生二子一女女號鑒虚未笄出家長子某杭州於􅅗尉次子某睦州遂安尉後夫人髙陽敬氏父諱某某官生一子二女女皆早夭子曰敏中進士出身前試大理評事厯河東鄭滑邠寧三府掌記夫人在室以孝敬奉親為淑女既嫁以柔和從夫為順婦及主家以慈正訓子為賢母故敏中尊其教飾其身升名甲科厯聘公府以文行稱於衆以禄養榮於親雖自有資集作兼財然亦由夫人誨道之所致也夫人以大和七年正月某日寢疾終於下邽别墅享年若干以眀年某月某日啓溧水府君薛夫人宅兆而合祔焉禮也時諸子盡殁獨敏中號泣喪集作㐮事託從祖兄居易誌其集作于墓石銘曰繄我叔父溧水府君治本於家事政施於尉集作縣民繄我叔母髙陽夫人徳倄于家室慶積於閨門訓著趨庭善彰卜隣故其嗣子休有令聞文苑英華巻九百五十九
