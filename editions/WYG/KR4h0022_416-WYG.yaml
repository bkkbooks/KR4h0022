body:
  text: 文苑英華巻四百十六宋李昉等編封爵封公封右武威衞將軍沙吒忠義郕國公制李嶠鸞臺清邊中道前軍總管冠軍大將軍行右武威衞將軍上柱國賔山郡開國公沙吒忠義三韓舊族九種名家夙奉戎麾遂叅文衞蕃夷豕荐虜騎蜂屯頻出竒謨屢摧㐫黨昔臨鴈塞能覊縛馬之妖今拒狼河更翦奔鯨之孽勤功允著誠効克宣宜酧矢石之勞用廣山河之賦可封郕國公食邑三千户主者施行封致仕唐休璟宋國公制蘇頲門下養老乞言是謂侑禮建侯專國一作徳因而有命特進行前尚書僕射同中書門下三品上柱國酒泉郡開國公致仕唐休璟才實王佐行為物範自綜理朝綱謩猷揆政文武必濟義存簡冊公忠不回誠亮始終逮子房休事廣徳遺榮雖樂在黃金而慶逢蒼玉重其行賞孰若優賢宜傳帶礪益增土宇可進封宋國公食邑三千户餘如故主者施行封郭䖍瓘潞國公兼食邑實封制前人黃門聞鼓鞞之聲者則思夫將帥裂土茅之賦者則念彼勲庸右羽林軍大將軍兼安西大都䕶四鎮經畧大使上柱國太原郡開國公郭䖍瓘忠勇超倫智謨絶等决勝千里懐孺子之兵符通知四夷有老臣之戎律往者鎮于荒裔獨守孤城煑弩而其人益堅引弓而彼衆不敵故得愛子染鍔名王解辮穹廬掃地而將空沙漠聞風以歸附功則茂矣朕實體之宜誓河山開其井邑可進封潞國公食邑三千戸仍賜實封一百户餘並如故主者施行封李林甫晉國公牛仙客􅃎國公制孫逖門下勸賞者國之端既著酬庸之典俾彰為善之制中書令李林甫天寳挺生鬱為良佐工部尚書同中書門下三品牛仙客國之名器特表忠臣能恊乃心以成大政亟多啟沃聞所未聞導以化源驅之仁壽遂令天下人盡知禁斷獄數十殆至無刑所以比跡於成康髙歩於文景用人多矣方獲我心况知無不為釐革庶務損繁取要無往不通古者褒有徳賞有功今乃法懸不用徳教云洽叶賛之道功則茂焉宜其增封特開井賦林甫可封晉國公仙客可封􅃎國公主者施行張均襲封燕國公制門下正議大夫行尚書兵部侍郎上柱國張均傳範濟羙錫履承榮有搆厦之􅅛材為刜鍾之利器嗣其先職且歴縉雲之司纉乃舊封更開去社之國可襲封燕國公食邑三千户主者施行封侯劉領軍封侯詔沈約門下南國是式事昺興周原鹿啓土義昭洪漢領軍舅親徳之重朝野式瞻在昔中興任推心膂哀疚𦕈然未堪多難允賴徽猷嗣隆寳業及釁起不虞咫尺宫禁内叅嘉謨外宣戎畧宻勿劬勞誠力備盡宗社克固寔倚髙謨無言不讐無徳不報况忠勲至戚義兼於此者乎宜錫圭裂壌允副僉屬可封開國縣侯食邑二千户主者施行王亮等封侯詔門下尚書左僕射亮中領軍南鄉侯南徐州大中正瑩守吏部尚書志並時宗民秀徽望允集恊賛朝機彛倫是寄秉文經武任惟腹心方賴嘉謨克弭時難宜䟽爵建社與國同休亮瑩可各封一千五百户開國縣侯本官中正如故志封千户開國縣侯本官如故主者速施行常僧景等封侯詔門下廬陵王中兵叅軍事宣閣將軍軍主新除右軍常僧景車騎江夏王叅軍事宣閣將軍新除右軍中郎將薛元嗣安東廬陵王叅軍事振武將軍徐元稱假寧朔將軍廬陵王國侍郎延明主帥殷係宗前軍將軍宣閤格虎隊主馬廣或氣畧强果或志識貞濟或忘家奉國誠著夷險方寄戎昭克清時難宜命爵啓土以奬厥勞可封一千户開國縣侯本官新除驅使悉如故主者施行封李岫長樂縣侯制孫逖門下朝議大夫守衞尉少卿上柱國清水縣開國伯李岫操清行潔學敏詞優克荷教忠之訓以成資敬之徳屬交神有慶布澤無偏賜級之榮既覃於良相推恩之典宜及於名卿俾增錫土之封用表傳籝之業可封長樂縣開國侯食邑一千户主者施行授魏慱節度副使守左一作右司馬知府事長沙縣開國子羅紹威檢校司徒進封開國侯制錢珝勑王制之重列爵惟先開國之名徹侯斯貴具官某自河而北地濶兵賦之大實在鄴中而又以雄傑之材統臨有政爾以忠孝全道副貳其權嚴訓所資美譚甚逺不作威而人自畏能處順而事必行理戎每賛於公家秉禮無違於私室更廣䟽封之寵以分勸善之章勿怠象賢是為守貴可依前件封伯封申希祖詔沈約門下持節督司州諸軍事冠軍將軍司州刺史申希祖志器沉隐才畧開濟在昔多難任叅心膂爰及中興忠款彌著契濶艱虞盡其心力逮獯獫侵斥武節飈騰殘㓂外殄危城獨困休庸茂績朕有嘉焉宜錫茅土以酬勤烈可封開國伯食邑五百户本官如故主者施行封三舍人詔門下輔國將軍驍騎將軍南髙平太守兼中書通事舍人沈徽孚給事中驍騎將軍臨淮太守兼中書通事舍人王咺之寧朔將軍南濮陽太守兼中書通事舍人裴長穆並以素胄清才服勤禁省契濶劬勞自頃多難軍國務殷内叅帷幄外濟師旅忠規欵志義感朕心宜錫茅社同莅賞冊可封三百户開國縣伯本官郡驅使並如故主者速施行封子封徐世標制一作詔門下驍騎將軍彭城令徐世標才畧貞濟志懐義烈忠節内欵勲勤外著禦侮折衝任惟心膂頃姦慝潜煽危機驟發夷㐫弭難實有力焉宜命賞疇庸錫兹土宇可封開國縣子食邑三百户封烏薄利歸義縣開國子制李嶠鸞臺左金吾衞大將軍員外置檢校源州都督烏薄利家近圓城任隆方岳惠洽藩部功宣朝廷扶津搆虐􅎬穴生氛能拒祅㐫固守臣節踰馬韓而獻冊汎鯨海而申䖍計議並深忠懇咸到書勞有典方隆將帥之班舉善不遺宜拓公侯之宇可左金吾衞大將軍員外置同正員仍封歸義縣開國子食邑一千户主者施行授髙爽果州刺史安友晟寧州刺史仍封武威縣開國子加食邑制錢珝勑我思致理不欲滯人復於賦禄之間常有失勞之慮改張之道且就便宜勸善之章必先允當具官髙爽周知武經盛著臣節拳勇之力馳騁有成前以新平殄㓂之勲移北地頒條之政而兹之牧守且務緝綏元帥請留我所難奪南充善部皆曰可居雖改乗轅將聞叱馭具官安友晟兄友弟恭共圖富貴披堅執鋭惟狥國家當羣兇効逆之秋激受命忘身之氣比膺賞典亦剖郡符且未登車實同解印或致杜門之歎是忘盟府之書乃寄邊城仍加列爵爾其各宣美化如立前功必使忠臣兼稱循吏可依前件授金州刺史馮行襲學校太子少保仍封長樂縣開國子加食邑制勑漢制郡國有政者皆不易其居就增其秩欲使人安於教化且激勵精本自凋刓皆成富庶具官馮行襲始用忠謀勇力披難立功每推求敵之心必能禁暴為武思齊良將闇合善經而負山面江金石名部燎于兵火毒我編氓爾則保之如家視之如子盡寛井賦恐奪農時耕無惰夫廪有豐食地産脩述職之貢市租給備患之師相里所而同欲乃遷興役徒而施勞何怨炳然之績觀而可論保民既重於三公開國仍昭於五等如能知勸當更陟明可依前件男爵授李居壬等制沈約門下新除太子左衞率軍貞主李居壬志識開敏器懐貞濟盡力禁門誠著夷險新除太子右衞率軍主潮陽齊書作山陽縣開國男胡松性業詳固才用果烈新除節督青冀二州諸軍事寧朔將軍青冀二州刺史栢和剛正欵率屢著勤効新除左中將軍主鴻選氣質强果秉心壯宣並反斾南轅以赴危難身先士卒翦此鯨鯢功勤碩茂宜隆賞典居壬可封一千户開國縣侯松可增封為七百户和可封五百户開國縣伯選可封三百户開國縣男新除持節刺史將軍主男並如故主者施行封左興盛等制門下逆豎王敬則縱兵内侮陵斥畿甸輔國將軍叅軍將軍事齊書作前軍司馬左興盛直閤齊書作輔國將軍劉山陽受律前驅焱勇争路或衡至首斾或陷懸中麾元惡梟至氛梗載廓賞不踰時義𢎞前典可封開國男食邑二百戸并進位一階主者速施行封劉瑨彭城縣開國男制李嶠鸞臺朝散大夫行左肅政臺監察御史劉瑨執簡當朝乘軺撫俗効彰伏柱勤深攬轡堅貞之操既申於栢臺利建之榮宜及於茅社可封彭城縣開國男食邑三百户主者施行授沙叱忠義等官爵制鸞臺辭第鑿門允稱鼓鼙之將列位䟽爵是為廟堂之賞冠軍大將軍行右威武衞將軍檢校左羽林衞上柱國郕國公右奉宸内供奉沙叱忠義遼東壯傑名蓋於狼河右武威衞將軍員外置同正員右奉宸内供奉駱務整薊北雄渠氣髙於龍塞並受登壇之任俱懐出閫之畧或輕齎絶險以應青丘之别軍或髙壘抗威以要黒山之潜遁兵强由筭師克在和爰清食彘之祅遂廓浮黿之黨操袂成市執袪一作驅盈路屈指告㨗未待於經年酬庸冊勲豈假於踰月宜膺剖珪之錫兼峻衘珠之寵忠義可行右金吾衞將軍餘如故務整可左武威衞將軍封盧龍縣開國男食邑三百户餘如故主者施行封張嘉貞河東縣男制韓休門下任事而爵古之彛訓論功以封朝之通典銀青光禄大夫守中書令上柱國張嘉貞忠肅恭懿宣慈敏逹涵清明以毓徳體文武而成器自光帝載昭宣廟謨鼎味用和台堦増峻事君有犯而無隐奉國以公而滅私持其憲章式是軌度既邦教有叙亦王猷以穆頃統軍政則城朔方爰底其績未酬厥賞固宜命以圭社崇其禮物俾楚臣授邑克表寢丘之制漢道優賢更叶平津之美可封河東縣開國男食邑三百户主者施行授寧州刺史髙爽檢校司徒仍封渤海縣男加食邑制錢珝勑昔慶父去而魯難寧得臣死而晉憂弭事有所近之類而人有可論之功則用典為以勸來者具官髙爽魁傑之材好通經畧强禦之力善據邊防激將帥之雄心憤邦家之多事聞吾出狩來扞近郊遂驅有律之師進討不然之黨壓卵既潰衝㓂既一作始平忠烈可圖勲勞甚盛進階以數開國有章且觀得衆情無不悦於是賞勵之不已保則永休可依前件文苑英華巻四百十六
