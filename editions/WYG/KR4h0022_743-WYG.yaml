body:
  text: 文苑英華巻七百四十四宋李昉等編賢臣三名臣論一首三賢論一首諫臣論一首近代良相論一首春秋無賢臣論一首二賢論一首三名臣論管樂諸葛李翰或問於翰曰昔諸葛亮擁膝南陽為梁甫吟自比管仲樂毅州平元直以為信然雖涯量罕窺而遺跡可見夫此三名臣者亦有優劣乎願聞其說翰辭不敢對至於冄三問者固二字亦作固請不得已川文粹有而字應之曰豈易言乎豈易言乎夫目一無目字小者不足以論大體一無體字近者不足以量逺奈何泛議大賢能制律管者可以候四氣之徴測日晷者可以知千里之度察㣲觀著由虛考實儻容寄言象於斯矣如僕所揣則管不逮樂孔明其伯仲之間與一作耳問者曰何為一作謂其然也昔管仲相桓公九合諸侯一匡天下興齊定霸尊周勤王川文粹作興周定王功其懋哉仁亦至矣孔明收荆州散敗之餘建䇿通吳合從破魏奉先主西入劔門下車而三分天下翊戴後嗣纘修舊勲刑政孚於偏方威德振於中夏雖短祚中否而王業殆成樂生一為燕將纔勝齊師挫衂於二城之間狼狽於兩國之際軍不振旅身卒奔一作犇亡子獨推而崇之冠於二賢之首誠所未諭莫一作其有說耶翰應之曰子之所問一作聞者未與一作末歟語功則信焉一作然語才則不爾夫才生於代功與運成固有才優而功㣲運合而才劣先當格以道徳覈於終始審其邪正觀其去就然後可以一無以字明也夷吾當既亂之時輔有過川文粹作道非之主功濟諸夏澤被生人信為羙矣然邀一作徼功事讐一作儲務入之情速矣肆奢越禮盈量之意見焉故仲尼雖稱其仁終小其噐止於霸者之佐殆非王臣之良孔明從容三顧後起籌畫必當締搆必成事屯而業亨主闇而國理一作治兵弱而隣疆一作疆隣畏服功大而本朝不疑斯亦難矣然窺其軍令跡其用法必俟一作使中原克一作可復然後厚賞寛刑𤣥徳常稱馬稷言過其實不可大用之卒致䘮敗斯所謂濟於事而未全於道得諸已而未審於人樂生一戰舉齊二城未下待一作從之以徳牧一作收之以禮捨權變於攻取之際行王道於軍旅之間事雖不成業亦𢎞一作大矣向使昭王不死惠王不疑則其功未可量也夏侯太初論之詳矣及其迯燕之責亡而奔趙趙王問以圖燕之䇿樂生流涕而對曰臣昔之事燕昭王一作昔日之事燕王猶今日之事大王也千秋萬嵗之後尚不敢侵其僕𨽻而況謀子孫乎因棄祿宵遁善夫長者之言可謂懐祿不屑其榮周身不違於道比諸二子不亦優乎主恩非臣下之所圖天命豈生人之所制安可川文粹作敢以功業之成敗斷才能之短長耶且夫運有通塞命有脩短蓋天意也豈人事乎昔韓信將伐魏問得不以周叔為將乎聞不用廼大喜向使魏人用之則漢師不敢川文粹作果濟河矣然則周叔之才亦韓信流亞也終湮滅而無聞焉古之大才而功不著者亦何可勝道哉翰長兄御史君體純王之德負經逺之才常感憤於周韓之間嘯詠於管樂之際守之以忠信文之以禮樂藴弼諧之大畧以康濟為已任進逢國難謀猷不行退有家艱哀毁過禮官纔元士年止終身一作命止中年官一作位不登於廟堂名不書於史冊斯才也斯運也誰見三分九合之優劣離一作辭燕對趙之去就哉由此觀之斷可知矣問者嘆息而退一作皆唐文粹三賢論李華或曰吾讀古人之書而求古人之未獲嗟夫遐叔謂曰無世無賢人其或世教之至淪於風波雖賢而不能自辯況察者未之究耳一作乎鄭衞方奏正聲間發極和無味至文無彩聴者不達反以為怪譎之音太師樂工亦失容而止曼都之姿雜於顦顇被緼絮蒙蕭艾羙醜夷倫自以為陋此二者既病不自明又求者亦昏將剖其善惡在遷政化端風俗則賢不肖異貫而後賢者自明而察者不惑也余兄事元魯山而友劉蕭二功曹此三賢者可謂之逹矣或曰願聞三子之畧遐叔曰元之志行當以道紀一作純天下劉之志行當以六經諧人心蕭之志行當以中古易今世元齊愚智劉感一作蹙一物不得其正蕭呼吸折節而獲重祿不易一刻之安元之道劉之深蕭之志及新唐書作易於夫子之門則達者其流也然各有病元病酒劉病賞物蕭病貶惡太極一作亟奬能一作善太重元奉親孝居䘮哀撫孤仁狥朋友川文粹作友朋之急􅊩職明於賞罰終身貧而樂天知命焉以為一作謂王者作樂崇徳殷薦上帝以配祖考天人之極致也而詞章不稱是無樂也一無此四字于一作於是作破陣樂詞一有是樂也三字恊唐書作訂商周之頌推是而論則見元之道矣劉名儒史官之家兄弟以學著稱乃述詩書禮樂春秋唐書作禮易書春秋詩為五說條貫源流備今古一作古今之變推是而論則見劉之深矣蕭以史書為煩一作繁尤罪子長不編年陳事而為列傳後代因之非典訓也將正其失自春秋三家之後非訓齊生人不錄次序纘脩以迄於今志未就而殁推是而論則見蕭之志矣元㨿師保之席唐書作位瞻其形容不俟其言而見其仁劉被卿佐之服居賔友之地言理亂根源人倫隠明叅乎元精而後見其妙蕭若百鍊之鋼川文粹作銅不可屈折當廢興去就之際一生一死之間而後見其大節視聴過速欲人人如我志與時多背恒見詬於人取其中節之舉是可以為人師矣學廣而不偏一無偏字精其貫穿甚於精者又文方復雅商之至當以律度百代為任而古之能者往往不至焉超蹈一作絶孤厲不可謂不知一有者字言也茂挺父為莒丞得罪清河張惟一時佐亷使按成之茂挺初登科自洛至莒英華作自洛陽還莒五字道邀使車發詞哀乞惟一涕下即日捨之且曰蕭賛府生一賢才資天下風教吾由是得罪一有亦字無憾也夫如是得不謂之孝乎或曰三子者各有所與遊乎遐叔曰若太尉房公可謂名公一作人矣每見魯山則終日歎息謂予曰見紫芝眉宇使人名利之心盡矣若司業蘇公可謂賢人矣毎謂當時名川文粹作賢士曰使僕不幸生於衰俗所不耻者識元紫芝廣平程休士羙端重寡言河間郉宇紹宗深明持川文粹作特操宇弟宙次宗和而不流南陽張茂之季豐守道而斷趙郡李蕚伯高含大雅之素一作業蕚族子丹叔南誠莊而文丹族子惟岳謨一作謀道沉邃亷靜梁國喬潭一作渾非徳源昻昻有古風𢎞農楊椽一作極士膚一作扶敏而安道清河房垂翼明志而好古河東栁識方明遐曠而才是皆慕於元者也劉在京下嘗􅃦痑一作疾房公時臨扶風聞之通夕不􅄰顧謂賔從曰柄唐書作㨗一作挺卿若不起無復有神道尚書劉公每有勝理必詣與談數一作終日忘返退而嘆曰聞劉公清言見皇王之理矣殷直清有識高恨言理少對未與劉面常想見其人河東裴騰士舉精朗邁直一作朗邁真直弟霸士㑹峻清不雜隴西李廣敬仲一作叔堅明冲一作而粹范陽盧虚舟㓜直一作真質方而清頴川陳儻言士然談而不厭吳興沈興宗季長專靜不渝頴川陳亷不噐行古之一作人道渤海高適達夫落落有竒節是皆重於劉者也工部侍郎韋述脩國史推蕭同事禮部侍郎楊浚掌貢舉問蕭求人海内以為徳選汝南邵軫緯卿有詞舉幹一作詞舉標幹天水趙驊雲卿才羙行純陳郡殷寅直清達於名理河南源衍季融粹㣲而同一作周㑹稽孔至惟㣲述而好古河南陸㨿徳隣恢恢善於事理河東柳芳仲敷該練故事長樂賈至㓜隣一作幾名重當時京兆韋收仲成遠慮而深南陽張有畧維之履道體仁有畧族弟邈季選温其如玉中山劉頴士端疎明簡暢潁川韓極一作佐𤣥一作元行備而文樂安孫益盈孺温良忠厚京兆韋建士經中明外純潁川陳晉正卿深於詩書天水尹徽一作㣲之誠明貫百家之言皆是厚於蕭者也尚書顔公重名節郭父友一作故舊與茂挺少相知顔與陸㨿柳芳最善茂挺與趙驊邵軫洎華最善天下謂之顔蕭文一作之交殷寅源衍陸於二交之間不幸元罷魯山終于一作於陸渾劉避地逝于安康蕭歸葬先人没于汝南今一作無復求斯人有之無之是必有之而察之未克也三賢不登尊位不享下壽居易委順賢人之達也不䝉其教生人之病也予知三賢也深故言之不怍云一作皆唐文粹諫通鑑作爭臣論韓愈或問諫議大夫陽城於愈可以為有道之士乎哉學廣而聞多不求聞於人也行古人之道居於晉之鄙晉之鄙人薰其徳而良善者幾千人大臣聞而薦之天子以為諫議大夫人皆以為華陽子不喜色舘本作色喜居於位五年矣視其德如在集有草字野彼豈以富貴易移其心哉愈應之曰是易所謂恒其徳貞而夫子㐫者也惡得為有道之士乎哉在易蠱之上九云不事王侯高尚其事蜀本有以字蹇之六二則曰王臣蹇蹇匪躬之故夫亦以所居之時不一而所蹈之徳不同也若蠱之上九居無用之地而致匪躬之節蹇之六二在王臣之位而為集作高不事蜀本有上字之心則冐進之患生曠官之刺興志不可則而尤之古本無之字不終袁本注作絶無也今陽子實一匹夫趙徳本作陽子寔一介之夫陽子杭本無此二字在此位不為不久矣聞天下之得失不為不熟矣天子之待之不為不加集作知矣而未嘗一言及於政視政之得失若越人視秦人之肥瘠忽焉不加喜戚于集作於其心問其官則曰諫議也問其祿則曰下大夫之秩也問其政則曰我不知也有道之士固如是乎哉且吾聞之有官守者不得其軄則去有言責者不得其言則去今陽子以為得其言集疊言字乎哉得其言而不言與不得其言而不去無一可者也陽子將為祿仕乎古之人有云仕不為貧而有時乎為貧謂祿仕者也宜乎辭尊而居卑辭富而居貧若抱闗擊柝者可也蓋孔子嘗為委吏矣嘗為乘田矣亦不敢曠其軄必曰㑹計當而已矣必曰牛羊遂而已矣若陽子之祿秩集作秩禄不為卑且貧章章明矣而如此其可乎哉或曰否非若此也夫陽子惡訕上者惡為人臣招音翹其君之過而以為名者故雖諫且議使人不得而知焉書曰爾有嘉謀嘉猷則入告爾后于内爾乃順之于外曰斯謀斯猷唯我后之徳夫陽子之用心亦若此者也愈應之曰若陽子之用心如此滋原本作兹所謂惑者矣入則諫其君出不使人知一有之字者大臣宰相者之事非陽子之所宜行也夫陽子本以布衣隠於蓬蒿之下主上嘉其行誼擢在此位官以諫為名誠宜有以奉其職使四方後代知朝廷有直言骨鯁之臣天子有不僣賞從諫如流之羙庶巖穴之士聞而慕之束帶結髪願進於闕下而信集作伸其辭說致吾君於堯舜熈鴻號於無窮也若書所謂則大臣宰相之事非陽子之所宜行也且陽子之心將使君人者惡聞其過乎是啓杭本作其咎之也或曰陽子不求聞而人聞之不求用而君用之不得已而起守其道而不變何子過之深也愈曰自古聖人賢士皆非有心求於聞用也閔其時之不平人之不乂得其道不敢獨善其身而必閤本作不以以兼濟天下也孜孜矻矻而後已故禹過家門不入孔席不暖墨突不黔袁本作孔席不暇暖而墨突不得黔彼二聖一賢者豈不以集作知自安逸集作佚之為樂哉誠畏天命而悲人窮也夫天授人以聖賢才能豈使自有餘而已誠欲以自補其不足者集有也字耳目之於身也耳司聞而目司見聴其是非視其險易然後身得安焉聖人者時人之耳目也時人者聖賢之身也且陽子之不賢則將獨集無獨字役於賢集作身以奉其上也若果賢則固畏天命而閔人窮者也惡得以自暇逸乎哉或曰吾聞君子不欲加諸人而惡訐以為直者若吾子之論直則直矣無乃傷於聴集作于徳而費於辭乎好盡言以招人過國武子之所以見殺於齊也吾子其亦聞乎愈曰君子居其位則思死其官未得其位則思脩其辭以明其道我將以明道也非以為直而加諸人也且國武子不能得善人而多盡言三字集作好盡言於亂國是以見殺傳曰惟善人能受盡言謂其聞而能改之也子告我曰陽子可以為有道之士也今雖不能及已將不能集作得為善人乎哉近代良相論李徳裕客謂余曰揚子法言有重黎顔騫顔子名犯廟諱不書二篇品藻漢之將相敢問近代將相可得聞乎余曰唯唯夫股肱與君同體四海之所具瞻集作瞻也恩義至重實先於愛敬非社稷大計不可以強諫亦猶父有諍子不獲已而諍豈可以為常也唯宜將明獻替致其主於三代之隆孝經曰天子有諍臣七人非宰相之職也必求端士正人以當言責導其謇諤救其患難而已雖聖人之言危而不持顛而不扶則將焉用彼相此亦將明獻替之謂也使其君昭明令徳不致於顛危也漢之良相十數人矣公孫𢎞開陳其端而不肯庭集作廷辯固未可也蕭望之剛不䕶闕王嘉訐而犯上致元哀二后有信讒邪之患集作惡戮忠直之名此其失者也魏相薛廣徳持重守正弼諧盡忠集作忠信可謂得宰相體矣近世貞以制動思在無邪松栢所以後雕藜藿由其不採貴不患失言必匪躬似薛廣徳者鄭丞相陳丞相有之矣此謂故右僕射鄭司徒故右僕射陳司徒麟之為瑞也仁而不觸玉之為寳也亷而不劌恕以及物善不近名集有通識二字高朗令終天下無怨似丙博陽者王丞相鄭丞相有之矣此謂故中書王丞相故鄭丞相好古洽聞應變睿敏幾可以成務智足以取捨仁愛樂道集作善勤瘁奉公逢時得君不失其政似倪寛者韋丞相李丞相有之矣此謂故中書韋司空故居守李司空用于集作於臲卼以盡天涯雖劔光不沉而鸞翮長鎩靈均之九死無悔柳惠之三黜非辜既没不瞑號于上帝似蕭望之者所謂李丞相矣此謂故淮海李司空余亦同病莫保其生知我者以為忠亦已鮮矣庶乎數世之後朋黨稍息以俟知音耳春秋無賢臣論孫郃春秋列國周之諸侯受周之封分為五等五等之下臣為陪臣陪臣於諸侯君父也諸侯於周王亦君父也陪臣於周義猶大父也夫為人子之道孝於父者必欲父孝於祖陪臣忠於諸侯者必欲諸侯忠於天子則上下有序一作忠孝兩全康乂四方一作天下今春秋陪臣張公室侵王室弱周以強諸侯是弱祖而強父佐諸侯而敵周是佐父而敵祖遺祖之怨成父之逆惡莫大焉言之於臣則非忠語之於子則非孝論之於道則傷義推之於情則辜川文粹作傷恩遂使姬周削弱祀號而已桓文雖以為霸何能正之反有封禪請隧之僣管晏雖有其功何能諫之而有反玷毁孔之惡于時風教大壊海内焚如天不能隂隲下民降大聖以為木鐸歴國七十餘說而不遇奔走齊魯宋衞之郊反若䘮家之狗知不可訓慮後世不懼乃脩春秋明向背其有甚者或斥之或貶之弑君三十六亡國五十二奔走失社稷者不可勝紀書曰帝乃震怒致令海内無一嘉祥但有妖怪謂春秋亂世豈不如然于時人不堪命何耶無賢臣哉予謂此論警衆士大夫多稱之遂聞􅞭嘏􅞭嘏徴而竒之或謂可刋金石訓乎今後既而喧傳則有難僕曰春秋豈乏賢者子謂之無激之耶鮮之耶奈乎孔門何曰孔門仕者鮮又家臣耳子不讀聖賢書乎易曰屯其膏小貞吉大貞㐫春秋之大夫小貞耳盍以大貞取之以正道取五霸猶罪人二賢論管仲晏嬰楊䕫子貢以管夷吾之奢晏平仲之儉質于宣尼宣尼以管仲之奢賢大夫也而難為上晏平仲賢大夫也而難為下蓋譏其僣上偪下之失或謂無所輕重予敢繼其末以論先後焉夫齊桓承襄公之失政接無知之亂常久亡於外自莒先入有國之後銳心以求其治及叔牙言夷吾之能脫囚服秉國政有鮑叔之助隰朋之佐遂能九合諸侯以成霸業此逢時之大者也若平仲者立於衰替之朝有田國之彊有欒高之侈時非曩時君非賢君當崔杼之弑也能挺然易其盟陳氏之大也能曉然商其短獨立讒謟之伍自全於紛擾之中人無間言時莫與偶若桓公九合諸侯不以兵車信夷吾之力也使晏子居桓公之世有鮑隰之助則其尊周室霸諸侯功豈减於管氏乎以其鏤簋而朱紘孰若豚肩不掩豆以其三歸而反玷孰若一狐裘三十年矧國之破家之亡者以奢乎以儉乎語曰奢則不遜儉則固與其不遜也寧固然後知聖人輕重之㫖斯在文苑英華巻七百四十四
