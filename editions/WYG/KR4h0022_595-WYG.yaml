body:
  text: 文苑英華巻五百九十六宋李昉等編節朔謝物二謝臘日賜臘脂口脂表一首謝賜香藥面脂表一首謝賜新厯日及口脂面藥等表一首謝墨詔賜厯日口脂表一首為郭令公謝臘日賜香藥表一首為郭令公出上都赴奉天行營勑賜錦戰袍并口脂等謝表一首謝勑書賜臘日口脂等表十四首謝停賜口脂臘脂表一首謝賜鍾馗及厯日表三首謝臘日賜臘脂口脂表李嶠臣某等言品官劉阿道至奉墨勑賜臣等臘脂口脂等物恩命忽臨喜抃交至手舞足蹈心慚意悚伏以安寜戒序嘉平在節白日臨於陽谷繁霜入於露寒蘅枺始楟疑桂筵豐暇青牛帳裏未輟鑪香朱鳥窓前新調鉛粉因三冬之吉慶造六宮之脂澤糅之以辛夷甲煎燃之以桂火蘭蘇氣溢象奩香衝翠幄以光金屋之仙鄉以賜瑶房之帝嬪南國容華之人從來未識西京妖冶之妾何時可見臣等叨膺天命謬㧾留臺雖天動星廻蹔違於侍從而雲行雨施更延於恩渥猥承郵驛曲賜絲綸分八子之膏腴及三臣之𤨏賤竊窺明鏡已覺衣冠之不任旋顧粧奩遂成箕箒之多幸身輕塵露佩德空深貺等丘山殞身何答無任踴躍屛營之至謝賜香藥靣脂表張九齡臣某言某至宣勑㫖賜臣裛衣香靣脂及小通中散等藥捧日月之光寒移雪海沭雲雨之澤春入花門雕奩忽開珠囊暫觧蘭薰異氣玉潤凝脂藥自天來不假淮王之術香宜風度如傳荀令之衣臣才謝中人位叅上将疆塲効淺山嶽恩深唯因受遇之多轉覺輕生之速臣無任謝賜新厯日及口脂靣藥等表邵說英華作張説非臣某言中使某至伏奉某月日墨詔賜臣新歴日一通并口脂靣藥紅雪紫雪等窮溟之上寵詔忽臨大蜡之辰慶賜爰及跪承慈渥戰汗失容臣徃塵近掖實曠天心洎守遐藩多昧戎畧殊私未答官謗將營陛下聖德包荒宸嚴曲貸猶存寵任便浹恩波覆燾不遺於遐陬賜賚亟霑於尸素况日官頒歴承敬授之規綸㫖宣慈沐逾涯之奨蘭膏滋潤綘雪珍芳捧持而炎瘴自消潤餙而衰容坐變丘山非重草芥至微雖百其身豈酬鴻造無任感恩瞻戀之至謝墨詔賜厯日口脂表臣某言伏奉月日墨詔等恩波逺被寵賜荐臨捧持傾心跼􅐲無㨿臣某中謝臣分麾五嶺謬竊殊榮蒞鎮三年竟無微効陛下不遺舊齒猶奬非才恩禮浹於遐藩慶賜覃於令節天心宏覆慈㫖優醲頒聖厯以授時降寵恩而撫俗薰風溥抃陽景照臨輝華遍於草木抃舞盈於路衢蘭膏綘雪沭雨露之湛恩陋質凡姿荷乾坤之厚施伏以三元在近國度維新百辟獻芹獨馳心而望闕二毛垂領唯懇願以朝天犬馬微誠感戀逾切無任感恩戀主屏營之至為郭令公謝臘日賜香藥表臣某言月日中使某至伏奉恩旨勑賜臣臘日香藥金花銀合子两枚一作靣靣脂一合裛香二袋澡豆一袋者開奩氣馥拜蹈増慚臣中謝伏以時當大蜡節號嘉平歡已洽於人神賜仍周於黻冕沐兹芳澤傅以香蘇忖陋體而何幸顧頺齡而可駐丘山施重雨露恩深感戴慙惶不知所報無任荷恩稠疊之至為郭令公出上都赴奉天行營勑賜錦戰袍并口脂等謝表王諫臣某言臣今日已時至臨臯驛西開府魚朝恩見奉宣進止賜臣錦戰􅂁等又未時至管城驛縣中使至賜臣𤓰兩顆聖慈荐及寵賜頻加榮有同於衣錦恩乃及於挾纊重裘莫比被練非堅以此臨戎期於盡敵况傅之香澤分以甘瓜推食㨂衣未足為喻誓當畢命少答殊私身膏草野實伸至願無任受恩稠疊之至謝勑書賜臘日口脂等表吕頌臣某言中使某至伏奉勑書手詔并賜臣厯日藥物及銀合等千年聖厯忽降遐荒萬里天書更臨下土臣某中謝臣駑駘賤質草木微生謬荷國恩擢居方鎮按俗闕澄清之任臨戎無毫髮之功累授殊私荐霑芳澤况靈長上藥列在仙方芬馥蘭膏出於中禁豈臣庸陋冝此寵榮感戴天恩不勝抃躍同前臣某言中使某至奉宣聖㫖賜臣臈日香藥口脂等宸私曲被殊賜荐加祗奉恩榮荷戴惶灼臣中謝陛下德施周普蜡百神而魚蟲不遺慈澤旁流錫羣下而細㣲皆及謬承良藥之貺豈當同體之榮龜首疑作手既沐其芳馨香膏又霑於脣吻賁餙之道備幸於臣澤浹肌膚恩深骸骨撫心揣分慙厚施於天休賤質庸陋荷曲誠於𤣥造實為僥倖何以克堪涓埃無補於綱維濡渥有加於蓬賤丘山惠重螻蟻命輕靦厚顔於一作以死生覬忘軀而狥節臣無任同前臣某言中使某至伏奉宣賜臣紅雪口脂各一合降自重霄賚于賤品承㫖慶抃省躬慙惶臣某中謝臣謬處凖繩遂更律候每慙効薄常懼食浮豈謂特迃鴻私猥霑殊賜時當蜡臘澤浹幽㣲彩雪蠲邪無虞於美疢芳膏盡餙有愧於陋容徒罄丹誠不知上答無任感戴之至同前臣某言中使某至伏奉勑書慰諭并宣進止賜臣紅雪紫雪口脂等慶賜以時寵光逮下捧詔心慄承恩汗流中謝伏以𤣥律送寒清霜戒臘九天布惠萬類發生臣以庸虛謬當任使觀風未乆按部無能而陛下俯念守臣恩同勲舊詔垂御札藥禀仙方降蘭澤以傳馨頒玉厯以示慶實慙固陋忽被光輝撫躬循已終夕愧厲謹當訓整師旅收養黎甿敷雨露之恩宣日月之照俾瘡痍漸復江湖安流庶於㳙毫上答山岳伏惟皇鑒俯照丹誠無任同前常衮臣某言内侍蒙日新等至奉宣恩命賜臣靣脂口脂香藥澡豆并銀鉼子等伏以受任以來殊私未答每更節候慙曠嵗時屬𤣥律送寒清霜戒臘陛下爰脩大蜡用告順成既息田夫復祭先嗇臣以涓埃莫効氷炭相仍年糓未登人財益匱致滋不稔之咎實媿報農之辰兢惶失圖啓處無地聖慈全宥寵錫過優珍噐鮮華蘭膏芳潤以疪賤之質忽降御香以靦冒之容忽澡天澤省躬無措跪奉何施粉骨酬恩未伸萬一無任感戴欣懼之至謹奉表陳謝以聞同前臣某言中使某至伏奉某月日勑書并手詔勞勉臣等兼賜臣衣一副臘日口脂紅雪一合中和尺一貞元八年厯日一通陛下道邁古先德動天地凡於一物必寄聖慈欲臣􅃭暖惸嫠故衣裳是賜欲臣除去人患故良藥下霑欲臣永駐衰容故馨香流潤新厯方啓慶昌運之無窮彛尺辨才審度量之不昧力㣲賜重捧戴兢惶臣無任同前臣某言中使郭昕至伏奉手詔并賜臘日口脂紅雪貞元九年厯日等拜受怔營不知所措臣某中謝伏以玉散降於仙宫金膏流於秘藏含芳咀味覺六府之和潤骨凝膚改三年之觀况復惟新聖歴受朔齊人稱慶戴恩倍萬恒品不勝踴躍之至同前臣某言中使呉千金至伏奉十一月九日賜勑書手詔存問臣及將吏百姓等自天渙汗徧施稚孺普及纎細歡呼未暇聖念再加老㓜捧恩感動肌骨又以臘日將及賜臣紅雪口脂各一合貞元十五年厯日一通跪啓緘封榮抃相集伏以方傳上仙藥成中禁却老除患妙絶如神嘗所聞知豈期親授况階􅕴候朔晷度不差蒲栁微生又膺天厯恩波逾重跼蹐難勝不任感恩荷聖踴躍之至同前李舟臣某言今月日中使内府丞張某至伏奉勑書賜臣及軍將臈日靣脂香袋紅雪澡豆等殊私忽臨捧戴無力手足蹈舞心魂若驚臣某中謝伏惟陛下以節遇嘉平律當凝閉爰布發生之德猥承頒賜之榮膏液廣霑降中天之渥澤生香逺及藴西域之芳馨苦口以愈沉疴澡身以滌塵垢無任感戴屏營之至同前臣某言中使至伏奉勑書手詔賜臣新厯日一本口脂靣脂紅雪紫雪金花各一枝并賜臣春衣一副牙尺一枚大將衣兩副宸翰忽臨殊賜兼及蠻夷捧詔抃躍輕生將吏受恩誓心効死臣某中謝伏以令節嘉平曲承寵賚凝膏芳潤獲滋蒲栁之容寶噐珎竒逺承日月之照謬當重寄星嵗屢移恩積丘山功無毫髪况𤣥隂云暮斗柄初廻已霑芳澤之恩兼降中和之服頒賜尺於王度布新厯於荒陬躍抃徘徊莫知所報臣無任同前韓翃臣某言中使某至伏奉勑書宣慰臣及將士等并賜臣毋申國太夫人口脂一合靣脂一合澡豆一貼并賜臣温香一合兼賜將士口脂等聖慈稠疊感戴無階臣某中謝臣絲髮効㣲乾坤施重因時受賜覩物知恩寵及澡身榮加潤色恭嘗御藥心則和平新受國香人其服媚餙犬羊之賤質齊鴛鷺之增慶恩必及於慈親澤兼流於宿將感戴洪恩無任抃躍屏營之至同前劉禹錫臣某言今日中使某官至奉宣詔書賜臣及将士臘日口脂香藥紅雪等自天有命蹐地無容虛受寵光翻成憂負臣某中謝臣位居方鎭才實凡庸郡邑臨人未移風於弊俗嵗時頒物空竊賜於聖明特降璽書重加靈藥潤之膏液襲以蘭芳期美疢以蠲除冀頺顔而可駐殊私不遺於一物曲澤下及於三軍未報主恩慙於犬馬唯將臣節死於封疆無任同前臣某言中使霍子璘至奉宣聖旨存問臣及將士官吏僧道耆夀百姓等兼賜臣墨詔及貞元十七年新厯一軸臘日靣脂口脂紅雪紫雪并金花銀合二金稜合二皇明逺燭殊集作恩錫荐臻抃舞失容捧戴無措臣某中謝伏惟皇帝陛下立極御人順時布政禮崇大蜡澤浹遐藩臣叨榮日深竊位時乆謬廻宸睠猥降王人天書下臨覩三光之照耀玉厯爰授知四氣之環周雕奩既開珍藥斯見膏凝雪瑩含液騰芳頓光蒲栁之容永去癘疵之患命輕恩重上答何階無任屏營之至同前令狐楚臣某言去年十二月中使至奉宣勑書手詔兼賜臣口脂紅雪各一合十年厯日一通捧緘跪發以喜以駭臣某中謝臣聞平分四時堯有厯象聚蓄百藥周之憲章至若雪散擁紅紫之名香膏藴蘭薰之氣合自金鼎貯於雕奩是宜寵錫大臣榮加有德用灑非常之澤式彰不次之恩而臣逺守嶺隅賤同凡噐曽無薄技上答殊私陛下惠與雲行德如天覆發於中禁及此下藩諭以綸綍之言頒其啓閉之節脂膏一潤覺靣目之有功藥石載攻知肺腑之去疾誓當延年聖代戮力清朝戴昊天而不勝瞻魏闕而增戀臣無任謝停賜口脂臘脂表權德輿臣某言伏奉今月十七日手詔以諸道每年合送口脂集作臈及尺既非厚賜未足伸恩以方鎮勞煩道路為敝一例停罷貴適便冝以示臣者恩自九天澤同集作周萬宇伏讀詔㫖仰荷皇明臣某誠懽誠喜頓首頓首臣聞務其大者捨其細存其廣者遺其狹故先師有寜儉之教禮經有必簡之文陛下誠切愛人志於求瘼口臘香澤豈均雨露之濡尺寸度數曷比乾坤之大以道途勞費傳置将迎鑒在事先慮周物表去煩就省約已便人合簡易於二儀燭休明於四裔臣謬居分土獲奉徳㫖集作音抃賀之誠倍萬恒品無任感戴恱懌之至謹奉表陳謝以聞臣某誠懽誠喜頓首頓首謹言謝賜鍾馗及厯日表張說臣某言中使至奉宣聖㫖賜畵鍾馗一及新厯日一軸者猥降王人俯臨私室榮鍾睿澤寵被㤙輝臣某中謝伏以星紀廻天陽和應律萬國仰惟新之慶九霄垂湛露之恩爰及下臣亦承殊賜屏祛羣厲繢神象以無邪允授人時頒厯日而敬授臣性惟愚懦才與軄乖特蒙聖慈委以信任既負叨榮之責亦懐非㨿之憂積愧心顔難勝愓厲豈謂光廻蓬蓽念等勲賢慶賜之榮賤㣲常及感深犬馬戴重丘山無任同前劉禹錫臣某言中使某至奉宣聖㫖賜臣畵鍾馗一新厯日一軸恩降雲霄光生里巷雖當嵗暮如煦陽和臣某中謝伏以将慶新年聿脩集作循故事繢其神象表去厲之方頒以歴書敬授時之始㣲臣何幸天意不遺同前臣某言高品某至奉宣聖㫖賜臣畵鍾馗一新厯日一軸星紀方廻雖逢嵗盡恩輝忽降已覺春來伏以圖冩威神驅除羣厲頒行律厯敬授四時施張有嚴既増門户之貴動用叶吉常為掌握之珍瞻仰披尋皆知聖澤無任欣戴之至文苑英華卷五百九十六
