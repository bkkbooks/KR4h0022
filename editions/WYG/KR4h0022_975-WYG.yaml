body:
  text: 文苑英華巻九百七十六宋李昉等編行狀六檢校尚書左僕射中書門下平章事兼汴州刺史董公晉行狀一首檢校禮部尚書東海公徐申行狀一首尚書吏部侍郎韓愈行狀一首鞏縣令白府君行狀一首襄州别駕白府君行狀一首金紫光禄大夫檢校尚書左僕射同中書門下平章事兼汴州刺史充宣武軍節度副大使知節度事管内度支營田汴宋亳潁等州觀察處置等使上柱國隴西郡開國公贈太傅董公晉行狀韓愈曽祖仁琬皇任梁州博士祖大禮皇贈右散騎常侍父伯良皇贈尚書左僕射公諱晋字混成河中虞鄉萬歳里人少以眀經上第宣皇帝居原州公在原州宰相以公善為文任翰林之選集有既以二字聞召見拜秘書省校書郎入翰林為學士三年出入左右天子以為謹愿賜緋魚袋累昇為衛尉寺丞出翰林以疾辭拜汾州司馬崔圓為揚州詔以公為圓節度判官攝殿中侍御史以軍事如京師天子識之拜殿中侍御史内供奉由殿中為侍御史入尚書省為主客貟外郎由主客為祠部郎中先皇帝時兵部侍郎李涵如回紇立可敦詔兼侍御史賜紫金魚袋為涵判官廻紇之人來曰唐之復土疆假集作取回紀之力焉約我為市馬馬既入而歸我賄不足我於使人乎取之涵懼不敢對視公公與之言曰我之復土疆爾信有力焉吾非無馬而與爾為市為爾賜不既多乎爾之馬歳五至集有吾字數皮而歸資邉吏請致詰也天子念爾有勞集有故字下詔禁侵犯諸戎畏我大國之爾與也莫敢校焉爾之父子寧而畜馬蕃者非我誰使之於是其衆皆環公拜既又相率南面序拜皆兩舉手曰不敢復有意於大國自回紇歸拜司勲郎中未嘗言回紇之事遷祕書少監歴太府太常二寺亞卿為左金吾衛將軍今上即位以大行皇帝山陵出財賦拜太府卿由太府為左散騎常侍兼御史中丞知臺事三司使選擢才俊有威風始公為金吾始集作未盡一月拜太府由太府集無此三字九日又為中丞朝夕入議事於是宰相請以公為華州刺史潼關防禦鎮國軍使朱泚之亂加御史大夫詔至於上所又拜國子監祭酒兼御史大夫宣慰恒州於是朱滔自范陽以廻紇之師助亂人集作心字大恐公既出至恒州即日奉詔出兵與滔戰大破走之還至河中李懐光反上如梁州懐光所率皆朔方兵公知其謀與朱泚合也患之造懐光言曰公之功天下無與敵公之過未有聞於人某至上所言公之情上寛明將無不赦宥焉乃能為朱泚之臣乎彼為臣而背其君苟能集作得志於公何有且公既為太尉矣彼雖寵公何以加此彼不能事君能以臣事公乎公能事彼而有不能事君乎彼知天下之怒朝夕戮死者也故求其同罪而與之比公何所利焉公之敵彼有餘力不如眀告之絶而起兵襲取之清宫而迎天子庻人服而請罪有司雖有大過猶將掩焉如公則誰敢議語已懐光拜曰天賜公活懐光之命喜且泣公亦泣則又語於其將卒如語懐光者將卒呼曰天賜公活吾三軍之命拜且泣公亦泣故懐光卒不與朱泚當是時懐光幾不反公氣仁語若不能出口及當事乃更踈亮㨗給其詞忠其容貎温然故有言於人無不信集作之字明年上復京師拜左金吾衛大將軍由大金吾為尚書左丞又為太常卿由太常拜門下侍郎平章亊在宰相位凡五年所奏於上前者皆二帝三王之道由秦漢已降未嘗言退歸未嘗言所言於上者於人子弟有私問者公曰宰相所職繋天下天下安危宰相之能與否可見欲知宰相之能與否如此視之其可凡所謀議於上前者不足道也故其事卒不聞以疾病辭於上前者不記集作已退以表辭者八方許之拜禮部尚書制曰事上盡大臣之節又曰一心奉公於是天下知公之有言於上也初公為宰相時五月朔會朝天子在位公卿百執事在廷侍中賛百僚賀中書侍郎平章事竇叅攝中書令當傳詔詞疾作不能事凡將大臣朝會當事者既受命皆先日習儀于時未有詔公卿相顧公逡廵進北面言曰攝中書令臣某病不能事臣請代某事於是南面宣致詔詞已復位進退甚詳為禮部四年拜兵部尚書入謝上語問問字集本作移時日晏復有入謝者上喜曰董某疾且損矣出語人曰董公且復相既二日拜東都留守判東都尚書省亊充東都畿汝蜀本有州字都防禦使兼御史大夫仍為兵部尚書由留守未盡五月拜檢校尚書左僕射同中書門下平章事汴州刺史宣武軍節度副大使知節度事管内度支營田汴宋亳潁等州觀察處置等使汴州自大厯來多兵事劉𤣥佐益其師至十萬人表本無一人𤣥佐死子士寧代之畋逰無度其將李萬榮乗其畋也逐之萬榮為節度一年其將韓惟清張彦林作亂求殺萬榮不克三年萬榮病風昏不知事其子迺復欲為士寧之故監軍使俱文珍與其將鄧惟恭執之歸京師而萬榮死詔未至惟恭權軍事公既受命遂行劉宗經韋𢎞景韓愈實從不以兵衛及鄭州逆者不至鄭州人為公懼或勸公止以待有自汴州出者言於公曰不可入公不對遂行宿圃田明日食中矣逆者至宿八角明日惟恭與表文作及諸將至遂逆以入及郛三軍縁道讙聲庻人壯者呼老者泣婦人啼遂入以居初𤣥佐死吴凑代之及鞏聞亂歸士寧萬榮皆自為之而後命軍士將以為常故惟恭亦有志以公之速也不及謀遂出逆既而私其人觀公之所為以告曰公無為惟恭喜知公之無害已也委心焉進見公者退皆曰公仁人也聞公言者皆曰公仁人也環以相告故大和蜀本有初字𤣥佐遇軍士厚士寧懼不復加厚焉至萬榮如士寧志及韓張亂又加厚以懐之至于惟恭每加厚焉故士集有寧字卒驕不能禦則置腹心之士幕於公庭廡下挾弓執劍以湏日出而入前者去日入而出後者至寒暑時至則加勞賜酒肉公至之時時字集作明日皆罷之貞元十二年七月也八月上命汝州刺史陸長源為御史大夫行軍司馬楊凝自左司郎中為檢校吏部郎中觀察判官杜倫自前殿中侍御史為檢校工部貟外郎節度判官孟叔度自殿中侍御史為檢校金部貟外郎度支營田判官職事修人變蜀本作俗表本作民化嘉木生白鵲集倉鳥集作烏來巢嘉𤓰同蒂聮實四方至者歸以告其帥小大威懷有所疑輙使來問有交惡者公與平之累請朝不許及有疾又請之且曰人心易動軍旅多虞及臣之生計不先定至於集作于他日事或難期猶不許十五年二月三日薨於位上三日罷朝贈太傅使吏部貟外郎楊於陵來祭弔其子贈布帛米有加公之將薨也命其子三日歛既歛而行於行之四日汴州亂表本有故字君子以公為知人公之薨也汴州人歌之曰濁流洋洋有闢其郛闐道讙呼公來之初今公之歸公在喪車又歌曰公既來止東人以完今公歿矣人集作其誰與安始公為華州亦有惠愛人思之公居處恭無妾媵不飲酒不謟笑好惡無所偏與人交泊如也未嘗言有問者曰吾志於教化享年七十六階累升為金紫光禄大夫勲累升為上柱國爵累升為隴西郡開國公娶南陽張氏夫人後娶京兆韋氏夫人皆先公終公四子全道湲唐書作溪下同全素澥按表本蜀本作全道全溪系表及韓愈作董溪墓誌溪全素全澥下同按唐世辭並無全字盖全道全素出於賜名也全道全素皆上所賜名全道為祕書著作湲為祕書省祕書郎全素為大理評事澥為太常寺大祝皆善士有學行謹具歴官行事狀伏請牒考功并牒太常議所諡牒史舘請垂編録謹狀集作伏上貞元十五年五月十八日故吏前汴亳潁等州觀察推官將仕郎試祕書省校書郎韓愈狀金紫光禄大夫檢校禮部尚書使持節都督廣州諸軍兼廣州刺史兼御史大夫充嶺南節度營田觀察制置本管經畧等使東海郡開國公食邑二千户徐公行狀李翺曽祖仁徹隋吉州太和縣丞祖𤣥之皇考功貟外郎贈吏部郎中諫議大夫考乂皇汾州司户叅軍贈信州刺史京兆府萬年縣青盖鄉交原里東海徐公年七十公諱申字維降東海郯人永泰元年寄籍京兆府舉進士得祕書省正字初辟廵官於江西又掌書記于嶺南行營哥舒氏之亂平奏授大理評事轉司直兼監察御史賜緋魚袋又充節度判官于朔方改授太子司議郎兼殿中侍御史選授洪州都督府長史時刺史嗣曹王舉江西兵討李希烈故以長史行刺史事任職有成曹王薦之遷韶州刺史四十餘年刺史相循居于縣城州城與公田三百頃皆為墟縣令丞尉雜處人集作民屋公乃募百姓能以力耕公田假之牛犂粟種集作與字食所收以其半與之不假牛犂者三分與其集無此字二田乆不理草根腐地増肥又連遇宜歳得粟比餘田畆盈若干凡積粟三萬斛將復築室于州故城令百工之技以其藝來者與粟有差刺史臨視給與吏無所行其私以故人皆便信應募者數千人陶人不知墁而塗有餘圩人不板築而墻有餘築人不操斤斧而工有餘陶者圩者築者工者各以其所能相易未十旬而城郭室屋建立如初刺史以官属遷于新城縣令之下各返其室創六驛新大市二道四舘器用皆具曲江縣五百人以狀詣觀察使請作碑立生祠公自陳所為不足述假令如百姓言乃刺史職宜如此何足多者不願以小事市蜀本作干名觀察使嘉其譲宻以狀聞遷合州刺史其始來也韶之集有人字户僅七千凡六年遷合州及其去也倍其初之數又盈四千户焉初先夫人歿於江西遭賊難未克返𦵏寓于西原公不赴合州表請奉䘮歸祔于河南府偃師縣既滄景觀察使奏請景州刺史河北之俗刺史闕其帥輒以寮属將校自為之不請者有年矣宰相累進刺史名皆不出及召公入言合上㫖遂下詔遷朝散郎使持節景州諸軍事景州刺史充本州團練使兼御史中丞賜紫金魚袋尋加節度副使其明年滄景節度使始朝其二年又朝遂留詔以其從父兄代之奏公充行軍司馬公遂以信州府君塋近漕河表求改𦵏於重山詔許之既徴入京師遷朝散大夫使持節都督邕州諸軍事守邕州刺史本管經畧招討使御史中丞賜紫如故是嵗貞元十七年也詰俚盜除其暴掠良聚攻禁下集作不如令通蠻夷道責土貢大首領黄氏帥其属納質共賦黄氏周氏韋氏儂氏皆羣盜也黄氏之族最強盤亘十數州周儂集作韋氏之不附之也率羣黄之兵以攻之而逐諸海黄氏既至羣盜皆服於是十三部二十九州之蠻寧息無㓂害其明年制遷使持節都督廣州諸軍事守廣州刺史兼御史大夫充嶺南節度觀察本管經畧等使散官賜集作此字如故前節度使歿掌印吏盜授人職百數謀夜發兵為亂事覺奔走公至隂以術得首惡殺之不問其餘軍中以安蠻夷俗相攻刼羣聚縁道發輙捕斬無復犯者蕃國歳來互市竒珠瑇瑁異香文犀皆浮海舶以來常貢是供不敢有加舶人安焉商賈以饒二十一年進階銀青光禄大夫元和元年詔加金紫光禄大夫檢校禮部尚書封東海郡開國公食邑二千户餘如故詔書未至有疾薨於位三佐藩屏之臣五為刺史一為經畧使一為節度觀察使階累升為金紫光禄大夫爵超進為開國公官亟遷為禮部尚書其事業皆足以傳示後嗣為子孫法享年七十雖不極集作登於上壽儒者榮之前夫人渤海髙氏子皆早夭後夫人扶風竇氏封國夫人有子元弼前右衛倉曹叅軍以讀書属文為業謹具歴官行事如前狀請牒太常編録謹狀正議大夫行尚書吏部侍郎上柱國賜紫金魚袋贈禮部尚書韓公行狀前人曽祖泰皇任曹州司馬祖濬素皇任桂州長史父仲卿皇任祕書郎贈尚書左蜀本作右僕射公諱愈字退之昌黎某人生三歳父歿飬於兄會舍及長讀書盡能記他生之所習年二十五上進士第汴州亂詔以舊相東都留守董晉為平章事宣武軍節度使以平汴州晋辟公以行遂入汴州得試祕書省校書郎為觀察推官晋卒公從晋喪以出四日而汴州亂凡從事之居者皆殺死武寧軍節度使張建封奏為節度推官得試太常寺恊律郎選授四門博士遷監察御史為幸臣所惡出守連州陽山縣令政有惠於集作于下及公去百姓多以公之姓名集作命其子改江陵府法曹叅軍入為權知國子博士宰相有愛公者將以文學職處公有争先者構公語以飛之公恐及難遂求分司東都權知三年改真博士入省為分司都官貟外郎改河南縣令日以職分辨於留守及尹故軍士莫敢犯禁入為職方貟外郎華州刺史奏華陽縣令桞澗有罪遂將貶之公上䟽請發御史辨曲直方可處以罪則下不受屈既栁澗有犯公由是復為國子博士改比部郎中史舘修撰轉考功郎中修撰如故數月以考功知制誥上將平蔡州先命御史中丞裴公度使諸軍以視兵及還奏兵可用賊勢可以滅頗與宰相意忤既數月盜殺宰相又害中丞不克中丞㣲傷馬逸以免遂為宰相以主東兵自安禄山起范陽陷兩京河南北六七鎮節度使身死則立其子作軍士表以請朝廷因而與之及貞元季年雖順地節將死多即軍中取行軍副使將校以授之節習以成故矣朝廷之賢恬然於所安以苟不用兵為貴議多與裴度相異惟公以為盜殺宰相而遂息兵其為耻集作懦甚大兵不可以息以天下力取三州尚何不可與裴丞相議合故兵遂用而宰相有不便之者月滿遷中書舍人賜緋魚袋後竟以他事改太子右庻子元和十二年秋以兵老乆屯未滅上命裴丞相為淮西節度使以招討之丞相請公以行於是以公因本官集作此三字兼御史中丞賜三品服及魚三字集作衣魚為行軍司馬從丞相居於郾城公知蔡州精卒聚界上以拒官軍守城者率老弱且不過千人亟白丞相請以兵三千人間道以入必擒吳元濟丞相未及行而李愬自唐州文城壘提其卒以夜入蔡州果得元濟蔡州既平布衣柏耆以計謁公公與語竒之遂白丞相曰淮西滅王承宗膽破可不勞用衆宜使辨士奉相公書明禍福以招之彼必服丞相然之公令栢耆口占為丞相書集有明祸福使四字柏耆袖之以至鎮州王承宗果大恐上表請割徳𨽻二州以獻丞相歸京師公遷刑部侍郎歳餘佛骨自鳯翔至傳京師諸寺集有時字百姓有燒指與頂以祈福者公奏䟽言自伏羲至周文武時皆未有佛而年多至百歳有過之者自佛法入中國帝王事之夀不得集作能長梁武帝事之最謹而國大亂請燒棄佛骨䟽入貶潮州刺史移袁州刺史百姓有以男女為人𨽻者公計傭以償其直而出歸之入遷國子祭酒有直講能説禮而陋於容學官多豪族子擯之不得共食公命吏曰召直講來與祭酒共食學官由此不能賤直講奏儒生為學官日使會講生徒奔走聽問皆相喜曰韓公來為祭酒國子監不寂寞矣改兵部侍郎鎮州亂殺其帥田𢎞正征之不克遂以王庭集作廷下同奏為節度使詔公徃宣撫既行衆皆危之元稹奏曰韓愈可惜穆宗亦悔有詔令至境觀事勢無必於入公曰安有受君命而滯留自顧遂疾驅入庭凑嚴兵㧞刃弦弓矢以逆及舘甲士羅於庭公與庭凑監軍使三人就位既坐庭凑言曰所以紛紛者乃此士卒所為本非庭凑心公大聲曰天子以為尚書有將帥材故賜之以節實不知公共健兒語未得乃二字集作及大錯甲士前奮言曰先太史為國打朱滔滔遂敗奔集無此字走血衣皆在此軍何負朝廷乃以為賊乎公告曰兒郎等且勿語聽愈言愈以為兒郎已不記先太史之功與忠矣若猶記得乃大好且為逆與順利與病二字集作害不能逺引古事但以天寳來禍福為兒郎等明之安禄山史思明李希烈梁崇義朱滔朱泚吳元濟李師道復有若子若孫在乎亦有居官者乎衆皆曰無又曰田令公以魏博六州歸朝廷為節度使後至中書令父子皆授旄集作旗節子與孫雖在童㓜集作㓜童者以為好官窮富極貴寵榮耀天下劉悟李祜皆在大鎮王承元年始十七亦仗節皆三軍耳所聞也衆乃曰田𢎞正刻此軍故軍不安公曰然汝三軍亦害田令公身又殘其家矣復何道衆乃謹集作讙曰侍郎語是侍郎語是集本不用疊此句庭凑恐衆心動遽麾衆散出因泣謂公曰侍郎來欲令庭凑何所為公曰神䇿六軍之將如牛元翼比者不少但朝廷顧大體不可以棄之耳而尚書乆圍之何也庭凑曰即出之公曰若真則無事矣因與之宴而歸之牛元翼果出及還於上前盡奏與庭凑及三軍語上大悦曰卿直向伊如此道由是有意欲大用之王武俊贈太師呼太史者燕趙人語也轉吏部侍郎凡令史皆不鎻聽出入或問公公曰人所以畏鬼者以其不能見也鬼如可見則人不畏之矣選人不得見令史故令史勢重聽其出入則勢輕改京兆尹魚御史大夫特詔不就御史臺謁後不得引為例六軍將士皆不敢犯私相告曰是尚欲燒佛骨者安可忤故盜賊止遇旱米價不敢上李紳為御史中丞械囚送府使以尹杖杖之公曰安有此使歸其囚是時紳方幸宰相欲去之故以臺與府不協為請出紳為江西觀察使以公為兵部侍郎紳既復留公入謝上曰卿與李紳争何事公因自辨數日復為吏部侍郎長慶四年得病滿百日罷既罷以十二月二日卒於靖安里第公氣厚性通論議多大體與人交始終不易凡嫁内外及交友之女無主者十人㓜孤飬於嫂鄭氏及嫂歿為之服朞集作朞服以服之深於文章每以為自揚雄之後作者不生集作出其所為文未嘗放集作效前人之言而固與之並自貞元末以至於兹後進之士其有志於古文者莫不視公以為法有集二十巻集作四小集十巻及病遂請告以罷每與交友言既終以處妻子之語且曰某伯兄徳行髙曉方藥食必視本草年止於四十二某踈愚食不擇禁忌五集作位為侍郎年出伯兄十五歳矣如又不足於何而足且獲終牖下幸不至失大節以下見先人可謂榮矣享年五十七贈禮部尚書謹具任官事跡如前請牒考功下太常定諡并牒史舘謹狀故鞏縣令白府君行集作事狀白居易白氏􅇗姓楚公族也楚熊居太子建奔鄭建之子勝居于吳楚間號白公因氏焉楚殺白公其子奔秦代為名將乙丙已降是也裔孫白起有大功於秦封武安君後非其罪賜死杜郵秦人憐之立祠廟於集作于咸陽至今存焉及始皇思武安之功封其子仲于太原子孫因家焉故今為太原人自武安已下凡二十七代至府君髙祖諱建北齊五兵尚書贈司空曽祖諱士通皇朝利州都督祖諱志善朝散大夫尚衣奉御父諱温朝請大夫檢校都官郎中公諱鍠字確鍾都官郎中第六子㓜好學善属文尤工五言詩有集十巻年十七明經及第解褐授鹿邑縣尉歴晋陵縣尉汜水縣尉集無此八字洛陽主簿酸棗縣令酸棗有善政本道節度使令狐章知而重之秩滿奏授殿中侍御史内供奉賜緋金魚袋充滑臺集作亳節度叅謀軍府之要多咨度焉居歳餘公常規章之失章不聽公因留書移章不辭而去明年遷授河南府鞏縣令在任三考自鹿邑至鞏縣皆以清貞静理聞於一時公為人沉厚和易寡言多可至於渉是非關邪正者辯而守之則確乎不可㧞也大厯八年五月三日遇疾歿於長安春秋六十有八其年權殯集作歴於下集無下字非邽縣下邑里夫人河東薛氏薛氏集作夫人之父諱俶河南縣尉大厯十二年六月十九日殁於新鄭縣之私第享年七十以其年權窆於新鄭縣臨洧里公有子五人長子諱季庚庚世系表同集作庾不同襄州别駕事具後狀次諱季殷徐州沛縣令次諱季軫許州許昌縣令次諱季寧河南府叅軍次諱季平鄉貢進士元和六年十月八日孫居易等始發䕶靈櫬遷塟於下邽縣集無此字義津鄉北原而合祔焉謹狀襄州别駕白府君事狀前人公諱季庚字子申鞏縣府君之長子天寳末明經出身解褐授蕭山縣尉歴左武衛兵曹叅軍宋州司户叅軍建中元年授彭城縣令時徐州為東平所管属本道節度使反反之狀先以勝兵屯埇口絶汴河運路然後謀東窺江淮朝廷憂虞計未有出公與本州刺史李洧潜謀以徐州及有口城歸國反拒東平東平令集作遣驍將信都崇敬石隠金等率勁卒二萬攻徐州徐州無兵公合吏民得千餘人與李洧堅守城池親當矢石晝夜攻拒凡四十二日而諸道救兵方至既而賊徒潰運路通首挫逆謀不敢東顧繇是徐州一郡七邑及埇口等三城到于今訖不𨽻東平者實李洧與公之力也徳宗嘉之命公自朝散郎超授朝散大夫自彭城令擢拜本州别駕賜緋魚袋仍充徐泗觀察判官故其制云今徐州集無二字州將忠謀翻然仗集作効順協其誠美共賛國集作良圖我懸爵賞候兹而受宜加佐郡之命仍寵殊階之序貞元初朝廷念公前功加檢校大理少卿依前徐州别駕當道團練判官仍知州事故其制云嘗宰彭城挈而歸國舊勲若此新寵蔑如集有或字不延厚於忠臣將何勸於義士宜從亞列冄貳徐方秩滿又除檢校大理少卿兼衢州别駕秩滿本道觀察使皇甫政以公政績聞薦又除檢校大理少卿兼襄州别駕貞元五集作十是年十集作五月二十八日終於襄陽官舍享年六十有六某年權窆於襄陽縣東津鄉南原至元和六年十月八日嗣子居易等遷於下邽縣義津鄉北原從鞏縣府君宅兆而合袝焉夫人潁川陳氏陳宜都之後祖諱璋利州刺史考諱潤坊酈城縣令妣太原白氏陳氏集作夫人無兄姊弟妹八嵗丁酈城府君之憂居䘮致哀主祭盡敬其情禮有過成人者中外􅊚族咸稱異之十五歳事舅姑服勤婦道夙夜九年迨于奉蒸嘗睦娣姒待賔客撫家人又三集作二是十三年禮無違者故中外凡為家集作冢婦者皆景慕而儀型焉及别駕府君即世諸孤集作子字尚㓜未就師學陳氏集作夫人親執詩書夙集作晝夜教導恂恂善誘未嘗以一呵一抶加之十年之集作餘字間諸子皆以文學仕進官至清近實夫人慈訓所致也為女孝如是為婦順如是為母慈如是舉三者百行可知矣建中初以府君彭城之功封潁川縣君元和六年四月三日殁于長安宣平里第享年五十有七其年十月八日從先府君袝于皇姑焉有子四人長曰㓜文前饒州浮梁縣主簿次曰居易前京兆府曹叅軍翰林學士次曰行簡前祕書省校書郎㓜子金剛奴無禄早世初髙祖贈司空有功於北齊詔賜莊宅各一區在同州同城縣至今存焉故自司空而下都官郎中而上皆𦵏於同城今以卜歸不便遂改卜鞏縣府君及㐮州别駕府君兩塋於下邽縣義津鄉北原其兩塋同兆域而異封樹盖從時宜且叶吉也謹狀文苑英華巻九百七十六
