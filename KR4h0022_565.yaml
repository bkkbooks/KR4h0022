body:
  text: 文苑英華卷五百六十六宋李昉等編賀捷一自此賀捷表凡三巻英華所編既不以類從又失其年代今各以先後而正之賀平鄴都表一首爲納言姚璹等賀破契丹表一首爲建安王賀破賊表一首爲韋右相賀平賊表一首賀賊自相誅滅表一首賀章仇兼瓊克捷表一首爲宰相賀檀州界破奚賊表一首爲宰相賀破吐蕃并慶雲見表一首爲宰相賀九姓斬送突厥首表一首爲宰相賀匈奴來降表一首爲宰相賀隴右破吐蕃表一首李採訪賀収西京表一首爲江淮都統使賀田神功平劉展表一首爲江淮都統使奏破劉展兵捷書表一首爲江東節度使奏破餘姚草賊龔厲捷書表一首賀袁傪破賊表一首賀平鄴都表庾信臣某言臣聞太山梁甫以来即有七十二代龍圗龜書之後又已三千餘年雖復制法樹司禮殊樂異至於文類集作天籬武落剡木弦弧席卷天下之心包含八荒之志其揆一矣類聚作焉伏惟皇帝陛下握天樞秉地軸駕馭風雲驅馳龍虎沉雄内㫁不勞謀於力牧天䇿勇決無待問於容成是以威風所振烈火之遇鴻毛旗皷所臨衝風之巻秋葉竊聞伊洛戎夷幽并僣偽抱圗載籍已歸丞相之府䘖玉繫綬並詣中軍之營百年逋誅遂窮巢窟三代敵怨俄然掃蕩昔周王鮪水之師尚勞再駕軒轅上谷之戰猶須九伐未有一朝指麾獨決神慮平定㝢内光宅天下二十八宿止餘吳越一星千二百國裁漏麟洲小水若夫咸康之年四方始定建武之代諸侯並朝不得同年而語矣雖復八風並唱未足頌其英聲六樂俱陳無能歌其神武坐鈞臺而誓衆姒啟繼夏禹之功入商郊而問罪姬發成周文之志無改之道大孝也歟當今鹿䑓已散傾宫已遣兵藏武庫馬入華山立明堂之制奏大武之樂盛矣哉上天降休未之有也政須東南一尉立於比景之南西北一候置於交河之北然後命東后詔蒼冥衢壇琬碑銀䋲瓊檢告厥成功差無慙徳臣忝竊榮幸蒞政東藩不獲躬到闕庭預觀大慶不勝鳬藻踊躍之至謹遣主簿陪臣曹敏奉表以聞爲納言姚璹等賀破契丹表李嶠證聖二年臣某等言伏見遼東都督高仇須英華作頃非承露布逆賊孫萬斬按唐書證聖元年改制契丹首領李盡忠為盡賊孫萬榮萬斬英華作榮非等驅率㐫黨燒逼州城城中出兵與其賊拒戰則有飛亷作氣囘禄揚熛起沙礫而薄天助兹鼍皷吹煙火而漲日燎彼鴻毛靈應潜施勇士皆奮遂使妖徒震懾亂轍而搴旗善戰横行摧枯而拉朽僵屍蔽於草芥俘馘聚於轅門善馬咸牧名王且縶無假燒鷄之策而觀其自焚不勞燧象之師而撲一作颺其餘燼又㐫渠不逞將竊號而假名逆黨未悛一作誅止挻妖而怙亂或神摧其股或天厲其身似安國之登車同伯牛之自牖故知高明輔順正直司愆惟辟好仁與乾坤而合徳惟狂樂禍在神鬼而同誅方㸔剪滅之期行覿凱旋之奏臣等叨延奬渥謬奉軒墀抃躍之情實萬恒品無任慶快之至謹奉表稱賀以聞謹言爲建安王賀破賊表陳子昂臣某言今月日得遼東都督高仇須等日月破逆賊契丹孫萬斬等一十一陣露布并捉得生口一百人送至軍前事三軍慶快不勝踴躍臣聞天之所棄雖暴必亡人之共讎在逺彌戮况㐫羯遺醜未及犬羊固作孽以招誅自辜㤙而取滅伏惟陛下威加四海子育百靈集作蠻是鬼神尚不敢欺集作違㐫狡豈能逃罪逆賊萬斬等天奪其魄生自爲殃仇須等謹奉廟謀逺慿國討短兵纔接群逆銷亡又云反風廽煙燻晴掩日此乃天威潜運神道宻周豈止人謀仰由靈助今盡滅殃病婆固折股一作婆目折股饑災兼至凋弊日滋未加天兵已集作應自糜爛臣訓勵士馬今日集作月尅行大軍一臨㐫冦必殄獻俘在即拜闕有期預喜承恩不勝慶賀無任抃快之極爲韋右相賀平賊表崔融臣某言伏奉某月日遞敕逆賊等並己傳首都市幕庭拜受旌門宣告凡預軍司孰不慶悦中賀臣聞惡禽惟獸有以彰普覆之仁亂臣逆子不能損盛明之徳故三監作難周王未寢於頌聲七國爲災漢帝克臻於刑措伏惟聖母神皇陛下象天之運法地之安澤浸河海光懸日月以忠信爲甲胄以慈惠爲干戈所向無前何人不服舉神兵如電掃破兇黨若氷離數月妖氛一朝清蕩斯實皇威逺肅聖化傍霑故能市不改肆人皆安堵臣濫承天澤忝預戎麾聞逆命而憎憤聴梟懸而累抃慶快之情倍百恒品不任悦豫之至謹附某官奉表稱賀以聞賀賊自相誅滅表張九齡此篇當在六百三十七卷賀狀門今已移入姑存其目賀章仇兼瓊克捷表李邕開元二十八年臣邕等言伏見中書門下章仇兼瓊奏稱吐蕃數萬圍逼于城皆遵奉九重決勝萬里臣聞雷之震者可以破山風之威者可以蕩海伏惟陛下允答天地丕應鬼神吸之而百川却流吹之而萬物倒植是以蹔勞貔虎一掃戎羗高屋用疑於建瓴銛戈申於破竹豈云懐縣獨有獲嘉何止絳城復稱聞喜光風動處草樹爲之欣榮晴天轉時日月爲之融朗臣等分官寄切報國身輕蹈舞徘徊恐門庭之地窄詠歌踴躍賀邦家之慶深無任欣悦豁快之至謹奉朝堂奉表陳賀以聞爲宰相賀檀一作壇非州界破奚賊表孫逖臣等今月二十五日於易州所奏事陛下顧謂臣曰朝夕之間諸軍當有捷書至臣等愚淺莫測天心不逾數日張守珪果奏副將安禄山於檀州界破奚賊擒生斬級并獲馬計至數千定期不差於晷刻指事有同於符契聖惟廣運神以知来㣲妙之言自成於繫象𤣥通之術不假於蓍龜精義難名前古未有臣等何幸親覩明徴驚喜之誠抃躍交集伏望宣示朝列兼付史官式昭徳音永用垂範無任喜慶之至謹奉表陳賀以聞爲宰相賀破吐蕃并慶雲見表前人臣等比見吐蕃舉國徴兵向二十萬掘壕置柵攻逼定戎城頃因奉事陛下謂臣等曰吐蕃雖衆當即破亡計日之間捷書必至昨見皇甫惟明奏破定戎城下吐蕃賊二十萬衆并斬獲大將論莾布支頭隨狀奉進又初與賊相遇西風甚急及交鋒之後便至風廽既掃妖氛兼有慶雲見者臣聞天之討一作罰罪俟盈貫而方誅聖無不通匪常情之所及伏以一戎凶醜久負恩信敢踰絶漠來犯邊城舉國興師二十餘萬經時固守八十餘日蟻聚蛇伏狼顧鴟張㩀便地之井泉逼懸軍之塹壘雖逆順曲直本無敵於王師而衆寡安危難預卜於人事自朝及野能不憂虞陛下神算無方睿謀先覺料此狂冦必合敗亡决祕策於禁中落竒兵於天下應期撲滅萬里廓清天聲所振己讋一作聞於四海虜將之首又懸於北闕事均符契理絶名言况合戰之時則返風破敵決勝之後則卿雲靄空大塊資其殺氣輪囷表其休色實惟聖感詎測神功凡在庶寮不勝抃躍况於一作在臣等倍萬恒品一作情無任慶快之至謹奉表陳賀以聞爲宰相賀九姓斬送突厥首表前人天寶三載臣等伏見王忠嗣奏九姓㧞悉宻等斬突厥可汗首送至朔方軍者伏以北虜孔熾其来自久慿險恃逺干紀亂常雖聖徳撫和約爲父子之國而野心凶獷不改豺狼之性既盈稔貫自速天誅頃嵗已来頻貽丧敗酋豪向化雖己歸降黙啜迷恩尚爲潜竄苟合餘燼偷安絶漠陛下聖慮先覺神謀獨㫁使其種類自至携離咸革面於塞垣遂傳首於軍壘以狄攻狄寜勞六月之師有征無戰豈待三年之克永罷邉柝遂清虜庭斬蚩尤而莫儔戮防風而何有豈惟率土無外用表於昌期固亦先天不違更彰於睿算凡曰士庻不勝慶悦况在臣等倍百恒情無任抃躍之至謹奉表陳賀以聞爲宰相賀匈奴來降表臣等伏以匈奴患邉其來自久頃雖朝廷示信約爲父子之國然而戎狄無親常畜豺狼之志陛下聖謀廣運睿略𤣥通至道昭感神明叶賛不勞一卒不頓一兵使其種落自相携貳今葉䕶敗亡殞命漠北妻子縲繫為俘闕下巢傾席巻瓦解雲散萬里無事二庭遂空曠古不賔盡爲臣僕普天所覆皆入封疆諒由負徳背恩自速天亡之禍固亦休兵偃甲用彰海晏之期實有無方之神寜惟不戰之勝求諸載籍所未嘗聞臣等幸遇昌期欣逄大慶忝居近宻實倍恒情無任抃躍之至謹奉表陳賀以聞仍望宣付史官兼示中外爲宰相賀隴右破吐蕃表臣等先在城中因奏事陛下謂臣等曰朕料至重陽已来諸軍必頻尅捷臣等欽承聖㫖詎測神功近者隴右果奏斬獲莽布支并生擒蘇毗王及鑾駕將廽劔南節度使章仇兼瓊又奏西山將士分爲五道破吐蕃城保鎮柵等四十餘所四鎮節度馬靈察又奏破吐蕃不可勝數并聞䕶宻識慝等數國共爲邉捍者數旬之間一作内三方告捷應如影響合若符契禁暴如武盡決於宸衷知来似神更超於繫表斬級獲醜䧟陣隳城分南方之五將舉無遺䇿道西城之諸蕃仍爲外蔽百戰百勝以夷攻夷髙居九重懸料萬里所以彰睿略之天賛知犬戎之日蹙臣等忝陪廵幸預奉徳音踴躍之誠實倍恒品無任欣慶之至謹奉表陳賀以聞李採訪賀収西京表常衮至德二載臣聞夏厯其昌羿何逃罪漢維既振莽亦伏誅伏惟皇帝陛下恢正皇綱光膺帝業日月照其明略雷霆發其英㫁極横流而方割撲燎火之己焚頃者胡羯亂常崤函失守暴殄天物慿陵帝京上皇興避狄之仁陛下有蒙塵之難頼宸衷果決睿算昭宣憤陵寢之樵蘇悲黎元之塗炭必將嘗膽誓使然臍不有殷憂何以啟中興之盛業不有患難何以彰撥亂之英哲步自郇邠至于朔漠撫巡城邑招致甲兵詔命俯臨三讓而登九五師徒走集一呼而踰百萬設壇拜將虚左迎師臨朝有怵惕之容率土下哀痛之詔六軍之號令既肅萬人之賞罰且明湯火不辭矢石何懼及清秋戒節太白方高爰整軍容順乎殺氣恭行天罰掃彼妖氛千里貔虎之營百里龍蛇之陣沸若雲海聚如雪山壘掲終峯塹廽渭水闞軍聲而丘陵簸盪煬兵氣而天地晦冥蠢兹兇徒猶敢旅拒皷譟白刄來聚犬羊之群旗靡黄塵旋就鯨鯢之戮渠魁不漏噍類無遺枝梧者面縛中軍顛背者頭懸後殿敗苻融於肥水自可銘功破王邑於崑陽未云快意遂封尸於京觀旋振旅於王城啟闢千門掃除九陌㧞羶腥於宫闕洗毒螫於閭閻耆艾歡迎久思周徳衣冠雨泣還覩漢儀謳吟變噢咻之聲氣象回嚴凝之慘廓冊霄以瞻羽衛肅黄道而復鑾輿正寳位於北辰道光主鬯迎上皇於西蜀歡展奉親永惟宗社之靈實荷乾坤之慶臣忝陪宗室喜萬恒情無任踴躍歡抃之至謹奉表陳賀以聞爲江淮都統使賀田神功平劉展表獨孤及上元二年臣某言得田神功等狀稱官軍以正月二十六日過江大破賊衆擒元惡於蒜山之下凶殘撲滅江介無事臣某誠歡誠喜頓首頓首臣聞四時成嵗秋實集作爲司殺聖人則之以作五兵盖姦宄冦賊或乗釁而起干戈弧矢亦有時而動自陛下率遏亂略再造區宇欃槍旬始竹破瓦解蕞爾狂狡敢干天誅作爲豕虵荐食江漢乃誣矯我詔集作天命攘竊我王師暴殄我城邑俶擾我邉鄙荆吳之人若墜泉谷萬姓業業云我集作奔走無所陛下神聰不測睿算無方將欲擒之必固縱之先侈其心而厚其毒然後制勝兩楹之下授略千里之外使神功等一戰而䧟陣甫戰而逐北三戰而擒其渠魁繫頸以索覆巢傾卵集作子刮野掃地如洌風之破駭浪嚴霜之墜集作隕落葉浹辰之内平陽州定淮南下東方収三吳流亡者復故業塗炭者返夀域扇以皇風與之更始遂令東土耆舊復見漢官威儀非陛下乃武乃文之洪烈日用不知之𤣥化孰能隂隲聖功如此神集作其速臣無任慶抃之至爲江淮都統使奏破劉展兵捷書表前人上元二年臣聞聖人之生不能使大盜不起故唐虞集作堯之代時則有四凶之集作在列王制所以誅不恪討不庭小者市朝大者原野姦宄草竊何代無之劉展包藏禍心爲日久矣集作固久敢恣姦慝乗間阻兵長驅㐫徒掩臣未備以偽言亂衆謂天命在己於是有豕食淮泗鯨吞荆楚集作吳之心使黎庶播越人神憤怒臣職司靖難敢不戮力將集作當憑廟略以殄冦讐謹遣副使少府少監攝侍御史臣李藏用屯兵杭州伺隙進討且分㩀隘害以遏其唐突賊衆狃于初役驕舞輕脱集作師輕而驕不虞我軍能折其鋭也乃以今月三日使其偽將軍張翰朱徳裕集作法雲一作徳容等領歩兵集作卒七千馬兵六百徑入杭州東門焚燒閭閻皷譟而進藏用引其精卒設伏險集作於途羸師張之使入死地然後整堂堂之陣以薄其壘使左廂兵馬使前澤州長史李澄爲左軍左第集作弟字一將張巖光先鋒將李強李陵等佐之都押衙高幹爲右軍左押衙楊履和都虞候魏守寂佐之左第集作弟字二將皇甫山栖左三將梁朝康承寂左四將吳季之李楚玉顔光𦙍等督遊軍之騎以彌縫其闕表裏合戰竒正夾攻以將帥之餘勇因黎元之積憤奮皆敢死登必争先赤羽交而三軍風生金皷鳴而萬夫氣作自卯至午覆而敗之神扶電掃雷落山破噍類無餘隻輪莫反鋒鏑之血朱殷長江甲齊崇山尸作京觀實頼陛下聦明齊聖與日月合照故能慮圗發於罇爼而威靈加於逺方使臣等盡敵如拾芥成功如抵集作指掌惡氣沴祲掃蕩無日海隅蒼生比屋何幸無任慶快之至爲江東節度使奏破餘姚草賊龔厲捷書表前人臣聞皇天分時秋爲司殺王者立極兵以禁暴唐虞有共工三苖集作苖人之患殷周有鬼方昆夷之戰盖蠻夷猾夏自古有之自頃胡冦作逆吳越震恐龔厲父子乗間起兵刼明州之人畧餘姚之地負隘後篇作險集作阻海口憑陵江干蟻聚偷安蠶食取集作分給屬王師北伐未遑南征迨兹二年集作春侵掠益甚將擬得集作復東甌故地窺南越僣跡邉邑黎庶爲之騷然臣方荷推轂之寄懐盡敵之計思所以扶乗天威圗制逺略料其貪而無整勇而無剛鳥散獸聚不足當堂堂之陣山潜海後篇作水匿不足用桓桓之師難以力制易以計滅臣遂遣軍將潘景蘭領輜䭾數十輩偽爲商旅傍山谷往來以餌之又遣軍將吕道光領陌集作相刀手一百人取其便道爲伏以待之遣軍將左璋率弩手一百五十人爲左翼軍將後篇作將軍余能變率弩手一百五十人爲右翼皆三吳良家百越勁卒争賢餘勇樂於公戰蓬頭突鬢炎集作焱駭火烈相爲輔車當集作夾敵之路又遣軍將張思覽率陌集作相刀手二集作一百人爲中軍操中權之制以節其進退以三月二十九日至青煙洞口果如臣策賊遂出山先者遇伏皷噪合戰於是竒正後篇作兵畢舉四軍夾攻賊衆奪氣不知所守鳴鞞雷動飛鏑雨集轉戰數集作四十里殺其三百餘人龔厲尚稽天誅且偷晷刻収合餘燼八九十人更登髙岡背勇借一集作勢張思覧等連弩並集作亂發引軍合圍天聲揚而勇士勵鋭氣作而妖星隕遂斬元兇父子擒其妻孥餘黨僵仆原隰脂膏草莽猶恐蔣􅀈􅀢薈尚有伏姦遂攪山搜谷刮野掃地傾其巢窟返斾而旋累載逋誅一朝撲滅非陛下聖謨神策與天合契制勝兩楹加威後篇作威加四海則安能剪豺狼如拉朽掃欃槍如後篇作同拾芥使吳越乂安江漢澄廓臣授鉞未幾覩兹後篇作同成功無任慶抃之至謹差攝福州泉山府别將左璋奉捷書以聞并齎逆賊父子頭奉獻伏望後篇作請懸之藁街以示百姓其餘首級於當州梟示訖所獲賊物各令分賞將士器械官収山海餘妖自取誅滅既非強敵不足叙功謹録奏聞此篇又見六百八十四卷今已削去賀袁傪破賊表臣某等言臣等伏見河南副元帥行軍司馬太子右庶子兼御史中丞袁傪露布奏今年五月十七日破石埭城賊方清并降烏石山賊陳莊等徒黨二萬五千五百人者臣聞聖人之生不能使大盜不起故唐虞之代時則有三苖之師姦宄草竊爲患舊矣山賊方清等蕞爾狂狡敢干天誅聚輕剽之徒謂險逺可恃作爲蛇豕以荐食勾吳乃有跨㩀大江吞噬東土之計七州之地人罷物敝集作耕織百姓業業全活無所陛下方鋭志於偃武不得已而用師乃命將授略使先勝後戰故傪等役不再舉而用有成績巢窟皆傾俾無遺類詿誤之軰得返故業汙俗更始流人汔康此三代之舉也非陛下齊聖格天文思柔逺豈能底綏盜亂如此其速臣等幸覩成功不勝大慶臣無任抃躍之至文苑英華卷五百六十六
