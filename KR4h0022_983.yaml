body:
  text: 文苑英華卷九百八十四宋李昉等編交舊七祭成紀公文一首祭杜祐太保文一首祭李吉甫文一首祭權相公文四首祭成紀公文崔損維貞元十二年月日朝議郎右諫議大夫崔損大中大夫行給事中徐岱朝議郎給事中趙宗儒正議大夫守中書舍人髙郢宣德郎守駕部員外郎知制誥權德輿起居郎韋丹起居舍人楊馮唐書作憑左補闕歸澄崔邠韋渠牟左拾遺李肇王中書右拾遺蔣武等謹以庶羞之奠敢昭告于門下平章事贈太子太傅成紀公之靈龍為輔臣虞闕四門殷宗審象說代豫言建中皇明崔為文貞嗣德同風俾公登庸運配我唐忠昭我皇君臣合契聖賢同方乃序五行乃調三光乃作舟楫乃作棟梁溫裕內淑矜嚴外莊暖若冬日肅如秋霜錯磨瑚璉黼藻文章鼎不耀彩蘭非振芳疏封慶逺輔族流長祖服既纂孫謀更昌跡初泥蟠勢漸雲翔繡衣持斧錦帳含香曽建隼旟亷察三湘亦倅龍節和柔北荒左曹駮正中臺紀綱績徹宸扆恩升廟堂東西掖垣左右輔弼獻納忠讜訏謨慎密嘉猷必告內言罔出清廟承天圓丘捧日宣子制典酇侯定律有倫有要惟精惟一功讎必舉愛犯斯黜保正懲邪損虛勵實儉能防侈恭能戒一作戒暇逸假寐一作立範寢門宣力王室鈞軸是秉樞機所發先平其心後宰於物赫赫天子萬方禀朔寄公鼎鼐授公帷幄方資燮贊更致淳朴從籍千畝侍巡五嶽福悲下夀忠惜永圖勃也厲疾倏焉夢殂皇心軫慟人望嗟呼賻贈恩篤褒崇禮殊騎吹咸京龜兆鼎城緱山舊隴太傅先塋某等相府僚屬禁闈分職敢辱陶冶愧生羽翼馬孛疑作字容誤龍鱗愛直孔雖不言幸亦有力徹帷啓殯執紼俟門奠薄單醪羞輕特豚悲實懷德忠何顧恩清風令範子子孫孫嗚呼哀哉伏惟尚饗祭杜祐太保文鄭餘慶維元和八年嵗次癸巳四月癸未朔九日辛卯銀青光祿大夫守太子太一作少保兼判太常寺事鄭餘慶銀青光祿大夫守兵部尚書王昭銀青光祿大夫吏部侍郎楊於陵中大夫守户部侍郎判度支盧坦朝議大夫守刑部侍郎充諸道鹽鐵轉運使王播朝議大夫權知禮部侍郎韋貫之等謹以清酌之奠敬祭于故太保贈太傅杜公之靈伏惟嶽峙育德台符炳靈實啓邦傑佐時文明厚仁保和待物推誠夷道不隔直心無營允釐羣官參歷庶務周旋四朝出入三署顧言慎行道在忠恕圭組外身江河比度始從郎位職典邦賦重人惜費惠恕周布建中之初受命分符報政長州擁節番禺趨俗蠻陬是訓是濡既撫淮楚遂荒隋都時當徐方俶擾為虞截河鎖流擁滯邦輸統以威重簡于帝俞鎮寧二境並建雙旟十萬貙虎指麾風趨任兼文武志尚詩書兵賦著典郡政來蘇學該地理識究𤣥機天寵載加時問逾積聿來登庸作弼邦國邦計攸掌國機畢畫永貞之際宫闈祕隔順皇沉疾奸臣竊職公聽羣位總已夕惕躬宣誥㫖捧授金册一人出震羣邪蕩滌崇秩屢增湛恩備錫朝登劍履樂侔金石沐浣良辰宴慰親客朱輪紫授疑富盛赫奕戒足思退居髙不危國有大計猶將來咨才實不器用皆適時位極元老守逾謙卑靈夀方賜懸車忽辭冀期頤以遐保遽樂往而哀隨餘慶等早忝班行嘗承顧盻仰台庭以增欷臨素車而申奠嗚呼哀哉伏惟尚饗祭李吉甫文武元衡維元和九年月日某官謹遣某以清酌之奠敬祭于故中書侍郎同中書門下平章事贈司空趙國公李公之靈元精之和變乎絪緼升為星辰播為賢哲當四序迭運克成嵗功元德咸宜用彰聖道惟公鍾茂間氣誕靈中和圭璧鎮於巖廊宫商備於韶濩經文緯武覩奧知微究理亂之源流極天人之涯際洎濯纓清漢鳴珮天墀出入三朝徘徊二紀嘗思禁掖潤色王猷屬元聖御極之初昊天降休之日公內參密命外正戎機竭心膂以振皇綱勵精誠以輔𤣥化故得三光離朗九有澄清南定勾吳西殲卭僰默運宏略𢎞宣大猷及公亮采登庸豫忝台階接武翊戴元首弼諧神人論道罔違恩波共浹及公推轂淮海豫亦杖鉞坤維俱荷寵駕各從藩翰隂隲庶彚惠洽顓䝉化呰窳之人變澆漓之俗聲應義激契重情申信誓之言期於沒齒隋宫井絡相去萬里山水澄鮮烟綿錯峙風傳麗句緘開素鯉金石相投鏗然在耳再徴黃霸繼入丹墀啓沃同心嵗寒共期運屬休明道濟無為星霜八變交態不移或乘春賞花或對酒吟詩音容不間宴語忘疲宜保太和克享期頤報功于岱嶽侍宴于瑶池庭菊有芳朝露尚滋交臂遽失瞥如飈馳惜乎時方泰而夀不與噫道行而數竒復淮夷之成算雖人亡而事遺軫悼皇情哀纒册誄瞻彼洛土青烏爰止千里申奠九原同寄撫嵇紹而不孤銘太丘而無愧嗚呼哀哉尚饗祭權相公文四首楊於陵維元和十四年嵗次己亥七月丁丑朔六日壬午尚書户部侍郎兼御史大夫上柱國𢎞農郡開國公楊於陵謹以㫖酒庶羞之奠敬祭于故相國贈尚書左僕射權公之靈伏以世濟明德天資上才默識中照襟靈洞開言成典誥筆落風雷叩寂窮妙神交思來百代遐騖九流兼該傾詞人之藪澤為作者之杓魁粵自童年飛聲天下論交請益莫非賢者荏苒藩服發輝文雅遽徹明庭難留諸夏騏驥之步騁於康莊鸞鳳之舞暢於朝野望九霄於瞬息指千里於尋常遵曲臺之講肄修諫省之封章帝曰絲綸代豫口語詞之頗僻政亦乖阻爾其専掌爾必師古亟換官榮屢移星序春泉涌溢彩翰飛舞丕變澆訛裁成訓詀六官之二我踐其五朗鏡髙懸時髦盡取陶鈞之柄義利求分詭情異態抑有前聞公之雅素逈拔群倫知以藏用忠惟愛君將所以懲止誇競儀刑縉紳豈獨辨是非於毫髮較輕重於逡巡而已哉日居月諸或處或出分陕東之憂寄統漢上之師律懋官之典雖荷於朝章福善之徴尚期於隂隲如何不淑大禍俄鍾方佇朝天之慶翻成夢奠之凶歎人倫之殄瘁哀令子之疚窮幸斯文之不泯將千載之為宗於陵爰自壯年獲承嘉惠以蕭蘭之菲質荷松柏之深契鍾陵携手禁掖連袂講德談𤣥依仁遊藝平生之恨尚嗟離别之多零落之悲何堪衰暮之際嗚呼謀及龜策言旋洛師風淒晚籟霧偃靈輀抆淚舉酒升階致詞儻交情之不昧實神鑒之來思尚饗二李直方維年月日中散大夫試太常少卿上柱國李直方謹以清酌庶羞之奠敬祭于故三丈相公之靈天作雷雨山川出雲帝思理平英髦並生爰自弱嵗植此休德𢎞重不器仁聲淵塞旋升外臺乃居察視輔人成化入為右史文學溥博德度謙沖載領絲言粉澤天工詞簡理詣燦然昭融俾國家詔命上逾十代與周漢同風爰登禮曹實司選士人罕其再我三専美雄文懿行善價端顒士昻周行鱗集麏至一作聚朝推厥德乃作天官庶職惟允九流序焉帝念儲皇輒居調護九法闕理乃遷兵部禮樂不綱斯為奉常神人以和騫飛廟堂鼎飪三載萬方咸賴退為宗伯碩望彌赫惟梁思理建節來萃教化惠和流庸洽至憶昔攸往火旗雷麾今也來思白馬龍輀哀笳凝咽以增感丹旐悠揚而獨飛嗚呼哀哉直方昔在南宫擢遷綸閣提携推薦忘其菲薄顧庸淺而難持竟鴻飛而終却今佳城行啓哀挽徐吟跪靈筵而號慟淚橫墮而不禁伏惟尚饗三王仲舒維年月日從姨弟使持節蘇州諸軍事守蘇州刺史賜紫金魚袋王仲舒謹遣某人以清酌之奠敬祭于故山南道節度使贈尚書左僕射權三兄相公之靈惟靈天受全氣早挺文學用道以直間邪存誠心常坦夷而不離法度操本堅峻而盡歸忠厚自拂衣登朝周歷清重靜専一節造次於是內翊皇極外擁麾旄賢哲極致天下榮觀豐祿足以肥家雄文可以潤屋而奉已彌約素風逾鮮顒昻山立以鎮浮俗嗚呼公之德也公之器也夀享期頤猶謂之夭况相逺乎論道上庠猶謂之薄况不至乎哀哉仲舒及冠之年情契深至非求道之要不為辭端非為文之蹟不著心本雲路盡相致之誠閒宴諧道舊之適音容如覩書札尚新靈儀宛然驟隔今古局守逺郡臨慟無因敬薦酒殽用申平昔尚饗四蕭籍維年月日門生義武軍節度使行軍司馬文林郎檢校尚書户部員外郎驍騎尉賜紫金魚袋蕭籍謹以清酌之奠敬祭于前相國故山南西道節度使檢校吏部尚書兼興元尹御史大夫贈尚書左僕射之靈伏惟明靈禀天地絪緼之和為唐虞文武之臣宜乎夀登期頤福如崇山安危所注意致大君於三五之上如何昊天壞我梁木承訃之日縉紳失望豈喬疑作僑終蹇歌疑衍謝興謡輟相之足云乎信無等級以寄言也嗚呼哀哉公昔在貞元實司文衡等甲者七十有二人惟籍鯫生名不聞於將命者公以至公俾居選中數仞之墻得門而入荷此知己與嵩華為輕矧乎侍立班墀常趨後塵退食台庭亟承嘉言昔之少别今成永訣哭寢之慟百身可贖嗚呼哀哉伏以天子有命司戎使車三請㑹葬元侯不許既不得見曵杖之日又不得見如斧之封思欲如赤為志如賜築室邈乎其不可及己身寄於燕趙之交神馳於涇渭之表瞻望遐路心悽目泫其可及乎所可慰者臧孫有一作之後載揚載顯期在兹日以此忍哀齊心遣使儻神理之來顧庶至誠之上逹嗚呼哀哉尚饗文苑英華卷九百八十四
