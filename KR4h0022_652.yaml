body:
  text: 文苑英華巻六百五十三宋李昉等編謝官謝竇相公除男襄州叅軍仍許随父啟一首謝周相公啟一首謝魏相公啟一首謝宗卿啟一首謝襄州李尚書啟一首謝紇干相公啟一首謝時相啟二首謝集賢相公啟一首謝奉常僕射啟二首謝尚書丞郎給舎啟一首謝史館裴相公啟一首謝監脩相公啟二首謝宰相啟一首謝諸知己啟三首謝竇相公除男襄州叅軍仍許随父啟吕頌某啟男元曜䝉恩授襄州叅軍又奉七月初四日勑許令随父凖例支給料錢者恩生不次事出非常仰戴天慈伏荷仁徳以欣以懼戰越交并伏以國朝故事及古名臣惠及黎元勲髙社稷則有賞延于代禄及于家或總角腰章或垂髫結綬綺紈拜命襁褓分榮自葉流根盖超彛典某謬承聖奬猥守方隅政教無聞典禮多闕男尚㓜小濫厠班榮相公念以遐荒將與便近更許随父仍給料錢榮超流輩之中賞過彛章之外退循涯分喜躍伏深限以所守拜謝末由下情伏增戰灼謝周相公啟杜牧某啟伏奉八月三日集作三月八日勑除尚書司勲員外郎史館脩撰承命榮懼啟處無地伏以聖主順上帝之則率四海以仁神化風行家至日見古先哲王之徳也有求必至有開必先是以傅吕得於夢卜申甫降於山岳伏惟相公待主乃用為時而生當考室構厦之時膺督繩削墨之任賛傑俊遂賢良調陰陽提紀律類能而使度材授官常切如家之憂每懐撻市之耻是以朝廷禮樂天下清明人不凋傷神不怨悵萬物由道百度皆貞雖周獲仁人商得元哲夣卜降岳之得豈能逾焉某以樸樕之材糞朽之賤遭逢聖集作盛業三帶郡符自審事宜實以逾忝伏以睦州治所在萬山之中終日昏氛浸集作侵染衰病自量忝官已過不敢率然請告唯念滿嵗得保生還不意相公㧞自汙塗集作泥昇於霄漢却收斥錮令厠班行仍授名曹帖以重職當受震駭神魂飛揚撫已自驚喜過成泣藥肉白骨香返逰魂言於重恩無以過此雖買臣懐紱郡邸蕭育召拜扶風楊僕三組垂腰蘇秦六印在手較於榮忝無以為踰集作喻言念㣲生難酬殊造伏以相公自數年以来朝廷舊老四海賢俊皆因提挈集作挈雕盡在門館毗輔聖主巍為元勲自有神明以相百禄顧惟賤末報効無門感激血誠涕淚迸溢無任攀戀激切懇欵之至謹啟謝座主魏相公啟為弟作李商隠羲叟啟伏奉前月二十八日勑㫖授秘書省校書郎知宗正表䟽續奉今月五日勑改換集作授河南府叅軍依前充職者小宗伯之取士早辱搜揚大宗正之薦賢又䝉抽擢未淹旬日再授班資任重本枝職齊載筆方殊王逸唯注於楚詞有異郝隆但攻於蠻語此皆相公事均卵翼勢借風雲特於汨沒之中俯借扶摇之便孔龜効印未議於酬恩楊雀銜環徒聞於報惠感忭之至罔知所裁謹啟謝宗卿啟為弟作羲叟啟伏奉集作䝉奏署知表䟽官伏奉前月二十八日勑㫖授秘書省校書郎續奉今月五日勑改授河南府叅軍者某少實艱屯長無才術集作運徒以與周同姓從魯諸儒託阮籍之竹林攀郄詵之桂樹曲䝉題目猥被薦聞惟我大朝克崇宗祏敘文昭武穆之位敦紹堯纉禹之親豈以斯文失於能者况一䝉旌録再忝恩榮班資將厠於郄超職業㡬踰於孫楚感結所至生死以之即以今月某日發赴所職登門在近縮地是思惟勤肺肝恨無毛羽伏惟時賜恩察謹啟謝襄州李尚書啟温庭筠某啟某櫟社凡材蕪鄉散質殊無績效堪奉恩明曷當紫極牽裾丹墀載筆顧循虚淺實過津涯豈知畫舸方逰俄昇於桂苑蘭扄未染已捧於芝泥此皆寵自昇堂榮因著録勵鴻毛之𦕈質託羊角之髙風日用無窮常仰生成之徳時来有自寧知進取之規兢惕彷徨莫知所喻末由陳謝攀戀空深謝紇干相公啟某啟某材謝楩柟文非綺組間闗千里僅為蠻國叅軍荏苒百齡甘作荆州從事寧思羽翼可勵風雲豈知持彼庸踈栖于宥密廻顧而漸離緇集作淄非垢冥升而欲近煙霄榮非始圗事過初願此皆揚芳甄藻發跡門墻丘門用賦之年相如入室楚國命官之日宋玉登臺一日光陰百生輝映末由陳謝伏用兢惶謝時相啟張𤣥晏某啟某今日伏奉宣召伏䝉聖慈令充職翰林者出自埏鎔成茲忝越循涯積感揣分增榮某洛下諸生隆中散族進取本無其聲援歸休復廹於羈離白首為郎固乏堂堂之稱青雲無路但甘碌碌之嗤愈廹低徊欲成淪沒相公殊常降徳不次施恩㧞自迷途寘諸密地䝉虎皮於下駟抑以騰驤綷鵠羽於寒鴟教之鶱翥遂使専詔誥教令之事為言語侍從之臣内省孱㣲益深榮懼謹啟二某啟某伏奉今日勑授尚書駕部郎中知制誥依前充職者某才殊敏健識異精通既無環潤之姿焉有矜嚴之譽謬因鎔鑄驟陟煙霄掌禁苑之文詞列金門之侍從顧惟鯫淺尋過津涯忽自秋而徂冬每素飡而尸禄愈成靦冒益被顯榮相公曲示洪鈞重磨頑璞降始終之茂徳𢎞特達之深恩再假丹青復掀羽翼遂使移粉署應星之列玷掖垣掌誥之名盡出殊私皆為華給蚊蚋難勝於山岳韲灰何報於生成謹啟謝集賢相公啟某啟某今日伏奉恩㫖宣召充職翰林者出鈞鎔之巨力收扂楔之小材㧞自塵泥驟陞霄漢撫已實知其忝越銜恩載切於屏營某洛下諸生朝中孤宦進取本無其聲援歸休又廹於覉離既碌碌以經時亦倀倀而度日伏䝉相公十九兄殊常降徳不次施恩生暖甲於枯荄化豐肌於朽骨出諸䧟穽置在門闈綷鵠羽於寒鴟教之鶱翥䝉虎皮於下駟抑以騰驤但自捫心何階報徳况専詔誥教令之事為言語侍從之臣内顧孱㣲益深榮懼唯冀永賫肝膈長託鑪錘但當有命以酬固亦無言可謝謹啟謝奉常僕射啟某啟某今日伏奉聖㫖令充職翰林者龎鴻恩重螻蟻命微循涯増感激之誠揣已積叨踰之懼伏以某名慙鉅下人異隆中無賦雪之詞華乏論天之才辯頃嵗纔萌進取便獲攀投及門人指其登龍託質時推其附鳳因得交朋改觀行止増光遂忝决科俄榮筮仕始優游於諫省旋履歴於霜臺郎署一棲星霜六變而偶茲多難方困迷津永無振奮之期益勵退藏之志僕射憫其孤拙哀以棲遲忽垂大恩顧及衰緒孜孜保證矻矻維持竟使凡材遽塵劇職叅玉堂之侍從掌金殿之書詞榮非始圗事過初望唯誓永將死節上報生成倍激糜捐冀申萬一二某啟某伏奉勑命授尚書駕部郎中知制誥依前充職者某藝能無取才格俱凡任孤僻以趨時守顓愚而樂道敢於榮顯竊冀遭逢伏䝉僕射不次垂恩踰涯降徳彫朽曲施其敏手磨鉛俾耀其銛鋒因得擺脫塵泥昇騰霄漢専玉堂之詔誥追金馬之逰從尋一作實過津涯每慙靦冒孰謂纔踰累月又陟華資南宫秩换其詞司西掖名叅於演綍生成益被灰粉何酬感深空集其涕洟恩重但期於隕越謝尚書丞郎給舎啟某啟某忽䝉宸奨擢處内庭循省荒蕪倍懐兢懼某才殊二妙譽媿三英趨時既乏於梯媒退跡倍悲於萍梗某官常廻恩奨曲賜吹揚遂使虚孱成茲忝越列侍從於金門之下掌書詞於禁苑之中榮非始圗事過初望謝史館裴相公啟羅衮某啟伏以洪鈞播物已在生成朗鑑通幽寧期照燭伏以相公二十五丈熙朝徳茂軌世才髙發言為褒貶之經廻顧是寒暄之律自叨洪奨愈切寵驚近又見户部王侍郎伏知造化工夫不遺纎草丹青潤色偏及偶人輝華而賤質增榮感激而雄眸有淚實以衮家殊弁冕業繼詩書巻懐於盛壮之時浮泛於衰遲之日詞科入仕尋周一紀之星諫署升朝亦改四年之火雖復毛慙腹背角困藩籬何甞不砥礪公方琢磨文術竟以長沙地窄難呈宛轉之姿南郡鬼逢每受揶揄之恥俄消剥道顯自明恩霖施而窮澤生流瑞降而枯條更肄得不乗風奮力搦朽申勞依魯相之門墻永随車豎仰殷宗之左右長奉鼎梅卑情無任日夕兢惶生死銜戴之至謝監脩相公啟某啟某鄉品慙卑朝班愧近乆託運籌之化元無載筆之能今伏奉恩制伏䝉相公特賜奏授前件官充職者寵靈重疊敢幸於時来塵忝過多但驚於望外下情無任戴恩感激量伎兢惶之至伏以相公道壮龍圗情専鳳䇿兩掖之内以讜辭為先三館之中以信史為急必銓名實乃授清華固以時屬叡文事當脩舉列聖之青編再輯盛朝之鴻藻將鋪是宜對季札以歌唐求孟堅而述漢然後可以昭彰一代舄奕一作顯赫千齡如衮之才非此之任誠欲奉身而退瀝懇以辭無傷棫樸之風自適輪轅之用竊念早依門闥昨侍台階聞善誘而遽已捧承沾謬恩而莫遑辭讓主文譎諫顧出納以何裨廣記備言審荒蕪而豈措徒思竭力寧逭靦顔唯當禀奉公忠執持愚直分職於仲山之下庶展其能受經於尼父之前冀成其傳効酬之志灰沒為期卑情無任銜荷惕勵憂懼怔營之至二某啟幸以弱才託於𢎞造遂捨寒鄉之士爰升近署之班雖與道翺翔似無邪行而随波上下安有直詞是以乆列編脩常孤事任一家之言莫就空慕馬遷三國之志未聞實慙陳夀深宜免罷稍獲遑寧不謂相公尚貸簡書且敦方冊才授改官之寵仍還帖職之榮乍簮筆於宸軒復和鉛於綸閣中書肄入寧同著作之郎相府依棲乃類司徒之掾分誠已過恩亦太隆既辭讓以難諧但憂兢而罔寘榖梁清婉休校力於短長王隠混淆預甘心於譏誚營職為務投生以酬下情無任感激省循光忝愧懼之至謝宰相啟某啟伏以居有熊左右之司毎聞沮誦著周穆存亡之闕但記戎夫規動止於九天法春秋於百代某雖愚懵知此重難況復皇朝廢置之初便搜才實近日選求之慎必在英華峻等級於螭階盛風流於鳳闕某則寒陋分無希望伏以相公協兆為師奮庸熈載將行大道上繼於宣尼誘進單門下同於王儉不以某諫垣空食史閤曠官特興乆次之嗟俾授殊遷之命暄臨黍谷方知律吕之聲調境入蓬山孰謂風飈之道阻徒成踴躍莫獲逡廵副燕臺尊隗之心奉孔里鑄顔之化巍巍聖徳雖期有舉必書赫赫台光定是無階上報榮懼感激不任下情謝諸知已啟某啟伏奉恩制除授前件官者事匪心期恩將敵至榮懼憂惕不任下情伏以某用乏適時言非悟主雖困泥塗之辱敢希朝序之榮伏䝉某官念以吾道依棲斯文宗仰懇動吹噓之力終諧憐奨之心遂使縣吏塵銜擺脫忽同於蟬蛻諫臣清級超昇遽遂於鸞翔叨忝何多提携至此竊復念孤單事契愚魯性靈茍非示以脩塗安得靡茲好爵獻可替否諒無補於皇明狥義忘身庶粗酬於恩徳卑情無任感戴激切之至二某啟某操行無竒文章匪贍拾遺左右三年未望於轉遷約史春秋五夜寧通於夣想斯亦孤單雅分頑魯自宜忽踐履於清華諒因依於賢達伏以某官優容下位奨進㣲才荀君之日月在躬王氏之風塵外物輙忘孤陋榮遂品題一作荀君之日月在躬道存瞻矚王氏之風塵外物榮遂品題故得譽徹中台名聞東觀遽簉彌縫之地仍恭著作之庭祗奉寵光若臨泉谷静循叨竊實自門墻敢不永抱兢銘深虞負累以當官而贖疑作凟忝用舉職以酬知求女媧錬石之方潜禆碧落就太史藏山之事一作筆試學青編尚覬宗師更傳規矩下情無任攀戴靦汗之至三某啟伏以記事之官顯司存於戴禮侍臣之職正號位於隋朝自古不輕方今為一作尤重豈期幽介遽獲忝塵此乃某官道著訏謨情敦片善偃彼小人之草列諸君子之林遂令補衮掖垣仍叨筆削珥貂仙室更踐清華得不上報鴻恩旁酬重徳日月簡編之効敢怠於季一作學終雪霜松柏之心佇彰於嵗晩榮懼感奮不任下情文苑英華巻六百五十三
